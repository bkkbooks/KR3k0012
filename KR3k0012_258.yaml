body:
  text: 職官部五十五良刺史中後魏書曰李崇為楊州刺史先是壽春縣人茍泰有二子三歲遇賊亡失數年不知所在後見在同縣人趙奉伯家泰以狀告各言己子並有鄰證郡縣不能斷崇曰此易知耳二父與兒各在別處經禁數旬然後遣人告之曰君兒遇患向已暴死有教解禁可出奔哀也茍泰聞即號咷悲不自勝奉伯咨嗟而已殊無痛意崇知之乃以兒還泰詰奉伯詐狀奉伯乃款引先亡一子故妄認之又曰李崇除兗州刺史兗土舊多劫盜崇乃村置一樓樓懸一鼓盜發之處雙槌亂擊四面諸村始聞者槌一通次復聞者以二為節次後聞者以三為節各擊數千槌諸村聞鼓皆守要路是以盜發俄頃之間聲布百里其中嶮要悉有伏人盜竊始發便爾擒送諸州置樓懸鼓自崇始也又曰韋崇除南頴川太守不好發擲細事常云何用小察以傷大道吏民感之郡中大治高祖聞而嘉賞賜帛二百匹又曰崔亮為雍州刺史城北渭水淺不通船行人艱阻謂寮佐曰昔杜預乃造河梁況此有異長河且魏晉之日亦自有橋吾今決欲營之咸曰水淺不可為浮橋泛長無常又不可施柱恐難成立亮曰昔秦居咸陽橫橋渡渭以像閣道此即以柱為橋今惟慮長柱不可得耳會天大雨山水暴至浮出長木數百根藉此為用橋遂成立百姓利之至今猶名崔公橋又曰任城王雲為冀州刺史雲留心政事甚得下情於是合州民各請輸絹五尺粟伍升以報雲恩高祖嘉之又曰城陽王長壽之子徽除并州刺史先是州界下霜人庶逃散徽輒開倉賑之文武咸共諫止徽曰昔汲長孺郡守耳尚輒開倉救人飢弊况我皇家親近授委大藩豈可拘法而不救人困也先給後表肅宗嘉之又曰李平字曇定為相州刺史勸課農桑修飾太學簡試通儒以充博士選五郡聰敏者以教之圖孔子及七十二弟子於講堂親為立贊前臺使頗好平畫履虎尾踐薄冰於客館注頌其下以示誡焉又曰韋彧為東豫州刺史彧以蠻俗荒梗不識禮儀乃表立太學選諸郡生徒於州總教文於城北置崇武館以習武焉境內清肅又曰韋珍遷郢州刺史在州有聲績朝廷嘉之遷龍驤將軍賜驊騮二匹帛五十匹穀三百斛珍乃召集州內孤貧者謂曰天子以我能綏撫卿等故賜以穀帛吾何敢獨當遂以所賜悉分與之又曰韓麒麟除齊州刺史假魏昌侯麒麟在官寡於刑罰從事劉普慶說麒麟曰明公杖節方夏而無所斬戮何以示威麒麟曰刑罰所以止惡蓋不得已而用之今民不犯法何所戮乎若必須斬戮以立威名當以卿應之普慶慚懼而去又曰李崇沉深有將略寬厚善御衆在楊州凡經十年養壯士數千人寇賊侵邊所向摧破號曰臥虎又曰陸俟長子馥多智有父風高祖見而悅之謂朝臣曰吾常歎其父智過其軀是復踰於父矣少為內都下大夫出為刺史假長廣公為政清平抑強扶弱州中有舊德宿老名望素重者以友禮待之詢之政事如此者十人號曰十善於是發姦擲伏事無不驗百姓以為神明無敢寇盜徵為散騎常侍人乞留者千餘人又曰崔林為青州刺史青州九郡民單檦李伯徽劉通等一千人上書訟休德政靈太后善之休在幽青五六年皆清白愛民甚著聲績二州懷其德澤百姓追思之又曰任城王澄為楊州刺史下車封孫叔敖之墓毀蔣子文之廟表請復皇宗之學開四門之教詔從之又曰阮孚拜冀州刺史勸課農桑境內稱為慈父鄰州號曰神君先是州人張孟都張洪建馬潘崔獨憐張叔緒崔思哲等八人皆屯保林野不臣王命州郡號曰八王孚至皆請入城願致死效力北齊書曰趙郡王睿除北朔州刺史都督北燕北蔚北恆三州及庫堆以西黃河以東長城諸鎮諸軍事睿慰撫新遷量置烽戍內防外禦備有條法大為兵民所安有無水之處禱而掘井鍬插裁下泉源湧出至今號曰趙郡王又曰魏蘭根為歧州刺史從行臺蕭寶夤討破宛川俘其人為奴婢以美女十人賞蘭根蘭根曰此縣分於強虜故成背叛今當恤其飢寒奈何並充僕隸於是盡以歸其父兄部內麥多五穗鄰州田鼠為災犬牙不入歧土又曰韓軌遷秦州刺史甚得邊和神武巡秦州欲以軌還仍賜城人戶別絹布兩匹州人田昭等七千戶皆辭不受唯乞留軌神武嘉歎乃留焉北史曰齊任城王諧為并州刺史時有婦人臨汾川浣衣有乘馬人換其新靴馳而去者婦人持故靴詣州言之諧召居城諸嫗以靴示之紿曰有乘馬人於路被賊劫害遺此靴焉得無親屬乎一嫗撫膺哭曰兒昨著此靴向妻家如其語捕獲之時稱明察又曰齊平覽遷懷州刺史覽奏諸於州西故車道築城以防西軍從之尋而西魏來攻時新築城糧仗未集素乏水南門有大井隨汲即竭覽具衣冠俯井而祝至旦而井泉湧溢有異於常又曰齊彭城王浟為滄州刺史有人從幽州來驢馱鹿脯至滄州界腳痛行遲偶會一人為伴遂盜驢及脯去明旦告州乃令左右及府僚吏分市鹿脯不限其價其主見識之推獲盜者又曰竇熾為原州刺史熾挫抑豪右申理幽滯在州十載甚有政績州城北有泉水屢經遊踐嘗與僚吏宴於泉側因酌水自飲曰吾在此州唯當飲水而已又曰申微為襄州刺史時南方初附舊俗官人皆通餉遺微性廉慎乃畫楊震像於寢室以自戒及代還人使送者數十里不絶微自以無德於人慨然懷愧因賦詩題於清水亭長幼聞之皆競來讀遞相謂曰此是申使君手迹並寫誦之又曰赫連達為雲州刺史性廉儉邊境胡人或饋達羊達欲招異類報以繒帛主司請用官物達曰羊入我廚物出官庫是欺上也命取私帛與之識者嘉其仁恕三國典略曰賀祥為荊州刺史祥有惠政遠近款附梁嶽陽王察欽其清素乃贈以竹屏風祥難違其意取付所司太祖聞之並以賜祥後周書曰獨狐信為秦州刺史先是守宰暗弱政令乖方民有冤訟歷年不能決信在州事無擁滯示以禮教勸以耕桑數年之中公私富實流民願附者數萬家太祖以其信著遐邇故賜名為信又曰達奚武之在同州也時屬大旱高祖勑武祀華嶽而廟在舊山下當往祈禱武謂寮屬曰吾備位三公不能燮理陰陽遂使盛農之月久絶甘雨天子勞心百姓惶懼忝寄既重憂責實深不可同於衆人在常祀之所必須登峰展誠須其靈奧嶽既高峻千仞壁立武年逾六十唯將數人攀藤援棘然後得上於是稽首祈請陳百姓懇誠晚不得還即於嶽上藉草而宿夢見白衣人來執武手曰快辛苦甚相嘉尚武遂驚覺益用祗肅至旦雲霧四起俄而澍雨遠近沾浹高祖聞之璽書慰勞又曰韋瑱字世珍魏恭帝二年賜姓宇文氏三年除瓜州刺史通西域蕃夷往來前後刺史多受賂遺胡寇犯邊又莫能禦瑱雅性清儉兼有武略蕃夷贈遺一無所受胡人畏威不敢為寇公私安靜夷夏懷之又曰長孫儉授荊州刺史東南道行臺僕射所部鄭縣令泉璨為民所訟推理獲實儉即大集僚屬而謂之曰此由刺史教誨不明信不被物是我之愆非泉璨之罪遂於廳事前肉袒自罰捨璨不問於是州城肅勵莫敢犯法魏文帝璽書勞之又曰王思政遷荊州刺史州境卑濕城塹多壞思政方命都督蘭小歡督工匠繕治之掘得黃金三十斤夜中密送之至旦思政召佐吏以金示之曰人臣不宜有私悉封金送上太祖嘉之賜錢二十萬又曰泉企為東雍州刺史性清約纖毫不擾於民在州五年每於鄉里運米以自給隋書曰令狐熙拜滄州刺史時山東承齊之弊戶口薄藉類不以實熙曉諭之令自歸首至者一萬口在職數年風教大洽稱為良二千石開皇四年上幸洛陽熙來朝吏民恐其遷易悲泣於道及熙復還百姓出境迎謁歡叫盈路在州獲白烏白麞嘉禾甘露降於庭前柳樹又曰令狐熙時上祠泰山還祠汴州惡其殷盛多有奸俠於是以熙為汴州刺史下車禁遊食抑工啇民有向街開門者杜之船客於郭外星居者勒為聚落僑人逐令歸本其有滯獄並決遣之令行禁止稱為良政上聞而嘉之顧謂侍臣曰鄴都天下難理處也勑相州刺史豆盧通令習熙之法其年朝考績為天下之最賜帛三百匹頒告天下又曰楊達字士達為鄯鄭趙三州刺史俱有能名平陳之後四海大同上差品天下牧宰達為第一賜雜綵五百假加以金帛又曰慕容三藏授廓州刺史州極西界與吐谷渾鄰接姦宄犯法者皆遷配彼州流人多有逃逸及三藏至招納綏撫百姓愛悅繈負日至吏民歌頌之高祖聞其能屢有勞問其年當州畜産繁孳獲醍醐奉獻賴物百假又曰衛玄出為資州刺史以鎮撫之玄既到官時獠攻圍大牢鎮玄單騎造其營謂群獠曰我是刺史銜天子詔安養汝等勿驚懼也諸賊莫敢動於是說以利害渠帥感悅解兵而去前後歸附者十餘萬口高祖大悅賜縑二千匹又曰郭衍為瀛州刺史遇秋霖大水其屬縣多漂沒民皆上高樹依大冢衍親備船筏并齎糧拯救之民多獲濟衍先開倉賑恤後始聞奏上大善之又曰辛彥之拜隋州刺史于時州牧多貢珍玩唯彥之所貢並供祭之物高祖善之顧謂朝臣曰人安得無學彥之所貢稽古之力也又曰梁彥光為歧州刺史甚有惠政嘉禾連出於州境開皇二年上幸歧州悅其能乃下詔曰賞以勸善義兼訓物彥光操履平直識用凝遠布政歧下恩惠在人廉慎之譽聞於天下三載之後自當遷陟恐其匱乏且宜旌善可賜粟五百斛物三百假御傘一枚庶使有感朕心日增其美四海之內凡曰官人慕高山而仰止聞清風而自勵又曰梁彥光為相州刺史有塗陽人焦通性嗜酒事親禮闕為從弟所訟彥光弗之罪將至州學令觀於孔子廟于時廟中有韓伯瑜母杖不痛哀母力弱對母悲泣之像通遂感寤既悲且愧若無自容彥光訓諭而遣之後改過勵行卒為善士以德化人皆此類也又曰公孫景茂遷息州刺史法令清靜德化大行時屬平陳之後征人在路有疾病者景茂撤減俸祿為饘粥湯藥分賑濟之賴以全活者以千數上聞而嘉之詔宣告天下又曰薛胄為兗州刺史城東有沂泗二水合而南流泛濫大澤中胄遂積石堰之使決令西注陂澤盡為良田又通轉運利盡淮海百姓賴之號為薛公豐兗渠又曰梁毗出為西寧州刺史改封邯鄲縣侯在州十一年先是蠻夷酋長皆服金冠以金多者為豪俊由此遞相陵奪每尋干戈邊境略無寧歲毗患之後因諸酋長相率以金遺毗於是置金座側對之慟哭而謂之曰此物飢不可食寒不可衣汝等以此相滅不可勝數今將此來欲殺我耶一無所納悉以還之於是蠻夷感悟遂不相攻擊高祖聞而善之又曰趙煚為冀州刺史甚有威德煚常有疾百姓奔馳爭為祈禱其得民情如此冀州俗薄市井多姦詐煚為銅斗鐵尺置之於肆百姓便之上聞而嘉焉頒告天下以為常法又曰蔡王智積為同州刺史儀衛資送甚盛頃之以修謹聞高祖善之在州未嘗嬉戲遊獵聽政之暇端然讀書門無私謁有侍讀公孫尚儀山東儒士府佐楊君英蕭德言並有文學時延於座所設惟餅果酒才三酌家有女妓唯年節嘉慶奏於太妃之前其簡靜如此又曰公孫景茂為道州刺史悉以秩俸買牛犢雞豬散惠孤弱不自存者好單騎巡人家至戶入閲視百姓産業有循理者於都會時乃褒楊稱述如有過惡隨即訓導而不彰也由是人行義讓有無均通男子相助耕耘婦人相助紡績大村或數百戶皆如一家之務其後請致仕上優詔聽之仁壽中上明公楊紀出使河北見景茂神力不衰還以狀奏於是就拜淄州刺史賜以馬輿便道之官前後歷職皆有德政論者稱為良牧又曰梁彥光為相州刺史初齊亡後衣冠士人多遷關內唯伎巧啇販及樂戶之家移實州郭由是人情險詖妄起風謠訴訟官人萬端千變彥光欲革其弊乃用秩俸之物招致山東大儒每鄉立學非聖哲之書不得教授常以季月召集之親臨策試有勤學異等聰令有聞者升堂設饌其餘並座廊下有諍訟惰業無成者坐之庭中設以草具及大成當舉行賓貢之禮又於郊外祖道并以財物資之於是人皆剋勵風俗大改又曰韋世康尉遲回之作亂也高祖憂之謂世康曰汾絳舊是周齊分界因此亂皆恐生搖動今以委公善為吾守因授絳州刺史以雅望鎮之闔境清肅又曰豆盧績為渭州刺史甚有惠政華夷悅服德澤流行多致祥瑞鳥鼠山俗呼為高武隴其下渭水所出其山絶壁千尋由來乏水諸羌苦之績馬足所踐忽飛泉湧出有白烏翔止廳前乳子而後去又白狼見於襄武民為之謠曰我有丹陽山出玉漿濟我民夷神鳥來翔百姓因號其泉為玉漿泉
