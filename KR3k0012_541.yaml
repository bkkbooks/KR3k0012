body:
  text: 禮儀部十九冠儀禮曰士冠禮筮于廟門鄭玄注云筮者告於廟重成人之禮主人玄冠朝服緇帶素韠即位示門東西面筮人即席坐西面卦者在左卒筮書卦執以示主人筮人還東而疾占卒進告吉前期三日筮賓如求日之儀筮賓筮可使冠子者乃賓宿賓許厥明夕為期于廟門之外主人立于門東兄弟在其南擯者請期宰告曰質明行事夙興設洗陳服于房中西墉下爵弁服纁裳純衣緇帶韐皮弁服素積緇帶素韠玄裳黃裳雜裳緇帶爵韠緇布冠主人立于阼階下兄弟立于洗東將冠者出房南面贊者奠纚笄櫛于筵南端徹皮弁冠櫛筵入于房筵于戶西南面冠者就筵西拜受觶冠者奠觶于薦東筵北面坐取脯降自西適東壁北面見于母時母在闈門之內婦人入廟內闈門母拜受子拜送母又拜賓降直西序東面主人降復初位冠者立于西階東南面賓字之冠者對賓出主人送于廟門外請醴賓就次此醴當作禮禮賓者謝其自勤勞冠者見於兄弟兄弟再拜冠者荅拜入見姑姊如見其母如見母者亦北面姑姊不拜也不見妹妹卑也乃易服服玄冠玄端爵韠奠贄見于君遂以贄見于大夫鄉先生若孤子則父兄戒宿若庶子則冠于房外南面遂醮焉加始祝曰令月吉日始加元服棄爾幼志順爾成德壽考惟祺介爾景福再加曰吉月令辰乃申爾服敬爾威儀淑慎爾德眉壽萬年永受斯福三加曰以歲之正以月之令咸加爾服兄弟具在以成厥德黃耇無疆受天之慶醴辭曰甘醴惟厚嘉薦令芳拜受祭之以定爾祥承天之休壽考不忘醮辭曰旨酒既清嘉薦既時始加元服兄弟具來孝友時格永乃保之再醮曰旨酒既湒嘉薦伊脯乃中爾服禮儀有序祭此嘉爵承天之祐三醮曰旨酒令芳籩豆有楚咸加爾服肴升折俎承天之慶受福無疆字辭曰禮儀既備令月吉曰昭告爾字爰字孔嘉髦士攸宜宜之于嘏永受保之大戴禮逸禮曰太子既冠成人免於師傳則有司過之史有虧膳之宰太子有過史必書之禮記郊特牲曰始冠緇布之冠也大吉冠布齊則緇之嫡子冠於阼以著代也醮於客位加有成也三加彌尊喻其志也冠而字之敬其名也無大夫冠禮而有其婚禮古者十五而后爵何大夫冠禮之有諸侯之有冠禮也夏之未造言下初以上諸侯雖有幼而即位者猶以士禮冠五十而爵命又曰始冠緇布自諸侯下達冠而幣之可也本古耳非時王之法服也又曰曾子問曰將冠子冠者至揖讓而入聞齊襄大功之喪如之何冠者賓及贊者孔子曰內喪則廢外喪則冠而不醴徹饌而歸即位而哭如冠者未至則廢內喪同也不醴不醴子也其廢者喪成服因喪不冠如將冠子而未及期日而有齊衰大功小功之喪則因喪服而冠廢告禮而因喪冠俱成人之服及至也除喪不改冠乎孔子曰天子賜諸侯大夫冕弁服於太廟歸設奠服賜於斯乎有冠醮無冠醮酒為醮冠禮醴重而醮輕此服賜服酌用酒尊賜也不醴明不為改冠改冠當醴之父沒而冠則已冠掃地而祭於禰已祭而見伯父叔父而後饗冠者饗謂之禮又冠義曰冠而后服備服備而后容體正顏色齊辭令順言報未備者未可求以三始也童子之服采衣紒故曰冠者禮之始也是故古者聖王重冠古者冠禮筮賓所以敬冠事敬冠事所以重禮重禮所以為國本也國以禮為本故冠於阼以著代也醮於客位三加彌尊加有成也阼謂主人之北也適子冠於阼者不醮則醮用酒於客位敬而成之也戶西為客位庶子冠於房戶外又因醮焉不代父也冠者初加緇布冠次加受弁次棄次加爵弁每加益尊所以益成也又曰冠者禮之始也嘉事之重者也是故古者重冠故行之於廟行之於廟者所以尊重事尊重事而不敢擅重事不敢擅重事所以自卑而尊先祖也嘉事嘉禮也宗伯掌五禮有吉禮有凶禮有賓禮有軍禮有嘉禮而冠屬嘉禮周禮曰以昏冠之禮親成男女也左傳襄公曰晉侯以公宴于河上問公年季武子對曰會于沙隨之歲寡君以生晉侯曰十二年矣是謂一終一星終也國君十五而生子冠而生子禮也冠成人之服故冠而生子君可以冠矣大夫盍為冠具武子對曰君冠必以裸享之禮行之裸謂裸鬯酒也享祭先君以金石之樂節之以先君之祧處之今寡君在行未可具也請及兄弟之國而假備焉晉侯曰諾公還及衛冠于成公之廟假鍾罄焉禮也家語曰邾隱公既即位將冠使大夫因孟懿子問禮於孔子孔子曰其禮如世子之禮懿子曰天子未冠即位長亦冠乎孔子曰古者王世子之雖幼而即位則尊為人君尊為人君治為成人之事者也何冠之有懿子曰然然則諸侯之冠異天子與孔子曰君薨而世子主喪是亦冠也與人君無殊也懿子曰今邾君之冠非禮乎孔子曰諸侯之有冠禮也夏之末造也有自來矣今無譏焉又曰成王年十有二而嗣立明年六月冠成王而朝于祖廟以見諸侯周公命祝雍作頌曰祝王辭達而勿多也祝雍辭曰使王近於民遠於年嗇於時惠於財親賢而任能其頌曰令月吉日王始加元服去王幼志乃心兗職欽若昊天六合是式率爾祖考烝烝無極國語曰趙文子冠謂以士禮始冠也見韓獻子獻子曰戒之此謂成人成人在始與善始與善進不善蔑由至矣蔑無也始與不善進善亦蔑由至矣如草木之產也各以其物人之有冠猶宮室之有牆屋也冀除而已又何加焉糞除喻自脩潔漢書曰惠帝元年冠赦天下除挾書律又曰宣帝五鳳元年皇太子冠太后賜丞相以下帛赦徒作杜陵者續漢書曰安帝靈帝加元服並大赦賜公卿金帛東觀漢記曰馬防子鉅為常從小侯六年正月齊宮中上欲冠鉅夜拜為黃門郎御章臺下殿陳鼎俎自臨冠之晉書禮志曰江左諸帝將冠金石宿設百僚陪位豫於殿上鋪大床御府令奉冕幘簪導袞服以授侍中常侍太尉加幘太保加冕太尉跪讀祝文曰今月吉日始加元服皇帝穆穆思弘袞職欽若昊天六合是式率遵祖考永永無極眉壽惟祺介茲景福譙周喪服圖曰男子幼娶必冠女子幼嫁必笄禮之則從成人不為殤禮論曰王彪之以為禮冠自卜日不必以三元也又禮夏冠用葛屨冬冠用皮屨明無定時也後漢應亨贈四王冠詩曰永平四年外弟王景系兄弟四人並冠故貽之詩曰濟濟四令弟妙年踐二九今月惟吉日成服加元首雖無兕觥爵杯醮傳旨酒後漢黃香天子冠頌曰以三載之孟春建寅月之上旬皇帝將加玄冕簡甲子之元辰厥日王於太皞厥時叶於百神既臻廟而成禮乃廻軨而反宮正朝服以享宴撞太蔟之庭鍾祚蕃屏而鼎輔暨夷裔之君王咸進酌于金罍獻萬年之玉觴蕭子範冠子箴曰是月惟令敬擇良辰式遵士典諮筮于賓嘉賓受錫醮酒方陳禮莊爾質德成爾身梁沈約冠子祝文曰蠲茲令日元服肇加成德既學童心自化行之則至無謂道敗敦以秋實食以春華無恥下問乃致高車子孫千億廣樹厥家婚姻上易歸妹九四曰歸妹愆期遟歸有時夫以不正旡應而適人也必須彼道窮盡旡所與交然後乃可以往故愆期遟歸以待時也又咸卦曰咸亨利貞取女吉山澤以氣通男女以禮感男女初嫁之象所以為禮彖曰咸感也柔上而剛下二氣感應以相與止而說男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平万物感陽氣而生民感聖人之化而和悖政感天而生毛詩鵲巢何彼穠矣曰何彼穠矣美王姬也雖則王姬亦下嫁於諸侯猶執婦道以成肅雍之德也又國風曰谷風剌夫婦失道也衛人化其上淫於新婚而棄其舊室夫婦離絕國俗傷敗焉習習谷風以陰以雨僶俛同心不宜有怒德音莫違及爾同死又曰綢繆剌晉亂也國亂則婚姻不得其時焉不得其時謂不及中春之月又曰東門之楊剌時也婚姻失時男女多違親迎女猶有不至者也東門之楊其葉牂牂興也牂牂然盛貌言男女失時不速秋冬箋云楊葉牂牂三月中也興者言時晚也失仲春之月婚以為期明星煌煌期而不至也箋云親迎之禮以婚時女留他色不肯時行乃至大星煌煌也又曰有狐剌時也衛之男女失時喪其妃耦焉古者國有凶荒則殺禮而多婚會男女之無夫家者所以育人民也育生長也又小雅曰我行其野剌宣王也剌其不正嫁取之數而有荒政多淫婚之俗我行其野蔽芾其樗婚姻之故言就爾居樗惡木也箋云樗之蔽取芾始生謂仲春之時嫁取之月婦之父壻之父相謂婚姻言我也我乃以此二父之命故我就女居我豈其無禮來乎責之也我行其野言采其遂婚姻之故言就爾宿又文王大明曰贄仲氏任自被殷商來嫁于周曰嬪于京贄國任姓也贄國之中女也王季大王之子文王父也太任從殷商之畿內嫁為婦於周之京配王季共行仁義之德同志意也大戴禮逸禮曰子孫娶妻嫁女必擇孝悌世世有行義者是則其子孫慈悌孝愛不敢淫暴黨無不善三族輔之故鳳皇生而有仁義之意虎狼生而有貪戾之心嗚呼戒之哉無養乳虎將傷天下儀禮曰記士婚禮凡行事必用昏昕受諸一禰廟辭無不腆無辱摯不用死皮帛必可制腊必用鮮魚用鮒必殽全禮記曲禮上曰男女非有行媒不相知名見媒往來傳婚姻之言乃相知姓名非受幣不交不親故書日月以告君齋戒以告鬼神為酒食以召鄉黨寮友以厚其別也娶妻不娶同姓故買妾不知其姓則卜之又曲禮下曰納女於天子曰備百姓於國君曰備酒漿於大夫曰備灑掃納女猶致女也又曾子問曰孔子曰嫁女之家三夜不息燭思相離也親骨肉也娶婦之家三日不舉樂思嗣親也重世變也又郊特牲曰夫婚禮萬世之始也娶於異姓所以附遠厚別幣必誠辭無不腆誠信也腆猶善也告之以直信直正也二者所以殺婦正直也信事人也信婦德也一與之齊終身不改故夫死不嫁男子親迎男先於女剛柔之義也天先乎地君先乎臣其義一也執贄以相見敬章別也男女別然後父子親父子親然後義生義生然後禮作然後萬物安無別無義禽獸之道也壻親迎授綏親之也親之也者敬之也敬而親之先王之所以得天下也出乎大門而先男帥女女從男夫婦之義由此始婦人從人者也幼從父兄嫁從夫夫死從子又雜記下曰納幣一束束五兩兩五尋納幣謂婚禮納徵也十箇為束貴成數也兩者合其卷是謂五兩八尺曰尋則每卷二束也合之謂四十尺謂之疋由匹偶之云也又祭統曰國君娶夫人之辭曰請君之玉女與寡人共有幣邑事宗廟社稷此求助之本也又經解曰婚姻之禮廢則夫妻之道苦而淫僻之罪多矣又哀公問曰哀公問於孔子曰敢問為政如之何孔子對曰古之為政愛人為大所以治愛人禮為大所以治禮敬為大敬之至矣大婚為大大婚既至冕而親迎親之也公曰冕而親迎不已重乎已猶大也怪親迎乃服祭服也對曰合二姓之好以繼先聖之後以為天地宗廟社稷之主君何謂已重乎天地不合萬物不生大婚萬世之嗣也君何謂已重焉又婚禮曰婚禮者將合二姓之好上以事宗廟而下以繼後世也故君子重之是以婚禮納采問名納吉納吉納徵致禮幣為徵信也請期永請迎之言也皆主人筵几於廟而拜迎於門外入揖讓而升聽命於廟所以敬慎重正婚禮也父親醮子而命之迎男先於女也子丞命以迎主人筵几於廟而拜迎於門外壻執鴈而入揖讓升再拜奠鴈蓋親授之於父母也又外傳曰古者謂婚姻為兄弟因成兄弟之義也壻曰婚以昏時往婦曰姻因壻之來則從之而去又壻之父曰姻婦之父曰婚爾雅取其內外父黨之新者壻者陽也婦者陰也日往而陰氣至也昏時曰往則月來陽往陰來之義又曰夏殷五世之後則通婚姻周公制禮百世不通所以別禽獸也左傳文公上曰逆婦姜於齊卿不行非禮也又成下曰晉侯使呂相絕秦曰昔逮我先君獻公及穆公相好戮力同心申之以盟誓重之以婚姻天禍晉國文公如齊惠公如秦又晉侯使呂相絕秦曰白狄及君同州君之仇讎而我之婚姻也君來賜命曰吾與汝伐狄寡君不敢顧婚姻畏君之威而受命於吏又成下曰聲伯之母不聘不聘無媒禮穆姜曰吾不以妾為姒生聲伯而出之嫁於齊又定上曰楚昭王敗鍾建負季芉以逃王將嫁季芉辭曰所以為女子遠丈夫也鍾建負我矣以妻鍾建又哀上曰劉氏范氏世為婚姻劉氏周卿士范氏晉大夫
