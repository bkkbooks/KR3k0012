body:
  text: 兵部十六機略四後漢書曰曹公西征馬超與超夾關為軍公急持之而潛遣徐晃朱靈等夜度蒲坂津據河西為營公自潼關北度未濟超赴船急戰公放馬牛以餌賊賊亂取牛馬公得度循河為甬道而南賊退距渭口公乃多設疑兵潛以舟載兵入渭為浮橋夜分兵結營於渭南賊夜攻營伏兵擊破之又曰曹公與袁紹相持官渡曹公循河而西紹於是渡河追公軍至延津南公勒兵駐營南坂下使登壘視之曰可五六百騎有頃復白騎稍多步兵不勝數公曰勿復白乃令騎放馬解鞅是時白馬輜重就道諸將以為敵騎多不如還保營荀攸曰此所以餌敵也如何去之紹騎將文醜與劉備將五六千騎前後至諸將復白可上馬公曰未也有頃騎至稍多或分輜重公曰可矣乃皆上馬時騎不滿六百遂縱兵擊之大破又曰曹公既剋鄴袁尚熙遂奔遼東衆有數千初遼東太守公孫康恃遠不服曹公破烏丸或説公遂征之尚熙可擒公曰吾方使康斬送其首不煩兵矣公引兵還康果斬送尚熙傳其首諸將或問曰公還而康斬尚熙何也公曰彼素畏尚熙其急之則并力緩之則相圖其勢然也又曰曹公討鮮卑出盧龍塞外道絶不通乃塹山堙谷五百餘里經白檀歷剛平涉鮮卑庭東陷柳城未至二百里虜乃知之將數萬騎逆軍登白狼山卒與虜遇衆甚盛公登高觀虜陳不整縱兵擊之使張遼為先鋒虜大敗又曰黃巾賊起命將朱俊率兵討之賊帥韓忠據宛拒俊俊兵少不敵乃長圍結壘起土以臨城內因鳴鼓攻其西南賊悉衆赴之俊自將精卒五千掩其東北乘城而入忠乃退保小城惶懼乞降又曰曹公與袁紹相持官渡紹遣將郭圖淳于瓊顏良等攻東郡太守劉延於白馬紹引兵至黎陽將度河曹公北救延荀攸説曰今兵少不敵分其勢乃可公到延津若將度兵向其後紹必西應之然輕兵襲白馬掩其不備顏良可擒也公從之紹聞兵度即留分兵西應之乃引軍兼行趣白馬未至十餘里良大驚來逆戰使張遼關羽前登擊破斬良遂解白馬圍又曰曹公擊破馬超超走涼州關中平諸將或問曹公曰初賊守潼關渭北道缺不從河東擊馮翊而反守潼關引日而後北度何也公曰賊守潼關若吾入河東賊必引守諸津則西河未可度也吾欲盛兵向潼關賊悉衆南守西河之備虛故徐晃等得擅取西河然後引軍北度賊不能與吾爭西河者以有二將之軍也連車樹柵為甬道而南既為不可勝且以示弱度渭為堅壘虜至不出所以驕之也故賊不為營壘而求割地吾順偽言許之所以縱逸其意使自安而不為備因蓄士卒之力一朝擊之所謂疾雷不及掩耳兵之變化固非一道也又曰蜀將關羽圍曹公將曹仁於樊又圍將軍呂布於襄陽曹公遣將徐晃救仁以羽難與爭鋒遂前至偃城晃詭道作都塹示欲截其後賊燒屯走晃得偃城兩面連營稍前去賊圍三丈所未攻賊圍頭有屯又別屯四冢晃揚聲當攻圍頭屯而密攻四冢羽見四冢欲壞自將步兵五千出戰晃擊之退走遂追蹈與俱入圍破之或自投沔水死曹公令曰賊圍塹鹿角十重將軍致戰勝今陷賊圍多斬首虜吾用兵三十餘年及所聞古之善用兵未有長驅徑入敵圍者又曰曹公征關中進軍度渭馬超及韓遂數請戰不許因請割地公用賈詡計偽許之韓遂請與公相見公與遂交馬語移時不及軍事但説京都故舊拊手歡笑既罷超等問遂公何言遂曰無所言也超等疑之他日公又與遂書多所點竄如遂改定者超等愈疑遂公乃與剋日會戰先以輕兵挑之戰良久乃縱驍騎夾擊大破之遂超走涼州魏志曰司馬宣王征公孫文懿次于遼水文懿遣將軍畢衍楊祚等步騎數萬阻遼隧以距之圍塹二十餘里宣王令其軍穿圍盛兵多張旗幟出其東南賊盡鋭赴之乃沉舟潛濟急於東北斜趣之襄平衍等恐襄平無守夜遁又曰郭淮討叛羌師其羌師屯河關白土故城據河拒官軍淮見形上流密於下度兵據白土故城擊大破之又曰李典與程昱等以船運軍糧會袁尚遣將高藩將兵屯河上絶水道典與諸將議曰藩軍少甲而恃水有懈怠之心擊之必剋宜亟擊之昱為然遂北渡河攻藩破之水道得通又曰司馬宣王征公孫文懿沉舟潛濟遼水作長圍忽棄賊而向襄平諸將言曰不攻賊而作圍非所以示衆也宣王曰賊堅營高壘欲以老吾兵也攻之正入其計此王邑所以恥過昆陽也古人云敵雖高壘不得不與我戰者攻其所必救也賊大衆在此則賊窟虛矣我直指襄平必懷內懼懼而求戰破之必矣遂整陳而過賊見兵出其後果邀之宣王謂諸將曰所以不攻其營正欲致此不可失也乃縱兵逆擊大破之三戰皆捷又曰田豫字國讓率擊鮮卑軻比能單將鋭卒深入虜庭胡人衆多鈔軍前後斷截歸路國讓乃進軍去虜十餘里結屯營多聚牛馬糞燃之從他道引去胡見煙火不絶以為尚在去行數十里乃知之又曰諸葛誕文欽反據壽春司馬景王揔兵討之謂諸將曰彼當突圍決一朝之命或謂大軍不能久省食減口冀有他變料賊之情不出此二者今當多方以亂之備其越逸此勝計也因命合圍分遣羸疾就穀淮北廩軍士大豆人三勝欽聞之果喜景王愈羸形以示之多縱反間揚言吳救方至誕等益寬恣食俄而城中乏糧諸將並請攻之景王曰誕聚糧完守外結吳人自謂足據淮南必不便走今若急之損遊軍之力外寇卒至表裏受敵此危道也且堅守三面若賊陸道而來軍糧必少吾以遊兵輕騎絶其轉輸可不戰而破外賊欽等必為擒矣誕欽等出攻長圍諸軍逆擊走之初誕欽內不相協乃至窮蹙轉相疑二誕殺欽子鴦踰城以為將軍封侯使巡城而呼景王見城上持弓者不發因令攻而拔之又曰諸葛誕據壽春反命將王基討之吳遣朱異來救誕於安城詔王基引諸軍轉據北山基謂諸將曰今圍壘轉固兵馬向集但當精修守備以待越逸而列移兵守險使得放縱雖有智者不能善其後矣遂守便宜上疏曰今與賊交利對敵當不動如山若遷移依險人心搖蕩於勢大損諸軍並據深溝高壘衆心皆定不可傾動此御兵之要地也書奏報聽之壽春竟破司馬文王與基書曰初議者云云求移者甚衆時未臨履亦謂宜然將軍深笇利害獨秉固志上違詔命下距衆議終至制敵擒寇雖古人所述不足過也又曰郭淮在漢中蜀主劉備欲度漢水來攻諸將議衆寡不敵依水為陳以距之淮曰此示弱而不足挫敵非算也不如遠水為陳引而致之半濟而後擊備可破也既陳備疑不敢度通典曰蜀主悟之不敢又曰文帝初北狄強盛侵擾邊塞乃使田豫持節護烏丸校尉時鮮卑數十部比能彌如素利等割地統御各有分界乃共要盟不得以馬與中國市豫以戎狄為一非中國之利乃先搆離之使自為讎敵牙相攻伐素利違盟出馬千匹與官為比能所擊求救於豫豫深入虜廷胡圍豫於馬邑城十重豫密使司馬建旌旗鳴鼓吹從南門出胡人皆往赴之豫將精鋭自北門出鼓譟而赴兩頭俱發出虜不意虜衆亂棄馬步走追討二十餘里僵尸蔽地胡人破膽威振沙漠又曰諸葛亮出斜谷司馬宣王屯北原亮盛兵西行諸將皆欲攻西圍郭淮獨以為此見形於西欲使官兵重應之必攻陽遂耳其夜果攻陽遂有備不得上吳志曰曹公入荊州劉備為曹公所破與魯肅遇於當陽遂共圖計遣諸葛亮詣孫權權遣周瑜程普與備并力逆曹公遇於赤壁瑜部將黃蓋曰今寇衆我寡難與持久觀操船艦相接可燒而走也乃取蒙衝數十實以薪草上建牙旗蓋乃先報書欺以欲降曹公軍延頸指言蓋降蓋收諸船同時發火時風盛猛悉延燒岸上營落頃之熛炎張天人馬燒溺死者甚衆軍遂敗退又曰周瑜使甘寧據夷陵魏將曹仁圍寧呂蒙往救之仍分遣三百人柴斷嶮道賊走可得其馬軍到夷陵即日交戰所殺過半敵夜遁去行過此道騎皆捨馬步走蒙兵追蹙獲馬三百匹方船載還又曰賀齊討黟歙賊帥黟音伊凡切歙音攝陳僕祖山等二萬戶屯歷林山四面壁立高數十丈徑路危狹下容方楯賊臨高下石不可得攻軍住經日將吏患之齊身出周行觀視形便陰募輕捷士為作鐵戈密於隱嶮賊所不備處以戈柘山為緣道道成夜令潛上乃多懸布以受不人得上百數十人四面流布俱鳴鼓角齊勒兵待之賊夜聞鼓聲四合謂大軍悉已得上驚懼惑亂不知所為守路備險者皆走還依衆大軍因是得上其中有善禁術吳師刀劍不得拔弓弩射矢皆還自向輒致不利齊曰吾聞之雄黃勝五兵還丹能威敵夫金有刃蟲有毒者皆可禁之以無刃之兵不毒之蟲彼必無能為也遂伐木為棓列陳四面羅布俱鳴鼓角勒兵待𥌓賊惶遽無依禁術不效遂大破而降之蜀志曰諸葛孔明率衆定南夷擒夷師孟獲七縱七擒獲曰公天威也南人不復反矣揚雄蜀王記云秦王石牛置金於後蜀人以為牛便金蜀王發卒開道令五丁拖牛置成都蜀道乃通
