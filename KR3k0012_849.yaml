body:
  text: 飲食部六食中王隱晉書曰何曾食日近萬錢猶曰無下箸處子劭驕奢簡貴有父風衣裘服玩新故巨積食必盡四方珍異一日之供以二萬為限時論以為太常御膳無以加之又曰皇甫謐姑子梁柳為城陽太守或勸謐送謐曰柳為布衣過吾送迎不出門食不過鹽菜貧不以酒肉為禮也今作郡而送豈古人之道哉晉書曰王導子悅疾篤導憂念特至不食積日忽見一人形狀甚偉被甲持刀導問君是何人曰僕是蔣侯也公兒不佳欲為請命故來耳公勿復憂因求食遂噉數斗食畢勃然謂導曰中書患非可救者言訖不見悅亦殞絶又曰衛將軍謝安欲詣陸納納兄子俶怪納無辦乃密作數十人饌安至納設菜果而俶下精飲食納怒客去杖俶四十又曰郤鑒字道徵永嘉亂在鄉里窮餒鄉人以鑒名德傳共餉之時兄子邁外生周翼並小常攜之就食鄉人曰恐不兼有所存鑒乃獨往食訖飯著兩頰邊含還與二兒後並得存同過江邁位至護軍翼為剡令鑒薨追撫育之恩解職而歸席苫心喪三年又曰庾袞父亡作莒賣以養母母見其勤曰我無所食對曰母食不甘袞將何居母感而安之宋書曰謝景仁為桓玄驍騎將軍時宋武帝為桓循撫事軍中兵參軍嘗詣景仁咨事景仁與語悅因留帝食食未辨而景仁為玄所召玄纍促俄頃間騎詔績至帝屢求去景仁不許曰主上見待要應有方我欲與客食豈不得待竟安飽食然後應召帝甚感之又曰謝景仁愛弟甝音酣而憎弟述嘗設饌請宋武帝希帝命甝豫坐而帝召述述知非景仁夙意又慮非帝命之請急不從帝馳遣呼述須至乃餐其見重如此及景仁疾述盡心視湯藥飲食必嘗而後進衣不解帶不盥櫛者纍旬景仁深感愧焉又曰劉穆之少時家貧誕節嗜酒食不修拘撿好往妻兄弟乞食多見辱不以為恥其妻江嗣女甚明識每禁不令往江氏後有慶會囑勿來穆之猶往食畢求檳榔江氏兄弟戲之曰檳榔消食君乃常飢何忽須此妻復截髮市肴饌為其兄弟以餉穆之自此不對穆之梳沐後穆之官達而性更奢豪食必方丈且輒為十人饌未嘗獨餐每至食時客止十人已還帳下依常下食以此為常常白帝曰穆之家本貧賤贍生多闕叨忝已來雖每存約損而朝夕所須微為過豐此外無一毫負公又曰王仲德與兄睿同起義兵與慕容垂戰敗仲德被重創走與家屬相失路經大澤困未能去臥林中有一小兒青衣年可七八歲騎牛行見仲德驚曰漢已食未仲德言飢小兒去須臾復來得飯與之食又曰廬陵王義真居武帝憂使帳下備膳劉湛禁之義真乃使左右人買魚肉珍羞於齊內別立廚帳會湛入因命暖酒炙車螯湛正色曰公當今日不宜有此設義真曰寒甚杯酒亦何傷長史事同一家望不為異酒至湛起曰既不能以禮自處又不能以禮處人又曰江夏王義恭幼為武帝特所鍾愛帝性儉諸子飲食不過五盞盤義恭須求果食日中無算得未嘗噉悉以與傍人諸王未嘗敢求求亦不得又曰文帝宴於武帳堂上將行勑諸子且勿食至會所賜饌日旰食不至有飢色上誡之曰汝曹少長豐佚不見百姓艱難今使爾識飢苦又曰文帝以謝弘微能膳羞每就求食弘微與親舊經營乃進之後親人問上所御弘微不答別以餘語酬之時人比之漢世孔光又曰謝弘微兄曜卒弘微哀戚過禮服雖除猶不噉魚肉沙門釋惠琳嘗與之食見其猶蔬素謂曰檀越素既多疾即吉猶未復膳若以無益傷生豈所望於得理弘微曰衣冠之變禮不可踰在心之哀實未能已遂廢食歔欷不自勝又曰前廢帝常以木槽盛飯內諸雜食攪令和合掘地為坑穽實之以泥水以糟食置前令以口就槽中食之用為歡笑又曰宗愨纍遷豫州刺史監五州諸軍事先是鄉人庾業家富豪侈侯服玉食與賓客相對膳必方丈而為愨設粟飯菜俎謂客曰宗上軍串古患切噉粗食愨致飽而退初無異辭至是業為愨長史帶梁郡愨待之甚厚不以昔事為嫌又曰沈攸之戰敗與第二子文和至華容之魽頭村投州吏家此吏嘗為攸之所鞭待攸之甚厚不以往罰為怨殺豚薦食既而村人欲取攸之於櫟林與文和俱自經死又曰袁愍孫為吏部郎孝建元年文帝詔曰群臣並於中興寺八關齊中食竟愍孫別與黃門郎張淹更進魚肉食尚書令何尚之奉法素謹密以白孝武孝武使御史中丞王謙之糾奏並免官又曰阮佃夫奢侈中書舍人劉休嘗詣之遇佃夫出行中路相逢要休同返就席便命施設一時珍肴莫不畢備凡諸火齊並皆始熟肴胾數十種佃夫常作數十人饌以待賓客故造次便辦類皆如此雖晉世王石不能過也又曰郭原平養親必以己力傭賃以給供養主人設食原平以家貧父母不辦有肴味唯餐鹽飯而已若家或無食則虛中竟日義不獨飽須日暮作畢受直歸家於里糴買然後舉爨齊書曰陳顯達高帝即位拜護將軍後御膳不宰牲顯達上熊蒸一盤上即以充飯又曰武帝收沙門寶志在獄中語獄吏曰門外有兩輿食金鉢盛飯汝可取之果是文惠太子及竟陵王子良所供養又曰王儉嘗詣武陵王曄曄留儉設食盤中菘菜鮑魚而已儉重其率直為飽食盡歡而去又曰周顒隱居鍾山衛將軍王儉謂顒曰卿山中何所食顒曰赤米白鹽緑葵紫蓼文惠太子問顒菜食何味最勝顒曰春初早韭秋末晚菘又曰張緒口不言利有財輒散之清談端坐或竟日無食門生見緒飢為之辦食然未嘗求也梁書曰沈顗逢齊末兵荒與家人并日而食或有饋其梁肉者閉門不受唯採蓴荇根供食以樵採自資怡怡然恆不改其樂又曰孔休源到都寓於宗人少府孔登會以祠事入廟侍中范雲一與相遇深加褒賞曰不期忽覲清風頓祛鄙吝觀天披霧驗之今日後雲命駕到少府登便拂筵整席謂當詣己備水陸之品雲駐筋命休源及至取其常膳正有赤倉米飯蒸𩸆音醃魚雲食休源食不嘗主人之饌高談盡日同載還家登深以為愧又曰臨川王蕭宏所幸江無敵服玩侔於齊東昏潘妃寶屧音燮直千萬好食鰿音鯽魚頭常日進三百他珍膳盈溢後房食之不盡棄諸道路又曰何遠為武昌太守江左水族甚賤遠每食不過乾魚數片而已又曰何裔侈於味食必方丈後稍去其甚者猶食白魚鱔脯糖蟹以為非見生物疑食蚶蠣使門人議之學生鍾玩曰鱔之就脯但驟於屈申蟹之將糖躁擾彌甚仁人用意深懷如怛至於車螯蚶蠣眉目內闕慚渾沌之寄獷殼外緘非金人之慎不悴不榮曾草木之不若無香無臭與瓦礫其何算故宜長充庖廚永為口實陳書曰徐孝克為國子祭酒每侍宴無所食噉至席散當其前膳羞損減帝密記以問中書舍人管斌斌自是伺之見孝克取珍果內紳帶中斌當時莫識其意後尋訪方知其以遺母斌以啓宣帝嗟嘆良久乃勑自今宴享孝克前饌並遣將還以餉其母時論美之崔鴻後趙録曰石虎召姚弋仲弋仲輕騎至鄴引入領軍省賜以御食仲怒曰國家有賊召我擊之官當見我問方略以破賊而食我我來覓食耶乃引見又後燕録曰王鳳字道翔宜都王桓之子也桓好修宮室鳳年八歲左右抱之隨桓周行殿觀桓問之曰此第好不鳳笑曰此本石家諸王故第今王修之室無常人何須過好桓大奇之每食必與之同案鳳辭曰今王之膳兼肴百品而外有糟粳之民非是小兒所可同大王之味也桓彌加歎賞又南燕録曰濟南尹鸞身長九尺腰帶十圍貫甲跨馬不據鞍由蹬慕容德見而奇其魁偉賜之以食一進斛餘德驚曰所噉如此非耕能飽且才貌不凡堪為貴人可以一縣試之於是拜逢陵長政理修明大收民譽燕書曰少帝建熙六年上谷人公孫几久隱昌黎之域冬衣單布寢土床上夏則併餐茹於一器停使蛆臭然後乃食人咸異之莫能測也後魏書曰裴安祖年八九歲就師講詩至鹿鳴篇語諸兄云鹿得食相呼而況人乎自此未曾獨食又曰高閭嘗造胡叟家遇叟短褐曳柴從田歸舍為閭設酒食皆自手辨索其館宇卑陋園疇褊局而飯菜精潔醢醬調羹見其妾並衰跛眇衣布穿斃閭見其貧以衣物直十餘匹贈之亦無辭愧又曰盧彪為太子詹事魏收常來詣之訪以洛京舊事不待食而起云難為子費叔彪留之良久食至但有粟餐葵菜木碗盛之片脯而已所待僕從亦盡設食一與己同又曰楊愔幼時為季父暐大嗟異顧謂賓客曰此兒恬裕有我家風宅內有茂竹遂為愔於林邊別葺一室命獨處其中常同盤具盛饌以飯之因以督勵諸子曰汝輩但如遵彥謹慎自得竹林別室同盤重肉之食後椿誡子孫曰吾兄弟若在家必同盤而食若有近行不至必待其還亦有過中不食忍飢相待吾兄弟八人今存者有三是故不忍別食也又願畢吾兄弟不異居異財汝等眼見非為虛假如聞汝等兄弟時有別齋獨食此人又不如吾等一世也又曰元欽曾託青州人高僧壽為子求師師至未幾逃去欽以讓僧壽僧壽性滑稽乃謂欽曰凡人絶粒七日乃死始終五朝便爾逃遁去食就信實有所闕欽乃大慚於是待客稍厚又曰崔敬友恭寬接下循身勵節自景明已降頻歲不登飢寒請丐者取足而去又置逆旅於蕭然山南大路之北設食以供行者又曰刁少雍字季仲少聰頴有孝行尤為祖父紹先所愛紹先性嗜羊肝常呼少雍共食及紹先卒少雍終身不食肝北齊書曰崔瞻在御史臺恆於宅中送食備盡珍羞別室獨餐處之自若有一河東人士姓裴亦為御史伺瞻便往造焉瞻不與交言又不命匕筋裴坐觀瞻食罷而退明日裴自攜匕筋恣情飲噉瞻方謂裴云我初不喚君食亦不共君語君遂能不拘小節昔劉毅在京口冒請鵝炙豈亦異於是乎君定名士於是每與之同食又曰趙郡王睿十歲喪母高祖親送睿至領軍府發喪舉聲殞絶哀感左右三日水漿不入口高祖與武明婁皇后殷勤敦譬方漸順旨由是高祖食必喚睿同案其見愍惜如此又曰文宣昏逸常山王演固諫大被歐撻閉口不食太后極憂之常謂左右曰儻小兒死奈我老母何於是每問王疾謂曰努力強食當以王晞還汝乃釋晞令往王抱晞曰吾氣息惙然恐不能相見晞流涕曰天道神明豈令殿下遂斃此舍至尊親為人兄尊為人主安可與計殿下不食太后亦不食殿下縱不自惜不惜太后乎言未卒王強坐而飯晞由是得免遂還為王友又曰楊休之除中山太守先是韋道建宋欽道代為定州長史帶中山太守並立制禮之官出行不得過百姓飲食有者即數錢酬之休之常以為非及至郡復相因循或問其故休之曰吾昔非之者為其失仁義今日行之者自欲避嫌疑豈是夙心直是處世難耳後周書曰柳虬脫略人間不拘小節弊衣疏食未嘗改操人或譏之虬曰衣不過適體食不過充飢孜孜營求徒勞思慮耳又曰長孫澄雅好賓客接引忘疲雖不飲酒而好觀人酣興常恐座客請歸每勤中廚別進異饌留之隋書曰田翼不知何許人也性至孝養母以孝聞其母臥疾歲餘翼親易燥濕母食則食母不食則不食唐書曰高祖師次于古堆去綘郡二十餘里有紫雲如華蓋樓闕之形正臨高祖之上時隋綘郡通守陳叔達堅守不下高祖謂廚人曰吾明日下城然後朝膳辛卯引兵攻城自旦及辰而破高祖乃食又曰太宗謂侍臣曰夫仁義之道當思之在心常令相繼若斯須懈怠則去之已遠猶如飲食資身恆令腹飽乃可存其性命又曰高宗朝諸宰臣以政事堂供饌珍美議減其料東臺侍郎張文瓘曰此食天子所以重機務待賢才也吾輩若不任其職當自陳乞以避賢路不可減削公膳以邀求名譽也國家之所費不在此茍有益於公道斯亦不為多也衆乃止又曰高宗朝文武官獻食賀破高麗上御玄武門之觀德殿奏九部樂極歡而罷又曰高宗朝皇太子久在內不出稀與官臣接見典膳丞邢文偉減膳上啓曰竊見大戴記曰太子既冠成人免保傅之嚴則有司過之史虧膳之宰史之義不得書過不書則死之宰之義不得撤膳不撤則死之近者已來未甚延納談議不接謁見尚稀三朝之後但與內人獨居何由發揮聖智使睿哲文明者乎今史雖闕官宰當奉職黍備所司不敢逃死謹守禮經遽申減膳其年右史員闕宰臣進擬數人上曰文偉嫌我兒不讀書不肯與肉喫此人甚正直可用為右史遂拜焉又曰盧懷慎為黃門監兼吏部尚書臥病既久宋璟盧從願常相與訪焉懷慎臥於斃簀單席門無簾箔每風雨至即以席蔽焉常器重璟及從願見之甚喜留連永日命設食有蒸豆兩甌菜數俎而已此外修然無辨又曰韋陟性尚奢侈於饌羞尤為精潔植穀麥仍以鳥羽擇米每食畢視廚中所委棄不啻萬錢之直又曰裴冕性本侈靡尚車服及營珍膳每會賓客有昧於品味之名者又曰順宗時宰臣鄭珣瑜韋執誼方與諸宰相會食於中書故事丞相方食百寮無敢通見者王叔文是日至中書欲與執誼計事令直省通執誼直省以舊事告叔文叔文怒叱直省直省懼入白執誼執誼逡巡慚赧竟起迎叔文就其閣語良久宰相杜佑高郢珣瑜皆停箸以待報者云叔文索飯韋相公已與之同食閣中矣佑郢等心知其不可畏懼叔文莫敢出言珣瑜獨歎曰吾豈可復處此乎顧左右取馬徑歸遂不起又曰永泰中軍容使魚朝恩加內侍監判國子監事丁未詔魚朝恩赴國子監視事將令宰相大臣及常參并六軍將軍於國子監送上仍令京兆府造食出教坊樂以寵之是日文武大臣已下子弟二百餘人皆以本官備章服充附學生列於學館廊下待詔給錢一萬貫充食本以為附學生廚食之資朝恩自是數詣國學從者常數百人京兆率錢以備膳羞一費或至數十萬又曰楊炎與門下侍郎盧杞同執大政杞形神詭陋夙為人所褻而炎器岸高峻罕防細故方病飲膳無節或為糜飧別食閣中每登堂會食辭不能偶讒者乘之謂杞曰楊公鄙不欲同食杞銜之又曰常袞為相將固讓堂廚同列以為不可而止議者以為厚祿重賜所以優賢崇國政也不能當辭位不宜辭祿食
