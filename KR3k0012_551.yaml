body:
  text: 禮儀部二十九殮周禮春官大宗伯曰大宗伯王崩及執事涖大斂小斂帥異族而佐執事太祝之屬也又周禮春官司服曰大喪共其斂衣服禮記檀弓上曰康子之母死陳褻衣非上服也陳之將斂也敬妾曰婦人不飾不敢見舅姑將有四方之賓來褻衣何為陳於斯命撤之又喪大記曰小斂於戶內大斂於阼階君以簟席大夫以蒲席士以葦席小斂君錦衾大夫縞衾士緇衾皆一衣十有九稱大斂布襟二衾君大夫士一也簟細葦席也三者下皆有莞衣十有九稱法天地之終數也二衾者或覆之或薦之也又曾子問曰下殤士周葬于園遂輿機而往途邇故也土周聖周以夏后之聖周葬下殤於園中以其未成人遠不就墓也機舉尸之床也繩絙其中央又以繩從旁釣之禮以機舉尸輿之以就國而斂葬焉途近故耳輿機或為餘機今墓遠則其葬也如之何今人斂下殤於宮中而葬之於墓與成人同墓途乃遠其葬當輿其棺乎載之也問禮之變孔子曰吾聞諸老聃曰昔使佚有子而死下殤也墓遠蓋欲葬之墓如長殤從成人也長殤有送葬車者則棺載之矣史佚武王時史賢猶有所不知召公謂之曰何以不棺斂於宮中欲其斂於宮中如成人也斂於宮中則葬當載之也史佚曰吾敢哉畏知禮也召公言於周公為史佚問周公曰豈不可言是豈於禮可不許也史佚行之佚失於以為許也遂用召公之宮言也下殤用棺衣棺自史佚始也棺謂斂於棺也又問喪曰或問曰死三日而后斂者何也怪其遲也曰孝子親死悲哀志悶故匍匐而哭之若將復生然安可得奪而斂之故曰三日而后斂者以俟其生也三日而不生亦不生矣孝子之心亦益襄矣家室之計衣服之具亦可以成矣親戚之遠者亦可以至矣是故聖人為之斷決以三日為之禮制也左傳僖下曰許穆公卒于師葬之以侯禮也男而以侯禮加一等凡諸侯薨於朝會加一等死王事加二等於是有以袞斂又襄公曰魯季文子卒大夫入斂公在位宰庀家器為葬備無衣帛之妾無食粟之馬無藏金玉無重器備君子是以知季文子之忠於公室也相三君矣而無私積可不謂忠乎又定上曰季平子行東野東野季氏邑還未至丙申卒于房陽虎將以璵璠斂璵璠美玉君所佩忡梁懷弗與懷亦季氏家臣曰改步改玉昭公之出季孫行君事佩璵璠祭宗廟今定公立復臣位改君步則亦當去璵璠陽虎欲逐之告公山不狃不狃曰彼為君也子何怨焉家語曰季平子卒將以君之璵璠斂孔子初為中都宰聞之歷級而救歷登階不聚足曰送死人而以寶玉猶曝尸於中原示民以姦利之端後漢書戴封年十五詣大學時同學石敬平溫病卒封養視殯殮以所齎糧市小棺送喪到家更殮見敬平生時書物皆在棺中乃異之吳志曰張昭卒遺令幅巾素棺斂以時服孫權素服臨弔又曰諸葛瑾年六十八卒遺令素棺斂以時服事從約省晉書曰安平王孚臨終遺令曰有魏貞士河內溫司馬孚字叔達不伊不周不夷不惠立身行道終始若一當以素棺單槨斂以時服南史曰王奐為雍州剌史被誅舊人無敢至者汝南許明達為奐參軍躬為殯殮經理甚厚當時高其節梁書曰王志天監初為丹陽尹為政清靜都下有寡婦無子姑亡舉債以斂葬既而無以還之志愍其義以俸償馬陳書曰周弘直卒遺疏氣絶之後便買市中見材小形者斂以時服古人通制但見先人必須備禮可著單衣裙衫故履既應侍養宜備紛悅或逢善友又須香煙棺內唯安白布手巾粗香爐而已此外無所用釋名曰衣尸棺曰斂藏不復也風俗通曰禮天子斂以梓器宮者存時所居緣生事亡因以為名凡人呼棺亦為宮也宋韜遺教曰吾死斂以時服不得造新白祫單衣柩禮記曲禮下曰在棺曰柩柩之言究又檀弓下曰君遇柩於路必使人弔之又曰襄公朝于荊唐王卒在魯襄公二十八年康王楚子昭也荊人曰必請襲欲使襄公衣之魯人曰非禮也荊人強之巫先拂柩荊人悔之巫祝桃茢君臨臣喪之禮記統曰柩之言也具書其諡置棺旁萬世久藏也釋名曰柩究也送隨身之制皆究備也漢書曰薛宣守左馮翊多仁恕池陽令舉廉吏獄椽王立於府未及有聞立受囚家錢宣責讓縣縣案驗獄椽乃其妻受繫者錢萬六千受之而椽實不知椽慚恐自殺宣聞之移書池陽曰縣所舉廉吏獄椽王立家私受財而立不知殺身以自明立誠廉士甚可閔惜其以府決曹椽書立之柩以顯其魂東觀漢記曰廉范字叔度京兆人也父客死蜀范乃出負喪歸至葭萌船觸石破沒范持棺柩遂俱沈溺衆傷其義鉤求得之僅免於死晉書曰東海王越薨葬東海石勒追及於莒縣寧平城將軍錢端出兵拒勒戰死軍潰勒命焚越柩曰此人亂天下吾為天下報之故燒其骨以告天地蕭子顯齊書曰傳琰字季圭北地靈州人也美姿儀為尚書左民郎遭喪居南岸鄰家失火燒屋抱柩不動殯禮記曲禮上曰里有殯不巷歌助哀也又檀弓上曰孔子少孤不知其墓孔子之父鄒邑叔梁紇與顏氏之女徵在野合生孔子徵在恥恥而不告也殯於五父之衢欲有所就而問之孔子亦為隱焉殯於家則知者無由怪尺欲發問端五父之衢二名也蓋曼父之鄰人之見之者皆以為葬也見相行於路也其慎也蓋殯也慎當為引禮家讀然聲之誤也殯引飾引飾棺以輤葬引飾棺以翣柳孔子是以殯引不以葬引時人見者謂不知禮又檀弓上曰天子之殯也攢塗龍輴以槨攢木以周龍輴猶如槨而塗之天子殯以輴車畫轅以龍加斧于槨上畢塗屋斧謂之黼白黑文也以剌繡於縿幕加槨以覆棺已乃屋其上盡塗之矣天子之禮也又檀弓下曰惟殯非古也自敬薑之哭穆伯始也穆伯魯大夫秀悼子之子公甫靖叔敬薑穆伯妻文伯歜之母也禮朝多哭不惟又王制曰天子七日而殯七月而葬諸侯五日而殯五月而葬大夫士庶人三日而殯三月而葬尊者舒卑者速也春秋傳曰天子七月而葬同畢至諸侯五月同盟至大夫三月同位至士踰月外姻至也又喪大記曰君殯用輴攢至于上畢塗屋大夫殯以幬攢置于西序塗不暨于棺士殯見椎塗上帷之欑猶叢也屋殯上覆如屋也幬覆也暨及也天子之殯居棺以龍輴欑木題湊象槨上四注如屋以覆之諸侯輴不畫龍欑不題湊象槨其他亦如大夫之殯廢輴置棺墉下就欑三面塗之不及棺者欑中狹小裁取客棺然則天子諸侯差寬大夫矣士不欑掘地下棺見小要耳帷之者鬼神幽暗士達乎天子皆然或作槨也又坊記曰子云賓禮每進以讓喪禮每加以遠浴於中霤飯於牖下小斂於戶內大斂於阼階殯於客位祖於庭葬於墓所以示遠也遠之所以崇敬左傳僖下曰晉文公卒庚辰將殯于曲沃殯窆棺也曲沃有舊宮焉出絳柩有聲如牛如牛詬聲卜偃使大夫拜曰君命大事將有西師過軼我擊之必大捷焉聲自柩出故曰君命大事戎事也偃聞奏密謀故因柩聲以正衆心論語鄉黨曰朋友死無所歸曰於我殯重朋友恩也無所殯無親後也續漢書曰和帝追封諡皇太后父梁竦為褒親愍侯殯賜東園棺玉匣衣衾范曄後漢書曰蔡順喪母停柩未殯東鄰失火燒順屋柩不可移乃伏柩上火乃越燒他舍餘見孝部宋書曰竟陵王誕據廣陵為逆事平蔡興宗奉旨慰勞廣陵別駕范義與興宗素善在城內同誅興宗至躬自收殯致喪還豫章舊墓上聞謂曰卿何敢故爾觸網興宗抗言答曰陛下自殺賊臣自葬周旋既犯嚴制正當甘於斧鉞耳唐書曰嚴郢以舊怨與盧𣏌陷楊炎趙惠伯構成其罪貶炎於崖州惠伯於費州郢既報怨過當人頗不直郢後得罪至費州道左有柩殯問其主名或曰趙惠伯之殯也郢默然慚恧歲餘而卒穆天子傳曰天子乃殯盛姬于穀兵之廟先王之廟有此者漢氏亦所在有廟也白虎通曰天子舟車殯為水火也故棺在車在舟中臣子更執紼晝夜千二百人紼所以牽持棺者也釋名曰於西壁下塗之曰殯殯賓也賓遇之言稍遠子思子曰殯賓也賵禮記雜記曰介賵執圭將命曰寡君使某賵相者入告反命曰孤某須矣陳乘黃大路於中庭北圭將命客使自下由路西子拜稽顙坐委于殯東南隅宰舉以東輈轅也自率也下謂馬在路之下覲禮曰路不四亞之客給者入設乘黃於大路之西客入則致命矣左傳隱公曰天王使宰咺來歸惠公仲子之賵緩且子氏未薨故名惠公葬在春秋前故曰緩也子氏仲子也葬薨在二年賵助喪之物贈死不及尸尸未葬之通稱弔生不及哀諸侯曰上既葬則衰麻除無哭位諒暗終喪豫凶事非禮也仲子在而求贈故曰豫凶事穀梁傳隱公曰乘馬曰賵公羊傳隱公曰車馬曰賵春秋説題辭曰知生則賻知死則賵賻之為言助也賵之為言覆也輿馬曰賵貨財曰賻玩好曰贈決其意也衣被曰禭養死具也贈稱也禭遺也賻周禮天官曰小宰凡邦之弔事掌其戒令與其弊器財用凡所共者弔事弔諸侯臣弊所用贈也器所致明器也凡喪始無弔而含隧葬而賵贈其間加恩厚則有賻焉禮記曲禮下曰弔喪不能賻不問其所費又檀弓上曰孔子之衛遇舊館人之喪入而哭之哀出使子貢稅驂而賻之子貢曰於門人之喪未有所稅驂稅驂於舊館無乃已重乎言稅驂太重比於門人恩為偏頓也夫子曰豫嚮而哭之遇於一哀而出涕遇見也舊館人恩雖輕我入哭見主人為我盡一哀是厚恩待我也我為之出涕思重宜施惠之也豫惡夫涕之無從也小子行之客行無他物可以易之者使遂以往也又檀弓曰子柳之母死既葬子碩欲以賻布之餘具祭器古者謂錢為泉布所以通布貨財子柳曰不可吾聞之也君子不家於喪惡恩死者以為利請班諸兄弟之貧者又少儀曰賵馬入廟門以其主於死賻馬與其弊大白兵車不入廟門以其主於生人也兵車革車也雖為死者來陳之於外戰伐田獵之服非盛者也周禮革路建大白以即戎也賻者既致命坐委之擯者舉之主人無親受也公羊傳隱公曰貨財曰賻穀梁傳隱公曰錢財曰賻賻助歸生者賻漢書曰原涉父哀帝時為南陽太守天下殷富大郡二千石官賦斂賻葬皆千萬已上妻子適共受之以定産業時又少行三年喪者及涉父死讓還南陽賻送行喪冢墓三年由是顯名京師又曰何並字子廉徙潁川太守疾病召丞椽作先令書曰告子恢吾生素餐日久死雖得官賻勿受葬為小槨但下棺恢如其言後漢書曰魯恭字仲康父期為武陵太守卒官恭年十二晝夜號踊聲郡中賻無所受乃歸服喪禮過成人後漢書曰羊續為南陽太守徵為太常未及行會病卒遺言薄斂不受賵遺舊典二千石卒官賻賵百萬府丞焦儉遵續先意一無所受詔書褒美勑太山太守以府賻錢賜續家世説曰王戎父渾官至梁州剌史渾所歷州郡義故懷其德惠相率致賻數百萬戎悉不受齊書曰張稷所生劉先假葬琅琊黃山建武中改申葬禮賻助委積於時雖不拒絶事畢隨以還之又曰江斆卒遺令不受賻詔賻錢三萬布百匹子蒨啓遵斆命不受詔嘉美之從其所請又曰張融有孝義父暢臨終謂諸子曰昔丞相事難吾以不同將見殺緣司馬笁超人得活爾等必報其子後超人孫微冬月遭母喪居貧融弔之悉脫衣以為贈披牛被而反禭儀禮士喪禮曰士喪君使人禭撤帷主人如初禭者左執領右執要入升致命禭之言遺也衣被曰禭致命曰君使某禭主人拜如初禭者入衣尸出主人拜送如初禮記檀弓下曰衛有太史曰柳莊寢疾公曰若疾亟雖當祭必告也亟急公再拜稽首請於尸曰有臣柳莊也者非寡人之臣社稷之臣也聞之死急弔不賢也釋服而往遂以禭之脫君祭服以禭目親賢也又雜記曰諸侯相禭以後路與冕服先路與褒衣不以禭不以己之正者施於人以彼不以為正也後路二車二車行在後地又少儀曰臣致禭於君則曰致衣廢於賈人敵者曰禭言廢衣不必其以斂也賈人知物善惡也親者兄弟不以禭進不執將命左傳文公曰秦人來歸僖公成風之禭進禮也秦慕諸夏欲通敬於魯國有翟泉之盟故贈僖公并及成風本非魯方獄同無相赴弔之制故不譏其緩而以接好為禮諸侯相弔賀也雖不當事茍有禮焉書之可也以無忘舊好送死不及尸故曰不當事書者書於典策垂示子孫使無忘過厚之好又襄公曰魯公朝于楚康王卒楚人使公親禭禭諸侯有遣使賵禭禮今楚欲依遣使之比矣公患之穆叔曰祅殯而禭則布幣也先使巫祅除殯之凶邪而行禭禮與朝而布弊無異乃使巫以桃茢先殯祅茢黍穰楚人弗禁既而悔之又襄公曰鄭伯有死於羊肆羊肆市列子産禭之枕之股而哭之斂而殯諸伯有之臣在市側者既而葬諸斗城斗城鄭地名春秋説題辭曰衣被曰禭禭之言遺也穀梁傳隱公曰衣衾曰禭説文曰禭衣死人也
