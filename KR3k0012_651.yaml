body:
  text: 刑法部十六杖尚書堯典曰朴作教刑撲檟楚也不勤道業則撻之禮記學記曰檟楚二物收其威也家語曰舜之事父小杖則受大杖則走後漢記曰明帝時政事嚴峻九卿皆鞭杖左雄上言九卿位次三事班在大臣行有佩玉之節動有庠序之儀加以鞭杖誠非古典上即除之魏志曰楊阜字義山為大匠卿上疏欲省宮人諸不見幸者乃召卿府史問後宮人數吏崔令對曰禁密不得宣露阜怒杖百數之曰國家不與九卿為密乃與小吏為密乎帝聞而愈敬禪之又曰周宣字孔和樂安人為郡吏太守楊沛夢八月一日曹公當至必與君杖飲以藥酒使宣占之對曰夫杖起弱藥治人病八月一日賊必除滅至期賊果破蜀志曰劉琰妻胡入賀太后太后令特留胡經日乃歸胡有美色琰疑其與後主有私呼卒伍撾胡至於以杖傳面而後棄遣胡具以告琰坐下獄有司議卒非撾妻之人面非受杖之地琰竟棄市王隱晉書曰武帝以山濤為司徒頻讓不許出而徑歸家左丞白褒又奏濤違詔杖褒五十晉陽秋曰諸葛武侯杖十以上親決宣王聞之喜曰吾無患矣後周書曰宣帝自公卿已下皆被楚撻其間誅戮黜免者不可勝言每笞箠人以百二十為度名曰天杖宮人內職亦如之后妃嬪御雖被寵嬖亦多被杖背於是內外恐懼人不自安北史曰盧潛為黃門鄭子默奏潛從清河王嶽南討嶽令潛說梁將侯瑱大納瑱賂遺還不奏聞文宣杖潛一百仍截其鬢潛顏色不變三國典略曰齊義寧太守荀仲舉字士高潁川汝陰人也在郡清簡亦工詩詠嘗與長樂王尉粲劇飲齧粲指至骨齊文宣知之賜杖一百或問其故云我郍許當時正疑是鹿尾耳又曰齊馮翊王潤字子澤神武第十四子也廉慎方雅習於吏職神武嘗稱之曰此是吾家千里駒也初為定州剌史開府王回洛潤督獨孤拔侵竊官田受納贈賂潤案舉其事二人上言潤出送臺使登魏文舊壇南望歎息不測其意武成宣命於州曰馮翊王少小謹慎內外所知不為非法朕信之矣登高遠望人之常情何足可道鼠輩輕相間搆理應從斬猶以舊人未忍致法回洛決鞭二百拔宜決杖一百隋書曰高祖性猜忌素不悅學既任智而獲大位因以文法自矜明察臨下恆令左右覘視內外有小過失則加以重罪又患令史贓污因私使人以錢帛遺之得犯立斬每於殿庭打人一日之中或至數四嘗怒門事揮楚不甚即命斬之十年尚書左僕射高熲治書侍御史柳或等諫以為朝堂非殺人之所殿庭非決罰之地帝不納熲等乃盡詣朝堂請罪曰陛下子育群生務在去弊而百姓無知犯者不息致陛下決罰過嚴皆臣等不能有所禆益請自退屏以避賢路帝於是顧謂領左右都督田元曰吾杖重乎元曰重帝問其狀元舉手曰陛下杖大如指捶楚人三十者比常杖數百故多致死帝不懌乃令殿內去杖欲有決罰各付所由又曰庫狄士文拜具州剌史性清苦不受公料家無餘財其子嘗噉官廚餅士文枷之於獄纍日杖一百步送還京僮隸無敢出門又曰燕榮為幽州總管按部道次見藂荊堪為笞捶命取之輒以試人人或自陳無咎榮曰後若有罪當免爾及後犯細過將撾之人曰前日被杖使君許有罪宥之榮曰無過尚爾況有過耶榜捶如舊唐書曰開元二年監察御史蔣挺有所犯勑朝堂杖之黃門侍郎張廷圭曰御史憲司清望耳目之官有犯當殺即殺當流即流不可決杖可殺不可辱也又曰開元中前廣州都督裴胄先下獄中書令張嘉貞奏請決杖兵部尚書張說進曰臣聞刑不上大夫以其近於君也故曰士可殺不可辱臣今秋巡邊中途聞姜皎朝堂決杖流皎是三品亦有微功不宜決廷辱以卒伍待之且律有八議勳貴在焉今胄先不可輕行決罰上然其言嘉貞不悅退而謂悅曰何言事之深也說曰宰相者時來即為豈能長據若貴臣盡當可杖但恐吾等行當及之此言非為胄先乃為天下士君子也又曰王遂為浙西觀察使每有笞撻其杖率過常制既遇禍監軍使封其杖來獻命中人出示於朝以作誡世祖曰桓宣武在荊州欲以德被江漢恥以威刑肅物令史受正從朱衣上過桓室年少從外來云向從門下過令史受杖上稍雲根下拂地足意機其不著宣武云我猶患其重傳集曰咸為左丞楊濟與咸書曰昨遣人相視受罰云大重以為恆然相念杖痕不耐風寒宜深慎護不可輕也當飲酒令體中常暖為佳蘇治瘡上急痛故寄往之咸答違距上命稽停詔罰退思此罪在於不測才加罰黜退用戰悸何復以杖重為劇小人不德所好唯酒宜於養瘡可數致也襄陽耆舊記曰羅尚為右丞是時左丞處事失武帝意大怒欲案入重罪事連尚於是尚為坐受杖一百時論美之益部耆舊傳曰常播字文平蜀郡江源人仕縣主簿縣長廣都朱淑以官穀割沒當論重罪播爭獄訟身受杖數千披肌割膚更歷三獄幽間二年每將掠拷吏先驗問伏不播答言忽得罰無所多問辭終不撓事遂見明也三輔決録曰丁邯字叔春正直不撓舉孝廉為郎以令史次補也世祖改用孝廉選邯補為郎邯稱疾不就詔問實病羞為郎乎對曰臣實不病以孝廉為令史職爾世祖怒使虎賁杖之數千詔問欲為郎不邯曰能殺臣者陛下不能為郎者臣也詔出不為郎督晉書曰魏明帝改士庶罰金之令婦人加笞還從鞭督之例以其刑體祼露故也晉律曰諸有所督罰五十以下鞭如令平心無私而以辜死者二歲刑晉令曰應受杖而體有瘡者督之也束晢勸農賦曰乃有老間舊猥欺狡難覺時雖被考不過校督歌對囹圄笑向桎梏流徒書曰五流有宅五宅三居謂不忍加刑則流放之若四凶者五刑之流各有所居大罪四裔次九州之外次千里之外也又曰流宥五刑流共工於幽州放歡兜于崇山竄三苗于三危殛鯀于羽山四罪而天下咸服後魏書曰高聰有罪怒死徙平州為民屆瀛州屬剌史王質獲白兔將獻託聰為表高祖見表顧謂王肅曰在下郍得復有此才而今朕不知也肅曰此高聰北徒此文或其所製高祖悟曰必應然也隋書曰王伽開皇末為齊州行參軍初無足稱後被州使送流囚李參等七十餘人詣京師時制流人並枷鎖傳送伽行次滎陽哀其辛苦悉呼而謂之曰汝等雖犯憲法枷鎖亦大辛苦吾欲與汝等脫去行至京師惣集能不違期不皆拜謝曰必不敢違伽於是悉脫其枷停援卒與期曰某日當至京師如致前卻吾當為汝受死舍之而去流人感悅依期而至一無離叛上聞而異之於是悉召流人并令攜負妻子俱入賜宴於殿庭而赦之擢伽為雍令
