body:
  text: 人事部七十一信釋名曰信申也相申束使不相違也易中孚卦曰信及豚魚豚魚喻卜民也又乾文言曰君子忠信所以進德也韓詩外傳曰受命之主正其衣冠而立儼然人望而信之其次聞言而信次見其行而信既聞其言既見其行衆皆不信民之下也又曰孟子少時東家嘗殺豬孟子問其母曰東家豬何為其母曰欲啖汝母悔失言曰吾懷是子席不正不坐割不正不食胎教之也今適有知而欺之是教之不信乃買東家豬肉以食之明不欺也禮記儒行曰儒有不寶金玉而忠信以為寶又曰忠信以為甲胄左傳僖中曰晉侯圍原命三日之糧原不降命去之諜出曰原將降矣軍吏曰請待之公曰信國之寶也民之所庇也得原失信何以庇民所亡滋多退一舍而原降呂氏春秋云七日期原不下去之也明年復伐與士期必得而反原聞之乃下衛人曰文公信至矣乃歸之故曰攻原得衛新序云溫人聞之而降故曰伐原得溫又僖下曰王子虎盟諸侯于王庭要言曰皆獎王室無相害也君子謂是盟也信公羊傳曰莊公會齊侯盟于柯莊公將會曹子進曰君之意何如莊公曰寡人之生則不若死自傷與齊侯讎不能復也曹子曰然則君請當其君臣請當其臣莊公曰諾於是會莊公升壇曹子手劍而從之管子進曰君何求曹子曰城壞壓境齊數取魯邑以渝信君不圖歟君為齊桓公也不當許侵魯地太甚願請汶陽之田管仲顧曰君許諾桓公曰諾曹子請盟已曹子摽劍而去之要盟可犯而桓公不欺曹氏可讎而桓公不怨桓公之信著乎天下自柯之盟始也又僖公曰晉獻公死奚齊立里克謂荀息曰君殺正廢長而立幼如之何願與子慮之荀息曰君嘗訊臣訊問臣對曰使死者反生生者不愧乎其言則可請信矣里克知其不可與謀退殺奚齊荀息立卓子里克殺卓子荀息死之荀息可謂不食其言矣論語學而曰信近於義言可復也復覆也言語之信可反覆又顏淵曰子貢問政子曰足食足兵民信之矣子貢曰必不得已而去於斯三者何先曰去兵曰必不得已而去於斯二者何先曰去食自古皆有死民無信不立言民所急者信也爾雅曰西至日入所為太蒙太蒙之人信史記蘇秦說燕王曰尾生與女子期於梁下女子不來水至不去抱梁柱而死又曰楚莊王圍宋五月不解宋城中急無食華元乃夜私見楚將子反告莊王王問曰城中何如曰析骸而炊易子而食王曰誠哉是言我軍亦有三日糧以其信故遂罷兵去又曰季札之初使北過徐君君好季札劍口弗敢言季札知之為使上國未獻還至徐君已死於是乃解其寶劍繫徐君冢樹而去從者曰徐君已死尚誰與乎季子曰不然吾心已許之豈以死背吾心漢書曰季布楚人以任俠為名以重然諾聞楚人為之諺曰得黃金百斤不如季布一諾東觀漢記曰郭伋在并州行部到美禝有童兒數百騎竹馬迎拜問使君何當還伋計日告之既還先期一日乃止乎野亭須期而入又曰任延除細陽令每至歲時伏臘輒休遣繫囚徒各使歸家並感其恩德應期而還有囚於家被病自載詣獄既至而死延率掾吏殯于門外百姓悅之范曄後漢書曰范式字巨卿山陽金卿人也少遊太學為諸生與汝南張劭為友劭字元伯二人並告歸鄉里式謂劭曰後二年當還將過拜尊親見孺子焉乃共剋期後期方至元伯具以白母請設饌以俟之母曰二年之別千里結言爾何信之審也對曰巨卿信士必不乖違母曰若然當為爾醞酒至其日巨卿果到升堂拜母盡歡而別又曰高湖及銅馬餘衆降光武封其渠帥為列侯降者猶不自安光武知其意令各歸營勒兵乃自乘輕騎案行部陳降者相語曰蕭王推赤心置人腹中得不投死乎哉吳曆曰太史慈字子義於神亭戰敗為孫策所執策素聞其名即解縛請見咨問進取之術慈曰州軍新破士卒離心欲出宣恩安集恐不合尊意策長跪答曰誠本心所望也明日日中望君來還諸將皆疑策曰太史子義青州名士以信義為先終不欺策明日大會諸將豫設酒食立竿視影日中而慈果至晉陽秋曰陸抗羊祜推信禮之好抗嘗遺祜酒祜飲之不疑抗有疾祜饋之藥抗亦推心服之唐書曰蕭至忠年少時與友人期於路隅會風雪凍冽諸人皆奔避就宇下至忠曰寧有與人期而求安失信乎獨不去衆咸歎服鬻子曰上下相親謂之和不求而得謂之信子思曰同言而信信在言前同令而化化在令外聖人在上民遷如化列子曰子華有寵於晉不仕而居三卿之右禾生子伯范氏之上客也出行坰外宿於田叟商丘開之舍中夜禾生子伯二人相與言子華之名勢能使存者亡亡者存富者貧貧者富商丘開先窘於飢寒潛於牗聽之因之子華子華之門徒皆世族也見商丘開年老力弱面目犁黑狎侮欺紿無所不為遂與商丘開俱乘高臺於衆中漫言曰有能自投下者賞百金衆皆競應商丘開以為信然遂先投之形若飛鳥楊於地𩨒骨無傷因復指河曲之隈曰波中有寶珠泳可得也商丘開復從而泳之水底潛行曰洙既出果獲珠焉衆始同疑俄而范氏之藏失火子華曰若能入火取錦者從所得多少賞焉商丘開往無難色入火往還埃不漫身不燋范氏之徒乃共謝之曰吾不知子之有道而紿子吾不知子之有神而辱子敢問其道商丘開曰吾亡道雖吾之心亦不知其所以然有一於此試與子言之曩子二客之宿吾舍也聞譽范氏之子勢能使存者亡亡者存富者貧貧者富吾誠之無二心故遠而來及來以子黨之言皆實也唯恐誠之不至行之不及不知形體之所措利害之所著也心一而已物無忤者如斯已矣今昉知子黨之紿我我內藏猜慮外矜觀聽追無昔日之不燋溺也坦然內熱惕然震悸矣水火豈復可近哉自此之後范氏門徒路遇乞兒馬醫弗敢辱也必下車而揖之宰我聞之以告仲尼仲尼曰汝不知乎夫至信也動天地感鬼神橫六合而無逆豈但履危嶮入火水而已哉孫卿子曰君者治之源也源清則流長在上有信小民不待探籌投鉤莊子曰夫交邇則相靡以信交遠則忠之以言慎子曰折券契屬符節賢不肖用之券契不為人信人自用之韓子曰魏文侯與虞人期獵明日天疾風左右止文侯文侯曰不可以疾風故失信遂犯風而往戰國策同又曰齊索讒鼎於魯以其僞往齊曰使樂正子來將聽魯君謂樂正子樂正子曰君胡不以真往曰我愛之答曰臣亦愛臣之信又曰吳起示其妻以組曰子為我織組合如是組妻織組異善吳起曰非詔也使衣之而歸妻往請之起曰家無虛言呂氏春秋曰吳起治西河欲諭其信於民乃置表於南門之外令於邑中曰有能僨此表者仕長大夫民相謂曰此必不信有一人曰試往僨表還來謁之吳起見而仕大夫又復立表令於邑中如前邑人守門爭表又曰晉文公伐原示信明年復伐之與士期必得原然後返原人聞之乃下衛人聞之以信為至矣乃歸晉故曰攻原得衛者此之謂也始文公非不欲原也不信得之不若勿得必誠以得之歸之者非獨衛也文公可謂知求矣又曰人主必信信之為政大矣信立則虛言可以賞矣虛言可以賞則六合之內皆為己府天行不信不能成歲地安不信草木不大春風不信其華不盛夏暑不信其土不肥秋雨不信其穀不堅冬寒不信其地不閉天地之大四時之化而猶不能以不信成物也又況乎人事君不信則百姓誹謗社禝不寧處官不信則少不畏長貴賤相輕賞罰不信則民易犯法不可使令交友不信則離散鬱怨不能相親百工不信則器械苦僞丹漆不真夫可與為始可與為終可與尊通可與卑窮者其唯信乎信而又信重襲於身乃通於天以此君人則膏雨甘露降寒暑四時當矣又曰齊桓公伐魯魯人不敢戰去魯國五十里而封之魯請比關內侯以聽桓公許之曹劌謂莊公請從於是明日將盟莊公與劌皆懷劍至於壇上曰魯國去境數百今去境五十亦無生矣均其死也戮於君前管仲鮑叔進曹劌案劍當兩陛下間曰君將改圖毋或進者莊公曰封於汶則可不則請死管仲曰以地衛君非以君衛地君其許之乃遂封汶南與之盟歸而欲勿豫管仲曰不可人將劫君而不知不可謂智臨難而不能勿聽不可謂勇許之而不豫不可謂信不智不勇不信有此三者不可以立功名豫之雖亡地亦得信也以四百里之地見信於天下君猶得也莊公仇也曹劌賊也信於仇賊又況於非仇賊者乎夫九合而之合一匡而之聽乃從此生矣賈誼書曰禹與士民同務故不自言其信諭矣淮南子曰管子以小辱成大榮蘇秦以百誕成一信又曰胡人彈骨胡人盟約置酒人頭骨中飲以相誼越人齧臂中國唼盟所由各異其於信一也說苑曰魏太子謂經侯曰主信臣忠此魏國之寶也列女傳曰魯之母師者九子之寡母也臘日祀畢悉召諸子謂曰婦人之義非有大故不出夫家然吾父母家多幼稚歲時禮不理吾從汝謁往監之謂請也監視也諸子皆稽首唯諾又召請婦曰婦人有三從之義無專制之行少繫於父母長繫於夫老繫於子今諸子許我視私家願與少子俱以備婦人出入之制諸婦其慎房戶之守吾夕而反於是使少子僕歸辦家事天陰還失早至閭外而止待夕而入魯大夫從臺上見而怪之召而問之曰母從北來至閭外而止良久乃入吾不知其故是以召母也對曰妾不幸早失夫獨與九子處臘日從諸子謁歸視私家與諸婦孺子期夕而反妾恐其酺醵醉飽酺醵合藂飲酒也人情所有也妾反失早故止閭外盡期而入大夫美之言於穆公穆公賜母尊號曰母師使朝謁夫人夫人諸姬皆師之會稽典録曰卓恕字公行上虞人恕為人篤信言不宿諾與人期約雖遭暴風疾雨雷電冰雪無不必至嘗從建業還家辭太傅諸葛恪恪問何當復來恕對曰某日當復親覲至是日恪欲為主人停不飲食以須恕至時賓客會者皆以為會稽建業相去千餘里道阻江湖風波難必豈得如期須臾恕至一座盡驚諸葛亮別傳曰魏明帝自征蜀幸長安遣宣帝督張郃諸軍徑卒三十餘萬潛軍密向劍閣亮有戰士十萬十二更下在者八萬時魏軍始陳番兵適交亮參佐咸以敵衆強多非力所制宜權停下兵以并聲勢亮曰吾聞用武行師以大信為本得原失信古人所惜去者束裝以待期妻子鶴望以計日皆勑速遣於是去者感悅願留一戰住者憤勇咸思致命臨戰之日莫不拔刃爭先以一當十殺張郃卻宣帝一戰大剋此之由也王符論曰夫十步之間必有茂草十室之邑必有忠信謹慎易頤卦曰君子以慎言語節飲食尚書堯典曰慎徽五典五典克從毛詩抑曰敬慎威儀惟民之則周禮地官大司徒曰以賢制爵則民慎德禮記中庸曰君子戒慎乎其所不睹恐懼乎其所不聞蓋君子慎其獨也又儒行曰敬慎者仁之地也又太學曰敬慎者仁之地也又太學曰有國者不可以不慎辟則為天下僇矣是故君子先慎乎德論語學而曰慎終追遠民德歸厚矣又為政曰多聞闕疑慎言其餘則寡尤多見闕殆慎行其餘則寡悔尤遇又述而曰子之所慎齊戰疾又公冶長曰季文子三思而後行孝經曰在上不驕高而不危制節謹度滿而不溢高而不危所以長守貴也滿而不溢所以長守富也家語曰孔子入后稷廟左前有金人焉三緘其口而銘其背曰我古之慎言人也戒之哉無多言多言多敗無多事多事多患安樂必戒無所行悔漢書曰成帝為太子博謹慎上嘗急召太子出龍樓門不敢絶馳道西至直城門得絶乃度又曰石建為太僕奏事事下建讀之驚恐曰書馬者與尾而五服虔曰作馬字典者五建上事誤作四今乃四不足一獲譴死矣第慶為太僕御出上問車中幾馬慶以策數馬畢舉手曰六馬又曰金日磾自在左右目不忤視者數十年賜出宮女不敢近上欲內其女後宮不肯應其篤慎如此又曰霍光入禁闥小心謹慎未嘗有過又曰張安世職典樞機以謹慎周密自著又曰孔光性周密謹慎時有所言輒削藁休日歸休兄弟妻子燕語終不及朝廷政事或問光溫室省中樹皆何木也光默不應更答以他語其不泄如此東觀漢記曰陳寵字昭公沛人為尚書寵性周密重慎時所表薦輒自手書人莫得知常言人臣之義若不畏慎自在樞機謝遣門人不復教授絶知友之路又曰樊楚字文高為尚書郎每當直事常晨駐馬待漏雖在間署冠劍不解於身每齊祠恐失時乃張燈俯伏又曰陰識為執金吾居位數十年與賓客語不及國家其重慎如此又曰蔡倫字敬仲為中常侍有才學盡忠重慎每至休下輒閉門絶賓客曝體田野又曰樊宏字靡卿拜光祿大夫位特進宏為人謙慎每當朝會先到俯伏待事時至乃起上聞之勑騶臨朝乃告勿令豫到又曰杜安字伯夷貴戚慕其名或遺其書安不發悉壁藏之後捕貴戚賓客安聞壁出書而封如故由是不羅其患又曰張純字伯仁為虎賁中郎將純素重慎周密時上封事輒削去草後漢書曰馬援在交趾還書誡兄子曰龐伯高敦厚周密吾愛之重之願爾曹效之又曰馬光字叔山為衛尉卿上以光周密謹慎特親異之又曰皇甫嵩為人愛慎勤書前後上表陳諫有補益者五百餘事皆手書毀草不宣於外吳志曰闞澤字德潤山陰人也性謙恭篤慎人有非短口未嘗及容貌似不足者王隱晉書曰李康嘗答司馬文王問因以為家誡曰昔侍於先帝時有三長史俱見臨辭出上曰為官長當慎當勤當清修此三者何患不治乎上問臣曰必不得已於斯三者何先吾對曰慎乃為先夫清者不必慎慎必自清上曰卿言得之矣晉書曰羊祜多所進達而人不知所由或謂祜慎密太過者祜曰是何言歟夫入則造膝出則詭辭君臣不密之誡吾惟懼其不及不能舉賢取異豈得不愧知人之難哉且拜爵公朝謝恩私門吾所不取晉起居注曰太康四年制曰選曹銓管人才宜得恪謹寡欲柳華崇本尚書朱整周慎敬讓以自居是其人也後魏書曰庾嶽代人也置相州即拜嶽為刺史公廉平當百姓稱之鄴舊有園池時果初熟丞吏送之嶽不受曰果未進御吾何得先食其謹慎如此北齊書曰封隆之字祖裔渤海修人也性寬和有度量義旗始建首參經略奇謀妙策密以啓聞上書削藁罕聞於外高祖嘉其忠謹每多從之隋書曰高頴字昭玄渤海蓨人也少明敏尤善詞令所出奇策密謀及損益時政皆世無知者又曰李德林字公輔博陵平安人也從入官已後典機務甚密慎常云古不言溫樹何足稱也唐書曰溫彥博自掌知機務即杜絶賓客國之利害知無不言太宗嘉之及薨謂侍臣曰彥博以憂國之故勞精竭神我見其不逮已二年矣恨不縱其間逸致夭生靈又曰陸元方在官清謹再為宰相則天將有遷除每先以訪之必密封以進未嘗露其私恩臨終取前後草奏悉命焚之且曰吾陰德於人多矣其後庶幾福不衰矣又有書一匣常自緘封家人莫有見者及卒視之乃前後勑書其慎密如此又曰楊再思在位纍載屈節希旨無所規弼然慎畏末嘗忤物或謂再思曰公名高位重何為屈折如此再思曰世路艱難直者受禍茍不如此何以全其身哉又曰高郢性恭慎廉潔罕與人交游守官奉法勤恪掌誥纍年家無制草或謂曰前輩皆留制集公焚之何也曰王言不可存私家時人重其慎密太公金匱曰黃帝曰子之居上搖搖恐夕不至朝尸子曰言美則響美言惡則響惡身長則影長身短則影短名者響也行者影也是故慎而言將有和之慎而行將有隨之淮南子曰君子之居民上也若以腐索御馬恐失民意若履薄冰蛟在其下又曰若行獨梁不為旡人不兢其容殷康明慎曰奔車之上無仲尼覆舟之下無伯夷益言慎也魏任嘏別傳曰嘏字紹先樂安博昌人也文帝時為黃門侍郎每納忠言輒手書壞本自在禁省歸書不封帝嘉其淑慎
