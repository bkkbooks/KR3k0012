body:
  text: 兵部八十四戟下世說曰舊制三公領兵入見皆交戟叉頸而前初曹公將討張繡入覲天子時始復此制公自是不敢朝見一出郭世語孫盛異同難語曰太祖嘗私入中常侍張讓室讓覺之乃舞手戟于庭前踰垣而出材力絶人莫之能害干寶搜神記曰漢武帝時張寬為楊州刺史先是有二老翁爭山地詣州訟疆界連年不決寬視事復來寬視二翁形狀非人令卒持戟將入問汝何等精翁欲走寬呵格之化為巨蛇又曰成都王之攻長沙也反軍于鄴內外陳兵是夜戟鋒皆有火遙望如懸燭就則亡焉三十國春秋又載劉敬叔異苑曰彭城劉黃雅以太元中為京口府佐被使還都路經竹里亭多虎劉極自防衛牛馬繫於戶前手戟布於地上宵中士庶同睡虎乘間跳入跨越人畜獨取劉而去劉義慶幽明録曰項縣姚牛十餘歲父為鄉人所殺牛常賣衣物市刀戟圖欲報讎後在縣門前相遇手刃之於衆中東陽無疑齊諧記曰東陽郡朱子之有一鬼恆來其家子之兒病心痛鬼語之曰我為汝尋方云燒虎丸飲即差汝覔大戟與我我為汝取也其家便持戟與鬼鬼持戟去須臾還放戟中庭擲虎丸著地猶尚暖束晢發蒙記曰師子五色而食虎於巨木之岫一噬則百人仆唯畏鉤戟顧愷啓蒙記曰玉精名委似美女而青衣見以桃戟刺之以其名呼之可得也周處風土記曰戟長一丈三尺奮揚俯仰乍跪乍立兼五兵而能乃謂名人又曰教學講武戒遠慮戎首玄戈奮長雄迎來送往斫截橫從扶強頓弱唯敵所從首先也玄戈北斗杓端招搖之內貫索之外獨星也戟為五兵雄蓋取威奮振也凡用戟法必先小振動之陵上攝下收功於中恆在首煩之間來迎去送順而不逆也植則虎龍交牙神變無常去者厚餞來者不攘言用雙戟之法交戟相向左手為龍右手為虎更出更入更上更下上下無常隨變而改顛倒入懷轉如回風敵斃孤勝攝戟徐反可謂上下無常非為邪也進退無恆非離群也蓋乃進足奮手欲及機也如敵來輕去疾進而送之來重進疾開而待之南州八郡志曰宋昌郡西南三千里有剽國以金為刀戟焦贛易林曰桃弓葦戟除殘去惡又曰倚鋒據戟傷我胸臆春秋考異郵曰劉子單子折猛入城天王奔走尹氏立朝國有三王天下兩主周分為二莫能救討強弩張於前楴音剃戟拔於後管子曰黃帝問於伯高伯高曰雍狐之山發水出金𧈪尤受而制之以為雍狐之戟晏子春秋曰景公飲酒移於晏子前驅款門曰君至晏子立於門曰君何為非時而夜辱公曰酒醴之味金石之聲願與夫子樂之晏子曰夫鋪薦席陳簠簋者有人臣不敢與焉又移司馬穰苴介胄操戟立於門曰鋪薦席陳簠簋者有人臣不敢與焉又曰崔杼殺莊公盟諸大夫令有敢不盟者戟鉤其頸孫卿子曰雖有戈矛之戟不如恭儉之利與人善言暖於布帛傷人以言深於矛戟又曰狐父戈以钃牛愚莫甚焉钃徐玉切又曰鉏擾棘矜非錟音談於句戟長鎩也如淳曰長刃矛也又曰矛刃下有鐵上句曲然而成敗異變功業相反也尉繚子曰夫殺之五十步之內者誰也曰矛戟也韓子曰譬如劍戟愚人行忿則禍生聖人誅暴則福成淮南子曰孟夏之月南宮御女赤色衣赤采吹竽笙其兵戟高誘曰有披幹象陽布散也劉向新序曰趙簡子上羊腸之坂群臣皆偏袒推車而席會獨擔戟行歌簡子曰寡人上坂會獨不推車而侮其主者其罪何若會曰為人臣侮其主者其罪死而又死簡子曰何謂死而又死席會對曰身死妻子為戮謂之死而又死又曰齊景公遊海上樂之六月不歸令左右敢言歸者死顏歜諫曰君樂治海上不樂治國儻有治國者君且安得樂此海也公據戟將斫之歜撫衣而侍之曰君奚不斫也昔桀殺關龍逢紂殺王子比干君奚不斫以臣參此二人不亦可乎公遂歸抱朴子曰太阿臨項長戟指心而操不可奪也又曰拙者得工輸之斤斧不能以成雲梯怯者得馮婦之刀戟不能以格兕虎蔣子曰士有一餐而倒戟義所驅也應璩詩曰丈夫要雄戟更來宿紫庭今者宅四海誰復有不并又曰郡國貪慕將馳聘習弓戟雖妙未更事難用應卒迫司馬相如上林賦曰曳明月之珠旗建干將之雄戟干將韓王劍師雄戟干將所造也左思吳都賦曰吳鉤越棘越鐵利故稱越棘也又曰羽旄揚蕤金芒繁欽撰征賦曰左騎雄戟右攢干將兩都賦曰郎將司階虎戟交鎩音殺又曰周廬千列陛戟百重陶侃表曰伏惟武庫傾蕩宿衛有闕輒簡選其差可者奉獻金鈴大戟五十張孫盛奏事曰諸違令私作鎧一領角弩力七石以上一張戟十枚以上皆棄市張載劍閣銘曰一人荷戟萬夫趑趄難行貌也李尤戟銘曰鼓戟之設以戒非常秉執操持邪暴是防須臾之忿終日為殃山陵之禍起於豪芒張協手戟銘曰錟錟音談雄戟清金練鋼名配越棘用過于將嚴鋒徑枝摛鍔耀芒魏文帝書曰漢中地形實為險固四嶽三塗皆不及也張魯有精鉀數萬臨高守要一夫揮戟千人不得進而我軍過之若駭鯨之決綱罟奔兕之觸魯縞未足以喻其易應瑒表曰長戟百萬胡馬千群應貞華覽曰強弩連城長戟指塞傅玄翰會賦曰流蘇粲粲華蓋重陰羽林虎旅長戟橚上音蕭下音參賈誼過秦論曰陳涉以戍卒散亂之衆數百奮臂大呼不用弓戟之兵鉏擾音優白挺橫行天下秦人長戟不刺強弩不射楚師深入戰於鴻門曾無藩籬之艱殳釋名曰殳殊也長丈二尺而無刃有所撞直降切桎陟降切於車上使殊離也說文曰殳以杖殊人也禮殳以積竹八觚長丈二尺建於兵車旅賁以先驅也詩曰伯也執殳為王前驅又曰彼候人兮荷戈與祋候人道路送迎賓客者也荷揭也祋殳也役丁外切周禮曰車六等之數殳長四尺崇於人四尺謂之四等左傳曰宋張丐與子皮臼任鄭翩殺華多僚子皮華貙也任翩貙家臣華氏居盧門以南里叛公子成以晉師至成前奔晉今還救宋也會晉齊衛救宋與華氏戰于赭立公子城射華豹殪張丐抽殳而下殳長丈二在車邊又曰莒子庚輿將出奔聞烏存執殳而立於道左懼將止苑羊牧之曰君過之烏存以力聞可矣何必弒君成名遂奔齊韓子曰楚國法太子不得乘車至弟門時天雨王急召太子庭中有水太子遂驅車至弟門廷尉舉殳擊馬遂敗其駕焦贛易林曰大過之訟秉鉞執殳挑戰先驅蕭子良古今蒙隸文體曰殳書者伯氏之職也古者文既記笏武亦書殳也司馬兵法曰兵雜則不利長兵以衛短兵以守太長則犯太短則不及太輕則閲閲則易亂太犯則不濟季氏曰兵長短相為衛守合同為用太長太短太輕皆不如法度者也犯者觸推故不濟不及者不還於利閲者不固則破敗故奔北走擾亂煩也故初列即戟間焉一弓一戟相間也次列殳矛間焉一殳一矛相間也又曰周左執黃鉞右執白旄所以不進者審察斬殺之威也有司皆執殳戈示諸鞭朴之辱歐使不行不進者也又曰弓矢圉殳矛守戈戟助五兵長短各有所宜因事而施凡五兵當長以衛短短以救長以戟則久皆戰則疆淮南子曰武王執戈秉鉞以勝殷搢笏杖殳以臨朝魏文帝詩曰行行遊且獵且獵路南隅彎我烏號弓騁我纖驪駒走者貫鋒鏑伏者飢戈殳白日未及移手獲三十餘王粲七釋曰流鋒四射罼罕撗厲奮千殳而捎擊弛鷹犬以搏噬畢音必夏侯湛獵兔賦曰擬以鋭殳規以良弓都毫末而放鏃兮殪之于窟中左思吳都賦曰于鹵殳鋋賜夷勃盧殳鋋皆矛也謝惠連從軍行曰趙騎馳四牡吳舟浮三翼弓矛有恆用殳鋋無暫息太公六韜曰方凶兩枝鐵叉柄長三丈以上三百枝矛釋名曰矛冒也刃下冒矜也下頭曰鐏徂悶切鐏入地也松𢷺長三丈其矜宜徑以松作之櫝速也前速之言也矛長丈八尺曰矟馬上所持言其稍矟便殺也又曰繳矛繳也可以繳截敵陳之矛也仇矛頭為三叉言以討仇敵之矛也矛戟戟常也其矝丈六尺不言常而云夷者言可夷滅敵也亦車上所持也務矛長九尺務霍也所中霍然即破裂也方言曰五湖之間矛謂之鍦音施或謂之鋋或謂之鏦音窗其柄謂之矝又曰矛骹音敵細如鶴脛者謂之鶴膝世本曰杼作矛太公兵法曰矛之神名趺蹌書曰煆乃戈矛礪乃鋒刃又曰門之內一人冕執鋭鋭矛也立于階側周成王崩士衛殯也詩曰清人在彭駟介旁旁箋云清者高克所軍之邑也駟介四馬也二矛重英河上乎翱翔重英矛之莢飾二矛重喬河上乎逍遙箋云二矛酋矛夷矛也又曰厹音求矛鋈鐓三隅矛也鋈音沃鐓音隊蒙伐有苑蒙郭羽也伐干也苑文貌也禮記曰進矛戟者前其鐓後其刃大戴禮曰武王踐祚矛之銘曰造豫少聞弗忍終身之羞豫一人所聞以戒後世子孫左傳曰齊伐魯冉有用矛於齊師故能入其軍史記曰武王牧野誓曰立爾矛漢書曰姑句家矛端生火光其妻曰矛端生火光此兵器也魏志曰公孫瓚手執兩頭矛殺鮮卑數十人魏書曰議者多言關中兵強習長矛非精選前鋒則不可以當也曹公謂諸將戰在我非在賊雖習長矛將使不得以刺諸君但觀之魏略曰閻行金城人後名艷字彥明少有健名始為小將隨韓約建安初約與馬騰相攻擊騰子超亦號為健行嘗刺超矛折因以矛撾超幾殺之吳書曰孫策討山越斬其渠帥悉令左右分行逐賊騎與虞翻相隨翻喜用矛謂在前得平地勸策乘馬策曰卿無馬奈何答曰翻能步日可行三百里三國異同傳曰公孫瓚為遼東屬國長史嘗從數十騎出行塞卒遇鮮卑百騎以矛擊殺傷數十人鮮卑由是畏之蜀志曰先主為曹公所逐棄妻子走令張飛將二十騎拒後據水斷橋瞋目橫矛曰我張益德也可來決死無敢進者晉書載記曰蜀李雄無事小出丞相楊裒於後持矛馳馬過雄雄怪問之對曰夫統天下之重者如乘惡馬持矛也急之則慮自傷緩之則懼其失是以馬馳而不制也雄寤即還晉太康起居注詔曰諸王中尉及諸軍皆典兵以備不虞乃有著中戰衣木履持長矛者此為兒戲而無相彈懾也趙書曰劉曜討陳安於隴城城陷安死乃謠曰隴上健兒曰陳安愛養將士同心肝騄驄馬鐵鏤鞍丈八蛇矛左右盤百騎俱出如雲浮追者十萬騎修修戰始三交失蛇矛十騎俱蕩九騎留吳越春秋曰越屈盧之矛越絶書云勃盧之矛步光之劍獻吳王六韜曰紂之卒握炭流湯者十八人綰矛殺百步之外者千人韓子曰人有鬻矛楯者譽之曰吾楯之堅物莫能陷也又譽其矛曰吾矛之利於物無不陷也或曰以豫之矛陷子之楯何如其人弗能應也劉向說苑曰秦急圍邯鄲邯鄲傳舍吏子李談謂平原曰邯鄲之民炊骨易子而食之而君之後宮婢妾荷綺縠餘梁肉士民兵盡或剡木為矛戟而君之器物鐘磬自恣呂氏春秋曰齊晉相與戰平阿餘子亡戟得矛退而不自決謂路人曰亡戟得矛可以歸乎路人曰戟亦兵也矛亦兵也亡兵得兵何為不可以歸心猶不決遇高唐之孤叔無孫當其馬前曰今者戰亡戟得矛可以歸乎叔無孫曰矛非戟也戟非矛也亡戟得矛豈無責乎阿餘子曰嘻還反戰死之神仙傳曰左慈見孫討逆討逆使慈著馬前欲手刺殺之討逆著鞭驅馬操矛逐慈慈著木履策杖徐步終不能及乃止列女傳曰巴趙娥者趙萬之妻郡縣遭亂萬得足疾不能行為賊所殺賊欲殺娥娥守喪不去賊舉矛指娥欲以怖之娥知賊必劫略乃以身赴矛貫心達背而死劉敬叔異苑曰河間沐堅字壁強石勒時監作水田御下苛虐百姓怨毒為堅形以刃矛斫刺呪令速斃堅尋得病若被捶割於是遂殞夢書曰矛戟為相待期蚤晚也夢得矛戟者憂相勑也持矛待交友見人持矛待於己也持矛來倒却中止也魏文帝詩曰戈矛成山林玄甲曜日光樂府左延年秦女休行曰始出上西門遙望秦氏廬秦氏有好女自名為女休女休十四五為宗行報讎左執白陽刀右執宛景矛張奐與崔子真書曰僕以元年到任有見兵二百馬如羖羊矛如錐鈇楯如榆葉諸葛亮集曰勑作部皆作五折剛鎧十折矛以給之
