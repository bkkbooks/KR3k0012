body:
  text: 地部二十三水上釋名曰水準也平準物也廣雅同天下大水四謂之四瀆江河淮濟也瀆獨出其所而入海也易曰坎為水潤萬物者莫潤于水又曰水洊至習坎又曰水流濕書曰水曰潤下潤下作鹹又曰若涉大水其無津涯尚書大傳曰非水無以準萬里之平非人無以通遠道重任也詩曰相彼泉水載清載濁又曰沔彼流水朝宗于海又曰濟有深涉渡也深則厲淺則揭有彌濟盈濟盈不濡軌盈宜濡不宜喻淫亂犯禮者也又曰就其深矣方之舟之方柎就其淺矣永之遊之又曰毖彼泉水亦流于淇又曰瀏其清矣深貌河水洋洋北流活活溱與洧洧方渙渙兮春水盛又曰楊之水不流束薪不流束楚不流東蒲又曰泌之洋洋可以療飢言樂道也禮曰夫水一勺之多及其不測黿鼉蛟龍魚鱉生焉貨財殖焉又曰水之於人親而不尊又曰水無當於五色五色不得不彰又曰祭宗廟水曰清滌又曰水煩則魚鱉不大又曰小人溺於水君子溺於口夫水近於人而易以溺人同禮曰水有時以凝傳曰共工氏以水紀故為水師而水名又曰潢污行潦之水可薦於鬼神可羞於王公又曰鄭子産謂子太叔曰唯有德者能以寬服民其次莫如猛火烈人望而畏之故鮮死焉水懦弱民狎而玩之則多死焉故寬為難也春秋元命苞曰水之為言演也陰化淖濡流施潛行也故其立字兩人交一以中出者為水一者數之始兩人譬男女言陰陽交物以一起也論語曰智者樂水又曰子在川上曰逝者如斯夫不舍晝夜爾雅曰水別流曰泒風吹水涌曰波大波曰濤小波曰淪平波曰瀾直波曰徑水朝夕而至曰潮風行水成文曰漣水波如錦文曰漪水行曰涉逆流而上曰沂洄順流而下曰泝遊亦曰沿流絶流而渡曰亂以衣涉水曰厲由膝以下為揭由膝以上為涉渡水處曰津濟潛行水下為泳漢書曰成帝建始三年秋京師民無故相驚言大水至天子親御前殿召公卿議大將軍鳳以為太后與上及後宮可御舟船令吏上長安城以避水群臣皆從鳳議左將軍王啇獨曰上古無道之國水猶不冒城郭今聖政和平世無變革上下相安何因當有大水一日暴至此必訛言也不宜令民上城重驚百姓上乃止有頃長安中稍定問之果訛言上於是壯啇之固守數稱其議而鳳大慚自恨失言後漢書東陽人趙炳字公河能越方禁與閩中徐登遇於烏傷溪水上禁小溪水不流又曰竇太后臨政竇憲兄弟各擅威權丁鴻上封事曰夫壞崖破巖之水源由涓涓干雲蔽日之木起於蔥蒨魏略曰漢火行忌水故去洛水而加佳魏為土土水之母水得土而流土得水而柔故除佳加水晉書曰陸雲先是常著衰絰上船於水顧見其影因大笑落水人救獲免又佛圖澄傳襄國城塹水源在城西五里其水源暴竭勒問澄何以致水澄曰今當勑龍取水乃與弟子法首等數人至故泉源上坐繩床燒安悉香呪願數百言如此三日水微流有一小龍長五寸許隨水來出諸道士競往視之有頃水大至隍塹皆滿又曰鄧攸為太乎中庶子吳郡闕守人多欲之帝以授攸攸載米之郡俸祿無所受唯飲吳水而已又曰孫登性無恚怒人或沒諸水中欲觀其怒既出便大笑齊書曰陸慧時為征虜功曹與參府軍沛國劉璡同從述職行至吳璡謂人曰吳間張融與陸慧並宅其間有水此水必有異味遂往酌而飲之唐書曰新豐鸚鵡谷水清代傳云此水清天下平開皇之初暫清尋濁至是而復清又曰乾元中嵐州上言合河關黃河水四十里間清如井水經四日而變又曰楊朝晟為邠州刺史奏方渠合木波皆賊路請城其地以備之軍次方渠無水師徒囂然遽有青蛇乘高而下視其迹水隨而流朝晟令築防環之遂為渟泉軍人仰飲以足又曰孔若思遷庫部郎中若思常謂人仕至郎中足矣至是持一石止水滿於座右以示有止足之意老子曰上善若水水善利萬物而不爭處衆人之所惡故幾於道列子曰禹治水土迷之一國無風雨霧露不生鳥獸名曰終北有山名壺領頂有口若圓環名曰滋穴有水涌出名曰神瀵臭過蘭椒味過醪體又曰白公問於孔子曰人可與微言乎孔子不應白公曰若以石投水何如孔子曰吳之善沒者能取之曰若以水投水何如孔子曰淄澠之合易牙嘗而知之白公曰人故不可與微言耶又曰人有濱河而居者習於水勇於泅操舟鬻渡利供百口裹糧就學者成徒而溺死者幾半本學泅不學溺而利害如此莊子曰君子之交淡如水又曰秋水之至百川灌河流之大也兩崖涘之間不辨牛馬言其廣於是河伯欣然自喜以天下之美盡在己矣又曰水之性不雜則清莫動則平又曰孔子觀於呂梁懸水三十仞流沫三十里黿鼉魚鱉不能遊見一丈夫遊之數百步而去又曰水之守土地審無意則止於分所以為審又曰水靜則明燭鬢眉大匠取法焉水靜猶明而況聖人之心靜乎又曰水之積也不厚其負大舟也無力丈子曰水之性欲清沙石穢之水之為道也廣不可極莫知其言深不可測長極無窮遠淪無涯息耗減益過於不訾涌出日息煎乾曰耗出川枝流曰減九野注之曰益過於不訾者此過尾閭入大壑入無底谷又曰水濁者魚噞喁又曰混混之水濁可以濯吾足青青之水清可以濯吾纓又曰水之道也大不可極深不可測上天為雨露下地為潤澤又曰猶鑿渠而止水抱薪而救火墨水曰古語君子不鏡於水而鏡於人鏡於水見面之容鏡於人則知吉凶管子曰水者地之血氣筋脈之流者故曰水之材也夫水淖溺以清好仁視之黑而白精也量之至滿至止正也流則至平義也人皆赴高己獨趍下卑也卑也者道之室王者之器也淮也者五量之宗素也者五色之質也淡也者五味之中也故水藏万物産金石故曰水神凡有五害水一也旱二也風霧雹霜三也厲四也蟲五也五害之屬水最為大水有大小有遠邇水出山而流入海命曰經水別於他水入於大水及海者命曰枝水山之溝流於大水及海者命曰川水水出於地而不流者命曰淵水淮南子曰天下之物莫柔弱於水上天則為雨露下地則為潤澤万物弗得不生百事不得不成大苞群生而無所私澤及跂蹺跂蹺行也蹺微小之蟲也而不求報富贍天下而不既贍足也既盡也德施百姓而不費德澤加於百姓不以為己財費也行不可得而窮極也流膏不止微而不可得把握也擊之無創射之不傷斬之不斷焚之不燃水之性也淖溺流遁錯繆相紛遁逸也錯繆相紛波相糾也而不可靡散利貫金石強濟天下水流缺石是其利也舟船所載無有重是其強也濟通也動溶無形之域而翱翔忽區之上忽慌之區上也言其飛為雲雨無所不止邅回川谷之間邅回猶委曲也而滔騰大荒之野有餘不足與天地取與授万物而無所前後前後皆與之是故無所私而無所公公私一也靡濫振蕩與天地同鴻鴻大同通無所左而所右蟠委錯抮音轢與万物始終是謂至德言水之為德最大故曰至德也夫水所以能成其至德於天下者以其淖溺潤滑也故老聃之言曰天下至柔馳騁於天下之至堅出於無有入於無間是水也吾是以知無為之有益有益於生夫無形者物之大祖也無音者聲之大宗也無形生有形故為物大祖也無音生有音故為聲大祖大宗皆大也其子為光其孫為水皆生于無形乎光無形道所貴也觀之故子為光也水形而不可毀差之故孫為形也夫光可見而不可握水可循而不可毀故有像之類莫尊於水出生入死自無跖有自有跖無而以衰賤矣出生出生道謂去清淨也入死入死道謂情欲也跖適也自無形適有形離其本也自有形適無形不能復得道家所以衰賤也是故清淨者德之至也而柔弱者道之要也要約虛而恬愈者万物之用也万物由之得為人用肅然應感殷然反本則淪於無形矣所謂無形者一之謂也一者道之本也所謂一者無匹合於天下者也卓然獨立塊然獨處上通九天下貫九野九天八方中央也九野亦如之員不中規方不中矩大渾而為一棄無根言微妙也懷囊天地為道開門開道之門穆忞隱閔純德獨存穆忞隱閔皆無形之類也純不雜揉也布施而不既用之而不勤既盡也勤勞也又曰夫水之性若拙其所流而深之茨其所決而高也茨積土填滿之也使得循勢而行乘衰而流衰下雖有腐髊流澌弗能汙腐髊骨澌水也其性性非異也通之與不通也風俗猶此也誠決其善志防其邪心啓其善道塞其姦路與同出一道則民性可善而風俗遷矣又曰河水赤水遼水黑水江水淮水是謂六水白水宜玉黑水宜砥青水宜碧赤水宜丹黃水宜金清水宜龜汾水宜麻洛水輕利宜禾渭水多力宜黍漢水重安宜竹箭又曰土地各以類生人是故清水音小濁水音大湍水人輕遲水人重又曰白水出崑崙之原飲之不死又曰方諸見月則津而為水又萬畢術曰方諸取水方諸形若杯無耳以五石合冶以十二月壬子夜半作之以承水即來抱朴子曰火出於陽燧陽燧員而火不員也水出於方諸方諸方而水不方又曰黃帝曰天在地外水在天外浮天而載地者水也又曰左慈以氣禁水水為逆流一二丈禁水著中庭露之大寒不冰尸子曰凡水其方折者有玉其圓折者有珠清水有黃金龍淵有玉英顧子曰顧夷子與子華遊東池子華曰水有四德沐浴群生深流万世是仁也揚清激濁蕩去滓穢是義也柔而難犯弱而難勝是勇也道江疏河惡盈流謙是智也孟子曰數罟不入污池魚鱉不可勝食也數罟密網也又曰民之歸仁也猶水之就下也又曰仲尼亟稱於水曰水哉水哉何取於水也又曰原泉混混不舍晝夜盈科而後進放乎四海有本者如是也茍為無本七八月之間雨集溝會皆盈其涸也可立而待也故聲聞過情君子恥之又曰性猶湍水也決諸東方則東流決諸西方則西流人性之無分於善不善也猶水之無分於東西也人無有不善水無有不下也又曰仁之勝不仁也猶水之勝火也今之為仁者猶以一杯水救一車薪之火也又曰觀於海者難為水遊於聖人之門者難為言觀水有術必觀其瀾瀾水中大波也孫卿子曰孔子觀於東流之水子貢問於孔子所以見大水必觀焉何也孔子曰夫水柔也而無為也似德其浩浩乎不屈似有道其赴百仞之谷不懼似勇主量必平似法盈不求概似正發源必東似志是以君子見大水必觀焉大戴禮孔子家語並有
