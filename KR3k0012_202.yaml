body:
  text: 封建部四德行封漢書曰宣帝以劉德謹重封為陽城侯又曰邴吉有陰德於孝宣帝微時帝即位眾莫知吉亦不言吉從大將軍長史轉遷御史大夫帝聞將封之會吉病甚將使人加紳而封之及其生存也太子太傅夏侯勝曰此未死也臣聞有陰德者必饗其樂以及子孫今未獲其樂而病甚非死也後愈封為愽陽侯東觀漢記曰建武元年詔曰故密令卓茂束身自脩執節悙固斷斷無他其心休休焉夫士誠能為人所不能為則名冠天下當受天下重賞故武王誅紂封比干之墓表商容之閭今以茂為太傅封褒德侯賜安車一乘衣一襲金五百斤討亂定策封漢書曰莽何羅與弟重合侯通謀逆時霍光金日磾音低上官桀等共誅之功未錄武帝病封璽書曰帝崩發書以從事遺詔封金日磾為秺丁固切侯上官桀為安陽侯光為愽陸侯文頴曰愽大陸平取其嘉名無此縣也食邑北海之河間臣瓚案漁陽有愽陸城也皆以前捕反者功封時衛尉王莽子男忽侍中楊語曰帝崩忽常在左右安得遺詔封三子事群兒自相責耳光聞之切讓王莽莽酖殺忽奉使封史記曰高祖使劉敬使匈奴還報曰匈奴不可擊此必見短伏奇兵以爭利上怒械繫敬必往而厄於白登七日乃得解還至廣武赦敬封千戶號建信君漢書曰武帝以校尉張騫從大將軍擊匈奴知水草處軍得以無飢渴因前使絕國功封騫愽望侯又昭帝以平樂廄監傅介子誅樓蘭王封為宜陽侯又元帝以甘延壽使西域郅支單于封義成侯蜀志曰陳震字孝起使吳賀孫權踐祚及到武昌權與震昇壇歃血還封陽亭侯尊賢繼絕封尚書大傳曰武王勝殷箕子走之朝鮮因以封之禮記郊特牲曰天子存二代之後由尊賢不過二代又禮記曰武王克殷未及下車而封黃帝之後於薊封帝堯之後於祝封帝舜之後於陳下車而封夏后氏之後於杞封殷之後於宋史記曰武王克紂以紂子武庚祿父續殷祀使管蔡相之武王崩成王少管蔡疑周公乃與武庚作亂周公以王命誅之命微子開為殷後奉其先祀國于宋至宋王偃立於是齊魏楚伐宋滅之而三分其地漢書自古受命及中興之君必興滅繼絕脩廢舉逸然後天下歸仁四方之政行高祖撥亂日不暇給然猶脩祀六國求聘四皓過魏則壠無忌之墓適趙則封樂毅之後又曰武帝元狩中復詔御史以酇二千四百戶封蕭何曾孫慶為酇侯布告天下令明知朕報蕭相國德厚也又曰武帝過洛陽下詔以三十里地封周後為周子南君又曰封周公後公孫相如為褒魯侯又曰元始四年靳翕夏侯嬰陳平張良周勃等一百一十八人紹爵復家東觀漢記曰建武二年封殷紹嘉公為宋公周承休公為衛公十四年封孔子後孔志為褒成侯魏志曰文帝以議郎孔羨為崇聖侯奉孔子祀晉中興書曰元帝封孔亭為奉聖侯不食戶邑又曰元帝詔封魏後曹勵為陳留王呂氏春秋曰武王勝殷封帝堯之後於犁丘成湯之後於宋以奉桑林死王事子孫封左傳哀下曰晉荀瑤率師伐鄭次于桐丘鄭駟弘請救于齊齊師將興陳成子屬孤子三日朝屬會也孤子死事者之子也設乘車兩馬繫五邑焉乘車兩馬大夫車服也繫五邑加之五邑也一曰兩飾也召顏涿聚之子晉隰之役而父死焉隰役在哀二十三年國之多難未汝恤也今君命汝以是邑也服車而朝無廢前勞漢書曰周苛以內史守滎陽罵項羽死高帝封苛子成為高景侯又曰酈食其使約諸侯至齊死事高帝封食其子疾為高梁侯又曰趙王反內史王捍相建德諫不聽遂燒殺捍等景帝封捍子乘之建德子橫皆為侯楚王反太傅趙夷吾相張尚並諫不聽死景帝封夷吾子周尚子居皆為侯魏志曰鮑信為濟北相協視太祖身以遇害太祖追錄信功封子郈音后為新都亭侯說苑曰邯鄲傳舍吏子李談說平原君令盡散家財以饗士攻秦國平原從其計勇敢三千人皆出從談赴秦軍秦軍為卻三十里亦會楚魏救至秦軍遂罷李談死封其父為李侯異域降封漢書曰匈奴王徐盧等五人降漢景帝欲侯之以勸後亞夫曰彼背其王降陛下陛下侯之即何以責人臣不守節者乎上曰丞相議不可用乃悉封徐盧等為列侯亞夫因謝病免相又曰武帝時匈奴王及太子相都尉以下趙信南越王兄建德等凡三十五人來降並封侯又曰宣帝時匈奴單于先賢樿音等二人降並封侯魏志曰鮮卑軻比能明帝時將其部眾降拜歸義侯雜恩澤封漢書曰高后以大謁者張澤勸王諸呂封為建陽侯又曰孝武以方術封欒大為樂通侯又曰宣帝掖庭令張賀有舊恩封賀子彭祖為都陽侯又曰王莽居攝安眾侯劉崇與張紹攻宛而敗詔從兄竦崇父嘉詣闕自歸竦因嘉作奏莽莽大悅太后下紹惟嘉父子兄弟雖有屬不敢阿私以千戶封嘉為師禮侯嘉子七人皆賜爵關內侯後又封竦為淑德侯長安人為語曰欲求封過張伯松力戰鬥不如巧為奏東觀漢記曰馬防子鉅為常從小侯上欲冠之夜拜為黃門侍郎華嶠後漢書曰元和元年遂置鴻都學畫孔子及七十二弟子像其諸生皆勑州郡三公舉用辟召或出刺太守入為尚書侍中乃有封侯賜爵者士君子皆恥與為列魯國先賢志曰汶陽鮑氏起於鮑吉吉字利主桓帝初為蠡吾侯吉為書師及桓帝立歷位至河南尹詔曰吉與朕有龍潛之舊其封西鄉侯宗族以吉勢力至刺史二千石者五雜名號封漢書曰初高祖微時嘗避事時與賓客過其丘嫂食應劭曰丘氏女也孟康曰西方謂上女婿立為婿立空也上有嫂也晉灼曰丘大也大婦為冢婦也嫂厭叔與客來佯為羹盡鑠釜客以故去巳而視釜中有羹由是怨嫂及立齊岱等王而伯子獨不得侯太上皇以為言高祖曰某非敢忘封之也為其母不長者七年十月封其子信為頡羹侯又曰霍去病以校尉伐匈奴乃封為冠軍侯又曰趙破奴以司馬再從驃騎將軍擊匈奴封為從驃騎侯東觀漢記曰彭寵奴子密殺寵詣闕降封為不義侯魏志曰初平二十年置名號侯爵十八級關中侯爵十七級皆金印紫綬又置關內外侯十六級銅印龜紉墨綬五大夫十五級銅印環紉亦墨綬皆不食租與舊列侯關內侯凡六等注曰臣松之以為今之虛封蓋自此始也搜神記曰張顥為梁相天新雨後有鳥如山鵲飛翔墮地市人擿之隨地化為石顥椎破之得一金印文曰忠孝侯顥藏之秘府後校書東觀奏言曰堯舜時朝有此官今落印宜可復置宦者封漢書曰高后大謁者寺人張澤勸王諸呂封建陽侯東觀漢託曰孫程為中黃門安帝崩初江京等譖誣太子廢為濟陰王居西鍾下徵北鄉侯為嗣程等十八人殺江京閻顯等立濟陰王為帝以功封程為浮陽侯萬戶又封中黃門王康華容侯王國為酈侯續漢書曰呂強為中黃門靈帝例封官者以強為都鄉侯強辭讓懇惻帝乃聽之數上書諫諍為中常侍趙忠等所譖死晉起居注曰惠帝永平元年詔曰中常侍董猛固讓封邑其封為武安侯猛前求餘戶封三兄今皆封為亭侯遜讓史記曰晉文公賞從亡者未至隱者介之推推亦不言祿使人召之則亡遂求所在聞其入緜上山中於是文公環緜山而封之以為介推田號曰介山且記吾過以旌善人旌表之也又曰魯連說魏人新垣衍以帝秦之害秦軍為卻平原君欲封魯連魯連辭謝者三曰吾與富貴而屈於人寧貧賤而肆意戰國策曰趙王以武城封孟嘗君擇舍人以為武城吏而進之曰鄙說借車者馳之借衣者被之夫所借衣車者非親即兄弟也夫馳親友之車被兄弟之衣文以為不可今趙王不以文不肖封之以武城願大夫之往也無伐樹木無廢室屋然趙王悟而知文也僅可使全而歸之漢書曰初武帝遺詔以討莽何羅功封金日磾為秺侯日磾以帝少不受封又曰武帝詔曰匈奴逆天理亂人倫車騎將軍青度西河至高闕輕銳之卒執訊獲醜驅馬牛羊百有餘萬全甲兵而還益封三千戶以千戶封青三子皆為侯青固謝云皆諸校尉之力臣青子在繈緥中未有勤勞而受之封非臣待罪行間以勸士力戰之意又曰張延壽歷位九卿國在陳留別邑在魏郡租入歲千餘萬延壽自以身無功德何以久堪數上書減戶邑天子以為有讓迺封平原并一國戶口如故而租稅減半又曰張賀為掖庭令收養皇曾孫恩甚密皇曾孫即位是為宣帝而賀巳死欲封其冢為恩德侯其子彭祖小與上同席研書欲封之先賜爵關內侯賀弟安世深辭讓上曰吾自為掖庭令不為將軍也安世乃不敢言東觀漢記曰竇融數辭爵位曰臣有一子質性頑鈍何況乃當傳以連城廣土享諸侯之國也因會見詔曰公欲讓職還土今相見不宜論也又曰永元元年以定策功增封鄧騭三千戶讓不獲遂逃避使者上䟽自陳又曰劉愷字伯預以當襲父爵封居崇侯讓與弟憲有司奏之侍中賈逵上書陳之和帝詔愷致國於弟遁亡所守彌固乃拜為郎又曰丁綝拜河南太守及封功臣上令各言所樂綝曰昔孫敖教其子受必求磽確之地綝德薄功微鄉亭可矣上從之封為定陵謝安鄉食千戶又曰帝欲封樊興置印綬於前固讓曰臣未有先登陷陣之功一家數人並受爵土令天下觖望上嘉興之讓不奪其志又曰封朱祐為高侯邑七千三百戶祐自陳功薄而國大願受南陽五百戶足矣上不許也又曰翟歆字敬子父于以功封臨沮侯歆當嗣爵以母年老國遠上書辭讓詔許乃賜關內侯又曰丁綝卒子鴻上書讓國於弟盛既葬乃挂縗結冢盧而逃又曰大將軍竇憲封舞陽侯食邑二萬戶憲固辭封詔曰大將軍憲前歲出征克滅北狄朝加封賞固辭不受舅氏舊典並蒙爵土其封憲冠軍侯邑二萬戶魏志曰田疇從太祖入盧龍塞太祖猶欲侯之疇素與夏侯悙善太祖語悙曰且往以情喻之荅曰疇負義逃竄之人耳蒙恩令活巳為多矣豈可賣盧龍塞以易賞祿哉獨不愧於心乎太祖知不可屈乃拜為議郎魏志曰王基拔壽春進封東武侯上䟽固辭歸功參佐由是長吏司馬等七人皆侯又曰司馬宣王誅曹爽進蔣封都鄉侯上䟽固辭不許孫盛曰蔣濟之辭邑可謂不負心矣蔡邕獨斷曰漢揔名諸侯王子弟封者為諸侯異姓者為徹侯避武帝諱曰通侯法律家皆曰列侯功德優朝廷所異者賜位在三公下其次諸侯在九卿下其小國侯以肺腑宿公親公主子孫墳墓於京師者亦隨會見猥諸侯誅貶漢書曰高帝子淮南厲王長孝文六年謀反徙蜀至雍死趙王如意趙王恢趙王友為呂后所殺孝景子膠東王自殺孝武子燕王旦廣陵王胥並自殺齊王肥子濟北王興居濟南王辟光膠西王卬膠東王雄渠高帝兄子吳王濞弟孫楚並反伏誅淮南王長子安衡山王賜江都王非子建並謀反誅楚王六世孫延壽淮南王曾孫寬並謀反死武帝子孫侯者凡坐酎金等失侯及誅免者一百九人又曰陳平薨子何代立坐略人妻棄市國除始平曰我多陰謀道家所禁吾世即廢亦巳矣終不能復興又曰平陽侯曹參六世孫宗坐闌入宮掖門配城旦留侯張良子不疑坐謀殺楚內史贖為城旦封絕其餘功臣子孫皆罪誅輒復立嗣又曰高后封諸呂五人為侯八年九月並誅張澤一人免孝文元年軹侯薄昭自殺景帝魏其侯竇嬰有罪棄市武帝樂通侯欒大斬昭帝安陽侯上官桀桑樂侯安反誅宣帝平丘侯王遷自殺昌永侯田廣明自殺陽成侯田延年盜都內錢自殺元帝樂安侯匡衡免成陵侯淳于長大逆誅宜鄉侯馮參自殺商陽侯薛宣坐不忠孝免哀帝丁明傅晏丁滿朱愽王嘉傅商鄭崇董賢孫寵息夫躬並誅免平帝甄豐劉歆為王莽所殺高陵侯翟方進子盧坐弟舉兵為王莽所殺東觀漢記曰光武子楚王英謀反自殺廣陵王荊詛自殺又曰成德侯朱鮪玄孫杞坐殺人國除昌成侯桓公孫述坐與楚謀反國除又曰魏成曾純坐訐訕國除山桑侯王常孫廣坐楚事國除利取侯畢尋玄孫守坐奸人妻國除首卿侯叚普曾孫勝坐殺婢國除夕陽侯邢崇孫之為賊所盜亡印綬國除廣平侯吳漢無後國除頴陽侯祭遵無子國除華嶠後漢書曰傳俊子昌徙封蕪湖侯建初中遭母憂固上書以國貧不之封乞錢五萬為關內侯肅宗貶為關內侯竟不賜錢魏志曰曹洪性恡文帝少時求假不稱恨之後犯罪死太后謂郭后曰今曹洪犯死吾勑帝廢后后泣涕請乃得免官削爵土又曰彭城王據坐私遣人詣中尚方作禁物削戶二千申王袞楚王彪並入朝犯京都禁削縣戶又曰楚王彪坐王陵同謀延彪都昌遣御史案驗收治使自圖乃自殺又曰黃初三年臨淄侯植監國謁者灌均希旨奏植酒悖刦脅使者有司奏治罪帝以太后故貶為安都侯
