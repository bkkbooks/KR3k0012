body:
  text: 皇親部十昭儀漢書外戚傳曰武帝制婕妤娙娥容華充衣各有爵位而元帝加昭儀之號位次丞相爵比諸侯王婕妤視上卿比列侯漢書曰孝元馮昭儀哀帝祖母也河內人少為上官太后才人元帝進幸有寵為人才略善事人下至宮人左右飲酒酹地皆祝延之産一男一女女為平都公主男為定陶恭王漢書曰孝元馮昭儀平帝祖母父奉世為執金吾上幸虎圈鬭獸後宮皆坐熊佚出圈攀檻欲上殿左右貴人昭儀等皆驚走馮婕妤直前當熊而立左右殺熊上問人情驚懼何故前當婕妤曰猛獸得人而止妾恐熊至御座故身當之元帝嗟嘆以此倍敬重焉男立為信都王尊婕妤為昭儀元帝崩為信都太后與王俱居儲元宮宮名在長安城西又曰孝成趙皇后本長安宮人生時父母不舉三日不死乃收養及壯屬陽阿主家學歌舞號曰飛燕帝微行過陽阿主作樂見飛燕而悅之召入宮大幸有女弟復召入俱為婕妤貴傾後宮許后廢立為皇后後寵小衰而弟更幸為昭儀居昭陽舍其中庭彤朱殿上髹漆砌皆銅呇金塗白玉階璧帶往往為黃金紅鉛藍田璧明珠翠羽飾之後宮未嘗有焉魏志序曰魏因漢法母后之號皆如舊制自夫人以下世有增損太祖建國始命王后其下五等有夫人昭儀婕妤容華美人明帝又置淑妃昭華後魏書曰世祖左昭儀文明皇后馮氏之姑父朗坐事誅后遂入宮昭儀雅有母德鞠養教誨年十四高宗踐極選后為貴人皆是昭儀撫訓之力又曰孝文馮昭儀廢后馮氏姊也高祖還洛后恩遇甚厚昭儀先以疾病文明太后遣還家為尼太后崩服終高祖重引為左昭儀至洛稍有寵后禮愛漸衰昭儀自以年長且前入宮掖素見待厚規為內主譖構百端帝遂廢后為庶人昭儀寵愛過本專寢當夕宮人稀復進見後遂立為皇后沈約宋書曰漢元帝制昭儀世祖省之晉泰始二年又置昭華昭儀等以備九嬪也崔鴻三十國春秋前趙録曰嘉平二年立司空王育女為左昭儀尚書令任顗女為右昭儀晉書載記曰石勒定昭儀夫人位視上公貴嬪貴人視列侯員各一人三英九華視伯淑媛儀視子容華美人視男務簡賢淑不限員數西京雜記曰趙后腰體弱善行步進止女弟昭儀不能及弱骨豐肌尤工笑語為當時第一皆擅寵後宮西京賦曰增昭儀於婕妤賢既公而復侯唐書曰高宗六年將立昭儀武氏為皇后長孫無忌屢言不可帝後召于志寧等謂曰武昭儀有令德朕欲立為皇后卿等以為如何志寧曰自貞觀二十三年後先朝付託遂良望陛下問其可否竟不從無忌等言而立昭儀為皇后夫人周禮注曰三夫人之於后猶三公之於王坐而論婦禮無官職者矣禮記婚義曰古者天子后立六宮三夫人九嬪二十七世婦八十一御妻以聽天下之內治以明章順故天下內和而家理五經要義曰古者后夫人必有女史彤管之法后妃君妾以禮御于君所女史書其日月授其環以進退之生子月娠則以金環退之當御者以銀環進之著于左手既御著于右手左手陽也以當就男故著右手陰也既御而復故此女史之職也史記曰武帝時幸夫人尹婕妤邢夫人號娙徐廣曰五耕反娥秩比中二千石尹夫人邢夫人同時並幸有詔不得相見尹夫人自請武帝許之即令他夫人飾徒御者數十人來前尹夫人見之曰非邢夫人身也帝曰何以言之對曰視其形貌體狀不足以當人主於是有詔使邢夫人衣故衣獨身來前尹夫人望見之曰真是矣於是乃低頭俯而泣自痛其不如也諺曰美女入室惡女之仇漢書曰漢興因秦之稱號妾皆稱夫人有美人良人八子七子長使之號焉又曰漢王得定陶戚姬愛幸生趙隱王如意高祖崩惠帝立呂后為皇太后乃令永巷囚戚夫人髡鉗衣赭衣令舂戚夫人舂歌曰子為王母為虜終日舂薄暮常與死為伍相離三千里當誰使告汝太后遂斷戚夫人手足去眼熏耳飲以瘖藥使居鞠域中名曰人彘又曰高帝薄姬文帝母也少時與管夫人趙子兒相愛約曰先貴無相忘也而管先幸漢王四年坐河南成皋靈臺此兩美人相與笑問其故兩人俱以實告王心悽然憐薄姬是日召而幸之又曰孝武李夫人本以倡進初夫人兄延年性知音善歌舞武帝愛之每為新聲變曲聞者莫不感動延年侍上起舞歌曰北方有隹人絶世而獨立一顧傾人城再顧傾人國寧不知傾城與傾國隹人不可得上嘆息曰善世豈有此人乎平陽主因言延年有女弟上乃召見之實妙麗善舞由是幸生一男是為昌邑哀王李天人少而蚤卒上憐閔焉圖畫其形甘泉宮齊人少翁能致其神乃夜張燈燭帷帳陳酒肉而令上居他帳望見好女如李夫人之貌不得就視上愈益感為作詩曰是耶非耶立而望之偏何姍姍其來何遲令樂府諸音家絃歌之上自為作賦以傷悼夫人又曰孝武鉤弋趙婕妤昭帝母也家在河間武帝巡狩過河間望氣者言此室有奇女天子氣使召之既至女兩手皆拳上自披之手即時伸是得幸號曰拳夫人後漢書曰陳夫人者家本魏郡少以聲伎入孝王宮得幸生質帝亦以梁氏故榮寵不及焉魏志曰魏因漢法母后之號皆如舊制自夫人以下世有增損太祖建國始命王后其下五等有夫人有昭儀有婕妤有容華有美人明帝增淑妃昭華修儀太和中始復命夫人登其位於淑妃之上自夫人以下爵凡十二等貴嬪夫人位次皇后魏志曰文德郭皇后有智數時有所獻納文帝之為嗣后有謀焉太子即位后為夫人王隱晉書曰胡芳以選入宮父奮哭曰老奴不死唯有二兒男入九地之下女上九天之上後拜芳夫人元后臨終有命先來臨者有賞胡夫人自排人徑前辭訣咸寧二年立皇后楊氏封父駿臨晉侯駿漸驕慢奮語駿卿恃女更豪也與天家作婚者未有不滅門駿曰卿女不在天家也奮曰我女與卿女作婢耳何能增損後魏書曰明元昭哀皇后姚興之女太宗以后禮納之後為夫人后以鑄金人不成未升尊位然帝寵幸出入居處禮如后焉晉中興書曰簡文宣皇后鄭氏字阿春榮陽人也先過渤海田氏生一男夫亡后依舅濮陽吳氏中宗為丞相敬后先崩將納吳氏女為夫人后及吳氏女並遊后園有見之者言於中宗曰鄭氏雖嫠居賢於吳氏遠矣遂以德色納為夫人甚有寵沈約宋書曰晉武採漢魏之制置貴嬪夫人貴人是為三夫人位視三公晉起居注曰有司奏今月九日當拜鄭夫人后婕妤桉儀注應服雀叉袿襈列仙傳曰鉤弋夫人右手拳姿色甚偉帝披其手得一鉤而手尋伸生昭帝既而帝害之殯尸不臭而香數月昭帝既即位更葬之棺空但有系履故名其宮曰鉤翼後避諱改為弋廟有神祠焉西京雜記曰高帝戚夫人善鼓瑟擊筑帝擁夫人倚瑟而絃歌畢泣下流連夫人善為翹袖折腰之舞歌出塞望歸之曲侍婢數百人皆為之後宮齊唱常入雲霄又曰戚夫人以百煉金為彄環照見指骨上惡之以賜侍兒鳴王曜光等各四枚又曰戚夫人侍兒賈佩蘭後出為扶風人假儒妻說在內時戚夫人侍高祖常以趙王如意為言高祖思之或半日不言歎息悽愴而未知其術輒倚夫人夫人擊筑高祖自歌大風詩以和之又曰武帝以象牙為簟賜李夫人又曰武帝遇李夫人就取玉簪搔頭自此宮人搔頭皆用玉貴人東觀漢記曰光烈陰皇后上即位立為貴人上以后性賢仁宜母天下欲授以尊位后輒退讓自陳不足以當大位又曰章帝宋貴人時竇皇后內寵方盛以貴人名族節操高妙心內害之欲為萬世長計陰設方略讒毀貴人由是母子見踈數月誣奏貴人使婢為蠱道祝詛七年遂被譖暴卒又曰孝和陰皇后聰慧敏達有才能善史書永元二年選入掖庭為貴人託以先后近屬故有寵後漢書曰順烈梁后永建三年與妬俱入掖庭時年十三太史卜兆得封房又筮得坤之比遂以為貴人常時被引御從容辭曰願陛下思雲雨之均澤識貫魚之次序使小妾得免罪謗之纍由是帝加敬焉又曰桓思竇后延熹八年選入掖庭為貴人其冬立為皇后而御見甚稀帝所寵唯采女田聖等永康元年冬帝寢疾遂以聖等九女皆為貴人東觀漢記曰申貴人生孝穆皇帝趙夫人為穆皇后匽夫人生桓帝帝既立追諡趙夫人為穆皇后匽夫人為博園貴人和平元年桓帝詔曰博園匽貴人履高明之懿德咨淑美之嘉會與天合靈篤生朕躬欲報之德詩所感歎今以貴人為孝崇皇后又曰孝桓帝鄧后字猛父香早死猛母宣改嫁為掖庭民梁紀妻紀者襄城君孫壽之男也壽引進令入掖庭得寵為貴人故冒姓為梁氏續漢書曰光武郭皇后聖通世祖至真定納聖通有寵世祖即位以為貴人魏志曰文帝納甄后於鄴有寵生明帝郭后李貴人並愛幸后愈失意有怨言王隱晉書曰武帝臨軒拜諸葛婉為夫人李曄為貴人後魏書曰文成馮后生有神光之異高祖踐極以選為貴人又曰文成光皇后李氏梁國蒙縣人也頓丘王峻妹后之生也有異於常父方叔常言此女當太貴及長姿質美麗永昌王仁得後遇事誅后與其家人送平城宮高祖登白樓望見之謂左右曰此婦人佳乎乃下臺后得幸於齊庫中遂有娠守庫者亦私書壁記之後驗問皆相符同生顯祖拜貴人沈約宋書曰貴嬪文帝所制貴人漢光武制泰始二年又省貴人置貴姬婕妤漢書曰婕妤視上卿比列侯又曰孝宣皇帝之為曾孫也暴室嗇夫許廣漢有女平君年十四五配曾孫數月曾孫立為帝平君為婕妤是時霍將軍有小女與皇太后公卿議更立皇后皆心議霍將軍女亦未有言上乃詔求微時故劍大臣知旨白立許婕妤為皇后又曰孝宣王皇后父奉光少時鬭雞宣帝在民間數與奉光會相識奉光有女年十餘歲每當適人所當適者輒死故久不行及宣帝即位召入後宮為婕妤是時館陶公主母婕妤及淮陽憲王母張婕妤楚孝王母衛婕妤皆愛幸皇后廢後上憐許太子早失母幾為霍氏所害於是乃選後宮素謹慎而無子者遂立王婕妤為皇后令母養太子又曰孝成班婕妤成帝初即位選入後宮始為少使俄而大幸為婕妤居增城合歡宮再就館有男數月失之成帝遊於後庭嘗欲婕妤同輦載婕妤辭曰觀古圖書賢聖之君皆有名臣在側三代末主乃有嬖女今欲同輦得無近似之乎上善其言而止太后聞之喜曰古有樊姬今有班姬世說曰漢成帝幸趙飛燕讒班婕妤呪詛帝乃考問婕妤對曰妾聞死生有命富貴在天修善尚不蒙福為邪欲以何望若鬼神有知不受邪佞之訴如其無知訴之何益故不為也漢書曰成帝隆於內寵班婕妤進侍者李平得幸立為婕妤上曰始衛皇后亦從微起乃賜平姓曰衛所謂衛婕妤又曰中山衛姬平帝母也父子豪中山盧奴人官至衛尉子豪女弟為宣帝婕妤生楚孝王長女又為元帝婕妤生平陽公主成帝時中山孝王無子以衛氏吉祥以子蒙少女配孝王元延四年生平帝魏志曰太祖建國始命王后其下有婕妤五等晉服制令曰婕妤銀印青綬佩朱瓄玉婦人集曰漢元帝賜婕妤書曰問飛燕趙婕妤夫上有誠必應以實憤悶充中必形於色詩云鼓鍾于宮聲聞于外猶此言之真僞之效難以欺矣夫君子貴素文足通殷勤而已亦何必華辭哉自以親婕妤異於他人故不能無言亦不以深相過望前數以顏色不平應對舒遲為譴卒不能自改婕妤方見親幸之時老母在堂兩弟皆簪金貂並侍於側同列比舍豈不謂婕妤妹弟尊幸哉今過蒙譴獨謂老親兩弟何班婕妤報諸姪曰記言屬見元帝所賜趙婕妤書以相比元帝被病無悰但煆鍊後宮貴人書也類多華辭至如成帝則推誠寫實若家人夫婦相與書矣何可比也故略陳其長短今汝曹自評之後魏書曰御史中尉李彪有女幼而聰令彪每奇之教書學讀誦經傳曾謂所親曰此女當興我家卿曹各得其力彪亡後世宗聞名納為婕妤在宮常教帝妹書誦授經史世宗崩婕妤為比丘尼通習經義法座講說諸僧歎重之
