body:
  text: 居處部十六窗説文曰窗穿壁以木為交窗所以見日也向北出牖也在牆曰牖在屋曰窗又曰櫺楯間子也櫳房室之疏也釋名曰窗聰也於內視外為之聰明大戴禮曰隨武子牖之銘曰隨天之時以地則之敬祀皇天敬以先時禮記郊特牲曰薄社北牖使陰明也又儒行曰蓽門閨竇蓬戶甕牖論語曰伯牛有疾子問之自牖執其手曰亡之命矣夫五經典義曰虞主埋之廟北牖下北方無事虞主亦無事也東觀漢記曰明德馬后不喜出入遊觀希嘗臨御窗牖老子曰鑿戶牖以為室又曰不窺牖見天道漢官封禪儀曰泰山有天窗三輔黃圖曰明堂有七十二牖孝經注曰明堂之制八窗四闥東宮舊事曰閣內有曲鄣鄣上雀目窗又曰宮有四面窗八所綾綺連錢及青匡郭飛板郭子曰滿奮畏風在武帝坐北窗作琉璃扉實密似踈奮有難色帝問之對曰臣若吳牛見月而喘西京雜記曰昭陽殿窗戶扉多是緑琉璃皆通照毛發不得藏焉漢武故事曰西王母降東方朔於朱雀牖中窺母母謂帝曰此兒無賴久被斥逐原心無惡尋當得還又曰帝起超神屋有雲母窗珊瑚窗賢聖冢墓記曰東平思王奢靡及死生葬所幸奴婢著銅窗內令守冢五行數曰太公金匱牖之書曰窺望端審且念所得可思所忘李尤牖銘曰天設窗牖開光照陰施于明堂以象八風陸機詩曰安寢北堂上明月入我牖照之有餘輝覽之不盈手靈光殿賦曰玉女窺窗而下視文選詩曰窗中列遠岫蜀都賦曰列綺窗以瞰江古詩曰盈盈樓上女皎皎當窗牖又曰文踈結綺窗何閣三重階檻漢書曰朱雲忠諫攀檻檻折及治上曰勿易因而輯之以旌直臣文選曰伏櫺檻而俯聽聞雷霆之相激魯靈光殿賦曰軒檻蔓延楚詞曰坐堂伏檻臨曲池又曰照檻兮扶桑椽説文曰椽欀也桷也橑欀也秦謂之欀周謂之椽魯謂之桷通俗文曰屋加椽曰橑來早切漢書解詁曰桷椽也諸侯丹桷以丹色也詩曰松桷有挻穀梁曰刻桓宮桷禮天子之桷斫之磨礱之加密石焉諸侯之桷斷之礱之大夫斫之士斫本刻桷非正也左傳曰宋人伐鄭以太宮之椽為盧門之椽續漢書曰蔡雍避難在吳告人曰吾昔經會稽高遷亭見屋椽竹從東間數第十六可以為籥取用果有異聲張璿漢記曰梁冀起臺殿梁柱椽桷鏤為青龍白虎畫以丹青雲氣戰國策曰或謂孟嘗君曰廊廟之椽非一木之枝先王之法非一士之智漢武故事曰上起神屋以金椽為刻玳瑁為龍虎禽獸以薄其上狀若隱起龍首皆作龍形龍首銜鈴流蘇懸之西京雜記曰照陽殿椽桷皆刻作蛇龍縈繞其間鱗甲分明見者莫不驚栗韓子曰堯舜采椽不刮茅茨不剪簷説文曰簷㮰也又曰楣秦名屋聯櫋也齊謂之簷楚謂之梠釋名曰簷椄也椄屋前後也梠旅也連旅之或謂之櫋櫋綿也連綿榱頭使平也上入曰雀頭形似爵也禮記明堂位曰復廟重簷天子之廟飾也穀梁傳文公曰壞廟之道易簷可也爾雅曰簷謂之樀郭璞曰屋楹也梲爾雅曰梁上楹謂之梲漢官解詰曰梲梁上柱也諸侯藻梲為藻文也華延俊洛陽記曰堂皇宮殿皆石玉璫龍桷藻梲禮記禮器曰管仲鏤簋朱紘山節藻梲君子以為濫矣楶爾雅曰栭謂之楶郭璞曰注即櫨也三輔故事曰王莽起九廟為銅鑮櫨楊子法言曰吾未見斧藻其德若斧藻其楶者也枅爾雅曰笄謂之疾郭璞注曰柱上薄也亦名枅犍為舍人曰朱儒下小方木廣雅曰薄謂之枅曲枅謂之欒説文曰枅屋強也王延壽靈光殿賦曰曲枅夭矯而環勾韋仲將景福殿賦曰於是周覽升降流目詳觀叢楹負極飛櫨承欒枅梧綺錯梲楶鮮攢鋪首通俗文曰門扇飾謂之鋪首説文曰門扇環謂之鋪首風俗通曰門戶鋪首百家書云輸般見水上蠡謂之曰開汝頭見汝形蠡適出頭般以足畫圖之蠡引閉其戶終不可開設之門戶欲使閉藏當如此固密也揚雄甘泉賦曰排玉戶而楊金鋪兮發蘭蕙與穹窮李尤平樂觀賦曰過洞房之輔闥歷金環之華鋪藻井風俗通曰殿堂象東井形刻作荷蓤水物所以厭火也西都賦曰蒂倒茄於藻井披紅葩之狎獵魏都賦曰綺井列疏以懸蒂注疏布也以板為井形飾以丹青如綺也王延壽魯靈光殿賦曰圓析方井反植荷蕖緣房紫的咄吒垂珠左思魏都賦曰綺井列疏以懸蒂華蓮重葩以到披曹植七啓曰綺井含葩金壁玉箱顏延之七繹曰木寫雲氣土祕椒芳既挻天而到井又斫圓而鏤方鴟尾晉中興書曰泰元十年鸛巢太極殿東鴟尾晉安帝紀曰義熙六月雷震太廟鴟尾徹壁柱若有文字宋武大明元年五月戊午嘉禾一株五莖生清暑殿鴟吻中陳書曰高祖二年戊辰重雲殿東鴟吻有紫煙出屬天唐會要曰漢柏梁殿災後越巫言海中有魚虬尾似鴟激浪即降雨遂作其象於屋以厭火祥時人或謂鴟吻非也質礎尚書大傳曰大夫有石材庶人有石承注曰石材柱下質也石承當柱下而已不外出為飾説文曰礩柱下石也古以木今以石廣志曰舄石有五色者光澤以為柱礩出苑蓬山戰國策曰智伯攻趙襄子襄子之晉陽謂張孟談曰吾城郭完倉廩實銅少奈何孟談曰臣聞董安于之治晉陽公之堂皆以黃銅為柱礩請發而用之則有餘銅矣古史考曰秦始皇使刑徒七萬人作驪山以北山石為舄異物志曰大秦國以水精為舄淮南子曰山雲蒸柱礎潤張衡西京賦曰雕楹玉舄何平叔景福殿賦曰金楹齊列玉舄承跌奧論語八佾曰與其媚於奧寧媚於竈爾雅曰西南隅謂之隩郭璞注曰室中隱隩處通俗文曰奧內曰扆韓子曰衛將軍文子見曾子曾子不起而延之於坐席正身見於奧文子謂其御曰曾子愚人哉以我為君子也君子安可不敬以我為愚人愚人安可侮也呂氏春秋曰苑春諫衛公云君因隅隩有竈不知寒矣屋漏毛詩蕩抑曰相在爾室尚不愧于屋漏爾雅曰東北隅謂之屋漏郭璞注曰屋漏義未詳也犍為舍人曰古者撤屋西北猥以炊浴沒者訖而復之古謂之屋漏也宦爾雅曰東北隅謂之宦郭璞注曰義未詳犍為舍人曰東北陽氣始起萬物所養故謂之宦説文曰宦養也室東北隅食所居也窔爾雅曰東南隅謂之窔郭璞注曰窔暗也犍為舍人日東北萬物生蟄蟲必出蟄不由戶窔釋名曰窔幽也亦取宜也磚詩曰乃生女子載弄之瓦瓦紡磚也又曰中堂有甓注一名瓴甋晉書曰陶侃字士行在廣州無事輒朝運百甓於外暮運於內人問其故答曰吾方致力中原過爾優逸恐不堪事宋書范曄母如廁而産額為磚所傷故以磚為小字瓦説文曰瓦土器已燒之惣名也禮記曰有虞氏瓦棺又曰毀方而瓦合史記曰秦軍武安西鼓譟勒兵武安屋瓦盡震漢書曰霍光巷行人見有人在屋上撤瓦投地就視不見而霍氏誅又曰平帝元始四年東風吹長安城東門屋瓦盡落魏志曰魏文帝謂周宣曰朕夢殿上雙瓦落地化為鴛鴦何也宣曰後宮當有暴死者須庾後宮相害死者吳録曰景帝時戎將於廣陵掘諸冢取版磚以城所壞甚多晉書曰張孟陽貌醜嘗從潘嶽遊洛陽市嶽美貌群女爭以果擲嶽滿車廂孟陽被投之瓦石博物志曰桀作瓦古史曰昆吾氏作瓦老子曰挻埴以為器夢書云夢見瓦為甲鎧禦禍患春秋潛巴潭曰宮瓦自墜至死不祥漢武故事云上起神屋以銅為瓦莊子曰雖有忮心不怨飄瓦又曰以瓦注者巧注射賭物也所賭輕則意巧又曰陶者曰我善冶埴大秦記曰大秦以水精為瓦枹朴子曰班狄不能削瓦石為芒針燕子丹曰荊軻之東宮臨池拾瓦投蛙太子進金瓦
