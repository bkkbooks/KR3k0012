body:
  text: 服章部十三帶說文曰帶紳也男子鞶帶婦人帶絲象繫佩之形帶必有巾故從巾釋名曰帶蔕也著於身如物帶也易訟卦曰或錫之鞶帶終朝三禠之鞶命服之上飾革帶也禮記玉藻曰革帶博二寸漢書曰文帝遺匈奴黃金飾具帶一黃金犀毗又班固與竇將軍牋云復賜固犀毗金頭帶此將軍所帶也東觀漢記曰楊賜拜太常詔賜自所服冠幘綬玉兼革帶又曰鄧遵破匈奴上賜金剛鮮卑緄帶一具典略曰文帝嘗賜劉楨廓落帶其後師死欲取以為象因書啁楨云夫物因人而貴故在賤者之所不御至尊之側楨荅曰荊山之璞耀元后之寶隨侯之珠燭眾女之好南垠之金登窈窕之首鼲鼯之尾綴侍臣之幘此皆伏朽壞之下潛汙泥之中而楊光千載之上發采疇昔之外楨所帶無他妙飾若實殊異上可納也魏略曰踈勒王獻大秦赤石帶一枚又曰漢陽嘉三年踈勒王獻海西責石金帶吳書曰陸遜破曹休於石亭上脫御金校帶以賜遜又親以帶帶之為鉤絡帶吳錄曰鉤絡者鞍飾革帶也世名為鉤絡帶齊書曰張融形皃短醜精神清徹王敬則見融革帶寬殆將至骼謂曰革帶太急融曰既非步吏急帶何為後周書曰隨文作相李穆曰周德既衰愚智共悉天時若此豈能違天乃遣使謁隨文帝并上十三鐶金帶蓋天子服也以微申其意戰國策曰魯仲連謂田單曰將軍黃金橫帶而馳乎淄繩之間有生之樂無死之心楚漢春秋曰北郭先生獻帶於淮陰侯曰牛為人任用力盡猶不置其革吳時外國傳曰大秦國人皆著袴褶絡帶又曰扶南人悉著鉤絡帶穆天子傳曰天子北征舍于珠澤獻白玉食天子賜黃金之環三五朱帶具飾三十西征至赤烏氏先出自周宗乃賜赤烏之人具帶五十鄴中記曰石虎皇后女騎腰中著金環參鏤帶述異記曰夏侯祖欣為兗州剌史喪於宮沈僧榮代之祖欣見形詣僧榮沈床上有一織成寶飾絡帶夏侯曰此帶殊好豈能見之與沈曰甚善夏侯曰卿直許終不見關必以為施可命焚與沈沈對前燒視此帶已在夏腰矣應璩新詩曰革帶繩為複舄穿無底大帶論語衛靈公曰子張問行子曰言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉子張書諸紳紳大帶詩芃蘭曰容兮遂兮垂帶悸兮容儀可觀佩玉遂遂然垂其紳帶悸悸焉有節度又野有死麕曰無感我悅兮無使尨也吠又都人士曰彼都人士垂帶而厲彼君子女卷髮如蠆匪伊垂之帶則有餘匪伊卷之髮則有旟旟揚也又鳴鳩曰淑人君子其帶伊絲其帶伊絲其弁伊騏騏騏文也弁皮弁也其帶伊然謂大帶也大帶用素絲以雜色飾焉騏當作琪以玉為之禮玉藻曰凡侍於君紳垂足如履齊紳垂則磬折齊裳下緝又曰紳長制士三尺有司二尺有五寸子游曰三分帶下紳居二焉韠結三齊又曰素帶終辟大夫素帶辟垂士練帶率下辟居士錦帶弟子縞帶素帶終辟謂諸侯也辟讀如裨冕之裨謂以繒采飾其側也裳釋名曰上曰衣下曰裳裳障也以自障也易坤卦六五曰黃裳元吉象曰黃裳元吉文在中也又易繫曰黃帝堯舜垂衣裳而天下治尚書大傳曰舜曰精華已竭褰裳去之詩緇衣曰子惠思我褰裳涉洧又鷄鳴曰東方未明顛倒衣裳箋云挈壺氏掌漏刻之節東方未明而為已明也又葛屨曰摻摻女手可以縫裳摻摻猶纖纖也要之襋音戟之好人服之要䙅襋領也又七月曰載玄載黃我朱孔陽為公子裳陽明也又鴻鴈曰乃生男子載衣之裳載弄之璋禮玉藻曰衣正色裳間色又曲禮上曰諸母不漱裳左傳曰華登以吳師救華氏齊烏枝明曰用少莫如齊致死齊致死莫如去備彼多兵矣請皆用劍從之華氏北復即之廚人濮以裳裏首而荷以走曰得華登矣遂敗華氏干新里春秋演孔圖曰驅除名政衣吾衣裳坐吾曲床濫長九州滅六王至于沙丘亡後漢書曰祭遵為人廉約夫人裳不加緣東觀漢記曰鮑宣妻桓氏女字少君宣嘗就少君父學父奇其精苦以女妻之裝送甚盛宣謂妻曰少君生富驕習美飾而吾貧賤不敢當禮妻乃悉歸侍御服飾更著短布之裳續漢書輿服志曰樊噲常持鐵揗聞項羽有意殺漢王噲裂裳以褁楯冠之入軍門立漢王旁管子曰桀之時女樂三千人無不服文繡衣裳者鄧析子曰責疲者以舉千鈞督跛者以及走兔驅騏驥於廷求猨猴於檻斯逆理而求之猶倒裳以索領也晏子春秋曰景公飲酒數士衣埱繡之裳一衣而五采具焉又曰景公飲酒數日去冠披裳自鼓盆甕而已淮南子曰楚欲攻宋墨子聞之自魯趍而往十日十夜足重繭而不休息裂裳而褁之至於郢見楚王風俗通曰禹入祼國欣起而解裳俗說禹治洪水乃播入祼國君子入俗不改其恒於是欣然而解裳也原其所以當言皆裳祼國今吳即是也被髮文身祼以為飾蓋正朔所不及也猥見大聖之君悅禹文德欣然皆著衣裳矣郭子橫洞冥記曰東方朔生三日而母死鄰母得而養之經歲母忽失朔累月暫歸後復去家萬里見一枯樹脫白布裳掛樹裳化為龍嵇康集自錄曰孫登字公和於汲郡北山中為土窟夏則編草為裳冬則以髮自覆崔駰達旨曰有事則褰裳濡足劉梁七舉曰黼黻之服紗縠之裳繁飾參差微鮮若霜古樂府陌上桑曰秦氏有好女自名為羅敷緗綺為下裳紫綺為上𥜗傅玄裳銘曰上衣下裳天地則也服從其宜君子德也楚辭曰青雲衣兮白蜺裳又曰採辟荔以為裳又曰披綵裳之芬芳又曰制芰荷以為衣兮集芙蓉以為裳揚雄反騷曰被芙蓉之朱裳裙釋名曰裙下裳也連接裙幅也緝下撗縫緝其下也緣裙之柂緣也又曰裙裏衣也古服裙不居外皆有衣籠之揚雄方言曰陳魏之間謂裙為帔音披繞𥘞謂之裙東觀漢記曰王良為司徒司司直妻布裙徒跣曳柴續漢書曰漢明德太后禿裙不緣又五行志曰獻帝時女子好為長裙而上甚短魏略曰燉煌俗婦人作裙攣縮如羊腸用布一疋皇甫隆為太守禁改之魏志曰管寧恒著布裙宋書曰羊欣字敬元年二十時王獻之為吳興太守甚知愛之欣嘗夏月著新絹裙晝寢獻之入縣見之書裙數幅而去欣書本工因此彌善齊書曰魚復侯子響不道帝以兵圍之有司奏絕子響屬籍賜為蛸氏子響密作啟數紙藏妃王氏帬腰中具自申明云輕舫還闕而不得見此苦之深唯願矜之無使竹帛齊有反父之子父有害子之名後魏書曰河間人齊與太武攻赫連昌帝以微服入其城齊固諫不許乃與數人從帝入城內既覺諸門悉閉帝及齊等因入其宮中得婦人裙繫之槊帝乘而上因此得拔於齊有力焉北齊書曰世祖為胡皇后造真珠裙積所費不可勝計後被火燒之晉東宮舊事曰皇太子納妃有絳紗複裙絳碧結綾複裙丹碧紗紋雙裙紫碧紗紋雙裙紫碧紗紋繡纓雙裙紫碧紗縠雙裙丹碧杯文雙裙山陵故事曰梓宮有緗絳雙裙無腰晉宋舊事曰崇進皇太后為太皇太后有絳碧絹雙裙絳絹褥裙緗絳紗複裙由絹裙四王起事曰惠帝還洛陽得鹿犢車一乘以單帛裙為幃河東記曰西河無蠶桑婦女著碧纈裙上加細布裳秦州記曰婦人著裙制乃三千餘幅崔鴻十六國春秋後趙錄曰孟卓字君偉少脩苦之志著單裙十年不換西京雜記曰趙飛鷰為皇后其女弟上織成裙列女傳曰梁鴻妻孟光布裙荊釵汝南先賢傳曰戴良嫁五女皆布裙無緣裙四等真人內傳曰南極夫人被錦服青羽裙俗說曰車武子婦大姑夜恒出掩襲車車後呼其婦兄顏熙夜宿共眠取一絳裙掛著屏風上其婦果來拔刀逕上床發欲刃床上人定看乃是其兄於是慚羞而退繁欽定情詩曰何以合懽欣紈素三條裙乘晳近遊賦曰著紫裙之禆簁又曰帽有四角之隆裙有三條之殺裩晉書曰王澄之荊州送者傾城澄脫衣著犢鼻裩上樹取鵲𪆪音寇傍若無人晉記曰客詣劉伶值其祼袒因責伶伶笑曰吾以天為屋以屋為裩諸君不當入何怨乎宋書曰桂陽侯義融孫冕字茂德性庸鄙為郢州剌史暑月露禈上廳事齊書曰鬱林王常祼袒著紅縠緄梁書曰周弘正善玄理為當世所宗藏法師於開善寺講說門徒數百弘正年少未知名著紅禈錦紋髻踞關而聽眾人蔑之弗譴也既而乘間進難舉坐盡傾法師疑非世人覘知相賞狎弘正後為左民尚書夏月著犢鼻裩衣朱衣為有司所奏彈其放達如此又曰吉士瞻少時嘗於南蠻國中擲搏無禈褰露於儕輩所侮及平魯休烈軍得絹三萬疋乃作百裩其外並賜軍士不以入室又曰謝幾卿性通脫在省署夜著犢鼻裩與門生登閣道飲酒酣呼為有司糺奏坐免西京雜記曰司馬相如初與卓文君至成都遂相謀還成都賣酒相如自著犢鼻裩滌器以恥王孫也世說曰范宣潔行廉約韓伯字康伯為豫章太守遺百疋絹不受減五十疋復不受如是減半遂至一疋既終不受韓後與范載就車中裂二丈與范云人寧可使婦無裩耶范笑而受之阮籍大人先生傳曰群虱之處禪逃于深縫自以為吉宅君子之處城中何異虱處禈中乎竹林七賢論曰諸阮皆儒學富財唯阮咸好酒家貧俗七月七日曬衣諸阮庭中並列綈錦咸以長竿掛犢鼻布裩人問之曰未能免俗聊復爾耳語林曰桓宣武性儉著故禈上馬不調裩敗五形遂露
