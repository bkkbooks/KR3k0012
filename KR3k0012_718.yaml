body:
  text: 服用部十九鏡釋名曰鏡景也有光景也廣雅曰鑒謂之鏡玄中記曰尹壽作鏡大戴禮曰武王踐祚鏡之銘曰見爾前必慮爾後尚書帝命期曰桀失其玉鏡用之噬虎鄭玄注曰鏡喻清明之道虎喻暴也尚書考靈耀曰秦失金鏡魚目入珠金鏡喻明道也始皇不韋子言亂真也詩鄘柏舟曰我心匪鑒不可以茹鑒所以察形茹度也漢書東方朔傳曰郭舍人曰四銖籀文章皆有組索兩人相見朔能知之為上客朔曰此玉之塋石之精表如日光裹如衆星兩人相覩見相知情此名為鏡魏略曰夏侯惇從征呂布為流矢所中傷左目時夏侯淵俱為將軍軍中號惇為肓夏惇惡之每照鏡恚發輒撲鏡著地蜀志曰張𥙿曉相術每舉鏡視面自知未死未嘗不撲之于地沈約宋書曰劉敬宣八歲喪母四月八日敬宣見衆人灌佛乃拔頭上金鏡以為母灌因悲泣不勝又曰殷仲文在東陽照鏡而不見其頭面旬日而戮又蕭方等三十國春秋曰甘卓將被誅引鏡不見其頭又曰慕容垂攻鄴符丕遣其從弟龍請救乃遺謝玄青銅鏡黃金宛轉繩等以為之信齊書曰綦母珍之有一銅鏡背有三公字常語人云徵祥如此何患三公不至又曰陸慧曉遷太子洗馬廬江何點常稱慧曉心如照鏡遇形觸物無不朗然梁書曰王珍國武帝起兵東昏召珍國以衆還都使出屯朱雀門為王茂所敗及入城密遣郤纂奉明鏡獻成於梁帝帝斷金以報之後侍宴帝曰卿明鏡尚存昔金何在珍國曰黃金謹在臣不敢失墜又曰到溉子鏡字圓照初在孕其母夢懷鏡及生因以名焉隋書曰文帝委任高熲後右衛將軍龐晃及將軍盧賁等前後短熲於上上怒之皆被踈黜因謂熲曰獨孤公猶鏡也每被靡瑩皎然益明唐書曰太宗謂群臣曰夫以銅為鏡可以正衣冠以古為鏡可以知興替以人為鏡可以明得失朕常保此三鏡以防己過今魏徵殂猶一鏡亡矣莊於曰至人之用心也若鏡不將不迎應而不藏故勝物而無傷符子曰心能善知人如明鏡善自知者如淵蚌鏡以曜明故鑒人蚌以含珠故內照韓子曰古之人目短於自見故以鏡觀面智短於自知故以道正己鏡無見疵之罪道無明過之惡面失鏡則無以正鬢眉身失道則無以知迷惑呂氏春秋曰人之阿甚矣而無所鏡其殘亡無日矣孰當可鏡其唯士人乎鏡明己也細士明己也大淮南子曰明鏡之始矇然未見形容也及拭之以玄錫磨之以白氈則鬚眉微毛可得而察又曰鏡便於照形承食不如竹簞又曰聖人若鏡不將不迎將送也應而不倡故萬化無傷其得之乃失之也又曰高懸大鏡坐見四鄰取大鏡高懸盆中水晃見四鄰又曰人莫鑒於沫雨而鑒於止水者以其靜也沫兩潦上沫起言其濁擾也莫窺形於生鏡而窺形於明鏡者以其易也抱朴子內篇曰或問知將來吉凶為有道乎答曰用鏡九寸自照有所思存七月則神仙千里事也明鏡用一或二謂之日月或用四謂之四規鏡又曰萬物之老者其精皆能假託人形以炫人於鏡中不能易其真形是以入山道士以明鏡徑九寸懸於背有老魅未敢近或後來者視鏡中其是仙人及山中好神者鏡中故如人形蜀王本紀曰武都大夫化為女子蜀王娶以為夫人無幾物故葬於武都以石作鏡一枚表其墓魏名臣高堂隆奏曰陽符一名陽燧取火於日陰符一名陰燧取水於月並八銅作鏡名曰水火之鏡東宮舊事曰皇太子納妃有著衣大鏡尺八寸銀花小鏡尺二寸漆匣盛蓋銀華金薄鏡三枚銀龍頭受福蓮華鉤鎖四副魏武帝上雜物疏曰卿物有尺二寸金錯鏡一枚皇太子雜純銀錯七寸鐵鏡四枚貴人至公主九寸鐵鏡四十枚鄴中記曰石虎三人臺及內宮中鏡有徑二三尺者純金蟠龍雕飾世説曰晉孝武將講孝經謝公凡弟與諸人私相講習車武子苦問謝謂袁羊曰不問則德音有遺多問則重勞二謝袁曰何嘗見明鏡疲於屢照益部耆舊傳曰杜真孟宗周覽求師經歷齊魯資用將乏磨鏡自給南蠻獠人俗曰諸婚姻以奴婢一人為娉無奴婢以銅鏡當人婢吳興郡記曰臨安縣東石鏡山山東有石鏡一徑二尺四寸甚清亮山謙之尋陽記曰廬山東面有一石若鏡懸崖明淨照見人形海內士品曰徐孺子嘗事江夏黃公黃公薨往會其葬家貧無以自致齎磨鏡具自隨賃磨取資然後得前既至祭而退荀悅申鑒曰君子三鑒鑒乎前鑒乎下鑒乎鏡前惟訓人惟明商德之衰不鑒於湯禹也周秦之弊不鑒於群下也側辨垢顏不鑒於明鏡也古今注曰平帝元始三年延陵西園神寢內御戶座前大鏡皆清液如汗水出狀西京雜記曰高祖入咸陽宮周行府庫有方鏡九寸表裏明人直來照之影則側見以手掩心而來即腸胃五藏歷然無礙人有病在內則掩心而照之即知病之所在女子有邪心則膽張心動秦始皇帝以照宮人膽張心動者則殺之又曰宣帝被收繫郡邸獄臂上猶帶史良娣合綵婉轉繩繫身毒寶鏡一枚如八銖錢舊傳此鏡照見妖魅佩之者為天神所福宣帝從危獲濟及紹大位每持此鏡感咽移辰帝崩鏡不知所在拾遺録曰周穆王時渠國貢火齊鏡廣三尺六寸暗中視物如晝人向鏡語鏡中則響應之也又曰周穆王時有如石之鏡此石色白如月照面如雪謂之月鏡又曰方丈山池泥百鍊成金鏡色青可照魑魅洞冥記曰望蟾閣上有青金鏡廣四尺元光年中祗國獻此鏡照見魑魅百鬼不能隱形列仙傳曰負局先生負石靡鏡局徇吳中衒摩鏡得一錢因磨之神仙傳曰河東孫博能引鏡為刀屈刀為鏡劉根別傳曰思形狀可以長生以九寸明鏡照面熟視之令自識己身形常令不忘久則身神不散疾患不入搜神記曰孫策既殺于吉每獨自髣佛見在其左右引鏡自照見在鏡中因掊大叫瘡皆裂須臾而死又吳曆曰策為許貢客所傷引鏡自照曰面如此當可復建功立事乎因椎几大叫瘡裂而卒續搜神記曰文獻文獻王道諡曾令郭璞筮己一年中吉凶璞曰當有小不吉利可取廣州二大罌盛水置床帳二角名曰鏡耗以厭之某時撤罌去水如此其災可消至日忘之尋失銅鏡不知所在後撤去水乃見所失鏡在於罌中罌口數寸鏡大尺餘王公後令筮鏡罌之意璞云撤罌違期故致此妖邪魅所為無他故也使燒車轄以擬鏡立出又曰林慮山下有一亭人過宿者或病或死常云十許男女各雜衣或白或黑輒來為害有郅伯夷者過宿於此獨坐誦經忽有十餘人來與伯夷並坐因共蒲博於是伯夷密以鏡照之乃是一群犬因執燭而起佯誤以燭燒其衣毛乃樵伯夷懷刀投一人中之遂死成犬餘悉走去神異經曰昔有夫婦將別破鏡人執半以為信其妻與人通其鏡化鵲飛至夫前其夫乃知之後人因鑄鏡為鵲安背上自此始也幽明録曰宮亭湖邊傍山門有石數枚形圓若鏡明可以鑑人謂之石鏡後有行人過以火燎一枚至不復明其人眼乃失明地鏡圖曰欲知寶所在地以大鏡夜照見影若光在鏡中者物在下也風角要占曰厭盜賊法三月以小形銅鏡七枚埋於申地稱七百斤土覆之坎深二尺五寸廣二尺五寸築令堅固孟達與劉封書曰天地初生如鏡陸機與弟雲書曰仁壽殿前有大方銅鏡高五尺餘廣三尺二寸立著庭中向之便寫人形體了了亦怪也秦嘉與婦徐淑書曰頃得此鏡既明且好形觀文藻世所希有意甚愛之故以相與明鏡可以鑒形淑答書曰今君征未旋鏡將何施行明鏡鑒形當待君至傅咸鏡賦曰從陰位於清商採秋金之剛精醮祝融以致度命歐冶而是營晞日月之光烈儀厥象乎曜靈鏡臺世説曰溫嶠為劉越石長史北討劉聰得玉鏡臺嶠從姑劉氏有女美嶠有意自媒數日乃下玉鏡臺姑喜既婚交禮女曰我固疑是老奴果如所卜也三國典略曰胡太后使沙門靈昭造七寶鏡臺合有三十六戶每室別有一婦人手各執鎖才下一關三十六戶一時自閉若抽此關諸門皆啓婦人各出戶前魏武雜物疏曰鏡臺出魏宮中有純銀參帶鏡臺一純銀七貴人公主鏡臺四晉東宮舊事曰皇太子納妃有玳瑁鈿鏤鏡臺一宋起居注曰元嘉中韋朗為廣州剌史作銅鏡臺一具卿史中丞劉禎請以事追免朗官謝眺詩曰玲瓏類丹檻孤高似玄闕對鳳臨清水乘龍挂明月照粉拂紅粧插花理雲髮玉顏徒自見畏見君情歇古詩曰珊瑚挂鏡爛生光奩後漢書曰陰太后崩明帝性孝愛追慕無已謁原陵帝從席前伏御床視太后鏡奩中物感慟悲涕令易脂澤裝具左右皆泣莫能仰視焉拾遺記曰陰貴人食瓜美帝使求之時有燉煌獻異瓜云是空洞靈瓜又常山獻巨桃及后崩侍者見鏡奩中有瓜桃之核視之涕零也列仙傳曰朱崖令死當還法內珠於關者死其繼母棄其繫臂珠其男年九歲好之置鏡奩中皆不知也至海關吏收得十枚乃母子爭死吏遂棄而遣之事具義門語林曰范汪至能噉梅人致一斛奩噉須臾盡也蔡雍表曰賜鏡奩等前後重疊父母於子無以加此魏武上雜物疏曰純銀藻豆奩純銀括摟奩孫仲寄妹臨亡書曰鏡與粉盤與郎香奩與若欲令其行身如明鏡純如粉譽如香合宋元嘉起居注曰廣州剌史韋朗被彈事有金鏤合二枚銀鏤合二枚劉向別傳曰向有合賦祖台之志怪曰吳中有王大夫行至曲阿回塘上有一女子便留住宿解臂上金合繫其肘下令暮更來遂不至更使尋求都無女人過豬欄邊見豬鉀有合多羅纂文曰多羅粉器扶南傳曰扶南國王以純金多羅遺毗騫王嚴器魏武內嚴器誡令曰孤不好鮮飾嚴具用新皮葦笥以黃葦緣中遇亂世無葦笥乃更作方竹嚴具以皂韋衣之粗布裹此孤平常之用者也內中婦曾置嚴具于時為之推壞今方竹嚴具緣漆甚華好魏武上雜物疏曰油漆畫嚴器一純金參帶畫方嚴器一齊書曰宜都王鏗鎮姑熟于時人發桓溫女冢得金巾箱織金篾為嚴器條以啓聞鬱林勑以賜之鏗曰今取往物後取今物如此循環爾豈可不熟念使長史蔡約自往修復纖毫不犯北史后妃傳曰舊儀司飾三人掌簪珥花嚴修復山陵故事曰梓宮用嚴器五具馬齒嚴器五具汝南先賢傳曰戴良嫁女以笥為嚴器秦嘉婦與嘉書曰今奉嚴器中物幾具陸雲與兄機書曰按行視曹公器物嚴器方六七寸高四寸
