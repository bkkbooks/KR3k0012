body:
  text: 刑法部五聽訟易訟卦曰天與水違行訟君子以作事媒始又豐卦曰雷電皆至豐君子以折獄致刑詩曰蔽芾甘棠勿剪勿伐召伯所苃箋云苃草舍也夫召伯聽男女之訟不重煩勞百姓止舍于棠之下而聽斷焉又曰行露召伯聽訟也周禮曰以兩造禁民訟入束矢於朝然後聽之訟謂以財貨相告者造至也使訟者兩至既兩至使入束矢乃治之也不至不入束矢則是自服不直者也必入矢者取其直也詩云其直如矢束矢其百個與以兩劑禁民獄入鉤金三日乃致于朝然後聽之獄謂相吉以罪名者劑今券書也使獄者各齊劵書既兩券書及使人鉤金又三日乃治之重刑也不券書不入金則是自服不直者也夫入金者取其堅也以嘉石平罷民嘉石文石也樹之外朝門左平成也成使善也以肺石達窮民肺石赤石也窮民天之窮而無告也凡遠近惸獨老幼之欲有復於上而其長弗達者立於肺石三日士聽其辭以告於上而罪其長又曰凡諸侯之獄訟以邦典定之邦典六典也凡卿大夫之獄訟以邦法斷之邦法八法也凡庶民之獄訟以邦成弊之邦成謂若今時決事之比也又曰以五刑聽萬民之獄訟附于刑用情訊之至于旬乃弊之讀書則用法附猶著也訊言也用情理言之冀有可以出之者十日乃斷之以五聲聽獄訟求民情一曰辭聽觀其出言不直則煩二曰色聽觀其顏色不直則赧然三曰氣聽觀其氣息不直則喘四曰耳聽觀其聽聆不直則惑五曰目聽觀其眸子視不直則眊然又曰掌都家聽其獄訟之辭辨其死刑之罪而要之三月而上獄訟于國司寇聽其成于朝群士司刑皆在各麗其法以議獄訟成平也獄訟成士師受中書其刑殺之成與其聽獄訟者又曰掌三剌三宥三赦之法以贊司寇聽獄訟一剌曰訊群臣再剌曰訊群吏三剌曰訊萬民訊言也一宥曰不識再宥曰過失三宥曰遺忘不識謂愚民無所識則宥之過失若今時律過失殺人不坐死也玄謂識當也若令仇讎當報甲見乙識以為甲而殺之者過失若舉刃欲斫伐而誤中人者遣忘若間惟薄忌有在焉者而以兵矢投射也禮曰分爭辨訟非禮不決又曰司寇正刑明辟以聽獄訟司寇秋官卿掌刑者辟罪也必三剌以求民情斷其獄訟之中一曰訊群臣二曰訊群吏三曰訊萬民有旨無簡不聽簡誠也有其意無其誠者不論以為罪附從輕附施刑也求出之使從輕赦從重雖是罪可重猶赦之凡聽五刑之訟必厚父子之親立君臣之義以權之權平也意論輕重之序慎測淺深之量以別之意思念也淺深謂俱有罪本心有善惡悉其聰明致其忠愛以盡之盡其情也傳曰王叔陳生與伯輿爭政二子王卿士王右伯輿右助也王叔陳生怒而出奔晉侯使士丐平王室王叔與伯輿訟焉爭曲直王叔之宰與伯輿之大夫瑕禽坐獄於王庭士丐聽之范宣子曰天子所右寡君亦右之所左亦左之使王叔氏與伯輿合要王叔氏不能舉其契王叔奔晉論語曰子曰聽訟吾猶人也必也使無訟乎又曰片言可以折獄者其由也與片讀為半片言謂單辭也折斷也子路果取所知言必直故可令斷獄也又曰孟氏使陽膚為士師士師典獄之官問於曾子曾子曰上失其道民散久矣如得其情則哀矜而勿喜漢書曰于定國飲酒至數石不亂冬月治獄請讞飲酒益精明後漢書曰陳寵辟司徒鮑昱府是時三府掾屬專尚交遊以不肯視事為高寵常非之獨勤心物務數為昱陳當代便宜昱高其能轉為辭曹掌天下獄訟續漢志曰三公掾屬三十四人有辭曹主辭訟事也其所平決無不厭服衆心時司徒辭訟久者數十年事類溷錯易為輕重不良吏得生因緣因緣謂依附以生輕重也寵為昱撰辭訟比七卷決事科二條皆以事類相從昱奏上之其後公府奉以為法又曰王渙為洛陽令以平正居身得寬猛之宜不冤嫌久訟歷政所不斷法理所難平者莫不曲盡情詐壓塞群疑又能以譎數發擲姦服譎詐數術也京師稱歎以為渙有神算又曰法雄為青州剌史界內肅清雄每行部録囚徒察顏色知情僞長吏不奉法即解印去之魏書曰廷尉高柔時護軍營士竇禮近出不還營以為亡表言逐捕役其妻盈及男女為官奴婢盈連至州府稱冤自訟莫有省者乃辭詣廷尉柔問曰汝何以知夫不亡盈垂泣對曰夫少單特養一老嫗為母事甚恭謹又哀兒女撫視不離非是輕狡不顧室家者也柔重問曰汝夫不與人有怨讎乎對曰夫良善與人交錢財乎對曰嘗出錢與同營士焦子久求不得時子適坐小事繫獄柔乃見子問所坐言次汝頗曾舉人錢不子曰自以單貧初不敢舉人物也柔察子色動遂曰汝昔舉竇禮錢何言不耶子怪知事露應對不次柔曰汝已殺禮便宜早服子於是叩頭具首殺禮本末埋藏處所柔便遣吏卒承子辭往掘得其尸詔書復盈母子為平人晉書曰陸雲為浚儀令雲到官肅然下不能欺市無二價人有見殺者主名不立雲録其妻而無所問十許日遣出密令人隨後謂曰不出十里當有男子候之與語便縛來既而果然問之具服云與此妻通共殺其夫聞妻得出欲與語憚近縣故遠相邀候於是一縣稱為神明又曰鄧攸嘗詣鎮軍將軍賈混混以人訟事示攸使決之攸不視曰孔子稱聽訟吾猶人也必也使無訟乎混奇之以女妻之矣又曰符融仕符堅為司隸校尉京兆人董豐遊學三年而返宿妻家妻為賊所殺妻兄疑豐殺之送豐有司豐不堪楚掠自誣引殺妻融察而疑之問豐曰汝行往還頗有怪異及卜筮否豐曰初將發夜嘗夢乘馬南渡水返而北渡水馬停水中鞭策不去俯而視之見兩日在於水下馬左白而濕右黑而燥寤而心悸竊以為不祥問筮者筮者曰憂獄訟遠三枕避三沐既至妻為具沐夜授豐枕豐記筮者之言皆不從之妻乃自沐枕枕而寢融曰吾知之矣馬左而濕濕水也左水右馬馮字兩日昌字也其馮昌殺之乃獲昌詰之具首服本與其妻謀董豐期以新沐枕枕為驗乃誤中婦人也宋書曰傅琰為山陰令有賣針賣糖嫗爭絲各言己者詣琰琰掛而輕鞭之有鐵屑乃罰賣糖者又有二老爭雞問何食一云食粟一云食豆剖之見粟罰言豆者人畏如神明後魏書曰辛祥為并州平北府司馬會剌史喪朝廷以其公清遂越長史勑行州事祥初在司馬失白璧還兵藥道顯被誣為賊官屬推處咸以為然祥曰道顯面有悲色察獄以色其此之謂乎苦執申之月餘別獲真賊又曰李崇為揚州剌史先是壽春縣人荀泰有子三歲遇賊亡失數年不知所在後見在同縣人趙奉伯家泰以狀告各言己子並有鄰證郡縣不能斷崇曰此易知耳二父與兒各在別處經禁數旬然後遣人告之曰君兒偶患向已暴死有教解禁可出奔哀也荀泰即號咷悲不自勝奉伯咨嗟而已殊無痛意察知之乃以兒還泰詰奉伯詐狀奉伯乃款引云先云一子故妄認之又曰裴安祖弱冠州辟主簿民有兄弟爭財詣州相訟安祖召其兄弟以禮義責讓之此人兄弟明日相率謝罪州內欽服之又曰唐和為內都大官評決獄訟不加捶楚款獲實者甚多世以是稱之又曰司馬悅字慶宗歷位豫州剌史時有汝南上蔡董毛奴者齎錢五千死於道路郡縣疑人張堤為劫又堤家得錢五千堤懼掠自誣言殺至州悅觀色疑其不實引見毛奴兄靈之謂曰殺人取錢當時狼狽應有所遣得何物靈之曰唯得一刀削悅取視之曰此非里巷所為也乃召州內刀匠示之屬有郭門者前曰此刀削門手所作去歲賣與郭人董及祖悅收及祖詰之及祖款引靈之又於及祖身上得毛奴所著皂𥜗及祖伏法悅察獄多此類也後周書曰建德二年冬帝聽訟於正武殿自旦及夜繼之以燭又曰柳慶為雍州別駕有賈人持金二十斤詣京師交易寄人停止每欲出行常自執管鑰無何緘閉不異而失之謂是主人所竊郡縣訊問主人遂自誣服慶聞而歎之乃召問賈人曰卿鑰恆置何處對曰恆自帶之慶曰頗與人同宿乎與同飲乎曰日者曾與一沙門再度酣宴醉而晝寢慶曰主人以痛自誣非盜也彼沙門乃真盜耳即遣吏逮捕沙門乃懷金逃匿後捕得盡獲所失之金又曰柳慶有胡家被劫郡縣按察莫知賊所鄰近被囚繫者甚多慶以賊徒既衆似是烏合既非舊交必相疑阻可以詐求之乃作匿名書多榜官門曰我等共劫胡家徒侶混雜終恐泄露今欲首懼不免誅若聽先首免罪便欲來告慶乃復施免罪之榜居二日廣陽王欣家奴面縛自告榜下因此推窮盡獲黨與慶守正明察每歎曰昔于公斷獄無私闢高門可以待封儻斯言有驗吾斯庶幾乎又曰蘇綽為六條詔書奏施行之其一先修心其二敦教化其三盡地利其四擢賢良其五恤獄訟其六均賦役文帝甚重之常置諸座右隋書曰韋鼎為光州剌史有人客遊通主人家之妾及其還去妾盜物於夜逃亡尋於草中為人所殺主家知與妾通因告客殺之縣司鞠問具得姦狀因斷客辜獄成上於鼎覽之曰此客實姦而非殺也乃某寺僧詃妾盜物令奴殺之贓在某處即放此客遣掩僧并獲贓物自是部內肅然咸稱其有神又曰辛公義為牟州剌史下車先至獄中因露坐牢側親自驗問十餘日間決斷咸盡方還大廳受領詞訟皆不立文案遣當直佐寮一人側坐誶問事若不盡應須禁者公義即宿廳事終不還閣人或諫之曰此事有程使君何自苦也答曰剌史無德可以導人尚令百姓係於囹圄豈有禁人在獄而心自安乎罪人聞之咸自款服後有欲諍訟者其鄉閭父老遽相曉曰此蓋小事何忍勤勞使君訟者多兩讓而止尚書大傳曰聽獄之術大治有三治必寬寬之術歸於察察之術歸於義察猶審也是故聽而不寬是亂也寬而不察是慢也古之聽獄者言不越辭辭不越情情不越義是故聽民之術怒必思兼怒小罪勿兼怒責也責因之罪必思義謂思其辭思其主思義重大罪求可以出之者也又曰孔子如衛人謂曰公甫不能聽獄公甫魯大夫子曰不知公甫之不能聽獄也答而反之公甫之聽獄也有罪者懼無罪者恥民近禮矣春秋元命包曰樹棘槐聽訟於其下棘赤心有剌言治人者原其心不失赤實事所以剌人其情令各歸實槐之言歸也情見歸實也山海經曰夏后啓之臣曰孟徐是祠神于己人聽其獄訟謂之神主訟于孟徐之所人斷之也其衣有血者乃執之會稽典録曰郡署鍾離意北部督郵烏程男子孫常常弟烈分居各得田半頃烈死歲飢常稍以米粟給烈妻子輒追計直作券沒取其田烈兒長大訟常掾史議皆曰烈孫兒遭餓賴常升合長大成人而更爭訟非順孫也意獨曰常身為遺父當撫孤弱是人道正義稍以升合券取其田懷挾姦路貪利忘義烈妻子雖以田與常困迫之至非私義也請常田俾烈妻子於是衆議無以奪意之理又曰謝夷吾字堯卿山陰人也為荊州剌史行部到南魯縣遇孝章皇帝巡狩幸魯陽上未常見剌史班秩有詔勑夷吾入傳録見囚徒誡長吏勿廢舊儀上林西廂南面夷吾處東分帷以其中夷吾省録囚徒有亭長姦部民者縣言和姦上意以為吏姦民何得言和且觀剌夫決當云何頃夷吾呵之曰亭長詔書朱幘之吏職在禁姦今為惡之端何得言和切讓三老孝悌免長罪其所決正一縣三百餘事與上合章帝歎曰使諸州剌史盡如此者朕不憂天下特遷巨鹿太守臨發陛見賜車馬劍帶勑之曰巨鹿劇郡舊為難治以君有撥煩之才故特授任無毀前勞張斐律序曰情者心也心戚則動情動於中而形於言暢於四支發於事業是故姦人則心愧而面赤內怖而色奪賈誼新書曰梁嘗有疑獄群臣半以不當半以為當罪雖然王亦疑梁王曰陶朱公賢以而問曰梁有疑獄吏半以為不當半以為當奈何朱公曰臣鄙民也不知家有二白璧其澤相如也然有其價一者千金一者五百金王曰徑與色澤相如也一者千金一者五百金何也朱曰側而玩之一者厚倍是以千金梁王曰善故疑獄則從去賞疑則從與梁國大悅新序同也淮南子曰越王決獄不當援刀自割而戰士畢死感於恩也又曰秦始皇晝決獄夜理書說苑曰邵公述職當桑蠶時不欲變民事故不入邑中舍乎甘棠之下而聽斷焉風俗通曰沛郡有富家公資二千餘萬小婦子年裁數歲頃失其母又無親近其女不賢公痛困思念恐爭其財兒必不全因呼族人為遺令書悉以財屬女但遺一劍云兒年十五以還付之其後又不肯與兒詣郡自言求劍謹案時太守大司空何武也得其辭因録女及壻省其手書顧謂掾史曰女性強梁壻復貪鄙畏賊害其兒又計小兒正得此則不能全護故且俾與女內實寄之耳不當以劍與之乎夫劍者亦所以決斷限年十五者智力足以自居度此女壻必不復還其劍當問縣官縣官或能證察得見伸展此凡庸何能用慮強遠如是哉悉奪取財以與子曰弊女惡壻溫飽十歲亦以幸矣於是論者乃服又曰臨淮有一人持匹縑到市賣之道遇雨被戴後人求共庇蔭雨霽當別因共爭鬥各云我縑詣府自言太守薛宣劾實兩人莫肯首服宣曰縑直數百錢耳何足紛紛自致縣官呼騎吏斷縑各與半使追聽之後人曰受恩前撮之縑主稱怨宣曰然固知其當爾也因詰責之具服悉俾本主又曰頴川有富室兄弟同屋兩婦俱懷妊大婦數月胎傷因閉匿之産期至到乳舍弟婦生男夜因盜取爭訟三年州縣不能決丞相黃霸出殿前使卒抱兒去兩婦各十餘步叱婦自往取之長婦把持甚急兒大啼弟婦恐傷害之因乃放與而心甚悽愴霸曰此弟婦子也責問婦乃伏也
