body:
  text: 服章部三冕説文曰冕大夫以上冠邃延垂旒紞纊昔者黃帝初作冕釋名曰祭服曰冕冕猶俯俯平直貌也玄上纁下前後垂珠有文飾也白虎通曰麻冕者何周宗廟之冠也十一月之時陽氣俯仰黃泉之下萬物被施如冕前俯而後仰故謂之冕也所以用麻為之者女功之始示不忘本不以皮反太古未有禮文之服也又曰冕所以前後邃延者何示進賢退不能也垂旒者示不視邪纊塞耳示不聽讒故水清無魚人察無徒明不尚極知下故禮曰天子玉藻十有二旒前後邃延也世本曰黃帝作旃冕宋均曰通帛為旃冕冠之有旒應劭云周始垂旒也又三禮圖曰黃帝戴黃冕周禮曰辨師掌王之五冕朱裏延紐冕綖之覆也紐小鼻貫所貫五採繅十有二就繅合五色絲為之垂之延之前後各十有二所謂邃延也就成也繩之每一匝而貫五采土十二斿則十二王也又曰司服掌王之服祀昊天上帝則大裘而冕祀五帝亦如之六服同冕享先王則袞冕享先公射享則鷩冕祀四望山川則毳冕祭社稷五祀則絺冕祭群小五祀則玄冕禮曰有虞氏皇而祭周人冕而祭皇冕屬畫羽飾之又曰諸侯冕而舞大武諸侯之僣禮也又曰王戴冕璪十有二旒則天數也又曰玄冕齋戒鬼神陰陽也陰陽夫婦又曰天子之冕朱緑藻十有二諸侯九上大夫七下大夫五士三此以文為貴也又曰魏文侯問於子夏曰吾端冕而聽古樂則唯恐臥鄭玄曰端玄衣又曰君子端冕則有敬色大戴禮曰古者冕而前旒所以蔽明黈纊塞耳所以掩聽也書曰王麻冕黼裳由賓階隮鄭玄曰三十升布冠也卿士邦君麻冕蟻裳入即位蟻謂色玄也太保太史太宗皆麻冕彤裳左傳曰晉士會帥師滅赤狄晉侯請于王以冠冕命士會將中軍且為太傅又曰公還及方城季武子使公冶問問公起居公冶季氏屬大夫公與公冶冕服以卿玄冕賞之固讓而後受公冶疾聚其臣曰我死必無以冕服斂非德賞也言公畏季氏而賞其使非以我有德又曰王使詹桓伯辭於晉曰我在伯父猶衣服之有冠冕木土之有本源民人之有謀主伯父若裂冠毀冕拔本塞源專棄謀主雖戎狄其何有余一人論語曰子曰禹吾無間然矣菲飲食而致孝乎鬼神惡衣服而致美乎黼冕又曰子曰行夏之時乘殷之輅服周之冕又曰麻冕禮也今也純儉吾從衆國語曰周襄王賜晉文公命晉侯端委而入大宰以王命命之冕服內史贊之三命而後即冕服家語曰子路問於孔子曰有人於此被褐而懷玉如何子曰國無道隱者可也國有道則袞冕而執玉五經通義曰冕制奈何禮器曰冕冠長六寸廣八寸員前冕緇布在上五采組十二旒夏殷之冕如周制矣其旒色異夏冕黑白赤組旒殷冕黑黃青組旒應劭漢官儀曰周冕與古冕略等周加垂旒天子前後垂真白珠各十二蔡雍獨斷曰漢明帝採尚書皋繇及周官禮記以定冕制皆廣七寸長尺二寸係白珠于其端十二旒三公及諸侯九旒卿七旒又曰祀天地明堂平冕崔豹古今注云牛亨問曰冕旒如繁露何也答曰綴而下垂如露之繁多故曰繁露摯氏決疑要注曰秦除六冕之制明帝漢明帝也永平中使諸儒案古文始復造袞冕符子曰龍逢諫桀曰臣觀君之冕非冕冕危石觀君之履非履履春冰未有冠危石而不壓蹈春冰而不陷也陳壽益部耆舊傳曰郭賀拜荊州剌史明帝巡狩到南陽特見嗟嘆賜以三公之服黼黻旒冕勑去幨露冕使百姓見此衣服以彰其德何法盛晉中興曰初中興儀服不備又冕旒飾以翡翠珊瑚雜珠顧和奏舊冕十二旒皆用玉今不能得玉可用白琁珠於是始下太常治改王智深宋記曰明帝詔曰朕以大冕郊禮天宗祀明堂以法冕祀太廟元正大會朝諸侯以絺冕小會宴饗餞送諸侯臨軒命王公以繡冕征伐不賓講武校獵隋書曰六等之冕皆有黈纊黃綿為之其大如橘自皇太子以下並犀導青纓纓説文曰纓冠系也緌系冠纓也釋名曰纓頸也自上而下繫於頸也禮曰玄冠丹組纓諸侯之齋冠也玄冠綦組纓士之齋冠也又曰玄冠紫纓自魯桓公始也傳曰石乞盂黶敵子路以戈擊之斷纓子路曰君子死冠不免不使冠在地結纓而死漢書曰冠高山之冠飛羽之纓又曰終軍字子雲濟南人上書請受長纓必羇南越王而致之闕下乃使使越越王舉國內屬又曰江充召見犬臺宮晉灼曰黃圖上林有犬臺宮也冠蟬纚步搖冠飛翮之纓張晏曰冠蟬纓小步則搖纓隨冠而動若鳥翮然晉書曰石季龍子義陽公鑒時鎮關中役煩賦重失關右之和其女官李松勸鑒文武有長髮者拔為冠纓餘以給宮人季龍聞之大怒以其右僕射張離為雍州剌史以察之信然徵鑒還鄴收松下廷尉後魏書曰李彪嘗使齊著大頭纓纓裾至腰張融笑之曰北國士大夫帽裾亦有等級不彪曰上士至腰中士至頸下士之徒蓋髮而已山海經曰拘纓之國一手把纓管子曰桓公親郊管仲詘纓捷衽孟子曰孺子歌曰滄浪之水清兮可以濯我纓楚詞亦同莊子曰昔趙惠文王喜劍太子患之募左右孰能説王左右曰莊子當能太子乃使人以千金奉莊子莊子不受與使者俱往太子曰吾王所見唯劍士蓬頭突鬢冠曼胡之纓短後之衣瞋目而語難王乃説之今大夫必儒服而見王事必大逆莊子曰請為劍服又曰原子居衛正冠而纓絶斂𥘞而肘見言貧也淮南子曰聖人見鳥獸髯胡之制作緌纓之首飾韓子曰鄒君好服長纓左右皆作長纓纓甚貴鄒君患之問左右左右對曰君服之百姓亦多服是故貴鄒君因先自斷其纓而出國中皆不服長纓説苑曰楚莊王賜群臣酒日暮燭滅乃有人引美人之衣者美人援絶其冠纓告王趣火來視絶纓者王曰賜人酒使醉失禮奈何欲顯婦人之節而辱士乎乃命皆絶去其冠纓尉繚子曰天子玄冠玄纓諸侯素冠素纓自大夫以下皆皂冠皂纓後漢崔駰達指曰有事則褰裳濡足無事則攝纓整𥘞魏徐幹齊都賦曰纖纚細纓輕配蟬翼自尊及卑須我元服晉陸機詩曰冠冕無醜士長纓皆雋民晉成公綏七唱曰瓊辨曜首玉纓照目宋謝靈運七濟曰翠緌媚眉朱裳妍形劉梁七舉曰華組之纓從風紛紜辨釋名曰辨如兩手相合拚時也以爵韋為之謂之爵辨以鹿皮為之謂之皮辨以韎為之謂之韋辨也系本曰魯昭公作辨宋均曰作素辨也五經通義曰皮辨冠前後玉飾白虎通曰皮辨者何謂也所以法古至質冠之名也辨之為言攀也所以持髮也上古先賢服鹿皮取其文章也故禮曰三王共皮辨素績爵辨何謂也其色如爵頭周人宗廟士之冠也周尚赤所以不純赤但如爵頭也三禮圖曰爵辨士助君祭之服以祭其廟無旒韋辨王及諸侯兵服也三禮冠辨圖曰皮辨以鹿皮淺毛黃白色者為之高尺二寸春三月習大射冠之行事輿服志曰皮辨與委貌同制長七寸高四寸制似覆杯前高廣後卑鋭所謂夏之母追上音牟下音堆殷之章甫者也行大射禮辟雍公卿諸侯大夫行禮者冠委貌執事者冠皮辨衣都麻衣董巴輿服志曰爵辨一名冕廣八寸長二寸如爵形前小後大其上似爵頭色有收持笄所謂夏收殷哻況羽切者也祠天地五郊明堂雲翹舞樂人服之詩曰淑人君子其帶伊絲其帶伊絲其辨伊騏毛萇曰騏其文也辨皮辨也又曰有匪君子充耳琇瑩會辨如星辨皮辨所以會髮也又曰有頍丘弭切者辨實維伊何又曰側辨峨峨屢儛傞傞禮曰三王共皮辨素服又曰祭之日王皮辨以聽祭報又曰太學始教皮辨祭菜示敬道也又曰古者天子諸侯必有公桑大昕之朝君皮辨素積卜三宮夫人桑于公桑左傳曰楚子玉自為瓊辨玉纓未之服也先戰夢河神謂己曰異豫豫賜汝孟諸之麋又曰天王使劉定公勞趙孟於頴館於洛汭劉子曰美哉禹功明德遠矣微禹吾其魚乎吾與子辨冕端委以治民臨諸侯禹之力也周禮曰司服掌王之吉凶衣服凡兵事韋辨服鄭玄曰以韎韋為辨也春秋傳曰晉郤至衣韎韋之跗注是也視朝則皮辨服鄭玄曰視朝視內外之事也皮辨之服十五升白布衣積素以為裳也凡甸冠辨服鄭玄曰甸獵也冠辨委貌也其服緇布衣亦積素以為裳諸侯以為視朝之服凡凶事服辨服辨服喪冠也其服斬衰齊衰凡弔事辨絰服辨絰者如爵辨而素加環絰又曰辨師掌王之皮辨會五采玉𤪌象邸玉笄𤪌結也皮辨之縫中貫結五采玉以為飾邸下秪也以象骨為之諸侯及孤卿大夫之冕韋辨皮辨辨絰各以其等為之儀禮曰士冠服爵辨服鄭玄曰此與君祭之服同也穀梁曰辨冠雖舊必加於首周室雖衰必先諸侯家語曰諸侯皮辨以告朔于太廟卒朔然後服之以視朝漢書曰韓延壽為潁川太守令文學校官諸生辨執俎豆又曰王莽初獻新樂於明堂太廟群臣始冠麟韋之辨魏志曰帝以楊彪故漢太尉使著鹿皮冠彪辭讓不聽竟著布單衣皮辨以見隋書曰新羅嘗遣使朝貢李子雄至朝堂與語因問其冠制所由其使者曰皮辨遺象安有大國君子而不識皮辨也子雄因曰中國無禮求諸四夷使者曰自至已來此言之外未見無禮憲司以子雄失詞奏劾其事竟坐免又曰何稠參會今古多所改創魏晉以來皮辨有纓而無笄導稠曰此古田獵之服也今服以入朝宜變其制故辨施象牙簪導自稠始也鄴中記曰石季龍宮婢數十盡著皂褠頭著神辨如今之禮先冠也
