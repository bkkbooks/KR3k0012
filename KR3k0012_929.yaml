body:
  text: 羽族部十五衆鳥異物志曰錦鳥文如丹地錦而藻繢相交俗人見其似錦因謂之錦鳥形微大於雉其雌特有文章五色甚可愛周氏雜字曰鸀鳿鳥似鳧風土記曰鷫鸘鶖屬飛則鳴其翅肅肅者也楚辭曰鴻鵠代遊曼鷫鸘曼曼行也鷫鸘俊鳥風土記曰鷖𩿬也以名自呼大如小雞生於荷葉上爾雅曰鸛鷒輻蹂也如鵲短尾射之銜矢射人郭璞注云一名隨羿河圖説徵示曰鳥一足曰獨立見則主勇強也廣州記曰新寧縣有獨足鳥大如鵠其色蒼其鳴自呼獨足臨海異物志曰東垂有一足鳥俗名曰獨足疑是商羊文身赤口唯食蟲豸不害稻梁鳴如人嘯聲將雨轉鳴或曰山譟鳥晝伏夜翔或時晝出則群鳥譟之山海經曰有五采之鳥有冠名曰狂鳥孔融周歲論曰儀鳳屯集狂鳥穢之爾雅曰鶨鶀老郭璞注曰鴒鶨也俗謂之癡鳥鶨音丑眷切説文曰欺老鶨也左思蜀都賦曰鷩鵜山栖綦母遂注曰鷩鵜鳥名如今山雞其色班其雛色異出江東莊子曰周周銜羽以濟河司馬彪注周周河士鳥也頭重尾輕是以銜他鳥羽如飛過何人之不可求益於物以補其所短也笁法真登羅山疏曰越王鳥狀似鳶口句末可受二升許南人以為酒器珍於文螺不踐地不飲江湖不唼百草木餌蟲魚唯噉木葉糞似董陸香山人遇之既以為香又治雜瘡南方草物志曰有鳥或名越王鳥大如孔雀喙長尺八九寸黃白黑色狀如人晝光飾似漆瑩磨尤益鮮明多持以飲酒出交趾九真劉欣期交州記曰鸏𪆏黃喙二尺餘南人以為酒爵南越志曰鸏𪆏一名越王烏嶺南録異曰越王鳥如烏而頸足長頭有黃冠如柸用貯水互相飲食衆鳥雛取其冠堅緻可為酒柸笁法真登羅山疏曰五距鳥足有重距其音先顧或謂之先顧鳥似孔雀背連錢文遊名山記曰芙蓉山有異鳥愛形顧影不自藏故為羅者所得人謂𪀥𪁔廣州記曰廣寧縣有金鳥純白口腳如金其鳴自呼異物志曰鷢鳥大如雄雞色赤或黑而能鳴彈射取之其肉香美中作炙盛弘之荊州記曰魚復縣南山有鳥時吐物長數寸丹朱彪炳形色類綬因名吐綬鳥又曰晉太元中營道令何諧之於縣內得一鳥大如白鷺膝上及髀有銅環貫之環大小刻鏤如橄欖子妙絶人工于時京師皆觀之嶺表録異曰有鳥形如野鵲翅羽黃緑間錯尾生兩技長二尺餘直而不裊唯尾梢有毛宛如箭羽因目之為帶箭鳥爾雅曰鳥鼠同穴其鳥為鵌其鼠為鼷郭璞注曰鼠如人家鼠尾短鵌如燕而小色黃黑穴入蛇三四尺鼠在內鳥在外今西在隴西鳥鼠同穴出臨海異物志曰江潮海鳥大於鸛啄長八寸潮上即鳴又曰鳥海鳥也喙長八寸天欲風雨內喙於土中向風海師以為候鳴如嘯又曰蜜母小鳥也色黑正月旦為蜜蜂周行諸山永安處蜂隨之蜜母暮還入蜂中郭璞蜜蜂賦曰大君以總群氏又協氣於零雀每先馳而葺宇番巖穴之經略蜜母一名零雀爾雅曰竭水狗又曰鴢頭鵁孫炎曰鳥鵁也又曰突鶦鳥孫炎曰穀鶦水鳥又曰鷏蚊母也廣志曰蚊母吐蚊大如鳩嶺南異物志曰五嶺溪山深處有大鳥如鶬鸛常吐蚊子輒從口中飛去謂之吐蚊鳥説文曰鸏水鳥也南方草物狀曰孔貴如小母雞臨海異物志曰獨舂鳥聲似舂聲聲多者五穀傷聲小者五穀熟又曰契鳥蘭草占米之貴賤背回契其莖契一度即解米百錢再度二百未契仍五十隨契多少以占知之爾雅曰鸄唐屠郭璞注曰以鳥蒼白色臨海異物志曰𪋞爝鳴聲哀俗云繼母欲嫁因使人守之母遂不還兒因呼母言𪋞鴆也又曰遊鳥如鵝大其色黑以青絲頭繫竹竿呼之即來入手俗言是東海神所養不可食也臨海異物志曰獨𡛿鳥如隼其色黑其鳴如人呼雞聲爾雅曰鷚天籥也南方草物狀曰金吉鳥其大如小母雞臨海異物志曰有鳥耀儀名曰苦姑又曰除溪鳥小如鴝鵒甚黑天欲陰雨即鳴音言溪瀆又曰祖端端小鳥天欲雨即鳴抱朴子曰千秋鳥人面壽如其名魯連子曰南方鳥名曰邽生而食其翼南方草物狀曰羽鳥毛羽青黑色小於鳩俞益期與韓豫章箋曰林邑有鳥名歸飛臨海異物志曰賓師形大如鴝鵒毛正黑色廣雅曰車攝鷦禮也山海經曰基山有鳥焉名𪁺鵃食之無臥又曰北海蛇山有五采鳥飛蔽一鄉名曰翳鳥又曰青丘有鳥其狀如鳩名曰灌灌又曰禱過之山有鳥二足三面名瞿如又曰松果山有鳥名蟂渠又曰上申山鳥名當扈狀如雉食之不眴目又曰符遇之山其鳥名鴖可以衛火又曰英山有鳥狀如鶉食之已癘名曰肥遺又曰宰塗山有鳥名曰數斯食之已癭又曰崑崙丘有鳥名曰欽原蠹獸則死蠹木則枯又曰灌題山有鳥見人則躍名曰竦斯又曰梁渠之山有鳥名曰囂食之已腹痛可以止同治同下也又曰陽山有鳥自為牝牡名曰象蛇又曰廆山有鳥名曰鴒鶢鈴要兩音其鳴自呼服之不眯又曰丑陽山有鳥名曰䳅鵌可以衛火又曰翼望山有鳥狀如烏三首六尾其名曰鵸鵌倚餘兩音服之使人不眯又以禦凶又曰青要山有鳥名曰鴢音窈窀之窈也狀如烏青身而朱目赤尾食之宜子又曰攻離山有鳥名曰嬰勺其狀如鵲赤喙白身其尾若勺似勺形其鳴自呼又曰鳥名青耕可以禦疫又曰天帝山有鳥其狀如鶉黑文而赤翁翁領下毛名曰櫟食之已痔又曰翏山有鳥名鸓音畾其狀如鵠而兩首四足又曰北囂山有鳥狀如人面名曰𪄀𪂇夜飛而晝伏又曰太行山有鳥焉其狀如鵲白身赤尾六足其名䴅䴅音奔又曰馬城山有鳥狀如烏白首而身黃足其名曰鶌居食之不飢又曰號山有鳥名寓狀如鼠又曰夢聯之山有鳥群居而多飛其毛如雌雉名曰鵁鳥音交或作獨又曰畢張山有鳥狀如雉而文首白翼黃足名曰白䲽食之已嗌又曰小侯山有鳥其狀如烏而白文名曰鴣𪄶姑習兩音又曰北號山有鳥其狀如雞而白首鼠足虎爪名曰魁雀食人又曰羭次山有鳥狀如梟人面而一足名曰橐䨽音肥冬夏蟄服之不畏雷看其毛羽令人不畏雷鳥卵左傳哀公下曰子西曰勝如卵余翼而張之漢書曰武帝時大宛諸國獻大鳥卵應邵曰如二石甕條支國有大鳥卵如甕魏志曰清河令徐孝龍取十三種物著篋中使管輅射之先説雞子後謂蠶蛹遂一一名之吳志曰孫權太子嘗朝諸葛恪曰元遜何不食馬矢恪曰願太子食雞卵權曰人令卿食馬矢卿使人食雞卵何也恪曰所出同耳權大笑晉書曰戴安道少時取雞卵汁溲白瓦屑作鄭玄碑文手刻字文既綺藻器亦妙絶唐書武德中西蕃突厥葉護可汗遣使貢條支巨卵二又曰貞觀二十一年西蕃吐陸可汗獻金卵瓶鳥鷇也雕刻作禽獸而塗以黃金山海經曰西王母山有沷民國鳳卵是食甘露是飲韓詩外傳曰卵之性為雛不得良雞大育積日纍久則不成為雛管子曰子夏云雕卵然後瀹之所謂發積藏散萬物墨子曰以他言非吾者猶以卵投石也盡天下之卵石猶不毀也孫卿子曰以桀詐桀則幸詐堯譬若以卵投石又曰卵有毛是説之難持者也而惠施鄧析能精之然而長者不貴非禮義之中也淮南子曰越雞不能伏鶴卵又曰鴈北向鵲始加巢雉鴝呼卵淮南萬畢術曰艾火令雞子飛取雞子去其汁燃艾火內空卵中疾風因舉之飛鹽之纍卵取鹽塗卵取他卵置上即纍矣抱朴子曰夏后始衰食鳳卵而鳳去如此則鳳有種矣揚子法言曰雌之不才其卵段君乏才其民野段敗也不屈其意不纍其身不夷不惠可否之間神仙傳曰有人病就茅君請福煮雞子十枚以內帳中須臾茅君悉擲出其中無黃者並差有黃者不愈常以此為候阮藉大人先生傳曰若先生者以天地如卵耶小物細人欲論其長短議其是非豈不哀哉博物志曰九竅者眙生八竅者卵生龜黿諸授類皆卵生而影伏幽明録曰桂陽羅君章二十許都未有志不屬意學問常晝寢夢得一鳥卵五色雜耀不似人間物夢中因取吞之於是漸有志向遂更勤學讀九經以清才聞羅含傳云吞飛鳥卵吳氏本草曰丹雞卵可作虎珀張衡南都賦曰春卵夏笋張孟陽洛禊賦曰浮素卵以蔽水灑玄醪於中河鳥巢尚書大傳曰古人鳳皇巢其樹好生惡殺説文曰鳥在木上曰巢在穴曰窠魯子曰鷹鸇以太山為下而增巢其上孫卿子曰古之王者烏鵲之巢可俯莊子曰古者禽獸多而人民少於是民皆巢居以避之晝拾象粟暮栖木上故命之曰有巢氏之民又曰鵲上高城之墉而巢於高枝之顛城壞陵風而起又曰至德之君烏鵲之巢可攀援而窺淮南子曰鵲巢知風之所起言鵲作巢而知風一説背風也陸賈新語堯以仁義為巢舜以稷禼為杖秦以刑罰為巢故有覆巢破卵之患
