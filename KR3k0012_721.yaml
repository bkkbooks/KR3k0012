body:
  text: 方術部一養生易曰天地之大德曰生傳曰君子有四時朝以聽政聽國政晝以訪問問可否夕以脩念念所施夜以安身於是節宣其氣宣散也勿使有所壅閉湫子小切底音止以露其體湫集也底滯也露臝也宣之則血氣集滯而體臝露茲心不爽而昏亂百度茲此也爽明也百度百事之節老子養生要訣曰一人之身一國之象胸臆之設猶宮室也支體之位猶郊境也骨節之分猶百川也腠七搆切理之間猶四衢也神猶君也血猶臣也氣猶民也故志人能理其身亦猶明君能治其國夫愛其民所以安其國愛其氣所以全其身民弊即國亡氣衰即身謝是以志人上士當施醫於未病之間不追修施於既敗之後故知國難保而易喪氣難清而易濁審機權可以安社稷制嗜慾可以保性命若能攝生者當先除六害然後可以延駐何名六害一曰薄名利二曰禁聲色三曰廉貨財四曰損滋味五曰屏虛妄六曰除疽妒六者若存則養生之道徒設耳蓋未見其有益也雖心希妙理口念真經咀才與切嚼英華呼吸景象不能補其促矣誠者所以保和全真當須少思少念少笑少言少喜少怒少樂少愁少惡少好少事少機夫多思則神散多念則心勞多笑則臟腑上飜多言則氣海虛脫多喜則膀胱納客風多怒則腠理奔浮血多樂則心神邪蕩多愁則頭面燋枯多好則氣智潰溢多惡則精爽奔騰多事則䈥脈乾急多機則智慮沉迷茲乃伐人之生甚於斤斧蝕人之性猛於豺狼無久行無久坐無久立無久臥無久視無久聽不飢強食則脾勞不渴強飲則胃脹體欲少勞食欲常少勞則勿過少勿令虛冬則朝勿虛夏則夜勿飽早起不在雞鳴前晚起不過日出後心內澄則真人守其位氣內定則邪物去其身行欺詐則神悲行爭競則神沮輕侮於人當減筭殺害於物必傷年行一善則魂神歡搆一惡則魄神喜魂神欲人生魄神欲人死常欲寬泰自居恬惔自守則神形安靜災病不生仙錄必書其名死籍必消其咎養生之理盡在此矣至於鍊瓊丹而補腦化金液以留神此上真之妙道非食穀啗血越分而修之萬人之中得者殊少深可誡焉莊子曰善養生若牧羊視其後者而鞭之周威公曰何謂曰魯有單豹者巖居而谷飲不與民共利行年七十而猶有嬰兒之色不幸遇餓虎殺而食之有張毅者高門懸薄無不走也行年四十而有內熱之病以死豹養其內而虎食其外毅養其外而病攻其內此二子者皆不鞭其後者夫守一方之事至於過理者不及於會通之適者鞭其後者去其不及耳又曰養形必先無物物有餘而形不養者有之矣有生必先無離形形離而生亡者有之矣其來不能卻其去不能止也悲夫世之人以為養形足以存養形神清果不足以存生文子曰太上養神其次養形神清意平百節皆寧養生之本也肥肌膚充腹腸開嗜欲養生之末也淮南子同韓子曰神不注於外則身全身全之謂得得者得身也呂氏春秋曰凡生之長也順之也使生不順者欲也故聖人必先適欲適節也室大則多陰臺高則多陽多陰則蹶多陽則痿蹶也逆寒疾也痿躄不能行此陰陽不適之患也是故先王不處大室不為高臺味不眾珍衣不燀之演切熱燀熱則理塞脈則閉結理塞則氣不達味眾珍則胃充胃充則中大鞔音墜憊也中大鞔則氣不達以此求長生其可得乎昔先聖王之為苑囿園池也足以觀望勞形而己矣其為宮室臺榭也足以辟燥備濕而已矣其為輿馬衣裘也足以逸身煖骸而已矣其為飲食酏音移醴也足以適味充虛而已矣其為聲色音樂也足以安性自娛而已矣此五者之所以養性也非好儉而惡費也節於性也又曰天生陰陽寒暑燥濕四時之化萬物之變莫不為利莫不為害聖人察之以便生故精神安乎形而年壽長焉長也者非短而續之者也畢其數也畢數之務在去乎害何謂去害大甘大酸大苦大辛大醎五者充形則生害矣大喜大怒大憂大恐大哀五者接神則生害矣大寒大熱大燥大濕大風大霧六者動精則生害矣諸言大者皆謂過制故凡養生莫若知本知本則疾無由至矣又曰湯問伊尹曰欲取天下若何伊尹曰欲取天下天下可取身將先取身先為天下所取也凡事之本必先治身嗇其大寶大寶身也用新棄其陳湊理遂通精氣日新邪氣盡去反其天年此之謂真人昔先聖王成其身而天下成治其身而天下治故善響者不於響於聲善景者不於景於形為天下者不於天下於身詩曰淑人君子其儀不忒其儀不忒正是四國言正諸身也故反道而身善矣行義而人善矣淮南子曰君子行正氣不行邪氣內便於性外合於義循理而動不繫於物而者正氣也推於滋味淫於聲色發於喜怒不顧後患者邪氣也邪與正相傷欲與性相害不可兩立一植一廢故聖人損欲而從事於性凡治身養性節寢處適飲食和喜怒便動靜而邪氣自不生豈若憂瘕疵之興痤疽之廢而豫備之哉又曰今萬物之來擢拔吾性𢷘取吾精勢若泉原雖欲勿廩庸可得乎今夫樹木灌以潦水疇以肥壤十人養之一人拔之則必無餘蘖況以一國同伐之雖欲久生豈可得哉今盆水在廷清之終日未能見眉睫濁之不過一撓而不能察方員人神易濁而難清猶盆水之類也又曰夫水之性清而沙土汨之人之性安而嗜慾亂之夫人之所受於性者耳目之於聲色也鼻口之於芳臭也肌膚之於寒煖也其情一也或通於神明或不免於癡狂者也其所以為制者異也是故神者智之淵也神清則智明矣智心之府也智公則心平矣人莫鑒於洙泗而鑒於止水者以其靜也莫窺於生鐵而窺於明鏡者以其易也夫惟易且靜故能形物之情性由此觀之用者也是故虛室生白吉祥止焉又曰聖人不變其宜不易其常放准修繩曲因其當夫喜怒者道之邪悲憂者德之失好憎者心之過嗜慾者性之累夫大怒破陰大喜墜陽薄氣發瘖驚怖為狂憂悲多悉病乃成積好憎繁多禍乃相隨故心不憂樂德之至也性而不變靜之至也嗜欲不載虛之至也無所愛憎平之至也不與物散粹之至也能此五者則通於神明通於神明者得其內者也抱朴子內篇曰夫太元之山難知易求不天不地不沉不浮絕險緬邈崔巍崎嶇和氣煙熅神童並遊玉井泓窈灌溉延休百二十官曹府相由离坎列位玄芝萬株絳樹特生其實如珠金玉嵯峨醴泉出隅還年之土甘其清流于能修之松喬同儔此一山也長谷之山杳杳巍巍玄靈飄飄玉液霏霏金紫之房在乎其隈愚人競往至皆死歸有道之士登之不衰採服黃精以致天飛此二山也古賢之所祕子思之又曰凡養生者欲令多聞而貴要博見而擇善偏修一事不足必賴也又患好事之徒各伏其所長知玄素之術者則曰唯房中之術可以度世矣明吐納之道者則曰唯行氣足以延壽矣知屈伸之法者則曰唯導引可以難老矣知草木之方者則曰唯奇藥可以無窮矣學道之不能成就由乎偏枯之若此也又曰余祖鴻臚少時嘗為臨沇令云此縣有民家世壽考或出百歲或八九十後徙去子孫轉多夭折他人居其故宅後亦累世壽考由此乃覺是宅之所為而不知何疑其井水殊赤乃試掘井左右得古人理丹砂數十斛去井數尺此丹沙汁因泉漸入井是以飲其水而得壽況乃鍊丹沙而服之乎又曰人亦有不病者各有所制攝生食不欲飽眠不欲扇星下不臥里語曰人在人間日失一日如牽牛以詣屠所每進一步去死轉近也夫入九泉之下長夜罔極始為螻蟻之糧終與塵埃合體令人怛然心熱求生之志何可不營新論曰曲陽侯王根迎方士西門君惠從其學養生卻老之術君惠曰龜鶴稱三千歲以人之才何乃不如蟲鳥耶白虎通曰男子六十閉房戶所以輔衰故重性命也會稽典錄曰王充年漸七十乃作養生之書凡十六篇養氣自守閉明塞聰愛精自輔服藥道引庶幾獲道劉根別傳曰取七歲男齒女髮與己頸垢合燒服之一歲則不知老常為之使老有少容也嵇康養生論曰養生有五難名利不滅此一難也喜怒不除此二難也聲色不去此三難也滋味不絕此四難也神慮精散此五難也五者必存雖心希難老口誦至言咀嚼英華呼吸太陽不能不夭其年也五者無於胸中則信順日深玄德日全不祈喜而自福不求壽而自延此養生大理所歸也又曰夫為稼於陽世偏有一溉之功者雖終歸於樵爛必一溉者後枯然則一溉之益固不可誣也而世常謂一怒不足以侵性一哀不足以傷身輕而肆之是猶不識一溉之益而望嘉穀於旱苗者也是以君子知形恃神以立神須形以存悟生理之易失知一過之害生故脩性以保神安心以全身愛憎不捿於情憂喜不留於心泊然無感而體氣和平又呼吸吐納服食養身使形神相親表裏俱濟也夫種田者一畝十斛謂之良田此天下通稱也不知區種可百餘斛田種一也至於樹養不同則功收相懸謂商無十倍之價農無百斛之望此守常而不變者也且豆令人重榆令人瞑合歡蠲忿萱草忘憂愚智所知也薰辛害同豚魚不養世所識也虱處頭而黑麝食柏而香頸處險而癭齒居晉而黃推此而言凡所食之氣蒸性染身莫不相應豈惟蒸之使重而無使輕害之使闇而無使明薰之使黃而無使堅芬之使香而無使延哉故神農曰上藥養命中藥養性者誠知性命之理因輔養以通也而世人不察唯五穀是嗜聲色是躭目惑玄黃耳務淫哇滋味煎其腑臟醴醪煮其膓胃香芳腐其骨髓喜怒悖其正氣思慮消其精神哀樂殃其平粹夫以蕞爾之軀攻之者非一途易竭之身而內外受敵身非木石其能久乎神仙傳曰彭祖云養壽之道但莫傷之而已夫冬溫夏涼不失四時之和所以適身也美色淑姿安閑性樂不致思欲之感所以通神也車服威儀知足無求所以一志也八音五色以養視聽之懽所以導心也凡此皆以養壽而不能斟酌之者反以速患古之智人恐下才之子不識事宜流遁不還故絕其源故經有上士別床中士異被服藥百過不如獨臥色使目盲聲使耳聾味令口爽言若能節宣其宜適抑揚其通塞者不減年筭而得其益凡此之類譬猶水火可否失適反為害耳人不知其經脈損傷血氣不足肉理空踈髓腦不實體已先病故為外物所犯因風寒酒色以發之耳若本充實豈有病乎凡遠思強健傷人憂愁悲哀傷人喜樂過量傷人忿怒不解傷人汲汲所願傷人戚戚所患傷人寒煖失節傷人陰陽不交傷人人所傷者甚眾而獨責房室不亦惑哉男女相成猶天地相生也所以道養神氣使人不失其和天地得交接之道故無終竟之限人失交接之道故有殘折之期能避眾傷之事得陰陽之術則不死之道也天地晝離而夜合一歲三百六十交精氣和合者有四故能生育萬物不知窮極人能則之可以長存次則有服氣得其道則邪氣不能入治身之本要也其餘歷藏導引之術及念體中萬神有含影中形之事不然于心志也人能愛精養體服氣鍊神則萬神自守其不然者營衛枯疲萬神自逝非思念所留者也魏志曰吳普嘗問道於華佗佗謂普曰人體欲得勞動但不當使極耳如搖動則穀氣易消血脈通流病不得生譬猶戶樞不蠹流水不腐以其常動故也是以仙者及漢時有士君舊為導引之事熊經鵄顧引挽腰體動諸關節以求難老吾有一術名五禽之戲汝可行之一曰虎二曰鹿三曰熊四曰猨五曰鳥亦以除疾並利蹄足以當導引體中不快起作一禽之戲普施行之遂年九十餘博物志曰魏武帝問封君達養生之術君達曰體欲常勞食欲常少勞無過虛省肥濃節醎酸減思慮損喜怒除馳逐慎房室春夏施寫秋冬閑藏武帝行之有効高湛養生論曰王叔和高平人也博好經方洞識攝生之道嘗謂人曰食不欲雜雜則或有所犯當時或無災患積久為人作疾尋常飲食每令得所多飡今人彭亨短氣或致暴疾夏至秋分少食肥膩餅臛之屬此物與酒食瓜果相妨當時不必習病入秋節變陽消陰息寒氣惣至多諸暴卒良由涉夏取冷大過飲食不節故也而不達者皆以病至之日便謂是受病之始而不知其所由來者漸矣豈不惑哉養生要曰起東向坐以兩手相摩令熱以手摩額上至頂上滿二九止名曰存泥丸又清旦初起以兩手人兩耳極上下之二七止令人不聾次縮鼻閉氣右手從頭上引左耳二七止次引兩髮鬢舉之令人血氣流通頭不白又摩手令熱以摩身體從上至下名乾浴令人勝風寒時氣寒熱頭痛百病皆除莊子曰吹喣呼吸吐故納新熊經鳥伸為壽而已矣此道引之士養形之人也彭祖壽考者之所好也養生要伏氣經曰道者氣也寶氣得道長存神者精也寶精則神明長生精者血脈之川流守骨之靈神精去則骨枯骨枯則死矣是以為道者務寶其精從夜半至日中為生氣時正僵仆瞑目握固掘固者如嬰兒之捲手閉氣不息於心中數至二百乃口吐氣出之曰增息如此身神具五藏安能閉氣數至二百五十華蓋明華蓋眉也耳目聰舉無病邪不入寶氣一名日行氣一名長息其法正僵仆徐漱澧泉豐泉唾也而咽之因行氣口但吐氣鼻但內氣徐縮引之莫大極滿者難還入五息已一息自可吐也一息數之至九十息頻伸訖復為之滿四九三百六十息為一竟咽之乃鼻內氣也不爾或令欬凡內氣上外吐氣則氣不流自覺周身也抱朴子曰城陽郄儉少時行獵墮空塚中飢餓見塚中先有大龜數數廻轉所向無常張口吞氣或俛或仰儉素亦聞龜能導引乃試隨龜所為遂不復飢百餘日後人有偶窺塚中見儉而出之後竟能咽氣斷穀魏王拘置土室中閑試之一年不食顏色悅澤氣力自若又曰爾乃咀吸寶華谷神太清外珍五耀內守九精修養雜訣曰老子云玄牝之門是謂天地根綿綿若存用之不勤言口鼻也天地之門以吐納陰陽生死之氣每至旦面向午展兩手於膝之上徐按捺百節口吐濁氣鼻引清氣所以吐故納新是蹙氣良久徐徐吐之仍以左右手上下前後柘取氣之時意想太和元氣下入毛際流於五臟四支皆受其潤如山納雲如地受澤若氣通則竟腹中咽咽轉動若得十通即竟身體潤澤而色光渙耳目聰明飲食有味氣力倍加諸疾去矣守九精法言曰生氣時床鋪厚軟枕與身平仰臥展腳握固去身四五寸兩手亦去身四五寸微微鼻引大陽清氣入意送此氣遍身體即閉氣至極然後細從口吐之勿令耳聞吐氣之聲也著生論曰大凡著生先調元氣身有四氣人多不明四氣之中各主生死一日乾元之氣化為精精反為氣精者連於神精益則神明精固則神暢神暢則生健若精散則神疲精竭則神去神去則死二曰坤元之氣化為血血復為氣氣血者通於內血壯則體豐血固則顏盛顏盛則生合若血衰即髮變血敗則腦空腦空則死三曰庶氣庶氣者二元交氣氣化為津津復為氣氣運於生生託於氣陰陽動息滋潤形骸氣通即生氣乏則死四曰眾氣眾氣者穀氣也穀濟於生終誤於命食穀味雖生蘊穀氣還死精能附血氣能附生常使循環即身永固乾元之陽陽居陰位臍下氣海是也坤元之陰陰居陽位腦中血海是也生者屬陽陽貫五臟喘息之氣是也死者屬陰陰納五味穢惡之氣是也氣海之氣以壯精神以填骨髓血海之氣以補肌膚以流血脈喘息之氣以通六腑以扶四支穢惡之氣以亂身神以腐五臟修養雜訣氣銘曰一氣未分三才同源清濁既異元精各存天法象我我法象天我命在我不在於天昧用者夭善用者延性和者寂守一神閑靈芝在身不在於山返一守和理合玄玄精極乃明神極乃靈氣極乃精無精氣乃冥因氣而衰因氣而榮因氣而死因氣而生喜怒亂氣性情交爭擁構成患神形豈寧鍊陽銷陰其氣自行以正遣邪其患自平乾坤澄淨子後午前閉目平坐握固冥然納息盧中吐息天關入息微微出息綿綿以意引氣臟腑廻旋然後呵之榮衛通宣但有不和遣之踵前五呵六呵無疾不蠲凡欲胎息導引為先經脈不擁關節不煩或如射雕側身彎環或舉腰膝如蟾半圓交枝腦後左旋右旋勁展兩足氣出指端擺掣四肢捉搦三關熟摩尺澤氣海亦然叩齒集神合眸固關寘心亡形任意往還覺氣調勻擁塞喉間擁氣則咽三咽相連轉舌漱入咽下丹田以意送之令聲泊然一咽三咽再咽如前三十六咽胎息成焉大道無為為於無為不為無為莫若無為不思為思莫若無思萬法自然不假施為不寒不熱不渴不飢恬淡無為以道自怡妙中之妙微中之微懷道君子銘之佩之
