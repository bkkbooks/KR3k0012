body:
  text: 兵部三十二陣尚書曰武王與紂癸亥陣于商郊左傳曰晉將荀吳敗燕無終及群狄于太原崇卒也無終山戎初將戰魏舒曰彼徒我車所遇又阨地險不便也阨烏介反以什共車必克更增十人當一車之用困諸阨又克車每用於阨道今去車故為必克也請皆卒去馬為步卒自我始乃毀車以為行魏舒先自毀其屬車為步陣行戶郎反五乘為三五乘車者車三人五乘十五人今改去車更以五人為五分為五三也為五陣以相離兩於前伍於後專為右角參為左角偏為前拒皆臨時處置之名也以誘之狄人笑之笑其失常未陣而薄之大敗又曰王以諸侯伐鄭鄭伯禦之原繁高渠彌奉公為魚麗之陣先偏後伍伍承彌縫杜預注曰此魚麗之法又曰宋為乘丘之役故侵我公禦之宋師未陣而薄之敗諸鄑凡師敵未陣曰敗某師皆陣曰戰大崩曰敗績得儁曰克覆而敗之曰取某師京師敗曰王師敗績于某又曰宋公及楚人戰于泓司馬子魚曰彼眾我寡及其未濟請擊之公曰不可既陣而後擊之宋師敗績公傷股門官殲焉門官守門者也國人皆咎公公曰古之軍也不以阻隘寡人雖亡國之餘宋商紂之後不鼓不成列恥以詐勝也又曰晉楚將戰晉欒書曰楚師輕窕固壘而待之三日必退退而擊之必獲候勝焉郄至曰楚有六間不可失也其二卿相惡子重子反也王卒以舊罷老不代鄭陣而不整蠻軍而不陣蠻夷從楚不結陣也陣不違晦晦月終陰之盡故兵家以為忌在陣而囂囂喧嘩也合而加囂陣合宜靖而益有聲各顧其後莫有鬥心人恤其所底舊必不良以犯天忌我必克之又曰宋公謀逐華貙衛公子朝救宋與華氏戰于赭丘鄭翩願為鸛其御願為鵝鄭翩宋大夫華貙俱亡者鸛鸛陣也鵝鴈行陣也又曰越子伐吳吳人禦之苙澤來水而陳越子為左右勾卒勾卒鉤伍相著別為左右屯也使夜或左或右鼓譟而進吳師分以禦之越子以三軍潛涉當具中軍而鼓之吳師大亂又曰魯哀公為支離之卒因祝史揮以侵衛陣名衛人病之又曰吳楚戰于雞父公子先曰請先去備薄威後者敦陣整衣遂克之又曰鄭子元請為左拒以當蔡人衛人為右拒以當陳人陣名論語曰衛靈公問陣於孔子孔子對曰俎豆之事則嘗聞之軍旅之事未之學也周書曰春為牝陣弓為前行夏為方陣戟為前行季夏為圓陣矛為前行秋為牡陣劍為前行冬為伏陣楯為前行是為五陣史記曰黃帝有𣵠鹿之戰以定火災顓頊有共工之陣以平水害漢書陳湯傳曰湯伐西域置揚威白虎合騎三校張晏曰西域陣名又曰韓信為相國擊齊齊王走高密信追至高密西楚使龍且將號二十萬救齊齊王使龍且并軍與信戰夾濰水陣信乃夜令人為萬餘囊盛沙以壅水上流引軍半渡擊龍且佯不勝還走龍且果追渡水信使人決壅囊水大至龍且軍太半不得渡即擊殺龍且虜齊王廣遂平齊又曰李陵至峻稽山與單于相值騎可三萬圍陵陵軍居山間以大車為營陵引士出營外為陣前行持戟楯後行持弓弩令曰聞鼓聲而縱聞金聲而止虜見漢軍少直前就營陵搏戰攻之千弩俱發應弦而倒虜還走上山漢軍追殺千人又曰衛青軍出塞千餘里見單于兵陣而待於是青令武剛車自環為營張晏曰兵車也而從五千騎往當匈奴晉書曰卞壺字望之子眕及盱同沒陣母撫二子尸哭曰父為忠臣汝為孝子夫何恨乎徵士翟陽曰父死於君子死於父忠孝之道萃於一門王隱晉書曰馬隆擊涼州惡虜斷道隆作八陣圖車營並追狹則木屋施輪並前智謀縱橫出其不意故能成功後魏書曰文成帝和平二年制戰陣之法十有餘條因大儺曜兵有飛龍騰蛇魚麗之變以示威武隋書曰周法尚為定襄太守時帝幸榆林法尚朝于行宮內史令元壽言於帝曰漢武出塞旍旗千里今御營之外請分為二十四軍日別遣一軍發相去三十里旗幟相望鉦鼓相聞首尾連注千里不絕此亦出師之盛者也法尚曰不然兵亘千里動間山川卒有不虞四分五裂腹心有事首尾未知道阻且長難以相救雖是故事此乃取敗之道也帝不懌曰卿意以為如何法尚曰結為方陣四面外拒六宮及百官家口並住其間若有變起當頭分抗內引奇兵出外奮擊車為壁壘重設鉤陳此與據城理亦何異苦戰而捷抽騎追奔或戰不利此屯營自守臣謂牢固萬全之策也帝曰善因拜左武衛將軍良馬一疋絹三百疋唐書曰太宗自為真草書屏風以示群臣筆力遒勁為一時之絕先是人間有羲之書凡真行二百九十紙裝為七十卷草書二千紙裝為八十卷每聽覽餘閑時取臨翫焉謂朝臣曰書小道初非急務時或留心猶勝棄日凡諸藝業未有學而不得者也病在心力懈怠不能專精耳朕少時為公子未遭陣敵義旗之始乃平寇亂每執鼓必自指撝習覯兵陣即知強弱常取吾弱對其強強對其弱敵犯其弱追奔不踰百數十步吾擊其弱必突過其陣自背而反擊之無不潰多使此而制勝思得其理深也今吾臨人之書殊學於形勢唯在求其骨力及得骨力而形勢自生耳然吾所為皆先作意是以果能成也又曰太宗製破陣樂舞圖左圓右方先偏後伍魚麗鵝鸛箕張翼舒交錯屈伸首尾廻牙以象戰陣之形令起居郎呂才依圖教樂工一百二十人被甲執戟而習之凡為三變每變為四陣有來往疾徐擊刺之象以應歌節數日而就更名七德之舞又曰高宗御武成殿親試制舉人問之曰兵書云天陣地陣人陣其說如何舉人員半千對曰臣觀載籍此說頗多或謂天陣偏伍彌縫也以臣愚見謂不然矣夫師出以義有若時雨得天之時此天陣也兵在足食且耕且戰得地之利此地陣也善用兵者使三軍之士如父子兄弟得人之和此人陣也三者去矣其何以戰高宗嗟賞之擢居上第家語曰戰陣有列矣而勇為本國語曰吳王之軍為方陣白裳白旗素甲白羽望之如荼茅也左軍赤裳赤旟望之如火右軍玄裳玄旗望之如墨莊子曰徐無鬼謂武侯曰軍無盛鶴列於麗譙之間鶴列陣名麗譙樓也鬻子曰武王伐紂虎旅百萬陳於商郊起自黃鳥訖于赤甫走如疾風聲如震霆武王乃使太公把旄以麾之紂軍反走尉繚子曰梁惠王問尉繚曰吾聞黃帝有刑德可以百戰百勝有之乎尉繚曰不然黃帝所謂刑德者天官時日陰陽背向者也黃帝者人事而已矣何以言之武王伐紂背清水向山陵以萬二千擊紂億有八萬斷紂頭懸於白旗豈不得天官之陣哉孫子曰善用兵者譬如常山之虵也擊其首則尾至擊其尾則首至擊其腹則首尾俱至傅子曰兵法云內精八陣之變外盡九成之宜然可以用奇也盛弘之荊州記曰魚復縣鹽井以西石磧平曠聘望四遠諸葛孔明積細石為壘方可數百步壘西郭又聚石為八行相去二丈許謂之八陣圖曰八陣既成自今行師庶不復敗自後深識見者並莫能了桓宣武伐蜀經之以為常山虵勢六韜曰武王問太公曰凡用兵為天陣奈何為地陣奈何為人陣奈何太公曰星辰日月斗杓一左一右一迎一背謂之天陣丘陵水泉亦有左右前後之利此謂地陣用車用馬用人用文用武謂之人陣武王曰善又曰武王問曰引兵入諸侯之地高山盤石其避無草木四面受敵士卒惑迷為之柰何太公曰當為雲象之陣兵鈐曰有運衡陣洞當陣龍騰陣鳥翔陣握機陣虎翼陣兵書要決曰孫子稱無要正正之旗無擊堂堂之陣正正之旗者謂行軍也前後正治故不可要而擊之也堂堂之陣者謂營軍也堂堂不冒亂者不可就而擊之黃石公記曰使商人為前兵者象白虎陣使羽人為前兵者象玄武陣使徵人為前兵者象朱雀陣使角人為前兵者象青龍陣亦曰旬始陣又曰彼以直陣來者我以方陣應之方來銳應之銳來曲應之曲來圓應之圓來直應之直木方金銳火曲水圓土也各以能克者應勝之諸葛亮軍令曰連衝陣狹而厚也衛公兵法曰諸逢賊布陣須有次第先右虞候為首其次右軍其次前軍其次中軍其次後軍其次左軍其次左虞候其諸軍跳盪奇兵馬軍各隨本軍以次行至戰所並於本軍戰鋒隊前布列待五方旗節度加戰鋒等隊打賊不入其跳盪奇兵排後即入山谷林木蒙密之處并渡水狹路及下營戰處百里以來揔須搜踏清靜不然兵引過半臨戰下營伏兵起發致損軍旅其收軍還營却抽左虞候見入即左軍後軍中軍前軍右軍右虞候次之諸賊徒恃固阻山布陣不得橫列兵士分立宜為豎陣其陣法弩手弓手與戰鋒隊相間引前兩隊兩邊相翊布列既定諸軍既聽角聲其角聲節度一准前看黃旗向賊亞聞鼓聲發諸軍弩手弓手及戰鋒隊各令人捉馬一時籠槍大叫齊入若弩手弓手戰鋒等隊引退跳盪奇兵隊一時齊入戰鋒等隊排比廻面還與奇兵同入如見黃旗却立不亞及聞金鉦聲乃止膊上架槍引還各於舊處准前聽角聲卷幅簇隊一准前如便放散即更聽一會角聲依軍次發行又曰諸方陣先成逢賊鬥戰或打頭或打尾打頭其陣行不前進陣既不進自然牢密如其打尾頭行不停其陣中間多即斷絕須面別各定揔管都押幹當勾令斷絕太白陰經曰黃帝設八陣之形車廂洞當金也車土中黃上也鳥雲鳥翔火也折衝木也龍騰却月水也鴈行鵝鸛天也輪車地也飛翼浮阻巽也風后亦演渥奇圖云以正合以奇勝或合而為一陣或散而為八聚散之勢節制之度復置虛實二壘力牧亦創營圖其後秦由余蜀諸葛亮並有陣圖以教人戰夫營壘教圖使士卒知進止識金鼓其應敵戰不可預形故其戰勝不復而應形無窮兵形象水因地而制形兵因敵而制勝能與敵變化而取勝者謂之神則其戰陣無圖明矣而庸將以教習之陣為戰敵之陣不亦謬乎又曰合而為一陣終一陣之中離而為八陣聽音望麾以出四奇飛龍虎翼鳥翔虵盤為四奇陣地天風雲為四正陣夫善戰者以正合以奇勝奇正相生如環之無端孰能窮之奇為陽正為陰陰陽相薄而四時行焉奇為剛正為柔剛柔相得而萬物成焉奇正之用而萬物無所勝焉又曰天陣經曰風后演握奇圖自一陣之中分為八陣天有衝或圓布形黃帝曰少則為圓利為主色尚玄為乾地陣黃帝曰壯則為方利為主色尚黃為坤風陣風附於天風象峰其形銳首利為客色尚赤為巽雲陣雲附於天太公曰左右相向是也其形銳首利為主色尚白已前為四焉為坎飛龍陣其形屈曲象龍利為主色尚上玄下赤為震虎翼陣居中張翼而進其形踞利為主色尚上黃下青為兌虵盤陣太公曰圍繞之義其形宛轉利為主色尚上黃下赤為艮鳥翔陣太公曰突擊之戰其形迅急利為客其色尚上玄下白為离又曰天陣居乾為天門地陣居坤為地門風陣居巽為風門雲陣居坎為雲門飛龍居震為飛龍門武翼居兌為武翼門鳥翔居离為鳥翔門虵盤居艮為虵盤門天地風雲為四正門龍虎鳥虵為四奇門乾坤艮巽為闔門坎离震兌為開門
