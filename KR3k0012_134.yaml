body:
  text: 偏霸部十七梁蕭方智梁書曰敬帝諱方智字慧相小字法真世祖第九子也太清三年封興梁侯承聖元年封晉安郡王二年出為平南將軍江州刺史三年十一月江陵陷太尉楊州刺史王僧辨司空南徐州刺史陳霸先定議以帝為太宰承制奉迎還京師四年二月至自潯陽入居朝堂以太尉王僧辨為中書監録尚書驃騎將軍都督中外諸軍事加司空陳霸先班劍二十人三月齊遣其上黨主高渙送貞陽侯蕭淵明來主梁嗣至東關遣吳興太守裴之橫與戰敗績之橫死王僧辨率衆出屯姑熟七月王僧辨納貞陽侯蕭淵明自採石濟江入于京師以帝為皇太子九月司空陳霸先舉義襲殺王僧辨默蕭淵明丙午帝即皇帝位十月詔改承聖四年為紹泰元年大赦以貞陽侯淵明為司徒封建安郡公以司空陳霸先為尚書令尊所生夏貴妃為皇太后立妃王氏為皇后太平元年正月大赦四月齊軍水步入丹陽縣至秣陵故治六月齊潛軍至蔣山北至玄武湖司空陳霸先授衆軍節度大破之七月陳霸先進位司徒九月改元大赦除司徒陳霸先為丞相録尚書事二年四月齊遣使請和八月加丞相黃鉞領太傅劍履上殿九月為相國揔百揆封十郡為陳公備九錫之禮十月禪位于陳奉帝為江陰王薨于外邸時年十六追諡敬皇帝史臣曰梁季橫潰喪亂屢臻當此之時天曆去梁敬皇高讓將同釋負焉後梁蕭察後梁宣帝諱察昭明太子第三子也封嶽陽王授雍州刺史孝元被西魏所害察遂為魏附庸稱大定元年以蔡大寶為相時人比劉備過孔明察性不好酒尤惡見婦人酷信佛法謂尚書宋如周曰卿可謗經如周踧踖上子六切下音跡自陳懼而出以告蔡大寶寶曰卿當不謗餘經不信法華耳如周乃悟經云隨喜面不狹長如周面狹且長故戲之耳察居處殘毀干戈日用在位八年憤惋而殂年四十子巋立蕭巋明帝諱巋宣帝第三子也聰明有器識大定元年為太子宣帝崩太子即位號天保元年十五年周武帝平北齊得傳國璽巋入周賀武帝大會群臣及諸蕃客周武自彈琵琶令故齊主高緯起舞達摩支故安德王延宗悲不自勝緯舞訖勸巋巋乃起舞周武曰梁主乃能為朕舞乎巋曰陛下既自彈五絃臣何敢不同百獸周武大悅周武指齊氏故臣吒列長義謂巋曰是登陴罵朕者巋曰長義未能抱樂翻敢吠堯周武大笑初雖禮接巋未深知之至是巋承聞乃陳父荷太祖拯救之恩并敘二國艱虞腐齒掎角之事辭理辨暢因涕泗交流周武亦為歔欷自是禮遇日深賜雜繒百假馬五匹并賜齊宮伎女遣歸國執巋手曰待破突厥必送梁王歸江東巋途經古跡莫不駐馬賦詩以敘其懷至于江陵凡三十首女為秦晉王廣妃在位十四年而殂蕭琮琮明帝太子也既立赦其封內改元寬運琮性廣仁有大度博學有文義兼善弓馬明年隋文徵琮入朝琮率其臣二百餘人朝于長安群臣辭于送客堂琮下馬一一執別莫不殆涕既至隋文帝留之使崔弘度將兵攻江陵江陵不守於是國廢陳陳霸先陳書曰高祖武皇帝諱霸先字興國小字法生吳長興城下若里人漢太丘長陳實之後也世居頴川實玄孫準晉太尉準生匡匡生達永嘉南遷為丞相掾歷太子洗馬出為長城令悅其山水遂家焉嘗謂所親曰此地山川秀麗當有王者興二百年後我子孫必鍾斯運高祖以梁天監二年癸未歲生少倜儻有大志不治生産既長讀兵書多武藝明達果斷為當時所推服嘗遊義興館於許氏夜夢天開數丈有四人朱衣捧日而至令高祖開口納焉及覺腹中猶熱高祖心獨負之大同初新喻侯蕭映為吳興太守甚重高祖謂僚佐曰此人方將遠大及映為廣州刺史高祖為中兵參軍隨之鎮映令高祖招集士馬衆至千人仍命高祖監宋隆郡所部安化二縣元不賓高祖討平之尋監西江督護高要郡守先是武林侯蕭咨為交州刺史以裒刻失衆心士人李賁連結數州豪傑同時反遣高州刺史孫新州刺史盧子雄將兵擊之等不時而進皆敗於廣州伏誅子雄弟子略與子姪及其主帥杜天合杜僧明共舉兵執江南督護沈覬進寇廣賊晝夜苦攻州中震恐高祖率精兵三千卷甲兼行以救之頻戰屢捷天合中流矢死賊衆大潰僧明遂降梁武帝深歎異焉授直閣將軍封新安子邑三百戶仍遣畫工圖高祖而觀之其年冬蕭映卒明年高祖送喪還都至大庾領會有詔高祖為交州司馬領武平太守與刺史楊瞟匹妙切南討十一年六月軍至交州賁衆數萬於蘇歷江口立城柵以拒官軍瞟推高祖為前鋒所向摧陷賁走典徹湖於屈獠界立寨音寨大造船艦充塞湖中衆軍憚之頓湖口不敢進夜江水暴起七丈注湖中奔流迅激高祖勒所部兵乘流先進衆軍鼓譟俱前賊衆大潰賁竄入屈獠洞中屈獠斬賁傳首京師是歲太清元年也除振遠將軍西江督護高要太守督七郡諸軍事二年冬侯景冠京師高祖將率兵赴援廣州刺史元景仲陰有異志將圖高祖高祖知其計與成州刺史王懷明行臺選郎殷外臣等密議誡嚴三年七月集義兵於南海馳檄以討景仲景仲窮蹙縊于閣下高祖迎蕭勃鎮廣州十一月高祖遣杜僧明胡頴將二千人頓于嶺上并厚結始興豪傑同謀義舉侯安都張偲音倩等率千餘人來附蕭勃聞之遣鍾休悅說高祖曰侯景驍雄天下無敵前者援軍十萬士馬精強然而莫敢當鋒遂令羯賊得志以君踈外詎可暗投未若且住始興遙張聲勢保此泰山自求多福高祖泣謂休悅曰僕本庸虛蒙國成造往聞侯景渡江即欲赴援今京都覆沒主上蒙塵君辱臣死誰敢愛命君侯體則皇枝任崇方嶽已不能摧鋒萬里雪此冤痛見遣一軍猶賢乎已乃降後旨使人慨然仆行計決矣憑為披述乃遣使間道往江陵稟承軍期節度湘東王承制授高祖員外散騎常侍持節明威將軍交州刺史改封南野縣伯六月高祖修嶂頭古城徙居焉高州刺史李遷仕據大皋遣主帥杜平虜率千人入𩕆音紺石魚梁高祖命周文育將兵擊走之遷仕奔寧都承制授高祖通直散騎常侍使持節信威將軍豫州刺史領豫章內史改封長城縣侯尋授散騎常侍使持節都督六郡諸軍事軍師將軍南江州刺史餘如故時寧都人劉藹等資遷仕舟艫兵仗將襲南康高祖遣杜僧明等率二萬人據白口築城以禦之遷仕亦立城以相對二年三月僧明等攻拔其城生擒遷仕送南康高祖斬之承制命高祖進兵定江州仍授江州刺史餘如故六月高祖發自南康觀者數萬人是時承制遣征都將軍王僧辨督衆軍討侯景八月僧辨軍次湓城高祖率杜僧明等衆軍及南川豪師合三萬人將會焉時西軍乏食高祖先貯軍糧五十萬石至是分三十萬以資之仍頓巴丘會侯景廢簡文帝立豫章嗣王楝高祖遣兼長史沈袞奉表于江陵勸進十一月承制授高祖使持節都督會稽東陽新安臨海永嘉五郡諸軍事平東將軍楊州刺史領會稽太守豫章內史餘並如故三年正月高祖率甲士三萬人強弩五千張舟艦二千乘發自豫章二月次桑落洲遣中記室參軍江元禮以事表江陵承制加高祖鼓吹一部是時僧辨已發湓城會高祖于白茅灣乃登岸結壇刑牲盟約進軍次蕪湖侯景城主張黑棄城走三月高祖與諸軍進剋姑熟仍次蔡州侯景登石頭城觀望形勢意甚不悅謂左右曰此軍上有紫氣不易可當乃以船䑰貯石沉塞淮口緣淮作城自石頭迄青溪十餘里中樓雉相接諸將未有所決僧辨遣杜崱問計於高祖高祖曰前柳仲禮數十萬兵隔水而坐韋粲之在清溪竟不渡岸賊乃登高望之表裏俱盡肆其凶虐覆我王師今圍石頭須渡北岸諸將若不能當鋒請先往立柵高祖即於石頭西橫隴築柵衆軍次連八城直出東北賊恐西州路斷亦於東北果林作五城以遏大路景率衆萬餘人鐵騎八百餘匹結陳而進乃命諸將分處置兵賊直衝王僧志僧志小縮高祖遣徐度領弩手二千橫截其後賊乃却高祖與王琳杜龕等以鐵騎悉力乘之賊退據其柵景儀同盧輝略開石頭北門來降蕩主戴晃曹宣等攻拔果林一城衆軍又剋其四城賊復還殊死戰又盡奪所得城柵高祖大怒親率攻之士卒騰柵而入賊復散走景與百餘騎棄矟執刀左右衝陳陳不動景衆大潰遂北至西明門景至闕下不敢入臺遣腹心取其二子而遁高祖率衆出廣陵應接景將郭元建會元建奔齊高祖納其部曲三千人而還僧辨啓高祖鎮京口五月齊遣辛術圍嚴超達於秦郡高祖命徐度領兵助其固守齊衆七萬填塹起土山穿地道攻之甚急高祖乃自率萬人解其圍縱兵四面擊齊軍弓弩亂發齊平秦王中流矢死斬首數百級齊人收兵而退高祖振旅南歸遣記室參軍劉本仁獻捷于江陵承制授高祖使持節散騎常侍都督南徐州諸軍事征北大將軍開府儀同三司南徐州刺史餘並如故及王僧辨率衆征陸納於湘州承制命高祖代鎮楊州十一月湘東王即位于江陵改承聖元年明年湘州平高祖旋鎮京口三年三月進高祖司空餘如故十一月西魏攻陷江陵高祖與王僧辨等進啓江州請晉安王以太宰承制又遣長史謝哲奉箋勸進十二月晉安王至自潯陽入居朝堂給高祖班劍二十人四年五月齊送貞陽侯淵明還主社稷王僧辨納之即位改元曰天成以晉安王為皇太子初齊之請納貞陽侯也高祖以為不可遣使詣僧辨苦爭之往返數四僧辨竟不從高祖居常憤艱密謂所親曰武皇雖盤石之宗遠布四海至于剋雪讎恥寧濟艱難唯孝元而已功業懋盛前代未聞我與王公俱受重寄語未絶音聲猶在耳豈期一旦便有異圖嗣主高祖之孫元皇之子海內屬目天下宅心竟有何辜坐致廢黜遠求夷狄假立非次觀其此情亦可知矣乃密具袍數千領及錦綵金銀以為賞賜之具九月壬寅高祖召徐度侯安都周文育等謀之仍部列將士分賞金帛水陸俱進是夜發南徐州討王僧辨甲辰高祖步軍至石頭前進遣勇士自城北踰入時僧辨方視事外白有兵俄而兵自內出僧辨遽走與其弟三子頠相遇俱出閣左右尚數十人苦戰高祖大兵尋至僧辨衆寡不敵走登城南門樓高祖因風縱火僧辨窮迫乃就擒是夜縊僧辨及頠景午貞陽侯遜位百僚奉晉安王上表勸進十月己酉晉安王即位改承聖四年為紹康元年壬子詔授高祖侍中大都督中外諸軍事車騎將軍楊南徐二州刺史持節司空班劍鼓吹並如故仍詔高祖甲仗百人出入殿省震州刺史杜龕據吳興與義興太守韋載同舉兵反高祖命周文育衆攻載于義興龕遣其從弟北叟將兵拒戰北叟敗歸義興二年正月癸未誅杜龕于吳興龕從弟北叟司馬沈孝敦並賜死二月庚申高祖遣侯安都周鐵武率舸艦備江川仍頓梁山起柵二月戊戍齊遣水軍儀同蕭軌庫狄伏連堯難宇東方老侍中裴英起東廣州刺史獨孤辟惡洛州刺史李希光并任約徐嗣徽等率衆十萬出柵口向梁山帳內蕩主黃叢逆擊敗之燒其前軍船艦齊頓軍保蕪湖高祖遣定州刺史沈泰吳郡太守裴忌就侯安都共據梁山以禦之四月丁巳高祖詣梁山軍巡撫五月甲申齊兵發自蕪湖景申至秣陵故治高祖遣周文育屯方山徐度頓馬牧杜稜頓大航南已高祖率宗室王侯及朝臣將帥於大司馬門外白獸闕下刑牲告天以齊人背約發言慷慨涕泗交流同盟皆莫能仰視士卒觀者益奮辛丑齊軍於秣陵故縣跨淮立橋柵引渡兵馬其夜至方山侯安都周文育徐度等各引兵還京師癸未齊兵自方山進及兒塘游騎至臺周文育侯安都頓白土岡旗鼓相望都邑震駭高祖潛撤精卒三千配沈泰渡江襲齊行臺趙彥深於瓜步獲舟艦百餘艘陳粟萬斛六月壬辰齊兵潛至鍾山龍尾丁未進至幕府山高祖命衆軍秣馬蓐食遲明攻之乙卯旦自率帳內麾下出幕附山南吳明徹沈泰等衆軍首尾齊舉縱兵大戰侯安都自白下自引兵橫出其後齊師大潰斬獲數千相蹂藉而死者不可勝計生執徐嗣宗斬之以徇追奔至于臨沂其江乘攝山鍾山等諸軍相次克捷七月景子詔授高祖中書監司徒楊州刺史進爵為公增邑并前五千戶并給油幢皂輸車是月侯瑱他甸切以江州入附遣侯安都鎮上流定南中諸郡八月癸卯太府卿何敳五耒切新州刺史華志各上玉璽一高祖表以送臺詔歸之高祖是日詔高祖食安吉武康二縣合五千戶九月進高祖位丞相録尚書事鎮衛大將軍改刺史為牧進封義興郡公丁未中散大夫王彭箋稱今月五日平旦於御路見龍跡自太里至象闕亙三四里庚申詔追贈高祖考侍中光祿大夫加金章紫綬封義興郡公諡曰恭十月甲戍勑丞相自今入問訊可施別榻以近扆坐二年正月壬寅天子朝萬國于太極東堂詔加高祖班劍十人八月甲午進高祖位太傅加黃鉞劍履上殿入朝不趨贊拜不名并給羽葆鼓吹一部丙申加高祖前後部羽葆鼓吹是時湘州刺史王琳擁兵不應命高祖遣周文育侯安都率衆討之九月詔進位相國揔百揆封十郡為陳公備九錫之禮十月進高祖爵為王又命冕十有二旒建天子旌旗辛未梁帝擅位永定元年冬十月乙亥高祖即皇帝位于南郊柴燎告天大赦天下改梁太平二年為永定元年封梁帝為江陰王賜民爵二級文武位二等鰥寡孤獨不能自存者人穀五斛丙子輿駕幸鍾山祠蔣常廟戊寅輿駕幸華林園親覽辭訟臨赦囚徒己卯分遣大使宣勞四方辛巳追尊皇考曰景皇帝廟號太祖皇妣董太夫人曰安皇后追諡前夫人錢氏號為昭皇后立夫人章氏為皇后癸未尊景帝陵曰瑞陵昭皇后陵曰嘉陵依梁初園陵故事立刪定郎治定律令戊子遷景皇帝神主祔于太廟夏四月甲子輿駕親祠太廟乙丑江陰王薨詔遣太宰吊祭司空監護喪事凶禮所須隨由備辨以梁武林侯蕭咨息季卿嗣為江陰王初侯景之平也火焚太極殿承聖中議欲營之獨闕一柱至是有樟木大十八圍長四丈五尺流泊陶家後渚監軍鄒子度以聞詔中書令沈衆兼起部尚書少府卿蔡儔兼將作大匠起太極殿甲寅太極殿成匠各給復十二月庚申侍中安東將軍臨川王蒨率百僚朝前殿拜上牛酒甲子輿駕幸大莊嚴寺設無礙大會捨乘輿法物群臣備法駕奉迎即日輿駕還宮景寅高祖於太極東堂宴群臣設金石之以路寢告成也三年春正月己丑青龍見于東方丁酉夜大雪及明太極殿前有龍跡見甲午廣州刺史歐陽頠表稱白雪見于州江南岸長數十丈仙人見于羅浮山寺小石樓長三丈所通身潔白衣服楚麗北江州刺史熊曇朗殺都督周文育于軍舉兵反王琳遣其將常衆愛曹慶率兵援佘視遮切孝勵六月戊子儀同侯安都敗衆愛等於左里獲琳從弟襲主帥羊暕音簡等三十餘人衆愛遁走庚寅廬山民斬之傳首京師甲午衆師凱歸丁酉高祖不豫遣兼太宰尚書左僕射王通以疾告太廟兼太宰中書令謝哲告太社南北郊辛丑高祖疾小瘳故司空周文育之柩至自建昌壬寅高祖素服哭于堂哀甚癸卯高祖臨訊獄省訟是夜熒惑在天尊高祖疾又甚景午崩于璿璣殿時年五十七遣詔追臨川王蒨入篡甲寅遷殯于太極殿西階諡曰武皇帝廟號高祖葬萬安陵
