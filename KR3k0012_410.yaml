body:
  text: 人事部五十交友四莊子曰子祀子輿子梨子來四人相與語曰孰能知死生存亡之體吾與之友矣四人相視而笑莫逆於心遂相與為友又曰孔子與柳下季為友又曰桑扈孟子琴張三人相與為友孟子曰舜上見帝帝館于二宮迭為賓主是天子交匹夫也史記曰管夷吾鮑叔牙二人相友管仲曰吾始困時嘗與鮑叔賈分財利多自與鮑叔不以我為貪知我貧也吾嘗為鮑叔謀事而更窮困鮑叔不以我為愚知時有利不利也吾嘗三仕三見逐於君鮑叔不以我為不肖知我不遭時也吾嘗為君三戰三北鮑叔不以我為怯知我有老母也生我者父母知我者鮑叔也傅子曰杜畿至許見侍中耿紀共語終夜尚書令荀彧家與紀屋相比夜聞畿言異之至旦遣謂紀曰有國士何以居位既見畿如舊相識遂進畿於朝郭子曰冀州刺史楊准二子喬字國彥髦字士彥清平有識俱總角為成器准與裴頠樂廣友善遣見之頠謂准曰喬及卿髦小減也廣謂准曰喬自及卿髦尤精出准笑曰我二兒之優劣乃裴樂之優劣論者許之魯連子曰舜耕於歷山而交益陶於河濱而交禹孔叢子曰子高遊趙平原君客之有鄒文節與子高相友善及將還魯諸故人訣既畢文節送行三宿臨別文節流涕交頤子高徒抗手而已分背就路其徒問之曰先生與彼之子善彼有戀戀之心悽愴流涕而先生厲聲高揖無乃非親親之謂乎子高曰始吾謂之大丈夫乃今知其婦人也人生則有四方之志豈鹿豕也哉而常群藂乎又曰秦莊子死孟武伯問孔子曰古者同寮有服乎答曰聞諸老聃昔虢叔閎夭太顛散宜生南宮括五者同寮比德以贊文武及虢叔死四人為服古之達禮者行之韓詩外傳曰宋玉因其友事襄王王待玉亦無異江表傳曰吳有程普者頗以年長數凌侮周瑜瑜折節下容終不之與交普後自敬服而親重之乃告人曰與周公瑾交若飲醇醪不覺自醉袁宏山濤別傳曰陳留阮籍譙國嵇康並高才遠識少有陪其契者濤初不識一與相遇便為神交列士傳曰六國時羊角哀與左伯桃為友聞楚王賢俱往仕至梁山逢雪糧盡度不兩全遂併糧與角哀哀至楚楚用為上卿後來收葬伯桃伯桃墓逼近荊將軍陵而伯桃告云我曰夜被荊將軍伐之哀乃加兵未知勝否云我向地下看之遂自刎死道學傳曰杜京産建武初徵之産曰莊周持釣豈為白壁所回避不就會稽孔道微亦守志産與友善又曰薛彪之聞陶隱居委紱架石室與將負芻鄰居接宇彪歎曰彼二人者可為道友何為久滯東川於是命棹來歸便相就共住日夕講習又曰潘洪字文盛山陰人幼辭家入山修稟上法陶貞白見而悅之遂與投分共遊諸處尋求真書又曰許邁字遠遊少與高陽許詢並治高節同志齊名詢能清言兼有詞藻邁博學亦善屬文廣州先賢傳曰董正字伯和番禺人也隱士南陽車遂字德陽聞正令名不遠萬里徑來投正正道同志合恩如伯仲數年中遂得病正為傾家救恤疾篤命絶停尸於堂殯斂之禮如同生身自送喪於南陽殷氏世傳曰殷褒字元祚渤海府君之子河南鄭廉始出寒賤又未知名見而友之廉父常居肆乃就拜其父於市衆皆驚廉由是顯名位至司徒荀氏家傳曰荀羡與沛國劉真長太原王仲祖陳郡商洪源並著情契太宗時居阿衡之任虛中誘納賓友賢哲與羡等數人為布衣之好又曰荀粲簡貴不能與常人交接所交者皆一時雋傑粲卒至葬夕赴者十餘人皆同年名士也哭之感慟路人嵇康高士傳曰逢萌條房李雲王尊同時相友世號之四子海內先賢傳曰潁川鍾皓字季明為郡功曹時陳實為西門亭長皓深禮之與同分義皓辭公府太守問誰可代君皓曰明府必得其人西門亭長可也張隱文士傳曰禰衡與孔融作爾汝之交時衡未滿二十融已五十重衡才秀忘年也向秀別傳曰秀字子期少為同郡山濤所知又與譙國嵇康東平呂安友善其趍舍進止無不必同造事營生業亦不異常與康偶煆於洛邑與呂安灌園於山陽收其餘利以供酒食之費或率爾相攜觀原野極遊浪之勢亦不計遠近或經日乃歸復修常業郭林宗別傳曰郭泰字林宗入潁川則友李元禮至陳留則結符偉明之外黃則親韓子助過蒲亭則師仇季智也英雄記曰袁紹不妄通賓客好遊俠與張孟卓何伯求吳子卿許子遠伍德瑜等皆奔走之友不應辟命荊州記曰陸凱與范曄為友江南寄梅花一枝來諸長安與曄并贈詩曰折花奉驛使寄與隴頭人江南無所得聊贈一枝春虞預會稽典録曰盛憲字孝章初為臺郎常出遊逢一童子容貌非常憲怪而問之是魯國孔融年十餘歲憲下車執融手載以歸舍與融談宴結為兄弟升堂拜母曰可賀憲母昔有憲憲今有弟又曰卓恕字公行上虞人也與人期約雖遭暴風疾雨無不至者嘗從建鄴辭太傅諸葛恪恪問何當復來恕答曰某日當復親覲至是日恪停食候恕至時賓客會者皆以為稽建業相去千餘里道隔江湖豈得如期須臾恕至一坐盡驚又曰賀劭字興伯山陰人也為人美姿容動靜有常與人交久而敬之又曰虞倫字孝緒餘姚人也與駱瑗為彈冠之友吳録曰步騭與衛於同年相善俱以種瓜自給晝勤四體夜誦經傳三輔決録曰游殷為胡軫所害同郡吉伯房郭公休與殷同歲相善為緦麻三月趙歧三輔決録曰蔣詡字元卿舍中三徑唯羊仲裘仲從之遊二仲皆雅廉逃名之士華陽國志曰洛陽慶鴻慷慨好義廉范與為刎頸之交時人稱曰前有管鮑後有慶廉陳留志曰韋庾字宣明襄邑人也常居園中故世謂之園公與河內軹人角里先生綺里季夏黃公為友皆修道潔己非義不踐當秦末避代入商洛山隱居自娛竹林七賢論曰嵇康字叔夜與東平呂安少相知友每一相思輒千里命駕又曰山濤與阮藉嵇康皆一面契若金蘭濤妻韓氏嘗問濤曰吾當年可為交者唯二人而已崔豹古今注曰鄭弘行宦京洛未至夜宿一壖如過而緣二切河邊地也於是逢舊友四人四顧荒郊村落絶遠酤酒無處情抱不申仍各以錢投水中依評共飲盡夕酣暢皆得大醉因名沉釀川劉向說苑曰伯牙子鼓琴其友鍾子期聽之方鼓琴而志在於太山鍾子期聽之曰善哉鼓琴巍巍乎若太山少選之間而志在流水鐘子期聽之曰善哉鼓琴湯湯乎若流水鍾子期死伯牙子屏琴絶絃終身不鼓以為時無足為鼓琴者說苑曰魏文侯歎田子方曰自友子方也君臣益親百姓益附吾是以知友士之功焉世說曰山公與嵇阮契若金蘭山公妻韓氏覺二人異於常欲窺之他日二人來妻竊窺之公曰二人何如妻曰君殊不如正當以識度相及耳公曰伊輩亦當以我為勝又曰華歆與管寧邴原相友曾共鋤園得金寧以鋤揮之與瓦礫無異歆掘而擲之又曰荀臣伯遠看友人疾值胡賊攻郡臣伯不忍去賊既至謂臣伯曰大軍至一郡並空汝何男子輕大軍而敢獨止臣伯曰有友人疾不忍委之寧以我身代友人之命賊知其賢自相謂言我輩無義之人而入有義之國疾促軍而還一郡並全又曰陸機赴假還洛輜重甚盛戴淵與年少掠之淵在岸上據胡床指揮左右皆得其宜淵既有風摽鋒潁雖處鄙事神氣獨異於衆機於船屋上遙謂之曰卿才如此亦復作劫淵便流涕投劍歸機辭屬非常機彌重之便與定交咋筆薦焉又曰夏侯稱字義權年十六與文帝為布衣之交每宴氣凌一座辨士不能答代之高者多從之遊又曰支道林喪法慶之後精神殞喪風味轉墜常謂人曰昔匠石廢斤於野人牙生輟絃於鍾子推己外求良不虛也冥契既逝發言莫賞中心蘊結余其亡矣卻後一年支遂亦隕又曰王爽與司馬太傅飲酒太傅醉呼王為小子王曰亡祖長史與簡文帝為布衣之交亡姊伉儷二宮何小子之有楊松玠談藪曰太原孫伯翳放情物外棲志丘壑與王令君高范將軍雲為莫逆之交琴操曰三士窮者其思革子之所作也其思革子戶文子叔衍子三人相與為友聞楚成王賢好士三人俱往見之於豪嶔巖之間卒逢飄風暴雨俱伏於空柳之下衣寒糧乏度不俱活三人相視歎曰與其飢寒俱死豈若并衣糧於一哉二子以革子為賢推衣與之革子曰生則同樂死則共之固辭二子曰吾相與猶左右手也左傷則右救右傷則左勞子不我受俱死無名可痛乎於是革子受之二子遂凍餓而死其思革子揭衣糧而去往見楚王王知其賢用旨酒嘉郩設鍾鼓樂之革子有憂悲之色楚王乃推樽罷樂升琴而進之其思革子援琴而鼓作相與別散之志孫楚牽招碑曰初君與劉備少長河朔英雄同契為刎頸之交有橫波截流柎翼橫飛之志俄而委質於太祖備遂鼎足於蜀漢所交非常為時所忌每自酌損乎季孟之間蔡雍真定真父碑曰其接友也審辨真僞明于知人度終始而後交情不踈而貌親夏侯湛鮑叔像贊曰鮑子愔愔式昭德音綢繆陳仲二人同心厥芳猶蘭其堅如金遙遙景跡君子攸欽周祗執友針曰人亦可言貴則易交利重太山道輕鴻毛久而益敬見之晏平霜雪既至徑柏冬青
