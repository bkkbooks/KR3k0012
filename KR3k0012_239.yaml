body:
  text: 職官部三十六大將軍史記曰武帝伐胸奴以衛青為大將軍位在諸公上公卿皆拜唯汲黯獨揖有言大將軍尊貴不宜爾黯曰大將軍有揖客獨不貴耶青聞之愈重黯漢書曰武帝以霍光為大將軍輔昭帝田千秋為丞相及昭帝初即位未任聽政事一決大將軍光千秋居相位謹厚有重名光謂千秋曰始與君侯俱受先帝遺詔令光治內君侯治外宜有以教督使光無負天下千秋曰唯將軍留意即天下幸甚終不有所言後漢書曰竇憲為大將軍威震天下復出屯武威會帝西祠園陵詔憲與車駕會長安及憲至尚書以下議欲拜之伏稱萬歲韓稜正色曰夫上交不諂下交不黷禮無為人臣稱萬歲之制議者皆慚而止又曰詔鄧騭班師朝廷以太后故遣五官中郎將迎拜騭為大將軍到河南使大鴻臚親迎中常侍齎牛酒郊勞王主以下候望於道既至大會群臣賜束帛焉應劭漢官儀曰和帝以竇憲為大將軍乃冠三公又曰梁冀為大將軍以三世姻媾援立之功公卿希旨上比周霍舉高第茂才官屬皆倍餘府魏志曰文帝以孫權為大將軍吳王加九錫又曰太傅司馬宣王奏免曹爽皇太后詔召高文惠假節行大將軍事據爽營太傅謂之曰君為周勃矣後魏書曰莫題有謀策為大將軍平慕容驎賜爵東宛侯後太祖欲廣宮宇規度平城四方數十里將摸鄴洛長安之制運材數百萬以題機巧令監定焉陳思王輔臣論曰知慮深奧淵然難測恭以奉上愛以接下納言左右為帝喉舌曹大將軍也大將軍魏志曰王謙為大將軍何進長史進以謙名公之胄欲與為婚見其二子使擇焉弗許以疾免臧榮緒晉書曰魯芝字世英耽思墳籍研精稽古自三代之奧典聖人之微言皆該覽焉大將軍曹爽輔政高選賢明以為官屬延芝為司馬續漢書曰李固字子堅拜議郎為洛陽令大將軍梁冀請為從事中郎晉書曰鄭沖字文和以儒雅為業簞食瓢飲布衾縕袍不以為憂大將軍曹爽以為從事中郎又曰李喜景帝輔政命喜為大將軍從事中郎喜到引見謂喜曰昔先公辟君而不應今孤命君而至何也對曰先公以禮見待喜得以禮進退明公以法見繩喜畏法而至帝甚重之何法盛晉中興書曰郭舒大將軍王敦以為從事中郎會郭討劉隗切諫敦大怒曰人中間言卿癡故炙卿眉頭今疾復發耶勿復語也舒曰明公聽舒一言舒聞古之狂也直周昌汲黯朱雲皆不癡也昔堯立誹謗之木舜懸敢諫之鼓公為勝堯舜耶而乃折舒使不得言敦默然也竹林七賢傳曰阮籍字嗣宗為太傅司馬宣王參軍遷景王大將軍從事中郎通典曰從事中郎漢末官也陳陽為大將軍王鳳從事中郎是也在主簿上所掌與長史同華嶠後漢書曰崔駰字亭伯辟大將軍竇憲府掾憲新輔政貴重掾三十人皆故刺史二千石唯駰以處士年少擢在其間憲擅權驕恣駰數諫之出為長岑長不得意不之官而歸華嶠後漢書曰馬融字季長為大將軍鄧騭舍人晉陽秋曰義興周延為左率轉尚書遷大將軍咨議參軍車騎將軍漢書曰元光元年以中尉程不識為車騎將軍屯鴈門應劭漢官儀曰帝以元舅馬防為車騎將軍銀印青綬吳志曰孫一奔魏以一為車騎將軍儀同三司封吳侯以故王芳貴人邢氏妻之邢美色妬忌下不堪命遂共殺一及邢氏蜀志曰鄧芝字伯苗義陽新野人益州從事張裕相芝往從芝謂芝曰君年過七十位至大將軍封侯為車騎將軍賞罰明善恤卒伍身之衣食資仰於官不茍素儉然終不治私産妻子不免飢寒死之日家無餘財後魏書曰王衍字文舒出為散騎常侍征東將軍西兗州刺史衍屆治未幾屬爾朱仲遠稱兵內向州既路衝為其攻逼衍不能守為仲遠所擒以其名望不害也令騎牛從車久乃見釋還洛除車騎將軍隋書曰長孫覽周武帝在藩與覽親善及即位彌加禮焉超拜車騎大將軍每公卿上奏必令省讀覽有口辨聲氣雄壯凡所宣傳百寮屬目帝每嘉歎之覽初名善帝謂之曰朕以萬機委卿先覽遂賜名焉驃騎將軍漢書曰武帝以霍去病為嫖姚校尉征胸奴纍有功寵冠群臣置驃騎將軍秩與大將軍同又曰明帝即位以東平王蒼為驃騎輔政開東閣延英雄及蒼歸國有驃騎時吏丁牧周相以蒼敬賢下士不忍去之遂為王家大夫數十年事祖及孫帝聞褒美又曰驃騎將軍漢官也長史司馬各一人金璋紫綬五時朝服武冠佩山玄玉光武中興諸將皆稱大後天下既定武官悉省東觀漢記明帝詔曰東平王蒼寬博有謀可以託六尺之孤臨大節而不可奪其名以蒼為驃騎將軍又曰張意拜驃騎將軍討東甌備水戰之具一戰大破所向無前又曰其將軍不常置比公者又有驃騎將軍建武二十年復置驃騎將軍位次公有長史一人後漢書曰劉隆為驃騎將軍行大司馬事隆奉法自守視事八歲上將軍印綬罷賜養牛上樽酒十斛應劭漢官儀曰漢興置驃騎將軍位次丞相隋書曰崔彭轉驃騎恆典宿衛性謹密在省闥二十餘年每當上在仗危坐終日未嘗有怠惰之容上甚嘉之上每謂彭曰卿當上日我寢處自安又嘗曰卿弓馬固以絶人頗知學不彭曰臣少愛周禮尚書每於休沐之暇不敢廢也上曰試為我言之彭因説君臣戒慎之義上稱善韋昭辨釋名曰驃騎將軍騎將軍秩比三公辨云此二將軍秩本二千石世説曰何驃騎弟第五以高情遜避而驃騎令仕對曰然第五之稱何必減之驃騎陳思王輔臣論曰魁傑雄特秉心平直威嚴足憚風行草靡戎昭果毅折衝厭難者司馬驃騎梁簡文帝讓驃騎楊州刺史表曰常願侯服就列希同特進之班角巾還第不競龍驤之貴而天澤無涯名器惣集竊以驃騎之官既為上將神州之重實號土中故以彈壓六戎冠冕九牧豈止司隸絳節金吾緹騎况復任惣皇畿位重連率何則驃騎之號歷選為重元狩之中始自去病永平之建特授劉蒼齊獻為公主所申吳漢因群臣之舉驍騎將軍漢書曰李廣為驍騎將軍後出鴈門擊胸奴胸奴生得廣廣時傷陽死睨傍胡兒善馬漸騰而上南馳得脫廣亡失多當斬贖為庶人東觀漢記曰光武以劉桓為驍騎將軍攻中山又曰建武九年以劉喜為驍騎將軍攻涿郡華嶠後漢書曰馬成字君遷拜驍騎將軍北屯常山積數年上以其勤勞徵歸京師邊民多上書請之上復以成鎮撫之魏志曰任城威王彰字子文性勇而鬚黃為驍騎將軍北出塞為寇所要彰獨與麾下數百騎突虜王聞之曰我黃鬚兒定可用也又曰董卓立獻帝表太祖為驍騎將軍與計事太祖乃變姓名間行東歸齊書曰江斆為侍中轉都官尚書領驍騎將軍王晏啓武帝曰江斆今重登禮閣兼寄六軍慈渥所覃實有優忝但語其事任殆同間輩天旨既欲升其名位愚謂以侍中領驍騎望實清顯有殊納言上曰斆常啓吾為其鼻中惡今既以何胤王瑩還門下故有此回換耳衛將軍漢書曰文帝至渭橋群臣奉天子法駕迎代邸皇帝即日夕入未央宮夜拜宋昌為衛將軍領南北軍又曰文帝三年遣灌嬰擊胸奴發中尉材官兵屬衛將軍軍長安晉書曰虞潛字思奧為衛將軍貌如不武內實堅明前將軍漢書曰前後左右將軍皆周末官秦因之位亞上卿金印紫綬又曰武帝征西夷有前後左右將軍宣元以後雜錯更置或為前或為後或為左或為右雖不出征猶有其官在諸卿上為國爪牙所以揚示威靈於四遠折衝萬人如虎如羆又曰左右前後將軍皆周官也秦漢因置以征四夷後雖不征伐其官常存又曰傅喜為右將軍傅太后與政喜數諫后不悅上印綬病在家上疏固請乃拜前將軍又曰張遼字文遠鴈門馬邑人也聶一之後以避冤變姓少為郡吏武力過人文帝即位轉前將軍又黃初二年遼至洛陽宮文帝引遼會建始殿親問破吳意狀帝歎息顧左右曰此亦古之邵虎也蜀志曰先主為漢中王遣費詩拜關羽為前將軍羽聞黃忠為後將軍怒曰大丈夫終不與老兵同列不肯拜受詩謂羽曰夫立王業者所用非一昔蕭曹與高祖少小親舊而陳韓亡命後至論在班列韓最居上未聞蕭曹以為怨也今漢中王以一時之功隆崇於漢叔然意之輕重寧當與君侯齊乎王與君譬猶一體同休等戚禍福共之愚謂君侯不宜計官號之高下爵位之多少也僕一介之使銜命之臣君侯不受拜如是便還但相謂惜此舉動恐有後悔耳羽太感悟即受拜漢叔黃忠字也後魏書曰谷楷昌黎人濮陽公渾曾孫也稱有幹局遷前軍將軍楷眇一目而性甚嚴忍時人號為瞎虎後將軍漢書曰趙充國為後將軍西羌反上使御史大夫邴吉問誰可將者充國時年已七十餘對曰無踰於老臣者矣遣問焉曰將軍度羌虜何如當用幾人充國曰百聞不如一見兵難踰度踰遠也臣願馳至金城圖上方略然羌戎小夷逆天背叛滅亡不久願陛下以屬老臣勿以為憂東觀漢記曰郅彤字瑋君信都人也為曲陽卒正更始即位上以大司馬平河北至曲陽彤舉城降為後大將軍魏志曰曹洪為文帝所廢明帝即位拜後將軍蜀志曰黃忠字漢叔先主為漢中王欲用忠為後將軍諸葛亮説先主曰忠之名望素非關馬之倫而今使令同列馬張在近親見其功尚可喻指關羽遙聞之恐必不悅得無不可乎先主曰吾當解之遂與羽等同位賜爵關內侯晉中興書曰應詹字思遠太興三年為後軍將軍晉起居注曰太始八年置後軍將軍掌宿衛左將軍漢書曰公孫賀封南窖侯窖音芳孝反以左將軍出定襄無功失侯又曰辛慶忌字子真為左將軍為國虎臣胸奴西城親附敬其威信東觀漢記曰賈復字君文治尚書事舞陰李生李生奇之謂門人曰賈生容貌志意如是而勤於學此將相之器徵詣洛陽拜左將軍南擊赤眉新城轉西入關擊盆子於澠池破之魏志曰文帝即位以李郃為左將軍詔郃與曹真討安定盧水胡及東羌晉書百官名臣曰王濟字武子起家中書郎遷左軍將軍山濤啓事曰左將軍裴楷通理有才義右將軍漢書曰常惠以明習外國事勤勞數有功為右將軍又曰何武薦辛慶忌宜在爪牙乃拜為右將軍魏志曰徐晃字公明為右將軍性儉約畏慎為將常遠斥候歎曰古人患不遭明君今我遇之當以功自效蜀志曰諸葛亮上疏曰臣以弱才叨竊非據親秉旄鉞以厲三軍不能訓章明法臨事而懼至有街亭違命之闕令箕谷不戒之失咎皆在臣授任無方臣明不知人恤事多暗春秋責師臣職是當請自貶三等以督厥咎於是以亮為右將軍行丞相事所總統如前何法盛晉中興書曰郭默為右軍將軍默既遠人樂為邊將不願內轉謂劉胤曰我能衛胡而不用更用虛名者且石軍主禁兵禁兵不妄出有急方更配給兵將無素是謂棄之安得不亂又曰王羲之字逸少導之從子也幼訥於言人未之知年十三嘗見周顗異之時重牛心炙座客未啖先割啖之羲之於是聞名及長尤善草隸書為今古冠絶纍遷為右將軍不樂京師遂往會稽與謝安孫綽等遊處山陰有道士養群鵝羲之意甚悅道士云為寫黃庭經當舉群相贈乃為寫訖籠鵝而去
