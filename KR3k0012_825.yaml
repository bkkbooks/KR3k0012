body:
  text: 資産部四穫説文曰穫刈禾也毛詩小雅曰歲聿云暮采蕭穫菽又周頌良耜曰穫之桎桎積之栗栗桎桎穫聲也栗栗衆多也尚書金縢曰秋大熟禾未穫天大雷電以風禾盡偃大木斯拔邦人大恐又大誥曰厥父災厥子乃弗肯播矧肯穫其父已災耕其田其子乃不肯播種況肯收穫乎爾雅曰桎桎穫也郭璞注曰穫刈禾也南史曰齊文惠太子常幸東田觀穫稻范雲時從文惠顧雲曰此刈甚快雲曰三時之務亦甚勤勞願殿下知稼穡之艱難無徇一朝之宴逸也文惠改容謝之虞喜志林説晏子曰景公為長府有風猶作不已晏子歌曰禾有穗兮不得穫秋風至兮盡零落歌終而流涕公乃止之穡説文曰穡穀可收也愛澀也尚書大誥曰豫永念曰天惟喪殷若穡夫子曷敢不終朕畝稼穡之夫除草養苗我長念天亡殷惡亦主猶是矣我何敢不順天終竟我壟畝乎又無逸周公曰嗚呼君子所其無逸先知稼穡之艱難乃逸則知小人之依稼穡農夫之艱難事先知之乃謀逸豫則知小人之所依怙相小人厥父母勤勞稼穡厥子乃不知稼穡之艱難乃逸乃諺既誕否則侮厥父母曰昔之人無聞知小人之子既不知父母之勞乃為逸豫遊戲乃叛諺不恭己欺誕父母不欺則輕侮其父母曰古老之人無所聞知物理論曰穡猶收也古今之言云爾稼農之末農本輕而末重前緩而後急稼欲少苦耨欲熟收欲速此良農之務桾毛詩大田曰彼有不穫稚此有不斂穧彼有遺秉此有滯穗伊寡婦之利秉把也成王之時百穀既多種同齊熟收刈促遽力皆不足而有不穫不斂遺秉滯德故聽矜寡取之以為利東觀漢記曰桓榮遭倉卒與族人元卿俱捃拾投間輒講元卿謂曰卿但盡氣耳當復有施用時乎後榮為太常諸子謂元卿曰平生笑吾盡氣今何如元卿曰我農家安能豫知此魏略曰焦先行不踐邪徑必循阡陌及其捃拾不失大穗飢不可食寒不可衣結草以為蓑裳被頭徒跣每出見婦人則隱翳須去乃出王隱晉書曰庾袞字叔褒年飢捃者猶殷袞乃引其群子以退曰待其間既桾焉從者以為徒捃也捃無傍掇晉書曰夏統字仲御幼孤貧養親以孝聞每探捃求食星行夜歸或至海邊拘蟛蚎以資養宋書曰沈道虔居武康北石山下常以捃拾自資同捃者或爭穟道虔諫之不止悉以其所得與之爭者愧惡後每事輒云勿令居士知庾異行別傳曰君妻樂氏生子澤初君與妻捃而産於澤遂以命之架釋名曰架加也加杖於柄頭以撾穗而出穀也或曰羅架三文而用之或曰以杖轉於頭故名之也廣雅曰拂謂之架説文曰拂架也拂擊禾連架也國語曰權節其用耒耜耞芟耞拂也所以擊草方言曰僉宋魏之間謂攝殳或謂之度自關而西謂之拂僉連架也所以打穀王褒僮約曰刻木為架屈竹作把架擊禾也園説文曰園所樹果也易賁卦曰賁于丘園束帛戔戔毛詩車鄰駟驖美襄公也始命有田狩之事園囿之樂焉始命命為諸侯也秦始附庸也遊于北園四馬既間間習也又國風將仲子兮曰將仲子兮無踰我園無折我樹檀園所以樹木也檀強刃之木又小雅鶴鳴曰樂彼之園爰有樹檀其下維蘀何樂於彼園之觀乎蘀落也上其樹檀下其蘀周禮天宮太宰九職二曰園囿育草木鄭注云園蕃也史記曰董仲舒廣川人以治春秋當孝景時為博士下帷講誦三年不觀於舍園漢書梁孝王傳曰王有罪入朝乘布車從兩騎入匿長公主園張晏曰布車喪人乘之也又曰田蚡召客飲坐其兄蓋侯北向自坐東向以為漢相尊不可以兄私撓由此滋驕治宅第田園極膏腴市買郡縣器物相屬於道後漢書曰竇憲恃宮掖聲勢遂以賤直請奪沁水公主園田沁水公主明帝女主逼畏不敢計後肅宗駕出過園指以問憲憲陰喝不得對陰喝猶一塞也陰音於禁反喝音一介反或作鳴故反後發覺帝大恕召憲切責曰深思前過主田園時何用愈趙高指鹿為馬愈猶差也久念使人驚怖昔永平中常令陰博鄧疊二人更相紏察以陰鄧皆外戚恐其踰多故使更相紏察也博陰興之子也故諸豪戚莫敢犯法者而詔書切切猶以舅氏田宅為言切切猶勤勤今貴主尚見枉奪何況小人哉國家棄憲如孤雛腐鼠鳥子生而啄者曰雛也憲大震懼皇后為毀服深謝良久乃得解使以田還主雖不繩其罪然亦不授以重任續漢書百官志曰濯龍園在洛陽西北角謝承後漢書曰吳祐遷膠東侯相時戴宏父為縣丞宏年十六從在承舍祐每行園常聞諷讀之音奇而候之亦與為友宏卒成儒宗知名東夏為河間相因自免歸家不復仕身灌園蔬以經書教授年九十八卒又曰中平二年造萬金堂於西園獻帝春秋曰呂布問太祖明公何瘦太祖曰君何以識孤布曰昔在洛會浸氏園太祖曰然孤忘之矣所以瘦者不早相得故也魏略曰顏斐為京兆太守起菜園使民投間灌治之魏志曰明帝之幸郭元后也毛皇后愛寵日衰景初元年帝遊後園召才人以上曲宴極樂元后曰宜延皇后帝弗許乃禁左右使不得宣后知之明日見帝后曰昨遊宴北園樂乎帝以左右泄之所殺十餘人魏略曰青龍十二年起土山於芳林園西北陬使公卿群寮皆負土成山樹松竹雜木善草於其上捕山禽雜獸置其中又曰馬鈞居京都城內有地可為園患無水以灌之乃作翻車令童兒轉之而灌水自覆更入更出其巧百倍於常晉書曰華廙免官後栖遲家巷武帝登凌雲臺望見廙苴蓿園阡陌甚整依然感舊太康初大赦乃得襲封王隱晉書曰王衍字夷甫戎叔父也終於平北將軍送故甚豐親故借衍車馬帷帳器物者衍因與不復録資財盡出洛城西先人舊園田上又曰王戎為荊州刺史坐遣吏修園宅應免官詔以贖論又曰孝宗欲於後園修立池苑江逌諫以強賊未滅宜旌軍備嘗存儉約以率群下又曰汜騰字無忌應孝廉舉除郎中屬天下兵亂去官歎曰生於亂世貴而能貧乃可以免散家財五十萬以施宗於柴門灌園琴書自適南史曰臧榮緒幼孤躬自灌園以供祭祀宋書曰茹法亮於宅為魚池釣臺土山樓館長廊將一里竹林花藥之美公家園竹不能及又曰沈道虔居武康北石山下有人竊園中菜道虔自外還見之即自逃隱待竊者去後乃出齊書曰會稽孔圭家起園列植桐柳多構山泉殆窮真趣衡陽王鈞往遊之圭曰殿下處朱門遊紫闥詎得與山人交耶答曰身處朱門而情遊江海形入紫闥而意在青雲圭大美之又曰豫章王嶷薨後嘗見形於第後園乘腰輿指麾處分呼直兵直兵無手板左右授一玉手板與之謂曰橘樹一株死可覔補之因出後園梁書曰徐勉為書式其子嵩曰中年聊於東田間營小園者非存播藝以要利正欲穿池種樹少寄情賞爾又以郊除間曠終可為宅儻獲懸車致事實欲歌哭於斯又曰劉慧斐隱居東林寺又於山北構園一所號曰離垢園時人仍謂為離垢先生燕書曰愍帝時有異爵素質緑首集于端門東園樹棲翔二旬而去夏以異爵故大赦名東園曰白爵園後魏書曰胡太后親覽萬機手筆斷決幸西林園法流堂命侍臣射不能者罰之又曰高聰為中尉所彈遂廢于家斷絶人事唯修營園果世稱高聰梨以為珍異又曰元欣好營産業多所樹藝京師名果皆出其園又曰景穆季年頗親近左右營立田園以收其利北史曰齊盧景裕不營世事居無二業唯在注解其叔父職居顯要而景俗止於園舍情均郊野謙恭守道貞素自得由是世號居士北齊書曰河南獻王孝瑜文襄於鄴東起山池遊觀時俗眩之孝瑜遂於第作水堂龍舟植幡矟於舟上數集諸弟宴射為樂武成幸其第見而悅之故盛興後園之玩於是貴賤慕斆處處營造後周書曰後周文帝在天遊園以金巵置侯上令公卿射中者即以賜之宇文貴一發而中帝笑曰由基之妙正當耳唐書曰何潘仁西域胡人也家富於財潘仁厚自奉養引致賓客煬帝時嘗犯法懼罪遂亡入司竹園鳩集亡命衆至數萬及義兵起求得平陽公主而奉之以應義師莊子曰漢陰丈人為園畦鑿隧而入井抱甕而灌一日浸百畦子貢教以為桔槔列子曰楊朱見梁王曰王者詔天下如運諸掌梁王曰先生有一妻一妾不能治三畝之園不能耘言治天下何也韓子曰昔彌子瑕寵於衛君與遊於東園食桃而甘以其半啖君君曰愛我哉淮南子曰夫臨江之鄉其人汲水以溉其園江水弗減也又曰山有猛獸林木為之不斬園有螫蟲藜蓼為之不採言人畏之説苑曰吳王欲伐荊告左右曰敢諫者死舍人有少孺子者欲諫不敢懷丸操彈於後園露沾其衣如是三旦王曰子來何苦沾衣如此對曰園中有榆其上有蟬蟬高居悲鳴飲露不知螳蜋在其後螳蜋委身曲附欲取蟬而不知黃崔在其傍黃雀方延頸欲啄螳蜋而不知彈丸在其下也此三者皆務得其前利不顧其後之有患也吳王曰善哉乃罷兵風俗通曰園援也從口袁聲四皓園公亦本園者玄晏春秋曰又好桑農種藏之事且養雞鶩園圃之事勤不舍力焉王子年拾遺記曰漢明帝時常山獻巨桃核此桃霜下結花隆暑方熟亦云仙人所食常使植於霜園此園皆植寒果也又曰魏明帝起靈禽之園方國所獻異鳥獸皆畜此園也世説曰王子敬入會稽經吳聞顧辟強有名園先不識主人徑往其家顧方集賓友酣宴園中而王遊歷既畢指麾好惡傍若無人又曰簡文幸華林園顧謂左右曰會心處不必在遠醫然林水便自有濠梁間想覺鳥獸自來親人又曰管寧華歆共園中鋤菜見地片金管不釋鋤與瓦石不異華投而擲之向秀別傳曰向秀常與嵇康偶煆於洛邑與呂安灌園於山陽收其餘利以供酒食之費桂陽先賢贊白蘇耽常聞夜有衆賓來耽告母曰人招耽去已種藥著後園梅樹下治百病一葉愈一人賣此藥過足供養仇池記曰城東有首蓿園園中有三水碓三秦記曰漢武帝名園曰樊川一名御宿有大梨如五升名含消又曰漢武帝果園有大栗十五枚一升華陽國志曰何隨家養竹園人盜其筍隨過行見恐盜者覺怖走竹傷其足挈履徐步歸幽明録曰武宣程羈偏生未被舉家常使種蔥後連理樹生於園圃殷仲堪遊園賦曰爾乃杖策晨遊以詠以吟落葉掩蹊果下成林曹植詩曰公子敬愛客終宴不知疲清夜遊西園飛蓋相追隨劉謐之天公箋曰昔申酉之際遭湯旱流煙今子歲值堯水滔天火延燒其廬水突壞其園謝玄與姊書曰比二日東行遊步園中已極有任家湖形摸也姊想矚此亦小有所散圃説文曰種菜曰圃毛詩雞鳴曰東方未明折柳樊圃狂夫瞿瞿又七月曰九月築場圃十月納禾稼周禮地官下曰場人掌國之場圃而樹之果蓏珍異之物以時斂而藏之果棗李之屬蓏瓜瓠之屬珍異蒲桃枇杷之屬禮記射義曰孔子射於矍相之圃觀者如堵牆左傳莊公曰子穨有寵蒍國為之師及惠王即位取蒍國之圃以為囿圃園也囿苑也遂奉子頽以代王又僖公下曰秦師襲鄭鄭使皇武子辭曰鄭之有原圃猶秦之有具圃也又哀公下曰衛侯為虎幄於籍圃於籍田之圃新造幄幕時以虎獸為飾也論語曰樊遲請學為圃子曰吾不如老圃莊子曰古之人假道於仁託宿於義於遊逍遙之廬食於荀簡之田立於不貸之圃逍遙無為也茍簡易養也不貸無出也古謂是采真之遊韓子曰景公欲移晏子家於豫章之圃晏子辭孟子曰今有場師舍其梧檟養其樲棘則為賤場師也場師治圃者梧檟皆大名樲棘酸棗言此以喻人捨大養小始賤場師也淮南子曰崑崙山有疏圃之地滿之潢水三周山海經曰淮江之山實惟帝之平圃風俗通曰圃補也從口甫聲拾遺録曰崑崙山第二層下有芝田蕙圃皆數萬頃群仙種耨焉曹植籍田賦曰夫凡人之為圃各植其所好焉好甘者植乎薺好苦者食乎荼好香者植乎蘭好辛者植乎蓼至於寡人之圃無不植也
