body:
  text: 香部二蘇合續漢書曰大秦國合諸香煎其汁謂之蘇合梁書曰中天竺國出蘇合是諸香汁煎之非自然一物也又云大秦人採蘇合先筌其汁以為香膏乃賣其滓與諸國賈人是以展轉來達中國不大香也傅子曰西國胡人言蘇合香獸便也中國皆以為怪從征記曰劉表家在高平郡表子搗四方珍香數十斛置棺中蘇合消疫之香畢備永嘉中郡人發其墓表如生香聞數十里廣志曰蘇合出大秦或云蘇合國人採之筌其汁以為香膏賣滓與賈客或云合諸香草煎為蘇合非自然一種也傅玄四愁詩曰佳人贈我蘇合香何以要之翠鴛鴦班固與弟超書曰竇侍中令載雜綵七百匹市月氏蘇合香安息晉書佛圖澄傳曰石勒時襄國城水源暴竭勒問澄澄曰當勑龍取水乃坐繩床燒安息香呪願三日水微流有小龍五六尺隨水來須臾水大至唐書曰曹國出青黛安息青木等香薰陸魏略曰大秦出薰陸抱朴子曰俘焚洲在海中薰陸香之所出薰陸香木膠也樹有傷穿膠因墮夷人採之以待估客所以賈不多得者所患狤居一切掘獸噉之此獸斫剌不死投火中薪盡不燋以杖打之皮不傷而骨碎然後乃死廣志曰寄六出交州又大秦海邊人採與賈人易榖若無賈人取食之南方草木狀曰薰陸香出大秦云在海邊自有大樹生於沙中盛夏樹膠流出沙上夷人採取賣與賈人南州異物志同其異唯云狀如桃膠典術又同唯云陶松柏法飲食之令人通神靈也俞益期箋曰衆香共是一木木膠為薰陸流黃吳時外國傳曰流黃香出都昆國在扶南南三千餘里南州異物志同廣志曰流黃香出南海邊國青木隋書曰樊子蓋為武威太守車騎駕西巡將入吐谷渾子蓋以彼多瘴氣獻青木香禦霧露唐子曰師子國出朱砂水銀薰陸鬱金蘇合青木等諸香南夷志曰崑崙國正北去蠻界西洱河八十一日程出象及青木香旃檀香紫檀香檳榔琉璃水精蠡柸又曰南詔青木香永昌所出其山名青木山在永昌南三月日程廣志曰青木出交州天竺徐裏南方記曰青木香出天竺國不知其形南州異物志曰青木香出天竺是草根狀如甘草俞益期箋曰衆香共是一木木節是青木旃檀三國典略曰周師陷江陵初梁主以白檀木為梁武之像每朔望親祭之軍人以其香也剖而分之竺法真登羅山疏曰旃檀出外國元嘉末曾城有人於山見一大樹員蔭數畝三丈餘圍辛芳酷烈其間枯條數尺授而刃之乃白旃檀俞益期箋曰衆香共是一木木根為旃檀崔豹古今注曰紫旃木出扶南林邑色紫赤亦謂紫檀也杜寶大業拾遺録曰薵禪師甚妙醫術作五香第一沉香飲次丁香飲次檀香飲次澤蘭飲次甘松飲皆別有法以香為法以香為主更加別藥有味而止渴兼於補益甘松廣志曰甘松出涼州諸山艾納廣志曰艾納出剽國樂府歌曰行胡從何來列國持何來毾㲪五味香迷送艾納及都梁霍香廣志曰霍香出日南諸國吳時外國傳曰都昆在扶南山有霍香南方草物狀曰霍香榛生民自種之五六月採曝之乃芳芬耳出交址武平興古九真地名也南州異物志曰霍香生曲遜國屬扶風香形如都梁可以著衣服中劉欣期交州記曰霍香似蘇合范曄和香方曰靈霍虛燥俞益期箋曰衆香共是一木木葉為霍香楓香梁書曰任昉為新安太守嘗欲營佛齊燒調香二石始入三升便出教長奪曰與奪自己不欲貽之後人南方記曰楓香樹子如鴨卵爆乾可燒魏武令曰房室不潔聽得燒楓膠及蕙草棧香廣志曰棧香出日南諸國南方草物狀曰棧蜜香出都昆不知棧蜜香樹若為但見香耳嶺表録異曰廣管羅州多棧香樹身似柳其花白而繁其葉如橘皮堪作紙名為香皮紙灰白色有紋如魚子箋其紙慢而弱沾水即爛遠不及楮皮者又無香氣或云沉香雞骨黃熟棧香同是一樹而根幹枝節各有分別者也南越志曰交州有蜜香樹欲取先斷其根經年後外皮朽爛木心與節堅黑沉水者為沉香與水面平為雞骨最粗者為棧香木蜜異物志曰木蜜名曰香樹生千歲根本甚大先伐僵之四五歲乃往看歲月久樹材惡者腐敗唯中節堅直芬香者獨在耳魏王花木志曰廣志木蜜樹號千歲樹根甚大伐之四五歲乃取木腐者為香其枝可食本草經曰木蜜一名蜜香味辛溫栟香南方草物狀曰栟香莖生出烏滸都梁廣志曰都梁出淮南盛弘之荊州記曰都梁縣有小山山水清淺其中生蘭草俗謂蘭為都梁即以號縣沉香晉書曰石崇以奢豪矜物廁上常有十餘婢侍列皆有容色置甲煎粉沉香汁有如廁者皆易新衣而出客多羞脫衣而王敦脫故著新意色無怍群婢相謂曰此客必能作賊又曰吳隱之至自番禺其妻劉氏齎沉香一斤隱之見遂投於湖亭之水梁書曰林邑國出古貝及沉香木古貝者樹名也其華成時如鵝毳抽其緒紡之以作布與紵布不殊亦染成五色織為班布沉木香土人斫斷積年以杇爛而心節獨在置水中則沉故名曰沉香次不沉者棧和之屬陳書曰沈皇后素無寵至德二年乃於光照殿前起臨春結綺望仙三閣高數十丈並數十間其窗牖壁帶懸楣欄檻之類皆以檀香為之唐書曰先天二年十月親講武於驪山之下徵兵二十萬上親擐戎服持沉香大槍立於陳前威振宇宙長安士庶奔走縱觀填塞道路又曰長慶中波斯大賈李蘇沙進沉香亭子材左拾遺李漢上疏以為沉香為亭比瑤臺玉室上頗怒言過特優容之金樓子曰扶南國衆香共是一木根便是旃檀節便是沉水花是雞舌葉是霍香膠是薰陸竺法真登羅山疏曰沉香葉似冬青樹形崇竦其木枯折外皮朽爛內乃香山雖有此樹而非香所出新會高涼土人斫之經年肉爛盡心則為沉香出北景縣樹極高大土人伐之纍年須外皮消盡乃割心得香郭子橫洞冥記曰薰木鮮祗所獻色如玉而質輕泛之昆盧池為舟爛則沉矣碎其屑氣聞數百里氣之所至毒疫皆除杜寶大業拾遺録曰四年夏四月征林邑國兵還至獲彼國得雜香真檀象牙百餘萬斤沉香二千餘斤又曰尚書令楊素大業中東都宅造沉香堂甚精麗新泥堂訖閉之三月後開視四壁並為新血所灑腥氣觸人異苑曰沙門支法存在廣州有八尺毹㲪又有沉香八尺板床太元中王琰為州大兒劭求二物不得乃殺而籍焉南州異物志曰沉木香出日南欲取當先斫壞樹著地積久外皮朽爛其心至堅者置水則沉名沉香其次在心白之間不甚堅精置之水中不沉不浮與水面平者名曰棧香其最小粗白者名曰繫香俞益期箋曰衆木共是一木木心為沉香甲香廣志曰甲香出南方南州異物志曰甲香螺屬也大者如甌面前一邊直攙長數寸圍殼岨峿有剌其掩可合衆香燒之皆使益芳獨燒則臭甲香一名流螺謂之中流最厚味范曄香方曰甲煎淺浴迷迭魏略曰大秦出迷迭廣志曰迷迭出西海中魏文帝迷送賦曰余種迷迭於中庭嘉其楊條吐香馥有令芳乃為之賦曰坐中堂以遊觀覽芳草之樹庭舞妙麗于纖枝楊修幹而結莖簿六夷之穢俗超萬里而來征豈衆華之是芳信希世而特生應瑒迷迭香賦曰振纖枝之翠粲動採葉之菲菲舒芳香之酷烈乘清風以徘徊陳班迷迭香賦曰立碧莖之荷郍鋪緑條之蟺蜿零陵南越志曰零陵香土人謂為燕草藝香說文曰藝草似苜蓿淮南子曰藝可以死而復生雜字解詁曰藝杜榮大戴禮夏小正曰採藝為廟菜禮記月令曰仲冬之月藝始生鄭玄曰藝香草也禮圖曰藝蒿曰葉似蒿香美可食也魏略曰大秦出藝膠洛陽宮殿簿曰顯陽殿前藝香一株徽音含章殿前各二株晉宮閣名曰太極殿前藝香四畦式乾殿前藝香八畦徽音殿前藝香雜花十一畦明光殿前藝香雜花八畦顯陽殿前藝香二畦廣志曰藝膠有安息膠有黑膠吳氏本草曰石藝一名敞列一名顧喙傅玄藝香賦序曰始以微香進御終於捐棄黃壤吁可閔也遂詠而賦之成公綏藝香賦曰美藝香之修潔稟隆陽之淑精莖類秋竹枝象春松傅咸藝香賦序曰先君作藝香賦辭美高麗有覩斯卉尉茂馨香同遊使余為序
