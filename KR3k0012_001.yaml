  text: 序序祖宗聖學其書之大者有二曰太平御覽曰資治通鑑通鑑載君臣治道之安危明天人庶證之休咎威福盛衰之本規模利害之端無一不備而其書公傳於天下久矣太平御覽備天地萬物之理政教法度之原理亂廢興之由道德性命之奧而獨以載籍繁夥無復善本惟建寧所刊多磨滅舛誤漫不可考叔獻每為三嘆焉洪惟太宗皇帝為百聖立絶學為萬世開太平為古今集斯文之大成為天下括事理之至要四方既平修文止戈收天下圖書典籍聚之昭文集賢等四庫太平興國二年三月戊寅詔李昉扈蒙等十有四人編集是書以便乙夜之覽越八年十有二月庚辰書成分為千卷以太平御覽目之所以昭我皇度光闡大猷者也聖學宏博皆萃此書宜廣其傳以幸惠天下況吾蜀文籍巨細畢備而獨闕此書叔獻叨遇聖恩將漕西蜀因重加校正勒工鏤板以與斯世君子共之以推見太宗聖學之所從明我宋歷聖相承之家法補吾蜀文籍之闕而公萬世之傳云慶元五年七月日朝請大夫成都府路轉運判官兼提舉學事蒲叔獻謹書古書逸者多矣遲任之言南陔之義已弗睹其全託詩書以傳者止此耳非幸歟太平御覽一書皆纂輯百氏要言凡可帙名者一千六百有九十而一篇一章間見特出者弗與皆承平縑素之盛多人間未見之書盼自寶儲出繇中祕書成始得流布世間爰自南渡而來延閣竹帛已費網羅搜采矣是故君子以為捨是書則承平之大典百氏之古書亦無以窺梗概而識倣佛部使者錦屏薄公被命將輸兼提蜀學簡冊之外淡無他營凡臺中彝常之餽弗可卻者姑外積焉一日大斥之募工鍥木以廣斯文之傳廷允獲與校讎凡金根亥豕皆釐正之字三萬八千有奇其義有弗可猝通而無所援据以為質者則亦傳疑弗敢臆也書一千卷蓋月琯六易而竣事蜀大夫士詫曰蓄眼未有猗歟盛哉迪功郎前閬州閬中縣尉雙流李廷兄謹跋謹按國朝會要曰太平興國二年三月詔翰林學士李昉扈蒙知制誥李穆太子詹事湯悅太子率更令徐鉉太子中允張洎左補闕李克勤左拾遺宋白太子中舍陳鄂光祿寺丞徐用賓太府寺丞吳淑國子監丞舒雅少府監丞李文仲阮思道等同以群書類集之分門編為千卷先是帝閲前代類書門目紛親先其倫次遂詔修此書以前代修文御覽藝文類聚文思博要及諸書參詳條次分定門目八年十二月書成詔曰史館新纂太平總類包羅萬象總括群書紀歷代之興亡自我朝之編纂用垂永世可改名為太平御覽帝每聽政之暇日讀御覽三卷有故或闕即追之雖隆冬短景必及其數大臣請少息帝曰朕開卷有得不以為勞也凡諸故事可資風教者悉記之及延見近臣必援引談論以示勸誡焉此集川蜀元未刊行東南惟建寧所刊一本然其間舛誤甚多非特句讀脫略字畫訛謬而意義往往有不通貫者因以別本參考併從經史及其它傳記校正凡三萬字有奇雖未能盡革其誤而所改正十已八九庶便於觀覽焉周易周易正義周易文言京房易傳京房易說易乾鑿度京房易飛候周易參同契周易緯焦贛易林郭璞易洞林管氏易林周易稽覽圖周易坤靈圖周易通統圖周易通卦驗張璠易注序周易是謀類易林變占周易集林雜占揚雄易太玄經尚書尚書正義尚書大傳尚書說書敘傳劉向洪範傳周書時訓逸書尚書中候尚書紀年韓書外傳尚書緯尚書考靈曜尚書帝命驗尚書帝驗期尚書旋璣鈐禹時鉤命訣汲冢周書毛詩毛詩正義毛詩義疏毛詩傳毛萇詩注毛詩題綱韓詩內傳韓詩外傳韋曜毛詩問劉禎毛詩義問郭璞毛詩拾遺劉芳詩箋音義證詩含神霧詩推度災陸機詩草木蟲魚疏詩記曆樞周禮大戴禮禮稽命徵圖禮稽命曜禮含文嘉禮斗威儀儀禮禮統禮記禮記正義禮記外傳小戴禮五經異義五經通義五經要義三禮義宗三禮正義許慎五經異說楊方五經鉤沉邯鄲綽五經折疑邯鄲六經折疑駮春秋左傳公羊傳穀梁傳春秋正義春秋傳春秋說春秋後傳春秋後語穎容春秋釋例春秋緯春秋內事春秋說題辭春秋考異郵春秋繁露春秋感精符春秋元命苞春秋演孔圖春秋合誠圖春秋保乾圖春秋握成圖春秋命曆序春秋潛潭巴春秋漢含孳春秋佐助期春秋文耀鉤春秋運斗樞國語立後土國語諷諫木國語論語論語隱義注論語撰考讖逸論語論語摘輔象孟子孝經孝經注孝經說孝經緯孝經內事孝經內記孝經河圖孝經左契孝經右契孝經援神契孝經鉤命決孝經威嬉拒老子莊子荀子楊子文中子列子淮南子鬼谷子曾子墨子韓子魯連子管子子思子慎子抱朴子胡非子亢倉子金樓子孫綽子蘇子魯仲連子王孫子尉繚子公孫尼子鬻子周生列子樓南子申子隋巢子朝子符子鶡冠子燕丹子劉子晏子田休子啇子幽求子孔叢子任子文子牟子尸子王逸子唐子秦子傅子魏子阮子闕子鄒子郭子尹文子袁子真子陸子陳桓子范子新子顧子鄧子桓子董子夏侯子梅子孔子家語見君大韓子臺甲孔叢子殺諫庚符子陸德明經典釋文梁昭明太子文選文選人名録文心雕龍徐整三五曆紀萬歲曆皇甫謐帝王世紀何集續帝王世紀帝王代紀帝系譜史系古史考史記前漢書謝沈漢書張璠漢記孟康漢書音義漢代故事陸賈楚漢春秋漢皇德傳漢制度漢雜事漢實録和苞漢趙記漢舊儀應劭漢官儀漢官典職漢官解詁漢名臣奏漢景帝通紀漢武故事董巴漢中官傳漢武帝內傳范曄後漢書華嶠後漢書謝承後漢書袁山松後漢書薛瑩後漢書袁宏後漢紀東觀漢記袁曄獻帝春秋司馬彪續漢書續漢書禮儀志三國志魏春秋魏春秋同異魏世譜王沈魏書魏舊事魏文雜事魚豢魏典略魏武本紀魏武策軍令魏武帝內誡令魏志評魏武帝令魏末傅三國典略魏百官名魏略舊志韋昭吳書環