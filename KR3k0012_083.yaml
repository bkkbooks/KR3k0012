body:
  text: 皇王部七夏帝禹史記曰夏帝禹名曰文命禹之父曰鯀鯀之父曰帝顓頊顓頊之父曰昌意昌意之父曰黃帝帝堯之時洪水滔天浩浩懷山襄陵下民其咨堯求能治水者群臣四嶽皆曰鯀可治水無狀乃殛鯀於羽山堯崩舜問四嶽曰有能成美堯之事者使居官皆曰伯禹為司空可成美堯之功舜命禹汝平水土維是勉之禹拜稽首讓於契后稷皋陶舜曰女其往視爾事矣禹為人敏給克勤其德不違其仁可親其言可信禹遂與益后稷奉帝命命諸侯百姓興人徒以敷土行山表木定高山大川禹傷先人之功不成受誅乃勞身焦思居外十三年過家門不敢入陸行乘車水行乘船泥行乘橇孟曰橇刑如箕橋行泥上如淳曰橇音茅蕝謂以板置泥上以通行路也山行乘檋徐廣曰檋音丘遙反如淳曰檋車謂以鐵如鏙長半寸施之履下以上山不蹉跌也開九州通九道陂九澤度九山舜崩三年喪畢禹避舜之子啇均於陽城天下諸侯皆去啇均而朝禹禹於是遂即天子位南面朝天下國號曰夏后姓姒氏娶塗山氏之女生子曰啓禹東巡狩至于會稽而崩帝王世紀曰伯禹夏后氏姒姓也母曰修巳見流星貫昂夢接意感又吞神珠慧苡胸拆而生禹於石紐虎鼻大口兩鼻耳參鏤首戴鉤鉤鈐也胸有玉斗足文履巳故名文命字高密身九尺二寸長於西羌夷人初禹未登用之時父既降在匹庶有聖德夢自洗於河觀於河始受圖括地象也圖言治水之意四嶽舉之舜進之堯堯命為司空繼鯀治水乃勞身勤苦不重徑尺之壁而愛日之寸陰手足胼胝又納禮賢士一沐三握髮一食三吐餐堯美其績乃賜姓姒氏封為夏伯故謂之伯禹天下宗之謂大禹年二十始用三十二而洪水平年百歲崩于會稽因葬會稽山陰之南今山上有禹冢井祠下有群鳥耘田修紀或云修己未詳河圖握拒起曰帝命伯禹曰告汝九術五勝之常可以克之汝能從之汝師徒將興雒書靈准聽曰有人謂禹也大口耳參漏足履己漏空也戍巳土之日故當平水土故以為名也載成鈐有骨表如鉤鈐懷玉斗懷琁璣玉衡之道或以為有黑子如玉斗也書曰禹別九州分其所界隨山濬川刊其木水深其流任土作貢任其土地所其貢賦又曰正月朔旦受命于神宗受舜終事之命神宗反祖之宗廟言神尊也率百官若帝之初舜初攝帝故事尚書帝命驗曰禹白帝精以星感星金精也修紀山行見流星意感栗然生姒戎文禹栗然感貌姒禹氏禹生戎地一名政命尚書旋璣鈐曰禹開龍門導積石決岷山治九貢龍門積石山名貢功也治九州之功又曰禹開龍門導積石出玄圭上刻曰延喜玉受德天鍚佩禹切既成天出玄圭天錫之者以德佩禹有治水功者必佩以玄玉尚書中候曰伯禹在庶伯官稱禹號也因為德諡庶庶人也四嶽師舉薦之帝堯四嶽四方諸侯也師衆也薦進也握括命不試爵授司空禹握括地象天已命之故不復試以衆官司空於周為冬卿掌制國之五溝行導水之事伯禹稽首讓于益歸稽首拜頭至手益歸賢者堯臣歸讀曰夔也帝曰何斯若真何不聽讓之辭斯此也若汝也此汝真其人出爾命圖示乃天爾汝也禹方讓隱之故言出汝所天命也圖括地象示讀曰祇祇是也乃天使汝治水非我也伯禹曰臣觀河百面長人魚身出曰吾河精也觀河觀於河水也授臣河圖帶足入淵河圖謂括地象帶足去也音帶伯禹拜辭禹將行故拜去詩含神霧曰禹之興黑風會紀黑力黑也風風后也並黃帝臣復神伯禹當斯而至也禮曰禹立三年百姓以仁遂焉大戴禮曰宰我曰請問禹孔子曰高陽之孫鯀之子曰文命敏給克濟其德不回其仁可親其言可信聲為律身為度左準繩右規矩履四時據四海平九州戴九天明耳目治天下禮含文嘉曰禹卑宮室垂意於溝洫百穀用成神龍至靈龜服玉女敬養天賜妾傳曰禹會諸侯於塗山執玉帛者萬國春秋孔演圖曰天命之見候期門靈龜穴庭玄龍銜雲靈龜虛虎也穴庭者星入太微門玄龍水精也銜雲者蓋此召氣也春秋元命苞曰禹之時民大樂其駢三聖相繼故樂名大夏也孝經鉤命決曰命星貫昴修紀夢接生禹命使之星謂流行之星也遁甲開山圖曰禹游於東海得玉碧色長一尺二寸光如日月自昭達幽冥揚雄蜀王本紀曰禹本沒山廣柔縣人生於石細其地名痢兒畔禹母吞珠孕禹坼堛而生於縣塗山娶妻生子啓紀年曰禹立四十五年論語曰子曰禹吾無間然矣孔子惟禹功德之盛也言不能復間廁其間也菲飲食而致孝乎鬼神馬融曰菲薄也致孝鬼神祭祀豐潔也惡衣服而致美乎黻冕孔安國曰損其常服以盛祭祀卑宮室而盡力乎溝洫包曰方里為井井間有溝溝廣四尺十里為城城中有洫洫深廣八尺也符子曰禹讓天下於奇子奇子曰君言佐舜勞矣鑿山川通河漢首無髮股無毛故舜也以勞報子我生而逸不能為君之勞矣越絶書曰禹始憂民救水到大越於茅山大會計爵有功更名茅山謂之會稽及其王矣巡狩大越吳越春秋曰禹案黃帝中經見聖人所記曰在九疑山東南天柱號曰宛委承以文玉覆以盤石其書簡青玉為字編以白銀禹乃東巡狩登衡山求之臥見赤繡衣男子自稱玄夷倉水使者來候禹令禹齊三月更求之禹乃齊三月登宛委山取得書通水經遂周行天下使益疏記之名曰山海經又曰舜崩禹服喪三年朝夕號泣形體枯槁面目黎黑十州記曰禹治洪水畢乃乘蹻車到鍾山祠上帝於北阿歸大功于九天禹經諸侯五嶽使工刻石識其里數高下其字科斗書非漢人所了諸名山亦然鬻子曰禹之治天下也以五聲聽門懸鼓鍾鐸磬而置鞀音祧於簨簴曰教寡人以道者擊鼓教寡人以義者鼓鍾教寡人以事者振鐸語寡人以憂者擊磬語寡人以獄訟者揮鞀此之謂五聲是以禹嘗據饋而七起日中不暇食於是四海之士皆至隋巢子曰昔三苗大亂天命殛之夏后受之大神降而輔之司祿益食而民不飢司金益富而國家寶司命益年而民不夭四方歸之莊子曰昔者禹堙洪水親自操橐耜而滌天下之川服無跋脛無毛沐甚雨櫛疾風置萬國禹大聖也而形勞天下如此使後世之墨者多以裘褐為衣以屐屩憍為服日夜不依以自為極曰不如能此非禹道也不足謂墨孟子曰書曰洚水警余洚水者洪水也書尚書逸篇也水逆行降洞無涯故曰洚水洪大也使禹治之禹掘地而注之海驅蛇龍而放之菹水由地中行江淮河漢是也險阻既遠鳥獸之害人者消然後人得平土而居之堯使禹治洪水通九州故曰掘地而注之海也沮澤生草者也今青州為澤有草者為菹水流行於地而去也民下高就平士故曰險阻遠也水去故鳥獸害人者消盡也尸子曰禹長頸鳥啄面貌亦惡天下從而賢之好學也又曰古者龍門未闢呂梁未鑿禹於是疏河決江十年不窺其家生偏枯之病步不相過人曰禹步墨子曰禹葬衣衾三領桐棺三寸葛以繃補庚切之下不及泉上不通臭既葬收餘壤為壟若參耕之畝韓子曰禹之王天下也身執木畚以為民先股無完胈體無生雖臣虜之勞不若於此矣呂氏春秋曰禹年三十未娶行塗山恐時暮失制乃娶塗山女又曰禹南濟乎江黃龍負舟舟中之人恐懼禹仰而笑曰受命於天竭力以濟生人受命天也奈何憂於龍焉龍弭耳低尾而逃又曰昔者禹一沐而三握髮一食而三起禮有道之士通乎己之不足通乎己之不足則不與物爭矣又曰禹之決江水也民聚瓦礫及其事已成功已立為萬世利禹之所見者遠也而民莫之知賈誼書曰禹常晝不暇食而夜不暇寢方是時憂務民也淮南子曰昔者鯀作三仞之城諸侯倍之禹知天下叛之乃壞城平地散財物禁甲兵施之以德海外賓服四夷納職又曰禹沐淫雨櫛疾風決江疏河鑿龍門闢伊闕修彭蠡之防乘四載隨山刊木平治水土定千八百國夙興夜寐以致聰明輕賦薄斂以寬民力布德施惠以振困窮吊死問疾以養孤霜百姓親附政令流行又曰禹為水以身解於陽旰之河解禱也陽旰河在秦又曰堯之時天下大水禹身執畚鍾以為民先疏河而導九攴攴分鑿江而通九路辟五湖而定東海又曰禹之趨時冠挂而不顧履遺而不取冠有所挂著去不暇顧視非爭其先也爭得其時也說苑曰禹見罪人下車問而泣之左右曰夫罪人不順道故然焉君王何為痛之至於此也禹曰堯舜之民皆以堯舜之心為心今吾為君百姓皆以其心為心是以痛之抱朴子曰禹乘二龍郭攴為馭黃帝玄女兵法曰禹問於風后曰吾聞黃帝有負勝之圖六甲陰陽之道今安在乎風后對曰黃帝藏會稽之山下其坎深千丈廣千尺鎮以盤石致難得也禹北見六子問海口所出禹乃決江口鳴角會稽龍神為見玉匱浮禹乃開而視之中有天下經十二卷禹未及持之其四卷飛上天禹不能得也其四卷復下陂池禹不能極也禹得中四卷開而視之又魏陳王曹植夏禹贊曰于嗟夫子拯世濟民克卑宮室致孝鬼神蔬食薄服紱冕乃新厥德不回其誠可親亹亹其德溫溫其仁尼稱無間何德之純又禹治水贊曰嗟夫夏禹實勞水功西鑿龍門疏河導江梁歧既闢九州以同天賜玄圭奄有萬邦又禹渡河贊曰禹濟于河黃龍乘船舟人並懼禹歎仰天豫受天運勤功恤民死亡命也龍聞弭身庚信禹渡江贊曰二江初鑿九谷新成風飛蠲涌水起龍驚樂天知命無待憂生危舟遂靜亂楫還平帝啓歸藏曰昔夏后啓筮享神於大陵而上釣臺枚占皋陶曰不吉史記曰昔夏后啓筮乘龍以登于夫枚占于皋陶皋陶曰吉而必同與神交通以身為帝以王四卿又曰啓禹之子其母塗山氏之女也扈氏不服啓伐之大戰於甘誓遂減有扈氏天下咸歸山海經曰大樂之野夏后啓於此舞九代馬乘兩龍雲蓋三層左手操翳右手操瓌珮玉橫在大運山北一曰大道之野帝王世紀曰啓升后十年舞九韶三十五年征河西又曰帝啓一名建一名余德教施于四海貴爵而上齒養國老於東序養庶老於西序在位九年年八十餘而崩矣越絶書曰禹崩啓立曉知王事達君臣義呂氏春秋曰夏后伯即啓也與有扈戰於甘澤而不勝六卿請復之夏后伯曰不可吾地不淺吾民不寡我而不勝是吾德薄而教不善也於是乎處不重席食不二味琴瑟不張鍾鼓不修子女不飾親親長長尊賢使能朞年而有扈氏服故欲勝人者必先自勝矣帝太康書曰太康尸位以逸豫滅厥德黎民咸二乃盤遊無度畋于有洛之表十旬不反有窮后羿距于河厥弟五人御其母以從徯于洛之汭五子咸怨述大禹之戒以作歌其一曰皇祖有訓民可近弗可下皇君也君祖禹有訓戒也近謂親之下謂失之者也民惟拜本本固邦寧言人君當國民以安國也豫視天下愚夫愚婦一能勝豫言能敬畏小民所以得衆心一人三失怨豈在明不見是圖三失過非一也不見是謀備其微豫臨兆民凛乎若朽索之馭六馬十萬曰億十億曰兆言多也凛色貌朽腐也朽腐之索御六馬言危懼甚為人上者奈何不敬能訓則不驕在上下則高而不危其二曰訓有之內作色荒外作禽荒作為也迷亂曰荒色女色禽鳥獸甘酒嗜音峻宇雕墻甘嗜無厭足也峻高大雕飾盡有一于此未或不亡此六者棄德之君有其一必亡況兼有乎其三曰惟彼陶唐有此冀方陶唐帝堯氏都冀州統天下四方今失厥道亂其紀綱乃砥滅亡言失堯之道亂其法制自致滅亡其四曰明明我祖萬邦之君有典有則貽厥豫孫典謂經籍則法貽遺也言仁及後世關石和鈞王府則有荒墜厥緒覆宗絶祀金鐵銀石供民器用通之使和平則官民足言古制有而太康失其業以取亡其五曰嗚呼曷歸豫懷之悲曷何也言思而悲萬姓仇豫豫將疇依鬱陶乎豫心顏厚有忸怩弗慎厥德雖悔可追言人君行己不慎其德以連滅敗欲改悔其可追及乎言無益也帝王世紀曰太康無道在位二十九年失政而崩帝仲康書曰惟仲康肇位四海胤侯命掌六師羲和廢厥職酒荒于厥邑胤后承王命徂征羲和廢其職官還其私邑以酒迷亂仲康命胤侯掌六師往就其邑討之帝相紀年曰帝相即位處啇丘元年征淮夷二年征風夷及黃夷帝王世紀曰帝相一名相安自太康已來夏政凌遲為羿所逼乃徙啇丘依同姓諸侯斟灌斟尋氏羿遂襲帝號是為羿帝有窮后羿帝王世紀曰羿有窮氏未聞其姓其先帝嚳以世掌射故於是加賜以弓矢封之於鉏為帝司射歷唐及虞夏至羿學射於吉甫其辭佐長故亦以善射聞與吳賀北遊使羿射雀左目羿引弓射之誤中左目羿俯首而愧終身不忘故羿善射至今稱之及有夏之衰羿自鉏遷于窮石因夏民之不附以代夏政逼篡帝位故號窮氏傳曰昔有夏之方衰也后羿自鉏遷于窮石因夏民以代夏政恃其射也不修民事而淫于原獸棄武羅伯囚熊髡龍圉四子皆羿之賢臣而用寒浞土捉反寒浞伯明氏之讒子弟也伯明后寒棄之夷羿收之信而使之以為己相浞行媚于內而施賂于外愚弄其民而娛羿于田樹之詐匿以取其國家內外咸服羿猶不悛將歸自田家衆殺而烹之以食其子食羿子其子不忍食諸死于窮門殺之於國門靡奔有鬲氏靡夏遺臣事羿者有鬲國名浞因羿室生澆五叫反及豷音處恃其讒匿詐僞而不德于民使澆用師滅斟灌及斟尋氏二國夏同姓諸侯仲康之子后相所依處澆于過處豷于戈過戈二國名靡自有鬲氏收二國之燼以滅浞而立少康少康滅澆于過后杼豷于戈后杼少康子有窮由是遂亡寒浞帝王世紀曰寒浞有窮氏既篡羿位復襲有窮之號浞因羿之室生澆及豷多力能陸地蕩舟浞使奡率師滅斟灌斟尋氏殺夏帝相於過滅豷於戈恃其詐力不恤民事初夏之殺帝相也妃有仍氏女曰后緍方娠逃出自竇歸于有仍生少康焉初夏之遺臣曰靡事羿羿死逃奔有鬲氏收斟尋二國餘燼殺寒浞而立少康帝少康傳曰昔有過澆殺斟灌以伐斟鄩澆寒浞子封於過滅夏后相后緍方娠逃出自竇后緍相妻也娠懷身也歸于有仍生少康焉為仍牧正收官之長澆使椒求之逃奔有虞為之庖正虞思於是妻之以二姚思有虞君也自以二女妻少康姚姓也而邑諸綸綸虞邑也有田一成有衆一旅方十里為成五百人為旅能布其德而逃其謀兆始也以收夏衆撫其官職遂滅過戈復禹之績祀夏配天不失舊物魏高貴鄉公少康漢高論曰少康生於滅亡之後降為諸侯之隸崎嶇逃難僅以身免能布其德而兆其謀卒滅戈克復禹績非至德弘仁豈濟斯勳漢祖因土崩之勢專任智力以成功業為子則數危其親為君則囚繫賢相身沒之後社稷幾傾若與少康易時而處或未能復大禹之績矣又論曰三代之世任德濟勳如彼之難秦項之際任力成功如此之易且太上立德其次立功就令漢祖功高未若少康盛德之茂也帝寧紀年曰帝寧居原自遷于老王帝王世紀曰帝寧一號后豫或曰公孫曼能率禹之功夏人報祭之在位十七年帝槐紀年曰后芬立四十四年帝王世紀曰帝芬一名帝槐或曰祖武在位二十六年帝芒紀年曰后芒即位元年以玄圭賓于河東狩于海獲大魚后芒陟位五十八年帝王世紀曰帝芒一名和或曰帝芒帝泄帝王世紀曰帝泄一名帝世或曰泄宗在位十六年帝不降紀年曰不降即位六年伐九苑立十九年其弟立是為帝局帝王世紀曰帝不降一名帝降或曰北成北字或作江字帝局帝王世紀曰帝局一名帝禺或曰高陽在位二十一年帝廑紀年曰帝廑一名胤甲即位居西河天有祅孽十日並出帝王世紀曰帝廑一名頊或曰董江在位二十年帝孔甲傳曰昭二十九年秋龍見于絳郊皆魏獻子問於蔡墨曰古者國有豢龍氏有御龍氏及有夏孔甲擾于有帝擾順也其德能順於天帝賜之乘龍河漢各二四頭為乘各二乘十六頭各有雌雄史記曰帝孔甲立好方術鬼神事淫亂夏后氏德衰諸侯叛之天降龍二有雌雄孔甲弗能食未得豢龍氏陶唐既衰其後有劉纍學擾龍于豢龍氏以事孔甲孔甲賜之姓曰御龍氏漢書曰孔甲作盤盂銘三十六篇列仙傳曰師門為夏孔甲龍師孔甲不能修其心意殺而埋之外野一旦風雨迎之記則山木皆焚孔甲祠而禱之未還而道死呂氏春秋曰夏后孔甲掌東陽薲音頻山天大風晦孔甲迷入民室主人方乳乳産也咸言后來是良日子誰敢殃之長成人幕動折撩斧破斬足遂為守者以其無足為守門之官乃作破斧之歌帝皋紀年曰后昊立三年帝皋也帝王世紀曰帝皋一名皋茍帝發紀年曰后發一名后敬或曰發惠其子立為桀帝桀歸藏曰昔桀伐唐而枚占於營營或曰不吉不利出征唯利安處彼貍為鼠書曰伊尹相湯伐桀升自陑遂與桀戰于鳴條之野尚書帝命驗曰桀失其玉鏡用其噬虎玉鏡喻清明之道噬虎喻暴虐之風尚書帝命候曰夏桀無道殺關龍逢絶滅皇圖壞亂曆紀皇天也紀綱紀也天之圖曆龍逢引以諫桀也殘賊天下刑法峻也賢人遁逃避時虐也淫色慢易男女無別不事祖宗韓詩外傳曰桀為酒池可以運舟糟丘足以望十里家語曰夏桀昆吾斬刈黎民如草木焉天下討之如匹夫史記曰自孔甲以來諸侯多叛夏桀不務德而虐傷百姓百姓不堪乃召湯而囚之夏臺已而釋之湯修德諸侯皆歸湯湯遂率兵以伐夏走鳴條逐放而死紀年曰后桀命扁伐山民山民女于桀二人曰琬曰琰桀愛二人女無子焉斷其名于若華之玉苕是琬華是琰而棄其元妃于洛曰妹喜桀傾宮飾瑤臺作瓊室立玉門湯遂滅夏桀逃南巢氏自禹至桀十七世有王興無王用歲四百七十一年帝王世紀曰帝桀淫虐有才力能伸鉤索鐵手搏熊虎多求美女以充後宮為瓊室瑤臺金柱三千始以瓦為屋以望雲雨大進侏儒倡優為爛漫之樂設奇偉之戲縱靡靡之聲日夜與妹喜及宮女飲酒常置妹喜於𣍿上妹喜好聞裂繒之聲桀為發裂繒以順適其意以人駕車肉山脯林以為酒池一鼓而牛飲者三千餘人醉而溺水以虎入市而視其驚伊尹舉觴造桀諫曰君王不聽群君臣之言亡無日矣桀聞析然啞然嘆曰子又祅言矣天之有日由吾之有民日亡吾乃亡也兩日鬥蝕鬼呼於國桀醉不寤湯來伐桀以乙卬日戰于鳴條之野桀未戰而敗績湯追至大涉遂禽桀於焦放之歷山乃與妹喜及諸嬖妾同舟浮海奔于南巢之山而死博物志曰夏桀之時為長夜飲居深宮中男女雜處三旬不出不聽政太公六韜曰桀時有瞿山之地桀十月鑿山陵通之於河民有諫者曰冬鑿地穿山是發天之陰泄山之氣天子後必敗桀以妖言殺之管子曰桀女樂三萬人晨譟聞於衢服文繡衣裳莊子曰桀之治天下也使天下人瘁瘁焉人苦其性是不愈也墨子曰昔夏桀貴為天子富有天下勇力之人生裂兕虎指畫殺人王孫書曰桀紂為君從愚妾之言違長者之諫衣溫而忘百姓之寒食美而忘天下之飢或身放南巢或頭縣赤旗斯亦無他也但不節財而暴民也尸子曰伯夷叔齊餓死首陽無地故也桀放於歷山紂殺於鄗宮無道故也有道無地則餓有地無道則亡又曰昔者桀紂縱欲長樂以苦百姓珍怪遠味必南海之葷北海之監西海之菁東海之鯨此其禍天下亦厚矣又曰昔夏桀之時至德滅而不楊帝道掩而不興興舉也客臺振而掩覆客臺行禮客之室言不能行禮故天大振動而覆敗犬成群而入泉言將滅壞犬失其主故嗥入淵一說犬禍彘銜藪而席隩彘銜晨席入人隩內言彘禍美人婢首墨面而不容婢首亂頭也萃興典髮并編為婢首不修容飾節也曼聲吞炭內闌而不歌曼聲見世衰亂將滅故吞炭自敗音聲閉氣而不歌飛鳥鎩翼走獸決蹄鎩翼殘翼決致蹇也言桀無道田獵鳥獸悉被創殘翼廢腳山無峻幹澤無佳水峻幹美樹佳水清水言入山澤不以時故又曰桀為琁室瑤臺象廊玉床琁瑤石之次玉也象才廊室也權天下虐百姓於是湯以革車三百乘伐于南巢南巢盧江居巢收之夏宮天下寧定百姓和輯譙周法訓曰桀紂雖有天子之位而無一人之譽也猶朽木枯樹逢風則仆也袁子正書曰桀紂有民左億右億之衆四嶽三塗之險京山中南之固及在鳴條之野一朝而失天下符子曰桀觀炮烙於瑤臺謂龍逢曰樂乎龍逢曰樂桀曰觀刑曰樂何無惻怛之心焉逢曰天下苦之而君為樂臣為君股肱熟有心悅而股肱不悅乎桀曰聽子諫諫得我功之不得我刑之龍逢曰臣觀君冕非冕也冕危石也臣觀君履也非履也履春冰也未有冠危石而不壓蹈春冰而不陷桀歎曰子知我之亡而不自知亡子就炮烙之刑吾觀于亡知我不亡龍逢行歌曰造化勞我以生休我以炮烙乃赴火而死禹至桀合十九帝淮南子曰桀之力剔觡伸鉤觡角索鐵椎移大戲大戲軍之大旗水殺黿鼉陸捕熊羆然革車三百乘困之鳴條鳴條今陳州平丘地禽之焦門
