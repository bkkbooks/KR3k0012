body:
  text: 雜獸驒騱說文曰驒騱野馬屬史記曰胸奴畜則駃古穴切騠下奚切驒騱昆蹄爾雅曰昆蹄研善升甗孫炎曰昆蹄之馬蹄平如研而善升山甗者郭璞曰秦時有昆蹄死昆駼大胡切枝蹄研善升甗蒙頌爾雅曰蒙頌猱狀郭璞注曰即蒙貴也似雖而小紫黑色可畜捕鼠勝貓九真日南出之猱獼猴之屬也贙爾雅曰贙乎大切有大力郭璞注曰出西海大秦國有養之似山狗多力獷惡也魋爾雅曰魋如小熊竊毛而黃蜼爾雅曰卬鼻而長尾郭璞注曰似彌猴而大黃黑色長數尺鼻露上面雨則自懸於樹以尾塞鼻或以兩指也鼰爾雅曰鼰鼠身長鬚而賊秦人謂之小驢郭璞曰鼰而鼠而馬喙一歲千斤為物殘賤也豦爾雅曰豦迅頭郭璞注曰今建平山中有豦如狗似獼猴多髯能舉石摘人驨爾雅曰驨音攜如馬而一角不角者騏也㚟說文曰㚟獸似兔青色而大頭與兔同足與鹿同山海經曰湪光之山獸名㚟郭璞曰㚟似兔而鹿腳青色也石穀說文曰穀大木切類犬腰以上黃腰以下黑食母猴或曰穀似牂羊風土記曰石穀似狢而形短常捕敢猴猿司馬相如上林賦曰獑音讒猢穀䝈音厄猶說文曰猶玃屬一曰隴西謂犬子為猶爾雅曰猶如麂善登木㹠魯連子曰北方有獸名為㹠生而角當心俯厲其角潰心而死竹㹠徐哀南方記曰竹㹠野生長一尺三寸在土穴中常食竹根味如鴨肉原山海經曰翠望之山亦作王翠山有獸狀如狸一目二尾名曰原音奪衆聲言能作百種聲可以禦凶也天狗山海經曰陰山濁谷之水出焉有狩狀如狸或作狗白首名曰天狗可以禦凶獜山海經曰依轂之山有狩焉狀如虎有瓜甲名曰獜言體有鮮甲也食之不畏風𤡷獀山海經曰𤡷獸食猛獸鹿蜀山海經曰杻陽之山有獸狀如馬而白文頭如虎而長尾其音如謠如人歌其名曰鹿蜀佩之宜子孫山海經圖讚曰鹿蜀之獸馬質虎文驤首吟鳴矯矯騰群佩其皮毛子孫如雲類山海經曰亶受之山有獸狀如狸而有髮其名曰類自為牝牡食者不妒猼訑山海經曰基山有獸其狀如羊九尾四目其目在背名曰猼訑佩之不畏山海經圖讚曰猼訑似羊眼乃在背視之則奇推之無怪欲不恐懼厥皮可佩狸力山海經曰拒山有獸狀如豚有距其音如狗吠其名曰狸力見則其縣多土功土螻山海經曰崑崙之丘有獸焉其狀如羊而四角名曰土螻歡歡山海經曰翼望之山或作王翠有獸狀如狸一目而三尾名曰歡歡音歡或作原其音如百聲言其能作百聲或曰百物名也未祥是可以御凶服之治疸黃疸病音旦也幽頞山海經曰邊春之物有獸狀如禺而文背善笑見人則臥名曰幽頞或作妭也其鳴自呼也山海經圖讚曰幽頞似猴俾愚作智觸物則笑見人佯睡足訾山海經曰蔓聯之山有獸狀如禺而有鬣牛尾文臂馬蹄見人則笑名曰足訾其鳴自呼也那父山海經曰灌題之山有獸狀如牛而白尾音如叫如人叫喚名曰那父天馬山海經曰馬成之山有獸如白犬而黑頭見人則飛其名天馬其鳴自呼也㔮山海經曰甘棗之山有獸狀如數鼠而文題數鼠未詳名曰那食之治癭朏山海經曰霍山有獸如狸白尾有驪名朏畜之亡憂文山海經曰放皋之山有獸狀如蜂枝尾而反舌善呼名文開明山海經曰開明獸身類虎而九首皆人面東鄉立崑崙窮奇山海經曰封山有獸狀如牛而蝟毛名曰窮奇食人或云窮奇聞人鬭斗乃助不直者文王出獵所獲張揖注上林賦曰窮奇其音如狗嗥神異記曰西北有獸狀如虎有翼名窮奇𥚷褱山海經曰堯光之山有獸如人而彘尻冬蟄名𥚷褱音如斫木如人斫木聲見則其縣有役彘山海經曰浮玉之山有獸狀如虎而牛尾音如犬名曰彘羬羊山海經曰華山之首曰錢來之山有獸狀如羊而馬尾名曰羬羊其胎可以已臘治體臘也囂山海經曰羭次之一山有獸狀如禺而長臂其名曰囂長古山海經曰長古之山有獸狀如禺而四耳名長古因其山名音如吟見則郡縣大水溪邊山海經曰天帝之山有獸狀如狗名溪邊或作遺席其皮者不蠱𤣓山海經曰皋塗之山有獸狀如鹿白尾馬足人手前兩腳似人手而四角名曰玃犰狳山海經曰餘我之山有獸狀如兔鳥喙鴟目蛇尾見人則眼言陽死也其名曰犰狳其鳴自叫見則蟲蝗為敗渾沌東方朔神異經曰崑崙西有獸其狀如犬有兩目而不見兩耳而不聞有腹而無五藏有腸直而不旋食而徑過人有德行而往抵𧢻音觸之人有凶惡而往依憑之天使其然名曰渾沌一名無耳一名無心所居無常咋尾回轉向天而笑檮杌東方朔神異經曰西方荒中有獸焉狀如虎而身大虎毛長尺張華注曰言此獸毛皆如豪猪毛也人面虎足口有豬牙尾長一丈八尺名曰檮杌此獸食㺊東方朔神異經曰北方有獸焉其狀如師子食虎食人吹人則病口中吹人名曰㺊恆近人村里入人居室中百姓患苦天帝徙之北方荒中也無損神異經曰南方有獸其狀如鹿豕頭有牙鹿尾善依人求五穀名曰無損其肉可作鮮使瀋呂審也肥美而鮮肉懷吞不入瀋盡更添肉使復以作鮮如初愈久而乃美名曰不盡鮮綢神異經曰西方深山有獸鳥面目手足毛色如猴體大如驢善緣高木皆雌無雄名曰綢須人三合而有子要路強牽男人將上絶冢之上取果并竊五穀食更合三畢而定十月乃生齧鐵神異經曰南方有獸角足大小狀如水牛其毛黑如漆食鐵而飲水其糞可為兵器其利如鋼名齧鐵飛駭獸洞冥記曰漢武帝時翕韓國獻飛骸獸狀如鹿青色以寒青之絲為繩繫之獸死帝愛而不埋掛之於苑門皮毛皆爛朽唯骨色猶青時人咸知其神更以繩繫其足閉於重觀後數月往觀唯見繩之所繫處頭尾背皆飛去有野人於草間得其斥脊皆能飛起取還以獻帝乃以野人所獻骨脊及頭尾之骨舂為粉以蝙蝠和為丸以療百疾其丸夜視之有光服之體有光明破鏡漢書郊祀志曰古者天子常以春解祠黃帝用破鏡孟康曰獸名食父如黃帝欲絶其類使祠用之破鏡如貙而虎眼也貒淮南子曰貒知曲穴亦鳥獸之智狖說文曰鼠狖屬善旋吳録地里志曰建安陽縣多狖似猿而露鼻雨則以尾反塞鼻孔郡內及臨海皆有之蜼異物志曰蜼之屬捷勇於猿貀面及鼻徵倒向上尾端分為兩條天雨便以插鼻孔中水不入性畏人見人則顛倒投擲或墮地奔走無所回避觸樹衝石或至破頭折脛俗人罵恃力人云癡如蜼張揖注上林賦曰飛蜼飛鼠也其狀如兔而鼠首以其髯飛郭璞曰鼯鼠也毛紫赤色一名飛生麡狼異物志曰麡狼狀似鹿而角前向入林挂角故恆在平淺草中肉肥脆香美逐入林則得之皮可作履襪角正西據南人因以作路床兩頭獸盛弘之荊州記曰武陵郡西有陽山山有獸如鹿前後有頭常以一頭食一頭行山中有時見之者獑猢蜀地志曰獑猢獸似獼猴為獸奇捷常在樹上歘然騰躍百步五十步若鳥黃要蜀地志曰黃要獸一名墠微一名虔已鼬身狐首生子長大自活群逐其母令不得飲食將有所求而先見此獸則不得矣含利張衡西京賦曰含利呀呀化為仙車鄭氏婚禮謁文讚曰含利為獸廉而能謙禮義乃食口無譏愆茲白博物志曰茲白若白馬踞牙食虎豹其狀如昔耳身若虎豹尾長參其身虎豹博物志曰逢伯雲所說有獸緣木緑文似豹名虎僕毛可為筆聆鼠博物志曰丹裏之山有獸焉狀如鼠名曰聆鼠以其尾飛也野羊張揖注上林賦曰野羊麢羊也似羊而青猛氏孟康注上林賦曰蝦蛤猛氏皆獸名郭璞曰今蜀中有獸狀如熊而小毛淺有光澤名猛氏飛遽張揖注上林賦曰飛遽天上神獸鹿頭而龍身射干郭璞注子虛賦曰騰遠射干張揖注曰騰遠獸也射干似緣狐能木獌狿郭璞注子虛賦曰獌狿大獸似狸長百尋蒲勞李善注東都賦曰海畔獸名蒲勞性畏鯨每食於海畔鯨輕躍擊之蒲勞則鳴聲如鍾今人多鑄蒲勞之形於鍾上斫撞作鯨形以擊鍾天子出則擊之
