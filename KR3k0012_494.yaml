body:
  text: 人事部一百三十四奢說文曰奢張也反儉曰奢從大者言誇大於人也毛詩曹風蜉蝣剌奢也昭公國小而迫好奢而任小人將無所依焉蜉蝣之羽衣裳楚楚蜉蝣之翼采采衣服左傳曰丹桓公之楹刻其桷皆非禮也御孫諫曰臣聞之儉德之恭也侈惡之大也先君有恭德而君納諸大惡無乃不可乎又曰襄公五年齊慶封來聘其車美叔孫曰豹聞之服美不稱必以惡終美車何為又曰吳師在陳楚大夫皆懼子西曰今聞夫差次有臺榭陂池焉宿有妃嬙嬪御焉一日之行所欲必成玩好必從珍異是藂觀樂是務視民如讎而用之日新夫差先自敗也已安能敗我禮記曰管仲鏤簋而朱絃旅樹而反坫山節而藻梲賢大夫而難為上也得天子之禮論語曰孔子謂季氏八佾舞於庭是可忍也孰不可忍也又曰子曰相維辟公天子穆穆奚取於三家之堂子曰人而不仁如禮何人而不仁如樂何又曰邦君樹塞門管氏亦樹塞門邦君為兩君之好有反坫管氏亦有反坫管氏而知禮孰不知禮又曰臧文仲山節藻梲何如其智也魯大夫臧孫辰又曰孔子曰奢則不遜儉則固與其不遜也寧固史記曰趙平原君使春申君趙使欲誇楚為瑇瑁簪刀劍悉以珠飾之春申君客三千餘人上客皆躡珠履以見趙使大慚又曰尹吉甫仕至上卿其家大富食口數百人時歲大飢曾鼎鑊作粥啜之聲聞數里食訖失三十人覔之乃在鑊中齕取燋粥而已漢書曰鮑宣上書柰何獨私養外親與幸臣董賢賢使奴從賓客漿酒藿肉視酒如漿視肉如藿蒼頭盧兒皆用致富非天意也漢名奴蒼頭非銳黑以別良人諸給殿中省所居蒼頭侍從也又曰陳咸為治倣嚴延年其廉不如所居調發屬縣所出食物以自奉養奢侈玉食又曰陳遵為公府掾公府掾中率皆羸車小馬不上鮮明而遵獨極輿馬衣服之好門外車騎交錯又日出醉歸曹事數廢西曹白請斥遵大司徒馬宮大儒優士謂西曹此人大度士柰何以小丈責之又曰王鳳為大將軍郡國守相刺史皆出其門又以太僕王音為御史大夫群弟爭為奢侈賂遺珍寶四面而至後庭姬妾各千人僮奴以千百數又曰張禹為人謹厚內殖貨財家以田為業及富貴多買田至四百頃涇渭溉灌極膏腴上價他財稱是禹性習知音聲內奢淫身居大第後堂作理絲竹管絃又曰自王吉至崇世名清廉然材器名稱稍不能及父而祿位彌隆皆好車馬衣服其自奉養極鮮明而金銀錦繡之物及遷徙去處所載不過囊衣不畜餘財家居亦布衣蔬食天下服其廉而怪其奢故傳能作黃金又曰哀帝幸舍人董賢寵之累遷為太尉前後所賜不可勝計哀帝崩群臣白太后收賢斬之時年二十二其家奢侈過於國耳於是乃收董氏財物估價凡四十二億萬貫皆帝所賜之物後漢書曰梁冀為大司馬行大將軍事害太尉李固及內外忠臣皆冀為之於是權震中外四方調發歲計先輸於冀然後入國吏人輸金懷璧求官請罪者道路相望冀又遣客出塞外國大壯棟宇加以丹漆圖以雲氣仙靈臺榭交通相望駭雞犀夜光璧充實帑藏鳴駞龍馬秣於內廄冀將妻孫氏乘輦青蓋車張羽葆飾以金玉琥珀每遊觀池亭及弟內多從倡優鳴鍾鼓吹竽酣樂竟路日夜相繼及桓帝誅冀收其貲產以實國庫詔減天下一歲租稅之半又曰桓帝時誅梁冀封單超徐璜具瑗左悺唐衡五人超薨後四侯轉撗天下為之語曰左廻天具獨坐徐臥虎唐兩隋皆競起第宅樓觀壯麗窮極技巧金銀罽毦施於犬馬取良民美女以為妃妾皆珍飾華侈擬則宮人其僕從皆乘車而從列騎東觀漢記曰馬融才高博洽為通儒教養諸生常有千數涿郡盧植北海鄭玄皆其徒也善鼓瑟好吹笛達生任性不拘儒者之節居宇器服多存侈飾常坐高堂施綘紗帳前授生徒後列女樂弟子以次相傳鮮有入其室者吳志曰甘寧好遊俠水行則連軒侍從被文錦繡常以繒帛維舟去或割棄之以示奢侈也又曰將軍賀齊性奢好軍事所乘舡彫刻丹鏤青蓋綘襜蒙衝鬭艦望之若山蜀志曰先主定益州以劉琰為涪陵太守後主立封都鄉侯服御飲食侈靡侍婢數十人皆為聲樂又悉教讀誦魯靈光殿賦又曰麋笁字子真東海人世殖貨財僮僕萬人貲產巨億徐州牧陶謙辟為別駕謙卒笁奉謙命迎先主牧之及呂布襲破先主虜其妻子笁於是進妹為夫人乃以二千人金帛貨幣以助軍實先主賴笁之資復振軍威先主後定益州即帝位拜笁為安漢將軍弟芳為南郡太守攜貳迎孫權敗關羽於是笁乃請罪先主以兄弟罪不相及待之如初晉書曰何曾字頴孝陽夏人其家大富魏明帝時為文學武帝踐祚累遷為太傅性甚奢豪每赴宴不食太官所設帝命取其食蒸餅上不拆作十字不食日食萬錢猶云無下筯之處人以小紙書者勑記室勿報又曰石崇字季倫累遷荊州刺史崇好俠無賴遣吏劫遠使商客致家大富有別館在河陽之金谷財產盈積室宇宏麗後房百數皆曳綺紈絲竹之妙皆盡一時之選與貴戚惠帝舅王愷奢靡相尚愷以飴燠釜崇以蠟代薪愷作紫絲步障四十里崇作錦步障五十里愷以示石脂塗屋崇以椒塗之武帝助愷珊瑚樹一株高二尺愷以示崇崇以鐵如意擊破愷不悅崇曰無恨令取六七株還之惠帝知富無以誇之時外國進火浣布天下更無帝為衫來幸崇家崇奴僕五十人皆衣火浣布衫祇承帝大慚崇廁屋內置侍婢衣以紈素並以香囊錦袋崇大會賓客侍中劉實往廁見廁內燦爛便出謂崇曰幾誤入公室矣崇曰廁也寔更往見侍婢所逼便迴後趙王倫誅崇兄弟妻子無少長悉皆遇害初崇家稻米屬地化為螺人以為族滅之應也又曰和嶠字長輿汝南西平人中郎將庾凱見嶠歎曰森森若千丈松雖磥砢多節目施之大廈有棟梁之用武帝重之為黃門侍郎嶠家產豐富擬於王者杜預封帝以為和嶠有錢癖又曰王濟性豪侈麗服玉食時洛京地甚貴濟買地為馬埒編錢滿之時人謂金埒又曰任愷初何邵以公子奢侈每食必盡四方珍饌愷乃踰之一食萬錢猶云無可下筯處又曰石崇財產豐積室宇宏麗後房百數皆曳紈繡珥金翠絲竹盡當時之選庖廚窮水陸之珍又曰何劭驕奢簡貴亦有父風衣裘服翫新故巨積食必盡四方珍異一日之供以錢二萬為限時論以為太官御膳無以加之又曰羊稚舒冬月釀令人抱甕須臾復易人酒速成而味好又曰愷失政遂縱酒極滋味初何邵一身一日之供必錢二萬為限及愷有踰於邵宋書曰徐湛之善於尺牘音辭流暢貴戚豪家產業甚厚室宇園池貴遊莫及伎樂之妙冠絕一時門生千餘人皆三吳富人之子姿質端妍衣服鮮麗每出入行遊塗巷盈滿泥雨日悉以後車載之太祖嫌其侈縱每以為言又曰謝靈運性奢豪車服鮮麗衣裳器物多改舊制世共宗之咸稱謝康樂也又曰劉穆之性奢豪食必方丈旦輒為十人饋穆之既好賓客未嘗獨飡每至食時客止十人以還者帳下依常下食以為常白高祖曰穆之家本貧賤贍生有闕自叨忝以來雖每存約損而朝夕所須徵為過豐自此以外一毫不以負公又曰阮佃夫通貨賄凡事非賂不行宅舍園池諸王邸第莫及女伎數十藝色冠絕當時金玉錦繡之飾宮掖不逮也每製一衣造一物京邑莫不法效焉於宅內開瀆東出十許里塘岸整潔泛輕舟奏女樂齊書曰劉悛既藉舊恩尤能悅附人主承迎權貴賓客閨房供費奢廣罷廣司二州悉傾資獻家無留儲在蜀作金浴盆餘金物稱是又曰劉撝彭城人其祖彥之父仲度俱仕明帝時為戶部郎中太子洗馬其家豪富資財宅宇山池妓妾姿藝皆窮上品有愛妓陳玉珠明帝求不與逼奪之撝有怨詞帝令有司誣奏將殺之入獄數宿鬢毛皆白免死為司徒長史明帝射雉郊野渴倦撝得青早瓜進帝帝對割甚嘉之入齊三遷為御史中丞五為兵部尚書後魏書曰夏侯道遷譙國人封濮陽侯除兗州大中正不拜好奢侈宴飲京師珍羞罔不畢備嘗於京城西水次大起園池植列花果延招攜彥日往遊適妓妾十餘人當自娛興國秩俸歲入三千疋專供酒饌不營家產每誦孔融詩曰座上客恒滿樽中酒不空餘非吾之事也識者多之道遷不娉正室又曰郢州刺史韓務獻七寶床象牙席詔曰昔晉武帝焚雉頭裘朕常嘉之今務所獻亦此之流也奇麗之物有乖素風可付其人家隋書曰裴矩為給事郎煬帝至東都矩以蠻夷朝貢者多諷帝令都下大戲徵四方奇異陳於端門街衣錦珥金翠店肆悉設帷帳盛酒食遣蠻夷見者嘆其中國以為神仙唐書曰元載於城中開南北二甲第室宇宏麗冠絕當時又於近郊起亭榭所至之處帷帳什器皆如宿設儲不改供城南膏腴別墅連疆接畛凡數十所婢僕曳羅綺亦百餘人恣為不法侈僣無度又曰裴冕為宰相性本侈靡好尚車服及營珍饌名馬在櫪直數百金者常十數每會賓友滋味品數坐客有昧於名者自創巾子其狀新奇市肆因而效之呼為僕射樣漢武帝故事曰又起建章宮為千門萬戶其東鳳闕高二十丈其北太液池池中漸臺高二十丈池中又為三山以象蓬萊方丈瀛州削金石為魚龍禽獸之屬其南有玉臺王堂基與中央前殿等去地十二門階陛皆用玉璧又作神明臺井幹樓高五十餘丈皆懸閤輦道相屬焉其後又為酒池肉林藂天下四方奇異鳥獸於其中鳥獸能言能歌舞或奇形異態不可稱載傍別造華殿四夷珍寶充之琉璃珠玉火浣布切玉刀不可稱數巨象大雀師子駿馬充塞苑廄自古已來所未見者必備三輔故事曰秦時奢汰有天下以來不復是過渭水貫都以像天河撗橋南渡以像牽牛中外殿觀百四十五後宮列女萬有餘人鹽鐵論曰今民文柸畫案婢妾衣羅紈履絲所以亂治漢末一筆之押雕以黃金飾以和璧綴以隋珠發以悲翠此筆非文犀之楨必象齒之管豐狐之柱秋兔之翰用之者必被珠繡之衣踐雕玉之履矣晉朝雜記曰洛下少林木炭正如粟狀羊琇驕豪乃擣小炭為屑以物和之作獸形後何石之徒共集乃以溫酒火勢既猛獸皆開口向人赫赫然諸豪相矜皆服而效之管子曰昔者桀之時女樂三萬人晨譟於端門樂聞於三衢無不服文繡衣裳者晏子春秋曰寸之管無當天下不能足之粟今齊國丈夫耕女子織夜以接日不足以奉上而君側雕文刻鏤之觀此無當之管也又曰古者聖人製衣服冬輕而暖夏輕而清今金玉之履重不可節是過任也列子曰衛端木叔者子貢之世也藉其先貲家累萬金意所欲者無不為奉養之餘先散之宗族次散之邑里及一國行年六十氣幹將衰棄其家事散其庫藏珍寶車服妾媵一年之中盡焉及其病也無藥石儲及其死也無瘞埋之實一國之受其施者相與賦而藏之禽屈釐聞之曰端木叔狂人也辱其祖矣段干木聞之曰端木叔達人也過其祖矣韓子曰禹作祭器黑漆其外朱畫其內觴酌有算樽俎有飾此彌侈矣而國之不服者三十二殷作大輅建九旒輅食器彫琢觴酌刻鏤此彌侈矣而國之不服者五十三淮南子曰夏屋綿聯彫琢刻鏤其剞劂然猶未能贍人主之欲也
