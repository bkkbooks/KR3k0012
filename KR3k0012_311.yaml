body:
  text: 兵部四十一戰下後周書梁臺傳曰時大軍圍洛陽久而不拔齊騎奄至齊公憲率兵禦之乃有數人為敵所執已去陣二百餘步臺望見之憤怒單馬突入射殺兩人敵皆披靡執者遂得齊公憲每歎曰梁臺果毅膽決不可及也又曰田弘討西平反羌及鳳州叛兵等並破之弘每臨陣摧鋒直前身被一百餘箭破骨者九馬被十矟朝廷壯之又曰李標字靈傑長不盈五尺性果決有膽氣少事爾朱氏累遷右將軍魏孝武以摽從為太祖帳內都督從復弘農破沙苑摽時跨馬運矛衝堅陷陣隱身披甲之中敵人見之皆曰避此小兒太祖初亦聞摽驍悍未見其能至是方嗟歎之謂摽曰但使膽決如此何必要須八尺之軀也又曰賀若敦太祖時群盜鋒起各據山谷大龜山賊張世顯潛來襲統敦挺身赴戰手斬七八賊乃退走父統大悅謂左右僚屬曰我少從軍旅戰陣非一如此兒年時膽略者未見其人非唯成我門戶亦當為國名將又曰王雅從戰邙山時大軍不利為敵所乘諸將皆引退雅獨廻騎拒之敵人見其無繼步騎競進左右奮擊頻斬九級敵眾稍却雅乃還軍太祖歎曰王雅舉身悉是膽也又曰蔡祏字承先從太祖戰於河橋祏乃下馬步鬥手殺數人左右勸乘馬以備急卒祏怒之曰丞相養我如子今日豈以性命為念遂率左右十餘人齊聲大呼殺傷甚多敵以其無繼遂圍之十餘重謂祏曰觀君似是勇士但弛甲來降豈慮無富貴耶祏罵之曰死卒吾今取頭自當封公何假賊之官號也乃彎弓持滿四面拒之東魏人弗敢逼乃募厚甲長刀者直進取祏去祏可三十步左右勸射之祏曰吾曹性命在一矢耳豈虛發哉敵人漸進可十步祏乃射之正中其面應弦而倒便以矟刺殺之因此戰數合唯失一人敵乃稍却祏徐引退是戰也我軍不利太祖已還祏至弘農夜中與太祖相見祏至字之曰承先尒來吾無憂矣太祖心驚不得寢枕祏股上乃安又曰王雄從晉公護東征至邙山與齊將斛律明月接戰雄馳殺三人明月退走雄追之明月左右皆散矢又盡唯餘一奴一矢在焉雄案矟不及明月者丈餘曰惜爾不殺得但住將尒見天子明月反射雄中額雄馬退走至營而薨又曰耿豪本名令貴沙苑之戰豪殺傷甚多血染甲裳盡赤太祖見之歎曰令貴武猛所向無前觀其甲裳足以為驗不須更論級數也又曰王勇從討趙青雀平之論功居最除衛大將軍殷州刺史加通直散騎常侍兼太子武衛邙山之戰勇率敢死之士三百人並執短兵大呼直進出入衝擊殺傷甚多敵人無敢當者是役也大軍不利唯勇及王文達耿令貴三人力戰皆有殊功太祖於是賞帛二千疋令自分之軍皆拜上州刺史以雍州歧州北雍州擬授勇等然州頗有優劣又令探籌取之勇遂得雍州文達得歧州令貴得北雍州仍賜勇名為勇令貴名豪文達名傑以彰其功又曰耿豪從太祖戰於邙山豪謂所部曰大丈夫見賊須右手拔刀左手把矟直斫慎莫皺眉畏死遂大呼獨入敵人鋒刃亂下當時咸謂豪歿俄然奮刃而還戰數合當豪前者死傷相繼又謂左右曰吾豈樂殺人但壯士除賊不得不尒若不能殺賊又不為人所傷何異逐坐人也太祖嘉之拜北雍州刺史隋書曰突厥入寇隋將楊素擊之先是諸將與虜戰每慮胡騎奔突皆戎車步騎相參舁鹿角為方陣騎在其內素謂之曰此乃自固之道非取勝之方也於是悉除舊法令諸軍為騎陣突厥達頭可汗聞之大喜率精騎十餘萬而至素奮擊大破之素多權略乘機赴敵應變無方然大抵馭戎嚴整有犯軍令者立斬之無所寬貸每將臨寇求人過失而斬人多者萬餘人少不下千數流血盈前言笑自若及其對陣先令三百人赴敵陷陣則已如不能陷陣而還者無問多少悉斬之又令二三百人復進還如向法將士股慄有必死之心由是戰無不勝時稱名將又曰張須陁將兵拒東郡賊翟讓前後三十餘戰每破走之轉滎陽守時李密說讓取洛口倉讓憚須陁不敢進密勸之讓遂與密率兵逼滎陽須陁拒之讓懼而退須陁乘之逐北十餘里時李密先伏數千人於林木間邀擊須陁軍遂敗績密與讓合軍圍之須陁潰圍輒出左右不能盡出復躍馬入救之往來數四眾皆散乃仰天曰兵敗如此何面見天子乎乃下馬戰死時年五十二其所部兵晝夜號泣數日不止又曰麥鐵杖遼東之役將渡遼謂其三子曰阿奴當備淺色黃衫吾荷國恩今是死日我既被殺爾當富貴唯誠與孝爾其勉之及濟橋未成去東岸尚數丈賊大至鐵杖跳上岸與賊戰死武賁郎將錢士雄孟金又亦死之左右更無及者帝為之流涕購得其屍又曰權襲慶仕周從武元皇帝與齊師戰於并州被圍百餘重襲慶力戰矢盡短兵相接殺傷甚眾於是刀矟皆折脫冑擲地向賊大罵曰何不來斫頭也賊遂殺之又曰高智惠作亂江南史萬歲以行軍揔管從楊素擊之萬歲率眾二千自東陽別道而進踰嶺越海攻陷浮洞不可勝數前後七百餘戰轉鬥千餘里寂無聲聞者十旬遠近皆以萬歲為沒萬歲以水陸阻絕信使不通乃置書竹筒中浮之於水汲者得之以言於素素大悅上其事高祖嗟歎又曰宇文慶從周武帝攻河陰先登攀堞與賊短兵接戰良久中石迺墜絕而後蘇帝勞之曰卿之餘勇可以賈人也復從武帝拔晉州其後齊師大至慶與宇文憲輕騎覘卒與賊相遇為賊所窘憲挺身而遁慶退據汾橋眾賊爭進慶引弓射之所中人馬必倒賊乃稍却及破高緯拔高辟克并州下信都擒高諧功並居最唐書曰高祖為山西河東撫尉大使至龍門縣有賊母端兒眾數千人奄至城下時諸軍無備為賊所乘高祖親率十餘騎撗出擊之所射應弦而倒賊大潰逐北數十里伏屍相繼於道時高祖射七十發明日斬首築為京觀於屍上盡得所射箭其妙如此又曰至德中宜春郡太守劉秋子率士卒攻賊兵盡矢窮秋子張空拳大呼於軍前死戰而勝詔嘉其忠勇授淮陽太守又曰白孝德胡人也驍悍有膽力乾元中李光弼為偏禆史思明攻河陽使騎將劉龍仙率鐵騎五十臨河挑戰龍仙勇捷自恃舉右足加馬鬣上手運兩矢嫚罵光弼登城望之諸將皆侍顧曰孰可取者僕固懷恩前請行光弼曰此非大將所為歷選其次無可於是左右竊議曰孝德可光弼聞之乃招孝德前問可得乎孝德曰得光弼問所加幾何人而可曰獨往則可加人不可光弼曰壯哉終問所欲對曰願備五十騎於壁門候既入然後進及諸大軍鼓譟以借威他無所用光弼撫其背以遣孝德挾二矛策馬截流而渡半濟而懷恩賀曰克矣光弼曰未及何知其克懷恩曰觀其攬跂便辟可萬全者龍仙始見其獨來甚易之足不降鬣稍近將動孝德搖手示之若使其不動然龍仙不測又止孝德呼太尉使予致辭非他龍仙去三十步與之言褻罵如初孝德息馬伺便久之因瞋目曰賊識我乎龍仙曰誰曰我國之大將白孝德龍仙曰是豬狗乎孝德發聲虓然執矛突前城上萬鼓齊噪五十騎以繼進龍仙矢不及發環走堤上孝德以疋馬逐之胡騎五十皆披靡若猛犬之獵群狐也遂斬之提首而歸又曰王難得試衛尉卿至鳳翔為都知兵馬使兼興平軍事嘗有禆將靳元矅當合戰墮馬呼難得難得俯馬救之賊射難得中眉皮穿下蔽目難得乃拔去箭并皮掣棄之勇冠三軍由是士眾多附之五代周史曰王殷遷奉國右廂都指揮使漢祖受命從征杜重威於鄴下殷與劉詞皆率先力戰矢中於首久之出折鏃於口中以是漢祖嘉之三國典略曰茹茹寇肆齊王自晉陽討之虜騎散走大軍遂還齊主率二千餘騎為殿夜宿黃爪堆茹茹別部數萬騎扣鞍而進四面圍逼麾下齊主安臥平明方起神色自若指畫軍形潰圍而出虜騎追擊之伏尸二十里獲奄羅辰妻子生口三萬餘令都督高阿那肱率騎數千塞其走道那肱以兵少請益齊主更減其半那肱騎奮擊亦大剋捷戰不顧親史記曰項王為高俎置太公其上告漢王曰今不急下吾烹太公漢王曰吾與項羽俱北面受懷王約為兄弟吾翁即迺翁必欲烹而翁即幸分我一杯羹項王怒欲烹之項伯曰天下事未可知且為天下者不顧家雖殺之無益祗益禍耳項王從之後漢書曰邳彤字偉君世祖拜為後將軍常從戰攻信都復反為王郎所置信都王捕擊彤父弟及妻子使為手書呼彤曰降者封爵不降者族滅彤涕泣報曰事君者不得顧家彤親屬所以至今得安於信都者劉公之恩公方爭國事彤不得復念私也會更始所遣將攻拔信都王郎兵敗走彤家得免又曰世祖遣宗正劉延攻天井關與上黨太守田邑連戰十餘合延不得進邑迎母弟妻子為延所獲馮衍乃遺邑書邑報書曰僕雖駑怯亦欲為人者也豈茍貪生而畏死哉聞老母諸弟見執於軍而邑安然不顧者豈非重其節乎若使人居天地壽如金石要長生而避死地可也今百年之期未有能至老壯之間相去幾何誠使故朝尚在忠義可云雖老親受戮妻兒橫分邑之願也又曰趙苞字威豪遷遼西太守到官遣使迎母及妻子垂當到郡道經柳城值鮮卑萬餘人入塞寇鈔苞母及妻子遂為所劫質載以劫郡苞率步騎二萬與賊對陣賊出母以視苞苞悲號謂母曰為子無狀欲與微祿奉養朝夕不圖為母作禍昔為母子今為人臣義不得顧私恩毀忠節唯當萬死無以塞罪母遙謂曰威豪人各有命何得相顧以虧忠義尒其勉之苞即時進戰敗之其母妻皆為所害東觀漢記曰孔奮為武都郡丞時在郡為隗囂餘黨所攻殺太守得奮妻子奮追賊賊推奮妻子於軍前奮年五十唯有一子不顧遂擒賊而其子見屠帝嘉其忠遷武都太守九州春秋曰初清河李雍以鄃叛袁紹而降公孫瓚遣兵衛之紹遣朱靈攻之靈家在城中瓚以靈母弟置城上誘呼靈靈望城上泣曰丈夫一出身與人豈復顧家耶戰遂拔之生擒雍而靈家皆死靈字文愽蜀志曰姜維與母相失孫盛雜記曰姜維得母書并求當歸維曰良田百頃不在一畝但有遠志不見當歸續帝王世紀曰晉師度峴慕容超使拒之聞晉兵盛自將四萬繼之及晉人戰於臨昭燕兵大敗超單馬奔入城八月將封融自河北奔晉師使詔誘城內超怒縛其母懸諸城上融曰姜維有言良田百頃不在一畝梁書曰羊侃長子鷟為侯景所獲執來城下示侃侃謂曰我傾宗報主猶恨不足豈得計此一子幸尒早能殺之數日復持來侃謂鷟曰久以汝為死猶在耶吾以身許國誓死行陣終不以汝而生進退因引弓射之賊感其忠義亦不害也戰傷左傳曰齊晉將戰郄克傷於矢流血及屨未絕鼓音魏書曰孫觀遷青州刺史從征孫權於濡須口為流矢所中穿左足力戰不顧太祖勞之曰將軍被瘡深重而猛氣益奮及瘡甚遂卒魏志曰諸葛亮出祁連山詔張郃督諸軍至洛陽還保祁連山郃追至木門與亮軍交戰飛矢中郃右膝薨又曰夏侯惇字元讓太祖自徐州還惇從征呂布為流矢所中傷左目又曰公到宛張繡降既而悔之復反公與戰軍敗為流矢所中魏書曰公所乘馬名絕影為流矢所中傷頰及足并中公右臂蜀志曰先主進圍絡縣龐統率眾攻城為流矢所中卒三國典略曰陳薛安都引兵破留異成州刺史韓子皋單馬入陣傷頂之左一髻半落安都為流矢所中血流至踝乘輿車容止不變北史曰彭樂天平四年從神武西討與周文相拒神武欲緩持之樂氣奮請決戰曰我眾賊少不可失也神武從之樂因醉入深被刺腸出內之不盡截去復戰身被數瘡軍勢遂挫不利而還神武每追論以戒之後周書曰河橋之戰王思政下馬用長矟左右撗擊掊數人時陷陣既深從者死盡思政被重創悶絕會日暮敵亦收軍思政久經軍旅每戰唯著破弊甲敵疑非將帥故免有帳下督雷五安於戰處哭求思政會其已蘇遂相得乃割衣褁創扶思政上馬夜久方得還仍鎮弘農思政以玉璧地在險要請築城即自營度移鎮之遷并州刺史仍鎮玉璧又曰韋法保每與敵人交兵每身先士卒單馬陷陣是以戰必被傷嘗至關南與東魏人戰流矢中頸從口中出當時氣絕輿至營久之乃蘇又曰李弼從太祖與齊戰於河橋弼深入陷陣身被七創遂為所獲弼佯殞絕於地守者稍解弼睥睨傍有馬因躍上西馳得免隋書曰開皇二年突厥葉護及潘郍可汗眾十餘萬寇掠南詔以達奚長儒為行軍揔管率眾二千擊之遇於周槃眾寡不敵軍中大懼長儒慷慨神色愈烈為虜所衝突厥散而復聚且戰且行轉鬥三日五兵咸盡士卒以拳毆之手皆見骨殺傷萬計虜氣稍奪於是解去長儒身被五瘡通中者二其戰士死傷者十八九突厥本欲大掠秦隴既逢長儒兵皆力戰虜意大沮明日於戰處焚屍慟哭而去
