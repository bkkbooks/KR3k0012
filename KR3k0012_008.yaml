body:
  text: 天部七星下河圖曰以德布精上為衆星龍魚河圖曰太白之精下為風伯之神主司非星辰之氣下為靈星之神主得土河圖帝祕微篇曰帝淫泆政不平則奎有角異苑曰陳仲弓從諸子姪造荀季和父家于時德星聚太史奏五百里內有賢人聚雜兵書曰春斗為天關軫為地梁夏角為天關參為地梁又曰四帚星四向守之君有德天下豐熟古辨異曰仰觀天形如車蓋衆星纍纍如連珠張衡靈憲曰星者體生於地精成於天列居錯峙各有攸屬中外之官帶名者百有二十可名者三百二十為星二千五百微星之數蓋一萬一千五百二十庶類蠢蠢咸得係命不然何以惣而理諸徐整長曆曰大星徑百里中星五十小星三十北斗七星間相去九千里皆在日月下天文要集曰七公天之相也三公廷尉之象也上星上公也次星中公也星明則七輔強天官星占曰歲星其國齊其位東方蒼帝之子人主之象也其色明而內實天下安寧夫歲星所居國人主有福不可加以兵歲星一曰攝提一曰重華一曰應星一曰經星一曰修人歲星動人主怒無光仁道失歲星順行仁德加也歲星農官也主五穀春不勸農則歲星盈縮所在之國不可以罰小則民多病大則喜又曰熒惑主夏位在南赤帝之子方伯之象也為天候主歲成敗司察祅孽所往有兵為亂為賊為疾為喪為飢為兵蓋天下不理也東西南北無有常出則有兵入則散周旋止息乃為死喪又曰鎮星主德女主之象也所居國有德不可以軍加也又曰辰星北之位黑帝之子宰相之祥也一名安調一名態星一名釣星一名伺晨主德常行四仲當出不出天下旱色黃五穀熟色白中謀泄色青大臣憂又曰太白位在西方白帝之子大將之象也一名天相一名大正一名大臣一名大皓一名明星又曰紫微者天之帝坐也一名天營一名長垣又曰北辰者一名天關一名北極極者紫宮太一坐也太微者天闔也南端門間十星分為左右掖太微之宮天子之庭五帝之坐也北斗為帝車運於中央臨制四方北斗魁第一星少微一名處士星明大而黃澤即賢士舉忠臣用招搖者常陽也一名矛盾胡星也荊州星占曰五星天府一名天法主察姦謀又曰軒轅主雷雨之神旁側郎位主宿衛又曰河鼓一名三武一名天鼓又曰市天子旗幟也大明則糴賤又曰五車一名庫凡十四星五車中有三柱三星若不見兵盡起又曰心為天王其宿三星一名天司空又曰箕舌一星動則大風至不出三日又曰箕宿四星第二星一名風后又曰太白出東北為觀星出東南為明星出西方為太白楊泉物理論曰星者元氣之英水之精也又曰日月之精為星辰星辰生於地又曰星元氣之英日精也二十八宿度數有常故謂恆星盬鐵論曰常星猶公卿也衆星猶萬民也列星正則衆星齊常星亂則衆星墜矣崔豹古今注曰漢明帝為太子時令樂人作歌詩曰星重輝言太子比德故云重也庾闡詩曰玄景如映壁繁星如散錦瑞星易坤靈圖曰至德之萌五星若貫珠尚書中候曰帝堯即政景星出翼尚書考靈曜曰天地開闢元曆名月首甲子冬首日月五星俱起牽牛初日月若懸璧五星若編珠史記曰黃帝時景星見形如半月可以夜作又曰南極老人見則天下安漢書曰高祖初入關五星聚於東井秦分野司馬遷天官書曰景星其狀無常常出有道之國朱宣帝王世紀曰神農氏之末少昊氏娶附寶見大電光繞北斗極星照郊感附寶孕二十月生黃帝於壽丘魏志曰桓帝時有黃星見楚宋之分殷馗言後五十歲當有真人起梁沛間其鋒不可當其後五十年曹公破袁紹天下莫敵矣晉中興書曰元帝渡江歲鎮辰太白等四星聚於牛女間禹時鉤命決曰星纍纍若貫珠炳煥如連璧帝命驗曰有人雄起戴玉英履赤矛鄭玄注曰赤矛瑞星名河圖曰大星如虹下流華渚女節意感生白帝也孫氏瑞應圖曰景星者大星也狀如半月生於晦助月為明王者不私人則見又曰王者承天則老人星臨其國天文録星占甘氏曰五星同色天下偃兵百姓安寧歌舞以行不見疾疹五穀大昌文子曰精誠內形氣動於天則景星見列星圖曰流星貫昴修紀感而生禹祅星劉向洪範傳曰彗者去穢布新者也此天所以去無道而建有德也鄭玄曰彗星主掃除又曰彗星者君臣失政濁亂三光五星逆錯變氣之所生也傳曰昭五年冬有星孛于大辰西及漢申須曰彗所以除舊布新也又曰昭二十六年齊有彗星齊侯使禳之晏子曰無益也祇取誣焉天道不慆不二其命若之何禳之且天有彗也以除穢也君無穢德又何禳焉詩曰惟此文王小心翼翼昭事上帝聿懷多福厥德不回以受方國君無違德方國將至何患於彗爾雅曰彗星為攙搶春秋考異郵曰鯨魚死而彗星出淮南子亦云尚書帝命驗曰天鼓動玉弩發天下驚史記曰蚩尤旗類彗而後曲象旗見則王者征伐四方又曰齊景公三十二年彗出公坐柏寢歎曰堂乎堂乎誰有此乎群臣皆泣晏子笑公怒晏子曰臣笑群臣諛甚景公曰彗星出東北當齊野寡人以憂晏子曰君高臺深池賦斂如弗得刑罰恐弗勝茀星將出彗星何懼乎公曰可穰乎晏子曰使神可祝而來亦可禳而去也百姓若怨以萬數而君令一人禳之安能勝衆口乎又天官書曰天狗狀如奔星有聲其下止地類狗望之如火光炎炎衝天其下圓如數頃田處上兌則黃色千里破軍殺將又曰長庚如一匹布著天見則兵起漢書曰獻帝初平四年有流星八九丈西北行有聲如雷望如火照地是曰天狗金門之山有赤犬其聲下者有兵也又曰哀帝建平二年彗出牽牛日月五星所從起曆數之元三正之始彗而出之改更之象也其後王莽篡國又曰枉矢類大流星蛇行而蒼黑望如有毛又曰鄒陽上書曰衛先生為秦畫長平之事太白食昴昭王疑之漢書天文志曰凡月蝕五星其國皆亡歲以飢熒惑以亂鎮以殺太白強國以戰辰以女亂又曰始皇之時十五年間彗星四見久者八十日長或竟天後秦并六國外攘四夷死者如亂麻後漢書曰安帝永初二年正月太白晝見占云為強臣是時鄧氏方盛此其應也續漢書曰靈帝光和中國星見東南如炬十餘日其後黃巾張角起袁紹董卓亂西漢詞圃曰項籍之敗星孛大角吳志曰孫權時有長星從東南出群星從之又曰司馬宣王圍公孫淵夜有大流星長數十丈墜襄平東及淵走當流星處斬之晉書曰張華為司空中台星拼少子韙勸華遜位華云天道玄遠須修德以應之孫氏晉陽秋曰有星赤而芒角自東北往西南沒于諸葛亮營俄而亮卒又曰會稽謝敷字慶緒隱若耶山初月犯少微星少微一名處士星時戴逵名著於敷時人憂之俄而敷死故會稽人士嘲曰吳中高士求死不得死宋書曰吳孫休永安元年有諸子群嬉中有異眼光藝爚爚外射諸兒問之曰我熒惑也將示爾三公歸于司馬言畢乃聳身而躍仰視之若曳一匹練有頃而沒後四年蜀亡六年魏廢二十一年吳平是歸司馬也又沈懷文傳曰時熒惑守南斗上乃廢西州舊館使西陽王子尚移居東城以厭之懷文曰天道示變宜應之以德今雖空西州恐無益也唐書曰有星孛于虛危歷于氏百餘日乃滅太宗謂群臣曰天見彗星是何祅也虞世南曰昔齊景公時有彗星見公問晏嬰對曰公穿池沼畏不深起臺榭畏不高行刑罰畏不重是以天見彗星為公誡耳景公懼而修德後十六日而星沒臣聞天時不如地利地利不如人和若德義不修雖獲麟鳳終是無補但政事無闕雖有災何損於時然願陛下勿以功高古人而自矜伐勿以太平漸久而自驕怠慎終如始彗星雖見未足為憂又曰元和八年太白犯上相歷執法占者言今之三相皆不利始輕末重月餘李絳以足疾免明年十月李吉甫以暴疾卒九年六月武元衡為盜所害又曰李晟初屯渭橋時熒惑守歲久之方退賓介或勸曰今熒惑已退皇家之利也可速用兵晟曰天子外次人臣但當死節垂象玄遠吾安知天道耶至是謂參佐曰前者士大夫勸晟出兵非敢拒也且軍可用之不可使知之常聞五緯盈縮無準晟懼復來守歲則我軍不戰而自潰矣參佐歎服皆曰非所及也又曰傅奕相州鄴人也尤曉天文曆數隋開皇中以儀曹事漢王諒舉兵謂奕曰今茲熒惑入井是何祥也奕對曰天上黃道經其中正是熒惑行路所涉不為怪異若熒惑入地上井是為災也郭子橫洞冥記曰武帝嘗見彗星東方朔折指星之木以授帝帝以指彗彗遂沒星出之夜野獸皆鳴或説為獸鳴星呂氏春秋曰宋景公時熒惑在心公召子韋問焉子韋曰禍當君可移於相公曰相所與理國家也曰可移於百姓曰百姓死寡人將誰為君曰可移於歲公曰歲飢人餓必死焉為人君而殺其人誰以我為君乎子韋曰君有至德之言三天必三賞君熒惑必徙三舍後果三徙晏子春秋曰景公時熒惑守虛期年去晏子曰虛齊之分野當強為善公乃去冤聚之獄振孤敬老行之三日而熒惑遷尉繚子曰昔楚將軍子正與齊戰未合初夜彗星出柄在齊所在勝不可擊子正曰彗何知明日與齊戰大破之天文録曰積尸大陵之尸也石氏曰積尸明有大喪死人如立丘山也又曰孛星者彗星之屬也偏指曰彗藝氣四出曰孛孛謂孛孛然也又曰五星反羽其下之國不可久處反羽者光藝上大下小狀如反羽也又曰昴者天之耳也主西方故爾雅曰西陸昴也星讚曰昴主獄事典治囚也又胡星也一曰旄頭旄頭者天執罕畢前驅者之所罰也河圖稽耀鉤曰辰為枉矢流射所誅又曰熒惑散為蚩尤旗主惑亂又曰太白散為天狗主兵又曰歲星流為國皇主內難
