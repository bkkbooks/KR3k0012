body:
  text: 獸部十九麞春秋運斗樞曰樞星散為麞伏侯古今注曰麞有牙而不能噬鹿有角而不能觸麞一名麕青州人謂麕為麞抱朴子曰麞兔入軍中當徙之又曰山中稱赤吏者麞也呂氏春秋曰使麞疾走馬弗及也而得之者時願也瑞應圖曰宋文元嘉二十五年華林園飬麞生二百子文帝又獲青麞晉起居注曰咸寧中白麞見魏郡後諸州各送白麞異苑曰青州劉幡元嘉初射得一麞剖肚藏以草塞之厥然起走幡怪而拔塞須臾復還倒如此三焉幡密録此種求類治傷痍多愈北史曰後魏廣平王懷嘗獵於河北馬場間逐一麞入草命人圍繞將自射之田已先經燒不見其出遂失麞所在唯有磚塔存焉懷乃悵然動仁恕之心解鷹放犬遂不復獵蕭廣濟孝子傳曰蕭國遭喪有鵠遊其庭至暮而玄麞暮入其門與馬犬侶至旦而去王述上白麞表曰所領阮藻之於江寧縣界得白麞一頭毛色鮮潔異於類誠嘉祥也麕爾雅曰麕牡麌牝麋音栗其子麆音助其迹解絶有力豜音肩説文曰麕麞也毛詩曰野有死麕惡無禮也野有死麕白茅苞之穆天子傳曰天子賜曹奴之人白銀之麕論衡曰都尉王子鳳時麕入府中其後遷為丹陽太守魏文帝詩曰巾車出鄴宮校獵東橋津灣弓忽高馳一發連雙麕晉書曰中興所在獻白麕建武故事曰咸和六年計貢合集於樂堂有野麕走至堂前左右逐之於池中而獲之沈約宋書宗室傳曰劉慶於廣陵有疾野麕入府心甚惡之因陳惡求還太祖許之薨于京邑兔爾雅曰兔子嬔敷萬切其迹迒絶有力欣迒音剛又胡剛切廣志曰兔大者曰毚音讒春秋運斗樞曰玉衡星散而為兔孫氏瑞應圖曰赤兔者瑞獸王者盛德則至典略曰兔者明月之精詩小雅巧言躍躍毚兔遇犬獲之又國風有兔曰有兔爰爰雉離于羅爰爰緩意又小雅瓠葉曰有兔斯首炮之燔之斯白也字或作鮮史記曰李斯出獄顧謂其子曰吾欲與爾復牽黃犬俱出上蔡東門逐狡兔其可得乎又曰范睢謂秦昭王曰夫以秦而治諸侯譬若縱韓盧而搏蹇兔也謝承後漢書曰儒叔林為東郡太守赤烏巢於屋梁兔産於床下又曰方儲字聖明丹陽歙人幼喪父事母母死負土成墳種樹千株鸞鳥栖集其上白兔遊其下范曄後漢書曰南徼外蠻夷獻白雉兔又曰蔡雍性篤孝母嘗滯病三年雍自非寒暑節變未嘗解襟帶不寢寐七旬母卒廬於冢側動靜以禮有兔馴擾其室傍漢獻帝春秋曰張楊大將睦固屯於射犬巫戒之曰將軍本名白兔兔見犬必驚不宜屯此固不從司空曰兔入犬城但當取遂進軍擊平之張璠漢記曰梁冀起兔苑於河南移檄所調發生兔刻其毛以為識民有犯者罪至死西域嘗有賈胡來不知禁誤殺一兔轉相告坐死者十餘人也晉書載記曰石勒時茬叔之切平令師歡獲黑兔獻之於勒或以為勒龍飛革命之祥於晉以水承金兔陰精之獸玄為水色此殿下宜速副天人之望也於是大赦改咸和三年曰大和王隱晉書曰慕容皓田于南鄙見父老曰此非獵所言卒不見既明日又出見白兔馳射之墜馬于石即死後魏書曰有兔入於後宮撿問門官無從得入太祖怪之令崔浩推其咎徵浩以為當有鄰國貢嬪嬙者明年姚興果來獻女三國典略曰周命尉遲逈伐蜀帥甲士一萬二千騎萬匹自散關由固道而入太祖送於城西見一走兔命弟中領軍網射之網誓曰若獲此兔必當破蜀俄而獲兔太祖喜曰事平之日賞汝佳口及剋蜀乃賜侍婢二人隋書曰華秋汲郡臨河人也幼喪父事母以孝聞家貧傭賃為飬其母卒秋髮盡禿落廬於墓側負土成墳有人欲助之者秋輒拜而止之大業初調狐皮郡縣大獵有一兔人逐之奔入秋廬中匿秋𣍿下獵人至廬所異而免之自爾此兔常宿廬中馴其左右郡縣嘉其孝感具以狀聞春秋考異尤曰熒惑不明雉生兔焉春秋運斗樞曰行失搖光則兔出月宋灼注曰陰不銜陽故兔出月也春秋元命苞曰君失德則地吐泉魚銜兔宋灼注曰兔陽精魚是陽見制也詩推度災曰八月成光決鼻始明決鼻兔也黃帝占書曰月望而月兔不見者所見之國山崩大水滔民崔豹古今注曰兔口有缺尻有九孔括地圖曰天池之出有獸如兔名曰飛兔以背毛飛莊子曰蹄者所以在兔也得兔而忘蹄蹄者取兔網韓子曰宋人有耕者田中有株兔走觸折頭而死因釋耕守株冀復得兔為宋國笑慎子曰一兔走街百人追之積兔於市過而不視非不欲得分定不爭也韓子曰趙王遊於圃中左右以兔與虎而輟之虎眄然環其眼王曰可惡哉虎在左右曰平陽之目可惡過此平陽君趙王之弟文子曰飛鳥反鄉兔走歸窟狐死首丘抱朴子曰兔壽千歲五百歲其色白又曰山中卯日稱丈人者兔也又曰采女丹法以兔血和丹與密蒸之百日服之如梧子者二丸一百日有神女二人來侍之可役使淮南子曰以兔之走使大如馬則逐日追風及其為馬則不走矣又曰楚王珮玦逐兔為速破乃取兩玦重而著之其破愈疾述異記曰殷紂之時大龜生毛兔生角兵甲將興兆也春秋後語曰昔齊有良兔曰東郭俊本或作狡兔以其善走故曰俊一日走百里有良狗曰韓子獹黑犬也獹讀如盧也亦一日而走百里使人遙見而指屬指屬猶指蹤也屬音之欲切則雖韓獹不及良兔躡迹而蹤之則雖東郭不能離也春秋後語曰淳于髡説齊威王曰韓子獹天下之壯犬也東郭俊者海內之狡兔也韓子獹逐東郭俊環山者三騰山者五兔極於前而犬疲於後犬兔俱疲各死其處田父見而獲之無勞倦之苦而擅其功今齊魏相持頓兵斃衆臣恐強秦大楚乘其後而有田父之功也威王懼而罷兵又曰莊辛對楚王曰臣聞鄙諺曰見兔而顧犬未為晚也亡羊而補牢未為遲也又曰馮暖謂孟嘗君曰聞狡兔有三穴范子計然曰兔毫出玄菟樂浪書紀年曰昭王十九年天大曀雉兔皆震宣王三十年有兔舞鎬風俗通曰食兔臏音牝者令人面生臏食得臏者賞以寒酒按秦法言好車裂抽脅黔首飲泣永歎故食兔臏以為嘉瑞全己之臏也所以有賞耳古今注曰成帝建平元年山陽得白兔目赤如朱京房妖占曰兔止城上邑必虛入宮生子宮空廣志曰漢諸郡獻兔毫書鴻都門題唯趙國豪中用論衡曰兔舐雄豪而孕及其生子從口中出又博物志曰兔望月而孕兔吐子舊有此説余目所見也又曰儒者言月中兔夫月水也兔在水中無不死者夫兔月氣也又曰任娠者不食兔肉令兒口缺幽明録曰桓大司馬溫時有參軍夜坐忽見屋梁棟間有一伏兔張目切齒而向之甚可畏惡兔來轉近遂引刀而斫之正中於兔而實反傷其膝流血滂沱深怪此意命家中悉藏刀刃不以自近後忽復見如前意回或復索刀重斫因傷委頓幸刀不利故不至死再過而止傅玄歌辭曰兔搗藥月間安足道神烏戲雲間安足道楚辭天問曰夜光何德死則又育夜光月也育生也言月得於天死而復生也古豔歌曰焭焭白兔東走西顧衣不如新人不如故樂府歌詩曰採取神藥山之端白兔搗成蝦蟆丸奉上陛下一玉柈音盤
