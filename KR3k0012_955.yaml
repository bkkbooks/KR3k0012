body:
  text: 木部三柏書曰荊州厥貢杶幹栝柏詩曰邶柏舟言仁人而不遇也衛頃公之時仁人不遇小人在側泛彼柏舟亦泛其流柏木所以宜為舟也又曰鄘柏舟共薑自誓也衛世子共伯早死其妻守義父母欲奪而嫁之誓而不許故作是詩也泛彼柏舟在彼中河又曰徂來之松新甫之柏新甫山名周禮曰冀州其利松柏禮記曰禮之於人也如松柏之有心也已具松部五經通義曰諸侯冢樹柏爾雅曰柏掬也漢書曰武帝造柏梁殿與群臣宴其下又云作柏梁臺也漢書曰朱博為御史大夫府中列柏有野烏數千棲其上顏氏家訓曰朝夕鳥也文土往往誤作烏鳶用之漢書曰昭帝時長安諸陵柏樹枯倒者悉起生葉蟲食作字公孫病已立後昭帝崩昌邑王即位二十七日被廢迎立宣帝名巳後段為詞東觀漢記曰李詢遭父母喪六年躬自負土樹柏常住冢下謝承後漢書曰陳留虞延為郡督郵光武巡狩至外黃問延園陵柏樹株數延悉曉之由是見知也王隱晉書曰王褒字偉元痛父不以命終絶世不仕立屋墓側旦夕常至墓前朝拜輒悲號斷絶墓前一柏樹褒棠所攀援涕泣所著樹色與凡樹不侔蕭方等三十六國春秋曰王敦令郭璞筮卦曰明公起事禍必不久敦怒曰卿壽幾何曰命盡日中引出斬之璞曰當何之乎曰南山之首曰我知之矣必在雙柏之間乎時有鵲巢而甚茂宋書曰魯郡孔子舊廟有柏樹二十株經歷漢晉其大連抱士人崇敬之莫犯也江夏王義恭悉遣人取之父老皆歎息齊書曰王儉字仲寶司徒袁粲見之歎曰宰相之門也栝柏豫章雖小已有棟梁之器又曰江夏王鋒以明帝失權常忽忽不樂著修柏賦以見其志曰既殊群而抗立亦含貞而挺主豈春日之自芳亦霜下而為盛衝風不能摧其枝積雪不能改其性雖坎壈於當年庶後雕之可詠時鼎業潛移鋒獨慨然有興復之意又曰王晏之為員外郎也父普曜齋前柏樹忽成梧桐論者以為梧桐雖有棲鳳之美而失後雕之節梁書曰侯景既陷臺城都下王侯庶姓廟樹咸見殘毀唯文宣太后廟四周柏樹獨鬱茂及景篡南郊都官尚書呂季略説景令伐此樹以立三橋斫南面十餘株再宿悉枿生便長數尺時既冬月翠茂如春賊乃大驚惡之使悉斫殺識者以為昔僵柳起於上林乃表漢宣之應廟樹重青必彰陝西之瑞北齊書曰魏蘭根丁母憂居喪有孝稱將葬常山郡境先有董卓祠祠有柏樹蘭根以卓凶逆無道不應立祠至令乃伐柏以為槨材人或勸之不伐蘭根盡取之了無疑懼又曰樊衛性至孝喪父負土成墳植柏方數十畝朝夕號慕又曰文宣王曾晉陽夜宿松門嶺有數株松皆已千年枝葉踈茂似有神物所託文宣時已被酒向嶺瞋罵射中一株未幾枯死後周書曰武帝伐齊永昌公椿屯雞栖原齊王憲密謂椿曰兵者詭道去留不定見機而作不得遵常汝今為營不須張幕可伐柏為菴示有形勢令兵去之後賊猶致疑也齊主分軍萬人向千里徑會被勑追還率兵夜返齊人果謂柏菴為帳幕不疑軍退翌日始悟隋書曰蔡景王整文帝弟也周明帝時以武元軍功賜爵從武帝平齊力戰而死文帝初居武元之憂率諸弟負土為墳人植一柏四根鬱茂西北一根整栽者獨黃後因大風雨并根失之果不終吉唐書曰長壽二年冬十月萬象神宮側有柳松樹皆變為柏又曰狄仁傑補大理丞時將軍權善才坐斫昭陵柏樹仁傑奏其罪免職高宗怒令誅之仁傑進曰古人假使盜長陵一杯土陛下何以加之今陛下以昭陵一株柏殺一將軍千載之後謂陛下為苛主臣不可奉制帝意稍解孫卿子曰柏經冬而不凋蒙霜而不變可謂得其真矣國語曰高山峻原不生草木松柏之地其草不肥山海經曰三株樹生赤水上其為樹如柏葉實皆為珠又曰白於之山其上多松柏穆天子傳曰甲申天子升于大北之隥此太行山而降休于兩柏之下有兩樹也東方朔傳曰孝武皇帝時間居無事燕坐未央前殿天新雨止朔執戟在殿階獨語上呼問之答曰殿後柏樹上有鵲立枯枝上向東鳴上遣視如朔言上問何以知之朔曰以人事言之風從東方來鵲尾長傍風則蹶必當順風而立是以知東向鳴也何以知立枯枝上朔曰新雨止生枝滑枯枝澀是以知立枯枝上大笑風俗通曰墓上樹柏路頭石虎周禮方相氏入墟驅魍像魍像好食亡者肝腦人家不能常令方相立於墓側以禁禦之而魍像畏虎與柏列士傳曰延陵季子解寶劍帶徐君墓柏樹洞冥記曰磅山之北有穴穴上有柏昔李少翁於閬陰移來此穴種此柏已見扶桑三枯海水涸竭帝覺遣人往穴掘不見其棺唯見赤燕飛翻入雲移柏植於通靈臺水經曰陘山有鄭祭仲冢祭仲廟舊有一枯柏樹其塵根故株之上多生稚柏列秀青青望之可喜從征記曰泰山廟中柏皆三十餘圍俠兩階赤眉常斫一樹見血而止今斧創猶在地理志曰華山生文柏范子計然曰柏枝脂出輔上升價七十中三十下十漢官儀曰正旦飲柏葉酒上壽漢武故事曰柏梁臺高二十丈悉以柏香聞數十里列仙傳曰赤須子好食柏實齒落更生仙經曰服柏子人長年三輔黃圖曰漢文帝霸陵不起山陵稠種柏樹三輔舊事曰漢諸陵皆屬大常又有盜柏者棄市太山記曰山南有太山廟種柏樹千株大者十五六圍長老傳云漢武所植三齊記曰堯山祠旁有柏樹枯而復生不知幾世陳留耆舊傳曰李充喪父父冢側有夜盜斫柏樹者充手刃之述征記曰柏谷谷名也漢武帝微行所至處長慠賓於柏谷者也谷中無回車地狹以高原林柏蔭藹窮日殆弗覩陽景也晉官闕名曰華林園柏二株崔實四民月令曰七月收柏實列異記曰陳倉人有得異物者其形不類豬亦不似羊衆莫能名二童子曰此為媼常在地下食死人腦若欲殺之使柏葉插其頭幽明録曰王丞相見郭景純請為一卦卦成郭意甚惡云有震厄公能命駕西出數里得一柏樹截如公長置常寢處災可消也王從之數日果震柏木粉碎任昉述異記曰盧氏縣有盧君古冢冢傍古柏二枝條蔭二百餘步樹文隱起皆龜甲堅如鐵石嵇康飬生論曰麝食柏而香楚詞曰山中人兮芳杜若飲石泉兮飯松柏古歌曰平陵東松柏桐不知何人卻義公劉越石扶風歌曰南山石嵬嵬松柏何摧摧上枝拂青雲中心十數圍洛陽發中梁松柏竊自悲誰能刻鏤此公輸與魯班被之用丹漆薰用蘇合香本自南山柏今為宮殿梁槐周禮曰朝士掌三槐三公位焉鄭玄曰槐之言懷言來人也又曰司烜氏掌冬取槐檀之火左傳曰趙宣子驟諫公患之使鉏麑賊之晨往寢門闢矣盛服將朝尚早坐而假寐不解衣冠而睡麑退歎曰不忘恭敬民之主也賊民之主不忠棄君之命不信有一於此不如死也觸槐而卒春秋元命苞曰樹槐聽訟其下槐之言歸也情見歸實也春秋説曰槐木者靈星之精爾雅曰懷槐大葉而黑槐樹葉大色黑者名為槐守官槐葉晝聶霄炕郭璞曰守宮槐晝日聶合而夜慷布晉儒林祭酒杜行齊説在朗陵縣南有一樹似槐葉晝藂合相著夜則舒布即守宮江東有樹與此相反俗因合昏曉晝夜異其理等霄炕音慷聶合也炕張也合晝夜開也五經通義曰士冢樹槐國語曰董叔將娶於范氏叔向曰盍已乎曰欲為繫援焉他日董祁訴之范獻子曰不吾敬也獻子執而紡之於庭槐叔向過之曰子盍為我請乎叔向曰欲而得之又何請焉紡懸也漢書曰昭帝建始四年山陽社中大槐樹吏人伐斷之其夜復自立如故晉書曰符堅僣號自長安至于諸州夾路皆種槐柳百姓歌曰長安大街夾路楊槐下走朱輪上有棲鸞又曰大司馬府有老槐樹殷仲文對而歎曰此樹婆娑生意盡矣崔鴻前涼録曰初河右不生楸槐柏漆張駿之世取於泰隴而植之終於皆死而酒泉宮之北隅有槐樹生焉李玄盛著槐樹賦沈約宋書曰孔子夜夢三槐之間豐沛之邦有赤氣驅車對楚西北街之見芻兒敵麟傷其左足薪而覆之梁書曰庾肩吾常服槐實年七十餘目看細字鬢皆黑離亂之際奔于江陵後周書曰韋孝寬之為雍州刺史先是路側一里置一土堠經雨頽毀每須修之自孝寬臨州乃勒部內當堠處植槐樹代之即免修復行旅又得芘蔭文帝後見怪問知之曰豈得一州獨爾當令天下同之於是令諸州道路一里種樹一株十里種三樹百里五樹焉隋書曰高頴字昭玄領新都大監每坐槐樹下以聽事多不依行列有司伐之特令存之勿去示於後人又曰士回以孝聞開皇初卒子士雄少質直孝友喪父復廬於側負土成墳其庭前有一槐樹先甚鬱茂及士雄居喪樹遂枯死服闕還宅死槐復榮高祖聞之歎其父子至孝下詔褒揚號其所居為纍德里唐書曰永崇二年太平公主降駙馬薛紹以萬年縣為禮會之所公主輅車自興安門南至宣陽坊之西街夜設燎炬烈熖相屬夾路槐樹多有死者又曰正元中度支欲取兩京道中槐樹為薪更栽小樹先下符牒渭南縣縣尉張造牒曰召伯所憩尚勿剪除先皇舊遊豈宜斬伐乃止又曰長慶中虢州刺史蕭祐奏湖城縣永方鄉百姓閻酆五代同居家內槐一本再生枝葉管子曰五沃之土其木宜槐晏子春秋曰齊景公有所愛槐使守令犯槐者刑傷槐者死有醉而傷槐且加刑焉其女懼而告晏子曰妾恐鄰國聞之謂君愛槐而殘人可乎晏子入言之公出傷槐之囚罷其禁淮南子曰槐之生也入季春五日而兔目十日而鼠耳更旬而始規二旬葉成規葉始開也又曰九月官候其樹槐是月繕修守備故官候樹槐槐懷也取懷近遠也又曰老槐生火又曰槐市學也樹以青槐燧人秋取槐檀之火天之所覆地之所載六合所包陰陽所照雨露所扶此皆生於父母所闕於一和也父天母地故槐榆與橘柚合而兄弟有廣與三危通為一家抱朴子曰槐子新瓷合泥封之二十餘日其表皮皆爛乃洗之如大豆日服之此物至補腦早服之令人髮不白而長生太公金匱曰武王問太公曰天下神來甚衆恐有識者何以待之太公曰請樹槐於王門內有益者入無益者距之三輔黃圖曰元始四年起明堂辟雍為博士舍三十區為會市但列槐樹數百行諸生朔望會此市各持其郡所出物及經書相與賣買雍雍揖讓論議槐下侃侃誾誾如也事具禮部學校篇焦贛易林家人之乾曰千歲槐身多斧斤汝南先賢傳曰新蔡鄭敬字子都為郡功曹都尉高懿廳事前有槐樹有露類甘露者懿問掾屬皆言是甘露敬獨曰明府政未能致甘露但樹汁耳懿不悅託疾而去楊衒之洛陽伽藍記曰李昌年廣陵王元淵初除儀同三司總衆北討葛榮夜夢著袞衣倚槐樹立以為吉徵問於楊元慎元慎曰三公之祥淵甚悅之元慎退還告人曰廣陵死矣槐字木傍鬼死後當得三公廣陵果為葛榮所殺追贈司徒公終如其言
