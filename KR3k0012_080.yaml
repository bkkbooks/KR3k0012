body:
  text: 皇王部四黃帝軒轅氏史記曰黃帝者少典之子姓公孫名軒轅諸侯有不順者從而征之未嘗寧居東至于海登丸山及岱宗西至崆洞登雞頭山南至江登熊湘北極葷粥合符釜山而邑于涿鹿之阿遷徙無常處以師兵為營衛官名皆以雲置左右大監監于萬國獲寶鼎舉風后力牧常先大鴻以治民有土德之瑞故號曰黃帝有二十五子其得姓者十四人黃帝居軒轅之丘而娶於西陵氏之女是為嫘音縲祖為正妃生二子其後皆有天下其一曰玄囂是為青陽降居江水其二曰昌意降居弱水昌意娶蜀山氏女曰昌僕生高陽高陽有聖德焉黃帝崩葬橋山其孫昌意之子高陽立是為帝顓頊又封禪書曰黃帝採首山銅鑄鼎於荊山下鼎既成有龍垂胡髯下迎黃帝黃帝上騎龍群臣後宮從上者七十餘人餘小臣不得上乃悉持龍髯龍髯拔墮墮帝之弓百姓仰望帝既上乃抱其弓與龍髯而號故後世因名其處曰鼎湖其弓曰烏號又曰漢武帝北遂巡狩還祭黃帝冢上曰吾聞黃帝不死今有冢何也或對曰黃帝已仙上天群臣葬其衣冠耳帝王世紀曰黃帝有熊氏少典之子姬姓也母曰附寶其先即炎帝母家有蟜氏之女世與少典氏婚故國語兼稱焉及神農氏之末少典氏又取附寶見大電光繞北斗樞星照郊野感附寶孕二十五月生黃帝於壽丘長于姬水龍顏有聖德受國於有熊居軒轅之丘故因以為名又以為號與神農氏戰于阪孤泉之野三戰而克之力牧常先大鴻神農皇直封巨人鎮大山稽鬼臾區封胡孔甲等或以為師或以為將分掌四方各如己視故號曰黃帝四目又使歧伯嘗味百草典醫療疾今經方本草之書咸出焉其史倉頡又取像鳥迹始作文字史官之作蓋自此始記其言行策而藏之名曰書契黃帝一號帝鴻氏或曰歸藏氏或曰帝軒吹律定姓有四妃生二十五子在位百年而崩年百一十歲又曰神農氏衰黃帝修德化民諸侯歸之黃帝於是乃擾馴猛獸與神農氏戰于阪泉之野三戰而克之又徵諸侯使力牧神皇直討蚩尤氏擒之于涿鹿之野使應龍殺之于凶黎之丘凡五十五戰而天下大服或傳以至仙或言壽三百歲葬于上郡陽周之喬山鬻子曰黃帝年十歲知神農之非而改其政春秋內事曰軒轅氏以土德王天下始有堂室高棟深字以避風雨孝經鉤命決曰附寶出降大靈生帝軒附寶帝軒母也電黃精軒轅氣也軒黃帝名附或作付也古史考曰有熊氏巳姓或曰姓公孫山海經曰有人衣青名曰黃帝女妖青魅旱魃也蚩尤作兵伐黃帝黃帝乃令應龍攻之冀州之野冀州中土應龍蓄水蚩尤請風伯雨師從大風雨黃帝乃下天女曰妖雨止遂殺蚩尤歸藏曰昔黃神與炎神爭鬥涿鹿之野將戰筮於巫咸巫咸曰果哉而有咎易下繫曰黃帝垂衣裳而天下治蓋取諸乾坤河圖握拒曰黃帝名軒北斗黃神之精母地祇之女附寶之郊野大電繞斗樞星耀感附寶生軒胸文曰黃帝子河圖挺佐輔曰黃帝修德立義天下大治乃召天老而問焉余夢見兩龍挺日圖即帝以授余於河之都覺昧素喜不知其理敢問於子天老曰河出龍圖雒出龜書紀帝録州聖人所紀姓號興謀治平然后鳳皇處之今鳳皇以下三百六十日矣合之圖紀天其授帝圖乎黃帝乃祓齋七日衣黃衣黃冠黃冕駕黃龍之乘戴蛟龍之旗天老五聖皆從以遊河洛之間求所夢見者之處弗得至於翠媯之淵大盧魚泝流而至乃問天老曰子見天中河流者乎曰見之顧問五聖皆曰莫見乃辭左右獨與天老跪而迎之五色畢具天老以授黃帝帝舒視之名曰録圖龍魚河圖曰黃龍附圖鱗甲成字從河中出付黃帝令侍臣自寫以示天下又曰黃帝攝政前有蚩尤兄弟八十一人並獸身人語銅頭鐵額食沙石子造立兵杖刀戟大弩威振天下誅殺無道不仁不慈萬民欲令黃帝行天子事黃帝仁義不能禁止蚩尤遂不敵乃仰天而歎天遣玄女下授黃帝兵信神符制伏蚩尤以制八方蚩尤沒後天下復擾亂不寧黃帝遂畫蚩尤形象以威天下天下咸謂蚩尤不死八方万邦皆為殄伏尚書中候曰帝軒提像配永循機軒軒轅黃帝名永長也循順也黃帝軒轅觀攝提之像配而行之以長為順升機為政天地休通五行期化休美也天地美氣相通行應四時之期而變化河龍圖出龍御圖而出也洛龜書威龜負書而出威則也赤文像字以授軒轅韓詩外傳曰黃帝召天老而問曰鳳像何如天老夫鳳像鴻前而麟後蛇頸而魚尾龍文而雞身燕頷而雞身黃帝乃齋于中宮鳳蔽日而至黃帝降于東階西面再拜稽首皇天降祉敢不承命鳳乃止帝東園詩含神霧曰大電繞樞照郊野感附寶生黃帝大戴禮曰宰我問於孔子曰昔者子問諸榮君黃帝三百年請問黃帝者人也抑非人耶何以至於三百年孔子曰黃帝少典之子也曰軒轅生而神靈弱而能言教熊羆貔貅豹虎以與赤帝大戰于阪泉之野三戰然後得行其志黃帝斧拂衣大帶斧裳乘龍駕雲勞勤心力耳目節用水火財物生而民得其利百年死而民得其神百年亡而民用其教百年故曰三百年傳曰黃帝以雲紀故為雲師而雲名春秋元命苞曰黃帝龍顏得天庭陽上法中宿取象文昌戴天履陰秉數制剛顏有龍像以軒轅也庭陽太微庭也戴天天文在首履陰陰字在足下也制剛紀也紀正四輔也管子曰黃帝得蚩尤而明乎天道得太常而察乎地利得蒼龍而辨乎東方得祝融而辨乎南方得大卦而辨乎西方得后土而辨乎北方黃帝得六相天下治又曰黃帝鑽燧生火以熟葷臊民食之無腸胃之病列子曰黃帝即位十有五年竭聰明進智力營百姓燋然肌色皯古厚切黣音妹昏然五情爽惑用聰明未足以致治祗足以亂神也黃帝乃喟然歎曰朕之過淫矣淫當作深養一己其患如此治萬物其患如此唯任而不養縱而不治則性命自反天下自安於是放萬機舍宮寢去直侍撤鐘懸減廚膳退而間居大庭之館齋心服形心無欲則形自服矣三月不親政事書寢而夢將明至理不可以清袁故寄之於夢聖人無夢也遊於華胥氏國華胥氏國在弇州之西台州之北不必便有此國也明至理必知此耳淮南子云正西曰弇州西北曰合州不知斯齊國幾千萬里斯離也齊中也蓋非舟車足力之所及神遊而已舟車足力形之員者耳神道恍惚不行而至也其國無師長其民無嗜欲不知樂生不知惡死故無夭傷不知親己不知踈物故無憎愛不知背逆不知向順故無利害理無生死故無所樂惡理無愛憎故無所親踈理無逆順故無所利害也都無所愛憎都無所畏忌入水不溺入火不熱斫撻無傷痛至和者無物能傷溺熱痛癢實由矜懼也乘空如履實寢虛若處床雲霧不閡其視雷霆不亂其聽美惡不汨其心山谷不躓其步神行而已黃帝既悟然自得又二十有八年天下大治幾若華胥氏之國而帝登假假當為遐莊子曰北門成問於黃帝張咸池之樂於洞庭之野吾所聞之而懼復聞之而惑帝曰吾奏之以人徵之以天行之以義禮建之以太清以人奏之以天徵之天人合德爾乃知以春為禮以狄為義太清乃建又曰黃帝將見大隗于具茨之山方明為御昌寓驂乘張若隰明前馬昆閽滑稽後車至於襄城之野七聖皆迷無所問途適遇牧馬童子問途焉曰若知具茨之山乎曰然黃帝曰異哉小童非徒知具茨之山又知大隗之所存乎曰然黃帝曰吾子之事雖然請問為天下小童辭黃帝又問小童曰天下者亦奚以異乎收馬者哉亦去其害馬者而已矣馬以過分為害黃帝再拜稽首稱天師而退又曰黃帝聞廣成子在於崆洞之上故往見之曰敢問至道之精廣成子曰自而治天下雲氣不待族而雨草木不待黃而落日月之光益以荒矣又奚足以語至道黃帝退捐天下築特室席白茅間居三月復往邀之廣成子南首而臥黃帝從下風膝行而進再拜稽首而問曰聞吾子達於至道敢問治身奈何而可而以長久廣成子蹶然而起曰善哉問乎來吾語汝至道之精窈冥冥至道之極昏默默無視無聽抱神以靜形將自正我修身千二百歲矣吾形未嘗衰黃帝再拜稽首曰廣成子之謂天矣尸子曰子貢曰古者黃帝四面信乎孔子曰黃帝取合己者四人使治四方不計而耦不約而成此之謂四面韓子曰師曠謂晉平公曰黃帝合鬼神於西太山之上駕象車六交龍畢方並館蚩尤居前風伯進掃雨師灑道乃作為清角之樂淮南子曰黃帝治天下而力牧太山稽輔之力牧太山稽輔則黃帝之師也孟子曰王者師臣也以理日月星辰之治陰陽之氣節四時之度正律曆之數明上下等貴賤使強不得暴寡人民保命不夭安能性命不夭遊也歲時熟而不凶不凶無災害也百官正而無私皆在公也上下調而無尤君調臣和無尢過也法令明而不暗輔佐公而不阿卿土公正不阿意曲從田者不侵畔漁者不爭隈隈曲深處無所聚也道不拾遺市不豫價城郭不關關閉邑無盜賊商旅之人相讓以財狗彘吐菽粟於道路而無忿爭之心於是日月精明星辰不失其道風雨時節五穀登熟虎豹不妄噬鷙鳥不妄摶鳳凰翔於庭麒麟擾於郊青龍進駕飛黃伏皂飛黃出西方狀如狐頂上有角乘之壽千歲皂櫪也諸北儋耳之國莫不獻其貢職皆北極之夷國論衡曰諡法靜民則法曰黃帝者安民之諡非得道之稱也蔣子萬機論曰黃帝之初養性愛民不好戰伐而四帝各以方色稱號交共謀之邊城日驚介胄不釋黃帝歎曰夫君危于上民安于下主失於國其臣再嫁厥病之由非養寇耶今處民萌之上而四盜亢衡震于師於是遂即營疊以滅四帝向令黃帝若不龍驤虎變而與俗同道則其民臣亦害于四帝矣抱朴子曰黃帝生而能言役使百靈可謂天授自然之體者猶復不敢端坐而得道故陟王屋而受丹經到鼎湖而飛流珠登崆洞而問廣成上具茨而事大隗適東岱而奉中黃入金谷而咨老子論道養則質玄素二女精推步則訪山稽力牧講占候則詢風著體診則受雷歧審攻戰則納五音之策窮神姦則記曰澤之亂相地理則書青烏之説救傷殘則綴金冶之術故能畢記祕要窮盡道真又曰昔黃帝東到青丘過風山見紫府先生受三皇內文以劾召萬神南到負隴蔭建水觀百靈之所登採若戟之華飲丹巒之水西見中黃子受九品之方過崆洞從廣成子受自然之經北到洪隄上具茨見大隗君黃蓋童子授神芝圖還陟王君居得神丹注説到峨嵋山見皇人於玉堂又曰汲郡冢中竹書言黃帝既仙去其臣有左徹者削木為黃帝之像帥諸侯朝奉之故司空張茂先撰博物志亦云黃帝仙去其臣思戀罔極或刻木立像而朝之或取其衣冠而葬之或立廟而四時祠之孫綽子曰黃帝之遊天衢奏鈞天之鼓建日月旗乘雕雲之輿駕八翼之龍彭祖前驅松喬挾轂先景流而不返長風逐而不及發軔紫宮不崇朝而匝六合也符子曰黃帝將適昆虞之丘中路逢容成子乘翠華之蓋建日月之旗驂紫虬御雙鳥黃帝命方明避路謂容成子曰吾將釣于一鑿栖于一丘又曰黃帝謂其友無為子曰我勞天下矣疲於形役請息駕於玄圃子且代之焉能棄我之逸而為君之勞哉乃攀龍而俱去晉牽牽秀黃帝頌曰邈矣軒轅應天載靈通幽遠覽觀象設形誕敷厥訓彝倫攸經德從風流化與雲征皇猷允塞地平天成爰登方嶽封禪勒成紛然鳳舉龍騰太清違落九土陟彼高冥民斯攸慕涕泗沽纓遐而不墜式頌德聲帝王世紀曰有巢氏已降至黃帝為三皇號中古少昊金天氏帝王世紀曰少昊帝名摯字青陽姬姓也母曰女節黃帝時有大星如虹下流華渚女節夢接意感生少昊是為玄囂降居江水有聖德邑于窮桑以登帝位都曲阜故或謂之窮桑帝以金承土帝圖讖識所謂白帝朱宣者也故稱少昊號金天氏在位百年而崩河圖曰大星如虹下流華渚女節氣感生白帝朱宣宋均生云朱宣少昊氏也古史考曰窮桑氏嬴姓也以金德王故號金天氏或曰宗師太昊之道故曰少昊遁甲開山圖曰帝少昊死死葬雲陽山傳曰魯昭公十七年郯子來朝昭子問焉曰少皞氏鳥名官何也郯子曰吾祖也我高祖少皞摯之立也鳳鳥適至故紀於鳥為鳥師而鳥名鳳鳥氏歷正也玄鳥氏司分者也伯趙氏司至者也青鳥氏司啓者也丹鳥氏司閉者也祝鳩氏司徒也瞗鳩氏司馬也鳲鳩氏司空也爽鳩氏司寇也鶻鳩氏司事也五鳩鳩民者也五雉為五工正利器用正度量夷民者也九扈為九農正扈民無淫者也魏曹植少昊贊曰祖自軒轅青陽之裔金德承土儀鳳帝世官鳥號名官殊職別系農正扈民各有品制顓頊高陽氏史記曰顓頊靜淵以有謀疏通而知事養材以任地載時以像天依鬼神以制義治氣以教化潔誠以祭祀帝生子曰窮禪顓頊崩而玄囂器之孫高辛立是為帝嚳與嚳同古史考曰高陽氏妘姓以水德王帝王世紀曰帝顓頊高陽氏黃帝之孫昌意之子姬姓也母曰景僕蜀山氏女為昌意正妃謂之女樞金天氏之末女樞生顓頊於若水首戴干戈有聖德父昌意雖黃帝之嫡以劣降居若水為諸侯顓頊生十年而佐少昊十二年而冠二十而登帝位平九黎之亂怪火事紀官命南正重司天以屬神北正黎司地以屬民於是神民不雜萬物有序始都窮桑後徙啇丘命飛龍效八風之音作樂作五音以祭上帝納勝墳氏女娽音祿生老童有才子八人號八凱顓頊在位七十八年年九十一歲歲在鶉火而崩葬東郡頓丘廣陽里河圖曰瑤光之星如霓貫月正白感女樞幽房之宮生黑帝顓頊大戴禮曰宰我曰請問帝顓頊孔子曰顓頊黃帝之孫昌意之子乘龍而至四海北至幽陵南至交址西濟於流沙東至於蟠木動靜之物大小之神日月所照莫不砥礪春秋元命苞曰顓頊併幹上法月參集威成紀以理陰陽併猶重也水精主月參伐主斬刈成功兼此月職重助費以為表也山海經曰黃帝妻嫘祖生昌意降處若水生幹流取倬子曰河女生帝顓頊又曰顓頊死即復蘇淮南子曰顓頊之法婦人不避男子於路者祅之於四達之衢祅音弗除其不祥魏曹植帝顓頊贊曰昌意之子祖自軒轅始誅九黎水德統天以國為號風化神宣威暢八極靡不祗虔
