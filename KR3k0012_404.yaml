body:
  text: 人事部四十四道德禮記中庸曰天命之謂性率性之謂道修道之謂教道也者不可須臾離也可離非道也又曰大哉聖人之道洋洋乎發育萬物峻極于天育生也峻高大也優優大哉禮儀三百威儀三千待其人然後行故曰茍不至德至道不凝焉又曰天下之達道五所以行之者三曰君臣也父子也夫婦也昆弟也朋友之交也五者天下之達道也知仁勇三者天下之達德也又曰君子之道四丘未能一焉所求乎子以事父未能也所求乎臣以事君未能也所求乎弟以事兄未能也所求乎朋友先施之未能也庸德之行庸言之謹有所不足不敢不勉又曰君子之道造端乎夫婦及其至也察乎天地子曰道不遠人人之為道而遠人不可以為道又學記曰玉不琢不成器人不學不知道又曰大道不器謂聖人之道不如器施於一物也又樂記曰君子樂得其道小人樂得其欲以道制欲則樂而不亂以欲忘道則惑而不樂道謂仁義也欲謂邪淫也尚書大禹謨曰罔違道以干百姓之譽失道求名古人賤之又洪範曰無有作好遵王之道言無有亂為私好惡動必循先王之道又旅獒曰志以道寧言以道接在心為志發氣為言皆以道為本故君子勤道周易繫辭曰知周乎萬物而道濟天下又曰一陰一陽之謂道論語學而曰敏於事而慎於言就有道而正焉有道謂有道德者正謂問事是非也又公冶長曰子謂子産有君子之道四焉其行己也恭其事上也敬其養民也惠其使民也義又曰子曰天下有道則見無道則隱邦有道貧且賤焉恥也邦無道富且貴焉恥也又衛靈公曰子曰人能弘道非道弘人又曰君子謀道不謀食又曰天下有道則禮樂征伐自天子出又曰君子學以致其道又曰子貢曰文武之道未墜於地在人賢者識其大者不賢者識其小者莫不有文武之道焉又顏淵曰季康子問於孔子曰如殺無道以就有道何如孔子對曰子為政焉用殺子欲善而民善矣君子之德風小人之德草草上之風必偃欲使季康子先自正也偃仆也草加之以風無不仆者猶民之化下大戴禮曰篤仁而好學多聞而順道天子疑則問應而不窮者謂之道道者導天下之道老子曰道可道非常道王弼曰可道指事造形非其常道可道莊子曰魚相造乎水人相造乎道子思子曰天下有道則行有枝葉天下無道則言有枝葉又曰祝牧謂其妻曰天下有道我韍子珮天下無道我負子戴又曰原憲處魯居環堵之室上漏下濕匡坐而絃歌匡正也子貢乘大馬中紺而表素軒車不容巷往見原憲原憲正冠蹤履杖藜應門子貢曰嘻先生何病也原憲應之曰憲聞無財之謂貧學道而不能行之之謂病今憲貧也非病也子貢逡巡而有愧色文子曰夫道德者匡邪以為正治辭以為定上下之儀也上有道德即下有仁義積道者天與之地助之鬼輔之鬻子曰發政施令為天下福謂之道公孫尼子曰道為智者設賢為聖者用淮南子曰聖人之道若中衢樽過者斟酌雖多少不同而各得其宜也楊子法言曰仲尼之道猶四瀆經營中國終入大海又曰君子之道有四簡而易用也要而易守也炳而易見也法而易言也又曰聖人重其道而輕其祿衆人重其祿而輕其道鹽鐵論曰以道德為城文王是也以道德為胄湯武是也桓談新論曰三皇以道治五帝以德化王道純粹其德如彼霸道駮雜其功如此王逸正部曰仲尼門人餔道醇飲道宗昌言曰道德仁義天性也織之以成其物練之以致其情瑩之以發其光任子曰道德之懷民猶春陽之柔物也履深冰而不寒結木條而不折杜氏幽求子曰蓋道清淡以無為為家恬虛寂靜弘廣多包豈非聖人所宅乎又曰有道之國其鬼不神崔元始正論曰國不信道工不信度亡可待也傅子曰君子審其宗而後學明其道而後行中論曰道之於人甚簡且易不如採金攻玉涉艱難也符子曰為道者日損而月章為名者日章而月損釋名曰德得也得事宜也周禮地官下師氏曰一曰至德二曰敏德三曰孝德至德中和之德敏德仁義順時孝德尊祖愛親禮記學記曰禮樂皆得謂之有德德者得也又祭義曰天子有善讓德於天又中庸曰雖有其位茍無其德不敢作禮樂焉雖有其德茍無其位亦不敢作禮樂焉又曰小德川流大德敦化此天地之所以為大也又表記曰以德報德則民有所勸又大學曰富潤屋德潤身左傳桓公曰臧哀伯諫曰君人者將昭德塞違以臨照百官猶懼或失之故昭令德以示子孫又僖公中曰庸勳親親昵近尊賢德之大者也又曰德以柔中國刑以威四夷又曰太上以德撫民又文公上曰孝敬忠信為吉德盜賊姦藏為凶德又宣公上曰楚子觀兵于周疆定王使王孫滿勞楚子楚子問鼎之大小輕重焉對曰在德不在鼎又成公上曰四王之王也禹湯文武樹德而濟同欲焉又襄公四曰太上有立德其次有立功又昭公三曰盛德必百世毛詩蕩蒸民曰德輶如毛民鮮克舉之尚書舜典曰玄德升聞乃命以位玄謂幽潛潛行道德升聞天朝遂見徵用又大禹謨曰皋陶邁種德德乃降黎民懷之邁行種布也皋陶布行其德下治於民民歸服之又曰惟德動天無遠不屆又伊訓曰德日新萬邦惟懷志自滿九族乃離又曰爾惟德罔小萬邦惟慶爾惟不德罔大墜厥宗又太甲曰德惟治否德亂為政以德則治不以德則亂又咸有一德曰非天私我有商惟天佑于一德非商求于下民惟民歸于一德德惟一動罔不吉德二三動罔不凶又秦誓曰同力度德同德度義力鈞則有德者勝德鈞則秉義者強又曰受有億兆夷人離心離德豫有亂臣十人同心同德又曰樹德務滋除惡務本立德務滋長去惡務除本又洪範五福四曰攸好德所好者德福之道又旅獒曰玩人喪德玩物喪志以人為戲弄則喪其德又蔡仲之命曰皇天無親惟德是輔又周官曰作德心逸曰休作偽心勞日拙為德直道而行於心逸豫而名日美又君陳曰黍稷非馨明德惟馨周易坤卦象曰地勢坤君子以厚德載物又繫辭曰富有之謂大業日新之謂盛德論語為政曰為政以德譬如北辰居其所而衆星拱之德者無為猶北辰之不移而衆星拱之又里仁子曰德不孤必有鄰又先進曰德行顏回閔子騫冉伯牛仲弓又憲問恥曰有德者必有言有言者不必有德又曰驥不稱其力稱其德也驥古之善馬也德謂在五御之威儀又季氏曰遠人不服則修文德以來之尚書大傳曰有德者尊其位而重其祿史記曰一年種之以榖十年樹之以木百年來之以德東觀漢記曰張湛字子孝右扶風人以篤行純淑鄉里歸德雖居幽室暗處自整頓三輔以為儀表又曰淳于恭字孟孫北海淳于人以謙儉推讓為節人有刈恭禾見之念其愧因伏草中至去乃起恭家井在門外上有盆鄰里牧牛兒爭飲牛恭惡其爭多置器其上為預汲水滿之小兒復爭恭各語其家父母父母乃禁怒之里落皆化而不爭三輔決録曰馮豹字德文母為父所出後母遇之甚酷豹事之愈謹時人為之語曰道德彬彬馬德文王隱晉書曰庚袞字叔褒穎川人少遭大疫二兄亡次兄毗又疫其癘氣方熾袞父母諸弟皆出避家袞獨不出諸父強之不可曰袞性不畏病納漿粥扶持不捨晝夜省柩哀臨十有餘旬病暨歇家乃反而袞亦無患害宗黨歎曰異哉此子能守人之所不能守能行人之所不能行晉中興書曰衛玠字叔寶常以人有不及可以情恕非意相干可以理遣故終身不見其喜慍齊書曰張緒字思曼為吏部尚書每朝見太祖目送之謂王儉曰緒以位尊我我以德貴緒又曰王秀之字伯奮為南郡內史州西曹荀丕欲交秀之拒而不納報丕書曰僕以德為寶足下以位為寶各寶其寶於此敬宜也老子曰上德不德是以有德下德不失德是以無德上德之人唯道用其德故能有德下德而德之必有失焉文子曰山高者其木修地廣者其德厚又曰閉九竅滅志意棄聰明反無識含陽吐陰而與萬物同德也莊子曰至德之世不尚賢不使能韓子曰善為吏者樹德不能為吏者樹怨孟子曰周于利者凶年不能殺周于德者邪世不能亂鶡冠子曰德及萬人者謂之豪德過百人者謂之英孔叢子曰晏子長不過六尺齊國莫不宗焉趙文子身如不勝衣相晉國以寧諸侯敬服其德故也楊子法言曰耕道而得道獵德而得德傅子曰上德之人其濟萬物也猶天之有春秋時至自生非德之力太公金匱曰德行則福德廢則覆易參同契曰道成德就潛伏俟時海內先賢行狀曰王烈字伯善時有盜牛者主得之盜者曰我邂逅迷惑從今將改子既赦宥幸無使王烈聞之又曰戴良字叔鸞高才磊硌英聲遠播少者懷之長者慕之鄉里搢紳下至黎庶莫有忿爭之家又曰徐孺子徵聘未嘗出門赴喪不遠萬里常事江夏黃公薨往會其葬家貧無以自供齎磨鏡具自隨每至所在賃磨取資然後得前既至設祭哭畢而返陳仲舉為豫章太守召之則到饋之則受但不服事以成其節又曰仇覽字季智學通五經選為亭長民有孫元少孤與母居詣覽告元不孝覽謝遣之屬母歸勿言方為教之後覽齎禮詣元為陳孝子供養之意元遂感激卒為孝子時令河內王渙政尚清嚴聞覽得元不治心獨望之乃問覽在亭不治不孝得無失鷹鸇之志乎對曰竊以鷹鸇不如鳳皇故不為也渙感覽言用損威刑會稽典録曰鄭弘字巨為郡督郵上計史時計掾勾章任尚居素溫富乘鮮車駕肥馬弘恆在後尚輒罵弘無慍容弘尚在京師遊學還郡俱見府君府君所問弘無不對而尚不知出又問弘掾行道數相折辱何以不答弘謝曰過奉顯使無光國之美馬羸行遲恐失期賀以相催促自是其宜愚聞兩虎俱鬭大者必傷小者必死兩為無益故不敢答府君歎曰此謂長者太守所不能也汝南先賢傳曰黃憲字叔度不矜名以詭時不抗行以矯俗窺其門者莫敢踐其庭覩其流者不能測其深時人論曰顏淵復生乎襄陽耆舊記曰龐德公子奐字世文晉太康中為牂牁太守去官歸鄉里居荊南白沙鄉里人宗敬之相語曰我家池中龍種來里中化其德少壯皆代老者擔陳實別傳曰實字仲躬潁川人自為兒童不為戲弄等類所歸實在鄉閭平心率物其有諍訟輒求判正曉譬曲直返無怨者至乃歎曰寧為刑罰所加不為陳君所斷時歲荒民儉有盜夜入其室止於梁上實陰見之乃起自整拂呼命子孫正色訓之曰夫人不可不自勉不善之人未必本惡習與性成遂至於此如梁上君子矣盜大驚自投於地稽首歸罪實徐譬之曰視君狀貌不似惡人宜深剋己反善然此當由困貧令遺絹二匹自是縣無復盜竊荀氏家傳曰荀彧德行周備名重天下海內英俊咸嘉焉又曰鍾繇以為顏子既沒能備九德百行不二其過者唯荀彧乎或問繇曰君推荀君比之顏子自以不及其可得聞乎繇曰夫明君師臣其次友之以太祖之聰明每大事常先咨之荀彧是則古師友之義也吾等受命而行猶或不盡去固遠耶潘勗別傳曰勗寬賢容衆與天下人等休戚同有無不以家財為己有任嘏別傳曰嘏字照先樂安人幼以至性見稱遇荒亂家貧賣魚會官發魚魚貴數倍嘏取直如常會太祖創業召海內至德嘏應其舉為臨淄侯庶子陰德左傳宣公下曰魏顆敗秦師于輔氏獲杜回秦之力人也初武子有嬖妾無子武子疾命顆曰必嫁是疾病則曰必為殉及卒顆嫁之曰病疾則亂吾從其治也及輔氏之役顆見老人結草以亢杜回亢禦也杜回躓而顛故獲之夜夢之曰余而所嫁婦人之父也爾用先人之治命余是以報漢書曰于定國父于公為縣獄吏郡決曹獄平羅文法者于公所決皆不恨其閭門壞父老方共治之于公謂曰少高大閭門令容駟馬高蓋車我治獄多陰德未曾有所冤子孫必有興者至定國為丞相又曰邴吉字少卿魯國人為丞相寬大好禮初吉有陰德於孝宣帝微時帝即位衆莫知之吉亦不言吉從大將軍長史遷至御史大夫帝聞將封之會吉病甚將使人加綬而封之及其生也太子太傅夏侯勝曰此未死也臣聞有陰德者必饗其樂以及子孫今未獲其樂而病非其死病也後果愈乃封博陽侯終饗其祿後漢書曰何敞六代祖比干學尚書於朝錯注云比干字少卿經明行修兼通法律為汝陰縣獄吏決曹掾平活數千人後為丹陽都尉征和三年三月辛亥天大陰雨比干在家日中夢貴客車騎滿門覺以語妻語未已而門有老嫗年可八十餘頭白求寄避雨雨甚而衣履不霑雨漬止送至門乃謂比干曰公有陰德今天賜公策以廣公之子孫因出懷中符策狀如簡長九寸凡九百九十杖以授比干曰子孫佩印綬者如此算又曰和熹鄧后叔父陔言常聞活千人者子孫有封兄訓為謁者使修石臼河歲活數千人大道可信家必蒙福初太傅禹歎曰吾將百萬之衆未嘗妄殺一人其後代必有興者又曰永平中楚王英謀為逆事下郡覆考明年三府舉袁安能理劇拜楚郡太守是時英辭所連及繫者數千人顯宗怒吏桉之急迫痛自誣死者甚衆安到郡不入府先往按獄理其無明驗者條上出之府丞掾吏皆叩頭爭以為阿附反虜去與同罪不可安曰如有不合太守自當坐之不以相及也遂分別具奏帝感悟即報許得出者四百餘人又曰虞詡字升卿祖經為縣獄吏決獄平嘗曰東海于公高其里門而其子定國卒至丞相吾決獄六十年矣雖不及于公其庶幾乎吾子孫何必不為九卿耶故字詡曰升卿謝承後漢書曰陳重字景公豫章宜春人舉孝廉在郎署有郎負息錢數十萬債主日至煎求無已重乃密以錢代還郎後覺知而厚辭謝之重曰非我之為將有同姓名者終不言惠吳志曰鍾離牧字子幹會稽山陰人少居永興自墾稻田二十餘畝臨熟而縣民識之牧曰本以田荒故墾之耳遂以稻與縣人沈約宋書曰沈道虔吳興武康人少仁愛好老易郡州府凡十二命皆不就有人竊其園菜者外還見之乃自逃隱候竊者取足去後乃出唐書曰載初中徐有功為大理丞時酷吏來俊臣等搆陷無辜公卿震恐有功獨存平恕詔下大理者有功皆議出之前後濟活數十百家呂氏春秋曰宋景公時熒惑在心問子韋子韋對曰禍在君可移宰相公曰宰相所與治國家曰移於民公曰民死誰與為君曰移於歲公曰歲飢民必死子韋北面再拜曰君有至德之言三天必賞君熒感果三徙舍賈誼書曰楚惠王食寒葅得水蛭王不欲以飲食傷人乃吞之令尹避席再拜而賀曰臣聞天道無親唯德是輔是夜惠王之後溷而蛭出其久病心腸之積皆愈又曰孫叔敖之為兒也出遊歸遂憂而不食其母問其故泣而對曰今旦見兩頭蛇恐死其母曰今蛇安在曰敖聞見兩頭蛇者必死吾恐人又見之殺而埋之母曰無憂汝不死矣吾聞有陰德者天必報之以福果不死矣高士傳曰初晉宣帝布衣時與胡昭有舊昭同郡周士等謀欲害帝昭聞而涉險邀士於齊澠之間止士不肯昭泣以示誠士感義乃止昭雖有陰德於帝口終不言續齊諧記曰楊寶年九歲時至華陰山北見一黃雀為鴉鳧所摶墜於樹下為螻蟻所困寶取之以歸置巾箱中唯食以黃花百餘日毛羽成乃飛去其夜有黃衣童子向寶再拜曰我王母使者君仁愛救拯實感成濟以白環四枚與寶曰令君子孫潔白位登三公事當如此數矣會稽典録曰鄭弘為靈文鄉嗇夫民有弟用兄錢者未還之嫂詣弘訴之弘賣中單即今之汗衫也為叔還錢兄聞之慚愧遣其婢索錢還弘弘不受又曰夏香字曼卿永興人門側有大井傍設水甕里中兒童各競飲牛爭水共鬭香預為汲水多置器甕由是無爭專以德化香至四節先慶酌二親退齎酒肴勞問里中父老以此為常益都耆舊記曰王忳常詣京師於空舍中見一書生疾困愍而視之書生謂忳曰我當到洛而得病命在須臾腰下有金十斤願以相贈死後乞藏骸骨未及問姓名而絶忳即鬻金一斤營其殯葬餘金悉置棺下人無知者後歸數年縣署忳大度亭長初到之日有馬馳入亭中其日風飄一繡被復墮忳前即言於縣馬遂奔走牽忳入他舍主人見之喜曰今擒盜矣問忳得馬忳説其狀并繡被主人悵然良久乃曰被隨飄風與馬俱亡卿何陰德而致此二物忳自念有葬書生事因為説之道書生形貌及埋金之處主人驚曰是我子姓金名彥前往京師不知所在何意卿乃葬之犬恩久不報天以此彰卿德耳忳悉以被馬還之彥父不取又厚遺忳忳辭讓而去時彥父為州從事因告新都令假忳休息與俱迎彥喪餘金且存由是顯名後漢亦載廣州先賢傳曰羅威字德仁南海番禺人也有鄰家牛數食其田禾既不可止遂為斷芻多著牛家門中不令人知數如此牛主驚怪不知為誰陰察求之乃覺是威自後更相約率收拾牛犢不敢復踐傷於威田豫章耆舊志曰施陽字季儒遷舒令及之官道經江夏遇寇賊興起劫奪陽物賊去後車上席下尚有五千錢追以與賊荀氏家傳曰荀遂字仲陽夫人有至行時歲荒飢有餘米糶之夫人恆掾斛糴者傾量輒過本時人號曰斛夫人
