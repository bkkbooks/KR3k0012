body:
  text: 羽族部三鸞春秋元命苞曰火離為鸞春秋孔演圖曰天子官守以賢舉則鸞在野春秋運斗樞曰天樞得則鸞鳥集詩含神霧曰王者德化充塞照洞八冥則鸞臻尚書中候曰昔者軒提象鸞鳥來儀又曰周公歸政於成王太平制禮鸞鳥見孝經援神契曰德至鳥獸則鸞鳥舞謝承後漢書曰方儲字聖明幼喪父事母母終日自負土成墳種奇樹千株鸞鳥栖其上白兔遊其下又曰靈帝建寧四年河南上言二鳳凰二鸞鳥集原縣東觀漢記曰王阜為重泉令鸞鳥止學宮闕阜使掾沙疊為張雅樂擊磬鳥舉足垂翼應聲而舞止縣庭留十餘日去北史後魏柳楷對蕭寶寅曰大王齊明帝子天下所屬且謠言曰鸞生十子九子毈一子不毈關中亂武王有亂臣十人亂者理也大王當理關中何所疑慮山海經曰軒轅之國清沃之野鸞鳥自歌海內經云廣都之野鸞自歌又曰女床之山有鳥言其狀如翟而五采以文名曰鸞鳥見則天下安寧說文曰鸞者神靈之精也赤色五采雞形鳴中五音頌聲作則至周書王會曰成王時氐羌獻鸞鳥孫氏瑞應圖曰鸞鳥赤神之精鳳皇之佐鳴中五音肅肅雍雍喜則鳴舞人君行步有容進退有度祭祀宰人咸有敬讓禮節親踈有序則至一本曰心識鍾律律調則至鳴舞以和之漢武內傳曰西王母曰仙之次藥有靈丘倉鸞之血焦贛易林曰溫山松柏常茂不落鸞鳳以庇得其歡樂括地圖曰羽民有羽飛不遠多鸞鳥食其卵去九疑四萬二千里抱朴子曰崑崙圖曰鸞鳥似鳳而白纓聞樂則蹈節而舞至則國安樂決録注曰辛繕字公文治春秋讖緯隱居華陰光武徵不至者有大鳥高五尺雞首燕頷蛇頸魚尾五色備舉而多青棲繕槐樹旬時不去弘農太守以聞詔問百僚咸以為鳳太史令蔡衡對曰凡象鳳者有五多赤色者鳳多黃色者鵷雛多青者鸞多紫者鸑鷟多白者鵠今此鳥多青者乃鸞非鳳也上善其言三公聞之咸遜位避繕繕不起車頻秦書曰符堅時關隴人安百姓豐樂民歌曰長安大街兩邊種槐下走朱輪上有鸞栖崔駰七言詩曰鸞鳥高翔時來儀應治歸得合望規啄食揀實飲華池范太鸞鳥詩序曰罽賓王結置峻祁之山獲一鸞鳥王甚愛之欲其鳴而不能致乃飾以金樊饗以珍羞對之逾戚三年不鳴夫人曰聞鳥見其類而後鳴可懸鏡以映之王從言鸞覩影感慨焉悲鳴哀響中宵一奮而絶鶴韻集曰鶴善鳴鳥春秋說題辭曰鶴知夜半鶴水鳥也夜半水位感其生氣則益喜而鳴易通卦驗曰立夏清風至而鶴鳴周易曰鳴鶴在陰其子和之左傳曰狄人伐衛懿公好鶴鶴有乘軒者將戰國人受甲者皆曰使鶴鶴實有祿位余焉能戰毛詩曰鶴鳴誨宣王也鶴鳴于九皋聲聞于天興也皋署也言身隱而名著詩義疏曰鶴大如鵝長三尺腳青黑高三尺餘赤頰赤目喙長四寸多純白亦有蒼色者今人謂之赤頰常夜半鳴高聞八九里唯老者乃聲下今吳人園中及士大夫家皆養之雞鳴時亦鳴漢書曰王莽常以鶴髓漬穀種學仙後漢書鄭弘傳注引孔靈符會稽記曰射的山南有白鶴為仙人取箭弘嘗採薪得一遺箭頃有人覔弘還之問何所欲弘識其神人也曰常患若耶溪載薪為難願旦南風暮北風移後果然故若耶溪風至今呼為鄭公風也晉書曰嵇紹始入洛或謂王戎曰昨於稠人中始見嵇紹昂昂然若野鶴之在雞群戎曰君復未見其父耳又曰吳隱之年十餘歲丁父憂每號泣行人為之流涕事母孝謹及其執喪哀毀過禮家貧無人鳴鼓每至哭臨之時常有雙鶴唳及祥練之夕復有群鴈俱集宋書曰齊高帝鎮淮陰為宋明帝所疑被徵為黃門郎深懷憂慮見平澤有群鶴仍命筆詠之曰八風舞遙翮九野弄清音一摧雲門志為君死中禽梁書曰庾域母好鶴唳域在位營求孜孜不怠一旦雙鶴來下論者以為孝感所致莊子曰鳧脛雖短續之則憂鶴脛雖長斷之則悲又曰老子謂孔子曰夫鶴不日浴而白烏不日黔而黑列子曰詹何曰聞先大夫之言捕旦子之弋弱纖乘風振之連雙鶴於青雲之際用心專動手均也墨子曰子禽問曰多言有益乎對曰蝦蟆日夜鳴口乾而人不聽之鶴雞時夜而鳴天下振動多言何益抱朴子曰周穆王南征一軍盡化君子為猿為鶴小人為蟲為沙神異經曰西海之外有鶴國男女皆長七寸為人自然有禮經論跪拜壽三百歲人行如飛日千里百物不敢犯之唯畏海鵠鵠遇吞之亦壽三百歲人在鶴腹中不死琴操曰高陵牧子取妻五年無子父兄欲為改娶妻聞中夜驚起倚戶悲嘯牧子聞之援琴鼓之乙痛恩愛之永離歎別鶴以舒情故曰別鶴操論衡曰藝增篇鶴鳴九折之澤聲聞於天此增益也按鶴鳴參天人則不聞鳴在于澤云何謂乎八王故事曰陸機為成都王所誅顧左右歎曰今欲聞華亭鶴唳不可復得陶侃別傳曰侃丁母艱在墓下忽有二客來弔不哭而退儀形鮮異知非常人遣看之但見雙鶴飛而冲天世說曰劉尊祖少為殷中軍所稱之於庾公庾公甚欣便取為佐引見坐獨榻上與語劉爾日殊不稱庾小失望遂名之為羊公鶴昔羊叔子有鶴能舞嘗向客稱之客至試使驅來氃氋而不能舞故稱之又曰僧支道林好鶴時有遺其雙鶴者翅長欲飛林意惜之乃鎩其翮鶴軒翥不能復起乃舒翼反顧視之如似懊喪意林公曰既有凌霄之姿何肯為人作耳目近玩乎養令翮成遂放飛去述異記曰宋元嘉初鎮北將軍王仲德鎮彭城左右出獵遇一鶴將二子悉禽之歸以獻王王使養之其小者口為人所裂遂不能飲食大者輒含粟哺之飲輒含水飲之先令其飽未曾亡也王甚愛之令精加養視大者羽翮先成每翥冲天小者尚未能飛大者終不先去留飲飴之又於庭中蹇躍教其飛揚六十餘日小者能飛乃與俱去風土記曰鳴鶴戒露此鳥性警至八月白露降流於草上滴滴有聲因即高鳴相警移徙所宿處淮南八公相鶴經曰鶴者陽鳥也而遊於陽因金氣依火精以自養金數九火數七故七年小變十六年大變百六十年變止千六百年形定體尚潔故其色白聲聞天故頭赤食於水故其喙長軒於前故後指短栖於陸故足高而尾凋翔於雲故毛豐而肉踈大喉以吐故修頸以納新故生天壽不可量所以體無青黃二色者木土之氣內養故不表於外是以行必依洲嶼止不集林木蓋羽族之宗長仙人之騏驥也鶴之上相瘦頭朱頂露眼黑精高鼻短喙䯓音故列切頰音德宅切耳長頸促身燕膺鳳翼雀尾龜背鱉腹軒前垂後高粗節洪髀纖指此相之備者也鳴則聞於天飛則一舉千里鶴二年落子毛易黑點三年産伏復七年羽翮具復七年飛薄雲漢復七年舞應節復七年晝夜十二時鳴聲中律復百六十年不食生物復大毛落茸毛生雪白或純黑泥水污復百六十年雄雌相見目精不轉而孕千六百年飲而不食鸞鳳同為群聖人在位則與鳳皇翔於甸穆天子傳曰至于巨搜氏巨搜之人乃獻白鶴之血以飲天子又曰天子飲於孟氏爰舞白鶴二八吳越春秋曰吳王闔閭有女王伐楚與夫人及女會食蒸魚王嘗半以與女女怨曰王食我殘魚辱我不忍久生乃自殺闔閭痛之葬於邦西昌門鑿地為女墳積土為山文石為郭金鼎玉柸銀樽株襦之寶皆以送女乃儛白鶴於吳市中令萬民隨觀之遂使與鶴俱入羡門因塞之以送死漢武帝內傳曰宣帝即位尊孝武廟為世宗行所巡狩郡國皆立廟告祠世宗廟曰有白鶴集後庭東觀漢記曰章帝至岱宗柴望畢白鵠三十從西南來經祀壇上列仙傳曰王子喬見桓良曰待我緱氏山頭至期果乘白鶴住山顛望之不得到又曰簫史善吹簫能致白鶴神仙傳曰介象死吳先帝思之以象所住屋為廟時時往祭之有白鶴來止李尊太元真人茅君內傳曰茅盈留句曲山告二弟曰吾去有局任不復得數相往來父老歌曰茅山連金陵江湖據下流三神乘白鶴各在一山頭佳雨灌旱稻陸田亦復周妻子保堂室使我無百憂白鶴翔金穴何時復來遊邴原別傳曰邴君所謂雲中白鶴非鶉鷃之網能羅矣永嘉郡記曰沐溪野青田中有雙白鶴年年生伏我長大便去只伯餘父母一雙在耳精白可愛多云神仙所養荊州記曰衡山有三峰極秀一峰名紫蓋峰清天明景輒有一雙白鶴回翔其上清響亮徹焦贛易林曰白鶴銜珠王韶之神境記曰滎陽郡南百餘里有蘭巖常有雙鶴素羽皎然日夕偶影翔集傳云昔夫婦俱隱此年數百歲化成此鶴臨海記曰郡西北有白鶴山周回六十里高三百丈有泄水懸注遙望如倒挂白鶴因以為名古老相傳云此山昔有晨飛鶴入會稽雷門鼓中於是雷門鼓鳴洛陽聞之孫恩時斫此鼓見白鶴飛出高翔入雲此後鼓無復遠聲古歌辭曰飛來白鶴從西北來十十五五羅列成行妻卒被病不能相隨五里還顧六里徘徊吾欲銜汝去口噤不能開吾欲負汝去毛羽日摧頽唐書曰天寶中華陰郡奏白鶴見于西嶽五福峰又曰至德中肅宗降誕之辰有慶雲屬天白鶴飛舞於上所居殿宇翱翔二十餘匝而去戰國策曰莊辛謂楚襄王曰黃鶴生江海俯喙鰋鯉仰斷菱藕奮其六翮自以為無患與人無爭不知夫射者方修弧矢治矰繳將加己者萬仞之上故晝遊江湖夕調鼎俎韓詩外傳曰田饒事魯哀公而不見察謂哀公曰夫雞有五德君猶瀹而食之者以其所從來近也未若黃鶴一舉千里止君園池喙君稻梁君猶貴之以其所從來遠也故臣將去君黃鶴舉矣離騷曰黃鶴之一舉兮知山川之紆曲再舉兮知天地之圓方述異傳曰荀瑰字叔瑋潛栖卻粒嘗東遊憩江夏黃鶴樓上望西南有物飄然降自霄漢俄頃已至乃駕鶴之賓也鶴止戶側仙者就席羽衣虹裳賓主歡對已而辭去跨鶴騰空眇然煙滅韓子曰師曠鼓新聲平公問師曠此何聲也曰清商公最悲乎師曠曰不如清徵公曰可得聞乎師曠曰古之得聽清徵者皆有德義之君公曰得試之乎師曠不得已援琴一奏有玄鶴二八從南方來集於廓門之危再而列三奏延頸而鳴舒翼而儛音中宮商公大悅提觴起為師曠壽其後大旱孫氏瑞應圖曰玄鶴者知音樂之節至又曰黃帝習崑崙以儛衆神玄鶴二八翔其右伏侯古今注曰鶴千歲則變蒼又千歲黑所謂玄鶴也王子年拾遺記曰周昭王時塗修國獻青鳳丹鶴各一雄一雌以潭皋之粟餧之以溶溪之水飲之左思吳都賦曰青鶴鶖鶬鴻禮記曰前有車騎則載飛鴻取其飛有行列舉於旗首以警衆又曰孟春之月鴻鴈來鴻自南方來將北反其居也季秋之月鴻鴈來賓來賓言客止來去也左傳曰衛獻公戒孫文子寧惠子食皆服而朝日旰不召勑戒二子欲共宴食皆服朝衣待命旰宴而射鴻於囿二子從之公不釋皮冠而與之言二子怒如宿宿孫文子邑毛詩曰鴻鴈美宣王也大曰鴻小曰鴈又曰鴻飛遵渚公歸無所毛詩義疏曰鴻鵠羽毛光澤純白似鶴而大長頸肉美如鴈又有小鴻大小如鳧色亦白今人直謂鴻也周易漸曰初六鴻漸于干上九鴻漸于陸其羽可用為威儀吉鴻水鳥也適進之義治於下而升故以鴻為喻儀可貴也韓詩外傳曰齊使獻鴻渴使者於道飲鴻而失之使者至楚曰臣欲亡去為兩使不通欲拔頸而死將以吾君賤士貴鴻也楚王賢之以為上客史記陳涉歎曰燕雀安知鴻鵠之志哉管子曰桓公在位管仲隰朋見立有間有二鴻飛過桓公歎曰仲父令彼鴻鵠有時而南有時而北四方無遠所欲至而至焉唯有羽翼之故是能通其意於天下乎寡人有仲父猶飛鴻之有羽翼也魯連子曰展母所為魯君遺濟襄君鴻至黽浴鴻鴻失其裝在御者曰鴻毛物可使若一結紿置鴻耶答曰吾非不能買鴻是上隱君下蔽罪也尸子曰虎豹未成文而有食牛之氣鴻鵠之羽翼未合而有四海之心賢者之生亦然淮南子曰蜂房不容鴻卵淮南萬畢術曰鴻毛之囊可以渡江盛鴻毛於縑囊可以渡江不弱也楊子法言曰鴻飛冥冥弋人何慕焉新論微子操微子傷殷之將亡終不可奈何見鴻鵠高飛援琴作操其聲清以淳傅子曰鴻不學飛飛則冲天驥不學行行則千里二世修驪山陵採玉者傾山採珠者蔽海又曰丈夫重義如太山輕利如鴻毛可謂仁義也諺曰己是而彼非不當與非爭彼是而己非不當與是平也博物志曰鴻鵠壽千歲皆胎産也晉書隱逸傳曰郭瑀燉煌人也張天錫使蓋公明徵之瑀翔鴻以示之曰此鳥也安可籠哉遂深逃絶跡公明拘其門人瑀歎曰吾逃祿非避罪也豈得隱居行義害及門人乃出就徵隋書曰盧思道遷武陽太守非其好也為孤鴻賦以寄其情曰余志學之歲自鄉里遊京便見識知音歷受群公之眷年登弱冠甫就朝列談者過誤遂竊虛名通人楊令君邢特進已下皆分庭致禮倒屣相接翦拂吹噓長其光價而才本駑拙性實踈懶勢利貨殖淡然不營雖籠絆朝市且三十載而獨往之心未始去懷抱也攝生舛和有少氣之病分符坐嘯作守東原洪河之湄沃野彌望囂務既屏魚鳥為鄰有離群之鴻為羅者所獲野人馴養貢之於余置諸池庭朝夕賞玩既用銷憂兼以輕疾大易稱鴻漸於陸羽儀盛也楊子曰鴻飛冥冥騫翥高也淮南子云東歸碣石違溽暑也平子賦曰南寓衡陽避祁寒也若其雅步清音遠心高韻鵷鸞已降罕見其儔而煆翮牆陰偶影獨立唼喋粃稗雞鶩為伍不亦傷乎余五十之年忽焉已至永言身事慨然其多緒乃為之賦聊以自慰鵠史記曰齊王使淳于髡獻鵠於楚出邑門道飛其鵠徒揭空籠以見楚王曰齊王使臣獻鵠過於水上不忍鵠渴出而飲之而飛去吾欲剌腹絞頸而絶恐人議吾君以鳥故令士自殺鵠毛物多相類者吾欲買而代之是不信而欺吾王欲赴他國奔亡痛吾兩主使不通故來受罪楚王曰善說苑曰魏文侯使舍人無檡獻鴻於齊其事同宋書曰桓榮祖善彈為東海太守登西樓見翔鵠雲中謂左右曰當生取之於是彈其兩翅毛脫盡墜地無傷養毛生乃去南史孝義傳曰謝昌寓陳郡人也為劉悛廣州參軍孝性甚至嘗養一鵠昌寓病二旬而鵠二旬不食昌寓亡而鵠遂飛去韓詩外傳曰晉平公遊於河而樂曰安得賢士與之樂此也船人蓋胥跪而對曰夫珠出江海玉出崑山無足而至者猶主君好之士有足而至者猶主君好之士有足而不著者蓋主君無好士之意耳何患無士乎平公曰吾食客門左千人門右千人朝食不足夕收市賦暮食不足朝收市賦吾何謂不好士乎對曰夫鴻鵠一舉千里所恃者六翮耳背上之毛腹下之毳益一把飛不為加高損一把飛不為加下今君之食客門左門右各千人亦有六翮在其中矣將皆背上之毛腹下之毳也新序曰晉文公遊西河舟人固桑樹說苑曰趙簡子遊於河舟人古對几書二語同離騷曰緣鵠飾玉后帝是饗后帝謂殷湯也言伊尹始仕緣亨鵠鳥之美修王鼎以事於湯湯賢之遂以為相也録異記曰魏安釐王曰寡人得如鵠之飛視天下如莽也吳客有隱遊者聞之作木鵰而獻王王曰此有形無用者也夫作無用之器世之姦民也召遊者加刑焉遊者曰臣聞大王之好飛也故敢獻鵰安知王之不知此也可謂知有用之用未寤無用之用矣乃取而騎之遂翻然而飛去莫知所之鄧德明南康記曰昔有盧耽仕州為治中少有棲仙之術嘗元會至曉不及朝列化為白鵠至閣前回翔欲下威儀以帚擲之得一隻履耽乃驚還坐內外左右莫不駭異時步騭為廣州刺史意甚惡之便以狀列聞遂至誅滅異苑曰大亨二年冬天寒南洲人見二白鵠語於橋下曰今茲寒不減堯崩年也於是飛去抱朴子曰千歲之鵠隨時而鳴能登於木色純白腦盡成骨列仙傳曰陵陽子安死葬山下有黃鵠來栖其冢邊樹鳴聲呼安安又曰魯陶門女者少寡養姑紡績為産魯人欲求之女乃歌曰黃鵠早寡七年不雙宛頸獨宿不與衆同禽鳥尚然況於貞良魯人聞之遂不復求楚辭曰寧與黃鵠比翼乎將與雞騖爭食乎伏侯古今注曰漢惠五年七月黃鵠二集蕭池漢書曰黃鵠下建章宮太液池中公卿上壽賜諸侯王列侯宗室金錢西京雜記曰始元元年黃鵠下太液池上為歌曰黃鵠飛兮下建章羽肅肅兮行蹌蹌金為衣兮菊為裳自顧薄德愧爾嘉祥廣志曰黃鵠出東海漢以其來集為祥魏武樂府曰黃鵠摩天極高飛後宮尚得烹煮之崔鴻十六國春秋後趙録曰楊州獻黃鵠雛五徙之于玄武池頸長一丈聲聞十餘里淮南子曰鳳皇曾遊萬仞之上鴻鵠鶬鵠莫不憚驚郭璞賦曰晨鵠天雞此鵠屬也鵾雞穆天子傳曰鵾雞飛八百里郭璞曰鵾雞即鵠屬也管子曰鳧鶩之舍鵾雞之通遠楚辭曰鵾雞啁哳而悲鳴張衡西京賦曰翔鵾仰而不逮薛系曰鵾雞也音昆嵇康琴賦曰鵾雞遊絃千里別鵠張華鷦鷯賦曰鵾雞竄於幽險
