body:
  text: 人事部五十九忠貞管子曰忠者臣下之高行孟子曰教人以善謂之忠淮南子曰交淺而言深是忠也抱朴子曰竭身命以徇國經夷險而一節者忠臣也説苑曰逆命利君謂之忠又曰卑身賤體夙興夜寐進賢不懈數稱往古之行事以厲主意庶幾有益以安國家如此者忠臣也禮記文王世子曰為人臣者殺其身有益于君則為之又檀弓曰公叔文子卒其子戍請諡於君君曰昔者衛國有難夫子以其死衛寡人不亦貞乎左傳隱公曰衛州吁弒桓公石厚從州吁如陳石碏使告于陳曰此二人者實弒寡君敢即圖之陳人執之而請蒞于衛君子曰石碏純臣也惡州吁而厚與焉大義滅親其是之謂乎又僖公上曰晉獻公使荀息傅奚齊公疾召之曰以是藐諸孤言其幼賤與諸子縣藐辱在大夫其若之何對曰臣竭其股肱之力加之以忠貞公曰何謂忠貞對曰公家之利知無不為忠也送往事居耦俱無猜貞也又僖公中曰晉惠公卒懷公立命從亡人亡人重耳期期而不至無赦狐突之子毛及偃從重耳在秦不召懷公執狐突曰子來則免對曰子之能仕父教之忠古之制也策名委質二乃辟也二二心辟罪也今臣之子名在重耳有年數矣若又召之教之二也父教子二何以事君又宣公上曰楚子滅若敖氏令尹子文其孫針尹克黃針尹官名使於齊還及宋聞亂其人曰不可以入矣其入克黃從臣針尹曰棄君之命獨誰受之遂歸復命而自拘於司敗又襄公二年曰楚子囊將死遺言謂子庚必城郢楚徙都郢未有城郭君子謂子囊忠君薨不忘增其名謂前年諡君為恭也將死不忘衛社稷可不謂忠乎忠民之望也又曰晉人執季文子舍之於苕丘范文子謂欒武子曰季孫於魯相三君矣妾不衣帛馬不食粟可不謂忠乎韓詩外傳曰有大忠有次忠有下忠以道覆君而化之大忠也以德調君而輔之次忠也以是諫非而死之下忠也周公於成王可謂大忠管仲於桓公可謂次忠也子胥於夫差可謂下忠也又曰崔杼殺莊公陳不占聞君有難將死之餐則失哺上車失軾僕曰雖往其有益乎不占曰死君義也無勇私也遂驅車比至公門外聞鍾鼓戰鬭之聲遂駭而死國語曰彘之亂宣王在邵公宮國人圍之邵公乃以其子代宣王王長而立之戰國策曰吳入郢楚冒勃蘇贏音盈糧潛行十日而薄秦朝鶴立不轉晝吟宵泣七日不得告水漿無入於口秦王聞而走之冠劍不相及左奉其首右濡其口於是秦救楚退吳師復楚漢書曰初吳王芮高祖賢之制詔御史長沙王忠其定著甲令臣瓚曰漢以芮忠故特王之非故時令也又曰胸奴求和親群臣議上前博士狄山曰和親便上問張湯湯曰此愚儒無知狄山曰臣固愚忠若御史大夫湯乃詐忠又曰王莽既篡使者即拜龔勝為講學祭酒勝曰吾受漢家厚恩無以仰報今年老矣旦暮入地豈一身事二姓下見故主哉勝因勑以棺斂喪事語畢遂不復開口飲食積十四日而死東觀漢記曰上於大會中指王常謂群臣曰此家率下江諸將輔翼漢室心如金石忠貞臣也是日遷常為漢中將軍又曰吳漢性忠厚自從征伐在左右上未安則側足屏息上安然後退舍兵有不利軍營不完漢常獨繕檠其弓戟閲其兵馬激揚吏士上時令人視吳公何為還言方作戰攻具上常曰吳公差強人隱若敵國又曰上為大司馬以王霸為功曹令史從渡河北賓客隨者數十人稍稍引去謂霸曰潁川從我者皆去而子獨留始驗疾風知徑草又曰鮑昱字文淵拜司隸校尉詔昱詣尚書使封胡降檄上遣小黃門問昱有所怪不對曰臣聞故事通官不著姓又當司徒露布怪使司隸而著姓也帝報曰吾欲令天下知忠臣之子復為司隸又曰鮑永字君長到京兆灞陵過更始冢引車入陌欲下從事諫止永曰親北面事人何忍車過其墓雖以獲罪司隸不辭也遂下車哭盡哀而至右扶風推牛上荀諫冢上聞之問公卿曰奉使如此何如時太中大夫張堪對曰仁者百行之宗忠者禮義之主仁不遺舊忠不忘君行之高者上悅之謝承後漢書曰梁冀奏誅李固固臨命與胡廣趙戒書曰固受國厚恩是以竭其股肱不顧死忘志欲扶王室比隆文王何圖一朝梁氏迷謬公等曲從以吉為凶成事為敗漢家衰微從此始矣公等受主厚祿顛而不扶傾覆大事後之良史豈有所私固身已矣於義得矣夫復何言廣戒得書悲慚長歎范曄後漢書曰來歙蓋延馬成進攻公孫述將王元環安於河池下辨陷之乘勝遂進蜀人大懼使剌客剌歙未絶馳召蓋延見歙因伏悲哀不能仰視歙叱延曰虎牙何敢然今使者中剌客無以報國故呼臣卿欲相屬以軍事而反效兒女子涕泣乎刃雖在身不能勒兵斬公邪延收淚強起受所誡歙自書表曰臣夜人定後為何人所賊傷中臣要害何人謂不知何人也臣不敢自惜誠恨奉職不稱以為朝廷羞夫理國以得賢為本太中大夫段褒骨鯁可任願陛下裁察又臣兄弟不肖終恐被罪陛下哀憐數賜教督投筆抽刃而絶魏志曰典韋拜都尉太祖引置左右將親兵數百人常繞帳韋性忠至謹重常晝立侍終日夜宿帳左右稀歸私寢英雄記曰曹操圍張超於雍丘臧洪從袁紹請兵將赴其難紹不聽之超城遂陷張氏族洪由是怨袁紹不與通紹增兵急攻洪殺愛妾以食兵將流涕莫有離叛城陷生執洪紹問臧洪何相負若是今日服未洪據地瞋目曰諸袁事漢四世五公可謂受恩今王室微弱因際會觖望非冀惜洪力弱不能為天下推刃報仇何謂服乎紹命殺焉洪邑人陳容在座見洪當死起謂紹曰將軍舉大事而先誅忠義豈合天意紹慚使人牽出曰汝臧洪儔寧復汝為容顧曰夫仁義豈有常所蹈之則君子背之則為小人今日寧與臧洪同日死不與將軍同日生遂復見殺在紹座者無不歎息蜀志曰先主退軍義陽傅彤斷後拒戰兵人幾盡吳將語彤令降彤罵曰吳狗豈有漢將軍降者遂戰死子僉為閞羽都督景曜六年又臨危授命論者嘉其奕世忠義晉中興書曰王敦欲謗帝以不孝於衆坐明帝罪云溫太真在東宮久最所知悉因厲聲問嶠謂懼威必與己同嶠正色對曰鉤深致遠小人無以測君子當今諒暗之際惟有至性可稱敦默然不悅然憚其居正不敢害之又曰王敦作逆石頭城既陷王師敗績周顗往詣敦敦曰伯仁卿負我顗曰公戎車犯順下官親帥六軍不能其事使王旅摧敗以此負公敦憚其正辭不知所答顗與戴淵俱披收路經太廟顗大言曰天地先帝之靈臣忠於社稷王敦無道陵虐天下神祗有靈當速殺敦無令縱毒以傾王室語未終人以戟傷其口不得復言血流至踵顏色不變士庶藂觀皆為流涕於石頭南門外石上害之蕭子顯齊書曰王敬則轉安城王車騎參軍蒼梧王狂虐左右人不自保敬則以太祖有威名歸誠奉事每下直輒往領軍府夜著青衣扶匍道路為太祖聽察崔鴻十六國春秋前涼録曰麻秋以書誘致宛成都尉宋矩矩至謂秋曰辭父事君當立功義功義不立當守名節矩終不背主覆宗偷生於世乃先殺妻子自刎而死秋曰義士也命吏人葬之重華嘉其誠節賜振威將軍又曰前燉煌太守幸憑隴西人也唯有一子髦至狄道省墓遇辛宴反叛為宴所執憑勸張茂討宴茂曰髦在彼如何憑曰人臣奉主豈顧子乎茂曰汝純臣賜爵閞內侯又前趙録曰王廣永嘉之亂藂族避世及為楊州刺史被蠻賊圍一百一十日外救不至糧食罄絶雞犬雀鼠靡有將士泣曰將軍忠於本朝故有今難豈有背將軍理哉衆相枕而死者五千人又南涼録曰振武將軍尉賢政固守浩亹不下熾盤招之曰樂都已潰卿妻子皆在吾聞孤城獨守何所為也政曰受涼王厚恩為國家藩屏雖知樂都已陷妻子為擒先歸獲賞後順受誅然不知主存亡未敢歸命妻子小事豈動懷盤乃遣虎臺手書喻政政曰為國儲不能盡忠反面縛於人棄父負君虧萬世之業賢政義士豈如汝乎三國典略曰齊平東雍州刺史傅伏堅守不降帝遣韋孝寬將伏子仁寬招伏曰并州已平故遣公兒來報今授上大將軍武卿郡公以金馬腦二酒鍾為信公宜急下伏不受謂孝寬曰事君有死無二此兒為臣不忠為子不孝願即斬以示天下帝又遣高阿郍肱等百餘人臨汾召伏伏出軍隔水相見問至尊何在阿郍肱曰已被捉獲別路入閞伏仰天大哭率衆入城於廳事前北面哀號良久乃降帝見之曰何不早下伏流涕而對曰臣三代被任草命不能自死羞見天地帝執其手曰為臣當若此朕乎齊國唯見公一人乃自食一羊肋以骨賜伏曰骨親肉踈所以相付授上儀同也唐書曰隋屈突通與竇琮戰於稠桑通結陳以自固竇琮縱通子壽令往諭之通大呼曰昔與汝為父子今與汝為仇讎命左右射之桑顯和呼其衆曰京師陷矣汝並閞西人欲何所去衆皆釋仗通知不免乃下馬東南向再拜號哭曰臣力屈兵敗不負陛下天地神祇實所鑒察遂擒通送于長安高祖謂曰何相見晚耶通泣對曰通不盡人臣之節力屈而至此高祖曰隋室忠臣也命釋之又曰馮立事隱太子太子誅左右悉散立歎曰豈有人生受其恩死逃其難立乃率兵犯玄武門殺將軍敬君弘謂其徒曰微以報太子矣遂解兵而遁俄來請罪太宗數之立對曰出身事主期之效命當戰之日無所顧憚因戲欷悲不自勝太宗宥之立謂所親曰逢莫大之恩終當以死奉答俄而突厥至便橋立率數百人力戰殺獲甚衆太宗深嘉歎之又曰安金藏為太常工人時睿宗為皇嗣或有誣告皇嗣潛有異謀者則天令來逡臣桉之左右不勝楚毒皆欲自誣唯金藏大呼謂俊臣曰公既不信金藏言請剖心以明皇嗣不反則引佩刀自剖其胸五藏並出流血被地氣遂絶則天聞之令舁入宮中遣醫人卻內五藏以桑白皮縱合之傳藥經宿乃蘇則天臨視歎曰吾有子不能自明不如爾之忠也即令停推睿宗由是獲免新序曰陳恆弒簡公而盟盟者完其家召他入曰不盟是弒父母也盟之是無君臣之禮乃盟以免父母死而自殺以禮其君又曰智伯之時有士曰長兒子魚絶智伯而去之三年將東之魯而道聞智伯死曰吾聞忠臣無餘祿吾聞智伯之死動吾心餘祿加於我至今尚存將往吾佐之遂反而死之續説苑曰趙苞漢靈帝時為武威守夷戎畏其果毅母及妻子自郡來遇鮮卑萬騎入塞為其所掠苞出擊賊陳步騎二萬鮮卑恐懼出母示苞苞悲號謂母曰為子無狀欲以微祿奉養不圖作禍今為王臣不得顧私母曰人各有命何得毀忠節耶立忠榮親孝莫大焉行矣勉之苞瞋目援桴虜衆碎斬其師伏尸十里母妻子皆為賊所害苞收母殯斂奏請歸葬天子策弔封為列侯葬訖謂鄉人曰食祿避難不忠殺母全義不孝何面目立於天下遂自殺又曰宦者田鵬事齊至內侍中齊主走青州圖入陳出覘為周人所獲歐問齊主所在紿云已去周人折其支每折一支辭色逾厲四支俱絶而死許肅別傳曰肅為愍帝侍中左衛將軍麴武將與肅齊心拒守而外救已退城遂陷沒逼愍帝送于平陽肅後冒難侍左右劉載乃以帝為歸漢王頃之陰行鳩毒帝因食心悶欲見許侍中肅馳詣賊相見帝已不復能語肅曰不審陛下尚識臣不帝猶能執肅手流涕肅歔欷登床帝遂殂於扶抱之中晝夜號泣哀感異類載外欲明已不害乃偽責諸臣欲盡誅之群臣迸竄唯肅獨曰備位故臣願乞得殯殮然後就戮載特聽許事訖詣載曰國亂不能匡君亡弗能死舉自莫非愧恥將何顏以存所以忍辱正以山陵未畢故耳微情已敘甘就刑戮賊議之曰此晉之忠臣宜加甄賞載遂從議故得全免庾珉別傳曰珉字子居位列侍中劉曜作亂京都傾覆珉時直在省謂僚佐曰吾必死此屋內既天在子蒙塵珉與許遐等侍從曜設會使帝行酒珉至帝前乃慨然流涕曜曰此動人心即時遇害
