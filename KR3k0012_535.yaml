body:
  text: 禮儀部十三辟雍毛詩大雅曰鎬京辟雍自西自東自南自北無思不服武王作邑於鎬京箋云自由也武王於鎬京行辟雍之禮日四方來觀者皆威化其德心無不歸服禮記王制曰天子曰辟雍諸侯曰泮宮尊卑學異名辟明雍和也所以明和天下也泮之言恤政教也禮記禮統曰所以制辟雍何教化天下也辟雍之制奈何王制曰辟雍圓如璧雍以水內如覆外如偃盤也諸侯泮宮半有水半有宮也諸侯所化者少故半有宮焉三王之制奈何夏天子曰重屋諸侯曰廣宗殷天子曰廟諸侯曰世室周天子曰辟雍諸侯曰泮宮鄉曰庠里曰序是其制也禮記外傳曰學者覺也人生也皆稟五常之正性故聖人修道以教之使其發覺不失其性也小人學道則易使也不從教則凶人也天子諸侯皆有大學小學小學在東少陽之地公宮之左太學在西有虞氏之學曰庠亦謂之米廩藏躬耕之穀於學中以供祭祀虞舜尚孝夏曰序殷曰瞽宗瞽無目者樂正古之學者周曰辟雍辟明也雍和也亦為太學東膠漢書禮樂志曰武帝時丞相大司空奏請立辟雍會按行長安南營表未作遭帝崩群臣引以為定諡及王莽為宰衡欲耀衆庶遂興辟雍後漢書曰世祖中元二年春初起辟雍行大射之禮續漢書禮儀志曰明帝永平中始率群臣躬養三老五更于辟雍行大射之禮魏志曰明帝幸辟雍于會命群臣賦詩宋書禮志曰晉武帝太始六年帝臨辟雍行鄉飲酒之禮詔曰禮儀之廢久矣乃今復講肆舊典賜太常絹百匹丞博士及學生酒咸寧三年惠帝復行其禮白虎通曰天子立辟雍者何所以行禮樂宣德化也辟者象璧以法天雍者何雍之以水象教化流行五經通義曰諸侯不得觀四方故缺以東南半天子之學故曰頖宮三輔決録曰辟雍水四周於外象四海也桓談新論曰王者作圓池如璧形實水其中以圜壅之故曰辟雍言其上承天地以班教令流轉王道終而復始說苑曰辟雍天子鄉飲之處戴延之西征記曰洛城南有平昌門道東辟雍壇去靈臺三里俱是魏武帝所立高七丈班固東都賦辟雍詩曰乃流辟雍辟雍湯湯聖皇蒞止造舟為梁皤皤國老乃父乃兄抑抑皇儀孝友光明於赫太上示我漢行洪化惟神永觀厥成李尤辟雍賦曰卓矣煌煌永元之隆含弘該要周建大中蓄純和之優渥兮化盛溢而茲豐李尤辟雍銘曰惟王所建方中圓外清流四匝蕩滌濁穢傅玄帝幸辟雍鄉飲酒賦曰時皇帝枉萬乘之尊兮以幸辟雍鹵簿齊列群官正容侍衛參差階戟百重乃延鄉七乃命王公是日也定小會之常儀兮饗殊俗而見遠邦連三朝以考學兮覽先賢之異同靈臺毛詩文王靈臺曰靈臺民始附也文王受命而民樂其有靈德以及鳥獸昆蟲焉天子有靈臺所以觀祲象察氣妖祥經始靈臺經之營之庶民攻之不日成之詩汜曆樞曰靈臺候天意也經營靈臺天下附也禮含文嘉曰禮天子靈臺以考觀天人之際陰陽之會也揆星度之驗徵氣朔之瑞應原神明之變化為萬姓獲福於天禮統曰所以制靈臺何以尊天重民備災御害豫防未然也夫王者當承順天地節禦陰陽也夏所以為清臺何明明相承太平相續故為清臺殷為神臺周為靈臺何質者據天而王天者稱神文者據地而王地者稱靈是其異也孝經援神契曰靈臺考符居高顯聖王所以宣德察微五經通義曰王者受命而起所以立靈臺靈臺何以為在於野中國之南附近辟雍依仁宮也靈臺制度奈何師說之積土崇增其高九仞上平無屋高九仞者極陽之數上平無屋望氣顯著續漢書祭祀志曰明帝即位郊祀五帝於明堂卒事遂升靈臺以望雲物崔鴻十六國春秋後趙録曰建武二年置女大史靈臺仰觀災祥以考中外太史驗察虛實唐書曰乾元元年於永寧坊張守圭宅置司天臺制曰建設邦都必稽玄象分列曹局皆應物宜靈臺二星主觀察雲物天文位在太微西南今興慶宮上帝延也考符之所合置靈臺三輔故事曰漢作靈臺於城東周作靈臺在灃水永東常以四孟之月登臺而觀述征記曰長安宮南有靈臺高十仞上有銅渾天儀又相風銅鳥或云此鳥遇千里風乃動六韜曰文王既出羑里召周公旦築為靈臺新序曰周文作靈臺及池沼掘得死人骨吏以聞於文王文王曰更葬之天下聞之皆曰文王賢矣澤及朽骨而況於人乎班固東都賦靈臺詩曰乃經靈臺靈臺既崇帝勤時登爰考休徵三光宣精五行布序習習祥風祁祁甘雨百穀蓁蓁庶草蕃廡屢惟豐年於皇樂胥潘嶽間居賦曰靈臺傑其高跱窺天文之祕奧究人事之終始學校毛詩國風曰子襟剌學校廢也亂世則學校不修焉青青子襟悠悠我心青矜青領也學子之所服縱我不往子寧不嗣音尚書大傳曰耰鉏已藏歲事欲畢餘子皆入學十五始入小學見小節踐小義十八始入大學見大節踐大義周禮地官下師氏曰師氏以三德教國子一曰至德以為道本二曰敏德以為行本三曰孝德以知逆惡又教三行一曰孝行以親父母二曰友行以尊賢良三曰順行以事師長鄭玄注曰德行外內之言也在心為德施之為行居虎門之左司王朝凡國之貴遊子弟學焉禮記學記曰君子如欲化民成俗其必由學乎所學聖人之道在方策玉不琢不成器人不學不知道是故古之王者建國君民教學為先又學記曰古之教者家有孰黨有庠術有序國有學比年入學中年考校一年視離經辨志三年視敬業樂群五年視博習親師七年視論學取友謂之小成九年知類通達強立而不反謂之大成左傳襄六曰鄭人遊於鄉校杜預曰鄉之學校以論執政然明謂子産曰毀鄉校如何恐於中謗議國政也子産曰何為夫人朝夕退而遊焉以議政之善否其所善者吾則行之其所惡者吾則改之是吾師也若之何毀之論語讖曰學者織也五經通義曰三王教化之宮揔名為學夏為校校言教也漢書曰郡國曰學縣道邑侯國曰校校學置經師一人續漢書禮儀志曰明帝永平中始師群臣養三老五更於辟雍郡國縣道行飲酒禮于學校後漢書曰桓榮車駕幸太子學會諸博士論難於前榮被服儒衣溫恭有蘊藉蘊藉猶言寬博有餘也蘊音於問反辨明經義每以禮讓相厭不以辭長勝人儒者莫之及厭服也特加賞賜又詔諸生雅吹擊磬盡日乃罷吹管奏雅頌也東觀漢記曰光武建武五年初起太學宮諸生吏子弟及民以義助作上自齊歸幸太學賜博士弟子有差宋書禮志曰漢獻帝建安二十二年魏國作泮宮于鄴城南魏文帝黃初五年立太學於洛陽魏名臣奏曰蔣濟奏大學堂上官為置鼓禮曰入學鼓篋遜其業也凡學受業皆當須十五以上公卿大夫子弟在學者以年齒長幼相次不得以父兄位也學者不恭肅慢師酗酒好訟罰飲水三升晉諸公讚曰惠帝時裴頠為國子祭酒奏立國子太學起講堂築門闕刻石寫經晉令曰諸縣率千餘戶置一小學不滿千戶亦立宋書禮志曰晉征西將軍庾亮在武昌開置學官教曰人情重交而輕財好逸而惡勞學業致苦而祿答未厚由捷徑者多故莫肯用心洙泗邈遠風雅彌替後生放狂不復憲章典謨臨官宰政者務目前之治不能間於典誥遂令詩書荒塵頌聲寂寞仰瞻俯省能不歎慨南史曰宋時國學頽廢未暇修復明帝大始六年置揔明觀以集學士或謂之東觀置東觀祭酒一人揔明訪舉郎二人儒玄文四科置學士千人其餘令史下各有差是歲以國學既立省揔明觀於王儉宅開學士館以揔明四部書充之三輔舊事曰漢太學在長安門東書社門立五經博士員弟子萬餘人學中有市有獄光武東遷學乃廢任預益州記曰文翁學堂在大城南昔經災火蜀郡太守高朕修復繕立其欒櫨椽節制猶古撲即令堂基六尺夏屋三間通皆圖畫聖賢古人之象及禮器瑞物堂西有二石室又以為州學郡更於夷里橋道東起學也述征記曰太學在國子學東二百步學堂裏有太學讚碑記曰建武三十七年立太學堂永建六年制下府繕治并立諸生房舍千餘間陽嘉元年畢刊子碑有太尉龐參司徒劉崎太常孔扶將作大匠胡廣答記制黃圖曰禮小學在公宮之南太學在城南就陽位也去城七里王莽為宰衡起靈臺作長門宮南去堤三百步起國學於郭內之西南為博士之宮寺門北出王於其中央為射宮門西出殿堂南嚮為牆選士肆射於北中北之外為博士舍三十區周環之此之東為常滿倉之北為會市但列槐樹數百行為隧無牆屋諸生朔望會此市各持其郡所出貨物及經書傳記笙磬樂相與買賣雍雍揖讓或論議槐下其東為太學宮寺門南出置令丞吏詰姦究理辭訟五博士領弟子員三百六十六經三十博士弟子萬八百人主事高弟侍講各二十四人學士司舍行無遠近皆隨檐雨不塗足暑不暴首決疑要注曰漢初置博士而無弟子後置弟子五十人又增滿五百漢未至數千人魏之務學者始詣太學為門人二歲通二經者補文學掌故滿三歲通三經者櫂為太子舍人摯虞駮宜立學事曰河內太守魯夔使民二百家共立一學未成而司隸奏以違法尚書郎中騎都尉臣摯虞駮夔為近畿大都朝所委任親臨民物足識事宜纍表仍上求二百家立一學是其留心學校必欲有成也崔瑗南陽文學頌曰昔聖人制禮作樂也將以統天理物經國序民立均出度因其可利而利之俾不失性也故觀禮則體敬聽樂則心和然後知反其性而正其身也梁元帝召學生教曰閣下昔楚王好詩沛王傳易猶且傳之不朽以為盛美吾親承天旨聞方欲化行南國被于西楚
