body:
  text: 學部六博學論語曰大哉孔子博學而無所成名禮記曰君子之學也博其服也鄉易大畜卦云君子以多識前言往行以畜其德續漢書曰班固字孟堅九歲能屬文誦詩賦及長遂博覽載籍九流百家之言無不窮究東觀漢記曰楊震字伯起受歐陽尚書於桓郁明經博覽無不窮究諸儒為之語曰關西孔子楊伯起謝承後漢書曰王充字伯任好學博覽常遊洛陽市閲所賣書一見輒能誦憶遂博通衆流百家之言又曰黃香知古今群書無不涉獵帝以香先帝所異每有疑帝時特訪問又詔香詣東觀讀所未嘗見書又曰賈逵字景伯弱冠誦左氏語云問事不休賈長頭也王隱晉書曰皇甫謐羸病手不釋卷歷觀今古無不皆綜又曰張華博覽圖籍四海之內若指諸掌世祖問華千門萬戶畫地而成晉書曰何劭惠帝即位初建東宮太子年幼欲令親萬機以劭為太子師劭博學善屬文陳說近代事若指諸掌三國典略曰陳遺兼通直散騎常侍姚察聘於周沛國劉臻竊於公館訪漢書疑事十餘條並為剖析皆有經據臻謂所親曰名下定無虛士齊書曰賈希鏡宋孝武時青州人發古冢銘云青州世子東海女郎帝問學士鮑昭徐爰蘇寶生並不能悉希鏡對曰此是司馬越女嫁茍晞兒檢訪果然由是見遇又崔慰祖傳曰國子祭酒沈約吏部郎中謝眺嘗於吏部省中賓友俱集各問慰祖地理中所不悉十餘事慰祖口吃無華辭而酬據精悉一座稱服之眺歎曰假使班馬復生無以過此蕭子顯齊書曰王儉自以博聞多識讀書過陸澄澄曰僕少小來無事唯以讀書為業其年已倍今君少便鞅掌王務雖復一覽便諳然見卷軸未必多僕儉集學士何寧等盛自商略澄待儉詩畢然後談所遺漏數百千條皆儉所未覩儉乃敬服儉在尚書省出巾箱機案新服飾令學士隸事多者與之人各得一兩物澄後來更出諸人所不知事復各數條并奪物將去梁書曰韋睿子稜字威直性恬素以書史為業博物強記當代之士咸就質疑隋書曰王邵初在齊時祖孝徵魏收陽休之等嘗論古事有遺忘討閲不能得因呼邵問之邵具論所出取書驗之一無舛誤自是大為時人所許稱其博物唐書曰李守素尤為譜學妙諳人物自晉宋以降四海士流及周魏以來諸貴勳等華戎閥閲靡不詳究時號為肉譜嘗與虞世南等六人同直學館其夜七夕內出珍饌有教賦詩因共談人物初言江左東南猶相酬對及言北臺諸姓次第如流顯其歷葉皆有據證世南但撫掌而笑不復能答既而歎曰肉譜定可畏許敬宗因謂世南曰李倉曹以善人物乃得此名雖為美事然非雅號曰君既言成准的宜有以改之答曰卿言是也昔任彥升善談經籍梁代稱為五經笥今目倉曹為人物志可乎杜如晦等咸以為佳又曰蔣乂幼好學德宗嘗幸凌煙閣見左壁頽剝上有殘缺文記每行可辨三五字命録之以問宰臣宰臣卒然無以對遽召乂訪之對曰此聖歷年侍臣圖贊也暗誦諷不失一字宰臣上奏德宗歎曰虞世南暗寫列女傳無以加也國語曰晉文公使趙衰為卿辭云雲欒枝貞慎先軫有謀胥臣多聞皆可以為輔也孟子曰人皆知糞其田而莫知糞其心何謂糞心博學多聞也莊子曰惠施多方其書五車稱連環可解袁子正書曰學莫大於博行莫過於約聖人者天下之至智也博學以聚之兼聽而辨之抱朴子曰洪年十六始習孝經論語易但貪廣覽於衆書曾披涉自正經諸史百家之言近將萬卷又曰夫周公上聖而日讀百篇仲尼天縱而韋編三絶墨翟大賢載文盈車仲舒命世不窺園圃倪寬帶經以藝鋤路生截蒲以寫書黃霸桎梏以受業寧子夙夜以倍功故能究覽玄奧窮測微言典論曰孔融陳琳王粲徐幹阮禹應瑒劉楨七子者於學無所遺於文無所假文士傳曰張華窮覽古今嘗徙居有書三十乘金樓子曰丘遲出為永嘉郡公祖道於東都亭敬子沈隱侯俱至丘云少來搜集書史頗得諸遺書無復首尾或失名姓凡有百餘卷皆不得可知今併欲焚之二客乃謂主人云可皆取出共看之傅金紫末至二客以向諸書示之傅乃發擲剖判皆究其流出所得三分有二賓客咸所悅伏國朝傳記曰太宗嘗出行有司請載副書以從上曰不須虞世南在此行祕書又曰太宗稱虞監博聞德行書翰詞藻忠直一人而已兼是五善博物家語曰夫子曰子産於民為惠主於學為博物吾以兄事之也左傳昭元年曰晉侯有疾鄭伯使公孫僑如晉聘且問疾叔向問焉曰寡君之疾病卜人曰實沈臺駘為崇史莫之知敢問此何神也子産曰昔高辛氏有二子伯曰閼伯季曰實沈居于曠林不相能也日尋干戈以相征討后帝不臧遷閼伯于商丘主辰商人是因故辰為商星遷實沈于大夏主參唐人見因以服事夏商其季世曰唐叔虞當武王邑姜方震太叔夢帝謂己余命而子曰虞將與之唐屬諸參而蕃育其子孫及生有文在其手曰虞遂以命之及成王滅唐而封太叔焉故參為晉星由是觀之則實沈參神也昔金天氏有裔子曰昧為玄冥師生元格臺駘臺駘能業其官宣汾洮障大澤以處大原帝用嘉之封諸汾川沈姒蓐黃實守其祀四國臺駘之後今晉主汾而滅之矣由是觀之則臺駘汾神也抑此二者不及君身山川之神則水旱癘疫之災於是乎榮之日月星辰之神則雪霜風雨之不時於是乎禜之若君身則亦出入飲食哀樂之事也山川星辰之神又何為焉僑聞之君子有四時朝以聽政晝以訪問夕以修令夜以安身於是乎節宣其氣勿使有所壅閉湫底以露其體茲心不爽而昏亂百度今無乃一之同四時也得生疾矣僑又聞之內官不及同姓內官嬪御其生不殖殖長也美先盡矣則相生疾同姓之相與先美矣美極則盡盡則生疾之君子是以惡之故志曰買妾不知其姓則卜之違此二者古之慎也一四時取同姓二者古人所慎男女辨姓禮之大司也辨別也今君內實有四姬焉同姓姬四人其無乃是也乎若由是二者弗可為也已為治也四姬有省猶可無則必生疾矣據異姓去同姓故言省叔向曰善哉𦙝未之聞也晉侯聞子産之言曰博物君子也重賄之又昭七年傳曰子産聘于晉晉侯疾韓宣子逆客私焉私語曰寡君寢疾於今三月矣並走群望晉所望祀山川皆走往祈禱有加而無瘳今夢黃熊入於寢門其何厲鬼也對曰以君之明子為大政其何厲之有昔堯殛鯀于羽山羽山在東海祝其縣西南其神化為黃熊以入于羽淵實為夏郊三代祀之鯀禹父夏家郊祭之歷殷周二代又通在群神之數并見祀晉為盟主其或者未之祀乎言周衰晉為盟主得佐天子祀群神韓子祀夏郊祀鯀晉侯有間間差也賜子産莒之二方鼎方鼎莒所貢漢書曰張安世字子孺給事尚書上幸河東亡書三篋詔問莫能知唯安世識之具作其事後求得書以相校無所遺失上奇其材擢尚書令晉書張華傳曰人有得鳥毛長三丈以示華華見慘然曰此謂海鳧毛也出則天下亂矣陸機嘗餉華鮓于時賓客滿座華發器便曰此龍肉也衆未之信華曰試以苦酒濯之必有異既而五色光起機問鮓主果云園中茅積下得一白魚質狀殊常以作鮓過美故以相獻武庫封閉甚密其中忽有雉雊華曰此必蛇化為雉開視雉側果有蛇蛻焉吳郡臨平岸崩出一石鼓槌之無聲帝以問華華曰可取蜀中桐材刻為魚形扣之則鳴矣於是如其言果聲聞數里初吳之未滅也斗牛之間常有紫氣道術者皆以吳方強盛未可圖也唯華以為不然及吳平之後紫氣愈明華聞豫章雷煥妙達象緯要之宿因登樓仰觀煥曰寶劍之氣耳在豫章豐城因以煥為豐城令使求之煥到縣掘獄屋基得雙劍其夕斗牛間氣不復見焉煥以南昌西山北巖下土以拭劍光芒艷發遣使送一劍并土與華留一自佩華以南昌土不如華陰赤土因以華陰土一斤致煥煥更以拭劍倍益精明又魏時殿前鍾忽大鳴震駭者華云此蜀山毀故鍾鳴尋蜀郡上其事也又曰武帝常問摯虞三日曲水之義虞對曰漢章帝時平原徐肇以三月生三女至三日俱亡材人以為怪乃招攜之水濱洗祓遂因水以泛觴其義起此帝曰必如所談便非好事束晢進白虞小生不足以知臣請言之昔周公城洛邑因流水以泛酒故逸詩云羽觴隨波流又秦昭王以三日置酒河曲見金人奉水心之劍曰令君制有西夏乃霸諸侯因此立為曲水二漢相緣皆為盛集帝大悅賜晳金五十斤時有人於嵩高山得竹簡一枚上兩行科斗書傳以相示莫有知者司空張華以問晢晢曰此漢明帝顯節陵中策文也檢驗果然時人伏其博識又曰桓溫伐蜀初諸葛亮造八陳圖於魚復下砂上壘石八行相去二丈溫見之謂此常山蛇勢也文武皆莫能識之又曰荀勗嘗在帝坐進飯謂在坐人曰此是勞薪所炊咸未之信帝遣問膳夫乃云實用故車腳舉世伏其明識宋書曰何承天博見古今為一時所重張永嘗開玄武湖遇古冢冢上得一銅斗有柄文帝以訪朝士承天曰此亡新威斗王莽三公亡皆賜之一在冢外一在冢內時三台江左者唯甄邯為大司徒必邯之墓俄而又啓冢內更得一斗復有一石銘大司徒甄邯之墓蕭子顯齊書曰東海王摛亦史學博聞歷尚書左丞竟陵王子良校試學士唯摛問無不對永明中天忽黃色照地衆莫能解摛云是榮光世祖大悅梁書裴子野傳曰時西北遠邊有白題及滑國遣使由岷山道入貢此二國歷代弗賓莫知所出子野曰漢潁陰侯斬胡白題將一人服虔注曰白題胡也又漢定遠侯擊虜入滑此其後乎時人服其博識又曰樂藹為御史中丞時長沙宣武王將葬而車府忽於庫失油絡欲推主者藹曰昔晉武庫火張華以為積油萬石必燃今庫若有灰非吏罪也既而檢之果有積灰時稱其博物弘恕三國典略曰齊徐之才見有人以五色班蘭骨為刀把者之才曰此人瘤也問所得處云於冢見髑髏骨長數寸試削視有文理故用之又曰周平蜀還得樂器者皆莫之識大常少卿斛斯澄直陵切見之曰此錞于也人弗之信澄遂依干寶周禮注以芒筒捋之其聲極振衆乃歎服澄取以合樂焉隋書曰崔頤大業四年從駕汾陽宮次河陽鎮藍田令王曇於藍田山得一玉人長三尺四寸著大領衣冠幘奏之詔問群臣莫有識者頤答曰謹案漢文以前未有冠幘即是文帝以來所制作也臣見魏大司農盧元明撰嵩山廟記云有神人以玉為形像長數寸或出或隱出則世延長伏惟陛下應天順民定鼎嵩雒嶽神自見臣敢稱慶因再拜百官畢賀天子大悅賜縑二百國語曰海鳥爰居止於魯東門之外三日臧文仲使國人祭之文仲不知以為神展禽曰越哉臧孫之為政也越迂也言其迂闊不知所要也夫祀國之大節也而節政之所成也故慎制祀以為國典今無故而加典非政之宜也夫聖王之制祀也功施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能扞大患則祀之非是族也不在祀典今海鳥至己不知而祀之以為國典難以為仁且智矣夫仁者講功而智者處物無功而祀之非仁也不知而不問非智也今茲海其有災乎夫廣川之鳥獸恆知而避其災也是歲也海多大風冬暖爰居所避文仲聞柳下季之言使書以為三策策簡書也三篋三卿卿一通也謂司馬司徒司空又曰季桓子穿井獲如土缶其中有羊焉使問之仲尼曰吾穿井而獲狗何也獲羊言狗者以孔子博物測也對曰以丘之所聞羊也丘聞之木石之怪曰夔蝄蜽水之怪曰龍罔象土之怪曰墳羊又曰吳伐越隳會稽獲骨一節專車骨一節其長專車專壇也吳子使來好聘問之仲尼仲尼曰丘聞之禹致群臣於會稽之山防風氏後至禹殺而戮之防風汪茫氏君之名建命後至故禹殺之陳尸為戮其骨專車焉此為大矣客曰敢問誰守為神仲尼曰山川之靈足以紀綱天下者其守為神紀綱天下謂名山大川龍興雲致雨以利天下社稷之守為公侯封國立社稷而山川之祀者為諸侯令守之是公侯皆屬於王者客曰防風何守仲尼曰汪茫氏之君汪芒長翟國名守封嵎山者也封封山嵎嵎山在今吳郡永安縣也為七姓柒汪芒氏之姓在虞夏商為汪茫氏於周為長翟周世其國北遷為長翟今為大人今孔子時客曰人長之極幾何仲尼曰僬僥氏長三尺短之至也僬僥西南蠶之別也長者不遇十之數之極也十之三丈則防風氏又曰仲尼在陳有隼集于陳侯之庭而死楛矢貫之石砮其長尺有咫隼鷙鳥鶚也楛木名砮鏃也石為之八寸曰咫楛矢貫之墜而死也陳惠公使以隼如仲尼之館問之惠公哀公之孫悼太子之子吳也仲尼曰隼之來也遠矣此肅慎氏之矢也肅慎北夷之國昔武王克商通道于九夷八蠻使各以其方賄來貢使無忘職業於是肅慎氏貢楛矢石砮其長尺有咫先王欲昭其令德之致遠物也故銘其栝曰肅慎氏貢楛矢以分大姬配虞胡公而封諸侯分矛也大姬武王元安胡公舜後虞遏父之子胡滿古者分同姓以寶玉所以展親也展重若夏后氏氏之璜也異姓以遠方之職貢使無忘服也故分陳以肅慎氏之貢陳僞姓君若使有司求諸故府其可得也故府舊府使求得之金櫝如之家語曰楚昭王渡江江中有一物大如斗員而赤直觸王舟舟人取之王大怪之遍問群臣莫能識使使聘於魯問孔子孔子曰此萍實也唯霸者為能獲之使者返王食之大美久之使來以告魯大夫大夫因子游問曰何以知其然曰吾昔之鄭過陳之野聞童謠曰楚王渡江得萍實大如斗赤如日剖而食之甜如蜜此是武王之應也益部耆舊傳曰蜀郡張寬漢武帝時為侍中從祀甘泉至渭橋有女子浴於渭水乳長七尺上怪其異遣問之女曰帝後第七車知我所來時寬在第七車對曰天皇主祭祀者齊戒不嚴則女人見郭璞注山海經曰漢宣帝使人上郡發盤石石室中得一人徒祼被髮反縛祴一足以問群臣莫能知劉子正對曰昔二負之臣曰免與二負殺窫窳帝乃括之於踈屬之山括繫縛也音適桎其右足反縛兩手繫之山上盤石之下宣帝大驚於是時人爭學山海經國朝傳記曰潤州得玉磬十二以獻張率更叩其一曰是晉某歲所造又有人於古墓中得銅物似琵琶而身正圓元行冲云此阮咸所造事並具樂部
