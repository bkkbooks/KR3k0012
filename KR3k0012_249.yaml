body:
  text: 職官部四十六王師漢書曰王式字翁思東平人為昌邑王師昭帝崩邑王嗣立以行淫亂廢昌邑群臣皆下獄治事使者責問曰師何以無諫書式對曰臣以詩三五百篇朝夕授王至於忠臣孝子之篇未嘗不為王反覆誦之臣以三五百篇諫是以無諫書使者以聞亦得減死論王傅後漢書曰皇太子彊求乞自退封東海王故重選官屬以杜林為王傅從駕南巡狩時諸王傅數被引命或多交遊不得應詔唯林守慎有召必至餘人雖不見譴而林特受賞賜又辭不敢受帝益重之吳志是儀字子羽北海營陵人也南魯二宮初立儀以本職領魯王傅儀嫌二宮相近切乃上疏曰臣竊以魯王天挺懿德兼資文武當今之宜宜鎮四方為國藩輔宣揚德美廣耀威靈乃國家之良規海內所瞻望但臣言辭鄙野不能究盡其意愚以二宮宜有降殺正上下之序明教化之本書三四上為傅盡忠動輒規諫事上勤與人恭不治産業不受施惠為屋舍才足自容鄰家有起大宅者權出望見問起大室者誰左右對曰似是儀家也權曰儀儉必非問果他家其見知信如此唐書曰丘悅河南陸渾人亦有學業景龍中為相王府掾與文學韋利器典籤裴耀卿俱為王府直學士睿宗在藩甚重之官至歧王傅開元初卒撰三國典略三十卷行於時王友晉中興書曰謝尚字仁祖司徒左西屬為會稽王友北史曰蕭大圜除滕王逌友逌嘗問大圜曰吾聞湘東王作梁史有之乎餘傅乃可抑楊帝紀奚若隱則非實記則攘羊對曰言之者妄耳如使有之亦不足怪昔漢明為世祖紀章帝為顯宗紀殷鑒不遠足為成例且君子過如日月之蝕彰於四海安得而隱之如有不彰亦安得不隱蓋子為父隱直在其中諱國之惡抑又禮也逌乃大笑殷浩別傳曰會稽王少著名譽友學之舉必極有德以浩為友山公啓事曰近啓修武令劉訥補南陽王友詔曰友誠宜得有益者然以長吏治民不宜屢易為疑令散人無依仰又啓今者職散中誠自有人然劉訥才志外內非稱臣以為宜蒙此者是以啓及不審固可用不詔可爾所啓王侍讀隋書曰楊汪字元度勤學專精左氏傳通三禮解福周冀王侍讀王甚重之每曰王侍讀德業優深孤之穆生也唐書曰姚思廉初為代王侍讀屬義師入京城時府寮駭散唯思廉侍王不離其側義師入殿門思廉謂之曰唐公舉兵本匡王室卿等不宜無禮於王衆服其言於是布列階下須臾太宗至聞而義之許其扶王至順陽閣下泣拜而去觀者咸歎曰忠烈之士也仁者有勇此之謂也太宗居藩引為文學及親征徐圓朗思廉時在洛陽太宗嘗從容言及隋亡之事慨然歎曰姚思廉不懼兵刃以明大節求諸古人亦何以加也因寄物百假遺其書曰想卿節義之風故有斯贈王文學魏志曰中山恭王褒每讀書文學左右常恐以精力為病數諫止之不能廢也文學坑輔相與言曰受詔察王舉措有過當奏及有善亦宜以聞遂共表陳褒美褒聞之大驚責讓文學曰修身自守常人之行耳而諸君以上聞適增其負纍也晉書曰鄭袤魏武帝初封諸子為侯精選賓友袤與徐幹俱為臨淄文學晉諸公讚曰扶風王年八歲聰明善詩賦中表奇之魏烈祖以為齊王芳文學長沙耆舊傳曰太尉李公時為荊州刺史下辟書夫採名珠求之於蚌欲得名士求之文學或割百蚌不得一珠不可捨蚌求之於魚或百文學不出奇士不可捨文學求之於斗筲也由是言之蚌乃珠之所藏文學亦士之場矣郡國相東觀漢記曰吳祐字季英陳留人遷膠東相政唯仁簡以身率物民有相爭訴者輒閉閣自責然後科其所訟以道譬之或身到閭里重相和解自是之後爭隟省息吏民不欺又曰魯平字叔陵拜趙相為政尚寬惠禮讓雖有官不廢教授門人常有數百關東號曰五經復興魯叔陵後漢書曰張禹遷下邳相徐縣北界有蒲陽坡東觀記曰坡水廣二十里徑直百里在道西其東有田可萬傾坡與陂同傍多良田而堙廢莫修禹為開水門通引灌溉遂成熟田數百頃勸率吏人假與種糧親自勉勞遂大收穀實鄰郡貧者歸之千餘戶室廬相屬其下成市後歲至墾千餘頃人用溫給又曰趙咨應召復拜東海相之官道經榮陽令燉煌曹皓咨之故孝廉也咨為燉煌太守時皓薦為孝廉迎路謁候咨不為留皓送至亭水次望塵不及謂主簿曰趙君名重今過界不見必為天下笑即棄印綬追至東海謁咨畢辭歸家其為時人所貴若此謝承後漢書曰東郡趙咨為東海相人遺其雙枯魚噉之二歲不盡以儉化俗魏志曰初曹公為兗州以東平畢諶為別駕張邈之叛也邈劫諶父母弟妻子公謝遣之曰卿老母在彼可去諶頓首無二心公嘉之為之流涕既出遂亡歸及邈敗生得諶衆為諶懼公曰夫人孝於其親者豈不亦忠於君乎吾所求也以為魯相又曰太祖光和末黃巾起拜騎都尉討頴川賊遷為濟南相國有十餘長吏多阿附貴戚贓污狼籍於是奏免其人禁斷淫祀奸究逃竄郡界肅然蜀志劉備領平原相郡民劉平素輕先主恥為之下使客刺之客不忍刺語之而去其得人心如此晉書曰文帝輔政阮籍常從容言於帝曰平生曾遊東平縣樂其風土帝大悅即拜東平相籍乘驢到郡壞府舍屏障使內外相望法令清簡旬日而還又曰阮神遷平原相時襄邑衛京自南陽太守遷於河內與神俱拜帝望而歎曰二千石皆若此朕何憂乎九州春秋曰孔融為北海相一朝殺部督郵會稽典録曰駱俊字孝遠烏傷人孝靈皇帝擢拜陳相汝南葛陂盜賊並起陳與接境四面受敵俊厲吏民為之保鄣出倉見穀以贍貧民鄰郡士庶咸往歸之身捐俸祿給其衣食民有産子常勑主者厚致米肉生男女者輒以駱為名國郎中令漢書曰龔遂字少卿山陽人以明經為官至昌邑郎中令事王賀賀動作多不正遂為人忠厚剛毅有大節內諫諍於王外責傳相引經義陳禍福至於涕泣謇謇無已面刺王過王至掩耳起走曰郎中令善愧人及國中皆畏憚之王又與騶奴宰人遊戲飲食賞賜無度遂入見王涕泣𣍿行左右侍御皆出涕王曰郎中令何為哭遂曰臣痛社稷之危也又曰周勃等共誅諸呂迎代王郎中令張武等議皆曰不可信願稱疾無往以觀其變中尉宋昌進曰群臣之議皆非願大王勿疑也代王遣太后薄昭見勃勃等俱言所以迎立王者昭還報信矣王笑謂宋昌曰果如公言乃令宋昌驂乘張武等乘傳詣長安群臣奉法駕代邸皇帝即日夕入未央宮夜拜宋昌為衛將軍領南北軍張武為郎中令行殿中續漢書曰皇子封王其郡為國每國置郎中令一人秩千石掌王夫人郎中宿衛官也魏志曰袁渙為魏國郎中令及卒太祖為之流涕穀二千斛一教以太倉穀千斛賜郎中令家一教以垣下穀千斛與卿家外不解其意教曰以太倉穀者官法也以垣下穀者親舊也晉中興書曰顧榮時在洛者唯陸機陸雲及榮唯三人而已機雲雖有才藻不及榮也以南土秀望補吳王郎中令沈約宋書曰宋國初建當置郎中令高祖難其人謂傅亮曰今用郎中令不可減袁曜卿也既而曰吾得其人矣乃以王惠居之續搜神記曰會稽朱弼為王國郎中令營立第舍未成而卒同郡謝子木代其事以弼死亡乃定簿書多張功費長百餘萬以其贓誣弼而實入子木子木夜寢忽聞有人道弼姓字者俄頃而到子木堂前立謂之曰卿以枯骨腐肉專可得誣當以某日夜更相書言終忽然不見陸機詣吳王表曰臣本吳人靖居海隅朝廷欲抽引遠人綏慰遐外故太傅所辟殿下東到淮南發詔以臣為郎中令國中尉史記曰魯申公弟子為博士十餘人孔安國至臨淮太守徐偃為膠西中尉其治官皆有廉節稱其好學漢書曰鄭當時字莊陳人也稍遷為魯中尉又曰梁孝王招延四方豪傑齊人公孫詭多奇計初見曰王賜千金官至中尉號曰公孫將軍續漢書曰清河王小心恭孝特見親愛後諸王就國鄧太后詔特清河國置中尉內史賜乘上御物焉漢舊儀曰帝子為王王國置太傅相公尉各一人秩二千石以輔王三輔決録曰淮陽憲王宣帝愛子器異其才欲以為嗣王恃寵自驕天子乃用韋玄成為中尉以輔導之受詔與蕭望之等論五經同異於石渠閣邵氏家傳曰邵弘字德𥙿時景帝為琅邪王詔書高選官屬請君為中尉君為人體素方嚴儀容甚偉雖私門接對僮僕儼然不厲而威王甚憚焉王常候君晝息身隨使者潛至君舍令使者進曰王有令君徐理鬢冠履俯伏盡禮然後讀之王與使者群立瞻聽為之歎息曰古人稱不愧于屋漏其邵中尉乎吾反逆詐以試長者豈不陋哉王虛心受納欣宴言話晝夜無休君乃上書諫王王讀三四瞿然失色後謂左右曰思邵中尉之言使人于今毛豎國常侍漢書曰龔舍字君倩少好學明經楚王入朝聞舍高名聘為常侍不得已隨王歸國晉春秋曰甘卓字季思察孝廉為吳王晏常侍國侍郎王隱晉書曰孫秀琅邪國書佐為趙王倫國侍郎桓談新論曰宣帝元康神爵之間丞相奏能鼓雅瑟者渤海趙定梁國龍德召見溫室拜為侍郎府長史漢書曰張湯為御史大夫為三長史朱買臣等所譖帝遣杜周詰湯湯欲對周曰君為大臣今被責詰何用對為於是自殺臨死上書曰譖臣者三長史也帝追惜湯悉誅三長史又曰趙充國從二師將軍擊胸奴身被二十餘瘡武帝視而嗟嘆遷車騎長史晉書曰劉輿為魏郡太守東海王越將召之或曰輿猶膩也近則汙人及至越疑而御之輿密視天下兵簿及倉庫牛馬器械水陸之形皆默識之是時軍國多事每會議自潘滔以下莫知所對輿既見越應機辨畫越顧睞酬接即以為左長史又曰劉輿為東海王越左長史越既秉政時賓客滿筵文案盈几遠近書記日有數千終日不倦或以夜繼之皆人人歡暢莫不悅附命議如流酬對款備時人服其能比之陳遵時越府有三才潘滔大才劉輿長才裴邈清才晉中興書曰王獻之少有清譽亦善隸書後將軍謝安請為長史甚欽愛之又曰薛兼字令長與同郡紀瞻等初入洛張華歎曰皆南金也屢遷至丞相右長史兼恪勤王事以佐祿秩優泰每約損辭讓以周貧而已宋書曰阮萬齡陳留尉氏人萬齡少知名自通直郎為孟昶建威府長史時袁豹江夷相繼為昶司馬時人謂昶府有三府齊書曰庾杲之出為王儉衛軍長史時人呼儉府為入芙蓉池又曰陸慧曉為晉熙王冠軍長史慧曉歷輔五政治身清肅僚佐以下造請起送之或謂慧曉曰長史貴重不宜妄自謙屈答曰我性惡人無禮不容不以禮處人又曰陸慧曉遷右長史時陳郡謝朏為左長史府公竟陵王子良謂王融曰我府二上佐求之前世誰可為比融曰兩賢同時便是未有前例崔鴻十六國春秋後趙録曰張躍字世淵清河東武城人也學敏才達雅善清談石勒偉其儀辨拜世子衛軍長史勑世子曰張長史人之表範汝其師之後魏書曰張袞字洪龍上谷沮陽人也好學有文才太祖為代王遷為左長史決策幃幄太祖器之禮遇優厚南史曰孔覬除安陸王子綏後軍長史性使酒恃氣每醉輒彌日不醒僚類間多所凌忽尤不能曲意權幸莫不畏而嫉之居常貧罄無有豐約未嘗開懷為府長史典籤咨事不呼前不敢前不令去不敢去雖醉日居多而曉明政事醒時判決未嘗有壅衆咸云孔公一月二十九日醉勝他人二十九日醒也孝武每欲引見遣人覘其醉醒隋書曰衛玄初仕周武帝親揔萬機拜益州揔管府長史賜以萬釘寶帶唐書曰和元祏為千牛衛長史先是元祏獻詩十首其詞猥陋皆寓言嬖幸而意及兵戈韋氏命拘於大理而將戮月餘而韋氏就誅其詩言若合符讖故上聞而拜之魏武故事載令曰府長史王必是吾披荊棘時吏也忠能勤事心如鐵石國之長吏也蹉跌久不辟之捨騏驥而不乘焉惶惶而更求哉今故教辟之陶氏家傳云猷字恭豫王導以君江東俊望請為右軍長史君恪勤王事每當朝日恆夙興就路及到府門輒先衆僚為人美容止善談論亦以此見稱當世焉府司馬左傳曰季氏以公鉏為馬正馬正家司馬也慍而不出閔子馬見之曰閔子馬閔馬父也子無然禍福無門惟人所召為人子者患不孝不患無所所位處也恭敬父命何常之有言廢置在父無常位公鉏然之恭敬朝夕恪居官次家語曰鄉射曰孔子觀於鄉射於是退而與門人習射於矍相之圃蓋觀者如堵墻焉射至於司馬使子路執弓矢出延射者子路為司馬故射至於子路使出延射魏略曰諸葛誕伐吳戰于東關上欲速進軍司馬王儀諫曰吳賊必有伏宜持重不可進上不聽果為吳人所覆儀曰今日之敗誰當其咎上曰司馬欲委罪孤耶遂法儀晉書曰石苞為景帝中護軍司馬宣帝聞苞好色薄行以讓帝帝答曰苞雖細行不足而有經國才略夫廉貞之土未必能經濟世務是以齊桓忘管仲之奢僣而録其匡合之大謀漢高舍陳平之污行而取其六奇之妙算苞雖未可以上儔二子亦今日之選也懿乃止晉陽秋曰晉陵人韋敻桓修令於坐相劉𥙿仕官當至州不敻云劉粗是有相人當不失邊州刺史既出私於𥙿曰卿大有貴相向不敢極言耳𥙿惡其言末略答曰卿狂言驗當相用為司馬義旗後數年敻見𥙿訴曰周成不負桐葉之信公不應忘司馬之言今不希鎮軍府聞護軍司馬鈌願賜卒恩𥙿美而用之晉中興書曰中宗為安東將軍鎮下邳請王導為司馬軍國之事無不咨訪中宗遷鎮建康導為司馬委以政事于時朝野傾心號曰仲父導忠於事上達於從政以百六之弊寄寓江左為治之本務在清靜沈約宋書曰羊徽被遇於高祖高祖謂咨議參軍鄭鱗之曰羊徽一時美器世論猶在兄後恨不識之拔補右將軍劉蕃司馬後魏書曰辛祥為并州平北府司馬有白壁還兵藥道顯被誣為賊官屬推據咸以為然祥曰道顯面有悲色察獄以色其此之謂乎苦執申之月餘別獲真賊世說云謝奕為桓宣武荊州司馬奕既上猶推布衣之交在溫坐岸幘嘯詠無異常日宣武每曰我方外司馬也奕醉溫於許主避之主每曰君若無狂司馬我何由得相見
