body:
  text: 方術部十二相下唐書曰高祖生長安紫氣充庭神光照室體有三乳左腋下有紫志如龍初有善相者史良言於高祖曰公骨法非常必為人主至於命也非所敢知久之史良復遇高祖乃大驚曰骨法如舊年壽之相頓異昔時勿忘鄙言願深自愛高祖心益自負又曰隋尚食奉御郭弘道字大寶弘農華陰人也性寬厚如愚而內敏仕隋歷通事舍人滄州長史煬帝時征為奉御時高祖為殿內少監深善之亟相往來情契愈昵弘道善相因言曰公天中伏犀下相接於眉此非人臣之相願深自愛高祖取弘道銀盆置之於地引弓射之謂弘道曰向言有驗當一發中之既發應弦而中弘道曰願公事驗之後賜償金盆高祖大悅又曰太宗年四歲時忽有書生自言善相詣高祖門曰公是貴人有大貴子因目太宗曰龍鳳之姿天日之表也公之貴以此兒後必由之而創功業年將二十必能濟世安民高祖聞其言甚懼及書生辭出使人捕欲殺之以滅口而不知所在高祖以為神陰採濟世安民之義遂以名焉又曰乙弗弘禮貝州高唐人也隋煬帝居藩召令相己弘禮跪而賀曰大王骨法非常必為萬乘之主誠願誡之在德煬帝即位召天下道術人置坊以居之仍令弘禮統攝帝見海內漸亂玄象錯謬內懷憂恐嘗謂弘禮曰卿昔相朕其言已驗且占相道術朕頗自知卿更相朕終當何如弘禮逡巡不敢答帝迫之曰卿言與朕術不同罪當死弘禮曰臣本觀相書凡人之相有類於陛下者不得善終臣聞聖人不相故知凡聖不同耳自是帝常遣人監之不得與人交言又曰則天初在襁褓袁天綱來第中謂其母氏曰唯夫人骨法必生貴子乃召諸子令天綱相之見元慶元爽曰此二子皆保家之主官可至三品見韓國夫人曰此女亦大貴然不利其夫乳母時抱則天衣男子之服天綱曰此郎君子神形爽徹不易可知試令行看於是步於床前仍令舉目天綱大驚曰龍睛鳳頸貴人之極也更轉側視之曰若是女後當為天下之主也又曰乙拂弘禮善占相初泗州剌史薛大鼎隋時嘗坐事沒為奴貞觀初與數人詣弘禮次至大鼎曰君奴也欲何所相咸曰何以知之弘禮曰觀其頭目真是賊人但不知餘處何如耳大鼎有慚色乃解衣視之弘禮曰看面不異前言占君自腰已下當為方嶽之任其占相皆此類也貞觀末卒焉又曰袁天綱成都人也尢工相術以大業元年至洛陽時杜淹王圭韋挺就之相天綱謂淹曰公蘭臺成就學堂寬博必得親糾察之官以文藻見知謂王曰公三亭成就天地相臨從今十年已外必得五品要職謂韋曰公面似大獸之面交友極誠必得士友攜接初為武職復語淹等二十年外終恐三賢同被責黜暫去即還淹尋遷侍御史武德中為天策府兵曹文學館學士王圭為太子中允韋挺隋末與隱太子友善後太子引以為率至武德六年俱配流嶲州淹等至益州見天綱曰裘公洛邑之言則信矣未知今日之後何如天綱曰公等骨法大勝往時終當俱受榮貴至九年被召入京共造天綱天綱謂杜公曰當即得三品要職年壽非天綱所知王韋兩公在後當得三品官兼有年壽然晚途皆不稱愜韋公尢甚淹至京拜御史大夫撿校吏部尚書王圭尋授侍中出為同州剌史韋挺歷御史大夫大常卿貶授象州剌史皆如天綱之言大業末竇軌客遊德陽嘗求問天綱天綱謂曰君額上伏犀貫玉枕輔角又成必於梁益州大樹功業武德初軌為益州行臺僕射引天綱深禮之天綱又謂軌曰骨法成就不異往時之言然目氣赤脈貫瞳子語則赤氣浮面如為將軍恐多殺人願深自誡慎武德九年軌坐事被徵將赴京謂天綱曰更得何官曰面上家人坐仍未見動輔角右畔光澤更有喜色至京必承恩還來此任其年果重授益州都督貞觀八年太宗聞其名召至九成宮時中書舍人岑文本令視之天綱曰舍人學堂成就眉覆過目文才振於海內頭又生骨猶未大成若得三品恐是損壽之徵文本官至中書令尋卒其年侍御史張行成馬周同問天綱天綱曰馬侍御伏犀貫腦兼有玉枕文背如負物當富貴不可言近古已來君臣道合罕有如公者公面色赤命門色暗耳後骨不起耳無根只恐非壽者周後位至中書令兼吏部尚書年四十八卒謂行成曰公五嶽四瀆成就下亭豐滿得官雖晚終居宰輔之地行成後至尚書右僕射天綱相人所中皆此類也申國公高士廉嘗謂曰君更作何官天綱曰自知相命今年四月盡矣果至是月而卒又曰劉仁軌初為陳倉尉相工袁天綱謂曰君相當位鄰台輔年將九十後果如其言又曰張憬藏許州長社人少工相術與袁天綱齊名太子詹事蔣儼年少時常遇憬藏因問緑命憬藏曰公從今二年當得東宮掌兵之官秩未終而免職免職之後厄在三尺土下又經六年據此合是死徵而後當享富貴名位俱盛即又不合中夭至六十一為蒲州剌史十月三十日午時祿絶儼後皆如其言嘗奉使往高麗被莫離支困於地窖中經六年然後得歸及在蒲州年六十一矣至期召人吏及妻子與之告別云當死俄而有勑許令致仕左僕射劉仁軌微時嘗與鄉人靖思賢各齎絹贈憬藏以問官緑憬藏謂仁軌曰公居五品要官雖暫解黜終當位極人臣仁軌後自給事中坐事令白衣海東效力固辭思賢之贈曰公當孤獨客死及仁軌為僕射思賢尚存謂人曰張憬藏相劉僕射則妙矣吾今已有三子田宅自如豈其言亦有不中也俄而三子相次而死盡貨田宅寄死於所親園內憬藏相人之妙皆此類竟不仕壽終又曰高智周之少也與來濟郝處俊孫處約同遊寓于揚州江都人石仲覽傾産以待之嘗引相工視濟等相工曰四人皆宰相也而石氏不及見焉然來早貴而末途屯躓高晚達而最為壽考夫速登者易顛徐進者少患天之道也仲覽貞觀末為兵部郎中卒後濟等乃貴皆如相工所言又曰金梁鳳不知何許人也天寶十三載客於河西善相人又言玄象時哥舒翰為節度使詔入京師裴冕為祠部郎中知河西留後左武威梁鳳謂冕曰玄象有變半年閒有兵起郎中此時當得中丞不拜中丞即得宰相不離天子左右大富貴冕曰公乃狂言冕何至此梁鳳曰有一日向東京一日入蜀川一日來朔方此時公得相冕懼其言深謝絶之其後安祿山反南犯洛陽僣稱僞位哥舒翰東守潼關纍月奏冕為御史中丞追赴京冕又誥曰事驗矣冕又問三日之兆梁鳳曰東京日即自磨滅蜀川日亦不能久此閒日何轉分明不可說冕志之即潼關失守玄宗幸蜀肅宗北如靈武冕會之勸成策立改元為至德元年冕果為中書侍郎平章事冕奏之肅宗召拜都水使者梁鳳在河隴謂呂諲曰判官骨相亦合得宰相須得一大驚怖即得諲後至驛責讓驛長榜之驛吏武將性粗猛持弓矢突入射諲再發幾中諲面諲逾牆得免以報梁鳳梁鳳曰此必入相逾年諲以黃門侍郎知政事梁鳳在鳳翔李揆盧允二人同見之俱素服自稱選人梁鳳謂之曰公等並至清望官那得云無官揆允以實對梁鳳遣二人行謂揆曰公從舍人即入相一年內事謂允曰公好即是吏部郎中及剋復兩京揆自中書舍人知吏部侍郎事入為中書侍郎平章事乃以允為吏部郎中其驗多此類佯聾以自晦後冕為右僕射兼御史大夫成都尹劍南節度使有進止令將梁鳳行後病卒後周史曰周玄豹者本鄴人少為僧其師有知人之鑑從遊十餘年苦辛無憚師知其可教遂傳其祕旨既長還歸俗盧程寄褐嘗遊于燕與同志二人謁焉玄豹退謂鄉人張殷袞曰適二君子明年花發俱為故人唯彼道士他年甚貴來歲二子果零落於趙魏閒又二十年程登庸於鄴下周書曰師曠見太子晉曰汝聲清浮汝色赤火色不壽王子曰後三年上賓於帝所汝慎母言殃將及汝師曠歸未及三年告死者至孔叢子曰魏安釐王問子順曰馬回之為人雖少文鯁亮直有丈夫大節也吾欲以為相可乎答曰知臣莫若君何有不可至於亮直之節臣未明也聞諸孫卿其為人也長目而豕視者必體方而心員每以其法相人千百不失臣見回然甚疑其目王卒用之三月果詐得罪金樓子曰宣修容善許負之術曾正會登樓還語人曰太尉今年必當不濟時靜惠王尚康勝或以為不然曰行步向前氣韻殊下若其不爾不復言相至其年末靜惠王薨及昭明入朝又云必無嗣立之相俄而昭明薨孫卿子曰古者有姑布子卿今世之梁有唐舉相人形狀顏色而知其吉凶世俗稱之相形不如論心論心不如擇術形不勝心心不勝術術正而心從之則形相惡無害為君子也形相雖善而心術惡無害為小人符子曰楚成王生太子商臣乃召楚之善相者相之楚巫相之已而言於楚王曰子吉矣而王不吉臣聞鴟梟者食母而飛非其子之不吉但其母為之災今太子非子之不吉但其王為之災耳楚王怒而殺之論衡曰世人固有身瘠而志立體小而名高者於聖則否是以堯眉八采舜目重瞳禹耳參漏文王四乳然則世亦有四乳者此則駑馬一毛似驥耳又曰宋臣有公孫呂者長七尺面長三尺廣三寸名震天下若此之狀蓋遠代而求非一世之異也使形殊於外道合其中名震天下不亦宜乎語云無愛而戚憂必及之無慶而歡樂必還之此心有先動而神有先知則色有先見也故扁鵲見桓公知其將亡申叔見巫臣知其竊妻而逃也荀子以為天不知人事邪則周公有風雷之災宋景有三次之福知人事乎則楚昭有弗榮之應邾文無延期之報由是言之則天道之與相占可知而疑不可而無也
