body:
  text: 器物部七瓢方言曰蠡瓠勺也音禮也陳楚宋魏之間或謂之樹今江東呼勺為樹或謂之瓢通俗文曰瓠瓢為蠡禮曰合卺音謹而酳三禮圖曰卺取四升瓠中破夫婦各一論語曰賢哉回也一簞食一瓢飲在陋巷人不堪其憂爾雅曰康瓠謂之甈孫炎曰康瓠也郭璞曰瓠壺也賈誼曰寶康瓠是也戰國策曰應侯謂秦昭王曰百人輿瓢而趍不如一人持而走疾百人試輿瓢瓢必裂今秦國華陽穰侯太后用之秦國必裂矣東宮舊事曰漆卺爵二銀鎖連長七尺莊子曰惠子謂莊子曰魏王貽我大瓠之鍾我樹之成而實五石剖以為瓢濩落無所容吾為其無用捨之楚辭九歎曰藏瓠蠡於筐簏瓠瓢蠡瓠東方朔答客難曰以管窺天以蠡測海張晏曰蠡瓢瓠也琴操曰許由無杯器常以手捧水人以一瓢遺之由操飲畢以瓢挂樹風吹樹瓢動歷歷有聲由以為煩擾遂取捐之勺説文曰斗勺也通俗文曰木瓢為斗詩曰惟北有斗不可以挹酒漿又曰酌以大斗大斗長三尺以祈黃耇周禮曰是中璋九寸邊璋七寸射四寸厚寸黃金勺青金外朱中鼻寸衡四寸有繅音早天子以巡守宗祝以前焉杜子春云勺謂酒樽中勺也鄭司農云鼻謂勺龍頭鼻也衡謂勺柄龍頭也鄭玄謂勺鼻流凡流智為龍口也三璋之勺形如玉瓚天子巡守有事山川則用灌焉於大山川則用大璋中山川用中璋於小山川用邊璋也又曰梓人為飲器勺一升勺尊升也禮曰犧恩歌切尊疏布冪音覔樿之演切勺此以素為貴也鄭玄曰樿木白理也又曰勺夏后氏以龍勺殷以疏勺周以蒲勺鄭玄曰龍龍頭也疏道刻其頭也蒲合蒲如鳧頭也漢書曰霍顯之謀行於柸勺東宮舊事曰漆注八合鴨頭勺四論衡曰司南之勺投之於地其柄指南語林曰諸阮以大盆盛酒木勺數枚也束晳貧家賦曰舉短柄之掘勺豐三禮圖曰射為罰爵之豐作人形也豐國名也坐酒亡國戴盂戒酒説文曰豐俎豆貴豐厚也一曰鄉飲酒有豐侯者儀禮曰司射適堂西命弟子設豐將飲不勝設豐以承其爵豐形蓋似豆卑而大之又曰公尊瓦泰兩有豐崔駰酒針曰豐侯沉酒荷罌負缶自戮於世圖形戒後李尤豐侯銘曰豐侯荒繆醉亂迷逸乃象其形為豐戒式後世傳之固無止説禁三禮圖曰棜長四尺廣二尺四寸深寸無足漆赤中青雲畫菱苕華飾禁長四尺廣二尺四寸通局足高三寸漆赤中青雲畫菱苕華飾刻鏤其足為褰帷之形儀禮曰尊於戶間兩甒音武有禁禁承尊之器名之曰禁因為酒戒也又曰尊兩壺于房戶間斯斯禁禁切地無足也禮曰天子諸侯之尊廢禁大夫士棜禁此以下為貴也廢猶去也棜斯禁也無足有似於棜或因名之小耳大夫用斯禁士用棜禁如今方案情悵局食架東宮舊事曰漆食架二食廚禮曰大夫七十而有閣閣以板為之度食物也天子之閣左達五右達五公侯伯於房中五大夫於閣三士於坫一達夾室大夫言於閣與天子同處天子二五倍諧侯也東宮舊事曰漆食廚一具酒臺周禮曰六彝皆有舟鄭司農曰舟下臺也若今時承盤也東宮舊事曰漆酒臺二金塗鐶鈿槽劉伶酒德頌曰先生方棒罌承槽御柸嗽醪杵臼易下繫辭曰斷木為杵掘地為臼臼杵之利萬民以濟蓋取諸小過王肅曰雷起起上杵之象地艮止於下臼之義書曰血流漂杵孔安國曰流而漂舂杵甚之言也一戎衣天下大定禮曰鄰有喪舂不相相送杵聲又曰暢臼以掬杵以梧所以檮鬱鬯椈柏也穀梁傳曰大夫救日擊門士擊杵舂染盛之具示有上下陰陽周易類謀曰間可倚杵鄭玄曰天地相去其間才可倚一杵也春秋繁露曰夏求雨暴杵臼於街十日漢書曰傳咸為南陽太守有猾吏大姓犯令為地臼木杵舂不中程者輒加笞箠又曰江都易王非宮人有過者或髡鉗以鉛杵舂不中程輒掠又曰楚王戊即位胥靡申公白公衣赭衣使雅舂於市東觀漢記曰公沙穆遊太學無資糧乃變服客傭為吳祐賃舂祐與語大驚遂共定交於杵臼之間後漢書曰梁鴻之妻孟光多力能舉石臼又曰馮衍娶北地任氏女為妻悍忌不得畜媵妾兒女常自探井臼王隱晉書曰賈后使小黃門孫慮徙愍懷太子於坊中不與食乃劫服杏子黑丸其夜薨或傳太子不肯服藥伺至廁以藥杵橦害之喚聲聞於外燕書曰昭武帝營新殿昌黎大棘城縣河岸崩出鐵築杵頭一千一百七十枚永樂民郭陵見之詣闕言狀詔曰經始崇殿而築具出人神允協之應賜陵爵關外侯戰國策曰智伯攻趙襄子於晉陽臼竈生蛙於禍切又曰衛人迎新婦婦入室見曰曰徙之牖下妨往來者主人美之河圖曰千歲之後天可倚杵孟子曰盡信書不如無書吾於武成取二三策而已矣仁者無敵於天下以至仁伐至不仁何其血之流杵也呂氏春秋曰伊尹母夢神告之臼出水而東走賈誼書曰黃帝行道炎帝不聽故戰涿鹿之野血流漂杵淮南子曰解門以為薪塞井以為臼雖用小而所喪大矣桓談新論曰伏羲制杵臼之利後世加巧因借身以踐碓而利十倍又曰復設機關用驢羸牛馬及役水而舂其利百倍論衡曰舂者以杵搗臼杵臼鼓動地動地臨池水河水震蕩夫臼杵木也水與木土三者殊類而相應首相叩動其勢然也風俗通曰秦留燕太子丹天為雨粟廚中杵生肉是不然也世本曰雍父作舂杵臼宋志曰雍父黃帝名也湘州記曰棗陽縣有蔡倫宅宅西有一石臼云是倫舂紙臼荊州記曰長沙醴泉縣有山石空空中有石床床頭有臼容五升父老相傳昔有仙人以此合金丹衡山記曰桂英巖上鑿石作臼有鐵杵倚置巖畔石臼邊有兩人腳迹名山記曰羅浮山有道士齎鐵臼杵欲合丹未成而仙化世説曰魏武帝讀曹娥碑云外孫虀臼楊修曰虀臼受辛受辛辭字幽明録曰劉松在家忽見一鬼杖劍斫之鬼走松起逐見鬼在高山巖室上臥仍往逼突群鬼爭走遺置藥杵臼及所餘藥因將還家松為人合藥時臨熟取一經此臼者無不效驗列異傳曰魏郡張舊家巨富復暴衰賣宅與黎陽程應應入居死病相繼賣荊民何文日暮持刀上北堂中至二更有一人長丈餘高冠黃衣來堂前呼問細腰舍中何以有人氣須臾復有一人高冠青衣次又高冠白衣問並如前將曙文下堂如向法呼細腰問曰黃衣者誰曰金也在堂西壁下青衣者誰曰錢也在堂前井西五步白衣誰曰銀也在堂東北任下汝誰也曰我也在竈下至明文按次掘之得金銀各五百斤錢千餘萬取杵焚之宅遂清安魏武上獻帝表曰臣袒騰有順帝賜器今上藥杵臼一具堪爾雅曰堪謂之榩郭業曰堪木質也榩音虔廣雅曰枕質堪也東宮舊事曰太子納妃有石砧一枚又搗衣杵十杵荊州記曰柿歸縣有屈原宅女嬃音須廟搗衣石猶存漢水記曰有女郎搗衣砧也古樂府詩曰藁砧今何在山上復有山藁砧謂失也碓廣雅曰穭碓也穭丁歷切方言曰碓機陳魏宋楚自關而東謂之柩魏略曰司農王思弘作水碓免歸田里晉書曰魏舒遲鈍質朴不為鄉親所重從叔父吏部郎衡有當世名猶不知之使守水碓王隱晉書曰石崇有水碓三十區又曰劉頌為河內太守有公王水碓三十餘區所在遏塞輒為侵害頌表上封諸民獲便宜又曰衛灌為太子少傅詔賜園曰水碓不受又曰鄧攸去石勒投李矩借水碓舂於城東晉諸公讚曰征南杜預作連機碓晉陽秋曰給陳留王碓一區幽明録曰弘農徐儉家有一遠來客寄宿有馬一匹中夜驚跳客不安騎馬而去一物長丈餘來逐馬後客射之聞如中木聲明日尋昨路見箭著一碓柵世説曰王戎既貴且富區宅水碓洛下莫比孔融肉刑論曰賢者所制或踰聖人水碓之巧勝於斷木掘地王渾表曰洛陽百里內舊不得作水碓臣表上先帝聽臣立碓并攙得官地磨説文曰磨莫佐切石磑也磑音五對切釋名曰磑磨也廣雅曰礱磨也方言曰磑或謂之婕即磨也錯碓切通俗文曰粗曰䃀千內刀填音磨曰硐途棟切磨床曰摘直易切魏略曰諸葛亮為衝車圍郝昭於陳倉昭以繩繫石磨羂古犬切其衝車魏志曰管輅字公明平原人也往同村郭思家磑上有鳩食相鬭輅曰不祥思明日射鳩誤中鄰女蜀志曰許靖為許劭排擯以馬磨自給晉書曰王戎為司徒好治産業周遍天下水碓四十所鄴中記曰解飛者石虎時工人造作旃檀車左轂上置磑右轂上置碓每行十里磨麥一石舂米一斛世本曰公輸般作磑諸葛亮別傳曰孫權常饗蜀使費禕音揮停食餅索筆作麥賦恪亦請筆作磨賦異苑曰上黨侯亮之於江都城下獲一磨下有銅馬幽明録曰廣陵有家相傳漢江都王逮之墓也常有村人行過見地有數十具磨取一具持歸暮即叩門求磨甚急明旦送著故處抱朴子曰周髀家云天旁轉如推磨而左行日月右行隨天左轉譬之於蟻行磨上磨左旋而蟻遲故不得不隨磨以右回焉嵇含八磨賦曰外兄劉景宣作為磨奇巧特異策一牛之任轉八磨之重因賦之曰方木矩跱圓質規旋下靜以坤上轉以乾巨輪內建八部外連碾通俗文曰石碢轢穀曰碾碢徒後魏書曰崔亮在雍州讀杜預傳見其為八磨嘉其有濟時用遂教民為碾及為僕射奏於張方橋東堰穀水造水碾磨數十區其利十倍國便之
