body:
  text: 禮儀部十宗廟易萃卦曰王假有廟假至也王以聚至有廟也又渙卦曰風行水上渙先王以享于帝立廟尚書逸篇曰嗚呼七世之廟可以觀德天子立七廟有德之主則為祖宗其廟不毀故可觀德毛詩文王綿曰乃召司空乃召司徒俾立家室其繩則直縮板以載作廟翼翼又閟宮曰新廟弈弈奚斯所作又清廟曰清廟祀文王也周公既成洛邑朝諸侯率以祀文王焉清廟者祭有清明之德者之宮也謂祭文王也天德清明文王象焉故祭之而歌此詩也廟之言貌也死者精神不可得而見伹以生時之居立宮室家貌為之耳成洛邑居攝五年時於穆清廟肅雝顯相於歎辭也穆美肅敬雝和相助也箋云顯光也見也於乎美哉周公之祭清廟也其禮儀敬且和又諸侯有光明著見之德者來助祭周禮春官上曰小宗伯之職掌建國之神位右社稷左宗廟禮記曲禮曰君子將營宮室宗廟為先廄庫為次居室為後又曲禮曰國君之年長曰能從宗廟社稷之事矣幼曰未能從宗廟社稷之事也又王制曰天子七廟三昭三穆與太祖之廟而七諸侯五廟二昭二穆與太祖之廟而五大夫三廟一昭一穆與太祖之廟而三士一廟庶人祭於寢又禮器曰禮有以多為貴者天子七廟諸侯五大夫三士一又文王世子曰五廟之孫祖廟未毀雖及庶人冠娶必告死必赴不忘親也又明堂位曰山節藻梲複廟重檐刮楹達鄉反玷出尊崇坫康珪䟽屏天子廟飾也山節刻欂櫨為山也藻梲謂侏儒柱為藻文複廟重屋也檐承壁材也刮摩也鄉牖屬謂夾戶窗也每室為八窗為四達反坫反爵之坫也出尊當尊南也唯兩君為好既獻反爵其上禮君尊於兩楹之間也嵩高也康讀為元龍之亢屏謂之樹今愚也刻之為雲氣虫獸如今閻上為之又雜記曰成廟則釁之其禮祝宗人宰夫雍人皆爵純衣雍人舉羊升屋中屋南面刲羊血流于前乃降門夾室皆用雞凡宗廟之器其名者成則釁之以猳豚宗廟名器謂罇彝之屬又祭法曰天下有王分地建國置都立邑設廟祧壇墠而祭之乃為親䟽多少之數是故王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之遠廟為祧有二祧享嘗乃止去祧為壇去壇為墠壇墠有禱焉祭之無禱乃止去墠曰鬼諸侯立五廟一壇一墠曰考廟曰王考廟曰皇考廟皆月祭之顯考廟祖考廟享嘗乃止去祧為壇去壇為墠壇墠有禱焉祭之無禱乃止去墠為鬼大夫立三廟二壇曰考廟曰王考廟曰皇考廟享嘗乃止顯考祖考無廟有禱焉為壇祭之去壇為鬼適士二廟一壇曰考廟曰王考廟享嘗乃止顯考無廟有禱焉為壇祭之去壇為鬼官師一廟曰考廟王考無廟而祭之去王考為鬼庶士庶人無廟死曰鬼廟之言貌也宗廟者先祖之尊貌也祧之言超也超上意也封士曰壇除地曰墠書曰三壇同墠又中庸曰武王纘大王王季文王之緒壹戎衣而有天下身不失天下之顯名尊為天子富有四海之內宗廟饗之子孫保之又祭法曰天下有王分地建國置都立邑設廟祧壇墠而祭之左傳桓公曰宋華父督已殺孔父而殺殤公召莊公於鄭而立之以親鄭以郜大鼎賂公夏四月取郜大鼎于宋戊申納于太廟非禮也又桓公曰清廟茅屋以茅飾屋著儉也清廟肅然清靜之稱又僖上曰震夷伯之廟罪之也於是辰氏有隱慝焉又文公下曰太室之屋壞書不恭也又成公三年曰甲子新宮災三日哭宣公神主新入廟故謂之新宮書三日哭善得禮宗廟親之神靈所憑居而遇災故哀而哭之又襄二曰吳子壽夢卒臨於周廟禮也周廟文王廟也周公出文王故魯立其廟也凡諸侯之喪異姓臨於外同姓臨於廟是故魯為諸姬臨於周廟公羊傳文公曰世室屋壞世室者何魯公之廟也周公稱太廟魯公稱世室群公稱宮穀梁傳成公曰新宮災三日哭新宮者禰宮也禰父也成公之父宣公之害也孝經曰宗廟致敬不忘親也又曰為之宗廟以鬼享之宗者尊也廟者皃也先祖之尊皃所居中宮何以為人死精魂歸乎天形體不藏存之即存不存則亡明先祖神死依人也孝經援神契曰廟所以尊祖也論語八佾曰子入太廟每事問或曰孰謂鄒人之子知禮乎入太廟每事問子聞之曰是禮也家語曰孔子在齊景公造焉左右白曰周使至言先王廟災景公曰何王廟孔子曰此必釐王廟夫釐變文武之制而作玄黃華麗之飾故天殃其廟焉有頃左右報所災者釐王廟景公曰善哉聖人之智過人遠矣又曰孔子曰吾於甘棠見宗廟之敬也甚矣思其人猶愛其樹尊其人必敬其道也史記曰秦始皇巡隴西北地出雞頭山過回中應劭曰回中在安定高平孟康注曰回中在北地作信宮渭南更命信宮為極廟象天極廟道通驪山作甘泉前殿築甬道應劭曰築垣墻如街巷又曰高祖崩群臣皆曰高祖起細撥亂令郡諸侯各立高祖廟以歲時祠及孝惠五年思高祖之悲樂沛宮為高祖原廟徐曰光武紀曰上幸豊相高祖於原廟駰謂原再也先既已立廟今又拜立故謂之原也漢書曰惠帝為東朝長樂宮及問往來數蹕煩民作複道方築武庫南叔孫通奏事因請問曰陛下何自築複道高帝寢衣冠月出遊高廟應劭月出高帝衣冠備法駕名遊衣冠子孫奈何乘宗廟道上行哉惠帝懼曰急壞之通曰人主無過舉今已作百姓皆知之後願陛下為原廟渭北衣冠月出遊之益廣宗廟大孝之本上乃詔有司立原廟惠帝嘗出遊離宮通曰古者嘗果方今櫻桃熟可獻願陛下出因取櫻桃獻宗廟上許之諸果獻由此興又曰文帝作顧城廟服虔曰廟在長安城南文帝作還顧見城故名之應劭曰文帝自為之制度畀狹若顧望而成故曰顧城賈誼曰目顧城之廟為天下太宗與漢無極或曰地名也如淳曰身存而為廟若尚書顧命也高祖廟曰原廟文帝廟曰顧城廟景帝廟曰德陽武帝廟曰龍淵昭帝廟曰徘徊宣帝號樂遊元帝廟曰長壽成帝廟曰成陽又曰梅福上書諫曰武王克殷未下車存五帝之後封殷於宋紹夏於𣏌明著三統示不獨有也是以姬姓半天下遷廟之主出於戶所謂存人自立也又曰宣帝即位尊孝武廟為世宗所行巡狩郡國皆立廟告祠世宗廟有白鶴集後庭以立世宗廟告祠孝昭寢有鴈五色集殿前西河築世宗廟神光興于殿旁有鳥曰鶴前赤後青神光又興於房中如燭狀廣川國世宗廟殿上有鍾音房戶大開夜有光殿上盡明又曰王莽以宗廟未脩張邯說莽曰德盛者文縟宜崇其制度宣示海內宜令萬世之後無以復加也莽乃博徵天下工匠諸圖畫及吏民以義入錢穀助作者駱驛道路壞徹城西苑中建章永光苞陽大臺儲元宮及平樂當路陽祿館凡十餘所取其材瓦以起九廟帝王世紀曰漢景帝廟名德陽宣帝廟名長壽武帝廟名龍淵文帝廟名顧成昭帝廟名徘徊東觀漢記曰中元元年十月甲申使司空馮魴告祠高祖廟呂太后不宜配食以薄太后配遷呂太后於園四時止祭又曰永初六年皇太后入宗廟於世祖廟與皇帝交獻薦如光烈皇后故事又曰建初四年八月上以公卿所奏明德皇后在世祖廟坐位駮議示東平憲王蒼蒼上言文武元祫食高廟皆以后配先帝所制典法設張大雅曰昭哉來御從其祖武又曰不愆不忘率由舊章明德皇后宜配孝明皇帝袁山松後漢書曰天子自雒陽遷都長安初長安遭赤眉亂宮室焚盡唯有高廟遂居之漢雜事曰光武棄天下以再受命復漢祚更起廟稱世祖孝明臨崩遺詔遵儉無起寢廟藏王於世祖廟孝章不敢違是後遵奉藏世祖廟如孝明之禮而園陵皆自起寢孝明廟曰顯宗孝章曰肅宗是後踵前孝和為穆宗孝安曰敬宗孝順曰恭宗孝桓曰威宗今雒陽諸陵皆晦望二十四氣伏社臘及四時上飯太官送用物園令食監典省其親陵一所宮人隨鼓漏理被枕具盥水陳嚴具天子以正月五月供畢後上原陵以次周遍公卿百官皆從四姓小侯諸家婦凡與先君有瓜葛者及諸侯王大夫郡國計吏匈奴朝者西國侍子皆會尚書官屬西除下在先帝神坐後大夫計吏皆當前下占其郡國穀價四方改異欲先帝魂神具聞之也遂於親陵各賜計吏而遣之魏書曰辛酉有司奏造二廟立文皇帝廟與高祖合祭親盡以次毀特立武皇帝廟四時享祀為魏太祖萬載不毀吳錄地理志曰會稽有禹廟始皇配食王朗為太守黜之王隱書曰太康十年太廟成遷神主於新廟賜王公以下至司馬督子弟官賜作廟者帛帝王世紀曰漢景帝廟名德陽宣帝廟名長壽武帝廟名龍淵文帝廟名顧成昭帝廟名徘徊漢晉陽秋曰武帝改營太廟南致荊山之木西採華山之石鑄銅柱十二塗以黃金鏤以百物填以丹青綴以珠玉晉書禮志曰武帝太始三年有司奏置七廟宜權立一廟群臣議上古清廟一宮周制七廟舜承堯禪受終文祖則虞氏不改唐廟因仍舊宮可依有虞故事宋書禮志曰晉太始二年有司奏天子七廟宜如禮營建帝重其役設宜權立一廟於是群臣議奏上古清廟一宮尊遠神祇逮至周室制為七廟以辯宗祧聖旨深弘遠跡上世後魏書曰武定六年二月將營齊獻武王廟議定室數形制兼度支尚書崔昂等議按禮諸侯五廟太祖親廟四今獻武王為始封之君便是太祖既通在親廟不容立五室且帝王親廟亦不過四今宜四室二間兩頭一頰室廈頭徘徊鴟尾又按禮圖諸侯廟止開南門而二王後附祭儀注云執事者列於廟東門之外既有東門明非一門獻武禮數既隆備物殊等唯據今廟宜開四門內院南面開三門餘及外院四面皆一門齊書禮志曰世祖夢太祖曰宋氏諸帝嘗在太廟從我求食可別為吾祠上乃勑豫章王妃庾氏四時還青溪宮舊宅處內舍堂奉祠二帝二后牲牢服章用家人禮晉起居注曰武帝太安中詔曰往者仍魏氏舊廟處立廟既壅翳不顯材木弱小至今中間有跌橈之患今當脩立不宜在故處太僕寺南臨甬道地形顯敞更於此營之主者依典禮施行晉書曰桓玄纂問眾曰朕其敗乎曹靖之對曰神怒人怨臣實懼焉玄曰人或可怨神何為怒對曰移晉宗廟飄泊無所大楚之祭不及於祖此其所以怒也白虎通曰禮聖王所以制宗廟何曰生死殊路故敬鬼神而遠之所以有屋何所以象生之居又曰臣侍放於郊君不絕其祿者以其祿三分之一與其妻長子使得祭其宗廟賜之環即還之玦則去又曰王者立宗廟何緣生以事死敬亡若事存欲立宗廟而祭之此孝子之心所以追繼養也釋名曰廟貌也先祖形貌所在寢寢也所寢息也三輔故事曰光武至長安宮闕燒盡徙都洛陽取十二陵合為高廟作十二室太常卿一人別治長安主知齊祠事謂之高廟漢武故事曰宣帝立孝武廟於河東告祠日見一人騎馬馬異於常馬持尺一札賜將作亟文曰汝績克成賜汝金一斤因忽不見札乃變為金一斤蜀王本紀曰禹生於石紐禹母天珠孕禹坼副而生禹於塗山娶妻生子名啟於今塗山有禹廟亦為其母立廟三輔黃圖曰王莽於長安城南作九廟又曰太上皇廟在長安香街南墨子曰昔三苗大亂天命殛之雨血三朝龍生於廟說苑曰衛孫文子問王孫賈曰吾先君之廟小欲更之可乎對曰古之君子以儉為禮今之君子以大易之桓譚新論曰王莽起九廟以銅為柱薨帶金銀錯鏤其上王嬰古今通論曰夏曰世室世世祭祀之也殷曰重屋重夏為屋四霤周曰宗廟尊其生存之貌示不死之故致之於更楚辭天問序曰屈原放逐彷徨山澤仰天歎息楚有先王之廟及公卿祠堂圖畫天地山川神靈琦瑋譎詭及古賢聖怪物行事周流罷倦休息其下仰見圖晝因書其壁呵而問之晉諸公讚曰王淩字彭祖為幽州剌史尋洛陽破後承制建行臺以宗廟焚毀設壇望杞七室及功臣配食神主禮記曲禮曰措之廟立之主曰帝又檀弓下曰愛之斯錄之也敬之斯盡其道焉重主道也殷主綴重焉綴連也殷人作主而連其重懸諸廟也周主撤重焉周人作主撤重悝之又曰曾子問曰喪有二孤廟有二主禮也孔子曰天無二日國無二王嘗禘郊社尊無二上未知其為禮也昔者齊桓公亟舉兵作偽主以行及反藏諸祖廟廟有二主自桓公始禮記外傳曰人君既葬之後日中虞祭即作木主以存神未葬以前懸重於庭以代王也廟主用木者木落歸本有始終之義人之生也無不死木生於亥又落於亥是歸本也天子廟主長尺二寸諸侯一尺四向孔穴午達相通漆書謚號曰神主葬後孝子心目無所覩故用以主其神也公羊傳文公曰二年丁丑作僖公主虞主用桑練主用栗作僖公主不時也左傳莊公曰先君桓公命我先人典司宗祏桓公鄭始受封君也宗祏宗廟中藏主石室言己世為宗廟守臣又文公曰葬僖公緩作主非禮也凡君薨卒哭而祔祔而作主特祀於主戶柩已遠孝子思募故造木主立几筵焉丞嘗禘於廟又昭五曰使祝史徙主祏於周廟告子先君祏廟主石亟周廟厲王廟也論語八佾曰哀公問社於宰我宰我對曰夏后氏以松殷人以柏周人以栗五經異義曰謹按大夫以石為主禮無明文大夫士無昭穆不得有主今山陽民俗祀有石主又曰春秋左氏傳曰徙主石於周廟言宗廟有郊宗石室所以藏栗主也虞主所藏無明文也又曰今公羊說卿大夫士非有土子民之君不得禘祫序昭穆故無木主大夫束帛依神士結茅為叢又曰論語哀公問社於宰我宰我荅夏后氏以松夏人都河東河東宜松也殷人以柏殷人都亳宜柏也周人以栗周人都灃鎬灃鎬宜栗也五經要義曰木主之狀四方穿中央以達四方天子長尺二寸諸侯長尺皆刻謚於背也又曰主者神象也凡虞主用桑桑猶喪也喪禮取其名練王用栗栗者敬也祭禮取其恭五經通議曰諸侯會天子則以方明為主覲禮云明木也其形四方六面上玄下黃東青南赤西白北黑方明者上下四方神明之象也謝承後漢書曰赤眉盆子去長安西入右扶風鄧禹至長安中昆明池率諸將齊戒擇吉日入城謁高帝廟修禮祠祭勞賜吏士因收十二帝神主以故高廟郎來輔守高廟令行京兆尹承事桉行掃除諸園陵為置卒史奉守焉遣輔奉主詣京師王隱晉書曰李裔字宣伯父敏為公孫度所迫浮海莫知所終裔以父母不知存亡設木主以奉之由是發名晉起居注曰孝武太元二十年簡文皇帝宣太后正號神主移廟戊寅口詔移神主可停前後鼓吹摯虞決疑要注曰廟主藏於戶外西墉之中有石亟名曰宗祏古者帝王出征於車載遷廟之主及社主以行秦漢魏不載主也唐書曰祔順宗于廟遷中宗神主于夾室有司以中宗為中興之君當百代不遷宰臣召史官蔣武問之武對曰中宗以弘道元年於高宗柩前即位時春秋已壯矣及母后篡奪神器潛移其後賴張柬之等同謀國祚再復此蓋同於反正恐不得號為中興之君凡非我失之自我復之謂之中興漢光武晉元帝是也自我失之因人復之晉孝惠孝安是也今中宗與惠安二帝事同即不可為不遷主矣白虎通曰祭所以尸主何本神無方孝子以主係心又曰所以虞而立主何孝子既葬日中反虞念親已沒棺柩已去悵然失望彷徨哀痛故設桑主以虞所以慰孝子之心虞安其神所以用桑者始與神相接三王俱以桑說文曰又祏宗廟主也禮郊宗石室一曰大夫以石為主從示從石石亦聲也
