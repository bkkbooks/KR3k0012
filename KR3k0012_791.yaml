body:
  text: 南蠻六結胸國山海經曰結胸國其人結匈郭璞曰臆前出如人結喉也羽民國山海經曰羽民國其人長頭身生羽一曰其人長頰外國圖曰羽民羽飛不能遠其人卵產去九疑四萬里讙兜國山海經曰讙兜國其人人面有翼鳥啄讙兜堯臣有罪自放南海而死帝矜之使其子居南而祠也一曰讙朱國神異經曰南方荒中有人人手鳥足杖翼而行但食海中魚雖有翼不足以飛倚為徑行勢也一名讙兜為人佷惡姦踈不畏風雨不忌禽獸有所觸犯死乃休耳厭火國山海經曰厭火國其獸身黑色火出其口中似彌猴黑色也三苗國書曰堯竄三苗于三危山海經曰三苗國在赤水東神異經曰西北荒中有人焉皆人形而腋下有翼不能飛名曰苗民為人饕餮淫逸無禮外國圖曰昔唐以天下授虞有苗之君非之苗之民浮黑水入南海是為三苗民去九疑三萬三千里臷國山海經曰臷國其操弓射蛇大荒經曰此國國皆然有五穀衣服一曰盛國括地圖曰禹誅防風民夏德二龍降之禹使范氏御之以行經南方防風神見禹怒使射之有迅雨二龍升去臣懼以刃自貫其心死禹哀之療以不死草皆生是名穿匈民去會稽萬五千里交脛國山海經曰交脛國在貫匈東其人交脛言腳脛曲失相交所謂雕題交趾者外國圖曰交脛民長四尺不死國山海經曰不死國在交脛東其人黑色壽考有員丘山不死樹食之不死有赤泉飲之不老支舌國山海經曰支舌國在不死東其人舌皆歧或云支舌也三首國山海經曰三首國一身三首僬僥國後漢書曰安帝永初中永昌徼外僬僥種夷陸類等三千餘口舉種內附獻象牙牛封牛其人長三尺穴居善游鳥獸懼焉列子曰中洲以東三十萬里得僬僥國人長一尺五寸山海經曰周饒國為人短小冠帶其人長三尺穴居能為機巧有五穀一曰僬國在三首東家語曰吳之客問孔子曰人之長極幾何對曰僬僥民長三尺短之極也長者不過十之數之極也長者十短者三皆數之極也外國圖曰僬僥民善沒游善捕鷙鳥其草木夏死而冬生去九疑三萬里又曰從啖水南曰僬僥其人長尺六寸一曰迎風則偃背風則伏不衣而野宿長臂國山海經曰長臂國人長一尺五捕魚水中兩手各操一魚云其人手乘至地海東有人嘗在海中得布褐習衣如中國衣而兩袖長三丈即此長臂民衣三身國山海經曰三身國一首而三身一臂國山海經曰一臂國在三身北一臂一目一鼻孔奇肱國山海經曰奇肱國其人一臂丈夫國括地圖曰殷帝大戊使王孟採藥於西王母至此絕糧食木實衣木皮終身無妻而生二子從背間出是為丈夫民去玉門二萬里巫咸國山海經曰巫咸國在女刃北右手操青蛇左手操赤虵在登葆山群巫所從上下也操藥往來外國圖曰昔殷帝大戊使巫咸禱於山河巫咸居於此是為巫咸民去南海萬千里女子國山海經曰女子國在巫咸北兩女子居水外周之有黃池婦人入洛出即人孕矣生男三歲死周猶遶也軒轅國山海經曰軒轅國在窮山之際其不壽者八伯歲其國在山南邊也荒中日山之南也南女子北人面虵身尾交首上不敢西射畏軒轅之丘言敬畏黃帝威靈故不敢向之射也白民國山海經曰白民之國在龍魚北白身被髮其人體洞白也又曰白民之國室後帝鴟生白民愽物志曰日南有野女群行不見夫其體皛明子切白裸袒無衣長股國山海經曰長股之國在雄常北被髮國在赤水東長臂人身如人臂長三丈以類推之則此腳過三丈矣黃帝時至或曰長腳人常負長腳入海中捕魚無啟國山海經曰海水自東北陬至無啟國在長股東為人無䏿䏿肥膓也其人穴居食土無男女死即理之其心不朽死百二十歲乃復更生也一目國山海經曰一目國一目中其面也和利國山海經曰和利國在一目東為人一手足反𣍿曲足居上反巷曲也一曰留利之國人手反折深目國山海經曰深目國為舉一手無膓國山海經曰無膓之國在深目東為人長而無膓聶耳國山海經曰聶耳國在無膓國東為人兩手聶其耳言耳長行則以手攝持之縣居海水中縣居邑也跂踵國山海經曰跂踵國在拘纓東其人兩足皆大其人行䟽不著地也一曰踵國大人國山海經曰大人國為人獸身人面犬耳珥兩青虵以虵貫耳也君子國山海經曰君子國人冠衣帶劍其人好不爭也青丘國山海經曰青丘國其人食五穀衣絲帛其孤九尾黑齒國山海經曰黑齒國東夷傳曰俀國東四千餘里有裸國東有黑齒國舡行一年始可至也異物志云西屠染齒亦以放些也玄服國山海經曰玄服之國髀皆似畫青黑其人衣魚以魚皮為衣食鷗鷗水鴞也毛民國山海經曰毛民國為人身生毛今去臨海郡東二千餘里毛人在大海中州島上為人短小面體有毛如豬熊云居亦衣服晉永嘉四年吳都郡司鹽都尉戴建云在海邊得一舩上有男女四人狀皆如此言語不通送詣承相府未至道路死有一人在上賜婦生子出入市井漸曉人語自說其所是此毛民神異經曰八荒之中有毛人焉長七八尺皆人形身鷗頭上皆毛毛如獼猴毛長尺人則臭若賜切目開口吐舌上唇覆面下唇覆匈臨海水土物志曰毛人之洲乃在漲嶼身無衣服鑿地穴處雖云象人不知言語齊長五尺毛如熊豕眾輩相隨逐捕鳥鼠旡五穀唯捕鳥鼠魚肉以為糧耳勞民國山海經曰勞民國為人黑食果草實也有一鳥兩頭也手足盡黑氐人國山海經曰氐人國者觸抵之抵在建木西人面而魚身無足自胸以上人以下魚也姑射國山海經曰姑射國在海中蜮國山海經曰域有山者域有民之國食桑射蜮是食虵短狐也似鱉含沙射人中則病死則山出之也沃國山海經曰有沃之國言其土饒沃也沃民是處鳳凰鳥之卵是食甘露是飲故其欲其味皆存也反風國道書曰反風之國香逆風聞千里也林郍國竹芝扶南記曰林郍國蠻其延國未多曰黎與毗騫同大洲放二萬里法俗是同無論國南州異物志曰無論有大道左右種桃枇杷及諸花果白曰行其下陰涼蔽熱十餘里一亭皆有井水食夌飯飲蒲桃酒如膠若欲飲以水和之其味甘美句稚國南州異物志曰句稚去典遊八百里有江口西南向東北行極大崎頭出漲海中淺而多礠石歌營國南州異物志曰歌營在句稚南可一月行到其南文灣中有洲名蒲類上有居人皆黑如漆齒正白眼赤男女皆裸形康泰扶南土俗大載而去常望海過則遮舡將雞豬山果易鐵器加陳國南州異物志曰加陳在歌營西南師漢國南州異物志曰師漢國在句稚西從稚去行可十四五日乃到其國亦稱王上有神人及明月珠但仁善不忍殺生土地平愽民有萬餘家扈利國南州異物志曰扈利國在奴調洲西南邊海姑奴國南州異物志曰姑奴去歌營可八千里民人萬餘戶皆乘四轅車駕二馬或四馬四會所集也舶舩常有百餘艘市會萬餘人晝夜作市舩皆鳴鼓吹角人民衣被中國察牢國南州異物志曰察牢在安息中間大國也去天竺五千里人民勇健舉國人皆稱王種國無常王國人常選耆老有德者立為王三歲一更舉土地所與天竺同慕其土地不出國遠行類人南州異物志曰扶南海隅有人如獸此人扶南之東緣海邊略如禽獸人旡道也身黑若漆齒白如素扶南以外民皆漆齒使黑而此人身體雖獨不漆齒故正白也隨時流移居無常處此民不知安立屋宅乃隨寒暑素逐飲身體雖小夏則入水捕魚螺冬則登山射麋鹿也食唯魚肉不識禾稼寒無衣服以沙自覆此人無衣服若小過寒涼輒自覆惟以出面目耳時或屯聚豬犬雞糅此人旡衣服若遇寒涼以沙自覆惟以出面目耳時或此人或時權有可得停猶知立一小屋以自藉家中男女大小並止豬犬共息其中旡復分別也雖忝人形無踰六畜雕題國異物志曰雕題國畫其面及身刻其肥而青之或若錦衣或若魚鱗狼臙國異物志曰狼臙國男無衣服女撗布帷出與漢人交易不以晝市暮夜會俱以鼻嗅金則知好惡瓮人異物志曰瓮人齒及目甚鱗白面體異黑若漆皆光澤為奴婢強勤力黃頭人異物志曰黃頭人群相隨行無常居處其類與禽獸同或依大樹以草被其枝上而庇陰其下髮正黃如掃箒見漢人散入草終不可得近儋耳國異物志曰儋耳夷生則鏤其頭皮尾相連並鏤其耳匡為數行與頰相連狀如鷄腹下垂肩上食藷時諸切紡績為業穿胸國異物志曰穿胸人其衣則縫布二幅合兩頭開中央以頭貫穿胸身不突穿西屠國異物志曰西屠國在海水以草漆齒用白作黑一染則歷年不復變一號黑齒交州以南外國傳曰有銅柱表為漢之南極界左右十餘小國悉屬西屠有夷民所在二千餘家金鄰國異物志曰金鄰一名金陳去扶南可二千餘里地出銀人民多好獵大象生得乘騎死則取其牙齒外國傳曰從扶南西去金陳二千餘里到金陳波遼國外國傳曰從西圖南去百餘里到波遼十餘國皆在海邊屈都乾國外國傳曰從波遼國南去乘舩可三千里到屈都乾國地有人民可二千餘家皆曰朱吾縣民叛居其中波延洲外國傳曰從屈都乾國東去舡行可千餘里到波延洲有民人二百餘家專採金賣與屈都乾國究原國民外國傳曰究原有獠民出錫鐵雞舌香及赤白五色鸚鵡鳥究原達永昌一歲奴後國外國傳曰從林陽西去二千里奴後國可二萬餘戶與永昌接界炎人國愽物志曰楚之南炎人之國其親戚死刳肉死棄之然後埋其骨乃成孝子黃孫愽物志曰黃孫天毒君之孫也名貴負躁而好自飲汁父母笑之愧而去居此黃孫國去九嶷二萬一千里落頭民愽物志曰南方有落頭民其頭能飛其種人常有所祭號曰蟲落故因取名焉以其頭飛因眼便去以耳為翼將曉還復著體吳時往往得之鮫人愽物志曰南海水有鮫人水居如魚不廢織績其眼能泣珠松外諸蠻唐書曰松外諸蠻貞觀末為寇遣兵從西洱河討之其西洱河從嶲州西千五百里其地有數十百部落大者五六百戶小者二三百戶無大君長有數十姓以楊李趙董為名家各檀山川不相役屬自云其先本漢人有城郭村邑弓矢誕言語雖小訛舛大略與中夏同有文字頗解陰陽曆數自夜郎滇池以西皆云莊蹻之餘種也其土有稻麥粟豆種穫亦與中夏同而以十二月為歲首菜則葱韭䔉菁菓則桃梅李奈有絲麻女工蠶織之事出絕絹絲布廣七寸以下早蚕以正月生二月熟畜有馬牛豬羊雞犬飯用竹筲搏之而取羹用象柸若鷄彝有舩無車男女氈皮為帔女子絕布為裙於仍披氈皮之帔頭髻一盤而成形如髽阻瓜切男女皆跣至於死喪哭泣棺槨襲劍無不畢備三年之內穿地為坎殯於舍側上作小屋三年之外出而葬之蠡封蚌棺今其耐濕父母死皆斬衰布衣遠者至四五年近者三二年然後即吉其被人殺者喪主以麻結髮而黑其面衣裳不緝唯服內不廢婚妻不避同姓其俗有盜竊殺人淫穢之事酋長節立一長木為擊鼓警眾共會其下強盜者眾共殺之若賊家富強但燒其屋宅奪其田業而已
