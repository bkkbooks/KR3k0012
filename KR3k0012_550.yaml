body:
  text: 禮儀部二十八尸禮記曲禮下曰在床曰尸左傳哀下曰陳侯使公孫貞子聘吳未至而卒將以尸入吳人使太宰嚭營勞且辭上介芊尹蓋對曰寡君聞楚為不道荐伐吳國滅厥民人寡君使蓋備使弔君之下吏無祿使人逢天之戚大命殞墜今君命逆使人曰無以尸造千門是我寡君之命委于草莽也且臣聞之事死如生禮也於是乎有朝聘而終以尸將事之禮又有朝聘而遭喪之禮若不以尸將命是遭喪而還也無乃不可乎以禮防民猶或踰之今大夫曰死而棄之是棄禮也茍我寡君之命達于君所雖殞于深淵則天命也吳人內之禮統曰尸之言矢也陳也家語曰史魚將卒命其子曰吾在朝不能進蘧伯玉退彌子瑕是吾為臣不能正君生而不能正君死不可以成禮我死汝其陳尸牖下靈公弔焉怪而問之其子以父言告公公曰寡人過也命殯於客位進蘧伯玉退彌子瑕孔子曰史魚死而尸諫可謂直乎史記曰崔杼殺莊公晏嬰立崔杼門外曰君為社稷死死之為社稷亡亡若為己死非其私昵誰敢任之門開而入枕公尸而哭三踴而出人謂崔杼殺之杼曰民之望也舍之得民又曰吳兵入郢伍子胥求昭王既不得乃掘楚平王墓出尸鞭之三百又曰吳王取子胥尸盛以鴟夷應劭曰取馬皮以為鴟夷榼形也浮之江吳人憐之為立祠於江上因命曰胥山魏志曰宣王討王陵乃窮治其事發陵及令狐思冢剖棺暴尸於所近市三日王隱晉書曰王浚在幽州謠曰幽州城門似藏戶中有伏尸王彭祖又曰趙王倫害張華之時洛中震悚唯閻纘敢獨詣東市號哭弔尸而撫之曰早語君遜位而不肯去今果不免禍車頻奏書曰初慕容暐在鄴居石虎宮夢虎齧其臂募人求虎殯所在女子李葂告暐在東明觀下掘得之尸僵不毀暐祼而罵之曰死胡敢夢生天子鞭撻毀辱投之漳河河流迅疾終不移轉暐後為臣虎所執乃悟而悔焉符堅以李葂無狀無少長悉坑之李固別傳梁冀誅固而露尸於四衢命有敢臨者加其罪固弟子汝南郭況年始成童遊學洛陽乃左提章鉞右秉鈇鑕詣闕上書乞收固尸不許往臨哭陳辭於前遂守喪不去白虎通曰尸者何謂也尸之為言陳也失氣亡神形體獨陳釋名曰死曰尸尸舒也骨節解舒不能復自勝斂搜神記曰初鉤弋夫人有罪以譴死殯尸不臭而香及昭帝即位改葬之棺空無尸獨絲履存焉異苑曰河內荀儒字君林乘冰省舅氏陷河死兄倫求尸積日不得設祭水側又箋與河伯投箋一宿岸側冰開尸手執箋浮出倫又箋謝又曰尋陽周處字孟威寧康中鎮于巳西為符堅所摧守節不屈堅使使者請通虓躬治逵陌謂使者云煩君語賊符堅何至耳煩國士如此又潛圖襲堅聞之曰小人正欲覔死殺之適足成名耳乃若考楚不食而卒斂已經旬堅怒猶未歇剖棺臨視虓尸欻回眸鬢髭張烈精瞳明亮回盼矚堅覩而嘉稱乃厚加贈賻又曰元嘉中豫章胡家奴開昌邑王冢青州人開齊襄公冢並得金鉤而尸骸露在巖中儼然茲亦未必有憑而然也京房尸至義熙中猶完具僵尸人肉堪為藥軍士分割之列女傳曰齊人𣏌梁襲莒戰而死其妻無所歸乃就夫尸於城下而哭之七日而城崩妻遂投於淄水而死博物志曰靈帝光和元年元遼西太守黃翻言海邊有流靈冠絳衣尸體完令感夢曰我伯夷弟孤竹君也海水壞吾棺求見掩藏吳會稽分地曰重山者大夫種所葬也在西鄉郭外後潮水穴山漂去其尸俗云伍子胥乘漸水取以去今山脅有缺處臨邑國記曰有靈鷲能知人吉凶覘人將死食尸肉盡乃去晏子春秋曰景公操玉加於晏子尸上涕下沾𥘞盡哀而去又曰景公伏晏子尸而號曰今天降禍不加寡人而加夫子社稷危矣論衡曰孟賁之尸人不刃者氣絶也死炭百斛人不沃者光滅也又曰淮陽都尉尹齊為吏酷雪及死怨家欲取其尸尸亡歸復魂周禮天官夏采曰掌大喪以冕服復于太祖以乘車建綏復于四郊復招魂也建綏者去其旒又春官司服曰大喪共復衣服衣服今座上魂衣也禮記檀弓曰復盡愛之道也有禱祠之心焉復謂招魂且分禱五祀庶幾其精氣之反望反諸幽求諸鬼神之道也鬼神處幽暗望其從鬼神所來北面求諸幽之義也鄉其所從來也禮復者升屋北面又檀弓曰邾婁復之以矢也蓋自戰於升陘始也時師雖勝死傷亦甚無衣可以招魂又曰曾子問曰為君使而卒於舍禮曰公館復私館不復凡所使之國有司所授舍則公館已何謂私館子曰善乎問也自卿大夫家曰私館公與公所為曰公館公館復此之謂也又禮運曰及其死也升屋而號告曰皋某復招之於天又禮運曰復諸侯以褒衣冕服爵辨服復招魂復魄也冕服者上公五侯伯四子男三褒衣亦始命為諸侯及朝覲見加賜之衣也褒猶進也夫人稅衣榆狄狄稅素沙言其招魂用稅衣上至褕狄也狄稅素伙言皆以白紗縠為褒復西上北面而西上賜長左也復者多少各如其命之數又雜記上曰大夫士死於道則升其乘車之左轂以其綏復如於館死則其復如於其家又喪大記曰復有林麓則虞人設階無林麓則狄人設階復招魂復魄也階所乘以升屋者虞人主林麓之官也狄人樂吏之賤者階弟也簨虞之類小臣復復者朝服君以卷夫人以屈狄大夫以玄頳世婦以禪衣士以爵辨士妻以稅衣皆升自東滎中屋履危北面三號捲衣投于前司服受之降自西北榮其為賓則公館復私館不復其在野則升其乘車之左轂而復私館卿大夫之家也不於之復為主人之惡也復衣不以衣尸不以斂不以衣尸謂不襲也復者庶其生也若以其衣襲斂是用生施死於義相友喪禮云以衣衣尸俗而去之婦人復不以袡袡嫁時上服而非事鬼神之衣凡復男子稱名婦人稱字婦人不以名行唯哭先復復而後行死事氣絶則哭哭而復復而不蘇可以為死事諸侯行而死於館則其復如於其國如於道則升其乘車之左轂以其綏復館主所致舍綏旌旗又喪服小記曰復與書銘自天子達於士其辭一也男子稱名婦人書姓與伯仲如不知姓則書氏此謂殷禮也殷質不重名復則臣得名君周之禮天子崩則同復曰皋天子復諸侯薨復曰皋某甫復其餘及書銘禮記外傳曰人之精氣曰魂魂陽也云云而動形體謂之魄鬼陰也漠然不動合陰陽二氣而生也精氣聚而為一物形勞則神逝謂死而魂遊散死則難復生也孝子之心不能忍也故升屋而招其魂神也神智無涯也鬼者復於土也人皆食土之物養成形體也氣絶而收其魂使反復於體也齊書曰張融建武四年病卒遺令白旐無旒不設祭令人捉塵尾登屋復魂曰吾生平所善自當陵雲一笑三千買棺無製新衾左手執孝經老子右手執小品法華經妾二人事哀畢各遣還家含周禮天官冢宰曰太宰之職大喪贊贈玉含玉助王為之也贈玉既窆所以送先王含玉死者實也天子以玉雜記曰唅者執璧將命曰寡君使某唅則諸侯唅以璧小宰喪荒受其唅禭幣玉之事春秋傳曰口實曰唅衣服曰禭凶荒有幣玉者賓客所賙委之禮又天官玉府曰大喪共含玉又春官典瑞曰大喪共飯玉含玉贈玉飯玉碎玉以雜米也禮記檀弓下曰邾婁考公之喪考公益之曾孫也考公或為定公也徐君使容居來弔含弔且唅非之也曰寡君使容居坐含進侯玉其使容居以唅欲親唅非禮也唅不使賤者君行則親唅耳言侯玉者徐僣稱王自比天子有司曰諸侯之來辱弊邑者易則易于則于易于雜者未之有也易謂臣禮于謂君禮也容居以臣欲行君禮于徐自比天子使大夫敵諸侯有司固拒之是也容居對曰容居聞之事君不敢忘其君亦不敢遺其祖昔我先君駒王西討濟於河無所不用斯言也容居魯人也不敢忘其祖言我祖與今君於諸侯初如是不聞義則服也駒王徐先君謂僣號者容居其孫也濟渡也言西討渡於河廣大其國也魯魯鈍也言魯鈍者欲自明不妄又檀弓下曰飯用米貝弗忍虛也不以食道用美焉爾尊之也食道米貝美也又雜記上曰唅者執璧將命曰寡君使某唅相者入告出曰孤某須矣唅玉為璧制其分寸之大小未聞唅者入升堂致命于拜稽顙含者委于殯東南又曰天子飯九貝諸侯七大夫五士三此蓋夏時也周禮天子飯唅用玉左傳曰叔孫豹會晉士丐于柯盟于督陽荀偃疸疽生瘍於頭疸疽惡瘡二月卒而視不可唅目開口噤宣子與撫之曰事吳敢不如事主猶視欒懷子曰其為未卒事於齊故也懷子欒盈乃復撫之曰主茍終所不嗣事于齊有如河乃暝受唅也又曰公會吳于伐齊將戰公孫夏命其徒歌虞殯虞殯送終歌典示必死也陳子行命其徒且唅玉亦示必死春秋説題辭曰口實曰唅緣生象食孝子不忍虛其欲不忍虛故欲實其口天子以珠諸侯以玉大夫以璧士以貝唅之為言含也生常食故死亦有所含説文曰含送終口中玉也釋名曰唅以米貝含其口中也莊子曰青青之麥生於陵阪生不布施死何唅珠為呂氏春秋曰含珠鱗施今葬皆用之注云含珠口實鱗施施玉匣於死者之體如魚鱗絞襟衾冒儀禮士喪禮曰死於適室撫用斂衾撫覆也斂衾大斂所用之衾也衾被也奉尸于室撫用夷衾夷衾覆尸柩之衾也又曰冒緇質長與手齊頳殺掩足冒韜尸者也制如直囊上曰質下曰殺殺韜足而上質韜首而下齊手上衣尤下赤象地也又曰厥明陳衣于房南頭西上績襟撗三縮一廣終幅拆其末綪屈也襟所以束衣服為堅急也以布為之縮從撗者三幅從者一幅折其未令可結之也禮記雜記曰唯絞襟衾冒死而後製又喪大記曰君錦冒黼殺綴旁七大夫玄冒黼殺綴旁五士緇冒頳殺綴房三又喪大記曰小斂布絞縮者一撗者三大斂布絞縮者三撗者五布襟二衾君大夫士一也禮記外傳曰絞襟衾帽死而後製絞者交束之名也襟者堅急之稱也衾者單被也帽者小斂衣故設帽以掩形也小斂用一衾大用二衾一以覆之一者將斂之時先鋪衾於襟之下用以舉尸入棺者也釋名曰絞交也交結之也襟禁也禁繫之也
