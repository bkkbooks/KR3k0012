body:
  text: 服用部九枕說文曰枕臥為所薦首者也釋名曰枕撿也所以檢項也詩曰角枕粲兮錦衣爛兮又曰有美一人碩大且儼寤寐無為展轉伏枕周禮曰王府掌王之金玉玩好大喪則供角枕禮曰鷄鳴咸盥漱歛枕簟歛枕簟不欲人見國語曰楚靈王敗於乾谿王親獨行彷徨於山林之中三日乃見其涓人疇王呼之曰余不食三日矣疇趍而進王枕其股以寢於地王寐疇枕王曰墣而去之墣塊也洞林曰丞相從事中郎王文英家枕自作聲漢書曰淮南王有枕中鴻寶祕苑書言使鬼物為金之術及鄒衍重道延命方世人莫知劉更生父於武帝時治淮南獄得書更生以為奇獻之言黃金可成上命典作方鑄事費甚多不驗後漢書曰樂崧天性朴忠家貧為郎嘗獨直臺上無被枕杫祉音思漬切謂姐九也蜀漢之郊日祉食糟糠帝每夜入臺輒見崧問其故甚嘉之自此詔太常賜尚書以下朝夕飡給幃帳東觀漢記曰黃香事親暑則扇枕寒則以身溫席後漢書曰高昌有白鹽其形如玉高昌人取以為枕貢之中國魏志曰蘇則為侍中董昭嘗枕則膝臥則推下之曰蘇則膝非佞人枕也魏略曰大秦國出五色枕吳書曰張紘作柟榴枕賦陳琳在此得之因以示士人曰此吾鄉里張子幼作也晉書曰王敦鎮豫章為王澄以舊意所侮敦益忿怒請澄入宿陰欲殺之而澄左右二十人持鐵馬鞭為衛澄手恒捉玉枕以自防故敦未之得發後敦賜澄左右酒皆醉借玉枕觀之因下床而謂澄曰何與杜弢通信敦令力士路戎搤殺之又曰筮者謂董豊曰君憂獄遠二枕避三沐豊既歸妻具枕授沐豊皆不從其夜果誤殺妻也沈約宋書曰武帝紀曰寧州嘗獻虎魄枕光色甚麗時北征以虎魄治金瘡上大悅命擣碎分諸將又曰武昌王渾少而凶戾為中書令每夕祼身露頭往散騎省戲因彎弓射通直郎周朗中枕以為笑樂又朱齡石少好武不事崖撿舅淮南蔣氏才劣齡石使舅臥廳事剪紙方一寸怗著舅枕以刀子懸擲之相去八九尺百擲百中舅畏齡石終不敢動齊書曰陳顯達建武世不自安侍宴酒後啟上借枕帝令與之顯達撫枕曰臣年已老富貴已足唯少枕死特就陛下乞之上失色曰公醉矣北齊書曰郎基自世業清慎嘗語人曰任官之所木枕亦不須作況重於此者也梁書曰王茂為雍州長史人或譖茂反武帝弗之信令鄭紹叔往候之遇其臥因問疾茂曰我病可耳紹叔曰都下殺害日甚使君家門塗炭今欲起義長史那猶臥茂因擲枕起即袴褶隨紹叔入見武帝唐書曰玄宗嘗製大被長枕與寧王憲申共之又曰貴妃姊虢國夫人豪侈尤甚所枕照夜枕不知其價夜中照廡其光如晝尸子曰孝子一夕五起視親衣之厚薄枕之高下淮南子曰楚將子發好伎道之士有善偷者往見子發子發禮之無幾齊伐楚偷夜出盜其齊將軍枕歸之明夕復取其簪又以歸之齊師大駭還師而去越絕書曰越王問范子曰寡人已問陰陽之事穀之貴賤可得而知乎曰陽者主穀貴陰者主穀賤故當寒而不寒穀為之暴貴當溫而不溫者穀為之暴賤王曰善書帛藏之枕中以為國寶范子曰堯舜禹湯皆有預見之明雖有凶年而民不窮王曰善以丹書置之枕中以為邦貴東宮舊事曰皇太子納妃有龍頭舊髻枕銀鐶鉤副之蔡質漢官儀曰尚書郎直給通中枕西京雜記曰趙飛燕為皇后其女弟上遺虎珀枕龜文枕拾遺錄曰魏咸熙二年宮中夜夜有異或吼呼驚人乃有傷害者詔使官者闇中伺候有白虎毛色淨密以戈投虎即中左目俄而往取虎已隱形更搜覔乃於藏中得一玉虎枕左目有血帝嗟其大異問諸大臣荅云昔誅梁冀得玉虎枕一枚云此枕單池國所獻臆下有題云帝辛九年獻帝辛紂也金玉久而有神神仙傳曰泰山父者漢武帝東巡狩見父頭頂白光高數尺帝呼問之曰有道士教臣作神枕枕有三十二物二十四物以應二十四氣八物應八風臣行之轉少而齒生列異傳曰景初中咸陽縣吏王臣夜倦枕枕臥有頃聞竈下有呼曰文納何不以之頭下應曰我見枕不得動汝來就我至乃飲缶也集異記曰中山劉玄暮忽見一人著烏袴褶取火照之面首無七孔面莽黨然乃請師筮之師曰此是君家先世物久則為魅劉因執縛刀斫數下變為一枕乃是其先祖時枕異苑曰滕放枕文石枕臥忽暴雷震其枕傍人莫不為之怖懾微覺有聲不為驚也楚宋玉高唐賦曰楚王嘗遊高唐怠而晝寢夢見一婦人曰妾巫山之女也願薦椀蓆司馬相如長門賦曰搏芳若以為枕席荃蘭而為香又美人賦曰高茵重設角枕橫施劉向別錄曰向有芳松枕賦後漢張紘瓌林枕賦曰有卓爾之殊瓌超詭異以邈絕且其色也如芸之黃其為香也如蘭之芳其文綵也霜地金莖紫葉而紅榮蔡邕警枕銘曰應龍蟠蟄潛德保靈制器像物示有其形哲人降鑒居安慮傾崔駰六安枕銘曰枕有規矩恭一其德承元寧躬終始不忒六安言六面安也蘇彥楠榴枕銘曰珍木之奇文鬱理鮮廉稜方正密滑貞堅卞敬宗作無患枕讚無患木名也言人枕之無患也江文通詩曰撫枕懷百慮被說文曰衾大被也釋名曰被所以被覆人也衾也其下廣大如岸一受人也論語曰必有寢衣長一身有半詩曰錦衾爛兮又曰肅肅霄征抱衾與裯裯單被也傳曰楚子次于乾谿雨雪楚王皮冠秦復陶翠被豹舄執鞭以出史記曰王章字仲卿疾無被臥牛衣中又曰汲黯曰公孫弘位至三公俸祿甚厚為布被此詐也上問弘弘謝曰有之夫九卿與臣善者無過黯然今日廷詰臣誠中臣之病夫以三公為布被飾詐以釣名且臣聞管仲相齊有三歸侈擬於君桓公亦霸晏嬰相景公食不重肉妾不衣絲齊國亦治今臣位為御史大夫而為布被自九卿以下至小吏無差誠如黯言且無汲黯申之陛下安聞此言天子以為謙讓愈益厚之漢書曰廣川王去妃昭信甚砳王愛姬陶望卿昭信妒之譖於王曰望卿視有姦窺即言郎中令臥錦被王信之擊殺之又曰李夫人病篤上自臨候之夫人蒙被謝曰妾久寢病形貌壞不可以見帝願以王及兄弟為託又曰霍光薨詔賜繡被百領後漢書曰祭遵奉公家無私財布被夫人裳不加綵又曰宣秉性節儉常服布被蔬食華嶠後漢書曰樂崧為郎獨宿真臺上無被帝推被與之袁山松後漢書曰范丹為萊蕪長去官無被空囊自隨也謝承漢書曰京兆朱寵字仲威為太尉家貧臥布被朝廷賜錦被臥兼布被又曰羊續字興祖為南陽太守以清率下唯臥一幅布綯敗糊紙補之綯與裯同東觀漢記曰王良為大司徒在位恭儉妻子不入官舍布被瓦器又曰馮豹字仲文後母惡之嘗因豹夜臥引刀斫之正值其起中被獲免又曰馮豹每奏事未報常服省閣下或從昏至明天子默使小黃門持被覆之曰勿驚之漢官典職曰尚書郎入直供青練白綾被或錦被魏書曰文帝詔朝臣三代大夫知被服五代大夫知飲食此言被服飲食難曉也晉陽春秋曰景帝有目疾文鴦之來攻驚而目出懼六軍恐蒙以被痛甚齧被破晉書曰魏舒為尚書郎或有非其人論者欲有沙汰之言舒乃曰吾即其人也襆被徑出論者咸自愧之也又曰楊駿被誅初駿徵高士孫登遺以布被登截被於門外大呼曰斫㓨旬日託疾死及是其言果驗又曰光逸字孟祖為博昌小吏令使之冒雨還令不在逸解衣臥衾被中令還詰之逸曰衣單冒雨如不易衣衣必致凍死何惜一被而殺一人耶令奇之而不問又曰祖逖字士雅與琨共被寢中夜聞鷄鳴蹴琨覺曰起舞此非惡聲又曰吳納為吳興守徵為尚書去任有被幞而已又曰禿髮烏孤之祖壽闐之在孕母胡掖氏因寢而產於被中鮮卑謂被為禿髮因而氏焉宋書曰虞龢位中書郎廷尉少好學居貧屋漏恐濕墳典乃舒被覆書書獲全而被大濕時人以比高鳳又曰沈麟士以楊王孫皇甫謐深達生死而終禮矯俗乃自為終制遺令氣絕剔被取三幅布以覆屍及斂仍移布於屍下以為斂服反被左右兩際以周上又曰康沙門釋寶志王亮欲以衲被遺之未及有言寶志忽來牽被而去又曰羅研齊茍兒之役臨汝侯嘲之曰卿蜀人樂禍貪亂一至於此對曰蜀中積獘實非一朝百家為林不過數家有食貪亂樂禍無足多怪若令床上有百錢布被甑中有數升麥飯寧肯為亂乎梁書曰裴之橫字如岳少好賓重氣俠不事產業兄之高以其縱誕乃為狹被蔬食以激厲之之橫嘆曰大丈夫富貴必作百幅被後為吳興太守作百幅被以成其志陳書曰高宗時豫州獻織成羅文錦被詔於雲龍門外焚之孫卿子曰天子至尊重無上矣衣被則五彩雜間色重文繡加飾之以珠玉家語曰黔婁先生死被短露足孔子及門人見之謂其妻曰寧使正之不足不可斜之有餘說苑曰鄂君乘青翰之舟張翠華之蓋越人擁楫而歌曰山有木兮木有枝心悅君兮君不知於是鄂君舉繡被而覆之夏侯孝子集曰羊太常辛夫人字憲英性不好華麗從外孫胡母楊上夫人錦被夫人取反臥之晉惠帝起居注曰帝至朝歌無被中黃門以兩幅布被給帝東宮舊事曰太子納妃有綵柸文綺被一絳具文羅一幅被一綘被羅繡文四五幅被一東宮故事曰太子有七彩文綺被又有綘文羅被京兆舊事曰長安孫晨家貧為郡功曹十月無被夜臥蒿束晝收之西京雜記曰趙飛鷰為皇后其女弟上遺鴛鴦被晉陸雲與兄機書曰一日按行曹公器物有寒夏被七枚海內先賢傳曰姜肱字伯淮事繼母年少肱兄弟感凱風之孝同被而寢不入室以慰母心也邊讓別傳曰讓字元禮才辯俊逸孔融薦於魏武曰邊讓為九州之被則不足為單衣襜則有餘益部耆舊傳曰王忳字少林於客舍見諸生疾甚困謂忳曰腰下有金十斤願以相與乞收藏屍骸未及問其姓名呼吸困絕忳賣金一斤以給棺柩餘九斤置生腰下後署大度亭長到亭有白大馬一疋入亭中其日大風有一繡被隨風來而後忳乘馬馬突入金彥父家彥父見曰真得盜矣忳說得馬之狀又取被示之彥父曰卿有何陰德曰念葬諸生事且說形狀彥父曰真我子也忳即以被馬歸之彥父不受遣迎生喪金具存焉列女後傳曰江夏孟宗少遊學與同學共處母為作十二幅被其鄰婦怪問之母曰少兒無異操懼明類之不顧大其被以招貧生之臥庶聞君子之言耳桓任傳曰任後母酷惡常憎任為作二幅箕踵被杜祭酒別傳曰君曾新作被煖眠不覺晏起乃歎煖眠使人忘起異事因命著陌上有寒苦人舉被乞之常眠布被中孫略別傳曰親親有窮老者略或推被以恤之竟寒不解帶而寢郭子曰殷浩好作楊州劉君行曰小欲暮便令左右取被幞人問其故荅云剌史嚴不敢夜行語林曰魏武云我眠中不可妄近近輒斫人不覺左右宜慎之後乃陽凍眠所幸小兒竊以被覆之因便斫殺自爾莫敢近之又曰傅信字子思遭父喪哀慟骨立母憐之竊以錦被蒙其上林宗往吊之見被謂之曰卿海內之雋四方是則如何當喪錦被蒙上郭奮衣而去自後賓客絕百許日古詩曰客從遠方來遺我一端綺文彩雙鴛鴦裁為合歡被著以長相思緣以結不解樂府詩曰天寒知被薄憂思知夜長楚辭曰翡翠珠爛齊光陸雲芙蓉詩曰寢共織成被絮以同攻綿傅玄被銘曰被雖溫無忘人之寒無厚於己無薄於人張華苦行曰重無暖氣輕被覆空床潘岳悼亡詩凜凜涼風升始覺夏衾單豈曰無重瀇詩與同歲寒劉孝威謝賚錦被啟曰色豔蒲萄采踰聯壁鄂君慚繡楚侍羞朱雖復帝賜鶴綾客贈鴛綺高慚藻麗遠謝鮮明漢老悅其怪文魏馬驚其香氣
