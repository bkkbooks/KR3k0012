body:
  text: 休徵部一敘休徵書曰休徵敘美行之驗曰肅時雨若君行敬則時雨順之曰乂時暘若君行政治敗時晹順之曰哲時燠若君能照哲則時暖順之曰謀時寒若君能謀則時寒順之曰聖時風若君能通理則時風順之禮曰國家將興必有禎祥又曰用民必順不奪農時故無水旱昆蟲之災民無凶飢妖孽之疾言大順之時陰陽和也又曰四靈以為畜故飲食有由也何謂四靈麟鳳龜龍謂之四靈又曰天降膏露地出醴泉山出器車河出馬圖鳳凰麒麟皆在郊棷典藪同也龜龍在宮沼其餘鳥獸之卵胎皆可俯而窺也則是無故非有他事使之言也先王能修禮以達順故此順之實也又曰升中于天而鳳皇降龜龍假功成而太平陰陽氣和而致象物假音格又曰享帝於郊而風雨節寒暑時五行木為雨金為陽火為燠水為寒土為風黃帝太階六符經曰三階平則陰陽和風雨時社稷咸獲其宜天下大安是謂太平韓詩外傳曰成王之時有三苗貫桑而生為一秀大幾滿車長幾充箱成王問周公曰此何物也周公曰三苗同為一秀意者天下殆同一也此期三年果有越裳氏重九譯而至獻白雉於周公曰道路悠遠山川幽深恐使人之未達也故重譯而來周公辭曰吾何以見賜也譯曰吾受命國之黃髮日久矣天下之不迅風疾雨也海之不波溢也三年於茲矣意者中國殆聖人蓋往朝之於是周公乃敬其所來故小雅云有黭淒淒興雲祁祁以是知太平無飄風暴雨亦明矣又曰祥者福之先見者也風角占曰福先見曰祥春秋繁露曰王者人之始也王正則元氣和順風雨時景星見黃龍下又曰五帝三王之理云天下不敢有君民之心什一而稅教以愛使以忠敬長老親親而尊尊不奪民時使民不過歲三日民家給人足無怨望忿怒之患故天為下甘露朱草生醴泉出風雨時嘉禾興鳳凰騏驎遊于郊日孫氏瑞應圖曰君賢得土地則日有黃抱又曰楊光者人君不假臣之權則日楊光又曰王者動不失日楊光也符瑞圖曰日二黃人守者外國人方自來降也又曰少皞氏邑於窮桑日五色牙照窮桑易説曰日者至陽之精象君德玄黃照耀五色無主春秋潭潛巴曰君德應陽君臣得葉度則曰含王字含王字者曰中有王字也王者德象日光所照無不及也春秋考異郵曰黃帝將興有黃帝雀赤頭立於日傍黃帝曰黃者土精赤者火榮爵者賞也餘當立大功乎黃雀者桑也禮斗威儀曰君承土而王其政太平則日五色無主宋均曰五行之色不王於一也又曰君乘木而王其政升平則黃中而青暈乘火而王則黃中而赤暈乘金而王則黃中而白暈乘水而王則黃中而玄暈孝經援神契曰黃氣抱日輔臣納忠德至於天曰抱載在上曰載在旁曰抱月漢書曰元后生成帝夢月入懷吳志云孫弟生京房易飛候曰正月有偃月國必有喜禮斗威儀曰君乘土而王其政太平則月黃而多輝禮瑞應圖曰昔太清之治世也昭明于日月禮含文嘉曰人君政尊則日月貞明春秋潛潭巴曰君臣和得道葉度則日月大光明天下和平上下俱昌延年益壽星孫氏瑞應圖曰景星者大星也狀如半月生於晦朔助月為明王者不私於人則見又曰王者德至幽微則景星見又曰景星者星之精也先後月出於西方王者不私人以官使賢者在位則見佐月為明又曰王者孝行之溢則斗霣精北斗七星光明若將霣也又曰王者承天得理則老人星臨國符瑞圖月鎮星合房者年穀豐熟易坤靈圖曰至德之萌五星若連珠尚書中候曰帝堯即政七十載景星出翼景大也翼朱鳥宿也禮稽命徵曰出號施令叶民心制禮作樂得天意則景星見又曰外內之制各得其宜四方之事無有留滯則天苑有德星見禮斗威儀曰君承土而王者其政太平則鎮星黃而多暈又宮星黃大其餘六星耀光四起宮斗北斗剋星也又曰君乘水而王其政太平則辰楊光乘金而王則太白楊光禮含文嘉曰天子崇有德彰有道顯有功褒有行則太微七星明少微處士有德星應宋均云太微正教之宮也七星衣裳正禮今施教布化儀服應禮故星明今少微處士有德星應則星皆有威儀矣春秋合誠圖曰天子精耀心憤務德則景星見宋均曰憤猶盛也春秋感精符曰王者上感皇天則景星見春秋佐助期曰虞舜之時景星出房春秋孔演圖曰天子舉賢則景星放於天又曰王者德政海內富昌則鎮星入闕闕華闕之門當帝坐春秋元命苞曰老人星者治平則見見則主壽帝以秋分候之南郊又曰帝位明即畢星光大也春秋文耀鉤曰老人星見則主安下不見則兵起又曰王者安靜則老人星見春秋運斗樞曰王政和平則老人星臨國萬民以歌孝經援神契曰德至天則斗極明又曰天子刑于四海德洞淪冥八方神化則斗霣精又曰神靈滋液百珍寶用有景星又曰鎮星舍房符明道興宋均曰符驗明而道興年豐也又曰太白合表四夷從服之象宋均曰合表從中道也太白進退主侯兵合從中道無進退孝經內事曰天子行孝德則景星見又曰王者動得天度止得地意從容中道陰陽合度則太微五帝座星明以光也又曰王者得禮之制不傷財不害民君臣和草木昆蟲各象正性則三台為齊明不闊不狹如其度宋均云君臣制度宮室車旗多少各有科品則應也又曰王者敬諸父有差則大角光明以揚宋均云諸父伯仲叔季也斗為帝車帝所乘也角堅剛而居帝前帝敬諸父感天應之也又曰王者遠嫌別微殊貴賤抑驕臣息亂子則屏星為之明以潤帝座章而光宋均云屏星五帝座為之明以潤章大也又曰天子得雲臺之禮則五車均明河行不離其常宋均云天子考察天氣若梓慎見星之祲者也所以獲福禳災五車主五穀民禳災得福民無飢寒之困五穀星明以應之河若離常則有決溢之憂則九穀失所殖矣又曰昆弟有親親之思則鉤鈴不離房宋均云鉤鈴遠房則踈闊今昆弟相親故天相近明其友也又曰王者厚長幼各得其正則房心有德星應之宋均云房心為天子明堂布政之宮長幼厚則政教著明房心應之而時也風史記曰黃帝行德天為之起風從西北東必以庚辛一秋中五至大赦三至小赦也唐書曰肅宗在平涼未知所適會朔方留後杜鴻漸奉箋迎上又河西行軍司馬裴冕勸上治兵於靈武以圖進取上發平涼至豐寧南見黃河天塹之固欲整軍北渡以保豐寧忽大風飛沙跬步之間不辨人物及回軍趍靈武風沙頓止天地廓清尚書大傳曰王者德及皇天則祥風起又曰舜將禪禹于時八風修通禮斗威儀曰王者乘火而王其政升平則祥風至宋均云即景風其來長養萬物符瑞圖曰翔風者瑞風也一名景風春為發生夏為長盈秋為收藏盡為安寧春秋繁露曰王者思及金石則涼風出孝經援神契曰王者德八方則祥風至王充論衡曰王者太平則五日一風風不鳴條風角曰風清明高不及地二三尺此下有聖人或清明其來久長而不動搖樹木枝葉此龍德在其下晉陽春秋曰劉裕平慕容超將鎮下邳聞盧循反何無忌敗乃還次山陽造楊子江問行人曰朝廷如何對曰則尚未至劉公若還無所憂也裕將濟而風急衆咸難之裕曰吾有天命風當自息如天不助覆溺何足可怯即命登舟舟移而風止雨禮斗威儀曰君乘金而王其政平則嘉雨時至春秋説題辭曰大節二十四小節十二功德分也故一歲三十六雨鹽鐵論曰太平之世則雨不破塊旬日一雨雨必以夜符瑞圖曰周公時天下太平當此之時旬而一雨雨必以夜又曰靈雨者遇歲亢旱責躬引咎理察冤枉退去貪殘側身修政則降以靈雨非誠感瑞則非靈也又曰昔殷湯之世天下大旱以六條自責於是大雨淮南子曰神農之世甘雨以時五穀蕃殖尸子曰神農氏治天下欲雨則雨五日為谷雨旬五日為行雨萬物咸利故謂之神雲史記曰若煙非煙若雲非雲郁郁紛紛蕭索輪囷是謂慶雲嘉氣也漢書曰武帝封禪夜有白雲封中出魏書曰文帝生時有雲氣青色而圓如車蓋當其上終日望者以為至貴之證宋書曰世祖在江州起義建牙軍門有紫雲二假落于牙上唐書曰玄宗嘗出畋有紫雲在其上從者望而得之又曰肅宗自奉天而北夕次永壽有白雲起西北長數丈如樓閣之狀識者以為天子之氣尚書中候曰堯德清平乃沉壁於河白雲起禮斗威儀曰景雲景明也言雲氣光明也又曰周成王治平觀於河青雲浮春秋孔演圖曰黃帝將興黃雲升於堂孝經援神契曰王者德至山陵則景雲出又曰天子孝則景雲見孫氏瑞應圖曰景雲見者太平之應也符瑞圖曰矞慶雲也內赤外黃一曰矞雲矞音橘也帝王世紀曰黃帝有景雲之瑞以雲紀官又曰堯母慶都生而神異有黃雲覆上漢武故事曰帝幸梁父祀地山上有白雲如蓋又曰宣帝祀甘泉有紫雲從西北來散於殿前歸藏曰大昊之盛有白雲出自蒼梧入于大梁徐爰宋書曰高祖北征至洛陽常有紫雲見於軍上霧史記曰高祖至平城胸奴圍上七日大霧漢人往來故不覺帝王世紀曰黃帝五十年秋七月庚申天大霧三日帝之洛水上見大魚負圖書露後漢書曰光武建武十二年甘露降南行唐又曰明帝永平十七年春正月甘露降於甘陵又曰明帝永平十七年甘露降泉陵洮陽二縣二縣屬零陵泉陵城在今永州零陵縣北洮陽故城在湘源縣西北東觀漢記曰光武時甘露降四十五日宋書曰文帝元嘉中甘露頻降狀如細雪唐書曰武德九年四月二十三日甘露降于中華殿之桐樹泫冰雪以示群臣又曰貞元十年正月西川奏當管甘露降松柏竹藂等二千四百四十二處尚書中候曰堯時甘露降孝經援神契曰王者德至天則降甘露禮斗威儀曰君治政則軒轅之精散為甘露降又曰人君乘土王其政太平則甘露春秋運斗樞曰天樞得則甘露濁孫氏瑞應圖曰耆老得敬則松柏受甘露尊賢老不失細微則竹葦受甘露又曰甘露者味清而甘降則草木暢茂食之令人壽又曰王者德至於天和氣感則甘露降於松柏白虎通曰甘露者美露也降則物無不盛論衡曰甘露味如飴王者太平之應鶡冠子曰聖德上及太清下及萬靈則膏露下晉中興徵祥記曰甘露仁澤也凝如脂甘如飴王者德至於天則降呂氏春秋曰陰陽之和不長一類甘露時雨不私一物山海經曰軒丘鳳卵民食之甘露民食之所欲自從魏明帝與東河王詔曰昔先帝時甘露屢降仁壽殿前自吾建承露盤以來甘露復降芳林園雷史記曰高祖母劉媼嘗遊大澤之陂夢與神遇時雷電冥晦見蛟龍上已而有妊遂産高祖河圖曰帝以雷精起尚書中候曰秦穆公出狩天震大雷下有火化為白雀御丹書集公車曰秦伯霸也氣史記曰秦始皇曰東南有天子氣於是東遊以厭當之又曰高祖隱於芒碭山澤間呂后與人俱求常得之高祖怪問后后曰季所居上常有雲氣故從往常得漢書曰宣帝繫獄望氣者言長安獄有天子氣詔繫者殺之內謁者令郭穰夜至郡獄邴吉拒使者不得入後漢書曰望氣者蘇伯河為王莽使至南陽遙見望春亭郭唶曰唶音子夜切氣佳哉鬱鬱蔥蔥然東觀漢記曰和帝時十一月夜白氣長三丈起圖東北軍市西域象奇踈勒二國歸義魏書曰武宣卞皇后琅邪開陽人文帝母也以漢延熹二年十二月乙巳生齊郡白亭有黃氣滿室移日父敬侯怪之以問卜者王旦曰此吉祥也晉書曰天子氣森森然感華蓋或如龍如馬宋書曰明帝太始二年六月日入後有黃白氣東西竟天光明潤澤也楚漢春秋曰項王在鴻門亞父諫曰吾使人望沛公其氣衝天五彩相繆或似人此非人臣之氣不若殺之應劭漢官儀曰世祖封禪久有白氣一丈東南極望正直壇所有青氣上與天屬遙望不見顛瑞命之符也光漢書郊祀志曰武帝祀汾陰汾陰傍有光如降上遂立后土祠於汾陰又曰郊太一祠上有光又曰宣帝祠世宗神光興於殿旁神光又興於房中如燭狀東觀漢記曰李軼等讖言劉氏當復起李氏為輔遂市兵弩絳衣赤幘歸舊廬望見廬南有若火光以為人持火呼之光遂盛曈曈上屬天有頃不見上異之後魏書曰太祖武皇帝母曰獻明賀皇后夢日出室內寤而光明屬天歆然有感乃生於參合之北其夜復有光明又曰高祖孝文皇帝母曰李夫人皇興元年八月生平城紫宮神光照室天地氤氳和氣充塞尚書中候曰堯沉壁於河榮光出符瑞圖曰玉燭者瑞光也見則四時之色洞如燭也又曰景者光也亦曰象也光而可象應行而臻故茂德內彰則瑞光外燭又曰昌光者瑞光也見於天漢高受命昌光出軫又曰榮光者瑞光也其光五彩焉出於水上又曰五光彩者天見五色三光重輝輝于地也春秋合誠圖曰五光垂彩天下大嘉人尚書中候洛師謀曰呂尚出遊於戊午有赤人雄出赤人水神授吾簡丹書曰命遊呂吾我也由用也禮含文嘉曰禹卑宮室盡力乎溝洫百馨用成神龍靈龜馴伏玉女降魏志曰咸熙二年晉太子襲位襄武縣言有大人見長丈餘迹長三尺一寸白髮著黃單衣黃巾柱杖呼民三始語云今當太平瑞應圖曰真人者黃帝時遊於池王者有茂德不貪貨利則金人垂船遊王後池神龍魚河圖曰黃帝攝政蚩尤兄弟八十一人並獸身人語銅頭鐵額食沙石造兵杖威震天下誅殺無道不仁不慈黃帝行天下事仰天而歎天遣玄女下授黃帝兵信神符而令制伏蚩尤蚩尤歸臣因使鎮兵以制八方尚書中候曰堯使禹治水禹辭天地重功帝欽擇人帝曰出爾命圖爾乃天言天使汝洽水非我禹臨河觀有白面長人魚身出曰吾河精也表曰文命治淫水表安也言曰文治治淫決之水臣河圖去入淵河圖謂括地象漢書曰武帝太始四年三月幸不其如淳曰其音基不其山名因以為縣祠神人于交門宮應劭曰神人蓬萊仙人之屬也晉灼曰琅邪縣有交門漢武帝所造若有嚮坐拜者作交門之歌山海經曰有人首蛇身長如轅左右有首衣紫衣冠名曰延維人主得而食之伯天下即於蛇也瑞應圖曰黃帝時西王母使乘白鹿來獻白環一本云帝舜時西王母遣使獻玉環又曰二美母者蓋神女也周穆王時持酒來酌之管子曰桓公北征孤竹未至卑耳溪十里援弓將射未敢發見人物具焉右祛不走馬管仲曰臣聞登山之神有俞兒者長尺人物具焉霸王之君與走馬前道也祛衣其前水右祛示從右涉至溪如所言公拜焉曰仲父之聖若此莊子曰齊桓公遊於澤管仲御公見鬼仲曰澤有委蛇其大如轂其長如轅紫衣朱冠見人則舉其首而立見之者殆乎霸公曰此寡人之所見也墨子曰鄭繆公晝日處廟有神入門而左鳥身素服面狀正方繆公乃懼神曰無奔帝享汝明德使錫汝壽十年使君國昌公問神神曰豫為勾芒
