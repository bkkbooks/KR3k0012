body:
  text: 學部十讀誦禮記曲禮下曰居喪未葬讀喪禮既葬讀祭禮喪復常讀樂章論語曰南容三復白圭孔子以其兄之子妻之周禮春官下曰太史掌建邦之六典大祭祀與執事卜日執事太卜之屬及宿之日與群執事讀禮書而協事協合也合禮謂習録所當共之事也又曰小史掌邦國之志大祭祀讀禮法史以書敘昭穆之俎簋讀禮法者大史舉群執事史此小史也史記曰太史公曰豫讀孟子書至梁惠王問何以利吾國未嘗不廢書而歎息也曰嗟乎利誠亂之始也夫子罕言利者又曰孔子晚善易韋編三絶鐵擲三折漆書三滅也又曰董仲舒下帷讀書三年不窺園圃漢書曰劉向專精經術晝誦書傳夜觀星宿又曰揚雄自有大度非聖哲之書不好也非其意雖富貴不事也東觀漢記曰章帝詔黃香令詣東觀讀所未嘗見書謂諸生曰此日下無雙江夏黃童也又曰高鳳誦經晝夜不絶聲妻之田曝麥以竿授鳳令護雞鳳受竿誦經如故天暴雨流麥意在經不視麥漂謝承後漢書曰王充字仲任家貧無書至京師市讀書一見輒能誦憶又曰應奉字世叔讀書五行俱下又曰侯瑾字子瑜傭作為資暮還輒爇火以讀書後漢書曰和熹鄧后六歲能史書史書周宣王太史史籀所作大篆十五篇十二通詩論語諸兄每讀經傳輒下意難問志在典籍不問居家之事母常非之曰汝不習女工乃更務學欲舉博士耶后重違母言晝修婦業暮誦經典家人號曰諸生后又詔中官近臣於東觀受讀經傳以教授宮人左右習誦朝夕濟濟范曄後漢書曰周盤字伯堅居貧養母儉薄不充常誦詩至汝墳之卒章慨然而歎乃解韋帶就孝廉之舉也又曰裴駿字仲駒駿從第安祖少而聰慧年七八歲就師講詩至鹿鳴篇語兄云禽獸得食相呼而況人也自此之後未嘗獨食又曰尚長字子平河內朝歌人也隱居不仕讀易至損益卦喟然而歎曰吾以知富不如貧貴不如賤但未知死何如生魏武本紀曰吾讀介之推之避晉封申包胥之逃楚賞未嘗不廢書而歎魏略曰侍中董遇好學避難採樵負販常挾經書投間習誦人從學者遇不肯教云當先讀百遍而義自見吳志曰闞澤字德潤好學居貧常為人賃書所寫既畢誦誦亦遍魏志曰賈逵最好春秋課日讀一遍吳志曰劉贊字正明性果烈好讀兵書及史傳每覽古良將攻伐之勢輒對書獨歎晉書曰陶潛字元亮好讀書不求甚解每有會意欣然忘食又曰殷仲堪能清言善屬文每云三日不讀道德論便覺舌本間強其談理與韓康伯齊名士咸愛慕之又曰王恭抗直深存節義讀左傳至奉王命討不庭母輟卷而歎又曰劉敏元字道光北海人也厲己修學不以嶮難改心好星曆陰陽術數潛心易太玄不好讀史常謂同志曰誦書當味義根何為費功於浮辭之文易者義之源太玄理之門能明此者即吾師也王隱晉書處士傳曰王褒字偉元北海人也讀書至哀哀父母生我劬勞未嘗不反覆流涕霑胸也沈約齊紀曰顧歡字玄平少喪父事母謹孝母喪於墓側數年好事者或從受書每至哀哀父母生我劬勞悲動不能禁自是學徒廢蓼莪之篇不復講授也崔鴻十六國春秋前燕録曰韓景山安平雀津人也年十歲能屬文博覽經籍無所不通宋書曰沈演之家世為將至演之折節好學讀老子百遍以達義理上知名北齊書曰趙郡王琛字子睿初讀孝經至資於事父輒流涕歔欷又曰楊愔幼而喪母曾詣舅子泰泰與之飲問汝讀何書答曰詩泰曰至渭陽未耶愔便號泣感咽子泰亦對之歔欷於是遂為罷酒北史曰後魏元暉業領中書監録尚書事齊文襄嘗問之曰比何所披覽對曰數尋伊霍之傳不讀曹馬之書暉業以時運漸謝不復圖全唯事飲啖一日三羊三日一犢又嘗賦詩云昔居王道泰濟濟富群英今逢世路阻狐兔鬱縱橫梁書曰武帝每讀孝子傳未曾終軸輒輟書悲慟由是家門愛重探頤索隱窮理盡性究覽墳籍神悟知機讀書不待溫故一閲皆能誦憶又曰范雲傳初竟陵王子良為會稽太子雲為府主簿王未之知後剋日登秦望山乃命雲雲以山上有秦始皇刻石此丈三句一韻人多作兩句讀之並不得韻又皆大篆人多不識乃夜取史記讀之令上知明日登山子良命賓僚讀之皆茫然不識末問雲雲曰下官嘗讀史記見此刻石文進乃讀之如流水子良大悅因以為上賓又曰昭明太子統字德施美姿貌善舉止讀書數行並下過目皆憶陳書曰始興王叔陵修飾虛名每入朝常於車中馬上執卷讀書高聲長誦陽陽自若朝坐齋中或自執斧斤為沐猴百戲隋書曰崔儦字歧叔以讀書為務頗自負而忽人嘗大署其門曰不讀五千卷書無得入我室又曰來護兒字崇幼而慕詭好立奇節初讀詩至擊鼓其鏜踊躍用兵羔裘豹飾孔武有力捨書而歎曰大丈夫其世當如是為國滅賊以取功名安能區區久事隴畝群輩嘉其言而壯其志又曰韋師字公頴少沉謹有慧性初就學始讀孝經捨書而歎曰名教之極其在茲乎唐書曰章懷太子賢上深所嗟賞之謂司空李績曰此兒已讀得尚書禮記曾遣讀論語至賢賢易色再三覆誦之乃云雲性愛此言固知夙成聰敏出自天性也又曰蕭德言晚年尤篤志於學自晝達夜略無厭倦每欲開五經必盥濯束帶危坐對之妻子候間請曰終日如是無乃勞乎德言曰敬先聖之言豈憚如此又曰郭山惲蒲州河東人少通三禮景龍中纍遷國子司業時中宗數引近臣及修文學士與之宴集嘗令各效伎藝以為笑樂工部尚書張錫為談客娘舞將作大匠宗晉卿舞渾脫左衛將張洽舞黃麞左金吾衛將軍杜元琰誦婆羅門呪給事中李行言唱駕車西河中書舍人盧藏用效道士上章山惲獨奏曰臣無所解請誦古詩兩篇帝從之於是誦鹿鳴蟋蟀之詩奏未畢中書令李嶠以其詞有好樂無荒之語頗涉規諷恐為忤旨遽止之帝嘉山惲之意墨子曰周公朝讀書百篇夕見七十五士莊子曰孔子遊于緇惟之林休于杏壇之上弟子讀書孔子絃歌鼓琴有漁父聽曲為法又曰臧與穀相與牧羊而俱亡其羊問臧奚事挾策讀書問穀奚事博塞以遊又曰桓公讀書於堂上輪扁斫輪於堂下釋椎鑿而問曰敢問公所讀之書何言也公曰聖人之言曰聖人在乎公曰已死矣曰然則公所讀者古人之糟粕也公曰寡人讀書輪人安得議乎有説則可無説則死扁曰以臣之事觀之斫輪徐則甘而不固疾則苦而不入不徐不疾得於手而應於心口不能言也有數存焉於其間臣不能以喻臣之子臣之子亦不能受之於臣是以行年七十而老斫輪古人物各有信教學之無益也古人與其不可傳者死矣然則君之所讀者古人之糟粕而已尚書大傳曰子夏讀書畢見夫子夫子問子何為於書子夏曰書之論事皎皎如日月之代明離離如參辰之錯行商所受於夫子者志之於心弗敢忘也尸子曰孔子曰誦詩讀書與古人居説苑曰孔子讀易至於損益則喟然而歎子夏避席而問曰夫子何為歎孔子曰夫自損者益自益者缺吾是以歎也子夏曰然則學者不可以益乎孔子曰否天之道成而必變未嘗得久也夫學者以虛受之昔堯履天子之位允恭以持之虛靜以待下故百載而逾盛迄今而益章昆吾自臧而滿意窮高而不衰故當時虧敗迄今而逾惡是非益損之徵歟日中則昊月盈則食天地盈虛與時消息是以聖人不敢當盛升輿而遇三人則下二人則軾調其盈虛故能長久也子夏曰善請終身誦之神仙傳曰孔子讀書老子見而問曰是何書也曰禮也聖人亦讀之老子云聖人可也汝曷為復讀之洞冥記曰李充者馮翊人也自言三百歲從秦始皇登會稽山以望江漢之流也少而好學為秦博士門徒萬人伏生時十歲乃就充石壁山中受尚書乃以口傳受伏子四代之事略無遺脫伏子因而誦之常以細繩十餘尋以縛腰誦一遍則結繩一結十尋之繩皆成結矣計誦尚書可數萬遍但食穀損人精意有遺失伏子今所傳百卷得其一二耳故堯舜二典闕漏尤多家語曰孔子讀史至於楚復陳陳夏徵舒殺其君楚莊王討之因取陳而有之申叔時諫莊王從之乃復陳國也喟然歎曰賢哉楚莊王也輕千乘之國而重一言之信非申叔之忠弗能進其義非莊王之賢弗能受其訓春秋後語曰蘇周歸周雖多畜亦何以為於是夜發書篋數十得周書陰符戰國策云得太公陰符之謀伏而讀之欲睡引錐剌其股血流至踝暮年以出揣摩曰此可以説當世之君矣幽明録曰襄陽城南有秦民墓為性至孝親歿泣血三年人有為其詠蓼莪詩者民聞其義涕泗不自勝桓子新論曰劉子政子駿伯玉三人尤珍重左氏教子孫下至婦女無不讀誦俗説曰劉柳為僕射傅迪為左丞傅好讀書而不解其義劉唯讀莊老而已傅道劉云正讀十二卷何足本人劉道傅云讀書雖多而無所解可謂書簏物理論曰語曰能理亂絲乃可讀詩余雖無治絲之能而悟聞詩之義華陽國志曰徐誦字子産少讀書日不過五十字誦千遍乃得終成儒學先賢傳曰延篤從唐季度受左氏欲寫傳本無紙乃借本誦之及辭歸季度曰卿欲寫傳何辭歸答曰已誦之矣孝德傳曰張楷字公超河南人也至孝自然喪親哀毀每讀詩見素冠棘人未嘗不掩泗焉列女傳曰班婕妤況之女賢才通辨選入後宮每讀詩及窈窕淑女之篇必三復之晉潘嶽間居賦序曰嶽讀汲黯傳見司馬安四至九卿而良史書之題以巧官之目未嘗不慨然廢書而歎金樓子曰有人讀書握卷而輒睡者梁朝有名士呼書卷為黃妳此蓋言其怡神養性妳媼也又曰凡讀書必以五經為本所謂非聖人之書勿讀讀之百遍其義自見此外衆書自可泛而觀耳正史既見得失成敗此經國之所急五經之外宜以正史為先譜諜所以別貴賤明是非尤宜留意或復中表親踈或復通塞升降百世衣冠不可不悉又曰自敘云吾時夏夕中下綘紗中有銀甌一枚貯山陰甜酒臥讀有時至曉率以為常又經病瘡肘膝爛盡此以來三十餘載泛玩衆書萬餘矣曰余年十四苦眼疾沉痼此來轉暗不復能自讀書三十六年來恆令左右唱之曾生所謂誦詩讀書與古人居讀書誦詩與古人期茲言是也
