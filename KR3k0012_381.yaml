body:
  text: 人事部二十一美丈夫下唐書曰張知謇蒲州河東人徙家于歧少與兄知立知晦弟知默勵志讀書皆明經擢第儀質瓌偉眉目踈朗曉立理文而清介自守故公卿爭進之又曰崔湜美姿儀有才名弟液滌及從兄涖並有文翰居清要每宴私之際自比東晉王導謝安之家謂人曰吾之門及出身歷官未嘗不為第一丈夫當先據要路以制人豈能默默受制於人液尤善五言堤歎曰海子我家之神龜也海子即液小名官至殿中侍御史又曰盧承慶美風儀博學有才干貞觀初為秦州都督府戶曹參軍因奏河西軍事太宗奇其明辨擢拜考功員外郎遷民部侍郎太宗嘗問歷代戶口數承慶敘夏商後迄于周隋皆有依據上嗟賞之令兼檢校兵部侍郎知五品選事莊子曰盜跖謂孔子曰長大美好人見而悅者此吾父母遺德丘雖不吾譽吾不自知耶傅玄子曰蒯躬字叔孝性方嚴有容儀人望而畏之有過其門者皆整衣改容郭子曰潘安仁夏侯湛並有美容貌常同行人謂之連璧又曰謝哲字頴豫陳郡人也美風儀舉止蘊藉而襟情豁然為士君子所重郭林宗別傳曰林宗遊洛陽見河南尹李膺膺大奇之於是名震京師復歸鄉里衣冠諸儒送至河上車數千兩林宗唯與膺同舟而濟衆賓望之以為神仙焉晉謝安別傳曰王珣以疾辭職歲餘卒桓玄與會稽王導子書曰珣神情朗悟經史明徹風流之美公私所寄忽爾喪失歎悼之深豈但風流相悼而已荀氏家傳曰荀悅字仲豫儉之子儉早卒悅年十二能説春秋家貧無書每之人間所見篇讀一覽多能誦記性靜美姿容又曰荀羡字令則七歲隨父在石頭蘇峻愛其姿神數喚之年十五擬國婚之選不欲連姻帝室乃遁長沙監司追尋不得已遂尚潯陽公主風氣英秀明鬚眉俯仰眄睞容止可則皇甫謐逸士傳曰或問許子將荀靖與荀爽孰賢子將曰二人皆玉也慈明外朗叔慈內潤何晏別傳曰何晏南陽人大將軍進之孫遇害魏武納晏母晏小養於魏宮至七八歲惠心天悟形貌絶美武帝欲以為子每扶將遊觀令與諸子長幼相次晏微覺之坐則專席止則獨立或問其故答曰禮異姓不相貫管輅別傳曰諸葛原與管輅別戒二事言卿樂酒量溫克然不可保寧當節之即卿有水鑒之才所見者妙仰觀如神禍如膏火不可不慎也吳地記曰陸閎字子春暢子也姿容如玉威儀秀異光武升臺而見偉之笑曰南方故多佳人三國典略曰李繪儀貌端偉神情朗俊舅河間邢晏每與之言歎其高遠稱之曰若披煙霧如對珠玉宅相之奇良在此甥文襄嗣業晉代山東諸郡其特降書徵者唯繪清河太守辛術二人而已又曰梁楊白花字長茂武都仇池人大眼之子也少有勇力容貌瑰偉又曰山公目嵇叔夜之為人也巖巖若孤松之獨立又曰稽叔夜之為人其醉也隗峨如玉山之將頽又曰衛玠從豫章下人久聞其姿觀者如堵玠先有羸疾發遂死時人謂看殺衛玠又曰人歎王恭形茂者濯濯如春月柳又曰王右軍見杜洪理歎曰膚如凝脂眼如點漆此神仙中人也又曰裴叔則有俊彩容儀脫冠粗服亂頭皆好有人見之曰裴叔則如玉山行光映照人也又曰時人目李宣國如玉山之將摧又曰衛伯玉為尚書令見樂廣與朝中名士談義奇之曰自昔諸子弟造之曰此人水鑒也瑩然若披雲霧而覩青天又曰撫軍問孫興公劉真長何如曰清簡令淑王仲祖何如曰溫潤怡和又曰范豫章謂王荊州范髯王悅曰卿風流俊望真後來之秀王曰不有此舅焉有此甥王氏譜曰坦之娶陽范注女寧姊姊生悅又曰廋子嵩目和嶠森森如千丈之松雖磊砢有節目施之大廈有棟梁之用也楊松玠談藪曰張緒字思曼少而間雅風流吐納觀者忘疲永明主見靈和殿前柳條嫩弱披靡可愛嗟賞曰此楊柳風流可愛似張緒少年宋玉風賦曰楚襄王時宋玉休歸唐勒讒之於王王謂玉曰體貌容冶口多微辭不亦薄乎玉謂王曰身體容冶受之二親口多微辭聞之聖人陳沈炯長安少年行曰長安美少年驄馬鐵連錢陳王裝腦勒晉帝鑄金鞭步搖如飛燕劍鍔似舒蓮去來新市北遨遊大道邊美婦人上周易曰冶容誨淫毛詩曰窈窕淑女君子好逑又曰靜女其姝俟我於城隅匪女之為美美人之貽妹美色也又曰云誰之思美孟薑矣又曰彼美孟薑詢美且都有女同行顏如舜英舜英木槿也又曰野有蔓草零露漙兮有美一人清楊婉兮又曰齊侯之子衛侯之妻東宮之妹邢侯之姨談公惟私手如柔荑膚如凝脂領如蝤蠐齒如瓠犀秦首娥眉巧笑倩兮美目眄兮又曰彼美淑姬可以晤歌又曰有女如玉又曰有女如雲又曰孌彼諸姬孌好貌左傳曰叔向欲娶申公巫臣氏其母曰吾聞甚美必有甚惡而天鍾美於是將必是以有敗也昔有仍氏生女鬒黑光可以鑑名曰玄妻樂正后夔娶之生伯封古諸侯髮美曰鬒實有豕心夔舜典樂夫有尤物足以移人茍非德義必有禍尤異也又曰宋華父督見孔父之妻於路目逆而送之曰美而艷色美曰艷又曰衛侯自城上見巳氏之妻髮美使髡之以為呂薑髢又曰鄭有徐吾犯之妹甚美公孫楚與公孫黑爭聘之公羊傳曰驪姬者國色也其顏色一國之選又曰邾婁顏夫人者嫗盈女國色也爾雅曰美女為媛國語曰恭王遊於涇上密康公從三女奔之其母曰必致之於王夫獸三為群人三為衆女三為燦今以美物歸汝而何德以堪之康公弗獻一年王滅密賈逵注曰燦美也戰國策曰晉文公得南威三日不朝遂推南威而遠之曰後代必有以色亡國者又曰陰姬與江姬爭為后司馬喜為陰姬乃謂趙王曰臣聞趙佳麗之所出也今至境入都邑殊無美者臣未嘗見人如中山陰姬者其眉目準額權衡偃月乃帝王之后非諸侯姬也趙王大悅欲請之司馬喜歸謂中山君曰趙王非賢主也乃欲請陰姬王宜立以為后以絶趙王之意中山君遂立為后又曰張儀之楚見楚王曰彼周鄭之女粉白黛黑立於衢閭之間非知而見之者以為神王曰楚僻陋之國寡人未見中國之女如此之美乃資以珠玉使行后鄭袖聞之大恐令人謂張子曰聞君將之晉有千金斤請供芻秣張子請王觴之王召鄭袖而觴之張子再拜曰儀有死罪儀行天地遍矣未嘗見人如此之美也而儀言得美人是欺王也王曰吾固知天下無兩人矣史記曰紂囚西伯而閎夭之徒以有莘氏美女獻紂紂大悅乃放西伯又曰漢武帝時尹夫人與邢夫人同時幸武帝有詔不得相見尹夫人自請武帝願見邢夫人帝令他夫人飾從者數十人來前尹夫人見之曰非邢夫人帝曰何以知之對曰觀其體貌形狀不足以當人主有詔邢夫人邢夫人故衣獨身來尹夫人望見曰真是矣於是乃低頭而泣自痛其不如也諺曰美女入室惡女之仇漢書曰孝武李夫人本以倡進初夫人兄延年性知音律善歌舞侍上起舞歌曰北方有佳人絶世而獨立一顧傾人城再顧傾人國寧不知傾城與傾國佳人不可得上歎息曰善世豈有此人乎平陽主因言延年有女弟上乃召見之實妙麗善舞李夫人少而早卒上憐愍焉圖畫其形於甘泉宮華嶠後漢書曰梁冀妻孫壽色美而善為妖態作愁眉啼粧墮馬髻折腰步齲齒笑以為媚惑東觀漢記曰趙喜與友人韓仲伯欲出武關仲伯以其婦有色恐有強暴者而己受其害欲棄之喜責怒仲伯以泥塗其婦面載以鹿車身自推每逢賊輒為求哀言其病遂脫又曰初光武聞陰麗華美心悅歎曰娶妻當得陰麗華後為皇后漢武故事曰又起明光宮發燕趙美女二千人充之率取十五以上二十以下年滿四十者出嫁凡諸宮美人可七八千帝從行郡國載之後車與上同輦者十六人員數恆使滿皆自然美麗不使粉白黛黑侍衣軒者亦如之魏略曰初袁紹子熙納甄后熙出奔幽州后留侍姑及鄴破紹妻及后坐堂皇上紹妻自搏文帝語袁夫人令新婦舉頭姑乃捧后令仰帝就視見其顏色非凡稱歎之太祖為迎也吳志曰周瑜從孫策攻皖城得喬公兩女國色也策自納大喬瑜納小喬又曰孫權步夫人以美麗得幸寵冠後庭王隱晉書曰阮籍鄰家處女有才色籍不與親生不相知未嫁而死籍往哭盡哀乃去晉陽春秋曰荀燦字奉倩常曰婦人者才智不足論自宜以色為主驃騎將軍曹洪女有美色燦於是聘焉容服帷帳甚麗專房宴寢歷數年後婦偶病亡未殯傳嘏往唁燦不哭神傷曰佳人難再得痛悼不已歲餘亦亡鄧粲晉紀曰杜韜至長沙掠前始興太守尹虞二女皆國色也將妻之曰我父二千石終不為賊作婦遂自殺焉又曰謝鯤鄰家有美女鯤挑之女織梭投之折其兩齒干寶晉紀曰石崇有妓曰緑珠美如玉善舞孫秀使人求焉崇方登涼觀臨清水婦人侍側使者以告崇崇盡出婦妾數十人以示之皆蘊蘭麝而披羅縠使者曰君侯服御麗矣然本受命旨索緑珠崇勃然曰緑珠吾所愛不可得也使者曰願加三思崇曰不然使者還以告故秀勸趙王倫殺之崔鴻十六國春秋前趙録曰劉聰使大鴻臚李恆聘太保劉商女謂恆曰此女輩皆姿色超世且太保於朕實自不同恆曰太保裔自有周與聖源實別聰大悅賜金六十斤又曰崔後趙石虎鄭后名櫻桃晉冗從僕射鄭世達家妓也在中猥妓中虎數歎其貌於太妃太妃給之又曰前秦初符堅滅燕慕容沖妹年十四有殊色堅納之車頻秦書曰符堅時新羅獻美女國在百濟國東三十國春秋曰後梁呂超殺其君纂后楊氏國色超將妻焉謂其父恆曰后若自殺禍必及宗恆以此言告后后曰大人本賣女與氐羌以圖富貴一之以甚其可再乎恆不能強乃自殺唐書曰喬知之尤稱俊才所作篇詠時人多諷誦之則天時纍除右補闕遷左司郎中知之有侍婢曰窈窕娘美麗善歌舞為武承嗣所奪知之怨惜因作緑珠篇以送與婢婢感憤自殺承嗣大怒因諷酷吏羅織知之下獄死南史恩幸傳曰阮佃夫見廬江何恢有妓張耀華美為廣州刺史將發要佃夫飲設樂見張氏悅之頻求此人恢曰不可佃夫拂衣出戶曰惜指失掌邪遂諷有司以公事彈灰
