body:
  text: 禮儀部四十一謚釋名曰古者諸侯薨時天子論行以賜謚唯王者無上故於南郊稱天以謚之當春秋時周室卑微臣謚其父故諸侯之謚多不以實也周禮曰太師凡大喪師其瞽而廞作柩謚鄭玄注曰欽興也興言王之行陳其生時行跡為作謚又曰太史掌卿大夫之喪賜謚讀誄其讀謚誄亦以太史賜謚禮曰已孤暴貴不為父作謚鄭玄注曰子事父母無貴賤等也又曰公叔文子卒其子戍請於其君曰日月有時將葬矣請所以易其名者謚者行之跡也君曰昔者衛國凶飢夫子為粥與國之餓者是不亦惠乎君靈公也昔者衛國有難夫子以其死衛寡人不亦貞乎夫子聽衛國之政修其班制以與四鄰交衛國社稷不辱不亦文乎故謂夫子貞惠文子又曰幼名冠字五十以伯仲死謚周道也又曰死而謚今也昔者生無爵死無謚古謂殷以前也大夫以上乃謂之爵旡有謚也又曰子曰先王謚以尊名節以壹惠恥名之浮於行也名為聲譽也先王論行為謚以尊名者使聲譽可得而尊言也惠猶善也言聲譽雖眾節以其行一大善者為謚也傳曰無駭卒無駭始為卿未賜族也羽父請謚與族公問於眾仲對曰天子建德因生以賜姓祚之土而命之氏諸侯以字為謚因以為族官有世功則有官族又曰鄭人討幽公之亂斲子家之棺而逐其族改葬幽公謚之曰靈又曰楚恭王卒子囊謀謚大夫曰君有命矣子囊曰君命以為恭若之何毀之赫赫楚國而君臨之撫有蠻夷奄征南海以屬諸夏而知其過可不得謂之恭乎請謚之恭大夫從之又曰衛侯賜北宮喜謚曰貞子賜析朱鉏諸曰成子論語曰子貢問曰孔文子何以謂之文也子曰敏而好學不恥下問是以謂之文也漢書曰景令諸侯薨列侯初封及之國大鴻臚奏誄策列侯薨及諸侯太傅初除之官大行謚奏誄策又曰賈山奏事曰聖王作謚三四十世耳雖堯舜禹湯文武累世廣德以為子孫基業無過三四十世也秦始皇帝曰死而以謚法是父子名號有時相襲者以一至萬則世世不相復也故死而號曰始皇帝其次曰二世皇帝欲以一至萬也張璠漢書曰范丹卒三府各遣令史奔弔累行論謚曰宜為貞節先生又曰蔡雍嘗至朱穆家寫其書及穆卒雍及門人共謚穆曰忠文璠論曰夫謚者上之所贈非丁之所造故顏冉至德不聞有謚蔡朱二子各以襄代藏否不立故私議也范曄後漢書曰夏侯恭善為文章諸儒共謚曰宣明子牙少習家業著賦頌讚凡四十篇舉孝廉早卒鄉人號曰文德先生魏書曰有司議謚以為鍾繇昔為廷尉辨理刑獄決嫌明疑民無怨者猶於張之在漢也詔曰太傳功高德茂位為師傅論行賜謚當先依此兼敘廷尉於張之德耳乃榮謚曰成侯干寶晉記曰何曾卒下禮官謚博士秦秀議曰曾資性驕奢不修軌則弈世以來宰臣輔相未有受詬辱之聲被有司之劾父子塵累而蒙恩貸若曾者也謹按謚法名與實爽曰繆怙威肆行曰醜曾宜謚為繆醜又曰太尉魯公賈充薨初充用韓謐為賈氏嗣上特許之及議謚愽士秦秀曰充位冠群后惟民之望而悖禮溺情以亂大倫案謚法昏亂紀度日荒充宜謚曰荒上弗從賜謚曰武晉書曰太康八年太常上謚故太常平陽男郭弈為景侯有司奏云晉受命以來祖宗號謚群下未有同者故郭弈與景皇同不可聽宜謚曰穆晉中興書曰中宗即尊號也時賜謚多由封爵不考德行王遵上䟽曰臣聞大行受大名小行受小名名則實稱不誣而已近代以來惟爵得謚武官牙門有爵必謚卿校常伯無爵悉不賜謚甚失制謚之本今中興肇建勳德兼被宜深體前訓使行以謚彰豈可限以有爵中宗納焉自後公卿無爵而謚自遵始也沈約宋書曰江智淵出為北中郎長史初上寵姬宣貴妃殷氏卒使群臣議謚智淵上謚曰懷上以不盡嘉號甚銜之後車駕幸南山乘馬至殷氏墓群臣皆騎從上以馬鞭指石柱謂智淵曰此柱上不容有懷字智淵益懼宋書曰劉康祖出軍至壽陽數十里會魏永昌王以長安之眾八萬騎與康祖相及於尉康祖有八千人乃結車營而進魏軍四面來攻眾分為三且休且戰康祖率厲士將無不一當百魏軍死者太半流血沒踝矢中頭而死於是大敗舉軍淪覆免者纔數十人魏人傳康祖首示彭城百姓贈益州剌史謚曰壯又曰蕭眕音軫素為諸暨令到縣十餘日掛衣冠於縣門而去獨居屏事非親戚不得至其籬門妻齊太尉王儉女久與別居遂無子卒親故跡其事行謚曰貞文先生又曰曇首卒文帝臨慟歎曰王詹事所疾不救國之襄也中書舍人周赴侍側曰王家欲襄賢者先殯上曰直是我家襄耳以預誅羨之等謀追封預寧縣侯謚曰文又曰王晏為吏部尚書令王儉雖貴而踈晏既領選權行臺閣與儉頗不平儉卒禮官欲依王謚為文獻晏啟上曰乃得此謚但宋來不加素族出謂人曰平頭憲事已行矣後魏書曰孝文太和十六年改謚宣尼曰大聖尼父告謚孔廟齊書曰長沙威王晃武帝嘗幸鍾山晃從駕以馬矟剌道邊枯蘗上令左右數人引之銀纏皆卷聚而矟不出乃令晃復馳馬拔之應手便去每遠州獻駿馬上輒令晃於華林中調試之高帝常曰此我家任城也武帝緣此意故謚曰威任城即魏任城王彰也梁書曰蕭子顯卒請謚手勑曰恃才傲物宜謚曰驕又曰徐勉卒武帝聞而流涕即車駕臨殯皇太后亦舉哀朝堂有司奏謚居敬行簡曰簡執心決斷曰肅因謚簡肅公又曰蕭機字智通位湘州剌史美姿容善吐納家既多書愽學強記然而好弄尚力遠士子近小人為州專意聚歛無政績頻被案劾將葬有司請謚詔曰王好內怠政宜謚曰煬又曰蕭曄為晉陵太守曄初至郡屬旱躬自祈禱果獲甘潤郡多猛獸為害曄在政六年此暴遂息卒于郡初曄寢疾歷年官曹擁滯有司案謚法言行相違曰僣乃謚曰僣侯陳書曰袁泌為司徒左長史卒于官臨終戒其子芳華曰吾於朝廷素無功績瞑目之後斂手足旋葬無得受贈謚其子述泌遣意朝廷不許謚曰質唐書曰開元中贈左丞相程行諶謚曰貞歧王府長史裴子餘謚曰孝同時列上中書令張說省之曰程裴二謚可謂謚之無愧也又曰貞元中太常奏馬燧謚景武上改為莊武以避太祖謚又曰元和中賜太子賓客于頔謚曰思初有司謚曰厲至是特易之右丞張正甫封其勑請還本謚補闕高鉞上䟽曰夫謚者所以懲惡勸善激濁揚清使忠臣義士知勸亂臣賊子畏罪孔子修春秋亂臣賊子懼蓋為此也垂範如此尚不能救況又隳其典法乎大戴禮曰周公旦為太師相嗣王作謚法者行之跡也號者功之狀也服者位之章也是以大行受大名細行受小名行出於己名出於人謚慎也以人行之始終悉慎錄之以為名也禮記外傳曰古者生無爵死無謚古謂夏殷之前謚法周公所為也堯舜禹湯皆後追議其功耳謚者行之跡也累積平生所行事善惡而定其名也有大行受大名謂之景行景大也有大善若禹湯文武者小善受小名若宣若成其德狹也文經天地其德博也武定禍亂其功大也五經通義曰謚者死後之稱累生時之行而謚之生有善行死有善謚所以勸善戒惡也謚之言列其所行身雖死名常存故謚也白虎通曰謚者何謂也謚之為言引也引列行之跡也所以進勸威德使上務禮節死乃謚之詩云靡不有初鮮克有終始終不能若一故據其終後可知也今世所以臨葬而謚之何因眾會欲顯揚之也謚或一言或兩言何文者一言為謚質者兩言為謚故湯死後稱成湯是明二言為謚也謚七十二品禮謚法曰翼善傳聖曰堯仁聖盛明曰舜慈惠愛民曰文剛德理直曰武天子崩大臣至郊謚之者何以為臣子之義莫不欲褒稱其君掩惡揚美者故之郊明不得欺天也又曰卿大夫老歸死有謚何謚者別尊卑彰有德卿大夫歸無過猶有祿位故有謚也夫人無謚者何無爵故無謚或曰夫人有謚夫人國之母修閨門之內即下亦化之故設謚以彰其善惡春秋傳曰葬宋恭姬傳曰其稱謚何賢也傳曰哀者何莊公夫人也卿大夫妻無謚者何賤也八妾所以無謚何卑賤無所能豫猶士畢小不得有謚太子夫人無謚何本婦人隨夫太子無謚則夫人不得有謚天子太子元士也士無謚知太子亦無謚也附庸所以無謚何卑小無爵也王制曰古者之制爵祿凡五等附庸不在其中明附庸無爵也號謚何法生稱火死稱灰也抱朴子曰上古無謚始於周家耳黃帝謚蓋後人追為之謚取其治世時行跡而已非黃帝群臣之作也俗人通自不信仙寧肯追以仙謚黃帝乎穆天子傳曰為盛姬謚曰哀俶人荀氏家傳曰荀爽對象策曰臣聞火生於木故其德孝漢之謚帝稱孝者其義取此故漢制使天下皆誦孝經選吏則舉孝廉以孝為務也列女傳曰魯黔婁先生死曾子與門人往弔焉曰何以為謚其妻曰以康為謚昔先君嘗賜之粟三十鍾先生辭而不受是其餘富也君嘗欲授之以國相先生辭而弗為是其餘貴也彼先生者甘天下之淡味安天下之卑位不戚戚於貧賤不汲汲於富貴求仁而得仁求義而得義其謚為康不亦宜乎崔駰章帝謚議曰臣聞號者功之表謚者行之跡據德錄功各當其實孝經曰天地明察神明章矣唐書數堯之德曰平章百姓言天之常德也詩曰追琢其章金玉其相亹亹文王綱紀四方又曰倬彼雲漢為章於天喻文王聖德有金玉之質猶雲漢之在天也舉表拆義四方德附矣易曰先天而天弗違後天而奉天時臣愚以宜上尊號曰章唐獨孤及謚呂諲曰肅嚴郢駮曰國家故事宰臣之謚有二字以彰善旌德焉夫以呂公文能無害武能禁暴貞則幹事忠則利人盛烈宏規不可備舉傳敘八元之德曰忠肅恭懿若以美謚擬於形容請曰忠肅及重議曰謚法在懲惡勸善不在字多必稱其大而略其細故言文不言武言武不言文三代以下朴散禮壞乃有二字之謚非古也其源生於衰周漢興簫何張良霍去病霍光俱以文武大略佐漢致太平其事業不一謂一文不足以紀其善於是有文成景桓成之謚雖黷禮甚矣然猶褒不失人唐興參用周秦之制以魏徵為文貞簫瑀為貞褊其杜如晦封彝陳叔達溫彥博岑文本唐休璟魏知古崔日用並當時赫赫以功名居宰相者謚不過一字不聞子孫佐吏有以字少稱屈由此言之二字不必為褒一字不必為貶若褒貶果在乎字數則是堯舜禹湯文武成康不如周威烈慎靖也齊桓晉文不如趙武靈魏安釐也杜如晦王珪以下或成或明或懿或憲不如蕭瑀之貞褊也然肅者威德克就之名以諲之從政威能閑邪德可濟眾故以肅易名而忠在其中矣亦猶隨會甯俞之不稱文豈必因而重之然後為美魏晉已來賈許之籌筭賈逵之忠莊張既之政能程普之智勇顧雍之密重王渾之器量劉恢之鑒裁庾翼之志略彼八君子者方之東平宜無慚德死之日並謚曰肅當代不以為貶何嘗徵一字二字以為之升降乎諱周禮曰小史掌邦國之志奠繫世辨昭穆若有事則詔王之忌諱志謂記也先王死為忌名為諱禮曰禮不諱嫌名二名不偏諱逮事父母則諱王父母不逮事父母則不諱王父母遠不及也謂幼孤不及識父母不至於祖名也孝子聞名心瞿諱之由心也此謂庶人也適士以廟事祖雖不建父母猶諱祖也大夫之所有公諱避君諱也詩書不諱臨文不諱廟中不諱謂有事於高祖則不諱曾祖以下尊無二也大夫之諱雖質君之前臣不諱也臣於夫人之家恩遠也質獨對也婦諱不不出門婦親近於宮中言避之耳大功小功不諱入境而問禁入國而問俗入門而問諱又曰二名不偏諱夫子之母名徵在言在不稱徵言徵不稱在稱舉也又曰過而舉君之諱則起舉猶言也起立者失言而變自新與君之諱同則稱字謂諸臣之名也又曰卒哭而諱自此而鬼神事之尊而諱其名王父母兄弟世父叔父姑姊妹子與父母諱父為其親諱則子不敢不從諱也諸王父母以不之親諱是謂士也天子諸侯諱群祖母之諱宮中諱妻之諱不舉諸其側與從祖昆弟同名則諱之傳曰周人以諱事神名終將諱之君父之臣固非臣子所斥然禮既辛哭以大澤徇曰舍故而諱新曰舍親盡乏祖而諱新死者故言以大諱事神名絲將諱之自父至高祖皆不敢斥言蕭子顯齊書曰始安貞王道生字孝伯太祖次兄也子鳳字景慈卒於宋明帝贈始安靖王改華林鳳莊門為望賢門太極東堂畫鳳鳥題為神鳥而鸞鳥為神雀南史曰王琨避諱過甚父名懌母名恭心不得犯焉時咸謂矯枉過正又曰王亮王攸之子為晉陵太守在職清公有美政時有晉陵令沈瓚之性麤踈好犯亮諱亮不堪遂啟代之瓚之怏怏乃造坐云下官以犯諱被代未知明府諱若為攸字當作酋傍安大猶為大傍安酋猷若有心悠無心攸乞告示亮不及履下床跣而走瓚之拊掌大笑而去唐書曰賈曾除中書舍人固辭以父忠同音識者以為中書是曹司名又與曾父音同字異於禮無嫌曾乃就職顏氏家訓曰近世謝舉甚有聲譽聞諱必哭為世所譏世說曰桓玄呼人溫酒自道其父名既而曰英雄正自麤踈語林曰王藍田作會稽令人問諱荅曰惟祖惟考四海所知過無復諱徐邈表不諱太子名議興太守褚爽上表稱皇太子名尚書下之禮官以時議其可否禮官議疑無適準正聊率所見以論之曰禮記曰夫人之諱雖質君之前臣不諱也案夫人國之小君君之一體太子之母也而尚不諱則太子何嫌乎又禮君前臣名又周公告文王皆稱武王名可益明矣忌日禮曰君子有終身之喪忌日之謂也忌日不用非不祥也言夫忌日志有所至而不敢盡私忌日親亡之日忌日者不用舉他事如有時日之禁也祥善也志有所至至於親以此日忘其哀心如喪時續漢書曰申徒與屠字同蟠字子龍父母卒蟠思慕不飲酒食肉十餘年忌日哀戚輒三日不食晉書曰穆帝納后欲用九月九日是忌月范汪問王彪之荅云禮無忌月不敢以所不見便謂無之博士曹躭荀訥等並謂無忌月之文不應有妨王洽曰若有忌月當復有忌歲唐書曰萬歲通天中建安王攸宜平契丹凱旋欲詣闕獻俘內史王及善以為將軍將入城例有軍樂今屬孝明高皇帝忌月請備而不奏鸞臺侍郎王方慶奏案禮經但有忌日而無忌月晉穆帝納后用九月九日是康帝忌月于疑不定下太常禮官荀納議稱禮只有忌日無忌月語若有忌月即有忌時忌歲軍樂是軍容與常不同請振作於事無嫌孔叢子曰季節見於子順子順賜之酒辭問其故對曰今家之忌日也故子順曰飲也禮雖衰麻見於君先生君及先生與之梁肉無辭所以敬尊長而不敢遂其私也忌日方於有服輕矣蕭廣濟孝子傳王脩字叔治北海人年十歲喪母母以社日亡來年社日脩哀感悲號鄰人為之罷社世說曰前輩人忌日唯不飲酒作樂王世將以忌日送客至新亭主人須臾欲作音聲王便去時單往衛洗馬墓下彈馬語林曰桓玄不立忌日政有忌時每至日絃觴無廢
