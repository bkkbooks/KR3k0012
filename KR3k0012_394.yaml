body:
  text: 人事部三十四坐釋名曰坐挫也骨節挫屈也小人群黨坐於王床王床者王者床毛詩車鄰曰既見君子並坐鼓瑟禮記曲禮上曰夫為人子者坐不中席又曰離坐離立無往參焉又曰男女不離坐又曰立母跛坐無箕又曰有憂者側席而坐有喪者專席而坐又曰虛坐盡後食坐盡前左傳讓五曰伍舉奔晉聲子遇之郊班荊相與食班布荊坐又襄二十六年曰衛子鮮奔晉公使止之不可及河又使止之止使者而盟于河託於木門木門青向不向衛國而坐怨之深也又定上曰申包胥如秦乞師勺飲不入口七日秦哀公為之賦無衣九頓首而坐秦師乃出春秋演孔圖曰孔子長十尺大九圍坐如蹲龍立如牽牛爾雅曰妥安坐也漢書曰單父人呂公善沛令避仇從之客因家焉沛中豪桀吏聞令有重客皆往賀蕭何為主吏主進進者會禮之財也主賦斂禮進為之師也令諸大夫曰進不滿千錢坐之堂下高祖為亭長乃紿為謁曰賀錢萬實不持一錢謁入呂公大驚起迎之門呂公者好相人見高祖狀貌因重敬之引入坐上坐又曰上幸上林皇后慎夫人從其在禁中常同坐及坐郎署袁盎卻慎夫人坐慎夫人怒不肯坐上亦怒起盎曰陛下既已立后慎夫人乃妾妾主豈可以同坐哉又曰茂陵徐生上疏言霍氏泰盛後霍氏誅滅而告霍氏者皆封人為徐生上書曰臣聞客有過主人者見其竈直突傍有積薪客謂主人更為典突遠從其薪不者且有火患主人默然不應俄而家果失火鄰里共救之幸而得息於是殺牛致酒謝其鄰人灼爛者在於上行餘各以功次坐而不祿言曲突者又曰高祖使陸賈賜趙他印為南越王賈至尉他魋結基倨見賈基倨謂伸其兩膚而坐也亦曰箕踞又曰諺曰千金之子坐不垂堂又曰陳遵字孟公時列侯有與陳遵同姓者每至門人曰陳孟公坐中莫不震動既至而非因號其人曰陳驚坐東觀漢記曰上幸譙使王霸攻周建賊雨射城中中霸前酒鐏霸安坐不動又曰隗囂圍來歙上自將救之圍解置酒高會賜歙班絶席坐在諸將之右謝承後漢書曰汝南薛悙字子禮為北海長家貧坐無完席妻曰白居無俸祿給子孫復無完席耶悙以善席與自坐敗者又曰鄭敬字次都釣於大澤折芰而坐以荷薦肉瓠瓢盛酒琴書自娛范曄後漢書曰袁術僣號人情離叛欲北至青州從袁談曹操使劉備邀之還壽春至江亭坐簀床而歎曰袁術乃至於是乎歐血而死又曰孔融性寬容少忌好士喜誘益後進及退間職賓客日盈其門常歎曰坐上賓恆滿樽中酒不空吾無憂矣與蔡雍素善雍卒後有虎賁士貌類於雍融每酒酣引與同坐又曰鄭公業諫董卓曰張孟卓東平長者坐不窺堂言不妄視也吳書曰孫權遣干禁還群臣送禁虞翻謂禁曰卿勿謂吳無人吾謀適不用耳禁雖為翻所惡然猶盛歎翻魏文帝為翻設虛坐蜀志曰費禕為諸葛亮司馬值軍帥魏延與長史楊儀相憎每並坐論延或舉刃擬儀儀泣涕橫集禕常入坐其間諫喻分別終亮之世各盡延儀之用也又曰王平字子均西宕渠人生長戎旅手不能書所識不過十字而占授作書皆有意理使人讀史漢書記傳聽之備知其義從朝至夕端坐儼然也吳志曰步騭字子山與廣陵衛旍俱以種瓜自給會稽焦征羌郡之豪族騭等修剌奉瓜征羌見之隱几坐帳中設席於地坐騭旍旍忿恥騭神色自若鄧粲晉記曰裴遐性恬和同類有試遐者推墮床下遐拂衣還坐言無異色漢晉春秋曰王褒父儀為文帝所殺未嘗西向坐示不臣也晉中興書曰陶淡字處靜年十五便服食絶穀家纍千金僮客百數淡終日端拱絶不婚娶居臨湘縣山中立小草屋裁足容身時還家設小床獨坐不與人共何晏別傳曰晏小時武帝雅奇之欲以為子每挾將遊觀命與諸子長幼相次晏微覺於是坐則專席止則獨立或問其故答曰禮異族不相貫坐位孟嘉別傳曰廋亮領江州嘉為從事禇褒為豫章出朝亮正旦大會時彥悉集嘉坐次第甚遠褒問亮曰聞有孟嘉其人何在亮曰在坐卿但自覔褒觀衆人指嘉謂亮曰將無是乎亮欣然笑嘉為褒所得乃益重嘉焉皇甫謐高士傳曰管寧常坐一木榻五十餘年榻上當膝皆穿六韜曰文王出田見呂尚坐茅而漁乃再拜與歸又曰紂之時婦女坐之綺席晏子曰景公獵休坐地食晏子後至滅葭而席公不悅曰子席何也對曰臣聞介胄坐陳不席獄訟不席獄戶不席三者皆憂也臣不敢以憂侍坐孟子曰晉平公之於亥唐也入云則入坐云則坐食云則食雖蔬食菜羹未嘗不飽莊子曰原憲處魯居環者之室匡坐而弦歌風俗通曰延嘉中常侍坐單超左悺音貫徐璜具瑗唐衡在帝左右縱其姦慝時人謂之語曰左回天徐轉日具獨坐言其信用甚於圓轉又曰汝南陳伯敬行必舉步坐必儼然郭子曰何次道充字次道往王丞相以塵尾礭床呼何共坐云來來此是君位世説曰魏明帝使后弟毛曾與夏侯太初共坐時人謂之蒹葭倚玉樹語林曰馬融笇渾天不合召鄭玄令笇一笇便決及玄業成辭歸融心忌焉玄亦疑有追者乃坐橋下在水上據屐融果轉戒欲勑追之告左右曰玄在土下水上據木此必死矣遂罷追俗説曰王僧敬神明俊徹為一時之摽桓玄時集藂賓客莫有出其右者王在坐都不復覺有餘人坐無王便覺殷仲文謝益壽為佳王僧敬兄弟列坐齋中見之若神小人從戶前過皆肅然毛豎嵇康絶交書曰危坐一時痺不得搖臥説文曰眠翕目也寢病臥也臥休也釋名曰臥化也其精神變化不與覺時同也寐謐也謐靜無聲也寢侵也損事功也瞑泯也無知泯泯也禮記玉藻曰君子寢恆東首鄭玄注曰首生氣也又樂記曰魏文侯問於子夏曰吾端冕而聽古樂則唯恐臥聽鄭衛之音則不知倦論語公冶長曰宰豫晝寢子曰朽木不可雕也糞土之墻不可污也於豫與何誅誅責又鄉黨曰寢不尸布展手足似尸象史記曰吳起為將與士卒最卞者同衣食臥不設席行不乘騎又曰上自將擊黥布群臣居守皆送至灞上留侯病自強起至曲郵因説上令太子為將軍監關中軍上曰子房雖疾強臥而傳太子漢書曰黥布反上疾欲使太子擊之呂后承間為上泣曰上雖疾強載輜車臥而護之諸將不敢不盡力又曰上欲廢太子呂后使建成侯呂澤劫張良曰君常為上謀臣今上日欲易太子君安得高枕而臥又曰汲黯拜淮陽太守黯伏謝不受上曰君薄淮陽耶顧淮陽吏民不相得吾徒得君重臥而治之又曰初武帝遣昭帝以討莽何罪功封金日磾為秺侯日磾以帝少不受封輔政歲餘病困大將軍光白封日磾臥授印綬一月薨又曰吳楚反乏糧飢欲退數挑戰周亞夫終不出夜軍中驚內相攻擊擾亂至於帳下亞夫終臥不起須臾亦定又曰董賢常與上臥起嘗晝寢偏藉上衣袖上欲起恐動賢乃斷袖而起又曰王莽軍師外破大臣內叛憂悶不能食但飲酒啖鰒步角切魚讀軍書倦因憑几寢不復就床後漢書曰彭寵自立為燕王其妻數惡夢又多見變怪五年春寵齋獨在便室倉頭子密等三人因寵臥寢寐共縛寵著告外吏云大王齋禁皆使休東觀漢記曰吳漢擊富平獲索二賊於平原明年春賊率五萬餘人夜攻漢營軍中驚亂堅臥不動又曰上在邯鄲宮晝臥溫明殿耿弇入造床下請問因説曰今更始失政天下可馳檄而定又曰楊政常過楊虛侯馬武稱疾臥欲令政拜床下政入戶徑上床坐武恨語言不懌政因曰蕃臣不思求賢報國而驕天下英俊今日搖動者刀入脅左右大驚蜀志曰先主既定益州廣漢太守夏纂請秦密為師友祭酒領五官掾稱曰仲父密稱疾臥在茅舍纂將功曹石祐主簿王並即密第宴談密臥如故沈約宋書曰羊欣字敬元從父不疑為烏程令年十二時王獻之為吳興太守甚知愛之獻之常夏月入縣欣看新絹裙晝寢獻之書數幅而去欣書本工因此彌善鍾離意別傳曰嚴遵者與光武皇帝俱為諸生遊涉他縣同門精學暮夜宿二人寒不得寢臥更相謂曰後若豪貴憶此之難宜勿相忘羅含別傳曰羅含字君章少嘗晝臥夢一鳥文色異常徑飛入口杜祭酒別傳曰君新作被腝眠覺晏起乃歎腝便眠使人不起異事因令看陌上有寒人舉被乞之常眠布被中會稽典録曰陳修字奉遷少為郡幹受韓詩穀梁春秋家貧為吏常出擔上下恆食乾糒音備每至正臘僵臥不起同僚請不肯往其志操如此吳越春秋曰楚平王遣使者封函印綬追召子胥子胥以夜半時臥覺忽而仰天悲歎言曰父兄俱死當誰歸乎泣下交流恐為楚所得乃貫弓執矢步出東郭韓子曰堂溪空見昭侯曰今有白玉巵無當有瓦器有當君渴將何以曰以瓦器空曰為人主漏泄群臣之語猶玉巵無當也昭侯於是每與空話事歸輒獨臥唯恐夢言泄於妻妾桓談新論曰成帝幸甘泉詔揚子雲作賦倦臥夢其五藏出在地以手收內入覺大少氣一年卒郭子曰王長史病篤王仲祖也寢臥燈下轉塵尾視之歎曰如此人曾不得四十及亡劉尹臨殯以璧柄塵尾著棺中因慟絶世説曰袁紹年少時曾遣人夜以劍擲魏武小不著魏武撥之其後來必高因怙臥床上劍至果高又曰郝隆七月七日出日中仰臥人問何以答曰我曬書也語林曰王子敬在齋中臥偷入齋取物幞裝一室之內略無不盡子敬臥而不動遂復登床欲有所覔子敬因呼曰偷兒青氈是我家舊物可特置不於是群賊始知其不眠悉置物驚走睡左傳宣上曰趙宣子諫靈公患之使鉏麑賊之鉏麑晉力士也晨往將朝尚早坐而假寐不解衣冠而睡麑退而歎曰不忘恭敬民之主也賊民之主不忠棄君之命不信有一於此不如死也觸槐而死漢書禮樂志曰魏文侯最為好音而謂子夏曰聽古樂則欲寐及聞鄭衛之音子不知倦焉又曰陳咸字子康父萬年嘗病召咸教戒於床下語至夜半咸睡頭觸屏風萬年大怒欲杖之咸叩頭謝曰具曉所言大人教咸諂也萬年乃不復言晏子曰景公田於梧丘夜猶早公坐睡而夢有五大夫北面稱無罪公覺召晏子晏子對曰昔君靈公田五大夫駭獸故斷其頭而葬之命之曰五大夫之丘命人掘而葬之世説曰魏武云我眠中不可妄近近便斫人亦不覺左右宜深慎此後佯睡所幸人竊以被覆之因便斫殺自後安眠人莫敢近者郭子曰許侍中顧司空入王丞相帳中事具帳部益部耆舊傳曰何袨為成都令嘗眠睡其覺悟便得姦詐咸畏袨之發摘或以為有術得知之無敢復欺者
