body:
  text: 兵部五十六乞師左傳曰衛人伐齊公子遂如楚乞師公子遂魯卿又曰東門襄仲臧文如楚乞師襄仲居東門故以為氏臧文為襄仲副使故不書又曰夏公使如楚乞師以伐齊公不事齊與晉盟故懼而乞師於楚又曰晉侯使荀罃來乞師又十三年晉侯使郗錡來乞師將事不敬將事敬君命也孟獻子曰郄氏亡乎禮身之幹也敬身之階也郄子無階且先君之嗣卿受命以求師將社稷是衛而惰棄君命也不亡何為郄錡郄克子故曰嗣卿為十七年春殺郄錡傳也又曰晉侯使士魴來乞師又曰郄犨如衛遂如齊皆乞師焉欒黶來乞師孟獻子曰晉有勝矣卑讓有禮故知其將勝楚也又曰秋齊侯聞將有晉師使陳無宇從薳啟彊如楚辭且乞師辭有晉師未得相見也穀梁曰師出不必反戰不必勝故言乞也戰國策曰楚圍雍氏韓使求救於秦秦師不下殽令斳尚使謂秦王曰今韓已病矣秦師不下脣竭齒寒願大王熟計之宣太后召尚曰妾事先王也先王以髀如妾身妾困弗支也盡身妾上而弗重也何以其少有利焉夫救韓日費千金獨不使妾少有利耶靳尚歸韓襄王賂於太后復使張翠至甘茂曰韓急翠曰未也茂曰先生言不急可乎翠曰韓急則折而入楚矣臣安敢來茂曰先生勿復言也乃言於秦王曰今雍氏圍而秦兵不下是無韓也楚韓為一魏不敢不聽是楚以三國謀秦也秦王乃下師於郩以救韓後漢書曰曹操與袁紹相持於官渡紹遣人求救劉表許之而不至亦不援曹操且欲觀天下之變從事中郎南陽韓嵩別駕劉先說表曰今豪傑並起兩雄相持天下之重在於將軍將軍若欲有為起乘其弊可也救援春秋後齊語曰秦攻趙長平齊楚救之趙人無食請粟於齊齊欲勿與周子曰不如與之以退秦兵不與則秦兵不却是秦之計中而齊楚之計過也且趙之於齊楚捍蔽也猶齒之於脣脣亡則齒寒今日亡趙明日患及齊楚是故趙之務宜若奉漏甕沃燋釜也夫救趙高義也却秦兵顯名也義救亡國威却強秦之兵不務為此而務愛粟為國計者過矣齊王不聽秦破趙於長平遂圍邯鄲焉又韓語曰襄王十二年楚圍雍氏韓令使者求救於秦冠盖相望秦師不出使靳尚如秦謂秦王曰韓之於秦居為隱蔽出為鴈行令韓病矣秦師不出脣亡齒寒願大王計之也史記曰趙平原君使者冠盖相屬讓信陵君以請救曰勝所結為婚姻者以公子高義今縱輕勝獨不憐公子之姉耶公子說王不可乃將車騎欲與趙俱死行過夷門見侯嬴坐而去公子曰侯生無一言半辭送我哉乃復見之生曰知公子之必來乃謂曰嬴聞晉鄙之兵符常在王臥內而如姬最幸可為如姬復父之讎求其虎符奪晉鄙軍此五霸之伐也然恐鄙有所疑臣客朱亥可與俱行至軍亥以四十斤鐵椎殺晉鄙引兵救趙却秦軍趙王再拜曰自古賢人未有及公子公子懼不歸趙以五城封之魏志曰太祖征張繡荀攸言於太祖曰繡與劉表相恃為強然繡以遠軍仰食於表不能供勢必離不如緩軍以待之若急之其勢必相救太祖不從遂進軍至襄繡戰急表果救之軍不利太祖謂攸曰不用君言至是矣魏略曰臧洪太祖為族弟興平末太祖嘗與洪出為寇劫失馬追者在後洪下馬與太祖太祖辭曰各自急洪言曰天下諸將可無洪不可無君也太祖乃乘之遂相扶佐得濟魏志曰太祖為卓敗失馬晉書曰桓宣屯馬頭山為祖煥桓撫所攻求援於盧江太守毛寶宣遣子戎重請寶即隨戎赴之未至而賊已與宣戰寶軍縣兵少器仗艦惡大為煥撫所破寶中箭貫髀徹鞌使人蹋鞌拔箭血流滿鞾去舡所百餘里望星而行到先哭戰亡將士洗瘡訖夜還救宣寶至宣營而煥撫亦退又曰淮南妖賊張昌旬月之間眾三萬皆絳科頭攢之以毛王歆上言妖賊張昌劉尼稱神聖犬羊万計絳頭毛面挑刀走戟其鋒不可當請諸軍以助三十六國春秋曰姚襄南至滎陽與高昌李歷戰于麻田馬中流矢死弟萇下馬授襄曰汝何以自免萇曰但令兄濟此豎子何敢害萇會救至俱不死北史曰齊蘭陵武王長恭一名孝瓘文襄第四子累遷并州刺史突厥入晉陽長恭盡力擊之芒山之敗長恭為中軍五百騎再入周軍遂至金墉之下被圍甚急城上人不識長恭免冑示之面乃下弩手殺之於是大捷武士共歌謠之為蘭陵王入陣曲是後魏書曰齊將陳伯之進逼壽春沿淮為寇時司徒彭城王勰廣陵侯衍同鎮壽春以九江初附人情未洽兼臺援不至深以為憂詔遣傅永為統軍領汝陰之兵三千人援永揔勒士卒水陸俱下而淮水口伯之防甚固永去二千餘里牽舡上汝南岸以水牛挽之直南趣淮下舡便渡適上岸賊軍追及會時已夜永乃潛進時曉逵壽春城下勰衍聞外有軍共上門樓觀望然不意永至永免冑乃信之遂引永上勰謂永曰北望以久恐洛陽難復再見不意卿能至也勰令永引軍入城永曰埶兵被甲固敵是求若如教旨便共殿下同被圍守豈是救援之意遂孤軍城外與勰并勢以擊伯之頻有克捷又曰辛淵私署涼王李暠騎將軍暠子欽亦厚遇之欽與沮渠蒙遊戰於蓼泉軍敗失馬淵以所乘馬授欽而身死於難以義烈見稱西土又曰裴駿蓋吳作亂於闕中汾陰人薛永宗聚眾應之殘破諸縣來襲聞憙縣中先無兵杖人情駭動縣令憂惶計無所出駿在家聞之便率厲鄉豪曰在禮君父危臣子致命府君今為賊所逼是吾等徇節之秋諸君可不免乎諸豪皆奮激請行駿乃簡騎驍勇數百人奔赴賊聞救至引兵退走刺史嘉之以狀表聞會世祖親討盖吳引見駿駿陳敘事宜甚會機理世祖大悅顧謂崔浩曰裴駿有當世才是且忠義可嘉補中書愽士浩亦深器駿目為三河領袖轉中書侍郎後周書曰蕭詧大統十五年乃遣使稱藩請為附庸太祖令丞相東閤祭酒榮權使焉詧大悅是歲梁元帝令柳仲禮率眾進圖襄陽詧懼乃遣其妻王氏及世子寮為質以請救太祖又令榮權報命仍遣開府楊忠率兵援之十六年楊忠擒仲禮平漢東詧乃獲安又曰李賢時有賊帥達符顯圍逼州城晝夜攻戰屢被摧衂賢間赴雍州詣天光請援天光許之賢乃返而賊營壘四合無因入城候日向夕乃偽負薪與賊樵采者俱得至城下城中垂布引之賊眾方覺乃弓弩亂發射之不中遂得入城告以大軍將至賊聞之便即散走又曰邵惠公顥太祖長兄德皇帝娶樂浪王氏為德皇后生顥及連次太祖德皇帝與衛可孤戰於武川臨陣墜馬顥奔救擊殺數十人賊眾披靡德皇帝乃得上馬引去俄而賊追騎大至顥遂戰歿保定初追贈太師尋追封邵公又曰太祖率輕騎追侯景于河上景等北據河橋南屬邙山為陣與諸軍合戰太祖馬中流矢驚逸遂失之因此軍中擾亂都督李穆下馬授太祖軍以復振於是大捷斬高敖曹及其儀同李猛隋書曰張須陁為齊郡丞賊裴長才石子河等眾二萬奄至城下縱兵大掠須陁未暇集兵親率五騎與賊競赴之圍百餘重身中數瘡勇氣彌厲會城中兵至賊稍却須陁督軍復戰長才敗走後數旬賊帥秦君弘郭方預等合軍圍北海兵鋒甚銳須陁謂官屬曰賊自恃強謂我不能救吾今速去破之必矣於是簡精兵倍道而進賊果無備擊大破之斬數萬級獲輜重三千兩唐書曰李晟兼左金吾大將軍涇原四鎮都知兵馬使并總遊兵無何節度使馬璘與吐蕃戰於監倉兵敗晟率所部撗擊之拔璘出於亂兵以功封合川郡王璘忌晟威名又遇之不以禮令朝京師代宗知之留宿衛上即位吐蕃寇劍南時節度使崔寧在京師三川皆恐詔晟將神策兵五百救援晟乃踰漏天攻拔飛越廊清肅寧三城絕大渡河獲虜首千餘級虜乃引去因留成都數月而還又曰裴度征蔡州計築赫連城於池口未畢役度領師及賓從往觀之導騎將及城門左右曰五溝賊至言未畢賊以突來哮謼爭進城震壞者十餘板注弩挺刃勢將及度賴李光顏決戰於前以却之時光顏先慮其來使田希以二百騎伏於溝中出賊不意交擊之方得入城希又先扼其溝中歸路賊多棄騎越溝相牽墮壓而死者千餘人是日非光顏救度幾陷又曰辛讜性慷慨重然諾專務賑人之急年五十不求茍進有濟時匡難之志咸通十年龐勛亂徐泗時杜慆守泗州賊以郡當江淮要害極力攻之時兩淮郡縣皆陷獨慆守臨淮久之援軍雖集賊未解圍時讜寓居廣陵乃仗劍挐小艇趍泗口貫賊柵入城見慆慆素聞有義而不相面喜讜至握手謝曰判官李延樞方話子為人何遽至耶吾無憂矣時賊三面攻城王師結壘于洪源驛相顧不前讜夜以小舟穿賊壘至洪源驛見監軍郭厚本論泗州危急且宜速救厚本然之淮南都將王公弁謂厚本曰賊軍眾我寡無宜輕舉當俟可行讜坐中拔劍瞋目謂公弁曰賊百道攻城陷在旦夕公等奉詔赴援而逗留不進心欲何為不唯有負國恩丈夫氣義亦宜感發假如臨淮陷賊淮南即是寇場公何獨存耶即欲揮刃向公弁厚本持之讜望泗州大哭者經日帳下為之流涕厚本義其心選甲士三百隨讜入泗州夜半斬賊柵大呼由水門而入賊軍大駭既知援兵入賊乃退舍人心遂固浙西觀察使杜審權遣大將翟行約率軍三千赴援屯蓮塘驛慆欲遣人勞之將吏皆憚其行讜曰杜相公以大夫宗盟急難相赴安得令使者無言而還即齎慆書幣犒其使淮南大將李湘率師五千來援受賊詐降敗於淮口湘與郭厚本皆為賊所執自是無援賊併兵急攻以鐵索斷淮流梯衡雲合凡周七月晝夜不息乘城之士不遑寢寐面目瘡生軍儲漸少分食稀粥賴讜犯難仗義求救於淮北諸軍既而馬舉以大軍至賊解圍而去讜無子猶子山僧元老等寄在廣陵每出城則書二姪名謂慆曰志之得嗣為幸慆益感之賊平授讜泗州團練判官侍御史繁欽丘儁碑曰故右扶風都尉主簿有丘儁者從都尉討叛胡官兵敗績卒伍奔散都尉臨陣墜馬儁於是下馬援甲以身禦寇遂致死戰場都尉乘雋馬得免擒獲上左傳曰鄭將公子歸生伐宋戰于大棘宋師敗績宋將狂狡輅鄭人鄭人入於井輅迎也五駕切倒戟而出獲狂狡君子曰失禮違命宜其擒也戎昭果毅以聽之謂禮聽謂常在放身著於心想聞其政令殺敵為果致果為毅穀梁曰宋華元帥師及鄭公子歸生戰于大棘宋師敗績獲宋華元獲者不與之辭也史記曰漢六年人有告楚王韓信反高帝以陳平計發使告諸侯會陳偽游雲夢實欲襲信信不知謁高祖於陳上令武士縛信載後車信曰狡兔死良狗烹天下已定我固當烹遂械繫信至洛陽赦信罪以為淮陰侯後漢書曰龜茲王攻破䟽勒殺其王而立龜茲人兜題為䟽勒王明年春班超從間道至䟽勒去兜題所居槃橐城九十里逆遣吏田慮光往降之勑慮曰兜題本非䟽勒種國人必不用命若不即降便可執之慮既至兜題見慮輕弱殊無降意慮因其無備遂前劫縛兜題左右出其不意皆警而立定慮馳報超超即赴之悉召䟽勒將吏說以龜茲無道之狀因立其故王兄子忠為王王兄子榆勒立之更名曰忠也國人大悅蜀志曰先主入益州還攻劉璋張飛等泝流而上分定郡縣破璋將巴郡嚴顏先獲顏飛呵顏曰大軍至何以不降而敢距戰顏曰卿等無狀侵奪我州我州有斷頭將軍無降將軍也飛怒令斫頭顏曰斫頭便斫何為怒耶飛壯而釋之引為賓客晉書載記曰慕容皝將乘海討慕容仁群下咸諫以海道危阻宜從陸路皝曰舊海水無凌自仁反已來凍合者三矣昔漢光武因滹沱之冰以濟大業天其或者欲吾乘此而剋之乎吾計決矣有沮謀者斬乃率三軍從昌黎踐凌而進仁不虞皝之至也軍去平郭七里候騎乃告仁狼狽出戰為皝所擒殺仁而還又曰王凌遣督護王昌等率疾陸眷及第文鴦從弟末杯攻石勒於襄國勒敗還壘末杯追入壘門為勒所獲勒質末杯遺使求和於疾陸眷疾陸眷將許之文鴦諫曰受命討勒寧以末杯一人故縱成擒之寇既失凌意且有後憂必不可許疾陸眷不聽以鎧馬二百五十疋金銀各一簏贖末杯勒歸之呂氏春秋曰湯以良車七十乘必死六十人戊子戰於郕遂擒推移大犧桀多力能推移大犧因以為號
