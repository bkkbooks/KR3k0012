body:
  text: 百卉部三菊爾雅曰菊治蘠今之秋華菊也又圖讚曰菊名曰精布華玄月仙客是尋薄採薄捋禮記月令曰季秋之月菊有黃華周書曰寒露之日鴻鴈來賓又五日菊有黃華無華土不稼穡晉書曰羅含致仕還家階庭忽蘭菊藂生人以為德行之感續晉陽秋曰陶淵明嘗九月九日無酒出菊叢中摘盈把坐其側久之望見一白衣人至乃王弘送酒即便就酌山海經曰九九之山其草多菊廣志曰菊有白菊風俗通曰南陽酈縣有甘谷谷中水甘美云其山上大有菊菜水從山流下得其滋液谷中三十餘家不復穿井仰飲此水上壽百二三十其中百餘七十八十名之為夭司空王暢太尉劉寬太傅袁隗為南陽太守聞有此事令酈月送水三十斛用飲食澡浴終然無益抱樸子曰劉生丹法用白菊花汁蓮花汁地血汁樗汁和丹蒸之服一年得五百歲仙方所謂日精又曰日精更生周盈皆一菊也而根莖花實異名或無效者以由不得真菊菊花與薏苡相似直以甘苦別之耳菊甘而薏苦今所在真菊但為少耳神仙傳曰康風子服甘菊花柏實散得仙博物志曰菊有二種苗花如一惟味小異苦者不宜服崔寔四民月令曰九月九日可採菊華王韶之神境記曰滎陽郡西有靈源山其澗生靈芝石茵巖有紫菊風土記曰日精者菭音苔蘠皆菊華莖之別名九月律中無射而數九俗向九日而用候時之草也盛弘之荊州記曰酈縣北八里有菊水其源悉芳菊被崖水甚甘馨太尉胡廣久患風羸恒汲飲水後疾遂瘳年及百歲非唯天壽亦菊所延也名山記曰道士朱孺子吳末入王笥山服菊花乘雲升天本草經曰菊有筋菊有白菊黃菊花一名節花一名傅公一名延年一名白花一名日精一名更生一名陰威一名朱羸一名女菊其菊有兩種一種紫莖氣香而味甘美葉可作羹為真菊一種青莖而大作蒿艾氣味苦不堪食名薏非真菊也吳氏本草經曰菊華一名女華一名女室淮南萬畢術曰以壯菊灰散池中蛙盡死楚辭曰朝飲木蘭之墜露兮夕飡秋菊之落英又曰春蘭兮秋菊長無絕兮終古鍾會菊賦曰縹幹綠葇青柯紅芒華實規圓芳頴四張故夫菊有五美焉圓華高懸准天極也純黃不雜后土色也早殖晚登君子德也冒霜吐頴象勁直也流中輕體神仙食也潘尼秋菊賦曰汎流英於青醴似浮萍之隨波嵇康菊花銘曰煌煌丹菊暮秋彌榮親尊是御永祚億齡若毛詩䟽曰若饒也幽州謂之翹饒蔓生莖如勞豆而細葉似蒺藜而青其華細綠色可生食味如小豆藿本草經曰陵若生下濕水中七八月華華紫似金紫草可以染帛煮沐頭髮即黑萱毛詩伯兮曰焉得諼草言樹之背背北堂也願言思伯使我心痗說文曰萱忘憂草也崔豹古今注曰欲忘人之憂則贈以丹棘一名忘憂草也博物志曰神農經曰上藥養性謂合歡蠲忿萱草忘憂風土記曰花曰宜男妊婦佩之必生男又名萱草本草經云萱一名忘憂一名宜男一名歧女錄異記曰婦人帶宜男草生兒束晳發蒙記曰甘棗令人不惑萱草可以忘憂任昉述異記曰萱草一名紫萱又名忘憂草吳中書生謂之療愁嵇康養生論云萱草忘憂苜蓿史記曰大宛有苜蓿草漢使取其實來於是天子始種苜蓿離宮別觀旁盡種蒲陶苜蓿極望漢書西域傳曰罽賓國有苜蓿大宛馬嗜苜蓿武帝得其馬漢使採蒲桃苜蓿種歸天子益種離宮別館旁晉書曰華廣免官為庶人晉武帝登凌雲臺見廣苜蓿園阡陌甚整依然感舊太康初太赦乃得襲爵西京雜記曰樂遊苑中自生玫瑰樹下多苜蓿一名懷風時或謂光風在其間常肅肅然照其光彩故曰苜蓿懷風茂陵人謂為連枝草博物志曰張騫使西域所得蒲桃胡蔥苜蓿述異記曰張騫苜蓿園在今洛中苜蓿本胡中菜騫始於西國得之楊衒之洛陽伽藍記曰宣武場在大夏門東北今為光風園苜蓿出焉菅爾雅曰白華野菅菅茅屬也毛詩宛丘東門之池曰東門之池可以漚菅又白華曰周人剌幽后也白華菅兮白茅束兮又題綱曰白華野菅草也其性柔刃堪用取此白華而將白茅束之喻申后被褒姒所代惡人蒙善好人見棄也左傳成公九年曰雖有絲麻無棄菅蒯雖有姬姜無棄憔悴周書曰成王時會稽人獻以菅會或作禽亦東南蠻菅草堅刃山海經曰天帝之山其下多菅異物志曰香蓿似茅而葉長大於茅不生洿下之地生丘陵山崗凡所蒸享必得此菅苞裹助調五味益其芬菲茅爾雅曰藗音速壯茅也白茅屬易泰卦曰拔茅茹以其彙征吉王弼注曰茅之為物拔其根而相牽引也茹相牽引之貌也彙類也陽以其類引而升故為茹而征吉象曰拔茅征吉志在外也又大過卦曰藉用白茅慎之至也尚書禹貢曰荊州厥貢苞匭菁茅孔安國曰茅蓿酒也毛詩鵲巢野有死麕曰野有死麕白茅苞之陸機毛詩䟽義曰白茅苞之茅之白者古用包褁禮物以充祭祀縮酒用之毛詩豳七月曰晝爾于茅宵爾索綯周禮天官上甸師曰祭祀供蕭茅左傳僖上曰齊侯伐楚謂楚曰爾貢苞茅不入王祭不供無以縮酒寡人是徵史記封禪書曰管仲說齊桓公古之封禪江淮之間一茅三脊所以為藉孟康曰所謂零茅也典略曰武王伐殷微子啟肉袒面縛牽羊把茅膝行而前吳書曰徐盛與曹休戰賊積茅草欲焚盛盛燒舩而去賊一無所得吳錄地理志曰桂楊郴縣有青茅可染青零陵泉陵有香茅古貢之縮酒吳志曰劉備連營挑戰陸遜曰吾已曉破之術乃勑各持一把茅以火攻拔之遜率諸軍同時俱攻破其四十餘營晉書地道志曰零陵縣有香茅氣甚芬香古貢之以縮酒沈約宋書曰江夏王義恭大明年有脊茅生后頭西岸又累表勸上封禪上甚悅之唐書曰開元十三年撫州三脊茅生石頭六韜曰文王畋于渭陽見呂尚坐茅以漁文王勞而問焉莊子曰小巫見大巫拔茅而棄此其所以終身弗如尹文子曰堯為天子衣不重帛食不兼味土階三尺茅茨不剪尹子曰湯禱旱素車白馬布衣身嬰白茅以身為牲說文曰茅菅也陸賈新語曰伊尹居負薪之野修道德於茅廬之下風俗通曰謹案詩曰手如柔荑者茅始熟中穰也既白且滑漢武故事曰帝拜欒大為天道將軍使著羽衣立白茅上授玉印大亦羽衣立白茅上授印示不臣也神仙傳曰介象受氣禁術能茅屋上燃火煮雞使茅不焦又曰曹公捕左慈數日不得便斷頭曹公大喜定視之是一束茅耳盛弘之荊州記曰零陵郡有香茅桓公所以責楚廣州記曰董奉與士爕同處數積載思欲還豫章爕情拘留不能免後乃託以病死變開棺看乃是茅人楚辭曰蘭芷變而不芳兮荃蕙化而為茅揚雄反騷曰費椒楫以要神兮又勤索彼瓊茅一莖三脊茅紫草爾雅曰藐芘草也郭璞曰可以染紫也一名芘䓞廣雅云廣雅曰紫艿紫草也艿音仍說文曰芘藐紫草山海經曰勞山多芘草一名紫英尋陽記曰石井山曾有行人見山上有採紫草者此人謂村人揭鍤而往見山上人便去聞有呼昌容者曰人來取爾草既至山頂寂寞無所見列仙傳曰昌容常山之道士也自稱殷王女二百餘年而顏色如少能致紫草與染家得錢以遺孤老淮南子曰紫草生於山不能生盤石之上枹朴子曰黃金成以為丸以紫草煮一丸咽其汁可百日不飢博物志曰平氏陽山紫草特好其他者色淺吳氏本草曰紫草節赤二月花本草曰紫草一名地血藍毛詩魚藻采綠曰終朝採藍不盈一襜襜衣蔽膝也禮記月令曰仲夏之月令民刈藍以染為陽長也此月藍始可刈謝承後漢書曰弘農楊震字伯起常種藍自業諸生恐震年大助其功傭震喻而罷之孫卿子曰青生於藍而青於藍秦子曰常聞仁人當如園圃之藍不異眾草染而後彰趙岐藍賦序曰余就毉偃師道經陳留此境人皆以種藍染紺為業藍田彌望黍稷不殖慨其遺本遂作賦一章蒨爾雅曰茹蘆音蒨茅蒐郭璞注曰令之蒨可以染絳毛詩曰東門之墠剌亂也男女不待禮而相奔者也東門之墠茹蘆在阪箋云城東門之外有墠墠邊有阪茅蒐生焉易越而出比女欲奔男之辭說文曰茅蒐茹藘也人血所生可以染絳漢書曰若厄茜千蒨草根子可用染也千畦薑韭其人皆與千戶侯等山海經曰釐山之陰多蒐郭璞曰蒐茅蒐也范子計然曰蒨根出北地赤色者善也
