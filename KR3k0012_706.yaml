body:
  text: 服用部七簏説文曰簏竹高篋也字或作通俗文曰簏謂之匱笥魏晉世語曰武帝欲以臨淄侯植為嗣世子患之以車載簏內詣朝歌長吳質與謀楊修以白太祖不推世子懼質曰明後簏受絹車內以惑之修必復白推之無人修受罪矣世子從之修果白推而無人太祖繇是疑焉王隱晉書曰洛陽有尉部小吏忽有好物尉疑詰問云先行逢一老媼説有病師卜當得城南年少暫相煩相報乃土車內著漆簏中行十餘里過六七門開簏忽見樓閣好屋問此何處云是天上見一婦人三十五六短青黑色眉後有疵時賈后踈親聞其狀知是賈后慚而去晉書云陸納性吝每自算料財物有客入見之羞忸以身映簏晉中興書曰王敦害周顗籍其家止見素簏中有故絮修復山陵故事曰武悼皇后玄宮貯衣蝦蟆簏二東宮舊事曰皇太子初拜有漆馬齒書簏金裝綵花簏古詩曰交文象牙簏婉轉青絲繩篋左傳昭四曰叔鮒求貨於衛淫芻堯者衛人使屠伯饋叔向羹與一篋錦春秋後語曰魏文侯命樂羊將攻中山三年而拔之樂羊反而論功文侯示之謗書一篋漢書曰張安世字子孺以父任為郎用善書給事尚書精力於職上行幸河東嘗亡書三篋詔問莫能知唯安世識之具作其事後購求得書以相校無遺失魏志曰胡質為荊州剌史薨無餘財唯有賜衣書篋而已晉書曰張華身死之日家無遺財有文史溢于几篋
