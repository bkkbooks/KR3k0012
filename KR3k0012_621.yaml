body:
  text: 治道部一君爾雅曰林蒸天帝皇王后辟公侯君也易師卦曰大君有命開國承家尚書泰誓曰嗟我友邦冢君越我御事庶士明聽誓惟天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母又曰洪範曰惟辟作福惟辟作威惟辟玉食毛詩曰天保下報上也君能下下以成其政臣能歸美以報其上焉禮記禮運曰禮者君之大柄也政者君之所以藏身子思曰人主自臧則衆謀不進事是而臧之猶卻衆謀況知非以長乎夫不察事之是非而悅人之讚己暗莫甚焉不度理之所在而阿諛求容諂莫甚焉君暗臣諂以居百姓之上民弗與也若此不已國無類矣荀悅漢紀論曰有王主有治主有存主有衰主有危主有亡主體正性仁心明志固動以為人不以為己是謂王主克己恕躬好問力行動以從義不以從情是謂治主勤居守業不敢荒怠動以先公不以先私是謂存主情義交爭公私並行一得一失不純道度是謂衰主情過其義私多於公制度踰限政令失常是謂危主親用邪讒放逐忠賢縱情追欲不顧禮度出入遊放不拘儀禁賞賜行禮以越公用忿怒施罰以踰治理遂非文過知而不改忠言壅塞直諫誅戮是謂亡主故王主能致興平治主能修其政存主能保其國衰主遭無難則庶幾得全茍有難則殆矣危主遭無難則幸而免有難則亡亡主者必亡而已矣白虎通曰君者群也群下之所歸心管仲曰地之生財有時民之用力有倦而人君之欲無窮以有時與有倦養無窮之君而度量不生於其間則上下相疾也鄧析書曰君有三纍臣有四責何謂三纍親所信一纍也以名取士二纍也近故疏親三纍也何謂四責受重賞而無功一責也居大位而不治二責也為理而不平三責也御軍陳而奔背四責也君無三纍臣無四責可謂安國家也又曰為君者當若冬日之陽夏至之陰萬物歸之莫之使也偃臥而功自成優遊而政自治又曰為君者滅形匿影群下無私掩目塞耳萬民恐震循名責實案法立成是謂明主孟子曰君視臣如手足臣視君如腹心君視臣如犬馬臣視君如國人君視臣如土芥臣視君如寇讎孫卿子曰君舟也庶人水也水能行舟亦能覆舟又曰君者義也義正則君正君者盤也水者民也盤方則水方盤員則水員君者源也水者流也源清則流清源濁則流濁鬼谷子曰事聖君有聽從無諫爭事中君有諫諍無諂諛事暴君有補削無矯拂又曰君得名則群臣恃之君失名則群臣欺之尸子曰孔子謂子夏曰汝知君子乎子夏曰魚失水則死水失魚猶為水也孔子曰商汝知之又曰日在井中不能燭遠日在足下不可以視君之有國猶天之有日居不高則不明視不尊則不遠韓子曰晉平公問叔向齊桓公九合一匡君之力臣之力叔向稱管仲隰明之力師曠曰君壤地也臣草木也壤地美然後草木碩亦君之力臣何力之有焉又曰勢者君之輿也威者君之策也臣者君之馬也民者君之輪也勢固則輿安威定則策徑臣順則馬良人和則輪利而為國皆失此有覆輿走馬折策敗輪矣又曰為人君者猶壺也民亦水也壺方水方壺圓水圓呂氏春秋曰魏文侯燕飲皆令諸大夫論己或言君仁或言君義或言君智至任座曰君不肖君也得中山不封君弟而封君之子是以知君不肖文侯不悅座趍而起次及翟璜曰君賢君也其主賢者其臣之言直今座之言直是以知君賢也又曰善為君者蠻夷反舌皆服俗淳也水泉深則魚鱉歸之人君賢則豪傑赴之又曰君者仁義以治之愛利以安之忠信以道之務除其災致其福故人之於上也若璽之於塗也抑之以方則方以圓則圓若五種之地必應其類而蕃息百倍此五帝三王之所以無敵也又曰古之王者其所為少其所為少因者君術也為者臣道也為則擾矣因則靜矣因冬為寒因夏為暑君奚事焉故曰君道無為又曰昔太古嘗無君其民聚生群處知母不知父無親戚兄弟夫妻男女之別無上下長幼之道無進退揖讓之禮無衣服履帶宮室畜積之便無器械舟車城郭險阻之備此無君之患故臣之義不可不明也自上世以來天下亡國多矣而君道不廢者天下利之也又曰齊桓公染於管仲鮑叔晉文染於舅犯郭偃荊莊王染於孫叔敖沈尹承吳闔閭染於伍員文之義越句踐染於范蠡大夫種此五君者所染當故霸諸侯范吉射染於張柳朔王生中行寅染於籍秦高強吳夫差染於王孫雄太宰嚭智伯瑤染於智國張武申尚染於魏義偃長宋康王染於唐鞅田不禮此六君者所染不當故國皆殘亡身或死辱為君非為君而因榮也非為君而安也以為行理也又曰先王用非其有如己之有通乎君道者也君者處虛素服而無智故能使衆智也無能故能使衆能也能執無為故能使衆為也無智無能無為此君之所執又曰鄭君問於被瞻曰聞先生之義不死君信有之乎被瞻對曰有之夫言不能聽道不能行則固不事君也若言聽道行又何死亡故被瞻之不死亡賢於死亡也又曰豫讓欲報襄子其友謂之曰子之所道甚難而無功謂子有志則然矣謂子智則不然以子之材而索事襄子索求襄子必近子子得近之而行所欲此甚易而功必成豫讓笑而應之曰是為先知報後知也為故君賊新君矣大亂君臣之義也子無失吾所為矣凡吾所為此者所以明君臣之義也非從易也淮南子曰君根本也臣枝葉也根本不善枝葉茂者未聞也有道之世以人與國無道之世以國與人以賢人而與之國堯舜是也以國與人桀紂與湯武是也説苑曰晉平公問於師曠曰人君之道奈何師曠曰人君清靜無為務在於博愛趣在任賢開耳目以察萬方不溷溺於俗不拘擊於左右廓然遠見倬然獨立屢省考績以臨臣下此人君之操也平公曰善新序曰趙襄子問於王子維曰吳之所以亡者何也對曰吳君吝而不忍襄子曰宜哉吳之亡也吝則不能賞賢不忍則不能罰姦賢者不賞有罪不罰不亡何待潛夫論曰凡人君之治莫大於和陰陽夫陰陽者以天為本天心順則陰陽和天心逆則陰陽乖天以民為心民安樂則天心順民愁苦則天心逆抱朴子曰清玄剖而上浮濁黃判而下流尊卑等威於是乎著曩聖取諸兩儀而君臣之道立設官分職而雍熙之化隆君人者必修諸己以先四海去偏黨以平王道遣私情以樹至公昭德塞違庸親昵賢使規盡其圓矩盡其方矣
