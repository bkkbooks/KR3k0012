seq: 32
body:
  text: 時序部十六五月五日大戴禮曰五月五日蓄蘭為沐謝承後漢書曰陳臨為蒼梧太守推誠而理導人以孝悌臨徵去後本郡以五月五日祠臨東城門上令小童潔服舞之又禮儀志曰五月五日朱索五色桃印為門戶飾以止惡氣也沈約宋書曰元徽五年五月五日皇太后賜帝玉柄毛扇帝嫌其毛柄不華因此欲加鴆害宋略曰王鎮惡以五月五日生家人欲棄之其祖猛曰昔孟嘗君以此日生卒得相齊此兒必興吾宗以鎮惡為名唐書曰崔信明以五月五日正中時生有異雀數頭身形甚小五色皆備集于庭樹鼓翼齊鳴其聲清亮隋太史良使至青州遇而占之曰五月為火火為離離為文采日正中文之盛也又有雀五色奮翼而鳴此兒必文藻煥爛聲名播於天下雀形既小祿位殆不高矣及長博聞強記下筆成章鄉人高孝基有知人鑒每謂人曰崔信明才學富贍雖名冠一時但恨其位不達耳孝子傳曰紀邁五月五日生其母棄之村人紀淳妻養之年六歲本父母云汝是我兒邁涕泣傭所得輒上母續齊諧記曰屈原五月五日投汩羅而死楚人哀之每至此日竹筒貯米投水祭之漢建武年長沙歐回見人自稱三閭大夫謂回曰嘗見祭甚善但常年所患蛟龍所竊今若有惠可以練樹葉塞其上以五綵絲之此二物蛟龍所憚也回依言後乃復見感之今人五日作粽子帶五色系及練葉皆是汩羅之遺風也西京雜記曰王鳳以五月五日生其父欲不舉其叔曰昔田嬰勑其母勿舉田文文後為孟嘗君以古事推之非不祥遂舉之鄴中記曰并州俗以介子推五月五日燒死世人為其忌故不舉食飼非也北方五月五日自作飲食飼神及作五色縷五色辛盤相問遺不為介子推也荊楚歲時記曰五月五日西人並踏百草今人又有鬥百草之戲又曰五月五日競渡俗為屈原投汩羅日傷其死所並命舟楫以拯之舸舟取其輕利謂之飛鳧一自以為水軍一自以為水馬州將及土人悉臨水而觀之又曰是月俗忌蓋屋及曝薦席風俗通云五月蓋屋令人頭禿又巽苑云新野庚實家嘗以五月暴席忽有一小兒於席下俄失所在其後實女子遂亡相傳彌以忌為此條通五月之事今附於此又曰五月五日荊楚人並踏百草將艾以為人懸門戶上以攘毒氣故師曠占曰歲病則艾草先生也風土記曰仲夏端五端初也俗重五日與夏至同先節一日又以菰葉褁粘米以粟棗灰汁煮令熟節日啖煮肥龜令極熟去骨加尸豉麻蓼名曰葅龜黏米一名粳一曰角黍蓋取陰陽尚包褁未之象也龜表肉裏陽內陰外之形所以贊時也抱朴子曰或問辟五兵之道答以五月五日作赤靈符著心前又曰蟾蜍萬歲者頭上有角頷下丹書八字再重五月五日中時取之陰乾百日以其足畫地即為流水風俗通曰五月五日以五彩絲繫臂者辟兵及鬼令人不病溫又曰亦因屈原一名長命縷一名續命縷一名辟兵繒一名五色絲一名朱索又有條達等織組雜物以相贈遺孝援神契云仲夏始出婦人染練或有作務玉燭寶典云此節備擬甚多其尚矣又曰日月星辰鳥獸之狀文繡金縷帖畫貢獻所尊古詩經云繞臂雙條達是也又曰五月五日集五色繒辟兵余問服君服君曰青赤白黑以為四方黃為中央襞方綴於胸前以示婦人蠶功也織麥䅌懸於門以示農工成傳聲以襞為辟兵耳按䅌音涓麥莖也養生要集曰木味苦小溫生漢中南鄭山谷五月五日採之琴操曰介子綏國語曰介子推割腓股以啖重耳重耳復國子綏獨無所得綏甚怨恨乃作龍蛇之歌以感之終不肯出文公令燔山求之子綏遂抱木而燒死文公令民五月五日不得發火玉燭寶典曰五月五日採艾懸於戶上以攘毒氣按荊楚歲時記云宗則字文度常以五月五日未雞時採艾見似人處攬而取之用灸有驗是日競渡採雜藥夏小正曰此月蓄藥以蠲除毒氣也異苑曰五月五日剪鴝鵒舌以能學人語又曰田文母嬖五月五日生文父勑令勿舉之後母私舉文長成童以實告之文遂啓父曰不舉五月子何父云生及戶損父文曰壽命於天豈壽命於戶若壽命於戶何不高其戶誰能至其戶耶父知賢為賢齊封為孟常君世説曰胡廣本姓黃五月五日生父母惡之置甕中投於江胡翁聞甕中有兒啼往取之養為子遂七登三司會稽典録曰女子曹娥者會稽上虞人父能絃歌為巫漢安二年五月五日於縣江泝濤迎波沉溺死不得尸娥年十四沿江號哭晝夜不絶聲七日遂投江而死習鑿齒與禇常侍書曰想往日與足下及江州五月五日共澡浴戲處追尋宿眷髣佛王儀心實悲矣國史補曰揚州舊貢江心鏡五月五日楊子江中所鑄也或言中有百鍊者六七十鍊則已易破難成往往有自鳴者酈元注水經曰如深水有異魚按正光元年五月五日天氣清爽聞池中鎗鎗若鉦鼓聲池水驚而沸須臾雷電晦冥有五色蛇自池上屬於天久之乃滅波上水定唯見一魚在其一變為龍伏日曆忌釋曰伏者何也金氣伏藏之日也四時代謝皆以相生立春木代水水生木立夏火代木木生火立冬水代金金生水至於立秋以金代火金畏火故至庚日必伏庚者金也陰陽書曰候夏至後第三庚為初伏第四庚為中伏立秋後初庾為後伏謂之三伏曹植謂之三詢也史記曰張子房始見下邳圯上老父與一編書曰讀是為王者師後十三年濟北殿穀城山下黃石即我也良後從高帝過濟北果見穀城下黃石良取寶而祠之留侯死并黃石葬之每上冢伏臘祠黃石又曰秦穆公始為伏祠漢書曰東方朔為郎伏日詔賜諸郎肉朔獨拔劍割肉謂其同官曰當早歸請受賜即懷肉而去上問朔曰賜肉不待詔而去何也上令自責朔曰受賜不待詔何無禮也拔劍割肉一何壯也割之不多又何廉也歸遺細君又何仁也上笑曰令生自責而反自譽復賜酒一巵肉百斤遺細君又曰楊輝報孫會宗書曰田家作苦歲時伏臘烹羊炮羔斗酒自勞去聲漢官儀曰伏日萬鬼所行故謹漢魏日有食之會故漢書楊輝間居曰養羊沽酷供伏臘之費典略曰大駕都許使光祿大夫劉松北鎮袁紹軍與紹子弟日共宴飲常以三伏之際晝夜酣飲極醉至於無知云以避一時之暑故河朔有避暑飲王翽鄴中記曰石季龍於冰井臺藏冰三伏之月以冰賜大臣荊楚歲時記曰六月伏日並作湯餅名為辟惡宋玉玄謨壽陽記曰明義井三伏之日炎暑赫曦男女行來其氣短急望見義井則喜不可言未至而憂既至而樂號為歡樂井世説曰郗嘉賓三伏之日詣謝公炎暑熏赫復當風交扇猶沾汗流離謝著故絹衣食熱白粥晏然無異郗謂謝公曰非君幾不堪此崔實四民月令曰初伏薦麥瓜於祖禰也風俗通曰漢中巴蜀自擇伏日俗説漢中巴蜀廣漢土地溫暑草木蚤生晚枯氣異中國夷狄畜之故令自擇伏日也謹案漢書高帝分四都之衆用良平之策還定三秦席卷天下蓋君子所因者本也論功定封加以金帛重復寵異令自擇伏日不同於風俗也書儀曰六月三日伏日昔賈誼在湘南六月三庚日有鴟鳥來時以南方毒惡以助太陽銷爍萬物故損人因避之稽含因熱賦序曰三伏之節始奏啇秋之辰未期余下俚貧生居室卑陋狹巷不來清風短廡不足增蔭歎彼夏屋之士體逸高廊並天而寒暑殊同世而憂樂異矣程曉詩曰平生三伏時道路無行車閉門避暑臥出入不相過今世能襶子觸熱到人家主人聞客來嚬蹙奈此何搖扇臂中疼流汗正滂沱傳戒諸高明熱行宜見呵晉潘嶽懷縣詩曰南陸迎修景朱明送末垂初伏啓新節隆暑亦赫曦七月七日漢武帝故事曰景帝嘗夢高祖謂己曰王美人生子可名為彘以乙酉年七月七日旦生武帝於猗蘭殿謹按洞冥記漢武帝未生之時景帝夢一赤彘從雲中直下崇芳閣帝覺而坐於閣果見赤氣從雲中直下如林木蔽牖望閣上有丹霞鬱既而乃改崇芳閣為猗蘭殿後王夫人生武帝也又曰七月七日上於承華殿臺齊其日忽有鳥從西方來集殿前上問東方朔朔曰此西王母欲來也有頃王母至有二青鳥如烏夾侍王母旁之又曰王母遣謂帝曰七月七日我當暫來帝至日掃宮內燃九華之燈又曰漢武帝內傳曰帝登尋真之臺齊至七月七日夜忽見天西南如白雲起鬱鬱直來趨宮有頃西王母至乘紫雲之輦又曰七月七日乃掃除宮掖之內張雲錦之帷燃九光微燈夜二唱後西王母駕九色之班龍上殿又曰七月七日西王母降武帝戴太真晨纓之冠履玄瓊鳳文之舄宋卜子楊園苑疏曰太液池西有武帝曝衣閣常至七月七日宮女出后登樓襮衣晉書曰魏武帝辟高祖以漢祚將終不欲屈節於曹氏辭以風痺不能起居魏武遣親信令史微服於高祖門下樹蔭下息時七月七日高祖方曝書令史竊知還具以告乃重遣辟之勑行者曰若復不動便可收之高祖懼而應命後魏書曰太祖道武皇帝韓圭七月七日生於參合陂又曰任城王澄為雍州功縗在身故以七月七日集文武馬射張普惠字洪賑為録事參軍奏記請停列仙傳曰陶安公者六安鑄治師也一朝火散上紫色衝天安公伏治下求哀須臾朱雀止治上曰安公治與天通七月七日迎汝以赤龍至日龍來安公騎之東南而去邑中數萬人預共送之皆與辭訣又曰王子喬周靈王太子晉也好吹笙作鳳鳴遊伊洛之間浮丘公椄以上嵩高山二十餘年後於山中謂桓良曰告我家七月七日待我緱氏山頭是日果乘白鶴駐山嶺望之不得到舉手謝時人數日而去又曰吳蔡經去家時已老及還更少壯頭髮皆黑語家中言七月七日王君當來可作數百斛飲擬之至期日王方平果來乘羽車駕五龍聞金鼓簫管人馬之聲荊楚歲時記曰七夕婦人結綵縷穿七孔針或以金銀鍮石為針宋孝武七夕詩曰迎風披采縷阿月貫玄針陳瓜果於中庭以乞巧有喜子網於瓜上以為符應周處風土記云七月初七日其夜灑掃中庭然則中庭乞願其舊俗乎又曰魏時人或問董勛云七月七日為良日飲食不同於古何也勛云七月黍熟七日為陽數故以麋為珍今北人唯設湯餅無復有麋矣又曰陸雲與兄平原書曰機為平原相一日按行曹公器物書刀五板琉璃筆一枚景初二年七月七日劉婕好云見此使人恨然案魏武帝於漢為相不得有婕好又景初是魏明帝年如此則文帝物也與曹公器玩同處故致舛雜矣日緯書曰牽牛星荊州呼為河鼓主關梁織女星主瓜果嘗見道書云牽牛娶織女取天帝錢二萬備禮久而不還被驅在營室是也言雖不經有是為怪也西京雜記曰戚夫人侍兒賈佩蘭云在宮時見戚夫人侍高祖至七月七日於臨百子池作于滇樂畢以五色縷相霸謂為連受又曰漢彩女常以七月七日穿針於開襟樓俱以習俗也輿地志曰齊武帝起層城觀七月七日宮人多登之穿針世謂之穿針樓淮南子曰七月七日午時取生瓜葉七枚直入北堂中向南立以拭面靨即當滅矣又萬畢術曰七月七日採守宮陰去聲乾之合以井華水和塗女身有文章即以丹塗之不去者不淫去者有姦晉周處風土記曰七月初七日其夜灑掃於庭露施几筵設酒脯時果散香粉於筵上以祈河鼓爾雅曰河鼓謂之牽牛織女言此二星辰當會守夜者咸懷私願咸云見天漢中有奕奕白氣有光耀五色以此為徵應見者便拜而願乞富乞壽無子乞子唯得乞一不得兼求三年乃得言之頗有受其祚者梁吳均齊諧記曰桂陽成武丁有仙道忽謂其弟曰七月七日織女何事渡河答曰暫詣牽牛世人至今云織女嫁牽牛也韋氏月録曰龍魚河圖云七月七日取赤小豆男吞一七女吞二七令人畢歲無病又曰七月七日晒曝革裘無蟲又曰合烏雞藥是七月七日取烏雞血和三月三日桃花末塗面及遍身三二日肌白如玉此是太平公主法曾試有效世説曰郝隆七月七日見鄰人皆曝晒衣物隆乃仰出腹臥云曬書崔實四民月令曰七月七日作麴合籃丸及蜀漆丸暴經書及衣裳習俗然也又曰世傳竇后少小頭禿不為家人所齒遇七夕人皆看織女獨不許后出乃有神光照室為后之瑞竹林七賢論曰阮咸字仲容籍兄子也諸阮前世儒學善屋室內足於財唯籍一巷尚道業好酒而貧舊俗七月七日法當曝衣諸阮庭中爛然莫非綈錦咸時揔總角乃堅長竿摽大布犢鼻禈於庭中曰未能免俗聊復共爾酉陽雜俎曰魏僕射收臨代七月登舜山徘徊顧眺謂主簿崔撫曰吾所經多矣於山川沃壤襟帶形勝天下名州不能過此唯未審東陽何如撫對曰青得古名齊得舊號二處山川形勢相似曾聽所論不能踰越公遂命筆為詩雜異書曰時有女子尚幼七夕見家人出庭望候天門開獨在室中不出曰若合當見者雖暗室中亦應見之至夜深忽見天上門開雲物赫奕因求富及長嫁而富既寡衆纍巨萬有賈客貨其絹百匹去而船覆溺資貨皆沒其女子偶開後房見絹在其中但濕耳後賈客歸而自首女子曰絹歸矣驗之而信亦出夷聖堅舞亦是開元以後事國史補曰興元元年七月七日斬偽官喬琳將臨刑嘆曰琳以七月七日生亦以此日死豈非命也夫古詩曰迢迢牽牛星皎皎河漢女纖纖擢素手軋軋弄機杼終日不成章泣涕零如雨河漢清且淺相去復幾許盈盈一水間脈脈不得語晉潘尼七月七日侍皇太子宴玄圃園詩曰啇風初授辰火微流朱明送夏少昊迎秋嘉木茂園芳草被疇於時我后以豫以遊宋孝武七夕詩曰開庭鏡天路餘光不可臨沿風披弱縷迎曜貫玄針薄藝誠無取時務聊可尋宋謝惠連詠牛女詩曰落日隱簷楹升月照簾櫳團團滿葉露淅淅振條風蝶足年闕相從遐川阻昵愛修渚曠清容弄杼不成藻聳轡騖前蹤昔離秋已雨今聚夕無雙傾河易回幹款情難久悰沃若靈駕旋寂寞雲幄空留情顧華寢遙心逐奔龍宋顏延之織女贈牽牛詩曰婺女麗經星姮娥捷飛月慚無一媛靈託身侍天闕閭殊闔未央銀河豈沐髮漢陰不夕悵長河為誰越有促宴歸期萬頃涼風發非怨杼柚勞但念芳菲歇宋謝莊七夕詠牛女應詔詩曰輟機起春暮停箱動秋襟琥車照漢右芝駕肅河陰珠殿釭未暗瑤庭露已深夜清豈淹抑弦徽無久臨蘇彥七月七日詠織女詩曰火流涼風至少昊協素藏織女思北征牽牛歎南陽時來嘉慶集整駕巾玉箱瑗佩垂藻蕤霧裙結雲裳金翠耀華輜軿軒散流芳釋轡紫微庭解襟碧琳堂欣燕未及究晨暉照扶桑仙童唱道情盤螭起騰驤悵悵一霄促遲遲別日長梁簡文帝七夕穿針欹疑詩曰憐從帳裏出想見夜窗開針欹疑月暗縷散恨風來梁劉孝儀詠織女詩曰金鈿已照耀白日未蹉跎欲待黃昏至含嬌渡淺河梁庾肩吾七夕詩曰玉匣卷懸衣針縷開夜扉姮娥隨月落織女逐星移離前看促夜別後對空機寄語雕凌鵲填河未可飛隋庾信七夕賦曰兔月先上羊燈次安覩牛星之曜景視織女之闌干於是秦娥麗妾趙艷佳人窈窕名燕逶迤姓秦娥麗裝而半故憐晚飾之全新此時併捨房櫳共往庭中縷條緊而貫中針鼻細而穿空隋王慎七夕詩曰天河橫欲曉鳳駕儼應飛落日移粧鏡浮雲動別衣歡逐今霄盡愁隨還路歸猶將宿昔淚更上去年機張文恭七夕詩曰鳳律驚秋氣龍梭靜夜機星橋百枝動云路七香飛映月回雕扇凌霜曳綺衣含情向華幄流態入重闈歡余夕漏盡怨結曉驂歸誰念分河漢還意兩心違
