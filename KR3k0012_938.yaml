body:
  text: 鱗介部九魴魚爾雅曰魴魾郭璞注曰江東呼魴為鯿一名魾音毗山海經曰大鯾居海中鯾即魴也音鞭毛詩宛丘衡門曰豈其食魚必河之魴又關睢汝墳曰魴魚赬尾王室如燬又七月九罭曰九罭之魚鱒魴陸機毛詩疏義曰魴鰥今伊洛濟潁魴魚也廣而薄脆甜而少肉細鱗魚之美者也漁陽泉州刀口遼東梁水魴特肥而厚尤美於中魴故其鄉語曰居就梁水魴説苑曰陽書謂宓子賤曰吾少也賤不知理民之術有釣道二焉夫投綸餌迎而吸之者陽橋也其為魚也薄而不美若存若亡若食不食者魴也其為魚也薄而厚味宓子賤曰善具釣部宋玉釣賦曰左挾魚罶右執橋竿精不離乎魚喙思不出平鮒鯿鱮魚毛詩曰其釣維何惟魴及鱮音敘毛詩義疏曰鱮似魴而大頭魚之不美者故里語曰買魚得鱮不如啖茹徐州謂之鰱音連或謂之鮦水經曰沔水北流注于漢漢水又左得度口水出陽平北水山有二源一曰清檢出佳鱮二曰濁撿出好鮒常以二月取之美珍常味潘嶽西征賦曰素鱮楊鬐倏魚爾雅曰鮂黑鰦郭僕注曰即白倏也江東呼為鮂因茲二音莊子曰莊子與惠子遊於豪梁水上莊子曰倏魚出遊從容是魚樂也惠子曰子非魚安知魚之樂耶莊子曰子非我安知我不知魚之樂耶惠子曰我非子故不知子矣子固非魚也子之不知魚全矣山海經曰帶山茈葫之水其中多倏魚其狀如雞而赤毛三尾六足四首其音如鵲食之已憂又圖經讚曰汩和損慘乎莫慘於憂詩詠萱草山經則倏儔二音何敬祖詩曰屬耳聽鳴鶯流目玩倏魚鯊魚爾雅曰鯊鮀郭璞曰今吹沙小魚體圓而有點文也沙陀二音毛詩魚麗曰魚麗于罶鱨鯊鯊鮀也廣志曰吹沙魚大如指沙中行鱨魚毛詩曰魚麗于罶鱨鯊鱨楊也音常毛詩義疏曰鱨一名楊今黃頰魚是身形厚而長大頰骨正黃鮒魚周易井卦曰井谷射鮒王肅注曰鮒小魚也廣雅曰鯖鮒也莊子曰莊周家貧往貸粟於監何侯侯曰我將得邑今貸子二百金可乎莊周忿然曰周昨來有中道而呼者周視車轍中有鮒魚焉曰我東海之波臣也君豈有升斗之水而活我哉周曰諾我且南遊吳越之王激西江之水而迎之可乎鮒魚忿然作色曰吾得升斗之水可活耳君乃言此不如早索我於枯魚之肆又曰夫揭竿纍趣灌竇守鯢鮒其於得大魚難矣呂氏春秋曰魚之美者有洞庭之鮒説苑曰魏楚會於晉陽將以伐齊齊王患之使人召淳于髡曰魏楚欲伐齊願先生共寡人憂之髡曰臣見鄰人之祠田也以一篋飯與一鮒魚其祝曰下田汙邪得穀百車臣笑其所祠者少所求者多王曰善立為上卿神異經曰東南海中有恆洲有溫湖鮒魚生焉長八尺食之宜暑而辟風寒盛弘之荊州記曰荊州有美鮒踰於洞庭溫湖古樂府罩辭曰罩初何得端來得鮒小者如手大者如屨孝子持歸遺我公姬安得此魚適與罩忤從今以後但當求鮒劉邵七華曰洞庭之鮒出於江岷弘腴青顱朱尾碧鱗鮎魚爾雅曰鮎別名鯷江東通呼鮎為鮧鮧音提廣雅曰鮷音提鯷音迹鮎也魏武四時食制曰蒸鮎永嘉郡記曰漈湖溪中多大鮎昔有流得一死者鰭大五六圍廣五行記曰則天如意中著作郎路敬淳莊在濟源有水碾一柱壞以他柱易之家人取故者為樵中得一鮎魚長尺餘尚活至後敬淳坐綦連輝被殺鱯魚廣志曰鱯音畫魚似鮎大口鱒魚爾雅曰鮅音必鱒才損切似鯇子赤眼鯇音混毛詩九罭曰九罭之魚鱒魴鱒魴大魚也毛詩疏義曰鱒魴鱒似鯢魚鱗細於鯢也赤眼多細文唐書曰吐蕃國有臧河去邏些三百里東南流衆水湊焉南入崑崙國其中有魚似鱒而無鱗張衡七辨曰鞏洛之鱒割以為𩻀分芒折縷細亂虻足鱧魚爾雅曰鱧郭璞注曰鱧鮦也自亦依纚也毛詩魚麗曰魚麗于罶魴鱧鱧鮦魚也陸機毛詩疏義曰魴鱧爾雅曰鱧鮦音同也許以為鯉魚機以為鯉狹而厚梁書曰林邑王逸死奴文篡立文本曰南西捲縣夷帥范幼家奴常牧牛於山澗得鱧魚二而化為鐵因以鑄刀刀成文向石呪曰若斫石入者文當王此國因斫如斷芻篙文心異之范幼常使之商賈至林邑因教林邑王作宮室及兵車器械王寵任之後乃讒言諸子咎奔餘國及王死無嗣文偽於憐國迓王子置毒於漿中殺之遂脅國人自立林邑國記曰范文得鱧魚變為鐵斫石如斬盧世傳魚刀鯽魚水經曰青林湖有鯽魚食之肥美辟寒暑南夷志曰蒙舍地有鯽魚大者重五斤西洱河及昆池南接滇池冬月多鯽魚楊衒之洛陽伽藍記曰王肅初入國不食羊肉及酪等常飯鯽魚羹嘉魚水經曰丙穴出嘉魚常以三月出十月入穴口廣五六尺去地七八尺水泉懸注魚自穴下透入水穴口向丙故曰丙穴任像益州記曰嘉魚細鱗似鱒魚蜀中謂之拙魚蜀郡山處處有之年年從石孔出大者五六尺雲南記曰雅州丙穴出嘉魚所謂嘉魚生於丙穴大抵雅州諸水多有嘉魚似鯉而鱗細或云黃河中味魚此類也博物志曰江陽縣北有魚穴二所常以二月八月出魚曰丙穴嶺表録異曰嘉魚形如鱒出梧州戎城縣江水口甚肥美衆魚莫可與比最宜為鯅他頂切每炙以芭蕉葉隔火蓋慮脂滴火滅耳河陽有味魚亦此類左思蜀都賦曰嘉魚出於丙穴丙地名有魚穴三所鰽魚異物志曰鰽魚仲夏始從海中激流而上腹下如刀長尺餘有細骨如鳥毛在肉中又有鳥腎在腹立夏有白鳥似鷖群飛謂之鰽鳥至仲夏鳥藏魚出變化所生也鮆魚爾雅曰鮤鱴刀今之鮆魚也亦呼為魡魚列蔑二音山海經曰浮玉之山山北望具區答水出於其陰其中多鮆魚郭璞注曰鮆魚狹薄而長頭一名刀魚大湖中饒之異苑曰蝴蝶變作鮆鱸魚後漢書曰左慈字元放曾在曹操座操曰恨少吳松江鱸魚耳慈因求銅盤貯水以竹竿釣於盤中須臾引一鱸出操曰一魚不周乃更沉釣復引出皆長三尺餘操使目前膾之世説曰張季膺為齊王掾在洛水秋風起因思吳中菰菜羹鱸魚膾遂命駕便歸俄而齊王敗時人以為見機杜寶大業拾遺録曰六年吳郡獻松鱸魚乾繪鱸魚肉白如雪不腥所謂金齏玉鱠東南之佳味也鯔魚神仙傳曰介象與吳王共論鯔魚為上乃於殿前作方坎汲水滿之并求釣餌起之須臾得鯔魚王驚喜乃使膾之異物志曰鯔魚長者六七尺嶺表録異曰跳鯅乃海味之小魚鯅也以鹽藏鯔魚兒一斤不啻千箇生擘點醋下酒甚有美味余遂問蹺名之義則曰捕魚者中春於高處卓望魚兒來如陳雲闊二三百步厚亦相似者既見報漁師遂船爭前而迎之船衝魚陳不施罟網但魚兒自驚跳入船逡巡而滿以此為鯅故名之跳又云船去之時不可當魚陳之中恐魚多壓沉故也即可以知其多矣鱓魚鱔同音善山海經曰大樂之野夏后啓於此舞九代焉女祭女戚在其北居兩水間戚操魚鱔鱔魚屬也祭操俎肉祀也汲冢周書王會曰甌人食鱔蛇鱓蛇順食之美東越甌人也此交州蛇特多為上珍謝承後漢書曰楊震常客於湖不答州郡禮命數十年衆人謂之晚貴而震志愈篤後有鸛雀銜三鱣魚飛集講堂前都講取魚進曰蛇鱣者卿大夫服之象也數三者法三台也先生自此升矣時年過五十乃始仕州郡梁書曰邵陵王綸攝南徐州事遨遊市里雜於廝隸嘗問賣鱔者曰刺史何如對者言躁虐綸怒令吞鱔以死百姓惶駭道路以目淮南子曰今鱓之與蛇蠶之與蠋狀相類而愛憎異人愛鱓與蠶畏蛇與蠋故曰異也抱朴子曰田地既有自然之鱓而有荇莁芩根土龍之屬化為鱓韓子曰鱔似蛇而漁者取鱔而畏蛇利之所在皆為賁盲顏氏家訓曰江陵劉氏以賣鱓羹為業後生一兒頭目是鱓自頸已下方為人耳又曰後漢書云鸛雀銜三鱓魚音善多假借為鱣鮪之鱣俗之學士因謂為鱣魚按魏武帝四時食制鱣魚大如五升奩長一丈郭璞注爾雅云鱣長二三丈安有鸛雀能勝一者況三頭乎鱣又純灰色無文章也鱣魚長者不過三尺大者不過三指黃地黑文故都講云蛇鱓卿大夫服之象也續漢記及搜神記亦説此事皆作鱓字孫卿云魚鱉鱣鰌及韓非説苑皆曰鱣似蛇蠶似蠋並作鱣字假鱣為鱓其來久乎周處風土記曰陽羡俗五月以薤蒸鱔而食凡鱔魚夏出冬蟄亦以將氣養和實時節也徐表南方草物狀曰白鱓生溪邊土穴中長五尺所大三寸里民剌取細槿二寸苦酒煮食之滋味如黃鱓味交址九真有之劉敬叔異苑曰盧循以義熙五年自廣州下泊船江西衆多疲死事平之後人往蔡州皆死人髮變而為鱓今上鎮西參軍與府司馬張逝瞻湖際有一棺棺頭有鱓衆試令撥看即是髮亦有未都化者一説云生以秫潘沐死則髮為鱔又昔有人食不能無鱔死後改棺鱔滿中又曰會稽石亭埭大有空中楓樹每雨水輒滿溢有商旅載生鱔放一頭著孔中以為狡獪後村民咸謂是神乃依樹起屋宰牲祭事未嘗輟因遂名鱔父廟人有祈請及穢慢禍福立至估客後返見其如此即取作臛於是遂絶
