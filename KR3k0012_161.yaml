body:
  text: 河南道下滑州十道志曰滑州靈昌郡置在白馬縣禹貢兗州之域春秋時衛地戰國時屬魏秦為郡地左傳曰狄滅衛衛立戴公以廬于曹今白馬地即曹邑衛文公自曹邑遷于楚丘今衛南縣也衛成公又遷于帝丘今濮陽縣史記曰秦始皇五年拔魏十五城始置東郡漢志曰白馬屬東郡又曰酈食其說沛公曰守白馬之津以示諸侯形制之勢則天下知所歸矣西征記曰古有神白馬因以名縣又開山圖曰白馬群行水上悲鳴則河決馳走則山崩後漢書曰樊倏封燕侯即東郡也濮州十道志曰濮州濮陽郡置在鄄城縣禹貢兗州之域春秋時衛地戰國時屬齊秦併天下即東郡地在漢為濟陰郡之鄄城縣左傳曰齊桓公會諸侯于鄄杜注曰衛邑今東郡鄄城是也史記曰齊威王九年趙伐我取鄄左傳曰衛侯夢於北宮見人登昆吾之墟注云衛有觀在昆吾之墟今濮陽城是史記曰舜耕于歷山耕者讓畔應劭曰歷山即田雷澤中山也水經曰昔師延為紂作靡靡之樂武王伐紂延東走自投濮而死衛靈公將之晉舍於濮水之上夜聞歌聲召師涓受之濟州十道志曰濟州濟陽郡置在廬縣禹貢兗州之域春秋時其地屬齊秦兼天下為東郡荏平地荏音仕淄反左傳曰齊鄭盟于石門尋廬之盟杜注曰今廬縣故城是史記曰扁鵲生廬故曰廬醫酈元注水經曰碻磝城西即故荏平縣城碻磝即今州是也沈約宋書作敲囂字宋書曰元嘉七年到彥之北征拔碻磝後失之至二十七年以王玄謨為寧朔將軍先鋒入河平之於此固守因置碻磝城郡國志曰後魏置濟州於單于城中即石勒於耕處聞鼓角之聲是此圖經曰東阿春秋時齊之柯地也郡國志曰其地出繒縑故秦王服阿縞十道志曰石窖在長清縣左氏傳曰齊晉戰于鞅齊師敗績齊侯自徐關入見女子曰君免乎曰免鋭司徒免乎曰免既而問之壁司徒之妻也與之石窖鄆州十道志曰鄆州東平郡置在須昌縣元和郡縣圖曰禹貢兗州之域春秋時屬宋即魯附庸須句國句音劬戰國時其地屬魏秦為薛郡地漢為東平國左傳曰晉人執季文子於苕丘公還待於鄆杜注云鄆魯西邑又僖二十二年伐邾須句僖公時也又哀十四年西狩于大野叔孫氏之車子鉏商獲麟賜虞人大野即巨野縣青州十道志曰青州北海郡置在益都縣元和郡縣志曰少昊之墟古青州之地舜時以青州越海遼遠分為營州武王克商封師尚父於齊營丘周成王少時命太公東至于海西至于河南至于穆陵女至于無棣五侯九伯實得征之後子孫為秦所滅分齊地置齊琅琊二郡漢為臨淄郡圖經曰少昊之代爽鳩氏虞夏則有季萴仕則反湯有逢公伯陵逢音蒲江反殷末有蒲姑皆為諸侯國於此地周成王時蒲姑與四國作亂成王滅之以封太公史記曰齊有清濟濁河可以為固長城巨防足以為塞又曰蘇秦東說齊宣王曰齊南有泰山東有琅琊西有清河北有渤海此所謂四塞之國也齊地方二千餘里齊軍之良進如鋒矢戰如雷霆解如風雨即有軍役未嘗倍泰山絶清河涉渤海也臨淄甚富其民無不吹簫鼓彈琴瑟擊筑鬭雞走狗臨菑之塗車轂相擊人肩相摩連袂成帷舉袂成幕揮汗成雨家給人足志氣高揚又曰齊所以名齊者有天齊祠也又封禪書曰始皇遊海上祠名山大川及八神求羡門之屬八神一曰天主祠天齊天齊池名在臨淄南郊山下漢書曰夫齊東有琅琊即墨之饒南有泰山之固西有濁河之限北有渤海之利地方二千里持戟百萬懸隔千里之外齊得十二焉又曰齊有三服之官縱為春服紈素為冬服輕綃為夏服韓詩外傳曰齊景公遊於牛山之上北望齊國曰美哉國乎鬱鬱蔥蔥使古人無死者則寡人將何去此俯而泣下沾襟國子高子曰然臣賴君之賜蔬食惡衣可得而食也駑馬柴車可得而乘也且猶不欲死而況君乎又俯而泣晏子笑曰樂哉今日之遊宴也見怯君一諛臣二使古而無死則太公丁公至今猶存吾君方將被萊笠而立畎畝惟農事之恤何暇念死乎公慚乃引觴自罰韓子曰景公與晏子遊於少海登柏寢之臺而望其國曰美哉堂堂乎後代孰有此晏子曰其田氏乎公曰寡人有國而田氏有之奈何對曰君欲奪之則近賢遠不肖振窮恤孤雖十田氏其如君何齊記曰晉永嘉五年東萊牟平曹嶷為刺史所築城有大澗甚廣因之為固謂之廣固城城側有五龍口崔鴻十六國春秋南燕録曰慕容德初議所都尚書潘聽曰青齊沃壤號曰東秦土方二千里四塞之固負海之饒可謂用武之國廣固者曹嶷之所營山川險峻足為王者之都從之齊州十道志曰齊州濟南郡置在歷城縣古兗州之域周禮曰子為玄枵齊之分左傳曰晉平公伐齊戰于歷下史記曰舜耕于歷山竹書穆天子傳曰天子自五鹿東征釣於漯水以祭淑人己巳天子東征飲于漯水之上漯水在祝阿即今禹城縣郡國縣道記曰章丘古高唐縣也春秋時齊邑史記曰齊威王使眄子守高唐趙人不敢東漁于河淄州十道志曰淄州淄州郡置在淄川縣禹貢青州之域周之九州為幽州之境春秋及戰國時屬齊秦為齊郡漢為濟南郡之般陽縣漢志曰般陽屬濟南郡應劭曰在般水之陽王莽曰濟南亭圖經曰長山縣本漢於陵縣也隋改焉以界內長白山為名漢志曰於陵屬濟南郡王莽曰於陸郡國志曰長山於陵城散宜生得瑞獸之地萊州十道志曰萊州東萊郡置在掖縣禹貢青州之域周之九州為幽州之境秦置三十六郡屬齊郡漢志高祖置東萊以其在齊國之東故云東萊尚書禹貢曰萊夷作牧左傳曰齊侯伐萊萊人使正輿子賂夙沙衛以索馬牛皆百匹齊師乃還後齊人復入萊萊恭公俘柔奔堂晏弱圍堂滅之遷萊子於郳史記曰周武王封太公於營丘萊侯聞之遂與太公爭營丘左傳曰聊攝以東姑尢以西其為人也多矣聊攝齊西界姑尢齊東界謂聊城攝城姑水尢水也水在即墨縣漢書郊祀志曰武帝元封元年大旱禱萬里沙孟康云沙長三百里沙在郡界地里志曰長廣縣有奚養澤周禮職方氏曰幽州之藪曰奚養長廣今昌陽縣登州十道志曰登州文登郡漢牟平縣屬東萊郡文帝封齊悼惠王子將閭為牟平侯此即將閭邑也圖經曰古萊子國也戰國及秦屬齊郡漢已下屬東萊郡又曰文登漢腄縣有之罘山漢書曰腄有之罘山丹水所出師古曰腄直睡切史記曰始皇二十八年行郡縣上泰山過黃腄經成山後二十九年又東遊登成山升之罘勒石紀功密州十道志曰密州高密郡置在諸城縣禹貢青州之域兼得徐州之地秦為琅琊郡漢屬齊文帝分齊立膠西國封齊悼惠王子卬為膠西王都高密齊記曰密州本東武縣樂府東武吟即是也秦本紀曰始皇二十六年齊遂登琅琊層臺於山上秦王樂之因留三月乃徙黔首二萬戶於琅琊山吳越春秋曰越王勾踐二十五年徙都琅琊立觀臺周旋七里以望東海史記曰齊湣王為燕師所敗唯聊莒即墨三城不下立湣王之子法章於莒是為襄王徐州十道志曰徐州彭城郡置在彭城縣元和郡縣圖曰禹貢徐州之域春秋時宋滕薛小邾逼陽之地六國時屬楚秦併天下為泗水郡楚漢之際楚懷王自盱眙徙都之後項羽徙懷王于郴自立為西楚霸王又都於此漢為泗水郡後為彭城郡漢書曰高祖過沛留置酒沛宮悉召故人父老子弟佐酒發沛中兒得百二十人教之歌酒酣上擊築自歌大風之歌令兒皆習和之上乃起舞慷慨泣下謂沛父老曰遊子悲故鄉吾雖都關中萬歲之後吾魂魄猶思沛宋書曰高祖經略中原以彭城險要置府於此後王玄謨上表曰彭城南屆大淮左右清汴城隍峻整襟衛周固又自淮以西襄陽以北經塗三千達于濟岱六州之民三十萬戶實由此境後魏書曰尉元上表曰彭城宋之要藩南師來侵莫不因之以凌諸夏泗州元和郡縣圖曰泗州臨淮郡理臨淮縣禹貢徐州之域春秋屬魯又為徐子之國後秦滅楚為泗水郡漢分置臨淮郡漢書地理志曰厹猶屬臨淮郡王莽曰康義厹音仇即連水也都城記曰周穆王末徐君偃好行仁義東夷歸之者四十餘國穆王西巡聞徐君威德日遠遣楚襲其不備大破之殺偃王其子遂北徙彭城百姓從之者數萬徐國今徐城是也兗州十道志曰兗州魯郡置在瑕丘縣元和郡縣圖曰禹貢兗州之域春秋時為魯國武王即位封周公於少昊之墟曲阜之地周公不就至子伯禽乃就封之後三十四君為楚所滅楚以魯為薛郡初為魯國魏太祖為兗州牧焉左傳曰季康子伐邾以邾子益來囚諸負瑕杜注云魯邑也有瑕丘城即今縣家語曰夫子為中都宰今有中都城在焉漢書曰高祖略地取湖陵方輿地志屬山陽郡即今方與縣也左傳曰隱公矢魚于棠即此地唐或為魚臺縣漢書曰吳楚七國反天子命周亞夫將三十六軍擊之亞夫至淮陽問客鄧都尉策安出客曰莫若引兵東北壁昌邑以梁委吳使輕兵絶淮泗口塞吳餉道使吳梁相弊乃以全制其極破吳必矣亞夫從之乃破吳今金鄉縣有昌邑故城魏志曰太祖欲征陶謙時呂布在兗州荀彧或說太祖曰昔高祖居關中光武據河內皆深根固蒂以制天下進足以勝敵退足以自守故雖有困敗而終濟大業將軍本以兗州首事平山東之難百姓無不歸心悅服且濟河天下之要地是亦將軍之關中河內也不可不先定乃從之海州十道志曰海州東海郡置在朐山縣禹貢徐州之域春秋魯國之東境七國時屬楚秦為薛郡地後分薛郡為郯漢改郯為東海郡漢書曰昫屬東海郡秦始皇立石海上以為東門又曰東海郡祝其羽山在南鯀所殛之地王莽曰猶亭左傳曰公會齊侯于夾谷即此沂州十道志曰沂州琅琊郡置在臨沂縣禹貢徐州之域也春秋時齊地秦置琅琊郡論語夫子曰點爾何如曰暮春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸夫子喟然歎曰吾與點也又曰子之武城聞絃歌之聲夫子莞爾而笑曰割雞焉用牛刀武城今在費縣又曰公山弗擾以費叛召子欲往子路不說曰末之也已何必公山氏之之也之適也無可之則止何必公山氏之適漢地理志曰襄賁屬東海郡王莽曰章信後屬琅琊郡賁音肥
