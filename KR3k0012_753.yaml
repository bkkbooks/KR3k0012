body:
  text: 工藝部九巧釋名曰巧者合異類共成一體也禮曰無作淫巧以蕩上心又曰季康子之母死公輸若方小公輸若匠師方小言年尚幼未知禮也斂般請以機封斂下棺於槨般若之族多技巧者見若掌斂事而年尚幼請代之而欲嘗其技巧將從之時人服般之巧公肩假曰不可般爾以人之母嘗巧則豈不得以以已字言寧有強使女者與借於禮作機巧非也以與已字本同又曰目巧之室則有奧阼周禮曰國有六職百工與居一焉百工司空事官之屬於天地四時之職亦處其一也知者創物謂始開端造器物若世本作者是也巧者述之守之世謂之工父子世以相教百工之事皆聖人之作也事無非聖人所為也爍金以為刃凝土以為器作車以行陸作舟以行水此皆聖人所作也凝堅也天有時地有氣材有美工有巧合此四者然後可以為良時寒溫也氣剛柔也良善也續漢書曰張衡性精微有巧藝作地動儀以精銅鑄其器圜徑八尺形似傾樽其蓋穹隆飾以篆文外有八龍首銜銅丸下有蟾蜍承之其牙發機皆隱在樽中周密無際如一體焉地動機發龍即吐丸蟾蜍張口受丸聲乃振揚司者覺知即省龍機其餘七首不發則知地震所從起來也合契若神觀之莫不服其奇麗自古所來未嘗有也蜀志曰諸葛亮性巧損益連弩木牛流馬皆出意焉亮集有其法也晉書曰嵇康性絶巧而好煆宅中有一柳樹甚茂乃激水環之每夏月居其下以煆晉紀曰宋王圍慕容超張綱巧絶於人乃使綱大治攻具於是城上火石弓弩無所用之晉陽秋曰吳葛衡字思直明達天官能為機巧故作渾天儀又曰衡陽區紙者甚有巧思造作木室作一婦人居其中人扣其戶婦人開戶而出當戶再拜還入戶內閉戶又作鼠市於中而四方丈餘四門門中有一木人縱四五鼠欲出門木人輒推木掩之門門如此鼠不得出又作指南車及木奴令舂穀作米中宗聞其巧詔補尚方左校沈約宋書曰石虎使解飛姚興令狐生造指南車宋武帝平長安始得此車戎狄所制不甚至精雖有南多不審正回曲頻聚猶須人力正之范陽人袒冲之甚有巧思常謂宜更構造順帝升明末齊王為相命冲之造焉其制甚精百屈千回未嘗移變北齊書曰高隆之性小巧至於公家羽儀百戲服制時有改易不循舊典時論非之文士傳曰張衡嘗作木鳥假以羽翮腹中施機能飛數里後趙録曰邴輔樂陵人也好學者才藝巧思機智妙於當時襄國宮殿臺榭皆輔所營也馬鈞別傳曰釣字德衡扶風人巧思絶世不自知其為巧也居貧舊綾機五十綜者五十躡六十綜者六十躡鈞乃易以十二躡其奇文異變因感而作猶自然而成形陰陽之無窮葛洪神仙傳曰葛由者蜀人也刻木作羊能行一旦騎羊入山遂云得仙未知指實也鄴中記曰石虎有指南車及司里車又有舂車木人及作行碓於車上動則木人踏碓行十里成米一斛又有磨車置石磨於車上行十里輒磨一斛凡此車皆以朱彩為飾唯用將軍一人車行則衆巧並發車止則止中御史解飛尚方人魏猛變所造虎至性好佛衆巧奢靡不可紀也嘗作擅車廣丈餘長二丈安四輪作金佛像坐於車上九龍吐水灌之又作一木道人恆以手摩佛心腹之間又十餘木道人長二尺餘皆披袈裟繞佛行當佛前輒揖禮佛又以手撮香投爐中與人無異車行則木人行龍吐水車止則止亦解飛所造也玄中記曰奇肱氏善奇巧能為飛車從風遠行述異記曰魯班刻石為禹九州圖今在格城石室山東北巖中西京雜記曰長安巧工人丁緩者為恆滿燈七龍五鳳雜以芙華蓮藕之奇又作臥褥香爐一名被中香爐大出房風至綬更始為之環轉四固而爐體常平可致之被褥故取被褥為名又作九層山爐鏤為奇禽怪獸諸靈皆自然運動又作七輪扇連以七輪大皆徑尺並相連續一人運之滿堂皆生風寒焉又曰昭陽殿椽桶皆刻作龍蛇縈繞之狀匠人丁護李菊所作也其巧為天下第一涼州記曰呂光時有任射者自匿為王欣家奴發覺應死躬有奇巧王爾魯般之儔也故赦之涼風門及大殿歲久傾敗躬運巧致思土木俱正王子年拾遺記曰嶿音須支國去泥離國八萬里其國婦人善織以五色絲稍內口中兩手引之則成文錦似列燈燭也又曰始皇起遊雲臺窮極四方之珍材搜天下之巧工人皆能騰虛緣木揮斤斧於空中又曰始皇二年騫消國獻善畫之工名裂裔刻白玉為兩虎削玉為毛有如真矣不點兩目睛始皇點之即飛去明年南郡有獻白虎二頭始皇使視之乃是先刻玉者始命去目睛二虎不復能去歷代名畫記曰吳王趙夫人丞相趙達之妹善書畫巧妙無雙能於指間以綵織為龍鳳之錦宮中號為機絶孫權常歎巴蜀未平思得善畫者圖山川地形夫人乃進所寫江湖九州山嶽之勢夫人又於方帛之上繡作五嶽列國地形宮中號為針絶又以膠續絲髮作為輕慢宮中號為絲絶又曰宋謝莊字希逸性多巧思制木方丈圖天下山川土地各有分理離之則州別郡殊合之則寓內為一老子曰大巧若拙又曰絶巧棄利盜賊無有莊子曰陶者云我善治埴圓者中規方者中矩範土曰陶陶化也埴黏土也匠人曰我善治木曲者中鉤直者應繩曲鉤也繩直也謂匠人機巧善能治木曲直必中鉤繩也夫埴木之性豈欲中規矩鉤繩哉土木之性稟之造物不求曲直豈慕方圓陶者匠人浪為臧否又曰百工有器械之巧則壯又曰巧者勞而智者憂無能者無所求又曰無為也而笑巧巧者有為以傷神又曰覆載天地刻雕衆形而不為巧巧者為之妙耳物皆自爾故無所稱巧也此之謂天樂忘樂而樂足矣又曰以瓦注者巧以鉤注者憚以黃金注者昏所要愈重則其心愈棼也又曰郢人堊堊白土墁其鼻端若蠅翼使匠石斫之匠石運斤成風而斫之盡惡而鼻不傷郢人立而不失容宋元君聞之召匠石曰嘗試為寡人為之匠石曰臣則嘗能斫之雖然臣質死之矣列子曰周穆王西巡有獻工人名偃師曰臣唯命所試然臣已有所造願王先觀之穆王曰以若俱來吾與若俱觀之越日偃師謁見王王曰若與階來者何人耶對曰臣之所造能倡者穆王驚視之趨步俯仰言皆人也巧夫頷其頤則歌合律捧其手則舞應節千變百化惟意所造王以為實人也與盛姬內御並觀之伎將終倡者瞚與瞬同其目而招王之左右侍妾王怒立便欲誅偃師偃師大懾立剖散倡者以示王皆草木膠漆白黑丹青之所為也自內則肝膽心肺脾腎腸胃外則筋骨支節皮毛齒髮皆假物也無不畢具者合會復如初王誠廢其心則口不能言廢其肝則目不能視廢其腎則足不能步穆王曰人之巧乃與造化同功乎詔二車載之以歸夫班輸之雲梯墨翟之飛鳶自謂能之極也弟子東賣會滑釐間以偃師之巧告於二子二子終身不敢語藝而時執規矩焉又曰宋人有為其君以玉為楮葉者三年而後成亂之楮葉中而不可別也此人遂以巧食宋國列子聞之曰使天地生物三年而成一葉則物之有葉者寡矣故聖人持道化而不持智巧韓子云象為楮葉又曰考成子學幻於尹文先生三年不告考成子請其過而求退尹文先生曰昔老聃之祖西也顧而告余曰有生之氣有形之狀盡幻也造化之所始陰陽之所變者謂之生謂之死窮數達變因形移易者謂之化謂之幻造物者其巧妙其功深故難終難窮因形者其巧顯其功淺故隨起隨滅知幻化之不異生死也始可學夫幻矣吾與汝亦幻也奚須學哉墨子曰公輸子削竹木為鵲成而飛之三日不下自以為至巧墨子謂曰子之為鵲也不如匠為車轄也須臾逝三寸之木而任五十石之重故利於人謂之巧不利於人謂之拙孟子曰公輸子之巧不以規矩不能成方圓也淮南子曰昔者楚欲攻宋墨子聞而悼之墨子名翟宋大夫悼傷也自魯趨而往十日十夜而不休息裂衣裳裹足至於郢見楚王自從趨走也郢楚都也今南郡江陵北里郢是也曰臣聞大王舉兵將攻宋計必得宋而後罷之乎志其苦衆勞民頓兵銼鋭天下以不義之名而不得咫尺之地猶且攻之乎頓罷銼辱鋭精攻無罪之宋故負天下以不義之名猶且必也王曰必不得宋又且為不義曷為攻之墨子曰臣見大王之必傷義而不得宋王曰公輸子天下之巧士作為雲梯設以攻宋曷為弗取公輪魯班號時在楚雲梯攻城具高長上與雲齊故曰雲梯設施也墨子曰今公輸設攻宋之械墨子設守之備公輸九攻而墨子九拒之終弗能入入猶下也於是乃偃兵輟不攻宋輟止也又曰神機陰閉剞劂無跡人巧之妙也而治世不以為民業又曰工人下漆而上丹則可下丹而上漆則不可萬事由此也又曰規矩鉤繩者乃巧之具也而非所以為巧巧存於心也又曰神明之事不可以智巧為也不可以筋力致也天地所包陰陽所嘔雨露所濡以生萬殊悲翠玳瑁碧玉珠文采明朗澤若濡摩而不玩久而不渝奚仲不能旅魯般弗能造此之謂大巧又曰夫至巧不用劍巧在心手故不用劍又曰大匠不用斫又曰夫物有以自然而後人事有治也故良匠不能斫金巧冶不能鑠木金之勢不可斫而木之性不可鑠也埏埴而為器刳木而為舟爍鐵而為刃鑄金而為鍾因其可也尸子曰古者倕為規矩準繩使天下倣焉慎子曰百工之子不學而能者非生而巧也言有常事傅子曰馬先生鈞天下之巧也有二子謂古無指南車記言之虛也先生曰古有之二子以白明帝詔先生作之而指南車成此一異也從是天下服其巧矣居京都城內有地可為園患無水以溉之先生乃作翻車令童兒轉之而灌水自覆其巧百倍於常此二異也後人有上百戲者能設而不能動帝以問先生可動否鈞曰可動帝曰其巧可益否對曰可益受詔作之以大木雕構使形若輸平潛以水發焉設為女樂舞象使木人擊鼓吹簫木跳丸擲自出自入百官行署變巧百端此三異也先生見諸葛亮連弩曰巧則巧矣未盡善也言作之可令加五倍嘗試以車輪懸瓴甓數十飛之數百步矣馬先生之巧雖古般輸墨翟王爾漢世張平子不能過也又曰馬先生為機器未成裴世子疑而難之先生口屈不能對傅子謂裴子善乎言而不巧馬氏長於巧而短於言巧者天下之微事抱朴子曰善圍碁者世謂之碁聖故嚴子卿馬綏明有碁聖之名書聖皇象胡昭是也畫聖衛協張墨是也木聖張衡馬鈞是也孔藂子曰孔附謂陳玉曰梁人有楊田者伎巧過人骨勝肉飛博物志曰近世有田夫至巧而不自覺也其婦稱之猶不自知乃削木為小麥試糴之無疑歸磨乃覺非麥論衡曰傳稱魯般墨子之巧刻木為鳶飛之三日而不集下也夫言其以木為鳶飛之可也言其三日不集增之也猶世傳言魯般巧亡其母矣言其巧工為母作木車馬木人御者機關備具載母上臺去而不還失其母焉楊泉物理論曰夫蜘蛛之羅蜂之作巢其巧妙矣而況於人乎故工匠之方規圓矩出乎心巧成於手跡非睿敏精密孰能著勳成形以周器用哉晉讚曰陳協以工巧見知
