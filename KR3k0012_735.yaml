body:
  text: 方術部十五巫上說文曰巫祝也女能事無形舞降神也象人兩襃無形與工同意周禮春宮曰司巫掌群巫之政令若國大旱則帥巫而舞雩雩旱祭也國有大烖則帥巫而造巫恒凡喪事掌巫降之禮男巫掌望祀望衍授號旁招以茅女巫掌歲時祓除釁浴旱暵則舞雩若王后弔則與祝前凡邦之大烖歌哭而請禮曰君臨臣喪以巫祝桃茢執弋惡之為有凶邪之氣在側君聞大夫之喪去樂卒事而往未襲也其己襲則止巫去祧茢鬼所惡茢萑苕可掃不祥所以異於生也又曰襄公朝于荊康王卒荊人曰必請襲欲使襄之公依魯人曰非禮也荊人強之巫先桃茢荊人悔之巫祝桃茢君臨臣喪之禮又曰歲旱穆公召縣子而問然曰天久不雨吾欲暴巫而奚若曰天則不雨而望之愚婦人於以求之母乃已䟽乎已猶甚也巫主接神亦覡天哀而雨之春秋傳說巫曰在女曰巫在男曰覡周禮女巫旱暵則舞雩傳曰晉侯改葬共太子秋狐突適下國遇太子太子使登僕而告之曰夷吾無禮余得請於帝矣將以晉卑秦秦將祀余對曰臣聞之神不歆非類民不祀非族君祀無乃殄乎且民何罪失刑乏祀君其圖之君曰諾吾將復請七日新城西偏將有巫者而見我乎許之遂不見又曰夏大旱公欲焚巫尫臧文仲曰非旱備也脩城郭貶食省用務牆勸分杜預注曰勸分有無相濟也此其務也巫尪何為天欲殺之則如勿生若能為旱焚之滋甚公從之是歲飢而不害又曰初楚范巫商似商似范巫之名謂成王與子玉子西曰三君皆將強死城濮之役王思之故使止子玉曰母死不及止子西縊而懸絕王使適至遂止之使為商公沿漢沂江將入郢王在渚宮下見之懼而辭曰臣免於死又有讒言謂臣時逃臣歸死於司敗也王使為工尹又與子家謀殺穆王穆王聞之殺鬭宜申及仲歸又日晉侯夢大厲被髮及地搏膺而踊曰殺余孫不義余得請於帝矣壞大門及寢門而入公懼入于室又壞戶公覺召桑田巫桑田晉邑巫言如夢公曰何如曰不食新麥矣言公不得及食新麥六月丙午晉侯欲麥使甸人獻麥饋人為之召桑田巫示而殺之將食張如廁陷而卒又曰晉中行獻子將伐齊夢與厲公訟弗勝公以戈擊之首墜於前跪而戴之奉之以走見梗陽之巫皋他日見諸道與之言同巫曰今茲主必死若有事於東方則可逞獻子許諾晉伐齊又曰公在楚楚人使公親襚公患之穆叔曰祝殯而襚則布幣也先使巫祝除殯之凶邪而行襚禮與朝而布幣無異乃使巫以桃茢先袨殯茢黍穰楚人弗禁既而悔之書曰敢有恒舞于宮酣歌于室時謂巫風諭語曰人而無恒不可以作巫醫史記曰魏文侯時西門豹為鄴令往到鄴會長老問民之疾苦長老云苦於河伯娶婦以故貧豹問其故對曰鄴三老廷掾常歲歛百姓取其錢數百萬用其二三十萬為河伯娶婦與巫共分其餘錢持歸當其時巫行視小家女好者云是當為河伯婦即娉取洗沐為治新繒綺縠之衣閒居齋戒為治齊宮河上張緹絳帳帷女居其中為具牛酒飯食十餘日共粉飾之如嫁女床席令女居其上浮之河中始浮行數十里乃沒其人家有好女者恐大巫祝為河伯取之以故多持女遠逃亡以故城中益空無人又貧困所從來久遠矣民人俗語曰即不為河伯娶婦水來漂溺人民西門豹曰至為河伯娶婦時願與三老巫祝父老送女河上幸來告語之吾欲往送女皆曰諾至其時西門豹往會之河上三老者官屬豪長父老皆會與人民觀之者三二千人其巫老女子也年七十從弟子女十人所衣皆繒單衣立大巫旁西門豹曰呼河伯婦來視其好醜即將女出帷中來至前豹視之顧謂三老巫祝父老女子曰是女不好煩大巫嫗為入報河伯更求好女後日送之即使卒共抱女巫嫗投之河中有頃曰巫嫗何久也弟子趨之復以弟子一人投河中有頃曰弟子何久也復使一人趨之復投一弟子河中凡三弟子西門豹曰巫嫗弟子女也不能白事煩三老入白之復投三老河中西門豹簪筆罄折嚮河立待良久長老吏旁觀者皆為驚恐西門豹顧曰巫嫗三老不來還奈之何復使廷掾與豪長一人趨之皆叩頭且破額血流地色若死灰西門豹曰諾且留待之須臾豹曰廷掾起矣河伯留之久也皆罷去歸鄴吏民大驚恐是後不敢復言河伯娶婦又曰武帝時游水發根服彪云游水縣名發根人姓言上都有巫病而鬼下之上召置祠之甘泉及病使人問神君神君曰天子無憂病於是病愈又曰桓梁災越巫勇之曰越俗有火災後起屋必用勝服之於是作建章宮度為千門萬戶又曰起巫立越祀而以雞卜上信之漢書曰音義曰持雞雞卜如鼠卜矣又曰孝武帝天漢二年秋上禁巫祠道中者文頴曰始漢家於道中祠排禍咎移之於行人百姓以其不經今止之也後漢書曰樊崇等至弘農與更始諸將連戰剋勝眾遂大集乃分萬人為一營凡三十營置三老從事各一人進至華陰軍中常有齊巫鼓舞祠城陽景王以求福助以其定諸呂安社稷故郡國多為立祠焉盆子承其後故軍中祠之也巫言景王大怒曰當為縣官何故作賊縣官謂天子也有笑巫者輒病軍中驚動時方望弟陽怨更始殺其兄乃逆說崇等曰更始荒亂令不行故使將軍得至於此今將軍擁百萬之眾西向帝城而無稱號名為群賊不可以久不如立宗室挾義誅伐以此號令誰敢不服崇等以為然而巫言益甚前及鄭令阜孫乃相與議曰今迫近長安而鬼神如此當求劉氏共尊立之六月遂立盆子為帝自號為建世元年又曰許楊字偉君汝南平輿人也少好術數王莽輔政召為郎稍遷酒泉都尉及莽篡位楊乃變姓名為巫醫逃匿他界莽敗方還鄉里又曰第五倫為會稽太守會稽俗多淫祀好卜筮人當以牛祭神百姓財產以之困匱其自食牛肉而不以薦祠者發病且死為牛鳴前後郡將莫敢禁倫到官移書屬縣曉告百姓其巫祝有依託鬼神者詐怖愚人皆案論之有妄屠牛者吏輒行罰人初頗恐懼或祝詛妄言倫案之愈急後遂絕百姓以安又曰順帝時廷尉河南吳雄字季高以明法律斷獄平起自孤寒致位司徒雄少時家貧喪母營人所在封土者擇葬其中喪事趣辨不問時日毉巫皆言當族滅而不顧及子訢孫恭三代廷尉為法名家又曰宋均為九江太守陵道縣有虞后二山人共祠之眾巫遂取百姓男女以為公嫗以男為山公以女為山嫗猶祭之尸主也歲歲改易既而不敢嫁娶前後守令莫敢禁均乃下書曰自今以後為山娶者娶巫家勿擾良人於是遂絕又曰安丘望之字仲都京兆長陵人少時學老子經恬靜不求進官號曰安丘丈人成帝聞欲見望之辭不肯見為巫醫於人閒也獻帝起居注曰李儒性喜鬼怪左道之術常有道人女巫繫下神祭六丁符劾厭勝之具無不為又於朝廷省門外為董卓作神坐數以牛羊祠之天子使左中郎將李國持節拜𠐶為大司馬在三公之右𠐶自為得鬼神之助乃厚賜諸巫東觀漢記曰高鳳年老執志不倦名聲著聞太守連召請恐不得免自言本巫家不應為吏又曰班超使西域于闐王廣德超至禮意甚踈其俗信巫言神怒何故向漢漢使有驪馬急求取以祠我廣德就超請馬超許之而令巫自來取馬有頃巫至超即斬其首送廣德因辭讓之吳志曰景帝有疾求視鬼者得一人景帝欲試之乃殺鵝而埋之於中架小屋施床机以婦人紙履服物著其上乃使覡視之告曰若能說此冢中鬼形狀者即信當厚賜加賞矣竟日盡夕無言帝問之急乃曰實不見有鬼但見一白鵝立墓上所以不即白之者疑是鬼神變化作此想當候其真形而定無復移易不知何故不敢不以實上聞景帝乃厚賜之晉書曰夏統字仲御從父敬寧祠先人迎女巫章丹陳珠二人並有國邑裝服甚麗善歌舞又能隱形匿景甲夜之初撞鍾擊鼓閒以絲竹丹珠乃大破舌吞刀吐火雲霧杳冥流火電發統諸從兄弟欲往觀之難統於是共紿之曰從父閒疾病得瘳大小以為喜欲因其祭祀並往賀之卿可俱行乎統從之入門忽見丹珠在中庭輕步徊舞靈談鬼笑飛觴挑柈酬酢翩翻統驚愕而走不由門破藩直出又曰武悼楊后既為賈后所幽死賈后又信妖巫謂太后必訢冤先帝乃覆而殯之施諸厭劾符書藥物李矩屯于榮陽劉聰遣從弟暢步騎三萬討矩屯于韓王故壘時暢卒至城東未暇為備遣使奉牛酒許降于暢暢大饗渠帥人皆醉飽知矩謀夜襲之兵士以賊眾皆有懼色矩令郭誦禱鄭子產曰君昔相鄭惡鳥不鳴凶胡臭羯何得過庭使巫揚言東里有教當遣神兵相助將士聞之昔踊躍爭進又載記曰石虎太子邃保母劉芝初以巫術進及養邃有深寵通賄賂豫言論權傾朝廷親貴多出其門封芝為宜城君又曰李雄母羅氏雄信巫覡之言多有忌諱至欲不葬其母司空趙肅諫之宋書曰前廢帝子業好遊華林園竹林堂使婦人倮身相逐有一婦人不從命斬之後經少時夜夢遊後堂有一女子罵曰爾悖虐不道明年不及熟矣帝怒遂於宮中求得似所夢者戮之其夕復夢所戮女罵曰汝枉殺我以訴上帝至是巫云此堂有鬼帝日與陰山公主及六宮綵女數百人隨群巫捕鬼屏除侍衛帝親自射之又曰王僧綽豫參朝政從兄微懼其太盛勸令損抑僧綽乃求吳郡及廣州會巫蠱事泄上先召儈綽具以言之又曰明帝選王儉尚陽羨公主拜駙馬都尉帝以儉嫡母武康主因太初巫蠱事不可以為婦姑欲開冢離葬儉因人自陳密以死請故事不行齊書曰鬱林王在西州令女巫揚氏禱祝速求大位及文惠薨謂由楊氏之力倍加敬信呼揚婆宋氏己來人閒有揚婆兒歌蓋此徵也武帝有疾又命揚氏日夜祈禱又曰明帝身衣絳衣服飾皆赤以為厭勝巫覡云後湖水頭經過宮內致帝有疾帝乃自至太官水溝左右啟太官無水則不立決意塞之欲南引淮流會崩事寢又曰東昏侯偏信蔣侯迎來入宮晝夜祈禱左右朱光尚詐云見神動輒諮啟並云降福遂加位國朱又為靈帝車服羽儀一依王者又曲信小祠日有十數巫師魔媼迎送紛紜光尚輒託云神意范雲謂光尚曰君是天子要人當思百全計光尚曰至尊不可諫止當託神鬼以達意耳後東入樂遊人馬忽驚以問光尚光尚曰先帝大瞋不許數出帝大怒拔刀與光尚尋覔既不見處乃縛菰為明帝形北面斬之又曰諸暨東洿里屠氏女父失明母有痼病疾親戚相棄鄉里不容女移父母遠住紵舍晝採樵夜紡績以供養父母俱卒親營殯葬負土成墳忽空中聲云汝性可重山神欲相驅使汝可為人療病必得大富女謂是魃魅弗敢從遂得病積時鄰舍人有溪蜮毒者女試療之自覺病便差遂以巫道為人療病無不愈家產日益鄉里多欲娶之女以無兄弟誓守墳墓不嫁又曰武陵王曅為祠部尚書巫覡或言曅有非常之相以此自負武帝聞之故無寵未常處方岳焉又曰王敬則母為女巫常謂人云敬則生時胞衣紫色後應得嗚鼓角人笑之曰汝子得為人吹角可矣後果封侯給鼓吹又曰袁君政字世忠為豫章內史性不信巫邪有師世榮稱道術為一郡巫長君政在郡小疾主簿熊丘薦之師云須疾者衣為信命君政以所著襦與之事竟取襦云神將送與北斗君政使檢諸身於衣裏獲之以為亂政即刑於市而焚神一郡無敢行巫梁書曰沈約病夢齊和帝劍斷其舌令巫視之言如夢乃呼道士奏赤章於天稱禪代之事不由己出又曰元帝背生黑子巫媼見曰此大貴不可言又曰蔡撙為臨海太守有百姓楊元孫以婢採蘭貼與同里正黃權約生子酬乳哺直權死後元孫就權妻吳氏贖婢吳背約不還元孫訴樽判還本主吳能為巫出入撙內以金釧賂撙妾遂改判與吳元孫撾登聞鼓訟之為有司劾時撙已去郡雖不坐而常以為恥又曰王神念為青冀二州剌史性剛正所更州郡必禁止淫祠時東北有石鹿山臨海有神廟祅巫欺惑百姓遠近祈禱縻費極多及神念至便令毀拆風俗遂改後魏書曰郭祚少而孤貧姿貌不偉鄉人莫之識也有女巫許相後當富貴祚涉歷經史習崔浩之書尺牘文章見稱於世舉秀才對策上第拜中書士累遷黃門侍郎又曰定州流人解思安其兄慶賓懼後追責規絕名貫乃認城外死屍詐稱其弟為人所殺迎歸殯葬頗類思安見者莫辨又有女巫揚氏自云見鬼說思安被害之苦飢渴之意慶賓又誣疑同軍兵蘇顯甫李蓋等所害經州訟之二人不勝楚毒各自款引獄將決竟李崇疑而停之密遣二人非州內所識者偽從外來詣慶賓告曰僕往在北州去此三百有一人見過寄宿夜中共語疑其有異便即詰問跡其由緒乃云是流兵背役逃走姓解字思安時欲送官苦見求及稱有兄慶賓今住楊州相國城內更姓徐君脫矜愍為往告報見申委曲家兄聞此必重相報所有資才當不愛惜今但見質若往不獲送官何晚是故相造伸此意君欲見雇幾何當放賢弟若其不信可見隨看之慶賓帳然失色求其少停當備財物此人具以報崇攝慶賓問曰爾弟逃亡何故妄認他屍慶賓伏引更問蓋等乃云自誣數日之間思安亦為人糺送崇召女巫視之鞭笞一百崇斷獄精審皆此類也三國典略曰初齊神武之克鄴城於北臺上建立神祠盍布衣時所事也每祠之日唯與巫潘嫗及數人行事親自神宰割外無見者至是齊主焚除此廟并擲巫於火令燒殺之又曰齊高緯夜夢黑衣貴人送相驅逐乃向之拜巫者烏大以厭之又於芳林園自著破衣裳為窮兒入市躬自交易焉築西鄙諸城為羌兵鼓譟凌之多作黑衣人共相執縛親率內參臨拒或實彎弓射人自晉陽東巡單馬馳騖前不得有人解髮散而歸又曰崔季舒未遇害家池蓮莖化為人面著鮮卑帽妻晝魘魘寤云見人長一丈遍體黑毛欲來逼己巫曰此是五道將軍入宅者不祥又曰侯景之首至于江陵梟之於市然後煮而漆之以付武庫先是謠曰苦竹町市南有好井荊州軍殺侯景及首至湖東付諮議參軍宗季長季長宅東有苦竹町以景首置其中用市南井水煮之先是巫言有鬼萬計斷頭折頸入宅去來云季長大懼設齋迎佛又有數萬烏自江津飛噪集其家焉北史曰齊琅邪王儼之未獲罪鄴北城有白馬佛塔是石季龍時為澄公所作儼將脩之巫曰若動此浮圖北城失主不從破至弟二級得白虵長數丈迴旋失之數旬而敗又曰竇泰母初夢風雷暴起若有雨狀出庭觀之見雷光奪目驟雨霑灑寤而驚汗遂有娠朞月而不產大懼有巫曰渡河湔裙裾產子必易便向水所忽見一人曰當生貴子生可從而南泰母從之俄而生泰隋書曰衛昭王爽討突厥明年徵為納言高祖甚重之未幾爽寢疾上使巫者薛榮宗視之云眾鬼為厲爽令左右驅逐之居數目有鬼物來擊榮宗榮宗走下而死其日爽薨又曰李景為代州惣管先是府內井中甃上生花如蓮并有龍見時變鐵為馬甲士又有神人長數丈見於城下其跡長四尺五寸景問巫對曰此是不祥之物來食人血耳景大怒推出之旬日而兵至死者數萬焉又曰李密破宇文化及化及還其勁兵良馬多戰死士卒皆倦王世充欲乘其弊而擊之恐人不一乃假託鬼神言夢見周公乃立祠於洛水上遣巫宣言周公欲令僕射急討李密當有大功不則兵皆疫死兵多楚人俗信妖妄故出言以惑之眾皆請戰
