body:
  text: 兵部八十九鞍說文曰鞍馬鞁具也鞁皮彼切漢書曰孝宣許皇后元帝母也父廣漢昌邑王侍郎從武帝上甘泉誤取他郎鞍以被其馬發覺吏劾從行而盜當死者詔下蠶室後為官者丞司馬彪漢書曰光武徵趙喜引見賜鞍馬待詔公車東觀漢記曰景丹將兵詣上上勞勉丹出至城外兵所下馬坐鞍旃毾㲪上毾音塔㲪音登又曰王莽誅諸謀者季次元聞事發覺被馬欲亡馬駕在轅中惶遽著鞍上馬出門顧車乃自覺止又曰章帝曰明德后時廣平鉅鹿樂成王在邸入問起居朕從上望見車騎鞍勒皆純黑無金銀采飾馬不踰六尺於是以白太后即賜錢各五百萬英雄記曰呂布刺殺董卓與李𠐶戰敗乃將數百騎以卓頭繫馬鞍走出武關魏志曰許禇從討韓遂馬超於潼關太祖將北度臨濟河先度兵獨與禇及虎士百餘人留南岸斷後超將步騎萬餘人來奔太祖軍矢下如雨禇乃扶太祖上舡賊戰急軍爭濟舡重欲沒禇斬攀舡者左手舉馬鞍蔽太祖舡工為流矢所中死禇右手並棹舡僅乃得度是日微禇幾危又曰太祖馬鞍在庫為鼠所齧庫吏懼死鄧哀王冲以刀穿單衣如鼠齧者謬有愁色太祖問之冲曰俗以鼠齧衣者其主不吉太祖曰此妄言耳俄而庫吏以齧鞍聞太祖笑曰兒衣在側而齧况鞍懸柱乎魏略曰五官將知主忠昔嘗噉人時因從駕出行令取家間髑髏著忠繫馬鞍以為嬉笑吳志曰曹公破走魯肅先還權大請諸將肅將入閣拜權起禮之謂曰子敬孤持鞍下馬相迎足以顯卿未肅趨進曰未也眾人聞之無不愕然就坐徐舉鞭曰願至尊威加乎四海揔括九州克成帝業更以安車蒲輪徵肅始當顯耳權拊掌欣笑又曰孫權每田獵乘馬射虎嘗突前攀持馬鞍張昭變色而前曰將軍何有當爾夫為人君者謂能駕禦英雄驅使群臣豈謂馳逐於原野挍勇於猛獸者乎如有一旦之患奈天下笑何後魏書曰傅永有氣幹拳勇過人能手執鞍橋倒立馳騁江表傳曰孫策討祖郎生獲之策謂郎曰爾昔斫孤馬鞍今創軍立事除棄宿恨汝莫怨怖郎叩頭謝罪即破械賜衣署門下賊曹魏百官名曰紫茸題頭高橋鞍一具三輔決錄曰平陵士孫奮富聞京師梁冀知奮儉恡以鏤衢鞍遺奮從貸五十萬西京雜記曰武帝時身毒國獻白光琉璃鞍在暗室光照十丈又曰武帝得貳師天馬造玫瑰石為鞍異苑曰昔有人乘馬山行遙望岫裏有二老公相對樗蒲遂下騎造焉以策柱地而觀之自謂俄頃視其馬鞭漼然已爛顧瞻其馬鞍體骸枯朽既還至家無復親屬一慟而絕六韜曰車騎之將軍馬不具鞍勒不備者誅陸景典語曰周世以膏腴之沃壤豐鎬之寶地大啟封境以封秦釋鞍授鞚假驥他人欲無陵己其可得乎傅玄馬射賦曰百馬齊興六驥孔閑金銜玉羈文防鏤鞍明珂景服華䩸采鮮古樂府左延年從軍詩曰從軍何等樂一驅乘雙駮鞍馬照人目龍驤自動作謝惠連詩曰挂鞍長林側飲馬脩川湄劉琨扶風歌曰擊馬長松下發鞍高岳頭魏曹植上銀鞍表曰於光武皇帝代効此銀鞍一具初不敢乘謹奉上宋劉義恭謝金梁鞍啟曰賜臣供御金梁橋鞍制作精巧宜副龍駟聖慈下逮猥垂光賜後漢李尤鞍銘曰驅騖馳逐騰躍覆跩雖其捷習亦有顛沛井羸其瓶罔不斯敗跩丑世切轡釋名曰轡佛也言牽引佛戾以制馬也詩曰我馬維駒六轡如濡又曰我馬維駱六轡沃若又曰駟鐵孔阜六轡在手周禮曰擊壺氏絜轡以令舍懸轡於當所舍止之處又曰大馭掌馭玉路以祀及犯軷王自左馭馭下祝登受轡犯軷遂驅之家語曰古者天子以內史為左右手以德法為銜勒以百官為轡善御馬者正銜勒齊轡策均馬力和馬心故口無聲而馬應轡策不舉而極千里善御人者一其德法正其百官均齊人力和安人心故令不再而人順從刑不用而天下理矣又曰善御馬者正身以總轡又曰閔子騫為費宰問政於孔子孔子曰君者人也吏者轡也刑者策也人君之政執其轡策而已矣又曰孔子適衛衛將軍文子問曰今齊之以刑而猶弗勝何禮之齊也孔子云禮譬之於御則轡也漢春秋曰大僕公卿奉引大僕執轡大將軍陪乘光武東京郊祀法駕則河南尹奉引奉車都尉執轡侍中參乘孔叢子曰夫子云夫政令者人君之銜轡所以制下也管子曰凡赦者小利而大害也故久而不勝其禍故赦者馬之委轡也無赦者痤疽之礦石也痤作和切疽七余切列子曰凡御者得之於銜應之於轡得之手應於心淮南子曰權衡者人主之車輿爵祿者人臣之銜轡矣又曰王良造父御也上車攝轡馬為齊整班固東巡頌曰乘輿動色群后屏氣萬騎齊鏕千乘弭轡魏明帝善哉行曰百馬齊轡御由造父後漢李尤轡銘曰轡銜在手急緩必時賞罰在心中和是思馬知良御進取道里人知善政令行禁止鞚張揖埤蒼曰靮音的馬韁也鞚馬勒也𩋠音緬䩭音羈勒靻也靻音浙柔皮也服虔通俗文曰所以制馬口曰鞚環濟吳紀曰大皇帝征合肥未下因撤軍還兵呂蒙等共留津北魏將張遼奄至圍數重蒙等死戰既破圍上馬出升浮橋南已絕丈餘無板谷利時為親近監白曰至尊牢攝鞍緩鞚利當著鞭以增馬勢於是得渡晉書曰溫嶠字太真王敦舉兵內向六軍敗績太子將自出戰嶠執鞚諫太子乃止晉起居注曰冠軍將軍王浹表臣以發許昌城內北人諸將孫凱等謀欲逼臣留身驅遣南人臣初出城門乃相纏繞牽臣馬鞚臣手刃斬截僅乃得出應瑒馳射賦曰放鞚長騁神足奔越終節三驅每不虛發陳林武庫賦曰馬則飛雲絕景直鬐騧䭹走駿驚飊步象雲浮受銜斯遊歛鞚則止傅玄良馬賦曰奮舋沛艾虎據麟跱望雲睇景乘虛四起縱銜則往攬鞚則止成公綏射兔賦曰收輔車之雙轡舍良馬之長鞚禽迅羽之輕焱截逸足之狡弄盈得獲於後乘充庖廚之所貢夏侯湛征邁辭曰上伊闕兮臨川柎駿馬兮授鞍中衢兮載歎斂鞚兮盤桓閔鴻與劉子雅書曰若能控奔驥以接駑乘則力追者萬群傾脩翅以顧短翮則歸飛者如雲勒劉芳毛詩箋音義證曰轡是御者所執者也不得以轡為勒且舊語云馬勒不云轡以勒為轡者蓋是北人避石勒名也今南人皆云馬勒而以鞚為轡反覆推之此為明證又詩稱執轡如組又曰六轡在手以所執為轡審矣今俗儒咸以轡為勒而曾無寤者家語曰閔子問政於孔子孔子曰不能御民者棄其德法專用刑辟譬猶御馬棄其銜勒而專用箠策馬必傷車必敗無德法而用刑民必流國必亡漢書曰呼韓耶單于甘露三年正月朝天子于甘泉宮賜以冠帶衣裳玉具劍鞍勒一具馬十五疋王隱晉書曰愍懷太子好卑雞小馬小牛令左右騎斷羈勒使墮地蕭方等三十國春秋曰涼州胡安據盜發張駿墓得珊瑚馬鞭馬瑙鍾黃金勒鄴中記曰虎諱勒呼馬勒曰轡羅勒曰香菜永昌記曰哀牢王出入射獵騎馬金銀鞍勒加翠毛之飾淮南子曰鴈門之北狄不穀食賤長貴壯各上氣力人不弛弓馬不解勒便之也高誘曰不穀曰不穀食𡧢酪而已北狄鮮卑也弛舍也便習也說苑曰田子方度西河造翟黃翟黃乘軒車載華蓋黃金之勒約鎮簟席如此者具駟八十乘子方望以為人君翟黃至而子方曰子人臣也將何以至此對曰此皆君之賜也臣進五大夫祿爵倍以故至於此韓陽天文要集曰造父五星在傳舍南造父洗馬轡勒銜鑣棗據詩曰騏驥伏吳坂不與伯樂俱駑馬同銜勒豈得獨卓殊魏文帝馬腦勒賦曰馬腦玉屬也出自西域文理交錯有似馬腦故其方人因以名之或以繫頸或以飭勒余有斯勒美而賦之命陳琳王粲並作詞曰天珍物寄鍾山之崇崗稟金德之靈施含白虎之華章扇朔方之玄氣喜南離之焱陽翕中區之黃采曜東夏之純蒼苞五色之明麗配皎日之流光內炤音照浮景外鮮文繁奇章異采的皪其間爾乃藉彼朱罽華勒用成駢居列跱煥若羅星應瑒馳射賦曰群駿籠茸於衡首咸皆腰䮍與飛兔攏脩勒而容與並軒翥而厲怒陳琳馬腦勒賦曰五官將得馬腦以為寶勒美其英綵之光艷也使琳賦之爾乃他山為錯荊和為理制為寶勒以御君子王粲馬腦勒賦曰因姿象形匪彫匪刻厥容應規厥性順德御世嗣之駿服兮表騄驥之儀式王沉馬腦勒賦曰厥象伊何如規之盈鮫鱗紆鬱白黑殊形如水之潔如玉之貞固乾坤之所育兮匪彫鏤而自成爾乃施飾龍首加服鸞鑣和鈴鏘鏘回景逍遙鑣釋名曰鑣包也所以在傍苞歛其口也說文曰鑣馬銜也銜馬勒口中也爾雅曰鑣謂之钀郭璞曰勒也許揭切又魚列切詩曰游于北園四馬既閑輶車鸞鑣載險歇驕毛萇曰輶軒也斂歇驕田犬也鄭玄曰軒卑驅逆之車也置鸞於鑣者異於乘車也釋智匠古今樂錄曰明帝休成之樂歌曰玉鑣息節金輅懷音文士傳曰山巨源為吏部郎欲舉嵇康自代康聞與之書曰譬猶禽鹿少見馴育則服教從制長而見羈雖飾以金鑣饗以嘉肴愈思長林而志在豐草魯國先賢志曰黃伯仁龍馬頌曰楊鸞鑣兮揮紅沬之幡飄鹽鐵論曰古者庶人賤騎繩控草鞮音低皮薦而已及其後革鞍攻成鐵鑣不飾又曰古者樵車無輪棧車無軛其後木軨不衣長轂數輻今富者銀黃華左搔以結緌錯鑣塗朱珥勒飛軨楚辭曰絕鑣銜以馳騖兮暮著次而敢止路蕩蕩其無人兮遠不御兮千里棗據詩曰真偽各有分駑驥不齊鑣陶琬之詩曰我服既暉我駟既閑楊鑣警路哀籥清綿桓玄集載琬之為江州主簿宋文帝登景陽樓詩曰士女炫街里軒冕曜都城萬軫楊金鑣千舳樹蘭旌袁淑遊新亭曲水詩序曰離榭修幕陵隧彌阜鑣容斾綵裛野麗雲鮑昭詩曰飛鑣出荊路騖服入秦川王沉踐行賦曰六龍齊鑣鸞聲振振景動波迴天行星陳張恊玄武館賦曰天子翱翔郊甸順時巡省龍駟騰鑣羽騎遊騁顧流光以桉轡迴鸞旗而時幸李充穆天子賦曰其馬則赤驥盜驪驊騮綠耳楊和齊鑣一瞬千里董子曉乘輿駮馬賦曰驅觀若斯氣勢雲披銜金鑣著玉羈顏延之七繹曰梓工飾雕簟之輿涓人進龍圖之馬轙駕則眩奪鳳蓋振鑣則圈促函夏故動軔馳光舉策流赭張委九慜曰映金箱之羽蓋鳴玉衡之鸞鑣望天路以振策指萬里於崇朝殷淡宣貴妃誅曰嚴位服於旗容尚徽謚於銘策節哀路於蕭鍾齊行鑣於輬翟應璩與劉文達書出僕頃倦遊談之事欲脩無為之術不能與足下齊鑣騁轡爭千里之表也桓溫與慕容皝書曰自滄流以北幽朔以東將軍皆以羈落而惣率之矣首尾脣齒左右力用鳴鏑揚鑣動數十萬
