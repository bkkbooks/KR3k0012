body:
  text: 人事部九十三諫諍二漢書曰文帝幸上林皇后慎夫人從其在禁中常同坐及坐郎署袁盎卻慎夫人坐因前說曰臣聞今陛下既已立后慎夫人乃妾妾主豈可以同坐哉不見人彘乎於是上乃悅慎夫人賜盎金五十斤盎以數直諫不得久居中調為隴西都尉又曰元帝時左將軍史丹護太子家事竟寧元年上寢疾傅昭儀及定陶王常在左右而皇后太子希得進見丹直入臥內頓首伏青蒲上涕泣曰皇太子以適長立積十餘年名號繫於百姓今者道路流言以為太子有動搖之議審若此臣願先賜死以示群臣應劭注曰以青規地曰青蒲自非皇后不得至此又曰項羽發使立沛公為漢王王巴蜀沛公怒不許蕭何諫曰雖漢中之惡猶不愈於死乎王曰何為乃死也何曰今衆不如百戰百敗不死何俟周書曰天與不取反受其咎天漢其稱美乎夫能屈一人之下而申於萬乘之上者湯武是也臣願大王王漢中養其人致英傑收巴蜀定三秦天下之事可圖也漢王善之遂之國又曰周昌沛國人高祖時為御史大夫高祖欲廢呂后所生太子立戚夫人之子如意為太子昌諫之曰陛下若廢嫡立庶臣不敢奉詔高祖乃止後太子立是為惠帝拜昌為太傅又曰薛廣德為御史大夫元帝永光中行幸不已廣德乃上書諫曰臣竊見關東人民流離陛下日撞亡秦之鍾聽鄭衛之樂馳騁干戈恣獵于田野不恤百姓臣誠悼之今士卒暴露從官勞倦願陛下亟返宮與天下同憂樂上即日還宮又帝欲酎祭宗廟出便門橋欲御樓船廣德乃當車免冠頓首諫曰陛下宜從橋上帝曰大夫冠廣德曰陛下不聽臣臣自刎頸以血污車輪陛下不得入宗廟矣帝不悅先驅光祿大夫張猛前曰臣聞主聖臣直乘船危從橋安聖主不涉危不履虛御史大夫言可用上曰曉人不當如此乃從橋又曰劉向為宗正時西域都護甘延壽副校尉陳湯矯制發胡漢兵四萬攻郅支單于斬首傳送京師名王已下千五百人一十八級生虜百四十五人降虜千餘人上議其功丞相匡衡石顯等皆以延壽與湯擅興師矯制幸得不誅不宜加爵土上欲從之向乃上疏極諫文多不載於是上乃赦湯與延壽等矯制罪封延壽為義城侯長水校尉湯為關內侯食實封二百戶又曰貢禹字少翁琅琊人纍為諫議大夫時歲不登郡國多困禹乃進諫曰今關東諸道禾稼不稔江淮浙右人民流離父子不保願陛下蠲賦稅常貢減太官之食去角抵諸戲廢不急務役速下詔命以蘇疲人上悅之遷禹為御史大夫禹自治憲司數陳得失又言官家奴婢十餘萬人稅良民以給之率脂膏以滑之歲費巨萬於國無益宜請免為庶人從之又奏武帝始臨天下犯法者贖罪入穀者補吏是以官私俱亂盜賊並起玉石混雜真僞不分今欲興至理致太平宜除贖法以進賢良則天下治矣上大悅行之賜禹錢百萬又曰劉輔為諫議大夫成帝欲立趙婕妤為后輔疏曰今陛下觸情縱欲傾於卑賤之女欲以母天下豈不畏于天乎上怒使掖庭中縛之谷永等上書訟之上乃減死又曰谷永時成帝好微行不止永乃諫曰陛下棄萬乘之至尊樂家人之賤事厭高美之尊號好匹夫之卑業使拱衛之臣執干戈守其空宮使公鄉百寮不知陛下所在忽有變將奈社稷何帝斂容而止又曰耿育關內侯陳湯被讒奪爵黜之燉煌郡育上書諍曰陳湯昔年討絶域不羇之君雪國家纍年之恥自古及今安有比哉今被讒黜老棄燉煌復為遺虜所笑誠可痛哉至今奉使外夷者未嘗不陳以郅支之誅夷以揚漢國之威稜豈可以授人之功棄人之身開幸門路快讒佞者乎帝遂詔湯還京師復舊爵又曰鄭崇字子游高密大族哀帝時為尚書僕射數見諫諍陳得失每奏事嘗曳革履上笑曰我識鄭尚書履聲崇每以董賢貴寵過度陳諫由是得罪上因崇曰君門如市何乃欲禁切主上用人乎崇曰臣門如市臣心如水矣又曰朱雲成帝封諸舅王鳳等五人同日為侯傾壞朝政京兆尹王章以直言見誅安昌侯張禹以依違任事雲為槐里令頗御之乃諫曰今朝廷大臣上不能匡君下不能益人皆尸祿耳不可以事君臣請尚方劍斷佞臣頭一人勵其餘上問曰誰也雲曰張禹上大怒曰小臣居下訕上庭辱師傅罪死不赦御史將下雲攀折殿檻大呼曰臣願得從龍逢比干遊於地下免事桀紂之主死不恨矣將軍辛慶忌叩頭流血極諫得免所司理檻帝曰勿理以旌直臣又曰王宏為侍中哀帝寵董賢為大司馬衛將軍事是時賢年二十二上置酒與賢父親屬宴飲上放酒從容視賢而笑曰吾欲法堯禪舜何如時宏在坐進諫曰昔周成戲以桐葉封弟叔虞於晉周公入曰天子無戲言耳今天下乃高帝之天下非陛下之天下也陛下以藩王入奉嗣孝成皇帝後當承宗廟傳子孫於無窮豈得以戲言將高祖社稷輸人耶上默然不悅終以失旨貶為郎署又曰郅都景帝時為中郎敢直諫面折大臣於朝嘗從上入上林賈姬在廁野彘入廁上目郅都不行上欲自持兵救賈姬都伏上前曰一姬死更一姬進天下所少寧賈姬乎陛下縱自輕奈宗廟太后何上還彘亦不傷賈姬太后聞嘉之賜都金百斤上亦賜金百斤又曰梅福上書諫成帝曰天下民有上書求見者輒使詣尚書問其所言諫可採取者秩以升外斗之祿賜以一束之帛若此天下之士發憤悶吐忠言嘉謀日聞於上天下條貫國家表裏爛然可睹矣又曰哀帝時杜欽諫曰臣聞非仁無以廣施非義無以正身今漢承周秦之弊宜抑文上質表實去僞臣竊有所憂言之怫心逆旨不言則增漸日長為禍不細續漢書曰張子孝平陵人性矜嚴非禮不動遇妻子若嚴君三輔以為儀表人或謂之詐子孝曰我誠詐也人皆詐惡我獨詐善不亦可乎為光祿諫正常乘白馬上每有異政輒言白馬生且復諫矣又曰吳祐字季英陳留人父恢南海太守祐年十二隨恢到官欲以殺青簡寫尚書章句祐諫曰今君踰江湘越五嶺僻在海濱風俗雖陋然多珍玩上為朝廷所疑下為權戚所望此章若成載必兼兩昔馬援以薏苡興謗王陽以衣囊邀名嫌疑之戒願留意焉恢撫其首曰吳氏世不乏季子者後漢書曰陳蕃為太尉桓帝末朝綱失序封賞踰制蕃上疏諫曰臣聞諸侯上象七曜下應九土以藩屏王室高祖非功臣不侯今寵臣以非義受邑左右以無材傳賞守位不料其德列土莫紀其功乃至一門之內侯者數人後宮之中數千采女肉食錦衣脂油粉黛不可勝計鄙諺曰盜不入五女之門以貧人家也今後宮之女豈不以貧人國乎且藂而不御必生憂怨之感以致兵革水旱之因也上知之而不能用為佞所害又曰申屠剛字巨卿茂陵人纍遷尚書令帝嘗欲出遊剛以隴蜀未平不宜宴逸諫不聽乃以頭軔乘輿帝遂止又曰王尊為隗囂將世祖遣來歙往諭之囂不從命而執之欲煞害尊諫曰臣聞為國者慎器與名為家者畏怨重禍慎名器則下服其命輕怨禍則上受其殃今將軍遣子質漢內懷他志名器逆矣而更謀誅其使怨禍結矣古者烈國兵交使在其閒所以兵貴和而不任戰者何況承王命藉重質而犯之哉且來歙雖單車遠使而漢帝之外兄害之無損於彼滅之有害於吾昔宋執楚使者有折骸易子之禍小國猶不辱況萬乘之主乎遂不敢害以禮遣之又曰張敏字伯達河間鄚人纍為尚書建初中有侮辱人父者而子煞之肅宗貸其死刑時定其議敏議曰夫怨生之決宜從上下猶天之四時有生有死若開相容恕著之為定法者則是故設奸萌生長罪隙今欲趨生反開殺路一人不死天下受弊記曰利一害百民去其郭王者承天地順四時法聖人從經律願陛下留意下民考尋利害天下幸甚從之又曰爰延字季平外黃人性質直遷侍中帝遊上林苑從容問延曰朕何如主也對曰為漢中主帝曰何以言之對曰尚書令陳蕃任事即治中常侍豫政則亂是以知陛下可與為善可與為非帝曰嗚呼昔朱雲庭折欄檻今侍中面稱朕過何代無奇人哉敬聞命矣又曰杜根字伯堅潁川人永初元年為郎時和喜鄧后臨朝權在外戚根以安帝年長宜親政事與同舍郎上書直諫太后大怒令盛根於囊殿上武士撲殺之執法者以根素知名私語行事人使不加力既而載出根得蘇太后使人撿覆根詐死三日目中生蛆因得免又曰李雲字行祖甘陵人為白馬令衆災頻降雲素剛直憂國將危乃露布上書直諫帝怒遂下黃門北寺獄五官掾杜衆傷雲以忠諫獲罪上書願與雲同日死詔下廷尉皆死獄中又曰陳琳為丞相府主簿靈帝時朝綱失序政在官官尚書何進謀於袁紹曰昔趙鞅興晉陽之甲誅君側之惡今閽豎弄權可謂蔓草也盍萌而剃之琳諫曰易稱即鹿無虞諺有掩日捕雀夫微物尚不可欺以得志況國之大事其可以詐乎今明公總皇威權兵要龍驤虎步高下在心此猶鼓洪爐而燎毛髮耳夫違經合道天人所慎而反委釋利器更徵外助大兵藂會強者為雄所謂倒持干戈授人以柄功必無成為禍階矣進不聽遂召前將軍太原守董卓卓未至卒為禍亂而進亦為宦官所殺又曰銚期重於信義在朝廷憂國憂主其有不得於心犯顏諫爭帝嘗輕與期門近出期頓首車前曰臣聞古今之戒變生不意誠不願陛下微行數出帝為之回輿而還又曰桓帝時有上書宜改鑄大錢劉陶上議曰伏讀鑄錢之詔平輕重之議蓋以當今之憂不在於貨在於民飢竊見比年以來良苗盡於蝗螟之口杼柚空於公私之求野無青草室如懸磬所急朝夕之餐所患靡監之事豈謂錢之銖兩輕重哉就使當今沙礫化為黃金瓦石變為和玉使百姓渴無飲飢無食雖黃羲之純德唐虞之文明猶不能以保蕭牆之內也蓋人民可百年無貨不可一朝有飢故食為至急也又曰劉陵字孟高豫章人為侍中車駕出祠南郊陵參乘上起早升輿眠陵跪曰陛下為萬乘之主升輿宜正立雖早嚴欲寢不當上為天地靈祇下為百姓觀覩上愧色曰敬受侍中斯言以後為式更自整頓謝承後漢書曰延篤字叔固孝桓皇帝拜侍中自在機密常見進納上數問政事得失以經義古典默諫帷幄言不宣外又曰李膺等黨事下獄陳蕃上疏極諫曰臣聞聖明之君委心輔佐亡國之主諱聞直辭故湯武雖聖而興於伊呂桀紂迷惑亡在失人由此言之君為元首臣為股肱同體相須共成美惡者伏見前司隸校尉李膺太僕社密太尉掾范滂等正身無點死心社稷以忠忤旨橫加考案或禁錮閉隔或死徙非所杜塞天下之口聾盲一世之人與秦焚書坑儒何以為異臣位列台司憂責深重不敢尸祿惜生坐觀成敗如不蒙採録使身首分裂異門而出所不恨也帝諱其言切託以蕃非其人遂策免之又曰陳蕃諫桓帝曰故皋陶戒舜無畋遊周公戒成王無般于遊田虞舜成王猶有此戒況德不及二主者乎夫安平之時尚宜有節況當今之世有三空之危哉田野空朝廷空倉庫空是謂三空加兵戎未戢四方離散是陛下燋心毀顏坐而待旦之時也豈宜揚旗曜武騁心輿馬之觀乎
