body:
  text: 獸部二十貔爾雅曰貔白狐其子豰郭璞注曰一名執夷虎豹之屬豰許卜切說文曰貔豹屬出貉音陌國猛獸也尚書曰如虎如貉如熊如羆毛詩曰獻其貔皮赤豹黃羆禮記曲禮曰前有摯獸則戴貔貅莊子曰豐吸文貔搏於山林伏於岩穴夜行晝居求食江湖之上韓子曰虎貔不用爪牙與鼢鼠同威毛詩草木蟲魚䟽曰貔似虎或曰似熊一名執夷一名白狐其子為豰遼東人謂之熊羆熊說文曰熊獸似豕山居冬蟄詩義䟽曰熊能攀緣上高樹見人則顛倒投地而下冬入穴而蟄始春而出孝經援神契曰赤熊見則姦宄自遠本草經曰熊脂一名熊白味甘微溫無毒主風痺穆天子傳曰舂山百獸所藂也爰有赤豹熊羆六韜曰文王囚羑姜里散宜生受命而行宛懷條塗之山有黃熊得而獻於紂左傳曰晉靈公使宰夫臑熊蹯不熟殺之寘諸畚載以過朝又曰楚子將以商臣為太子令尹子上諫之不聽又欲立王子職而黜商臣商臣以宮甲圍成王王請食熊蹯而死弗聽王縊史記曰趙簡子病不知人五日而寤曰我之帝所見一熊欲援我帝命我射之中熊死有當道者曰帝令主君滅晉二卿熊其祖也漢書曰昌邑王賀在藩帝見熊以問左右左右皆荅不見又曰孝元帝馮昭儀上幸虎圈鬭獸後宮皆坐熊出圈攀檻欲上殿昭儀乃當熊而立及左右格殺熊上問人情驚懼何故當熊昭儀曰夫猛獸得人而止妾恐熊至御坐故身當之耳帝嗟嘆以此倍敬重之淮南子曰誠中之人樂而彶彶急也忠信之人自樂為之非彶彶也如鶚之好聲熊之好經夫有誰為務又曰愛熊而食之鹽愛獺而飲之酒雖欲養之非其道熊食鹽而死獺飲酒而敗故曰非其道也周書王會曰成王時不屠何國獻青熊一孟子曰魚我所欲熊掌亦我所欲二者不可得兼舍魚取熊掌義者我所欲生亦我所欲二者不可得兼舍生取義列子曰黃帝戰於阪泉帥熊貙虎為前驅纏子曰桀王天下酒濁而殺廚人紂王天下熊蹯不熟而殺廚人抱朴子曰玉策記稱熊壽五百歲五百歲則能化瑣語曰晉平公夢見赤熊闚屏惡之而有疾使問子產子產曰昔共工之卿曰浮遊既敗於顓頊自沒沉淮之淵其色赤其言善笑其行善顧其狀如熊常為天王祟見之堂上則止天下者死見堂下則邦人駭見門近臣憂見庭則無傷窺君之屏病而無傷祭顓頊共工則瘳公如其言而疾間魏略曰大秦國出玄熊赤螭建武故事曰咸和七年左右啟以米飴熊上曰此無益而費於穀且是惡獸所不宜畜使遣打殺以肉賜左右直人異苑曰邵陵高平黃秀以元嘉三年入山經月不還其兒根生尋覔蹲空樹中從頭至腰毛色如熊問其何故荅曰天讁如此汝但自去生哀慟而歸踰年人見其形盡為熊矣又曰熊獸藏於山穴穴裏不得見穢及傷殘見則舍穴自死續搜神記曰晉升平中有人入山射鹿忽墮一坎窅然深絕內有數頭熊子須臾有一大熊來入瞪視此人人謂必以害己良久出藏果分與諸子末後作一分著此人前人飢久於是冒死取噉之既轉相狎熊母每旦覔食果還輒分此人人賴以支命後熊子大其母一一負將出子既盡人分死坎中窮無出路熊母尋復還入坐人邊人解意便抱羆之足於是跳出遂得無他又曰熊無穴居大樹孔中東土呼熊為子路以物擊樹云子路可起於是便下不呼則不動也羆爾雅曰羆如熊黃白文郭璞注曰似熊而長頭高腳猛憨多力能拔樹木關西呼為猳羆援神契曰赤羆見姦宄息佞人離則出山海經曰嶓冢之山其獸多羆尚書禹貢曰熊羆狐狸織皮詩曰吉夢維何維熊維羆男子之祥詩蕩韓弈曰獻其貔皮赤豹黃羆毛詩草木蟲魚䟽曰黃羆大如熊脂如熊白而租粗理史記曰趙簡子疾夢之帝所聽鈞天之樂次射殺熊又有一羆來亦殺之天帝甚喜晉書載記曰符健字業洪第三子也初母姜氏夢大羆而孕長而勇果北史曰齊神武遣韓軌司馬子如從河東霄濟華州襲王羆羆不覺比曉眾已乘梯入城羆尚臥未起聞閣外匈匈有聲便袒身露髻徒跣持一白挺大呼而詬曰老羆當道臥貛子那敢過敵見驚退猰窳爾雅曰猰窳類貙虎食人迅走貙勑俱切海內經曰猰窳龍首而虵身人面居於弱水中食人山海經曰少咸之山獸其狀如牛而赤身人面馬足名曰猰窳其音如嬰兒食人淮南子曰堯時猰窳為民害堯乃使羿殺之貙爾雅曰貙似狸郭璞曰今貙虎大於虎豹文如狸山民呼貙虎大者為貙犴搜神記曰江漢之域有貙人其先君之苗裔也能化為虎長沙所屬蠻縣東高居民作檻捕虎得一亭長赤幘大冠在檻中問其故亭長大怒曰昨忽被縣召避雨遂誤入此中於是即出之乃化為虎上山俗云虎化為人好著葛衣其足無踵虎有五指者皆是貙貘爾雅曰貘白豹也郭璞注曰似熊小頭痺腳黑白駮能䑛食銅鐵及竹骨骨節強直中實少髓皮辟濕說文曰貘似熊黃色出蜀廣志曰貘大如驢色蒼白舐鐵消十斤其皮溫煗抱朴子曰劉子知二負之尸東方生識啖鐵之獸實賴鳥禹之書大荒之籍矣神異經曰西荒之中有人焉頭如人著百結敗衣手足虎爪名曰貘㺔音偽伺人獨自輒往就人睡先使捕蝨得臥而舌出槃地丈餘燒大石投舌上於是而死騊駼周書曰正北空桐橐駞騊駼為獻爾雅曰騊駼馬郭璞注曰出山海經其色青說文曰騊駼野馬之良也史記曰匈奴奇畜則騊駼廣志曰騊駼匈奴名馬也山海經曰北海內有獸焉其狀如馬名曰騊駼猩猩爾雅曰猩猩小兒啼今交趾封溪出猩猩狀如貛㹠聲似小兒啼禮記曰猩猩能言不離禽獸春秋說題辭曰猩猩者矜精者也故能言可使陽烈之類以撿下宋均曰矜謂使人自矜在精審也猩猩言說人善惡是陽氣之烈好善王者所以檢下也廣志曰猩猩似狟音丸聲如兒啼不聞其言出交阯封溪縣山海經曰有獸人面名曰猩猩又曰猩猩知人名其為獸如豕而人面山海經讚曰猩猩似狐走立行伏懷木挺刀少辛明目華陽國志曰永昌郡有猩猩能言其血可以染朱罽孫卿子曰猩猩能言笑亦二足無毛而君子啜其羹食其肉故人非以二足無毛以知禮也呂氏春秋曰伊尹說曰肉之美者猩猩之脣淮南萬畢術曰歸終知來猩猩知往注曰歸終猩猩並神獸括地圖曰猩猩人面豕身知人名蜀志曰封溪縣有獸曰猩猩體似豬面似人音作小兒啼聲既能語又知人姓名人知以酒取之猩猩覺初暫嘗之得其味甘而飲之終見羈纓也酈善長注水經曰西蜀封溪縣猩猩人面獸形能言語南方草物狀曰猩猩之獸生在野中狀如㹠子民人捕取交阯武平興古有之晉郭璞猩猩讚曰能言之獸是謂猩猩厥狀似貛號音若嬰自然知往頗測物情狒狒爾雅曰狒狒如人被髮迅走食人說文曰狒狒人身反踵笑即上脣掩其目一名梟羊北方謂之土螻山海經曰狒狒如人面脣黑身有毛反踵見人則笑笑則上脣掩目交廣及南康山中有大者丈餘俗呼為山都山海經圖讚曰狒狒怪獸被髮操竹獲人則笑脣蓋其目終亦號咷反為我戮吳都賦曰猩猩啼而就擒狒狒笑而被格風母十洲記曰炎州有風生獸似豹青色大如猩猩燒之不死斫剌不入以鐵椎鍜其刀頭乃死以其口向風須臾活以石上菖蒲塞其鼻即死取其腦菊華和服之盡卜斤壽五百歲南州異物記曰風母獸一名平猴狀如猴無毛赤目若行逢人便叩頭似如懼罪自乞人若檛打之愜然死地無復氣息小得風吹須臾能起抱朴子內篇曰風生獸似豹青色大如猩猩生南海大林中張取積薪數車以燒之薪盡此獸在灰中不然其毛不燋斫剌不入打之如皮囊以錐鎪其頭數十乃死嶺南異物志風猩如猿猴而小晝日踡伏不能動夜則騰躍甚疾好食蜘蛛蟲打殺以口向風復活唯破腦不復生矣以酒浸愈風疾南人相傳云此獸常持一小杖遇物則指飛走悉不能去人有得之者所指必有獲夷人施罟網既得其獸不復見其杖杖之數百乃肯為人取或云邕州首領甯洄得之洄資產巨萬僮伎數百洄甚秘其事豻說文曰豻胡地野狗也異物志曰豻猨屬頭形正方髮長尺餘皆蒼色犬類似人有所視輒搖頭兩手被髮不爾則覆鄣其兩目衣毛皤皤若披狐裘木居洄藏密向乃得見耳蹶爾雅曰西方有比肩獸與邛邛矩虛比焉其名曰蹶孫子曰北方有獸其名曰蹶前足鼠後足兔是獸也甚矣其愛蛩蛩巨虛也食得甘草必齧以遺蛩蛩巨虛蛩蛩巨虛見人將來必負蹶以走蹶非性心愛蛩蛩巨虛也為假足也二獸者亦非性心愛蹶也為其得甘草而遺之故也
