body:
  text: 人事部七十九烈士禮記曰戰于郎郎魯邑也公叔禺人遇負杖入保者息曰使之雖病也任之雖重也君子不能為謀也士弗能死也不可我則既言矣與其鄰重汪踦往皆死焉重當為童姓汪名踦魯人欲勿殤重汪踦問於仲尼仲尼曰能執干戈以衛社稷雖欲勿殤不亦可乎又曰齊大饑黔敖為食於路以待餓者而食之有餘者蒙袂輯屨貿貿然來黔敖左奉食右執飲曰嗟來食揚其目而視之曰予唯不食嗟來之食以至於斯也從而謝焉終不食而死曾子聞之曰微與其嗟也可去其謝也可食又曰魯莊公及宋人戰于乘丘縣賁父御馬驚敗績公隊賁父曰他日不敗績而今敗績是無勇也遂死之圉人浴馬有流矢在白肉公曰非其罪也遂誅之史記曰齊人或毀孟嘗君於涽王曰將為亂及田甲劫涽王王意之孟嘗乃奔魏前有獲粟於孟嘗之賢者聞之乃上言言孟嘗不作亂請以身為盟遂自剄以明孟嘗涽王乃知孟嘗君果無謀又曰漢高帝既立以田橫兄弟本定齊齊人賢者多附焉今在海中不收後為亂乃使赦罪召之橫乃與其客二人乘傳詣雒陽至尸鄉尸鄉在偃師廄置置馬以傳驛也橫謝使者曰人臣見天子當洗沐因止留謂其客曰橫始與漢王俱南面稱孤今漢王為天子而橫為亡虜北面事之其恥甚矣且吾烹人之兄與其弟比肩而事主縱彼畏天子詔不敢動我獨不愧於心乎且陛下欲見我者不過欲見吾面貌耳今陛下在雒陽斬吾頭馳三十里間形容未敗猶呆觀也遂自剄二客亦自殺從之高帝聞大驚以田橫客皆賢聞其餘五百人在海中使召之至聞橫死又皆自殺是知田橫兄弟皆得士也又曰楚下滎陽生得周苛項王謂苛爾從我我以公為上將軍封三萬戶苛罵曰若不趣降漢漢今虜若若非漢敵也項王怒烹苛又曰李廣從衛青伐匈奴失道後至大將軍使長史急責廣之幕府對簿廣曰校尉無罪乃我自失道謂其麾下曰廣結髮與匈奴大小七十餘戰今幸從大將軍出接單于兵而大將軍又徙廣部行回遠而又迷失道豈非天哉且廣年六十餘矣終不能復對刀筆之吏遂引刀自刎軍士大夫皆哭漢書曰高祖時告趙王張敖反者貫高對曰獨吾屬為之王不知也吏按笞數千刺爇身無完者終不復言廷尉以貫高辭聞上曰壯士誰知者以私問之中大夫泄公曰臣素知此趙國立名義不侵為然諾者也上使泄公持節問之高曰人情豈不各愛其父母妻子哉今吾三族皆巳論死豈以王易吾親哉顧為王實不反獨吾等為之具道本指所以不知狀於是泄公具以報上上乃赦趙王上賢高能自立然諾使泄公赦之告曰張王已出上多足下故赦足下高曰所以不死者白張王不反耳今王已出吾責塞矣且人臣有篡弒之名何面目復事上哉乃仰絕吭而死又曰丞相王嘉數上言不宜封董賢上怒詔嘉詣廷尉詔獄使者至府掾吏涕泣和藥進嘉嘉引藥杯擲地謂官屬曰丞相宰得備位三公奉職負國當伏刑都市以示萬眾豈兒女子耶何謂咀藥而死嘉遂乘吏小車去蓋不冠隨使者詣廷尉二十餘日不食歐血而死又曰田延年有罪霍光使往就獄延年曰幸縣官寬我耳何面目入牢獄使眾人指笑我卒徒唾吾背乎即閉閣獨居持刀東西步聞鼓聲及自刎死范曄後漢書曰趙苞遷遼西太守明年遣使迎母及妻子為鮮卑鈔掠苞率步騎與賊對陣賊出母示苞苞悲號謂母曰為子無狀欲祿奉養朝夕不圖為母作禍母遙謂苞曰人各有命何得相顧以虧忠義昔王陵母向漢使伏劍以固其志爾其勉之苞即時進戰賊悉摧破其母妻皆遇害苞殯歛母畢白上歸葬帝遣策弔慰葬訖苞歐血而死東觀漢記曰溫序字次房為隗囂別將茍宇所劫宇謂序曰子若與我并威同力天下可圖也序素有氣力大怒叱宇等曰虜何敢迫脅漢將因以節撾殺數人賊眾爭欲殺之宇止曰此義士也可賜以劍序受劍銜鬚顧左右曰賊所迫殺無令鬚汙土遂伏劍而死又曰馬援曰方今匈奴烏桓尚擾北邊欲自請擊之男兒要當死於邊野以馬革褁尸還墓耳何能臥床上在兒女子手中耶故人孟冀曰諒為烈士當如此矣又曰永和八年匈奴遣使求和親上遣鄭眾持節使匈奴眾素剛烈至北庭虜欲令拜眾不為屈單于大怒圍守閉之不與水火欲脅服眾眾拔刃自誓單于恐而止又曰漢圍隗囂囂窮困其大將王捷登城呼漢軍曰為隗王城守者皆必死無二心願諸軍亟罷請自殺以明之遂刎頸而死謝承後漢書曰濟陰戎良字子恭年十八為郡門下吏良儀容偉麗太守諸葛豊使閤裏寫書從者誣良與婢通刳腹引出腸肝示豐漢末英雄記曰袁尚使審配守鄴曹操攻之操出行圍配伏弩射之幾中及城陷生獲配操謂曰吾近行圍弩何多也配曰猶恨其少操曰即忠於袁氏不得不爾志欲活之配意氣壯烈終無撓辭遂斬之魏志曰龐涓字子異酒泉人初以涼州從事守破羌長會武威太守張猛反殺刺史邯鄲商猛令敢有臨商喪死不赦涓聞之棄官晝夜奔走號哭喪所訖詣猛猛知其義士遣不殺由是以忠烈聞又曰夏侯惇字元讓沛國譙人夏侯嬰之後年十四就師學人有辱其師者惇殺之由是以烈氣聞又曰大將軍司馬文王斬諸葛誕傳首夷三族誕麾下數百人坐不降見斬皆曰為諸葛公死不恨其得人心如此又曰賈逵初為郡吏守絳邑長郭援之攻河東所經城邑皆下逵堅守援攻之不拔及召單于并軍急攻之城將潰絳父老與援要不害逵絳人既潰援聞逵名欲使為將以兵劫之逵不動左右引逵使叩頭逵叱之曰安有國家長吏為賊叩頭援將斬之絳吏民聞將殺逵皆乘城呼曰負要殺我賢君寧俱死耳左右義逵多為請遂得免韋昭吳書曰頴熙使魏辭意不屈魏留之熙懼見迫乃引刀自刺中乳房上聞嘉之賜鹽米復其國蜀志曰義陽傅彤先主與吳戰退軍彤斷後距戰兵人死盡吳將語彤令降罵曰吳狗何有漢將軍降者遂戰死晉書曰太守陳楚迫韋忠為功曹會山羌攻郡楚攜子走出賊射之中三創忠冒刃伏楚以身捍之泣曰韋忠願以身代君乞諸王哀之亦遭五矢賊相謂曰義士也舍之忠於是負楚以歸又曰辛勉累遷侍中及洛陽陷隨帝至平陽劉聰遣其黃門侍郎喬度齎藥酒逼之勉曰大丈夫豈以數年之命而虧高節事二姓下見武皇帝哉引藥將飲度遽止之曰主上相試耳君貞士也歎息而去習鑿齒晉春秋曰後主將從譙周榮北地王諶怒曰若數窮力屈禍敗必及便當父子君臣背城一戰同死社稷以見先帝可也後主不納遂送璽綬是日諶哭於昭烈之廟先殺妻子然後自殺沈約宋書曰薛安都反傅靈越奔逃為沈慶之軍人所擒厲聲曰我傅靈越也汝得賊何不即殺生送詣何煅煅躬自慰詰其叛逆對曰九州唱義豈獨在我煅又問四方阻逆無戰不擒主上皆加曠蕩即其才用卿何不早歸天闕乃逃命草間乎靈越荅薛公舉兵淮北威震天下不能專任智勇委付子姪敗之由實在於此然事之始末備皆參豫人生歸於一死實無面求活煅壯其意送還京師太宗欲加原宥靈越辭對如一終不回改乃殺之隋書曰張季珣大業末為鷹擊郎將其府據箕山為固與洛口連接及李密翟讓攻陷倉城遣人呼之李珣罵密極口密怒遣兵攻之三年糧用盡士卒羸病不能拒戰遂為所陷季珣曰吾雖為敗軍之將猶是天子爪牙之臣何容拜賊也密壯而釋之翟讓從之求金不得遂殺之時年二十八又曰許善心母范氏梁太子中舍人孝才之女也少寡養孤博學有高節高祖知之勑尚食每獻時新常遣分賜嘗詔范入內侍皇后詣讀封永樂郡君及善心遇禍范年九十有二臨喪不哭撫柩曰能死國難我有兒矣因臥不食後十餘日亦終唐書曰屈突通聞京師平家屬盡沒乃留顯和鎮潼關率兵東下將如洛陽通適進路而顯和降於劉文靜遣副將竇琮段志玄等率精騎與顯和追之及於稠桑通結陣以自固竇琮縱通子壽令往諭之通大呼曰昔與汝為父子今與汝為仇讎命左右射之顯和呼其眾曰京師陷矣汝並命關西人欲何所去眾皆釋仗通知不免乃下馬東南向再拜號哭曰臣力屈兵敗不負陛下天地神祇實所鑒察遂擒通送干長安高祖謂曰何相見晚耶通泣對曰通不能盡人臣之節力屈而至為本朝之辱高祖曰隋室忠臣也命釋之授兵部尚書封蔣國公又曰劉世讓字元欽雍州醴泉人也為定安道行軍總管率兵以拒薛舉戰敗世讓及弟寶俱為舉軍所獲舉將至城下令紿說城中曰大將軍五道已趣長安宜開門早降世讓偽許之因告城中曰賊兵多少極於此矣宜益自固以圖安全舉重其執節終不之害又曰新興王良孫晉先天中為殿中監兼雍州長史甚有威名始封新興王尋附會太平公主伏誅初晉之就誅寮吏皆奔散唯司功李撝徒步不失在官之禮仍哭其屍姚崇聞之曰欒布之儔也擢為尚書郎又曰徐晦由進士第登直言科為櫟陽尉皆自楊憑所薦及憑得罪貶官臨賀縣尉親交無敢祖送獨晦至藍田與憑言別時故相權德輿與憑交分㝡深知晦之行因謂晦曰今日送臨賀誠為厚矣無乃反為累乎晦曰晦自布衣沐楊公之知今日不一送他日相公為奸邪所讚烏可不送相公乎德輿大慚因稱之於人不數日御史中丞李夷簡請為監察晦至之日白夷簡曰晦不由公門公何所取信而見獎拔於千萬人中哉荅曰君送楊臨賀寧肯負國乎由是名益振呂氏春秋曰要離既殺王子慶忌吳王大悅請分國要離曰不可殺妻子焚而揚其灰為不仁為故主殺新主為不義不可以生伏劍而死韓詩外傳曰楚昭王有士曰石奢公正而好直王使為理於是有殺人者石奢追之則其父也還反於庭曰殺人者父也以父成政非孝也不行君法不忠也遂伏鈇鑕曰命在君君曰追而不及庸有罪乎子其治事石奢曰不然死罪而生不廉也君赦之上之惠臣不失法下之義遂不去鈇鑕而死乎庭中會稽典錄曰魏朗字少英會稽人靈帝即位竇武陳蕃等欲誅宦官謀泄反為所害朗以黨被徵乃慷慨曰丈夫與陳仲舉李元禮俱死得非乘龍上天乎於丹陽牛渚自殺海內列名八俊張鄢文士傳曰陸機為大都督請孫承為司馬成都王既害機兄弟收承付刺奸獄考掠千餘兩踝骨見終不自誣獄吏知承烈士諫承曰二陸之痛誰不知枉君何不惜身乎承乃仰而歎曰吾亡不能濟死而相誣非吾徒也獄吏作承服辭謀反狀成都乃下令夷承三族劉世叔異苑曰潯陽周虓字孟威寧康中鎮于巴西為符堅所獲守節不屈堅使使清道虓躬治達陌謂使者云煩君語氐賊符堅何至取國士如此堅聞之曰貉子正欲覔死殺之適足成其名耳及苦加栲楚不食而卒堅怒猶未歇剖棺臨視虓欻運眸齗何斤反齒鬚鬢張列精暗明亮廻盼矚堅乃厚加賵贈劉向新序曰崔杼弒莊公申蒯漁於海而後至將入死其御止之曰君之無道聞於天下不可死也申蒯曰告我晚子不早告我吾食亂君之食而死治君之事乎子勉之子無死其御曰子有亂主猶死之我有治長奈何勿死至於門曰申蒯聞君死請入守門者以告崔子曰勿內申蒯曰汝疑我乎吾與汝臂乃斷其臂以予其門者門者以示崔子崔子陳八列曰令入申蒯拔劍呼天三踊乃鬭殺七列未及崔子一列而死其御亦死之門外君子聞之曰蒯可謂守節死義矣又曰白公勝欲殺楚惠王出亡令尹司馬皆死勝拔劍而屬之矜屈盧曰子與我舍子不與我將殺子屈盧曰詩有之曰莫莫葛藟肄于條枚愷悌君子求福不回今子殺子父而求福於盧也可乎且吾聞之知命之士見利不動臨死不恐為人臣者時生則生時死則死是謂人臣之禮故上知臣道其有可劫乎胡不推之白公勝乃入其劍又曰白公勝既殺令尹司馬欲立王子閭以為王王子閭不肯劫以刃王子閭曰王孫輔相楚國扶正王室后自庇焉閭之不願也今子假威以暴王室殺伐以亂國家吾雖死不子從也白公強之不可遂殺之常琚華陽國志曰張飛攻破巴郡獲將軍嚴顏謂曰大軍至何以不降敢逆戰乎顏對曰卿等無狀侵奪我州但有斷頭將軍無降將軍也飛怒曰牽去斫頭顏正色曰斫頭便斫何為怒也飛義之引為賓客又曰章明字公儒繁人王皓字子離江夏人也明為太中大夫莽篡位歎曰不以一身事二主遂自殺皓為美陽令去莽歸蜀公孫述僣號高之使聘之皓乃自刎以頭付使者述慚怒誅其妻子又曰李業字巨遊梓潼人少執志清白太守到咸慕其名辟為功曹十命不詣咸怒欲殺之業徑詣獄咸釋之公孫述累徵聘不應述怒遣鴻臚尹融持藥酒逼業業笑曰名可成不可毀身可殺不可辱遂飲藥死述恥殺善士贈錢百萬子舋逃匿不受建武中察孝廉
