body:
  text: 飲食部五食上周禮天官膳夫曰膳夫掌王之食膳羞以養王及后世子羞有滋味凡王之饋食用六穀膳用六牲飲用六清羞用百二十品珍用八物醬用百有二十罋王日一舉鼎十有二物皆有俎以樂侑食膳夫用祭品嘗食王乃食又曰王齊則玉府供玉食鄭玄注曰玉陽之精御水氣也鄭司農云食玉犀也又天官食醫曰掌和王之六膳百羞百醬八珍之齊凡食齊視春時飲宜溫羹齊視夏時羹宜熱醬齊視秋時醬宜涼飲齊視冬時飲宜寒凡和春多酸夏多苦秋多辛冬多鹹調以滑甘凡會膳食之宜牛宜稌羊宜黍豕宜稷犬宜梁鳥宜麥魚宜苽凡君子之食恆放焉又曰內饔掌王及后世子膳羞之割烹煎和之事辨體名肉物辨百品味之物割肆解由也烹煮也煎和成數選百羞醬物珍物以侯饋先進其中御者共后及世子之膳羞膳夫掌之又曰小宰凡朝覲會同賓客以牢禮之法掌其牢禮委積膳獻飲食賓賜之餐牽與其陳數又曰大宗伯以飲食之禮親宗族兄弟大戴禮曰食穀者必智惠而巧禮記曲禮上曰侍食於長者主人親饋則拜而食主人不親饋則不拜而食共食不飽無流啜鄭玄注曰流啜有似貪也無咤食咤陟嫁切毋囓骨毋反魚肉毋投與狗骨毋固獲飲自得曰固爭自取曰獲毋刺齒又曰凡進食之禮左殽右胾食居人之左羹居人之右皆便食也殽骨體也胾切肉也食飯屬也居之左右明其近也殽在俎胾在豆膾炙處外醯醬處內殽胾之外內也近醯醬者食之主膾炙皆在豆也葱㳿處末㳿蒸葱也處醯醬之左言末者殊加也在豆酒醬處右處羹之右此言若酒若漿耳兩有之則左酒右醬也以脯修置者左朐右末亦便食也屈中曰俱其俱切又曰齊大飢黔敖為食於路以待餓者而食之有餓者蒙袂輯屨貿貿然來黔敖左奉食右執飲曰嗟來食揚其目而視曰子唯不食嗟來之食以至於斯也從而謝之終不食而死風俗通曰齊人不食而死也又曰食於有喪者之側未嘗飽也助哀戚也又曰庶人春薦韭夏薦麥秋薦黍冬薦稻韭以卯麥以魚黍以豚稻以鴈庶人無常牲取與新物相宜而已又曰文王之為太子朝於王季日三食上必在視寒暖之節在察也食下問所膳問所食者命上宰曰未有原應曰諾然後退未猶物也原再也勿有所再進為其失飪臭味惡也退久其寢也又曰朝夕之食上世子必在視寒暖之節食下問所膳羞必知所進以命膳宰然後退羞必所進必知親所食也若內豎言疾則世子親齊玄而養親猶自也養疾者齊玄冠玄端也膳宰之饌必敬視之疾者之食齊和所欲或異疾之藥必親嘗之試毒也嘗饌善則世子亦能食善謂多於前嘗饌寡世子亦不能飽又不及武王一飯再飯又曰古者未有火化食草木之實鳥獸之肉飲其血茹其毛後聖有作然後修火之利以炮以燔以烹以炙以為醴酪又曰夫禮之初始諸飲食其燔黍捭豚捭卜麥切汙尊而杯飲汙鳥莘切杯步侯切蕢桴而土鼓蕢苦對切猶若可以致其敬於鬼神言其物雖質略有齊敬之心則可以薦羞於鬼神鬼饗德不饗味也又曰天子一食諸侯再大夫三又曰不食雛鱉狼去腸狗去腎狸去正脊兔去凥狐去首豚去腦魚去乙鱉去醜皆為不利人也又曰膳目諸膳也膷臐曉膷音香臐許云切曉許堯切牛炙醢牛胾醢牛膾羊炙胾醢豕炙醢豕胾芥醬魚膾雉兔鶉鷃此上大夫之禮庶羞二十豆也以公食大夫禮饌校之則曉牛炙間不得有醢醢衍字也又以鷃為鴽也玉藻曰侍食於先生異爵者後察先飯謙也客祭主人辭曰不足祭也祭者盛食人饌也客餐主人辭以疏飱者之言粗也又曰父命呼唯而不諾手執業則投之食在口則吐之又曰若賜之食而君客之則命之祭然後祭雖見賓客猶不敢備禮也侍食則正不祭也先飯辨嘗羞飲而俟侯君食而後食之患也將食臣先嘗孝也若有嘗羞者則俟君命之食然後食飯飲而俟不祭侍食不嘗羞膳敢備禮也不飯飲利寧存也將食也君命之羞羞近者辟貪味也命之品嘗之然後唯所欲必先編嘗之凡嘗遠食必順近食從近如也君未覆手不敢飧覆手食也以循咡已飧勸食也君既食又飯飧不敢先君飽飯飧者三飯也臣勸君奴如是可食也君既徹執飯與醬乃出授從者食於尊前親徹也凡侑食不盡食於人不飽謙也又學記曰雖有嘉肴弗食不知其旨也雖有至道弗學不知其善也旨美也又雜記曰孔子曰吾食於少施氏而飽少施氏食我以禮言貴其以禮待己而為之飽也時人倨慢若季氏則不以禮矣少施氏魯惠公子施父之後吾祭作而辭曰疏食不足祭也吾飧作而辭曰疏食也不敢以傷吾子納幣一束束五兩兩五尋又坊記曰故食禮主人親饋則客不祭故君親饋則客不祭故君子茍無禮雖美不食焉左傳曰晉公子重耳過衛衛文公不禮焉出於五鹿五鹿鄖地乞食於野人與之塊公子怒欲鞭之子犯曰天賜也得士有天賜稽首受而載之又曰楚伐庸出師旬有五日百濮乃罷濮夷無屯聚見難則散歸自廬以往振廩同食往往伐庸也振發也廩倉也同食上下無異饌也又曰初宣子田於首山舍于翳桑田獵也桑桑之多蔭翳者首山在河東浦板縣東南見靈輒餓問其病曰不食三日矣食之舍其半問之曰官三年矣官學也未知母之存否今近焉去家近請以遺之使盡之而為之簞食與肉簞笥也置諸橐以與之既而與為公介靈輒為公甲士倒戟以禦公徒而免之問其故對曰翳桑之餓人也問其名居問所居不告不退不望報也遂自亡也輒亦去又曰諸侯之師次于鄭西我師次于督楊不敢過鄭督鄭楊也子叔聲伯使叔孫豹請逆于晉師為食於鄭郊師逆以至聲伯戒叔孫以必須所逆晉師至乃食聲伯四日不食以待之食使者使者豹之介而後食言其忠也又曰晉侯合諸侯楊干亂行魏綘戮其僕晉侯以綘為能以刑佐民矣反役與之禮食使佐新軍群臣族會禮食也又曰衛獻公戒孫文子寧惠子食勸戒二子欲共宴食皆服而朝日旰不召而射鴻於囿二子從之不釋皮冠而與之言二子怒又曰魏獻子為政以魏戊為梗楊大夫梗楊人有獄魏戊不能斷以獄上上魏子也其太宗賂以女樂訟者大宗魏子將受之戊謂閻沒汝寬二人魏子大夫曰主以不賄聞於諸侯若受梗楊人賄莫甚焉吾子必諫皆許諾退朝待於廷魏子朝君退而待於魏子之庭饋入召之召大失食比置三歎既食使坐魏子曰吾聞諸伯叔諺曰唯食忘憂吾子置食之間三歎何也同辭而對曰或賜二小人酒不夕食或他人也言飢也饋之始至恐其不足是以歎中置自咎曰豈將軍食之而有不足是以再歎及饋之畢願以小人之腹為君子之心屬厭而已屬足小人腹飽知足也言君子之心厭宜亦然獻子辭梗楊人又曰叔孫穆子食慶封慶封汜祭有余示有所先也汜祭遠散所祭不共穆子不說使工為之誦芧鴟工樂師芧鴟逸詩刺不敬亦不知又曰晉悼夫人食與人之城祀者與衆也城祀在往年綘縣人或年長矣無子而往與於食又曰華亥與其妻必盥而食所質公子者後食公與夫人每日必適華氏食公子而後歸又曰昔闔廬在國天有菑厲親巡孤寡而共其乏困在軍熟食者分而後敢食必須軍士皆分熟食不敢先食分猶編也其所嘗者卒乘與焉所嘗甘珍非常食又曰衛侯為虎幄於藉圃於藉田之圃新造幄幕皆以虎獸為飾成求令名者而與之始食焉太子請使良夫以良夫應為令名良夫乘衷甸兩壯衷甸一轅鄉車紫衣狐裘紫衣君服至袒喪不釋劍而食食而熱故偏袒亦不敬太子使牽以退數之以三罪而殺之又曰左師每食擊鍾聞鍾聲公曰夫子將食詩曰民之失德乾餱以餱食也箋云德言過乎又曰民之質矣日用飲食質成又生民曰克岐克嶷以就口食韓詩外傳曰子夏過曾子食之子夏曰不為公費乎曾子曰有三費飲食不在其中少而學長而忘之一費事君而輕負久交中絶三費舜典曰咨十有二牧曰食哉惟時王肅注曰食哉者所以重之民又洪範曰八政一曰食又曰惟辟玉食孔安國曰玉食美食周書曰甘食美衣使長貧尚書大傳曰八政何以先食食者萬物之始人之所本者也易曰雲上於天需君子以飲食宴樂需飲食之道也九五需于酒食貞吉又曰噬嗑食也頤中有物曰噬嗑又曰山下有雷頤君子慎言語節飲食論語曰一簞食一瓢飲人不堪其憂回也不改其樂又曰齊必變食居必遷坐食不厭精膾不厭細肉雖多不使勝食氣食不語寢不言雖蔬食菜羹瓜祭必齊如也史記曰張蒼嘗被刑王陵救免之蒼常德陵後為丞相洗沐常先朝陵夫人上食然後敢歸家又曰韓信從下鄉南昌亭長寄食數月亭長患之乃晨炊蓐食時信往不為具食信亦知其怒竟絶乃釣城下一漂母飯信竟漂數十日信喜謂漂母曰吾必有以重報母母怒曰丈夫不能自食吾哀王孫而進食豈望報乎又曰景帝居禁中召條侯周亞夫賜食獨置大胾無切肉又不置箸條侯心不平顧謂尚席取著景帝視而笑曰此不足君所食乎條侯免冠謝又曰東方朔詔賜之食於前飯已盡懷其餘肉持去衣盡汙古史考曰始有燔炙人褁肉燒之曰炮故食取名焉及神農時民食穀釋米加于燒石之上而食及黃帝始有釜甑火食之道成戰國策曰蘇秦之楚三月乃得見王談卒辭行楚王曰先王不遠千里而臨寡人曾弗肯留願聞其說對曰楚國食貴於玉薪貴於桂謁者難見於鬼王難見於帝今令臣食玉炊桂因鬼見帝其可得乎漢書曰陸賈勸陳平與太尉綘侯和以謀諸呂平乃以奴婢百人車馬五千乘錢五百萬遺賈為飲食資又曰萬石君時賜侯食於家必稽首俯伏而食如在上前子孫有過對案不食又曰有司劾竇嬰矯先帝詔棄市嬰陽病不食欲死或聞上無意殺嬰復食也又曰昌邑王在喪詔太官上乘輿食如故食監奏未釋服未可御故食也又曰鮑宣上書曰陛下擢臣岩穴誠冀有益毫毛豈徒欲臣美食大官重高門之地哉晉灼曰高門殿名也又曰太師孔光聖人之後先師之子德行純淑賜飧十七物服虔曰食具十七動物也續漢書曰靈帝數遊於西園令後宮采女為客舍主身為商賈行至客舍采女下酒因共飲食東觀漢記曰光武過鄧禹營禹進炙魚上大餐啖百姓聚觀皆言劉公真天人也又曰汝郁字叔異陳國人年五歲母疾不能飲食郁亦不肯食宗親共奇之因名曰異又曰趙孝字長平建武初天下新定穀食尚少孝得穀炊熟令弟禮夫妻使出比還孝夫妻共茹蔬菜禮夫妻來歸告言已食輒獨飯之積久禮心怪疑後掩伺見之亦不肯後出遂共蔬食兄弟怡怡鄉里歸德又曰梁鴻少孤以幼童詣太學受業治詩禮春秋常獨止不與人同食又曰明德皇后既處椒房太官上飯纍肴膳備副重加幕覆輒徹去譴勑令與諸舍相望也謝承後漢書曰茅容字季偉陳留人與等輩避西樹下衆皆箕踞相對容危坐愈恭郭林宗見而奇之共與言因請寓宿旦日容殺雞為黍林宗謂為己設既而以供其母自以菜蔬與林宗同飯林宗起拜之曰卿賢乎哉因勸令學卒以成德也後列曰董宣為洛陽令殺胡陽公主奴帝怒欲殺宣後原之勑令詣太官賜食宣受詔出飯盡覆杯食按上太官以狀聞上問宣宣對曰臣食不敢遺餘如奉職不敢遺力又曰帝愍竇融年衰遣中常侍中謁者即其臥內強進酒食又曰趙咨躬率子孫耕農為養盜嘗夜往劫之咨恐母驚懼乃先至門迎盜因請為設食謝曰老母八十疾病須養居貧朝夕無儲乞少置衣糧妻子物餘一無請盜皆慚歎跪而辭曰所犯無狀于暴賢者言畢奔出咨追以物與之由此益知名又曰郅元義父伯考為尚書僕射元義還鄉里妻留事姑甚謹姑憎之幽閉空室節其飲食羸困妻終無怨言後伯考怪而問之時義子朗年數歲言母不病但苦飢耳又曰韓卓字子助臘日奴竊食祭其先卓義而免之又曰延熹末黨事將作袁閎遂散髮絶代欲投跡深林以母老不宜遠遁乃築土室四周於庭不為戶自牖納飲食而已魏志曰典韋好酒食飲啖兼人每賜食於前大飲長啜左右相屬人益乃供太祖壯之又曰漢末中常侍唐衡弟為京兆虎牙都尉入謁尹尹欲修主人勑外為市買功曹趙息啓云左悺子弟來為虎牙非德選不足為持酤買宜隨中舍菜食而已魏志曰文帝為太后弟康起第成太后至第請諸家外親設下廚無異膳太后左右菜食粟飯無魚肉其儉約如此也又曰扈纍者嘉平中年八十九歲若六七十者縣官以孤老日給廩五升五升不足食頗行傭作以裨之糧盡復出人與不敢食不求美衣弊縕故後一二年病亡又曰諸葛亮出斜谷與司馬宣王對壘宣王見亮使唯問其寢食及其事之繁簡戎事使對曰諸葛公夙興夜寐二十罰已上皆親覽焉所啖食不至數升宣王曰亮體斃矣其能久乎又曰沐並字德信河間人也少孤苦袁紹父子時始為吏名有志介嘗過姊為殺雞炊黍而不留也正始中為三府長史時吳使朱然諸葛瑾攻圍樊城遣船兵於峴山東斫材牂牁人兵作食有先熟者呼後熟者言其食來後熟者答言不也呼者曰欲作沐德信耶其名流布播於異域如此雖自華夏不知者以為前世人江表傳曰南陽樊胄為武昌部從事誘導諸夷叛屬劉備孫權召問潘濬濬曰以五千兵往吳擒矣權曰卿何以輕之濬曰胄昔為州人設饌比至日中食不可得而十餘自起此亦侏儒觀一節之驗權即遣將五千兵往果平武昌吳志曰步騭字子山世亂避難江東單身窮困與廣陵衛旌同年相善俱以種爪自給晝勤四體夜誦經傳會稽焦征羌郡之豪族人客放縱騭與旌寄食其地懼為所侵乃共修刺奉瓜以奏征羌方內臥駐之移時旌欲去騭止之曰本所以來畏其強也今舍去欲以為高祗怨耳良久征羌聞牖見之身隱几坐帳中設席致地坐騭旌於牖外旌愈恥之騭辭色自若征羌身自亨大案殽膳重沓而小盤飯與騭旌唯菜茄而已旌不能食騭極飲致飽乃辭出旌怒騭曰能忍此乎騭曰吾等貧賤是以主人以貧賤遇之固其宜也當何所恥蜀志曰漢獻帝舅車騎將軍董永辭帝受帝衣帶中密詔當誅曹公先主是時與曹公從容曹公謂先主曰天下英雄唯使君與操耳本初之徒不足數也先主食失匕箸又曰關羽嘗為流矢所中貫其左臂後瘡雖愈每陰雨痛醫曰矢鏃有毒毒入于骨當破臂作瘡刮骨去毒然後此患乃除耳羽便伸臂令醫鑿之時羽適請諸將飲食相對臂血流離盈於盤器而羽割炙引酒言笑自若
