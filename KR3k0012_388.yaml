body:
  text: 人事部二十八黑子漢書曰高祖左股有七十二黑子又賈誼傳曰今淮陽之北大諸侯僅如黑子之著面不足以有所禁禦范曄後漢書曰黃昌字聖真遷蜀郡太守昌初為州書佐其婦寧於家遇賊被獲遂流轉入蜀為民妻其子犯事乃詣昌訟昌疑母不類蜀人因問所由云本會稽黃昌妻也嘗為賊所掠至此昌驚曰何以識黃昌邪曰昌左足心有黑子常自言當至二千石昌乃出足示之因相持泣還為夫妻楚國先賢傳曰來陽顧紹字伯蕃年十八為郡門下幹迎太守許荊視荊跖下而笑荊怒問之紹曰見明府跖下有黑子紹足亦有之欣而故笑汗説文曰汗身液也釋名曰汗𣵡也出其衣𣵡𣵡然易渙卦曰渙汗其大號史記曰穌秦説齊王曰臨淄舉袂成帷揮汗成雨東觀漢記曰光武詔曰平陽丞李善稱故令范遷於張堪令人面熱汗出其賜堪家雜繒百匹以表廉吏獻帝傳曰舊儀三公領兵見令虎賁執刃扶之曹操顧左右汗流背自後不敢復朝請江表傳曰孫權即尊位請會百官歸功周瑜張昭舉笏欲褒贊功德未及言權曰如張公計今已乞食矣昭大慚伏地汗出魏志曰初太和中中護軍蔣濟上疏宜遵古封禪詔曰聞濟斯言使吾汗出流足王隱晉書曰華表字偉容平原高唐人侍中石苞朝出表問國家何如苞曰武帝更生也表聞汗出沾背晉書曰大司馬桓溫來朝頓丘新亭召侍中王坦之吏部尚書謝安石將害之坦之恐將欲出奔謝安止之曰晉祚存亡在此一行君何所逃既見溫坦之前大懼蒼惶倒執手板汗流沾衣安石後至從容高視良久坐定謂溫曰安聞諸侯有道守在四方明公何須壁後置人溫笑曰不能不爾遂卻兵歡語移日而罷續晉陽秋曰桓玄嘗詣會稽王道子道子已醉對玄張眼屬四坐云桓溫作賊玄見此辭勢難測伏席流汗長史謝重斂板正色曰故大司馬公廢昏立明功全社稷風塵之論宜絶聖聽唐書曰張又新等搆李紳貶端州司馬朝臣表賀又至中書賀宰相及門門者止之曰請少留緣張補闕在齋內與相公談俄而又新揮汗而出旅揖群臣曰端溪之事又新不敢多讓人皆辟易憚之淮南子曰今夫徭者揭钁鍤負籠土徭役也籠受土籠也鹽汗交流喘息薄喉白汗鹹如鹽故曰鹽風俗通曰傳曰后稷觸冬墾田流汗而種田不生者人力非不至天時不與世説曰鍾育鐘會少有令譽年十三魏文帝聞之召見問育曰卿何汗曰戰戰惶惶汗出如漿復問會卿何不汗對曰戰戰栗栗汗不敢出又曰桓公既廢太宰父子仍上表欲除之簡文手答書云所不忍言況過於言桓又重表簡文復手答云若使晉祚靈長明公便應奉行此詔若大運去矣請避賢路桓公讀詔手戰汗流於此而止語林曰何晏美姿容明帝見之謂其傅粉賜之湯餅晏食之汗出流面以巾拭之色轉皎然揚雄長楊賦曰高祖鞮鍪生蟣虱甲胄被沾汗左思齊都賦序曰連衽有雲覆之陰揮汗有雨灑之濡又吳都賦曰流汗霡霂則中逵泥濘司馬遷書曰每念斯恥汗未嘗不發背沾衣唾説文曰唾口液也左傳文下曰晉文公獲秦三師文羸請之先軫朝問秦囚公曰夫人請之吾舍之矣先軫怒曰武夫力而拘諸原婦人暫而免諸國隳軍實而長寇讎亡無日矣不顧而唾史記曰孟嘗既廢而復用馮歡迎之未到孟嘗君太息曰文嘗好客遇客無所敢失文一日廢皆背文而莫顧文者如復見面文必唾面戰國策曰趙太后新用事秦急攻之求於齊曰必以長安君為質兵乃出大臣強諫太后謂左右曰復言長安君為質者老婦必唾其面沈約宋書曰僕射謝景仁性矜嚴整潔居宇清麗每唾左右人衣事畢即聽浣濯每欲唾左右爭來受之趙書曰石虎娉崔氏為夫人無寵所愛鄭夫人有百日女病謂崔與藥以告後石虎作威問之崔言外舍見小子以少唾其容作實非藥也後石乃射之一箭通中而死秦記曰符朗渡江嘗與朝士宴集時賢並機蓐壺席朗欲誇之唾則令小兒跪而張口就唾而含出坐者為不及之遠矣呂氏春秋曰齊莊公之時有士曰賓卑藂夢有壯士白縞之冠練布之衣素屨黑劍從而叱之唾其面惕然而寤徒夢也終坐不決明日召其友而告之曰吾少好勇無所挫辱今夜辱吾將索之得之則可不得將死每朝立于衢三日不得退而自刎又曰伍員出奔過鄭問許公許公東向唾員知所歸矣乃奔吳莊子曰蚿謂蛇日子見夫唾者乎噴則大者如珠小者如霧雜而下者不可勝數也風俗通曰彭祖壽年八百歲猶恨唾遠周生列子曰人君其尊重矣音聲振於金玉咳唾甘於醴泉九州春秋曰公孫瓚曰始天下兵起吾謂其唾掌可決樊英別傳曰樊英既見陳畢西南向唾天子問其故對曰成都今日失火後蜀郡太守上火災言時雲雨從東北來故火不為害列仙傳曰丁次卿欲還峨眉山語主人云當相為作漆以罌十枚盛水覆口從唾之一日乃發皆成漆神仙傳曰樊夫人者劉綱妻也俱行道術各自言勝綱唾盤中水即成鯉魚夫人唾盤中水成獺食魚與試術事事不如述異記曰有人乘船從下流還縣有一人通身黃衣擔兩籠黃瓜求寄載之黃衣人乞食船主與之船適至岸下仍唾盤上徑上岸直入去船主取向食器視之見盤上唾悉是黃金列異傳曰南陽宗定伯年少時夜行逢鬼問鬼所忌鬼答云唯不喜人唾伯便擔鬼著頭上急持行之徑至市中下著地化為一羊賣之恐其變化唾之得錢五千幽明録曰漢武帝在甘泉宮有玉女降嘗與武帝圍碁相娛女風姿端正帝密悅乃欲逼之玉女唾帝面而去遂病瘡經年故漢書云避暑甘泉宮此其時也趙一嫉邪賦曰勢家多所宜咳唾自成珠披褐懷金玉蘭蕙化為芻洟淚説文曰洟鼻液也周易離卦曰六五出涕沱若戚嗟若吉毛詩邶柏舟曰之子于歸遠送于野瞻望弗及泣涕如雨又谷風大東曰眷言顧之潛焉出涕禮記檀弓上曰孔子合葬於防封之崇四尺孔子先反門人後雨甚至孔子問曰爾來何遲也曰防墓崩孔子泫然流涕曰吾聞之古不修墓又曰孔子至衛遇舊館人之喪入而哭之哀出使子貢脫驂而賻之子貢曰脫驂於舊館無乃已重乎夫子曰豫向者入而哭之遇一哀而出涕豫惡夫涕之無從也小子行之又曰將軍文子之喪既除喪而後越人來吊主人深衣練冠待于廟垂涕淚又內則曰父母唾洟不見輒刷去之左傳襄四曰孟孫卒臧孫入哭甚哀多涕出其御曰孟孫之惡子也而哀如是季孫若死其若之何公羊傳哀公曰西狩獲麟孔子曰孰為來哉孰為來哉反袂拭面涕沾袍何休注曰袂衣襟史記曰蘇秦説鬼谷先生淚下沾襟東觀漢記曰來歙蓋延攻公孫述蜀人大懼使客剌歙未死馳告蓋延延見歙悲哀不能仰視歙叱曰欲屬以軍事而乃效兒女之涕泣乎又曰更始害齊武王光武飲食語笑如平常獨居輒不御酒肉枕席有涕泣處蕭子顯齊書曰魚復侯子嚮字雲音世祖第四子也死時年二十二上鄰子向死後遊華林見猿對樹跳子鳴上留目久之因嗚咽流涕崔鴻後燕録曰秦官人光祚先入晉晉以祚為河北郡至是來歸慕容垂見祚流涕曰秦主知我理深吾事之亦盡淮南之敗吾效忠節每思疇昔之顧未嘗不中霄忘寢祚亦歔欷又曰慕容熙符后卒制百寮於宮內設位哭令沙門素服使有司按檢哭者有淚以為忠孝無則罪之於是群臣振懼莫不含辛以為淚焉尸子曰曾子每讀喪禮淚下沾襟又曰費子陽謂子思曰吾念周室將滅涕泣不可禁也子思曰然今一人之身憂世之不治而涕泣不禁是憂河水濁而泣清也邴原傳曰原五幼孤過學舍而泣師曰何泣原曰孤者易感夫學者皆有父母也一則顯其不孤二則顯其學故惻然涕零師哀原曰欲書取書不須費也管寧別傳曰寧身長八尺龍顏秀目每祭未嘗不伏地流涕三齊略曰鄭司農常居其城南山中教受黃巾亂乃遣生徒崔琰諸賢於此揮涕而散所居山下草如薤葉長尺餘堅紐異常時人各為康成書帶世説曰晉元帝過江飲酒王茂弘與帝有舊流涕諫之帝許之從是遂斷語林曰王太保作荊州有二兒亡一兒還葬舊塋一兒留葬太保垂涕曰不忘故鄉仁也不戀本土達也唯仁與達吾二子有焉素問曰肝液為淚欠釋名曰欠嶔也開張其口脣嶔嶔然説文曰欠張口出氣也禮記曲禮曰侍坐於君子君子欠伸撰杖屨視日之蚤暮侍坐者請出矣又內則曰在父母舅姑之所不敢欠伸跛倚睇視宋元嘉起居注曰尚書僕射孟顗於後堂勑見亢聲大欠有違儀禮被劾詔無所問嚏釋名曰嚏聲乍嚏而出也毛詩衛風曰寤言不寐願言則嚏禮記月令曰季秋行夏令則人多齀嚏又內則曰在父母舅姑之所不敢噦噫嚏咳也噦於越切噫於界切咳開代切
