body:
  text: 職官部二十中書舍人六典曰中書舍人掌侍奉進奏參議表章凡詔旨制勑及璽書冊命皆按典故起章草進畫既下則署而行之其禁有四一曰漏泄二曰稽緩三曰違失四曰忘誤所以重王命也制勑既行有誤則奏而正之通典曰自永淳以來天下文章道盛臺閣髦彥無不以文章達故中書舍人為文士之極任朝廷之盛選諸官莫比焉晉中興書曰劉起遷中書舍人時臺省初建內外多事出內書命以忠慎稱加以治身清苦衣不重帛每上所賜皆固辭曰凡陋小臣橫竊賞賜無德而祿殃咎必至上益嘉焉又曰徐邈字仙民東莞姑幕人也少好學問尤善經傳時烈宗始覽典籍招延禮學之士謝安舉選補中書舍人在西省撰正五經音訓學者宗之每預顧問輒有獻替多所補益烈宗甚愛之齊書曰永明元年熒惑入紫微時中書通事舍人四人各住一省謂之四戶既揔重權勢傾天下會玄象失度太史奏宜修福禳之太尉王儉謂帝曰天文乖忤此由四戶乃具舍人王文明等名奏之又曰明帝踐阼引傅昭為中書舍人時居此職者皆權傾天下昭獨廉靜無所干預器服率略身安粗糲常插燭板床明帝聞之賜漆合燭槃勑曰卿有古人之風故賜卿古人之物又曰茹法亮久為中書通事舍人後出為大司農中書勢利之職法亮戀之垂涕而去梁書曰裴子野以中書侍郎鴻臚常兼中書通事舍人別勑知詔誥南史曰顧協為舍人同官者皆潤屋協在省十六載器服食飲不改於常有門生始來事協知其廉潔不敢厚餉止送錢二千協發怒杖二十因此事者絶於饋遺北齊書曰荀士遜世祖時為中書舍人狀貌甚醜以文辭見用曾有事須奏值世祖在後庭因左右傳通者不得士遜姓名乃云醜舍人世祖曰必士遜也看封題果是內人莫不欣笑又曰顏之推天保末從顯祖至天池以為中書舍人令中書郎假孝信將勑書出示之推之推營外飲酒孝信還以狀言顯祖仍曰且停由是遂寢北史曰魏收兼中書舍人與溫子升邢子才齊譽世號三才隋書曰虞世基拜內史舍人煬帝即位顧遇彌隆祕書監河東柳顧言博學有才罕所推謝至是與世基相見歎曰海內當共推此一人非吾儕所及也唐書曰貞觀中中書舍人高季輔上封章曰時巳平矣功巳成矣然而刑典未措者何哉良由謀猷之臣不弘簡易之政臺閣之吏昧於經遠之道執憲者以深刻為奉公當官者以侵下為益國未有坦平恕之懷副聖明之旨伏願隋方訓誥使各楊其職人敦朴素俗革澆浮家識孝慈人知廉恥杜其利欲之心載以清淳之化自然家富國肥禍亂何由而作太宗善之特賜鍾乳一劑曰卿進藥石之言故以藥石報之也又曰顏師古遷中書舍人專掌機密于時軍國多務凡有制誥皆成其手師古達於政理冊奏之工時無及者又曰武后天授元年壽春郡王成器兄弟五人初出閣同日受冊有司撰儀注忘載冊文及百寮在列方知闕禮宰臣相顧失色中書舍人王劇立召小史五人各令執筆口授分寫同時須臾俱畢詞理典贍時人歎伏又曰景龍四年初定內難唯中書舍人蘇頲在太極殿後文詔填委動以萬計手操口對無毫氂差誤主書韓禮談子陽轉書詔草屬謂頲曰乞公稍遲禮等書不及恐手腕將廢又曰楊炎為中書舍人與常袞並掌綸誥袞長於制書炎善為德音開元巳來言詔制之美者號常楊焉又曰王徽曾祖擇從擇從兄易從天后朝登進士第從弟朋從言從睿宗朝並以進士擢第昆仲四人開元中三至鳳閣舍人故時人號鳳閣王家又曰齊浣開元中遷中書舍人論駮書詔潤色王言皆以古義謨誥為準的侍中宋璟中書侍郎蘇頲並重之又曰薛元超道衡孫也為中書舍人中書省有一盤石初道衡為內史侍郎嘗踞而草制元超每見此石未嘗不泫然流涕又曰賈曾授中書舍人曾以父名忠固辭乃拜諫議大夫知制誥至開元初復拜中書舍人又固辭議者以為中書是曹司名又與曾父音同字別於禮無嫌乃就職與蘇晉同掌制誥皆以詞學見知時人稱為蘇賈又曰許景先轉中書舍人中書令張說常稱曰許舍人之文雖無峻峰激流嶄絶之勢然屬詞豐美得中和之氣實一時之秀也又曰郤高卿為中書舍人處事不回為宰相元載所忌魚朝恩署牙將李琮為兩街功德使琮暴撗於銀臺門毀辱京兆尹崔昭高卿立詣元載抗論以為國恥請速論奏載不從高卿遂以疾辭以前中書舍人居東洛凡十年自號伊川田父清名高節稱於天下又曰建中三年詔中書舍人分署尚書六曹復舊制也又曰高郢掌誥纍年家無制草或謂曰人皆留制集公焚之何也曰王言不可存私家時人重其慎密又穆宗詔曰中書舍人故事分押六司佐宰臣判按廢革日久頓復稍難宜漸令條舉有須慎重者便令參議如關機密者即且如舊又曰路隨敬宗初登極拜中書舍人翰林學士仍錫金紫有以金帛謝除制者必叱而却之曰吾以公事接私財耶終無所納又曰大和四年勑前行郎中知制誥者約滿一周年即與正授從諫議大夫知者亦宜准此又曰封敖為學士拜中書舍人敖構思敏速語近而理勝不務奇澀武宗深重之嘗草賜陳傷邊將詔警句云傷居爾體痛在朕躬帝覽而善之賜之宮錦又曰崔郾轉中書舍人入思政殿謝恩郾奏曰陛下用臣為侍講卒歲有餘未嘗問臣經義今蒙轉改實慚尸素有愧厚恩帝曰俟朕機務稍間即當請益高釴曰陛下意雖樂善既未延接儒生天下之人寧知重道帝深引咎錫之錦綵又曰中書舍人鄭居中少有時名楊歷清貫晚年尤薄名利以疾辭官恣遊名山一日搦管為詩才書五字曰雲山遊巳遍紙猶在手筆忽墮地而終又曰晉初中書置舍人通事各一人東晉合為一職晉代入直閣內宣詔命而侍郎之任輕矣梁秩四百石品第八梁用人殊重簡以才能不限資地多以它官兼領其後除通事直曰中書舍人五代史後唐書曰明宗時劉贊為中書舍人與學士竇夢徵同年登第鄰居友善夢徵早卒贊與同年楊疑式緦麻為位而哭其家無嫡長與視喪恤其孀稚士人稱之五代史晉史曰陳乂長興中自舍人御命冊公主於大原公主即帝后也帝深待之但訝其高岸人或有獻可於乂宜陳一謳頌以稱帝之美可邀其異待耳乂曰人生貧富咸有定分未有持天子命違禮以求利既損國綱且虧士行乂今生所不為也聞者無不嘉之又曰天福五年九月詔曰六典云中書舍人掌侍奉進奏參議表章凡詔旨制勑璽書策命皆按故事起草進畫既下則署而行之其禁有四一曰漏泄二曰稽緩三曰違失四曰忘誤所以重王命也古昔巳來典實斯在爰從近代別創新名今運屬興王事從師古俾仍舊貫以輝前規其翰林學士院公事宜並歸中書舍人五代史漢史曰唐李昭以尚書郎出為蘇州刺史朞歲以中書舍人召還不拜謂宰輔曰省郎拜舍人以知制誥為次序便由刺史玷綸闈非敢聞命乃以兵部郎中知制誥翌歲拜舍人受之五代史周史曰王延為中書舍人權知貢舉有崔頎者協之子也授偃師簿薄其卑屑棄去數年應進士延將入貢院見舊相吏部尚書盧文紀素與協不睦謂延曰舍人以謹重聞于時所以老夫去冬與諸相首以長者聞奏然此一途取事者頗多面目說者云越人善泅生子方晬乳母浮之水上或駭然止之乳母曰其父善泅子必無溺今若以名下取士徵泅之類也舍人當求實才以副公望延退而嗤曰盧公之言為崔頎也縱與其父不悅致意何至此耶來春以頎登甲科其仁而徇公皆此類也百官志曰魏初中書置通事一人主呈奏晉初中書又置舍人一人至東晉合通事及舍人二職謂之通事舍人猶掌呈奏陶氏職官要録曰中書舍人舊視給事中梁選簿云梁天監用人務簡英才不限資次又曰隋內史舍人八員專掌詔誥煬帝減四人後改為內史舍人荀勗集曰晉武帝時門下啓令史伊羡趙咸為中書舍人對掌文法勗奏以為不可起居郎六典曰起居郎掌記天子之法度以修記事之史凡記事之制以事繫日以日繫月以月繫時以時繫年必書其朔日甲乙以紀曆數典禮文物以考制度遷拜旌賞以勸善誅伐黜免以懲惡季冬則授之于國史焉唐書曰大和九年十二月左右省起居郎齎筆硯及紙於螭頭下記言記事又曰鄭朗開成中為起居郎初太和末風俗稍奢文宗恭勤節儉冀革其風宰臣等言曰陛下躬儉節用風俗巳移長裾大袂漸以減損若更令戚屬絶其侈靡不慮下不從教帝曰此事亦難戶曉但去其泰甚自以儉德化之朕聞前時內庫唯二錦袍飾以金鳥一袍玄宗幸溫湯時御之一與貴妃當時貴重如此今奢靡豈復貴之邪今富家往往皆有左街副使張元昌便用金唾壺昨因李訓巳誅之矣時朗執筆螭頭下宰臣退上謂朗曰適所議論卿記録未吾試觀之朗對曰臣執筆所記便名為史伏准故事帝王不可取觀昔太宗欲覽國史諫議大夫朱子奢云史官所述不隱善惡或主非上智飾非護失見之則致怨所以義不可觀又褚遂良曰今之起居郎古之左右史也記人君言行善惡必書庶幾不為非法不聞帝王躬自觀史帝曰適來所記無可否臧見亦何爽乃宣謂宰臣曰鄭朗引故事不欲朕見起居注夫人君之言善惡必書朕恐有平常間話不關理體垂諸將來竊以為恥異日臨朝庶幾稍改何妨一見以誡醜言朗遂進之又曰開成二年十二月閣門對左右史裴素等上自開成初復故事每入閣左右史執筆立于螭頭之下君臣論奏得以備書故開成政事最詳於代起居舍人六典曰起居舍人掌修記言之史録天子之制詔德音如記事之制以紀時政之損益季冬則授之於國史唐書曰邢文偉滁州全椒人時右史官缺高宗謂侍臣曰邢文偉事我兒能減膳切諫此正直人也遂擢拜右史又曰李讓夷字達心為諫議大夫開成元年以本官兼知起居舍人事時起居舍人李褒有痼疾請罷官宰臣李石奏闕官上曰褚遂良為諫議大夫嘗兼此官卿可盡言今諫議大夫姓名石遂奏李讓夷馮定孫簡俶帝曰讓夷可也李固言欲用崔球張次宗鄭覃曰崔球遊宗閔之門赤墀下秉筆記注為千古法不可用朋黨如斐中孺李讓夷臣不敢有纖芥異論其為人主大臣知重如此又曰魏謨轉起居舍人紫宸中謝帝謂之曰以卿論事忠切有文貞之風故不循月限授卿此官又謂之曰卿家有何舊書詔對曰比多失墜唯簪笏見在上令進來鄭覃曰在人不在笏上曰鄭覃不會我意此即甘棠之義非在笏而巳又曰魏謨文宗時為起居舍人紫宸入閣遣中使取謨起居注欲視之謨執奏曰自古置史官書事以明鑒誡陛下但為善事勿畏臣不書如陛下所行錯忤臣縱不書天下人書之臣以陛下為文皇帝陛下比臣如褚遂良帝又曰我嘗取觀之謨曰由史官不守職分臣豈敢陷陛下為非法陛下一覽之後自此書事須有回避如此善惡不直非史也遺後代何以取信乃止又曰張次宗有文學稽古厲行開成中為起居舍人文宗復故事每入閣左右史執筆立于螭頭之下宰相奏事得以備録宰臣既退上召左右史更質證所奏是非故開成政事詳於史氏
