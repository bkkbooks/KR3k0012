body:
  text: 木部五榆毛詩曰東門之枌疾亂也幽公荒淫男女棄其舊業亟會於道路歌舞於市井爾東門之枌枌白榆也宛丘之栩子仲之子婆娑其下又山有樞曰山有樞隰有榆毛詩義疏曰駮馬梓榆也駮犖呂角切遙視似駮馬周禮秋官曰烜氏四時變國火春取榆柳之火禮記內則曰堇荁枌榆免薧滫髓以滑之榆曰白枌春秋元命苞曰三月榆莢落春秋運斗樞曰玉衡星散為榆爾雅曰蓲荎音歐迭郭璞曰詩云山有樞今之刺榆無枯其實荑枯榆也生山中葉圓而厚剝皮合漬之其味辛香所謂蕪荑也說文曰榆白枌也梗山枌榆有刺莢可以為蕪荑史記曰凡望雲氣平望在榆上下千餘二千里也漢書曰高祖禱豐枌榆社張晏曰枌榆社在豐東北三十里或曰枌榆鄉名也高祖里社也又天文志曰成帝河平元年旱傷麥民食榆皮又循吏傳曰龔遂為渤海太守勸民務農桑令口種榆一樹魏志曰鄭澤為魏郡太守百姓乏材木乃課種榆為籬後魏書曰太祖道武皇帝諱圭七月七日生三合陂北明年有榆生於埋胎處遂成林又曰桓帝曾中蠱歐吐之地乃生榆木趙書曰從幽州大道滹沱造浮橋植行榆五十里置行宮管子曰五沃之土其榆條長莊子曰鵲上高城之垝而巢於高榆之顛城壞巢折凌風而起故君子之居世也得時則義行失時則鵲起淮南萬畢術曰八月榆檽音而令人不飢注曰以美酒漬榆擩曝乾以清梁米紫莧實蒸令相合欲不食者三指撮酒以服之即不飢耳韓詩外傳曰楚莊王將伐晉曰敢諫者死孫叔敖進諫曰臣園中有榆榆上有蟬蟬方奮翼悲鳴飲清露不知螳蜋之在後曲頸欲食之螳蜋方欲食蟬不知黃雀在後舉頭而欲啄之黃雀食螳蜋不知童子挾彈在榆下欲彈之童子方彈黃雀不知在前有深坑後有掘株也楚乃息伐桓談新論曰劉子駿信方士虛言為神仙可學余見其庭下大榆樹久而剝折指謂曰彼樹無情然猶朽蠹人雖欲愛飬何能使之不衰博物志曰食枌榆則眠不欲覺晉宮闕名曰華林園榆十九株雜五行書曰舍北種榆九株蠶大得廣志曰有姑榆有郎榆郎榆無莢材又任車用至善青蠡者出渤海東先以供官石虎鄴中記曰襄國鄴路千里之中夾道種榆盛暑之月人行其下鄒子曰春取榆柳之火范子計然曰蕪荑出地赤心者善汜勝之書曰種禾無期因地為時三月榆莢雨時高地強土可種禾崔實四民月令曰二月榆莢成者收乾以為醬隨節早晚勿失其適夢書曰榆為人君德至仁也夢採榆葉受賜恩也夢居樹上得貴官也夢其葉滋茂福祿存也古樂府詩曰天上何所有歷歷種白榆應璩與龐惠恭書曰見所上利民之術殖濟南之榆栽漢中之漆嵇康飬生論曰豆令人重榆令人瞑愚智所知也桐易緯曰桐枝濡毳而又空中難成易傷須成氣而後華尚書禹貢曰嶧陽孤桐嶧山之陽特生桐中為琴瑟毛詩卷阿曰梧桐生矣于彼高岡梧桐柔木也又定之方中曰樹之榛栗椅桐梓漆爰伐琴瑟詩義疏曰梓實桐皮曰椅今民云梧桐也有青桐白桐赤桐白桐宜琴瑟今雲南牂牁人績以為布禮記月令曰清明之日桐始華周書曰不始華歲有大寒禮斗威儀曰君乘火而王其政平梧桐為常生爾雅曰櫬梧也今梧桐榮桐木即梧桐後漢書曰蔡雍泰山行見桐聞爆聲曰此良木也取而為琴齊書曰豫章王於邸起山列種桐竹號為桐山武帝幸之置酒為樂管子曰五沃之土其木宜桐莊子曰外乎子之神勞乎子之精倚樹而吟據梧而瞑神不休於性分之內則外矣精不正於自足之極則勞矣故行則倚樹而吟坐則據桐而瞑言有情者之自困又曰鵷雛發南海而飛到北海非梧桐不止非竹實不食又曰空門來風桐乳致巢司馬彪注曰門戶空風喜投之桐子似乳著葉而生烏喜巢之孟子曰今有場師舍其梧檟養其樲音二棘則為賤場師矣棄大取小呂氏春秋曰成王與唐叔虞燕居援桐葉以為圭曰以此封汝虞喜以告周公周公請封虞成王曰余與虞戲也周公曰臣聞之天子無戲言於是遂封叔虞於晉淮南子曰智有所不足故桐不可以為弩又曰夫以巨斧擊桐薪不待利時良日而後破之加巨斧桐薪之上而無人力之奉雖順招搖挾刑德招搖斗杓也刑十二辰德十日也而弗能破者以其無勢也淮南萬畢術曰桐木成雲取十石瓦罌滿中水置桐罌中蓋之三四日氣如雲作董仲舒請雨書曰秋以桐魚九枚風俗通曰梧桐生於嶧山陽巖石之上採東南孫枝為琴聲甚清雅遁甲經曰梧桐不生則九州異梧桐以知日月正閏生十二葉一邊有六葉從下數一葉為一月至上十二葉有閏十三葉小餘者視之則知閏何月也不生九州各異君天下不同也王逸子曰木有扶桑梧桐松柏皆受氣淳矣異於群類者也秦記曰初長安謠云鳳凰鳳凰止阿房符堅遂於阿房城植桐數萬株以待之至是慕容冲入阿房城而止焉冲小字鳳凰廣志曰梧桐有白者剽國有白桐木其葉有白毳取其毳淹漬緝績織以為布遊名山志曰吹臺有高桐皆百圍嶧陽孤桐方此為劣鄒山記曰鄒山古之嶧山魯穆公改為鄒今鄒山嶧陽猶多桐樹齊地記曰城北十五里有梧臺即梧宮也論衡曰李子長為政欲知囚情以梧桐為之象囚形乃鑿地為塪臥木囚其中曰罪若正木囚不動若有冤木囚動出人之精誠著木人也華陽國志曰益州有梧桐木其華綵如絲人績以為布名曰華布沈懷遠南越志曰青桐華頗似木綿而輝重過之晉宮閣名曰華林園青白桐三株伏侯古今注曰昭帝元鳳三年馮翊人獻桐枝長六尺九枝枝一葉異苑曰晉武帝世吳郡臨平岸崩出一石鼓打之無聲以問張華華云可取蜀中桐材刻作魚形扣之則鳴矣於是如言音聞數十里又曰句章吳平門前忽生一株青桐樹上有謠歌之聲平惡而斫殺平隨軍北征首尾三載死桐欻自還立於故根之上又聞樹巔空中歌曰死樹今更青吳平尋當歸適聞殺此樹已復有光輝平尋歸如鬼謠祖台之志怪曰鶱保至檀立塢上北樓宿暮鼓二中有人著黃練單衣白帢將人持炬火上樓保懼藏壁中須臾有二婢上使婢迎一女子上與白帢人入帳中宿未明白帢人輒先去如是四五宿後向晨白帢人才去保因入帳中持女子問向去者誰答曰桐侯郎道東桐樹廟是至暮鼓二中桐郎來保乃斫取之縛著樓柱明日視之形如人長三尺餘檻送詣丞相渡江未半風浪起桐郎得投入水風波乃息齊民要術曰梧桐山石間生者為樂器則鳴瑞應圖曰王者任用賢良則梧桐生於東廂桓談新論曰神農黃帝削桐為琴任昉述異記曰梧桐園在吳夫差舊國也一名琴川梧園宮在句容縣傳云吳王別館有楸梧成林焉其梧子可食古樂府云梧宮秋吳王愁是也崔琦七蠲曰爰有梧桐生于玄溪傳根朽壤託險生危枚乘七發曰龍門之桐高百尺而無枝中鬱結而輪菌根扶踈以分離魏明帝猛虎行曰雙桐生空井枝葉自相如通泉溉其根玄雨潤其柯緑葉何蓩蓩青條視曲阿張協七命曰寒山之桐出自大冥含黃鍾以吐幹據蒼岑而孤生古詩曰井桐棲靈鳳楊柳上易大過九二曰枯楊生稊老夫得其女妻焦贛易林豫之晉曰鵲巢柳樹鳩奪其處任力劣薄天命不祐毛詩采薇曰昔我往矣楊柳依依楊柳蒲柳也又曰東門之楊剌時也婚姻失時男女多違親迎女猶有不至者也東門之楊其葉牂牂牂牂然盛貌又南山有臺曰南山有桑北山有楊樂只君子邦家之光又小辨曰菀彼柳斯鳴蜩嘒嘒柳木茂盛則多蟬又曰菀柳剌幽王也暴虐無親而刑罰不中有菀者柳不尚息焉有宛然柳葉茂盛之柳行路之人豈有不庶幾欲就之止息又東方未明曰折柳樊圃柳弱脆之木樊蕃也折以蕃圃無益也毛詩疏義曰楊之水不流束蒲蒲柳之木二種一種皮正青一種皮紅白可為箭竿左傳曰董澤之蒲今人以為其萑可為矣又曰樹杞杞柳也生水旁樹如柳葉粗而白木理微赤今人以為車轂今其水旁魯國泰山汶水邊路純杞柳也大戴禮曰正月柳梯梯者發葉也爾雅曰柳河柳郭璞曰河旁赤莖小楊也旄澤柳生澤中者楊蒲柳詩云楊柳依依傳曰董澤之蒲也漢書曰上林苑中大柳樹斷臥地一朝起生枝葉有蟲食其葉為字曰公孫病已立眭孟以為木下民之象當有廢故之家孫氏從民間受命為天子者及昭帝崩無嗣大臣迎立昌邑王王即位淫亂失道霍光廢之更立昭帝兄衛太子之孫為宣帝帝本名病已晉書曰王恭字孝伯美姿容人多悅之或目之曰濯濯如春月柳又曰嵇康性絶巧而好煆宅中有一柳樹甚茂乃激水圜之每夏月居其下以煆東平呂安服康高致每一相思輒千里命駕又曰太康末京洛為析楊柳之歌其曲始有兵革苦辛之歎終以禽獲斬截之事是時三陽貴盛而被族滅太后廢黜幽死宮中折楊柳之應也又桓溫傳曰溫自江陵北伐行經金城見少為琅邪時所種柳皆已十圍慨然曰木猶如此人何以堪攀枝執條泫然流涕南史隱逸傳曰陶潛字淵明有高趣宅邊有五柳樹故嘗著五柳先生傳晉中興書曰陶侃明識過人武昌道上通種楊柳人有竊之殖于家侃見識之問何盜官所種于時以為神沈約宋書曰蕭惠開為少府不得志寺內齊前草香惠開悉鏟除列種白楊人謂之曰白楊丘墓間所植奈何於庭院種之答曰人生不得志與死人何異其年惠開暴卒齊書曰王敬則初為散輩使魏於此館種楊柳後員外郎虞長曜北使還敬則問我昔種楊柳樹今大小長曜曰虜中以為甘棠
