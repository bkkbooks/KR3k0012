body:
  text: 治道部三治政一釋名曰政者正也下所以取正也周禮天官太宰之職曰正月之吉始和布治于邦國都鄙乃縣讀為懸治象之法與法同于象魏使萬民觀法象挾日而斂之太宰以正月朔日布王治之事於天下至正歲又書而縣於象魏振木鐸以徇之使萬民觀焉小宰亦帥其屬而往皆所以重治法新王事也凡治有故言始和者改造云耳挾日凡十日乃施典于邦國而建其牧立其監設其參傅其伍陳其殷置其輔乃者更申勑之也以侯伯有功德者加命作州長謂之牧所謂八命作牧者也監謂公侯伯子男各監一國也鄭司農云殷治律輔為民之平也乃施則干都鄙而建其長立其兩設其伍陳其殷置其輔長謂公卿大夫兩謂兩卿也乃施法于官府而建其正立其二設其考陳其殷置其輔凡治以典待邦國之治以則待都鄙之治以法待官府之治以官成待萬民之治以禮待賓客之治凡邦之小治則冢宰聽之待四方賓客之小治大事決乎王小事冢宰專平之歲終則令百官府各正其治受其會正正處也會大計也聽其政事而詔王廢置平其事來至者之功狀而奏白王三歲則大計群吏之治而誅賞之事久則聽之大無功不徒廢必罪之有大功不徒置又賞之鄭司農云三載考續是也又曰天官小宰之職曰正歲帥治官之屬而觀治象之法徇以木鐸曰不用法者國有常刑正歲謂夏之正月得四時之正以出教令者審也古者將有新令必奮木鐸以警衆使明聽之木鐸木舌也丈事奮木鐸武事奮金鐸禮曰故政者君之所以藏身也藏謂輝光於外而形體不見若日月星辰之中是故夫政必本於天殽以降命降下也殽天之氣以下教今天有運移之期陰陽之節也命降于社之謂殽地教謂令由社下者也社土地之主也周禮土會之法有五地之物生也降於祖廟之謂仁義謂教令由社下者大傳曰自禰率而上至于祖遠者輕仁也自至率而下至于禰高者重義也降於山川之謂典作謂教令由山川下者也山川有草木禽獸可作器物共國事降於五祀之謂制度謂教令由五祖下者玉祀有中霤門戶竈行之神此始為宮室制度此聖人所以藏身之固也政之行如此何用城郭溝池之為故聖人參於天地並於神鬼以治政也又曰政以一其行禮樂刑政其極一也極至也所以同民心而出治道也是故治世之音安以樂其政和亂世之音怨以怒其政乖聲音之道與政通矣是故審聲以知音審音以知樂審樂以知政而治道備矣又曰敢問何謂為政孔子對曰政者正也君為正則百姓從矣君之所為百姓之所從也君所不為百姓何從公曰敢問為政何如孔子對曰夫婦別父子親君臣嚴三者正則庶物從之矣又曰哀公問政子曰文武之政布在方策其人存則其政舉其人亡則其政息人道敏政地道敏樹夫政也者蒲盧也蒲盧課羸謂土蜂也詩曰螟蛉有子蜾羸負之螟蛉桑蟲也蒲盧取桑蟲之子去而變化之以成為己子政之於百姓若蒲盧之於桑蟲故為政在人又曰子曰夫人教之以德齊之以禮則民有格心教之以政齊之以刑則民有遁心格來也遁逃也又曰子曰政之不行也教之不成也爵祿不足勸也刑罰不足恥也故上不可以褻刑而輕爵言政教所以明賞罰也又曰聖人南面聽天下所且先者五民不得與焉一曰治親二曰報功三曰舉賢四曰使能五曰存愛五者一得於天下民無不足無不贍者五者一物紕繆民莫得其死物猶事也紕錯也五事得則民足一事夫則民不得其死明政之難大戴禮曰曾子曰敢問不費不勞以為明乎孔子愀然揚眉曰參汝以明主為勞乎古者舜左禹而右皋陶不下席而天下治左氏傳曰宣子於是乎始為國政宣子趙盾制事典正法罪辟獄刑辟猶理也董逋逃由質要治舊汙本秩禮續常職出滯淹既成以授太傅陽子與大師賈他使行諸晉國以為常法又曰晉悼公即位于朝始命百官始為政施舍己責施恩惠舍勞役逋止責振廢滯起舊德匡乏困救災患匡亦救也禁淫慝薄賦斂宥罪戾宥寬也節器用節省也時用民使民以時欲無犯時不縱私欲又曰季札聘于鄭謂子産曰鄭之執政者侈難將至矣政必及子子為政慎之以禮不然鄭國將敗又曰鄭子皮授子産使都鄙有分國都及邊鄙車服尊卑車服尊卑各有分部上下有服公卿大夫服不相踰田有封洫廬井有伍大人之忠儉者謂卿大夫從而與之泰侈者因而斃之從政一年輿人誦之曰取我衣冠而禇之禇蓄也奢侈者畏法故畜藏取我田疇而伍之孰殺子産吾其與之及三年又誦之曰我有子弟子産誨之我有田疇子産殖之殖生也子産而死誰其嗣之嗣續也傳言鄭所以興又曰禮之於政如熱之有濯以救熱何患之有又曰鄭人游于鄉校以論執政論其得失然明謂子産曰毀鄉校如何子産曰何為夫人朝夕退而游焉以議執政之善否其所善者吾則行之其所惡者吾則改之是吾師也若之何毀之又曰子皮欲使尹何為邑子産曰少未知可否子皮曰願吾愛之不吾叛也使夫往而學焉夫亦愈知治矣子産曰不可人之愛人求利之也今吾子愛人則以政以政與之猶未能操刀而使割也其傷寶多子之愛人傷之而已其誰敢求愛於子子於鄭國棟折榱崩僑將厭焉敢不盡言子有美錦不使人學製焉其為美錦不亦多乎僑聞學而後入政未聞以政學者也田獵射御貫則能獲禽貫習也若未嘗登車射御敗績厭覆是懼何暇思獲子皮曰善哉學者也若果行此必有所害又曰周任有言曰為政者不賞私勞不罰私怨詩云有覺德行四國順之詩大雅覺直也言德行直則四方順從之又曰鄭子産有疾謂子太叔曰我死子必為政唯有德者能以寬服民其次莫如猛火烈民望而畏之故鮮死焉水懦弱民狎而玩之則多死焉故寬難難以治疾數月而卒太叔為政不忍猛而寬鄭國多盜聚大於雚蒲之澤雚蒲澤名也於澤中劫人音符浦太叔悔之曰吾早從夫子不及此興徒兵以攻蒲之盜盡殺之盜少止仲尼曰善哉政寬則民慢慢則糾之以猛猛則民殘殘則施之以寬寬以濟猛猛以濟寬政是以和詩曰民亦勞止汔可小康惠此中國以綏四方施之以寬也書大禹謨曰后克艱厥后臣克艱厥臣政乃乂黎民敏德敏疾也能知為君難為臣不易則其政治而衆民皆疾修德禹曰於帝念哉德惟善政政在養民難而言念重其言為政以德則民懷之水火金木土穀惟修言念民之本在先修六府正德利用厚生惟和正德以率下利用以阜財厚生以養民三者和所謂善政九功惟敘九敘惟歌言六府三事之功有次敘皆可歌樂乃德政之所致戒之用休董之用威勸之以九歌俾勿壞言善政之道美以戎之威以督之歌以勸之使政勿壞在此三者而已又太甲下曰德惟治否德亂與治同道罔不興與亂同事罔不亡言安危在所念治亂在所法終始慎厥與惟明明后明慎其所與治亂之機則為明王明君又盤庚上曰古我先王亦惟圖任舊人共政先王謀任久老成人共治其政王播告之修不匿厥指王布告人以所修之政不匿其指王用丕欽罔有逸言民用丕變王用大敬其政教無有逸豫之言民用大變從化又洪範曰乂用三德治民必用剛柔正直之三德一曰正直二曰剛克剛能立事三曰柔克和柔能治三者皆德平康正直平世安用正直治之疆弗友剛克友順也世疆禦不順以剛能治之燮友柔克燮和也世和順以柔能治之沈潛剛克沈潛謂地雖柔亦有剛能出金石高明柔克高明謂天言天為剛德亦有柔克不干四時喻臣當執剛以正君君亦當執柔以納臣又立政曰周公若曰拜手稽首告嗣天子王矣用咸戒于王曰王左右常伯常任準人綴衣虎賁周公用王所立政之事皆戒於王曰常所長事常所委任謂三公六卿準人平法謂士官綴衣掌衣服虎賁以武力事王皆左右近臣宜得其人周公曰嗚呼休茲知恤鮮哉歎此五者立政之本知憂得其人者火古之人迪唯有夏乃有室大競籲俊尊上帝古之人道惟有夏禹之時乃有卿大夫室家大強猶乃招呼賢俊與共尊事上帝迪知忱恂于九德之行禹之臣蹈知成信於九德之行謂賢智大臣九德皋陶所謀也乃敢告教厥后曰拜手稽首后矣曰宅乃事宅乃牧宅乃準茲惟后矣知九德之臣乃敢告教其君以立政后矣亦猶王矣宅居也居汝事六卿掌事者牧牧民九州之伯居外內之官及平法者皆得其人則此惟君矣嗚呼孺子王矣歎稚子今以為王矣不可不勤法祖考之德繼自今我其立政立事準人牧夫我其克灼知厥若丕乃俾亂繼用今已往我其立政大臣立事小臣及準人牧夫我其能灼然知其順者則大乃使治之言知臣下之勤勞然後莫不盡心力也相我受民和我庶獄庶慎時則勿有間之能治我始受天民和平我衆獄衆之事如是則勿有以伐之言不可復變自一話一言我則末惟成德之彥以乂我受民言政賞用一善善在一言而已欲其口無擇言如此則我終惟有成德之美以治我所受之民嗚呼子旦己受人之徽言咸告孺子王矣歎所受賢聖說禹湯之美言皆以告稚子王矣繼自今文子文孫其勿誤于庶獄庶慎惟正是乂之文子文孫文王之子孫從今已往惟以正是人道治衆獄衆慎無忽誤也又曰成王既黜殷命滅淮夷還歸在豐作周官王曰若昔大猷制治于未亂保邦于未危言當順古大道制治安國必于未亂未危之前思患預防之曰唐虞稽古建官惟百內有百揆四嶽外有州牧侯伯道堯舜考古以建百官內置百揆四嶽象天之有五行外置州牧十二及五國之長上下相惟內外咸治言有法庶政惟和萬國咸寧官職有序故庶政惟和萬國皆安所以為治也夏商官倍亦克用乂禹湯建官二百亦能用治言不及唐虞之清要也明王立政不惟其官惟其人言聖帝明王立政修教不惟多其官惟在得其人王曰嗚呼凡我有官君子欽乃攸司慎乃出令令出惟行弗惟反有官君子大夫已上歎而戒之使敬汝所司慎汝出令從政之本令出必惟行之不惟反改若二三其令亂之道以公滅私民其允懷學古入官議事以制政乃不迷其爾典常作之君作之師無以利口亂厥官蓄疑敗謀怠忽荒政不學牆面蒞事惟煩積疑不決必敗其謀大道怠忽必亂其政人而不學其由正牆面而立臨政事必煩又君陳曰惟爾令德孝恭惟孝友于兄弟克施有政言善父母者必友于兄弟能施其政令命汝尹茲東郊敬哉圖厥政莫或不艱有廢有興出入自爾師虞庶言同則繹謀其政無有不先慮其難有所廢有所起出納之事當用汝衆言慶之衆言同則陳而布之禁其專也有弗若于汝政弗化于汝訓辟以止辟乃辭有不順於汝政不變於汝教刑之而懲止犯刑者乃刑之狃于姦宄敗常亂俗三細不宥習於姦究凶惡毀敗玉常之道以亂風俗之教罪雖小三犯不赦所以絶惡源也論語曰子禽問於子貢曰夫子至於是邦也必聞其政求之與抑與之與子貢曰夫子溫良恭儉讓以得之夫子之求之也其諸異乎人之求之與又曰為政以德譬如北辰居其所而衆星拱之又曰子貢問政子曰足食足兵民信之矣又曰齊景公問政於孔子孔子對曰君君臣臣父父子子公曰善哉信如君不君臣不臣父不父子不子雖有粟吾得而食諸又曰子張問政子曰居之無倦行之以忠又曰季康子問政於孔子孔子對曰政者正也子帥以正孰敢不正又曰季康子問於孔子曰如殺無道以就有道何如孔子對曰子為政焉用殺子欲善而民善矣君子之德風小人之德草草上之風必偃又曰子路問政子曰先之勞之請益曰無倦又曰子曰魯衛之政兄弟也又曰衛君待子而為政子將奚先子曰必也正名乎子路曰有是哉子之迂也奚其正子曰野哉由也君子於其所不知蓋闕如也名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所措手足故君子名之必可言也言之必可行也君子於其言無所茍而已矣又曰葉公問政子曰近者說遠者來又曰子夏為莒父宰問政子曰無欲速無見小利欲速則不達見小利則大事不成又曰無為而治者其舜也與夫何為哉恭己正南面而已矣又曰子張問於孔子曰何如斯可以從政矣子曰尊五美屏四惡斯可以從政矣
