body:
  text: 皇王部六帝舜有虞氏史記曰虞舜名重華冀州人也作什器於壽丘就時於負夏舜父頑母嚚第傲皆欲殺不可得即求在側舜耕歷山歷山之人皆讓畔漁雷澤雷澤之人皆讓居陶河濱器皆不苦窳堯乃賜舜絺衣與琴為築倉廩與牛羊舜舉八凱使主后土以揆百事舉八元使布教于四方皋陶為大理民服其實伯夷主禮上下咸讓垂主工師百工攻功益主虞山澤開闢棄主農則百穀時茂契主司徒百姓和親龍主賓客遠人至與九韶之樂鳳皇來翔舜年五十攝行天子事年五十八而堯崩年六十一代堯踐帝位踐位三十九年南巡狩崩于蒼梧之野葬於九疑是為零陵帝王世紀曰舜姚姓也其先出自顓頊顓頊生窮蟬窮蟬有子曰敬康生勾芒勾芒有子曰橋牛橋牛生瞽瞍妻曰楃登見大虹意感而生舜於姚墟故姓姚名重華字都君龍顏大口黑色身長六尺一寸有聖德始遷於夏於頓丘責於傅虛家本冀州每徙則百姓歸之其母早死瞽瞍更娶生象象傲而父頑母嚚咸欲殺舜舜能和諧大杖則避小杖則受年二十始以孝聞堯以二女娥皇女英妻之見舜於貳宮設饗禮迭為賓主南面而問政命為司徒太尉試以五典有大功二十夢眉長與髮等堯乃賜受以昭華之玉老而命舜代巳攝政明年正月上日始受終于文祖太尉行事堯崩三年喪畢以仲冬甲子月次于畢始即真以土代火色尚黃乃詢四岳闢四門明四目達四聰東巡狩登南山觀河渚受圖書表賜群臣尊伯禹稷契皋繇皆益地有苗氏負固不服禹請征之舜曰我德不厚行武非道也吾前教由未也乃修教三年執干戚而舞之有苗請服立誹謗之木申命九官十二牧及殳斨朱虎熊羆等二十五人三載一考績黜陟幽明於是俊乂在官群后德讓百僚師師以五采章施于五色之服以六律五聲八音協治蒸民乃粒萬邦作乂庶績咸熙乃作大韶之樂簫韶九成鳳皇來儀擊石拊石百獸率舞故孔子稱韶盡美矣又盡善也景星曜於房群瑞畢臻德被天下初舜既踐帝位而父瞽瞍尚存舜常戴天子車服而朝焉天下大之故曰大舜都乎咸陽或營蒲坂媯汭嬪于虞故因號有虞氏有二妃元妃娥皇無子次妃女英生啇均次妃登北氏生二女霄明燭光有庶子八人皆不肖故以天下禪禹舜年八十一即真八十三而薦禹九十五而使禹攝政攝五年有苗氏叛南征崩于鳴條年百歲殯以瓦棺葬蒼梧九疑山之陽是為零陵謂之紀市在今營道縣下有群象為之耕雒書靈准聽曰有人方面日衡重華衡有骨表如日也眉上曰衡重華重童子握石椎懷神珠椎讀曰鍾錘平輕重也握謂如琁璣玉衡之道懷神珠喻有聖性也西王母受益地圖西王母西荒之國也在西方得此益地之圖來獻舜受終鳳皇儀黃龍感朱草生蓂莢孳尚書舜典曰慎徽五典五典克從納于百揆百揆時序賓于四門四門穆穆納于大麓烈風雷雨不迷帝曰咨爾舜詢事考言乃言底可績三載汝陟帝位尚書帝命驗曰虞舜聖在側陋光耀顯都握石椎懷神珠推讀曰錘神珠喻聖性尚書中候考河命曰帝舜曰朕維不仁蓂莢浮著百獸鳳晨蓂莢浮著萌牙百獸率鳳皇司辰也又曰若稽古帝舜曰重華欽翼皇象翼奉也象歷也舜敬奉皇天之歷數七政得失也又曰舜至于下稷榮光休至稷讀曰側下之側曰西之時休美也榮光氣也黃龍負卷舒圖出水壇畔赤文綠錯錯分也文而以綠色分其間尚書大傳曰舜不登而高不行而遠又虞夏傳曰維元祀巡狩四嶽八伯堯始得羲和今為六卿主春夏秋冬并掌方嶽之事是為四嶽出則為伯後乃分置八伯壇四奧沉四海祭水曰沉封十有二山肇十有二州韓詩外傳曰昔舜甑盆無膻而功不以巧獲罪詩含神霧曰握登見大虹意感生帝舜大戴禮曰宰我曰請問帝舜孔子曰蟜牛之孫瞽瞍之子也曰重華好學孝友聞於四方陶家事親寬裕溫良教而知時畏天而愛民恤遠而親親世以孝聞於天地三十在位嗣帝所五十乃死葬于蒼梧之野禮記曰舜作五絃之琴以歌南風又曰舜其大智也與德為聖人尊為天子富有四海之內宗廟饗之子孫保之又曰舜其大智也與舜好問而好察邇言隱惡而揚善執其兩端用其中於民其斯以為舜乎邇近也近言而善易以進人察而行之也兩端過與不及也用其中於民賢與不肖皆能行之也斯此也其德如此乃號為舜舜之言充也又曰子曰之後世雖有作者虞帝弗可及也矣君天下生無私死不厚其子子民如父母有憯恒之愛有忠利之教禮含文嘉曰舜損已以安百姓樂動聲儀曰孔子曰簫韶者舜之遺音也溫潤以和似南風之至其為音如寒暑風雨之動物如物之動人雷動獸含風雨動魚龍仁義動君子財色動小人言樂之動人也深故舉見事以為喻是以聖人務其本春秋演孔圖曰舜目四童謂之重明承乾乾踵堯海內富昌童童子也踵猶履也履其所行也春秋運斗樞曰舜以太尉受號即位為天子五年二月東巡狩至于中月與三公諸侯臨觀太尉公官名也唐虞五載一巡狩中月月半也臨觀河月或為舟以也黃龍五彩負圖出置舜前圖以黃玉為匣如櫃長三尺廣八寸厚一寸四合而連有戶此含樞紐之命故龍匣黃也四合有橫道相合也有戶言可開闔白玉撿黃金繩芝為泥封兩端章曰天黃帝符璽五字廣袤各三寸深四分鳥文文字也四或為三舜與大司空禹臨侯望愽等三十人集發大司空公官名臨候國氏望愽名圖玄色而綈狀可舒卷長三十二尺廣九寸而如也三或為五中有七十二帝地形之制天文官位度之差孝經援神契曰舜龍顏重童大口手握褒龍顏取象車故有此骨表也重童取象雷多精光也大口以象斗星又為天作喉舌握褒手中褒字喻從勞苦起受褒飭致大位者也論語曰舜有臣五人而天下治五人者禹稷契皋陶伯益又曰無為而治者其舜也與夫何為哉恭己正南面而已矣為猶安也言舜相堯去四凶旋四門穆穆也論語撰考讖曰堯舜等昇首山觀河渚有五老遊於河渚相謂曰河圖將來告帝期五老流星上入昴有頃赤龍負玉苞舒圖出堯與大舜等共發曰帝當摳百則禪虞百年而禪與舜堯喟然歎曰咨爾舜天之歷數在爾躬孔叢子曰舜身六尺有奇面頷無毛亦聖也朝子曰歷山農者侵畔舜往而耕者讓河濱漁者爭坻舜往朞年而漁者讓長東夷之陶者窳舜往陶朞年而器以牢墨子曰堯舉舜於服澤之陽孟子曰雞鳴而起孳孳為善者舜之徒也雞鳴而起孳孳為利者跖之徒又曰堯之於舜使其子九男事之二女女焉百官牛羊倉廩備以養舜於畎畝之中而後舉之加諸上位又曰舜生於諸馮遷於負夏卒於鳴條東夷之人也諸馮負夏鳴條皆地名也負夏在海東方夷之地故曰東夷之人也又曰舜之飯糗茹草也若將終身焉及其為天子也被袗衣鼓琴二女果若固有之袗衣畫繪者也此言舜窮居之時若將終身及其為萬乘之主被服繪繡若固常自所有也分定使之然也又曰舜之居深山之中也與木石居與鹿豕遊其所以異於深山之野人者幾希舜耕歷山之時居山之間鹿豕近人若與人遊希遠也當此之時舜與野人相去豈遠哉及其聞一善言見一善行若決江決江河沛然莫之能禦也又曰舜流共工于幽州放驩兜于崇山殺三苗于三危殛鯀于羽山四罪而天下咸服又曰大舜有大焉善與人同舍己從人樂取於人以為善大舜虞舜也孔子稱曰巍巍故曰大舜也有大善焉能舍己從人子路與舜同也自耕稼陶漁以至為帝無非取於人者取諸人以為善是與人為善也又曰天下大悅而將歸己視天下悅而歸己猶草芥也唯舜為然舜不以天下歸己為樂號泣于田也不得乎親不可以為人不順乎親不可以為子舜盡事親之道而瞽瞍底豫瞽叟底豫而天下化瞽叟底豫而天下之為父子者定此之謂大孝又曰堯崩三年喪畢舜避堯之子於南河之南天下諸侯朝覲者不之堯之子而之舜訟獄者不之堯之子而之舜謳歌者不謳歌堯之子而謳歌舜曰天也夫然後之中國踐天子之位也莊子曰羊肉不慕蟻蟻慕羊肉羊肉羶也舜有羶行百姓悅之故三徙成都至鄧之墟十萬家堯聞舜之賢舉之童土之地童土不生草之地曰冀得其來之澤舜來施恩澤也又曰舜讓天下於善卷善卷曰余立於宇宙之中冬日衣皮毛夏日衣葛絺春耕種足以勞動秋收歛足以休食日出而作日入而息逍遙於天地之間而心意自得吾何以天下為悲夫子之不知余也遂不授於是去而入深山莫知其處又曰舜以天下讓其友北人無擇北人無擇曰異哉后之為人也居於畎畝之中而遊堯之間不若是而已又欲以辱行汗漫我吾羞見之自投清冷之泉尸子曰舜兼愛百姓務利天下其田也荷彼耒耜耕彼南畝與四海俱有其利雷澤也旱則為耕者鑿瀆儉則為獵者表虎故有光若日月天下歸之若父母又曰舜南面而治天下天下太平燭於玉燭息於永風食於膏火飲於醴泉舜之行其猶河海乎千仞之溪亦滿焉由此觀之禹湯之功不足言也又曰堯問於舜曰何事曰事天問何任曰任地問何務曰務人又曰舜一徙成邑再徙成都三徙成國其致四方之士堯聞其賢草茅之中與之語政至簡而易行與之語道廣大而不窮於是妻之以皇媵之以娥九子事之而託天下焉又曰舜云從道必吉反道必凶如影如響也又曰舜事親養兄為天下法其遊也得六人曰雒陶方回續牙伯陽東不識秦不空皆一國之賢者也又曰昔者舜兩眸子是謂重明作事成法出言成章又曰舜舉三后而四死除何為饑渴寒暍勤勞鬥爭又曰有虞之君天下也使天下貢善啇周之君天下也使天下貢財公孫弘曰舜牧羊於黃河遇堯舉為天子陸賈新語曰舜藏黃金於嶄巖之山捐珠玉於五湖之淵以塞淫邪之欲淮南子曰舜之時共工振滔鴻水滔漫之共工炎帝之後高堙下壅百川以為民害以薄空桑空桑地名在魯龍門未開呂梁未發江淮通流四海涬溟民皆上丘陵赴樹木舜乃使禹䟽三江五湖決伊闕導瀍澗通溝洫注之東海鴻水漏九州乾萬民皆寧其性又曰昔者舜耕于歷山歷山在濟陰成陽朞年而田者爭處磽确以封畔肥饒相讓也釣於河濱朞年而漁者爭處湍瀨湍疾瀨淺以曲隈深澗相與也又曰舜作室筑墻茨屋辟地樹穀令民皆蒼梧又曰舜不降席而天下治周生列子曰舜嘗駕五龍以騰唐衢武嘗服九駮以馳文塗此上御也徐氏中論曰小人恥其面不如子都君子恥其行不如舜禹杜夷幽求曰以舜禹之登庸視孔氏之窮屈不以跛鱉之與晨驥乎符子曰舜禪夏禹於洞庭之野呂氏春秋曰舜有子九人不予其子而授禹至公也風土記曰舜東夷之人生於桃丘媯水之汭損石之東舊說言舜上虞人也虞即會稽縣距餘姚七十里如寧上虞南鄉也后為縣桃丘即桃丘方相近也今吳比亭虞濱在小江裏縣復五十里對小江北岸臨江山上有立石所謂損石者也斜角西南揩俗呼為蒍公嶄高石也
