body:
  text: 天部十一雨下河圖帝道紀曰雨者天地之施也遁甲開山圖曰霍山南嶽有雲師雨虎榮氏解曰雲師如蠶長六寸有毛似兔雨虎如蠶長七八寸似蛭雲雨之時出在石上肉甘可熟而食又曰鄭有不毛山上有無為之君分布雲雨於九州之內榮氏曰不毛山不生樹木古無為之君常處其上布灑雲雨九州之內平均河圖祕徵曰君急恚怒無雲而雨黃帝素問曰清陽為天濁陰為地地氣上為雲天氣下為雨雨出地氣出天又曰天氣下而為雨太公金匱曰武王師到牧野陳未畢而暴風疾雨雷電幽冥前後不見太公曰善雷電者是吾軍動應天也太公伏符陰謀曰紂常以六月獵於西土西土之老少相與謀曰君王逆人此其命固不壽也後數日而暴風大雨發屋拔木漂殺人民六畜明年諸侯謀合四海兵起又曰武王兵入啇都前歌後舞甲子進兵乙丑而雨太公兵法曰將有三禮武曰敢問三禮太公曰將冬日不服裘夏日不操扇天雨不張幔蓋名將禮太公對敵權變逆順法曰夫軍出逢天無雲而雨此天泣也軍沒不還魏武帝兵書按要曰大軍將行雨濡衣冠是謂灑兵其師有慶又曰三軍將行其旗墊然若雨是謂天露三軍失徒將陳雨甚是謂浴尸先陳者敗亡又曰大將始行雨而薄不濡衣冠是謂天泣其將大凶其卒散亡雜兵書曰諸雲氣諸變暈日月蝕風散之雲振之雨壓之皆解又曰大人之兵如虎如狼如風如雨如雷如電振振暝暝天下盡驚又曰軍始營風雨從後來沾衣裳大吉又曰有大雲雨軍內滂沱甚者軍罷無功桓寬鹽鐵論曰孔子大聖也嘗居上位相魯三月不令而行不禁而止沛若時雨之灌萬物莫不興起也王充論衡曰道至天者翔風起甘雨降霽而陰曀者謂之甘雨非謂雨水味甘也又曰太平之時五日一風十日一雨又曰周公時雨不破塊風不鳴條旬而一雨雨必以夜丘陵高下皆熟神異經曰西海上有人焉乘白馬朱鬣白衣素冠從十二童子馳馬西海上如飛名曰河伯使者其所至之國雨水滂沱樂動聲儀曰焦明至為雨備焦明水鳥楚辭曰雷填填兮雨冥冥潘尼苦雨賦曰瞻中塘之浩汗聽長霤之涔涔成公綏陰霖賦曰沉竈生蛙中庭運舟傅咸愁霖詩曰舉足沒泥濘市道無行車蘭桂賤朽腐柴粟貴明珠張孟陽雜詩曰雲根臨八極雨足灑四溟霖瀝過二旬散漫亞九齡階下伏泉涌堂上水衣生尺燼重尋桂紅粒貴瑤瓊又詩曰騰雲似湧烟密雨如散絲劉楨詩曰和風從東來玄雲起西山夜中發此氣明旦飛甘泉應璩與韋誕書曰夫以原憲懸磬之居而值皇天無已之雨室宇漸而作漏堂館洽而為泥祈雨禮記月令曰孟夏大雩帝命有司禱祀山川古之卿士有益於人者以祈穀實雩者祭天祈雨之名大雩為用盛樂也漢書曰董仲舒為江都相理國以春秋災異之變推陰陽所錯行故求雨閉諸陽縱諸陰其止雨反是者義云祈雨閉南門止雨范曄後漢書曰諒輔仕郡為五官椽時夏大旱太守自出禱山川連日而無所降輔乃自暴庭中慷慨呪曰輔為股胘不能進諫納忠和調陰陽至令天地否隔萬物焦枯咎盡在輔今敢自祈請若至日中不雨乞以身塞無狀於是積薪聚艾茅以自環構火將自焚未及中時天雲晦合須臾澍雨謝承後漢書曰戴封字平仲遷西華令其年大旱禱請無獲乃積薪坐其上以自焚火起而大雨遠邇歎服遷中山相又曰奚延轉議郎徐州遭旱延使持節到東海請雨豐澤應澍雨與京師同日俱霈還拜五官中郎將又曰周暢性仁慈為河南尹夏旱久禱無應因收葬洛城傍客死骸骨萬餘人應時澍雨歲乃豐稔又曰章和元年有詔以鄭弘為太尉時旱朝廷百僚皆暴請雨夏炎熱小雨群官即還舍弘彌日不旋大雨澍稼穡遂豐又曰汝南周獲善占天文為郡門下椽鮑昱為汝南太守時郡境天旱昱自往問何以致雨獲曰急罷三部督郵明府當自北出到四十里亭雨可致也昱從之果得大雨每行縣輒軾其閭東觀漢記曰曹褒為河內太守時旱春至六月無雨穀貴百姓頗流離褒到省吏職退去貪殘屢得澍雨其秋大熟百姓給足流民皆還又曰和熹鄧后永初二年三月京師旱至五月朔太后幸雒陽省獄舉冤未還宮澍雨大降司馬彪續漢書曰永元六年張奮代劉方為司空時歲災旱祈雨無應乃表即時引見口陳時政之宜明日和帝召太尉司徒幸洛陽即大雨三日蜀本記曰秦王誅蜀侯惲後迎葬咸陽天雨三月不通因葬成都故蜀人求雨祠蜀侯必雨王隱晉書曰束晢太康中郡大旱苗稼敗晢乃命邑人躬共請雨三日中雨水三尺衆人以其有術數精誠感於神明百姓歡喜為之歌曰束先生通神明請天三日甘雨零我黍以萌我稷以生何以疇之報束先生高閭燕志曰太平十五年自春不雨至於五月有司奏右部王荀妻産妖傍人莫覺俄而失之乃暴荀妻於社大雨普洽魚豢典略曰舊制求雨太常禱天地宗廟社禝山川已賽如其常祭牢禮四月立夏旱乃求雨立秋雖旱不禱求雨到七月畢賽之秋冬春三時不求雨崔鴻春秋前燕録曰建熙七年五月慕容暐下書曰朕以寡德蒞政多違亢陽三時光陰錯緒農植之辰而零雨莫降其令有司徹樂太官以菜食常供祭奠既而澍雨大降又前涼録曰張植為西域校尉與奮威將軍牛霸率騎救張冲六月至于流沙無水士卒渴甚植乃剪髮肉袒徒跣升壇慟泣請雨俄而雲起西北雨水成川植殺所乘馬祭天而去又前秦録曰沙公西域沙門也有祕術每旱苻堅常使呪龍龍便下鉢中天輒大雨後魏書曰孝文太和二年京師旱祈雨天子於北苑親自禮焉減膳避正殿澍雨大洽三年帝祈雨於北苑閉陽門是日澍雨益部耆舊傳曰趙瑤為閬中令遭旱請雨於靈星應時大雨葛仙公傳曰吳主曾與仙公坐於榭上望見道間人民請雨土人纍時不得仙公曰雨可得耳即書符著社廟中日午大雨尺餘水長沙耆舊傳曰祝良為洛陽令時亢旱天子祈雨不得良暴身階庭告誠引罪紫雲沓起甘雨仍降佛圖澄傳曰石虎時自正月至六月不雨澄詣滏口祠稽首暴露即有二白龍降於祠下於是雨遍數千里干寶搜神記曰湯既克夏大旱七年洛川竭湯乃以身禱於桑林剪其髮自以為犧牲祈福於上帝於是大雨惣至洽于四海又曰湘東新平縣有一龍穴穴中有黑土歲旱人則共壅水於此穴穴淹則立大雨宋永初山川記曰鄱陽長壽山山形似馬白雲出於鞍中不崇朝而雨盛弘之荊州記曰佷山縣有一山獨立峻絶西北有石穴北行百步許二大石其間相去一丈許俗名其一為陽石一為陰石水旱為災鞭陽石則雨鞭陰石則晴又曰湘東有雨母山山有祠壇每祈禱無不降澤以是名之又曰來陽縣有雨瀨此縣時旱百姓共壅塞之則甘雨普降若一鄉獨壅雨亦偏應隨方所祈信若符刻顧微廣州記曰鬱林郡山東南有一池池邊有一石牛人祭祀之若旱百姓殺牛祈雨以牛血和泥泥石牛背祀畢則天雨大注抱朴子曰使者甘宗所奏西域事云方士能神祝者臨泉禹步吹氣龍即浮出長十數丈更吹龍輒縮至長數寸乃掇取著壺中壺中或有四五龍以少水養之聞有旱處便齎龍往賣一龍直數十斤金發壺出一龍著潭中復禹步吹之長數十丈須臾而雲雨四集又曰歷陽有彭祖仙室請雨必得晏子春秋曰齊景公時旱欲祠靈山晏子曰山以石為身草木為髮天茍不雨髮燋身熱獨不欲雨乎祠之何益公曰祠河伯可乎曰河伯以水為國魚鱉為民久旱國將亡民將滅獨不欲雨乎君避殿曝露其索雨乎公出野曝露天果大雨淮南子曰土龍致雨許慎注曰湯遭旱作土龍以象雲從龍也又曰董仲舒請雨秋用桐木魚山海經曰東荒北隅有山名土丘應龍處南極殺蚩尤與夸父不得復上故下數旱旱而為應龍之狀乃得大雨今之土龍本此也遁甲開山圖曰絳北有陽石山有神龍池黃帝時遣雲陽先生養於此帝王歷代養龍之處國有水旱不時即祀池請雨爾雅孫炎注曰攝木生江上有寄枝高三四丈生毛一名楓子天旱以泥塗之即雨傅咸自敘曰太始九年自春不雨涉夏節聖皇勞慮分使祈禱余以太子洗馬兼司徒涖事三朝雨大降退作喜雨賦霽說文曰霽雨止也霋音妻雨霽也霩火郭反雨上雲罷貌魏略五行志曰延康元年大霖雨五十餘日魏有天下乃霽將受魏祚之應也晉中興徵祥記曰咸和四年陰霖五十餘日蘇峻滅乃霽長沙耆舊傳曰文度字仲儒為郡功曹吏時霖雨廢人業太守憂悒召度補戶曹度奉教齊戒在社三日夜夢白頭翁謂曰爾來何遲翌旦度具白所夢於太守曰昔禹夢青繡文衣男子稱蒼水使者禹知水脈當若椽此夢將其比也明日果大霽扶南日南傳曰金陳國入四月便雨六月乃止少有晴日六月不雨常晴歲歲如此
