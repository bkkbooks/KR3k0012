body:
  text: 人事部六十二義中晉書曰郗鑒字道徽高平金鄉人漢御史大夫慮之玄孫初鑒值永嘉喪亂在鄉里窮餒鄉人以鑒名德傳共飴之時兄子邁外生周翼並小常攜之就食鄉人曰各自饑困以君賢欲共相濟耳恐不能兼有存鑒於是獨往食訖以飯著兩頰邊還吐與二兒後並得存同過江邁位至護軍翼為剡縣令鑒之終也翼追撫育之恩解職而歸席占心喪三年又曰顏含有孝行兄畿服藥多死於醫家含迎歸開棺復生母妻家人日益勤倦含棄官侍兄疾十三年曾無勞怠又曰顏含病困須髯蛇膽不能得含憂歎纍日忽有一童子持青囊授含乃蛇膽也童子忽化為青鳥飛去何法盛晉中興書曰紀瞻字士遠歷陽太守沛國武嘏臨亡以家後不立遂手書寄託瞻悉迎接為居宅衣食取足有若骨肉少與陸機兄弟親善機一門被誅瞻復相營恤機女為嫁之由是士稱其篤義宋書龔頴遂寧人也少好學益州刺史毛琚辭為勸學從事琚為譙縱所殺故佐吏並逃亡頴號哭奔赴殯送以禮縱後設宴延頴不獲已而至樂奏頴流涕起曰北面事人亡不能死何忍舉觴聞樂蹈跡逆亂乎縱大將譙道福引出將斬之道福母即頴姑也跌出救之得免及縱僣號備禮徵又不至乃脅以兵刃執志無回改至于蜀平遂不屈節又曰張進之永嘉安固人也為郡中大族少有志行歷五官主簿永寧安固二縣領校尉家世富足經荒年散財救贍鄉里遂以貧罄全濟者多太守王味之有罪當見收逃避進之供奉經時盡其誠力味之嘗避地墮水沉沒進之投水拯救相與沉淪危而得免時劫掠充斥每入村抄暴至進之門輒相約勒不得侵犯其義信所感如此又曰孫棘大明五年發三五丁弟薩應充行坐違期不至棘自詣郡辭引己為家長令弟不行罪當在己乞以身代薩又辭自引太守張岱疑其不實以棘薩各置一處報云聽其相代顏色莊悅甘赴死焉棘妻許氏又寄語囑夫曰君當門戶豈可委罪小郎且大家臨亡以小郎囑君今竟未婚娶家道不立君已有二子死復何恨岱依事表上孝武帝詔特原罪又曰蔡廓字子度事兄軌如事父家內大小咨而後行公私賞賜一皆納軌有所咨須就典者請之曾從武帝在彭城妻郗氏書求夏服時軌為給事郎中廓答曰知須夏服給事自應相供無庸別寄崔鴻十六國春秋前趙録曰江都王延年年十五喪二親奉叔父孝聞子良孫及弟從子為噉人賊所掠延年追而請之賊以良孫歸延年延年拜請曰我以少孤為叔父所養此叔父之孤孫也願以子易之賊曰君義士也免之又後趙録曰石勒謂右長史張賓曰鄴魏之舊都吾將營建誰可任也賓曰晉故東萊太守趙彭忠亮篤敏將軍若任之以鄴必能允副神規勒於是徵拜魏郡太守彭至泣而辭曰臣往曾策名晉室食其祿矣且受人榮寵復事二姓者臣志所不為且豈愚臣之狷志恐亦明公之所不許有死而已未敢聞命若賜其餘年全臣一介之願者則明公大造也於是賜安車駟馬養以卿秩又蜀志曰李安字武龍少養外家羅氏元康八年避地入蜀從李特征伐以勇烈聞李驤引為帳下督數有戰功甚信愛之羅尚之遣隗伯攻郫也驤逆戰不利被傷落馬臥未能起士衆皆散唯安與任回在左右伯從數千騎來叱安曰羅武龍吾所取有人卿宜避我嗔目呵之曰吾不相與因前馬剌之伯逡巡而退又前涼録曰張世度燉煌人幼以孝讓著稱遊學京師遇中州大疫鄉人宗族死于京師數十人世度年十六收恤殯葬識者嘉之吳均齊春秋曰上不豫南康王綝於弟賜死獨江泌守尸晝夜號泣悲動路人于時諸王並見誅剪故舊無敢瞻看唯泌及衡陽王子浚侍讀嚴植各為營理喪事時人高其節泌字士清濟陽人也後魏書曰陽固字敬安北平無終人性俶儻不拘小節博覽篇籍有文才清河王懌辟太尉從事中郎懌為元乂所害朝野震悚懌諸子及門生僚吏莫不慮禍隱避不出固獨詣喪所盡哀慟哭良久乃還僕射游肇聞而嘆曰雖欒布王修何以尚也唐書曰李密既降徐績尚守黎陽倉謂長史郭恪曰魏公既歸于唐我士衆土地皆魏公之有也吾若上表獻之即是自邀富貴吾所恥也今宜具録以啓魏公聽公自獻則魏公之功也及使者至高祖無表甚怪之使者具以聞高祖大悅曰徐績感德推功真忠臣也即授黎州總管賜姓李氏又曰李綱孫安仁永徽中為太子左庶子屬太子被廢歸于陳邸宮寮皆逃散無敢辭送者安仁獨泣涕拜辭而去朝野義之後卒於恆州刺史又曰王義方泗州漣水人也少孤貧事母甚謹博通五經而謇傲獨行初舉明經因詣京師中路逢徒步者自云父為頴上令聞病篤倍道將往焉徒步不前計無所出義方所乘馬與之不告姓名而去老子曰大道廢有仁義又曰失道而後德失德而後仁失仁而後義失義而後禮文子曰世治則以義衛身世亂則以身衛義又曰體君臣正上下明親踈存危國繼絶世立無後者義也墨子曰墨子之齊遇故人故人曰今天下莫為義獨子為義不若己墨子曰今有子十人一人耕九人處耕者不可以不急何則食者衆而耕者寡也今天下莫為義子宜勸何以止我又曰世俗君子視義士不若視負粟者今有人負粟息於路側欲起而不能君子見之無長少貴賤必起之何也曰義也今為義之君子奉承王之道以語之縱不悅而行又從而非毀之則是世俗之君子之視義士也不若視負粟者列子曰桀紂唯重利而輕道是以亡人而無義唯食而已是雞狗也強食磨角勝者為利是禽獸也為雞狗禽獸而欲人之尊己不可得也孟子曰魚我所欲熊掌亦我所欲二者不可兼舍魚取熊掌生亦我所欲義亦我所欲二者不可得兼舍生取義孫卿子曰仁義禮善之於人也譬之貨財粟米之於家也多有之者富少有之者貧至無有者窮六韜曰義之所在天下歸之尸子曰賢者之於義曰貴乎義乎曰義是故堯以天下與舜曰富乎義乎曰義是故子罕以不受玉為寶曰生乎義乎曰義故務光投水而殪三者人之所重而不足以易義又曰十萬之軍無將軍必大亂夫義萬事之將也國之所以立者義也人之所以生者亦義也又曰莒有石焦原廣數尋長五十步臨百仞之溪有以勇見莒公者卻行劑踵焉莒國莫之敢近已獨劑踵焉所以服莒國也夫義之為焦原也亦高矣是故賢者之於義也必且劑踵焉所以一世也韓子曰義者君臣上下之禮父子貴賤之差也賈誼書曰齊桓公之始霸翟人伐燕桓公為燕北伐翟至孤竹桓公歸燕君送入齊地百六十里問於管仲曰禮諸侯相送固出境乎管仲曰非天子不出境公曰然則燕君畏而失禮也寡人恐後世以寡人為能存燕而欺之也乃令燕君旋車割燕君所至而與之諸侯聞桓公之義而皆服之淮南子曰君子非義無以生失義則失其所以生小人非嗜欲無以活失嗜欲則失則所以活故君子懼失義小人懼失利監鐵論曰阻險不如阻義也新序曰白公勝既殺令尹司馬欲立王子閭以為王王子閭不肯劫之刃王子閭曰見國滅而忘王不仁劫白刃而失義不勇吾雖死不豫從也白公強之不可遂縊而殺之新序曰白公之難楚人有莊善者辭其母曰棄其親而死其君可謂義乎莊善曰吾聞事君者內其祿而外其身今所以養母者君之祿也身安得無死乎遂辭而行比至公門三廢車中其僕曰子懼矣何不及乎莊善曰懼者吾私也死君公義也吾聞君子不以私害公遂刎剄而死風俗通曰巴郡太守太山任望字伯闓為司徒掾同産弟子殺人繫獄望自劾去星行電征便道詣府露首肉袒辭謝太守李固請與相見望頓頭流血自說弟薄命早亡以遺孤為託望失義方之教自陷罪惡息男國既豫知情幸有微胤乞以代之言甚哀切李公於是原活出之又曰俗說齊人有空車行魯人有負釜者便持釜置車中行二百里臨別取釜不相問亦不謝後車家繫獄當死釜主徑往篡之穿壁未達曰極哉車者怒不肯出釜主慚欲俱死明日主者以事白齊君齊君義而原之說苑曰子路曰不能甘勤苦不能恬貧窮不能輕死亡而曰我行義吾弗信也又曰燕昭王使樂毅伐齊閔王亡燕之初入齊也聞蓋邑人王歇賢令軍曰環蓋邑三十里母入以歜之故已而使人謂歜曰齊人多高子之義吾以子為將封子萬家歜固謝燕人曰子不聽吾引三軍而屠蓋邑王歜曰忠臣不事二君貞女不更二夫齊王不聽吾諫故退而耕於野國既亡吾不能存今又劫之以兵為君將是助桀為暴也生而無義固不如烹遂懸其脰樹枝自奮絶脰而死齊士大夫聞之曰王歜布衣猶不皆齊向燕況在位食祿者乎乃相藂如莒求諸公子立為襄王又曰左儒友於杜伯皆臣周宣王宣王將殺杜伯而非其罪也左儒爭之于王九復之而王不許也王曰別君而異友斯汝也左儒對曰臣聞之君道友逆則順君以誅友友道君逆則率友以違君王怒曰易而言則死左儒對曰臣聞古之士不枉義以從邪不易言以求生故臣能明君之過以死杜伯之無罪王殺杜伯左儒死之說苑曰佛肸以中牟縣叛設祿邑炊鼎曰與我者受邑不與我者烹中牟之士皆與之城北餘子田基獨後至祛衣將入鼎曰田基之義軒冕在前非義不乘斧鉞於後義死不避遂祛衣將入鼎佛肸止之趙簡子屠中牟得而取之論有功者用田基為始基曰吾聞廉士不恥人如此受中牟之功則中牟之士終身慚矣遂襁負其母南徙於楚楚王高其義待以司馬新序曰白公勝拔劍而屬之於屈盧曰子與我將捨之不與我將殺之屈盧曰吾聞之知命之士見利不動臨死不恐為人臣者時生則生時死則死是謂之禮故人知天命下知人臣之道其有可劫乎子不推之白公勝乃入其劍汝南先賢傳曰王恢字仲通太守郭紆同為主簿詔書發筋角紆親里竟辜較之恢諫紆曰明府為藩屏大臣事當從公聽恣私曲何以為治紆不從有告言之者詔書案問事當傳考紆見恢曰太守負君今當何以圖之恢曰明府不須為憂明府年六十恢年七十先明府生十有餘年不於今日效命將復何有遣詣考所自引受罪言太守不知之因鬱氣不食而死郡以無事廣州先賢傳曰尹牙字猛德合浦人太守南陽終寵憂見顏色常用怪焉牙造𣍿伏見明府四節悲歎有慘瘁之思者何也寵曰父為周張所害重仇未報是以長愧也牙乃傭僕自貶吏役而至于宛陵與張校圉交通竭節於張伺其間隙出入三年乃先醉張左右近侍以夜解縱諸馬令之亂駭張果出問其故牙因手刃張首而還楚國先賢傳曰應余字子正為郡公曹是時吳蜀不賓山民背叛余與太守東里袞逃竄得出賊便射袞余以身當箭被七瘡因謂賊曰我以身代君已被重瘡若身死君全殞歿無恨因仰天號泣涕血俱下如雨賊見其義烈釋袞不害會稽典録曰張京從戎西州軍罷還歸各給車牛京同里寡母與三子從軍子各物故見京還不能自致悲傷歔欷京以載之牛羸道死京入轅引軛妻子單步又曰孟英字公房上虞人為郡掾史王憑坐罪未應死太守下縣殺憑憑家詣闕稱冤詔書下州撿栲英出定文書悉著英名楚毒慘至辭色不變言太守病不關衆事英以冬至日入占病因竊印以封文書下縣殺憑非太守意也繫系歷冬夏肉皆消爛遂不食而死豫章志曰龔碩字顯先為下江督郵太守會稽謝斐獲罪於時大皇帝幸尋陽碩乃具作章陳斐事候大駕於道叩頭流血時大風寒雪之後血流成冰上乃為之住駕省章斐事見理繁欽丘俊碑曰故右扶風都尉主簿有者從都尉討叛胡官兵敗績卒伍奔散都尉臨陳墮馬俊於是下馬授甲以身禦寇遂致死戰場都尉乘俊馬得免桂陽先賢畫讚曰朱陽羅陵果而好義郡汲府君為州章陵被掠栲參加五毒援刀截舌以著盤中獻之廷尉群公義之事得清理會稽先賢傳曰陳業字文理郡守蕭府君卒業與書佐魯雙率禮送喪雙道溺于水業因掘泥楊波搖出其尸又業兄度海復見傾命時同依止者乃五六人骨肉消爛而不可記別業仰皇天誓后土曰聞親戚者必有異焉因割臂流血以灑骨上應時得血住餘皆流去續齊諧記曰田真兄弟三人家巨富而殊不睦忽共議分財金銀珍物各以斛量田業生資平均如一唯堂前一株紫荊樹花葉美茂共議欲破為三人各一分待明就截之爾夕樹即枯死狀火燃葉萎枝摧根莖燋焠真至攜門而往之大驚謂語弟曰樹本同株聞當分析所以燋悴是人不如樹木也因悲不自勝便不復解樹樹應聲遂更青翠華色繁美兄弟相感更合財産遂成純孝之門真以漢成帝時為太中大夫西京雜記曹敞在吳章門下時輩謂敞好斥人過為輕薄世人皆以為然及章後為王莽所殺門生無敢收葬者皆更易姓名以從他師敞時為司徒掾獨稱章弟子收而葬之方知諒直者不見容於凡輩矣平陵人生立敞碑於吳墓在龍首山南嶺上汝南先賢傳曰闞敞字子張平輿人仕郡為五官掾時太守第五常被徵臨發倉卒有俸錢百三十萬留付敞敞埋著堂上遂遭世倉卒道路斷絶敞年老飢羸其妻曰第五府君所寄錢可取自給然後償之敞曰吾窮老何明當有用故君之財耶道通當送飢寒何損常舉門遭疫妻子皆死常病臨困唯有孤孫年九歲常謂之曰吾寄故五官掾平與闞敞錢三十萬氣遂絶後孫年長大步擔至汝南問敞敞見之悲喜與共臨發穽錢乃百三十萬孤孫曰亡祖臨終言有三十萬耳今乃百三十萬不敢當也敞曰府君病困氣索言謬誤耳郎無疑也傅子曰太祖既誅袁談梟其首令曰敢有哭之者戮及妻子於是王叔治田子泰相謂曰生受辟命亡而不哭非義也畏死亡義何以立世遂告其首而哭之哀動三軍軍正白行其戮太祖曰義士也赦劉彥明燉煌實録曰童巽字文舉學有才太守京兆諒舉巽上掾歷主簿功曹諒卒官巽衰絰經送喪道遇寇虜衆皆散走巽身蔽柩哭嘔血賊欲破棺巽叩頭救請頭破流血賊義而釋之由是顯名
