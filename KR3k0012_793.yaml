body:
  text: 西戎一惣序西戎易曰高宗伐鬼方三年克之鬼方西羌也書曰西戎即敘羡禹功也詩曰在其板屋亂我心曲西戎板屋也又曰自彼氐羌莫敢不來王爾雅曰西至於邠國極遠之國又曰西至日所入為太蒙即蒙汜也太蒙之人信禮曰西方曰戎被髮衣皮有不粒食者矣傳曰辛有適伊川見被髮而祭於野曰不及百年此其戎乎其禮先亡矣又曰秦晉遷陸渾之戎於伊川漢書曰西域以孝武時始通本三十六國其後稍分至五十餘皆在胸奴之西烏孫之南南北有大山中央者河東西六千餘里南北千餘里東則接漢限以玉門陽關西則限以蔥領漢史曰出陽關自近者始曰婼羌婼音而遮切婼羌國王號去胡來王言去離胡戎來附漢也又曰漢武帝征和中二師將軍李廣利以軍降胸奴帝既悔於征伐而搜粟都尉桑弘羊與丞相御史奏言故輪臺以東捷枝渠梨皆故國也輪臺渠地名今在交河北庭界廣饒水草有溉田五千頃以上處溫和田美可益通溝渠種五穀與中國同時熟田一歲有積穀募人壯健有纍重敢徙者詣田所纍重謂妻子家屬也就畜積為本業墾溉田稍築列亭連城西以威西關帝深陳既往之悔乃下詔曰前有司奏欲益人賦三十助邊用每口取錢三十是重困老弱孤獨也由是不復出軍而封丞相車千秋為富民侯以明休息思富養人也後漢書曰西羌之本出自三苗蓋羌姓之別其國近南嶽及舜流四凶徙之三危河關之西南羌地是也濱於賜支至於河首綿地千里賜支者禹貢所謂析支者也南接蜀漢所居無常依隨水草地少五穀以産牧為業其俗人民氏族無定或以父名母姓為種號三二世後相與婚姻父沒則妻後母兄亡則納嫠嫂寡嫂曰嫠故國無鰥寡種類繁熾不立君臣無相長一強則分種為角酋豪弱則為附落更相抄暴以力為雄殺人償死無他禁令其兵長在山谷短於平地不能持久而果於觸突以戰死為吉利病終為不祥甚耐寒苦同之禽獸雖婦人産子亦不避風雪性堅固勇猛得西方金行之氣焉王政修則賓服德教失則寇亂又曰昔夏后氏太康失國四夷背叛及后相即位乃征畎夷七年然後來賓又曰武乙暴虐犬戎寇邊周古公踰梁山而遊于歧下及子季歷遂伐西落鬼戎又曰文王為西伯西有昆夷之患北有獫狁之難遂攘戎狄西戎之國莫不賓服又曰穆王時戎狄不貢王乃西征犬戎獲其五王又得四白鹿四白狼王遂遷戎于太原又曰平王之末自隴山以東及乎伊洛往往有戎於是渭有狄獂獂音花邽冀之戎涇北有義渠之戎洛川有大荔之戎渭南有驪戎伊洛間有楊拒泉皋之戎潁川以西有蠻氏之戎又曰晉文公欲修霸業乃賂戎狄通道以扶王室秦穆公得戎人由余遂霸西戎開地千里又曰陸渾之戎叛晉晉令荀吳滅之楚執蠻氏而盡囚其民又曰周貞王八年秦厲公滅大荔取其地趙亦滅代戎代戎即地戎也韓魏復共稍并伊洛陰戎滅之其遺脫者皆逃奔西踰汧隴自是中國無戎寇後漢書曰武帝時西域內屬有三十六國漢為置使者校尉領護之宣帝改曰都護元帝又置戊巳校尉屯田於車師漢官儀曰戊巳中央鎮覆四方也哀平間自相分割為五十五國又曰建武中西羌皆遣使求內屬願請都護世祖以天下初定未遑外事訖不許之又曰明帝命將北征胸奴取伊吾盧地置宜禾都尉以屯田遂通西域于闐諸國皆遣子入侍又曰建初元年春酒泉太守假彭大破車師於交河城章帝不欲疲弊中國以事夷狄乃迎還戊巳校尉不復遣都護二年復罷屯田又曰和帝永元三年班超遂定西域因以超為都護治龜茲復置戊巳校尉領兵五千人治車師又曰六年班超復擊破焉耆於是五十餘國悉納質內屬其條支安息諸國至于海濱四方里外皆重譯貢獻又曰九年班超掾甘英窮臨西海而還皆前世所不至山經所未詳莫不備其風土傳其珍怪焉於是遠國蒙奇兜勒皆來歸服班固西戎論曰孝武之代圖制胸奴患其兼從西國結黨南羌從音子容反乃表河西列四郡開玉門通西域以斷胸奴右臂隔絶南羌月氏單于失援由是遠遁而幕南無王庭因文景玄默養人天下豐富財力有餘士馬強盛故能賭犀布玳瑁則建朱崖七郡惑蒟音矩醬竹杖則開牂柯越嶲聞天馬蒲陶則通大宛安息自是之後萬里相奉師旅之費不可勝計至於用度不足乃攉酒酤管鹽鐵鑄曰金皮弊算至車船租及六畜人力屈財竭困之加凶年群盜並起自以末年遂棄輪臺之地而下哀痛之詔豈非仁聖之所悔哉且西域近有龍堆遠則蔥嶺身熱頭痛懸度之厄淮南杜欽揚雄之論皆以為此天地所以界別區域絶外內也書云西戎即序禹就而序之非止威服致其貢物也魏徵西戎論曰自古開遠夷通絶域必因宏放之主皆起好事之臣張騫鑿空於前班超投筆於後或結之重寶或攝之利劍投軀萬死之地以立一朝之功皆由主尚來遠之名臣徇輕生之節是知上之所好下必有甚焉者也煬帝規摹宏侈掩吞漢外裴矩方進西域圖記以蕩其心故萬乘親出玉門關置伊吾且末郡而關右暨於流沙騷然無聊生矣古哲王之制方五千里務安諸夏不事要荒豈威不能加德不能被蓋不以四夷勞中國不以無用害有用也是以秦成五嶺漢事三邊或道殣相繼或戶口減半隋室恃其強盛亦狼狽於青海此皆一人失其道故億兆罹其毒也説文曰羌西婼羌戎牧羊人從人牧羊漢書曰出陽關自近者始曰婼羌國王號去胡來王去陽關千八百里去長安六千三百里西接且末隨畜逐水草不田作仰鄯善且末穀山有鐵自作兵有弓矛服刀劍劉德曰服刀拍髀也師古曰指音貊髀音俾又音陛鄯善漢書曰鄯善國本名樓蘭王治杆泥城杆音烏輔國侯卻胡侯鄯善都尉擊車師都尉左右且渠擊車師君各一人譯長二人又曰鄯善地沙鹵少田寄田仰穀旁國國出玉多葭葦柳柳胡桐白草孟康曰白草草之白者也胡桐似桑而多曲師古曰胡桐淚可以汗金銀今工匠皆用之民隨畜牧逐水草有驢馬多橐他師古曰他古他字也又曰武帝遣從票侯趙破奴將屬國騎及郡兵數万擊姑師虜樓蘭王破如師於是漢列亭鄣至玉門矣又曰樓蘭國最在東垂近漢當白龍堆乏水草常主發導負水擔糧送迎漢使又曰元鳳四年大將軍霍光白遣平樂監傳介子往刺其王介子輕將勇敢士齎金幣楊言以賜外國為名既至樓蘭詐其王欲賜之王喜與介子飲醉將其王屏語壯士二人從後刺殺之貴人左右皆散走介子告諭以王負漢罪天子遣我誅王當更立王弟尉屠耆在漢者漢兵方至毋敢動自令滅國矣介子遂斬王嘗歸首嘗歸者其王名也馳傳詣闕懸首北闕下封介子為義陽侯乃立尉屠耆為王更名其國為鄯善為刻印章賜以宮女為夫人備車騎輜重丞相將軍百官送至橫門外橫音光祖而遣之北史曰鄯城方一里地多沙鹵少水草北即白龍堆路後魏孝文太和四年遣其弟素延耆入侍于闐漢書曰于闐國王治西域去長安九千六百七十里于闐之西水皆西流注海其東流注澤河源出焉多玉石玉石玉之璞也後漢書曰于闐去洛陽万一千七百里建武末莎車王賢強盛攻并于闐徙其王俞林為驪歸王明帝永平中于闐將休莫霸及莎車自立為于闐王休莫霸死兄子廣德立後遂滅莎車其國轉盛北史曰于闐國在蔥嶺之北二百餘里所都城方八九里城東三十里有首拔河中出玉石土宜五穀并桑麻山多美玉有好馬駝騾其刑法殺人者死也又曰于闐俗重佛法寺塔僧尼甚衆王尤信尚每設齋日必親自灑掃饋食焉城南五十里有贊摩寺即昔羅漢比丘盧旃為其王造覆甕浮圖之所石上有辟支佛跣處雙迹猶存西有比摩寺云是老子化胡成佛之所又曰于闐城東二十里有大水北流號樹枝水即黃河也又曰後魏文獻末蠕蠕冠于闐于闐患之遣使素目伽上表求救帝詔以遐阻不行又曰後周武帝建德三年其王遣使獻名馬隋大業中頻遣朝貢其王姓王字早示門練錦帽金鼠冠妻戴金花其王髮不令人見俗言若見王髮其年必儉梁書曰武帝天監十三年王遣使獻娑羅婆步鄣十八年又獻琉琉罌唐書曰其國出美玉王姓尉遲名屋密貞觀六年遣使獻玉帶太宗優詔答之大秦後漢書曰大秦國一名黎鞬在海西地方數千里以石為城郭列置郵亭堊塈之又曰民俗力田蠶桑皆髡頭而衣文繡乘輜軿白蓋小車出入擊鼓建旌旗幡幟又曰王宮室皆以水精為柱食器亦然又曰其人民皆長大平正有類中國故謂之大秦國多金銀奇寶有夜光璧明月珠駭雞犀珊瑚虎魄琉璃琅玕織成金縷罽雜色綾作黃金塗火浣布又曰合會諸香煎其汁以為蘇合以金銀為錢銀錢十當金錢一又曰桓帝延熹九年大秦王安敦遣使自日南徼外獻象牙犀角玳瑁始一通焉又曰其國無盜賊而道多猛獸師子遮害行旅不百餘人齎兵器輒為所食又有飛橋數百里可度海魏略曰其國中山出九色次玉石一曰青二曰赤三曰黃四曰白五曰黑六曰緑七曰紫八曰紅九曰紺多神龜朱鬣馬玄熊赤白黑黃青緑紺縹紅紫十種琉璃通典曰國之西南漲海中可七八百里行到珊瑚淵水底有盤石珊瑚生其上大秦人常乘大舶載鐵網令工沒先入視之可下網乃下初生白而漸漸似園生茅中歷歲許出網目間變作黃色枝條交錯高極三四尺大者圍尺餘三年色乃赤好後沒視之知可採便以鐵鈔發其根乃以索繫網使人於舶上絞車舉去還國理載恣意所作若失時不舉便蠹敗龜茲北史曰龜茲國在尉犁西北白山之南一百七十里王姓白即後涼呂光所立白震之後其王頭繫綵帶垂之於後坐金師子床又曰出細氈饒銅鐵鉛麋皮氍毹沙鹽緑雌黃胡粉安息香等又曰其國北大山中有如膏者流出成川行數里入地狀如醍醐服之髮齒已落者能令更生癘人服之皆愈唐書曰龜茲有城郭男女皆剪髮垂與項齊唯王不剪髮以錦蒙頂著錦袍金寶帶坐金師子床有良馬封牛饒蒲萄酒又曰貞觀四年遣使來獻馬太宗賜以璽書撫慰甚厚自此朝貢不絶又曰貞觀二十年太宗遣左驍衛大將軍阿史郍杜爾安西都護郭孝恪率五將軍發鐵勒十三部兵以伐龜茲禽其王及大將羯獵顛等并破其大城五所虜男女數萬口勒石紀功而旋俘其王訶黎布失畢及郍利羯獵顛等獻於社廟尋以訶黎布失畢為左武翊衛中郎將郍利以下授官各有差又曰先是太宗既破龜茲移置安西都護府於其國城以郭孝恪為都護兼統于闐踈勒碎葉謂之四鎮高宗嗣位不欲廣地勞人復命有司棄龜茲等四鎮移安西依舊西州又曰長壽元年武威軍惣管王孝傑阿史郍忠節大破吐蕃克復龜茲于闐等四鎮自此復於龜茲置安西都護府用漢兵三萬人以鎮之則天時有田楊名中宗時有郭元振開元初則張孝嵩杜暹等為安西都護皆有政績為夷人所伏天笁後漢書曰天竺國一名身毒在月氏東南數千里卑濕暑熱其國臨大水乘象而戰修浮圖道不殺伐遂以成俗出象犀玳瑁金銀諸香石密黑鹽等又曰明帝夢見金人長大項有光明以問群臣或曰西方有神名曰佛其形長丈六尺而黃金色帝於是遣使天竺問佛道法遂行於中國圖畫形象焉南史曰梁天監初王來貢獻王有螺髻於頂餘剪之穿耳垂璫俗多徒跣衣重白色有文字或善天文算曆之術其人皆學悉曇章書於貝多葉樹之北史曰天竺國去代三萬一千五百里有伏醜城周匝十里城中出摩尼珠珊瑚城東三百里有拔賴城城中出黃金白真檀赤檀石蜜唐書曰中天竺其都城周回七十餘里北臨禪連河云昔有婆羅門領徒千人隸業於樹下樹神降之遂為夫婦宮室自然而立僮僕甚盛於是使役百神築城以統之經日而就此後有阿育王頗行苛政置炮烙之刑謂之地獄今城中見有迹焉又曰武德中其國大亂其嗣王尸羅逸多練兵聚衆所向無敵象不解鞍人不釋甲居六載而四天竺之君皆北面以臣之威勢遠振政刑甚肅貞觀十五年尸羅逸多自稱摩伽陀王遣使朝貢太宗降璽書慰問尸羅逸多大驚問諸國人曰自古曾有摩訶振且使人至吾國乎皆曰未之有也乃膜拜而受詔書因遣使朝貢太宗以其地遠禮之甚厚復遣衛尉丞李義表報使尸羅逸多遣大臣郊迎傾都邑以縱觀焚香夾道逸多率其臣下東面拜受勑書復遣使獻大珠及鬱金香菩提樹又曰貞觀十年沙門玄奘至其國將梵本經論六百餘部而歸先是遣右率府長史王玄策往使天笁其四天笁王咸遣使朝貢會中天竺王尸羅逸多死國中大亂其弟阿羅郍順篡立乃盡發胡兵以拒玄策玄策戰不敵乃拔身宵遁走至吐蕃發精鋭一千二百人并埿婆羅國七千餘騎以從玄策與副使蔣師仁率二國兵進至中天笁國城連戰三日大破之斬首三千餘級赴水溺死者且萬人阿羅郍順棄城而遁師仁進兵擒獲之虜男女萬二千人牛馬三萬餘頭匹於是天笁震懼俘阿羅郍順以歸二十二年至京師太宗大悅命有司告宗廟因謂群臣曰夫人耳目玩於聲色口鼻耽於臭味此乃敗德之源若婆羅門不劫掠我使人豈為俘虜邪昔中山以貪寶取弊蜀侯以金牛致滅莫不由之拜玄策朝散大夫是時就其國得方士郍羅邇婆寐自言壽二百歲云有長生之術太宗深加禮待館之於金颷門內造延年之藥令兵部尚書崔敦禮監主之發使天下採諸奇藥藥成竟服不效後放還本國又曰關元八年南天竺國遣使獻五色能言鸚鵡異物志曰天竺大國也方三萬里佛道所在其國王治城郭宮殿皆雕文刻縷鍾鼓音樂跳丸躍劍通典曰後魏宣武時南天竺國遣使獻駿馬云其國出師子𤟤𤟤胡昆切有火齊如云母而色紫列之則薄如蟬翼積之則如紗縠之重呇有金剛似紫石英百鍊不銷可以攻玉
