body:
  text: 羽族部八鵲禮記月令曰季冬之月鵲始巢詩曰鵲巢夫人之德也國君積行纍功以致爵位夫人起家而居有之又曰鵲之疆疆鶉之奔奔又曰防有鵲巢卭有旨苕誰侜豫美心焉忉忉爾雅曰鵲鵙鵙醜其飛翪郭璞注曰醜類也翪竦翅上下易通卦驗曰鵲者陽鳥先物而動先事而應見於木風之象今失節不巢陽氣不通故言春不東風也周書曰小寒之日鵲始巢漢書梅福傳云今陛下既不納天下之言又加戮焉夫鳶鵲遭害則仁鳥增逝魏志曰管輅至安德令劉長仁忽有鳴鵲來在閣屋上其聲甚急輅曰鵲言東北一婦昨殺夫牽引西家人離婁候不過日在虞淵之際告者至矣到時果有東北同伍民來告鄰婦手殺其夫詐言西家人與夫有嫌殺我壻也吳志曰赤烏十二年有兩烏銜鵲墮東觀權使領丞相朱據燎鵲以祭又曰孫和為南陽王之長沙行過蕪湖有鵲巢於帆牆故官僚皆憂慘以為牆木傾危之象晉書曰王澄為荊州將之鎮送者傾朝澄見樹上鵲巢便脫衣上樹探𪆪而弄之神氣肅然傍若無人又曰涼李歆時通街大樹上有烏鵲爭巢鵲為烏所殺宋書曰徐羡之拜司空有雙鵲於太極殿東鴟尾鳴喚後魏書曰李崇為楊州刺史時有泉水湧於八公山頂壽春城中有魚無數從地湧出野鴨群飛入城與鵲爭巢北齊書曰武衛奚永洛與河內人張子信對坐有鵲鳴於庭樹鬭而墮焉子信曰鵲言不善向夕若有風從西南來歷樹拂堂角則有口舌事今夜有人喚必不得往子信去後果有風來至夜高儼使召永洛且云勑喚永洛欲赴其妻苦留稱墮馬腳折遂免於難又曰李孝貞字元操信州刺史希禮之子也嘗詠鵲其佳句云東立朝雨霽南飛夜月明為知音所賞隋書曰郭俊字弘文太原人家門雍睦七葉共居犬豕同乳烏鵲通巢時人以為義感州縣上其事上遣平昌公宇文㢸房密切詣其家勞問之御史柳彧巡省河北表其門閭又曰翟普林父母俱終哀毀殆將滅性廬於墓側有二鵲巢其廬前樹每入其蘆馴狎無所驚懼唐書曰高祖圍堯君素於蒲州糧盡人相食有烏鵲巢其發石車之上人心遂離為李楚客斬首傳之京師又曰大曆八年夏四月乾陵上仙觀天尊殿有雙鵲銜柴及泥補葺殿之隟壞凡一十五處宰臣等上賀曰臣聞孝至於天則祥發陵邑德被於物則化及鳥獸伏惟陛下因心廣教弘道極和時殷霜露之恩流行雲雨之澤故前聖垂裕歆於明誠皇天報貺錫以嘉應異鵲來感翔集可窺跡比人謀事歸神化望宣示中外編諸史冊又曰貞元四年中書省梧樹上有鵲以泥為巢又曰竇申宰相參之族子參特愛申每議除授多詢於申申或泄之以招權受賂每所至人謂之喜鵲又曰開成二年三月真興門外鵲巢於古冢莊子曰至德之世烏鵲之巢可攀援而窺之又曰鵲上高城之絶而巢於高樹之顛城壞巢折陵風而起故君子之居世也得時則義行失時則鵲起也又曰莊周遊乎雕陵之樊樊藩也遊於栗園籬之內覩一異鵲自南方來翼廣七尺目大運寸可曲一寸感周之顙而進於栗林感觸孫卿子曰古之王者其政好生惡殺烏鵲之巢可俯而窺淮南子曰鵲巢知風之所起言鵲作巢向風之所起為戶一說云背風所起也又曰乾鵠知來而不知往此修短之分也乾鵠鵲也見人有吉事之微則修修然凶事之徵則鳴啼是知來歲多風則巢於下枝而童子乃採其卵是不知各有所能故曰長短之分也又曰鴈北向鵲始加巢鴈在彭蠡皆北面徵陽將來北過鵲感陽而動乃上加巢又曰赤肉懸則烏鵲集鷹隼鷙則衆鳥散物之散藂交感以然淮南萬畢術曰鵲腦令人相思取鵲一雄一雌頭中腦燒之於道中以與人酒中飲則相思穆天子傳曰西王母還歸世民謠憂以吟曰徂彼西土爰居于野豹虎為群於鵲與處於讀為烏嘉命不還我惟帝女東方朔別傳曰孝武皇帝時間居無事燕坐未央前殿天新雨止當此時東方朔執戟在殿階傍屈指獨語上從殿上見朔呼問之生獨所語者何也朔對曰殿後柏樹上有鵲立枯枝上東嚮而鳴也帝使視之果然問朔何以知之對曰以人事言之風從東方來鵲尾長傍風則傾背風則蹶必當順風而立是以知也西京雜記曰樊將軍噲問陸賈曰自古人君皆云有瑞應豈有是乎賈曰有之軋鵲噪而行人至蜘蛛集而百事喜況人君重位乎五行傳曰昭帝元鳳中有烏鵲鬭於燕王池上烏墮地烏類君之象說文曰鵲知太歲之所在鹽鐵論曰中國所鮮外國賤之崑山之旁以玉璞抵烏鵲魏太祖詩曰月明星稀烏鵲南飛繞樹三匝何枝可依博物志曰鵲巢開口背太歲此非才知任自然也崔豹古今注曰鵲一名神女王子年拾遺録曰圓嶠之山名環丘上有方湖千里多大鵲高一丈群飛於湖際銜不周之粟於環丘之上郭子橫洞冥記曰帝解鳩鴻之刀以賜東方朔刀長三尺朔曰此刀採首山之金鑄為此刀雄者以飛雌者獨在金出九陽清溪有鵲銜火於清溪之上廣異記曰南方赤帝女學道得仙居南陽愕山桑樹上正月一日銜柴作巢至十五日成或作白鵲或女人赤帝見之悲慟誘之不得以火焚之女即升天因名帝女桑今人至十五日焚鵲巢作灰汁浴蠶子招絲象此也式經三十六禽變曰酉為烏鵲五行書曰燒鵲置酒中令家無盜賊山鵲爾雅曰鸒山鵲郭璞注曰似鵲而有文彩長尾觜腳皆赤鸒胡礭切說文曰鸒山鵲知來事也搜神記曰常山張皓為梁相天新雨後有鳥如山鵲稍下墮地民爭取即化為一員石皓椎破之得一金印文曰忠孝侯印皓以上聞藏之祕府皓後官至太尉鳩左傳曰郯子云少皞時祝鳩氏司徒者也鶻鳩氏司事者也五鳩鳩民者也杜預注曰祝鳩鷦也鷦鳩孝故為司徒主教民鶻鳩春來冬去故為司事治民欲藂故以鳩為名也禮記月令曰仲春之月鷹化為鳩又曰季春之月鳴鳩拂其羽鄭玄云鳴鳩飛旦翼相擊趣農急也詩曰翩翩者騅毛云夫不也詩義疏曰令小鳩也一名取夫一名䳕鳩幽州謂之佳或謂雕梁宋佳陽謂之佳也又曰宛彼鳴鳩毛云鶻鷞也詩義疏曰班鳩也月令鳴鳩拂其羽是也佳陽人謂之班佳也爾雅曰隹其鳺鴀鶌鳩鶻鵃鴡鳩王睢郭璞注曰鳺鴀今䳕鳩似山鵲短尾青黑色多聲江東亦名曰鶻鵃睢鳩王睢雕類江東呼鶚好在江渚山邊食魚毛詩傳曰鳥驚而有則孫炎曰鳺鴀一名祝鳩鶻鳩一名鳴鳩犍為舍人曰鳺鴀楚鳩今梁謂之班鳩也鵲音鶻周書時訓曰穀雨之日又五日鳴鳩拂其羽鳴鳩不拂其羽國不治兵後漢書曰楊由從人飲勑諸生酒三行嚴車去請問其趣由曰向社中木上有鳩鳥鬭兵之象由去後舍中有鬭者果殺二人也魏志曰管輅至郭恩家有飛鳩來在梁頭鳴甚急輅曰當有老公從東方來候肫一頭酒一壺主人雖喜當有小故明日果有客如所占而射雞作食箭從樹間激中數歲女子流血驚怖梁書曰庾子與父域為巴西守卒於郡子與奉喪還鄉初發蜀有雙鳩巢舟中及至又栖廬側每聞哭泣之聲必飛翔簷宇悲鳴激切隋書曰李得饒性至孝父寢疾輒終日不食及丁憂水漿不入口五日後甘露降其庭樹有鳩巢其廬孔叢子曰邯鄲人正旦獻鳩於趙簡子厚賞之客曰正旦放鳩厚恩也得賞競捕之不如勿賞簡子曰善搜神記曰長安有張氏者晝獨處空室有鳩自外入止乎床張氏惡之披懷而祝之曰鳩今來為我禍耶飛上承塵為福耶來入我懷鳩飛入懷以手探之則不知鳩之所在而得一金帶鉤焉遂寶之自是之後子孫昌盛有為必偶資財萬倍蜀客至長安中聞之乃厚賂婢婢竊鉤以與蜀客張氏既失鉤漸漸衰耗而蜀客亦數罹窮厄不為己利或告之曰天命也不可以力求於是賚鉤以反張氏復昌故關西稱張氏鉤說苑曰梟逢鳩鳩曰子安之梟曰我將東徙鳩曰何之梟旦鄉人惡吾鳴鳩曰子改鳴則可不能改鳴徙猶惡子之聲論衡曰夫令鳩雀施氣於鴈鵠終不成子者何也鳩雀之身小鴈鵠之形大廣雅曰良皋鳩也骨鵃鳻鳩也役鳩蔡鳩辟皋浮鳩鵴鳩也琴操曰舜耕歷山思慕父母見鳩與母俱飛鳴相哺食益以感思乃作歌地理志曰滎陽有井漢王避項羽於中雙鳩飛集井上羽以為無人故沛公得免因以為名故漢世正旦放鳩為此也焦贛易林無妄之明夷曰千雀萬鳩與鷂為仇威勢不敵雖衆無益益部耆舊傳曰廣漢景毅為益州太守鳩巢於廳事雛卵孕育阮籍鳩賦序曰嘉平中得兩鳩子常食以黍稷後卒為狗所殺故為作賦傅咸鳩賦序曰余舍下種楸蔚然成林間居無為有時遊之顧見班鳩音聲可悅於是捕而畜之既而馴擾偶出之籠無何失之其後時時一來飛翔低徊似有獓焉故聊為之賦摯虞槐賦曰春栖教農童鳩孫氏瑞應圖曰白鳩成湯時來王者養耆老尊道德不以新失舊則至崔豹古今注曰平帝元始二年濟南鳩生白子吳録曰赤烏十二年八月白鳩見章安魏略曰文帝欲授禪郡國奏白鳩十九見張升白鳩頌序曰陳留郡有白鳩出於郡界太守命門下賦曹史張升作白鳩頌曰厥名梟鳩貌甚雍容丹青緑目耳象重重會稽典録曰皮延字叔然會稽山陰人養母至孝居喪有白鳩巢廬側遂以終喪又曰鄭弘遷臨淮太守郡民徐憲在喪致哀白鳩巢戶側弘舉為孝廉朝廷稱白鳩郎晉録曰大始八年白鳩二集太廟南門左左九嬪白鳩賦序曰太始八年鳩巢於廟闕而孕白鳩一雙毛色甚鮮晉金行之應也晉太康起居注曰白鳩見華林令孫邵以聞廣州先賢傳曰頓琦字孝異蒼梧人至孝母喪琦獨身立墳歷年乃成居喪踰制感物通靈白鳩栖息廬側見人輒去見琦而留又曰沛國戴文謀居陽城山有神降焉其妻疑是妖魅神已知之便去作一五色鳥白鳩數十從有雲覆之遂不見南史曰姚察丁後母杜氏喪解職在服制之中有白鳩巢于戶上方言曰䳕鳩自關而東周鄭之郊韓魏之都謂之鷱其𪁛鳩謂之鸊鷱自關西秦漢之間謂之鳩郭璞注云音掬其大者謂之頒音班鳩其小者謂之𪁛鳩今荊鳩也或謂之䳫音蔡鳩或謂之䳕鳩或謂之鶻鳩梁宋之間謂之鷦䲩傳曰鳲鳩氏司空者也毛詩義疏曰今江南鳥大如鳩而黃啼鳴相呼而不同集謂金鳥或云黃當為鳩聲轉故名移也又云鳲鳩一名爽鳩又云是鸇周禮夏官上羅氏曰仲春羅鳥獻鳩以養老因行羽物鄭玄曰春鷹為鳩與春鳥變舊為新宜以養老助生氣也爾雅曰鳲鳩鵠鳩郭璞注曰今之布穀江東呼獲穀千戴勝或云鸇謝氏曰布穀近也續漢書禮儀志曰仲秋之月縣道皆案戶民年始七十者授之以玉杖餔之以糜粥八十九十禮有加賜玉杖長九尺端以鳩為飾鳩者不噎之鳥也欲老人不噎所以愛民也魏書曰烏丸俗耕種常以穀鳥為候淮南子曰孟夏之月以熟穀米熟亦長也雄鳩長鳴為帝候歲鳩布穀也風俗通曰俗說高祖與項羽戰敗於京索遁藂薄中羽追求之時鳩正鳴其上追者以鳥在無人遂得脫後及即位異此鳥故作鳩杖以賜老者案少皞五鳩鳩民者藂民也周禮羅氏獻鳩養老漢無羅氏故作鳩杖以扶老楚辭曰進雄鳩之耿耿兮耿耿小節貌讒分分而蔽之言欲如進其耿雄鳩節之誠讒人尚復分耿小分高蔽而障之也又曰鳴鳩棲於桑榆言鳲鳩於桑榆之上奮翼得其所馮敬通與任武達書曰婦口如布穀孫卿子曰南方有鳥焉名曰蒙鳩以羽為巢而編之以髮繫之葦苕風至苕折子死卵破巢非不完也而繫者然南方草物狀曰番鳩生海邊土穴中里民常以臘月正月捕食味如蟹得過十餘不可復食合浦交址九真有之鷃左傳曰郯子云少皞鷙以鳥名官青鳥氏司啓者也杜預注曰青鳥鶬鷃也立春鳴立冬去爾雅曰䲩鷃也郭璞注曰今鷃雀也犍為舍人曰主趨民收麥不得晏起也說文曰鷃䲩也從鳥聲春秋考異郵曰水滅火故虻螫鷃宋均注曰鷃柔良之鳥鷃於水也春秋運斗樞曰機星散為鷃德義少殘百家則鷃無頭易通卦驗曰立春雨水鶬鷃鳴鄭玄云鷃蒼狀也廣志曰鷃常晨鳴如雞道路賈車以為行節出西方莊子曰窮髮之北有鳥焉其名曰鵬翼若垂天之雲搏扶搖羊角而上者九萬里斥鷃笑之曰我騰躍上不過數仞下翔蓬蒿之間此亦飛之至也而彼且奚適又曰載鼷以車馬樂鷃以鍾鼓國語曰晉平公射鷃使豎襄搏之失公怒將殺之叔向聞之夕公告叔向曰君必殺之昔吾先君唐叔射兕於徒林殪以大甲以封于晉今君射鷃鷃不死搏而不得是楊君恥也勿令遠聞公忸怩顏乃趣舍之注賈逵解曰徒林園中地也言唐叔有才藝封於晉呂氏春秋曰亂國之妖有雉生鷃車浚別傳曰鷃雀不能乘激風以飛䳚鴠方言曰周魏宋楚之間謂䳚鴠或謂之獨春自關而東謂之城旦或謂之倒懸或謂之瞗自關而西秦隴之內謂之䳚鴠郭璞注曰鳥似鴨五色各無毛赤裸晝夜鳴獨春好俯仰也倒懸好似懸於樹也廣志曰侃旦冬毛希夏毛盛禮記月令曰仲冬之月䳚鴠不鳴鄭玄曰曷旦求旦之鳥又曰詩云相彼盍旦尚猶患之盍旦夜鳴求旦之鳥也易通卦驗曰冬至曷旦不鳴鄭玄曰隨應尋至也八穴寒徵也說文曰鴠可旦也鹽鐵論大夫曰䳚鴠夜鳴無益於明周書時訓曰大雪之日䳚鴠不鳴䳚鴠猶鳴國多訛言
