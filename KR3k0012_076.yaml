body:
  text: 地部四十溝釋名曰田間之水曰溝溝者構也從橫相交構也爾雅曰溪注谷曰溝周禮曰匠人為溝洫九夫為井間廣四尺深四尺謂之溝方十里為城城間廣八尺深八尺謂之洫風俗通又載也傳曰梁伯好土功乃溝公宮又曰魯將與齊戰師不踰溝樊遲曰請三刻而踰之衆從之如樊遲約乃踰溝又哀元年吳城邗溝通江淮杜預曰於邘江築城穿溝東北通謝陽湖西北至末口入淮通糧道也今廣陵邘江是國語曰吳王夫差既殺申胥不稔於歲稔熟稱歲也乃起師北征開為深溝通於商魯之間開掘地商宋也北屬之沂西屬之濟以會晉定公于黃池論語曰禹盡力於溝洫史記曰漢王四年王軍廣武關中兵益出當此時彭越將兵居梁地往來弱楚兵絶其糧道齊王信又進擊楚項羽恐乃與漢王約中分天下割鴻溝而西者為漢鴻溝而東者為楚項羽歸漢王父母妻子軍皆呼萬歲羽解而東漢王欲引而西用張良陳平計乃進兵追項羽博物志曰徐偃王治其國仁義著聞欲周行上國乃通溝陳蔡之間得朱弓朱矢又曰酒泉延壽縣南有山石水出處如莒地為溝酈善長水經注曰高唐縣有甘棗溝水側多棗故俗取名溝焉殷氏世傳曰殷褒為榮陽令先多淫雨百姓饑饉君乃穿渠入河四十餘里疏導原隰用致豐年民賴其利號曰殷溝而頌之莊子曰尋常之溝洫巨魚無所還其體而鯢鰌為之制孟子曰思天下之民匹夫匹婦有不被堯舜之澤若已推內之溝中楊子圖經曰六合縣東三十里從岱石湖入四里至溝中心與陵分界案後漢書張綱為廣陵太守濟惠於百姓勸課農桑於東陵村東開此溝引湖水灌田以此號為張綱溝阮勝之記曰吳王濞開茱萸溝通運至海陵倉北有茱萸村以村立名故史記云邘溝即吳王夫差所開漕運以通上國崔豹古今注曰羊溝者言羊喜抵觸垣牆故為溝以隔之一曰植高楊於其上故謂之楊溝古詩曰今日斗酒別明日溝水頭蹀躞御溝上溝水東西流瀆禮記月令曰季春之月道達溝瀆開通道路爾雅曰溝注澮曰瀆水流不絶曰瀆漢舊儀曰祭四瀆用牲崔鴻十六國春秋前秦録曰建元十二年堅以關中水旱不時議依鄭白故事發王侯以下及豪強富民僮隸三萬人開涇水上源鑿山起堤通渠引瀆以溉田民賴其利伏滔北征記曰姑熟西北有甘寧墓孫皓時占者云墓有王氣皓鑿其後十許里曰直瀆越絶書曰銅沽瀆長一百五十步去縣二十里渠史記河渠書曰禹以為河所從來者高難以行平地數為敗乃釃二渠漢書音義曰釃分也以引其河載之高地過降水至于大陸播為九河也鄭國間說秦令鑿涇自中山南西交瓠口為渠溉斥鹵之地四萬餘頃收皆畝一鐘於是關中為沃野無凶年秦以為富強卒併諸侯因命曰鄭國渠漢書曰禹作二渠以引河武帝時穿渠水岸若崩乃鑿井深四十丈井下相通井渠自此始得龍骨名龍首渠起谷口入櫟陽注渭中因名渠民得其饒歌曰田於何所池陽谷口鄭國在前白公起後舉鍾為雲決渠為雨又曰張掖郡有千金渠范曄後漢書曰樊密所起廬舍皆有深堂高閣陂渠灌注又池魚牧畜有求必給魏志曰遼西單于踏頓尤強公將征之鑿渠自滹沱入泒水名平虜渠又從泃河口鑿入潞河名泉州渠以通海又曰建安十八年九月鑿渠引漳水入白溝以通河又曰賈逵為豫州刺史通運渠二百餘里所謂賈侯渠北史曰郭衍為開漕渠大監部率水工鑿渠引渭水經大與城北東至于潼關漕運四百餘里關中賴之名曰富人渠隋書薛胄為兗州刺史先是兗州城東沂泗二水合而南流泛濫大澤中胄遂積石堰之使決令西注陂澤盡為良田又通轉運利盡淮海百姓賴之號為薛公豐兗渠唐書曰溫造為朗州刺史在任開後鄉渠九十七里溉田二千頃郡人獲利乃名為右史造自起居舍人出郡水經注曰漢司空漁陽王梁之為河南也將引穀水以溉京師渠成而水不流故以坐免後張純堰洛以通漕洛中公私懷贍是以渠今引穀水蓋純之創也又曰漢明帝之世司徒伏恭薦王景善能治水顯宗詔與謁者王吳始作浚儀渠吳用景法水乃不害此即景作所修故瀆也渠流東注浚儀故復謂之浚儀渠也明帝十五年東巡狩至無鹽帝嘉景功拜河隄謁者又曰魏武帝又堰漳水回流東注世號天井堰二十里中作十二墱墱相去三百步令互玄相灌注一原分為十二流皆懸水門自城西東入徑銅爵臺下伏流入城東流謂之長明渠戴延之西流記曰洛陽城外四面有陽渠水周公所制池建春門外二橋最大一從一橫續述征記曰案河渠書溝洫志引河為洪溝一說秦至魏鑿渠引河灌大梁名曰洪溝焉崔實政論曰戰國海內十二分魏州有史起引漳水灌鄴民以興歌蜀郡李冰鑿離堆通二江益部至今賴之秦關鄭國漢作白渠而關中號為陸海郡國志瀛州平舒縣古五渠水魏延興初文安縣人孫願等捕魚此水先祭忽有群魚從西而來有一人异甚謂願曰若得大魚勿殺及下網果得大魚乃殺之腹中盡得其祭食群魚並飛遂不復得因名此處為飛魚口鄴城故事曰西門豹為令造十二渠決漳水以溉民田因是戶口豐饒今渠一名安澤陂是也內黃圖經曰前漢倪寬遷內黃令吏民大信表開六輔渠以大溉灌民極獲利因曰倪公渠甽說文曰甽水流也周禮曰倍洫曰甽稽康養生論曰或益之以甽澮澮說文曰澮水流澮澮也廣二尋深二仞書曰豫決九川岠四海浚畎澮爾雅曰谷注溝曰澮釋名曰澮會也小溝之所會也泛續述征記曰齊人謂湖為泛泛中有九十九臺皆生結蒲因此蒲生自結風俗通曰泛莽也言其平望泛莽無崖際也灣酈善長注水經曰沅水又東歷臨沅縣西為明月池白壁灣灣狀半月清潭鏡徹上則風籟空傳下則泉響不斷行者莫不擁楫嬉游徘徊愛玩江夏記曰敗舶灣在縣西北七里案吳志云孫權與群臣泛觴於大船江中西上逢惡風權遣柂上張頡取𤄷洲谷利拔劍擬柂工急取樊口未及至口灣中船破因名敗舶灣權至岸謂谷利曰何怯於水也谷利曰大王萬乘之主欲涉不測之淵一旦傾危社禝何寄因登陸路而歸尋陽記曰蠡湖西灣夏秋水渺漲商徒縈紆牽舟循繞人力疲勞號為西疲灣亦云西灣又有白溝灣亦在湖西泛漲驚波似雪洶涌溝澮因是名焉又有落星灣灣內有落星石周回百步許又有神林下有廟祈福而獲前進由是名焉又有女兒廟禱祈亦有靈應即不許所置永嘉郡記曰樂城縣三原亭去郡百二十里溪水清如鏡曩昔有得一死鮎者鰭大五六圍一鰭輒得數十斛鮓此灣無所不容有大能食者常自譬腹如三原灣無所不容水經注曰渭水東南與神澗水合開山圖所謂靈泉池也俗名之為萬石灣泉深不測實為靈異先後慢遊者多罹其斃鄱陽記曰清灣在縣東南七里隋開皇中太守梁文謙蒞官清潔取此灣水以自供人思其德號為清灣浦說文曰浦水濱也詩曰率彼淮浦省此徐土郡國志曰夏曰浦有龍魚昔禹南濟黃龍夾舟之處楚詞曰望涔陽之極浦述異記曰上虞縣有石駝步水際謂之步也瓜步在吳中吳人賣瓜於江畔因以名也江中有魚步龜步湘中有靈妃步按吳楚間謂浦為步蓋語訛耳吳録曰富陽浦漢末為吳縣於津吳大帝時有浦通浙江至廬溪及桐溪故曰桐廬縣東有大溪注廬口淥波青巖昔晉徵士散騎侍郎戴勃遊此自言山水之極致也郡國志曰金陵西浦亦云項口即張碩捕魚遇杜蘭香處也江夏記曰南浦在縣南三里離騷曰送美人兮南浦其源出京首山流入大江春冬涸竭秋夏泛漲商旅從來皆於浦停泊以其在郭之南故稱南浦續搜神記曰廬江箏笛浦浦中昔有大舶覆水內漁人宿旁聞箏笛之聲及香氣氤氳云是曹公載妓船覆於此
