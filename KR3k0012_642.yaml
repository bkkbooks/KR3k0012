body:
  text: 刑法部七贓貨書呂刑曰獄貨非寶惟府辜功報以庶尤受獄非家寶也惟聚罪之事其報則以衆人見罪也尚書大傳曰獄貨非可寶也然後寶之者未能行其法者也貪人之寶受人之財未有不受命以矯其上者也親下以欺上者未有能成其功者也又曰太公之羑里見文王散宜生遂之犬戎氏取美馬駮身朱鬣雞目之西海濱取白狐青翰之於氏取怪獸之有參女取姜女之江淮之浦取大貝如車渠陳於紂庭紂曰非子罪也崇侯也遂遣西伯伐崇傳曰晉邢侯與雍子爭鄐田邢侯楚臣公巫臣之子也雍子亦楚人也久而無成士景伯如楚士景伯晉理官叔魚攝理韓宣子命斷舊獄罪在雍子雍子納其女於叔魚叔魚蔽罪於邢蔽斷也已具決獄門左傳昭六曰叔孫婼如晉晉人執之范獻子求貨於叔孫使請冠焉以求冠為辭取其冠法而與之兩冠曰盡矣既送作冠摸法又進二冠以與之僞若不解其意也為叔孫故申豐以貨如晉欲行貨免孫叔孫也叔孫曰見我吾告汝所行貨見而不出留申豐不使得出不欲以貨免又昭六曰梗陽人有獄魏戊不能斷以獄上上魏子其大宗賂以女樂訟者之大宗魏子將受之魏戊謂閻沒女寬二人魏子之屬大夫曰主以不賄聞於諸侯若受梗陽人賄莫甚焉吾子必諫皆許諾退朝待於庭饋入召比置三歎既食使坐魏子曰吾聞諸侯叔彥曰當食忘憂吾子置食之間三歎何也同辭而對曰或賜二小人酒不飲食饋之始至恐其不足是以歎中置自咎曰豈將軍食之而有不足是以再歎及饋之畢願以小人之腹為君子之屬厭而已獻子辭梗陽人孔藂子曰子思言茍燮於衛君曰其才然燮嘗為吏賦於民而食人二雞子故弗用也子思曰聖人官人如大匠之用木取所長棄其短君以二卵棄扞城之將乎漢書曰薛宣為馮翊太守池陽令舉廉吏獄掾王立府未及召聞立受囚家錢宣責讓縣縣案驗獄掾其妻獨受繫者錢萬六千受之再宿立實不知慚恐自殺宣聞之移書池陽曰縣所舉吏獄掾王立家私受賕而立不知殺身以自明誠廉士甚可閔惜其以府決曹掾書書立之柩以顯其魂又曰王溫舒為右輔行中尉歲餘會宛軍發發兵伐大宛也詔徵豪吏溫舒匿其吏華成及人有變告溫舒受員騎錢他姦利事罪至族自殺其時兩弟及婚家亦各自坐他罪而族光祿徐自為曰悲夫古者有三族而王溫舒罪至同時而五族乎溫舒與弟同三族而兩妻家各一故為五也溫舒死家纍千金謝承後漢書曰種皓為益州剌史時永昌大守鑄黃金為文蛇以獻梁冀皓糾發逮捕馳傳上言而三府畏懦不敢案之冀由是銜怒於皓華嶠後漢書曰曹皓靈帝時賂中官及輸西園錢一億萬故位至太尉袁山松後漢書曰皇甫嵩字義真安定朝郍人善用兵飲食必先將士然後乃安兵曹有受賂者嵩曰公素廉必資乏也乃出錢賜之吏慚而自殺由是衆皆樂為致死范曄後漢書曰歐陽歙字正思樂安千乘人為大司徒坐在汝南贓罪千餘萬發覺下獄諸生守闕為歙求哀者千餘人至有髡剃者子年十七聞獄當斷馳之京行到河內獲嘉縣自繫上書求代歙死書奏而歙已死獄中又曰李膺遷河南尹時宛陵大姓羊元群罷北海郡贓罪狼籍郡舍溷軒有奇巧乃載之以歸膺表欲治其罪元群行賂官豎膺反坐輸作左校又曰蔡衍字孟喜汝南南頓人也遷冀州剌史劾河間相曹鼎贓罪千萬鼎者中常侍騰之弟也騰使大將軍梁冀為書請之衍不答鼎竟坐輸作左校後魏書曰鄭義為兗州性貪吝政以賄成有餉羊西門受入東門賣之又曰崔光韶遷廷尉卿時祕書監祖瑩以贓罪被劾光韶欲置之重法太尉城陽王徽吏部尚書李神雋皆為瑩求寬光韶正色曰朝賢執事於舜之功未聞有一如何反為罪人言乎北史曰後魏就德於營州反使尚書盧同往討之敗而還屬侍中穆紹與元順侍坐因論之同先有近宅與紹紹頗欲為言順勃然曰盧同終將無罪太后曰何得如侍中之言順曰同好宅與要勢侍中豈有罪也紹慚不敢復言唐書曰太宗即位務止奸忒風聞諸曹案典多不受賂乃遣左右試以財物遺之有司門下令吏受饋絹一匹太宗怒將殺之裴矩進諫曰此人受賂誠合重誅但陛下試之即行極法所謂陷其入罪恐非導德齊禮之義也太宗納之又曰開元十年武強令裴景仙犯乞取贓積絹五千匹事發景仙逃走吏捕得之玄宗怒命集衆決殺大理卿李朝隱奏曰裴景仙緣是乞贓犯不至死又景仙曾祖故司空寂往屬締構首豫元勳載初年中家陷非罪凡有兄弟皆被誅夷唯景仙獨存今見承嫡據贓未當死坐有犯猶入議條十代宥賢功多宜録一門絶祀情或可哀詔不許朝隱復奏曰有斷自天處之極法生殺之柄人主合專輕重有條臣下當守枉法者枉理而取十五匹便抵死刑乞取者因乞為贓數千匹止當流坐今以乞取得罪處斬刑後枉法當科欲何罪臣所以為國惜法期律文詔令減死一等杖一百流于嶺南又曰牛僧孺為御史長慶元年宿州剌史李直臣坐贓當死直臣賂中貴人為之伸理僧孺堅執不回穆宗面喻之曰直臣事雖失此人有經度才可委之邊任朕欲貸其法僧孺對曰凡人之才止於持祿取容耳帝王立法束縛姦雄正為才多者祿山朱泚以才過人濁亂天下況直臣小才又何屈法哉又曰山南東道節度使柳公綽自京赴鎮行部過鄧縣縣吏二人犯法在獄一人納賄一吏舞文縣令以公綽持法犯贓者必不免及過款公綽斷曰贓吏犯法法在姦吏壞法法亡遂殺舞文未下車而襄漢大治又曰李石用金部員外郎韓益判度支案益坐贓繫臺石奏曰臣以李益曉錢穀録用之不謂貪猥如此帝曰宰相但知人則用有過則懲卿所用人且不掩其惡可謂至公三輔決録曰馬融為南郡太守三府以融在郡貪濁受王記掾歧肅錢四十萬融子強又受吏白向錢六十萬布三百匹以肅為孝廉向為主簿又坐失大將軍梁冀竟髡徒朔自剌不死得赦還拜議郎鍾離意別傳曰顯宗以意為尚書時交趾太守坐贓千金徵還伏法以資物簿入大司農詔班賜群臣意得珠璣悉以委地不拜賜帝怪而問其故對曰臣聞孔子忍渴於盜泉之水曾參回車於聖母之閭惡其名也此贓穢之寶誠不敢拜受帝嗟歎曰清乎尚書之言乃更以庫錢三十萬賜意罪書舜典曰流共工于幽州放歡兜于崇山竄三苗于三危殛鯀于羽山四罪而天下咸服又湯誓曰有夏多罪天命殛之殛誅也又泰誓曰豫克受非豫武惟朕文考無罪受克豫非朕文考有罪惟豫小子無良韓詩外傳曰齊景公之時民有得罪於景公者景公大怒縛置之殿下召左右支解之晏子左手持頭右手磨刀仰面而問曰古者明王每支解人不審從何支始也景公離席曰縱之罪在寡人禮曰子夏喪其子而喪其明曾子弔之曰吾聞之朋友喪明則哭曾子哭子夏亦哭曰天乎豫之無罪也曾子怒曰商汝何無罪吾與汝事夫子於洙泗之問退而老於西河之上使西河之民疑汝於夫子爾罪一也喪爾親使民未有聞焉爾罪二也喪爾子而喪爾明爾罪三也汝何無罪與子夏投其杖而拜之曰吾過矣吾過矣傳曰秦伯素服郊次向師而哭曰孤違蹇叔以辱二三子孤之罪也不替孟明孤之過也又曰潞子嬰兒之夫人晉景公之姊也酆舒為政而殺之又傷潞子之目晉侯將伐之大夫皆曰不可酆舒有三俊才俊絶異言有藝勝人者三也伯宗曰必伐之狄有五罪不祀一也嗜酒二也棄仲章而奪黎氏地三也仲章路賢人黎氏黎侯也虐我伯姬四也傷其君目五也怙其雋才而不以茂德滋益罪也又曰衛獻公使祝宗告亡且告無罪告宗廟也定姜曰有罪若何告無罪舍大臣而與小臣謀一罪也先君有冢卿以為師保而蔑之二罪也余以巾櫛先君而暴妾使余三罪也告亡而已無告無罪又曰吳公子札自衛過晉將宿於戚聞鍾聲焉曰異哉吾聞之辨而不德必加於戮矣夫子獲罪於君是以在此懼猶不足而又何樂又曰鄭公孫黑將作亂子産使吏數之曰伯有之亂以大國之事而未爾討也爾有亂心無厭國不汝堪專伐伯有而罪一也昆弟爭室而罪二也董隧之盟汝矯君位而罪三也有死罪三何以堪之又曰陳侯之弟招殺太子偃師罪在招也楚人執陳行人于徵師殺之罪不在行人也論語曰公冶長曰子謂公冶長可妻也雖在縲絏之中非其罪也以其兄之子妻之又堯曰曰朕躬有罪無以萬方萬方有罪罪在朕躬孝經曰五刑之屬三千而罪莫大於不孝家語曰孔子曰大罪有五而殺人為下逆天地者罪及五世誣文武者罪及四世逆人倫者罪及三世誣鬼神者罪及二世手殺人者罪止其身又曰孔子曰大夫之罪在五刑之域者聞有譴發譴讓也發始發露也則白冠犛纓盤水加劍造于闕而自請罪君不使有司執縛牽掣而加之也其有大罪者聞命則北面再拜跪而自裁君不使人捽引而刑殺之也大夫自取之耳吾遇子有禮矣史記曰范睢盛帷帳侍者甚衆須賈賈頓首言死罪曰賈不意君能致於青雲之上惟君死生之范睢曰汝罪有幾曰擢賈之髮以續賈之罪尚未足也漢書曰惠帝二年制曰今法有誹謗訞言之罪是使衆臣不敢盡情而上無由聞過失也將何以來遠方賢良其除之又曰南越反上復欲使楊僕將為其伐前勞以書勑責之將軍非有斬將搴旗之實也焉足以驕太哉前破番禺捕降者以為虜掘死人以為獲是一過也建德呂嘉建德他孫也呂嘉他相也逆罪不容於天將軍擁精兵不窮追超然以東越為援是二過也士卒暴露連歲朕為朝會不置酒將軍不審其勳勞而造佞巧請乘傳行塞因用歸家懷銀黃垂三組誇鄉里三過也失其內顧以道惡為解失尊之序是四過也後漢書曰荊州剌史趙凱誣奏楊旋實非身破賊而妄有其功遂檻車徵琁防禁嚴密無由自訟乃噬臂出血書衣為章具陳破賊形勢及言凱所誣狀潛令親屬詣闕通詔書原琁拜議郎凱反受誣人之罪宋書曰孔琳之為御史中丞明憲直法無所屈撓奏尚書令徐羡之虧違憲典時羡之領楊州剌史琳之弟璩之為中從事羡之使璩之解釋琳之使寢其事琳之不許曰我觸忤宰相正當罪止一身汝必不應從坐何須勤勤耶自是百寮震肅莫敢犯禁北史曰賀若弼有罪在禁所詠詩自若上數之曰人有性善行惡者公之為惡乃與行俱有三太猛嫉妒心太猛自是非人心太猛無上心太猛昔在周朝已教他兒子友此心終不能改唐書曰高祖詔曰朕自起義晉陽遂登皇極經綸天下實仗群才尚書令秦王尚書右僕射寂或契合元謀或同心運始並蹈義輕生捐家殉節艱辛備履金石不移論此忠勤禮宜優異官爵之榮抑惟舊典勳賢之義宜有別恩其罪非叛逆可聽恕一死說苑曰禹出見罪人下車問而泣左右曰王何為痛之至於此禹曰堯舜之民皆以堯舜之心為心今寡人為君百姓各以其心為心是以痛之也風俗通曰罪字為自辛令為辛苦憂之也秦皇以為字似皇故改為罪語林曰王子敬疾篤兄弟勸令首罪答曰無所應首唯遣郗家女以為恨雜五行書曰皋陶以壬辰日死不可劾罪人成罪也
