body:
  text: 獸部十八鹿説文曰麚音加牡鹿也夏至解角麟大牝鹿也𪊫音儒鹿麛也𪋝音速鹿迹也麛音述鹿子也麉音肩鹿之絶有力也麠舉鄉切大鹿也爾雅曰鹿壯麚牝音優其子麛其迹速絶有力麉音堅又音磬周易卦曰六三即鹿無虞惟入于林中詩韓奕曰魴鱮音序甫甫麀鹿噳噳虞矩切又靈臺曰麀鹿濯濯白鳥翯翯又吉日曰獸之所同麀鹿麌麌虞矩切又野有死麕曰林有撲樕野有死鹿白茅純束有女如玉又曰鹿鳴宴群臣嘉賓也呦呦鹿鳴食野之蘋又蕩桑柔曰瞻彼中林甥甥其鹿左傳文下曰晉侯不見鄭伯以為二於楚鄭家使執訊而告趙宣子曰古人有言曰畏首畏尾身其餘幾又曰鹿死不擇音小國之事大國也德則其人也不德則其鹿也挺而走險急何能擇又襄十四年傳曰范宣子執戎子駒支數之曰今諸侯之事我寡君不如昔者蓋言語漏泄則職汝之由戎子駒支曰昔文公與秦伐鄭秦人竊與鄭盟於是乎有殽之師晉御其上戎亢其下秦師不復我諸戎實然譬如捕鹿晉人角之諸戎掎之與晉踣之禮記月令曰仲夏鹿角解又禮器曰居澤者不以鹿豕為禮史記曰趙高欲為亂恐群臣不聽乃先驗持鹿於二世曰馬也二世笑曰丞相誤耶謂鹿為馬問左右左右或言馬以阿趙高或言鹿高因陰中言鹿者以法又曰邑中人民俱出獵任安常為人分麋鹿雉兔部署大小劇易衆人皆喜鹿而曰無傷也任少卿分別平又曰古者皮幣諸侯以聘享漢武帝乃以白鹿皮方尺緣以藻繢為幣直四十萬王侯朝覲享聘必以為薦璧然後得行漢書曰蒯通教韓信反高祖高祖召通至問曰汝何教韓信反耶蒯通曰臣聞狗各吠非其主當彼時臣以知齊王不知陛下且秦失其鹿天下共逐之高才者先得又曰伍被諫淮南王曰昔子胥諫吳王吳王不用乃曰臣今見麋鹿遊姑蘇之臺今臣亦見宮中生荊棘也東方朔別傳曰武帝時有殺上林鹿者下有司收殺之朔時在旁曰是固當死者三使陛下以鹿殺人一當死天下聞陛下重鹿賤人二當死胸奴有急須鹿觸之三當死帝默而赦之范曄後漢書曰雲南縣有神鹿兩頭食毒草華陽國志曰熊蒼山有神鹿食毒謝承後漢書曰鄭弘為臨淮太守行春兩白鹿隨車俠轂而行弘怪問主簿黃國鹿為吉凶國拜賀曰聞三公車畫作鹿明府當為宰相後弘果為太尉魏志曰蘇則從文帝獵失鹿帝大怒踞胡床拔刀悉收行督吏將斬之則諫之乃止晉書曰許孜字季義東陽吳寧人也二親沒棄妻宿墓所列植松柏亙五六里時有鹿犯其松栽孜悲歎曰鹿獨不念我乎明日忽見鹿為猛獸所殺置於所犯栽下孜悵惋不已乃作冢埋於隧側猛獸即孜前自投而死孜益歎息復埋之又曰謝鯤在豫章嘗行經空亭中夜宿此亭舊每殺人將晚有黃衣人呼鯤字令開戶鯤淡然無懼色便於窗中度手牽之膊斷視之鹿也尋即獲焉後此亭無復妖怪晉中興書曰陶淡字處淨太尉侃之孫一身孑然無有同産齠齓之時雅好導飬謂仙道可祈至年十五六便服食絶穀不婚娶居長沙臨湘縣下去家十里於山中立小草屋裁足容身時還家設小床常獨坐不與人共於野得白鹿子馴而養之至七八歲恆與之俱往還後遂不復還家又曰殷仲堪上白鹿表曰巴陵縣青水山得白鹿一頭白者正色鹿者景福嘉義晉書載記曰石勒嘗傭於武安臨水為遊軍所囚會有群鹿傍過軍人競逐之勒乃獲免俄而又見一父老謂勒曰向群鹿者我也君應為中州主故相救耳勒拜而受命蕭子顯齊書曰始興盧度隱居西昌三顧山鳥獸隨之夜有鹿觸其壁度曰汝勿壞我壁鹿應聲去南史四夷傳曰扶南有鹿車國人養鹿如中國畜牛以乳為酪隋書曰開皇十七年群鹿入殿門馴擾侍衛之內後周書曰文帝獵於邙山圍不齊獸多越逸帝怒諸將股栗俄有一鹿亦突圍而走賀若敦躍馬逐之鹿上東原棄馬步逐山半便及掣之而下帝大悅諸將免罪唐書曰太宗幸懷州乙未狩於濟源之陵上親御狐矢太宗曰古者先驅以供宗廟今所獲鹿宜令有司造脯醢以充薦享又曰褚禇無量丁母憂解職廬於墓側其所植松柏時有鹿犯之無量泣而言曰山中衆草不少何忍犯吾先塋樹栽因通夕守護俄有群鹿馴狎不復侵害魏名臣奏曰時殺禁地鹿者死郎中黃觀上疏曰臣深思陛下所以不早取此鹿誠欲使亟蕃息然後大取以為軍國之用也然臣切以為今鹿但有日耗終無得多也魏末傳曰明帝為平原王母甄后妬文帝殺之欲不立為太子嘗從帝獵見鹿子母帝射鹿母語明帝射鹿子明帝曰陛下既已殺其母臣不忍復殺其子因大涕泣帝放弓矢由是立太子意定國語曰周穆王征犬戎得四白鹿而荒服者不至史記又載穆天子傳曰天子賜曹奴之人金黃之鹿白銀之麕又曰天子西升于藜丘之陽過并公博乃駕鹿遊乎山上又曰天子征于菹側魚切臺狎菹之獸於是有白鹿一忤音悟乘逸走出天子乘渠黃之乘馳焉山海經曰上申之山其獸多白鹿辛氏三秦記曰有白鹿原周平王時白鹿出此原太公六韜曰取天下若逐野鹿得其鹿天下共食肉莊子曰至德之世不尚賢不使能民如野鹿韓子曰夫馬似鹿者而題千金有百金之馬而無一金之鹿者馬為人用而鹿不為人用列子曰鄭人有薪於野者遇駭鹿卻而擊之斃恐人見之遽而藏諸隍中覆之以𧆀不勝其喜俄而遺其所藏之處遂以為夢焉從塗而詠其事傍人有聞者用其言而取之既歸告其室人曰向薪者夢得鹿而不知其處吾今得之管子曰桓公問管子楚之強國舉兵伐之恐力不能過奈何對曰公貴買其鹿公即為百里之城使人載錢二千萬求生鹿於楚人楚人釋其耕農而田鹿管子告楚人賈曰為我致生鹿賜子金百斤什至金千斤尸子曰鹿走而無顧六馬不能望其塵謂不反顧也呂氏春秋曰晏子遭崔杼之患其僕將馳晏子安之曰疾必不生徐必不死鹿生於山命懸於廚今嬰有所懸也抱朴子曰昔張盍踏音沓及儒寧成二人並精思於蜀雲臺山石室中忽有一人著黃練單衣葛巾到其前曰勞乎道士乃辛苦幽深於是二人顧視於鏡中乃見是鹿也因問曰汝是草中老鹿何敢詐為人形也言絶即還成鹿而走去瀨鄉記李母碑曰老子乘白鹿下託於李母韓詩外傳曰齊景公逐白鹿畝丘見封人曰使吾君壽金玉是賤人民是寶公曰善孫柔之瑞應圖曰黃帝時西王母使使乘白鹿獻白環之休符以有金方也春秋歷命序曰神駕六飛鹿化三百歲淮南子曰四九三十六六主緯緯主鹿鹿故六月而生春秋運斗樞曰瑤光散而為鹿江淮不祠則瑤光不明彘生鹿抱朴子玉策篇曰鹿壽千歲滿五百歲則其色白瑞應圖曰天鹿者能壽之獸五色光暉王者孝道則至又曰王者承先聖法度無所遺失則白鹿來禮斗威儀曰君乘水而正其政和平北海輸白鹿衝波傳曰鹿生三年其角自墮崔豹古今注曰鹿有魚不能觸袁山松白鹿詩序曰荊門山臨上皆絶壁峭峙五百餘丈亘帶激流禽獸所不能履北岸有一白鹿常過江行人見之競逐之謂至山下必得鹿忽飛超陶而去于今此壁謂之白鹿山泗音囚言浮過也神仙傳曰魯女生者長樂人服胡麻餌術絶穀八十餘年甚少世傳見之二百餘年入華山中有故人與女生別五十年入華山廟逢女生乘白鹿車從玉女數十人列仙傳曰蘇耽與衆兒俱戲獵常騎鹿形雖如常鹿遇險絶之地能超越衆兒問曰何得此鹿異常鹿耶答曰龍也述異記曰漢成帝末年宮中雨一蒼鹿殺而食之味甚美又曰鹿一千年為蒼鹿又百年化為白鹿又五百年化為玄鹿漢成帝時山中人得玄鹿烹而視其骨皆黑色仙者説玄鹿為脯食之壽二千歲餘干縣有白鹿土人皆傳千歲矣晉成帝遣人捕得有銅牌有字在其角後云寶鼎二年臨江所獻博物志曰雲南郡出茶首茶首其音為蔡茂是兩頭鹿名也獸似鹿兩頭其腹中胎常以四月中取可以治蛇虺毒永昌亦有之異苑曰鄱陽樂安彭世咸康中以捕射為業入山輒與兒俱世後忽蹙然倒地變成一白鹿咷蹻而去其子終身不復捉弩至孫復襲此事曾射得一鹿兩角間有道家七星符其祖名字鄉居年存焉覩之懊悔遂斷獵伏侯古今注曰漢明帝永平九年三角鹿出江陵孝和帝永元十二年豫章餘干得白鹿高丈九寸楚辭曰青莎雜樹薠音煩草靃靡白鹿麕麚或騰或倚樂府歌詩曰白鹿乃在上林西苑中射工尚得脯臘之黃鶴摩天極高飛後宮尚得烹煮之金樓子曰夏禹之時神鹿行於河水搜神記曰淮南陳氏於江西種豆忽見二女子姿色甚美著紫纈襦青裙天雨而衣不濡其壁先挂一銅鏡中見二鹿以刀斫獲之以為脯宣驗記曰吳唐廬陵人也少好驅媒獵射發無不中家以致富後春月將兒出射正值麋鹿將麑母覺有人氣呼麑漸出麑不知所猥徑前就媒唐射麑即死鹿母驚還悲鳴唐乃自藏於草中出麑致淨地鹿母直來地俯仰頓伏絶而復起唐又射鹿母應弦而倒至前場復逢一鹿上弩將放忽發箭反激還中其子唐擲弩抱兒撫膺而哭聞空中呼曰吳唐鹿之愛子與汝何異唐驚聽不知所在高堂隆集曰近日有司宣令有殺禁地鹿者身死財産沒官有能先覺白者賞賜之此為重禽獸而賤人過於齊宣矣杜祭酒別傳曰君弟子三人隨道士邢邁入宣城涇縣白水山去縣七十里餌朮黃精經歷年所有鹿走依舍邊伏眠邁等怪之乃為虎所逼邁乃呪虎退鹿經日乃去南中八郡志曰麋冷縣深山中有大蛇長數丈圍三尺於樹上野鹿過便低頭繞之鹿於是有頃而死先含水濡之令濡乃合頭角併吞之訖便不能動至數日鹿乃消盡蛇自繞樹鹿角骨悉鑽皮出飬瘡得一月乃愈永初山川記曰髯蛇吞鹿至角乃止交州記曰合浦口有麚角當額上載科藤一株三四條長可一尋射師從禽每見而不敢射蕭廣濟孝子傳曰伍襲字世公丁父憂廬墓側有一鹿每襲哭輒踞墳而悲鳴廣州先賢傳曰丁茂字仲慮交址人至孝母終負土治冢列樹松柏白鹿遊乎左右又曰唐頌字德雅番禺人遭喪六年廬於墓次白鹿拾食冢邊習鑿齒襄陽記曰習郁從光武幸黎丘與光武通夢見蘇頷神帝嘉之使立祠二石鹿夾道口百姓謂之鹿門麋爾雅釋獸曰麋牡麔牝麎其子䴠其迹躔絶有力狄麋音眉麔平表切麎音臣䴠於道切説文曰麋鹿屬也冬至解角春秋運斗樞曰搖光星散為麋春秋命歷序曰有人黃頭大腹出天齊號曰皇次駕六飛靡上下天地與神合謀周禮天官獸人曰獸人夏獻麋左傳宣下曰晉楚戰楚致晉師晉人逐之左右角之樂伯左射馬而右射人角不能進矢一而已麋興於前射麋麗龜晉鮑癸當其後使攝叔奉麋獻焉又曰魯莊公十七年多麋害稼又哀十四年傳曰宋桓魋之寵害於公將討之召左師曰迹人來告曰逢澤有介麋焉離騷曰麋何食兮庭中蛟何為兮水裔莊子曰鰌與魚遊麋與鹿淮南子曰孕婦見兔其子缺脣見麋而子四日又曰逐麋者不顧雉兔新序曰晉文公逐麋而失之問農夫古老古老以足指如是往公問其故對曰虎豹厭間而近人故得魚鱉厭深而之淺故得諸侯厭衆而亡其國文公懼歸有悅色欒貞子問焉公曰今日逐麋失之而得善言故欣也魏略曰文帝將受禪有白麋見戴延之西征記曰徽音殿西南姚興起波若臺有逍遙園西去三百步有鹿子苑羌王飬麋鹿數百頭麂爾雅曰麂音几大麕九筠切旄毛狗足旄毛㺜長山海經曰女几之山有獸多麕郭璞曰麕似麞而大孫氏瑞應圖曰晉中興書元帝時有二白麂見于南昌郡臨海記曰郡西北候官山有三足麂其聲嘶嗄二千石官長將有代謝則嗄麂鳴矣民以為常占未曾一失麈説文曰塵鹿屬也大而一角搜神記曰馮乘虞蕩夜獵見一大麈射之麈便云虞蕩汝射殺我耶明晨得一麈而入少時蕩死鄱陽記曰李嬰弟縚音韜二人善於用弩嘗得大麈解其四腳懸著樹間以臟為炙烈於火上方欲共食山下一人長三丈許鼓步而來手持大囊既至取麈頭骼皮并火上新肉悉內囊中遙還山嬰兄弟後亦無恙麑淮南子曰孟孫獠音老而得麑使秦西巴歸之麑母隨而啼西巴不忍蹤而與之孟子歸求麑安在西巴以實對孟子怒逐之居一年復以西巴為子傅秦子曰虎能雄猛不可以託麑鷹能飄擊不可以寄雛
