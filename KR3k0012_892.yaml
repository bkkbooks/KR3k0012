body:
  text: 獸部三虎上說文曰虎山獸之君也春秋運斗樞曰樞星散而為虎易履卦曰履虎尾不嘻人亨又頤卦曰虎視耽耽其欲逐逐易革卦九五象曰大人虎變其文炳也易通卦驗曰立秋虎始嘯月令曰仲冬虎始交禮記曰孔子過太山側有婦人哭於墓者而哀夫子式而聽之使子貢問之曰子之哭也一似重有憂者而曰然昔吾舅死於虎吾夫又死焉今吾子又死焉夫子曰何為不去曰無苛政子曰小子識之苛政猛於虎也左傳宣四年曰若敖娶於䢵生鬥伯比若敖卒從其母畜於䢵淫於䢵子之女生子文焉䢵夫人使棄諸夢中夢澤虎乳之䢵子田見之懼而歸夫人以告告女私通所生遂使收之楚人謂乳為穀謂虎為於莬故命之曰鬥穀於莬春秋考異郵曰三九二十七七者陽氣成故虎七月而生陽立於七故虎首尾長七尺般般文者陰陽雜也春秋演孔圖曰天命湯自虎戲朝其終白虎在野爾雅曰甝白虎漢宣帝時南郡獲白虎獻其皮骨爪牙也虪里虎虪音敘甝胡甘切漢書曰猛虎之猶與不如蜂蠆之致蠚又曰宣帝元狩南郡獲白虎以為寶又曰李廣北平郡出獵見草中石以為虎而射之中石沒羽視之石也明日射之終不能入矣又曰馬遷書曰猛虎在山中百獸震恐及陷檻穽搖尾而求食積威約之漸也又曰李敢子禹有寵於太子禹有勇上召禹使㓨虎懸下圈中未至地有詔引出之禹以劍斫絶纍欲㓨虎上壯之遂放焉後漢書曰劉昆字桓公光武時為弘農太守先是崤澠驛道多虎災行旅不通昆為政三年仁化大行虎皆負子渡河帝聞而異之後徵為光祿勳詔問昆曰前在江陵返風滅火後守弘農虎北渡河行何德政而致是事昆對曰偶然耳左右皆笑其質訥帝歎曰此乃長者之言也顧命書諸策又曰宋均遷九江太守郡多虎暴數為人患常募設檻穽而猶多傷害檻為機以捕獸穽謂穿地陷之均到下記屬縣曰夫虎豹在山黿鼉在水各有所託且江淮之有猛獸猶北土之有雞豚也今為人害咎在殘吏而勞勤張捕非憂恤之本也其務退奸貪思進忠善可一去檻穽除削課制其後傳言虎相與東遊渡江又曰法雄為南郡太守郡濱帶江沔又有雲夢藪澤雲夢澤今在安州永初中多虎狼之暴前太守賞募張捕反為所害者甚衆雄乃移書屬縣曰凡虎狼之在山林猶人之居城市古者至化之代猛獸不擾皆由恩信寬澤仁及飛走太守雖不德敢忘其義記到其毀壞檻穽不得妄捕山林是後虎害稍息人以獲安在郡數歲歲常豐稔又曰童恢字漢宗為不其令戶人嘗為虎所害乃設檻捕之生獲二虎恢呪虎曰天生萬物惟人為貴虎狼當食六畜而殘暴於人王法殺人者死傷人則論法若是殺人者當垂頭服罪自知非者當號呼稱冤一虎低頭閉目狀如震懼即時殺之一乃踊躍自奮遂放之謝承後漢書曰豫章劉陵字孟高為長沙安成長先時多虎百姓患之皆從他縣陵之官修德政踰月虎悉出界去民皆還漢皇德傳曰世祖遣鄧禹西征送之於道既返因於野王獵路見二老翁即禽世祖問曰禽何向並舉首西指言此中多虎臣每即禽虎亦即臣大王勿往也方言曰虎陳魏宋楚之間或謂之李父江淮南楚之間謂之李耳虎食物值耳即止以觸其諱故或謂之於䖘於音今江南山夷呼虎為䖘自關東西或謂之伯都也風俗通曰呼虎為李耳俗說虎本南郡中廬李氏公所化為呼李耳因喜呼班便怒龍魚河圖曰懸文虎鼻門上宜官子孫帶印綬懸虎鼻門中周一年取燒作屑與婦飲之二月中便有兒生貴子勿令人知之泄則不驗也亦勿令婦人見之春秋後語曰楚黃歇說秦昭王曰天下強國莫過於秦楚今聞大王欲伐楚此猶兩虎相與鬥而駑大受其弊不如善楚也又曰秦惠王謂陳軫曰今韓魏相攻朞年不解或謂寡人救之便或白勿救便寡人不能自為決願子為寡人計之軫曰亦嘗有以卞莊子之㓨虎聞於王者乎王曰不聞軫曰卞莊子方㓨虎而卞豎子止之曰兩虎方食牛牛甘必爭爭必鬥鬥則大者傷小者死從傷而㓨之一舉必有雙虎之名卞莊子以為然立而顧之有頃兩虎果鬥大者傷小者死一舉果有雙虎之功今韓魏相攻朞年不解是必大國傷小國亡從傷而伐之一舉必有二實此猶下莊子㓨虎之類也惠王曰善卒不救待其敗而攻之果大剋也吳越春秋曰吳王葬昌門外金玉精上為白虎列士傳曰秦召公子無忌無忌不行使朱亥奉璧一雙秦王大怒將朱亥著虎圈中亥瞋目視虎眥裂血出濺虎終不敢動穆天子傳曰有虎在於葭中葭葦七萃之士曰高奔戎乃生捕虎而獻之天子命為押押檻而畜之東虞是曰虎牢因名其地今滎陽成皋縣是也山海經曰孟山鳥鼠同穴之山其上多白虎也又曰狄山爰有熊文虎幽都之山黑水上有玄虎尸子曰虎豹之駒未成文而有食牛之氣又曰中黃伯曰余左執太行之夔而右搏雕虎韓子曰龐共與太子質於邯鄲謂魏王曰今一人言市有虎王信乎王曰不二人言王信乎王曰不三人言王信乎曰寡人信之龐共曰夫市無虎明矣然而三人言成市虎今邯鄲去魏遠於市議臣者過三人願王察之龐共從邯鄲還竟不得入又曰夫虎之所以能伏狗者爪牙也使虎釋其爪牙而使狗用之則虎反服於狗矣人主者以刑德制臣今君失其刑德而使臣用之則君反制於臣矣管子曰桀之時女樂三萬人放虎於市觀其驚駭列子曰梁鴦曰養虎之法凡順之則喜逆之則怒此血氣者性也夫食虎物不敢以生物與之為其殺之恐怒也不敢以全物與之為其決之之怒也莊子同孟子曰晉人有馮婦者善搏虎有衆逐虎望見馮婦趍而迎之孫卿子曰見寢木以為伏虎呂氏春秋曰衣人在寒食人在飢陳思稱投虎千金不如一豚肩淮南子曰中行繆伯手搏虎而不能生也中行繆伯晉臣也力能搏虎而能伏之也又曰蛇不可使為足虎不可使緣木淮南萬畢術曰燒角入山則虎豹自遠惡其臭也又曰昔者牛哀病七日化而為虎其兄啓戶而入虎搏而殺之方其為虎不知其嘗為人也方其為人不知其且為虎也且猶將也又曰虎嘯則谷風生說苑曰孔鳥愛羽虎豹愛瓜所以輔其身也抱朴子曰虎及鹿兔皆壽千歲滿五百歲者其色皆白又曰或問為道者多在山林山林虎狼之室何以避之抱朴子曰古之入山者佩黃神越章其廣四寸其字百二十以封泥著所住之四方各百步則虎狼不敢近其內也又曰山中寅日稱虞史者虎也又曰蔡誕入山還其家云被謫到崑崙崑崙山下白虎蜲蛇長百餘里其口中牙皆如三百斛船大風俗通曰虎者陽物百獸之長也能噬食鬼魅今人卒得病燒皮飲之繫其衣服亦辟惡此甚驗又曰桃梗葦茭畫虎謹案黃帝書上古之時有神荼與鬱壘兄弟二人性能執鬼度朔山上桃樹下簡閲百鬼鬼無道理妄與人禍荼與鬱壘縛以葦索執以食虎於是官常以臘餘文飾桃人畫虎於門皆是追效前事冀以禦凶也又曰宋均為九江太守虎負子渡江按虎毛婆娑豈犯陽侯波里語云狐欲渡河無奈尾何舟人尚有懼況虎耶若德被四海虎亦能至鬼方也璅語曰周王欲殺王子宜咎立伯服釋虎將執宜咎叱之虎弭耳而服蔣濟萬機論曰猛虎不處卑勢鷙鳥不立垂枝也西京雜記曰李廣與兄弟獵於冥山之北見臥虎焉射一矢斃斷其髑髏以為枕示服猛也鑄銅象其形為溲器示厭服之也又曰余所知有鞠道龍善為幻術嘗向余說曰東海人黃公少時為幻秦末有白虎見東海詔遣黃公以赤刀往厭之術既不行遂為虎所殺三輔人俗用以為戲漢朝亦取之為角抵戲焉王子年拾遺録曰始皇二年謇涓國畫工者名烈裔刻白玉兩虎削玉為毛有如真矣不點兩目睛始皇使餘工夜往點之為睛旦往虎即飛去明年南郡有獻白虎二頭始皇使視之乃是先刻玉始皇命去目睛二虎不能復去
