body:
  text: 職官部六十一別駕應劭漢官儀曰元帝時丞相于定國條州大小為設吏員治中別駕諸部從事秩皆百石漢書曰黃霸為豫州刺史三歲宣帝詔賜車蓋特高一尺別駕主簿車緹油屏星於軾前以彰有德東觀漢記曰郭伋在并州行部童兒騎竹馬迎拜問使君何白當還伋語別駕計日告之後漢書曰袁紹領冀州以審配為別駕委以腹心并揔幕府紹又以田豐為別駕豐勸迎天子紹不納及敗曰吾慚田別駕謝承後漢書曰周景為豫州辟陳蕃為別駕不就景題別駕興曰陳仲舉座也不復更辟蕃惶懼起視職又曰陳茂豫州刺史周敞辟為別駕從事與俱行部到潁川陽翟傳傳中有置美酒一押敬去勑御騶載酒以行茂見於外取押擊柱破之敞問茂刺史年老酒益氣別駕破押名亦何益茂答曰所過皆有以明使君傳車騑驂載酒非宜也魏志曰崔琰字季圭太祖破袁氏領冀州牧辟琰為別駕語琰曰北案戶籍可得三十萬衆故為大州也琰曰今天下分崩九州幅裂二袁兄弟親尋干戈冀方蒸庶暴骨原野未聞王師仁聲先路存問風俗救其塗炭而計校甲兵唯此為先斯豈彼州士女所望於明公哉太祖改容謝之于時賓客皆復失色又曰李膺自蜀使至都武帝悅之謂曰今李膺何如昔對曰今勝昔問其故對曰昔事桓靈之主今逢堯舜之君帝嘉其對以如意擊席者久之乃以為益州別駕又曰王基字伯輿東萊人時青土初定刺史王陵表請基為別駕陵流稱青土蓋亦由基協和之輔也吳書曰陸遜為右護軍鎮西將軍權嘉遜功德欲殊顯之雖為上將列侯猶欲令歷本州舉命乃使楊州牧呂範就辟別駕從事晉書曰王祥徐州刺史呂虔擊為別駕祥乃應召虔委以州事于時寇盜充斥祥率勵兵士頻討破之州界清靖政化大行時人歌之曰海沂之康實賴王祥邦國不空別駕之功鄧粲晉紀曰王澄為荊州宗厥以酒色禮澄澄叱左右捽之別駕郭舒厲色曰使君醉澄曰狂邪枉我醉因炙舒眉晉中興書曰初魏徐州刺史任城呂虔有佩刀工相之以為必三公可服此刀虔語別駕王祥曰茍非其人刀或為害卿有公輔之量故以相與祥始辭之虔強與乃受祥死之日以刀授弟覽曰吾兒凡汝後必興足稱此刀故以相與又曰長沙鄧粲高潔著名桓沖召粲為別駕粲起就職時南郡劉尚公亦治操不仕粲既就職尚公語粲曰卿道廣學深衆所推懷忽然改節誠失所望粲笑答曰足下可謂有志於隱而未知隱之為道朝亦可隱市亦可隱初在我不在於物尚公無以難之雖然粲名譽解半矣又曰鄧騫字長真長沙人也譙王承為魏乂所敗乂求騫甚急鄉人為懼騫笑曰欲用我耳乃往詣乂喜謂曰君可謂古之解楊也以為別駕續晉安帝紀曰益州刺史李邈微時居漢川與別駕薑顯餞送刺史顯忽邈邈曰大丈夫何至守偏地為薑顯所陵即不復還家仍附船下自是十五年而鎮梁漢顯猶栖遲即擊為別駕後周書曰柳慶為雍州別駕有賈人持金二十斤詣京師交易寄人停止每欲出行常自執管鑰無何緘閉不異而失之謂是主人所竊郡縣訊問主人遂自誣服慶聞而歎之乃問賈人曰鄉鑰恆置何處對曰恆自帶之慶曰頗與人同宿乎曰無與人同飲乎曰日者曾與一沙門再度酣宴醉而晝寢慶曰主人特以痛自誣非盜也彼沙門乃真盜耳即遣吏逮捕沙門乃懷金逃匿後捕得盡獲所失之金隋書趙軌為齊州別駕徵入朝父老相送者各揮涕曰別駕在官水火不與百姓交是以不敢以壺酒相送公清若水請酌一杯水奉餞軌授而飲之唐書曰德宗命王虔休幕客昭義軍節度掌書記盧頊為洺州別駕知州事賜緋魚袋賞有功也時元誼據洺州頊白於虔休請入城説下之頊見誼為陳利害誼請隨頊歸朝故頊不次授官三輔決録曰蘇章為異州刺史召安平崔瑗為別駕豫章列士傳曰孔恂字巨卿新淦人為別駕車前後舊有屏星如刺史車曲翳儀式時刺史行部發失旦怒命去之恂曰明使君發自晏而飲撤去屏星毀國舊儀此不可行別駕可去屏星不可省即投傳而去曹操別傳曰武皇帝為兗州以畢諶為別駕兗州亂張孟卓劫諶母弟帝見諶曰孤綏撫失和聞卿母弟為張邈所執人情不相遠卿可去孤自遣不為相棄諶涕泣曰當以死自效帝亦垂涕答之諶明日便走後破下邳得諶還以為掾王允別傳曰允仕郡民有路拂者少無行而太守王珠召以補吏允犯顏固爭珠怒收允欲殺之刺史鄧盛聞而馳傳辟為別駕從事允由是知名路拂以之廢棄管輅別傳曰趙孔耀言輅於冀州刺史裴徽即擊召輅一相見清論終日不覺疲倦天時大熱移床在庭前樹下乃至雞鳴向晨然後出自爾引輅為別駕江氏家傳曰統字應元太傳東海王領州牧請君為別駕與君書曰昔子師作豫州末下車辟荀慈明下車辟孔文舉貴州人士有堪此求者不知君舉高平郗道微為賢良陳留阮宣子為直言濟北程弘叔為方正皆於時選為允顧和別傳曰顧球時為楊州別駕顧榮謂球曰卿速步公孝如是超卿矣和字公孝庾亮集答郭遜書曰別駕舊與刺史別乘周流宣化於萬里者其任居刺史之半安可任非其人應享與州將箋曰誨命欲求佳別駕自頃諸府大開搜延路廣海無遺蚌山亡逸璞歸數日臥思始得一人陳國有袁琇字惠瑛者才識可以經於治亂棲跱可以勸礪後進享具所服聞而未嘗接顏交言也又宗令文早有名輩相與通家門素所具抑亦其次治中通典曰治中從事史一人居中治事主衆曹文書漢制也謝承後漢書曰陳禪為州治中從事刺史為人所劾受納贓賂禪當傳栲乃至笞掠無笇五毒畢加神意自若辭對無屈事遂釋應劭漢官儀曰司隸功曹從事即治中也魏志曰審配字正南魏郡人少忠烈慷慨有不可犯之節袁紹領冀州委配腹心之任以為治中別駕又曰太祖令曰頻年已來不聞嘉謀豈吾開延不勤之耶自今已後諸掾屬治中別駕常以月旦各言其失吾將覽也又曰毛玠字孝先陳留平丘人也少為縣吏以清公稱將避亂荊州未至聞劉表政令不明遂住魯陽太祖臨兗州辟為治中從事蜀志曰龐統以從事守耒陽令不治免官魯肅遺先主書曰龐士元非百里之才使處治中別駕之任始當展其驥足耳乃以為治中江表傳曰孫權剋荊州將吏悉皆歸附而潘濬獨稱疾不見權遣人以床就家輿致之濬伏面著床席涕泣交橫權至慰勞與語使親近以手巾拭其面濬起下地拜謝即以為治中王隱晉書曰唐彬檄為治中別駕忠肅公亮匡救違闕盡規誨以納善不顯諫以彰主當朝正色焉又曰譙郡太守李詮稱散吏後竟為治中檀道鸞晉紀曰習鑿齒少博涉才情秀逸桓溫奇之自州從事歲中三轉至治中梁書曰蕭洽為南徐州治中既近畿重鎮吏數千人前後居之者皆致巨富洽為之清身率職饋遺一無所受妻子不免飢寒又曰陸襄字師卿為楊州治中襄父終此官乃固辭高祖不許聽與府司馬換廨居之也益部耆舊傳曰柳琮字伯騫為治中與人交結久而益親其所拔進皆世所稱致位牧守鄉里為之語曰得黃金一笥不如柳伯騫所識又曰張彥字伯春為治中從事刺史每坐高床治中單席於地鄧德明南康記曰昔有盧耽仕州為治中少有棲山之術善解飛每夕輒凌虛歸家曉則還州曾元會曉不及朝則化為白鵠至閣前回翔欲下威儀以帚擲之得一隻履耽乃驚還就列時步騭為廣州刺史意惡之便以狀列聞遂至誅滅世説曰習鑿齒才吏不常桓宣武器之未三十用為荊州治中謝箋曰不遇明公荊州老從事耳長史後周書曰劉璠為蕭循益州長史及太祖既納蕭循之降又許其返國循至長安纍月未之遣也璠因待宴太祖曰我於古誰比對曰常以公命世英主湯武莫逮今日所見曾齊桓晉文之不若太祖曰我不得比湯武望與伊周為匹何桓文之不若乎對曰齊桓存三亡國晉文不失信於伐原語未終大祖撫掌曰我解爾意欲激我耳於是即命遣循陳書曰蕭濟為楊州長史高宗嘗勑取楊州曹事躬自省覽見濟條理詳悉文無滯留乃顧謂左右曰我本期蕭長史長於經傳不意精練繁劇乃至於此隋書曰榮毗楊素薦毗為華州長史世號為能素之田宅多在華陰左右放縱毗以法繩之無所寬貸毗因朝集素謂之曰素之舉卿適以自罰也毗答曰奉法一心者但恐纍公所舉素笑曰前者戲耳卿之奉法素之望也又曰高祖時制刺史二佐每歲暮更入朝上考課唐書曰張惟一為荊州長史以防禦使陳希昂為司馬希昂衡州酋帥家兵千人在部下自為藩衛有牟遂金仕至將軍為惟一將希昂積憾持兵領衆入惟一衙索遂金頭金藏於惟一後院惟一懼截頭遂與之兵始退自此之後政歸希昂惟一寄坐而已司馬北史曰魏蘇亮拜黃門侍郎文帝子宜都王武為秦州刺史以亮為司馬帝謂亮曰黃門郎豈可為秦州司馬以朕愛子出藩故以心腹相委勿以為恨三國典略曰齊以太子率更令崔龍子為司州司馬初龍子為司徒功曹嫁女與穆提婆以求此職提婆許之以其品懸絶先轉為率更令至是成婚既畢即便用之尋有謠言榜於路側曰司州司馬崔老鴟取錢能疾判事遲御史馮士幹見而劾之遂免其官北史曰隋房恭懿歷澤德二州司馬盧愷復奏其政美上甚異之復賜以帛諸州朝集稱為勸勵之首以為上天宗廟之所祐助豈朕寡薄能致之乎隋書曰劉摸為嵐州司馬楊諒既作亂刺史喬鍾葵發兵將赴逆摸拒之曰漢王所圖不軌公荷國厚恩致位方伯謂當竭誠效命以答慈造豈有大行皇帝梓宮未掩翻為厲階鍾葵失色曰司馬反耶臨之以兵氣辭不撓鍾葵義而釋之軍吏進曰若不斬摸何以厭衆心於是囚之於獄悉取模資財分賜黨與及諒平煬帝嘉之拜開府授天興令
