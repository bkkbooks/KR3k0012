body:
  text: 皇親部十二太子一周易離卦曰黃離元吉離南方之卦離為火土記位焉土色黃火之子喻子有明德能附麗於其父之道文王太子發是也慎成其業故吉矣象曰明兩作離大人以繼明照于四方王肅曰兩離相續維明之義也周易鼎卦曰初六鼎顛趾利出否得妾以其子旡咎鄭玄曰顛踣也趾足也無事曰趾設陳曰足爻體選為服初爻在服之下足象也足所以承正鼎也初陰爻而柔與乾同體以否正承乾乾為君以喻君夫人事君若失正禮踣其為足之道情無怨則當以和義出之然如否者嫁於天子雖失禮無出道遠之而已遠之子廢坤為順又為子母牛在后妃之旁側妾之例也有順德子必賢賢而立以為世子又何咎也周易震卦曰震驚百里不喪匕鬯彖曰震驚百里遠而懼邇也出可以守宗廟社稷以為祭主王肅曰在有靈而尊者莫若於天有靈而貴者莫若於王有聲而威者莫若於雷有政而嚴者莫若於侯是以天子當乾諸侯用震地不過一同雷不過百里政行百里則匕鬯亦不喪祭祀國家大事不喪宗廟安矣處則諸侯執其政出則長子掌其祀周易說卦曰震一索而得男故謂之長男又曰震為長子易經曰震下乾上旡妄天精起鄭玄注曰起猶立也乾為天文震為長子聖人立為天子天下之民各得其所也又曰主器者莫若長子故受之以震尚書大傳曰唯四月太子發上祭于畢下至於盟津之上乃告于司馬司徒司空諸節亢才豫無知以先祖先父之有德之臣左右小子豫受先公戰力賞罰以定厥功明于先祖之遺鄭玄注曰四月者周四月也發周武王也卒父業故稱太子也太子發升于舟中流白魚入于舟王跪取出俟以燎群公咸曰休哉尚書中候曰廢考立發為太子鄭玄曰定王業也又曰我終之後恆稱太子終卒恆常也稱太子者明非諸侯王事未定矣又曰太子發以紂存三仁附即父位不稱王發武王名也三仁箕子比于微子文王得赤雀丹書故號以應天道未成而崩武王以天誅未行謙不自成故稱太子明統諸而未為王又曰豫稱太子發明慎父以名卒考豫我也父死曰考文王命武王我終之後恆稱太子者明慎文王之命也君存稱世子薨稱太子既葬稱子踰年稱公今踰年而稱太子發若父業有不成者而將軍周書曰文王受命九年時維暮春在鄗召太子發曰嗚呼吾語女所保所守之哉厚德廣惠忠信志愛人君之行四者君德不為驕侈不為太靡不淫於美括柱茅茨為民愛費言務儉也因就木枚曰括也春秋演孔圖曰聖人在後曰望陽苞懷至德據少陽文王子也故曰在後嗣文王矣賈誼書曰文王使太公望傅太子發嗜鮑魚不登于俎豈有非禮而可養太子哉帝王世記曰武王納太公之女曰邑姜修教于內生太子誦尚書顧命曰爾尚明時朕言用敬保元子釗時是也元子釗康王名也弘濟于艱難穆天子傳曰成姬之喪邢侯曹侯來弔內史將之以見天子天子告不豫而辭焉邢侯曹侯乃弔太子太子哭出廟門以送邢侯再拜勞之侯不答拜謙不與太子亢也周書曰晉平公使叔譽于周見太子晉與之言叔譽叔向五稱而三窮逡巡而退其言不遂五稱說五事遂終矣歸告公曰太子晉行年十五而臣不能與言師曠見太子先稱曰吾聞太子之語高於太山願一言王子應之曰吾聞太師將來吾心甚喜既見子喜而又懼吾聞女知人年長短吉凶也曠對曰女聲清女色赤火色不壽太子曰然卻後三年吾將上賓於帝所女慎毋言殃將及女師曠歸未及三年告死者至也春秋傳曰靈王二十一年穀洛鬥將毀王宮王欲壅之太子晉諫曰不可晉聞古之長民者不隳山不崇藪不防川不竇澤列仙傳王子喬周靈王太子晉也好吹笙作鳳皇鳴遊伊洛間有道士浮丘伯引上嵩山仙去尚書大傳曰堯為天子朱為太子舜為左右鄭注曰左右助也若周之冢宰典國事堯知朱之不肖必將壞其宗廟滅其社稷而天下同賊之肖似也堯受運行知天命在受又深知朱之不似不欲命於天誅如桀紂也故堯推尊舜而尚之屬諸侯致天下於大麓之野又曰高宗有親喪居廬三年然未嘗言國事而天下無背叛之心者何也及其為太子之時盡以知天下人民之所好惡是以雖不言國事也知天下無叛之心家語曰子張問曰書云高宗諒暗三年不言言乃雍有諸王肅曰雍權貌書言乃雍雍和也孔子曰胡為其不然古者天子崩則世子委政於冢宰三年成湯既沒太甲聽於伊尹武王既喪成王聽於周公其義一也尚書大傳曰太子年十八曰孟侯孟侯者於四方諸侯來朝迎於郊者問其所不知也問人民之所好惡土地所生美珍怪異山川之所有無及父在時皆知之鄭玄注曰十八嚮入大學為成人博問庶事也又曰棄法律逐功臣殺太子以妾為妻則火不炎上又曰古之帝王者必立太學小學禮記曰學在公宮之左太學在郊使公卿太子大夫元士之嫡子十有三年始入小學見小節焉踐小義焉年二十入太學見大節焉踐大義焉故入小學知父子之道長幼之序入太學知君臣之儀上下之位小師取小學之賢者登之天子天子以為左右天子當為太子禮志曰周公居攝踐祚而治亢世子法於伯禽使之為成王居欲使成王之知父子君臣長幼之義所以善成王也尚書洪範五行傳曰心之大星天王也其前星太子也後星庶子也荊州星占曰少微星一名處士星儲君副主之宮韓詩外傳曰五帝官天下三王家天下家以傳子官以傳賢故自唐虞已上經傳無太子稱號夏殷之王雖則傳嗣其文略矣至周始見文王世子之制又曰趙簡子太子名伯魯小子名無恤簡子自為二書牘親自表之書曰節用聽聰敬賢勿慢使能勿賤與二子使誦之居三年簡子坐清臺之上問二書所在伯魯忘其表令誦不能得無恤出其書於袖令誦習焉乃黜伯魯而立無恤又曰魏文侯封太子擊於中山三年不往來趙倉唐曰君何不遣人使大國太子曰願之久矣未得可使者對曰臣願奉使侯何好太子曰侯嗜晨鳧好北犬於是遣倉緤北犬奉晨鳧獻之侯曰擊愛我知我所嗜好說苑又載事具奉使部說苑曰經侯過魏太子左帶羽玉具劍右帶環珮左光照右右光照左太子不視經侯曰魏國有寶乎太子曰主信臣忠百姓戴上此魏國之寶也毛詩曰渭陽康公念母也康公之母晉獻公之女文公遭驪姬之難未返而秦姬卒穆公納文公康公時為太子贈送文公於渭之陽念母之不見也毛詩曰小辨刺幽王也太子之傅作焉辨彼鸒斯歸飛提提興也辨樂也鸒卑居卑居雅鳥也提提群飛貌箋云樂乎伎雅鳥出食在野其飽群飛而歸提提然興者喻凡人父子兄弟出入宮庭相與飲食亦提提然樂傷今太子獨不然民莫不穀我獨于罹幽王取申女生太子宜咎又悅褒姒生子伯服立以為后而放宜咎將殺之箋云穀養也于日也罹憂也天下之人無不父子相養者我太子獨不然日以憂也又曰懷德維寧宗子維城無俾城壞無獨斯畏懷和也箋云斯離也和女德無行酷虐之政以安女國是以為宗子之城使免於難遂行酷虐則禍及宗子是謂城壞城壞則乖離而散女獨居而畏矣宗子嫡子也周禮曰惟王建國辨方正位干寶注曰辨方謂別東西南北之名以衰陰陽也正位謂若君南面當陽臣北面即陰居於北宮以體太陰居太子於東宮以位少陽之類又曰膳夫掌王之食飲膳羞以養王及后世子歲終則會唯王及后世子之膳不會不會計多少優尊者其頒賜諸臣則計之又曰凡其死生鮮槁之物以供王之膳與其薦之物及后世子之膳羞鄭司農云鮮謂生肉槁謂乾肉也又曰內饔掌王及后世子膳羞之割烹煎和之事選百羞醬物珍異以俟饋供后及世子之膳羞又曰籩人為王及后世子供其內羞於其飲食以供房中之羞又曰醯人供后及世子之醬齏葅又曰外府掌邦布之出供王及后世子之衣服之用又曰國君過市則刑人赦夫人過市罰一幕世子過市罰一奕市者人之所交利而行刑之處君子無故不遊觀焉若遊觀則施惠以為說也又曰王之諸子國有大事則帥國子而致於太子唯所用之若有甲兵之事則授之車甲合其卒伍置其有司以軍法治之司馬弗正軍法百人為卒五人為伍弗不也國子屬太子司馬雖有軍事不賦之也凡國之政事國子存遊倅使之修德學道春合諸學秋合諸射以考其藝而進退之遊倅之未仕者學太學也射名也王制曰春秋教以禮樂冬夏教以詩書王太子群子卿大夫元士之適子國之後選皆造焉儀禮聘禮曰遭夫人世子之喪君不受使大夫受於廟其他如遭君喪夫人世子死君為喪主使大夫受聘禮不以凶接吉也其他謂禮所降大戴禮曰古之王者太子生因舉之禮使士負之有司參夙興端冕見之南郊見之天也過闕則下過廟則趨孝子之道也故自為赤子則教固以行矣又曰太子既冠免於保傅之嚴則有司過之史有虧膳之宰太子有過史必書史之義不得不書過不書過則死過書而宰徹其膳宰之義不得不徹膳不徹膳則死於是有進善之旌誹謗之木敢諫之鼓禮記曰大夫士之子不敢與世子同名鄭玄注曰避僭邪也其先生則亦弗改世或為太又曰王太子王子群后之太子卿大夫元士之適子凡入學以齒皆以長幼受學尊卑不同又曰文王之為世子朝於王季日三雞初鳴而衣服至於寢門之外問內豎之御者曰今日安不何如內豎小臣之屬掌內外之通令也如今小史直日矣內豎曰安文王乃喜孝子恆兢兢也及日中又至亦如之又復及暮又至亦如之暮夕其有不安節則內豎以告文王文王色憂行不能正履節謂居處故事履蹈地王季復膳飲食安也然後亦復初憂解食上必在視寒暖之節在察食下問所膳所食命膳宰曰末有原應曰諾然後退末猶勿也原再進也勿有所再進為失飪臭味惡也退反其寢武王帥而行之不敢有加焉庶幾程式之帥循也又曰樂正司業父師司成一有元良萬國以貞世子之謂也又曰成王幼不能蒞阼周公相踐阼而治踐履也代成王履阼階攝王位治天下抗世子法於伯禽欲令成王之知父子君臣長幼之道抗猶舉也謂舉世子之法使與成王居而學之也成王有過則撻伯令所以示成王世子之道以成王之過擊伯禽則足以感喻焉凡學世子及學士必時四時各有宜學士謂司徒論俊選所升於學者春夏學干戈秋冬學羽籥皆於東序又曰凡三王教世子必以禮樂樂所以修內禮所以修外也禮樂交錯於中發形於外是故其成也懌恭敬而溫文中心中也懌悅懌也立太傅少傅以養之欲其知父子君臣之道也仲尼曰昔者周公攝政踐阼而治抗世子法於伯禽所以善成王也聞之曰為人臣者殺其身有益於君則為之況于其身以善其君乎周公優為之于讀曰迂迂猶廣也是故知為人子然後可以為人父知為人臣然后可以為人君知事人然後能使人成王幼不能蒞阼以為世子則無為也以為世子若為世子時也是故抗世子法於伯禽使之與成王居亦學此禮於成王側欲令成王之知父子君臣長幼之義也君之於世子也親則父也尊則君也有父之親有君之尊然後兼天下而有之是故養世子不可不慎處君父之位覽海內之士而近不能以教其子則其餘不足觀也行一物而三善皆得者唯世子而已其齒於學之謂也物猶事也又世子之記曰朝夕至于大寢之門外問內豎曰今日安否何如朝夕朝朝暮夕也日中又朝文王為世子也非禮之制世子之禮亡此存其記內豎曰今日安世子乃有喜色其有不安節則內豎以告世子世子色憂不蒲容色憂憂淺不及文王不能正履也內豎言復初然後亦復初朝夕之食上世子必在視寒暖之節食下問所膳羞必知所進以命膳宰然後退羞必知所進必知親所食若內豎言疾則世子親齊玄冠而養親猶自也養疾者玄冠玄端膳宰之饌必敬視之疾者之食齊和所欲或異疾之藥必親嘗之試毒味也嘗饌善則世子亦能食善謂多於前也嘗饌寡世子亦不能飽又不及武王一飯再飯以至于復初然後亦復初也復常所厥禮記曰國君世子生告於君接以太牢宰掌具接續如捷捷勝也謂食其母使之補虛強氣也凡接子擇吉日雖三日之內尊卑皆必選其吉日也冢子則太牢冢大也庶人特豚士特豕大夫少牢國君世子太牢皆謂長子又曰世子生則君沐浴朝服夫人亦如之皆立于阼階西鄉世婦抱子升自西階君名之乃降子升自西階則人君見世子於露寢也適子庶子見於外寢比適子謂世子弟庶子妾子也冢子未食而見必執其右手適子庶子已食而見必循其手未食己食急正緩庶之義也又曰世子佩瑜玉而綦組綬左傳桓公曰北戎伐齊齊侯使乞師於鄭鄭太子忽帥師救齊六月大敗戎師獲其二帥大良少良甲首三百以獻于齊於是諸侯之大夫戍齊齊人饋之餼使魯為其班後鄭鄭忽以其功也怒故有郎之師公之未婚於齊也齊侯欲以文姜妻鄭太子太子忽辭人問其故太子曰人各有偶齊大非吾偶也詩云自求多福在我而已大國何為君子曰善自為謀及敗戎師也齊侯又欲妻之固辭人問其故太子曰無事於齊吾猶不敢今以君命奔齊之急而受室以歸是以師婚也民其謂我何遂辭諸鄭伯又曰九月乙卯子同生服虔注曰桓太子莊公同以太子生之禮舉之接以太牢接者子初生接見於父卜士負之士妻食之公與文姜宗婦命之又曰曹太子來朝曹太子桓公子莊公射姑賓之上卿之禮曹伯有故使其太子攝而朝曲禮曰諸侯之嫡子攝其君未誓於天子則以皮帛繼子男如諸侯之上卿禮也上卿出入三積食三牢牽二年一享一食宴之也饗曹太子初獻樂奏而歎初獻酒如獻爵樂奏人上堂也初獻爵奏樂太子歎而哀歎也施父曰曹太子其有憂乎非歎所也施父魯大夫古之享食所以觀威儀省禍福無喪而感憂必及焉曹太子臨樂而歎故曰其有憂乎父將死兆先見之也又曰晉侯使太子申生伐東山皋落氏里克諫曰太子奉冢祀社稷之粢盛以朝夕視君膳者故曰冢子君行則守有守則從從曰撫軍守曰監國古之制也夫帥師專行謀誓軍旅君與國政之所圖也非太子之事師在制命而已稟命則不威專命則不孝故君之嫡嗣不可以帥師君失其官帥師不威將焉用之且臣聞皋落氏將戰君其舍之舍置置申生勿使將兵也公曰寡人有子未知其誰立焉不對而退里克不對太子帥師公衣之偏衣佩之金玦偏衣偏裝之衣偏異色駁不純裝在中左右各異故曰偏金玦以金為玦太子將戰狐突諫曰不可昔辛伯諗周桓公曰內寵並后外寵二政嬖子配嫡大都耦國亂之本也周公弗從故及於難今亂本成矣立可必乎孝而安民子其圖之與其危身以速罪也速召也疾也言太子不去身必危疾召罪狐突知其雖本既成而太子拘於一節不達至孝之義與皋落戰雖勝而歸猶不能免於難而使父有悖感殺子之罪故傳曰儲衆賢之言以迹太子所以死也經在僖信公五年晉侯殺其世子申生又曰會于首止會王太子鄭謀寧周也惠王以惠后故將廢太子鄭而立王子帶故齊桓帥諸侯會王太子以定其位又曰盟會於寧母謀鄭故也鄭伯使太子華聽命于會言於齊侯曰泄氏孔氏子人氏三族實違君命君若去之以為成我以鄭為內臣君亦無所不利焉齊侯將許之管仲曰君以禮與信屬諸侯而以姦終之無乃不可乎子華由是得罪於鄭鄭伯罪之也又曰初鄭公子蘭出奔晉公子蘭鄭文公賤妾燕姞之子穆公也鄭逐群公子故奔晉也從於晉侯伐鄭請無與圍鄭許之晉善蘭不忘本國故也故使待命於東待命於鄭東也鄭石甲父侯宣多逆以為太子以求成於晉晉人許之又曰秦康公送公子雍於晉也康公秦穆公太子罃晉出也曰文公之入也無衛故有呂郤之難呂甥郤芮欲焚公害也乃多與之徒衛衛徒兵也穆嬴日抱太子穆嬴襄公夫人太子靈公以啼于朝曰先君何罪其嗣亦何罪舍嫡嗣不立而外求君將焉置此實置也此太子出朝則抱以適趙氏頓首於宣子之門曰先君奉此子而屬諸子曰此子若才吾受子之賜如子為吾教誨此子使之有賢才知人君之道也明吾受子之賜賜猶惠不才吾唯子之怨才而受賜美其教也不才怨子惡其教不至也今君雖終言猶在耳君沒未久其言聲言氣尚在耳而棄之若何宣子與諸大夫皆患穆嬴且畏逼言諸大夫患釐嬴之言以君顏命之言責己也畏逼迫無置靈公一曰畏他公干徒來相逼迫矣乃背先蔑而立靈公以禦秦師又曰郕太子朱儒自安夫鍾自安猶處也夫鍾郎邑國人弗徇徇順也十二年春郕伯卒郕人立君立君改立君不周太子者太子以夫鍾與郕邽來奔郕邽亦邑名也一曰郟邦之寶圭太子父在自安於夫鍾國人以為不順故郕伯卒而更立君太子以其國寶與地夫鍾來奔也又曰齊高厚相太子光以會諸侯於鍾離不敬士莊伯曰高厚相太子會諸侯將社稷是衛而皆不敬高厚與光俱不敬棄社稷也其將不免乎免脫也言將不脫罪禍不以壽終也傳舉此者為十九年齊殺其大夫高厚二十五年崔杼弒君光起本也又曰齊侯娶於魯曰顏懿姬無子其姪鬷聲姬兄子曰姪懿姬所從也顏鬷皆其母姓懿聲諡也傳家從後言之故舉諡也生光以為太子諸子諸子妾生子氏仲子戎子子嬖二子宋女仲子生牙公子牙也屬諸戎子戎子取牙養之戎子請以為太子許之齊侯許之仲子曰不可廢常不祥立長為常而廢之為不祥也間諸侯難間犯謂光已列於諸侯難成光之立也列於諸侯矣謂上數從諸侯北伐盟會今無故而廢之是專黜諸侯也專獨也光比與諸侯列於盟不可黜也而以難犯不祥以難成之事犯不善君必悔之公曰在我而已遂東太子光東徙之東垂也使高厚傅牙以為太子夙沙衛為少傅齊侯疾崔杼微逆光微隱匿也疾病而立之疾困也而立為太子
