front:
  text: 時序部十五人日荊楚歲時記曰正月七日為人日董勛問禮俗曰正月一日為雞二日為狗三日為豬四日為羊五日為牛六日為馬七日為人以七種菜為羹翦綵為人或鏤金薄為人以貼屏風亦戴之頭鬢董勛問禮俗云人入新年形容改從新又造華勝相遺起於晉代見賈充李夫人典戒云像瑞圖金勝之形又取像西王母戴勝也舊以正月七日為人故名為人日今北人此日亦有諱食菜者與楚俗正反剪綵鏤金薄為人皆符人日之意與正旦鏤雞於戶同北人亦有至人日諱食故歲菜唯食新菜者又餘日不刻牛羊狗豬馬之像而二日獨施人雞此則未喻郭緣生述征記云壽張縣安民山魏東平王鑿山頂為會望處刻銘於壁文字猶在所載銘辭即此處老子云衆人熙熙如登春臺如享大牢楚詞云目極千里傷春心則春日登臨自古為適但不知七日竟起何代晉代桓溫參軍張望亦有正月七日登高詩近代巳來南北同耳北人此日食煎餅於庭中作之云薰大未知所出也雜五行書曰正月七日男吞赤豆七顆女吞二七顆竟年無病又曰宋武帝女壽陽公主人日臥於含章殿簷下梅花落公主額上成五出花拂之不去皇后留之看得幾時經三日洗之乃落宮女奇其異竟效之今梅花粧是也談藪曰北齊高祖七日升高宴群臣問曰何故名人日魏收對以董勛正月一日為雞七日為人按一説云天地初開以一日作雞七日作人也劉臻妻陳氏進見儀曰正月七日上人勝於人魏東平王是日登壽張安仁山銘曰正月七日厥日惟人策我良駟陟彼安仁隨陽休之正月七日登高侍晏詩曰廣殿麗年輝上林起春色風生拂雕輦雲回浮綺翼隨薛道衡人日思歸詩曰入春才七日離家已三年人歸落鴈后思發在花前晉李充正月七日登剡西寺詩曰命駕升西山寓目眺原疇正月十五日史記樂書曰漢家祀太一以昏時祠到明今人正月望日夜遊觀燈是其遺事荊楚歲時記曰正月十五日作豆穈加油膋其上以祠門戶齊諧記曰正月半有神降陳氏之宅云是蠶室若能見祭當令蠶桑百倍疑非其事祭門備之七祠今州里風俗望日祠門其法先以楊枝插門而祭之齊諧記曰吳縣張成見一婦人立宅東南角謂成曰此地是君蠶室我即地神矣正月半日可作白粥泛膏於上以祭之當令君家蠶桑百倍言訖而去絶失所在或為作膏粥已後年年大得蠶世人正月半作粥禱之加以肉覆其上登屋食之咒云登膏麋挾鼠腦欲來不來待我三蠶老則以為蠶襄鼠與齊諧記相符又覆肉亦是覆膋之理石虎鄴中記正月十五日有登高之會則登高又非今世而然者也其夕則迎紫姑以卜劉敬叔異苑云紫姑本人家妾為大婦所妬正月十五日感激而死故世人作其形迎之云子壻不在曹夫人巳行紫姑可出異苑又云於廁間或豬欄邊迎之捉之覺重是神來也平昌孟氏嘗以此日迎之遂穿室而自爾正著以敗衣蓋為此也洞覽云帝嚳女將死云生平好樂至正月可以見迎又其事也俗云溷廁之間必須淨然後能致紫姑異苑曰世人以十五日迎紫姑捉者覺重便是神來奠設酒果亦覺貌輝輝有色即跳躁不住能占衆事卜將來蠶桑又善射鉤好即大舞惡則仰眠平昌孟氏恆不信躬試往捉便自躍穿頂永失所在也唐兩京新記云正月十五日夜勑金吾弛禁前後各一日以看燈光若晝日世説正月十五日禰衡嘗被魏武謫為鼓吏於此日試鼓漁陽桴作魚陽參淵淵有金石聲後漢書注曰文士傳曰衡擊鼓為漁陽參撾踏地來躡足跂腳容態不常鼓節甚悲易衣單復擊鼓參撾而去至今有漁陽撾自衡始也參音七甘切陳太子舍人徐德言之妻叔寶之妹封樂昌公主才色冠絶時陳政方亂德言知不相保謂其妻曰以君之容國亡必入權豪之家儻情緣未斷猶冀相見宜有以信之乃破一鏡人執其半約曰他日必以正月望日賣於都市我當在即以是日訪之及陳亡其妻果入楊素之家德言遂以正月望日訪於都市有蒼頭賣半鏡者大高其價人皆笑之德言直引至其居出半鏡以合之仍題詩曰鏡與人俱去鏡歸人不歸無復姮娥影空餘明月輝陳氏得詩涕泣不食素知之還其妻仍厚遺之與德言歸江南竟以終老玉燭寶典曰正月十五日作膏粥以祠門戶西域記曰摩竭陀國正月十五日僧徒俗衆雲集觀佛舍利放光雨花唐蘇味道正月十五日夜詩曰火樹銀花合星橋鐵鎖開暗塵隨馬去明月逐人來遊騎皆穠李行歌盡落梅金吾不惜夜玉漏莫相催崔液正月望夜遊詩曰玉漏銅壺且莫催鐵關金鎖徹明開誰家見月能間坐何處聞燈不看來又曰神燈佛火百輪張刻像圖形七寶裝影裏如聞金口説空中似散玉毫光又曰金勒銀鞍控紫騮玉輪朱幰駕青牛驂驔始散東城曲倏忽還逢南陌頭晦日荊楚歲時記曰元日至于月晦並為酺聚飲食每月皆有弦望晦朔以正月初年時俗重以為節士女泛舟或臨水宴樂玉燭寶典曰元日至月晦人並為酺食渡水士女悉湔裳酹酒於水湄以為度厄今世人唯晦日臨河解除婦人或湔裙後魏盧元明晦日泛舟應詔詩曰輕灰吹上管落蓂飄下蒂遲遲春色華晼晼年光麗北齊魏收晦日泛舟應詔詩曰裊裊春枝弱關關新鳥呼棹唱忽逶迤菱歌詩顧慕睿賞方月色宴言忘日暮猶豫慰人心照臨康國步唐太宗月晦詩晦魄移中律凝暄起麗城罩雲朝蓋上穿露曉珠呈笑樹花分色啼枝鳥合聲披襟勤眺望極目暢春情中和節唐書云貞元五年正月十一日詔曰四序嘉辰歷代增置漢宗上巳晉紀重陽或説穰除雖因舊俗與衆宴樂誠洽當時朕以春方發生候維仲月勾萌畢達天地同和俾其昭蘇宜均暢茂自今已後以二月一日為中和節內外官司並休假一日先勑百寮以三令節集會今宜以中和節代晦日中和之節自茲始也又曰其月二十八日中書侍郎李泌奏伏以仲春初吉制嘉節以徵之更晦日於往月之終揆明辰於來月之始請令文武百辟以是日進農書司農獻穜稑之穜三公戚里上春服士庶以刀尺相遺村社作中和酒祭勾芒神聚會宴樂名為饗勾芒祈年穀仍望各下州府所在頒行從之又云貞元六年上以中和節宴百寮於曲江上賦詩以賜之百官皆和焉是歲戴叔倫為容州刺史素有詩名上乃令録其詩以賜之社孝經緯曰社土地之主也土地闊不可盡祭故封土為社以報功也禮記月令曰二月之節是月也擇元日命人社為祀社稷也春事興故祭之以祈農祥元日謂近春分前後戊日元吉也又曰王為群姓立社曰太社王自立社曰皇社諸侯為百姓立社曰國社自立社曰侯社大夫已下立社曰置社尚書曰用命則賞于祖不用命則戮于社社主陰陰主殺論語曰魯哀公問社於宰我對曰夏后氏以松殷人以柏周人以栗曰使民戰史記曰共工氏之子為后土能平水土故祀以為社故天子曰大社必受霜露風雨以達天地之氣也社所以親地也地載萬物天垂象取法於天所以尊天而親地也社共粢盛所以報本反始也漢書曰陳平為里中社宰分肉甚均父老善之平曰使平得宰天下亦如此肉又曰高祖天下定詔御史令治榆社春用羊彘祠之魏志曰王修年七歲喪母母以社日亡來年鄰里社修感念母悲哀其鄰里聞為之罷社晉書曰阮修字宣子伐社樹或止之籍曰或社為樹伐樹則社移樹而為社伐樹則社亡也荊楚歲時記曰社日四鄰並結綜會社牲醪為屋於樹下先祭神然後饗其昨鄭氏云百家共一社今百家所社綜即共立之社也寒食荊楚歲時記曰去冬節一百五日即有疾風甚雨謂之寒食據曆合在清明前二日亦有去冬至一百六日陸翽鄴中記曰寒食三日作醴酪又煮粳米及夌為酪搗杏仁煮作粥案玉燭寶典今日悉為大夌粥研杏仁為酪別餳沃之又孫楚祭子推文云黍飯一盤醴酪二盂是其事也又曰并州俗冬至一百五日為介子推斷火冷食三日作乾粥是今之糗也范曄後漢書曰周舉遷并州刺史太原一郡舊俗以介子推焚骸有龍忌之禁至其月咸言神靈不樂舉火舉移書於子推廟云春中寒食一月老小不堪今則三日而已魏武帝明罰令曰聞太原上黨西河鴈門冬至後百有五日皆沍寒之地老少羸弱將有不堪之患令人不得寒食若犯者家長半歲刑主吏百日刑令長奪一月俸周斐汝南先賢傳曰太原舊俗以介子推焚骸一月寒食莫敢煙爨劉向別録曰寒食踏蹴黃帝所造本兵勢也或云起於戰國案鞠與毬同古人踏蹴以為戲古今藝術圖云寒食鞦韆本北方山戎之戲以習輕趫者也又按周舉移書及魏武明罰令陸翽鄴中記並云寒食斷火起於子推琴操所云子綏綏即推也又云五月五日與今有異皆因流俗所傳據左傳及史記並無介子推被焚之事案周禮司烜氏仲春以木鐸修火禁于國中注云為季春將出火也今寒食準節氣是仲春之末清明是三月之初然即禁火蓋周之舊制玉燭寶典曰寒食此節城市尤多鬥雞之戲左傳有季郈斗雞其來遠矣周書時訓曰清明之日桐不華歲有大寒曰鼠不化國多貪殘虹不見婦人亂色戴勝不降桑政教不平唐李崇嗣寒食詩曰普天皆滅熖匝地盡藏煙不知何處火來就客心燃又宋之問途中寒食詩曰馬上逢寒食途中屬暮春可憐江浦望不見洛橋人又沈佺期嶺表逢寒食詩曰嶺外逢寒食春來不見餳洛陽新甲子何日是清明三月三日漢書曰武帝即位數年無子平陽公主求良家女十餘人飾置於家帝祓灞上而過焉還平陽主主見所待美人帝不悅既飲謳者進帝獨悅衛子夫應劭云祓除也今月上巳祓禳是也又漢書禮儀志曰三月上巳日官人並禊飲於東流水又曰太后春幸蠶館率皇后列侯夫人棄遵灞水而祓除又曰三月上巳官民皆潔於東流水上自洗濯祓除去宿垢為大潔潔者言陽氣布暢萬物記出始潔之也續漢志曰上已大會賓從於薄落津後漢書曰梁啇上已日會賓客於洛水酒酣繼以薤露坐者聞之皆為掩泣曰此所謂哀樂失時非其所也殃將及乎啇至秋果薨魏志曰袁紹三月上已大會賓從於簿落津聞魏郡兵及黑山賊于毒等數萬人共覆鄴城殺守坐中客家在鄴者皆憂怖失色或起而立紹容貌自若不改常度又晉中興書曰王導謂從兄敦曰王仁德未著而名位猶輕兄名已振宜有以共相匡舉會三月三日中宗出禊乘肩輦敦導並騎從紀瞻使人覘之既聞敦導騎從乃大驚自出拜於道左中宗從容謂導曰卿吾之蕭何也宋書曰武帝三月三日登八公山劉安故臺望日城郭如匹帛之繞藂花也崔鴻十六國春秋曰李皓三日宴于曲水命群僚賦詩皓為之序韓詩曰溱與洧方洹洹兮洹洹盛貌也謂三月桃花水下之時至盛也惟士與女方秉蕳兮秉執也蕳蘭也當此盛流之時衆士與衆女方執蘭拂除邪惡鄭國之俗三月上巳之辰此雨水之上招魂續魄拂除不祥故詩人願與所悅者俱往觀之荊楚歲時記曰三月三日四人並出江渚池沼間為流杯曲水宴續齊諧記曰晉武帝問尚書郎摯虞曰三日曲水其義何指答曰漢章帝時平原徐肇以三月初生三女至三日而俱亡一村以為怪乃相攜之水濱盥洗因水以泛觴曲水之義起於此也帝曰若如所談便非好事尚書郎束晢曰摯虞小生不足以知之臣請説其始昔周公城洛邑因流水以泛酒故逸詩云羽觴隨波又秦昭王三日置酒河曲見有金人出捧水心劍曰令君制有西夏及秦霸諸侯乃因此處立為曲水二漢相緣皆為盛集帝曰善賜金五十斤左遷摯虞為陽城令夏仲御別傳曰夏仲御詣洛到三月三日洛中公王以下莫不方軌連軫並南浮橋邊禊男則朱服耀路女則錦綺綺燦爛仲御時在船中曝所市藥雖見此輩穩坐不搖賈充望見深奇其節顧相與語此人有心膽有似冀缺走往問船中安坐者為誰仲御不應重問徐乃答曰會稽北海間民夏仲御夏統字仲御風土記曰漢末有郭虞者有三女一女以三月上辰一以上巳二日而三女産乳並亡迄今時俗以為大忌故到是月是日婦女忌諱不復止家皆適東流水上就通遠地祈祓自潔濯也丘淵之征齊道里記曰城北十五里有柳泉符朗常以為解禊處鄴中記曰石虎三月三日臨水會公主妃主名家婦女無不畢出臨水施張幔車服燦爛走馬步射飲宴終日陸翽鄴中記曰華林園中千金堤上作兩銅龍相向吐水以注天泉池通御溝中三月三日石季龍及皇后百官臨池會賞續搜神記曰盧充獦見麞便射中之隨逐不覺遠忽見一黑門如府舍問鈴下鈴下對曰崔少府宅也進見少府語充云尊府君為索小女婚故相迎耳三日畢車送充至家母問之具以狀對與崔別正四年而三月三日臨水戲遙見傍水有犢車充往開車戶見崔女與三男共載情意如初抱兒還充又與金鋺乃別戴延之西征記曰天泉之南有東西溝承御溝水水之北有積石壇云三月三日御坐流杯之處雜五行書曰欲知蠶善惡常三月三日天陰而無日不雨蠶大善風俗通曰謹案周禮女巫掌歲時以祓除疾病禊者潔也故於水上盥潔之也巳者祉也邪疾已去祈介祉也竹林七賢論曰王濟嘗解禊浴水明日或問王曰昨日遊有何語議答曰張華善説史漢裴逸民敘前言往行袞袞可聽晉羲之三月三日蘭亭序曰永和九年歲在癸丑暮春之初會于會稽山陰之蘭亭修禊事也群賢畢至少長咸集此地有崇山峻嶺茂林修竹又有清流激湍映帶左右引以為流觴曲水列坐其次雖無絲竹管絃之盛一觴一吟亦足以暢敘幽情是日也天朗氣清惠風和暢仰觀宇宙之大俯察品類之盛所以遊目騁懷足以極視聽之娛信可樂也宋顏延之三日曲水詩序曰日纏胃維月軌青陸皇祗發生之始后土布和之辰思對上靈之心以答庶萌之願有詔掌故爰命司曆獻洛飲之禮具上巳之儀南徐輦道北清禁林略亭皋跨芝田菀太液懷層山山居峻垝蔥翠幽煙於是離宮衛設別殿周徼然後升祕駕引緹騎搖玉鸞發流吹天動神移淵渟雲委以降于行所禮也梁沈約三日率爾成篇曰麗日屬元已年芳具在斯開花巳匝樹流鶯復滿枝洛陽繁華子長安輕薄兒東出千金堰西臨鴈鶩陂遊絲映空轉高柳拂地垂絲萍文照曜紫燕光陸離清晨戲伊水薄暮宿蘭池象筵排寶瑟金瓶泛羽巵寧憶春蠶起日暮桑欲萎梁簡文帝三月曲水詩序曰竊以周成洛邑自流水以禊除晉集華林同文軌而高宴莫不禮具義舉沓矩重規照動神明雍熙鍾石是節也上巳屬辰餘萌達壤倉庚應律女夷司候爾乃分階樹羽踈泉泛爵羽觴沿泝蕙肴沓來賓儀式序盛德有容舞艷七盤歌浮六變遊雲駐彩仙鶴來儀都人野老雲集霧會結軫方衢飛軒照日晉張華三月三日後園會詩曰暮春元日陽氣清明祁祁甘雨膏澤流盈習習祥風啓滯導生禽鳥逸豫桑麻滋榮纖條被緑翠華含英於我皇后欽若昊乾順時省物言觀中園宴及群辟乃命初筵合樂華池祓濯清川泛彼龍舟泝遊洪源又張華上巳篇曰仁風導和氣勾芒御昊春沽洗應時月元巳啓良辰明從自遠至童冠八九人伶人理新樂膳工獻時珍春醴踰九醞冬青過十旬晉閭丘沖三月三日應詔詩曰暮春之月春服既成外陽潤土冰渙川盈餘萌達壤嘉木敷榮后皇宣遊既宴且寧光光華輦侁侁從臣上蔭丹幄下藉文茵臨池挹盥濯故潔新俯鏡清流仰睇天津藹藹華林巖巖景陽嶪嶪峻字奕奕飛梁垂蔭倒景若翱若翔浩浩白水泛泛龍舟皇在靈沼百辟周遊激棹清歌鼓枻行謳聞樂咸和具醉斯柔在昔帝虞德被遐荒千鏚在庭苗人來王今我哲后古聖齊芳惠此中國以綏四方元首既明股肱惟良樂只君子今日惟康又潘尼上巳日帝會天淵池詩曰青春暮月六氣和理律應姑洗日惟元己谷風散凝微陽戒始春服既成明靈降祉又陸機棹歌行曰遲遲暮春日天氣柔且嘉元吉陸初已濯穢遊黃河龍舟浮鷁首羽旗垂藻乘風宣飛景逍遙戲中波隋盧思道上巳禊飲詩曰山泉好風日城市厭囂塵聊持一樽酒共尋千里春餘光下幽桂夕吹舞青蘋何時出關後重有入林人唐沈佺期三月三日梨園亭侍宴詩曰九門馳道出三已禊堂開畫鷁中川動青龍上苑來野花飄御座河柳拂天杯日晚迎祥處笙鏞下帝臺後漢張衡南都賦曰於是暮春之禊元巳之辰方軓齊軫祓于陽濱朱帷連綱曜野映雲男女妖袨服絡繹何繽紛晉成公綏洛禊賦曰考吉日簡良辰祓除鮮禊同會洛濱妖童媛女嬉遊河曲或漁纖手或濯素足臨清流坐沙場列罍樽飛羽觴又張協禊賦曰夫何三春之令月嘉天氣之絪縕流水清冷以汪濊原隰蔥翠以龍鱗於是縉紳先嘯疇命友攜接黨童冠者八九主希孔墨賓慕顏柳若夫權戚之家豪侈之誒乘騎齊鑣華輪方轂青蓋雲浮參差相屬集于長洲之浦曜乎泠川之曲遂乃停輿蕙渚息駕蘭田朱幔虹舒翠幕霓連浮素卵以蔽水灑玄醪於中河水禽為之駭踴陽侯為之動波又阮瞻上巳會賦曰臨清川而嘉宴聊暇日以遊娛蔭朝雲而為蓋託茂樹以為盧又王廙洛都賦曰若乃暮春嘉禊三已之辰貴賤同遊方驥齊輪麗服靚粧祓乎洛濱流芳塞路炫日映雲又禇爽禊賦曰伊暮春之令月將解禊於通川川回瀾以澄映嶺峭崿以霏煙輕霞舒於翠崖白雲映於青天風透林而自清氣扶嶺而載鮮
