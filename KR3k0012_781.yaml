body:
  text: 東夷一敘東夷尚書堯典曰分命羲仲宅嵎夷曰暘谷東表之地稱嵎夷暘明也日出於谷而天下明又大誥曰武王崩三監及淮夷叛三監管祭商淮夷徐奄之屬皆叛周周公相成王將黜殷命作大誥又蔡仲之命曰成王東伐淮夷遂踐奄成王即政淮夷奄國又叛王親征之遂滅奄而徙之作成王政為平淮夷徙奄之政令又費誓曰魯侯命伯禽宅曲阜徐戎並興東郊不開徐戎淮夷並起為寇於魯故東郊不開徂茲淮夷徐戎並興令往征此淮浦之夷徐州之戎並起為寇此戎夷帝王所羈縻統敘故錯居九州之內秦始皇遂出之善敹乃甲胄敿乃干無敢不弔備乃弓矢煆乃戈矛礪乃鋒刃無敢不善左傳僖下曰杞桓公來朝用夷禮故曰子杞先代之後而迫於東夷風俗雜壞言語衣服有時而夷故傳言其夷也又成公上莒子曰辟陋在夷其孰以我為虞又襄公六曰杞夏餘也而即東夷行夷禮又定公下曰公會齊侯于杞其實夾谷孔丘相犂彌言於齊侯曰孔丘知禮而無勇若使萊人以兵劫魯侯必得志焉菜人齊所滅菜夷也齊侯從之孔丘以公退曰士兵之以兵擊菜人兩君合好而夷之俘以兵亂之遠也非齊君所以命諸侯也不謀夏夷不亂華齊侯聞之遽辟之辟兵菜兵也毛詩云苕之華大夫閔時也幽王之時西戎東夷交侵中國師旅並起因之以飢饉君子閔周室之將亡傷己逢之故作是詩也又江漢尹吉甫美宣王也能興衰撥亂命召公平淮夷江漢浮浮武夫滔滔匪安匪遊淮夷來求論語子罕曰子欲居九夷馬曰九夷東方之夷有九種或曰陋如之何子曰君子居之何陋之有馬曰君子所居則化後漢書曰王制云東方曰夷夷者抵也言仁而好生萬物抵地而出故天性柔順易以道御至有君子不死之國焉又曰會稽海外有東鯷人鯷達奚切分為二十餘國又有夷洲及澶州傳言秦始皇遣方士徐福將童男童女數千人入海求蓬萊神仙不得徐福畏誅不敢還遂止此洲代代相承有數萬家人歲時至會稽市會稽東冶縣人有入海行遭風流移至澶洲者所在絶遠不可來往竹書紀年曰后芳即位三年九夷來御曰畎夷于夷方夷黃夷白夷赤夷玄夷風夷陽夷又曰后發即位元年諸夷賓于王門諸夷入舞又曰仲丁即位于藍夷白虎通曰夷者蹲也言無禮儀史系曰天監五年丹陽南山得瓦物高五尺圍四尺上鋭下平蓋如合焉中得劍一瓷具十數時人莫識沈約云此東夷罨盂也葬則用之代棺此制度畀小則隨當時矣東夷死則坐葬之武帝服其博識臨海水土志曰夷州在臨海東南去郡二千里土地無雪霜草木不死四面是山衆山夷所居山頂有越王射的正白乃是石也此夷各號為王分畫土地人民各自別異人皆髡頭穿耳女人不穿耳作室居種荊為蕃鄣土地饒沃既生五穀又多魚肉舅姑子婦男女臥息共一大床交會之時各不相避能作細布亦作班文布刻畫其內有文章以為飾好也其地亦出銅鐵唯用鹿觡矛以戰鬭耳磨礪青石以作矢鏃刃斧鐶貫珠璫飲食不潔取生魚肉雜貯大器中以滷之歷日月乃啖食之以為上肴呼民人為彌麟如有所召取大空材材十餘丈以著中庭又以大杵旁舂之聞四五里如鼓民人聞之皆往馳赴會飲食皆踞相對鑿床作器如稀槽狀以魚肉腥臊安中十十五五共食之以粟為酒木槽貯之用大竹筒長七寸許飲之歌似犬嗥以相娛樂得人頭斫去腦駮其面肉留置骨取犬毛染之以作鬢眉髮編具齒以作口自臨戰鬭時用之如假面狀此是夷王所服戰得頭著首還於中庭建一大材高十餘丈以所得頭差次挂之歷年不下彰示其功又卑家有女乙家有男仍委父母往就之居與作夫妻同牢而食女以嫁皆缺去前上一齒又曰安家之民悉依深山架立屋舍於棧格上似樓狀居處飲食衣服被飾與夷州民相似父母死亡殺犬祭之作四方函以盛尸飲酒歌舞畢仍懸著高山巖石之間不埋土中作冢槨也男女悉無履今安陽羅江縣民是其子孫也皆好猴頭羹以菜和中以醒酒雜五肉臛不及之其俗言寧自負人千石之粟不願負人猴頭羹臛朝鮮尚書大傳曰武王勝殷繼公子祿父祿父紂之子也釋箕子之囚箕子不忍商之亡走之朝鮮朝鮮今樂浪郡武王聞之因以朝鮮封之箕子既受周之封不得無臣禮故於十二祀來朝史記曰朝鮮張晏注曰朝鮮有濕水洌水汕水合為洌水疑樂浪朝鮮取名於此又曰朝鮮王滿燕人也自始燕時嘗略屬真番朝鮮為置吏築鄣塞秦滅燕屬遼東外徼漢興為遠難守復修遼東故塞至浿水為界屬燕燕王盧綰反入胸奴滿亡命聚黨千餘人魋結蠻夷服而東走出塞渡浿水居秦故空地上下鄣稍役屬真番朝鮮蠻夷及故燕齊亡命者王之子都王險王險地名會孝惠高后時天下初定遼東太守即約滿為外臣保塞外蠻夷毋使侵盜邊以聞上許之以故滿得以兵威財物侵降其旁小邑真番臨屯皆來服屬方數千里傳子至孫右渠所誘漢亡人滋多又未嘗入見真番旁衆國欲上書見天子又雍閼弗通元封二年漢使涉何譙諭右渠終不肯奉詔師古曰責讓也音才笑切何去至界臨浿水使馭刺殺送何者朝鮮禆王長長禆王名也即渡水馳入塞遂歸報天子曰殺朝鮮將上為其名美即不詰拜何為遼東東部都尉朝鮮怨何發兵襲攻殺何天子募罪人擊朝鮮其秋遣樓船將軍楊僕自齊浮渤海兵五萬人左將軍荀彘出遼東討右渠右渠發兵距險天子為兩將軍未有利乃使衛山因兵威往諭右渠右渠見使者頓首謝欲降恐兩將詐殺臣今見信節請服遣太子入謝獻馬五千匹及餽軍糧人衆萬餘持兵渡浿水使者及左將軍疑其為變謂太子已服降宜令人毋持兵太子亦疑使者左將軍詐殺之遂不渡浿水復引歸左將軍破浿水上軍乃前至城下圍其西北樓船亦往會居城南右渠遂堅城守數月未能下左將軍急擊之朝鮮大臣乃陰間使人約降樓船往來言尚未肯決天子使濟南太守公孫遂往征之有便宜得以從事遂至以節召樓船將軍入左將軍營計事即命左將軍戲下執縛樓船將軍并其軍以報天子天子誅逐左將軍已并兩軍即急擊朝鮮朝鮮相路人韓陶尼溪相參將軍王硤師古曰相路一人也韓陶二人也尼溪相參三也將軍王硤四也硤音頰相與謀使人殺朝鮮王右渠來降王儉城未下故右渠之大臣成已又反復攻吏左將軍使右渠子長降相路人子最告諭其民誅成已遂定朝鮮為真番臨屯樂浪玄菟四郡漢書地理志曰玄菟樂浪武帝時初置皆朝鮮獩貉勾驪蠻夷殷道衰箕子去之朝鮮教其民以禮義田蠶織作樂浪朝鮮民犯禁八條如淳曰有其四其四不見相殺以當時償殺相傷者以穀償相盜者男沒入為其家奴女子為婢欲自贖者人五十萬雖免為民俗猶羞之嫁娶無所讎是以其民終不相盜無門戶之閉婦人貞信不淫辭其田民飲食以籩豆都邑頗放效吏及內郡賈人往往以杯器食郡初取吏於遼東吏見民無閉藏及賈人往者夜則為盜俗稍益薄今相犯禁䆮多致六十餘條可貴哉仁賢之化也然東夷天性柔順異於三方之外故孔子悼道之不行乘桴浮於海欲居九夷有以也獩貊魏志曰獩貊國南與辰韓北與高勾麗沃沮接東窮大海今朝鮮之東皆其地也戶二萬餘昔箕子既適朝鮮作八條之教無門戶之閉而民不為盜其後四十餘世朝鮮侯淮僣號稱王陳勝等起略叛秦燕齊趙民避地東入朝鮮數萬口燕人衛滿魋結夷服復來王之漢武帝伐滅朝鮮分其地為四郡自是之後胡漢稍別無大君長自漢已來其官有侯邑君三老統主下戶其耆舊自謂與勾麗同種其人性愨願少嗜欲有廉恥不請勾麗言語法俗大抵與勾麗同衣服有異男女衣皆著曲領男子繫銀花廣數寸以為飾自單單大嶺以西屬樂浪以東七縣都尉主之皆以獩為民後省都尉封其渠帥為侯今不耐獩皆其種也其俗同姓不婚多忌諱每疾病死亡輒捐棄舊宅更作新居布麻蠶綿飲食亦有俎豆曉侯星宿豫知年歲豐約嫁娶喪葬之法有似勾麗不以珠玉為寶常用十月節祭天晝夜飲酒歌儛名為儛天又祭虎以為神其邑落相侵犯輒相罰責生口牛馬之名曰責禍殺人者償死寇盜作矛長三丈至戰時數人共持之樂浪檀弓出其地其海出班魚皮上饒文狗又出果下馬漢桓時獻之正始六年樂浪太守鄧茂帶方太守弓遵以嶺東獩屬勾麗興師伐之不耐侯等舉邑降八年詣闕朝貢詔更拜不耐獩王居處雜在人間四時詣郡朝謁二郡有軍征賦調供給役使遇之如民風俗通曰貊者謹案春秋傳大貊小貊貊者路也薄也不知送往勞來無宗廟粢盛賦殿輕薄也三韓後漢書曰韓有三種一曰馬韓二曰辰韓三曰辨辰馬韓在西有五十四國其北與樂浪南與倭接辰韓在東十有二國其地與獩貊接井韓在辰韓之南亦有十二國其有亦與倭接凡七十二國大者萬餘戶小者數千家各在山海間地合方四千餘里東西以海為限皆古之辰國也馬韓最大共立其種為辰王都目友國盡王三韓之地其諸國王先皆是馬韓種人焉馬韓人知田蠶作綿布出大栗如梨有長尾雞尾長五尺邑落雜居亦無城郭作土室形如冡開戶在上不知跪拜無長幼男女之別少綱紀國邑雖有主師不能相制御其葬有棺無槨不知騎乘牛馬不貴金寶錦罽唯重纓珠以綴衣為飾及懸頸垂耳大率皆魁頭露紒魁頭猶科頭也謂以髮縈繞成科結也紒音計布袍草履其人壯勇少年有築室作力者輒以繩貫脊皮縋以大木嚾呼為健善用弓盾矛櫓雖有鬭爭攻戰而貴相屈服俗信鬼神常以五月竟祭鬼神晝夜酒食群聚歌舞輒數十人相隨踏地為節十月農功畢亦如之諸國邑各以一人主祭天神號為天君又立蘇塗蘇塗者似浮塗建大木以懸鈴故事鬼神其南界近倭亦有文身者魏志曰馬韓漢桓靈之末韓獩強盛郡縣不能制民多流入韓國建安中公孫康分屯右縣以南荒地為帶方郡遣公孫模張敞等收集遺人興兵伐韓獩舊人稍出是後倭韓遂屬帶方魏景初中明帝遣帶方太守劉昕樂浪太守鮮于嗣越海定二郡諸韓國臣智加賜邑君印綬其次與邑長其俗好衣幘下戶詣郡朝謁皆假衣幘自服印綬部從事吳林以樂浪本統韓國分割辰韓八國與樂浪又曰有州胡在馬韓之西海中天島上其人差短小言語不與韓同皆髡頭如鮮卑但衣韋衣有上無下好養牛豕乘船往來市貨韓中矣辰韓後漢書曰辰韓耆老自言秦之亡人避苦役適韓韓割東界地與之其名國為邦弓為弧賊為寇行酒為行觴相呼皆為徒有似秦語故或名之為秦韓有城柵屋室諸小別邑各有渠師大者名臣智次有儉側次有樊祗次有殺奚次有邑偕皆其官名土地肥美宜五穀知蠶桑作縑布乘駕牛馬嫁娶以禮行者讓路國出鐵獩倭馬韓並從市之凡諸貨易皆以鐵為貨俗喜歌舞飲酒鼓瑟兒生欲令頭扁皆押之以石扁音補典切魏志曰辰王常用馬韓人作之世世相繼辰王不得自立為王明其為流移之人故為馬韓所制也其俗男女有別以犬馬鳥羽送死其意欲使死者飛揚其國作屋橫纍木為之有似牢獄辨韓後漢書曰辨辰與辰韓雜居城郭衣服皆同言語風俗有異其人形皆長大美髮衣服潔清而刑法嚴峻其國近倭故頗有文身者初朝鮮王準為衛滿所破乃將其餘種數千人走入海攻馬韓破之自立為韓王準後滅絶馬韓人復自立為辰王建武二十年韓人廉斯人蘇馬諟等詣樂浪貢獻廉斯邑名諟音是帝封蘇馬諟為漢廉斯邑君使屬樂浪郡四時朝謁靈帝末韓獩並盛郡縣不能制百姓亂苦多流亡入韓者魏志曰辨辰與辰韓雜居亦有城郭衣服居處與辰韓同言語法俗相似祠祭鬼神有異於竈皆在戶西
