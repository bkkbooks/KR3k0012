body:
  text: 皇王部十七後漢敬宗孝順皇帝東觀漢記曰孝順皇帝諱保孝安長子也母早薨追諡恭愍皇后上幼有簡厚之質體有敦愨之性寬仁溫惠始入小學誦孝經章句和熹皇后甚嘉之以為宜奉大統年六歲永寧元年為皇太子受業尚書兼資敏達初乳母王男廚監邴吉為大長秋江京中常侍樊豐等所譖訴京懼有後害遂共構太子太子坐廢為濟陰王安帝崩北鄉侯即尊位王廢絀不得上殿臨棺而悲哀泣血不下餐粥北鄉侯薨車騎閻顯等議前不用濟陰王今用怨人白閻太后復徵諸王子閉門發兵中黃門孫程等十九人共計賊臣以迎濟陰王於德陽殿西鍾下即皇帝位漢安元年八月遣侍中杜喬光祿大夫周舉等八人分行州郡頒宣風化舉實臧否建康元年八月帝崩于玉堂前殿在位十九年時年三十遺詔無起寢廟衣以故服珠玉玩好皆不得下務為節約葬憲陵廟曰敬宗續漢書曰帝為太子四歲避疾當阿母王聖弟新治乳母王男廚監邴吉以為犯土忌不可御與江京樊豐及聖二女永等相是非聖永誣譖男吉皆物故太子思戀男等數為之歎息聖永懼有後害遂與京豐等共構太子坐廢為王孝冲皇帝東觀漢記曰孝冲皇帝諱炳順帝之少子也年三歲是時皇太子數不幸國副未定有司上言宜建聖嗣建康元年四月立為太子順帝崩太子即帝位尊皇后梁氏為皇太后帝幼弱太后臨朝永熹元年正月帝崩于玉堂前殿在位一年葬懷陵帝王世紀曰孝冲皇帝即位一年年三歲孝質皇帝東觀漢記曰孝質皇帝諱纘章帝玄孫千乘貞王之曾孫也樂安王孫渤海王子也年八歲茂質純淑好學尊師有聞於郡國孝冲帝崩徵封建平侯即皇帝位本初元年閏六月帝崩于玉堂前殿在位一年時方九歲葬靜陵漢晉春秋曰帝初年幼小聞梁冀專權於天下每朝出輒目之曰此跋扈將軍冀聞而大懼遂陰行鴆毒始病呼太尉李固入固前問病帝曰食煮餅令腸中悶得水尚可活冀曰不可語未絶而崩威宗孝桓皇帝東觀漢記曰孝桓皇帝諱志章帝曾孫河間孝王孫蠡吾侯翼之長子也母曰匽音匽夫人年十四襲爵始入有殊於人梁大后欲以女弟妃之太初元年四月徵詣雒陽既至未及成禮會質帝崩無嗣太后密使瞻察威儀才明任奉宗廟遂與兄冀定策於禁中迎帝即位時年十五改元建和元年大將軍梁冀輔政縱橫為亂帝與中常侍單超等五人共謀誅之於是封超等為五侯五侯暴恣日甚毒流天下白馬令李雲坐直諫誅名臣少府李膺等並為閹人所譖誣為黨人下獄死在位二十一年崩年三十六薛瑩漢記贊曰漢德之衰有自來矣而桓帝繼之以淫暴封殖官豎群妖滿側姦黨彌興賢良被辜政荒民散亡徵漸積逮至靈帝遂傾四海豈不痛哉左傳曰國於天地有與立焉不數世淫不能斃也信矣孝靈皇帝續漢書曰孝靈皇帝諱宏章帝玄孫河間孝王曾孫解瀆亭侯淑之孫萇之子也母曰董姬萇薨上襲爵為侯永康元年十二月桓帝崩先是數有皇子夭昏不遂太后與父竇武定策禁中建寧元年正月徵到止夏門亭以王青蓋車迎入于殿即皇帝位太后臨朝四年正月帝加元服光和元年初置鴻都門生本頗以經學相引後試能為尺牘辭賦及以王書鳥篆相課試至千人皆尺一勑州郡三公舉用辟召或典州郡入為尚書侍中封侯賜爵四年於後宮與宮人為列肆販賣使相偷盜爭鬥上臨視以為樂又於西園令狗帶綬著進賢冠中平元年初賣官自關內侯以下至虎賁羽林入錢各有差二年收天下田畝十錢以治宮殿發太原河東豫道林木黃門常侍斷截州郡送林文石掌主史譴呼不中退賣之貴戚因緣賤買十倍入官其貴戚所入者然後得中宮室連年不成州郡因增加調發刺史二千石遷除皆責助治宮錢大郡至二千萬諸詔所徵皆令西園騶密約勑號曰中使恐動州郡多受財賂天下騷動起為盜賊矣是歲又於西園造萬金堂以為私藏別司農金錢繒帛積之於中又還河間買田業起弟觀上本侯家居貧即位常曰桓帝不能作官家曾無私錢故為私藏復寄小黃門常侍家錢至數千萬又云張常侍是我翁趙常侍是我母由是官官專朝日盛奢僣無度各起弟宅擬則宮室上嘗登永安候臺黃門常侍惡其登高臺見居處樓殿乃使中大夫尚坦諫曰天子不當登高登高則百姓虛自後遂不復登臺榭矣四年又募買關內侯假金紫入錢五百萬六年四月帝崩于嘉德殿在位二十二年時年三十四葬文陵續漢書五行志曰靈帝好胡服帳胡床胡飯胡箜篌笛胡儛京都貴戚皆競為之其後董卓多縱胡兵虜掠夜發掘園陵帝又於宮中西園駕四白驢躬自操轡驅馳周旋以為大樂於是公卿貴戚轉相倣效至相謀奪驢價與馬齊獻帝春秋曰初黃巾賊起靈帝建九重華蓋自稱無上將軍身被介胃講兵京城先是造作角錢猶五銖而有四道連於邊輪百姓或有識者以為妖徵竊言新錢有四道京城將壞而此錢四出散於四方之外乎遂皆如言薛瑩漢記贊曰漢氏中興至于延平而世業損矣冲質短祚孝桓無嗣母后稱制奸臣執政孝靈以支庶而登至尊由藩侯而紹皇統不恤宗緒不祗天命上虧三光之明下傷億兆之望于時爵服橫流官以賄成自公侯卿士降於皂隸遷官襲級無不以貨刑戮無辜摧仆忠賢佞諛在側直言不聞是以賢智退而窮處忠良擯於下位遂至奸邪蜂起法防隳壞夷狄並侵盜賊糜沸小者帶城邑大者連州郡編戶騷動人人思亂當斯之時已無天子矣會靈帝即世則禍尋其後宮室焚滅郊社無主危自上起覃及華夏使京室為墟海內蕭條豈不痛哉典略曰建寧二年帝年時十三歲官官用事排疾士人熹平四年五月帝自造皇義五十章光和五年帝幸太學自就石碑作賦廢帝弘農王獻帝春秋曰孝靈皇帝何皇后生太子辨帝數失子不敢正名養于道人史子眇家號曰史侯後漢書曰中平六年四月丙辰靈帝崩于南宮嘉德殿戊午皇子辨即皇帝位年十七太后臨朝八月中常侍假圭等殺大將軍何進於是虎賁中郎將袁術燒東西宮攻諸官者庾午張讓假圭等劫少帝及陳留王幸北宮司隸校尉袁紹勒兵收僞司隸校尉樊陵及諸閹人無少長皆斬之讓圭等復劫少帝陳留王走小平津尚書盧植追讓圭等斬之其餘投河而死帝與陳留王協夜步逐螢火光行數里得民家露車共乘之還宮九月董卓廢帝為弘晨王英雄記曰董卓在顯陽苑請官僚共議欲有廢立謂袁紹曰劉氏之種不足復遺袁紹曰漢家君天下四百許年恩澤深渥兆民戴之恐衆不從公議卓曰天下之事豈不在我我今為之誰敢不從紹曰天下健者不唯董公紹請立觀之橫刀長揖而去坐中皆驚愕時卓新至見紹大家故不敢害之卓於是遂策廢皇太后遷之永安宮其夜崩廢皇帝史侯為弘農王立陳留王為皇帝卓聞東方州郡謀欲舉兵恐其以弘晨王為主乃置王閣上荐薦之以棘召王太傅責問之曰弘農王病困何故不白遂遣兵迫守太醫致藥即日弘農王及妃唐氏皆薨袁山松後漢書曰董卓使弘農郎中令李孝儒進鴆於弘農王曰服此辟惡王曰此必是毒也弗肯強之於是王與唐姬及宮人共飲酒王自歌曰天道易兮我何艱棄萬乘兮退守藩逆臣見迫兮命不延逝將棄爾兮適幽玄唐姬起舞歌曰皇天崩兮后土頽身為帝王兮命夭摧死生路畢兮從此乖悼我焭獨兮中心哀因泣下坐者噓欷不自勝王謂唐姬曰卿故王者妃勢不復為吏民妻也行矣自愛從此長辭遂鴆死孝獻皇帝續漢書曰孝獻皇帝諱協靈帝少子也母曰王美人何皇后妬而害之靈帝母永樂太后董氏收養焉故號董侯中平六年四月靈帝崩太子辨即尊位年幼皇太后詔封上為渤海王七月徙封陳留王九月董卓廢天子立陳留王是日即皇帝位年九歲董卓秉政初平元年二月天子自雒陽遷都長安興平元年正月帝加元服二年十月上自長安東遷建安元年七月至雒陽八月上自雒陽遷都於許二十五年十月上禪位於魏魏王即帝位封上為山陽公青龍二年三月薨以天子禮葬禪陵獻帝春秋曰袁紹將兵入宮誅諸黃門張讓等逼迫以尺一詔開大夏門將帝及陳留王出不知所如有螢火照道到盟津河上傳國六璽不及自隨百僚分散唯河南中部掾閔貢見天子出率騎追之比曉到河上天子飢渴貢宰羊進之厲聲謂讓曰今不速死吾射殺汝讓等惶怖又手再拜叩頭向天子辭曰臣等死陛下自愛遂投河而死貢扶輦還宮時董卓適至屯顯陽苑聞帝當至率兵迎帝於北邙帝見卓兵振喜不自勝群公曰有詔卻兵卓曰卿為大臣不能匡輔國朝至令幼主蒙塵播越何卻兵之有遂俱入城帝幸北宮改年號曰昭寧於閣上得六璽失傳國璽又曰興平元年蝗蟲起百姓飢穀一斛五六萬錢帝勑主者盡賣廄馬二百餘匹及御府雜繒二萬匹賜公卿已下及貧民車騎將軍李𠐶不聽盡取以置其邸李𠐶郭汜有隙𠐶使兄子副車中郎將李進勒兵數千統宮使虎賁王曹等三百人以軺車三乘載帝及伏后幸𠐶營又迎宮人公卿家屬入塢移御府諸署繒綵珍寶上方在廄車馬乘輿器物盡置其邸放兵燒府庫及居民被害者不可勝數五月或欲轉乘輿幸黃白城帝不肯司徒趙溫以帝當東歸而𠐶等方亂以忠節責𠐶𠐶怒欲斬溫𠐶從弟上軍校尉維故溫掾請諫乃止於是閉溫與帝同門設反關校尉以監察之十一月車駕東幸到黃卷亭庚午乘輿到弘農張濟欲與董承楊奉交質而留乘輿承奉不肯白帝東行到澗中濟郭汜放兵欲留車駕承奉力戰乘輿得過公卿婦女衣服悉見鈔奪不解帶便斫㓨寒凍死者不可勝計天子得過路次曹陽乘輿到安邑十二月使侍中史跱直里切太僕韓融奉詔詔張濟悉遣宮人公卿以下婦女及乘輿服物車馬諸見略者皆詣安邑建安元年七月乘輿到洛幸城西故中常侍趙忠舍百官被荊棘依故丘墟間侍郎以下皆出葬采四方州郡各擁強兵莫有至者曹操白帝遷都許庚申車駕出洛轘轅而東陽奉韓暹引軍追之輕騎既至曹操設伏兵要於陽城山峽中大敗之九月車駕到許幸曹操營設有司營宗廟社稷自帝西遷朝廷傾覆王制節度於是始建漢晉陽秋曰獻帝都許守位而已宿衛近侍莫非曹氏黨舊恩戚議郎趙彥嘗為帝陳言時策曹操惡而殺之其餘內外多見誅操後以事入見殿中帝不任其忿因曰君能相輔則厚不爾幸垂恩相捨操失色俯仰求出舊儀三公輔兵入朝令虎賁執刃挾之操顧左右汗流洽背自後不敢復朝請袁山松後漢書曰獻帝崎嶇危亂之間飄薄萬里之衢萍流蓬轉嶮岨備經自古帝王未之有也觀其天性慈愛弱而神患若輔之以德真守文令主也曹氏始於勤王終至陷天遂力制群雄負鼎而趨然因其利器假而不反回山倒海遂移天日昔田常假湯武而殺君操因堯舜而竊國所乘不同濟其盜賊之身一也善乎莊生之言竊鉤者誅竊國者為諸侯之門仁義在焉信矣范曄後漢論曰傳稱鼎之為器雖小而重故神之所寶不可奪移至今負而趨者斯亦窮運之歸乎天猒漢德久矣山陽其何誅焉
