body:
  text: 人事部六十四謙易謙卦曰謙亨君子有終吉彖曰天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也象曰地中有山謙君子以裒多益寡稱物平施初六謙謙君子用涉大川吉六二鳴謙貞吉九三勞謙君子有終吉六四無不利撝擅謙上六鳴謙利用行師征吉易下繫曰謙德之柄也尚書曰滿招損謙受益左傳莊公曰齊侯使敬仲為卿辭曰羇旅之臣敢辱高位以速官謗敢以死告又成上曰晉與齊戰而勝歸范文子後入武子曰無為吾望爾也武子士會文子之父對曰師有大功國人喜以逆也先入必屬耳目是代帥受名故不敢武子曰吾知免矣知其不益己禍漢書曰張安世兄賀為掖庭令而宣帝以皇曾孫收養掖庭賀視養拊循恩甚密焉上追思賀恩欲封其冢為恩德侯置守冢戶二百家安世深辭賀封又求損守冢戶上曰吾自為掖庭令非為將軍安世乃止又曰于定國為人謙恭尤重經術士雖卑賤徒步定國皆與均禮又曰元帝即位徵孔霸為師賜爵關內侯霸為人謙退不好權勢常爵位泰過何德以堪之霸讓位自陳上深知其志誠乃弗用東觀漢記曰北海靖王睦顯宗之在東宮尤見幸而睦性謙恭好士名儒宿德莫不造門永平中法憲頗峻睦乃謝絶賓客放心音樂歲終遣中大夫奉璧朝賀召而謂曰朝廷設問寡人大夫將何辭對使者曰大王忠孝慈仁敬賢樂士臣雖螻蟻敢不以實睦曰吁子危我哉此乃孤幼時進趨之行也大夫其對以孤襲爵已來志意衰惰聲色是娛犬馬是好使者受命而行又曰李通娶寧平公主為大司空通性謙恭常避權勢謝病不視事又曰馮異字公孫為人謙退與諸將相逢輒引車避道每止頓諸將共論功伐異常屏止樹下軍中號大樹將軍又曰鄧騭兄常居禁中騭謙退不欲久在內連求還第太后乃許又曰樊宏為人謙慎常誡其子曰富貴盈溢未有能終者及病困車駕臨問其所欲言宏頓首自陳無功享食大國願還壽張食小鄉亭上悲傷其言而不許又曰梁商朝廷敬憚其委任自前世外戚見禮過尊顯所未曾有商門無駐馬請謁之賓謙虛挹損九命彌恭漢興已來妃后之家亦無商比晉書曰羊祜開府纍年謙讓不辟士始有所命會卒不得除署宋書曰劉懷慎武帝北伐以為中領軍宿衛輦轂雖名位優重而恭恪愈至每所之造位任不踰己者皆束帶門外下車其謹退類如此又曰蒯恩字道恩以戰功封新寧縣男武帝北伐留恩侍衛世子命朝士與之交恩益自謙損與人語常呼官位自稱鄙人撫士卒甚有恩紀又曰臨川王義慶為平西將軍荊州刺史荊州居上流之重資實兵士居朝廷之半義慶以宗室令美故特有此授性謙虛始至及去迎送物並不受又曰彭城王義康與王弘共輔朝政弘既多疾且每事推謙自省內外衆務一斷之義康又曰建平王宏為人謙儉周慎禮賢接士明達政事上甚信仗之轉尚書令唐書曰李藩以張建封在徐州辟為從事居幕中謙謙未嘗論細微會稽典録曰陳瑞字文象世為縣卒瑞謙恭敬讓及其居二千石九卿位少年童豎拜者皆正朝服與之抗禮若疾病不能答拜輒拊頰以謝之新序曰晉人伐楚楚大夫請擊之莊王曰先君在時晉不伐楚及孤之身而晉伐楚是孤之過如何其辱諸大夫大夫曰是臣之罪請擊之莊王俯泣起拜諸大夫晉人聞之曰君臣爭以過為在己上下一心三軍同力未可攻也還師而歸袁彥伯明謙曰賢人君子推誠以存禮非降己以應世率心以成謙非匿情以同物故侯王以孤寡饗天下江海以卑下朝百川易曰天道下濟而光明地道卑而上行老子曰高以下為基貴以賤為本此之謂乎讓上尚書舜典曰咨四嶽有能奮庸熙帝之載使宅百揆亮采惠疇僉曰伯禹作司空帝曰俞咨禹汝平水土惟時懋哉禹拜稽首讓于稷契暨皋陶帝曰疇若豫工工百工也僉曰垂哉垂臣名也帝曰俞咨垂汝作共工垂拜稽首讓于殳斨暨伯與帝曰俞往哉汝諧帝曰疇若豫上下草木鳥獸僉曰益哉帝曰俞咨益汝作朕虞虞掌山澤官名益拜稽首讓于朱虎熊羆朱虎熊羆二臣也帝曰俞往哉汝諧帝曰咨四嶽有能典朕三禮僉曰伯夷伯夷臣名帝曰俞咨伯汝作秩宗秩宗主郊廟之官伯拜稽首讓于夔龍毛詩魚藻角弓曰民之無良相怨一方受爵不讓至于己斯亡周禮地官上大司徒曰以陽禮教讓則民不爭禮記曲禮曰博聞強識而讓尊善行而不怠謂之君子又曲禮曰君子恭敬樽節退讓以明禮又坊記曰故貴賤有等衣服有別朝廷有位則民有所讓子去君子辭貴不辭賤辭富不辭貧則亂益亡子云觴酒豆肉讓而受惡民猶犯齒衽席之上讓而坐下民猶犯貴朝廷之位讓而就賤民猶犯君子云君子貴人而賤己先人而後己則民作讓又祭義曰天子有善讓德於天諸侯有善歸諸天子卿大夫有善薦於諸侯士庶人有善本諸父母又儒行曰儒有衣冠中動作慎其大讓如慢小讓如僞又鄉飲酒曰三揖至于階三讓以賓升月者三日則成魄三月則成時是禮有三讓左傳隱公曰宋穆公疾召大司馬孔父而屬殤公焉曰先君舍與夷而立寡人先君公兄宣公也與夷宣公子即所屬殤公也若以大夫之靈得保首領以歿先君若問與夷其將何辭以對請子奉之以主社稷對曰群臣願奉馮也馮穆公子莊公公曰不可先君以寡人賢使主社稷若棄德不讓是廢先君之舉也又僖上曰齊侯使管夷吾平戎于王使隰朋平戎于晉王以上卿之禮饗管仲管仲辭曰臣賤有司也有天子之二守國高在若節春秋來承王命何以禮焉陪臣敢辭王曰舅氏余嘉乃勳應乃懿德謂督不忘往踐乃職管仲卒受下卿之禮而還君子曰管氏之世祀也宜哉讓不忘其上又曰宋桓公疾太子茲父固請曰目夷長且仁君其立之茲父襄公也目夷茲父庶兄子魚也公命子魚子辭曰能以國讓仁孰大焉臣不及也且又不順立庶不順禮遂走而退又文上曰穆伯如齊始聘禮也凡君即位卿出並聘踐修舊好要結外援好事鄰國以衛社稷忠信卑讓之道忠信德這固也卑讓德之基也又宣上曰鄭人立子良辭曰以賢則去疾不足去疾子良之名以順則公子堅長乃立襄公又成下曰諸侯將見子臧於王而立之子臧曰前志有之曰聖達節次守節下失節為君非吾節也雖不能聖敢失守乎遂逃奔宋又襄上曰晉韓獻子告老公族穆子有廢疾將立之辭曰詩曰豈不夙夜謂行多露無忌不才讓其可乎請立起也無忌穆子名起無忌弟宣子也又襄二曰晉侯使士丐將中軍辭曰伯游長伯游荀偃昔臣習於智伯是以佐之非能賢也請從伯游使荀偃將中軍士丐佐之使韓起將上軍辭以趙武又使欒黶辭曰臣不如韓起願上趙武君其聽之使趙武將上軍韓起佐之欒黶將下軍魏絳佐之晉國之民是以大和諸侯遂睦君子曰讓禮之主也范宣子讓其下皆讓欒黶為汏弗敢違也又襄二曰吳子諸樊既除喪將立季札札諸樊少弟季札辭曰曹宣公之卒也諸侯與曹人不義曹君將立子臧子臧去之遂弗為也札雖不才願附於子臧以無失節固立之棄其室而耕乃舍之傳言季札之讓月明吳兄弟相傳又襄五年曰鄭伯賞入陳之功饗子展賜之先輅三命之服先輅次輅皆王所賜車侯伯之上卿三命先八邑賜子産次輅再命之服先六邑子産辭邑曰自上已下降殺以兩禮也臣之位在四且子展之功也臣不敢及賞請辭邑公固與之乃受三邑公孫揮曰子産其將知政矣讓不失禮也論語曰能以禮讓為國乎何有不能以禮讓為國如禮何又曰子曰太伯其可謂至德也已矣三以天下讓民無得而稱焉孝經曰先之以敬讓而民不爭國語曰狐毛卒使趙襄代之辭曰城濮之役先且居之佐軍也善先且居晉大夫先軫子也軍伐有賞善君有賞能其官有賞且居有三賞不可廢也且臣之倫箕鄭胥臣先都在倫輩也三子皆晉大夫也乃使先且居佐上軍公曰趙衰三讓其所讓皆社稷之衛也廢讓是廢德也以趙衰之故搜于清原作五軍清原之搜在魯僖三十年也使趙衰將新上軍箕鄭佐之胥臣將新下軍先都佐之又曰君子爭病讓夷又曰齊桓公自莒反於齊使鮑叔牙為宰辭曰臣不若夷吾者有五寬惠愛民臣不若也治國家不失其柄臣不若也忠信可結於百姓臣不若也制禮義可法於四方臣不若也執枹鼓立於軍門使百姓皆加勇臣不若也又曰晉悼公使張老為卿辭曰臣不如魏絳乃使魏絳佐新軍家語曰虞芮二國爭田而訟連年不決相謂曰西伯仁人文王蓋往質焉入其境則耕者讓畔行者讓路入其朝則士讓於大夫大夫讓於卿虞芮之君曰吾儕小人不可以入君子之朝遂自相與成以其所爭為間田史記曰吳太伯弟仲雍皆大王之子季歷之兄也季歷賢又生聖子曰太王欲立季歷以及昌於是太伯仲雍二人奔荊蠻文身斷髮示不可用以避季歷又曰太尉周勃立代王代王曰奉高帝宗廟重事寡人不足以稱寡人不敢當群臣皆伏固請代王西向讓者三南向讓者再又曰魯連既說秦軍秦軍為卻平原君欲封魯連魯連辭謝者三終不肯受平原君乃置酒酒酣起前以千金為魯連壽連嘆曰所貴天下之士者為人排難解紛而無取也即有取者是商賈之事連不忍為也遂辭而去終身不復見又曰董偃在館陶主家兒戲博殿下主伏檻觀之偃負則饒人勝則有讓主益奇之又曰伯夷叔齊孤竹君之子也父欲立叔齊乃讓伯夷伯夷曰父命也遂逃去漢書曰文帝初立以陳平為相太尉勃親以兵誅呂氏功多平欲讓勃位乃謝病文帝怪平病問之平曰高帝時勃功不如臣及誅諸呂臣切亦不如勃願以相讓勃又曰袁盎謂文帝曰陛下至代邸西鄉讓天子者三東讓天子者再夫許由一讓而陛下五以天下讓過許由四矣又曰龔遂為渤海太守數年上遣使者徵遂議曹王生願從太守會遂引入宮王生醉從呼曰願有所白遂問其故王生曰天子即問君何以治渤海君不可有所陳宜曰皆聖主之德非小臣之力也上果問以治狀遂對如王生言天子怪其有讓嘆曰君安得長者之言而稱之遂因前曰臣非知此乃臣議曹教臣也又曰武帝屬霍光以輔少主光讓金日磾日磾曰臣外國人且使胸奴輕漢於是遂為光副又曰韋賢薨子玄成當為嗣玄成心知其兄非賢雅意欲讓即佯狂丞相御史遂以玄成實不病劾奏之有詔勿劾引拜玄成不得已受侯爵
