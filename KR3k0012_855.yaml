body:
  text: 飲食部十二糟說文曰糟酒滓也糠穀皮也春秋後語曰張儀說韓惠王曰韓地多厄惡山居五穀所生非菽而麥民之食大板菽飯藿羹一歲不收民不饜糟糠又曰秦急圍邯鄲邯鄲且欲降傳舍吏子李同說平原君曰今邯鄲之民析骨而炊易子而食可謂急矣而君之後宮以百數婢妾被綺縠餘梁肉而民斃衣不完糟糠不厭君器物鍾鼓自若使秦破趙安得而有此哉後漢書曰明帝姊湖陽公主新寡帝與共論朝臣微觀其意主曰宋公威容德器群臣莫及帝曰方且圖之後弘被引見帝令主坐屏風後因謂弘曰諺言貴易交富易妻人情乎弘曰臣聞貧賤之知不可忘糟糠之妻不下堂帝顧謂主曰事不諧矣華嶠後漢書曰藥嵩家貧為郎無被食糟自此詔給大官食魏志曰李通禽黃巾大師吳霸而降其屬遭歲大飢通傾家振施與士分糟糠皆爭為用由是盜不敢犯六韜太公曰古之亂君夏桀殷紂積糟為丘以酒為池飲者常三千人糠爾雅曰糠謂之蟲米皮廣志曰糠謂之䅥通俗文曰碎糠曰𤓒牟皮切史記曰吳中大夫應高說膠西王母曰舐糠及米漢魏春秋曰甄后之誅由郭后之寵及殯令以糠塞口後明帝逼殺郭后使殯如甄后晉書曰王戎子萬有美名而太肥戎令食糠而肥愈甚又曰孫綽性通率好譏調嘗與習鑿齒共行綽在前顧謂鑿齒曰沙之汰之瓦石在後鑿齒曰簸之揚之糠粃在前齊書曰顧歡所居鄉中有學舍歡貧無以受業於舍壁後倚聽無遺忘者夕則燃松節讀書或然糠自照墨子曰備城皆收藏灰糠馬矢又曰人衣短褐食糠糟莊子曰播糠眯目則天地四方易位矣韓子曰糟糠不厭者不待梁肉而飽短褐不完者不須文繡而好潛夫論曰不命大將以討叛羌州郡稍興兵若排糠障風掏沙壅河抱朴子曰上世玄水結而不寒肴糠絶而不飽劉欣期交州記曰合浦海口有糠頭山傳云越王舂米於此積糠而成
