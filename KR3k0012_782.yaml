body:
  text: 東夷二百濟北史曰百濟之國者其先蓋馬韓之屬也出自夫餘王東明之後有仇台篤於仁信始立國于帶方故地漢遼東太守公孫度以女妻之遂為東夷強國初以百家濟因號百濟其國東極新羅北接高句麗西南俱限大海東西四百五十里南北九百里其都曰居拔城亦曰固麻城其外更有五方中方曰古沙城東方曰得安城南方曰久知下城西方曰刀先城北方曰熊津城又曰百濟國王姓夫餘氏號於羅瑕百姓呼為鞬士口之夏言並王也王妻號於陸夏言妃也官有十六品左平五人一品達率三十人二品恩率三品德率四品杆率五品奈率六品已上冠飾銀華將德七品紫帶施德八品皂帶固德九品赤帶季德十品青帶對德十一品文督十二品皆黃帶武督十三品左軍十四品振武十五品卷虞十六品皆白帶自恩率以下官無常員各有部分其人飲食衣服與高麗略同若朝拜祭祀其冠兩箱加翅戎事則不拜謁之禮以兩手據地為禮婦人不加粉黛女辮髮垂後已出嫁則分為兩道盤於頭上衣似袍而袖微大兵有弓箭刀矟俗重騎射兼愛墳史有鼓角箜篌箏竿篪笛之樂投壺樗蒲弄珠握槊等戲尤尚奕棊行宋元嘉曆以建寅月為歲首賦稅以布絹絲麻及米等量歲豐儉差等輸之其刑罰反叛退軍及殺人者斬盜者流其贓兩倍徵之婦犯姦沒入夫家為婢婚娶之禮略同華俗父母及夫死者三年居服餘親則葬訖除之土田下濕氣候溫暖人皆山居有巨粟其五穀雜果菜蔬及酒醴肴饌之屬多同內地維無駝騾羊鵝鴨又曰百濟國中大姓有八族沙氏燕人劦音協氏真氏解氏骨氏木氏苗氏其俗每以四仲月祭天及五帝之神立其始袒仇台之廟於國城歲四祠之又曰隋開皇初百濟王餘昌遣使貢方物拜上開府帶方郡公百濟王平陳之歲戰船漂至海東耽牟羅國其船得還經于百濟昌資送甚厚并遣使奉表賀陳平文帝善之八年昌復使長史王辨郍來獻方物屬興遼東之役奉表請為軍導高麗頗知其事兵侵其境大業七年帝親征高麗其王餘璋使國智牟來請軍期帝遣尚書起居郎席律詣彼與相知明年六軍度遼餘璋亦嚴兵於境聲言助軍實持兩端尋與新羅有彈每相戰爭十年復遣使朝貢後天下亂使命遂絶南史曰晉義熙十二年以百濟王餘映為使持節都督百濟諸軍事鎮東將軍百濟王宋元嘉二年詔兼謁者閭丘恩子兼副謁者丁敬子往宣旨慰勞其後每歲遣使奉表獻方物二十七年上表求易林雜占腰弩文帝並與之梁天監中進號征東大將軍尋為高麗所破衰弱纍年遷居南韓地普通二年王餘隆上表陳纍破高麗今始與百濟通好更為強國五年隆死詔以其子明為百濟王所都城曰固曆謂邑曰擔魯如中國之言郡縣也其國有二十二擔魯皆以子弟宗族分據之其人形長衣服潔淨其國近倭頗有文身者言語服章略與高麗同呼帽曰冠襦曰復衫袴曰褌其言參諸夏亦秦韓之遺俗云中大通七年纍遣使獻方物并諸湜槃等經義毛詩慱士并工匠畫師等並給之太清三年遣使貢獻及至見城闕荒毀並號慟涕泣侯景怒囚執之景平乃得還國唐書曰百濟國王所居有東西兩城所置內官曰臣佐平掌宣納事內頭佐平掌庫藏事內法佐平掌禮儀事衛士佐平掌宿衛兵事朝廷佐平掌刑獄事兵官佐平掌在外兵馬事其用法叛逆者死籍沒其家殺人者以奴婢三人贖罪官人受財及盜者三倍追贓乃終身禁錮凡諸賦稅及風土所産多與高麗同其王服大袖紫袍青錦袴烏羅冠金花為飾素皮帶鳥革履官人盡緋為衣銀花飾冠庶人不得衣緋紫歲時伏臘同於中國其書籍有五經子史又表疏並依中華之法其國西南海中有三島其上出黃漆樹似小檟而樹大六月取其汁漆器物色如黃金其光自奪目又曰武德四年百濟王扶餘璋遣使來獻果下馬七年又遣大臣奉表朝貢高祖嘉其誠款遣使就册為帶方郡王百濟王自此歲遣朝貢高祖勞撫甚厚因訟高麗閉其道路不許來通中國詔遣朱子奢往和之又與新羅世為雔敵數相侵伐貞觀元年太宗賜其玉璽書令即停兵革璋因遣使奉表陳謝雖外稱順命內實相仇如故十一年遣使來朝獻鐵甲雕斧太宗優勞之賜綵帛錦袍等又曰貞觀十六年百濟王義慈興兵伐新羅四十餘城又與高麗和親通好謀欲取黨項城以絶新羅入朝之道新羅遣使告急請救太宗遣司農丞相里玄獎齎書告諭兩蕃示以禍福及太宗親征高麗百濟懷二乘虛襲破新羅七城二十二年又破其十餘城數年之中朝貢遂絶高宗嗣位始遣使朝貢六年新羅王金春秋上表稱百濟與高麗靺鞨侵其北界已沒三十餘城顯慶五年命左衛大將軍蘇定方統兵討之大破其國虜義慈及太子隆小王孝演偽將五十八人等送於京師上責而宥之其國舊分為五部統郡三十七城二百戶七十六萬至是乃以其地分置熊津馬韓東明等五都督府各統州縣立其酋渠為都督刺史及縣令命右衛郎將王文度為熊津都督揔兵以鎮之又曰百濟王義慈事親以孝行聞友于兄弟時人號東海曾閔及至京數日疾卒贈金紫光祿大夫衛尉卿特許其舊臣赴哭送就孫皓陳叔寶墓側葬之夫餘後漢書曰夫餘國在玄菟北千里南與高句麗東與挹婁西與鮮卑接北有弱水地方二千里本濊地也初北夷橐離國王出行其侍兒於後妊身正遂欲殺之侍兒曰前見天上有氣如大雞子來降我因以有身王囚之後遂生男王令置於豕牢豕以口氣噓之不死復徙於馬欄馬亦如之以為神乃聽母收養名曰東明東明長而善射王忌其猛欲殺之東明奔走南至掩淲音斯水以弓擊水魚鱉皆聚浮水上東明乘之得度因至夫餘而王之焉於東夷之域最為平敞土宜五穀出名馬赤玉貂豽大珠如酸棗以員柵為城有宮室倉庫牢獄其人粗大強勇而謹厚不為寇鈔以弓矛為兵以六畜名官有馬加牛加狗加其邑落皆主屬諸加食飲用俎豆會同拜爵洗爵揖讓升降以臘月祭天大會連日飲食歌舞名曰迎鼓是時斷刑獄解囚徒有軍事亦祭天殺牛以蹄占其吉凶行人無晝夜好歌吟音聲不絶其俗用刑嚴急被誅者皆沒其家人為奴婢盜一責十二男女淫皆殺之尤惡如婦既殺復尸於山上兄死妻嫂死則有槨無棺殺人殉葬多者以百數其王葬用玉匣漢朝常預以王匣付玄菟郡王死則迎取以葬焉建武二十五年夫餘王遣使奉貢光武厚報答之於是使命歲通至安帝永初五年夫餘王始將步騎七八千人寇鈔樂浪殺傷吏人後復歸附永寧元年乃遣嗣子尉仇台詣闕貢獻天子賜尉仇台印綬金綵順帝永和元年其王來朝京師帝作黃門鼓吹角抵戲以遣之桓帝時亦朝貢獻帝時求屬遼東云魏志曰夫餘本屬玄菟其俗有敵諸加自戰下戶俱擔糧飲食之其死夏月皆用冰有槨無棺停喪五月以久為榮其居喪男女皆純白婦人著布面衣去環珮大體與中國相類漢末公孫度雄張海東威服東夷夫餘王尉仇台更屬遼東時句麗鮮卑強度以夫餘在三虜之間妻以宗女正始中幽州刺史母丘儉討句麗遣玄菟太守王頎詣夫餘王位居遣大加郊迎供軍糧舊夫餘俗水旱不調五穀不熟輒歸咎於王或言當易或言當殺其印文言濊王之印國有故城名濊城蓋本濊貊之地而夫餘王其中自謂亡人抑有以也晉書曰夫餘國至太康六年為慕容廆所襲破其依慮自殺子弟走保沷沮武帝以何龕為護東夷校尉明年夫餘後王依羅遣使詣龕求率見人還復舊國遣督郵賈沈以送之爾後每為廆掠其種人賣於中國帝又以官物贖還禁市夫餘之口自後無聞新羅秦書曰符堅建元十八年新羅國王樓寒遣使衛頭獻美丈國在百濟東其人多美髮髮長丈餘又曰符堅時新羅國王樓寒遣使衛頭朝貢堅曰卿言海東之事與古不同何也答曰亦猶中國時代變革名號改易南史曰新羅魏時曰新盧宋時曰新羅或曰斯羅其國小不能自通使聘梁普通二年王姓募名秦始使使隨百濟奉獻方物其俗呼城曰健牟羅其邑在內曰喙評在外曰邑勒亦中國之言郡縣也國有六家啄評五十邑邑勒土地肥美宜植五穀多桑麻作縑布服牛乘馬男女有別其官名有子賁旱支一旱支齊旱支謁旱支一吉支奇貝旱支其冠曰遺子禮襦曰尉解袴曰柯半靴曰洗其拜及行與高麗相類無文字刻木為信語言待百濟而後通焉北史曰新羅者其先本辰韓種也辰韓始有六國後稍分為十二新羅則先本辰韓種也辰韓始一也或稱魏將母丘儉討高麗破之奔沷沮其後復歸故國有留者遂為新羅亦曰斯盧其人雜有華夏高麗百濟之屬兼有沷沮不耐韓濊之地其王本百濟人自海逃入新羅遂王其國初附庸百濟百濟征高麗不堪戎役後相率歸之遂致強盛因襲百濟附庸於迦羅國焉又曰新羅王真平以隋開皇十四年遣使貢方物文帝拜真平上開府樂浪郡公新羅王其官有十七等一曰伊罰干貴如相國次伊尺干次迎干破彌干次大阿尺干次阿尺干次乙吉干次涉咄干次及伏干次太奈摩干次奈摩次大舍次小舍次吉土次大焉次小焉次達位外有郡縣其文字甲兵同於中國選壯健者悉入軍烽戍邏俱有屯管部伍風俗刑政衣服略與高麗百濟同每月旦相賀王設宴會班賚群官其日拜日月神主八月十五日設樂令官人射賞以馬布其有大事則聚群官詳議定之服色尚畫素婦人辮髮繞頭以新綵及珠為飾婚嫁禮唯酒食而已輕重隨貧富死有棺斂葬送起墳陵王及父母妻子喪居服一年田甚良沃水陸兼種其五穀果菜鳥獸物産略與華同大業以來歲遣朝貢唐書曰新羅王所居曰金城周七八里衛兵三千人設師子隊文武官凡有十七等武德四年其王金真平遣使朝貢高祖遣使賜以璽書及畫屏風錦綵自此朝貢不絶其食器用柳箱亦以銅及瓦國多金朴朴兩姓異姓不為婚又曰貞觀五年新羅遣使獻女樂二人皆鬒髮美色太宗謂侍臣曰朕聞聲色之娛不如好德且山川阻遠懷土可知近日林邑獻白鸚鵡尚解思鄉訴請還國鳥猶如此況人情乎但愍其遠來思戀親戚宜付使者聽其還家又曰新羅曰金真平安卒無子立其女善德為王貞觀九年遣使册命善德為樂浪郡王新羅王十七年遣使王言高麗百濟纍相攻襲亡失數十城兩國連兵意在滅臣社稷謹遣陪臣歸命大國乞偏師救助後太宗將親伐高麗詔新羅纂集士馬應接大軍新羅遣大臣領兵五萬入高麗南界攻水口城降之又曰新羅王善德卒立其妹真德為王貞觀二十二年其德遣其弟國相伊贊于金春秋及其子文王來朝春秋請詣國學觀釋奠及講論太宗因賜以所製溫湯及晉碑并新撰晉書將歸國又曰永徽元年新羅主真德大破百濟之衆遣其弟子法敏以聞真德乃織錦作五言太平頌以獻其詞曰大唐開洪業巍巍皇猷昌止戈戎衣定修文繼百王統天崇雨施理物體含章深仁諧日月撫運邁陶唐幡旗何赫赫征鼓何鍠鍠外夷違命者剪覆被天殃淳風凝幽顯遐邇竟呈祥四時和玉燭七耀巡萬方維嶽降宰輔帝任忠與良五三成一德昭我家大唐帝嘉之拜法敏為太府卿又曰永徽六年百濟與高麗鞂鞨率兵侵新羅北界其王春秋遣使上表求救顯慶五年命左武衛大將軍蘇定方為熊津道大惣管統水陸十萬仍令春秋為嵎夷道行軍揔管與定方討平百濟俘其王扶餘義慈來獻自是新羅漸有高麗百濟之地其界益大西至于海又曰龍朔三年詔以新羅國為雞林州都督府授其王金法敏為雞林都督法敏卒其子政明嗣位垂拱二年遣使來朝因請唐禮一部并雜文章則天令寫吉凶要禮并於文館詞林採其詞涉規誡者勒成五十卷以賜之又曰開元二十五年新羅王興光卒玄宗遣左贊善大夫邢璹往吊祭并册其子承慶為新羅王璹將發上製詩序太子以下及百寮咸賦詩以送之謂璹曰新羅號君子之國頗知書記有類中華以卿涉學善於講論故選充此使到彼宜闡揚經典使知大國儒教之盛又聞其人多善奕棊亦令善棊人率府兵曹楊季膺為之副璹等至彼大為蕃人所敬其國棊者皆季膺之下於是厚賂璹等多寶及藥物又曰大曆七年新羅王金乾運遣使金摽石來賀正八年又遣使獻金銀牛黃魚牙紬朝霞紬等又曰元和三年新羅王金重興遣使金力奇來朝力奇上言貞元十六年奉詔册臣故主金俊雍為新羅王母氏為大妃妻祁氏為王妃册使韋丹至中路而知俊雍薨其册卻回在中書省今臣還國伏請授臣以歸勑金陵雍等册宜令鴻臚寺於中書省受領至寺宣授與金力奇令奉歸國仍賜其叔彥升門戟令本國準例給與
