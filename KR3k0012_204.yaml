body:
  text: 職官部一揔敘官禮記曰有虞氏官五十夏后氏官百殷二百周三百天子立六官三公九卿二十七大夫八十一元士以聽天下之外治以明章天下之男教又王制曰天子百里之內以共官千里之內以為御謂此地之田稅所給也千里之外設方伯五國以為屬屬有長十國以為連連有帥三十國以為卒卒有正二百一十國以為州州有伯八州八伯五十六正百六十八帥三百三十六長八伯各以其屬屬於天子之老二人分天下以為左右曰二伯春秋曰昭四年郯子來朝公與之宴昭公問焉曰少皞氏以鳥名官何故少皞金天氏黃帝子巳姓之祖也問何故以鳥為官也郯子曰吾祖也我知之昔黃帝氏以雲紀故為雲師而雲名黃帝軒轅氏姬姓之祖也黃帝受命有雲瑞故以雲紀事百官師長皆以雲為名號也炎帝氏以火紀故為火師而火名神農薑姓之祖也有火瑞故以火紀事名官也共工氏以水紀故為水師而水名共工以諸侯霸九州者在神農前太昊後亦受水瑞以水名官也太皞氏以龍紀故為龍師而龍名太皞伏羲氏風姓之祖也有龍瑞故以龍命官也我高祖少皞摯之立也鳳鳥適至故紀於鳥為鳥師而鳥名自顓頊以來不能紀遠乃紀於近為民之師而命以民事則為不能故也又曰國家之敗由官邪也官之失德寵賂彰也尚書堯典曰乃命羲和欽若昊天曆象日月星辰敬授人時羲氏和氏世掌天地四時之官使敬順天時以授人也分命羲仲宅嵎夷曰晹谷羲仲居治東方之官宅居也東表之地稱嵎夷寅賓出日平秩東作使敬導出日平均次序東作之事以務農也申命羲叔宅南交羲叔居治南方之官南交言夏與春交平秩南訛敬致訛化也平存南方化育之事敬行其教以致其功分命和仲宅西曰昧谷居治西方之官寅餞納日平秩西成餞送也西方萬物成平序其攻助成物也申命和叔宅朔方曰幽都平在朔易都謂所聚也易謂歲改易於北方平均在察其政以順天常允釐百工庶績咸熙定四時成歲以告時援事則衆功皆廣又舜典曰咨四嶽有能奮庸熙帝之載奮起也有能起發其功廣堯之事也使宅百揆亮采惠疇亮信惠順也使君百揆之官信立其功順其事者誰乎僉曰伯禹作司空禹入為天子司空治水有功言可用也帝曰俞咨禹汝平水土惟時懋哉稱禹前功以命之惟居是百揆勉行之禹拜稽首讓于稷契暨皋陶帝曰俞汝往哉不許其讓使往宅百揆又曰成王既黜殷命滅淮夷還歸在豐作周官王曰若昔大猷順古大道制治于未亂保邦于未危曰唐虞稽古建官惟百內有百揆四嶽外有州牧侯伯庶政惟和萬國咸寧夏啇官倍亦克用乂湯禹建官二百亦能用治言不及唐虞之清要今子小子祗勤于德夙夜不逮立太師太傅太保茲惟三公論道經邦燮理陰陽少師少傅少保曰三孤二公弘化寅亮天地敬信天地之教冢宰掌邦治統百官均四海司徒掌邦教敷五典擾兆民擾安也宗伯掌邦禮治神人和上下司馬掌邦政統六師平邦國司寇掌邦禁詰姦慝刑暴亂司空掌邦土居四民時地利士農工啇使順天時六卿分職各率其屬以倡九牧阜成兆民以倡導九州牧伯為政大成兆民之性命又曰俊乂在官俊德治能之士皆在官百僚師師百工惟時僚工皆官也師師相師法百宮皆是言政無非撫于五辰庶績其凝言五官皆順五行之時衆功皆成又曰無曠庶官天工人其代之位非其人為空官言人代天理官不可以天官私非其才又曰任官惟賢材左右惟其人臣為上為德為下為民言臣奉上布德順下訓民不可官所私任非其人又曰官不及私昵惟其能不加私昵惟能是官爵罔及惡德惟其賢非賢不爵周禮曰惟王建國辨方正位體國經野設官分職以為民極極中也令天下之人各得其中又周官曰宗伯以九儀之命正邦國之位一命受職受職治職事再命受服受服受祭衣服為上士三命受位列位於王臣也王之上土亦三命也四命受器受祭器為上大夫也五命賜則則法也六命賜官此王六命之卿賜官者使得自置其臣治家如諸侯也七命賜國出就侯伯之國八命作牧謂侯伯有功德者加命得專征代於諸侯九命作伯上公有功德者加命為二伯得征伐五侯九伯也鄭司農云長諸侯為方伯也尚書大傳曰古者天子三公每一公三卿佐之每一卿三大夫佐之每一大夫三元士佐之故有三公九卿二十七大夫八十一元士所與為天下者若此而巳自公至元士凡百二十此夏時之官也家語曰古之御天下者以六官揔治焉冢宰之官以成道治官所以成道司徒之官以成德教官所以成德宗伯之官以成仁禮官所以成仁司馬之官以成聖政官所以成聖聖通官正所以平通天下司寇之官以成義刑官所以成義司空之官以成禮事官所以成禮也非事不立也六官在手以為轡東觀漢記曰更始所置官爵多群小長安為之語曰竈下養中郎將爛羊胃騎都尉爛羊頭關內侯後漢書曰建武六年詔曰百姓遭難戶口耗少而官吏尚繁於是司隸州牧條奏并省有四百餘縣吏職減損十置其一漢書儀曰古法雖聖猶試故設四科之辟一科曰德行高妙志節清白二科曰學通行修經中博士三科曰明曉法令足以決疑能案章覆問文中御史四科曰剛毅多略遭事不惑明足以照姦勇足以決斷才任三輔令皆試以其能然後官之後魏書曰天興元年置八部大夫散騎常侍待詔等官其八部大夫於皇城四維面置一人以擬八坐謂之八國常侍侍直左右出入王命三年置仙人博士官典煮練百藥天錫元年八月初置六謁官準古六卿其秩五品屬官有大夫秩六品大夫屬官有元士秩七品元士屬官有署令長秩八品令長屬官有署丞秩九品又減五等之爵始分為四曰王公侯子除伯男二號初帝欲法純質每於制定官號多不依周漢舊名或取諸身或取諸物或以民事皆擬遠古雲鳥之義諸曹走使謂之鳧鴨取飛之迅疾也以伺察候占官謂之白鷺亦取其延頸遠望也自餘之官義皆類此神瑞元年春置八大人官大人下置三屬官揔理萬機故世號八公太常二年夏置六部大人官有天地東西南北部皆以諸公為之大人置三屬官自太祖至高祖其內外百官屢有減置或事出當時不為常目如萬騎飛鴻常忠直意將軍之徒是也賈誼新書曰王者官人有六等一曰師二曰友三曰大臣四曰左右五曰侍御六曰厮役知足以為源泉行足以為儀表問焉則應求焉則得者謂之師智足以為礲礪行足以為輔助明於進賢敢於退不肖內相匡正外相楊美謂之友智足以謀國事行足以為民率仁足以合上下之欣國有法則退而守之君有難則能死之者大臣也修身正行不愆於鄉曲言語談説不怍於朝廷智能不困於事業服一介之使能合兩君之欣執戟居前能舉君之過失不難以死持之者左右之臣也不貪於財不淫於色事君不敢有二心居則不敢泄君之謀君有過失雖不能正諫以其死持之而愁悴有憂色者侍御之臣也唯諛之行唯言之聽以睚眥之間事君者厮役也通典曰唐開元中刊定職次著之為格蓋尚書省以統會衆務舉持綱目門下省以侍從獻替規駮非宜中書省以獻納制册敷揚宣勞祕書省以監録圖書殿中省以供修膳服內侍省以承旨奉引尚書門下中書祕書殿中內侍凡六省御史臺以肅清僚庶九等太常光祿衛尉宗正太僕大理鴻臚司農太府為九寺五監少府將作國子軍器都水為五監以分理群司六軍左右羽林左右龍武左右神武為六軍十六衛左右衛左右驍左右武左右威左右領軍左右金吾左右監門左右千牛為十六衛以嚴其禁禦一詹事府二春坊有左右春坊又有內方掌學閣內事三寺守令率更太僕等三寺十率左右衛左右司禦左右清道左右監門左右內凡十率府俾又儲宮牧守督護分臨畿服京府置牧餘府州置都督都護太守説苑曰應侯與賈子坐聞有鼓琴之聲應侯曰今之琴一何悲也賈子曰夫張急調下故使之悲耳急張者良材也調下者官卑也取夫良材而官卑之安能無悲乎應侯曰善仲長子昌言曰官之有級猶階之有等升階越等其步也亂亂登朝級敗禮傷法是以古人之初仕也雖有賢才皆以級次進焉賈生有言治國取人務在求能故裁國之無利器猶鏤以鉛刀而望其巧不亦踈乎楊泉物理論曰吏者理也所以理萬機平百揆也武士宰民物猶使狼牧羊鷹養雛也是以人主務在審官擇人李重集雜奏議曰古之聖王建官垂制所以體國經治而功在簡易自帝王而下世有增損舜命九官周分六職秦采古制漢仍秦舊倚丞相任九卿雖置五曹尚書令僕之職始於掌封奏以宣內外事任尚輕而郡守牧民官故漢宣稱所與為治唯良二千石其有殊效者輒璽書勉勵或賜爵進秩禮遇豐厚得為治大體所以遠蹤三代也及至東京雖漸優顯令僕出為郡守鍾離意黃香胡廣是也郡守入為三公虞延第五倫鮑昱是也自魏朝名守杜畿滿寵田預胡質等郡或二十年或秩中二千石假節猶不去郡或還不易方此亦古人茍善其事雖沒世不徙官之義也漢魏以來內官之貴於今最隆太始以前多以散官補臺郎亦經補黃門中書郎而今皆數等而後至衆職率亦如此陵遲之俗未及篤尚之風未洽百事等級遂多遷補轉徙如流能否無以著黜陟不得彰此為治之大弊也漢法官人不得真秩京房為魏郡太守以八百石居之魏初用輕貧先亦試守不稱則繼以左遷然則雋才登進無能降退此則所謂有知必試而使人以器者也臣以為今宜大併郡守等級使同古者明試守左遷之例官人之理盡則士必量能而受爵矣桓溫集略表曰今天下分崩喪亂殄瘁雖道隆中興而戶口雕寡近方漢時不當一郡之民民戶既少則勢不多而當必同古制百官備職實非大易隨時之宜且設官以理務務寡則官省官省以國治則職顯而人清故光武初興多所併省諸葛亮相蜀簡才併官此皆達治之成規今日之所先也宜從權制併官省職愚謂門下三省祕書著作通可減半古以九卿綜事不專尚書故重九棘也今事歸內臺則九卿為虛設之位唯太常廷尉職不可闕其諸員外散官及軍府參佐職無所掌者皆併若車駕郊廟籍田之屬凡諸大事於禮宜置者臨時權兼事訖則罷職既併則官少而才精職理則無害民而治道康矣
