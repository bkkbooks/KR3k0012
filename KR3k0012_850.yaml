body:
  text: 飲食部七食下鬻子曰禹嘗據一饋而七起日中不暇飽食曰吾不畏士留道路吾恐其留吾門庭四海民不至也晏子曰晏子相景公食脫粟之飯炙三弋五卯菜耳公曰嘻夫子家如此甚貧乎而寡人之罪對曰脫粟之食飽士之一足也炙三弋士之二足也菜五卯士之三足也嬰無倍人之行而有三士之食君之賜厚矣嬰之家不貧再拜而辭又曰晏子相齊三年政平民悅中食而肉不足景公曰封晏子以都晏子辭不受又曰寡婦樹蘭生而不芳繼子得食肥而不澤墨子曰聖王制飲食足以充虛繼氣強股肱使耳目聰明不極五味之調芬之和不致遠國珍怪異物又曰不可衣短褐不可食糟糠飲食不美面目顏色不足視也衣服不美身體從容不足觀也是以食必梁肉衣必文繡莊子曰巧者勞而智者憂無能而無所求飽食而遨遊汎若不係之舟又曰秋禽之肥易牙和之非不美也彭祖以為傷壽故不食之又曰廉者不食不義之食不噉不義之水又曰孔子病子貢出卜孔子曰汝待也吾坐席不敢先居處若齊食飲若祭吾卜之久矣慎子曰小人食於力君子食於道又曰飲過度者生水食過度者生貪燕丹子曰太子常與荊軻同案而食同床而寢公孫尼子曰食甘者益於肉而骨不利也又曰太古之人飲露食草木實聖人為火食號燧人飲食以通血氣闕子曰義渠之人烹黿鼈不熟臊穢腥臭中國之民雖飢餓三日不啟口至死弗食也吳章莊吉受而和之病人食之為之輕體萬乘飲之為之解怒故竈鼈至腥臊不可加然而病之為之輕體萬乘為之解怒何也吳章莊吉之調存也韓子曰堯之王天下也糲粢之食藜藿之羹雖監門之養不厭於此矣又曰吳起出遇故人而止之食故人有他故期反而食至暮不來起不食而待之明日使人求得乃與之食又曰孫叔敖相楚糲飯菜羹枯魚之膳又曰管仲束縛自魯之齊路飢而泣過綺邑乞食封人跪飧之因竊謂仲曰若用齊將何報我曰如子之言我且賢之用能之使勞之倫我何報子封人怨之又曰季孫相魯子路為都令魯以五月起眾為長溝當此時子路以其私秩粟為漿飲要溝者於五衢而飡之孔子聞之使子貢往覆其飲擊毀其器曰魯君有民子奚為乃飡之子路怒攘肱而入請曰夫子疾由之為仁義乎所學於夫子者仁義也仁義者與天下共而同其利者也今以由之秩粟而飡民其不可何也孔子曰由之野也吾以女知之女徒未及也女故如是之不知禮也女之飡之為愛之也夫禮天子愛天下諸侯愛境內大夫愛官職士愛其家過其所愛曰侵今魯君有民而子擅愛之是子侵也不亦誣乎言未畢而季孫使者至讓曰肥也起民而使之先生令弟子從役止而飡之將奪肥民耶孔子駕而去魯又曰凡人上不屬天下而不著地以筋骨為根本不食則不能活是以不免於欲利之心欲利之心不除其身之憂也故聖人衣可犯寒食足以充虛則不憂矣又曰嬰兒共資以塵為飯以塗為黍以木為胾薄暮必資餉食者塵不可食也又曰餓歲之春從弟不饟穰歲之秋踈客必食非踈骨肉少多之心異也孟子曰飢者甘食渴者甘飲是未得飲食之正也飢渴害之也豈唯腹為有飢渴之害人心亦皆有害也孫子曰鑠金洪鑪盜隸不探鴆肉在俎餓徒不食淮南子曰煎熬焚炙調齊和之適以窮荊吳甘酸之變符子曰顏子有疾三日不食問之曰吾師也食非丹不飡茹非芝不食故七百歲子何不吮瑤以延生咀蘂以養齡也禮含文嘉曰燧人始鑽火炮生為熟使人無腹疾山海經曰有參青馬為西王母取食呂氏春秋曰有城氏有二佚女為之九成之臺成猶重也飲食必以鼓又曰湯得伊尹設朝見之說湯以至味湯曰可得為之乎對曰君之國小不足以具之為天子然後可具三郡之蟲水居者腥肉攫者臊草食者羶臭惡猶美皆有所以凡味之本水最為始五味三材九沸九變火為之紀時其疾徐減腥去臊鼎中之變精妙微纖口不能言志不能論若射御之微陰陽之化四時之數故久而不獘又曰趙襄子攻翟勝左人中人使者來謁之下左人中人城也襄子方食搏飯有憂色左右曰一朝而下兩城此人之所喜今君有憂色何也襄子曰江河之大也不過三日焱風暴雨日中不須臾今趙氏之德行無所積一朝而下兩城亡其及我乎白虎通曰王者四食何明有四方之物食四時之功也四方不平四方不順有徹膳之法焉所以明至尊著法戒也惟王者居中央制御四方平旦食少陽之始食時大陽之始晡時食少陰之始食時大陰之始說文曰饔饍熟食也餱乾食也篡具籑也籑士眷切𩞧中食也𩞧式丈切餔日加申時食也饛盛器滿皃饛音蒙餬寄食也飫燕食也餞送去食也飪火熟也釋名曰食殖也所以自生殖也鹽鐵論曰古者燔黍而食捭豚相享賓婚相召豆羹白飯今則燔炙滿案臑豚包鼈膾鯉說苑曰晏子所與同衣食者百人而天下之士至也又曰晏子侍景公曰朝寒請子進煖食於寡人對曰臣非廚養之臣社稷之臣也又曰子思居於衛縕袍無裏二旬九食又曰魯有儉者煮甂中之食甂必眠切小益食而美以遺孔子子受之如受犬馬之遺弟子曰先生何為受之熹如此曰非以煮甂瓦之薄也食之美故念吾親也揚子法言曰或曰食如蟻衣如華金朱煌煌無已泰乎曰由其德舜禹受天下不為太不由其德亦太矣李軌注曰蟻言精細或曰北夷被我純績帶我金犀珍膳曼餬不亦厚乎曰社稷靈也不可不厚也論衡曰王子喬不食穀壽百歲按人生稟飲食之性故形上有口齒下有孔竅以注寫口齒以進食王子喬形體與人同何以獨能度世耶夫衣以溫膚食以充腹衣溫食飽則精神明盛人之生也以食為氣草木以土為氣閉口不食拔草離土必不壽矣桓譚新論曰太原郡隆冬不火食五日雖病不敢觸犯王者宜應改易潛夫論曰何知國之將亂也以其不嗜賢也故病家之廚非無饌也乃其人弗之能食故遂至於死也亂國之官非無賢也乃其君弗能存故遂亡矣又曰欲知人且疾不嗜食欲知國將亡不嗜賢風俗通曰俗說𩥄馬啖賓客宴食已闕主意未盡欲復飲酒餘無施更出脯鮓椒薑鹽鼓言其速疾如𩥄馬之傳命𩥄音填又曰俗說臨日月薄食而飲令人蝕口謹案日太陽之精君之像也日有蝕之天子不舉樂里語不救蝕者出行遇雨恐有安坐飲食重懼也又曰堪輿書云上朔會客必鬥爭按劉君陽為南陽牧嘗上朔設盛饌了無鬥者蔡邕月令論曰問者曰春食麥羊夏食菽雞魚之屬但以為時味之宜不合之於五行月令服飾所食器械之制皆從五行者說所食獨不以五行已略乎曰亦嘗思之矣凡十二辰之會五時所食者必家人所畜丑牛未羊戍犬酉雞亥豕而已其餘虎以下非食也汝南先賢傳曰周舉字宣光為并州刺史太原舊俗以介子推燒死至其亡時民為絕火食老少多死舉作書置子推廟中說民不宜寒食因勒使炊食如故益部耆舊傳曰何祇字君肅為人寬厚通濟體其壯大能食飲好聲色不治節儉時人少貴之者曹毗杜蘭香傳曰蘭香戒張碩不露頭食永昌郡傳曰獠民口嚼食并以鼻飲水異苑曰新野蘇卷與婦佃於野舍每至飲時輒有一物來其形似虵長七尺五寸光采卷異而飴之遂經數載產業加焉婦後密打殺即得能食病日進三斛飯猶不飽少時而死幽明錄曰海中有金臺出水百丈結構巧麗窮盡神工臺內有金机彫文備制上有百味之食四丈力神常立守護有一五通仙人來欲甘膳四神排擊遷延而退又曰河南趙良與其鄉人諸生到長安界遇霖雨糧乏相謂曰飢正爾當那得食耶應時美飯備在前兩人驚愕不敢食有人聲曰但食無嫌也明日早兩人復曰那復得美食即復在前遂至長安無他禍福祖台之志怪曰建康小吏曹著見廬山夫人夫人為設酒噉金鳥啄甖其中鏤刻奇飾異形非人所名下七子合盤盤中亦無俗中餚秦記曰符朗甚別味會稽王道子為朗設盛饌問曰關中之食孰若此荅曰皆好唯鹽味少生嵩高山記曰山下巖中有一石屋亦有自然經書自然飲食愽物志曰魏明帝時京邑有一人食噉兼十人遂肥不能動其父嘗為遠方長吏送彼往縣令故義傳食之一二年間一鄉為儉齊諧記曰江夏郡安陸縣有人姓郭名坦兄弟三人其大兒忽得時行病病後遂大能食一日食斛餘米其家供給五年乃至罄貧語曰汝當自覓食後至一家門前已得筥飯後門乞此家出語之汝已就前門得那復後門乞其人荅曰實不知君有兩門腹大饑不可忍後門有三畦韭一畦大蒜因噉兩畦便大悶極臥地須臾大吐吐一物似籠出地漸漸大及主人持飯出不復能食遂撮飯內著向所吐物上即消成水此人於此病遂得差袁准正書曰方丈之食不過一飽綈袍之繡不過一煖裴玄新言曰管仲奪伯氏駢邑三百使之飯蔬食沒齒無怨言若管氏取以營私則一邑不可奪也又曰孝子欲親之食云我已食欲親之衾云我不寒此漫孝也神仙傳曰焦先者字孝然河東太陽人鄉里累世云百七十歲常煮白石以與人熟如大芋者日日入山伐薪以布施先從村頭一家起周而復始擔薪以置人門外人見之時即鋪席與坐為設食先便就坐食亦不與人語若人不見其擔薪往時乃置薪於人門間便去連年如此結草庵於河渚或數日一食欲食則為人賃作人以衣衣之乃使限功受直足得一食輒去人欲多與終不肯取亦有數日不食時東晢發蒙記曰廉頗畢老日噉肉百斤曹植與吳季重書曰食若填溝壑飯若灌漏巵其人固難量豈非大丈夫之樂哉世說曰陳太丘詣荀朗陵貧儉無僕從迺使元方將車季方持杖從後長文尚小載著車中既至荀使叔慈應門慈明行酒餘六龍下食又曰桓公坐有參軍椅蒸薤不得解共食者又不助而掎終不放生者笑桓公曰同盤尚不相助況復危難勑令免官又曰劉真長王仲祖共行日旰未食有相識小人貽其飡者肴案甚盛真長辭焉仲祖曰聊以充虛何若真曰小人都不可作緣又曰羊曼拜丹陽尹客早者並得佳設日晏則漸罄不復及精隨客早晚不問貴賤羊固拜臨海飲食皆美雖晚至者猶獲其盛饌時論以固之豊腆乃不如曼之真率也又曰王東亭嘗之吳郡就汰公道人宿別脯許府家往瓦官寺設慢屋竟一寺東亭將夕至夜後汰公設豆藿麋汰公自噉一大甌東亭難汰公遂強進半甌須臾東亭行帳設名飲食果炙畢備汰公都無所噉俗說曰桓琙音城性噉犬每暝琙時使從兄索食黃帝八十一問曰人不食七日而死者何也然人胃中常有留穀三㪷五升水三升故平人一日再至清一行二升半日中五勝七日七五三㪷五勝而水穀盡矣故平人不食飲七日而死者水穀津液俱盡故也弘君舉食檄曰又取灄湖獨穴之鱧灄音攝赤山後陂之蒪伺漉泠豉及熱應分食畢作躁酒炙宜傳酒便清香肉則豆不㹀麞肶若披繙急火中炙脂不得董聞香者躑躅千咽者塞門羅奠椀子五十有餘牛䐑擣炙鴨臐魚熊白麞脯糖蟹濡臺車螯生甜滋味遠來百醉之後談悶不除應有蔗薑木瓜元李陽梅五味橄欖石榴玄拘葵羹脫煮各下一杯明皇雜錄曰天寶中諸公主相効進食上命中官袁思藝為檢校進食使水陸珍羞數千盤之費蓋中人十家之產中書舍人竇華嘗因退朝遇公主進食方列於通衢乃傳呵按轡行於其間宮苑小兒數百人奮挺而前華僅以身免嶺表錄異曰康州悅城縣北百餘里山中有樵石穴每歲鄉人琢為燒食器虔州亦有乃食牢也但燒令熱徹以物儭閣置之盤中旋下生魚肉及葱韭齏葅醃之類頃剋即熟而終席煎沸南中有親朋聚會多燒樵石亦極熱疑石中有火毒
