body:
  text: 疾病部二惣敘疾病下呂氏春秋曰身盡府種筋骨沉滯血脈壅塞九窮寥寥曲失其宜高誘曰府腹疾也種首疾也極三闋之欲以病其身故九窮寥寥然虛曲失其適以害其生也雖有彭祖猶不能為也太公金匱曰丁侯不朝武王乃畫丁侯三旬射之丁侯病大劇使人卜之祟在周恐懼乃遣使者請之於武王願舉國為臣虜武王許之歸為太師尚父謂使曰歸矣吾已告諸神言丁侯前畔義今已遣人來降勿復過也使者辭去歸至丁侯病稍愈四夷聞之皆懼各以其職來貢六韜曰欲伐大國行且有期王寢疾十日不行太公負之而起之曰行已有期君不發天子聞之國亡身死胡不勉之王允焉如無病者説苑曰邴吉有陰德於孝宣帝微時及即位衆莫知亦不言帝將封之會吉病甚將使人加封及其生也太子太傅夏侯勝曰此未死也臣聞有陰德必饗其樂以及子孫病果愈封為博陽侯世説曰衛玠總角時嘗問樂廣夢樂云是想衛曰神形所不接而夢豈是想曰因也衛思因經日不得遂病樂聞故命駕為剖折之衛病小小而差樂歎曰此兒胸中當必無膏肓病又曰衛玠從豫章下都人久聞其姿容觀者如堵墻玠先有羸疾不堪勞遂發病死時人謂之看殺語林曰王仲祖病劉真長為稱藥荀令則為量水矣又曰孔君平病困庾司空為會稽省之問訊甚至為之流涕孔慨然曰丈夫將終不問安國寧家之術而反作兒女相問庾聞回還謝之請其語言桓談新語曰余少時見揚子雲之麗文高論不自量年少新進而猥欲逮及嘗激一事而作小賦用精思大劇而立感病子雲亦言帝上甘泉詔使作賦為文卒暴及倦臥夢其五藏出在地以手收內及覺大少氣病一歲卒王符潛夫論曰夫理世不得真賢譬由治疾不得真藥也治病當得真人參反得羅蔔當得麥門冬反得蒸穬麥已而不識真合而服之病以浸劇不自知為人所欺也乃反謂方不誠而藥皆無益於療病因棄後藥弗敢復飲而更求巫覡者雖死可也論衡曰子夏喪明曾子責以有罪按伯牛有疾仲尼以為命也或是喪子數哭因中風耳風俗通曰無恙俗説恙病也凡人相見及書問者曰無疾病邪案上古之時草居野宿恙噬蟲也善食人心凡相勞問曰無恙乎非為病也白虎通曰天子疾稱不悆諸侯稱負子大夫稱負薪士稱犬馬不悆者不復預政也負子者諸侯子民今不復子民也負薪犬馬皆謙也楊泉物理論曰凡病可治也人不可治也體羸性弱不堪藥石或剛暴狷急喜怒不節或情欲放縱貪淫嗜食此皆良醫不能加功焉夫君子病也猶可為也必使無病也不可為矣蓋謂節其飲食量其多少也又曰穀氣勝元氣其人肥而不壽元氣勝穀氣其人瘦而壽養性之術常使穀氣少則病不生矣葛洪神仙傳曰茅君治於茅山人有疾病往請福常煮雞子十枚以內帳中須臾茅君皆一二擲雞子還之歸破之皆無復黃者病人當愈若中有土者不愈以為常候雞子如故無開處也漢武故事曰初霍去病微時數自禱神君乃見其形自修飾欲與去病交接去病不肯神君亦慚及去病疾篤上命為禱神君神君曰霍將軍精氣少壽命不長吾嘗欲以太一精補之可得延年霍將軍不曉此意遂見斷絶今疾必死非可救也去病竟薨西京雜記曰高祖初入咸陽宮周行庫有方鏡廣四尺高五尺九寸表裏有明人疾病在內照掩心則知其病之所在皇甫謐高士傳曰安丘望之病弟子公沙都來看之舉丘於庭樹下安丘曉然有痊開目見雙赤李著枯枝都仰手承李安丘食之所苦盡除皇甫謐自序曰士安每病母輒推燥居濕以復易單何顒別傳曰張仲景過山陽王仲宣謂曰君體有病後年三十當眉落仲宣時年十七以其言貰遠不治後至三十疾果眉落三輔決録曰趙岐初名嘉年三十餘有重疾臥蓐七年自慮奄忽乃為遺令勑兄子可立一員石於吾墓前刻之曰漢有逸民姓趙名嘉有志無時命也奈何劉楨與曹植書曰明使君始垂憐哀意眷日崇譬之疾乃使炎農分藥岐伯下針疾雖未除就沒無恨何者以其天醫至神而榮魄自盡也狂書曰狂恆雨若君行誑妄則常雨順之尚書多方曰周公曰惟聖罔念作狂唯狂克念作聖毛詩曰不見子都乃見狂且又東方未明曰折柳樊圃狂夫瞿瞿論語子路曰不得中行而與之必也狂狷乎狂者進取狷者有所不為也中行行能得中者狂者進取於善道狷者守節無為又子在陳曰歸歟歸歟吾黨之小子狂簡斐然成章不知所以裁之又楚狂接輿歌而過孔子曰鳳兮鳳兮何德之衰往者不可諫來者猶可追已而已而今之從政者殆而國語晉語曰下邑之役董安于多下邑晉邑安于趙簡子家臣趙簡子賞之固辭賞之對曰今臣一旦為狂疾而曰必賞汝言戰鬥為凶事猶人有狂易之疾是以狂疾賞也如亡趨而出乃釋之漢書曰昌邑王賀衣服言語跪起清狂不慧蘇林曰凡狂者陰陽脈盡濁不狂似狂也故言清狂或曰清狂如今白癡也又曰蓋寬饒曰無多酌我我乃酒狂丞相魏侯笑曰次公醒而狂何必酒也次公寬饒字又曰王莽時長安狂女子碧呼道中曰高皇帝大怒趣歸我國不者九月必殺汝莽收捕殺之東觀漢記曰郅惲字君章上書諫王莽令就臣位莽大怒即收繫惲難即害之使黃門脅導惲令為狂疾惚恍不自知所言惲曰所言皆天文非狂人所造作吳志曰全琮為督議欲分別諸將有所掩襲朱桓素高氣恥見部伍遂託狂發詣建業治病王隱晉書曰吳彥給役陸抗抗欲拔之患衆不聽乃悉請當為將者入坐以試勇怯有一狂人拔刀跳梁來向坐中餘者皆走唯彥獨坐舉抗禦之狂人乃退衆服其勇沈約宋書曰袁愍孫著妙德先生傳曰嘗謂周旋人曰昔有一國國中一水號曰狂泉國人飲此水無不狂也唯國君穿井汲獨得無恙國人既狂謂主不狂為狂也是聚謀共執國主療其狂疾火艾針藥莫不必具國主不任其苦於是到泉所酌水飲之飲畢便狂君臣大小其狂若一衆乃歡然我既不狂難以獨立比亦欲試飲此水宋書曰顏延之文帝嘗問以諸子才能延之曰竣得臣義躍得臣筆測得臣文奐得臣酒何尚之嘲曰誰得卿狂答曰其狂不可及鬻子曰昔魯周公曰吾聞之於政也知善不行者謂之狂知惡不改者謂之惑夫狂與惑者聖人之戒也老子曰馳騁田獵令人心發狂韓子曰心不能審得失之地則謂之狂又曰狂者東走逐者亦東走其走則同其所以東走之為則異淮南子曰谷氣多痺丘氣多狂又曰今夫狂者無憂聖人亦無憂不知禍福也又曰不知道者釋其所已有而求其所未得故福至則喜禍至則怖不悔己之所生乃反怨人不喜則憂謂之狂生又曰士有禍則詘有福則盈有過則悔有功則矜遂不知反此之謂狂傅子曰惡劉曄於魏明帝曄不盡忠善伺上意所趣而合之帝如言以驗之果得情從此踈焉曄遂發狂出為大鴻臚以憂死諺曰巧詐不如拙誠信矣抱撲子曰食莨蕩令人狂荒不可謂人本有荒狂山海經曰觀水多鰩音遙魚其味酸食之已狂越絶書曰慧種生聖癡種生狂桂實生桂桐實生桐禰衡別傳曰衡為鼓吏裸身辱曹操孔融復見操説衡狂疾令求得自謝裴揩別傳曰石崇嘗與裴揩孫綽酣宴而綽慢節過度崇責之揩曰季舒酒狂四海所知足下飲人狂藥責人正禮王韶之始興記曰觀亭峽下有神廟傍巖向江經道不恪者必狂走或變而為虎世説曰阮德如嘗與親友逍遙河側歎曰大丈夫不能使僕從陷於河橋非丈夫也坐者或曰德如以高素致名不應發此言必將病之候俄而性理果僻欲逸走家人嘗以一細繩撗繫之戶前以維之每欲出礙繩輒反時人以為名士狂黃帝八十一問曰狂顛之疾何以別答曰狂之始發少臥少飢自賢自貴妄笑好樂神異經曰西方有人飲食被髮東走其婦追之不止怒亦被髮名曰狂一名顛一名狷一名風此人夫妻與天俱生狂走東西沒晝夜魏武帝令曰昔吾同縣有丁幼陽者其人衣冠良士又學問材器吾愛之後以憂恚得狂病即差愈往來故當共宿止吾常遣歸謂之曰昔狂病儻發作持兵刃我畏汝俱共大笑輒遣不與共宿陽狂周書曰太公曰知與衆同者非人師也大知似狂不癡不狂其名不彰不狂不癡不能成事史記曰箕子紂庶兄也諫紂不聽或曰可以去矣箕子曰為人臣諫不聽而去是彰君惡而自悅民吾不忍為乃被髮陽狂而為奴又曰蒯通説韓信信不從通乃陽狂為巫東觀漢記曰丁鴻讓國於弟盛逃去鴻初與九江人鮑駿同事桓榮甚相友善及鴻亡駿遇於東海陽狂不識駿駿乃止而讓之曰今子以兄弟私恩而絶父不滅之基可謂智乎鴻感愴垂涕歎息乃還就國謝承後漢書曰雷義字仲公舉茂才讓於友陳重刺史不聽義陽狂被髮走不應命晉書曰王衍字夷甫神情明秀風姿詳雅陽駿欲以女妻焉而衍恥之遂陽狂自免又素輕趙王倫之為人及倫篡衍陽狂斫婢以自免王隱晉書曰王長文字德睿廣漢郪人世為郡守少放蕩不羇檢益州五辟公府再辟皆不就陽狂不詣郡縣舉致改服逃出舉州追求乃於成都賣熟布弟見長文蹲踞地嚙胡餅刺史知其不居禮送還家英雄記曰向栩字甫興性卓詭不倫恆讀老子狀如學道又似狂生好被髮著幓頭常於竈北坐板床上如是積久板乃有膝踝足指之處楚國先賢傳曰石偉字公操南郡人仕吳拜光祿大夫吳建威將軍王戎親詣偉太康二年詔以偉為議郎加二千石秩以終厥身偉遂陽狂及盲不受晉華陽國志曰犍為費昭不肯仕公孫述乃漆身為厲陽狂以避之人謂之狂史記曰東方朔人主左右諸郎半呼之狂人人主聞之曰今朔在事無為是行者若等安能及之哉朔行殿中郎謂之曰人皆以先生為狂朔曰若朔等所謂避世於朝廷間者漢書曰酈食其陳留高陽人也沛公略地陳留沛公麾下騎士適食其里中子騎士歸食其謂曰吾聞沛公有大略吾所願從若見沛公謂曰臣里中有酈生人皆謂之狂生自謂我非狂騎士如所戒沛公召之後漢書曰延熹末黨事將作袁閎遂散髮絶世欲投迹深林以母老不宜遠遁乃築土室四周於庭不為戶自牖納飲食而已旦於室中東向拜母母思閎時往就視母去便自掩閉兄弟妻子莫得見也及母歿不為制服設位時莫能名或以為狂生范曄後漢書曰仲長統倜儻不務小節語默無常時人謂之狂生南史曰王僧達所為非法坐免官後孝武獨召見慠然了不陳遜唯張目而視及出帝歎曰王僧達非狂如何乃戴面向天子後魏任城王澄傳高肇當朝猜忌賢戚澄為肇間搆常恐不令乃終日昏飲以示荒敗所作詭越時謂為狂唐書曰蘇世長嘗從高祖幸涇陽校獵至高陵合圍是日大獲陳禽獸於旌門高祖入御營顧謂朝臣曰今畋樂乎世長進曰陛下遊獵薄廢萬機不滿十旬未為大樂高祖色變既而笑曰狂態發耶又對曰為臣私計則狂為陛下國計則忠墨子曰周公旦人謂之狂後世稱其德尉繚子曰太公望行年七十屠牛朝歌賣食棘津遇七十餘主不聽人皆曰狂丈夫莊子曰宋桓侯行未出城門其前驅呼避至於家家人止之以為狂也呼避使人避道也家人謂狂止而不聽此乃言聞其所未聞則以為狂也世説曰諸葛肱在西朝少有清譽尤為王夷甫所重時論亦以擬王氏後為繼母族黨所讒論之為狂將遠徙友人王夷甫之儔詣檻與別肱問王曰朝廷何以徙我王曰言卿狂逆肱曰逆則宜殺狂則何所徙繆襲撰仲長統昌言表稱統曰統性俶儻敢言不拘小節每州郡命召輒稱疾不就語默無常時人或謂之狂癲説文曰癲病也莊子曰流脈並作則為驚怖陽氣獨上則為癲病風俗通曰俗説臥枕戶砌鬼陷其頭令人病癲語林曰王右軍少重患一二年輒發動後答許掾詩忽復惡中得二十字云取歡仁智樂寄暢山水陰清冷澗下瀨歷落松竹林既醒左右誦之讀竟乃歎曰癲何預盛德事耶圖墓書曰一岡三頭相連無有頭尾狂癲絶世黃帝素問曰人生而病癲疾者安得知之岐伯曰此名胎病此得在腹時母大驚氣上下精氣并故令子發癲病范汪祕方曰邪入於陽轉則為癲長安李府君女得癲病募治愈者賞百萬朝那縣卒自言能不敢求錢但願為門下卒服藥即愈祖台之議錢耿殺妻事曰尋建康獄竟囚錢耿癲疾發作毆殺妻了無他變故荒病之人不蒙哀矜之施無知之禮加以大辟之刑懼非古原心定罪之義癡左傳曰晉周子有兄不慧不能辨菽麥蓋所謂白癡也後漢書曰光武見劉盆子曰宗室無𧈪者𧈪癡也魏志曰許褚以勇力常從太祖征伐軍中以楮力如虎而癡故謂之癡虎魏略曰寒貧者本姓石字德林初客三輔關中亂南入漢中後還長安遂癡愚不復識人食不求味冬夏常衣弊布連結衣人問其姓名口不肯言故號之曰寒貧也或往存恤之輒跪拜人復謂其不癡晉書王述字懷祖年三十尚未知名人或謂之癡司徒王導始辟為中軍參軍既見無他言唯問以江東米價述但張目不答導曰王掾不癡人何言癡也南史曰沈昭略字茂隆性狂俊不事公卿使酒氣無所推下嘗醉晚日負杖攜家賓子弟至婁湖苑逢王景文子約張目視之曰汝是王約耶何乃肥而癡約曰汝沈昭略耶何乃瘦而狂昭略撫掌大笑曰瘦已勝肥狂又勝癡奈何王約奈汝癡何魏志曰明悼毛皇后父嘉本典虞車工卒暴富貴帝令朝臣會其家飲宴其容止舉動甚癡騃語輒自謂侯身時人以為笑晉書曰顧愷之字長康晉陵無錫人尤善丹青嘗以畫一廚糊題其前寄桓玄皆深所珍者玄乃發其廚後竊取畫而緘閉如舊以還之紿云未開愷之見封題如初但失其畫真云妙畫通靈變化而去猶人之登仙了無怪色玄嘗以一柳葉紿之曰此蟬所翳葉也取以自蔽人不見己愷之喜引以自蔽玄就溺焉愷之嘗在桓溫府嘗云愷之體中癡黠各半而論之正得其平耳故俗傳愷之有三絶才絶癡絶畫絶後魏書曰太祖謂尚書崔玄伯曰蠕蠕而蠢反之民昔來號為頑囂每來抄掠駕牸牛奔遁驅犍牛隨之牸牛伏不能前異部人教其以犍牛易之者蠕蠕曰其母尚不能行而況其子終於不易遂為敵所虜隋書曰楊玄感司徒素之子也體貌容偉美鬚髯少時晚成人多謂之癡其父每謂所親曰此兒不癡也及長好讀書便騎射以父軍功位至柱國唐書曰竇威家世勳貴諸昆弟並尚武藝而威耽玩文史介然自守諸兄哂之謂為書癡又曰雜端御史最為雄劇食坐之南設一橫榻謂之南床殿中監察不得坐其榻亦謂之癡床言處其上者皆驕慠自得使人如癡故謂之癡床又曰李益與李賀齊名然少有癡病而多猜忌防間妻妾過為苛酷而有散灰扃戶之談時謂妬癡風俗通曰夜糴俗説市買者當清旦而行日中交易所有夕時便罷今乃夜糴明其癡騃不足郭子曰王長史求東陽王蒙字仲祖撫軍不肯用晉太宗簡文皇帝先為撫軍大將軍王後疾篤臨終撫軍哀歎曰吾將負仲祖於此乃命用之長史曰人言會稽王癡真癡也會稽王簡文先封世説曰任育字長年少時甚有令名自過江便失志下飲人問云此為茶為茗覺有怪色乃自中名云向問飲為熱為冷嘗行從棺底下流度涕而悲王丞相聞之曰此是有情癡應璩新論曰漢末桓帝時郎有馬子侯自謂識音律請客鳴笙竽為作陌上桑反言鳳將雛左右偽稱善亦復自搖頭馬子侯為人頗癡自謂曉音律黃門樂人更往嗤誚子知不知名陌上桑反言鳳將雛搖頭欣喜賜左右錢帛無復慚也虞翻書曰此中小兒年四歲矣似欲聰哲雖蝦不生鯉子此子似人俗為求婦不知所向君為訪之勿怪老癡譽此兒也癇説文曰癇病也續晉陽秋曰大司馬府軍人朱興妻周息男道扶年三歲先得癇病因其病發掘地生埋之為道扶姑雙女所告正周棄市刑徐羡之議曰自然之愛虎狼猶仁周之凶忍宜加顯戮臣以為法律之外故當弘通物之理愚謂可特原母命投之遐裔從之
