body:
  text: 蟲豸部八蚤焦贛易林萃之大過曰亂頭多憂蚤虱生愁膳夫仲年使我無聊說文曰蚤齧人跳蟲也韓子曰子韋見孔子於商太宰曰吾見孔子則視子猶蚤虱之細者也今吾見之於君子韋恐孔子貴於君也因謂太宰曰且君已見孔子亦將視子猶蚤虱太宰弗復見也又曰韓昭侯搔而佯亡一蚤求之甚急左右因取其蚤虱而殺之昭侯以此察左右不誠也淮南子曰昌羊去蚤虱而人弗席者為其來蛉窮也高誘曰窮幽冀謂之蜟蚳入耳之蟲蜟音育又曰釋大道任小枝無異使蟾諸捕蚤論衡曰人在天地之間猶蚤虱之在衣裳螻蟻之在穴隙也趙壹解擯賦曰丹鴻可殺蚤虱抱朴子曰蚤虱群攻臥不獲安曹植論曰孟春之旦從陽徑生貴放鳥雀者加其祿也得者莫不馴而放之為利人也得蚤者莫不摩之齒牙為害身也虞翻與弟書曰其餘幾何老更衣希為蚤虱所咋故一二相告省書一過悉以付火齊卞土蚤虱賦序曰余居貧布衣十年不製一袍之縕有生所託資其寒暑無與易之為之多病起居甚踈縈寢敗絮不能自釋兼攝性懈惰嬾事皮膚澡刷不謹澣沐失時四體㲰㲰乃耕切加以臭穢故葦席蓬纓之間蚤虱猥流探揣獲撮日不替手虱蟣說文曰虱齧人蟲也蟣虱子也漢書曰項羽謂宋義曰疾引兵渡河破秦必矣義曰不然夫搏牛之䖟不可以破虱䖟諭秦虱諭章即等言大小不同勢又曰王莽校尉韓威進曰以新室之威而吞胡虜無異口中蚤虱東觀漢記曰馬援擊尋陽山賊上書曰除其竹木譬如嬰兒頭多蟣虱而剃之蕩蕩然蟣虱無所復依書奏上大悅因出小黃門頭有虱者皆剃之續晉陽秋曰咸陽王猛被縕袍而詣桓溫一靦談當時之事猛摸虱而言傍若無人溫察而奇之晉書曰阮籍著大人先生傳曰少稱鄉黨長聞鄰國上欲圖三公下不失州牧獨不見群虱之處禈中逃乎深縫匿乎壞絮自以為吉宅行不敢離縫匿乎禈襠自以為得繩墨也然炎丘火流焦邑滅都群虱處於褌中而不能出也君子之處域內何異夫虱之處禈中乎齊書曰江泌性行仁義衣弊虱多綿裏置壁上恐虱飢死乃置衣中數日中終身無復虱又曰卞彬為南康郡丞彬頗飲酒檳棄形體仕既不遂乃著蚤虱𧍪蟲蝦蟆等賦皆大有指斥三國典略曰梁劉殼常有飛書謗殼梁主怒曰劉殼似衣中虱必須搯之音恰北史司馬子如為大行臺及文襄輔政見之哀其憔悴以膝承其首親為擇虱賜酒百缾羊五百口粳米五百石子如曰無事尚被囚幾死若受此豈有生路耶列子曰紀昌學射於飛衛使學視小如大紀昌以氂懸虱於牖南面而望之二年之後如車輪焉以覩餘物皆丘山也乃以燕角之弧孤蓬之簳射之貫虱之心而懸不絕以告飛衛飛衛曰汝得之矣莊子曰濡需者豕虱是也擇䟽鬣自以為廣宮大囿奎蹄曲限乳間股腳自為安室利處不知屠者一旦布燥煙火而與豕俱燋韓子曰天下無道攻擊不已甲胄生蟣虱燕雀處帷幄而兵不歸故曰戎馬生於郊淮南子亦云又曰應侯謂秦王曰王得宛臨陳陽夏斷河內臨東陽邯鄲猶口中虱也又曰三虱食彘相與訟一虱遇之曰奚訟三虱曰爭肥饒者一虱曰若爾不患臘之將至而烹之也躁目若有奚患於是乃相與藂其目而食之彘瘦人乃不殺淮南子曰牛馬之氣蒸不能生蟣虱蟣虱之風蒸不能生牛馬故化生於外非生於內也又曰湯沐具而蟣虱相吊大廈成而鷰雀相賀抱朴子曰夫虱生於我我非虱之父母虱非我之子孫也又曰眼能察天衢而不能周項領之間耳能聞雷霆而不能周蟣虱之音也又曰今頭虱著身皆稍變而白身虱著頭皆漸化而黑則玄素果無定質移易在乎所漸也符子曰齊魯爭汶陽之田魯侯有憂色魯隱者周豊往觀曰臣嘗晝寢愀然聞群虱之鬭乎衣中甘臣膏腴之肌珍臣項膂之膚相與樹黨爭之日夜不息相殺者太半虱父止之曰我與汝黨不過縫所飡食不過容口奚用竊乎交戰為哉群虱止今君以七百里地為君之城亦以足矣而以汝汶陽數步之田感君之心曾不如一虱之知竊為君羞之魯侯曰善語林曰顧和始為楊州從事月旦當朝未入停車州門外須臾週侯已醉著白恰憑兩人來詣丞相歷和車邊和先在車中覔虱夷然不動周始見遙過去行數步覆反還指顧心曰此中何所顧擇虱不輟徐徐應曰此中最是難測量地風俗通曰河南趙仲讓為梁冀從事郎中冬月坐庭中向日解壞裘捕虱襄成君使推問之冀笑曰此我從事絕清高士也楊偉時務論曰夫吞八荒者不咀蟣虱也神異經曰西荒之中有人焉長短如人著百結敗衣手足虎爪名獏㺔張茂先曰俗曰貌偽音撝伺人眠輒往就人欲食人腦先使捕虱得臥而舌出盤地丈餘聞其聲常燒大石伺其得臥舌出以石投舌上於是低頭絕氣而死異苑曰太孫廣頭上不得有虱虱大者便遭朞喪大功小則小功殤服劉義慶宣驗記曰晉義熙中京師長年寺道人惠祥與法向連堂夜四更中惠遙喚向暫來往視祥仰眠交手胸上足脡欶鼎切直云可解我手足繩曰上並無繩也祥因得轉動云向有人眾以我手足鞭箠交下問何故齧虱語祥若更不止當入兩間磕之音盍祥後徵戒於虱餘無精進相牛經曰治牛虱用苦梗生魚汁清坎底土若酒和塗之夢書曰夢梳篦為憂解也其髮滑澤心喜也蟣虱盡去百病愈也蟣虱為憂齧人身也夢見蟣虱有憂至也揚雄長楊賦曰鞮鍪生蟣虱介胄被霑汗趙壹作非草書曰俯而擇虱不睱見地仰而觀鍼不睱見天天地至大而不見者銳精於鍼虱也魏文帝與王朗書曰蚤虱雖細虐於安寢鼷鼠至微猶毀郊牛嵇康養生論曰夫虱處頭而黑麝食桓而香又與山濤書曰危坐一時痺不得搖性復多虱把搔無已而當襲以章服揖拜上官三不可堪也螕字林曰螕齧牛蟲也蟭螟晏子春秋曰景公問晏子曰天下有極細乎對曰東海有蟲生於蚊睫再乳而飛蚊不為驚臣嬰不知其名東海者者命曰蟭螟列子曰江浦之間生麼細麼也蟲其名曰焦螟群飛而集於睫不相觸也捷栖宿去來蚊不覺也離朱子羽方晝拭皆揚眉而望之弗見其形離未黃帝時明目人子羽未聞也抱朴子曰焦螟也蚑眉之中而笑彌天之大鵬寸鮒遊牛跡之水不貴橫海之巨鱣也蛕說文曰蛕蝮中長蟲也叩頭異苑曰有小蟲形色如大豆呪令叩頭又使吐血皆從所教如似請放稽顙輒七十而有聲故俗呼為叩頭也傅咸叩頭蟲賦敘曰叩頭蟲蟲之微細者然觸之輒叩頭人以其叩頭殺之不祥故莫之害也食屍裴氏廣州記曰林任縣有甲蟲嗜臭肉人死食屍都盡紛紛滿屋非可驅殺博物志曰景初中蒼梧刺史京師云廣州西南數郡人病將死便有飛蟲狀如麥集舍人死便食不可斷截惟殘骨在便去以梓板為器則不集蟯說文曰蟯蝮中短蟲也史記曰臨菑汜里女子薄吾病甚眾醫皆為寒熱篤當死不治淳于意診其脈曰蟯瘕蟯瘕為病腹大上膚黃麤修之戚戚然意飲以元華一撮即出蟯可數升病已三十日如故淮南子曰天下物莫不資於水澤及蚑音歧蟯而不求報高誘曰蟯微蟲也蛻廣雅曰復育蛻也論衡曰蟬生於復育開背而出蛾詩曰螓首蛾眉爾雅曰蛾羅也蠶蛾廣雅曰蛢步丁反蛾也漢書曰建始元年春三月上幸雍祠五畤秋八月有白蛾群飛蔽日從東都門至軹道宋書曰傅亮少帝失德內懷憂懼直宿禁中睹夜蛾赴燭作感物以寄意焉王子年拾遺記曰有谷將子學道也言於燕昭王曰西王母尋來必語虛尤之術不踰一年王母果至與昭王遊乎燧林之下談炎上鑽火之術取緣桂之膏燃以映夜忽有飛蛾銜火狀如丹雀來拂於桂膏之上蛾出於員丘之穴郭子橫洞冥記曰武帝既躭於靈怪常得丹豹之髓白鳳之膏磨青錫為屑以淳蘇油和之照於神壇夜暴雨火光不滅有霜蛾如蜂赴燈侍者舉麟鬚之拂以驅之列仙傳曰園客濟陽人種五色香草服食其實一旦有五色蛾止其香末收而薦之生蠶焉符子曰不安其昧而樂其明是猶夕蛾去闇赴燈而死者也崔豹古今注曰飛蛾善拂燈一名火花一名慕光廣志曰有蠶蛾凡草木蟲以蛹化為蛾甚眾任昉述異記曰楚莊王宮人一旦化為野蛾而飛去夢書曰蛾為婦女眉儇也夢見蛾者憂婚也白澤圖曰赤蛾兩頭而白翼者龍也殺之兵死矣支曇諦火蛾賦序曰悉達有言曰愚人貪財如蛾投火誠哉斯言信而有徵鮑明遠飛蛾賦曰仙人司闇飛蛾候明均靈升化詭態齊生觀生齊而態詭各會性以憑方凌焦煙之浮景赴熙爛之明光拔身幽草下畢命君子堂本輕死以邀願得縻願其何傷豈效南山之文豹避霧雨而巖藏蛹爾雅曰螝蛹也郭璞曰蠶蛹也說文曰螝蛹也讀若潰蛹繭蟲也韓子曰蟲有螝者一身兩頭爭食相嚙也遂殺己人臣爭事亡其國者皆螝類也蛓爾雅曰蜭戶感切毛蠹即蛓也蟔蛅如占切蟴蛓屬今八角螫蟲說文曰蛓毛蟲也讀若笥蜭手蠹也蟥蛢爾雅曰蟥蚑符蟥蛢郭璞曰甲蟲也大如虎豆綠色江東呼黃蛢孫炎曰翼在甲裏說文曰蛢𧑐音韋也蟥也以翼鳴者也班貓本草經曰班貓一名龍尾味寒生谷吳氏本草經曰班貓一名班蚝音判一名龍蚝一名班菌一名腃髮一名晏青神農辛歧伯鹹桐君有毒扁鵲甘有大毒河內川谷或生水石地膽廣雅曰地膽地要青蠵也本草經曰元青春食芫華故云元青秋為地膽地膽黑頭赤味辛有毒主蟲毒風注秋食葛華故名之為葛上亭長吳氏本草經曰地膽一名元青一名杜龍一名青虹陶弘景本草經曰地膽味辛寒有毒一名元青一名青蛙真者出梁州狀如大馬蟻有小翼子偽者即是班貓所化狀如大豆大都治體略同必不能得真此亦可用蛤蚧嶺表錄異曰蛤蚧首如蝦蟆背有細鱗如蠶子土黃色身短尾長多巢於樹中端州子牆內有巢於廳署城樓間者旦暮則鳴自呼蛤蚧或云鳴一聲是一年者里人採之鬻於市為藥能治肺疾醫人云藥力在尾尾不具者無功龐降嶺表錄異曰龐降生於山野多在橄欖樹上形如蜩蟬腹青而薄其聲採其鳴自呼為龐降但聞其聲採者鮮得名以善價求之以為媚藥蛆梁書曰王琳敗後入齊為特進侍中所居屋脊無故剝破出赤蛆數升落地化為血蠕動又曰元帝時安城人劉敬躬於田間得白蛆化為黃金龜將銷之龜生光照室敬躬以為神而禱之所請多驗遂謀作亂帝命都督王僧辯討擒之後魏書曰宣武遐昌三年章武王熙為相州刺史有蛆生於庭俄而反伏誅廣五行記曰北燕馮跋太平二十一年三月蛆觸地而生月餘跋為弟洪所殺又曰唐來俊臣性殘忍貪淫縱異自知制獄數年家積巨萬凡所殺戮不可勝計俊臣家婢生一塊肉大如二升椀剖之有赤蛆升餘須臾皆變為蜂螫人而去
