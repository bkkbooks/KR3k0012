body:
  text: 人事部四十應夢禮記文王世子曰文王謂武王曰汝何夢矣武王對曰夢帝與我九齡帝天也文王曰汝以為何也武王曰西方有九國君王其終撫諸文王曰非也古者謂年為齡齒亦齡也我百爾九十吾與爾三焉九齡九十年之祥也文王以憂勤損壽武王以安樂延年與汝三者明傳業於汝受而成之文王九十七而終武王九十三而終左傳僖公下曰楚子玉自為瓊辨玉纓未之服也先戰夢河神謂己曰畀余余賜汝孟諸之麋又成公上曰鞍之戰晉韓厥夢子與厥父謂己曰避左右故中御而從齊侯邴夏曰射其御者君子也公曰謂之君子而射之非禮也射其左越于車下射其右斃于車中又昭二曰鄭子産聘于晉晉侯有疾韓宣子曰寡君寢疾於今三月矣並走群望有加而無瘳今夢黃熊入於寢門其何厲鬼也對曰以君之明子為大政其何厲之有昔堯殛鯀于羽山其神化為黃熊以入于羽淵實為夏郊三代祀之晉為盟其或者未之祀乎韓子祀夏郊晉侯有間間愈也又昭二曰鑄刑書之歲二月或夢伯有介而行介甲也曰壬子餘殺帶也明年壬寅餘又將殺段也及壬子駟帶卒國人益懼齊燕平之月壬寅公孫段卒國人愈懼又昭四曰晉荀吳帥師滅陸渾韓宣子夢文公攜荀吳而授之陸渾宣子韓起文公晉文公荀吳仲行穆子也故使穆子帥師獻俘於文宮欲以應夢又昭七曰十二月辛亥朔日有蝕之是夜也趙簡子夢童子裸而轉以歌轉婉轉也旦占諸史墨子曰吾夢如是今而日蝕何也對曰六年及此月也吳其入郢乎終亦弗克漢書曰孝文帝嘗夢欲上天不能進有一黃頭郎推之上天顧見其衣後穿覺而之漸臺見郎鄧通衣後穿即夢中所見也因而寵之又曰衛太子為江充所譖敗久之田千秋上急變訟太子冤曰子弄父兵罪當笞天子之子過誤殺人當何罪哉臣嘗夢見一白頭翁教臣言是時上頗知太子惶恐無他意乃大感寤召見千秋謂曰父子之間人所難言也公獨明其不然此高廟神靈使公教我公當遂為吾輔佐立拜千秋為大鴻臚又曰韋玄成為丞相言孝文太后寢園宜如禮勿復修奏可後歲餘上寢疾夢祖宗譴罷郡國廟上少弟楚孝王亦夢焉上召問匡衡議欲復之衡深言不可東觀漢記曰桓帝時張奐為武威太守其妻懷孕夢帶奐印綬登樓而歌占曰必生男復臨此郡命終此樓既而生子猛建安中為武威太守前郡守邯鄲商為猛所殺據郡反為韓遂所攻自知必死乃登樓自燒而終魏志曰武帝問周宣曰我昨夜夢有青氣自地屬天宣曰天下當有貴女子死死時帝已遣賜甄后璽書文帝復問周宣曰吾夢摩錢文欲令滅而更明何曰此陛下家事而太后不聽故更明耳時治弟植罪逼於太后也晉書曰明帝時張茂夢得一大象問人曰何祥對曰君為大郡然而不善或問其故曰象者大獸獸者守也故當為大郡然象以齒見焚必為人害後為吳國內史沈充所害又曰明帝太寧元年王敦謀逆帝與王導溫嶠等決計征之敦屯於湖陰帝欲察其營壘乃乘駿馬微行至湖陰敦方晝寢夢日環其城驚起曰此必黃鬚鮮卑奴來何以不縛之又曰簡文見讖云晉氏祚盡昌明及孝武之在孕也李太后夢神人謂之曰汝生男以昌明為字及生東方始明因以名焉簡文后後悟為之流涕後魏書曰高祖遷洛謂任城王澄曰朕昨夜夢一老公頭鬢皓白正理冠服拜立路左朕怪而問之自云晉侍中嵇紹故此奉迎神爽卑懼似有求焉澄對曰晉世之亂紹以身衛主殞命御側亦是晉之忠臣於是求其兆域遣使吊祭焉又曰莊帝在藩任城王順夢一段黑雲從西北直來觸東南上日月俱破復翳諸星天地晝暗俄雲消霧解日出莊帝復閶闔門入登太極殿呼萬歲者三百官咸加朝服既覺占之曰黑雲氣之惡者北方之色必有北敵亂京師日君象月后象星百官象以此言之京邑其當禍乎後如其夢又曰盧元明為中書侍郎友人王由寓居潁川忽夢見由攜酒就之言別因賦詩贈乃覺元明憶其十字云自茲一去後朝市不復遊元明歎曰必有他故經三日果聞為亂兵所殺尋其日乃是發夢之夜又曰酈範字世則范陽涿人範嘗夜夢陰毛拂踝他日説之時齊人有占夢者曰史進云豪盛於齊下矣使君臨撫東秦道光海岱必當重牧全齊再祿營丘矣範笑而答曰吾將為卿必驗此夢果如其言為青州刺史又曰裴安祖間居養志不出城邑曾行值天熱舍於樹下有鷙鳥逐雉雉急投之遂觸樹而死安祖愍之乃取置陰地徐徐護視良久得蘇安祖喜而放之後夜夢一丈夫衣冠甚偉著曲領向安祖再拜安祖怪而問之此人云感君前日見放故來謝德聞者異焉北齊書曰張亮字伯德西河隰城人也拜太中大夫薛琡常夢於山上挂絲以告亮且占之曰山上絲幽字也君其為幽州乎數月出為幽州刺史又曰宋潁為涼州刺史潁前妻鄧氏亡後十年夢見白潁拜曰新婦今被處分為高崇妻故來辭別潁見崇言之崇數日而卒梁書曰吉士瞻少時夢得一積鹿皮而數之有十一領及覺喜曰鹿者祿也吾當居十一祿乎自其後仕進所蒞者九及除二郡心惡之遇疾不肯療普通七年卒於郡梁後略曰初賀革之往江陵也意甚不悅過別御史中丞江革以情告之答曰吾嘗夢主上遍見諸子唯至湘東王所手脫帽以與之此人後必當辟卿其行乎革因頷之遂往荊州三國典略曰江陵平梁御史中丞沈炯遷長安太祖授儀同三司甚禮待之炯恐太祖愛其文才桓閉門卻掃無所交遊時有文章隨即毀棄不令流布嘗獨行經漢武通天臺為表奏之陳己思歸之意奏訖其夜炯夢見有宮禁之所兵衛甚嚴炯便以情事陳訴聞有人言甚不惜放卿幾日可至若一月內見關出此恐不復由我寤而異之當時以為恍忽十餘日便有命放還遂與王克等並得東歸又曰陰子春嘗為東莞太守時青州刺史三神念毀壞臨海神廟當座楝上有一大蛇役夫下擒入於海水爾夜子春夢見一人詣其府云有人見苦被壞宅舍既無所託欲憩此境子春心密記之經二日方知神念毀廟因辦牲醑立宇祠之數日夢一朱衣人謝曰得君厚惠當以州相報經月餘魏軍欲襲朐山子春預知設伏摧破梁武以為南青州刺史陳書曰武帝初受禪之日其夜有會稽人傅史普直省夢人自天而下著朱衣武冠導從數十手持板板上有字傅視之其文曰陳氏五主三十四年遂凌空而上旦白黃門侍郎孔宗範歎曰吾事去矣其為子孫憂乎自武帝已後并廢帝五主自永定初迄禎明末共三十四年晏子春秋曰景公舉兵將伐宋過太山公夢見二丈夫意怒甚盛公問占夢曰師過太山不用事太山神怒也公問晏子晏子曰非太山之神也宋之先湯與伊尹也湯修以長髯兌上而豐下倨身高聲伊尹黑矩蓬頭而髯豐上兌下僂身下聲公曰然又曰景公田於梧宮夜猶早公坐睡夢有五丈夫北面稱無罪公覺召晏子告所夢公曰我其嘗殺無罪歟晏子對曰昔先君靈公田五丈夫駭獸故并斷其頭葬之命曰五丈夫之丘豈此耶命人掘其葬處求之則五頭同穴而存馬公嘉之命吏葬之莊子曰宋元君夜半夢人披髮而窺阿門曰豫自宰之淵為清江使河北之所漁者豫且得子元君覺召占夢者占之占夢者曰此神龜也君乃刳龜以卜七十鑽而無遺策又曰匠石之齊至于曲轅曲轅之道見櫟社樹其大蔽千牛曰是不材之木也能若是之壽匠石歸櫟社見夢曰汝將比豫於文木耶柤梨橘柚果蓏之屬耶實熟則剝剝擊也剝則辱大枝折小枝泄泄亦折也此以其能若生者也子求年所可用久矣乃今得之呂氏春秋曰尹儒學御三年而無得焉夜夢受秋駕於其師時日往朝其師而謂之曰吾非愛道也恐子之未可教也今日將教子以秋駕秋駕御法尹儒反走北面再拜曰今昔臣夢受之先為其師言所夢因授秋駕也賈誼書曰文王晝臥夢人登城而呼己曰我東北陬之腐骨也速以人君葬我文王曰諾覺召吏使視之信有焉文王曰速以人君葬之吏曰此無主請以大夫禮王曰吾夢中已許之矣奈何背之也桓談新論曰揚子雲亦言成帝時上甘泉召使作賦子雲為之卒暴倦臥夢其五藏出在地以手收內及覺大少氣病一歲卒世説曰王東亭嘗夢人以大筆與之管如掾子大既覺語人云他日當有大手筆事少日烈宗晏駕哀策諡議王所作辛氏三秦記曰昆明池漢武停船立之習水戰也中有靈沼神池云堯時治水訖停船池通白鹿源人釣魚於此綸絶而去夢於漢武求去其鉤明日帝戲於池見大魚銜索帝曰豈非昔時所夢也取而去其鉤放之博物志曰靈帝時遼西太守黃翻上言海邊有流尸露冠綘衣感翻夢曰我伯夷弟孤竹君也求見掩藏吏民有嗤者皆死虞翻別傳曰翻注易奏上曰臣都吏陳挑夢臣與道士相遇放髮被鹿裘布易六爻燒其三以飲臣臣乞盡吞之道士曰易在天三爻足矣豈臣受命應當知經皇甫謐高士傳曰桓帝好老子之書夜夢見老子乃詔於陳為老子立祠三輔決録曰子以去冬修夜思而未之得也忽然而寢夢此黃髮之叟姓為玄明字曰子真與寐言言必有中夢中指言褒貶之事子授其人子真評之析微通理善否之間無所依違因命操筆者書之謂之決録襄陽耆舊記曰楚襄王與宋玉遊於雲夢之野將使宋玉賦高唐之事望朝雲之館上有雲氣崒乎直上忽而改容須臾之間變化無窮王問宋玉曰此何氣也對曰昔者先王遊於高唐怠而晝寐夢一婦人曖乎若雲煥乎若星將行未至如浮如停詳而視之西施之形王悅而問焉曰我帝之季女也名曰瑤姬未行而亡封巫山之臺精魂依草實為莖之媚而服焉則與夢期所謂巫山之女高唐之姬聞君遊於高唐願薦枕席王因而幸之漢武故事曰上自封禪後夢高祖坐明堂群臣亦夢於是祀高祖於明堂列異傳曰吳選曹令史長沙劉卓得病夢一人以白越單衫與之語曰汝著此衫汗即火燒便潔也覺果有衫在側後汗便火燒之搜神記曰有周掔力感切嘖音責者貧而好道夫婦夜耕息臥夢天公過而哀之勑有以給與司命案録籍此人相貧限不過此唯有張車子應賜錢千萬車子未生請以借之天公曰善曙覺言之於是所為輒得資至千萬先時有張嫗者常往掔嘖家傭賃合有身月滿當孕便遣出生車屋下産得兒主人往視問言當名汝兒作何嫗曰今在車下夢天告之名為車子掔嘖乃悟自是居日衰減車子長大富於周家續搜神記曰承儉者東莞人葬後十年忽夜與其縣令夢云沒故民承儉今見劫明府急見救令便勑外內裝束往冢上日已向出天忽大霧對面不相見但聞冢中訩訩破棺聲有二人墳上望但霧冥不見人往令既至收得冢內三人墳上二人遂得逸走棺未壞令即使人修復之即其夜又夢儉云二人雖得走民悉志之一人面上有青志如藿葉一人㧻其前兩齒折明府但案此尋覔自得也令從其言追捕皆擒獲又曰宗淵字叔林南陽人晉太元中為尋陽太守有數十頭龜付廚勑旦且以二頭作臛便著潘汗甕中養之其暮夢有十丈夫並著烏布袴褶自反縛向宗淵叩頭若求哀明日廚人宰二龜其暮復夢八人求哀如初宗淵方悟令勿殺明夜還夢見昨八人來跪謝恩於是驚覺明朝自入廬山放之遂不復食龜又曰荊州刺史殷仲堪布衣時在舟徒忽夢見一人自説己是會稽上虞人死亡浮喪飄江中明日當至君有濟物之仁豈能見移著高燥處則恩及枯骨殷明日與諸人共江上看果見一棺逐水流下飄飄至殷坐處令人牽取題如夢所即移著岡上酹以酒飯其夕又夢此人來謝恩又曰嘉興徐泰幼喪父母叔又隗養之甚於所生隗病侍甚謹三更中夢二人乘船持箱上泰床頭發箱出簿書示曰汝叔應死泰即於夢中下地叩頭良久曰汝縣有同姓名人不泰思得語鬼云有張隗不姓徐此人云亦可強逼念汝能事叔父當為汝受之遂不復見異苑曰高平檀茂崇以義熙中喪亡其母沛郡劉氏晝眠夢見崇手捉圃扇云崇年命未盡橫被災厲方永違離今以此扇奉別母涕驚覺果於屏風門得扇上皆如踟跦網絡撫執悲慟又曰海陵如睪縣東城村邊海岸崩見一古墓有方頭漆棺以朱題云七百年墮水元熹二十年墜於縣巘和蓋從潮漂沉輒泝流還依本處村人朱護等異而啓之見老姥年可七十許璠頭著袿古攜切鬢髮皓白不殊生人叉髻衣服粲然若新送終器物枕履悉存護乃齋酒酺施于柩側爾夜護婦夢見姥云向獲名貺感至無已但我牆屋毀廢骸形飄露今以直一千託為治護也置錢便去明覺果得即用改殮移于高阜焉述異記曰陳留周氏婢民與入山取樵忽夢見一女子曰吾目中有剌煩為拔之當有厚報此婢乃見朽棺髑髏草生眼中便為拔草即於某處得一雙金指環靈魂志曰濡須口有一大舶船覆在水中水小時便出見嘗有漁人夜宿其傍以船繫但聞箏笛絃管之音夢人驅遣云勿近官妓此人驚覺即移船去傳云是曹公載妓船覆于此于今存在智瓊傳曰弦超字義超夢神女從之自稱天上玉女姓成字智瓊早喪父母天帝愍之遣令得下嫁如此三四旦覺寤欽想顯然來遊乃駕輜軿車從八婢自言我天帝玉女遂為夫婦贈詩二百餘言又著易七卷超皆能通其旨
