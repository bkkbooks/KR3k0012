body:
  text: 兵部六十五輜重釋名曰輜廁也謂軍糧什物雜廁載之以其纍重故稱輜重後漢書注曰輜車名也孫子曰使敵不得至者險害之地攻其所必救能守其險害之要路敵不得自致故王子曰一犬當穴萬鼠不敢出一虎當溪萬鹿不敢過言守之上也故飽能飢之絶其糧也委軍而爭利則輜重捐委置庫藏輕師而行若敵乘虛而來抄絶其後則己輜重皆悉捐棄是以軍無輜重則亡無糧食則亡無委積則亡此三者亡之道也委積芻革之處史記曰漢王遣將韓信以兵數萬欲東下井陘擊趙趙王陳餘聚兵井陘口號稱二十萬李左車說陳餘曰韓信涉西河虜魏王擒夏說欲以下趙此乘勝而去國遠鬥其鋒不可當臣聞千里餽糧士有飢色樵蘇後爂樵取薪也蘇草也師不宿飽今井陘之道車不得方軌騎不得成列行數百里其勢糧食必在其後願足下假臣奇兵三萬人從間路絶其輜重足下深溝高壘堅營勿與戰使前不得鬥退不得還吾奇兵絶其後使野無所掠不至十日而韓信之頭可致於戲音毫下不然必為所擒矣陳餘儒者常稱義兵不用詐謀奇計曰吾聞兵法十則圍之倍則戰今韓信兵號數萬千里而襲我亦已罷極今如避不擊後有大者何以加之則諸侯謂吾怯而輕來伐我不聽韓信使人間視知不用大喜乃敢引兵遂進竟破趙軍後漢書曰董訴許邯與更始諸將各擁兵據南陽諸城帝遣吳漢伐之漢軍所過多侵暴時破虜將軍鄧奉謁歸東野怒吳漢掠其鄉里遂返擊破漢軍獲其輜重屯據淯陽與諸將合從又曰鄧禹自箕關將入河東箕關在今王屋縣東河東都尉守關不開禹攻十日破之獲輜重千餘乘又曰耿弇追張步平壽乃肉袒負斧鑕於軍門鑕鍖也示必死鍖所林切弇傳步詣行在所而勒兵入據其城樹十二郡旗鼓東觀記曰弇凡平城陽琅琊高密膠東東萊北海齊千乘濟南平源泰山臨淄等令部兵各以郡人詣旗下衆向十餘萬輜重七千餘兩皆罷遣歸鄉里晉書曰劉毅追桓玄於崢嶸州毅乘風縱火盡鋭爭先玄衆大潰燒輜重夜走崔鴻十六國春秋曰前秦符堅遣將王猛伐前燕慕容暐師次潞川燕將慕容評率兵十萬禦之以持久制之猛乃遣其將郭度率騎五千夜從間道起火於高山因燒評輜重火見鄴中評性貪鄙障固山泉賣樵鬻水積錢絹如丘陵三軍莫有鬥志因而大敗唐書曰高宗遣將薛仁貴郭待封伐吐蕃仁貴留三萬人作兩柵輜重並留柵內倍道掩之待封不從仁貴之策領輜重繼進未至烏海吐蕃二十餘萬悉衆救其前軍迎擊待封敗之待封趍山軍糧及輜重並為賊所掠仁貴遂退軍戎車書曰武王戎車三百兩車一乘步卒七十二人虎賁三百人與紂戰于牧野詩曰戎車既駕四牡業業又曰元戎十乘以先啓行禮記曰兵車不式武軍綏旌前有水則載青旌前有塵埃則載鳴鳶前有車騎則載飛鴻前有士師則載虎皮前有摯獸則載貔貅行前朱鳥而後玄武左青龍而右白虎招搖在上急繕音徑其怒進退有度左右有局各司其局左傳曰晉車七百乘韅靷鞅絆遂伐其木以益其兵也又曰叔向曰寡君有甲車四千乘在行之必可畏也牛雖瘠僨於豚上其畏不死乎又曰楚子會諸侯伐隨軍於漢淮之間少師謂隨侯曰楚人上左君必左君楚君也無與王遇且攻其右右無良焉弗從戰于速杞隋師敗績鬥丹獲其戎車穀梁曰趙盾長轂五百綿地千里古司馬兵法曰戎車夏曰鉤車先正也鉤設淮望遠近計車量地以立壘正者什伍之例也殷曰寅車先疾也寅敬也前有旌旗幟所以知變化示應而不失周曰元戎先良也前立伐惡立善之旗所以知善罪之所在先齊良善而後伐之文選曰輕車霆激驍騎雷驚戰艦墨子曰公輸般自魯之楚為舟戰之具謂之鉤拒退則鉤之進則拒之也後漢書曰公孫述遣其將任滿田戎程泛將數萬人乘枋箄下江關榜箄以木竹為之浮於江水上爾雅曰舫附也郭景純曰水中箄筏也華陽國志曰巴楚相攻故置江關舊在京赤甲城後移在江南岸對白帝城故基在今夔州魚復縣南枋即舫字古用通箄音步隹切附音匹沮切擊破馮駿及田鴻季玄等遂拔夷道夷陵據荊門虎牙撗江水起浮橋鬥樓立攢柱絶水道結營山上以拒漢兵彭攻之不利於是裝直進樓船冒突露撓數千艘並船名樓船之上施樓橈楫也爾雅曰楫謂之橈又謂露橈在外人在船中冒突取其觸冒而唐突也晉書曰周訪與諸軍共征杜韜韜作結皋打官軍船艦訪作長岐棖以拒之結皋不為害又曰劉裕北征廣固嶺南賊將徐道覆謂其帥盧循曰今日之機萬不可失既剋都邑劉𥙿雖還無能為也循從之初道覆密欲裝舟艦乃使人伐船材於南康山僞云將下都貨之稱力少不能得致即賤賣之價減數倍居人貪賤賣衣物而市之贛石水急贛古暗切出船甚難皆儲之如是者數四故板大積而百姓弗之疑及道覆舉兵案賣券而取無得隱匿者乃并裝之旬日而辨遂舉衆寇南康廬陵豫章郡諸守相皆委任奔走梁書曰陸納反叛造大艦一名曰三王艦者邵陵王河東王桂陽嗣王三人並為元帝所害故立其像於艦祭以太牢加其節蓋羽儀鼓吹每戰輒祭之以求福又曰王琳大營樓艦將啚義舉琳將張平宅乘一艦每將戰勝艦則有聲如野豬故琳戰艦以千數以野豬為名南史曰梁徐世譜從陸法和與景戰於赤亭湖景軍甚盛世譜乃別造樓船拍艦火舫水軍以益軍勢將戰又乘大艦居前大敗景軍禽景將任約景退走因隨王僧辨攻郢州世譜復乘大艦臨其倉間賊將宋子仙據城降以功徐信州刺史封魚復縣侯周書庾信傳曰信常有鄉關之思作哀江南賦以致其意云麾兵金匱校戰玉堂蒼鷹赤雀鐵軸牙檣隋書曰楊素數進取陳之計未幾拜信州惣管賜錢百萬錦千假馬二百匹而遣之素居永安造大艦名曰五牙上起樓五層高百餘尺左右前後置六柏竿並高五十尺容戰士八百人旗幟加於上次曰黃龍置兵百人自餘平乘舴艦等各有差唐書曰曹王皋性多巧思常為戰艦挾以二輪令蹈之訴風鼓浪其疾如掛帆席凡造物必省易而為久不可販性纖悉每遺人糧肉必令自持衡稱量以致之官署布帛令縱書其幅而印之絶吏之私易三國典略曰梁陸法和多聚兵艦欲襲襄陽寇武關梁王使止之法和謂使者曰法和是求道之人常不希釋梵天王坐處豈規人主之位但於空王佛所與主上香火因緣見主上應有報至故救援耳今既被疑是業不可改也又曰梁陸納叛湘州時造二艦衣以牛皮高十五丈一曰青龍一曰白虎選其驍勇者乘之以戰魏武軍令船戰令曰雷鼓一通吏士皆嚴再通士伍皆就船整持櫓棹戰士各持兵器就船各當其所幡鼓各隨將所載船鼓三通大小戰船以次發左不得至右右不得至左前後不得易處違令者斬通典曰水戰船闊狹長短隨用大小勝人多少皆以米為率一人重米二石其揖掉篙櫓帆席絙素沉石調度與常船不殊又曰樓船船上建樓三重列女牆戰格樹幡幟開弩窗矛穴置拋軍壘石鐵汁狀如城壘忽遇暴風人力不能制此亦非便於事然為水軍不可不設以成形勢又曰蒙衝以生牛皮蒙船覆背兩廂開掣棹孔前後左右有弩窗矛穴敵不得近矢石不能敗此不用大船務於速進乘人之不及非戰之船也又曰鬥艦船上設女牆可高尺牆下開製掉孔舷內五尺又建柵與女牆齊棚上又建女牆重列戰敵上無覆背前後左右樹牙旗幡幟金鼓此戰船也又曰走舸舷上立女牆棹夫多戰卒少皆選勇力精鋭者往返如飛鷗乘人之不及金鼓旗幟列之於上此戰船也又曰遊艇無女牆舷上置槳床槳音槳左右隨大小長短四尺一床計床計會進止回軍轉陳其疾如風虞候居之非戰船也又曰海鶻頭低尾高前大後小如鶻之狀舷下左右置浮版形如鶻翅翼以助其船雖風濤漲天免有傾側覆背上左右張生牛皮為城牙旗金鼓如常法江海之中戰船也傅玄正都賦曰飛雲鷁首龍舟餘皇艨艟水城蜀艇吳航萬艘俱興雲帆齊張懸斾光天征鐸琳琅凌波泝流星列鴈行吳都賦曰戎車盈於石城戈船掩於江湖亭障後漢書曰馬成代驃騎大將軍杜茂繕治障塞自西河至渭橋西河今勝州富昌縣也渭橋本名橫橋在今咸陽縣東南河上至安邑前漢書曰河上地名故秦內史帝二年改為河上郡武帝分為左馮翊太原至井陘太原今并州也井陘今屬常山郡常山今相州也中山至鄴皆築保壁起十里一候在事五六年帝以成勤征還京師又曰盧芳與胸奴鳥桓連兵寇盜尤數緣邊愁苦詔王霸將馳刑徒六千餘人與茂治飛狐道飛狐道在今蔚州飛狐縣北通媯州懷戎縣即古之飛狐口也推石布土築起亭障自代至平城三百餘里晉書曰梁武昭王皓修燉煌舊塞東西二國以防北虜之患築燉煌舊塞西南二國以威南虜唐書曰竇靜檢校并州大惣管以突厥頻來入寇請斷石嶺以為障塞詔從之又曰馬燧奏隴州刺史兼御史中丞州西有通道二百餘步上連峻山與吐蕃相直虜每入寇皆出於此燧乃按險易立石種樹以塞之下置二門上設譙櫓八日而功畢會抱玉入覲燧與俱來留京師久之代宗知其能召見拜啇州刺史又曰李朝晟為邠州刺史奏方渠合道水波皆賊路也請城其地以備之詔問須兵幾何朝晟奏臣部下兵自可集事不煩外助復問前築鹽州凡興師七萬今何其易也朝晟曰鹽州之役咸集諸蕃戎盡知之今臣境近虜若大興兵即蕃戎入寇寇則戰戰則無暇城矣今請密發軍士不十日至塞下未三旬而功畢蕃人始知已無可奈何上從之已事軍還至馬嶺吐蕃始乘障數日而退又曰貞元九年二月將城鹽州詔曰設險守國易象垂文有備無患先王令典況修復舊制安固封疆按甲息人必在於此鹽州地當衝要遠介朔陲東達寧夏西援靈武密邇延慶保捍王畿乃者城池失守制備無據千里亭障烽燧不接三隅要害役戍其勤若非興集師徒繕修壁壘設攻守之具務耕戰之方則封內多虞諸華屢驚由中及外皆靡寧居深帷永圖豈忘終食顧以薄德至化未孚既不能復前古之封致四夷之守與其臨事而重擾豈若先備而安是用弘遠之謀修五原之壘使邊城有守中夏克寧不有暫勞孰能永逸宜令左右神策軍及朔方河中絳邠寧慶兵馬副元帥渾瑊朔方靈鹽豐綏銀節度都統杜希全邠寧節度使張獻甫左神策行營節度使邢君牙夏綏銀節度使韓潭鄜坊丹延節度使王栖曜振武麟勝節度使范希朝各於所部簡擇馬步將士合三萬五千人同赴鹽州左神策將軍張昌宜充右神策將軍鹽州行營節度使權知鹽州刺史杜彥光充鹽州刺史應所板築及緣修城雜役等宜共取六千人充其餘將士皆列布營陳戒嚴設備明加斥候以警不虞其修城板築功役將士各賜絹布有差其鹽州防秋將士三年滿與代更加給賜仍委杜彥光具名聞奏悉與改轉其防遏將士等畢事便合放歸仍賜布帛有差其諸軍吏士都賜帛七千匹朕情非為己悉在靖人咨爾將相之臣忠良之士輸誠奉國陳力忘勞勉茂功勳永安疆場必集兵事實惟衆心各相率勵以副朕意初貞元三年鹽州為吐蕃所陷毀其城而去自是塞外無保障靈武勢隔西逼鄜坊其為邊患故命城之二旬而畢又詔兼御史大夫叱干遂統兵五千與兼御史中丞史履澄杜彥光之衆戍之是役也上念將士之勞厚令度支供給又詔涇原劍南山南諸軍深討吐蕃以分其力由是板築之際虜無犯塞者及畢中外咸稱賀焉又曰范希朝為振武節度使振武有黨項室韋交居川阜凌犯為盜日入慝作謂之刮城門居人怪駭鮮有寧日希朝周知要害置堡柵斥候嚴密人遂獲安異藩雖鼠竊狗盜必殺無赦戎虜甚憚之又曰元和中城臨涇從涇原節度使假祐之請也臨涇城直涇州西北九十里實險要之鎮從前因循不修常為犬戎所保其界有青石嶺嶺多美土軍人耕獲屢為藩寇掠奪祐請修築議者是非相半祐決城之功畢時方以為大利三國典略曰齊司從斛律光築吞周平隴定誇三城於境上
