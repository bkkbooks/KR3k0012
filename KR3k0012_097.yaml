body:
  text: 皇王部二十一西晉景帝晉書曰景皇帝諱師字子元宣帝長子也雅有風彩沉毅多大略少流美譽與夏侯玄何晏齊名晏常稱曰惟幾也能成天下之務司馬子元是也魏景初中拜散騎常侍纍遷中護軍為選用之法舉不越功吏無私焉宣帝之將誅曹爽深謀祕策獨與帝潛畫文帝弗知之也將夕乃告之既而使人覘之帝寢如常而文帝不能安席晨會兵司馬門鎮靜內外置陳甚整宣帝曰此子竟可也初帝陰養死士三千散在人間至是一朝而集衆莫知其所出也事平以功封長平鄉侯食邑千戶尋加衛將軍正元元年春正月天子與中書令李豐后父光祿大夫張緝七入反黃門監蘇鑠音藥又書藥切等謀以太常夏侯玄代帝輔政帝密知之使舍人王羡以車迎豐見迫隨羡而至帝數之豐知禍及因肆惡言帝怒遣勇士以刀鐶築殺之逮捕玄緝等皆夷三族三月乃諷天子廢皇后張氏因下詔曰姦臣李豐等靖譖庸回陰搆凶慝大將軍糾虔天刑致之誅辟周勃之剋呂氏霍光之擒上官曷以過之其增邑九千戶并前四萬帝讓不受天子以玄緝之誅深不自安而亦慮難作潛謀廢立乃密諷魏永寧太后秋九月甲戍太后下令遣使迎高貴鄉公於元城而立之改元曰正元天子受璽情惰舉趾高帝聞而憂之及將大會帝訓於天子曰夫聖王重始正本敬初古人所慎也明當大會萬衆瞻穆穆之容公卿聽玉振之音詩云示人不佻是則是效易曰出其言善則千里之外應之雖禮儀周備猶宜加之以祗恪以副四海顒顒式仰癸巳天子詔登位相國進號大都督假黃鉞入朝不趍奏事不名劍履上殿帝固辭相國二年春正月有彗星見于吳楚之分西北竟天鎮東大將軍母丘儉楊州刺史文欽舉兵作亂矯太后令移檄郡國為壇盟於西門之外各遣子四人質于吳以請救二月儉欽帥衆六萬渡淮而西帝會公卿謀征討計朝議多謂可遣諸將擊之王肅及尚書傅嘏中書侍郎鍾會勸帝自行戊午帝統中軍步騎十餘萬以征之倍道兼行召三萬兵大會于陳許之郊甲申次于隱橋儉將史招李績相次來降儉欽移入項城帝遣荊州刺史王基進據南頓以逼之帝深壁高壘以待東軍之集諸將請進軍攻其城帝曰淮南將士本無反志且儉欽欲蹈縱橫之迹習秦儀之説謂遠近必應而事起之日淮北不從史招李績前後瓦解內乖外叛自知必敗困獸思鬥速戰便合其志雖云必剋傷人亦多且儉等欺誑將士詭變萬端少與持久詐情自露此不戰而剋之也乃遣諸葛誕督豫州諸軍自安風向壽春征東將軍胡遵督青徐諸軍出譙宋之間絶其歸路帝屯汝陽遣兗州刺史鄧艾督太山諸軍進屯樂嘉示弱以誘之欽進軍將攻艾帝潛軍銜枚徑進樂嘉與欽相遇欽子鴦年十八勇冠三軍謂欽曰及其未定請登城鼓譟擊之可破也既謀而行三譟而欽不能應鴦退相與引而東帝謂諸將曰欽走矣三鼓而欽不應其勢已屈不走何待欽將遁鴦曰不先折其勢不得去也乃與驍騎十餘摧鋒陷陳所向皆披靡遂引去帝遣左長史司馬璉督騎驍八千翼而追之欽父子與麾下走保項城儉聞欽敗棄衆霄遁淮南安風津都尉儉斬之傳首京都欽遂奔吳淮南平初帝目有瘤疾使醫割之鴦之來攻也驚而目出六軍大恐蒙之以被痛甚齧被敗而左右莫知焉閏月疾篤使文帝總統諸軍辛亥崩于許昌時年四十八武帝受禪上尊號曰景皇帝廟稱世宗文皇帝晉書曰文皇帝諱昭字子上景皇帝母弟魏景初三年封新城鄉侯正元初為洛陽典農中郎將值魏明奢侈之後帝蠲除苛碎不奪農時百姓大悅轉散騎常侍大將軍曹爽之伐蜀也以帝為征蜀將軍副夏侯玄出駱谷次于興勢蜀將王林夜襲帝營帝堅臥不動林退帝謂玄曰費禕以據險拒守進不獲戰攻之不可宜亟旋軍以為後圖爽等引還禕果馳兵趣三嶺爭險刀得過還拜議郎及誅曹爽帥衆衛二宮以功增邑千戶高貴鄉公之立也以參定策進封高都侯邑二千戶母丘儉文欽之亂大軍東征帝兼中領軍留鎮洛陽及景帝疾篤帝自京都省疾拜衛將軍景帝崩天子命帝鎮許昌尚書傅嘏帥六軍還京師帝用嘏及鍾會策自帥軍而還至洛陽進位大將軍加侍中都督中外諸軍録尚書事輔政劍履上殿固辭不受甘露元年春加大都督奏事不名夏六月進封高都公地方七百里加九錫假斧鉞進號大都督劍履上殿又不受秋八月庚申加假黃鉞增封三縣二年夏六月辛未鎮東大將軍諸葛誕殺楊州刺史樂琳以淮南作亂遣豫靚音淨為質於吳以請救議者請速伐之帝曰誕以母丘儉輕疾傾覆今必外連吳寇此為變大而遲吾當與四方同力以全勝制之秋七月奉天子及皇太后東征徵兵青徐荊豫分取關中遊軍皆會淮北師次于項城假廷尉何禎節度淮南宣慰將士申明逆順示以誅賞甲戍帝進軍丘頭因命合圍三年春正月諸葛誕文欽等出攻長圍諸軍逆擊走之初誕欽內不相協及至窮蹙轉相疑二欽計事於誕忤誕手刃殺欽欽子鴦攻誕不克踰城降以為將軍封侯使鴦巡城市而呼帝見城上持弓者不發謂諸將曰可攻矣二月乙酉攻而拔之斬誕夷三族四月歸于京師魏帝令改丘頭為武丘以旌武功五月天子以并州太原上黨西河樂平新興鴈門司洲之河東平陽八郡地方七百里封帝為晉公加九錫進位相國九讓乃止景元元年夏四月天子既以帝三世宰輔政非己出情不能安又慮廢辱將臨軒召百僚而行放黜五月戊子夜使冗從僕射李昭等發甲於陵雲臺召侍中王沉散騎常侍王業尚書王經出懷中黃素詔示之戒嚴俟旦沉業馳告于帝召護軍賈充等為之備天子知事泄帥左右攻相府稱有所討敢有動者族誅相府兵將止不敢戰賈充叱諸將曰公畜養汝輩正為今日耳太子舍人成濟抽戈犯蹕天子崩于車中帝召百僚謀故僕射陳泰不至帝遣其舅荀顗輿致之定于曲室謂曰玄伯天下其如我何泰曰唯腰斬賈充徵以謝天下帝曰卿更思其次泰曰但見其上不見其次於是歸罪成濟而斬之與公卿議立燕王宇之子常道鄉公璜音黃為帝二年秋八月甲寅天子使太尉高柔授帝相國印綬司鄭沖致晉公茅土九錫固辭三年夏四月肅慎來獻楛矢石砮弓甲貂皮等天子命歸大將軍府四年夏帝將伐蜀徵四方之兵十八萬使鄧艾自秋道攻薑維於沓中雍州刺史諸葛緒自祁山軍于武街絶維歸路鎮西將軍鍾會帥前將軍李輔征蜀護軍胡烈等自駱谷襲漢中秋八月軍發洛陽大賚將士陳師誓衆將軍鄧敦謂蜀未可討帝斬以徇九月使天水太守王頎攻維營隴西太守牽弘邀其前金城太守楊欣趣其後鍾會分為二隊入自斜谷使李輔圍王含於樂城又使部將易愷攻蔣斌於漢城會直指陽安護軍胡烈攻陷關城薑維聞之引還王頎追敗維於強川維典張翼廖化合軍守劍閣鍾會攻之冬十月天子以諸侯獻捷交至詔加九錫帝乃受命十一月鄧艾帥萬餘人自陰平踰絶險至于江由破蜀將葛贍於綿竹斬贍首傅道進軍雒縣劉禪降天子命晉公以相國總百揆於是上節傅去侍中大都督録尚書之號焉咸熙元年春正月乙丑帝奉天子西征至于長安遣護軍賈充持節督諸軍據漢中鍾會遂反於蜀監軍衛瓘右將軍胡烈攻會斬之景辰帝至自長安三月己卯進爵為王增封并前二十郡冬十月景午天子命中撫軍新昌鄉侯炎為晉世子二年五月天子命冕十有二旒建天子旌旗出警入蹕乘金根車駕六馬備五畤副車置旄頭雲罕樂儛八佾設鍾虡音巨宮懸位在燕王上進王妃為王后世子為太子王女王孫爵命之號皆如帝者之儀秋八月辛卬帝崩于露寢時年五十五葬崇陽陵武帝受禪追尊號曰文皇帝廟稱太祖世祖武皇帝晉書曰武皇帝諱炎字安世文帝長子也寬惠仁厚沉深有度量魏嘉平中封北平亭候歷給事中奉車都尉中壘將軍加散騎常侍纍遷中護軍假節迎常道鄉公於東武陽遷中撫軍進封新昌鄉侯及晉國建立為世子拜撫軍大將軍開府副二相國初文帝以景帝既宣皇之嫡早世無後以帝弟攸為嗣特加愛異自謂攝居相位百年之後大業宜歸攸每曰此景帝之天下也吾何與焉將議立世子屬意於攸何曾等固爭曰中撫軍聰明神武有超世之才髮委地手過膝此非人臣之相也由是遂定咸熙二年五月立為晉王太子八月辛卯文帝崩太子嗣相國晉王位十一月乙未令諸郡中正以六條舉淹滯是時晉德既洽四海宅心於是天子知歷數有在乃使太保鄭沖奉策曰咨爾晉王我皇祖有虞氏誕膺靈運受終于陶唐亦以命于有夏惟三后陟配于天而咸用光敷聖德自茲厥後天又輯音集大命于漢火德既衰乃眷命我高祖方軌虞夏四代之明顯我弗敢知惟王乃祖乃父服膺昭哲輔弼我皇家勳德光于四海格于上下神祗罔不剋順地平天成萬邦以乂應受上帝之命協皇極之中肆豫一人祗承天序以敬授爾位曆數實在爾躬允執其中天祿永終於戲王其欽順天命率修訓典砥綏四國公卿及何曾王沉等固請乃從之太始元年冬十二月景寅設壇于南郊百寮在位及胸奴南單于四夷會者數萬人柴燎告類于上帝於是大赦改元賜天下爵人五級三年春正月癸丑白龍二見于弘農澠池丁卯立皇子衷為皇太子九月甲申詔曰古者以德詔爵以庸制祿雖為下士猶食上農外足以奉公忘私內足以養親施惠今在位者祿不代耕非所以崇化之本也其議增吏俸四年十一月已未詔王公卿尹及郡國守相舉賢良方正直言之士十二月班五條詔書於郡國一曰正身二曰勤百姓三曰撫孤寡四曰敦本息末五曰去人事庚寅帝臨聽訟觀録廷尉洛陽獄囚親平決焉八年春正月癸亥帝耕于籍田二月乙亥禁雕文綺組非禮法之物詔內外群官舉任邊郡者三人帝與右將軍皇甫陶論事陶與帝爭言散騎常侍鄭徽表請罪之帝曰謹言謇諤所望於左右也人主常以阿媚為患豈以爭臣為損哉徽越職妄奏豈朕之意遂免徽官咸寧四年十一月太醫司馬程據獻雉頭裘帝以奇伎異服非典禮焚之于殿前五年大舉伐吳遣鎮東將軍琅琊王胄出徐中安東將軍王渾出江西建威將軍王戎出武昌平南將軍胡奮出夏口鎮南大將軍杜預出江陵龍驤將軍王濬廣武將軍唐彬率巴蜀之卒浮江而下東西凡二十餘萬以太尉賈充為大都督行冠軍楊濟為副總統衆軍十萬太康元年春正月己丑朔五色氣貫日癸巳王渾剋吳尋陽賴鄉諸城獲吳武威將軍周興二月戊午王濬唐彬等剋丹陽城庚申文剋西陵壬戍濬又剋夷道樂鄉城甲戍杜預剋江陵三月壬申王濬以舟師至于建業之石頭孫皓大懼面縛輿櫬降于軍門濬杖節解縛焚櫬送于京師收其圖籍剋州四郡四十三縣三百一十三戶五十二萬三千吏三萬二千兵二十三萬男女二百三十萬其牧守以下皆因吳所置除其苛政示之簡昜吳人大悅乙酉大赦改元賜酺五日恤孤老困窮九月群臣以天下一統屢請封禪帝謙謙弗許泰熙元年春正月辛酉改元夏四月己酉帝崩于含章殿時年五十五在位二十五年葬峻陽陵廟號世祖謝靈運論曰世祖受命禎祥屢臻苛慝不作萬國欣戴遠至邇安德足以彰天啓其運民樂其功矣反古之道當以美事為先今五等罔刑并田王制凡諸禮律未能是正而採擇嬪媛不拘華門者昔武王伐紂歸傾宮之女不以助紂為虐而世祖平皓納吳妓五千是同皓之斃婦人之封六國亂政如追贈外曾祖母違古之道凡此非事並見前書誠有點於徽猷史氏所不敢蔽也唐太宗晉武帝紀論曰武皇承基誕膺天命握圖御寓敷化弘道民以佚而代勞世以治而易亂絶縑綸之貢去雕琢之飾制奢俗以變約俾澆風而反淳雅好直言留心採擢劉毅裴楷以質直而見容嵇紹許奇雖仇讎而不棄仁以御物寬而得衆宏略大度有帝王之量焉于時民和俗靜家給民足聿修武用思啓封疆次神算於深衷斷雄圖於議表馬隆西伐王濬南征師不延時獯虜削迹兵無血刃揚越為墟通近代之不通服前王之不服禎祥顯應風教肅清天地之功成矣霸王之業大矣雖登封之禮讓而不為而驕泰之心因斯以起見土地之廣謂萬葉而無虞都天下之安謂千年而永治不知處廣以思狹則廣可長存居治而忘危則治無常治加之建立非所委寄失才志欲就于升平行先迎於禍亂是猶將適越者指沙漠而遵途欲登山者涉舟航而覔路所趣逾遠所向轉難南北倍殊高下相反求其至也不亦難乎況以新習易動之基而無久安難拔之慮故賈充凶堅懷姦志而擁權楊駿豺狼包禍心以專輔及乎宮車晚出諒暗未周藩翰變親以成踈連兵競滅其本棟梁回忠而起偽擁衆各舉其威曾未數年綱紀大亂以至海內版蕩宗廟播遷帝道王猷反居文身之俗神州赤縣翻成被髮之鄉棄所大以資人掩其小而自託為天下笑其故何哉良由失慎於前所以貽患於後且知子者賢父知臣者明君子不肖則家亡臣不忠則國亂亂國不可以安也亡家不可以全也是以君子防其始聖人閉其端而世祖惑荀勗之姦謀迷王渾之偽策心屢移於衆口事不定於己圖元海當除而不除卒令擾亂區夏惠帝可廢而不廢終使傾覆洪基夫全一人者德之輕極天下者功之重棄一子者忍之小安社稷者孝之大況乎資二世而成業延三孽以喪身所謂取輕德而捨重功畏小忍而忘大孝聖賢之道豈若斯乎雖則善始於初而乖令終於末所以殷勤史策不能無慷慨焉
