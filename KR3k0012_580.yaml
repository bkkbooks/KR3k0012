body:
  text: 樂部十七琴下三禮圖曰琴第一絃為宮次為商次為角次為徵次為羽次為少宮次為少商廣雅曰伏羲氏琴長七尺二寸上有五絃孫登別傳曰孫登字公和汲郡人清靜無為好讀易彈琴頹然自得觀其風神若遊六合之外者當魏末居北山中石窟為宇編草自覆阮嗣宗見登被髮端坐岩下逍遙然鼓琴嗣宗自下趍進冀得與言嗣宗乃長嘯與琴音諧會登因嘯和之妙響動林壑洞冥記曰帝恒夕望東邊有青雲俄見雙白鵠集於臺上倏忽變為二神女舞於樓下握鳳管之簫舞落霞之琴歌清吳春波之曲也劉向別錄曰雅琴之意事皆出龍德諸琴雜事中趙氏者渤海趙定人也宣帝時元康神爵間丞相奏能鼓琴者渤海趙定梁國龍德皆召入見溫室使鼓琴時閑燕為散操多為之涕泣者樂府解題曰魏武帝宮人有盧女者故將軍陰叔之姨也七歲入漢宮學鼓琴琴特鳴異善為新聲阮籍樂論曰漢帝聞楚琴倚扆而悲慷慨長息曰善哉為聲若此而足矣昔季流向風而鼓琴聽之者淚下列仙傳曰稷丘公華山道士漢武帝封禪公乃冠章甫擁琴來迎靈異志曰嵇中散神情高邁任心遊憩嘗行西南出去洛數十里有亭名華陽投宿夜了無人獨在亭中此亭由來殺人宿者多凶至一更中操琴先作諸弄而聞空中稱善聲中散撫琴而呼之曰君何以不來此人便云身是古人幽沒於此數千年矣聞君彈琴音曲清和故來聽耳而就終殘毀不宜以接侍君子向夜髣髴漸見以手持其頭遂與中散共論聲音其辭清辯謂中散君試過琴於是中散以琴授之既彈悉作眾曲亦不出常唯廣陵散絕倫中散纔絻從受之半夕悉得與中散誓不得教他人又不得言其姓也琴書曰昔者至人伏羲氏王天下也仰觀象於天俯察法於地遠取諸物近取諸身始畫八卦削桐為琴又曰自堯相傳善琴者八十餘人有八十餘樣雖少有差大體相似皆長三尺六寸法朞之數也上圓而歛象天也下方相平法地十三徽配十二律餘一象閏也本五絃宮商角徵羽也加二絃文武也至後漢蔡邕又加二絃象九星在人法九竅其樣有異傳於代四所象鳳首翅足尾南方朱雀為樂之主也五分其身以三為上以二為下三天兩地之義也上廣下狹尊卑之象也中翅八寸象八風腰廣四寸象四時軫圓象陽轉而不窮也臨樂承露用棗脣用梓未達先賢深意也又曰琴高以琴養性初學於羅浮山後遊四海或傳禽高非也又曰舜彈五絃之琴以歌南風之詩豈唯道在思親志兼憂民養萬物故感之又曰潁陽西北界李氏處女年十五六天寶八年二月遘疾七月不食魂飛冥冥如昇上景在雲霧中女仙人蘆藕苗間受琴清風弄等五十曲至天寶十五載五月留守悲逈御史中丞蔣列馹騎上聞玄宗度為女道士賜琴三面留內供奉琴德絃妙旁行不流所感無恒也又曰師涓紂之樂官也善鼓琴感四馬噓天仰秣或曰師曠傳雖二疑即是一風俗通曰琴者樂之統也君子所常御不離於身非若鍾鼓陳於宗廟列於簴懸也以其大小得中而聲音和大聲不諠譁而流漫小聲不湮滅而不聞適足以和人意氣感發善心也琴書曰堯大德堯彈感天神降聽儼然言和之至也故堯制神人暢瑞應圖曰師曠鼓琴通於神明而白鵠翔竹林七賢傳曰嵇康臨死顧視日影索琴彈之曰袁孝尼嘗從吾學廣陵散吾無惜固不與廣陵散於是絕矣司馬相如美人賦曰上客何國之公子所從來無乃遠乎遂設旨酒進鳴琴撫絃為幽閑之曲張茂樞響泉記曰余家世所寶琴書圖畫廣明之亂散失蕩盡其中二琴一名響泉一名韻磬皆希代之寶也宋玉賦曰臣嘗行僕飢馬疲正值主人門開主人翁出獨有主人女在欲置臣堂上太高堂下太卑乃便為蘭房奧室止臣其中其中有鳴琴焉臣援琴而鼓之為秋竹積雪之曲吳均續齊諧記曰王彥伯會稽餘姚人也善鼓琴仕為東宮扶侍赴告還都行至吳郵亭維舟中渚秉燭理琴見一女子披幃而進二女從焉先施錦席於東床乃就坐女取琴調之似琴而聲甚哀雅有類今之登歌女子曰子識此聲否彥伯曰所未曾聞女曰此曲所謂楚明光者也唯嵇叔夜能為此聲自此以外傳習數人而已彥伯欲受之女曰此非豔俗所宜唯岩栖谷隱可以自娛耳當更為子彈之幸復聽之乃鼓琴且歌歌畢止於東榻遲明將別各深怨慕女取四端錦臥具繡臂囊一贈彥伯為別彥伯以大籠井玉琴以荅之而去說苑曰雍門周以琴見孟嘗君孟嘗君曰先生鼓琴亦能令我悲乎周曰臣烏能令足下悲哉所能令悲者先貴而後賤先富而後貧不若身才高妙適遭暴亂不若處之隱絕不及四鄰屈折擯壓無所告訴臣一為之徵操琴則涕零矣今足下千乘之君廣廈邃房下羅惟來清風鬥象旗舞鄭妾麗色淫目流聲娛耳水遊則連方舟載旗野遊則馳弋獵平原廣囿入則撞鍾擊鼓乎深宮之中雖有善琴者固未能使足下悲也然臣所為足下悲者一也千秋萬歲之後宗廟必不血食高臺既已壞曲池既已壍墳墓既已平嬰兒豎子採樵者躑躅其足而歌其上曰夫以孟嘗君尊賢乃若是乎於是孟嘗君泣焉垂臉周引琴而鼓之徐動宮徵拂羽角孟嘗君涕泣增哀下而就之曰聞先生鼓琴立若破國亡邑之人也鄭緝之東陽記曰晉中朝時有王質者常入山伐木至石室見童子四人彈琴而歌質因留跋斧柯而聽之童子以一物與質狀如棗核質取而含之便不復飢遂復少留亦謂俄頃童子曰汝來已久何不速去質承而起所坐斧柯爛盡既歸計離家已數十年矣舊宅遷移室宇靡存遂號慟而絕韓子曰昔衛靈公之晉於濮水之上宿夜聞有鼓琴聲者悅之問左右盡不聞乃召師涓而告謂之曰有鼓新聲者子為我聽而寫之師涓靜坐撫琴寫之明日報曰臣得之矣公遂之晉晉平觴之虒祈之臺靈公召師涓令坐師曠之傍援琴鼓之未終師曠曰此師延之作紂為靡靡之樂及武王伐紂延東走至於濮水而自投聞此聲者必於濮水之上先聞者其國削不可遂此平公曰此何聲也曰此所謂清商也公曰清商固宜悲乎師曠曰不如清徵公曰清徵可得聞乎師曠曰不可古之聽清徵者皆有德義之君今主君德薄不足以聽之平公曰願試聽之師曠不得已援琴一奏之有玄鶴二八南方來集於郎門之邑再奏之列三奏之延頸而鳴舒翼而舞平公大悅提觴而起為師曠壽曰音莫悲於清徵乎師曠曰不如清角平公曰清角可得聞乎師曠曰不可昔者黃帝合鬼神於西山之上駕象車六蛟龍畢方並館蚩尤居前風伯進掃雨師洒道虎狼前在䖝蛇伏地鳳皇覆上大合鬼神作為清角今主君德薄不足以聽之平公曰願試聽之師曠不得已而鼓之一奏之有雲從西北方起再奏之大風至大雨隨之裂帷幕破俎豆墮廊瓦坐者散走平公恐懼伏於廊室晉國大旱赤地西京雜記曰趙后有寶琴曰鳳皇皆以金玉隱起為龍鳳螭鸞古賢列女之象亦為歸風送遠之操淮南子曰孟春東宮御女青色采衣鼓琴瑟琴瑟木也春木王桓譚新論曰神農氏為琴七絃足以通萬物而考理亂也又曰八音之中唯絲最為密而琴為之首應邵風俗通曰琴者樂之與八音並行君臣以相御也孔叢子曰孔子晝息於室而鼓琴閔子自外聞之以告曾子曰嚮子之音清微而和淪入至道今也更為幽沉之聲幽則欲上所為發也沉則貪德之所為施也夫子何所感一若斯乎吾從子入而問焉曾子曰諾二子入問孔子孔子曰然如是也吾有之嚮見狸方取鼠欲其得之故為音汝二人者孰識諸曾子對以閔子夫子曰可以聽音矣家語曰孔子遊於泰山見榮啟期行郕之野鹿裘帶索抱琴而舞孔子問曰先生為樂何也對曰天生萬物唯人為貴吾既為人一樂也男尊女卑吾既為男二樂也人生有不見日月不免襁褓吾行年九十五歲矣三樂也貧者士之常死者人之終處常得終又何憂乎孔子曰善呂氏春秋曰伯牙鼓琴鍾子期聽之方鼓琴志在泰山鍾子期曰善哉乎鼓琴巍巍乎如泰山志在流水鍾子期曰善哉乎鼓琴茫茫乎若流水鍾子期死伯牙擗琴絕絃終身不復鼓琴以為世無足以鼓琴也列仙傳曰華山毛女獵即見常居岩彈琴桓譚新論曰神農氏繼宓羲而王天下亦上觀法於天下取法於地近取諸身遠取諸物於是始削桐為琴繩絲為絃以通神明之德合天人之和焉琴書曰師曠晉之樂官也上於琴能易寒暑召風雨為晉平公鼓之感玄鶴六下舞西京雜記曰張安世十五為成帝侍中善鼓琴能為雙鳳離鸞之曲世說顧彥先平生好琴及喪家人常以琴置靈床上張季鷹往哭顧不勝慟遂徑上床鼓琴作數曲而去又曰會稽賀思令善彈琴常夜在月中坐臨風鳴絃忽有一人形貌甚偉著械有慘色在中庭稱善便與共語自云是嵇中散謂賀云卿手下極快但於古法未備因授以廣陵散遂傳之於今不絕大周正樂曰勝之逸人也常挾琴牧羊巨澤漢王知其賢將聘焉委以國政勝之曰王廢牧羊之任而委四海之務是錯亂天地顛倒人倫竟逃於陰山之中又曰琴所以脩身理性反其天真也君子所以常御不離於身非若鍾鼓陳於宗廟列於簴懸也以其大小得中而聲音和大聲不諠譁而流漫小聲不湮滅而不聞適足以和人意氣感發善心也又曰瓠巴六國時人也工琴好古因夏日俯於池亭鼓之感魚躍潛藻而聽焉又曰嵇康字叔夜有邁俗之志為中散大夫或傳晉人非也常宿王伯通館忽有八人云吾有兄弟為樂人不勝羈旅今授君廣陵散甚妙今代莫測又曰凡琴曲和樂而作命之曰暢暢者言其道之美暢從不敢自安也憂愁而作命之曰操操者言困阨危迫猶不失其操也又曰清角黃帝之琴鳴廉脩況藍脅自鳴空中號鍾齊桓公琴繞梁楚莊王琴綠綺司馬相如琴焦尾蔡邕琴鳳皇趙飛鷰琴又曰賀韜吳人也常夜彈琴感鬼神見舞數曲斯亦妙之至也十二國史曰周師經仕魏文侯善鼓琴文侯躭之起舞經怒以琴撞文侯文侯怒使人曳下殿將殺之經曰乞申一言而死文侯曰何經曰臣撞桀紂之君不撞堯舜之主文侯曰寡人過矣乃捨之懸琴於壁以為戒晉紀曰孫登字公和不知何許人散髮宛地行吟樂天居白鹿蘇門二山彈一絃琴善嘯每感風雷嵇康師事之三年不言樂纂曰趙耶利居士唐初天水人也以琴道見重於海內帝王賢貴靡不欽風舊錯謬十五餘弄皆削凡歸雅無一徵玷不合於古述執法象及胡笳五弄譜兩卷弟子逵者三人並當代翹楚貞觀十年終於曹壽七十六弟子宋孝臻公孫常數百年內常傳於馬氏國史補曰張弘靜少時會名客觀鄭宥彈琴宥調二琴至切各置一榻動宮則宮應動角則角應稍不切乃不應宥師董庭蘭尤善汎聲又曰李汧公勉雅好琴常斲桐又取漆䇶為之多至數百張永者與之有絕代者一名響泉一名韻磬自寶於家京師又以樊氏路氏為第一路氏有房太尉石枕損之不理蜀氏斲琴嘗自品第一上者以王次者以琴瑟又次以金徽螺蚌唐書樂志曰趙師字耶利天水人也在隋為知音至唐貞觀初獨步上京遽入琴苑疇之嵇氏累代居曹遂今曹郡琴者所修五弄具列於曹妙傳濮州司馬氏琴道不墜於地也師云吳聲清宛若長江廣流緜緜徐逝有國士之風蜀聲躁急若擊浪奔雷亦一時俊決也世說曰晉戴顒字仲若父逵高尚不仕顒年十六遭憂不忍傳父之琴與兄勃各造新弄勃五部顒十五部又制長弄一部並傳於世
