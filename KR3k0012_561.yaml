body:
  text: 禮儀部三十九冢墓四禮論曰問郡將臨墓主人先以除身無服將若不哭主人當哭否賀循答之云凡君臣民皆須先君哭禮也此祭君宜哭則主人不敢以哭煩君耳又曰問墓中有何面為上荀納以為緣生奉終宜依禮坐蔡謨難據周公明堂位東西以此為上與納反納又引廟位以答王濮陽北墓向南以西為上上黨郡記曰令狐徵君隱城東山中令狐終即云葬焉諸生遵師法而陪葬者三百餘家松三千樹大皆十數圍高四五十丈今俗名其山曰令狐墓漢史所稱壺關三老令狐茂者是也伏琛齊地記曰臨淄小城北門東二百餘步有晏嬰冢又曰齊桓公冢齊城之南東十五里在牛山桓公冢西南八里有仲父冢葬於牛山之阿又曰朱虎城東二十里有柴阜其西南隅有魏獨行君子管寧墓石碑猶存城東北三十里柴阜東頭有魏徵士邴原墓石碑猶存又曰牛山西南二里有孫賓墓石碑猶存吳地記曰昌門外女墳者吳王闔閭女墓也乃以文石為槨藏金玉珍玩以人從死高墳深池池水成湖故名曰女墳亦與虎丘俱見發掘皆無所得也又曰昌門南有要離墓吳王闔閭既殺王僚而代之僚子慶忌亡奔衛慶忌勇捷過人恐結諸侯還為國難伍子胥與要離為行人要離弱而謀於王曰殺臣妻子刑臣左手要離因亡奔衛慶忌聞吳王暴虐如此甚信之遂與俱還圖共襲吳王行及大江要離剌殺慶忌因亦自殺闔閭葬之於昌門南大城內齊門外有慶忌墓丘淵之齊道記曰先是嬴博二縣共界漢武帝封禪合作此縣以供祀故曰奉高東南三十里有延陵兒冢本云其高可隱今乃二丈餘似是後人陪之伍輯之從征記曰齊襄王墓在汝水西墓西有僖公墓東有四田墓傳云倨榮廣布也墓皆方墓圓墳戴延之西征記曰彭城南有亞父范曾冢冢高四十餘丈東北有隧道其城北三里有劉向墓泗水東三里漢大夫龔勝冢石碣猶存恥登王莽之朝不食而死又曰金鄉焦氏山北數里有漢司隸校尉魯峻冢前有古石祠堂堂壁皆青石隱起自書契以來忠臣孝子貞婦孔子及弟子七十二人形像皆刻石記之伏滔北征記曰姑熟九井山北十里有吳大將諸葛瑾墓墓墻猶存西北十八里直瀆前墓是吳將甘寧墓也相者云此墓有王氣孫皓鑿其後計里名為直瀆續述征記曰太公冢在堯山北五里平地為墳高十丈曾有發之者冢深數十仞得一銅槨金玉甚多尚父五世葬周斯實田和冢也和遷齊居於海上而別為諸侯亦稱太公也又曰宿預縣水南大徐城古之徐國城北徐君墓季子解劍墳樹則斯地也又曰城陽縣城二里小城二里小城南九里有堯陽自漢迄于晉二千石及丞尉刊名堯即位至永嘉三年二千七百有二十一載記于堯碑城東南六里堯母慶都墓稱曰靈臺堯陵北二里仲山甫墓墓前祠堂石室儼然若新皇覽冢墓記曰顓頊冢在東郡濮陽縣頓丘城外廣陽里中王莽時使使者祠顓頊冢又曰秦始皇冢在驪山古之驪戎國今之所豐也晉獻公伐驪戎獲二女其山陰多黃金其陽多美玉謂藍田是也故貪而葬焉并天下徒七十餘萬穿入地洞三泉而致槨宮觀奇器珍怪諸物藏之令一匠人作機弩人有近穴輒射之以水銀為百川江河大海金銀為鳧鶴機關轉相斡終而復始上具畫天文以人魚膏為燈度久不滅後宮無子者皆殉從死者甚衆恐工匠知之殺工匠於藏中因閉羡門復土樹草木以像山墳高五十餘丈周回五里餘後項籍燒其宮觀關東賊發之後牧羊兒亡羊羊入藏中持火照羊燔其槨後賊遂取其銅又曰太上皇葬萬年高帝父也高帝葬長陵孝惠帝霸陵諸陵皆用瓦器不為墳王莽之亂天下無道獨無災害孝景帝葬陽陵孝武皇帝葬茂陵孝昭皇帝葬平陵孝宣皇帝葬杜陵孝元帝葬渭陵元帝下詔曰無置從民令天下無騷動之憂自是陵園不置邑孝成帝葬延陵孝哀帝葬義陵孝平帝葬康陵孝文皇帝弟淮南厲王長坐謀反後置園如諸王長好道事八公世之愚者云長仙醫巫訖曰淮南好道百官皆得仙狗吠雲中雞鳴天上東平思王冢在東平松皆西靡又曰蒼頡冢在馮翊衙縣利陽亭南道傍墳高六尺學書者皆往上姓名投剌祀之不絶又曰蚩尤冢在東郡壽張縣閿鄉城中高七尺民常十月祀之有赤氣出如一匹絳帛民名為蚩尤旗又肩髀冢在山陽郡巨野縣傳言蚩尤與黃帝戰於涿鹿之野黃帝克之身體異處皆葬之又曰奚仲冢在魯國縣東去縣二十五里山上因名奚仲山亭名奚仲亭又曰湯冢在濟陽薄縣北郭冢四方方八十步高七丈上平又曰吳太伯冢在會稽吳縣北去城十里又曰周文王武王周公冢在京兆長安聚又曰王子黽音猛冢在南陽鄂縣西又曰夏育冢在濟南歷山上又曰秦繆公冢在甘泉宮祈年觀下又曰虢公冢在河內溫縣東濟水南大冢是也其城南有虢公臺又曰葉公諸梁子高冢在南郡葉縣西北去城三里所近縣民皆祠之又曰魯大夫叔梁紇冢在魯國東陽聚安泉東北八十四步名曰防冢民傳言防墳於墳地微高又曰孔子冢在魯城北便門外南去城一里冢塋方百畝冢南北廣十步東西十步高丈二尺冢為祠壇方六尺與地方平無祠堂冢塋中樹以百數皆異種魯人世世皆無能名其樹者民云孔子弟子異國人各持其國樹來種之孔子塋中不生荊棘及剌人草伯魚墓在孔子冢東與孔子並大小相望子思冢在孔子冢南大小相望又曰伯樂冢在濟陰定陶東南一里冢高五丈又曰師曠冢在右扶風名曰師曠山人民不敢上其上又曰楚武王冢在汝南郡鯛音紂陽縣葛陂鄉城東北民謂之楚王岑又曰鄭相子産冢在河南郡新鄭城外大冢是也又曰靖郭君冢在魯國薛城中東聚孟常冢在魯薛城中又曰文信君呂不韋冢在河南洛陽城北邙山道西大冢是也民傳言呂母冢不韋先墓故其冢名呂母不韋死獲過於始皇矣民傳云不韋好經書皆以葬漢明帝朝公卿大夫諸儒八十餘人論五經誤失符節令宋元上言臣聞秦昭王與不韋好書皆以書葬王至尊不韋久貴冢皆以黃腸題湊豦地高燥未壞臣願發昭王不韋冢視未燒詩書又曰亞夫冢在廬江居巢縣郭東居巢亭中又曰齊桓公冢在臨淄城二十里淄水南孟嘗君與齊桓公冢同處唐書新語曰開元中集賢學士徐堅葬妻問兆域之制於張說曰長安神龍之祭有黃州僧泓者能通鬼神之意而以人事參之僕嘗聞其言猶記其要墓欲深而狹深者取其幽狹者取其固平地之下一丈二尺為土界又一丈二尺為水界各有龍守之土龍六年而一暴水龍十二年而一暴當其隧者神道不安故深二丈四尺之下可以設窀穸墓之四維謂之折壁欲下闊而上斂其中項謂之中樵中樵欲俯嶔而傍煞墓中末粉為飾以代石堊不置瓴甋瓷瓦以其近於火不置黃金以其久而為怪不置朱丹雄黃譽石以其氣燥而烈使墳上草木枯而不潤不置羽毛其近於尸也鑄鐵為牛豕之像可以禦二龍王潤而潔能和百神置之墓內以助神道僧泓之說如此又曰大理卿徐有功持法不濫及其葬也將穿墓筮者曰必有異應以旌善人果獲石堂其大如倉中空外堅四門入牖占曰此天所以祚有德也置之墓中其後終吉後優詔褒贈寵及其子圖墓書曰大墓天剛嚴父之門八將之首位處乾尊欲得連堽隱軫狀如亂雲望之翽翽絶而復連小頓大起千里相牽壽過期頤世世登仙又曰望之如飛雷即之如鳥驚法出勇士伏節御兵又曰夫欲依山葬者其山連延百里不絶一高一下小頓則大起出公卿若三重之山望之似城郭多諸支別者亦出公卿如新月形在腹中葬冢之所若至日沒見日光者出封侯又曰凡相山陵之法山望如龜狀葬之出公卿封侯代代不絶山望如龍狀有頭尾蜲蛇者葬之出二千石凡依山作冢皆當立在山東為利得山之形力也山如龜形又巍巍直上如𨵗狀出二千石又曰欲知貧富堽陵肥薄狀如肥馬草木茂盛色黃紫皆富也堽陵多傷𡙇土色赤白地瘠草木黃赤不茂或多細石皆貧相冢書曰冢欲得見郡縣城郭欲得連屬長長無極冢青氣鬱鬱出二千石赤氣出公卿白氣出刑戮黃氣出封侯欲得雌龍地多子孫不用雄龍堽武子堽又曰凡葬於龍耳貴出侯青烏子稱山三重相連名傘山葬之出二千石張載七哀詩曰北邙何纍纍高陵有四五借問誰家冢皆云漢世主魏武帝遺令曰汝等時時登銅雀臺望吾西陵墓田魏文帝為漢帝置守冢詔曰朕承符運受終革命其敬事山陽公如舜之宗堯有始有卒傳之無窮前群司奏處正朔欲使一皆從魏制意所不安其令山陽公於其國中正朔服色祭祀禮樂自如漢又為武昭宣明帝置守冢各三百家宋孝武置自古帝王守冢戶詔曰先代帝王因時創業君人建國禮尊南面而歷運推移年代久遠丘壠殘毀樵牧相趍塋兆堙蕪封樹莫辨自古以來帝王陵墓可隨近十戶蠲其役以供守視宋高祖修楚元王墓詔曰夫褒賢崇德千載彌尊敦本敬始義隆自遠楚元王積仁基德啓藩斯境素風道隆作範後昆本支之祚實隆鄙宗遺芳餘烈奮于百代而丘封依然墳塋莫翦感遠存往慨焉永懷夫愛人懷樹甘棠且猶勿翦追甄墟墓信陵尚或不絶況瓜瓞所興開源自本者乎可蠲復近墓五家長給灑掃
