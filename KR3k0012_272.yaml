body:
  text: 兵部二敘兵下六韜曰大人之兵如虎如狼如雨如風如雷如電天下盡驚然後乃成又曰武王問太公曰欲引兵深入諸侯之地三軍卒有緩急或利或害吾欲以近通遠從中應外急三軍之用謂之何如公曰主將有陰符有大勝得敵之符長一尺有破軍擒敵之符長九寸有降城得邑之符長八寸有却敵執遠之符長七寸有反兵驚中堅守之符長六寸有請糧食益兵卒之符長五寸有敗軍亡將之符長四寸有卒利亡失之符長三寸諸奉使行符稽留若符事聞符所告者皆誅符者主將所以陰通信語不得漏泄中外之道也王曰善黃石公記曰將所有為威者號令也戰所以全勝者軍正也士所以輕戰者用兵也故戰如風發勇如河決眾可望而不可當可下而不可勝也黃石公三略曰聖王之制兵也非好樂之也將以誅暴也暴謂亂國賊民夫以義誅不義決江河溉螢火其剋必也商君書曰夫民情好爵祿而畏刑罰人君設此二者以御民夫民力盡而名隨之功立而賞隨之君能使其民信此明於日月則兵無敵也呂氏春秋曰古之聖王有義兵譬之若用良藥治人毒藥殺人義兵為天下之良藥也又曰古聖王有義兵而無有偃兵兵所自來者尚矣古始有民凡兵也者威也威也者力也民之有威力性也性者所受於天也非人之所能為也武有黃炎固用水火矣黃帝炎帝共工固欲作難矣與高辛氏爭為帝而亡之也五帝固相與爭矣又曰人曰𧈪尤作兵𧈪尤非作兵利其械也未有𧈪尤之時民固剝林木已戰矣故勝為長長帥長則猶不足以治之故立君君又不足以治之故立天子天子之立也出於君君之立出於長長之立出於爭爭鬥之所自來者久矣不可禁不可止故古之聖王有義兵而無有偃兵也又曰家無怒笞則豎子嬰兒之有過也立見天下無伐則諸侯之相暴也立見故怒笞不可偃於家刑罰不可偃於國誅伐不可偃於天下有巧有拙而已矣故古之聖主有義兵而無偃兵夫有以饐死者欲禁天下之食有以乘舟死者欲禁天下之舡有以喪國兵者欲偃天下之兵悖夫兵之不可偃也又曰凡兵天下之凶器也勇天下之凶德也興凶器行凶德不得已也又曰人情欲生而惡死欲榮而惡辱死生榮辱之道一則三軍之士可使一心矣凡軍欲其眾也心欲其一也三軍一心則令可使無敵矣故曰其令彊者其敵弱其令信者其敵詘先勝於此則必勝之於彼矣又曰古之至兵士民未合而威已諭矣敵已服矣豈必用旌鼓干戈哉故善諭威者於其未發也於其未通也窅窅乎莫知其情此之謂至威之誠也又曰凡兵欲急疾捷先欲急疾捷先之道在於知緩徐遟後緩徐遟後急疾捷先之分也急疾捷先所以決義兵之勝也又曰雖有江河之險則凌之雖有大山之塞則蹈之并氣搏精心無有慮猶預之慮目無有視耳無有聞壹諸武而已矣又曰萬乘之國外之不可以距敵內之不得以守固其民非不可以用也不得所以用之術也不得所以用之術國雖大勢雖便卒雖眾何益也淮南子曰古之用兵者非利壤土之廣而貪金玉之賂將以存亡繼絕平天下之亂而除萬民之害也又曰凡有血氣之虫含牙戴角前爪後距有角者觸有齒者螫有蹄者趹喜而相戲怒而相害天之性也人有衣食之情而物弗能足也群居雜處分不均求不贍則爭爭則彊脅弱而勇侵怯人無筋骨之彊爪牙之利故割革而為甲爍鐵而為刃貪昧饕餮之人殘賊天下萬民騷動莫寧其所有聖人勃然而起乃討彊暴平亂世夷險除穢以濁為清以危為寧也又曰兵之所由來遠黃帝嘗與炎帝戰矣炎帝神農氏之末世也與黃帝戰於阪泉帝滅之顓頊嘗興共工爭矣共工與顓頊爭為帝觸不周山之折也故黃帝戰於涿鹿之野黃帝與𧈪尤戰於涿鹿涿鹿在上谷堯戰於丹水之浦堯以楚伯受命滅不義於丹浦丹浦在南陽舜伐有苗有苗三苗啟攻有扈禹之子伐有扈於甘在右扶風鄠縣也自五帝而不能偃也况衰世乎又曰夫兵者所以禁暴討亂也炎帝為火災故黃帝禽之共工為水害故顓頊誅之教之以道導之以德而不聽則臨之以威武臨之以威武而不從則制之以兵革故聖人之兵也若櫛髮耨苗所去者少而所利者多也又曰殺無罪之民而養不義之君害莫不焉殫天下之財而贍一人之欲禍莫深焉所為立君者以禁暴討亂也今集萬民之力而反為殘賊是為虎傅翼曷為不除也又曰霸王之兵以論慮之以策圖之以義扶之非以亡存也將以存亡也又曰聞敵國之君有加虐於其民者則舉兵而臨其境責之以不義刺之以過行兵至其郊乃令軍帥曰無伐樹木無掘墳墓無熱五穀熱燒也無焚積聚無捕虜民無收六畜無聚所征國民以為採取無收其六畜以自饒利乃發號施令曰某國之君傲天侮鬼決獄不辜殺戮無罪此天之所誅也民之所仇也兵之來也以廢不義而復有德也有逆天之道率民為賊者身死族滅以家聽者祿以家以里聽者賞以里以鄉聽者封以鄉以縣聽者侯以縣剋國不及其民廢其君而易其政尊其秀士而顯其賢良賑其孤寡恤其貧窮出其囹圄賞其有功百姓開門而待之浙米而儲之浙清唯恐其不來也此湯武之所以致王也而齊桓晉文之所以成霸也又曰君為無道民之思兵也若旱而望雨也渴而求飲夫何誰與交兵接刃乎故義兵之至也至於不戰而心服也又曰晚世之兵君雖無道莫不設渠塹傅堞加守傅守也堞城上女墻也攻者非以禁暴除害也欲以侵地廣壤也故至於伏尸流血相支以日而霸王之功不世出者自為之故也又曰夫為戰地者不能立其功舉事以自為者眾去之眾之所助雖弱必強眾之所去雖大必亡也又曰兵失道而弱得道而彊將失道而拙得道而工國得道而存失道而亡所謂道者恥員而法方背陰而抱陽左柔而右剛履幽而觀晹地方而無限故莫能窺其門天育而無形象地生長而無計量渾渾沉沉孰知其藏也又曰凡物有聯唯道無聯萬物可聯也而道不可聯也所以無聯者以其常形勢也轉輪而無窮象日月之行若春秋有代謝若日月有晝夜終而復始明而復晦莫能得其紀制形而無形故功可成矣物而不物故勝不屈形兵之極也至於無形可謂之極矣又曰大兵無創與鬼神通五兵不厲天下莫敢之當建鼓不出庫諸侯莫不慴㥄沮膽故廟戰者帝神化者王所謂廟戰者法天道也神化者法四時也脩政於境內而遠方慕其德制勝於未戰而諸侯服其威也又曰民誠從令雖少無畏民不從令雖眾為寡故下不親上下心不用卒不畏將其形不戰守有必固而攻有必勝不待交兵接刃而存亡機固已形矣又曰兵有三勢有二鈐有氣勢有地勢有因勢將充勇而輕敵卒果敢而樂戰三軍之眾百萬之師志厲青雲氣如飄風聲如雷電誠積踰而威加敵人此謂氣勢狹路關津大山名塞龍虵蟠蟠冤屈也却苙居却偃覆也苙登也羊腸道羊腸一屈一伸魚茍門竹笱所以捕魚其門可入而不得出也一人守險而千人不敢過此謂地勢因其勞倦怠亂飢渴凍暍推其搖搖擠其揭揭此謂因勢間諜間諜軍之反間也審錯規慮設蔚施伏草木盛曰蔚隱遁其形出於不意使敵人之兵無所適備此謂知鈐陣卒正前行選進退俱什伍搏前後不相蹍蹍蹀蹈也左右不相干受刃者少傷敵者眾此謂事鈐鈐勢必形吏卒愽精選良用才官得其人計定謀決明於死生舉錯得時莫不振驚故攻不待衝隆雲梯而城拔雲梯可依雲而立所以瞰敵之城中也戰不至交兵接刃而敵破明於必勝之數也又曰夫飛鳥之鷙也俛其首猛獸之玃也匿其爪虎豹不外其牙噬犬不見其齒故用兵之道示之以柔而迎之以剛迎逆敵家示之以弱而乘之以彊為之欲歙應之以張歙弱張彊也歙讀如脅將欲西如示之以東也又曰神莫貴於天勢莫便於地動莫急於時用莫利於人和此四者兵之幹植也然待道而後行可一用也又曰古之兵弓劍而已矣糟柔無繫脩戟無刺糟柔木也無繫無鐵刃也刺鋒也糟讀如曹晚世之兵隆衝以攻渠憺以守隆高也衝所以臨敵城衝突壞之渠壍也一曰渠甲名憺㦥所以御也連弩以射銷車以鬥車弓弩通一弦以牛挽之以刃著左右為機開發又曰古之伐國不殺黃口不獲二毛黃口幼少也二毛有白髮於古為義於今為笑古之所以為治者今之所以為亂也又曰夫神農伏羲不施賞罰而民不為非然而位政者不能廢法而治民不能及神農伏羲也舜執干戚而服有苗然而征伐者不能擇甲兵而制彊暴不能及舜也由此觀之法度者所以論民俗而節緩急也桓範世要論曰太古之初民始有知則分爭分爭群群則智者為之君長君長立則興兵所從來久矣雖聖帝明王弗能廢也但用之以道耳故黃帝戰於阪泉堯伐驩兜舜征有苗夏禹殷湯周之文武皆用師克伐以取天下焉又曰聖人之用兵也將以利物不以害物也將以救亡非以危存也故不得已而用之也以為戰者危事兵者凶器不欲令好用之故制法遺後命將出師雖勝敵而反猶以喪禮處之明弗樂也故曰好戰者亡忘戰者危不好不忘天下之王也又曰夫兵之要在於修政修政之要在於得民心得民心在於利之也要仁以受之義以理之故六馬不和造父不能以致遠民臣不附湯武不能以立功故兵之要在得眾得眾者善政之謂也善政者恤民之患除民之害故政善於內則兵彊於外也杜恕論曰天生五材民並用之廢一不可誰能去兵故兵之來也久矣所以威不軌而昭文德所以討彊暴而除殘賊也聖人以興亂人以廢廢興存亡皆兵之由也昔五帝不能偃況衰世乎又曰濫殺無辜之民以養不義之君非兵之體也殫天下之財以贍一人之求非兵之體也怙其兵甲之器矜其變詐之謀欲以立威成名非兵之體也虜其君隸其臣遷其社易其民非兵之體也故夫霸王之用兵也始之以義終之以仁將以存亡非以亡存也將以禁暴非以為暴也又曰兵之來也以除不義而授德克其國不傷其民廢其君而不易其政尊其俊秀顯其賢良賑其孤寡恤其窮困百姓聞之欣然簞食壺漿以迎其君奚之遲也以湯武之師用兵上也誰與交鋒而接刃哉又曰所謂善用兵者先弱敵而後戰者也若乃征之以義以責其過振之以武以威其淫懷之以德以誓其民置之以仁以救其危此四者用兵之體所謂因民之欲乘民之力也又曰治國家理境內施仁義布德惠明勸賞黜幽昧功臣附親士卒和輯上下一心君臣同德指麾而響應此上兵之體也地廣民眾主賢將能國富賞罰信未至交兵而敵人亡遁此次兵之體也知地之形因險阨之利明奇正之變審進退之宜援枹而鼓之黃塵四起乃以決勝此用兵之下非兵之體也又曰夫德義足以懷天下之民事業足以當天下之急選舉足以得賢才之用則兵之所加若勁風振槁此兵之體也鹽鐵論曰兵者凶器也甲堅兵利為天下殃其母制子故能久長聖人法之厭而不傷蔣子萬機論曰夫虎之為獸水牛之為畜殆似兵矣夫虎爪牙既鋒膽力無伍至於即豕也卑俯而下之必有枙喉之獲夫水牛不便速角又喬踈然處郊之野朋遊屯行部隊相伍及其寢宿因陣反禦若見兕虎抵角牛全兕害矣若用兵恃彊必鑒於虎居弱必誡水牛可謂攻取屠城而守必能全者矣劉向新序曰上古之時其民敦朴故三皇教而不誅無師而威故善為國者不師三皇之德也至於五帝有師旅之備而無用故善師者不陣五帝之謂也湯伐桀文王伐崇武王伐紂皆陣而不戰故善陣者不戰三王之謂也及夏后之伐有扈殷高宗討鬼方周宣王之征勳鬻而不血刃皆仁聖之惠時化之風也至齊桓侵蔡而蔡潰伐楚而楚服而彊楚以致苞茅之貢於周室北伐山戎使奉朝覲三存亡一繼絕九合諸侯一匡天下衣裳之會十有一嘗有大戰亦不血刃至晉文公設虎皮之威陳曳柴之偽以破楚師而安中國故曰善戰者不死晉文公之謂也楚昭王遭闔閭之禍國滅昭王出亡父老迎而笑之昭王曰寡人不仁不能守社稷父老反笑何無憂寡人且從此入海矣父老曰有君若此其賢也及申包胥請救哭秦庭七日秦君憐而救之秦楚同心遂走吳師昭王反國故善死者不亡昭王之謂也是故自晉文公已下至戰國而暴兵始眾於是以彊并弱以大吞小故彊國務攻弱國備守合從連衡群相攻伐故戰則稱孫吳守則稱墨翟至秦而以兵并天下窮兵極武而亡及項羽尚暴而滅漢以寬仁而興故能掃除秦之苛暴矣孝武皇帝攘服四夷其後天下安然故世之為兵者其行事略可觀也又曰樂毅以弱燕破彊齊七十餘城者齊無法故也孫武以三萬破楚二十萬者楚無法故也韓信以寡眾破趙二十萬者趙無法故也近者曹操以八千破袁紹五萬者袁無法故也此五子能以少剋多者軍有法故也故用兵無法猶乘舟無楫登馬而不勒是以良將思計如飢存法如渴所以戰必勝攻必拔也陳琳書曰王者之師有征無戰衛公兵法曰峗阪高陵谿谷險難則用步卒平原廣衍草淺地堅則用車追奔逐北乘虛獵散反覆百里則用騎故步為腹心車為羽翼騎為耳目三者相待參合迺行
