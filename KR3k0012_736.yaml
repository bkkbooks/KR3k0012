body:
  text: 方術部十六巫下唐書曰薛舉寇幽岐之地太宗征之劉文靜殷開山與舉戰於高墌音隻城西南為舉所敗衛尉郝璦勸舉秉勝直指長安舉然之臨發而遇疾召巫視之巫言唐兵為祟舉惡之未幾而死又曰劉文靜性嗜酒與其弟文起酣飲出怨言拔刀斫柱曰會當斬裴寂頭耳家中妖怪數見文起憂之遂召巫者於星月之下被髮銜刀為厭勝之法其愛妾失寵以告其兄妾兄上變高祖以之屬吏又曰武后將如洛陽至閿鄉縣界騎忽不進召巫者問之巫言晉龍驤將軍王濬云臣墓在道南每為採樵者所害聞大駕今至故來哀告后勑去墓五里不得採樵又曰肅宗重陰陽鬼神之事或命巫媼乘駟行郡縣為厭勝之術有祅人王璵遂以左道為相代宗亦篤信之凡所修築動牽禁忌而奸人黎幹得以左道尹京又內集衆工編剌珠繡為御衣既成而焚之為穰除法且無虛月又曰永太中回紇首領羅達干等率其衆詣涇陽請降郭子儀許之因去甲胄與之相見既而子儀先執杯合胡祿都督請呪子儀呪曰大唐天子萬萬歲回紇可汗亦萬萬歲兩國將相亦萬萬歲若起負心違背盟約者身死陳前家口屠戮合胡祿都督等失色及杯至即譯日如令公盟約皆喜曰初發本部來日將巫師兩人來云此行大安穩然不與唐家兵馬鬥見一大人即歸今日領兵見令公令公不為疑脫去衣甲單騎相見誰有此心膽是不戰鬥見一大人巫師有徵矣歡躍久之子儀撫其背首領等分纏頭綵以賞巫師又曰朔方先鋒兵馬使南陽郡王白元光與回紇合兵於涇州靈臺縣西共破吐蕃等十萬餘衆初白元光等到靈臺縣西探知賊勢為月明思少陰晦回紇使巫師便致風雪及遲明戰吐蕃盡寒凍弓矢皆廢披氈徐進元光與回紇隨而殺之又曰大曆九年七月久旱是日澍雨豐霈初京兆尹黎幹以旱故祈雨於朱雀街造土龍悉召城中巫覡更舞觀者駭笑又曰房孺復故太尉琯之孽子年二十淮南陳少由辟為從事多招陰陽巫覡令楊言已身過三十必為宰相又曰貞元中昭義節度使李抱真以久疾為巫祝所惑請降官爵以穰之章奏凡七上詞甚切至上難違之故自司空而授僕射又曰田仁會為右金吾將軍所得祿俸估外有餘輒以納官時人譏其邀名仁會強力病惡晝夜巡警絲毫越法無不立發躬自閲罰略無寬者京城貴賤咸畏憚之時有女巫蔡娘子以鬼道惑衆自云能令死者復生市里以為神明仁會驗其假妄奏請徙邊上曰若死者不活便是妖妄若死者得生更是罪過不可容也竟依仁會所奏又曰李德裕為浙西觀察使德裕壯年得位鋭於報政凡舊俗之害民者悉革其弊江嶺之閒信巫祝惑鬼怪有父母兄弟厲疾者舉室棄之而去德裕欲變其風擇鄉人之有識者諭之以言繩之以法數年之閒弊風頓革屬郡祠廟按方志前代名臣賢后則祠之四郡之內除淫祠一二千所又罷私邑山房一千四百六十以清寇盜人樂其政優詔嘉之又曰劉禹錫貶朗州司馬北居西南夷土風僻陋舉目殊俗無與言者禹錫在郎十年唯以文章吟詠陶冶情性蠻俗好巫每淫祠舞鼓必歌俚辭禹錫或從事於其閒乃依騷人之作為新辭以教巫祝故武陵溪洞閒夷歌率多禹錫之辭也莊子日鄭有神巫曰季咸知人生死鄭人見之皆棄走列子見之而心醉歸又曰小巫見大巫拔茅而棄此其所以終身弗如也淮南子曰鄭之神巫相壺子林見其徵在男曰覡在女曰巫巫能占骨法吉凶之氣故見其兆徵徵應也告列子列子行泣報壺子列子鄭之隱士也壺子弟子報白者也壺子持以天壤言精神天之有也形骸地之有也死也自歸其本故曰持天壤矣名實不入機發於踵名爵號之名也實幣帛貨財之實不入者心不恤也機疾也謂命危殆不旋踵而至猶不怨懼者也壺子視之死生亦齊齊等也尸子曰齊有田果者命狗曰富命子為樂將欲祭也狗入室果呼之曰富出巫曰不祥也家果大禍長子死哭曰樂乎而不似悲也呂氏春秋曰管仲病桓公問焉仲曰願君遠易牙豎刁常之巫公子啓方公曰常之巫能審於死生子痾猶疑耶仲曰死生命也病是天也君不守其本而恃巫彼將以此無不為也及公病常之巫曰公以某日薨易牙等作亂公嘆曰死若有知何面目以見仲父蒙面而死山海經曰大荒中有靈山巫咸巫即巫朌巫彭巫姑巫真巫禮巫捶巫謝巫羅十人從此升降百樂爰在國語曰古者民神之不能雜擇民之精爽不攜二者而又能齊肅忠正其智能上下比義其聖能光遠宣朗其明能光照之其聰能聽達之如是則神明降之在女曰巫在男曰覡又曰厲王虐國人謗王厲王恭王之曾孫夷王之子邵公告曰民不堪命矣邵公邵康公之後穆公虎也為王卿士言人不堪暴虐之政命也王怒得衛巫使監謗者衛巫衛國之巫監察之也巫有神靈有謗必知也以告則殺之巫言謗王王則殺之國人莫敢言道路以目王喜告邵公曰吾能弭謗矣乃不敢言弭止離騷曰欲從靈氛之吉占兮心猶豫而狐疑巫咸將夕降兮懷椒糈私呂反而要之椒者香物也所以降精神來所以享神東方朔傳曰武帝時有神雀下丞相御史中丞二千石諫議臣博士皆上壽東方朔獨不賀帝曰群臣皆賀而獨不賀何也對曰恐後有巫為國害者朔因謝疾去其後卒有巫蠱之事不知朔竟所終也桓子新論曰昔楚靈王驕逸輕下信巫祝之道躬儛壇前吳人來攻其國人告急而靈王鼓舞自若異苑曰曹娥父能絃歌為巫五月五日於西江泝濤迎婆娑神溺死不得尸娥年十四緣江號哭七日遂投江求之而死幽明録曰董卓信巫軍中常有巫都言禱求福利言從卓求布倉卒無布有手巾言曰可用耳取便書巾上如作兩口一口大一口小相纍以舉謂卓曰慎此也卓後為呂布所殺後人則知況呂布也又曰大元年中臨海有巫李不知所由來能卜相作水符治病多愈亦禮佛讀經語人云明年天下當大疫此境尢劇又二紀之後此邦之西北大郡殭尸橫路時汝南周叔道罷臨海令權停家巫云周令今去不宜南行必當暴死便指北山曰後二十日此山應有異則其事彰也後十餘日大石夜頽落百丈碎磕若雷庾揩為臨海太守過詣周殷饌作伎至夜庾還舫中天曉庾自披屏風呼叔道何癡不起左右撫看氣絶久矣到明年縣內病死者數千又曰巴丘縣有巫師舒禮晉永昌元年病死土地神將送詣太山俗人謂巫師為道人也人過禮舍門前土地神問吏此是何等舍門吏曰道人舍土地神曰是人亦是道人便以相付禮入門見閒瓦皆縣竹簾自然床榻男女異處有誦經者唱偈者然飲食快樂不可言禮文書名己至太山門而又身不到推入土地神云道見數千閒瓦屋即問吏言女道人即以付之於是遣神即録取禮觀未遍見有一人八手四眼捉金杵遂欲撞之便怖走還出門神己在門迎捉送太山太山府君問禮卿在世閒昔何所為禮曰事一萬六千神為人解除祠祀或殺牛犢豬羊雞鴨府君曰汝罪應上熱熬便牽著熬所見一物牛頭人身捉鐵義義禮著熬上宛轉身體燋爛求死不死一宿二日府君問主者禮壽命應盡為頓奪其命校録籍餘算八年乃命將録來牛頭復以鐵義義著熬邊府君曰今遣卿歸終畢餘笇勿後殺生淫祠禮乃還活不復為巫師江氏家傳曰江統為太子洗馬諫愍懷太子曰臣聞土者民之主用播殖築室營都建邑皆有明制著在經典而無禁忌犯害之文唯末俗小巫乃有此言巫書乃禁入地三尺有四時方面不皆禁也竊見禁土令不得繕治壇垣動移屋瓦臣等以為此違典義不可為永制兩京記曰宣政門內日宣政殿初成每見數十騎馳突出沒高宗使巫祝劉門奴問其所以鬼云我漢楚王戊太子死葬於此門奴曰按漢書戊與七國反誅死無後焉得葬此鬼曰我當時入朝以路遠不隨後坐病死天子於此葬我漢書自遺誤耳門奴因宜詔欲為改葬鬼曰出入誠不安改葬幸甚天子斂我玉魚一雙幸勿奪之及發掘玉魚宛然棺柩略盡又曰尚書省左司郎廳事後有古冢高宗武后閒郎中屢有暴死者聖曆中有巫者見尚書郎鄭默冢發之得銘志符驗棺柩尚在并有瓦木雜器鄭氏子孫相率改葬厭蠱史記曰江充見上年老恐晏駕後為太子所誅因奏上言曰疾祟在巫蠱以充為使者治巫蠱充將胡巫掘地求木偶至遂掘得蠱於太子宮得桐木人太子懼不能自明收充自臨斬之宋書曰文帝時使宮內皆蠶欲以諷厲天下有女巫嚴道育夫為劫坐沒入奚官元凶劭姊東陽公主應閣婢王鸚鵡白公主嚴道育通靈主乃白上託云善蠶求召入道育云所奉天神當賜符應時主夕臥見流光相隨狀如螢火遂入巾箱化為雙鳧圓青可愛於是主及劭並信惑之始興王濬素佞事劭並多過失慮上知使道育祈請欲令過不上聞歌舞呪詛不捨晝夜道育輒云自上天陳請必不泄露邵等敬事號曰天師後遂巫蠱刻玉為上形像埋於含章殿前初東陽公主有奴陳天興鸚鵡養以為子而與之淫通鸚鵡天興及寧州所獻黃門慶國並與巫蠱事邵以天興補隊主東陽主薨鸚鵡嫁吳興沈懷遠為妾鸚鵡既適懷遠慮與天興私通事泄請劭殺之劭密使人害天而慶國謂往來唯有二人天興既死慮將見及乃以白上上驚惋即收鸚鵡家得劭濬手書皆呪詛巫蠱之言得所埋上形像於宮內道育叛亡捕之不得上誥責劭濬劭濬唯陳謝而已道育變服為尼逃匿東宮濬往京口又以自隨或出止親人張旿家後濬當鎮江陵復載道育還東宮欲將西上有告上云京口張旿家有一尼服食出入征止內似嚴道育上使掩得二婢云道育隨征北還都上惆悵驚惋劭弒逆後李武平亂不見傳國璽問劭云在嚴道育處就取得之道育鸚鵡並都街鞭殺於石頭四望山焚其尸揚灰于江梁書曰蕭紀舉岷蜀之衆由外水而下湘東王命方士伯人於長州苑板上畫紀形像親下鐵符釘于支體以厭之陳書曰後主陰令人告長沙王叔堅厭魅刻木為偶人衣以道士衣施機開能拜跪晝夜於星月下醮之祝詛於上又令上書告其事案驗令實後主召叔堅囚于西省後赦之免所居官北齊書曰初立太子恆母弘德夫人穆氏為左皇后大赦國內初斛律后之廢也陸令萱欲以穆氏代之祖挺請立胡昭儀為后胡太后亦卑辭厚禮以求令萱以胡氏寵幸方隆不得己而白齊主立之然意在穆氏每私謂齊主云豈有男為太子而身為婢妾乃求左道行厭蠱之術旬朔之閒胡氏遂即精神恍惚言笑無恆齊主漸畏惡之於是立穆氏隋書曰獨孤陀性好左道其外祖母高氏先事貓鬼己殺其男郭沙羅因轉入其家上微聞而不信會獻皇后及楊素妻鄭氏俱有疾召醫視之皆曰此猫鬼疾上以陀后之異母弟陀妻楊素之異母妹由是意陀所為陰令其兄穆以情喻之上又避左右諷陀陀言無有上不悅左遷出怨言上令高熲蘇威大理正皇甫孝緒大理丞楊遠等推案之陀婢徐阿尼言本從陀母家來常事猫鬼每以子日夜祀之言子者鼠也其猫鬼每殺人者所死家財物潛移於蓄猫鬼家陀嘗從家中索酒其妻曰無錢可酤陀因謂阿尼曰可令猫鬼向越公家使我足錢阿尼便呪之居數日猫鬼向素家後上初從并州還陀於園中謂阿尼曰可令猫鬼向皇后所使多賜吾物阿尼復呪之遂入宮中楊遠乃於門下外省遣阿尼呼猫鬼阿尼於是夜中置香粥一盆以匙扣而呼曰猫女可來無住宮中久之阿尼色正青若被牽曳者云猫鬼己至上以事下公卿寄章公牛弘曰妖由人興殺其人可以絶矣上令以犢車載陀夫妻將賜死於其家陀弟整詣闕求哀於是免陀死除名以其妻楊氏為尼先是人訟其母為人猫鬼所殺者上以為妖妄怒而遣之及此詔誅行猫鬼家陀未幾而卒又曰滕王瓚子綸當文帝世子不自安煬帝即位尢被猜忌綸憂懼呼術者王姿問之姿答曰王相祿不凡滕即騰也此字足為善應有沙門惠恩崛多等頗善占候綸每與交通嘗令此三人為厭勝法有人告綸怨望呪詛帝令黃門侍郎牛弘窮驗之又曰秦王俊好內妃崔氏性妒甚不平之遂於瓜中進毒俊由是遇疾篤含銀銀色異為遇蠱未能白遣使奉表陳謝帝責以失德薨帝哭之數聲而已曰晉王前送一鹿我令作脯擬賜秦王王亡可置靈坐之前心己許之不可虧信帝及后往視見大蜘蛛大蛷螻上音求下音搜從柩頭出之不見窮之知妃所為也又曰蜀王秀漸奢侈違法度及大子勇廢秀甚不平皇太子終恐為後患陰令楊素求其罪狀而譖之又令楊素蘇威牛弘柳述趙綽推治之太子陰作偶人書帝及漢王姓字縛手釘心令人埋華山下令楊素發之又作檄文陳逆臣賊子專弄威柄陛下唯守虛器一無所知帝乃下詔數其罪曰漢王於汝親則弟也乃畫其形像題其姓名縛手釘心枷鎖杻械仍云請西嶽華山慈父聖母收楊諒神閉在華山下勿令散蕩我之於汝親則父也仍云請西嶽華山慈父聖母賜為開化楊堅夫妻回心歡喜又畫我形像縛手掫頭仍云西嶽神兵收楊堅魂神如此形狀我今不知楊諒汝何親也滅天理逆人倫皆為之不祥也欲免患禍長守富貴其可得乎搜神記曰鄱陽趙壽有犬蠱有陳岑詣壽忽有大黃犬六七群出吠岑後余相伯歸與壽婦食吐血幾死乃屑桔梗以飲之乃愈兩京記曰楊素有美妾姿色絶倫時有千牛桑和有妖蠱異術常云一見婦人便即能致煬帝嘗密使人竊之素宅深邃和朝奉詔其夜便竊以匿煬帝奇其能便詔素賜之唐書曰高駢傳云畢師鐸入城呂用之張守一出奔楊行密詐言所居有金行密入城掘其家地下得銅人長三尺餘身被桎梏釘其心刻高駢二字於胸蓋以魅道厭勝蠱惑其心以至族滅
