body:
  text: 飲食部二十二脂膏周禮庖人曰凡用禽獸春行羔豚膳膏香夏行踞鱐音搜膳膏臊秋行犢麂膳膏腥冬行鮮羽膳膏羶用禽獸謂煎和之以獻王也鄭司農云膏香牛脂也臊豕膏也杜子美云膏臊犬膏腥豕鮮生魚也羽鴈也膏羶羊脂也玄謂膏腥雞膏也八物者得四時之氣尤盛為人食之弗勝是以用休廢之脂膏煎和膳之又冬官梓人曰天下之獸五脂者膏者羸者羽者鱗者脂牛羊之屬膏豕之屬也宗廟之事脂者膏者以為牲致美味也禮曰脂用葱膏用薤脂肥凝者澤者曰膏煎諸膏膏必滅之肝膋取狗肝一幪之以其膋膋腸問脂幪音蒙小切狼臅膏以與稻米為酏狼臅臆中膏之然反爾雅曰冰脂一也莊子云肌膚若冰雪冰雪脂膏也說文曰膫牛腸脂膫音力雕反通俗文曰脂在脊曰昉在骨曰𦙱音珊獸脂聚曰㬷音窘史記曰敗脂辱處也而公伯千金後漢書曰孔奮為姑臧長力行清潔為衆人所笑以為身處脂膏不能自潤徒益苦辛耳淮南子曰無角者膏而無前有角者脂而無後油魏志曰孫權至合肥新城滿寵馳往赴募壯士數十人折松為炬灌以麻油從上風放火燒賊攻具又曰黃初三年車駕幸宛使夏侯尚率諸軍與曹真共圍江陵權將諸葛瑾與尚軍對江瑾度入江中渚而分水軍於江中尚夜多持油船將步騎萬餘人於下流潛渡攻瑾諸軍夾江燒其舟船水陸並攻破之王隱晉書曰元康三年武庫火檢校是工匠盜庫中恐罪乃投燭著麻膏中火燃又曰齊王冏起義孫秀多斂葦炬益儲麻油於殿省為縱火具東宮舊事曰月給油六升宋書曰朱修之為荊州刺史去鎮之日秋毫無犯計在州已來然油及私牛馬食官穀草以私錢六十萬償之梁書曰沈約年十三而遭家難潛竄會赦乃免既而流寓孤貧篤志好學晝夜不釋卷母恐其以勞生疾常遣減油滅火又曰張纘為湘州刺史州境大寧晚好積聚多寫書數萬卷有油二百斛米四千石他物稱是又曰侯景攻臺城為曲項木驢攻城矢石不能制羊侃作雉尾炬施鐵鏃以油灌之擲驢上焚之俄盡又曰初侯景既南奔魏相高澄命先剝景妻子面皮悉以油煎殺之後周書曰衛刺王真作亂率其黨襲肅章門不得入乃縱火燒之尉遲運懼火盡直黨得進乃取油灌木以益火火勢轉盛真不得進乃退博物志曰煎油水氣盡無煙不復沸則還冷得水而焰起飛散釋名曰奈油禱奈實和之以塗繒上燥而發之形似油也杏油亦如之
