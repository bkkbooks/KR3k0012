body:
  text: 兵部六十八攻具下通典衛公兵法攻城戰具篇曰作四輪車上以繩為脊生牛皮蒙之下可藏十人填隍推土回切之直抵城下可以攻掘金火木石所不能敗謂之轒轀車凡力有餘者攻先絕諸國之交使無外救糧多而人少攻而勿圍糧少而人多圍而勿攻又曰以大木為床下置六輪上立雙牙牙有檢梯節長丈二尺有四桄音光桄相去三尺勢微曲遞牙相檢飛於雲間以窺城中有上城梯首冠雙轆轤枕城而上謂之飛雲梯又曰大木為床下安四獨輪床上建雙䏶間撗括中立獨竿首如桔槔狀其竿高下長短大小以城為準竿首以窠盛石大小多少隨力所制人挽其端投之其推轉逐便而用之亦可埋腳著地而用其旋風四腳亦隨事而用之謂之拋車又曰作轉軸車車上定十二石弩以鐵鉤繩連轉車行軸轉引弩持滿弦挂牙上弩為七衢中衢大箭一鏃刃長七寸廣五寸箭簳長三尺圍五寸以鐵鍱音業為羽左右各三箭次小於中箭其牙一發諸箭齊起及七百步所中城壘無不摧隕樓櫓亦顛墜謂之車弩又曰以木為脊長一丈徑一尺五寸下安六腳下闊而上尖高七尺內可容六人以濕牛皮蒙之人蔽其下舁直抵城下木石鐵火所不能敗用攻其城謂之尖頭木驢又曰於城外起土為山乘城而上古謂之土山今之壘道用生牛皮作小屋並四面蒙之屋中置運土人以防攻擊者土山則孫子所謂距閩鑿地為道行於城下用攻其城往往建柱積薪於柱間而燒之柱折城摧謂之地道又曰以八輪車上樹高竿竿上安轆轤以繩挽板屋上竿首以窺城中版屋方四尺高五尺有十二孔四面列布車可進退圜城而行於營中遠視亦謂之巢車如鳥之巢即今之版屋也以版為幔立桔槔於四輪車上懸幔逼城堞間使趫捷者太白陰經曰使趫卒蔽之蟻附而上矢石所不能及謂之木幔又守城篇曰禽滑釐問墨翟守城之具墨翟荅以五六十事皆煩冗不便於用其後韋孝窺守晉州羊侃守臺城皆約封胡子伎巧之術法古不妙非合今之用也今述所便於事者如後渭浚湟深池增城修堞懸門懸板為重門也又曰突門於城中對敵營自鑿城內為闇門多少臨事令五六寸勿穿或於中夜或於敵初來營列未定精騎從突門躍出擊其無備襲其不意又曰涂扇以泥塗城門扇厚可三寸備火又曰鑿門為敵所逼門先自鑿門扇為數十孔出強弩射之長矛刺之則敵不得近門又曰涂棧以泥塗門上木棧厚可五寸備火又曰轉關橋一梁為橋梁端著撗括去其橋轉人馬不得渡皆傾水中秦用此橋而殺燕丹又曰積石備拋石大小隨事又曰樓櫓却敵上建候樓以板為之跳出為櫓笓籬戰隔於女墻上跳出㭬去墻三尺內著撗括㧻端安轄以荊柳編為之長一丈闊五尺懸㭬端用遮矢石又曰布幔以複布為幔以弱竿懸挂於女墻外去墻外七八尺以折拋石之勢矢石不復及墻又曰木弩以黃連桑柘為弩弓長一丈二尺徑七寸兩弰二寸以絞車張之大矢一發聲如雷吼敗隊之卒又曰鷰尾炬縛葦草為炬尾分為兩歧如鷰尾狀以油臈灌之加火從城墜下便騎木驢而燒之又曰松明以木明燒之夜以鐵鏁縋下巡城照敵人乘城而上又曰脂油燭炬燃燈秉燭於城中四衢要路門戶晨夜不得絕明用備非常又曰行爐融鐵汁爐舁行於城上以灑敵人又曰遊火以鐵筐盛火加脂臈鐵鏁懸縋下燒穴中孔城人又曰灰𪌙糠粃因風於城上擲之以瞇敵人目因以鐵汁灑之又曰連捧如打禾連枷狀用打女墻外上城敵人又曰扠竿如槍刃為兩歧用叉飛梯及人又曰鈞竿如槍刃兩旁有曲刃可以鉤搭又曰油囊盛水於城上擲安火車中囊敗火盛又曰天井敵攻城為地道來乃自於城道上直下穿井以邀之積薪安井中以火薰之敵人自焦灼又曰地聽於城內八方穿井各深二丈令頭覆戴新甕凡於井中坐聽則城外百步之內有孔城地道者並聲聞甕中而辯知方所近遠矣又曰鐵莢杖狀如鐵蒺䔧要路水中置之以刺人馬又曰陷馬坑坑長五尺闊一尺深三尺坑中埋鹿角槍竹籤其坑十字相交狀如鉤鏁以覆芻草葦木加之土種草實令生苗蒙覆其上軍城營壘要路皆設之衛公兵法曰坑如亞字相連以草及細塵覆其上又曰拒馬槍以木徑一尺長短隨事十字鑿孔從撗安槍一作檢長一丈銳其端可以塞城門要路巷人馬不得奔馳又曰木柵為敵所逼不及築城壘或因山河險勢多石少土不任版堞乃建立木柵方圓高下隨事深埋木根重複彌縫其闕內重加短木為閣道柱外重長出四尺為女墻皆泥塗之內七尺又立閣道內柱上布板木為棧立欄竿行於柵上懸門擁墻壕壍拒馬防守一如城壘法太白陰經曰蜀钁鐵塹鏨蜀钁短柄钁也鐵鏨鑿井鏨城也旝許慎說文曰旝建大木置石其上發為機以拒敵也從方會聲一云從衣會聲左傳曰周桓王伐鄭鄭為三拒命二拒曰旝動而鼓杜預注曰旝旗也執以為號令魏武本紀曰上與袁紹軍於官度賊射營中行者皆被甲眾皆恐上令傳言旝動而鼓說文曰旝發石車也乃造發石車擊紹櫓一日盡壞紹眾號之礕礰車沈懷文宋侍中趙倫之碑曰君戮力以致誠吐規以會機一鼓則寇騎雲徹旝動則敵車霧消鹿角袁曄漢獻帝春秋曰楊州刺史劉馥上言荊州牧劉表與會稽太守孫權謀襲京城遂壍許設鹿角砦王沈魏書曰李通拜汝南太守劉備與周瑜圍曹仁於江陵與諸將擊之通親下馬入圍拔鹿角勇冠諸將軍魚豢魏略曰夏侯霸字仲權為偏將軍大和中在長安及子午之役霸占為前鋒蜀人望知其是霸也指下兵攻之霸手戰鹿角間賴救然後解魏志曰徐晃討關羽於樊羽自將步騎五千出戰晃擊之退走遂追與俱入圍破之或自投沔水死魏太祖令曰賊為塹鹿角十里將軍致戰全勝遂陷賊圍將軍之功踰孫武穰苴虞溥江表傳曰曹公出濡須甘寧拔曹公鹿角逾壘入斬數十人王隱晉書曰馬隆為武威太守之郡作八陣圖地廣則鹿角車營進攻則木屋抱輪並戰並前虜弗能逼干寶晉紀曰曹爽留車駕宿伊水南伐木為鹿角發屯田兵數千人以為衛習鑿齒漢晉陽秋曰曹芳謁曹叡墓於大石山曹爽兄弟皆從於是司馬懿閉四城遂與太尉蔣濟俱屯洛水南浮橋奏罷爽兄弟不知所為芳還宿伊水南發屯田數千人樹鹿角為營晉惠帝起居注曰王浚乘勝追石超軍於斥丘超持重不與戰以鹿角為營一云以鹿角步安立營晉起居注曰義熙六年築壘起城于祖浦石頭城施鹿角以禦廬循司馬彪戰略曰遼東太守公孫淵反明帝召太尉司馬公討之軍到襄平公圍之北面東面有圍不合連車置水中積石鎮其上以鹿角塞之魏武帝表曰臣前遣討河內獲嘉諸屯獲生口辭云河內有一神人宋金生令諸屯皆云鹿角不須守吾使狗為汝守不從其言者即夜聞有軍兵聲明日視屯下但見虎跡臣輒部武猛都尉呂納將兵掩捉得生口輒行軍法諸葛亮教曰前到武都一日鹿角壞刀斧千餘枚賴賊已走若未走無所復用晉宣帝教曰今日當將作四千人東為三軍作營壍壘又當將斧三百枚破樹木作鹿角塞諸郵漏處諸葛亮軍令曰敵以來進持鹿角兵悉卻在連衝後敵已附鹿角裏兵但得進踞以矛戟刺之不得起住起住妨弩魏武軍策令曰夏侯淵今月賊燒都鹿角鹿角去本營十五里淵將四百兵行鹿角因使士捕之賊山上望見從谷中卒出淵使兵與鬥賊遂繞出其後兵退而淵未至甚可傷淵本非能用兵也軍中呼為白地將軍為督帥尚不當親戰况補鹿角乎王曠與楊州論討陳敏計曰賊今下屯固橫江又云復據烏江皆皆壍壘彭排鹿角步安嚴峻以襲歷陽諸軍辛昞洛戍時與桓郎牋曰桓振武今下官將千二百人奄襲營值天洪雨器仗沾濕壍廣深丈餘鹿角五重樓櫓嚴設自四更三唱攻逼至小食時不剋箛槍張揖廣雅曰𥳛謂之箛槍箛音孤服虔通俗文曰剡葦傷盜謂之槍何承天纂文曰𥳛音就箛槍也謝靈運自理表曰星言奔馳歸骨陛下及經山陰方衛彰赫彭排馬槍斷截衢巷宋起居注曰泰始二年有司奏賊帥劉胡等從南城蘭道領馬步萬餘人樹排槍陌山從東五道直來攻營杜預奏秦州軍事曰臣嘗聞邊人說虜專以騎為寇穿壍不如作馬塪馬塪法坑方三尺錯平穿之虜騎非下馬平治則終不得入又其外蹊要路亦可隨作塢施槍著塪中訖薄覆其上如此則虜當築地而行不敢輒往來也蔡謨與何驃騎書曰公失櫓上人吾亦具之矣在深草中立櫓無故以櫓自標令賊見之而自不得見賊賊不病癡何故不來取邪今令數百步內皆露見布竹箛如蝟毛賊不能飛何得卒至邪弋張揖埤蒼曰拱大弋也許慎說文曰擑弋也麋弋也太公六韜曰委環鐵弋長三丈千三百左傳曰齊人戰獲臧堅使宿沙衛喭之曰無死堅曰使刑臣禮於士以弋抉其傷而死司馬彪戰略曰遼東太守公孫淵反太尉司馬公討之軍到襄平去城百步穿重壍堅連柵安諸營立樓櫓其近水沙地不得作圍壍而車輪以大弋㧻穿中又堅輪障其前韋昭吳書曰賀齊討賊陳僕於林歷山山四面壁立不可攻齊乃陰作鐵弋於賊不備處以弋拓山為道夜潛上破賊
