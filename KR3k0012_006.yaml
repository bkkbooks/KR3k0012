body:
  text: 天部五星上釋名曰星散也列位布散也宿宿也星各止宿其所也説文曰萬物之精上為列星三五曆記曰星者元氣之英水之精也易曰日中見斗幽不明也又曰在天成象在地成形象況日月星辰形況山川草木書曰堯乃命羲和欽若昊天曆象日月星辰敬授人時又曰日中星鳥以殷仲春又曰庶民惟星星有好風星有好雨星民象故衆民惟若星箕星好風畢星好雨亦民所好也月之從星則以風雨月經於箕則多風離於畢則多雨政教失常以從民欲亦所以亂也詩曰晥彼牽牛不以服箱注晥明星貌河鼓謂之牽牛也又曰維南有箕不可以簸揚維北有斗不可以挹酒漿又曰東有啓明西有長庚日旦出謂明星為啓明日既入謂明星為長庚庚續也又曰嘒彼小星三五在東三心也五噣也嘒微明貌噣音晝柳也又曰子興視夜明星有爛又曰三星在戶又曰月離于畢俾滂沱矣又曰定之方中作于楚宮定營室星也又曰維南有箕載翕其舌維北有斗西柄之揭又曰昏以為期明星煌煌禮曰八月中氣是月也命有司享壽星於南郊又曰十二月是月也日窮于次月窮于紀星回于天又曰幽禜策祭星也又曰天秉陽垂日星又曰宿離不忒無失經紀注二十八宿為經七曜為紀周禮曰保章氏掌天星以志星辰日月之變動以觀天下之遷辨其吉凶以星土辨九州之地所封封域皆有分星以觀祅祥左傳曰魯莊公七年夏四月辛卯夜恆星不見夜中星隕如雨與雨偕也又曰魯僖公五年晉侯復假道於虞以伐虢問於卜偃曰吾其濟乎對曰克之童謠云丙子之晨龍尾伏辰杜預曰龍尾是尾星也又曰十六年春隕石于宋五隕星也又曰魯襄公二十八年春無冰梓慎曰今茲宋鄭其飢乎歲在星紀星紀在田而淫於玄枵玄枵在子虛危之次星紀斗牛之次以有時災陰不堪陽蛇乘龍龍歲星木也木為青龍蛇為玄武龍失次也龍宋鄭之星也宋鄭必飢玄枵虛中也枵耗名也土虛而民耗不飢何為又曰昔高辛氏有二子長曰閼伯季曰實沉居于曠林不相能也日尋干戈以相征討后帝不臧后帝堯也臧善遷閼伯于啇丘主辰啇丘宋地也主祀辰星辰大火也啇人是因故辰為啇星啇人湯先祖封啇丘因閼伯故國祀辰星遷實沉于大夏主參大夏今晉陽縣也唐人是因故參為晉星又曰火中寒暑乃退心以季夏昏中而暑退季冬旦中而寒退又曰昭三十二年吳伐越史墨曰不及四十年越其有吳乎越得歲而吳伐之必受其凶穀梁傳曰列星曰恆星亦曰經星恆經皆常也爾雅曰星紀斗牽牛也玄枵虛也又曰祭星曰布布散食於地上又曰西陸昴也郭璞曰昴西方之宿別名旄頭論語曰為政以德譬如北辰居其所而衆星拱之易是類謀曰五星合狼張晝視無日光虹霓煌煌太山失金雞西嶽亡玉羊太山失金雞箕星亡也箕者風也風動雞鳴今箕候亡故雞亦亡也西嶽亡玉羊者羊星在未未為羊雞失羊亡臣縱恣萬人愁不祥京房對災異曰人君不行仁恩破胎傷孕春殺無辜則歲星失度尚書考靈耀曰歲星木精熒惑火精鎮星土精大白金精辰星水精也又曰歲星得度五穀滋熒惑順行甘雨時鎮星得度地無災太白出入當五穀成熟人民昌又曰心火星天王也其前星太子後星庶子也詩紀曆樞曰箕為天口主出氣尾為逃臣賢者叛十二諸侯列於庭元命苞曰五諸侯此云十二則兼他星為數也禮稽命圖曰作樂制禮得天心則景星見也禮斗威儀曰鎮星黃時則祥風至春秋説題辭曰星之為言精也榮也陽之精也陽精為日日分為星故其字日生為星春秋元命苞曰直弧北有一大星為老人星見則治平主壽亡則君危主亡常以秋分候之又曰啇紂之時五星聚於房房者蒼神之精周據而興又曰玉衡北兩星為玉繩玉之為言溝刻也瑕而不掩折而不傷宋均注曰繩能直物故名玉繩溝謂作器又曰心三星五度有天子明堂布政之宮又曰尾九星箕四星為後宮之場列為南宮其庭太微又曰蟾蜍陰精流生織女立地侯宋均注曰地侯鎮星別名也又曰三台星色齊君臣和不齊大乖春秋合誠圖曰天文地理各有所主北斗有七星天子有七政也又曰軒轅主雷雨之神旁有一星玄戈名曰貴人旁側郎位主宿衛尚書春秋運斗樞曰北斗七星第一天樞第二璇第三機第四權第五玉衡第六開陽第七搖光廣雅又云樞為雍州璇為冀州機為徐楊州衡為荊州機為青兗州開陽為梁州搖光為豫州第一至第四為魁第五至第七為扚合為斗居陰布陽故稱北又曰五帝所行同道異位皆循斗樞機衡之分遵七政之紀九星之法又曰天樞得則景星見衡星得則麒麟生萬人壽春秋佐助期曰蕭何稟昴星而生春秋後傳曰魏人唐睢對秦王曰專諸之刺王僚彗星籠月色春秋文耀鉤曰老人星見則主安不見則兵起論語讖曰仲尼曰吾聞堯率舜等遊首山觀河渚有五老遊河渚一老曰河圖將來告帝期二老曰河圖將來告帝謀三老曰河圖將來告帝書四老曰河圖將來告帝圖五老曰河圖將來告帝符龍銜玉苞金泥玉撿封盛書五老飛為流星上入昴孝經援神契曰歲星守心則年穀豐廣雅曰太白謂之長庚或謂之太囂又曰熒惑謂之罰星或謂之執法又曰天宮謂之參旗紫宮參伐謂之大辰太微謂之明堂史記天官書曰星者金之散氣又曰漢中四星曰天駟旁一星王良王良策馬車騎滿野又曰星墮至地則石也河濟之間時有墜星又曰畢為罕車為邊兵主戈獵其大星傍小星為附耳附耳動有讒臣在側又曰四鎮星所出四隅若月始出也又曰咸池曰天五潢五帝車舍又曰中端門門左右掖門門內六星諸侯其內五星五帝坐又曰漢武帝以正月上辛祠太一甘泉夜祠到明匆有流星至於祠壇上使童男女七十人俱歌又曰魁下六星兩兩相比者曰三能蘇林曰能音台又曰東宮蒼龍房心心為明堂為天府又曰國皇星大而赤狀類南極徐廣注曰南極老人星也又曰五星皆大其事亦大皆小其事亦小早出為盈盈者為客晚出為縮縮者為主同舍為合相陵為鬥漢書曰皇甫嵩為太尉以流星免官又曰武帝時中星盡搖占曰民勞也後征伐四夷又曰北斗七星所謂璇璣玉衡以齊七政杓攜龍角孟康曰杓斗杓也龍角東方宿也攜連也又曰營室為清廟亦曰離宮又曰河鼓太星上將其北織女織女天女孫也又曰高帝七年月暈圍參畢七重占曰畢昴間天街也街北胡也街南中國也後有平成之圍又曰太微之十二星東相西將又曰戴王六星曰文昌宮一曰上將二曰次將三曰貴相四曰司命五曰司祿六曰司災又曰危東六星兩兩而比曰司寇又曰古人有言曰天下太平五星循度又曰革命創制三章是紀應天順人五星同軓又郊祀志曰漢祖詔御史令天下立靈星祠常歲時祠以牛又曰天文志曰金木水火土五星天之五佐為經緯伏見有時歲星東方春於人五常仁也五事貌也仁虧失逆春令傷木氣罰見歲星熒惑南方夏禮也視也禮也視失逆夏令傷火氣罰見熒惑太白西方秋義也言也義虧失逆秋令傷金氣罰見太白太白經天孟康注曰謂出東入西出西入東也太白陰星出東當伏西過午為經天晉灼曰星盡見午為經天天下兵革民更主是謂亂紀人民流亡晝見與日爭明強國弱小國強女主昌辰星北方冬智也聽出智虧聽失逆冬令傷水氣罰見辰星鎮星中央土主季夏信也思心也仁義禮智以信為主貌言視聽以心為正四星皆失鎮星乃為之動又曰凡五星色皆白為喪為兵為旱青為憂為水黑為疾多死黃吉五星同色天下偃兵百姓安寧歌舞以行不見災疾五穀蕃昌又曰天星皆有州圖分野角亢氐房心豫州之分尾箕幽州之分牽牛婺女楊州之分虛危青州之分營室東壁并州之分胃徐州之分畢昴冀州之分觜參益州之分東井輿鬼雍州之分柳七星張三河之分翼軫荊州之分折木之津燕之分大火宋之分壽星鄭之分鶉尾楚之分鶉火周之分鶉首秦之分分實沉魏之分大梁趙之分降婁魯之分訾即移反娵子于反衛之分玄枵齊之分星紀吳之分太史掌之以觀祅祥又曰秦地於天官東井輿鬼之分野周地柳七星張之分野韓地角亢氐之分野趙地昴畢之分野燕地箕之分野齊地虛危之分野魯地奎之分野宋地房心之分野衛地營室東壁之分野楚地翼軫之分野吳地斗牛之分野漢武故事曰西王母使者至東方朔死上問使者對曰朔是木帝精為歲星下遊人中以觀天下非陛下臣也漢書音義曰瑞星曰景星亦日德星妖星曰孛星彗星長星亦曰攙搶絶迹而去曰飛星光迹相連曰流星亦曰奔星星光曰芒後漢書曰嚴光字子陵與光武為友後光武登阼忘之光怨帝是時太史云天上有客星恨帝帝曰豈非朕故人嚴子陵乎遽命徵之夜與子陵共臥光以腳加帝腹太史奏客星侵御座子陵縮腳客星尋退竟不仕又曰李固對詔陛下有尚書猶天之有北斗北斗天之喉舌尚書陛下之喉舌斟酌元氣運乎四時出納王命所為制氣之臣也又曰和帝分遣使者二人各至州郡觀採風謠二人當到益州投候館吏李郃舍郃問曰二君發京師時知朝廷遣二使耶問何以知之郃指星云前有二星向益州分野謝承後漢書曰吳郡周敞師事京房房為石顯所譖繫獄謂敞曰吾死後四十日客星必入天市即吾無辜之驗也房死後果如房言東觀漢書記曰光武破聖公與伯叔書曰交鋒之日神星晝見太白清明蜀志曰漢安二十五年劉豹向舉上言於先主曰乃年太白熒惑鎮從歲漢初興五星聚歲星主義漢位在西義之上方故漢法常以歲星候人主當有聖主起於此以致中興頃者熒惑復追歲見在胃昴為天維經曰帝星處之衆邪消亡於是先主即位續晉陽秋曰桓玄庶母馬氏本袁真之妓也與同列薛氏郭氏夏夜同出月下有銅甕水在其側見一流星墮甕甕中驚喜共視見星如二寸火珠於水底冏然明淨乃相謂曰此吉祥也誰當應之於是薛郭更以瓢接取并不得馬最後取星正入瓢中便飲之既而若有感焉俄而懷玄玄雖纂位不終而數年之中榮貴極矣
