body:
  text: 兵部三十五征伐中史記曰秦繆公令內史廖以女樂二八遺戎王繆公又數使人間要由余遂去降秦秦繆公以客禮禮之問伐戎之利又曰趙四戰之國其人習兵不可伐也又曰魯君問柳下惠伐齊下惠歸而有憂色曰吾聞伐國不問仁人此言何至於我哉又曰軒轅之時神農氏世衰諸侯相侵伐暴虐百姓而神農氏弗能正於是轅轅乃集用干戈以征不享諸侯或來賓從而𧈪尤最為暴莫能伐又曰賜弓矢斧鉞使得征伐為西伯又曰西伯既卒周武王東伐至孟津諸侯叛殷會周者八百諸侯皆曰紂可伐又曰武王為文王木主載車中武王自稱太子發言奉文王以伐不敢自專又曰武王偏告諸侯曰殷有重罰不可不畢罰徐廣注云伐一作滅漢書郊祀志曰昔齊桓公欲封禪謂管仲曰寡人北伐山戎過孤竹西伐束馬縣車上卑耳之山南伐召陵登熊耳山以望江漢兵車之會三而乘車之會六遂九合諸侯一匡天下昔三代受命亦何以異乎又李廣利傳曰天子為萬里而伐不録其過又胸奴傳曰東胡強聞冒頓殺父自立乃使使謂冒頓欲得單于閼氏冒頓問左右左右皆怒曰東胡無道乃求閼氏請擊之冒頓曰奈何與人憐愛一女子乎遂取所愛閼氏與之東胡愈驕冒頓遂東集襲擊東胡東胡初輕冒頓不為備及冒頓以兵至大破滅東胡王後漢書曰帝以關中未定而鄧禹久不進兵下勑曰司徒堯也亡賊桀也長安吏人遑遑無所依歸宜以時進討鎮慰西京繫百姓之心禹猶執前意乃分遣將軍別攻上郡諸縣更徵兵引穀歸至大要大要縣名魏志曰太祖父嵩去官後還譙以董卓之亂避難琅邪為陶謙所害故太祖志在復讎東伐又曰景元四年鄧艾伐蜀自陰平行無人之地七百餘里鑿山通道作橋閣山高谷深至有艱嶮艾以旃自裹推轉而下將士皆攀木緣崖魚貫而進王隱晉書曰太康元年龍驤將軍王濬等攻建平丹陽城剋之東擊西陵以下盡拔其城虜其將帥於是上下諸軍同時並進吳人降者以萬計吳丞相張悌及護軍孫震與楊州刺史周浚等戰于板橋破之臨陳斬悌震首濬遂泛舟東下所歷皆平軍至秣陵晧面縛輿舁襯將其太子詣濬降乃收其圖籍皆因吳所置除其虐政示以簡易百姓大悅乃赦天下改元為太康天下大酺五日晉書曰宣王破張魯請魏武便討劉備魏武曰人若無足既得隴復欲得蜀也又曰王羲之與會稽王箋陳殷浩不宜北伐并論時事又宣紀曰鎮東大將軍諸葛誕殺楊州刺史樂綝以淮南作亂議者請速伐之帝曰吾當與四方同力全勝制之乃表曰昔黥布叛逆漢祖親征隗囂違戾光武西伐皆所以奮楊赫斯震曜威武也又天文志曰參十星一曰參伐主斬刈又為天獄主殺又馮紞傳曰初謀伐吳紞與賈充荀勗同共苦諫不可吳平紞內懷慚懼又載記曰慕容垂議征長子諸將咸諫以慕容永未有舋連歲征役士卒疲怠請俟他年垂將從之及聞慕容德之策笑曰吾計決矣不復留賊以纍子孫也乃發步騎七萬遣其丹陽王慕容瓚龍驤張崇攻永弟支于晉陽北史曰慕容紹宗討侯景於渦陽時景軍甚盛初聞韓軌往討之曰噉豬腸小兒聞高嶽往曰此嶽精凡人耳諸將被輕及聞紹宗至扣案曰誰教鮮卑小兒解遣紹宗來若然高王未死耶及與景戰諸將頻敗無肯先者紹宗麾兵徑進諸將從之因大捷三國典略曰周伐梁于謹大軍次于樊鄧嶽陽王率軍會之傳檄于梁曰告梁文武衆官夫作國者罔弗以禮信為本惟爾今主往遭侯景逆亂之始實結我國家以鄰援今揔背德黨賊高洋引厥使人置之堂宇傲我王命擾我邊人我皇帝襲天之意弗敢以寧分命衆軍奉楊廟略凡衆十萬直指江陵丁卯梁主停講內外誡嚴是朝昏霧巳時方歇梁主親戎百官並甲胄從於禊飲堂間公私馬仗是日大風拔木王琛既至石梵未見我軍乃馳書報黃羅漢曰吾至梵境上怗然前曰所言皆兒戲耳羅漢入啓梁主疑之庚午續講百官以戎服聽後周書曰建德五年冬十月帝謂群臣曰朕去歲屬有疹疾遂不得克平逋寇前賊入境備見敵情觀彼行師殆同兒戲又聞其朝政昏亂政由群小百姓嗷然朝不謀夕天與不取恐貽後悔若復同往年出軍河外直為撫背末扼其喉然晉州本高歡所起之地鎮攝要重今往攻之彼必來援吾嚴軍以待擊之必克然後乘破竹之勢鼓行而東足以窮其窟穴混同文軌諸將多不願行帝曰機者事之微不可失矣若有沮吾軍者朕當以軍法裁之巳酉帝揔戎東伐以越王盛為右一軍揔管杞國公亮為右二軍揔管隨國公楊堅為右三軍揔管譙王儉為左一軍總管大將軍竇恭為左二軍總管齊王憲陳王純為前軍又曰保定中命宇文護統衆伐齊於是徵二十四軍及左右廂散隸及秦隴巴蜀之兵諸蕃國之衆二十萬人十月帝於廟廷授護斧鉞出軍至潼關乃遣柱國尉遲逈率精兵十萬為前鋒大將軍權景宣攻克豫州尋以洛陽圍解亦引軍退楊檦於軹關戰護於是班師以無功與諸將稽首請罪帝弗之責也又曰建德四年秋七月武帝召大將軍以上於文德殿帝曰太祖神武膺運創造王基兵威所臨有征無戰唯彼僞齊猶懷跋扈雖復戎車屢駕而大勳未集朕以寡昧纂承鴻緒往以政出權宰無所措懷自親覽萬機便圖東討惡衣菲食繕甲治兵數年已來戰備稍足而僞主昏虐恣行無道伐暴除亂斯實其時今欲數道出兵水陸兼進北拒太行之路東扼黎陽之險若攻拔河陰兗豫則馳檄可定然後養鋭享士以待其至但得一戰則破之必矣王公以為何如群臣咸稱善丁丑詔曰高氏因時放命據有汾漳檀假名器歷年永久朕以亭毒為心遵養時晦遂敦聘好務息黎元而彼懷惡不悛尋事侵軼背言負信竊邑藏姦往者軍下宜陽舋由彼始兵興汾曲事非我先此獲俘囚禮送相繼彼所拘執曾無一反加以淫刑妄逞毒賦繁興齊魯軫殄悴之哀幽并企來蘇之望既禍盈惡稔衆叛親離不可一戎何以大定今白藏在辰涼風戒節厲兵詰暴時事惟宜朕當親御六師龔行天罰庶憑祖宗之靈資將士之力風馳九有電掃八紘可分命衆軍指期進發以柱國陳王純為前一軍總管滎陽公司馬消難為前二軍總管鄭國公達奚震為前三軍總管越王盛為後一軍總管周昌公侯莫陳瓊為後二軍總管趙王招為後三軍總管齊王憲率衆二萬趣黎陽隨國公楊堅廣寧侯薛回舟師三萬自渭入河柱國梁國公侯莫陳苪率衆一萬守太行道申國公李穆衆三萬守河陽道常山公于翼衆二萬出陳汝壬午上親率六軍衆六萬直指河陰八月癸卯入于齊境禁伐樹踐苗稼犯者以軍法從事隋書曰崔仲方為虢州刺史上書論取陳之策曰臣謹案晉太康元年歲在庚子晉武平吳至今開皇六年歲次景午合三百七載春秋寶乾圖云王者三百年一蠲法合三百之期可謂備矣陳氏草竊起於景子至今景午為衝陰陽之忌昔史趙有言曰陳顓頊之族為水故歲在鶉火以滅又云周武王克商封胡公滿於陳至魯昭九年陳災裨竈曰歲五及鶉火而後陳亡楚克之楚祝融之後也為火正故復滅陳陳承舜後舜承顓頊雖太歲左行歲星又轉鶉火之歲陳族再亡戊午之年媯虞運盡語迹雖殊考事無別皇朝五運相承感火德而王國號為隨與楚同分楚是火正午為鶉火未為鶉首申為實沉酉為大梁既當周秦晉趙之分若當此分發兵得歲之助以今量古滅不疑也臣謂午未申酉並是數極蓋聞天時不如地利地利不如人和況主聖臣良兵強國富動植回心人神叶契陳既主昏於上民讟於下險無百二之固衆非九國之師夏癸殷辛尚不能立獨此島夷而稽天討伏度朝廷自有宏謀但芻蕘所見冀申營爛爝今唯須武昌已下蘄和滁方吳海等州更怗精兵密營渡計益信襄荊基郢等州速造舟多張勢為水戰之具蜀漢二江是其上流水路要衝必爭之所賊雖於流頭荊門延洲公安巴陵隱機夏首蘄口盆城置船然終聚漢口峽口以水戰大決若賊必以上流有軍令精兵赴援者下流諸將即須擇便橫渡如擁衆自衛上江水軍鼓行以前雖恃九江五湖之險非德無以為固徒有三吳百越之兵無恩不能自立上覽而大悅轉基州刺史徵入朝仲方因面陳經略上善之賜以御袍袴并雜綵五百假進位開府而遣之及大舉伐陳以仲方為行軍總管率兵與秦會又曰開皇九年大舉伐陳若賀若弼為行軍揔管將渡江酹酒而呪曰弼親承廟略遠振國威伐罪吊民除凶剪暴上天長江鑒其若此如使福善禍淫大軍利涉如事有乖違得葬江魚腹中且不恨又曰李德林自隋有天下每贊平陳之計八年車駕幸同州德林以疾不從勑書追之書後御筆注云伐陳事意宜自隋也時高潁因使入京上語頴曰德林若患未堪行宜自至宅取其方略高祖以之付晉王後駕還在塗中高祖以馬鞭南指云待平陳訖會以七寶裝嚴公使自山東無及之者唐書曰武德初秦王東討王世充連年未下宿師于野高祖以兵久在外議欲班師中書令封德彝奏曰世充得地雖多而羇縻相屬其所用命者唯洛陽一城而已計盡力窮破在旦夕今若還兵賊勢必振更相連結後必難圖未若乘其已衰破之必矣高祖從其議及平世充高祖顧謂侍臣曰朕初發兵東討衆議多有不同唯秦王請行德彝贊成此計張華叶同晉武亦無以加之又曰高崇文伐蜀領兵馬取鳳翔邪谷路李元奕領兵馬取駱谷路同赴梓州應接當秦惠王時用司馬錯之策以伐蜀漢光武使吳漢伐公孫述魏司馬文王使鄧艾伐劉禪晉穆帝使桓溫伐李子仁宋武帝使朱齡石伐譙縱梁武帝使鄧元起伐劉季連周太祖使尉遲逈平蕭紀隋文帝使梁睿平王謙憲宗命高崇文平劉闢自秦至元和九度伐蜀四為水軍泝江而上唯秦與鄧艾尉遲逈梁睿及崇文五在斜谷駱谷出師南討不廷古司馬兵法曰王霸之所以治諸侯者以土地刑諸侯列相也相諸侯優劣地而封之以德受土廣德受土小也以正命平諸侯王者以道德善政教訓諸侯平均之以禮信結諸侯謙恭愛惠接待諸侯官命誠信以治民心以材力說諸侯材能也力者任重理煩能堪物理事位高力大故諸侯悅來各修其職任以謀人維諸侯維持也諸侯遠方來不奉制令驕佚自專故立牧伯維持督御之同患同利以合諸侯明約有功賞之奢淫不從罰之所以合諸侯也比小大以和諸侯比次也使小國事大國不失尊卑之序以協諸侯也會之所以發禁三者恐禁命不行以亂風化故發九伐三禁以申勑之凌弱犯寡則沮之侮弱侵寡則四面削其地賊傷人則伐之暴內簡外則壃之言諸侯內外典臣下無禮而暴虐之外輕慢小人不恤諴禁則置之空壃無人之地野荒民散則削之負固不伏則侵之賊殺其親則正之悖逆人倫則攻殺也放殺其君則殘之盡殘滅其首惡輩類也犯命凌正則杜之侮王者法則土塞不命與鄰國交通外內亂禽獸行則滅之諸侯淫亂失人倫內外不別與禽獸同行不可以示百姓則誅滅盡矣孫子曰夫伐大國則其兵衆不得聚威加於敵家則交不得合皆失之矣是故不事天下之交不養天下之權霸主者不結威天下諸侯之交權交者也伸己之私絶天下之交奪天下之權己威得伸己私也威加於敵家故其國可拔而其城可隳也無法之懸無功之令言軍法令不應預施懸也司馬法曰見敵作誓瞻功作賞此之謂也犯三軍之衆若使一人犯者用也言明罰雖用衆若使一人也又曰安能動之攻其所愛故我欲戰敵雖高壘深溝不得不與我戰者攻其所必救也絶糧道守歸路攻其君主上兵伐謀敵始有設謀伐之易其次伐交不令合春秋說題辭曰伐者涉入國內行威有所斬壞伐之為言敗也白虎通曰王者受命質家先伐文家先改正朔何質家言天命已使民誅無道故先伐文家天命已成為王者故先改正朔也文者先其文質者先其質也故論語曰豫小子履改昭告于皇天上帝此謂湯伐桀告天也詩云命此文王言誅伐也禮記曰湯放桀武王伐紂時也尚書曰今豫惟恭行天之罰此言開自出伐有扈也王制曰賜之弓矢乃得專征伐犯王誅者也大夫將兵出必不御者欲盛其威使士卒一意繫心故但聞將軍令不聞君命也明進退在大夫也又曰誅者何謂也誅猶責也誅其人責其罪極其過惡春秋曰楚子虔誘蔡侯班弒之于申傳曰誅君之子不立討者何謂也討猶除也欲言臣當掃除君之賊也春秋曰衛侯殺州吁于濮傳曰其稱人何討賊之辭也伐者何謂伐于也言欲伐擊之也尚書敘曰武王伐紂征者何謂也征猶正也欲言其正輕重縱辭誕以示東征誅祿甫也戰者何謂也尚書大傳曰戰者憚驚之也又曰諸侯之義非天子之命不得動衆起兵誅不義者所以強幹弱枝尊天子卑諸侯也論語曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出也
