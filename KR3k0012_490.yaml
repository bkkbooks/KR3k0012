body:
  text: 人事部一百三十別離毛詩曰出宿于濟飲餞于禰又曰申伯言邁王餞于郿又曰挑兮撻兮在城闕兮一日不見如三月兮又曰燕燕于飛差池其羽之子于歸遠送于野瞻望弗及泣涕如雨又曰送子涉淇至于頓丘又曰我送舅氏曰至渭陽又曰出宿于浦飲餞于禰又曰顯父餞之清酒百壺又曰有女仳離慨其歎矣禮記曰嫁女之家三夜不息燭思相離也左傳昭四年鄭六卿餞宣子於郊宣子曰二三子請賦詩起亦以知鄭志子齹賦野有蔓草子產賦羔裘子太叔賦褰裳子游賦風雨子旗賦有女同車子柳賦籜兮宣子喜曰二三子以命貺起賦不出鄭志二三君子皆數世之主也家語曰孔子去周而老子送之曰吾聞富貴送人以金仁者送人以言吾雖不能富貴而竊仁者之號請送子以言凡當世之聰明深察而近於死者好議人者也博辨宏大而危其身者好發人之惡者也孔子曰敬奉教又曰孔子在衛晨興顏淵侍有哭者甚哀回曰此哭非獨哀死又悲生離也孔子曰何以知之對曰回聞恒山之鳥生四子焉羽翼既成將分離悲鳴以相送哀有類於此矣史記曰魯人或惡吳起曰起之為人猜忍人也其少時家累千金將仕不遂遂破其家鄉黨笑之起殺其謗己者三十餘人而東出衛郭門外與其母訣齧臂而盟曰起不為卿相不復入衛又曰貳師將軍李廣利將兵擊匈奴丞相劉屈氂為祖道送渭橋與廣利別又曰踈廣踈父子並為皇太子師傅朝廷以為榮在位歲久廣謂受曰吾聞知足不辱知止不殆功遂身退天之道也今仕官至二千石宦成名立如此不去懼有後悔即日父子俱稱病乞骸骨上以其年篤老皆許之加賜黃金二十斤皇太子賜以五十斤公卿大夫故人邑子為設祖道供帳東都門外蘇林注曰長安東郭門也送者車數百兩辭訣而去及道路觀者皆曰賢哉二大夫或歎息為之下泣又曰肅宗遣諸王歸國帝特留東平王蒼賜以秘書列仙圖道術秘方至八月飲酎畢有司復奏遣蒼乃許之手詔賜蒼曰骨肉天性誠不以遠近親踈然數見顏色情重昔時中心戀戀惻然不能言於是車駕祖送流涕而訣復賜乘輿服御珍寶與馬錢布以億萬計又曰赤眉兵盛乃拜鄧禹前將軍持節西征自選可與俱者於是凡將六將軍吏二萬人禹辭訣上自從輕騎數百送至野鄧禹不能定赤眉乃遣馮異代禹討之車駕送至河南賜以乘輿七尺劍勑異曰諸將非不能健鬭然好虜掠卿本能御吏念自修飭無為郡縣所苦異頓首受命又曰東平王蒼朝京師月餘還國帝臨送歸宮悽然懷思乃詔遣使詣國辭別之後獨坐不樂因就車歸伏軾而吟誦及採菽以增歎息又曰第五倫年少諸家惟令詣郡尹鮮于裒見而異之署為吏後裒坐事徵臨去握倫臂訣曰恨相知晚又曰申徒蟠為太尉黃瓊所辟不就及瓊卒歸葬江東四方名豪會帳下六七千人談論莫有及蟠者唯南郡一生與相酬對既別執蟠手曰君非聘則徵如是相見於上京矣蟠勃然作色曰始吾以子為可與言何乃相教榮貴之徒耶因振手而去魏志曰夏侯惇薨以曹休為鎮南將軍假節都督諸軍事車駕臨送下輿執手而別吳志曰魯肅代周瑜過呂蒙酒酣蒙問肅曰君受重任與關羽為鄰將何計略以備不虞肅應曰臨時施宜蒙因為畫五策肅於是越席就之拊其背曰呂子明吾不知卿才略所及至於此也遂拜蒙母結友而別又曰劉繇亡於豫章孫策命太史慈往撫安之左右皆曰慈必北去不還策曰子義舍我尚復與誰餞送昌門把腕別曰何時能還荅曰不過六十日果如期而反晉中興書曰王澄嘗之荊州送者傾邑所別處樹上有鵲巢澄便脫衣著犢鼻上樹探鵲鷇弄之傍若無人晉中興書曰衛玠兄璪時為散騎侍郎內侍懷帝玠以天下將亂移家南行母曰我不能捨仲寶而去也玠啟喻深至為門戶大計母涕泣從之臨別玠謂璪曰在三之義人之所重今可謂致身命之日兄其勉之乃扶將老母轉至豫章而洛城失守璪沒焉沈約宋書曰王弘字方平家貧而性好山水求為烏傷令尋以病歸桓謙以為衛軍參軍時殷仲文還姑熟祖送傾朝謙要弘之同行荅曰凡祖離送別必在有情下官與殷風馬不接無緣陪從謙貴其言又曰張敷音儀詳緩與人別執手曰念相聞後魏書曰南安王禎復封南安王後為鎮北大將軍相州刺史帝餞禎華林都亭詔左右賦詩不能者並可聽射當使武士彎弓文人下筆帝送禎下階流涕而別續齊諧記曰京兆田真三人分財堂前有紫荊花葉茂異共議破為三分明截之爾夕樹即枯死真見之驚謂弟曰花本同株當分析枯悴況人兄弟孔懷而少離異是不如樹也兄弟相感更合吳錄曰朱桓還屯濡須權祖之桓奉觴曰臣當遠去願一捋陛下鬚無所復恨權憑几前席桓進持鬚日臣今日真可謂捋虎鬚者權大笑吳越春秋曰越王勾踐伐吳將與大夫范蠡入臣於吳群臣皆送浙江大夫文種前為祝其辭曰皇天祐助先沉後揚禍為德根憂為福堂許邁別傳曰邁好養生遣妾歸家東遊採藥於桐廬山欲斷穀以山近人不得專一移入臨安自以無復反期乃改名遠遊書與婦別管輅別傳曰諸葛與輅別戒以二言卿性樂酒雖溫克然不可保寧當節卿相有水鏡之才所見者妙福如膏火不可不慎持節散才遊於雲漢之間不受富貴也輅言酒不可極才不可盡吾欲持酒以禮持才以愚何患之有耶穆天子傳曰天子觴西王母瑤池之上王母謠曰白雲在天山川間之荊府圖曰襄陽縣南陸道六里有林館是餞行送歸之所水經曰壽春縣故城東為長瀨津津之側有射堂北亭迎送之所江表傳曰孫權乘飛雲大舡與張昭秦松魯肅十餘人共送周瑜大宴會敘別昭等皆出權獨與劉備留語因言次嘆瑜曰公瑾文武籌略萬人之英顧其器量廣大恐不久為人臣耳李陵別傳曰陵與蘇武書曰男兒生不成名死必葬蠻夷中耳誰復能屈伸稽顙還向北闕使刀筆吏弄其文墨邪願足下勿復望陵嗟乎子卿知復何言相去萬里人絕路殊生為離別之人死為異域之鬼文士傳曰張翰到京師時齊王冏擅權翰謂同郡人顧榮曰天下紛紛未已夫有四海之名者求退難吾本山林間人無望於時去矣子善以明防前以智慮後榮捉其手愴然嘆曰吾亦思汝採南山蕨飲三江水耳翰遂稱疾徑歸府以翰輒去除吏名世說曰杜預屯荊州頓七里橋朝士悉祖之又曰阮籍嫂嘗歸家籍相見與別人或譏之曰禮豈為我輩設耶裴淵廣州記曰尉佗築臺以朔望升拜號為朝臺即岡傍江搆起華館以送陸賈因稱朝亭語林曰殷公北征朝士出送之軍容甚盛儀止可觀陳說經略攻取之宜眾皆謂必能平中原將別忽逞才自槃馬遂墮地士以是知其必敗又曰有人詣謝公別謝公流涕人了不悲既去左右曰向客殊自密雲謝公曰非徒密雲乃自旱雷呂氏春秋曰吳起行魏武侯自送之西河而與起辭武侯曰先生將何以治西河對曰以忠以信以仁以義武侯曰四者足矣郭子曰周叔治為晉陵謨子叔治光祿大夫西平貞侯顯弟周侯仲智送之周侯名顗字伯仁仲智名嵩次弟也叔治將泣涕不止仲智恚之曰困人及婦人別惟知啼便捨去周侯獨留與飲酒言語臨別流涕撫其背曰阿孥自愛孔叢子曰子高遊趙平原君客有鄒文李節者與相友善及將還魯諸故人訣既畢文節送行三宿臨別文節流涕交頤子高徒握手而已分背就路其徒問先生與彼二子善彼有戀戀之心而先生厲聲高揖無乃非親之謂乎高曰始吾謂此二子丈夫耳乃今知其婦人人生其有四方之志豈鹿豕哉而常群藂乎其徒曰若此二子泣非耶吾荅曰斯二子良人也有不忍之心其於斷必不足矣又曰竇皇后弟廣國曰姊去我西時與我訣於傳舍中沐我而去又曰成帝遣定陶王之國王辭去上與相對涕泣而訣琴操曰商陵牧子娶妻五年無子父兄將欲與改娶妻聞中夜驚起倚戶悲嘯牧子聞援琴鼓之痛恩愛永離歎別鶴以舒情故曰別鶴操古詩曰行行重行行與君生別離相去萬餘里各在天一涯道路阻且長會面安可期胡馬嘶北風越鳥巢南枝相去日已遠衣帶日已緩棄捐勿復道努力加飡飯李陵贈蘇武詩曰攜手上河梁遊子暮何之徘徊歧路間恨恨不能辭行人難久留客言長相思安知非日月弦望自有時弩力崇明德皓首以為期又曰仰視浮雲馳奄忽互相踰風波一失路各在天一涯又曰昔為鴛與鴦今為參與商又曰二鳧俱北飛一鳧獨南翔子當留斯土我獨歸故鄉蘇武贈李陵詩云黃鵠一遠別千里影徘徊古詩曰客從遠方來遺我一書劄上有長相思下言久離別置書懷袖中三歲字不滅江淹別賦曰黯然消魂者唯別而已矣楚辭序曰離別也騷愁也經徑也言己放逐離別中心愁思猶陳道徑以諷諫君又曰草木搖落而變衰憭栗兮若在遠行登山臨水送將歸又曰悲莫悲兮生別離
