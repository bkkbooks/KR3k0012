body:
  text: 服用部三屏風釋名曰屏風以屏障風也扆在後所依倚也周禮天官掌次曰王大旅上帝掌次設皇邸大旅上帝祭天於圓丘也鄭司農曰皇羽覆也玄謂後板屏風與梁羽象鳳皇色以為飾也禮記明堂位曰天子負斧扆南面而立鄭玄曰斧扆畫屏風又三禮圖曰扆縱廣八尺畫斧文今之屏風則遺象也漢書曰陳萬年字幼公善人事賂外戚為御史大夫子咸字子康年十八有異材抗直數言事剌議近臣萬年嘗病召咸教誡於床下語至夜半咸睡著頭觸屏風萬年大怒欲杖之曰乃公教戒汝汝反睡不聽吾言何也咸叩頭謝曰具曉所言大要教咸諂也萬年因不復言又曰班伯以侍中光祿大夫養疾久之成帝出過臨侯伯伯乃再視事自大將軍薨後師古曰王鳳也富乎定陵侯張放淳于長等始愛幸出為微行行則同輿執轡入則侍中設宴飲之會及趙李諸侍中皆引滿舉白時乘輿幄坐帳畫屏風師古曰坐音才臥反畫紂醉踞姐已作長夜之樂上以伯新起數目禮之因顧指畫而問伯紂為無道至於是呼伯對曰書云乃用婦女之言何有踞肆於朝所謂衆惡歸之不如是之甚者也上曰茍不居此此圖何戒伯曰沈湎于酒微子所以告去也式號式呼大雅所以留連也師古曰大雅蕩之詩云式號式呼俾晝作夜醉號呼以晝為夜流連作詩之歡而泣涕流連也而諸書乃以留連荒亡蓋失之矣大雅以流連不謂飲酒之人也呼音大故反詩書淫亂之戒其厚皆在於酒上乃喟然歎曰吾久不見班生今日復聞讜言放等不懌又曰成帝省減椒房掖庭用度許皇后上疏曰設妾欲作某屏風張於某所必繩妾以詔書矣又曰王莽常翳雲母屏風東觀漢記曰宋弘嘗燕見御座新施屏風圖畫列女帝數顧視之弘正容言曰未見好德如好色者上即為撤之上姊湖陽公主新寡上與共論朝臣微觀其意主曰宋公威容德器群臣莫及上曰方圖之後弘見上令主坐屏風後因謂弘曰諺言貴易交富易妻人情乎弘曰臣聞貧賤之交不可忘糟粳之妻不下堂上顧謂主曰事不諧矣謝承後漢書曰鄭弘為太尉舉第五倫為司空班次在下每正朔朝見弘曲躬自卑上問知其故遂聽置雲母屏風分隔其間由此為故事吳志曰景帝時紀亮為尚書令子騭為中書令每朝會詔以御屏風隔其座焉或曰隔以雲母屏風又曰曹丕興善畫孫權使畫屏風誤筆落點素因就以作蠅權以為生蠅舉手彈之魏書曰太祖雅性節儉帷帳屏風壞則補納魏志曰太祖平柳城班所獲器物特以素屏風素憑几賜毛玠曰以君有古人之風故賜君以古人之服晉書曰吳隱之字處默清貧劉𥙿拜太常卿以竹蓬為屏風坐無氈席續晉陽秋曰何無忌母劉牢之姊無忌與宋高祖謀夜於屏風中製檄文母登屏風窺之大喜曰汝能如此吾讎雪矣宋書曰顏延之愛姬死以冬日臨哭忽見妾排屏風以壓延之延之懼墜地因病又曰王琨儉於財用設酒不過兩爵輒云此酒難遇鹽豉薑菜之屬並挂屏風酒漿悉置床下內外有求琨手自付之宋起居注曰元嘉中中丞劉禎奏風聞廣州剌史韋朗於州作緑沉銀泥漆屏風二十三床請以事免朗官王琰宋春秋曰明帝性多忌諱禁制回避者數十百品亦惡白字屏風書古來名文有白字輒加改易玄黃朱紫隨宜代之齊書曰宜都王鏗年十歲時與吉景曜商略先言往行左右誤排抩瘤屏風倒壓其背顏色不異言談無輟亦顧視又皇太子在雍有發古得玉屏風遣將還都又劉悛傳武帝常在東宮每幸悛坊間言至夕賜屏風帷帳南史曰王遠字景舒位光祿勳時人謂遠如屏風屈曲從俗能蔽風露言能不虧物理也唐書曰太宗引虞世南為秦府十八學士嘗令寫列女傳以裝屏風于時無本世南書之一無遺失又曰田神功卒賜屏風茵褥於靈座又曰憲宗以天下無事留心典墳著書十四篇名曰前代君臣事迹寫於六扇屏風以示宰相春秋後語曰孟嘗君每待客坐語屏風後常有侍吏主記所與客語知其親戚居處客去後使使謝餽無所遺失鹽鐵論曰一杯棬去遠反説文曰䊎粉用百人之力一屏風就萬人之功其為多矣功積於無用財盡於不急桓談新論曰五聲各從其方春角夏徵秋商冬羽宮居中央而兼四季以五音須宮而成可以殿上五色錦屏風諭而示之望視則青赤白黃各各異類就視則皆以其色為地五色文之世其欲為四時五行之樂亦當各以聲為地而用四聲文飾之猶被五色屏風矣西京雜記曰廣川王去疾發魏哀王冢有石屏風又曰趙飛燕為皇后其女弟遺雲母屏風琉璃屏風又曰漢江都王建徑健嘗跳越七尺屏風漢武舊事曰帝起神臺其上扉屏風悉以白琉璃作之光冶洞徹也郭子橫洞冥記曰上起神明臺上有金床象席雜玉為龜甲屏風拾遺録曰董偃嘗臥延清之室設紫琉璃屏風列麻油燈於戶外視屏風若無屏風矣侍人唯見燈明以言無礙乃於屏風外扇偃曰玉石豈須扇而後清涼也侍者乃屏風扇以手摸之方知有屏風之礙矣又曰孫亮作琉璃屏風甚薄而徹每於月下清夜舒之常愛寵四姬使坐屏風中外望之乃如無隔唯香氣不通於外劉向七略別傳曰臣與黃門侍郎歆以列女傳種類相從為七篇以著禍福榮辱之效是非得失之分畫之於屏風四堵桓任別傳曰任子亡愍念之為作象著屏風置座邊古今注曰孫亮作琉璃屏風鏤作瑞應圖一百二十種鄴中記曰石虎作金銀鈕屈膝屏風衣以白縑畫義士仙人禽獸之像讚者皆三十二言高施則八尺下施四尺或施六尺隨意所欲也三輔決録曰何敞為汝南太守和帝南巡過郡有刻鏤屏風為帝設之帝命侍中黃香銘之曰古典務農雕鏤傷民忠在竭節義在修身風土記曰陽羡縣令袁起生有神異無病而亡冢東面有屏風蓋神之所坐東宮舊事曰皇太子納妃有床上屏風十二牒織成漆連銀鉤紐織成連地屏風十四牒銅環鈕京兆舊事曰杜陵蕭彪字伯文為巴郡太守以父老歸供養父有客常立屏風後自應使命三秦記曰荊軻入秦為燕太子報讎把秦王衣袂曰寧為秦地鬼不為燕地囚王美人彈琴作語曰三尺羅衣何不掣四面屏風何不越王因掣衣而走得免段龜龍涼州記曰有人發張駿墓得真珠簾箔雲母屏風語林曰滿奮字武秋羸惡風侍坐武帝屢顧看雲母幌或云北窗琉璃屏風實密似踈有難色武帝笑之答曰臣如吳牛見月則喘或云是胡質侍魏明帝坐俗説曰荀介子為荊州剌史荀婦大妒恆在介子齋中客來便閉屏風有桓客者時為中兵參軍來詣荀咨事論事已訖為復作餘語桓時年少殊有姿容荀婦在屏風裏便語桓云桓參軍君知昨人不論事已訖何以不去桓狼狽便走又曰謝萬作吳興郡其兄安時隨至郡中萬眠常晏起安清朝便往床前叩屏風呼萬起淮南王屏風賦曰列在左右近君頭足不逢仁人永為杇木曹毗詩敘曰余為黃門在直多懷遂作詩書屏風李尤屏風銘曰舍則潛辟用則設張立必端直處必廉方壅閼風邪霧露是抗奉上蔽下無失其常王羲之與殷浩書曰勸令畫廉藺於屏風步障晉書曰石崇與王愷相尚愷以紫絲步障四十里崇以錦步障五十里以敵之又曰王凝之妻謝氏有才辨凝之嘗與賓談論詞理將屈謝氏遣婢白獻之曰欲與小郎解圍乃施青綾步障自蔽與客申獻之前議客不能屈齊書曰江夏王寶玄與崔惠景叛景敗寶玄逃奔數日乃出帝召入後堂以步障裹圍之令群小數十人鳴鼓角繞其外遣人謂曰汝近圍我亦如此少日乃殺之北齊書曰琅琊王儼字仁威武成弟三子也武成甚愛之儀衛甚盛帝嘗與后在華林園東門外張幕施青綾步障以觀之東宮舊事曰太子納妃有絲布碧裹步障三十漆竽銅鉤拾遺記曰石虎為浴臺列鳳文錦步障縈蔽於浴所語林曰許玄度將弟出都婚諸人聞是玄度弟欽遲之既見乃甚癡便欲嘲弄之玄度為之解紛諸人遂不能犯境劉真長歎曰玄度為弟婚施十重鐵步障語林曰大將軍刑周伯仁以步障繞之經日已具王曰周伯仁子弟癡何以不知取其翁尸周家然後收之承塵釋名曰承塵施於上以承塵土也周禮春官下曰幕人掌帟綬之事云謂帟在王幕若幄中坐上承塵也後漢書曰雷義字仲公豫章鄱陽人也初為郡功曹皆擢舉善人不伐其功義嘗濟人死罪罪者後以金二斤謝之義不受金主伺義不在默投金於承塵上後葺理屋宇乃得金金主已死無所復還義乃以付縣曹宋書曰建平王宏子景素在南徐甚得人心而謗聲日積深懷憂懼嘗與故吏劉璡獨處曲臺有鵠集於承塵飛鳴相追景素泫然曰若斯鳥者遊則參于風煙之上止則隱于林木之下飢則啄渴則飲形體無纍于物得失不關於心一何樂哉搜神記曰長安有張氏者獨處一室有鳩自外入止于床張氏惡之披懷而祝曰鳩爾來為我禍耶飛上承塵上為我福也來入我懷鳩翻飛入懷乃化為一鉤從爾資産巨萬又曰博陵劉伯祖為河東太守所止承塵上有神能語京師詔書誥下消息輒豫告伯祖伯祖問其所食啖欲得羊肝於前切之臠隨刀不見盡兩羊肝有一老狸眇眇在案前持刀者舉刀欲斫之伯祖訶止自舉著承塵上須臾大笑曰向者啖肝醉忽失形與府君相見大慚愧後伯祖當為司隸復先語伯祖云某月某日書當到期如言及入司隸府神隨逐承塵上輒言省內事伯祖大恐怖謂神曰今職在剌舉左右貴人聞神在此因以相害神答曰如府君所慮當相捨去遂無聲支僧載外國事曰斯訶調國有大富長者條三彌與佛作金薄承塵一佛作兩重承塵抱朴子曰余友人滕永叔嘗養大獼猴以鐵鎖鎖之著床間而犬忽齧殺之永叔便合鎖埋之後百許日有鬼者見獼猴走上承塵上不悟是獼猴鬼也驚指之曰獼猴何以被傷流血斷走乎永叔曰始乃今日知猴死復有鬼乎語林曰傅信忿母母羸病恆驚悸信乃取雞鴨去毛置承塵上行落地母輒恐怖楚辭曰經堂入奧朱塵筵塵承塵也
