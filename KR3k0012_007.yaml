body:
  text: 天部六星中天文錄曰格擇星狀如炎火下大上銳色黃白起地而上占曰格擇星見不種而獲不有土功必有大害又曰歸邪如星非星如雲非雲名曰歸邪司馬遷天官書曰歸邪見必有歸國者又曰六甲六星主分陰陽而紀節候故在帝旁所以布政教而授民則也又曰平星論語讖曰平星主法合誠圖曰主建廷平主平天下之獄事若今廷尉之象又曰魚星主理陰陽事知雲雨之期也故讚曰漢中魚星知雲雨也占曰魚星明大河海水皆出又云魚星明則大陰陽氣和魚星忽不明而在則魚多魚星亡則少魚又曰郎位一曰哀烏郎府也注曰郎位周官之元士漢官之光祿中散諫議三署郎中是其職也或曰郎位今尚書也大象列星圖曰北極五星一名天極一名北極其第一星為太子第二星最明者為帝第三星為庶子餘二後宮屬也並在紫微宮中央故謂之中極其占明大則吉若變動則有憂今觀象之始始於中極者先尊以及卑自中以周外也其一人為首謂極第二星為首也又曰四輔四星在紫微宮中抱之細星也此為輔臣之位贊於萬機其占以小而明則吉若微闇則官不理又曰鈞陳六星在紫微宮中華蓋之下天帝所居之宮亦護軍將軍之象占以明則吉又曰華蓋七星其杠九星合十六星如蓋狀在紫微宮臨鈞陳以蔭帝坐占若正則吉若傾則兇也又曰女史一星在紫微宮內柱史北此婦人之官掌記宮中之事占以明則為記史直詞若不明則反是又曰柱下史一星在紫微宮內近尚書此左右掌記君之過其占以明則為史直詞若不明則詞不依過無真實也又曰尚書五星在紫微宮門內東南之隅此八座大臣之象故讚曰尚書納言夙夜諮謀占以小而明則君臣和又曰北斗七星近紫微宮南在太微北是為帝車以主號令運乎中央而臨制四方建四時均五行移節度定諸紀皆繫於北斗其魁四星為璇璣其杓三星為玉衡故書云在璇璣玉衡以齊七政又其魁第一星為樞亦曰正星主陽德天子之象二曰璇亦曰法星主陰刑女主之位三曰璣亦曰令星主禍四曰權亦曰伐星主天理伐無道五曰衡亦曰殺星主中央助四旁殺有罪六曰開陽亦曰應星又一主天二主地三主火四主水五主土六主木七主金又一主秦二主楚三主梁四主吳五主隋六主燕七王齊又曰文昌六星在北斗魁前如匡形故史遷曰斗魁戴匡其第六星名曰司祿此天之府計集所會也又曰宦者四星次帝座西南主侍者帝旁閹人也占以不明則吉若明則內臣專權又曰勢四星在太陽西北主刑餘人而用事者也占以不明為吉若明則閹官用權又曰輔一星附北斗杓第六星大臣之象也占欲其小而明則吉若大而明則臣奪君政若小而不明則臣不任職若明大與斗合者則國兵暴起又曰八穀八星在紫微蕃之外五車之北其八星一主稻二主黍三主大麥四主大豆五主小豆六主小麥七主粟八主麻子占其明則八穀成若暗則不成若一星不見則一穀不登若八星不見則國人有糊口之憂又曰房四星去氐十五度為明堂布政之宮占若移徙則國流逆均明則天下大同又曰傅說一星在尾後河中也蓋後宮女巫也主祝祠神靈祈禱以求子胤占若大而明則後宮多禱祈又曰杵三星在箕南主舂杵之用占若其縱則為豐若其橫則為飢又曰農丈人一星在南斗南主農正官也占明則為豐稔若暗則為饑歉又曰南斗六星去牽牛二十六度四分之一為天廟丞相太宰之位主荐賢良授爵祿又主兵機魁南二星為天梁中央二星為天相北二星杓曰天廚庭亦為壽命之期將有天子之事占其斗星盛明則王道和平爵祿行若不然反是也又曰河鼓三星在牽牛北主軍鼓蓋天子三將軍也中央大將軍也其南左星左將軍也其北右星右將軍也所以備關梁而拒難也昔傳牽牛織女七月七日相見者則此是也故爾雅云河鼓謂之牽牛又古歌曰東飛伯勞西飛鷰黃姑織女時相見其黃姑者即河鼓也為吳音訛而然今之言者謂是列舍牽牛而會織女故為此分析令知斷其疑焉又曰臼四星在人星東南主舂臼占若覆則歲中人饑荒若仰則天下熟又曰內杵三星在人星旁主軍糧占若正直下對臼口則吉若偏與臼不相當則軍糧絕又曰漸臺四星屬織女左足主晷刻律呂占若明正則陰陽調而律呂和不然則否也又曰弧九星在狼東南謂天弓也主備賊盜常屬矢向狼星又曰天錢十星在北落西北主錢帛所聚占若明則府藏盈若不明則為虛耗又曰東壁二星去營室十六度天子圖書之祕府也占若明則圖書集道術行小人退君子入若不然則天子好武臣賤文士稽古忠正之臣隱親黨邪曲之人用也又曰羽林四十五星三三而聚在壘壁南主天軍占若星聚明則國安寧若星稀而動搖則兵輩出又曰進賢一星在太微宮東華門東平道之西主訪賢薦士也占若明則賢人進若不明則否也又曰太微宮垣十星在翼珍北主天子之宮庭五帝之座十二諸侯府也其外藩南二星間名曰端門東第一星為左執法廷尉之象也又曰軒轅十七星在七星北如龍之體主雷雨之神後宮之象陰陽交感震為雷激為電和為雨怒為風亂為霧凝為霜散為露聚為雲氣立為虹蜺離為背矞分為抱珥此十四變皆軒轅主之又曰天街二星在畢昴間主國界也街南為華夏之國街北為戎夷之國又曰玉井四星在參西主水泉石氏星經曰卷舌六星在昴北主讒佞言語之吏若移動多口舌兵起星繁天下兵亂星少兵廢又曰天讒星在卷舌中亦主誹謗又曰天稟四星在昴南主積聚黍稷供享祀及御膳星明豐暗儉又曰天苑十六星在昴畢如環狀主天子苑囿五星守犯牛馬死又曰參旗九星在參畢間一曰天弓星不欲明明則白衣會邊兵動又曰闕丘二星在南河主天子門闕諸侯之兩觀也又曰文昌六星如半月形斗魁前為天府主天下集計事第一星名上將第二名次將第三名貴相第四名司錄第五名司命第六名司法星光潤則天下安又曰大理四星在斗中亦為貴人牢又為執法之宮又曰庫樓十五星在左角南器府東一名天庫兵車之府星芒角兵起又曰招搖一星在梗河北主遠狄芒角則兵起又曰貫索九星在七公前為賤人牢口一星為門門欲開開即有赦星惣見獄事繁豫章列士傳曰周騰字叔達為御史桓帝欲南郊平明出叔達仰首曰王者象星今宮中宿策馬星不出動帝何出焉四更皇子卒遂止關令內傳曰北斗一星面百里相去九千里置二十四氣四宿行四時五方立五星主五岳也黃石公記曰黃石鎮星之精也王子年拾遺記曰禹鑄九鼎擇雌金為陰鼎雄金為陽鼎太白星見九日不沒莊子曰夫道可傳而不可受可得而不可見傳說得之以相武丁奄有天下乘東維騎箕尾而比於列星列子曰星積氣之中有光耀者抱朴子曰辰星水精生玄武歲星木精生青龍又曰人初受氣皆應列宿之精值聖宿則聖值賢宿則賢也尸子曰自井中視星所見不過數星自丘上以望則見始出也非明益也勢使然也私井中也公丘上也淮南子曰太微者太一庭也紫宮者太一之居也軒轅者帝妃之舍也咸池者水魚之囿也天河者群神之闕也天河星名也闕猶門也又曰令雨師灑道使風伯掃塵高誘注曰雨師畢星也風伯箕星也又曰歲星之所居五穀豐昌其對為衡歲乃殃又曰四守者所司賞罰許慎注曰四守紫宮軒轅咸池天河也家語曰巫馬期為單父令戴星出入以理人劉向說苑曰玄象著明莫大於日月察變之動莫著於五星也又曰秦胡亥立日月薄食山林淪亡枉矢光夜熒惑襲月景帝通紀曰彗星者天地之旂也國精符曰地為山川山川之精上為星各應其州城分野為國作精神符驗也五姓占曰君薄德義懦弱不勝任則太白失度經天作變易之象樂汁圖曰天宮紫微宮也鉤陳后宮也大當正妃也大當鉤陳末大星也閣道北斗輔天理貴人牢為貴人作牢獄也文昌宮天五曹會府也玄戈招搖也皆備兵難之星梗河天矛也梗河一名天矛織女連營賤人牢連營貫索咸池五車五車咸池別名天關參旗伐也觜觿天廟也奎天豕也天矢婁也胃天倉也狼弧魚陵天船天苑卷舌天老人皆西方星名也柳主材木柳星主材木也鄭玄注曰日月遺其珠囊珠謂五星也遺其囊者盈縮失度也黃石公陰謀祕訣法曰熒惑者火之精御史之象主禁令刑罰蔡邕月令章句曰天官五獸之於五事也左有蒼龍大辰之貌右有白虎大梁之文前有朱雀鶉火之體後有玄武龜蛇之質中有大角軒轅麒麟之信風俗通曰月與星并無光日照之乃光耳如以鏡照日則影見壁月初見西方月望後光見東北一照也又曰東方朔太白星精黃帝時為風后堯時為務成子周時為老子越為范蠡齊為鴟夷言其變化無常也祖台之志怪曰吳未亡前常有紫赤氣見牛斗之間星官及諸善占者咸憂吳方興惟張茂先於天文尤精獨知為神劍之氣非江南之祥
