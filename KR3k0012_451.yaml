body:
  text: 人事部九十一權謀下尚書大傳曰周公先謀於同姓同姓從然後謀於朋友朋友從然後謀於天下天下從然後加之蓍龜是以君子聖人謀義不謀不義故謀必成卜義不卜不義故卜必吉以義擊不義故戰必勝是以君子聖人謀則成戰則勝戰國策曰秦攻趙長平大破之而歸因使人索六城於趙講計未定婁緩新從秦來趙王與緩計曰與秦地何如勿與緩曰此非臣所能知也王曰雖然試言之緩曰緩新從秦來言勿與則非計也言與之則恐以臣之為秦也故不敢對使臣得為王計焉不如與之王曰諾虞卿見王王以緩言告之虞卿曰秦索六城於王王以五城以賂齊齊秦深讎也得王五城并力西擊秦是王一舉結二國之親而與秦易道也趙王曰善因發虞卿東見齊王與之謀秦婁緩聞之逃去又曰楚圍雍氏五月韓令使者求救於秦冠蓋相望秦師不下殽韓令靳尚使秦謂王曰韓之於秦也居為隱蔽出為鴈行今韓已病矣秦師不下殽臣聞之脣亡者其齒寒願大王熟計之太后乃謂尚子曰妾事先王以其體加妾之身妾困弗支也盡置其身妾不重何也以其少有利焉今救韓日費千金獨不可使妾少有利耶靳尚歸報王王遣張翠張翠稱病日行一縣張翠至甘茂曰韓急矣先生病而來張翠曰韓未急也甘茂曰韓之急緩人莫弗知今先生言不急可乎翠曰韓急則折而入楚矣臣安敢來甘茂曰先生勿復言也乃入言於王曰公叔且以國南合於楚楚韓為一魏氏不敢不聽是楚以三國謀秦也如此則伐秦之形成矣不識坐而待伐孰與伐人之利秦王曰善果下師於殽以救韓又曰中山陰姬與江姬爭為后司馬喜請見陰姬公為畫計公稽首曰誠如君言喜即奉書詣中山王曰臣聞趙強即中山弱臣能弱趙而強中山中山王悅而見之喜曰臣願乞之趙觀其地形險阻人民貧富君臣賢不肖商榷為資未可豫陳也乃見趙王曰臣聞趙天下善為音容佳麗之所出也今來至境入都邑人民謠俗容貌顏色殊無佳麗好美者以臣所見多矣周流無所不至未嘗見人如中山陰姬者不知者將以為神其容貌顏色過絶人矣乃其眉準頞權衡犀角偃月彼乃帝王之后非諸侯之姬趙王大悅曰吾願請之何如對曰非臣所敢議願王無泄喜歸報中山君曰趙王非賢王也不好道德而好聲色不好仁義而好勇力聞其乃欲請陰姬中山君作色不悅喜曰趙強國也請之必矣王不與之即社稷危與之即為諸侯笑王立為后以絶趙王意可也遂立為后趙王亦無請也又曰秦王使人之楚楚王賢之恐其為楚用以危秦也昭子曰以王之德與王之賢因以遺之楚王必為有外心去楚矣從其計果如其言又曰安陵纏以顏色美壯得幸於楚恭王江乙往見安陵纏曰子之先人豈有矢石之功於王乎曰無有江乙曰子之身豈亦有乎曰無有江乙曰子之貴何以至於此乎曰僕不知所以江乙曰吾聞之以財事人者財盡而交疏以色事人者華落而愛衰今子之華有時而落子何以長幸無解於王乎安陵纏曰臣年少愚陋願委質於先王江乙曰獨從為殉可耳安陵纏曰敬聞命矣江乙去居期年逢安陵纏謂曰前諭子者通之於王乎曰未可也居期年江乙復見安陵纏曰子豈諭王乎安陵纏曰臣未得王之間也江乙曰子出與王同車入與王同坐居三年言未得王之間子以吾之説未可耳不悅而去其年共王獵江渚之野野火之起若雲霓虎狼之嗥若雷霆有狂兕從南方來正觸王左驂王舉旌旄而使善射者射之一發兕死車下王大喜拊手而笑顧謂安陵纏曰吾萬歲之後子將誰與此樂乎安陵纏乃逡巡而卻泣下沾襟曰萬歲之後臣將從為殉安知樂此誰於是共王乃封安陵纏於車下三百戶故曰江乙善謀安陵纏知時也又曰智伯欲襲衛故遺之乘馬先之一璧衛君大悅酌酒諸大夫皆喜南文子獨不喜有憂色衛君曰大國禮寡人寡人故酌諸大夫酒諸大夫皆喜而子獨不喜有憂色者何也南文子曰無方之禮無功之賞禍之先也我未有往彼有以來是憂也於是衛君乃修梁津而擬邊城智伯聞衛兵在境上乃還又曰智伯欲襲衛乃佯亡其太子顏使奔衛南文子曰太子顏之為其君子也甚愛非有大罪也而亡之有故然人亡而不受不祥使吏逆之曰車過五乘慎勿內也智伯聞之乃止又曰趙簡子使人以明白之乘六先以一璧為遺於衛衛叔文子曰先不意可以生故以小之所以事大也今我未以往而簡子先以來必有故於是斬林除園藂斂蓄積而後遣使者簡子曰吾舉也為不可知也今既已知之矣乃輟圍衛也又曰鄭桓公將欲襲鄶先問鄶之辨智果敢之士書其名姓擇鄶之良臣而與之為官爵之名而書之因為設壇於門外而埋之釁之以猳若盟狀鄶君以為內難也盡殺其臣桓公因襲之遂取鄶又曰鄭桓公東會封於鄭暮舍於宋東之逆旅逆旅之叟從外來曰客將焉之曰會封為鄭逆旅之叟曰吾聞之時難得而易失今客之寢安殆非封也鄭桓公援轡自駕其僕接御而載之行十日十夜而至至釐何與之爭封故以鄭桓公之賢微旅之叟幾不會封也又曰趙簡子使成何涉他與衛靈公盟於專澤靈公未喋盟成何涉他衛靈公之手而撙之靈公怒欲反趙王孫商曰君欲反趙不如與百姓同惡之公曰若何對曰請命臣令於國曰有姑姊女者家一人質於趙百姓必怨君因反之矣君曰善乃令之三日遂徵之五日而令畢國人巷哭君乃召國大夫而謀曰趙為無道反之可乎大夫皆曰可乃出西門閉東門趙氏聞之縛涉他而斬之以謝於衛成何走燕子貢曰王孫商可謂善謀矣憎人而能害之有患而能處之欲用民而能附之一舉而三物俱至可謂善謀矣又曰吳闔閭夫人薑氏齊景公以其子妻闔閭送諸郊泣曰余死不汝見矣高夢子曰齊負海而縣山縱不能全收天下誰干我君愛則勿行公曰余有齊國之固不能以令諸侯又不能聽是生亂也寡人聞之不能令則莫若從且夫吳蜂蠆然不棄毒於人則不靜余恐棄毒於我也遂遣之又曰晉文公與荊人戰於城濮君問於咎犯咎犯對曰服義之君不足於信服戰之君不足於詐君慎之詐而已矣君問於雍季對曰焚林而畋得獸雖多而明年無復也乾澤而漁得魚雖多而明年無復也詐猶可以偷利而無報遂與荊軍戰大敗之乃賞先雍季而後咎犯侍者曰城濮之戰咎犯之謀也君曰雍季之言百世之謀也咎犯之言一時之權也寡人既已行之矣又曰智伯圍晉陽絺疵謂智伯曰韓魏之君必反矣智伯曰何以知之對曰夫勝趙而三分其地今城未沒者三板臼竈生蛙人馬相食城降有日矣而韓魏之君無喜志而有憂色是非反何也明日智伯謂韓魏之君曰疵言君之反也韓魏之君曰必勝趙而三分其地今城將勝矣二家雖愚不棄美利而佩約為難不可成之事其勢可見也是疵必為趙説君且使君疑二主之心而不解於攻趙也今君聽讒臣之言而離二主之交為君惜之智伯出欲殺絺疵絺疵逃韓魏之君果反又曰白圭之中山中山欲留之固辭而去又之齊齊王亦欲留之又辭去人問其辭白圭曰二國將亡矣所學者國有五盡故莫之必忠則言盡矣莫之必譽則名盡矣莫之必愛則親盡矣行者無糧居者無食則財盡矣不能用人又不能自用則功盡矣國有此五者無辜必亡中山與齊皆當此若使中山之與齊也聞五盡而更之則必不亡也其患在不聞也雖聞又不信也然則人主之務在乎善聽而已矣又曰下蔡威公閉門而哭三日三夜泣盡而繼之以血旁鄰窺牆而問之曰子何故而哭悲若此乎對曰吾國且亡曰何以知也應之曰吾聞病之將死不可為良醫國之將亡不可為計謀吾數諫吾君吾君不用是以知國之將亡也於是窺牆者聞其言則舉宗而去之於楚居數年楚王果舉兵伐蔡窺牆者為司馬將兵而往束虜其衆問曰得無有昆弟故人乎見威公縛在虜中問曰若何以至於此應曰吾何以不至於此且吾聞之也言之者行之役也行之者言之主也汝能行我能言汝為主我為役吾亦何以不至於此哉窺牆者乃言之於楚王遂解其縛與俱之楚故曰能言者未必能行能行者未必能言也又曰石乞侍坐屈建曰白公其為亂乎石乞曰是何言也白公至於室無榮所下士者三人與己相若臣者五人所與同衣食者千人白公之行若此何故為亂屈建曰此建之所謂亂也以君子行則可於國家行過禮則國家疑之且茍不難下其臣必不難高其君矣建是以知夫子將為亂也處十月白公果亂也又曰韓昭侯作高門屈宜咎曰昭侯不出此門曰何也曰不時吾所謂不時者非時日也人固有利不利昭侯嘗利矣不作高門往年秦拔宜陽明年大旱民飢不以此時恤民之急也而顧反益以奢此謂福不重至禍不重來者也高門成昭侯卒竟不出此門矣又曰田子顏自大術至乎平陵城下見人子問其父見人父問其子田子方曰其以平陵反乎吾聞行於內然後施於外子顏欲使其衆甚矣後果以平陵叛又曰晉人已勝智氏歸而繕甲治兵楚王恐召梁公弘曰晉人勝智氏矣歸而繕甲兵其以我為事乎梁公曰不患害其在吳乎夫吳君恤民而同其勞使其民重上之令而人輕死以從上使如慮之戰臣登山以望之見其用百姓之信必也勿已乎其備之若何不聽明年闔廬襲郢又曰楚莊王欲伐陳使人視之使者曰陳不可伐也莊王曰何故對曰其城郭高溝壑深畜積多其國寧也王曰陳可伐也夫陳小國也而蓄多是賦斂重則民怨上矣城郭高溝壑深則民力罷矣興兵伐之遂取陳又曰齊桓公將伐山戎孤竹使人請助於魯君進群臣而謀皆曰師行數千里入蠻夷之地必不反矣於是魯許助之而不行齊已伐山戎孤竹而欲移兵於魯管仲曰不可諸侯未親今有伐遠而還誅近鄰鄰國不親非霸王之道君之所得山戎之寶器者中國之所鮮也不可以不進周公之廟乎桓公乃分山戎之寶獻之周公之廟明年起兵伐莒魯下令丁男悉發五尺童子皆至孔子曰聖人轉禍為福報怨以德此之謂也又曰智伯請地於魏宣子宣子不與任增曰何為不與宣子曰彼無故而請地也吾是以不與任增曰彼無故而請地者無故而與之是重欲無厭也彼喜必又請地於諸侯不與必怒而伐之宣子曰善遂與地智伯喜又請地於趙趙不與智伯怒圍晉陽韓魏合趙而反智氏智氏遂滅又曰楚莊王與晉戰勝之懼諸侯之畏己也乃築為五仞之臺成而觴諸侯諸侯請為觴皆仰而曰將將之臺窅窅其謀我言而不當諸侯伐之於是遠者來朝近者入賓又曰吳王夫差破越又將伐陳楚大夫皆懼曰昔闔閭能用其衆故伐我於柏舉今聞夫差又甚焉子西曰二三子胡不相睦也無患吳矣昔闔閭食不二味處不重席擇不取費在國天有災親戚乏困而供之在軍食熟者半而後食其所嘗者卒乘必與焉是以民不罷勞今夫差次有臺榭陂池焉宿有妃嬙嬪御焉一日之行所欲必具玩好必集珍異是藂夫差先自敗已焉能敗我又曰吳請師於楚以伐晉楚王與大夫皆懼將許之左史倚相曰此恐吾攻己故示我不病請為長轂千乘卒三萬與分吳地也莊王聽之遂取東國又曰陽虎為難於魯走之齊請師攻魯齊侯許之鮑文子曰不可也陽虎欲破齊師齊師破大臣必多死於是欲奮其詐謀夫虎有寵於季氏而將季孫以不利魯國而容其求焉今君富於季氏而大於魯滋陽虎所欲傾覆也魯免其疾而君收之無乃害乎齊君乃執之免而奔晉又曰湯欲伐桀伊尹曰請阻之貢職以觀其動桀怒起九夷之師以伐之伊尹曰未可彼尚猶能起九夷之師是罪我也湯乃謝罪請服後入貢職明年又不貢職桀怒起九夷之師九夷之師不起伊尹曰可矣湯乃興師伐而殘之遷桀南巢焉孔叢子曰趙聞魏將以來親於秦子順謂趙王曰此君之下吏計過也比目之魚不見得於人者偶視近而俱走也今秦兼吞天下之志不忘側息也趙魏與之鄰接而強弱不敵所以不敢圖并趙魏者徒以二國併力周旋無故自離以資強秦天下拙謀無過此者夫連雞不能上棲二國構難不能自免於秦也願王熟慮之趙王曰敬受教又曰韓與魏有隙子順謂韓王曰昭釐侯一世之明君也申不害一世之賢相也韓與魏仇敵之國而釐侯執圭見梁君者非好卑而惡尊慮過而計失與嚴敵為鄰動有滅亡之變獨徑不能支二難故降心以相從屈己以求存也申不害慮事而言忠臣也昭釐侯聽而行之明君也今之韓弱於始之韓今之秦強於始之秦而背先人之舊好以區區之衆居二敵之間非良策也齊楚遠而難恃秦魏呼吸而至舍近而求遠是虛名自纍而不知近敵之困者也為王計者莫如除小忿全大恕也吳越之人同舟濟江中流遇風波其相救如左右手所患同也今不恤所同之患是不如吳越之舟人也韓王曰善
