body:
  text: 禮儀部三十三葬送二東觀漢記曰鄧弘薨有司復請加諡曰昭成君發五校輕車騎士為陳至葬所所施皆如霍光故事皇太后皆曰門生挽送謝承後漢書曰鄧晨尚世祖姊新野公主主為王莽兵所害及薨詔備主官屬法駕招迎主魂與晨合葬於北邙謝承後漢書曰馬援卒後有人上書譖之者援妻孥惶怖不敢以喪還舊塋裁買城西數畝地槀葬而已賓客故人莫敢弔會援妻子草索相連詣闕請罪帝乃出訟書以示之方知所坐上書欣冤前後六上辭甚哀灱然後得葬謝承後漢書曰崔瑗為濟北相光祿大夫杜喬為八使徇行郡國以贓奏瑗徵詣廷尉瑗上書自訟得理出會病卒臨終顧命子實曰人稟天地之氣以生及其終也歸精於天還骨於地何地不可藏形骸勿歸鄉里實奉遺令遂留葬洛陽初崔實父卒摽賣田宅起冢塋立碑頌葬訖資産竭盡因窮困以榷酤鬻為業時人多以此譏之實終不改亦取足而已不致盈餘謝承後漢書曰陳寵為廣漢太守先是洛縣城南每陰雨常有哭聲聞於府中積數十年寵問而疑其故使吏桉行還言襄亂時此下多死亡者而骨骸不得葬償儻在於是寵愴然矜之即勑縣盡收斂葬之自是哭遂絶華嶠後漢書曰楊震為太尉中常侍樊豐等驕恣震常灱諫由是共構譖震策罷遣歸本郡遂仰鴆薨薨日有大烏來止樹上須臾下地安行到柩前正立低頭旁人共更撫抱終不驚駭鳥蒼色頸去地五六尺舒翅廣一丈三尺莫有能名者葬畢飛去范曄後漢書曰范冉一名丹臨命遺勑其子曰吾生於昏暗之世值乎淫侈之俗生得在世濟時死則何忍自同於世氣絶便斂斂以時服衣足蔽形棺足周身斂畢便穿穿畢便埋其明堂之奠盂飯寒水飲食之物勿有所下墳封高下令足自隱知我心者李子堅王子炳也今皆不在制之在爾勿令鄉人宗親有所加也范曄後漢書曰趙咨以病自乞徵拜議郎沉疾京師將終告其故吏朱祗蕭建等薄斂素棺藉以黃壤欲令速朽早歸后土不聽子孫改之朱祗蕭建送喪到家子胤不忍父體與土并合欲更改殯祗建譬以顧命於是奉行世稱明哲後漢書曰董宣為洛陽令卒於官詔遣使者臨視唯見布被覆尸妻子對哭有大麥數斛弊車一乘帝傷之曰董宣廉潔死乃知之以宣綬為二千石賜艾綬葬以大夫禮後漢書曰樊宏卒遺勑薄葬一無所用以為棺槨一藏不宜復見如有腐敗傷孝子之心使與夫人同墳異藏帝善其令以書示百官因曰令不順壽張侯意無以彰其德具吾萬歲之後欲以為式後漢書曰袁安父沒母使安訪求葬地道逢三書生問安何之安為言其故生乃指一處云葬此地當代為上公須臾不見安異之於是遂葬其所占之地故纍代隆盛焉後漢書桓榮每疾病帝輒遣使者存問太官太醫相望於道及篤上疏謝恩讓還爵土帝親幸其家問起居下車擁經而前撫榮垂涕賜以床茵帷帳刀劍衣被良久乃去自是諸侯將大夫問疾者不敢復乘車到問皆拜床下榮卒帝親自變服臨喪送葬賜冢塋于首山之陽後漢書曰李傕重葬董卓於郿并董氏所焚尸之灰合斂一棺而葬之葬日大風雨霆震卓墓流水而藏漂其棺木後漢書曰王忳字少林忳音純廣漢新都人也忳嘗詣京師於空舍中一書生疾困愍而視之書生謂忳曰我當到洛而被病命在須臾腰下有金十斤願以柏贈死後乞藏骸骨未及問姓名而命絶忳即鬻金一斤營殯葬餘金悉置棺下人無知者後歸數年縣署忳大度亭初到之日有馬馳入亭中而止其日大風飄一繡被復墮忳前即言之於縣縣以歸忳忳後乘馬到雒縣馬遂奔走牽忳入他舍主人見之喜曰今禽盜矣問忳所由得馬忳具說其狀并及繡被主人悵然良久乃曰被隨旋風與馬俱亡卿何陰德而致此二物忳自念有葬書生事因說之并道書生形貌及埋金之處主人大驚號曰是我子也姓金名彥前往京師不知所在何意卿乃葬之大恩矣久不報以彰卿德耳忳悉以被馬還之彥父不取又厚遺忳忳辭讓而去後漢書曰范式字巨卿與張元伯為友元伯窮疾篤同郡郅君章殷子微晨夜省疾視之元伯臨盡歎曰恨不見吾死友尋而卒式或夢見元伯玄冕垂纓復屣而呼曰巨卿吾以其日死當以爾時葬永歸黃泉子未我忘豈能相及式恍然覺寤悲歎泣下具告太守請往奔喪投其葬日馳往赴之式未及到而喪已發引既至壙將窆而柩不肯進其母撫之曰元伯豈有望耶遂停柩移時乃見有素車白馬號哭而來其母望之曰是必范巨卿也即至叩喪言曰行矣元伯死生路異永從此辭會葬者千人咸為揮涕式因執紼而引柩於是乃前式遂留止冢次為修墳樹後漢書曰繆肜汝南召陵人也太守隴西梁湛召為決曹史安帝初湛病卒官肜送喪還隴西始葬會西羌反叛湛妻子悉避亂他郡肜獨留不去為起墳冢乃潛穿井傍以為窟室晝則隱竄夜則負土及賊平而墳已立其妻子意肜已死還見大驚關西咸稱傳之共給車馬衣資肜不受而歸後漢書曰張霸蜀郡成都人也為會稽太守後徵四遷為侍中卒年七十遺詔諸子曰昔延州使齊子死嬴博因坎路側遂以葬焉今蜀道阻遠不且歸塋可止此葬足藏齒髮而已務遵速朽副我本心人生一代但當畏敬於人若不善加己直為受之諸子承命葬於河南梁縣因遂家焉後漢書曰士孫瑞理王充等事曰興平二年秋朝廷以九月九日引見公卿近臣飲宴離席前說故司徒王允故司隸黃琬並有功於國可聽允恭等葬魏略曰田豫病亡戒其妻子曰葬我必西門豹邊妻子難之曰西門豹古之神人郍可葬其所豫曰豹所履行正與我等耳使死而有靈必與我善妻子從之魏略曰郝昭字伯通病亡遺令戒其子凱曰吾為將知將不可為也吾數發冢取其木以為攻戰具又知厚葬無益於死者也沒必斂以時服死復何在耶令去本墓遠東西南北在汝而已矣魏略曰沐德信年六十餘自慮無常豫作終制誡其子以儉葬至嘉平中病甚臨困又勑豫掘塪誡氣絶令二人舉戶即塪絶哭泣之聲止婦女送又誡後亡者不得入藏不得封樹妻子皆遵之魏志曰征東將軍王基母卒詔祕凶問迎其父豹喪合葬洛陽追賜豹北海太守魏志曰邴原字根矩北海人太祖辟司空椽原女早亡時太祖愛子倉舒亦沒太祖欲令合葬原辭曰合葬非禮也原之所以自容明公公之所以待原者以能守訓典而不易也若聽明公之命則是凡庸也明公焉以為哉太祖乃止魏志曰任城王章葬賜鸞路龍旗虎賁百人如漢東平王故事魏志曰徐邈為光祿大夫數歲即拜司空固辭不受以大夫薨於家用公禮葬諡曰穆侯魏志裴潛薨贈太常子秀翩遺令葬中唯置一坐瓦器數枝其餘一無所設也王隱晉書曰魏舒字陽元為冀州剌史入代山濤為侍中舒三取妻皆先亡是歲自表乞假還本郡葬妻上曰舒當左右朝政不宜遠還鄉里舒素清貧不營財産頓舉衆喪必無以自供其賜葬地一頃錢伍拾萬王隱晉書曰皇甫謐篤終論曰氣絶之後便時服幅巾以遽蒢褁尸覆卷三重麻繩約二頭置尸靈床上擇不毛之地穿坑十尺長一丈二尺廣六尺坈訖去床下尸平生之物皆無自隨唯齎孝經一卷示不忘孝道王隱晉書曰杜頒薨遺令曰吾往為公使過密縣邢山之上有冢問耕者云是鄭大夫祭仲或子産之冢也遂師從者登而觀焉其造冢居山之嶺四望周達連山體南北之正而耶東北向新鄭城意不忘本也藏無珍寶不取於重深居子尚其儉小人無利可動歷千載無毀儉之致也吾去春入朝因自營洛陽城東首陽之南為將來兆域而所得地中有小山上無舊冢其高顯雖未足比邢山然東奉二陵西瞻宮闕南觀伊洛北望夷叔曠然遠覽情之所安也故遂表樹開道為一定之制取法鄭大夫欲以儉自完耳棺器小斂之事皆當稱比王隱晉書曰馬隆字孝興東平人也少有智勇門寒無仕路兗州剌史令狐愚坐事死舉州無敢送喪者唯隆以武吏託稱家客殯送喪葬種柏三年禮畢乃還舉州皆慚王隱晉書曰徐苗以永寧三年春亡遺令濯巾浣衣榆棺雜磚露車載柩葦席瓦器而葬矣晉陽秋曰荀粲亡時年二十九性簡實不能與常人交接所交者一時俊傑至葬夕赴者裁十餘人皆同時知名士也哭之感動路人漢晉陽秋曰司馬師葬曹髦於洛陽西北三十里屈澗之濱下車數乘不設旒旐百姓相聚而觀之曰前所殺天子也或掩面而泣晉諸公讚賈后女宣華公主葬用羽葆鼓吹熊渠佽飛為鹵簿晉書曰石苞以泰始八年薨預為終制曰延陵薄葬孔子以為達禮華元厚葬春秋以為不臣古之明義也自今死亡者皆斂以時服不得兼重又不設床帳明器窆後復土滿坎不得起墳種樹王隱晉書曰庚峻遺勑子珉曰朝卒暮殯幅巾布衣葬不擇日珉奉遺命殮以時服晉中興書曰劉驎之少有信義去家百餘里有一獨嫗病將死歎息謂人曰誰當埋我唯有劉長史耳何由令知驎之先聞有病故往候之值其命終乃身為治棺殯送其仁愛惻隱若此也王隱晉書曰蘇韶安平人也為中牟令第九子名節畫日見韶入乘馬介黃練衣曰吾欲改葬乃授節為書曰吾性好愛京洛每往來瞻覩芒山上樂哉乎此萬代之基也背孟津洋洋之河南望天邑濟濟之盛此志雖未言銘之於心不啚奄忽所懷未果前至十月可速改葬買數畝地便自足矣晉書曰成都王潁死其後沒桑害東羸公騰稱為潁報讎遂出頴棺載之於軍中每事啓靈以行軍令桑敗棄棺於故井中頴故臣收之改葬於洛陽晉中興書曰王導薨詔給九旒轀輬車黃屋左纛前後羽葆鼓吹挽歌兩部虎賁班劍百人中興名臣莫與為此也晉中興書曰初溫嶠葬豫章朝議以嶠首受顧命功濟社稷宜還陪陵官為起冢太尉侃上疏停其移葬詔從之至嶠後妻何氏卒便載嶠喪還都詔令葬建平陵北并贈嶠二妻王氏何氏始安夫人印綬云
