body:
  text: 兵部二十七法令孫子曰法者曲制官道主用也曲制者部曲幡幟金鼓之制也官者百官之分用也道者糧路也主用者主軍費用卒未專親而罰之則不服不服則難用也卒已親附而罰不行者則不可用也故合之以文齊之以武文仁武法是謂必取文恩武罰令素行以教其人也令素行則人服令素不行則人不服令素信著者與衆相得也厚而不能使愛而不能令亂而不能理譬如驕子不可用也言恩不可純任還為己害左傳曰晉侯之弟楊干亂行於曲梁行軍次也魏絳戮其僕僕御也晉侯怒謂羊舌赤曰合諸侯以為榮也楊干為戮何辱如之必殺魏絳無失也夫對曰絳無二志事君不避難有罪不避刑其將來辭何辱命焉言終魏絳至授僕人書僕人晉侯御僕也將伏劍士魴張老止之公讀其書曰君乏使使臣斯司馬斯此臣聞師衆以順為武順莫敢違軍事有死無犯為敬守官行法雖死不敢有違君合諸侯臣敢不敬君師不武執事不敬罪莫大焉臣懼其死以及楊干無所逃罪懼自犯不武不敬不能致訓至於用鉞用鉞斬楊干之僕臣之罪重敢有不從以怒君心言不敢不從戮也請歸死於司寇致尸於司寇使戮也公跣而出曰寡人之言親愛也吾子之討軍禮也寡人有弟不能教訓使干大命寡人之過也子無重寡人之過聽絳死為重過敢以為請請使無死晉侯以魏絳為能以刑佐民矣反役與之禮食使佐新軍令欲顯絳故特為設禮食史記曰齊景公時晉伐阿鄄阿今濟陽郡東阿縣鄄音絹今濮陽郡鄄城縣而燕侵河上齊師敗績嬰乃薦司馬穰苴文能附衆武能威敵齊景公召穰苴與語兵事大説之以為將軍將兵扞燕晉之師穰苴曰臣素卑賤君擢之閭伍之中加之大夫之上士卒未附百姓弗信人微權輕願得君之寵臣國之所尊者以監軍乃可於是景公許之使莊賈往穰苴既辭與賈約曰旦日日中會於軍門穰苴先馳至軍立表下漏待賈賈素驕貴不甚急親戚送之留飲日中而賈不至苴仆表決漏入行軍勒兵申明約束約束既定夕時莊賈至穰苴曰何後期為賈謝曰不佞大夫親戚送之故留穰苴曰將受命之日則忘其家臨軍約束則忘其親援桴鼓之急則忘其身今敵國深侵邦內騷動士卒暴露於境君不安席百姓之命皆懸於君何謂相送乎召軍正問曰軍法後期者云何對曰當斬遂斬莊賈以徇三軍三軍之士皆震慓燕晉之師聞之悉引而歸皆復所侵之地又曰孫武以兵法見於吳王闔閭闔閭曰子之十三篇吾盡觀之可以小試勒兵乎對曰可闔閭曰可試以婦人乎曰可於是許之出宮中美人得百八十人孫子分為二隊以王之寵姬二人各為隊長皆令持戟令曰汝知而心與左右手背乎婦人曰知武曰前則視心左視左手右視右手後即視背婦人曰諾約束既畢乃設鈇鉞即三令五申之於是鼓之右婦人大笑武曰約束不明申令不熟將之罪也復三令五申而鼓之左婦人復大笑孫子曰約束不明申令不熟將之罪也既已明而不如法者吏士之罪也乃欲斬左右隊長吳王從臺上觀見且斬愛姬大駭趣使下令曰寡人已知將軍能用兵矣寡人非此二姬食不甘味願勿斬也武曰臣已受命為將將在軍君命有所不受遂斬隊長二人以徇用其次為隊長於是復鼓之婦人左右前後跪起皆中規矩繩墨無敢出聲者於是武使使報王曰兵既整齊王可試下觀之唯王所欲用之雖赴水火猶可也吳王曰將軍罷休就舍寡人不願下觀武曰王徒好其言不能用其實於是闔閭知孫子能用兵卒以為將西破強楚入郢北威齊晉又曰文帝立後六年胸奴大入邊乃以宗正劉禮為將軍軍灞上祝茲侯徐厲為將軍軍棘門以河內守周亞夫為將軍軍細柳以備胡上自勞軍至灞上棘門直馳入將軍下騎送迎已而之細柳軍士吏被甲鋭兵刃彀弓弩持滿天子先驅至不得入先驅曰天子且至軍門都尉曰軍中但聞將軍令不聞天子詔居無何上至又不得入於是上乃使持節詔將軍吾欲入勞軍亞夫乃傳言開壁門士吏謂從車騎曰將軍約束軍中不得驅馳於是天子乃案轡徐行至軍中營將軍亞夫持兵揖曰介胄之士不拜請以軍禮見應劭曰禮介者不拜也天子為動容軾車使人稱皇帝敬勞將軍成禮而去既出軍門群臣皆驚文帝曰嗟乎此真將軍矣曩者灞上棘門軍若兒戲耳其將固可襲而虜也至於亞夫可得而犯耶稱善者久之後漢書曰祭遵從征河北為軍市令舍中兒犯法遵格殺之光武怒命收遵時主簿陳副諫曰明公常欲衆軍整齊今遵奉法不避是教令所行也光武乃貰之貰猶赦也以為刺姦將軍謂諸將曰當備祭遵吾舍中兒犯法尚殺之必不私諸卿謝承後漢書曰張溫以司空加車騎將軍征韓遂丙辰引溫見於崇德殿溫以軍禮長揖不拜魏志曰曹仁字子孝少時不修行檢及長為將嚴整奉法常置科於左右案以從事吳志曰呂蒙圖關羽定南郡盡得羽及將士家屬蒙撫慰約令軍中不得干歷人家有所求取蒙麾下士是汝南民取民家一笠以覆官鎧鎧雖公物蒙猶以為犯軍令不可以鄉里故廢遂垂涕斬之晉書李特載記曰益州刺史趙廞以李庠為威寇將軍使斷北道庠素東羌良將曉軍法不用麾幟舉矛為行伍斬部下不用命者三人部陳肅然蕭子顯齊書曰李安民為徐州城局參軍王回素為安民所親盜絹二匹安民流涕於門斬之厚為殮祭軍府皆震服焉北史曰後魏孝文車駕南征以宋辨為司徒東道副將軍人有盜馬靽者斬而徇於是三軍震懼莫敢犯法又曰後魏安定王休車駕南伐領大司馬孝文親行諸軍遇休以三盜人徇六軍將斬之有詔赦之休執曰不斬何以息盜詔曰王者之體亦有非常之澤雖違軍法可特原之休乃奉詔帝謂司徒馮誕曰大司馬嚴而執法諸君不可不慎於是六軍肅然唐書曰闞稜容貌魁岸勇而多力每臨陳手持大刀長一丈一舉輒斃數人前無當者及杜伏威據有江淮之地兵皆出自群賊類多放縱有相侵奪者稜必殺之雖親故無所捨令行禁止路不拾遣後從伏威入朝拜左領軍將軍輔公祏之反也稜從軍討之及與陳正通相遇方接戰稜脫兜鍪謂賊衆曰汝不識我邪何敢來戰其衆多稜舊之所部由是各無鬭志或有遙拜者賊師遂潰又曰竇軌初入蜀將其甥從軍以為心腹嘗夜出呼之不以時至因斬之將吏重足而立見之者莫不股慓又曰哥舒翰好讀左氏春秋及漢書踈財重氣士多歸之河西節度王忠嗣以為大計軍副使安思順為大使翰常怏怏不能下之忠嗣遂使翰別為將討吐蕃于新城以同對副使為副副使不為翰用頗沮之翰怒甚脫甲撾殺之投其尸於坑中軍中股慓又曰馬燧討李懷光於河中帥步騎三萬次于絳乃分兵收下縣略禝山拔龍門降其將馮萬興任象王燧以兵圍攻絳州拔其外城其夜偽刺史王剋同與大將達奚小進棄城走降其衆四千人又遣大將李自良谷秀分兵略定聞喜夏縣萬泉虞鄉永樂猗氏六縣降其將辛兟音詵及兵五千人谷秀以犯令虜士女斬之以徇又曰德宗幸奉天詔以李晟為神策行營節度使晟軍令嚴肅所過樵採無犯自河中由蒲津而軍渭北壁東渭橋以逼朱泚時劉德信將神策兵救襄城敗於扈澗聞難率餘軍前次渭南與晟合軍軍無統一晟不能制德信因至晟軍晟乃斬之復以數騎入德信軍中撫勞軍士無敢動者晟既并德信軍軍益振又曰李晟收復都城朱泚乃與妻子及姚令言張芝等數千騎西走涇原餘兵麋散晟乃入抵丹鳳門舍軍於外朝晟處於右金吾仗舍下令曰軍中五日不得通家問違者斬之遣京兆尹李齊運告諭於衆百姓安堵秋毫無犯尚可孤軍人有擅取馬者晟大將高明曜虜賊女妓一人司馬胄音胄取賊馬二匹晟立斬之軍士皆脅息莫敢仰視翌日晟以露布聞上覽之感泣百官皆出涕因上壽稱萬歲曰李晟虔奉聖謨蕩滌凶慝然古之樹勳力復都邑者往往有之至於不驚宗廟不易市肆長安人不識旗鼓安堵如初三代已來未之有也上笑曰天生李晟為社稷萬人不為朕也百官再拜而退又曰永貞元年冬劉闢阻兵朝議討伐宰臣杜黃裳以為獨任高崇文可以成功元和元年春拜撿校工部尚書兼御史大夫充左神策行營節度使兼統左右神策奉天麟遊諸鎮兵討闢時宿將專征者甚衆人人自謂當選及詔出大驚崇文在長武練卒五千常若寇至及是中使至長武卯時宣命而辰時出師五千器用無闕者軍至興元軍中有折逆旅之匕箸者斬之以徇從閬中入遂却劍門之師解梓潼之圍又曰高崇文平劉闢王師入成都介士屯于大造軍令嚴肅珍貨山積巿井不移無秋毫之犯又曰郗士美為昭義節度使朝廷討王承宗士美遣兵馬使王獻領卒一萬為前鋒獻凶惡恃亂逗撓不進遽令召至數其罪斬之下令曰敢後出者斬士美親鼓之兵既合而賊軍大敗下三營環柏鄉屢以捷聞上大悅曰吾固知士美之能辦吾事于時四面七八鎮兵共十餘萬以環鎮冀未有首功多犯法士美兵士勇敢畏法聲甚振承宗大懼指期有破亡之勢會詔班師至今兩河間稱之又曰李師道攻徐徐將王智興敗賊壁獲美妾智興懼軍士爭之乃曰軍中有女子安得不敗此雖無罪違軍法也即斬之以徇韓子曰吳起為魏武侯西河之守奏有小亭臨境吳起欲攻之乃倚車轅於北門外而令之曰有能徙此南門之外賜之上田上宅民莫之徙也或有徙之者遂賜之如令俄又置一石赤黍於東門之外而令之曰有能徙之於西門之外者賜之如初民則爭徙之乃下令曰明日攻亭有能先登者仕之國大夫賜之上田上宅民爭上於是攻亭一朝而拔之尉繚子曰古之善用兵者能殺卒之半其次殺其十三其下殺其十一殺其半者威立海內殺其十三者力加諸侯殺其十一者令行士卒故曰百萬之衆不鬭不如萬人之尸萬人不死不如百人之賊賞明如日月信比如四時令嚴如斧鉞而出卒有不死者未嘗聞也六韜曰武王問將何為威太公曰殺一人萬人懼者宜殺之殺一人三軍不知雖多殺其將不重也淮南子曰勾踐決一獄不辜援龍淵而切其股血流至足故戰武士必死魏武軍令曰兵欲作陳對敵營先白表乃引兵就表而陳皆無歡譁明聽鼓音旗幡麾前則前麾後則後麾左則左麾右則右不聞令而擅前後左右者斬伍中有不進者伍長殺之伍長不進什長殺之什長不進都伯殺之督戰部曲將拔刃在後察違令不進者斬之一部受敵餘部有不進救者斬之武侯兵法曰軍有七禁一曰輕二曰慢三曰盜四曰欺五曰背六曰亂七曰誤此治軍之禁也若朝會不到聞鼓不行乘寬自留回避務止初近而後遠喚名而不應軍甲不具兵器不備此謂輕軍有此者斬之受令不傳傳之不審以惑吏士金鼓不聞旌旗不覩此謂慢軍有此者斬之食不廩糧軍不部兵賦賜不均阿私所親取非其物借貸不還奪人頭首以獲功名此謂盜軍有此者斬之若變易姓名衣服不鮮金鼓不具兵刃不磨器仗不堅矢不著羽弓弩無絃主者吏士法令不從此謂欺軍有此者斬之聞鼓不行叩金不止按旗不伏舉旗不起指麾不隨避前在後縱發亂行折兵弩之勢却退不鬭或左或右扶傷舉死因託歸還此謂背軍有此者斬之出軍行將士卒爭先紛紛擾擾軍騎相連咽塞道路後不得前呼喚喧譁無所聽聞失行亂次兵刃中傷長將不理上下縱橫此謂亂軍有此者斬之屯營所止問其鄉里親近相隨共食相保呼召不得越入他位干誤次第不可呵止度營出入不由門戶不自啓白姦邪所起知者不告罪同一等合人飲食阿私所受大言驚語疑惑吏士此謂誤軍有此者斬之衛公兵法曰古之善為將者必能十卒而殺其三次者十殺其一三者威振於敵國一者令行於三軍是知畏我者不畏敵畏敵者不畏我如曰盡忠益時輕生重節者雖讎必賞犯法怠情敗事貪財者雖親必罰服罪輸情質直敦素者雖重必捨遊辭巧飾虛偽狡詐者雖輕必戮善無微而不贊惡無纖而不貶斯乃勵衆勸功之要術也昔馬謖音縮軍敗葛亮對泣而行誅鄉人盜笠呂蒙先涕而後斬馬逸犯麥曹公割髮而自刑兩掾辭屈黃蓋詰問而俱戮故知威克其愛雖少必濟如愛勝其威雖多必敗蓋賞罰不在重在必行不在數在必當故尉繚子曰吳起與秦人戰戰而未合有一夫不勝勇乃怒而前獲首而返吳起斬之吏曰此壯士也不可斬吳子曰雖壯士不從令者必斬之又曰褰旗斬將陷陳摧鋒上賞破敵所得資物僕馬等並給戰士每收陳之後禆將虞候輩收斂對揔管均分之與敵鬭旗頭被傷救得者重賞漏泄軍事斬之背軍逃走斬之後期斬之有故不坐行列不齊旌旗不正金革不鳴斬之與敵私交通斬之言語書疏并同或説道釋祈禱鬼神陰陽卜筮災祥訛言以動衆心并與其人往還言議斬之無故驚軍叫呼奔走謬言煙塵斬之凡令覘候或更相推託謬説事宜兼復漏泄者斬之吏士所經歷侵掠者斬之姦人妻女及將婦女入營斬之不戰而降敵沒其家凡有私讎須先言令其避仇若不言因戰陳報復者斬之布陳旗亂吏士驚惶罪在旗頭斬之陳定或輒進退或對敵亂行者前後左右所平之行便斬之或有弓弩已注失而回顧者或干行失位者後行斬之前行不動行斬干失之行守圍不固一火及主吏並斬之遇敵攻圍危急若前後左右部隊不救致陷者全部隊皆斬之設奇伏掩襲務應機速捷前將先合後將即副進退應接乖者並斬之為敵所乘失旗鼓節鉞罪全陳斬之戰敵旗頭被敵殺爭得尸首免坐不得者一旗並斬之凡戰敵失主將隨從者皆斬之一將禦敵裨將已下等羌主率不齊力同戰更相救助者任便斬之吏士雖破敵濫行戮殺發冢焚廬踐稼穡伐樹木者斬之禽獲敵人或有來降者直領見揔帥不得輒訪問敵中事若違因而漏泄者斬之破敵先虜掠者斬之入敵境同凡隱欺破虜所收獲及吏士身死有欺隱其資物兼違令不收恤者斬之違揔率一時之令斬之
