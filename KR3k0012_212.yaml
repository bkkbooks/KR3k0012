body:
  text: 職官部九左右僕射漢書百官表曰僕射秦官也古者重武官有主射以督課之自侍中尚書博士及騶宰永巷皆有僕射取所領之事以為號若尚書則名曰尚書僕射東觀漢記曰鮑永字君長拜僕射行將軍事將兵安集河東永好文德行軍常皂襜路稱鮑尚書兵後漢書曰郅壽為尚書僕射是時大將軍竇憲以外戚之寵威傾天下憲常使門生齎書詣託壽有所請託壽即送詔獄前後上書陳憲驕恣引王莽以誡國家又曰鄭崇字子游為尚書僕射數見諫諍上笑曰我識鄭尚書履聲續漢書曰尚書僕射一人六百石令不在則奏下衆事魏志曰毛玠字孝先為尚書僕射時太子未定立臨淄王植有寵玠諫曰近袁紹以嫡庶不分覆宗滅國廢立大事非所宜聞會玠起更衣太祖謂左右曰國之司直我之周昌又曰徐宣為左僕射後加侍中車駕幸許昌宣揔統留事帝還主者奏呈文書詔曰朕省與僕射何異竟不視又曰文帝時欲以賈詡為僕射詡曰尚書僕射官之師長天下所望詡名不素重非以服人詡縱昧於榮利奈國朝何魏略曰李豐字安國為侍中僕射在臺閣常多託疾時臺制滿百日當解祿豐未滿百日暫起巳而復臥如是數歲及太傅宣王久病曹爽攝政豐依違二公間故時人有謗書曰曹爽之勢熱如湯太傅父子冷如漿李豐兄弟如遊光其意以為豐雖外示清淨而內圖事有似遊光吳志曰諸葛恪既定山越孫權使尚書僕射薛綜勞軍曰故遣中臺近官迎致犒賜晉書曰荀顗代陳泰為僕射吏部四辭而後受又曰太康元年以山濤清虛恬簡轉為左僕射又曰魏舒太康初拜右僕射舒與衛瓘山濤張華等以六合混一宜同古典封禪東嶽前後纍陳其事帝謙讓不許晉起居注曰武帝太康四年詔曰吏部掌敘人倫治化之本也宜得忠正舊德尚書右僕射魏舒寬泰弘毅潛通有才識其以舒為左右僕射領選曹又曰永昌元年詔曰尚書分置左右僕射所以廣登賢俊經始萬機護軍周顗可左僕射領軍王遂可右僕射又曰尚書高陽王圭忠允善政思量弘濟蒞官盡心所居著稱其以圭為右僕射又曰太康元年詔曰尚書置左右僕射所以恢演治典協宣庶政謝靈運晉書曰古者重武事貴射御取其捷御如僕各置一人尚書六人謂之八座參攝百揆出納王命古元凱之任也干寶晉紀曰武帝詔曰散騎常侍中軍將軍羊祜秉德清徑經緯文武雖處腹心之任不揔樞機之重非垂拱無為委任責成之意也以祜為尚書左僕射衛將軍晉諸公贊曰司馬圭少時有令望早歷顯職晉受禪為尚書左僕射時年三十七衆論以為美晉書百官注曰僕射一人銅印墨綬五時朝服納言幘進賢冠佩水蒼玉官品第三俸月四十五石晉公卿禮秩曰尚書僕射魏晉以來或置左右或不置晉中興書曰顧和康帝即位為尚書僕射以母老固辭詔勑特諭暮出朝還其優遇如此又曰紀瞻字士遠為右僕射肅祖嘗內殿慨然憂天下曰社稷之臣欲無十人如何因數之云君便是一人瞻謝曰臣不敢聞命肅祖曰方欲善語云何復崇謙讓耶瞻以年在懸車自陳告老詔曰豈朕德薄不足以為治乎又曰王珣拜尚書左僕射領吏部時烈宗雅好典籍深欽愛之與殷仲堪徐邈並以才學文章為上所昵桓玄答道子箋云王珣明悟踈徹風流之美雖逼於同異才用不盡然君子在朝所益自多也又曰刁協字玄亮除左僕射時中興草創制度未立朝臣無練習舊儀者唯協以久在中朝加性聰朗多諳故事朝廷憲體出入威儀唱讚一皆稟於協當時稱為強記宋書曰劉延孫為尚書左僕射延孫疾病不任拜起上使乘船自清溪至平昌門仍入尚書下舍又曰漢制御史中丞遇尚書令僕丞郎車皆預相回避臺官過乃得去令尚書令上朝及下禁斷行人猶其制也尚書漢稱臺魏晉巳降方號曰省又王弘為僕射奏彈康樂侯謝靈運淫其㜸女殺興胡江涘請免官削爵付大理內臺舊體不得用風聲舉彈此事彰赫暴之朝野不敢拱默武帝令免官而巳又曰王裕之元嘉三年為尚書僕射所署文案初不省讀嘗豫聽訟上問疑獄敬弘不對上變色問左右何故不以訊牒副僕射敬弘曰臣乃得訊牒讀之正自不解上甚不悅齊書曰王延之轉左僕射宗德既衰太祖輔政朝野之情人懷彼此延之與尚書令王僧虔中立無所去就時人為之語曰二王持平不送不迎太祖以此善之又曰張緒帝欲用緒為右僕射以問王儉儉曰緒少有清望誠美選也南士由來少居此職褚彥回曰儉少年或未憶耳江左用陸玩顧和皆南人也儉曰晉昏衰政不可為則齊職儀曰魏朝以尚書僕射毛玠領選曹晉武以僕射領吏曹後依擬至今或領焉南燕書曰慕容德以右僕射封嵩為左僕射尚書韓𧨳為右僕射時嵩𧨳並年三十又以嵩弟融為西中郎將𧨳弟軌為中郎將嵩等俱拜帝臨軒詔令四人同入嵩等升殿方謝帝顧曰躍二龍於長衢騁雙驥於千里朝野榮之後魏書曰郭祚為右僕射時議定新令詔祚與侍中門下參議刊正故事令僕射中丞騶唱而入宮至於馳道及祚為僕射以為非盡敬之宜言於帝納之下詔御在太極騶唱至止車門御在朝堂至司馬門騶唱不入宮自此始也又曰趙善為尚書右僕射性溫恭有器局雖位居端右而愈自謙退其職務克舉則曰某官之力有罪責則曰善之咎也時人稱其有公輔之量又曰元順除吏部尚書右僕射及上省登階向榻見榻甚故問都令史徐仵仵起曰此榻曾經先王坐順即哽塞涕泗交流久而不能言遂令換之又曰陽平王新成之子欽字思若纍遷尚書右僕射欽色黑故時人號為黑面僕射三國典略曰東魏以孫騰兼尚書左僕射府庫關鑰一以委之又曰北齊王晉明豪侈有氣俠留心經史招引賓客嘗為尚書右僕射百餘日便謝病而退告人云廢人飲酒安能作刀筆吏披故紙乎北齊書曰高隆之為尚書右僕射時初給民田貴勢皆占良美貧弱咸受塉薄隆之啓高祖悉更反易乃得均平後周書曰周惠達為右僕射自關右草創禮樂𡙇然惠達與禮官損益舊章至是儀軌稍備魏文帝因朝奏樂顧謂惠達曰此卿之功也又曰李遠除尚書左僕射遠白太祖曰遠秦隴匹夫才藝俱闕平生念望不過一郡守耳遭逢際會得奉聖明主貴臣遷以至於此今位居上列爵邁通侯受委方面生殺在手非直榮寵一時亦足光華身世但尚書僕射任居端揆今以賜授適所以重其罪責明主若欲全之乞寢此授太祖曰公勳德兼美朝廷敬屬選衆而舉何足為辭且孤之於公義等骨肉豈容於官位之間便致退讓深乖所望也遠不得巳方拜職陳書曰袁憲遷右僕射參掌選事先是憲長兄簡懿為左僕射至是憲為右僕射臺省目簡懿為大僕射憲為小僕射朝廷榮之隋書曰楊素為右僕射與高頴專掌朝政後文帝漸踈忌素詔曰僕射國之宰輔不可躬親細務但三五日一度向省平論大事外示崇重實奪其權唐書曰太宗謂房玄齡杜如晦曰為僕射當須廣開耳目求訪賢哲有武藝謀略才堪撫衆者任以邊事有經明德行性理通悟者任以侍臣有明幹清愨處事公平者任以劇務有學通今古識達政術者任以理人此乃宰相之弘益也比聞聽受辭訟日不暇給安能助朕求賢哉因勑尚書細務屬左右丞唯枉屈大事合聞奏者關於僕射又曰載至德為僕射時與劉仁軌更日受詞訟嘗有老母經省陳詞至德巳收牒省視老母前曰本謂是解事僕射所以來訴公乃是不解事僕射請却付牒來也至德笑而還之議者尤稱其長者焉又曰元和中裴均為僕射於尚書省都堂上事其送印及呈孔目唱案授案皆使尚書郎為之文三品巳上官升階列坐四品五品及郎官御史拜於廳下然後召御史中丞左右丞升階答拜初開元中張說為右丞相因製儀注自極尊大自非中書門下及諸三品巳上官是日皆坐受拜或徵其所從來答曰聖曆中王及善豆盧欽望同日拜文昌左右丞亦同此儀當時以說方承恩寵不敢復詰因為故事非舊典也均交結權幸而得貴位在班列嘗踰位而立御史中丞盧坦請退之均不受坦曰姚南仲為僕射例如此曰南仲何人坦曰南仲是守正而不交權幸者也尋罷坦為右庶子時人歸咎於均又曰寶歷中左僕射李絳與御史中丞王璠相遇於道璠車不為之却因上言故事云左右僕射師長庶寮開元中以為左右丞相其後雖去三事機務猶揔百司之權表狀之中不署其姓尚書巳下每月合衙上日百寮列班宰相送上中丞御史列位於庭禮數之崇中外特異所以自武德貞觀巳來聖君賢臣布政除弊不革此禮謂為合宜茍有不安尋亦合廢近年緣有才不當職恩加特拜者遂從權便不用舊儀酌於群情事實非當今或有僕射初除就中丞院門相見者即與就參何殊或中丞新授亦無見僕射之處又參賀處或僕射先至中丞後來憲度乖宜尊卑倒置儻人才忝位自合別授賢良若朝命守官豈得有虧法制伏望下百寮重詳定事體使永可遵行奉勑宜令左右常侍諫議大夫給事中中書舍人詳議聞奏元和中太常博士韋謙舉奏削去舊儀今絳上論於體甚當然其時璠黨方盛致絳改官共寢其儀又曰李程大和中為左僕射中謝日奏曰臣所忝官上禮前後儀注不同在元和長慶中僕射數人上日不受四品巳下官拜近日再定儀注四品巳下官悉許受拜王涯竇易直巳行之於前今御史云巳聞奏太常寺定取十五日上臣進退未知所據時中丞李漢以為受四品巳下拜太重勑曰僕射上儀近巳詳定所緣拜禮皆約令文巳經施行不合更改宜准大和四年十一月十六日勑處分鍾離意別傳曰意為尚書僕射其年胸奴來降詔賜縑三百匹尚書侍郎暨酆受詔誤以三千匹賜胸奴詔大怒鞭酆欲死意獨排省閣入諫明帝以合大義恚損怒消帝謂意曰非鍾離尚書朕幾降威於此郎世說曰周伯仁過江積年恆大飲酒嘗經三日醒時人謂為三日僕射唐書官品志曰僕射為執法置二則為左右僕射皆與令同左糾彈而右不糾彈唐新語曰自武德至長安四年巳前僕射並是正宰相故太宗謂房玄齡等曰公為宰相當須大開耳目求訪賢哲即其事也神龍初豆盧欽望為僕射不帶同中書門下三品不敢參議政事後加知軍國事韋安石為僕射東都留守自後僕射不知政事
