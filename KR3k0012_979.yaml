body:
  text: 菜茹部三瓜易夬卦曰九五以杞瓠瓜含章有隕自天杞木之柔者瓜之果大者龍魚河圖曰瓜有兩鼻者煞人詩曰文王之興本由太王也綿綿瓜瓞民之初生自土沮漆興也箋云瓜之本實繼先歲之瓜必小狀似瓞故謂之瓞綿綿然若將無長大時興者喻后稷乃帝礜之曹封於部其後公劉失職遷于幽居沮漆之地歷世亦綿綿然至太王而得其民心而生王業故本周之興云于沮漆也大戴禮曰五月乃瓜乃者治瓜之辭也瓜也者始食瓜八月剝瓜蓄瓜時也禮曰為天子削瓜者副之巾以絺副拆也既削四祁之乃橫斷而巾覆焉為國君華之巾以綌華中製之不四折也為大夫纍之果倮也倮不巾覆也士疐之不中裂橫斷去疐而已音帝庶人齕之不橫斷又月令曰仲冬之月行秋令則天時雨汁瓜瓠不成雨汁者水雪雜下左傳曰齊侯使連稱管至父戊葵丘瓜時而往曰及瓜而代朞戍公問不至請代不許故謀作亂春秋運斗樞曰遠雅頌著倡優則李生瓜論語曰子路曰佛肸以中牟叛子之欲往也如之何子曰然有是言不曰堅乎磨而不磷不曰白乎涅而不緇吾豈匏瓜也哉焉能繫而不食爾雅曰瓞大結切瓝步角切其紹瓞郭璞注曰俗呼瓝瓜為瓞紹者瓜蔓緒亦著子但小如瓝耳史記曰邵平者故秦東陵侯秦破為布衣貧種瓜長安城東瓜美故世謂東陵瓜漢書地理志曰燉煌古瓜州地生美瓜續漢書曰牽牛星荊州謂之河鼓主閞梁織女主瓜果又曰安帝元初三年有瓜異本共生一瓜蒂時以為瓜者外焉離本而實女子外屬之象也是時閻皇后與外親耿寶共譖太子廢為濟陰王更外迎濟北王子犢立之袁山松後漢書曰建和二年河東瓜兩體共蒂後漢書曰施建字君子沛人也家貧母老常鬻力供養種瓜自給應劭漢官儀曰太官果丞官別在外掌果瓜菜茹吳志曰步騭字子山臨淮淮陰人避難江東單身窮困與廣陵衛旌同年相善俱以種瓜自給晝勤四體夜誦經傳會稽焦征羌郡之豪族吳録曰征羌名矯嘗為征羌令人客放縱騭與旌求食其地懼為所侵乃共修剌奉瓜也吳録曰姚翁仲嘗種瓜菜灌園以供衣食時人或餉一無所受晉書昌咸寧二年嘉瓜同蒂生於成都又曰皇甫謐年二十不學遊蕩無度或以為癡嘗得瓜果輒進叔母任氏任氏曰孝經云三牲之養猶為不孝汝今年餘二十目不存教心不入道無以慰我皇甫謐自敘同又曰桑虞仁孝自天年十四喪父毀瘠過禮虞有園宅北數里瓜果初熟有人踰垣盜之虞以園援多棘㓨恐偷見人驚走而致傷損乃使奴為之開道及偷負瓜將出見道通聞虞使除之乃送所盜瓜叩頭請罪歡然盡以瓜與之齊書曰建元初武帝即位郅撝為司徒左長史先是武帝與撝同從宋明帝射雉郊野渴倦撝得青瓜與上對剖食之又曰竟陵王子良夏月客至為設瓜飲又曰郭原平以種瓜為業大明七年大旱瓜瀆不復通船縣令劉僧秀其窮老開瀆下水與之原平曰普天大旱百姓俱困豈可滅溉田之水以通運瓜之船乃步他道往錢塘貨賣沈約齊紀曰韓靈敏早喪父兄靈珍至孝母亡家貧無以葬與靈珍種瓜靈敏朝採暮還復生未嘗減耗葬事由此舉孝子傳同梁書曰任昉卒武帝間問方食西菀緑沉瓜投之於盤悲不自勝因屈指曰昉少時常恐不滿五十今四十九可謂知命又曰郭祖深清儉常服故布衣素木按食不過一肉有姥餉一青瓜祖深報以匹帛有富人效之以貨鞭而徇衆朝野憚之又曰鄭灼字茂昭勵志好學多苦心熱若瓜時輒偃臥以瓜鎮心起便讀誦其篤志如此北齊書曰蘭欽為廣州刺史前刺史新渝侯映之夢南安侯恬權行州事冀得即真及聞欽至嶺厚貨廚人塗刀以毒削瓜進之欽及愛妾俱死帝聞大怒檻車收恬削爵土後魏書曰楊愔典選多以言貌取人時謗詞云尚書典選似貧人買瓜唯取大者又曰郭祚以本官領太子少師祚曾從世宗幸東宮肅宗幼弱祚懷一黃㼐出奉肅宗時應詔左右趙挑弓深為世宗所信祚私事之時人謗祚者號為挑弓僕射黃㼐少師後周書曰王羆性儉率嘗有客與羆食瓜客削瓜侵膚稍厚羆意嫌之及瓜皮落地乃引手就地取而食之客甚有愧色又曰趙王招知隋文欲遷周鼎密欲圖之藏兵刃於帷席之間後院亦伏壯士文帝從者多在閣外唯楊弘元胄坐於戶側招以佩刀割瓜啖隋文未之疑元胄覺變扣刀而入招乃以大觴親飲胄酒北史曰宋瓊字普賢以孝稱母曾病季秋月思瓜瓊夢想見之求而遂獲時人異之隋書曰文帝用法定制行署取一錢已上聞見不告言者坐至死自此四人共盜一榱桶三人同竊一瓜事發即時行決又曰秦孝王俊奢侈過甚頗好於內妃崔氏性妒甚不平之遂於瓜中進毒俊由是遇疾徵還京師上以其奢縱免官以王就弟唐書曰杜如晦薨後太宗食瓜美愴然思之遂輟其半使置之於靈座又曰高宗子八人武后所出者自為行第長曰孝敬皇帝監國仁明為后所忌而鴆之次曰雍王賢為太子次曰中宗次曰睿宗及孝敬遇害諸第嘗所不安晨夕懷懼雖父母之前無由敢言乃作黃台臺瓜詞令樂人歌之欲微悟上意歌曰種瓜黃臺下瓜熟子離離一摘使瓜好再摘令瓜稀三摘尚由可四摘抱蔓歸然太子竟亦流竄於黔州又曰德宗建中初誤以高力士養女楊氏婦為沈太后是時沈氏故老已盡無識太后者上密使中人就洛陽視高氏年狀頗同曩時太后嘗削瓜哺上刃傷左拇指高氏嘗剖瓜亦傷左拇指中人皆閹官女子且非審識太后見上仁孝有殊喜莫敢沮者高氏辭曰實非太后具陳族姓內外以自明又曰貞元四年夏右神策軍獻瑞瓜三蔓各為一蒂而生三瓜莊子曰朽瓜化為魚物之變也墨子曰今有入人場園取人瓜者得罰今之諸侯攻伐踰竊人瓜者數千萬而自曰義也秦子曰食瓜者雖去蒂何以連其根孫鄉子曰皋陶之色如削瓜抱朴子曰五原蔡誕入山而還欺家人云至崑崙山有玉瓜其形如世間瓜但為光明洞徹而堅須以玉井水洗之便軟而可食又曰曾參鋤瓜三足烏集其冠孝故也家語曰曾子藝瓜而誤斷其根曾晢怒以大杖擊其背曾子仆地有頃乃蘇孔子聞之告門弟子曰參來勿內也曾子使人請孔子孔子曰舜之事瞽瞍小捶則受大捶則走參委身以待暴怒既身死陷父於不義不孝孰大焉古文奇字曰秦改古文為大篆及隸字周人多誹謗怨恨秦苦天下不從而諸生到者拜為郎凡七百人蜜種瓜於驪山硎谷中溫處瓜實成使上書曰瓜冬有實有詔下博士諸生說之人人各異說則皆使往視之而為伏機諸生賢儒皆至焉方相難不泱因發機從上填之以土皆壓終古文璅語曰初刑史子臣謂宋景公從今已往五月五日臣死後五年五月丁巳吳亡以後五祀八月辛巳君薨刑史子臣至死日朝見景公夕死後吳亡景公懼思刑史子臣之言將至死日乃逃於瓜圃遂死之求得已蟲矣賈誼新書曰昔梁大夫宋就為邊縣令與楚鄰界梁亭楚亭皆種瓜梁亭劬力數灌其瓜美楚人窳而稀灌其瓜惡楚令以梁瓜之美怒其瓜之惡因往夜竊搔梁瓜皆有焦者矣梁亭覺請其尉欲執搔楚瓜宋就曰是搆怨分禍之道也令人竊為楚亭夜灌其瓜令勿知也楚亭旦而往瓜則已灌瓜日以美楚亭往而察之則梁亭之為也楚令大悅因以聞楚王楚王聞之悅梁之陰讓也乃謝以重幣而友於梁王新序同裴淵廣州記有瓜冬熟號為金敘味乃甜美廣志曰瓜之所出以遼東廬江燉煌之種為美有鳥瓜貍頭瓜蜜筒瓜女臂瓜龍蹄瓜羊髓瓜又有魚瓜犬瓜如斛出涼州陽城有青登瓜大如三升魁有桂枝瓜長二尺餘蜀地溫食瓜至冬熟有春日瓜細小小瓣宜藏正月種三月成有秋泉瓜秋種十月熟形如羊角色蒼黑列仙傳曰溪人者南郡編人居山間有仙人常止其家從之買瓜教之練瓜與附子桂實服之一年能飛登山入水往來海邊又曰服閭者不知何許人常往來海邊諸祠中有三仙於祠中博賭瓜雇閭使擔黃瓜數十頭令瞑目乃上方大山神仙傳曰葛公冬為客設生瓜漢武內傳曰西王母謂上元夫人曰後造朱炎山陵食靈瓜其味甚好顧此未久已七千歲矣又曰仙之上藥有空同靈瓜四劫一實也道學傳曰褚雅字玄通人與共居常取水灑掃或夏月種瓜恣人來取伏侯古今注曰孝平帝元年武陵縣生瓜花如蔥紫色實如小麥墮地復生郭子橫洞冥記曰有龍肝瓜長一尺花紅葉素生於冰谷所謂冰谷素葉之瓜零陵仙賢傳曰李融字元者承陽人固始侯相使其為政得吏民心屢致祥瑞甘瓜六子共莖璽書慰勞遷廣漢太守南嶽夫人內傳曰夫人姓魏名華存性樂神仙季冬之月夜半清明有四真人並可年二十餘天姿秀頴至靜室因設酒肴陳玄紫撩降實靈瓜太上黃庭內景經注曰大霍山下有洞臺司命君之府也中有神靈瓜食之者至玄也荊楚歲時記曰七月七日設瓜果於庭中以乞巧有喜子布網於瓜上則為得巧劉向別録曰尹都尉書有種瓜篇鄭玄別傳曰民有獻嘉瓜者異本同實縣欲表府文詞鄙略君為改作又著頌一篇侯相高其才吳越春秋曰吳夫差為越所敗遁而去得自生之瓜其實已熟掇而食之問左右曰是乃冬有瓜近道而人不食何也左右曰盛夏之時人食生瓜起居道傍瓜子復生故人惡食夏侯曾先會稽記曰曹娥父溺死娥見瓜浮其豦即得父尸博物志曰人以冷水自漬至𣍿可頓啖數十枚瓜漬至腰啖轉多至頸可啖百餘枚所漬水皆作瓜氣瓜味搜神記曰吳時有徐光常行幻術於市里從人乞瓜其主弗與便從索瓣種之俄而瓜蔓延生花實乃取食之因賜觀者及視所齎皆亡耗矣幽明録曰安定人周敬種瓜時亢旱鬼為槤音輦水澆瓜瓜大滋繁問姓名不答還白父嘗有惠於人否父曰西郭樊營先作郡吏償官數百斛米我時以百斛助之其人已死又曰孫鍾富春人堅父也與母居至孝篤信種瓜為業有三少年容服妍麗詣鍾乞瓜愛樂無已為設食出瓜禮敬殷勤臨去曰我等司命感郎見接之厚送出門三人曰山中可作冢復言欲連世封侯為數世天子鍾曰數世天子言訖悉化成白鵠列異傳曰遼東丁伯昭自說其有客字次節既死感見待恩常為本家致奇異物試臘月中從索瓜得美瓜數枚來在前不見形也述異記曰豫章郡有盧松村羅根生於此村側墾荒種瓜又於外立一神壇瓜始引蔓清晨行之忽見壇上有新板墨書曰此是神地所遊處不得停止種殖可速去根生拜謝跪呪曰竊疑村人利此熟地生苗容或假託神旨以見驅斥審是神教願更朱書賜報明早往看向板猶存悉以朱代墨任昉述異記曰漢章帝元年上虞獻雙蒂瓜一實五色又曰吳桓王時會稽生五色瓜今吳有五色瓜歲充貢獻五行記曰梁吏部尚書何敬容夏患瘧疾寄在蔣山道士館時忽見一人玄衣大帽立在帳側自稱楊胡靈將瓜四枚云與公少時言訖因不見後數月敬容以罪免官本草經云瓜一名土芝吳氏本草曰瓜子一名瓣七月七日採可作面脂劉禎瓜賦曰禎在曹植坐廚人進瓜禎為立成辭曰含金精之芳流冠衆瓜而作珍設諸清流一浮一藏片以金刀四剖三離承之雕盤幕以纖絺甘侔蜜房冷甚冰圭嵇含甘瓜賦序曰世云三芝瓜處一焉謂之土芝張載瓜賦曰羊骹虎掌桂枝蜜筒玄表丹裏呈素含紅豐敷外偉緑瓤內醲傅玄瓜賦曰白者如素黑者如漆黃踰金箱青侔含翠舊有蜜筒及青括樓嘉味溢異鮮類寡疇一齧之頃至三搖頸細飢蜜理多瓤少瓣豐旨絶異食之不䬼音烏懸切陸機瓜賦曰夫其種族頭數則括樓定桃黃扁白搏金叉蜜筒小青大班玄骭音幹素腕貍首虎磻東陵出於秦谷桂髓起於巫山夏侯孝若梁田賦曰入果林造瓜田摘虎掌拾黃班落蒂離母漬以寒泉左思蜀都賦曰其圃有瓜疇芋區王廙洛都賦曰瓜則桂枝括樓緑瓤青飢消暑湯䬼解渴療飢樂府歌詩曰君子防未然不處嫌疑間瓜田不納履李下不整冠古詩曰甘瓜抱苦蒂美草生荊棘愛利防有刀貪人自還賊阮藉詩曰昔聞東陵瓜近在青門外連畛短阡陌母子相拘帶張華真人篇曰朱李生東苑甘瓜出西郊曹植求祭先王表曰乞請水瓜五枚
