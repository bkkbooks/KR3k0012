body:
  text: 學部一敘學易文言曰學以聚之問以辨之白虎通曰學之言覺也覺悟所不知也論語為政云子曰學而不思則罔思而不學則殆又曰衛靈公曰君子謀道不謀食耕也餒在其中學也祿在其中又曰生而知之者上也學而知之者次也困而學之又其次也困而不學民斯為下矣禮記學記曰君子之於學也藏焉修焉息焉遊焉又曰善問者如攻堅木先其易者後其節目又曰學不學操縵不能安弦操縵雜弄不學博依不能安詩博依廣譬喻也又曰善學者師逸而功倍又從而庸之不善學者師勤而功半又從而怨之又曰凡學之道嚴師為難師嚴然後道尊道尊然後民知敬學又曰善待問者如撞鍾叩之以小者則小鳴叩之以大者則大鳴又曰玉不琢不成器人不學不知道是故古之王者教學為先也國語曰文公問元帥於趙襄曰郤縠可行年五十矣守學彌惇夫學先王之法義之府也又曰范獻子聘於魯問具敖山魯人以鄉對獻子曰不為具敖乎對曰先君獻武之諱也獻子歸遍戒其所知曰人不可以不學吾適魯而名其二諱為笑焉唯不學也人之有學猶木之有枝葉猶庇蔭人而況君子乎家語曰子路見孔子孔子問曰何好曰好長劍子曰以子之能加之以學豈可及乎子路曰學豈有益哉子曰狂馬不釋策御狂馬者不得釋箠策也操弓不反檠弓不反檠然後可持木受繩則正人受諫則聖受學重問孰不順成子路曰南山有竹不揉自直斬而用之達於犀革何學之為孔子曰括而羽之鏃而厲之其入不益深乎子路拜曰敬受命又曰孔子謂伯魚曰吾聞可以與人而不倦者其唯學焉其容體不足觀也其勇力不足憚也其先祖不足稱也其族姓不足道也然而以顯聞四方流聲後世者非學之效夫遠而有光者飾也近而愈明者學也譬之池也水潦注焉雚葦生焉雖觀之孰知其不源乎源衆流也言益者雖從外入及其用之誰知其非從己出也又曰孔子兄子孔蔑者與宓子賤皆仕孔子問孔蔑曰女之仕何得何亡對曰所亡者三王事若聾若聾宜為聾相因聾之也學焉得習是學不得明也奉祿少饘粥不及親戚是骨肉益疏也公事多急不得弔死問疾是朋友道闕也孔子不悅往過子賤而問之對曰自來仕所得者三始誦之今得行之是學益明也奉祿被親戚是骨肉益親也雖有公事兼之以弔死問疾是朋友信篤也孔子曰君子哉若人魯無君子斯焉取斯大戴禮曰學不可以已矣青取之於藍而青於藍冰水為之而寒於水木直中繩其曲中規揉使之然也是故不登高山不知天之高不臨深淵不知地之厚不聞先王之道不知學問之大也孔子曰吾終日思之不如須臾之學吾嘗而望矣不如升高之博見也升高而招臂非加長而見者遠順風而呼聲非加疾而聞者速蓬生麻中不扶自直積土成山風雨興焉積水成川蛟龍生焉是故不積跬步無以致千里不積小流無以成江海莊子曰人而不學謂之視學而不行命之撮囊撮繫者也又曰叔文相莒三年歸其母自績謂母曰文相莒三年有馬千駟今母猶績文之所得事皆將棄之已母曰吾聞君子不學詩書射御必有博塞之心小人不好田作必有竊盜之心婦人不好紡績織絍必有淫泆之行好學為福也猶飛鳥之有羽翼也又曰魯有兀者叔山無趾踵見仲尼仲尼曰子不謹前既犯若是矣雖今來何及矣無趾曰吾唯不知務而輕用吾生是以亡足今吾來也猶有尊足者存焉吾是以務全之也無趾出孔子曰弟子勉之無趾兀者也猶務學以復補其前行之惡況全德之人乎韓子曰如脂粉則嫫母進御家不潔則西施棄野學之為脂粉亦厚矣又桓範世要云學者人之脂粉也又曰夫耕之用力也勞而民為之者可得而富之也戰之為事也危而民為之者可得以貴也今修文學習談論則無耕之勞而有富之實無戰之危而有貴之尊則人孰不為也管子曰明主不厭人故能成其衆士不厭其學故能成其身也曾子曰君子愛人以學及時而行難者弗避易者弗從年四十無藝則無藝矣五十不以善聞則無聞矣墨子曰墨子謂門人曰汝何不學對曰吾族無學者墨子曰不然豈有好美者而曰吾族無此不欲耶富貴者而曰吾族無此不用也新序曰齊王問墨子曰古之學者何如對曰古之學得一善言以附其身今之學得一善言務以説人也尸子曰未有不因學而鑒道不假學而光身者也又曰今人皆知砥礪其劍而弗知砥礪其身夫學身之砥礪也又曰水積則生吞舟之魚土積則生楩楠豫樟學積亦有生焉慎子曰孔子曰丘少而好學晚而聞道此以博矣孫卿子曰不登高山不知天之高不聞先王之遺言不知學問之大也又曰君子之學入乎耳著乎心布乎四支形乎動靜小人之學出乎口入乎耳口耳之間四寸耳曷足以美七尺之軀又曰不學不成堯學於君疇舜學於務成昭禹學於西王國文子曰上學以神聽中學以心聽下學以耳聽耳聽者學在皮膚心聽者學在肌肉神聽者學在骨髓呂氏春秋曰善學者若齊王善雞必食其跖數千而後足跖雞踵也喻學者如食多而後方足也學不辨義如被褐而出錦衣而入被褐在外衣錦在內故不可也戎人生乎戎而戎言楚人生乎楚而楚言不知其所受也今使戎人長呼楚楚人長呼戎則楚人戎言戎人楚言也又曰聖人生於疾學而能為魁士名人者未之聞也又曰善學者假人道之長以補其短故假而又假遂有天下蘇子曰不食八珍何以知味之奇不為文學何以知世之資孔叢子曰人之進退唯問其志取必以漸勤則得多山溜至軟石為之穿蝎蟲至弱木為之弊夫溜非石之鑿蝎非木之鑿然而能以微脆之形陷堅剛之體非積漸之致乎故學者所以飾百行也説苑曰晉平公問師曠曰吾年七十欲學恐已暮矣對曰暮何不炳燭乎臣聞少而學者如日出之陽壯而學者如日中之光老而學者如炳燭之明炳燈之明孰與夜行公曰善哉又曰子貢謂子石曰汝不學詩子石曰父母求吾孝兄弟求吾悌朋友求吾信吾暇乎哉子貢曰請捐吾詩以學詩於子又曰公明宣學於曾子三年不學書曾子曰汝居參門三年不學何也對曰安敢不學乎見夫子居家庭親在叱吒之聲未至於犬馬宣説之見夫子應賓客恭儉而不懈宣説之見夫子居朝廷嚴臨下而不毀傷宣説之此三者學之而未能安敢不學乎曾子避席謝之曰參不及宣其學也賈誼書曰湯曰學聖王之道譬其如日靜居而獨思譬其若火夫舍聖王之道而靜居而獨思譬其去日之明於庭而就火之光於室也淮南子曰夫明鏡之始不形也曚然未見形容也及其杚以玄鍚摩以砥旃鬢眉微毛可得而察也夫學亦人之砥礪也又曰夫心暗於道而強學不已者譬聾者之歌無以自樂曰人莫不知學之有益於己也然而不能者嬉戲害之也人皆多以無用害有用以弋獵博奕之日誦詩讀書則識必博矣故不學之與學猶瘖聾之比於人也法言曰學者所以修性也視聽言貌思性所有也學則正否則邪又曰學者所以求為君子也求而不得者有矣夫未有不求而得之者也又曰大人之學為道小人之學為利子為道乎為利乎或曰耕不穫獵不饗耕獵乎耕道而得道獵德而得德是穫饗也又曰百川學海而歸于海丘陵學山而不至乎山是故惡夫畫者也抱朴子曰人知藥理病不知學理身又曰夫學者所以清澄性理簸揚埃穢啓導聰明飭染質素察往知來博涉勸戒仰觀俯察於是乎在雖云色白匪染不麗雖云味甘匪和弗美故瑤華不琢則耀夜之景不發青萍不治則純鈞之徑不就故質雖在我而成之由彼登閬風捫辰極然後知井谷之閉隘披七經玩百氏然後覺面牆之至困粉黛至則西施以加麗而宿瘤以飭醜經術深則高才者洞逸而魯鈍者醒悟文梓干雲而不可名之為臺樹者未知班輸之結搆也天倫爽朗而不可謂之為君子者未識人倫之臧否也鹽鐵論曰內無其質而外學其文雖有賢師良友若畫脂鏤冰費日損功論衡曰人生懷五常之性好道樂學故別於物今飽食快飲腹為飯坑腸為酒囊是則物也與三百倮蟲何以異乎又曰手無錢而之市決貨貨主必不與也夫胸中無學亦猶手中無錢潛夫論曰天地之所貴者人也聖人之所尚者義也德義之所成者智也明智之所求者學問也雖有至聖不生而智雖有至材不生而能由待學問其智乃博其德乃碩而況於凡人乎是以人之學也猶物之有治也夫瑚簋之器朝祭之服其始也乃山野之木蠶繭之絲耳及正之以繩墨制之以機杼則皆成宗廟之器黼黻之章可羞於鬼神可御於王公而君子以敦貞之質察敏之才攝之以良朋教之以明師文之以禮樂導之以詩書幽讚之以春秋其有不濟乎又曰人之情性未能相百其明智有相萬也此非其真性之材也必有假以致之夫道之於心猶火之於人目也深室幽黑無見乃設燎盛燭則百物彰矣此則火之耀也非目之光也而目假之則為明矣天地之道神明之為不可見也學問聖典心思道術則皆覩矣此則非心之明而人假之則為己知風俗通曰武帝廣開獻書之路立五經博士開弟子員設科射策勸以官祿訖於元始百有餘年書積如丘山傳業浸衆枝葉繁滋經説百萬言蓋祿利之路然也徐偉長中論曰學者踈神達思治情理性也初學則如夜在玄室所求不得白日照焉則群物斯辨矯首而徇飛不如修翼之必獲孤居而願知不如務學之必達蔣子萬機論曰諺曰學如牛毛成如麟角言其少也譙周法訓曰為國者不患學之害農患治民者之不學玄晏春秋曰十七年豫長七尺四寸未通史書與從姑子梁柳等或編荊為楯執杖為戈分陳相剌有若習兵母數譴豫豫出得瓜果歸以進母母投諸地曰孝經稱日用三牲之養猶為不孝何孝者莫大於欣親今爾年近乎二十志不存教心不入道曾無怵惕小慰我心修身篤學爾自得之於我何有因對豫流涕豫心少感遂伏書史王粲荊州文學官志曰有漢荊州牧劉君稽古若時將紹厥績乃曰先王之為世也則象天地軌儀憲極設教導化敘經志業明達雍泮作為禮樂表陳載籍以持其德上知所以臨下下知所以事上官不失守民聽無悖然後太階平焉故曰物生而蒙事屯而養造昧利有攸適猶金之消爐水之從器也是以聖人實之於文鑄之於學夫文學也者人倫之首大教之本也趙子聲書詣鄭康成學曰夫學之於人猶土地之有山川也珍寶於是乎出猶樹木之有枝葉也本根於是乎庇也虞傅厲學篇曰學之染人甚於丹青丹青吾見其久而渝也不見久而渝於學也傅子曰人之學者猶渴而飲河海也大飲則大盈小飲則小盈江表傳曰孫權謂呂蒙及蔣欽曰卿今並當途掌事宜學問以自開益蒙曰軍中常苦多務權曰孤豈欲卿治經為博士耶但令涉獵見往事耳如卿二人意性朗悟學必得之宜急讀孫子兵法六韜左傳國語及史孔子曰吾嘗終日不食終夜不寢以思無益不如學也蒙等感悟遂學所博覽儒者不勝魯肅見呂蒙謂曰今者見卿學識英博非復吳下阿蒙權常歎曰人長而進益如呂蒙蔣欽蓋不可及世説曰褚褒字季野語孫盛曰北人學問淵揔博瞻孫答曰南人學問清通簡要支道林聞之曰余謂北人看書如顯處見月南人學聞如牖中窺日
