body:
  text: 百卉部二麻爾雅曰黂符云切枲實禮記曰苴麻之有黂枲麻別二名也茡麻母苴麻盛子者廣雅曰黂麻也毛詩黍離丘中有麻曰丘中有麻彼留子嗟又雞鳴南山曰藝麻如之何橫從其畝又東門之池曰東門之池可以漚麻又宛丘東門之枌曰不績其麻市也婆娑績麻者婦人之事也疾其今不為禮記內則曰女子十年不出母教婉娩聽從婉謂言語也娩之言媚也謂容貌也執麻枲治絲繭春秋説題辭曰麻之為言微也陰精寢密女作纖微也麻生於夏夏衣物成禮儀故麻可以為衣陽成於三物以化故麻三變縷布加也宋均注曰麻須陰以成夏枝葉成謂之衣麻亦夏至可作衣也三變謂麻生成形之變也漚取皮一變也績成為縷三變也華嶠後漢書曰崔實為五原太守地宜麻枲而民不知種植又不能緝績率無衣被冬月止種細草臥其中吏以草衣其身乃得出實至教之績織晉中興書曰石勒昔居與李陽相近陽性剛愎每歲與爭漚麻池共相打撲沈約宋書曰孝武帝大明中上所居陰室於此處起玉燭殿與群臣觀之床頭有土鄣壁上挂葛燈籠麻繩拂侍中袁顗盛稱上儉素之德故能光有天下莊子曰顏回曰願得郭內之田十畝以為絲麻不仕也淮南子曰汾水濛濁而宜麻列女傳曰河內二義者張伯仁仲仁之妻也兄弟少孤共居伯仁敦厚謙苦仲仁驕戾不節二婦紡績得好枲麻輒別異之以為仲仁衣服越絶書曰麻林山勾踐欲伐吳種麻以為弓絃也漢武內傳曰鸚鵡食麻子晉令曰其上黨及平陽輸上麻二十二斤下麻三十六斤當絹一匹課應田者枲麻加半畝崔實四民月令曰二月三月可種苴麻二月可糶麻子本草經曰麻蕡一名麻勃味平辛生川谷治七傷利五藏下血氣多食令人見鬼狂走久服輕身通神明麻子補中益氣久服肥健不老生太山吳氏本草經曰麻子中人神農歧伯辛雷公扁鵲無毒不欲牡厲白薇先藏地中者食殺人麻藍一名麻蕡一名青羊一名青葛神農辛歧伯有毒雷公甘畏牡厲白薇葉上有毒食之殺人麻勃一名麻花雷公辛無毒畏牡厲風俗通曰蓬生麻中不扶自直葛爾雅曰拔蘢葛也似葛蔓生有節江東呼為龍尾亦謂之虎葛細葉赤莖廣雅曰女青葛也毛詩關睢葛覃曰葛之覃兮施于中谷維葉萋萋毛曰覃延也葛所以為絺綌毛詩黍離葛藟曰綿綿葛藟在河之滸葛也藟也生於河之崖得其潤澤以長大而不絶又黍離採葛曰採葛懼讒也彼採葛一日不見如三月兮葛所以為絺綌也事雖小一日不見於君憂懼於讒矣又蟋蟀葛生曰葛生蒙楚蘞蔓于野周書曰葛小人得其葉以為羹君子得其材以為絺綌以為君子朝廷夏服吳越春秋曰採葛之婦人傷越王用心之苦也作苦何之歌其辭曰葛不連蔓葉台台嘗膽不苦味苦飴令我採葛以作絲説文曰葛絺綌草也本草經曰葛根一名雞齊根味甘平生川谷治消渴身大熱嘔吐諸痺起陰氣解毒生汶山吳氏本草曰葛根神農甘生太山説苑曰綿綿之葛在於曠野良工得之以為絺綌良工不得枯死於野楚辭曰石磊磊兮葛蔓蔓思公子兮悵忘歸君思我兮不得聞藤爾雅曰諸慮山櫐今江東呼櫐為藤似葛而粗大也攝虎櫐今虎豆也纏蔓林樹而生英有尾刺今江東呼之為獵攝二音涉也廣雅曰藟藤也易困上六曰困于葛虆于臲卼王弼注曰困於極而乘於剛下旡其應行則愈繞居不獲安故曰困于葛纍于臲卼者也毛詩南有樛木曰南有樛木葛藟纍之注云興也南南土也木下曲曰樛南土之葛藟茂盛箋云木枝以下垂之故葛也藟也得纍而蔓之而上下俱盛興者喻后妃能以意下逮衆妾詩義疏曰纍蔓也似燕薁連蔓生蔓白色子赤可食酢而不美也幽州謂之推藟也山海經曰卑山其上多郭璞注曰今虎豆狸豆之屬櫐也齊書曰解叔謙字楚梁鴈門人也母有疾叔謙夜於庭中稽顙祈福聞空中語云此疾得丁公藤治便差即訪醫及草注皆無識者乃求訪至宜都遙見山中一老公伐木問其所用答云此丁公藤療風尤驗叔謙便拜伏流涕具言來意此公愴然以數段與之并示以漬酒法叔謙受之尋視此人不復知處依法為酒母病即差梁書曰周弘正與子豫玄俱載入東郡乘小船渡岸見藤花弘正挽而船覆俱溺僅免豫玄遂得心驚疾汝南先賢傳曰蔡順字君仲至孝所居井桔槔歲久欲易之為在母年上不敢一旦忽生扶老藤繞之有鳩巢其上金樓子曰合浦有康頭山山有一頭鹿額上載科藤一枚四條直上各長一丈許雲南記曰雲南出藤其色如朱小者以為馬策大者可為柱杖崔豹古今注曰酒杯藤出西域藤大如臂去實皆可以酌酒自有文章映徹可愛實大如杯味如豆蔻香美消酒土人提酒來至藤下摘花酌酒以其實消酒其國人寶之不傳於中國張騫大宛國得之事在張騫出關志南方草物狀曰沉藤生子大如齏甌正月華苞仍連著實十月臘月熟色赤生食之甜酢生交趾九真毦至藤生山中大如蘋蒿蔓衍居民採取剝之以作毦然不多出興古合浦簡子藤生緣樹木正月二月華四五月熟實如梨赤如雄雞核如魚鱗取生食之味淡泊無甘苦出交趾合浦野藂藤緣樹木二月華苞仍連著實五六月熟子大如羹甌里民煮食其味甜酢出蒼梧科藤生金封山烏滸人往往賣之其色正赤又云以草染之出興古陳祈暢異物志曰葭蒱藤類延蔓他樹以自長養實大小長短如蓮菆側尤切著枝格間實外有殼又無核剝乃食之煮而暴之甜美食之不飢臨海異物志曰鍾藤附樹作根軟弱須緣樹而作上下條此藤既纏裹樹樹死且有惡汁藤盛成樹若木自然大者或至五十圍異物志曰科藤圍數寸重於竹可以為杖篾以縛船及以為席勝於竹也始興記曰黃溪出科藤王韶之始興記曰晉中朝有質子將歸忽有人寄其書告曰吾家在觀亭廟石間有懸藤君扣藤家人必自出歸者如言果有二人出水取書并曰江伯令君前入水見屋舍甚麗今俗咸言觀亭有江伯神也水經又載顧徽廣州記曰科藤如栟櫚葉踈外皮青多棘刺高五六丈者如五六寸竹小者如筆管破其外青皮得息即科藤藤類有十許種續斷草藤也一曰諾藤一曰水藤山行渴則止斷取汁飲之治人體有損絶沐則長髮去地一丈斷之輒更生根至地永不絶異苑曰隋郡永陽縣有山壁直千仞巖上有石室古名為神農窟窟前有百藥藂茇莫不畢備又別有異物藤花形如菱菜朝紫中緑脯黃暮青夜赤五色迭耀劉欣期交州記曰含水藤破之得水行者資以止渴裴淵廣州記曰力陳嶺民人居之伐船為業隨樹所居就以成槽皆去水艱遠動有數里山生一草名曰膏藤津汁軟滑無物能比導地牽之如流五六丈船數人便運嶺表録異曰南土多野鹿藤苗有大如雞子白者細於筋採為山貨流布海內儋臺瓊管百姓皆制藤線編以為幕其妙者亦挑紋為花藥魚鳥之狀業此納官以充賦稅女蘿爾雅曰唐蒙女蘿女蘿兔絲別曰名也詩曰爰采唐矣毛詩頗辨曰蔦與女蘿施于松柏蔦寄生也女蘿菟絲松蘿也菟瓜爾雅曰蔩菟瓜也郭璞注曰似土瓜也孫炎曰一名瓜裂也烏杷爾雅曰欔烏階也郭璞注曰即烏杷也子連相著狀如杷齒可以染皂羊齒爾雅曰綿馬羊齒郭璞注曰草細葉藂生而毛有似羊齒繅者以取繭緒牛蘈爾雅曰藬大回切牛蘈也郭璞注曰今江東呼牛蘈者高尺餘許方莖葉長而鋭華紫縹色可淋以為飲孫炎曰車前草一名牛蘈狗毒爾雅曰蘻音繫狗毒樊光云俗語若如繫馬帚爾雅曰荓音洴馬帚也郭璞曰似蓍可為掃篲羊桃爾雅云長楚銚芅也今羊桃也或曰鬼桃葉似桃花白子如小麥毛詩羔裘隰有萇楚曰隰有萇楚猗儺其枝萇楚銚戈也説文曰長楚銚弋一名羊桃山海經曰豐山有木多羊桃而方莖郭璞注曰一名鬼桃治皮腫起羊蹄詩義疏曰楊州謂羊蹄為蓫廣雅曰蓽菎羊蹄本草經曰羊蹄一名東方宿一名連蟲陸一名鬼目味苦寒生川澤治頭禿疥瘙陰熱無子生陳留鼠耳廣雅曰無心鼠耳也廣志曰鼠耳葉如耳縹色也鼠尾爾雅曰葝鼠尾孫炎曰鼠尾可染皂也葝巨盈切吳氏本草曰鼠尾一名葝一名山陵翹治痢也芄蘭爾雅曰雚芄蘭也郭璞注曰萼生斷之有白汁可噉也毛詩芄蘭曰芄蘭剌惠公也驕而無禮大夫剌之芄蘭之支芄蘭草也柔弱恆蔓延於地有所依緣則起詩義疏曰芄蘭摩羅也幽州謂之爵瓢
