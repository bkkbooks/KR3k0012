body:
  text: 職官部四十一儀同東觀漢記曰鄧騭字昭伯延平元年拜為車騎將軍儀同三司儀同三司始自騭也蜀志曰黃權降魏文帝善之景初三年拜車騎將軍儀同三司王隱晉書曰太始七年以鄭袤為司馬天子臨軒遣使就第拜授袤遣息稱疾上送印綬至于十數久之見許以侯就第拜儀同三司置舍人官騎賜床帳簟褥錢五十萬又曰華廙為太子少傅甚得輔導之義河南尹韓壽賈后之妹夫欲以女配廙不許由是有恨故不正三司疾篤乃拜儀同三司晉起居注曰太始八年詔曰衛將軍羊祜歷文武有佐命之勳其為車騎將軍開府如三司之儀又曰元年詔曰中書監光祿大夫張華歷世腹心情所憑賴故疇其勳績使儀同三司而虛沖挹損難違高尚其以光祿大夫儀同三司本職如故又給親信滿百人又曰元康元年詔曰光祿大夫王戎光祿大夫裴楷開府辟召儀同三司晉中興書曰郗愔咸安元年拜都督浙江東五都諸軍事進位鎮軍開府儀同三司辭不受又曰蔡謨免皇太后詔以謨為左光祿大夫開府儀同三司遣謁者孟洪就加册命謨上疏陳謝遂以疾篤不朝賜機杖門施行馬齊書曰徐孝嗣加開府儀同三司孝嗣聞有詔斂容謂左右曰吾德慚古人位登袞職將何以堪之明君可以理奪必當死請若不獲命正當角巾丘園待罪家巷耳故讓不受齊職儀曰開府儀同三司置舍人官騎建初三年馬防為車騎將軍儀同三司魏以黃權為車騎開府此後甚衆將軍開府依大司馬朱服光祿大夫開府依司徒皂服北史曰裴文舉武成二年就加使持節驃騎大將軍儀同三司蜀土沃饒啇販百倍或有勸文舉規利文舉答之曰利之為貴莫若安身身安道隆非貨之謂是以不為非惡財也後周書曰李賢遷驃騎大將軍開府儀同三司太祖之奉魏太子西巡也至原州遂幸賢第讓齒而坐行鄉飲酒禮焉其後太祖又至原州令賢乘輅備儀服以諸侯會遇禮相見然後幸賢弟歡宴終日凡是親族頒賜有差陳書章昭達以平留異功授鎮前將軍開府儀同三司初文帝嘗夢昭達升臺鉉及旦以夢告之至是侍宴酒酣顧昭達曰卿憶夢不何以償夢昭達對曰當效犬馬之用以盡臣節自餘無以奉償隋書曰何稠安集嶺南有欽州刺史寧猛力帥衆迎軍初猛力掘山洞欲圖為逆至是惶懼請身入朝稠以其疾篤因示無猜二遂放還州與之約曰八九月間可詣京師相見稠還奏狀上意不懌其年十月猛力卒上謂稠曰汝前不將猛力來今竟死矣稠曰猛力共臣為約假令身死當遣子入侍越人性直其子必來初猛力臨終誡其子長真曰我與大使為約不可失信於國士汝葬我訖即宜上路長真如言入朝上大悅曰何稠著信蠻夷乃至於此以勳授開府齊王儉拜儀同三司章曰臣聞日中則昊盈虛之定分器滿必傾往覆之常理遂乃班同袞章燮和合曜外參論道內揔百司物議惟塵自識非據梁庾肩吾為武陵王拜儀同章曰臣宅慶紫霄聯休皇極地均西月既無迹而成高仕若乘風故不行而自遠今者四郊無壘天下同文都尉春田猶居塞外單于冬獵不入漁陽臣坐牧三邊非勞七戰豈能屯兵大夏封萬里之侯飛箭聊城受千金之壽論其才望有懼茂弘先佩印綬常羞叔度隋江揔太保蕭公謝儀同三司表曰阪泉野戰曾無汗馬之勞代邸運籌又闕前驅之勇薄伐專征早遊邊外執玉奉酎又虧朝則王人降止朝册遠臨奉述勑書曲停表奏滄波阻敻既杜敬仲之辭關路攸長致絶趙衰之讓心馳紫路登文石而莫由目送白雲拜承明之未果特進東觀漢記曰鄧禹右將軍官罷以特進奉朝請漢雜事曰諸侯公德優盛朝廷所敬異者賜位特進在三公上無秩後漢書曰梁啇以女立為皇后妹為貴人加啇位特進更增國士賜安車駟馬謝承後漢書曰趙典道懿尊為國師位特進七為列卿寢布被瓦器食也晉書百官表曰特進官品第二漢制皇后之父率為此官傅咸奏曰公品第一執圭坐侍臣之上特進品第二執皮帛坐侍臣之下今啓特進宜執璧繼公沈約宋書曰特進魏世驃騎將軍劉放衛將軍孫資等遜位以侯就第並位特進其諸官加特進者從本官供給特進但為班位而已不別有吏卒車服也齊職儀曰特進以功德特進見之後魏書曰刀雍拜特進皇興中雍與隴西王源賀及中書監高充等並以耆年特見優禮錫雍几杖劍履上殿日致珍羞焉北史曰穆紹加特進時侍中元順與紹同官順常因醉入寢所紹擁披而起正色讓順曰老身二十年侍中與卿先君亟連職事縱卿後進何置相排突也遂謝事還家詔諭乃起唐書官品志曰特進左右光祿金紫銀青等光祿大夫用人俱以舊德就間者居之揔敘大夫白虎通曰大夫為言大扶進人也毛詩衛淇澳碩人曰大夫夙退無使君勞大夫未退君聽朝於路寢夫人聽內事於正寢大夫退然後罷也箋云莊薑始來時衛諸大夫朝夕者皆早退無使我君之勞倦以君夫人新為配偶宜親親之也毛詩節南山雨無正曰大夫離居莫知我則勞也箋云正長也官長之大夫厲王流于彘而皆散處無復知我民之見疲勞也三事大夫莫肯夙夜邦君諸侯莫肯朝夕箋云王流在外三公及諸侯隨而行者皆無君臣之禮不肯晨夜朝暮省王也周禮秋官下朝大夫曰掌邦家之國治邦家王子弟公卿及大夫之菜地也凡邦家之治於國者必因其朝大夫然後聽之禮記曲禮上曰大夫七十而致事若不得謝謝去也君貪其德而留之則必賜之几杖行役以婦人適四方乘安車自稱曰老夫於其國則稱名越國而問焉必告之以其制他國問其老者必以制度告之金紫光祿大夫干寶晉紀曰尚書僕射季胤母喪拜金紫光祿大夫給吏卒門施行馬三國典略曰房謨本姓屋氏高勃海王入洛授金紫光祿大夫纍賜奴婢率多放免王後賜生口黥面為房字而付之光祿大夫漢書百官表曰光祿勳屬官有大夫掌議論漢書曰谷永既為大將軍王鳳擢為光祿大夫永奏書謝鳳曰永斗筲之材質薄學杇無一日之雅左右之方將軍悅其狂言擢之皂衣之吏廁之爭臣之未又曰金日磾為光祿大夫親近未嘗有過上信愛之又曰貢禹上書云貧老家資不滿萬錢拜光祿大夫賜益多家益富伏自念無報厚德日夜慚愧又曰杜陵王仲翁霍光以為光祿大夫仲翁出入蒼頭廬兒傳呼甚尊寵又曰蔡義上書云臣山東草萊之人行能無所比容貌不及衆然而不棄人倫者以聞道於先師願賜清間之宴得舒精思於前上即見説詩甚悅擢為光祿大夫東觀漢記曰張堪字子孝為光祿大夫數諫堪常乘白馬光武每有異政輒曰白馬生且復諫矣又曰樊宏字靡卿為光祿大夫為人謙素畏慎每朝會迎期先到俯伏待事時至乃起帝聞之勑臨朝乃告勿令豫到後漢書曰鄧太后從樊準議悉以公田賦與貧人即擢準與議郎呂倉並守光祿大夫準使冀州倉使兗州準到部開倉廩食廩給慰安生業流人咸得蘇息又曰魏文帝受禪欲以楊彪為太尉先遣使示旨彪辭曰彪備漢三公遭代傾亂不能有所補益耄年被病豈可贊惟新之朝遂固辭乃授光祿大夫賜几杖衣袍因朝會引見令彪著布單衣粗皮冠而入待以賓客之禮華矯後漢書曰鄧彪遭後母憂毀瘠過禮因疾乞身以光祿大夫行服漢書解詁曰武帝以中大夫為光祿大夫與博士俱以儒雅之選異官通職周官所謂官聯者也溫故知新率由舊章皆能明古今辨章舊聞者也漢書百官表注曰光祿大夫古官也銀章青綬漢官儀曰光祿大夫秩比二千石不言屬光祿大夫勳門外特施行馬以旌別之魏志曰常林字伯槐河內溫人也時論林節操清峻欲致之公輔而林遂稱疾篤拜光祿大夫又曰黃初四年詔給光祿大夫楊彪吏卒門施行馬吳志曰八月遣光祿大夫周奕石偉巡行風俗察將吏清濁民所疾苦為黜陟之詔王隱晉書曰劉毅字仲雄年七十告老以光祿大夫致仕門施行馬賜錢百三十萬晉書曰王覽為宗正卿致仕詔遣殿中醫療疾給藥後轉光祿大夫門施行馬又曰鄭褒魏景元初疾病失明屢乞骸骨不許拜光祿大夫又曰華表字偉容歆子也太始中為太中大夫祿賜與卿同門施行馬晉陽秋曰李喜乞老以為光祿大夫門施行馬晉中興書曰王蘊字仁修烈宗將納后訪于公卿僕射安曰王蘊地望可與國婚定后既立徵拜金紫光祿大夫又曰祖納字士言少持操行能言名理遷右光祿大夫又曰荀組字太章頴川人也弱冠太尉王夷甫見而稱之為光祿大夫又曰荀松字景猷組族子也弱冠大原王濟甚相器重拜右光祿大夫又曰賀循字彥士會稽人也節操高厲童齓不群言行舉動必以禮讓行有餘力則精書學由是博覽群書尤明三禮為江表儒宗拜右光祿大夫又曰顧和字君季榮族子也和二歲失父揔角便有清操弱冠知名族父榮雅器之曰此吾家千里駒也興吾宗者必此子矣康帝即位為尚書僕射更拜銀青光祿大夫又遷左光祿大夫晉諸公贊衛尉傅祇以風疾遜位加光祿大夫門施行馬齊書云周盤龍世祖講武令盤龍領軍校尉騁矟以疾為光祿大夫後魏書曰李茂字中宗為光祿大夫茂性謙慎以弟仲寵盛懼於盈滿遂託以老疾固請遜位高祖從之聽食大夫祿還私第汝南先賢傳曰郭憲為光祿大夫上欲到三輔憲諫曰天下初定車駕未可以巡上遂行憲當車拔佩刀以斷車靷上不止到弘農兵起頴川上曰恨不用光祿之言於是乃還樊英別傳曰詔書告南陽太守五官中郎將樊英委榮辭祿不降其節志不可奪今以英為光祿賜還家在所縣給穀千斛常以八月存高年給羊一頭酒三斛荀氏家傳曰闓字道明性清靜善談論遷光祿大夫以君面似胡明帝謂為神明胡子太中大夫韋昭辨釋名曰太中大夫大夫之中最高大也漢書曰陸賈楚人也以客從高祖定天下以口辨居左右常使諸侯中國初定尉他平南越因王之高祖使賈賜他印為南越王賈説他令稱臣奉漢約歸報高帝大悅拜賈為太中大夫又曰東方朔字曼倩平原厭次人也拜太中大夫觀察顏色直言切諫上常用之東觀漢記曰來歙字君叔南陽新野人也歙有大志慷慨治春秋左氏東詣洛陽見上大喜曰君叔獨勞苦即解被襜襦以衣歙拜太中大夫後漢書徵郭伋太中大夫賜宅一區及帷帳錢穀以充其家伋輒散與宗親九族無所遺餘司馬彪續漢書曰張湛拜太中大夫病居東門候舍故時人號之為中東門君上數存問賞賜魏志曰管寧字幼安北海朱虛人也年十六喪父中表愍其孤貧咸共贈賻悉辭不受長八尺美鬚眉與平原華歆同縣邴原相友黃初四年詔公卿舉獨行君子司徒華歆薦寧文帝以寧為太中大夫固辭不受又曰韓暨字公至明帝詔曰太中大夫暨澡身浴德志節高潔年逾七十守道彌固可謂純篤老而益劭者也其以暨為司徒吳志曰裴玄字彥黃下邳人也少有學行官至太中大夫梁書曰顧憲之字士思風疾求還吳天監二年授太中大夫雖纍年宰郡資無擔石及歸環堵不免飢寒中大夫漢書曰朝錯對策書百餘人唯錯為高最乃遷為中大夫又曰倪寬以侍御史見上語經學從問尚書一篇擢為中大夫中散大夫東觀漢記曰牟長字君高少篤學治歐陽尚書諸生著緑前後萬人建武十四年徵為中散大夫後漢書曰魯丕字叔陵遷中散大夫時賈逵薦丕道藝深明宜見任用因和帝朝會召見諸儒丕與侍中賈逵尚書令黃香等相難數事帝善丕説罷朝特賜冠幘履襪衣一襲續漢書曰譙玄字君黃能説春秋遷中散大夫柱國北史曰李敏美姿容善騎射開皇初周宣后樂平公主有女娥英妙擇婚對勑貴公子弟集弘聖宮者日以百數公主選取敏禮儀如帝女後將侍宴公主謂敏曰我以天下與至尊唯一女夫當為汝求柱國若授餘官慎無謝及進見上親御琵琶敏舞大悅為公主曰敏何官對曰一白丁耳上謂敏可授儀同敏不答上曰不滿爾意耶令授開府又不謝上曰公主有大功於我敏乃拜蹈舞遂於坐發詔授柱國五代史後唐天成三年五月詔曰開府儀同三司階之極太師官之極封王爵之極上柱國勳之極近代已來文臣官階稍高便授柱國歲月未深便轉上柱國武資不計何人初官便授上柱國官爵非無次第階勳備有等差宜自此時重修舊制今後凡是加勳先自武騎尉經十二轉乃授上柱國永作成規不令踰越雖有是命竟不革前例奉朝請漢書曰王陵為太傅杜門謝疾竟不朝請續漢書曰前漢列侯奉朝請在長安位次三公漢武時宣帝為皇曾孫令奉朝請東觀漢記曰建武中鄧禹失司徒特進奉朝請漢官解詁曰三輔職如郡守獨奉朝請成帝丞相張禹遜位特進奉朝請又以閞內侯蕭望之奉朝請奉朝請之號則非為官如淳曰諸侯春朝天子曰朝秋曰請雖國戚及勳門子弟為之但預朝請會而已晉起居注曰孝武寧康三年詔隴西王世子越駙馬都尉楊邈並可奉朝請侍從左右與太子遊處沈約宋書曰奉朝請無員外本不為官漢東京罷省三公外戚宗室多奉朝請奉朝請者奉會朝請召而已又曰王敬弘子恢之被召為祕書郎敬弘求為奉朝請與恢之書曰祕書有限故有競朝請無限故無競吾欲使汝處於不競之地太祖嘉而許之北齊書曰祖鴻勳為州主簿僕射臨淮王彧表薦鴻勳有文學宜試以一官勑除奉朝請人謂之曰臨淮舉卿便以得調竟不相謝恐非鴻勳曰為國舉才臨淮之務祖鴻勳何事從而謝之彧聞而喜曰吾得其人矣後魏書曰崔光韶事親以孝聞初除奉朝請光韶與弟光伯雙生操業相侔特相友愛遂經吏部尚書李沖讓官於光伯辭色懇至沖為奏聞高祖嘉而許之又曰裴詢字敬叔美儀貌多藝能音律博奕咸所開解起家奉朝請又曰梁景伯生於桑乾少喪父以孝聞家貧傭書自給養母甚謹尚書廬淵稱之於李沖沖時典選拔為奉朝請致仕官晉書曰王祥致仕詔賜几杖床帳簟蓐以舍人六人為睢陵公舍人又曰鄭沖致仕詔賜安車駟馬床帳簟蓐五代史曰鄭韜以戶部尚書致仕自襁褓逮於懸車事真偽十一君凡七十載所任無官謗無私過三持使節不辱君命士無賢不肖皆恭己接納晚年背傴時人咸曰鄭傴不迂平生交友之中無隙怨親族之間無愛憎恬和自如性尚間簡及致政歸洛甚愜終焉之旨
