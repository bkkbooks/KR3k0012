body:
  text: 釋部六戒律梁書曰武帝惑於佛教朝賢多啓求受戒江革精信因果而帝未知謂革不奉佛法乃賜革覺意詩五百字又手勑革曰果報不可不信革因乞受菩薩戒又曰陶弘景曾夢佛授其菩薩記云名為勝力菩薩乃詣鄮縣阿育王塔自誓受五大戒大同二年卒遺令不須沐浴以大袈裟覆衾蒙首足弟子遵而行之又曰陸杲素信佛法持戒甚精著沙門傳三十卷又曰蕭昱字子真歷位中書侍郎每求試邊州武帝以其輕脫無威望抑而不許普通五年徙臨海郡行至上虞勑追還令受菩薩戒既至恂恂盡禮改意蹈道持戒又精潔帝甚善之北齊書曰趙隱字彥深專意玄門崇敬佛道雖年期頤常持戒行高僧傳曰弗若多羅此云功德華罽賓人也少出家專精十誦律部僞秦中振錫入關姚興待以上賓之禮先是經法雖傳律藏未闡鳩摩羅什聞多羅既善斯部以秦弘始六年集僧數百餘人延請多羅誦出十誦胡本羅什譯為晉文三分獲二多羅遘疾棄世後有曇摩流支此云法樂西域人棄家入道偏以律藏馳名以弘始七年秋達關中初弗若多羅誦出十誦未竟而亡廬山釋惠遠聞支既善毗尼希得究竟律部乃遣書通好流支既得遠書乃與羅什共譯十誦都畢支曰吾當更行無律教處於是遊化餘方不知所卒毗婆沙論曰善分別戒名為毗尼藏大智論曰諸羅漢問誰能明了集毗尼藏皆言優婆離持律第一請就師子座問佛在何處說初毗尼戒優婆離言我聞佛在毗舍離爾時須鄰郍迦蘭陀長者子初犯戒以是因緣故結初罪如是二百五十戒義三部七法八法尼律增一開雜部善部如是等八部十作毗尼藏經云五戒一不殺生二不偷盜三不邪淫四不妄語五不飲酒食肉故云五戒布施持戒忍辱精進禪定智惠以法能度生死故云六度色聲香味觸法能坌汙人之淨心故曰六塵禪寶林傳曰佛未涅槃時每告弟子迦葉曰吾以清淨法眼涅槃妙心實相正法將付於汝汝可流布無令斷絶迦葉敬諾唯然受教迦葉傳阿難阿難付商郍和修自此轉相傳授至般若多羅并佛二十八師般若多羅付菩提達磨菩提達磨者南天竺人也梁普通中泛海至于廣州後過江上嵩山少林寺達磨傳惠可惠可傳僧璨隱於晥山璨傳道信道信傳弘忍弘忍傳惠能惠能住韶州曹溪是為六祖高僧傳日釋道立不知何許人出家事安公為師隱覆舟山岩居獨立不受供養每潛入禪輒七日不起塔宋書曰謝尚嘗夢其父曰西南有氣至衝人必死勿當其鋒家無一全汝宜修福建塔寺可穰之若未暇立寺可杖頭刻作塔形見有氣來可擬之尚悟懼未及造塔寺遂刻小塔施杖頭恆置左右後果有異氛遙見西南從天而下始如車輸漸彌大直衝尚家尚以杖指之氛便回散闔門獲全氣所經處數里無復孑遺遂於永和四年捨宅造寺名莊嚴寺宋大明中路太后於宣陽門外造莊嚴寺改此為謝鎮西寺又曰阿育王寺塔阿育王即鐵輪王王閻浮提一天下佛滅後一日一夜役鬼神造八萬四千塔此即其一吳時居其地以為精舍孫綝尋除毀之塔亦同滅吳平後諸道人復於舊處建立焉晉元帝初渡江更修飾之其後有西河離石縣胡人劉薩阿遇疾暴亡七日更蘇說云觀世音語云汝緣未盡當得活可作沙門洛下齊丹陽會稽並有阿育王塔可往禮拜忽然醒寤因此出家名惠達遊行至丹陽未知塔處及登越城四望見長千里氣色因就禮拜果是先阿育王塔所屢放光明由是定知必有舍利集衆就掘得三石碑有鐵函函中有銀函函中又有盛三舍利及爪髮長一丈七尺詔遣沙門釋雲隨使往迎之先是武帝改造阿育王等塔出舊塔下舍利及佛爪髮髮青紺色衆僧以手伸之隨手長短放之則旋屈為蠡形按經云佛髮青而細猶如藕莖絲佛三昧經云我昔在宮沐頭以尺自量髮長一丈二尺放已右旋還成蠡文則與帝所得同也佛圖澄傳曰後趙尚書張離張良家富事佛起大塔澄謂曰事佛在於清淨無欲慈矜為心檀越雖儀奉大法而貪吝未已遊獵無度積聚不窮方受見世之罪何福報之可希也洛陽茄藍記曰永寧寺熙平元年靈太后胡氏所立也在宮前閶闔門南一里中有九層浮圖初掘基至黃泉下得金像三十軀太后以為信法之徵永熙三年浮圖為火所燒後有人從東萊郡來云見浮圖於海中光明照耀儼然若新海上之民咸皆見之俄然霧起浮圖遂隱又曰西方佛沙伏國國王造一塔初成用真珠為羅網覆其上於後數年王乃思量此珠羅網價直萬金我崩之後恐人侵奪復慮大塔破壞無人修補因解珠網以銅鑊盛之在塔西北百步掘地埋之上種樹名菩提枝條四布密葉蔽天樹下四面坐像各高丈五恆有四龍典掌此珠若興心欲取即有禍變刻石為銘屬語將來若此塔壞勞煩後賢出珠修治寺後漢書曰陶謙同郡人笮融聚衆數百往依於謙謙使督廣陵下邳彭城運糧遂大起浮圖寺上纍金盤下為重樓又堂閣周回可容三千許人作黃金塗像衣以錦綵每浴佛輒多設飲飯布席於路其有就食及觀者且萬餘人宋書曰明帝以故宅起湘宮寺費極奢侈以孝武莊嚴寺剎七層帝欲起十層不可立分為兩剎各五層新安太守巢尚之罷郡還見帝曰卿至湘宮寺未我起此寺是大功德虞願在側曰陛下起此寺皆是百姓賣兒貼婦錢佛若有知當悲哭哀愍罪高佛圖有何功德帝大怒馳曳下殿願徐去無異容又曰巢尚之甚聰敏時百姓欲為孝武立寺疑其名尚之應聲曰宜名天保詩云天保下報上也時服其機速又曰蕭惠開丁父難家素事佛凡為起四寺南岡下名曰禪岡寺曲阿舊鄉宅名曰禪鄉寺京口基亭名曰禪亭寺所封陽縣名曰禪封寺梁書曰何氏自晉司空充宋司空尚之奉佛法建立塔寺至敬容又捨宅東為伽藍趍權者因助造搆敬容並不拒故寺堂宇頗為宏麗時輕薄者因呼為衆造寺及敬容免職出宅止有常用器物及囊衣而已竟無餘財又曰謝舉宅內山齊捨以為寺泉石之美殆若自然舉託情玄勝尤長佛理注淨名經嘗自講說又曰武帝以三橋舊宅為光宅寺勑周興嗣與陸倕各製寺碑及成俱奏帝以興嗣所製自題又曰江紑字含潔幼有孝性年十三父蒨患眼紑侍疾將朞月衣不解帶夜夢一僧云患眼者飲惠眼水必差及覺說之莫能解者與草堂寺智者法師善往訪之智者曰無量壽經云慧眼見真能度彼岸蒨乃因智者啓捨同夏縣界牛屯里舍為寺乞賜嘉名勑答曰近見智者云慧眼則五眼之一號可以惠眼為名及就創造泄故井水清冽異於常水夢中取水洗眼及煮藥稍覺有瘳因此遂得差南史曰王懿字仲德父苗仕苻堅至二千石苻堅之敗仲德年十七及兄睿同起義兵與慕容垂戰敗被重創走與家屬相失路經大澤困未能去臥林中有一小兒青衣年可七八歲騎牛行見仲德驚曰漢己食未仲德言飢小兒去須臾復來得飯與之食畢欲行而暴雨莫知津徑有一白狼至前仰天而號號訖銜仲德衣因渡水仲德隨後得濟與睿相及渡河至滑臺復為翟遼所留積年仲德欲南歸乃棄遼奔泰山晉太元末徙居彭城宋元嘉九年又為徐州剌史仲德三臨徐州威德著於彭城立佛寺作白狼童子像於塔中以在河北所遇也又曰波斯國城外佛寺二三百所梁大通二年遣使獻佛牙又日劉孝綽與到溉兄弟甚狎溉少孤宅近僧寺孝綽謂僧物也撫手笑溉知其旨奮拳擊之傷口而去三國典略日齊主初為胡昭儀起大慈寺未成改為穆皇后大寶林寺運石填泉牛死無數唐書曰會昌五年四月括天下寺凡大寺四千二百蘭若四萬僧尼二十六萬五百七月勑併省天下佛寺上州各留寺一所中下州寺並廢上都東都各留十寺寺僧十人洛陽伽藍記曰白馬寺漢明帝所立也佛教入中國之始寺在西陽門外御道南明帝夢見金人長丈六項佩日月光明胡神號曰佛遣使向西域求之乃得金像焉時以白馬負經而來因以為名寺上經函常存時放光明曜於堂宇是以道俗禮敬之如仰真容又曰崇義里有京兆人杜子休宅時有隱士趙逸云是晉武時人晉朝舊事多所記録正光初來至京師見子休宅歎息曰此中朝時太康寺也時人未之信遂問寺之由逸云龍驤將軍王濬平吳之後始立此寺本有三層浮圖用磚為之指子休園中曰此是故處子休掘而驗之果得磚數萬并有石銘云晉太康六年歲次乙巳九月甲戍朔八日辛巳儀同三司襄陽侯王濬敬造子休遂捨宅為靈應寺又曰宜壽里內苞信縣令段暉宅地下常聞有鍾聲時見五色光明照於堂宇暉甚異之遂掘光所得金像一軀高三尺并二菩薩趺上銘云晉泰始二年五月十五日侍中中書監荀勗造暉遂捨宅為光明寺時人咸云此地是荀勗宅又曰修梵寺有金剛鳩鴿不入鳥雀不栖菩薩達摩云得其真相建康實録曰晉許詢捨永興山陰二宅為寺家財珍異悉皆是給既成啓奏孝宗詔曰山陰舊為祗洹寺永興居為崇化寺造四層塔物産既罄猶缺露槃相輪一朝風雨相輪等自備時所訪問乃是剡縣飛來又曰一乘寺梁邵陵王綸造梁末賊起遂延燒陳尚書令江揔捨堂宇寺今之堂是也寺門遍畫凹凸花代稱張僧繇手跡其花乃天竺遺法朱及青緑緣所成遠望眼暈如凹凸就視即平世咸異之乃名凹凸寺又曰牛頭山西峰中有窟不測深淺古老相傳云辟支佛所出梁武帝於窟穴下置寺名曰仙窟寺窟有一石梴盂莫知所由來形狀甚古唐神龍初鄭克俊取將入長安乃開禪寺志公嚴屐也高僧傳曰釋法度少出家高士明僧紹隱居琅琊之攝山及亡捨所居山為棲霞精舍請度居之經歲許忽聞人馬鼓角之聲俄見一人持名紙通曰靳尚前度見尚形甚都羽衛亦嚴致敬己乃言曰弟子主有此山七百餘年法師道德所歸謹捨以奉給并願受五戒永結來緣度為設會受戒而去又曰孫放西寺曾構傾頽沙門支雲惠謀欲建立其日有童子持紙蓮花插故寺東面相去十餘丈於是建剎中標正當華所
