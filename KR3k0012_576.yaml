body:
  text: 樂部十三鍾釋名曰鍾空也空內受氣多故聲大說文曰鍾秋分之音物鍾成也易通卦驗曰人主冬至日縱八能之士擊黃鍾之宮則人主敬善公卿大夫誠信禮記曰知悼子卒未葬平公飲酒師曠李調侍鼓鍾杜蕢自外來聞鍾聲曰安在曰在寢杜蕢入寢歷階而升酌曰曠飲斯又酌曰調飲斯又酌堂上北面坐飲之又樂記曰鍾聲鏗鏗以立號號以立橫橫以立武君聽鍾聲則思武臣周禮冬官鳧氏曰鳧氏為鍾鎛薄厚之所震動清濁之所由出侈弇之所由興有說說由意鍾已厚則石大厚則聲不發已薄則播大薄則聲散侈則柞柞讀為棹咋咋然之咋聲大外也弇則鬱聲不舒揚長甬則震鍾棹則聲不正鍾小而短則聲疾而短聞淺則驂驂易竭也鍾小而長則其聲舒而遠聞深則安安則息又曰鳧氏為鍾兩欒謂之銑又曰磬師掌教擊編鍾又春官曰鍾師掌教金奏擊金以為奏節金謂鍾鏄也左傳襄二曰莒人伐我東鄙圍台季武子救台遂入鄆取其鍾以為公盤又襄六年曰吳公子札自衛如晉將宿於戚戚孫文子之邑聞鍾聲曰異哉吾聞之辯而不德必加於戮夫子獲罪於其君以在此也懼猶不足而又何樂夫子之在此也猶鷰之巢於幕上也君又在殯而可以樂乎獻公卒未葬也又曰鄭伯有嗜酒為窟室而夜飲酒擊鍾焉朝至而未已又曰鄭人賂晉侯歌鍾二肆注曰肆列也懸鍾十六為一肆二肆三十二枚又昭五曰天王將鑄無射周景王無射鍾名律中無射泠州鳩曰樂天子之職夫音樂之輿也而鍾音之器也天子省風以作樂器以鍾之鍾聚也以器聚音輿以行之小者不宨大者不槬窕則不感不充滿人心也摦則不容心不堪容也心是以感感實生疾今鍾摦矣王心不堪其能久乎又曰宋左師每食擊鍾又曰鄭伯始朝于楚楚子賜之金既而悔與之盟曰無以鑄兵故以鑄三鍾爾雅大鍾曰鏞其中謂之剽音瓢其小者謂之棧音醆郭璞醆曰鏞一曰鎛國語曰晉克潞之役魏顆以身卻退秦于輔氏親止杜回其勳銘之景鍾又曰周景王二十三年鑄無射而為之大林鍾成伶人告和王謂冷州鳩曰鍾果和矣對曰上作器民樂之則為和今民莫不怨恨諺曰眾心成城眾口鑠金臣不知其和賈逵曰大林無射副也漢書曰高祖廟有十鍾受千石撞之聲聞百里後漢書鄭司農曰于鍾脣之上祛也鼓所擊處也舞縣謂之旋旋蟲謂之斡旋屬鍾柄所以懸之魏志曰初漢鑄鍾銅工柴玉巧意多所造作杜夔令工鑄鍾其聲清濁多不法故毀改作王甚厭之白太祖太祖取所鑄鍾雜錯更試然後知夔為精而玉之妄也晉書裴頠令荀藩終父勗之志鑄鍾鑿磬以備郊廟宋書曰漢中城固縣漢水崖際有聲如雷俄頃崖崩有銅鍾十二趙書曰將軍張珍領郡縣民丁萬人徙洛陽六鍾猛簴九龍翁仲銅駞飛廉鍾一沒盟津中蕭子顯齊書曰張瓌字祖逸吳郡吳人父永右光祿大夫曉音律宋孝武問永以為太極殿前鍾聲嘶永荅曰鍾其處鑿而去之聲遂清越十六國春秋曰石勒耕輒聞鍾鐸之音或在前後懼以問翼伽伽曰作勞耳鳴無不祥也勒至平原常在平人師驩家為奴有老父謂勒曰君魚龍髮際際四道已成當貴為人主甲戍之歲王彭祖可圖勒曰若如公言不敢忘德忽然不見每耕又聞鼓角之聲勒又告諸奴又聞之因曰吾初在家恒聞如是諸奴白驩驩奇而免之至是眾歸焉莊子曰梓慶削木為鐻見者驚猶鬼神魯侯問其術對曰臣將為鐻未嘗敢以耗氣齊七日忘吾四支然後入山林觀天性區別見成鐻然後加手鐻似夾鍾也管子曰黃帝作五聲以正五鍾一曰青鍾大音二曰赤鍾心三曰黃鍾洫光四日景鍾昧其明五曰黑鍾隱其帝五聲既調然後作五行屍子曰鄭公謂子產曰飲酒之不樂鍾鼓不鳴寡人之性也國家之不乂朝廷之不理與諸侯交之不得志也子之任也子無入寡人之樂寡人無入子之朝自是以來子產理鄭城門不閉國無盜賊道無餓人孔子曰若鄭公之好樂也雖抱鍾而朝可也戴延之西征記曰陝縣城西北二面帶河河中對城西北角水涌起銅鍾翁仲頭髮常出水上漲減恒與水齊晉軍當至髮不復出唯見水異嗟嗟有聲聲聞數里翁仲本在城內大司馬門外為賊所徙當西入關至此而沒呂氏春秋曰晉平公鑄為鍾使工聽之皆以為調矣師曠曰不調請更鑄之公曰吾皆以為調矣師曠曰後世有知音者知鍾不調也臣竊恥之至於師涓而果知鍾之不調也慎子曰魯莊公鑄大鍾曹翽入見曰今國褊小而鍾大君何不圖之鬻子曰大禹治天下也以五聲聽之政曰教寡人以義者擊之鍾韓子曰叔孫相魯有子曰孟丙豎牛妒之叔孫為丙鑄鍾鍾成丙不敢擊使豎牛請之叔孫豎牛不為之請又欺之曰吾已為爾請之矣使爾擊之叔孫聞之曰丙不請而擅擊鍾遂怒之丙出奔齊尸子曰鍾鼓之聲怒而擊之則武憂而擊之則悲喜而擊之則樂其意變其聲亦變意誠感之達於金石而況人乎晏子曰景公為大鍾將懸之仲尼伯常騫晏子三人俱朝曰鍾將毀之撞之果毀公見三子問之晏子對曰鍾大不以禮故曰將毀仲尼曰鍾大懸下氣上薄故曰將毀伯常騫曰今日庚申雷日也陰莫勝於雷故曰將毀韓子曰智伯欲伐仇由而道難不通鑄大鍾遺之方車二軌仇由大悅除塗將內之赤草曼支諫曰此小所以事大也今以大事小兵必隨之仇由君不聽曼支因斷轂而馳至齊十月仇由亡淮南子曰闔閭伐楚破九龍之鍾許慎注曰刻簴為九龍懸鍾也賈于云毀十龍之鍾又曰齊景公族鑄大鍾撞之於庭下郊雉皆雊許慎注曰族聚也鍾聲如雷震雉皆應之又曰孟秋之日西館御好白色白綵撞白鍾故處西宮又曰鍾之與磬也近之則鍾音亮遠之則磬音彰磬石也音清明遠聞而彰著物固有近不若遠遠不若近者山海經云豐山者有鍾霜降則鳴又曰炎帝之孫伯崚伯崚生鼓延是為鍾呂氏春秋曰黃帝又命伶倫鑄十二鍾和五音始奏之曰咸池東方朔傳曰漢武帝未央宮殿前鍾無故自鳴三日三夜不止大怪之召待詔王朔問之朔對曰有兵氣上更問東方朔朔對曰王知其一不知其二臣昔聞銅土之子以陰陽氣類言之子母相感山恐有崩弛者故鍾先鳴易曰鳴鶴在陰其子和之上曰應在幾日朔曰在五日內居三日南郡太守言有山崩延袤二十餘里上大笑賜帛三十疋郭緣生述征記曰洛陽太極殿前大鍾六枚父老云曾有欲移此鍾者聚百數長絙挽之鍾聲震地咸懼不敢復犯陸翽鄴中記大面廣外一丈二尺小面廣七尺或作蛟龍或作鳥獸繞其上何法盛晉中興書曰義熙十一年霍山崩毀出銅鍾六枚上有文古科斗書人莫能識晉潘岳閞中記曰漢昭帝平陵宣帝杜陵二陵鍾在長安夏侯征西欲徙詣洛陽重不能致懸在清明門門裏道南其西者平陵鍾東者杜陵鍾也王子年拾遺記曰帝顓頊居位文德者則錫以鍾磬武德者錫以干戈戴延之西征記曰鍾大者三十二博山頭形瓌紐作師子頭鍾大者三十二博山頭二丈厚八尺大面廣一丈二尺小面七尺或作蛟龍或作鳥獸周繞其外唐雜制曰凡私家不設鍾磬三品已上女樂五人五品已上不過三人也虞喜志林曰吳時於江水中得鍾有百餘字募求讀者並無人曉樂什圖徵曰君子鑠金為鍾四時九乳是以撞鐘以知君鍾調則君道得宋均注曰九乳法九州又曰聖王往承天定爵祿人者不過其能尊卑有位位有物物有宜功成者賞功敗者罰故樂用鍾宋均注曰不過能謂量能授爵也有罪鳴鍾以攻之也白虎通曰鍾之為言動也陰氣用事萬物動成鍾為氣用金聲也鎛者時之聲也節度之所生也有節度則萬物昌無節度則萬物亡異苑曰魏時殿前鍾忽鳴張華曰蜀銅山崩說苑曰鼓法天鍾法地秦始皇建千石之鍾立萬石之簴傅玄歌辭曰雷師鳴鍾鼓風伯吹笙簧西母出穴聽王父吟東廂三禮圖曰凡鍾十六枚同為一筍簴為編鍾特懸者謂之鎛又曰鎛鍾之大者也形如鍾但大耳其在簴亦一枚而已三輔黃圖曰始皇簴高三丈鍾小者千石通禮義纂曰鍾磬半為堵全為肆軒懸三面歌鍾三肆判憑懸兩面歌鍾二肆特懸一面唯磬而已又曰圓鍾夾鍾也於位在卯氣生於房心為宮天帝之明堂故奏樂先奏圓鍾為宮又曰駕入撞蕤賓之鍾左右鍾皆應者案蕤賓位居午午主陽陽主動象王自外動而入方居之始故先作之而東廂應者東為陽陽主動明以靜主動使之相應也駕出撞黃鍾右五鍾皆應黃鍾位居子子為陽陽主動象王自內動而出方行之始故先作之而西廂應者西為陰陰主靜明以動告靜使之相和也廣古今五行記曰會稽人陳清於井中得小鍾長七寸二分上有古文十八字其四字可識云會稽岳命郭璞云愍懷喪覆元帝中興之應自宣帝至恭帝數十人又曰陝州黃河有銅鍾在水水大小恒自浮出每晦朔陰雨之日輒鳴聲響悲亮行客聞之莫不愴然又曰晉中朝有人懸銅為盤晨夕恒鳴如人扣打以白張華華曰此盤與洛鐘宮商相諧故聲相應可錯令輕則韻乖自止古今樂錄曰高廟中四鍾皆奏時廟鍾也重十二萬斤明帝徙二鍾在南宮張衡東京賦曰發鯨魚鏗華鍾薛綜注曰天子出則鳴蒲牢海中大魚名鯨海島中又有大獸名蒲牢畏鯨魚鯨魚一擊蒲牢輒大嗚呼凡鍾欲令大鳴故作蒲牢於上所以擊之者鯨魚有篆刻文故曰華鍾也戴延之西征記曰洛陽太極殿前左右各三銅鍾相對鍾大者三十二圍小者二十五圍唐書曰唐太宗召張文收於太常令與少卿祖孝孫參定雅樂有古鍾十二近代唯用其七餘有五鍾俗號啞鍾莫能通者文收吹律調之聲皆響徹時人咸服其妙錞于周禮曰以金錞和鼓宋史云廣漢什邡人段祖以錞于獻始興王鑑其器高三尺六寸六分圍二尺四寸圓如筩色黑如漆甚薄上有銅馬以繩懸馬令去地尺餘灌之以水又以器盛水於下以芒當心跪注錞于以手振芒則其聲如雷清響良久乃絕後周書斛斯徵遷太常卿樂有錞于者近代絕無此器或有自蜀得之皆莫之識徵見之曰此錞于也眾弗之信徵遂引干寶周禮注以芒筒捋之其聲極振眾乃歡服徵乃取以合樂焉樂書曰錞于者以銅為之其銅象鐘頂大腹𢴲口弇上以伏獸為鼻內懸子鈴銅舌凡作樂振而鳴之與鼓相和又曰凡金為樂器有六皆鍾之類也曰鍾曰鎛曰錞曰鐲音濁曰鐃奴交切曰鐸大各切鎛如鍾而大錞于也圓如椎頭上大下小所謂金錞和鼓鐲鉦也形如小鍾軍行為鼓節鐃鈴而無舌有柄而執之鐸如大鈴
