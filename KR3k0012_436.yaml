body:
  text: 人事部七十六勇三吳志曰孫堅年十七與父共載船至錢塘會海賊胡王等從匏里上掠賈人財物方於岸上分之行旅皆住船不敢進堅謂父曰此賊可擊請討之父曰非爾所圖也堅行操刀上岸以手東西指麾若分部兵以羅遮賊狀賊望見以為官兵捕之即委財物散走堅追斬得一級以還父大驚由是顯聞又曰曹公出濡須甘寧為前部督受勑斫敵前營權特賜米酒衆肴寧乃賜手下百兵食食畢寧先以銀碗酌酒自飲兩碗乃酌與都督伏不肯持寧引白削置膝上呵謂之曰卿見知於至尊孰與甘寧甘寧尚不惜死卿何得獨惜死乎都督見寧色厲即起拜持酒次通酌兵各一銀碗至二更時銜枚出破敵敵驚動遂退寧益貴重增兵二千又曰董襲字元岱餘姚人權討黃祖祖橫兩艨艟守江口以栟櫚大紲縛石為碇上有千人以弩交射軍不得進襲將敗死百餘人被兩鎧乘軻船突入艨艟襲乃以刃斷其紲艨艟於是橫流制不能已大兵遂進祖乃開門走追斬之明日大會權舉觴屬襲曰今日之會斷紲之功也又曰甘寧字興霸性奢靡嘗以繒錦維舟去或割棄勸權襲黃祖擒之隨魯肅至益陽拒關羽羽擇鋭士五千人從上流淺瀨夜渡寧曰請以五百人往對之羽聞吾咳唾聲必不敢涉涉即成擒矣又曰陸統字公績從征合肥為右部都督時權徹軍還前部已發魏將張遼等奄至津北統率親近三百人陷圍拔權出敵已毀橋權策馬驅馳統復還戰左右盡死所殺數十人度權已免乃還橋敗道絶被甲潛行權既御船見之驚喜統痛親近無返者悲不自勝權引袂拭之謂曰公績亡者已矣茍使卿在何患無人蜀志曰關羽字雲長河東人也先主入益州留羽督荊州軍事嘗為流矢所中貫左臂羽令鑿骨劈之時與諸將飲食血流盈器言笑自若及破曹仁於樊城威振華夏曹公議遷都以避其鋭司馬宣王蔣濟以為關羽得志孫權必大怒權後果用呂蒙計平荊州虜羽斬之又曰張飛字益德涿人先主背曹公依劉表於雷陽聞曹公卒至棄妻子而奔乃以飛將二十騎拒之後飛據水斷橋瞋目橫槊曰張益德在此爾曹敢來決死否衆無敢近者先主入益州飛與諸葛亮分定郡縣飛雄猛名亞關羽羽善待卒伍而驕士大夫飛敬愛君子而不恤小人先主常戒之及先主伐吳臨發益州於是飛帳下張達殺之持其首順流奔于孫權晉書曰桓石虔小字鎮惡有材幹趫捷從父在荊州於獵圍中見猛獸被數箭而伏諸督將素知其勇戲令拔箭石虔因急往拔得一箭猛獸跳石虔亦跳高於猛獸猛獸伏復拔一箭以歸嘗從桓沖入關沖為符健所圍垂沒石虔躍馬赴之拔沖於數萬衆中而還莫敢抗者三軍歎息威震敵人又曰吾彥字士則吳郡人出自寒微有文武才幹身長八尺手格猛獸膐力絶群陸抗奇其勇略將拔用之衆情不允乃會諸將密使狂人拔刀跳躍而走彥不動舉几禦之衆伏其勇乃擢用焉又曰庾闡字仲初頴川鄢陵人也祖輝安北長史父東以勇力聞武帝時有西域健胡趫捷無敵晉人莫敢與校帝募勇士唯東應選遂撲殺之名震殊俗又曰王彌多權略凡有所掠必預圖成敗舉無遺策弓馬迅捷膐力過人青土號為飛豹又曰周處為人勇暴不可當之嘗居義興水中有蛟龍山上有白額虎鄉里有周處時人謂之三橫有里人説處請殺虎虎死入水擊蛟龍沒行數十里處與之俱經三日三夜人謂己死矣皆相慶賀處殺蛟龍回聞鄉里相賀始知身之患人也於是仄身修己至洛陽惠帝拜為將軍纍遷為建威將軍後西征沒于陳贈西平將軍又曰郭默殺江州太守自稱刺史為人勇捷常身被重甲跳三丈矛時人莫不憚之後陶侃及庾亮率軍滅之又曰蔡裔仕偽趙為振武將軍少有勇力呼聲若雷嘗有盜入室裔撫機一呼賊衆皆殞時人憚之又曰李特巴西人少仕州郡雄勇善騎射沉毅有大度嘗至劍閣箕踞太息顧眄險阻曰劉禪有如此之地面縛於人豈非庸才耶後藂流人衆至數萬遂攻城自稱大將軍為益州刺史後稱蜀為羅尚所殺子孫六世至勢為大司馬桓溫所滅共四十六年又曰劉元海胸奴中人祖扶羅助漢討黃巾遂以衆留定難屬董卓亂屯于河內元海即扶羅之孫也髫齓英惠及長好學尤好左氏傳孫吳兵法略皆誦之兼愛武事妙絶於衆猿臂善射趫捷膐力過人姿儀魁偉身長八尺四寸鬚長三尺太始中武帝召與語大悅之及惠帝失馭寇盜蜂起成都王潁表元海為將軍後王浚伐潁元海説潁曰今二鎮跋扈衆餘十萬恐非宿衛所能禦及請為殿下還説五部以赴國難潁曰五部之衆可保發否鮮卑烏丸徑速如風雲何易可當吾欲奉乘輿還洛陽避其鋒鋭徐傳檄天下以逆順制之君意如何元海曰殿下武皇帝之子有殊勳於王室威恩允洽四海欽風孰不思為殿下沒命捐軀者何難發之有乎王浚豎子東瀛踈屬豈與殿下爭衡乎殿下一發鄴宮示弱於人洛陽何復得至縱達洛陽威權不復在殿下也紙檄尺書誰人奉之且東胡之悍不踰五部願殿下勉撫士衆靖以鎮之當為殿下以二部摧東瀛二部梟王浚二豎之首可指日而懸矣潁悅拜元海為北單于元海至左國城二旬之間衆已五萬元海謂劉宣等曰夫帝王豈有常哉大禹出於西戎文王生於東夷唯德所授耳遂僣稱漢王子孫四世至曜為石勒所滅合二十五年又曰石季龍趙王石勒從子也身長七尺五寸趫捷便弓馬勇冠當時至於降城陷壘不復料別善惡坑塹士女鮮有遺類指授攻討所向無前故勒委以專征之任所在立後廢弘而僣位時豪傑侵恣賄賂公行季龍患之擢殿中御史季宸為御史中丞特親任之自此百僚震懾州部肅清季龍曰朕嘗聞良臣猛獸高步通衢而豺狼避路信矣哉季宸是也賞賜甚厚後以疾卒又曰石閔趙王季龍養子也善謀策勇力絶人既殺石鑒遂僣國號大魏戎卒三十萬旌旗鍾鼓綿亙百餘里雖石氏之盛無以過之慕容俊遣慕容恪率衆伐之閔與恪十戰皆敗恪恪乃以鐵鎖連馬簡善射卑勇而無剛者五千方陳而前閔所乘赤馬日行千里左仗雙刃右執劍戟順風擊之斬鮮卑三百餘級俄而燕騎大至圍之數匝閔躍馬潰圍馬死為恪所擒斬之左右七里草木悉枯又曰符生健之子也幼而無賴及長力舉千斤雄勇好殺手格猛獸走及奔馬擊剌騎射冠絶一時何法盛晉中興書曰周訪字士達尋陽人遷武昌太守時杜韜作亂寇豫章訪進討韜別帥杜弘張彥等邀訪訪為流矢所中折齒口中流血壯氣益勇先登舊擊臨陳禽彥殺數百人又曰劉遐字正長廣平人性果毅便弓馬遭天下亂遐自為塢主攻抄日至無時不戰遐每奮擊直入賊軍陷堅摧鋭鄉人邵績深知之以女妻焉遂立壁河濟之間胡不敢逼時人號為關羽張飛王隱晉書曰段匹磾召弟文鴦還厭次石虎來先縱騎抄城左右鴦登城臨見不勝其勇欲出擊胡磾疑有伏不聽出民出大為胡所殺掠鴦單將壯士數十騎出擊胡所殺甚多胡騎退鴦追躡磾率步繼鴦虎伏騎起磾鴦力戰殺胡數十鴦還赴磾磾已散還鴦所乘馬乏頓虎呼曰大兄久望共天同不違願今日見何故復戰請精杖語鴦罵曰汝為寇虜久應死吾兄不能用吾計故令汝得至此吾寧死不忍為汝擒遂下馬與胡戰矟折執刀戰不降虎軍四面解馬羅披自鄣前捉鴦自辰至申力極斫殺人而後見得也又曰石勒攻夏口朱伺銜鐵面以弩的射賊大帥數人皆殺之並以磊石弓箭兩下所向摧破賊皆拋船上岸於水邊作陳伺身被數十箭氣色不變諸軍尋至賊兵便崩退投水死者百數夏口之全伺之勳也宋書曰蒯恩字道恩蘭陵人高祖出征恩縣差為征民充甲士使伐馬芻恩常負大束兼倍餘高祖聞之即給器仗伏恩大喜因征妖賊常為先登多斬首級既習戰陳膽力過人又曰宗越朱陽人為郡吏太守夏侯穆擢為隊主蠻有為寇盜者常使越討伐往輒有功家貧無以市馬常刀楯步出單身挺戰衆莫能當每一捷郡將輒賞錢五千因此得買馬又曰宗啓為江夏王國上將軍十五年不徙官元嘉二十二年伐林邑啓自奮願行義恭舉啓有膽勇乃降除振威將軍又曰薛安都與副將談金追魯爽於小峴爽自與腹心壯騎斷後談金先薄之不能入安都望見爽便躍馬大呼直往剌之應手而倒左右范雙斬爽首爽纍世驍猛生習戰陳咸云萬人敵安都單騎直入斬之而反時人皆云關羽之斬顏良不過也徐爰宋書曰柳元景字孝仁河東解人也良家子少便弓馬慕尚將師數隨父伐蠻夙以勇稱孫巖宋書曰拓跋燾字佛貍壯健有筋力勇於戰鬭忍虐好殺夷旅畏之攻城臨敵皆親貫甲胄又曰宗啓字元幹南陽沮人兄泌娶妻始入門夜被劫啓年十四挺身與劫相拒十餘人皆披散不得入室時天下無事士人並以文義為業而啓任氣好勇故不為鄉曲所知齊書曰桓崇祖在淮陰見上便自比韓信白起咸不信唯上獨許之崇祖再拜奉旨及破虜啓上謂朝臣曰崇祖許為我制虜果如其言恆自擬韓白今真其人也又曰張敬兒年少便馬有膽氣好射虎發無不中南陽新野風俗出騎射而敬兒尤多膐力又曰魚復侯子響勇力絶人開弓四斛力數在園池中帖騎馳走竹樹下身無虧傷又曰周山圖鎮軍將軍張永征薛安都於彭城山圖領二千人迎軍至武原為虜騎所追合戰多所傷殺虜圍轉急山圖據城自固然後更結陳死戰突圍出虜披靡不能禁衆稱其勇呼為武原將又曰焦度初青州刺史顏師伯出鎮差度領憧上送之索虜寇青州師伯遣度領軍與虜戰於沙溝杜梁度身破陳大捷師伯板為己輔國府參軍虜遣清水公寇清口度又領軍救援剌虜騎將豹皮公墮馬獲其裝鎧矟手殺數十人師伯啓孝武稱度氣力弓馬並絶人帝召還充左右見度身形黑壯謂師伯曰真健物也又曰周盤龍子奉叔單馬率二百餘人結陳虜萬餘騎張左右翼圍繞之一騎走還報奉叔已沒盤龍方食棄筋馳馬奮弰直奔虜陳自稱曰周公來虜素畏盤龍驍名即時披靡時奉叔已大殺虜得往在外盤龍不知乃衝東擊西奔走突北賊衆莫敢當奉叔見其父久不出復躍馬入陳父子兩騎縈攪數萬人虜衆大敗盤龍父子由是名播北國形甚羸訥而臨軍勇果諸將莫逮又曰崔恭祖者慧景宗人驍果便馬矟氣力絶人頻經軍陳討王敬則與左興盛軍容袁文曠爭及敬則首訴明帝曰恭祖禿馬絳衫手剌倒賊故文曠得斬其首以死易勳而見枉奪若夫此勳要當剌殺左興盛帝以其勇使謂興盛曰何容令恭祖與文曠爭功遂封二百戶又曰桓康簡陵人勇果驍悍宋太初中隨武帝起義為郡所縶衆皆散康裝擔一頭貯穆后一頭貯文惠太子竟陵王子良自負至山中與門客蕭欣祖三十餘人相結破獄出武帝郡兵追急康死戰破之隋武帝起兵摧堅陷陳所經材邑次行暴害江南人畏之以其名怖小兒畫其形狀於寺中病瘧者寫其形怙其床壁無不立愈位至蘭陵太守梁書曰王神念少善射騎既老不衰常於高祖前手執二刀楯左右交度馳馬往來冠絶群伍又曰侯景懷朔人也少而不羈高歡以為將雄勇冠時征伐數有大功景謂高歡曰若假臣三萬人當橫行天下要須縛取蕭衍老翁遣作太平寺主及歡敗於沙苑景謂歡曰宇文泰忸於戰勝今必致殆請以徑騎數千至關中取之歡以告其妃婁氏婁氏曰彼若得泰景亦不歸高歡乃止後歡死景乃以河南十三州降于梁高澄使慕容紹宗圍景於長社景乃走紹宗追之至渦陽景遣使謂紹宗曰欲送客耶將定雌雄耶紹宗曰決戰景乃令將士皆被甲持短刃但低視斫人腦馬足遂敗紹宗軍裨將斛律光尤之紹宗曰吾戰多矣未見此賊爾相持連月景食盡其將景顯等降紹宗衆遂潰景乃與腹心數十騎南走後稍收散卒得馬步八百人晝夜兼行追軍不敢逼遣使謂紹宗曰景若就擒公復何用紹宗乃縱之遂攻壽春下之據其城
