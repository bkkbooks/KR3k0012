body:
  text: 鱗介部十三貝尚書禹貢曰淮海惟楊州島夷卉服厥篚織貝又顧命曰大貝鼖鼓在西房大貝如車渠商周傳寶之毛詩節巷伯曰萋兮菲兮成是貝錦貝如錦也又義䟽曰有紫貝質白如玉紫點為文皆行列相當大者徑一尺七寸今九真交阯以為杯盤實物也孝經援神契曰德至泉則江生大貝爾雅曰貝陸居贆方遙切在水者蜬水陸異名也貝中肉如科斗但有頭音含大者魧書大傳曰大貝如車渠車渠謂車輞即魧屬魧戶郎切小者鯖今細貝亦有紫色者出日南鯖音青玄貝貽貝黑色貝也餘貾音池黃白文以黃為質白為文點餘泉白黃文以白為質黃為文點今之紫貝以紫為質黑為文點蚆音巴博而頯頯者中央廣兩頭銳頯逵軌二音蜠音囷大而險險者污薄𧐐小而橢即上小貝橢謂狹而長此皆說貝之形容橢他果切說文曰貝海介蟲也古者貨貝而寶龜也汲冢周書王會曰共人玄貝共人吳越之蠻玄貝昭貝也漢書曰文帝賜尉佗書佗因使者獻紫貝五百後周書曰步落稽婦人多貫蜃貝以為飾隋書曰流求國人用鳥羽為冠飾以珠貝唐書曰吐渾國婦人辮髮縈後綴以珠貝又曰拂菻國有大貝車渠淮南子曰商拘文王於羑里於是散宜生乃以千金求天下之珍怪得大貝百朋五百為一朋也山海經曰虢山之尾其上多玉魚水出焉其中多文貝又曰邽山濛水出焉其中多貝貝甲中肉如科斗但有頭尾又曰赤水之東有蒼梧之野爰有文貝紫貝也南州異物志曰交阯以南海中有大文貝質白文紫天姿自然不假雕琢磨瑩而光煥爛六韜曰商王拘周西伯昌於羑里太公與散宜生金千鎰求珍物以免君罪九江之浦有大貝百馮詩作朋也鹽鐵論曰教與俗改弊與世易夏后氏以玄貝周人以紫石相貝經曰珪延得大貝於昌陽弱泉為五帝瑤器也得拘吝何貝大如輪為文王壽穆王得大紫貝懸其殼於昭陽觀以消惡霧又曰瀕水貝可以朗目南海貝如珠可以治水毒也浮貝投水則浮也醟貝使童子愚女子淫嶺表錄異曰紫貝即砑螺也儋振夷黎海畔採以為貨南越志曰土產明珠大貝即紫貝也螺易說卦曰離為蠃注曰剛在外也周官天官上鼈人曰祭祀供蠯蠃蚳以授醢人蠃螔蝓也鄭司農云蠯蛤也杜子春云蠯蚌也蠯音陴國語曰大夫種謀吳曰今吳大荒其民必移就蒲蠡於東海之濱必可伐廣志曰海文蠡數種其大者受一升南人以為酒杯魏書曰漢末天下荒亂率乏糧穀袁術在江淮取給蒲蠃民相食州郡蕭條宋書曰元嘉末魏太武征彭城遣使求酒及甘橘張暢宣孝武帝命致螺杯雜粽南土所珍北史曰隋劉臻性好噉蜆以音同父諱呼為扁螺淮南子曰蠃𧕯愈燭睨蠃附螺也𧕯細長螺也燭睨目中疾此皆治目之藥也人無故而求此物者必有蔽其明也水經曰桂陽貞女峽峽西岸高巖名貞女山山下際有石如人形高七尺狀女子故名貞女峽古來相傳有數女取螺於此遇風雨晝晦忽化為石山海經曰旬山洵水出焉南流注于閼澤其中茈蠃紫色螺也又曰邽山濛水出焉有螺魚身而鳥翼見則其邑大水搜神記曰謝端夏官人少孤為鄉人所養年十八恭謹自守後於邑下得一大螺如三升盆耳將盍甕中每早至野還見有飲飯湯火處端疑之於籬外窺之見一少女從甕中出至竈下燃火便入問之女荅曰我天漢中白水素女天帝哀卿少孤使我權相為守舍炊煮使卿後得婦當還去今無故相伺不宜留此忽有風雨而去徐衷南方記曰馬軻蠃大者圍九寸長四寸細者圍七寸長三寸南州異物志曰鸚螺狀如覆杯頭如鳥頭向其腹視似鸚鵡故以名肉離殼食唯以筋自係於殼飽則入殼中若為魚所食殼乃浮出為人所得質白而文紫崔豹古今注曰蝸牛宛轉有草紋縛為結似螺髻交州異物志曰寄居山蠃蟲而長如蠡而腳似蜘蛛大无殼入蠡殼中又曰螺大者如筥一邊重可為酒器又曰吒螺著海邊樹上見人吒如人聲可食又曰蒼螺江東人以為椀假豬螺日南有之厭為甲者鄧德明南康記曰平固水口下流數里有螺亭臨江昔一少女曾與伴俱乘小舩江漢採螺既逼暮因停沙邊共宿忽聞騷騷如軍馬行須臾乃見群螺張口無數相與為災來破舍噉此女子同侶諸嫗當時惶怖不敢作聲悉走上岸至曉方還但見骨耳收斂喪骨薄埋林際歸報其家經四五日間近所埋處飜見石冢穹窿高十餘丈頭可受二十人坐也今四面有階道髣髴人冢其頂上多螺殼新故相仍鄉傳謂之螺亭世語曰衛瓘大康永熙中家人炊飯墮地盡化為螺出足而行瓘終見誅廣五行記曰晉武帝時裴楷家炊黍在甑或變為螺其年楷卒又石崇家稻米化螺崇亦被誅嶺表錄異曰鸚鵡螺旋尖處屈而朱如鸚鵡觜故以此名殼上青綠斑大者可受二升殼內光瑩如雲母裝為酒杯奇而可翫又紅螺大小亦類鸚鵡螺殼薄而紅亦堪為酒器刳小螺為足綴以膠漆葛龔薦戴昱曰昱年六十二兄弟同居二十餘年及為宗老分舊業昱將妻子逃入虞澤結茅為室捃穫野豆拾掇蠃蚌以自振給蚌易通卦驗曰小雪雉入水為蜄爾雅曰蜃小者珧珧玉珧也即小蚌珧音遙說文曰𩶁步梗切蜯也鮚巨栗切蜯音蚌也漢書曰漢律會稽獻鮚醬二升蜯蜃之屬周書曰成三時具敺獻蜃鄭玄注曰蜃大蛤也大戴禮曰十月雉入淮為蜃蜃者蒲蘆也春秋後語曰齊趙將伐燕蘇代為燕說趙王曰今者臣來過小水見小蜯方出暴而鷸啄其肉蜯合而挾其啄啄口也上啄其肉音張角切下啄音許穢切鷸曰今日不雨明日不雨必見蜯脯蜯亦謂鷸曰今日不出明日不出必見死鷸兩不相捨漁父得而併擒之今趙且伐燕燕趙久相支以弊其眾臣恐強秦之為漁父也故願大王熟計之趙王於是乃止魏志曰孔融與韋康書云元將仲將不意雙珠近出老蜯陳書曰武帝雅尚恭儉膳不過數品私饗曲宴皆用瓦器蚌盤唐書曰太宗謂侍臣曰蜃性含水待月而水生木性懷火因燧而燄發人性含靈待學而成美墨子曰申屠狄謂周公曰賤人何可薄耶周之靈珪出於土石楚之明月出於蚌蜃少家大豪出於污澤天下諸侯皆以為寶狄今請退也淮南子曰季秋爵入大水為蛤爵依屋之萑也飛鳥也隨陽下藏故為蛤又曰古者剡耜而耕摩蜃而耨剡利也耜臿屬也蜃大蛤摩令利用之耨耨除苗穢又曰孟冬水始冰地始凍雉入大水為蜃雉陽鳥也三歲而死極陽切陰故隨陰氣入水為蜃蜃大蛤也又曰明月之珠出於蛖音尨蜄珠有夜光之明月生於蛖中又曰毛羽者飛行之類也故屬於陰日者陽之主也是以春夏則群獸除日至而麋鹿解解角也月者陰之宗也是以月虧而魚腦減月死而螺蚌㾭㾭減蹴也又曰古者民茹草飲水採樹木之實食蠃蛖之肉時多疹病毒傷之害又曰明月之珠蜃蛖之病而我之利虎爪象牙禽獸之利而我之害我猶人也又曰蛖象之病人之寶也蛖大蛤中有珠象牙還以自病故人得以為寶人之病將有誰寶之者乎人以利欲為病無人寶之故曰有將誰寶西京雜記曰長安始盛飾鞍馬競加雕鏤或一馬之飾直百金皆用白蜃為珂紫金為花以飾其上越地形記曰夏靖荅車茂弘論鄮縣書曰其蜯蛤之屬目所希見耳所未聞徐衷南方記曰白珠蜯殼長三寸半漲海中深六七丈去岸四五十里永嘉郡記曰樂成縣木履山東帶採門凡海採者皆由其門故以為名多香螺文蛤之屬博物志曰東南之人食水之產西北之人食六畜產食水產者龜蛤螺蚌以為珍味不覺其腥臊也食六畜產者狸兔鼠雀以為珍味不覺其膻燋也杜寶大業拾遺錄曰南方林邑有大蚌盈車明珠至寸不以為貴國人不採交州異物志曰烏滸山居射翠取羽剖蜯探珠任昉述異記曰淮水中黃雀至秋化為蛤至春復為黃雀五百年化為蜃蛤嶺表錄異曰珠池簾州邊海中有洲島島上有大池謂之珠池每年脩貢珠戶入池採珠皆採老蚌剖而取珠池在海上疑其底與海通珠如豌豆大常珠也如彈丸者亦時有得徑寸照室之珠卒不可遇也又取小蚌肉貫之以蔑曝乾謂之珠母容桂人率將脯燒之以薦酒肉也中有細珠如梁粟乃知珠池之蚌隨其大小悉胎中有珠矣延篤與高義方書曰今茲以五經為鼎簠書傳為俎籩祖述堯舜憲章文武未暇蜯也宜勿以為念郭璞江賦曰紫蚢如渠洪蚶專車瓊蚌晞曜以瑩珠石𧉧應節而揚葩
