body:
  text: 人事部五頭下吳志曰孫權太子和被幽閉驃騎將軍朱據尚書朴射屈晃率諸將吏泥頭自縛連日詣闕請和又曰諸葛恪被誅臨淮臧均表乞收葬恪曰臣聞雷震奮激不崇一朝大風衝發希有極日今恪父子三首懸示積日觀者數萬詈聲成風國之大刑無所不震又曰關羽既敗走權使虞翻筮之得兌下坎上節五爻變而之臨翻曰不出二日必當斷頭果如翻言權曰卿不及伏羲可與東方朔為比矣晉書曰嵇康謂趙至曰君頭小而鋭有白起風童子白黑分明又曰桓溫卒子玄為嗣襲爵年七歲溫服終府州文武辭其叔父沖沖撫玄頭曰此汝家故吏也玄因涕淚被面衆並異之王隱晉書曰蒼梧太守吳臣據郡邑不恭王命孫權遣步騭為交州喻臣臣照鏡不見其頭騭因入斬之又曰王珣與謝玄俱被辟桓溫曰謝掾必擁麾杖節王掾當作黑頭公未易才也晉中興書曰庾亮與蘇峻戰於建陽門王師敗績亮於陳攜其三弟懌條翼南奔溫嶠顯宗幸嶠船亮泥首謝罪崔鴻前秦録曰東海王符雄字元才洪之季子以功拜龍驤將軍征伐皆有殊績雄醜形貌頭大足短故軍中稱之為大頭龍驤秦記曰符堅祖洪見堅狀貌欲令頭堅腹軟字之曰堅頭隋書曰高祖文皇帝生馮翊波若寺皇妣抱帝忽見頭上出角遍體起鱗大駭墜帝於地春秋後語平原君曰澠池之會臣察武安君之為人小頭而鋭瞳子白黑分明視瞻不轉小頭而鋭斷敢行也瞳子白黑見事明也視瞻不轉執志強也可以持久難與爭鋒廉頗足以當之吳越春秋曰眉間尺逃楚入山道逢一客客問曰子眉間尺乎答曰是也吾能為子報讎尺曰父無分寸之罪枉被荼毒君今惠念何所用耶客曰須子之頭并子之劍尺乃與頭客與王王大賞之即以鑊煮其頭七日七夜不爛客曰此頭不爛者王親臨之王即看之客於後以劍斬王頭入鑊中二頭相齧客恐尺不勝自以劍擬頭入鑊中三頭相咬七日後一時俱爛乃分葬汝南宜春縣并三冢山海經曰三首國一身三首羽民國為人長頭又曰共工之臣曰相仰氏共工霸九州者也九首以食于九山晏子春秋曰景公遊於梧丘夜夢五大夫稱冤公問晏子晏子曰昔靈公田有大夫駭獸斷其頭埋之命曰五大夫丘公令掘之果如其言又曰湯長頭而寡髮莊子曰雲將東過扶搖之枝雲將雲之主師也扶搖木名生海東而適遭鴻蒙鴻蒙自然元氣雲將曰天氣不和地氣鬱結六氣不調四時不節今我願合六氣之精以育群生為之奈何鴻蒙拊髀爵躍掉頭曰吾弗知吾弗知又曰亡羊而得牛斷指而得頭燕丹子曰荊軻謂樊於其曰今得將軍之首與燕地圖秦王必喜而見軻軻將左手把其袖右手揕其胸則將軍積忿除矣於是起扼腕執刀曰是日夜所欲而今聞命於是自刎頭墮背後兩目不瞑以函盛於其首與軻入秦呂氏春秋曰今有人於此斷頭以易冠殺身以易衣世必惑也是何也冠所以飾頭衣所以飾身今殺所飾而要所以飾則不知所為矣世之趨利似此亦不知所為也帝系譜曰神農牛首伏羲人頭蛇身黃帝素問曰頭者精明之主也董卓別傳曰卓知所為不得遠近意欲以力服之遣兵於雒陽城時遇二月社民在社下飲食悉就斷頭駕其車馬載其婦女財物以斷頭繫車轅軸還雒云攻敗大獲稱萬歲入關雒陽城門焚燒其頭神仙傳曰曹公捕左慈數日得之便斷頭以白曹公公大喜曰果慈頭定視是一束茅耳搜神記曰南方有落頭民吳時將軍朱桓得一婢每夜臥後頭輒飛去或從狗竇或從天窗中出入以耳為翼將曉復還數數如此旁人怪之夜照視唯有身無頭其體微冷氣息裁屬乃蒙之以被至時頭還礙被不得安再三墮地噫吒甚愁而體氣急疾若將死者乃去被頭復起傅頸得安復如常人時南征大將亦往往得之又嘗有覆以銅盤者頭不得進遂死博物志同又曰渤海太守史良好一女子許而不果良斷其頭而歸投於竈下曰當令火葬頭語曰使君我相從何圖當耳異苑曰管寧避難遼東還泛海遭風船垂傾沒寧思衍曰吾嘗一朝科頭三晨晏起今天怒猥集過恐在此又曰晉惠帝元康三年武軍火燒夫子履漢斬白蛇劍漆王莽頭等録異傳曰漢武帝時蒼梧賈雍為豫章太守有神術出界討賊為賊所殺失頭雍上馬還營營中咸走來視雍雍胸中語曰戰不利為賊所傷諸君視有頭為佳無頭佳乎吏泣曰有頭佳雍曰不然無頭亦佳言畢遂死幽明録曰河東賈弼小名翳兒具諳究世譜義熙中為琅邪府參軍夜夢有一人面齄甚多大鼻瞷目請之曰愛君之貌欲易頭可乎乃於夢中許易明朝起自不覺而人悉驚走琅邪王大驚遣傳教呼視弼到琅邪遙見起還內弼取鏡自看方知怪異因還家家悉驚入內婦女走藏弼坐自陳説良久并遣人至府檢問方信後能半面啼半面笑兩手各捉一筆俱書辭意皆美此為異也餘並如先列女傳曰京師節女長安大昌里人夫有仇仇家執父使要其子為中間女念不聽則殺父殺父不孝聽則殺夫殺夫不義乃許之曰夜在樓上新沐頭東首臥者是還譎其夫使臥他處自沐臥樓上仇家斷其頭而去仇悲義之遂不殺其父益部耆舊傳曰段翳字元章善天文風角有一諸生來學積年諸生略究要術辭歸鄉里翳為作一脂筒中盛簡書曰有變乃發視之生至葭萌與吏爭津吏檛從人頭破開筒得書言到葭萌與吏鬭破頭者以此脂裹之生喟然而歎乃還卒其業博物志曰人以冷水漬至膝啖瓜數十漬至頭可啖百餘水皆作瓜氣括地圖曰白民白首身被髮三巴記曰巴有將軍曼子請於楚以平巴亂楚使請城曼子曰城不可得乃自刎其頭與楚楚義之以上卿禮葬其頭巴以上卿禮葬其身長沙耆舊傳曰劉壽少時遇相師曰君腦有玉枕必至公也後至太尉李郃別傳曰公耳有奇表腦枕如鼎形易洞林曰郭璞為左尉周恭卜云君墮馬傷頭尉後乘馬行黃昏坂下有犢車觸馬馬驚頭打石上流血殆死語林曰魏郡太守陳異嘗詣郡民尹方方被頭以水洗盤抱小兒出更無餘言異曰被頭者欲吾治民如理髮洗盤者欲使吾清如水抱小兒者欲使吾愛民如赤子也世説曰祖廣字淵度行怕縮頭詣桓南郡下車桓曰天甚明朗祖參軍如從屋漏中來又曰諸葛道明初過江左名亞王廋之下先為臨沂令丞相謂曰明府當為黑頭公楚辭曰魂兮來歸君無上天些一夫九首拔木九千些頂説文曰頂巔也易大過卦曰過涉滅頂凶無咎韋曜毛詩問曰早鬼眼在頂上列女傳曰齊鍾離春齊無鹽邑之女鐘離姓春名也其為人極醜無雙臼頭深目頂上少髮折腰出胸莊子曰支離疏頤隱於臍肩高於頂應璩新詩曰醉酒巾幘落頂禿赤如狐額釋名曰額鄂也有垠鄂也故幽州人謂之鄂易説卦曰巽為廣顙上大下小故為廣顙河圖曰黃帝廣顙龍額又曰天之東西南北極各有銅頭鐵額兵長三千萬丈三千億萬人毛詩鄘柏舟君子偕老曰子之清揚揚且之顏也清視明也揚廣揚而顏豐滿也展如之人兮邦之媛也詩含神霧曰代漢者龍顏珠額春秋元命苞曰在天為文昌在人為顏顙太一之謂也顏之言氣畔也陽立於五故顏博五寸論語摘輔象曰樊遲山額有若月衡反宇陷額是謂和喜方言曰𩔣音稽額也顏顙也江湘謂之頭中夏謂之額東齊謂之顙河濟淮泗之間謂之顏漢書曰成帝幸宮人嚴宮生男帝為趙昭儀召殺之宮曰果欲姊弟擅天下我兒男也額上有壯髮類孝元帝令兒安在危殺之矣奈何令長信得聞之東觀漢記曰和熹皇后年五歲夫人為鬋髮夫人年老目瞑并中后額雖痛忍不言又曰銚期從擊王郎將兒宏劉奉於巨鹿下期先登陷陳手殺五十餘人瘡中額攝情復戰遂大破之又曰馬廖上疏曰夫改政移風必有其本長安語曰城中好廣眉四方過半額魏志曰龐意親與關羽交戰射羽中額王隱晉書曰元帝白毫生額上有光明崔鴻後趙録曰石勒征見無劉曜守軍大悅舉手指天又指額曰天也北齊書曰文宣帝洋為王時夢人以筆點記額明日告舍人王雲哲曰吾其誅乎雲哲賀曰王上加點為主乎後果然隋書曰劉孝焯字士龍信都人犀額龜背望高視遠聰敏深沉弱不好弄又曰煬帝令陳稜討杜伏威伏威自出陳前挑戰稜部將射中其額伏威怒指之曰不殺汝我終不拔箭遂馳之獲所射者使其拔箭然後斬之鹽鐵論曰古者君子思德小人思利今人堅額健舌或以致業抱朴子曰老君額有三理上下徹語林曰賈充問孫皓何以好剝人面皮皓曰憎其顏之厚吳都賦曰雕題之士注曰鏤額也嶺南並鏤額額題也相書占氣雜要曰黃氣如帶當額橫卿之相也有卒喜皆發於色額上面中年上是其候也黃色最佳又曰額臨者男早得官女子早成
