body:
  text: 皇王部三十六唐玄宗明皇帝唐書曰玄宗明皇帝諱隆基睿宗第三子也母曰昭成順聖皇后竇氏垂拱元年秋八月戊寅生於東都性英斷多藝尤知音律善八分書儀範偉麗有非常之表三年閏七月丁卯封楚王天授二年十月戊戍出閣開府置官屬年始七歲朔望車騎至朝堂金吾將軍武懿宗忌上嚴整訶排儀仗因欲折之上叱之曰吾家朝堂干汝何事敢迫吾騎從則天聞而特加寵異尋卻入閣長壽二年臘月丁卯改封臨淄郡王聖曆元年出閣賜第於東都積善坊久視元年從幸西京賜宅於興慶坊長安中歷右衛郎將尚輦奉御神龍元年遷衛尉少卿景龍二年四月兼潞州別駕十二月州境有黃龍白日升天嘗出畋有紫雲在其上後從者望而得之前後符瑞凡一十九事四年中宗將祀南郊來朝京師將行使術士韓禮筮之蓍一莖孑然獨立禮驚曰蓍立奇瑞非常也不可言屬中宗末年王室多故上常陰引材力之士以自助上所居宅外有水池浸溢頃餘望氣者以為龍氣四月中宗幸其第因遊其池結綵為樓二舟令巨象踏之至六月中宗暴崩韋后臨朝稱制韋溫宗楚客紀處訥等謀傾宗社以睿宗介弟之重先謀不利道士馮道力處士劉承祖皆善占兆詣上布誠款上所居里名隆慶時人語訛云隆為龍韋庶人稱制改元又為唐隆皆符御名上益自負乃與太平公主謀之公主喜以子崇簡從上乃與崇簡朝邑尉劉幽求長上折衝麻嗣宗押萬騎果毅葛福順李仙鳧寶昌寺僧普潤等定策誅之或曰先啓大王上曰我拯社稷之危赴君父之急事成福歸於宗社不成身死於忠孝安可先請憂怖大王乎若請而從是王與危事請而不從則吾計失矣遂以庚子夜率幽求等數十人自苑南入總監鍾紹京又率丁匠百餘人以從分遣萬騎往玄武門殺羽林將軍韋璿韋播高嵩持首而至衆歡叫大集攻白獸玄德等門斬關而進左萬騎自左入右萬騎自右入合於凌煙閣前時太極殿前有宿衛梓宮萬騎聞譟聲皆被甲應之韋庶人惶惑走入飛騎營為亂兵所害於是分遣誅韋氏之黨比明內外討捕皆斬之乃馳謁睿宗謝不先啓請之罪睿宗遽前抱上而泣曰宗社禍難由汝安定神祗萬姓賴汝之力也拜殿中監同中書門下三品兼押左右萬騎進封平王睿宗即位與侍臣議立皇太子僉曰除天下之禍者享天下之福拯天下之危者受天下之安平王有聖德定天下又聞成器已下咸有推讓宜膺主鬯以副群心睿宗從之景牛制立為皇太子延和元年凶黨因術人間睿宗曰據玄象帝座及前星有災皇太子合作天子不合更居東宮矣睿宗曰傳德避災吾意決矣七月壬午下制曰皇太子某有大功於天地定阽危於社稷溫文既習聖敬克躋委之監撫已移年歲時政益明庶工惟序服之知子庶不負時曆數在躬宜陟元后可令即皇帝位有司擇日授册朕方比迹洪古希風太皇神與化遊思與道合無為無事豈不美歟王公百寮宜識朕意上惶懼遽馳見叩頭請所以傳位之旨睿宗曰吾因汝功業得宗社今帝座有眚思欲遜避唯盛德大勳始轉禍為福易位於汝吾知免矣上始居武德殿視事三品以下除授及徒罪皆決之先天二年七月三日尚書左僕射竇懷貞侍中岑羲中書令蕭至忠崔湜雍州長史李晉左羽林大將軍常元揩知羽林將軍李慈等與太平公主同謀期以其月四日以羽林兵作亂上密知之因以中旨告歧王範薛王業兵部尚書郭元振將軍王毛仲殿中監薑皎中書侍郎王琚吏部侍郎崔日用等定計因毛仲取間廄馬及家人三百餘人率太僕少卿李令問王守一內侍高力士果毅李守德等親信十數人出武德殿入虔化門梟常元揩李慈於北闕擒賈膺福李猷於內客省以出執蕭至忠岑羲於朝堂皆斬之睿宗明日下詔曰朕將高居無為自今軍國刑政一事已上並取皇帝處分上御承天門樓下制大赦天下冬十一月甲申幸新豐之溫湯癸卯講武於驪山兵部尚書代國公郭元振坐虧失軍容配流新州給事中攝太常少卿唐紹以軍禮有失斬於纛下甲辰畋獵于渭川同州刺史梁國公姚元崇為兵部尚書同中書門下三品十一月戊子上加尊號為開元神武皇帝十二月庚寅朔大赦天下改元為開元四年六月癸亥太上皇崩九年四月甲戍上親策試應制舉人於含元殿謂曰古有三道今減二策近無甲科朕將存其上第務收賢俊十三年冬十月辛酉東封泰山發自東都十一月丙戍至兗州岱宗頓丁亥致齋於行宮己丑日南至備法駕登山仗衛羅列嶽下百餘里詔行從留於谷口上與宰臣禮官升山庚寅祀昊天上帝於上壇有司祀五帝百神于下壇禮畢藏玉册於封祀壇之石䃭然後燔柴燎發群臣稱萬歲傳呼自山頂至嶽下震動山谷上還齋宮慶雲見日抱戴辛卯祀皇地祇于社首藏玉册於石䃭如封祀壇之禮壬辰御帳殿受朝賀大赦天下封太山神為天齊王禮秩加三公一等環山十里禁其樵採賜酺七日甲午發岱嶽景申幸孔子宅親設奠祭十二月己巳至東都時纍歲豐稔東都米斗十錢青齊米斗五錢是冬分吏部為銓勑禮部尚書蘇頲刑部尚書韋抗工部尚書盧從願等分掌選事十四年五月癸卯戶部進計帳今年管戶七百六萬九千五百六十五管口四千一百四十一萬九千七百一十二二十二年五月關中大風拔木同州尤甚是夏上自於苑中種麥率皇太子已下躬自收穫謂太子等曰此將薦宗廟是以躬親亦欲令汝等知稼穡之難也因分賜侍臣謂曰此歲令人巡檢苗稼所對多不實故自種植以觀其成且春秋書麥禾豈非古人所重也二十五年春正月壬午制曰朕猥集休運多謝哲王然而哀矜之情小大必慎自臨寰宇子育蒸黎未嘗行極刑起大獄上玄降鑒應以祥和思叶平邦之典致之仁壽之域自今有犯死刑除十惡罪宜令中書門下與法官詳所犯輕重具狀奏聞秋七月己卯大理少卿徐岵奏天下今歲斷死刑五十八幾致刑措二十七年八月甲申制追贈孔宣父為文宣王顏回為兗國公餘十哲皆為侯夾坐後嗣褒聖侯改封為文宣公二十九年正月制兩京諸州各置玄元皇帝廟并置崇玄學天寶元年春正月丁未朔大赦天下改元常赦不原咸赦除之百姓有欠負租稅及諸色並免之前資官及白身人有儒學博通文詞秀逸及軍謀武藝者所在具以名薦京文武官才堪為刺史者各令封狀自舉改黃鉞為金鉞內外官各賜勳兩轉甲寅陳王府參軍田同秀上言玄元皇帝降見于丹鳳門之通衢告錫靈符在尹喜之故宅上遣使就函谷故關尹喜臺西發得之乃置玄元廟於大寧坊二月丁亥上加尊號為開元天寶聖文神武皇帝辛卯親享玄元皇帝于新廟甲午親享太廟景申合祭天地于南郊制天下囚徒罪無輕重並釋放三載正月景辰朔改年為載四載秋八月甲辰册太真妃楊氏為貴妃七載三月乙酉大同殿柱産王芝有神光照殿群臣請加皇帝尊號曰開元天寶聖文神武應道許之夏五月壬午上御興慶宮受册徽號大赦天下六月范陽節度使安祿山賜實封及鐵劵十一載十一月庚申御史大夫兼蜀郡長史楊國忠為右相兼文部尚書十三載二月祿山奏前後討奚契丹立功將士跳蕩等請超三資於是超授將軍者五百餘人中郎將者二千餘人十四載冬十月壬辰幸華清宮景寅范陽節度使安祿山率蕃漢之兵十餘萬自幽州南向指闕以誅楊國忠為名先殺太原尹楊光翽於博陵郡壬申聞於行在所癸酉以郭子儀為靈武太守朔方節度使封常清自安西入奏至行在甲戍以常清為范陽平廬節度使令募兵三萬以禦逆胡戊寅還京十二月景戍朔祿山於靈昌郡渡河辛卯陷陳留郡殺張介然甲午陷滎陽郡殺太守崔無詖景申封常清與賊戰于成皋罌子谷官軍敗績常清奔于陜郡丁酉祿山陷東京殺留守李憕中丞廬奕判官蔣清時高仙芝鎮陜郡棄城西保潼關常山太守顏杲卿與長史袁履謙賈深等殺賊將李欽湊執賊將何千年高邈送京師辛丑詔皇太子統兵東討十五年春正月乙卯御宣政殿受朝其日祿山僣號於東京六月庚寅哥舒翰將兵八萬與賊將崔乾祐戰于靈寶西原官軍大敗死者十六七甲午將謀幸蜀乃下詔親征仗下後士庶恐駭奔走于路乙未凌晨自延秋門出微雨霑濕扈從唯宰相楊國忠韋見素內侍高力士太子親王妃主皇孫已下多從之不及平明渡便橋國忠欲斷橋上曰後來者何以能濟命緩之辰時至咸陽望賢驛置頓官吏駭散無復儲擬上憩於宮門之樹下亭午未進食俄有老父獻麨上謂之曰爾可進飯於是百姓獻食相繼俄又尚食持御膳至上頒給從官而後食是夕次金城縣官吏已遁令魏方進男允招誘俄得智藏寺僧進芻粟行從方給景辰次馬嵬驛諸衛頓軍不進龍武大將軍陳玄禮奏曰逆胡指闕以誅國忠為名然中外群情不無嫌怨今國步艱阻乘輿震蕩陛下宜徇群情為社稷大計國忠之徒可致之於法會吐蕃使二十一人遮國忠告訴於驛門衆即呼曰楊國忠連蕃人謀逆兵士圍驛四合及誅楊國忠魏方進一族兵猶未解上令高力士詰之回奏曰諸將既誅國忠以貴妃在宮人情恐懼上即命力士賜貴妃自盡玄禮等見上請罪命釋之丁酉將發馬嵬驛朝臣唯見韋素一人乃命素子京兆府司録諤為御史中丞充置頓使議其所向軍士或言河隴或言靈武太原或言還京為便韋諤曰還京須有捍賊之備兵馬未集恐非萬全不如且幸扶風徐圖所向上詢于衆衆以為然及行百姓遮路乞留皇太子願戮力破賊收復京城即日留太子戊戍次扶風縣己亥次扶風郡軍士各懷去就咸出醜言陳玄禮不能制會益州貢春綵十萬匹上悉命置于庭召諸將諭之曰卿等國家功臣陳力久矣朕之優獎常亦不輕逆胡背恩事須回避甚知卿等不得別父母妻子朕亦不及親辭九廟言發涕流又曰朕須幸蜀路險狹人若多往恐難供承今有此綵卿等即宜分取各圖去就朕自有子弟中官相隨便與卿等決別衆咸俯伏涕泣曰死生願從陛下上曰去住任卿自是悖亂之言稍息庚子以司勳郎中劍南節度留後崔圓為蜀郡長史劍南節度副大使以穎王璈為劍南節度大使以監察御史宋若思為御史中丞充置頊使韋諤充巡閣道使並令先發辛丑發扶風郡是夕次陳倉壬寅次散關分部下為六軍穎王璈先行壽王瑁等分統六軍前後左右相次景午次河池郡崔圓奏劍南歲稔民安儲供無闕上悅授圓中書侍郎同中書門下平章事蜀郡長史劍南節度如故以前華州刺史魏仲犀為梁州長史秋七月壬戍次益昌縣渡吉柏江有雙魚夾舟而躍議者以為龍甲子次普安郡憲部侍郎房琯自後至上與語甚悅即日拜為吏部尚書同中書門下平章事丁卯詔以皇太子諱充天下兵馬元帥都統朔方河東河北平盧等節度兵馬收復兩京庚午次巴西郡庚辰車駕至蜀郡扈從官吏軍士到者一千三百人宮女二十四人而已八月癸未朔御蜀郡府衙宣詔大赦天下癸巳靈武使至始知皇太子即位丁酉上用靈武册稱上皇詔稱誥己亥上皇臨軒降册册肅宗命宰臣韋見素房琯使靈武册命曰朕稱太上皇軍國大事先取皇帝處分後奏朕知俟克復兩京朕當怡神姑射偃息大庭明年九月郭子儀收復西京十月肅宗遣中使啖廷瑤入蜀奉迎丁卯上皇發蜀郡十一月景申次鳳翔郡肅宗遣精騎三千至扶風迎衛十二月景午肅宗具法駕至咸陽望賢驛迎奉上皇御宮之南樓肅宗拜慶樓下嗚咽流涕不自勝為上皇徒步控轡上皇撫背止之即騎馬前導丁未至京師文武百寮京城士庶夾道歡呼靡不流涕即日御大明宮之含元殿見百寮上皇親自撫問人人感咽上皇謁廟請罪遂幸興慶宮三載二月肅宗與群臣奉上皇尊號曰太上至道聖皇帝乾元三年七月丁未移幸西內之甘露殿時閹宮李輔國離間肅宗故移居西內高力士陳玄禮等遷謫上皇寖不懌上元二年四月甲寅崩于神龍殿時年七十八諡曰至道大聖大明孝皇帝廟號玄宗初上皇親拜五陵至橋陵見金栗山岡有龍盤鳳翥之勢復近先塋謂侍臣曰吾千秋後宜葬此地得奉先陵不忘孝敬矣至是追奉先旨以創寢園廣德元年三月辛酉葬泰陵安祿山附唐書曰安祿山營州柳城雜種胡人也本無姓氏名軋犖山母阿史德氏亦突厥巫師以卜為業開元初與將軍安道買男俱逃出突厥中安道買次男貞節為嵐州別駕收獲之年十餘歲矣冒姓為安及長解六蕃語二十年張守圭為幽州節度祿山盜羊事覺守圭剝坐欲棒殺之大呼曰大夫不欲滅兩蕃耶何為打殺祿山守圭見其肥白壯其言而釋之令與鄉人史思明同捉生行必剋獲拔為偏將以驍勇聞遂養為子二十八年為平廬兵馬使性巧密人多譽之授營州都督平廬軍使厚賂往來者乞為好言玄宗益信嚮之天寶元年以平盧為節度以祿山攝中丞為使入朝奏事玄宗益寵之三載代裴寬為范陽節度河北採訪平盧軍等使如故採訪使張利貞嘗受其賂及李林甫並言其美玄宗意益堅後請為貴妃養兒入對皆先拜太真玄宗怪問之對曰臣是蕃人先母而後父玄宗大悅遂命楊銛已下並約為兄弟姊妹晚年益肥壯垂手過膝重三百三十斤每行以肩膊左右抬挽其身方能移步至玄宗前作胡旋舞疾如風焉為置第宇窮極壯麗上御勤政樓於御坐東為設一大金雞障前置一榻坐之十載入朝又求為河東節度因拜之長子慶宗大僕卿少子慶緒鴻臚卿慶宗又尚郡主祿山陰有逆謀於范陽北築雄武城外示禦寇內貯兵器積穀為保守之計戰馬萬五千匹牛羊稱是秉三節度進奏無不允每月進奉生口駝馬鷹犬不絶人無聊生矣祿山既肥大不任戰十一載八月祿山併率河東等軍十五萬以討契丹去平盧千餘里至土護真河即北黃河也倍程奄至契丹牙帳屬久雨弓箭皆漲濕將士困極奚又夾攻之殺傷略盡祿山被射以麾下奚小兒二十餘人走上山墜坑中其男慶緒等扶之會夜解走投平盧城楊國忠屢奏祿山必反玄宗使中官輔璆琳覘之得其賄賂盛言其忠十三載正月謁於華清宮因涕泣言臣蕃人不識字陛下擢臣不次被楊國忠欲得殺臣玄宗益親厚之遂以為左僕射卻回又請為間廄隴右群牧等都使又請知揔監事既為間廄群牧等使上筋腳馬皆陰選擇之三月歸范陽疾行出關日三四百里至范陽人言反者玄宗必大怒縛送與之十四載十一月反於范陽矯稱奉恩命以兵討逆賊楊國忠以諸蕃馬步十五萬以高尚嚴莊為謀主孫孝哲高邈何千年為腹心天下承平日久人不知戰聞其兵起朝廷震驚禁衛皆市井商販之人乃以高仙芝封常清等擊之祿山又嚴肅得士死力無不一當百遇之必敗十二月渡河遂入陳留郡太守郭納出降至滎陽太守崔無詖拒戰城陷死之次于汜水罌子谷乃取谷南而過東京留守李憕中丞盧奕使採訪判官蔣清燒絶河陽橋祿山入東京殺李憕盧奕蔣清召河南尹達奚珣使之蒞事十五年正月賊竊號燕國年號聖武達奚珣已下署為將相五月南陽節度魯炅率荊襄黔中嶺南子弟十萬與賊將武令珣戰于葉縣城北滍河王師盡沒六月李光弼郭子儀出土門路大破賊衆於常山郡東嘉山河北諸郡歸順者十餘祿山窘急圖欲卻投范陽會哥舒翰自潼關領馬步八萬與賊將崔乾祐戰于靈寶西為賊覆敗翰西奔潼關為其帳下執送于賊關門不守玄宗幸蜀十一月遣阿史那承慶攻陷穎川屠之祿山以體肥及造逆後而眼漸暗至是不見物又著疽疾至德二年正月朔受朝瘡甚而中罷尤躁急動用斧鉞嚴莊亦被捶撻莊謀立慶緒領豎李豬兒同入祿山帳中豬兒以大刀斫其腹祿山眼無所見捫床頭刀不得但撼幄帳中大呼曰是我家賊腸已數斗流在床上言訖氣絶莊即宣言於外言祿山傳位於晉王慶緒縱樂飲酒無度呼莊為兄事之小大必咨之慶緒為偽主素懦精神言詞無序二月肅宗南幸鳳翔郡始知祿山死使僕固懷恩使于回紇結婚請兵討逆九月廣平王領蕃漢之衆收西京走安守忠賊之死者積如山阜王師乘勝至陜郡賊懼令嚴莊傾其驍勇而來拒廣平王遣副元帥郭子儀等與賊戰于陜西曲沃大破之斬首十餘萬嚴莊奔至東京告慶緒慶緒率其餘衆奔河北保鄴郡嚴莊至河內南來歸順賊將阿史那承慶等麾下三萬餘衆悉奔恆趙范陽從慶緒者唯疲卒一千騎三百而已乾元元年九月肅宗遣郭子儀等九節度率步騎二十萬以攻之子儀使善射者三千人伏於壘垣內明日接戰子儀麾其屬偽奔慶緒逐之伏者齊發賊軍大潰使薛高求救於史思明言禪讓之禮思明先遣李歸仁以步騎一萬馬軍三千先往滏陽以應之及至滏陽子儀之圍已固築城穿壕各三重引水以灌城下思明南攻魏州節度使崔光遠南走思明據其城乾元二年正月思明偽稱燕王慶緒自十月被圍至二月城中人相食思明引衆來救三月子儀等戰敗遂解圍而南斷河陽橋以守穀水思明領其衆營於鄴縣南慶緒使收子儀等營中糧尚六七萬石張通儒高尚平列謂慶緒曰史王遠來臣等皆合迎謝對曰任公暫往見思明思明與之涕泗厚其禮復令歸城經三日慶緒以三百騎詣思明思明引入令三軍擐甲執兵待之及諸弟領至于庭再拜稽首曰臣不克負荷棄失兩都久陷重圍不意大王以太上皇之故將兵遠救思明曰棄失兩都用兵不利亦何事也爾為人子殺汝父以求位庸非大逆乎吾為太上皇討賊即牽出并其四弟及高尚孫孝哲崔乾祐皆縊殺之祿山父子僣逆三年而滅
