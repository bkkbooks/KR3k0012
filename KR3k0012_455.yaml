body:
  text: 人事部九十五諫諍四崔鴻前趙録曰劉聰將起鳳儀殿於後庭廷尉陳元達諫聰怒曰將營一宮豈問汝鼠子乎將斬之時在逍遙園元達抱堂下樹叫曰臣所言者社稷之計也劉后在後堂密手疏救之乃解改逍遙園為納賢園季中堂為愧賢堂又曰閹豎王沈等用事太宰易大將軍敷御史大夫陳元達詣闕請固請免沈等官聽以表示沈等笑曰是兒等為元達所引遂成癡也聰手壞其表又曰趙染次于新豐東晉安將軍索綝長安東討染有輕敵之色染長史魯徽曰困獸猶鬭況於國乎染曰索綝小豎豈能汙吾馬蹄刀劍也師精騎逆戰于城西敗績悔曰吾不用魯徽之言以至於是乃斬徽徽臨刑謂染曰將軍違謀取敗誅忠良以逞過忿若死而有知當訴將軍於黃泉使將軍不得眠床枕死趙染攻北地夢魯徽引箭射之且將攻城中弩卒又曰石虎馳獵無度晨出夜歸太子韋傅諫曰臣聞千金之子坐不垂堂萬乘之主行不履危陛下雖天生神武雄據四海乾坤冥贊方無所慮者也然白龍魚服有豫且之禍海若潛遊離葛陂之酷深願陛下清宮蹕路思二神為玄鑒不忘天下之重虎省善之賜以束帛又曰趙明字顯昭南陽人虎攝位拜為尚書及誅勒諸子明諫曰明帝功格皇天為趙之太祖安可以絶之虎曰吾之家事幸卿不須言也以直言忤旨故十年不遷貞固之風時論擬之蘇則崔鴻前秦録曰符堅如鄴狩於西山親馳射獸遊獵旬餘昏而忘返伶人王洛叩馬諫曰若禍起須臾變在不測者其如宗廟何其如太后何堅曰善哉昔文公悟愆於虞人朕聞罪於王洛吾過也崔鴻前涼録曰張天錫元日與嬖褻飲既不受群寮朝賀又不朝於永訓宮從事郎中張慮輿櫬切諫不納又曰張駿宴群臣于間豫堂議欲嚴刑峻制衆咸以為宜參軍黃斌進曰臣未見其可若尊親犯令不行矣駿性嚴猛乃棄几改容曰微黃生吾不聞過矣黃生可謂忠之至也後魏書曰高允為中書令武帝禁封良田人無農多游者允上疏諫曰臣少也賤所知唯田請以農事言之夫地方十里為田三頃六十畝百里為田三萬六十頃若勤之則畝增三斗墯之則畝減三斗百里之內損益之率為粟可知矣況天下之廣乎若戶有私儲則國無陰陽之眚上從之三年而國霸又曰元昭業為諫議大夫莊帝將畋洛南昭業叩馬諫止帝避之而過後詔勞勉之又曰汝南王悅字宣禮性不倫俶儻難測無故過杖京兆王愈子寶月悅國前郎中令北平陽固上疏諫曰伏聞殿下乃以小怒過行威罰誠嚴訓有餘而慈惠不足當今主上幼冲宰輔用事履冰踐霜兢業猶恐不濟況肆意非彝任情行事欲保全福祿其可得乎昔龔遂去國猶獻直言韋孟離朝不忘本國況臣忝荷朝私猥充謬舉伏隸國僚聞道有歲敢不盡言悅覽之大怒陳書曰章華字仲宗上疏諫後主曰陛下不思先帝之艱難不知天命之可畏溺於嬖寵惑於酒色祠七廟而不出拜后妃而臨軒老臣宿將棄之草莽諂佞讒邪升之朝廷今壃場日蹙隋軍日至陛下不改絃易張臣見麋鹿遊於姑蘇矣後主大怒即日斬之隋書曰盧愷武帝在雲陽宮勑諸屯簡老牛欲以享士愷進諫曰昔田子方贖老馬君子以為美談向奉明勑欲以老牛享士有虧仁政帝美其言而止又曰劉行本沛人纍遷黃門侍郎高祖常怒一郎於殿前笞之行本進諫曰此人素清其過又小上不顧行本又曰陛下不以臣不肖置在左右臣言若是陛下安得不聽臣所言非當致之大理安得輕臣而不顧臣所言非私因置笏於地而退上於是斂容謝之又曰蘇威見宮中以銀為幔鉤因盛陳節儉之美以諭上上為之改容雕飾舊物悉命除毀上嘗怒一人將殺之威入閣進諫不納上怒甚將自出斬之威當上前不去避之而出威又遮止上拂衣而入良久乃召威謝曰公能若是吾無憂矣於是賜馬二匹錢十餘萬又曰趙綽為刑部侍郎治梁士彥等獄賜物三百段奴婢十口馬二十匹每有奏讞正色侃然上嘉之漸見親重上以盜賊不禁將重其法綽進諫曰陛下行堯舜之道多存寬宥況律者天下之大信其可失乎上欣然納之因謂綽曰若更有聞見宜數陳之也上禁行惡錢有二人在市以惡錢易好者武候執以聞上令悉斬之綽進諫曰此人坐當杖殺之非法上曰不關卿事綽曰陛下不以臣愚暗置在法司欲妄殺人豈得不關臣事上曰撼大木不動者當退對曰臣望感天心何為動木上復曰啜羹者熱則置之天子之欲相挫耶綽拜而益前訶之不肯退上遂入治書侍御史柳彧復上奏切諫上乃止唐書曰虞世南雖容貌懦懦若不勝衣而志性抗烈論及古先帝王為政得失必存規諷多所補益太宗常謂侍臣曰朕因暇日與虞世南商略古今有一言之失未嘗不悵恨其懇誠若此朕用嘉言群臣皆若世南天下何憂不理又曰孔頴達數進忠言益見親待太宗嘗問曰論語云以能問於不能以多問於寡有若無實若虛何謂也頴達對曰聖人設教欲以謙光己雖有能不自矜大仍就不能之人求訪能事己之才藝雖多猶以為少仍就寡小之人更求所益己之雖有其狀若無己之雖實其容若虛非唯匹庶帝王之德亦當如此夫帝王內蘊神明外須玄默深不可測度不可知易稱以蒙養正以明夷蒞衆若其位居尊極炫耀聰明以才凌人飾非拒諫則上下情隔君臣道乖自古滅亡莫不由此也太宗深善其對又曰劉洎太宗嘗謂侍臣曰夫人臣之對帝王皆順旨而不逆甘言以取容朕今發問欲聞己過卿等須言朕愆失長孫無忌李績楊師道等咸云陛下聖人化致太平臣等不見其失洎對曰陛下化高萬古誠如無忌等言然頃上書人不稱旨或面加窮詰無不慚退非獎進言者之路太宗曰卿言是也當為卿改之又曰谷那律遷諫議大夫嘗從太宗出獵在途遇雨因問曰油衣若為得不漏那律曰能以瓦為之則不漏矣意欲太宗弗為獵太宗大悅賜帛二百段又曰柳範貞觀中為侍御史時吳王恪好畋獵損居人範奏彈之太宗因謂侍臣曰權萬紀事我兒不能匡正其罪合死範進曰房玄齡事陛下猶不能諫止畋獵豈可獨罪萬紀太宗大怒拂衣而入久之獨引範謂曰何得逆折我範曰臣聞主聖臣直陛下仁明臣敢不盡愚直太宗意乃解又曰薛收嘗上書諫獵太宗手詔曰覽讀所陳實悟心膽今日成我卿之力也明珠兼乘豈比來言當以誡心書何能盡今賜卿黃金四十鋌以酬雅意又曰高季輔授太子右庶子又上疏切諫時政得失特賜鍾乳一劑曰卿進藥石之言故以藥石相報又曰太宗問褚遂良曰舜造漆器禹雕其俎當時諫舜禹者十餘人食器之間苦諫何也遂良對曰雕琢害農事組纂傷女工首創奢淫危亡之漸漆器不已必金為之金器不已必玉為之所以諍臣必諫其漸及其滿盈無所復諫太宗為然又曰高宗將廢皇后王氏立武昭儀為皇后禇遂良欲陳諫及入高宗難於發言再三顧曰莫大之罪絶嗣為甚王后無胤息昭儀有子今欲立皇后公等以為如何遂良曰皇后出自名家先朝所娶伏事先帝無愆婦德先帝不豫執陛下手以語臣曰我好兒好婦今將付卿陛下親承德音言猶在耳皇后自此未有愆過恐不可廢臣今不敢曲從上旨違先帝之命特願再三思審愚臣上忤聖顏罪合萬死但願不負先朝厚恩何顧性命遂良致笏殿陛曰還陛下此笏乃解巾叩頭流血帝大怒令引出因左遷遂良潭州都督後轉桂州未幾貶愛州刺史又曰納言桓彥範嘗上表論中宗時政數條其大略曰昔孔子論詩以關睢為始言后妃者人倫之本理亂之端也故皇英降而虞道興任姒歸而姬宗盛桀奔南巢禍階末嬉魯桓滅國惑以齊媛伏見陛下每臨朝聽政皇后必施帷幔坐於殿上預聞政事臣愚歷選列辟詳求往代帝王有與婦人謀及政者莫不破國亡身傾輈繼路且以陰乘陽違天也以婦凌夫違人也違天不祥違人不義由是古人譬以牝雞之晨惟家之索易曰無攸遂在中饋言婦人不得預於國政也伏願陛下覽古人之言察古人之意上以社稷為重下以蒼生在念宜令皇后無往正殿干預外朝專在中宮聿修陰教則坤儀式固鼎命惟新疏奏不納又曰中書侍郎袁恕己以將作少匠楊務廉素以工巧見用中興初恕己恐其更啓遊娛侈靡之端言於中宗曰務廉致位九卿積有歲年若言嘉謀無足可紀每宮室營構必務其侈若不斥之何以廣昭聖德由是左授陵州刺史又曰德宗嘗泛舟魚藻宮張水戲命皇太子升舟舟具皆飾以金碧丹青使婦人盛飾操篙楫行舟光彩映燭絲竹歌謳俱發德宗顧謂上曰今日如何上對曰極盛退因以奢為諫德宗不悅又曰杜希全積功至朔方軍節度使嘗獻體要八章多所規諫德宗深納之乃著君臣針以賜之又曰憲宗元和中有五坊使犯法上將宥之裴度懇論不已時方征鄆冀上曰五坊是小事今日與卿要商量用兵度奏曰山東叛逆不過亂數州五坊使橫暴將亂輦下上怒起入見諸中人曰使我羞見宰相遂殺五坊使京師肅然天下望風而理又曰鎮州王承宗之叛憲宗將以吐突承瓘為招討處置使呂元靖與給事中穆質兵部侍郎許孟容等八人抗論不可且曰承瓘雖貴寵然內臣也若為師總兵恐不為諸將所伏指喻明切憲宗納之為改使號然猶專戎柄又曰李絳嘗因浴堂北廊奏對違忤上旨指切時病及論中官縱恣方鎮進獻事宜上怒甚厲聲曰卿所論事何太過耶絳前論不已曰臣所陳豈臣身之利是國家之利陛下不以臣愚使處腹心之地豈可見事虧聖德致損清時而惜身不言仰屋竊歎是臣負陛下也若不顧患禍盡誠奏論旁忤幸臣上犯聖旨以此獲罪是陛下負臣也且臣與內官素不相識又無嫌隙只是威福大盛上損聖明臣所以不敢不論耳使臣緘默非社稷之福也上見其誠不回即怒解稍慰喻曰卿盡節於朕人所不言卿悉言之使朕聞所不聞真忠正誠節之臣也他日南面亦須如今日絳拜恩而退後教坊忽稱密旨取良家士女及衣冠別第妓人京師囂然絳謂同列曰此事大虧損聖德須有論諫或曰此嗜欲間事從諫官陳疏絳曰居常諸公嘗病諫官論事此難事即推與諫官可乎遂極疏論奏翌日延英上舉手謂絳曰昨見卿狀所論採擇事非卿盡忠於朕何以及此朕都不知向外事此是教坊罪過不諭朕意以至於此朕緣丹王以下四人院內都無侍者朕令於樂工中及閭里有情願者厚其錢帛只取四人四人各與一人伊不會朕意便如此生事朕今已科罰其所取人並放歸若非卿言朕寧知過矣又曰白居易為右拾遣上令神策中尉吐突承璀為招討使諫官上章者十七八居易面論詞情切至既而又請罷河北用兵凡數千言皆今人之難言者上多聽納唯諫承璀事稍過上頗不悅謂李絳曰白居易小子是朕拔擢致名位而無禮於朕朕實難奈絳曰居易所以不避死亡之誅事無巨細必言蓋酬陛下特力拔擢耳非輕言也陛下欲聞諫諍之路不宜阻居易言上曰卿言是也繇是多見聽納又曰柳公權字誠懸幼嗜學十二能為詞賦元和初進士擢第釋褐祕書省校書郎李聽鎮夏州辟為掌書記穆宗即位入奏事帝召見謂公權曰我於佛寺見卿筆蹟思之久矣即日拜右拾遺翰林侍書學士遷左補闕司封員外郎穆宗政僻嘗問公權筆何盡善對曰用在心心正則筆正上改容知其筆諫也唐穆宗便殿對六學士上語及漢文恭儉帝舉袂曰此浣濯者三矣學士皆贊詠帝之儉德唯公權無言帝留而問之對曰人主當進賢良退不肖納諫諍明賞罰服浣濯之衣乃小節耳時周墀同對為之股栗公權詞氣不可奪帝徐謂之曰極知舍人不合作諫議以卿言事有諍臣風彩卻受卿諫議大夫翌日降制以諫議知制誥學士如故又曰鄭覃穆宗不恤政事喜遊宴即位之始吐蕃寇邊覃與同職崔郾等廷奏曰陛下即位已來宴樂過多畋遊無度今蕃寇在境緩急奏報不知乘輿所在臣等忝備諫官不勝憂惕伏願稍減遊從留心政道伏聞陛下晨夜昵狎倡優近習之徒賞賜太厚凡金銀貨帛皆出自生靈膏血不可使無功之人濫沾賜與縱內藏有餘亦乞用之有節如邊上警急即支用無闕免令有司重斂百姓實天下幸甚帝初不悅其言顧宰相蕭俯曰此輩何人俯對曰諫官也帝意稍解又曰劉栖楚敬宗即位畋遊稍多坐朝常晚栖楚出班以額叩龍墀出血苦諫曰臣歷觀前王嗣位之初莫不躬勤庶政坐以待旦陛下即位已來放情嗜寢樂色忘憂安臥宮闈日晏方起西宮密邇未過山陵鼓吹之聲日喧於外伏以憲宗皇帝大行皇帝皆是長君恪勤庶政四方猶有叛亂陛下運當少主即位未幾惡德布聞臣恐福祚之不長也臣忝諫官致陛下有此請碎首以謝遂以額叩龍墀久之不已宰相李逢吉出位宣曰劉栖楚休叩頭候進旨栖楚捧首而起因便陳論搕頭見血上為之動容以袖連揮令出栖楚又云不可臣奏臣即碎首死中書侍郎牛僧孺從宣示而出敬宗為之動容無何遷起居郎又曰李程為相敬宗冲幼好治宮室畋遊無度欲於宮中營新殿程諫曰自古聖帝明王以慈儉化天下陛下在諒暗之中不宜興作願以瓦木回奉園陵上欣然從之又曰文宗時魏謨為起居舍人紫宸中謝召誡之曰事有不當即須奏論謨曰言臣頃為諫官合伸規諷今居史職職在記言不敢輒踰職分帝曰凡兩省官並合論事勿拘此言尋以本官直弘文館四年拜諫議大夫仍兼起居舍人判弘文館事又曰魏謨儀容魁偉言論切直與同列上前言事他宰相必委曲規諷唯謨讜言無所畏避宣宗每曰魏謨綽有祖風名公子孫我心重之漢武帝故事曰上性嚴急法令峻刻汲黯諫曰陛下不愛才樂士求之為倦比得一人心勞苦神未盡其用輒已殺之以有限之士資無已之誅臣恐天下賢才將盡陛下欲與誰為治乎上笑喻之黯曰願陛下自今已後改之無以臣愚不知理也田融趙書曰前石數出遊獵每亟馳騁主簿程琅諫前石馳逐自若草木有瓦木馳馬觸之馬即死前石亦危殆體小不穩還宮歎曰程琅忠臣也不用其言吾之不善追之何及段龜龍梁記曰太常楊頴上疏諫呂纂飲酒過度出入無恆纂曰不有直亮之臣誰匡邪僻之君也纂雖有此言終不能改又曰呂光龍飛二年太常黁反叛黁以箋書招誘楊軌推為盟主軌性直不慮黁之傾危西河太守程肇諫軌曰將軍之與呂主可謂臭味是同今欲釋同心託異類背龍頭尋蛇尾非將軍之高算也梁祚魏國統曰吳丞相顧雍諫孫權曰公孫泉未可信後必悔也權入禁中雍後隨之頓首曰此國之大事臣以死爭之權使左右扶出
