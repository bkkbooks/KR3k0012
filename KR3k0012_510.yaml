body:
  text: 逸民部九逸民九皇甫士安高士傳曰嚴遵字君平蜀人常賣卜成都市日得百錢以自給卜訖則閉肆下簾以著書為事揚雄少從之遊數稱其德李強為益州牧喜曰吾得君平為從事足矣雄曰君可備禮與相見其人不可屈也王鳳請交不許歎曰益我貨者損我神生我名者殺我身故不仕時人服之又曰鄭朴字子真修道靜默世服其清高大將軍王鳳以禮聘之遂不屈揚雄法言盛稱其德曰谷口鄭子真耕於嚴石之下名振京師馮翊人刊石祠之至今不絶又曰李弘字仲元蜀人居城都之圭里里中化之班白不負擔男女不錯行弘嘗為縣令鄉人共送之元無心就行因共酣飲月餘不去刺史使人喻之仲元曰本不之官惟揚雄重之曰不夷不惠居於可否之間又曰鄭玄字康成北海高密人也學孝經論語兼通京氏公羊春秋三正曆九章算術周官禮記左氏春秋大將軍何進辟玄州郡迫脅不得已而詣進設機杖之禮以待玄玄以幅巾見進一宿而逃去公府前後十餘辟並不就又曰任安字定祖少好學隱山不營名利時人號安曰任孔子連辟不就建安中讀史記魯連傳歎曰性以潔白為治情以得志為樂性治情得體道而不憂彼棄我取與時而無爭遂終身不仕號曰任徵君又曰管寧字幼安靈帝末以中國方亂乃與其友邴原涉海依遼東太守公孫度度虛館禮之其後中國少安人多南歸唯寧不遝黃初中華歆薦寧寧知公孫淵必亂乃因徵辭還以為太中大夫固辭不就寧凡徵命十至輿服四賜常坐一木榻上積五十年未嘗箕琚榻上當膝皆穿常著布裙貉裘唯祠先人乃著舊布單衣加首絮巾遼東郡圖其形於府殿號為賢者又曰胡昭字孔明棄妻子不應袁紹之命武帝亦辟昭昭自陳本志帝曰人各有志出處不同勉卒高尚義不相屈昭乃隱陸渾山中又曰焦先字孝然世莫知其所出或言生漢末及魏受禪常結草為廬於河之湄獨止其中冬夏袒不著衣臥不設席又無草蓐以身親土其體垢汙皆如泥滓不行人間或數日一食行不由邪徑目不與女子忤視口未嘗言雖有驚急不與人語後野火燒其廬先因露寢遭冬雪大至先袒臥不移人以為死就視如故後百餘歲卒嵇康高士傅曰子州友父者堯舜各以天下讓友父友父曰我適有勞憂之病方治之未暇在天下也又曰石戶之農不知何許人與舜為友舜以天下讓之石戶夫負妻戴攜子以入海終身不反又曰伯成子高不知何許人也唐虞時為諸侯至禹復去而耕禹往趍而問曰昔堯治天下吾子立為諸侯堯授舜舜授豫吾子去而耕敢問其故何耶子高曰昔堯治天下至公無私不賞而民勸不罰而民畏今子賞而不勸罰而不畏德自此衰刑自此作夫子盍行無留吾事侃侃然遂復耕而不顧又曰卞隨務光者不知何許人湯將伐桀因卞隨而謀曰非吾事也湯遂伐桀以天下讓隨隨曰后之伐桀謀於我必以我為賊也而又讓我必以我為貪也吾不忍聞乃自投桐水又讓務光光曰廢上非義殺民非仁無道之世不踐其土況於尊我哉乃抱石而沉廬水又曰小臣稷者齊人抗厲希古桓公三往而不得見公曰吾聞士不輕爵祿無以易萬乘之主萬乘之主不好仁義無以下布衣之士於是五往乃得見焉又曰亥唐晉人也高恪寡素晉國憚之雖蔬食菜羹平公每為之欣飽公與亥唐坐有間亥唐出叔向入平公伸一足曰吾向時與亥子坐腓痛足痺不敢伸叔向悖然作色不悅公曰欲貴乎吾爵子子欲富乎吾祿子夫亥先生乃無欲也吾非正坐無以養之子何不悅哉又曰涓子齊人餌木接食甚精至三百年後釣於河澤得鯉魚中符後隱於宕石山能致風雨告伯陽九仙法淮南王少得其文不能解其旨又曰商容不知何許人也有疾老子曰先生無遺教以告弟子乎容曰將語子過故鄉而下車知之乎老子曰非謂不忘故耶容曰過喬木而趍知之乎老子曰非謂其敬老耶容張口曰吾舌存乎曰存曰吾齒存乎曰亡知之乎老子曰非謂其剛亡而弱存乎容曰嘻天下事盡矣又曰關令尹喜周大夫也善內學星辰服食老子西遊喜先見氣物色遮之果得老子老子為著書因與老子俱之流沙西服巨勝實莫知所終又曰康市子者聖人之無欲者也見人爭財而訟推千金之璧於其旁而訟者息又曰狂接輿楚人也耕而食楚王聞其賢使使者持金百鎰聘之曰願先生治江南接輿笑而不應使者去妻從市來曰門外車馬跡何深也接輿具告之妻曰許之乎接輿曰富貴人之所欲子何惡之妻曰吾聞至人樂道不以貧易操不為富改行受人爵祿何以待之接輿曰吾不許也妻曰誠然不如去之夫負釜甑妻戴紝器變姓名莫知所之嘗見仲尼歌而過之曰鳳兮鳳兮何德之衰往者不可諫來者猶可追後更名陸通好養性在蜀峨嵋山上世世見之甫士安高士傳曰陸通字接輿楚昭王政亂乃陽狂不仕故曰接輿也又曰榮啓期者不知何許人也披裘帶索鼓琴而歌孔子曰先生何樂也對曰天生萬物唯人為貴吾得為人是一樂也以男為貴吾得為男二樂也人生有不免於襁褓吾行年九十五矣是三樂也貧者士之常死者民之終居常以待終何不樂也又曰長沮桀溺者不知何許人也耦而耕孔子遇之使子路問津焉長沮曰夫執輿者為誰子路曰是孔子是魯孔丘歟曰是也曰是知津矣問於桀溺桀溺曰子為誰曰仲由孔丘之徒歟對曰然曰與其從避人之士豈若從避世之士哉耰而不輟子路以告孔子孔子憮然曰鳥獸不可與同群吾非斯人之徒歟又曰荷篠丈人不知何許人也子路從而後問曰子見夫子乎丈人曰四體不勤五穀不分孰為夫子植其杖而耘子路行以告子曰隱者也使子路反見之至則行矣又曰顏闔者魯人也魯君聞其賢以幣聘焉闔方服布衣自飲牛使者問曰此顏闔家耶曰然使者致幣闔曰恐聽誤而遺使者羞使者至復來求之闔乃鑿坯而遁又曰市南宜僚楚人也姓熊白公為亂使石乞告之不從承之以劍而遼弄丸不輟魯侯問曰吾學先王之道勤而行之然不免於憂患何也僚曰君今能刳形灑心而遊無人之野則無憂矣又曰太公任者陳人孔子圍陳七日不火食太公往吊之曰子幾死乎夫直木先伐甘井先竭子其飾智以警愚修身以明汙昭昭如揭日月而行故汝不免於患也孰能削跡捐勢不為功名者哉無責於人人亦無責焉孔子曰善辭其交遊巡於大澤入獸不亂群而況人也又曰漢陰丈人者楚人也子貢適楚見丈人為圃入井抱甕而灌用力甚多子貢曰有機於此後重前輕名曰拮槔用力寡而見功多丈人作色曰聞之吾師有機事者必有機心機心存於胸則純白不備子貢愕然慚不對有間丈人曰子奚為曰孔丘之徒也丈人曰子非博學以疑聖智獨絃歌以買聲名於天下者乎方且亡汝神氣墮汝形體何暇治天下乎子往矣勿妨吾事又曰延陵季子名札吳王之子最少而賢使上國還會闔閭使專諸剌殺王僚致國於札札不受去之延陵終身不入吳國初適魯聽樂論衆國之風及過徐徐君欲其劍札心許之及還徐君已死即解劍帶樹而去又曰范蠡者徐人也相越滅吳去之齊號鴟夷子治産數千萬去止陶為朱公復纍巨萬一日蠡事周師太公服桂飲水去越入海百餘年乃見於陶一旦棄資財賣藥於蘭陵世世見之又曰屠羊說者楚人也隱於屠肆昭王失國說往從王王反國欲將賞說說曰大王失國說失屠羊大王反國說亦屠羊臣之爵祿已復矣又何賞之有王使司馬子綦延之以三圭之位說曰願長反屠羊之肆耳遂不受又曰閭丘先生齊人也宣王獵於社山社山父老十三人相與勞王王賜父老不租父老皆謝先生獨不拜王曰少也復賜無徭役先生復獨不拜王曰父老幸勞之故答以二賜先生獨不拜何也閭丘曰聞王之來望得壽得富得貴於大王也王曰死生有命非寡人也倉廩備災無以富先生大官無闕無以貴先生閭丘曰非所敢望願選良吏平法度臣得壽矣賑乏以時臣得富矣令少敬長臣得貴矣
