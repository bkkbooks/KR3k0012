body:
  text: 工藝部七數說文曰算長六寸計曆數者也從弄竹言常弄乃不誤也易曰大衍之數五十大合天地之數凡五十有五言五十者舉成數天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也周禮曰保氏養國子以道乃教之六藝六曰九數鄭司農曰九數方田粟米差分少廣商工均輸方呈羸不足旁要今有重差夕桀句服也漢書律歷志曰數者一十百千萬也所以算數事物慎性命之理也又曰武帝時桑弘羊以計算幸以心計年十三為侍中又曰宣帝時大司農丞耿壽昌以善算為算工得幸於上又曰計商善為算著五行論算術二十六卷又曰張蒼明習天下圖書計籍又善算律歷故令蒼以列侯居相府領主郡國上計者吳志曰顧談每省簿書未嘗下算徒屈指心計盡發疑謬下吏以此服之又曰趙達河南人也治九宮一算之術究其微旨是以能應機立成對問若神使人取小豆數升播播布切之席上立言其數驗覆果信嘗過知故知故為之具食食畢謂曰倉卒乏酒又無嘉肴無以敘意如何達因取盤中隻筋再三縱橫之乃言卿東壁下有美酒一斛又有鹿肉三斤何以辭無主人笑曰以卿善射欲以相試耳遂出酒酣飲又有書簡上作千萬數著空倉中封之令達算之達云但有名無實其精微若是達寶惜其術自闞澤殷禮皆名儒善士屈節就學祕而不告也太史丞公孫滕師事之纍年賣酒拜跪而請達曰吾先人得此欲圖為帝王師至仕來三世不過太史郎誠不欲復傳之且此術微妙頭乘尾除一算之法父子不相語初孫權行師征伐每令達有所推步皆如其言問其法終不言由此見非達常笑謂諸星氣風術者曰當回算帷幕不出戶牖以知天道而反晝夜暴露以望氛祥不亦難乎無間引算自投乃歎曰吾算盡某年月日其終矣達妻數見達效聞而哭泣達欲弭妻意乃更算言向者謬誤耳尚未也後如期死權聞達有書求之不得録問其女乃發達棺一無所得法遂絶焉王隱晉書曰王戎為司徒好治生公嫗二人常以象牙籌晝夜算計家財唐書曰僧一行姓張氏公謹之孫也初求訪師資以窮大衍至天台山國清寺見一院古松十數門有流水一行立於門屏間聞院僧於庭布算聲而謂其徒曰今日當有弟子自遠求吾算法已合到門豈無人導達也即除一算又謂曰門前水當卻西流弟子亦至一行承其言而趨入稽首請法盡授其術焉而門前水果卻西流西京雜記曰安定嵩真明算術成帝時人也真常以算自剋其壽七十三真曰綏和元年正月二十五日晡時死矣書壁以志之至二十四日晡時死妻曰真算時見長下一算欲以告之慮脫故不告之今校一日也又曰曹元理善算術成帝時人也常從友人陳廣漢廣漢曰吾有二囷米忘其石數子為吾算之元理以食筋十餘轉曰東囷七百四十九石六斗七合西囷六百九十七石八升遂署囷門後出米西囷六百九十七石九升中有一鼠大可一升東囷無差元禮後歲復過廣漢以米數告之元理以手擊床曰遂不知鼠之殊米不如剝面皮矣廣漢為之取酒脯數斤元理復算曰千牛産二百犢萬雞將産五百雛羊豕鵝鴨皆道其數果蓏盧果切肴蔌悉知其所乃曰如此資業之廣何供具之薄廣漢慚曰有倉卒賓無倉卒主人元理曰俎上蒸㹠一頭廚中荔枝一盤皆可以為設廣漢再拜謝罪入取之盡日為歡其術後傳南季南季傳項滔滔傳子陸皆得其分數而失其玄妙焉老子曰善計者不用籌策尹文子曰凡數十百千萬億億萬千百十皆起於一推至億億無差矣山海經曰帝令豎亥步自東極至於西極五億千選選萬也九千八百八十步豎亥右手把算左手指青丘曰五億十萬九於八百天地東西二億三萬三千里南北二億一千五百里天地相去一億五萬里也博物志曰南郡宜城王子山到泰山從鮑子真學算異苑曰晉安有越王餘算策長尺許白者似骨黑者似角云越王行海作算有餘棄之於水生焉風俗通曰十十謂之百十百謂之千十千謂之萬十萬謂之億十億謂之兆十兆謂之經十經謂之垓十垓謂之補十補謂之選十選謂之載十載謂之極有物者有事者紀於此矣過此往者則其數可紀其名未之或聞也夫數一為特侯奇隻二為再兩偶雙三為參四為乘賈誼書曰數度之道以六為法數度之始始於微細有形之物莫細於毫是故立一毫以為度十毫為髮十髮為釐十釐為分十分為寸十寸為尺備於六故先王以為天下用也周髀曰周公問於殷高曰寡人聞子大夫善數數算也語林曰鄭玄馬融門下三年不得見令高足弟子傳授而已融算嘗渾天合召玄令算一轉便決衆咸駭服謝察微算經曰易稱太極是生兩儀蓋數之先也自隸首作術容成造曆顯算斯興故也一位算法曰萬萬穰為載數之極矣或問之曰何以數之為載按孫子算經云古者積錢上至於天天不能容下至於地地不能載天不能蓋地不能載故名曰載又曰按司馬遷史記云自秦孝公時商鞅獻三術內一開道阡陌以五尺為步二百四十步為畝又曰按千乘之圖周之制度司馬法六尺為步步百為畝是古之制也發象算經曰問云度之起起於何答曰度之起起於忽忽是神蟲口中吐絲名也十忽為一絲十絲為一毫算經曰量之起起於何答曰量之起起粟粟是陰陽而生從六甲而出故六粟為一圭十圭為一抄算經曰稱之起起於何答曰稱之起起於黍黍是三稜草子也一絫為一絫十絫為一銖畫釋名曰畫挂也以五色挂物上也周禮曰畫繢之事雜五色東方謂之青南方謂之赤西方謂之白北方謂之黑天謂之玄地謂之黃青與白相次也赤與黑相次也玄與黃相次也此言畫繢六色所象及布彩之彩第凡畫繢之事後素功素白綵也後布之為其功易以潰沔之也論語曰繪事後素史記曰武帝衛太子廢後上居甘泉宮召畫周公負成王圖於是左右群臣知上意欲立少子也少子即昭帝也又曰甘露三年單于始入朝宣帝思服肱之美圖畫其人於騏麟閣法其狀貌署官爵姓名又曰李夫人早卒帝圖畫其形於甘泉宮又曰金日磾母教誨兩子甚有法度武帝聞而嘉之病死詔圖於甘泉宮曰休屠王閼氏日磾每見畫常拜向之涕泣東觀漢記曰馬援還誡兄子曰畫虎不成反類狗也又曰宋弘嘗宴見御座新施屏風圖畫列女世祖數顧視之弘曰未見好德如色者帝撤之范曄後漢書曰光和元年置酒鴻都門畫孔子及七十二弟子之像又曰明帝遣使天笁問佛道法遂於中國圖畫形像焉又曰顯宗圖畫建武中名臣列將於雲臺以椒房故謂馬后獨不及馬援東平王蒼觀圖言於帝曰何故不畫伏波像帝笑而不言又曰陳紀字元方父憂殆將滅性豫州刺史嘉其至行上書畫像百城以厲俗魏書曰曹休祖父嘗為吳郡太守休見壁上祖父畫下榻拜而涕泣魏氏春秋曰徐邈善畫作走水獺摽於水濱群獺集焉晉書曰顧愷之尤善丹青謝安深重之為有蒼生已來未之有也愷之每畫人成數年不點目睛人問其故答曰四禮妍𧈪本無關於妙處傳神寫照正在阿堵物中嘗悅一鄰女挑之弗從乃圖其形於壁以棘針釘其心女遂患心痛愷之因致其情女從之遂密每重嵇康四言詩因為之圖常云手揮五弦易目送歸鴻難每寫人形妙絶於時嘗圖裴楷像頰上加三毛觀者覺神明殊勝又為謝鯤像在石巖裏云此子宜著丘壑中欲圖殷仲堪堪有目疾固辭愷之曰明府正為眼耳若明點瞳子飛白拂上使如輕雲之蔽月豈不美乎顧愷之嘗以一廚畫糊題其前寄桓玄所皆其深所珍者玄乃發其廚後竊取畫而緘閉如舊以還之紿云未開愷之見封題如初但失其畫直云妙畫通靈變化而去亦猶人之登仙了無怪色又曰王獻之桓溫常使畫扇筆悟落因畫作為烏駮特牛甚妙劉毅傳曰毅平桓玄入建康初桓玄於南州起齊悉畫盤龍於其上號為盤龍齊毅小字盤龍至是遂居之晉書曰韓支字景先鄧林婦病積年垂死醫巫皆息意支為筮之使畫作野豬著臥處屏風上一宿覺佳於是遂差齊書曰滎陽毛惠遠善畫馬彭城劉瑱善畫婦人當世並為第一又曰齊王秀之字伯奮仕至侍中時宗測優遊秀之彌所欽慕乃令陸探微畫其形與己相對又曰王亮字叔奉臨沂人也齊竟陵王良開西邸延賢俊使工畫其像亮亦豫焉梁書曰伏曼容素美風彩帝常以方嵇叔夜使吳人陸探微畫叔夜像以賜之又曰昭明太子好士愛文劉孝綽與陳郡殷藝吳郡陸倕琅琊王筠彭城劉治等同見賓禮太子起堂乃使畫工先圖孝綽後魏書曰劉子業廟中皆畫祖父形入曾祖裕廟指像曰此渠大英雄生禽數天子次入祖義隆廟指像曰此渠不惡次入駿廟曰此渠大好色顧謂左右曰此渠大驢鼻即令畫工驢駿像鼻也北齊書曰廣陵王孝珩於廳上畫蒼膺見者以為真焉又曰魏收字伯起巨鹿曲陽人也兼尚書僕射帝於華林園別起玄洲苑備極山林樓觀之麗詔於閣上畫收容像其見重如此陳書顧野王傳曰宣城王為楊州刺史野王及琅琊王褒並為賓客王甚愛其才野王又好丹青善圖寫王於東府起齊乃令野王畫古賢命王褒贊之時人稱為二絶唐書曰張昌宗嘗命畫工圖寫武三思及納言李嶠鳳閣侍郎蘇味道夏官侍郎李逈秀麟臺少監王紹宗等十八人形像號為高士圖又曰薛稷善畫博採古跡睿宗在藩留意於小學稷於是特見招引又曰韓滉尤工書兼善丹青以繪事非急務自晦其能未嘗傳之又曰王維書畫特臻其妙筆蹤措思參於造化而創意經圖即有所缺如山水平遠雲峰石色絶跡天機非繪者之所及也人有得奏樂圖者不知其名維視之曰霓裳第三疊第一拍也好事者進樂工按之一無差誤咸服其精思也又曰閻立本雖有應務之才而尢善圖畫寫真秦府十八學士圖及貞觀中凌煙閣功臣圖並立本之跡也時人咸稱其妙太宗嘗與侍臣學士泛舟於春苑池中有異鳥隨波容與太宗擊賞數賜詔座者為詠召立本令寫之時閣外傳呼云畫師閻立本時已為主爵郎中奔走流汗俯伏池側手揮丹粉瞻望座賓不勝愧赧退誡其子曰吾少好讀書幸免墻面緣情染翰頗及儕流唯以丹青見知躬廝役之務辱莫大焉汝其深戒勿習此末伎又曰裴延齡恃恩惟顧少連不避延齡及畫一鵰令群鳥噪之遂獻焉唐李寶臣為成德軍節度使寶臣為朱滔使曰吾聞朱公貌如神得而識之願因繪事而觀可乎滔乃圖其形以示之寶臣懸於射堂命諸將熟視之曰朱公信神人也鍾岏良吏傳曰鄭純字長伯廣漢人也為永昌太守清廉獨絶及卒列畫東觀三齊記略曰秦始皇求與海神相見神云我形醜約莫圖我形當與帝會始皇入海三十里與神相見左右有巧者潛以腳畫神形神怒帝負約乃令帝速去始皇即馬前腳猶立後腳隨陷僅得登岸畫者溺死續齊諧記曰魏明帝遊洛水水中有白獺靡淨可憐見之輒去帝顧玩之終不可得侍中徐景山曰臣聞獺嗜鯔魚乃不避死可以此候之乃自畫板作兩生鯔音淄魚懸岸於是群獺競赴遂一時執得帝嘉之謂曰不聞卿知畫何其妙也答曰臣亦未嘗執筆人之所作者自可庶幾耳帝曰是善用所長者也西京雜記曰元帝後宮既多不得常見乃使畫工圖其形按狀幸之諸宮人皆賂畫工多者十萬王嬙不肯遂不得見後胸奴求美女帝按圖以昭君行及召見貌為第一帝悔之而名籍已去乃按其事畫工棄市籍資畫工有桂陵毛延壽寫人好醜老少必得其真安陵陳敝新豐劉白龔寬並工牛馬人形杜楊望亦善畫尤善布色樊育亦善布色同日棄市京師畫工於是差稀拾遺記曰周靈王時有韓房者自渠胥國來獻王駝房長一文垂髮至膝周人見之如神明矣以丹砂畫左右手為日月盈缺之勢不異真焉可照百餘步又噴水為雲蔽虧其側靈王視之忽不知所在或云升天又曰秦始皇二年謇涓國獻善畫者名烈商口含丹黑噴壁即成龍雲之像以指歷地若繩分矣轉手若規方寸之內四瀆五嶽列國莫不悉備畫為鳳鸞皆軒軒若行也韓子曰客有為齊王畫者王問曰畫孰最難對曰狗馬最難孰曰最易對曰鬼魅最易夫狗馬人之所知也旦暮覩於前不可類之故難也鬼魅無形無形者不可覩故易也淮南子曰畫西施之面者美而可悅規孟賁之目者大而可畏又曰宋畫吳冶宋人工畫吳人工治其為微妙堯舜之聖不能及也抱朴子曰衛協張黑有畫聖之名華陽國志曰漢嘉郡以禦雜夷宜炫曜之乃雕飾城墻華畫府寺及諸門作山神海靈窮奇鑒齒夷人初出入恐騾馬或憚之趑趄說苑曰齊起九重之臺國中有能畫者則賜之錢狂卒敬君居常飢寒其妻端正敬君工畫貪賜畫臺去家日久思念其婦遂畫其像向之喜笑旁人見以白王王以錢百萬請妻敬君惶怖許聽世說曰戴安道為范宣畫南都賦圖范宣看而咨嗟焉俗說曰顧虎頭為人畫扇作阮籍嵇康都不點眼精送還扇主曰點眼精便欲能語論衡曰人好觀圖畫上所畫古之死人也見死人之面孰與視其言行古賢之遺文竹帛之所載粲然豈徒墻壁之畫哉出本曰史皇作圖史皇黃帝臣也謂畫物像也新序曰葉公子高好龍門亭軒牖皆畫龍形一旦真龍垂頭窗棹尾於戶葉公驚走失措焉風俗通曰按百家書云公輸般之水上見蠡謂蠡曰開汝匣見汝形蠡適出頭般以足畫圖之古今名畫録曰晉有史道碩畫田家十月圖為世所珍孫暢之述畫曰漢靈帝詔蔡雍圖赤泉侯楊喜五世將相形像於省中又詔雍為讚仍令自書之雍文畫書于時獨擅可謂備三美矣又曰劉裒漢靈帝時作雲漢圖人見之自然覺熱更畫北風圖熱者還覺涼魏陳思王畫讚序曰蓋畫者鳥書之流也昔明德馬后美於色厚於德帝用喜之嘗從觀畫過虞舜之像見俄皇女英帝指之戲后曰恨不得如此人為妃又前見陶唐之像后指堯曰嗟乎群臣百僚恨不戴君如是帝顧而咨嗟焉晉傅咸畫像賦序曰先有畫卞和之像者以為臧文仲知柳下惠之賢而不與立卞子自刖以有證相去遠矣戲畫其像於卞子之旁特赤其面以示猶有慚色宋炳山畫敘曰豎畫三寸實當千仞之高橫墨數尺實體百里之逈晉王彪之詩序曰余自求致仕詔纍不聽因扇上有二踈畫作詩一首以述其美
