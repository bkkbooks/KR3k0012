body:
  text: 百穀部三禾尚書微子之命曰唐叔得禾異畝同潁獻諸天子王命唐叔歸周公于東作歸禾又金縢曰周公居東秋大熟未穫天大雷電以風禾則盡偃王啓金縢得周公代武王之說王出郊天乃反風禾盡起尚書大傳曰成王時有苗異莖而生同為一穟大幾盈車長充箱人有上之者王召周公而問之公曰三苗為一穟抑天下其和為一乎果有越裳氏重譯而來毛詩甫田曰禾易長畝終善且有易治也長畝竟畝也禮記檀弓下曰季子皋葬其妻犯人之禾申祥以告曰請庚之子皋曰孟氏不以是罪子朋友不以是棄豫以吾為邑長於斯也買道而葬後難繼也左傳隱公曰夏四月鄭祭足帥師取溫之麥溫周地蘇氏邑也秋又取成周之禾春秋運斗樞曰旋星明則嘉禾液春秋感精符曰日下論於地則嘉禾興春秋說題辭曰天文以七列精以五故嘉禾之滋莖長五尺五七三十五神盛故連莖三十五穗以成盛德禾之極也又曰禾者御滋液御滋液以生故以和軟為名也孝經援神契曰德下至地則嘉禾生春秋繁露曰禾實於野粟缺於倉皆奇怪非人所意乎此可畏也史記封禪書曰管仲說桓公曰古之封禪北里禾所以為盛蘇林注曰北里地名漢書曰武帝外事四夷四民去本董仲舒說上曰春秋他穀不書至於麥禾不成則書之以見聖人於五穀最重麥與禾又郊祀志曰王莽篡位興神仙事種五梁禾於殿中各順其色置其方面煮二十餘物漬種計粟斛成一金言此黃帝穀仙之術又曰莽使中郎平憲誘羌還云天下太平一禾長丈餘故乞內屬續漢書曰承宮字少子琅耶人嘗在蒙陰山中耕種禾忝臨熟人認之宮便推與而去由是發名也東觀漢記曰光武以建平元年生於濟陽縣是歲有嘉禾生一莖九穗大於凡禾縣界大熟因名上曰秀又曰淳于恭宇孟孫有盜刈禾恭見之恐其愧因伏草中盜去乃起後漢書王符論曰夫養稂莠者傷禾稼惠奸宄者賊良人又曰蔡茂初在廣漢夢坐大殿殿極上有三穗禾茂跳取之得其中穗輒復失之屋之大者古通呼為殿也極殿梁也三輔間謂屋梁為極以問主簿郭賀賀離席慶曰大殿者官府形象也極而有禾人臣之上祿也取中穗是中台之位也於字禾失為秩曰失之所以得祿秩也袞職有闕君其補之旬月而茂微焉吳志曰赤烏七年宛陵言嘉禾生會稽始平言嘉禾生改年為嘉禾晉書曰庾袞居貧禾熟穫者已畢而採捃尚多袞乃引其群子以退曰待其間及其捃也不曲行不旁掇跪而把之則亦大獲又與邑人入山拾橡分夷險序長幼推易居難禮無違者臧榮緒晉書曰朱冲字巨容躬植禾藝蔬鄰牛侵犯持芻送牛而無恨色晉起居注曰武帝世嘉禾三生其七莖同穗晉中興徵祥說曰王者德盛則嘉禾生嘉禾仁卉也義熙十三年鞏縣民宋曜於田中獲嘉禾九穗同本九穗九州是時羌平六合寧後魏書曰許謙字元遜代人也子洛陽為鴈門太守家田三生嘉禾皆異壟合穎世祖善之進爵北地公也北史曰趙肅授原州揔管司馬在道夜行其左右馬逸入田中暴人禾輒駐馬待明訪禾主酬直而去唐書曰朔方節度郭子儀言寧朔縣界荒地廣十五里有黑禾穀出遍地每日側近百姓掃盡經宿還生前後可得五六千石其禾圓實味甘美臣以為天啓興王先瑞百穀故漢稱雨粟周頌來牟豈若瑞禾自出家給人足蓋陛下富教安人務農敦本光復社稷康濟黎元之應也又曰代宗為皇太子乾元初上降誕豫州奏百姓李氏有嘉禾生及是冊禮特詔改名豫又曰永泰元年秋京兆府上言鄠縣嘉禾生穗長一尺餘穗上粒重疊如連珠又曰馬燧大曆四年為懷州刺史乘兵亂後其夏大旱人失耕種燧乃務教化將吏有父母者燧輒造之施敬收瘞暴骨去其煩苛至秋田中生穭禾人頗便之穭音呂禾再生也又曰元和中東川觀察使潘孟陽上言龍州武安川中嘉禾生有麟食之復生麟之來一鹿引之群鹿隨焉光華不可正視畫工就圖之并嘉禾一函以獻淮南子曰后稷辟土墾草以為百姓力農然而不能使禾冬生又曰洛水輕利而宜禾又曰夫子見禾之三變夫子孔子也三變始於粟粟生於苗苗成於穗也滔滔然曰狐鄉丘而死我其首禾乎禾穗垂而向根君子不忘本也呂氏春秋曰飯之美也玄山之禾山海經曰崑崙墟上有禾禾長五尋郭璞注曰木禾穀穎也白虎通曰德至於地則嘉禾生嘉禾者大禾也說文曰禾嘉穀也二月始生八月而熟得時之中故謂之禾木也木王而生金王而死稹早種也頴禾末也穀禾皮也稈禾莖也藁稈也會稽典録曰沈勳身自耕耘以供衣食人有盜穫其禾勳見而避之明日更收拾送致其家盜者愧懼齊還不受六韜曰人主好田獵則歲多大風禾穀不實鄭玄別傳曰玄年十六號曰神童民有獻嘉禾者欲表府文辭鄙略玄為改作又著頌一篇侯相高其才為修寇禮杜寶大業拾遺録曰七年九月太原郡有獻禾一本三穗長八尺穗長三尺五寸大尺圍芒穗皆紫色鮮明受自禾已上二尺餘亦紫色有老人年八十餘以素木匣盛之賜物三十假板授嘉禾縣令續搜神記曰盧陵巴丘人文晃者世以田作為業秋牧以過穫刈都畢明旦至田禾悉復滿湛然如生即更穫所穫盈倉而巨富廣五行記曰東魏孝靜帝天保初四月禾夜生於帝銅硯中及明而長數寸有穗其年帝為高洋所幽遇鴆而崩古今注曰和帝元年嘉禾生濟陰城陽一莖九穗安帝延光三年嘉禾生九真百五十六本一百六十八穗汜勝之書曰種禾無期因地為時三月榆莢雨時高地強土可種禾薄田不能糞者以原蠶矢雜禾種之則禾不崔實四民月令曰三月二月可種稹米夢書曰禾稼為財用之所夢見禾稼言財氣生廣志曰渠和蔓生實如葵子米粉白如面可為饘粥牛食之肥六月種九月熟感禾扶疏生實似大麥楊禾似藋粒細也折右炊停即牙生此中國巴禾木稷也火禾高丈餘子如小豆出粟特國稻周禮夏官職方氏曰楊州宜稻青州宜稻麥禮記曲禮下曰祭示廟之禮稻曰嘉蔬又月令曰季秋之月天子乃以大嘗稻先薦寢廟又內則曰飲重醴清糟稻醴清糟黍醴清糟又內則曰取稻米舉糔息酒切溲所九切之小切狼臅昌録切膏以與稻米為酏之然切左傳昭五曰鄅音禹人藉稻履行之也春秋說題辭曰稻之為言藉也稻冬舍水盛其德也故稻太陰精含水漸洳乃能化也江旁多稻固其宜也宋均注曰稻苞裹也稻非水不生故曰陰精也孝經援神契曰污泉宜稻爾雅曰稌稻也今沛國呼稌也廣雅曰粢稻其穗謂之禾東觀漢記曰劉敞拜廬江都尉歲餘遭旱行縣人持稻皆枯吏強責租敞應曰太守事也載枯稻至太守所酒數行以語太守太守曰無有敞以枯稻示之太守曰都尉事也敞怒叱太守曰鼠何敢爾也後漢書曰鄧晨為汝南太守興鴻郤陂數千頃田鴻郤陂名今在豫州汝南縣東成帝時開東水陂溢為害翟方進為丞相奏罷水陂江表傳曰孫亮五鳳元年交址稗草為稻吳志曰鍾離牧字子升會稽山陰人少居永興自墾田種稻二十餘畝臨熟而縣民認之牧曰本自田荒故墾之耳遂以稻與縣民縣吏召民繫獄欲繩以法牧請之長曰君自行義事僕為民主當以法率下牧曰此是郡界緣君意顧來暫住今以少稻殺此民何必復留又曰黃龍三年由卷縣野稻自生改為禾興縣晉中興書曰孫略字文度吳人少田於野時年饑穀貴人有生刈其稻者略見而避之晉書曰杜預修邵信臣遺跡激用滍淯諸水以浸稻田萬餘頃分疆刊石使有定分公私同利衆庶賴之號曰杜父舊水道又曰惠帝征成都王狼狽左腳三指折匍匐入稻苗中賴侍中稽紹以身趕之又曰郭翻字長翔武昌隱士也不交世事唯以漁釣射獵為娛貧無業欲墾荒田先立表題經年無主然後乃作稻將熟有認之者悉與之縣令聞而詰之以稻還翻翻遂不受又曰袁甫嘗詣何勗自言能為劇縣勗曰唯欲宰縣不為臺閣職何也甫曰人各有能有不能譬繒中之好莫過錦錦不可以為縚音滔穀中之美莫過稻稻不可以為糜是以聖王使人必先以器茍非周材何能悉長黃霸馳名於州郡而息譽於京邑廷尉之材不為三公自昔然也勗善之除松滋令宋書曰顧歡好學年六七歲家貧父使田中驅雀歡作黃雀賦而歸雀食稻過半父怒欲撻之見賦乃止齊書曰范雲嘗從文惠太子幸東田觀穫稻文惠顧謂雲曰刈此甚快雲曰三時之務亦甚勤勞願殿下知稼穡之艱難無徇一朝之宴逸也文惠改容謝之南史曰孔琇之有吏能仕齊為吳令有小兒年十歲偷刈鄰家稻一束琇之付獄案罪或諫之琇之曰十歲便為盜長大何所不為縣中皆震肅梁書曰鄧元起嘗至其西沮田舍有沙門造之乞於元起有稻幾二千斛悉以施之時人稱其有大度又曰陳伯之濟陰睢陵人也年十三四好著獺皮冠帶刺刀候鄰里稻熟輒偷刈之嘗為田主所見呵之曰楚子莫動伯之曰君稻幸多取一檐何若田主將執之因援刀而進曰楚子定何如田主皆反走徐擔稻而歸隋書曰梁陳五壇祭法以三牲首餘以骨體薦粢盛為六飯粳以敦音堆稻以牟黃梁以簠白粱以簋黍以瑚粢以璉又曰齊孝昭皇建中平州刺史稽曄建議開幽州督元舊陂長城左右營屯歲收稻粟數十萬石比境得以周贍唐書曰開元十九年楊州奏穭生稻二百一十五頃再熟稻一千八百頃其粒與常稻無異又曰孟元陽為曲環軍中大將環使董作西華屯元陽盛夏芒履立稻田中須役者退而後就舍故其田歲無不稔軍中足食淮南子曰江水肥而宜稻又曰今稻生於水而不能生於湍瀨之流又曰離先稻熟而農夫耨之稻米隨而生者為離與稻相似耨之為其少實也不以小利傷大獲也戰國策曰東周欲為稻西周不下水東周患之蘇子往見西周之君曰君之謀過矣今不下水所以富東周也今其民皆種麥無他種矣君若欲害之不若一為下水以病其所種下水東周必以種稻而復奪之若是則東周之民可令一仰西周受命於君矣國語曰越敗吳王孫雄請和范蠡不聽雄曰范子先有言無助天為虐助天為虐不祥今吾稻蟹不遺種子將助天為虐乎呂氏春秋曰得時之稻大本而莖葆長秱疏穖穗如馬尾大粒無芒搏米而薄糠舂之易而食之香如此者不䔉益息也先時者大本而莖葉格對對等短秱短穗多粃厚糠薄米多芒後時者纖莖而不滋厚糠多粃辟米不得待定熟仰天而死又曰史起為鄴令民大被其利相與歌之曰鄴有聖令為史公決漳水兮灌鄴旁終古斥鹵兮生稻粱吳越春秋曰越王勾踐復興師伐吳吳王敗晝夜馳走三日飢顧見生稻而取食之抱朴子曰南海晉安九熟之稻會稽典録曰夏香有盜刈其稻者香助為收之盜者慚送以還香香不受風土記曰穰稻之紫莖稴稴御二音稻之有青穟米皆青白者也水經曰任延為九真太守教民耕藝法與華同名曰田種白穀七月大作十月登熟名赤田種赤穀十二月作四月登熟所謂兩熟之稻也世說曰晉簡文見田中稻苗不識問人是何草左右答曰是稻簡文歸三日不出云寧有得其末不識其本郭義恭廣志曰有虎掌稻紫芒稻赤穬稻南方有蟬鳴稻七月熟稻有蓋下曰正月種五月穫訖其莖根復生九月復熟青芋稻六月熟纍子稻白漢稻七月熟此三稻大且長三枚長一寸益州稻之長者米長半寸說文曰稻稌也䆏肥尾切稻紫莖不黏者也稴稴稻不黏者也耗稻屬也徐暢祭記曰舊稑稻熟常用九月九日薦稻汜勝之書曰稻種春凍解時耕反其土種稻區不欲大大則水深淺不遍冬至後百一十日可種稻地美者用種畝四㪷俞益期箋云交趾稻再熟而草深耕重收穀薄異物志曰交趾稻夏冬又熟農者一歲再種雲南記曰雅州榮經縣土田歲輸稻米畝五㪷其穀精好每一㪷穀近得米一㪷炊之甚香滑微似糯味崔實四民月令曰三月多種粳稻蔡雍月令曰十月穫稻九月熟者謂之半夏稻博物志曰海陵縣扶江接海多糜獸千千為群掘食草根其處成泥名麋畯民人隨此畯種稻不耕而獲其收百倍任昉述異記曰夏禹時天雨稻古詩云安得天雨稻飼我天下民物理論曰稻者溉種之惣名養生要集曰粳稻屬也稻亦粳之惣名也道家方藥有用稻米粳米此則是兩物也稻米粒白如霜味苦主溫服之令人多瘦無飢膚粳米味甘主利五藏長飢膚好顏色左思魏都賦曰清流之稻清流近鄴西出御稻又吳都賦曰國粳再熟之稻鄉貢八蟲之綿盧育冀州論曰河內好稻粳說文曰粳稻屬也宋書曰陶潛為彭澤令公田悉令吏種秫妻子固請種粳乃使五十畝種粳陳書曰徐孝克所生母患欲粳米為粥不能常辦母亡後孝克遂常啖麥有遺粳米者孝克對而悲泣終身不復食焉後魏書曰安同遼東胡也太宗同與長孫嵩並理人訟世祖即位除青冀二州刺史同長子居典太倉事盜官粳米數右以養同大怒奏求戮居自劾不能訓子請罪太宗嘉而恕遂詔長給同粳米神仙傳曰王烈字長休邯鄲人與嵇叔夜入山遊戲烈後獨入太行山忽聞山東北如雷聲往視見山破石中有孔徑尺中有青泥流出烈取摶之隨手堅疑氣味如粳米飯烈自食數丸因提歸以與叔夜而皆成青石楊衒之洛陽伽藍記曰西方佛沙伏國有背尸毗王倉庫為火所燒其粳米燋燃于今猶在若伏一粒永無虐患彼國人民須以為藥廣志曰粳有烏粳黑穬有幽青白夏之名張衡南都賦曰其廚膳則華鄉里秬滍矩音皋香粳左思蜀都賦曰黍稷油油粳稻漠漠魏文帝與朝臣書曰江表唯長沙名好米何時比新城粳稻也上風炊之五里聞香秫說文曰秫稷之黏者爾雅曰衆秫也孫炎注曰秫稷粟也廣雅曰秫稷粳也禮記月令曰仲冬之月乃命大酋秫稻必齊酒熟曰酋大酋官之長齊熟成也又內則曰饘𨠑酒醴芼羹菽麥蕡稻黍粱秫唯所欲晉書曰陶潛字元亮為彭澤令在縣公田悉令種秫穀曰令吾常醉於酒足矣妻子固請種粳乃使二頃五十畝種秫五十畝種粳管子曰黃墳宜黍秫崔豹古今注曰稻之黏者為秫禾之黏者為黍廣志曰秫有赤者有白者胡秫早熟及麥養生要集曰秫米味酸
