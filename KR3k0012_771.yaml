body:
  text: 舟部三舟下周處風土記曰小曰舟大曰船溫麻五會者永寧縣出豫林合五板以為大船因以五會為名也晨鳧即青桐大船名諸葛恪所造鴨頭船也預章𣑮㭠音錢棗木諸木皆以多曲理盤節為堅徑也浩漂者言船之在水如蓮花散落浮於川也武昌記曰樊口北有敗舶灣孫權嘗裝一船名大船容敵士三千人與群臣泛舶中流值風起至樊口十里餘便敗故因名其處為敗舶灣也戴延之西征記曰檀山凡去洛城水道五百三十里由新安澠池宜陽三樂三樂男女老劣未嘗見船既聞晉使溯流皆相引蟻聚川側俯仰傾笑越絶書曰闔閭見子胥敢問船運之備何如對曰船名大翼小翼突胃樓船橋船今船軍之教北陵軍之法乃可用之大翼者當陵軍之車小翼者當陵軍之輕車突冒者當陵軍之衝車樓船者當陵軍之行樓車也橋船者當陵軍之輕足剽定騎也瑞應圖曰王者德盛則金人下乘船遊王後池郡國志曰越州百塗山有石船一丈禹所乘者宋元嘉中有人於船側得鐵履一量一云有聖姑從海中乘舟張石帆至此二物廟中有周時樂器名淳于銅作似鍾而有頸映水用芒刜音弗則鳴又曰硤州遠安縣江有狼尾灘有陸抗故城南有孤山袁山松為郡嘗登以四望大江如索帶舟船如鳧鴈焉又曰相州魏縣景穆寺西有遭官有石竇橋鳴鶴飛集赤馬飛龍等舟西京雜記曰昆明池中有弋樹船各數百艘船上建樓櫓戈船建戈矛四角迷垂用幡旄音餌旌葆麾蓋照灼涯涘又曰太液池中有鳴鶴舟容與舟清曠舟採菱舟説苑曰吳赤市使於知氏假道於衛寧文子具紵絺三百製將以送之大夫豹曰吳雖大國也不壤交假之道則亦敬矣又何禮焉寧文子不聽遂致之吳赤市至於知氏既得事將歸吳智伯命造舟為梁吳赤市曰吾聞天子濟于水造舟為梁諸侯維舟為梁大夫方舟臣之職也且敬太甚必有故使人視之則兵在後矣將以襲衛吳赤市曰衛假吾道而厚贈我我見難而不告是與為謀也稱疾而留使人告衛衛人警戒智伯聞之乃止也列女傳曰趙簡子至河津津吏醉吏女乃持楫而前為王掉舟餘具下楫門中江表傳曰孫權於武昌新裝大船名為長安又曰孫權乘飛雲大船與張昭魯肅等共追送敘別吳又曰周瑜破魏軍曹公復書與權曰赤壁之役值有疾疫孤燒船自退撗使周瑜虛獲此名又曰劉備進駐鄂縣之樊口諸葛詣吳未還聞曹公軍下恐懼曰遣邏吏於水次候權軍吏望見周瑜船馳還白備備曰何以知非青徐軍耶吏對曰以船知之備遣人慰勞瑜瑜曰有軍任不得委署儻能屈威副其所望備謂張飛關羽曰彼欲致我今自託於東而不往非同盟之意也乃乘單舸往見瑜問曰今距曹氏深為得計戰卒有幾瑜曰此自足用豫州但觀瑜破之吳歷曰曹公出濡須作油船夜渡洲工權乃自乘從濡須吳公軍行五六里回作鼓吹公見舟船器仗法伍整肅喟然嘆曰生子當如孫權為劉景升兒若豚犬耳又曰孫綝上疏景帝曰少帝於宮內作小船三百餘艘飾以金銀師工晝夜不息王粲海賦曰乘園桂之舟晨鳧之舸庾闡楊都賦曰龍坻華屋晨鳧之舸鷁首鋪於芙蓉盤蛟纏於赤馬晉令曰水戰有飛倉集船説苑曰楚鄂君乘青翰之舟張翠羽之鷁楚辭曰船容與而不進奄回水以凝滯又曰美要妙兮宜修沛吾乘兮桂舟桂棹兮蘭枻增水兮積雪魏文帝沂淮賦曰建安十四年王師東征泛舟萬艘楊修出征賦曰泛順風而回艫徐日轉而月移斾己入乎河口殿都練切尚集於菌池班固東都賦曰命舟牧為水嬉浮鷁首醫雲芝交又曰東郊則有通溝大漕潰渭洞河泛舟山東控引淮湖與海通波漕水運也蒼頡篇月潰傍決也前書武帝渠通渭史記曰滎陽下引河東南為鴻溝以與淮泗會也袁宏東征賦曰驚瀾嶾音隱嶙力軫切而嶽轉頽波嵔音猥𡾋力猥切以嶺沒咨余舟之小狹衝奔湍以檮杌棹弱楫之弗施授洪流以藏骨夏侯弼吳都賦曰嚴嚴船艫泛泛楊舟權河高跱風駭雲浮堅壁金扶有若高樓劉謐之與公箋曰昔甲申之際遭湯旱流煙今子亥之歲值堯水滔天火延燒其廬水突壞其園何小人兮頓偷雙船由是行無擔石室如懸磬魏文與孫權書曰知已選擇見船最大樟材者六艘受五百里石從污水送付樊口王粲詩曰方舟浮大江日暮愁我心曹植詩曰何以泛舟愧無榜人嵇康詩曰淵淵緑水淪滑而逝泛泛虛舟載停載滯鼓枻投竿優遊卒歲梁王筠詠輕利船應臨汝侯教詩曰君侯飾輕利搖蕩邁飛雲凌漾浮鷁采映木煥蛟文雷流已冠絶鳥逝復超群倏忽方千里戀茲岐路分陳張正見後湖泛舟詩曰上苑奢行樂滄池聊薄遊泛荇分蘭棹槎觸桂舟殘虹收度雨缺岸上新流欲知有高趣長楊送夌秋又別韋諒賦得江潮泛別舟詩曰千里尋陽岸三翼木蘭船鷁泛青鳧後雞鳴白鷺前涵花沒淺纜帶葉動深船不言朝夕水獨自限神仙又與錢玄智泛舟詩曰高門事休沐朝野念逢迎還乘金谷水俱望洛陽城舟移洛女度楫動渭橋橫風高鴈已落雨霽水還清葉盡桐門淨花秋菊岸明欲奏江南曲聊習棹歌行晉棗據船賦曰嘉聖王之神化理通微而達幽悼民萌之隔塞愍王教之不周立成器以備用因垂象以造舟濟迅波之絶軌越巨川之湍流運重固之滯質雖載沉而必浮且論器而比象似君子之淑清外質朴而無飾內空虛以受盈不辭勞而惡動不偷安以自寧且其行無轍趾止無所不疾而速忽若馳奔晉王叔之舟贊曰塗則騁車水惟用舟弱楫輕棹利涉濟求緬彼漁人鼓枻清謳後漢李尤舟楫銘曰舟楫之利譬猶輿馬載重歷遠以濟天下相風視波窮究川野安審懼慎終無不可艦釋名曰上下重床曰艦四方施板以禦失如牢檻也洞冥記曰昆靈池中有淩波艦掖電艦吳志曰周瑜逆曹公部將黃公蓋取艨衝鬭艦數十艘實以薪草膏灌其中裏以帷幕上建牙旗同時發火時風猛火盛悉延燒岸上營曹公軍敗退晉中興書曰建興九年冬左將軍王敦遣振威將軍周訪廣武將軍趙誘受陶侃節度征蜀賊杜韜音韜大戰蜀賊以桔槔打沒侃艦二十餘艘人皆投水義熙起居注曰盧循新作八槽艦九枚起四層高十餘丈連營繕令曰諸私家不得有戰艦等船艨衝釋名曰外狹而長曰艨衝吳志曰董襲討黃祖祖橫兩艨衝夾守沔口栟音并櫚音閭大紲繫石為碇軍不得前襲與陵統俱為前部各將敢死百人人被兩鎧乘舸船突入艨衝裹身以刀斷兩紲艨衝方橫流大兵遂進又曰周瑜逆曹公部將黃蓋取艨衝鬭艦數十艦餘艦上艦門戶又曰將軍賀齊性奢綺好軍事所乘船雕刻丹鏤青蓋綘居朦衝鬭艦之屬望之若山營繕令曰諸私家不得有蒙衝等船餘具敘舟中門䑦𦪇雜字解詁曰䑦𦪇雜船也吳志曰呂蒙襲關羽至尋陽晝伏精兵於𦪇艑中使白衣搖櫓商賈販晝夜兼行故羽不聞知遂到南郡物理論曰夫工匠徑涉河海為舸𦪇以浮大淵皆成於巧手出乎聖意艑廣雅曰艑舟也荊州土地記曰湘洲七郡大艑之所出皆受萬斛吳志曰呂蒙襲關羽至尋陽晝伏精兵於𦪇艑中餘上具䑦𦪇門溫嶠教曰廩者無米受得艑下濕米豈是吾遇兵衆無異之懷乎雖是數合米欲令齊均若有不如教鞭五十也荊州土地記曰桓宣穆遣人尋廬山下有一湖中有敗艑航説文曰航方舟也詩曰誰謂河廣一葦航之異苑曰晉時錢塘浙江有大樟林桁每有乘者軌潭蕩搖揚不可禁嘗鳴鼓錢塘江頭陵浪如故唯桁吏章奧能相制伏及奧死遂長廢淮南子曰公孫龍在趙之時謂弟子曰人而無能者龍與遊有客衣褐帶索而見曰臣能呼公孫龍顧謂弟子曰門下故有能呼者乎對曰無有公孫龍曰與之弟子之藉後數日往説燕王至於河側而航在北使客呼之一呼而航來楊子法言曰舍舟航而濟乎瀆者末矣舍五經而濟乎道者末矣李軌注曰末無之也乘國者如乘航乎則民斯安矣孫綽子曰仲尼見滄海橫流故務為舟航左思吳都賦曰長鯨吞航修鯢吐浪舫説文曰舫併船吳書陸孫破曹休當還西陵公卿並為祖道上賜御船一舫繒綵舟也晉書曰王廙性俊率嘗從南下旦自尋陽迅風飛帆暮至都倚舫樓長嘯神氣甚逸梁書曰安成康王秀為江州刺史將發主者求堅船以為齎舫秀曰吾豈愛財而不愛士乃教以牢者給參佐下者載齎物既而遭風齎舫遂破舠釋名曰船三百斛曰舠舠豹也短也江南所名短而廣安不傾危也詩曰誰謂河廣曾不容舠舸王隱晉書曰顧榮徵侍中見王路塞絶便乘船而還過下邳遂解舫為單舸一日一夜行五六百里遂得免沈約宋書曰垣護之隨王玄謨入河玄謨攻滑臺護之以三百舸為前鋒進據石濟石濟在滑臺西南百二十里玄謨敗退不暇報護之及護之聞知而虜悉已牽玄謨水軍大艚連以鐵鎖三重欲以絶護之還路護之中流而下每至鐵鎖輒以長柯斧斷之虜不能禁唯失一舸吳志曰甘寧廚下兒有過走投呂蒙蒙恐寧殺之故不即還後寧齎禮禮蒙母蒙臨當輿斗堂乃出廚下兒出還寧寧許不殺斯須還船縛置桑樹自挽弓射殺之勑船人更增舸纜解衣臥船中蒙大怒擊鼓會兵欲攻寧蒙母諫乃止江表傳曰劉備進住鄂縣之樊口聞曹公軍下恐懼俄周瑜船軍至備乃乘單舸往見瑜已具船門又曰孫權名舸為馬言飛馳如馬之走陸地也洞冥記曰昆靈池中有橦雷舸
