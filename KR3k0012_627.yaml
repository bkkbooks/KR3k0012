body:
  text: 治道部七貢賦下漢書曰孝文時朝錯說上令人入粟得以拜爵邊食足支五歲可令入粟郡縣足支一歲已上可時赦勿收農人租如此德澤加於萬人帝從之後天下充實乃下詔曰農天下之本務莫大焉今勤身從事而有租稅之賦是謂本末者無以異也本農也末賈也言農與賈俱出租無異也於勸農之道未備其除田之租稅又曰董仲舒說上曰古者稅人不過十一其求易供使人不過三日其力易足秦用商鞅之法加月為更卒已復為正卒一歲屯戍一歲力役三十倍於古更卒謂給郡縣一月而更者也正卒謂給中都官者率計令人一歲之中屯戍及力役之事三十倍多於古也田租口賦鹽鐵之利二十倍於古秦賣鹽鐵貴故下人受其用也既收田租又出口賦而官更奪鹽鐵之利卒計一歲之中失其資二十倍多於古也或耕豪人之田見稅十五故貧人常衣馬牛之衣而食犬彘之食又曰倪寬為左內史勸農業緩刑獄卑體下士務在於得民心收租稅時裁闊狹與民相假貸為有貧弱及農要之時不即徵收也以故租多不入後有軍發左內史以負租課殿當免皆恐失之大家牛車小家擔負輸租繈屬不絶課吏以最上上由此愈奇寬又曰元鳳中詔曰夫穀賤則傷農今三輔太常穀減賤減猶少也其令以菽粟當今年賦租稅元年初詔曰天下以農桑為本日者省用罷不給官減外徭耕桑者益衆而百姓未能家給朕甚愍焉其減口賦錢有司奏請減什三上許之後漢書曰建武中田租三十稅一有産子者復以三年之算明帝即位人無橫徭天下安寧時穀尚貴尚書張林上書言穀所以貴由錢賤也可盡封錢一取布帛為租以通天下之用從之魏志曰太祖初平袁紹下令田租畝收粟四升戶絹二匹綿二斤餘不得擅興晉書曰武帝平吳後制戶調之式丁男之戶歲輸絹三匹綿三斤女及次丁男為戶者半輸諸邊郡或三分之二遠者三分之一夷人輸賨布戶一匹遠者或一丈不果田者輸義米戶三斛遠者五斗極遠者輸算錢人二十八文齊書曰高帝初竟陵王子良上表曰今所在穀價雖和而比室飢嗛縑纊雖賤駢門裸質而守宰務在裒刻圍桑品屋以准資課致令斬樹發瓦以充重賦破人敗産賈利一時進違舊科退容姦利欲人康泰其可得乎隋書曰初蘇威父綽在西魏時以國用不足為征租稅之法頗稱為重既而歎曰今所為者正如張弓非平世也後之君子誰能施乎威聞其言每以為己任至是威為納言奏減賦役從輕典帝悉從之又曰開皇元年陳平上御朱雀門觀凱旋因行慶賞頒給所費三百餘萬帝以江表初定給復十年自餘諸州並免當年租賦十二年有司上言庫藏皆滿帝曰朕既薄賦於人又大經賜用何得爾也對曰用處常出納處常入略計每年賜用至數百萬段曾無減損乃更開左藏之院搆屋以受之詔曰既富而教方知廉恥寧積於人無藏府庫今年田租三分減一兵減半功調全免唐書曰開元八年二月制曰頃者以庸調無憑好惡須准故遣作樣以頒諸州令其好不得過精惡不得至濫任土作貢防源斯在諸州送物作巧生端茍欲副於斤兩遂即加其丈尺有至五丈為匹者理甚不然闊尺八長四丈同文共軌其事久行立樣之時須載此數若求兩而加尺甚暮四而朝三宜令所司簡閲有踰於比年常例尺丈過多者奏聞又曰開元二年十五年定令諸課戶一丁租調准武德二年之制其調絹絶布並隨鄉土所出絶絹各二丈五尺輸絹絁者綿三兩輸布麻三斤其絹絁為匹布為端綿為屯麻為綟若當戶不成匹端屯綟者皆隨近合成其調麻每年支料有餘折一斤輸粟一升與租同受管子曰地之生財有時人之用力有倦人君之欲無窮以有時與有倦養無窮之君而度量不生於其間度量不生賦役無限也則上下相疾也又曰桓公伐楚濟汝水踰方城望汶山使貢絲於周室列子曰周穆王大征西戎西戎獻昆吾之劍切玉如泥又曰周王時西域國有山人來王為中天之臺月月獻玉衣旦旦薦玉食王執山人之祛騰而上天文子曰楚人檐山雞路人問曰何為也欺之曰鳳凰也路人請十金弗與倍乃與之將獻楚王經宿鳥死路人不惜其金唯恨不得獻國人傳之咸以為真鳳遂聞楚王王感其貴買欲獻於己厚賜之過於買鳥之金十倍舜子曰齊威王夫人死有十孺子薛公欲知王所立為十玉珥而美其一獻於玉王以賦十孺子明曰坐視美珥所在而勸以為夫人也孟獻子曰畜馬乘不察於雞豚伐冰之家不畜牛羊百乘之家不畜聚斂之臣與其有聚斂之臣寧有盜臣此謂國不以利為利以義為利也孟子曰夏后氏五十而貢殷人七十而助周人百畝而徹其實皆什一也徹者徹也助者藉也詩曰雨我公田遂及我私唯助為有公田由此觀之雖周亦助也又曰尊賢使能則天下之士皆悅而願立於其朝矣市廛而不征則天下之商皆悅而願藏於其市矣廛市宅也古無征衰世征之王制曰市廛而先稅周禮曰國宅無征法而不廛者當以什一之法征其地耳不當征其廛宅也關譏而不征則天下之旅皆悅而願出於其路矣言關禁異服異語耳不征稅也周禮曰關市之賦司關門之征猶譏王制不征謂文王以前文王亦不征也耕者助而不稅則天下之農皆悅而願耕於其野矣助者井田什一助佐公家治公田不橫稅賦若履畝之類廛無夫里之布則天下之人皆悅而願為之氓矣里居也布錢也夫一夫也周禮曰宅不毛者出裏布田不耕者有屋栗凡人無職事者出夫家之征襄代緣是之重故孟子欲反則寬夫去里布則人皆樂之人白圭問孟子曰吾欲二十而取一何如孟子曰子之道貊道也萬室之國一人陶則可乎曰不可器不足用也夫貊五穀不生唯黍生之無城郭宮室宗廟祭祀之禮諸侯幣帛饔餼無百官有司故二十取一而足也今居中國去人倫無君子如之何其可也孫武曰夫帝王處四海之內居五千里之中焉能盡專其利是以分建諸侯以其利而利之使食其土之毛實役其人民之力故賦稅無轉徙之勞徭役無怨曠之歎矣新序曰楚人有獻魚楚王者曰獲魚食之不盡賣之不售棄之又惜故來獻之左右曰鄙哉辭也楚王曰子不知魚意其以此諭寡人也於是乃遣使恤鰥寡而存孤獨出倉粟發幣而賑不足罷去後宮不御者出人以鰥夫楚民欣欣大悅鄰國歸之荀悅論曰昔文帝十三年六月詔除人田租且古者十一而稅以為天下之中正今漢人田或百一而稅可謂鮮矣然豪富強人占田踰多其賦太半官收百一之稅而人輸豪家太半之賦官家之惠優於三代豪強之暴酷於亡秦是以惠不下通而威福分於豪人也今不正其本而務除租稅適足以資富強也魚豢魏略曰漢陽嘉三年踈勒國王貢西海青石帶舟至皇甫謐帝王世紀曰西王母慕舜德來獻曰環及玦并貢益地圖西京雜記曰初修上林苑群臣遠方各貢合枝李者楊乎楊孚異物志曰橘為樹白華而赤實皮既馨香裏又善味交址有橘官一人秩三百石歲主貢御橘雜望氣經曰黃白氣潤澤入翼四海有侯王來獻者天子賜四海之國入軫諸侯王者有獻車者出軫天子用車為幣賜諸侯王魏文帝與王朗書曰孫權重遣使稱臣奉貢明珠百篚黃金千鎰馴象二頭或牝或牡擾禽鸚鵡其他珍玩盈舟溢航千類萬品
