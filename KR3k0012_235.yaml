body:
  text: 職官部三十二著作郎續漢書曰弘農楊彪字文先多識愽聞與諸郎著作東觀王隱晉書曰陳壽為著作佐郎遷大著作又曰陸士衡以文學為秘書監虞濬所請為著作郎議晉書限斷又曰何嵩善史漢為著作晉書曰元康元年詔著作郎舊隸中書而秘書既典司文籍今改中書著作郎為秘書著作郎晉中興書曰孫盛歷散騎常侍秘書監常領著作又曰孫綽為散騎常侍領大著作于時才筆之士綽為其冠又曰李充為大著作于時典籍混亂充刪除煩重以類分作四部秘閣以為永制又曰謝沈為祠部郎何充庾冰以沈有史才遷大著作晉太興起居注曰元帝依故事召陳郡王隱待詔著作單衣介幘朔望朝著作之省沈約宋書曰何丞天除著作郎撰國史丞天時年已老而諸佐郎並名家年少荀伯子嘲之常呼為妳母丞天曰卿當云鳳皇將九子妳母何言耶又曰著作郎後漢官後漢已來太史但掌天文律曆而已其國記撰述悉在著作江左王導表著作為史官是也後漢東觀有著作郎後魏書崔浩好文學時人莫及天興中給事秘書轉著作郎太祖以其工書常置左右太祖季年威風嚴峻官者左右多以微過得罪莫不逃隱浩獨恭勤不怠或終日不歸太祖知之輒命賜以御粥其砥直任時不為窮通改節皆此類也又曰程駿拜著作郎顯祖屢引與論易老之義顧謂群臣曰朕與此人言意甚閑暢又問駿曰卿年幾何對曰臣六十有一顯祖曰昔太公既老而遭文王卿今遇朕豈非早也駿曰臣雖才謝呂望而陛下尊過西伯覬天假餘年竭六韜之效又曰韓顯宗除著作郎高祖曾謂顯宗及程靈虬曰著作之任國言是司卿等之才朕自委悉中省之品卿等所聞若欲取古人班馬之徒固自遼闊若求之當代文學之能卿等應推崔孝伯又曰趙逸為赫連屈丐著作郎世祖平統萬見逸所書曰此豎無道安得為此言乎作者誰也其速推之司徒崔浩進曰彼之謬述亦猶子雲之美新皇王之道固宜容之世祖乃止三國典略曰齊主以其著作郎祖珽數上密啟命中書門下二省斷珽奏事初珽為秘書郎用芳林遍略質摴蒲錢又陳元康被傷將死憑珽作書屬家累并云祖喜邊有少許物宜早索取珽不通此書喚喜私問得金二十五鋌唯與喜二鋌餘並自入祖喜告元康二弟叔諶季璩等叔諶以語楊愔愔嚬眉答曰恐不益亡者因此得停其後齊文宣以珽為秘書丞盜遍略事發付平陽王淹令錄珽付禁淹遣使收珽珽便私逃黃門侍郎高德正謀云但宣命向秘書稱奉并州進止須經史各部仰丞親自檢校催遣如此則珽意自安夜當還宅然後掩捉之果如德正所圖遂縛送廷尉據犯當死文宣以其伏事先代除名為民愛其才伎令直中書普選勞舊遷為著作唐書曰著作郎鄧隆上表請編錄御製詩集太宗冲讓不許隆好學多伎王充兄子太之守河陽也引隆為賓客大見親遇及太宗攻洛陽遣書諭太隆為太復書言辭不遜洛陽平後隆懼罪變姓名自號隱玄先生竄於白鹿山黃冠野服不接人事貞觀初徵授國子主簿與愽陵崔仁師昌黎慕容善行弘農劉顗新野康安禮河東敬播俱為修史學士隆負宿罪猶不自安太宗聞之遣房玄齡謂之曰爾為王太作書誠合重責但各為其主於朕何有惡哉朕今為天子何能追責疋夫之過爾宜坦然勿懷危懼也擢授著作郎及修史成尋卒撰東都記三十卷為學者所重又曰龍朔二年改著作郎為司文郎中佐郎為司文郎又曰劉允濟傳垂拱四年明堂初成允濟奏上明堂賦以諷則天甚嘉歎之手製襃美拜著作郎陶氏職官要錄曰著作郎舊視通直郎史才富愽者為之應亨集讓著作表曰自司隸校尉奉至臣五葉著作不絕鄉族以為美談著作佐郎王隱晉書曰武帝欲以郭琦為佐著作郎問尚書郭彰彰憎琦不附己答詔不識上曰若如卿言烏丸家兒能事卿即堪郎矣及趙王倫篡又欲用琦琦曰我已為武帝吏不能復為今世吏終於家又曰華嶠漢書十典未成秘書監繆徵奏嶠少子暢為著作佐郎卒成十典晉中興書曰郭璞奏南郊賦中宗見賦嘉其才以為著作佐郎又曰華譚為秘書監時晉陵朱鳳吳郡吳震等以單族有史才白首衡門譚薦二人擢補著作佐郎並皆稱職沈約宋書曰謝裕字景仁陳郡陽夏人也會稽王世子元顯嬖人張法順權傾一時內外無不造門者唯景仁不至年三十方為著作佐郎桓玄誅元顯見景仁謂四坐曰司馬庶人父子云何不敗遂令謝景仁三十方作著作佐郎後魏書曰宋弁字義和為著作佐郎尋除尚書殿中郎中高祖曾因朝會之次歷訪治道弁年少官微自下而對聲姿清亮進止可觀高祖稱善者久之因是大被知遇賜名為弁意取弁和獻玉楚王不知寶之理也後周書曰黎景熙字季明正定古今文字於東閣大統未除安西將軍尋拜著作佐郎於時倫輩皆位兼常伯車服華盛唯季明獨以貧素居之而無愧色又勤於所職著述不怠然性尤專固不合於時是以一為史官十年不調張華別傳曰陳壽好學善著述論著作佐郎當時夏侯湛等多欲作魏書見壽所作即壞己書文士傳曰束晢晚應司空辟入府六日除著作佐郎著作西觀撰晉書草創三帝紀及十志又曰張載作濛汜賦太僕傅玄見賦歎息稱善以車迎載言談終日玄深貴重載遂知名起家徵為佐著作郎校書郎六典曰校書郎八人正九品上掌讎校典籍刊正文字漢書曰劉歆字子駿少以通詩書能屬文召見成帝時待詔宦者署為黃門郎河平中受詔與父向領校秘書講六蓺傳記諸子無所不究又曰王莽劉棻時揚雄校書天祿閣上治獄使者來欲收雄雄恐不能自免迺從閣上自投下幾死莽曰雄素不與事何故在此問其故迺劉棻嘗從雄學作奇字雄不知情有詔勿問後漢書曰馬融字季長愽通經籍永初二年大將軍鄧騭聞融名召為舍人四年拜為校書郎中詣東觀典校秘書是時鄧太后臨朝騭兄弟秉政以為文德可興武功宜廢遂寢蒐狩之禮息戰陣之法故使猾賊縱橫乘此無備融乃感激以為文武之道聖賢不墜五才並用無或可廢乃上廣成頌以諷諫王隱晉書曰鄭默字思元為秘書郎刪省舊文除其浮穢著魏中經中書令虞松謂默曰而今而後朱紫別矣晉令曰秘書郎掌中外三閣經書覆校闕遺正定脫誤晉太元起居注曰秘書丞桓綏啟校定四部書詔遣郎中四人各掌一部唐書曰楊炯華陰人幼聰敏愽學善屬文神童舉拜校書郎為崇文館學士正字六典曰正字四人正九品下掌定典籍刊正文字唐書曰陳子昂苦節讀書尤善屬文高宗靈駕將還長安子昂詣闕上書陳東都形勝可以安置山陵關中險旱西行不便則天召見奇其對拜麟臺正字又曰吳通玄道瓘為太子諸王授經而通玄兄弟出入禁掖恒侍太子遊通玄與兄通微俱愽學善屬文文彩綺麗通玄幼應神童釋褐秘書省正字又曰蘇弁字元容京兆武功人也弁少有文學舉進士授秘書省正字唐明皇雜錄曰劉晏以神童為秘書秘書省正字上問晏曰正字正得幾字晏曰天下字皆正唯朋字未正玄宗大奇之
