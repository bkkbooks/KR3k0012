body:
  text: 職官部六司徒下晉書曰王渾字玄冲遷司徒仍加兵渾以司徒文官主吏不持兵持兵乃吏屬絳衣自以非是舊典皆令皂服論者美其謙而識體又曰石苞為司徒奏州郡農桑未有賞罰之制宜遣掾屬循行皆當均其土宜舉其殿最然後黜陟焉詔曰農殖者為政之本有國之大務也雖欲安民興化不先富而教之其道無由而至今四海多事軍國用廣加承征役之後屬有水旱之患倉庫不充百姓無積稼穡樹藝司徒掌之今雖登論道然經國立政唯時所急故陶唐之世稷官為重今司徒位當其任有毀家紓國乾乾匪躬之志其使司徒督察州郡播殖其增置掾屬十人聽取王官更練事業者苞在位稱為忠勤帝每委任焉又曰何劭曾之子也永康初遷司徒趙王倫篡位及三王交爭劭以軒冕而遊其間無怨之者又曰何曾字頴考以太保侍中領司徒曾固讓詔曰司徒舊丞相之職自古及今揔論人物化治之本以君弘道故選於衆而復盤桓非所聞也又曰魏舒為司徒不持激厲不課人短陳留周震為諸府所辟書既下公輒亡僉號震曰殺公掾舒辟之果無患又曰王戎代王渾為司徒高選長史西曹掾委任責成戎形狀短陋而目明徹威儀不足常畜馬輿無日不出親類之亡無不弔也常以象牙笇晝夜笇計家財遠及田牧性又至儉不能善自奉飬財不出外天下之人謂之膏肓之病又曰山濤為司徒固辭勑斷表臥加章綬曰豈可以垂沒之年汙官乎徑出歸家又曰魏舒字陽元為司徒年過致仕有遜讓意而無居宅乃漸以俸秩之餘為第一所舒素為人先行而後言故未曾語親踈言當遜位九年正月整法服入殿朝會罷徑還奉送章綬內外莫有知舒此情者曹嘉之晉紀曰王戎再至司徒委事掾屬乘小馬從便門出見者不知是台司也晉諸公讚曰司徒傅祗疾遜位不許板輿上殿晉中興書曰劉隗從兄疇字王喬有重名司空蔡謨每歎曰若使劉王喬得南渡司徒公之美選也又曰蔡謨字道明遷司徒謨固讓曰若我作司徒將為後代哂義不敢拜詔數十下謨章表十餘上陳以疾篤帝臨軒自朝至申而徵不至公卿以蔡公慠無人臣之禮奏送謨廷尉謨率子弟詣闕稽顙詔免為庶人齊職儀曰司徒品秩冠服同丞相郊廟服冕同太尉漢哀帝從朱博議始置三司改丞相為大司徒以孔光為之魏以華歆為之北齊書曰孫騰初北境亂騰亡一女及貴推訪不得疑其為人婢及為司徒婢訴良者皆免之願免千人冀得其女神武知之大怒遂解司徒隋書曰王誼為大司徒蘇威立議以為戶口滋多民田不贍欲減功臣之地以給民誼奏曰百官者歷世勳賢方蒙爵土一旦削之未見其可如臣所慮正恐朝臣功德不建何患民田有不足上然之竟寢威議唐書曰大和四年守司徒裴度上表辭冊命言臣此官巳三度受冊有靦顏目從之九州春秋曰靈帝賣官廷尉崔烈入錢五百萬以買司徒烈子均亦有時名烈問曰吾作公天下人謂何如對曰大人少有高名不謂不當為公今登其位海內嫌其銅臭烈舉杖擊之均走烈曰子授父撾而走可謂孝乎均曰舜之事父小杖則受大杖而走不陷父於不義烈曰爾以吾為瞽叟耶華陽國志曰自建武之後群儒修業開案圖緯漢之宰相當出坤鄉於是司徒李公屢登七政太傅于堅奕代論道荀氏家傳曰組字大章中宗為晉王時將徵為司徒問太常賀循循曰組舊望清重勤勞顯著遷訓五品以統人倫實充人望詔以組為司徒江氏家傳曰江統字應元時太傅從事中郎庾子嵩以風韻見重亦雅敬君德每云當今可以居司徒允民望者江生其人也管子曰昔者黃帝得祝融辨南方故使為司徒符子曰魯侯欲以孔子為司徒將召三桓而議之乃謂左丘明曰寡人欲以孔丘為司徒而授以魯政焉寡人將欲詢諸三子左丘明曰孔丘聖人與夫聖人在政過者離位焉君雖欲謀其罪弗合乎魯侯曰吾子奚以知之丘明曰周人有愛裘而好珍羞欲為千金之裘而與狐謀其皮欲具少牢之珍而與羊謀其羞言未卒狐相率逃於重丘之下羊相呼藏於深林之中故周人十年不制一表五年不具一牢何者周人之謀失之矣今君欲以孔丘為司徒召三桓而議之亦以狐謀裘與羊謀羞哉於是魯侯遂不與三桓謀而召孔丘為司徒典略曰契為司徒百姓和親夔主賓客遠人畢至蔡雍中鼎銘序曰惟建寧四年春三月進公登于王前廷乃制詔曰其以司空橋玄為司徒公拜稽首三讓然後受命曹植輔臣論曰辨博通幽見傅異度德實充塞于內知謀從橫於外解疑釋滯剖散盤結者主司徒荀勗答詔曰咸寧四年司徒何曾遷太宰詔問勗司徒處當得人副遠近之望并治事見才誰可也勗表三公具瞻之望誠不可用非其人昔魏文帝用賈詡為公孫權笑之尚書令李胤忠亮高潔應處台輔宋謝莊為北中郎謝兼司徒章曰臣聞燮理陰陽夤亮天地弗惟其官無人則闕司徒掌敷五典職擾兆民豈悟乾靈罔遺光渥方闡不次之任殊絶蕃嶽豈可權尸三事假備六符慚震周回顧步交悸司空尚書曰舜曰咨四嶽有能奮庸熙帝之載奮明也載成也僉曰伯禹作司空帝曰俞咨禹女平水土惟時懋哉帝曰然嗟禹女有平水災之功惟是勉之哉遂委以政也又曰司空掌邦土居四民時地利冬官卿主國空亡以居士農工商四民使順天時分也利也禮記王制曰司空執度度地司空冬官卿掌邦事者也度丈尺也量地遠近制邑井之處也興事任力事謂築邑宿市春秋昭四年曰爽鳩氏司空也續漢志曰司空為冬官掌邦事凡營城起邑復溝洫修墳防之事則議其利逮其功四方水土功課歲盡則奏其殿最而行賞罰凡國有大造大疑諫諍與太尉同春秋元命苞曰危東六星兩兩而比曰司空主水金木守之天下憂水韓詩外傳曰山陵崩陀川谷不通五穀不殖草木不茂則責之司空尚書大傳曰溝瀆擁遏水為民害田廣不墾則責之司空尚書形德放曰禹長於地理水泉九州得括象圖故堯以為司空家語曰度量不審舉事失理都鄙不修財物失所曰貧貧則飭司空飭謂整攝又曰魯定公以孔子為司空乃別五土之性五土山林川澤丘陵墳衍原隰也而物其所生之宜咸得厥所漢書曰成帝綏和元年始更名御史大夫曰大司空初改為司空議者又以縣道官有獄司空故復加為大司空亦所以別大小之文又曰彭宣字子佩為大司空而王莽為大司馬專權宣上書曰三公鼎足承君一足不任則覆亂美質臣老病願上印綬又曰何武字君卿為司空事後母不篤詔以其舉措煩碎不合衆心孝聲不聞惡名流行其上大司空印綬遂冊免之東觀漢記曰杜林代張純為大司空務於無為第五倫為司空奉公不撓言事無所依違後漢書曰王梁初為野王令世祖議選大司空而赤伏符曰王梁主衛作玄武帝以野王衛之所徙史記曰衛文君自濮陽徙於野王玄武水神之名司空水土之官也於是擢拜梁為大司空又曰竇融拜冀州牧十餘日又遷大司空融自以非舊臣一旦入朝在功臣之右召會進見容貌辭氣卑恭巳甚帝以此愈親厚之又曰陳寵為司空府故事以計吏至時自以下皆屬籍不通賓客以防交關寵去籍通客以明無所不受論者大之又曰張奮字稚通父純臨終勑家丞曰司空無功於時猥蒙爵土身死之後勿議傳國奮兄根少被病光武詔奮嗣爵奮稱純遺勑固不肯受帝以奮遠詔勑收下獄奮惶怖乃襲又曰第五倫章帝立徵拜司空奉公不撓言議果決後自陳老病以二千石祿俸終厥身續漢書曰張奮為司空時歲災旱祈雨不應乃上表即時引見復口陳時政之宜帝召太尉司徒幸洛陽獄録囚徒大雨三日華嶠後漢書曰第五倫雖峭直然常以中興巳來二主好吏化俗尚苛刻政化之本宜先以寬和及為三公值章帝長者多恕屢有善政倫上疏褒稱盛美因以勸成德風也又曰伏恭為太僕常臨辟雍於行禮中拜恭為司空儒者以為榮袁宏後漢紀曰第五倫為司空有人與倫千里馬者倫雖不取每三公有所選舉倫心不忘也然亦終不用漢官解詁曰下理坤道上和乾光謂之司空魏志曰景初元年司徒司空並𡙇散騎侍郎孟康曰夫宰相者天下之所瞻效誠宜得秉忠履正本德伏義之士足為海內所師表者竊見司隸校尉崔林稟自然之正性體高雅之弘量論其所長以比古之人忠直不回則史魚之儔也清儉守約則季文之匹也遂為司空封安陽亭侯三公封列侯自林始也又曰徐邈拜司空歎曰三公論道之官無其人則𡙇豈可以老病忝之哉固辭不受晉書曰裴秀為司空刪定官制損益多善當禪代之際揔納言之要其所裁當禮無違者又案禹貢山川地名古有今無者皆隨事注列作禹貢地域圖十八篇事成奏上藏於祕府秀在位四年為當世名公又曰鄭袤字林叔為司空天子臨軒遣就第拜授袤謂使曰魏以徐景山為司空徐公曰三公上應天心茍非其人實傷和氣固辭見許晉起居注曰武帝太始七年詔光祿大夫鄭袤體行純正履道冲粹退有清和之風進有素絲之節宜齊三階之曜補袞職之闕明弼朕躬匡其不逮其以袤為司空晉中興書虞玩字士瑤王道郤鑒庾亮相繼薨遷玩為司空給羽林四十人玩比陳讓不聽既拜歎息謂賓客曰以我為三公是天下無人矣談者以玩為知言齊職儀曰司空品秩官服同太宰舜以禹為司空成王以毛公為司空宋以武公之諱改司空為莫敖秦置御史大夫省司空後魏書曰伊馥拜司空及為三公清約自守為政舉大綱而巳不為苛碎後周書曰冬官謂之大司空卿掌邦事以五材九範之徒佐皇帝富邦國大祭祀行灑掃廟社四望則奉豕牲唐書曰天寶十三載冊楊國忠為司空其日雨土五代史唐書曰清泰二年制以前同州節度使馮道為守司空時議以自隋唐己來三公無職事自非親王不恆置於宰臣為加官無單置者道在相位時帶司空及罷鎮未命官議者不練故事率意行之及制出言議紛然或云便可綜中書門下事或云須冊開府及就列無故事乃不就朝堂敘班臺官兩省官入就列方入宰臣退踵後先退及晉天福中以李鏻為司徒周廣順初以竇貞固為司徒蘇禹圭為司空遂以為例議者不復有云華陽國志曰趙瑤字元圭拜扶風太守未之郡司空張溫謂曰第五伯魚從蜀郡為司空今掃吾第以待足下荀氏家傳曰荀爽字慈明董卓徵公公到府三日策拜司空爽起巖穴九十五日而為台司世人號為白衣登三公又曰顗為司空文帝平蜀議復五等表魏朝使公定禮儀中護軍賈充正法律尚書僕射裴秀議官制公遂刪定舊文行正式為一代之典書成奏藏於祕府其服色旗幟法駕之式禮樂犧牲柴燎之典裕褅遷毀配食之制及於明堂辟雍之儀皆公所議定朝廷歸其美公既為台輔德望清重加以留心禮教以年耆多疾不數朝見詔使侍中任愷咨問政化所宜行否又曰蕃字大堅為司空劉琨表於太子曰司空荀蕃朝廷之舊臣奕世忠勤乃心皇家具瞻之望唯蕃而巳宜增位號授分陜之重永令臣等有所憑准白虎通曰司空主土不言土而言空空尚主之況於實乎環濟要略曰冬官司空掌邦事營城郭都邑立社稷宗廟造宮宅器械監百工典略曰禹為司空披九山通九澤決九川定九州使各以其職來貢傅子曰荀仲豫稱禹十二為司空世論曰諸葛誕為鎮東將軍都督楊州司馬文王秉政徵誕為司空書至誕曰我當在王文舒後今便為司空不遣使者出齎書使以兵付樂綝此必綝所為乃將左右數百人至楊州州人欲閉門誕叱之曰卿非我故吏耶徑入綝逃上樓就斬之齊孔稚圭為王敬則讓司空表曰故李通豪贍以親寵登用王基才勇以聲華入選先帝擢臣以榮華陛下申臣以富貴遂得北帶五州東跨六郡內亞三鼎外齊四嶽蟬佩之映則左右交暉龜組之華則縱橫吐曜輕輪徐動則劍騎如雲飛蓋暫停則歌鍾成列樅金龍吹鬱其前鳴笳鳳管疊其後鄧禹若不遭漢光則南陽之掾史微臣若不逢明聖則孤城之戍客豈可加以正台之席登以論道之寄啓黃扉而燮五緯躡青帷而調四序梁劉孝儀為臨川王解司空表曰臣以庸薄謬竊隆重職班三事任揔六條衣袞坐槐既闕論道駝傳憩棠尤慚為政而俯司土地仰燮陰陽折撓之譏巳彰愆伏之咎爰著今水蜧不躍旱魃為災山無薈蔚雲成煙火陛下曲私未垂策免臣職是當於何逃責乞責降茲台步協此天人
