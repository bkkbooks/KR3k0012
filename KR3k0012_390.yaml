body:
  text: 人事部三十嗜好禮記檀弓上曰孔子與門人立拱而尚右二三子亦皆尚右孔子曰二三子之嗜學也我則有姊之喪故也二三子皆尚左喪上右陰也吉上左陽也又祭義曰先王之孝也心志嗜欲不忘乎心又祭統曰不齊則於物無防也嗜欲無止也及其將齋也防其邪物訖其嗜欲耳不聽樂左傳閔公曰衛懿公好鶴鶴有乘軒者及有狄人之難國人皆曰鶴實有祿位余焉能戰遂敗又僖中曰齊侯好內多內寵內嬖如夫人者六人左傳襄公曰鄭伯有好田而嗜酒為窟室而夜飲酒擊鐘焉朝至未已朝者曰公焉在家臣故謂伯有為公其人曰吾公在壑谷壑谷窟室又昭公曰莒子庚輿虐而好劍茍鑄劍必試諸人又哀上曰曹伯陽即位好田弋曹鄙人公孫強好弋獲白雁獻之公羊傳僖公曰虞公貪而好寶及為晉所滅抱寶牽馬而出國語曰屈到嗜艾有疾召其宗老而屬之祭我必以艾子木曰夫子不以私欲姦國之典言不犯常法遂不用論語公冶長曰子曰十室之邑必有忠信如丘者焉不如丘之好學也又雍也曰哀公問弟子孰為好學孔子對曰有顏回者好學不遷怒不二過不幸短命死矣又衛靈公曰子曰吾未見好德如好色者也家語曰子路見孔子曰汝何好對曰好長劍孔子曰加之以學豈可及乎子路曰南山有竹不揉自直斬而用之射達於犀兕以此言之何用學焉子曰栝而羽之所達深矣史記曰魏文侯問曰吳起何如人李克曰起貪而好色然其用兵司馬穰苴弗過也於是魏文侯以為將拔秦五城又曰范增説項羽曰沛公居山東之時貪於財貨好美姬入關財物無所取婦人無所幸此其志不在小漢書曰濟東王彭離昏暮私與其奴亡命少年數十人行剽殺人取財物以為好以是為好喜之事也又曰漢家言律曆者本張蒼蒼好書無所不觀無所不通又曰朱買臣字翁子吳人也家貧好讀書不治産業又曰陳遵嗜酒每大飲賓客滿座輒閉門取客車轄並井中雖有急不能去續漢書曰劉寬簡略嗜酒不好盥浴東觀漢記曰耿弇字伯昭扶風人少好習學文業帝又令試騎士建旗鼓肆馳射由是好將帥之事又曰薑詩字士遊廣漢雒人以傭作養母赤眉賊經其里落云不可驚孝子母好飲江水兒取水溺死恐母知詐云行學歲歲作衣投於江中俄而涌泉出於舍側味如江水又曰更始韓夫人尢嗜酒每侍飲常侍奏事輒怒曰帝方對我飲正酣何此時持事來乎起褫破書案謝承後漢書曰馬武字子張南陽人為人好酒豁達敢直言時在御前面折同列以為笑樂典略曰荊州牧劉表跨有南土子弟驕貴並好酒設大針於杖端客有醉寢伏輒以劖鋤銜切剌驗其醒醉晉書曰王濟好弓馬嘗乘一馬著連乾鄣泥前有水終不肯渡濟云此必是惜鄣泥使人解去便渡故杜預謂濟有馬癖晉中興書曰郭璞性輕易不持威儀嗜酒好色或過度其友人干寶常誡之曰此非適性爾璞曰吾所受有本限用之恆恐不盡乃憂為害乎後魏書曰辛少雍字季仲少有孝行尤為祖父紹先所受紹先愛食羊肝常呼少雍共食及紹先卒少雍終身不食羊肝宋書曰庚炳之性好潔士大夫造之者去未出戶輒令拭席枕床時陳郡殷沖亦好淨小人非淨浴新衣不得近左右士大夫小潔每容接之炳好潔反是沖每以此譏焉又曰謝靈運出為永嘉太守郡有名山水靈運素所愛好出守既不得志遂肆志遊遨遍歷諸縣動逾旬朔又曰劉雍所噉食每異於人性嗜瘡痂以為味似蝮魚常詣孟靈休靈休先患灸瘡瘡痂落床上雍因取食之靈休大驚雍答云性之所嗜靈休瘡痂未落者悉褫取以貽雍雍既去靈休與何勗書曰雍向見噉遂舉體流血南康囚史二百許人不問有罪無罪遞互與鞭鞭痂常給雍膳齊書曰何修之字士威廬江人也性好潔一日之中洗滌者十餘過猶恨不足時人稱為水淫于時又有遂安令劉為性彌淨潔縣中灑掃郭邑無橫草水湔塵穢百姓不堪命坐免官又曰王思遠琅琊臨沂人也好簡潔衣服垢穢方便不前形像新楚乃與促膝雖然既去之後猶令二人交帚掃其坐處又曰明帝好食逐夷以銀鉢盛密漬之一餐數鉢謂王景文曰此味卿頗足不景文曰臣夙好此味貧素致之甚難帝甚悅食夷積多胸腹不息氣將絶疾大困一食漬汁猶至三斗終以此卒管子曰吳王好劍而國士輕死墨子曰晉文公好士之惡服大夫牂羊之裘韋以帶劍大帛之冠越王好士勇自焚其室曰越國之寶悉在此中王自鼓蹈火而死者百餘人孟子曰曾晢嗜羊棗而曾子不忍食羊棗羊棗大棗也莊子曰子張見魯哀公哀公不禮曰臣聞君好士不遠千里以見公今見公之好士也有似葉公子高之好龍葉公好龍室中雕文畫以為龍於是天龍聞而下之窺頭於牗拖尾於堂葉公見之棄而還走失其魂魄五神無主是葉公非好龍也夫似龍而非龍也今君非好士也夫似士而非士也新序同尹文子曰昔齊桓公好紫闔境不鬻異綵又曰齊宣王好射所用弓不過三石以示左右左右引之皆曰此不下九石而宣王終身自以為用九石韓子曰齊桓公好服紫一國盡服紫當時十素不得一紫公患之管仲曰君欲止之何不試勿衣也謂左右曰甚惡紫臭公曰諾於是三日境內莫有衣紫又曰楚恭王與晉厲公戰于鄢陵楚師敗恭王傷目其戰之時司馬子反渴而求飲穀陽豎操觴酒而進之子反曰此酒也豎曰非也飲之子反謂之嗜酒弗能絶口又曰公儀休相魯而嗜魚一邦皆爭買魚而獻之公儀子不愛又曰鄒君好服長纓左右皆服纓纓甚貴鄒君患之問左右對曰君服之百姓亦多服是故貴也鄒君因先自斷其纓而出國中皆不服長纓賈誼曰文王使呂望傅太子發發嗜鮑魚公不與曰鮑魚不登於俎豈有非禮而可養太子哉説苑曰魏文侯封太子擊於中山三年不往來趙倉唐曰君何不遣人使大國太子曰願之久矣未得可使者對曰願奉使於是遣倉唐緤北大奉晨鳧獻之文侯曰擊愛我知我所嗜好韓詩外傳同風俗通曰趙王好大眉民闊半額楚王好廣領國人沒頸文士傳曰嵇康性絶巧好煆家有盛柳樹乃激水圜之夏天甚涼恆居其下自煆有人就者康不受其直孝子傳曰隗通字君相犍為僰道人母好飲江脊水常乘船捷致漂浚辛苦忽然有橫石特起直江脊後取水無復勞劇又曰陳遺為郡主簿母好食鐺底焦飯常持一囊盛之懸案下郭子曰陸士衡初入雒張公云宜詣劉道真於是二陸既往劉尚在哀制性嗜酒禮畢初無他言唯問東吳有長柄胡盧卿得種不陸兄弟殊失望乃云悔往世説曰謝遏年少玄也好著紫羅香囊太傅患之而不欲傷其意賭得而焚之又曰林公好鶴往剡東時有人遺其雙鶴少時翅長欲飛林公意甚惜之乃鎩其翮鶴騫翥不能復起乃舒翼反頭視之如似懊惱意林公曰既有凌霄之姿何肯為人作耳目近玩養令翮成遂飛去又曰王武子好驢鳴既葬文帝臨其喪顧語同遊曰王子好驢鳴可各作聲以送赴客皆一時作驢鳴語林曰王武子死孫子荊哭之甚悲賓客莫不垂涕哭畢向靈座曰卿嘗好我作驢鳴今我為君作驢鳴聲似真賓客皆笑孫聞之曰諸君不死而令王武子死賓客皆怒焉又戴叔鸞母好驢鳴叔鸞每為驢鳴以樂其母又曰祖約少好財阮遙集好屐並常自經營同是一纍而未判其得失有詣祖見料視財物客至併當不盡餘兩小以置背後傾身障之意未能平或有詣阮正見自蠟屐因歎曰未知一生當著幾緉屐神甚間暢於是勝負始分也又曰王子猷嘗暫寄人空宅住使令種竹或問暫住何煩爾嘯詠良夕直指竹曰何可一日無此君語林曰張湛好於齋前種松柏袁山松出遊好令左右挽歌時人謂張屋下陳尸袁道上行殯曹植求祭先王表曰先王喜鰒魚臣前以表徐州臧霸遺鰒魚二百枚足自供事容止毛詩曰臣工振鷺二王之後來助祭也二王夏殷也其後杞宋也振鷺于飛于彼西雍我客戾止亦有斯容箋云自鳥集於面雍之澤言所集得其有斯容言威儀之若鷺然也禮記玉藻曰君子之容舒遲足容重舉欲遲也手容恭高且正也目容端不睇視也口容止不妄動也聲容靜不噦咳也頭容直不傾顧也氣容肅似不息也立容德如有豫也色容莊勃如戰色坐如尸尸居神位敬慎也燕居告溫溫告謂教使也詩云溫溫恭人凡祭容貌顏色如見所祭者喪容纍纍羸憊貌也色容顛顛憂思貌也視容瞿梅梅不審貌也言容繭繭聲氣微也戎容暨暨果毅貌也言容詻詻教令嚴也色容厲肅儀形貌也視容清明察於事也立容辨卑母讇辨讀為貶自貶卑謂聲磬折也又表記曰容貌以文之衣服以移之是故君子服其服則文以君子之容有其容則文以君子之辭左傳定下曰邾隱公來朝子貢觀焉邾子執玉高其容仰公受玉卑其容俯子貢曰以禮觀之二君者皆有死亡焉論語子張曰曾子曰堂堂乎張也難與並為仁矣言子張容儀盛而於仁道薄難勉進漢書曰薛宣好威儀容止甚可觀又曰息夫躬河內陽人也少受春秋通覽詩書容貌壯麗為衆所異又曰江充召見大臺宮自請以所常被服見上上許之充衣紗縠單衣冠步搖冠為人魁岸容貌甚壯帝望見而異之謂左右曰燕趙固多奇士又曰武帝即位徵天下賢良待以不次之位自衒鬻者以千數東方朔上書曰臣朔年二十二長九尺三寸目若懸珠齒若編貝又曰王商為丞相河平四年單于來朝引見丞相唑未央庭中單于前拜謁商商起離席與言單于仰視商貌大畏之遷延卻退天子聞而歎曰此真漢相矣又曰司馬相如字長卿蜀郡成都人也至臨邛富人卓王孫請之相如時從車騎雍容間雅甚都美也詩曰不見子都都王孫有女文君新寡竊從戶窺心説而好之遂夜奔相如又曰雋不疑字曼倩渤海人也暴勝之為直指使者至東海素聞不疑賢請與相見望見不疑容貌尊嚴衣冠甚偉勝之屣履起迎續漢書曰侯霸字君房河南人為人矜嚴有威容家纍千金不事産業篤志詩書師事房元常為都講東觀漢記曰上過頴陽祭遵以縣吏數進見上愛其容儀署為門下吏又曰虞延字子太陳留人為都督郵世祖聞而奇之二十年東巡路過小黃高帝母昭陵后園陵在焉時延為都督郵詔呼引見問園陵之事延進旨從容跪拜可觀其陵樹株柏皆諳其數俎豆犧牲頗曉其禮帝善之勑延從駕西盡郡界賜錢及劍帶佩刀還郡又曰杜詩薦伏湛疏曰容貌堂堂國之光輝智略謀慮朝之淵藪齠齓勵志白首不衰實足以先後王室名足以光示遠人柱石之臣宜居輔弼英雄記曰袁紹生而孤幼為郎容貌端正威儀進止動見倣效弱冠除復陽長有清能名吳書曰張純字元基少厲操行學博才秀切問捷對容止可觀拜郎中補廣德令治有異績擢為太子輔義都尉吳録曰滕胤年十二孤單焭獨為人白晢威儀可觀每正朔朝會修覲在位大臣見者莫不歎賞魏志曰延康元年蜀將孟達率衆降達有容止可觀文帝甚器愛之使達為新城太守加散騎常侍蜀志曰魏文帝察黃權有扃量試欲驚之遣左右請權未至之間纍催相屬馬使奔馳交錯於道官屬莫不褫魄而權舉止顏色自若後領益州刺史大將軍司馬宣王深器之問權曰蜀中有卿輩幾人權笑而不答曰不圖明公見顧之重蜀志曰彭求年廣漢人身長八尺容貌甚偉姿性驕傲多所輕忽唯敬同郡秦子勑吳志曰張昭容貌矜嚴有威風權常曰孤與張公言不敢妄也舉邦憚之王隱晉書曰王褒少立操尚非禮不動非法不言身長八尺四寸容貌絶異音聲清亮辭氣韶雅沈約宋書曰元凶弒逆義宣發哀即日便舉兵張暢為元佐位居僚首哀容俯仰蔭映當時舉哀畢變服著黃韋袴褶出射堂簡人音姿容止莫不矚目見之者皆願為盡命又曰羊欣字敬先少靜默無競於人美言笑善容止遍覽經籍尤長隸書賈誼新書曰朝廷之容師師然翼翼然整以敬祭祀之容遂遂然粥粥然敬以婉軍旅之容愊然肅然固以猛喪紀之容怮然懾然若不還顧談別傳曰談字子默吳人常慕賈誼之為人身長七尺八寸少言笑容貌矜整有圭璋威重未常失色於物非其人或終日不言顏含別傳曰顏髦字居道含之子也少慕家業惇於孝行儀狀嚴整風貌端美桓公見而歎曰顏侍中廊廟之望也桓邵別傳曰邵字敬倫丞相之第五子清貴簡素風姿甚美而善治容儀雖家人近習莫見其怠墮之貌溫見而稱之曰可謂鳳雛郭子同三輔決録曰竇叔高名玄為上郡計吏朝會數百人儀狀絶衆天子異之詔以公主妻之出同輩調笑焉叔高時已自有妻不敢以聞方欲迎婦與訣未發而詔召叔高就第成婚益部耆舊傳曰張肅有威儀容貌甚偉弟松為人短小不持節操然識達精果有材幹劉璋乃遣詣曹公曹公不甚禮楊修深器之修以所撰兵書示松飲宴之間一省即便暗誦修以此異之會稽典録曰賀邵善容止正其衣冠尊其瞻視動靜有常與人交久益敬之至於官府左右莫見其跣坐常著襪希見其足荀氏家傳曰荀羡風器英秀識準摽貴明鬚眉美音氣俯仰顧盼容止可則世説曰太尉總角時常造公司徒王衍神情明秀風姿詳雅山公嗟嘆者良久既去目之而言曰何物老嫗生此寧馨兒然恐誤天下生民者未必非此人又曰崔琰字季圭聲姿高朗鬚長四尺甚有威重武帝見胸奴使自以形陋不足以雄遠國使季圭代自捉刀立床頭既畢令間諜問曰魏王何如答曰王雄望非常然床頭捉刀人此乃英雄也魏武追殺其使又曰裴令公有容儀脫冠冕粗服亂頭皆好時人以為玉人又曰時人見嵇中散歎曰蕭肅如長松下風高而且深山公曰嵇叔夜巖巖若孤松之獨立及其醉也如玉山之將頽又曰王右軍見杜弘冶歎曰面如凝脂眼如點漆此神仙中人也又時人謂左軍飄若遊雲矯若驚龍又曰海西時諸公每朝朝堂猶暗唯會稽王來軒軒若朝霞舉
