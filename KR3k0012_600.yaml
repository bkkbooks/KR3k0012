body:
  text: 文部十五品量文章後周書薛置傳曰前中書監盧柔學業優深文藻華贍而置與之方駕故世號曰盧薛焉梁書曰何遜文章與劉孝綽並見重時謂之何劉梁元帝著論云詩多而能者沈約文少而能者謝眺何遜三國典略曰劉逖字子長少好弋獵騎射後發憤讀書頗工詩詠行臺尚書席毗嘗嘲之曰君輩詞藻譬若春榮須臾之玩非宏材也豈比吾徒千丈松樹常有風霜不可雕倅逖報之曰既有寒木又發春榮何如也毗笑曰可矣唐書曰富嘉謨雍州武功人也舉進士長安中纍轉晉陽尉與新安吳少微友善同官先是文士撰碑頌皆以徐庾為宗氣調漸劣嘉謨與少微屬詞皆以經典為本時人欽慕之文體一變稱為富體嘉謨作雙龍泉頌干燭谷頌少微撰崇福寺鍾銘詞最高雅作者推重張鷟字文成凡八登甲科員外郎員半千謂人曰張子之文如青銅錢萬選萬中未聞退時時流重之目為青錢學士楊盈川華州華陰人少與絳州王勃范陽盧照鄰東陽駱賓王皆以文詞知名海內稱為王楊盧駱亦號為四傑炯聞之謂人曰吾愧在盧前恥居王後當時議者亦以為然其後崔融李嶠張説皆為一時宗匠崔李嘗曰王勃文章宏逸有絶塵之迹固非常流所及炯與照鄰則可企而致盈川之言不信矣張説謂人曰楊盈川之文如懸河注水酌之不竭既優於盧亦不減王恥居王後則信然愧在盧前為誤矣李華善屬文與蘭陵蕭潁士友善華舉進士時著含元殿賦萬餘言潁士見而賞之曰景福之上靈光之下華文體溫麗少宏傑之氣潁士詞鋒俊發華自以所業過之乃為祭古戰場文燻污之如故置於佛書之閣華與潁士因閲佛書得之華謂之曰此文何如潁士曰可矣華曰當代秉筆者誰及於此潁士曰君稍加精思便可及此華愕然又曰元和詞人元稹論杜子美之詩蓋所謂上薄風騷下該沈宋古奪蘇李氣吞曹劉掩顏謝之孤高雜徐庾之流麗盡得古今之體勢而兼人之所獨專矣則詩人已來未有如子美者是時山東人李白亦以文奇取稱時人謂之李杜豫觀其壯浪縱恣擺去拘束模寫物象及樂府歌詩誠亦羌肩於子美矣至若鋪陳終始排比聲韻大或千言次猶數百詞氣豪邁而風調清深屬對律切而脫棄凡近則李尚不能歷其藩翰況堂奧乎魏文帝典論曰文人相輕自古而然傅毅之於班固伯仲之間耳而固小之與弟超書曰武仲以能屬文為蘭臺令史下筆不能自休夫人善於此自見而文非一體鮮能備善是以各以所長相輕所短矣里諺曰家有弊帚享之千金斯不自見之患也今之文人魯國孔融文舉廣陵陳琳孔璋山陽王粲仲宣北海徐翰偉長陳留阮瑀元瑜汝南應瑒德璉東平劉楨公幹斯七子者於學無所遺於辭無所假咸自以騁騄驥於千里仰齊足而並馳以此相服亦良難矣蓋君子審己以度人故能免於斯纍而作論文王粲長於辭賦徐翰時有逸氣然粲之匹也如粲之初征登樓槐賦翰之玄猿漏巵員扇橘賦雖張蔡不足過也然於它文未能稱是琳瑀之章表書記今之俊也應瑒和而不壯劉楨壯而不密孔融體氣高妙有過人者然不能持論理不勝辭至于雜以嘲戲及其時有所善楊班之儔也常人貴遠賤近向聲背實又患暗於自見謂己為賢夫文本同而未異蓋奏議宜雅書論宜理銘誄尚實詩賦欲麗此四科不同故能之者偏也唯通才能備其體文以氣為主氣之清濁有體不可力強而致譬諸音樂曲度雖均節奏同撿至於引氣不齊巧拙有素雖在父兄不能以移子弟蓋文章經國之大業不朽之盛事年壽有時而盡榮樂止乎其身二者必至之常期未若文章之無窮是以古之作者寄身於翰墨見意於篇籍不假良史之辭不託飛馳之勢而聲名自傳於後故西伯幽而演易周旦顯而制禮不以隱約而不務不以康樂而加思夫然則古人賤尺璧而重寸陰懼乎時之過已而人多不強力貧賤則懼於飢寒富貴則流于逸樂遂營目前之務而遺千載之功日月逝于上體貌襄於下忽然與萬物遷化斯亦志士大痛也融等已逝唯幹著論成一家之言傅子曰或問劉歆劉向孰賢傅子曰向才學俗而志中歆才學通而行邪詩之雅育書之典謨文質足以相副玩之若近尋之益遠陳之若肆研之若隱浩浩乎其文章之淵府也李充翰林論曰潘安仁為文也猶翔禽之羽毛衣被之綃縠抱朴子曰世謂王充一代英偉所著文時有小疵猶鄧林枯枝滄海流芥未易貶者又曰歐陽生曰張茂先潘正叔潘安仁文遠過二陸又曰張潘與二陸為比不徒驟步之間也歐陽曰二陸文詞源流不出俗撿又曰秦時不覺無鼻之醜陽翟憎無癭之人陸君深疾文士放蕩流遁遂往不為虛誕之言非不能也陸君之文猶玄圃之積玉無非夜光也吾生之不別陸文猶侏儒測海非所長也歎賞晉書曰張載為濛汜賦司隸校尉傅玄見而嗟歎以車迎之言談盡日為之延譽遂知名又曰張華字茂先阮籍見華鷦鷯賦許以王佐之才中書郎成公綏亦推華文義勝己陸機弟雲嘗與機書云君苗見兄文輒欲燒其筆硯後葛洪著書稱機文猶玄圃之積玉無非夜光焉五河之吐流源如一焉其弘麗妍贍英鋭源逸亦一代之絶乎南史曰王筠字元禮善屬文沈約每見其文常咨嗟謂曰昔蔡伯喈見王仲宣曰吾家書籍悉當相與僕雖不敏請附斯言筠嘗以詩呈約報書歎詠以為後進擅美約又嘗謂筠叔志曰賢弟子文章之美可謂後來獨秀又曰謝眺好獎人才會稽孔闓粗有文筆才未為時人所知孔稚圭嘗令草讓表以示眺眺嗟吟良久手自折簡寫之謂圭曰士子聲名未立應共獎成無惜齒牙餘論其好善如此吳均齊春秋曰丘靈鞠善屬文宋孝武殷貴妃亡靈鞠上挽歌詩云雲橫廣陌暗霜深高殿寒帝摘句咨嗟賞之即轉為新安王北平中郎中參軍唐書曰封敖為翰林學士拜中書舍人敖搆思敏速語近而理勝不務奇澀武宗深重之嘗草賜陳傷邊將詔警句云傷居爾體痛在朕躬帝覽而善之賜之宮錦李德𥙿在相位定策破回鶻誅劉稹議兵之際同列或有不可之言唯德𥙿籌計相畫竟立奇功武宗賞之封衛國公守太尉其制語有遏橫議於風波定奇謀於掌握逆稹盜兵壺關晝鎖造膝嘉話開懷靜思意皆我同言不它惑制出敖往慶之德𥙿口誦此數句撫敖曰陸生有言所恨文不逮意如卿此語秉筆者不易措言坐中解其所賜玉帶以遺敖深禮重之又曰馮定為太常少卿文宗每臨樂鄙鄭衛詔奉常習開元中霓裳羽衣舞以雲韶樂和之定統樂立於庭文宗以其端凝若植問其姓氏翰林學士李玨奏定之名文宗喜問曰豈非能為古章句者耶遂召升階文宗自吟送客西江詩吟罷益喜因鍚以禁中瑞錦仍令大録所著古體詩以獻世説曰孫興公作天台賦成以示范榮期曰卿試擲置地要作金石之聲范曰恐子之金石非宮商中聲然每至佳句輒云應是我輩語又曰左思字太沖作三都賦時人互有譏訾思意不甚愜後示張華曰此二京可三然君文未重於世宜以示高名之士思乃請序於皇甫謐謐見之唴嘆遂為作序於是先相訾者莫不斂袵讚述焉又曰庾仲初作楊都賦成呈庾亮以親族之懷大為其名價云可三二京四三都於是人人競寫都下紙為之貴顏氏家訓劉孝綽當時既有重名無所與讓唯服謝詠置几案動輒諷吟味其文改易語曰為命禆諶草創之世叔討論之行人子羽修飾之東里子産潤色之漢書曰倪寬善屬文張湯為廷尉廷尉府盡用文史法律之吏而寬以傳生在其間見謂不習事不署曹除為從吏之北地租畜數年還至府上畜薄會廷尉時疑奏已再卻矣掾吏莫知所為寬言其意掾吏因使寬為奏奏成讀之皆服以白廷尉張湯湯大驚召寬與語乃部其材以為掾上寬所作奏郎時得可異曰湯見上問曰前奏非俗吏所及誰為之者湯言兒寬上曰吾固聞之久矣湯由是嚮學以寬為奏讞掾晉書曰袁宏從桓溫北伐又作北征賦皆其文之高者嘗與王珣伏滔讀其北征賦至聞所傳於相傳云獲麟於此野但靈物以瑞德奚受體於虞者究尼父之慟哭似實慟而非假豈一性之足傷乃致傷於天下至此便改韻珣云此賦必傳千載無容率爾今於天下之後便移韻結事然於寫送之致似未為盡桓溫曰卿思益之宏應聲曰感不絶於豫心訴流風而獨寫珣諷味久之謂滔曰當今文章之美當共推此生宋書曰王誕字茂世有才藻晉孝武帝崩從叔尚書令珣為哀策出本示誕曰猶少敘節物一句誕便攬筆益之接其秋冬代變云霜繁廣除風回高殿詢歎美因而用之齊書曰張融作海賦文詞詭激獨與衆異後以示鎮軍將軍徐覬之覬之曰卿此賦實超玄虛但恨不道鹽耳融即求筆注曰漉沙構白熬波出素積雪中春飛霜暑路齊書劉繪傳曰魚復侯子響誅豫章王嶷欲求葬之召繪為表須臾便成嶷歎曰禰衡何以過此唯足八字文提攜鞠養俯見成人後魏書高祖嘗宴侍臣於清徽堂遂令黃門郎崔光讀暮春群臣應詔詩至彭城王協詩高祖仍為改一字曰昔祁奚舉子天下謂之至公今見協詩始知中府之舉非私也協曰臣露此掘才見本朝之私賴蒙神筆賜刊得有令譽高祖曰雖雕琢一字猶是王之本體協曰臣聞詩一言可蔽今陛下刊以一字足以價等連城唐書文苑傳曰李商隱能為古文不喜偶對從令狐楚幕楚能章奏遂以其道授商隱自是始為今體章奏三國典略曰齊王在東山飲酒投柸怒赫召魏收於前立為書曰朕歷數在射志清四海蕞爾秦隴久阻風化混一之事期在今日必當訓旅誓衆天動雲臨朕已下木汾流成船晉地便當躬先將士入王璧徑掩長安梟彼凶首朕與梁國舊敦好睦聞其姦計乃欲規謀宜令上黨王渙揔勒熊熊星流風卷王者之言明如日月宜宣內外咸使聞知書成齊主覽之於凶首下足九言曰雖藏山沒水終不縱赦於是遣渙南侵曹植與楊修書曰世人之著述不能無病僕常好譏彈其文有不善者應時改定昔丁敬禮常作小文使僕潤飾之僕自以才不過若人辭不為也敬禮謂僕卿何所疑難文佳麗吾自得之後世誰相知定吾文者耶常歎此言達以為美談世説曰司馬景王令中書虞松作表再呈輒不可意令松更定松思竭不能改心存之形於顏色鍾會察其憂問松松悅以實答曾取為定五字悅服之以呈景王景王曰不當爾耶誰所當也曰鍾會向亦欲啓之會公見問不敢叨其能王曰如此可大用令來日平旦入見王獨撫手歎息曰此真王佐才也詆訶曹植與楊修書曰劉季緒才不能逮於作者而好詆訶文章椅托利病晉書曰左思字太沖齊國臨淄人也作三都賦搆思十年門庭藩溷皆置筆硯遇得一句即便疏之賦成思恐時人未之見重先以示皇甫謐謐稱善為其賦序陸機入洛欲為此賦聞思作之撫掌而笑與弟雲書曰此間有槍助庚切作三都賦須其成當以覆酒甕耳及思賦出機絶歎服以為不能加也遂輟筆焉三國典略曰齊有大儒劉畫恨不學屬文力復緝綴作賦一首名為六合自謂紀倫魏收謂人曰賦名六合其愚己甚及其見賦又愚於名又曰邢劭嘗云江南任昉文體本踈魏收非直模擬亦大偷竊收聞之乃言曰劭常於沈休文集裏作賦何意道我偷任語任沈俱有重名邢魏各有所好顏之推嘗以二公之意問於祖珽珽曰見邢魏之臧否即任沈之優劣又曰魏收言及沈休文集毀短之徐之才怒曰卿讀沈文集半不能解何事論其得失謂收曰未有與卿談收去避之隋書曰高構以老病解職河東薛道衡才高當世每稱構有清鑒所有文筆必先以草呈搆而後出之搆有所詆訶道衡未嘗不嗟伏隋庾自直少好學屬文於五言詩尤善性恭慎不妄交遊特為所愛帝有篇章必先示自直令其詆訶自直所難帝輒改之至於再三俟其稱善然後方出其見親禮如此唐書曰文苑傳曰天寶末詩人杜甫與李白齊名而白自負文格放達譏甫齷齪而有飯顆山之嘲誚國朝傳記曰梁常侍徐陵聘於齊時魏收文學北朝之秀收録其文集以遺陵令傳之江左陵濟江而沉之從者以問陵曰吾為魏公藏拙
