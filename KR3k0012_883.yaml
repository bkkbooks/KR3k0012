body:
  text: 神鬼部二神下北齊書曰神武以高昂為西道大都督徑趣商洛昂渡河祭河伯曰河伯水中之神高敖曹地上之虎齊書曰義鄉縣長風廟神姓鄧先經為縣令死遂發靈周山圖啟乞加神位輔國將軍上曰足狗肉便了事何用階級齊書曰李安人為吳興太守郡有項羽神護郡廳事太守到郡必須祀以軛下牛安人奉佛法不與神牛著履上廳事又於上設八關齋俄而牛死安人尋卒世以神為祟梁書曰王神念為青州刺史性剛正所更州郡必禁止淫祠時東北有石鹿山臨海先有神廟神念至便令毀撤神影壞屋舍坐棟上有一大虵長丈餘入海水時陰子春為東莞太守夢人通名詣子春云有人見苦被壞宅舍既無所託欽君厚德欲憩此境子春心密記之經二日而知之甚驚以為前所夢神因辦牲醑請召安致一處數日復夢一朱衣人相聞辭謝云得君厚惠當以一州相報子春心喜供事彌勤經月餘魏欲襲朐山間諜前知子春設伏摧破之授南青州刺史又曰蕭猷封臨汝侯為吳興郡守性倜儻與楚王廟神交飲至一斛每酹祀盡懽極醉神亦有酒色祈禱必從後為益州刺史時江陽人齋茍兒反猷乃遙禱請救是日有田老逢一騎絡鐵從東方來問去城幾里曰百四十時日已晡騎舉矟曰後人來可令之病馬欲及日破賊俄有數百騎如風一騎過請飲田老問為誰曰吳興楚王來救臨汝當此時廟中請祈茍驗十餘日乃見侍衛土偶皆泥濕如汗者是日猷大破苟兒唐書曰高祖義師次靈石縣隨將宋老生屯霍邑以拒義師會霖雨積旬餽運不繼有白衣老父詣軍門曰余為霍山神使謁唐皇帝曰八月雨止路出霍邑東南吾當濟師高祖曰此神不欺趙無恤豈負我哉又曰初薛延陁之將敗也有一客乞食於主人主人引入帳令妻具饌其妻顧視客乃狼頭人也妻告鄰人共視之狼頭人已食主人而去相與逐之止鬱督軍山見二人追者告其故二人曰我則神人也薛延陁當滅我來取之追者懼而退走延陁竟敗於鬱督軍山老子曰神得一以靈神無以靈將恐歇莊子曰藐姑射之山有神人居焉肌膚若冰雪綽約若處子不食五穀吸風飲露乘雲氣御飛龍而遊乎四海之外管子曰桓公北征孤竹未至卑耳之谿十里闟然止瞠然視援弓將射引而未敢發也謂左右曰見是前人乎左右對曰不見也公曰事其不濟乎寡人大惑今者寡人見人長尺而人物具焉冠右祛衣走馬前疾事其不濟乎寡人大惑豈有人若此乎管仲對曰臣聞登山之神有俞兒者長尺而人物具焉霸王之君興而登山之神見且走馬前道也祛衣示前有水也右祛衣示從右方涉也至卑耳之谿有贊水者曰從左方涉其深及冠從右方涉其深至𣍿已涉其大濟桓公坐拜管仲之馬前曰仲父之聖至若此寡人之罪也久矣墨子曰鄭繆公處乎廟有神入門身鳥素服曰帝饗汝明德使錫汝壽十年有九公曰敢問神名曰予為勾芒韓子曰齊人謂齊王曰河伯大神也王不識與之遇乎請使王遇之乃為壇場大水之上而與王立焉有間大魚動因曰此河伯也隋巢子曰昔三苗大亂天命殛之夏后受之大神降而富也司命益年而民不夭四方歸之闢地以王山海經曰豐山有神耕父處之常游清冷之淵出入有光清冷水在西鄂縣山上有祠水赤有光又曰崑崙山神陸吾虎身長九首人面又曰西北海外章尾山有神人面虵身而赤身長千里其眼乃晦其視乃明視為書明為夜雨風是謁能請風雨是燭九陰是謂燭龍詩含神務曰天不是西北無陰陽消息故有龍銜火精照天門中又曰蚩尤作兵犯黃帝乃令應龍攻於冀州之野蚩尤請風伯所從大風雨黃帝乃下天女魃止雨遂殺蚩尤魃不得復上故所居不雨黃庭內景經曰至道不煩決存真泥九百節皆有神髮神蒼華字太元腦神精根字泥丸眼神明上字英玄鼻神玉壟字靈堅耳神空閑字幽田舌神通命字正倫齒神崿鋒字羅千一面之神宗泥丸又曰心神丹元字守靈肺神皓華字虛成肝神龍煙字含明腎神玄冥字育嬰脾神嘗在字魂停膽神龍曜字威明皆在心內運天經晝夜存之自長生太公金匱曰武王都洛邑未成陰寒雨雪十餘日深丈餘甲子旦有五丈夫乘車馬從兩騎止王門外欲謁武王武王將不出見太公曰不可雪深丈餘而車騎無跡恐是聖人太公乃持一器粥出開門而進五車兩騎曰王在內未有出意時天寒故進熱粥以御寒未知長幼從何起兩騎曰先進南海君次東海君次西海君次北海君次河伯雨師粥既畢使者具告太公太公謂武王曰前可見矣五車兩騎四海之神與河伯雨師耳南海之神曰祝融東海之神曰勾芒北海之神曰玄冥西海之神曰蓐收請使謁者各以其名召之武王乃於殿上謁者於殿下門內引祝融進五神皆驚相視而歎祝融拜武王曰天陰乃遠來何以教之皆曰天伐殷立周謹來受命願勑風伯雨師各使奉其職風俗通曰共工之子好遠遊死為祖神又曰秦昭王伐蜀令李冰為守江水有神歲取童女二人為婦主者自出錢百萬以行娉冰曰不須吾自有女到時裝飾其女當以沉江冰徑上神坐舉酒酹曰今得傳九族江君大神當見尊顏相為進酒冰先投杯但澹淡不耗厲聲曰江君相輕當相伐耳拔劍忽然不見良久有蒼牛鬥於岸有頃冰還謂官屬令相助曰南向要中正白是我綬也還復鬥主簿刺殺其北面者江神死後無復患博物志曰太公望為灌壇令文王夢見婦人當道哭問其故曰吾太山之神嫁為西海婦灌壇令當吾道不敢以疾風暴雨過也夢覺召太公三日果疾風暴雨三齊略記曰始皇作石橋欲過海觀日出處于時有神人能驅石下海城陽一山石盡起立嶷嶷東傾狀似相隨而行云石去不速神人輒鞭之皆流血石莫不悉赤至今猶爾又云始皇於海中作石橋海神為之豎柱始皇感其惠求與相見海神荅云我形醜約莫圖我乃從石塘三十里相見左右巧人以腳畫其狀神怒曰帝負我約速去始皇轉馬還馬腳獨立後腳隨崩僅得登岸腳畫者溺於海死王韶之始興記曰㴩水內有一處曰龍口甚神明經過莫敢裾視舡載什物置之不守可經月人及鳥獸無犯者淮地記曰按古嶽瀆經云禹治水止桐柏山乃獲淮渦水神名曰無支祁善應對言語辨淮之淺深源之遠近形若獼猴縮鼻高額青軀白首金目雪牙頸伸百尺力逾九象禹授之庚申遂頸鎖大鐵鼻穿金鈴從淮之陰鎖龜山之足淮水乃安流注于海華陽國志曰周滅後秦孝文王以李冰為蜀守冰能知天文地理謂汶山為天彭門髣若見神遂冰上立祠三所壅江作塴穿郫江以行舟舡又溉灌三郡於是蜀沃野千里號為陸海天下謂之天府也冰又作石犀五頭以厭水精時青衣有深水出蒙山下伏行地中會江至南安觸山崖水脈漂蕩破害舟舡冰乃發卒鑿平崖時水神怒冰乃操刀入水與神鬥迄今蒙福漢武故事曰上祀太畤祭常有光明照長安城如月光上以問東方朔此何神也朔曰此司命之神揔鬼神者也上曰祠之能令益壽乎對曰皇者壽命懸於天司命無能為也郡國志曰陵州仁壽縣有陵井出鹽井有玉女祠初玉女無夫後每年取一少年人擲置井中若不送水即竭又蜀郡西山有大蟒虵吸人上有祠號曰西山神每歲土人莊嚴一女置祠旁以為神妻虵輒吸將不爾即亂傷人周氏平蜀許國公宇文貴為益州總管乃致書為神媒合婚姻擇日設樂送玉女像以配西山自邇之後無復此害魏文帝列異傳曰袁本初時有神出河東號度索君人共立廟兗州蘇士母莊往禱見一人著白布單衣高冠冠似魚頭度索君曰昔慮山共食白李未久已三千年日月易得使人悵然去後度索君曰此南海君也搜神記曰蔣子文者廣陵人也嗜酒好色常自謂己骨青死當為神漢末為秣陵尉逐賊至於鍾山之下賊擊傷額因解綬以縛之有頃遂死及吳先主之初其吏見子文於道乘白馬執白羽侍從如平生文曰我當為此土神也為吾立祠不爾使蟲入耳為災吳主為妖言後果有蟲入人耳皆死醫不能治又云不祠我將有大火是歲數有火災吳主患之封為中都侯加印綬立廟改鍾山為蔣山以表其靈幽明錄曰晉孝武帝於殿北䆫下清暑忽見一人著白夾黃練單衣舉身沾濕自稱華林池中水之神名曰淋涔君也若善見待當相福祐時帝飲已醉取常所佩刀擲之刀空過無礙神忿曰不以佳事垂接當令知所以居少時而暴崩皆呼此靈為禍也列異傳曰費長房能使神後東海君見葛陂君淫其夫人於是房勑繫三年而東海大旱長房至東海見其請雨乃勑葛陂君出之即大雨異苑曰陶侃如廁見數十人悉持大杖有一人單衣平幘自稱後帝云君長者故出相見三載說富貴莫可言侃起逐失所在有大印作公字當有穢處世說曰吳興徐長夙與鮑南海有神明之交欲授以祕術先謂徐宜有約誓徐誓以不仕於是受籙常見八大神在側能知來見往才識日異縣鄉翕然有美談欲用為縣主簿徐心悅之八神一朝不見七人餘一人倨傲不如常徐問其故荅云君違誓不復相為使身一人留衛籙耳徐乃還籙遂退宋玉神女賦曰楚襄王與宋玉遊於雲夢之浦使玉賦高唐之事其夜玉寢與神女遇其狀甚麗玉異之明日以白王王曰其狀若何曰晡夕之後精神恍惚若有所喜見一婦人甚奇異王曰其狀如何玉曰茂矣美矣諸好備矣盛矣麗矣難測究矣不可勝讚其始來也爛若白日初出照屋梁其少進也皎若明月舒其光須臾之間美皃橫生其盛飾也則羅紈綺繢燦爛文章王曰若此試為寡人賦之王符論曰今婦人不修中饋休其蠶織而起學巫祝鼓舞事神以欺誣細人熒惑百姓妻女羸弱疾病之家懷憂憤憤易為恐懼至使奔走便時去離正宅增重禍祟至於死亡而不知巫所敗誤反恨事神之晚陳思王洛神賦曰覩一麗人于巖之畔乃援御者而告之曰爾有覩於彼者乎彼何人斯若此之艷也御者對曰臣聞河洛之神名曰宓妃則君王所見無乃是乎其狀若何臣願聞之曰其形也翩若驚鴻宛若遊龍榮耀秋菊華茂春松髣髴兮若輕雲之蔽月飄揚兮若流風之迴雪遠而望之皎若太陽升朝霞迫而察之灼若芙蓉出綠波余情悅其淑美心振蕩而不怡無良媒以接欣託微波而通辭願誠素之先達解玉珮以要之
