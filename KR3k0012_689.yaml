body:
  text: 服章部五貂蟬徐廣車服雜注曰蟬取清高飲露而不食貂取紫蔚溫潤而光彩不彰灼又曰武官皆惠文冠本趙服也一名武辨大冠凡侍臣加貂蟬愚謂北土寒涼本以貂皮暖附施於冠因遂變而成飾也應劭漢官儀曰侍中金蟬左貂金取堅剛不朽蟬居高食潔貂內徑悍而外溫潤貂蟬不見傳記者因物論義豫覽戰國策乃知昔趙武靈王胡服也其後秦始皇破趙得其冠以賜侍中高祖滅秦亦復如之末侍中皇權參乘問貂璫何法不知其説復問地震云不為災還宮左遷議郎又曰中常侍秦官也漢興或用士人銀璫左貂世祖以來專用官者石貂金璫漢書曰燕王旦郎中侍從著貂羽黃金附蟬又曰劉向上封事曰今王氏一姓乘朱輪華轂者二十三人皆青紫貂蟬充盈幄內又曰王莽篡位更漢黑貂為黃貂又改漢正朔臘日太后命其官屬黑貂至漢家正臘日獨與其左右相對飲酒食肉晉書曰趙王倫篡位同謀者咸超階越次不可勝紀至於奴卒廝役亦加以爵位每朝會貂蟬盈坐故時唁曰貂不足狗尾續又曰劉聰破洛城將壞帝還平陽作赦書以六月十一日破洛群王十二束手軍門貂蟬羽葆以充王府又曰阮孚字遙集為安東府參軍蓬髮飲酒不以王務嬰心後拜散騎常侍性既嗜酒常以金貂換酒為所司所彈帝宥之蕭子顯齊書曰侍中世為親近職魏晉選用稍增華重宋文帝元嘉中王曇首殷景仁等並為侍中情任親密景仁與帝接膝共語貂拂帝帝手拔貂置案上語畢復手插之又曰王儉以朝儀草創衣服制則未有定準議曰漢景六年梁王入朝中郎謁者金貂出入殿門左思魏都賦云藹藹列侍金貂齊光此藩國侍臣有貂明文又曰張敬兒被收敬兒脫冠貂投地曰用此物誤我又曰武陵昭王曄武帝即位歷中書祠部尚書巫覡或言曄有非常之相以此自負武帝聞之故無寵未嘗處方嶽於御座曲宴醉伏地貂抄肉柈帝笑曰汙貂對曰陛下愛其順毛而踈其骨肉帝不悅又曰何戢為侍中上欲轉戢領選問尚書令禇彥回以戢資重欲加散騎常侍彥回曰宋時王球從侍中中書令單作吏部尚書資與戢相似領選職方昔小輕不容頓加常侍聖旨每以蟬冕不宜過多臣與既已左珥若復加戢則八座便有三蟬若帖以驍遊亦不為少乃以戢為吏部尚書加驍騎將軍又曰江淹纍遷祕書監侍中衛尉卿初淹年十三時孤貧嘗採薪以養母曾於樵所得貂蟬一具將鬻以供養其母曰此故汝之休徵也汝才行若此豈長賤耶可留待得侍中著之至是果如母言又曰周盤龍為東平太守求解職見許還為散騎常侍武帝戲之卿著貂蟬何如兜鍪盤龍曰此貂蟬從兜鍪中生耳梁書朱異除中書郎時秋日始拜有飛蟬正集異武冠上時咸謂蟬珥之兆後果如其言又曰王規為晉安王長史王立為太子仍為散騎常侍太子中庶子侍東宮太子賜以所服貂蟬并降令書悅是舉也又曰陸雲善奕棊常夜侍坐武帝冠觸燭火帝笑謂曰燭燒卿貂帝將用為侍中故以此戲之後魏書曰神龜元年詔加女侍中貂蟬同外侍中之飾任城王澄上表諫曰高祖世宗皆有女侍中官未見綴金蟬於象珥極鼲貂於鬚髮江南偽晉穆何后有女尚書而加貂璫此乃衰亂之世妖妄之服請依常儀追還前詔帝從之鄴中記曰石虎征討所得婦女美色萬餘選為女侍中著貂璫直皇后劉楨答魏文帝箋曰貂鼲之尾挂侍臣之幘潘嶽興賦曰登春臺之熙熙珥金貂之熲熲成公綏七唱曰金鐺煌煌貂珥峨峨也孫楚會王侍中座上詩曰顯允君子時惟英邵玄貂左移華蟬增曜簪導釋名曰簪連也所以簪冠於髮也導所以導掠鬢髮使入巾幘之裏也或曰掠鬢以事名之也服虔通俗文曰幘導曰簪史記曰趙平原君使人於春申君趙使欲夸楚為玳瑁簪春申君客三千餘人上客皆玳簪躡珠履趙使大慚也又曰李斯上書曰宛珠之簪傅璣之珥漢書曰上從館陶公主飲上曰願謁主人公主乃下殿去簪珥徒跣頓首謝自引董君董君隨主前伏殿下又劉向列女傳曰周宣薑后齊女也宣王常晏起薑后脫簪珥待罪於永巷也又佞幸傳曰景帝沒入鄧通家財一簪不得著身燕書曰高祖慕容廆晉安北將軍張華雅有人鑒鎮薊撫御詣部高祖童兒往見華甚異之謂高祖曰君後為命世之器匡難濟時者也脫所著幘簪以遺高祖結殷勤而別梁書曰羊侃家妓孫荊玉能反腰帖地銜得席上玉簪後魏書曰胡太后幸闕口溫水登雞頭山自射象牙簪一發中之董巴漢輿服志曰太皇太后入朝服紺上皂下簪以玳瑁為樀長一尺端為華勝上為鳳凰爵以翡翠為毛羽下有白珠垂黃金鑷左右各一橫簪之以安幗結諸簪珥又曰公卿列侯中二千石夫人紺繒幗黃金龍首銜白珠魚須長尺為簪江表傳曰魏文帝遣使於吳求通犀簪群臣曰貢有常典魏所求非法宜勿與孫權曰彼在諒暗之中而所求若此寧可復與言禮備以付使韓詩外傳曰孔子遊少原之野有婦人央澤而哭夫子怪之使弟子問焉婦人對曰向看刈蓍薪而忘簪是以哀孔子曰刈蓍而忘簪有何悲焉婦人曰非傷忘簪吾所悲者不忘故也淮南子曰楚將子發好伎道之士有善為偷者往見子發子發禮之無幾何齊伐楚子發將師當之兵三卻齊師逾強於是善偷則夜出取幘明夕取枕明夕又取簪悉歸之齊師大駭謀曰今夕不去楚軍恐取吾首還師而去之故伎無細能無薄在人君用之也鹽鐵論曰禹理水過門不入當此之時墮簪不顧郭子橫洞冥記曰帝好微行於長安城西夜見一玉螭遊於路董謁曰昔桀媚末嬉於膝上以金簪貫玉螭腹為戲弄今螭腹有金穿痕安知非此耶神仙傳曰左慈能分杯飲酒曹公聞試之慈拔簪以畫杯即斷其間相去數寸幽明録曰孫權時南方遣吏獻簪吏過宮亭湖廬山君廟請福下教求簪吏叩頭曰簪獻天子必乞哀念神云臨入石頭當相還吏遂去達石頭有三尺鯉魚跳入船吏破腹得之吳均續齊諧記曰東海蔣潛嘗至不其縣於林野中見一死人鳥來食之輒見一小兒長三尺許來驅烏乃起去潛乃往看之見有犀導乃拔取衆鳥爭集無復驅者夢書曰簪者為身簪者己之尊也夢著好簪身歡喜班固與竇憲箋曰將軍哀憐賜以玉躬所喜駭玳瑁簪絳單衣以魯縞之質被服鸞鳳之彩飾諸葛恢集詔答恢曰今送一犀導小物耳然是情發於中而寄乎物班固與弟超書令遺仲叔玳瑁黑犀簪西京雜記曰武帝過李夫人就取玉簪搔頭宮中爭效之玉價倍貴漢鐃歌有所思曲曰有所思乃在大海南何以為問遺雙珠玳瑁簪白筆魏略曰明帝時嘗大會殿中御史簪白筆側階而坐上問左右此何官侍中辛毗對曰此謂御史舊簪筆以奏不法今但備官耳徐廣車服雜注曰古者貴賤皆執笏有事則書之常簪筆今之白筆是其遺象帢服虔通俗文曰帛幘曰帢王隱晉書曰陳舒議至尊臨溫公夫人喪議曰今白帢深衣當古弔服至尊臨弔謂深衣而已崔鴻十六國春秋西涼録曰燉煌父老令狐熾夢白頭公衣帢謂熾曰南風動吹長木胡桐椎不中轂言訖忽然不見李歆小字桐椎至期而亡南史曰何胤夢見神女二十許人並衣帢行列在前俱拜床下覺又見之便命營凶具既而疾困不復瘳後魏書曰宋遊道與頓丘李獎一面便善獎曰我年位已高會用弟為佐史令弟北面於我足矣遊道曰不能既而獎為河南尹辟遊道為中正使者相屬以衣帢待之握手歡謔謔潘京別傳曰陳耽初為州主簿司空何次道帢偏岸嘲耽頓帢有所蔽也應聲報曰耽頓以蔽有明府岸以示無宜都山川記曰鹽水上有石室民駱都到室邊採蜜見一仙人裙衫白帢坐見都凝瞻不轉傅子曰漢末魏太祖以天下凶荒資財乏匱擬古皮辨裁縑帛以為帢合乎簡易隨時之義以色別貴賤于今施行可謂軍容非國容也世説曰陸雲好笑著帢映水見影笑不能止高惠文婦與惠文書曰今奉總帢拾枚幍傅子云幍先未有岐荀文若巾觸樹成岐時人慕之因而弗改今通為慶弔之服白紗為之或單或夾初婚冠送餞亦服之後魏書曰太和中文明太后崩齊遣其散騎常侍裴昭明謝峻等弔欲以朝服行事主客不許昭明等執志不移孝文勑尚書李沖選一與識者更與論執沖奏遣成淹昭明言不聽朝服行禮議出何典淹言玄冠不弔童孺共聞昔季孫將行請遭喪之禮千載之下猶共稱之卿方謂議出何典何其異哉昭明言唯齎袴褶不可以弔幸借衣幍以申國命敕送衣幍給昭明等明旦引入皆令文武盡哀後魏書裴植傳曰植母夏侯道遷姊也性甚剛峻於諸子皆如嚴君長成後非衣幍不見小有罪過必束帶伏門經五三日乃引見之督以嚴訓唯少子衍得以常服見之幓頭釋名曰幓鈔也鈔髮使上或謂之陌頭言其從橫陌而前也齊人謂之奄髮使上也禮記玉藻曰士練帶率下辟士以下皆禪不合而繂積如今作澡頭為之東觀漢記曰建武中徵周黨黨著短布單衣穀皮幓頭待見尚書欲令更服黨曰朝廷本以是故徵之安可復更遂以見自陳願守之所志上聽之後漢書曰向栩河內朝歌人少為書生性卓詭不倫恆讀老子狀如學道又似狂生好被髮著絳幓頭吳越春秋曰勾踐與妻入臣吳王衣獨鼻幓頭夫人衣無緣衣裳左開之𥜗以養馬古詩曰羅敷好養蠶採桑城南隅少年見羅敷脫巾著綃頭繁欽定情詩曰何以結相於金薄畫幓頭
