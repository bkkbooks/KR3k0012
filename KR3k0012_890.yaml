body:
  text: 獸部一敘獸國語曰獸三為群爾雅曰四足而毛謂之獸說文曰獸守備者也獸足謂之番毳獸細毛也翰獸豪也薦獸所食草也周禮天官上曰獸人掌罟田獸辨其名物罟網也以網搏所當田之獸冬獻狼夏獻麋春秋獻獸物狼膏聚麋膏散聚則溫散則涼以救時之苦也獸物凡獸皆可獻也及狐狸時田則守罟備獸觸攫及弊田令禽注于虞中鄭司農云弊田謂春火弊夏車弊秋羅弊冬徒弊虞中謂虞人釐所田之野及弊田植虞旗於其中致禽而珥焉獸人主令曰衆得禽者置虞人所立虞旗之中當以給四時社廟之祭珥焉者取左耳以致攻若斬首折馘凡祭祀喪紀賓客共其死獸生獸共其完者凡獸入于臘人當乾之皮毛䈥角入于玉府給作器物凡田獸者掌其政令又天官下曰獸醫掌療獸病療獸瘍畜獸之疾病及瘍療同醫凡療獸病灌而行之以節之以動其氣觀其所發而養之療畜獸必灌行之者為其病狀難知灌以緩之且強其氣也節趨聚之節也氣謂脈氣既行之乃以脈視之以知所病凡療獸瘍灌而劀之以發其惡然後藥之養之食之亦先攻之而後養之凡獸之有病者有瘍者使療之死則計其數以進退之又天官上曰內饔辨腥臊羶香之不可食者牛夜鳴則庮羊泠毛而毳羶犬赤股而躁臊鳥皫色而沙鳴貍豕盲視而交睫腥馬黑脊而般臂螻腥臊羶香可食者是別其不可食者則所謂者皆臭味也泠毛毛長總結也皫失色不澤美也沙斯也交睫腥腥當為星聲之誤也肉有如米者似星般臂臂毛有文鄭司農云庮朽木臭也螻螻蛄臭也杜子春云盲視當為望視又夏宮上曰服不氏掌養猛獸而教擾之猛獸虎豹熊羆之屬擾馴也教習使之馴服王者之教無不服凡祭祀共猛獸謂中膳羞者獸人冬獻狼春秋傳曰熊蹯不熟又秋官下曰穴氏掌攻蟄獸各以其物火之蟄獸熊羆之屬冬藏者也將攻之必先燒其所食之物於穴以誘出之乃可得之者也以時獻其珍異皮革又曰囿人掌囿游之獸囿游囿之離宮小苑觀處也牧百獸備養衆物也今掖庭有鳥獸自熊虎孔雀至於狐狸鳧鶴備祭祀喪紀賓客共其生獸死獸之物又司馬職曰中軍以鼙令鼓鼓人皆三鼓群司馬振鐸車徒皆作遂鼓行徒銜枚而進大獸公之小獸私之大獸公之輸於公也小獸私之以自卑也又曰東北曰幽州畜宜四擾四擾馬牛羊豕西北曰并州畜宜五擾五擾馬牛羊犬豕也孟子曰當堯之時天下猶未平洪水橫流泛濫於天下草木暢茂禽獸繁殖五穀不登禽獸逼人獸蹄鳥跡之道交於中國列子曰東方有國人數解六畜語蓋偏智之所得呂氏春秋曰堯以天下讓舜鯀為諸侯怒於堯曰得天之道者為帝得地之道者為三公我得地之道而不以我為三公乃使猛獸欲以為亂比獸之角能以為城舉其尾能以為旌召之不來倣徉於野以患帝舜於是殛之於羽山又曰故享獸不足以盡獸嗜其脯則幾矣幾近然則王者有嗜乎理義也又曰季秋之月菊有黃華豺祭獸戮禽戮殺也淮南子曰猛獸不群鷙鳥不雙又曰毛犢生應龍應龍生建馬建馬生騏驎騏驎生庶獸凡毛者生於庶獸食草者善走而愚食肉者勇敢而悍又曰鳥排虛而飛獸跖實而走也抱朴子曰稱虞吏者虎也稱當路君者狼也稱令長者老狸稱丈人者兔也稱東王父者麋也稱西王母者鹿也稱三公者馬也稱主人者羊也稱吏者麞也稱人君者猴也稱九卿者猿也稱將軍者老馬也稱姓字者犬也稱陽城公者狐也齊卞彬禽獸決録曰羊性淫而很豬性卑而率狗性險而出皆指斥當時貴勢羊淫很謂呂文顯豬卑率謂朱隆之狗險出謂呂文庶也異苑曰永康舒壽夫與同里獵於遠山群犬吠深茂異而看之見樹下有一老公長可三尺頭鬚蒙然面皺齒落通身黃衣裁能動搖因問為是何人而來在此直云我有三女姿容美兼多伎藝彈琴賦詩間究五典舒夫等共縛束令出女公曰我女仍居深房洞庭之中非自往喚不可得也請解我繩當呼女也獵人猶不置俄而變成一獸黃色四足其形似皋又復如狐頸長三尺頭生一角耳高於頂面故類人舒夫等大懼狼狽放解倏忽失處又曰東陽西寺七佛屋太元中龕下有一物出頭如鹿有法獻道人迫而觀之於是吐沫噴灑氣若雲霧至元嘉十四年四月七日此頭復出尋覔其處亦無孔穴年年有聲殷若小雷猛獸十洲記曰漢武帝時月支國獻猛獸一頭形如犬子似狸而色黃帝怪其羸細禿悴問使者何謂猛獸使者對曰猛獸生崑崙食氣飲露帝使使者令猛發聲忽叫如天雷霹靂之聲諸牛羊馬豕犬之屬皆驚駭以付上林苑徑上虎頭溺虎口去十許步虎輒閉目明日失使者及猛獸所在博物志曰魏武伐踏頓經白狼山逢師子使格之殺傷甚衆忽見一物從林中出如狸上帝車軛上師子將至便跳上其頭師子伏不敢起遂殺之得師子兒還未至四十里雞犬皆無鳴吠也後周書曰楊忠嘗從太祖狩於龍門忠獨當一猛獸左挾其腰右拔其舌太祖壯之北臺謂猛獸為掩于因以字之師子說文曰虓師子也爾雅曰狻猊如虥貓食虎豹郭璞注曰即師子也狻音酸猊音倪虥音奸文淺毛也穆天子傳曰狻猊日走五百里郭璞注曰師子也食虎豹東觀漢記曰陽嘉中疏勒國獻師子封牛師子形似虎正黃有髯耐音而尾端茸毛大如斗司馬彪續漢書曰章和元年安息國遣使獻師子符枝形似麟而無角魏略曰大秦國無盜賊但有師子為害行道不群則不得過也宋書曰宗愨討林邑王范陽邁傾國來逆以具裝被象前後無際愨以為外國有師子威服百獸乃製其形與象相禦象果驚奔衆因此潰亂遂剋林邑蕭子顯齊書曰王敬則晉陵南沙人也母為巫生敬則而胞紫色謂人曰此兒有鼓角相敬則年長兩腋下生乳各長數寸夢騎五色師子後位至太尉尋陽公唐書曰隋大業中有波斯胡人牧駝於俱紛摩地郍之山忽有師子從地踊出人語謂之曰此山西今有三穴穴中大有兵器汝可取之穴中有刀及槊刃甚多石上有文教反叛於是糾合亡命渡恆昌水劫奪商旅其衆漸盛遂割據波斯西境自立為王波斯拂䔉各遣兵討之反為所敗其王姓大倉名礹密模末賦自云有國已三十四年歷三王矣又曰中宗朝大石國使請獻師子姚璹上疏陳曰師子猛獸唯止食肉遠從碎葉以至神都肉既難得極為勞費陛下以百姓為心慮一物有失鷹大不蓄漁獵惣停不殺以闡大慈好生以敷至德凡在翾飛蠢動莫不感荷仁恩豈容自菲薄於身而厚資給於獸求之至理必不然矣疏奏遽停此使十洲記曰聚窟洲在西海中申未地面各方三千里北接崑崙二十六里有師子辟邪鑿齒天鹿長牙銅頭鐵額之獸宋炳師子擊象圖序曰梁伯玉說沙門釋僧吉云嘗從天笁欲向大秦其間忽聞數十里外哮噉之聲驚天怖地頃之但見百獸率走蹌地至絶而四巨象虓焉而至以鼻卷泥自厚塗數尺數噴鼻偶立俄有師子三頭見於山下直搏四象崩血若濫泉巨樹草偃法顯記曰阿育王精舍後立石柱作師子柱內四邊有佛像內外映徹淨若琉璃有外道論師子與沙門爭此住處時沙門理屈於是共誓此處若是沙門住處者當有靈驗作是言已柱頭師子乃大鳴吼見證外道懼怖心服而還國史補曰開元末西域獻師子至安西道中繫於驛樹近井師子哮吼若不自安俄頃風雷大至有龍出井而去虞世南師子賦曰有絶域之神獸因重譯而來擾其為狀也筋骨糾纏殊姿異制闊臆修尾徑毫柔毳鉤瓜踞牙藏鋒畜鋭弭耳宛足伺間借勢暨乎奮鬣舐唇倏來忽往瞋目電曜發聲雷響拉虎吞貔裂犀分象碎隨兕於齦齶齙屈巴蛇於指掌踐籍則林麓摧殘哮呼見江河振蕩服猜心與猛氣遂感德以依仁麒麟說文曰麒麟仁獸也馬身牛尾肉角春秋運斗樞曰機星得則麟生春秋保乾圖曰歲星散為麟爾雅曰麟麕身牛尾一角麕居筠切禮記禮運曰天不愛其道地不愛其寶人不愛其情故麒麟在郊藪詩國風麟之趾曰麟之趾振振公子于嗟麟兮左傳曰魯哀公十四年春西狩於大野叔孫氏之車子鉏商獲麟以為不祥以賜虞人仲尼觀之曰麟也然後取之時所未嘗見故怪之為不祥麟仁獸聖王嘉瑞時無明王出而遇獲仲尼悲周道之不興感嘉瑞無應故因魯春秋而修中興之教絶筆於獲麟一句所感而作故所以為終家語曰叔孫氏之車士曰子鉏商車士將車者也子姓也鉏商名也採薪於大野春秋經哀公十四年西狩獲麟博曰西狩於大野今此日採薪於大野時實自狩鉏商非狩者採薪也而獲麟瑞物時見狩獲故經書西狩獲麟焉折前左足載以歸叔孫以為不祥棄之于郭外傳曰以賜虞人棄之郭外將以賜虞人使人告孔子曰有麇而角者何也孔子往而觀之曰麟也孰為來哉孰為來哉反袂拭面涕泗沾襟叔孫聞之然後取之子貢問曰夫子何泣矣孔子曰麟之至也為明王也出非其時而見害是以傷焉孔叢子曰叔孫氏子鉏商獲麟以為不祥棄之冉有告夫子夫子將觀之泣曰豫之於人猶麟之於獸出而死其道窮矣乃歌曰唐虞世兮麟鳳遊今非其時來何求麟兮麟兮我心憂因此幽憤作春秋焉孝經右契曰孔子夜夢豐沛邦有赤煙氣起顏回子夏侶往觀之驅車到楚西北范氏之廟見芻兒捶麟傷其前左足束薪而覆之孔子曰兒汝來姓為誰兒曰吾姓為赤松子孔子曰汝豈有所見乎吾所見一禽如麇羊頭頭上有角其末有肉方以是西走孔子發薪下麟視孔子而蒙其耳吐三卷書孔子精而讀之春秋演孔圖曰蒼之滅也麟不榮也麟木精也麒麟鬥日無光宋均注曰麟木精木生於水故曰陰木氣好土土黃木青故麟色青黃不榮謂見絏也麟龍少陽精鬥作於地則日月亦將爭於上也尚書中候曰黃帝時麒麟在囿毛詩義疏白麟馬足黃色圓蹄角端有肉音中黃鍾王者至仁則出大戴禮曰毛蟲三百六十而麟為之長禮記曰麟鳳龜龍謂之四靈麟以為畜則獸不狘呼厥反漢書曰終軍從上幸雍獲白麟一角五蹄又得木枝旁出輒復合上異之終軍對曰野獸并角明同本也衆支內附示無外也若此之應殆將有解編髮削左袵襲冠帶要衣裳而蒙至化者焉東觀漢記曰章帝時麟五十一見晉書曰王濬平吳被謗上表曰夫猛獸當塗麒麟恐懼況臣脆弱敢不悚栗何法盛晉中興徵祥說曰麟麇身牛尾狼頭一角黃色馬足也晉書載記曰石虎時郡國前後送蒼麟十六白鹿七季龍命司虞張昌往調之以駕芝蓋列乎充庭之乘又曰呂光入姑臧時麟見金澤縣百獸從之光以為己瑞以孝武太元十四年僣即三河王位三國典略曰徐陵東海郯人梁石右衛率摘之子母嘗夢五色雲化而為鳳集左肩上已而誕陵年數歲家人攜之以候寶志寶志摩其頂曰天上石麒麟也春秋感精符曰麟一角明海內共一主也王者不刳胎不破卵則出於郊又曰王者德化旁流四表則麒麟臻其囿蔡雍月令章句曰凡麟生於火遊於土故循其母致其子五行之精也視明禮修則麟臻孫卿子曰古之王者好生惡殺故麒麟遊其郊野牟子曰昔人不識麟問人答曰麟如麟問者惡之曾見者曰麟麕身牛尾鹿蹄馬背問者霍然而解何法盛徵祥記曰麒麟者毛蟲之長仁獸也牡曰騏牝曰麟牡鳴曰遊聖牝鳴曰歸和夏鳴曰扶幼秋鳴曰養綏說苑曰麒麟麕身牛尾圓頂一角含仁懷義音中律呂行步中規折旋中矩擇土而後踐位平然後處不群居不旅行紛兮其質文也幽間則循循如也西京雜記曰五柞宮前有梧桐樓樓下皆有石騏驎二枚刊其為文字是秦始皇驪山墓上物也頭高一丈三尺東邊者前腳折折處赤如血父老謂其神皆含血屬䈥焉抱朴子曰麒麟壽千歲論衡曰蝗蟲飛至萬里麒麟須獻乃達闕而蝗為災麟為瑞麟四足不能自致人兩足安能自達是以呂望白首而達也又曰儒者說麟為聖王來此言妄也章帝之時騏驥五十一至章帝豈聖人也楚辭曰使騏驎可得羈而繫兮又何以異乎犬羊班固兩都賦曰乃有九真之麟大宛之馬西涼武昭王麒麟頌曰一角圓蹄行中規矩游必擇地翔而後處不入陷穽不罹網罟無德而至為之折股
