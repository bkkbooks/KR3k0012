body:
  text: 圖書上敘圖書尚書序曰古者伏犧氏之王天下也始畫八卦造書契以代結繩之政由是文籍生焉伏犧神農黃帝之書謂之三墳言大道也少昊顓頊高辛唐虞之書謂之五典言常道也至于夏商周之書雖設教不倫雅誥奧義其歸一揆是故歷代寶之以為大訓八卦之說謂之八索求其義也九州之志謂之九丘丘聚也言九州所有土地所生風氣所宜皆聚此書也春秋左氏傳曰楚左史倚相能讀三墳五典八索九丘即謂上世帝王遺書也左氏傳曰晉荀躒如周籍談為介謂籍談曰昔高祖孫伯黶司晉之籍以為大政故曰籍氏汝司典之後何忘之漢書蓺文志曰昔仲尼沒而微言絕七十子終而大義乖故春秋分為五韋昭曰謂左氏羊穀梁鄒氏夾氏也詩分為四韋昭謂毛氏齊魯韓也易有數家之傳戰國從衡真偽分爭諸子之言紛然殽亂至秦患之乃燔滅文章以愚黔首漢興改秦之敗大收篇籍廣開獻書之路迄孝武世書缺簡脫禮壞樂崩上喟然而稱曰朕甚閔焉於是建藏書之策置寫書之官下及諸子傳說皆充祕府又曰古文尚書藏於壁中師古注曰家語云孔騰字子襄畏秦法峻急藏尚書論語孝經於夫子堂壁中而漢記曰孔鮒所藏二說不同未知孰是也又後漢王莽徵陳咸咸遂稱疾篤於是乃歛其家律令文書藏於壁中也後漢書曰吳祐字季英陳留長垣人也父恢為南海太守祐年十二隨父到官恢欲殺青以寫經書祐諫曰大人踰越五嶺越在海濱其俗以陋然舊多珍怪上為國家所疑此書若成則載之兼兩昔馬援以薏茨興謗王陽以衣裳邀名嫌疑之間誠先王之所慎恢乃止撫其首曰吳氏世不乏季子矣魏志曰王脩家不滿斗斛有書數百卷太祖歎曰士不妄有名也蜀志曰向朗字巨達潛心典籍積聚篇卷於時最多也後唐書曰李谿者博學多通文章秀絕家有奇書時號李書樓呂氏春秋曰先識覽桀將亡太史令終古執其圖書而奔于商紂將亡內史向摯載其圖法出奔周穆天子傳曰癸巳至于群玉之山容成氏之所守山阿平無隘四徹中繩言皆平直先王謂之策府言往古帝王以為藏策之府所謂藏之山者莊子曰孔子西藏書於周室藏其所著書於周者子路謀曰由聞周之徵藏史有老聃者徵藏藏名也免而歸居夫子欲藏書則當試焉孔子至老聃之門而老聃不許也博物志曰劉德治淮南王獄得枕中鴻寶祕書及其子向咸共奇之信黃白之術可成謂神仙之道可致卒亦無驗乃以罹罪又曰太古書今見存者有神農山海經山海經或云禹所作素問黃帝作連山歸藏夏所之書周時曰易蔡邕云禮記月令周公所作證法司馬法亦云周公所作論衡曰倉頡作書雨栗鬼哭虛也案圖書文章與書何異鬼神惡書則河出圖何也若不惡為書何忽致怪或作書時會鬼哭雨粟也耳伏滔北征記曰皇天塢北古時陶穴晉時有人逐狐入穴行十里許得書二千餘卷金樓子曰有細書周易尚書周官儀禮禮記毛詩春秋各一部又寫前漢史記三國志晉陽秋莊子老子肘後方離騷等合六百三十四卷悉在一巾箱中書極精細又曰吾今年四十六歲聚書來四十年得書八萬卷也河間之侔漢室頗謂過之也此金樓子自稱也正謬誤劉向別傳曰讎校者一人持本一人讀析若怨家相對故曰讎也左傳曰晉師閏月濟于陰板杜預注云長曆推之此年無閏月疑為門五日五字上與門合也呂氏春秋曰有讀史者晉師三家涉河子夏曰非也是已亥也夫已之與三相近豕之與亥相似至問而問之則曰晉師已亥涉河也漢書蓺文志曰成帝詔光祿大夫劉向言經傳諸子詩賦步兵校尉任宏校兵書太史令尹咸校術數侍醫李柱國校方技每一書已師古曰已畢也向輒條其篇目撮其指意錄而奏之會向卒哀帝復使向子奉車都尉歆卒父業歆於是總群書而奏其七略故有輯略師古曰輯與集同謂諸書之總要有六蓺略師古曰六蓺六經有諸子略有詩賦略有兵書略有術數略有方技略抱朴子曰書三寫以魯為胄以帝為虎劉向七略曰古文或誤以見為典以陶為陰如此類多穎容春秋例曰漢興愽物洽聞者述之士前有司馬遷揚雄劉歆後有鄭眾賈逵班固近即馬融鄭玄其所著作違義正者遷尤多闕略舉一兩事以言之史記不識畢公文王之子而言與周同姓揚雄著法言不識六十四卦云所從來尚矣後漢書曰和熹鄧太后從曹大家受經書兼天文筭數晝省王政夜則讀誦而患其謬誤懼乖典章乃博選諸儒劉珍等及博士議郎四府掾史五十餘人詣東觀讎校傳記蜀志曰向朗字巨達年八十手自校書刊定謬誤也晉書曰鄭默字思元起家秘郎考覈舊文刪省浮穢中書令虞松謂曰而今而後朱紫別矣又曰齊王攸以禮自拘鮮有過事就人借書必手刊其繆然後反之後周書曰元偉世宗初拜師氏中大夫受詔於麟趾殿刊正經籍又曰明帝幼而好學博覽群書善屬文詞彩溫麗及即位集公卿已下有文學者八十餘人於麟趾殿刊校經史及捃採眾書自羲農以來記于魏末敘為世譜凡五百卷云所著文章十卷唐書曰禇元量以內庫舊書自高宗代即藏在中宮漸致遺逸奏請繕寫刊校以弘經籍之道於是上令於東都乾元殿前施架排因大加搜寫廣求天下異本數年間四部充備又曰貞觀中頒五經於天下初太平以經籍去聖久遠文字訛謬詔前中書侍郎顏師古刊正之及成又詔尚書左僕射房玄齡集諸儒討論得失時諸儒習師說舛謬已久皆竊議非之於是異端鋒起師古一一辯荅取晉宋古本以相發明所立授明據或出其意表諸儒皆驚所未聞歎服而去太宗善之
