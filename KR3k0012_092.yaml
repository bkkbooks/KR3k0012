body:
  text: 皇王部十六後漢顯宗孝明皇帝東觀漢記曰孝明皇帝諱陽一名莊世祖之中子也母光烈皇后初讓尊位為貴人故帝十二以皇子立為東海公三歲爵為王幼而聰明叡智容貌壯麗世祖異焉數問以政議應對敏達謀謨甚深溫恭好學敬愛師傅所以承事兄弟親密九族內外周洽世祖愈珍上德以為宜承先序建武十七年十月廢郭皇后陰貴人為皇后以上為皇太子治尚書備師法兼通九經略舉大義愽觀群書以助術學無所不照中平二年二月世祖崩皇后太子即位永平二年二月上初臨辟雍行射禮十月上幸辟雍初行養老禮甲子上幸長安祠高廟遂有事十一陵歷覽館舍邑居舊處會郡縣吏勞賜作樂三年十月上與皇太后幸南陽章陵周觀舊廬召見陰鄧故人上在于道所幸見吏勞賜省事畢步觀行部署不用輦甲夜讀眾書乙夜盡乃寐先五鼓起率常如此五年十月上幸鄴徽趙王會鄴賜錢百萬八年十月上臨辟雍養三老五更禮異上手書赦令尚書仆射待節詔三公十年閏月行幸南陽祠章陵以日至復祠於舊宅禮畢召校官弟子作雅樂奏鹿鳴上自御塤篪和之以娛嘉賓至頃勞饗三老官屬是時天下安平人無徭役歲比登稔百姓殷富粟斛三十牛被野十三年二月上耕籍田畢賜觀者食有一諸生前舉手曰善哉文王之遇太公也上書板曰生非大公子亦非文王也十五年二月東巡狩三月幸孔子宅祠孔子及七十子御講堂命太子諸王說經幸東平王宮上憐廣陵侯兄弟賜以𦙀御之物又聖皇子輿馬悉賦予之十七年春甘露仍降樹枝內附芝生前殿神雀五色翔集京師是夜上夢見先帝太后夢中喜覺因悲不能寐明旦上陵百官胡客悉會太常丞上言陵樹華有甘露上令百官採甘露受賜畢罷上從席前伏御床視太后鏡奩音廉中物流涕勑易奩中脂澤粧具自帝即位尊奉建武之政有加而無損初世祖閔傷前世權臣太盛外戚豫政漢家中興唯宣帝取法至於建武朝無權臣外族陰郭之家不過九卿親屬勢位不能及許史王氏之半至永平后妃外家貴者裁家一之備列將校尉在兵馬官充奉宿衛闔門而已無封侯豫朝政者自皇子之封皆減舊制諸王皆當略與楚淮陽相比什減三四曰我子不當與先帝子等又國遠而小於王善節約謙儉如此八月帝崩于東宮前殿在位十八年時年四十八謚曰孝明皇帝葬顯節陵十二月有司奏上尊號曰顯宗廟與世宗廟同日而祠祫祭於世祖之堂共進武德之舞如孝文皇帝祫祭高廟故事孝明皇帝尤垂意於經學即位刪定擬議稽合圖讖封師太常桓榮為關內侯親自制作五行章句每饗射禮畢正坐自講諸儒並聽四方欣欣是時學者尤盛冠帶搢紳遊辟雍而觀化者以億計又曰建武四年五月甲申皇子陽生豐下銳上顏赤色有似於堯上曰赤色名之曰陽至十三年通春秋上循其頭曰吳季子陽對曰愚戇無比及阿乳母以問師傅曰少推誠對師傅無以易其辭華嶠後漢書明帝性褊察嘗以事怒郎樂崧以杖撞崧崧走入床下上怒甚疾言曰郎出郎出崧曰天子穆穆諸侯皇皇未聞人君自起撞郎上乃赦之又曰世祖既以吏事自嬰帝尤任文法總攬威柄權不借下值天下初定四民樂業戶口衣食滋植斷獄號居前世之十二中興已來追蹝宣帝夫以鍾離意之廉法諫諍懇切以寬和為首以此推之斯亦難以德言者也薛瑩漢記贊曰明帝自在儲宮而聽允之德著矣及臨萬機約身率禮恭奉遺業一以貫之雖夏啟周成繼體持統無以加焉是以海內乂安四夷賓服斷獄希少有治平之風號曰顯宗不亦宜乎潛夫論曰明帝時公車以反支日不受章奏帝聞而怪曰民廢農遠來詣闕而復拘以禁忌豈為政之意乎於是遂蠲其制後漢書曰明帝遵奉建武制度無違者後宮之家不得封侯與政館陶公主光武之女為子求郎不許而賜錢千萬謂群臣曰郎官上應列宿出宰百里非其人則人受其殃是以難之故吏稱其官民安其業遠近肅服戶口滋殖焉後漢書曰帝善刑理法令分明日晏坐朝幽枉必達外內無倖曲之私在上無矜大之色斷獄得情號居前世之十二故後之言事者莫不先建武永平之政然而鍾離意宋均之徒常以察慧為言夫豈引人之度未優乎肅宗孝章皇帝東觀漢記曰孝章皇帝諱烜孝明皇帝太子永平三年二月以皇子立為太子年四歲幼而聰達才敏多識世事動容進正聖表有異壯而仁明謙恕溫慈惠和寬裕廣愽親愛九族矜嚴方厲威而不猛既志於學始治尚書遂兼五經周覽古今無所不觀於是上敬重之每事諮焉水平十八年孝明皇帝崩帝即位范曄後漢書曰章帝建初元年詔有司明選舉進柔良退貪猾順時令理冤獄又詔以上林池籞田賦與貧人四年詔曰蓋三代遵人教學為本漢承暴秦褒顯儒術建立五經為置愽士其後學者精進雖曰承師亦別名家孝宣帝以為去聖久遠學不猒愽故遂立大小夏候尚書又立京氏易至建武中復置嚴氏顏氏春秋大小戴禮愽士此皆所以扶進微學廣道藝也孔子曰愽學而篤志切問而近思仁在其中矣於戲其勉哉於是下太常將大夫愽士議郎郎官及諸儒會白虎觀講議五經同異使五官中郎魏應承制問侍中淳于恭奏帝親稱制臨決如孝宣甘露石渠故事作白虎議奏今白虎通也元和二年正月詔曰人有棄子者復勿筭三歲令諸懷妊者賜胎養穀三斛復其夫勿筭一歲著以為令又詔三公方春生養萬物莩甲宜助萌陽以育時物其令有司罪非殊死勿案驗章和元年八月南巡狩幸梁祠沛高原廟豐枌榆社二年正月帝崩於章德前殿在位十二年時年三十一遺詔無起寢廟一如先帝法制葬敬陵廟曰肅宗論曰魏文稱明帝察察章帝長者帝素知人猒明帝苛切事從寬厚除慘獄之科著胎養之令奉承明德太后盡心孝道割裂名都以崇建周親平傜簡賦而人賴其慶又體之以忠貞文之以禮樂藩輔克諧群后德讓謂之長者不亦宜乎東觀漢記序曰孝乎惟孝友于兄弟聖之至要也乾乾夕惕寅畏皇天帝王之上行也明德慎罰湯文所務也密靜天下容於小大高宗之極致也肅宗兼茲四德以繼祖考臣下百僚力誦聖德紀述明詔不能辯章豈敢空言增廣以累日月之光袁山松後漢書曰孝章皇帝弘裕有餘明斷不足閨房讒惑外戚檀寵惜乎若明章二主損有餘而補不足則古之賢君矣薛瑩漢記贊曰章帝以繼世承平天下無事敬奉神明友于兄弟息省徭賦賦緌靜兆民除苛法蠲禁錮抑有仁賢之風矣是以陰陽協和而百姓安樂眾瑞並集不可勝載考之圖籍有微云爾帝王世紀曰孝章皇帝以中元三年生於京師其母姓祕不出號其墓日長信家三輔決錄注曰何敞字文高為汝南太守章帝南巡過郡有刻鏤屏風為帝張設詔命侍中黃香銘之曰古典務農雕鏤傷民忠在竭節義在脩身敞懼禮賢命士改脩德化穆宗孝和皇帝東觀漢記曰孝和皇帝諱肇章帝之中子也母曰梁貴人早薨上自歧嶷至於總角孝順聰明寬和篤仁孝章猶是深珍之以為宜承天位年四歲以皇子立為太子初治尚書遂兼覽書傅好古樂道無所不照章和二年春二月章帝崩太子即位永元三年春正月帝加元服四年六月大將軍竇憲潛圖弒逆幸北宮詔收捕憲黨使謁者收憲大將軍印綬遣憲及弟篤景就國到皆自殺五年正月宗祀五帝於明堂遂登靈臺望雲物大赦天下自京師離宮果園上林廣成囿悉以假貧人恣得收捕不收其稅十二年春正月上日以五經義異書傅意殊親幸東觀覽書林閱篇籍朝無寵族政如砥矢惠澤沾濡鴻恩茂篤外憂庶績內勤經藝自左右近臣皆誦詩書德教在寬仁恕並洽是以黎元寧康方國協和真符瑞應八十餘品帝讓而不宣故靡得而記元興元年十二月帝崩于章德前殿在位十七年時年二十七葬順陵廟曰穆宗東觀漢記序曰穆宗之嗣世正身履道以奉大業賓禮耆艾動式舊典宮無嬪嬙鄭衛之讌囿無槃樂遊畋之豫躬履玄德虛靜自損是以屢獲豐年遠近承風云爾後漢書曰自竇憲誅後帝躬親萬機每有災異輒延問公卿極言得失舊南海獻龍眼荔枝十里一置五里一堠奔騰險阻死者相繼時臨武長汝南唐羌縣接南海乃上書陳狀帝下詔曰遠國珍羞本以薦奉宗廟茍有傷害豈愛人之本其勑令太官勿復受獻由是遂省續漢書曰孝和年十四能折外戚驕橫之權即昭帝斃上官之類矣朝政遂一民安職業懃恤本務苑囿希幸遠夷稽服西域開泰郡國言符瑞八十餘品咸懼虛妄抑而不宣云爾范曄後漢書曰自中興以後逮于永元雖頗有弛張而俱存不擾是以齊民歲增闢土世廣偏師出塞則漢北地空都護西指則通驛四方豈其道遠三代術長前世將服叛懷來自有數也孝殤皇帝東觀漢記曰孝殤皇帝諱隆和帝之少子也和帝皇子數十生者輒夭故殤帝養於民元興元年十二月和帝崩是日倉卒殤帝時生百餘日乃立以為皇太子其夜即位尊皇后鄧氏為皇太后帝在繈褓太后臨朝延平元年八月帝崩于崇德前殿年二歲葬康陵又曰孝殤繈褓承統寢疾不豫天命早崩國祚中絕社禝無主天下敖然賴皇太后臨朝孔子稱有婦人焉信哉恭宗孝安皇帝東觀漢記曰孝安皇帝諱祐清河孝王弟二子也少聰明敏達慈仁惠和寬容愽愛好樂施予自在邸弟數有神光赤虵嘉應照耀於室內盤紆殿屋床第之間孝王常異之年十歲善史書嘉經籍和帝甚喜重焉號曰諸生數燕見在禁中特加賞賜下及玩弄之物諸王子莫得與比殤帝即位鄧后臨朝以帝幼小詔留於清河邸欲為儲副殤帝崩以王青蓋迎齊中殿中拜為長安侯乃即帝位謙讓恪懃孜孜經學志在供養委政長樂宮永初元年十一月上始講尚書躭於典藝二年春正月帝加元服延光四年三月帝崩于葉縣在位十九年時年三十二御車所止飲食百官鼓漏起居車騎鹵簿如故及還宮皇后與兄顯中常侍江京樊豐等共興偽詐不欲令群臣知上道崩欲偽道得病遣司徒等分詣郊廟社稷告天請命誣罔靈秪以亡為存其夕發喪群寮百姓如喪考妣塞外蠻夷致祭涕泣葬恭陵范曄後漢書論曰孝安皇帝雖稱尊享御而權歸鄧氏至損徹膳服克念治道然令自房帷威不逮遠始失根統歸成陵弊遂復計金授官移民逃寇推咎台衡以荅天眚詩云哲婦亦惟家之索矣薛瑩漢書贊曰安帝之初委政太后十有餘年及親萬機佞邪始進閹官用事寵加私愛阿母王聖勢傾朝廷遂樹姦黨搖動儲副山陵未乾蕭牆作難兵交禁省社稷殆危典略曰安帝永初元年以災故免司空尹勤凡以災寇故輒免三公多以卿為之或再三退而還復其故桓靈又甚自此始也少帝北鄉侯續漢書曰安帝崩太子前廢後無餘子皇后與兄閻顯謀以北鄉侯犢為帝嗣三月立北鄉侯皇太后臨朝十月辛亥北鄉侯薨顯及江京等徵濟北河間王子欲以為嗣中黃門孫程王康等十九人共討京等迎立濟陰王皇德傳曰安帝崩北鄉侯即尊位十月北鄉侯薨以王禮葬未即帝位不成君故以王禮葬
