body:
  text: 地部二十七涇書禹貢曰涇屬渭汭屬逮也水北曰汭言治水注入渭詩曰涇以渭濁湜湜其沚傳曰諸侯之大夫從晉侯伐秦以報櫟之役濟涇而次秦人毒涇上流師人多死以毒藥投涇水之上流晉師飲之多死國語曰恭王遊於涇水上密康公從三女奔之其母曰必致之於王夫獸三為群女三為粲粲美之物汝何德以堪之康公弗許一年恭王滅密史記曰韓聞秦之好興事乃使水工鄭國間說秦令鑿涇水自中山西抵瓠口為渠以溉田又曰秦二世夢白虎嚙左驂殺之卜涇為崇二世乃齊望夷宮而欲祀之漢書曰涇雖不在大川之祀以近咸陽得比大川之祀又曰太始二年趙中大夫白公鄭德曰白姓公爵時人多相謂為公復秦穿渠因名白渠民得其饒歌之曰田于河所池陽谷口鄭國在前白公起後舉鍾為雲決渠為雨涇水一石其泥數斗且溉且糞如淳曰水停淤可以當糞長我禾黍衣食京師億萬之口益部耆舊傳漢武祀甘泉至涇橋有女子浴於涇水乳長七尺怪遣問之女曰帝後第七車知我時侍中張寬在第七車對曰天星主祭祀齋戒不潔則女人見水經注曰涇水導源安定朝郍縣西笄頭山秦始皇巡地西出笄頭山即是山也蓋大隴之異名渭詩曰我送舅氏于渭之陽史記曰秦武王三年渭水赤三日昭王十四年又赤三日洪範五行傳曰赤者火色蓋亦以火沴水也渭水秦大川也陰陽亂秦用嚴刑敗亂之象史記曰西伯獵遇太公渭之陽與語大悅漢書曰武帝元光六年春穿漕渠通渭山海經曰渭水出鳥鼠同穴山東注河入華陰北鳥鼠同穴山今在隴西首陽縣渭水出其東經南安天水略陽扶風始平京兆至弘農華陰縣入河也三輔黃圖曰始皇兼天下都咸陽渭水貫都以象天漢水經注曰渭水中舊有忖留神象此神嘗與魯班語班令其人出忖留曰我貌醜卿善圖物容我不能出班於是拱手與言曰出頭見我忖留乃出首班於是以腳畫地忖留覺之便還沒水故置其象於水中唯背以上立水上三輔決錄曰項中山飲馬渭水日與三錢以償之列子曰夸父逐日渴飲渭水不足乃渴死淮南子曰渭水多力宜黍霸水經注曰霸者水上地名也水東合滻水過白鹿原至秦虎圈北入渭漢書地理志曰霸水出藍田谷古曰滋水秦穆公更名霸水以彰霸功漢書曰漢王元年十月至霸上秦王子嬰降滻水經注曰滻水出京兆藍田谷北入于霸地理志曰滻水出南陵縣之藍田谷西北流與一水合水出西南莽谷東北流注滻水水又北歷藍田川北流注于霸水又云滻水北至霸陵入霸水也兩京記曰西京東市平準署東隅有放生池分滻水渠自道政坊東城西流注之俗號海地又曰滻水西岸有阪舊名滻阪隋文帝惡阪之名改名長樂坡豐漢書地理志曰漆沮既從豐水逌同顏師古注曰豐水出鄠之南山言沮水既從入渭豐水亦同來也水經注曰渭水東興豐水會短陰山無他高山異蠻唯原阜石墽而已水上舊有便門橋毛詩文王有聲曰豐水有芑武王豈不仕貽厥孫謀以燕翼子文子曰老子云豐水之深十仞而不受塵垢金鐵在中形見於外鎬水經注曰鎬水上承鎬池於昆明池北周武王之所都也故詩云考卜維王宅是鎬京維龜正之武王承之鎬水又北流與滮池合又北經清冷臺西逕慈石門注于渭鄭玄曰豐鎬之間水北流也澇說文曰澇水出扶風鄠北入渭山海經曰牛首之山澇水出焉西注於潏水多飛魚潏字林曰潏水出杜陵縣水經注曰漓水上承皇子陂水逕漸臺東入渭亦名沈水又名高都水漢王氏五侯大治池宅引高都水入長安城故百姓歌之曰五侯初起曲陽最怒決壞高都竟連五杜土山漸臺象西白虎是也伊水經曰伊水出南陽縣西荀渠山左傳僖中曰初平王東遷也辛有適伊川杜預注曰辛有周大夫也見被髮而祭於野者曰不及百年此其戎乎山海經曰獨蘇之山伊水出焉東流注於洛今伊水出上洛廬氏縣熊耳山東女至河南洛陽縣入洛戴延之西征記曰伊水上源經新城陸渾二縣男女無少長皆病癭俗云水土所致伊水不可飲也呂氏春秋曰有莘氏女子採桑得嬰兒桑中其母居伊水上故命之曰伊尹伊尹母化為空桑洛水經注曰洛水出京兆上洛縣護舉山地理志洛水出冢嶺山易上繫曰洛出書聖人則之易乾鑿度曰王者盛德之應洛水先溫九日乃寒五日變為五色又曰帝王將起河洛龍見察其首黑者人正白者地正赤者天尚書禹貢曰導洛自熊耳在宜陽之西也東北會于澗瀍會于河南城南又東會于伊合于洛陽之南又東北入于河合于鞏之東也尚書中候曰武王沉璧于河禮畢退至日旰榮光幕河青雲浮洛毛詩曰瞻彼洛矣維水泱泱春秋說題辭曰洛出熊耳山雒之為言繹也繹其燿也宋均注曰水光燿也國語曰靈王二十二年穀洛鬥將毀宮室王欲壅之太子晉曰夫山土之聚也藪物之歸也川氣之導也澤水之鍾也夫水聚於高歸於下今吾執政無乃實有所僻而滑夫二川之神王卒壅之王室大亂又曰伊洛竭而夏亡河竭而啇亡漢書曰武帝穿渠引洛水岸遂崩乃鑿井深四十餘丈往往為井井下相通行水謝承後漢書曰沛國陳宣建武十年雒水出造津城門或欲築塞之宣諫曰昔王尊正身金堤水退況聖主耶言未絕而水去水經注曰昔黃帝之時天大霧三日帝遊洛水之上見大魚殺五牲以醮之天乃甚雨七日七夜魚流始得圖書魏略曰漢火行忌水故洛去水而加焉山海經云秦買之山洛水出焉東注於河其中有藻王述征記曰洛水底有礜石故上無水瀍水經曰瀍水出河南穀城縣北出東與千金渠合又東過偃師入于洛澗水經曰澗水出新安縣南白石山東南入于洛又曰三輔決錄注云馬氏兄弟五人共居澗穀二水之交作五門客舍因舍以為名今在河南西四十里以山海經推校里數不殊仲治所記水會尚有故居處斯則澗水也即周書所謂我乃卜澗水東言是水也穀水經曰穀水出弘農澠池縣南嶓冢林穀陽谷也山海經曰愽山之西有林焉曰嶓冢穀水出焉東流注于洛其中多㻒玉今穀水出于崤東馬頭山穀陽谷東北流歷澠池川韋昭國語注曰洛水在城南穀水在王城北東入于瀍靈王時穀水盛出於王城西而南流合於洛兩水相格有似于鬥而毀王城西南也漢沔尚書禹貢曰江漢朝宗于海也詩曰漢廣德廣所及也文王之化被于南國美化行乎江漢之域又曰滔滔江漢南國之紀又曰南有喬木不可休息漢有游女不可求思左傳曰蔡昭侯為兩珮與兩裘以如楚獻一珮一裘於昭王子常欲之不與三年止之蔡侯歸及漢執玉而沉曰余所濟漢而南者有若大川又曰楚國方域以為城漢水以為池又曰吳師伐郢楚子常濟漢而陣自小別至于大別蜀志少府王謀等上言前襄陽男子張嘉王休獻玉璽璽潛漢水於深淵暉景燭曜璽光徹天孫巖宋書曰漢中城固縣漢水岸際有異聲如雷俄頃岸崩有銅鐘十二出自潛壤體制既精扣之清響韓詩曰鄭交甫過漢皋遇二女妖服珮兩珠交甫與之言曰願請子之珮二女解珮與交甫而懷之去十步探之則亡矣廻顧二女亦即亡矣水經注及山海經注云漢水出隴坻道縣嶓冢山初名漾水東流至武都沮縣始為漢水東南至葭萌與羗水合至江夏安陸縣名沔水故有漢沔水之名即周昭王溺於此處又東至竟陵合滄浪之水即屈原遇漁父處又東過三澨水觸大別山南而入江也庾仲雍漢水記曰漢水出廣漢漾水出隴西東流至武都而與漢水合沔水出武都沮縣爾與漢水相合又東為滄浪之水過三澨至于大別南入于江東匯澤為彭蠡東為北江入于海是也匯廻也音胡賄反言漢水合大江廻流入彭蠡澤東北至南徐州名為北江而入海又曰沔水東經萬山北山下有潭中有杜元凱碑元凱好尚後名作兩碑並述己功一碑立峴山一碑沉此潭中曰千載之後何知不深谷為陵也又曰漢東經西城縣故城為鱣湍洪波漭盪漰浪雲頹古者舊言有鱣魚奮鰭望濤直上至此曝鰓因以名鱣湍焉又曰漢水經西城縣故城南又東為龍泉泉上有胡鼻山石類胡人鼻故也下臨龍井渚泉深數丈盛弘之荊州記曰沔水隈潭極深先有蛟為害鄧遐為襄陽太守拔劍入水蛟繞其足遐自揮劍截蛟數叚流血丹水勇冠當時於後遂無蛟患又曰荊蘊玉以潤其區漢含珠而清其域梁州記曰漢水發源隴西氐道縣之嶓冢山東至于夏口合江綿帶四州之城經塗五千餘里謂之沔水水經曰沔水出武都沮縣東狼谷中注曰一名沮水以其初出沮洳然也淮南子曰漢水重安而宜竹箭
