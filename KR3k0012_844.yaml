body:
  text: 飲食部一酒上世本曰儀狄始作酒醪變五味少康作秫酒戰國策曰帝女儀狄作酒而進於禹春秋緯命曰凡黍為酒陽據陰乃能動故以麴釀黍為酒麴陰也是先漬麴黍後入故曰陽相感皆據陰也相得而沸是其動也凡物陰陽相感非唯作酒釋名曰酒酉也釀之米麴酉澤久而味美也亦言踧也能否皆強相踧持也又入口咽之皆踧其面也説文曰酒就也所以就人性之善惡也一曰造也吉凶所起造也又曰酴音途酒母也醴酒一宿熟也醪汁滓酒也酎三重之酒也醨薄酒也醑莤酒也酒經曰空乘穢飯醞以稷麥以成醇醪酒之始也烏挴女䴷胡板反甜醹音乳九殳澄清百品酒之終也周禮天官下曰酒正掌酒之政令以式法授酒材辨五齊之名一曰泛齊二曰醴齊三曰盎齊四曰醍齊五曰沉齊以節度作之故以齊為名泛者成而滓浮泛泛然如今宜成醪矣醴猶體也成而汁滓相將如今甜酒矣盎猶翁也成而色翁翁然蔥白色如今酇白矣醍者成而紅赤如今下酒矣沉者成而滓沉如今造清酒矣辨三酒之物一曰事酒二曰昔酒三曰清酒事酒如今之醳酒也昔酒久酒今之舊醳也清酒今之冬釀夏成者也禮記月令孟冬曰是月也乃命有司秫稻必齊麴孽必時湛熾必潔水泉必香陶器必良火齊必得兼用六物酒官監之無有差貣有司謂煮酒之官六物者一曰秫稻二曰麴蘗三曰湛熾四曰水泉五曰陶器六曰火齊命酒官監之無有差貣謂失誤善惡又曲禮曰侍飲於長者酒進則起進受於尊所降席拜受敬也長者辭少者反席而飲長者舉未釂少者不敢飲又檀弓曰知悼子卒未葬悼子晉大夫荀盈平公飲酒師曠李調侍鼓鍾樂作也杜蕢自外來聞鍾聲曰安在曰在寢燕於寢杜蕢入寢歷階而升酌曰曠飲斯又酌曰調飲斯又酌堂上北面坐飲之降趍而出三酌皆罰平公呼而進之曰蕢曩者爾心或開豫是以不與爾言謂始來入時開謂諫爭有所發爾飲曠何也曰子卯不樂紂以甲子死桀以乙卯亡王者謂之疾日不以舉樂為吉事所以自戒懼知悼子在堂斯其為子卯也大矣言大臣喪重於疾日也曠也大師也不以詔是以飲之也詔告也師典奏樂爾飲調何也曰調也君之褻臣也為一飲一食忘君之疾是以飲之也言調貪酒食褻嬖也近臣亦當規君疾憂爾飲何也曰蕢匱也宰夫也非刀匕是共又敢與知防是以飲之也防禁放諡又玉藻曰君子之飲酒也受一爵而色灑如也灑如肅敬貌二爵而言言斯言言和敬貌禮已三爵而油油油油説敬貌以退禮飲過三爵則敬殺可以去矣又樂記曰夫豢豕為酒非以為禍也而獄訟益繁則酒之流生禍也以穀食犬豕曰豢為作也言豢豕作酒本以饗祀養賢而小人飲之善醉以致獄訟是故先王因為酒禮一獻之禮賓主百拜終日飲酒而不得醉焉此先王之所以備酒禍也一獻士飲酒之百拜以喻多禮又坊記曰子云觴酒豆肉讓而受惡民猶犯齒左傳莊公二十二年曰陳公子完奔齊桓公使為正卿辭使為工正飲桓公酒樂公曰以火繼之辭曰臣卜其晝未卜其夜不敢君子曰酒以成禮不繼以淫義也夜飲為淫樂也以君成禮弗納於淫仁也又宣公上曰晉侯飲趙盾酒伏甲將攻之其右提彌明知之右車右趍曰臣侍君宴過三爵非禮也遂扶以下又成公下曰鄢陵之戰楚王召子反謀穀陽堅獻飲於子反子反醉而不能見穀陽子反內豎王曰天敗楚也夫余不可以待乃宵遁又襄公二十三年曰季武子無適子公彌長而愛悼子欲立之訪於臧紇曰飲我酒吾為子立之季氏飲大夫酒臧紇為客為上賓既獻已獻酒臧孫命北面重席新樽潔之酒潔既新復潔召悼子降逆之大夫皆起臧孫下迎悼子及旅而召公鉏獻酬禮畢而通行為旅使與之齒季孫失色又昭公十二年曰晉侯以齊侯宴中行穆子相穆子茍吳投壺晉侯先穆子曰有酒如淮有肉如坻淮水名坻山名寡君中此為諸侯師中之齊侯舉矢曰有酒如澠有肉如陵寡人中此與君代興代更也亦中之又哀公下曰齊子我夕夕視事陳逆殺人逢之遂執以入陳氐方睦使疾而遺之潘沐備酒肉焉使詐病內潘沐并得酒肉潘沐可以沐頭饗守囚者醉而殺之而逃又曰衛侯占夢嬖人以能占夢見愛求酒於大叔僖子僖子大叔遺不得與卜人比而告曰君有大臣在西南隅弗去懼害託占卜夢而言乃逐大叔遺遺奔晉毛詩國風曰十月穫稻為此春酒以介眉壽又小雅魚藻曰王在在鎬豈樂飲酒箋云豈亦樂而天下平安萬物得其姓武王何所處乎處於鎬京樂八音之樂與群臣飲酒而已又小雅曰伐木許許釃酒有藇以筐曰釃以數曰湑藇美貌又曰有酒湑我無酒酤我湑莤之也酤一宿酒也箋云酤買也此族人東王之思也王有酒則沛莤之王無酒酤買之要欲厚於族人尚書酒誥曰乃穆考文王肇國在西土厥誥毖庶邦庶士越少正御事朝夕曰祀茲酒文王告衆國衆土朝夕勑之唯祭祀用此酒不常飲惟天降命肇我民惟元祀天降威我民用大亂喪德亦罔非酒惟行越小大邦用喪亦罔非酒惟辜文王誥教小子有正有事無彝酒越庶國飲惟祀德將無醉自成湯咸至于帝乙成王畏相惟御事厥棐有恭不敢自暇自逸矧曰其敢崇飲崇聚也自暇自逸猶不敢况敢聚會飲酒乎明無厥或誥曰群飲汝勿佚盡執拘以歸于周豫其殺盡執拘群飲酒者以歸於京師我其擇罪重者而殺之論語曰惟酒無量不及亂沽酒市脯不食禮記外傳曰五齊三酒皆供祭祀之用五齊尊而三酒卑所以明齊者酒人和合之分劑之名也一曰泛齊酒之初成滓有泛者泛泛然俗為白醪二曰醴齊醴體也汁滓未相同一體也今之甜酒也三曰盎齊一名盞酒狀如蔥白色今之白醝酒也四曰醍齊色在白赤之間五曰況齊一名澄齊醍之與沉三酒與上君夫人及賓長廟中酌獻尸相酬酢之用三酒者列於堂下臣下相酌酬酢之用一曰事酒一名醳酒新成者酌飲有事謂廟中助祭親事者也廟中有事者為榮二曰昔酒久成而色白謂舊醳之酒與無事飲之三曰清酒冬釀夏成味醇厚史記曰秦繆公亡善馬歧下野人共得而食之者三百餘人逐得欲法之公曰君子不以畜害人乃赦之又曰高帝除秦苛法為簡易群臣飲酒爭功高帝患之叔孫通知上益厭也説上願與諸弟子共起朝儀漢七年長樂宮成群臣皆朝十月復置法酒諸臣侍坐殿上皆伏以尊卑次起上壽觴九行謁者言罷酒御史執法舉不如儀者輒引去竟朝置酒無敢失禮者高帝乃曰吾今日知為皇帝之貴也又曰沛公先入關屯霸上項羽至沛公左司馬曹無傷使人言於羽曰沛公欲王關中羽大怒欲擊之沛公因項伯見羽羽留沛公飲項王項伯東向坐亞父南向坐亞父者范增也沛公北向坐張良西向侍增數目項王舉所佩玉玦示之者三項王默然項莊入以劍舞欲因擊沛公張良至軍門見樊噲曰甚急今項莊拔劍舞其意常在沛公也噲曰此迫矣臣請入與之同命噲即帶劍擁盾入軍門交戟之衛士欲止不內噲側其盾以撞衛士仆地噲遂披帷西向而立瞋目視項王項王按劍而跽曰客何為者良曰沛公參乘樊噲也王曰壯士賜之巵酒則與斗巵酒樊噲飲之王曰賜之彘肩則有一生彘肩噲覆盾於地拔劍切而啖之王曰壯士能復飲乎曰臣死且不避巵酒安足辭又曰曹參代蕭何為相一遵何約束日夜飲淳酒卿大夫及賓客見參不事事皆欲言至者參輒飲醉之終莫得言丞相舍後園近吏舍吏舍日飲歌呼從吏惡之無如之何乃請參遊園中聞吏醉歌呼從吏請按之參乃取酒張坐飲亦歌呼與相參又曰高祖過沛置酒自擊築為歌使沛子弟佐酒又曰高后與諸呂劉氏大臣宴飲令朱虛侯章為酒吏章曰臣將種也請以軍法行酒后可之酒酣諸呂有一人醉亡酒章追斬之后與左右皆大驚也漢書曰酒者天之美祿帝王所以頤養天下享祀祈福扶衰養病百福之會又曰百末旨酒百華之末酒也布蘭生芬芳布列老蘭之生也又曰于定國飲酒至石不亂益精明又曰陳遵字孟公每大飲賓客閉門取車轄投井中雖有急終不得去又曰張讓專權孟他以蒲桃酒一斗遺讓拜他為涼州刺史後漢書曰光武詔馮異歸家上冢使太中大夫齎牛酒令二百里內太守都尉已下及宗族會焉又曰寇恂數與鄧禹謀議禹奇之因奉牛酒交歡又曰魯恭兄弟俱為諸儒所稱學士爭歸之太尉趙喜慕其志每歲時遣子問以酒糧皆辭不受問遺也又曰汝南太守歐陽歙請郅惲為功曹汝南舊俗十月饗會百里內縣皆齎牛酒到府宴飲時臨饗禮訖歙教曰西部督郵縣延天資忠貞稟性公方摧破姦凶不嚴而理今與衆儒共論延功顯之于朝太守敬嘉厥休牛酒養德主簿讀書教戶曹引延受賜惲於下坐愀然前曰司正舉觥愀變色貌也司正主禮儀者觥罰爵也以君之罪告謝于天案延資性貪邪外方內圓言延外示方直而實柔弱也朋黨搆姦罔上害人所在荒亂怨慝並在明府以惡為善股肱以直從曲此既無君又復無臣惲敢再拜奉觥歙色慚動不知所言門下掾鄭敬進曰君明臣直功曹言切明府德也可無受觥哉歙意少解曰實歙罪也敬奉觥又曰張酺雖在公位而父常居田里酺每有遷職輒一詣京師嘗來候酺適會歲節公卿罷朝俱詣府奉酒上壽極歡醉衆人皆慶羡之及父卒既葬詔遣使齎牛酒為釋服又曰大將軍袁紹惣兵冀州遣使要鄭玄大會賓客玄最後至乃延升上坐身長八尺飲酒一斛秀眉明目容儀溫偉魏志曰徐晃破關羽振旅還摩陂太祖迎晃七里置酒大會太祖舉巵酒勸晃且勞之曰全樊襄陽將軍之功也又曰呂布騎將侯成遣客收馬十五匹客悉驅馬云向沛城欲歸劉備成自將騎逐之悉得馬還諸將合禮賀釀五六斛酒獵得十餘豬未飲食先持半豬五斗酒自入詣布前跪言蒙將軍恩逐得所失馬將來相賀自釀少酒獵得豬未敢飲食先奉上微意又曰邴原初辭家求學原舊性能飲酒自行之後八九年間酒不向口單步負笈苦身持刀至陳則師韓子助頴川則宗陳仲弓汝南則交范孟博涿郡則親盧士幹臨別師友以原不飲酒會米肉送原原曰本能飲酒但以荒思廢業故斷之耳今當遠別因見貺餞可以飲宴於是安坐飲酒終日不醉
