body:
  text: 職官部六十五良令長上禮記曰成人有兄死而不為衰聞子皋為成宰而為之衰成人曰蠶則績而蟹有筐范則冠而蟬有綏兄則死而子皋為之衰韓詩外傳曰宓子賤治單父彈鳴琴身不下堂而單父亦治巫馬期戴星而出戴星而入以身親之而單父亦治巫馬期問於子賤子賤曰我任人子任力任力者勞任人者逸家語曰孔子仕為中都宰為養生送死之節長幼異食強弱異任男女別塗路不拾遺器不雕僞市不二價為四寸之棺五寸之槨因丘陵為墳不封不樹行之一年而西方諸侯皆則魯國在東故言西方諸侯又曰子路治蒲三年孔子過之入其境曰善哉由乎恭敬以信矣入其邑曰善哉由乎忠信以寬矣至其庭曰善哉由乎明察以斷矣子貢執轡而問曰夫子未見由之政而三稱其善可得聞乎孔子曰吾見其政矣入境田疇闢溝洫深此其恭敬以信故其人盡力也入其邑墻屋完固樹木甚茂此其忠信以寬故其人不偷也入其庭甚清間諸下用命此其明察以斷故其政不擾也以此觀之雖三稱善庸盡其美乎史記曰西門豹為鄴令豹到鄴會長老問民之所疾苦長老曰鄴三老廷掾常歲賦斂百姓收取其錢得數百萬為河伯取婦當其時巫行視小家女好者云是當為河伯婦娉取洗沐之如嫁女床席令女居其上浮之河中浮行數十里乃沒其人家有好女者恐大巫祝為河伯取之以故多持女逃亡豹曰至河伯取婦時願三老語之至其時豹往河上呼河伯婦來曰是女不好煩大巫嫗為入報河伯得更求好女後日送之即使抱大巫嫗投河中豹顧曰巫嫗不來復欲使廷掾與豪長一人趣之皆叩頭血流地後不敢言為河伯取婦豹即發民鑿渠十二引灌民田田皆灌溉至今皆得水利漢書曰邵信臣字翁卿九江壽春人補穀陽長舉高第遷上蔡長其治視民如子所居見稱後漢書曰卓茂為密令勞心諄諄視民如子民不忍欺光武初即位詔曰前密令卓茂能為人所不能為夫名冠天下當受天下重賞今以茂為太傅封褒德侯食邑二千戶茂長子為太中大夫次子為郎中又曰劉昆字桓公為江陵令縣連災火昆輒向火叩頭多能降雨止風又曰戴封字平仲為西華令大旱祈禱無獲乃積薪自焚火起而雨大至又曰王渙為洛陽令人為立祠及桓帝事黃老道毀諸旁祀唯特詔密縣留卓茂廟及渙祠也東觀漢記曰卓茂字子康南陽人遷密令視民如子口無惡言吏民親愛而不忍欺之民嘗有言部亭長受其米肉遺者茂問之曰亭長從汝求乎為汝有事屬之而受乎將平居以恩意遺之乎民曰往遺之耳茂曰遺之而受何故言耶民曰竊聞賢明之君使民不畏吏吏不取民今我畏吏是以遺之茂曰凡人所以貴於禽獸者以有仁愛知相敬事也今鄰里尚致饋此乃相親况吏民乎凡人之生群居雜處故有經紀禮義以相交接汝獨不欲修之寧能高飛遠去不在人間耶民曰茍如此律何故禁之茂笑曰律設大法禮從人情今我以禮教汝必無怨惡以律治汝何所措其手足乎時天下大蝗河南二十餘縣皆被其災獨不入密界督郵言之太守不信自出按幸見乃服焉又曰韓稜字伯師潁川人也為下邳令視事未朞吏民愛慕時鄰縣皆雹傷稼唯下邳界獨無又曰王阜字世公為重泉令吏民向化鸞鳥集止學宮阜使校官掾長涉疊為張雅樂擊磬鳥舉足垂翼應聲而舞翾翔復上縣庭屋十餘日乃去又曰孔奮字君魚右扶風茂陵人守姑臧長七年詔書以為奮在姑臧治有絶迹賜爵關內侯奮素孝供養至謹在姑臧唯老母極膳妻子飯食蔥芥時人笑之或嘲奮曰置脂膏中不能自潤而奮不改其操又曰鍾離意為堂邑令初到市無屋意乃出俸錢作屋民齎茅竹或持材木爭赴趣作不日而成既畢為解土祝曰興功役者令也如有禍祟令自當之民皆大悅後漢書曰戴封字平仲拜議郎遷西華令汝潁有蝗災獨不入西華界時督郵行縣蝗忽大至督郵其日即去蝗亦頓除一境奇之其年大旱封禱請無獲乃積薪艾坐其上以自焚火起而大雨暴至遠近歎服又曰童恢為不其令吏有犯違禁法輒隨方曉示若吏稱其職人行善事者皆賜以酒殽之禮以勸勵之耕織種牧皆有條章一境清靜牢獄連年無囚比縣流人歸化徙居二萬餘戶人嘗為虎所害乃設檻捕之生獲二虎恢聞而出呪虎曰天生萬物唯人為貴虎狼當食六畜而殘暴於人王法殺人者死傷人則論法汝若是殺人者當垂頭服罪自知非者當號呼稱冤一虎低頭閉目狀如震懼即時殺之其一視恢鳴吼踊躍自奮遂令放釋又曰劉矩為雍丘令以禮讓化之其無孝義者皆感悟自革人有爭訟矩常引人於前提耳訓告以為忿恚可忍縣官不可入使歸更尋思訟者感之輒各罷去其有路得遺者皆推尋其主又曰王渙為洛陽令有善政元興元年病卒百姓市道莫不咨嗟男女老壯皆相與賦斂致奠醊以千數醊音張芮反說文曰祭酹也渙喪西歸道經引農人庶皆設槃案於路吏問其故咸言平常持米到洛為卒司所鈔恆亡其半自王君在事不見侵枉故來報恩其政化懷物如此人思其德為立祠於安陽亭西每食輒絃歌而薦又曰虞延為細陽令每至歲時伏臘輒休遣徒繫各使歸家並感其恩德應期而還有囚於家被病自載詣獄既至而死延率掾吏殯于門外百姓感悅之又曰虞延遷洛陽令是時陰氏有客馬成者常為姦盜延收考之陰氏屢請獲一書輒加篣二百篣捶也音彭信陽侯陰就乃訴帝譖延多所冤枉帝乃臨御道之館親録囚徒延陳其獄狀可論者在東無理者居西成乃回欲趍東延前執之謂曰爾人之巨蠹久依城社不畏熏燒今考實未竟宜當盡法成大呼稱枉陛戟郎以戟刺延叱使置之帝知延不私謂成曰汝犯王法身自取之呵使速去後數日伏誅於是外戚斂手莫敢干法又曰法雄除平氏長善政事好發擲姦伏盜賊希發吏人畏愛之南陽太守鮑得上其理狀遷苑陵令續漢書曰魯恭為中牟令導民以孝推誠而治建初中郡國螟傷稼犬牙緣界不入中牟河南尹袁安疑其不實遣仁恕掾肥親往察廉之恭隨行阡陌俱坐桑下有雉過止其傍傍有童兒親曰何不擊之兒言雉方將雛親瞿然而起與恭訣曰所以來者欲察治之善惡耳今蟲不犯境此一異也化及鳥獸此二異也豎子有仁心此三異也久留徒擾賢者耳還府以狀白安安美其治以勵屬縣又曰祭彤除偃師長視事五年縣無盜賊州課第一遷襄賁令時賊鈔掠彤到官誅鉏姦猾縣界清靜詔書增秩一等賜縑百匹冊書勉勵又曰劉寵除東平陵令是時民俗奢泰寵到官躬儉訓民以禮上下有序都鄙有章視事數年以母病去官歸百姓士女攀車拒輪充塞道路車不得前乃止亭輕服潛遁又曰劉駼騊為湞陽長政化大行道不拾遺以病去官童謠歌之曰邑然不樂思我劉君何時復來安此下民又曰公孫述補清水長太守以其能使兼治五縣政事修理姦盜不發郡中謂之神明又曰胡紹為河內懷令三日一視事十日一詣倉受俸米於閣外炊作乾飯食之不設釜竈得一強盜問其黨與得數百人皆誅之政教清平為三河表又曰牟融舉茂才為豐令視事二年政化流行縣無獄訟吏畏而愛之治有異迹為州郡最又曰度尚字博平山陽人除上黨長治政嚴峻明於疑理縣中謂之神明謝承後漢書曰鄭弘字巨君為鄒令勤行德化部人王逢等得路遺寶物懸於道衢求主還之魯國當春大旱五穀不豐鄒獨致兩偏熟永平十五年蝗起泰山流被郡國過鄒界不集郡國以狀聞詔書以為不然遣使案行如言也又曰方儲字聖明曉風角占候為句章長時人田還置餘粟一石及刀鋤於田陌明日求亡去疑其旁家儲曰此人非偷自呼縣功曹謂曰君何取人粟置家後積茭中功曹歎服後為洛陽令功曹是憲客為憲所諷夜殺人斷頭著奩中置廄門下欲令儲去官儲摩死者耳邊問誰所殺有頃曰死人言為功曹所殺收功曹栲竟具服又曰賈彪字偉節補新息長政多奇異小人迫困貧産子不能舉養彪禁有犯者以殺人罪罪之縣境震栗人養子僉曰賈父所長男女皆以賈為名華嶠後漢書曰劉平為全椒令掾吏五日一朝罷門闌卒署各遣就農人感懷至或增資就賦或減年從役刺史行部獄無囚徒民各自以為職不知所問唯班詔書而去先是縣多虎為害平到修政選進儒良黜貪殘視事三月虎皆渡江而去又曰劉永國字叔儒為東城令民聞其名枉者更直濁者強清肅然無事唯以著作為務袁山松後漢書曰范丹為萊蕪長去官常便賣卜以自給步行無車被囊自隨漢官儀曰明帝臨觀見洛陽令車騎意河南尹定至而非尤其太盛勑去軒綏時偃師長治有能名以事詣臺因取賜之下縣遂以為故事魏志曰鄭渾字文公避難淮南太祖聞其篤行召為邵陵令天下未定民皆不念産殖其生子無以相活率皆不舉渾所在奪其漁獵之具課使耕種又兼開稻田重去子之法民初畏罪後稍豐給無不舉育所育男女多以鄭為名又曰胡質字文德楚國壽春人也為頓丘令縣民郭政通於從妹殺其夫程他郡吏馮諒繫獄為證政與妹皆耐掠隱抵諒不勝痛自誣當反其罪質至官察其情色更詳其事檢驗具服又曰王修字叔治守高密令高密孫氏素豪俠人客數犯法民有相劫者賊入孫氏吏不能得修將吏民畏憚不敢近修令吏民敢有不攻者與同罪孫氏懼乃出賊由是豪強懾服又曰趙儼字思伯為朗陵長縣多豪猾無所畏忌儼取其尤甚者收縛案驗皆得死罪儼既囚之乃表府解放自是威恩並著又曰張暨字德容馮掖高陵人也舉茂才為新豐令治為三輔第一又曰司馬朗字伯達河內溫人也為堂陽長其治務寬惠不行鞭杖而民不犯禁又曰吉茂字叔暢馮翊池陽人也世為著姓好書不恥惡衣惡食而恥一物之不知建安初關中始平茂與扶風蘇則共入武功南山隱處精思數歲州舉茂才除臨汾令居官清靜吏民不忍欺又曰太祖平袁氏以高柔為菅長縣中素聞其名姦吏數人皆引去柔教曰昔邴吉臨政吏嘗有非猶尚容之况此諸吏於吾未有失乎其召復之咸還皆礪誠佳吏蜀志曰董和字幼宰南郡人也益州牧劉璋以為成都令蜀土富實時俗奢侈貨殖之家侯服玉食婚姻葬送傾家竭産和躬率以儉惡衣蔬食防遏踰僣為之軌制所在皆移風變善畏而不犯又曰呂義字季陽遷新都綿竹令乃心隱恤百姓稱之為一州諸城之首吳録曰張舉字子清為句章令有婦殺夫者因焚屋言燒死其弟疑而訟之舉按尸開口視無灰令人取豬二頭殺一生一而俱焚之開視其口所殺者無灰生者有灰乃明夫先死婦遂首服焉政化流行民歌遺澤晉書曰陸雲為浚儀令縣居都會之要名為難理雲到官下不能欺市無二價人有見殺者主名不立雲録其妻而無所問十許日遣出密令人隨後謂曰其去不出十里當有男子候之與語便縳來既而果然問之具服云與此妻通共殺其夫聞妻得出欲與語憚近縣故相要候於是一縣稱為神明郡守害其能屢譴責之雲乃去官百姓追思之圖畫形像配食縣社又曰范廣為堂邑令大旱米貴廣散私穀賑飢人至數千斛遠近流寓歸投之戶口十倍又曰曹攄為洛陽令仁惠明斷百姓懷之時天大雨雪宮門夜失行馬群官檢察莫知所在攄使收門士衆官咸謂不然攄曰宮掖禁嚴非外人所敢盜必是門士以燎寒耳詰之果服又曰曹攄為臨淄令縣有寡婦守節不移姑愍之密自殺親黨告婦殺官為考鞠寡婦不勝苦楚乃自誣獄當決攄察其有冤更加辨究具得情實時稱其明晉中興書曰范寧字武子解褐除餘杭令在縣興學校養生徒潔己志行之士莫不來宗朞年之後風化大行自中興已來崇學敦教未有如寧者也宋書曰顧憲之為建康令清儉強力為政甚得人和故都下飲酒者醇旨輒號為顧建康謂其清且美焉又曰顧憲之為建康令時有盜牛者被主所認盜者亦稱己牛二家辭理等前後令莫能決憲之至覆其狀謂二家曰無為多言吾得之矣乃令解牛任其所去牛徑還本主宅盜者始伏其辜發姦擲伏多如此類時人號曰神明又曰顧覬之遷山陰令山陰民戶三萬海內劇邑前後官長晝夜不得休事猶不舉覬之理繁以約用無事晝日垂簾門階間寂自宋世為山陰務簡而績修莫能尚也齊書曰傅琰為山陰令有賣針賣糖老姥爭團絲來詣琰不辨乃縛團絲於柱鞭之密視有鐵屑乃罰賣糖者又三野父爭雞琰各問何以食雞一人云粟一人云豆乃破雞果得粟罪言豆者縣內咸稱神明無敢復為盜者又曰傅琰字季圭為山陰令父僧祐亦為山陰令父子並著奇績世云諸傅有治縣譜子孫相傳不以示人梁書曰傅歧除始新令縣民有因鬥相歐而死者死家訴郡郡録其仇人考掠備至終不引咎郡乃移獄於縣歧即命脫械以和言問之便即自服法當償死會冬節至歧乃放其還家使過節一日復獄曹掾固爭曰古者乃有此於今不可行歧曰其若負信縣令當坐主者勿憂竟如期而反太守深相歎異遽以狀聞歧後去縣民無老小皆出境拜送啼號之聲聞於數十里又曰蕭景字子昭為永寧令永嘉太守榜郡門曰諸縣有疑滯可就永寧令決之又曰丘仲孚遷山陰令居職甚有聲稱百姓為之謠曰二傅沈劉不如一丘又曰丘仲孚為山陰令仲孚長於撥煩善適權變吏民敬服號稱神明治為天下第一又曰何遠字義方自武昌太守除名後起為武康令正身勵廉節除淫祀高祖聞其能擢為宣城太守自縣令為邦畿大郡近代未之有也又曰孫謙為錢塘令治煩以簡獄無繫囚及去官百姓以謙在職不受餉遺追載縑帛以送之謙却而不受又曰裴子野出為諸暨令在縣不行鞭罰民有爭者示之以理
