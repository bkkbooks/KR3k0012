body:
  text: 文部五碑釋名曰碑被也此本葬時所設也於是鹿盧以繩被其上引以下棺追述君父之功美以書其上後人因為焉故建道陌之頭名其文謂之碑也文心雕龍曰碑者禆也上古帝皇紀號封禪樹石禆嶽故曰碑也周穆紀迹于弇山之石亦古碑之意也又宗廟有碑樹之兩楹事止麗壯未勒勳績而庸器漸闕故後代用碑以石代金同乎不朽自廟徂墳猶封墓也自後漢已來碑碣雲起才鋒所斷莫高蔡雍觀楊賜之碑骨鯁訓典陳郭二文詞無擇言周胡衆碑莫不精允其序事也該而要其綴采已雅而澤清辭轉而不窮巧義出而卓立察其為才自然至矣孔融所創有慕伯喈張陳兩文辭洽之來亦其亞也及孫綽為文志在於碑溫王郗庾詞多枝離桓彝一篇最為辨裁矣屬碑之恥資乎史才其序則傳其文則銘摽序盛德必見清風之華照紀鴻懿必見峻偉之烈此碑之致也夫碑實銘器銘實碑文因器立名事光於誄是以勒器讚勳者入銘之域樹碑述亡者同誄之區焉禮記喪大記曰君葬用輴四紼二碑御柩用羽葆大夫葬用輴二紼二碑御柩用茅士喪用國車二紼無碑又祭義曰祭之日尸牽牲入廟門麗于碑麗猶擊也東觀漢記曰竇章女順帝初入掖庭為貴人早卒帝追思之詔史官樹碑頌德章自為之辭范曄後漢書曰郭林宗卒同志者乃共刻石立碑蔡雍為其文既而謂盧植曰吾為碑多矣皆有慚德唯郭有道無愧色耳又蔡雍傳曰雍以經籍去聖已久文字多謬俗儒穿鑿疑誤後學乃與五官中郎將堂溪典光祿大夫楊賜諫議大夫馬日磾議郎張訓韓説太史令單揚等奏求正定六經文字靈帝許之雍乃自丹於碑使工鐫刻太學門外於是後儒晚學咸取焉及碑始立其觀視及摹寫者車乘日千餘兩填塞街陌魏志曰王粲與人共行讀道邊碑人問曰卿能暗乎曰能因使背而誦之不失一文又曰鄧艾字士載年十二隨母至潁川讀陳實碑文言為世範行為士則艾遂更名範字士則後宗族有與同者故改焉晉書曰隱逸傅戴逵字安道譙國人也少博學好談論善屬文能鼓琴工書畫其餘工藝靡不畢綜揔角時以雞卵汁溲白瓦屑作鄭玄碑又為文而自鐫之詞麗器妙時人莫不驚歎又曰郭璞為庾冰筮曰墓碑生金庾氏大忌後冰子為廣州剌史碑生金為桓溫所滅又曰杜預好為後世名常言高岸為谷深谷為陵刻石為二碑紀其勳績一沉萬山之下一立峴山之上曰焉知此後不為陵谷乎又曰孫綽少以文才垂稱于時文士綽為其冠溫王郗庾諸公之薨必須綽為碑文然後刊石焉又曰扶風武王駿嘗都督雍梁病薨追贈大司馬加侍中假黃鉞西土聞其薨也泣者盈路百姓為之樹碑長老見碑無不下拜其遺愛如此又曰唐彬為幽州百姓追慕彬功德生為立碑作頌彬初受學於東海閬德門徒甚多獨目彬有廊廟才及彬官成而德已卒乃為之立碑王隱晉書曰石瑞記曰永嘉初陳國項縣賈逵石碑中生金人盜取盡復生此江東之瑞齊書曰竟陵王薨范雲是故吏上表請為立碑文云人蓄油素家懷鉛筆瞻彼景山徒然望慕油素絹也筆所以理書也三國典略曰梁宗懍少聰敏好讀書語輒引古事鄉里呼為小學士梁主使製龍川廟碑一夜便就詰朝呈上梁王美之又曰陸雲吳郡吳人曾製太伯廟碑吳興太守張纘罷郡經途讀其文歎美之曰今之蔡伯喈也至都言於高祖高祖召兼尚書議郎頃之即真後魏書曰衛操桓帝以為輔相任以國事劉石之亂勸桓帝匡助晉氏東瀛公司馬騰聞而善之表加右軍封定襄侯桓帝崩後操立碑於邗城南以頌功德云魏軒轅之苗裔桓穆二帝馳名域外九譯宗焉有德無祿大命不延背棄華殿雲中名都遠近齊軌奔赴梓廬時晉光熙元年秋也皇興初雍州別駕鴈門段榮於大邗掘得此碑又曰爾朱榮字天寶美容貌幼而明決長好射獵葛榮之叛也榮列圍大獵有雙兔超於馬前榮乃彎弓而誓曰中之則擒葛榮應弦而殪三軍咸悅破賊之後即命立碑於其所號曰雙兔碑唐書曰賈敦實宛昫人也貞觀中纍除饒陽令時制大功已下不得聯職敦實兄敦頤復為瀛州剌史甚有惠政百姓共樹碑于大市通衢及敦實去職復刻石頌其政德立於兄碑之側故時人呼為棠棣之碑焉又曰貞觀中議封禪又議立碑曰勒石紀號垂𥙿後昆美盛德之形容闡后王之休烈其義遠矣又曰高宗御製慈恩寺碑文及自書鐫刻既畢戍申上御安福門樓觀僧玄奘等迎碑向寺諸寺皆造幢蓋飾以金寶窮極瓌麗太常及京城音樂車數百兩僧尼執幡兩行導從士女觀者填噎街衢自魏晉已來崇事釋教未有如此之盛者也又曰文苑傳曰李雍尤長碑頌雖貶職在外中朝衣冠及天下寺觀多齎持金帛往求其文前後所製凡數百首受納饋運亦至巨萬時議以為自古鬻文獲財未有如雍者有文集七十卷其張幹公行狀洪州放生碑批韋巨源諡議文士推重之後恩思例贈祕書監又曰長平中源寂使新羅國見有國人傳寫諷念馮定所為黑水碑畫鶴記韋休符之使西蕃也見其國人寫定商山記以代屏障其文名馳於戎夷如此又曰李華嘗為魯山令元德季墓碑顏真卿書李陽冰篆額後人爭摸寫之號為三絶碑又曰裴度平淮西詔韓愈撰平淮西碑其辭多敘裴度事時先入蔡州擒吳元濟李訴功第一訴不平之訴妻出入禁中因訴碑辭不實詔令磨之憲宗命翰林學士段文昌重撰文勒石又曰蕭俯在相位時穆宗詔撰故成德軍節度使王士真神道碑對曰臣器褊狹比不能強王承宗先朝阻命事無可觀如臣秉筆不能溢美又撰進之後例行貺遺臣若公然阻絶則違陛下撫納之宜僶俯受之則非微臣平生之志臣不願為之秉筆帝嘉而從之又曰李絳憲宗時中官吐突承瓘自藩邸承恩寵既為神策軍護軍中尉嘗欲於安國佛寺建立聖德碑大興工作絳即上言陛下布惟新之政剗積習之斃四海延頸日望德音今忽立聖德碑以示天下不廣大易稱大人者與天地合德與日月合明執契垂拱勵精求理豈可以文字而盡聖德又安可以碑表而贊皇猷若可敘述是有分限乃反虧損盛德豈謂敷揚至道哉故自堯舜禹湯文武並無建碑之事至秦始皇荒逸之君煩酷之政然有之罘嶧山之碑揚誅伐之功紀巡幸之迹適足為百王所笑萬代所譏至今稱為失道亡國之主豈可擬議於此陛下嗣高祖太宗之業舉貞觀開元之政思理不遑食從諫如順流固可與堯舜禹湯文武方駕而行安得追秦皇暴虐不經之事而自損聖政近者閻巨源請立紀聖德碑嚴勵請立紀聖功碑陛下詳盡事宜皆不允許今忽令立此與前事頗乖況此碑既在安國寺即不得不敘載遊觀崇飾之事述遊觀且乖理要敘崇飾又匪政經固非哲王所宜行也上納之後唐史曰魏帥楊師厚於黎陽山採巨石將紀德政制度甚大以鐵為車方任負載驅牛數百不由道路所經之處或壞人廬舍或發人丘墓百姓瞻望曰碑來碑石才至而卒魏人以為應碑來之兆禰衡別傳曰黃祖太子射作章陵太守與衡有所之見蔡伯喈所作石碑正平一過視之歎之言好後日各歸章陵自恨不令吏寫之正平曰吾雖一遇皆識其中央第四行中石書磨滅兩字不分明當是某字恐不諦耳因援筆書之初無所遺唯兩字不著耳章陵雖知其才明猶嫌有所脫失故遣往寫還以校正平所書尺寸皆得初無脫誤所疑兩字故如正平所遺字也於是章陵敬服世説曰魏武嘗過曹娥碑下楊修讀碑背上題云黃絹幼婦外孫齏臼魏武謂修曰卿解不答云解魏武曰卿未可言待我思之行三十里乃曰吾已得令修別記所知修曰黃絹色絲也於字為絶幼婦少女也於字為妙外孫女子也於字為好齏臼受辛也於字為辭所謂絶妙好辭魏武亦記之與修同乃歎曰我才不如卿乃覺三十里王肅答詔問為瑞表曰太和六年上將幸許昌過繁昌詔問受禪碑生黃金白玉應瑞不肅奏以始改之元年嘉瑞見乎于踐祚之壇宜矣晉令曰諸葬者皆不得立祠堂石碑石表石獸語林曰孫興公作永嘉郡郡人甚輕之桓公後遣傅教令作敬夫人碑郡人云故當有才不爾桓公那得令作碑於此重之荊州圖記曰羊叔子與鄒潤甫嘗登峴山泣曰自有宇宙便有此山由來賢達登此望如我與卿者多矣皆湮滅無聞念此使人悲傷潤甫曰公德冠四海道嗣前哲令問令望當與此山俱傳若潤甫輩乃當如公語耳後參佐為立碑著故望處百姓每行望碑莫不悲感杜預名為墮淚碑盛弘之荊州記曰冠軍縣有張詹墓七世孝廉刻其碑背曰白楸之棺易朽之衣銅鐵不入瓦器不藏嗟矣後人幸勿見傷及胡石之亂舊墓莫不夷毀而此墓儼然至元嘉六年民飢始發説者云初開金銀銅錫之器未裝雕刻之飾爛然畢備齊道記曰琅邪城始皇東遊至此立碑銘紀秦功德云是李斯所刻西征記曰國子堂前有列碑南北行三十五枚刻之表裏書春秋經尚書二部大篆隸科斗三種字碑長八尺今有十八枚存餘皆崩太學堂前石碑四十枚亦表裏隸書尚書周易公羊傳禮記四部本石塶相連多崩敗又太學讚碑一所漢建武中立時草創未備永建六年詔下三府繕治有魏文典論立碑今四存二敗述征記曰下相城西北漢太尉陳球墓有三碑近墓一碑記弟子盧植鄭玄管寧華歆等六十人其一碑陳登碑文並蔡雍所作酈善長水經注曰昔大禹導河積石踈決梁山所謂龍門矣孟津河口廣八十步巖際鐫迹遺功尚存岸上並有廟祠祠前有石碑三所碑字紊滅不可識也一碑是太和中立述異記曰崆洞山中有堯碑禹碣皆籀文焉伏滔述帝功德銘曰堯碑禹碣磨古不昧虞喜志林曰贛榆縣有始皇碑潮水至則加其上三丈去則見三尺行有十二字異苑曰吳郡岑淵碑在江乘湖西太元村人見龜從田中出還其元處萍藻猶著腹下金樓子曰銘頌所稱興公而已夫披文相質博約溫潤吾聞斯語未見其人班固碩學尚云贊頌相似陸機鉤深猶稱碑賦如一國朝傳記曰魏文貞之薨也太宗自製其碑文并自書後為人所間詔令掊之及征高麗不如意深悔為是行乃歎曰若魏徵在不使我有此舉也既渡遼水令馳驛祀以少牢復立碑焉又曰率更令歐陽詢行見古碑索靖所書駐馬觀之良久而去數百步復還下馬佇立疲則布毯坐觀因宿其傍三日而後去李綽尚書故實曰東晉謝太傅墓碑樹貞石初無文字蓋重難製述之意國史補曰卓貫之為尚書右丞長安中爭為碑志若市賈然大官卒其門如市至有喧競構致不由喪家是時裴均之子圖不朽於貫之縑帛萬匹貫之舉手曰寧餓不茍
