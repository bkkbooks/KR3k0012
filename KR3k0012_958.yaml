body:
  text: 木部六楊柳下齊書曰阮孝緒建武末青溪宮東門無故自崩大風拔東宮門外楊樹以問孝緒曰青溪皇家舊宅齊為木東為木位今東門自壞木其衰矣齊書曰劉俊之為益州刺史獻蜀柳數株條甚長狀若絲縷武帝植於太昌靈和殿前常玩嗟曰此楊柳風流可愛似張緒當時見賞如此又曰何點性好事聞陸惠曉與張融並宅其間有池池上有二柳樹點歎曰此池便是醴泉此樹便是交讓隋書曰柳機字當時初機在周與族人文成公昂俱歷顯要及此機昂並為外職楊素時為納言方用事因上賜宴素戲機曰二柳俱摧孤楊獨聳坐者歡笑機竟無言又曰周初有童謠曰白楊樹頭金雞鳴秪有阿舅無外甥靜帝隋氏之甥既遜位而崩諸舅強盛又曰渤海公高潁少明敏有器局多涉書史尤善詞令初孩孺時家有柳樹高百許尺亭亭如蓋里中父老曰此家當出貴人唐書曰司稼卿梁孝仁高宗時監造蓬萊宮於諸庭院列種白楊將軍契苾何力鐵勒之渠率也於宮內縱觀孝仁指白楊云此木易長三數年間宮中可得蔭映何力一無所應但誦古詩白楊多悲風蕭蕭愁殺人意謂此是冢墓間木非宮中所宜種孝仁遽令拔去更樹梧桐又曰乾元中虢州刺史王奇光奏閿鄒縣界女媧墳天寶十三載大雨晦暝失所在至今河上側近忽聞雷風聲曉見墳踴出上有雙柳樹下有巨石柳各高丈餘畫圖進上以示百官又曰呂渭為禮部侍郎中書省有柳樹建中末枯死興元元年車駕還京其樹再榮人謂之瑞柳以為賦題上聞而惡之渭因入閣遺失請託文記遂出為潭州刺史又曰吐蕃土風寒苦物産貧薄所部邏婆川唯有楊柳人以為資更無草木又曰范希朝鎮振武單于城中舊少樹希朝於他處市柳子命軍人種之至今成林居人賴之春秋後語曰魏哀王以田需為相需音須甚貴信之惠子謂田需曰子必善事左右今夫樹楊撗之則生折而樹之又生戰國策曰夫楊橫樹之亦生倒樹之亦生説不同故存之也然使十人樹楊一人拔之則無生楊矣夫以十人之衆樹易生之物不勝一人拔者何也樹之難去之易今子雖自樹於王而欲去子者衆則必危矣戰國策又載戰國策曰楚有養由基者善射楊葉百步而射之百發百中管子曰五沃之土宜柳莊子曰支離叔觀於冥泊之丘崑崙之墟黃帝之所休俄而柳生其左肘孟子謂告子曰性猶杞柳義猶杯棬丘員切許慎淮南子注曰展禽之家有柳樹身行惠德因號柳下惠一曰邑名抱朴子曰夫木槿楊柳斷殖之更生倒之亦生橫之亦生生之易者莫若斯木山海經曰廆山之西有谷焉名均雚谷其木多柳鳳伯之山熊山直陵之山木多柳平丘山爰有楊柳沃民之國有白柳崔豹古今注曰白楊葉圓青楊葉長柳葉亦長細栘時題切楊圓葉弱帶微風則大搖一名高飛一曰獨搖蒲柳生水邊葉似青楊亦曰蒲楊亦曰栘柳亦曰蒲栘焉水楊即蒲楊也枝徑韌音刃任矢用又有赤楊霜降則葉赤林理亦赤也説文曰楊蒲柳也從木易聲柳河柳也從木聖聲柳小楊也從木卯聲續搜神記曰上虞魏全家在縣北忽有一人著孝服皂笠手巾掩口來詣全家語云君有錢一千萬銅器亦如之大柳樹錢在其下取錢當得耳於君家大不吉僕尋為君取於此便去自你出三十年遂不復來全亦不取錢盛弘之荊州記曰緣城堤邊悉植細柳絲條散風清陰交陌三齊略記曰鬲城東南有蒲臺高八丈始皇所頓處在臺下縈馬至今蒲生猶榮似水楊而堪為箭孔氏志怪曰會稽盛逸嘗晨興路未有行人見門內柳樹上有一人長二尺餘朱衣冠冕俯以舌舐樹葉上露良久忽見逸神意如有驚遽即隱不見世説曰顧悅之與晉簡文帝同年悅之早白帝問卿何以先老對曰蒲柳之姿望秋而落松柏之質隆冬轉茂廣五行記曰周宣帝大定二年永州得白石剖而為兩段中有楊樹之形黃根紫葉廣志曰白楊一名高飛木葉大於柳崔實四民月令曰三月三日以及上除採柳絮柳絮愈瘡本草經曰柳華一名柳絮夢書曰楊為使者魏文帝柳賦曰昔上與袁紹戰於官渡是時余始植斯柳在余年之二七植斯柳乎中庭始圍寸而高尺今連拱而九成曹植柳頌曰余以間暇駕言出遊過友人楊德祖之家視其屋宇寥廓庭中有一柳樹戲刊其枝葉故著斯文桂爾雅曰梫音侵木桂今南人呼桂皮厚者為木桂桂樹葉似批把而大白花花而不著子葉生巖嶺枝葉冬夏長青間無雜木禮斗威儀曰君乘金而王其政訟平芳桂常生春秋運斗樞曰椒桂生合剛陽椒桂陽星之精所生也合猶連體而生也春秋潛潭巴曰宮桂鳴下土諸侯號有聲桂好木植於宮中猶天子封有聲譽者為諸侯今乃鳴是乃成其聲名於下土之祥山海經曰招搖之山臨乎西海其上多桂桂長丈餘味辛皋塗之山上多桂木桂林八樹在賁隅東八樹成言大也春秋後語曰蘇秦在楚三年乃得見談卒辭行威王曰寡人聞先生若聞古人今先生不遠千里而臨寡人曾不肯留願聞其説蘇秦對曰楚國之食貴於玉薪貴於桂謁者難得見於鬼王難得見於帝今令臣食玉炊桂因鬼見帝何事不去威王曰先生就舍寡人聞命矣漢書陛賈傳曰尉他獻桂蠹二器桂樹蠹蟲也晉書曰郤詵遷雍州刺史武帝於東堂會送問詵曰卿自以為何如詵對曰臣舉賢良對策為天下第一猶郤林之一枝崑山之片玉唐書曰垂拱四年三月有月桂子降於台州經十餘日乃止又曰南中有泉流出山洞常帶桂葉好事因謂為流桂泉後人乃立棟宇為漢高之神莊子曰桂可食故斧伐之抱朴子曰桂可以蔥涕合蒸作水可以竹瀝合餌之亦可以先知君腦和服之七年能步行水上長生不死淮南子曰月中有桂樹郭子橫洞冥記曰武帝使董謁乘琅霞之輦以升壇至三更西王母駕玄鸞之輿至壇之四面列種軟條青桂風至枝自拂階上遊塵尋陽記曰廬山上有三石梁長數十丈廣不盈尺杳然無底吳猛將弟子登山過此梁見一翁坐桂樹下以玉杯承甘露漿與猛廣志曰桂出合浦而生必以高山之顛冬夏常青類自為林間無雜樹交址置桂園列仙傳曰范蠡好食桂賣藥世人往往見之神仙傳曰離婁公服竹汁餌桂得仙許由巢父箕山得石丹沙石桂英服之闞子曰魯人有好釣者以桂為餌黃金為鉤拾遺記曰岱輿一名浮折北有玉梁千丈駕玄流之上岸旁有丹桂黑紫白可為舟世説曰客問陳季方曰君家有何功德而荷天下重名曰吾家君譬如桂樹生泰山之阿上有萬仞之高下有不測之深上為甘露所霑下為川泉所潤當斯之時樹焉知太山之高川泉之深不知有功德歟金樓子曰夫翠飾羽而體分象美牙而身喪懷珠而致剖蘭含香而遭焚膏以明而遂煎桂以蠹而成疾羅浮山記曰羅山頂有桂山海經所謂賁隅之桂賁隅番隅也臨海記曰白石之山望之如雪山有湖傳云金鵝之所集八桂之所植説文曰桂江南之木百藥之長地理記曰桂陽郡有桂嶺放花遍白林嶺盡香又曰天台山有八桂嶺襟漢武帝悼李夫人賦曰氣沉潛以悽戾兮桂枝落而銷亡漢淮南王安好道感八公共登山攀桂樹安作詩曰攀桂樹兮聊淹留唐景龍文館記曰薰風殿其材木皆用青桂白檀香氣氛氳盈於四遠杉爾雅曰披音彼煔煔或作杉似松生江南可以為船及棺材作桂理之不腐也晉咸康起居注曰侍御史秦武奏平陵前道東杉樹一株萎死以柏栽補之請收陵令推劾西京雜記曰太液池中有小池名孤樹池池中有一洲洲上有煔樹一株十餘圍望之如車蓋故取名之鄧德明南康記曰巘山有漢太傳陳蕃墓遙望兩杉樹聳柯出嶺垂陰覆谷劉欣期交州記曰合浦東二百里有一杉樹葉落隨風入洛陽城內漢時善相者云此休徵當出王者故遣千人伐樹役夫多死三百人坐斷株上食過足相容名山志曰華子岡上杉千仞被在崖側楓爾雅曰楓攝攝之葉反天風則鳴故曰攝又樹似白楊葉圓而岐有脂而香今之楓香是後周書曰武帝天和元年秋七月辛丑梁州上言鳳凰集於楓樹群鳥列侍以萬數山海經曰黃帝殺蚩尤棄其械化為楓樹金樓子曰楓脂千歲為虎魄名山記曰天姥山上長楓千餘丈肅肅臨澗水晉宮閣名曰華林園楓香三株南方草木狀曰楓香樹子大如鳥卵二月花色乃連著子八九月熟曝乾可燒唯九真郡有之異苑曰烏陽陳氏有女未醮著屐徑上大楓樹顛更危暗顧曰我應為神今便長去唯左蒼右黃當暫歸耳家人悉出見之舉手辭訣於是飄聳輕越極睇乃沒既不了蒼黃之意每春輒以蒼狗秋以黃犬設祀於樹下任昉述異記曰南中有楓子鬼楓木之老者為人形亦呼為靈楓嶺表録異曰楓人嶺多楓樹樹老則有瘤癭忽一夜遇暴雷驟雨其樹贅則暗長三數尺南中謂之楓人越巫云取之雕刻神鬼易致靈驗離騷招魂曰湛湛江水上有楓目極千里傷春心豫章左傳昭公曰白公作亂殺子西子期子期曰昔者吾以力事君不可不終抉豫章以殺人而後死陳書曰侯景之平也太極殿被焚承聖中議欲營之獨闕一柱七月有樟木大十八圍長四丈五尺流泊陶家後渚監軍鄒子慶以聞詔書令沈衆兼起部尚書搆太極殿莊子曰騰猿得豫章攬蔓而王長於其間便也淮南子曰藜藿之生蠕蠕然曰加數寸不可以為櫨棟加猶益也櫨屋也楩柟豫章之生也七年而後知故可以為棺舟高士傳曰堯聘許由為九州長由惡聞洗耳於河巢父見謂之曰豫章之木生於高山工雖巧而不能得子避世何不藏深地理志曰豫章郡城南有樟樹長數十丈立郡因以為名至晉求嘉年間尚茂廣志曰豫章生七年外始辨凡木似豫章故待七年當分別神異經曰東方有豫章樹高千丈有士操斧行斫行合新語曰賢者之處世猶金石生於沙中豫章産於幽谷水經曰豫章城之南西門曰松楊門門內有樟樹高七丈五尺大二十五圍枝葉扶疏垂蔭數畝應劭漢官儀曰豫章郡樹生庭中故以名郡矣此樹常中枯逮晉永嘉中一旦更茂豐蔚如初咸以為中宗之徵祥也豫章記曰新塗懸封溪有聶友所用樟木戕柯者遂生為樹今猶存其木合抱始倒植之今枝條皆垂下任昉述異記曰豫章之為木也生七年而後可知漢武寶鼎二年立豫樟宮於昆明池中作豫樟木殿
