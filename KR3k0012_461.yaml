body:
  text: 人事部一百一遊説上釋名曰説者述也宣述人意也左傳曰晉人將尋盟齊人不可叔向告於齊曰明王之制使諸侯歲聘以志業間朝以講禮再朝而會以示威再會而盟以顯昭明自古以來未之或失齊人懼又曰晉郤缺言於趙宣子曰衛不睦故取其地今已睦矣可以歸之叛而不討何以示威服而不柔何以示懷非威非懷何以示德趙宣子悅歸衛匡戚之田又曰吳人執衛侯子服景伯謂子貢曰子盍聞見太宰乃請束錦以行語及衛故子貢曰衛君之來也必謀於其衆其衆或欲或否是以緩來其欲來者子之黨也其不欲來者子之讎也若執衛君是墮黨而崇讎也夫墮子者得其志矣且合諸侯而執衛君誰敢不懼墮黨崇讎而懼諸侯或者難以霸乎太宰嚭説乃舍衛侯又曰晉楚會於虢季武子伐莒取鄆莒人告於國會楚告於晉曰請戮其使趙孟請諸楚曰魯雖有罪其執事不避難疆場之邑一彼一此何常之有去煩宥善莫不競勸固請諸楚楚人許之乃免叔孫又曰楚五舉奔鄭將遂奔晉聲子將如晉遇之於鄭郊聲子曰吾必復子還如楚令尹子木與之語聲子曰椒舉今在晉矣晉人將與之縣以叔向彼若謀害楚國豈不為患子木懼言諸王益其祿爵而復之聲子使椒鳴逆之又曰晉侯秦伯圍鄭佚之狐言於鄭伯曰國危矣若使燭之武見秦君師必退燭之武夜縋而出出見秦伯曰秦晉圍鄭鄭既知亡鄭而有益於君敢以煩執事越國以鄙遠君知其難也焉用亡鄭以陪鄰夫晉何厭之有既東封鄭又欲肆其西封不闕音下同秦焉取之闕秦以利晉唯君圖之秦伯悅傳曰吳伐楚入郢申包胥如秦乞師曰吳為封豕長蛇薦食上國虐始於楚寡君失守社稷越在草莽使下臣告急曰夷德無厭若鄰於君疆場之患也逮吳之未定也君其取分焉若以君靈撫之世以事秦立依於庭牆而哭日夜不絶聲勺飲不入口七日秦師乃出又曰楚子饗魯昭公於新臺好以大屈既而悔之薳啓強聞之見公公語之拜賀公曰何對曰齊與晉越欲此久矣寡君無適與也敢不賀乎公懼乃反之戰國策曰蘇秦死其弟蘇代欲繼之乃北見燕王噲曰臣東周之鄙人也至燕廷觀王之群臣下吏大王天下明王也王曰何如曰臣聞之明王也務聞過不欲聞善臣請謁王之過又曰濮陽人呂不韋賈於邯鄲見秦質子楚説之乃説秦王后弟陽泉君曰王后無子子楚賢才也棄在趙王后誠請而立之是有子也陽泉君入説王后王后為請而歸之為太子也又曰張儀為秦連橫説韓王曰夫違禍而求福計莫如事秦今王西面事秦以攻楚秦王必喜又曰蘇秦説李兌抵掌而談兌送秦以明月之珠和氏之璧戰國策曰齊宣王因燕喪攻取十城蘇秦為燕説齊王再拜而賀因仰而吊齊王案戈曰何慶吊相隨之速也對曰人之飢所以不食烏喙者以為雖愈飢充腹而與死同患齊乃歸燕城戰國策曰應侯使人召蔡澤蔡澤入曰夫四時之序功成者去君何不歸相印讓賢者授之必有伯夷之廉長為應侯而有喬松之壽孰以禍終此哉應侯曰善乃延入坐為上客又曰楚免淖齒於柱國遊騰為楚王曰秦有上群午者重兵之戰請秦王曰必無與楚戰王曰何也對曰南方火也西方金也金之不勝火亦必矣秦王不聽其戰不勝今午又請秦王必與楚戰南方火西方金也楚正夏中年而免其柱國此所謂內自滅也楚懼復置淖齒又曰齊欲伐魏魏使人請淳於髡曰齊欲伐魏能解患唯先生也淳於髡曰諾遂入説齊王曰楚齊之仇敵也魏齊之與國也夫伐與國使仇敵制其餘弊名醜而實危為王不取也齊王曰善乃不伐魏也又曰趙魏攻華陽韓謁急於秦冠蓋相望秦不救韓相國謂由余曰事急顧公雖病為一宿之行由余見穰侯穰侯曰急乎由余對曰未急也彼韓急則將變矣穰侯請發兵救韓大敗趙魏於華陽之下又曰昭陽為楚伐魏覆軍殺將得八城移師而攻齊陳軫為齊王使見昭陽再拜賀戰勝起而請問楚之法覆軍煞將其官爵何也昭陽曰官為上柱國爵為上執圭陳軫曰今小貴矣又移師攻齊而不知止者身且死爵且偃昭陽車而歸之又曰范睢謂秦王曰大王國之北有甘泉谷口南帶涇渭右隴蜀左關阪戰車千乘奮卒數百萬以秦卒之勇車騎之多以當諸侯譬若放韓盧而逐狡兔也霸王之業可致今反閉關而不敢窺兵於山東者是穰侯為秦謀不忠大王之計又曰秦王謂趙使諒毅曰豹平原君數欺弄寡人趙能煞此兩人則可若不能煞請率諸侯受命邯鄲城下諒毅曰趙豹平原君親寡君之母弟也猶大王之有葉陽涇陽君夫以孝悌聞於天下衣服之便於體膳啖之兼於口未嘗不分與焉衣裘無非大王之服今受大王之嚴令以報敝邑之君不敢弗行無乃傷君之心乎戰國策曰趙且伐燕蘇代為燕謂趙惠王曰今者來過川蚌方出曝而鷸啄其肉蚌掩鷸啄鷸曰今日不雨明日不雨蚌將為脯蚌亦謂鷸曰今日不出明日不出必見死鷸兩者不相捨漁者得而併擒之今趙且伐燕燕趙久相持臣恐強秦之為漁父也故願王熟計之惠王曰善乃止戰國策曰昭陽為楚伐魏移兵而攻齊陳軫為齊王使見昭陽曰今子既貴矣王非置兩令尹也臣竊為公譬之可乎楚有祠錫其舍人酒一巵舍人相謂曰數人飲之不足一人飲之有餘請畫蛇先成者飲酒一人蛇先成乃左手持巵右手畫蛇曰吾能為足為足未成一人蛇成奪其巵曰蛇故無足子安能為足遂飲其酒畫蛇足者終亡其酒公攻魏殺將得八城又移師亦攻齊齊畏公甚公以是名足矣冠之非可重也戰無不勝而不知止者身且死爵且偃猶為蛇足也昭陽以為然解軍而歸又曰衛客事魏王三年不得見乃見梧丘先生許之以百金先生曰諾乃見魏王曰吾聞秦出兵未知所之願王專事秦無他計王曰諾客趨出至郭門而返曰臣恐王事秦之晚也夫人於事己者過急於事人者過緩今王於事己緩安能急於事人衛客事王五年不得見臣以是知王緩也魏王趨見衛安曰蘇秦為楚合從説韓王曰夫以韓卒之勇被堅甲帶利劍一人當百不足云也夫以韓卒之徑與王之賢乃欲事秦為天下笑無過此者大王事秦秦必求宜陽成皋今茲效之明年又求之豫之則無地以給不豫則棄前功而受後禍大王之地有盡而秦之求無厭以有盡之地而應無已之求鄙語曰寧為雞口不為牛後今西南交臂而事秦何異牛後乎又曰秦王與中期爭論而不勝秦王大怒中期徐行去人為説秦王曰此悍人也中期適遇明君故也遇桀紂必煞之矣王因弗罪又曰秦令樗里疾以車百乘入周周君迎之甚敬楚王怒讓周以其重秦客也遊騰為周君謂楚王曰秦者虎狼之國也有獨吞之意周君懼焉楚王乃説也又曰司馬錯與張儀爭論於秦惠王前錯欲伐蜀儀曰不如伐韓王問其説對曰親魏善楚下兵三川塞轘轅緱氏之口當屯留之道此王業也又曰惠施為韓魏交令太子鳴質於齊王欲見朱倉謂王曰何不稱病臣請説晏子曰魏王之年長矣今有病公不如歸太子以德之不然公子高在楚將內而立之是齊抱空質而行不義也王從之太子得還又曰范睢謂秦王曰秦韓之地形相錯如繡秦之有韓若木之蠹為秦害者莫大於韓王又曰張儀為秦連橫説韓王曰諸侯不料兵之弱而聽從人之甘言不顧社稷長利而聽諛人之説詿誤人主無過此矣戰國策曰燕文公時秦惠王以其女為燕太子婦文公卒殤王立齊宣王因燕喪攻取十城蘇秦為燕説齊王再拜而賀因仰而弔曰燕雖弱小強秦之壻王利其十城而深與秦為仇王能聽臣莫如歸燕城卑辭以謝秦是王棄強仇而立厚交也齊王大悅乃歸燕城又曰齊楚約而欲攻魏魏有唐雎見秦王曰今齊楚之兵已在魏郊矣大王之救不至魏急則割地而約王雖欲救之豈有及哉秦王遽發兵赴魏魏復存唐雎之説也又曰楚絶齊齊舉兵攻楚陳軫謂楚王曰不如以地東解於齊而西謀於秦矣又曰文信侯欲攻趙而廣河間使張唐相燕張唐辭之少庶子甘羅曰臣請行之甘羅見張卿即曰今文信侯自請卿相燕而卿不肯行臣不知卿所死之處矣卿曰請孺子而行令庫具車廄具馬府具幣行有日矣戰國策曰東周欲為稻西周不下水東周患之蘇子謂東周君曰臣請使西周下水可乎乃往見西周之君曰君之謀過矣今不下水所以富東周也今其人皆種禾君若欲東周之乏不若一下水以病其所種下水東周必復種稻種稻而復奪之若是則東周之人可令一仰西周而受命於君矣西周君曰善遂下水蘇子亦得兩全矣又曰司馬錯與張儀爭論於秦惠王前錯欲伐蜀儀曰不如伐韓王問其説曰臣聞欲富者務廣其地欲強者務富其人欲王者務崇其德三資者備而至道興矣王曰善起兵伐蜀又曰司馬錯與張儀爭論於秦惠王前錯欲伐蜀儀曰不如伐韓王問其説對曰親魏善楚下兵三川誅周王之罪侵楚魏之地周自知不救九鼎寶器必出據九鼎案圖籍挾天子以令天下天下莫敢不聽此王業也又曰蘇秦發書陳篋為揣摩曰安有説人主不能出金玉錦繡取相之尊者乎又曰司馬錯與張儀爭論於秦惠王前錯欲伐蜀儀曰不如伐韓王問其説對曰臣聞爭名於朝爭利於市今三川周室天下之市朝也而不爭焉顧爭於戎狄又曰秦將急攻韓韓王安使公子韓非西入秦上書説秦王曰脣亡齒寒故曰兵者凶器陛下試聽臣之計則從者困而趙孤天下可蠶食也又曰以秦卒之勇車騎之多以當諸侯譬若放韓盧而逐駑兔也又曰司馬錯與張儀爭論於秦惠王前錯欲伐蜀儀曰不如伐韓王問其説對曰案圖籍挾天子以令天下錯曰不然蜀戎翟之長也以秦政之譬如使豺逐群羊王曰善起伐蜀又曰蔡澤對應侯曰君之祿位貴盛而身不退竊為君危之物盛則衰天下之常數也又曰張登謂趙魏曰齊欲伐河東何以知之齊之羞與中山之為王甚矣今召山中與之遇而許之王是欲用其兵也豈若令大國先與之王以止其遇哉趙魏許諾果與中山之王而親之中山東絶齊而從趙魏又曰蘇秦為燕説齊王歸燕之十城人有毀蘇秦於燕王左右賣國反臣也將作亂蘇秦恐得罪歸而燕王不復官也蘇秦見燕王曰臣東周之鄙人也無尺寸功而王親拜之於廟朝而禮之於廷今臣為主卻齊之兵而攻得十城宜以益親今者而王不官臣人必有不信傷臣於王者臣之不信王之福也史記曰初沛公引兵過陳留酈生上謁沛公拔弔曰延客入酈生入揖謂沛公曰今足下甚若暴衣露冠將兵助楚討不義足下何不自喜也臣願以事見又曰李斯説秦王曰夫以秦之強大王之賢足以滅諸侯成帝業秦王乃拜斯為長史聽其計又曰田常欲為亂於齊移兵欲伐魯子貢見吳王説曰齊與吳爭強切為王危之王曰善雖然子待我伐越而聽子子貢曰王必惡越請東見越王令出兵以從吳王大説使子貢之越越王許諾也又曰田常欲伐魯子貢至齊説田常曰君之伐魯過矣不如伐吳吳王果與齊人戰於艾陵大破齊師故子貢一出存魯亂齊戰國策曰鄒忌以鼓琴見威王王悅而舍之右室須臾王鼓琴鄒忌推戶入曰善鼓琴夫大絃濁以春者君也小絃廉折以清者相也擢之深而令人愈者政令也鈞以鳴大小相蓋因推而不害者四時也故曰琴音調而天下正也又曰秦圍邯鄲急且降平原君甚患之邯鄲傳舍吏子李同説平原君曰誠能令家之所有盡散以饗士士方其危苦之時易得耳於是平原從之得敢死之士三千李同遂與三千人赴秦軍秦軍為之卻三十里又曰漢王數困滎陽城皋酈生曰今燕趙已定唯齊未下臣請得奉明詔説齊王使為漢稱東藩上曰善又曰范增説項梁曰君江東楚將皆爭附君者以君代楚將為能復立楚之後也於是項梁然其言也又曰范陽人蒯通説范陽令曰竊聞公之將死故弔然賀得通而生又曰韓非説難曰計利害以難其攻直指是非以飾其身以此相持説之氏也戰國策曰蘇秦説六國從合秦為從長并相六國喟然歎曰使我有雒陽負郭田二頃豈能佩六國相印乎於是散千金以賜宗族又曰張儀説燕昭王曰今王事秦秦王必喜趙不敢妄動燕王曰今大客幸教之請西面而事秦王耳戰國策曰張儀聞蘇秦死乃説楚王曰夫為從者無以異於驅群羊而攻猛獸獸之與羊不格明矣今王不與獸而與群羊臣竊以為大王之計過又曰韓非知説之難為説難書曰所説實為厚利而顯為名高者也而説之以名高則陽收其身而實數疏之説以厚利則陰用其言而顯棄其身又曰漢王使隨何説淮南王隨何曰項王伐齊大王宜悉淮南之衆為楚軍前鋒今乃提空名以向楚臣竊為大王不取也淮南王陰許畔楚與漢又曰李斯詣秦會莊襄王卒乃求為秦相呂不韋舍人不韋賢之任以為郎李斯因以得説秦王秦王乃拜為長史聽其計
