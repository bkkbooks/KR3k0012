body:
  text: 文部二十一筆説文曰楚謂聿吳謂之不律燕謂之弗秦謂之筆釋名曰筆述也述而書之博物志曰蒙恬造筆崔豹古今注曰牛亨問曰古有書契已來便應有筆也世稱蒙恬造筆何也答曰自蒙恬始作秦筆耳以柘木為管以鹿毛為柱羊毛為皮所謂鹿毫竹管也非謂古筆也又問曰筆有彤管何也答曰彤赤漆耳使史官載筆故是赤管言以赤心事也毛詩柏舟靜女曰靜女其變貽我彤管古者后夫人有女史彤管之法后妃群妾以禮御于君所女史書其日月授之環以進退也箋云彤筆赤筆也彤管有煒悅懌女美曲禮曰史載筆士載言也漢書曰張安世持橐簪筆橐挈橐也近臣負橐簪筆從備顧問或有所記事孝武帝數十年見謂忠謹東觀漢記曰班超字仲升家貧為官傭寫書嘗輟書投筆歎曰大丈夫當效傅介子張騫立功異域以取封侯安能久事筆硯乎吳志曰曹公聞孫權以荊州資劉備大懼方作書不覺落筆於地齊書曰江淹嘗宿於冶亭夢一丈夫自稱郭璞謂淹曰吾有筆在卿處多年可以見還淹乃控懷中得五色筆一以授之爾後為詩絶無美句時人謂之才盡梁書曰紀少瑜嘗夢陸倕以一束青鏤管筆授之云我以此筆猶可用卿自擇其善者其文因此遒進又曰鄭灼家貧好學抄義疏以日繼夜筆毫盡每削用之隋書曰高祖復鄭譯官爵令內史令李德林立作詔書高潁戲謂曰筆乾譯答曰出為方嶽杖策言歸不得一錢何以潤筆上大笑又曰劉行本纍遷掌朝下大夫周代故事天子臨軒掌朝典筆硯持至御座則承御大夫取以進之及行本為掌朝將進筆於帝承御復欲取之行本抗聲謂承御曰筆不可得帝驚視問之行本言於帝曰臣聞設官分職各有司存臣既不得佩承御刀承御亦焉得取臣筆帝曰然因令二司各行所職國朝傳記曰虞監草行本師於釋智永智永常樓上學業成方下其棄筆頭至盈甕唐書曰柳公權為司封員外郎穆宗政僻嘗問公權筆何盡善對曰用筆在心心正則筆正上改容知其筆諫也五代史周史曰和凝年十七舉明經至京師忽夢人以五色筆一束以與之謂曰子才可以舉進士自是才思敏贍十九登進士第又曰馬裔孫初為河中從事因事赴闕宿於邏店其地有上邏神祠夜夢神見召待以優禮手授以筆一大一小覺而異焉及為翰林學士旋知貢舉私自謂曰比二筆之應也洎入中書吏奉二筆熟視大小如昔時夢中所授者漢官儀曰尚書令僕丞郎月給赤管大筆一雙篆題曰北宮二作西京雜記曰漢制天子筆以錯寶為跗毛皆秋兔之毫官師路扈為之又以雜寶為匣廁以玉壁翠羽皆直百金楊子法言曰槌提仁義絶滅禮學吾無取焉五帝者三王之筆舌寧有書不用筆言不由舌耶刀不利筆不銛宜加砥削之論衡曰知能之人須三寸之舌一尺之筆然後能自通神仙傳曰李仲甫潁川人漢桓帝時賣筆遼東市一筆三錢如無錢亦與筆魏末傳曰司馬宣王欲誅曹爽呼何晏作奏曰宜上君名晏失筆於地世説曰王東亭嘗夢有人與大筆其管如椽既覺説人云當有大手筆事不日烈宗晏駕哀策諡議並王所作也傳子曰漢末一筆之匣雕以黃金飾以和壁綴以隋珠文以翡翠此筆非文犀之楨必象齒之管豐狐之柱秋兔之翰用之者必被珠繡之衣踐雕玉之履矣王羲之筆經曰漢時諸郡獻兔毫出鴻都惟有趙國毫中用時人咸言兔毫無優劣管手有巧拙又曰有人以緑沉漆竹管及鏤管見遺録之多年斯亦可愛玩詎以金寶雕琢然為貴也又曰昔人或以琉璃象牙為筆管麗飾則有之然筆須輕便重則躓矣筆墨法曰作筆當以鐵梳梳兔毫毛及羊青毛去其穢毛使不髯茹羊青為心名曰筆柱或曰墨池東宮舊事曰皇太子初拜給漆筆四枚銅博山筆床副搜神記曰王祐病有鬼至其家留赤筆十餘枚在薦下曰可使人簪之出入辟惡凡舉事者皆無恙荊楚歲時記曰陸士衡云魏武帝劉婕妤以七月七日折璃琉筆嶺表録異曰番禺地無狐兔多用鹿毛野狸毛為筆又昭富春勤等州則擇雞毛為筆其用也亦與兔毫無異又曰嶺南無兔嘗有郡收得其皮使工人削筆者醉失之大懼因剪鬢鬚為筆筆甚善更使為之工者辭焉詰其由以實對遂下令使一戶輸人鬚或不能致輒責其直墨釋名曰墨晦也言以物晦墨也漢書王莽傳曰漢兵起莽以墨污渭陵延陵周垣東觀漢記曰和熹鄧后即位萬國貢獻悉禁絶惟歲供紙墨而己范子計然曰墨出三輔上價石百六十中三十下十韋仲將筆墨方曰合墨法好醇煙搗訖以細絹篩於缸中篩去草芥若細沙以細絹篩塵埃此物至輕微不宜露篩慮失飛去不可不慎墨一斤以好膠五兩浸梣皮汁中梣江南樊雞木皮也其皮入水緑色解膠又益墨色可下雞子白去黃五枚亦以真朱一兩麝香一兩皆別治細篩都合調下鐵臼中寧剛不宜澤檮三萬杵杵多益善合墨不得過二月九月溫時敗臭寒則難乾湩溶見風日碎破重不得過二兩蔡質漢官曰尚書令僕丞郎月賜渝糜大墨一枚小墨一枚東宮舊事曰皇太子初拜紿香墨四丸修復山陵故事曰玄宮物有墨五丸神仙傳曰漢桓帝徵仙人王遠遠乃題宮門四百餘字皆説方來帝惡之削之外字去內字復見墨入材裏葛龔與梁相書曰復惠善墨下士所無摧骸骨碎肝膽不足明報曹植樂府詩曰墨出青松煙筆出狡兔翰古人感鳥迹文字有改刊葛洪神仙傳曰班孟不知何許人也舒紙於前嚼墨一噴皆成字竟紙各有意義趙一非草書曰後世慕崔杜張子專欲草書為務十日一筆月數丸墨領袖如皂脣齒常黑屈指畫地爪折䚡出亦效嚬之增醜也陸雲與兄機書曰一日上三臺曹公藏石墨數十萬斤云燒此消復可用然不知兄頗見之不今送二螺鄭氏婚禮謁文讚曰九子之墨藏于松煙盛弘之荊州記曰築陽縣有墨山山石悉如墨顧微廣州記曰懷化郡掘塹得石墨甚多精好可寫書戴延之西征記曰石墨山北五十里山多墨可以書尋陽記曰廬山有石墨可書災祥集曰天雨墨君臣無道讒人進李尤研墨銘曰書契既造研墨乃陳煙石相附筆疏以申顧野王輿地志曰漢時王朗為會稽太守子肅隨在郡住東齋中夜有女從地出稱越王女與肅語曉別贈一丸墨肅方注周易因此便覺才思開悟硯釋名曰硯研也研墨使和濡也晉書懷帝陷於平陽劉聰引帝入宴謂帝曰卿為豫章王時朕與王武子俱造卿武子稱朕於卿卿言聞名久矣卿以所作樂府文示朕曰聞君善詞賦試為看也朕與武子俱為盛德頌卿稱善者久之又引朕射于皇堂朕得十二籌卿與武子俱得九籌卿又贈朕柘弓銀硯卿頗憶否帝曰安敢忘之恨爾日不得早識龍顏唐書曰柳公權常寶惜筆硯圖畫自扄鐍之常評硯以青州石末為第一言墨易冷絳州黑硯次之太公金匱曰研之書曰石墨相著邪心讒言無得汙白伍緝之從征記曰夫子床前有石硯一枚作甚古朴蓋孔子平生時物也西京雜記曰天子以玉為硯取其不凍拾遺記曰張華撰博物志奏武帝帝賜青鐵硯鐵是于闐國所獻鑄以為硯魏武帝上雜物疏曰御物有純銀參帶臺硯一枚鈍銀參帶員硯大小各一枚陳留志曰范喬年二歲祖父馨卒臨終撫其首曰恨不見汝成人以吾所用硯與之至五歲祖母以此言告喬便執硯啼哭東宮舊事曰皇太子初拜給漆石硯一枚崔實四民月令曰正月硯凍釋令童幼入小學學篇章十一月硯凍命童幼讀孝經論語世語曰曹爽與明帝少同硯書晉傅玄硯賦採陰山之潛璞簡衆材之修宜節方員以定形煆金鐵而為池設上下之剖判配法象乎二儀木貴其能軟石美其潤堅加采漆之膠固含沖德之清玄永嘉中記曰硯溪一源泉中多石硯劉澄之宋永初山川古今記曰興平石穴深二百許大石青色堪為硯紙釋名曰紙砥也平滑如砥石也服虔通俗文曰方絮曰紙東觀漢記曰黃門蔡倫典作尚方作紙所謂蔡侯紙也董巴記曰東京有蔡侯紙即倫也用故麻名麻紙木皮名穀紙用故魚網作紙名網紙也王隱晉書曰魏太和六年博士河間張揖上古今字詰其巾部紙今也其字從巾古之素帛依舊長短隨事截絹枚數重沓即名幡紙字從系此形聲也後和帝元興中中常侍蔡倫以故布搗銼作紙故字從巾是其聲雖同系巾為殊不得言古紙為今紙崔鴻前燕録曰慕容俊三年廣義將軍岷山公黃紙上表俊曰吾名號未異於前何宜便爾自今但可白紙稱疏沈約宋書曰張永善隸書又有巧思紙及墨皆自營造上每得永表啓輒執玩咨嗟自嘆供御者不之及也唐書曰杜暹為婺州參軍秩滿將歸州吏以紙萬餘張贈之暹唯受一百時人嘆曰昔清吏受一大錢復何異也語林曰王右軍為會稽謝公乞箋紙庫中唯有九萬枚悉與之桓帝云逸少不節拾遺記曰張華獻博物志賜側理紙萬番南越所獻也漢人言陟貍與側理相亂南人以海苔為紙其理縱撗袤側因以為名世説曰戴安道就范宣學所為范宣讀書亦讀書范宣抄紙亦抄紙桓玄偽事曰古無紙故用簡非主於敬也今諸用簡者皆以黃紙代之又曰玄令平淮作青赤縹緑桃花紙使惣精令速作之石虎鄴中記曰石虎詔書以五色紙著鳳雛口中范寧教曰土紙不可以作文書皆令用藤角紙盛弘之荊州記曰棗陽縣一百許步蔡倫宅其中具存其傍有池即名蔡子池倫漢順帝時人始以魚網造紙縣人今猶多能作紙蓋倫之遺業也異苑曰張仲舒在廣陵晨夕輒見行側有赤氣後空中忽雨絳羅於其庭周廣七八分長五六寸皆箋紙繼之廣長亦與羅等紛紛甚快經宿仲舒暴疾死孫放西寺銘曰長沙西寺層搆傾頽謀欲建立其日有童子持紙花插地故寺東西相去十餘丈於是建剎正當花處博咸紙賦曰既作契以代繩又造紙以當策劉孝威謝官紙啓曰雖復鄴殿鳳銜漢朝魚網平準桃花中宮穀樹固以慚茲靡滑謝此鮮華東宮舊事曰皇太子初拜給赤紙縹紅麻紙勑紙法各一百
