body:
  text: 地地禮曰地不愛其寶符瑞圖曰地得其性不震搖也祥瑞圖曰王者益土地則社稷及市中地長山管子曰霸王之主興則昇山之神見休子曰少皞生於稚華之渚渚一旦化為山鬱鬱葱葱焉湖吳志曰孫皓天璽年吳郡言臨平湖自漢來草穢壅塞今更開通長老傳言此湖塞天下大亂此湖開天下寧河北齊書曰武帝大寧二年齊州黃河清改清河元年隋書曰煬帝大業三年武陽言河水清唐書曰貞觀十四年陝州奏界內二百余裏正月元日河水變清四日乃止又曰高宗永徽五年六日濟州黃河清十六里又曰肅宗乾元二年嵐州言黃河三十里清如井水十月李光弼破史思明眾五萬易乾鑿度曰聖人受命瑞應先見於河河水清又曰孔子云天之將降嘉應河水清變為白白變為赤赤變為黑黑變為黃各三日鄭玄曰聖王為政理之所致禮斗威儀曰君乘土而王其政太平則河溓宋均曰溓不決不溢也謂溓然不盛也溓勒兼切符瑞圖曰河溓者河水清也孫氏瑞應圖曰王者循天命而行天道四通則河出龍圖東觀漢記曰光武從邯鄲避王郎兵南至下曲陽滹沱河道吏還言河水流澌無舡不可渡左右皆惶畏為王郎所及上命王霸前往視之實然霸念還言驚眾雖不可渡且臨水止尚阻即白冰堅可渡士眾大喜上大笑曰果妄言也比至河流澌冰合可履馬欲僵以囊盛沙布冰上既度未數里冰陷也海孫氏瑞應圖曰王者出而王道通移則海不揚鴻波禮斗威儀曰君乘水而王其政和平則江海著其神象宋均曰神不見但著象而已青黃赤白玄冰具有此色焉春秋運斗樞曰搖光則海出明珠雒謝承後漢書曰沛國陳宣子字子建建武十年雒水出造津城門或欲築塞之宣諫曰昔王尊正身金隄水退況聖主耶言未絕而水去尚書中候曰堯沉壁於洛赤光起又曰武王沉壁青雲浮洛易乾鑿度曰帝德之盛應於洛水先溫九日乃寒五日變為五色玄黃水陳書曰高祖至南康破蔡路養李遷仕贛石舊有二十四灘多巨石行旅者以為難高祖之發也水暴起三百里石皆沒唐書曰武德元年七月新豊鸚鵡谷水清世傳此水清天下平禮斗威儀曰君乘土而王其政太平則蒙水出於山宋均曰蒙小水也出可溉灌生無不植也異苑曰臨淄牛山下有女水齊人諺曰世治則女水流世亂則女水竭慕容超時乾涸彌載暨宋武薄伐而激洪波醴泉禮曰地出醴泉東觀漢記曰光武中元元年祠長陵還醴泉出京師飲之者痼疾皆差也唐書曰貞觀二十三年肅州醴泉出有文石五彩蓋泉尚書中候曰醴甘也取名醴酒又曰堯砥德匪懈醴泉出又曰文命盛德俊乂在官醴泉出山禮斗威儀曰醴泉味甘王政和可貴故水甘也禮稽命徵曰王者刑殺當罪賞賜當功得禮之儀則醴泉出闕庭也又曰王者得禮之制則澤谷之中白泉出飲之使壽長禮含文嘉曰神農修德作耒耨地應以醴泉春秋潛潭巴曰君德應陽則醴泉出焉春秋潛潭樞曰旋星得則醴泉出春秋感精符曰德淪於地則醴泉出焉孝經援神契曰王者德至淵泉則醴泉出孫氏瑞應圖曰醴泉者水之精也味甘如醴泉出流所及草木皆茂飲之令人壽也又曰理訟得所醴泉出於京師有仙人以爵酌之白虎通曰德至淵泉則醴泉湧醴泉者美泉也狀如醴酒可以養老也鶡冠子曰聖人德上及太寧中及萬靈則醴泉出徐整正曆曰黃帝上時以醴泉為漿井孫氏瑞應圖曰王者清淨則浪井出有仙人主之典略曰浪井者不鑿自成之井池唐書曰大曆八年解州安邑兩池生乳鹽後賜號寶應靈慶池土左傳曰晉文公過衛文公不禮出於五鹿乞食於野野人與之塊公子欲鞭之子犯曰天賜也稽首受而載之史記曰黃帝時有土瑞故以土德王庚溫瑞應圖曰王者德溫遠方則物化為土蜀王本紀曰蜀王獵於褒谷秦王以金一笥遺蜀報以禮物盡化為土秦王大怒臣下拜賀曰土者地也今秦當有蜀矣社漢書曰昌邑王門社有枯樹復生枝葉後宣帝立晉書曰武帝時洛陽太社中有青氣占者以為東莞後當有天子東莞王改封琅邪王江東之應也春秋潛潭巴曰里社鳴此里有聖人其呴百姓歸之呴鳴之怒者湯起放桀時有此祥呴呴呼后切石漢書曰昭帝時太山萊蕪山南匈匈有數千聲民視之有大石自立高一丈五尺大三十八圍入地深八尺三石為足立後有白鳥數千集其旁宣帝中興之瑞也唐書曰貞觀十九年陝州有石理成文曰李君王三字甚明又曰永徵二年藍田縣令田仁注獻瑞石文理成字曰天安永得立祥瑞圖曰張掖之柳谷有石始見於建安成形於黃初文備於太和建安黃初太和皆年號其石狀象龜嶷然盤峙廣一丈六尺長一丈七尺周圍五丈餘蒼質麟鳳龍馬炳燠成形文字燦然斯蓋大晉受終聖德兼該之應也魏氏春秋曰明帝青龍三年張掖刪丹縣金山玄川溢涌寶石負圖狀象靈龜立于川西有石馬七其一仙人騎之其一羈絆其五有形而不善成有玉匣關闔於前上有玉字玉缺二王橫一又有麒麟在東鳳凰在南白虎在西犧牛在北馬自中布列南方有字曰大討曹金但取之此司馬氏革運之徵瑞應圖曰碧石玉者玩弄之物不用則出禮稽命徵曰王者得禮之制則澤谷之中乃生白石又曰王者君臣父子夫妻尊卑有別則石生於澤也禮含文嘉曰內外之制各得其宜則山澤出龜寶石萐莆孫氏瑞應圖曰萐莆王者不徵滋味庖廚不踰深盛則生於廚一名倚扇一名實閭一名倚萐生如蓮枝多葉少根如絲轉而生風主於飲食清涼驅殺蟲蠅舜時生於廚又堯時冬死夏生又舜時生於廚及階左春秋潛潭巴曰君臣和得道度叶中則萐莆孳於庖廚孝經援神契曰王者德至山陵則阜出萐莆宋均注曰文典備則萐莆應也華莆祥瑞圖曰雙蓮為苹又曰華苹者其枝正平王者德剛則仰弱則低又曰王者政令均則華苹孝經援神契曰王者德至於地則華苹感朱草孫氏瑞應圖曰朱草草之精也聖人之德無所不至則生又曰朱草者百草之精也王者德無所不通四方有歌詠之聲則生大戴禮共朱草日生一葉至十六日落一葉周而復始尚書大傳曰王者德下究地之厚則朱草生又曰帝命周公踐祚朱草暢生尚書中候曰文命咸得俊乂在官則朱草在郊又曰堯德清平比隆伏羲故朱草生郊禮斗威儀曰君乘火而王其政頌平則地生朱草春秋感精符曰王者德洽於地則朱草生食之令人不老春秋運鬥樞曰樞星則朱草生春秋繁露曰君勸農事無奪民時使之歲不過三日行十一之稅進經術之士開閶閭通障塞恩及草木則朱草生孝經援神契曰王者德至草木則朱草生後漢書曰光武時朱草生于水涯晉書曰武帝時朱草生白虎通曰朱草赤色也可以染綘別成黼黻之服列為尊卑之差淮南子曰太清之世四時不失其房日月揚光五星循軌則朱草生抱朴子曰朱草狀似小桑裁長三四尺枝葉皆赤莖如珊瑚生名山嶺石之下刻之汁流如血以玉及八石金銀投中中立可丸為泥以金投中名曰金漿以玉投之名曰玉釀服之皆長生也鶡冠子曰聖王德上及太清下及太寧中及萬靈則朱草生魏略曰文帝欲受禪朱草生於文昌殿側蓂莢孫氏瑞應圖曰蓂莢者葉圓而五色一名曆莢十五葉日生一葉從朔至望畢從十六日毀一葉至晦而盡月小則一葉卷而不落聖明之瑞也人君德合乾坤則生祥瑞圖曰蓂莢堯時生尚書大傳曰周公輔幼主不矜功則蓂莢生尚書中候曰周公作樂而治蓂莢生春秋運斗樞曰老人星臨國則蓂莢生又曰箕星得則蓂莢生孝經援神契曰王者德至於地則蓂莢生風俗通曰按孝經說古太平蓂莢生階其味酸王者取以調味後以醯醢代之徐整正曆曰黃帝之時以蓂莢者瑞草也蓋神靈之嘉應也白虎通曰王者考曆得其分度則蓂生於階莢者樹名也嘉穀孫氏瑞應圖曰嘉禾五穀之長盛德之精也文者則二本而同秀質者則同本而異秀此夏殷時嘉禾也又曰周時嘉禾三年本同穗異貫桑而生其穗盈箱生於唐叔之國以獻周公曰此嘉禾也太和氣之所生焉此文王之德乃獻文王之廟書曰唐叔得禾異畝同頴各一隴合為一穗獻之天子王命周公作嘉禾篇尚書中候曰嘉禾莖長五尺三十五穗禮含文嘉曰神農作耒耨天應以嘉禾又曰綏五車明五禮則五禾應以大豊禮斗威儀曰人君乘土而王其政升平則嘉穀並生詩含神霧曰堯時嘉禾七莖連三十五穗春秋運斗樞曰旋星得嘉禾液孝經援神契曰王者德至於地則嘉禾生周書曰神農時天雨粟神農耕而種之然後五穀興以助果實漢書曰宣帝時嘉穀降于郡國後漢書曰安帝時九真嘉禾生五百六十本七百六十八穗東觀漢記曰光武以建平元年生於濟陽縣舍時有嘉禾一莖九穗縣境大熟因名曰秀又曰章帝時嘉禾嘉麥日月不絕魏志曰文帝欲受禪郡國三嘉禾生王隱晉書曰元帝初藉藁草悉成未沈約宋書曰文帝時醴湖生嘉粟一莖九穗又曰宋文帝元嘉二十五年嘉禾生華林園十株七百穗又曰孝武帝大明元年嘉禾生清暑殿鴟尾中一株六穗齊書曰武帝時固始縣嘉禾一莖五穗新蔡又獲一莖九穗一莖七穗梁起居注曰大同六年九月始平獻嘉禾一莖十七穗白虎通曰嘉禾者太和之為美瑞者也晉徵祥說曰王者盛德則嘉禾生嘉禾者仁卉也其大盈箱一桴二米國政質則同本而異頴國政文則同頴而異本唐書曰開元十九年楊州奏穭生稻二百一十五頃再熟稻一千八百頃其粒與常稻無異穭音旅又曰大中二年福建進瑞粟十五莖莖有五六穗又曰大中六年淮南節度使杜悰奏海陵高郵兩縣百姓於宮河中漉得異米煮食呼為聖米秬鬯孫氏瑞應圖曰秬鬯者三隅之黍一粰三米王者宗廟修則生又曰昭穆序祭祠宰人咸有敬讓禮容之節威儀之美則秬鬯生又曰王者節敬依禮度親踈有別則秬鬯生又曰黃帝時南夷乘白鹿來獻秬鬯孝經援神契曰王者德至於地則秬鬯生福草孫氏瑞應圖曰王者宗廟至敬則福草生於廟一云禮草禮斗威儀曰君乘木而王其政升平則福草生廟中宋均曰廟中生草蓋福草也即朱草之別名可以染祭服故應仁孝而生廟中福并孫氏瑞圖曰福并瑞草生王者有德則福并生威蕤孫氏瑞應圖曰王者禮備則威蕤生一曰威蕤又曰王者愛人倫則威蕤生於殿前屈軼孫氏瑞應圖曰屈軼者太平之代生於庭有佞人則草指之延嘉孫氏瑞應圖曰延嘉王者有德則見又曰王孝道行則延嘉生孝經援神契曰天子至德屬于木四海則延嘉生紫達孫氏瑞應圖曰紫達者王者仁義行則常見禮斗威儀曰君乘土而王其政太平則紫達常生芝孫氏瑞應圖曰王者慈仁則芝草生食之令人延年又曰王者寵近耆老養有道則芝莢生春秋運斗樞曰搖光得則陵出玄芝孝經援神契曰王者德至於草木則芝草生漢書曰武帝元封六年甘泉宮內產芝草九莖連葉宣帝神雀元年金芝九莖產于涵德殿銅池中如淳曰銅池承霤也晉灼曰以銅作池韋昭曰以銅飾池邊也後漢書曰明帝時郡國上芝英又曰章帝建初三年零陵獻芝草東觀漢記曰桓帝時芝草生中黃藏府宋書曰順帝時臨城縣生紫芝齊書曰武帝時襄陽獲紫芝隋書曰開皇十九年朱雀等十六門生芝草唐書曰貞觀十七年安禮門御榻產靈芝五莖又皇太子寢室中產素芝十四莖悉為龍鳳之狀又曰貞觀十七年滁州言所部川源徧生芝草百寮及雍州父老上表固請封禪唐春秋曰貞觀十九年雍州李樹生芝英赤蓋紫光色鮮麗司徒長孫無忌與官方岳上表請禪不許又曰天寶七載三月大同殿柱礎產王芝兩莖又曰肅宗上元二年甲辰延英殿御卒梁上玉芝生一莖三花御製靈芝詩以示群下又曰上元二年九月壬午朔皇后奏含暉院生金芝大同起居注曰九年金芝二十八莖生于殿庭少府卿蕭介以聞古今注曰漢武時甘泉殿房內產芝九莖連葉作芝房之歌白虎通曰王者德至於山則芝實茂孫整長歷曰黃帝以五芝為房名瑞令記曰食芝延年不終與真人同論衡曰建初三年零陵泉陵縣女子愽寧宅內生芝草五本莖葉紫色太守沈酆遣門下掾奉獻皇帝悅懌又曰芝草一年三華食之令人眉壽慶世蓋仙人之所食又曰紫芝者其栽如豆繆襲神芝讚曰青龍元年神芝產于長平之習陽許昌典農中郎蔣充奉表以聞其色丹紫其質光耀上別為三幹分為九枝散為三十六莖委綏連屬有似珊瑚之狀考圖按譜蓋美乎前代矣蘭禮斗威儀曰君乘金而王其政和平則蘭常生宋均曰蘭生主給和調也茅史記曰齊桓公欲封禪管仲曰古之封禪鄗上之黍北里之禾江淮之間有一茅三脊所以為藉周書曰成王時奇幹獻茅其頭若雄雉佩之不昧宋書曰孝武時三脊茅生石頭西岸江夏王義恭表勸封禪唐書曰麟德元年毫州奏老君廟側生三脊茅蒿大戴禮曰周時德澤洽和蒿大可以為宮柱曰蒿宮此天子之路寢也木禮稽命徵曰王者得禮之制則澤谷之中生赤木又曰王者得禮之宜則宗廟生祥木地鏡圖曰國治益地則木生水上又曰國理君喜則樹木忽自大京房易傳曰君有德生聖子則木生屋上及朝廷又曰君德強且高昌則木生城脅一尺圍已上長數丈此謂城強孫氏瑞應圖曰王者德化洽八方合為一家則木連理又曰王者不失民心則木連理漢書曰武帝幸雍得奇木枝旁出復合上異之終軍曰眾枝內附示無外也殆將有削尤袵而蒙化者後漢書曰明帝永安十七年甘露仍降樹枝內附仍頻也內附謂木連理也西南夷哀牢儋耳僬僥槃木白狼動黏諸種前後慕義貢獻西域諸國遣子入侍宋書曰文帝元嘉中有穀櫟二樹連理隋書曰𥂕厔縣獻連理樹植之宮庭唐書曰貞觀十八年山南獻木連理交錯玲瓏有同羅日一丈之幹并枝者二十餘所又曰二十一年玉華宮李樹連理隔澗合枝白虎通曰王者德至草木則木連理也晉中興徵祥說曰王者德澤純洽八方同一則木連理連理者或枝還合或兩樹合共曹植魏德論曰皇樹嘉德風靡雲披有木連理別幹同枝將承大同應天之規唐書曰興元元年八月毫州真源縣大空寺李樹植來十四年長一丈八尺今秋忽上聳高六尺周廻似蓋九十餘尺賓連闊達孫氏瑞應圖曰王者庶嫡有序男女有別則賓連閱生於房一名賓連達一名賓連闊生於房室象御妃有節也白虎通曰賓連闊達者樹名也其狀連累相承平露孫氏瑞應圖曰平露者如蓋生於庭以知四方之政王者不私人以官則生若東方政不平則西低北方政不平則南低西方政不平則東低南方政不平則北低四方政不出其根若絲一曰平兩又曰平兩者如蓋以知四方王者政平則生白虎通曰王者使賢不肖位不踰則平露生庭平露者樹名也
