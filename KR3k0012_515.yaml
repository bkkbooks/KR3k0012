body:
  text: 宗親部四兄弟上釋名曰兄荒也荒大也故青徐人謂兄曰荒第曰第也相次第而生也說文曰兄長也周易曰家人卦曰父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣尚書五子之歌曰太康尸位以逸豫滅厥德黎民咸貳乃盤遊無度畋于有洛之表十旬不反有窮后羿因民弗忍距于河厥弟五人御其母以從徯于洛之汭五子咸怨述大禹之戒以作歌又君陳王若曰君陳惟爾令德孝恭惟孝友於兄弟克施有政又康誥曰王若曰孟侯朕其弟小子封孔安國曰封康叔名稱小子明當受教訓惟乃丕顯考文王克明德慎罰弗敢侮鰥寡庸庸祗祗威威顯民爾雅曰男子先生為兄後生為弟又曰張仲孝友善父母為孝善兄弟為友毛詩棠棣曰棠棣燕兄弟也閔管蔡之失道故作棠棣焉棠棣之華萼不韡韡凡今之人莫如兄弟死喪之威兄弟孔懷原隰襃矣兄弟求矣脊鴒在原兄弟急難每有良朋況也永歎兄弟鬩于牆外禦其侮每有良朋烝也無戎喪亂既平既安且甯雖有兄弟不如友生儐爾籩豆飲酒之飫兄弟既具和樂且孺又何人斯曰伯氏吹塤仲氏吹箎土曰塤竹曰箎云伯仲喻兄弟也又頍弁曰爾酒既旨爾肴既嘉箋云旨嘉皆美也汝猶己美矣汝餚已美矣何已不同與族人燕也言其知能具其禮而弗為之也豈伊異人兄弟匪他又氓曰兄弟不知咥其笑矣靜言思之躬自悼矣又葛藟曰綿綿葛藟在河之漘終遠兄弟謂他人昆謂他人昆亦莫我聞又曰枤杜剌時也君不能親其宗族骨肉離散獨居而無兄弟將為沃所并爾有枤之杜其葉湑湑獨行踽踽豈無他人不如我同父嗟行之人胡不比焉人無兄弟胡不佽焉有枤之杜其葉菁菁獨行睘睘豈無他人不如我同姓嗟行之人胡不比焉人無兄弟胡不佽焉又六月日四壯廢則君臣缺矣皇皇者華廢則忠信缺矣棠棣廢則兄弟缺矣又陟岵曰陟彼岡兮瞻望兄兮兄曰嗟予弟行役夙夜必偕上慎旃哉猶來無死又泉水曰嗟我兄弟邦人諸友莫肯念亂誰無父母又曰黃鳥剌宣王也剌其以陰禮教親而不至聰兄弟之不固者也黃鳥黃鳥無集于桑無啄我梁此邦之人不可與明言旋言歸復我諸兄又斯干曰兄及弟矣式相好矣無相猶矣似續妣祖又行葦曰戚戚兄弟莫遠具爾或肆之筵或授之几又角弓曰角弓父兄剌幽王也不親九族而信讒佞骨肉相怨故作是詩也騂騂角弓翩其反矣兄弟婚姻無胥遠矣此今兄弟綽綽有裕不令兄弟交相為瘉又將仲子曰將仲子剌莊公也不勝其母以害其弟弟叔失道而公不制祭仲諫而公弗聽小不忍而致大亂焉將仲子兮無踰我牆無折我樹桑豈敢愛之畏我諸兄仲可懷也諸兄之言亦可畏也又揚之水曰揚之水不流束楚終鮮兄弟維予與汝無信人之言人實廷女揚之水不流束薪終鮮兄弟維予二人無信人之言人莫不信又皇矣曰維此王季因心則友則友其兄則篤其慶載錫之光又蓼蕭曰蓼彼蕭斯零露泥泥既見君子孔燕愷悌宜兄宜弟令德壽考為兄亦宜為弟亦宜禮記王制曰兄之齒鴈行朋友不相踰又檀弓曰子柳之母死子碩請具子柳曰何以哉子碩曰請粥庶弟之母子柳曰如之何其粥人之母以葬其母也不可既葬子碩欲以賻布之餘具祭器子柳曰不可吾聞之也君子不家於喪請班諸兄弟之貧者周禮春官曰大宗伯之職以脤膰之禮親兄弟之國脤膰祭社稷宗廟之肉也賜以同姓之國同福祿也兄弟有共先王者也魯定公十四年天王使石尚來歸脤也儀禮醮辭曰旨酒既清嘉薦亶時亶誠也古文亶為癉始加元服兄弟具來孝友時格永乃保之左傳桓公曰宋穆公疾召大司馬孔父而屬殤公焉曰先君舍與夷而立寡人寡人不敢忘若以大夫之靈得保首領以歿先君若問與夷其將何辭以對請子奉之以主社稷寡人雖死亦無悔焉對曰群臣願奉馮也公曰不可先君以寡人為賢使主社稷若棄德不讓是廢先君之舉也豈曰能賢光昭先君之令德可不務乎吾子其無廢先君之功使公子馮出居于鄭杜預曰公子馮穆公子也穆公卒殤公即位又襄公曰宋向戍來聘且尋盟見孟獻子尤其室曰子有令聞而美其室非所望也對曰我在晉吾兄為之毀之重勞且不敢間杜預曰傳言獻子友于兄且不隱其實也又曰文上曰穆伯如莒蒞盟且為襄仲逆及鄢登城見之美鄢城莒邑自為娶之仲請攻之文公將許之叔仲惠伯諫惠伯叔子孫也曰臣聞之兵作於內為亂於外為寇寇猶及人亂自及也今臣作亂而君不禁以啟寇讎若之何公止之惠伯成之平仁子也使仲舍之公孫敖反之還莒女也復為兄弟如初又文下曰齊人歸公孫敖之喪為孟氏且國故也葬視共仲聲己不視帷堂而哭襄仲欲勿哭惠伯曰喪親之終也惠伯叔彭生也雖不能始善終可也史佚有言曰兄弟致美救乏賀善弔災祭敬喪哀情雖不同母絕其愛親之道也子無失道何怨於人襄仲說帥兄弟以哭之又昭元曰秦后子有寵於桓如二君於景后子秦桓公子景公母地鍼也其權寵如兩君也其母曰弗去懼選鍼適晉具車千乘曰秦伯之弟鍼出奔晉罪秦伯也后子享晉侯造舟于河十里舍車自雍及絳歸取酬幣終事八反司馬侯問曰子之車盡於此而已乎對曰此之謂多矣若能少此吾何以得見焉又隱公曰鄭莊公弟共叔段居京謂之京城太叔祭仲諫曰都城過百雉國之害也無使滋蔓蔓難圖也蔓草猶不可除況君之寵弟乎又襄二曰吳諸樊既除喪將立季札杜預曰札諸樊弟也辭曰曹宣公之卒也諸侯與曹人不義曹君將立子臧子臧去之遂弗為也以成曹君君子曰能守節君義嗣也諸樊適子故曰義嗣誰敢干君有國非吾節也札雖不才願附於子臧以無失節固立之棄其室而耕乃舍之傳言季札之讓且明吳兄弟相傳又曰兄弟天倫兄先弟後天之倫次論語曰周有八士伯達伯適仲突仲忽叔夜叔夏季隨季騧包氏曰周時仲乳生八子皆為顯士故記之也又曰子路問曰何如斯可謂之士矣子曰切切偲偲怡怡如也可謂士矣朋友切切偲偲兄弟怡怡馬融曰切切偲偲切責之皃也怡怡和順之皃也又為政曰或謂孔子曰子奚不為政子曰書云孝乎惟孝友于兄弟施於有政是亦為政奚其為為政又顏淵曰司馬牛憂曰人皆有兄弟鄭玄曰牛兄桓魋行惡死喪無日我為無兄弟我獨亡子夏曰商聞之矣死生有命富貴在天君子敬而無失與人恭而有禮四海之內皆兄弟也君子何患乎無兄弟也包氏曰君子䟽惡而友賢九州之人皆可以禮親之史記曰伯夷叔齊孤竹君之二子也父欲立叔齊及卒叔齊讓伯夷伯夷曰父命也遂逃去叔齊亦不肯立而追之國人立其中子於是伯夷叔齊聞西伯昌養老往歸焉又曰信陵君無忌謂魏王曰秦與戎翟同俗有虎狼之心不顧親戚兄弟禽獸耳故太后母也而以憂死穰侯舅也功莫大焉而竟逐之兩弟無罪而再奪之國此於親戚若此而況於仇讎之國乎又曰漢五年漢王與項羽相距京索之間數使使勞苦丞相蕭何鮑生謂丞相曰王暴衣露蓋數使勞苦君者有疑君心焉為君計遣君子孫昆弟能勝兵者悉詣君所上必益信君於是何從其計漢王大說又曰卜式者河南人也以田畜為事親死式有少弟弟壯式脫身出分獨取畜羊百餘田宅財物盡與弟式入山牧十餘歲羊致千餘買田宅而其弟盡破其生式輒復分與弟者數矣又曰周公旦武王弟也及武王即位旦常輔翼武王用事居多又曰朱公居於陶中男殺人囚於楚朱公告其少子生往視之乃裝黃金千鎰置褐器中載以一牛車且遣其少子朱公長男請欲行不聽長男曰家有長子曰家督今弟有罪大人不遣乃遣少弟是吾不肖欲自殺其母為言公從之長男竟持其弟喪歸至其母及邑人盡哀之唯朱公獨笑曰吾固知必殺其弟也彼非不愛其弟也顧有所不能忘者也是少與我俱見苦為生難故重棄財至如少弟者生而見我富乘堅驅良逐狡兔豈知財所從來故輕棄之前日吾所以為欲遣少子固為其能棄財而長者不能故卒以殺其弟事之理也無足悲者吾日固已望其喪之來也又曰蒙恬弟毅仕至上卿出則參乘入則御前蒙恬任外事而毅常為內謀名為忠信故雖諸將相莫敢與之爭焉又曰漢王滅項籍立為皇帝田橫懼誅與其徒屬五百餘人入海居島中高帝聞之以為田橫兄弟本定齊齊人賢者多附焉乃使赦田橫罪而召之田橫與其客二人乘傳詣雒陽謂其客曰橫始與漢王俱南面稱孤今漢王為天子而橫乃為亡虜北面事之其恥固已甚矣且吾烹人之兄與弟併肩而事王縱彼畏天子詔不敢動我獨不愧於心乎遂自剄令客奉其頭從使者馳奏之高帝曰嗟乎有以也夫起布衣兄弟三人更王豈不賢哉為之流涕又曰季布弟季心氣蓋關中遇人恭謹為任俠方數千里士皆爭為之死當是時季布以諾心以勇著聞又曰衛青為侯家人少時歸其父父使牧羊先母之子皆奴畜之不以為兄弟數青常至甘泉居室有一鉗徒相青曰貴人也官至封侯青笑曰人奴之生得無笞罵即幸矣何得封侯漢書曰陳平陽武戶牖人也少時家貧好讀書有田三十畝與兄伯居伯常耕田縱平游學又曰何武字君公蜀郡郫人武兄弟五人皆為郡吏郡縣敬憚之又曰田蚡封武安侯為丞相召客飲坐其兄蓋侯北鄉自坐東鄉以為漢相尊不可以兄故私撓由此滋驕又曰丞相韋賢封扶陽侯長子方山早終次子弘少子玄成初弘為太常丞職奉宗廟典諸陵邑煩劇多罪過父賢以弘當為嗣故勑令自免弘懷嫌不去官及賢病篤弘竟坐宗廟事繫獄罪未決室家問賢當為後者賢恚不肯言於是賢門生博士等與宗室計議共矯賢令以玄成為後賢薨玄成在官聞喪又言當為嗣玄成深知其非賢雅意即陽為病狂妄笑語士大夫多疑其欲讓爵遜兄者丞相御史劾奏之不得已受侯爵又曰左馮翊韓延壽行縣至高陵有昆仲相訟田延壽恥不能明教化因入傳舍閉閤思過於是訟者自髡肉袒謝罪又曰嚴延年兄弟五人有吏才至大官東海號其母曰萬石嚴嫗又曰金日磾兩子賞建俱為侍中與昭帝略同年共臥起賞為奉車建駙馬都尉及賞賜佩兩綬上謂霍將軍曰金氏兄弟兩人不可使俱兩綬耶霍光對曰賞自嗣父為侯耳上笑曰侯不在我與將軍乎光曰先帝之約有功乃得封侯又曰張延壽已歷位九卿既嗣侯國在陳留別邑在魏郡租入歲千餘萬延壽自以身無功德何以能久堪先人大國數上書讓減戶邑又因弟陽都侯彭祖口陳至誠天子以為有讓乃徙封平原并一國戶口如故而租稅減半又曰王商字子威涿郡蠡吳人商少為太子中庶子以肅敬敦厚稱父薨商嗣為侯推財以分異母諸弟身無所受居喪哀戚於是大臣薦商行可以勵群臣義足以厚風俗宜備近臣繇是擢為諸曹侍郎中郎將范曄後漢書曰光武郭后諱聖通真定槀人也為郡著姓父昌讓田宅財產數萬與母弟國人義之又曰馬援字文淵扶風茂陵人也援三兄況余員並有才能援年十二而孤少有大志諸兄奇之嘗受齊詩意不能守章句乃辭況欲就邊郡田牧況曰汝大才當晚成良工不示人以補直從所好會況卒援行服暮歲不離墓所
