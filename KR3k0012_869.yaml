body:
  text: 火部一火上釋名曰火化物也亦言燬也物入即皆毀壞也易曰水流濕火就燥又曰風自火出家人由內以相成熾也又曰天與火同人君子以類族辨物君子小人各得所同又曰火在天上大有君子以遏惡揚善順天休命大有包容之象也故遏惡揚善成物之美順夫天德休物之命又曰燥萬物者莫熯呼旱切乎火書曰火炎崑岡玉石俱焚又曰惟女含德不愓豫一人豫若觀火愓懼也觀執也我觀火者喻刑罰可畏之也又曰若火之燎于原弗可嚮邇火之燎于原其炎熾之明不可嚮近也又曰五行二曰火火曰炎上炎上作苦詩曰叔在藪火烈具舉禮曰孟夏之月盛德在火又曰季春出火為焚也謂焚萊也凡出火以火出建辰之月火始出又曰火之於民也尊而不親左傳曰人火曰火天火曰災又曰兵猶火也不戢將自焚也又曰火龍黼黻火盡為龍又曰古之火正或食於心或食於咮以出內火是故咮為鶉火心為大火謂火正之官配食於火星也建辰之月鶉火星昏在南方則令民放火建戍之月大火星伏在日下夜不得見則令民內火禁放火也陶唐氏之火正閼伯居商丘閼伯高辛氏之子也傳曰遷閼伯於商丘主辰大火也今為宋星然則商丘在宋地也祀大火而火紀時焉謂出內火時也相土因之故商主大火相土契孫商之祖也始代閼伯之後居商丘祀大火也又曰郯子云炎帝以火紀故為火師而火名又曰昭公十七年冬有星孛于火辰西及漢夏之八月辰星見在天漢西今孛星出辰西光芒東及天漢申須曰彗所以除舊布新也申須魯大夫天事恆象天道恆以象頴告示人今除於火火出必布焉諸侯其有火災乎今火向伏故知當須火乃布散為災周禮曰春秋以木鐸修火禁火星以春出以秋入因天時而以成又曰亨人掌供鼎鑊以給水火之齊鑊所以煮肉及魚臘之器既熟乃脀于鼎齊多少之量齊音劑又曰卜師掌開龜楊火以作龜致其墨揚火猶熾也致其墨者熟灼之明其兆又曰司爟掌行火之政令四時變國火以救時疾行猶用也變猶易也鄭司農說以鄹子曰春取榆柳之火夏取棗杏之火季夏取桑柘之火秋取柞楢之火冬取槐檀之火季春出火民咸從之季秋內火民亦如之鄭司農云以三月本時昏心星見于辰上使民出火九月本黃昏心星伏在戍上使民內火故春秋傳曰以出內火時則施火令楚菜之時凡祭祀則祭爟報其為明之切禮如祭爨凡國失火野焚菜則有刑罰焉野焚菜民擅放火又曰穴氏掌攻蟄獸各以其物火之蟄獸熊罷之屬各藏者也將攻之必先燒其所食之物放其穴誘出之乃可得之以時獻其珍異皮革又曰柞氏掌攻草木及林麓林人所養者山足曰麓夏日至令刊陽木而火之冬日至令剝陰木而水之刊剝牙言耳昏謂斫去次地之皮生南為木生山北為陰木火之水之則使其肄不生若欲其化也則春秋變其水火化猶生也謂時以種穀也變其水火者乃所火則水之所水則火之則其土和羹又曰秋官司恆氏掌以夫燧取明火於日夫燧陽燧也史記曰燕攻即墨田單乃收城中牛千頭為繒絳衣畫以五彩龍文束兵於角結火於尾穿城而出壯士御枚後牛所觸輒死壯士擊之城上大譟燕師大駭又曰龐涓追孫臏量其行暮當至馬陵乃斫大樹白而書之曰龐涓死此下於是令齊軍萬弩夾道而伏曰暮見火舉而俱發龐涓夜至見白書乃鑽火讀之未畢萬弩俱發龐涓大敗又曰蘇代謂魏王曰夫以地事秦猶抱薪救火薪不盡火不滅也又曰顏叔子獨居室夜雨比舍屋角有女子投之叔子令秉燭燭盡乃徹屋草續之至明不亂又曰武王既渡河有火自上復於王屋流為烏其色赤漢書曰項羽西屠咸陽燒其宮室火三月不滅又曰孝乎后王莽女有節操及漢兵誅莽燔燒未央宮后曰何面目見漢家因自投火而死又曰漢兵圍王莽城中少年房朱張魚等恐見虜掠私燒作室門呼曰反虜王莽何不出降火及掖庭莽避火宣室前殿火輒隨之又曰陳勝吳廣夜構火狐鳴呼曰大楚興陳勝王郡國志曰連渾府遙火山而有火井深不可見底炎氣上升常若微電以草爨之則煙騰大發其山似火從地而發故名熒臺東觀漢記曰梁鴻牧豕長安上林苑中失火延及人家問所燒財物悉推豕償之其主言少鴻願以身作躬執其勤又曰長沙有義士古初遭父喪未葬鄰人火起及初舍棺不可移冒火伏棺上火乃滅又曰廉范字叔度為蜀郡太守成都地迫屋狹百姓夜作以供衣食又禁火民覆蔽之失火者日屬范放令夜作但使儲水百姓皆悅歌曰廉叔度來何暮不禁火民安堵昔日無襦今五袴魏略曰秦伯出獵至於咸陽有火流下化為白雀銜緑丹書集於公車吳志曰張昭字子布孫權以公孫淵稱藩遣張珍許晏至遼東拜淵為燕王昭諫權權不從昭忿稱疾不朝權恨之土塞其門昭又於內以土封之淵果殺珍晏權數慰謝昭固不起權因出過其門呼昭昭辭病篤權燒其門欲以恐之昭更閉戶權使人滅火往問良久昭諸子扶昭起權載以還宮晉書曰愍懷太子遹字熙祖惠帝長子也宮中嘗夜失火武帝登樓望之太子時年五歲牽帝裾入暗中帝問其故太子曰暮夜倉卒宜備非常不宜令照見人也由是奇之又曰張華字茂先武庫火華懼因此變作列兵固守然後救之果纍代之寶及漢高斬蛇劍王莽頭孔子履等盡焚焉又曰韓康伯家貧窶伯年數歲至大寒母方為作襦令伯投尉斗而謂之曰且著襦尋當作復褌伯曰不復須母問其故對曰火在斗中而柄尚熱今既著襦下亦當暖母甚異之又曰王獻之常與兄徽之共在一室忽然火發徽之遽走出不遑取履獻之神色恬然徐呼左右扶出又曰郭璞字景純門人趙載嘗竊青囊書未及讀而為火所焚又曰庾亮鎮武昌夜半望見城內有數炬火從城上出如火車狀白布慢覆與火俱出城東北行至江乃滅又曰佛圖澄嘗與石季龍升中臺澄忽驚曰幽州當火災仍取酒噀之久而笑曰救已得矣季龍遣驗幽州云是曰火從四門起西南有黑雲來驟雨滅之雨亦頗有酒氣又曰嵇康從孫登遊三年康問其所終不答康每歎息將別謂曰先生竟無言乎登乃曰子識火乎生而有光不用其光而果在於用光人而有才不用其才而果在於用才故用光在乎得薪所以保其曜用才在於識真所以全其年今子才多識寡難乎免於今之世矣子無求乎康不能用果遭非命鄧粲晉紀曰胡母輔之過河南尹門下將飲酒使門卒王子博取火子博曰卒也唯不乏吾事安能為人使輔之與語歎曰吾不及也因言於河南尹以為功曹晉中興書曰殷浩北伐江逌為長史逌取數百雞以長繩連腳皆繫火一時驅放過塹集營皆燃焉宋書曰周朗為廬陵內史郡後荒蕪頗多野獸母薛氏欲見獵朗乃合圍縱火令母觀之火逸燒廨朗悉以秩米起屋償所燒之限梁書曰阮孝緒家貧無以僮妾竊鄰人樵以繼父孝緒知之乃不食更令撤屋而炊後魏書曰祖瑩好學以晝繼夜父母恐其成疾禁之後燃火讀書以衣被蔽塞窗戶恐為人家所覺又曰蕭鸞遣魯康祚侵太倉口傅永以賊若夜來必應於渡淮之守以火記其淺處永既設伏乃密令人以瓠盛火渡淮南岸當深處置之教之云若有火起即亦燃之其夜康祚等果親率領來斫永營東西二伏夾擊之康祚等奔趣淮水火既競起不能記其本濟之處遂望永所置之火而爭渡焉水深溺死斬首者數千級北齊書曰神武西征登鳳陵命中外府司馬李義深相府城局李士略共作檄文皆辭請以孫搴代神武乃引塞入帳自為吹火催促之搴神色安然授筆立疏又曰文宣曾近出令張曜居守帝夜還曜不時開門勒兵嚴備駐蹕門外久之催迫甚急曜以夜深須火至面識門乃可開於是獨出見帝帝笑曰卿欲效郅君章也帝使曜前開門然後入又曰張亮守河州周文帝於上流放火船欲燒河橋亮乃備小艇百餘皆載長鎖鎖頭施釘火船將至即馳小艇以釘釘之引鎖向岸火船不得及橋全亮之功也尚書大傳曰燧人為燧皇以火紀物火陽尊故託燧皇於天春秋元命苞曰火之為言委隨也故其字人散二者為火也韓詩外傳曰晉平公藏寶之臺燒救火三日三夜乃勝之公子晏束帛而賀曰臣聞王者藏於天下諸侯藏於百姓農夫藏於囷庾商賈藏於篋匱今百姓乏於外而賦斂無已昔桀紂殘賊為天下戮今皇天降災於皇臺是君之福也戰國策曰楚王遊雲夢野火之起也若雲霓吳越春秋曰越王思報吳冬則抱冰夏則握火後趙録曰石勒禁火百鼓之後燃火者鞭之一百延火燒一家斬五部都督汝南先賢傳曰郭憲從南郊含酒東北三噀云齊失火以厭之後齊果上火事又曰蔡君仲有至孝之心母終棺在堂西舍失火火將至君仲伏尸號哭火越向東家陳留耆舊傳曰劉昆為江陵令民有火災昆向火叩頭即霈然下雨詔問反風滅火虎北渡河何以致此昆曰偶然耳帝曰此長者之言也鄭玄別傳曰玄年十七在家見大風起詣縣曰某時當有火災宜祭爟禳廣設禁備時火果起而不為害樊英別傳曰英隱於苑山嘗有黑風從西方起英謂學者曰成都市火甚盛因含水西向漱之乃令記其日後有客從蜀來者云是日有大火有黑雲平旦從東起須臾大雨火遂得滅葛仙公別傳曰公與客談話時天寒公謂客曰居貧不能得爐火請作一大火公遂吐氣火赫然從口而出須臾火滿室坐客皆熱而脫衣也列仙傳曰陶安公六合冶師也數行火火一旦散上紫色衝天須臾朱雀止冶上曰安公安公冶與天通七日迎汝以赤龍龍至安公騎之東南而上又曰欒巴為尚書王會得酒西向嗽云成都失火嗽而作雨驛至果如其言又曰寧封子黃帝陶正掌火能作五色煙列女傳曰梁節姑其室失火兄子與己子在內欲取兄子輒得己子火盛不復得入婦人曰梁國豈可戶告人曉耶被不義之名何面目以見兄弟家人哉遂赴火而死搜神記曰麋笁嘗從洛歸未至家數十里見路次有好新婦從求寄載行二十餘里新婦謝笁我天使也當往燒東海麋家感君見載故以相語笁因請之曰不得不燒君快去我緩行日中必火發笁乃急行達家使出財物日中而火大發玄中記曰南方有炎山焉在扶南國之東加營國之北諸薄國之西從四月而火生十二月火滅正月二月三月火不燃山上但出雲氣而草木生枝條至四月火燃草木葉落如中國寒時草木葉落也行人以正月二月三月行過此山下取此木為薪燃之無盡時取其皮績之為火浣布十洲記曰炎洲在南海中地方二千里去岸九萬里上有風生獸似豹青色大如鯉張取之積薪數車以燒之薪盡而此獸在火中不燃以鐵椎煆其頭十數下乃死以其口向風須臾便活而起以石上菖蒲塞即死取腦以花服之盡十斤得壽五百歲又有火林山山中有火獸大如鼠毛長三四寸或赤或白山可二百許里晦望見山林及此獸光火照人乃取其獸毛績以為布名曰火浣布國人服之此布垢污唯以火燒布兩食許出振之其垢即去潔白如雪述征記曰北征有張母墓舊說張母是王氏妻王家葬經數百載後開墓而香火猶燃其家奉之稱清火道英雄記曰周瑜鎮江夏曹操欲從赤壁渡江南無船乘步皆反沿漢水下至浦口未即渡瑜夜密使輕船走舸百余艘艘有五十人拖掉人持炬火持火者數千人立於船上以萃於簿至乃放火火燃即回船走去須臾燒數千簿火起光上照天操乃夜去齊地記曰東武有火生木燒之不死亦不損也
