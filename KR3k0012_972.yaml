body:
  text: 果部八柿義熙起居注曰二年正月吳令顧修期言西鄉有柿樹殊本合條依舊集賀詔停晉宮閣名曰徽章殿前柿一株廣志曰柿有小者如杏王逸荔支賦曰宛中朱柿潘嶽間居賦曰張公大谷之梨梁侯烏椑之柿王廙洛都賦曰豹祠赤杏胡並丹柿甘液滋脆不絓牙齒李尢七款曰鴻柿苦瓜劉義恭啓事曰勑旨垂賜華林園柿出自神苑滋味殊絶橙説文曰橙橘屬也東觀漢記曰建武中南單于來朝賜御食及橙橘龍眼荔支晉令曰諸官有祑者守護橙者置吏一人淮南子曰夫橘樹之江北化為橙風俗通曰橙皮可為醬虀博物志曰成都廣都郫繁江原臨邛六縣生金橙似橘而非若柚而芬香夏秋冬或華或實大如櫻桃小者或如彈丸或有年春秋冬夏華實竟歲廣志曰有給客橙目夏至冬且花且實風土記曰橙柚屬也而葉正圓異苑曰南康歸美山石城內有橙就食其實任意取足持歸家人啖輒病或顛仆失徑庾仲初楊都賦曰果則黃甘朱橙胡道安甘賦曰襄陰大橙江陽巨橘林檎廣志曰黑琴似赤奈亦名黑琴劉禎京記曰園多林檎述征記曰林擒果實可佳其榲勃實微大其狀醜其味香輔關有之江淮南少晉宮闕記曰華林園有林擒十二株榲勃六株左思蜀都賦曰林檎枇杷橙柿梬楟謝靈運山居賦曰枇杷林檎帶谷映渚椑廣州記曰荔支壺橘南珍之上菱蓮椑柿為其次地理記曰梁侯園有烏椑八稜大如醬盞荊州土地記曰宜都出大椑晉宮閣名曰華林園椑子二株范汪祠制曰孟冬祭用椑柿異苑曰傅亮永初中為護軍兄珍住府西齋忽見北窗外椑樹下物面廣三尺狀若方相久乃自滅韋耀靈陽賦曰甘蔗椑柿榛栗木瓜潘安仁間居賦曰梁侯烏椑之柿謝靈運山居賦曰椑柿被實於長浦潘嶽金谷詩曰前庭樹沙甘後園植烏椑魏武帝為兗州牧上書曰謹上椑棗二箱枇杷范汪祠制曰孟夏祭用枇杷唐書曰建中元年詔山南之枇杷江南之甘橘藕歲為次第貢者取一次以供廟饗餘皆罷晉宮閣名曰華林園枇杷四株風土記曰枇杷葉似栗子似藥十而叢生四月熟南中八郡志曰南安縣出好枇杷廣州記曰枇杷若榴參乎京都華山記曰華山講堂西頭有枇杷園荊州記曰宜都出大枇杷廣志曰枇杷冬華實黃大如雞子小者如杏味甜酢四月熟出犍為仲長統昌言曰今人主不思甘露醴泉湧而患枇杷荔支之腐亦鄙矣王彪之閩中賦曰果則烏椑朱柿扶餘枇杷周祗枇杷賦曰昔魯季孫有嘉樹韓宣子譽之屈原離騷亦著橘賦至於枇杷寒暑無變負雪楊華余植之庭圃遂賦之云名同音器質異貞松四序一采素華冬馥曹植樂府歌曰橙橘枇杷甘蔗代出謝靈運七濟曰朝食既畢摘果堂陰春惟枇杷夏則林檎檳榔吳録地理志曰交趾朱鳶縣有檳榔樹直無枝條高六七丈葉大如蓮實房得古賁灰扶留藤食之則柔而美郡內及九真日南並有之宋書曰劉穆之少時家貧誕節嗜酒食不修拘檢好往妻兄家乞食多見辱不以為恥其妻江嗣女甚明識每禁不令往江氏後有慶會屬勿來穆之猶往食畢求檳榔江氏兄弟戲之曰檳榔消食君乃常飢何忽須此妻復截髮巿肴饌為其兄弟以餉穆之自此不對穆之梳沐及穆之為丹陽尹將召妻兄妻泣而稽顙以致謝穆之曰本不匿怨無所致憂及至醉穆之乃令廚人以金拌貯檳榔一斛以進之齊書曰任昉父遙本性重檳榔以為常餌臨終嘗求之不得好者昉亦所嗜好深以為恨遂終身不嘗檳榔梁書曰干陀利國在南海洲上其俗與林邑扶南略同出班布古貝檳榔檳榔特精為諸國之極三國典略曰齊命通直散騎常侍辛德源聘于陳陳遣主客蔡佞宴酬因談謔手弄檳榔乃曰頃聞北間有人為噉檳榔獲罪人間遂禁此物定爾不德源答曰此是天保初王尚書罪狀辭耳猶如李固被責云胡粉飾貌搔頭弄姿不聞漢世頓禁胡粉金樓子曰有寄檳榔與家人者題為合字蓋一人口也風俗記曰王高麗年十四五時四月八日在彭城佛寺中謝混見而以檳榔贈之執王手謂曰王郎謝叔源可與周旋否南中八郡志曰檳榔大如棗色青似蓮子彼人以為異婚族好客輒先進此物若邂逅不設用相嫌恨林邑記曰檳榔樹大圍丈餘高十餘丈皮似青桐節如桂竹下本不大上末不小調直亭亭千萬若一森秀無柯端頂有葉葉似甘蕉條泒開破仰望沙沙如插叢蕉於竹杪風至獨動似舉羽扇之掃天葉下繫數房房綴十數子家有數百樹雲踈如墜繩也廣州記曰嶺外檳榔小如交址而大如蒳音納子土人亦呼為檳榔廣志曰木實曰檳榔樹無枝略如柱其顛五六尺間穟如黍秀實大如桃李生棘針重疊其下剝其皮煮其肉實而貫之堅如乾棗食後啖之滑美消穀下氣彼方珍之以為口實亦出交址南方草物狀曰檳榔樹三月開花仍連著實大如雞卵十一月熟雲南記曰雲南有大腹檳榔在枝朵上色猶青每一朵有三二百顆又有剖之為四片者以竹串穿之陰乾則可久停其青者亦剖之以一片青葉及蛤粉卷和嚼咽其汁即似減澀味雲南每食訖則下之又曰雲南多生大腹檳榔色青猶在枝朵上每朵數百顆云是彌臣國來又曰雲南有檳榔花糝極美又曰平琴州有檳榔五月熟以海螺殼燒作灰名為奔蛤灰共扶留藤葉和而嚼之香美羅浮山疏曰山檳榔一名蒳子幹似蔗葉類柞一藂十餘幹每幹生十房房底數百子四月采樹似栟音并櫚生日南者與檳榔同狀五月子熟長寸餘楊衒之洛陽伽藍記曰南方歌營國最為強大民戶殷多出明珠金玉及水精珍異饒檳榔異物志曰檳榔若筍竹生竿種之精硬引莖直上末五六尺間洪洪腫起若瘣木焉因折裂出若黍穗無華而為實大如桃李又生棘針重纍其下以禦衛其實剖其上皮空其膚熟而貫之硬如乾棗以扶留藤古賁灰并食下氣及宿食消榖飲設以為口實嶺表録異曰檳榔交廣生者非舶檳榔皆大腹子也彼中悉呼為檳榔交址豪士皆家園植之其樹莖葉根幹與桄榔椰子小異也安南人自嫩及老採實啖之以不婁藤兼之瓦屋子灰競咀嚼之自云交州地溫不食此無以祛其瘴癘廣州亦噉檳榔然不甚於安南也府郭內亦無檳榔樹周成雜字曰檳榔果也似螺可食李當之藥録曰檳郎一名賓門左思吳都賦曰檳榔無柯椰葉無蔭劉淵林吳都注曰檳榔高六七丈正直無枝葉條從心生其實作房從心中一房數百實如雞子外有殼肉滿殼中正白味苦澀得扶留藤與古賁灰食則柔滑而美矣俞益期與韓康伯箋曰檳榔信南遊之可觀子既非常木亦特奇云溫交州時度之大者三圍高者九丈其擢穗似禾其綴實似榖其皮似桐而厚其節似竹而穊音既其中空其外徑其屈如覆虹其申如縋繩步其林則寥郎庇其蔭則蕭條信可以長吟可以遠想矣性不奈霜不得北植必當遐樹海南遼然萬里不遇長者之目自令恨深劉義恭啓事曰奉賜交州所獻檳榔味殊常品塗遠蒟醬九真蠻獠俗曰九真獠欲婚先以檳榔子一函詣女女食即婚豆蔻劉欣期交州記曰豆蔻似杬樹味辛堪綜合檳榔嚼治斷齒環氏吳地記曰黃初三年魏來求豆寇南方草物狀曰漏寇樹子大如李實二月華七月熟出興古左思吳都賦曰草則藿蒳豆寇胡桃晉宮閣名曰華林園胡桃八十四株廣志曰陳倉胡桃皮薄多肌陰平胡桃大而皮脆急捉則破西京雜記曰上林苑有胡桃吳時外國志曰大秦有棗奈胡桃博物志曰張騫使西域還得胡桃廣五行記曰後蜀李雄玉衡十二年扶風人韓豹為太史令雄卒子期立以豹為太傅猶領候職豹嘗言於期曰臣今老志在田園欲植胡桃願賜其種期不悟俄而李壽自涪率衆南向襲剋成都廢期自立嶺表録異曰山胡桃皮厚而堅大於北府底平如檳榔多肉少穰亦與北中者相似以斧磓之方破或取之自底磨平以為印子其隔屈曲類篆文也馬融西弟頌云胡桃自零潘嶽間居賦曰三桃表櫻胡之別孔融與諸鄉書曰先日多惠胡桃深知篤意劉滔母答虞吳國書曰咸和中避蘇峻亂於臨安山吳國遣使餉饋乃答書曰此果有胡桃飛欀飛欀出自南州胡桃本生西羌外剛內柔質似賢欲以奉貢荔支東觀漢記曰單于來朝賜橙橘龍眼荔支謝承後漢書曰汝南唐羌為臨武縣長接交州舊獻荔支羌上書諫乃止魏文帝詔群臣曰南方有龍眼荔支寧比西國蒲陶石蜜乎今以荔支賜將吏啖之則知其味薄矣吳録曰蒼梧多荔支生山中人家亦種之唐書曰楊貴妃生於蜀好荔支南海荔支勝蜀者故每歲飛馳以進然方暑而熟經宿輒敗又曰白居易為忠州刺史在郡為木蓮荔支圖寄朝中親友各記其狀曰荔支生巴峽間形圓如帷蓋葉如桂冬青華如橘春榮實如丹夏熟朵如蒲萄核如枇杷殼如紅繒膜如紫綃瓤肉瑩白如冰雪漿液甘酸如醴如酪大抵如此其實若離本枝一日而色變二日而香變三日而味變四五日外色香味盡去矣廣志曰荔支高五六丈如桂樹緑葉蓬蓬然冬夏鬱茂青華朱實實大如雞子核黃黑似熟蓮子實白如肪甘而多汁似安石榴有甜味夏至日將巳時翕然俱赤則可食也一樹下百斛犍為僰道南荔支熟時百鳥肥其名之曰焦核小次曰春花次曰朝偈此三種為美次鱉卵大而酸以為醢和率生稻田間又曰荔支壺橘南珍之上西京雜記曰南越王尉他獻高祖鮫魚荔支高祖報以蒲桃錦四匹笁法真登羅山疏曰荔支冬青夏至日子始赤六七日可食甘酸宜人其細核者謂之焦核荔支之最珍也異物志曰荔支為異多汁味甘絶口又小酸所以成其味可飽食不可使厭生時大如雞子其膚光澤皮中食乾則醮小則肌核不如生時奇四月始熟也嶺表録異曰荔支南中之珍果也梧州江前有火山上有荔支四月先熟以其地熱故曰火也核大而味酸其高新州與南海産者最佳五六月方熟黔中亦出荔支余曾得一嘗一似火山者形若小雞子近蒂稍平皮殼殷紅肉瑩寒玉又有焦核者性熱液甘食之過度即蜜漿制之又有蠟荔支黃色味稍劣於紅者廣州記云每歲進荔支郵傅者疲斃於道漢朝下詔止之今猶修事荔支煎進焉其樹自徑尺至于合抱葉蜜如冬青木性堅重其根工人多取為阮咸槽彈弓碁局仲長統昌言曰今人主不思神芝朱草而患枇杷荔支之腐亦鄙矣王逸荔支賦曰乃覩荔支之樹其形也暖若朝雲之興森如橫天之篲角亢興而靈華敷大火中而朱實繁灼灼若朝霞之吐日離離如繁星之著天劉淵吳郡注曰荔支樹生山中葉緑色實正赤肉肥肌正白味美左思蜀都賦曰傍挺龍目側生荔支布緑葉之萋萋結朱實之離離
