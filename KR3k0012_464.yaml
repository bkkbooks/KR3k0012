body:
  text: 人事部一百四辨上説文曰辨治也音被免切尚書曰君罔以辨言亂舊政爾雅曰諸諸便便辨也論語曰便便言惟謹爾鄭玄曰便便辨貌又曰孔子曰惡利口之覆邦家者又曰禦人以口給家語曰子夏問子貢何人子曰辨人丘弗及也又曰宰豫魯人也有口才以言語著名又曰孔子登農山謂二三子各言爾志子貢進曰賜願使齊楚合戰於莽漾之野兩壘相當旗鼓相望埃塵相接挺刃交兵賜著縞衣白冠陳説其間推論利害二國釋患唯賜能之矣夫子曰辨哉史記曰子貢利口巧辭孔子常絀其辨田常欲為亂於齊移兵欲伐魯孔子謂弟子曰夫魯墳墓所處父母之國國危二三子何為莫出子貢請出孔子許之遂行子貢一出存魯亂齊破吳強晉霸越又曰漢遣陸賈説項王請大公項王弗聽漢王復使侯公往説項王乃與漢約中分天下割鴻溝以西者為漢鴻溝以東者為楚項王即歸漢王父母妻子軍皆呼萬歲漢王乃封公為平國君曰此天下辨士所居號為平國又曰范睢欲事魏王家貧無自資乃先事魏中大夫須賈為魏使齊齊襄王聞睢辨有口賜金印及牛酒又曰上問上林諸尉禽獸十餘左右視不能對虎圈嗇夫從旁代尉對上所問禽獸簿甚悉次觀其口對響應無窮乃拜嗇夫為上林令又曰秦蔡澤遊學于諸侯大小甚衆而不遇因從唐舉相曰聞子相李兌百日之內持國柄有之乎曰有之澤曰今若臣者何如唐舉熟視而笑曰先生揭鼻戾脣魋顏蹙齃吾聞聖人不相殆先生乎蔡澤被唐舉之戲乃曰富貴吾所自有吾不知者壽也願聞之舉曰先生從今已往四十三歲澤笑謝去謂其御者曰吾躍馬食肉富貴四十三年亦足矣乃來入秦使人宣言以感怒應侯范睢曰燕容蔡澤天下俊雄辨智士也彼一見秦王必奪君位應侯使人召澤澤入揖應侯應侯固不快矣及見又倨應侯因讓之曰子嘗宣言欲代吾相秦豈有之乎對曰然應侯曰請聞其説澤曰吁君何見之晚耶夫四時之序功成者去未成者來君祿位貴盛私家之富皆已極矣不退將危臣之代君不亦宜乎應侯善之乃延入坐為上客後數日入朝言於王曰客有新從山東來蔡澤其人辨士臣見人衆莫能及之臣不如也王召見與語大悅之拜為客卿應侯因謝病請歸相印昭王許之以澤為相終如其志又曰蘇秦初與張儀俱事鬼谷先生十一年皆通六藝經營百家之言鬼谷先生弟子五百餘人為之土窟窖深二丈先生曰有能獨下説窖中使我泣出者則能分人主之地久蘇秦下説窖中鬼谷先生泣下沾襟次張儀下説窖中亦泣先生曰蘇秦詞説與張儀一體也又曰楚陳軫詞辨之士也初與張儀俱事秦惠王惠王皆重之儀惡軫於王曰陳軫重幣輕信秦使之楚將為交也今楚不善於秦而善於軫王以儀言召軫問之軫曰然王聞楚有兩妻者乎王曰不聞軫曰楚有兩妻者人挑其長者長者罵之挑其少者少者復挑之居無何有兩妻者死客謂挑者曰謂汝娶長者乎少者乎挑者曰娶長者客曰長者罵汝少者復挑汝何故娶長者對曰居人之所則欲其挑我為妻則欲其罵人今楚王明主昭陽賢相使軫為臣常以國情輸楚楚王將不留臣昭陽將不與臣從事矣臣必之楚足以明臣為楚與不也軫出張儀入問王曰軫果欲之楚不王曰然軫天下之辨士寡人遂無奈何也惠王終相張儀軫遂奔楚楚用為上卿後軫為楚使之秦惠王見之謂曰子去寡人之楚寡人甚思子子思寡人乎軫曰王聞越人莊舄乎王曰不聞軫曰越人莊舄仕楚執圭有頃而病楚王曰舄越之鄙人凡人之思固在其病也思越則越聲不思越則楚聲使人聽之猶尚越聲今臣棄逐之楚能無秦聲哉漢書曰酈食其有詞辨年六十身長八尺鬢髮皓然請見高祖謁者曰上好嫚罵人不喜儒生有客冠而來者輒解其冠而溺其中食其作色叱之曰我高陽酒徒何儒生之有謁者股栗而見之高祖乃踞床使兩女子洗食其入長揖不拜曰欲助秦攻諸侯乎將欲率諸侯攻秦乎高祖罵曰豎儒夫天下同苦秦久矣故諸侯相率攻秦汝奚為助秦耶食其曰必欲藂合義兵誅無道秦不宜踞見長者高祖懍然而起拔足揮洗攝衣延食其坐而謝之食其因言六國縱橫王霸之道高祖大悅問其計食其曰足下起烏合之衆收散亂之兵不滿二旅而欲鼓行入秦所謂探虎口而餵餓狼也夫陳留者當天下之衝四通五達之郊城堅粟多可以少留臣知其令請使命下之如不聽可舉兵攻之臣為內應不崇朝而拔之矣於是高祖乃遣食其説陳留令高祖引兵隨之遂下陳留又曰少府五鹿充宗貴幸善梁丘氏易元帝好之欲考其異同令與諸家論易充宗貴辨口諸儒莫能與抗皆稱疾不敢會有薦朱雲者召入攝齊登臺抗首而請音動左右既論難連柱五鹿君故諸儒為之語曰五鹿嶽嶽朱雲折其角又曰婁護為人短小精辨論議常依名節聽之者竦然與谷永俱為五侯上客長安號曰谷子雲之筆札婁君卿之脣舌言其見信用也又曰朝錯頴川人也為太子家令以其辨得幸太子太子家號曰智囊又曰田蚡貴幸為中大夫辨有口學盤盂諸書應劭曰黃帝史孔甲所作名也孔甲盤孟二十六篇又曰東方朔自公卿在坐朔皆傲弄無所屈上以朔口諧給嘗問先生視朕何如主也朔對曰自唐虞之隆成康之際未足喻當世臣朔伏觀陛下功德陳五帝之上在三王之右非若此而已誠得天下賢士公卿在位咸得其人譬若以周邵為丞相孔丘為御史大夫太公為將軍卞莊子為衛尉皋陶為大理後稷為司農伊尹為少府應劭曰伊尹善烹割太官屬少府故令作子貢使外國顏閔為博士子夏為太常孟子為右扶風季路為執金吾契為鴻臚龍逢為宗正伯夷為京兆管仲為馮翊魯般為將作山甫為光祿申伯為大僕延陵季子為水衡百里奚為典屬國曉其風俗故令為之柳下惠為大長秋史魚為司直蘧伯玉為太傅如淳曰太傅傅人主使無過伯玉欲寡其過也孔父為詹事叔敖為諸侯相子産為郡守王子慶忌為期門夏育為鼎官羿為旄頭宋萬為式道候上乃大笑也又曰終軍字子雲濟南人少好學以辨博能屬文聞於郡年十八選為博士弟子至府太守聞其有異才召見軍甚奇之及至長安上書言事武帝異其文拜軍為謁者給事中又曰蒯通知天下權在於韓信令背漢乃先微感信曰僕嘗受相人之術相君之面不過封侯又危而不安相君之背貴而不可言信曰何謂也通曰天下初作難也俊雄豪傑建號一呼天下之士雲合霧集魚鱗雜襲飆至風起當此之時憂在亡秦而已今劉項分爭使人肝腦塗地流離中野不可勝數今時兩主懸命足下足下為漢則漢勝與楚則楚勝臣願披心腹肝膽效愚忠恐足下能用也方今為足下計莫若兩利而俱存之三分天下鼎足而立天下孰不聽足下願圖之信曰漢王遇我厚吾豈可見利而背恩乎通曰臣聞勇略震主者身危功蓋天下者不賞今足下挾不賞之功載震主之威歸楚楚人不信歸漢漢人震恐足下欲將安歸乎夫勢在人臣之位而有高天下之名切為足下危之信曰生且休矣吾將念之數日通復説曰聽者事之候也計者存亡之機也夫隨廝養之役者失萬乘之權守儋石之祿者闕卿相之位計誠知之而決弗敢行者百事之禍也故猛虎猶預不如蜂蠆之致螫孟賁狐疑不如童子之必至信不忍背漢遂謝通通説不聽惶恐乃佯狂為巫天下既定後信以罪廢為淮陰侯謀反誅臨死歎曰悔不用蒯通之言高帝曰是齊辨士蒯通乃詔齊召蒯通至上欲烹之曰若教韓信反何也曰狗各吠非其主當彼時臣獨知韓信非知陛下也且秦失其鹿天下共逐之高材者得天下洶洶爭欲為陛下所為顧力不能何憚誅耶上乃赦之又曰淮南王黥布反朱建諫之不聽漢既誅布聞建諫之高祖賜建號平原君家徙長安為人辨有口刻廉剛直行不茍合義不取容又曰辨士曹丘生數招權顧金錢孟康曰招金錢事權貴而求事也事貴人趙談竇長君等善季布聞寄書諫長君曰吾聞曹丘非長者勿與通及曹丘歸欲得書謁布竇長君曰季將軍不説足下足下無往固請遂使書人先發書布大怒曹至則揖布曰楚人諺曰得黃金百鎰不如得季布一諾足下何以得此聲梁楚之間哉且僕與足下俱楚人使僕遊揚足下名於天下顧不美乎何足下之距僕深也布乃大悅引入留數日為上客厚送之布名所以益聞者曹丘揚之也范曄後漢書曰黃琬字子琰瓊之孫早而辨慧祖父瓊為魏郡太守建和元年正月日蝕京師不見而瓊以狀聞梁太后太后詔問所蝕多少瓊思其對而未知所況時琬年七歲在旁云何不言日蝕之餘如月之初瓊大驚即以其言應詔又曰孔融字文舉孔子世孫也李膺為河南尹恃才倨傲誡守門者非吾通家子孫不得輒通融年十二入洛欲以觀其人乃謂守門者曰吾與李君通家子孫耳守門者告膺膺呼召問曰卿與吾有何所故融曰臣先君孔子與公老君同德比義則臣與公纍代通家也膺大悅引坐謂曰卿欲食乎融曰須食膺曰教卿為客之禮主人問食但讓不須融曰不然教君為主之禮但置於食不須問客膺慚乃歎曰吾將老死不見卿富貴也融曰公殊未死膺曰如何融曰鳥之將死其鳴也哀人之將死其言也善向來公言未有善也故知未死膺甚奇之後與膺談論百家經史應答如流膺不能下之又曰劉祐字伯祖中山安國人也祐初察孝廉補尚書侍侍郎間悉故事文札強辨每有奏議對應為儕類所歸謝承後漢書曰郭宏為郡上計吏正月朝覲宏進殿下謝祖宗受恩言辭辨麗專對移時天子曰潁川乃有此辨士邪子貢晏嬰何以加之群公屬目卿士歎伏又曰郭宏為郡上計吏朝廷問宏潁川風俗所尚土地所出先賢將相儒林文學之士宏援經以對陳事答問出言如浮引義如流東觀漢記曰班超字仲叔扶風平陵人徐令彪之子也為人大志不修細節然內孝謹居家常執勤苦不恥勞辱有口辨而涉獵書傳魏志曰黃初元年郭淮奉使賀文帝踐祚而道路疾稽留帝正色責之曰昔禹會諸侯於塗山防風後至使行顯戮今溥天同慶而最留遲何也淮對曰臣聞五帝先教道人以德夏后政衰始用刑辟今臣遭唐虞之代是以自知免於防風之誅也帝悅之擢領雍州刺史魏典略曰邯鄲之北有蘇大侯者蘇秦往説之蘇大侯送以百金家丞問其故蘇大侯曰客辨士也立談之間再奪吾地而復歸之吾地雖小豈直百金耶又曰韓宣字景然渤海人為人短小建安中丞相召署軍謀椽冗散在鄴嘗於鄴步行入宮於東掖門內與臨淄侯植相遇時天新雨地有泥潦宣欲避之閡潦不得去乃以扇自鄣住於道邊植嫌既不去又不為禮乃駐車使其常從問宣何宮宣云丞相軍謀椽也植又問曰應得唐突列侯不宣曰春秋之義王人雖微列于諸侯之上未聞宰士而為下士諸侯之禮植又曰即如所言為人父吏見其子應有禮不宣又曰於禮臣子一例也植知其難窮乃釋去去以為辨也梁祚魏國統曰黃權來降文帝從容謂權曰君舍逆效順欲進蹤陳韓邪對曰臣過受劉氏殊遇降吳不可歸蜀無路是以歸命且敗君之將免死為幸何古人之敢慕也帝善之吳志曰孫權問諸葛恪曰卿父與叔父孰賢對曰臣父為優權問其故對曰父知所事叔父不知以是為優權又大噱命恪行酒至張昭前先有酒色不肯復飲曰此非養老之禮也權曰卿其能令公辭屈乃當飲之耳恪難昭曰師尚父九十秉旄伏鉞猶未告老也今軍旅之事將軍在後酒食之事將軍在先何謂不養老也昭卒無辭遂為盡爵又曰孫權遣都尉趙咨使魏帝問曰吳王何等主趙咨對曰聰明仁智雄略之主也帝問其狀答曰納魯肅於九品是其聰也拔呂蒙於行軍是其明也獲于禁而不害是其仁也取荊州兵不血刃是其智也據三州虎視於天下是其雄也屈身於陛下是其略也又曰薛綜字仲文沛郡人其先田文封薛因以氏焉避地交州士燮召為交址太守及還都蜀使張奉於權前嘲尚書闞澤澤不能答綜曰有犬為獨無犬為蜀橫目狗身蟲入其腹奉曰不當復別吳耶綜應聲曰無口為天有口為吳君臨萬邦天子之都奉無以對焉韋昭吳書曰吳使郎中令陳化使魏魏文帝因酒酣問化曰吳魏峙立誰將平一海內者乎化曰易稱帝出乎震化聞先哲知命舊説紫蓋黃旗運於東南帝曰昔文王以西伯天下豈復在東乎化曰周之初基大伯在東是以文王能興於西帝笑奇其辭又曰沈珩字仲山孫權以珩有智謀能專對乃使至魏魏文帝問曰吳嫌魏東向乎珩曰不嫌也曰何以言之曰恃舊盟言歸於好是以不嫌又問太子當來寧然乎珩曰臣在東朝不坐宴不與若此之議無所聞也文帝善之乃引珩自近談語終日珩隨事響應無所屈服張勃吳録曰吳興沈友字子正善屬文有口辨每所至衆人皆默因號曰謐衆咸言其筆之妙力之妙舌之妙皆絶於人也蜀志曰先是雍闓送張裔於孫權諸葛亮遣鄧芝使吳亮令芝言次從權請裔裔自至吳數年流徙伏匿權未知也許之遣裔臨發乃引見問裔曰蜀卓氏寡女亡奔司馬相如貴土風俗何以乃爾裔對曰愚以為卓氏之女猶賢於買臣之妻權又謂裔君還必用事西朝終必不作田父於閭里也將何以報我對曰裔負罪而歸將委命有司若蒙僥幸得全首領五十以前父母之年自此以後大王之𧶽也又曰伊籍字幾伯陽人隨先主入益州東使吳孫權聞其才辨欲逆折以辭籍適入拜權曰勞事無道之君籍即對曰一拜一起未足為勞又曰吳遣使張溫來聘百官皆往餞焉溫問秦密曰天有頭乎密曰詩云乃眷西顧以此推之頭在西方溫曰天有耳乎密曰詩云鶴鳴於九皋聲聞於天若其無耳何以聽之溫曰天有姓乎密曰姓劉曰何以知之密曰天子姓劉故以此知之溫曰日生於東乎密曰雖生於東而沒於西答問如響溫服密之文辨凡如此類也
