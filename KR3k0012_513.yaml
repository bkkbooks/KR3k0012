body:
  text: 宗親部二伯叔釋名曰伯把也把持家政也父弟為仲仲中也位在中也仲父之弟曰叔父叔少也叔父之弟曰季季癸也甲乙之次癸在下也説文曰伯長也爾雅曰父之昆弟先生為世父後生為叔父禮記檀弓曰滕伯文為孟虎齊衰其叔父也為孟皮齊衰其叔父也伯文殷時滕君也爵為伯名文家語曰孔子兄子有孔蔑者與宓子賤偕仕孔子往過孔蔑而問焉曰自汝之仁何得何亡對曰未有所得而亡者三王事若聾聾宜為襲前後相積襲也學焉得習言不得習學者是學不得明也俸祿少饘粥不及親戚是骨肉益疏也公事多急不得吊死問疾是朋友道闕也其所亡者三即此謂矣孔子不悅往過子賤問如孔蔑對曰自來仕者無亡而得者三始誦之今得而行之是學益明也俸祿所供被及親戚是骨肉益親也雖也有公事而兼以弔死問疾是朋友信篤也孔子喟然謂子賤曰君子哉若人魯無君子者斯焉取斯也漢書曰初高祖微時嘗避事時與賓客過其丘嫂食應邵曰丘氏女也孟康曰西方謂亡女壻為丘壻丘空也兄亡空有嫂也晉灼曰丘大也大嫂為家嫂也嫂厭叔與客來陽為羹盡轢釜客以故已而視釜中有羹由是怨嫂及立齊代王而伯子獨不得侯太上皇以為言高祖曰某非敢忘封之也為其母不長者封其子信為頡羹侯又曰疏廣字仲翁東海蘭陵人也宣帝時為太子太傅兄子受字公子為少傅太子每朝因進見太傅在前少傅在後叔姪並為師傅朝廷以為榮又曰王莽字巨君孝元皇后之弟子父及兄弟皆以元成世封侯輔政凡九侯五大司馬唯莽父曼早死不侯五侯子爭侈靡莽獨孤貧折節為儉受禮經勤身博學事母及寡嫂養孤兄子行甚整又外交英俊內事諸父世父鳳病莽侍疾亂髮垢面鳳且死以託太后及帝拜黃門侍郎東觀漢記曰鄭均好義篤實事寡嫂收兒恩禮甚至又曰魏談有一孤兄子年一二歲常自養視遭飢饉分升合以相生活談時有一女生裁數月念無穀食終不能兩全棄其女養活兄子州郡高其義又曰桓榮卒子郁當襲爵讓於兄子顯宗不許不得已受封而悉以租入與之又曰淳于恭養兄崇孤兒教誨學問時不如意輒平責數以捶自擊其脛欲以感之兒慚負不敢復有過袁子又載又曰郅惲友董子張叔父及為鄉里民所害子張病惲往侯之氣絶良久復視惲歔欷惲曰知子不悲天命痛讎不復也惲即起將客取仇人頭以示子張見之悲喜因絶後漢書曰劉平字公子楚郡彭城人也更始時天下亂平弟仲為賊所殺其後賊復忽然而至平扶持其母奔走逃難仲遺腹女始一歲平抱仲女而棄其子母欲還取之平不聽曰力不能兩活仲不可以絶類遂去不顧謝承後漢書曰魏霸字嶠卿濟陰人為巨鹿太守與兄子同苦樂不得自異又曰許荊兄子世嘗報讎殺人怨家會衆操兵至荊家欲殺世荊始從府休歸與相遇因出門解劍長跪曰前無狀相犯咎皆在荊不能相教既兄早歿一子為嗣如令死者傷其滅絶今願殺身代世塞咎雖死以往猶謂更生怨家扶起荊曰許掾郡中稱為賢吾何敢相侵因遂委去華嶠後漢書曰薛苞弟子求出苞不敢止乃中分其財奴婢引其老者曰與我共事久若不能使也田廬取其荒頓曰吾少時所治意所戀也器物取其朽敗曰我服食久身口所安也袁山松後漢書曰范丹為萊蕪長去官於市賣卜妻紡績以自給丹弟子愷見丹藩不完載柴將客藩之時丹適行還怒勑子拔柴載以還之後漢書曰馬援字文淵扶風茂陵人也援兄子嚴敦並喜譏議而通輕俠客援前在交址還書誡之曰吾欲汝曹聞人過失如聞父母之名耳可得聞而口不可得言也好論議人長短妄是非正法此吾所大惡寧死不願聞子孫有此行也汝曹知吾惡之甚矣所以復言者施襟結褵申父母之戒欲使汝曹不忘之耳龍伯高敦厚周慎口無擇言謙約節儉廉公有威吾愛之重之願汝曹效之杜季良豪俠好義憂人之憂樂人之樂清濁無所失父喪致客數郡畢至吾愛之重之不願汝曹效之效伯高不得猶為謹勑士所謂刻鵠不成尚類鶩也效季良不得陷為天下輕薄子所謂畫虎不成反類狗也訖今季良尚未可知郡將下車輒切齒州縣以為言吾常寒心是以不願子孫效也又曰范遷字子廬沛國人也為司徒及在公公輔有宅數畝田不過一頃復推與兄子其妻謂曰君有四子而無立錐之地可餘奉祿以為後世遷曰吾備位大臣而蓄財求利何以示後在位四年薨家無簷石焉又曰張堪字君遊南陽宛人也堪早孤讓先父餘財數百萬與兄子又曰第五倫字伯魚京兆長陵人或問倫曰公有私乎對曰吾兄子嘗疾一夜十往退而安寢吾子有疾雖不省視竟夕不眠若是者豈可謂無私乎又曰張禹字伯達父歆為淮陽相終於汲令禹性篤節儉父卒汲吏人賻送前後百萬悉無所受又以田宅推與伯父自身寄止又曰中常侍趙忠言於省內曰袁本初坐作聲價好養死士不知此兒終欲作何叔父太傅隗聞而呼紹以忠言責之紹終不改又曰戴封遭伯父喪去官又曰沮授為曹操所執授曰叔父母弟懸命袁氏若蒙公靈速死為福操歎曰孤早相得天下不足慮也遂赦而厚遇焉又曰劉矩字叔方少有高節以叔父遼未得仕進遂絶州郡之命又曰伏恭字叔齊司徒湛之兄子湛弟黯位至光祿勳無子以恭為後魏志曰荀攸字公達祖父曇攸少孤及曇卒故吏張推求守曇墓攸年十三疑之謂叔父衢曰此吏有非常之色殆將姦亂衢悟乃推問果殺人亡命因是異之又曰盧育字子家涿郡人也父植有名於世育十歲而孤遇本州亂二兄死難當袁紹公孫瓚交兵幽冀飢荒養寡嫂孤兄子以學行見稱又曰王昶字文舒太原人其為兄子及子作名字皆一依謙實以見其意故兄子默字處靜沉字處道其子渾字玄沖深字道沖遂書戒之曰夫為人子之道莫大於寶身全行以顯父母又曰毛玠居顯位常布衣蔬食撫育兄孤子甚篤又曰張範子陵及弟子戩為山賊所得範直詣賊請二子賊以陵還範範謝曰諸君相還兒厚矣夫人情雖愛其子然吾憐戩之小請以陵易之賊義其志悉以還範又曰王基字伯與東萊曲城人也少孤與叔父翁居撫養甚篤亦以孝稱又曰高慎字孝甫敦厚少華有沉深之量撫育孤兄子五人恩義甚篤琅琊相何英嘉其履行以女妻焉蜀志曰諸葛亮初未有子求兄子喬為嗣瑾啓孫權遣喬來西亮以喬為嫡子故易其字焉拜為駙馬都尉王隱晉書曰庾袞孤兄女曰芳將嫁美服具矣袞刈荊苕為箕帚焉召諸子集之于堂男女以班而命芳曰汝芳少孤今汝適人將事舅姑灑掃庭內婦人之道也故賜汝以此匪器之美欲汝之溫恭朝夕雖休勿休也又曰魏舒容貌質朴少號遲鈍人莫之知唯叔父衡知其奇每有賓客造己常勸使過舒言吾兄子非常人也臧榮緒晉書曰阮籍隨叔父至東兗州刺史王昶聞籍奇偉請與相見乃歎息以不能測也又曰王湛字處沖司徒渾之弟也兄子濟輕之嘗詣湛見床頭有周易問曰叔父何用此為湛曰體中不佳時脫復看耳濟請言之湛因剖析玄微妙有奇趣皆所未聞也濟才氣抗邁於湛略無子姪之敬既聞其言不覺栗然心形俱肅遂留連彌日纍夜自視缺然乃歎曰家有名士三十年而不知濟之罪也濟有從馬絶難乘濟問湛曰叔頗好騎不湛曰亦好之因騎此馬姿形既妙回策如素善騎者無以過之又濟所乘馬湛愛之湛曰此馬雖快然力薄不堪苦行近見督郵馬當勝但芻秣不至耳濟試養之而與己馬等湛又曰此馬雖快任方知之平路無以別也於是當蟻封內試之濟馬果躓而郵馬如常濟益歎異還白其父曰濟始得一叔乃濟以上人也武帝亦以湛為癡每見濟輒調之曰卿家癡叔死未濟常無以答及是帝又問如初濟曰臣叔殊不癡因稱其美帝曰誰比濟曰上比山濤不足下比魏舒有餘湛聞曰欲處我季孟間乎又曰殷浩字深源陳郡長平人也叔父融俱好老易融與浩口談論詞屈著篇則融勝浩由是為風流談論者所宗又曰鄧攸逃奔石勤以牛馬負其妻子而去擔其兒及其弟子綏度不能兩全遂棄己子卒以無嗣綏服攸喪三年又曰謝安字安石於東山營墅樓館林竹甚盛每攜中外子姪往來遊集肴饌亦屢費百金世頗以此譏焉安殊不以屑意又曰徐苗字叔胄高密淳于人也其兄弟皆早亡撫養孤遺慈聞州里田宅奴婢盡推與之又曰謝玄字幼度以勳封康樂縣公陳以先封東興侯賜兄子玩詔聽之更封玩豫寧伯又曰羅憲兄子尚字敬之少孤依叔父憲又曰劉曜逼長安涼州刺史張實叔父西海太守肅請為先鋒擊曜曰狐死首丘心不忘本鍾儀在晉楚辨南音肅受晉寵割符列位羯逆滔天朝廷傾覆宴安方裔難至不奮何以為人臣實曰門戶受重恩自當闔宗效死但叔父春秋已高氣力衰竭軍旅之事非耆耄所堪乃止既而聞京師陷沒肅悲憤而卒又曰慕容超字祖明德之兄北海王納之子也符堅破鄴以納為廣武太守數歲去官家於張掖德之南征留金刀而去及垂起兵山東符昌收德諸子皆誅之納母公孫氏以耄獲免納妻段氏方娠未決囚之于郡獄掾呼延評德故吏也嘗有死罪德免之至是將公孫及段氏逃于羌中而生超焉年十歲而公孫卒臨終授超以金刀曰若天下太平汝得東歸可以此刀還汝叔也何法盛晉中興書曰何充字次道道年在童齔伯父遽謂之曰我為小兒時亡伯車騎謂我汝後當與伯父爭名汝今器宇深弘亦當出我右又曰時氐賊強侵寇無已朝議求文武良將可以鎮遏比方者衛將軍謝安曰唯有兄子玄可堪此任中書郎郤超聞而歎曰安違衆舉親明也玄必不負舉才也於是徵還拜建武將軍兗州刺史領廣陵相監江北諸軍事又曰陸納字祖言為吳興太守衛將軍謝安嘗欲詣納納兄子俶怪納無供辦復不敢問乃密作數十人供安至納設茶果而已俶下精飲食客罷納大怒杖俶四十云既不能光益父叔乃復穢我素業三十國春秋曰羊祜都督荊州鎮襄陽時祜有平吳之志方樹基址擢王濬為巴郡太守將委以巴峽之任祜兄子暨謂祜曰觀濬為人志大者侈不可專任祜曰有大才必可用也識者謂祜可謂能舉善矣知人則哲叔子之謂乎又曰安帝時以劉鎮之為散騎常侍光祿大夫不受鎮之毅季父也義熙初謂毅蕃曰汝輩才力勢運足以得志當身爭耳我不就汝求位求財又不受汝罪纍每見毅等道從吏卒到門輒罵詬之毅甚敬畏每未至宅數百步止與白衣數人而進儀衛悉不自隨及至毅敗天下服其先見而劉裕甚敬遇之又曰燕金紫光祿大夫高平公平歆初歆伯父左光祿大夫熙拊歆首而告之曰汝儀容偉茂志節果當有佐命之功顯吾門者必汝也孫巖宋書曰許昭先義興人也諸父肇坐事繫獄七年不判子姪三十餘人昭先家最貧薄專獨斷訴無日在家餉饋肇莫非珍新家産既盡賣宅以充之肇諸子倦怠唯昭先無有懈息如是七歲尚書沉演之嘉其操行肇事由此得釋沈休文宋書曰宗愨字元幹徵士柄兄子也年少時炳問愨所志答曰願乘長風破萬里浪炳曰汝若不富貴必破我門戶又曰何承天叔盼為益陽令隨盼之官隆安四年南蠻校尉桓偉命為參軍時殷仲堪桓玄等牙舉兵以向朝廷承天懼禍難未已解職還益陽又曰劉凝之字志安小名長年南郡人也推家財與弟及兄子立屋於野外非其力不食典略曰鄭均字仲虞任城人也好黃老兄亡後養嫂兄子思禮甚篤及居併門盡推財産與之由是名稱風俗通云周玘字孟玉為右將軍掾弟子使客殺人被罪玘詣府與太守盛亮相見了不論弟子之命遂俱盡於獄弟婦不哭其子但哭孟玉孟玉由此為高曹瞞傳曰太祖一名吉利字阿瞞少飛鷹走狗遊蕩無度其叔父數言之於嵩操患之後逢叔父於路乃陽敗面喎口叔父怪問其故太祖曰卒中惡風叔父以告嵩驚愕呼操操曰貌如故嵩曰叔父言汝中風為已差乎操曰初不中風但失愛叔父故見罔耳嵩乃疑焉後叔父有所告嵩終不復信操於是益得肆意陳留耆舊傳曰高慎字孝甫敦厚少文華有沉深之量撫育孤史子五人恩義甚篤琅邪相何英嘉其履行以女妻焉又曰爰彌字伯仁年十歲叔父蘭部濟陰從事與御卒俱獵縣送酒肉彌不肯嘗問其故答曰聞之於諸侯夫臨其事不食其食蘭然其言還而不受貞潔之質由是以彰也海內先賢傳曰故南郡太守南陽程堅體履仁孝秉志清潔少讓財兄子仕郡縣居貧無資摩鏡自給襄陽記曰龐統字士元德公從子也少未有識者唯德公重之年十八使往見司馬德操與談既而歎曰德公誠知人此實盛德也張方賢楚國先賢傳曰陰嵩字文王南陽新野人衛尉興從祖兄也少喪父母與叔父居恭謙婉順溫良節儉王莽末義兵初起乃與叔父避世蒼梧後徵拜謁者以叔父憂棄官張瑩漢南記曰北海靖王興性敦篤仁厚長有明略兄弟少為光武所撫育恩愛如子劉彥明燉煌實録曰汜固字孔完大將軍掾純之孫也推家財百萬與寡弟婦二百萬與孤兄子於是三府競辟皆不就張騭文士傳曰桓驎字元鳳伯父焉知名官至太尉精察好學年十三四在焉坐有宿年客焉告之曰吾此弟子頗有異才今已涉獵書傳殊能作詩賦君試為口賦試與之客乃為詩曰甘羅十二楊烏九齡昔有二子今則桓生參差等蹤異世齊名驎即答曰邈矣甘羅超等絶倫卓彼楊烏命世稱賢嗟豫蠢弱殊才侔年仰慚二子俯愧過言傅子曰傅燮字南容奉寡嫂甚謹食孤姪如赤子世説曰郤鑒遭永嘉喪亂窮餧鄉人共飴之公常攜兄子外甥周翼二小兒往食鄉人曰各自窮餧以君之賢共欲存君耳恐不能兼飴公於是獨往食輒含飯著兩頰還吐與二兒後鑒亡翼時為鄮莫候切縣解職歸席苫於公靈心喪三年又曰謝太傅寒雪日內集與兒女講論文義俄而雪驟公欣然曰白雪紛紛何所似兄子胡兒曰散鹽空中差可擬兄女曰未若柳絮因風起公大笑樂即公大兄奕之女左將軍王凝之之婦也
