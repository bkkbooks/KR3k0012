body:
  text: 職官部四十五太子率更令六典曰率更令之職掌宗族次序禮樂刑罰及刻漏之政令凡皇太子釋奠於先聖先師講學齒胄皆揔其儀注而為之導引若皇太子備禮出入乘軺車位亞家令焉漢書曰顏師古注曰掌知漏刻曰率更續漢書百官志曰率更令秩千石與庶子舍人更直職似光祿勳掌宮殿門戶之禁郎將屯衛之士晉起居注曰武帝太康八年詔曰太子率更僕東宮之達官也其進品第五秩與中庶子左右衛率同職擬光祿勳也隋書曰明克讓轉率更令進爵為侯太子以師道處之恩禮甚厚有四方珍味輒以賜之于時東宮盛徵天下才學之士至於博物洽聞皆出其下唐書官品志曰率更令掌伎樂漏刻也物理論曰今有呂子義清賢士也為太子率更令太子家令六典曰家令之職掌皇太子之飲膳食儲庫藏之政令揔食官典倉司藏三署之官屬皇太子備禮出入則乘軺車威儀先諸臣以導引若祭祀賓客則供酒食以為獻主漢書曰文帝以朝錯為太子家令多所獻替稱為智囊漢書曰踈受字公子為太子家令恭謹敏而有辭宣帝置酒太子宮受奉觴上壽辭禮間雅上甚歡愜續漢書百官志曰太子家令秩千石主倉穀物職如司農少府擬廷尉也蜀志曰譙周字尹南後主為太子以周為家令後主時頗出遊觀增廣聲樂周上諫曰昔王莽之敗豪桀並起跨州據郡欲併神器於是賢才智士思望歸未必以其勢之廣狹唯其德之薄厚也宋書曰太子家令主內茵蓐床機諸供中之物又知官奴婢月用錢內庫米鹽車牛刑獄唐書官品志曰家令掌刑法食膳倉庫什物奴婢等事太子僕六典曰太子僕之職掌車輿乘騎儀仗之政令及喪葬之禮物卞其次敘與其出入而供給之皇太子之車輅三一曰金輅二曰軺輅車三曰四望凡皇太子備禮而出則率廄牧令進輅僕親馭焉後漢書太子少傅屬官有太子僕一人秩千石主車馬職如太僕太子五日一朝非入朝日遣僕及中允朝朝入請問起居沈約宋書曰太子僕秦官也宋起居注曰元嘉中以散騎常侍荀伯子為太子僕隋書曰柳肅遷太子僕太子廢坐除名為民大業中帝與假達語及庶人罪惡之狀達云柳肅在宮大見踈斥帝問其故答曰學士劉臻嘗進章仇太翼於宮中為巫蠱事肅知而諫曰殿下帝之冢子位當儲二誡在不孝無患見疑劉臻書生鼓搖脣舌適足以相誑誤願陛下勿納之庶人不懌他日謂臻曰汝何故漏泄使柳肅知之令面折我唐書官品志曰僕掌宗族親踈車輿騎乘也太子典膳丞六典曰典膳郎掌進膳嘗食之事丞為之二每夕局官於廚更直北齊書曰門下妨始別置典膳局有監丞各二人唐書曰邢文偉滁州全椒人也遷太子典膳丞時孝敬在東宮罕與宮臣接見文偉輒減膳上書曰臣竊見禮戴記曰太子既冠成人免於保傅之嚴則有司過之史徹膳之宰史之義不得不司過宰之義不得不徹膳今皇帝式稽前典妙簡英俊自庶子已下至咨議舍人及學士侍讀等使翼佐殿下以成聖德近者以來未甚延納談議不狎謁見尚稀三朝之後但與內人獨居何由發揮聖智使睿哲文明者乎今史雖闕官宰當奉職忝備所司不敢逃死謹守禮經輒申減膳太子答書曰顧以庸虛早尚墳典每欲研精政術極意書林但往在幼年未間將衛竭誠耽誦因即損心比日以來風虛更積中奉恩旨不許重勞加以趨侍含元溫清朝夕承親無自專之道遵禮以色養為先所以屢闕坐朝時乖學緒公潛申雅勗式薦忠規敬尋來請良符宿志自非情思審諭義均弼諧豈能進此藥言形於簡墨撫躬三省感愧兼深文偉自此益知名太子侍讀唐書曰玄宗在東宮張説與國子司業禇無量俱為侍讀深見親敬又曰元和十二年諫議大夫韋綬罷皇太子侍讀綬好諧戲兼通小説太子因侍上或以綬所能言之上謂宰臣曰侍讀者當以經術輔導太子使深知君臣父子之教令或聞綬之談論有異於是豈所以導太子者因命罷其職又曰呂元膺為同州刺史及中謝上問時政得失元膺論奏辭氣激切上嘉之翌日謂宰臣曰呂元膺有讜言直氣宜留在左右使言得失卿等以為何如李藩裴垍賀曰陛下納諫超冠百王乃宗社無疆之休臣等不能廣求端士又不能數進忠言孤負聖心合當罪戾請留元膺給事左右尋兼皇太子侍讀五代史後唐史曰倉部郎中何澤上疏請置太子侍讀勑旨何澤早處班行深明典制固根本而別彰憂國上封章而足表匡君其所敷陳實為允當特議施行太子門大夫六典曰宮門郎掌內外宮門管籥之事凡宮殿門夜漏盡擊漏鼓開夜漏上水一刻擊漏鼓閉每歲終行儺應經所由門並先一刻早開若皇太子不在則閉東宮正門其宮城使宿衛人應入宮殿者各於左右廂便門出入至皇太子還仗乃開續漢書百官志曰門大夫員二人秩六百石職比郎將漢書曰文帝朝錯為太子舍人轉太子門大夫晉書曰太子門大夫局準公車令班同中書舍人主通遠近箋表宮門禁防唐書曰龍朔二年改門大夫為宮門郎職比城門郎三輔決録曰桓帝以平陵魯寬為太子門大夫太子左衛率六典曰左右衛率掌東宮兵仗羽衛之政令揔諸曹之事凡親勳翊府及廣濟等五府屬焉副率為之二凡元正冬至皇太子朝宮臣及諸方使則率衛府之屬以儀仗為左右廂以衛之若皇太子備禮出入則如鹵簿之法以從續漢書百官志曰衛率四百石主門衛晉志曰凡太子出前衛率導在前廣麾外左右二率從夾導輿車後衛率從在烏皮外並帶戟執刀其服並視左右衛將軍晉書曰劉卞為愍懷太子左率知賈后必害太子乃問張華華曰君欲如何卞曰東宮俊乂如林四率精兵萬人公居阿衡之任若得公命皇太子因朝使録尚書事廢賈后金墉兩黃門力耳華曰廢立大事又非所能賈后微聞遷卞為雍州刺史卞恐終露乃服藥卒晉中興書曰禇翼字謀遠少失父以才藝堪幹立名肅祖即位徵拜屯騎校尉遷太子左衛率隋書曰宇文述每與晉王謀事及晉王為皇太子以述為左衛率舊令率官第四品上以述素貴遂進率品為第三其見重如此唐書官品志曰左右衛率各一人位視御史中丞各有丞左率領果毅統遠立忠建寧凌鋒夷冠祚德等七營右率領崇榮永吉崇和細射等四營二率各置尉山公啓事曰太子左率鈌侍威重宜得其才無疾患者城陽太守石崇忠讜有文武河東太守焦勝清貞有信義皆其選也右衛率晉中興書曰郤恢字道弲為太子右衛率恢八尺美鬚髯風神魁梧烈宗異之又曰吳隱字處默太元中以國子博士為太子右衛率沈約宋書曰元嘉中以王琳謝弘徵並為太子右衛率隋書曰高祖以太子勇知時政欲重宮官之資故以大臣領其職蘇孝慈自兵部尚書拜右衛率尚書如故上將廢太子憚其在東宮乃出為浙州刺史荀綽冀州記曰裴康字仲預與弟揩為名士仕至太子右衛率荀氏家傳曰車騎將軍悝字茂中山濤舉之為太子右衛率稱君清和理正從容顧問動可觀採真侍衛之美者前衛率晉中興書曰徐邈字仙民建元中為太子前衛率後衛率晉起居注曰建元十四年以太子中舍人郤儉為太子後衛率宋起居注曰永初元年以徐佩為太子後衛率左右內率府長史六典曰左右內率府長史掌判諸曹官吏及千牛備身之二唐書曰永淳中以雍人元讓為太子右內寧府長史旌孝行也讓弱冠明經擢第以母疾遂不求仕躬親藥膳蒸蒸致養不出閭里十餘年及母終廬於墓側蓬髮不櫛沐菜食飲水而已咸亨中孝敬監國下令表其門閭至是巡察使奏讓孝悌殊異由是拜職
