body:
  text: 釋部五經晉書曰姚興妃逍遙園引沙門于澄玄堂聽鳩摩羅什演佛經羅什通辨夏言尋覽舊經多有乖廖不與胡本相應興與羅什及沙門僧肇曇順等八百人更出大品羅什持胡本興執舊經以相考校其新文異舊者皆會於理義續出諸經并諸論三百餘卷今之新經皆此羅什所譯興既託意於佛道公卿已下莫不欽附沙門自遠而至者五千餘人起浮圖于永貴里立波若臺于中宮沙門坐禪者恆有千數州郡化之事佛者十室而九矣齊書曰張緒為中書令善談玄駕幸莊嚴寺聽僧達道人講維摩坐遠不聞緒言上難移緒乃遷僧達梁書曰張稷出為青冀二州剌史不得志嘗閉閣讀佛經又曰劉協字彥和早孤篤志好學家貧不婚娶依沙門僧祐居遂博通經論因區別部類録而序之定林寺經藏協所定也協為文長於佛理都下寺塔及名僧碑志必請協製文勑與惠震沙門於定林寺撰經證功畢遂求出家先燔鬚髮自誓勑許之乃變服改名惠地又曰任孝恭少從蕭寺雲法師讀經論明佛理至是蔬食齊戒信受甚篤而性頗自伐以才能尚人於流輩中多有忽略世以此少之又曰皇侃性至孝常日誦孝經二十遍以擬觀世音經又曰梁蕭察謂其度支尚書宋如周曰卿何為謗經如周踧躇自陳不謗察又謂之如初如周懼出告蔡大寶大寶知其旨笑謂之曰君當不謗餘經正應不信法華耳如周乃悟然法華云聞經隨喜面不狹長如周面狹且長由是察有此戲陳書曰王固清虛寡欲信佛法及丁所生憂遂終身蔬食夜則坐禪晝誦佛經嘗聘魏宴于昆明池魏人以南人嗜魚大設罟網固以佛法呪之遂一鱗不獲後魏書曰裴宣高祖曾令集沙門講佛經因命宣論難甚有理詣高祖稱善唐書曰韋綬字子章京兆人少有至性喪父剌血寫佛經又曰貞元十四年南天竺國進花嚴經殘梵夾令僧般若三藏於保壽寺僧智柔圓照同於崇福寺翻譯成四十卷高僧傳曰釋道安姓衛氏常山人初經出已久而舊譯時謬致使深義隱沒未通每至講說唯敘大意安躬覽經典鉤深致遠並尋文比句為起盡之義經義克明自安始也洛陽伽藍記曰神龜九年十一月太后遣崇靈寺比丘惠生向西域取經凡得一百七十部皆是大乘妙典涅槃經曰是諸大乘經為滿字無缺少之義也小乘諸教悉為半字義未圓故云半字像晉書曰恭帝深信浮圖道鑄貨千萬造丈六金像於瓦官寺帝親迎之群臣步從滿十許里又曰彭城王紘上言樂賢堂有先帝手畫佛像經歷寇難而此堂猶存宜勑作頌帝下其議蔡謨曰佛者夷狄之俗非經典之制先帝量同天地多才多藝聊因臨時而畫此像至於雅好佛道所未承聞也今欲發王命勑史官上稱先帝好佛之志下為夷狄作一像之頌於義有疑焉於是遂寢又曰秦將呂光伐龜茲將軍杜暹夢金像飛越龜茲之城曰所謂佛神去之胡亡必矣又曰咸和中丹陽尹高悝行張侯橋見浦中五色光長數尺不知何怪乃令人於光處得金像無有光趺悝乃下車載像還至長干巷首牛不肯進悝乃令馭人任牛所之牛徑牽至寺經一歲臨海漁人張係世於海口忽見銅花趺浮出取送縣以送臺乃施像足宛然合會簡文咸安元年交州合浦人董宗之採珠沒水底得佛光豔交州送臺以施像又合焉自咸和中得像至咸安初歷三十餘年光趺始具初高悝得像後有西域胡五人來詣悝曰昔於天竺得阿育王造像來至鄴下逢胡亂埋於河邊今尋覔失所五人嘗一夜俱夢見像曰已出江東為高悝所得悝乃送此五僧至寺見像歔欷涕泣像便放光照燭殿宇像趺先有外國書莫有識者後有三藏那跋摩識之云是阿育王為第四女所造也宋書曰劉牢之子敬宣八歲喪母晝夜號泣四月八日見衆人灌佛乃下頭上金鏡為母灌像因悲泣不自勝又曰沉道虔纍世事佛推父祖舊宅為寺至四月八日每設像之日輒舉家慟焉又曰自漢世始有佛像形製未工戴逵特善其事顒亦參焉宋世子鑄丈六銅像於瓦官寺既成面恨瘦工人亦不能改乃迎戴顒顒曰非面瘦乃臂胛肥爾及減臂胛瘦患即除無不歎服梁書曰阮孝緒末年蔬食斷酒恆供養石像先有損壞心欲補之罄心敬禮經一夜忽然完復衆並異之又曰大通四年又造一丈六尺旃檀像量之剩二尺成丈八形次衣文及手足更重量又剩一尺五分至大通五年寺僧洽重量又剩七寸即是長二丈矣大同四年移入大殿勑主書吳文寵更量又剩五寸凡五度量即長二丈七寸豈非精誠所感耶又曰武帝捨宅造寺未成於小莊嚴寺造無量壽像長一丈八尺及鑄而銅不足帝又給功德銅三千斤臺內送銅未至像處已見銅車到爐所於是就冶一灌便足在後臺司銅至方知向來送銅靈感所致及開模像以成丈九而相好不差又有大錢二枚見在衣絛竟不銷鑠其年欲移像還寺未移前淮中估客每夜輒聞大橋上如有人修道路往視不見人俄而像度光彩輝煥觀者莫不歸心北齊書日有沙門晏通於道傍造大漆像教化乞財所得物咸以入常以杖敲此像號曰出課烏奴又曰封述勃海蓨人一息娶隴西李士元女大輸財娉及將成禮猶竟懸違述忽取所供養像對士元搖而示之士元笑曰封公何處常得應急像洛陽伽藍記日西域捍魔城南十五里有一大寺三百餘僧有像一軀舉高丈面常東立不肯西顧父老相傳云此像本從南方騰空而來于置國王親來敬禮請像載歸中路夜宿忽然不見遣人尋之還來本處王即起塔封四百戶以供灑掃人有患者以金薄帖像所患處即得除愈後人於此像邊造丈六像及諸像塔乃至數千懸彩幡蓋亦有萬計魏國之幡過半幡上隸書多云太和景明延昌唯有一幡觀其年號是姚興時幡西京記曰光福坊大興寺有阿育金像歷宋齊梁陳數有奇異陳國亡忽面自西向雖止之還爾隋文帝載入長安內中供養後移置此寺寺衆以殿大像小不可當陽置之於北面明日乃自轉正陽衆咸驚異復置北面明日復還轉南面衆乃懺謝不復更動又曰崇敬寺有石像一軀高五尺製作粗惡甚有靈驗傳云是阿育王第四女所造其女貌醜常自慨恨多作佛像及成皆類如此千數乃至誠祈禱忽感佛見形更造諸像相好方具其父使鬼神遍散諸像於天下此其一也高僧傳曰釋曇翼出家事安公為師後居長沙寺翼常歎寺立僧足而形像尚少阿育王所造多布在餘方嘗聞外國僧說有至誠所請者亦為之降見乃專精懇惻更求誠應以晉太元中忽有一金像現於渚宮城北路上光明照灼百姓驚駭翼聞乃往祇禮謂衆人曰當是阿育王像降我長沙寺焉即令弟子數人捧接迎至長沙寺其後罽賓禪師從蜀下入寺禮拜見像光生有胡字便日是阿育王像何時來此時人方知翼之不謬又曰漢明帝使蔡愔於西域得畫釋迦奇像是優由王旃檀像既至雒明帝即令圖畫寫置清涼臺中及顯節陵上增一阿含經曰優填王勑國內巧匠會以牛頭旃檀作佛像形供養晨夕禮拜是時波斯匿王聞優填王作佛像供養亦召巧匠語言如來形體煌若天金今當以直金作佛形像即以紫磨作如來像亦高五尺爾時閻浮提中始有三像法顯記曰僧尼羅國王以金等身而鑄像髻裝寶珠有盜者以梯取之像漸高而不及盜歎其不救衆生像俯首而與之後市人擒盜盜言其事視像尚俯王重贖其珠而復裝之像記曰梁武帝天監元年正月八日夢檀像入國因發詔往迎像按佛遊天竺記及優填王經云佛上忉利天一夏為母說法王臣思見優填國王遣三十二匠及齎旃檀請大目連神力運往令圖佛相既如所願圖了還返坐高五尺在祇洹寺至今供養帝欲迎請此像遣決勝將軍郝騫等八十人應募往達具狀祈請舍衛王曰此中天正像不可適邊乃命三十二匠更刻紫檀人圖一相卯時運手至午便就相好具足而像頂放光降微細雨并有異香故優填王經云真身既隱次二像現普為衆生深作利益者是也騫等負第二像行數萬里度大海冒涉風波隨浪至山糧食又盡所將人衆及傳送者身多亡歿逢諸猛獸一心念佛乃聞像後有甲胄聲又聞鍾聲岩側有僧端坐樹下登負像下置其前僧起禮像騫等禮僧僧授澡罐令飲並得飽滿僧曰此像名三藐三佛陀金毗羅王自從至彼大作佛事語頃失之爾夜僉夢見神曉共圖之至天鑒十年四月五日騫等達于揚都帝與百僚迎還太極殿至大清三年湘東王在江陵即位遣人從揚都迎上至荊都後梁大定八年城北靜陵造大明寺乃以像歸之今見在多有傳寫流被京國云
