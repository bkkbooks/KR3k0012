body:
  text: 人事部二十美丈夫上尚書洪範曰二五事一曰貌容儀毛詩曰云誰之思西方美人箋云思問室之賢者彼美人兮西方之人兮箋云彼美人謂碩人也又曰叔于田巷無居人叔大叔段也田取禽也豈無居人不如叔也洵美且仁洵信也又淇奧曰有匪君子如金如錫如圭如璧寬兮綽兮猗童較兮又猗嗟曰猗嗟昌兮頎而長兮昌盛也頎長貌也抑若揚兮抑美色揚廣揚美目揚兮好目揚眉巧趨蹌兮射則臧兮又小戎曰文茵暢穀駕我騏馵言念君子溫其如玉又盧令曰盧令令其人美且仁盧重環其人美且鬈鬈好貌讀當為權權勇壯也盧重鋂其人美且偲偲才也又汾沮洳曰彼其之子美如英美如英殊異乎公行又曰彼其之子美如玉美如玉殊異乎公族左傳曰宋公子鮑美而艷又曰子太叔美秀而文又曰冉豎射陳武子中手冉豎季氏臣失弓而罵武子罵詈以告平子曰有君子白晢鬒鬚眉甚口平子曰必子彊也子彊武子字爾雅曰美士為彥論語曰堂堂乎張也言子張容貌盛難與並為仁矣孝經曰容止可觀進退可度家語曰息土之民美漢書曰張子房狀貌如美婦人又曰直不疑狀貌甚美又曰班伯少受詩於師丹大將軍王鳳薦伯宜勸學召見宴昵殿中容貌甚麗誦說有法拜中常侍又曰公孫弘對策時百餘人太常奏弘第居下天子擢弘對為第一召入見容貌甚麗拜為博士待詔金馬門又曰張蒼好書律曆為御史主柱下方書亡歸沛公略地過武陽蒼當斬解衣伏質蒼美麗長大肥白如瓠王陵見美乃言沛公赦之後為御史大夫及為相事陵如父陵死蒼洗沐常先朝陵夫人上食後歸又曰陳平少時家貧好讀書長大美色而肥或譖平於漢王曰平雖貧美丈夫如冠玉耳注曰此王比平又曰董偃始與母賣珠為事年十三隨母至館陶公主家左右言其姣好主召見曰吾為母養之因留第中教書射御年十八乃冠出則執轡入則侍內甚溫軟以主故諸公接之名稱城中號曰董君又曰車千秋姓田為高寢郎戾太子敗千秋訟太子冤上頗知太子無他意乃召見千秋千秋長八尺餘體貌甚麗帝悅之曰此高廟神靈使公公當遂留輔我後年老乘小車上殿故號車氏又曰董賢字聖卿雲陽人也為太子舍人哀帝時為郎傳漏在殿為人美麗哀帝望見悅其儀貌拜為黃門郎又曰江充召見太一宮自請願以所常被服衣冠見上許之魁岸容貌甚壯帝望見異之謂左右曰燕趙固多奇士又曰王商長八尺餘體甚鴻大容貌絶人單于來朝仰視遷延卻退天子聞而嘆曰真漢相也又曰東方朔目如懸珠齒如編貝又曰司馬相如車騎雍容間雅甚都都間雅之稱也又曰薛宣好威儀進止雍容細甚可觀又曰霍光白晢踈目美鬢髯也後漢書曰徐防字謁卿沛國人也體貌矜嚴占對可觀顯宗異之特授尚書郎又曰新野功曹鄧衍以戚小子侯每預朝會容姿趨步有出於衆顯宗目之曰朕之容貌豈若此人時賜與焉衍雖有容儀而無實行未嘗加禮又曰蔡雍字伯喈謂從弟谷曰董卓性剛難濟吾且遁逃山東以待如何谷曰君狀異恆人每行觀者盈集以此自匿不亦難乎乃止謝承後漢書曰楊喬為尚書容儀偉麗數上言政事桓帝愛其才貌詔妻以公主喬固辭不聽還閉口不食七日而死東觀漢記曰杜詩薦伏湛曰儀貌堂堂國之輝光智略謀慮朝之淵藪又曰馬援自還京師數被進見為人明白眉目如畫間進對尤善述前事每言及三輔長者至閭里少年皆可觀皇太子諸王聞者莫不屬耳忘倦又曰虞延字子大陳留人也上東巡路過小黃高帝母昭靈后園陵在焉時延為督郵詔呼見問園陵事延進止從容跪拜可觀其陵樹株蘖皆諳其數帝善之魏志曰邢顒字子昂時人稱德行堂堂邢子昂文帝以為太常吳志曰諸葛恪宇元遜江表傳曰恪辨論應機莫與為對孫權見而奇之謂父瑾曰藍田出美玉真不虛也又曰朱據字子範吳郡人有姿貌膂力又能論難黃武初徵拜五官中郎將權遷建鄴徵尚公主拜左將軍封雲陽侯謙虛接士輕財好施又曰孫韶字公禮為邊將不進見十餘年權還建鄴乃得朝覲問諸要害遠近人馬衆寡將卒名字具識之所問咸對身長八尺儀貌都雅權悅曰吾久不見公禮又曰呂範字子衡汝南人有姿貌邑人劉氏家富女美範求之母嫌欲勿與範親劉氏曰觀呂子衡寧當久貧者耶遂與之婚又曰孫桓儀容端正聰明博學能論議應對孫權常稱為宗室顏淵又曰張純少厲操行學博才秀切問捷對容止可觀拜郎中晉書曰裴揩字叔則為吏部侍郎風神高邁容儀俊爽博涉群書特精義理時人謂之玉人又曰尚書閔鴻見陸雲奇之此兒若非龍駒則是鳳雛又曰潘嶽字安仁滎陽中牟人才名冠世出為河陽令有異政纍遷給事中美姿儀少時常挾彈出洛陽群嫗相遇者悉連手縈繞以果擲之盈車而歸又曰王恭字伯季纍遷為青兗二州刺史美姿儀人或多目之云濯濯若春日柳恭嘗被鶴氅裘涉雪而行孟昶窺見之歎曰神仙中人又曰衛玠字叔寶河東安邑人也齠齓年乘白羊車入市見者咸曰誰家璧人遂號為璧人王武子玠之舅也嘗與同遊語人曰昨日與吾外甥並坐若珠玉在側朗然映人覺我形穢及長好言玄理武子每聞玠言歎息絶倒故時人語曰衛玠談道武子絶倒玠妻父樂廣有重名議者以為婦公冰清女壻玉潤為太子洗馬以國亂至江夏玠亡其妻征南將軍山簡以女妻之至豫章大將軍王敦謂長史謝鯤曰昔王輔嗣吐金聲於中朝此子復玉振於江表後求往建鄴敦遣之京師人聞其姿容觀者如堵不見者輒嘆之又曰王衍字夷甫有美貌幼清辨仕至太尉嘗執玉柄塵尾與手無別人為之義口中雌黃為世間之一龍義理有所不安者即隨改之妻郭氏賈后之親籍宮中勢藂斂無猒夷甫患之口不言錢妻試之令婢以錢繞床夷甫曰好舉阿堵物又曰石苞字仲容渤海南皮人也雅曠有智容儀偉麗不修小節故時人為之語曰石仲容姣無雙又曰嵇康長七尺八寸美音氣好容色土木形骸不自藻飾人以為龍章鳳姿天質自然又曰王戎字濬沖幼頴悟神彩秀徹視日不昡裴楷目之曰戎眼爛爛如巖下電又曰王蒙字仲祖美姿容嘗覽鏡自照稱其父字曰王文開生如此兒耶嘗帽破入市買之群嫗悅之爭遺其帽又曰謝尚論中朝人物劉琰云杜又膚清衛叔寶神清為有識所重如此又曰韓壽武帝時為掾有姿容太尉賈充有室女見壽美心悅之充有異香女竊與壽帶之充怪以問婢婢以告充乃以女妻之又曰王戎謂王衍神姿高徹如瑤林瓊樹自是風塵外物又曰文帝器重魏舒每朝會坐罷目送曰魏舒堂堂人之領袖也又曰桓溫字元子宣城太守彝之子也生未朞而大原溫嶠見之曰此兒有奇骨可試使啼及聞聲曰真英物也年長豪爽有氣慨姿貌甚偉又曰王衍神情明秀王澄曰兄形似道而神鋒大俊晉中興書曰王矩字令式美容貌每出行觀者盈路宋書曰謝莊字希逸美容儀善談論屬文好玄理為文帝所賞帝一見之輒歎曰藍田出美玉豈虛也哉又曰蓋道風姿貌端雅容止可觀中書郎范述見而奇之曰此荊楚仙人也又曰謝晦美風姿善言笑眉目分明鬢髮如墨涉獵文義朗贍多通時人以方楊德祖微將不及晦聞猶以為恨齊春秋曰世祖嘗於華林園宴集使群臣各出所能王儉曰臣少為書生請誦封禪書跪前誦之容止可觀音吐蘊藉上大悅曰樂哉梁書曰陶洪景字通明特愛松風每聞其響欣然為樂有時獨遊泉石望見者以為仙人又曰王茂字休遠太原祁人也身長八尺美容觀武帝布衣時見之歎曰王茂年少堂堂如此必為公輔之器崔鴻十六國春秋前涼録曰辛綝弟理美姿貌張駿欲奪其妻以寡妹妻之理割鼻自誓駿大怒徙理燉煌遂以憂死又曰前趙録曰遊子遠幼姿貌聰亮好學年十五至洛陽張華見而奇之曰此兒雅潔洪方精公才也又曰後趙録曰張謐美姿貌幼有逸氣太守陸雲見而異之謂傅喜曰吾聞冀州多名童故不虛也又曰劉光弱冠美姿儀自稱佛太子從大秦來當至小秦國易姓名為季子轉相扇惑藂千人於南山僣稱號鎮西石廣擊斬之于鄠頸無血十餘日面猶如生北齊書曰崔陵子瞻字彥通聰明有文情善容止神彩凝然楊愔曰昔裴瓚在晉也為中書郎情高邁每於禁門出入宿衛者肅然動容崔生堂堂之貌亦當無愧裴子又曰王昕字元景北海劇人也生九子并風流蘊藉世號王氏九龍又曰劉禕五子並有志行為世所稱璿字祖玉聰敏機悟美姿儀為其舅北海王昕所愛顧座曰可謂珠玉在傍覺我質穢又曰李繪字恭文儀貌端偉河間邢晏即繪第五舅也與繪清言歎其高遠每稱曰若披雲霧如對珠玉又曰北平陽貞字仁堅世祖第五子沉審寬恕太祖稱之曰此兒得我鳳毛又曰陸郎字雲駒洛陽人也昆弟六人並魏藍田公主元氏所生故邢邵嘗謂人云藍田生美玉豈虛也十二國史曰鄒忌為齊相身長八尺餘體肥麗朝服衣冠窺照自視謂其妻曰我與城北徐公孰美妻曰君美徐公齊之美者也忌不信復問妾妾曰君美旦日客從外來忌復問之客亦曰徐公不如君及徐公來忌孰視之自以為不如因思之曰吾妻之美我私我也妾之美我畏我也客之美我有求於我也於是入朝見威王曰臣誠不如徐公而臣妻妾及客皆言臣美或私畏於臣或有求於臣今齊地千里宮女左右莫不私王朝廷之臣莫不畏王四境之內莫不有求於王由此觀之王蔽甚矣王曰善乃下群臣吏民能面剌寡人過者受上賞又曰美男破老美女破居北史後魏書曰咸陽王禧弟樹字秀和一字君立美姿貌有將略位宗正卿後奔梁梁武尤器之封為魏郡王陳書曰韓子高會稽山陰人本家微賤年十六猶總角才敏過人容貌美麗狀似婦人又曰謝哲字頴豫陳郡陽夏人也美風儀舉止蘊藉襟情朗然為士君子所重又曰蕭允字叔然蘭陵人也風神凝遠通達有識鑒容止蘊藉動合規矩又曰王瑒字子璵司空冲之第十三子沉靜有器局美風儀舉止蘊藉又曰宜郡王叔明字照高宗第六子也儀容美麗舉止柔弱狀似婦人隋書曰燕王倓字仁安敏慧美姿儀煬帝於諸孫中特所鍾愛常置左右好讀書重儒素有若成人良娣早終每至忌日未嘗不流涕嗚咽帝由是益奇之又曰元善洛陽人也以風流蘊藉俯仰可觀音韻清朗聽者忘倦由是為後進所歸語林曰何平叔美姿儀而絶白魏文帝疑其著粉夏月與熱湯餅既啖大汗出隨以朱衣自拭色轉皎然又曰王右軍目杜弘冶曰面如凝脂眼如點漆此神仙中人也異苑曰鄢陽陳忠女名豐鄰人葛勃有美姿豐與村中數女共藂絡絲戲相謂曰若得壻如葛勃無所恨也
