body:
  text: 職官部十八中書令六典曰中書令之職掌國之政令緝熙帝載統和天人入則告之出則奉之以釐萬邦以度百揆蓋以佐天子而執大政者也漢書曰司馬遷既被刑之後為中書令尊寵任職又曰石君防與弘恭皆少坐腐刑為黃門以選為中尚書宣帝時任中書官以恭為令君防為僕射恭死君防代為令貴幸傾朝百寮皆敬事應劭漢官儀曰左右曹受尚書事前世文士以中書在右因謂中書為右曹又稱西掖吳録曰紀騭字子上景皇時騭父亮為尚書令騭為中書令每朝會詔以屏風隔其坐吳志曰胡冲平和有文幹天紀中為中書令又曰張尚有俊才孫皓時為侍郎以言語辨捷見知擢為侍中中書令又曰蔡款字文德歷位內外以清貞顯於當世衛尉領中書令晉書曰王獻之為中書令少而摽邁不循常貫文義並所不長而能撮其勝會故為一時風流之冠獻之卒以王珉代之世謂之大王令小王令也珉父洽永和中嘗為此官至珉復居之時人以為奕世令望又曰王獻之為中書令啓琅㖿王為中書監表曰中書職掌詔命固非輕才所能獨任自晉建國常命宰相參領中興以來益重其任故能王言彌徽德音四塞又曰和嶠為中書令荀勗為監嶠意抗直鄙荀巧佞以意氣加之專車而坐自此監令乃使異車臧榮緒晉書曰潘尼性淡退唯以著述為事永興末為中書令晉陽秋曰王洽除中書令時年二十九將辭之從兄朗之遺書曰弟今二十九便居清顯要任敢不敬以先旨為弟啓義讓之路焉若弟年至四五十之間雖復超登公輔亦非吾所豫况降此以還者耶洽遂不拜又曰溫嶠上疏曰臣才短學淺文義不通中書之職酬對無方斟酌重輕豈唯文疏而巳自非望士良才何可妄居斯任纍辭得止晉中興書曰肅祖以溫嶠為散騎常侍侍講太寧初手詔曰卿既以令望忠允之懷著於周旋且文清而旨遠宜居深密今欲以卿為中書令朝論咸以為宜又曰王洽字敬和顯宗時王洽為中書令帝曰敬和清裁昔為中書郎吾尚小數呼見意甚親之今以為中書令欲共講文章之事也又曰褚裒授衛將軍中書令裒以中書銓管詔命不宜以親居之固讓晉令曰中書為詔令記會時事典作文書也晉制曰中書令銅印墨綬進賢兩梁冠絳朝服佩水蒼玉乘軺車晉諸公讚曰陳准為中書令張華為監准與華俱處機密而推崇之每直日有詔書無小大輒先示華了不措意華得詔書不以示准為中號准為中書五郎其從容如此又曰懷帝以繆播為中書令朝事莫不咨之人君之所取信於臣下無以尚也宋書曰傅亮永初元年為中書令直中書省專典詔命以亮任揔國權聽於省見客神虎門外每旦車常數百兩宋泰始起居注曰王言之職揔司清要中將軍丹陽尹王景文夙尚弘簡情度淹粹忠規茂績實宣國道宜兼管內樞以重其任可中書令齊書曰王延之代張緒為中書令何點歎曰晉以子敬季琰為此職今以王延之張緒為之可謂清官後接之者實為未易崔鴻後趙録曰徐光字季武頓丘人幼有文才年十三王陽攻頓丘掠之而令主秣馬光但書柱作詩賦左右以白石勒勒令召光付紙筆光立為頌賜衣服遷為中書令後魏書曰任城王澄為中書令蕭頤使庾菙來朝見澄音韻遒雅風儀秀逸謂主客郎張尋曰往魏任城以武著稱今魏任城乃以文見美也又曰高允高宗禮敬甚重晨入暮出或積日居中朝臣莫知所論或有上書言得失者高宗省而謂群臣曰君父一也父有是非子何為不能書諫之使人知惡而於家內隱處也豈不以父親恐惡彰於外也今國家善惡不能面陳而上表顯諫此豈不彰君之短明巳之美至如高允者真忠臣矣朕有非恆正言面論至朕所不用聞者皆言說無避就朕聞其過而天下不知其諫豈不忠乎汝等在左右曾不聞一正言但向朕喜時求官乞職汝等把弓刀侍朕左右徒立勞耳皆至公王此人把筆匡我國家不過作郎汝等不自愧乎於是拜允中書令又曰高允字伯恭為中書令高宗重之不名恆呼為令公又曰高允拜中書令司徒陸麗曰高允雖蒙寵待而家貧布衣妻子不粒高宗怒曰何不先言今見朕用之方言其貧是日幸允第惟草屋數間布被縕袍廚中藍菜而巳高宗歎息曰古人之清豈有此乎即賜帛五百匹粟千斛唐書曰武德年嘗有勑而中書門下不時宣行高祖責其遲由內史令蕭瑀曰臣見內史宣勑或前後相乖者百司行之不知何所承用所謂易雖在前難必在後臣在中書日久備見其事今皇階初搆事涉安危若遠方有疑恐失機會比每受一勑臣必審勘使與前勑不相乖背者始敢宣行遲晚之愆實由於此上善之又曰褚遂良拜中書令太宗寢疾召遂良及長孫無忌入臥內謂之曰卿等忠烈簡在朕心昔漢武寄霍光劉備託葛亮朕之後事一以委卿太子仁孝卿之所悉必須盡誠輔佐永保宗社又顧謂太子曰無忌遂良在國家之事汝無憂矣又曰神龍元年改中書令曰紫微令又曰開元二年紫微令姚崇奏紫微舍人六員每議事諸舍人同押連署狀進訖凡事有是非理均與奪人心既異所見或殊抑使雷同情有不盡臣今啇量其事執見不同者望請別作啇量狀連本狀同奏若狀語交牙恐煩聖思臣既是官長望於兩狀後略言二理優劣奏聽進止則人各盡能官無留事勑曰可又曰張九齡為中書令時天長節百寮上壽多獻珍異唯九齡進金鏡録五卷言前古興廢之道上賞異之薛瑩條列吳事曰胡冲意性調美心趣解暢有刀筆才間於時事為中書令雖不能匡矯亦自守不茍求容媚王珉別傳曰珉字季琰詔曰新除侍中王珉才學廣贍理識清通宜處機近以參時務其以珉為長兼中書令郭頒魏晉世語曰劉放孫資共典樞要夏侯獻曹肇心內不平殿中有雞棲樹二人相謂此亦久矣其能復幾指謂中書監劉放中書令孫資又曰司馬景王令中書令虞松作表輒不可意令松更定思竭不能改鍾會為定五宇松深悅服宋謝莊讓中書令表曰伏惟陛下登馭震維臨齊璿政澤與風翔恩從雲動臣聞璧門天邃鳳沼神深絲綸王言出納帝命自非望允當時譽宣庠孰未有謬垂曲寵空席茲榮在於平壯猶不可勉况今綿痼百志俱淪中書監魏志曰黃初中改祕書為中書以劉放為監孫資為令遂並掌機密歷文明齊王三世又曰蔣濟字子通時中書監令號為專任濟上疏曰大臣太重者國危左右太親者身弊古之至戒也往者大臣秉事外內扇動陛下卓然自覽萬機莫不祇肅夫大臣匪不忠也然威權在下則衆心慢上勢之常也陛下既巳察之於大臣願無忘於左右晉書曰荀勗守中書監毗贊朝政及遷尚書令勗久在中書專管機事失之甚慍人有賀者勗恚曰奪我鳳皇池諸公何賀焉又曰太安元年有胡人入雲龍門殿前再拜云我當作中書監付都虞候斬之晉陽秋曰朱整少有名行官至中書監魏禪晉使整與中書令劉良共為詔世祖踐祚權即用之晉中興書曰肅宗欲使庾亮為中書監亮上疏曰陛下踐祚復以臣領中書則示天下有私矣晉諸公讚曰華廙為中書監時事多不泄啓世祖乞授子薈答詔先時荀勗為中書監末年亦使息組書詔草傅祗為中書監病風復使息暢書啓事皆前後相承以子弟管之後魏書曰孝文時蠕蠕如兗反國有喪帝遣高閭為書與之不敘凶事孝文謂曰卿為中書監職典文詞若情思不至應謝所任環濟要略曰中書掌內事密詔下州郡及邊將不由尚書者也後關百官事益重有令僕射丞郎令史秩與尚書同陶氏職官要録曰中書監舊視僕射梁選簿書自宋巳來比尚書令特進之流而無事任清貴華重大位多領之王導表曰臣乞得除中書監持節專一所司竭誠保傅惟力是視詔曰昔者荀公曾從中書監為尚書令人賀之乃發恚云奪我鳳皇池卿諸人何賀耶願足下處之勿疑王敦表曰中書令領軍庾亮清雅履正可中書監領軍如故中書侍郎六典曰中書侍郎掌二令之職凡邦國之庶務朝廷之大政皆參議焉凡臨軒冊命大臣令為之使則持冊書以授之凡四夷來朝臨軒則授其表疏升于西階而奉之若獻贄幣則受之以授於所司魏志曰明帝詔舉中書郎謂吏部尚書盧育曰得其人與不在盧生耳選舉莫取有名有名如畫地作餅不可噉也育舉韓暨敦篤至行帝乃用之吳志曰孫琳求中書兩郎典知荊州諸事主者奏中書不應外出休特聽之其所請求一皆給與也晉書曰華廙字長俊為人清簡弘雅加以名家子孫以婦父盧育典選至年四十五為中書通事郎又曰華表子簡字奉駿有智器文藻官至中書郎又曰衛瓘為中書郎時權臣專政瓘優游其間無所親踈甚為傅嘏所重謂之寧武子臧榮緒晉書曰夏侯孝若為野王令居邑纍歲朝野多歎其屈除中書郎晉起居注曰今之士大夫多不樂出宰牧而好內官今皆先經外官治民著績然後入為常伯中書郎曹嘉之晉紀曰汝南史曜字季茂為山濤所知為征南府小吏鄉人周浚見曜而友之配之妹官至中書郎晉中興書曰孔演字元舒晉國初建與庾亮俱補中書侍郎于時中興肇建庶事草創演經學博通又練識舊典朝議軌制多取正焉由是元明二帝並親愛之又曰顧榮齊王囧召為主簿囧自擅威權榮知其必敗唯終日昏酒囧以榮為中書郎又曰范寧為臨淮太守徵拜中書侍郎專掌西省以職在機近固辭不許多以獻替有益治道又曰范寧拜中書侍郎時烈宗雅好文學而寧明習五經甚見親愛朝廷疑議輒咨訪之寧指朝士直言無諱又曰王濛字仲祖恬暢能言名理善隸書與劉恢為中書侍郎太宗輔政濛恢並數侍接對號為入室之賓恢字真長少清峻時人以濛比袁曜卿以恢比荀奉倩宋書曰王徵與從弟僧綽書曰闔門皆蒙時私吾高臥家巷遂至中書侍郎此足以闔棺矣又曰裴瓚風神高邁為中書侍郎出入禁門見者皆肅然改容北史曰趙彥深諷朝廷子堅為中書侍郎頗招物議時馮子琮子慈明祖珽子君信並相繼居中書故時語云馮祖及趙穢我鳳池隋書曰元善拜內史侍郎上每望之曰人倫儀表也凡有敷奏毅氣抑揚觀者矚目唐書曰郭正一永淳二年除中書侍郎正一在中書纍年明習舊事兼有詞學制勑多出其手當時號為稱職又曰崔沔拜中書侍郎或謂沔曰今之中書皆是宰相承宣制命侍郎雖是副二但署位而已甚無事也沔曰不然設官分職上下相維各申所見方為濟理豈可俯默偷安而為懷祿士也自是每有制勑及曹事沔多所異同王濛別傳曰濛為中書郎在職四年無人對以濛難與比肩故也鍾會母傳曰嘉平元年車駕朝高平陵會為中書郎從行宣王始舉兵衆人恐懼而夫人自若嵇氏世家曰嵇含為中書侍郎書檄雲集莫不立草通典曰隋初為內史侍郎四員煬帝減二員改為內書侍郎陸士衡轉中書侍郎齊王收士衡付廷尉士衡出後謝表曰臣以職在中書制命所出而臣本以筆札見知慮逼迫不獲已乃詐發內妹喪出就第云哭泣受吊片言隻字文不關其間梁庾肩吾為寧國公讓中書郎表曰臣聞陟彼太行伯后之車屢怠望茲吳坂少游之馬難追是知美非流水立致摧轅駿靡浮雲便其頓轡起登天漢寧陪九萬之風坐濟星橋非使千年之翼豈有幼稱辨慧足對元禮弱標俊頴能嘲子淑玉重組長空見休寵深宮邃宇孰知懷憂
