body:
  text: 逸民部二逸民二後漢書曰王符字節信安定臨涇人好學有志隱居著書度遼將軍皇甫規官歸安定鄉人有貨買鴈門太守者還家謁規規臥不迎既入而問卿在郡食鴈美乎有頃王符在門規素聞符名乃驚遽而起衣不及帶屣履出迎援符手而還與同坐極歎時人為之語曰徒見二千石不如一縫掖言書生道義之為貴也又曰向栩字輔興河內朝歌常讀老子狀如學道常坐竈北板床上積久板乃有膝踝足指之處時賓客就之輒伏不起時人莫能測後徵拜侍中侃然正色百官憚之又曰梁鴻字伯鸞扶風平陵人同縣孟氏有女狀肥醜甚黑力舉石臼擇對不嫁至年三十父母問其故女曰欲得賢如梁鴻者鴻聞娉之入門七日而鴻不答妻乃跪床下請曰竊聞夫子高義簡斥數婦妾偃蹇數夫今而見擇敢不請罪鴻曰吾欲裘褐之人可以俱隱今乃衣綺縞傳粉墨豈鴻所願哉妻曰以觀夫子之志耳妾自有隱居之服乃為椎髻布衣操作而前鴻大喜曰此真梁鴻妻也字曰德曜孟光因共入霸陵山後至吳為人賃舂每歸妻為具餐舉按齊眉又曰戴良字叔鸞汝南慎陽人母卒兄伯鸞居廬啜粥非禮不行良獨食肉飲酒哀至乃哭二人俱有毀容或問良曰子之居喪禮乎對曰然禮所以制情佚也情茍不佚何禮之所論哉若食旨不甘故毀容之實若味不存故口食之可也又曰法真字高卿扶風郿人博通內外圖典為關西大儒弟子自遠方至者數百人性恬靜寡欲不交人間事太守見之曰欲以功曹相屈光贊本朝如何真曰以明府見待有禮故敢自同賓來若欲吏之真將在北山之北南山之南者矣太守玃然不敢復言又曰漢賓老父不知何許人也桓帝幸竟陵過雲夢臨沔水百姓莫不觀者老父獨耕不尚書郎張溫異之使問曰人皆觀老父獨不觀何也父曰我野人耳不達斯語請問天下亂而立天子耶治而立天子耶立天子以父天下耶役天下以奉天子耶昔聖王宰世茅茨采掾而萬民以寧今子之君勞民自縱逸遊無忌吾為子羞之又何忍與人觀之乎溫大慚問其姓名不告而去謝沈後漢書曰龍丘萇吳郡人篤志好學王莽篡位隱居太山以耕稼為業公車徵不應更始時任延年十九為郡東部尉折節下士鍾離意為主簿自請萇為門下祭酒延教曰龍丘先生清過夷齊志慕原憲都尉灑掃其門猶懼辱之何召之有又曰鄭敬字次卿汝南人間居不修人倫都尉逼為功曹廳事前樹時有清汁以為甘露敬曰明府政未能致甘露此木汁耳辭病去隱處精學同郡鄧敬公為督郵過存敬敬方釣魚於大澤因折芰為坐以荷薦肉瓠瓢盈酒言談彌日蓬廬蓽門琴書自娛世祖公車徵不行又曰楊后字仲桓廣漢人潛身藪澤耦耕誦經司徒楊震表薦其高操公車特徵不就益州刺史焦參行部致謁后惡其苛暴時耕於大澤即委鉏疾逝參志恚之收其妻子録繫欲以致后遂不知后所在乃出其妻子又曰張奉字公先弟表字公儀河內人兄弟少有高節立精舍教授惡衣粗食太傳袁隗以女妻奉送女奢麗奴婢百人皆被羅縠輜軿光路婦入門數年奉住精舍有如路人其妻待奉入朝乃徑前跪曰家公年老不以妾頑陋使侍君巾櫛自知不副雅操君如欲執梁鴻之高節妾欲懷孟光之徵志奉無以答妻悉徹玩飾被服奴婢著縵帛執紡績具奉然後納之諸公連徵不就謂之張氏兩賢又曰符融字偉明少為都官郎恥之委去私事少府李膺膺常貴融融幅巾褐衣振袖清談膺捧手高聽歎息不暇郭林宗始入京師詣融融一見與定至交海內服融高識公府連徵不就魏志曰張臶在甸切字子明少遊太學後遁常山并州牧高幹辟不至表安樂令不就後遷居任縣廣平太守盧育到官二日綱紀曰承前致版謁臶育教曰張先生所謂上不事天子下不友諸侯豈此版所可光飾哉但遣主簿奉書致羊酒之禮王隱晉書曰魏末有孫登字公和汲郡人無家屬時人於汲郡北山上土窟中得之夏則編草為裳冬則被髮覆面對人無言好讀易鼓琴初宜陽山中作炭者忽見有人不語精神不似常人帝使阮籍往視與語亦不應籍因大嘯野人乃笑曰爾復作向聲籍又為嘯籍將求出野人不聽而去登出並嘯如簫韶笙簧之音聲震山谷而還問炭人曰故是向人耳尋知求不知所止推問久之乃知姓名孫登別傳又載又曰庾袞字叔褒頴川人與弟子治藩必跪而授條夌孰穫者雖畢而多捃者袞退待間乃方自捃不曲行旁掇跪而把之每飢率其邑人入於山林拾橡為郡功曹舉清白異行皆不就值亂攜妻子入林慮民歸之葆於大頭山而田其下有終焉之心咳發柱杖將起杖跌墜岸而死又曰董京字威輦不知何許人太始初值魏禪晉遂被髮佯狂常宿白社中時乞於市得殘碎繒絮結以自覆全帛佳綿則不肯受著作孫楚就社中與語遂載與歸終不肯坐後數年去莫知其所其寢處得一石子及詩曰未世流奔以文代質逝將抱此玄虛歸我寂寞之室又曰夏統字仲御會稽人常學戲船其母疾市藥于洛陽賈充聞而訪之問曰卿居海濱作何戲習仲御曰能戲船耳充因命焉仲御即登舟鼓枻為鯆音孚音甫魚浮之歌學鯆䱐之狀俄然雲霧杳冥白魚跳入其船充甚異之因就與語仲御不對充整服謝之仲御引掉而去弗之見也充乃歎曰可謂木人石心哉初仲御在鄉也人或説之使仕仲御勃然作色謂之曰我安能隨俗低眉下意乎聞君之言不覺寒毛競豎白汗四匝顏如渥丹心如火炙舌不住齒口不能張兩耳閉塞雙眸俱瞑也遂竟不仕又曰董養字仲道惠帝時遷楊后于金墉有侍婢十餘人賈后奪之然後絶膳八日而崩仲道喟然嘆曰天人既滅大亂將至傾危宗廟在其日矣顧謂謝鯤阮千里等曰時既如斯難可保也不如深居岩洞耳乃自荷簷妻子推鹿車入于蜀山莫知所止又曰郭文字文舉河內人隱居不仕常居臨安及吳興餘杭依山結廬臨清澗植穀種麻以供衣食常著葛巾披鹿皮其山多虎豹文獨無藩籬格障然虎豹並不至太興中楊州刺史王導聞其名乃自迎與相見尋而逃去莫知所在又曰郭瑀字元瑜燉煌人也避世不仕涼州牧張天錫遣使者孟公明備禮徵瑀乃指翔鴻以示之曰此鳥也飛青雲之外翔深谷之中自東自西安可籠也遂逃入山公明乃拘其門人瑀嘆曰吾入山逃祿避罪豈謂隱其行義翻乃害平人乎乃出就徵至姑臧值天錫母卒括髮入弔三踊而出還入其山天錫弗能強之後莫知所在又曰霍原字休明燕國廣陽人也少有志力叔父坐法當死原入獄訟之楚毒備加終免叔父年十八觀太學行禮因留貴遊子弟聞而重之元康末原以賢良徵纍下州郡以禮遣皆不到也又曰郭琦音奇字公偉太原晉陽人也少方直有雅重博學武帝欲以琦為著作郎問琦族人尚書郎郭彰彰素疾琦答云不識帝曰若如卿言即堪郎矣遂決意用之及趙王倫篡位又欲用琦琦曰我已為武帝吏不容復為今世吏終身處於家又曰魯褒字元道南陽人也好學多聞以貧素自立元康之後綱紀大壞褒傷時之貪鄙乃隱姓名而著錢神論以剌之褒不仕莫知所終又曰任旭字次龍臨海章安人也幼孤兒童時勤於學及長立操清修不染流俗鄉曲推而愛之永康初惠帝博求清節俊異之士太守仇馥薦旭清貞潔素學識通博詔下以禮發遣旭以朝廷多故志尚隱遁辭疾不行元帝初鎮江東聞其名辭為祭酒並不就咸和二年卒魏氏春秋曰阮籍少時常遊蘇門山山有隱者莫知其姓有竹實數斛臼杵而已籍從之與談太古無為之道五帝三王之義蕭然曾不經聽乃對之長嘯其音響亮蘇門生遒爾而笑籍既降蘇門生亦嘯若鸞鳳之音焉
