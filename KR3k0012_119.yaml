body:
  text: 偏霸部二吳孫堅吳志孫堅字文臺吳郡富春人蓋孫武之後也少為縣吏府召署校尉會稽妖賊許昌起於句章堅以郡司馬募精勇得千餘人與州郡合討破之刺史臧旻列上功狀詔書除堅鹽瀆丞又徙下邳丞漢中平元年黃巾賊張角起於魏郡遣車騎將軍皇甫嵩中郎將朱俊將兵討擊之俊表請堅為佐軍司馬堅又募精兵千許人與俊併力奮擊所向無前拜別部司馬中平三年司空張溫西討邊章韓遂溫表請堅參軍事溫以詔書召董卓卓良久乃詣應對不順堅數卓三罪勸溫斬之溫不忍發舉軍還拜堅議郎時長沙賊區星自稱將軍以堅為長沙太守克破星等漢朝録前後功封堅烏程侯靈帝崩董卓專擅朝政諸州郡舉義兵討卓堅亦舉兵比至南陽衆數萬人南陽太守張咨晏然自若牽咨於軍門斬之郡中震栗無求不獲前到魯陽與袁術相見術表堅行破盧將軍領豫州刺史遂治兵於魯陽城進軍討卓卓憚堅猛壯乃遣將軍李𠐶音覺等求和親堅曰卓逆天無道蕩覆王室今不夷汝三族懸示四海則吾死不瞑目豈與汝和耶復進軍大谷距雒九十里卓尋徙都入關焚雒邑堅至雒修諸陵平塞卓所發掘訖引軍住魯陽初平三年術使堅征荊州擊劉表表遣黃祖逆於樊鄧之間堅破之追渡漢水圍襄陽單馬行峴山為祖軍士所射殺追諡武烈皇帝兄子賁帥將士衆還就術術復表賁為豫州刺史堅四子策權翊匡孫策吳志曰策字伯符堅初興義兵策將母徙居舒與周瑜相友江淮間人成向之堅薨還葬曲阿已乃渡居江都策舅吳景時為丹陽太守策乃載母徙曲阿興平元年從袁術術甚奇之以堅故部曲還策太傅馬日磾音低仗節安集關東辟策表拜懷義校尉術常歎曰使術有子如孫郎死復何恨先是劉繇為楊州刺史楊州舊治壽春壽春術已據之繇乃渡江治曲阿時吳景尚在丹陽策從兄賁又為丹陽都尉繇至皆迫逐之景賁退舍歷陽繇遣樊能等屯江津張英屯當利以距術術以景為督軍中郎將與賁共將兵擊英等連年不克策乃說術乞助景等平定江東術表策為折衝校尉行殄寇將軍兵才千餘騎數十匹賓客願從者數百人比至歷陽衆五千策又徙母阜陵渡江轉鬥所向皆破莫敢當其鋒而軍令整肅百姓懷之策為人美姿顏好笑語性闊達聽受善於用人是以士民樂為致死劉繇棄軍遁逃諸郡守皆捐城奔走吳人嚴白虎等衆各萬餘人處處屯聚策引兵渡浙江據會稽乃攻破虎等更置長吏策自領會稽太守彭城張昭廣陵張紘秦松等為謀主時袁術僣號策以書責而絶之曹公表策為討逆將軍封為吳侯後術死長史楊弘大將張勳等將其衆欲就策廬江太守劉勳要擊悉虜之策輕軍襲拔廬江勳衆盡降勳與數百人自歸曹公是時袁紹方強而策并江東曹公乃以弟女配策小弟匡又為子章取賁女又命楊州刺史嚴象舉權茂才建安五年曹公與袁紹相拒於官渡策陰謀襲許迎漢帝密治兵未發會為故吳郡太守許貢客所刺傷創甚謂張昭等曰中國方亂以吳越之衆三江之固足觀成敗公等善相吾弟呼權佩以印綬至夜卒時年二十六追諡長沙桓王孫權吳志曰孫權字仲謀兄策既定諸郡時權年十五以為陽羡長郡察孝廉舉茂才行奉義校尉漢以策遠修貢職遣使者劉琬加錫命琬語人曰吾觀孫氏兄弟雖各才秀明達然皆祿祚不終唯中弟孝廉形貌奇偉骨體不恆有大貴之表年又最壽策薨以事授權權哭未及息策長史張昭謂權曰孝廉此寧哭時耶扶令上馬使出巡軍曹公表權為討虜將軍領會稽太守屯吳建安八年權西征伐黃祖破其州軍劉備表權行車騎將軍領徐州牧十六年權徙治秣陵明年城石頭改秣陵為建業二十一年冬曹公攻濡須權令都尉徐詳詣曹公報修好誓重結婚二十三年十月權將如吳親乘馬射虎馬為虎所傷權投以雙戟虎卻廢常從張世擊以戈獲之二十四年關羽圍曹仁於襄陽權內憚羽外欲以為己功飛箋于曹公乞討關羽閏月權征羽遂定荊州曹公表權為驃騎將軍持節領荊州牧封南昌侯權自公安都鄂改名武昌魏文帝踐祚加權九錫為吳王初權外託事魏而誠心不款魏欲遣侍中辛毗尚書桓階往與盟誓并徵任子權辭讓不受遂改元為黃武元年臨江拒守權使太中大夫鄭泉聘劉備于白帝始復通好猶與魏文帝相往來至後年乃絶七年二月公卿百司皆勸正尊號夏四月武昌言黃龍鳳皇見丙申祭南郊即皇帝位是日大赦改元黃龍元年追尊父破虜將軍堅為武烈皇帝母吳氏為武烈皇后兄討逆將軍策為長沙桓王六月與蜀為盟九月遷都建業四年魏使以馬求易珠璣翡翠玳瑁權曰此皆孤所不用而以得馬聽與交易赤烏七年步騭朱然等各上疏云自蜀還者咸言蜀欲背盟與魏交通宜為之備權曰吾待蜀不薄無以負之人言若不可信朕為君破券保之蜀竟無謀如權所籌太元元年權祭南郊還寢疾二年四月薨時年七十一諡曰大皇帝葬蔣陵吳志評曰孫權屈身忍辱任才尚計有勾踐之奇英人之傑矣能自擅江表成鼎峙之業然性多嫌忌果於殺戮暨臻末年彌以滋甚至于讒說殄行胤嗣廢斃豈所以貽厥孫謀以宴翼者哉其後遂致覆國未必不由此也吳志曰權自陸口遂征合肥合肥未下徹軍還兵皆就路權與陵統甘寧等在津北為魏將張遼所襲統等以死捍權權乘駿馬越津渠得去獻帝春秋曰張遼問吳降人曰向紫髯將軍長上短下大便馬善射是誰降人答曰是孫會稽耶張遼樂進相謂言早知之急追即獲舉軍嘆恨吳曆曰曹公出濡須權數挑戰公堅守不出權乃自乘船從濡須口入公見舟船器仗法伍整肅喟然嘆曰生子當如孫權劉景升兒若豚犬耳權為箋與曹公說春水方生公宜速去別紙言足下不死孤不得安曹公語諸將曰孫權不欺孤乃徹還江表傳曰堅為下邳丞時權生方頤大口目有精光堅異之以為有貴像及堅亡策起事江東權常隨從性度弘朗仁而多斷好俠養士始知名侔於父兄矣每參問計謀策甚奇之自以為不及也每請會賓客顧權曰此諸君之將軍也孫亮吳志曰孫亮字子明權少子權春秋高而亮最少故尤留意姊全氏公主嘗譖太子和子母心不自安因倚權意欲豫自結數稱述全尚女勸權為亮納焉赤烏十三年和廢權遂立亮為太子以全氏為妃權薨太子即尊號大赦改元建興元年冬十月大傳諸葛恪率軍遏巢湖城東興十二月魏使將軍諸葛誕等出騎七萬圍東興恪以大兵赴敵大破魏軍太平元年以從兄偏將軍綝丑林切為侍中武衛將軍領中外諸軍事二年四月亮臨正殿大赦始親政事又科兵家子弟十八已下十五已上得三千餘人選大將子弟年少有勇力者為之將帥亮曰吾立此軍欲與之俱長日於苑中習焉三年亮以綝專恣與太常全尚將軍劉承謀誅綝九月綝以兵取尚遣弟恩攻殺承於蒼龍門外召大臣會宮門黜亮為會稽王時年十六吳曆曰亮出西苑方食生梅使黃門至中藏取蜜漬梅蜜中有鼠屎召問藏吏吏叩頭亮問吏曰黃門從汝求蜜耶吏曰向求實不敢與黃問不服侍中刁玄張邠啓黃門藏吏辭語不同請付獄推亮曰此易知耳令破鼠屎屎裏燥亮大笑謂玄邠曰若久在蜜中中外當俱濕今裏燥必黃門所為黃門首服左右莫不驚悚孫休吳志曰孫休字子烈權弟六子也年十三從中書郎謝慈郎中盛冲受學太元二年正月封琅耶王居虎林四月權薨休弟亮承統諸葛恪秉政不欲諸王在濱江兵馬之處徙休於丹陽郡太守李衡數以事侵休休上書乞徙他郡詔徙會稽居數歲夢乘龍上天顧不見尾覺而異之孫亮廢孫綝使宗正孫楷與中書郎董朝迎休休初聞問意疑楷朝具述所奉迎本意留一日一夜發行至曲阿有老公于休叩頭曰事久變生天下顒顒願陛下速行休善之是日進及布塞亭武衛將軍孫恩行丞相事率百僚以乘輿法駕迎於永昌亭綝以兵千人迎拜於道側休下車答拜即日御正殿大赦改元永安元年冬綝一門五侯皆典禁兵權傾人主休聞綝逆謀陰與張布圖計十二月戊辰臘辰百僚朝賀公卿升殿詔令武士縛綝即日伏誅五年以衛將軍濮陽興為丞相休以丞相興及左將軍張布有舊恩委之以事布典宮省興關軍國休鋭意於典籍欲畢覽百家之言又好射雉春夏之間常晨出夜還唯此時舍書休欲與博士祭酒韋曜博士盛冲講論藝曜冲素皆切真布恐入侍發其陰失令已不得專因妄飾說以拒遏之休答曰孤之涉學群書略偏所見不少也其明君暗主奸臣賊子古今賢愚成敗之事無不覽也今曜等入但欲與講論書耳不為從曜等始更受學也縱復如此亦何所損君特當以曜等恐道臣下奸變之事以此不欲令入耳如此事孤已自備之不須曜等然後乃解也此都無所損君意特有所忌故耳布得詔陳謝重自序述又言懼妨政事休答曰書藉之事患人不好好之無傷也此無所為非而君以為不宜是以孤有所及聖王務學業其流各異不相妨也不圖君今日在事更行此於孤也良甚不敢布拜表叩頭休答曰聊相開悟耳何至叩頭乎如君之忠誠遠近所知往者所以相感今日之巍巍也詩云靡不有初鮮克有終終之實難君其終之初休為王時布為左右將督素見信愛及至踐祚厚加寵待專擅國勢多行無禮自嫌瑕短懼曜冲言之故尤患忌休雖解此旨心不能悅更恐其疑懼竟如布意廢其講業不復使冲等入七年七月休薨時年三十諡曰景皇帝江表傳曰休寢疾日不能言乃手書呼丞相濮陽興入令子𩅦音灣出拜之休把興手而指𩅦以託之也襄陽記曰李衡為丹陽太守時休在郡衡數以法繩之妻習氏每諫衡衡不從會休立衡懼謂妻曰不用卿言以至於此遂欲奔魏妻曰琅邪王素好善慕名方欲自顯於天下終不以私嫌殺君明矣可自囚詣獄如此乃當逆見優饒非但直活而已衡從之果得無恙又加威遠將軍授以棨戟吳志曰休詔曰丹陽太守李衡以往事之嫌自拘有司夫射鉤斬祛在君為君遣衡還郡勿令自疑孫皓吳志曰孫皓字元宗權孫和之子也一名彭祖字皓宗孫休立封皓為烏程侯遣就國西湖民景養相皓當大貴皓陰喜而不敢泄休薨是時蜀初亡而交址攜叛國內震懼貪得長君左典軍萬彧昔為烏程令與皓相善稱皓才識明斷是長沙桓王之儔又加之好學奉遵法度屢言之於丞相濮陽興左將軍張布布興說休妃太后朱欲以皓為嗣朱曰我寡婦人安和社稷之慮茍吳國無隕宗廟有賴可矣於是遂迎立皓時年二十三改元大赦皓既得志粗暴驕盈多忌諱好酒色大小失望興布竊悔之或以語皓十一月誅與布天紀三年冬晉命鎮東將軍司馬胄音宙安東將軍王渾楊州刺史周浚太尉賈充為大都督量宜處要勢之中初皓每宴會群臣無不咸令沉醉置黃門郎十人特不與酒侍立終日為司過之史宴罷之後各奏其闕失罔有不舉大者即加威刑小者咸以為罪後宮千數而采擇無已激水入宮宮人有不合意者輒殺流之或剝人面或鑿人眼岑昏險諛貴幸致位九列好興功役衆所患苦是以上下離心莫為皓盡力蓋積惡已熟不復堪命故也晉軍所至則土崩瓦解而王濬順流司馬胄王渾皆臨近境皓用光祿勳薛瑩中書令胡冲等計分遣使奉書於濬濬先到於是受皓之降解縛焚襯延請相見胄以皓致印綬於已遣使送皓皓舉家西遷以太康元年三月丁亥就集于京邑四月詔賜號為歸命侯給衣服車乘田三十頃歲給穀五千斛錢五千萬絹五百匹綿五百斤皓太子瑾拜郎中五年皓死于洛陽吳録曰皓以四年十二月死時年四十二葬河南縣也世說曰晉武帝問孫皓聞南吳人好作女歌頗能不時正飲酒因舉觴勸帝而言曰昔與汝國鄰今為汝作臣上汝一柸酒令汝壽萬春帝悔之吳志評曰皓淫刑所濫殞斃流黜者蓋不可勝數是以群下人人惴恐虐用其民窮淫極侈宜其腰首分離以謝百姓既蒙不死之詔復加歸命之寵豈非曠蕩之恩過厚之澤也哉
