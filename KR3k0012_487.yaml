body:
  text: 人事部一百二十七窮說文曰窮極也韓詩外傳曰田子方出見老馬於道曰何馬也御曰公家畜罷而不為用故放之田子方曰少盡其力老棄其身仁者不為也束帛贖之窮士聞之知所歸心矣論語曰君子固窮小人窮斯濫矣家語曰楚昭王聘孔子孔子往拜禮焉路出乎陳蔡大夫相與謀曰孔子賢聖其所剌譏皆中諸侯之病若用於楚則陳蔡危矣遂使徒兵距孔子孔子不得行絶糧七日無所通藜羹不充從者皆病史記曰范睢說秦昭王曰伍子胥橐載而出昭關夜行而晝伏至於陵水無以糊其口膝行匍匐拜稽首肉袒鼓腹吹簫乞於吳市卒舉吳國闔廬為伯使臣得進謀如子胥加之以幽囚終身不復見是臣之說行也又曰管仲曰吾嘗為鮑叔謀事而更窮困鮑叔不以我為愚知時有利不利也漢書蘇武傳曰單于弟於靬王弋射海上武能結網繳檠弓弩於靬王愛之給其衣食三歲餘王病賜武馬畜服匿穹廬窮廬旃廬也王死後人衆徙去其冬丁零盜武牛羊武復大窮漢獻帝春秋曰王朗降孫策策令使者詰朗曰問逆賊王朗朗受國恩當云何報德朗對曰身輕罪重死有餘辜申脰就羈蹴足入絆叱咤聽聲東西唯命魏氏春秋曰初宣王使何晏治曹爽等獄宣王曰凡有八族晏疏丁鄧等七姓宣王曰未也晏窮急乃曰豈謂晏乎宣王曰是也乃收晏魏末傳曰曹爽兄弟歸家勑洛陽縣發民八百人使尉部圍爽第四角作高樓令人在上望視爽兄弟舉動爽計窮愁悶持彈到後園中樓上人便唱故大將軍東行爽還廳事上蜀志曰先主伐吳先主敗引退道隔黃權不得還降魏魏文帝謂權曰君捨逆歸順欲追蹤陳韓耶權對曰臣過受劉氏厚遇降吳不可還蜀無路是以歸命敗軍之將免死為幸何古人之可慕文帝善之蜀志曰許靖為許邵排擯不得齒敘以馬磨自給王隱晉書曰上攻張方決千金堰水碓不作發王公家奴婢手舂給兵男子自十三以上皆從役於是公私窮踧米石萬錢晉中興書曰桓玄聞義軍起斬其二將志慮窘塞日與臧道士推算數厭勝之術皇甫士安高士傳曰陳仲字子終齊人適楚居於陵自謂於陵子仲窮不茍求非義之食不食吳越春秋曰越伐吳吳王率其賢良投於胥山越兵大至圍吳三重大夫文種相拜范蠡左手提鼓右手操桴而鼓之於是吳王書其弓矢而射種蠡之軍其辭曰臣聞狡兔已死良犬烹敵國已滅謀臣亡今吳已病也子大夫何不虞之墨子曰孔子窮陳蔡之間藜羹不糝子路烹豚孔丘不問肉所從來而食之也荀卿子曰鳥窮則啄獸窮則攫人窮則詐又曰孔子適楚遊陳蔡之間七日不食子路曰由聞善者天報之福不善者天報之禍今夫子積德義奚居之隱孔子曰由芳蘭生於深林非以無人而不芳君子之學非為同也居不隱者思不生身不佚者志不廣莊子曰泉涸魚相與處於陸相喣以濕相濡以沫不若相忘乎江湖又曰孔子窮於陳蔡之間七日不火良藜羹不糝顏回擇菜子貢相與言曰夫子載逐於魯削跡於衛伐樹於宋窮於陳蔡君子之無恥也若此乎顏回無以應入告孔子孔子推琴喟然而歎曰由與賜細人也召而語之今丘也抱仁義之道以遭世之暴其何窮之為也尸子曰湯復於湯丘文王幽於姜里武王羈於王門越王棲於會稽秦繆公敗於殽塞齊桓公遇賊晉文公出走故三王資於辱而五伯得於困也韓子曰魯人身善織履妻善織縞而徙於越或謂之曰子必窮矣履為人履之也而越人乘舟縞為人冠之也而越人被髮欲無窮可得乎燕丹子曰樊將軍以窮歸我而丹賣之心不忍也淮南子曰今夫窮鄙之社也叩盆拊缶相和而歌自以為樂矣窮鄙之社窮巷之小社也嘗試為之擊建鼓撞巨鍾乃始知其缶之足羞矣新序曰寧戚欲干齊桓公窮困無以自進於是為商歌宿於郭門之外擊牛角而歌桓公聞之曰異哉之歌非常人也雜道書曰地肺之山其下生草名曰救窮如竹冬夏不枯取而食之可絶穀不食令人長生服之三十日行及走馬趙一窮鳥賦曰有一窮鳥戢翼原野罩網加上機穽在下前見蒼隼後逼驅者繳彈張右羿弓彀左飛丸激矢交集於我思飛不得欲鳴不可舉頭畏觸搖足恐墮內獨怖急乍冰乍火琴操曰孔子使顏淵執轡到匡郭外孔子既似陽虎以為今復來至乃相率圍孔子數日不解弟子皆有飢色於是孔子仰天而嘆曰君子固亦窮乎子路聞孔子之言悲感勃然大怒張目奮劍聲如鍾鼓顧謂二三子曰使吾有此厄也司馬彪與山巨源書曰根拔失據託命此別告求矜愍許見賑恤窮人易感悲喜兼懷承命之後情過挾纊孔舒元在窮記曰遣信與義陽太守孫仲開相聞告其困乏得絹二匹壞車一乘賣得絹三匹以糴得米一石橡三斛食口三十五人百日之中以此自活人皆鶴節無復血色凍左傳襄三年曰楚師伐鄭涉於魚齒之下魚齒山之下有水故言涉也甚雨楚師多凍役徒幾盡漢書曰韓王信降胸奴上自將擊之連戰乘勝比至樓煩會寒大雨士卒飢凍又曰王莽天鳳四年八月莽親之南郊鑄作威斗威斗者以五石銅為之五色石銅合治為威斗也若北斗長二尺五寸欲以厭勝衆兵既成令司命負之莽出則在前入則御旁鑄斗曰大寒百官人馬有凍死者三輔決録曰鮑恢父為縣吏有罪令欲殺之恢年十三常伏門外凍地晝夜號泣令感而赦之晉元嘉起居注曰徐州刺史王仲德上言下坯僮令殷道益十一月冒寒出郡履涉冰雪主簿王黑等三人腳悉凍斷晏子春秋曰景公出遊於寒塗覩死瘠者默然不問晏子曰昔吾先君桓公出遊覩飢者與食病者與財今君遊寒塗飢寒凍餒死瘠相望而君不問失君道矣公於是斂死瘠發粟賑貧三月不出遊呂氏春秋曰戈夷違齊如魯天大寒而後門與弟子宿於郭外寒愈甚謂弟子曰子與我衣我活我與子衣子活我國士也為天下惜死子不肖人不足愛也子與我衣弟子曰夫不肖人惡能與國士衣哉戈夷解衣與弟子夜半而死弟子遂活琴操曰曾子幼少慈仁質孝耕於太山之下遭天霖澤雨雪寒旬月不得歸乃作憂思之歌餓禮記檀弓曰齊大饑黔敖為食於路以待餓者而食之有餓者蒙袂戢屨貿貿然來黔敖左奉食右執飲曰嗟來食揚其目而視之曰豫唯不食嗟來之食以致於斯也嗟來食雖憫而呼之非敬辭也從而謝焉終不食而死左傳宣上曰晉侯飲趙盾酒伏甲將攻之初宣子田於首山舍於翳桑田獵也翳桑桑之多陰翳者也見靈輒餓問其病靈輒晉人曰不食三日矣食之舍其半問之曰官三年矣未知母之存否今近焉請以遺之使盡之而為之簞食與肉置諸橐以與之既而輒為公介靈輒為公甲士倒戟以御公徒而免之問其故曰翳桑之餓人也問其名居不告而退論語季氏曰齊景公有馬千駟死之日民無德而稱焉伯夷叔齊餓于首陽之下民到于今稱之史記曰趙主父遊沙丘公子章作亂李兌起兵敗之章往走主父兌因圍主父宮令宮人後出者夷主父不得出探雀鷇而食之三月遂餓死沙丘營又曰上使善相人相鄧通曰當貧餓死文帝曰能富通者在我何謂貧於是賜鄧通蜀嚴道銅山得自鑄錢景帝立有告鄧通盜出徼外鑄錢下吏驗問頗有遂案盡沒入一簪不得著身遂餓死又曰條侯周亞夫為河內守時許負相之曰後三歲而侯八歲為將相持國柄貴矣於人臣無兩其後九歲而君餓死負指其口有從理入口此餓死法也三崴其兄絳侯有罪文帝擇絳侯子賢者皆推亞夫乃封亞夫為條侯卒餓死又曰趙王友以諸呂女為后弗愛太后怒召趙王置邸弗與食趙王餓遂幽死戰國策曰楚伐中山中山君亡走有二人挈戈隨其後曰臣父嘗餓且死君下壺飧餔臣父臣父曰中山有事女必死之故來死君也漢書曰朱買臣獨行歌道中負薪墓間故妻與夫家俱上冢見買臣飢寒呼飯食之又曰蘇武字子卿杜陵人使胸奴胸奴必欲降之乃出置大窖中絶不與飲食天雨雪武齧雪與氈毛并咽之數日不死胸奴以為神乃徙武北海上無人之處使牧羝羊粟食不至掘野鼠草實而食之又曰元帝即位天下大水關東郡十一尤甚二年齊地飢穀石三十餘萬民多飢死琅琊郡人相食又曰王莽末赤眉遂燒長安宮室市里害更始民飢餓相食死者數十萬長安為虛城中無行人宗廟園林皆發掘唯霸陵完東觀漢記曰王莽末南方枯旱民多飢餓群盜入野澤掘鳧茨食之又曰建武九年正月隗囂餓出城餐糗腹脹死又曰朱勃上書理馬援曰八年車駕討隗囂唯獨狄道為國堅守然民飢饉啖弩煮履寄命漏刻又曰上問第五倫曰聞卿為吏撾妻父不過從兄飯寧有之也倫對曰臣三娶妻皆無父臣生遭饑擾攘米石萬錢不敢妄過人飯又曰王郎起上自薊東南馳晨夜草舍至饒陽無蔞亭時天寒冽衆皆飢疲馮異上豆粥明旦上謂諸將曰昨得公孫豆粥飢寒俱解又曰鄧禹與赤眉戰赤眉佯敗棄輜重走皆載土以豆覆其上兵士飢爭取之赤眉引還擊之軍潰亂時百姓饑人相食黃金一斤易豆五升道路斷隔委輸不至軍士悉以果實為糧又曰耿恭在疏勒城救兵不至數月食盡窮困乃煮鎧弩食其筋革謝承後漢書曰天下亂人相食趙孝弟禮為餓賊所得孝聞之即自縛詣賊曰禮久餓羸瘦不如孝肥飽賊大驚並放之袁山松後漢書曰赤眉入長安掖庭中有數百千人自更始敗閉殿門不出掘庭中蘆蔔根捕池中魚食之死因埋宮中有故祠甘泉樂人尚共擊鼓歌儛衣服鮮明見盆子叩頭言飢盆子使中黃門廩之粟數升後盆子去皆餓死范曄後漢書曰鄧禹威稍損又乏食歸附者離散而赤眉復還入長安禹與戰敗走至高陵軍士飢餓皆食棗菜漢獻帝傳曰車駕至洛陽是時宮室燒盡百官披荊棘依丘牆間州郡各擁強兵而委輸不至群僚飢乏尚書郎以下自出採穭或餓死牆壁間吳志曰袁術在壽春穀石百餘萬載金錢之市求糴市無米而棄錢去百姓飢寒以桑椹蝗蟲為乾飯王隱晉書曰永嘉五年洛中大飢五月摯虞餓死又曰劉琨與王丞相箋曰不得進軍者實困無食殘民鳥散擁髮徒跣木弓一張荊矢十發編草盛糧不盈二日夏即桑椹冬則營豆視此哀歎使人氣索恐吳孫韓白猶或難之況以琨怯弱凡才而當率此以殄強寇晉中興書曰王尼字季孫洛陽覆沒避亂江夏王澄時為荊州刺史見之欣喜厚供給之尼早喪婦止有一息不用居宅唯畜露車牛一乘每行輒使兒御暮則宿車上無有定處澄卒荊州飢荒尼殺牛壞車煮之遂父子餒死晏子春秋曰越石父凍餓為人臣僕三年矣晏子解左驂贖之文子曰神農之法大夫丁壯不耕天下有受其餓者孟子曰陳仲居於陵三日不食耳目無聞見井上有李螬食實者過半矣匍匐往將食之三咽而後耳目有聞見韓子曰秦大餓應侯謂王曰吾苑之草蔬橡果棗栗足以活民請發之王曰今發吾苑以活民是使有功與無功爭取也人生而亂不如死而治賈誼新書曰虢君驕恣晉伐之出走逃於山中遂餓死為禽獸食之風俗通曰俗說大餓不在一車飯謂正得一車飯不復活也符子曰惠子家窮餓數日不舉火乃見梁王王曰夏麥方熟請以割子可乎惠子曰施方來遇群川之水長有一人溺流而下呼施救之施應曰吾不善游方將為子告急於東越之王簡其善游者以救子可乎溺人曰我得一瓢之力則活矣子方告急於東越之王簡其善游者以救我是不如求我於重淵之下魚龍之腹矣世說曰郗公遭永嘉喪亂窮餒鄉人共食之公常攜兄子外甥二小兒往食鄉人曰各自窮餒以君之賢共欲存君耳恐不能兼食公於是獨往食訖輒含飯著頰還吐與二兒後並得存幽明録曰樂安縣故市經荒亂人民餓死枯骸填地每至天陰將雨輒聞吟嘯呻歎聲聒於耳古豔歌曰行不隨道經歷山陂馬啖柏葉人啖柏脂不可當飽聊可過飢傅玄詩曰炎旱歷三時天運失其道河中飛塵盧野田無生草一餐重丘山哀之以終老君無半粒儲形影不相保
