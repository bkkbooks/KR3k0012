body:
  text: 蟲豸部一蟲爾雅曰有足謂之蟲無足謂之豸周禮冬官梓人曰外骨內骨卻行仄行連行紆行以脰鳴者以注鳴者以旁鳴者以翼鳴者以股鳴者以胸鳴者謂之小蟲之屬外骨龜屬內骨鱉屬卻行蟥衍之屬灰行蟹屬連行魚屬紆行蛇屬脰鳴蛙屬注鳴精列屬旁鳴蜩蜆屬翼鳴發皇屬股鳴蚣蝑動股屬胸鳴榮原屬大戴禮曰毛蟲之精者曰麟羽蟲之精者曰鳳介蟲之精者曰龜鱗蟲之精者曰龍倮蟲之精者曰聖人禮記月令曰孟春之月蟄蟲始振仲春之月蟄蟲咸動啓戶始出仲秋之月蟄蟲壞戶壞益也季秋之月蟄蟲咸俯在內皆墐其戶墐謂塗閉之春秋考異郵曰二九十八主風精為蟲八日而化風列波激故其命從蟲蟲之為言屈申也東觀漢記曰永平三年春有司奏立長秋宮以率八妾上未有所言皇太后曰馬貴人德冠後宮遂登至尊先之數日夢有小飛蟲萬數隨著身入皮膚中復飛去魏書華他傳曰廣陵太守陳元龍得疾所苦胸中煩滿面赤不能飯他持其脈曰府君胃蟲有數升欲成內蝕病食腥物所為也今可去也即作湯二升先飲一升須臾復一升食頃吐出數升蟲長一二寸赤頭皆搖半軀皆是生魚膾也趙書曰前石時淳觚白羌婦産卵大如盂剖之有蟲如巨蟻二足立行異苑同蕭子顯齊書曰王敬則少時於草中射獵有蟲如烏豆集其身擲去乃脫脫處皆流血敬則惡之詣道士卜曰不須憂此侯之瑞也敬則聞之喜故出都自效後魏書曰蠕蠕東胡之苗裔也木骨閭死子車庶會自號柔然役屬於魏世祖以其無知狀類於蟲故改其號為蠕蠕隋書曰田式拜襄州總管專以立威為務所愛奴嘗詣式白事有蟲上其衣襟上揮袖拂去之式以為慢己立棒殺之莊子曰井蛙不可以語於海者拘於墟也夏蟲不可以語於冰者篤於時也魯連子曰百足之蟲斷而不蹶持之衆也淮南子曰凡有血氣之蟲含牙戴角前爪後距有角者觸有齒者噬有毒者蠚有蹄者趹喜而相戲怒而相害天之性也又曰故草食之獸不疾易藪疾患水居之蟲不疾易水行小變而不失常小變易水易草食故食草水居故水中故曰不疾失其常也又曰太陰所在蟄蟲首穴處鵲巢以鄉為戶又曰水食者善游能寒魚鱉之屬是也土食者無心不惠蚯蚓之屬是也又曰介蟲之動以固介甲龜鱉之屬動行也貞蟲之動以毒螫貞蟲細腰蜂蟲蜾嬴之屬無牝牡之合曰貞而有毒故能螯又曰山有猛獸林木為之不斬園有螫蟲藜藿為之不採言人畏也抱朴子曰毒粥陳則旁有爛腸之鼠明膏舉則下有藂死之蟲又曰慕惡者猶宵蟲之赴明燭學惡者猶輕埃之應飄風也孫卿子曰肉腐出蟲魚枯生蠹論衡適蟲篇曰變復之家謂蟲食穀者吏貪狼所致也蟲頭赤者武官黑者文吏按蟲頭赤身白頭黑身黃復應何官耶今蟲食五穀則為災桂蠹桑蝎不怪何也桂中藥桑給蠶何可不怪書卷不舒衣襞不懸皆生蟲也此復關何吏耶又曰司南之杓投於地其柄南指魚肉之蟲集地北行自然之性也世本曰廩君乘土船至鹽場鹽水神女子止廩君廩君不聽鹽神為飛蟲諸神從而飛蔽日為之晦廩君不知東西所當七日七夜使人以青縷遺鹽神曰纓此與爾俱生鹽神受縷而纓之廩君應青縷所射鹽神死天則大開崔豹古今注曰光武建武六年山陽有小蟲皆類人形甚衆明日皆懸樹枝而死搜神記曰東陽劉寵北征將炊飯盡變為蟲又家人蒸炒亦化為蟲火愈猛而蟲愈壯寵遂見誅仲興書又載廣五行記曰漢武帝幸甘泉宮馳道中有蟲赤色頭目鼻盡具觀者莫識帝使東方朔視之對曰此秦時拘繫無辜衆庶愁死咸仰首歎曰怪哉故名怪哉此必秦之獄處朔又曰凡憂者得酒而解以酒沃之當消於是取蟲致酒中須臾糜散桓談新論曰睢陵有董仲君好方道嘗坐重罪繫獄佯病死數日毀蟲出而復活蟬易通卦驗曰遘上九候蟬始鳴不鳴國多妖言蟬應期鳴言語之象今失節不鳴鳴則失時故多妖言毛詩蕩之什曰咨汝殷商如蜩如螳注蜩蟬也螳蝘也毛詩疏義曰鳴蜩蟬也宋衛謂之唐蜩陳鄭云蜋海岱之間謂之蟬通語也禮記月令曰仲夏之月蜩始鳴季秋之月寒蟬鳴又檀弓曰范則冠而蟬有緌蟬蜩也緌謂蜩啄長在腹下爾雅曰蜩蜋蜩夏小正曰蜋蜩者五彩具螳蜩夏小正曰螳蜩者蝘俗呼為胡蟬江南謂之螳𧋘音荑蚻蜻蜻如蟬而小方言云有文者謂之螓夏小正曰鳴蚻虎懸蠽茅蜩江東呼為茅截似蟬而小青色蝒馬蜩蜩中最大者為馬蟬霓寒蜩寒螿也似蟬而小青赤月令曰寒蟬鳴孝經援神契曰蟬無力故不食周書曰夏至又五日蜩始鳴不鳴貴臣放逸立秋之日寒蜩鳴不鳴人臣不力爭梁書曰朱異為通事舍人後除中書郎時秋日始拜有飛蟬正集異武冠上時咸謂蟬珥之兆又曰何戢為吳興太守頗好畫扇宋孝武賜戢蟬雀扇善畫者顧景秀所畫時吳郡陸探微顧寶先皆能畫歎其巧絶戢因王晏獻之上令晏厚酬其意後周書曰宣帝汰侈既自比上帝不欲令人同己嘗自帶綬及通天冠加金附蟬顧見侍臣武辨上有金蟬及王公有綬者並令去之莊子曰仲尼適楚出遊林中見痀僂者承蜩猶掇之也仲尼曰巧乎有道耶曰我有道也五六月纍丸二而不墜則失者錙銖纍二九於竿頭是用手足亭審也纍三而不墜則失者十一所失愈少也纍五而不墜猶掇之也吾處身也若厥株拘吾執臂也若槁木之枝雖天地之大萬物之多而唯蜩翼之知吾不反不側不以萬物易蜩之翼何為不得遺彼故得此也又曰鵬之飛其翼若垂天之雲搏扶搖而上者九萬里去以六月一息者也蜩與鷽鳩笑之曰我決處而飛槍榆枋而止時則不至而空於地而已奚以九萬里而圖南為也孫卿子曰曜蟬者務明其火振其樹若火不明雖振樹無益人有明德則天下歸之若蟬歸明火也又見呂氏春秋淮南子曰孟秋涼風至白露降寒蟬鳴寒蟬青蟬也蟲陰類感氣鳴也又曰蛇不足而行魚無耳而聽蟬無口而鳴有然之者也然如是也又曰蠶食而不飲二十二日而化蟬飲而不食三十日而蛻說苑曰吳王欲伐荊告其左右曰敢有諫者死舍人有少孺子者欲諫不敢則懷九操彈於後園露沾其衣如是者三旦吳王曰子來何若沾衣如此對曰園中有樹其上有蟬蟬高居悲鳴飲露不知螳蜋在其後也螳蜋委身曲附欲取蟬而不知黃雀在其旁也黃雀延頸欲啄螳蜋而不知彈丸在其下也此三者皆務欲得其前利而不顧其後之有患也吳王曰善哉乃罷其兵論衡曰王充建武三年生為小兒不妄狎儕倫不掩雀捕蟬鹽鐵論曰以所不覩不信人若蟬之不知雪揚雄方言曰蟬楚謂之蜩宋衛之間謂之螳蜩江南呼為螳蛦也陳鄭之間謂之蜋蜩蜋音良秦晉之間謂之蟬海岱之間謂之𦭶齊人呼為巨𦭶音枝其大者謂之蟧或謂之蝒音綿馬按爾雅蝒者馬蜩非別名蝒馬也此方言誤耳其小者謂之陵蚻如蟬而小青色今關西呼為凌蠽也有文者謂之蜻蜻爾雅云蚻蜻蜻即夌蚻也其雌謂之匹必一切大而黑者謂之踐音棧黑而赤者謂之霓雲霓蜩蟧謂之芽蜩江東呼為茅蠽𧕄謂之寒蜩暗蜩按爾雅以霓為寒蜩月令亦曰寒蟬鳴則寒蟬非瘖者此諸蟬名通出爾雅而多駮錯未可詳據也寒蟬寒螿也似蟬而小𧕄音應崔豹古今注曰牛亨問董仲舒曰蟬為齊女何答曰昔齊王后怨王而死尸變為蟬登庭樹嘒唳而鳴王悔恨之故曰齊女又曰貂蟬胡服也貂者取其有文而不煥外柔而易內剛而徑也蟬者取其清虛而識時變也在位者有文而自耀有武而不示人清虛自牧識時而動也曹大家蟬賦曰吸清露於丹園抗喬枝而理翮崇皇朝之輝光映豹豹而灼灼陸雲寒蟬賦曰昔人稱雞有五德而作賦焉至於寒蟬才齊其美獨未之思而莫斯述夫頭上有幘則其文也含氣飲露則其清也黍稷不享則其廉也處不巢居則其儉也應候守常則其信也加以冠冕則其容也君子則其操可以事君可以立身豈非至德之蟲哉且攀木寒鳴貪士所歎余昔僑處竊有感焉公侯常伯乃身紆紫黻手執龍淵俯鳴佩玉仰撫貂蟬於上盧之多士光帝皇之侍人騰儀像於雲闥望景曜乎通天邁休聲之五德豈烏雞之獨珍傅玄蟬賦曰美茲蟬之純潔稟陰陽之微靈傅咸粘蟬賦曰櫻桃其為樹則多蔭其為果則先熟故種之於廳所之前時以盛暑逍遙其下有蟬鳴仰而見之故命粘取以弄小兒退惟當蟬之得意於富貴而不虞禍之將來也蠅韓詩曰雞鳴讒人也匪雞則鳴蒼蠅之聲薛君曰雞遠鳴蠅聲相似也毛詩甫田曰青蠅大夫剌幽王也營營青蠅止于樊蠅之為蟲汙白使黑汙黑使白喻佞人變亂善惡也豈弟君子無信讒言營營青蠅止于棘讒人罔極交亂四國漢書曰成帝建始元年六月青蠅萬數集未央宮殿中朝者坐服虔曰公卿以下朝會坐也又曰昌邑王賀夢青蠅矢積西階可五六石以屋版瓦覆發視之青蠅矢也以問龔遂遂曰陛下之側讒人衆多願皆放逐之賀不用其言卒至於廢也東觀漢記曰光武與隗囂書曰蒼蠅之飛不過三數步托驥之尾得以絶群後漢書曰楊章為杜喬李固薦為平原令後喬固被刑章行赴洛見喬固暴尸坐其旁驅逐蠅蟲魏略曰王思正始中為大司農性急嘗執筆作書蠅集筆端驅去復來如是再三思怒自趁逐蠅不能得還取筆擲地踏壞之張勃吳録曰曹不興帝使畫屏風筆落素便點為蠅帝疑生乃彈之前秦書曰符堅欲赦與王猛符融議甘露堂悉屏左右堅親為赦文有大蒼蠅集于筆端驅而復來俄而長安街巷人相告曰官今大赦有司以聞堅驚曰禁中無屬耳之垣事何從泄也勑窮之咸言有一小兒衣青衣大呼于市曰官令大赦須臾不見堅歎曰其向蒼蠅乎梁書曰昭明太子食中頻得蠅蟲之類密置拌邊恐廚人獲罪不令人知見北史曰庫狄伏連居室患蠅杖門者曰何故聽入唐書曰武儒衡為中書舍人元稹知制誥儒衡一日因會食公堂有蠅集瓜上忽發怒命繫去之曰適從何所夾而遽集此淮南子曰夫江河之腐胔不可勝數也然祭者汲焉大也一杯酒蠅漬其中匹夫弗嘗小也朝子曰以火去蛾蛾愈多以魚毆蠅蠅愈至呂氏春秋曰以狸致鼠以冰致蠅揚子法言曰或問蒼蠅紅紫蒼蠅間乎白黑紅紫似朱而非朱也論衡曰清受塵白受垢青蠅所污常在練素邑犬群吠吠所怪也虞翻別傳曰翻放棄南方自恨疏節骨體不媚犯上獲罪當長沒海隅生無可與語死以青蠅為弔客天下一人知己者足以不恨崔豹古今注曰蠅虎蠅狐也形似蜘蛛而色灰白善捕蠅一名蠅蝗一名蠅豹揚雄方言曰蠅東齊謂之羊陳楚之間謂之繩自關而西秦晉之間謂之蠅廣五行記曰魏吏部尚書何晏嘗夢青蠅數十頭來自鼻上驅之不肯去以問管輅輅曰鼻者天中今有青蠅臭惡而來集之位峻者顛輕豪者亡不可不思之至明年何晏及鄧揚皆伏誅
