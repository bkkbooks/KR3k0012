body:
  text: 資産部九商賈左傳僖公下曰秦師及滑鄭商人弦高將市於周遇之以乘韋先牛十二犒師商行賈也乘四韋先韋乃入牛古者將獻遣於人必有以先之曰寡君聞吾子將步師出於敝邑敢犒從者不腆敝邑為從者之淹居則具一日之積腆厚也淹久也積芻末菜薪行則備一夕之衛且使遽告于鄭遽博車又宣公下曰荊尸而舉荊楚也尸陳也楚武王始更為北陳法遂以為名也商農工賈不敗其業而卒乘輯睦步曰卒車曰乘事不奸矣奸犯也又成公下曰荀罃之在楚鄭賈人有將置諸禇中以出既謀之未行而楚人歸之賈人如晉荀罃善視之如實出己賈人曰吾無其功敢有其實乎吾小人不可以厚誣君子遂適齊左傳昭元曰魯曾阜曰賈而欲贏而惡囂乎言譬如商賈求贏利者不得惡喧囂之聲又昭公曰子干歸韓宣子問於叔向曰子干其濟乎對曰難宣子曰同惡相求如市賈焉何難宣子謂棄疾親恃子干共同好惡故言如市賈同利以相求對曰無與同好誰與同惡言辨疾本不與子干同好則亦不得同惡又昭公六曰臧會奔郈郈魴假使為賈正焉郈在東平旡鹽縣東南魴假郈邑大夫賈正掌貨物使有常賈若市吏又昭公十六年曰鄭子産對韓宣子曰昔我先君桓公與商人皆出自周鄭本在周畿內恆公東遷并與商人俱庸次比耦庸用也次更相從耦耕以艾殺此地斬之蓬蒿藜藿而共處之世有盟誓以相信也曰爾無我叛我無強賈旡強市其物毋或丐奪爾有利市寶賄我勿與知恃此質誓故能相保以至於今今吾子以好來辱而謂敝邑強奪商人是教敝邑背盟誓也毋乃不可乎又定公下曰衛王孫賈曰茍衛國有難工商未嘗不為患使皆行而後可欲以激怒國人公以告大夫乃皆將行之史記呂不韋傳曰不韋陽翟大賈人也往來販賤賣貴家纍千金又曰白圭周人也與僮僕同苦樂趨時若猛獸摯鳥之發故曰吾治生産猶伊尹呂尚之謀孫吳用兵商鞅行法是也其智不足以權變勇不足以英斷仁不能以取豫強不能有所守雖欲學吾術終不告之矣蓋天下言治生者祖白圭也又曰齊俗賤奴虜而刁間獨愛貴之桀黠奴人之所患也唯刁間收取使之逐漁鹽商賈之利或連騎交守相然愈益任之終得其力起富數千萬故曰寧爵無刁孟康曰刁間能畜豪故致或有連車騎交守相奴自謂寧欲免去作民有爵耶旡將止為刁氏作奴乎旡發聲助也言其能使豪奴自饒而盡其力也漢書曰高祖詔曰賈人無得衣錦繡綺縠絺罽操兵騎馬又曰陳稀反上聞狶將皆故賈人曰吾知與之乃多以金購狶將狶將多降又曰周人之巧失為趨利喜為商賈富人則商賈為利又曰通財鬻貨曰商又諺曰以貧求富農不如工工不如商刺繡文不如倚市門此言末業貧者之資也貪賈三之廉賈五之貪賈未當賣而賣未可買而買故得利少而十得其三廉賈貴乃賣賤乃買故十得五也魏志曰王烈字彥考於時名聞在邴原管寧之右辟公孫度長史以商賈白穢太祖命為丞相掾徵未至卒也齊書曰范雲為始興內史入境撫以恩德罷去亭候商賈露宿梁書曰陸驗少而貧若落拓無行邑人郁吉卿者甚富驗傾身事之吉卿貸以錢米驗借以商販遂致千金因出郡下散資以事權貴北史曰和士開母喪託附者咸往喪哭鄴中富商丁周嚴興等並為義孝有一士人在哭限封孝琰入弔出謂人曰嚴興之南丁周之北有一朝士號叫甚哀聞者傳之士開知而大怒管子曰商人通賈倍道兼行以夜續日千里而不遠者利在前也魯連子連卻秦軍平原君欲封之終不肯受平原君乃置酒酒酣起前以千金為壽先生笑曰所貴天下之士者為人排患釋難解人之締結即有取是商賈之事連不忍為也尸子曰子貢衛之賈人也韓子曰鄙諺曰長袂善舞多資善賈此言多資易為工也又曰秦韓攻魏昭卯西說罷之齊荊攻魏卯東說罷之魏襄王養之以五車將軍養以五乘使為將軍卯曰伯夷以將軍葬於首山之下而天下曰夫以伯夷之賢與其稱仁而以將軍葬是手力不掩也今臣罷四國之兵而王乃與臣五乘此其稱功猶羸勝而履屩羸利也謂賈也羸利倍勝今以薄賞報大功猶羸勝之人履屩也淮南子曰賈多端則貧工多伎則窮心不一也賈多端非一國語曰晉叔向對韓宣子曰夫絳之富商韋藩木楗以過於朝韋藩韋蔽前也木揵木擔唯其功庸少也言旡功庸雖富不得服朝服過於朝而能金玉其車文錯其服文文纖縷也言商之財足以金玉其車文錯其服以旡爵位故不得為其上為藩木楗是能行諸侯賄言其財賄足以交於諸侯而無尋尺之祿無大績於民故也績功也八尺曰尋又曰齊管仲曰昔聖王處商就市井夫商群萃而州處察其四時四時所用者豫資之而監其鄉之資監親資財視其貴賤有無以知其市之賈負任檐何脊曰負肩曰檐任抱何揭服牛軺馬以周四方周偏以其所有易其所無市賤鬻貴市取鬻賣旦暮從事於此以飾其子弟相語以利相示以賴賴羸相陳以知賈少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能夫是故商子恆為商又曰越大夫種曰臣聞之賈人賈人買賤賣貴者夏則資皮冬則資絺絺葛精曰絺粗曰綌旱則資舟水則資車以待乏也白虎通曰商賈何謂也商之為言適其遠近度其有無通四方賈之為言固也固有用物以待民來以求其利者也論衡曰揚子雲作法言蜀富賈人齎錢十萬願載於書子雲不聽夫富無仁義之行猶園中之鹿欄中之牛安得妄載異苑曰晉陵曲阿楊晚資財數千萬三吳人召取直為商估治生輒得倍宜或行長江卒遇暴風及劫盜者若捉晚錢多獲免濟晚死後先所埋金悉移去鄰人陳家嘗晨起見門外忽有百許萬鏹封題是楊晚姓字然後知財物聚散必由天運負販禮記曲禮曰夫禮者自卑而尊人雖負販者必有尊也而況富貴乎負販者尤輕恌志利宜若無禮然尚書大傳曰舜販於須丘漢書曰灌嬰睢陽販繒者說苑曰鮑叔身死管仲舉上袵而哭之泣下如雨從者曰非君臣父子也管仲曰非夫子所知也吾嘗與鮑子貧販於南陽吾三辱於市不以我為怯知我故有所明也魏志曰弘農董遇字季直性質訥而好學興平中關中擾亂與兄季忠依將軍假煨耒耜負販而常挾持經書投間習讀其兄笑之而不改後魏書曰景穆季年頗親近左右營立田園以收其利高允諫曰夫天下者殿下之天下富有四海何求而不獲而乃與販夫販婦競此尺寸傭賃左傳襄公二十七年曰崔氏之亂在二十五年申鮮虞求奔僕賃於野以喪莊公為齊莊公服喪冬楚人召之遂如楚為右尹傳言楚能用賢史記曰倪寬貧無資用常為弟子都養時間行傭賃以給衣食行常帶經止息則誦習之又曰范睢微時弊衣間步見須賈須賈見之驚曰叔今何事范睢曰臣為傭賃賈哀之留與坐飲食乃取一綈袍以賜之漢書曰欒布梁人彭越為家人時常興布遊窮困賣傭於齊為酒家保數歲別去而布為人所略賣為奴又曰匡衡字稚圭東海人父世農夫至行衡好學家貧傭作以供資用後漢書曰鄭均好黃老書兄仲為縣遊徼頗受禮遺均數諫止不聽即脫身為傭歲餘得錢帛歸以與兄曰物盡可復得為吏坐贓終身捐棄兄感其言遂為廉潔謝承後漢書曰施延字君子少為諸生明於五經家貧母老周流傭賃避地於廬江臨湖縣種瓜後復到吳郡海鹽取卒月直賃作半路亭下以養其母是時吳會未分山陰馮敷為督郵到縣延持帚往敷知其賢者下車謝使入亭請與飯食訖脫衣與之餉餞不受華嶠後漢書曰范式為荊州刺史友人南陽孔嵩家貧親老乃變名姓傭為新野阿里街卒式行部到新野而縣選嵩為道騶迎式式見而識之呼嵩把臂謂子曰非孔仲山耶對之歎息語及平生曰昔與子俱曳長裾遊集帝學吾蒙國恩致位牧伯而子懷道隱身處於卒伍不亦惜乎昔侯羸長守於賤業晨門肆志於抱關子居九夷不患其陋貧者士之宜豈為鄙哉勑縣代嵩嵩以為先傭未竟不肯去東觀漢記曰公沙穆來遊大學無資糧乃變服客傭為吳祐賃舂祐與語大驚遂共定交於杵臼曰之間又曰初梁鴻於大家單伯通家傭春為事歸其妻具食不敢於鴻前仰視舉案常齊眉伯通察而異之曰彼傭能使其妻敬之又曰班超字仲升家貧恆為官傭寫書嘗輟書投筆歎曰大丈夫當效傅介子張騫立功異域以取封侯安能久事筆硯乎吳志曰闞澤字德潤會稽山陰人也家世農夫至澤好學家貧無資常與人傭書以供紙筆所寫既畢誦讀亦周齊書曰張敬兒之為襄陽府將也家貧每休假輒傭賃自給嘗為城東吳泰家檐水通泰所愛婢事發將被泰殺逃賣棺材中以蓋加上乃免又曰王僧孺篤愛墳籍家貧常傭書以養每寫畢諷誦亦了又曰馮道根少孤家貧傭賃以養母行得甘肥未嘗先食必遽還以遺母南史曰吳逵經飢荒男女死者三十人唯逵夫妻獲全家徒四壁立冬無被袴晝則傭賃夜則伐木燒磚妻亦同逵此誠無有懈倦漢皇德頌曰侯瑾字子瑜燉煌人少孤貧依宗人居性篤學恆慵作為資暮還輒爇柴讀書檐釋名曰檐任也力所勝任也後漢書曰趙孝字長平父普王莽時為田禾將軍任孝為郎每告歸常白衣步檐從長安還欲止郵亭亭長先時聞孝當過以有長者客掃灑待之孝既至不自名長不肯內問曰聞田禾將軍子當從長安來何時至乎孝曰尋到矣於是遂去東觀漢記曰馬成為郯令上征河北成羸衣步檐渡河詣上魏志曰曹休年十餘歲喪父獨與一客檐喪假葬攜將老母渡江至吳魏略曰吳禧字子牙京兆人也世單家貧少好學初平中三輔亂禧南客荊州不以荒擾擔負經書每以採穭餘日則誦習之晉書曰郭文字文舉少愛山水尚嘉遁洛陽陷乃步檐入吳興餘姚大辟山中獵者時往寄宿文夜為檐水而無倦色又曰譙秀字元彥在蜀遇范賁蕭敬相繼作亂秀乃避難宕渠鄉里宗族旅憑之者以百數秀年出八十衆欲代之負檐秀曰各有老弱當先營護吾氣力猶足自堪豈以垂朽之年纍諸君也又曰王澄字平子兄衍妻郭氏性貪鄙欲令婢路上檐糞澄年十四諫郭以為不可又曰董養字仲道見洛陽東北步廣里地陷有二鵝出焉其蒼者飛去白者不能飛知白者國家之象顧謂謝阮季曰易稱知幾其神君等可深藏矣乃與妻荷檐入蜀莫知所終齊書曰桓康隨武帝在贛縣泰始初武帝起義為郡所縶衆皆散康裝檐一頭貯穆后一頭貯文惠太子竟陵王子良自負置山中與門客蕭欣祗等四十餘人相結破郡獄出武帝梁書曰司馬申太清之難父母俱沒因此自擔土菜食終身後魏書曰高允性好文學擔笈負書千里就業方言曰嬴旅荷騰擔也齊楚陳宋之間曰嬴燕之外郊越之東甌吳之外鄙謂之旅南楚謂之嬴自關而西隴冀以往謂之荷凡以驢馬駝載物者謂之負他音大亦謂之荷郭璞注曰今江東單檐兩頭物為騰莊子嬴糧起之檐者用膂力因以名之先賢行狀曰平原王烈字彥考國中有盜牛者牛主得而放之盜者曰子既放我幸無使王烈聞之間年國中行路老父負檐重有人代檐行數十里至家而去問姓名不語頃之老父失劍於路有人得而守之至暮劍主還見之乃代檐人也老父曰子前代吾檐不得姓名今復守吾劍子誠賢人可語吾姓名以告王烈使人問之乃昔時盜牛人也烈使國人表其廬而異焉舂說文曰舂搗粟也周禮地官下曰舂人掌供禾物禮記檀弓上曰鄰有喪舂不相鄭玄曰相以音聲相助穀梁傳文公曰禮宗廟之事君親割夫人親舂漢書刑法志曰罪人獄已決充為城旦舂滿三歲為鬼薪白粲漢書曰呂后囚戚夫人永巷令舂又曰陳咸為南陽太守所居以殺伐立威豪猾吏乃大姓犯法論輸府為地臼木杵舂不中程輒加罪笞又曰江都王建宮人八子有過者輒令嬴立或繫居樹上或脫鉗以鉛杵舂不中程輒掠之又曰楚王戊與吳通謀申公曰生諫之不聽乃胥靡之使杵臼雅舂于市晉灼曰胥相靡隨右左坐輕刑名也雅正杵舂南史曰梁武丁貴嬪德后醋忌遇貴嬪無道使曰舂每中程若有助者後魏書曰高祐為西兗州刺史鎮滑臺令一家之中自立一碓五家之外共造一井以給行客不聽婦人寄舂取水莊子曰適百里者宿舂糧淮南子曰量粟而舂數米而炊可以治家而不可以治國傳子曰夷吾為政士三妻者逐於境外女三嫁者入於舂隸也國語曰天子禘郊之事必自射其牲牲牛王后必自舂粢諸侯宗廟之事必自射牛刲羊擊豕封刺擊殺夫人必自舂其盛自器曰盛上言粢下言盛牙其文也世本曰雍父作舂宋襄公注曰雍父黃帝臣也呂氏春秋曰赤冀作舂桓子新論曰宓犧之制杵臼曰萬民以濟及後人加巧因延力借身重以踐碓而利十倍杵臼又復設機關用驢嬴牛馬及役水而舂其利乃且百倍崔贛易林蹇之革曰折挺舂稷君不得食頭養病根無益於病嚴欣期交州記曰糠頭山在合浦海口傳云越王舂米於此積穅所成石虎鄴中記曰有舂車作木人反行碓於車上動則木人踏碓舂行十里成米一斛俗記曰王慶孫為襄陽都督後之鎮爾時沔中蠻盛斷道縛得王去將還家語王云汝是貴人試作貴人行看驅逼不得已王便行蠻以其貴人不堪苦使令與婦女共碓下舂王褒僅約曰事訖休息當舂一石嶺表異録曰廣南有舂堂以渾木刳為槽一槽兩邊約十杵男女間立以舂稻糧敲磕槽舷皆有遍拍槽聲若鼓聞于數里雖思婦之巧弄秋砧不能比其流亮也
