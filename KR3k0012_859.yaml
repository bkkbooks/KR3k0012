body:
  text: 飲食部十六酪酷酥附䬫糊通俗文曰熅羊乳曰酪酷酥曰䬫糊釋名曰酪酷澤乳汁所作使人肥澤漢書曰武帝太初元年更名家馬為桐馬應劭曰主乳馬取其汁桐治之味酢可飲因以為官如淳曰桐者簫主乳馬以韋革為夾兜受數斗咸馬乳桐取其上肥因名曰桐馬今梁州亦名馬酪為馬酒晉灼曰桐音捷桐之桐又曰丞相孔光奏省樂官七十二人給太官桐馬酒李奇曰以馬乳為酒也撞桐乃成又曰烏孫公主歌曰以肉為食兮酪為漿又曰王莽時飢教民煮木為酪不可食重為煩擾受日木實為酪也或曰如令餌木屬後魏書曰神瑞二年秋穀不登太史令王亮等言讖書云國家當都鄴大樂五十年勸帝遷都可救今年之飢帝以問崔浩浩曰非長久之策也今留守舊都分家南從不便水土疾疫死傷情見事露則百姓意阻四方聞之有輕侮之意今居北方至春草生乳酪將出兼有菜果足接來秋可不遷都也又曰臨淮王潭孫孚持白武幡勞河那瑰於柔玄懷荒二鎮間河那瑰衆號三十萬陰有異意遂拘留孚載以轀車日給酪一升肉一假唐書曰高宗朝太僕以患疥馬乳造酪供進署承罪當死上特免之晉太康起居注曰尚書令荀勗嬴毀賜乳酪太官隨日給之漢武內傳曰西王母曰次藥有太玄之酪西河舊事曰祁連山宜牧牛羊羊肥乳酪好不用器物刈草著其上不解散一斛酪升餘酥鄴中記曰并州之俗以冬至後百五日介子推斷火冷食作醴酪煮粳米或大麥作之又投大麥於其中搗杏子人煮作之亦投大麥中郭子曰王武子有數斛羊酪指示陸機曰卿東吳何以敵此機曰千里蓴羹未下鹽豉世說曰楊德祖為主簿侍坐人有餉酪者魏武噉少許乃題上作合字致坐中人並不解修即噉之云公教令人一口復何疑又曰陸太尉詣王丞相公食之以酪陸還遂病明日有箋與王曰昨食酪過通夜委頓民雖吳人幾為傖鬼笑林曰吳人至京師為設食者有酪酥未知是何物也強而食之歸吐遂至困顧謂其子曰與傖人同死亦無所恨汝故宜慎之魏文帝集載鍾繇書曰屬賜甘酪及櫻桃孫楚祠介子推祝文曰棗飯一盤醴酪二盂清泉甘水充君之廚傳咸集楊濟與咸書曰酥治瘡上急范汪祠制曰仲夏薦杏酪慕容晃與顧和書曰今致䬫糊十斤唐書曰武德二年涼州刺史安修仁獻百年酥云餌之可延壽
