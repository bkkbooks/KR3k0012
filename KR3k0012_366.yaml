body:
  text: 人事部六面説文曰面顏前也從𦣻音首象人面形𩔃音于願切面不正也𩔃音括短面也頷音胡感切面黃也𩖊音刀丁切面瘦淺𩖊𩖊也赧面慚赤也可圖曰蒼帝方面赤帝圓面白帝廣面黑帝深面周易革卦曰上六君子豹變小人革面禮記內則曰女子出門必擁蔽其面左傳僖三十三年曰晉侯敗狄于箕先軫免胄入狄師死焉狄人歸其元面如生言其有異於人又襄六曰鄭子産曰人心之不同也如其面焉吾豈敢謂子面如吾面乎又襄四曰晉程鄭卒子産始知然明問為政焉對曰視民如子見不仁者誅之如鷹鸇之逐鳥雀也子産喜以語子大叔曰他日吾見蔑之面而已今吾見其心矣又哀下曰楚白公作亂殺子西子期于朝而劫惠王子西以袂掩面而死葉公在蔡方城之外皆曰可以入矣及北門乃胄而進又遇一人曰君胡胄國人望君如望歲焉曰日以幾冀君來若見君面是得艾也艾安也史記曰孟戲中衍鳥身人面趙之先也漢書曰李夫人病篤上自臨候之夫人遂轉面向壁戲欷而不復言又曰哀帝初即位博士申咸毀給事中薛宣不供養行喪服薄於骨肉不宜復列封侯使在朝省宣子沉為右曹侍郎數問其語賕音求客揚明欲令創咸面目使不居位會司隸闕沉恐咸為之遂令明遮斫咸宮門外斷鼻脣身八創事下有司沉減死一等宣坐免為庶人又曰朱博為左馮翊長陵大姓尚方禁少時曾盜人妻見斫創著其頰府功曹曰白除禁調守尉博聞知以他事召見視其面果有瘢博辟左右問禁是何等創也禁乃叩頭服博笑曰大丈夫固時有是因親信以為耳目又曰朱博為人廉儉不好酒色之宴自微賤至富貴食不重味案上不過三杯夜寢早起妻希見其面又曰董仲舒廣川人也景帝時為博士下帷講誦弟子以次相授業或莫見其面三年不窺園圃其精如此又曰孔休守新都相休謁見莽莽緣恩意進其玉貝寶劍欲以為好休不肯受莽因曰誠見君面有瘢美玉可以滅瘢欲獻其玉璏耳音衛劍鼻也又曰張禹為兒數隨家至市喜觀於卜相者久而頗曉其別蓍布卦意卜者愛之又奇其面貌謂禹父曰是兒多知可令學經東觀漢記曰耿秉為征西將軍鎮撫單于以下及薨南單于舉國發哀犂面流血後漢書曰應奉年二十時嘗詣彭城相袁賀賀時出行閉門造車匠於內開扇出半面視奉奉即委去後數十年於路見車匠識而呼之魏略曰徐庶名福本單家子好任俠擊劍中平末嘗為人報讎白堊突面被髮而走蜀志曰張裕曉相術每舉鏡照面自知死刑未嘗不撲之于地又曰劉琰妻胡入賀太后太后令特留胡經月乃出胡有美色琰疑其與後主有私呼卒檛胡至於以履搏面而後棄遣胡具告言琰坐下獄有司議曰卒非檛妻之人面非受杖之地琰竟棄市吳志曰諸葛恪父瑾長面孫權大會群臣使人牽一驢檢其面題曰諸葛子瑜也恪跪曰乞請筆益兩字因聽與筆恪續其下曰之驢舉坐欣笑乃以驢賜恪王隱晉書曰趙孟字長舒入補尚書都令史善於清談有國士之風其面有疵黯諸事不決皆言當問疵面也晉中興書曰王珂為桓溫主簿二軍文武數萬人悉識其面晉書曰初王恭敗梟首於東桁王平之抽槊剌其面又曰桓溫字元子豪爽有風概姿貌甚偉面有七星又曰劉牢之面紫赤色鬢目驚人而沉毅多計又曰劉裕於東府藂樗蒱大擲一判應至數百萬餘人並黑犢唯裕及劉毅在後毅次擲得雉大喜褰衣繞床叫謂同座曰非不能盧不事此耳裕因挼五木久之曰老兄試為卿答即成盧焉毅意殊不快然素黑其面如鐵色焉宋書曰沈慶之謂帝曰耕當問奴織當問婢今論爭伐問白面書生事何由濟又曰明帝大會新亭接勞諸軍主樗蒲賭官李安人五擲皆盧帝大驚目安人曰卿面方如田封侯狀也又曰劉瑀為右衛將軍因求益州甚不得意至江陵與顏竣書曰朱循之三世叛兵一日居荊州青油幕下作謝宣明面齊書曰東昏即位多行殺戮沈昭略與沈文季徐孝嗣同召入省例賜藥酒昭略罵徐孝嗣曰廢昏立明古今令典宰相無才致有今日即擲甌破面曰作破面鬼時年四十後梁書曰宋如周有才學為度支尚書如周面狹長宣帝嘗戲之曰卿何謗法華經如周踧踖自陳不謗帝又言之如周懼而出告蔡大寶寶知其旨笑謂之曰君當不謗餘經止應不信法華法華云開經隨喜面不狹長如周乃悟後魏書曰清河王懌被誣見害朝野貴賤知與不知含悲喪氣遠夷在京師聞懌喪為之以刀劈面者數百人三國典略曰高長恭以淮南之亂恐為將帥歎曰我去年面腄今歲何為不發至是齊主使徐之範飲以毒藥長恭謂妃鄭氏曰我盡忠事上何辜於天而遭賜鴆之禍春秋後語曰秦急攻趙求救於齊齊王曰必以長安君為質兵乃出長安君者太后之小子也太后愛之不肯遣大臣強諫太后怒謂左右曰敢復言長安君為質者老婦必唾其面山海經曰大荒之山日月所入有顓頊之子三面一臂不死郭璞注曰人頭三邊各有面也又曰一目國一目中其面而居尸子曰子貢問孔子曰古者黃帝四面信乎孔子曰黃帝合己者四人使治四方大有成功此之謂四面也又曰禹長頸鳥喙面貌亦惡天下從賢之者學也孫卿子曰衛靈公有臣公孫呂身長七尺面長三尺廣三寸名動天下莊子曰孔子謂盜跖曰今將軍身長九尺二寸面目有光脣如激丹齒如含貝音中鍾聲而名曰盜跖丘竊為將軍恥之韓子曰古人目短於面見故以鏡觀燕丹太子曰田光云脈勇怒而面青骨勇怒而面白荊軻者神勇也怒而不變説苑曰吳王將死曰吾以不用子胥言以至於今死者無知則已死者有知吾何面見子胥也遂蒙絮覆面自刎呂氏春秋同典論曰袁紹妻劉性妒忌紹死其尸未殯殺其妾五人恐死者有知皆髡髮黑面中論曰小人恥其面不如子都君子恥其行不如堯舜譙周法訓曰昔有人使妻為母作粥妻不肯乃以刀擊傷妻面此可為孝乎傅子曰相者三亭九候定於一尺之面語林曰王武子與武帝圍碁孫皓看王曰孫歸命何以好剝人面皮皓曰見無禮於其君者則剝其皮乃舉碁局武子伸腳在局下又曰劉真長病積時公主毀悴將終喚主主既見其如此乃舉手指之云君危篤何以自修飾劉便牽被覆面背之不忍視又曰王右軍見杜弘治歎曰面如凝脂眼如點漆如神仙中人又曰何晏字平叔美姿容帝疑其傅粉賜湯餅令晏食之汗出流面拭之轉白世説同世説曰康僧淵目深而鼻高王丞相每調之僧淵曰鼻者面之山目者面之淵山不高則不靈淵不深則不清又曰鍾會撰四本論始畢甚欲使嵇康一見置懷中不敢出戶外遙擲面便走郭子曰琅邪諸葛志名面病鼠瘻劉真長見歎曰鼠乃復窟穴人面乎異宛曰陳郡謝石字石奴少患面創諸治莫愈乃自幽遠止於巖下中宵有物來舐其創隨舐隨除既不見形竟為是龍而舐處悉白故世呼為謝白面會稽後賢記曰貞女謝仙女者謝承孫也吳歸命侯采仙女充後宮仙女乃炙面服醇醯以取黃瘦竟得免黃帝八十一問曰人面獨能寒何也曰頭者諸陽之脈會也諸陰脈皆至頸項不還上獨諸陽脈上頭故面能寒耳相決曰奇毛生身及面皆豪貴白毫黑毛生共孔帶印綬蔡雍女戒曰夫心猶面首也一旦不修飾則塵垢穢之人心不思善則邪惡入之人盛飾其面而莫修其心惑矣眉説文曰眉目上毛也釋名曰眉媚也有嫵媚也毛詩淇澳碩人曰螓首蛾眉螓首顙廣而方巧笑倩兮美目盼兮尚書大傳曰堯有眉八如八字也淮南子同大戴禮曰曾子曰敢問不勞可以為明乎孔子愀然揚眉曰參汝以明主為勞乎昔者舜左禹而右皋陶不下席而天下治禮説曰君子乘金而玉為人美眉左傳定公八年曰公侵齊門于陽州顏息射人中眉顏息魯人退曰我無勇吾志其目也穀梁傳曰長狄兄弟三人遞為害斷其首而載之眉見於軾戰國策曰豫讓欲報趙襄子滅鬢去眉吞炭漆春秋後語曰呂不韋謂太后曰詐腐刑嫪毒則得給事中乃令人以腐罪告之拔其鬚眉以為宦者漢書曰張敞為婦畫眉長安中傳京兆眉憮應劭曰憮大也孟康曰憮音詡北方人謂好為詡也東觀漢記曰王莽天鳳五年樊崇起兵於莒恐其衆與莽兵亂乃皆朱其眉由是號曰赤眉又曰明德馬后眉不施黛獨左眉角小缺補之以縹又曰馬援自還京數被進見為人鬒髯眉目如畫又曰梁鴻居吳賃舂每歸妻為具食不敢於鴻前仰視舉案齊眉鄧粲晉記曰荊州民宗廞嘗以酒犯王平子怒叱左右捽廞郭舒厲色謂左右曰使君醉汝輩何敢妄動平子大恚曰別駕狂郎枉言我醉因遣灸舒眉頭舒跪受炙平子意釋而廞得免宋書曰王玄謨在雍人言欲反玄謨馳啓自解帝知其虛馳遣主書吳喜公慰撫之曰七十老公反欲何求聊復為笑想足以伸卿眉頭耳玄謨性嚴未曾妄笑時人言玄謨眉頭未曾伸故以此見戲梁書曰武寧王大威字仁容美風儀眉目如畫三國典略曰梁簡文方頰豐下眉目秀發隋書曰元暉字叔平河南洛陽人也父智鬚眉如畫進止可觀少得美名於京師唐書曰毛若虛絳州太平人也眉毛覆於眼性殘忍初為蜀川縣尉天寶末為武功丞年已六十餘矣帝王世紀曰文王虎眉列仙傳曰陽都女生而連眉衆以為異列仙傳曰莫耶子赤鼻眉間一尺列士傳曰千將子赤鼻眉廣三寸荊州先賢傳曰馬良字季常襄陽宜城人兄弟五人皆有令名良眉中有白毛鄉里頌曰馬氏五常白眉最良吳越春秋曰伍子胥眉間廣一尺韓子曰失鏡無以正鬢眉失道無以知迷惑呂氏春秋曰吳闔閭使民習戰劍如眉流血不可止淮南子曰今盆水在庭清之終日未能見眉睫濁之不過一撓而不能察方圓察見也人神易濁而難清猶盆水之類也風俗通曰桓帝元嘉中京師婦人作愁眉愁眉者細而曲折此梁冀家所謂京師皆效之天戒若曰將收捕冀婦女憂愁之眉也抱朴子曰有古強者自云四千歲云見堯舜禹湯説之了了世云堯眉八采不然也直兩眉頭甚豎似八字眉唐子曰人多患遠見百步而不自知眉頰知眉頰者復不能察百步西京雜記曰卓文君妖冶好眉色如望遠山語林曰庾公道王尼子非唯事事勝於人布置鬚眉亦勝人我輩皆出其轅下樊氏相法曰眉中長毫百二十歲
