body:
  text: 兵部四十八攻圍上孫子曰下攻攻城攻城之法為不得已修櫓橨轀具器械三月而後成距闉又三月而後已修治也櫓大楯也橨轀車也轒狀其下四輸從中推之至城器械者機關攻守揔名蜚臨雲梯之屬距闉勇士積而前以附其城也將不勝其忿而蟻附之則殺士三分之一分而城不拔者攻之災也將忿不得攻器而使卒緣城上如蟻緣墻殺士也善用兵者屈人之兵而非戰拔人之城而非攻毀人之國而非久必以全爭於天下故兵不頓而利可全此謀攻之法也不以敵戰而必全得之意勝於天下不頓兵血刃也又曰不可勝則守可勝則攻敵攻己可勝也守則不足攻則有餘吾所守者力不足也所以攻者力有餘也所以善守者藏於九地之下因其山水丘陵之固善攻者動於九天之上因天時力利之變若動於九天之上也故能自保而全勝也又曰攻而必取者攻其所不守也守而必固者守其所必攻也謂敵之惜者也故善攻者敵不知其所守善守者敵不知其所攻清不泄也微乎微乎故能隱於常形神乎神乎故能為敵司命進不可禦者衝其虛也退而不可追也速而不可及也卒往攻其虛解退又疾也故我欲戰雖高壘深溝不得不與我戰者攻其所必救之絶糧道守歸路攻君王也我不欲戰畫地而守之軍不煩也敵不得與我戰者乘其所之乘捩也捩其道示以利害使疑之我末修壘塹敵人不敢敵我者以形勢之長攻就能加之於敵也左傳曰晉荀吳帥師伐鮮虞圍鼓鼓伯狄之別種也巨鹿下曲陽縣有鼓聚鼓人或請以城叛穆子弗許曰或以吾城叛吾所惡也人以城來吾獨何好焉使敵殺叛人而繕守備圍鼓三月鼓人請降使其民見曰猶有食色姑修而城軍吏曰獲城而弗取何以事君穆子曰吾以事君也獲一邑而教民怠將焉用邑人能事其君我亦能事吾君卒義不爽爽差好惡不愆城可獲而民知義所知義所在有死命而無二心不亦可乎鼓人告食竭力盡而取之克鼓不戮一人以鼓子鳶鞮歸鼓君名又曰齊高發帥師伐莒初莒有婦人莒子殺其夫已為釐婦及老託於紀鄣紀彰莒邑紡焉以度而去之因紡纑連所以度城藏欲待外攻以報也及師至則投諸外投繩城外或獻諸子占子占使師夜縋而登緣繩登城登者六十人縋絶師鼓譟城上之人亦譟莒共公懼啓西門而出七月丙子齊師入紀傳言怨不在大又曰晉侯秦伯圍鄭晉軍函陵秦軍泛南佚之孤言於鄭伯曰國危矣若使燭之武見秦師必退伕之孤燭之武皆鄭大夫也公從之辭曰臣之壯也猶不如人今老矣無能為也公曰雖然鄭亡子亦有不利焉許之夜縋而出見秦伯又曰齊侯曰以此衆戰誰能禦之以此攻城何城不克又曰楚子圍鄭旬有七日鄭卜行成不吉卜臨于太宮臨哭也太宮鄭太祖廟且巷出車吉示將見遷國人大臨守陴者皆哭陴者城上辟兒也皆哭者告楚窮也楚子退師鄭人修城進復圍之三月克之哀其窮故為退師尚不服故獲圍之九十日入自皇門至于逵路方九執曰逵鄭伯肉袒牽羊以逆示服為臣僕也曰孤實不天不為天所祐不能事君使君懷怒以及弊邑孤之罪也敢不唯命是聽其俘諸江南以實海濱亦唯命其剪以賜諸侯使臣妾之亦唯命若惠顧前好世有盟誓使改事君夷於九縣楚滅九國以為縣也君之惠也孤之願也非所敢望也敢布腹心君實圖之又曰齊侯伐我北鄙圍龍魯邑頃公之嬖人盧蒲就魁門焉攻龍門也龍人囚之齊人曰弗殺吾與而盟弗聽殺而膊諸城上膊磔也齊侯怒親鼓士陵城三日取龍國語曰晉獻公見翟相之氛歸寢不寐翟相國名也言有亡國之氣也一曰敵國有善祥己國凶惡也郤叔虎朝公語之遂伐翟相叔虎乘城被羽先登剋之羽羽衣登并其城也戰國策曰平原君謂馮忌曰寡人欲出兵攻燕何如對曰不可夫以秦將伐武安君公孫起乘十勝之威與馬服子戰於長平之下大敗趙師自以餘兵圍邯鄲之城趙以十敗之餘收破軍之弊秦罷於邯鄲之下趙守而不可拔者攻難而守易也今非有十克之威而燕非有長平之禍也今一敗之禍未復而欲以罷趙攻強燕強秦以兵承趙之弊此乃強吳所以亡而弱越所以霸也故臣未見燕之可攻也平原曰善又曰樂羊為魏將而攻中山其子在中山中山之君烹其子而遺羹樂羊坐於幕下啜之盡一杯文侯曰樂羊以我故食其子之羹賞其功而疑其心又曰秦攻趙蘇子説秦王曰臣聞王之於民也多聽而時用之是故事無敗也臣聞懷重寶者不夜行任大功者不輕敵是以賢者任重而行恭智者功大而辭順故民不惡其尊世不妬其業秦乃解兵諸侯休天下安不相攻二十九年史記曰秦末沛公破南陽守齮走保城守宛齮魚綺切張良曰沛公雖欲急入關秦兵尚衆距險今不下宛宛從後擊強秦在前此危道也於是沛公乃夜引軍從他道還更張旗幟黎明圍宛城三匝黎未也未明之貌頃已圍之事畢方明又言黎黑色亦未明也南陽守欲自剄其舍人陳恢曰死未晚也乃踰城見沛公曰臣聞足下約先入咸陽者王之今足下留守宛宛大郡之都也連城數十人庶衆積蓄多吏人自以為降必死故皆堅守乘城今足下盡日止攻士死傷者必多引兵去宛宛必隨足下後足下前則失咸陽之約後又有強宛之患為足下計莫若約降封其守因使止守引其甲卒與之西諸城未下者聞聲爭開門而待足下通行無所纍矣沛公曰善乃以宛守為殷侯封陳恢千戶引兵而無有不下者又曰武安君白起攻韓拔九城斬首五萬又周本紀曰古公積德行義國人皆戴之獯育戎狄攻之欲得財物與之已復攻欲得地與民民皆怒欲戰古公曰今戎翟所為攻戰以吾地與民民之在我與其在彼何異民欲以我故戰殺人父子而君之豫不忍為漢書李陵傳曰單于急攻陵陵居谷中虜在山上四面射之矢下如雨又曰李廣利及郡國惡年少數萬人至二師取善馬故號二師將軍當道小國各堅守不肯給食攻郁城殺傷甚衆引而還天子聞之大怒使使遮玉關軍有敢入輒斬之二師恐益發惡少年及邊騎六萬人伐宛宛城外流水於是遣水工徙其城攻之三十餘日宛貴人相與謀遣人到二師軍約漢無攻我我盡出善馬二師許之取善馬中馬以三千匹餘後漢書曰河南賊董憲招誘五校餘賊步騎數千人屯建陽去昌慮三十里光武親征至番音波去憲百餘里諸將請進帝不聽知五校乏食當退勑各各堅壁以待其弊頃之五校糧盡果引去帝乃親臨四面攻憲三日大破之又曰王郎起兵光武自薊至信都使鄧禹發奔命得數千人令自將之別攻拔樂陽又曰龐萌董憲反與蘇茂校音效強合兵三萬急圍桃城光武時在蒙聞之乃留輜重自將輕騎二千步騎數萬晨夜馳赴師次任城去桃城六十里且曰諸將請進賊亦挑戰帝不聽乃休士養鋭以挫其鋒城中聞車駕至衆心固時吳漢等在東都馳使召之萌等乃悉兵攻城二十餘日衆疲困而不能下及吳漢等到乃率衆軍進桃城帝親自搏戰大破之又曰張步據齊地漢將耿弇總兵討之張步使其大將費邑軍歷下又分守祝阿鍾城弇先擊祝阿自晨攻城未日中而拔之故開圍一角令其衆得奔歸鍾城鍾城人聞祝阿已潰大恐懼遂空壁亡去又曰漢將朱俊與荊州刺史徐璆共討黃巾擊賊帥趙弘斬之賊餘帥韓忠復據宛乞降司馬張超請聽之俊曰兵有形同而勢異者昔秦項之際人無定主故賞降附勸以來耳今海內一統唯黃巾造寇納降無以勸善討之足以懲惡今若受之更開逆意賊利則進戰鈍則乞降縱敵長寇非良計也因急攻連戰不剋俊登土山覩之顧謂張超曰吾知之矣賊今外圍周固內營逼急乞降不受欲出不得所以死戰也萬人一心猶不可當況十萬乎其害甚矣不如徹圍并兵入城忠見圍解勢必自出則意散易破之道也既而解圍忠果出戰俊因擊大破之忠等皆降又曰曹公破袁尚拔鄴進圍壺關今日城拔皆坑之連日不能下其將曹仁謂公曰夫圍城必開之所以開其生路也今許之必死將卒自以為守且城固而糧多攻則士卒傷守則曠日持久今頓兵堅城之下攻必死之慮非良計也曹公從之遂降其城東觀漢記曰張步都臨淄使弟玄武將軍藍將兵守西安去臨淄四十里耿弇引軍營臨淄西安之間弇視西安城小而堅藍兵又精未易攻也臨淄諸郡太守相與雜居人不專一其聲雖大而虛易攻弇內欲攻之告令軍中治攻具後五日攻西安復縱生口令歸藍聞之晨夜守城至其日夜半令軍皆食會明求乞攻西安臨淄不能救也弇曰然吾故揚言欲攻西安今方自憂治城具而吾攻臨淄一日必拔何救之有吾得臨淄即西安孤必復亡矣所謂一舉而兩得者也且西安城堅精兵二萬人攻之未可卒下卒必多死傷正使得其城張藍引兵突臨淄更強勒兵憑城觀人虛實吾深入敵城後無轉輸旬月之間不戰而困諸軍不見是爾弇遂擊臨淄至日中破之張藍聞臨淄破果將其衆亡漢表傳曰郭典字君業為巨鹿太守與中郎將董卓攻黃巾賊張寶於下曲陽典作圍塹而卓不肯典曰受詔攻賊有死而已使諸將引兵屯東典獨於西當賊之衝晝夜進攻寶由是城守不敢出時為之語曰郭君圍塹董將不許幾令狐貍化為豺虎賴我郭君不畏強禦轉機之間敵為窮虜猗猗惠君實邈壃土英雄記曰袁尚使審配守鄴曹操進軍攻鄴審配將馮禮為內應開突門內操兵三百餘人配覺之從城上以大石擊門門閉入者皆死操乃鑿塹圍回四十里初令淺示若可越配望見笑而不出操令一夜濬之廣深二丈決漳水灌之自五月至八月城中餓死者過半尚聞鄴急將兵萬餘人還救操逆擊破之尚走依曲漳為營操復圍之尚懼遣陰夔陳球請降不聽尚還走藍田操復進急圍之尚將馬迎等臨陳降衆大潰尚奔中山盡收其輜重得尚印綬節鉞及衣物以示城中城中崩沮配審命士卒曰堅守死戰操軍疲矣幽州方至何憂無主以其兄子榮為東門校尉榮夜開門內操兵配猶拒戰城陷生獲配意活之配意氣壯烈終無撓辭見者莫不歎息遂斬之魏志曰袁紹圍太祖於官渡糧乏問計於賈詡詡曰公明勝紹勇勝紹用人勝紹決機勝紹有此四勝而半年不定者但顧萬全故也必決其機須臾可定太祖曰善乃棄兵出為圍擊紹紹軍大潰河北平
