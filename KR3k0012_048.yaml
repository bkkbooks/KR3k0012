body:
  text: 會稽東越諸山稷山越絶書曰稷山者勾踐齊戒臺也麻山越絶書曰麻山者勾踐欲伐吳種麻以為弓弦雞豕山越絶書曰雞豕山者越將伐吳養雞豕於此山以食死士獨女山吳越春秋曰獨女山者諸寡婦女淫佚犯過皆輸此山上越王將伐吳其士有憂思者令遊山上以喜其意龜山吳越春秋曰怪山者琅邪東武海中山也一夕自來百姓怪之故曰怪山形似龜體故謂龜山孔曄會稽記曰城西門外百餘步有怪山越時起靈臺於山上又作三層樓以望雲會稽志曰龜山之下有東武里即琅邪東武縣山一夕移於此東武人因徙此故里不動秦望山水經注曰會稽秦望山在州城正南為衆峰之傑涉境便見史記云秦始皇登之以望南海自平地取山頂七里懸嶝孤危峭路險絶記云攀蘿捫葛然後能升山上無甚高木當由地逈多風所致山南有嶕峴中有大城越王無餘之舊都也故吳越春秋云勾踐語范蠡曰先君無餘國在南山之陽社稷宗廟在湖之南又有會稽之山古防山也亦謂之茅山也又曰揀山越絶云揀猶鎮也蓋周禮所謂楊州之鎮山矣山形四方多金玉下多玞石山海經曰夕水出焉南流注于湖吳越春秋稱山覆盎釜之中有金簡玉字之書黃帝之遺讖也山下有禹廟廟有聖姑像禮樂緯云禹治水天賜神女聖姑即其像也山上有禹冢昔大禹即位十年東巡狩崩于會稽因而葬之言鳥為之耘春銜拔草根秋啄其穢以縣官禁民不得妄害此鳥犯則刑無赦山東有陘去廟七里深不見底謂之禹井云東游者多探其穴也秦始皇登稽山刻石紀功尚存山側孫暢之述書云承相李斯所篆也又有石山上有金簡玉字之書言夏禹發之得百川之理也又有射的山遠望山的狀若射侯故謂射的射的之西有石室之為射堂年登否常占射的以為貴賤之准的明則米賤的明則米貴故唁云射的白斛米百射的玄斛米千嵊山水經注曰剡縣嵊山山下有亭亭帶山臨江松嶺森蔚沙渚平淨浦陽江之東北經始寧縣嶀山之嶠嶠壁立臨江欹路峻狹不得併行行者牽木稍進不敢俯視嶠西有孤峰特上飛禽罕至嘗有採藥者沿山見涌蹊尋上於山頂樹下有十二方石地甚方潔還復更尋遂迷前路言諸仙之所集宴故以壇宴名山嶠北有嶀浦浦口有廟廟甚靈驗行人及樵伐者皆先敬焉若相盜竊必為蛇虎所傷北則嶀山與嵊山接二山雖曰異縣而峰嶺相連其間傾澗懹煙泉溪引霧吹陸風馨觸岫延賞是以王元琳謂之神明境事備謝康樂山居記宋書曰張稷子嵊字四山稷初為剡令至嵊亭生之因名嵊字四山塗山郡國志曰塗山禹會萬國之所有石船長一丈云禹所乘者宋元嘉中有人於船側掘得鐵履一雙又會稽記云東海聖姑從海中乘舟張石帆至二物見在廟中又有周時樂器名錞于銅為之形似鍾有頸映水用芒莖刜則鳴宋武修廟得古圭梁武初修之又得青玉印重山孔曄會稽記曰重山大夫種墓語訛成重漢江夏太守宋輔於山南立學教授今白樓亭處是也羅山孔曄會稽記曰諸暨縣北界有羅山越時西施鄭旦所居所在有方石是西施曬紗處今名紵羅山王羲之墓在山足有石碑孫興公為文王子敬所書也鶴山孔靈符會稽記曰射的山西南水中有鶴山此鶴常為仙人取箭曾刮壤尋索遂成此山漢太尉鄭弘少貧賤以採薪為業嘗於山中得一遺箭羽鏃異常心甚怪之頃之有一人覓箭弘以還之又曰射的山半嶺有石室仙人射堂東高巖臨潭有石的岫形甚圓明視之如鏡矣陳音山孔曄會稽記曰陳音山昔有善射者陳音越王使簡士習射於郊外死因葬焉冢今開冢壁悉畫作騎射之象因以名山銅牛山孔曄會稽記曰銅牛山舊傳常有一黃牛出山巖食草採伐人始見猶謂是人所養或有共驅蹙之垂及輒失然後知為神異土城山孔曄會稽記曰勾踐索美女以獻吳王得諸暨羅山賣薪女西施鄭旦先教習於土城山山邊有石云是西施浣紗石亭山孔曄稽會記曰晉司空何元忌臨郡起亭山椒極望巖阜基址猶存因號亭山洛思山孔曄會稽記曰永興縣東五十里有洛思山漢太尉朱偉為光祿大夫時遭母哀欲卜墓此山將洛下冢師歸登山相地冢師去鄉既遠歸思常深忽極目千里北望京洛遂縈咽而死葬山頂故以為名烏帶山孔靈符會稽記曰諸暨縣西北有烏帶山其山上多紫石世人莫知之居士謝敷少時經始諸山往往遷易功費千計生業將盡後遊此境夜夢山神語之曰當以五十萬相助覺甚怪之旦見主人床下有異色甚明徹試取瑩拭乃紫石因問所從來云出此山遂往掘果得其利不訾龍頭山孔靈符會稽記曰上虞縣有龍頭山上有蘭峰峰頂盤石廣丈餘葛洪學坐其上壇宴山孔曄會稽記曰始寧縣有壇宴山相傳云仙靈所宴集處山頂有十二方石石悉如坐席許大皆作行列白石山孔曄會稽記曰剡縣西七十里有白石山上有瀑布水懸下三十丈巖際有蜜房採蜜者以葛藤連結然後得至小白山名山略記曰小白山在會稽陽城趙廣信以魏末入小白山受李氏服氣法又師左元放受守中之道後鍊九華丹丹成服之太一遣迎今在東華宮為真人縉雲山郡國志曰括州即處州也括蒼縣縉雲山黃帝遊仙之處有孤石特起高二百丈峰數十或如羊角或似蓮花謂之三天子都有龍鬚草云群臣攀龍髯所墜者桃都山郡國志曰台州桃都山上有大桃樹上有天雞日初出桃樹天雞即鳴雞下聞之而鳴樹下有兩鬼持葦索取不祥之鬼食之椒山郡國志曰越州椒山吳王遣木客入山求大木不得工人憂思作木客吟一旦神木自生合抱長二十丈伐造姑蘇臺覆釜山郡國志曰台州覆釜山云夏帝登此得龍符處有巨跡云是夸父逐日之所踐石簣山賀循記曰石簣山其形似簣在宛委山上吳越春秋云九山東南曰天柱山號宛委承以文玉覆以盤石其書金簡青玉為字編以白銀禹乃東巡登衡山殺四馬以祭之見赤繡文衣男子自稱玄夷倉水使者謂禹曰欲得我簡書知導水之方者齊於黃帝之嶽禹乃齊登石簣山果得其文乃知四瀆之眼百川之理鑿龍門通伊闕遂周行天下使伯益記之名為山海經開山圖曰禹開宛委山得赤圭如日碧圭如月長一尺二寸也括蒼山五嶽圖序曰括蒼山東嶽之佐命登真隱訣注及吳録云括蒼山登之俯視雷雨也天姥山郡國志曰天姥山與括蒼山相連石壁上有刊字科斗形高不可識春月樵者聞簫鼓笳吹之聲聒耳元嘉中遣名畫寫狀於圓扇即此山也消山郡國志曰消山下有夫人祠山北湖陰又有消御史廟孤石聳出似婦人艷粧而坐白鶴山郡國志曰白鶴山者昔有白鶴飛入會稽雷門鼓中擊之聲震洛陽臨海記曰郡西有白鶴山山上有池泉水懸溜遠望如倒掛白鶴因名掛鶴泉又郡國志云漢末有徐公於白鶴山成道控鶴騰虛而去又有鶴掛嶺猶有翱翔之勢仙石山臨海記曰仙石山有館土人謂之黃公客堂兩邊有石步廊觸石雲起崇朝必兩有四竿䈥竹風吹自垂空微拂石皆淨即王方平遊處也石新婦山臨海記曰新婦山亦名似人山土石悉紺色列石參羌似人形遠望如鳥之俯仰宋文帝遣畫工模寫山狀時一國盛圖於白圃扇焉靈石山臨海記曰靈石山者山有寺當孫恩作叛毀材木以為船舸山石即於空中自然而落賊每有所傷故曰靈山石臨海山臨海記曰臨海山山有二水合成溪曰臨海一水是始豐溪一水是東女溪至州北兩溪相合即名臨海溪山因溪名崛門山郡國志曰崛門山在海中腹有孔上達于頂有聲即大風不風即水涌出必見大兵吳將平孔內有聲遠聞千里石公山東陽記曰石公山孤石望如石人坐其傍又有石如人狀似新婦著花履焉或名新婦巖石城山吳録曰永康有石城山海內南經云三天子都在閩西海北郭璞注云在新安歙縣東又引張氏土地記云東陽永康縣南四里有石城山上有小石城云黃帝曾遊此山即三天子都也金勝山郡國志曰金勝山昔有人於此拾得金勝因以名之山有趙炳祠炳善方術廟至今無蚊蟲異苑曰孫權時永康人入山還得大龜烹之不爛即此山也長山郡國志曰長山相連徑三百里一名金華山即皇初平初起遇道士教以仙方處吳録地理志曰常山仙人採藥處謂之長山山南有春草巖折竹巖巖間不生蔓草盡出龍鬚云赤松羽化處又有似龍鬚而粗大者名為虎鬚不中為席但以其蓑為燈炷又抱朴子云左元放言金華山可以合神丹免五兵洪水之患又按輿地志云金華山連亘三百餘里畢嶺輿地志曰東陽畢嶺之下有錢嶺往往人於嶺下獲大錢今俗謂之錢嶺銅山東陽記曰銅山下有泉水色鮮白號為銅泉又按異苑曰吳時有軍士五百人破洞得一銅釜將欲破之水從中暴發遂成湖以溺人皆死於此崑山東陽記曰崑山頂上有一孤石高可三十丈其形如甑人謂之石甑騎石山郡國志曰騎石山如人騎馬而無頭昔有神巫以印指馬馬頭即落則此山也江郎山郡國志曰江郎山有三峰峰上各有一巨石高數十丈歲漸長昔有江家在山下居兄弟三人神化於此故有三石峰在焉又有湛滿者亦居山下其子仕晉遭永嘉之亂不得歸滿乃使祝宗言於三石之靈能致其子靡愛斯牲旬日中湛子出洛水邊見三少年使閉眼入車欄中等間去如疾風俄頃間從空墮恍然不知所以良久乃覺是家園中也石室山郡國志曰石室山一名石橋山一名空石山晉中朝時有王質者嘗入山伐木至石室有童子數四彈琴而歌質因放斧柯而聽之童子以一物與質狀如棗梅含之不復飢遂復小停亦謂俄頃童子語曰汝來已久何不速去質應聲而起柯已爛盡天階山建安記曰天階山在將樂縣南二十里山下有寶華洞即赤松子採藥之所洞中有石燕石蝙蝠石室石柱并石臼石井俗云其井南通沙縣溪復有乳泉自上而滴人以服之登山頂者若升碧霄故有天階之號大湖山建安記曰大湖山在浦城縣西南一百里一名聖湖山湖在山頂昔有採藥者止此湖畔見滿湖芙蓉涉水採之乃石也亦有禽鳥遠望如飛近視則石孤山建安記曰孤山在環璋之間其地坦平悉是溝塍阡陌以以此山挺然孤立因以名之梁江淹為吳興令云此地有碧水丹山珍木靈草昔為淹之勝境泉山泉山記曰山頂有泉分為兩派一入處州一入建溪即漢書朱買臣所謂東越王居保泉山一人守險千人不得上即此山也梨嶺泉山記曰梨嶺因梨以名之記云南嶺下道東有鍾離古亭跡存焉武夷山蕭子開建安記曰武夷山高五百仞巖石悉紅紫二色望之若朝霞有石壁峭拔數百仞於煙嵐之中其石間有木碓礱簸箕籮箸什器等物靡不有之顧野王謂之地仙之宅半巖有懸棺數千傳云昔有神人武夷君居此故因名之又坤元録云建陽縣上百餘里有仙人葬山亦神仙所居之地郡國志云漢武好祀天下嶽瀆此山預祭故曰漢祀山闌干山建安記曰闌干山南與武夷山相對半巖有石室可容六千人巖口有木欄干飛閣棧道遠望石室中隱隱有床帳按几之屬巖石間悉生古柏懸棺仙葬多類武夷雞巖建安記曰雞巖隔澗西與武夷山相對半巖有雞窠四枚石峭上不可登履時有群雞數百飛翔雄者類鷓鴣魏王泰坤元録云武夷山瀾東一巖上有雞栖即此是也烏嶺山烏嶺山記曰烏嶺峻極不通牛馬以其烏居山連接因以為名魏王泰坤元録云邵武北有庸嶺一名烏嶺北隰中有大蛇為將樂令李誕女所殺者金泉山建安記曰金泉山南枕溪有細泉出沙彼人以夏中水小披沙掏之得金山之西有金泉祠演仙山建安記曰演仙山古老相傳云演氏鍊丹於此山竈之餘基近猶存焉此山東面亦略通人徑山中出橘其味甘人有食者即可攜之出山即迷道又有演仙水出此山當郡城北為大河莫知其深淺兼下有暗竇入城流出於劍潭居人資之常流不絶
