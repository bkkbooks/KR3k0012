body:
  text: 鱗介部十二瓊魚漢武內傳曰西王母曰仙人上藥有流淵瓊魚橫公魚神異經日北方荒外有石湖其中有橫公魚長七八尺形狀如鱧而目赤晝則在湖中夜化為人剌之不入煮之不死以烏梅二七煮之乃熟食之可以止邪病玄黃經曰橫公魚不可殺唯加烏梅其氣乃滅髮魚魏武四時食制曰髮魚帶髮如婦人白肥無鱗出滇池蒲魚魏武四時食制曰蒲魚其鱗如粥出郫縣印魚臨海異物志曰印魚無鱗形似䱜形音錯額上四方如印有文章諸大魚應死者印魚先封之郭延之述征記曰城陽縣南六里堯母慶都墓廟前一池魚額間有印文名頰魚非告祠者捕不可得左思吳都賦曰印龜鱕音藩䱜黃魚吳書曰薛綜上疏交州刺史朱符多以鄉人分作長史強賦民黃魚一枚稻一斛劉欣期交州記曰武寧縣秋九月黃魚上化作鶉鳥南方草物狀曰短細黃魚九月中因秋風而變成鶉上團吏捕取炙食滋味肥美南中八郡志曰江出黃魚魚形頗似鱣骨如蔥可食郭義恭廣志曰揵為郡𤏡道縣出臑骨黃魚寄魚沈懷遠南越志曰寄魚長三寸似白魚常附海船以濟洪波一曰寄載魚臨海水土記曰寄度魚長三寸似白魚君魚沈懷遠南越志曰君魚長三寸背上骨如筆管大者似矛逢諸細魚及黿腹皆斷之琵琶魚臨海異物志曰琵琶魚無鱗形如琵琶沈懷遠南越志曰琵琶魚無鱗長二尺形似琵琶故因以為名任昉述異記曰海魚千歲為劍魚樂魚一名琵琶魚形似琵琶而喜鳴因以為名左思吳都賦曰鮫鯔琵琶曹毗楊都賦曰魚則琵琶烏賊疏齒魚魏武四時食制曰疏齒魚味如豬魚出東海潘嶽滄海賦曰比目疏齒班魚魏武四時食制曰班魚頭中有石如珠出北郭義恭廣志曰班魚頭中有玉石如珠璣黃雀魚臨海異物志曰黃雀魚常以八月化為黃雀到十月入海為魚風土記曰六月東南長風俗名黃雀風時海魚化為黃雀因為名也燕魚臨海異物志曰燕魚長五寸陰雨起飛高丈餘鳶魚臨海異物志曰鳶魚狀如鳶唯無尾足陰雨日亦飛高數丈赤魚魚豢魏略曰文帝欲受禪赤魚遊於露鑊玄魚王子年拾遺録曰夏鯀理水無功沉於羽川化為玄魚大千尺後遂死橫於河海之間後世聖人以玄魚為神化之物以玄字合於魚字為鯀字邵魚臨海水土記曰邵魚狀如鳶魚鱬鰗魚臨海水土記曰鱬鰗魚狀如鳶魚形井魚臨海異物志曰井魚頭有兩角鏡魚臨海異物志曰鏡魚如鏡形體薄少肉含光魚臨海異物志曰含光魚一名臘魚黃而美故謂之臘有光照燭沈懷遠南越志曰含光謂臘魚正黃而美故謂為臘魚夜則有光嶺表録異曰黃臘魚即江湖之橫魚頭觜長而鱗背金色南人臠為炙雖美而毒或煎爆或乾夜即有光如燭𩷩魚臨海異物志曰𩷩魚如指長七八寸但有脊骨好作羹大者如竹竿曝作燭極有光明𩸪魚臨海異物志曰𩸪魚三月生溪中裁長一寸至十月中東還死於海香氣聞於水上到時月輒復更生永嘉地記曰石堂水口多𩸪魚吹沙魚臨海異物志曰吹沙長三寸背上有剌犯之螫人伏念魚臨海水土記曰伏念魚似吹沙魚金石魚南越記曰金石魚形員如七寸柈婢屣魚臨海異物志曰婢屣魚口近腹下形似婦人屣奴屩魚臨海水土記曰奴屩魚長一尺如屩形𩷯魚臨海水土記曰𩷯魚似蒲魚長三尺銅吮魚臨海異物志曰銅吮魚長五寸似倏魚陶魚臨海水土記曰陶魚長三尺似鱦音繩魚石班魚臨海水土記曰石班魚媱蟲六蟲為一又曰石班魚媱蟲蝘蝥也魚長尺餘其如虎文俗言鰋蝥於水邊呼之因走上岸台臺牝其子不可食也戴星魚臨海水土記曰戴星魚狀如鳶魚背上有兩白璫如指大因名之云𩽳魚沈懷遠南越志曰𩽳魚似𩵩𩺷音畢尾上有剌如檔樹剌也魿魚臨海水土記曰魿魚似䰸魚異物志曰南方魚多不肥美唯魿魚為上大者長二尺作膾炙尤香而美嶺表録異曰魿魚如白魚而身稍短尾不偃清遠江多此魚蓋不産於海也廣人得之多為膾不腥而美諸魚無以過也織杼魚臨海水土記曰織杼魚狀似𩸪魚味美於諸魚沈懷遠南越志曰織杼魚如真魚背上正青䱦鯺魚臨海水土記曰䱦鯺形似䱦魚戲於重川靡有定所土奴魚臨海水土記曰土奴魚頭如虎有剌螫人新婦魚臨海水土記曰新婦魚似䱦魚長一丈海狶魚臨海水土記曰海狶魚豕頭身長九尺郭璞江賦曰魚則江豚海狶曹毗楊都賦曰海狶鯨鱘鯤鮑魚臨海水土記曰鯤鮑魚似海印魚鉛刀魚臨海水土記曰鉛刀魚似𩷯鉛刀魚名似𩷯魚蝦蟆魚臨海水土記曰蝦蟆魚色如䳒魚頭似蝦蟆尾又似鳶黿魚臨海水土記曰黿魚長五寸鼠魚沈懷遠南越志曰鼠魚頭如鼠臨海異物記曰鼠魚長七寸頭如鼠弓魚臨海水土記曰弓魚長三寸似鯢魚𩽢𩻭魚臨海水土記曰𩽢𩻭魚長一尺黍魚臨海水土記曰黍魚長三尺似𩶯鯧魚臨海水土記曰鯧魚兩肋下有大肉如炙臠大嶺表録異曰鯧魚形似鯿魚而腔上突起連背而圓身肉甚厚肉白如凝脂只有一脊骨治之以薑蔥缹音缶也之粳米其骨亦軟飧者無所棄鄙俚謂之狗磕睡魚以其犬在盤下難伺其骨故云狗磕睡魚也饋尾魚南越記曰饋尾魚有毒一名鱉魚土拌魚臨海水土記曰土拌魚長七寸白黑班文高魚異物志曰高魚與鱒相似與蜥蜴於水上相合常以三二月中有雌而無雄食其胎殺人蘆䱐魚異物志曰蘆䱐似鰌蝥而有細文多膏肥美大如蘆管本出地中隨泉浮出俗名蘆䱐沈懷遠南越志曰蘆䱐魚生山曲之間穴地為窟泉源踴則此魚出今盧陵以南至于南州有焉俗以為醬鼉風魚異物志曰冬天此魚數千萬頭共處大窟中藏上有白氣或在鼉穴中皮黑如漆能潛知數里中空木所在因風而入空木化為蝙蝠其肉甚美鯤魚毛詩雞鳴曰弊笱在梁其魚魴鯤爾雅曰鯤魚子凡魚之子總名鯤又曰鯤小魚音繩又孕今江東呼魚子未成者為繩也海鯤魚王子年拾遺録曰黑河北極也其水濃黑不流上有黑雲生焉有黑鯤千尺狀如鯨常飛遊往於南海莊子曰北溟有魚其名為鯤其大不知幾千里江逌詩曰巨鰲戴蓬萊大鯤運天池倏忽雲雨興俯仰三洲移孫放詠莊子詩曰巨細同一馬物化無常歸修鯤解長鱗鵬起片雲飛撫翼摶積風仰凌垂天翬袁宏北征賦曰魚託水而成鯤木在山而有松鮞魚呂氏春秋曰魚之美者東海之鮞張衡西京賦曰巢鯤鮞鯤魚子也鮞細魚類也細赤魚劉義慶幽冥録曰始興雲水源有湯泉每至霜雪其上蒸氣高數十丈泉中常有細赤魚出遊莫有獲者鰥魚毛詩曰弊笱在梁其魚魴鰥鰥夫魚也孔叢子曰衛人釣於河得鰥其大盈車曰吾下一魴之餌鰥過而不視又以豚之半則吞矣子思曰鰥貪以餌死士貪以祿死真魚沈懷遠南越志曰真魚如織紵魚臨海水土記曰𩺘魚俗謂之猶魚雞子魚嶺表録異曰雞子魚口有觜如鷂肉翅無鱗尾尖而長有風濤即乘風飛於海上船稍類鮐鰑魚竹魚嶺表録異曰竹魚産江溪間形如鱧魚大而少骨青黑色鱗下間以朱點鬣可玩或烹以為美臛肥而美乳穴魚嶺表録異曰全義嶺之西南有盤龍山山有乳洞斜貫一溪號為靈水溪今桂州靈川縣也溪內有魚皆修尾四足丹其腹游泳自若漁人不敢捕之爾雅云鯢似鯛四足聲如小兒今商州山溪內亦有此魚謂之魶魚𩻷魚臨海水土記曰𩻷魚似鱦魚長二尺
