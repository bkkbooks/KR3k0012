body:
  text: 職官部二十七太常少卿六典曰凡有事於宗廟少卿太師祝齋郎入薦香燭整拂神幄出入神主將享則與良醞令實鐏罍後魏書曰太和十五年置少卿官太常少卿一人第三品上至二十二年降為正四品又曰景明初班職令太常少卿第四品上第一清選明禮兼天文陰陽者為之又曰元順為太常少卿以父憂去職哭泣歐血身自負土時年二十五便有白髮免喪抽去不復更生世人以為孝思所致三國典略曰齊太常少卿袁聿修巡省河南諸州兗州刺史刑部與聿修故舊嘗於省中盛呼聿修為清郎至是遣送白紬為信聿修不受與邵書郎曰瓜田李下古人所慎多言可畏譬之防川願表此心不貽厚責邵亦忻然報書曰一日之贈率爾不思老夫忽忽意不及此敬丞來旨吾無間然弟昔為清郎今作清卿矣唐書曰馮定為太常少卿文宗每聽樂鄙鄭衛聲詔奉常習開元中霓裳羽衣舞以雲韶樂和之舞曲成定揔樂工閱於庭定立於其間文宗以其端凝若植問其姓氏翰林學士李玨對曰此馮定也文宗喜問曰豈非能為古章句者耶乃召升階文宗自吟定送客西江詩吟罷益嘉因錫禁中瑞錦仍令大錄所著古體詩以獻太常丞六典曰太常丞二人從五品上秦有奉常丞漢因之比千石魏晉宋皆置一人漢書曰韋弘為太常職掌陵廟煩劇多過父賢勑令自免懷嫌不去官及賢疾篤果坐廟事繫獄宋百官春秋曰太常丞視尚書郎銅印黃綬一梁冠品第七掌舉陵廟非法陶氏家傳曰覆之字孫宗為太常丞凡宗廟疑義多所決定時人為之語曰定禮決疑問陶覆之陶氏職官要錄曰晉宋九卿丞皆進賢一梁冠介幘皂衣銅印黃綬齊梁墨綬太常博士六典曰太常愽士掌辨五禮之儀式本先王之法制適變隨時而損益焉凡大祭祀及有大禮則與卿導贊其儀凡王公巳下擬謚皆跡其功德而為之褒貶通典曰愽士魏宮也魏文帝初置晉因之事掌引道乘輿王公巳下應追謚者則愽士議定之晉中興書曰愽士之職端委佩玉朝之大典必於詢度當以正道克厭人望然後為可唐書曰王彥威太原人世儒家少孤貧苦學尤通三禮無由自達元和中遊京師求為太常散吏部卿知其書生補為檢討官彥威於禮閣掇拾自隋巳來朝廷沿革吉凶五禮以類區分成三十卷獻之號曰元和新禮繇是知名時授太常愽士又曰陸亘為太常愽士寺有禮生孟真久於其事凡吉凶大儀官不能達率訪真真亦賴是須姑息元和七年冊皇太子將撰儀注真亦欲參預亘笞之由是禮儀不專於胥吏郭子曰張憑舉孝廉詣劉真長還舡須臾真長至遣覔張孝廉舡同旅愕然既同載俱詣撫軍劉前進謂撫軍曰今日為公得一士太常博士之選既前撫軍與之言咨嗟嗟稱善乃曰張憑勃倅為理窟即用為太常博士太祝六典曰太祝掌出納神主于太廟之九室而奉享薦禘袷之儀周禮曰太祝掌六祝之辭以事鬼神示祈福祥求永貞一曰順祝二曰年祝三曰吉祝四曰化祝五曰瑞祝六曰筴祝鄭司農曰順祝順農年也年祝求永貞也吉祝祈福祥也化祝弭災兵也瑞祝逆時雨寧風旱也筴祝遠罪疾也漢書百官表曰太常屬官有太祝令丞景帝六年更名為祝祀武帝太初元年更曰廟祝東觀漢記曰陰猛好學溫良稱於儒林以郎遷為太祝令續漢書曰太祝令秩六百石掌祠讚祝近臣神巫主祝小祝恊律郎六典曰恊律郎掌知六律六呂以辨四時之風氣八風五音之節漢書曰武帝時李延年善新聲以為恊律都尉魏志曰武帝平荊州得杜夔知音識舊樂故以為恊律郎太廟令漢書百官表曰太常屬官有諸廟令長丞續漢書曰高廟令一人六百石主守宗廟掌按行掃除無丞丞世祖廟令一人宋書太廟令一人主守宗廟案行洒掃眾事領齊郎二十四人齊職儀曰周有守祧之官掌先王廟令陵令六典曰陵令掌先帝山陵率戶守衛之事丞為之貳凡朔望元正冬至寒食皆修饗於諸陵若橋陵則日獻羞焉凡功臣密戚請陪陵葬者聽之以文武分為左右而列若父祖陵陪子孫從葬者亦如之周禮曰冢人下大夫二人中士四人掌公墓之地辨其兆域先王之葬居中以昭穆為左右漢書曰太常屬官有諸陵令元光元年分諸陵邑屬三輔又曰司馬相如為茂陵令續漢書曰太常職掌先帝陵每園令各一人秩六百石掌守園陵按行掃除丞及校長各一人校長主戒賊盜齊職儀曰周有墓大夫冢人之職掌先王之墓又曰每陵令一人品第七秩四百石銅印墨綬進賢一梁冠絳朝服唐書官品志曰梁天監七年又詔以為陵監之名不出前誥且宗廟憲章既備典禮園寢職司理不容異諸正陵先立監者改為令於是陵置令矣胡廣陵令箴曰昔在黃葉葬野衣薪禮非極哀不樹不封瓦棺塈周聚夏攸謂壤不毀膚賄不害生是謂皇極百王此經故厚不可皇薄不可王乃眷西顧爰矩孝文陵臣司墓敢告守人太樂令六典曰太樂令掌教樂人詞合鍾律以供邦國之祭祀饗讌承為之貳漢書百官表曰太常屬官有太樂令丞續漢書曰明帝永平十三年曹褒奏尚書璇璣鈐曰有帝漢德合作樂名天子下詔改太樂令丞以應圖讖又曰太樂令秩六百石掌伎樂人凡國祭祀掌奏樂及大司樂掌其陳序晉起居注曰成帝咸和中詔太樂令載綏教官伎樂勤勞賜米百石布二十疋太醫令六典曰太醫令掌諸醫療之法丞為之貳其屬有四曰醫師針師按摩師呪禁師皆有愽士以教之考試登用如國子監之法漢書曰百官表曰少府屬官有太醫令丞無員多至數十人續漢書曰太醫一人秩六百石有藥丞主藥方丞魏略曰脂習字元升除太醫令與孔融親善融被誅習獨往哭之黃初中以習有欒布之節賜拜中散大夫應劭漢官注曰太醫周官也兩梁冠秩千石典論曰中常侍張讓子奉為太醫令與人飲酒輒掣引衣裳發露形體亂其舄履使小大無不傾倒崔寔太醫令箴曰動不肆勤靜不宴逸有疾歸天醫無能恤晉平好內四時是一非鬼非食惑以自失雖有秦和焉所施術太上防疾其次萌牙腠理不蠲骨髓奈何廩犧令六典曰廩犧令掌薦犧牲及粢盛之事丞為之貳凡三祀之牲牢各有名數昊天上帝以蒼地皇袛以黃神州以黝五帝之牲各以方色韋昭辨釋名曰釋云廩犧犧戲也廩養之也辨云六牲取其純毛者別養之以奉祭祀純色者少故名犧犧希也周禮曰牧人下士掌牧六牲以供祭祀漢書百官表曰內史屬官有廩犧令丞尉後屬司農齊職儀曰周牧人之職也掌六牲陽祀用騂陰祀用黝取純毛者光武中興屬河南秩六百石光祿卿六典曰光祿卿之職掌邦國醪醴膳羞之事揔太官珍羞良醞掌醢四署之官屬修其儲備謹其出納少卿為之貳有大祭祀則省牲鑊視濯溉漢官解詁曰士之權貴不過尚書其次諸吏諸吏光祿勳是也應劭漢官儀曰光明也祿爵也勳功也言光祿典郎謁諸虎賁羽林學不安得賞不失勞故曰光祿勳唐書官品志曰光祿卿位視太子中庶子掌宮尉門戶統守黃門華林園暴室等令漢書曰郎中令秦官武帝太初元年更名光祿勳掌中殿門戶秩中二千石又曰石建為郎中令奏事下建省讀驚曰書馬者與尾而五今乃不足一獲譴死矣其謹慎如此又曰周仁景帝時為郎中令為人陰重不洩服虔曰質重不泄人之陰謀也師古曰陰密也言為性密重不泄人言也以是得幸出入臥內於宮祕戲仁常在傍終無所言又曰張安世字孺子為光祿勳郎有醉小便殿上主事白行法安世曰何以知其不覆水耶郎有淫官婢婢兄自言安世怒以奴淫污衣冠告署撻奴其隱人過皆此類也東觀漢記曰孫堪字子雅為光祿勳以清廉稱與周澤相類澤字雅都京師號之為二雅又曰劉昆字桓公為光祿勳授皇太子及諸王小侯五十人經昆老退位以二千石祿終其身又曰邵訓字伯春鄉里號之曰德行恂恂邵伯春章和中為光祿勳後漢書曰杜林字伯山扶風人也林少沉審愽學多聞世稱通儒為光祿勳內奉宿衛外惣三署郎有好學者輒見引進朝夕滿堂又曰馬防字公平林風人也防貴寵最盛與九卿絕席拜光祿卿又曰張湛字子孝拜光祿勳光武臨朝或有惰容輒陳諫常乘白馬上後見湛輒曰白馬生且復諫矣又曰袁彭順帝初為光祿勳行至清為吏麤袍糲食續漢書曰荀爽字慈明為光祿勳視事三月策拜司空謝承後漢書曰楊賜字伯欽拜為光祿勳嘉德殿前有青赤氣詔特進遣中使問賜祥異禍福吉凶所在以賜愽學頭儒故密諮問其極陳其意嘗上䟽陳請案春秋讖天投蜺海內亂今妄嬖閹尹共專國朝之所致也魏志曰鄭袤為光祿勳母丘儉作亂帝自征之百官祖送時袤疾不任會上謂王肅唯不見鄭光祿為恨袤聞白輿追上上笑曰知生必來遂與同載問以計謀帝甚重之又曰王肅字子雍為光祿勳時有二魚長尺集武庫之屋有司以為吉祥肅辨之曰魚生於泉而見於屋鱗介之物失其所也邊將其殆有棄甲之變乎其後果有東關之敗又曰袁渙字曜卿為中郎令時言劉備死群臣皆賀渙以嘗為備吏獨不賀卒官太祖為之流涕吳志曰石偉字公操南郡人少好學修節不殆為獨六有不可奪之志舉茂才賢良方正皆不就孫休即位將徵偉累遷至光祿勳及皓即位朝政昏亂為乃辭老耄固疾乞身又曰薛瑩字道言以時法政多謬舉措煩苛瑩每上便宜陳緩刑簡役以濟育百姓頗或施行遷光祿勳晉中興書曰鄭默字思元轉光祿勳寬冲愽受不以聲色矜人雖卒徒厮養皆遇之以恩宋書曰王惠宋國初建當置郎中令高祖難其人謂傅亮曰今用郎中令不可令減袁曜卿也既而曰吾得其人矣乃以惠居之孟宗別傳曰宗為光祿勳大會宗先少酒偶有強者飲一杯便吐傳詔司察宗吐麥飯察者以聞上乃歎息曰至德清純如此光祿少卿後魏職令曰光祿少卿第四品上第二清用肅勤明敏兼職古典者唐書曰柳享拜光祿少卿太宗每誡之曰與卿舊親情素兼宿卿為人交遊過多今授此職宜存簡靜亨性好射獵有饕湎之名此後頗自勗勵杜絕賓客約身節儉勤於職事太宗亦以此稱之也太官令六典曰太官令供膳食之事丞為之貳凡祭之日則白卿諸廚省牲鑊取明水於陰鑑取明火於陽燧帥宰人以鑾刀割牲取其毛血實之於豆遂烹牲焉又帥進饌者實簠簋設於饌幕之內漢書百官表曰少府屬官有士官令一人丞一人應劭漢官儀曰太官令兩梁官冠秩千石丞四人郡孝廉年五十清修聰明者光祿上名迺召拜皆秩四百石三歲為令以供養勞苦遷左丞有湯官丞掌諸甘肥有菓丞掌菓瓜菜茹薪炭漢舊儀曰太宮主飯肉湯官酒皆令丞治太官湯官奴婢各三千大置酒皆緹構音溝蔽膝緣幘又曰太官上食黃釦音口金飾器器中官私官上食用白銀釦器如祠廟器云謝承後漢書曰魯國陳政字叔方為太官令黃門郎與政有隙因進御食以髮貫炙光武見髮勑斬政政曰臣有當死者三黑山出炭增治吐炎燋膚爛肉而髮不消臣罪一也陜出佩刀砥礪五石虧肌截骨曾不能斷髮臣罪二也臣朗月書章奏側光讀經書旦臨食與丞及庖人六目齊視黃門一人臣罪三也詔赦之魏略曰時苗為壽春令遷為太官令後魏書曰毛循之能為南人飲食手自煎調多所適意世祖親侍之進太官尚書賜爵南郡公加冠軍將軍常在太官主進御膳揚雄太官令箴曰時惟膳夫實司王饔祁祁庶羞口實是供群物百品八珍清觴以御賓客以膳于王王郎集曰朗為大理時上主簿趙郡張登昔為本縣主簿值黑山賊圍郡登與縣長王攜帥吏兵七十二人俱往赴救與賊交戰吏兵散走攜殆見害登手格二賊以全攜命又守長夏逸為督郵所枉登身授拷掠理逸之罪義濟二君宜加顯異黃初詔曰登忠義彰著在職功勤名位雖卑直亮宜顯饔膳近任當得此吏今以登為太官令
