body:
  text: 人事部九十二諫諍一尚書云木從繩則正后從諫則聖毛詩序曰上以風化下下以風剌上主文而譎諫言之者無罪聞之者足以戒故曰風禮記曰為人臣之禮不顯諫顯明也謂明言其君惡不幾微三諫而不聽則逃之逃去也君臣有義則合不義則離子之事親也三諫而不聽則號泣而隨之至親無去至在感動之心又曰父母有過下氣怡色柔聲以諫又曰子曰事君遠而諫則諂也近而不諫則尸利也尸謂不知人事無辭讓者子曰邇臣守和宰正百官大臣慮四方邇近也和謂調和君事也宰主治百官也子曰事君欲諫不欲陳諫謂言其過於外左傳曰衛公子州吁嬖人之子也有寵而好兵公弗禁石碏諫曰臣聞賤妨貴少陵長遠間親新間舊小加大淫破義所謂六逆也君義臣行父慈子孝兄愛弟敬所謂六順也去順效逆所以速禍也又曰魏獻子為政以魏戊為梗陽大夫梗陽人有獄魏戊不能斷以其獄上大宗賂以女樂訟者之大宗也魏子將受之魏戊謂閻沒汝寬曰二子晉大夫魏子之屬主以不賄聞於諸侯若受梗陽人賂賄莫甚焉吾子必諫皆許諾退朝待於庭饋入召之召二大夫食此置三歎既食使坐魏子曰吾聞諸伯叔諺曰唯食忘憂吾子置食之間三歎何也同辭對曰昨或賜二小人酒不夕食昨飲酒醉故不夕食饋之始至恐其不足是以歎中置自咎曰豈將軍食之而有不足是以再歎及饋之畢願以小人之腹為君子之心屬厭而已獻子辭梗陽人屬足也小人二子自謂小人腹飢則恐食之不足厭飽則恐君亡君子居尊官食重祿而知不足故顯以其腹為君子之心又曰公將如棠觀漁臧僖伯諫曰凡物不足以講大事其材不足以備器用君不舉焉材謂皮革齒牙骨角君將納民於軌物者也故講事以度軌量謂之軌取材以章物采謂之物不軌不物謂之亂政亂政亟行所以敗也又曰宋華督已殺孔父而弒殤公召莊公于鄭而立之以親鄭以郜大鼎賂公納于太廟非禮也臧哀伯諫曰君人者將昭德塞違以臨照百官猶懼或失之故昭令德以示子孫夫德儉而有度升降而有數文物以紀之聲明以發之百官於是乎戒懼而不敢易紀律今滅德立違而置其賂器於太廟以明示百官百官象之又何誅焉國家之敗由官邪也官之失德寵賂章也郜鼎在廟章甚孰焉周內史聞之曰臧孫達其有後於魯乎君違不忘諫之以德又曰初鬻拳強諫楚子楚子弗從臨之以兵懼而從之鬻拳曰吾懼君以兵罪莫大焉遂自刖也楚人以為大閽謂之太伯使其後掌之其後鬻拳之孫又曰莊公如齊觀社非禮也曹劌諫曰不可夫禮所以整民也故會以正班爵之義師長幼之序征伐以討其不然諸侯有王王有巡狩有四方也以大習之大習會朝之禮君舉必書書而不法後嗣何觀公不聽又曰丹桓宮之楹丹雕桓宮桓公廟楹謂之柱刻其桷經書刻桓宮桷桷謂之榱榱掾也皆非禮也御孫諫曰臣聞之儉德之恭也侈惡之大也先君有恭德而君納諸大惡無乃不可乎秋哀姜至公使宗婦覿用幣御孫諫曰男贄大者玉帛公侯伯子男執玉至諸侯世子附庸孫孤執帛也小者禽鳥卿執羔大夫執鴈士執雉以章物也女贄不過榛栗棗修以告虔也榛小栗也修脯也虔敬也皆取名以示敬也今男女同贄是無別也男女之別國之大節也由夫人亂之無乃不可乎又曰晉侯假道於虞以伐虢宮之奇諫曰虢虞之表也虢亡虞必從之晉不可啓寇不可玩一之謂甚其可再乎諺所謂輔車相依脣亡齒寒者其虞虢之謂也輔頰輔也車牙車也又曰晉靈公不君厚斂以雕牆從臺上彈人而觀其避丸宰夫胹熊蹯不熟殺之置諸畚使婦人載之以過朝趙盾士季見其手問其故而患之將諫士季曰諫而不入則莫之繼也會請先入則子繼之三進及溜而後視之曰吾知所過矣將改之猶不改宣子驟諫公患之又曰晉師為楚所敗師歸桓子請死晉侯欲許之士貞子諫曰不可城濮之役師三日穀文公猶有憂色左右曰有喜而憂如有憂而喜乎公曰得臣猶在憂未歇也困獸猶鬭況國相乎及楚殺子玉子玉得臣公喜而後可知也曰莫余毒也是晉再勝而楚再敗也楚以是再世不競今天或者大警晉也而又殺林父重楚勝其無乃久不競乎穀梁曰陳靈公通於夏徵舒之家公孫寧儀行父亦通於其家或襦以相戲於朝泄冶聞之入諫曰使國人聞之則猶可使仁人聞之則不可君愧於泄冶不能用其言而殺之周禮地官保氏掌諫王惡諫者以禮義正之論語曰事父母幾諫孝經曰曾子曰敢問子從父之令可謂孝乎子曰是何言歟是何言歟昔者天子有爭臣七人雖無道不失其天下諸侯有爭臣五人雖無道不失其國大夫有爭臣三人雖無道不失其家士有爭友則身不離於令名父有爭子則身不陷於不義史記曰主父偃上書闕下朝奏暮召入見所言九事其八事為律令一事諫伐胸奴其辭曰臣聞明主不惡切諫以博觀忠臣不敢避重誅以直言是故事無遺策而功流萬代又曰趙高親近胡亥曰毀惡蒙氏求其罪過舉殺之子嬰諫曰君誅殺忠臣而立無節行之人是內使群臣不相信而外令鬭士之意離也臣竊以為不可胡亥弗聽又曰趙肅侯遊大陵出於鹿門大夫戊午扣馬諫曰耕事方急一日不作百日不食肅侯下車而謝之又曰秦夷郡縣城銷兵刃不復用不立子弟為王功臣為諸侯者使後無攻戰之患始皇三十四年置酒咸陽宮博士僕射周青臣等頌稱始皇威德齊人淳于越進諫曰臣聞之殷周千餘歲封子弟功臣自為枝輔今陛下有海內而子弟為匹夫卒有田常六卿之臣無輔弼何以相救哉事不師古而能長久者非所聞也又曰沛公入秦宮室帷帳狗馬重寶婦女以千數意欲留居之樊噲諫沛公出舍沛公不聽張良曰夫秦無道故沛公得至此矣為天下除殘賊宜縞素為資今始入秦即安其樂此所謂助桀為虐且忠言逆耳利於行良藥苦口利於病願聽樊噲言沛公乃還軍灞上又曰高帝欲以趙王如意易太子叔孫通諫上曰太子仁孝天下皆聞之呂后與陛下攻苦食淡其可背哉必廢嫡立少臣願先伏誅以頸血汙地高帝曰公罷矣吾直戲耳叔孫通曰太子天下本一搖天下振動奈何以天下戲又曰司馬相如嘗從上至長楊獵是時天子方好自擊熊彘馳獸相如上疏諫曰臣聞物有同類而殊能者故力稱烏獲捷言慶忌勇期賁育臣之愚以為人誠有之獸亦宜然今陛下好陵阻險射猛獸卒然遇軼材之獸駭不存之地犯屬車之清塵是胡越起於轂下而羌夷接軫也又曰楚莊王即位三年不出號令日夜為樂令國中曰有敢諫者死無赦伍舉入諫莊王左抱鄭姬右抱越女坐鐘鼓之間伍舉曰願有進隱曰有鳥在於阜三年不飛不鳴是何鳥也莊子曰三年不飛飛將冲天三年不鳴鳴將驚人舉退矣吾知之矣居數月淫益大甚蘇從乃入諫王曰若聞令乎對曰煞身以明君臣之願也於是乃罷淫樂聽政所誅者數百人所進者數百人任伍舉蘇從以政國人大悅又曰孫叔敖病且死屬其子曰我死必貧困往見優孟言我孫叔敖子也居數年其子窮困負薪逢優孟與言曰我孫叔敖子也父且死時屬我貧困往見優孟孟曰若無遠有所之即為叔敖衣冠抵掌談語歲餘像孫叔敖楚王及左右不能別也莊王置酒優孟前為壽莊王大驚以為孫叔敖復生也欲以為相優孟曰請歸與婦計之三日而為相莊王許之三日優孟復來王曰婦言何對曰婦言慎無為楚相孫叔敖盡忠為廉以治楚楚王以得霸今死其子無立錐之地貧困負薪以自飲食必如孫叔敖不如自殺於是莊王謝優孟乃召孫叔敖子封寢丘侯四百戶以奉其祀又曰優旃者秦倡侏儒也二世立欲漆其城優旃曰善主上雖無言臣固將請之漆城雖於百姓愁費然佳哉漆城光蕩蕩寇來不得上即欲就之易為漆耳固難為蔭室於是二世以其故止又曰武帝少時東武侯母嘗養帝帝壯時號之曰大乳母所言未嘗不聽公卿大臣皆敬重乳母家子孫奴從者橫暴長安中當道掣頓人車馬奪人衣服聞於中上不忍致之法有司徙乳母於邊奏可乳母當入至前面見辭乳母先見郭舍人為下泣舍人曰即入見辭去疾步數還顧乳母如其言謝去步疾數顧郭舍人疾言罵之曰咄老女子何不疾行陛下已壯矣寧尚須乳母而活耶尚何還顧於是人主憐悲之乃下詔止無徙乳母又曰始皇長子扶蘇諫曰天下初定遠方黔首未集今皆重法繩之臣恐天下不安唯上察之始皇怒使扶蘇北監蒙恬於上郡漢書曰上朝東宮趙談參乘袁盎伏車前曰臣聞天子所與共六尺輿皆天下豪英今漢雖乏人陛下獨奈何與刀鋸之餘同載於是上笑下趙談談泣下車又曰吳王謀反枚乘諫曰夫舉吳以訾於漢譬由虻蚋之脯群牛腐肉之齒利劍也又曰南越自相攻上欲救之淮南王上書曰臣聞越非有城郭邑里也處溪谷之間篁竹之中習於水鬭便於用舟地深昧而水險中國之不知其勢阻而入其地雖百不當其一夫賴宗廟之靈方內大寧戴白之老不見兵革民得夫婦相守子孫相保陛下之德也陛下方寸之印丈二之組鎮撫方外不勞一卒不煩一戰而威德並行又曰王吉字子陽為昌邑中尉上疏諫曰大王不好書術而樂逸遊口倦乎叱咤手苦於轡捶身勞乎車輿朝則冒霜露晝則被塵埃夏則為大暑之所暴炙冬則為風寒之所侵薄以耎脆之玉體犯勤勞之煩毒夫廣廈之下細氈之上明師居前勸誦在後上論唐虞之際下及殷周之盛考仁聖之風習治國之道欣欣焉發憤忘食日新厥德其樂豈徒銜撅之間哉又曰鮑宣每居位嘗上書諫民有七亡而無一得欲望國安誠難也民有七死而無一生欲望刑厝誠難也陛下擢臣巖穴誠冀有益毫毛豈徒欲臣美食太官重高門之地哉又曰龔遂字少卿山陽人以明經為昌邑郎中令王動作不正遂為人忠厚剛毅有大節內諫爭於王外責傅相引經義陳禍福至於涕泣蹇蹇亡已面剌王過王至掩耳起走曰郎中令善愧人及國中皆畏憚焉王嘗與騮奴宰人遊戲飲食過度遂入見王涕泣膝行左右御皆出涕王曰郎中令何為遂曰臣痛社稷之危也又曰張敞為膠東相王太后數出遊獵敞上書諫曰臣聞秦王好淫聲葉陽后為不聽鄭衛之曲楚莊好畋獵樊姬為不食鳥獸之肉口非惡芳甘耳非憎絲竹也所以抑心意絶嗜欲將以帥二君而全宗祀也禮君母出門則乘輜軿下堂則從傅母進退則鳴玉珮內飾則結綢繆此言尊貴所以自斂制不縱恣之宜也唯觀覽往古今后姬有所則書奏后不復出又曰成帝起昌陵數年不成復還歸延陵制度奢大劉向上書諫曰闔廬違禮厚葬十有餘年越人發之秦皇帝葬於驪山之阿下固三泉高五十餘丈周五里水銀為江海黃金為鳧鴈珍寶之藏機械之變棺槨之麗宮館之盛不可勝量工匠計以萬數數年之間被項羽之災離牧豎之禍丘壟彌高者發掘必速竊為陛下羞之上甚感向言而不能從又曰王莽新即位恃府庫之富欲立威乃拜十二部將率同時十道並出窮追胸奴因分其地立呼韓邪十五子莽將嚴尤諫曰周宣存時獫狁內侵至于涇陽命將征之盡境而還其視戎狄之侵譬猶蚊虻之螫馳之而已故天下稱明是為中策漢武帝選將治兵輕糧深入遠戍雖有剋獲之功胡輒報之兵連禍結三十餘年中國罷耗胸奴亦創而天下稱武是為下策秦始皇不忍小恥而輕民力築長城之固延袤萬餘里轉輸之所行起於負海疆境既完中國內竭以喪社稷是為無策莽不聽轉兵穀如故天下騷動又曰王莽新即位立威而窮追胸奴莽將嚴尤諫曰今天下遭陽九之厄比年飢饉此一難也不然奉軍糧二難也胡地沙鹵多乏水草三難也胡地秋冬甚寒春夏甚風此四難也輜重自隨虜徐遁逃五難也功必不成莽不聽又曰成帝時王氏擅權群臣莫敢言梅福上書諫曰昔高祖納善若不及從諫如轉圜此高祖所以無敵於天下也又曰梅乘上書諫吳王曰夫以一縷之任係千鈞之重上縣之無極之高下垂之不測之泉雖甚愚之人猶知其絶也又曰谷永上疏諫成帝曰臣聞三代之所以隕社稷皆由婦人與群惡願陛下追觀夏商周秦所失也又曰伍被楚人諫淮南王曰昔伍子胥諫吳王吳王不用乃曰臣今見麋鹿游姑蘇之臺也今臣亦將見宮中生荊棘露霑衣也因流涕而起
