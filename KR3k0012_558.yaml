body:
  text: 禮儀部三十六冢墓説文曰冢高墳也壟丘也墓兆域也釋名曰冢腫也象山頂之高者腫起也墓孝子思慕之處也丘陵象其形也書曰武王克商封比于之墓周禮曰大司徒以本俗六安萬民一曰媺音美宮室二曰族墳墓又曰冢人掌公墓之地辨其兆域而為之圖先王之葬居中以昭穆為左右公君也圖謂畫其地形及丘壟所處而藏之先王造塋者昭居左穆居右夾處東西凡諸侯居左右以前卿大夫士居後以其旋子孫各就其所出王以尊卑處其前後而亦併昭穆凡死於兵者不入兆域戰敗無勇投諸塋外以罰之凡有功者居前居王墓之前處昭穆之中央以爵等為丘封之度與樹數別尊卑也王公曰丘諸臣封漢律曰列侯墳高四尺關內侯以下至庶人各有差大喪記有曰請庶甫竁遂為之尸竁尸絹切又士納切葬穿壙也又音毳及竁以度為丘遂共喪之窆器及葬言鸞車象人鸞車巾車所飾遣車也亦設鸞於象人謂以芻為人言問其不如法度者及窆報斧以涖臨下棺也遂入藏凶器正墓域守墓蹕墓域守墓禁位謂丘封所居前後之禁所為榮限凡祭墓為尸凡諸侯及諸臣葬於墓者授之兆為之蹕均其禁又曰墓大夫掌凡邦墓之域為之圖凡邦中之墓地民所葬地令國民族葬而掌其禁令族葬各徒其親凡爭墓地者聽其獄訟師其屬而巡墓厲居其中之室以守之厲營限遮列處禮曰適墓不登壟為甘不敬壟冢也墓塋域助葬必執紼葬喪之大事紼引車索又曰孔子既得合葬於防言既得者少孤不知其墓曰吾聞之古者墓而不墳墓謂兆域土之高者曰墳也今丘也東西南北之人不可以不識音志也於是封之崇四尺四尺蓋周之制也孔子先反當修虞事門人後雨甚至後持封也孔子問焉曰爾來何遲也曰防墓崩孔子不應三三言之以孔子弗問孔子泫然流涕曰吾聞之也古不修墓修猶治也又曰易墓非古也易謂墓治草木不易者丘陵也又曰曾子曰朋友之墓有宿草而不哭焉宿草謂陳根也為師必喪三年於朋友期可又曰子路去魯謂顏淵曰何以贈我贈送曰吾聞之也去國則哭于墓而後行反其國不哭展墓而入無君事主於孝哭言衣去也展省視之謂子利曰何以處我處猶安也子路曰吾聞之也過墓則式過祀則下治者主於故又曰晉趙文子曰叔譽觀于九原叔譽叔向也文子曰死者如可作也吾誰與歸叔譽曰其陽豦父乎文子曰行并植於晉國不沒其身其智不足稱也并猶專也謂剛而專已為狐射姑所殺沒終也其咎犯乎文子曰見利不顧其君仁不足稱也謂與文子避難將至反國無安君之心及河授壁要君以利也我則隨武子乎利其身謀其身不遺其友武子士會也晉人謂文子知人傳曰譽叔曰晉人禦師必於殽殽有二陵焉其南陵夏后皋之墓也又曰鄭子展子産帥車七百乘伐陳陳侯扶其太子偃師奔墓欲逃冢間也又曰吳將伐齊越子率其衆以朝吳將皆喜唯子胥懼曰是豢吳也夫闔閭聞之賜之屬鏤以死屬鏤劍名將對曰樹吾墓檟檟可材也吳其亡乎史記曰黃帝崩葬橋山武帝巡朔方還祭黃帝冢曰吾聞黃帝不死今有冢何也左右曰黃帝已上天群臣藏其衣冠故有冢帝曰吾誠得如黃帝視去妻子如脫屣也又曰樗里子卒葬渭南章臺之東曰後百歲當有天子之宮夾我墓至漢興長樂宮在其東未央宮在其西武庫正直其墓漢書曰朱買臣獨行歌道中負薪墓間故妻與夫家俱上冢見買臣飢寒呼飯飲之又曰驃騎將軍霍去病卒夫子悼之發屬國玄甲軍陳自長安至茂陵為冢像祁連山又曰嚴延年東海下邳人為河南太守母來見執因大驚謂延年曰天道神明人不可獨殺我不自意當老見壯子被刑戮也行矣為汝東歸掃除墓地耳遂去歸郡見昆弟宗人復為言之後歲餘果敗東海莫不賢其母又曰哀帝令將作為董賢起冢營義陵傍內便房剛柏題湊外為徼道周垣數里闕罘罳甚盛罘音浮罳音思又曰莽奏貶傅太后號為定陶恭王母丁姬莽復言恭王母丁姬不臣妾至葬渭陵冢高與元帝山齊諸發恭王母及丁姬冢取其璽綬消滅徙恭王母歸定陶葬恭主冢次而葬丁姬復其故太后以為既已之事不須復發莽固爭之后詔曰因改故棺為致槨作冢祠以太牢謁者護既發傅太后冢崩壓殺數百人開丁姬槨火出四五丈吏卒以水沃滅乃得入燒燔槨中器物開傅后棺臭聞數里公卿在位皆阿莽旨入錢帛追子弟及諸生四夷凡十餘萬人操持作具助將作掘平恭王母丁姬冢二旬間皆平莽又周棘其豦以為世戒云時有群燕數千銜土投丁姬穿中又曰張賀為掖庭令及宣帝即位賀已死子又早亡上追思賀恩封其家恩德置守冢二百家又曰夏侯勝字公長遷太傅卒官賜冢塋葬平陵太后為素服五日報師傅之恩儒者以為榮又曰原涉自以先人墳墓儉約非孝也乃大治冢舍周閣重門初武帝時京兆曹氏葬茂陵伐其道為京兆阡涉墓之西買地開道立署曰南陽阡人不肯從謂之原氏阡東觀漢記曰帝感李通首創大謀每幸南陽常遣使者以太牢祠通父冢又曰建武三年以皇祖皇考墓為昌陵後改為章陵因以舂陵為章陵縣二十六年春正月初作壽陵將作大匠竇融上言園陵廣袤無慮所用帝曰古帝王之葬皆陶人瓦器木車茅馬使後世之人不知其處太宗識終始之義景帝能遵孝道遭天下反覆而獨完其福豈不美哉今所制地不過二三頃無為陵地裁令流水而已又曰郍刐字次孫早孤以至孝稱值天下亂野無煙火而郍刑獨在家側每賊過見其尚幼而有志節奇而哀之後漢書曰楊震字伯起改葬華陰遠近畢至先葬日有鳥高丈餘喪前悲鳴葬畢乃去於是立石鳥象於其墓所又曰郭伋徵太中大夫卒時年八十六帝親臨賜冢塋地又曰種皓上音沖下音杲為遼東郡薨并涼邊民咸為發哀胸奴聞皓卒舉國傷惜單于每入朝賀見墳墓輒哭祭又曰帝祠章陵過湖陽祠樊重墓追爵諡為壽張敬侯立廟於湖陽車駕每南巡常幸其墓賞賜大會又曰韓稜遷南陽太守特聽得過家上冢鄉里以為榮又曰蔡順母平生畏雷自亡後每有雷震順輒圜冢泣曰順在此後太守鮑衆舉孝廉順不能遠離墳墓遂不就又曰溫序拜謁者遷護羌校尉序行部至襄武為隗囂別將茍字所拘劫仗劍而死序主簿韓遵從事王忠持尸歸殮光武聞而憐之命忠送喪到洛陽城傍為冢地賜穀千斛縑五百匹除三子為郎中長子壽服竟為邸平侯相夢序告之曰久客思鄉里壽即棄官上書乞骸骨歸葬帝許之乃反舊塋焉魏略曰曹操微時人莫知之唯橋玄見而異焉謂曰今天下將亂安生民者其在君乎操感其知己及後經過玄墓輒悽愴致祭魏志曰管輅過母丘儉墓下倚樹哀吟曰玄武藏頭倉龍無足白虎銜尸朱雀悲哭四危以備法當滅族卒如其言又曰幽州牧劉虞署田疇為從事奉使未至虞已為公孫瓚所害及至謁祭虞墓陳章表哭泣而去吳書曰孫堅家于富春葬於城東冢上數有光怪雲氣五色王隱晉書曰初太康元年汲縣民盜發魏安釐王冢得竹書漆字又曰交廣記吳將呂岱為廣州遣掘尉他冢費損無獲他雖僣侈然慎終其身乃令後不知其豦鑒於牧堅所殘也又曰愍帝建興中曹嶷發景公及管仲冢尸並不朽繒帛可服珍寶巨萬又曰金鄉縣比鑿石為冢云得曰蛇白兔及得金故曰金人又曰王褒字偉元少立操尚父為晉文王所害絶世不仕立屋墓側以教授為務旦夕常至墓前朝拜輒悲號斷絶墓前一柏樹褒常所攀涕所著樹色與凡樹不同書曰滕修南陽人也為廣州牧修在海南積年為邊夷所附卒請葬京師帝嘉其意賜墓田一頃又曰東海王越屯許路經滎陽過稽紹墓哭之悲慟刊石立文表贈官爵帝乃遣使策贈侍中光祿大夫加金章印綬進爵為侯賜墓田一頃客一戶祠以少牢又曰盧志言於成都王頴曰黃橋戰亡者有八千餘人既經夏暑露骨中野可為傷惻昔周王葬枯骨況此等致死王事乎頴乃造棺八千餘枚以成都國秩為衣服殮祭葬於黃橋北樹枳籬為之塋城又立都祭堂刊石立碑紀其赴義之功使亡者家四時祭祀有所晉書載記曰西胡梁國兒於平涼作壽冢每將妻妾入冢飲宴酒酣升靈床而歌時人或譏之國兒不以為意前後征伐屢有功姚興以為鎮北將軍年八十餘乃死宋書曰宋文帝元嘉二十五年行幸江寧經司徒劉穆之墓遣使致祭焉後魏書曰李沖字思順高祖時為尚書僕射卒葬覆舟山近杜預冢高祖之意也後車駕自鄴還洛經沖墓左右以聞高祖臥疾望墳掩淚又曰傅永字修常登北邙於平坦豦奮矛躍馬盤旋瞻望有終焉之志遠慕杜預近好李沖王肅欲附葬於墓遂買左右地數畝遺勑子叔偉曰此吾之永宅也禮系曰天子墳高三雉諸侯半之卿大夫八尺士四尺天子樹松諸侯樹柏卿大夫樹楊士樹榆尊卑差也楚漢春秋曰惠帝崩呂太后欲為高墳使從未央宮坐而見之諸將諫不許東陽侯垂泣曰日夜見惠帝冢悲哀流涕無以死傷生也臣竊哀之於是太后乃止蕭方等三十國春秋曰晉義熙九年盜發故驃騎將軍卞壺墓剖棺掠之壺尸面如生兩手悉拳爪生達背戰國策曰齊宣王見顏觸曰觸前觸亦曰王前王作色曰士貴乎觸曰士貴昔秦攻齊令曰有敢去柳下季壟五十步而樵採者罪死不赦令曰有能得齊王頭封萬戶由是觀之生王之頭不如死士之壟崔鴻前趙録曰張嵩壟西人也事母至孝母喪既葬於墓側哀感幽顯歲餘而墓地自裂棺亦自破母還蘇活方言曰冢秦晉之間謂之墳取名於大防也或謂之培音部或謂之愈音曳或謂之采古者卿大夫有菜地葬之因名云也或謂之垠或謂之壟有界埒似耕龔四名云也自關以東謂之丘小者謂之塿培塿亦高之所名之也大者謂之丘凡葬而無墳謂之墓言所不封也墓猶墓之所以安墓謂之撫撫謂規度墓地漢書曰初陵撫是也
