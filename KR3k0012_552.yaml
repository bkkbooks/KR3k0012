body:
  text: 禮儀部三十棺周易繫辭曰古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺槨周禮春官喪祝曰及祖飾棺乃載遂御凡卿大夫之喪掌事而斂飾棺禮記檀弓上曰有虞氏瓦棺始不用薪者虞氏上陶夏后氏堲周大熟曰堲燒土治以周於棺殷人棺槨棺大也以木為之言槨大於棺殷人上棺周人牆置翣牆柳衣也凡此言後王之制文也周人以殷人之棺槨葬長殤以夏后氏之堲周葬中殤下殤以有虞氏之瓦棺葬無服之殤略未成人禮記檀弓上曰有子曰夫子制於中都四寸之棺五寸之槨以斯知之不欲速朽也中都魯邑名孔子嘗為之宰為民作此制禮記檀弓上曰天子之棺四重尚深邃也諸公三重諸侯再重大夫一重士不重水兕革棺被之其厚三寸以水牛兕牛之革以為棺被革各厚三寸合六寸也此為一重也杝棺一所謂椑棺也爾雅曰椵杝梓棺二所謂屬與大棺四者皆周周匝棺束縮二衡三袵每束一衡亦當為橫袵今小要也柏槨以端長六尺以端題湊也其方蓋一尺也禮記檀弓下曰天子崩虞人致百祀之木可以為棺槨者斬之掌山澤之官百祀畿內百縣之祀以為棺槨斬伐也禮記檀弓上后木曰喪吾聞諸縣子曰夫喪不可不深長思也后木魯者孝公子惠伯鞏之後買棺外內易我死則亦然禮記檀弓下曰陳乾昔寢疾屬其兄弟而命其子尊己曰如我死則必大為我棺使吾二婢子夾我婢子妾也陳乾昔死其子曰以殉葬非禮也況又同棺乎弗果殺善尊己不陷父於不義也禮記喪大記曰君大棺八寸屬六寸捭四寸上大夫大棺八寸屬六寸下大夫大棺六寸屬四寸士棺六寸大棺棺之在表君裏棺用朱綠用雜金鐕大夫裏棺用玄綠用牛骨鐕士不綠鐕所以瑑著裏也君蓋用漆三衽三束大夫蓋用漆二衽二束士蓋不用漆二衽二束用漆者塗合牝牡中也衽小要君大夫鬊瓜實于綠中士埋之綠當為角聲之設角即謂棺之內也禮記外傳曰凡棺之重數從內數向外如席之重也兕革棺一各三寸內一重有水牛皮次兕皮二者合為一重都厚六寸一名椑棺又名櫬椑者堅如壁櫬者親於身也杝棺二厚八寸杝曰嘏木在椑棺之外屬棺三其厚四寸屬者施杝棺外大棺四厚六寸屬棺之列也屬棺大棺皆用梓也上公去水牛皮兕皮外有三重也侯伯已下去水兕杝棺外二重卿大夫唯屬棺與大棺一重士不言重唯棺而已左傳宣上曰鄭人討幽公之亂斷子家之棺以四年殺君故也斷薄其棺不使從卿禮左傳成上曰宋文公葬槨有四阿棺有翰檜杜預注曰翰旁飭檜上飭王禮左傳襄上曰齊姜薨初穆姜使擇美檟檟梓之屬以自為櫬與頌琴櫬棺也頌琴琴名猶言雅琴也皆欲以送納季文子取以葬君子曰非禮也禮無所逆婦養姑者也虧姑以成婦逆莫大焉穆姜成公母齊姜成公婦也左傳襄上曰定姒薨不殯于廟無櫬不虞櫬親身棺也季孫以定姒本賤既無備器議其喪制欲殯不遇廟又不及哭也匠慶謂季文子曰子為上卿而小君之喪不成不終君也父其母是不終事君之道也君長誰受其咎初季孫為己樹六檟於蒱圃東門之外蒱圃場圃名矣匠慶請木季孫曰略匠慶用蒱圃之檟季孫不禦禦止左傳哀上曰趙簡子與鄭戰簡子誓曰志父無罪君實圖之若其有罪絞縊以戮桐棺三寸不設屬辟屬辟棺之重數王棺四重君再重大夫一重素車樸馬以載柩無入于兆兆葬域下卿之罰也公羊傳定公勻國君薨正棺於兩楹之間然後即位論語先進曰顏淵死顏路請子之車以為之槨欲得賣之以為顏淵作槨也顏路顏淵之父子曰才不才亦各言其子也鯉也死有棺而無槨吾不徒行以為之槨以吾從大夫之後不可徒行也鯉孔子子伯魚家語曰孔子之喪公西赤掌殯葬焉桐棺四寸柏槨五寸家語曰墨子葬法棺三寸足以朽骨衣三領足以朽肉掘地之深下無漏氣發洩於上襲之以明其所止也說文曰棺關也可以掩屍櫬附身棺也櫝匱也槥櫝也史記曰飛廉生惡來俱以材力事紂武王伐紂并殺惡來時飛廉為紂使北方還無所報為壇霍太山而報得石棺銘曰天令處父與發亂賜汝石棺死遂葬霍太山古史考曰舜作瓦棺湯作木棺漢書曰高祖下令士卒從軍死者為槥服虔曰槥音衛應劭曰小棺也今謂之櫝歸其縣縣給衣衾棺葬具致其尸於家縣官更給衣衾斂祠以少牢吏親葬漢書曰張湯自殺昆弟欲厚葬湯母曰湯為大臣被惡言死何厚葬為載以牛車有棺無槨上聞曰非此母不生此子漢書曰哀帝崩有司奏董賢乃自殺死後其父恭不悔過乃復以緲畫棺作時之色左蒼龍右白虎上著金銀曰月玉衣珠璧至尊無以加漢書曰王莽奏貶丁傅太后號改葬發取璽綬太后以為既往之事不須發莽固爭之太后詔曰因故棺為致槨作塚葬既開傅太后棺臭聞數里續漢書禮儀志曰王公王貴人皆樟棺朱漆畫雲氣公特進樟棺黑漆續漢書曰楊震數灱諫為樊豊等所譖遣歸本郡震行至城西凡陽亭謂諸子門人曰身死之日以雜木為棺單被裁足蓋形勿歸塚次勿設祭祠因飲酖而卒續漢書曰曹褒在射聲營舍有停棺椁不葬者百餘所褒親自履行愴然為買空地悉葬其無主者續漢書曰周盤字伯堅年七十三歲朝集諸生講論終日因令其二子曰吾日者夢見先師東里先生與我講於陰堂之奧而長歎豈吾齒之盡乎命終之日桐棺足以周身外槨足以周棺斂刑懸封濯衣幅巾編四寸簡寫堯典一篇并刀筆各一以置棺前示不忘聖道其月望無病忽終學者以為知命東觀漢記曰郭鳳字君張善說災異吉凶占應病先自知死日豫令弟子市棺斂具至其日如言卒東觀漢記曰耿秉薨賜朱棺玉衣東觀漢記曰梁商薨賜東園朱壽器銀鏤玉匣東觀漢記曰長沙有義士古初遭父喪未葬鄰人火起及初舍棺不可移初冒火伏棺上會火滅東觀漢記曰大司徒歐陽歙坐在汝南贓罪死獄中歙掾陳元上書追訟之言甚切至帝乃賜棺木贈賻三千疋謝承後漢書曰徐翊為長沙郡將死遺令不受贈賻一疋私馬賣以買棺謝承後漢書曰和帝追封太后父梁松為褒親愍侯改殯賜東園畫棺玉匣衣衾而葬之魏志曰李𠐶等葬董卓於郿并收所焚屍之灰合斂於棺而葬之是日大風暴雨霆震卓墓水入藏漂其棺木魏志曰宣王討王陵赦罪陵自知罪重試索棺釘以觀大傳意竟給之遂自殺曹操別傳曰操破梁孝王棺收金寶天子聞之哀泣晉書曰夏侯湛將歿遺命小棺薄斂不脩封樹論者謂湛雖生不砥厲名節死則儉約令終是深達存亡之理也後魏書曰崔光韶誡子孫曰吾兄弟自幼及老衣服飲食未曾一片不同至於兒女官婚榮利之事未嘗不先以推弟弟頃橫禍權作松棺亦可以為吾作松棺使吾見之南史曰宋光祿大夫劉鎮之年三十許病篤已辦凶具既而疾愈因蓄棺以為壽九十餘乃亡此器方用宋書曰王敬則為既陽令初至既陽縣陸主山下宗侶十餘舡同發敬則舡獨不進乃令入水推之見烏漆棺敬則呪云若是吉使舡速進吾富貴當改葬爾舡須臾進入縣城收此棺葬之宋書曰袁昂為豫章內史丁所生母憂去職以喪還江路風潮暴駭昂乃縛衣著棺誓同沉溺及風止餘舡皆沒唯昂舡獲全咸謂精誠所致梁書曰衡陽宣王子簡位郢州剌史卒於官喪將引柩有聲議者欲開視王妃柳氏曰晉文已有前例不聞開棺無益亡者之生徒增生者之痛遂止晉公卿禮秩曰諸公及從公薨者賜東園秘器在外都督者給秘器直錢三十萬安平王孚薨給東園溫明秘器楊駿誅賜五木棺一具載以官路車三十國春秋曰晉黃門郎殷仲堪遊於江濱見流棺於水乃接焉旬日之中門前之溝忽起為岸是夕有人通夢於仲堪自稱徐伯感君之惠無以報仲堪因問門岸為何祥乎對曰水中之岸其名為洲君將為也言終而沒唐書曰玄宗開元二十年自東都幸太原至太行坂路隘逢椑車問左右曰車中何物左右奏曰禮天子出則載禆車以從先王之制也上曰焉用此命焚之無椑自此始也莊子曰古之喪禮貴賤有儀上下有等天子棺槨七重諸侯五重大夫三重士再重墨子獨生不歌死不服桐棺三重而無槨以為法式慎子曰匠人成棺而無憎於人利在人也死呂氏春秋曰善棺槨所以備螻蟻也今世俗大亂人主踰侈非為死者慮亦所以相矜淮南子曰吾生有七尺之形死有一棺之土淮南子曰鬻棺者欲民之疾疫也蓄粟者欲歲之荒飢也鹽鐵論曰古者瓦棺堲周足以收形骸髮齒而已及其後桐棺不依桑棺不留今富者䋠題牆湊中者梓棺楩槨貧者繒囊緹橐風俗通曰葉令王喬天下一玉棺於廳事前令臣吏試入終不搖喬曰夭帝獨欲召我沐浴服飾寢其中蓋便立覆宿昔葬於城東縣牛皆流汗風土記曰陽羨縣令袁起生有神靈無疾暴亡殯斂已竟風雷冥晦失起喪柩山下居民夜聞山下有數十人晨往山上見起棺柩俄而潛藏唯有石塚石壇今在神仙傳曰介象為吳主所徵至武昌連求去不許象言病帝使左右以美梨一奩賜象須臾象死帝殯而埋之以中時死其日晡時到建業以所賜䔧付守死吏後吏以狀聞即發象棺棺中無所有有奏符搜神記曰令有縣孫孤城古孤竹君之國也靈帝光和元年遼水中有浮棺人破斫之棺中人語曰我伯夷之弟孤竹君也海水壞我棺槨是以漂汝斫我何為乃不敢破因為立祠民有發視者無疾而死搜神記曰北有道人能令人與死人相見其同郡人婦死已數年聞而往見之曰願令一見死婦死不恨矣道人曰可然聞鼓聲疾出俄而得見之與婦言語悲喜恩情如生良久聞鼓音悢悢不能得時出門𨳲戶掩壻乃徒出𨳲其衣裾戶間掣絕而去後數歲餘此人死家葬之開塚見婦棺蓋下有衣裾悢力尚反異苑曰海陵如皋縣東城村邊海岸崩壞一古墓有方頭漆棺以朱題上云百七年墮水元嘉二十載三月墜於懸獻巴蜀志曰獠夷死即立埋棺不臥設盛弘之荊州記曰冠軍縣東一里有張詹墓魏太和時人也刻碑背曰白楸之棺易朽之裳銅錢不入瓦器不藏嗟爾後人幸勿我傷自胡石之亂墳墓莫不夷毀此墓元嘉初猶儼然六年大水民飢始被發初開金銀錫銅之器爛然畢備有二朱漆棺棺前垂竹簿簾金釘釘之永嘉郡記曰樂成縣石堂水口先時有一漆棺逆水入溪十餘里便住有靈下人云是方姥甚有靈驗從征記曰劉表塚在高平郡表子琮擣四方珍香數十石著棺中蘇合消救之香莫不畢備永嘉中郡人衡熙發其墓表貌如生香聞數十里熙懼不敢犯陸機大墓賦曰覩洪檟而為槥槥小棺也
