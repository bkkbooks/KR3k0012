body:
  text: 皇王部十八魏太祖武皇帝魏志曰太祖武皇帝沛國譙人姓曹名操字孟德漢相國參之後曹瞞傳曰太祖一名吉利字阿瞞也祖騰漢桓帝時為中常侍大長秋封費亭侯養子嵩嗣官至太尉莫能審其生出本末曹瞞傳及郭頒世語並云嵩夏侯氏子夏侯惇之叔父太祖於惇為從父兄弟也嵩生太祖太祖少機警有權數而任俠放蕩不治行業故世人未之奇也唯梁國橋玄南陽何顒異焉玄謂太祖曰天下將亂非命世之才不能濟也能安之者其在君乎年二十舉孝廉為郎除洛陽北部尉遷頓丘令徵拜議郎光和末黃巾起拜騎都尉討潁川賊遷為濟南相國有十餘縣長吏多阿附貴戚贓污狼籍於是奏免其八九禁斷淫祀姦宄逃竄郡界整肅久之徵還為東郡太守不就稱疾歸鄉里初平元年春正月後將軍袁術冀州牧韓馥兗州刺史劉岱渤海太守袁紹濟北相鮑信等同時俱起衆各數萬推紹為盟主太祖行奮武將軍董卓聞兵起乃徙天子都長安卓留屯洛陽遂焚宮室是時卓兵強紹等莫敢先進太祖曰舉義兵以誅暴亂大衆已合諸君何疑向使卓聞山東兵起倚王室之重據二周之險東向以臨天下雖以無道行之猶足為患今焚燒宮室劫遷天子海內震動不知所歸此天亡之時也一戰而天下定矣不可失也遂引兵西據成皋到滎陽汴水遇卓將徐榮與戰不利士卒死傷甚多太祖為流矢所中乘馬被瘡從弟洪以馬與太祖得去太祖兵少乃與夏侯惇等詣楊州募兵司徒王允與呂布共殺卓青州黃巾衆百餘萬人兗州劉岱欲擊之鮑信諫岱不從遂與戰果為賊所殺信乃迎太祖領兗州牧遂進兵擊黃巾追至濟北乞降各受降卒三十餘萬男女百餘萬口收其精鋭者號青州兵天子拜太祖兗州牧是歲長安亂天子東遷敗於曹陽渡河幸安邑太祖軍臨武迎天子假太祖節鉞録尚書事獻帝記曰又領司隸校尉洛陽殘破董昭等勸太祖都許車駕出轘轅而東以太祖為大將軍封武平侯自天子西遷朝廷離亂至是宗廟社稷制度始立時以袁紹為太尉紹恥班在公下不肯受公乃固辭以大將軍讓紹天子拜公司空行車騎將軍公圍張繡於穰劉袁遣兵救繡以絶軍後公將引還繡兵來追公軍不得進連營稍前公與荀彧書曰賊來追吾雖日行數里吾策之到安衆破繡必矣到安衆繡與表兵合守險公軍前後受敵公乃夜鑿險為地道悉過輜重設奇兵會明賊謂公為遁也悉軍來追乃縱奇兵出夾攻大破之公還許荀彧問公前何以策賊必破公曰虜遏吾歸師而與吾死地戰吾以是知勝矣袁紹既并公孫瓚兼四州之地衆十餘萬諸將以為不可敵公曰吾知紹之為人志大而智小色厲而膽薄忌刻而少威兵多而分畫不明將驕而政令不一土地雖廣糧食雖豐適所以為吾奉也張繡率衆降公軍官渡劉備殺徐州刺史曹胄舉兵屯沛五年公自征備諸將曰與公爭天下者袁紹也今棄之東若何公曰劉備人傑也今不擊必為後患袁紹雖有大志而見事遲必不動也遂破備備奔紹紹遣郭圓淳于瓊顏良等攻劉延於白馬紹引兵至黎陽公於是救延荀攸說公曰今兵少不敵分其勢乃可公從之遂擊破斬良紹騎將文醜與劉備將五六千騎前後至公縱奇兵擊大破之斬醜良酸良皆紹名將再戰悉擒紹軍大震八月紹連營稍前進臨官渡起土山地道公亦於內作之以相應紹射營中矢如雨下行者皆蒙楯衆大懼時公糧少與荀或書議欲還許或以為紹悉衆臨官渡欲與公決勝敗公以至弱當至強若不能制必為所乘是天之大機也公與紹相距連月雖比戰斬將然衆少糧盡士卒疲乏公謂運者曰十五日為汝破紹不復勞汝矣冬十月紹遣車運穀使淳于瓊等五人將兵萬餘人逆之宿紹軍營北四十里紹謀臣許攸貪財紹不能足來奔因說公擊瓊等左右疑之荀攸賈詡勸公公乃留曹洪守自將步騎五千人夜往會明至瓊等望見公兵少出陳門外公急擊之瓊退保營遂攻之紹遣騎救瓊左右或言賊稍近請分兵距之公怒曰賊在背後乃白士卒皆殊死戰大破瓊等皆斬之紹初聞公擊瓊謂長子談曰就彼破瓊等吾攻拔其營彼固無所歸矣乃使張郃高覽攻曹洪郃等聞瓊破遂來降紹衆大潰紹及談棄軍走渡河追之不及盡收其輜重圖書珍寶盧其衆公收紹書中得許下及軍中人書皆焚之紹自軍破後發病歐血死小子尚代談自號車騎將軍屯黎陽秋公征之連戰談尚數敗退固守攻其郭乃出戰擊大破之談尚夜遁談尚爭冀州談為尚所敗走保平原尚攻之急談遣辛毗乞降請救諸將皆疑荀攸勸公許之公乃引軍到黎陽為子整與談結婚尚聞公北乃釋平原還鄴公進軍攻鄴尚懼乞降公不許為圍益急尚夜遁衆大潰尚走中山盡獲其輜重得尚印綬節鉞鄴定公臨祠紹墓哭之流涕慰勞紹妻還其家人寶物賜之雜繒絮廩食之天子以公領冀州牧公讓還兗州公之圍鄴也談略取甘陵安平渤海河間尚敗還中山談攻之尚奔固安遂并其衆公遺談書責以負約與之絶婚女還然後進軍談懼拔平原走保南皮公入平原略定諸縣攻談破之斬誅其妻子冀州平袁熙大將焦觸張南等叛攻熙尚熙尚奔三郡烏丸觸等舉其縣降封為列侯三郡烏丸承亂破幽州略有漢民合十餘萬戶初袁紹皆立其酋豪西單于踏頓尤強為紹所厚故尚兄弟歸之數入塞為害公將征之鑿渠自呼陀入孤水名平虜渠引軍出盧龍塞外道絶不通乃塹山堙谷五百餘里經白擅歷平剛涉鮮卑庭東指柳城未至二百里虜乃知之尚熙與踏頓遼西單于樓班右北平單于能臣抵之等將數萬騎逆軍登白狼山卒與虜遇衆甚盛公車重在後被甲者少左右皆懼公登高望虜陳不整乃縱兵擊之使張遼為先鋒虜衆大崩斬踏頓及名王以下胡漢降者二十餘萬口初遼東太守公孫康恃遠不服及公破烏丸或說公遂征之尚兄弟可擒也公曰吾方使康斬送尚熙首不煩兵矣公引軍自柳城還康即斬尚熙及速僕九等傳其首諸將或問公還而康斬送尚熙何也公曰彼素畏尚等吾急之則并力緩之則自相圖其勢然也關中諸將疑公欲自襲馬超遂與韓遂楊秋李堪成宜等及公乃征之與超夾關為軍乃與剋日會戰先輕兵挑之戰良久乃縱虎騎夾擊大破之斬成宜李堪等超走涼州楊秋奔安定關中平天子命公贊拜不名入朝不趨劍履上殿加蕭何故事使御史大夫郗慮持節策命公為魏公始建魏社稷宗廟天子娉公三女為貴人又命公置旄頭宮殿設鍾簴又命公承制封拜諸侯守相冬十月始置名號侯至五大夫與舊列侯關內侯凡六等以賞軍功又進公爵為王設天子旌旗出入稱警蹕王崩于洛陽時年六十六諡曰武葬高陵又曰漢桓帝時有黃星見於楚宋之分遼東商馗善天文言後五十歲當有真人起於梁沛之間其鋒不可當至破袁紹之歲凡五十年天下莫敵矣魏書曰漢末太祖拒董卓命歸鄉里過故人成皋呂伯奢伯奢不在其子八人備賓主之禮太祖自以背卓聞其食器聲以為圖己夜殺八人而去既而歎曰寧我負人無人負我又曰太祖自御海內芟夷群醜其行軍用師大較依孫吳之法而因事設奇量敵制勝變化如神自作兵書十餘萬言諸將征伐皆以新書從事臨時又手為節度從令者剋捷違教者負敗與虜對陳意思安間如不欲戰然及至決機乘勝氣勢盈溢故每戰必克知人善察難眩以僞拔于禁樂進於行陳之間取張郃徐晃於亡虜之中皆佐命立功列於名將其餘拔出細微登為牧守者不可勝數是以創造大業文武並施御軍三十餘年手不捨書晝則講軍策夜則思經傳登高必賦乃造新詩被之管絃皆成樂章才力絶人手射飛鳥躬擒猛獸嘗於南皮一日射雉獲六十三頭及造作宮室繕治器械無不為之法則皆盡其意雅性節儉不好華麗後宮不衣錦繡侍御履不二綵帷帳屏風壞則補納茵蓐取溫無有緣飾攻城拔邑得靡麗之物則悉以賜有功勳勞宜賞不吝千金無功望施分毫不與四方獻御與群下共之常以禮送終之制襲稱之數繁而無益俗又過之故豫自為制終云衣服四篋而已帝王世紀曰黃初元年追尊號諡曰武皇帝廟號曰太祖曹瞞傳曰操少好飛鷹走狗遊蕩無度其叔父數言之於嵩操患之後逢叔父於路及陽敗面喎口叔父怪問其故太祖曰卒中惡風叔父以告嵩嵩驚愕呼操而口貌如故嵩問曰叔父言汝中風已差乎操曰初不中風但失愛於叔父故見罔耳嵩乃疑焉自後叔父有所告嵩終不復信操於是益得肆意及為洛陽北部尉初入尉廨繕治四門造五色棒懸門左右各十餘枚有犯禁者不問豪強皆棒殺後數月靈帝愛幸小黃門蹇碩叔父夜行即殺之京師斂跡莫敢犯者近習寵臣咸疾之然不能傷於是共稱薦操故遷為頓丘令操為人輕易無威重好音樂倡優在側但以日達夕被服輕綃身自佩小盤囊以盛手巾細物時或冠夾帽以見賓客每與人談論戲弄言辭盡無所隱及恍大笑至以頭投杯案中肴膳皆沾污巾幘其輕易如此然持法峻刻諸將計畫勝出己者隨以法誅之及故人舊惡亦皆無餘其所刑殺輒對之垂涕嗟痛之終無所活嘗出軍行經麥中令士卒無敗麥犯者死騎士皆下馬指麥以相付時操馬騰入麥中勑主簿議罪主簿對以春秋之義罰不加尊操曰制法而自犯之何以帥下然孤為軍帥不可殺請自刑因拔刀割髮以置地世語曰魏武將見胸奴自以形陋不足雄遠國使崔季圭代帝自捉刀立床頭既畢令間諜謂曰魏王何如胸奴使答曰王雅望非常然床頭捉刀人此乃英雄也魏王聞之馳遣殺此使博物志曰漢世安平崔瑗瑗子實弘農張芝芝弟昶並善草書而太祖亞焉桓談蔡雍善音樂馮翊山子道王九真郭凱等善圍碁太祖皆與埒能又好養性法亦解方藥招引方術之士廬江左慈譙郡華他甘陵甘始陽城郤儉無不畢至又習噉野葛至一尺亦得少少飲鴆酒世說曰魏武帝嘗過曹娥碑不解楊修讀碑背上題云黃絹幼婦外孫虀曰魏武謂修曰卿解未可言待我思之行三十里魏武曰吾已得令修別記所知修曰黃絹色絲也於字為絶幼婦少女也於字為妙外孫女子也於字為好虀曰受辛也於字為辭所謂絶妙好辭武帝亦記之與修言同帝歎曰我才不如卿乃較三十里唐太宗皇帝祭魏武帝文曰夫大德曰生資二儀以成化大寶曰位應五運而昌貴賤廢興莫非天命故龍顏日角顯帝王之符電影虹光表乾坤之瑞不可以智競不可以力爭昔漢室三分群雄並立夫民離政亂安之者哲人德喪時危定之者賢輔伊尹之匡殷室王道昏而復明霍光之佐漢朝皇綱否而還泰立忠履節爰在於斯帝以雄武之姿常艱難之運棟梁之任同乎曩時匡正之功異乎往代觀沉溺而不拯視顛覆而不持乖徇國之情有無君之跡既而三分肇慶黃星之應久彰五十啓期真人之運斯屬其天意也豈人事乎文皇帝魏志曰文皇帝諱丕字子桓武帝太子太祖崩嗣位為丞相魏王延康元年十月升壇即祚改延康為黃初以荊楊江表八郡為荊州孫權領牧故也荊州江北諸郡為郢州權破劉備於夷陵初帝聞備兵東下與權交戰樹柵連營七百餘里謂群臣曰備不曉兵豈有七百里營可以拒敵者乎孫權叛帝自許昌南征諸軍兵並進權臨江拒守幸廣陵故城臨江觀兵戎卒十餘萬旌旗數百里是歲大寒冰舟不得入江乃引還七年春將幸許昌許昌城南門無故自崩帝心惡之還洛陽宮五月帝崩于嘉福殿時年四十帝好文學以著述為務自所勒成垂百篇又使諸儒撰集經傳隨類相從凡千餘篇號曰皇覽魏書曰帝生時有雲氣青色而圓如車蓋當其上終日望氣者以為至貴之證非人臣之氣年八歲能屬文有逸才遂博貫古今經傳諸子百家之言善騎射好擊劍州舉茂才不行又曰文帝初在東宮氣疫大起時人凋傷帝深感歎與素所善者大理王朗書曰人生有七尺之形死為一棺之土唯立德揚名可以不朽其次莫如著篇籍疫癘數起士人凋落余獨何人能全其壽故論撰所著論詩賦蓋百餘篇集諸儒於肅成門內講論大義侃侃無倦吳志曰魏文帝出廣陵望大江曰彼有人焉未可圖也乃還博物志曰魏文帝善彈棊能用手巾角時有一書生又能低頭以所冠巾角撇棊典論曰初平之元年董卓弒帝後蕩覆王室時余年五歲上以世方擾亂教余學射六歲而知射教余乘馬八歲而能騎射矣以時之多難故每征伐余乘馬常從建安初上南征荊州至宛張繡降旬日而反亡兄孝廉子修從兄安民遇害時余十歲乘馬得脫夫文武之道各隨時而用生乎中平之季長於戎旅之間是以少好弓馬于今不衰逐禽輒十里馳射常百步日夕體倦心每不厭建安十年始定冀州穢貊獻良弓燕岱獻名馬時歲之暮春勾芒司節和風扇物弓燥手柔草淺獸肥與族兄弟同獵於鄴西終日獲麞塵鹿九雉兔二十後軍南征次曲蠡尚書令荀彧奉使犒軍見余談論之末或言聞君善左右射此實難能余言執事未覩夫項發口縱俯馬蹄而仰月支也彧喜笑曰乃爾余曰射有常徑的有常所雖每發輒中非至妙也若夫馳平原赴豐草要狡獸截輕禽使弓不虛彎所中必洞胸斯則妙矣時軍祭酒張京在坐顧彧俱拊手曰善余又好擊劍閲師多矣四方之法各異唯京師為善余於他戲弄之事少所喜唯彈棊略盡其巧少為之賦昔京師先工有馬合鄉侯東方安世張公子常恨不得與彼數子者對上雅好書籍雖在軍旅手不釋卷每定省從容常言人少學則思專長則忌於長大而能勤學者唯吾與袁伯業耳余是以少誦詩論及長而備歷五經四部史漢諸子百家之言靡不畢覽所著書論詩賦凡六十篇至若知而能愚勇而知怯仁以接物恕以及下以付後之良史
