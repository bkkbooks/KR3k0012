body:
  text: 職官部二十二散騎常侍六典曰唐貞觀初置散騎常侍二員隸門下省明慶二年又置二員隸中書省始有左右之號並金蟬眊貂左散騎與侍中為左貂右散騎與中書令為右貂謂之八貂又曰散騎常侍晉代此官選望甚重時與黃門侍郎謂之黃散漢書百官表曰散騎中常侍皆加官所加或列侯將軍卿大夫正員多至數十人應劭漢官儀曰秦及前漢置散騎及中常侍各一人散騎騎馬並乘輿車獻可替否魏志曰文帝延康元年置散騎常侍為一官省中置四人與侍中同掌規諫不用官者官者為官不過署令魏略曰散騎常侍比於侍中貂璫插石黃初中始置四人出入侍從與上談議不典事蜀志曰魏文帝善孟達之姿才容觀以為散騎常侍吳志曰薛瑩既至洛陽特先見敘為散騎常侍答問處當皆有條理晉書曰鄭默字思元為散騎常侍武帝出南郊侍中巳陪乘詔曰使鄭常侍參乘又曰阮孚為散騎常侍嘗以金貂換酒復為所司彈劾帝宥之又曰華嶠字叔駿加散騎常侍班同中書寺為內臺中書散騎著作及理禮音律天文數術南省文章門下撰集皆典統之也又曰何劭字敬祖曾之子也少與武帝同年有惣角之好及帝即位轉散騎常侍甚見親重晉起居注曰太康七年詔曰尚書馮紞忠亮在公歷職內外勤恪匪懈而疾未差屢求放退其以紞為散騎常侍賜錢二千萬床帳一具又曰升平五年詔曰前西中郎謝萬才義簡亮宜居獻替其以萬為散騎常侍晉中興書曰庾闡有文章才美議者以為宜綜國史於是召為散騎常侍晉諸公贊曰司馬駿五六歲能書數魏王為帝駿八歲為散騎常侍常侍講齊書曰周盤龍自平北將軍為散騎常侍武帝戲之曰卿著貂蟬何如兜鍪對曰此貂蟬從兜鍪中出耳齊職儀曰魏氏侍中皆騎從御登殿與散騎常侍對挾帝侍中居左常侍居右後魏書曰初高祖以李彪為散騎常侍郭祚因入見高祖謂祚曰朕誤受一人官祿對曰豈容聖詔一行而有差異高祖曰朕昨誤沉吟曰此自應有讓朕欲別授一官須臾彪有啓云伯石辭卿子産所惡臣欲之巳久故不敢讓高祖歎謂祚曰卿之忠諫李彪正辭使朕遲回不能復決遂不移官又曰明亮為常侍加武勇將軍進曰臣本官常侍是第三清今授武勇其號至濁又曰荀頽承明元年文明太后令百官舉才堪幹事人足委仗者於是公卿咸以頽應選徵拜散騎常侍又曰孝文謂散騎常侍元景曰卿等自在集書合省逋墯致使王言遺滯起居不修北齊書曰宋辨為散騎常侍遷右將軍領黃門辨屢讓高祖曰散騎位在中書之右常侍者黃門之庶兄領軍者二衛之假攝不足空存推讓而棄大委又曰朝貴多假常侍以取貂蟬之飾高隆之自表解侍中并陳請假侍服者亦請罷之詔皆如表三國典略曰齊遣散騎常侍崔瞻聘于陳瞻辭韻溫雅南人欽服力謂之曰常侍前朝何竟不來今日誰相對者又曰賀琛為梁散騎常侍梁主與語常移晷刻故省中語曰上殿不下有賀雅琛容止都雅故人呼之隋書曰案漢官侍內金蟬左貂金取剛固蟬取高潔也董巴志曰內常侍右貂金璫銀附蟬內書今亦同此今官者去貂內史金蟬右貂納言金蟬左貂開皇時特加散騎常待在門下者貂蟬至是罷之唯加常侍聘外國者特給貂蟬還則輸納於內省環濟要略曰散騎常侍入侍左右出則侍事於廊廡之下華嶠集云詔曰散騎以從容侍從承答顧問掌讚詔命平處文籍故前世多參用文學之士義郎華嶠有論義著述之才其以嶠為散騎常侍兼與中書共參著作事嶠表謝云非臣典筆申辭所能陳謝員外散騎常侍晉書曰吏部郎李重啓東莞太守曹嘉之才翰學義先代之后宜補員外常侍晉起居注曰咸康八年司徒王導表員外常侍孫朝八年告老棄身茨宇永絶榮祿宜給本官秩俸以終餘年梁書曰賀琛字國寶遷員外散騎常侍舊尚書南座無貂貂自琛始也通直散騎常侍陶氏職官要録曰晉太始十年詔東平玉楙為員外常侍通直殿中與散騎常侍通直通直之號蓋自此始也朱鳳晉書曰左軍陳與騫之子以父老求去職宿衛不宜曠詔以為通直常侍宋書曰通直散騎常侍員四人魏末散騎常侍又有在員外晉武帝使二人與散騎常侍通員直故謂之通直散騎常侍晉江左置四人梁書曰鮑泉嘗乘高幰車從數十左右繖蓋服玩甚精道逢國子祭酒王承承疑非舊貫遣訪之泉從者答曰鮑通直承怪焉復欲辱之遣逼車問鮑通直復是何許人而得如此都下少年遂為口實見尚豪華人相戲曰鮑通直復是何許人而得如此以之為笑謔北齊書曰張景仁除通直散騎常侍及奏御筆點通直字遂為正常侍也隋書曰許善心加通直散騎常侍聘於隋遇高祖伐陳禮成而不獲反命纍表請辭上不許留縶賓館及陳亡高祖遣使告之善心素服號哭於西階之下藉草東向經三日勑書唁焉明日有詔就館拜通直散騎常侍賜衣一襲善心哭盡哀入房改服復出北面立垂涕再拜受詔明日乃朝伏泣於殿下悲不能興上顧左右曰我平陳國唯復此人既能懷其舊君即是我誠臣也勑以本官直門下省賜物千假馬二十匹散騎侍郎魏志曰文帝延康元年置散騎常侍侍郎各四人又曰鍾敏字雅叔年十四為散騎侍郎機捷談笑有父之風魏略曰孟康字公休安平人黃初中以於郭后有外屬并受九親賜拜遂轉為散騎常侍是時散騎皆以高才英儒充其選而康獨緣妃嬙雜在其間故于時皆共輕之號為阿九康既才敏因在冗官博讀書傳後遂有所彈駮其文義雅而切要衆人乃更加意晉陽秋曰荀凱字景倩帝見而奇之曰荀令君子也擢拜散騎侍郎干寶晉紀曰處士馮恢志行過人以為散騎侍郎張華曰臣請觀之若不見臣上也見而有慠世之容次也敬而為賓主者固俗士也及華至恢待之恭於是時人少之唐書曰高祖初平長安拜舞人安叱奴為散騎侍郎既在朝列咸陪遊宴禮部尚書李綱諫曰臣案周禮均工樂胥不得預於士伍雖復才如子野妙等師襄皆終身繼世不易其業故魏武帝欲使禰衡擊鼓先解朝服露體而擊之問其故對曰不敢以先王法服而為伶人之衣也唯齊末高緯封曹妙達為王安馬駒為開府有國家者以為殷監今新定天下開太平之基起義功臣行賞未遍高才碩學猶滯草萊而先令舞胡致位五品鳴玉曳組趍馳廊廟故非創規模貽子孫之道也高祖不納桓氏家傳曰延康元年初置散騎之官皆選親舊文武之才以為賓宴之臣遷桓範為散騎侍郎陶氏職官要録曰案漢初有騎郎常侍有資者得為騎郎資滿五萬為常侍郎張釋之以資為常侍郎蓋此官也華嶠譜敘曰華歆有三子表字偉咎年二十餘為散騎侍郎時同寮諸郎共平尚書事少並厲鋒氣要名譽尚書事至或有不便故遺漏不視及傳書者去即深文論駮唯表不然事有不便輒與尚書共論盡其意主者固執不得巳然後共奏司空陳恭等以此稱之員外散騎侍郎晉起居注曰大興四年詔曰今以前司空從事中郎盧諶為散騎侍郎在員外晉中興書曰符堅青州刺史符朗降烈宗詔曰郎深識逆順望風歸化既嘉此誠亦簡其才可員外散騎侍郎并賜給之宋書曰員外散騎侍郎置無員後魏書曰梁三益字敬安於南陽內附高祖與語善之曰三益三益殊不亞拜員外散騎侍郎通直散騎侍郎晉大興元年起居注曰置通直散騎侍郎四人沈約宋書曰晉元帝使員外散騎侍郎二人與散騎通直故謂之通直散騎侍郎後魏書曰李瑾字道瑜美容貌頗有文才遷通直散騎侍郎與黃門王遵業尚書郎盧觀典修儀注臨淮王式謂瑾等三俊共掌帝儀可謂舅甥之國王盧即瑾之外兄也
