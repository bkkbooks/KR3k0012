body:
  text: 職官部六十四令長禮記檀弓下曰季子皋葬其妻犯人之禾申詳以告曰請庚之申詳子張子也庚償也子皋曰孟氏不以是罪豫朋友不以是棄豫言非故也以吾為邑長於斯也買道而葬後難繼也恃寵虐民非也左傳曰子皮欲使尹何為邑子産曰少未知可否子皮曰使夫往而學焉夫亦愈知矣子産曰不可人之愛人求利之也今吾子愛人則以政猶未能操刀而使割也其傷實多子之愛人求傷之已論語曰子之武城聞絃歌之聲子遊為武城宰夫子莞爾而笑曰割雞焉用牛刀言治小何須用大道子遊對曰昔者偃也聞諸夫子曰君子學道則愛人小人學道則易使也道禮樂也樂以和人人和則易使子曰二三子謂從行者偃之言是也前言戲之耳戲以治小用大道也又曰子夏為莒父宰問政子曰無欲速無見小利欲速則不達見小利則大事不成又曰子遊為武城宰子曰女得人焉耳乎曰有淡臺滅明者行不由徑非公事未嘗至於偃之室也言淡臺滅明公且方也家語曰子路治蒲請見於孔子曰由願受教於夫子子曰蒲其何如對曰邑多壯士又難治也子曰然吾語汝恭與敬可以攝勇寬而正可以懷強愛而恕可以容困言愛而恕者容困窮溫而斷可以抑姦如此而加之以忠潔則政不難矣又曰子路為蒲宰為水備與其民修溝瀆以民之煩勞也人與一單食簞同一壺漿孔子聞之使子貢止之子路不悅曰夫子以仁教而禁行仁由不受也孔子曰爾以為人誠何不白於君發倉廩以給之而私以汝食遺之是爾明君之無惠而見己之德美也汝速已則可不已則汝之見罪必矣晏子春秋曰晏子為阿宰三年而毀聞於國景公不悅召而免之晏子謝曰嬰知過矣請復治阿三年而譽聞於國公將賞之辭而不受公問其故對曰昔者嬰之所以當誅者當賞而今所以當賞者當誅是故不敢受史記曰齊威王即位召即墨大夫語之曰子居即墨毀日至然吾使人視即墨田野闢民人給官無留事東方以寧是子不事吾左右以求譽也封之萬家召阿大夫語曰自子之守阿譽日聞然吾使人視阿田野不闢民人貧苦是子以幣厚吾左右以求譽也乃烹阿大夫左右嘗譽者皆併烹之遂起兵擊諸侯諸侯震懼人人不敢飾非務盡其誠齊國大治漢書曰諸令長皆秦官掌治其縣萬戶已上為令秩一千石至六百石萬戶以下為長秩五百石至三百石皆有丞尉秩四百石至二百石又曰蕭育字次君為茂陵令會課育第六召詣後曹當以職事對育徑出曹書佐隨牽育拔佩刀曰蕭育杜陵男子何詣曹也又曰薛宣子惠始為彭城令宣從臨淮遷至陳留過其縣橋梁郵亭不修宣心知惠不能留彭城數日案行舍中處置什器觀視園菜終不問惠以吏事惠自知治縣不稱宣意遣門下掾送宣至陳留令掾進自從其所問宣不教誡惠吏職之意宣曰吏道以法令為師可問而知能與不能自有資才何可學也衆人以宣言為然東觀漢記曰張歆守平皋長有報父仇賊自出歆召因詣閣曰欲自受其辭既入解械飲食使發遣遂棄官亡命逢赦出由是鄉里服其高義後漢書曰馮魴遷郟令後車駕西征隗囂潁川盜賊群起郟賊延褒等衆三千餘人攻圍縣舍魴率吏士七十許人力戰連日弩矢盡城陷魴乃遁去帝聞其反即馳赴潁川魴詣行在所帝案行鬥處知魴力戰乃嘉之曰此健令也又曰宋翻字飛烏廣平列人也為河陰令順陽公主家奴為劫攝而不送翻將兵圍主宅執主壻馮穆步驅向縣時正炎暑立之日中流汙霑地於是威振京師又曰董宣字少平徵為洛陽令擊搏豪強莫不震栗京師號為臥虎又曰公孫述為清水長父仁以述年少遣門下掾隨之官月餘掾辭歸白仁曰述非待教者也續漢書曰董宣為雒陽令寧平公主乳母子白日殺人因匿主家吏不能得及主出行以奴驂乘宣於大夏門亭候之乃駐車叩馬以刀畫地數主之失者三叱奴下車格殺之主即馳車入宮上大怒召宣令欲死乎宣叩頭曰臣奉法之吏不敢縱法不欲死也上曰捶之宣曰願一言死無恨上曰何言宣曰陛下聖德中興而縱奴殺良民以奴殺臣臣死之後陛下何以治天下捶殺臣不如臣自殺即以頭撑楹流血被面上令小黃門持之曰癡令令叩頭謝主宣不從上曰頓癡令頭兩手據地不肯低頭上勑強項令出太官賜食又曰虞詡為朝歌長故舊皆弔曰得此何衰詡曰難者不避易者不從不遇盤根錯節何以別其利器乎華嶠後漢書曰周規除臨湘令長沙太守程徐二月行縣勑諸縣治道規以方春向農民多劇務不欲奪人良時徐出督郵規即委官而去徐憮然有愧色遣功曹齎印綬檄書謝請還規謂功曹曰穆府君愛馬蹄不重民力徑逝不顧漢制曰列侯所食縣曰國皇太后公主所食曰邑有變夷曰道凡縣萬戶以上為令減萬戶為長漢書胡廣注曰秋冬歲盡各計縣戶口墾田錢穀出入盜賊多少上集簿丞尉以下歲詣郡課校其功功多尤為最者於廷尉勞勉之以勸其後負多尤為殿者於後曹對責以糾怠慢也魏志曰賈逵字梁道河東襄陵人文帝即王位以鄴縣戶數萬在都下多不法乃以逵為鄴令又曰賈逵守綘邑長郭援攻河東所經城邑皆下逵堅守援攻之不拔乃召單于併軍急攻之城將潰綘父老與援要不害逵綘潰援聞逵名欲使將以兵劫之逵不動左右引逵使叩頭逵叱之曰安有國家長吏為賊叩頭援怒將斬之綘吏民聞將殺逵皆乘城呼曰負要殺我賢君寧俱死左右義逵多為請遂得免又曰滿寵字伯寧守高平令縣人張苞為郡督郵貪穢受取干亂吏政寵因其來在傳舍率吏卒出收之詰其所犯即日考竟遂棄官而歸又曰崔林字德儒除塢令貧無車馬單步之官蜀志曰鄧芝字伯苗先主定益州芝為郫邸閭督先主出至郫與語大奇之擢為郫令又曰蔣琬字公琰零陵湘鄉人也弱冠與外弟泉陵劉敏俱知名琬以州書佐隨先主入蜀除廣都長先主嘗因遊觀奄至廣都琬衆事不理時又耽酒先主大怒將加罪戮軍師將軍諸葛亮請曰蔣琬社稷器非百里之才也其為政以安民為本不以修飭為先願主公重加察之先主雅敬亮乃不加罪倉卒免官而已吳志曰賀齊字公苗會稽山陰人也少為郡吏守剡長縣吏期從輕俠為姦齊欲治之主簿諫曰從縣大族山越所附今日治之明日寇至齊聞大怒便立斬從族黨相糾合衆千餘人舉兵攻縣齊率吏民開城門突擊大破之威震山越又曰陶謙除舒令郡太守張盤同郡先輩與謙父友謙恥為之屈嘗舞屬謙謙不為起固強之乃舞舞又不輕盤曰不當轉耶曰不可轉轉則勝人又曰孟仁字恭武江夏人也為吳令時皆不得將家之官每得時物來以寄母常不先食及聞母亡犯禁棄官又曰劉繇字正禮舉孝廉為郎中除下邑長時郡守以貴戚記之遂棄官而去又曰朱然字義封嘗與孫權同書學結恩愛至權統事以為餘姚長時年十九晉書曰車濟字萬度燩煌人也果毅有壯勇為金細令為石季龍將麻秋所陷濟不為秋屈秋必欲降之乃臨之以兵濟辭色不撓曰吾雖才非龐德而受任同之身可殺志不可移乃伏劍而死秋歎其忠節以禮葬之晉中興書曰華談所友袁甫者字公胄歷陽人少能言議與談齊名友善大安中甫入洛詣中領軍何勗自言能治劇縣勗曰君子法應多宜何以唯欲宰民何不為一臺職乎甫曰人各有所能否譬由錦繒中之好而不可以為恰口洽切稻食中之好而不可以為齏是以孔子曰及其使人也器之茍非大才何能悉備久之除松滋令宋書曰陶潛字淵明謂親朋曰聊欲絃歌為三徑之資可乎執事者聞之以為彭澤令公田悉令吏種秫稻妻子固請種粳乃使二頃五十畝種秫五十畝種粳郡遣督郵至縣吏白應束帶見之潛歎曰我不能為五斗米折腰向鄉里小兒即解印綬去賦歸去來又曰張融為封溪令行路經嶂嶮獠賊執融將殺食之融神色不動方作洛生詠賊異之而不害也浮海至交州於海中遇風終無懼色方詠曰乾魚自可還其本鄉內脯復何為者哉齊書曰卞延之弱冠為上虞令有剛氣會稽太守孟凱以令長裁之憤不能容脫幘投地曰我所以屈卿者正為此幘耳今已投之卿以一世勳門而傲天下國士拂衣而去梁書曰蕭眕素為中書侍郎在位少時永為諸暨令到縣十餘日挂衣冠於縣門而去後魏書曰高祖以北平府長史裴聿中書侍郎崔亮並清貧欲以俸祿優之乃以亮帶野王令聿帶溫縣令時人榮之北史曰齊因魏宰縣多用廟監至於士流恥居百里元文遙以縣令為字人之切用之猶恐其披訴揔召集神武門令趙郡王睿宣旨唱名厚加慰諭士人為縣自此始也三國典略曰陳褚玠為中書侍郎陳主以山陰縣多豪猾謂舍人蔡景歷曰稽陰大邑久無良宰卿文士之內試思其人景歷進曰褚玠清廉有幹用陳主曰善乃以為令縣人張次的王休達等與諸猾吏賄賂通姦全丁大戶多有隱沒玠乃鎖次的具狀啓臺陳主手勑慰勞并遣使助玠搜括所出軍人八百餘戶時曹義達為陳主所寵縣人陳信家富於財諂事義達信父顯文恃勢橫暴玠乃遣使執顯文鞭之一百於是吏人股栗莫敢犯者義達於是譖之玠在任守祿俸而已去官之後不堪自致因留縣境種蔬菜以自給或嗤玠以非百里之才玠答曰吾委輸課最不後列城除殘去暴姦吏局蹐若謂不能自潤脂膏則如來命以為不達從政吾未服也韓子曰晉平公問趙武曰中牟吾國之股肱邯鄲之肩髀也寡人欲其良令也令其空誰使而可趙武曰刑伯子可公曰伯子非子之讎對曰私讎不入公門又問中府之令空誰使而可趙武曰臣子可故曰外舉不避仇讎內舉不避子弟又曰宓子賤為單父令見有若有若曰子何瘦焉宓子曰憂官政也又曰晉文公出亡趙衰挈壺飱而從與文公相失飢而道寢餓而不敢食及文公反國舉兵攻原克而拔之文公曰夫輕忍餓餧之患而必全壺餐者是且不以原叛乃舉為原令慎子曰立國君以為國非立國以為君也夫以立官長以為官也非立官以為長也風俗通曰俗説孝明帝時尚書郎河東主喬遷為葉令喬有神每月朔常詣臺朝明帝怪其來數而無車騎密令太史候望言臨至時常有雙鳧從東南來因伏伺見鳧舉羅但得一隻舄使尚方識視四年中所賜尚書官屬履也通典曰縣邑之長曰宰曰尹曰公曰大夫晉謂之大夫魯衛謂之宰楚謂之公
