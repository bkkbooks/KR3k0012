body:
  text: 兵部七十一常釋名曰九旗之名日月為常畫日月於其端天子所建言常名也尚書君牙曰惟乃祖乃父世篤忠貞服勞王家厥有成績紀于太常周禮曰日月為常十二旒河圖曰風后曰豫告汝帝之五旗東方法青龍曰旗南方法赤鳥曰鼠西方法白虎曰典北方法玄蛇曰旗中央法黃龍曰常國語曰吳王會晉於黃池吳王白常白旗赤常赤旗文選曰建辰旒之太常又曰建太常兮裶裶旗釋名曰交龍為旗旗倚也畫作兩龍相依倚也通以一赤色為之無文采諸侯所建也爾雅曰有鈴曰旗郭璞注曰懸鈴竿頭畫交龍於旒詩曰王錫韓侯淑旗綏章龍旗陽陽和鈴央央又曰旗旐央央禮記月令曰天子春載青旗夏載赤旗秋載白旗冬載玄旗周禮曰交龍為九旗諸侯所建左傳曰周分魯大路大旗又曰三辰旗旗昭其明也三辰日月星也旃釋名曰旃戰也戰戰恭己而已三孤所建象無事也說文曰旃曲柄也所以招士衆也世本曰黃帝作旃爾雅曰因章曰旃郭璞曰以白練為疏因其文章不復畫也周禮曰通帛為旃大赤也周正赤無斿飾孤卿所建也左傳曰城濮之戰亡大斾之左旃旃旗名繫旐曰旃祁暪奸命當此之事而不治為好軍令也司馬殺之以殉于諸侯漢書曰田蚡音憤前堂羅鍾鼓立曲旃如淳曰通白為旃蘇林曰柄上曲也孟子曰招庶人以旃田也西京賦曰虹旃霓旄又曰樹修旃上林賦曰立歷天之旗曳梢星之旃物釋名曰雜帛為物以雜色綴其邊為翅尾也將帥之所建也禮含文嘉曰制度為科物應以宜明物以類感其方也左傳曰蒍敖為宰擇楚之令典軍行右轅左追蓐右者俠為軍備左者追草為宿備前茅慮無如今斥候持綘及白幡見騎賊舉綘幡見步賊舉白幡備不虞有無茅明也或以云楚以茅為旌熾也中權後徑中軍制謀後以精兵為殿耳百官象物而動軍政不戒而備能用兵矣旗釋名曰熊虎為旗期也將軍所建象其猛如熊虎與衆期其下也禮記曰龍旗九旒天子之旍也又曰行前朱鳥而後玄武左青龍而右白虎招搖在上急徑其怒注曰以此四獸為軍陳象天也畫招搖星於旌旗上以起居堅徑軍之威怒周禮曰司常掌九旗之物名各有屬以侍國事日月為常交龍為旗通帛為旃雜帛為物熊虎為旗鳥隼為旟龜蛇為旐金羽為禭析羽為旌物名曰所畫異物則異名也又曰龍旗九斿以象大火也交能為旗諸侯所建也大火倉龍宿之心也其屬箕尾九星也鳥旟七斿以象鶉火也鳥隼為旟州里之所建也鶉火朱鳥宿之柳也其屬有七星也熊旗六斿以象參伐熊虎為旗師都之所建也伐屬白虎宿與參連體而六星也龜蛇四斿以象營室也龜蛇為旐縣鄙之所建營室玄武宿也與東壁連體而四星也旒旌枉矢以象弧勤禮曰侯氏載龍旗弧韣則旌旗之屬皆有弧弧以張縿之幅有衣謂之韣又為設矢象弧星有矢象妖星有枉矢枉矢者蛇行有尾田此云枉矢蓋盡之也韣音獨左傳曰袀服振振取虢之旗袀音均又曰三辰旗旗昭其明也注日月星也又曰狄人伐衛衛懿于戰于滎澤衛師敗績滅衛衛侯不去旗是以甚敗又曰越伐吳王孫彌庸見姑篾之旗曰吾父之旗也不可以見讎而勿殺又曰鄭人擊簡子中肩斃于車中獲其蜂旗蜂旗旗名又曰公孫厖以徒五百人宵攻鄭師取蜂旗於子姚之幕下又曰鄭伐許頴考叔取鄭伯之旗蝥狐以先登子都自下射之顛史記曰李斯上書云今陛下建翠鳳之旗樹靈鼉之鼓漢書郊祀志曰武帝將伐南越以班荊畫幡日月北斗登龍以象太一東觀漢記曰耿弇追張步步奔平壽乃肉袒負斧鑕於軍門而弇勒兵入據其城樹下二郡旗鼓令步兵各以部人詣旗下衆向十餘萬輜重七千餘而皆罷歸鄉里沈約宋書輿服志曰五旗者五色各一旗以木牛承其下蓋取負重而安隱也五旗纏竿即禮記德車結旌不畫飾也戎事乃散之又武車綏旌垂舒之也北史曰廬賁嘗事隋文乃受禪命賁清宮因典宿衛賁乃奏改周伐旗幟更為嘉名其青龍騶虞朱雀玄武千秋萬歲之旗皆賁所創也隋書曰凡旗太常畫三辰日月五星旗畫青龍皇帝外龍諸侯交龍旟畫朱鳥旌畫黃麟旗畫白獸旐畫玄武皆加雲氣其旜物在軍亦畫其事號加之以雲氣徽幟亦如通帛為旜雜帛為物在軍亦畫其人官與姓名之事號徽幟亦書之畫其所書之例旌節又畫白獸而折羽於其上又曰司常掌旗物之藏通帛之旗六以供郊丘之祀一曰蒼旗二曰青旗三曰朱旗四曰黃旗五曰白旗六曰玄旗畫繢之旗六以充王路之等一曰三辰之常二曰青龍之旗三曰朱鳥之旟四曰黃麟之旌五曰白獸之旗六曰玄武之旐皆左建旗而右建榻戟榻它臘切又曰有繼旗四以施軍旅一曰麾以供軍將二曰旞以供師帥三曰旐以供旅師四曰斾以供倅長唐書曰元和中淮南節度使馬揔進吳元濟旌旗七百三十九事家語曰子路言志云願得旌旗繽紛下蟠于地詩推度災曰上出號令而化天下震雷起而驚蟄睹旗鼓動三軍駭觀其前動化而天情可見矣戰國策曰建七星之旗天子之位也穆天子傳曰日月之旗七星之文今旒上畫日月及北斗星也周遷車服雜記曰晉元皇始制五牛之旗設青在左黃在中六韜曰武王伐紂懸紂之首於白旗古司馬兵法曰夏后氏玄首人之執也殷曰白天之義也周曰黃地之道也旌首有鈴曰旗三王所以立不失天地人之道也章夏以日月上明也殷以虎上威也周以龍上文也章畫飾也三王畫各有所法也郝萌占曰旗上有光人主大喜延年益壽黃石公三略曰欲知敵形色可勝之符先戰以二十八騎角人青衣赤旗東方七人徵人赤衣黃旗南方七人啇人白衣黑旗西方七人羽人黑衣青旗北方七人凡二十八騎象二十八宿軍令曰聞雷鼓音舉白幢綘旗大小船皆進戰不進者斬聞金音舉青旗船皆止不止者斬王孫子曰桀紂或放南巢或頭懸赤旗斯無它不節財而暴人也孫子曰言不相聞故為鼓鐸視不相見故為旌旗夫金鼓旌旗所以一民之耳目也又曰無要正正之旗無擊堂堂之陳列子曰皇帝與炎帝戰以雕鶡鷹鳶為旗幟隋巢子曰天賜武王黃鳥之旗以代殷淮南子曰凡國有難君自宮召將詔之曰社稷之命在將軍身今國有難願子將而應之將軍受命乃令祝史太卜齊三日之太廟鑽靈龜卜吉日以受鼓旗楚辭曰駕龍輈兮乘雷輈車轅也載雲旗兮逶迤又曰乘回風兮載雲旗又曰楊彗星以為旗又曰乘赤豹兮狐從文狸新夷車兮結旌桂旗宋玉高唐賦曰眄兮若妖姬楊袂鄣日而望所思忽兮若駕駟馬建羽旗相如上林賦曰靡魚須之撓旃以魚須為旃柄驅馳逐戰也曳明月之珠旗以明珠綴飾旃王沉餞行賦曰曳招搖之修旗若蜿虹之垂天崔駰東巡頌曰升九龍之華旗文選曰雲旗拂霓又曰牙紛繽又曰旌旗拂天又曰揭竿為旗又曰曳彗星之飛旗又曰朱旗所拂九土破攘又曰朱旗降天又曰建祝姑祝姑旗名又曰青霞雜桂旗旟釋名曰鳥隼為旟旟譽也軍吏所建也急疾趨事則有稱譽也爾雅曰錯革鳥曰旟郭璞注曰此謂全剝鳥皮毛置之竿頭也舊說刻革鳥置竿首也孫叔敖云革急也言畫急疾之鳥於旒也周官鳥隼為旟也按禮記鄭玄云載之以示衆即此類也書云鳥戰目革詩云如載鳴鳶鳥斯革旌首鳥者自是鳥之皮毛明矣詩曰孑孑干旟在浚之都又曰彼旟旐斯胡不斾斾斾旒垂也周禮曰鳥隼為旟州里所建也州長之屬旐釋名曰龜蛇為旐兆也龜知氣兆之吉凶建之於後察度事宜之形兆也爾雅曰績廣充幅長尋曰旐郭璞注曰帛全幅長八尺者也詩曰設此旐矣又曰建旐設旄薄獸于敖周宣王也周禮曰龜蛇為旐四斿縣鄙之所建也旞釋名曰全羽為旞旞猶也順滑貌也一作襚說文曰旞者導車所載全羽允允而進也周禮曰全羽為誶道車所進車象路也王以朝夕燕出入也旌釋名曰折羽為旌旌精光也綏有虞氏之旌也注旄竿首其形蘂蘂然也綏夏后氏之旌也其形襄也白斾殷旌也以帛繼旐末也翿陶也其貌陶陶下垂也爾雅曰旄首曰旌郭璞注曰戴旌於竿頭如令之幢亦有旄也廣雅曰天子之旌高九仞諸侯七仞大夫五仞士三仞詩曰孑孑干旌在浚之城又曰悠悠斾旌禮記曰前有水則載青旌鄭玄注曰載所謂舉於旌首所以警衆者也鄭記王贊問曰舉旌於首當皆以皮邪畫之也鄭答曰皆俱舉皮置於首不畫羽為旌也周禮曰折羽為旌游車所建游車木路也王以田也全羽折羽皆五色文也又曰掌舍為帷宮設旌門樹旌以表門左傳曰鄢陵之役欒針見子重之旌謂晉侯曰楚人謂夫旌子重之旌也又曰范宣子假羽毛於齊而弗歸折羽為旌王者游車所建齊私有之因謂之羽毛又曰楚靈王之為令尹也為王旌芋尹無字斷之曰一國兩君其誰堪之又曰衛宣公蒸夷姜與朔搆急子公使諸齊使盜待諸莘而殺之壽子載其旌旗以先盜殺之急子後往盜又殺焉又曰許伯曰吾聞致師者御靡旌摩壘而還靡旌驅疾也摩近也公羊曰楚莊王伐鄭鄭伯肉袒左執茅旌右執鸞刀以逆何休曰茅旌宋廟所用也為宋廟所用求以宋廟歸首也史記曰秦併天下以水德之始旌旄節皆尚黑漢書文帝詔曰朝有進善之旌應劭注堯設五達之道令人進善也又曰高祖使韓信與楚戰信潛伏人於楚軍之側方戰兵遂僞走楚軍逐之乃令拔楚旌立漢旌楚師望見奔走遂敗楚矣後漢書曰世祖進師臨河連旌沿河千餘里戰國策曰蘇秦為趙合從於楚威王曰寡人西接秦秦虎狼之國臥不安席食不甘味心搖搖然如懸旌漢武故事曰欒大有方術常於殿前樹旌數百人因令自相擊庭中去地十餘丈觀者大駭孟子曰齊景公招虞人以旌不至將殺之非其招也夫招虞人以皮冠庶人以旃士以旗大夫以旌况以不賢招賢人乎管子曰舜有告善之旌示不蔽也莊子曰楚昭王使延屠羊說以三旌之位萬鍾之祿也抱朴子軍術曰軍始出而旌旗繞竿者急住更待善時而出軍天文要集曰翼星明旌旗用趙氏兵書曰有鳥集將軍旌上將軍增秩祿文選曰蔽引高旌又曰旌旗拂天又曰霓為旌翠為蓋又曰筌撓兮蘭旌筌此緣切撓音饒又曰建虹旍兮威夷
