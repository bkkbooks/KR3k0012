body:
  text: 偏霸部三前趙劉元海晉書載記序曰劉元海以惠帝永典元年據離石稱漢後九年石勒據襄國稱趙張氏先據河西是歲自石勒後三十六年也重華自稱涼王後一年冉閔據鄴稱魏後一年符健據長安稱秦慕容氏先據遼東稱燕是歲自符健後一年也儁始僣號後三十一年後燕慕容垂據鄴後二年西燕慕容冲據阿房是歲也乞伏國仁據枹罕稱秦後一年慕容求據上黨是歲也呂光據姑臧稱涼後十二年慕容德據滑臺稱南燕是歲也禿髮烏孤據廉川稱南涼叚業據張掖稱北涼後三年李玄盛據燉煌稱西涼後一年沮渠蒙遜殺叚業自稱后涼四月譙縱據蜀稱成都王後二年赫連勃勃據朔方稱大夏後二年馮跋殺離班據和龍稱北燕堤封天下十喪其八莫不龍旌帝服建社開祊華夷咸暨人物斯在或篡通都之鄉或擁數州之地雄圖內卷師旅外并窮兵凶於勝負盡人命於鋒鏑其為戰國者一百三十六載抑元海為之禍首云劉淵崔鴻十六國春秋前趙錄曰劉淵字元海新興匈奴人先夏后氏之苗裔曰淳維世居北狄千有餘歲至冒頓襲破東胡西走月氏北服丁零內侵燕岱控弦四十萬漢祖患之使劉敬奉公主以妻之約為兄弟故子孫遂冒姓劉氏建武初入居西河美稷後漢中平單于羌渠使子於扶羅將兵助漢討平黃巾會羌渠為國人所殺扶羅以其眾留漢立為單于屬董卓之亂寇掠太原河東屯於河內扶羅死弟呼廚泉立以於羅子豹為左賢王即元海入朝魏武因留之為分其眾為五部以左賢豹為左部帥其餘帥皆以劉氏為之太康中改置都尉雖分屬五部皆家于晉陽汾澗之賓豹妻呼延氏魏喜平中祈子於龍門有一大白魚頂有二角軒鬐躍鱗而至祭所久之乃去巫覡皆異之曰此嘉祉其夜夢所見魚變為人左手把一物大如雞子光景非常授呼延曰此是日精服之生貴子寤以告豹豹曰吉徵也自是十二月而生淵淵生左手有文曰淵海𨔵以名焉幼而好學不捨晝夜常謂同門生朱紀范隆等曰吾每觀書傳常鄙隨陸之無武絳灌之無文一物之不知固君子恥之也二生遇高皇不能建封侯之業兩公屬太宗不能開庠序之美惜哉於是學武事並皆工絕猨臂善射膂力過人身長八尺四寸鬚長三尺餘當心有赤毫毛三根長三尺六寸太原王渾虛衿友之命子濟拜焉咸熙中為任子在洛陽晉文王深待之時東萊王彌等皆憑結渾言之於晉武帝帝召見與言大悅之後謂王濟曰劉元海容貌風儀機談鑒智雖由余日磾無以加也會父豹卒帝以淵代為左部帥轉寧朔將軍監五部軍事大安中惠帝失政諸王迭相殘廢州郡奸豪所在蜂起從祖北部都尉右賢宣等議曰右賢淵姿器絕人幹宇超世天下恢崇單于終不虛生此人也於是共推淵為大單于淵曰當為崇崗峻阜何能為培螻乎夫帝王豈有常哉大禹生於西戎文王生於東夷顧惟德所授耳今見眾十餘萬皆一當晉十鼓行摧亂晉猶拉枯耳上可成漢高之業下不失為魏氏何呼韓耶足道哉宣等稱善元熙元年遷於左國城晉人東附者數萬宣等上尊號淵曰今晉氏猶在四方未定可仰遵高皇初法且稱漢王權停皇帝之號聽宇宙混一當更議之十月為壇南郊僣漢王位改晉永興元年為元熙元年大赦天下追尊劉禪為孝懷皇帝立三宗五祖之神主而祭之置百官以劉宣為丞相拜授各有差四部之東萊王彌起兵青徐遣使來降拜鎮東大將軍青州刺史東萊郡公四月汲桑叛自稱趙王選置州郡十一月石勒及胡部等帥眾來降永鳳元年秋七月鳳皇集于蒲子丞相劉宣等六十四人上尊號十月僣即皇帝位于南郊大赦改元以衛軍和為大將軍撫軍聰為車騎大將軍建武曜為龍驤大將軍河瑞元年遷都平陽汾水中得玉璽大赦改元二年以大司馬梁王和為皇太子八月淵寢疾以劉洋為太傅延年為太宰司徒聰大司馬大單于並錄尚書置單于平陽西淵薨于光極殿太子和即位聰自西明門攻斬和于西室九月葬淵永陵謚曰光文皇帝廟號高祖劉聰崔鴻十六國春秋前趙錄曰劉聰字玄明一名載淵第四子母張夫人之孕夢日入懷寤而告淵淵曰吉徵也自是十五月而生聰夜有白光之異左耳一白毫長二尺餘幼而聰寤究通經史百家之言孫吳兵勢靡不通之猨臂善射彎弓三百斤膂力驍捷冠絕一時以永嘉四年僣即帝位于光極前殿大赦改年光興元年以衛尉呼延晏為前鋒大都督配禁兵二萬七千自宜陽入洛州命東萊彌龍驤曜鎮軍勒進軍會之比及河南十二敗晉師長驅圍洛陽陷之縱兵大掠幽晉帝于端門煞晉太子及諸百官已下二十餘人洛水北築為京觀遷帝及太后侍中庾珉等于平陽大赦改光興為嘉平元年二月晉帝進號儀同三司會稽郡公聰引帝入讌謂曰卿為豫章王時朕曾與王武子相造武子介朕於卿言聞其名久矣以卿所作樂府歌文示朕謂朕曰聞君善為辭賦試為看之朕時與武子俱為盛德頌卿稱善久之又引朕射于皇堂朕得十二籌卿與武子俱得九籌卿贈朕柘弓銀硯頗憶不帝曰臣敢忘之但恨爾曰不早識龍顏聰曰卿家骨肉相殘何其甚也帝曰此殆非人事皇天之意大漢將應乾受曆故為陛下自相驅除且臣家若能奉武帝之業九族敦睦者陛下何由得之三年正月醼於光極前殿逼晉帝行酒庾珉王雋等起而大哭聰惡之二月丁未懷帝崩于平陽於是誅珉等三月立貴嬪劉氏為皇后四月愍帝即位於長安車騎曜等攻長安河東地震雨于平陽建元元年正月黑霧四塞著人如墨五日而止辛酉庚時日落地三月相承出於西方東行平陽地震崇明觀陷為池水赤如血赤氣至天有赤龍奮迅而去流星起于牽牛入紫微龍形逶迤其光照地落于平陽北十里視之則肉臭聞于平陽長三十步廣二十七步肉旁常有哭聲晝夜不止聰甚惡之癸未劉后產一虵一虎各害人而走尋之不得頃之見在隕肉旁己丑劉氏卒乃失此肉哭聲亦止十一月以晉王粲為國相大單于總百揆十二月宣光陵石人皆行數步宮中鬼哭麟嘉元年武庫陷入地一丈五尺聰自去冬至是遂不復受朝賀軍國之事一決於粲立市於後庭與宮人讌戲或三日不醒七月河東大蝗唯不食粟豆司隸靳准率部民牧而埋之哭聞于十餘里然後鑽土飛出復食黍豆大司馬曜攻陷長安外城九月犬與豕交于宮門有豕著進賢冠昇聰御唑犬冠帶綬與豕並昇俄而鬥死殿上宿衛莫有見其入者長安飢甚死半麴允為粥以供帝膳帝泣曰今窘厄如此外無救援勢不自支乃使侍中宗敞奉牋降曜敞隨使者至帝內祖牽羊輿襯銜壁出降東門曜受璧焚襯遷愍帝及司徒梁汾驃騎麴允等諸臣百餘人至于平陽聰臨光極殿帝稽顙于前麴允伏地大哭扶不能起聰大怒允自殺以帝為光祿大夫懷安侯以大司馬曜假黃鉞大都督陜西諸軍事太宰秦王二年正月東平王約卒十一月聰校獵上林以晉帝行車騎大將軍戎服執戟前導行三驅之禮觀者皆指帝曰此故長安天子聚而觀之故老亦有悲泣者十二月大饗于光極前殿聰欲觀晉臣之意使帝行酒洗爵更衣又使帝執蓋多有涕泣或有失聲者尚書郎辛賓起而抱帝大哭引出斬之戊戍愍帝崩于平陽三年聰所居螽斯則百堂災會稽王康已下二十一子焚焉而卒自此鬼哭宮至於九月夜聲不絕四月尚書令王監崔懿之等極諫聰大怒收監等斬之秋七月鬼哭于光極殿聰晝見東平王約甚惡之徵秦王曜為丞相錄尚書事固辭仍以丞相領雍州收靳准為大司空領司隸校尉癸亥薨于建始殿甲子粲即位大赦改年漢昌葬宣光陵為謚昭武皇帝廟號烈宗八月以丞相曜為相國大都督司空靳准為將軍領尚書事粲荒酗酒色遊讌後庭軍國之事一決於准准𨔵勒兵入宮執粲數而殺之追謚靈帝劉氏無少長男子盡刑于市發掘二陵焚燒宗廟鬼大哭聲聞百里准自號漢大王置百官遣使稱蕃于晉相國曜自長安赴難前趙錄曰麟嘉元年十二月大將軍東平王約卒一指猶煖遂不殯殮至甲戍乃蘇言見淵於不周山經五日遂復從至崑崙山三日而復反於不周見諸王公卿將相死者悉在大有人民宮室甚壯麗號曰蒙珠離國淵謂約曰東北遮須夷國無主久待汝父為之汝後二年當來後國中大亂相殺害吾家死亡略盡俱可永明輩十數人在耳汝伹還後年當來見汝不遟不久約拜辭而歸道過一國曰猗尼渠餘國引約入宮與皮囊一枚曰為吾遺漢皇帝約辭而歸謂約曰劉郎後年來必見過當以女相妻約歸置皮囊於机上俄而蘇謂左右曰机上取囊來左右取得開有一方白玉題文曰猗尼渠餘國天王敬信遮須夷國天王歲在攝提當相見馳使奏呈聰曰若當如此吾不懼死也及聰以戊寅歲薨與此玉并葬焉劉曜崔鴻十六國春秋前趙錄曰劉曜字永明淵之族子少孤見養於淵幼而聰惠性託落高亮與眾不群鐵厚一寸射而洞之身長九尺三寸手垂過膝生而眉白目有赤光鬚不過百餘根皆長五尺光初元年十月太保呼延晏等自平陽來奔上尊號于曜僣即皇帝位十二月靳准左右車騎喬太王騰等殺准奉六璽來降二年夏四月徙都長安立子熙為皇太子六月繕宗廟社稷南北郊于長安令曰蓋王者之興必禘始祖我皇家之先出自夏后居于北夷世跨燕朔光文以漢有天下歲久恩德結於民庶故立漢祖宗之廟以懷民望昭武因循遂未悛革今欲除宗廟改國號御以大單于為太祖其速議以聞於是太保呼延晏等議曰今宜承晉母子傳號以光文本封盧奴中之屬城陛下勳功懋於平洛終於中山中山分野屬大梁趙也宜革稱大趙遵以水行曜從之於是以冒頓配天淵配上帝三年五月西明門內大樹風吹折一宿樹撥撥變為人形髮長一尺鬚眉三寸皆黃色白有歛手之狀亦有兩腳著履之形唯無目鼻每夜有聲十日而生柯條遂為大樹枝葉甚茂四年將於霸陵西南營壽陵侍中喬豫和苞上䟽諫曰伏聞勑旨營陵將周廻四十下深二十五丈以銅為棺槨黃金飾之臣聞堯葬穀林市不改肆顓頊葬廣陽下不及泉聖王之終也如是秦始皇下固三泉周逾七里身亡之後毀不旋踵闇王之終也如此從喪亂已來漢帝諸陵咸見踐辱唯霸陵獨會此雖太宗之達至然抑亦釋之之功興亡奢儉然於前唯陛下覽之曜大悅終南山崩崩所得白玉一尺有字曰皇亡皇亡敗越昌以為己瑞群臣咸賀中書監劉均曰山崩石壞國傾民亂皇亡皇亡敗越昌者此言皇室將為趙所敗趙因之而昌大趙都於秦雍而勒跨全趙趙昌之應當在石勒不在我也曜撫然改容五年曜后羊氏卒故晉惠后也洛陽之陷納之六年正月天裂廣一丈餘長五十丈十一年七月石虎帥眾四萬人寇擾河東進攻蒲攻曜盡中外精銳自潼關北濟虎懼引師而還曜追而敗之枕尸二百餘里虎奔朝歌遂攻石生于金墉分遣諸將攻討汲郡河內十二月勒自帥眾拒之陣于洛西曜性少酗酒末年尤甚將戰飲數斗常乘赤馬無故跼頓乃乘小馬比出復飲斗餘至于西陽門撝陣就平勒將石堪因而乘之師遂大潰曜昏醉奔退馬陷石渠墜于水上為堪所執勒將還襄國喻曜使與太子毗書令速降但勑毗與諸大臣匡維社稷勿以吾易意建平末為勒所殺十二年正月太子毗大司馬南陽王胤等議欲西保秦州遂相率奔上邽石虎乘勝追戰枕尸千里上邽潰虎執毗及王公已下三千餘人皆殺之自劉淵建號西河至是二十有六載晉書載記曰曜在位十年而敗始元海以懷帝永嘉四年僣立至曜三世凡二十有七載以成帝咸和四年滅
