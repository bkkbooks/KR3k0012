body:
  text: 地部五王屋山列子曰太行王屋二山方七里高萬仞北山愚公者年且九十面山而居徵山北之寒出入之迂也聚室而謀曰吾與汝畢力平險可乎雜然相許雜猶僉也其妻曰以君之力曾不能損魁父之丘如太行王屋何且焉置土石雜曰投諸渤海之尾隱士之北遂率子孫荷簷者三夫叩石墾壤運於渤海之尾鄰人京城之孀妻有遺男始齓往助之寒暑易節始一反焉河曲智叟笑而止之曰甚矣汝之不慧以殘年餘力曾不能毀山之一毛其如土石何北山愚公長息曰汝之心曾不若孀妻弱子雖我之死有子存焉子又生孫孫又生子子子孫孫無窮匱也而山不加增何苦而不可乎河曲智叟無以應操蛇之神聞之懼其不已告之於帝帝感其誠命夸蛾氏二子負二山一厝朔東一厝雍南神仙傳曰甘始太原人善行氣不食服天門冬治病不用針艾在人間三百歲乃入王屋山茅君內傳曰王屋山之洞周回萬里名曰小有清虛之天太素真人王君內傳曰王屋山有小天號曰小有天周回一萬里三十六洞天之第一焉太行山史記曰酈生説漢高祖曰願足下急復進兵收取滎陽據敖倉之粟塞成皋之險杜太行之道距飛狐之口守白馬之津以示諸侯神仙傳曰王烈邯鄲人服黃菁鉛華老而更少嵇叔夜甚愛之與共入山遊戲烈後獨入太行山忽聞山東北如雷聲往視山上破數百丈石中有一孔徑尺中有青泥出烈取摶之隨手堅凝氣味如粳米飯也烈自食數丸因掘歸以與叔夜即皆成青石打之作銅聲案神山五百歲一開其中有石髓得而服之壽與天地相畢述征記曰登滑臺城西南望太行山白鹿巖王莽嶺冠于衆山之表墨子曰墨子怒耕桂子曰我無愈於子墨子曰將上太行駕驥與羊子將誰驅曰將驅驥以驥足責也墨子曰我亦以子為足責尸子曰龍門魚之難也太行牛之難也以德報怨人之難也水經注曰仲尼傷道不行欲北從趙鞅聞殺鳴犢遂旋車而反其後晉人思之於太行嶺南為之立廟蓋往時回轅處也余案諸子書及史籍之文並言仲尼臨河而歎曰丘之不濟命也夫如是非太行回轅之言也博物志曰按太行山而北去亦不知山所限極處亦如東海不知所窮霍太山史記曰智伯攻趙襄子襄子懼乃奔保晉陽原過後至於王澤見三人自帶以上可見自帶以下不可見與原過竹二節莫通曰為我以是遺趙無恤原過既至以告襄子襄子齋三日親自剖竹有朱書曰趙無恤余霍太山徐廣曰在河東永安縣山陽侯天使也三月丙戍余將使汝反滅智氏亦立我百邑余將賜汝林胡之地滅智使原過主霍太山祠祀又曰飛廉先為紂作石槨徐廣曰作石椁於此方還無所報乃為壇於霍太山而報得石棺銘曰帝令處父不與殷亂賜汝石棺水經注曰霍太山上有飛廉冢山上有嶽廟廟甚靈鳥雀不棲其林猛虎常守其庭此則禹貢嶽陽也唐書曰義旗初建高祖自太原起兵西赴闕中途經霍邑時隨將宋老生陳兵拒險義師不得進乃屯於賈胡堡會霖雨積旬餽運不給高祖患之忽有白衣老人詣軍門請見余霍山神也遣語大唐皇帝若向霍山東南傍山取路八日雨止我當助爾破之高祖初哂之遣人東南視果有微道高祖笑曰此神不欺趙襄子豈當負吾邪及八月己卯雨果霽高祖大悅以太牢祭其山首陽山詩曰采苓采苓首陽之巔采苦采苦首陽之下采葑采葑首陽之東史記曰伯夷叔齊孤竹君之子讓國而逃聞西伯善養老往歸焉及至西伯卒武王載木主東伐紂伯夷叔齊扣馬諫左右欲兵之太公曰此義人也而伯夷叔齊恥之義不食周粟隱於首陽山采薇而食之乃至餓死鎖語曰晉平公與齊景公乘至于澮見人乘白驂八駟以來平公之前公問師曠曰有犬狸身而狐尾者乎師曠有頃而答曰有之其名曰首陽之神飲酒霍太山而歸其居於會乎見之甚善君有喜焉戴延之西征記曰洛東北去首陽山二十里山上有伯夷叔齊祠或云餓死此山今河東蒱坂南又謂首陽亦有夷齊祠未詳餓死所在山海經曰和山上無草木而多瑤碧實惟河之九都是山也五曲九水出焉合流而北注于河其中多蒼王吉神泰逢司之是神好居於萯山之陽出入有光呂氏春秋曰夏后氏孔甲田于東陽萯山遇大風雨皇甫謐帝王世紀以為即東首陽山也蓋是山之殊目矣龍門山書禹貢曰浮于積至于龍門西河孔安國曰龍門在河東之西界也周禮曰大司樂以陰竹之管龍門之琴瑟陰竹生北於宗廟奏之九變則人鬼可得而禮孝經援神契曰禹鑿龍門闢伊闕決江開岷導四瀆鑿龍門以通河鑿岷山以開江導淮於桐柏導濟於王王屋故言導四瀆漢書地理志龍門山在馮翊夏陽縣北續漢書同辛氏三秦記曰河津一名龍門巨靈迹猶在去長安九百里江海大魚洎集門下數千不得上土則為龍故云曝鰓龍門尸子曰古者龍門未鑿呂梁未闢河出於孟門上慎子曰河之下龍門其流駛如竹箭駟馬追弗能及淮南子曰龍門未闢呂梁未鑿河出孟門之大溢逆流無有丘陵高阜名曰洪水大禹通之孟門水經注云風山四十里河水南出孟門與龍門相對即龍門之上口也實為河之巨厄兼孟門津之名也又有黃河自風山西四十里南出孟門山此經禹鑿廣岸崇深傾崖及桿巨石臨危若墜復倚焉岐山易曰王用亨于歧山吉無咎詩曰古公亶父來朝走馬率西水滸至于岐下又曰居岐之陽在渭之將萬邦之方下民之王孟子曰大王居邠狄人侵之事之以皮幣不得免焉事之以珠玉不得免焉乃屬其耆老而告之曰狄人之所欲者吾土地也君子不以其所養人者害人二三子何患乎無君我將去之去邠踰梁邑於岐山而下居焉圖經曰岐山亦名天柱山禹貢曰導汧及岐河圖括地象云歧山在崑崙山東南為地乳上多白金周之興也鸑鷟鳴於歧山時人亦謂歧山為鳳皇堆酈元注水經云天柱山上有鳳皇祠或云其峰高峻逈出諸山狀若柱因為名焉梁山書曰壺口治梁及岐壺口在冀州梁在雍州循山治水在西詩曰奕奕梁山維禹甸之奕奕大貌甸治也禹治梁山除水災也傳曰梁山崩晉侯召伯宗伯宗辟重重人曰待我不如捷之速也問其所曰綘人也問綘事曰梁山崩將召伯宗謀之問將若之何曰山有杇壤而崩可若何國主山川山崩川竭國君為之不舉降服乘縵徹樂出次祝幣史辭以禮焉其如此而已雖伯宗若之何穀梁傳曰梁山崩壅河三日不流晉君召伯宗而問之伯宗來遇輦者輦者不避使車右下而鞭之輦者曰所以鞭我者其取道遠矣伯宗下車而問焉曰子有聞乎對曰梁山崩壅遏河三日不流伯宗曰君此召我也為之奈何崩之天有河天壅之雖召伯宗如之何爾雅曰梁山晉望也郭璞注曰晉國所望祭者也今在馮下陽西北臨河上也漢志注曰梁山有夏陽西北即尚書禹貢治梁及岐詩韓奕篇曰奕奕梁山晉國所望大梁別小梁之號俱在韓城縣界大梁山在今縣西又按三秦記梁山宮城又石名織錦城太白山辛氏三秦記曰太白山在武功縣南去長安三百里不知高幾許俗云武功太白去天三百尺山下軍行不得鳴鼓角鳴鼓角則疾風暴雨兼至也周地圖記曰太白山甚高上恆積雪無草木半山有橫雲如瀑布則澍雨人常以為候驗之如離畢焉故語曰南山瀑布非朝即暮魏略曰吉茂蘇則值亂隱於扶風南太白山中以經籍自娛娥眉山列仙傳曰陸通楚狂接輿也好養性在蜀峨眉山世世見之數百年華陽國志曰犍為南安縣南有娥眉山去縣八十里地圖云有仙藥漢武求不能得益州記曰峨眉山在南安縣界當縣南八十里兩山首相望如娥眉岷山易乾鑿度曰岷山上為井絡書曰岷山導江東別為沱江東南流沱東行也書琁璣鈐曰禹導積水決岷山流九貢九貢九州之貢家語曰江始出岷山其源可以濫觴及至于江津不方舟則不可以涉漢書曰成帝時岷山崩壅江水江水逆流山海經曰岷山江水出焉今在汶山郡廣陽縣西大江所出也其上多金玉其下多梅多棠其獸多犀象多夔牛嶓冢山書曰嶓冢導漾東流為漢華陽國志曰西岷嶓地稱天府河圖括地象曰嶓冢山上為狼星山上有異草花名骨容食之無子鳥鼠山河圖括地象曰鳥鼠同穴山地之幹也上為掩畢星渭水出其中漢武內傳曰封君達隴西人也初服黃蓮五十餘年入鳥鼠山於山中服水百餘年還鄉里年如三十常乘青牛號青牛道士也山海經曰鳥鼠同穴山今在隴西首陽縣西南山有鳥鼠同穴鳥名鵌鼠名鼵鼵如家鼠而短尾鵌如鵽而黃穿地入數尺鼠在內鳥在外而共處孔安國傳鳥鼠共為雌雄沙州記曰鳥鼠同穴山鳥如家雀色小白鼠小黃而無尾凡同穴地皆肥沷壤盡軟熟如人耕多生黃花紫草積石山書曰浮于積石至千龍門西河穆天子傳曰西濟于河用申八駿之乘以飲于枝詩之中積石之南河水岐成曰詩詩諸也山海經曰積石山其下有石門河水冒以西冒覆也積石在金地河關縣西南羌中河行塞外東入塞也是山也萬物無不有莊子曰鳳之所居也積石千里河水出下鳳鳥居止
