body:
  text: 工藝部三射下呂氏春秋曰射扚者欲其中小也射獸者欲其中大也物固不必可推又曰荊廷嘗有白猿荊之善射者莫之能中荊王請養由基射之養由基矯弓操矢而往發之則猿應矢而下白虎通曰天子所以親射何助陽氣達萬物也春陽氣微弱恐物有窒塞不能自達者天子射熊何示服猛遠巧佞也熊為獸猛巧者也非但當服猛巧者示當服天下巧佞之臣也諸侯射麋何示遠迷惑人者也麋之言迷也大夫射虎豹何示服猛也士射鹿豕何示除害也各取德而能服也大夫士射兩物何大夫士俱人臣陰數偶也侯者以布為之何布者用人事之始也本正則末正矣名之為侯者何明諸侯有不朝者則當射之君子重同類不忍射之故畫獸射之射主何為乎曰射義非一也夫射者執弓堅固心平體正然後中也二人爭勝樂以養德也勝負俱降以崇禮讓故可以選士夫勝者發近而制遠選士所以助微抑強調和陰陽戒不虞也天子射百二十步諸侯九十步大夫七十步士五十步明尊者所服遠卑者所服近也列女傳曰晉平公使工為弓三年乃成射不穿一札公怒將殺工其妻見公曰妾之夫造此弓亦以勞矣而不穿一札是君不能射也妾聞射之道左手如矩右手如附枝右手放發左手不知公以其言為儀儀法而穿七札弓工立得出賜金三鎰英雄記曰袁術遣將紀靈率步騎三萬攻劉備呂布遣人招備并請靈等饗飲謂靈曰布性不喜合鬭但喜解鬭耳乃令植戟於營門彎弓曰諸君觀布射戟小支中者當解兵不中留決鬭布一發中戟支遂罷兵西京雜記曰茂陵人周楊本琅耶人善馴野雞以為媒用以射雉每三春之月茅障自翳用鮭古迷切矢以射之日連百數茂陵輕薄者化之皆以雜寶錯廁翳障輕騎妖服追隨於道路以為歡娛楊死其子亦善其事董司馬賢也好之以為上客典論曰文帝自敘曰少好弓馬逐禽輒十里射常出百步後獩貊貢良弓燕代獻名馬於鄴西獵終日獲麞鹿九雉兔二十後尚書令荀彧問余曰聞君善左右射此實難能余曰執事未覩凡埒有常徑的有定所雖矢發輒中非妙也若夫馳平原赴豐草逐狡獸截輕禽使弓不虛彎矢不虛發此乃妙耳山海經曰軒轅國在窮山之際不敢西射畏軒轅之丘故也言敬畏黃帝威靈故不敢向之射也論衡曰養由基見寢石以為虎射之飲羽案精誠所感不過入一寸耳今勇夫卒見寢石以手推之能令石有跡乎射經曰夫射者所以觀德也不能則辭之以疾懸孤之義在焉故曰和容為上主皮為次并之者又何加矣乃君子之所爭也雖欲勿用禮其捨諸乎王昶戲論曰禮記有投壺之宴論語稱博奕之賢茲三戲者君子末事不足為也樗蒲彈碁既不益人又國有禁皆不得為也吾見坐圍碁而死近事非遠昔晉侯以投壺喪宋公好博奕亡豈不哀哉諸戲中唯有射者男子之事在於六藝若欲戲唯得射而已其餘不得為也曹植樂府歌曰控弦破左的發矢摧月支仰手接飛猱俯身散馬蹄又曰鬭雞東郊道走馬長楸間驅馳未能半雙兔過我前攬弓挾鳴鏑長驅上南山左挽因右發一縱兩禽連餘巧未盡展仰手接飛鳶觀者咸稱善衆工歸我妍御書曰若朽索之御六馬禮曰君將駕則僕執策立於馬前監駕且為馬行已駕僕展軨展軨具視效駕自已駕矣奮衣由右上取二綏奮振去塵也二副也跪乘未敢立散也執策分轡驅之五步而立調成之也君出就車則僕并轡授綏車上僕所主也左右攘辟謂群臣陪位侍駕者也攘卻也或音攘古讓乎也車騎而騶至于大門君撫僕之手而顧命車右就車門閭溝渠必步車右勇力之士備制非常者君行則陪乘君式則下步行也凡僕人之禮必授人綏若僕者降等則撫僕之手不然則自下拘之撫小止之議也自下取之也僕與己下拘之由僕手同爵則不受又曰魯莊公及宋人戰于乘丘懸奔父御卜國為右馬驚敗績公墜左車授綏公曰未之卜也懸奔父曰他日不敗績而今敗績是無勇也遂死之圉人浴馬有流矢在白肉公曰非其罪也遂誄之周禮曰教國子以五馭一曰鳴和鑾二曰逐水曲三曰過表四曰舞交衢五曰遂禽在論語曰子謂門弟子曰吾何執執御乎執射乎吾執御矣大戴禮曰善御馬者正御勒齊轡策均馬力和馬心家語曰閔子騫為費宰問政於孔子孔子曰以德以法夫德法者御民之具猶御馬之有銜勒也君子人也吏者轡也刑者策也人君之政執其轡策而已矣又曰子貢問治人於孔子孔子曰懍焉如與腐索御汗馬懍懼也汗突之馬也國語曰鐵之戰簡子曰鄭人擊我吾伏韜他刀切韜弓文流血鼓音不衰今日之事莫我若也衛莊公為右衛莊公奔晉趙簡子將納之為右也曰吾九登九下擊人盡殪今日之事莫我加也郵無正御曰吾兩鞅將絶吾能止之郵無正大夫王良也鞅引也今日之事我止之次也駕而乘材材橫也兩鞅皆絶史記曰周穆王乘驊騮騄耳使造父為御日行千里往見西王母莊子曰東野稷以御見莊公進退中繩周旋中規莊公為造父弗過也顏闔遇之入見曰稷之馬將敗公密而不應少焉果敗而反公曰子何以知之曰其馬力竭矣而猶求焉故曰敗列子曰造父師曰秦豆氏造父之始從習御也執禮甚卑秦豆氏三年不告造父執禮愈謹乃告之曰古語曰良弓之子必先為箕良冶之子必先為裘汝先觀吾趨趨如吾然後六轡可持六馬可御造父曰唯命所從秦豆氏乃立木為塗僅可容足計步而置之履之而行趨走往還無缺失也造父學之三日盡其巧秦豆歎曰子何敏也得之捷乎御者亦如此也曩汝行之於足應之於心推於御也齊揖乎轡銜之際急緩乎脣吻之和正度乎胸臆之中節節乎掌握之間內得於中心外合於馬志是故能進退履繩而旋曲中規取道致遠而氣力有餘誠得其術矣得之於銜應之於轡得之於轡應之於手得之於手應之於心則不以目視不以策驅心間體正六轡不亂二十四蹄所投無差回旋進退莫不中節然後車輪之外可使無餘轍馬蹄之外可使無餘地未嘗覺山谷之嶮原隰之夷視之一也吾術窮矣汝其識之管子曰造父善御者也善視其馬節其飲食量其馬力故能取遠道而馬不罷音疲明主猶造父也善治其民度量其力也孟子曰昔者趙簡子使王良與嬖奚乘終日而不獲一禽嬖奚反命曰天下之賤工也或以告王良良曰請復之強而後可一朝而獲十嬖奚反命曰天下之良工也韓子曰鉛陵卓子乘蒼龍桃文乘鉤錦在前錯錣丁括切在後馬欲進則鉤錦之欲退則錯錣貫之馬因旁出造父過之而為之泣孫卿子曰定公問於顏闔曰東野畢之御善乎對曰善則善矣然甚將為佚定公不說入謂左右曰君子固誣人乎三日而牧來謂之曰東野畢之馬佚兩驂引兩服入廄定公越席而起召顏闔曰子言東野畢其馬將佚不識何以知之對曰臣以政知之昔者舜巧於使民而造父巧於使馬舜不窮其民造父不窮其馬是以舜無佚民造父無佚馬今野畢之御上車執轡御體正矣步驟馳騁朝禮畢矣歷險致遠其力盡矣然而求馬不已是以知之公曰善哉尸子曰夫馬者良工御之則和馴端正致遠道矣僕人御之則遲奔毀車矣民者譬之馬也堯舜御之則天下端正桀紂御之則天下奔於歷山淮南子曰急轡數策者非千里之御也又曰御者非轡不行學御者不為轡也又曰舟覆乃見善游馬奔乃見良御善游故覆舟不溺良御故馬奔車不敗故見之又曰夫載重而馬羸雖造父不能以追急車輕而馬良雖中工可以致遠又曰良馬不待策錣丁刮切策端有鐵也而行駑馬雖兩錣之不能進為此不用策錣而御則愚矣又曰若夫鉗且大丙之御也鉗且大丙太一之御除轡銜棄箠策車莫動而自舉馬莫使而自走星耀而玄運電奔而鬼駭進退詘伸不見塍餘菱反四毀又曰尹需學御三年而無得焉常寢想之寢堅思之中夜夢受秋駕於師秋駕善御之術明日往朝師望而謂之曰吾非愛道於子也恐子不可豫也今日將教子以秋駕尹需反走北面再拜曰臣有天幸今夕固夢受之又曰夫馬之為草駒之時跳躍揚蹄翹尾而走人不能制馬五尺以下為駒放在草中故曰為草駒之時翹舉也制禁也之及至圉人擾之良御教之圉養馬官擾順也掩以衝扼連以轡御則雖歷險趨塹弗敢違戾故其形之為馬其可駕御教之所為也又曰夫御者馬體調乎車御心和乎馬則雖歷險至遠進退周旋無不如意雖有騏驥騄耳之良而使烏獲御之則馬反自恣恣卻行也而人不御也
