body:
  text: 居處部七闕崔豹古今注曰闕觀也於前所以標表宮門也其上可居登之可遠觀人臣將朝至此則思其所闕故謂之闕其上皆畫雲氣仙靈奇禽怪獸以示四方蒼龍白虎玄武朱雀並畫其形釋名曰觀於上觀望也廣志曰闕缺也門兩邊缺然為道也周禮太宰以正月懸治法於象魏禮記曰昔者仲尼與於蠟賓事畢遊于觀之上喟然而嘆仲尼之歎蓋歎魯也鄭玄云觀闕也左傳曰哀公三年司鐸火踰公宮季桓子至命藏象魏曰舊章不可忘也象魏闕也法令懸之故謂其書為象魏又曰哀十七年傳云衛侯夢于北宮見人登昆吾之觀注云衛有觀在古昆吾氏之墟也今濮陽城公羊昭二十五年傳云子家駒曰諸侯僣於天子大夫僣於諸侯久矣昭公曰吾何僣矣哉子家駒曰設兩觀乘大輅注云禮天子諸侯內闕一觀也又定二年傳云夏五月壬辰雉門及兩觀災兩觀微也然則曷為不言雉門災及兩觀主災者兩觀也漢書曰牂牁郡有桂浦闕又曰蓬萊方文瀛洲此三山在海中諸仙人不死藥皆在焉黃金白銀為闕事具仙部又曰建章宮東鳳闕高二十丈列女傳曰衛靈公與夫人夜坐聞有車聲至闕而息過又聞車聲夫人曰此必是蘧伯玉公曰何以知之曰妾聞禮下公門軾路馬今蘧伯玉賢者也必不以暗昧廢禮公令人視之果如所言神異經曰東南有石井其方百丈上有二石闕俠東南面上有蹲熊有榜著闕題曰地戶西北荒中有金闕高百丈上有明月珠徑三丈光照千里中有金階西北入兩闕中名天門十洲記曰崑崙山有水精闕水經曰秦孝公築冀闕臨渭水在咸陽西四十里闕中記曰未央宮東有青龍闕北有玄武闕漢書所謂北闕者也建章宮圓闕臨北道鳳在上故號曰鳳闕也閶闔門內東出有折風闕一名別風瀨鄉記曰老子廟前有兩石闕大闕高九尺八寸下三重石鹿闕邊各有子闕山謙之丹陽記曰大興中議者皆言漢司徙許彧墓闕可從施之王茂弘弗欲後陪乘出宣陽門南望牛頭山兩峰曰天闕也豈煩改作帝然之鄧德明南康記曰南康縣歸美山去縣七百里下有石城高數丈遠望嵯峨靈闕騰空故老謂之神闕莊子中山公子牟謂瞻子曰身在滄海之上心居魏闕之下祭何瞻子曰重生重生則輕利中山公子曰雖知之未能自勝也瞻子曰不能自勝則從神無惡乎不能自勝而強不從者此之謂重陽重陽人無壽類矣魏文帝歌曰長安城西有雙員闕上有雙銅雀一鳴五穀生載鳴五谷熟王子年拾遺記曰崑崙第九層山形漸狹小下有芝田蕙囿皆有數百頃群仙種耨焉傍有瑤臺十二名廣千步皆五色玉為臺基最下層有流精闕直上四十丈有風雲雨師闕觀漢書成紀云孝成帝元太子也母曰王皇后帝在太子家生甲觀畫堂應劭注云甲觀在太子宮甲地主用乳生也顏師古曰畫堂但畫飾室中宮殿通有綵畫也又曰甘露二年幸萯陽宮在鄠屬玉觀屬玉水鳥似鵁鶄以名觀也後漢書曰丁鴻字孝公肅宗詔鴻與廣平王羡及諸儒樓望成封桓郁賈逵等論定五經同異於北宮白虎觀廣平王羡明帝子東觀記曰與太常樓望少府成封屯騎校尉桓郁衛士令賈逵等集義白虎門名於門立觀因以名焉使五官中郎將魏應主承制問難侍中淳于恭奏上帝親制臨決鴻以才論最明儒者稱之帝數嗟美焉時人歎曰殿中無雙丁孝公又章帝紀曰永平元年長水校尉倏奏言先帝大業當以時施行欲使諸儒共正經義頗令學者得以自助於是下太常將軍大夫博士議郎郎官及諸王諸儒會白虎觀講議五經同異又曰時謂東觀為老氏藏室注老子為柱下史四方所記文書皆歸于柱下言東觀多經籍又曰高彪除郎中校書東觀後遷外黃令畫彪形像以勸學者又曰靈帝起四百尺觀於河帝道造萬金堂於西園又造南宮玉堂築廣城苑魏志曰明帝作凌霄觀始構有鵠巢其上侍中高堂隆曰起闕而鵠巢不得居之象又曰明帝置崇文觀徵善屬文者以充之吳志孫和傳云和為太子被廢驃騎將軍朱據尚書僕射屈晃率諸將吏泥首自縛連日詣闕請和權登白爵觀見甚惡之蜀志云李輔字玄政為牙門討破羌虜築平羌觀于秦亭晉書元紀曰太興元年十一月乙卯日夜出高三丈中有赤青珥詔曰天災譴誡所以彰朕之不德也群公卿士各上封事具陳得失無所諱將親覽焉新作聽訟觀又劉曜載記曰曜立太學於長樂宮東簡百姓年二十五已下十三已上五百人選朝賢宿儒明經篤學以教之命起酆明觀西宮建凌霄臺於滈池又曰石李龍載記云太子宣出時季龍於其後宮升凌霄觀望之笑曰我家父子如是自非天崩地陷當復何愁但抱子弄孫日為樂耳又張駿傳云駿境內漸平使其將楊宣帥衆越流沙伐龜茲鄯善於是西域並降鄯善王元孟獻女號曰美人立賓遐觀以處之齊書王儉傳云宋明帝太始六年置總明觀以集學士或謂之東觀置東觀祭酒一人總明訪舉二人儒玄史四科科置學士十人其餘吏下各有差是歲省總明觀於儉宅開學士館以總明簿書充之陳書後主紀云帝令采木湘州擬造正寢筏至牛渚機盡沒既而漁人見筏於海上復起齊雲觀國人歌曰齊雲觀寇來無際畔後魏書高祖紀下云十五年五月議改律令於東明觀親折疑獄又道武帝紀云天興三年起紫極殿玄武樓風涼觀石池鹿苑臺又胸奴劉聰傳云平陽地震崇明觀陷為池水赤如血赤氣至天赤龍奮迅而去輿地志云丹陽郡建康縣臺城齊文惠太子治玄圃有明月觀婉轉橋俳徊廊囿內作淨名精舍又曰丹陽郡枺陵縣新亭隴有遠望樓又名勞勞樓末改為臨滄觀行人分別之所又曰洛陽有廣望觀閬風觀萬世觀修靈觀臨啇觀百葉抄魏築總章觀建翔鳳於其上使八方才人六宮女尚書居之引穀水過九龍殿前玉井綺欄水轉百戲又曰石虎起靈臺九殿女官十有八等又女妓一千為鹵簿皆著紫綸巾熟錦袴金銀鏤帶五文織成靴遊於戲馬觀漢封禪儀泰山東南有山名日觀雞一鳴時見日始出長三丈秦觀者望見長安吳觀者望見會稽周觀者望見齊三輔黃圖云漢武帝起鳷鵲觀又起神明觀馺娑觀甘泉苑起仙人觀緣山谷行至雲陽三百八十里入右扶風周回五百四十里又曰武帝起鳷鵲觀神明觀弩法觀集靈觀仙門觀陽祿觀漢宮殿名曰長安有臨山觀渭橋觀仙人觀霸昌觀蘭池觀平樂觀九華觀豫章觀鴻雀觀昆明觀走馬觀華光觀封巒觀走狗觀天梯觀瑤臺觀流渠觀相思觀長平觀宜春觀華池觀射熊觀迎風觀露寒觀當市觀石闕觀白渠觀鼎郊觀潘丘山闕中記云鼎郊觀在上林苑白虎觀懷德觀三雀觀林木觀溫德觀長平觀華延雋洛陽記曰洛陽城十八觀皆施玄檻鐵籠疏雲母愰華山記曰南嶺東巖北面有二小山一山有雙石豎立號曰石門一山孤崖特秀上有客觀陟之者遠眺千里阮勝之楊州記云楊子縣有楊子宮宮中有玄珠觀華陽國志云蜀城有逸客觀華延攜乃洛中記云金墉城西南角有昌都觀東北有百尺樓魏都水使者陳熙造建康宮闕簿云啇飆觀在東北十三里籬門亭後亭墩上齊武帝築九日登以晏群臣又曰曾城觀在縣東北七里景雲樓東齊武帝起七月日夜令宮人登以穿針因曰穿針樓又曰通天觀在縣東北五里一百步舊臺城內宋元喜中築蔬圃二十三年更修廣之築池汨天泉造景陽樓大壯觀花光殿設射堋又立鳳光殿醴泉堂又曰洛陽宮中有玄覽觀東汜觀清覽觀高平觀廣望觀聽松觀見親觀高樂觀陵雲總章宣曲萬年等觀又云建業宮有迎風觀在縣南十五里宋武大明中起於石子墩上孫峻殺諸葛恪殷綝殺朱主皆於此又有徼道觀晉潘嶽關中記曰柘觀虎圈觀昆池觀上䕡觀朗池觀走馬觀湯祿觀溥主觀則陽觀陰德觀並在上林苑中陸機洛陽地記曰洛陽南宮有承風觀洛陽北宮有增喜觀洛陽城外有宣楊觀千秋鴻池泉城楊威石樓等觀又曰洛陽城外有鼎中觀輿地志云洛陽西南洛水上有鼎中觀是成王定鼎處唐韋述東京雜記曰東京紫微宮有一柱觀又曰上陽宮有上清觀潘安仁西征賦云圖萬載而不傾奄摧落於十紀擢百尋之曾觀兮今數仞之餘趾左太冲吳都賦云慮紫宮以營室廓廣庭之漫漫寒暑隔闊於邃宇虹霓回帶於雲觀何平叔景福殿賦云於是碣以高昌崇觀表以建城峻廬岧嶢岑立崔嵬巒居宋玉高唐賦序云昔者楚襄王與宋玉遊於雲夢之臺望高唐之觀魏陳思王七啓曰間宮顯敞雲屋皓𤽂崇景山之高基迎清風而立觀沈休文鍾山詩應西陽王教云即事既多美臨眺殊復奇南瞻儲胥觀西望昆明池沈休文遊沈道士館詩云既表祈年觀復立望仙宮謝玄暉觀朝兩詩云朔風吹飛雨蕭條江上來既灑百常觀復集九成臺
