body:
  text: 人事部二十二美婦人下莊子曰西施毛嬙人之所美也魚見之深入鳥見之高飛尹文子曰齊有黃公者好謙卑有二女皆國色常謙辭毀之以為醜惡醜惡之名遠布年過而一國無敢聘者衛有鰥夫失時冒娶之果國色闞子曰西施自窺於井不恃其美猶佐湯沐堯舜自窺於世不恃其賢猶須才德況中庸而距諫嫫母自窺於井以為媚於西施桀紂自窺於世以為賢於堯舜韓子曰魏王遺楚王美女王甚悅之慎子曰毛嬙西施天下之至姣也衣以皮褐則見者皆走易以玄錫則行者皆止淮南子曰曼顏皓齒形姱骨佳不待脂粉芳澤而美者西施陽文也許慎注曰陽文楚好女也又曰蔡之幼女衛之稚質纂組奇綵抑黑質楊赤文纂組織紀也如今之綬也沒黑見赤其工也湯禹之智不能逮也言不能及二國女之行也神仙傳曰介象字元則會稽人入山求仙見谷上有石皆紫色如雞子象取二枚見一美人被五綵象向之叩頭乞長生女曰汝急送手中物還著故處汝未應取此象乃送石還女授丹方一首穆天子傳曰赤烏之人獻二女于天子女聰女列赤烏氏美人之地也劉向列傳曰蕭史者秦穆公時人善吹簫能致孔雀白鶴穆公女弄玉好之公以妻焉一朝隨鳳飛去漢武內傳曰西王母乘紫雲之輦履玄瓊之舄下輦上殿呼帝共坐命侍女許飛瓊鼓雲和之簧續列女傳曰曹節弟破石為越騎校尉越騎營伍伯妻有美色破石從求之伍伯不敢違妻執意不肯行遂自殺襄陽耆舊記曰楚襄王遊雲夢望朝雲之餘上有雲氣宋王曰昔先王遊高唐怠而晝寢夢一婦人曖乎若雲皎乎若星將行未至如浮如傾對曰我帝季女名曰瑤姬未行而喪封乎巫山之臺精魂為草實為靈芝西京雜記曰卓文君好眉色如望遠山臉際常若芙蓉肌膚柔如脂十七而寡為人放誕風流故悅長卿之才而越禮焉長卿作美人賦以自剌王子年拾遺記曰魏文帝所愛美人姓薛名靈藝常山人也靈藝年十七容貌絶世時明帝選良家子入宮靈藝別父母歔欷纍日淚下沾衣至升車就路之時玉唾壺承淚壺即如紅色及至京師壺中之淚凝如血矣又曰蜀先主甘后沛人生微賤里中相者云此後後貴位極宮掖及后長體貌特異年十八玉質柔肥態媚容冶先主置后白綃帳中戶外望者如月下藂雪河南獻玉人高三尺乃取玉人置后側常稱玉人之所貴比德君子況為人形而不可說乎后與玉人潔白齊色觀者殆相亂惑嬖者非唯嫉於后亦妒在玉人后欲毀之乃誡上曰昔子罕不以玉為寶春秋美之今吳魏未滅安以妖玩經懷勿復進也上乃徹玉人衆嬖皆退當時以甘后為神智婦人又曰吳王潘夫人父坐法夫人輸入織室容態少儔江東絶色同幽者百餘人謂夫人曰神女敬而遠之有司陳於吳主使圖其容夫人憂戚不食減瘦改形工人寫之以進吳主主見喜以虎魄如意撫案嗟曰此神女也愁貌尚能感人況在歡樂乃納于後宮又曰孫亮作緑琉璃屏風每於月下清夜舒之常愛寵四姬皆振古絶色一名朝姝二名儷居三名潔華四名洛寶又曰周成王時有因祗國去王都九萬里獻女工一人善於工巧體貌輕潔被纖羅雜繡之衣長袖修裾風至則結其襟帶恐飄飄不能自止善織以五色絲引而結之則成文錦吳會分地記曰土城者勾踐時索美女欲以獻吳於羅山得西施鄭旦作土城貯之使近道習見人令賢傅母教之三年段龜龍涼州記曰隱王美人張氏色豔出家為道乃自投門樓雙服頻折口誦經顏色自若俄而死鄴中記曰廣陵公陳逵妹才色甚美發長七尺石虎以為夫人三國典略曰崔孝芬取貧家子賈氏以為養女有姿色騰納之請以邑號又曰齊武成曾有疾自云初見空中有五色物稍近變成一美婦人去地數丈亭亭而立徐之才云此至靈所致即進湯服一劑便覺稍遠又服還變成五色物數劑疾平帝王世紀曰紂以鬼侯為三公鬼侯有女美而進之於紂悅之妲己乃泣而讚之紂怒鬼侯女遂殺之而醢鬼侯何集續帝王世紀曰張天錫疾篤閻薛二姬並有國色天錫謂曰吾死之後汝二人豈可更為他妻皆曰尊若不諱請效死尊前誓無他志二人自殺天錫有瘳追悼二姬葬以夫人禮說苑曰齊王起九重之臺募國中有畫者賜之錢狂卒敬君居常飢寒妻端正敬君工畫貪賜畫臺去家曰久思念其妻像向之喜笑旁人瞻見之以白王王即設酒與敬君相樂謂敬君曰國中獻女無好者以錢百萬謂妻可乎不者殺汝敬君慞惶聽許又曰太祖下鄴文帝先入袁尚府有婦女被髮垢面立紹妻後文帝問之答曰是熙妻顧攬髮以袖拭面姿貌絶倫遂納之世說曰漢元帝宮人既多乃令畫工圖之欲有呼者輒披圖召焉其中皆行貨賂王昭君姿容甚麗志不可茍求工遂毀為甚醜終身不召後胸奴來和求美女於帝以昭君充行既召見而嘆之又曰桓宣武平蜀以李勢妹為妾主始不知既聞與數十婢拔白刃襲之溫尚明帝女南康長公主正值梳頭髮籍地膚色玉曜不為動容徐曰國破家亡以至今日若能見殺乃其本懷主慚而退俗說曰宋禕是石崇妓緑珠弟子有色善吹笛後在晉明帝處帝疹患篤群臣進諫請出宋禕帝曰卿諸人誰欲得之阮遙集時為吏部尚書對曰願以賜臣即與之典說曰司隸馮方女國色也避地楊州袁術登城見而遂納焉諸婦害其寵紿言將軍以貴人有志節但見時示憂色必長見敬重馮氏如其言術益哀之諸婦因絞懸之廁言自殺術誠以為不得志而死乃厚葬之方言曰娥㜲音盈好也秦曰娥言娥娥也宋謂之㜲言㜲㜲也秦晉之間凡好而輕者謂之娥自關而東河淆之間謂之媌今關西人亦呼好為媌吾交切或謂之姣言姣潔也音姣趙魏燕岱之間曰姝音姝亦四方通語耳或曰妦言妦容也音蜂自關而西秦晉之間故都曰忓秦舊都今扶風雍縣也晉舊都今太原晉陽縣也其俗通呼好為忓五干切又曰釥錯眇切嫽夭切好也青徐海岱之間曰釥或謂嫽今通呼小姣潔喜好者為嫽眇好凡通語也朦巳紅切厖鴟鴻切豐也自關而西秦晉之間凡大貌謂之朦或謂之厖豐其通語也娃烏佳切媠諾過切窕途了切艷美也吳楚衡淮之間曰娃南楚之外曰媠言嬌媠也宋衛晉鄭之間曰艷陳楚周南之間曰窕自關而西秦晉之間凡美色或謂之好或謂之窕故吳有館娃之宮秦有柴娥之臺柒音七秦晉之間美貌謂之娥美狀為窕美色為艷美心為窈奕偞容也自關而西凡美容謂之奕或謂之媟奕奕媟媟皆輕麗之貌書紀年曰桀伐岷山獻女于桀二女曰琬曰琰桀受女刻其名于苕華之玉苕是琬華是琰楚辭曰姱容修態絙洞房娥眉慢脧目騰光又曰粉白黛黑施芳澤又曰美人既醉朱顏𨠑又曰室中之觀多珍怪蘭膏燭明華容備山海經曰丹山西即巫山也帝女居焉宋玉所謂我帝之季女名曰瑤姬其間首尾一百六十里謂之巫峽蓋因山為名也崔豹古今注曰魏文帝宮人有莫瓊樹薛夜來陳回衣陳巧笑瓊樹始製蟬鬢望之縹眇如蟬翼故號曰蟬鬢桓談新論曰或曰陳平為高帝解平城圍隱而不傳子能知乎曰陳平說閼氏言漢有美女其容貌天下無有今急馳使歸迎欲進單于單于見必愛之則閼氏言之單于而得免也六韜曰紂囚文王於羑里散宜生受命而行宛懷條塗之山有玉女三人宜生得之因費仲而獻之於紂以免文王何承天纂文云孚瑜美色也服虔通俗文云容麗曰媌莫豹切形美曰媠湯火切容媚曰婠烏活切南楚以好為娃烏佳切肥骨柔弱曰婐烏果切娜奴果切頰妍美曰嫵七府切媚容茂曰㜰羊灼切越絶書曰越王勾踐得採薪二女西施鄭旦以獻吳王崔駰七依曰閭娵之孕既麗且間紫脣素齒雪白玉暉回眸百萬一笑千金孔子傾於阿谷浮屠忘其桑門彭祖飛而溶集王喬忽而墮雲司馬相如上林賦曰若夫青琴宓妃之徒皆古神女名也絶殊離俗妖冶間都靚粧刻飾又美人賦曰臣之東鄰有一女子玄髮豐艷蛾眉皓齒顏盛色茂景曜光起離宮間館寂寞重虛門閣晝掩暖若仙居芳香郁烈黼帳高張有女獨處婉然在床奇葩逸麗素質艷光辭不具載蔡雍協初賦曰其在近也若神龍彩鱗翼將舉其既遠也若披雲掃漢見織女陳思王洛神賦曰其形也翩若驚鴻蜿若游龍榮輝秋菊華茂春松髣佛兮若輕雲之蔽月飄飄兮若流風之回雪遠而望之皎若太陽升朝霞迫而察之灼若芙蕖出淥波醲纖得中修短合度肩若削成腰如約素延頸秀項皓質呈露芳澤無加鉛華弗御丹脣外朗皓齒內鮮明眸善睞靨輔承權辭不具載曹植扇賦曰情駘蕩而外得心悅豫而內安增吳氏之姣好發西子之玉顏阮籍清思賦曰靨白玉以為面披丹霞以為衣襲九英之曜精佩瑤光以發輝袁宏夜酣賦曰開金扇坐瓊筵衛姬進鄭女前形窈窕以纖弱艷妖冶而清妍似春蘭之齊秀象明月之雙懸宋玉神女賦曰楚襄王遊於雲夢之浦使宋玉賦高唐之事王夢神女其狀甚麗王異之明日以白玉玉曰其夢若何王曰見一婦人狀甚異撫心定氣復有所夢其始來也耀乎若日初出照屋梁其少進也皎乎若明月舒其光穠不短纖不長步裔裔兮曜殿堂忽兮改容蜿若遊龍乘雲翔王曰此盛矣試為寡人賦之玉曰夫何神人妖麗兮含陰陽之渥飾被華藻之可好兮若翡翠之奮翼其象無雙其極毛嬙又登徒子賦曰夫天下之佳人莫若楚國楚國之麗者莫若臣里臣里之美者莫若臣東家之子增之一分則太長減之一分則太短著粉太白施朱太赤眉如翠羽肌如白雪腰如束素齒如含貝又高唐賦曰昔者先王嘗遊高唐怠而晝寢夢一婦人曰妾巫山之女也為高唐之客辭曰妾在巫山之陽高唐之岨朝為行雲暮為行雨朝朝暮暮陽臺之下王曰朝雲始出狀若何玉對曰其始出也㬣兮若松榯其少進也晣兮若姣姬楊袂障日而望所思忽兮改容偈兮若駕駟馬建羽旌湫兮如風凄兮如雨風止雨霽雲無處所王粲神女賦曰髮似玄鑒鬢類刻成質素純皓粉黛不加朱顏熙曜曄若春華口譬含丹目若瀾波美姿巧笑靨輔奇牙傅毅舞賦曰鄭女出進二八飾侍眉連娟以增繞目流睇而橫波劉楨魯都賦曰衆媛侍側鱗附盈房娥眉青眸顏若濡霜含丹吮素巧笑妍詳掖耀日之珍笄珥明月之珠璫圭衣紛棑振佩鳴璜應瑒神女賦曰騰玄眸而俄青陽離朱脣而耀雙輔紅顏曄而和妍時調聲以笑語張衡舞賦曰裾若飛煙柚如回雪窣若霆震瞥若電滅於是粉黛施兮玉質粲朱簪挺兮緇髮亂謝靈運江妃賦曰小腰微骨朱顏皓齒綿視騰采靡膚膩理天台二娥宮庭雙媛青袿晨接紫衣形見或飄翰凌煙或潛泳浮海萬里俄頃寸陰未改辭不具載魏文帝與繁欽書曰今之妙舞莫巧於絳樹清歌莫激於宋臘古詩曰青青河畔草鬱鬱園中柳盈盈樓上女皎皎當窗牖娥娥紅粉粧纖纖出素手又曰燕趙多佳人美者顏如玉被服羅衣裳當戶理清曲音響一何悲絃急知柱促願為雙飛燕銜泥巢君屋梁簡文帝晚景出行詩曰細樹含殘影春閨散晚香輕花鬢邊墮微汗粉中光梁徐悱妻詩曰東家挺奇麗南國檀容暉夜月方神女朝霞喻洛妃晉阮籍詩曰妖冶間都子英曜何芬葩玄鬢發朱顏睇聘有光華又曰西方有佳人皎若白素光被服織羅衣左右佩雙璜又詩曰二妃游浙江濱逍遙順風翔交甫懷玉珮婉孌有芬芳左思嬌女詩曰吾家有嬌女嬌女皎白晢小字為紈素口齒自清歷髻髮覆廣額雙耳似連璧明朝弄梳臺黛眉類掃跡五言傅玄歌曰有女懷芬芳媞媞步東廂蛾眉雙翠羽明眸發清光丹脣翳皓齒秀顏若圭璋巧笑露靨輔衆媚不可詳令儀希世出無乃古毛嬙首戴金步搖耳系明月繫瑣璫李延年歌曰北方有佳人絶世而獨立一顧傾人城再顧傾人國豈不言傾城國佳人難再得陸機艷歌行曰美目楊玉澤蛾眉象翠翰古樂府陌上桑行曰日出東南隅照我秦氏樓秦氏有好女自言名羅敷羅敷善蠶桑采桑城南隅青絲為籠繩桂枝為籠鉤頭上髮墮髻耳中明月珠鮑昭堂上行曰暉暉朱顏𨠑紛紛織女梭滿堂皆美女目我對湘娥箏笛更彈吹高唱好相和曹植美女篇曰美女妖且間採桑岐路間桑條芬苒苒落葉何翩翩攘袖見素手皓腕約金鐶頭上金雀叉腰佩翠琅玕
