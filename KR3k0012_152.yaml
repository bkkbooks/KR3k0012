body:
  text: 皇親部十七諸王下魏志曰鄧哀王冲字倉舒少聰察歧嶷生五六歲智惠所及有若成人之智孫權曾致巨象太祖欲知其斤重訪之群下咸莫能出其理冲曰置象大船之上而刻其水痕所至稱物以載之則校可知矣太祖大悅時軍國多事用刑嚴重太祖馬鞍在庫而為鼠所齧庫吏懼必死欲面縛首罪猶懼不免冲謂曰待三日然後自歸冲於是以刃穿單衣如鼠齧者謬為失意貌有愁色太祖問之冲對曰世俗以為鼠齧衣者其主不吉今單衣見齧是以憂戚太祖曰此妄言耳無所苦也俄而庫吏以齧鞍聞太祖笑曰兒衣在側尚齧況鞍懸柱乎一無所問冲仁愛識達皆此類也太祖數對群臣稱述有欲傳後意年十三病卒太祖親為請命及亡哀甚文帝寬喻太祖太祖曰此我之不幸而汝曹之幸也又曰中山王衮建安二十一年封平鄉侯少好學年十餘歲能屬文每讀書文學左右常恐以精力為病數諫止之然性所樂不能廢也又曰樂陵王茂性傲很少無寵於太祖及文帝世又獨不王太和元年徙封聊城公其年為王詔曰昔象之為虐至甚而舜猶侯之有庳近漢氏淮南阜陵皆為亂臣逆子而錫土有虞建之於上古漢文明帝行之于前代斯皆敦敘親親之厚義也聊城公茂少不間禮教長不務善道先帝以為古之立諸侯也皆命賢者故姬姓未有不為侯者是以獨不王茂太皇太后數以為言如聞茂頃來小知悔昔之非今封茂為聊城王以慰太皇太后下流之念又曰任城威王彰字子文少善射御膂力過人手格猛獸不避險阻數從征伐志意慷慨太祖常抑之曰汝不念讀書慕聖道而好乘汗馬擊劍此一夫之用何足貴也或諫彰讀書彰謂左右曰大丈夫一為衛霍將十萬騎馳沙漠驅戎狄立功建號耳何能為博士耶又曰陳思王植字子建年十餘歲讀誦時論及辭賦數十萬言善屬文太祖嘗視其文謂植曰汝情人耳植跪曰言出為論下筆成章顧當面試奈何倩人時鄴銅爵臺新成太祖悉將諸子登臺使各為賦植援筆立成可觀太祖甚異之性簡易不治威儀輿馬服飾不尚華麗每進見難問應聲而對特見寵愛蜀志曰魯王永字公初永憎官人黃皓皓既信任用事構永於後主稍疏外永至不得朝見者十餘年吳書曰南陽王和字子孝被譴之長沙行過蕪湖有鵲巢于帆檣故官僚聞之皆憂慘以為檣非久安之象或言鵲巢之詩有積行纍功以致爵位之言今王至德茂行當復國儻神靈以此告寤人意乎吳志曰魯王霸字子威和同母弟也和為太子霸為魯王寵愛崇特與和無殊頃之和霸不穆之聲聞於權耳權禁斷往來假以精學又曰齊王奮字子揚居武昌權薨太博諸葛恪不欲諸王處江濱兵馬之地徙奮於豫章奮怒不從命又數越法度恪上箋諫曰帝王之尊與天同位是以家天下臣父兄大王宜上惟太伯順父之志中念河間獻王東海王彊恭敬之節下當存抑驕恣荒亂以為警戒晉書曰安平獻王孚世祖受禪為太宰一門三世同時十人封王二人世子父子位極人臣子孫咸居大官出則旌旗節鉞入則貂蟬袞冕自公族之寵未始有也享年九十然而夙夜滋恭恆有履冰之懼又曰安平王孚武帝以孚明德屬尊當宣化樹教為群后作則遂備置官屬焉又以孚內有親戚外有交遊惠下之費而經用不豐奉絹二千匹及元會詔孚輿車上殿帝於階迎拜既坐帝親奉觴上壽如家人禮帝每拜孚跪而止之又給以雲母輦青蓋車孚雖見尊寵不以為榮常有憂色又曰安平獻王孚性通和以貞白自立未嘗有怨於人陳留殷武有名於海內嘗罹罪譴孚性省之遂與同處分食談者稱焉又曰平原王幹字子良宣帝子太始元年封平原王邑一千三百戶四年給鼓吹駙馬二匹使服侍中之服幹不治國事雖有爵祿若不在身所得俸秩皆露積腐爛齊王為長沙王乂所殺幹哭之哀謂左右曰宗室轉衰唯此兒最可而復害之從今殆矣又曰文帝崩齊王攸率禮過哀上以攸至孝毀甚二年五月文明皇大后親臨省攸攸毀瘠塵黑貌不可識太后留攸慰撫旬日還中詔勉攸曰若萬一加以他疾將復如何宜遠慮深思不可專守一意以陷於不孝若復不從往言當遣人監守飲食又曰武帝子乂字仕慶封長沙王性果厲有威斷初入洛謂成都王曰天下先帝之業王宜維之時齊王已至聞乂言者皆憚之又曰成都王穎字章度武帝子後屯騎校尉加散騎常侍形狀美而神明少乃不知書又曰梁孝王肜宣帝子拜大將軍領西戎校尉因大會語王銓曰我從兄為尚書令不能啖大臠銓知肜求為尚書令答曰下邳王為令與天下共嚼啖大臠故難公在此獨嚼肜曰長安大臠誰耶詮答盧播是肜曰是吾家吏隱忍之耳詮曰天下皆王家吏王法可不復行之耶又曰齊王攸好學不倦借人書皆為治護時還有水旱則出租秩加賤以賑國人須豐年乃收入本直太康三年詔齊王攸當出方嶽遂撫其國加都督青州增封濟南郡備物典策軒懸之樂六佾之舞賜黃鉞朝車乘輿之副晉陽秋曰齊王輔政士以牛酒郊勞平原王幹獨齎百錢于懷賀之晉中興書曰譙王丞鎮湘州至武昌釋軍備見王敦敦因宴集謂丞曰大王雅素佳士非將御才也丞曰公未盡耳安知鉛刀不能一割丞以敦欲測其情故發此言敦果謂錢鳳曰彼不知懼而學壯語此之不武何能為聽丞之鎮又曰武陵威王晞為桓溫所收忠敬王少子也被廢後新安王遵初封新寧王年十二受拜流涕哀戚左右將軍桓伊當造遵遵恕門人曰何通桓氏門人曰桓伊與桓溫踈宗相見無嫌遵曰我聞人姓木邊便欲殺之況諸桓乎由是少稱聰察及長輒凡退無復名望晉百官表曰王古號也夏殷周稱王金璽龜釰纁朱綬五時朝服遠遊冠佩山玄玉沈約宋書曰彭城王義康性好吏職鋭意文案糾剔是非凡所陳奏入無不可方伯並委義康授用由是朝野輻湊勢傾天下義康亦自彊不息無有懈倦又曰南郡王義宣為荊州刺史白晳美鬚眉長七尺五寸腰帶十圍多畜嬪媵後房千餘尼媼數百男女四十人崇飾綺麗費用殷廣又曰江夏王義恭性嗜不恆與時移變自始至終屢遷弟宅與人遊款意好亦多不終而奢侈無度不受財寶前廢帝狂勃無道義恭元景等謀欲廢立永光元年八月廢帝親率羽林兵於第害之并其四子時年五十三斷折義恭支體分裂腸胃挑取眼睛以蜜漬之謂之為鬼目粽又曰衡陽王義季為荊州刺史先是臨川王義慶在任巴蜀亂擾師旅應接府庫空虛義季躬行節儉蓄財省用數年間還復充實隊主續豐母老家貧無以充養遂斷不食肉義季哀其志給豐母月白米二斛錢一千并制豐噉肉義季素拙書上聽使餘人書啓事唯自署名而已二十一年徵為都督南徐兗青冀幽六州諸軍事南兗州刺史登舟之日帷帳器服諸應隨刺史者悉留之荊楚以為美談又曰桂陽王休範進位司空休範素凡訥少知解不為諸兄所齒遇太宗常指左右人謂王景文曰休範人才不及此以我弟故生使富貴釋氏願生王家良有以也又曰建平宣簡王宏字休度文帝第七子也少而間素篤好文籍太祖寵愛殊常為立第雞籠山盡山水之美建平國高他國一階又曰晉平王休祐貪淫好財色在荊州列所營財貨以短錢一百賦民田登求白米一斛皆令徹白若折者悉簡糴此米升一百至時又不受米平米責錢凡諸求皆如此蕭子顯齊書曰竟陵王子良雲英少尚禮才好士居不疑之地傾意賓客天下才學皆遊集焉後魏書曰河南王平原拜齊州刺史善於懷撫邊民歸附者千有餘家時歲頻不登齊民飢饉平原以私米三千餘斛為粥以全民命北州戍卒一千餘人還者皆給路糧百姓咸稱詠之州民韓凝之等千餘人詣闕訟之高祖覽而嘉歎又曰任城王澄字道鏡少好學文明太后引見誡厲之顧謂中書令李冲曰此兒風神秀發德音間婉當為宗室領袖後為中書令改授尚書蕭顧使庾蓽來朝蓽見澄音韻遒雅風儀秀逸謂主客郎張彝曰往魏任城乃以文見美也又曰安定王休少而聰慧治斷有稱車駕南伐領大司馬高祖親行軍遇休以三盜人徇於軍將斬之有詔赦之休執曰陛下親御六師跋涉野次軍行始爾已有奸切如其不斬何以息盜請必行刑以肅奸匿詔曰大司馬執憲誠應如是但因緣會朕聞王者之體亦應有非常之澤雖違軍法可特原之休乃奉詔高祖謂司徒馮誕曰大司馬嚴而秉法諸君不可不慎於是六軍肅然又曰永昌王健姿貌魁壯善弓馬達兵法所征戰常有大功才藝比陳留桓王而智略過人又曰臨淮王彧字文若少有才學時譽甚美侍中崔光見彧退而謂人曰黑頭三公當此人也琅琊王誦有名人也見之未嘗不心醉忘疲又曰東平王匡字建扶性耿介有氣節高祖器之謂曰叔父必能儀刑社稷匡輔朕躬今可改名為匡世宗即位時茹皓始有寵百寮微憚之世宗曾於山陵還詔匡陪乘又命皓登車皓褰裳將上匡諫上世宗推之令下當時壯其忠謇又曰廣陵王羽字叔翻少而聰惠有斷獄之稱領廷尉高祖幸羽第與諸弟言曰朕昨親受民訟始知廣陵之明了咸陽王禧對曰臣年為廣陵兄明為廣陵弟高祖曰我為汝兄汝為羽昆汝復何恨又曰彭城王協字産和小而歧嶷姿性不群協生而母潘氏卒及有所知啓求追服文明太后不許乃毀瘠三年不參吉慶高祖大奇之敏而耽學不捨晝夜博綜經史雅好屬文從征河北破新野南陽高祖令協為露布協辭曰臣聞露布者布於四海露之耳目必須威示天下以臣小才豈是大用高祖曰但可為之及就尤類帝文有不見者咸謂御筆高祖曰汝所為者人謂吾制非兄則弟誰能辨之北史齊書曰安德王延宗文襄第五子母陳氏廣寧王伎也延宗幼為文宣所養年十二猶騎置腹上令溺已齊中抱之曰可憐止有此一箇問欲作何王對曰欲衝天王文宣問楊愔愔曰天下無此郡名願使安於德於是封安德焉隋書曰楊雄高祖族子也初封清漳王仁壽初高祖曰清漳之名未允聲望命職方進地圖上指安德郡以示群臣曰此號足為名德相稱於是改封安德王唐書曰紀王慎為貝州刺史慎少好學長於文吏皇族中與越王貞齊名時人號為紀越賈誼書曰高皇帝分天下以封有功之臣反者如蝟毛而起高皇帝以為不可是故去不義諸侯空其國擇良日立諸子雒陽上東門之外諸子畢王而天下乃安蔡雍獨斷曰漢制皇子封為王其實諸侯也周末諸侯或稱故以王號加之總名諸侯王法律家皆曰列侯天子大社以五色土為壇皇子封為王者受天子太社之土以所封之方色東方受青南方受赤他以其方色藉以白茅歸國以立社稷謂之茅土王妃史記曰趙王友以諸呂女為后弗愛愛他姬諸呂女妬怒讒之太后誣以罪太后怒以故召趙王趙王至置邸不見命衛士圍守之弗與食趙王餓乃歌曰諸呂用事兮劉氏危迫脅王侯兮強授我妃我妃既妬兮誣我以惡讒女亂國兮上曾不寤續漢書曰樂安陳夫人孝質皇帝母也家本魏郡少以伎入孝王家得幸生質帝梁冀欲專國權令帝母不得至京都又帝短祚是以外家無他寵帝拜夫人為王妃范曄後漢書曰董卓置弘農王於閣上使郎中令李儒進鴆王乃與妻唐姬及宮人別坐者皆歔欷王謂姬曰卿王者妃勢不復為吏臣妻自愛從此長辭遂飲藥而死時年十八唐姬潁川人也王薨歸鄉里父欲嫁之姬誓不許及李𠐶破長安遣兵抄關東略得姬𠐶因欲妻之不聽而終不自名尚書賈詡知之以狀白獻帝帝聞感愴乃下詔迎姬置園中使侍中持節拜為弘農王妃魏志曰中山恭王袞得病詔遣太醫視疾又遣太妃沛王林並就省疾又曰彭城王據建安十六年封范陽侯以環太妃彭城人徙封彭城吳志曰吳主孫權謝夫人會稽山陰人也父煚權聘以為妃愛幸有寵後權納姑孫徐氏欲令謝下之不肯由是失志早卒又曰吳主孫權徐夫人吳郡富春人也祖父真與權父堅相親堅以妹妻真生琨琨生夫人初適同郡陸尚尚卒權為討虜將軍在吳娉以為妃後母養子登後權遷移以夫人妬忌廢處吳積十餘年尋卒臧榮緒晉書曰賈充前妻李氏生二女荃濬禁錮解荃等屢請充迎其母而父不判充當鎮關中屯軍城西為供帳受百官錢荃濬遂突出於坐中叩頭流血訴充并陳說群客以母應還之意荃是齊獻王之妃衆賓皆驚起散出充甚愧愕晉中興書曰海西李皇后庾氏字道憐司空冰女也初為海西王妃海西即位拜為皇后恭和元年崩葬敬平陵海西公夫人無豫又曰簡文皇后王氏字蘭姬后以冠族太宗納焉初為會稽王妃生子道生為世子並失太宗意后及道生俱被幽廢以憂薨烈宗踐祚追尊曰順皇后又曰中宗母太妃夏侯氏字光姬一字銅環太妃為恭王妃生中宗王薨中宗嗣立稱王太妃永嘉元年薨還葬琅琊又曰元敬皇后虞氏字孟母濟陽外黃人中宗之為王納后為妃永嘉六年薨又曰康獻皇后禇氏字䔉太傅裒之女也后以名家人為琅琊王妃生孝穆皇帝蕭子顯齊書曰隋郡王子隆字雲興娶尚書令王儉女為妃上以子隆能屬文謂儉曰我家東阿重出實為皇家蕃屏後魏書曰元匡為太宗正卿河南邑中正奏親王及始蕃二王蕃妻悉有妃號而三蕃已下皆謂妻上不得同為妃名而下不如五品已上有命婦之號竊以為疑曰夫貴於朝妻榮於室婦人無定升降從夫三蕃既啓王封妃名亦同等妻者齊也理與紀齊可從妃例自是三蕃王妻名號始定又曰陽平王顯詔曰顯所生親李誕育懿胤儀形藩國母緣子貴義著春秋可授陽平王太妃以申典例
