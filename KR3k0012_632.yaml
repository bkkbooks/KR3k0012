body:
  text: 治道部十二薦舉中東觀漢記曰光武召鄧禹曰吾欲北發幽州突騎諸將誰可使者禹曰吳漢與鄧弘俱客蘇弘稱道之禹數與語其人勇鷙有智謀諸將鮮及上以禹為知人上欲定河內問禹曰諸將誰可守河內者禹曰寇恂文武備足有牧民御衆之才上乃用之又曰東平王蒼薦吏吳良上以章示公卿曰蕭何薦韓信設壇即拜不復考試以良為議郎又曰王丹字仲回初有薦士於丹者丹選舉之而後所舉者陷罪丹免客暫自絶俄而徵丹復為太子太傅乃呼客見之謂曰何量丹之薄不為設食以罰之相待如舊又曰南陽太守杜詩上疏薦伏惠公曰竊見故大司徒陽都侯伏惠公自行束修訖無毀玷篤信好死守死善道經為人師行為儀表衆賢百姓鄉望德義微過斥退久不復用識者愍惜儒士痛心又曰上嘗問宋弘通博之士弘薦沛國桓談才學洽聞幾幾近也及揚雄劉向父子於是召談拜議郎給事中上每宴輒令鼓琴好其繁聲弘聞之不悅悔於薦舉聞談內出遣吏召之談至不舉席而讓之曰吾所以薦子者欲令輔國家以道而今數進鄭聲以亂雅樂非頌德忠正也後大會群臣上使談鼓琴見弘失其常度上怪而問之弘乃離席免冠謝曰臣所以薦桓談者望能以忠正導主而今朝廷欽悅鄭聲臣之罪也又曰杜林字伯山扶風人為御史先與鄭興同寓隴右乃薦之上乃徵興為太中大夫又曰陳寵字昭公沛人為尚書寵性純淑周密重慎時有表薦輒自手書削草人莫得知又曰韋豹字季明數年辟公府輒以事去司徒劉愷辟之謂曰卿輕人好去就故爵位不踰今歲垂盡當辟御史意在相薦子其留乎豹曰犬馬齒衰豈敢久待薦之私非所敢當遂跣而起愷追之遙去不顧范曄後漢書曰東平王蒼以至戚輔政時班固始弱冠說蒼曰將軍以周邵之德立於本朝今者將軍幕府新開廣延群俊四方之士顛倒衣裳將軍宜效唐殷之舉審伊皋之薦令遠近無偏幽隱必達光名宣於當世貴烈著於無窮竊見故司空掾桓梁京兆祭酒馮晉扶風掾李育京兆督郵郭基涼州從事王雍恆農功曹殷肅此六子者皆有殊行絶才德隆當世如蒙徵納以輔高明此山梁之秋夫子所為嘆也蒼納之又曰曹騰加位特進其所進達皆海內名陳留虞放邊韶南陽延固張溫恆農張冀頴川堂溪等皆所舉也漢雜事曰傅喜為右將軍傅太后與政事喜數諫之后不悅喜上印綬病在家司空何武尚書唐林上書曰魯以季友治亂楚以子玉輕重魏以無忌折衝項以范增存亡故楚跨有南土帶甲百萬鄰國不以為難子玉為將文公仄席而坐及其死君臣相慶百萬之衆不及一賢於是上拜喜為大司馬封高武侯又曰谷永為尚書薦薛宣竊見少府宣材茂行潔達於從政有退食自公之節寡移賞遊說之助臣恐陛下忽於羔羊之詩捨功實之臣任虛華之譽是以越陳宣行能唯留神考察上然之遂以宣為御史大夫魏志曰太祖既定河北而高幹舉并州叛衛固與范先通謀太祖謂荀彧曰河東被山帶河當今天下之要地也君為我舉蕭何寇恂以鎮之彧曰杜幾可於是拜幾為河東太守固等卒伏又曰頴川戲志才籌畫之士太祖甚器之早卒太祖與荀彧書曰自志才亡後莫可與計事者汝潁固多奇士誰可以繼之彧薦郭喜召見與語天下事太祖曰使孤成大業者必此人也喜亦喜曰真吾君矣又曰張郃字俊乂河間人也郃雖武將而愛儒士嘗薦同郡畢諶經修行明詔曰昔祭遵為將常置五經大夫居軍中與諸生雅歌投壺今將軍外勤戎旅內存國朝朕嘉將軍之意擢諶為博士又曰桓範薦徐宣曰臣聞帝王之用當世俊才爭奪之時以策略為先分定之後以忠義為首故晉文行子犯之計而賞曰季之言高祖用陳平之智而託後於周勃竊見尚書徐宣體忠厚之行秉直亮之性清雅特立不隨世俗確然難動社稷之節今僕射𡙇宣行掌後事腹心任重莫如宣者帝遂以宣為右僕射又曰陳群薦廣陵陳矯丹楊戴乾太祖並用之後乾以忠義死矯為名臣蜀志曰諸葛亮自比管仲樂毅時人莫之許唯徐元直徐庶字元直謂為信然時先主屯新野庶謂先主曰諸葛孔明者臥龍也將軍豈願見之乎先主曰君與俱來庶曰此人可就見不可屈致將軍宜枉駕顧之由是先主遂造亮凡三於是情好日密關羽張飛等不悅先主解之曰孤有孔明猶魚之有水也願諸君勿復言羽飛乃止吳志曰劉繇字正禮東來人兄岱字公山平原陶洪薦繇欲令舉茂才剌史曰前年舉公山奈何復舉正禮乎洪曰若使君用公山於前擢正禮於後所謂御二龍於長衢騁騏驥於千里不亦可乎又曰周瑜薦魯肅才宜佐時當廣求其比以成功業不可令去也權即召肅與語甚悅之衆賓罷退獨引肅還合榻對食又曰凌統字公績吳郡人為孫權將甚見親重時有薦同郡盛暹於權者以為梗概大節有過於公績權曰但令如公績足矣後召暹夜至公續已臥聞攝衣出門執其手以入其愛善不害如此晉書曰桓尋字茂倫性通朗早有盛名有人倫識鑒拔才取士或出於無聞或得之孩抱時人方之許郭又曰劉恢嘗薦吳郡張憑卒為美士衆以此服其人又曰華談字令恩廣陵人除甄城令過漢水作莊子讚以示功曹後見教不常談疑不能為私問是廷掾張延所作談即拔延薦達於部遂得升擢比談為廬江延亦已為郡談至廬江舉寒族周訪為孝廉訪果立功名時以談為知人又曰江統為司徒左長史東海王越為袞州牧以統為別駕委以州事與統書曰昔王子師為豫州未下車辟荀慈明下車辟孔文舉貴州人士有堪應者否統舉高平郗鑒為賢良陳留阮修為直言濟北程收為方正時以為知人徐廣晉紀曰張華少自牧羊而篤志好學初為縣史盧欽奇其才數稱薦之晉中興書曰賀循會稽人郡鈴下有楊方者字公回世為郡威儀少好學有奇才以門役在閣下公事之暇輒讀五經鄉邑未之別也內史諸葛恢聞方學召為給使見而異之謂有殊常之才即解役散置左右以門人待焉由是邦壤敬異方始得周旋鄉貴虞喜兄弟以儒學立名並知拔之後恢欲薦郡功曹於中宗使方具其事主簿虞預以薦為美送示太常賀循遂向京師稱美之司徒王導辟以為椽方始出都交遊人間縉紳咸厚遇之傅暢晉諸公讚序曰魏舒雖有宇量衆望未能悉歸侍中任愷為世祖所委任秦始中啓舒散騎常侍侍中尚書令又為吏部遷僕射舒雖體度弘雅而才鈍無所創設遷光祿大夫開府領司徒世祖臨軒使太常任愷拜授朝廷以愷前啓拔舒而為王人人為愷怨之也宋書曰劉穆之為丹陽尹凡所薦達不納不止常云我雖不及荀文若之舉善然不舉不善又曰王鎮惡頗讀諸子兵書喜論軍國大事騎射非長而縱橫善果斷武帝伐廣固鎮惡時為臨灃令人或薦之武帝召與語異焉因留宿且謂參佐曰鎮惡王猛孫所謂將門有將即署前部賊曹破賊有功封博陸縣五等子又曰謝晦字宣明初為昶建威府中兵參軍孟昶死帝問劉穆之昶府誰堪入府穆之舉晦即命為太尉參軍武帝嘗訊獄其旦刑獄參軍有疾晦代之晦車中一覽訊牒隨問酬對無失即日署刑獄賊曹又曰張邵元嘉五年為征虜將軍領寧蠻校尉雍州剌史加都督初王華與邵不和及華參要親舊為之危心邵曰子陵子陵華字方弘至公豈以私隙害正義是任也華實舉之又曰晉平王休祐為南徐州帝就禇彥回求幹事人為上佐彥回舉沈文季轉騎長史東海太守又曰劉道産在雍州有惠化遂蠻歸懷皆出緣征為村落戶口殷盛及産死群蠻大為寇暴孝武西鎮襄陽江夏王羲恭薦柳元景乃以為武威將軍隨郡太守至廣設方略斬獲數百郡境肅然又曰荀伯子好學博覽經傳解褐奉朝請員外散騎侍郎著作郎徐廣重其才學舉伯子及王韶之並為佐郎同撰晉史齊書曰博昭字茂遠御史中丞劉俅薦於武帝永明初以為南郡王侍讀又曰孔休源字慶緒州舉秀才太尉徐孝嗣省其策深善之謂同坐曰觀此足稱王佐之才琅琊王融雅相友善薦之於司徒竟陵王為西邸學士又曰江革字休映弱冠舉南徐州秀才時胡諧之行州事王融與諧之書令薦舉諧之方貢琅琊王沉便以革代之又曰武帝將下都劉懷珍白帝曰夏口是兵衝要地宜得其人高帝納之與武帝書曰汝既入朝當須文武兼資人委以後事武帝乃舉柳世隆自代轉為武陵王前軍長史江夏內史行郢州事又曰明帝詔求異士始安王遙光表薦王暕及東海王僧孺除暕散騎從事中郎將又曰梁武帝之臨雍州問京兆人杜惲求州綱紀惲言柳慶遠武帝曰文和吾已知所問未知者耳因辟為別駕又曰陸厥字韓卿少好屬文永明元年詔百官舉士同郡司徒左曹掾顧皓之表薦厥堪舉秀才梁書曰何遜字伯言八歲能賦沈約嘗謂遜曰吾每讀卿詩一日三復猶不已其為名流所稱如此天監中兼尚書水部員外郎南平王引為賓客後薦之於武帝與吳均伹進幸又曰朱異字彥和吳郡人也有詔求異能之士五經博士明山賓表異高祖召見使說孝經周易甚說之謂左右曰朱異實異能後見山賓謂曰卿所舉殊得其人仍召異直西省又曰陸襄字師卿天監三年都官尚書范岫表薦襄起家為著作郎陳書曰陸瓊字伯玉幼聰惠有令名深為文帝所賞及封周迪陳寶應等都官符及大手筆並中勑付瓊及宣帝為司徒妙簡僚佐吏部尚書徐陵薦瓊於宣帝言其具覆優敏文史足用進居郎署歲月過淹左曹掾缺凡膺茲選雖階次小踰其屈滯已積乃除司徒左曹掾北齊書曰祖鴻勳范陽人也僕射臨淮王或表薦鴻勳有文學宜試一官勑除奉朝請人謂之曰臨淮舉卿便以得調竟不相識恐非其宜鴻勳曰為國舉才臨淮之務但鴻勳何從而謝之或聞而喜曰吾得其人矣
