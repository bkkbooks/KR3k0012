body:
  text: 人事部七十七勇四崔鴻十六國春秋前燕錄曰將作大匠屯騎校尉朝郍侯青武邑人也機巧有筭略驍勇善騎射所在先登陷陳慕容俊擬之張飛又曰成公都晉興元吳人也都騎猛有勇力陽慮之戰年十八橫矛太呼賊不敢當獨步當時擬之方叔論者咸曰當求之於古造次無其比也後魏書曰來大干驍果善騎射遷中散至於朝賀之日大干常著御鎧盤馬殿庭莫不歎異嘗從太宗獵見虎在高巖上大干持矟直前剌之應手而死太宗嘉其勇壯又為殿中給事又曰乙瓌代人也其先世統部落世祖時瓌父正知慕國威化遣瓌入貢世祖因留之瓌便弓馬善騎射手格猛獸膂力過人數從征伐甚見信待尚上谷公主世祖之女也又曰庾葉為將有謀略治軍清整常以少擊多士眾服其智勇名冠諸將又曰楊播字延慶自云弘農華陰人也除左將軍尋假前將軍隨車駕南討至鍾離師迴詔播領步卒三千騎五百為眾軍殿時春水初長賊眾大至舟艦塞川播以諸軍渡淮未訖嚴練南岸身自居後諸軍賊眾遂集於是圍播數重播乃為圓陳以禦之身自搏擊斬殺甚多相拒再宿軍人食盡賊圍更急高祖在北而望之既無舟舡不得救援水勢稍減播領精騎三百歷其舩大呼曰今我欲渡能戰者出賊莫敢動遂擁眾而濟高祖甚壯之賜爵華陰子又曰河間公齊烈帝之玄孫也少雄傑魁岸世祖愛其勇壯引侍左右從征赫連昌世祖馬蹶賊眾逼帝齊以身蔽捍決死擊賊賊乃退又曰賈思伯字仕休齊郡益都人也世宗即位加輔國將軍任城王之圍鍾離也以思伯持節為其軍司及失利思伯為後殿以思伯儒者謂之必死及至大喜曰仁者必勇常謂虛談今於軍司見之矣又曰于栗磾代人也少習武藝拜冠軍將軍道武畋于白登山見熊領數子道武顧謂栗磾曰能縛之乎栗磾曰能道武曰若搏之不勝豈不虛斃一壯士耶栗磾曰自可能致御前坐而制之尋而擒之晉將劉裕遺栗磾書曰黑稍將軍磾常好持黑矟故有其號又曰楊大眼武都氐王難當之孫也少驍勇趫捷走如飛電宣武南征尚書李冲典選統校征官大眼往求征焉冲不許大眼曰尚書不見知聽下官出一伎便出長繩三丈繫之於髻而走繩直如矢馬馳不及冲大驚曰千載已來未有此人也遂用為軍主大眼顧謂同寮曰吾之今日所謂蛟龍得水之秋也自此一舉不復與諸君齊列矣所經戰皆武冠六軍大眼妻潘氏善射詣軍省大眼至攻戰遊獵之際潘氏亦戎裝齊鑣並轡乃至還營同坐幕下對諸寮佐言笑自得大眼指謂諸人曰此潘將軍也明帝加光祿大夫淮泗之間童兒啼者恐之云楊大眼至無不立止王秉之初歸國也謂大眼曰吾在南時聞君之名以為眼如車輪及見君乃不異常人大眼曰鼓旗相望瞋眸奮發足使君目不能視何必大如車輪又曰文成帝名濬太武孫晃子也即位後冬大儺曜兵帝有勇力善騎射靈丘南有山高四百餘丈詔群官仰射山峰無能踰者帝彎弧發矢出山四十餘丈過山南二百步遂詔刊石勒銘紀功北齊書曰高昂字敖曹膽力過人姿儀殊異其父次同為求嚴師加鞭撻昂不遵師訓專事馳騁每言男兒當橫行天下自取富貴誰能端坐讀書作老博士也其父曰此兒不滅吾族當大吾門以其昂藏敖曹故以名字北史曰達奚震少驍勇走及奔馬周文嘗渭北校獵時有兔過周文前震與諸將竟射之馬倒而墜震足不傾躓因步射之矢中兔顧馬纔起遂迴身騰上周文喜曰非此父不生此子陳書曰蕭摩訶齊軍戰有西域胡妙於弓矢弦無虛發眾軍尤憚之及將戰明徹謂摩訶曰若殪此胡則彼軍奪氣君有關張之名可斬顏良矣摩訶曰願識其形狀當為公取之明徹乃召降人有識胡者云胡著絳衣擭皮弓兩端骨弭明徹遣人覘乃知胡在陣仍自酌以飲摩訶摩訶飲訖馳馬衝齊軍胡挺身出陣前十餘步彀弓未發摩訶遙擲銑鋧立中其額應手而仆齊軍大力十餘人出戰摩訶又斬之又曰周鐵虎事梁河東王詧王僧辨擒欲烹之鐵虎曰侯景尚未滅奈何殺壯士耶僧辨奇之後降高祖又曰蕭摩訶帥齊兵為寇高祖遣安都北拒齊軍於鍾山龍尾及北郊壇安都謂摩訶曰卿驍勇有名千聞不如一見摩訶對曰今日令公見矣隋書曰宇文慶從武帝攻河陰先登攀堞與賊短兵接戰良久中石迺墜絕而後蘇帝勞之曰卿之餘勇可以賈人也又曰楊玄感驍勇多力每戰親軍長矛身先士卒喑嗚叱咤所當者莫不震懾論者方之項羽又曰魚俱羅馮翊下邽人也身長八尺膂力絕人聲氣雄壯言聞數百步又曰權武少果勁勇力絕人能重甲上馬嘗倒投於井未及泉復躍而出其拳捷如此又曰長孫晟突厥之內大畏長孫總管聞其弓聲謂為霹靂見其走馬稱為閃電王笑曰將軍震怒威行域外遂與雷霆為比一何壯哉唐書曰丘行恭從討王世充會戰於邙山之上太宗欲知其虛實強弱乃與數十騎衝之直出其後眾皆披靡莫敢當其鋒所殺傷甚眾既而限以長堤與諸騎相失唯行恭獨從尋有勁騎數人追及太宗矢中御馬行恭乃迴騎射之發無不中餘賊不敢復前然後下馬拔箭以其所乘馬進太宗行恭於御馬前步執長刀巨躍大呼斬數人突陣而出得入大陣貞觀中有詔刻石為人馬以象行恭拔箭之狀立於昭陵闕前又曰淮陽王道玄拜洛州總管及府廢改授洛州刺史五年劉黑闥引突厥寇河北復授山東道行軍總管師次下博與賊軍遇道玄帥騎先登命副將史萬寶督軍繼進萬寶與之不協及道玄深入而擁兵不進謂所親曰吾奉手詔言淮陽小兒雖名為將而軍之進止皆委吾今其輕銳越濘交戰大軍道動必滔泥溺莫如結陣以待之雖不利於王而利於國道玄遂為賊所禽全軍盡沒唯萬寶逃歸道玄遇害年十九太宗追悼久之嘗從容謂侍臣曰道玄終始從朕見朕深入賊陣所向必剋意嘗企慕所以每陣先登蓋學朕也惜其年少不遂遠圖因為之流涕又曰王君廓鎮幽州會突厥入寇君廓邀擊破之俘斬二千餘人獲馬五千疋高祖大悅徵入朝賜以御馬令於殿庭乘之而出因謂侍臣曰吾聞藺相如叱秦皇目皆出血君廓往擊竇建德將出戰李勣遏之君廓發憤大呼目及鼻耳一時流血此之壯氣何謝古人不可以常例賞之復賜錦袍金帶還鎮幽州又曰劉世讓為并州總管統兵屯於鴈門突厥處羅可汗與高開道苑君璋合眾攻之甚急鴻臚卿鄭元璹先使在蕃可汗合元璹來說之世讓厲聲曰大夫奈何為夷狄作說客耶經月餘虜乃退及元璹還述世讓忠勇高祖下制褎美之又曰李嗣業賊將李歸仁初以銳師數來挑戰我師攢矢而逐之賊軍大至逼我追騎突入我營我師囂亂嗣業謂郭子儀曰今日之事若不以身啖寇決戰於陣萬死而冀其一生不然則我軍無子遺矣嗣業乃脫衣徒搏執長刀立於陣前大呼當嗣業刀者人馬俱碎殺十數人陣容方駐前軍之士盡執長刀而出如牆而進嗣業先登奮命所向摧靡又曰張濬拜諫議大夫其年冬宰相王鐸至滑臺兼充天下行營都統方徵兵諸侯奏用濬為都統判官時王敬武初破弘霸郎軍大振累詔徵平盧兵敬武獨不赴援鐸遣濬往說之敬武已授偽命復怙強不迎詔使濬至謁見責之曰公為天子守藩王臣齎詔宣諭而侮慢詔使既未識君臣禮分復何顏以御軍民哉敬武愕然謝咎既宣詔軍士按兵默然濬並召將佐集於鞠場面諭之曰人生效忠仗義所冀粗分逆順懸知利害黃巢前日販鹽虜耳公等捨累葉夫子而臣販鹽白丁何利害之可論耶今諸侯勤王天下響應公等獨據一州坐觀成敗賊平之後去就何安若能此際排難解紛陳師鞠旅共誅寇盜迎奉鑾輿則富貴功名指掌可取吾惜公輩捨安而即危也諸將改容引過謂敬武曰諫議之言是也即時出軍從濬入援京師晏子春秋曰昔夏之衰也有推移大戲殷之衰也有費仲惡來足走千里手裂兕虎任之以力凌轢天威專行勇力不顧乎義理是以桀紂以滅殷夏以衰又曰莊公奮乎勇力不顧於行尚勇力之士無忌於國貴戚不薦善偪邇不引過故晏子見公公曰古者亦有徒以勇力立於世者乎晏子對曰嬰聞之輕死以行理謂之勇誅暴不避強謂之力故勇力之立也以行理義也今公自奮乎勇力不顧乎行暴尚勇力之士無忌於國身立威疆行流淫暴貴戚不薦善偪邇不引過反聖王之德而脩滅君之行用此存者嬰未嘗聞有也吳越春秋曰專諸豊邑人伍子胥初去楚如吳時遇之於塗專諸方與人鬭其怒有萬人之氣甚不可當其妻一呼即還子胥怪而問其壯何夫子怒之盛聞一女子之聲而即折道寧有說乎專諸曰子視吾之儀寧類愚者耶何言之鄙也夫屈一人之下必申萬人之上子胥因相決之推顙深目虎口鷹背戾於從難知其勇士也又曰伍子胥見吳王僚王僚望其顏色甚可畏長一丈大十六圍眉間一尺僚與語三日辭無復者賢人也子胥知王好之每入言語侃侃有勇壯之氣也孔演漢魏春秋曰許褚之為人長八尺餘大十圍容貌甚雄勇力絕人漢末賊起禇在汝南與少年相藂及宗族數千家共堅壁相保曹公脩兵汝南褚以其眾歸公公見而壯之曰此樊噲也即日拜都尉引入宿衛諸從褚俠客皆為虎士出入周旋不離左右軍中以褚力如虎癡勇號曰癡虎至今天下稱之皆謂其姓名也吳均齊春秋曰戴僧靜會稽永興人臨湘侯副大祖在淮陰雅有人鑒見而賞之會匈奴卒至僧靜應募出戰單力直前虜騎奔退又斬三級時天盛寒乃脫衣口銜三頭以刀插背拍浮而還臨湘侯大賞之曰殺三人亦可反命矣進之於太祖石頭之役功冠諸將遂至貴顯蕭方等三十國春秋曰符洛雄勇多力猛氣絕人坐制奔牛射洞犁耳符堅深憚之故常為邊守又曰劉陽少驍猛甚有勇力手曳牛尾卻行百步又曰趙將麻秋命黑槊龍騰三千人馳擊謝艾軍艾左右擾動李偉勸艾乘馬艾不從乃下踞胡床而麾眾趙人以為有伏懼而不進韓詩外傳曰衛靈公晝寢而起志氣益衰使人馳召勇士公孫悁道遭行人卜商子夏曰何馳之疾也對曰君晝寢而起使我馳召勇士公孫悁子夏曰微悁而勇若悁者可乎御曰可子夏曰戴我而反至君曰延先生上起召公孫悁俄而悁至入門拔劍疾呼曰商不我取若頭子夏顧叱之曰咄內劍吾將與若言勇於是君令悁內劍而上子夏曰來吾嘗與子從君而北見趙簡子趙簡子被髮仗矛而見我君從十三行之後趍而進曰諸侯相見不宜不朝服君不朝服行人卜商將以頭血濺君之衣矣使反朝服而見吾君者子耶我耶悁曰子也子夏曰子之勇不若我一矣又與子從君而東至海曹齊君重鞇而坐從十三行之後趍進曰諸侯相見不宜相臨以其一鞇而去之者子耶我耶悁曰子也子夏曰子之勇不若我二矣又與子從君於囿中於是兩軍逐我君與拔矛格而還之者子耶我耶悁曰子也子夏曰子之勇不若我三矣所貴為士者上不攝萬乘下不放乎疋夫外立節矜敵而不侵掠內禁殘害而君不危殆是士之所長而君子之所致貴也若夫以長掩短以眾暴寡凌轢無罪之民而威於閭巷之間者是士之甚毒而君子之所致惡也於是靈公避席曰抑乎寡人雖不敏請從先生勇又曰孔子游於景山之上子路子貢顏回從焉孔子曰君子登高必賦爾願言者何其丘將啟汝子路曰由願奮長戟揚三軍乳虎在後仇敵在前搏躩快志進救兩國之患孔子曰勇士哉又曰齊莊公出獵有螳蜋舉足將搏其轉輪問其御曰此何蟲也對曰此螳蜋者也其為蟲知進而不知退不量力而輕敵莊公曰以此為人必為天下勇士矣於是迴軍避之勇士歸之虞溥江表傳曰曹公出濡須號步騎四十萬臨江飲馬孫權帥眾七萬應之使甘寧領二千人為前部督權密勑寧使夜入魏軍寧乃選手下健兒百餘人徑詣公營下便拔鹿角踰疊入營斬得數十級北軍驚駭鼓譟舉火如星寧已還入營作鼓吹稱萬歲因見權權曰聊以觀卿膽耳即賜絹千疋刀百口權曰孟德有張遼孤有興霸足相敵也停住月餘北軍乃退劉向列士傳曰秦召公子無忌無忌不行使朱亥奉璧一雙謝秦秦王大怒執朱亥著虎圈中瞋目視虎終不敢動殷氏世傳曰亮字子華少好學年四十舉孝廉到陽城遇兩虎爭一羊馬不敢進於是亮乃按劍直至虎所斬羊腹虎乃各得其半去時人為之謠曰石里之勇殷子華暴虎見之合爪牙劉昭幼童傳曰魏太祖幼而智勇年十歲嘗浴於譙水有蛟來逼自水奮蛟乃潛退於是畢浴而還弗之言也後有人見大虵奔逐太祖笑之曰吾為蛟所擊而未懼斯畏虵而恐耶眾問乃知咸驚異焉又曰秦舞陽者燕國人也年十二以勇氣聞人犯必殺之莫有敢迕視
