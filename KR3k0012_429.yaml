body:
  text: 人事部六十九正直下王隱晉書曰劉毅字仲雄為司隸校尉言議切直無所回撓故不至公輔王基薦毅方正亮直介然不群言不茍合行不茍容又曰初武帝知太子暗弱後必亂國然不能擇才遣荀勗及和嶠重往觀之勗還盛稱太子德更進茂不同西宮之時嶠曰臣以為太子如故不見更勝此自陛下家事非臣所盡知於是天下貴嶠而賤勗干寶晉紀曰高貴鄉公薨太祖會朝臣而謀其日太常陳泰不至使其舅荀顗召之垂涕而入太祖謂曰玄伯何以處我對曰誅賈充以謝天下太祖曰不可為更思其次泰曰但見其進不知其次太祖乃不復問郭粲晉紀曰初王敦將下朝士共議周顗以為敦剛愎不仁親害乎子必能稱兵以向朝廷敦既剋石頭顗與戴淵共詣敦謂顗曰伯仁卿負我顗答曰公戎車內侮下官親帥六軍不能其事使王旅敗績以此負公又問淵吾此舉動天下為何如答曰見形者謂之逆體識者以為忠敦笑曰若思卿能言晉中興書曰紀回字恭則雅性方範不畏強禦舟陽尹桓景頗以佞事司徒導甚昵之會熒惑守南斗經旬導語回曰南斗楊州分而熒惑守之吾當遜位以厭此謫回答曰公與桓景造膝熒惑何由退舍導甚愧之乂曰初庾冰兄弟每說顯宗國有強敵宜須長君顯宗晏駕何充建議曰父子相傳先王舊典忽妄改易懼非長計冰等不從遂立康帝康帝臨軒冰充侍坐帝曰朕嗣洪業二君之力也充對曰陛下龍飛臣冰之力若如臣議不覩升平之世其強正不撓率皆如此又曰王彬字世儒從兄敦入石頭中宗使彬銜命慰勞會周顗被殺彬往哭顗既而見敦敦怪其有涕洟問其所以彬曰向哭伯仁情不能已敦曰伯仁自致刑戮且凡人遇汝復何為哉彬曰伯仁世譽與君齊行忠烈之軌邈焉難逮其有何罪而致禍戮勃然數敦曰兄抗旌內侮戮殺忠義謀圖不軌禍及門戶敦大怒厲聲曰爾之狂悖乃可至此為吾不能殺汝耶丞相導在坐勸彬起謝彬曰昨暴腳痛不能拜且此復何所謝意氣自若敦曰腳痛孰若頸痛然猶以至親忍不加害檀道鸞續晉陽秋曰初淮陵內史虞珧子妻裴以尺牘辨利兼服食絶谷常衣黃衣狀若學道司馬道子常延致甚悅其才每與百官飲宴裴亦預焉悉令與賓客談衆人皆為降節王恭辭曰恭聞男女之別國之大節未聞宰相之坐有失行婦人一坐竦然道子為慚崔鴻十六國春秋後趙録曰張進元城屠各人也為剌奸外部都督糾舉不避豪右軍中憚之號曰張霹靂又前涼録曰汜禕字休臧燉煌人為福祿令剛直不事上府酒泉太守馬漢遣督郵張休祖劾禕休祖曰君不聞寧逢三千頭虎不逢張休祖乎禕怒以印擊肘出而就縛縛訖發印以告從事聞休祖坐不解印擅縛令長以大不敬論禕遷居延令又前秦録曰王墮字安生京兆霸城人也博學有雄才性剛愎疾惡雅好直言疾董榮如仇讎每朝見之略不與言人謂之曰董尚書貴幸一時公宜降意墮曰何雞狗而令國士與之言乎榮聞而慚恨故說符生誅之及刑榮謂墮曰君今復敢不數董龍作雞狗乎墮瞋目而叱之龍榮之小字也後魏書曰尉聿字成興性耿介肅宗時為武衛將軍領軍元乂秉權百寮莫不致敬聿獨長揖不拜出為涼州刺史涼州緋色天下之最又送白綾二千匹令聿染之聿拒而不許又曰古弼代人也少忠謹善騎射初為獵郎使長安稱旨轉門下奏事以敏正著稱太宗嘉之賜名曰筆取其直而有用後改名弼言其有輔佐才也上谷民上書言苑囿過度民無田業宜減太半以賜貧者弼覽而善之入欲陳奏遇世祖與給事中劉樹棊志不聽事弼侍坐良久不獲申聞乃起於世祖前捽樹頭掣下床以手搏其耳以拳歐其背曰朝廷不治實爾之罪世祖失容曰於棊不聽奏事實在朕躬樹有何罪置之弼乃具狀以聞世祖奇弼公直皆可其所奏以與百姓又曰游肇之為廷尉也世宗嘗私勑肇有所降怒肇執而不從曰陛下自能恕之豈是令臣曲筆也其執意如此又曰于烈世宗初咸陽王禧當權遣家奴傳信於烈曰須舊羽林虎賁執仗出入烈曰天子諒暗事歸宰輔領軍典掌宿衛有詔不敢違理無私給奴惘然而返以報禧禧遣謂烈曰我號天子兒天子叔元輔之命與詔何異烈厲色曰其若是詔應遣官人何由遣私奴索官家羽林烈頭可得羽林不可得禧惡其剛直遂議出之乃授恆州刺史又曰于忠嘗侍宴世宗賜之劍杖令出入周旋恆以自衛遷侍中辭無文世宗曰今文人少心直不如卿欲使卿劬勞於下我無憂於上又曰録尚書高陽王雍欲以令史朱暉為廷尉評頻煩託吏部尚書元順順不為用雍遂下命用之順投之於地雍聞大怒昧爽坐都廳召順曰身天子之子天子之弟四海之內親尊莫二元順何人以身成命投棄於地順徐謂雍曰高祖遷宅中士創定九流官方清濁軌儀萬古而朱暉小子身為省吏何合為廷尉清官殿下既先皇同氣宜遵成旨自有短垣而復踰之也周書曰王羆字熊霸陵人也質直木強處物平當州閭敬憚焉三國典略曰初周萬年縣令樂運抑挫豪右時稱強直帝甚嘉之特許通籍事有不便咸令奏聞至是召運赴行在所既至問之曰卿來日見太子否運曰臣來曰奉辭帝曰卿言太子何如人也運曰中人時齊王憲等並在帝側帝顧之謂曰百官佞我皆云太子聰明唯運獨云中人方驗之忠直因問中人之狀運曰班固比齊桓為中人管仲相之則霸豎貂輔之則亂可與為善可為與惡帝曰我知之矣超拜運為京兆郡丞吳均齊春秋曰王僧虔性甚方直遠近望之咸曰如水鏡也唐書曰蘇世長高祖待之意甚厚高祖謂曰卿自謂諂佞耶正直耶對曰臣實愚直高祖曰卿若直何為背世充而歸我對曰洛陽既平天下為一臣智窮力屈始歸陛下向使世充尚在臣據漢南天意雖有所歸人事足為勍敵高祖大笑嘗又嘲之曰名長意短口正心邪棄忠貞於鄭國忘信義於吾家世長對曰名長意短實如聖旨口正心邪未敢奉詔又曰桓彥範為大理凡所奏議若逢人主詰責則辭色無懼爭之愈厲又常謂所親曰今既躬為大理人命所懸必不能順旨詭辭以求茍免又曰高宗使宦者緣江採異竹將於苑中植之宦者所在縱暴還過荊州蘇良嗣囚之因上疏諫稱遠求珍異以疲道路恐非聖人抑己愛人之道又小人竊弄威福以虧皇明言甚切直疏奏高宗下詔慰勉遽令棄竹於江中又曰高宗謂侍臣曰邢文偉事我兒能減膳切諫此正直人也遂擢拜右史又曰憲宗以李緯為相同列李吉甫便僻善逢迎上意絳梗直多所規諫故與吉甫不叶絳性剛訐每與吉甫爭論人多直絳憲宗察絳忠正自立故絳論奏多所允從又曰武元衡從父弟儒衡字庭碩才度俊偉氣直貌莊言不妄發與人交友終始不渝相國鄭餘慶不事華潔後進趍其門者多垢衣敗服以望其知而儒衡謁見未輒易所好但與之正言直論餘慶因亦重之晏子春秋曰景公觀於淄上歎曰使國可長保而傳之子孫豈不樂哉晏子曰今君臨民若寇讎見善如避熱不亦難乎又曰景公晝被髮乘六馬御婦人以出正閨肘跪擊馬而反之曰非吾君也公慚而不朝晏子曰臣聞下無直辭上有墮君民多矯行今君有失行而刖跪直禁是君之福也於是令刖跪倍資又曰景公見梁丘據公曰與我和晏子曰此同也和者君甘則臣酸君淡則臣醎今據也君甘則甘所謂同也安得為和尸子曰范獻子遊河大夫皆在君曰孰知欒氏之子大夫莫答舟人清涓捨揖答曰君奚問欒氏之子君曰自吾亡欒氏也其老者未死少者壯矣清涓曰善修晉國之政內得大夫外不失百姓雖欒氏子其若君何若不修晉國之政內不得大夫而外失百姓則舟中之人皆欒氏子也君曰善呂氏春秋曰熊意見齊宣王曰寡人聞子好直有之乎對曰意何能直意聞好直之士家不處亂國身不見汗君今意身得見君而家託乎齊意何能直夫賢主所以貴士者以其能直言也言直則枉者見人主欲聞枉而惡直是鄣水源而欲其流也說苑曰魏武侯浮西河而下中流謂吳起曰美哉山河之固此魏之寶也對曰在德不在險昔三苗氏左洞庭而右彭蠡德義不修而禹滅之夏桀之居左河濟而右太華伊闕在南羊腸在北修政不仁而湯放之殷紂之國左孟門而右太行常山在其北大河經其南修政不德而武王伐之由此觀之在德不在險若君不修德船中之人盡敵國也武侯曰善又曰秦始皇既有天下乃召群臣而議曰昔五帝禪賢三王世繼孰是將為之博士七十人未對鮑白令之對曰天下官則禪賢是也天下家則世繼是也故五帝以天下為官三王以天下為家秦皇帝仰天歎曰吾德出乎五帝將官天下誰何使代我後者鮑白令之對曰陛下行桀紂之道欲為五帝之禪非陛下所能行也秦皇大怒曰令之前若何以言我桀紂之道也速說之不解則死令之對曰陛下築臺干雲宮殿五里建千石之鍾立萬石之𧇽婦女連百倡優纍千興作麗山宮室至雍相繼不絶所以自奉者殫天下竭民力陛下所謂自營僅存之主耳何暇比德於五帝欲官天下哉秦皇帝暗然無以應面有慚色新序曰齊景公遊於牛山之上而北望齊曰美哉國乎使古無死者則寡人將去斯如之何乃泣沾襟高子曰然賴君之賜蔬食惡肉可得而食也駑馬棧車可得而乘也且不欲死而況吾君乎俯而垂泣晏子拊手而笑曰樂哉今日嬰之遊也見怯君一而諛臣二使古之無死者則太公丁公至今猶存吾君方將被蓑笠而立乎畎畝之中唯事之恆何暇念死乎景公慚焉又曰晉平公間居師曠侍坐平公曰子生無目子之默默也師曠對曰天下有五默默而臣不得預一焉平公曰何謂也師曠曰群臣行賂以採名譽百姓侵冤無所告訴而君不悟此一默默也忠臣不用用臣不忠下才處高不肖處賢而君不悟此二默默也姦臣欺詐空虛府庫以其少才覆塞其惡賢人逐邪臣貴而君不悟此三默默也國貧民罷上下不和而好財用兵嗜欲無厭諂諛在旁而君不悟此四默默也至道不明法令不行吏民不正百姓不安而君不悟此五默默也國有五默默而不危者未之有也臣之默默何害乎國家哉又曰周舍立趙簡子門三日三夜簡子使問之曰夫子將何以教寡人對曰願為君諤諤之臣墨筆操牘隨君之後伺君過而書之簡子悅之又曰魏文侯與士大夫坐問曰寡人如何君也群臣皆曰君仁君也至任座曰君非仁君也曰子何以言之對曰君伐中山不以封君之弟而封君之子是以知君非仁君也文侯怒逐任座次到翟璜對曰君仁君也曰何以言之對曰臣聞其君賢者其臣言直向任座之言直是以知君之仁也文侯曰善復召任座郭子曰王含為廬江含字處弘敦兄也貪強狼藉王敦欲護其兄故於衆坐中稱家兄在郡為政定善廬江人咸稱之時何充為主簿在坐正色曰充即廬江人所聞異於此汝南先賢傳曰李宣字公休為太尉黃瓊所辟是時寒暑不和羌夷數起瓊見掾屬曰是太尉無德願諸掾有以匡之掾東平王象對曰昔堯遭洪水之變湯有六年之旱自上聖之君誰能無此明公日昊恪勤袞職修理小掾等無以加增如此至數人瓊欣笑次及宣乃仰曰明公被日月之衣居上司之位輔弼天子處諫諍之職未有對揚謇謇之言其所旌命不授巖谷之士小掾私以於邑小掾聞之三台不明責在三公願明公深思消復災異進納忠良衆人默然慚愧華陽國志曰中山諸王每過溫縣必責求供給溫吏民患之李密至縣中山王過欲徵芻茭薪蒸密引高祖過沛賓客老幼禮桑梓之恭一無煩擾伏惟明王孝思惟則本國望風式歌且儛誅求之疲所未聞命後諸王經過不煩溫縣又曰陳禪字紀山安漢人也拜諫議大夫西域獻幻伎天子與公卿觀之禪獨伏不視李固外傳曰梁冀欲立清河王蒜常侍曹騰聞議定見冀曰清河為人嚴明若遂即位將軍受禍不久矣冀更會議立蠡吾侯子唯固與杜喬深據本議桓帝立固與杜喬以本立蒜下獄太后詔出固冀乃復令黃門常侍作飛章虛奏收固等繫獄皆死京師諺曰直如絃死道邊曲如鉤反封侯孔融別傳曰袁術僣亂曹操託楊彪與術婚姻誣以欲圖廢置奏收下獄劾以大逆融聞之不及朝服往見操曰楊公四世清德海內所瞻周書父子兄弟罪不相及況以袁氏歸罪易稱積善餘慶徒欺人耳操曰此國家之意融曰假使成王殺邵公周公可得言不知耶纓綏搢紳所以瞻仰明公者以公聰明仁智輔相漢朝舉直措枉致之雍熙今橫殺無辜則海內觀聽莫不解體孔融魯國男子便當拂衣而去操不得已遂理出彪樊英別傳曰順帝策書備禮玄纁徵英詔切郡縣駕載上道英不得已到京師稱疾不肯赴乃強輿入殿猶不以禮屈帝怒曰朕能生君能殺君能貴君能賤君能富君能貧君君何慢朕英曰臣受命於天生盡其命天也死得其命亦天也陛下焉能殺臣臣見暴君如見仇讎立朝猶不肯可得貴乎雖在布衣列環堵之中晏然自得不易萬乘之尊又何得而賤乎陛下焉能賤臣臣非禮之祿萬鍾不受也申其志雖簞食不厭也陛下焉能富臣焉能貧臣帝不能屈而敬其名使出就太醫養疾日置羊酒語林曰晉王敦與世儒議下都世儒以朝廷無亂且唱兵始自古所難諫諍甚苦處冲變色曰吾過蒙恩遇受任南夏卿自同姦邪阻遏義舉王法焉得相私因目左右令進世儒正色曰君昔歲害兄今又殺弟自古多士豈有如此舉動言畢流涕敦意乃止王符論曰國以賢興以諂衰君以忠安以佞危此古今之常論而時所共知也然衰國危君繼踵不絶者豈時無忠信正直之士哉誠苦其道不得行耳
