body:
  text: 皇親部十一嬪尚書堯典曰釐降二女于媯汭嬪于虞降下嬪婦也舜為匹夫能以義理下帝女之心於所居媯水之汭使行婦道於虞氏詩推度災曰關睢知原冀得賢妃正八嬪嬪婦也八婦正於內則可以化四方矣周禮天官內宰曰以陰禮教九嬪不言教夫人世婦舉中言省文也又曰九嬪掌婦學之法以教九御婦德婦言婦容婦功各帥其屬而以時御敘于王所嬪婦也婦德謂貞慎也婦言謂辭令也婦容謂婉娩也婦功謂絲枲也自九嬪以下而御各帥其屬者使亦九九相與從王所息之燕寢也群妃御見之法卑者宜先尊者宜後御女八十一人當九夕也婦二十七常三夕嬪九人當一夕夫人三當一夕亦十五日而遍云自望後足之凡祭禮贊玉齍贊后薦徹豆籩玉齍玉敦黍稷寢器也若有賓客則從后當贊后事大喪則帥敘哭者亦如之亦從后也周禮冬官匠人曰內有九室九嬪居之外有九室九卿朝焉禮記曰仲春之月玄鳥至之日以太牢祀於高禖天子親往后妃親帥九嬪御乃禮天子所御帶以弓韣授以弓矢于高禖之前又曰古者天子后立六宮三夫人九嬪二十七世婦八十一御妻國語曰齊襄公卑聖侮士而唯女是崇九妃六嬪陳妾數百漢書曰王莽備九嬪視九卿魏志曰文帝增貴嬪位次皇后又曰文德郭皇后文帝踐阼為貴嬪甄后之死由后之寵也王隱晉書曰武帝采諸葛沖等女五十餘人入殿賜采女食皆憂不食帝使縵鄣楊后曰可但入鄣其中者以絳繫系臂胡芳泣左右止之曰陛下聞之芳曰死不畏何畏陛下帝壯其言故遂敬之芳父奮聞女中亦哭曰老奴不死唯有二兒男在九地之下女在九天之上拜芳為貴嬪晉書曰胡貴嬪名芳父奮泰始九年簡良家子以充內職拜芳為貴嬪每有顧問不飾言詞率爾而答進退方雅最蒙愛幸侍御服飾亞于皇后常與樗蒲傷上指帝怒曰此固將種也芳對曰北伐公孫西拒諸葛非將種而何芳生武安公主王隱晉書曰又採侍御史齊國左維女為修儀有文才晉書曰左貴嬪名芬兄思芬少好學善綴文名亞於思武帝聞而納之拜修儀後為貴嬪以才德見禮體羸多患常居薄室每遊華林輒回輦過之語及文義辭對清華左右侍聽莫不稱美及楊皇后崩芬獻誄咸寧二年納悼后芬受詔作頌及帝女萬年公主薨帝痛悼不已詔芬為誄其文甚麗帝重芬辭藻每有方物異寶必詔為賦頌以是屢獲恩賜焉晉諸公讚曰舊制貴嬪夫人比三公假金紫淑媛淑儀修容修儀婕妤容華充華為九嬪比九卿假銀青晉起居注曰泰始三年使使持節兼五官中郎將宗正丞司馬恢拜崇陽園妾李琰為修華王宣為修容徐琰為修儀吳淑為婕妤趙𤥻為充華九年有司奏禮唯皇后聘以穀圭無妾媵設玉之制詔曰拜授可依魏氏故事十年上臨軒使持節兼太常洛陽令司馬啓拜采女胡芳為貴嬪又使使持節兼御史中丞太子舍人司馬誕拜采女劉媛為淑妃臧曜為淑媛芳為淑儀趙粲為修華陳琇為修容咸寧三年拜美人左嬪為修儀刑蘭為婕妤朱薑為容華又曰惠帝元康二年詔曰才人謝玫進為淑妃有司奏當與三夫人以下同拜詔宜在後也永寧元年詔曰峻陽園淑妃公孫明識貞粹今進位為貴人後魏書曰高祖改定內官三嬪視三卿六嬪視六卿山海經曰鮒隅山顓頊葬于其陽九嬪葬其陰左貴嬪集有離思賦相風賦孔雀賦松柏賦泣漚頌賦納皇后頌楊皇后登祚贊芍藥花頌鬱金頌菊華頌神武頌四言詩四首武元皇后誄萬年公主誄世婦周禮曰世婦掌祭祀賓客喪紀之事帥女宮而濯概為齍盛及祭之日涖陳女宮之具凡內羞之物涖臨也內羞房中之羞周禮天官冢宰曰世婦不言數者君子不茍於色有婦德者乃充之死則有闕周禮春官曰世婦每宮二人女史二人世婦居宮王者六宮女史有才智也禮記月令仲春之月后親帥九嬪御御謂從往祀也禮天子有世婦女御獨出帥九嬪者舉中言祠于高禖之前太祝酌飲高禖之庭又曰季春之月后齋戒親東嚮躬桑后妃親採桑示師先天下也東嚮者向時氣也是時明其不常留養蠶者所卜夫人與世婦及諸臣之妻也禮記婚義曰古者天子二十七世婦以聽天下之內治以明章婦順故天下內和而家理蔡雍月令章句曰仲春之月以太牢祀于高禖高禖祀名高猶尊也吉事先見之象蓋謂之人見所以祈子孫之祀也玄鳥感陽而至故重至日因以用之簡娀以玄鳥至之日有事高禖而生契焉故詩云天命玄鳥降而生商后妃率九嬪御后者天子適妻也妃命也嬪婦也御妾也周禮天子一后三妃九嬪二十七世婦八十一御妾以應外朝公卿大夫之數也世婦不見卑者文略御妾皆行世婦可知也后妃將九嬪女御皆會禖以祈孕妊也乃醴天子所御帶以弓矢天子所御謂后妃以下至妾任有萌牙者也韣弓衣也祝以高禖之命飲以醴酒帶以弓韣尚使得男也授以弓矢于高禖之前弓矢者男子之事也孕妊者於高禖登位之前也又曰季春之月后妃齋戒親東嚮躬桑齋戒者事於先蠶也東嚮盛德也躬桑者手三繅猶天子親耕三推也古者天子諸侯必有公桑蠶室近川而為之築宮仞有三尺棘墻而外閉之卜夫人世婦之吉者使入蠶室奉種浴于川公桑以食之蠶事既升外成也分繭稱絲絲以斤兩故曰稱知其多少所以旌其成功也在孟夏於此終言之也以供郊廟之服天子諸侯所服以祭者必后夫人所親蠶也禮世婦卒蠶獻繭于夫人受之親繅三盆手朱緑之玄黃之以為黼黻文章君服之以祀先王先公敬之至也故曰無或敢怠又曰孟夏之月蠶事既畢后妃獻繭於天子進其成功也乃修繭稅以桑為均十而取一曰稅乃收世婦以下所蠶之稅也以桑為平者用桑多則繭多少則繭少也貴賤長少如一貴謂世婦賤謂妾御長謂力壯者也言無尊卑老壯各自以桑為平不得以高下為差也史記曰中宮天極星後勾四星末星正妃餘三星後宮之屬也漢書曰軒轅前大星女主象旁小星御者後宮屬也范曄後漢書曰世婦主知喪祭賓客後魏書曰高祖改定內官世婦視中大夫又曰宣武靈皇后胡氏初召入掖庭為承華世婦生肅宗明皇帝後周書武帝建德中詔曰正位於中有聖通典質文相華損益不同五帝則四星之象三王立六宮之數劉曹已降等級彌繁選擇遍於生民命秩方於庶職椒房舟地有衆如雲本由嗜欲之情非關風化之義朕運當澆季思復古始無容廣集子女屯聚宮掖弘贊後庭事從約簡可置妃二人世婦三人御妻三人自茲以外宜悉減省御女周禮天官冢宰曰女御婚義所謂御妻御猶進也侍也范曄漢書曰八十一御女序于王之燕寢頒官分務各有典司後漢書曰高祖改定內官御女視元士淮南子曰孟春之月東宮御女青色衣青綵鼓琴孟夏之月南宮御女赤色衣赤綵吹笙竽孟秋之月西宮御女白色衣白彩撞白鍾孟冬之月北宮御女黑色衣黑彩擊磬石美人漢書曰漢興因秦之稱號正適稱皇后妾皆稱夫人及有美人之號焉至武帝各有爵位美人視二千石又曰萬石君奮其父趙人也姓石氏趙亡徙居溫過河內時奮年十五為小吏侍高祖高祖與語愛其恭敬問曰若何有對曰有姊能鼓琴高祖曰若能從我乎曰願盡力於是高祖詔其姊為美人徙其家長安中戚里以姊為美人故也又曰孝惠張皇后宣平侯敖女也呂太后欲為重親以公主女配帝欲其生子萬方終無子乃使佯為有娠取後宮美人子名之殺其母立所名子為太子又曰孝成趙皇后弟絶幸為昭儀謂成帝紿我言從中宮來即從中宮許美人兒從何生許氏竟當復立耶令許美人有子竟負若約謂何帝曰約趙氏故不立許氏使天下無出趙氏上者無憂也范曄後漢書曰夏殷以上后妃之制其文略矣周禮王者備內職焉光武中興置美人無爵秩歲時賞賜充給而已又曰虞美人者以良家子十三選入掖庭生舞陽長公主自漢興母氏莫不尊寵順帝既未加美人爵號而沖帝早夭梁冀秉政忌惡他族虞氏抑而不登但稱大家而已又曰王美人趙國人也豐姿色聰敏有才能明書會計以良家子應法相選入掖庭為何后所鴆靈帝思美人作追德賦令儀頌魏志曰漢制內官十有四等魏因漢法皆如舊制自夫人以下世有增損太祖建國始命王后其下五等有美人暨太和中自夫人以下爵凡十二等美人視二千石江表傳曰孫皓以張布女為美人有寵後美人忤皓皓怒棒殺之沈約晉書曰夏殷以上內職無聞姬氏之隆婦官為盛前漢列給十四世祖受命又有美人以比職焉後魏書曰高祖改定內官美人視三品沈約宋書曰晉武帝採漢魏前事之制置三夫人其餘有美人爵視千石太宗以美人為散使蕭子顯齊書曰六宮位號漢魏以來因寵增置世不同矣建元元年有司奏置美人為散職才人范曄後漢書曰和帝數失皇子鄧后憂繼嗣不廣數選進才人以博帝意魏志曰明帝遊后園召才人以上曲宴極樂明日帝見毛后后曰昨遊宴北園樂乎帝以左右泄之所殺十餘人魏略曰明帝青龍三年於別殿之北立八坊諸才人以上轉南附焉其秩石擬百官之數王隱晉書曰太康七年出後宮才人妓女已下百七十人歸家又曰初惠帝幼世祖遣才人謝玖給惠帝因是有娠臨娶賈妃迎玖西宮遂生愍懷臧榮緒晉書曰懷帝王太后諱媛姬初入武帝拜中才人早卒懷帝即位追尊曰皇太后也晉中興書曰謝夫人名玖家本貧賤又以屠羊為業玖清惠貞正有淑姿選入後宮為才人後魏書曰高祖置女職中才人視五品沈約宋書曰晉武帝採漢魏之制置才人中才人爵視千石以下高祖受命省二才人世祖又置中才人以為散位崔鴻三十國春秋後趙録曰石虎杜皇后名珠不知何許人平幽州在王浚妓中虎見而悅之因請於勒勒引見號曰才人以賜虎性恭惠柔婉寵幸亞於鄭后也保林漢書曰元帝加昭儀之號凡十四等保林視百石晉武帝起居注詔曰今出清商掖庭及諸署才人妓女保林已下二百七十餘人還家女侍中後魏書曰高祖置女侍中視三品又曰陸昕之容貌柔謹尚獻文女常山公主高祖以其主壻特垂昵眷昕之亡公主奉姑有孝稱神龜初與穆氏琅琊公主並為女侍中又曰于忠後妻中山王尼須女微解書靈太后引為女侍中又曰靈太后妹為元乂妻封平君拜女侍中鄴中記曰石虎置女侍中皆貂蟬直侍皇后女尚書魏略曰明帝遊宴在內選女子知書可付信者為女尚書省奏事當畫可魏書曰高祖置女尚書視三品晉東宮舊事曰迎太子妃之日諸長御皆在幄帳左右侍宮人重行東面以準女尚書西面以準女尚書陸翽鄴中記曰石虎征討所得美女萬餘以為宮人簡其有才藝者為女尚書女史毛詩曰靜女刺時也衛君無道夫人無德也靜女其孌貽我彤管既有靜德又有美色又遺我以古人之法可以配人君者后夫人必有女史書其日月而以環進退之生于月娠則金環退之當御者以銀環進之著於左手既御著于右手事無大小記以成法箋云彤管色赤貌彤管有煒悅懌女美煒赤貌彤管以赤心正人者箋云赤管然煒女史以悅懌妃妾之德美之也毛詩義疏曰女史彤管法如國史主記后夫人之過人君有柱下史后有女史外內各有官也周禮曰女史八人女史女奴曉書也掌王后之禮掌內治之藏以詔后內治內政內治之法本在內掌書而藏之送內宮考六宮之計書內治之藏以令后之命也凡后之事以禮從亦如太史之於王漢書曰班婕妤自傷賦曰陳女圖以鏡鑒顧女史而問詩范曄後漢書曰頒官分務各有典司女史彤管記功書過晉記曰元康中司空張華懼后族之盛乃作女史針沈約宋書曰女史執策記言是司過身戒夕蠱國畏晨後魏書曰高祖置女職女史賢人視三品沈約宋書曰太宗留心後房擬百官備置內職紫極房光興房各置女史一人崔鴻三十國春秋後趙録曰石虎置女太史於靈臺仰觀災祥以考外太史驗察虛實
