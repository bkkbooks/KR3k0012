body:
  text: 器物部九斤釋名曰斤謹也板廣不可得削又有節則用此釿之所以詳謹令減斧跡也崔鴻十六國春秋曰石虎馳獵無度晨出夜歸又多輕行躬行作所太子太保韋謏諫曰白龍魚服有豫且子居切之禍海若潛遊離葛陂之酷願陛下清宮蹕路思二神為先鑒不可忽天下之重輕行斤斧之間一旦有狂夫之變雖龍騰之勇不暇施也智士之計豈及設哉莊子曰郢人堊漫其鼻端若蠅翼使匠石斲之運斤成風盡堊而鼻不傷郢人立而不失容孫子曰何世之無才何才之無施良匠提斤斧造山林梁棟阿衡之材櫨柱楣椽之朴森然陳於目前大廈之器具矣夢書曰斤斧為選士取有材夢得斤斧選士來鏟釋名曰鏟平削也廣雅曰籤子簾切謂之鏟也鮑昭蕪城賦曰鏟利銅山鐁釋名曰鐁彌也有高下跡以此鐁彌其上而平之鑢說文曰鑢錯銅鐵也方言曰錯鑢互名也韓詩曰如磨如錯鎌釋名曰鎌廉也體廉薄其所刈稍稍取之似廉者也東觀漢記曰山陽郡人江伯欲嫁姉姉引鎌欲自割魏略曰孟康字公休為弘農太守時出按行勑吏卒各持鎌自刈馬草說苑曰孔子聞哭者聲甚悲進見之吾丘子也吾一曰虞擁鎌帶索而哭孔子問何哭之悲對曰吾有三失子曰願聞三失曰吾少好學周遍天下還後吾親亡是一失也素尚高節不事庸君臣節不遂二失也少擇交遊寡於親友老而無託是三失也請從此辭投水而死孔子曰弟子記之此足以為戒於是歸養親者十有二三風俗通曰鎌刀自揆積芻蕘之効鍠異苑曰長山郭悖元嘉十二年病亡後孫兒見悖著帽布裙在靈床上呼孫與語云今得七日假假滿便去今將二小兒捉僕在門可就取也孫求僕即得又云汝叔從都還得鍠犁鐴音辟可試取看便以呈之仍以兩鐵相加鎗鎗作聲語孫曰我無復歸緣從此而絕斨毛詩豳七月曰取彼斧斨以伐遠揚又破斧曰既破我斧又缺我斨鏵釋名曰鍤鍤地起土也或曰削能有所穿削也或曰鏵刳也刳地為坎也晉書安帝紀曰吳興王淡父為鄰人竇度所殺淡年十歲陰有復讎之志至年十八密索利鍤刃佯若耕耘經一橋下伺度舡行還伏杖於草中淡於橋上以鍤斫之而歸罪有司太守孔嚴義其孝勇上請宥之又曰劉伶常乘鹿車攜一壺酒使人荷鍤而隨之謂曰死便埋我淮南子曰故伊尹之興土功也脩腳者使之蹠音隻鏵強脊者使之負土長腳者蹠得土多鍤入土深也又曰禹身執畚鍤以為民先䟽河而導之九支鑿山而通九洛闢五湖而寧東海鋤說文曰鋤薅音蒿斫也钁大鋤也釋名曰鋤助也去穢助苗長齊人謂其柄為橿寄良切橿然正直也史記曰高后立諸呂為王擅權用事朱虛侯年二十有氣力忿劉氏不得職常入侍高后燕飲曰請為田歌太后笑曰若生而為王子安知田乎章曰臣知之太后曰試為言田意章曰深耕穊種立苗欲䟽非其種者鋤而去之呂后默然漢書曰雖有鎡錤上音茲下音基不如逢時鎡錤鋤雖有田基值時乃獲信矣樊噲夏侯灌嬰之徒方其鼓刀僕御販繒之時豈自知附驥尾勤功帝籍慶流子孫哉又曰倪寬受業孔安國貧無資賃作帶經而鋤伏息輒誦讀又曰龔遂為渤海太守遂盜賊諸持鋤鉤田器者為良人持杖器者為賊又曰嚴延年為河南太守京兆尹張敞聞延年用刑刻急以書諭之延年報曰河南天下咽喉二周餘獘莠盛苗穢何可不鋤也魏略曰常林為諸生帶經耕鋤其妻餉之相敬如賓蜀志曰先主將誅張裕諸葛亮表請其罪曰芳蘭生門不得不鋤賈子曰商君專任刑法以刻薄為教秦人父子兄弟無父兄之恩踸踞反目有若禽獸借父耰鋤意有得色搜神記曰扶風楊道和於田中值雷雨止桑樹下霹靂擊之道和以鋤格之折其右肱遂落地色如丹目如鏡伏侯古今注曰曾子鋤瓜有三足烏卒其冠世說曰管寧華歆共園中鋤菜忽見地有片黃金管揮鋤與瓦石不異華捉而擲去應璩詩曰古有行道人陌上見三叟年各百餘歲相與鋤禾莠住車問三叟何以得此壽上叟前致辭內中嫗貌醜中叟前致辭量腹節所受下叟前致辭暮臥不覆首要哉三叟言所以能長久錐左傳曰錐刀之末將盡爭之史記曰平原君曰夫賢士之處世譬若錐之處囊中其末立見戰國策曰蘇秦行而歸負書檐囊父母不與之秦歎曰皆秦之罪也乃夜發書陳篋數十得太公陰符伏而讀之欲睡引錐自刺其股血流至踵王隱晉書曰梅陶及鍾雅數記餘事祖約輒困因謂之曰君汝頴之士利如錐我幽冀之士鈍如椎已具椎門中又曰王濬伐吳吳人於江險要害之處作鐵錐長丈餘暗置江中濬乃作大筏先行鐵錐輒著筏去又曰赫連勃勃勃性工巧然殘忍刻暴乃蒸土築城錐入一寸即殺作者錐若不入即殺行錐者而并築之管子曰女有一錐然後成為女孫卿子曰無置錐之地而公侯不能與之爭名仲尼是也莊子曰堯舜有天下子孫無置錐之地韓子曰堯舜無置錐之地於後世而德結呂氏春秋曰子產相鄭十八年刑三人殺三人錐刀之遺於道者莫之敢舉鑽尚書大傳曰古者中刑用鑽鑿物理論曰趙堯錐鑽之吏能探高祖深心致位丞相鉗漢書曰江充捕巫蠱燒鐵鉗灼強服之吳時外國傳曰扶南有訟者燒鐵令赤以鉗舉鐵著手行七步無罪者手不燒有罪者手即燋泥鏝爾雅曰鏝謂之圬郭璞注曰泥鏝也說文曰鏝鐵圬也左傳曰鄭子產相鄭伯如晉晉侯未之見子產使盡壞其館之垣而納車馬焉曰文公之為盟主也崇大諸侯之館圬人以時塓館宮室圬人塗者論語曰宰予晝寢子曰朽木不可雕也糞土之墻不可污也橙續晉陽秋曰何無忌母劉牢之姉也無忌與高祖謀夜於屏風裏制檄文母潛橙於屏風上窺之既知其謀大喜謂曰汝能如此吾讎恥雪矣世說曰謝中郎在壽陽敗臨奔走猶求王怗橙也籃集異記曰丹陽張承先家有鬼長為其取物會有客須蓴斤鯉魚二十頭鬼將一小兒持籃至驃騎街十字路小兒睡覺看籃中已有蒪鯉䈪方言曰䈪所以注斛陳魏宋楚之間謂之䈪或謂之籮自關而西謂之注箕郭璞注曰盛米谷寫斛中也江東亦呼為䈪籮屬形小而高也續搜神記曰吳興人章茍者於田中耕乘小舡以歸籮魚鮭置舡中著菰裏有物輒已食盡如此非一後日磨鍜於菰蘆中見一大虵偷茍以鋘叉之中其虵籠史記曰宋元王二年江使神龜使於河至泉陽漁者豫且舉綱而囚之置籠中見夢於王曰我為江使於河伯而網當路豫且得我王有德義故來告愬又曰齊使淳于髡獻鵠於楚出邑門道飛其鵠揭空籠而獻之東觀漢記曰耿恭於䟽勒城穿井十五丈不得水恭乃正衣冠向井再拜為吏士禱水身自率士負籠有飛泉涌出吏士驚喜皆稱萬歲晉中興徵祥說曰泰元中公王婦女髮緩鬢傾髻以為盛飭用髮豐多不可恒戴乃先於籠上榜之名曰假髻或曰假頭至於貧民不能自辯自號無頭就人借髻亦服之妖也無幾時烈宗晏駕而天下騷動二十年中兵革不息孫恩之亂刑斬無數桓玄之役死者萬計凡被戮之家多亡頭首沈約宋書曰廢帝狂悖無道誅害群臣公卿忌憚諸父並聚之殿內歐棰陵曳無復人理建安王休仁及太宗山陽王休祐形體並肥壯帝以竹籠盛而稱之續述征記曰梁鄒西有籠水發源長城山直北流於梁鄒西注濟水或云齊之孝婦誠感神明湧泉發於室內潛以績籠蔽之人莫之知由是無谷穀汲之勞姑及家人疑而嫉之值出而搜其室既無所覩試發此籠而泉遂濆涌流漂居宇所以名曰籠水也莊子曰一雀過羿羿必得之或以天下為之籠則雀無逃矣是故湯以庖籠伊尹秦穆公以五羊之皮籠百里奚以其所好籠之也淮南子曰張天下以為之籠因江海以為之罟何亡魚失鳥之有乎又曰狐裘負籠甚可怪也世說曰宋處宗甚有思理常得一長鳴雞愛而食之恒籠盛著䆫間雞遂作人語與處宗談論極有言思終日不輟處宗因此言巧大進楚辭曰鳳皇作鶉籠兮雖翕翅其不容傳咸班鳩賦敘云余楸蔚然成林閑居無為有時遊之顧見班鳩音聲可悅於見捕而畜之既已擾馴出之於籠無何失去後時時一來飛翔似如有戀聊為之賦成公綏鸚鵡賦曰小禽也以其能言解意故為人所愛成之以金籠升之以殿堂可謂珍之矣蓋乃未得鳥之性也古詩曰羅敷好蠶桑採桑城南隅青絲為籠繩桂枝為籠鉤沈約宋書曰廢帝狂悖無道誅害群公忌憚諸父並聚之殿內歐棰陵曳無復人理建安王休仁及太宗山陽王休祐形體並肥壯帝每以竹籠盛而稱之籯說文曰籯笭也漢書曰韋賢曰遺子黃金滿籯不如一經
