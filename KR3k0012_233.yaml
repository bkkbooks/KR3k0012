body:
  text: 職官部三十鴻臚卿六典曰鴻臚卿之職掌賓客及凶儀之事領典客司儀二署以率其官屬而供其職務少卿為之二凡四方夷狄君長朝見者辨其等位以賓待之凡二王之後及夷狄君長之子襲官爵者皆辨其嫡庶詳其可否若諸蕃大酋渠有封禮命則受冊而往其國韋昭辨釋名曰腹前肥者臚言以京師為心腹王侯外國為四體以養之也辨云鴻臚本故典客掌賓禮鴻大也臚陳序也欲以大禮陳序賓客也漢書曰田序字子公連檎大姦徵為大鴻臚又曰典客秦官掌諸侯歸義蠻夷有丞景帝中六年更名大行令武帝太初元年更名大鴻臚東觀漢記曰大鴻臚漢舊官建武元年復置屬官有丞一人大行丞一人有理禮員四十七人主齊祠儐贊九賓之禮續漢書曰大鴻臚卿一人中二千石諸王入當郊迎典其禮儀及郡國上計并屬焉皇子拜王贊授印綬及拜諸侯嗣子及四方夷狄封者鴻臚召拜之謝承後漢書曰陳紀字元方遭父太丘長實憂嘔血絶氣豫州嘉其至行表上尚書圖畫百城以勵風俗袁紹以太尉讓紀紀不受拜大鴻臚卒官子群為三公天下以為公慚卿卿慚長又曰白嵩字季山為濟南相甘露降於郡安帝嘉其致瑞徵拜大鴻臚漢官解詁曰鴻聲也臚傳也所以傳聲贊導九賓也又曰昔唐虞賓于四門此則禮賓之制與鴻臚之任亦同漢雜事曰蕭為陳留太守入為鴻臚不任賓贊還官魏志曰崔林字德儒清河東武城人也遷大鴻臚龜茲王遣侍子來朝廷嘉其遠至褒賞其王甚厚餘國各遣子來朝問使連蜀林恐所遣或非真的權取疏屬賈胡因通使命利得印綬而道路護送所損滋多勞所養之民資無益之事為夷狄所笑此曩時之所患也乃移書燉煌諭旨并録前世待遇諸國豐約故事使有恆魏略曰韓宣字景然為大鴻臚始南陽曲阜韓暨以宿德在宣前為大鴻臚及宣在官亦稱職故鴻臚中為之語曰大鴻臚小鴻臚前後治行相曷如蜀志曰杜瓊字伯瑜後主立為大鴻臚為人靜默少言闔門自守不與世事吳志曰張儼字子節吳人也弱冠知名早歷顯位以博聞多識拜大鴻臚使于晉皓謂儼曰南北通好以君有出境之才故相屈行對曰皇皇者華臣蒙其榮懼無古人延譽之美磨厲鋒鍔思不辱命既至車騎將軍賈充尚書令裴秀侍中荀勗等欲傲以所不知而不能屈尚書僕射羊祜尚書何禎並結縞帶之好唐書官品志曰鴻臚卿位視尚書右丞掌導護贊拜山濤啓事曰鴻臚職主胡事前後為之者率多不善了今缺當選御史中丞刀攸不審可爾不鴻臚少卿後魏職令曰鴻臚少卿第四品上第二清用雅學詳當明樞達理者隋書曰煬帝時蠻夷朝貢前後相屬帝從容謂宇文述虞世基等曰四夷率服觀禮華夏鴻臚之職須歸令望寧有多才藝美容儀可以接對賓客者為之乎咸以蘇夔對帝然之即日拜鴻臚少卿典屬國漢書曰武帝以移音移中監蘇武為典屬國又曰宣帝甘露二年以常惠為典屬國又曰典屬國秦官掌蠻夷降者成帝河平元年省併大鴻臚司農卿六典曰司農卿之職掌邦國倉儲委積之事惣上林太倉鉤盾導官四署與諸監之官屬謹其出納而修其職務少卿為之二凡京都百司官吏祿廩皆仰給焉周禮曰冢宰有太府下大夫鄭玄注曰太府為王治藏之長若今司農矣史記曰韓信歸漢漢以為治粟內史漢書曰治粟內史秦官掌穀貨景帝更名大農令武帝更名大司農又曰鄭當時字莊為司農門下客至無貴賤無留門者執賓禮以下人山東諸公翕然稱莊曰吾聞鄭莊行千里不齎糧又曰朱邑為北海太守以治行第一入為大司農身為列卿居處節儉性公正不可交以私天子器之朝廷敬焉及卒詔稱揚其節行賜邑子黃金百斤以奉其祭祀又曰田延年為大司農坐盜都內錢三千萬自殺又曰平帝元始元年改大司農曰羲和以劉歆為之東觀漢記曰劉據為大司農以職事被譴召詣尚書將加捶撻尚書左雄諫帝曰九卿位亞三公行則鳴玉孝明永平始加撲罰非古制也帝從之卿於是始免撲捶又曰高詡字季回以儒學徵拜大司農在朝以清白方正稱又曰羊融字子優為大司農性明達稱為名卿續漢書曰李固為大司農上信閹官天下牧守多其宗親舊故及受貨賂有詔特拜不由選試亂生彌甚固乃上表具陳盜賊所以興由官非其人也又曰大司農卿一人中二千石掌諸錢穀金帛又曰趙典字仲經為大司農閉門却掃非德不交又曰耿國字叔慮為大司農曉邊事能論議數上便宜事天子器之又曰鄭玄公車徵為大司農給安車一乘所過長吏送迎張璠漢記曰陳寵為廣漢太守風聲大行入為大司農應劭漢官儀曰大司農古官也唐虞分命羲和四子敬授民時高祖受命懲秦之弊與民休息逮至文景國家無事家給人足京師之錢纍百巨萬貫杇而不可校太倉之粟陳陳相因充溢露積腐敗而不可食魏志曰梁習為并州二十餘年政治為天下最乃徵拜大司農吳志曰樓玄為大司農玄從九卿持刀衛正身率衆奉法而行應對切直數忤皓意漸見責怒後人誣曰玄與賀劭相逢駐共耳語大笑謗訕政事遂被詔詰責送付廣州晉陽秋曰司農梪範字元則出奔曹爽云大司農印在吾手中所在得開倉而食宋書曰大司農卿一人書稱棄后稷其職也齊職儀曰司農卿耕籍則掌其禮儀隋書曰趙元淑轉頴川太守甚有惠政因入朝會司農不時納諸郡租穀元淑奏之帝謂元淑曰如卿意者幾日當了元淑曰如臣意不過十日帝即日拜元淑為司農卿納天下租如言而了帝悅焉唐書官品志曰司農卿位視散騎常侍主農功倉廩統太倉導官籍田上林令韓楊天文要集曰天倉者大司農也異苑曰吳郡岑淵為吳郡時大司農卿碑注在江乘湖西太元中村人見龜載從田中出還其先處萍藻猶著腹下史游急就篇曰司農少府國之泉也司農少卿後魏職令曰司農少卿第三清用堪勤有幹能者唐書曰韋弘機為司農少卿受詔檢校東都營田園苑之事高宗謂之曰兩都是朕東西二宅也今之宮館隋代所造歲序既淹漸將頽頓欲有修造又費財力如何弘機奏曰臣任司農向已十年前後省費今見貯錢三千萬貫若以供葺理可不勞而就也上大悅上林苑令漢書百官表曰水衡屬官有上林令續漢書曰上林苑令六百石主苑中禽獸有民居皆主之捕得獸送太官李郃別傳曰郃以郎謁者為上林苑令揚雄上林苑令針曰芒芒天田芃芃作穀山有陵陸野有林麓夷原汙藪禽獸攸伏魚鱉以時芻堯咸植國以殷富民以家給太倉令六典曰太倉署令掌九穀廩藏之事丞為之二凡鑿窖置屋皆銘甎為庾斛之數與其年月日受領粟官吏姓名又立碑如其銘焉漢書曰淳于意為太倉令續漢書曰太倉令一人秩六百石主受郡國轉漕穀梁冀別傳曰太倉令秦宮出入冀妻壽所語言飲食獨往獨來屏去御者宮冀倉頭壽姊夫宗欣不知書因壽氣力起家拜太倉令齊職儀曰太倉令周司徒屬官有廩人倉人則其職也導官令六典曰導官令掌導擇米麥之事凡有九穀之用皆隨其精粗差其耗損而供之漢書百官表曰少府屬官有導官如淳曰太官之別主酒也續漢書曰導官令一人主舂御米及作乾糒導擇也太府卿六典曰太府卿之職掌邦國賦貨之事惣京都四市平准左右藏常平八署之官屬舉其綱目修其職務少卿為之二以二法平物一曰度量二曰權衡周禮曰天官屬有太府下大夫掌貢賦受其貨賄之入梁書曰天監七年置太府班第十三掌金帛府帑統右藏令上庫丞太市南市北市令關津亦皆屬焉後魏書曰楊播字延慶弘農華陰人也播少修勑奉親盡禮纍遷右衛將軍從車駕南巡到懸瓠除太府卿唐書曰楊崇禮為太府少卿雖錢帛充仞丈尺間皆躬自省閲時議以為稱職擢拜太府卿每歲勾剝省便常出數百萬貫在職二十年公清如一時太平日久御府財物山積以為經楊卿者無不精好唐書官品志曰太府卿位視宗正掌金帛府帑統右藏令太府少卿後魏職令曰太府少卿第四品上士人官上用勤篤有幹細務無滯者唐新語曰狄光嗣仁傑長子也睿宗朝起復除太府少卿光嗣頻表不起乃降勑朕念卿家門忠於王室奪卿情理以答殊恩卿屢表固陳詞理懇至循環省覽有足可矜今遂所請用勸浮薄待卿情禮云畢更俟後命仍編入史市令六典曰京都諸市令掌百族交易之事丞為之二凡建摽立候陳肆辨物以二物平市謂稱以格斗以概也以三賈均平市精為上賈次為中賈粗為下賈凡賣買不和而攉固攉謂專略其利固謂鄣固其市及更出開閉共限一價謂賣物以賤為貴買物以貴為賤也若參市而規自入者並禁之謂在旁高下其價以相惑亂史記曰司馬談祖為漢市長漢書百官表曰內史屬官有長安市長又長安四市令長丞屬左馮翊東觀漢記曰祭遵從征河北為軍市令舍中兒犯法遵格殺之上怒命收遵時主簿陳副諫曰明公常欲衆軍整齊今遵奉法不避是教令行也上乃貸之以為刺姦將軍語諸將曰當備祭遵吾舍中兒犯令尚殺之必不私諸卿也晉書曰石苞賣鐵鄴市市長沛國趙元儒名知人見而異之便與結交歎其遠量當至公輔齊職儀曰市令周有司廛肆師司市皆其任也平准令六典曰平准令掌供官市易之事丞為之二凡百司不任用之物則以時出貨其沒官物者亦如之韋昭辨釋名曰釋云平准令主染色色有常平之法淮的之也辨云主平物價使相依准史記曰桑弘羊以物多騰躍請置平准於京師受天下委輸盡籠天下之貨物貴則賣之賤則買之如此則富啇大賈無所牟大利矣始置平准焉漢書百官表曰司農屬官有平准令丞漢書曰趙廣漢清潔下士有名譽州舉茂才拜平准令續漢書曰平准令六百石齊職儀曰染署掌染繒色少昊置五雉為工正翬雉氏設五色之工周有染人之職掌絲帛以為服左右藏令六典曰左藏令掌邦國庫藏之事丞為之二凡天下賦調先於輸場閲其合尺度斤兩者卿及御史監閲然後納于庫藏皆題以州縣年月以別粗良辨新舊也又曰右藏署令掌邦國寶貨之事丞為之二凡四方所獻金玉珠貝玩好之物皆藏之出納禁令如左藏之職齊職儀曰右藏庫周天府內府之任天府物所藏也內府掌邦市之出入以待王用後漢中藏府令丞掌幣帛金銀諸物晉置中黃左右藏
