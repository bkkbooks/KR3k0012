body:
  text: 百卉部一草爾雅曰卉草也草謂之華木謂之榮不榮而實者謂之秀榮而不實者謂之英尚書禹貢曰兗州厥草惟繇繇茂也徐州草木漸包漸進也包叢生也楊州厥草惟夭少長曰夭並出書注毛詩緇衣野有蔓草曰野有蔓草零露溥兮蔓延也溥漙然盛多也毛詩問答曰國多兵役男女怨曠於是女感傷而思男故出遊於洧之外託采芬香之草而為媱妷之行時草始生而云蔓者女情急欲以促時也周禮秋官下剃氏曰剃氏掌殺草春始生而萌之夏日至而夷之秋繩而芟之冬日至而耜之鄭玄曰含實曰繩也大戴禮曰孟春冰泮百草權輿禮記月令曰孟夏之月靡草死鄭玄曰舊詵靡草薺葶藶之屬季夏之月大雨時行燒剃行水利以殺草剃迫地芟草也剃草乾燒之至此雨水蓄水其中則草死不生也又曰霜降之日草木黃落又檀弓上曰曾子曰日朋友之墓有宿草而不哭焉左傳襄公曰松柏之下其草不殖又僖公曰一薰一蕕十年尚猶有臭蕕臭草薰香草也春秋潭潛巴曰下不廉蜚廉之草為不生言瑞應之物應行上論語曰君子之德風小人之德草草上之風必偃漢書五行志曰元帝永光二年天雨草葉相糾結如彈丸續漢書五行志曰靈帝中平元年夏東郡陳留濟陽長垣濟陰諸縣界有草生莖大如手指狀似鳩爵龍蛇鳥獸之形五色各如其物毛羽頭目足翅皆具又曰西夜國生獨白草煎以為藥傳箭所射輒死崔鴻十六國春秋西秦録曰永和二年國中地震百草皆自及晉書載記曰符堅至壽春與符融登城而望王師見部陳齊整將士精鋭又北望八公山上草木皆類人形顧謂融曰比亦勍敵也何謂少乎憮然有懼色後周書曰字文深字奴干性鯁正有器扃年數歲便纍石為營伍并折草作旌旗布置行列皆有軍陳之勢父永遇見之乃大喜曰汝自然知此於後必為名將又曰宕昌羌俗無文字但候草榮落以記歲時呂氏春秋曰草有華有藟獨食之則殺人合而食之則益壽淮南子曰神農始嘗百草一日七十毒又曰逮至衰世草木之勾萌銜華佩實而死者不可勝數符子曰鄰人謂展禽曰魯聘夫子夫子三黜無憂色何禽曰春風鼓百草敷蔚吾不知其茂秋霜降百草零落吾不知其枯人物志曰草之將精者為英獸之將群者為雄張良是英韓信是雄也水經曰魏興錫義山山高谷深多生薇蘅草其草有風不偃無風獨搖又曰建寧郡山生牧靡可以解毒百卉方盛鳥多誤食烏喙口中毒必急飛往牧靡山喙牧靡以解毒也金樓子曰魯城北孔子塋中不生㓨人草木崔豹古今注曰牛亨問曰草木生類也有識乎答曰物有生而有識者有生而無識者有不生而有識者有不生而有識者不生無識者夫生而有識者蟲類是也生而無識者草木是也不生而有識者鬼神是也不生而無識者水土是也又曰天雨草狀如莎絞如丸無數皆名曰蓮蔞草郭子橫河冥記曰東方朔曰臣有吉雲草十頃種於九景山東二千歲一花此草難種東取璋琅山表之澗以灑之臣種來一千九百九十九年矣明年應生臣走往刈收之以秣馬馬食不覺飢帝許之朔平旦去至暮而返背負數束其形葉似夌而金色裁長二尺銼以飼馬即不覺飢武帝曰種之生否朔曰臣東遊過吉雲之澤多生此草移於九景之山大不如吉雲之地又曰甜溪水如蜜東方朔遊此水還將數斛以獻帝帝投陰井井裏遂恆甜而寒洗肉肌理柔滑瑤琨去玉門九萬里有碧草如夌銼之以釀則味如酒而釅烈看之則顏色如醉飲一合則三旬不醒飲甜水則隨飲隨醒也異苑曰青州劉㦎音獲元嘉初射得一麞割五藏以草塞之蹙然起走㦎怪而拔塞便復還倒如此三焉㦎蜜録此種以來其治傷痍多愈三齊略記曰不其城東有鄭玄教授山山下生草如薤葉長尺餘堅紉異常土人名作康成書帶括地圖曰君子民帶劍使兩文虎衣野絲土方千里多薰華之草好讓故為君子國薰華草朝生夕死大極山西有采華之草服之乃通萬里之言服虔通俗曰草盛曰菶脯朦切生茂曰葆音保方言曰凡草生而初達謂之䓲䓲音悅小也荄杜根也東齊曰杜或曰茇博物志曰太原晉陽已北生屏風草又曰黃帝問天老曰天地所生豈有食之令人不死者乎天老曰太陽之草名曰黃精餌而食之可以長生太陰之草名曰鉤吻入口立死人信鉤吻之殺人不信黃精之益壽不亦惑乎又曰海上有草焉名曰蒒音師草其實食之如大夌從七月稔熟民斂穫名曰自然榖或曰禹餘糧又曰類草也其根名為弱頭大者大如升其外理白可以灰汁煮則疑成熟可以苦酒淹食之不以灰煮則不成熟蜀人珍貴之異物志曰文草作酒能成其味以金買草不言其貴以美用之故也王逸子曰草有玄巨暢威喜木有扶桑梧桐松柏皆受氣淳美異於群類者也風俗通曰靈帝光和七年陳留濟陰諸郡路邊草生作人狀操持矛弩牛馬萬狀備具後關東誅董卓陳留濟陰棄好即戎吏民殲殘草妖之興豈不或信抱朴子曰草有黃精一名白及有鴟頭鵝尾雞腸烏喙而非有翼之鳥也靈書記曰霍山上有神草三十四種典術曰壽榮草出少室金山丘下服之令人不老取葉服之可通百神又曰餌玉長生草一名通天價直千萬陰乾方寸七日再服之令人得仙師曠占曰黃帝問師曠曰吾欲知歲苦樂善惡可知不對曰歲欲豐甘草先生甘草薺也歲欲儉苦草先生苦草者葶藶也歲欲惡惡草先生惡草者水藻也歲欲旱旱草先生旱草者蒺藜也歲欲潦潦草先生潦草者蓬也淮南萬畢術曰回風之草見八方取回風草三寸三枚五寸五枚以城西面土三家不汲井中青泥南雞欲上栖不上者并治合為丸磨其面目出戶視八方矣楚辭曰春草生兮萋萋王孫遊兮不歸古詩曰回車駕言邁悠悠涉長道四顧何芒芒東風搖百草又曰新樹蘭蕙葩雜用杜衡草終朝採草榮日暮不盈抱採之欲遺誰所思在遠道又曰穆穆清風止吹我羅裳裾青袍似春草長條從風舒又曰青青陵中草傾葉晞朝日陽春被惠澤枝葉可攬結草木為恩感況人含氣血薜荔山海經曰小華之山有草焉曰薜荔狀如烏韭緣木而生或生石上食之以已心痛楚辭曰罔薜荔兮為帷罔結也結辟荔為帷帳也劈惠櫋音眠兮既張劈析也以折蕙覆櫋屋上也又曰採薜荔兮水中搴芙蓉兮木末又曰若有人兮山之阿被薜荔兮帶女蘿石蘭楚辭曰疏中石蘭兮以為芳王逸曰石蘭香草疏布也胡繩楚辭曰索胡繩之纚纚胡繩香草也霸熏范子計然曰霸薰出霸陵也楚薰范子計然曰楚薰出洛陽也楚蘅范子計然曰楚蘅出楚國也秦蘅宋玉風賦曰夫風翱翔激水之上擊芙蓉之精獵蕙草離秦蘅龍鬚山海經曰賈超之山草多龍鬚廣志曰龍鬚一名西王母簪水經曰自洮強南北三百里中地草並是龍鬚而無樵柴周景式廬山記曰石門峰石間多龍鬚草遊名山志曰龍鬚草唯東陽永嘉有永嘉有縉雲堂意者謂鼎湖攀龍鬚時有墜落化而為草故有龍鬚之稱鄭緝之東陽記曰仙姥巖間不生蔓草盡出龍鬚本草經曰西超山多龍循龍鬚也一名續斷狼尾爾雅曰孟狼尾也郭璞注曰似茅今人亦以覆屋廣志曰狼尾子可作黍燕夌爾雅曰籥雀夌郭璞曰即燕夌古歌曰田中菟絲何嘗可絡道邊燕夌何常可穫荊葵爾雅曰荍音翹蚍嬋支切衃房尤切也郭璞曰今荊葵也似葵紫色謝氏云小草多華少葉葉又翹起毛詩宛丘東門之枌曰視爾如荍詩義疏曰荍一名楚葵崔豹古今注曰荊葵一名茙葵一名芘芣花色奪目有紅有白有赤但花異葉不殊也蜀葵爾雅曰菺音堅戎葵也郭璞曰今蜀葵花似木槿傅玄蜀葵賦序曰蜀葵其苗如瓜瓠嘗種之一名引苗而生華經二年春乃發虞繁蜀葵賦曰惟茲珍草懷芬吐榮挺河渭之膏壤吸升井之玄精繞銅爵而疏植映昆明而羅生莬葵爾雅曰莃虛機切莬葵郭璞曰頗似葵而葉小狀如藜有毛汋啖之滑廣志曰菟葵爚之可食鳧茈爾雅曰芍都了切鳧茈也生下田苗似龍鬚而細根如指頭黑色可食東觀漢記曰王莽末南方枯旱民多餓群入野澤掘鳧茈而食之烏韭廣雅曰昔耶烏韭也生久屋之瓦在房曰昔耶在牆曰垣衣鹿豆爾雅曰蔨音卷切鹿藿也其實莥郭璞曰今鹿豆也葉似大豆根黃而香蔓延生莉音紐說文曰莥鹿藿之實也本草經曰鹿藿味苦平無毒主治蠱毒女子腰腹痛不樂腸癰瘰癘瘍氣生汶山山谷鹿蔥風土記曰宜男草也宜懷娠婦人佩之必生男傅玄宜男花賦曰猗猗令草生于中方華曰宜男號膺禎祥嵇含宜男花序曰宜男花者世有之久矣多殖幽皋曲隰之側或華林玄圃非衡門蓬宇所宜序也荊楚之土號曰鹿葱根苗可以薦於俎世人多女欲求男者取此草服之尤良也
