body:
  text: 果部十一枳梖毛詩嘉魚南山有台曰南山有枸北山有楰枸枳枸詩義疏曰枳枸樹高大如白楊所在皆有子著支端支柯不直噉之甘美如飴八九月熟江南特美今官園種之謂之木蜜能令酒味薄若以為屋柱則一屋酒可薄禮記曲禮下曰婦人之贄椇榛脯修鄭玄曰椇枳椇也廣志曰枳椇葉似柳子似珊瑚其味如蜜十一月熟樹乾者益美出南方大如指頭崔豹古今注曰枳椇子一名樹蜜一名木餳實形拳曲核在實外味甜美如餳蜜一名白石一名木石一名枳椇也探薛瑩荊楊以南異物志曰探子樹産山中實似梨冬熟味酸丹陽諸郡有之蒳異物志曰蒳草樹果如栟櫚而小三月採其葉細破乾之味近苦甘并雞舌香食之益善也顧徽廣州記曰山檳榔大於蒳子蒳子土人亦呼為檳榔左思吳都賦曰藿蒳豆蔻木威顧徽廣州記曰餘甘甘蕉木威黃皮其味殊苦顧徽廣州記曰木威高丈餘子如橄欖而堅削去皮以為粽榞木吳録地理志曰廬陵南部雩都縣有榞樹其實如甘蕉而核味亦如之朹爾雅曰朹檕音計梅也郭璞注曰朹樹似梅子如指頭可食赤色似小㮏也棪爾雅曰棪音琰㯈音速郭璞注曰棪實似橑赤可食山海經曰庭之山其上多棪木郭璞注曰即㯈也曹毗魏都賦曰果則谷棪山楟音亭楊桃臨海異物志曰楊桃似南方橄欖子其味甜常五月十月熟謔言楊桃無蹙一歲三熟其色青黃核如棗核臨海異物志曰楊桃子生晉安候官縣一小樹得數十石實大三寸可蜜藏之庾仲初楊都賦曰楊桃枇杷楊榣臨海異物志曰楊榣有七脊子生樹皮中其體雖異味則無奇長四五寸色青黃味甘也冬熟臨海異物志曰冬熟如指大正赤其味甘勝梅猴闥臨海異物志曰猴闥子如指頭大其味小苦可食關桃臨海異物志曰關桃子其味酸土翁臨海異物志曰土翁子如漆子大熟時甜酸其色青黑狗槽臨海異物志曰狗槽子如指頭大正赤其味甘雞橘臨海異物志曰雞橘子如指頭大味甘永寧南界中有之猴總臨海異物志曰猴總子如指頭大與柿相似其味不減於柿多南臨海異物志曰多南子如指大其色紫味甘與梅子相似晉安候官界中有王壇臨海異物志曰王壇子如棗大其味甘晉安候官越王祭壇邊有此果無知其名因見生處遂名王壇其形小於龍眼有似木瓜七月熟甘美也王彪之閩中賦曰王壇侯栗楊都賦曰草則龍目荔支王壇丹橘三廉陳祈暢異物志曰三廉大實實不但三雖名三廉或有四五六枝食之多汁味酸且甘藏之尤好與衆果相參鬼目爾雅曰符鬼目郭景純曰今江東有鬼目草莖似葛葉圓而毛子如耳璫赤色叢生廣志曰鬼目似梅南人以飲酒南方草木狀曰鬼目樹大者如木子小者如鴨子二月花色仍連著實七月八月熟其色黃其味酸以蜜煮之滋味柔嘉交址武平興古九真有之裴淵廣州記曰鬼目益智直爾不敢噉可為漿也交州記曰鬼目樹似棠梨葉似楮皮白樹高大如木瓜而小邪傾不周正味酢九月熟又有草眯子亦如之亦可為糝周其草似鬼目甘蔗說文曰薯蔗也漢書禮樂志郊祀歌曰百味旨酒布蘭生泰尊柘漿析朝酲應劭曰柘漿取柘汁以為飲也吳録地理志曰交址句屚音漏縣干蔗大數寸其味醇美異於他處笮以為餳曝之凝如冰破如博碁入口消釋江表傳曰孫亮使黃門以銀碗并蓋就中藏吏取交州所獻甘蔗餳黃門先恨藏吏以鼠矢投餳中啓言吏不謹亮呼吏持餳器入門曰此器既蓋之且有油覆無緣有此也黃門將有恨汝耶叩頭曰常從臣求官莞席有數不敢與亮曰必是此也問具服即於前加髡鞭斥外付晉書曰顧愷之每食蔗自尾至本人或問之曰漸入佳境宋書曰庾仲文好貨劉雍自謂得其助力事之如父夏中送甘蔗又曰元嘉末魏太武征彭城遣使至小市門致意求甘蔗及酒孝武遣人送酒二器甘蔗百挺齊書曰宜都王鏗善射常以堋的太闊曰終日射侯何難之有乃取甘蔗插地百步射之十發十中又曰范雲永明十年使魏魏人李彪宣命至雲所甚見稱美彪為設甘蔗黃粽隨盡復益彪笑謂曰范散騎小驗之一盡不能復得梁書曰庾沙彌性至孝母劉亡好噉甘蔗沙彌遂不食焉三國典略曰陸納反湘州分其衆二千人夜襲巴陵晨至城下宜豐侯修出壘門座胡床以望之納衆乘水來攻矢下如雨修方食甘蔗曾無懼色部分軍旅鼓而進之遂獲其一艦生擒六千人納遂歸保長沙又曰侯景至朱雀街南建康令庾信守朱雀門俄而景至信衆撤桁始除一舶見景軍皆著鐵面退隱于門自言口糝屢求甘蔗俄而飛箭中其門柱信手中甘蔗應弦而落隋書曰赤土國物産多同於交址以甘蔗作酒雜以紫瓜根酒色黃赤味亦香美永嘉郡記曰樂城縣三州府江有三洲因以為名對岸有浦名為菰子出好甘蔗盧諶祭法曰冬祀用甘蔗范汪祠制曰孟春祠用甘蔗扶南傳曰安息國出甘蔗廣志曰甘蔗其餳為石密雲南記曰唐韋齊休聘雲南會川都督劉寬使使致甘蔗蔗節希似竹許消去後亦有甜味神異經曰南方荒內𤮽蔗林其高百丈圍三丈促節多汁甜如蜜𤮽音干蔗音柘異物志曰甘蔗遠近皆有交址所産特醇好本末無薄厚其味甘圍數寸長丈餘頗似竹斷而食之既甘生取汁為飴餳益珍煎而暴之凝如冰甄異傳曰隆安中吳縣張牧字君林忽有鬼來無他須臾唯欲噉甘蔗自稱高褐主人因呼阿褐牧母見之是小女面青黑色通身青衣魏文帝典論曰嘗與平虜將軍劉勳奮威鄧展等共飲宿聞展有手臂曉三兵余與論劍酒酣耳熱方食干蔗便以為杖下殿數交三中其臂袁子正書曰歲比不登凡不給之物若干蔗之屬皆可權禁楚辭曰臑奴到切鱉炮羔有柘漿柘蔗也司馬相如子虛賦曰諸柘巴苴詣柘甘柘張協都蔗賦曰若乃九秋良朝玄酎初出黃華浮觴酣飲纍日挫斯柘而療渴若漱醴而含蜜清滋津於紫梨流液豐於朱橘曹植詩曰都蔗雖甘杖之必折巧言雖美用之必滅張載詩曰江南都蔗釀液澧沛三巴黃甘瓜州素㮏凡此數品殊美絶快渴者所思銘之裳帶李伯仁七款曰副以甘柘豐弘誕節纖液玉津旨於飴蜜虞翻與弟書曰有數頭男皆如奴僕伯安雖癡諸兒不及觀我所生有兒無子伯安三男阿思似父思其兩弟有似人也去日南遠恐如甘蔗近抄即薄應璩與尚書諸郎書曰檀氏園葵菜繁茂諸蔗瓜芋亦離尚萌未知三生復何種植馮衍杖銘曰杖必取材不必用味相必取賢不必所愛都蔗雖甘猶不可杖佞人悅己亦不可相甘薯南方草物狀曰甘薯民家常以二月種之至十月乃成卵大者如鵝小者如鴨掘食其味甜經久得風乃淡泊耳出交址武平九真興古陳祈暢異物志曰甘薯似芋亦有臣魁剝去皮肌肉正白如昉南方人專食之以當米穀蒸炙皆香美賓客酒食亦施設有如果實也燕薁毛詩豳七月曰六月食鬱及薁薁櫻薁也毛詩題綱曰葛藟一名燕薁藤好生河滸邊得水潤而長喻王九族蒙王恩惠以育子孫今王無澤於族人不如葛藟生河滸邊也廣雅曰燕薁嬰舌也廣志曰燕薁似梨早熟魏王花木志曰燕薁實大如龍眼黑色說文謂之嬰薁詩義疏一名車鞅藤豳詩七月食鬱及薁此名燕薁潘嶽間居賦曰梅香薁棣之屬繁榮藻麗之節曹毗魏都賦曰英梅楊李若留郁棣郁俗謂煔郁廉薑廣雅曰蔟葰相維切廉薑也湘州記曰始安縣空龍山精了山出廉薑食經曰廉薑法蜜煮烏梅去滓以滓廉薑再三宿色黃赤如琥珀劉楨清慮賦曰仰稱木韭俯拔廉薑
