body:
  text: 鱗介部三龜爾雅曰龜三尺賁今吳興陽羡縣君山上有池池中有六眼龜龜俯者靈行頭低仰者謝行頭仰前弇諸果甲前長後弇諸獵左倪不類行頭今江東所謂者以甲卜審右倪不若行頭右庳為右食甲形皆爾一曰神龜龜之最神明二曰靈龜涪陵郡出大龜甲可以卜緣中文似玳瑁俗呼為靈龜即今觜𧓈龜一名靈𧓈能鳴𧓈以規切三曰攝龜小龜也腹甲曲折解能自張閉好食蛇江東呼為靈龜也四曰寶龜書曰遺我大寶龜五曰文龜甲者文彩者河圖曰靈龜負書丹甲青文六曰筮常在著藂下潛伏見龜榮傳七曰山龜八曰澤龜九曰水龜十曰火龜此者說龜生之處所火龜猶火鼠耳物有含異氣者不可以常理推然亦無所怪周易曰或益之十朋之龜又說卦曰離為龜京房易緯曰靈蓍四十九莖下有千歲神龜守之焦贛易林曰龜猒江海陸行不止自令枯藁失其都市尚書皋陶謨曰昆命于元龜又禹貢曰九江納錫大龜又曰寧王遺我大寶龜文王也遺我大寶龜疑則卜之尚書中候曰堯沉璧於洛玄龜負書出背甲赤文朱字止壇場沉璧於河黑龜出赤文題又曰周公攝政七年制禮作樂成王觀於洛沉壁禮畢王退有玄龜青純蒼光背甲刻書上躋于壇赤文成字周公寫之雒書曰靈龜者玄文五色神靈之精也上隆法天下法地能見存亡明於吉凶王者不偏黨尊耆老則出洪範五行曰龜之言久也十歲而靈比禽獸而知吉凶者也周禮天官上鱉人曰春獻鱉蜃秋獻龜魚又春官下龜人曰龜人掌六龜之屬各有名物天龜曰靈屬地龜曰緯屬東龜曰果屬西龜曰雷屬南龜曰獵屬北龜曰若屬凡取龜用秋時攻龜用春時各以其物入于龜室六龜各異室也大戴禮曰甲之蟲三百六十而神龜為之長禮記月令曰季秋登龜取黿甲類秋乃堅成故是月登取又學記曰青黑緣者天子之寶龜也又禮運曰麟鳳龜龍謂之四靈逸禮曰天子龜尺二寸諸侯八寸大夫六寸士民四寸龜者陰蟲之老也龜三千歲上游於卷耳之上老者先知故君子舉事必考之禮統曰神龜之象上員法天下方法地背上有盤法丘山玄文交錯以成列宿五光昭若玄錦文運轉應四時長尺二寸明吉凶不言而信左傳襄二十三年曰臧武仲自邾使告臧賈且致犬蔡焉大蔡臧文仲所居大龜也曰紇不佞失守宗祧祧廟敢告不吊言我為人後不乞至於道而失守紇之罪不及不祀不祀絶也言宜有後也子以大蔡納請其可請為先人立後其必可也賈曰聞命矣再拜受龜公羊傳定公曰弓繡質質祔龜青純純緣春秋運斗樞曰瑤光星散為龜史記龜策傳曰余至江南觀其行事問其長老云龜於歲乃遊蓮葉之上江傍家人嘗畜龜飲食之以為能導引致氣有益於助衰養老豈不偉哉史記褚先生曰能得名龜者財物歸之家必大富至千萬一曰北斗龜二曰南辰龜三曰五星龜四曰八風龜五曰二十八宿龜六曰日月龜七曰九州龜八曰王龜凡八名龜龜各有文在腹下此龜不必滿尺二寸民人得長七八寸可寶矣神龜出於江中廬江郡常歲時出龜長尺二寸者二十枚輸太卜官太卜官因以吉日剔取其腹下甲龜千歲乃滿尺二寸有神龜在江南嘉林中嘉林者獸無虎狼鳥無鴟梟草無毒螫野火不及斧斤不至是謂嘉林龜在其中嘗巢於芳蓮之上左脅書文曰甲子重光得我者匹夫為人君有土正諸侯得我為帝王南方老人用龜支床足行二十餘歲老人死後移床龜尚生能行氣導引又曰宋元王二年江使神龜使於河至於泉陽漁者豫且舉網得而囚之置之籠中夜半龜來見夢於宋元王曰我為江使於河而網當吾路泉陽漁者豫且得我我不能去身在患中王有德義故來告訴元王惕然乃召博士衛平而問之平曰龜也王求之泉陽豫且曰夜半舉網得龜使者載行入端門見王延頸而前三步而止縮頸而卻復其故處於是元王擇日齊戒以刀剝之元王之時衛平相宋宋國最強龜之力也魏略曰文帝時神龜出於靈芝池晉書曰懷帝永嘉元年有玉龜出於霸水也崔鴻十六國春秋前燕録曰海出大龜枯死於平墩遼東送之侍郎王弘以為宇文允得龜滅亡之徵也晉書曰符堅末高陸人穿井得龜大三尺背上有文象八卦堅命太卜池養之食以粟及死藏其骨於太廟是夜廟丞高虜夢龜謂之曰我本出將歸江南遭時不遇殞命秦庭又有人夢於虜曰龜三千六百歲終必妖興亡國之象也其後竟驗又載記曰乞伏國仁隴西鮮卑人也昔有如弗斯出連叱盧三部自漠北南出太陰山遇一巨蟲於路狀若神龜大如阜乃殺馬而祭之祝曰若善神也便開路惡神也遂塞不通俄而不見乃有一小兒在焉南齊書曰永明年唐潛獻青毛神龜一頭梁書曰元帝為江州刺史時有安成望族劉敬躬者田間得白蛆化為金龜將銷之龜生光照室敬躬以為神而禱之所請多驗也三國典略曰梁陸法和至襄陽城北大樹下畫地方二尺令弟子掘得一龜長一尺五寸杖叩之曰汝欲出此已數百歲若不遇我豈見天子日為授三歸龜乃入草去陳書曰武宣章皇后母常遇道士以小龜遺己光采五色曰三年有徵及朞后生紫光照室因失龜所在隋書曰開皇中掖庭宮每有人來挑宮人宮司以聞帝曰門衛甚嚴人何從而入當是妖精耳因戒宮人曰若逢但斫之其後有物如人夜來登床宮人抽刀斫之若中枯骨其將落床而走宮人逐之因入池而沒明日帝令涸池得一龜徑尺餘其上有刀跡煞之遂絶唐書曰先天二年丁未江州獻靈龜六眸腹下有玄文象卦文梁記曰朱友貞末年許州獻緑毛龜以為瑞因宮中造室以居之目為龜堂晉史曰安州李金全之將叛也郡樓有介蟲如龜而巨鱗鋭首能陷堅出於金全足下金金惡而焚之列子曰渤海之東有大睿焉其中有山無所連著常隨潮波上下往還不得暫峙焉仙聖毒之訴於上帝帝恐流於西極失群聖之居使巨龜十五舉首而戴之迭為三番六萬歲一交焉五山始峙而不動龍伯之國有大人舉足而不盈數十步而暨五山之所一釣而連六龜合負而趣歸其國灼其骨以數焉莊子曰莊釣於濮水楚王使大夫往先白焉曰願以境內纍子莊子持竿不顧曰吾聞楚有神龜死已二千歲矣巾笥而藏之廟堂之上此龜者寧其死留骨而貴乎寧其生而曳尾塗中乎大夫曰寧生而曳尾塗中莊子曰往矣吾將曳尾於塗中又曰宋元君夜半而夢人被髮窺阿門曰豫自宰露之淵豫為清江使河伯之所漁者余且得豫元君覺召占夢者占之曰此神龜也君曰漁者有余且乎左右曰有君曰令余且會朝明日余且朝君曰若漁何得答曰且之網得白龜五尺君曰獻若之龜龜至君再欲殺之再欲活之心疑卜之曰殺龜以卜吉乃刳龜以卜七十二鑽而無遺策仲尼曰神龜能見夢於元君而不能避豫且之網智能七十二鑽而無遺策不能避刳腸之患淮南子曰龜三千歲蜉蝣不過三日以蜉蝣而為龜憂養生之具人必笑之又曰牛蹄彘顱亦骨也而弗灼必問吉凶於龜者以其歷歲久也抱朴子曰千歲靈龜五色具焉其雄額上兩骨起似角解人言浮於蓮葉之上或在叢蓍之下以來朱浴之乃剔取其甲火炙搗服方寸匕日三盡一具壽千歲又曰山中辰曰稱兩師者龍也巳曰稱寡人者社中蛇也稱時君者龜也又曰郤儉少時行獵墮空冢中饑餓見冢中有大龜數數回轉所向無常張口吞氣或俯或仰素聞龜能導引乃試隨龜所為遂不復饑百餘日後竟能咽氣斷穀魏王棄置土室中閉試之一年不食顏色悅懌氣力自若符子曰邦人獻燕昭王以大豖者曰於今百二十歲邦人謂之豕仙其群臣言乎昭王曰是豕無用王命宰夫而膳之豕既死乃見夢於燕相曰今杖君之靈而化吾生也始得為魯津之伯而浮舟者食我以粳糧之珍而欣君之惠將報子焉後燕相遊於魯津有赤龜銜夜光而獻金樓子曰黃金滿笥不以投龜明珠徑寸豈勞彈雀又曰巨龜在沙嶼間背上生樹木如淵島嘗有商人依其採薪及作食龜被灼熱便還海於是死者數千人又曰陽郡山中有巨龜長八尺腹下有文字前後足下各躡一龜有時踰山越水咸觀異之說苑曰靈龜五色色似玉背陰向陽上隆象天下平法地轉運應四時蛇頭龍脰左精象日右精象月知存亡吉凶之變又曰城濮之戰文公謂咎犯曰吾卜戰而龜𤏖音潛我迎歲彼背歲彗星見彼操其柄我操其標吾又夢與荊王搏彼在上我在下吾以無戰子以為何如咎犯對曰卜戰龜𤏖是荊人也我迎歲彼背歲彼去我從之也又曰晉屠岸賈欲追趙氏趙盾夢見叔帶持龜而哭甚悲已而笑拊手且歌謂趙盾卜之占兆絶而後好趙史援占曰此甚惡非君之身國語曰夫服心之文也如龜焉灼其中必文於外若楚公子不為君必死不合諸侯矣家語曰孔子問漆雕馮曰子事臧文仲武仲及孺子容此三大夫者孰為賢乎對曰臧氏家有守龜焉文仲三年而為一兆武仲三年而為二兆孺子容三年而為三兆馮從此見之若夫三人之賢與不賢所未敢識也孔子曰君子哉漆雕氏之子其言人之美也隱而顯言之過也微而著智不能及明不能見孰克如之論衡曰龜三百歲大如錢游華葉上三千歲則青邊有距山海經曰大苦山陽狂水出焉注于伊水中多三足龜星經曰天龜五星在南漢中廣志曰觜茲維切𧓈夷焦切形如龜出交州山龜在山上食草長尺餘柳氏龜經曰龜一千二百歲可卜天地之終始何以言之三千四十二占於天地千歲之龜甲黑龜有五色時用之神仙傳曰南極子融即柸呪之即成龜煮之可食腹藏皆具柸成龜殼煮取肉還成柸會稽後賢傳曰孔愈字敬康嘗至吳興餘不亭見人籠龜於路愈求買而放於溪中龜行至水反顧視愈及封此亭而鑄印龜首回屈三鑄不正有似昔龜之顧靈德感應如此華陽國志曰秦惠王十二年張儀司馬錯破蜀克之儀因築城城終頽壞後有一大龜從硎而出周行旋走乃依龜行所築之乃成古史考曰伏羲時靈龜負河圖八卦是也洛陽記曰禹時有神龜於洛水負文列於背以受禹文即治水文也南越志曰龜甲名神屋出南海生池澤中吳越謂之元佇神龜大如拳而色如金上甲兩邊如鋸齒爪利而能緣大木捕鳴蟬至美可食不中於卜以其小故也嵩高山記曰千歲松或化為伏龜義興記曰君山廟其下有池池中有三足六眼龜崔豹古今注曰龜一名玄衣督郵一名元緒王子年拾遺録曰崑崙山第五層有神龜長一尺九寸四翼萬歲則升木而居也亦能言矣郭子橫洞冥記曰黃安代郡人也常去自云卑猥不敢處人間執鞭懷而欲書畫地以記其數一夕地成池矣明腹移亦復成池時人謂言黃安舌耕年可八十餘視若童子常服朱砂舉體皆赤冬不著衣坐一大神龜時人問子坐此龜幾年對曰昔伏羲氏始造網罟有此龜以授吾龜背已平此蟲畏日月之光二千歲而一出頭我坐此龜已來五遇出頭矣行則負龜而移世人謂黃安萬歲博物志曰人有出行墜深泉澗者無出路饑餓分死左右見龜蛇甚多朝暮引頸向東方人因伏地學之遂不復饑體殊輕便能巖岸經數年後試竦身舉臂遂超出澗上即得還家顏色悅懌頗更黠慧勝故還食穀啖滋味百餘日中復其本質又曰龜三千歲猶旋卷耳之上蓍千歲三百莖同本以老知吉凶神異經曰西方大荒中有人焉長丈其腹圍九尺踐龜蛇載朱鳥知河海升斛識山石多少知天下鳥獸言語續搜神記曰司徒蔡謨親友王蒙者單獨常為蔡公所憐公嘗令曰捕魚獲龜如車輪公付廚帳下倒懸龜著屋蒙其夕才眠已厭如此纍夜公聞而問蒙何故厭答云眠輒夢人倒懸己公容慮向龜乃令人視龜所在果倒懸著屋公嘆曰果如所度命下龜於地於是蒙即得安寢龜乃去又曰晉咸康中豫州刺史毛寶戍邾城有一軍人於武昌市見人賣一白龜子長四五寸潔白可愛寶便買取持歸著甕中養之日日大近欲尺許其人憐之持至江邊放水中視其去後邾城遭石勒敗毛寶棄豫州既越江莫不沉溺寶于時被鎧持刀亦同自投既入水中覺如隨一石上水裁至腰須臾游去中流視之乃是先所養白龜甲六七尺既送至東岸出頭視此人徐游而去中江猶回首數焉又曰鄱陽縣民黃赭入山採荊楊子遂迷不知道數日饑餓忽見一大龜赭便呪曰汝是靈物吾迷路不知道今騎汝背示吾路龜即回右膊赭即從行去十餘里便至溪水見賈客行船赭即往乞食便語船人云我向者於溪邊見一龜甚大可共往取之言訖面即生瘡既往亦復不見龜還家數日病瘡而死劉敬叔異苑曰餘姚縣倉封印完全而開之覺大損耗後伺之乃是富陽縣桓王陵上雙石龜所食即密令毀龜口於是不復損耗又曰孫權時永康有人入山遇一大龜即束之歸龜便言曰遊不良為時君所得人甚怪之載出欲上吳王夜洎越里纜船於大桑樹霄中樹呼龜曰勞乎元緒奚事爾耶龜曰我被拘縶方見烹臛雖盡南山之樵不能潰我樹曰諸葛元遜博識必致相苦令求如我之從計從安出龜曰子明無多辭禍將及爾樹寂而止既至權命煮之焚柴萬車語猶如故諸葛恪曰燃以老葉乃熟獻人仍說龜樹共言權登使伐取煮龜立爛今烹龜猶多用葉薪野人故呼龜為元緒孔氏志怪曰會稽吏謝宗赴假吳中獨在船忽有女子姿性妖婉來入船問宗有佳絲否欲市之宗因與戲女漸相容留在船宿歡宴繼曉因求宗寄載宗便許之自爾船人恆夕但聞言笑兼芬馥氣至一年往來同宿密伺之不見有人方知是邪魅遂共掩之良久得一物大如枕須臾又得二物並小如拳以火視之乃是三龜宗悲思數日方悟自說此女子一歲生二男大者名道愍小者名道興既為龜送之於江廣五行記曰晉孝武太元中吳郡岑泉為司農造碑於江畔湖西之村見石龜載碑從田中出還其先處萍藻猶在腹下其月泉暴亡任昉述異記曰陶唐之世越裳國獻千歲神龜方三尺餘背上有文背科斗書記開闢已來命録之龜曆伏滔述帝功德銘曰胡書龜曆之文又曰周時城陽雨錢終日方絶王莽時未央宮雨五銖錢既至地悉為龜兒又曰龜一千年生毛壽五千歲謂之神龜壽萬年曰靈龜孫惠龜賦曰有緇衣之大夫兮衣玄繡之衣裳乘輜車之岌兮駕雲霧而翱翔風雨為之電奮兮五色赫以焜煌李顒龜賦曰質應離象位定坎居賤彼孕頤賁我靈符浮洛川見緯書洞祕賾通玄虛
