body:
  text: 藥部三芝下抱朴子曰千歲之枯木其下根如坐人長七寸刻之有血以其血塗足下可以步行水上不沒以塗人鼻入水水為之開可以止住淵底也以塗身則隱形欲見則拭之又可以治病病在腹內則刮服一刀圭其腫痛在外者隨其所在刮一刀圭以摩之皆手下即愈假令左足有疾則刮塗人左足也又曰松樹枝三千歲者其皮中有藂脂狀如龍形名曰飛節芝大者十斤末服之盡一斤得五百歲又曰樊桃芝其木如升龍其花葉如丹蘿其實如翠鳥高不過五尺生於名山之陰東流泉水之上以夏至後伺之得末服之一株得五千歲又曰參成芝赤色有光扣之枝葉如金石之音折而續之即復如故又曰木渠芝寄生大木上如蓮花九莖一叢其味甘而辛建木芝實生於都廣其皮如纓蛇其實如鸞鳥此三芝得服之白日升天也又曰黃蘆子尋木華玄液華此三芝生於泰山要鄉及奉高有得服之皆令人壽千歲也又曰千歲燕其窠戶北向其色多白而尾毛掘取陰乾末服得五百歲凡此百二十種皆肉芝也又曰菌芝或生深山之中或生大木之下或生泉水之側其狀或如宮室或如車馬或如龍虎或如飛鳥五色無常亦百二十種自有圖也皆當禹步往採取之刻以骨刀陰乾末服方寸匕令人升仙中者數千歲下者千歲欲求芝草入名山必以三月九月此山開出神藥之月也勿以山浪日必以天輔時三奇會尤佳出三奇吉門到山須六陰之日明堂之時帶靈寶符牽白犬抱白雞以白鹽一斗及開山符擊著大石上執吳唐草一抱以入山山神喜必得芝也又採芝服芝欲得王相專和之日支干上下相生為佳此諸芝名山多有之但凡庸道士心不精志行穢德薄又不曉入山之術雖得其圖不知其狀亦終不能得也山無大小皆有鬼神其鬼神不以芝與人人雖踐之不可見也又曰草芝有獨搖芝無風自動其莖大如手指赤如丹素葉似莧其根有大魁如斗有細者如雞子十二枚周繞大根四方似倣俲十二辰也相去丈許皆有細根如白髮以相連生高山深谷之上其所生左右無草得其大魁末服之盡則千歲服其細者一枚百歲可以分他人也壞其大根即隱形欲見則左轉而出之又曰牛角芝生虎壽山及吳陵上狀似蔥而特生如牛角長三四尺青色末服方寸匕日三服至百日則得千歲矣又曰龍仙芝狀似升龍之相負也以葉為鱗其根則如蟠龍服一株得千歲矣又曰紫珠芝其莖黃其葉赤其實如李而紫色二十四枚輒相連而垂如貫珠也又曰白符芝高四五尺似梅常以大雪而花季冬而實又曰朱草芝九曲有三葉葉有實也又曰五德芝狀似樓殿莖方其葉五色各具而不雜狀如偃蓋中嘗有甘露紫光起數尺又曰龍銜芝常以仲春對生三節十二枚下根如坐人凡此草芝又有百二十種陰乾服之則令人與天地相畢或得千歲二千歲又曰肉芝者謂萬歲蟾蜍頭上有角頷下有丹書八字以五月五日日中時取之陰乾百日以其足畫地即為流水千歲蝙蝠色如白雪集則倒懸腦重故也此二物得而陰乾末服之令人壽四萬歲千歲龜五色具額上兩骨起似角以羊血浴之乃剔取服之壽千歲行山中見小人乘車馬長七八寸者肉芝也取服即成仙凡百二十種皆肉芝漢武內傳曰仙芝上蘂有大真虹芝論衡曰章帝時零陵生芝草五本又初稟篇曰朱草之莖如針紫芝之栽如豆如珠玉者稟氣而生亦猶此也茅君內傳曰勾曲山上有神芝五種第一曰龍仙芝似交龍之相負服之為太極仙卿第二曰參成芝赤色有光扣其枝葉如金石之音折而續之即如故服之為太極大夫第三曰燕胎芝其色紫形如葵葉燕象如欲飛狀光明洞徹服一株拜為太清龍虎仙君第四曰夜光芝其色青實正白如李夜視其實如月光照洞一室服一株為太清仙官第五曰玉芝色白如玉剖食拜三官正真御史也神仙傳曰漆飛黃子張虛字子黃遼人也行玄素之道年二百歲有少容服九英蓋芝石象而得道也又曰刁子然服赤烏散及夜光芝仙人採芝圖曰芝生於名山食之令人乘雲能上天觀望八極通見神明鳳凰芝草生於名山之上金玉間文石上陰乾治食一年令人羽翼皆生壽千歲能乘雲與鳳凰俱又曰水芝生於名山大谷之陰治食之能入水中乘雲行通神明能使百鬼甘露芝生於石山之陰有五彩覆之又曰車馬芝生於名山之中此堯時七車馬化為之能得食之乘雲而行上有雲氣覆之萬年芝生於名山之中及蓬萊山又曰地芝生於名山得食之延年益壽一舉千里走越江海又曰月芝生於名山之陰金石珠玉之間陰乾治食令人有毛二尺延壽萬歲又曰土芝生於名山之陰黃雲覆之此戊巳中宮黃帝之精食之益壽八千又曰黑雲芝生於名山大谷涼泉之間黑蓋赤裏莖黑味鹹苦食之一年能入火不燋入水不漬石芝生於名山之陰色黃上有不死之藥如甘露味極美取而食之令人不死赤松子所服山芝之居東西行三南北行五此為山芝其色皆白山芝者韓終所食也與天地相極延年益壽通神明矣又曰人芝生於名山之陰青蓋白莖黃龍芝生於神仙之中狀如黃龍雲氣芝生於名山之中蓋白莖白裏赤天芝生於名山之陰千秋芝生於大谷中四方異色南赤西白北黑東青食之不老老者不死雷芝生於名山之陰白石之上有白雲覆之黃雲芝生於名山之中金石間上有黃雲覆之食之壽千歲令人通見神明乘雲為車風為馬青雲芝生於名山之陰雲母芝生於名山澤泉之旁白虎芝生於名山之陰大木下狀如虎蓋青味辛食之令人有力又曰東方芝生於山東之陰南方芝生於神山之陽北方芝生於北海之山大谷水中狀異而澤西方芝生於崑崙之上金石間萬年芝生於名山之陰又曰夜光芝生於名山之陰大谷涼泉中金石間有浮雲翔其上太一芝生於名山之陽蓋黃莖赤得而食之令人不老與天地相保又曰虎芝生於名山之陰狀如虎食之身輕延壽八百年鳴鳥芝生於名山多林之陽狀如鳥五色陰乾治食令人身輕與風俱行又曰赤龍芝生於名山之陰源泉澤泉中狀如龍其色赤白以秋採之便有白光食之壽與天地無極黑龍芝生於名山之中大木下黑色如龍食之便令人能入水中孫氏瑞應圖曰芝草常以六月生春青夏紫秋白冬黑十洲記曰祖州有養神丹芝似菰苗長三四尺人死以草覆之皆活服之長生秦始皇時大疫多有死者有鳥如烏銜此草以覆死人面燈時皆活始皇聞以問北郭鬼谷先生先生曰此不死草也生瓊田中又有鍾山仙家數十萬耕田種芝草嵩高山記曰嵩高山上有神芝人芝者狀似小兒地芝者辟方一尺如黃金色覆以五色雲有神龍守之食者可以遐年崔豹古今注曰元和二年芝生沛如人冠狀又如章武如人抱三子狀成帝建初五年芝生頴川常以六月中生一葉春青夏紫秋白冬黑十月復黃氣出上尺五寸博物志曰名山生神芝不死之草上芝為車馬形中芝為人形下芝為六畜形唐新語曰崔希嶠以孝友稱丁內憂哀毀過禮為鄭縣丞芝草生所居堂一宿而葩蓋盈尺杜寶大業拾遺録曰七年六月東都永康門內會昌門東生芝草百二十莖散在地周十步許紫莖白頭或白莖黑頭或有枝或無枝亦有三枝如古出宇者地內根並如綿大相連著乾陽殿東東上閣前槐樹上生芝九莖共本相扶而生中莖最長兩邊八莖相次而短有如樓閣甚潔白武賁郎將段文操留守畫圖表奏本草經曰青芝一名龍芝食之身輕不老神仙生太山山谷亦生五嶽地上又曰黃芝一名金芝食之神仙生嵩高山山谷中又曰赤芝一名丹芝食之為神仙生霍山山谷又曰黑芝一名玄芝生恆山山谷又曰紫芝一名木芝久服延年作神仙生山嶽地上色紫形如桑吳氏本草經曰紫芝一名木芝九歌曰采三秀兮於山門三秀芝草石磊磊兮葛蔓蔓繆襲神芝贊曰青龍元年五月庚辰神芝生乎長平之習陽其色紫丹其質光曜高尺八寸五分散為三十有六莖枝幹連屬有似珊瑚之形詔御府匱而藏之具盡其形古瑞命記曰王者慈仁則生芝食之則延年又神農氏之論芝云山川與四時五行陰陽晝夜之精以生五色神芝皆為聖王休祥焉自漢孝武顯宗世號隆盛而元封永平所紀神芝方斯蔑如也且其枝幹條莖本末相承乃協于天官之數非神明其數孰能如此天台山賦曰五芝含秀而紛敷嵇康詩曰煌煌靈芝一年三秀
