body:
  text: 飲食部十八餅釋名曰餅并也溲麥使合并也胡餅作之大漫汗亦言以胡麻著上也蒸餅湯餅體餅之屬皆隨形而名之也漢書曰宣帝微時每買餅所從買家輒大售亦以自怪續漢書曰靈帝好胡餅京師皆食胡餅後董卓擁胡兵破京師之應東觀漢記曰光武問弟五倫曰聞卿為市掾人有遺卿母一笥餅卿從外來見之奪母飼探口中餅出有之乎倫對曰實無此眾人以臣愚蔽故為出此言耳英雄記曰李叔節與弟進先共在乘氏城中呂布詣乘氏城下叔節從城中出詣布進先不肯出為叔節殺數頭肥牛提數十石酒作萬枚胡餅先持勞客魏志曰漢末趙歧避難逃之河間不知姓字又轉詣北海著絮巾袴常於市中販胡餅孫賓碩時年二十餘乘犢車將騎入市觀見歧疑其非常人也因問之自有餅耶歧曰販之賓碩曰買幾錢賣幾錢歧曰買三十賣亦三十賓碩曰視處士之望非買餅者殆有故乃開車後戶顧所將兩騎令下馬扶上之時歧以為是唐氏耳目也甚怖面失色賓碩閉後戶下前襜謂之曰視處士狀皃既非販餅者如今面色變動即不有重怨則當亡命我北海孫賓碩闔門百口又有百歲老母在堂勢能相度者也終不相負必語我以實歧乃具告之賓碩遂載歧以驅歸又曰嚴翰字公仲學問特善春秋公羊司隸鍾繇不好公羊而好左氏謂左氏為太官而謂公羊為賣餅家又曰盧毓為吏部尚書時舉中書郎昭曰得其人與不在盧生耳選舉莫取有名名如畫地作餅不可啖也魏略曰丁斐封列侯坐免官後太祖啁曰斐文侯印綬何在斐對曰以易餅太祖大笑晉書曰何曾性奢豪務在華侈幃帳車服窮極綺麗廚膳滋味過於王者每燕見不食太官所設帝輒命取其食蒸餅上不坼作十字不食王隱晉書曰王長文州辟別駕陽狂不詣舉州追求乃於成都市見蹲地嚙胡餅又曰王羲之幼有風操郗虞卿聞王氏諸子皆後令使選壻諸子皆飾容以待客羲之獨坦腹東床囓胡餅神色自若使具以告虞卿曰此真吾子壻也問為誰果是逸少乃妻之晉陽秋曰惠帝崩由食餅也又曰王歡躭學貧窶或人惠蒸餅一軸以充一日妻子常有菜色宋書曰王悅之為吏部郎鄰省有會同者遺悅之餅一甌辭不受曰此費誠小然少來不願當之蕭子顯齊書曰永明九年正月詔太廟四時祭薦宣皇帝麵起餅又曰何戢為司徒左長史太祖為領軍與戢來往數置歡宴上好水引餅戢令婦女躬自執事以設上焉梁書曰武帝嘗設大臣䴵蔡樽在坐帝頻呼其姓名樽竟不荅食餅如故帝覺其負氣乃改喚蔡尚書樽始放筯執笏曰唯帝曰卿向聾今何聰對曰臣預為右武且職在納言陛下不應以名垂喚帝有慚色也趙錄曰石勒諱胡胡物皆改名胡餅曰搏鑪石虎改曰麻餅又曰石虎好食蒸餅常以乾棗胡桃瓤為心蒸之使坼裂方食及為冉閔所篡幽廢思其不裂者不可得後魏書曰胡叟不治產業常苦飢貧能不以為恥養子字螟蛉以自結常作布囊容三四斛飲噉醉飽便盛肉餅以付螟蛉見車馬榮華者視之蔑如也北齊書曰庫狄連冬至日親表稱賀其妻為設豆餅連問此豆餅何處得來妻對曰於食中減連大怒後周書曰樊深以父遇宮因避難墜崖傷足絕食再宿後遇得一簞餅飲食之然念繼母年老患痺咸免虜掠乃弗食夜中匍匐尋覔母過得相見因以饋母還復遁去改易姓名遊學於汾晉之間唐書曰僧萬廻閿鄉人也恢諧以狂發言屢中其兄戍邊五載母思之萬廻年幼請詣兄所策竹馬去經歸而返白母曰兄還矣請辦餅更往迎之數日持襆而至母發襆乃戍子衣也尋而子至母大驚范子曰餅出三輔墨子曰魯陽文君云有人於此牧羊芻豢不可勝食也見人作餅即還然竊之楚四境之田蕪廣不可勝闢見宋鄭之門邑則還然竊之與彼異乎抱朴子曰莽之世賣餅小人皆得等級斗筲之徒兼金累紫揚子雲確然忠貞之節形矣三輔舊事曰太上皇不樂關中高祖徙豐沛屠兒沽酒賣餅商人立為新豐縣故一縣多小人李固別傳曰質帝暴得疾云食煮餅腹中悶遂崩蔡質漢官儀曰尚書郎直太官供餅餌五熟玄晏春秋曰衛倫過予而讌論及於味倫稱侍中劉子楊食餅知鹽生精味之至也予曰昔師曠識勞薪易牙別淄澠子楊之妙抑末乎倫曰晉曠齊牙古之精也魏之子楊今之妙也子何間焉語林曰何平叔面絕白魏文帝疑其著粉正夏月喚來與熱湯餅大汗出隨以朱衣自拭色轉皎然幽明錄曰姚泓叔父大將軍紹揔司戎政召胡僧問以休咎僧乃以麵為大胡餅形徑一丈僧坐其上先食正西次食正北次食正南所餘卷而吞之訖便起去了無所言是歲五月楊盛大破姚軍於清水九月晉師北討掃定熲洛明年遂席卷酆鎬生禽泓焉葛洪神仙傳曰壺公者從遠方來賣藥常懸一壺干坐上每日入後跳入壺中市掾費長房於樓上見之知非常也身為掃除并進餅公令長房共跳入壺但見樓觀五色重門閣道侍者數十人京兆舊事曰蕭彪為巴郡守父老歸供養父嗜餅從至市立車下自進之廷尉決事曰廷尉上士張柱私賣餅為蘭臺令史所見方言曰餅謂之飩徒昆切或謂之餦音張或謂之餛音混說文曰餅麵餈也雜五行書曰十月亥日食餅令人無病食經有髓餅法以髓脂合和麵崔寔四民月令曰五月距立秋無食煮餅及水溲餅夏月飲水時此二餅得水即冷堅不消不幸便為食作傷寒矣以餅置水中則滲唯酒溲之入則闌也王郎上劉纂等樗蒲曰左中郎樂林得纂麵肉共啖湯䴵繆襲祭儀曰夏祀以蒸餅盧諶祭法曰四時祠用曼頭餲餅體牢九夏祠別用乳餅冬祠用白環餅荀氏四時列饌注曰夏祠以薄液代曼頭徐暢祭記曰舊五月麥熟薦新麥作起漱白餅明皇雜錄曰武惠妃生日上與諸公主按舞於萬歲樓下上乘步輦從複道窺見衛士食畢以餅餌棄水竇中上大怒命高力士杖殺之上方震怒左右莫敢言者寧王從容謂上曰從複道窺見獲衛士之過而殺之恐人臣不能自安又失大體陛下志在勤儉愛物惡棄於地柰何性命至重重於殘飧者乎上蹶然大悟遽命赦之荊楚歲時記曰六月伏日並作湯餅名為辟惡時鏡新書曰四月八日長沙市肆之人無子者供寺閣下羊肉薄餅結願以乞兒往往有驗束晳餅賦曰禮仲春之月天子食麥而朝事之籩煮麥為麵內則諸饌不說餅然則雖云食麥而未有䴵䴵之作也其來近矣若夫安乾粔籹之倫糺耳狗后之屬釰帶案成餢飳髓燭或名生於里巷或法出乎殊俗三春之初陰陽交際寒氣既消溫不至熱于時享宴則曼頭宜設吳回司方純陽布暢服飾飲冰隨陰而涼此時為餅莫若薄壯商風既厲太火西移鳥獸氄毛樹木䟽枝肴饌尚溫則起溲可施玄冬猛寒清晨之會涕凍鼻中霜成口外充虛解戰湯餅為最爾乃重羅之麮丘與切塵飛雪白膠黏䵑䈥膏溔柔澤肉則羊膀豕脅脂膚相半臠若繩首珠連礫散薑株葱本莑音封縷切判剉末椒蘭是灑是畔和鹽漉豉攬合樛亂於是火盛湯涌猛氣蒸作攘衣服振掌握搦俯摶麵彌離於指端手縈回而交錯紛紛馺馺星分雹落籠無逆肉餅無流麵妹媮咧敕薄而不綻巂巂和和䑋色外見柔如春綿白若秋練氣㪍鬱以揚布香飛散而遠遍行人失涎於下風童僕空爵而斜盻擎器者砥脣立侍者千咽爾乃換增濯以玄醢鈔以象著曳要虎丈叩膝遍據槃案財投而輒盡庖人參潭而促遽手未及換增禮復至脣齒既調口習咽利三籠之後轉更有次庾闡惡餅賦序曰范子常者造余宿曤鷄為餅遟御之情甚虛奇嘉之味不實聊作惡餅賦以釋之弘君舉倉檄曰催廚人作茶䴵熬油煎葱例茶以絹當用輕羽拂取飛麵剛軟中適然後水引細如委綖白如秋練羹杯半在財得一咽十杯之後顏解體潤梁吳均餅說曰宋公至長安得姚泓時故太官承程季者了了人也公曰今日之食何者最先季曰仲秋御景離蟬欲靜變變曉風淒淒夜冷臣當此時唯能說䴵公曰善季乃稱曰安定噎鳩之麥雒陽董德之磨河東長若之葱隴西舐背之牘枹音夫罕赤恥之羊張掖北門之豉燃以銀屑煎以銀銚洞庭負霜之橘仇池車帶之椒調以濟北之鹽剉以新豊之雞細如華山玉屑白如梁甫銀渥既聞香而口悶亦見色而心迷公曰善糗糒書曰峙乃糗糧亡敢弗逐峙具糗熬稻也儀禮曰四籩棗糗粟脯左傳曰陳轅頗賦封田以嫁公女以為己大器公逐之出奔鄭道渴其族轅咺進稻醴梁糗腵脯焉曰何其給也曰器成而具公羊曰公出奔齊國子執壺漿曰敢致糗從者公稽首以衽受說文曰糒平祕切乾食也糗熬米也久切釋名曰糗齲也飯而磨散之使齲碎也餱侯也候人飢者以飡之漢書曰李陵擊匈奴兵敗令軍士人持二升糒一片冰相待東觀漢記曰嚴尤擊江賊世祖奉糗一斛脯三十朐又曰隗囂且病餓出城飡糗糒腹張悉憤而死也又曰張禹巡行守舍止大樹下食糒乾飯屑飲水而已後年貧人來歸者千餘戶又曰賀玄字文弘為九江太守行縣齎持乾糒但就溫湯而已謝承後漢書曰沈景為河間相恒食乾糒後漢書曰趙孝兄禮為餓賊所得孝聞之即自縛詣賊曰禮久餓羸瘦不如孝肥飽賊大驚並放之謂曰可且歸更持米糒來孝求不能得復往報賊願就烹眾異之遂不害鄉黨服其義魏略曰寒貧者本姓石後還長安車騎將軍郭淮以意氣呼之問其所欲亦不肯言淮因與脯糒及衣財取脯一朐糒一升而止唐書曰黃巢將逼三輔僖宗出幸途無供頓衛軍不得食張濬謂漢陰令李康曰公可為糗餌以供行在康乃鳩集騾乘分道進饔糗列女傳曰勾踐伐吳有獻一囊糒者王以賜軍士甘不踰嗌而戰自十倍孟子曰舜之飯糗茹草也若將終身焉玄晏春秋曰衛倫過予而讌論及於味命僕取糗以進予予嘗之曰吾知之矣麥其主者也有李柰杏味三果不同予焉得兼之倫曰吾之將來家實多故杏時將發故糅之以杏汁李柰時發又糅之以李柰汁故有三果之味也物理論曰呂子義清賢之士也思之宜往存省懷乾糒而往主人盛為饌食乃出懷中糒求冷水一杯而食之楚辭九章曰播江離與滋菊兮願春日以為糗芳崔寔四民月令曰四月可作棗糒餌粢周禮曰羞籩之實糗餌粉粢鄭玄曰二物皆粉稻米黍米所為也合蒸曰餌餅之曰餌糗者擣粉熬文豆為餌餈之粘著以粉之也餌言糗餈言粉牙相明也廣雅曰鐸餈餌也方言曰餌謂之餻音恙或謂之粢或謂之𩚹音鈴或謂之餣烏業切或謂之餣音原說文曰餌粉餅也餈稻餅也釋名曰餌而也相黏而也兗豫曰溏浹或作洟就形之名也餈漬也蒸糝屑使相潤漬餅之也韻集曰糖䬾餌也東觀漢記曰樊畢字仲華世祖嘗於新野坐文書見拘時畢為市吏餽餌一笥上德之建武初拜河東都尉引見雲臺上啁畢曰一笥餌得都尉何如風俗通曰汝陽彭氏墓近大道有一石人田家老母到市買數片餌以歸過蔭墓樹下以餌著石人頭忽去而忘之行道人見餌怪問之或人調云此石人有神能治病病愈者以餌來謝之轉以相語云頭痛者磨石人頭腹痛者磨石人腹遂千里來就號曰賢君如此數年前餌母聞之為人說之乃無復往者梁書曰朱異好飲食極滋味聲色之娛子鵝炰鰌不輟於口雖朝謁從車中必齎飴餌粔籹通俗文曰于䋫者謂之粔籹雜字解詁曰粔籹膏環也異苑曰張驥永初中於都喪亡司馬茂之往哭見驥憑几而坐以著刺粔籹食之楚辭招魂曰粔籹蜜餌言以蜜和米麵熬作粔籹擣黍作餌寒具周禮曰朝事之籩鄭司農云朝事謂清朝米食先寒具口實之籩通俗文曰寒具謂之餲音曷桓譚新論曰孔子疋夫耳而晫然名著至其冢墓高者牛羊鷄豚而祭之下及酒脯寒具致敬而去張逸遺令日閉口寒具不得入
