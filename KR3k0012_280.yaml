body:
  text: 兵部十威名史記曰李廣居右北平匈奴聞之號曰漢飛將軍避之數歲不敢入右北平界漢書曰郅都為鴈門太守匈奴素聞名節舉邊為引兵去竟都死不近鴈門匈奴為偶人像都令馳騎射之莫能中者其見憚如此後漢書公孫瓚傳曰瓚字伯珪遼西令支人初平二年青徐黃巾三十萬眾入渤海界欲與黑山合瓚率步騎二萬人逆擊於東光南大破之東光令滄州縣斬首三万餘級賊棄輜重數萬兩奔走渡河瓚因其半濟薄之賊復大破死者數万流血丹水收得生口七万餘人車甲財物不可勝筭威名大震拜奮武將軍又曰瓚為降虜校尉討烏桓每聞有警瓚輒厲色憤怒如赴讎敵望塵奔逐或繼之以夜戰虜識聲憚其勇莫敢抗犯又曰瓚征烏桓常與善騎射之士數十人皆乘白馬以為左右翼自號白馬義從烏桓更相告語避白馬長史乃畫作瓚形馳射之中者咸稱万歲虜自此之後遂遠竄塞外又曰承宮名播匈奴時北單于遣使求得見宮顯宗勑自整飾宮對曰夷狄眩名非識實者也臣狀醜不可以示遠宜選有威容者續漢書承宮傳曰夷狄聞臣虛稱故欲見臣臣醜陋形寢不如選長有威容者示之也帝乃以大鴻臚魏應代之又曰武王縯音引字伯升世祖之長兄也慷慨有大節進圍宛城中自號天柱大將軍王莽素聞其名大震懼使長安中宮署及天下鄉亭皆畫伯升豫於塾旦起射之東觀漢記曰耿秉性勇壯而簡易於事軍行常自被甲在前休止不結營部然遠斥堠明要誓有警軍陣立成事卒皆樂為死匈奴聞秉卒舉國號哭魏志曰呂布字奉先便弓馬膂力過人號為飛將又曰龐德將所領南屯樊討關羽曰今年我不殺羽羽當殺我親與羽交戰射羽中額時德常乘白馬羽謂之白馬將又曰張遼為孫雄所圍遼潰圍出復入雄眾破走由是震威江東兒啼不肯止其父母以遼恐之晉書曰鄧遐勇力絕人氣蓋當世時人方之樊噲桓引以為參軍數郡號為名將宋書曰劉胡本名坳胡以其顏面坳黑似胡故以為名及長以坳胡難道單呼為胡出身群將捷口善處分稍至隊主討諸蠻往無不捷蠻甚畏憚之小兒啼語之曰劉胡來便即止又曰沈慶之伐沔北結蠻大破之威震諸山群蠻皆稽顙慶之患頭風著狐皮帽群蠻惡之號曰蒼頭公後魏書曰李崇沉深有將略寬厚善御眾在楊州凡經十年常養壯士數千人寇賊侵邊所向摧破號曰臥虎賊甚憚之後周書曰韓杲從大軍破稽胡於北山胡地險阻人迹罕至杲進兵窮討散其種落稽胡憚杲勁健號為著翅人太祖聞之笑曰著翅之名寧減飛將又曰蔡祏與齊神武遇戰於邙山祏時著明光鐵鎧所向無前敵人咸曰此是鐵猛獸也皆遽避之又曰裴寬在孔城十三年與齊洛州刺史獨孤永業相對永業有計謀多譎詐或聲言春發秋乃出兵或揜敵消息倏忽而至寬每揣知其情出兵邀擊無不克之永業常戒其所部曰但好慎孔城自外無足慮其見憚如此又曰怡峰字景阜遼東人也從征役以驍勇聞當時號為驍將又曰梁武勑蕭續曰賀拔勝北間驍將汝宜慎之又曰郝玼為刺史始玼以臨涇地宜當畜息蕃戎每為寇即屯其地嘗白其帥願以城控之前帥不從其後叚祐為節度使玭復白祐祐多其策乃表請城之故詔玼鎮其地自是西戎無敢犯涇者玼自行間前無強敵在邊上三十年生得蕃人輒刳剔而歸其屍蕃人畏之如神下令得玼者賞以等身金蕃中小兒啼號者但連呼郝玼以怖之又曰張萬福帶和州刺史鎮咸陽因留宿衛李正已反將斷江淮路令兵守埇橋渦口淮進奉舡千餘隻江泊渦下不敢過德宗以万福為濠州刺史召見謂曰先帝改作名正者所以褒卿也朕以為江淮草木亦知卿名若從先帝所改恐賊不知是卿也復賜名万福慰遣之万福馳至渦口立馬岸上發進奉舡淄青兵馬倚岸睥睨不敢動諸道舡繼進吳越春秋曰吳公子慶忌吳王僚子也勇捷為人所聞筋力果勁萬人之敵也世說曰桓石虎小字鎮惡常從征枋頭車騎冲沒左右莫能先救宣武問汝叔落賊汝知否虎聞氣甚奮策馬於万眾中置冲還三軍歎服河朔遂以其威時有患瘧者怖之多愈因斷瘧焉燉煌實錄曰宋質直破虜有威名兒啼恐之即止虜相恚曰使汝行逢宋都督信義左傳曰曹衛告絕於楚子玉怒從晉師晉退軍吏曰以君避臣辱也且楚師老矣何故退子犯曰師直為壯曲為老豈在久乎微楚之惠不及此重耳遇楚楚成王有贈送之惠退三舍避之所以報也一舍三十里初楚子云若反國何以報我故以退三舍為報又曰晉文公圍原命三日之糧原不降命去之諜出曰原將降矣軍吏請待公曰信國之寶也民之所庇也得原失信何以庇之所亡滋多退三舍而原降又曰晉將荀吳伐鮮虞圍鼓鼓白狄之別也鼓人或請以城叛吳曰吾聞諸叔向好惡不愆民知所適事無不濟也愆過適歸或以吾城叛吾所甚惡也人以城來吾獨何好焉賞所甚惡若所好何無復加所好也若其弗賞是失信也何以庇民力能則進否則退量力而行吾不可以欲城而邇姦也所喪滋多使鼓人殺叛人而繕守備圍鼓三月鼓人或請降使其民見曰猶有食色軍吏曰獲城而不取勤民而頓兵何以事君吳曰所以事君也獲一邑而教民怠將焉用邑邑以賈怠不如完舊完獶保守也賈音估完戶官切賈怠無卒卒終棄舊不祥鼓人能事其君我亦能事吾君德義不爽爽差好惡不愆城可獲而民知義所知義所在也荀吳必其能獲故因以示義有死命而無二心不亦可乎鼓人告食竭力盡而後取之剋鼓而返不戮一人史記曰秦末天下兵起范增說項梁曰陳勝敗固當夫秦滅六國楚最無罪自懷王入秦不返楚人憐之至今曰楚雖三戶亡秦必楚今陳勝首事不立楚後而自立其勢不長今君起江楚蜂起之將皆爭附君者以君世世楚將為能復立楚之後也乃求楚懷王孫心立為懷王以從民欲也又曰漢楚相持之際項羽擊陳留外黃外黃不下數日降羽悉令男子年十五以上詣城東欲坑之外黃令舍人兒年十三令之舍人兒也以其幼弱故孫其父往說羽曰彭越強劫外黃強音其兩反外黃恐故且降待大王大王至又皆坑之百姓豈有所歸心哉從此以東梁地十餘城皆恐莫肯下矣羽然其言迺赦外黃當坑者而東至睢陽聞之皆爭下又曰漢王至洛陽新城三老董公遮說漢王以義帝死請發喪漢王從之高祖大哭遂為義帝發喪臨三日發使者告諸侯曰天下共立義帝北面事之今項王放殺義帝江南大逆無道寡人親為發喪諸侯皆縞素發國內兵收三河士南浮江漢以下願從諸侯王擊楚之殺義帝者於是諸侯多從之後漢書曰更始初光武為蕭王定河北諸賊銅馬餘眾降封其渠帥為列侯降者猶不自安光武知其意令各歸營勒兵乃自乘輕騎案行部陣降者更相語曰蕭王推赤心置人腹中安得不投死乎投死猶言致也由是皆服蜀志曰明帝自征蜀至長安遣張郃諸軍勁卒四十餘万向劍閣諸葛亮有戰士万二千時魏軍始陣兵適交參佐咸以敵眾強多非力所制控權停下兵并聲勢亮曰吾聞用武行師以大信為本得原失信古人所惜去者束裝以待期妻子企踵而計日乃勑速遣於是去者感悅願留一戰往者慣踊咸思致命臨戰之日莫不拔刃爭先以一當十殺張郃却司馬宣王一戰大剋此之由也吳志曰孫皎嘗遣兵候魏獲魏邊將吏美女以進皎皎更其衣服送還之也晉書曰武帝有滅吳之志以羊祐為督荊州諸軍事假節散騎常侍衛將軍如故祐率營兵出鎮南夏開設庠序綏懷遠近得江漢之心與吳人開布大信降者欲去皆聽之又曰羊祜為征南大將軍督荊州諸軍事祜以孟獻營武牢而鄭人懼晏嬰城東陽而萊子服乃進據險要開建五城收膏腴之地奪吳人之資石城以西盡為晉有自是前後降者不絕乃增修德信以懷柔初附慨然有吞吳之心每與吳人交兵剋日方戰不為掩襲之計將帥有欲進譎詐之策者輒飲以醇酒使不得言人有掠吳二兒為俘者祜遣送還其家後吳將夏詳邵顗等來降二兒之父亦率其屬與俱吳將陳尚潘景來寇祜追斬之美其死節而厚加殯斂景尚子弟迎喪祐以禮遣還吳將鄧香掠夏口祜募生縛香既至宥之香感其恩率部曲而降祜出軍行吳境刈穀為糧皆計所侵送絹償之每會眾江沔遊獵常止晉境若禽獸先為吳人所傷而為晉兵所得者皆封還之於是吳人翕然悅服稱為羊公不之名也祜與陸抗相對使命交通抗稱祜之德量雖樂毅諸葛孔明不能過也抗嘗病祐饋之藥抗服之無疑心士多諫抗抗曰羊祜豈酖人者時談以為華元子反復見於今抗每告其戍曰彼專為德我專為暴是不戰而自服也各保分界而已無求細利孫皓聞二境交和以詰抗抗曰一邑一鄉不可以無信義况大國乎臣不如此正是彰其德於祜無傷也又曰羊祜在軍常輕裘緩帶身不被甲鈴閤之下侍衛者不過十數又曰劉道規為荊州刺史桓玄餘黨荀林屯江津桓謙軍屯枝江二寇交逼久絕都邑之問荊楚既桓氏義舊並懷異心道規乃會將士告之曰桓謙今在近畿聞諸君頗有去就之計吾東來文武足以濟事若欲去者本不相禁因夜開城門達曉不閉眾咸憚服莫有去者又曰劉𥙿為將北伐後秦姚泓烏宏反以擅道濟為前鋒至洛陽凡援城破壘俘四千餘人議者謂應以戮為京觀道濟曰伐罪吊民正在今日皆釋而遣之於是戎夷感悅相率歸之者甚眾崔鴻後燕錄曰遣將慕容白曜伐宋無塩城剋之將盡以其人為軍實副將酈範酈音曆也曰齊四履之地號為東秦不遠為經略恐未可定也今皇威始被民無霑澤連城有懷二之將比邑有拒守之失宜先信義示之軌物然後民心可懷二州可定白曜從之進次肥城白曜將攻之範曰肥城雖小攻則淹日得之無益軍聲失之有損威勢且無塩之卒死者塗炭成敗之機足為鑒矣若飛書告喻可不攻自伏縱其不降亦當逃散白曜乃以書曉之肥城果潰也北史曰西魏將王羆之守華州也今馮翊部西魏師與東魏師戰河橋不利東魏卒趙青雀據長安城所在莫有固志羆乃大開州門召城中軍民謂之曰如聞天子敗績不知吉凶諸人相驚咸有異心王羆受委於此以死報恩諸人若有異圖可來見殺必恐城陷沒者亦任出城如有忠誠能與王羆同心者可共固守軍民見其誠信皆無異志後魏書曰李為為荊州刺史輕將數十騎到上洛宣詔綏慰當即帖然尋勒邊戍掠得蕭賾人者悉令還之南人感德仍送荊州之口二百許兩境交和無復烽燧之警隋書曰桂州人李光仕舉兵作亂隋將周法尚討之光仕帥勁兵保白石洞法尚捕得其弟光略光度大獲家口其黨有來降附輒以妻子還之居旬日降者數千人法尚遣兵列陣以當光仕親率奇兵蔽林設伏兩陣始交法尚馳擊其柵柵中人皆走敗光仕大潰追斬之唐書曰武德中李靖既剋江陵降蕭銑時諸將咸云銑之將帥與官軍拒戰罪狀既重請籍沒其家以賞將士靖曰王者之師義在吊罰且犬吠非其主無容同叛逆之科此蒯通所以免大戮於漢祖也今新定荊郢宜弘寬大以慰遠近之心降而籍之恐非救焚拯溺之義但恐自此南城鎮各堅守不下非計之善於是遂止江漢之城聞之莫不爭下又曰裴度既平淮西蔡人大悅舊令途無偶語夜不燃燭人或以酒食相過從者以軍法論度乃約法唯盜鬥殺外餘盡除之其往來者不復以晝夜為限於是蔡之遺黎始知有生人之樂又曰裴度既平淮西以蔡卒為牙兵或以為反側之子其心未安不可自去其備度笑而荅曰吾受命為彰義軍節度使元惡就擒蔡人即吾人也蔡之父老無不感泣申光之民即時平定又曰李愬襲蔡州既獲李祐又解其縛而客禮之愬乘間常召祐及李忠義屏人而語義亦降將也本名憲愬改之軍中多以諫愬愬益親祐始募敢死者三十人以為突將愬自教習之將襲元濟會雨水自五月至七月所在陂澤潰溢不可行營諸軍皆以愬不殺祐為言慮其誘覆官軍簡牒日至且言得賊諜具事愬無以止之乃持祐泣曰豈天不欲平此賊何爾我一身而見奪於眾口愬亦慮諸軍先以謗聞則不能全之矣乃械祐送京師先表請釋且言必殺祐則無與成功者比至京詔釋以還愬愬喜甚署為散兵馬使授刀佩之夜則倚以巡警或使入愬帳中言事愬因留對舉酒往往達旦竊聽者時聞祐泣涕聲尋署為六院兵馬使說苑曰晉文公伐楚歸國行賞狐偃為首或曰城濮之事先軫之謀文公曰城濮之事偃說我無失信不背三舍之約先軫所謀軍事吾用之以勝然此一時之說偃言萬世之功奈何以一時之利而加萬世功乎是以先之眾人悅服莊子曰市南宜僚弄丸兩家之難解孫叔敖秉羽而郢人投兵彪曰宜僚善弄丸白公脅之弄九如故孫淑敖秉羽之舞郢人無所攻故投兵韓詩外傳曰簡子薨未葬中牟叛之葬五日興師攻之圍未匝而城自壞者十丈襄子擊金而退之曰吾聞君子不承人於利不阨人於險使脩其城然後攻之中牟聞其義請降呂氏春秋曰夏后與有扈戰於甘澤而不勝曰戰而不勝是吾德薄而教不善也於是處不重席食不貳味琴瑟不脩女子不飾尊賢使能朞年而有扈氏服
