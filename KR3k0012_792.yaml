body:
  text: 南蠻七西南夷梁祚魏國統曰西夷土有異犀三角夜行如大炬火照數十步或時解脫則藏於深密之處不欲令人見之王者貴其異以為簪札消除凶逆又曰西南夷有大湖名曰禁水水中有毒氣中有物嘖嘖作聲射中木石則破裂中人則死其俗名曰鬼彈聞聲已至不可得見故也郭義恭廣志曰建寧郡其氣平冬不極寒夏不極暑盛夏如此五月盛冬如此九月天下之異地海內唯有此按月令記五氣中之位宜在西南如此豈當土行之方戊巳之域乎夜郎漢書曰南夷君長以十數夜郎最大漢武帝建元六年太行王恢擊東粵因兵威使番陽令唐蒙風曉南粵南粵食蒙蜀枸醬枸音矩蒙問所從來曰道西北牂牁江江廣數里出番禺城下蒙歸至長安問蜀賈人獨蜀出枸醬多持竊出市夜郎夜郎者臨牂柯江江廣百餘步足以行船南粵以財物役屬夜郎西至桐師然亦不能臣使也蒙乃上書曰竊聞夜郎所有精兵可得十萬浮船牂柯出不意此制粵一奇也誠以漢之強巴蜀之饒通夜郎道為置吏甚易上許之乃拜蒙中郎將將千人從巴莋關入遂見夜郎侯多同多同其侯名厚賜諭以威德約為置吏使其子為令夜郎旁小邑皆貪漢繒帛以為漢道險終不能有也乃且聽蒙約還報乃以為犍為郡發巴蜀卒治道自道指牂柯江蜀人司馬相如亦言西夷邛莋可置郡使相如以中郎將往諭皆如南夷為置一都尉十餘縣屬蜀後數歲道不通士罷餓餧離暑濕死者甚衆西南夷又數反發兵興擊耗費亡功上患之使公孫弘往視問焉還報言其不便上許之罷西夷獨置南夷兩縣一都尉稍令犍為自保就令自保守且修成其鄉縣也夜郎侯始倚南粵南粵反已滅還誅反者夜郎遂入朝上以為夜郎王又曰昭帝始元中牂柯談指同並等二十四邑凡三萬餘人皆反並音伴談指同並後皆為縣屬漢牂柯郡遣水衡郡都尉發蜀郡犍為兵擊破之後姑繒葉榆人復反鉤町侯亡波率其人擊之有功漢立亡波為鉤町王至成帝河平中夜郎王興與鉤町王禹漏臥侯俞漏臥侯邑名後為縣屬牂柯更舉兵相攻牂柯大守請發兵誅興等議者以道遠不可擊遣太中大夫張匡持節和解並不從杜欽説王鳳曰張匡和解蠻夷王侯王侯不從不憚國威其效可見恐議者選耎復守和解選耎怯不前之意也選音息兗反耎音人兗反太守察動靜有變乃以聞如此則復曠一時曠空也一時三月言空廢一時不早發兵也王侯得收獵其衆申固其謀黨助衆多各不勝忿必相殄滅自知罪成狂勃守尉言起狂勃心而殺守尉遠藏溫暑毒草之地雖有孫吳將賁育士若入水火往必焦沒智勇俱亡所設施屯田守之費不可勝量宜因其罪惡未成疑漢加誅陰勑旁郡守尉練士馬大司農先調穀積要害處調發也要害者在我為要於敵為害也調音徒釣切選任職太守往以秋涼時入誅其王侯尤不軌者即以為不毛之地亡用之人聖王不以勞中國即猶草也不毛言不生草木也宜罷郡放棄其民絶其王侯勿復通如以先帝所立纍代之功不可隳壞亦宜因其萌芽早斷絶之及已成形後師興則萬姓被害矣鳳於是薦陳立為牂柯太守立至牂柯乃從吏數十人出行無何召興將數千人出往立數責因斷興頭出曉其衆皆釋兵降釋解也興子耶務收餘兵迫脅旁二十邑反立又擊平之後漢曰夜郎者初有女子浣於遁水有三節大竹流入足間聞其中有號聲剖竹視之得一男子歸而養之及長有才武自立為夜郎侯以竹為姓武帝平南夷夜郎侯迎降天子賜其王印綬後遂殺之夷獠咸以竹王非血氣所生甚重之求為立後牂柯太守吳霸以聞天子乃封其三子為侯死配食其父今夜郎縣有竹王神是也滇漢書曰南夷君長其西靡莫之屬以十數滇地最大皆推髻耕田有邑聚楚威王時使將軍莊蹻將兵循江上巴黔中以西莊蹻至滇池地方三百里旁平地肥饒數千里以兵威定屬楚欲歸報會秦擊奪楚巴黔中郡道塞不通因乃以其衆王滇變服從其俗以長之秦時嘗破略通五尺道漢元狩中天子乃令王然于柏始昌呂越人等十餘輩間出西南夷指求身毒國至滇滇當羌乃留為求道師古曰當羌滇王名四歲餘皆閉昆明莫能通滇王與漢使言孰與我大及夜郎侯亦然各自以一州主不知漢廣大使者還因盛言滇大國足事親附師古曰可專事招來之令其親附也天子注意焉及南粵已滅乃使王然于以兵威風諭滇王入朝滇王有衆數萬人其旁東北勞深靡莫皆同姓相杖未肯聽杖猶倚也相依倚為援而不聽滇王入朝也勞莫數侵犯使者吏卒元封二年天子發巴蜀兵擊滅勞深靡莫以兵臨滇滇王始首善以故弗誅滇王離西夷舉國降請置吏入朝於是以為益州郡賜滇王印復長其民西南夷君長以百數獨夜郎滇受王印滇小邑也最寵焉後漢書曰滇郡有池周回二百餘里水源深而末更淺狹有似倒流故謂之滇池河土平敞多出鸚鵡孔雀有鹽池田漁之饒金銀畜産之富人俗豪俠居官者皆富及纍代及王莽政亂益州郡夷棟蠶若豆等起兵殺郡守越嶲姑復夷人大牟亦皆叛莽遣寧始將軍廉丹發巴蜀吏人卒徒十萬擊之連年不剋而還以廣漢文齊為太守群夷始得其和及公孫述據益土齊固守拒險聞光武即位乃聞道遣使自聞蜀平徵為鎮遠將軍封成義侯於道卒詔為起祠堂郡人立廟祠之又曰建武十八年夷渠帥棟蠶與姑復弄揀揲榆連然滇池建憐昆明諸種反叛遣武威將軍劉尚發卒擊之尚軍渡瀘水入益州界群夷皆棄壘奔走尚進軍連戰皆破之追至不韋孫盛蜀譜曰初秦徙呂不韋子弟宗族於蜀漢武開西南夷置郡縣徙呂氏以充之因置不韋縣斬獲甚衆諸夷悉平又章帝元和中蜀郡王阜為太守政化尤異有神馬四匹出滇池中蜀志曰後主建興二年諸葛亮率衆南征所戰皆捷孟獲者為夷所服募生致之既得使觀於營陳之間問曰此軍何如獲曰不知虛實故敗定易勝耳亮縱之使更戰七擒而亮猶遣獲獲止不去曰公天威也南人不復反矣遂至滇池南中皆平卭漢書曰自滇以北君長以十數卭都最大皆椎髻耕田有邑聚後漢書曰卭都夷者武帝開以為卭都縣無幾而地陷為汙澤因名為卭池南人以為卭河其後復反叛元鼎六年漢兵自越嶲水伐平之以為越嶲郡其郡土地平原有稻田俗多遊蕩而喜謳歌略與牂柯相類豪帥放縱難得制御王莽時郡守枚根枚根太守姓名也調卭人長貴以為軍侯更始二年長貴攻殺根自立為卭穀王至光武因就封之授越嶲太守印綬後劉尚擊益州夷路由越嶲長貴聞之疑尚既定南邊威法必行己不得自放縱即聚兵招呼諸君長多釀毒酒欲先以勞軍因襲擊尚尚知其謀即分兵先據卭都遂掩長貴誅之徙其家屬於成都又曰安帝時永昌益州蜀郡夷並今雲南郡也皆叛衆十餘萬破壞二十餘縣益州刺史張喬乃遣從事楊竦將兵至楪榆破之渠帥三十六種皆來降附竦因奏長吏姦猾侵犯蠻夷者九十人皆減死論又曰永平中卭都太守巴郡張翕政化清平得夷人和在郡十七年卒夷人愛慕如喪父母蘇祁斯人叟二百餘人齎牛羊送喪至翕本縣起墳祭祀詔書嘉美為立祠堂後夷人反亂天子以翕有遺愛乃拜其子湍為太守夷人歡喜皆奉迎道路曰郎君儀貌類我府君後湍頗失其心有欲叛者諸夷耆老相曉語曰當為先府君故遂得以安南中八郡志曰卭河縱廣二十里深百餘丈多大魚長一二丈頭持大遙視如載鐵釜狀李膺益州記曰卭都縣下有一老姥家貧孤獨每食輒有小蛇頭上戴角在床間姥憐飴之後稍長大遂長丈餘令有駿馬蛇遂吸殺之令因大忿恨令姥責出蛇母云在床下令即掘地愈大而無所見令遷怒殺姥蛇乃感人以靈言嗔令何殺我母當為母報讎此後每夜輒聞若風四十許日百姓相見咸驚語汝頭郍忽戴魚是夜方四十里與城一時俱陷為湖土人謂之為陷河唯姥宅無恙訖今猶存漁人採捕必依止宿每有浪輒居宅側恬靜無他風靜水清猶見城郭樓櫓畟然畟者測今水淺時土人沒水取得舊木堅貞光黑如漆好事者以為枕相贈焉莋漢書曰自嶲以東北君長以十數莋都最大其俗或土著或移徒後漢書曰莋都夷者武帝所開以為莋都縣其人被髮左袵言語多好譬類居處略與汶山夷同土出長年神藥仙人山圖所居焉元鼎六年以為沉黎郡至天漢四年并蜀為西部置兩部尉一居旄牛主徼外夷一居青衣主漢人嶲漢書曰桐師以東北至葉榆名為嶲昆明編髮隨畜遷徙無常處無君長地方可數千里永昌郡傳曰越嶲郡在建寧西北千七百里治江都縣自建寧高山相連至川中平地東西南北八千餘里郡特好桑蠶宜黍稷麻稻梁冉駹漢書曰自荏以東北君長以十數冉駹最大其俗或著土或移徙後漢書曰冉駹夷者武帝所開元鼎六年以為汶山郡今蜀郡西北通化郡地也至宣帝地節三年夷人以立郡賦重帝乃省并蜀郡為北部都尉其山有六夷七羌九氐各有部落其王侯頗知文書而法俗嚴重貴婦人黨母族死則燒其尸土氣多寒雖在盛夏水猶未釋皆依山居止纍石為室高者至十餘丈為卭籠今彼土夷人呼為雕又土地剛鹵不生穀粟麻菽唯以夌為資而宜畜牧有旄牛無角一名犝牛肉重千斤毛可為毦犝徒冬切毦音二出名馬有羚羊羚音靈可療毒又有食藥鹿鹿麑有胎者其腸中糞亦療毒疾又有五角羊麝香輕毛毼雞猩猩其人能作旄氈班罽青頓毞毲羊羧之屬青頓毞毲並未詳字書無二字特多雜藥地有鹹土煮以為鹽麡羊牛馬食之皆肥麡音子兮切其西又有三河槃于虜北有黃石北地盧水胡其表乃為徼外後靈帝時復分蜀郡北部為汶山郡白馬漢書曰蜀之西冉駹以東北君長以十數白馬最大皆氐類也後漢書曰白馬氐者武帝元鼎中分開廣漢西部合以為武都土地險阻有麻田出名馬牛羊漆密氐人勇戇抵冒貪貨死利居於河池一名仇池方百頃四面斗絶數為邊寇郡縣討之則依固自守元封三年氐人反叛遣兵破之昭帝元鳳中氐人復叛執金吾馬適建姓馬適名建等將三輔太常徙討破之建武初氐人悉附隴蜀反隗囂滅其酋豪乃背公孫述降漢馬援上復其王侯君長賜以印綬後囂族人隗茂反殺武都太守氐人大豪齊鍾留為種類所敬信威服諸豪與郡丞孔奮繫茂破斬之白狼夷後漢書曰永平中益州刺史梁國朱輔好立功名慷慨有大略在州數歲宣示漢德威懷遠夷自汶山以西前代所不至正朔所不加白狼槃木唐菆等百餘國戶百三十餘萬口六百萬以上舉種奉貢稱為臣僕輔上疏曰臣聞詩云被狙者歧有夷之行傳曰歧道雖僻而人不遠詩人誦詠以為符驗今白狼王唐菆等慕化歸義作詩三章路經卭來山太零高坂峭危峻險百倍歧道繈負老幼若歸慈母遠夷之語辭意難正草木異種鳥獸殊類有犍為郡掾田恭與之習狎頗曉其言臣輒令訊其風俗譯其辭語今遣從事史李陵與恭護送詣闕并上其樂詩昔在聖帝舞四夷之樂今之所上庶備其一帝嘉之事下史官録其歌焉東觀記載其歌并載夷人之本語並重譯訓詔為華言令范史所載者是也至和帝永元十二年旄牛徼外白狼樓薄蠻夷王唐繒等遂率種人十七萬口內屬樿國後漢書曰和帝永元九年樿國王雍由調遣使重譯奉國珍寶和帝賜金印紫綬安帝永寧初復遣使朝賀獻樂及幻人能變化吐火自支解易牛馬頭又善跳丸數乃至千自言我海西人海西即大秦也禪國西南通大秦明年元會安帝作樂於庭封雍由調為漢大都尉賜印綬金銀綵繒各有差牂柯後漢書曰初楚頃襄王時遣將莊豪從沆水伐夜郎軍至且蘭椓船於岸而步戰既滅夜郎因留王滇池以且蘭有椓船牂柯處乃改其名為牂柯異物志曰牂柯擊船戢也牂柯地多雨潦俗好巫鬼禁忌寡畜生又無蠶桑故其郡最貧句町縣有桄榔木可以為麵百姓資之又曰公孫述時牂柯大姓龍傳尹董氏與郡功曹謝暹保境為漢乃遣使從番禺江奉貢番禺江今南海郡光武嘉之並加褒賞桓帝時郡人尹珍自以生於荒裔不知禮義乃從汝南許慎應奉受經書學成還鄉里教授自是南域始有學焉永昌郡傳曰牂柯郡在建寧東北千二百里處所險峻率皆高山而少平地唐書曰牂柯蠻首領亦姓謝氏其地北去兗州一百五十里東至辰州二千四百里南至交州一千五百里西至昆明九百里無城壁散為部落而居土氣鬱熱多霖雨稻粟再熟無徭役唯征戰之時乃相屯聚刻木為契其法劫盜者三倍還贓殺人者出牛馬三十頭乃得贖死以納死家風俗物産略與東謝同其首領謝龍羽大業末據其地勝兵數萬人又曰武德三年牂柯蠻首領謝龍羽遣使朝貢授龍羽牂州刺史封夜郎郡公貞觀四年復朝貢開元十年大酋長謝元齊死詔立其嫡孫嘉藝襲其官封二十五年大酋長趙君道來朝獻方物元和三年五月勑自今已後委黔南觀察使差本道軍將充押領牂柯昆明等使四年正月遣使來朝是月遣中使魏德和領其使并齎國信物降璽書賜其王焉自後朝貢不絶臨海異物志曰桄榔木生牂柯外皮有毛似栟櫚而散生其木剛作鋤利如鐵中更利唯中焦根乃致敗耳皮中有似檮稻米片又似麥麵作餅餌廣志曰桄榔樹大四五圍長五六丈洪直旁無枝條其顛生葉不過數十似授葉破其木肌堅難傷入數寸得面赤黃密緻可食濮周書會曰卜人丹沙云西南之蠻丹沙所出按卜人蓋今之濮人也又曰陽令伊尹為四方獻令伊尹曰臣請正南歐隑五來切柱國指子陸童百濮九箘請今以珠璣玳瑁象齒文犀翠羽箘鶴短狗為獻永昌郡傳曰雲南郡在建寧南四十五里治雲南縣亦多夷濮分布山野千五百人女大小蹲踞道側皆持數種器杖時寇鈔為郡邑之害尾濮永昌郡傳曰郡西南千五百里徼外有尾濮尾若龜形長三四寸欲坐輒先穿地空以安其尾若邂逅誤折尾便死男女長各隨宜野會無有嫁娶猶知識母不復別父俗云貸老相食則此濮也古人所説非目見也扶南土俗傳曰枸利東有蒲羅中人人皆有尾長五六寸其俗食人按其地並西南蒲羅蓋尾濮之地名梁祚魏國統曰西南有夷名曰尾濮其地出玳瑁犀象珠璣金銀葛越桂木人皆蠻夷重譯乃通也木綿濮郭義恭廣志曰木綿濮土有木綿樹多葉又房甚繁房中綿如蠶所作其大如捲音拳文面濮廣志曰文面濮其俗劖面而以青畫之劖音讒折腰濮廣志曰折腰濮其俗生子皆折其腰赤口濮廣志曰赤口濮在永昌南其俗折其齒劖其脣使赤又露身無衣服墨𤏡濮廣志曰墨𤏡濮在永昌西南山居耐勤苦其衣服婦人以一幅布為裙或以貫頭丈夫以穀皮為衣其境出白蹄牛犀象武魄金銅華布朱提永昌郡傳曰朱提郡在犍為南千八百里治朱提縣川中縱廣五六十里有大泉池水須名千頃池又有龍池以灌溉種稻與道接時多援取鳴嘯於行人徑次聲聒人耳夷分布山谷間食肉衣皮雖有人形禽獸其心言語服飾不與華同有堂狼山山多毒草盛夏之月飛鳥過之不能得去又曰建寧郡朱提之東南六百里土氣和適盛夏之月熱不鬱述猛冬時寒慘栗又曰永昌郡在雲南西七百里郡東北八十里瀘倉津此津有鄣氣往以三月渡之行者六十人皆悉悶亂毒氣中物則有聲中樹木枝則折中人則令奄然青爛也又曰興古郡在建寧南八百里郡領九縣縱經千里皆有瘴氣蒜穀雞豚魚酒不可食皆食啖病害人郡北三百有盤江廣數百步深十餘丈此江有毒瘴九縣之人皆號曰鳩民言語嗜欲不與人同鳩民咸以三尺布角割作兩襜不復加針縷之功也廣頭著前狹頭覆後不蓋其形與裸身無異昆彌國唐書曰昆彌國一曰出昆明西南夷也在爨之西洱河為界即葉榆河其俗與突厥略同相傳云雲與胸奴本是兄弟國也漢武帝得其地入益州部其後復絶諸葛亮定南中亦所不至武德四年嶲州治中吉弘使南寧因至其國諭之至十二月遣使朝貢貞觀十九年四月右武侯將軍梁建方討蠻降其部落七十二戶力九千三百西唐書曰西方南寧之渠帥也自云本河東安邑人也七世祖仕晉為南寧太守屬中國亂遂王蠻夷梁元帝時南寧州刺史徐文盛徵詣荊州有瓚者遂據南寧之地延袤二千餘里俗多華民饒駿馬明珠犀象瓚死有二子震玩分統其衆隋開皇初遣使朝貢文帝遣韋世沖將兵鎮之折置恭州協州昆州未幾復叛後遣史萬歲擊之所至皆破踰西洱河臨滇池而還玩懼而來朝文帝誅之諸子沒為官奴不收其地因與中國絶高祖受禪拜玩子弘達為昆州刺史令持其父尸歸葬本鄉益州假綸又遣俞大施至南寧諭其部落悉來歸款自是朝貢不絶東女國唐書曰東女國西羌之別種以西海中復有女國故稱東女焉俗以女為王東與茂州黨項接東南與雅州接隔羅女蠻及白狼夷其境東西九日行南北二十日行有大小八十餘城王所居名康延川中有弱水南流用牛皮為船以渡四萬衆勝兵万餘人散在山谷女王號為賓就有女官曰高霸平議國事在外官僚並男夫為之其王侍女數百人五日一聽政令王若死國中多斂金錢動至數万更於王族求令女二人而立之大者為王其次為小王若大王死即小王嗣立或姑死而婦繼無有篡奪其所居皆起重層屋王至九層國人至六層其王服青毛綾裙下領衫上披青袍其袖委地冬則羔裘飾以紋錦為小鬟飾之以金耳垂璫足履索𩍜俗重婦人而輕丈夫文字同於天竺以十一月為正又曰東女國其俗每至十月令巫者齎肴詣山中散糟夌於空大呪呼鳥俄而有鳥如雞飛入巫者之懷因剖腹而視之每有一穀來歲必登若有霜雪必多災異其俗信之名為鳥卜其居喪服飾不改為父母則三年不櫛沐貴人死者或剝其皮而藏之內骨於瓶中楺以金屑而埋之國王將葬其大臣親屬殉死者數十人隋大業中蜀王秀遣使招之拒而不受武德中女王國斂臂鈴湯湯傍氏始遣使貢方物高祖厚資遣之又曰垂拱二年東女國王斂臂遣大臣湯劍石來朝仍請官號則天册拜斂臂為左玉鈴衛將軍仍以瑞錦製蕃服以賜之天授三年其王俄琰兒來朝開元二十九年十二月其王趙曳夫遣子獻方物命有司宴于曲江令宰臣已下同宴又封曳夫為歸昌王賜其子帛放還復以男子為王貞元九年七月其王湯立悉與寄鄰國王董臥度白狗國王羅陀忽逋租國王弟鄧吉知南水國蘇唐磨咄霸國王董藐蓬各率其種落詣劍南西川內附其哥鄰等國皆散居山川弱水王即國初女國之弱水部落其悉董國在弱水西故亦謂之弱水西悉董王舊皆分隸邊郡祖父例授將軍中郎果毅等官自中原多故皆為吐番所役屬其部大者不過三二千戶各置縣令十數人理之土有絲絮歲輸於吐蕃至是悉與之同盟相率獻款兼齎天寶中國家所賜官告共三十九通以進西川節度使皋處其衆於維霸保等州給以種糧耕牛咸樂生業立悉等數國王自來朝召見於麟德殿授官賞各有差
