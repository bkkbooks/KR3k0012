body:
  text: 方術部三醫二史記曰馮信臨淄人為齊太倉長好醫淄川王令就淳于意學方意教以審法逆順論藥法定五味及和劑湯法信受之擅名漢世又曰高期仕濟北王為大醫王遣就倉公淳于意學經脈高下及奇絡結當論俞所居及氣當上下出入邪正逆順之宜鑱石定砭災之法歲餘亦頗通之又曰唐安臨淄人也雅性好醫倉公淳于意教五診上下經脈奇咳四時應陰陽之法為齊侍醫又曰杜信高永侯家丞自知身病乃專心學醫倉公甚憐之教以上下經脈五診之法又曰鄧訓為護烏桓校尉羌胡俗恥病死每病臨困取以刀自剌訓聞有病困者輒拘縛束不與兵刃使醫藥療之愈者非一小大莫不感悅又王符論曰凡療病者必先知脈之虛實氣之所結然後為之方故疾可愈而壽可長也為國者必先知人之所苦禍之所起然後為之禁故奸可塞而國可安也又曰郭玉者廣漢人也初有老父不知何出常漁釣於涪水因號涪翁乞食人間見有疾者時下針石輒應時而效乃著針經診脈法傳於代弟子程高尋求積年翁乃授之高亦隱跡不仕玉少師事高學方診六徵之技陰陽不測之術和帝時為太醫丞多有效應帝奇之仍試令嬖臣美手睕者與女子雜處帷中使玉各診一手問所疾若玉曰左陽右陰脈有男女狀若異人臣疑其故帝歎息稱善玉仁愛不矜雖貧賤廝養必盡其心力而鑒療貴人時或不愈帝乃試令貴人羸服變處一針即差召玉詰問其狀對曰醫之為言意也腠理至微腠理皮膚之間也韓子曰扁鵲見晉桓侯曰君有病在腠理也隨氣用巧針石之間毫芒即乖神存於心手之際可得解而不可得言也夫貴者處尊高以臨臣臣懷怖懾以承之其為療也有四難焉自用意而不任臣一難也將身不謹二難也骨節不強不能使藥三難也好逸惡勞四難也針有分寸時有破漏分寸淺深之度破漏曰有衝破者也重以恐懼之心加以裁慎之志臣意且猶不盡何有於病哉此其所為不愈也帝善其對年老卒官又曰曹褒遷城門校尉將作大匠時有疾疫褒巡行病徒為致醫藥經理饘粥多蒙濟活東觀漢記曰鄧訓謙恕下士無貴賤見之如舊朋友往來門內視之如子有過如鞭撲之教大醫皮巡從獵上林還暮宿殿門下寒疝病發時訓直事聞巡聲起往問之巡曰得火以尉背訓身至太官門為求火不得乃以口噓其背復呼同廬郎共更噓至朝遂愈鍾離意別傳曰黃讜為會稽太守建武十四年吳大疾疫署意中部尉督郵意乃露車不冠身循行病者門入家至賜與醫藥詣神廟為民禱祭召録醫師百人合和草藥恐醫小子或不良毒藥齊賊害民命先自吞嘗然後施行其所臨護四千餘人並得差愈後日府君出行災害百姓攀車涕泣曰明郵府君不須出也但得鍾督郵民皆活也何顒別傳曰同郡張仲景總角造顒謂曰君用思精而韻不高後將為良醫卒如其言顒先識獨覺言無虛發王仲宣年十七嘗遇仲景仲景曰君有病宜服五石湯不治且成門後年三十當眉落仲宣以其貰音賖長也遠不治也後至三十疾果成竟眉落其精如此仲景之方術今傳於世張仲景方序曰衛泛好醫術少師仲景有才識撰四逆三部厥經及婦人胎藏經小兒顱囟方三卷皆行於世高湛養生論曰王叔和性沉靜好著述考核遺文採托群論撰成脈經十卷編次張仲景方論編為三十六卷大行於世魏志曰華他字元化沛國譙人遊學徐土兼通數經曉養性之術年且百歲而猶有壯災時人以為仙沛相陳圭舉孝廉太尉黃琬辟皆不就精於方藥處齊不過數種心分銖不假稱量針示過數處裁七八壯若疾發結於內針藥所不能及者乃令先以酒服麻沸散既醉無所覺因刳破腸皆抽割積聚若在腸胃則截斷洗除去疾穢既而縫合傅以神膏四五日瘡愈一月之間皆平復又曰甘陵相夫人有娠六月腹痛不安他視脈曰胎已死矣使人手摸知所在在右即女在左即男人云在左於是為湯下之果下男形即愈又曰縣吏尹世苦四支煩口乾不欲聞人聲小便不利他曰試作熱食得汗即愈不汗後三日死即作熱食而汗不出他曰藏氣已絶於內當啼泣而絶果如他言又府吏倪尋李延共止俱患頭痛身熱所苦正同他曰尋當下之延當發汗或難其病同療異他曰尋內實延外實故治之宜殊即各與藥明旦並起又督郵徐毅得病他往省之毅謂他曰昨使醫曹吏劉祖針胃管訖便若咳嗽臥不安他曰剌不到胃管誤中肝也食當日減後五日不救遂如他言又東陽陳叔山小男三歲得下痢常先啼日以羸困問他他曰其母懷軀陽氣內養乳中虛冷兒得母寒故令不時愈他與四物紫苑九十日即除又至軍吏梅平得病除名還家家居廣陵未至二百里止親人舍有須他偶至主人許主人令他視平他謂平曰君早見我不應至此今疾已結促去可得與家人相見五日平應時歸果如他言又他行道見一人病噎塞嗜食而不得下家人車載欲往就醫他聞其呻吟駐車往視語之曰向來道傍有賣餅家䔉齏大酢從取三升飲之病自當羌即如他言立吐蛇一條遂懸之車邊欲造他他尚未還他家小兒戲門前迎見自相謂曰客車邊有物必是逢我公也疾者前入唑見他壁北懸此蛇輩以十數又有一郡守病他以為其人盛怒則羌乃多受其貨而不加功無何棄去留書罵之守果大怒令人追殺守子知之屬使勿逐守瞋恚吐黑血數升而愈又有一士大夫患體中不快詣他他云君病至深當破腹取之然君壽亦不過十年病不能殺君君忍痛十歲壽俱當盡不足故自刳裂也士大夫曰余不耐痛必請治之他遂下手所患尋羌十年竟死又廣陵太守陳登得胸中煩滿面赤不食他診脈曰府君胃中有蟲數升欲成肉疽食腥物所為也即作湯二升先服一升斯須盡服之食頃吐出三升許蟲赤頭皆動半身猶是生魚膾也所苦便愈他曰此病後三朞當發遇良醫乃可濟依期果發時他不在遂死又有婦人長病經年世謂為寒熱注病冬月中他令唑石槽中平且用冷水汲灌云當滿百始七十灌冷戰欲死他令滿數至八十灌熱氣乃蒸出囂囂高二三尺滿百灌他乃使然火溫床厚覆衣良久汗洽出著粉燥便愈又有人病腹中攻痛十餘日鬢眉隋落他曰是脾半腐可刳腹治也使飲藥令臥破腹就視脾果半腐壞以刀斷之割去惡肉以膏傅之即羌太祖聞而異之召他常在左右太祖苦頭風每發心亂目眩他針鬲隨手而愈又軍吏李成苦咳晝夜不寐時吐膿血以問他他言君病腸癰咳之所吐非從肺來也與君散兩錢匕已服當吐二升餘膿血訖快自養一月小起好自將愛一年便健十八歲當一小發服此亦復羌若不得此藥故當死復與兩錢散成得五六歲親人有病如成者謂成曰卿今強健我見欲死何忍急去祛舉切藏藥以待不祥先特貸我羌為卿從華他更索成與藥已故到譙從索藥適會值他見收忩忩不忍從求後十八歲病發無藥可療以至死又曰樊阿彭城人少師華他嘗問他求服食法他受以漆葉青黏散子方云服之去三蟲利五藏輕身益氣使人頭不白阿從其言年百餘歲漆葉所在有之青黏生於豐沛彭城及朝歌青黏一名地節一名黃芝主理五藏益精氣本出於迷人入山者見仙人服之以告他他以為佳語阿阿祕之近者人見阿之壽而氣力強盛怪而問之所服食阿因醉亂誤說之人服多驗蜀志曰關羽為流矢貫臂每陰雨常疼痛醫曰矢鏃有在當破臂刮骨去毒乃可除之晉書曰裴頠通博多聞兼明醫術荀勗之修定律度也檢得古尺短世所用四分有餘頠上言宜以改諸度量若是未能悉革可先改太醫權衡此若羌違遂失神農岐伯之正藥物輕重分兩乖互所可傷夭為害尤深古壽考而今短折者未必不由此也卒不能用又曰顏含兄畿咸寧中得疾就醫自療遂死於醫家家人迎喪旐每繞樹而不可解引喪者顛仆稱畿言曰我壽命未死但服藥太多傷我五藏耳今當復活慎無莽也其父祝之曰若爾有命復生豈非骨肉所願今伹欲還家不爾葬也旐乃解又曰張苗雅好醫術善消息診處陳廩丘得病連服藥發汗汗不出衆醫皆云發汗不出者死自思可蒸之如中風法令溫氣於外迎之必得汗也復以問苗云曾有人疲極汗出臥簟中冷得病苦增寒諸醫與散四日凡八過發汗汗不出苗乃燒地布桃葉於上蒸之即得大汗便於被下傅粉身極燥乃起即愈廩丘如其言果差又曰趙泉性好醫方拯救無倦善療衆疾於瘧尤工甚為當時所歎伏焉晉中興書曰葛洪字稚川丹陽句容人幼覽衆書近得萬卷自號抱朴子善養性之術撰經用救驗方三卷號曰肘後方又撰玉函方一百卷于今行用晉書曰皇甫謐字士安幼沉靜寡欲有高尚之志以著述為務自號玄晏先生後得風痺疾因而學醫習覽經方手不輟卷遂盡其妙又曰劉德彭城人也少以醫方自達衆疾於虛勞尤為精妙療之隨手而愈猶是向風千里而至者多矣官至太醫校尉又曰史脫性器沉毅志行敦簡善診候明消息多辨論以醫術精博拜太醫校尉治黃疸病最為高手又曰宮泰幼好墳典雅尚方術有一藝長於己者必千里尋之以此精心善極諸疾於氣尤精制三物散方治喘嗽上氣甚有異效世所貴焉又曰靳邵性明敏有才術本草經方誦覽通究裁方治療意出衆表創制五石散方晉朝士大夫無不服餌皆獲異效又曰程據為太醫令武帝初受魏禪改元為太始而據貢雉頭裘帝以奇伎異服典禮所禁焚之于殿前據以醫術承恩出入禁闥因為賈后合巴豆杏子丸害愍懷太子遂就戮焉又曰范汪字玄平性仁愛善醫術常以拯恤為事凡有疾病不限貴賤皆為治之十能愈其八九撰方五百餘卷又一百七卷後人詳用多獲其效又曰殷仲堪陳郡人能清言善屬文名士咸愛之謝玄以為長史厚遇之仲堪父病積年衣不解帶躬本醫術究其精妙執書揮淚遂眇一目又曰魏詠之字長道任城人也家貧素而躬耕為事好學不倦生而菟缺有善相者謂之曰卿當富貴年十八聞荊州剌史殷仲堪帳下有名醫能療之貧無行裝謂家人曰殘醜如此用活何為遂齎數斛米西上以投仲堪既至造門自通仲堪嘉其盛意召醫語視之醫曰可割而補之但須百日進粥不得語笑詠之曰半生不語而有半生亦當療之況百日耶仲堪於是處之別屋令醫善療之詠之遂閉口不言唯食薄粥其厲志如此及羌仲堪厚資遺之劉敬叔異苑曰王纂海陵人少習經方尤精針石宋元嘉中縣人張方女日暮宿廣陵廟門下夜有物假作其壻來魅惑成病纂為治之始下一針有獺從女被內走出病遂愈宋書曰徐文伯字德秀濮陽太守熙曾孫也熙好黃老隱於秦望山有道士過求飲留一瓠蘆與之曰君子孫宜以道術救世當得二千石熙開之乃扁鵲鏡經一卷因精心學之遂名震海內生子秋夫彌工其術仕至射陽令嘗夜有鬼聲甚悽愴秋夫問何所須答言姓斯家在東陽患腰痛死為鬼痛猶難忍請療之秋夫曰云何厝法鬼請為芻人案孔穴針之秋夫如言為炙四處又針肩井三處設祭埋之明日見一人謝恩忽然不見當世伏其通靈又宋明帝宮人患腰痛牽心每至輒氣欲絶衆醫以為肉癥文伯曰此髮瘕以油投之即吐得物如髮稍引之長三尺頭已成蛇能動懸柱上水滴盡一髮而已病都羌又宋後廢帝出樂遊苑門逢一婦人有娠帝亦善診脈為診之曰此腹是女也問文伯文伯曰腹有兩子一男一女女左邊青黑形小於女帝性急便欲使剖文伯惻然曰若加刀斧恐其變異請針之立落便瀉足太陰補手陽明胎便應針而落兩兒相續出如其言又曰孫法宗忽苦頭創夜有女人至曰我是天使來相謝行創本不關善人使者誤相及但取牛糞煮傅之即驗一傅便羌一境賴之又曰羊欣字敬元性好文儒兼善醫藥撰方三十卷為代所重焉又曰秦承祖性耿介專好藝術於方藥不問貴賤皆治療之多所全護當時稱之為工手撰方二十卷大行於世
