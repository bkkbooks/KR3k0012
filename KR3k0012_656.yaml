body:
  text: 釋部三僧宋書僧道生彭城人幼而聰悟年十五便能講經及長有異解立頓悟義時人推服元嘉十一年卒於廬山又曰徐湛之為南兗州剌史招集文士盡遊玩之適時有沙門釋休善屬文湛之與之甚厚孝武命使還俗姓湯位至楊州從事又曰沙門慧琳秦郡秦縣人姓劉氏少出家住治城寺有才章兼內外之學為廬陵王義真所知嘗著均善論頗貶裁佛法云有白學先生以為中國聖人經綸百世其德弘矣智周萬變天人之理盡矣道無隱旨教罔遺筌聰睿迪哲何負於殊論哉有黑學道士陋之謂不照幽冥之途弗及來生之化雖尚虛心未能虛事不逮西域之深也為主客酬答其歸以為六度與五教並行信順與慈悲齊伍論行於世文帝見論賞之元嘉中遂參權要朝廷大事皆與議焉權侔宰相會稽孔顗常詣之慨然歎曰遂有黑衣宰相可謂冠履失所矣齊書曰趙僧岩北海人寥廓無常人不能測後忽為沙門栖遲山谷常挈一壺自隨一旦謂弟子曰吾今夕當死壺中大錢一千以通九泉之路蠟燭一鋌以昭七尺之尸至夜而亡時人以為知命建康實録曰沙門支遁字道林常隱跡東山不遊人事好養鷹馬而不乘放人或譏之遁曰貧道愛其神駿耳卒後戴安道常經其墓歎曰德音未遠而拱木已積蓋神理綿綿不與氣運俱盡耳支遁傳云本姓關氏陳留人或云河東林慮人幼有神理聰明秀徹初至京師太原王濛甚重之曰造微之功不減輔嗣又曰王坦之初與沙門笁法仰甚厚每共論幽冥報應使要先死者當報其事後經歲師忽來云貧道已死罪福皆不虛唯當勤修道德以升濟神明爾言訖不見坦之尋亦病卒梁書曰有惠岩惠議道人並住東安寺學行精整為道俗所推時鬥場寺多禪都下為之語曰鬥場禪師窟東安談議林高僧傳曰攝摩騰中天笁人漢明帝遣郎中蔡愔等往天笁尋訪佛法於彼見摩騰乃要還漢地明帝甚加賞接於城西門外立精舍以處之漢地有沙門之始也大法初傳未有歸信故蘊其深解無所宣述後卒於洛陽騰譯四十二章經一卷初緘在蘭臺騰所住處今雒城西白馬寺是也又曰笁法蘭亦天笁人自言誦經論數萬章為天笁學者之師時蔡愔既至蘭與摩騰共契遊化遂相隨而來昔漢武穿昆明池底得黑灰問東方朔朔云不經可問西域胡後法蘭至衆人追以問之蘭云世界終盡劫火洞燒此灰是也後卒於雒又曰康僧會其先康居人吳地初梁大法風化未全僧會欲使道振江左乃杖鍚東遊以吳赤烏十年初達建業營立茆茨設像行道時吳初見沙門疑為矯異有司奏曰有胡人入境自稱沙門容服非常事應檢察權曰昔漢明帝夢神號稱為佛彼之所事豈非其遺風耶即召僧會詰問有靈驗否會曰如來遷逝忽逾千載遺骨舍利神曜無方昔阿育起塔八萬四千塔寺之興以表遺化也會乃潔齊靜室以銅瓶加几燒香禮請三七日果獲舍利權大歎服即為建塔號建初寺名其地為佛陀里又曰帛尸梨密多羅此云告攴西域人呼為高座傳云國王之子當承繼世而以國讓弟遂為沙門密天姿高朗風神超邁晉永嘉初始到中國值亂仍過江上建初寺丞相王導一見而奇之以為吾之徒也密常在石子岡東行道頭陀既卒因葬于此成帝懷其風為樹剎於冢後有關右沙門來遊乃於冢處起寺陳郡謝混贊成其業仍曰高座寺也又曰釋道安姓衛氏常山扶柳人也形雖不逮於人而聰俊罕儔七歲讀書再覽能誦年至十三出家日誦萬言師敬異之為受具戒至鄴遇佛圖澄而見嗟賞與語終日因事澄為師澄講安覆疑難鋒起安挫鋭解紛行有餘力後避地南殳襄陽時襄陽習鑿齒鋒辨天逸籠罩當時其先籍安高名早以致書通好及聞安至即往修造既坐稱言四海習鑿齒安曰彌天釋道安時人以為名答安常注諸經恐不合理乃誓曰若所說不甚違理願見瑞相乃夢見胡道人頭白眉毛長語安云君所注經殊合道理我不入泥洹住在西域當相助弘通可時設食後至遠公乃知和上所夢賓頭盧也以晉太元十年卒年七十二羅什在西國聞安風謂是東方聖人恆遙禮之初安生而便左臂有一皮廣寸許著臂上可得上下之唯不得出手時人謂之為印手菩薩又曰惠遠姓賈鴈門樓煩人也屆尋陽見廬峰清靖足以息心始住龍泉精舍剌史桓伊乃為遠又於山東立房殿即東林是也絶塵清信之賓並不期而至彭城劉遺民豫章雷次宗鴈門周續之新蔡畢頴之南陽宗炳等並棄世遺榮依遠遊止著法性論羅什見而歎曰邊國未有經便暗與理合豈不妙哉遠卜居廬阜三十餘年影不出山跡不入俗每送客常以虎溪為界焉惠遠集云隆安六年桓玄遣書於惠遠言沙門令致敬王者惠遠答書論不可致之意又言袈裟非朝廷之服鉢盂非廊廟之器軍國非沙門之像竊所未安遂著沙門不敬王者論五篇一論家二論出家三論出求宗不順化四論體不兼應五論形盡神不滅著是五論以明出家之法不合同俗以致敬於王者又曰笁道生姓魏巨鹿人幼而頴悟聰哲若神初入廬山幽栖七年後還都止青園寺王弘范泰顏延之並挹敬風猷從之問道生曰夫象以盡意得意則忘象言以詮理入理則言息自經典東流譯人重阻多守滯文鮮見圓義若忘筌取魚始可與言道矣於是校閲真俗研思因果乃言善不受報頓誤成佛剖析經理洞入幽微乃說阿闡提人皆得成佛于時大部未傳舊學以為邪說譏憤滋甚後涅槃大本至于南京果稱闡提悉有佛性與前所說若合符契又曰釋惠觀姓崔清河人十歲便以博見馳名晚適廬山咨稟惠遠什公入關乃自南徂北訪核異同詳辨新舊風神秀雅思入玄微時人稱之曰通情則生融上首精難則觀肇第洛陽伽藍記曰融覺寺比丘曇謨最善於釋學講涅槃花嚴僧徒千人天笁國胡沙門菩提流支見其徒禮之號為菩薩流支解佛義知名西土西土諸夷號為羅漢流支讀曇謨最大乘義章每彈指贊歎唱言微妙即為胡書寫之傳於西域西域沙門常東向遙禮之號為東方聖人又曰僧肇法師制四論合為一卷曾呈廬山遠大師大師歎仰不已又呈劉遺民歎曰不意方袍復有平叔方袍之語出遺民也又曰佛耶舍此云覺明日誦三萬言洞明三藏與羅什法師情好共出毗婆沙論及四分律為人髭赤時號為赤髭三藏談藪曰北齊高祖多殺戮有稠禪師者以業行著稱針之曰陛下羅剎化臨水必自見之如其言果見群羅剎在其後於是乃禁斷鷹鷂造佛寺斷屠殺不食肉又曰汝南周捨清信士也學通內外兼有口才謂沙門法雲曰孔子不飲盜泉之水法師何以捉鍮石香爐答曰檀越既能載纛貧道何為不執鍮僕射徐孝嗣修緝高座寺多在被宴息法雲曰法師亦治蕭寺日夕遊此二寺鄰椄而不相往來嗣常謂法師常在高座不遊高座寺答曰檀越既事蕭門何不至蕭寺又曰魏李恕聘梁沙門重公椄恕曰向來全無葅膎戶佳切恕父名諧以為犯諱恕曰短髮粗踈重公曰貧道短髮沙門種類以君交聘二國不辨膎諧重公常謁高祖問曰弟子聞在外有四聲何者為是重公應聲答曰天保寺剎及出向劉孝綽道以此為能綽曰何如道天子萬福高僧傳曰三藏法師玄獎陳留人姓陳氏貞觀初肇自咸京誓往西國窮覽聖跡經六載至摩伽陀城凡十二年備歷聖君龍庭之文就嶺之祕皆研機覩奧矣又造伽葉結集之墟千聖道成之樹虔心頂禮焚香散花設大施會於是五天億衆十八國王獻氈投珠積如山嶽咸稱法師為大乘也及東歸太宗詔留於弘福道場乃召名德僧靈潤等二十人譯梵自菩薩戒至摩訶般若惣七十四部一千三百餘軸法師身長八尺眉目踈朗凡所遊歷一百二十八國長阿含經曰凡沙門衣鉢隨身譬如飛鳥四十二章經曰僧行道如牛負深泥中疲極不敢左右顧增一阿含經曰沙門皆草蓐為床又曰四河入海無復河名四姓為沙門皆稱釋種無為經曰沙門有三坐禪為上輩誦經為中輩助衆為下輩道安傳曰初魏晉沙門依師為姓故姓各不同安以為大師之本莫尊釋迦乃以釋命氏後獲增一阿含經果稱四河入海無復河名既懸與經符遂為永式異僧上晉書曰鳩摩羅什天笁人也世為國相父鳩摩炎聰懿有大節將嗣相位乃辭出家東度蔥領龜茲王聞其名郊迎之請為國師王有妹年十二才悟明敏諸國交聘並不許及見炎心欲當之乃逼以妻焉既而羅什在胎其母慧解倍常及年七歲母遂與俱出家羅什從師受經日誦千偈義亦自通年十二其母攜到沙勒國王甚重之遂停沙勒一年博覽五經為性率達不拘小撿專以大乘為化諸學者共師焉年二十龜茲王迎之還國廣說諸經四遠學徒莫之能杭西域諸國咸伏羅什神雋符堅聞之乃遣呂光率兵伐龜茲謂光曰若獲羅什即馳驛送之光還至涼州聞符堅為姚萇所害於是竊號河右羅什在涼州積年姚興破呂隆乃迎羅什待以國師之禮嘗講經于草堂寺忽下高座謂興曰有二小兒登吾肩欲鄣須婦人興以宮女進之生二子焉又曰沙門曇瞿禿髮傉檀時從河南來持一鍚杖令人跪曰此是波若眼奉之可以得道或人藏其鍚杖曇瞿大哭數聲開目須臾起而取之咸奇其神異莫能測也後兵亂不知所如又曰佛圖澄天笁人也姓白氏少學道妙通玄術永嘉四年來適洛陽自云百有餘歲常服氣自養能積日不食善誦神呪能役使鬼神以油麻雜茵支塗掌千里外事皆徹見掌中如對面焉腹旁有一孔常以絮塞之每夜讀書則拔絮孔中出光照于一室又常齊時平旦流水側從腹旁孔中引出五藏六腑洗之還內腹中卒於鄴宮寺復有沙門從雍州來稱見澄西入關石季龍掘而觀之唯有一石而無尸季龍惡曰石者朕也葬我而去吾將死矣明年季龍死梁書曰沙門釋寶志不知何許也於宋太始中見之出入鍾山往來都邑年已五六十矣宋齊之交稍顯靈跡被髮徒跣語默不論或被錦袍飲啖同於凡俗恆以鏡銅剪刀鑷屬柱杖負之好為懺記所謂志公符是也天監十三年卒將死忽移寺金剛像出置戶外語人云菩薩當去旬曰無疾而終先是琅琊王筠至莊嚴寺寶志遇之與交言歡飲至亡勑令筠為碑蓋先覺也洛陽伽藍記曰沙門寶公不知何許人也刑貌寢陋心識通達過去未來預覩三世發言似讖不可得解事過之後始驗其實胡太后問以世事寶公曰把粟與雞喚朱朱時人莫解建義元年后為爾朱榮所害始驗其言又曰法雲寺西域烏長國胡沙門曇摩羅所立摩羅聰惠利根學窮釋氏至中國即曉魏言及隸書凡所聞見無不通解京都沙門好胡法者皆就摩羅授持之戒行真苦祕呪神驗呪枯樹能生枝葉呪人變為驢馬見者莫不驚怖西域所齎舍利骨及佛牙經像皆在此寺高僧傳曰耆域天笁人以晉惠之末至于洛陽見洛陽宮城云髣佛似忉利天宮但自然之與人事不同耳又曰匠此宮者從忉利天來成便還天上矣又曰犍陀勒者本西域人來至洛陽積年雖敬其風操而終莫能測後謂衆僧曰洛東南有槃鴟山山有寺廟處基托猶存可共修立衆未之信試遂撿視入山到一處四面平坦勒示云此山寺基也即掘之果得寺下石基後示講堂僧房處如言皆驗衆咸驚歎因共修立焉又曰釋曇始關中人晉孝武太元末齎經律數十部往遼東宣化顯授三乘高句驪聞道之始也義熙初復還關中始足白於面雖跣涉泥水未常沾濕天下咸稱白足和尚又曰釋法成涼州人十六出家學經律不餌五穀唯食松脂隱居岩穴習禪為務後小疾便告衆云亡常誦寶積經於是自力誦之始得半卷氣劣不堪乃令人讀之一遍裁竟合掌而卒侍疾十餘人咸見空有紺馬負金棺升空而逝又曰笁曇猷燉煌人少苦行習禪定遊江左止剡之石城山乞食坐禪後有神見形詣猷曰師威德既重來止此山弟子輒推室以相奉天台山懸崖峻峙峰嶺切天古老相傳云上有釋舍得道者居之雖有石橋跨澗而撗石斷之自終古以來無得至者猷行至橋所聞空中聲曰知君誠篤今未得度卻後十日自當來也猷每恨不得度石洞開度橋少許覩精舍神僧果如前所說因共燒香中食食畢神僧謂猷曰卻後十年自當來此今得住於是而返又曰釋曇諦其先康居人母黃氏晝寢夢見一僧呼黃為母寄一塵尾并鐵鏤書鎮二枚眠覺見兩物具存因而懷孕生諦諦年五歲以塵尾等示之諦曰秦王所餉母曰汝置何處答曰不憶至年十歲出家學不從師悟自天發後見僧㗉音略法師㗉曰即先師弘覺法師㗉晚入吳居虎丘寺唐高僧傳曰萬回姓張氏閿鄉人其形如愚蒙其跡乃神聖苦樂貴賤不關其心歌哭隱顯不恆其性剃髮褐衣遊伽藍年十歲有兄戍遼陽其母憶甚飯僧祈福師忽然裏齊餘出門徑去晚際執兄書至母驚問其由默然而無對後兄來還言是日萬回云從家來啖齊餘取書而反始知其靈神焉中宗賜號玄通大居士封雲誨公
