body:
  text: 兵部四十二請戰左傳曰帥師以來固敵是求敵至不擊將何俟矣又曰晉師至于靡笄之下齊侯使請戰又曰子玉使伯棼請戰曰非敢必有功也願以間執讒慝之口又曰晉侯逆秦師使韓簡視師韓簡晉大夫韓萬之孫復曰師少於我鬥士倍於我公曰何故對曰出因其資請奔梁求秦也入用其寵為秦所納飢食其粟三施而無報是以來也今又擊之我怠秦奮倍猶未也公曰一夫不可狃況國乎狃忲也言避秦則使忲來遂使請戰曰寡人不佞能合其衆而不能離也君若不還無所逃命秦伯使公孫枝對曰君之未入寡人懼之入而未定列猶吾憂也茍列定矣敢不承命又曰子玉使鬥勃請戰曰請與君之士戲君憑軾而觀之得臣與寓目焉晉侯使欒枝對曰煩夫子謂二三子戒爾車乘敬爾軍事詰朝將見穀梁曰請一戰不克請再再不克請三三不克請四四不克請五五不克舉國而授於是而與之盟史記楚世家曰六年秦使白起伐韓於伊闕大勝斬首三十四萬秦乃與楚王書曰楚倍秦秦且率諸侯伐爭一旦之命願王之飭士卒得一樂戰楚頃襄王患之乃謀與秦平後漢書王霸傳曰霸軍中壯士路潤等數十人斷髮請戰挑戰孫子曰忿速可侮急疾之人可忿怒而致死忿速易怒者也主不可以怒而興軍不可以慍而致戰合於利而用不合於利而止人主聚衆興軍以道理勝負之計不可以己之私舉兵則以策不可以慍恚之故而合戰也怒而可以復喜慍而可以復悅亡國不可以復存死者不可以復生主怒興伐人無素謀明計則破亡矣將慍怒而鬥倉卒而合戰所傷殺必多怒慍復可以悅喜言亡國不可復存死不可復生言當須憤之也故曰明王慎之良將警之此安危之道也警戒也左傳曰趙旃求卿未得且怒於失楚之致師者請挑戰弗許請召盟許之左傳曰楚許伯御樂伯攝叔為右以致晉師許伯曰吾聞致師者御靡旍摩壘而還靡近也靡於馳也樂伯曰吾聞致師者代御執轡御下兩馬掉鞅而還叔曰吾聞致師者右入壘折或馘斷首耳也執俘而還皆行所聞而復晉人逐之左右角之樂伯左射馬而右射人角不能進矢一而已麋興於前射麋麗龜戰國策曰魏武侯問吳起曰兩軍相常不知其將欲擊何如起曰令賤而勇者將而擊鋭交合而北告而勿罰觀敵進取一來一起其政以理奔北不追見利不取此將有謀若其衆追北旗幟雜亂自止自行或縱或橫貪利務得凡若此類將令不行史記曰吳世家曰夏吳伐越越王勾踐迎擊之雋李賈逵曰越地也越使死士挑戰三行造吳師自頸左傳曰使罪人三行屬劍亦頸吳師觀之因伐吳敗之姑蘇又曰漢王項羽相與臨廣武間而語項羽欲與漢王獨身挑戰漢王數項羽十罪大怒伏弩射中王胸漢王捫足曰虜中吾指又曰王翦代李信擊荊荊兵數挑戰終不出久之翦使人問軍中戲乎曰方投石超距翦曰士卒可用矣漢書曰項羽使人謂漢王曰天下胸胸以吾兩人願與王挑戰決雌雄無徒罷天下父子為漢王笑謝曰吾寧鬥智不鬥力羽令壯士出挑戰三合樓煩輒射殺之羽大怒自被甲挑戰樓煩欲射羽嗔目叱之樓煩目不能視手不能發走還入壁不敢復出漢王使問之乃羽漢王大驚又曰楚漢相持彭城數絶楚糧道項羽欲討越謂其將曹咎曰謹守成皋即漢欲挑戰慎勿與戰無令得東我十五日必誅彭越定梁地漢果數挑戰楚軍不出使人辱之五六日曹咎怒度兵汜水漢擊之大破楚軍盡得楚國貨賂曹咎自刎汜水上後漢書曰張堪為謁者使送委輸縑帛并領騎七千匹詣大司馬吳漢代公孫述在道追拜蜀郡太守時漢軍餘七日糧陰具船欲遁去堪聞之馳往見漢說述必敗不宜退師之策漢從之乃示弱挑敵果自出戰死城下又曰王霸討蘇茂賊聚衆挑戰霸堅不出方饗士作倡樂茂兩射營中中霸前酒樽安唑不動軍吏皆曰茂前日已破今易擊也霸曰不然蘇茂客兵遠來糧食不足故數挑戰以徼一切之勝徼要也一切猶權時也令閉營休士所謂不戰而屈人之兵善之善者也茂既不得戰乃引還營又曰董憲叛馬成拜揚武將軍發會稽丹陽九江六安四郡兵擊憲進圍憲於野令諸軍各深溝高壘憲數挑戰成堅壁不出守之歲餘至六年春城中食盡乃攻之遂屠舒斬憲魏志曰公西征馬超進軍度渭超等數挑戰不許公乃剋日會戰先以輕兵挑之戰良久乃縱虎騎夾擊大破之魏氏春秋曰諸葛亮遇司馬宣王因挑戰致巾幗婦人之飾以怒宣王魏略曰太祖在漢中而劉備栖於山領使劉封下挑戰太祖罵曰賣履舍長使假子拒汝公乎呼我黃鬚兒來令擊之乃召曹彰晨夜進追西到長安而太祖已還崔鴻十六國春秋曰姚襄據黃落前秦符堅遣將黃眉鄧羌等率步騎討之襄深溝高壘固守不戰鄧羌說黃眉曰傷弓之鳥落於虛發襄頻為晉將桓張平所敗鋭氣喪矣今固壘不戰是窮寇也襄性剛很易以剛動若長驅鼓行且壓其壘襄必忿而出師可一戰擒也黃眉從之遣羌追騎三千軍於襄壘果怒盡鋭出戰羌僞不勝引騎而退襄追至于三原羌回騎拒襄俄而黃眉至大戰斬之盡俘其衆宋書曰沈攸之反自江陵舉兵東下分兵出夏口據魯山攸之既至郢以郢城弱小足攻宋郢州今江夏郡遣人告郢州守將柳世崇曰被太后令當蹩還都卿既相與奉國想得此意世崇答曰東下之師久承聲問郢城小鎮自守而已攸之將去世崇遣軍於西渚挑戰攸之果怒令諸軍登岸燒郭邑築長圍攻之世崇隨宜拒應衆皆披却攸之軍因之敗潰隋書曰陳茂從高祖與齊師戰於晉州賊甚盛高祖將挑戰茂固止不得因捉馬鞚高祖忿之拔刀斫其額流血被面詞氣不撓高祖感而謝之厚加禮敬又曰竇榮定之擊突厥也史萬歲詣轅門請自效榮定素聞其名見而大悅因遣人謂突厥曰士卒何罪過令殺之但當各遣一壯士決勝負耳突厥許諾因遣一騎挑戰滎定遣萬歲出應之萬歲馳斬其首而還突厥大驚不敢復戰遂引軍而去唐書曰高祖初起師次霍邑隋將宋老生拒之上謂諸將曰老生若嬰城自守當即攻之主客勢懸卒難致力其計若何太宗進曰老生勇而無謀請以輕兵挑之必出戰則成擒矣從之太宗以數騎詣其城下舉鞭指麾若將圍城者老生果怒開門出兵太宗馳白高祖曰事諧矣高祖因謂隴西公建成曰汝看兩陳將交引左軍直趨東門命太宗引右軍直趨南門以斷其歸路老生之軍背城而陳高祖以中軍與建成合陳於城東太宗及柴紹陳於城南老生麾兵疾進先薄高祖而建成墜馬老生乘之中軍與左軍咸却太宗自南原遙見塵起知義師退率二百騎馳下峻坂殺一賊將遂衡斷其軍出于陳後表裏齊譟響若崩山隋師大潰各捨杖而走懸門發老生不得入城乃棄馬投塹甲士斬之致其首於麾下流血數里僵死尸相枕四面乘勝進薄其城時無攻具士卒緣矟而上一時攀堞無敢當者遂平霍邑撫其餘衆而用之又曰杜伏威既敗隋師煬帝又遣將軍陳稜討之稜不敢戰伏威知其怯懦因遺稜婦人之服以激怒之稜果大怒恚率衆而至伏威逆拒殺數千人稜僅以身免又曰竇建德自滎陽西上太宗以數百騎出武牢關二十餘里以挑之往往設伏比至賊營才四騎而已謂左右曰賊見我而旋是其上計乘險逐我是其下策賊初見騎少疑為斥候太宗謂曰我秦王也因引弓射之斃其一將賊以兵六十騎並援槍而至從者咸失色太宗謂之曰爾但前去我自殿後於是桉轡徐行賊至引弓射之斃一將賊懼而止止而復來如是再三每來必斃賊乃不敢復逼太宗且挑且還伏兵相次而發合擊破之獲其大將殷秋石瓚斬首數百級決戰上六韜曰周武王將伐紂問太公曰今敵人圍我斷後絶糧吾欲徐以為陳以敗為勝奈何太公曰不可此天下困兵也暴用之則勝徐用之則敗可為四衝陳以驍騎驚其親君左軍疾左右軍疾右中軍迭前迭後往敵之空吾軍疾擊鼓而當之又曰敵踈其陳又遠其後跳我流矢以弱我弓弩勞我士卒為之奈何太公曰發我鋭士先擊其前車騎獵其左右引而分隊以隨其後三軍疾戰凡以少擊衆避之於易要之於險避之以晝取之於夜故曰以一擊十莫善於厄以十擊百莫善於險以千擊萬莫善於阻用衆者務易用少者務厄也左傳曰晉師伐齊陳于莘所臻切晉解張御郤克鄭丘緩為右及戰郤克傷於矢流血及屨未絶鼓音中軍將自執旗鼓故雖傷而擊鼓不息也曰余病矣張侯曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病吾子忍之丘緩曰自始合茍有險余必下推車子豈識之然子病矣以其不識己推車也張曰師之耳目在吾旗鼓進退從之此車一人殿之可以集事殿鎮也集成也若之何以病敗君之大事也擐甲執兵固即死也擐貫即就也擐音患病未及死吾子勉之左并轡并畢正切右援抱音桴而鼓馬逸不能止師從之晉師從郤克車齊師敗績又曰齊侯伐晉夷儀敝無存之父將室之辭以與其弟無存齊人也室之為取婦曰此役也不死反必娶於高國高氏國氏齊貴族也無存欲必有功還取卿相之女也先登求自門出死於霤下既入城夷儀人不服故鬥死於門屋霤下也齊侯克夷儀謂夷儀人曰得敝無存者以五家免給五家不使役乃得其尸公三禭之禭衣也比殯加禭深厚禮之也與之犀軒直蓋犀軒卿車直蓋高蓋也親推之三齊候自推喪車輪三轉也國語曰齊莊公且伐莒為車五乘之賓而杞梁華舟獨不與焉故歸而不食其母曰汝生而無義死而無名則雖非五乘孰不汝笑也生而有義死而有名則五乘之賓盡汝下也趣食乃行杞梁華舟同車侍於莊公而行至莒莒人逆之杞梁華舟下鬥獲甲首三莊公止之曰子止與子同齊國杞梁華舟曰君為五乘之賓而舟梁不與焉是少吾勇也臨敵涉難止我以利是惡吾行也深入多殺者臣之事也齊國之利非吾所知也遂進鬥壞軍陷陳三軍不敢當戰國策曰齊上將田單率師將攻狄魯仲連子曰將軍攻狄必不能下矣單曰單以破亡餘卒破萬乘之燕今攻狄而不能下何也上車不謝而去遂攻狄三月不克齊嬰兒謠曰大寇若箕修劍柱歸單乃懼問仲連子對曰將軍在即墨之時坐即織簣立即杖插為士卒唱當此之時將軍有死之心而士卒無生之氣聞是言莫不掩泣奮臂而欲戰此所以破燕也當今將軍東有掖邑之封西有淄上之寶足以樂生而惡死此以不勝也田單明日結髮勵氣立於矢石間引抱而鼓之狄人乃下漢書曰御史大夫韓安國曰魏其言灌夫父死事荷戟驅不測之吳軍身被數十創名寇三軍此天下壯士也非有大惡爭杯酒不足引他過以誅之後漢書曰劉伯升起兵光武守昆陽莽將王尋王邑來討兵號百萬先至昆陽已十萬圍數重時伯升已拔宛三日而光武尚未知乃僞使持書報城中云宛下兵到而佯墮其書尋邑得其書不喜諸將既經纍捷膽氣益壯無不一當百光武乃與敢死者三千人從城西水上衝其中堅尋邑陳亂乘勢崩之遂殺王尋城中亦鼓噪而出中外合勢震呼動天莽兵大潰走者相騰踐又曰郟令馮魴力戰死帝曰此健令又曰吳漢率兵圍蘇茂於廣樂劉永將周建來救漢將輕迎戰不利墮馬傷膝還營諸將謂漢曰大敵在前而公傷臥衆心懼矣漢乃勃然褁瘡而起椎牛饗士令軍中曰賊衆雖多皆劫掠群盜勝不相讓敗不相救非有杖節義者也今日封侯之秋諸君勉之於是軍士激怒人倍其氣明日建茂出兵圍漢選四部精兵三千餘人齊鼓而進建軍大潰還奔城漢長驅追擊大破之李陵答蘇武書曰昔先帝授陵步卒五千出征絶域五將失道陵獨遇戰單于謂陵不可復得便欲引還而賊臣教之遂便復戰故陵不得免耳司馬遷報任少卿書曰且李陵提步卒不滿五千深踐戎馬之地足歷王庭垂餌虎口橫挑強胡億萬之師與單于連戰十有餘日所殺過當
