body:
  text: 人事部六十六清廉上釋名曰清青也去濁遠穢色如青也廉歛也自檢歛也左傳襄元曰季文子卒宰庀家器為葬具無衣帛之妾無食粟之馬無藏金玉無重器備器備謂珍寶甲兵之物君子是以知季文子之忠於公室也相三君矣而無私積可不謂忠乎又襄二曰宋人或得玉獻諸子罕子罕弗受獻玉者曰以示玉人玉人以為寶也故敢獻之子罕曰我以不貪為寶爾以玉為寶若以與我皆喪寶也不若人有其寶又襄五曰與晏子邶殿其鄙六十弗受子尾曰富人之所欲也何獨弗欲對曰慶氏之邑足欲故亡吾邑不足欲也益之以邶殿乃足欲足欲亡無日矣且夫富如布帛之有幅焉為之制度使無遷也謂之幅利利過則為敗吾不敢貪多所謂幅也與子雅邑辭多受少漢書曰琅琊邴漢以清行徵為京兆尹漢遂歸老於鄉里漢兄子曼容亦養老自脩為官不肯過六百石輒自免去其名過出於漢又曰蓋寬饒身為司隸子常步行自戍北邊蘇林曰子自行戍不敢伐也公廉如此又曰趙禹以佐吏補中都官用廉為令史事太尉周亞夫為丞相史府中皆稱其廉平然亞夫弗任曰極知禹無害然文深禹持文法深刻續漢書曰第五倫字伯魚京兆長陵人倫脩行清白嘗召見上曰聞卿為吏不過從弟兄飯寧有之耶倫對曰臣生遭飢饉米石萬錢不敢妄過人飯又曰袁彭字伯楚祖父安歷廣漢南陽太守順帝初為光祿勳行至清為吏麤袍糲食終於議郎東觀漢記曰司空宋弘嘗受俸得鹽令諸生糶諸生以賤不糶弘怒悉賤糶不與民爭利又曰孔奮字君魚右扶風人守姑臧長供養至謹老母極膳妻子但食蔥菜或啁奮曰置脂膏中不能自潤而奮不改又曰楊震字伯起弘農人性公廉不受私謁子孫常蔬食步行故舊長者或欲令為開產業震不肯曰使後世稱為清白吏子孫以此遺之不亦厚乎為東萊太守道經昌邑邑令王密故所舉茂才夜懷金十斤以遺震震曰故人知君君不知故人何也密曰夜無知者震曰天知神知何謂無知范曄後漢書曰天知神知卿知我知也又曰閔仲叔客居安邑老病家貧不能買肉日買一片豬肝屠者或不肯為斷安邑令候之問諸子何飯對曰但食豬肝屠或不肯予令出勑市吏後買輒得仲叔怪問其子道狀乃嘆曰閔仲叔豈以口腹累安邑耶遂去之又曰梁鴻少孤常獨止不與人同食比舍先炊已呼鴻及熱釜炊鴻曰童子鴻不因人熱者也滅竈更然火又曰廉范年十五至蜀迎祖母喪及到葭萌舩沒幾死太守張穆持筒中布數篋與范范曰石生堅蘭生香前後相違不忍行也遂不受又曰魯恭弟正耽思閉門講誦兄弟雙高太尉趙喜歲時遺子送米肉辭讓不受謝為後漢書曰黃向字文章為性廉潔常步行於路中得金璣一囊可直二百餘萬募求得其主還之又曰范丹姊病往看之姊設食丹以姊壻不德出門留二百錢姊使人追索還之丹不得已受之聞里中芻藁僮僕更相怒曰言汝清高豈范史雲輩而云不盜我菜乎丹聞之曰吾之微志乃在僮豎之口不可不勉遂投錢去又曰羊茂字季寶豫章人為東郡太守冬坐白羊皮夏處丹板榻常食乾飯出界買鹽鼓又曰巴袛字敬祖為楊州刺史在官不迎妻子暗坐不然官燭又曰左雄字伯豪為冀州刺史不舉煙火常食乾飯又曰羊續字興祖泰山人為廬江太守臥一幅布綯穿敗糊紙以補綯為南陽太守初之郡府丞嘗獻其生魚續受而懸之於庭丞後又進之續乃出所懸者以杜其意又曰徐稚字孺子豫章南昌人也少為諸生隱處篤行常身躬耕非其衣不服非其食不食糠粃不厭所居閭里服其德化又曰河南陶碩鄉曲餉之碩無所受但食棗飲水而已袁山松後漢書曰范丹字史雲外黃人為縣吏年十八棄衣物道邊家以為死遂西入關學為萊蕪長去官於市賣卜妻紡績以自給辟公府步行無被囊自隨常使兒裙麥得五斛鄉人遺之一斛屬兒曰莫令尊君知兒歸不敢不道丹即令并送六斛言麥已雜遂不取丹弟子愷見丹藩不完載柴將藩之時丹適行還怒勑子拔柴載還之閭里歌之曰甑中生塵范史雲釜中生魚范萊蕪自以性急每為吏常佩韋范曄後漢書曰張禹字伯達性篤厚父歆卒於汲令使人贈送前後數百萬悉無所受又曰檀敷字文有山陽瑕丘人少為諸生貧而志清不受鄉里施惠又曰鄭均字仲虞東平人少好黃老書兄為縣吏頗受禮遺均數諫止不聽即脫身為傭餘得錢帛歸以與兄曰物盡可復得為吏坐贓身捐棄兄感其言遂為廉潔典略曰程豎字謀甫南陽武陰人仁孝清潔居貧無資磨鏡自給不受人施諸嫗共漂更相呼食或不食者相謂曰汝非程謀甫何為不食人食魏略曰沐並字德信河間人少孤苦袁紹父子時始為吏名有志介嘗過姊姊為殺雞炊黍而不留為三府長吏時吳使朱然諸葛瑾攻圍樊城遣舩兵於峴山東斫材兵人作食有先熟者呼後熟者荅言不也呼者曰汝欲作沐德信耶其名流布播於異域如此又曰舊故西征有官廚財藉遷轉之際無不因緣而趙儼又手上車發到灞上忘持其常所服藥雍州聞之乃追送雜藥朴數箱儼笑曰人言語殊不易我偶問所服耳何用是為遂不取魏志曰盧欽著書稱徐邈曰徐公志高行潔才博氣猛其施之也高而不狷潔而不介博而守約猛而能寬聖人以清為難而徐公之所易也或問欽徐公當武帝之時人以為通向在涼州及還京師人以為介何也欽荅曰往者毛孝先崔季珪用事貴清潔之士時皆變易車服以求名高而徐公不改其常故以為通比來天下奢靡轉相放効而徐公雅尚自若不與世同故前日之通乃今日之介是世人無常而徐公有常也又曰景初二年以蒲寵年老徵還為太尉寵不治產業家無餘財詔曰君典兵在外專心憂國有行父祭遵之風賜田十頃榖五百斛錢二十萬以明清忠儉約之節又曰胡質為荊州刺史薨家無餘財唯有賜衣書篋而已王隱晉書曰魏舒為尚書三娶妻皆亡自表求還本郡葬上曰魏舒清貧不營財產頓舉眾喪必無以自供其賜葬地一頃錢五十萬鄧粲晉記曰王敦籍周顗家笥簏中有故絮故播酒五甕米數斛在位者服其清晉陽秋曰胡威字伯虎少有志尚清白歷位宰牧武帝賜見嘆其父清因謂威曰卿清孰與父清威對曰臣不如也帝曰以何為不如對曰臣父清恐人知臣清恐人不知是臣不如遠矣晉中興書曰劉驎之字子驥志在逸遁居于岐陽凡人致贈一無所受又曰龔玄之字道玄潛處未曾至公門有致餉一無所受又曰翟湯字道淵尋陽人篤行純素始安太守于干寶與湯通家遣船餉之勑吏翟公廉讓卿致書記便委舩還湯無人送致乃更貨易絹物因寄還寶寶本以惠而反煩之益愧嘆焉徐廣晉記曰中宗令曰太常賀循冰清玉潔行為俗表孤曾造其廬屋室服物周身而已賜床褥錢二十萬崔鴻前涼錄曰汜勝字無忌燉煌人舉孝廉除郎中天下亂去官還鄉里太守張閟造之閉門不見禮遺一無所受北齊書曰辛術字懷哲隴西人為淮南經略所部郡守犯大辟朝廷以其奴婢及資財盡賜術術三辭不見許術乃書送詣所司不復聞奏邢邵聞之遺術書曰昔鍾離意云孔子忍渴盜泉珠璣委地今能如此可謂異代一時沈約宋書曰柳元景南岸有數十畝菜園人賣菜得錢三萬送宅元景怒曰我立此園種菜以供家中噉之乃復賣取錢奪百姓之利耶以錢乞守園人又曰郭原平性至孝太守蔡興宗以私米遺之固辭不受許瑤之罷建安郡丞還家以綿一斤遺原平原平不受送而復反者前後數十瑤之乃自往曰今歲過寒而建安綿好以此奉尊上下耳原平乃拜而受之原平以種瓜為業大旱瓜瀆不復通舩世祖令劉僧秀下瀆水與之原平曰今天大旱百姓俱困豈可減溉田之水以通運瓜之船步行從他道往錢塘貨賣又曰孔顗字思遠不尚矯飾服用麤敗終不改易時吳郡顧顗之亦尚儉素衣裘器服皆擇其陋者宋世言清約稱此二人顗弟道存從弟微頗營產業二弟請假東還輜重十餘舡皆是綿絹紙席之屬顗見之令上置岸側命左右取火燒之盡乃去道存代顗為江夏內史時都邑米貴道存慮顗甚乏遣吏載五百斛米餉之顗呼吏載米還彼吏曰都下米貴乞於此貨之不聽吏乃載米而去
