body:
  text: 鱗介部十四蛤易進卦驗曰立冬燕雀入水為蛤禮記月令曰季秋之月雀入大水為蛤汲冢周書王會曰東越海蛤東越則海際蛤文蛤三國典略曰周天和元年夏齊冀州人於蚌蛤中得瑤環一隻又曰徐之才初遷豫章王綜國常侍隨綜入背有一人患足跟痛諸醫咸莫能識之才視之曰蛤精疾也得之當由乘船入海垂腳入水中疾者曰實曾如此之才為剖之得蛤子二大如榆莢淮南子曰土龍致兩燕燕鴈代飛燕春南而鴈秋北也蛤蚌珠龜與月盛衰呂氏春秋曰月者群陰之本月望則蚌蛤實群陰盈月晦則蚌蛤虛群陰湫夫月形于天而群陰化乎淵漢武帝內傳曰西王母云仙家之藥有白水靈蛤汝南先賢傳曰周燮字彥祖好潛靖養志唯典籍是樂有仙人草廬廬下有陂魚蛤生非身所耕則不食也南越志曰凡蛤之屬開口聞雷鳴不復閉雲南記曰新安蠻婦人於耳上懸金環子聯貫瑟瑟帖於髻側又繞腰以螺蛤聯穿繫之謂為珂珮博物志曰東海有蛤鳥常啖之其肉消盡殼起浮出更薄在沙中岸邊潮水往來碏薄蕩白如雪入藥最精勝探取自死者崔豹古今注曰島鴈常在河邊沙上食沙石悉皆銷爛唯食蛤不銷隨其糞出用以為藥倍勝常者本草經曰文蛤表文味鹹無毒主際陰蝕惡創五痔大孔盡血生東海左思賦曰蚌蛤珠胎與月虧全蛺燮臨海水土物志曰蛺燮似蛤如𩷪大三蝬臨海水土物志曰三蝬似蛤車螯沈約宋書曰廬陵王義真出為南豫州刺史劉湛為長史義真出時居高祖憂使帳下備膳湛禁之義真乃於齋內別立廚帳會湛入暖酒炙車螯湛正色曰公當今不宜有此設義真曰且甚寒一杯酒亦何傷酒既至湛因起曰既不能以禮自處又不能以禮處人謝靈運答弟書曰前月十二日至永嘉郡蠣不如鄞縣車螯亦不如北海移角臨海水土物志曰移角似車螯角移不正名曰移角姑勞臨海水土物志曰姑勞如車螯而殼薄羊蹄臨海水土物志曰羊蹄似蚌味似車螯羅江小盧有之蛤蜊宋書曰王融初為司徒法曹詣王僧祐因遇沈昭略未相識昭略屢顧眄謂主人曰是何年少融殊不平謂曰僕出於扶桑入於暘谷照曜天下誰云不知而卿此問何也昭略云不知許事且食蛤蜊融曰物以群分方以類藂君長東隅居然應嗜此族淮南子曰若士方捲龜殼而食蛤蜊抱朴子曰若士所食此必草也又海中自有蛤蜊螺蚌之類未加煮凡人所不能噉況君子若士乎蘆雉臨海水土物志曰蘆雉似蛤蜊殼小薄耳蚶唐書曰元和中嶺南節度使崔詠卒宰臣奏擬皆不可上謂裴度曰嘗有諫進海蚶淡菜者詞甚忠正卿可求此人與之度出以訪人或有言孔戣諫者度即日以聞乃命之廣志曰巨延州以蚶與行估貿易臨海水土物志曰蚶側徑四尺也盛弘之荊州記曰始安郡駭鹿山山上有石室鑿內輒得骨并獲蚶嶺表録異曰瓦屋子蓋蚌蛤之類也南中舊呼為蚶音憨子頃因盧鈞尚書作鎮遂改為瓦屋子以其殼上有稜如瓦壠故名焉殼中有肉紫色而滿腹廣人尤重之多燒以薦酒俗呼為天臠炙喫多即壅氣背膊煩疼未測其本性也烏頭臨海水土物志曰烏頭似蚶下來螊切似蛤出海中臨海水土物志曰下來螊雖似烏頭各自有種又曰螊蛤有似烏頭越王臨海水土物志曰越王形似螊殼赤尾如人爪形蠣梁書曰何胤初侈於味食必方丈後稍欲去其甚者猶食白魚鱔市漁切脯糖蟹以為非見生物疑食蚶蠣使門人議之學生鍾玩曰鱔之就脯驟於屈中蟹之將糖躁擾彌甚仁人用意深懷如怛至於車螯蚶蠣眉目內闕慚渾沌之奇獷殼外緘非金人之慎不悴不榮曾草木之不若無香無臭與瓦礫其何算故宜長充庖廚永為口味竟陵王子良見玩議大怒汝南周顒與胤書勸令食菜茅君內傳曰欲合九轉先作神金取東海左顧牡蠣凡六物令分等各搗三萬杵谷異物志曰古賁灰牡蠣殼臨海水土物志曰蠣長七尺南越志曰南上謂蠣為蠔甲為牡蠣合澗洲圓蠣土人重之語曰得合澗一蠣雖不足豪亦可以高也永嘉郡記曰樂成縣新溪口有蠣嶼方圓數十畝四面皆蠣其味偏好謝靈運遊名山志曰新溪蠣味偏甘有過紫溪者嶺表録異曰盧亭亭盧循遺類也循昔據廣州既敗餘黨奔於海島野居唯食蠔蠣疊殼為牆壁又曰蠔即牡蠣也其初生海島邊如拳石四面漸長有高一二丈者巉巖如山每一房內蠔肉一片隨其所生前後大小不等每潮來諸蠔皆開房伺蟻入即合之海夷盧亭亭者以斧楔取殼燒以烈火蠔即啓房挑取其肉貯以小竹筐趁虛市以易醑米盧亭好酒以蠔肉換酒也蠔肉大者腌為炙小者炒食肉中有滋味食之即甚壅腸胃蜆爾雅曰蜃小者曰珧郭璞注曰新燕蛤也江東呼為蜆也蟹廣雅曰蟹蚭音尼也其雄曰蜋蟻其雌曰轉帶山海經曰大蟹在海中蓋十里之蟹又女丑有大蟹廣千里汲冢周書王會曰成王時海陽獻蟹大戴禮曰蟹二螯八足非鱣之穴而無所寄托者心躁也孫卿子同禮記檀弓下曰成人者兄死而不為衰者聞子皋將為成宰遂為之衰成人曰蠶則績而蟹有筐范則冠而蟬有緌兄則死子皋為之衰孝經援神契曰蟹二螯兩端傍行螯猶兵也小蟲而欲兩端自衛故使傍行也晉書曰解系坐免官以白衣還第闔門自守及張華裴頠之被誅也倫秀以宿憾收系兄弟梁王彤救系等倫怒曰我於水中蟹且惡之況此人兄弟輕我耶此而可忍孰不可忍彤苦爭之不得遂害之又曰劉聰左都水使者襄陵王攄坐魚蟹不供斬於東市三國典略曰周永定元年夏四月齊主禁取蟹蛤之類唯許私家捕魚淮南子曰夫釋大道而任小數無以異於使蟹捕鼠蟾諸捕蚤不足以禁姦塞邪亂乃逾滋以艾灼蟹筐上內置穴中乃熱走窮穴適能擒一鼠又曰礠石引鐵蟹之敗漆置蟹漆中則漆敗也雖在明知弗能然也抱朴子曰若蟹之化漆麻之壞酒此不可以理推者也又曰山中稱無腹公子者蟹也又曰兵地生蟹者宜急移軍太一在玉帳之中不可攻也郭子曰畢茂世云一手持蟹螯一手持酒杯拍浮酒池中可了一生哉國語曰越王召范蠡而問焉曰與子謀吳子未可也今其稻蟹食不遺種其可乎范蠡對曰天應至矣謂稻蟹人事未也勤須厲志世説曰蔡司徒渡江見蟛蜞大喜曰蟹有八足加以二螯令烹之既食委頓吐下方知非蟹後向謝仁祖説此事謝曰卿讀爾雅不熟幾為勤學死劉孝標云大戴禮勸學篇曰蟹八足二螯非蛇蛆之穴無所寄托者用心躁也故爾雅云螖小者勞即彭螖也似蟹而小按今蟛蜞小於蟹而大於螖爾雅所謂螖澤者也然此三物皆八足二螯狀甚相類蔡謨不精其大小食而致斃故云讀爾雅不熟也永嘉郡記曰安國縣有山鬼形體如人而一腳裁長一尺許好噉鹽伐木人鹽輒偷將去不甚畏人人亦不敢伐木犯之即不利也喜於山澗中取石蟹伺伐木人眠息便十十五五出就火邊跂石炙噉之嘗有伐木人見其如此未眠之前痛燃石使熱羅置火畔便佯眠看之須臾魑出悉皆跂石石熱灼之跳梁叫呼罵詈而去此伐木人家後被燒委頓博物志曰南海有水蟲名剻蛤之類也其中有小蟹大如揄莢蒯開甲食則蟹亦出食蒯合甲蟹亦還入為蒯取以歸始終死不相離又曰蟹漆相合成水神仙服食方云又曰秋蟹毒者無藥可療目相向者尤甚玄中記曰天下之大物北海之蟹舉一螯能加於山身故在水中淮南萬畢術曰燒蟹致鼠搜神記曰晉太康年中會稽郡蟛蜞及蟹皆化為鼠甚衆覆野為災食稻述異記曰出海口北行六十里至騰嶼之南溪有淡水清徹照底有蟹焉筐大如笠腳長三尺宋元嘉中章安縣民屠虎取此蟹食之肥美過常虎其夜夢一少嫗語之曰汝噉我知汝尋被噉不屠氏明日出行為虎所食餘家人殯瘞之虎又發棺噉之肌體無遺此水今猶有大蟹莫敢復犯廣五行記曰元嘉中富陽人姓王於瀆中作蟹斷且往視之見一材頭長二尺許在斷中而裂開蟹出都盡乃治斷出材岸上明旦往視之見材復在斷中而裂開如前王又治斷出材明晨往視所見如初王疑此材妖異乃取籠中簷歸去家一二里聞籠中窣動聲王生顧見向材段變成一物人面猴身一手一足語王生曰我性嗜蟹比實入破君斷食蟹以此相負望君恕我我是山神當相祐助王曰汝犯暴人罪自應死何以多言此物曰君何姓名頻問不已王終不答去家轉近曰既不放我又不告我姓名當復何許王至家以火焚之土俗謂之山𤢖知人姓名則能為傷人耳又曰軍行地無故生蟹者宜急移吉蟹魚之類水失其性則有此孽嶺南異物志曰嘗有行海得洲渚林木甚茂乃維舟登岸於水傍半炊而林沒於水遽斷其纜乃得去詳視之大蟹也嶺表録異曰水蟹螯殼內皆鹹水自有味廣人取之淡煮吸其鹹汁下酒黃膏蟹殼內有膏如黃蘇加以五味和殼爆之食亦有味赤母蟹殼內黃赤膏如雞鴨子黃肉白以和膏實其殼中淋以五味蒙以細麵為蟹饆饠珍美可尚紅蟹殼殷紅色巨者可以裝為酒杯也虎蟹殼上有虎班可裝為酒器與紅蟹皆産瓊崖海邊本草經曰蟹味鹹治胸中邪氣熱結痛張敞集曰朱登為東海相遺敞蟹報書曰蘧伯玉受孔氏之賜必及鄉敞謹分斯貺于三老尊行者曷敢獨烹之
