body:
  text: 職官部三十一祕書監六典曰監之職掌邦國經籍圖書之事有二局一曰著作二曰太史皆率其屬而修其職少監為之二東觀漢記曰桓帝延嘉二年初置祕書監掌典圖書古今文字考合異同華嶠後漢書曰學者稱東觀為老氏藏室道家蓬萊山王融曲水詩序曰記言事於仙室謂藏室也魏志曰王象字義伯散騎常侍領祕書監撰皇覽魚豢魏略曰蘭臺臺也而祕書署耳王隱晉書曰王沉為祕書監著魏書多為時諱而善序事又曰羊祐為黃門郎陳留王立以少帝不願為侍臣徙為祕書監又曰惠帝永平元年詔云祕書監綜理經籍考校古今課試署吏領有四百人宜專其事鄧粲晉紀華談為祕書自負宿名意每怏怏嘗從容謂上曰臣老於祕閣矣汲黯之言復存今日上不悅晉諸公讚曰荀勗領祕書監太康二年汲郡冢中得竹書勗躬自撰次注寫以為中經列於祕書經傳闕文多所證明又讚曰庾峻自司空長史遷祕書監幽讚符命天文地理因有述焉何法盛晉中興書曰孫盛字安國為祕書監篤尚好學自少及長常手不釋卷既居史官乃著三國陽秋沈約宋書百官志曰祕書監丞各一人郎四人魏武建國有祕書令左右丞黃初中分祕書立中書而祕書之局不廢昔漢武帝建藏書之册置寫書之官於是天下文籍皆在天祿石渠延閣廣內祕府之室謂之祕書至成哀世使劉向父子以本官典其事至于後則圖籍在東觀有校書郎又有著作郎傅毅馬融之徒多為校書郎又蔡雍從尚書選入東觀著作雍既已為尚書郎而入東觀著作復拜議郎知是著作郎也又碩學達官往往典校祕書如向歆故事或但校書東觀或有兼撰漢記也梁書曰任昉字彥升為祕書監自齊永元以來祕閣四部篇卷紛雜昉手自讎校由是篇目定焉後魏書伊馥世祖欲拜馥為尚書郡公馥辭曰尚書務殷公爵至重非臣年少愚近所宜荷任請收過恩世祖問其所欲馥曰中祕二省多諸文士若恩矝不已請參其次世祖賢之遂拜為中護將軍祕書監隋書曰柳辨煬帝嗣位拜祕書監封漢南縣公帝退朝之後便命入閣言宴諷讀終日而罷帝每與嬪后對酒時逢與會輒遣命之至與同榻共席恩若友朋帝猶恨不能夜召於是命匠刻木偶人施機關能坐起拜伏以像於辨帝每在月下對酒輒令宮人置之於坐與相讎酢而為歡笑唐書曰魏徵為祕書監奏引學者校定四部書自是祕府圖籍粲然畢備劉歆七略曰武帝廣獻書之路百年之間書積如丘山故外有太常史博士之藏內則延閣廣內祕室之府魚豢典略曰藝臺香辟紙魚蠶故藏書臺稱藝臺三輔黃圖曰未央宮東有麒麟殿藏祕書即揚雄校書之處也王充論衡曰蘭臺之官監國得失也通典曰祕書省但主書寫勘校而已雖非要刺然好學君子亦多求為之溫嶠舉荀嵩為祕書監表曰夫國史之興將以明失得之迹謂之實録使一代之典煥然可觀散騎常侍嵩文質彬彬思義通博歷位先朝蒞事以穆宜掌祕奧宣明史籍王肅表曰青龍之末主者啓選祕書監詔祕書騶吏以上三百餘人非但學問義理當聞有威嚴能檢下者詔肅以常侍領焉又王肅論祕書不應屬少府表曰魏之祕書即漢之東觀郡國稱敢言之上東觀且自大魏分祕書而為中書以來傳緒相繼于今三監未有隸名於少府者也今欲使臣編名於騶隸言事於外府不亦隳朝章而辱國典乎大和中蘭臺祕書爭議三府奏議祕書司先王之載籍掌制書之典謨與中書相亞宜與中書為官聯華嶠集詔曰尚書嶠體素弘簡文雅該通經覽古今博聞多識屬書實録有良史之志故轉為祕書監其加散騎常侍使中書散騎著作及治禮音律天文數術南省文章門下撰集皆典領之嶠表伏見詔書以臣為祕書監加位常伯昔劉向父子世典史籍馬融通博三入東觀非臣膚淺所敢投迹唐書太宗正授顏師古祕書監制曰祕書望華史官任重選衆而舉歷代攸難守祕書監顏師古體業淹和器用詳敏學該流略詞兼典麗職司圖書亟經歲序朱紫既辨著述有成宜正名器允茲望實可祕書監祕書少監唐書周思茂者貝州漳南人少與弟思鈞俱早知名自右史轉太子舍人與范履冰在禁最蒙親遇至於政事損益多參預焉纍遷麟臺少監崇文館學士垂拱四年下獄死又曰王紹宗楊州江都人也遷祕書少監仍侍皇太子讀書紹宗性淡雅以儒素見稱當時朝廷之士咸敬慕之張易之兄弟亦厚之易之伏誅紹宗坐以交往見廢又曰德宗以左諫議大夫史館修撰張薦為祕書少監修撰如故時裴延齡貴欲異同宰府乃言於上曰諫議大夫論朝廷得失之官史館修撰書朝廷得失之事則領史職者不宜為諫官故有斯命祕書丞魏志曰武帝置祕書左右丞以劉放為祕書左丞孫資為祕書右丞魏略曰薛夏字宣聲天水人也博學有才華天水舊有薑任閻趙四姓常推於郡中而夏為單家不為降屈四姓欲治之夏乃遊逸東詣京師太祖宿聞其名甚禮遇之文帝又嘉其才黃初中為祕書丞帝常與夏推論書傳未嘗不終日也每呼之不名而謂之薛君夏居甚貧帝又顧其衣薄解御袍賜之其後征東將軍曹休來朝時帝方與夏有所咨論而外啓休到帝引入坐定帝顧夏目之於休曰此君祕書丞天水薛宣聲也宜共談其見遇如此魚豢魏略曰薛夏為祕書丞時祕書嘗公事移蘭臺蘭臺自以臺也祕書丞時為署耳謂夏不得儀當有坐者夏報曰蘭臺為外臺祕書為內閣臺也閣也何不相移之有蘭臺無以折之又曰嚴苞以高才黃初中入為祕書丞數奏文賦帝甚異之晉書嵇紹以父得罪靖居私門山濤領選啓武帝曰康誥有言父子罪不相及嵇紹賢侔郤缺宜加旌命請為祕書郎帝謂濤曰如卿所言乃堪為丞何但郎也乃發詔徵之起家為祕書丞王隱晉書曰庾峻字山甫博學有才為祕書丞遍觀古今聞見益優虞預晉書曰何禎字元幹廬江人也為尚書郎特詔參祕書丞祕書本有一丞時尚未轉遂以楨為右丞右丞之置自楨始也檀道論晉陽秋曰太元十八年王謐為祕書丞乃表前尚書殷允中書郎張敞太子後率郤儉之故太常桓石秀是多書之家請祕書郎分局採借齊書曰王儉字仲寶為祕書丞上表求校墳籍依七略撰七志四十卷獻之又曰張率字士簡吳郡人遷祕書丞高祖曰祕書丞天下清官東南胄緒未有為之今以相處為卿定名譽齊職儀云祕書丞銅印墨綬南史劉孝綽遷祕書丞武帝謂舍人周捨云第一官當用第一人故以孝綽居此職後魏書李彪字道固遷祕書丞分領著作事自文成帝己來至於大和崔浩高允著述國書編年序録為春秋之體遺落時事一二無存彪與祕書令高祐始奏從遷固之體創為紀傳表志之目焉又曰李輔子伯尚少有重名高祖每云此李氏之千里駒勑撰太宗起居注尋遷祕書丞後周書曰柳虬為祕書丞時祕書雖領著作不參吏事自虬為丞始令監掌焉王肅論祕書表云青龍中議祕書丞郎與博士議郎同職近日月宜在三臺上又曰祕書丞郎宜比尚書郎侍御史令侍御史乘犢車奏事用尺一祕書丞郎乘鹿車猶用尺奏恐非陛下崇儒之本意也祕書郎六典曰祕書郎四人從六品上晉起居注云武帝遣祕書圖書分為甲乙景丁四部使祕書郎各掌其一焉魏志曰王基字伯輿東萊人也時青土初定刺史王凌特表請基為別駕後召為祕書郎凌復請還之司徒王朗辟基凌又不遣朗書却州曰取宿衛之臣留祕閣之吏所希聞也凌猶不遣凌流稱青土蓋亦由基協和之輔也又曰鍾會字士季敏惠夙成時蔣濟著論謂觀其眸子可以知人會年五歲見濟濟大奇之正始中以賜官郎中為祕書郎蜀志曰郤正字令先安貧好學博涉墳籍弱冠能屬文入為祕書史轉令史遷祕書郎性淡於榮利尢耽文章自司馬王楊班傅張蔡之儔遺文篇賦及當世美書善論益部有者則鑽鑿推求略皆寓目王隱晉書曰鄭默字思元為祕書郎刪省舊文除其浮穢時陳留虞松為中書令謂默曰而今而後朱紫別矣又曰左思專思三都賦杜絶人事自以所見不博求為祕書郎虞預晉書曰司馬彪少篤學不倦好色薄行不交人事專精學問大始中為祕書郎後轉為丞晉太康起居注曰祕書丞桓石綏啓校定四部書詔郎中四人各掌一部晉令云祕書郎掌外三閣經書覆省校閲正定脫誤沈約宋書曰祕書郎四人後漢校書郎也又曰蕭惠開雖貴戚而車服簡素初為祕書郎祕書著作並名家年少惠開意趣與之多不同比肩或三年不共語宋書曰王敬弘子恢之為祕書郎使求為奉朝請與恢之書曰祕書有限故有競朝請無限故無競吾欲使汝處無競之地文帝許之梁書曰張纘字伯緒為祕書郎固永不遷欲遍觀閣內圖籍後魏書高謐字安乎有文武才度天安中以功臣子召入禁中除祕書郎典祕閣謐以墳典殘缺奏廣訪郡邑大加繕寫由是代京圖籍莫不審正通典曰宋齊祕書郎皆四員尤為美職皆為甲族起家之選待次入補其居職例十月便遷又曰祕書郎自齊梁之末多以貴遊子弟為之無其才實故當時諺曰上車不落則著作體中何如則祕書王肅表曰臣以為祕書職於三臺為近密中書郎在尚書丞郎上祕書丞郎宜次尚書郎下不然則宜次侍御史下祕書丞郎俱四百石遷宜比尚書郎出亦宜為郡此陛下崇儒術之盛旨也尚書郎侍御史皆乘犢車而祕書丞郎獨鹿車不得朝腵又恐非陛下轉臺郎以為祕書丞郎之本意也
