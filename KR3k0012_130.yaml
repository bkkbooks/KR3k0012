body:
  text: 偏霸部十三南齊蕭道成蕭子顯齊書曰太祖高皇帝諱道成字邵伯小字鬥將漢相何二十四世孫也何孫侍中彪免官居東海蘭陵郡於是為蘭陵人太祖以元嘉四年丁卯歲生龍顙鍾聲鱗文遍體儒士雷次宗立學雞籠山年十三受業治禮記及左氏春秋襲爵晉興男江夏王大司馬參軍員外侍郎直閣中書舍人右軍將軍尋陽王子房反加輔國將軍師衆東討一日破十二壘轉冠軍將軍持節北討諸軍事鎮淮陰徵還遷督徐兗二州軍事南兗州刺史明帝常嫌太祖非人臣相民間流言云蕭道成當為天子帝愈以為疑遣鎮軍將軍吳喜以三千人北使令喜留軍破釜自將銀壺酒封賜太祖戎服出門迎即酌飲之喜還帝意乃悅七年徵還京師部下勸勿就徵太祖曰諸卿暗於見事主上誅諸弟太子稚弱作萬歲後計何關他族唯應速發事緩必見疑今骨肉相害自非靈長之運禍難將興方與卿等戮力及還京拜散騎常侍太子右衛率時世祖以功當別封贛縣太祖以一門二封固辭不受詔許之加二百戶明帝崩遺詔為右衛將軍領衛尉加兵五百人與尚書令袁粲護軍禇淵領軍劉勔共掌機事加侍中江州刺史桂陽王休範反出頓新亭以拒之加使持節平南將軍給鼓吹一部治新亭城壘未畢賊前軍已至太祖方解衣高臥以安衆心索白虎幡登西垣使寧朔將軍高道慶羽林監陳顯達員外郎王敬則浮舸與賊水戰自新林至赤岸大破之賊平振旅旋凱入百姓緣道聚觀曰全國者此公也遷散騎常侍中領軍都督二兗徐青冀五州鎮東將軍南兗州刺史進爵為公增邑二千戶與袁粲禇淵劉秉更日入直號為四貴四年加尚書左僕射威名既重蒼梧王深相猜忌幾加大禍陳太妃罵之曰蕭道成有功於國今若害之後誰復為汝著力者乃止楊玉夫等殺蒼梧王迎立順帝太祖移鎮東府進侍中司空録尚書事封竟陵郡公進太尉十二州諸軍事自大明太始已來相承奢侈百姓成俗太祖輔政罷御省尚方諸飾玩至是又上表禁人間華僞雜物不得以金銀為薄馬乘具不得作金銀渡不得作織成繡裙衣道路不得著錦履不得用紅色為幡蓋衣服不得剪綵帛為雜花不以七寶飾樂器不得以金銀為花獸不得輒鑄金銀為像又進假黃鉞鐵都督中外諸軍事太傅領楊州牧劍履上殿入朝不趨贊拜不名署左右長史司馬從事中郎掾屬各四人大尉録尚書事南徐州如故三月進相國揔百揆封十郡為齊公備九錫之禮加璽紱遠遊冠位在諸侯王上四月進爵為王又命冕十有二旒建天子旌旗出警入蹕樂舞八佾辛卯宋使兼太保淵兼太尉僧虔奉璽紱禪位建元元年四月甲午即位於南郊柴燎告天升壇受禪禮畢即建康宮大赦改升明三年為建元元年封宋帝為汝陰王五月汝陰王薨追諡為宋順帝四年三月庚申有疾召司徒禇淵左僕射王儉曰吾遘疾彌留至于危篤公等奉太子如事吾當令太子敦睦親戚委任賢才崇尚節儉弘宣簡惠則天下之理盡矣壬戍崩于臨光殿年五十六諡曰太祖高皇帝上少有大量博涉經史善屬文雖經綸夷險不廢素業後宮器物欄檻以銅為飾者改用鐵內殿施黃紗帳宮人著紫皮履欲以身率下移風變俗每曰使我治國十年當使金土同價四月庚寅葬武進大安陵蕭頤蕭子顯齊書曰世祖武皇帝諱頤字宣遠太祖長子也小諱龍兒生於建康清溪宅其夜陳孝后劉昭后同夢龍據屋上故以字上初為尋陽國侍郎辟西曹書佐出為贛令尚書庫部桂陽王休範反上遣軍襲尋陽事平除晉熙王咨議遷司徒右長史黃門郎散騎常侍江州刺史徵拜侍中領軍將軍給鼓吹一部又加持節都督京畿諸軍事僕射中軍大將軍開府儀同三司進爵為公給班劍二十人齊國建為世子加侍中南豫州刺史給油絡車羽葆鼓吹以石頭為世子宮置二率坊有服章一如東宮進為太子及太祖即位為皇太子太祖崩上即位乙丑稱先帝遺詔以司徒禇淵録尚書左僕射王儉為尚書令丙申立皇太妃王氏永明元年正月辛亥南郊大赦改元四年正月辛亥藉田禮畢甲寅幸閲武堂營酒小會十一年正月皇太子長懋薨甲午立太孫昭業為皇太孫七月上不豫徙居迎昌殿始登階而屋鳴咤甚惡之戊寅大漸詔曰始終大期聖賢不免吾行年六十亦復何恨但皇業艱難萬機事重不能無遺慮耳太孫進德日茂社稷有寄子良善相毗輔思弘治道百辟庶條各奉爾職謹事大孫勿有懈怠知復何言又詔曰我識滅之後身著夏衣畫天衣純烏犀導路器服悉不得用寶物及織成常所服身刀長短二口鐵環者隨我入梓宮靈上勿以牲牢為祭祭唯設䴵茶飲乾飯酒脯而已喪禮每存省約不須煩民百官六時入臨又顯陽殿玉像諸佛及供養具如別牒可盡心禮拜供養自今公私皆不得出家為道及起立塔寺以宅為精舍並嚴斷之唯年六十必有道心者聽朝賢選序已有別詔是日崩年五十四九月丙寅葬景安陵帝剛毅有斷為治總大體以富國為先頗不喜遊宴雕綺之事言常恨之未能頓遣詔凡諸遊煩宜從休息自今遠近薦獻務存節儉珠玉玩好傷工尤重嚴加禁絶蕭昭業蕭子顯齊書曰鬱林王昭業字元尚小名法身文惠太子長子也世祖即位封南郡王文惠太子薨立為皇太孫即位追尊文惠太子為世宗文皇帝隆昌元年正月大赦改元加太傅竟陵王子良殊禮閏月丁卯以鎮軍大將軍西昌侯鸞即本號開府儀同三司七月癸巳太后令嗣主特鍾濔氣爰表弱齡自入纂鴻業長惡滋甚居喪無一日之哀衰絰為欣宴之服昏酣長夜萬機斯壅社稷危殆有過綴旒鎮軍居正體道家國是賴伊霍之舉實寄淵謨便可依舊典以禮廢黜中軍新安王體自文皇睿哲天秀宜入嗣洪業永寧四海外即以禮奉迎昭業少美容止好隸書世祖敕皇孫手書不得妄出以貴重之進對音吐甚有令譽王侯五日一問訊世祖帝獨呼昭業至幄座別加撫問呼為法身重愛甚文惠太子崩昭業每臨哭輒號咷不自勝俄爾還內歡笑極樂在世祖喪泣竟入後宮常列故伎二部入閣迎奏為南郡王時文惠太子禁其起居節其用度昭業謂豫章王妃庾氏曰阿婆佛法言有福德生帝王家今日見作天子便是大罪左右主師動見拘執不如作市邊屠沽富兒百倍矣及即位極意賞賜動百數十萬每見錢曰昔時思汝一箇不得今用汝未朞年之間所出諸庫儲錢數億垂盡開主衣庫與不逞群小又給閹人豎子各數人隨其所欲恣意輦取諸寶器以相剖擊破碎之以為笑樂好鬥雞密買雞至數千價世祖御物甘草杖宮人寸斷用之毀世祖招婉殿以封賜閹人徐龍駒為齊龍駒尤親幸為後閣舍人曰夜在宮房內昭業與文帝幸姬霍氏淫通龍駒勸長留內聲言度霍氏為尼以餘人代之皇后亦淫亂齊閣通夜洞開內外淆雜無復分別壬辰使肅鸞等率兵自尚書入雲龍門戎服加朱衣於上帝在壽昌殿聞外有變使閉內殿諸閹人登興光樓望報云見一人戎服從數百人在西鍾下須臾蕭鸞領兵先入帝走向愛姬徐氏房拔劍自刺不中以帛纏出殺之餘黨亦見誅卒時年二十二葬以王禮蕭昭文蕭子顯齊書曰海陵恭王昭文字季尚文惠太子第二子也封臨汝公鬱林王即位改封新安王及鬱林王廢尚書令西昌侯鸞奉帝纂統延興元年七月丁酉即位以尚書令鎮軍大將軍西昌侯鸞録尚書事楊州刺史封宣城郡公十月進為太傅楊州牧如殊禮進爵為王輔政帝起居皆咨而後行思食蒸魚菜太官令以無録公命不與辛亥皇太后令曰嗣主幼冲庶政多昧早膺尫疾弗克負荷太傅宣城公宜入承寶命式寧宗祏帝可降封海陵王十一月稱王有疾數遣御師占視乃殞之時年十五諡曰恭王蕭鸞蕭子顯齊書曰高宗明皇帝諱鸞字景栖始安貞王道生子也少孤太祖撫育恩過諸子宋世為安吉令有嚴能之名遷寧朔將軍淮南宣城二郡太守太祖踐祚遷侍中封西昌侯建武元年持節冠軍將軍郢州刺史世祖即位轉度支尚書侍中領驍騎將軍王子侯舊乘纏帷車高宗獨乘下帷儀從如素士遷中領軍左衛將軍豫州刺史尚書左僕射領右衛將軍武帝遺詔為侍中尚書令加鎮軍中書監開府儀同三司海陵即位為使持節都督楊南徐三州諸軍事楊州刺史鎮東城給五千人録尚書假黃鉞中外都督加殊禮進爵為王太后令廢海陵王以上入纂大位群臣三請乃受命建武元年十月癸亥即皇帝位大赦改元戊子立皇太子寶卷賜天下為父後者爵一級二年十月丁卯詔曰軌世去奢事殷哲后訓物以儉理鏡前書朕思所以遷淳改俗反古移民可罷東田毀興光樓并敕水衡量省御乘永太元年四月甲寅改元大赦五月以太子中庶子梁王為雍州刺史己酉崩于正福殿年四十七帝明審有吏才持法無所借大存儉約罷世祖所起新林苑以地還百姓廢文帝所起太子東田賣之永明中輿輦舟乘剔去金銀還主衣庫太官進食有裹蒸帝曰可四片破之餘充晚食世祖掖庭中宮殿服御一無所改蕭寶卷蕭子顯齊書曰東昏侯諱寶卷字智藏高宗第二子建武元年立為皇太子高宗崩太子即位永元元年正月大赦改元辛卯祀南郊詔二品清官以上應食祿者有二親或祖父母年登七十並給見錢二千貫二年八月甲申夜宮內失火十二月雍州刺史梁王起義兵於襄陽三年正月丙申合朔事畢與宮人於閲武堂元會皇后正位帝戎服臨視三月南康王寶融即皇帝位於江陵以太子左率李居士揔督西討諸軍事屯新亭九月義軍至南州輔國將軍申曹軍二萬人於姑熟奔歸丙辰李居士與義軍戰于新亭敗績十月冀青二州刺史桓和入衛屯東宮已卯以衆降光祿大夫張瓌先守石頭棄城奔還於是閉宮城自守李居士以新亭降軍築長圍守宮城十二月王珍國侍中張謏等帥兵入殿廢帝帝在東宮便好弄不喜書學及即位性重澀少言不與朝士接唯親信閹人日夜於後堂戲馬五更方臥至晡乃起漸出遊走屏逐居民從萬春門遊東宮以東至於郊外數十百里皆空家靜室巷陌懸幔為高障置仗防之謂之屏除夜出晨反火光照天拜愛姬潘氏為貴妃仍以金蓮帖地使妃行於其上曰此步步蓮花耶每出妃乘臥輿帝騎馬從後著織成袴褶金薄帽執七寶纏矟戎服急裝不變寒暑凌冒雨雪不避坑阱馳騁渴乏輒下馬解取腰邊蠡器酌水飲之復上馬馳去選無賴小兒善走者為逐馬左右百人常以自隨置射雉場二百九十六處翳中帷帳及步障皆祫緣以紅錦金銀鏤弩牙玳瑁帖箭郊郭四民樵蘇路絶吉凶失時舉疾棄尸不得殯葬後宮遭火之後更起仙華神仙玉壽諸殿刻畫雕彩麝香塗壁錦幔珠簾窮極綺麗又信鬼神崔惠景事時蔣子文神為假黃鉞使持節相國太宰大將軍楊州牧鍾山王以至尊為皇帝迎神像及諸廟雜神皆入後宮禱祀祈福及聞兵入趨出戶閹人黃大刀傷其膝仆地曰奴反耶直後張齊斬首送梁王稱宣德皇后令依漢海昏侯故事追封東昏侯唐祕書監虞世南公子先生論云公子曰宋齊二代廢主有五並驕淫狂暴前後如一或身被殺戮或傾墜宗社豈厥性頑凶自貽非命將天之所棄用傾代業者乎先生曰夫木之性直匠者揉以為輪金之性剛工人理以成器豈人事也唯上智下愚特稟異氣中庸之才全由訓習自宋齊以來東宮師傅備員而已貴賤禮隔規獻無由且多以位升罕由德進善乎哉賈生之言昔者成王幼在襁褓之中召公為太保周公為太傅太公為太師保則保其身體傅則傅以德義師則導之教訓此三公之職也又置三少曰少保少傅少師是與太子宴者也故乃孩提有職三公三少同明者孝仁義禮以導習之遂去邪人不使見惡行選天下之儒士孝悌博聞有道術者以翼衛之使與太子居處故太子生乃見正事聞正言行正道左右前後皆正人也習與正人居不能無正猶生長齊地不能不齊言習與不正人居猶生長楚地不能不楚言也秦使趙高傅胡亥教之獄訟所習者非斬劓人則夷人之三族也故胡亥今日即位明日射人有忠諫者謂之誹謗深計者為之妖言視殺人如刈草菅然豈胡亥之性惡哉彼其導之者非其理也故選左右禆教之最急此五君者稟凡庸之性無周召之師遠益友之針規狎不尚之近習以斯下質生而楚言覆國忘身理數然也蕭寶融蕭子顯齊書曰和帝諱寶融字智昭高宗第八子建武元年封隨郡王永元元年改封南康王出為荊州寧益梁南北秦七州諸軍事西平郎將荊州刺史蕭穎胄殺巴西梓潼二郡太守劉山陽奉王舉兵以雍州刺史蕭衍為使持節都督諸軍事左將軍以蕭穎胄為右將軍督行諸軍事夏侯亶自京師至江陵稱宣德太后令南康王宜纂成國祚光臨億兆方俟清宮未即大號可且封十郡為宣城王加相國荊州牧又加黃鉞蕭穎胄為左長史進號鎮軍蕭衍進號征東將軍己巳群僚上尊號中興元年正月乙巳即皇帝位大赦改元以相國左長史蕭穎胄為尚書令冠軍將軍蕭衍為雍州刺史十二月建康平皇太后令以蕭衍為大司馬録尚書事驃騎大將軍楊州刺史封建安郡公依晉武陵王遵承制故事百僚致敬二年正月皇太后臨朝入居內殿以大司馬蕭衍為都督中外諸軍事殊禮進位相國揔百揆楊州牧封十郡為梁公備九錫之禮遠遊冠位在諸王上二月進梁王爵為王增封十郡建天子旍旗警入蹕三月景辰遜位于梁丁卯梁奉帝為巴陵王徙姑熟戊辰薨年十五追為和帝葬恭陵史臣曰夏以桀亡殷因紂滅郊天改朔理無延世而皇符所集重興西楚神器暫來雖有冥數徽名大號斯為幸矣
