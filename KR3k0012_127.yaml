body:
  text: 偏霸部十南涼禿髮烏孤崔鴻十六國春秋南涼録曰禿髮烏孤河西鮮卑人也八世祖匹孤自塞北遷于河西孤卒子壽闐立闐孫機能壯果多謀略晉太始中殺秦州刺史胡烈於萬斛堆敗涼州刺史蘇愈于金山又殺涼州刺史楊欣於丹嶺盡有涼州之地武帝為之肝食能死從弟務丸代立丸死孫推斤立斤死子思復鞬立部落轉盛遂據涼土鞬卒子烏孤襲位養民務農循結鄰好呂光進封孤廣武郡公益州牧左賢王太初元年正月改元自稱大將軍大單于西平王以弟鹿孤為驃騎將軍傉擅為車騎將軍二年改稱武威王三年正月徙治樂都八月孤因酒走馬馬倒傷脅笑曰幾使呂光父子大喜俄而患甚顧謂群臣曰方難未靖宜立長君言終而薨諡武王廟號烈祖晉書曰禿髮烏孤其先與後魏同出八世祖匹孤率其部自塞北遷于河西其地東至麥田牽屯西至顯羅南至澆河北接大漠匹孤子壽闐之在孕母胡掖氏因寢而産於被中鮮卑謂被為禿髮因而氏焉禿髮利鹿孤崔鴻十六國春秋南涼録曰利鹿孤烏孤弟太初三年八月即位大赦改治西平建和元年正月大赦改年延耆老訪政治二年群臣固請即尊號不許乃僣稱河西王三年三月寢疾令曰昔我諸兄弟傳位非子者蓋以泰伯三讓周道以興故也武王創踐寶曆垂諸樊之試終能克昌家業者其在車騎乎吾寢疾惙頓是將不濟內外多虞國機務廣其令車騎經總百揆以成先王之志薨諡康王葬西平陵禿髮傉檀崔鴻十六國春秋南涼録曰傉檀利鹿孤弟也少機警有才略建和三年襲位徙號涼王遷于樂都改為弘昌元年秦遣使拜車騎將軍廣武公四年六月秦遣授河右諸軍事涼州刺史鎮姑臧七月宴群寮于宣德堂仰視而歎曰古人言作者不居居者不作信矣前昌松太守孟禕進曰張文王築城苑繕宮廟構此堂為貽厥之資萬世之業秦師濟河漼然瓦解此堂之建年垂百載十有三主唯信順可以久安仁義可以永固願大王勉之檀曰非君無以聞讜言也八月以鎮南大將軍文攴鎮姑臧檀遷于樂都雖受制於秦車服禮制一如王者十一月遷于姑臧嘉平元年十一月僣即涼王位於南郊大赦改年嘉平置百官立世子虎臺為太子二年正月以子明德歸為南中郎將領昌松太守歸俊爽聰悟檀甚寵之年始十三命為昌高殿賦援筆即成影不移漏檀覽而善之擬之曹子建七年傉檀議欲西征乙弗孟愷曰連年不收上下飢斃南逼熾盤北迫蒙遜今遠征雖剋後患必深傉檀曰孤將略地卿無沮衆謂其太子武臺曰今不種多年內俱窘事宜西行以拯此斃蒙遊近去不能卒來旦夕所慮唯在熾盤彼名微衆寡易以討禦吾不過一月自足周旋汝謹守樂都無使失墜傉檀乃率騎七千西襲乙弗大破之獲牛馬羊四十餘萬熾盤乘虛來襲一旦而城潰安西樊尼自西平奔告傉檀傉檀謂衆曰今樂都為熾盤所陷卿等能與吾藉乙弗之資取契汗以贖妻子者所望也遂引師而西衆多逃反遣鎮北假荀追之荀亦不還於是將士皆散傉檀曰熾盤昔委質於吾今而歸之不亦鄙乎四海之廣無所容其身何其痛哉吾老矣寧見妻子而死遂歸熾盤六月至西平盤遣使郊迎以上賓之禮歲餘為熾盤所鴆諡景王時年五十一武臺亦為熾盤所害少子保周歸魏魏以為張掖王自烏孤太初元年歲在丁酉至檀薨之歲甲寅十有八歲晉書曰烏孤以安帝隆安元年僣立至傉檀三世凡十九年以安帝義熙十年滅南燕慕容德崔鴻十六國春秋南燕録曰慕容德字玄明皓之少子皓每對諸宮人言婦人妊娠夢日入懷必生天子公孫夫人方娠夢日入臍中獨喜而不敢言晉咸康二年晝寢生德左右以告方寤而起皓曰此兒易生似鄭莊公長必有大德遂以德為名年十二而皓薨哀毀過禮年十八長八尺二寸額上有日月兩角下偃月重文元璽初封梁公建熙初進號安北將軍封范陽王入為魏尹秦滅燕徙於長安秦伐涼德請征自效後為張掖太守符堅伐晉垂請德為副堅敗德乃隨垂如鄴垂稱燕王復封范陽王建興元年為司隸校尉八年拜司徙垂臨薨謂太子寶曰鄴是舊都宜委范陽王永康元年以德鎮鄴及寶失中山奔龍城以德為丞相領冀州承制南夏德曰中山既沒魏必乘勝來攻鄴元年正月德率戶四萬三千車二萬七千乘自鄴徙滑臺黎陽魏軍垂至三軍危懼欲堡據黎陽昏日流澌冰合是夜濟訖冰亦尋消德大悅改黎陽津為天橋津德入滑臺趙王麟等九十八人上言今中山傾陷龍都蕭條趙魏遺黎鵠企皇澤伏願仰承俯順以安宗廟謹上皇帝尊號德許之令曰今假順來議且依燕元故事統符行帝制奏詔而已改永康三年為元年大赦殊死已下置百宮封進有差寶自龍城南奔至黎陽城西數里伏于河西遣中黃門趙思告北地王鍾曰上以去二月得丞相表即自南征假速骨作逆于乙連今失據來此呼丞相奉迎鍾馳使白狀寶遣思之後見採樵者知德稱帝懼而北奔初符登既滅登弟廣率所部三千來降拜冠軍將軍處之乞活塹至是復叛稱秦王德留撫軍魯陽王和守滑臺德率衆攻廣斬之和長史李辨殺和以滑臺降魏德曰符廣雖平撫軍失據進有強敵退無所託計將安出尚書潘聰曰滑臺四通八達非帝王之居青齊沃壤號曰東秦地方二千里戶余十萬四塞之固可謂用武之國德猶預未決於是遣牙門蘇撫問沙門朗公報曰山遷絶俗之士不應預問朝議但有待之纍非有託無以立陛下今來即朗之檀越敬覽潘尚書之議可謂興邦撫又問以年世朗以周易筮之曰燕衰庚戍撫曰幾何曰年則一紀世則及子撫曰何其促乎朗曰卦兆然也豈關人哉撫祕不敢言德大悅三月德引歸而南五月次薛城八月入廣固即皇帝位于南郊大赦改元為建平元年又曰漢宣憫吏民犯諱故改名朕今增一備字以為復名庶開臣子避諱之路於是敘賞有差褒德任賢新舊咸悅十月太極端門並就以公匠張剛為材官將軍尚方令二年十月徐州刺史潘聰青州刺史鞫仲來朝宴于延賢堂酒酣德嘆謂群臣曰朕雖寡薄拱已南面在上不驕夕惕于位可稱自古何等主也仲曰陛下中興之聖后少康光武之儔也顧命左右賜仲帛千匹仲疑多陳讓德曰卿知調朕朕不知戲卿乎卿飾對非實故亦虛言相賞不賞謬加何足謝也韓範進曰臣聞天子無戲言忠臣無妄對今日之論可謂君臣俱失德大悅賜範絹五十匹三年三月德如齊城登營丘望見晏嬰冢顧左右曰禮大夫不逼城葬平仲古之一賢人達者而生居近市死葬近城豈有意乎青州秀才晏謨對曰孔子稱臣先人平仲賢矣豈不知高其梁豐其禮蓋政在家門故儉以矯世存居湫隘卒豈擇地而葬乎所以不遠門者猶冀悟平生意也德悅之三月以太牢祀漢城陽景王廟遂北登社首山東望鼎足因目牛山問謨以齊之山川賢哲故事謨曆對詳辨畫地成圖德深嘉之拜尚書郎五年二月夜地震在栖之雞皆驚擾飛散三月德疾動經旬幾於不振會前尚書右丞曹默自冀州來奔以白酒解之乃瘳以默為御史中丞封永熙侯六年正月兄子超自秦還九月汝水竭十一月德疾篤夜夢皓曰汝既無子何不早立超為太子不爾惡人生心戊午引見群臣于東陽殿議立超為太子俄而震起百寮驚越德亦不安還宮疾甚呼假后公主及超申以後事執超手曰若得至曉更見公卿顧託以汝死無所恨舉目視公主欲有所言竟遂不能假后大言今日召董中書造誥立超開目頷之是夕薨于顯安宮年七十為十餘棺夜分出門潛瘞山谷莫知其尸所在虛葬于東陽陵諡獻武皇帝廟號世宗在位五年慕容超崔鴻十六國春秋南燕録曰慕容超字祖明德兄北海王納之子秦滅燕以納為廣武太守數歲去官與母公孫太妃就弟德於張掖德從符堅南征留金刀辭母而去及垂起山東張掖太守符昌誅納及德之諸子公孫大妃以耄不合刑納妻假氏以懷妊未決執于郡獄獄獄呼延平德故吏也將公孫假氏逃于羌中而生超焉公孫氏臨卒授超金刀曰聞汝伯已中興於鄴都吾朽病將沒相見理絶汝脫得東歸可以此刀還汝叔也後因呂隆歸秦秦徙涼州民於長安超因而東歸母謂超曰母子得全濟者呼延氏之力也惠而不報天不祐人平今雖死吾欲為汝納其女以答厚惠於是納之超至長安佯狂行乞由是往來無禁濟陰人宗正謙善卜相西至長安賣術于路超行而遇之因就謙相謙奇其姿貌超乃內斷于心不告母妻辭母詣霸上乃與謙俱歸至諸關禁自稱張伏生二十日達梁父建平六年四月至廣固呈以金刀且宣祖母臨終之言德撫之號慟超身長八尺腰帶九圍姿器魁傑有類於德德愛之名之曰超封北海王拜侍中驃騎大將軍司隸校尉開府置佐十一月立為太子己未僣即皇帝位大赦改建平六年為太上元年三年七月遣中書令韓範聘秦姚興許還超母妻八月秦使兼員外散騎常侍韋宗還聘贈以千金超復遣右僕射張華給事中宗正元聘秦送大樂伎一百二十人姚興大悅還超母妻十月華發長安宗正元馳先反命超大悅遣征虜公孫五樓率騎二千迎于境上超親率六宮迎於馬耳關四年正月大赦尊父北海穆王為穆皇皇帝母假氏為皇太后居長樂宮妻呼延氏為皇后五年二月晉相劉裕率衆來伐三月晉師渡淮超聞晉軍之盛自率衆四萬距戰大敗奔還廣固徙郭內民入堡小城晉攻陷大城長圍列守超請為藩臣以大峴為界裕不許六年正月超登天門朝群臣于城上殺馬以饗將士十一月尚書悅壽開門納晉師超出奔為晉所執送建康市斬之時年二十六殺鮮卑王公已下三千餘人以男女萬餘口為軍賞始德建平元年歲在己亥僣號居齊至為劉裕所滅在已酉凡二十一年晉書曰超在位六年初德以安帝隆安四年僣立至超二世凡十一年以義熙六年滅
