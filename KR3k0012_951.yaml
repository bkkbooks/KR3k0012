body:
  text: 蟲豸部七蜻蛉揚雄方言曰蜻蛉謂之蝍蛉郭璞注曰六足四翼蟲也淮南呼䗧𩓂也説文曰蜻蛉一名桑根爾雅曰虰音丁蛵音升負勞郭璞注曰或曰即蜻蛉也江東呼狐梨未詳莊子曰童子埋蜻蛉頭而化為珠尸子曰荊莊王命養由基射蜻蛉曰吾願生得之養由援弓射之拂左翼戰國策曰莊辛謂楚莊王曰王獨不見夫蜻蛉仰承甘露而飲之自以為無患與人無爭不知夫五尺童子將調鉤膠絲加之四仞之上而下為螻蟻所食呂氏春秋曰海上有人好蜻蛉者每朝居海上從遊有蜻蛉至者數萬前後左右盡蜻蛉也終日玩之不去其父告曰聞蜻蛉從汝居取而來吾將玩之明日往之海上而蜻蛉無至者東方朔別傳曰上置蜻蛉蓋下使朔獨射之朔對曰馮翊馮翊六足四翼頭如珠尾正直長尾短項是非勾簍即蜻蛉上曰善賜帛十匹崔豹古今注曰蜻蛉一曰青亭一曰胡蝶色青而大者是也小而黃者曰胡離一曰胡梨小而赤者曰赤卒一曰絳騶一曰赤衣使者好集水上亦名為赤辨丈人又曰紺蝶一名蜻蛉似蜻蛉而色玄紺遼東人謂為紺蟠亦曰童蟠好以七月群飛暗天海邊夷貊食之謂海中青蝦化為之青蚨廣雅曰蟱蝸青蚨也搜神記曰南方有蟲名𧑒音敦𧍪音隅形如蟬大味辛美可食其子著草葉如蠶種得其子則母飛來雖潛取必知處殺其母塗錢子塗貫用錢去貨旋則自還淮南萬畢術曰青蚨還錢青蚨一名魚或曰蒲以其子母各等置甕中埋東行陰垣下三日後開之即相從以母血塗八十一錢亦以子血塗八十一錢以其錢更互市置子用母置母用子錢皆自還蜂爾雅曰土蜂今江東呼大蜂在土中作房中為土蜂啖其子即馬蜂也今荊楚間呼為蟺音蟬木蜂似土蜂而小在樹上作房方言曰蜂燕趙之間謂之蠓螉蒙翁二音或謂之蚴蛻音幽悅其大有蜜謂之壺蜂即今黑蜂穿竹木作孔亦有蜜者山海經曰平逢山有神如人二首名曰嬌蟲是盤蟲實推蜜之廬郭璞注曰嬌為盤蟲之長群蜂所舍集蜜亦蜂名也又曰大蜂其狀如螽洪範五行傳曰秦昭王三十八年上郡大飢山木盡死人無所食蜂食田苗左傳僖中曰邾人以須句故出師公卑邾不設備而禦之臧文仲曰國無以小不可易也無備雖衆不可恃也君其無謂邾小蜂蠆有毒而況國乎孝經援神契曰蜂蠆垂芒蜂蠆毒在後故言垂芒謝承後漢書曰豫章嚴豐字孟侯為郡主簿太守賈萌舉兵欲誅王莽有飛蜂附萌車衡豐諫以為不祥之徵萌不從果見殺王隱晉書曰太尉陶侃表倉曹參軍袁謙為高涼太守未至百餘里浦中有蜜蜂蔽日而下謙船上謙不覺甚惡會得留郡文書賊欲乘虛攻郡謙欲速赴明早進西南卒遇大風飛沙天地晦合不復得還浦遂沒海中晉書曰鄒湛對武帝曰猛獸在田荷戈而出凡人能之蜂蠆作於懷袖勇夫為之驚駭出於意外故也淮南子曰蜂房不容鵠卵房巢也小形不足以苞大體也抱朴子曰軍行卒逢群飛蜂及虻蟲若密蜂尤多者必大戰驚於藏伏之賊也列女傳曰尹吉甫子伯奇至孝事後母母取蜂去毒繫於衣上伯奇前欲去之母便大呼曰伯奇牽我吉甫見疑之伯奇自死葛仙公列傳曰仙公與客對食客曰當請先生作一奇戲食未竟仙公即吐口中飯盡成飛蜂滿屋或集客身莫不震肅但皆不螫人良久仙公乃張口見蜂飛還入口中成飯永嘉地記曰七八月中常有蜜蜂群過有一蜂先飛覔止泊處人知輒內木桶中以蜜塗桶中飛者聞蜜氣或停不過三四來便舉群悉至博物志曰細腰無雌蜂類也無雌取桑蠶或阜螽子所見抱而成己子詩云螟蛉有子蜾螺負之又曰遠方諸山出蜜蠟處其處人家有養蜂者其法以木為器或十斛五斛開小孔令才容蜂出入以蜜蠟塗器內外令遍安著簷前或庭下春月此蜂將作窠生育時來過人家圍垣者捕取得三兩頭便內著器中數宿出蜂飛去尋將伴來還或多或少經日漸溢不可復數遂停住往來器中所滋長甚衆至夏開器取蜜蠟所得多少隨歲中所宜豐儉盧氏曰春至秋末始有蜜晚者至冬余所見今云夏未詳其故又曰諸遠方山郡僻處出蜜蠟蜜蠟所著皆絶巖石壁非攀緣所及唯於山頂以檻舉自懸挂下遂乃得取採蜂遂去不還餘窠及蠟著石不盡者有鳥形小於雀群飛千數來啄之至春都盡其處皆如磨洗至春蜂皆還洗處結窠如故年年如此物無錯亂者人亦各各占其平處謂之蠟塞鳥謂之靈雀捕搏終不可得也宣驗記曰元嘉元年建安郡山賊百餘人掩破郡治抄掠百姓資産子女遂入佛圖搜掠財寶先是諸供養具別封置一室賊破戶忽有蜜蜂數萬頭從衣簏出同時噬螫群賊身首腫痛兩眼盲合先諸所掠皆棄而走蜂飛邀逐噬擊彌路賊遂惶懼從便道而去時是臘日所縛子女各還其家廣五行記曰秦昭王委政于太后弟穰侯穰侯用事山木盡死蜂食人苗稼時大飢人相食穰侯罷免歸第嶺表録異曰唐劉恂魯遊宣歙間見彼中人好食蜂兒狀如蠶蛹而瑩白大蜂結房於山林間其大如巨鍾其中不知幾百層村人採時須以草衣蔽身以捍毒螫復以煙火逼散蜂母然後攀緣崖樹斷其根一房有蜂兒五斗或一石者三分中一翅足具矣即入鹽酪炒之曝乾以小紙囊貯之寄入京洛以為方物楚辭曰玄蜂如壺蝝左傳宣下曰十五年冬蝝生爾雅曰蝝蝮音覆蜪音陶也郭璞注曰蝗子未有翅者外傳曰蟲含蚳蝝蝗禮記月令曰仲冬行春令則蟲蝗為敗陸機毛詩疏義曰阜螽蝗也今人謂之螽子兗州人謂之螣晉書載記曰石勒時河朔大蝗初穿地而生二旬則化狀如蠶七八月而臥四日蛻而飛彌亙百里唯不食三豆及麻并冀尤甚唐書曰貞觀中終南等數縣蝗太宗至苑中見蝗掇數枚而呪之曰民以穀為命而汝食之是害于百姓也百姓有過在豫一人爾其有靈但當食我無害百姓將吞之侍臣恐致疾遽來諫止太宗曰所冀移災朕躬何疾之避遂吞之自是蝗不為災漢實録曰乾祐初開封府言陽武雍丘襄邑蝗府尹侯益遣人以酒殽致祭三縣蝗為鸜鵒藂食勑禁羅弋鸜鵒以其有吞噬之異也蠋毛詩豳七月曰蜎蜎者蠋蒸在桑野桑蟲爾雅曰蚅烏蠋音蜀也郭璞注曰蟲大如指似蠶孫炎注曰蚅一名烏蠋也廣志曰藿蠋有五色者槐香蠋五采有角甚臭白澤曰蠋有角五采文長尾者龍也殺之兵死韓子曰鱓似蛇而蠶似蠋人見蛇則驚駭見蠋則毛起漁者持鱓婦人拾蠶利之所在皆為賁育水馬南州異物志曰交趾海中有蟲狀如馬形因名曰水馬婦人難産者手握持此蟲或燒作屑服之則更易如羊之産也凡物之中羊産最易抱朴子曰以赤斑蜘蛛及水馬合馮夷水仙丸服之可以居水中徐衷南方草物狀曰海中有魚狀似馬或黃或黑海中民人名作水馬捕魚得之不可啖食暴乾熇之婦人産難使握持之亦可燒飲水蛭爾雅曰蛭蟣郭璞注曰今江東呼水中蛭蟲入人肉者為蟣音祈也齊書曰蕭季敞為廣州刺史為都護周世雄所襲軍敗奔山中為蛭所嚙肉盡而死常璩華陽國志曰南廣郡土地無稻田蠶桑多蛇蛭虎狼賈誼書曰楚惠王食寒葅而得蛭固遂吞之腹有疾而不能食令尹入問疾王曰吾食葅而得蛭不行其罪是法廢而威不立譴而誅恐監食皆死遂吞之令尹曰天道無親惟德是輔王有仁德病不為傷王果病愈王充論衡曰蛭食血之蟲惠王殆有積血之疾故食積血之蟲而病愈也不然則賢者操行豈若吞蛭除病賢者常無病也張茂先博物志曰水蛭三斷而成三物本草經曰水蛭一名至掌味鹹治惡血瘀結水閉破凝積利水道陶洪景集注本草經曰水蛭味鹹苦平微寒有毒一名蚑生雷澤池澤蚑音蜞短狐毛詩何人斯曰為鬼為蜮則不可得蜮短狐也韓詩外傳曰短狐水神也陸機毛詩疏義曰為鬼為蜮蜮短狐也一名射影如龜二足江淮水皆有人在岸影見水中投人影則殺人故曰射影也南京人欲入水以瓦石投水中令濁乃入也或又含沙射人入肌其瘡如疥魯莊公十八年秋經書有蜮傳稱不為災也穀梁傳莊公曰秋有棫一有一亡曰有言不常有蜮射人者也今短狐射人為疾是也左傳同廣雅曰射工棫短狐也書紀年曰晉獻公二年春周惠王居于鄭鄭人入王府多取玉焉玉化為蜮射人齊書曰屠氏女晝採樵夜漬以供養父母父母俱卒親營殯葬負土成墳忽空中有聲云汝至性可重山神欲相驅使汝可為人療病必得大富女謂是鬼魅弗敢從遂得病積時鄰舍人有溪蜮毒者女識毒試療之自覺病便差遂以巫道為人療疾無不愈者家産日益抱朴子曰短狐一名蜮一名射工一名射影其實水蟲也狀似鳴蜩而如合杯有翼能飛無目利耳口中有橫物如聞人聲緣口中物如角弩以氣為矢激水而射人中身者即發瘡不曉治之者殺人其病似大傷寒不日皆死又曰射工蟲冬天蟄於谷間大雪時索之此蟲所在其雪不積留氣起如灼蒸當掘之不過入地一尺則得也陰乾末帶之夏天自辟射工也玄中記曰水狐者視其形蟲也見其氣乃鬼也長三四寸其色黑廣寸許背上有甲厚三分許其口有物向前如角狀見人則氣射人去二三步即射人中十人六七人死地理書曰車茂安與夏書云外生石季甫忽為鄭令此縣既有短狐之疾又沙虱害人聞此消息倍益愁慮博物志曰江南山溪水中有射工蟲甲蟲之類也長一二寸口中有弩形以氣射人影隨所著處發瘡不治則殺人沙虱廣雅曰沙虱蜁也音旋廣志曰沙虱色赤大不過蟣在水中入人皮中殺人唐書曰南中山川有鴆鳥之地必有犀牛有沙虱水弩必生可療之草又曰南平獠部落土氣多瘴癘山有毒草及沙虱蝮蛇淮南萬畢術曰沙虱一名蓬活一名地脾抱朴子內篇曰沙虱雨後及晨暮踐沙必著人如毛髮端初著人便入皮裏可以針挑取之正赤如丹著人上動行若不挑即此蟲便入人身中殺人行此蟲之地每還輒當以火自炙令遍則蟲隨火去也水陸皆有之博物志曰深山窮谷多毒虐之物氣則有瘴癘人則有工蟲獸則有虎鳥則有鴆蛇則有蝮蟲則有射工沙虱草則有鉤吻野葛其餘則蛟蟒之屬生焉本草經曰沙虱一名石蠶葛洪方曰辟沙虱用麝香大蒜合羊脂搗著小筒中帶之良十二時蟲博物志曰交州南有蟲長或一寸大小如指有廉槾亡旦切形似白石英不知其名視之無定色在陰地色多緗緑出日光中變易或青或緑或丹或黃或紅或赤女人取以為首飾宗岱每深以為物無定色引雲霞以為喻故託此以助成其説今孔雀毛亦隨光色變易或黃或赤但不能如此蟲耳嶺南異物志曰容州有蟲如守宮身圓而頸長頭有冠幘一日中隨時變色青黃赤白黑未嘗定土人不能名呼為十二時蟲囓人不可療又曰南方有蟲大如守宮足長身青肉鬣赤色其首隨十二時變子時鼠丑時牛亥時豬性不傷人名曰避役見者有喜慶嶺表録異曰十二時蟲則蛇師蜥蜴之類也土色者身尾長尺餘腦上連背有鬐鬣草樹上行極迅速亦多在人家籬落間俗傳云一日隨十二時變色因名之
