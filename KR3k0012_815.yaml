body:
  text: 布帛部一絲尚書禹貢曰濟河惟兗州厥貢漆絲海岱帷青州厥篚檿絲檿桑絲中琴瑟絃周禮天官下典絲曰典絲掌絲入而辨其物以其賈楬之掌其藏與其出以待興功之時頒絲于外內皆以物受之凡上之賜豫亦如之又冬官考工記曰㡆氏湅絲以涗水漚其絲七日去地尺暴之故書涗作湄鄭司農云水溫水也玄謂涗水以灰所湅水也漚漸也楚人曰漚齊人曰涹晝暴諸日夜宿諸井七日十夜是謂水湅禮記月令曰季春之月蠶事既登分繭稱絲又內則曰子能言教男唯女俞男鞶絲鞶小囊也男用韋女用繒有飾緣也又曰王言如絲其出如綸又少儀曰國家靡幣則君子不履絲幣賦稅亟也左傳隱公曰公問於衆仲曰衛州吁其濟乎對曰臣聞以德和民不聞以亂以亂猶治絲而棼之也絲見棼縕益所以亂春秋考異郵曰四月蠶餌絲毛詩鵲巢羔羊曰羔羊之皮素絲五紽羔羊之革素絲五緎羔羊之縫素絲五總又鵲巢何彼穠矣曰其釣惟何惟絲伊緍又邶柏舟緑衣曰緑兮絲兮女所治兮又鄘柏舟干旄曰子孑干旄在浚之郊素絲紕之良馬四之又淇澳氓曰氓之蚩蚩抱布貿絲匪來貿絲來即我謀又曰淑人君子其帶伊絲其辨伊騏又絲衣曰絲衣其紑芳浮反載辨俅俅絲衣祭服也俅音求又曰雖有絲麻無棄菅蒯謝承後漢書曰丹陽方儲為郎中章帝使文郎居左武郎居右儲正住中曰臣文武兼備在所施用上嘉其才以繁亂絲付儲使理儲拔佩刀三斷之對曰反經任勢臨事宜然袁宏漢記曰郭泰傳童子魏照求入其房供給灑掃泰曰當精義講書何來相近照曰經師易獲人師難遭欲以素絲之質附近朱藍魏略曰文帝欲受禪野蠶成絲晉陽秋曰武帝時有司奏以青絲為牛靷詔以青麻代之晉書曰呂光竊號河右中書監張資病光博營救療有外國道人羅又云能差資病光喜給賜甚重羅什知又誑詐告資曰又不能為益徒煩費耳冥運雖隱可以事試也乃以五色絲作繩結之燒為灰末投水中灰若出水還成繩者病不可愈須臾灰聚浮出復為繩又療果無效少日資亡宋書曰諸葛闡上言夫歲時有利害之收而蠶桑有經常之苦機杼居不變之勤而民用有奢儉之異今南至有五絲命縷之服仲夏北至比肆連行紏繩縻無用之工玄黃侵衣章之費飾綵雖貴始無所入尺絶寸分終於捐棄部一邑以推百城其費博矣謹率愚管謂宜禁革後魏書曰幽州刺史張亮初有薛琡夢亮於山上桂絲覺而告亮且占之曰山上絲幽字君為幽州乎未期而受管子曰齊桓公伐楚濟汝水踰方城使貢絲於周室墨子見染絲者歎曰染於蒼則蒼染於黃則黃五入則為五色故染不可不慎非獨染絲治國亦然淮南子曰蠶餌絲則商弦絶商金聲春蠶吐絲金死故絶也山海經曰歐絲之野有一女子跪樹而歐絲郭璞注曰蠶類也呂氏春秋惠子曰使女工化為絲不能治絲大匠化為木不能治木家語曰子張問入官子曰修身返道故夫女工必自擇絲麻良匠完材賢君選左右論衡曰蠶含絲而商弦絶桉子生而父氣衰新絲既登故體者自壞耳桓談新論曰昔神農始削桐為琴繩絲為絃以通神明之德合天地之敘風俗通曰五月五日色續命絲俗説益人命正部曰皎皎練絲為藍則青得丹則赤得蘗則黃得泥則黑士緯曰絲俱生於蠶為繒則賤為錦則貴神仙傳曰仙人用五色絲作續命幡幡安五色竹林七賢論曰鬲令袁毅為政貪濁賂遺朝廷以營虛譽遺山濤絲百斤衆人莫不受濤不欲為異乃受之命內閣之梁上而不用也後毅事露驗吏至濤所濤於梁上下絲已數年塵埃黃黑封印如初以付吏西京雜記曰公孫弘以元光五年為國所推上為賢良國人鄒長倩贈以素絲一襚為書以遺之曰五絲為躡倍躡為升倍升為緎倍緎為記倍記為緵倍緵為襚此自少之多自微之著也士之立功勳效名節亦復如之勿以小善為不足修而不為也王子年拾遺記曰成王時因祗國致女工一人善織新輕素以五色絲內口中手引而結之則成文錦神仙傳曰園客者濟陰人貌美而良邑人多欲以女妻之客終不娶常種五色香草積數十年服食其實忽有五色蛾集香草之上客收而薦之以布生華蠶焉至蠶時有一女自來助客養蠶亦以香草食之蠶收得繭百二十枚繭大如甕每一繭繅六七日絲乃盡繅訖此女與園客俱去梁四公記曰扶桑國使貢方物有黃絲三百斤即扶桑蠶所吐桑灰汁所煮之絲也帝有金爐重五十斤係六絲以懸爐絲有餘力楚辭曰茅絲兮同綜冠履兮共處宋玉釣賦曰夫玄淵之釣也以三尋之竿八絲之綸荀卿蠶賦曰食桑而吐絲前亂而後治嵇康琴賦曰絃以園客之絲徽以鍾山之玉枚乘七發曰龍門之桐高百尺而無枝斬以為琴野繭之絲以為絃古樂府歌詩曰羅敷善蠶桑採桑城南隅青絲為籠繩桂枝為籠鉤何用識夫壻白馬紫驪駒青絲繫馬尾黃金絡馬頭蔡扈廣連珠曰參絲之絞以絃琴緩張則撓急張則絶陸凱奏事曰諸暨永安出御絲素釋名曰素朴素也已織則供用不復加功飾也史記曰蘇代遺燕王書云齊紫敗素而賈十部敗素染以為紫也東觀漢記曰鄭據建初五年辟司徒府拜侍御史上疏詔書下官府賜據素六十匹漢書儀曰天地鬼神璽皆以武都紫泥封都布囊白素裹漢官儀曰印綬盛以篋篋以緑綈表白素裹魏志曰學者資於人猶藍之染素范子計然曰白素出三輔匹八百孟子曰陳相道許行之言孟子曰許子必種粟而後食乎曰然許子冠乎曰冠曰奚冠曰冠素曰自織之與曰否以粟易之曰許子奚為不自織曰害於耕也韓子曰齊桓公好衣紫國人皆好服之至五素不得一紫事具綵門鹽鐵論曰縞素不能自分於緇墨賢聖不能自治於亂世班固與弟書云今齎白素三百匹欲以市月支焉宋玉美人賦曰腰如束素徐幹團扇賦曰惟合歡之奇扇肇伊洛之纖素古詩曰新人能織縑故人工織素織縑日一匹織素五丈餘以縑特比素新人不如故班婕妤詩曰新裂齊紈素鮮潔如霜雪裁為合歡扇團團象明月揚雄答劉歆書曰天下上計孝廉及內郡衛卒會者雄常把三寸弱翰筆齎油素四尺以問其異方語歸即以鉛樀次之於鉛槧七念反三十七歲於今矣繒史記曰烏氏倮以繒遺戎王戎王十倍報之帝王世紀曰末喜好聞裂繒之聲桀為發繒裂之漢書曰灌嬰睢陽販繒者又曰廣川王去立昭信為后幸姬陶望卿為修美人主繒帛昭信譖望卿曰與我無禮衣服常鮮於我盡取善繒丐諸宮人獻帝紀曰是時新遷都宮人多亡衣服帝欲發御府繒以作之李傕不欲曰宮中有衣服胡為復作耶詔賣廄馬百餘匹御府大司農出雜繒二萬匹與所賣廄馬直賜公卿已下及貧民不能自存者李傕曰我邸閣儲跱少乃悉載置其營賈詡曰此上意不可距也傕終不從又曰李傕時合羌胡數千人先以御物繒綵與之晉書曰單道開燉煌人常衣粗褐或贈以繒服皆不著宋書曰朱百陽居山陰有時出山陰為妻買繒綵三五事好飲酒遇醉或失之後周書曰梁主蕭巋朝於鄴高祖與之宴大悅賜雜繒万假良馬數千匹并賜齊後主妓妾及常所乘五百里駿馬以遺之纈西河記曰西河無蠶桑婦女著碧纈裙上加細布裳且為戎狄性著紫纈襦袴以外國色錦為袴褶後魏書曰封回為都官尚書冀州大中正滎陽鄭雲諂事長秋卿劉騰貨紫纈四百匹得為安州刺史除書旦出晚往詣回坐未定問安州興生何事便回曰卿荷國寵恩位至方伯雖不能拔園葵去織婦宜思方略以濟百姓如何見造問興生乎封回不為商賈何以相示雲慚失色綵尚書禹貢曰徐州厥篚玄纖縞荊州厥篚玄纁玄黑繒縞白繒纖細也纖在中明物皆當細禮記玉藻曰無君者不二綵非列綵不入公門列綵正服史記曰通邑大都采千匹比千乘家漢書曰孝文六年遺單于赤綈緑繒各四十匹東觀漢記曰光武起拜朱和建義大將軍賜絳八百匹又曰光武初起義與諸李市弓弩絳衣赤幘謝承後漢書曰陳重同舍郎有歸寧者誤持鄰舍郎絳去嫌重取重不申曲直置絳還之去郎還得絳甚愧於重袁山松後漢書曰劉盆子拜竟復從劉仲卿居仲卿為盆子制絳單衣張璠漢記曰朱雋少孤母以販繒綵為事同郡周起負官債百萬縣催責之雋竊母帛為起解債魏志曰景初中賜倭女王蒨絳五十匹紺青五十匹吳書曰陸遜破曹休當還西陵上賜遜繒綵丹漆梁書曰張譏幼喪母有錯綵經帕母之遺製及有所識家人具以告之每歲時輒對帕哽噎不能自已唐書曰武德中太宗平并州悉復故地上悅置酒含章殿宴群臣極歡遣入御府賜繒綵皆盡重而出韓子曰齊桓公好服紫一國盡服紫五素不得一紫公患之管仲曰君勿衣紫也謂左右曰吾惡紫臭公曰諾三日境內莫有衣紫風俗通曰夏至著五綵辟兵題綵曰遊光厲鬼知其名無溫疾五采辟五兵也按取新斷織繫戶亦此類也世語曰王經彥偉初為江夏太守大將軍曹爽附絳二十匹令交市於吳經不納書棄官歸崔實四民月令日八月清風戒寒趣染綵也摯虞決疑曰古者男子皆衣綵有故乃素服秦漢以來服色轉變令唯朝廷五服用綵裴玄新言曰五月五日集五綵繒謂之辟兵不解以問伏君伏君曰青赤白黑為之四面黃居中央名曰襞方綴之於復以示婦人養蠶之工也傳聲者誤以為辟兵李陵與蘇武詩曰有鳥西南飛熠熠似蒼鷹朝發天地隅暮宿曰南陵欲寄一言書託之箋綵繒張載擬四愁詩曰佳人贈我筒中布何以報之流黃素蔡雍女誡曰禮女始行服纁纁絳也上正色也紅紫不以為褻服緗緑不以為上繒貴厚而色尚深為其堅紐也母丘儉報弟書曰令別致絳二百匹可以供送葬之事染周禮天官下曰染人掌染絲帛凡染春暴練夏纁玄秋染夏官獻功又地官下曰掌染草掌以春秋斂染草之物染草茅搜橐蘆豕首紫茢之屬以權量受之以待時而頒之權量以知輕重多少時染夏之時又冬官考工記曰鍾氏染羽以朱湛丹秫三月而熾之鄭司農云湛漬也丹秫赤粟玄謂湛讀如斬車帷裳之漸熾也羽所以飾旌旌及王后之車淳而漬之淳沃也以炊下湯沃其熾蒸之以漬羽漬猶染也三入為纁五入為緅七入為緇染纁者三入而成又再染以黑則為緅今禮俗文作爵言如爵頭色也又復再染以黑乃成緇矣禮記月令曰季夏命有司染綵黼黻文章必以法故無或差貸黑黃蒼赤莫不質良無敢詐偽以給郊廟祭祀之服以為旗章以別貴賤等級之度質正也良善也所用染者當得其真綵正善爾雅曰一染謂之縓雕絹反再染謂之頳三染謂之纁青謂之蔥黑謂之黝漢書王莽傳曰更始元年拜置百官莽聞之愈恐欲外示自安乃染其鬚髮吳録曰九真移風縣有赤絮膠人規土知蟻穴墾發以木枝插其中則蟻緣而生漆折漆以染絮其色正赤宋書曰陶季直五歲喪母哀若成人初母未病令於外染衣卒後家人始贖季直抱之號慟聞者莫不酸感呂氏春秋曰素染於青染於黃五入而五色堯舜三王染於賢聖而治桀紂幽厲染於凶佞而亡博物志曰蕪蘇子染法蕪蘇子一升可染一匹直以水浸之耳釋名曰緗桑葉初生色也廣志曰烏丸與胸奴同俗丈夫婦人為木幘朱染之如杆盆以沓頭神仙傳曰昌容者商王女也修道於常山食逢蔂根二百餘年能致紫草賣與染家得錢以與貧病者環濟要略曰正色有五謂青赤黃白黑也間色有五謂紺紅縹紫流黃也
