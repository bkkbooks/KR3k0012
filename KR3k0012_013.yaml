body:
  text: 天部十二雪釋名曰雪綏也水下遇寒凝綏綏然下也詩曰北風其涼雨雪其滂又曰上天同雲雨雪氛氛氛氛雪貌也豐年之冬必有積雪又曰文王以天子之命命將師歌采薇以遣之昔我往矣楊柳依依今我來思雨雪霏霏又曰蜉蝣掘閲麻衣如雪鄭玄注曰喻曹昭公君臣朝夕變易衣服麻衣深衣也禮曰孟春行冬令則水潦為敗雪霜大摯傳曰隱公九年三月庚辰大雪凡平地尺三月今正月也大雪失時也又曰楚子次于乾溪雨雪王皮冠秦復陶秦所遺羽衣也翠被豹舄執鞭以出易通卦驗曰乾得坎之蹇則當夏雨雪詩推度災曰逆天地絶人倫當夏雨雪大戴禮曰天地積陰溫則為雨寒則為雪春秋元命苞曰陰陽凝而為雪史記曰東郭先生久待詔公車貧困飢寒衣弊履不完行雪中履有上無下足盡踐地道中人笑之漢書曰漢女者居東海養姑姑女讒之於姑姑經太守訴而殺之五月下雪又曰蘇武使於單于單于幽武置大窖中絶不與飲食天雨雪武臥齧雪與氈毛并咽之數日不死胸奴因以為神又曰壺廣鞮單于自將領萬騎擊烏孫會天大雪一日深丈餘人民畜産凍死續漢書曰赤眉入安定北地逢大雪坑谷皆滿多凍死晉書曰王恭衣鶴氅雪中行時人謂之神仙中人又曰太傅謝安雪驟降公欣然曰白雪紛紛何所似兄子客兒曰散監空中差可擬兄女道韞曰未若柳絮因風起又曰東瀛公騰公姓司馬名騰伐石勒於常山屯營時天大雪有一處方數丈融液怪而掘之得一玉馬高尺許以為晉家之瑞晉朝雜事曰太康七年河陰雨赤雪二頃宋書曰大明中元日雪花降殿庭右將軍謝莊下殿雪集衣白上以為嘉瑞群臣皆作雪花詩崔鴻北涼録曰先酒泉南有銅馳出大雨雪沮渠蒙遜遣工取之得銅數萬斤宋齊語曰孫康家貧常映雪讀書唐書曰郭元振為安西大都護時西突厥首領烏質勒部落強盛款塞通和元振就其牙帳計會軍事時天大雪元振立於帳前與烏質勒言議須臾雪深風凍元振未嘗移足烏質勒年老不勝寒苦會罷而死録異傳曰漢時大雪積地丈餘洛陽令自出案行見民家皆除雪出有乞食者至袁安門無有行路謂安已死令人除雪入戶見安僵臥問何不出安曰大雪人皆餓不宜干人令以為賢舉為孝廉韓詩外傳曰凡草木花多五出雪花獨六出雪花曰霙音英皇甫謐高士傳曰世莫知焦先所出野火燒其廬先因露寢冬雪大至先袒臥不移人以為死就視如故穆天子傳曰日中大雪北風雨雪有凍死人天子作黃竹詩三章以哀民曰我徂黃竹負閟寒閟閉也音祕又曰雨雪天子獵于鈃山之西河漢武內傳曰西王母曰仙之上藥有玄霜絳雪列士傳曰羊角哀左伯桃相與為死友聞楚王欲往仕之道遇雨雪計不俱全乃併衣糧與角哀入樹而死陸機別傳曰機誅日平地尺雪時人以為冤曹攄別傳曰攄為洛陽令于時大雪而宮門夜忽失行馬攄曰此非他窮理可保明必是門士以療寒驗之而具服王子年拾遺記曰穆王東至大𣟵音奇之谷西王母來進嵰丘儼反州甜雪嵰州去玉門三十萬里地多寒雪霜露著木石之上皆融而甘可以為果也又曰周靈王起昆明之臺召諸方士有二人乘飛遊之輦上席酣醒天赤旱地裂其一人先唱能為霜雪王乃請焉於是引氣一吸則雲起雪飛又曰廣延之國去燕七萬里在扶桑東其地寒盛夏之日冰厚至丈常雨青雪冰霜之色皆如紺碧沙州記曰自龍涸至大浸川一千九百里晝夜蕭蕭常有風寒七月雨便是雪遙望四山皓然皆白西京雜記曰董仲舒曰太平之世雪不封條凌弭毒害而已莊子藐姑射之山有神人居焉肌膚若冰雪綽約若處子曾子曰陰氣勝則凝為雪孟子曰滕文公卒葬有日矣天大雨雪至牛目群臣請弛期太子不許惠公諫曰昔王季葬渦山之尾欒水齧其墓見棺文王曰先君欲見群臣百姓矣乃出為帳三日而後葬今太子亦宜曰先王欲少留而撫社稷故使雪甚弛期而更為日比文王義也太子曰善又曰齊宣王見孟子於雪宮王曰賢者亦有此樂乎孟子曰為人上而不與民同樂者非也晏子春秋曰景公時雨雪三日公被狐白之裘見晏子公曰怪哉雨雪三日不寒晏子曰古之賢君飽而知人飢溫而知人寒公曰善乃脫裘發粟以與飢寒者秦子曰今欲馳光日下顯白雪中不可得也孫子曰昔衛君重裘纍茵而見路有負薪而哭之者問何故也對曰雪下衣薄是以哭之於是衛君懼見於顏色曰為君而不知民熟以我為君於是開府金出倉粟以賑貧淮南子曰欲滅迹而走雪中金匱曰武王伐紂都洛邑陰寒雨雪十餘日深丈餘甲子平旦不知何五大夫乘馬車從兩騎止門外王使太師尚父謝五大夫賓幸臨之失不先門方修法服太師尚父使人持一器粥出進五車兩騎曰先生大夫在內方對天子寒故進熱粥卻寒粥皆畢使者具以告尚父尚父問武王曰客可見矣五車兩騎四海之神與河伯雨師耳王曰不知有名乎曰南海神曰祝融東海曰勾芒北海曰玄冥西海曰蓐收河伯雨師請使謁者於殿下門內引祝融五神皆驚相視而歎語林曰王子猷居山陰大雪夜開室命酌四望皎然因詠招隱詩忽憶戴安道時在剡乘興棹舟經宿方至既造門而返或問之對曰乘興而來興盡而返何必見戴安道汜勝之書曰取雪汁漬原蠶屎五六日待釋手挼之和穀種之能御旱故謂雪為五穀精也山海經曰由首之山小咸之山空桑之山並冬夏有雪論衡曰雲霧雨之徵也夏則為露冬則為霜溫則為雨寒則為霜雨露凍凝者其由地發不從天降琴操曰曾子耕太山下雨雪不得歸思父母作梁山操廣志曰雲南郡四五月猶積雪皓代郡以五月山陰猶宿雪八月末復雪宋玉王對問曰客有歌於郢中始曰下俚巴人國中屬而和者數千人其為陽春白雲國中屬而和者不過數十人是其曲彌高而和彌寡宋謝惠連雪賦曰歲將暮時既昏寒風積愁雲繁梁王不悅遊於兔園乃置旨酒命賓友召鄒生延枚叟相如末至居客之右俄而微霰零密雪下王乃歌北風於衛詩詠南山於周雅相如於是避席而起逡巡而揖曰臣聞雪宮建於東國雪山峙於西域岐昌發詠於來思姬滿申歌於黃竹曹風以麻衣比色楚謠以幽蘭儷曲盈尺則呈瑞於豐年袤丈則表沴於陰德其為狀也散漫交錯氛氳蕭索藹藹浮浮瀌瀌奕奕連翩飛灑徘徊委積始緣甍而冒棟終開簾而入隙既因方而為圭亦遇圓而成璧眄隰則萬頃同縞瞻山則千巖俱白於是臺如重璧逵如蓮璐庭列瑤階林挺瓊樹皓鶴奪鮮白鷳失素楚辭九辨曰雪霰紛揉女救反又曰魂來歸兮北方不可止增冰峨峨飛雪千里些蘇笴反又曰霰雪紛其無恨些雲霏霏而承宇些司馬相如美人賦曰時既西夕玄陰晦冥涼風蕭然素雪飄零伏系之雪賦序曰結陰凝雪皎如帔素謝靈運詩曰明月照積雪朔風徑且哀樂府歌詩曰皓如山上雪皎如雲間月聞君有兩意故來相決絶庾肅之雪讚曰皓若天漢色踰玉粲李顒悲四時曰雲黮甚徒敢反䨴徒對反以時興雪聯翩而驟密枯林皎如瓊幹空岫朗若玉室王韶之詠雪離合曰霰先集兮雪霏霏散輝素兮被詹庭曲室寒兮朔風厲川陸涸兮百籟鳴霰釋名曰霰星也冰雪相摶補各反如星而散説文曰霰積雪也從雨散聲詩曰如彼雨雪先集維霰霰暴雪也箋云雪自上遇溫氣而摶謂之霰爾雅曰雨霰為消雪郭璞注云霰水雪雜下故謂消雪又曰雨雪相和為霰尚書洪範五行傳曰盛陰雨雪凝滯而冰寒陽氣薄之不相入則散而為霰故沸湯之在閉器而湛於寒泉則為冰及雪之銷亦冰解而散此驗也韓詩薛君注曰霰霙也曾子曰陰之專氣為霰露釋名曰露慮也覆慮物也許慎説文曰露潤澤也從雨路聲詩曰厭於接反浥行露豈不夙夜謂行多露又曰蒹葭蒼蒼白露為霜又曰湛露天子燕諸侯也湛湛露斯匪陽不晞又曰野有蔓草零露摶徒官反又曰野有蔓草零露瀼瀼如章反禮曰立秋後五日白露降又曰季冬行秋令則白露早降又曰天不愛其道故天降甘露又曰春雨露既濡君子履之必有怵愓之心焉如將見之感時念親也又曰王所以為順而弗悖也天降甘露易通卦驗曰立秋白露下尚書中候曰堯時甘露降詩含神霧曰陽氣終白露為霜宋均曰白露行露也陽終陰用事故曰白露凝為霜也大戴禮曰露陰陽之氣也夫陰氣勝則凝為霜雪陽氣勝則散為雨露禮斗威儀曰君治政則軒轅之精散為甘露春秋繁露曰恩及於物順於人而甘露降春秋序曰桀無道露冬下春秋元命包曰霜以殺木露以潤草又曰陰陽散為露五經通義曰和氣津液凝為露露從地出吳越春秋曰子胥諫吳王王怒暮歸舉衣出宮宮中群臣皆曰天無霖雨宮中無泥露相君舉衣行高何為子胥曰吾以越諫王王心迷不聽吾言宮中生草棘霧露沾吾衣群臣聞之莫不悲傷漢書曰宣帝元康元年甘露降未央宮大赦天下又曰平帝永平十七年自春迄夏多甘露降謁元陵太常丞上言陵樹葉上有甘露令百官採之又曰成帝幸河東祠后土甘露降京師又曰宣帝詔曰乃者鳳凰集太山陳留甘露降未央宮宜赦天下後漢書曰桓帝永康元年秋八月魏郡言嘉禾生甘露降范曄後漢書曰明帝永平十七年甘露降于原陵謝承後漢書曰吳郡沈豐為零陵太守至官一年甘露降膏潤草木東觀漢記曰光武帝時甘露降四十五里又曰明帝永平十七年夢見先帝光烈皇后夢中喜覺悲不能寐明旦上陵其日甘露降於陵樹帝令百官採之帝伏御床流涕也魏志曰明帝鑄承露盤莖長一十二丈銅龍繞其根立於芳林園甘露乃降又曰明帝與東阿王詔曰昔先帝時甘露屢降於仁壽殿前靈芝生芳林園中自吾建承露盤已來甘露復降芳林園仁壽殿前晉書曰皇甫謐幼時有甘露降其柳樹謐每以食之謂蜜也晉中興書曰王者敬養耆老則甘露降於松柏尊賢容衆則竹葦受之甘露者仁澤也其凝如脂其美如飴宋書曰文帝元嘉中甘露頻降狀如細雪隋書曰李德饒趙郡柏人人也性至孝丁父憂單縗徒跣後甘露降其樹白鳩巢其廬豫章耆舊傳曰太守陳蕃臨郡二年甘露降汝南先賢傳曰新蔡鄭敬都尉高懿廳前有槐樹有白露類甘露懿問椽屬皆言是甘露敬曰明府德政未致甘露但樹汁耳懿不悅稱疾而去洞冥記曰勒畢國人長三寸有翼善言語戲笑因名語國飲丹露者曰初出有露汁如朱也又曰東方朔遊吉雲之地漢武帝問朔曰何名吉雲曰其國俗常以雲氣占吉凶若吉樂之事則滿室雲起五色照著於草樹皆成五色露露味甘帝曰吉雲五色露可得以嘗不朔乃東走至夕而還得玄黃青露盛之琉璃器以授帝帝遍賜群臣得露嘗者老者皆少疾病皆愈又曰元封二年數過國獻能言龜一頭長一尺二寸東方朔曰唯承樹露以飲之王子年拾遺記曰崑崙山有甘露望之色如丹著木石則皎然如霜雪寶器承之如飴人君聖德則下周處風土記曰白鶴性警至八月露降流於草上滴滴有聲則鳴述仙記曰八月一日作五明囊盛取百草頭露以之洗眼眼明也老子曰天地相合以降甘露莊子曰姑射之山有神人焉不食五穀吸風飲露鶡冠子曰聖德上及太清下及太寧中及萬靈則膏露下蘇子曰夫人一代若朝露之託桐葉耳其與幾何呂氏春秋曰伊尹説湯曰水之美者有三危之露三危西極山名和之美者揭雩之揭雩之露其色紫淮南子曰方諸取露於月高誘曰方諸陰燧也東方朔神異經曰西北海有人長二千里兩腳中間相去千里腹圍一千六百里但日飲天酒五斗張華云天酒甘露也又曰黃父以霧露為漿古史考曰太古之初民吮露精食草木實劉向説苑曰吳欲伐荊王令曰敢有諫者死舍人有少孺子者欲諫懷彈於後園露霑其衣者三朝王曰子求何苦露霑衣如是對曰園中有樹其端有蟬蟬高居悲鳴飲風吸露不知螳蜋在其后曲跗方無反欲取其蟬而螳蜋又不知黃雀居其后延頸欲啄之然黃雀又不知臣操彈丸在其下臣但捕其黃雀不覺露隰衣此者為窺其利而不思后患王聞之遂不伐荊又曰騰蛇遊於霧露千里不止漢武帝故事曰帝作金莖擎玉杯以承雲表之露擬和玉屑服之以求仙又曰作銅承露槃上有仙人掌以承露也蔡邑月令章句曰露者陰液也釋為露凝為霜白虎通曰甘露者美露也降則物無不盛又曰露者霜之始寒即變為霜論衡曰甘露味如飴王者太平之應則降地鏡圖曰視山川多露無霜其下有美玉徐整長曆曰北斗當崑崙山氣運注天下春夏為露崔豹古今注曰薤露喪歌也言人命如薤上露易晞滅也其一章曰薤上露何易晞明朝更復落人死何時歸瑞應圖曰露色濃甘者為之甘露王者施德惠則甘露降其甘草木又曰甘露者美露也神靈之精仁瑞之澤其凝如脂其甘如飴一名膏露一名天酒又曰王者德至於天和氣感則甘露降於松柏山海經曰仙丘降甘露人常飲之又曰諸沃之野搖山之民甘露是飲不壽者八百歲列星圖曰天乳一星在氏比主甘露占若明而潤則甘露降不然則否也楚辭曰朝飲木蘭之墜露夕棌秋菊之落英張衡奏事曰飛塵增山霧露增海曹植魏德論曰玄德洞幽飛化上蒸甘露以降蜜淳冰凝覩陽弗晞瓊爵是承獻之帝朝以明聖徵曹植承露盤銘敘曰夫形能見者莫如高物不朽者莫如金氣之清者莫如露盛之安者莫如盤乃詔有司鑄銅建承露盤于芳林園東晢集曰薄冰凝池非宗廟之寶零露垂林非綴冕之節張載羽扇賦曰濯以雲精拂以芝露
