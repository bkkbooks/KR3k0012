body:
  text: 鱗介部六蛇下風俗通曰車騎將軍巴郡馮緄字鴻卿為議郎發綬笥有二赤蛇可長三尺分南北走大用憂怖許李山孫憲得先人祕要緄請使卜云君後三歲當為邊將東地四五千里官以東為名後五年為大將軍南征此吉祥也蜀王本紀曰秦王知蜀王好色乃獻美女五人蜀王遣五丁迎女還梓潼見一大蛇入山穴中一丁引其尾不能出五丁共引蛇山崩壓五丁玄中記曰東海有蛇丘之地衆蛇居之無人民多神蛇或人頭而蛇身又曰崑崙西北有山周回三萬里巨蛇長萬里蛇常居此山飲食滄海陳留風俗傳曰小黃縣者宋地故陽武東黃鄉也因黃水以名縣沛公起兵野戰喪皇妣于黃鄉天下平定乃使者以梓宮招魂幽野於是丹蛇在水自洗濯入于梓宮其浴有遺髮故諡曰昭靈夫人雷次宗豫章記曰永嘉末有大蛇長十餘丈斷道經過者輒以氣吸引取之吞噬已百數行旅斷道道士吳猛與弟子數人往欲殺蛇蛇藏深穴不肯出猛符南昌社公蛇乃出穴頭高數丈猛於尾緣背而以足按蛇頭著地弟子於後以斧殺之裴淵廣州記曰晉興郡蚺蛇嶺去路側五六里忽有一物大百圍長數十丈行者過視則往而不返積年如此失人甚多董奉從交州出由此嶠見之大驚云此蛇也住行旅施符勑經宿往看蛇已死矣左右白骨積藂成丘鄧德明南康記曰南野巘山有漢太傅陳蕃冢墓西岸有廟名曰宮渚昔值軍亂聞墓有三寶軍人爭掘指麾必啓忽大蛇圍繞墳前崩雷晦雨當時竟不得發宋永初山川記曰興古郡有大蛇名青蔥有大蛇名赤頸又曰柴垟縣有飛蛇外國圖曰圓丘有不死樹食之乃壽有赤泉飲之不老有大蛇多為人害不可得居帝遊圓丘以雌黃精厭大蛇郭子橫洞冥記曰蛇璣出塗云國有青靈蛇産珠色光白如瓊琰之類博物志曰蝮蛇秋月毒盛無所齧草木以泄其氣草木即死樵採設為此草木所傷剌者亦殺人又曰地三年種蜀黍其後七年多蛇廣志曰永昌郡有歧尾蛇又蝮蛇與土色相亂長三四尺其中人以牙歷之裁斷皮出血則身盡痛九竅血出而死列異傳曰壽光侯者漢章帝時人劾百鬼衆魅有婦為魅所病侯劾得大蛇又有大樹人止之者死鳥過亦死侯劾樹夏枯有蛇長七八丈懸而死搜神記曰魯定公元年有九蛇繞柱占以為九世廟不祀乃立煬宮又曰隋侯行見大蛇傷救而治之其後蛇銜珠以報之又曰竇武母産武而并蛇蛇送之林中後母卒及葬未定有大蛇自榛草而出赴喪所以頭繫柩涕血頃而去時人知為竇氏之祥又曰宋元嘉中廣州有三人共入山中伐木忽見石窠中有三卵大如升便取煮之湯始熱便聞林中如風雨聲須臾有一蛇大十圍長四五丈徑來於湯中銜卵而去三人無幾皆死又曰秦瞻居曲阿彭皇野忽有物如蛇突入其腦中蛇來先聞臭死氣便於鼻中入盤其頭中覺泓泓冷聞其腦間食聲咂咂數日而出去尋復來取手巾急縛口鼻亦被入積年無他病唯患頭重異苑曰太元中汝南人伐竹見一竹中央蛇形已成上枝葉如故吳郡桐廬民嘗伐餘遺竹見一宿竿成雉頭頸盡就身猶未成此亦竹為蛇蛇為雉也又曰薪野蘇卷常與奴婢居野舍每至飯時輒有一物來其狀似蛇長七八尺五色光鮮卷異而飴之遂經數載産業加焉奴後密打殺即得能食病日進三斛飯猶不為飽少時而死又曰丹陽鍾忠以元嘉冬月晨行見有一蛇長二尺許文色似青琉璃頭有雙角白如玉忠感而畜之於是資業日登經年蛇自亡去忠及二子相繼殞斃此蛇來吉去凶其唯龍乎又曰魯國牟縣象山上有寺廟今民欲架室者輒見大蛇數十丈出來驚人故莫得安焉周景式廬山記曰安侯世高者安息國太子與友人共出家學道友人好恚怒死受蟒報為此宮亭廟神世高於廣州為人所殺還生安息國復為王子年二十又棄國入吳之宮亭泊船過呼友人與語友人身長數十丈見世高向之胡語竟各分去暮有一少年上世高船跪受呪願囚忽不見世高語同船人曰向少年即此廟神也得離惡形矣蟒既見世高從山南過死山北今桑柴民所居蛇里是也幽冥録曰會稽謝祖之婦初育一男又生一蛇長二尺許便徑出門去後數十年婦以老終祖忽聞西北有風雨之聲頃之見一蛇長十數丈腹可十餘圍入戶繞靈座因至柩所繞數匝以頭打柩目血淚俱出良久而去又曰會稽郡吏鄮音懋縣薛重得假還家夜戶閉聞妻床上有丈夫眠聲喚妻久從床上出未及開戶重持刀便逆問妻曰醉人是誰妻大驚愕因若自申明實無人意重家唯有一戶搜索了無所見見一大蛇隱在床腳酒臭重便斬蛇寸斷擲於後溝經數日而婦死又數日而重卒死經三日復生說始死有人祰將重到一宮府見官寮問何以殺人重曰實不曾行凶曰寸斷擲在後溝此是何物重曰此是蛇非人府君愕然而悟曰我當用為神而敢淫人婦又妄訟人勑左右召來吏卒乃領一人來著平巾幘具詰其淫妻之過將付獄重乃令人送還廣五行記曰晉吳興太守袁玄瑛嘗之官請郭璞筮吉凶璞曰至官當有赤蛇為妖不可殺之後到府果有赤蛇在銅虎符亟上蟠玄瑛家人撾殺之其後玄瑛為徐馥所害又曰晉安帝義熙末年殷仲文年十三父亡家有大怪有大蛇長丈或戴其堂屋或拔其炊釜置地家人棄舍奔散唯仲文居喪如故然仲文後竟為宋高祖所戮又曰陳時吳興顧楷在田上樹取桑葉見五尺大蛇入一小穴其從蛇相次或三尺或五尺次第相隨略有數百楷急下樹看所入之處了不見有一孔日暮還家楷病口啞不復得語又曰東光人東方飛龍病甚夢化為大黑蛇以告其妻既死遂有大黑蛇入室上棟間飛龍諸子將殺之其母曰此是爾父諸子不用母言遂殺之即日暴雨諸子皆震而死柩前唐景龍文館記曰興慶池者長安城東隅形勢之地也中多王侯第宅天后初有居人王純掘地獲黃金百斤致富官司聞之密加搜獲純懼投於井中縣官窺之見雙赤䖵仰首張吻遂不敢入純以此金當為己復入井取之還見赤蛇赫然蟠屈純懼而出其夜井水湧溢漸成此池可廣百餘頃嶺表録異曰南土有金蛇亦名錫蛇又名地鱓州土出黔中桂州亦有即不及黔南者其蛇粗如大指長一尺許鱗甲上有金銀解毒之功不下吉利也又曰蚺蛇大者五六丈圍四五尺以次者亦不下三四丈圍亦稱是身有班文如故錦纈俚人云春夏多於山林中等鹿過則銜之自尾而吞唯頭角礙於口即深入林樹間閣其首伺鹿壞頭角墜地鹿身方咽入腹如此後蛇極羸弱及其鹿消壯俊悅懌勇健於未食鹿者或云一年則食一鹿又曰兩頭蛇嶺外多此類時有如小指大者長尺餘腹下鱗紅背錦文一頭有口眼一頭似頭而無口眼云兩頭俱能進退亦謬也昔孫叔敖見之不祥乃殺而㾏之恐他人見復受其禍南人見之為常其禍安在吳氏本草經曰蛇脫一名龍子單衣一名弓皮一名蛇附一名蛇筋一名龍皮一名龍單衣楚辭曰蝮蛇蓁蓁封孤千里傅玄神蛇銘曰嘉茲蛇靈斷而能續飛不須翼行不假足揚雄客難曰獨不見翠蛇絳螭之將登天乎必聳身於蒼梧之淵階浮雲翼疾風而上虺毛詩鴻鴈斯干曰唯虺唯蛇女子之祥國語曰吳伐越越王請盟吳王將許之申胥申胥伍子胥曰不可許大夫種勇以善謀將還玩吳國於股掌之上以婉辭順志虺而弗銼為蛇將若之何吳王不聽乃許盟搜神記曰陳留阮士禹傷於虺不忍其痛數嗅其瘡已而虺成於鼻中任昉述異記曰虺五百年化為蛟蛟千年化為龍龍五百年而為角龍又千年為應龍楚辭曰雄虺九首倏忽焉在孔融答路粹書曰朱彭冠賈之徒當世壯士惡相攻能為國患輕薄劣弱者如兩虺相囓適足還災其身誠無所至
