body:
  text: 樂部十歌三山海經曰夏后開上三嬪于天得九辨與九歌以下焉開始歌九招於大穆之野上美人於天帝得天樂下也帝俊八子是始為歌帝俊即帝舜也太元真經茅盈內紀曰秦始皇三十年九月庚子盈曾祖於華山之中乘雲駕龍白日升天是時其邑謠歌曰神仙得者茅初成駕龍上升入泰清時下女洲戲赤城繼世而往在我盈帝若學之臘嘉平始皇聞謠歌乃有尋仙之志因改臘曰嘉平楚詞曰九歌者屈原之所作昔楚南郢之邑沅湘之澗其俗敬鬼神於夜必作樂鼓舞以樂諸神屈原放逐竄伏其域見俗人祭祀之禮其辭鄙陋為作九歌之曲風俗通曰張仲春武帝時人也善雅歌與李延年並侍每奏新歌莫不稱善然不知休息終至於敗亡以論人之進退當有節奏又曰百里奚為秦相堂上作樂所賃浣婦自言知音呼之援琴撫絃而歌曰百里奚初娶我時五羊皮臨當別行烹乳雞今適富貴忘我為因尋問之乃其妻世説曰王曇孫年十四五便歌諸妓向謝公稱歎王郎能歌謝公甚欲聞之而王既名家年少無由得聞諸妓又具向王説謝公意後出東府土山上作伎王時作兩丸髻著袴褶騎馬住土山下庾家墓林中作一曲歌于時秋月王因舉頭看北林卒曲便去土山上妓白謝公曰此是王郎歌也説苑曰襄成君始封之日衣翠衣帶玉劍履蹻舄立乎流水上楚大夫莊辛過而説之曰臣願把君之手其可乎襄成君忿然作色而不言莊辛遷延而稱曰君獨不聞夫鄂君方乘青翰之舟張翠蓋會鍾鼓之音越人擁楫而歌曰今夕兮搴洲中流何日兮得與王子同舟山有樹木兮木有枝心説君兮君不知於是鄂君乃舉繡被而覆之三輔決録曰梁鴻東出關過京師作五噫之歌曰踄彼北邙兮噫顧瞻帝京兮噫宮闕崔嵬兮噫民之劬勞兮噫遼遼未央兮噫肅宗聞而悲之求鴻不得劉向別録曰漢興已來善歌者魯人虞公發聲清哀蓋動梁塵受學者莫能及也石崇楚妃歌辭序曰楚妃歎莫知所由楚之賢妃能立德著勳垂名於後者唯楚姬焉故為歌辭襄陽耆舊傳曰宋玉識音而善文襄王好樂而愛賦既美其才而憎其似屈原也乃謂之曰子盍從楚之俗使楚人貴子之德乎對曰昔楚有善歌者王其聞歟始而曰下俚巴人國中唱而和之者數萬人中而曰陽阿採菱國中唱而和之者數百人既而曰陽春白雪朝日魚離含商吐角絶節赴曲國中唱而和之者不過數人蓋其曲彌高其和彌寡穆天子傳曰宴西王母于瑤池之上西王母為天子歌日白雲在天山陵自出道里悠遠山川間之將子無死尚能復來天子答曰子歸東土和治諸夏萬民平均吾顧見汝比及三年將復而野又曰天子東遊於黃澤宿於曲洛洛水之曲也使宮樂謠曰黃之池其馬噴沙音普悶反黃之澤其馬噴玉漢武內傳曰西王母降命侍女安法嬰歌玄雲曲曰大象雖云寥我把天地戶披雲泛靈輿倏忽適下土泰真靈中唱始知風塵若頤神三田中約精六闕下上元夫人自彈雲林之璈鳴絃駭洞清音零朗乃奏步玄曲其辭曰黃陟真道騰步玄登天霞負笈造天關借問太上家忽遇紫微圃真人列如麻流景清飆起雲蓋映朱葩蘭房癖林闕碧室啓瓊沙丹臺結空構曄曄生露華誰言終有終扶桑不為查王母命侍女田四非答歌其辭曰晨登太霞宮挹此玉水蘭夕入玄圃闕採蘂掇琅玕濯足瓠瓜河織女立津盤吐納抱景雲味之當一餐朝發漫汗府暮宿鉤陳垣莫與世人説行尸言此難列女傳曰趙簡子南擊楚津吏醉臥不能渡召欲殺之津吏女娟持楫而前曰昔父聞君東渡不測之水恐風波之起故禱九江三淮之神不勝巫祝杯酒飲沉醉至於此矣妾願鄙軀易父之死簡子將渡用楫少一人娟願備員用楫遂與渡中流奏河激之歌歌曰升彼河兮西觀清水揚波兮杳冥禱求福兮醉不醒誅將加兮妾心驚蛟龍助兮主將歸呼來掉兮行勿疑簡子大悅立為夫人文士傳曰太祖雅聞阮瑀辟之不應連見逼乃逃入山中使人焚山得瑀送至召入太祖時征長安大延賓客怒瑀不與言使就伎入列瑀善解音能鼓琴撫絃而歌曰奕奕天門開大魏應期運青蓋巡九州在東西人怨士為知己死女為悅者玩恩義茍潛暢他人焉能亂為曲既捷音聲殊妙太祖大悅淮南子曰歌採菱發陽阿鄙人聽之不若延露陵陽非歌拙也聽各異也又曰寧戚欲干齊桓公困窮無以自達為商旅將任車任載也毛詩曰我任我輦也以商於齊暮宿於郭門之外桓公郊迎客夜開門寧戚飯牛車下望見桓公而悲擊牛角而疾商歌歌曰南山粲白石爛短褐單衣長止骭生不逢堯與舜禪終日飼牛至夜半長夜漫漫何時旦桓公聞之撫其僕之手曰異哉歌者非常人也命後車載之又曰易道良馬使人欲馳飲酒而樂使人欲歌燕丹子曰荊軻入秦不擇日而發太子與知謀者皆素衣冠送之於易水之上荊軻起為壽歌曰風蕭蕭兮易水寒壯士一去兮不復還高漸離擊築宋意和之孟子曰有孺子歌曰滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足孔子曰小子聽之哉韓子曰宋玉築武宮謳倡行者心歡築者不倦王召賜之對曰臣師射瞀之謳賢於臣召使之謳行者不止築者甚倦王怪問對曰王試度其功美四板射瞀八板甚堅美五寸射瞀二寸列子曰林類年且百歲拾遺穗於故畦並歌進孔子適衛望之於野顧謂弟子曰彼可與言者試往評之子貢請行逆之壠端面而歌曰先生曾不悔乎行歌拾穗林類行不留歌不輟逸士傳曰堯時有八九十老人擊壤而歌曰日出而作日入而息鑿井而飲耕田而食帝何力於我哉列女傳曰魯陶嬰妻者夫死守志不二作歌詩曰悲夫黃鵠之早寡七年不雙宛徑獨宿不與衆同夜半悲鳴想其故雄天命早寡獨宿何傷寡婦念此泣下數行鳴呼悲哉死者不可忘飛鳴尚然況於貞良雖有賢雄終不可重行韋昭洞曆記日紂無道比干知極諫必死作秣馬金闕之歌西京雜記曰高帝令戚夫人歌出塞望歸之曲侍婢數百皆為之後宮齊唱聲入雲宵又曰賈佩蘭説在宮中時常以絃管歌舞相娛竟為妖服以趍良時十月十五共入靈女廟吹笛擊築歌上雲曲而相連臂踏地為節歌赤鳳來也洞冥記曰漢武帝使董謁乘浪霞之輦以升壇候王母王母至與宴歌奏春歸之樂謁乃聞王母歌聲而不見其形歌聲繞梁三匝乃上旁梁草樹枝葉皆動歌之感也張華博物志曰薛談學謳於秦青未窮青之技而辭歸青錢於郊乃撫節悲歌聲振林木響遏行雲談乃謝求返歸辛氏三秦記曰隴右西開其阪九回不知高幾里欲上者七日越高處可容百餘家下處數十萬戶上有清水四注流下俗歌曰隴頭流水鳴聲幽噎遙望秦川心肝斷絶黃閞武陵記曰有緑羅山側岩垂水懸蘿百里許得明月池碧潭鏡徹百尺見砥素岸若雪松如插翠流風叩阿有絲桐之韻土人為之歌曰仰茲山兮迢迢層石構兮峨峨朝日麗兮陽岩落景梁兮陰阿鄣壑兮生音吟籟兮相和敷芳兮緑林恬淡兮潤波樂茲潭兮安流緩爾棹兮詠歌宜都山川記曰峽中猿鳴清山谷傳其響冷冷不絶行者歌之曰巴東三峽猿鳴悲猿鳴三聲淚沾衣鄭緝之東陽記曰歌山在吳寧縣故老相傳雲昔有乘船從下過見一女子汲乃登此山負水行歌甚妍而莫之所由故名歌山劉欣期交州記曰俗好鼓琴收豎於野澤乘牛唱遼遼之歌歌曲説牛力強弱耕具輕重也僮隸於月下撫掌發烈謠以令美歌魏太山秦州記曰隴西郡隴山其上懸吐溜於中嶺泉亭因名萬石泉泉溢漫散而下涓澮皆注有人升此而歌紀義宣城記曰臨城縣南三十里有蓋山登百許步有舒姑泉俗傳去有舒氏女未適人與其父析薪於此女坐泉處牽挽不動遽告家比還唯見清泉湛然母云女好音樂乃作絃歌泉湧回流雙鯉赴節盛弘之荊州記曰臨賀馮乘縣有歌父山傳云有老人不娶室而善歌聞者莫不灑泣年八十餘而聲逾妙及病將困命鄉里六七人與上山穴中鄰人辭歸老人歌而送之聲振林木響遏行雲餘音傳林數日不絶
