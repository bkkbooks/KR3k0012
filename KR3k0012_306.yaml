body:
  text: 兵部三十六征伐下說苑曰趙簡子舉兵伐齊有被甲者笑之曰子何笑對曰臣有宿笑簡子曰有以說之則可無則死對曰當桑之時臣鄰家夫與妻俱之田見桑中女因追之不能還反其妻怒而去之臣笑其曠也簡子曰今吾伐國失國是吾曠也還師而歸又曰中行獻子將伐鄭范文子曰不可得志於鄭諸侯讎我憂必滋長郄至又曰得鄭是兼國也則王者固多憂乎文子曰王者盛其德而遠人歸故無憂今我寡德而有王者之功故多憂今子見無事而欲富樂者乎新序曰秦欲伐楚使使者往觀楚重寶楚王聞之召令尹子西問焉曰秦欲觀楚寶器和氏之璧隋侯之珠可以示諸侯乎對曰臣不知也召昭奚恤問焉對曰此欲觀吾國之得失而圖之非國之重寶也遂使恤應之恤發精兵三百人陳於西門之內為東西之壇秦使者至恤曰君客也請就上位東子西南面太宗子方次之葉公子高次之司馬子反次之恤自居西面之壇稱曰客觀楚之寶器楚所寶者賢臣也理百姓實倉廩使民人各得其所子西在此奉珪璧使諸侯解忿憤之難交兩國之欣使無兵革之憂太宗子方在此守封疆謹境界不侵鄰國鄰國亦不見侵葉公子高在此理師旅正兵戎以當強敵提桴鼓以動百萬人眾使皆赴湯火蹈白刃出萬死不顧一生司馬子反在此若懷霸王之餘義撮治亂之遺風昭奚恤在此唯大國所觀秦使者懼然無以對遂揖而去使者反言於秦君曰楚多賢臣未可謀也又曰湯居亳七十里地與葛為鄰葛伯放淫不祀湯使人問之曰何為不祀曰無以供犧牲也湯使人遺之牛羊葛伯食之又不以祀湯又使人問曰何為不祀曰無以供粢盛也湯又使眾往為耕老弱餽食葛伯率其民要其有酒肉黍稻者奪之不受者殺之有一童子以黍肉餉殺而奪也書曰葛伯仇餉此之謂也為其殺是童子而征之四海之內皆曰非富天下也為匹夫匹婦報讎也蜀王本紀曰秦惠王欲伐蜀乃刻五石牛置金其後蜀人見之以為牛能大便金牛下有養卒以為此天牛也能便金蜀王以為然即發卒千人使五丁力士拖牛成道致三枚於城郭秦道得通石牛力也後遣丞相張儀等將兵隨石牛道伐蜀焉英雄記曰建安中曹操於南皮攻袁譚斬之操作鼓吹自稱萬歲於馬上舞也紀年曰周穆王四十七年伐紆大起九師東至于九江比黿以為梁春秋後秦語曰陳軫為楚使來見秦惠王曰卞莊子方刺獸而管豎子止之曰兩獸方食牛牛必甘甘必爭爭必鬥鬥則大者傷小者死從傷而刺之一舉必有雙獸之功卞莊子以為然立待之頃有兩獸之功今韓魏相攻朞年不解是必大國傷小國亡從傷而伐之一舉必有兩實此猶卞莊子刺虎之類也惠王曰善又楚語曰白起將兵伐楚楚人黃歇者遊學愽聞襄王以為辯故使於秦說昭王曰天下莫強於秦楚今聞大王欲伐楚此猶兩虎相與鬥而怒犬受其弊不如善楚秦王乃止不伐楚約為與國黃歇受約而歸又趙語曰張孟談陰見韓魏之君曰臣聞脣亡者齒寒今智伯率二君而伐趙趙亡矣趙亡則二君為之次二君曰我知其然吳越春秋曰夫差令於邦中曰寡人欲伐齊敢有諫者死太子友請朝時懷丸挾彈從後園而來衣沾履濡吳王夫差怪而問之太子友對曰臣遊後園聞秋蟬之鳴往而觀之秋蟬登高樹飲清露悲吟以為安不知螳蜋超枝緣條曳腰舉刃欲援其形也螳蜋貪心時進志在有利不知黃雀緣茂林徘徊枝葉欲啄螳蜋也夫黃雀知伺螳蜋之有味不知臣躊躇引彈蜚丸之集其背也又曰越王勾踐請大夫種曰孤聞吳王淫而好色因此而壞其謀可也大夫種曰可唯君王選擇美女二人而進之於是越王曰善哉乃使相工索國中得苧羅山賣薪之女名西施鄭旦而獻於吳又曰越王念吳欲復承之乃中夜抱柱而哭訖復承之以嘯於是群臣咸曰君王何愁心之甚夫復讎謀敵非君王之憂自臣下急務也又曰吳王闔閭將伐楚登臺向風而嘯有頃而歎群臣莫有曉王意者子胥乃薦孫子孫子者吳人也名武善為兵法僻隱幽居世人莫知其能孟子曰春秋無義戰彼善於此則有之矣征者上伐下也敵國不相征也呂氏春秋曰智伯將伐仇繇之國山險無道乃遺以大鍾方九軌仇繇開道迎之因其道取其國韓子曰智伯鑄大鍾遺仇繇由君大悅除道迎之七月由仇亡也又曰闔閭選多力者五百人利止者三千人以為前陳止足與荊戰五戰五勝遂有郢東征至于庳廬西伐至于巴蜀北迫齊晉令行中國又曰凡人之攻伐也非為利則因名也名實不得國雖彊大則曷為攻矣解在乎史墨來而輟不襲衛趙簡子可謂知動靜矣晉趙簡子鞅將襲衛史墨往睹之反曰蘧伯玉為政未可與加簡子輟不伐衛故曰史墨來而輟不襲衛也又曰楚之邊邑曰卑梁其處女與吳之邊邑處女桑於境上戲而侍卑梁之處女卑梁人扶其侍子以讓吳人吳人應之不恭卑梁人怒殺而去之吳人往報之盡屠其家卑梁公怒曰吳人焉敢攻吾邑舉兵反攻之老弱盡殺之吳王夷昧聞之怒使人舉兵侵楚邊邑堯夷而復去之吳公子光又率師與楚人戰於雞父大敗之獲其師又曰荊莊王欲伐陳使人視之使者曰陳不可伐也莊公曰何故對曰城郭高溝洫深畜積多也寧國曰陳可伐也寧國楚臣夫陳小國也而畜積多賦斂重也則民怨上矣城郭高溝洫深則民力罷矣興兵伐之陳可取也莊王聽之遂取陳又曰箴尹為荊使於宋司城子罕觴之西家之潦經其庭而不禁箴尹問其故曰西家高吾宮卑潦不經吾庭不得寫為是吾不禁也箴尹歸適遇荊欲攻宋箴尹諫於王曰宋不可攻也其君賢相仁賢者得民仁者能用之攻之必無功也淮南子曰堯時十日並出焦禾稼殺草木民人無食羿窳九嬰大風封豕鑿齒脩虵皆為害堯乃使羿誅鑿齒於疇華之澤南地也殺九嬰於水凶水火之怪在北狄之地繳大風於青立之野大風鷙鳥也射十日而下其九日殺羿窳狀如龍首食人在西方也斷脩虵於洞庭在南方擒封豕於桑林封豕大彘也桑林湯禱旱地又曰晉伐楚三舍不止大夫擊之莊王曰先君之時晉不伐楚及孤之身而晉伐楚是孤之過也若何其辱群大夫曰先臣之時晉不伐楚今臣之身而晉伐楚此臣之罪也請擊之王俛而泣涕沾襟起而拜群大夫晉人聞之曰君臣爭以過為在己不可伐也夜還師而歸又曰諸侯伐秦及涇莫濟魯襄十一年晉悼公伐鄭秦人伐晉救鄭十四年晉使六鄉帥諸侯之大夫伐秦至涇水無有先渡者也晉叔嚮見叔孫穆子曰諸侯伐不恭而討之及涇而止於秦何益何益於伐秦之事穆子曰豹之業及匏有苦葉矣不知其他業事匏有苦葉詩風篇名匏有苦葉濟有深涉深則厲淺則揭言其必濟不知其他叔嚮退召舟虞與司馬舟虞掌舟司馬掌兵曰夫苦瓠不材於人共濟而已材若裁也不裁於人言不可食共濟而已佩匏可以渡水魯叔孫賦匏有苦葉必將涉矣詩以言志具舟除隧不共有法隧道共具也舟虞具舟司馬除道法刑也是行也魯人以莒人先濟諸侯從之又曰文公立四年楚成王伐宋四年魯僖二十七年冬也宋背楚事晉故楚伐之公率齊秦伐曹衛以救宋魯僖二十八年春晉侯侵曹伐衛傳曰楚始得曹而新婚於衛也宋人使門尹班告急於晉門尹班宋大夫公告大夫曰宋人告急舍之則宋絕舍不救則宋降楚與我絕告楚則不許我告請請宋於楚楚不許我我欲擊楚齊秦不欲其若之何又曰自大畢伯士之終也大畢伯士犬戎氏之二君終卒也犬戎氏以其職來王以其職謂其嗣子以其貴寶來見王天子曰予必以不享征之且觀之兵享賓服服禮以責犬戎而示之兵非也其無乃廢先王之訓而王幾頓乎幾危頓敗吾聞夫犬戎樹敦樹立言犬戎立性悙樸師舊德而守終純固師循也純專固一言犬戎氏脩先王之舊德奉其常職天性專一終身不移不聽穆王責其厚享也其有以禦我矣禦應距也王不聽遂征之得四白狼四白鹿以歸白狼白鹿犬戎自是荒服者不至穆王責犬戎非禮暴兵露師傷滅毀信荒服者不至又曰啇王帝辛大惡于人啇殷人本號辛紂名大惡大為人所惡也庶人不忍欣載武王以致戎于啇牧載奉武兵牧啇郊牧野也是先王非務武也勤恤人隱而除其害恤憂隱痛又曰忠臣者務崇君之德讇臣者務廣君之地何以明之陳夏徵舒殺其君楚莊王伐之陳之人聽命莊王已討有罪遣卒戍陳戍守也欲守陳大夫畢賀申叔時使於齊及還而不賀莊王曰陳為無道寡人起六軍以討之征暴亂誅罪人群臣皆賀而子不賀何申叔時曰人有牽牛而往蹊於人之田中田主殺其人而奪之牛罪則有矣罰亦重矣今君王以陳為無道舉兵而征之因誅罪人遣卒戍陳諸侯聞之非以王為誅罪人也貪陳國也蓋聞君子不棄義以為利王曰善乃罷陳之戍後諸侯聞之朝於楚此務崇君之德也始張式為智伯謀張式晉人晉六將軍中行子取弱而上下離心可伐以廣地於是伐范中行滅之矣又教智伯求地於韓魏韓魏裂地而授之趙氏不予乃率韓魏而伐趙圍晉陽三年三國陰謀遂滅之此務為其君廣地也夫為君崇德者霸為君廣地者滅故千乘之國文德行者王湯武是也萬乘之國好廣地者亡智伯是也莊子曰犀首請魏伐齊季子諫勿伐華子聞而醜之曰善言伐齊亂人也善言勿伐亦亂人謂伐之與不伐亂人者又亂人也列子曰晉文公出會欲伐衛公子鋤御而笑之公問之對曰笑臣鄰之人也鄰之人有送其妻適私家者道見桑婦悅而與之言然顧視其妻亦有招之者臣竊笑此也公悟乃引師而還未至而有伐其北鄙矣墨子曰天賜武王黃鳥之旗以伐紂又曰湯在鏕宮夢神謂之曰夏桀無道汝克戡之孫卿子曰堯伐驩兜舜伐三苗禹伐共工湯伐有夏文王伐崇武王伐紂此兩帝四王者仁義之兵於天下也尉繚子曰武王之伐紂也河水逆流左驂霆死地方百里戰卒三萬紂之陣起自黃鳥至于赤斧其間百里武王不罷士民兵不血刃克殷誅紂其人事然韓子晉獻公欲伐虞虢乃遺之屈產之乘垂棘之璧女樂二八以縈其心以亂其政阮嗣宗為鄭冲勸晉王牋曰前者明公東誅叛逆全軍獨剋禽闔閭之將斬輕銳之卒以萬萬計
