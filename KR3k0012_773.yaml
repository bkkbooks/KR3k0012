body:
  text: 車部一敘車上釋名曰古者車聲如居言所以居人也今曰車車舍也行者所處若居舍也又曰黃帝造車故號軒轅氏說文曰車輿輪惣名象形也軒曲周璠車也軿車小車也輊車也輈兵廾車也輊陷陳車也輦一輪也輿車軨前橫木也䡝於袁切大車後掩也輦大車駕馬也䡝引車轟車聲易曰大車以載積中不敗又曰賁其趾舍車而徒又曰上九𦝢孤見豕負塗載鬼一車書曰五載一巡狩群后四朝敷奏以言明試以功車服以庸又曰武王戎車三百兩虎賁三百人與受戰于牧野作牧誓至牧地至誓衆又酒誥妹土嗣爾股肱純其藝黍稷奔走事厥考厥長肇牽車牛遠服賈用孝養厥父母農功既畢始牽車牛載其所有易求所無遠行賈賣用其所得異珍孝養其父母又蔡仲之命曰惟周公位冡宰正百工百工百官群叔流言乃致辟管叔于商囚蔡叔于郭鄰以車七乘詩曰我送舅氏曰至渭陽何以贈之路車乘黃乘黃白馬秦康公作是詩送重耳歸晉又曰何彼穠矣棠棣之華曷不肅雍王姬之車又曰公車于乘朱英緑縢又曰戎車孔博徒御無斁又曰君子之車既庶且多又曰子有車馬弗馳弗驅又曰役車其休又曰有棧之車行彼周道又曰命彼後車謂之載之又曰我任我輦我車我牛又曰擇有車馬以居徂向鄭箋云擇民之在車馬者往居于向又曰其車既載乃棄爾輔又曰既出我車既挾我侯又曰修爾車馬謹爾戎兵又曰間關之車舝牽兮舝音轄又曰戎車既飾徒御無繹又曰戎車既安如輊如軒輊陟利切車前重軒後重也禮曰乃擇元辰天子親載耒耜置之車右率公卿諸侯大夫躬耕籍田又曰乃教田獵以習五戎班馬政命僕夫七騶咸駕載旌旐授車以級整設于屏外有司搢朴北面以誓之又曰大夫七十而致仕若不得謝則必賜之几杖行役以婦人適四方乘安車自稱曰老夫又曰夫為人子者三賜不及車馬又曰獻車馬者執策綏武車綏旌德車結旌又曰前有車騎則載飛鴻又曰車驅而騶至于大門君撫僕之手而顧命車右就車門閭溝渠必步又曰君車將駕則僕執策立於馬前君出就車則僕并轡授綏又曰客車不入大門又曰祥車曠左又曰乘君之乘車不敢曠左右必式又曰國君不乘奇車又曰車上不廣咳不妄指又曰問士之富以車數對問庶人之富數畜以對也又曰君之適長殤車三乘公之庶長殤車一乘大夫之適長殤車一乘又曰五十無車者不越疆而弔人又曰有若曰晏子一狐裘三十年遣車一乘及墓而反國君七介遣車七乘大夫五介遣車五乘晏子焉為知禮又曰赴車不戢櫜韔丘不戢示當報以告喪之辭言之謂還告於國櫜甲衣韔弓衣又曰大夫殺則止佐車佐車止則百姓田獵佐車驅逆之車也又曰有發則命大司徒教士以車甲乘兵專衣甲之儀有發謂有軍師之發卒又曰有圭壁金璋不鬻於市命服命車不鬻於市宗廟之器不鬻於市犧牲不鬻於市戎器不鬻於市用器不中度不鬻於市兵車不中度不鬻於市鬻賣也又曰曾子問曰古者師行必以遷廟主行乎孔子曰天子巡狩以遷廟主行載于齊車言必有尊也今也取七廟之主以行則失之矣齊車金路也又曰曾子問曰古者師行無遷主則何主孔子曰主命問曰何謂也孔子曰天子諸侯將出必以幣帛皮圭告于祖禰遂奉以出載于齊車以行每舍奠焉而后就舍以腩醢禮神乃敢即安所告而不以出即埋之又曰茍有車必見其軾茍有衣必見其敝又曰其為賓則公館復私館不復其在野則升其乘車之左轂以其綏而復私館則卿大夫之家也不私之復為主人之惡又曰武王克殷反商未及下車而封黃帝之後於薊封帝堯之後於祝封帝舜之後於陳下車而封夏后氏之後於杞封殷之後於宋封王子比干之墓釋箕子囚使之行商容而復其位庶民弛禁庶士倍祿濟河而西馬散之華山之陽而弗復乘牛散之桃林之野而弗復服車甲釁音釁而藏之府庫而弗復用又曰大夫以布為輤音舊而行至於家而說輤載以輲車入自門至於阼階下而說車舉自阼階升適所殯又曰國主待客出入三積餼客於舍五牢之具陳於內米三十車禾三十車周禮春官下曰巾車掌公車之政令又考工記曰輿人為車圜者中規方者中矩立者中縣衡者中水直者如生焉繼者如附焉治材也如生如木從地生附如木之附被也輈人為輈輈車轅也國馬之輈深四尺七寸田馬之輈深四尺駑馬之輈深三尺有三寸軫方象地蓋圓象天輪輻三十象日月蓋弓二十有八以象星行澤欲短轂短轂則利行山欲長轂長轂則安又曰巾車云服車五乘孤乘下篆以五綵畫轂約也卿乘夏縵五綵畫無篆也大夫乘墨車不畫者也士乘棧車不革挽而漆之也庶人乘役車方箱可載任器以供役自孤已下之妻亦各得乘其夫之車也又曰王后五輅一曰重翟鍚面朱總二曰厭翟勒面繢總三曰安車雕面鷖總四曰翟車具面組總有握五曰輦車組挽有翣羽蓋王之喪車五乘一曰木車始遭喪乘也二曰素車卒哭所乘三曰薻車既練所乘四曰駹車既祥所乘五曰漆車既禫所乘其卿大夫士初喪三年者乘堊齊衰素車大功藻車小功駹車緦麻漆車又曰王后有安車翟車五乘木車素車藻車駹車服車五乘孤乘夏篆卿乘夏縵大夫乘墨車士乘棧車庶人乘役車散車其用無常又考工記曰一器而工聚者車為多傳曰太叔將襲鄭夫人將啓之公聞其期曰可矣命子封帥車三百乘以伐京又曰鄭伯之車僨于濟又曰北戎侵鄭鄭伯禦之患戎師曰彼徒我車懼其侵軼我也又曰公孫閼與潁考叔爭車潁考叔挾輈以走子都拔棘以逐之子都公孫閼也又曰秋大閲簡車馬也又曰鬭丹獲其戎車與其戎右少師又曰天王使家父來求車非禮也諸侯不貢車服天子不私求財諸侯自常職貢又曰使公子彭生乘公公薨于車公魯桓公也又曰公怒公齊襄公也曰彭生敢見射之豕人立而啼公懼墜于車傷足喪屨反誅屨於徒人費又曰南宮長萬奔陳以乘車輦其母一日而至又曰衆車入自純門及逵市又曰齊侯使公子無虧帥車三百乘甲士三千人以戍曹又曰元年革車三十乘季年乃三百乘又曰車說音脫其輹火焚其旗不利行師敗于宗丘又曰戒爾車乘敬爾君事又曰晉車七百乘韅靷鞅靽又曰及甲車四百六十乘俘二百五十人又曰兵車百乘文馬百駟又曰趙盾為旄車之族又曰鄭人卜行成不吉卜臨于大宮且巷出車吉又曰趙旃棄車而走林屈蕩搏之又曰晉人懼二于魏錡趙旃之怒楚師也使軘車逆之又曰遂疾進師車馳卒奔又曰登諸樓車使呼宋人而告之又曰禽之而乘其車既獲其人因釋己車而載所獲者車又曰張侯曰師之耳目在吾旗鼓進退從之此車一人殿之可以集事又曰邴夏曰射其御者君子也公曰謂之君子而射之非禮也射其左越于車下射其右斃于車中又曰綦母張喪車從韓厥曰請寓乘又曰丑父使公下如華泉取飲鄭周父御佐車宛茂為石載齊侯以免又曰茍有險余必下推車子豈識之乎然子病矣又曰楚子登巢車以望晉軍巢車車上為櫓又曰叔山冉謂養由基曰雖君有命為國故子必射乃射再發盡殪叔山冉搏人以投中車折軾晉師乃止又曰狄虒彌建大車之輪而蒙之以甲以為櫓狄虒彌櫓人也蒙覆也櫓大楯又曰巳酉師于牛首鄭地初子駟與尉上有爭將禦諸侯之師黜其車禦牛首師也黜減損遂弗使獻不使獻所獲又曰子西聞盜不警而出子西公孫夏子駟子尸而追盜先臨尸而逐賊盜入於北宮乃歸授甲臣妾多逃器用多喪子産聞盜子國子為門者置守門庀群司閉府庫完守備成列而後出兵車十七乘尸而攻盜於北宮子蟜帥國人助之殺尉止子師僕盜衆盡死又曰鄭人賂晉侯以師悝師觸師蠲皆樂師名廣車軘車淳十五乘甲兵備廣車軘車皆兵車名淳禺也凡兵車百乘他兵車及廣軘共百乘又曰魯人莒人皆請以車千乘自其鄉入又曰齊侯登巫山以望晉師晉人使司馬斥山澤之險雖所不至必斾而疏陳之斥候也疏建旄旗以陳為陳民衆也又曰使乘車者左實右僞以斾先輿曳柴而從之以陽塵齊侯見之畏其衆也乃脫歸又曰既食之使御廣車而行廣車兵車己皆乘乘車乘車安車又曰丁亥葬諸士孫之里士孫人姓因名其里四翣不蹕下車七乘不以兵甲下車送葬之車齊舊依上公禮九乘又有甲兵今皆降損又曰六月鄭子展子産帥車七百乘伐陳霄突陳城又曰賦車籍馬賦車兵車也兵甲士也又曰大夫逆於境者逆迎也迎衛侯執其手而與之言道逆者自車揖之逆於門者領之而已領搖其頭言衎驕心易生又曰齊慶封來聘其車美孟孫謂叔孫曰慶季之車不亦美乎季慶封之字叔孫曰豹聞之肥美不稱必以惡終美車何為又曰獻車於季武子美澤可以鑑展莊叔見之曰車甚澤人必瘁宜其亡也又曰王聞群公子之死也王楚靈也自投于車下曰人之愛其子也亦如余乎侍者曰甚焉小人老而無子知擠于溝壑矣擠墜也又曰治兵于郝南甲車四千乘三十萬人又曰叔向曰寡君有甲車四千乘在雖以無道行之必可畏也況其率道其可敵之公羊傳曰夏四月公會紀侯于郕秋八月壬午大閲大閲者何簡車徒也大簡閲兵車使任用而習之又曰宋公與楚子期以乘車之會公子目夷諫曰楚夷國也彊而無義請君以兵車之會往宋公曰不可吾與之約以乘車會自我為之自我墮之曰不可終以成乘車以會往楚人果伏兵車執宋公以伐宋又曰晉郤缺帥師革車八百乘以納接菑于邾婁力沛若有餘沛有餘貌七驂乘有車右有御者又曰秋搜于紅搜者何簡車徒也楚衆也穀梁傳曰兵車之會四未嘗有大戰也愛民也以兵車會而不用兵伐也論語曰升車必正立執綏車中不內顧不疾言不親指大戴禮曰王升車則聞和鸞之聲是以非僻之心無自入也在衡為鸞在軾為和馬動而鸞鳴鸞鳴而和應其聲曰和則敬此仰之節也上車以和鸞為節下車以珮玉為度禮斗威儀曰山車垂勾福草生宗廟中松柏為常山車者自然之車句者曲也不揉治而自員曲故言垂孝經援神契曰德至山陵則山出根車根車應載養萬物也家語曰孔子適衛子矯僕靈公與夫人小子同車出令宦者雍渠驂乘使孔子為次連遊過市孔子恥之又曰孔子曰自南宮敬叔之乘我車也而道加行又曰三尺之限空車不能登峻故天子郊乘乘車貴其質也車則有左右車而無左右則亂於車矣史記曰孝文帝出趙同參乘袁盎伏車前曰臣聞天子所與共六尺輿者皆天下英豪今漢雖乏人獨奈何與刀鋸人載於是上笑下同同泣而下車又曰封禪為蒲輸車惡傷土石草木又曰秦王收穰侯之印使歸陶自使縣官給車牛以從千乘有餘到關閲其寶器珍怪多於王室漢書曰田千秋年老上令朝見得乘小車入宮殿中故目號車丞相又曰王莽造四輪車駕六馬力士三百人黃衣赤幘軛音厄上人擊鼓挽音晚者呼登倦莽出令在前百官竊言此似轜車非仙物也後漢書曰袁閎二弟忠弘節操皆亞於閎忠字正甫與同郡范滂為友俱證黨事得釋初平中為沛相乘葦車到官以清亮稱及天下亂忠棄官客會稽上虞縣也又曰江革字次翁齊國臨菑人少失父獨與母居遭天下亂賊盜並起革負母逃難備經阻險常採拾以為養數遇賊或劫欲將去革輒涕泣求哀言有老母辭有足感動人者賊以是不忍犯之或乃指示避兵之方遂得俱全于難轉客下邳窮貧裸跣行傭以供母革以母老不欲搖動自在轅中挽車不用牛馬由是鄉里稱之曰江巨孝又曰井丹字大春建武末沛王輔等五王皆好亮賓客請丹不能致信陽侯陰就光烈皇后弟也令左右進輦丹笑曰吾聞桀駕人輦豈非此邪帝王世紀曰桀以人駕車坐中皆失色就不得己而今去輦自是隱蔽不關人事以壽終又曰慱士張佚帝稱善曰欲置傳者以輔太子也今慱士不難正朕況太子乎即拜佚為太子傅而以桓榮為少保賜以輜車乘馬榮大會諸生陳其車馬印綬曰今日所蒙賜稽古之力也可不勉乎又曰馬援平南越封為新息侯援乃擊牛釃所綺切酒勞饗軍士從容謂官屬曰吾從弟少游常哀吾慷慨多大志曰士生一代但取衣食裁足乘下澤車
