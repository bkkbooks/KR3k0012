body:
  text: 道部六尸解西城王真人傳曰解化之道尸不能俱神化者也寶劍上經曰尸解之法有死而更生者有頭斷從一旁出者有形存而無骨者又曰夫尸解者本真之鍊蛻也五屬之隱適也雖仙品之下第其稟受亦不輕也所謂隱回三光白日陸沉者也夫修下尸解者皆不得返望故鄉此謂上解之道也名配紫簡三官不得復窺其閒隟雖獲隱遁世志未厭又不得返歸故遊栖不定也又曰以丸藥和水而飲之又并抱草而臥則傷死於空室中謂之兵解又曰上品惟八素列紀受而不行餘皆白日尸解得為飛仙登真隱訣曰尸解者當死之時或刀兵水火痛楚之切不異世人也既死之後其神方得遷逝形不能去爾又曰董仲居淮南人也少時服氣鍊形年百餘歲不老常見誣繫獄尸解仙去又曰清平吉沛人也漢高祖時卒也至光武時故不老後尸解去真誥曰顧歡字玄平吳郡人齊永平中卒於剡山葬鹽官樂附里木連理生墓縣令江山圖表狀歡尸解而去又曰辛玄子字延期隴西定谷人好道行渡秦川長梁津致溺水解而去之又曰張祖常者彭城人吳時北來行入方山洞室中託形墮車隱化幽館而修守一之業又曰劉平河者無名字漢末為九江平河長行醫術有功德救人疾患如己之病行遇仙人周正時授以隱存之道居於方山洞室常服日月晨氣顏貌甚少後尸解而去又曰受大戒者死滅度鍊神上補天官謂之尸解又曰人死必視其形如生人視足不青皮不皺目光不毀者皆尸解也白日尸解自是仙也非尸解之例其用藥得尸解非是用靈丸之解化者皆不得返故鄉三官執之也白日去謂之上尸解夜半去謂之下尸解向晚暮之際去者謂之地下主者也瓊文四紀篇曰得九真中經者白日尸解或曰飛行羽經輕也又六紀篇曰靈書紫芝或五老者寶經有之者尸解神仙傳曰介象字元則會稽人也吳先主甚重之常謂曰介君象速求去先主不聽象言病先主使左右賜美梨一奩須臾象死解去又曰紫清上宮九華安祀謂楊君曰可尋解劍之道作吉終之術自盡出默之會隱顯之跡又曰葛玄字孝先從左慈受九丹金液經常餌朮語弟子張奉曰當尸解去八月十二日時當發至期玄衣冠而臥無氣而色不變尸解而去又曰壺公謝元歷陽人也費長房師之及道士李意期將兩弟子去積年長房及兩弟子皆隱變解化又曰鮑靚字太玄琅邪人晉明帝時人葛洪妻父陰君授其尸解法一說云靚上黨人漢司隸鮑宣之後修身養性年過七十而解去有徐寧者師事靚寧夜聞靚室有琴聲而問焉答曰嵇叔夜昔示跡東市而寶兵解耳晉中興書曰葛洪赴岣嶁令行至廣州其剌史鄧岱留不聽去洪乃止羅浮山中鍊丹積年忽與岱書當遠行尋藥岱得書徑往別而洪已亡年八十一顏色如平生入棺輕如空衣尸解而去道學傳曰吳猛字雲世有道術庾亮聞其神異厚禮迎之來武昌尋求歸辭以算盡請具棺庾公閔然即日發遣未達家五十里而終形狀如生又曰若六行未通宿植尚少則入中品以為尸解遁變也降此以下是正服御功行淺劣則入階下階勝者則滅度更生更生之後修道隨功多少方始得道太上太霄琅書曰修學上法時入山林服餌靈藥因緣應過雖復尸解和光世禮與世大異者不棺不槨拂山平之上掃深樹之下單衾覆於地太上太真科曰若祠祀先人應知歸否者有功德升度得道子孫仁孝則化形來遊歆所設也亦尸解之類金闕聖君傳曰靈書紫文者或曰五老寶經有之者尸解行之者成道東海青童傳曰保洞觀經曰雲靈上玄品有之者白日尸解抱朴子曰道林中有五種尸解符今太玄陰生符及是一病解者列仙傳曰寧封黃帝時為陶正以火自燒而隨煙上下真誥云寧生服石腦而火則是作火解也又曰司馬季主漢文帝時人受西靈子都劍解之道在委羽山大有宮服明丹之華抱扶晨之暉貌如女子鬚長三尺一男名法育一女名濟華同得道真訣云季主服靈散潛升猶首足異處此語似作劍兵解法兵解則不得在太極而其女尚讀洞經便是別修高法也守玄白術隱居太茅山東守玄白能隱形亦數見身介琰者白羊公弟子也今在建安方山琰初為孫權所殺解化而去又曰愕緑華者女仙也顏整晉穆帝升平三年己未十一月十日降於羊權家自云南山人權字道學即晉簡文時黃門侍郎羊欣之祖也權及欣皆潛修道要耽玄味真緑華云凡修道之士視爵位如過客視金玉如瓦礫則得長生因授權尸解法亦隱景化去又曰中侯王夫人於兄子晉處受飛解脫網之道又曰蔡天生上谷人少賣香於野外性仁好道逢河伯少女市香天山又曰韓崇字長季吳郡人也漢明帝時人少好道林屋仙人王瑋玄曾授以流珠丹一法崇奉而修之太有驗後瑋玄授以隱解而去入大霍山度世為右理中監漢起居注曰李少君之將去也武帝夢共登高山見使者稱太一之命召請既覺語左右曰少君將去數日果病死解去靈寶赤書曰三元王符與靈寶五篇真文同出太玄都玉京山紫微上宮此文禳陽九百六劫會之數度學者之身玄都有此經佩之得為聖上朝太清功德未滿即得田解又曰社契字廣平京兆人建安初來江東依孫策後遇介琰先生授之以稱異人再拜奉其香火少女乃教其朝天帝王皇之法尸解而去隱存方臺老君傳九真五石並日暫入太陰權過三官者始得上解之法又曰紫陽公傳西城劍解之法修佩神劍七年朱書符解化去若以曲晨飛精題之者立能變遁隱化太一遣吉光寶衣來迎又曰王遠字方平見蔡經骨相當尸解且告以要言方平冠遠遊冠朱衣虎頭鞶囊五色綬帶劍黃色少髭長短中人也乘羽車駕五龍異色綬帶前後麾節幡旗自天而下須臾引見經父兄因遣之召麻姑姑報先被詔按行蓬萊今便往願還來即去如此兩時聞麻姑來先聞人馬聲從官當半於遠姑至經舉家亦見之是好年才如笄於頂上作髻餘髮散垂至腰衣有文彩又非錦繡光彩曜日不可名狀皆世所無也入拜遠遠為之起立各進行廚脯行云是麟脯遠去經父母怪私問經經曰王君常在崑崙山往來羅浮等山山上有宮室王君出唯乘一黃麟十數侍者每行山海神皆奉迎拜謁也遠有書與陳尉其書廊落大而不正先是無人知方平名遠用此知之陳存録王君手書於小箱中也經後尸解而去又曰張微子漢昭帝時將作大匠張慶女也微子好道得尸解又曰蘇子訓者齊人也人莫知其有道在鄉里行信讓積年顏色不老人追隨之不見所常服餌好清談常間居讀易為文皆有意義京師貴人聞之莫不虛心謁見不可致之後至適出門諸貴人冠蓋塞路諸生具言適去矣東陌上乘驢者是也各奔馬逐之不及子訓至陳公家言曰吾明日當去不復還也陳公以葛布單衣一送之至時子訓死解化仙去又曰陰長生新野人也後漢戚里專務道術聞馬明生得度世之道乃造焉明生但日夕別與之高談論語當世之事治田農之業如此十餘年長生不懈同事明生者十二人皆悉歸唯長生彌肅明生曰子真得道矣乃將入青城山以太清神丹經授之丹成仙去著書九篇云上古仙者多矣伹漢興以來四十五人連余為六矣三十人尸解餘並白日仙去陰君自序曰漢延光元年新野山北之子受仙君神丹要訣道成去世付之名山於是陰君裂黃素舄丹經一通函以文石置嵩高山一通黃櫨簡漆書之函以青玉置太華山一通黃金之簡刻而書之函以白銀著蜀經山一封縑書合為一篇付弟子使世世當有所傳付又著詩三篇以示將來也又曰成仙公名武丁桂陽人也後漢時為縣小吏少言大度博通經學不從師授有自然之性時先被使京還過長沙郡投郵舍不及遂宿於野忽聞樹上人語云向長沙市藥平旦視之乃二白鶴仙公異之遂往市見二人張白蓋相從而行謂仙公曰君當得地仙耳令還仙公病卒尸解又曰龍伯高者後漢伏波將軍馬援戒其兄子稱此人之美可法者也伯高後從仙人刁道林受服胎氣之法又受服青䭀方醉亡隱處方臺師定籙君伯高名述京兆人漢建武中為仙都長至零陵太守馬援戒兄子嚴書曰龍伯高敦厚周慎口無擇言謙約節儉公廉有威吾愛之重之願汝曹效之又曰漢期門郎程偉妻得道者也能通變化偉逼求術妻不傳逼之不已妻蹶然而死尸解而去南嶽魏夫人內傳曰清虛真人王子登與東華青童君來降授夫人曰隱遷白翳神散一劑又與白石精金化形靈丸使頓服之稱疾勿行剋期有定俱會丹壠之南陽洛山陽洛宮言畢二真人去即服藥因稱腳疾閉目寢息飲而不食夜半之後太一玄仙遣颷車來迎駕氣騁御徑入帷中其時弟子侍疾衆親滿側莫之覺也陽洛山昔夏禹巡諸名山刻石於此下有洞臺神仙學者萬餘人又曰王晉賢晉王夷甫女也為愍懷太子妃洛城亂劉曜略晉賢欲妻之晉賢大罵曰我皇太子婦司徒公之女胡羌小醜敢欲干我乎言畢投河其侍婢名六出投河死時遇嵩高女真韓西華出遊遂俱猶內救外示其死體實密濟將入嵩高山今華陽內洞中六出年二十餘體貌修整有節操姓田漁陽人魏故浚儀令田諷之孫諷有陰德以及六出耳又曰董奉字君異候宮人也吳先主時有少年為奉本縣長見奉年四十餘不知有道罷官去後五十餘年復見他職行經候官諸故吏人皆往見之奉顏貌一如往日奉居山不種田為人治病亦不取錢愈者使裁五株杏數年計十餘萬株令人將穀一器自往取杏一器貨杏得穀賑救貧乏供給行旅不逮者歲二萬餘斛乃尸解去裴君曰尸解之仙不得御華蓋乘飛龍登太極遊九宮也諸有單用曲晨飛精劍解者得八素列紀惟奉寶祕不修行皆白日尸解其有作水火兵病及用大刀竹杖解去者先詣名山並為太清尸解凡修劍解之道並紀名紫簡上隸高仙諸有宿功善業陰德信仙其神得詣朱火丹陵宮受學仙道為九宮真人諸有用大極尸解之道夜半去者職為地真應尸解者或學功淺深志尚頽廢或為祭酒精勒救治者並得為三十六洞天文解地下主者一百四十年一轉武解鬼師二百八十年一轉凡有三等乃得進補仙職九天生神章經曰夫學上道希慕神仙及得尸解者終歸仙道神化則同不相逢雜俱入人道真明真科曰生世好道精功布德名書上清者得尸解下仙遊行五嶽後生人中更受經法為人宗師太微經曰諸尸解者按四極真科云一百四十年乃得神中真官於是始得飛華蓋乘輦龍登太極遊九宮也雌一五老經曰夫仙之去世也或絶跡藏往而內栖事外或解劍遣杖飄然雲霧延神寄玄莫知其端緒也又曰若有此五老經雖不齊戒存思與俗混雜故不失隱存下神白日尸解及命過大陰地下主者或遺骨胎變受化南宮是必宿有骨緣也上清經曰元始天帝以上清變化七十四方解形之道授南極元君太清真人內傳及名山記曰羅浮山洞周五百里在會稽南行三十里其山絶高葛洪解化處真誥謂之增城山集仙録曰張天師道陵隱龍虎山修三元默朝之道得黃帝龍虎中丹之術丹成服之能分形散景天師白鄱陽人嵩高山得隱書制命之術又曰周爰友者汝南安城人也漢河南尹周暢女也暢平生多陰德爰友小好道餌伏苓四十年後遇石先生教其遁化及隱景之道解形而去又曰唐廬眉娘者生而眉緑性機巧南海太守進至闕順宗嘆其在宮內謂之神姑但食胡麻飯一三合至元和中憲宗嘉其聰惠因賜金鳳環以束其腕久之不願在宮掖乃度為女道士放歸南海賜號逍遙數年不食尸解化去
