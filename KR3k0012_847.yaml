body:
  text: 飲食部四嗜酒傳曰齊慶封田而嗜酒與舍政舍封子慶封當國不自為政以付舍則以其內實遷于盧蒲嫳氏易內而飲酒內實寶物妻妾也傳曰鄭伯有嗜酒為窟室窟實地室而夜飲酒擊鐘焉朝至未已朝者曰公焉在家臣故謂伯有為公其人曰吾公壑谷壑谷窟室皆自朝布路而罷布路分散既而朝伯有朝鄭君則又將使子晳如楚歸而飲酒庚子子晳以駟氏之甲伐而焚之伯有奔雍梁雍梁鄭地醒而後知之遂奔許傳曰齊惠欒高氏皆嗜酒欒高二族皆出惠公信內多怨說婦人言政多怨疆於陳鮑氏而惡之惡陳鮑夏有告陳桓子曰子旗子良將攻陳鮑氏亦告鮑氏桓子授甲而如鮑氏遭子良醉而騪欲及子良醉故驅告鮑文子遂見文子文子鮑國則亦授甲矣使視二子二子子旗子良也則皆將飲酒桓子曰彼雖不信彼傳言者聞我授甲則必逐我及其飲酒也先伐諸陳鮑方睦遂伐欒高氏後漢書曰更始韓夫人尤嗜酒每侍飲見常侍奏事輒怒曰帝方對我飲正用此時持事來乎起抵破書案又曰馬氏為人嗜酒闊達敢言闊達大度也敢言謂言果言敢無所隱也時醉在御前面折同列言其短長無所避忌帝故縱之以為笑樂魏志曰徐邈字景山魏國初為尚書郎時科禁酒而邈私飲至於沉醉校尉趙達問以曹事邈曰中聖人達白太祖太祖甚怒度遼將軍鮮于輔進曰平日醉客謂酒清者為聖人濁者為賢人邈性慎偶醉言耳坐刑後車駕幸許昌問邈曰頗復中聖人不邈對曰昔子反斃於穀陽御叔罰於飲酒臣嗜酒二子不能自懲時復中之然宿瘤以醜見傳而臣以醉見識帝大笑顧左右曰名不虛立又曰時苗字德胄巨鹿人也少清白為人疾惡建安中入丞相府出為壽春令令行風靡楊州治在其縣時蔣濟為治中苗以初至欲往謁濟素嗜酒適會其醉不能見苗恚恨還刻木為人署曰酒徒蔣濟豎之於墻下旦夕射之州郡雖知其所為不恪然以其履行過人無若之何吳書曰鄭泉字文淵陳郡人博學有奇志而性嗜酒其間居每曰願得美酒滿五百斛船以四時甘脆置兩頭反覆以飲之憊即住而啖肴膳酒有㪷升減即隨益之不亦快乎晉書曰光逸字孟祖遇亂避難渡江依胡母輔之初至屬輔之與謝鯤阮放畢卓羊曼桓彝陵孚散髮裸衣閉室酣飲已纍日逸將排戶入守者不聽逸便於戶外脫衣露頭於狗竇中窺之而大叫輔之驚曰他人決不能爾必我孟祖也遽呼入遂與飲不捨晝夜人謂之八達又曰孟嘉為桓溫參軍嘉好酣飲愈多不亂溫問嘉酒有何好而卿嗜之之嘉曰未得酒中趣耳又曰孝武末年嗜酒好肉而會稽王道子昏醟尤甚唯狎眤諂邪於是國寶讒諛之計稍行於主相之間宋書曰衡陽王義季素嗜酒自彭城王義康廢後遂為長夜飲略少醒曰文帝詰責曰此非唯傷事業亦自損性皆汝所請近長沙兄弟皆緣此致故將軍蘇徵耽酒成疾旦夕待盡一門無此酣法汝於何得之義季雖奉旨酣縱不改成疾以至於終又曰范泰初為太學博士外弟荊州刺史王忱請為天門太守忱嗜酒醉輒纍旬及醒則儼然端肅泰陳酒既傷生所宜深誡其言甚切忱嗟歎久之曰見規者衆未有若此者也又曰劉雍穆之之子河東王歆之與雍俱嘗為南康相素輕雍後歆之與俱豫元會並坐雍嗜酒謂歆之曰卿昔見臣今能見勸一杯酒不歆之因斆孫皓歌答曰昔為汝作臣今為汝比肩既不勸汝酒亦不願汝年梁書曰王贍為吏部尚書性率亮居選所舉其意多行頗嗜酒每飲或彌日而精神朗贍不廢簿領武帝每稱贍有三術射棊酒也南史曰陳暄文才俊逸尤嗜酒無節操遍歷王公室沉湎過差非度其兄子秀常憂之致書於暄友人何胥異其諷諫暄聞之與秀書曰且見汝書與孝典陳吾飲酒過差吾有此好五十餘年昔吳國張公亦稱耽嗜吾見張公時伊已六十自言引滿大勝少年時吾今所進亦勝於往曰老而彌篤唯吾與張季舒耳吾方與此子交歡於地下汝欲夭吾此志耶昔阮咸阮籍同遊竹林宣子不聞斯言王湛能玄言巧騎武子呼為癡叔何陳留之風不嗣大原之氣巋然翻成可怪吾既寂寥當世朽病殘年産不異於顏原名未動於卿相若不日飲醇酒復欲安歸女以飲酒為非吾以不飲為過昔周伯仁渡江唯三日醒吾不以為少鄭康成一日三百杯吾不以為多然洪醉之後有得失成廝養之志是其得也使次公之狂是其失也吾常譬酒猶水也可以濟舟亦可以覆舟故江議有言酒猶兵也兵可千日而不用不可一日而不備酒可千日而不飲不可一飲而不醉美哉江公可與共論酒矣汝驚吾墮車侍中之門陷池武陵之地遍布朝野自言憔悴丘也幸茍有過人必知之吾平生所願身沒之後題吾墓云陳故哭徒陳君之神道若斯志意豈避南征之不覆賈誼之慟哭者哉何水曹眼不識杯鐺吾口不離觚杓汝寧與何同日醒與吾同日而醉乎政言其醒可及其醉不可及也速營糟丘吾將老焉後魏書曰夏侯道遷長子史字元廷歷鎮遠將軍南兗州大中正史性好酒居喪不戚醇醪肥鮮不離口沽買飲噉多所費用父時田園貨賣略盡人間債猶數千餘匹穀食至常不足弟妹不免飢寒於是昏酣而卒初史與南人辛諶庾遵江文遙等終日遊聚酣飲之際恆相謂曰人生局促何殊朝露坐上相看先後間耳脫有先亡者於良辰美景靈前飲宴儻或有知庶共歆饗及史亡後三月上巳諸人相率至史靈前仍共酌飲時日晚天陰室中微暗咸見史在坐衣服形容不異平昔時執杯酒似若獻酬但無語耳後魏書曰李元忠微拜侍中雖處要任初不以物務干懷唯以聲酒自娛大率常醉家事大小了不關心園庭羅種果藥親朋尋詣必留連宴賞每挾彈攜壺遊遨里閈每言寧無食不可使我無酒阮步兵吾師也孔少府豈欺我哉後自中書令復求為太常以其有音樂而多美酒故神武欲用為僕射文襄言其放達常醉不可任以臺閣其子揆聞之請節酒元忠曰我言作僕射不勝飲酒樂爾愛僕射時宜勿飲酒北齊書曰黃門郎司馬消難左僕射子知之子是高祖之壻勢盛當時因退食之暇尋高季式與之酣飲留宿旦曰重門並閉關鑰不通消難固請云我是黃門郎天子侍臣豈有不參朝之理旦一宿不歸家君必當大怪今若又留我狂飲我得罪無辭恐君亦不免譴責季式曰君自稱黃門郎又言畏家君怪欲以地勢脅我邪高季式死自有處初不畏此消難拜謝請出終不見許酒至不肯飲季式云我留君盡興君是何人不為我飲命左右賚車輪括消難頸又賚一輪自括頸仍命酒引滿相勸消難不得已欣笑而從之方仍俱脫車輪更留一宿是時失消難兩宿莫知所在內外驚異及消難出方具言之世宗在京輔政白魏帝賜消難美酒數石珍羞十輿并令朝士與季式親狎者就季式宅宴集其被優遇如此唐書曰王源中為戶部侍郎翰林丞旨學士性頗嗜酒嘗召對源中方沉醉不能起及醉醒同列告之源中但懷憂殊無悔恨他日又以醉不任赴召遂終不得大任以眼病求免所職列子曰子産之兄公孫朝聚酒千鍾積麴成封望門百步糟漿之氣逆於人鼻方其荒於酒也不知正道之安危人理之悔吝室內之有無九族之親踈雖水火兵刃交於前不知也王子年拾遺記曰晉有羌人姚馥字世芬充廄馬圉每醉中好言王者興亡之事常云九河之水不足以漬麴蘗八藪之木不足以為蒸薪七澤之麋不足以充庖俎恆言渴於醇酒群輩呼為渴羌後武帝受以朝歌守馥辭願且為馬圉時賜美酒以樂餘年帝曰朝歌紂之舊都地有酒池故使老羌不復呼渴固辭遷酒泉太守地有清池其味若酒馥乘醉而拜受之世說曰劉靈病酒渴甚從婦求酒持器泣諫曰君飲酒太過非攝生之道必宜斷之靈曰甚善我不能自禁唯當祝鬼自誓斷之耳便可具酒肉婦從之靈跪而呪曰天生劉靈以酒為名一飲一斛五斗解醒婦人之言慎不可聽便引酒進肉隗然已醉又曰畢茂世云一手持蟹螯一手持酒杯拍浮酒池中便足了一生使酒史記曰季布為河東守孝文時人有言其賢者孝文召欲以為御史大夫復有言其勇使酒難近至留邸一月見罷布因進曰臣無功竊寵待罪河東陛下無故召臣此人必有以臣欺陛下者今臣至無所受事罷去此人必有毀臣者夫陛下以一人之譽而召臣以一人之毀而去臣臣恐天下有識聞之有以窺陛下也上默然慚良久曰河東吾股肱郡故時召君耳布辭之官又曰孝武建元元年灌夫入為太僕二年夫與長樂衛尉竇甫飲輕重不得飲酒輕重不得其平夫醉搏甫甫竇太后昆弟也上恐太后誅夫徙為燕相數歲坐法去官家居長安灌夫為人剛直使酒不好面諛貴戚諸有勢在己之右不欲加禮必陵之諸士在己之左愈貧賤尤益敬灌夫家居雖富然失勢賓客益衰及魏其侯失勢亦欲倚夫引繩排根生平慕之後棄之者夫亦倚魏其而通列侯宗室為名高兩人相為引重其游如父子然相得歡甚恨相知晚也夫有服過丞相丞相從容曰吾欲與仲孺過魏其侯會仲孺有服夫曰將軍乃肯幸臨況魏其侯夫安敢以服為解請語魏其侯帳具將軍旦日早臨武安許諾夫具語魏其侯如所謂武安侯魏其與其夫人益市牛酒夜灑掃早帳具至旦平明令門下候伺至日中丞相不來魏其謂夫曰丞相豈忘之哉夫不懌曰夫以服請宜往乃駕自往迎丞相丞相特前戲許灌夫殊無意往及夫至門丞相尚臥於是夫入見曰將軍昨日幸許過魏其魏其夫妻治具自旦至今未敢嘗食武安愕謝曰吾昨日醉忽忘與仲孺言乃駕往及飲酒酣夫起舞屬丞相丞相不起夫從坐上語侵之魏其扶灌夫去謝丞相丞相卒飲至夜極歡而去丞相嘗使籍福請魏其城南田不得由此怨灌夫魏其後丞相娶燕王女為夫人有太后詔召列侯宗室皆往賀魏其侯過灌夫與俱夫謝曰夫數以酒失得過丞相丞相今者又與夫有郤魏其曰事已解強與俱飲酒酣武安起為壽皆避席伏已魏其侯為壽獨故人避席耳餘半膝席夫不悅起行酒至武安武安膝席曰不能滿觴夫怒因嘻笑曰將軍貴人也屬之時武安不肯行酒次至臨汝侯灌嬰孫名賢臨汝侯方與程不識耳語又不避席夫無所發怒乃罵臨汝侯曰生平毀程不識不直一錢今日長者為壽乃效女兒呫囁耳語武安謂灌夫曰程李俱東西宮衛尉今衆辱程將軍仲孺獨不為李將軍地乎灌夫曰今日斬頭陷胸何知程李乎坐乃起更衣稍稍去續漢書曰時聖公聚客家有酒請游徼飲賓客醉歌言朝烹兩都尉游徼後來用調羹味游徼大怒縛捶數百魏志曰吳質黃初五年朝京師詔大將軍及特進以下皆會質所太官給供俱酒酣質欲盡歡時上將軍曹真性肥中領軍朱鑠性瘦質召優使說肥瘦真負其貴恥見賤怒謂質曰卿欲以部曲將遇我耶驃騎將軍曹洪輕車將軍王忠言將軍必欲使上將軍肥即自宜為瘦真愈恚拔刀瞋目言俳敢輕說吾斬爾遂罵坐質案劍曰曹子丹汝非屠機上肉吳質吞爾不嚙喉咀汝不嚙牙何敢恃勢憍耶鑠因起曰陛下使吾等來樂卿耳乃至此耶質顧叱之曰朱鑠敢壞坐諸將軍皆還坐鑠愈恚還拔劍斬地遂使罷也吳志曰權既為吳王歡宴之末自起行酒虞翻伏地佯醉不起權去翻起坐權於是大怒手拔劍次擊之侍坐者莫不惶遽唯大司農劉基起抱權諫曰大王以三爵後手殺善士雖翻有罪天下孰知之且大王以能容賢畜衆故海內望風今一朝棄之可乎權曰曹孟德殺孔文舉孤於虞翻何有哉基曰孟德輕害士人天下非之大王躬德義欲與堯舜比隆曾何自喻於彼乎翻由是得免權因勑左右自今酒後言殺皆不得殺也又曰胡綜性愛酒酒後歡呼極意或推引杯觴搏擊左右權愛其才不備責也又曰凌統當擊賊圍先期統與督將陳勤會飲酒勤剛勇任氣因督酒際陵轢一坐舉罰不以其道統疾其侮慢面折不為具酒勤怒詈統及其父操統流涕不答衆因罷坐勤乘酒凶悖又於道路辱統統不忍引刀斫勤數日死及當攻屯統曰非死無以謝罪乃率厲士卒身當矢石所攻一面應時破壞諸將乘勝遂大破之還自拘於軍正權壯其果毅許以功贖罪晉書曰庾純為河南尹以賈充姦佞與任愷共舉充西鎮關中充由是不平充嘗宴朝士而純後至充謂曰尹行嘗居人前今何以在後純曰且有小市事不了是以來後世言純之先嘗有五百者充之先有市魁者故充純以此相譏焉充自以功隆望重意殊不平及純行酒充不時飲純曰長者為壽何敢爾乎充曰父老不歸供養將何言也純因發怒曰賈充天下凶由爾一人充曰輔佐二世蕩平巴蜀有何罪而天下謂之凶凶純曰高貴鄉公何在衆坐因罷充左右欲執純中護軍羊琇侍中王濟佐之因得出充慚怒上表解職純懼上河南尹關中侯印綬上表自劾晉裴楷傳曰石崇以功臣子有才氣與裴楷志趣各異不與之交長水校尉孫季舒常酣宴慢慠過度欲表免之楷聞之謂崇曰足下飲人狂藥責人正禮不亦乖乎乃止又曰裴遐嘗在平東將軍周馥坐與人圍碁馥司馬行酒遐不即飲司馬醉怒因曳遐墮地遐徐起還坐顏色不變復碁如故其性和如是宋書曰謝超宗為人恃才使酒多所陵忽在直省常醉上召見語及北方事超宗曰虜動來二十年矣佛出亦無如之何以失儀出為南郡王中軍司馬梁書曰蕭頴達出為豫章內史意甚憤憤未發前預華林宴酒後於座辭氣不悅沈約因勸酒欲以觀之穎達大罵約曰我今日形容正是汝老鼠所為何忽復勸我酒舉坐驚愕帝謂之曰汝是我家阿五沈公宿望何意輕脫若以法繩汝汝復何理達竟無一言唯大涕泣心愧之又曰謝善勳飲酒至數升醉後輒張眼大罵雖復貴賤親踈無所擇也時謂之謝方眼陳書曰柳盼為散騎常侍性愚戇使酒因醉乘馬入殿門為有司劾免於家風俗通曰陳國有趙祐者酒後自相署或稱亭長督郵祐復於外騎馬將絳幡云我使者也司徒鮑昱決獄云騎馬將幡起於戲耳無他惡意又曰汝南張妙酒後相戲遂縛捶二十下又縣足指遂至死鮑昱決事云原其本意無賊心宜減死風俗通曰巴郡宋遷母名靜往阿奴家飲酒遷母坐上失氣奴謂遷曰汝母在坐上何無儀適遷曰腸痛誤耳人各有氣豈止我遷罵奴乃持木枕擊遷遂死
