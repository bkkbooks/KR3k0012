body:
  text: 禮儀部十一社稷尚書禹貢曰海岱及淮惟徐州厥貢惟土五色王者封五色土為社稷建諸侯則各割其方色土與之使立社又召誥曰越翌日戊午乃社于新邑牛羊豕各一尚書逸篇曰太稷唯松東社唯柏南社唯梓西社唯栗北社唯槐天子社廣五丈諸侯半之尚書曰湯既勝夏欲遷其社不可作夏社言夏社不可遷之義周書曰諸侯受命于周乃建太社于國中其壝東青土南赤土西白土北驪土中霤以黃土將建諸侯取方一面之土苴以白茅以土封之故曰列土毛詩閔豫載芟曰春耕籍田而祈社稷也載芟載祚其耕澤澤又閔豫曰良耜秋冬報社稷也畟畟良耜俶載南畝周禮地官曰大司徒之職設其社稷之壝而樹之田主各以其野之所宜木遂以名其社與其野又地官上曰小司徒掌凡建國立其社稷又地官上封人曰封人設王之社稷壝為畿封而樹之又春官上大宗伯曰以血祭祭社稷鄭玄注曰陰祀曰血貴氣臭又春官上小宗伯曰宗伯掌建國之神位右社稷又春官下喪祝曰喪祝掌勝國邑社稷之祝號以祭祀禱祠焉馬融曰所計國所封邑猶立其社稷士師若祭勝國之社稷則為之尸又冬官曰匠人營國左祖右社面朝後市五宮所居也祖宗廟面猶鄉也王宮當中經之涂也禮記月令仲春擇元日命人社為祀社稷也春事興故祭之祈農祥元日謂近春分前後戊日元吉也仲秋擇元日命人社賽秋成也元日謂近秋分前後戊日又曲禮曰問國君之年長曰能從宗廟社稷之事幼曰未能從宗廟社稷之事又檀弓曰衛獻公出奔反於衛及郊將班邑於從者而後入柳莊曰如皆守社稷則孰執羈靮而從如皆從則孰守社稷又郊特牲曰社祭而主陰氣也君南嚮於北墉下答陰之義也墻謂之墉北墉社內日用甲用日之始也天子太社必受霜露風雨以達天地氣也是故喪國之社屋之不受天陽也薄社北牖使陰明也絶其陽通其陰而已薄社殷之社殷始都薄社所以神地之道也地載萬物天垂象取財於地取法於天是以尊天而親地也故教民美報焉家主中霤而國主社示本也中霤亦土神也唯為社事單出里唯為社田國人畢作唯社兵乘共粢盛所以報本反始也又祭法曰王為群姓立社曰太社王自立社曰王社諸侯為百姓立社曰國社諸侯自為立社曰侯社大夫以下成群立社曰置社群衆也大夫以下至庶人也大夫不得特立社與民族居百家以上則共立一社之里社是也又祭義曰建國之神位右社稷而左宗廟周尚左也禮記外傳曰社者五土之神也稷者百穀之神也一云稷是原隰之神原隰宜種百穀天子為天下之人立社曰太社壇方五丈諸侯為境內之民立社曰國社又有王社侯社者天子諸侯別自立社私有禱求地之勢有禮生物各隨所宜九州之人各居其土食其利者各報祭之是謂神地之道者籍田之後則告為將耕也五穀既登又報功也國以民為本人以食為天故建國君民先命立社地廣穀多不可遍祭故於國城之內立壇祭之親之也日用甲尊之也天有十日甲為首也周公卜洛建王都戊申社于新邑自此皆用戊日唯天子祭天地諸侯祭社稷而已又曰社樹各以其土所宜之木河東宜松周地宜栗社主用石石土中堅者天子親征則載社主行有罪者誅之於車前左傳僖公曰宋公使邾文公用鄫子於次睢之社欲以屬東夷此水有妖神東夷皆社祠之司馬子魚曰古者六畜不相為用小事不用大牲而況敢用人乎祭祀以為人也民神之主也用人其誰饗之又曰襄四君民者豈以陵民社稷是主臣君者豈為其口實社稷是養故君為社稷死則死之為社稷亡則亡之又昭七曰魏憲子問於蔡墨曰社稷五祀誰氏之五官也對曰少暭氏有四叔賈逵注曰少暭黃帝之後金天氏也四叔四子皆叔曰重曰該曰修曰熙實能金木水能順其成性也使重為勾芒該為蓐收修及熙為玄冥此其三祀也顓頊氏有子曰黎祝融黎水土官黎當高辛氏之世故外傳曰黎為高辛氏火正也共工氏有子曰勾龍為后土共工大暭之後炎帝之前霸九有者也其裔子佐顓頊能平水土此其二祀也后土為社稷田政也掌田之官長后稷也有烈山氏之子曰柱為稷烈山炎帝之世烈山氏也自夏以上祀之周棄亦為稷周棄周祖后稷棄也為唐虞夏后稷也自商以來祀之商殷也柱之功至湯浸祀周棄以為稷也又定上曰且夫祝社稷之常隸也賤臣社稷不動祝不出境官之制也社稷動謂國遷公羊傳隱公曰宋宣公謂繆公曰以吾愛與夷則不若愛汝以為社稷宗廟主則與夷不若汝蓋終為君矣又莊公曰日有蝕之鼓用牲于社求于陰之道也以朱絲縈社或曰脅之或曰為暗恐犯故縈也又僖公曰邾婁人執鄫子用之社蓋叩其鼻以血社稷也又哀公曰毫社災毫社者何亡國之社毫社者先世亡國在魯境社者封也為封土祀社也其言災何亡國之社掩其上而柴其下故火得燒之春秋潛潭巴曰里社鳴此里有聖人生其詬百姓歸之宋均注曰鳴則教令行若湯放桀也詬鳴之怒者也論語八佾曰哀公問社於宰我宰我對曰夏后氏以松殷人以柏周人以栗曰使民戰栗孔安國注曰凡建邦立社各以其土所宜之木宰我不本其意妄為之說因周栗便云使民戰栗也孝經說曰社土地之主也地廣不可盡敬故封土為社以報功稷五穀之長也穀衆不可遍祀故立稷神祭之五經通義曰王社籍田中為千畝報功也文家右社稷左宗廟何文家握地而王地道長右得事宗廟以有社稷故右之也質家左社稷右宗廟社皆有壇者飾也有木者土當生萬物莫善於木五經異義曰今民謂社神為公社位上公非地祇也漢書郊祀志曰高祖時天下已定詔御史令於豐治枌榆社常春以羊彘祠之也又郊祀志曰稷者百穀之主所以奉宗廟供粢盛人所食以生活也王者莫不尊重親祭自為之主禮如宗廟禮記曰唯祭宗廟社稷為越紼而行事聖漢興禮儀稍定已有官社未立官稷臣瓚按高紀除秦社稷立漢社禮所謂大社也時人立官社配以夏禹所謂王社也見漢紀今未立官稷至此始立之也遂於官社後立官稷以夏禹配食官社后稷配食官稷稷種穀樹又曰陳平既娶張氏女資用益饒遊道日廣里中社平為宰分肉甚均里父老曰陳孺子能為宰乎曰使平得宰天下天下亦如此肉也又曰欒布吳軍時以功封為鄃侯復為燕相齊燕之間皆為立社號曰欒公社續漢書曰每月朔旦太史上其月曆有司侍郎尚書見讀其令奉行其正朔前後各二日皆牽羊酒至於社下以祭日變割羊以祠社用救日變執事者冠長冠衣皂單衣絳領袖緣中衣絳𥿉袴以行禮如故事又曰建武二年立太社稷於雒陽在宗廟之左社稷之右皆方壇無屋有墻門而已二月八月及臘一歲三祠皆置社稷太守令長侍祠牲用羊豕唯州所治有社無稷古者師行有載社主不載稷也晉書禮志曰前漢但置官社而無官稷王莽置官稷故漢至魏但太社有稷故常二社一稷後魏書曰天平四年四月七帝神主既遷於太廟太社石主將遷於社宮禮官云應用幣中書侍郎裴伯茂時為祝文伯茂據故事太和中遷社高祖用特不用幣遂以奏聞于時議者或引大戴禮遷廟用幣今遷社宜不殊伯茂據尚書召誥應用牲詔遂從之宋書禮志曰晉元帝建武元年又依洛京立二社一稷其太社之祝曰地德普施惠存無疆乃建太社保佑萬邦悠悠四海咸賴嘉祥其社之祝曰坤德厚載王畿是保乃建帝社以神地道明祀惟辰景福來造禮左宗廟右社稷歷代遵之故洛京社稷在廟之右而江左又然也又曰祠太社帝太稷常以歲二月八月二社日祠之唐書曰天寶中升社稷五星為大杞詔曰祭之為典以陳至敬名或不正是相奪倫況社稷孚祐百代蒙其福日月照臨五星叶其紀兆庶允殖下土式瞻既超言象之外須極尊嚴之禮列為中祀頗紊大猷自今已後社稷及日月五星並升為大祀仍以四時致祭六典曰仲春上戊祭太社以後土氏配焉祭太稷以后稷氏配焉家語曰孔子曰古之平水土及播植百穀者衆矣然唯勾龍兼食於社而棄為稷易代奉之無敢益者明不可與等也莊子曰㟪壘之民相與言曰庾桑之始來吾酒然異之今吾日計之而不足歲計之而有餘庶幾其聖人乎子胡不尸而祝之社而稷之也又曰匠石之齊至于曲轅見櫟社樹其大蔽千牛潔潔者匝也百圍其高山臨千仞而後有枝其可以為舟者旁十數觀者如市淮南子曰夫窮鄉之社扣瓮拊瓶相和而歌自以為樂也嘗試為之擊建鼓橦巨鍾乃知夫瓮缶之足羞也又曰禹勞力天下死而為社勞力謂治水功死託祀於后土之中周棄作穡死而為稷種曰稼斂曰穡死託於祀稷官之神子房之智陳平之無忤絳侯勃之果霍將軍之勇終之以禮樂則可謂社稷之臣矣太公金匱曰武王問太公曰天下精神甚衆恐後復有試余者也何以待之師尚父曰請樹槐於王門內王路之右起國社築垣墻祭以酒脯食以犧牲尊之曰社客有非常先與之語客有益者入無益者距歲告以水旱與其風雨澤流悉行除民所苦白虎通曰王者所有社稷何為天下求福報功人非土不立非穀不食土地廣博不可遍敬五祀衆多不可一一而祭故封土立社祀而之示尊五穀之長立稷而祀之稷者得陰陽和氣而為用又多故為長歲再祭之又曰祭社稷有樂乎禮記曰金石之樂用之於宗廟社稷又曰王者諸侯必有戒社何示存亡也明為善者得之為惡者失之春秋公羊傳曰亡國之社奄其上柴其下郊特牲記曰喪國之社屋之示與天地絶也蔡雍獨斷云天子太社五色土為壇皇子封為王者授之太社之土以所封之方色藉以白茅歸國以立社故為之茅社也陳留風俗傳曰東昏縣者衛地故陽武之戶牖鄉也漢相陳平家焉少為社下宰今民祀其社邴原別傳曰原避也遼東以虎為患自原之落獨無虎患嘗行而得遺錢拾以繫樹枝比錢不見取繫錢者逾多原問其故答者謂之社樹原惡其由己而成妄祀乃辨之於是里中遂斂其錢以為社供里老為之誦曰邴君行仁落邑無虎邴君行廉路樹成社列異傳曰大司馬河內陵蕤字聖卿少時病虐逃社中有人呼社邸社邸聖卿應曰諾起至戶中人曰取此書去得素書一卷譴劾百鬼法所劾輒效搜神記曰中興初有應嫗者生四子而寡見神光照社試探之得黃金自是諸子官學並有才名至瑒七世顯劉楨京口記曰虎社中村老故相傳云昔有虎於社中産因以為名荊州記曰葉縣東百步有縣故城西南四里名伍伯村有白榆連李樹異幹合條高四丈餘士民奉以為社世說曰阮宣子伐樹人有止之宣子曰若樹而為社伐樹則社移社而為樹伐樹則社亡矣習鑿齒逸民高士傳曰董威輦不知何許人忽見於洛陽白社中戴延之西征記曰洛陽建春門外道北有白社董威輦所住也去門二里有牛馬市嵇公臨刑處也博物志曰子路與子貢過社社樹有鳥子路搏鳥社神牽子路子貢說之乃止又曰周之正月受社牲之首以出種子帝籍蠶又受社雍及祭以沐蠶種上辛乃射黑牲于帝郊以祈來年之豐二月司空開冰射桃弧棘矢五發以御其災述異記曰庾邈與女子郭凝通詣杜約不二心俱不婚娉經二年凝忽暴亡邈出見凝云前北村還遇強梁抽刀見逼懼死從之不能守節為社神所責心痛而絶人鬼異路因下泣矜之也蔡雍陳留東昏庫上里社碑曰惟斯庫上里古陽武之戶牖鄉也秦時有池子華為丞相漢興陳平由此社宰遂相高祖剋定天下為右丞相孝平之世虞延為太尉延喜中平曾孫放為尚書令以宰相繼踵咸出斯里雖有積德修身之政亦斯社所相乃樹碑頌云魏公九鍚文曰鍚君玄土苴以白茅爰契爾龜用建冢社注言亦如天子社稷也曹植讚社文曰余前封鄄城侯轉雍丘皆遇荒土宅宇初造以府庫尚豐志在繕宮室務園圃而已農桑一所無營經離十載塊然守空飢寒備嘗聖朝愍之故封此縣田則一州之膏𦚤桑則天下之甲第故封此桑以為田社乃作頌云應璩與陰夏書曰從田來見南野之中有徒步之士怪而問之乃知郎君頃有微痾告祠社神將以祈福聞之悵然以增歎息靈社高樹能有靈應哉張華朽社賦曰高柏橋南大道傍有古社槐樹蓋數百年木也余少居近之後去行路過之則已朽株意有緬然聊為之言衰盛之理殷仲堪合社文曰夫社之為祀遠哉故大夫以成群斯禱里社之興由來尚矣自喪亂流遷舊俗隳廢今二三宗親思桑梓之遺風遵先聖之明誥潔齊牲牢庶乎自祐以來一日之澤然三人之行必有其師故復選中正立三老者惟公理以御衆稽舊章以作憲卞敬宗櫟社序讚曰余門前有一社樹盤根疏柯似非近世所植抗秀路左流蔭庭宇莊周喻道於商丘之木匠石辨才於曲轅之櫟由斯而觀固可以悟微矣王廙春可樂曰吉辰兮上戊明靈兮唯社百室兮必集祈祭兮樹下濯卯兮葅韭齧蒜了劈鮓縹醪兮浮蟻交觴兮並坐氣和兮體適心怡兮志可何承天社頌曰社實陰祇稷唯穀元率育萬類協贊乾坤先農禮記月令曰孟春乃擇元辰天子親載耒耜置之車右率公卿諸侯大夫躬耕籍田辰亥也謂郊後吉亥享先農於東郊先農神農也續漢書祭祀志曰光武即位於鄗為壇營於鄗之陽營神五星及中宮星雷公先農風伯雨師四海四瀆名山大川之屬漢舊儀曰春始東耕於籍田官祠先農先農即神農炎帝矣祠以一牢百官皆從大賜三輔二百里孝悌力田三老布帛漢名臣奏曰黃瓊上言先王制典籍田有曰司徒咸戒司空除壇先時五日有協風至即齊宮饗燕載耒誠重之也先農之禮所宜躬親以迎春和以致時風沈約宋書祭祀志曰元嘉二十一年帝親耕乃立先農壇於籍田高四丈為四出陛廣五尺外加埒方十丈車駕未到司空大司農率太祝及衆執事質明以一太牢祀祭祭器用社稷器祠畢頒餘胙於奉祠者舊典先農又都列於郊祭靈星周書作雒曰設兆于南郊以祀上帝配以后稷農星先王皆與食毛詩閔豫曰絲衣繹賓尸也高子曰靈星之尸也繹又祭也天子諸侯曰繹以祭之明曰卿大夫曰賓尸與祭同周曰繹商曰彤也漢書郊祀志曰高祖時或言周興而邰立后稷之祠至今血食天子於是制詔御史其令天下立靈星祠張晏曰龍星左角曰天田則農祥也星見而祭之常歲時祀以牢三輔舊事曰漢靈星祠在長安城東十里淮南子曰君人之道其猶靈星之尸儼然默端而受福也嵩高山記曰漢孝武遊登五嶽尊事靈星遂移祠置嶽南腳上築作殿壇周回立瓦屋行種松柏前五百步臨大道立兩石闕極高大
