body:
  text: 獸部五馬一說文曰馬怒也武也馬一歲曰馵音環二歲曰駒三歲曰駣音兆八歲曰𩡩音八高六尺曰驕七尺曰騋音來八尺曰龍騊音陶駼音途北野之良馬也驁駿馬也以壬申日死乘馬者忌之爾雅曰騊駼馬野馬北海內有獸狀如馬名騊駼青色騊駼一名野馬昆蹄趼善升甗甗山形似甑上大下小時有昆蹄之馬蹄平如研善升甗甗山嶺也研音吟燕切甗音魚健切昆賖枝蹄研善升甗小領盜驪盜驪千里馬也領頃也昆駼之馬枝蹄如牛而下平小領馬種一名盜驪絶有力駥馬高八尺膝上皆白馵馵後左腳白音注也四骹音敲皆白驓骹膝下也四蹢皆白首俗呼為踏雲馬蹢蹄也前足皆白騱下雞切後足皆白翑巨俱切前右足曰啓左傳曰啓服也左白踦後右足白驤左白馵音注騮音流馬白腹騵魚袁切驪馬白跨驈驪黑色跨髀間白州驠州竅於見切尾本白騴尾抹白也尾白駺音郎馰顙白顛載星馬也白達素懸素鼻莖也俗所謂漫臚徹齒面顙皆白惟駹顙額回毛在膺宜乘樊光曰俗謂之宮府馬伯樂相馬法旋毛在腹下如乳者千里馬也在肘後減陽在翰茀方幹脅在背闋廣皆別旋毛所在之名逆毛居馻馬毛逆刺騋音來牝驪牡馬七尺已上為騋玄駒裊驂玄駒小馬別名裊驂耳或曰此即騕裊古之良馬牡曰騭今江東呼駮馬為騭牝曰騇草馬名也騮白駁黃白騜詩云騜駮其馬騮馬黃脊騝奇連切驪馬黃脊騽青驪駽今之鐵驄青驪驎驒色有淺深斑駮隱驎今連錢驄也青驪繁鬣騥驪白雜毛鴇今之烏驄黃白雜毛駓今之桃花馬陰白雜毛駰陰淺黑今之泥驄也蒼白雜毛騅彤白雜毛騢彤赤也今之赭白馬白馬黑鬣駱白馬黑脣駩七全切黑喙騧一目白瞷音間二目白魚似魚眼也既差我馬宗廟齊毫尚純也戎事齊力田獵齊足周易說卦曰乾為馬又坤卦彖曰牝馬地類行地無疆又說卦曰震其於馬也為善鳴為馵音注足為作足為的顙又曰乾為良馬為老馬為瘠馬為駁馬又屯卦曰六四乘馬般如匪寇婚媾往吉無不利又下繫曰服牛乘馬引重致遠以利天下蓋取諸隨又曰坤元亨利牝馬之貞王弼文言注曰以龍敘乾以馬明坤隨事義而取象也禮記月令曰孟春之月天子駕蒼龍孟夏之月天子駕赤騮孟秋之月天子駕白駱孟冬之月天子駕鐵驪又學記曰始駕馬反之車在馬前又內則曰馬黑脊而般臂漏漏當為螻如螻蛄奧也又曰大夫士卒下公門式路馬乘路馬必朝服步路馬必中道蹙路馬芻有誅路馬死埋之以帷詩國風卷耳曰陟彼崔嵬我馬虺隤又曰陟彼高岡我馬玄黃虺隤玄黃皆病又魯頌曰駉頌僖公也僖公能遵伯禽之法務農重穀牧于坰野而史克作是頌史克魯人也駉駉牡馬在坰之野駉駉哀馬也坰遠野也薄言駉者有驈有皇有驪有黃以車彭彭驪馬白跨曰驈黃白曰皇純黑曰驪黃騂曰黃彭彭有容力也駉駉牡馬在坰之野薄言駉者有騅有駓有騂有騏以車伾伾倉白雜毛曰騅黃白雜毛曰駓赤黃曰騂倉祺曰騏伾伾有力也駉駉牡馬在坰之野薄言駉者有驒有駱有騮有雒以車繹繹青驪驎曰驒白馬黑鬣曰駱赤身黑鬣曰騮黑身白鬣曰駱繹繹善走也駉駉牡馬在坰之野薄言駉者有駰有騢有驔有魚以車祛祛陰白雜毛曰駰彤白雜毛曰駰豪骭曰驔二目白曰魚祛祛彊健也又曰叔于田乘乘馬執轡如組兩驂如舞叔于田乘乘黃四馬皆黃兩服上襄兩驂鴈行又白駒曰皎皎白駒食我場藿縶之維之以永今夕皎皎白駒在彼空谷空大生芻一束其人如玉左傳僖十五年曰秦晉戰于韓晉惠公乘小駟鄭入也鄭獻馬名小駟慶鄭曰古者大事必乘其産生其水土而知其人心安其教訓而服習其道唯所納之無不如志今乘異産以從戎事及懼而變將與人易亂氣狡憤陰血周作張脈僨興外疆中乾進退不可周旋不能君必悔之弗聽及戰公戎馬旋濘而止公號慶鄭鄭曰愎諫違卜固敗是求遂去之又曰晉侯伐齊齊師夜遁邢伯告中行伯曰有班馬之聲夜遁馬不相見故鳴斑別也齊師其遁又昭四年傳曰魯使椒舉如晉求諸侯晉侯欲勿許司馬侯曰不可公曰晉有三不殆其何敵之有國險而多馬齊楚多難有是三者何鄉而不濟對曰恃險與馬而虞鄰國之難是三殆也四嶽三塗陽城大室荊山中南九州之險也是不一姓冀之北土馬之所生無興國焉恃險與馬不可以為固也又宣上曰宋人以文馬百駟以贖華元於鄭半入華元逃歸又昭七年曰衛侯來獻其乘馬曰啓服啓服馬名塹而死墮塹死也公將為之櫝為作棺也子家曰從者病矣請以食之乃以帷裹之又定三年曰唐成公如楚有雨肅爽馬子常欲之成公唐惠侯之後肅爽駿馬名弗與三年止之唐人或相與謀請代先從者許之飲先從者酒醉之竊馬而獻之子常子常歸唐侯自拘於司敗竊馬者自拘曰君以弄馬之故隱君身隱懮約也棄國家群臣請相夫人以償馬必如之相助也夫人謂養馬者唐侯曰寡人之過也二三子無辱皆賞之又定下曰衛公子地有白馬四公嬖向魋向魋欲之向魋司馬桓魋公取而朱其尾鬣以與之與桓魋也地怒使其徒扶魋而奪之魋懼將走公閉門而泣之目盡腫穀梁傳僖公曰晉獻公將伐虢荀息請以屈産之乘垂棘之璧假道於虞公曰此晉寶也荀息曰是取中府藏外府取中廄藏外廄也後舉虞荀息牽馬操璧而前曰璧猶是馬齒長矣周禮夏官下曰校人掌王馬之政政謂差擇養乘之數也月令曰班馬政辨六馬之屬種馬一物戎馬一物齊馬一物道馬一物田馬一物駑馬一物種謂上善似母者以次差之玉路駕種馬戎路駕戎馬金路駕齊馬象路駕道馬田路駕田馬駕馬給宮中之役天子十有二間馬六種邦國六間馬四種家四間馬二種降殺之差每廄為一間諸侯有齊馬道馬田馬大夫有田馬各一間其駑馬則皆分為三焉凡馬特居四之一欲其乘之性相似也物同氣則心一鄭司農云四之一者三牝一牡春祭馬祖執駒馬祖天駟也孝經說云房為龍馬鄭司農云執駒無令近母猶攻駒也二歲曰駒三歲曰駣玄謂執猶拘也春通淫之時駒弱血氣未定為其乘正傷也夏祭先牧頒馬攻特先牧始養馬者其人未聞夏通淫之後攻其特為其蹄齧不可乘用鄭司農云攻特謂騬之秋祭馬社臧僕馬社始乘馬者世本作曰相士作乘馬鄭司農云臧僕謂簡練馭者令皆善也玄謂僕馭五路之僕冬祭馬步獻馬講馭夫馬步神為災害馬者獻馬見成馬於王也馭夫馭二車從車使車者也講猶簡習凡大祭祀朝覲會同毛馬而頒之毛馬齊其色也頒授當乘之飾幣馬執朴而從之鄭司農云校人主飾之也幣馬以馬遺人當幣處者也聘禮曰馬則北面奠幣于其前士喪禮下篇曰薦馬纓三就入門北面交轡圉人夾牽之馭者執策立于馬後凡賓客受其幣馬賓客之幣馬來朝聘而享王者大喪飾遣車之馬及葬埋之言埋之則是馬塗車之芻靈田獵則師驅逆之師猶將也凡將事于四海山川則飾黃駒四海猶四方也王巡守過大山川則有殺駒以祈沈禮與王人職有宗祀以黃金勺前馬之禮凡國之使者共其幣馬使者所用私覿凡軍事物馬而頒之物色齊其力又夏官下曰趣馬掌贊正良馬而齊其飲食簡其六節贊佐也佐正者謂校人臧僕講馭夫之時簡差也節猶量也差擇王馬以為六等掌駕說之頒用馬之第次辨四時之居治之聽馭夫居謂牧庌所處治謂執駒攻轉之屬巫馬掌養疾馬而乘治之相醫而樂攻馬疾受財于校人乘謂驅步以發其疾知所疾處乃治之相助也馬死則使其賈粥之入其布于校人布泉也鄭司農云賈謂其屬官小吏賈二人粥賣也又曰廋人掌十有二間之政教以阜馬佚特教駣攻駒及祭馬祖祭間之先牧及執駒散馬耳圉馬九者皆有政教焉阜盛牡也詩云四牡孔阜杜子春云佚當為逸鄭司農云馬三歲曰駣二歲曰駒散讀為中散大夫之散謂聒馬耳母令善驚也玄謂逸者用之不散甚勞安其血氣也教駣始乘習之也攻駒騬其蹄齧者間之先牧先牧制間者散馬耳以竹括甲其耳頭動搖則括中物後遂串習不復驚正校人員選校人謂師圉也正員選者選擇可備員者平之馬八尺以上為龍七尺以上為騋六尺以上為馬大小異名爾雅曰騋牝驪牝玄駒裊驂鄭司農說以月令曰駕蒼龍又曰圉師掌教圉人養馬春除蓐釁廄始牧夏庌馬冬獻馬射則充椹質茨牆則翦闔蓐馬茲也馬既出而除之新釁焉神之也春秋傳曰凡馬日中而出日中而入故字庌為訝鄭司農云當為庌玄謂庌廡也廡所以庇馬涼也充猶居也茨蓋也闔苫也椹質翦闔圉人所習也杜子春讀椹為齊人言鈇椹之椹椹質所射者習射處圉人掌養馬芻牧之事以役圉師役者圉師使令焉凡賓客喪紀牽馬而入陳賓客之馬王所以賜之者詩云雖無子之路車乘馬喪紀之馬啓後所薦焉廞馬亦如之廞馬遣車之馬人捧之赤牽而入陳又夏官上曰馬質掌質馬馬量三物一曰戎馬二曰田馬三曰駑馬皆有物賈此三馬買以給官府之使無種也鄭司農曰皆有物賈皆有物色及賈直網惡馬鄭司農云網讀為以亢其讎之亢書亦或為亢亢御也禁也禁去惡馬不畜也玄謂網以縻索維網狎習之凡受馬於有司者書以齒毛與其賈馬死則旬之內更旬之外入馬耳以其物更外其否鄭司農云更謂償也玄謂旬之內死者償以齒毛與賈受之日淺養之惡也旬之外死入馬耳償以毛色不以齒賈任之過其任也其外否旬之外踰二十日而死不任用非用者罪馬及行則以任齊其行識其所載輕重及道里齊其勞逸乃復用之若有馬訟則聽之訟謂賣買之言相負禁原蠶者原再也天文辰為馬蠶書蠶為龍精月直大火則浴其種是蠶與馬同氣物莫能兩大禁再蠶者為傷馬與論語曰齊景公有馬千駟死之日民無德而稱焉又憲問曰驥不稱其力稱其德也驥古之善馬也德謂在五御之威儀周書曰其西天子車立馬乘六青馬陰羽鳧旌鳧羽為旌旄也周公旦主東青馬黑鬣謂之母兒周公主東則太公主西也東青馬則西白矣馬名未聞也又曰義渠以茲白茲白者白馬倨齒食虎豹義渠西戎茲白一名駿也韓詩外傳曰昔者田子方出見老馬於道喟然有志問於御者曰此何馬也御者曰公家畜也罷而不為用故出放之田子方曰少盡其力老棄其身仁者不為也束帛而贖之窮士聞之知所歸心焉尚書大傳曰散宜生之犬戎氏取美馬驄身朱髦雞目者取九六焉陳於紂之庭紂出見之還而觀之曰此何人也散宜生遂趨而進曰吾西蕃之臣昌之使者太公六韜曰商王拘周伯昌於羑里太公與散宜生金十鎰求天下珍物以免君之罪於是得犬戎氏文馬毫毛朱鬣目如黃金項如雞尾名雞斯之乘以獻商王禮斗威儀曰君乘火而王其政頌平南海輸駮馬春秋考異郵曰陰合於八八合陽九八九七十二二為地地主月月精為馬月數十二故馬十二月而生人乘以理天下王者駕馬故其字以為王馬春秋說題辭曰地精為馬十二月而生應陰紀陽以合功故人駕馬任重致遠利天下月度疾故馬善走淮南子曰八九七十二耦以乘奇奇主辰辰主月月主馬馬十二月而生孝經援神契曰德至山陵則澤出神馬龍魚河圖曰白馬玄頭食之殺人下病食馬肉亦殺人無以賣馬錢娶婦洞林曰殷鴻業來作卦身在申本命酉乘馬南行西北走徑趨木家化為狗賴子救之不成咎鴻業丁酉生後八月中有急事借馬南出行數里馬欻驚更西北走向戌地入李家遂落地馬因齧之主人出救得免不見傷也尚書中候曰堯沉璧於河龍馬銜甲赤文緑色臨壇吐甲圖鄭玄曰龍象馬也赤文而緑色廣雅曰飛兔飛鴻野麋娥鹿騶吾走狐桃𩧋音黎金喙馬屬也方言曰馬食橐關西曰掩囊掩音鵪或曰掩兜或曰樓兜字林曰驫方問切衆馬走也𩥇知扇切馬臥土中也䩥音但馬帶也鞚馬勒也鞚口貢切
