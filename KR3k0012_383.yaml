body:
  text: 人事部二十三醜丈夫釋名曰醜臭也如臭穢也說文曰音𧈪酉反可惡也又曰丈十尺也從手而持十也又曰夫從一大象人形也一象簪形冠而既簪人二十而冠成人也故成人曰丈夫尚書曰洪範六極五曰惡孔安國曰醜陋也毛詩曰不見子都乃見狂且注曰狂且犯醜之人左傳曰賈大夫貌惡娶妻而美三年不言不笑御以如皋射雉獲之其妻始笑又曰叔向適鄭鬷蔑惡惡醜貌也欲觀叔向從使之收器者而往立於堂下一言而善叔向將飲酒聞之曰必鬷明也下執其手以上曰昔賈大夫惡娶妻三年不言不笑如皋射雉獲之其妻始笑而言賈大夫曰才之不可以已我之不能射汝遂不言不笑夫今子少不揚言醜貌不發揚子若無言吾幾失子又曰宋華元為植巡功植將主也城者曰睅其目皤其腹睅出目皤大腹廣雅曰仳倠媒婄儓𧟱䫪䫂噅睢頦鶻䫏醜丑也仳鼻之切倠火遺切始音倍儓音臺𧟱蒲比反䫪差丈切䫂丁可切為許為切睢音佳頦古來切鶻音骨䫏音欺家語曰高柴字子羔長不滿六尺狀貌甚惡為人篤孝知名孔氏之門仕為郕宰又曰耗土之人醜史記曰秦相蔡澤魋顏蹙頞頞鼻莖也又曰淡臺滅明字子羽狀貌甚惡欲事孔子孔子以為材薄既而受業退而修行行不由徑非公事不見卿大夫南遊至江弟子三百人從之設取子去就名施乎諸侯孔子聞之曰吾以言取人失之宰子以貌取人失之子羽漢書曰田蚡孝景帝皇后同母弟也辨有口學盤盂諸書為人貌寢而貴又曰詔求能為韓詩者蔡義召見悅之擢為光祿大夫代楊敞為相時年八十餘短小無鬢眉貌似老嫗行步僂傴常吏挾乃行又曰張良貌若婦人范曄後漢書曰周舉字宣光汝南人也姿貌短陋而博學東觀漢記曰永平中徵承宮為博士遷左中郎數納忠諫論議切直名播胸奴時單于遣使求欲得見宮詔勑宮自整飾宮對曰夷狄炫名非識實也臣狀醜不可以示遠宜選長大威容者帝乃以大鴻臚魏應代之魏志曰管輅容貌醜無威儀言語不擇非類又曰王粲字仲宣山陽高平人也年十七往荊州依劉表表以粲貌寢而體通脫不甚重也晉書曰孫秀尚河東公主形陋短小奴僕之下者也又曰左思貌醜而口訥又曰張孟陽每出人惡之輒擲瓦礫盈車王隱晉書曰劉伶字伯倫長六尺貌甚醜悴常攜一壺酒使人荷鍤自隨以為死便埋也孫嚴宋書曰桓護之字彥宗少倜儻不拘小節形狀短陋而氣幹強果又曰少帝幼而狷急輕脫嶮迅細形黃貌色長頸鳥喙嘶聲齊書曰張融形貌短醜精神清徹王敬則見融革帶寬謂曰革帶太急融曰既非步吏急帶何為又曰蕭坦之肥黑無鬢語聲嘶時人號為蕭啞剛佷專執群小畏而憎之崔鴻十六國春秋前趙録曰郭汜字子游上郡人也父士為縣卒隨巫而遇一女子於路巫曰此女生貴子君亦有貴子可相納之當興君門士納之生汜長不滿七尺醜極當時朴訥無慧後為縣卒感憤遊學師事安平趙孔曜曜見而偉之曰此生有公骨其當貴達又曰前秦録曰符雄字元才趙建武中拜龍驤將軍貌醜頭大而足短故軍稱為大頭龍驤又曰徐成純直亮素為王猛所知長不滿六尺醜極當時車頻秦書曰符堅六歲戲於路司隸徐統見而異焉而問曰符郎此官街小兒戲不畏縛耶答曰吏縛犯事者不縛小兒戲統語左右曰此兒有王霸相左右曰此兒狀貌甚醜而君以為相貴異何也曰非爾等所知也南史曰劉韞人材凡鄙為明帝所寵在湘州雍州使善畫者圖其形出行鹵簿羽儀常自披玩嘗以圖示征西將軍蔡興宗戲之陽若不解畫者指韞形問之曰此何人韞曰是我其庸底類如此耶北史曰後魏廣陵侯衍弟欽中書監尚書右僕射儀同三司欽色尤黑故時人號為黑面僕射唐書曰李輔國本名靜忠短小貌陋頗知書計高力士見之收在左右與諸奴為伍年四十餘矣為小宦掌廄中文帳後遷至封成國公也又曰蘇世長容貌醜陋頗有學識性滑稽言雜諧調隋大業中為都水使者煬帝嘗謂之曰卿面何類駏驢世長再拜叫呼以手據地蹙項敗面為駏驢之狀群臣掩口而笑煬帝大悅賜帛百匹又曰貞觀十年文德皇帝崩百官縗絰率更令歐陽詢狀貌醜異衆或指之許敬宗見而大笑為御史所劾左授洪州都督周史曰慕容彥超吐渾部人也父亮以彥超貴纍贈至三師彥超即漢高祖之同産弟也嘗冒姓閻氏體黑面胡故謂之閻崑崙莊子曰厲人夜半生子其父取火視之恐其似己也厲人醜人也又曰魯哀公問仲尼衛有惡人焉曰哀駘他大夫之與處者思不能去也婦人之請於父母曰與為人妻寧為夫子妾者十數而未止也是必有以異乎人也寡人召而觀之果以惡駭天下又曰支離疏者頤隱於臍肩高於頂會撮指天五管在上兩髀為脅也孫卿子曰衛靈公有臣曰公孫呂身長七尺面長三尺而廣三寸名動天下孔叢子曰子高見齊王齊王問誰可為臨淄宰稱管穆焉王曰管穆容貌陋民不敬他答曰夫見敬在德且臣所稱其能也君不聞晏子乎長不滿六尺面狀醜惡齊王上下莫不崇焉以穆體形方之猶賢之遠矣王乃以管穆為臨淄宰也尸子曰禹長頸鳥喙面目顏色亦惡矣天下猶獨賢之呂氏春秋曰陳有惡人曰敦洽犨麋椎顙色如漆也又曰列精子高德行於齊涽王所敬著布衣白縞冠會朝步堂下謂侍者曰我好醜何如侍者曰公艷出而窺井歎曰惡丈夫也人之阿齊王實不良而言良亦其我之侍者也周斐汝南先賢傳曰周燮字彥祖斂頤折頞貌甚醜母欲不舉其父曰吾聞諸聖賢人狀皆有異於人興我宗者必此兒遂育之梁冀別傳曰子嗣為河南尹嗣一名胡狗時年十六容貌甚陋不勝冠帶道路見者莫不嗤笑焉司馬徽別傳曰劉綜欲候徽先使左右問其存亡徽鋤園左右問馬君所在徽曰我是徽頭面醜陋問者罵之曰即欲求司馬公何等田奴而稱徽更刷頭飾服而出左右叩頭而謝之續搜神記曰桓大司馬從南州來拜簡文皇帝陵問左右商涓形貌有人答涓為肥短黑色形甚醜公云吾見之亦如此意惡之還州遂病無幾而薨謝綽宋拾遺記曰何尚之顏延年少年好為嘲調二人並短小常謂顏公為猴顏亦以何為猴常共遊戲西池顏問路人云二人誰似猴路人指何曰彼似猴耳君乃真獼也東晳發蒙記曰醜男鬷蔑醜女鍾離春世說曰王廣娶諸葛誕女入室言語始交王語婦曰神色卑下殊不似公休婦曰犬丈夫令婦人比蹤人英傑崔駰博徒論曰博徒見農夫戴笠持耨以藝蓼荼面目驪黑手足胼肱膚如桑朴足如熊蹄蒲伏壟敏汗出調泥乃謂曰子觸熱耕藝背上生鹽脛如燒椽皮如領革錐不能穿行步狼跋腳戾脛酸謂子草木支體屈伸謂子禽獸形容似人何受命之薄稟性不純桓談新論曰余嘗與郎泠喜出見一老翁糞上拾食頭面垢醜不可忍視喜曰安知此非神仙余曰道必形體如此無以道焉風俗通曰齊有一女二家求之其家語其女曰汝欲東家則左袒欲西家則右袒其女兩袒父母問其故對曰願東家食而西家息以東家富而醜西家貧而美也新序曰齊有田巴先生者行修於外王聞其賢聘之將問政焉田巴先生改製新衣拂飾冠帶顧謂其妾妾曰佼將出門問其從者從者曰佼過於淄水自照視醜惡甚焉遂見齊王齊王問政對曰今者大王召臣臣問妾妾愛臣諛臣曰佼問從者從者畏臣諛臣曰佼臣至臨淄水而觀然後知醜惡也今王察之齊國治矣會稽録曰任奕字安和句章人也為人貌寢無威儀劉諡之龐郎賦曰其頭也則中觡而上下鋭額平而承枕四起繁欽三胡賦曰莎車之胡黃目深精員耳狹頤康居之胡焦頭折頞高輔陷無眼無黑眸頰無餘肉罽賓之胡面象炙蝟頂如持囊隈目赤眥洞頞卬鼻朱彥時黑兒賦曰世有非常人實惟彼玄士稟茲至緇色內外皆相似臥如驪牛𩥇立如烏牛跱忿如鸜鵒鬭樂似鸕鷀喜醜婦人周易曰老婦士夫亦可醜也韓詩外傳曰齊王厚送女欲妻屠門肚肚辭以疾其友勸之曰子孫死腥臭之肆而已乎何以辭之肚應曰其女醜其友曰何謂也肚曰吾肉善如量而去苦少耳吾肉不善雖以他附益之尚猶不讎今厚送子子醜故耳其友下問女果醜目如劈杏齒如編蟹東觀漢記曰梁鴻同郡孟氏其女名光狀貌醜而黑力能舉石臼擇而不嫁至年三十鴻聞而聘之王隱晉書曰武帝為太子納妃謀久不決上欲娶衛瓘女楊后欲娶賈充女上曰衛公女有五可賈公女有五不可衛家種賢而多子端正而長白賈家種妒而少子醜而短黑也唐書曰張萬福典泗州時遇德宗幸奉天李希烈反陳少遊悉令管內刺史送妻子楊州以為質萬福獨不肯送謂使者曰為某白相公萬福妻老且醜不足煩相公意獨不送又曰中宗好與朝臣狎戲韋庶人微時有一乳母實蠻婢也既老且醜齒髮禿落制於後宮刻列花燭嫁為御史大夫竇懷貞妻俗謂乳母之壻曰阿遮懷貞每進表狀列其官位必曰國遮欣然有自負之色莊子曰陽子之宋宿於逆旅逆旅人有妾二人其一人美其一人惡惡者貴而美者賤陽子問其故逆旅小子對曰美者自美吾不知其美也陽子曰弟子記之行賢而去自賢之行何往而不受哉郭子曰許充婦是阮德如妹甚醜交禮竟許永無復入理桓範勸之曰阮嫁醜女與卿故當有意宜察之許便入見婦即出提裙裾停之許謂婦曰婦有四德卿有幾答新婦所之唯容士有百行君有其幾許曰皆備婦曰君好色不好德何謂皆備許有慚色遂雅相重劉向列女傳曰齊孤逐女者其狀甚醜三逐於鄉五逐於里過時無所容乃造襄王之門而求見王輟食而起謹敬左右曰三逐於鄉者不忠五逐於里者少禮何足為遽王曰子不識也夫牛鳴而馬不應者異類故此人必有異者遂見與之語而嘉之又曰齊宿瘤者東都採桑之女閔王之后也閔王宣王子也項有大瘤故號曰宿瘤初閔王遊至東百姓盡觀宿瘤女採桑如故王召問曰寡人出遊車騎甚衆百姓無長少棄事來觀汝不視何也對曰妾受父母教採桑不受教觀大王王曰此女也惜其宿瘤女曰中心何謂宿瘤何傷王大悅曰此賢女也命後車載之女曰不受父母之教而隨大王是奔女也王大慚曰寡人失之貞女一禮不備雖死不從及歸遣使奉禮加金百鎰娉迎之父母驚惶欲洗沐為衣裳女曰變容更服恐見不識於是如故隨使者閔王歸見諸夫人告曰今日出遊得一聖女及至諸夫人見者皆大笑王曰未飭耳飭與不飭相去十百女曰飭與不飭相去千萬不足言何獨十百也王曰何以對曰昔者堯舜桀紂俱為天子堯舜安於節儉茅茨不剪採椽不斫後宮衣不曳地食不重味至今數千歲天下歸善桀紂不自飭仁義為高臺榭深池澤後宮蹈綺縠弄珠玉身死國亡為天下笑至今千餘歲天下歸惡由是觀之飭與不飭相去千萬閔王大感立以為后朞月之間化行鄰國諸侯朝之侵三晉懼秦楚立帝號及女死燕遂屠齊又曰齊鍾離春者齊無鹽邑之女鍾離姓春名也其為人極醜醜無雙曰頭深目長壯大節卬鼻結喉頂上少髮折腰出胸皮膚若漆行年三十無所容入行嫁不售流棄莫執於是乃拂拭短褐自詣宣王願乞一見謁者曰晏齊之不售女也聞大王之聖願備後宮之掃除頓首司馬門外謁者以聞宣王方置酒於漸臺左右聞之莫不掩口而笑王曰此天下強顏女子也乃召見之謂曰昔先王為寡人娶妃匹皆以備有列位者今夫人不容鄉里布衣而欲千萬乘之主有何異乎鍾離春曰竊慕大王之美義耳王曰然何善曰嘗隱善王曰試一行之言未卒忽不見王大驚立發隱書而讀之久不能解明日復召之但揚目御齒舉手拊膝曰殆哉如此者四矣王曰願聞命對曰今大王之國西有橫秦之患南有強楚之讟外有二國之難內藂奸臣衆人不附春秋四十年壯男不立故不務衆子而務衆婦尊所好而忽所恃一旦山陵崩墜社稷不定此一殆也漸臺五層黃金白玉琅玕翡翠萬人疲極比二殆也賢者伏匿於山林諂諛強行於左右耶僞立於本朝不得通入此三殆也酒漿流湎以夜繼晝女樂俳優縱橫大笑外不修諸侯之禮內不康國家之理此四殆也王暗然無聲喟然而歎曰痛乎無鹽君之言於是立壞漸臺罷女樂退諂諛去雕琢選兵馬實府庫闢四門招進直言卜擇吉日立太子拜無鹽君以為王后齊國大安皆醜女之力也習鑿齒襄陽記曰黃承産沔南名士也謂諸葛孔明曰君擇婦否有醜女黃頭黑色而才堪相配孔明許焉即載送之時人為笑樂鄉里為之嗟曰莫作孔明擇婦正得河外醜女束晢發蒙記曰醜男鬷蔑醜女鍾離春通俗文曰不媚曰㜅音畜可惡曰嬒烏會反大醜曰㚠呼交反醜稱曰娭烏在反何承天纂曰嫫母醜人也楚辭曰西施媞媞而不得見兮嫫母勃屑曰侍而又曰圭璋雜於甑室隴廉與孟陬同宮舉世以為常俗固將愁苦而終窮劉思真醜婦賦曰才質陋且儉姿容劇嫫母鹿頭獼猴面椎額復出口折頞靨樓鼻兩眼䫜一交切如臼膚如老桑皮耳如側兩手宋玉登徒子好色賦曰登徒子妻蓬頭攣耳攣牛善反齞牛美反脣歷齒旁行傴僂又疥且痔
