body:
  text: 皇王部三十九唐憲宗章武皇帝唐書曰憲宗章武皇帝諱純順宗長子母曰莊憲皇后大曆十三年生於長安之東宮內六七歲時德宗抱置膝上問曰汝誰子在吾懷對曰是第三天子德宗異之貞元四年六月封廣陵王順宗即位之年四月册為皇太子八月乙巳即皇帝位於宣政殿先是連月霖雨是日晴霽人情欣悅丁未始御紫宸殿對百僚庚戍詔曰朕以寡昧纂丕洪業永思理本所寶惟賢至如嘉禾神芝奇禽異獸蓋王化之虛美也所以光武形於詔令春秋不書祥瑞朕誠德薄思及前人自今已後所有祥瑞有司不得上聞其珍禽奇獸亦宜停進冬十月壬申貶中書侍郎同中書門下平章事韋執誼為崖州司馬以交王叔文也元和元年春正月景寅朔皇帝率群臣於興慶宮奉上太上皇尊號丁卯御含元殿受朝賀禮畢御丹鳳樓大赦天下改元癸未詔以太上皇舊恙愆和親侍藥膳權不聽政以高崇文檢校工部尚書充神策行宮節度使甲申太上皇崩乙酉宰相杜佑攝冢宰戍子制曰劍南西川疆界素定藩鎮守備各有區分頃因元臣薨謝鄰藩不睦劉闢乃因虛構隙以忿結讎遂勞三軍兼害百姓朕志存含垢務欲安人遣使宣諭委之旄鉞如聞道路擁塞未息干戈輕肆攻圍擬圖吞併為君之體義在勝殘命將興師蓋非獲已宜令興元嚴礪東川李康掎音巳角應接神策行營節度使高崇文神策兵馬使李元奕率步騎之師與東州興元之師類會進討甲午高崇文由斜谷路李元奕由谷路俱會幹梓潼關辛卯群臣請聽政戊戍上謂宰臣曰前代帝王或怠於聽政或躬覽繁務其道何如杜黃裳對曰帝王之務在於修己簡易擇賢委任不宜怠肆安逸然事有綱領小大常務其遠者大者至如簿書獄訟百吏能否本非人主所自任也但擇人委任責其成效賞罰必信誰不盡心傳稱帝舜之德曰夫何為哉恭己正南面而已誠以能舉十六相去四凶也豈與勞神疲體自任耳目之主同年而語哉但人主常勢患在不能推誠人臣之弊患在不能自竭由是上疑下詐禮貌或虧欲求致理自然難致茍無此弊何患不至於理上稱善久之五月辛卯册太上皇后王氏為皇太后九月辛亥高崇文奏收成都擒劉闢以獻癸丑以山人李渤為左拾遺徵不至二年春正月上親朝獻太清宮御丹鳳樓大赦天下己酉以戶部侍郎武元衡為門下侍郎同平章事以中書舍人翰林學士李吉甫為中書侍郎同平章事二月庚午司天造新曆成詔題為元和觀象曆九月庚申李錡據潤州反殺判官王淡大將趙琦遂令蘇常杭湖睦五州戍將殺刺史修石頭故城欲謀僣逆癸酉潤州大將張子良李奉仙等執李錡以獻十一月斬錡詔削屬籍十二月景辰上謂宰臣曰朕覽國書見文皇帝行事少有過差諫臣論諍往復數日況朕之寡昧涉道未明今後事或未當卿當每事十論不可一二而止己卯史官李吉甫撰元和國計簿揔計天下方鎮凡四十八管州府二百九十五縣一千四百五十三戶二百四十四萬二百五十四其鳳翔鄜坊邠寧振武涇原銀夏靈鹽河東易定魏博鎮冀范陽滄景淮西淄青十五道凡七十一州不申戶口每歲賊入倚辦止於浙江東西宣歙淮南江西鄂嶽福建湖南等八道合四十九州一百四十四萬戶比量天寶供稅之戶則四分有一天下兵戎仰給縣官者八十三萬餘人比量天寶士馬則三分加一率以兩戶資一兵其他水旱所損徵科發斂又在常役之外是歲吐蕃回紇奚契丹渤海牂牁上音藏下音哥南詔並朝貢三年春正月癸巳群臣上尊號曰睿聖文武皇帝御宣政殿受册禮畢御丹鳳樓大赦天下庚子涇原假祐請修臨涇城在涇州北九十里扼犬戎之衝要詔從之四年秋七月御製前代君臣事迹十四篇書於六扇屏風是月出書屏以示宰臣丁未渭南暴水壞廬舍二百餘戶口溺死六百人命府司賑給八月安南都護張舟奏破壞王國三萬餘人獲戰象兵械并王子五十九人十月册鄧王寧為皇太子癸巳以册儲肆赦繫囚死罪降從流已下遞減等工部侍郎歸登給事中呂元膺為皇太子諸王侍讀五年八月乙亥上謂宰臣曰神仙之事信乎李藩對曰神仙之説出於道家道家所宗老子五千文為本老子指歸與六經無異前代好怪之流假託老子為神仙之説故秦始皇遣方士載童女入海求仙藥漢武帝嫁女與方士求不死藥二主受惑卒無所得文皇帝服胡僧長生藥遂致暴疾不救古詩云服食求神仙多為藥所誤誠哉是言也君人者但務求理四海樂推社稷延永自然長年也上深然之六年十一月乙丑制以戶部侍郎李綘為中書侍郎同平章事十二月辛卯皇太子寧薨諡曰惠昭七年五月上謂宰臣曰卿言吳越去年水旱昨有御史自江淮回言不至為災人非甚困李綘對曰臣得兩浙淮南狀繼言歉旱方隅授任皆朝廷信重之臣御史非良或容希媚此正當姦佞之目況推誠之道君人大本任大臣以事不可以小臣言間之伏望明示御史姓名正之典刑上曰卿言是也朝廷大體以恤人為本一方不稔即宜賑救濟其飢寒況可疑之耶向者不思而有此問朕言過矣八年三月辛未上以久旱親於禁中祈雨是夜澍雨霑足六月景寅京師大風雨毀屋飄瓦人多壓死所在川瀆暴漲行人不通辛丑出宮人二百車任從所適以水災故也九年十月甲子制朕嗣膺寶位于茲十年每推至誠以御方夏庶以仁化臻於大和宵衣旰食意屬於此今淮西一道未達朝經擅自繼襲肆行寇掠將士等迫於受制非是本心思去三面之羅庶遵兩階之義宜以山南東道節度使嚴綬兼充申光蔡等州招撫使十年正月嚴綬帥師次蔡州界己亥制削奪吳元濟官爵六月鎮州節師度使王承宗遣盜夜伏於靖安坊刺宰相武元衡死之刺御史中丞裴度傷首而免十二年五月隨唐節度使李訴奏敗賊於吳房獲賊將李祐七月以裴度守門下侍郎同平章事充彰義軍節度申光蔡觀察處置等使仍充淮西宣慰使十月李訴率師入蔡州執吳元濟以獻淮西平十三年正月御含元殿受朝賀禮畢御丹鳳樓大赦天下七月詔削奪淄青節度使李師道官爵仍令宣武魏博義成等五鎮之師分路進討十二月上謂宰臣曰人臣事君但力行善事自致公望何乃好樹朋黨朕甚惡之裴度對曰君子小人未有無徒者君子之徒則同心同德小人之徒是朋是黨上曰他人之言亦與卿等相似豈易辨之哉度曰君子小人觀其所行當自區別矣上曰凡好事口説則易躬行則難卿等既言之須行之勿空言説度等謝曰陛下處分可謂至矣臣等敢不激厲然天下之人從陛下所行不從陛下所言臣等亦願陛下每言之則行之上頗欣納十四年春正月以東師宿野不受朝賀三月上謂宰臣曰聽受之間大是難事推誠選任所謂委寄必合盡心及至所行臨事不無偏黨朕臨御已來歲月斯久雖不明不敏然漸見物情每於行為務欲詳審比令學士集前代昧政之事為辨謗略每欲披閲以為鑒戒耳崔群對曰無情曲直辨之至易稍懷欺詐審之實難故孔子有衆好衆惡之論浸潤膚受之説蓋以曖昧難辨故也若擇賢而任之待之以誠糾之以法則人自歸公孰敢行偽陛下詳觀載籍以廣聰明實天下幸甚七月群臣上尊號曰元和聖文神武法天應道皇帝是日御宣政殿受册御丹鳳樓大赦天下八月上謂宰臣曰天下事重不可一日曠廢若遇連假不坐有事即詣延英請對崔群以殘暑方甚目同列將退上止之曰數日一見卿等時雖暑熱朕不為勞九月上謂宰相曰朕讀玄宗實録見開元初鋭意求理至十六年已後稍似懈倦開元末又不及中年何也崔群對曰玄宗少歷民間身經迍難故即位之初知民疾苦躬勤庶政加之姚崇宋璟蘇頲盧懷慎等守正之輔孜孜獻納故致治平及後承平日久安於逸樂漸遠端士而近小人宇文融以聚斂媚上心李林甫以姦邪惑上意加之以國忠故及於亂願陛下以開元初為法以天寶末為戒即社稷無疆之福也時皇甫鎛以諂刻欺蔽在相位故群因奏以諷之上服方士柳泌金丹藥起居舍人裴鄰上表切諫以金石含酷烈之性加燒鍊則火毒難制若金丹已成且令方士自服一年觀其效用則進御可也上怒貶鄰為江陵令十五年春正月甲戍朔上以餌金丹小不豫罷元會庚子夕上崩于大明宮之中和殿享年四十三諡曰聖神章武孝皇帝廟號憲宗葬于景陵穆宗文惠皇帝唐書曰穆宗文惠皇帝諱恆憲宗第三子也母曰懿安皇后郭氏貞元十一年七月生於大明宮之別殿初名宥封建安郡王元和七年十月册為皇太子改今諱十五年正月憲宗崩閏月景午即皇帝位於太極殿東序戊申上見群臣於紫宸門外辛亥以蕭俯假文昌為中書侍郎同平章事上始御延英對宰臣二月丁丑御丹鳳樓大赦天下壬寅勑舉賢良方正直言極諫科目人宜令中書門下尚書省四品已上於尚書省同試三月壬子召侍講學士韋處厚路隨於太液亭講毛詩關睢尚書洪範等篇既罷並賜緋九月辛丑大合樂於魚藻宮觀競渡又召李光訴李光顏入朝欲於重陽日宴群臣拾遺李班等上疏諫云元朔未改園陵尚新雖易月之期俯從人欲而三年之制猶服心喪夫遏密施禁蓋為齊人合樂內庭事將未可不聽十月鎮州王承元以所部四命請命以魏博節度等使田弘正為鎮州節度使以承元為滑州節度使長慶元年正月己亥朔上親薦獻太清宮太廟是日法駕赴南郊日抱珥宰臣賀於前辛丑祀昊天上帝於圓丘即日還宮御丹鳳樓大赦天下改元長慶內外文武及致仕官三品已上賜爵一級二月景子上觀親雜伎樂於麟德殿歡甚謂給事中丁公著曰比聞外間公卿士庶時為歡宴蓋時和民安甚慰豫心公著對曰誠有此事然臣之愚見風俗如此亦不足嘉百司庶務漸恐勞煩聖慮上曰何至於是對曰夫賓宴之禮務達誠敬不繼以淫故詩人美樂且有儀璘異屢舞前代名士良辰宴聚或清談賦詩投蠹雅歌雖以杯酌獻酬不至於亂國家自天寶已後風俗奢靡宴席以喧譁沉湎為樂而居重位秉大權者優雜倨肆於公吏之間曾無愧恥公私相效漸以成俗由是物務多廢獨聖心求理安得不勞宸慮乎陛下宜頒訓令禁其過差則天下幸甚時上荒于酒樂公著因對諷之頗深嘉納三月幽州劉總請分割地土入朝公卿皆疑獨上推誠納之以宣武節度使張引靖為幽州節度使以總為鄆州節度使秋七月壬子群臣上尊號曰文武孝德皇帝上受册於宣政殿禮畢御丹鳳樓大赦天下甲寅幽州監軍使奏軍亂囚節度使張弘靖於別館害判官韋雍張宗元崔仲卿鄭殞軍人取朱滔子洄為留後洄自以年老令軍人立其子克融為留後八月己巳鎮州監軍宋惟澄奏軍亂節度使田弘正并家屬將佐三百餘口並遇害軍人推衙將王庭湊為留後二年二月甲子詔雪王庭湊仍授鎮州大都督府長史充成德軍節度等使三軍將士待之如初仍令韓愈往彼宣諭十月詔江淮諸州旱損田苗頗多所在米價不免踴貴眷言疲瘵須議優矜宜委淮南浙東浙西宣歙江西福建等道觀察使各於當道有水旱處取常平義倉斛斗據時估減半價出糶以惠貧民十一月庚午命景王率禁軍五百騎侍從皇太后幸華清宮又幸石甕寺癸西上幸華清宮迎太后巡狩于驪山下即日馳還太后翌日方還庚辰上與內官擊鞠禁中有內官歘然墜馬如物所擊上恐罷鞠升殿遽足不能履地風眩就床自是外不聞上起居者三日十二月丁亥詔五坊鷹隼並解放獵具並毀之庚寅宰臣李逢吉率百僚至延英門請見上不許中外失色與裴度等三上疏請立皇太子辛卯上於紫宸殿見百官李逢吉奏景王成長請立為皇太子左僕射裴度又極言之癸巳詔立景王為皇太子景午上御宣政殿册皇太子受册畢百寮謁太子於東宮三年正月丁巳上以疾苦不受朝賀是日大風昏翳竟日四年正月辛亥上御正殿受朝如常儀上餌金石之藥處士張皋上疏切諫上悅召之求皋不獲辛未上大漸詔皇太子監國事壬申上崩於寢殿時年三十諡曰睿聖文惠孝皇帝廟號穆宗葬于光陵敬宗昭愍皇帝唐書曰敬宗昭愍皇帝諱湛穆宗長子母曰恭僖太后王氏元和四年六月七日生於東內之別殿長慶元年封景王二年立為皇太子四年正月穆宗崩皇太子即位時年十六二月辛巳朔上縗服見群臣於紫宸門外癸未貶戶部侍郎李紳為端州司馬辛卯勑沒掖庭宮人先配內園宮人並宜放出任其所適己亥册大行皇帝皇太后為太皇太后三月上御丹鳳樓大赦天下天下常貢之外不得進獻六宅十宅諸王女宜令每年於選人中選擇降嫁甲寅始於延英對宰臣甲子故山南東道節度使牛元翼家屬悉為王庭湊所害上惜其冤橫傷悼久之仍歎宰執非才縱姦臣跋扈翰林學士韋處厚奏曰理亂之本非有他術順人則理違人則亂陛下當食歎息恨無蕭曹今有一裴度尚不能用此馮唐所以感悟漢文雖有頗牧不能用也戊辰群臣入閣日高猶未坐有不任立而踣者諫議大夫李渤出次白宰相俄而始坐班退左拾遺劉棲楚極諫頭叩龍墀血流上為之動容景申賊張韶等百餘人至右銀臺門殺閽者揮兵大呼進至清思殿登御榻而食攻弓箭庫右神策軍兵馬使康藝全率兵入宮討平之是日上聞變急幸左軍丁酉上還宮群臣稱慶諫議大夫李渤以上輕易致盜言甚激切五月制以吏部侍郎李程戶部侍郎竇易直並同中書門下平章事十二月回鶻吐蕃奚契丹遣使朝貢寶曆元年春正月辛亥親祀昊天上帝于南郊禮畢御丹鳳樓大赦改元二月桂管防禦觀察使李德裕獻丹扆針六首上深嘉之命學士韋處厚優其答詔四月群臣上徽號曰文武大聖廣孝皇帝御宣政殿授册禮畢御丹鳳樓大赦天下七月甲申拾遺李漢舒元褒薛廷老於閣內論曰近日除授往往不申中書進擬多是內中宣出臣恐紀綱寖壞姦邪恣行伏希詳察上然之詔度支進銅三千斤金薄十萬翻修清思院新殿及升陽殿圖障二年五月幽州軍亂殺其帥朱克融及男延齡軍人立其第二子延嗣為留後辛巳神策軍苑內古長安城中修漢未央宮掘池獲白玉床長六尺六月減放苑內役二千五百人帝性好土木自春至冬興作相繼庚申鄆州進驢打毬人石定寬等四人辛酉幸凝碧池令兵士千餘人於池中取大魚送入新池癸亥以旱命京城諸司疏理繫囚帝好深夜自捕狐狸宮中謂之打夜狐十二月辛丑帝夜獵還宮與中官劉克明田務澄許文端打毬軍將蘇佐明王嘉憲石定寬等飲酒帝方酣入室更衣殿上燭忽滅劉克明等同謀害帝即時殂於室內時年十八諡曰睿武昭愍孝皇帝廟號敬宗葬莊陵
