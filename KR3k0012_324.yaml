body:
  text: 兵部五十四敗易曰投戈散地六親不相能保禮記曰謀人之軍敗則死之又曰魯莊公及宋人戰于乘丘馬驚敗績左傳曰凡師敵未陳曰敗某師皆陳曰戰大崩曰敗績得俊曰剋覆而敗之曰取某師京師敗績曰王師敗績于某又曰夫其敗也如日月之蝕何損於明又曰及齊師戰于乾時我師敗績又曰公及邾師戰于井陘我師敗績又曰鄭伯侵陳大獲往歲鄭伯請成於陳五父諫曰親仁善鄰國之寶也陳侯不從故敗又曰晉侯及秦師戰于彭衙秦師敗績又曰宋師及齊師戰于獻齊師敗績又曰息侯伐鄭鄭伯與戰于境息師大敗而還君子是以知息之將亡也不度德鄭莊賢也不量力息國弱也不親親鄭息同姓之國不徵辭不察有罪言語相恨當明徵其辭以審曲直不宜輕鬥犯五不韙韙是也而以伐人其喪師也不亦宜乎又曰鄭師伐宋將戰華元殺羊食士食音嗣其御羊斟不與及戰斟曰疇昔之羊子為政疇昔猶前日也今日之事我為政與入鄭師故敗又曰狄人伐衛戰于滎澤衛師敗績衛侯不去其旗是以甚敗遂滅衛史記曰管仲曰吾嘗三戰三北鮑叔不以我為怯知我有老母也又曰曹沫者魯人也以勇力事魯莊公為魯將與齊戰敗三北魯莊公猶復以為將又曰齊桓公許與魯會于柯而盟於壇上曹沫執匕首劫齊桓公問曰子將何欲曹沫曰齊強魯弱大國侵魯亦以甚矣今魯城壞即壓齊境君其圖之桓公乃許盡還魯之侵地曹沫三戰所亡盡復于魯案魯連與燕將書曰曹子為將三敗三北亡地五百里向使曹子計不及顧義不旋踵刎頸而死則亦不免為敗軍擒將矣曹子棄三北之恥而退與魯君討桓公朝天下會諸侯三戰之所亡一朝而復之天下震動諸侯驚駭威加吳越又晉世家曰襄公墨經四月敗秦師于殽虜秦王將孟明視西乞術白乙丙以歸遂墨以葬文公夫人秦女謂襄公曰秦欲得其三將戮之公許遣之先軫聞之謂襄公曰患生矣軫追秦將渡河已在船中頓首謝卒不及後三年秦果使孟明等伐晉報殽之敗也後漢書曰建武三年春正月甲子以偏將軍馮異為征西大將軍杜茂為驃騎大將軍大司徒鄧禹及馮異與赤眉戰于回溪禹敗績後閏九月乙巳馮異與赤眉戰於崤底大破之又曰鄧禹與赤眉戰敗帝徵禹還勑曰赤眉無穀自當來東吾折捶笞之非諸將憂也無得進兵禹慚於受任而功不遂數以飢卒徼戰輒不利微古堯切又曰鄧禹與車騎將軍鄧弘擊赤眉遂為所敗衆皆死散禹獨與二十四騎還詣宜陽謝上大司徒梁侯印綬有詔歸侯印綬數月拜右將軍又曰鄧弘與赤眉大戰移日赤眉佯敗棄輜重走車皆載土以豆覆其上兵士飢爭取之赤眉引兵還擊弘弘軍潰亂馮異與禹合兵救之赤眉小却異以士卒飢倦可且休禹不聽復戰大為所敗又曰龐萌反攻殺楚郡太守引軍襲敗蓋延延走北渡泗水破舟揖壞津梁僅而得免又曰公孫瓚為袁紹所圍遣子續求救于黑山賊張燕燕率兵十萬三道來救瓚未及至瓚乃密使行人齎書告續曰昔周末喪亂僵尸蔽地以意而推猶為否也不圖今日親當其鋒袁氏之攻狀若鬼神梯衡舞於樓上鼓角鳴於地中日窮月急不遑啓處汝當碎首於張燕馳以告急父子天性不言而動言相感也且厲五千鐵騎於北隰之中下濕曰隰起火為應吾當自內出奮揚威武決命於斯不然吾亡之後天下雖廣汝欲求安足之地其可得乎紹候得其書獻帝春秋候者得書紹使陳琳易其詞即此書如期舉火瓚以為救至遂便出戰紹設伏瓚遂大敗復還保小城自計必無全乃悉縊其姊妹妻子然後引火自焚魏志曰太祖在長安使曹仁討關羽於樊又遣于禁助仁秋大霖雨漢水溢平地水數丈禁等七軍皆沒禁與諸將登高望水無所回避羽乘大舟就攻禁遂降會孫權擒羽獲其衆禁復在吳文帝踐祚權稱藩遣之帝引見禁鬚髮皓白形容燋悴泣涕頓首帝慰喻以荀林父孟明視之事魏書詔曰昔荀林父敗績於邲孟明喪師於郩晉秦不替使復其位後晉獲狄士秦霸西戎區區小國猶尚若斯而况萬乘乎樊城之敗水災暴至非戰之咎也其復禁等官拜安遠將軍晉書曰陸機河橋之戰始臨戎而牙旗折意甚惡之列軍自朝歌至于河橋鼓聲聞數百里漢魏以來出師之盛未嘗有也長沙王乂奉天子與機戰於鹿苑軍大敗赴七里澗而死者如積焉又曰張駿為涼州牧西域長史李柏請討叛將趙真為真所敗議者以柏造謀致敗請誅之駿曰吾每念漢世宗之殺王恢不如秦穆之赦孟明竟以減死論群心咸悅又曰孫恩為劉𥙿所擊窮蹙乃赴海自沉妖黨及妓妾謂之水仙投水從死者百數餘衆以恩妹夫盧循為主又曰盧循既敗走召妓妾問曰我今將自殺誰能同者多云雀鼠貪生就死實難有云官尚當死某豈願生於是悉配諸辭死者因投于水同黨盡誅又曰符堅敗走劉牢之進屯鄄城討諸未服河南諸城堡承風歸順者甚衆符堅子丕據鄴為慕容垂所逼請降牢之引兵救之垂聞軍至出新興城北走牢之與沛郡太守田次追之行二里至五橋澤中急取輜重軍稍亂為垂所擊牢之敗績士卒殲焉牢之策馬跳五丈澗得脫會丕救至因入臨濟集亡散兵復少振牢之以軍敗徵而還又曰符堅敗壽春單騎遁還於淮北飢甚人有進壺食豚髀者堅食之大悅曰昔公孫豆粥何以加也命賜帛十匹又曰母丘儉文欽反司馬景王遣鄧艾督太山諸軍屯樂嘉欽將攻艾景王銜枚徑造樂嘉欽子鴦年十八勇冠三軍謂欽曰及其未定請登城鼓譟擊之可破也既謀而行三譟而欽不能應鴦退相與引而東景王謂諸將曰欽走矣發鋭軍以追之諸將曰欽舊將鴦小而鋭引軍內入未有失利必不走也王曰一鼓作氣再而衰三而竭鴦三鼓而欽不應其勢已屈不走何待欽將遁謂鴦曰不先折其勢不得去也乃與騎十餘摧鋒陷陳所向皆披靡遂引去王遣驍騎八千翼而追之欽父子與麾下走保項儉聞欽敗棄衆宵遁淮南安風津都尉追儉斬之又曰符堅率衆百萬屯壽陽列陳淝水謝玄謂符融曰臨水為陳是不欲速戰請君稍却堅遂麾使陳退衆因亂不能止玄以精鋭決戰堅衆奔潰聞風聲鶴唳皆以為王師至草行露宿飢凍以死獲堅乘輿雲母車軍資山積又曰符堅望八公山上草木皆類人形又見王師部陳謂融曰此亦勍敵也憮然有懼色及敗單騎遁于淮北飢甚人有進壺飱者曰臣聞白龍厭天地之樂而見困豫且今蒙塵之難豈自天乎晉中興書曰謝琰為會稽內史督五郡事隆安四年孫恩攻上虞進及刑浦上黨太守張虔碩戰敗于刑浦人情震懼群賊鋭進咸以宜持重嚴備且列水軍於南湖又應分軍設伏以待之琰不聽外白賊至時尚未食琰曰要先滅此寇而後食耳跨馬而出廣武將軍桓寶為前鋒果敢能戰殺賊甚多而塘路迮狹魚貫不聚賊於艦中傍射前後斷絶琰至千秋亭與二子肇峻俱被害寶亦死之又曰劉道規及下邳太守孟懷玉等與桓玄戰於崢嶸洲義軍乘風縱火盡鋭爭先玄衆大潰燒輜重夜遁玄故將劉統馮雅等聚黨四百人掩沒潯陽城建威將軍劉懷肅討平之其黨自相斬以降玄入江陵太守馮談勸使更下戰玄欲步出漢川投梁州而人情崩阻不可復合益州刺史毛璩弟璠卒璩使其從孫祐之參軍費恬送璠喪葬江陵璩弟子修之為玄屯騎校尉玄計窮欲走漢中修之誘以入蜀遂與石康等乘艦泝江數十里恬與祐之迎擊玄益州督護馮遷斫玄玄曰是何人耶敢殺天子遷曰欲殺天子之賊耳遂斬玄首并石康等五級庚頤之及殿中監萬蓋丁仙期皆死之玄年六十息升六歲云我是豫章王諸軍勿見殺遂送至江陵市斬之三十國春秋曰後燕慕容垂遣其子寶步騎七萬伐後魏戰於參合陂大敗寶以數千騎奔免士衆還者十一二寶恨參合之敗屢言魏有可乘之機由是自率大衆伐魏至參合見往年戰處積骸如山設吊祭之禮死者父兄一時號哭軍中皆慟垂慚憤嘔血因而寢疾却還道卒宋書曰晉安王子勛舉兵潯陽宋將殷孝祖討之時賊據赭析赭音者孝祖將進攻之與賊合戰常以鼓蓋自隨軍中人相謂曰殷統軍可謂死將矣今與賊交鋒而以羽儀自摽顯若此射者十手攢射欲不斃得乎是日於陳中流矢死又曰王玄謨北圍滑臺為魏軍所追大破之流矢中臂二十八年正月還至歷城義恭與玄謨書曰聞因敗為成臂上瘡將非金印之徵邪梁後略曰丙午軍帥蕭方等至于長沙河東王譽率左右七千人置陳登高以禦之方等兵精衆盛暗江水滿爭來赴戰俄爾之間方等衆潰譽軍以騎汨之悉皆透水方等與左右二百餘人馳往赴舟舟中之指可掬方等溺于江中通典曰東魏大將齊神武與西魏大將周文帝戰印山時周文見齊神武出旗鼓識之乃暮敢勇士三千令賀拔勝總之犯其軍適與齊神武相遇時募士皆用短兵接戰勝逐齊神武數里刃垂及之會勝馬為流矢所中死比副騎至齊神武已逸去隋書曰高麗之役之使宇文述進軍東濟薩水去平壤城三十里因山為營乙支文德復遣使偽降請述曰若旋師者當奉高元朝行在所述見士卒疲弊不可復戰又平壤嶮困卒難致力遂因其詐而還衆半濟賊擊後軍於是大潰不可禁止九軍敗績一日一夜還至鴨淥水行四百五十里初渡遼九軍三十萬五千人及還至遼東城唯二千七百人帝怒以述等屬吏至東都除名為民唐書曰屈突通將自武關趍藍田以赴長安軍過潼關為劉文靜所遏不得進相持月餘通又令顯和以步騎萬人夜襲文靜詰朝大戰義軍不利顯和縱兵入我二柵而戰者往復數焉文靜為流矢所中義軍氣奪垂至於敗而文靜遊軍數百騎自南山而來擊其背顯和大敗匹馬而歸通勢彌蹙自摩其頸曰要當為國家受人一刀耳勞勉將士未嘗不流涕人亦以此懷之又曰安祿山之亂哥舒翰領兵馬步十五萬賊將崔乾祐會戰初哥舒翰造氈車以氈蒙其車以馬駕之畫以龍虎之狀五色相宣以金銀飾其畫獸之目及爪將衝戰焉因其驚駭擬從而椅角攢戈矢而逐之賊知其計積薪芻於隘路候氈車至順風縱火焚之駕馬奔駭燒氈車薪芻煙焰昏黑兩軍不相辨我師謂賊軍在煙焰中遂集弓弩併力射之賊軍抽退盡日矢盡方覺無賊我師衆從關門六七十里路狹北抵黃河南是古岸排蹴進不得賊抽軍從南山設疑曳柴楊塵以同羅詣直習險直透黃河古岸撗截我師我師敗績沉河而死十有二三又曰潼關之戰哥舒翰在河北高阜上觀軍陳進退之勢于時有般糧船在河北岸左右言取船渡兵可得遂令將船百餘隻到南岸渡人舟中之指可掬登船爭渡者不可勝數每滿即沉如是登船沉者數十渡餘軍盡散走還入關三國典略曰齊師既敗軍士奔至江者縛荻為筏多被沒溺浮尸翳江至于京先是童謠曰虜馬萬匹入南湖城南酒家使虜奴至是梁軍士以齊兵質酒一人才得一醉又曰周武伐齊齊主亦於塹北列陳謂高阿郍肱曰戰是耶不戰是耶郍肱曰不如勿戰却守高梁橋安吐根曰一把子賊馬上刺取擲著汾陽中諸內參曰彼亦天子我亦天子彼能懸軍遠來我何為守塹示弱齊主曰此言是也使讓郍肱曰爾富貴足惜性命耶乃填塹南引帝大喜齊主親戰東偏頗有退者淑妃怖曰軍敗矣穆提婆進曰大家去大家去齊主以淑妃奔高梁關奚長樂諫曰半進半退戰家常體今兵衆全整未有傷敗陛下捨比安之御馬一動人情驚擾願速還安撫齊主將從之穆提婆引其肘月曰言何可信齊衆大潰軍資甲仗數百里間委棄山積在陳死者八千餘人齊主夜走至洪洞戍又曰周遣大將軍王軌破陳於呂梁擒其司空南平郡公吳明徹北徐州刺史董安公程文季等俘斬三萬餘人初軌潛於清水入淮口多堅大木以鐵鎖貫車輪橫截水流遏斷船蕭摩訶謂明徹曰聞王軌正鎖下流其兩邊築城今尚未立若見遣擊之彼必不敢相拒彼城若立則吾屬且為虜矣明徹乃奮髯曰搴旗陷陳將軍事也長算遠略老夫事也摩訶失色而退一旬之間我兵益至摩訶又請明徹曰今求不得進退無路若潛軍突圍未足為恥願公率步乘車輿徐行摩訶領鐵騎數千騎前後必當使公安達京邑明徹曰弟之此計乃良圖也然老夫受脤專征不能戰勝攻取今被圍逼慚寡無地且步軍既多吾為惣督必須身居其後相率兼行遂欲破堰大軍以舫載馬北譙州刺史裴子烈議曰若決堰下船船必順倒不如前遣馬出於事為允會明徹疾篤知事不濟遂從之乃遣摩訶率馬數千前還明徹決堰乘水而退至清口水勢漸微船礙車輪並不得度軌圍而蹙之明徹力窮就執陳之鋭卒於是殲焉衛公兵法曰或若軍有賢智而不能用者敗上下相親而各述己長者敗賞罰不當而衆多怨言者敗知而不敢擊不知而擊之者敗利地利不得而卒多戰厄者敗勞逸無別不曉車騎之用者敗覘候不審而輕敵懈怠者敗行於險道而不知深溝絶澗者敗陳無選鋒而奇正不分者敗凡此十敗非天之殃將之過也夫兵者乍千日而不使不可一時而不勝故白起對秦王曰明王愛其國忠臣愛其名寧伏其重誅不忍為辱軍之將又嚴顏謂張飛曰卿等無狀侵奪我州有斷頭將軍無降將軍也故二將咸重其名節寧就死而不求生者蓋知敗衄之恥斯誠甚矣説苑曰晉荊戰於邲晉師敗績荀林父將歸請死景公將許之士貞伯曰不可城濮之役晉勝于荊夫文公猶有憂色曰子玉猶存憂未歇也困獸猶鬥况國相乎及荊殺子玉乃喜今天或者大警晉也林父之事君進思盡忠退思補過社稷之衛也今殺之是重荊勝也景公曰善乃使復將潘安仁汧馬督誄序曰昔乘兵之戰縣賁父御魯莊公馬驚敗績賁父曰他日未嘗敗績今而敗績是無勇也遂死又曰偏師禆將殞首覆軍者蓋以十數
