body:
  text: 百卉部七萍爾雅曰苹萍水中浮萍江東謂之薸音瓢其大者蘋毛詩采蘋曰采蘋大夫妻能循法度也能循法度則可以承先祖供祭祀矣于以采蘋南澗之濱于以盛之維筐及筥于以湘之維錡及釜相烹也又鹿鳴曰呦呦鹿鳴食野之苹苹萍也詩義䟽曰萍麤大者為蘋季春生可糝蒸為茹周禮秋官下萍氏曰萍氏掌禁川游者鄭玄曰萍草細根取不沉其名溺也禮記月令曰季春之月萍始生左傳桓公曰蘋蘩薀藻之菜可羞於王公周書曰榖雨一日萍始生萍不生陰氣憤盈家語曰楚昭王渡江江中有一物大如斗圓而赤直觸王舟舟人取之王問群臣莫能識使問孔子孔子曰是謂萍實可剖而食之吉祥也唯霸者能獲焉王遂食大美又遣問孔子何以知之子曰吾嘗過陳之野聞童謠曰楚王渡江得萍實大如斗赤如日割而食之甜如蜜吾是以知之呂氏春秋曰菜之美者崑崙之萍焉淮南子曰萍樹根於水木樹根於土淮南萬畢術曰老血為萍藂血之精至黃泉也許慎說文曰苹萍也無根浮水而生周處風土記曰萍蘋芹菜之別名也范子計然曰水萍出三輔色青者善吳氏本草曰水萍一名水廉生池澤水上葉圓小一莖一葉根入水五月華白三月採日乾之本草經曰水萍一名水華味辛寒生池澤水上療暴熱癢下水氣勝酒長鬢髮久服輕身郭子曰萍之依水猶卉植地靡見其布漠爾鱗被物有常託孰知所自杜恕篤論曰夫萍之浮與菱之浮相似菱植萍隨波是以堯舜惡巧言之亂德仲尼惡紫之奪朱劉伶酒德頌曰俯觀萬物擾擾焉如漢之載浮萍言隨風楚辭曰白萍兮聘望與佳期兮夕又曰靡萍九衢枲華安居又曰竊哀兮浮萍汎搖無根苔爾雅曰藫徒南切石衣也水苔也一名石髮江東食之或曰藫葉似薤而大生水底亦可食薤胡界切說文曰苔水衣也齊書曰宋時會稽剡縣有山名刻石父老相傳云雖名刻石而不知文字所在昇明末縣人倪襲祖行獵忽見石上有文字凡三處苔生其上字不可識乃去苔視之其大石文曰黃天星姓蕭字道成得賢師天下太平小石文曰刻石者紹會稽南山李斯刻秦望之風也三國典略曰侯景圍臺城既急時諸軍於德陽堂前殺馬鬻販雜以人肉乾甘露廚中所有乾苔悉分給軍士唐書曰拔野古國東北五六日行至鞠國有樹無草但有地苔無羊馬豕畜有鹿如中國牛馬使鹿牽車可勝三四人衣鹿皮食地苔其人藂木枝為屋尊卑共居其中淮南子曰窮谷之汙生青苔青苔水垢廣雅曰石髮石衣也風土記曰石髮水衣也青綠色皆生於石也遊名山志曰石簀山綠崖而上高百許丈裏悉青苔無別草木古今注曰苔蘚空空無人行生苔或紫或青一名員癬一名綠錢一名綠癬一名綠苔拾遺記曰晉武帝時祖梨國獻蔓苔亦曰金苔亦曰夜明博物志曰晉武帝欲觀書司空張華撰博物志進武帝帝嫌煩令削之賜側理紙萬張王子年云側陟厘也此紙以水苔為之溪人語訛謂之側理今名苔紙取水中苔造紙青黃色體澀其苔水中石上生如毛綠色述異記曰苔錢亦謂之澤葵又名重錢草亦呼為宣癬南人呼為垢草異物志曰石髮海草在海中石上藂生長尺餘大小如韭葉似蓆莞而株莖無枝以肉雜而蒸之味極美食之近不知足本草曰海藻一名海羅生東海中或生河澤莖似亂髮南越志曰海藻一名海菭或曰海羅王智深宋記曰王微字景玄太保弘之弟子也吏部尚書江湛受其才用舉為吏部郎陳病篤不受因與湛書告絕足不踰國十有餘載棲遲於環堵之室苔草沒階沈約青苔詩曰緣階何漠漠沉水復綿綿微根如欲斷輕絲似更聯謝莊月賦云陳王初喪應劉端憂多暇綠苔生閣芳鹿凝榭謝玄暉直中書省詩云紅藥當階翻蒼苔依砌上䔷抱朴子曰䔷根化為鱓字林曰䔷草生水中根可緣器莞爾雅曰𦸣方寐切鼠莞郭璞注曰鼠莞織細似龍鬚可以為席蜀中出好者廣雅曰蔥蒲莞也纂文同說文曰莞草可以為席從草完聲荔挺禮記月令曰仲冬大雪後五日荔挺出淮南子曰仲冬荔挺出顏氏家訓曰月令荔挺出鄭玄注云荔挺馬薤也說文云荔似蒲而小根可為刷廣雅云馬薤荔也通俗文而又名馬藺易統驗玄圖云荔挺不出則國多火災蔡邕月令章句云荔以挺出高誘注呂氏春秋云荔草挺出也然則月令之注荔挺為草名誤矣河北平澤率生之江東頗有此物種於階庭但呼為早蒲故不識馬薤講禮者乃以為馬莧堪食亦名豚耳俗曰馬齒江陵嘗有一僧面形上廣下狹劉緩幼子民譽年始數歲雋晤善體物見此僧云面似馬莧其伯父劉縚因呼為荔挺法師縚親講禮名儒尚誤如此列仙傳曰冠先生者宋人也以釣魚為業居涯水旁百有餘年魚或放或留或賣或自食之常著冠幘好種荔食其葩實焉宋景公問其道不告即殺之後數十年踞宋城門上鼓琴數日乃去宋人家家奉祀之彫胡西京雜記曰會稽人顧翱少失父事母孝母好食彫胡飯常帥子女躬採擷還家導水鑿川供養每有盈儲家近大湖湖中生彫胡無復雜草蟲鳥不敢至焉遂得以為養郡縣表其閭舍又曰蒲菰菰有米者長安謂為彫胡葭蘆之未解葉者謂之紫菰菰有首者謂之菉節苕爾雅曰苕陵苕一名陵時黃華蔈必遙切白華菱孫炎曰苕華色異名亦不同音沛廣志曰苕草色青黃紫華十一月稻下種之蔓延盛茂可以美田葉可食毛詩防有鵲巢曰邛有旨苕詩義䟽曰苕饒也幽州謂之翹饒蔓生莖如勞豆而細葉似蒺藜而青其華細綠色可食味如小豆藿葉也詩義䟽曰本草曰陵苕一名陵時一名鼠毛似玉芻生下濕水七月八月華紫似今紫草可以染帛煮沐頭髮即黑葉青如藍而多華史記曰趙武靈王夢見處女鼓琴而歌曰美人熒熒兮顏若苕之華薕爾雅曰蒹薕似雚而細高數天江東呼為薕藡毛詩車轔曰蒹葭蒼蒼白露為霜蒹薕也葭蘆也蒼蒼盛也薍爾雅曰菼他敢切薍也似葦而小實中江東呼為烏蓲蓲音丘毛詩淇奧碩人曰葭菼揭揭毛曰葭蘆菼薍也雚葦毛詩豳七月曰七月流火八月雚葦薍為雚葭為葦預畜雚葦以可為箔也又生民行葦曰敦彼行葦羊牛勿踐履方苞方體維葉泥泥又河廣曰誰謂河廣一葦航之禮記月令孟秋曰命有司納材葦蒲葦之屬此時柔脆可取作器物吳志曰孫亮初謠云諸葛恪何若若蘆葦單衣篾鉤絡於何相求常子閣常子閣者反語石子崗也釣絡帶也及諸葛恪為孫峻所殺以葦席裹尸而篾束之孫卿子曰南方有鳥名蒙鳩以羽編髮為巢係之以葦苕風至苕折子死卵破所憑者弱也呂氏春秋曰季夏之月乃命虞人入材葦虞人掌池澤官材葦供國用又曰湯始得伊尹拔之於廟煄以雚葦南夷志曰瀘河在弄棟北今謂之南瀘兩岸葭葦大如臂楚辭曰咸播耜黍莆雚是營咸階也耜黑泰也雚草名營耕也言禹平水土萬民皆得布種黑黍於雚蒲之地盡為良田也蘆荻爾雅曰葭華即令蘆葭蘆葦也毛詩曰蒹葭萋萋白露未晞蒹葭采采白露未已葭蘆也毛詩義䟽曰薍或謂之荻至秋堅成則謂之雚焦贛易林剝之坤曰從風縱火荻芝俱死漢書曰蕫偃見寵館陶公主安陵袁叔謂偃曰顧成廟遠無宿宮人又有荻竹籍田足下何不白主獻長門園於上此上所欲也晉中興書徵祥說曰義興初童謠曰官家養蘆化作荻蘆生不止自成積是時盧循竊據廣州國未能討因而用之是官養蘆也荻猶敵也春秋後語曰趙襄子欲保晉陽曰奈何無箭張孟談曰臣聞董子之治晉陽公宮之垣皆以荻蒿莒禁牆之高基高至于丈餘君發而用之於是發其堅則箘簬之勁不能過也隋書曰張威拜青州總管在青州頗治產業遣家奴於民間鬻蘆荻根其奴緣此侵擾百姓上深加譴責坐廢於家吳越春秋曰伍子胥至大江江中有漁父子胥請渡時旁多人漁父歌令止蘆中至夕渡之于滏之之津見其有飢色歸取夌飯鮑魚之羹子胥疑沒蘆中漁父呼蘆中子胥應與食渡之晏子春秋曰公獵休坐地晏子滅葭而坐公問其故晏子曰臣聞介胄不席獄訟不席尸在堂不席三者皆憂也臣不敢以憂示君公令人不席淮南子曰鴈衘蘆以避矰繳又曰藡苗類絮而不可以為絮藡苗雚秀也藡徒歷切抱朴子曰吳世有姚光者有火術吳主躬臨試之積荻千束光坐其上又以數千束荻累之因猛風燔之火盡光端坐灰中振衣而起說文曰葭灰以候律管釋名曰大曰蘆次曰葦蘆笋苦荻笋甘世說曰魏明帝使后弟毛曾與夏侯玄共坐時人謂蒹葭倚玉樹論衡曰上古之人有荼鬱壘者昆弟二人生而執鬼居東海度朔山上立桃樹下簡閱百鬼鬼道理妄興人禍荼與鬱累縛以蘆索執以食虎通語曰諸葛亮見殷禮而歎曰東吳菰蘆中乃有奇偉如此人與兄瑾書云殷往嗣秀才金之僑盼者也蘩𧃒爾雅曰蔜音敖音嫂𧃒今蘩𧃒也或曰雞腸草范汪治淋方曰取蘩𧃒草滿兩手以水煮之亦可常飲綸組爾雅曰綸古頑切似綸組似組東海有之綸今有秩嗇夫所帶純青絲綸組綬也海中草生彩理有象之者因以名云左思吳都賦曰綸組紫絳帛布爾雅曰帛似帛布華山有之草葉有象布帛者因以名云離南爾雅曰離南活莌也草生江南高丈許大葉莖中有瓤正白零陵人祖曰貫之為樹莌音脫地榆本草經曰地榆止汗氣消酒明目廣志曰地榆可生食神農本草經曰地榆苦寒主消酒生冤句
