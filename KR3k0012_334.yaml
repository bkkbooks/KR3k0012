body:
  text: 兵部六十四屯田漢書曰昭帝始元二年詔發習戰射士詣朔方調故吏將屯田張掖郡調謂發選之也故吏前為官職者也令其郡習戰射士於張掖為屯田也調音從釣切將音子亮切朔方張掖並今郡地也又曰孝宣神爵元年遣後將軍趙充國將兵擊先零羌充國以擊虜殄滅為期乃欲罷騎兵屯田以待其弊奏曰臣所將吏士馬牛食月用糧穀十九萬九千六百三十斛鹽千六百九十三斛艾稿二十五萬二百八十六石石百一十斤也難久不解徭役不息又恐他夷卒有不虞之變且羌虜易以計破難用兵猝且沒切言倉卒暴疾也故臣愚以為擊之不便計度臨羌東至浩亹浩音閲亹音門即金城郡度武縣地臨羌在今西平郡也羌虜故田及公田人所未墾可二千頃以上願罷騎兵留弛刑應募及淮陽汝南步兵與吏私從者合九萬二百八十二人用穀月二萬七千三百六十三斛鹽三百八斛分屯要害處冰解漕下繕鄉亭浚溝渠水運木繕補也治湟狹以西漕音皇狹音峽道橋七十所令可至鮮水左右田事出賦人二十畝田事出謂至春人出營田也賦班輿之也至四月草生發郡騎及屬國胡騎伉健各千倅馬什二就草倅副也七碎切什二者千騎則與副馬二百匹為田者遊兵以充入金城郡益積蓄省大費今大司農所轉穀至者足支萬人一歲食謹上田處及器用簿唯陛下裁計之詔曰如將軍之計虜當何時伏誅兵當何時得決孰計其便復奏充國又奏曰今留步士萬人屯田地勢平易臣愚以為屯田內有士費之利外有守禦之備騎兵雖罷其見在人留田為必擒之具其土崩歸德宜不久矣詔罷兵獨充國留屯田大獲地利明年遂破先零也魏志曰武帝既破黃巾欲經略四方而苦軍食不足羽林監潁川棗祗建置屯田於是以仕峻為典農中郎將募百姓屯田於許下今潁川郡許昌縣也得穀百萬斛郡國列置田官數年之中所在積粟倉廩皆滿又曰廢帝齊王正始四年司馬宣王督諸軍伐吳因欲廣田積穀為兼并之計乃使鄧艾行陳項以東至壽春自今淮陽郡項城縣以東至今壽春郡也艾以為田良水少不足以盡地利宜開河渠可以大積軍糧又通運漕之道乃著濟河論以喻其指又以為昔破黃巾因為屯田積穀計都以制四方今三隅已定事在淮南每大軍征舉運兵過半功費巨億以為大役陳蔡之間土下田良可省許昌左右諸稻田并水東下令淮北二萬人淮南三萬人分木且田且守小豐常收三倍於西計除衆費歲完五百萬斛以為軍資六七年間可積三千萬斛於淮上此則十萬之衆五年食也以此乘敵無不剋矣宣王善之皆如艾計遂北臨淮水自鍾離西南撗石以西盡沘水沘旁脂切四百餘里置一營營六十人且田且守兼修廣淮陽百咫二渠上引流下通淮潁大理諸陂於潁南潁北穿渠三百餘里溉田二萬頃淮南淮北皆相連接自壽春到京師農官兵田雞犬之聲阡陌相屬每東南有事大軍出征泛舟而下達于江淮資食有儲而無水害艾所建也晉書曰羊祐為征南大將軍鎮襄陽吳西城去襄陽七百里每為邊害羊祐患之意以詭計令吳罷守於是戍邏減半分以墾田八百餘頃大獲其利祐之始至也軍無百日之糧及至季年有十年之積太康元年平吳之後當陽侯杜元凱在荊州今襄陽郡修邵信臣遺迹邵信臣所作鉗廬陂大門堰在今南陽郡虢縣界時為荊州所統也激用滍音蚩淯音育諸水以浸田原萬頃分壃刊石使有定分公私同利衆庶賴之號曰杜父舊水道淮沔漢達江陵千八百里北無通路又巴丘湖沅湘之會表裏山川實為險固荊蠻之所恃也當陽侯乃開楊口起夏水達巴陵千餘里夏水口在今江陵郡江陵縣界巴陵即今郡也內瀉長江之險外通零桂之漕零陵桂陽並令邵地南土歌之曰後代無叛由杜翁孰識智名與勇功又曰梁武昭王皓擊玉門以諸城皆下之遂屯玉門陽關廣田積穀為東伐之資又曰東晉元帝督課農功二千石長吏以入穀多少為殿其宿衛要任皆令赴農使軍各自佃即以為廩太興中三吳大飢後軍將軍應詹上表曰魏武帝用棗祗韓浩之議廣建屯田又於征伐之中分帶甲之士隨宜開墾故下不甚勞大功剋舉間者流人奔東吳東吳今儉皆已返江西良田曠廢未久火耕水耨為功差易宜簡流人興復農官功勞報賞皆如魏氏故事一年中興百姓二年分稅三年計賦稅以使之公私兼濟則倉庾盈億可計日而行也又曰穆帝升平初荀羡為北部都尉鎮下邳今臨淮郡縣也起田于東陽之石鱉亦在臨淮郡界也公私利之齊書曰高帝勑垣崇祖修理芍陂田曰卿但努力營田自然平殄虜寇昔魏置典農而中都足食晉開汝潁而河汴委儲卿宜勉之後魏書曰文帝大統十一年大旱十二年祕書丞李彪上表請別立農官取州郡戶十分之一為屯人相水陸之宜料頃畝之數以贓贖雜物市牛科給令其肆力一夫之田歲貢六十斛甄其正課并征戍雜役行此二事數年之中則穀積而人足矣帝覽而善之尋施行焉自此公私豐贍雖有水旱不為害也北史曰後魏刁雍除薄骨律鎮將雍以西土乏雨表求鑿渠溉公私田又奉詔以高平安定統萬及薄骨律等四鎮出車牛五千乘運屯穀五十萬斛付沃野以供軍糧道多深沙車牛難阻河水之次造船水運又以所綰邊表常懼不虞造儲穀置兵備守詔皆從之詔即名此城為刁公城以旌功焉北齊書曰廢帝乾明中尚書左丞蘇珍芝又議修石鱉等屯歲收數十萬石自是淮南防糧足又曰孝昭帝皇建中平州刺史嵇曄建議開幽州督冗舊陂今范陽郡范陽縣界是長城左右營屯田歲收稻粟數十萬石北境得以周贍又於河內置懷義等屯以給河南之費自是稍止轉輸之勞又曰武成帝河清三年詔緣邊城守堪墾食者營屯田置都子使以統之子使當田五十頃歲終課其所入褒貶隋書曰文帝開皇三年突厥犯塞吐谷渾寇邊轉輸勞弊乃命朔方惣管趙仲卿於長城以北大興屯田隋書曰郭衍授朔州惣管所部有恆安鎮北接番境常勞轉運衍乃選沃饒地置屯田歲剩粟萬餘石民免轉輸之勞唐書曰竇靜歷并州大惣管司馬遷長史于時突厥數為邊患師旅歲興軍糧不屬靜上表請於太原多置屯田以省餽運時議者以人物淍零不宜動衆書奏不省靜復上書辭甚切於是徵靜入朝與裴寂蕭瑀封德彝等爭論於殿庭寂等不能屈竟從靜議歲收數十萬斛高祖善之又曰開元二十五年令諸屯隸司農寺者每三十頃以下二十頃以上為一屯隸州鎮諸軍者每五十頃為一屯其屯應置者皆從尚書省處分其舊屯重置者一依丞前封壃為定新置者並取荒間無籍廣占之地其屯雖料五十頃易田之處各依鄉原量事加數其屯官取勳官五品以上及武散官并前資邊州縣府鎮戍八品以上文武官內簡堪者充據所收斛斗等級為功優諸屯田應用牛之處山原川澤土有硬軟至於耕懇用力不同土軟處每一頃五十畝配牛一頭疆硬處一頃二十畝配牛一頭即當屯之內有硬有軟亦準此法其稻田每八十畝配牛一頭諸營田若五十頃外更有地剩配得丁牛者所收斛皆準頃畝折除其大麥喬麥乾蘿蔔等準粟計折斛斗以定等級天寶八年天下屯田百九十一萬三千九百六十石關內五十六萬三千八百一十石河北四十萬三千二百八十石河東二十四萬五千八百八十石河西二十六萬八十八石隴右四十四萬九百二石後上元中於楚州古謝陽湖置洪澤屯壽州置芍陂屯厥田沃襄大獲其利王元長策秀才文曰今農戰不修文儒是競棄本殉末厥弊茲多戍役詩曰采薇遣戍役也文王之時西有昆夷之患北有獫狁之難以天子之命命將卒遣戍役以守衛中國故歌采薇以遣之又曰楊之水刺平王也不撫其民而遠屯戍于母家周人怨思焉左傳曰齊侯使連稱管至父戌葵丘瓜時而往曰及瓜而代期戍公問不至請代不許故謀作亂漢書曰朝錯上言守邊備塞勸農力本當世急務也臣聞秦北攻胡貊築塞河上南攻楊粵置卒戍焉非所以衛邊地而救民死也貪戾而欲廣地故功未立而天下亂夫起兵不知其勢戰則為人禽屯則卒積死夫胡貉之地積陰之處也木皮三寸冰厚六尺食肉飲酪其人密理鳥獸毳毛密理謂肥肉也其性能寒楊粵音越之地少陰多陽其人疏理鳥獸稀毛其性能暑秦之戍卒不能其水土死者僨於地僨也音奮秦民見行如往棄市因以謫發之名曰謫戍也凡民守戰至死而不降北者以計為之也故戰勝守固則有拜爵之賞攻城屠邑則得其財鹵以富家室故能使其衆蒙矢石赴湯火視死如歸秦之發卒也有萬死之害而無銖兩之報故其禍及己陳勝行戌至于大澤為天下先倡天下從之如流水胡人衣食之業不著於地如飛鳥走獸於廣壄美草甘水則止草盡水竭則移往來轉徙時至時去此胡人之業然令卒守塞一歲而更不知胡人之能不如選常居者家室田作以為備便為之高城深塹具藺石布渠答藺石城上雷石也渠答鐵蒺䔧也調立城邑母下千家為中周虎落虎落外藩也上從其言募民徙塞下又曰錯復言臣聞古之徙遠方以實廣虛也相其陰陽之利嘗其水泉之味審其土地之宜觀其草木之饒然後營邑立城製里割宅通田作之道正阡陌之界先為築室家有一堂二內二內內房也置器物焉此民所以輕去故鄉而勸之新邑為置醫藥巫以救疾病以修祭祀男女有婚生死相恤此所以使民樂其處而有長居之心也又曰宣帝地節三年詔曰朕既不德不能附遠是以邊境屯戍未息今復飾兵重屯久勞百姓非所以綏天下也其罷車騎將軍右將軍屯兵後漢書曰橫野大將軍王常薨遣驃騎大將軍杜茂將衆兵屯北邊築亭候修烽燧又曰十五年徙鴈門代郡上谷三郡人置常山關以東又曰二十五年南單于遣子入侍於是雲中五原八郡人歸本土邊人在中國皆賜以裝錢轉輸給食也
