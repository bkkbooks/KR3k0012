body:
  text: 服章部十五屨釋名曰屨拘也所以拘足也說文曰屨履也一曰鞮也詩曰葛屨五兩冠綏雙止葛屨服之賤者也冠綏服之尊者箋云以喻不宜同處又葛屨曰糾糾葛屨可以履霜夏葛履冬皮履莫非所以履霜周禮曰屨人掌王及后之服履為赤舄黑舄赤繶黃繶青句素屨葛屨復下曰舄單下曰履古人言履以通於復今人言履以通於單句當為絢赤繶黃繶以赤黃之絲為下緣也辨外內命夫命婦之屨功屨散屨功屨次命屨散屨去飾著大戴禮曰入於戶未嘗越屨是高柴之行也禮曰侍坐於長者屨不上堂解屨不敢當階就屨跪而舉之屏於側向長者而屨跪而遷屨俯而納屨又曰戶外有二屨言聞則入言不聞則不入毋踐屨毋踖席又曰國家靡敝君子不履絲屨左傳曰齊侯遊于姑棼遂田于貝丘貝丘齊地見大豕從者曰公子彭生也公怒曰彭生敢見射之豕人立而啼公懼墜於車傷足喪屨反誅屨於徒人費弗得鞭之見血又曰楚子使申舟使于齊曰無假道于宋及宋華元曰過我而不假道鄙我也鄙我亡也亡一也乃殺之楚子聞之投袂而起屨及於窒皇劍及於寢門之外又曰齊晉戰于鞍郤克傷於矢流血及屨未絶鼓音又曰吳伐越越子禦之大敗之靈姑浮以戈擊闔廬靈姑浮越大夫闔廬吳王傷將指取其一履其足大指見斬遂失履姑浮取之穀梁傳曰公弟叔盻其曰弟叔盻賢之也宣公殺赤而非之宣公殺子赤叔盻非責云織屨而食終身不食宣公之食孟子曰許行自楚之滕其徒數十人皆衣褐梱屨織席以為食梱音閫猶叩椓也織履欲使堅故叩之賣履席以供飲食也屐釋名曰屐搘以踐泥也為兩足搘以踐泥也帛屐作之如屩者也不曰帛屩而曰帛屐者屩不可以踐泥屐可以踐泥也故謂之屐漢書曰袁盎使吳吳王使圍守之乃刀決帳直出屐行七十里東觀漢記曰范升奏云伏見太原周黨東海王良山陽王戎使者三到乃肯就車脫衣解屐升于華轂晉書曰宣王初欲追諸葛於關中多蒺藜乃使軍吏二千人著軟材木屐前行然後卒進焉晉宣帝雜教云當預作大平木屐遂賤時有蒺藜屐行蒺藜悉著屐底又曰謝安遣弟石及從子玄征符堅所在克捷安方對客圍碁有驛書到碁畢還內過戶限心喜不覺屐折齒又曰王述性急當食雞子以箸剌之不得便怒擲於地雞子圓轉不止便下以屐齒踏之不得嗔甚掇口中嚼而吐之又曰祖約好財阮孚好著蠟屐同是纍而未判其得失有詣約見正料財物客至屏當不盡餘兩小簏著背後傾身障之意未能平或有詣阮正見蠟屐因歎曰未知一生當著幾量屐神色間暢於是勝負始分又曰石勒擊劉曜使人著鐵屐施釘登城晉中興徵祥說曰舊為屐者齒皆達名曰露卯泰元中忽不復徹名陰卯亦服妖也識者以為卯謀也必有陰謀烈宗末驃騎參軍袁悅之始有陰謀之事及隆安遂致大亂宋書曰謝靈運好山水尋山陟嶺必造幽峻巖嶂數十重莫不備盡登躡常著木屐上山則去其前齒下則去其後齒又曰虞玩之高帝鎮東府朝廷致敬玩之為少府猶躋屐造席高帝取屐視之訛黑針鋭蒵斷以芒接之問曰卿此屐已幾載玩之曰初釋褐拜征北行佐買之著已三十年貧士竟不易辦高帝咨嗟因賜以新屐玩之不受問其故答曰公之賜恩華俱重但蓍簪弊席復不可遺所以不敢當帝善之又曰劉凝之有嘗認其著屐笑曰僕著已敗今家中覔新者償君此人後田中得所失送還不肯復取齊書曰沈麟士昔嘗行路鄰人認其所著屐麟士曰是卿屐耶即跣而反鄰人得屐送前者還之麟士曰非卿屐耶笑而受之蕭子顯齊書曰襄陽有盜發古冢者傳云是楚王冢獲玉屐玉屏風梁書曰范廉為吳興太守廣陵高爽有儉薄才客於廉委以文記爽嘗有求不遂乃為屐斷以喻廉曰㓨鼻不知喋踏面不知瞋齧齒作步數持此得勝人譏其不計恥辱以此取名位論語隱義注曰孔子至蔡解於客舍人夜有取孔子一隻屐去盜者置屐於受盜家孔子屐長一尺四寸與凡人屐異孔藂子曰孔穿振方屐見平原君宋元嘉起居注曰劉禎彈廣州剌史韋朗贓有白荊屐六七十量風俗通曰延嘉中京師長者皆著木屐婦女始嫁作漆畫屐五色綵為系後黨事起九族俱繫婦人挃蓋木屐之像世說曰王子敬兄弟見郤公躡履問訊甚修外生禮及嘉賓死著高履儀容輕慢每命坐皆云有事不暇坐郤公慨然曰若使嘉賓不死鼠輩敢爾語林曰鄭玄在馬融門下業成辭歸融心忌之鄭玄亦疑有追乃坐橋下據屐融果轉式逐之告左右曰玄在上下水上而據木此必死矣遂罷追矣竟以免華陽國志曰何隨家養竹人盜其筍隨行見恐盜者覺挈屐而歸皇甫謐高士傳曰袁閎字夏甫汝南人也築室於庭首不著布身無單衣足著木屐汝南先賢傳曰戴良嫁女布裳木屐秦記曰符健皇始四年新平縣有長人見語民張靖曰符氏應天受命當太平健以為妖妄下靖獄是月河渭蒲坂津豎冠登於河中得隻屐長七尺二寸稱履五指長尺餘指尺深寸登以獻健因赦靖劉欣期交州記曰趙嫗者九真軍安縣女子乳長數尺不嫁入山聚群盜常著金摛踶屐庾仲雍荊州記云劉盛公枝江人桓司空臨州與上佐遊於靈溪盛公詣市還著皂蓋布裙以杖荷屐詣桓司空神仙傳曰左慈見孫討逆著鞭驅馬慈著木屐策杖徐步然終不能及乃止搜神記曰昔作屐婦人圓頭男子方頭蓋作意欲別男女也太康婦人皆方頭屐與男無別集異記曰廣平游先期妄見一人著赤袴褶知是其魅乃以刀斫之乃死良久方變是所常著履異苑曰介子推逃祿隱跡抱樹燒死文公拊木哀嗟伐而製屐每懷割股之功俯視其屐曰悲乎足下足下之稱將起於此又曰丹陽縣有梅姑廟姑生時有道術能著屐行水上後負道法壻怒殺之投其尸於水上乃隨波流漂至今廟處晦望之日時見水霧中曖然有屐夢書曰粗屐為使令卑賤類也夢得粗屐得僮使也王襄僮約曰持斧入山斷輮裁轅若有餘材當作俎几木屐屣說文曰屣鞮屬也鞮革履也史記曰漢孝武帝云使朕誠得如黃帝視棄妻子如脫屣耳魏志曰王粲字仲宣蔡雍見而奇之賓客盈坐聞王到倒屣迎之後漢書曰皇甫規有當世重望鄉人有行賄為郡守謁規規臥不起聞王符至遂倒屣而迎春秋後語曰魏太子擊逢文侯之師田子方於朝歌朝歌紂之所都金衛州地引車避下謁之田子方不為禮太子擊因問曰富貴者驕人乎貧賤者驕人乎子方曰貧賤者驕人耳夫諸侯而驕則失國大夫而驕則失家富貴者安敢驕人貧賤驕人耳行不合言不從則去之楚越若脫屣然太子不懌而去淮南子曰堯之有天下也年衰志悶舉天下而傳之舜猶卻行而脫屣孟子曰舜視棄天下猶棄弊屣也世說曰何晏為吏部尚書王弼未弱冠往見之晏倒屣迎之鞾釋名曰鞾本胡服也趙武靈王始服之北齊書曰鄭太妃初與神武避葛榮同走并州負困燃馬屎自作鞾又曰任王諧為并州剌史有婦人臨汾水浣衣有乘馬人換其新靴而去婦人持故靴詣州言之諧召城外諸嫗以靴示之紿曰有乘馬人於路被賊劫害遺此靴焉得無親屬乎一嫗撫膺哭曰兒昨著此靴向妻家如其語捕獲一時稱明察後魏書曰有人遺趙柔鞾數百枚柔與子善明鬻之於市有人從柔買柔索絹三十匹有商人知其賤與柔三十匹善明欲取之柔曰與人交易一言便定豈可以利動心也遂與之唐書曰建中初贈司徒沈易良之妻崔氏即太后之季父母也上見之方屣而鞾鄴中記曰石虎皇后出女騎千人皆著五綵織成靴列仙傳曰仙人文賓太丘人也賣靴為業魏武與楊彪書曰今足下織成靴一量慕容晃與顧和書曰今致繡靴一量傅咸表曰涼州民先辨靴從軍之物然後作衣屩說文曰屩屐也釋名曰屩草屨也出行著之屩輕便因以為名也春秋後語曰趙相虞卿躡屩檐簦來說孝成王一說賜白壁一雙黃金百鎰再見拜為上卿故號虞卿謝承後漢書曰江夏劉勤字伯家貧作屩供食常作一量屨斷勤置不賣出行妻賣以糴米勤歸炊熟怪問何所得米妻以實告勤責曰妻賣毀物欺取其直也因棄不食仕至司徒宋書曰劉敬宣嘗夜與僚佐宴空中有投一隻芒屩於坐墜敬宣食盤上長三尺寸已經人著耳鼻間並欲壞頃之敬宣參軍司馬道賜反敬宣為其所害又曰張暢在彭城為魏太武所圍太武遣李孝伯至城欲與暢語李伯曰君南土膏梁何為著屩君而著此使將士云何暢曰膏梁之言武誠為愧但以不武受命統軍戎陳之間不容綏服齊書曰沈瑀為餘姚令瑀初至富吏皆鮮衣美服自彰別瑀怒曰汝等下縣吏何得自擬貴人悉使著芒屩粗布侍立終日足有蹉跌輒加榜捶又曰禇彥回幼有清譽宋元嘉末魏軍逼爪步百姓咸負擔而立時父湛之為丹陽尹使其子弟並著芒屩於齊前習行或譏之湛之曰安不忘危彥回時年十餘甚有慚色梁書曰侯景即位童謠曰脫青袍著芒屩荊州天子定應著又曰何點方尚書乘紫車躡草屩恣心所適致醉而歸陳書曰沈衆武帝時兼吏部尚書監起太極殿恆臥布袍芒屩以麻繩為帶朝士咸共誚其所為唐書曰孟元陽起於陳許軍中理戎整肅曲環主屯作西華元陽芒屩立稻田中須役者退而方去風土記曰美朱爽之輕履篾龍舄之文章爽藤也赤色緣木而長大如箭竿越人以為屩經以青芒行山草便於用靴故越人重之搜神記曰元康之末至太安之間江浦之域有敗屩自聚於道多或至四五十兩人散去之投林草中明日視之悉復矣民或云見狸銜而聚之世之所說屩者人之賤服而當勞辱下民之象也敗者疲弊之像也道者地理四方所以交通王命所由往來也今敗屩聚於道者象下民疲病將相聚為亂絶四方而壅王命臨海水土記曰屩魚長一尺狀如屩形俗說曰劉真長少時居丹徒家至貧劇方回數出南射堂射劉往市賣屩路經射堂邊過人無不看射劉過初不回顧方回異之遣問信答云老母朝來未得食至市貨屩不得展詣後過劇呼之使來與共語覺其佳笑林曰南方人至京師者人戒之曰汝得物唯食慎勿問其名也後詣主人入門內見馬矢便食惡臭乃步進見敗屩棄於路因復嚼殊不可咽顧伴曰且止人言不可皆信後詣貴官為設饌因相視曰故是首物且當勿食屧宋書曰袁粲為丹陽尹步屧白陽郊野間遇一士人便呼與飲明日此人謂被知到門求進粲曰昨飲酒無偶聊相要耳竟不與相見齊書曰江泌字士倩濟陽人也少貧好學書則斫屧為業夜則讀書隨月光光斜則握卷吉屋梁書曰臨川王宏奢侈過度後庭數百十人皆極天下之選所幸江無畏服玩侔於齊東昏潘妃寶屧直千萬
