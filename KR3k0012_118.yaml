body:
  text: 偏霸部一蜀劉備蜀志曰先主姓劉諱備字玄德涿郡人漢景帝子中山靖王勝之後也勝子貞元狩六年封涿縣陸城亭侯坐酎金失侯因家焉典略云備本臨邑侯枝屬先主祖雄父弘世仕州郡雄舉孝廉官至東郡苑令先主少孤母販履織席為業舍東南角籬上有桑樹上高五尺餘遙望重重如小車蓋往來者皆怪此樹非凡或謂當出貴人漢晉春秋曰涿人李定云此家必出貴人也先主少時與宗中諸兒於樹下戲言吾必當乘此羽葆蓋車叔父子敬謂曰汝勿妄語滅吾門矣年十五母使行學與同宗劉德然遼西公孫瓚俱事故九江太守同郡盧植德然父元起常資給先主與德然等元起妻曰各自一家何能常爾耶起曰吾宗中有此兒非常人也瓚深與先主相友瓚年長先主以兄事之先主不甚樂讀書喜狗馬音樂美衣服身長七尺五寸垂臂下膝顧自見其耳少語言善下人喜怒不形於色好交結豪俠年少爭附之中山大商張世平蘇雙等貲累千金販馬周旋於涿郡見而異之乃多與之金先主由是得用合徒眾靈帝末黃巾起州郡各舉義兵先主率其屬從校尉鄒靖討賊有功除安喜尉大將軍何進遣都尉詣丹陽募兵先主與俱行至下邳遇賊力戰有功除下密丞復去官後為高唐尉遷為令為賊所破往奔公孫瓚表為別部司馬使與青州刺史田楷拒冀州收袁紹數有功守平原令後領平原相郡民劉平素輕先主恥為之下使客刺之客不忍刺語之而去其得人心如此袁紹攻公孫瓚先主與楷東屯齊曹公征徐州徐州牧陶勾遣使告急於楷楷與先主俱救之時先主有兵千餘人謙以丹陽兵四千人益先主遂去揩歸謙謙表先主為豫州刺史屯小沛謙病謂別駕縻笁曰非劉備不能安此州謙死笁帥州人迎先主先主未敢當下邳陳登謂先主曰今漢室陵遟海內傾覆立功立事在於今日彼州殷富戶口百萬欲屈使君撫臨州事北海相孔融謂先主曰今日之事百姓與能天與不取悔不可追先主遂領徐州袁術來攻先主拒之於盱眙淮陰曹公表先主為鎮東將軍封宜城亭侯是歲建安元年也先主與術相持經月呂布乘虛襲下邳守將曹豹反間迎布布盧先主妻子先主求和於布布還其妻子先主還小沛復合兵得萬餘人布惡之自出攻先主先主敗走歸曹公曹公厚遇之以為豫州牧曹公助先主圍布於下邳生擒布先主復得妻子從曹公還許表先主為左將軍禮之逾重出則同輿入則同席袞術欲經徐州北就袁紹曹公遣先主督朱靈路招要等術未至術病死曹公從容謂先主曰天下英雄唯使君與操耳本初之徒不足數也先主方食失匕箸先主據下邳乃殺操徐州刺史曹冑留關羽守下邳身還小沛曹公東征先主敗績曹公盡收其眾虜先主妻子并擒關羽以歸先主走青州青州刺史袁譚先主故茂才也將步騎迎先主先主隨譚到平原譚馳使白紹紹遣將道路奉迎身去鄴二百里與先主相見關羽亡歸先主曹公遣曹仁將騎擊先主先主還紹軍陰欲離紹乃說紹南連荊州收劉表紹遣先主將本兵至汝南遣麋笁孫乾與劉表相聞表自郊迎以上賓待之先主在荊州數年嘗於表坐起至廁見髀裏肉生慨然䟽悌還坐表怪問備曰平常身不離鞍髀肉皆消今不復騎髀裏肉生日月若馳老將至矣而功業不建是以悲耳一日徐庶謂先主曰諸葛孔明臥龍也將軍豈不欲見乎先主曰可以俱來庶曰此人可就見不可屈致也宜枉駕顧之由是先主遂詣亮廬凡三見之因屏人曰漢室傾頹奸臣竊命孤不度德量力欲仗大義於天下而智術淺短遂用猖蹶然志由未巳君為計將安出亮曰自董卓已來豪傑並起跨州連郡者不可勝計曹操比於袁紹則名微而眾寡操遂能克紹以弱為強非唯天時抑亦人事今操已擁百萬之眾挾天子而令諸侯此誠不可與爭鋒也孫權據有江東已歷三代國險而民附賢能為之用此可與為援而不可圖也荊州北據漢江利盡南海東連吳會西通巴蜀此用武之國也而其主不能守殆天所以資將軍也益州隘塞沃野千里天府之土高祖因之以成帝業劉璋暗弱張魯在北人殷國富而不知恤智能之士思得明君將軍既帝室之冑信義著於四海總攬英雄思賢如渴若跨有荊益保其巖阻西和諸戎南撫夷越結好孫權內修政事天下有變則命上將將荊州之軍以向宛洛將軍身率益州之眾出於秦川百姓孰不簞食壺漿以迎將軍者乎誠如是則霸業可成漢室可興矣先主曰善於是與亮情好日密關羽張飛不悅先主解之曰孤之有孔明如魚之有水也願諸君勿復言十二年曹公北征烏丸先主說表襲許表不能用及曹公南征會表死子琮代立遣使請降先主屯樊城遂將其眾去過襄陽諸葛亮說攻琮荊州可有先主曰荊州臨亡訟我以孤背信自濟死何面目見劉荊州乎吾不忍也琮左右及荊州人多歸先主比到當陽眾且十萬輜重數千雨日行十餘里或謂先主曰宜速行保江陵今雖擁大眾被甲者少若曹公兵至何以拒之先主曰夫濟大事者以人為本今人歸吾何忍棄去是時曹公又以江陵有軍實恐先主據之乃釋輜重輕軍到襄陽聞先主已過曹公將精騎五千急追之一日一夜行三百餘里及於當陽之長坂先主棄妻子與諸葛亮張飛趙云等數十騎走遣諸葛亮自結於孫權權遣周瑜等助之與曹公戰於赤壁大破之焚其舟舩群下推先主為荊州牧治公安益州牧劉璋內懷恐懼遣法正迎先主先主留諸葛亮關羽等據荊州將步卒數万人入益州璋推先主行大司馬領司隸校尉先主推璋行鎮西大將軍益州牧璋勑關戍諸將文書勿復關通先主先主大怒進圍成都數十日璋出降蜀中殷盛豐樂先主置酒大饗士卒蜀城中金銀分與將士還其穀帛先主復領益州牧群下尊先主為漢中王還治成都魏文帝稱尊號傳聞漢帝見害先主乃發喪制服追謚曰孝愍皇帝是後建立禮儀上尊號即皇帝位於成都章武元年夏四月大赦改年永安三年先主病篤託孤於丞相亮夏四月先主殂于永安宮時年六十三五月梓宮自永安還成都謚昭烈皇帝秋八月葬惠陵華陽國志曰漢末大亂雄傑並起若董卓呂布二袁韓馬張楊劉表之徒兼州董郡眾動萬計叱咤之間皆自謂漢祖可踵桓文易邁而魏武神武肆略戡屠盪盡于時先主名微眾鮮而能龍興鳳舉假翼荊楚番飛梁益建元胤漢與之鼎跱非英才命世孰克如是劉禪蜀志曰後主諱禪字公嗣先主子也建安二十四年先主為漢中王立為王太子即尊號為皇太子先主殂于永安宮後主襲位於成都時年十七是歲魏黃初四年也景耀六年夏魏大興徒眾命征西將軍鄧艾數道並攻用光祿大夫譙周策奉書於艾後主輿襯自縛詣壘門艾解縛焚襯延請相見因承制拜後主為驃騎將軍諸圍守悉被後主勑然後降下艾使後主止其故宮身往造焉後主乃舉家東遷在位凡四十年既至洛陽策命為安樂縣公食邑萬戶賜絹萬疋奴婢百人後司馬文王與後主宴為之作樂故蜀妓傍人皆為感愴而後主喜笑自若王謂賈充曰人之無情乃至於是雖使諸葛亮在亦不能輔之況姜維邪充曰不如是殿下何由并之他日王問禪曰頗思蜀否禪曰此間樂不思蜀也蜀故秘書令郄正聞之求見語禪曰王復問可言先人墳墓遠在隴蜀乃心西悲無日不思因閉其目會王復問禪以此荅王曰何乃似郄正之語也禪驚曰此實如尊命左右皆大笑後薨於洛陽魏略曰始備在小沛不意曹公卒至迫遽棄家屬奔荊州禪時年數歲匿竄隨人西入漢中為人所賣及建安十六年關中破亂扶風人劉括避亂入漢中買得禪問知其良家子遂養為子與娶婦生一子始禪與父相失時識其父字玄德比舍人有姓簡者及備得益州而簡為將軍備遣簡到漢中舍都邸禪乃詣簡簡相驗訊事皆符驗簡喜以語張魯魯乃洗沐送詣益州備乃立為太子始備以諸葛亮為太子太傅及禪位以亮為丞相委以諸為請亮曰政由葛氏祭則寡人亮亦以禪未閑於政遂揔內外
