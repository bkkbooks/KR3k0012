body:
  text: 治道部十四賞賜説文曰賞賜有功也傳曰蔡公孫歸主謂楚令尹子木曰善為國者賞不僣刑不濫賞僣則懼及淫人刑濫則懼及善人若不幸而過寧僣無濫與其失善寧其利淫無善人則國從之商頌有之曰不僣不濫不敢逮遑命于下國封建厥福此湯所以獲天福也古之理民者勸賞而畏刑恤民不倦賞以春夏刑以秋冬將賞為之加膳加膳則飫賜此所以知其勸賞也將刑為之不舉不舉則徹樂以此知其畏刑也又曰晉荀林父滅潞晉侯賞林父狄臣千室亦賞士伯以瓜衍之縣曰吾獲狄土子之功也微子吾喪伯氏矣羊舌職悅是賞也曰周書所謂庸庸祇祇者此物物事也也士伯庸中行伯君信之亦庸士伯此謂明德文王造周不是過也注云邲之敗晉侯欲殺林父士渥濁諫而止之又曰虢公晉侯朝王王饗醴命之宥皆賜玉五玨馬三匹非禮也雙玉為玨王命諸侯名位不同禮亦異數又曰晉侯伐鄭鄭人賂晉侯女樂八人晉侯以樂之半賜魏絳曰子教寡人和諸戎狄以正諸華八年之中九合諸侯如樂之和無所不諧請與子樂之魏絳辭曰夫和戎狄國之福也九合諸侯君之靈也二三子之勞也臣何力之有抑臣願君安其樂而思其終也公曰子之教敢不承命夫賞國之典也藏在盟府不可廢也子其受之魏絳於是始有金石之樂禮也周禮太宰以八柄馭群臣三曰子以馭其幸注云幸謂言行偶合於善則有以賜豫以勸後也又曰以九式均節財用八曰匪頒之式注曰式謂財用之節度也匪分也頒賜也謂分賜群臣又曰太府以敝餘之賦以待賜豫禮記曰天子賜諸侯樂則以祝將之伯子男樂則以鼗將之將謂執以致命諸侯賜弓矢然後專征賜鈇鉞然後專殺賜圭瓚然後為鬯未賜圭瓚則資鬯於天子又曰若賜車馬乘以拜賜衣服服以拜君未有命弗即乘服凡賜君子與小人同此賞賜之義也又曰若賜之食而君客人則命之祭然後祭鄭玄曰雖見賓客猶不敢備禮也待食則不祭也君若賜之爵則越席再拜稽首受登席祭之飲卒爵而俟君卒爵然後受虛爵不敢先君盡爵詩曰陳錫哉周注云言文王能布陳大利以錫書曰德懋懋官功懋懋賞又曰用命賞于祖弗用命戮于社又曰罰弗及嗣賞延于世又曰功多有厚賞弗迪有顯戮史記曰紂囚西伯羑里西伯之臣閎夭之徒求美女奇物以獻紂紂乃赦西伯而賜弓矢斧鉞使得征伐又曰武王滅紂乃罷兵西歸封諸侯班賜宗彝作分殷之器物鄭玄曰宗彝宗廟彝樽也作分器著王之命及物也已於是封功臣謀士而師尚父為首封封尚父於營丘曰齊封弟周公旦於曲阜曰魯封召公奭於燕封弟叔鮮於管封叔度於蔡餘各以次受封又曰禹平水土已成帝錫玄圭禹受曰非豫能成亦大費為輔帝舜曰咨爾費贊禹功其錫爾皂遊音流爾後嗣將大出遂妻之姚姓之玉女皇甫謐曰賜之玄玉妻姚姓之女史記曰晉人請公賞從己者臣壺叔曰君三行賞賞不及臣敢請罪文公報曰夫導我以仁義防我以德惠此受上賞輔我以行事卒我以成立此受次賞矢石之難汗馬之勞此復次賞若以力事我而輔吾缺者此復受次賞三賞之後故及子晉人聞之皆説音悅又曰晉楚戰于城濮晉侯渡河北歸國行賞狐偃為首或曰城濮之事先軫之謀文公曰城濮之事偃説我毋失信先軫曰軍事勝為右吾用之以勝然此一時之説偃言萬世之功奈何以一時之利而加萬世之功乎是以先之又曰三國攻晉陽引汾水灌其城城不沒者三版城中懸釜而炊易子而食群臣皆有外心禮益慢唯高共一作赫不敢廢禮襄子懼乃夜使張孟同私於韓魏韓魏與合謀三月丙戍三國反滅智氏共分其地於是襄子行賞高共為上張孟同曰晉陽之難共無功襄子曰方晉陽急群臣皆懈唯共不敢失臣禮是以先之又曰漢五年已殺項羽定天下即皇帝位論功行封以蕭何功最盛封為酇侯列侯軍已受封奏位次皆曰平陽曹參身被七十創攻城略地功最多宜第一上已撓功臣多封蕭何至位次未有以復難之然心欲何第一關內侯鄂君進曰群臣議皆誤夫曹參雖有野戰略地之功此特一時之利耳夫上與楚相拒五歲嘗失軍亡衆逃身遁者數矣然蕭何常從關中遣軍補其處非上所詔令召而數萬衆會上之乏絶者數矣夫漢與楚相守滎陽數年軍無見糧蕭何轉漕關中給食不乏陛下雖亡山東蕭何尚全關中以待陛下此萬世之功也今雖亡曹參等百數何缺於漢漢得之不必待以全奈何欲以一旦之功而加萬世之功哉蕭何第一曹參次之高祖曰善於是乃令蕭何第一賜帶劍履上殿入朝不趍上曰吾聞進賢受上賞蕭何功雖高得鄂君乃益明於是因鄂君故食關內侯邑封為安平侯又曰項藉死天下定上置酒上折隋何之功謂何腐儒為天下安用腐儒隋何跪曰夫陛下引兵攻彭城楚王未去齊也陛下發步兵卒五萬人騎五千能以取淮南乎上曰不能隋何曰陛下使何與二十人使淮南至如陛下之意是何之功賢於步卒五萬騎五千也然而陛下謂何腐儒為天下安用腐儒何也上曰吾方圖子之功乃以隋何為護軍中尉又曰漢文帝初即位赦天下賜民爵一級女子百戶牛酒蘇林曰男子賜爵女子賜牛酒也皇帝曰呂産自置為相國呂祿為上將軍擅矯遣灌將軍嬰將兵擊齊欲伐劉氏嬰留滎陽弗擊與諸侯合謀以誅呂氏呂産欲為不善丞相陳平與太尉周勃謀奪呂産等將軍朱虛侯劉章首先捕呂産等太尉身率襄平侯通持節承詔入北典客劉揭身奪趙王呂祿益封太尉勃萬戶賜金五千斤丞相陳平灌將軍嬰邑各三千戶金二千斤朱虛侯劉章襄平侯通東牟侯劉興居邑各二千戶金二千斤封典客揭為陽信侯賜金千斤漢書曰夏侯嬰自上初起沛常太僕竟高祖以太僕事惠帝及高后德之脫孝惠魯元於下邑間也乃賜嬰北第第一師古曰此第者近北闕之第嬰最第一也曰近我以尊異之又曰景帝賜衛綰劍綰曰先帝賜臣劍凡六不敢奉詔上曰劍人之施易獨至于今乎綰曰具在上使取六劍劍嘗盛未嘗服也後遷為御史大夫代桃侯舍為丞相然自初官以至相終無可言上以為敦厚可相少主尊寵之賞賜甚多又曰伏日詔賜從官肉太官承日晏不來東方朔獨拔劍割肉謂其同官曰伏日當蚤歸請受賜即懷肉去太官奏之朔後入上曰昨賜肉不待詔以劍割肉而去之何也朔免冠謝上曰先生起自責也朔來受賜不待詔何無禮也拔劍割肉一何壯也割之不多一何廉也歸遺細君又何仁也上笑曰使先生自責乃反自譽復賜酒一石肉百斤歸遺細君又曰王成不知何郡人也為膠東相治甚有聲宣帝先褒之地節三年下詔曰蓋聞有功不賞有罪不誅雖唐虞不能以化天下今膠東相成勞求不息民流自占八萬餘口師古曰隱度名數而來附業也治有異等之致其賜成爵關內侯秩中二千石又曰黃霸為頴川太守是時鳳凰神雀數集郡國頴川尤多天子以霸治行終長者下詔稱揚曰頴川太守霸宣布詔令百姓鄉化孝子弟悌貞婦順孫日以衆多行者讓路道不拾遺養視鰥寡贍助貧窮獄無重囚而吏民鄉于教化可謂賢人君子矣書不云乎股肱良哉其賜霸爵關內侯黃金百斤秩中二千石而頴川孝悌有行義民三考力田皆以差賜爵及帛又曰初霍氏奢侈茂陵徐生曰霍氏必亡夫奢則不遜不遜必侮上侮上者逆道也在人之石衆必害之霍氏秉權日久衆欲害之而又行以逆道不士何待乃上疏言霍氏太盛陛下即愛厚之宜此時抑制無使至亡書三上輒不報間其後霍氏誅滅而告霍氏者皆封人為徐生上書曰臣聞客有過主人者見其竈直突傍有束薪客謂主人更為曲突遠徙其薪不者且有火患主人默然不應俄而家果失火鄰里共救之幸而得息於是殺牛置酒謝其鄰人灼爛者在於上行餘各以功次不録言曲突者人謂主人曰鄉使聽客之言不費牛酒終亡失火之患今論功而請賓曲突徙薪亡恩澤燋頭爛額為上客即主人乃寤而請之今茂陵徐福上書言霍氏且有變宜防絶之鄉使福説得行則國亡裂土出爵之費臣亡逆亂誅滅之敗往事既已而福不蒙其功唯陛下察之貴徙薪曲突之策使居焦髮灼爛之右上乃賜福帛千匹後以為郎後漢書曰光武召桓榮令説尚書甚善之拜為議郎賜錢十萬使授太子每朝會輒令榮於公卿前敷奏經書帝稱善曰得生幾晚特加賞賜後榮入會廷中詔賜奇果授者皆懷之榮獨手捧以拜帝笑之曰此真儒生也以是愈見敬厚常令上宿太子宮後拜太子少傅賜輜車乘馬榮大會諸生陳其車馬印綬曰今日所蒙稽古之力也可不勉乎又曰明帝初即位賜天下男子爵人二級漢書音義曰男子者謂戶內之長也商鞅為秦制爵二十級又賜爵者罪得贖貧者得賣與人乎三老孝悌力田人三級過公乘得移與子若同子産漢制賜爵自公士也不得上公乘故過者得移授也同産同母兄弟出及流人無名數欲自占者人一級無名數謂文薄也占謂自歸首又曰管陶公主為子求郎不許而賜錢千萬謂群臣曰郎官上應列宿出宰百里有非其人則人受其殃是以難之又曰永平中顯宗幸宛詔諸李隨安衆宗室會見並受賀賜恩寵篤焉又曰郭伋為并州牧過京師謝恩帝並召皇太子諸王宴語終日賞賜車馬衣服什物又曰肅宗納梁竦女為貴人生和帝竇皇后養以為子諸竇遂譖殺貴人而陷竦等死獄中家屬徙九具和帝立後貴人姊南陽樊調妻嫟於計切上書自訟曰妾同産女弟貴人前充後宮蒙先帝厚恩得見寵幸誕生聖明為竇憲兄弟所見譖訴使妾父竦冤死老母孤弟遠徙萬里今值陛下神聖之運親統萬機群物得所憲兄弟姦惡既伏辜誅妾乃敢昧死自陳所丐帝覽章感悟乃下掖庭令驗問之嫟辭證明審遂得引見具陳其狀乃留嫟止宮中連月乃出賞賜衣被錢帛第宅旬月之間纍資千萬嫟素有操行帝益愛之乃號梁夫人楚漢春秋曰高帝初封侯者皆賜丹書鐵券曰使黃河如帶太山如礪漢有宗廟爾無絶世漢魏春秋曰天子以曹公典任守外臨時之賞或宜速乎乃命公得承制拜諸侯守相曰夫軍之大事在茲賞罰勸善懲惡宜不旋時故司馬法曰賞不踰月者欲民速覩為善之利也昔在中興鄧禹關承制拜君祭酒李文為河東太守來歙又承制拜高峻為通路將軍察其本傳皆非先請明臨時刻印也斯則世祖神明權達蓋所用速示威懷而克成洪勳者也且春秋之義大夫出疆專命之事荀可以利社稷安國家而已況君秉任二伯師尹九有實征夷夏軍行蕃甸之外得失在於斯須之間停賞後許以滯時務固非朕之所圖也自今已後臨事所甄當加寵號者其便刻印章假校咸使忠義得共獎勵勿有疑焉魏志曰太祖攻城邑靡麗之物則悉賜有勳功勞其賞不吝千金無功望施分毫不與又曰袁煥卒太祖賜穀二千斛一教以大倉穀千斛賜郎中令家一教以垣下穀千斛與耀卿家煥字耀卿外不解其意教曰以大倉穀者官法也以垣下穀者親舊也又曰公令曰昔趙奢竇嬰之為將也受賜千金一朝散之故能濟成大功永世流聲吾讀其文未嘗不慕其為人也與諸將士大夫共從戎事幸賴賢人不愛其謀群士不遺其力是以夷險平亂而吾得竊大賞戶邑三萬追思趙竇散金之義今分所受租與諸侯掾屬及故戍於陳蔡者庶以酬答衆勞不擅大惠也又曰鎮東將軍母丘儉上言昔諸葛恪圍合肥新城中遣士劉整出圍傳消息為賊所得考問所傳整曰欲殺我者便速殺之終無它辭又遣士鄭像出城傳消息恪遣騎尋迹索得縛將繞城勑像大呼言大軍已還洛不如早降像不從其言更大呼城中曰大軍近在圍外壯士努力賊以刀築其口使不得語整像為兵能守義執節子弟宜有差異詔曰夫顯爵所以褒元功重賞所以寵列士整像占募通使越蹈重圍冒突白刃輕身守信不幸見獲抗節彌厲楊六軍之大勢安城守之懼心臨難不顧畢志傳命今追賜整像爵關中侯各除士名使子襲爵如部曲將死事科又曰夏侯惇從征孫權還使都督軍留居巢賜伎樂名倡令曰魏絳以和戎之功猶受金石之樂況將軍乎又曰太祖平柳城班所獲器物特以素屏風素機賜毛玠曰君有古人之風故賜君古人之服玠居顯位撫育孤兄子甚篤賞賜以施貧族家無所餘又曰文帝在東宮賜鍾繇五熟金為之銘曰於赫有魏作漢藩屏厥相惟鍾實幹心膂靖恭夙夜匪皇般耳百寮師師楷茲矩度又曰薛夔黃初中為祕書丞帝與之推論書傳未嘗不終日帝視其衣薄解袍賜之晉春秋曰清河崔祖思死家無餘財有書八千卷上聞唴歎良久之以葛屯穀五百斛賜其家曰葛屯亦吾之垣下令後世知其見異晉書曰王沈為豫州下教曰能陳長史可否説百姓所患者有賞言剌史得失倍賞主簿禇君曰上好下應今示以賞恐拘介之士憚賞不言貪昧之人慕利妄舉沈從之宋書曰謝方明為桓玄著作佐郎後從兄景仁舉為宋武中軍主簿方明知無不為帝謂曰愧未有瓜衍之賞且當與卿共豫章國祿屢加賞死蕭子顯齊書太祖奇張融賜衣曰見卿衣服粗交爾籃縷亦虧朝望今送一通衣意謂雖故乃勝新是吾之所著已令裁減稱卿之體又曰孔靈産為光祿大夫覽止足之分不肯仕太祖以白毛扇素機遺之曰卿有古人之風故賜以古人之服當代榮之北齊書曰唐雍字道和太原人雍少明敏有治世之才斛律金啓太后云唐雍強幹一人當千顯祖常解其所著青鼠皮裘賜雍云朕意與卿共幣家語曰孔子曰自季孫之賜我千鍾也而交友益親得季孫千鍾之賜以施於衆故交友日益親也自南宮敬叔之乘我車也而道加行孔子欲見老聃西觀周室敬叔言於魯君紿孔子車馬問禮於老子孔子歷郊廟自周而還弟子四方來集也故道雖貴必有時而後動德雖高必有勢而後行微夫二子之賜則丘之道殆於廢矣太公金匱曰賞一人而千人喜者賞之賞二人而萬人喜者賞之賞三人而三軍勸者賞之管子曰明賞不費明刑不暴賞罰明德之至也司馬法曰殷戮於市周賞於朝勸君子懼小人也鶡冠子曰進賢者受上賞則下不蔽善為政賞人不多而民喜罰人不多而民畏言賞罰中尹文子曰祿薄者不可以經亂賞輕者不可以入難此處上者所宜慎者也慎子曰孔子云有虞氏不賞不罰夏后氏賞而不罰殷人罰而不賞周人賞且罰罰禁也賞使也文子曰善賞者費少而勸多故聖人賞一人而天下趍之是以至賞不費也韓子曰司城子罕謂宋君曰慶賞賜與者民之所好也君自行之誅罰教戮者民之所惡也臣請當之於是戮細而誅大君子與子罕議之居期年知死生之命制於子罕故一國歸焉又曰襄子圍於晉陽中出圍賞有功者四人高赫為賞首張孟談曰晉陽之事赫無大功今為賞首何也襄子曰晉陽之事國危社稷殆矣群臣無不有驕侮之意者唯赫不失君臣之禮是以先之仲尼聞之曰善賞哉襄子賞一人而天下為人臣者莫能失禮也又曰韓昭侯使人藏蔽𥘞侍者曰君亦不仁矣蔽𥘞不以賜左右而藏之昭侯曰非子之所知也吾聞明君之愛一嚬有為嚬一笑有為笑今夫𥘞豈特嚬笑哉𥘞之與嚬笑相去遠矣吾必待之有功故藏之末有與也言不謬賞尹子曰范獻子遊於河顧問樂氏之子舟人捨楫對曰君不修政舟中之人皆欒氏之子君能反是欒氏之子其如君何獻子稱善乃賜舟人田百畝以田易言也淮南子曰忠臣之事君也計功而受貴不為茍得量力而受官不貪爵祿其所能者受之勿辭也宋玉等並造集小言賦云楚王既登雲陽之臺乃命諸侯大夫景差唐勒宋玉等並造大言賦卒而宋玉受賞王曰復能為小言賦者與之雲夢之田玉又為賦王曰善遂賜雲夢之田説苑曰晉文公亡時陶淑狐從文公反國行三賞而不及陶淑狐見咎犯曰吾從而亡十有三年顏色黎黑手足視胼今吾君反國三賞而不及我也意者君亡我歟我有大故歟子試為我言之於君咎犯言之文公文公曰嘻我豈忘是子哉夫高明至賢德行全成耽我以道説我以仁暴顯我行昭明我名使我為成人者吾以為上賞防我以禮諫我以義蕃授我不得為非數引我而請於賢人之門吾以為次賞夫勇壯強禦難在前則居前難在後則居後免我於患難之中者吾又以為之次且子獨不聞乎死人者不如存人之身亡人者不如存人之國三行賞之後而勞苦之士次之夫勞苦之士子固為首矣吾豈敢忘子哉周內史叔興聞之曰文公其霸乎昔先王先德而後力文公其當之矣詩云率禮不越此之謂也又曰衛君問於田讓曰寡人封侯盡千里之地賞賜盡御府綿帛而士不至何也田讓乃對曰君之賞賜不可以功及也君之誅伐不可以理避也言不賞功不辨理也猶舉杖而呪狗張弓而呪雞矣雖有香餌而不能致害之必也又曰齊宣王遊於社山有閭丘先生長老十三人於路拜謁宣王王賜之田不租無徭役諸老皆拜閭丘先生獨不拜王曰何也對曰來見大王所望者三願賜臣壽願賜臣富願賜臣貴王曰夫生殺有時命有長短非寡人之所制無以壽先王倉粟豐盈備災而畜無以富先王大官無缺小官卑賤無以貴先王閭丘先生曰此非謂也臣所望者願王選吏平法度政無苛如此臣少得壽焉春夏秋冬使之以時役無煩擾臣少得富焉願王出令使少者敬長長者敬老如此則臣得貴矣今王賜臣田不租則倉廩虛無徭役則官無所使非臣所望也王曰願屈先生為相可乎先生曰臣願足矣焉用相乎又曰趙襄子問王離曰國之所以亡者何也對曰君吝而能忍是以亡爾襄子曰何以為然也曰吝則不能賞賢忍則不能罰罪賢者不賞罪者不罰不亡何也又曰佛盻於中牟叛置鑊於庭召大夫而盟曰從我者賞之不從我者罰之田英曰吾聞義死者不避鈌鉞之威義窮者不受軒冕之賜無義而生不如有義而死吾不從也乃褰裳就鑊佛盻止之及襄子既復中牟之叛聞田英義召而賞之英辭不受曰一人受賞衆人有慚色英若受賞則中牟之士盡愧矣又曰蘇秦至齊齊王厚待之諸大夫嫉之使人剌秦而不死齊王出珍寶賞募求賊不得蘇秦垂死謂齊王曰王誠能為臣求賊者臣死後請車裂臣尸於市詢之曰蘇秦為燕欲亂齊今日其死寡人甚喜故裂之若得其殺王重封賞之如此剌臣者必出矣齊王從其言裂尸而詢之剌秦者果出求賞新序曰晉文公獵於澤有漁父諫曰夫鴻鵠厭江海而移入小澤則有矰繳之患今君棄宮殿遊至於此何往之矣文公納諫而還請賞之漁父辭曰君能尊天事地敬神固國愛人薄賦徭役以時則臣亦富矣君若不能雖有重賞亦不能保也呂氏春秋曰昔晉文公與楚人戰於城濮召咎犯而問焉楚衆我寡奈何咎犯曰臣聞繁禮之君不足於交繁戰之君不足於詐君亦詐之而已文公又問雍季雍季曰以詐導民亦一時之利也用咎犯之言而敗楚人於城濮反而為賞雍季在上左右諫曰城濮之功咎犯之謀也君用其言而賞後其身或者不可乎文公曰雍季之言百世之利也咎犯之言一時之務也焉有一時之務先百世之利乎又曰晉文將伐鄴趙襄言所以勝鄴之術文公用之果勝還將行賞襄曰君將賞其本乎賞其末乎賞其末則驕乘者存賞其本則臣聞之卻虎公召虎曰襄言所以勝鄴鄴既勝將賞之曰蓋聞之於子請賞子虎曰言之易行之難臣言之者也公曰子毋音無辭虎乃受凡行賞其博也則多助今虎非親言者也賞猶及此疏遠者所以盡能竭智者也晉文亡久矣歸而因大亂之餘猶能以霸其用此歟風俗通曰俗説有功得賜金者皆黃金案孫子法曰費千金百萬陳平間楚千金賜二踈金五十斤此真黃金也亦為一萬錢裴氏新書曰舟涓有一言之善晉侯賜萬頃田辭而不受晉侯曰以此田易彼言也於子猶有所亡寡人猶有所得周生列子曰行賞不洽於仁是春半半生也行罰不威是秋半半死也半生之春不洽於仁半死之秋不專於義
