body:
  text: 治道部九貢舉上周禮地官鄉大夫之職曰正月之吉受教法于司徒退而頒之于其鄉吏使各以教其所治以考其德行察其道藝以歲時登其夫家之衆寡辨其可任者以歲時入其書三年則大比考其德行道藝而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮禮賓之賢者有德行者也能者有道藝者也衆寡謂鄉民之善者無多少也鄭司農云興賢者謂若今之舉為孝廉者興能者謂若今之舉茂才也玄謂變舉言興者謂合衆而尊寵之厥明鄉老及鄉大夫群吏獻賢能之書于王王再拜受之登于天府內名二之獻猶進也王拜受之重得賢也王上其書於天府天府掌祖廟之寶藏者內史副寫其書者當詔王爵祿之時也禮記王制曰命鄉論秀士升之司徒曰選士移名於司徒也秀士鄉大夫所考有德行道藝者司徒論選士之秀者而升之學曰俊士可使習禮者學大學升於司徒者不征於鄉升於學者不征於司徒曰造士不征不給其繇役造成也能習禮則為成士大樂正論造士之秀者以告于王而升諸司馬曰進士司馬夏官卿主邦政者進受爵祿者司馬辨論官材論進士之賢者以告於王而定其論各署其所長論定然後官之任官然後爵之命之位定然後祿之又曾子問曰凡語于郊者語謂論説於郊學必取賢斂才焉或以德進或以事舉或以言楊大樂正論造士之秀者升諸司馬曰進士謂此矣又射義曰古者天子之制諸侯歲獻貢士於天子天子試之於射宮其容體比於禮其節比於樂而中多者得與於祭其容體不比於禮其節不比於樂而中少者不得與於祭數與於祭而君有慶數不與於祭而君有讓天子將祭必先習射於澤澤者所以擇士也已射於澤而后射於射宮射中者得與於祭不中者不得與於祭漢書曰高帝十一年詔曰賢士大夫既與我定有天下而不與吾共安利之可乎有肯從我遊者吾能尊顯之以布告天下御史中執法下郡守其有意稱明法者必身勸為之駕詣丞相府署其行義年有其人而不言者免官又曰惠帝四年詔舉人孝弟力田者復其身高后元年初置孝弟官二千石者一人特置此官而尊其秩欲以勸免天下各令敦行務本又景帝後元二年詔曰廉士寡欲易足今訾算十以上乃乃得官廉士算不必衆有市籍不得官無訾又不得官朕甚愍之訾算四得官有市籍謂賈人有財不得為吏資萬錢算百二十也十萬時疾吏之貪以為衣食足知榮辱故限資十萬乃得為吏廉士無資減至四算乃得官又曰武帝建元初始詔天下舉賢良方正直言極諫之士其理申商韓非蘇秦張儀之言亂國政者皆罷之又曰元光元年舉董仲舒對策曰今郡守縣令民之師帥所使承流而宣化也故師帥不賢則王德不宣恩澤不流今吏既亡教訓於下或不承用主上之法暴虐百姓與姦為市言小吏有為姦欺者守令不舉乃反與之交易求利也貧窮寡弱冤苦失職甚不稱陛下之意夫長吏多出於郎中中郎吏二千石子弟選郎吏又以富資未必賢也且古所謂功者以其任官稱職為差非所謂積日纍久也故小材雖纍日不離於小官賢材雖未久不害為輔佐是以有司竭力盡知務理其業而以赴功今則不然纍日以取貴積久以致官是以廉恥貿亂賢不肖混殽也諸侯列卿郡守二千石各擇其吏民之賢者歲貢各二人以給宿衛且以觀大臣之能所貢賢者有賞不肖者有罰夫如是諸侯吏二千石皆盡心於求賢天下之士可得而官使也授之以官以使其材無以日月為功實試用賢能為上量材而授官録德而定位録德存視之也則廉恥殊路賢不肖異處矣帝因是令郡國舉孝廉各一人又限以四科至五年詔徵吏人有明當代之務習先聖之術者縣次給食令與計偕計者上計簿使也郡國每歲遣詣京師上之偕者俱也令所徵之人與計者俱來而縣次給之也又元朔元年詔曰夫本仁祖義褒德録賢勸善刑暴本仁祖義謂以仁義為本始也五帝三王所繇昌也故詔執事興廉舉孝庶幾成風夫十室之邑必有忠信三人並行厥有我師今或至闔郡而不薦一人是化不下究而積行之君子壅於上聞也究竟也言見壅遏不得聞於天子也且進賢受上賞蔽賢蒙顯戮古之道也其與中二千石禮官博士議不舉者罪是時天下慎法莫敢謬舉而貢士蓋鮮故有斯詔有司奏議曰古者諸侯貢士一適謂之好德再適謂之賢賢三適謂之有功乃加九錫不貢士一則黜爵再則黜地三而黜爵削地矣夫附下罔上者死附上罔下者刑與聞國政而無益於民者斥在上位而不能進賢者退其不舉孝不奉詔當以不敬論為其不求士報國也不察廉為不勝任也當免奏可凡國之官非傅相其地既自署置又調屬僚及部人之賢者舉為秀才廉吏而貢於王庭多拜為郎居三署無常員或至千人屬光祿勳故卿校牧守居間待詔或郡國貢送公車徵起悉在焉光祿勳復為三署中銓第郎吏歲舉秀才廉吏出於他官以補缺員後漢制同又元封五年詔曰蓋有非常之功必待非常之人故馬或奔踶而致千里踶蹈也奔踶者乘之即奔立則踶人也踶音徒計反士或有負俗之纍而立功名負俗謂被代譏論也纍音力瑞反夫泛駕之馬泛覆也音芳勇反字本作覂復通用耳覆駕者言馬有逸氣而不修軌徹也跅弛之士跅者無檢局也弛者放廢不遵度禮也跅音吐各反弛音式爾反亦在御之而已其令州縣察吏人有茂材異等茂材異等者超等軼群不與凡同可為將相及使絶國者絶遠之國初公孫弘以儒術為丞相天下之學靡然嚮風時太常孔臧等曰請太常博士官置弟子五十人復其身太常擇人年十八以上儀狀端正者補博士弟子郡國縣道邑有好文學敬長上肅政教順鄉里出入不悖所聞二千石謹察可者常以計偕詣太常得受業如弟子一歲皆輒通一藝以上補文學掌故缺其高第可以為郎中者太常籍奏即有秀異等輒以名聞其不事學若不材及不能通一藝輒罷之而諸不稱者罰又曰孝昭始元初遣故廷尉王平等五人前為此官今不居皆謂之故持節行郡國行下更反舉賢良孝宣帝時諫大夫王吉上言曰今使吏得任子弟子弟以父兄任為郎率多驕驁不通古今驁傲同音至於積功理人無益於人此伐擅所為作也伐檀詩篇名剌不用賢也宜明選求賢除任子弟之令又曰孝元帝永光元年二月詔丞相御史舉質朴敦厚遜讓有行者光祿歲以此科第郎從官始令丞相御史舉其四科人以擢用之而見在郎及從官又令光祿每歲依此科考校定其第高下用知其人賢否又詔列侯舉茂材諫大夫張勃舉太官獻丞陳湯獻丞主貢獻物湯有罪勃坐削戶二百會薨故賜諡曰繆侯以舉所舉不得人故加惡諡繆者妄也其勸勵也如是故官得其材位必久安為吏長子孫居官以為姓號三代以降斯之為盛漢書音義曰甲乙科謂作簡策難問列置案上在試者意投射取而答之謂之射策上者為甲次為乙若録政化得失顯而問之謂之對策也後漢書曰建武七年下詔曰此陰陽錯謬日月薄蝕百姓有過在豫一人公卿司隸州牧舉賢良方正各一人遣詣公車朕將覽試焉又曰韋彪上議曰宜以才行為先不可純以閥閲然其要歸在於選二千石二千石賢則貢舉皆得其人矣帝深納之又曰章帝建初元年詔曰夫鄉舉里選必纍功勞今剌史相不明真偽茂才孝廉歲以百數既非能顯而當授之政事甚無謂也每尋前代舉人貢士或起畎畝不繫閥閲史記明其等曰閥積功曰閲言前代舉人務取賢才不拘問它敷奏以言則文章可採明試以功則政有異迹文質彬彬朕甚嘉之其令太傅三公中二千石二千石郡國守相舉賢良方正能直言極諫之士各一人又章帝建初五年詔曰公卿已下其舉直言極諫能指朕過失者各一人遣詣公車將親臨問焉其以巖穴為先勿取浮華漢官儀曰建初八年十二月巳未詔書辟士四科一曰德行高妙志節清白二曰經明行修能任博士三曰明曉法律足以決疑能案章覆問文任御史四曰剛毅多略遭事不惑明足照姦勇足決斷才任三輔皆存孝悌清公之行自今已後審四科辟召及剌史二千石察舉茂才尤異者孝廉廉吏務實校試以職有非其人不習官事正舉者故舉不實為法罪之後漢書和帝永元五年詔曰選舉賢良為政之本科別行能必由鄉曲而郡國舉吏不加簡擇故先帝明勑在所令試之以職乃得充選又德行尤異不須經職者別署狀上而宣布以來出入九年二千石曾不承奉恣心從好司隸剌史訖無糾察今新蒙赦令且復申勑後有犯者顯明其罰在位不以選舉為憂督察不以發覺為負非獨州郡也是以庶官多非其人下人被姦邪之傷由法不行故也又永元六年詔曰朕以眇末承奉鴻烈陰陽不和水旱違度濟河之域凶饉流亡而未獲忠言至謀所以匡救之策寤寢永歎用思孔疚惟官人不得於上黎民不安於下有司不念寬和而競為苛刻覆案不急以妨人事甚非所以上當天心以濟元元也思得忠良之士以輔朕之不逮其令三公中二千石二千石內郡守相舉賢良方正能直言極諫之士各一人昭巖穴披幽隱遣詣公車朕將親覽焉帝乃親臨策問選補郎吏又永元七年詔曰元首不明化流無良政失於人謫見於天深惟庶事五教在寬是以舊典因孝廉之舉以求其人有司詳選郎官寬博有謀才任典城者三十人既而悉以所選郎出補長相又永平十三年詔曰幽并涼州戶口率少邊役衆劇束修良吏進仕路狹撫接夷狄以人為本其令緣邊郡戶口十萬以上歲舉孝廉一人不滿十萬二歲舉一人五萬以下三歲舉一人又曰安帝永初元年詔公卿內外衆官郡國守相舉賢良方正有道術之士明政術達古今能直言極諫者各一人又永初二年詔曰昔在帝王承天理人莫不據琁璣玉衡以齊七政朕以不德遵奉大業而陰陽差越變異並見間令公卿郡國舉賢良方正遠求博選開不諱之路冀得至謀以監不逮而所對皆循尚浮言無卓爾異聞其百僚及郡國吏人有道術明習災異陰陽之度琁璣之數者各使指變以聞二千石長吏明以詔書博衍幽隱朕將親覽待以不次冀獲嘉謀以承天誡又詔其經明任博士居鄉里有廉清孝順之稱才任理人者國相歲移名與計偕上五年又詔曰為政之本莫若得人褒賢顯善聖制所先濟濟多王文王以寧思得忠良正直之臣以輔不逮其令三公特進侯中二千石郡守諸侯相舉賢良方正違於教化能直言極諫之士各一人及至孝與衆卓異者并遣詣公車朕將親覽焉又曰胡廣南郡人初為郡散吏太守法雄之子真從家來省其父真頗知人會歲終應舉雄勑真助求其才雄因大會諸吏真自於牖間密占察之乃指廣以白雄遂察孝廉既到京師試以章奏安帝以廣為天下第一旬月拜尚書郎五遷尚書僕射又陽嘉元年太學新成詔曰試明經者補弟子增甲乙之科員各十人除郡國耆儒九十人皆補郎舍人時尚書今左雄議改察舉之制限年四十以上儒者試經學文吏試章奏如有顏面子奇之類不拘年齒尚書僕射胡廣尚書郭虔等駮之曰選舉因才無拘定制六奇之策不出經學鄭産之政非必章奏甘奇著用年乖強仕終賈楊聲亦在弱冠漢承周秦兼覽殷夏祖德師經參雜霸軌聖主賢臣代以致理貢舉之制莫或回革今以一臣之言不可剗戾舊章竟從雄義於是雄上言郡國孝廉古之貢士出則宰人宣協風教若其面牆則無所施用孔子曰四十不惑禮稱強仕請自今孝廉年不滿四十不得察舉皆先詣公府諸生試家法文吏課箋奏副之端門練其虛實以觀異能以美風俗有不承科令者正其罪法若有茂才異行自不拘年齒帝從之乃班下郡國明年有廣陵孝廉徐淑年未及舉臺郎凝詰之對曰詔書有如顏回子奇不拘年齒是故本郡以臣充選郎不能屈雄詰之曰昔顏回問一知十孝廉聞一知幾耶淑無以對乃遣還郡於是濟陰太守胡廣等十餘人皆坐謬舉免黜唯汝南陳蕃潁川李膺下邳陳球等三十餘人得拜郎中自是牧守畏栗莫敢輕舉迄于永嘉十餘年間察選清平多得其人雄又奏徵海內名儒為博士使公卿子弟為諸生有志操者加其俸祿及汝南謝廉河南趙建年始十二各能通經雄並奏拜童子郎自是負書來學雲集京師又桓帝詔曰孝廉廉吏皆當典城牧人禁姦舉善興化之本常必由之詔書連下分明懇惻而在所玩習遂至怠慢選舉乖錯害及元元頃雖頗繩正猶未懲改方今淮夷未殄軍師屢出百姓疲瘁困於徵發庶望群吏惠我勞人蠲滌貪穢以祈休祥其令秩滿百石十歲以上有殊才異行乃得忝選贓吏子孫不得察舉杜絶邪偽請託之源令廉白守道者得信其操信音申古字通又曰初平四年試儒生四十餘人上第賜位郎中次太子舍人下第者罷之詔曰孔子歎學之不講則所識日忘今耆儒年踰六十去離本土營求糧資不得專業結童入學白首空歸長委農野永絶榮望朕甚愍焉其依科罷者聽為太子舍人齊書左僕射王儉請解領選謂禇彥回曰選曹之始近自漢末今若反古使州郡貢計三府辟士與衆共之猶賢一人之意古者選衆今則不然奇材絶智所以見遺於草澤也梁書天監中沈約上疏曰當今士子繁多略以萬計常患官少才多無地以處秀才自別是一種仕官非若漢代取人之例也假使秀才對五問可稱孝廉答一策能過此乃雕蟲小道何關理功得失以此求才徒虛語爾後魏書孝文時韓麒麟子明宗上言曰前代取士必先正名故有賢良方正之稱今州郡貢察徒有秀孝之名無秀孝之實而朝廷但撿其有門地不復彈坐如此則可別貢門地以敘士人何假置秀孝之名也夫門地者是其父祖之貴烈亦何益於皇家茍有奇才雖屠釣奴虜之賤亦可用之茍非其人雖三后之胄自墜於皂隸矣或云代無奇才不若取士於門此亦失矣豈可以世無周邵便廢宰相而不置哉但當校其寸長銖重者即先敘之則賢才無遺矣北齊書曰課試之法中書策秀才集書策考貢士考功郎中策廉良天子常服乘輿出坐於朝堂中楹秀才各以班草對字有脫誤者呼起立席後書有濫劣者飲墨水一升文理孟浪者奪席脫容刀後周書曰宣帝大成元年詔州舉高才博學者為秀才郡舉經明行修者為孝廉上州歲一人下州三歲一人隋書曰文帝開皇中制諸州貢士歲三人工商不得入仕
