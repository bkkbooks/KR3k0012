body:
  text: 兵部六十三據要吳子曰凡行師越境必審地形審知主客之向背地形若不悉知往必敗矣故軍有所至先五十里內山川形勢使軍士伺其伏兵將必自行視地之勢因而圖之知其險易也戰國策曰秦師伐韓圍閼與趙遣將趙奢救之軍士許曆曰秦人不意趙師至此其來氣盛將軍必厚集其陣以待之不然必敗又曰先據北山上者勝後至者敗趙奢即發萬人趍之秦兵後至爭山不得上趙奢縱兵擊之大破秦軍遂解閼與之圍與音餘後漢書曰諸將征隗囂為所敗光武令悉軍栒邑未及至栒音詢隗囂乘勝使其將王元行巡將二萬餘人下隴因分遣巡取栒邑漢將馮異即馳兵欲先據之諸將皆曰虜兵盛而新乘勝不可與爭宜止軍便地徐思方略異曰虜兵臨境忸𢗗小利忸𢗗猶慣習也謂慣習前事而復為之也忸音尼丑切𢗗音遊也遂欲深入若得栒邑三輔動搖是吾憂也夫攻者不足守者有餘今先據城以逸待勞非所以爭也遂潛往閼城偃旗鼓行巡不知馳赴之異乘其不意卒擊鼓建旗而出巡軍驚亂奔走追擊十里大破之蜀志曰諸葛亮出斜谷是時魏將司馬宣王屯渭南郭淮策亮必爭北原若亮跨渭登原連兵北山隔絕隴道搖盪人夷非國之利也宣王善之淮遂屯北原塹壘未城蜀兵大至淮逆擊走之魏志曰諸葛誕胡遵等伐吳攻東興吳將諸葛恪率軍拒之及恪上岸部將丁奉與唐咨呂據留贊俱從山西上奉曰今軍行遟若敵據便地則難與爭鋒矣乃令諸使下道率麾下三千人遙進時風便奉舉帆二日至遂據塘天寒雪時魏諸將置酒高會奉見其前部兵少相謂曰取封侯爵賞正在今日乃使兵解鎧著冑持短兵敵人從而笑焉不為設備奉縱兵斫之大破敵前屯會據等至魏軍遂潰晉書曰劉𥙿率師伐南燕慕容超晉師度峴慕容超懼率卒四萬就其將叚暉等于臨胊其俱切謂其將公孫五樓曰宜進據川源晉軍至而失水亦不能戰矣臨𦚧有巨薎水去城四十里五樓馳據之龍驤將軍孟龍符領騎居前奔往爭之五樓乃退因而大敗崔鴻十六國春秋曰後秦姚興與前秦符登相持登自六陌向廢橋興乃自將精騎以迫登使將尹緯領步軍據廢橋以抗登困急攻緯緯將出戰興遣使謂緯曰兵法不戰而制人者盖謂此也符登窮寇特宜持重不可輕戰緯曰先帝登遐人情尚擾不因思奮之力梟殄逆豎大事去失矣遂與登戰大破之登眾渴死者十二三其夜大潰又曰夏赫連勃勃屯依力川後秦姚興將王奚聚羗胡三千餘戶于勑奇堡勃勃進攻之奚驍悍有膂力短兵接戰勃勃之眾多為所傷於是堰斷其水堡人窘迫執奚出降梁史曰宋武帝伐姚泓沈林子參征西軍事加建武將軍統軍為前鋒從汴入河偽并州刺史河東太守尹昭據蒲坂林子於陜城與冠軍檀道濟同攻蒲坂龍驤王鎮惡攻潼關姚泓聞大軍至遣偽平公姚紹爭據潼關林子謂道濟曰潼關天岨所謂形勝之地鎮惡孤軍勢危力屈若使姚紹據之則難圖也及其未至當并力爭之若潼關事捷尹昭可不戰而服道濟從之後周書曰東魏將齊神武伐西魏軍過蒲津涉洛至許原西魏將周文帝軍至沙苑齊神武聞周文帝至引軍來會詰朝候騎告齊神武軍且至周文帝部將李弼曰彼眾我寡不可平地置陣此東十里有渭曲可先據以待之遂進軍至渭曲背水東西為陣合戰大破之北史曰安同從道武征姚平於紫壁姚興悉眾救平同進計曰汾東有蒙坑東西三百餘里徑路不通姚興來必定汾西乘高臨下直至紫壁如此則寇內外勢接宜截汾為南北浮橋乘西岸築圍既固賊至無所施其智力矣從之興果視平屠滅而不能救隋書曰文帝初突厥寇蘭州隋將賀婁子幹率眾拒之至可洛峐音哀山與賊相遇賊眾甚盛子幹阻川為營賊軍不得水數日人馬甚弊縱擊大破之唐書曰盛彥師鎮宜陽會李密叛彥師率兵邀之令其眾曰唯我馬首是瞻遂踰洛水入南山令持弓弩者乘高挾路持刀楯者伏於溪谷之間又令曰待賊半度而擊之所部皆笑曰賊向洛州何為守此彥師曰吾籌之熟矣李密聲往洛州其實欲南走襄城就張善相耳若賊先入谷口我自後追之路險難以展力吾今先據要害此賊乃成擒也密果至知有伏乃踰山南上彥師邀擊之封葛國公漕運孫子曰不盡知用兵之害則不得盡知用兵之利故善用兵之者役不再籍糧不再載取用於國因糧於敵故軍食可足兵甲戰具取用國中糧因虛也故國之貧於師者遠師輸也遠輸則百姓貧兵事轉運千里之外財費於道路人有困窮者也近師則貴賣貴賣則百姓虛虛則竭近軍師市多非常之賣當時貪費以趣未利然後貯貨殫盡國家虛也竭則急於丘役力屈中原內虛於家丘十六非也百姓財皆盡兵不解運糧盡力於原野百姓之費十去其七所破費也公家之用破車疲馬甲冑弓矢戟楯矛櫓兵牛大車十去其六計較之也故智將務食於敵食敵一鍾當吾二十鍾六斛四斗為鍾計千里轉運二十鍾而致一鍾於軍中也𦮼杆一石當吾二十石𦮼豆秆槀一石百二十斤也轉輸之法費二十石乃得一石也後漢書曰永平中理呼池石臼河從都虜至羊腸倉酈示水經注云汾陽故城積粟所謂羊腸倉在晉陽西北石磴縈委若羊膓焉故以為名今嵐州界羊膓坂是也石臼河水名欲令通漕水運曰漕太原吏人苦役連年無成轉運所經三百八十九隘前後沒溺死者不可勝算建初三年拜謁者使監領其事訓考量隱括隱審量括之也知大功難立具以上言肅宗從之遂罷其役更用驢輦歲省費億萬計全活徒士數千人又曰第五種拜高密侯相是時徐兗州盜賊群聚高密在二州之郊種乃儲糧蓄勤厲吏士賊聞皆憚之又曰光武即位時軍食急乏寇恂以輦車驪駕轉輸前後不絕前書音義曰驪駕併駕也輦車人挽行也又曰詔報朱浮曰往年赤眉跋扈長安跋扈猶暴橫也吾策其無穀必東來歸降今度此反虜勢無久全其中必有內相斬者今軍資未充故須候耳又曰來歙上書曰公孫述以隴西天水為藩蔽故得延命假息今二郡平蕩則述智計窮矣宜益選兵馬儲積資糧昔趙之將帥多賈人高帝懸之以重賞高帝十年陳狶反於趙代其將多賈人帝多以金購狶將皆降今西州新破兵人疲饉若招以財穀則其眾可奪臣知國家所給非一用度不足然有不得已也帝然之東觀漢記曰來歙征公孫述詔於汧積穀六萬斛驢四百頭負馱蜀國志曰諸葛亮悉大眾由斜谷出以流馬運糧據武功五丈原與司馬宣王對於渭南晉書載記曰羅尚委城遁李雄遂剋成都于時雄軍飢甚乃率眾就穀於郪掘野鼠等食之晉書曰祖逖伐陳留太守陳川石季龍救之徙陳川還襄國留桃豹等守川故城住西臺逖遣將韓潛等鎮東台同一大城賊從南門入放牧逖軍開東門相守四旬逖以布囊盛土如米狀使千餘人運上臺又令數人擔米偽疲極而息於道賊果逐之皆棄擔而走賊既獲米謂逖士眾豊飽而胡戍飢久益懼無復膽氣石勒將劉文堂以驢千頭運糧以饋桃豹逖遣韓潛馮鐵等追擊於汴盡獲之桃豹宵退據東燕唐書曰貞元十五年令江淮轉運米每年宜運二百萬石已來雖有此命而運米竟不過四十萬石又曰韋倫拜啇州刺史兼御史中丞充荊襄等道租庸使會襄州禆將康楚元張嘉延擁眾為叛兇黨萬餘人自稱楚義王襄州刺史王政棄城遁走嘉延又南襲破江陵漢沔饋運阻絕朝廷旰食倫乃調兵駐鄧州界康楚元兇黨有來降必厚加賞數日後楚元眾頗怠倫進軍擊之生擒楚元以獻餘眾悉走收租庸錢物僅二百萬貫並免失墜又曰元和中塩鐵使王播進陳許軍琵琶溝運圖先是中官李重秀奉命視之還言可以通漕至郾城下北潁口水運千里而近及上覽圖詔韓弘發卒以通汴河於是舡勝三百石皆入潁又曰開成初以王彥威判度支嘗紫宸廷奏曰臣自掌計司按見管錢穀文簿皆量入以為出使經費必足無所刻削且百口之家有歲蓄而軍用錢物一切通用悉隨色額占定終歲支給無毫釐之差儻臣一旦愚迷欲自欺竊亦不可得也名曰度支占額圖既而又進供軍國曰起至德乾元之際迄於貞觀元和之初天下有觀察者十節度者二十有九防禦者四經略者三掎角之師犬牙相制大都通邑無不有兵都計中外各額至八十餘萬長慶戶口几三百三十五萬以額約九十九萬通計三戶資一兵今計天下租賦一歲所入惣不過三千五百餘萬而上供之數三之一焉三分之中二給衣賜自留使兵士衣賜之外其余四十萬眾仰給度支伏以時逢理安運屬神聖然而兵不可弭食哉惟時憂勤之端兵食是功臣謬司邦計虔奉圖輒纂事功庶禆聖覽又曰黃巢既來圍陳郡三百日關東仍歲無耕稼人餓倚牆壁間賊俘人而食日殺數千賊有春磨砦為巨碓數百生納人於臼粹之合骨而食其流毒若是又曰秦宗權以蔡州叛所至屠殘人物燔燒郡邑西至關內東極青齊南出江淮北至衛滑魚爛鳥散人煙斷絕荊榛蔽野賊既乏食啖人為儲軍士四出則塩屍而從三國典略曰陳霸先遣錢明領水軍出江寧浦要擊齊人糧運盡獲其舡於是齊軍大餒殺馬驢而食之又曰以糧運不繼調市人餽軍建康令孔奐以麥屑為飯用荷葉裏之室宿之間得數萬褁以給兵士會陳遣送米三千石鴨千頭霸先即炊黍煮鴨誓申一戰計糧分肉人獲數臠絕糧道漢書曰景帝初吳楚七國反以太尉周亞夫問父綘侯客鄧都尉曰策安出客曰吳楚兵銳甚難與爭鋒而剽輕不能久莫若引兵東北壁昌邑以梁委吳吳必盡銳攻之將軍深溝高壘使輕兵絕淮泗之口塞吳饟式亮切道使吳梁相弊而糧食竭乃以全軍強制其疲極破吳必矣亞夫言於帝許之遂破吳軍又曰王莽末天下亂光武兄伯升起兵討莽為莽將甄音真阜梁丘賜所敗復收會兵眾還保棘陽阜賜乘勝留輜重於藍鄉引精兵十萬南度潢淳臨泚水潢音黃泚音蚍阻兩川間為營絕後橋示無還心伯升於是大饗軍士設盟約休卒三日為六部潛師夜起襲取藍鄉盡獲其輜重明晨漢軍自西南攻甄阜下江兵自東南攻梁丘賜至食時陣潰遂斬阜賜後漢書曰韓遂敗走榆中榆沖縣屬金城郡張溫乃遣周慎將三萬人追討之溫參軍事孫堅堅權之父也說慎曰賊城中無穀當外轉糧食堅願得萬人斷其運道將軍以大兵繼後賊必困乏而不敢戰若走入羗中并力討之則涼州可定也慎不從引軍圍榆中城而邊章遂分屯葵園峽反斷慎運道慎懼乃棄重而退又曰曹公與袁紹相持官度沮授言於紹曰北兵數眾俎側居切而果勁不及南南穀虛少而貨財不及北南利在於急戰北利在於緩持宜曠以日月紹不從連營稍前逼官度合戰曹公軍不利復壁紹為高櫓起土山射營中皆蒙楯眾大懼曹公乃為發石車擊紹樓皆破眾號霹靂車紹為地道欲襲曹公營公輒於內為長壍以拒之又遣騎兵襲擊紹運車大破之盡焚其穀會紹遣淳于瓊等將兵萬餘人北迎運沮授說紹可遣將別為軍於表以絕曹公之抄紹復不從瓊宿鳥巢去紹軍四十里紹謀士許攸奔曹公攸謂曹公曰孤軍獨守外無求索危急之時也今袁氏輜重有萬餘兩而無嚴備可輕兵襲之不慮而至燔其積聚不過三日袁氏自敗也公乃選精銳馬步秉袁氏旗幟夜衘枚縛馬口從間道出人負束薪時有問者紿之紿音怠曰袁公恐曹操掠後軍兵以益備聞者信之既至輜重圍屯燎薪火光亘天地破瓊等悉斬之數日紹棄甲而遁蜀志曰姜維率眾侵魏依麴山筑二城使牙門將勾安李韶等守之聚羗胡質任寇逼諸郡魏將陳泰禦之泰謂諸將曰麴城雖固去蜀險遠當須運糧羗夷患維勞役必未肯附今圍而取之可不血刃而拔其城雖其來救山道險阻非行兵之地乃使鄧艾等進兵圍之斷其運道及城外流水安等挑戰不許將士困窘分糧聚雪以稽日月維果來救出自牛頭與泰相對泰曰兵法貴在不戰而屈人今絕牛頭維無返道則我之擒也諸軍各堅壘勿與戰自南度白水循水而東使諸將截其還路維懼遁走安等孤懸遂皆降崔鴻十六國春秋曰前趙劉曜遣將劉胤西伐張駿之武威駿將遣辛巖韓瑛音英東拒劉胤屯于狄道城韓瑛進度沃于嶺辛巖曰我掘眾數萬籍玄羗之銳宜速戰以滅之不爾久則變生瑛曰自夏末以來太白犯月辰星逆行白虹貫日皆變之大者不可以輕動動而不捷為禍更深吾將久而斃之且曜與石勒相攻胤亦不能久積七十餘日軍糧竭遣辛巖督運於金城胤聞之大悅謂其將士曰韓瑛之眾十倍於吾糧廩將懸難以持久今分兵運糧可謂天授吾若敗辛巖英等自潰彼眾我寡宜以死戰戰而不捷當無疋馬得還咸奮於是率騎三千襲巖於沃于嶺大敗之瑛軍遂潰死者三萬餘人三國典略曰周王思政固守潁川思政運米數百車欲向孔城齊大都督破六韓常與洛州刺史可朱渾寶願前後要襲獲之乃啟于齊王澄曰常自鎮河陽已來頻出關口大谷二道所有要害莫不知悉請於形勝之處營築城戍安置士馬截其往來彼之咽喉既斷潁城吞滅可期且孔城以西年穀不稔東道斷絕亦不能存王納其計
