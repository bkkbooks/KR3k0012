body:
  text: 飲食部十三豉釋名曰豉嗜也五味調和須之而成乃可甘嗜也故齊人謂豉聲如嗜史記曰蘗麪鹽豉千荅徐廣曰或作合器名謝承後漢書曰羊續為南陽太守鹽豉共壺袁宏漢紀曰李𠐶數設酒請郭汜或留汜汜妻懼與𠐶婢妾私而奪己愛思有以離間之𠐶送饋汜妻乃以豉為藥汜將食妻曰食從外來儻或有故遂摘藥示之曰一栖不兩雄我固疑將軍之信李公也明日𠐶請汜大醉汜疑𠐶藥之絞糞汁飲之乃解於是遂相疑猜也三輔決錄曰南陽舊語曰前隊大夫范仲公鹽豉蒜果共一䇶言其廉儉也豫章列士傳曰羊茂為東郡太守出界買鹽豉愽物志曰外國有豉法以苦酒溲豆暴令極糝以油麻蒸訖復暴三過乃止然後細擣椒屑篩下隨多少合投之金樓子曰五色茄一名金鹽地榆一名玉豉惟此二物可以煮石廣志曰苦秦豉也楚辭招魂曰大苦酸醎大苦謂豉辛甘行言取豉調和以椒姜鹹酢酪則辛甘之味皆發而行古歌曰美豉出魯門齏周禮曰醯人掌共五齊昌本脾折蜃豚拍深蒲也記曰卒食客自前跪徹飯齏以授相者釋名曰蟹齏去其匡熟擣合如齏也通俗文曰淹韭曰齏淹薤曰𩐌東觀漢記曰王莽將敗北海逢萌載齏器於市曰辛乎因潛藏不見魏志曰華佗嘗見病咽塞者語之曰向來道隅有賣餅人萍齏甚酸可取三升飲之如言立吐一虵王隱晉書曰袁甫曰美莫過稻不可以為齏語林曰石崇嘗冬月得韭齏王愷貨崇帳下督云是擣韭根雜以麥苗耳楚辭曰懲於羹者而吹虀又曰吳酸毛蔞不沾薄毛菜也言吳人善為致美其菜若蔞味無沾薄言有調也又曰蒿也蔞不沾簿繁草也蔞香沾多汗也薄無味也言吳人工調鹹酸使偷蒿蔞以為虀味酸又不薄適甘美人也崔寔四民月令曰八月收韭菁作擣齏弘君舉食檄曰大市覆甖之蒜東里獨姥之醯大鹽雜以薑椒叛奴使之春齏嶺表異錄曰容南土風好食水牛肉言其脆美則柔毛肥彘不足比也每軍衙有局筵必先此物或炮或炙盡此一牛既飽即以聖齏銷之聖齏如有菘云是牛腸胃中已化草既至即以鹽酪薑桂調而啜之腹遂不脹北客到彼多赴此筵但能食肉罔有啜齏者
