body:
  text: 文部二十二簡説文曰簡牒也釋名曰簡書編也言間也爾雅曰簡謂之畢郭嘆曰今簡札也毛詩鹿鳴曰豈不懷歸畏此簡書張璠漢記曰吳祐父恢為南海太守欲以殺青寫書祐年十二諫曰海濱多珍玩此書若成載必盈兩昔馬援以薏苡興謗王陽以書橐邀名疑惑之戒先賢所慎恢大喜范曄後漢書曰大司徒鄧禹西征定河東張宗詣禹自歸禹聞宗多權謀乃表為將軍禹軍到恂邑赤眉大衆且至禹以恂邑不足守欲引師進就堅城而衆人多畏賊追憚為後拒禹乃書諸將名於竹簡署其前後亂著笥中令各探之宗獨不肯探曰死生有命宗肯辭難就逸乎禹歎息謂曰愚聞一卒畢力一百人不當萬夫致死可以橫行宗今擁兵數千以承天威何遽其必敗乎魏略曰宣王討王陵陵面縛迎遙謂太傅曰卿直以折簡召我我當不至耶而引軍來乎太傅曰以卿非肯逐折簡者也瀨鄉記曰老子母碑曰老子把持仙録玉簡金字編以白銀紀善綴惡楚國先賢傳曰孫敬編楊柳簡以為經本晨夜誦習劉向別傳曰孫子書以殺青簡編以縹絲繩文士傳曰人有嵩山下得竹簡一版上有兩行科斗之書中外傳示莫能知張華以問束晢晢曰此明帝顯節陵中策文也驗校果然風俗通曰劉向別録殺青者直治竹作簡書之耳新竹有汁善折蠹凡作簡者皆於火上炙乾之陳楚間謂之汗汗者去其汁也吳越曰殺亦治也劉向為孝成皇帝典校書籍二十餘年皆先書竹改易刊定可繕寫者以上素也由是言之殺青者竹斯為明矣神仙傳曰陰長生裂黃表寫丹經一通封以文石之函著嵩高山一通黃櫨簡染之書封以青玉之函著華山一通黃金之簡刻而書之封以白銀之函著蜀綏山策廣雅曰策謂之簡釋名曰策書教令於上所以驅策諸夏也漢制約勑封侯曰策策賾也勑使整頤不犯法也史記曰百名以上則書於策春秋序曰大事書之於策小事簡牘而已後漢書曰何敞父比干字少卿為汝陰縣獄吏決曹椽平活數千人後為丹陽都尉獄無冤囚征和三年三月辛亥天大陰雨比干在家日中夢車騎滿門覺而語妻語未竟而門有老嫗求寄避雨雨甚而衣不霑雨止送至門謂此干曰公有陰德天賜君以策以廣公之子孫因出懷中符策狀如簡長九寸凡九百九十枚以授比干曰子孫佩印綬者如此數比干年五十八有六男又生三子本始元年自汝陰徙平陵代為名族吳曆曰孫皓時吳郡民掘地得物似銀長一尺三寸刻畫有年月字因改年為天策唐書曰貞觀中房玄齡議封禪儀玉策四枚名長一尺三寸廣一寸五分厚五分每策五簡俱以金編其一奠太祖一奠地祇一奠高祖穆天子傳曰癸巳至於群玉之山阿平無險言邊無險阻也四徹中繩言皆平直先王之謂策府言往古帝王以為藏書策之府家語曰哀公問政於孔子孔子曰文武之政布於方策牘説文曰牘謂書板也釋名曰牘睦也身執之以進見所以為恭睦也史記曰文帝遺單于尺一寸牘單于以尺二寸牘答又曰東方朔初入長安至公車上書凡用三千奏牘公車令兩人共持舉其書僅能勝之人主使從上方讀之止輒記其處讀之二月乃盡詔拜以為郎東觀漢記曰時天下墾田多不實詔撿覆核百姓嗟怨諸郡遣合帝見陳留吏牘上有書視之云潁川弘農可問河陽南陽不可問上得之怒時東海公年十二在幄後言曰吏受郡勑欲以懇田相方耳帝曰即如此何故言河陽南陽不可問對曰河南帝城多近臣南陽帝鄉多近親田宅踰制不可為準帝令虎賁詰問吏吏首服遣謁者栲實具知姦狀夢書曰牘札為薦舉夢得牘札欲薦舉也韓詩曰趙簡子太子名伯魯小子名無恤簡子自為二牘親自表之書曰節用聽聰敬賢勿慢使能勿賤與二子使恆誦之居三年簡子坐青臺之上問二子書所在伯魯亡其表令誦不能得無恤出其書於左袂令誦習焉乃黜伯魯而嘉無恤韓詩外傳曰趙簡子有臣周舍立於門下三日三夜簡子問其故對曰臣為君諤諤之臣秉筆操牘從君之後伺君過而書之札劉熙釋名曰札櫛也編之如櫛齒相比也晉令曰郡國諸戶口黃籍籍皆用一尺二寸札已在官役者載名漢書曰司馬長卿未死時為一卷書曰有使來求奏之其遺札書言封禪事又曰谷永字子雲便於筆札故時人云子雲之筆札婁君卿之脣舌後漢書曰樊崇等西攻更始百萬之衆而無稱號欲立帝求軍中景王後者得七十餘人唯盆子與茂及前西安侯為最崇等議曰聞古天子將兵稱上將軍乃書札為符曰上將軍又以兩空札置笥中札簡也笥篋也遂於鄭北設壇場祠城陽景王諸三老從事皆大會陛下列盆子三人居中立以年次探札盆子最幼後探得符諸將乃皆稱臣續漢書曰賈逵字景伯時有神雀入宮章帝勑蘭臺給筆札使逵作神雀頌晉張華有文雅之才晉儀禮釐革制度勑有司給筆札多有損益晉陽秋曰梁國張惲字義元為郡吏入值太守圍棊投札於地惲曰知府君患風取以支戶太守輟棊令坐漢武故事曰上崩後有一人騎馬馬異於常馬持一尺札賜將作大匠丞文曰汝績克成賜汝金十斤因忽不見札變為金稱之重十斤抱朴子曰魏武帝以左慈為妖妄欲殺之使人收之慈故欲見而不去欲栲之而獄中有七慈形狀如一不知何者為真以白武帝帝使人盡將殺之須臾七慈盡化為札而一慈徑出走赴群羊詩云有客從南來貽我一書札上敘長相思下言久離別牒説文曰牒札也文心雕龍曰牒者葉也如葉在枝也短簡為牒議事未定故短牒咨謀牒之尤密謂之籤左傳昭六年曰趙簡子令諸侯大夫輸王粟宋樂大心曰我不輸粟我於王為客二王後為賓客晉士伯曰自踐土以來宋何役不會而何盟不同王室子焉避之右師不敢對受牒而退右師樂大心也漢書曰路溫舒字長君巨鹿東野人父為里監門使溫舒牧羊取澤中蒲截為牒編用寫書板釋名曰板昄昄平廣也昄半旱切春秋演孔圖曰孔子曰丘作春秋天授演孔圖中有大玉刻一版曰珽璣一低一昂是七期驗敗毀滅之徵也蜀志曰譙周勸劉禪降後元熙二年夏巴郡文立從洛還過見周周語次因書板示立曰典午忽兮月酉沒兮典午者謂司馬也月酉八月也至八月而司馬昭果崩王隱晉書曰惠帝時謠曰二月盡三月初桑生裴雷柳葉舒荊筆楊板行詔書宮中大司馬作幾驢而楊駿荊王反幽明録曰五文度鎮廣陵忽見二騶持鵠頭板來召之王大驚問騶我作何官云尊作平北將軍徐兗二州剌史王曰吾已作此官何故復召耶鬼云此人間耳且令所作是天上官也王大懼亦尋見迎官玄衣人及鵲衣小吏甚多王尋疾薨桂陽先賢畫讚曰胡滕部南陽從事遇大駕南巡求索揔猥滕表曰天子無外乘輿所幸便為京師臣請荊州剌史比司隸臣比都官從事帝奇其才悉許大將軍西曹椽亡馬召滕因作都官鵠頭板召百官敬服相板經曰板有芒角形勢上狹下廣右薄左厚光采流澤文色調達木理通直皆為吉反是凶板細理輕蹙其人性簡達周正其人寬博板有橫節為病在面內喪在背外喪板有蝎穿及節對過其人凶板中字皆令筆迹調利有形勢字欲當右行空中不用對對則多牽制又上官多憎之官字欲令故官字小新官字大有波勢墨色分明板形平通無絶傷刀迹是元吉官字無形勢點染不分明皆免官或不到官官字小它字墨散入材理中必入獄死板色欲類其姓角家板色青為吉亦不宜子白不利官屬墨不利父母黃不利妻財凡齎板來者其人姓名善為喜祥不善則否也相板時要以手持板之若手近板後則板前低而落此則左遷板有病纍皆可治改治之用庚申寅曰庚更也申伸也寅引也言更引吉祥也剌釋名曰畫姓字於奏上曰畫剌作再拜起居字皆達其體使書盡邊徐引筆書之如畫者也下官剌長書中央一行而下也又有爵里剌書其官爵及郡縣鄉里也典略曰王符字節信安定人感激著書名曰潛夫論故渡遼將軍皇甫規去官歸安定或有人前以貨買鴈門太守者亦去官歸畫剌規規臥不迎使人呼入既坐問啖鴈美乎又以其剌刮髀有頃聞王節信在外規乃驚起衣不及帶倒履而出援其手而還與同席坐大設賓日暮別去人或歎曰何有二千石之賤不如諸生之貴乃如此耶魏名臣奏曰黃門侍郎荀俁奏曰今吏初除有二通爵里剌條疏行狀夏侯榮傳曰榮宇幼權淵第五子幼聰明經目輒識文帝聞而請焉賓客百餘人一奏剌悉書其鄉邑姓名世所謂爵里剌示之一過而使之遍談不謬一人帝奇之長沙耆舊傳曰夏侯叔仁氏族單微丁母憂居喪過禮同郡徐元休弱冠知名聞而弔焉旬日之中積剌盈案吳録曰孟宗為豫章太守謂倉掾曰君昔負太守一剌寧識之否掾曰不識宗曰吾昔家貧親老為官賃運以剌詣君感見發遣何乃久屈耶雜事曰高彪字義方吳郡人志尚甚高遊太學博覽經史善屬文嘗詣大儒馬融辭不見彪覆剌其書曰伏聞高問為日久矣冀一見龍光敘腹心之願以啓其蔽不圖辭之以疾昔周公父文王兄武王九命作相以尹華夏猶握沐吐食以接白屋之士天下歸德歷載邈矣今君不能相見宜哉融省大愧遣人辭謝追請徑去不肯還郭林宗別傳曰林宗名益顯士爭歸之載剌常盈車禰衡別傳曰衡初遊許下乃懷一剌既到而無所之適至於剌字漫滅幽明録曰一士人姓王坐齋中有一人通剌詣之題剌云舒甄仲既去疑非人尋剌曰是豫舍西士瓦中人令掘果於瓦器中得一銅人長尺餘函吳志曰張溫字惠恕使蜀謂先主曰謹奉所齎函書封晉安帝紀曰朱齡石伐蜀太尉與齡石書署函曰至白帝乃發書曰衆悉從外水取成都臧燾於中水出廣漢使嬴弱乘高艦十餘由內水向黃虎傳子曰太祖徵劉曄授以腹心之任每有疑事輒以函令問曄乃一夜數十至帙説文曰秩書衣也晉中經簿曰盛書有縑帙青縑帙布帙絹帙後漢書曰楊春卿臨命戒子統曰吾綈帙中説文曰綈厚繒也綈音提有先祖所傅祕記為漢家用爾其修之統感父遺言服闋辭家從捷為周修學習先法又就同郡鄭伯山受河洛書及天文推步之術益部耆舊傳曰廣漢王棠妻文拯其前妻子博學好寫書拯嘗為手自作帙常過其意宋謝靈運書祑銘曰懷幽卷頤戢妙抱密用舍以道舒卷不失亮唯勤玩無或暇逸梁昭明太子詠書帙詩曰擢影免園池抽莖淇水側幸雜緗囊用聊因班女織槧説文曰槧牘牒也釋名曰槧板長三尺者也槧漸也言漸漸然長也論衡曰斷木為槧揚雄答劉歆書曰以鉛擲松槧二十七年矣西京雜記曰揚子雲好事嘗懷鉛提槧從諸計吏訪殊方絶俗四方之語㨭後漢杜篤書㨭賦曰惟書㨭之麗容象君子之淑德載方矩而履規加文藻之修飾能屈伸以和禮惟高下而消息雖轉旋而屈橈時傾邪而返側抱六藝而卷舒敷五經之典式封泥書春秋説曰龍圖赤玉匣封泥如黃珠又曰黃龍五采負圖黃玉匣黃金繩縷黃芝泥王子年拾遺曰元封元年浮折國貢蘭金之泥此金湯淵盛夏之時水常沸湧有若湯火飛鳥不能過國人行者見水邊有人治此金為器混混若泥如紫磨之色百鍊其色變白如銀名曰銀燭嘗以此泥封諸函匣令諸宮門鬼魅不敢干當漢世上將出征多以泥為印封衛青張騫蘇武傅介子之使皆受金泥之璽封也續漢書曰光武封禪乃求元封封禪事奏用玉牒玉撿以水銀和金為泥東觀漢記曰鄧訓嘗將黎陽營兵屯狐奴後遷護烏桓校尉黎陽故吏最貧羸者舉國志訓嘗所服藥北州少乏又知訓好青泥封書從黎陽步推鹿車於洛陽市藥還趙國昜陽並載青泥一襆至上谷遺訓其得人心如是西京雜記曰漢以武都紫泥為璽室加綈其上水滴器西京雜記云晉靈公冢甚瑰壯器物皆杇不可別唯玉蟾蜍一枚大如拳腹空容五合如新玉取以成水滴硯傅玄水龜銘曰鑄茲靈龜體象自然含源未出有似清泉潤彼玄墨染此弱翰申情寫意經緯群言
