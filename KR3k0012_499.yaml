body:
  text: 人事部一百三十九簡傲詩曰兕觥其觩旨酒思柔彼交匪傲萬福來求禮曰傲不可長欲不可縱樂不可極春秋曰衛侯饗苦成叔寧惠子相苦成叔傲寧子曰苦成家其亡乎古之為享食也以觀威儀省禍福也論語曰居簡而行簡無乃太簡乎韓詩外傳曰田子方之魏魏太子從車百乘迎之於郊太子再拜謁子方不下車太子不悅曰敢問何如則以驕人矣子方曰吾聞以天下驕人而亡者有矣以一國驕人而亡者有矣由此觀之則貧賤可驕人矣士志不得則授履之秦楚耳安往而不得貧賤乎於是太子再拜而後退子方遂不下車孔叢子曰子思居衛曾子謂子思曰昔吾從夫子巡於諸侯未嘗失其人臣之禮而猶聖道不行今吾觀子有慠世之心無乃不容乎子思曰時移勢異各有宜也當吾先君周制雖毀君臣固位上下相持欲行其道不勞以求之則不能入也今天下諸侯方欲力爭競招英雄以自輔翼此得士則昌失士則亡之秋也不自高人將下吾不自貴人將賤吾舜禹揖讓湯武用師非故相詭乃時也耳華嶠後漢書曰趙一字元淑恃才倨傲為鄉里所擯東觀漢記曰博士范升奏曰伏見太原周黨解履升華轂陛下見帝庭偃蹇慠慢逡巡進退臣願與並論靈臺之下魏略曰丁謐少不肯交遊但博觀書傳為人亢毅頗有才略太和中常於鄴借人空屋其中而諸王亦欲借之不知謐已得直開門入謐望見王交腳臥不起而呼其奴客曰此等人促呵使去王怒其無禮還具上聞之明帝收繫鄴獄以其功臣子原之蜀志簡雍字憲和涿郡人與先主有舊性簡慠跌蕩在先主座席猶箕倨傾倚威儀不肅自從適諸葛亮已下則獨擅一榻傾枕臥語無所為屈蜀志曰彭羕字永年廣漢人身長八尺容貌甚偉姿性驕慠多所輕忽唯敬同郡秦子整王隱晉書曰魏末阮籍有才而嗜酒荒放露頭散髮裸袒箕踞作二千石不治官事日與鈴下共飲酒歌呼時人或以籍生在魏之交欲佯狂避時不知籍本性自然也干寶晉記曰呂安友嵇康相思則命駕千里從之或遇其行康兄喜位至方伯拭席而待弗之顧也獨宿車中康母設酒求康兒共戲則去鄧粲晉記曰劉伶常著袒服而乘鹿車客有詣伶值其裸袒責伶伶笑曰吾以天為屋以屋為褌諸君不當入中又何怨乎其自任若此又曰胡母輔之過河南門下將飲酒河南卒王子博倨坐其傍輔之叱使取火子博曰我卒也唯不乏吾事安能為人使輔之與語歎曰吾弗及也因言河南尹以為功曹習鑿齒漢晉陽春秋曰陳蹇兄丕有名於世與夏侯玄親交玄拜其母蹇時為中領軍聞玄會於其家悅而歸既入戶玄曰相與未至於此蹇當戶立良久曰如君言乃趨而出意氣自若玄大以此知之後魏書曰季栗鴈門人也性簡慢務寵不率禮度每在太祖前舒放倨傲不自祗肅笑唾任情太祖積其宿過天興三年遂誅之於是威嚴始厲制勒群下盡卑謙之禮自栗始也後魏書曰元順字子和起家為給事中時尚書令高肇帝舅權重天下人士望塵拜伏順曾懷剌詣肇門門者以其年少答云在座大有賓客不肯為通順叱之曰任城王兒可是賤也及見直往登床捧手抗禮王公先達莫不怪懼而順辭吐傲然若無所覩謂衆曰此兒豪氣尚爾況其父耶澄聞之大怒杖之數十晉中興書曰蔡謨讓司徒李宗臨軒遣侍中璩黃門郎丁纂徵謨謨陳疾篤使主簿謝攸對自平旦至日中使者十餘反而謨不至孝宗時年八歲甚怪之極問左右曰所召何人何以至今不來軒臨何當竟會稽王曰蔡公慠違上命無人臣之禮若人主卑屈於上大義不行於下亦不知復所以為治於是奏送謨廷尉以正刑書謨懼率子弟素服詣闕稽顙到廷尉待罪皇太后詔可依舊制免為庶人沈約宋書曰會稽太守孟顗事佛精懇而為謝靈運所輕嘗謂顗曰得道應須慧業丈人生天當在靈運前成佛必在靈運後顗深恨此言禰衡傳曰衡字正平建安初自荊州北遊許都恃才慠逸臧否過差見不如己者不肯與言語人皆以是憎之文士傳曰阮籍從容曰平生曾遊東平縣樂其土風願得為東平太守文帝大悅即從之籍便騎驢徑到郡至皆壞壁障內外相望教令清當十餘日便騎驢歸淮南子曰賓有見人於季子者賓出季子曰子之賓獨有三過望我而笑是慢也談語而不稱師是叛也交淺而言深是亂也賓曰望君而笑是公也談語不稱師是通也交淺而言深是忠也故賓之賓客一體也或以為小人或以為君子視之異也物理論曰今有呂子義清賢仕為率更令有人就之宿非其度數之內子義燃燭危坐通曉目不轉睛膝不移處會稽典録曰嚴光一名遵帝引入論故舊纍日因共臥光以足加帝腹上明日太史奏客星犯帝坐甚急帝曰朕故人嚴子陵共臥耳語林曰羅含在宣武坐人介與他人相識含正容曰所識已多不煩復爾世説曰王子猷作桓溫車騎參軍桓謂王曰卿在府久當相斷理王初不答直高視手板柱頰云西山朝來致有爽氣應璩與崔元書曰豈有亂首抗巾以入都城衣不在體而以適人乎昔戴叔鸞箕坐見邊文祖此皆衰世之慢行也晉書曰何綏性既輕物翰札簡傲城陽王尼見綏書疏謂人曰伯蔚居亂而矜豪乃爾豈其免乎晉書曰謝奕與桓溫善溫辟為安西司馬猶推布衣好在溫坐岸幘嘯詠無異常日溫指曰我方外司馬又曰王獻之嘗經吳郡聞顧辟強有名園先不相識乘平肩輿徑入時辟強方集賓友而獻之遊歷既畢傍若無人辟強勃然數之曰傲主人非禮也以貴驕士非道也失是二者不足齒之傖耳便驅出門又曰王導子恬性傲誕不拘禮法謝萬嘗造恬既坐少頃恬便入內萬以為必厚待己殊有喜色恬久之乃沐頭髮而出據胡床於庭中曬髮神氣慠邁竟無賓主之意萬帳然而還又曰王徽之字子猷性卓犖不羈大司馬桓溫參軍蓬首散帶不綜府事又為車騎桓沖騎兵問卿署何曹對曰似是馬曹又問管幾馬曰不知馬何知數又問馬比死多少曰未知生焉知死嘗從沖行值暴雨徽之因下馬排入車中謂曰公豈得獨擅一車又曰劉伶常著袒服乘車客有詣伶值其裸袒責伶伶曰吾以天為屋以屋為褌諸君不當入中又曰謝萬既受任北征矜豪傲物常以嘯詠自高未嘗撫衆兄安深憂之自隊主將帥已下安無不慰勉謂萬曰汝為元帥諸將宜數接對以悅其心豈有慠誕若斯而能濟事也萬乃召集諸將都無所説直以如意指四座云諸將皆徑卒諸將益恨之又曰周顗王導甚重之嘗枕顗膝而指其腹曰卿此中何所有也答曰此中空洞無物然足容卿輩數百人導亦不以為忤又於導座慠然嘯詠導云卿欲希嵇阮耶顗曰何敢近捨明公遠希嵇阮又曰王澄為荊州刺史澄將之鎮送者傾朝澄見樹上鵲巢便脫衣上樹探鷇而弄之神氣肅然傍若無人劉琨謂澄曰卿形雖散朗而內實動俠以此處世難得其死澄默然不答宋書曰張敷遷中書舍人與狄當周赴並管要務以敷同省名家欲詣之赳曰彼若不相容便不如不往詎可輕往耶當曰吾等並已員外郎何憂不得共坐敷先設二床去壁三四尺二客就席酬接甚歡既而呼左右曰移我遠客赳等失色而去又曰陶潛有造之者設酒潛若先醉便語客曰我醉欲眠卿可去宋書曰張敷永興初遷祕書郎嘗在省直中書令傳亮聞其好學過候之敷臥不即起亮怪而去齊書曰張欣泰領羽林監欣泰通涉雅俗交結多是名素下直輒遊園池著鹿皮冠納衣錫杖挾素琴有以啓世祖曰將家兒何敢作此舉止齊書丘靈鞠好飲酒臧否人物在沈淵座見王儉詩淵曰王令文章大進靈鞠曰何如我未進此言達儉靈鞠宋世文名甚盛入齊頗減蓬髮弛縱無形儀不治家業王儉謂人曰丘公仕官不進才亦退矣梁書曰何點雖不入城府而邀遊人世不簪不帶或駕柴車躡草屩恣心所適致醉而歸士大夫多慕從之時人號為通隱隋書曰崔儦每以讀書為務負恃才地忽略世人大署其戶曰不讀五千卷書者無得入此室數年之間遂博覽群言多所通涉唐書曰鄭仁表洎之子也文章尤稱俊拔然恃才傲物人士薄之自謂門地人物文章具美嘗曰天瑞有五色雲人瑞有鄭仁表劉鄴少時投文於洎仁表兄弟嗤鄙之咸通末鄴為宰相仁表竟貶死南荒又曰崔元翰入朝為太常博士禮部員外郎竇參輔政用為知制誥詔令溫雅合於典謨然性太剛褊簡傲不能取容於時每發言論略無阿徇忤執政旨故掌誥二年而官不遷又曰李白嘗醉令高力士脫靴由是斥去乃浪迹江湖終日飲沉時侍御史崔宗之謫官金陵與白詩酒唱和嘗月夜乘舟自採石達金陵著白衣宮錦袍於舟中顧瞻嘯傲傍若無人初賀知章見白賞之曰此天上謫仙人也耶歈説文曰人相笑相耶歈也東觀漢記曰光武令王霸至薊市中募人將以擊王郎市人皆大笑舉手耶歈之霸慚遽而返續晉陽秋曰襄陽羅友家貧嗜酒伺人祠祀往乞餘在桓溫府屢以貧乞祿溫以其誕肆許而不用同府人有得郡者溫為坐別友亦被命至尤晚溫問之答曰友欽道嗜味昨奉教乃守旦出門於中路遇一鬼大見耶歈曰見汝送人作郡不見人送汝作郡友始怖終慚不覺淹緩溫笑用之為郡也
