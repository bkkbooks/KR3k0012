body:
  text: 羽族部四鴈禮記曰孟春之月鴻鴈來季秋之月鴻鴈來賓季冬之月鴈北鄉儀禮婚禮曰下達納采用鴈又士相見曰大夫相見以鴈飾以布維之以索如執雉鴈知時飛翔有別也飾之以布謂裁縫之其身也維謂繫聯其足又聘禮曰私覿出如舒鴈威儀自終而有行列舒鴈鵝左傳曰鄭徐吾犯之妹美公孫楚聘之矣公孫黑又使強委禽焉禽鴈也納采用鴈毛詩曰雍雍鳴鴈旭日始旦尚書舜典曰修五禮玉三帛二牲一死贄孔傳曰大夫執鴈爾雅曰鳧鴈醜其足蹼郭璞曰腳指間有幕蹼屬相著春秋說題辭曰鴈之言鴈鴈起聖以招期知晚蚤故鴈南北以陽動也鴈鴈音聲貌也聖王聞鴈鴈有音聲知為時節鴈鳥隨日南以常動春秋繁露曰凡贄大夫用鴈有類長者在民上必有先後鴈有行列故以為贄廣雅曰𪀉鵝會𪀉鴈也周書曰白露之日鴻鴈來鴻鴈不來遠人背畔小寒之日鴈北鄉鴈不北鄉民不懷至史記曰蘇武在胸奴中昭帝遣使通和常惠夜見漢使使謂單于曰天子射上林中得鴈足有係帛書言武等在某澤中使者如其言單于大驚乃使武還漢書曰梁孝主於睢陽園中作鳧鴈池又曰武帝太始三年幸東海獲赤鴈作朱鴈之歌後漢書曰度遼將軍皇甫規解官歸安定鄉人有以貨買鴈門太守者亦去職還家書剌謁臥不迎既入而問卿前在郡食鴈美乎北史曰齊斛律光從文襄出野見雙鴈飛來文襄使明月馳射之以二矢俱落焉又曰尉遲逈之亂也隋將史萬歲從梁士彥擊之軍次馮翊見群鴈飛來萬歲謂士彥曰請射行中第三者射之應弦而落三軍莫不悅服三國典略曰徐思王壽陽人家本寒微以捕鴈為業晉史曰朱漢賓少時善射嘗因與同輩出獵指一飛鴈隨矢而落其鏃正中其臆臆上貫一金錢有篆文示其郡之碩學皆無識者人甚異之由是人皆號之朱落鴈莊子曰莊子行於山中見大木伐木者止其傍而不取問其故曰無所用莊子曰此木以不材得終其天年出於山及邑舍故人家故人喜具酒肉令豎子殺鴈烹之豎子請曰其一鴈能鳴其一不能鳴奚殺主人公曰殺不能鳴者明日弟子問曰昨日山中之木以不材得終其天年主人之鴈以不材而死先生何處焉莊子嘆曰周將處夫材與不材之間淮南子曰夫鴈從風飛以愛氣力銜蘆而翔以備弋𥐊山海經曰鴈門山鴈出其間在高柳北家語曰孔子之衛衛公與孔子語見飛鴈過而仰視之色不在孔子孔子乃逝賈誼書曰鄒穆公令食邊鴈必以秕無敢以粟說苑曰秦穆公得百里奚公孫友歸取鴈以賀曰吾得社稷之臣敢賀社稷之福公不辭再拜而受又曰齊晏子對景公曰君之鳧鴈食以菽粟又曰大夫以鴈為贄鴈者有長幼之禮士以雉雉者取其不可狎服庶人以鶩鶩以其無他心也白虎通曰贄用鴈者取隨時南北不失其節明不奪女子之時揚雄方言曰自關而東謂鴈鵝南楚之外謂之鵝或謂之倉𪀉博物志曰鴈食粟則翼重不能飛會稽典録曰虞固字季鴻少有孝行為日南太守常有雙鴈止宿廳事上每出行縣輒飛逐車卒官鴈遂哀鳴還至餘姚住墓前歷二年乃去梁州記曰梁州縣界有鴈塞山傳云此山有大池水鴈棲集之固因名曰鴈塞盛弘之荊州記曰鴈塞北接梁州汶陽郡其間東西嶺屬天無際雲飛風翥望崖回翼鴈達塞矯翼裁度故名鴈塞同於鴈門也鄧德明南康記曰平固縣有覆笥山上有湖周回十里有一石鴈浮出湖中每至秋天石鴈飛鳴如候時也十三州記曰上虞縣有鴈為民田春銜拔草根秋喙除其穢是以縣官禁民不得妄害此鳥犯則有刑無赦荊州圖記曰沮陽縣西北有鴈浮山是山經所謂景山也高三十餘里周回三百里修巖遐亙擢幹干霄鴈南翔北歸偏經其上士人由茲改山名焉五色鴈漢書郊祀志宣帝於西河築世宗廟告祀有五色鴈集殿前唐書曰貞元十年同州獻五色鴈白鴈左傳哀上曹伯陽即位好田弋曹鄙人公孫疆好弋獲白鴈獻之且言田弋之說因訪政事大說之有寵使為司城以聽政新語曰梁君出獵見白鴈而欲自射之道上有驚鴈飛者梁王怒命以射此人其御公孫龍諫曰昔衛文公時大旱三年卜云必須人祀文公曰求雨者為民也今殺之不仁吾自當之言未卒雨下今君重鴈殺人何異虎狼梁君引龍登車入郭呼萬歲曰善哉今日獵得善言晉書載記建元初石季龍饗群臣于太武殿前有白鴈百餘集于馬道南季龍命射之無所獲雉春秋運斗樞曰機星散為雉周禮春官太宗伯曰士執雉鄭玄注曰取其守介不失節儀禮士相見曰士相見之贄各用雉士贄用雉者取其耿介交有時別其倫也禮記曲禮下曰祭宗廟雉曰疏趾又月令曰孟冬雉入水為蜃又曰季冬之月雉雊雞乳左傳昭四曰郯子云丹鳥氏司閉五雉為五工正杜預注曰丹鳥驚雉也立秋來立冬去入水為蜃五雉雉有五種也又曰叔孫豹奔齊齊庾宗婦人獻以雉問其姓曰豫子長矣能捧雉而從我矣毛詩邶柏舟曰雄雉剌衛宣公也淫亂不恤國政雄雉于飛泄泄其羽我之懷矣自貽伊阻雄雉于飛下上其音展矣君子實勞我心又曰有瀰濟盈有鷕雉鳴鷕雉鳴聲又曰如翬斯飛君子攸躋又節小辨曰雉之朝雊尚求其雌又甫田車轄曰瞻彼中林有集惟鷸毛詩義疏曰林慮山下人語曰四足之美有鹿兩足之美有鷸周易鼎卦九三曰鼎耳革其行塞雉膏不食方雨虧悔終吉又旅卦六五曰射雉一矢亡終以譽命又曰離為雉尚書曰日月星辰山龍華蟲華蟲鷩雉也五色故謂華也又曰高宗祭成湯有飛雉升鼎耳而雊論語曰山梁雌雉時哉時哉子路拱之三嗅而作爾雅曰鸕諸雉命雉鷂雉責質五色鷮雉長尾走且鳴鳪雉黃色鳴自呼鷩雉似山雞而小冠背毛黃腋赤頂緣色鮮明秩秩海雉如雉而黑出海中山鸐山雉尾長者也雗雉鵫雉今白鵫江東呼白翰亦名白雉伊洛而南素質五采皆備成章曰翬翬亦雉屬言其毛色光鮮江淮而南青質五采皆備成章曰鷂即鷂雉也南方曰鶅句東方曰緇音緇衣之緇北方曰鵗音希西方曰鷷說四方雉之名也音所旬切雉之暮子為鷚晚生者也今呼少雞為鷚尚書大傳曰武丁祭成湯有雉飛升鼎耳而雊問諸祖已祖已曰雉者野鳥也不當升鼎今升鼎者欲為用也遠方將有來朝者乎武丁思先王之道編髮重譯至者六國周書曰立冬之日水始冰後五日雉入大水為蜃小暑後十日雉始雊史記曰秦文公獲若石于陳倉北阪城祠之蘇林注曰白質其實其神或歲不至或歲數來來常以夜光若流星從東南集於祠城則若雄雞如淳注曰野雞雉也呂后名雉故曰野雞漢書曰成帝鴻嘉二年有飛雉集于殿庭歷階升堂而雊東觀漢記曰魯恭字仲康為中牟令蛉螟不入中牟河南尹袁安疑其不實遣仁恕掾肥親驗之恭隨親行阡陌坐樹下雉過止其側旁有小兒親曰兒何不捕之兒言雉將雛親默然有頃與恭訣曰本來考君界有無蟲耳今蟲不犯境一異也化及鳥獸二異也豎子有仁心三異也府掾久留但擾賢者因還府以狀白安魏志曰管輅至王弘直許有雄雉飛來登直內柱頭大不安令輅作卦輅曰五月必遷時三月也至期果為渤海太守晉咸寧起居注曰太醫司馬程據上雉頭裘一領詔於殿前燒之晉書曰武庫封閉甚密其中忽聞雉雊張華曰此必蛇化也開視之雉側有蛇蛻焉又曰涼武昭王皓卒子歆嗣立春有雙雉飛出宮內北史曰後魏裴安祖間居養志不出城邑曾天熱舍於樹下有鷙鳥逐雉雉急投之遂觸樹而死安祖愍之乃取置陰地徐徐護視良久得蘇憘而放之後夜忽夢一丈夫衣冠甚偉著繡曲領向安祖再拜安祖怪問之此人云感君前日見放故來謝德聞者異焉三國典略曰齊高緯如晉陽穆后將從辭胡太后于北宮有雉集于御床有司獲之不敢以聞又曰梁臨賀王正德其妹長樂公主太子家令謝禧之妻也姿容國色悅而報之生子二人乃燒主第投婢於火唱言主死黃門郎張準有一雉媒正德見而奪之準於重雲殿法會所罵之曰張準雉媒非長樂公主何可略奪太子綱恐梁主聞遣武陵王紀急相解喻準罵乃止正德既出以雉還之山海經曰小華之山其鳥多赤鷩可以禦火其山中多白雉莊子曰澤雉十步一啄百步一飲不畜於樊中尹文子曰楚人擔山雉者路人問焉何鳥也欺之曰鳳皇也路人曰我聞鳳皇今始見矣汝販之乎請買十金弗與請加倍乃與之方欲獻楚王經宿鳥死路人不遑惜其金唯恨不得獻王王聞之感其欲獻己召厚賜之過買鳥之金十倍抱朴子曰雞有專栖之雄雉有擅澤之鷮蟻有兼弱之智蜂有攻窠之計相役御亦猶是耳廣雅曰野雞雉洪範五行傳曰正月雷微動而雉雊雷通氣也楚辭曰彭鏗斟雉帝何饗鏗彭祖也好和滋味斟白雉羹以事堯堯美而饗食之列異傳曰秦穆公時陳倉人掘地得物若羊非羊若豬非豬牽以獻諸公道逢二童子童子曰此名為媼常在地食死人腦若欲殺之以柏捶其首媼復曰彼二童名為陳寶得雄者王得雌者霸陳倉人捨媼逐二童子童化為雉飛入乎林陳倉人告穆公穆公發徒大獵果得其雉又化為石置之汧渭之間至文公為立祠名陳寶今南陽雉縣其地也秦欲表其符故以名縣每陳寶祠時有赤光長十餘丈從雉縣來入陳祠中有聲如雄雉揚雄琴清英曰雉朝飛操者衛女傅母所作也衛侯女嫁於齊太子中道太子死問傅母曰何如傅母曰且往當喪喪畢不肯歸終之以死傅母悔之取女所自操琴於冢上鼓之忽有二雉俱出墓中傳母撫雌雉曰女果為雉耶言未卒俱飛而起忽然不見傳母悲痛援琴作操故曰雉朝飛琴操曰齊獨沐子年七十無妻出見飛雉雌雄相隨感之撫琴而歌曰雉朝飛鳴相和雌雄群遊於山阿蕭廣濟孝子傳曰蕭芝忠孝除尚書郎有雉數十頭飲啄宿止當上直送至歧路下直及門飛鳴車側璅語曰有鳥從飛西方來白質五色皆備集平公之庭相見如讓公召叔嚮問之叔嚮曰吾聞師曠曰西方有白質鳥五色皆備其名曰翬南方赤質五色備其名曰搖其來為吾君臣其祥先至矣博物志曰翟雉長雨雪惜其毛栖高樹之上不敢下食往往餓死徐廣車服注曰天子金根車馬上插以翟毛皇后法駕乘重翟羽蓋崔豹古今注云有雉尾扇宣驗記曰野火焚山林中有一雉入水漬羽飛以滅火往來疲乏不以為苦白雉春秋感精符曰王者德流四表則白雉見孝經援神契曰王者德至鳥獸故雉白首妃房不遍故白雉應又曰周成王時越裳獻白雉去京師三萬里王者祭祀不相踰宴食衣服有節則至抱朴子曰白雉自有種南越尤多案地域圖今之九德則古之越裳也蓋白雉之所出周成王所以為瑞者貴其所自來之遠明其德化所被廣非謂此為奇楚辭曰昭后成遊南土爰底瑗於也底至也言昭王背成王之制而出遊南至楚楚人沉之南遂不返之厥利惟何逢彼白雉厥其也逢迎也言昭王南遊何利於楚乎也為越裳氏獻白雉昭王德不能致親往迎也漢書曰平帝元始元年春越裳重譯獻白雉一黑雉二詔使三公以薦宗廟魏略曰文帝欲受禪郡國奏白雉十九見魏志文紀曰延康元年四月饒安縣言白雉見北史曰後魏南安王禎孝文時為雍州刺史性忠謹其母疾篤憂毀異常遂有白雉遊其庭前帝聞其致感賜帛千匹以褒美之三國典略曰渤海王高歡攻鄴時瑞物無歲不有令史焚連里木煮白雉而食之射雉左傳曰賈大夫賈大夫大夫也娶妻而美三年不言不笑御以如皋為妻御也之皋澤也射雉而獲之其妻始笑而言魏書曰太祖才力絶人於南皮一日射雉獲六十三頭江表傳曰孫權數射雉潘濬諫權權白時時暫出耳不復如往日濬曰天下未定萬機務多射雉非急弦絶括破皆能為害濬乃手自徹壞雉翳權由是遂絶不復射雉吳志曰孫休鋭意於典籍欲畢覽百家之言大好射雉春夏之間常晨出夜還唯此時捨書宋書曰孝武帝常出射雉值雨侍中沈懷文諫曰非止千乘失容亦乃聖躬櫛沐沈約宋書曰明帝與晉平王休祐於岩山射雉有一雉不肯入場日暮將反留休祐射之語云不得雉勿歸因遣壽寂之等諸壯士追之日已欲暗與休祐相及遂拉殺之又曰到撝與蕭道成同從宋明帝射雉郊野渴倦撝得早青瓜與上對割食之齊書曰武帝好射雉竟陵王子良啓諫先是左衛殿中將軍邯鄲超諫射雉武帝為止久之永明末上將射雉子良復諫又曰蕭景先轉中領軍車駕躬射雉郊外景先常申仗從廉察左右又曰蕭敏為新安太守好射雉未嘗在郡辭說者遷於畋焉後張弩損腰而卒又曰桓僖伯少負氣豪俠妙解射雉尤為武帝所重又曰張欣泰為河東內史召還都屏居家巷置宅南岡下面接鬆山欣泰負弩射雉姿情間放又曰袁彖為侍中形貌充肥異衆每從射雉郊野數人持扶乃能從步又曰褚炫從宋明帝射雉帝至日中無所得甚羞召問侍臣吾旦來如皋遂從空行可笑座者莫答炫獨曰今節候雖適而雲霧尚疑故斯翬之禽驕心未驚但得神駕猶豫群情便可載歡帝意解乃於雉場置酒南史曰齊東昏侯在位置射雉場二百九十六處翳中惟帳及步障皆祫以緣紅錦金銀鏤弩牙玳瑁帖箭每出輒以鷹犬隊主徐令孫媒翳隊主俞靈韻齊馬而走左右爭逐之又曰武帝親拜陵蔡興宗負璽陪乘及還上欲因以射雉興宗正色曰今致虔園陵情敬兼重從禽猶有餘日請待他辰陳書曰新安王伯固性好射雉叔陵好發冢出遊田野必與偕行
