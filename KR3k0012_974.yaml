body:
  text: 果部十龍眼廣雅曰益智龍眼也謝承後漢書曰交址七郡獻龍眼廣志曰龍眼樹葉似荔支蔓延緣木生子大如酸棗色異純甜無酸朱崖傳曰果有龍眼交州記曰龍眼樹高五六丈似荔支而小廣州記曰龍眼子似荔支七月熟吳氏本草曰龍眼一名比目嶺表録異曰龍眼子樹如荔支葉小殼青黃色形圓如彈丸大核如木槵子而不堅肉白蒂漿其甘如蜜一朵恆三二十顆荔支方過龍眼即熟南人謂之荔支奴以其常隨後也左思蜀都賦曰傍挺龍眼側生荔支榠樝齊書曰武帝幸丹陽郡宴飲郅撝恃舊酒後狎侮同列時王敬則執榠樝以刀子削之謂曰此非元徽頭何事自喫之為左丞庾果之所糾以贖論廣志曰榠樝其子甚酢出西方餘甘吳録地理志曰高涼安寧縣有餘甘初食之味苦後口中更甘臨海異物志曰餘甘子如梭形出晉安候官界中餘甘橄欖同一果耳雲南記曰瀘水南岸有餘甘子樹子如彈丸許色微黃味酸苦核有五稜其樹枝如枯枝葉如小夜合葉陳祁暢異物志曰餘甘大小如彈丸大視之理如定陶瓜片初入口如苦忽咽口中乃更甜美鹽而蒸之尤美可多食之朱崖故事曰朱崖果有餘甘左思吳都賦曰其果則丹橘餘甘荔支之林蒟子漢書曰番陽令唐蒙風曉南粵南粵食蒙蜀枸醬注曰枸音矩枸樹也如桑其椹長二三寸酢取其實以為醬廣志曰蒟子蔓生依樹子似桑椹長數寸色黑辛如薑以鹽淹之下氣消食出南安左思蜀都賦曰筇杖傅節於大夏之邑蒟醬流味於番禺之鄉木瓜爾雅曰楙木瓜郭氏注曰實如小瓜酢可食楙音茂也周禮冬官下弓人職曰取幹之道木瓜次果桑毛詩衛淇澳木瓜曰投我以木瓜報之以瓊琚毛云獼也詩義疏曰楙葉似榛實如小㼐瓜上黃著中令蚡香欲嘬者蜜封藏百日食之也三國典略曰齊孝昭北伐庫莫奚至天池以木瓜灰毒魚魚皆死而浮出庫莫奚竊相謂曰池有靈魚犯之不祥乃出長城北道齊主分兵追擊獲牛羊七萬振旅而還水經曰魚復縣地多木瓜樹有子大如甒音武白黃實甚苦香爾雅之所謂楙也盛弘之荊州記曰魚復縣有固陵村地多木瓜樹其子大者如甒晉宮閣記曰華林園有木瓜五株廣志曰木瓜子可藏枝為一尺百二十節吳氏本草曰木瓜生夷陵虎丘山疏曰山三面悉有木瓜何承天木瓜賦曰惟茲木之在林亦超類而獨劭方朝華而繁實比沙棠而有曜劉爾雅曰劉劉杙也劉子生山中實如梨酢甜核堅出交趾杙音弋吳録地理志曰交址羸僂縣有劉子樹出山中實如梨而味酸美郡內皆有之南方草物狀曰劉三月華七月八月熟其色黃其味酢出交址武平興古九真吳都賦曰梌劉禦霜鬱周書曰夏食鬱棣也毛詩豳七月曰六月食鬱毛注曰鬱棣詩義疏曰其樹高五六尺其實大如李正赤食之甜魏王花木志曰鬱薁樹高五六尺實大如李赤色食之甘廣雅曰一名雀李又名車下李又名郁李亦名棣亦名薁李子毛詩七月食鬱及薁即郁李也一名棣也呂氏本草曰郁核一名雀李一名車下李一名棣晉宮閣名曰華林園薁李一林司馬相如上林賦曰隱夫鬱棣合逯離支潘嶽間居賦曰梅杏薁棣之屬曹毗魏都賦曰若榴郁棣杜梨爾雅曰杜甘棠今之杜梨也山海經曰岷山其木多棠韓詩外傳曰邵伯在朝所司請召民邵伯曰不勞一身而勞百姓此非文王之志也於是廬於棠樹之下百姓大悅詩人見而歌焉毛詩鵲巢甘棠曰蔽芾甘棠勿剪勿伐召伯所茇毛云甘棠杜也詩義疏曰今棠梨也一名杜梨如梨而小有甜酢可噉也毛詩蟋蟀杕杜曰有杕之杜生于道周陸氏毛詩疏義曰杕杜杜赤棠也與白棠同但有赤白美惡子白色者為白棠白棠甘棠也多酸美滑赤棠子澀而酢者也俗語澀如杜是也木理亦赤可以作弓材孫楚杕杜賦序曰家弟以虞氏梨賦見示余謂豈以梨有用之為貴杜無用之為賤故賦之㮕棗晉宮閣名曰華林園㮕音軟棗四株廣志曰㮕棗味如柿晉陽楛㮕肌細而厚以供御范子計然曰㮕棗出漢中郡崔豹古今注曰㮕棗葉如柿實似柿而小味甘美司馬相如子虛賦曰樝梨梬栗梬楟棗也橘柚芬芳左思蜀都賦曰林檎枇杷橙柿梬楟榛毛詩邶柏舟簡兮曰山有榛隰有苓陸機毛詩疏義曰山有榛枝葉似粟樹子似橡子味似栗枝莖可以為燭毛詩鄘柏舟定之方中曰樹之榛栗椅桐梓漆詩義疏曰榛栗屬有兩種其一種大小皮葉皆如栗其子小形似杼子味亦如栗所謂樹之榛栗者也其一種枝莖如木蓼生高丈餘作胡桃味遼代上黨皆饒周禮天官下籩人職曰饋食之籩其實榛禮記曲禮下曰婦人之贄椇榛棗栗説文曰榛似梓實如小栗山海經曰上申之山下多榛楛郭氏注曰榛似栗而小任昉述異記曰漢末楊氏家園中産神榛二株張衡七辨曰寒梨乾榛柚爾雅曰柚條也郭氏注曰似橙實酢出江南尚書禹貢曰楊州厥苞橘柚周書曰秋食橘柚毛詩秦車轔曰終南何有有條有梅列子曰吳越之間有木焉其名曰柚碧樹而冬青實丹而味酸度淮北而化為枳焉莊子曰三王五帝之禮義法度譬猶柤梨橘柚其味相反而皆可於口淮南子曰天之所處地之所載皆生於一父母故槐榆與橘柚合而為兄弟呂氏春秋曰果之美者雲夢之柚山海經曰洞庭之山綸山銅山賈超之山其木多柚郭氏注曰柚似橘而大鹽鐵論御史曰孝武皇帝平百越以為園圃臣庶皆厭橘柚崔實政論曰橘柚之貢堯舜所不常御裴淵廣州記曰別有柚號為雷柚實如升大廣志曰成都有柚大如升博物志曰橘柚類多豫章郡出真者風土記曰柚大橘也赤黃而酢也神異記曰東方建春山外多柚異苑曰南康歸美山石城內有甘橘柚楚辭曰斬伐橘柚列樹苦桃楚辭曰雜橘柚以為圃兮列辛夷與椒楨司馬相如子虛賦曰橘柚芬芳古詩曰橘柚垂華實乃在深山側聞君好我甘竊獨自雕飾揚雄楊州牧針曰彭蠡既瀦陽鳥攸居橘柚羽貝瑤琨篠簜崔琦七蠲曰于斯江睪實産橘柚紫葉玄實緑裏朱莖郭璞讚曰屈生嘉歎以為美談椵爾雅曰櫠椵也郭璞注曰柚屬子大如盂皮厚二三分中似枳食之味少椹毛詩駉頌泮宮曰翩彼飛梟集于泮林食我桑黮懷我好音黮桑實後漢書曰獻帝時三輔大飢九月桑復生椹人得以食魏略曰楊沛為新鄭長課民益畜乾椹會太祖西迎天子無糧食沛進乾椹及太祖輔政遷為鄴令賜其生口十人絹百匹欲以勵之報乾椹也魏書曰袁紹在河北軍人仰棗椹車頻秦書曰慕容垂圍鄴百姓不得復田民以桑椹為糧相噉略盡晉書載記曰符登攻姚萇萇據武都相持纍戰互有勝負登軍中大飢收椹以供兵後魏書曰崔逞自燕奔魏尋除御史太祖攻中山乏糧問郡臣取食之方逞曰取椹可以助糧太祖雖御侮慢兵須食乃聽人取椹北史曰後周趙肅為齊州別駕有能名其東鄰有桑椹落其家就遣人悉拾歸其主誡諸子曰吾非以此求名意者非機杼物不願侵人汝等宜以為誡金樓子曰秦皇遣徐福求一寸椹碧海之中有扶桑樹長數千丈樹兩兩同根生更相依倚是名為扶桑仙人食其椹而體作金光飛騰玄宮也漢武內傳曰神仙上藥有扶桑丹椹汝南仙賢傳曰蔡君仲孝養老母時赤眉亂君仲取桑椹赤黑異器賊問之答云黑者與母赤者自食賊嘉之與鹽二升世説曰張天錫為晉孝武所器每入言話無不竟日頗有嫉之者於坐問張北方何物可貴張答曰桑椹香甘鴟梟革響醇酪養性人無嫉心世説曰有王甲從北方來詣謝公問北方何果最勝甲云桑椹最好謝公問可以比江東何果甲云是黃甘之流公曰君何乃爾妄語甲既受妄語之名恐宰相所貴乃買駿馬候熟時取數十枚還以奉公公食之以為美乃謂甲此味乃江東所無而君近比黃甘於是引甲為賓客十洲記曰有椹樹長數千丈名為扶桑芝仙人食其椹而體作金色飛翔玄宮其樹雖大其葉則小故如中夏之桑椹也但椹稀而赤九千歲一生實耳楊衒之洛陽伽藍記曰願會寺中書侍郎王翊捨宅立也佛堂前生桑樹一株直上五尺枝條橫繞柯葉傍布形如羽蓋復高五尺凡為五重每一重葉椹各異京師道俗謂之神桑觀者成市布施者甚衆帝聞而惡之以為惑衆命給事黃門侍郎元紀伐殺之其日雲霧晦冥下斧之處流血至地見者莫不悲泣東方朔神異記曰東方有樹高八十丈敷張自輔葉長一丈廣六七尺名曰桑上有椹長三尺五寸其圍如數異苑曰漢興平元年九月桑再椹時劉玄德軍小沛年荒穀貴士衆皆飢仰以為糧又曰北方有白桑椹長數寸食之甘美五行記曰晉武太元中太原王戎為鬱林太守泊船新亭眠夢人以七枚椹與之著衣襟中既悟得椹如夢中傳休奕桑椹賦曰繁實離離含甘吐液翠米三變或玄或白嘉味殊滋食之無斁
