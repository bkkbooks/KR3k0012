body:
  text: 方術部十四占星漢書曰高祖元年十月五星聚東井客謂張耳曰東井秦地也漢王入關五星從歲星聚當以義取天下後漢書曰嚴光字子陵少有高名與光武同遊及帝即位光變姓名隱身不見帝思其賢乃令以物色訪之後齊國上言有一男子被羊裘釣澤中帝疑其光也乃備安車玄纁遣使聘之三反而後至帝嘗引光入論道舊故相對累日帝從容問曰朕何如昔時對曰陛下差增於往因共偃臥光以足加帝腹上明日太史奏客星犯御座甚急帝笑曰朕故人嚴子陵共臥耳又曰李郃字孟節漢中南鄭人也父頡以儒學稱官至博士郃襲父業遜太學通五經善河洛風星外質朴人莫之識縣召署幕門候吏和帝即位分遣使者皆微服單行各至州縣觀採風俗使者二人當到益部投郃舍時夏夕露坐郃因仰觀問曰二君發京師時甯知朝廷遣二使耶二人默驚相對視曰不聞也問郃何以知之郃指星示云有星向益州分野故知之耳又曰曹公破袁紹於官渡初桓帝時有黃星見於楚宋之分遼東殷馗善天文言後五十歲當有真人起於梁沛之閒其鋒不可當至是凡五十年而公破袁紹天下莫敵也晉書曰戴洋善占候揚州剌史嘗問吉凶於洋荅曰熒惑入南斗八月暴水當有客軍西南來如期果大水而石冰作亂冰既據揚州洋謂人曰視賊雲氣四月當破果如其言泰寧二年正月有流星東南行洋曰至秋應當壽陽及王敦作逆祖約問其勝敗洋曰大白在東方辰星不出兵法先起者為主應者為客辰星若出太白為主辰星為客辰星不出太白為客先起兵者敗今有客無主有前無後宜傳檄所部應詔伐之約乃率眾向合肥俄而敦死眾敗遂住壽陽洋又謂曰江淮之閒當有軍事譙城虛曠宜還固守不言然者雍丘沛皆非官有也約不從豫土遂陷於賊南中郎將桓宣以洋為參軍將隨宣往襄陽太守陶侃留之住武昌時侃謀北伐洋曰前年十一月熒惑守胃昴至今年四月積五百餘日昂趙之分野石勒遂死熒惑以七月退從畢右順行入潢道未及天關以八月二十二日復逆行還鉤繞畢向昴昴畢為邊兵主胡夷故置天弓以射之熒惑逆行司無德之國石勒死是也勒之餘燼已自殘害今年官與太歲太陰三合癸己癸為北方北方當受災歲鎮二星共合翼軫從子及己徘徊六年荊郢之分歲鎮所守其下國昌豈非功德之徵也今年六月鎮星前角亢角亢鄭之分歲星移入房太白為心房宋分順之者昌逆之者亡石季龍若興兵東南此其死會官若應天與不取反受其咎侃志在中原聞而大喜會病篤不果行而薨又曰祖逖將城武牢未成而逖病甚先是華譚庾闡問術人戴洋洋曰祖豫州九月當死初有妖星見于豫州之分歷陽陳訓謂人曰今年西北大將軍當死逖亦見星曰為我矣方平河北而天欲殺我此乃不祐國也俄卒于雍丘又戴記曰苻堅時有大風從西南來俄而晦冥恒星皆見又有赤星見于西南太史令魏延言于堅曰於占西南國亡明年必平蜀漢堅大悅又曰苻堅以弟融為鎮東大將軍代王猛為冀州牧融將發堅祖于灞東奏樂賦詩堅母茍氏以融少子甚憂之比發三至灞上其夕又竊如融所內外莫知是夜堅寢于前殿魏延言天市南門屏內后妃星失明左右閽寺不見后妃移動之象堅問知之驚曰天道與人何其不遠遂重星官後魏書曰崔浩明識天文好觀星變常置金銀銅鋌於酢器中令青夜有所見即以鋌書紙作字以記其異又曰姚興死之前歲太史奏熒惑在瓠瓜星中一夜忽然亡失不知所在或謂下入危亡之國將為童謠言之妖而後行其災禍大宗聞之大驚乃召諸碩儒十數人令與吏官求其所詣崔浩對曰案春秋左氏傳說神降于莘其至即其物也請以日辰推之庾午之夕幸未之朝天有雲熒惑之亡當在此二日之內庚之與未皆主於秦辛為西夷今姚興據咸陽是熒惑入秦矣諸人皆作色曰天上失星人安能知其所詣而妄說無徵之言浩笑而不應後八十日熒惑果出於東井留守盤疑秦中大旱赤地昆明池水竭童謠訛言國內誼擾明年姚興死二子交兵三年國滅於是諸人乃服曰非所及也唐書曰嚴善思同州朝邑人也少以學涉知名尢善天文歷數及卜相之術則天時為監察御史稍遷太史令聖曆二年熒惑人輿鬼則天以問善思善思對曰商姓大臣當之其年文昌左相王及善卒長安中熒惑入月鎮星犯天關善思奏曰法有亂臣伏罪且有臣下謀上之象歲餘張柬之敬暉等起兵誅張易之昌宗其占驗皆此類又曰尚獻甫衛州汲人也尢善天文則天時召見起家拜太史令數顧問災異事皆符驗長安二年獻甫奏曰臣本命納音在金今熒惑犯上諸侯太史之位熒惑火也火能剋金是臣將死之徵則天曰朕為卿穰之遽轉獻甫為水衡都尉謂曰水能生金又去太史之位卿無憂矣其秋獻甫卒則天甚嗟異惜之又曰元和八年熒惑犯太微上相歷執法占者言今之三相皆不利始輕末重月餘李絳以足疾免明年十日李吉甫以暴疾卒九年六月武元衡為盜所害年五十八始元衡與吉甫齊年又同日為宰相及出鎮分領楊益至吉甫再入元衡亦還吉甫先一年以元衡生月卒元衡後一年以吉甫生月卒吉凶之數若符會焉占風後漢書曰郎顗上書曰今月十七日戊午徵日也陽嘉二年正月日加申日在申時也風從寅來丑時而止丑寅申皆徵也不有火災必當為旱南方為徵故為火及旱也願陛下校計繕脩之費求念百姓之勞罷將作之官減彫文之飾損庖廚之饌退宴私之樂又曰任文公巴郡閬中人也閬中今隆川縣父文孫明曉天官風星秘要文公少脩父術州辟從事哀帝時有越嶲太守欲反剌史大懼遣文公等五從事檢行郡界潛伺虛實共止傳舍時暴風卒至文公遽起白諸從事促去當有逆變來害人者因起駕速驅諸從事未能自發郡果使兵殺之文公獨得免又曰李南字孝山丹陽句容人也少篤學明於風角和帝永元中太守馬稜坐盜賊事被徵當詣廷尉吏人不寧南特通謁賀稜意有恨謂曰太守不德今當即罪而君反相賀耶南曰旦有善風明日中時應有吉問故來稱慶旦日稜延望景晏以為無徵至晡乃有驛使齎詔書原停稜事南問其遲留之狀使者曰向渡宛陵浦里航宛陵縣二陽郡航以舟濟水也航何唐切也馬踠足是以不得速踠屈損也稜乃服焉後舉有道辟公府病不行終於家南女亦曉家術為由拳縣人妻晨詣爨室卒有暴風婦便上堂從姑求歸辭其二親姑不許乃跪而泣曰家代傳術風卒起先吹竈突及井此禍為婦女主爨者妾將亡之應因著其亡日乃聽還家如期病卒又曰郎宗為吳令時卒有暴風宗占知京師當有大火記識時日遣人參候果如其言諸公聞而表上以博士徵之宗恥以占驗見知聞徵書到包懸印綬於縣廷而遁去遂終身不仕吳志曰孫權征黃祖軍行及潯陽吳範見風氣因詣舡賀催兵急行至郎破祖祖夜亡權恐失之範曰未遠必生擒祖至五更果得之權與呂蒙謀襲關羽議之近臣多曰不可權以問範範曰得之在後王辛德在南方酉受自刑梁在譙北乘德伐刑賊必破亡及甲子日東風而雷西行譙在南雷在軍前為軍驅除皆吳伐關羽天雷在前瑜拜賀今往同故知必剋約從之果平梁城洋往潯陽時劉裔鎮潯陽九月甲申時迴風從東來入裔兒舡中西過狀如疋練長五六丈洋曰風從咸池中來攝堤下去咸池為刀兵大殺為死喪到甲子日申時府內大聚骨埋之裔問在何處洋曰不出州府門也裔架東門洋又曰東為天牢下閉門憂天獄至十二月十七日洋又曰臘近可閉門以五十人備守并以百人備東北寅上以卻害氣裔不從二十四日壬辰裔遂為郭默所害北齊書曰權會明風角玄象曾令家人遠行久而不反其行人還垂欲至宅乃逢寒雪寄息他舍會方處學堂講說忽有旋風瞥然吹雪入戶會乃笑曰行人至何意中停遂命使人令詣某處追尋果如語每為人占筮小大必中但用爻辭彖象以辨吉凶占雨後漢書曰任文公為侍中從事時天大旱白剌史曰五月一日當有大水其變己至不可防救宜令吏人豫為其備剌史不聽文公獨儲大船百姓惑聞頗有為防者到其日旱烈文公曰急促載使白剌史笑之日將中天北雲起須臾大雨至晡時湔水湧起十餘丈湔音子延反突壞廬舍所害數千人又曰高獲善天文曉遁甲能役使鬼神時郡境大旱太守鮑昱自往問何以致雨獲曰急罷三部督郵續漢書曰監屬縣有三部每部督郵書椽一人明府當自北出到三十里享雨可致也昱從之果得大雨又曰楊統善天文推步之術建初中為彭城令一州大旱統推陰陽消伏縣界蒙澤太守宗湛使統為郡求雨亦即陸澍望氣史記曰漢文十五年夏四月趙人新垣平以望氣見因說上設立渭陽五廟欲出周鼎當有玉英見瑞圖云玉英五常並脩則見漢書曰范增說羽曰沛公居山東時貪財好色今聞其入關珍物無所取婦女無所幸此其志不小吾使人望其氣皆為寵成五色此天子氣急擊之勿失又曰孝武鉤弋趙婕妤昭帝母也家在河閒武帝巡狩過河閒望氣者言此有奇女天子使召之既至女兩手皆拳上自披之手即時伸由是得幸號曰拳夫人進為婕妤居鉤弋宮生昭帝又曰宣帝武帝曾孫戾太子孫生數月遭巫蠱事雖在襁褓猶坐收繫郡邸獄而邴吉為廷尉監怜之無辜使女徒更乳養望氣者言長安獄中有天子氣上遣使者分條中都官獄繫者輕重皆殺之內謁者令郭穰夜至郡邸獄吉拒閉使者不得入賴吉得全後漢書曰光武紀云望氣者蘇伯阿為王莽使至南陽遙望見春陵郭唶曰唶歎也音子夜反氣佳哉鬱鬱葱葱然及始起兵還舂陵遠望舍南火光赫然屬天有頃不見晉書曰秦時望氣者云五百年後金陵有天子氣故始皇東巡狩以厭之改其地曰秣陵壍北山以絕其勢及孫權之稱號自謂當之考其曆數猶為未及元帝之渡江也乃五百二十六年真人應之在此矣又曰初吳之未滅也斗牛之閒有紫氣道術者皆以吳方強盛未可圖也唯張華以為不然及吳平之後紫氣愈明事見劍門中又曰陳訓字元道歷陽人也學天文筭曆陰陽占候無不畢綜尢善風角孫皓以為奉車都尉使其占候皓政嚴酷訓知其必敗而不敢言時錢塘湖開或言天下當太平青蓋入洛時皓以問訓訓曰臣止能望氣不能達湖之開塞退而告其友曰青蓋入洛將有輿櫬銜璧之事非吉祥也尋而吳亡及陳敏作亂弟宏為歷陽太守訓謂邑人曰陳家無王氣不久當滅宏聞將斬之訓鄉人泰璩為宏參軍乃說宏曰訓善風角可試之如不中徐斬未晚也乃赦之時宏攻征東參軍衡彥於歷陽乃問訓曰城中有幾千人攻之可拔不訓登牛渚山望氣曰不過五百人然不可攻之必敗宏復大怒曰何有五千人攻五百人而不得理令將士攻之果為彥所敗方信訓有道術乃優遇之宋紀曰齊宣帝墳塋在武進縣常有雲氣氤氳入天故元嘉中望氣者稱此地有天子氣後周書曰蔣昇字鳳起少善天文玄象之學太祖雅信待之常侍左右以備顧問大統三年東魏將竇泰入寇濟自風陵頓軍潼關太祖出師馬牧澤時西南有黃紫氣抱日從未至酉太祖謂昇曰此何祥也昇曰西南未地主土土王四季秦之分也今大軍既出喜氣下臨必有大慶於是進軍與竇泰戰擒之隋書曰韋鼎仕梁為太府卿至德初鼎質貨田宅寓居僧寺友人毛彪問其故荅曰江東王氣盡於此矣吾與爾當葬長安期運將及故破產耳陳武帝在南州鼎望氣知其當王遂寄孥焉因為陳武帝曰明年有大臣誅死後四歲梁其代終天之曆數當歸舜後昔周滅殷氏封媯滿于宛丘其裔子孫因為陳氏僕觀明公天縱神武繼絕統者無乃是乎武帝陰有圖僧辯意聞鼎言大喜因而定策
