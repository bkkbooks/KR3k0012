body:
  text: 皇親部六後魏宣武于皇后後魏書曰宣武皇后于氏太尉烈弟徑之女也世宗始親政事烈時為領軍總心膂之任以嬪御未備因左右諷諭稱后有容德世宗乃迎入為貴人時年十四甚見寵愛立為皇后謁于太廟后靜默寬容性不妬忌生皇子昌三歲夭沒其后暴崩宮禁事祕莫能知悉而世議歸咎于高夫人葬永太陵諡曰慎皇后宣武高皇后後魏書曰宣武高皇后文昭弟偃之女也世宗納為貴嬪生皇子早夭文生建德公主後拜為皇后甚見禮重性妬忌宮人稀得進御及肅宗即位上尊號曰皇太后尋為尼居瑤光寺非大節慶不入宮中建德公主始五六歲靈太后恆置左右撫愛之神龜無年太后出覲母武邑君時天文有變靈太后欲以太后當禍是夜暴崩天下怨之喪還瑤光佛寺葬殯皆以尼禮世宗暮年高后悍音翰忌夫人嬪御有至帝崩不蒙待接者由是在洛二世二十餘年皇太子全育惟肅宗而已宣武胡皇后後魏書曰宣武靈皇后胡氏安定臨涇人司徒國珍之女后母皇甫氏産后之日赤光四照京兆北山縣有趙胡者善於卜相國珍往問之胡云賢女有大貴之表方為天地母生天地主勿過三人知也后姑為尼頗能講道世宗初人講禁中積數世諷左右稱后姿行世宗聞之乃召入掖庭為承華世婦而椒庭之中以國舊制相與祈祝皆願生諸王公主不願生太子也惟后每謂夫人等言天子豈可獨有兒子何緣畏一身之死而令皇家不育冢嫡乎及肅宗在孕同列猶以故事相恐勸為諸計后固意確然幽夜獨誓云但使所懷是男次第當長子生身死所不辭也既誕肅宗進為充華嬪先是世宗頻喪皇子自以春秋長矣深加慎護為擇乳母皆取良家宜子者養於別宮皇后及充華嬪皆莫得而撫視焉及肅宗踐祚尊后為皇太妃後尊為皇太后臨朝聽政猶稱殿下令以行事後改令稱詔群臣上書曰陛下自稱曰朕太后以肅宗沖幼未堪親祭欲傍周禮夫人與君交獻之義代行祭禮訪尋故式門下召禮官博士議以為不可而太后欲以惟慢自鄣觀三公行事重問侍中崔光光便據漢和熹鄧后熹音熙薦祭故事太后大悅遂攝行祠祀太后性聰悟多才藝姑既為尼幼相依託略得佛經大義親覽萬機手筆斷決幸西林園法流堂命侍臣射不能射者罰之又自射針孔中之大悅賜左右布帛有差先是太后勑造申訟車時復御焉出自雲龍大司馬門從宮西而北入自千秋門以納冤訟又親策孝秀州郡計吏於朝堂太后與肅宗幸華林園宴群臣于都亭曲水令王公以下賦七言詩太后詩曰化光造物含氣貞肅宗詩曰恭已無為賴慈英王公以下賜帛有差太后父薨百寮表請公除太后不許尋幸永寧寺觀建剎於九級之基僧尼士女赴者數萬人后幸左藏公主嬪女已下從者百餘人皆令任力負布絹即以賜之尋幸闕口溫水登雞頭山自射象牙簪一發中之勑示文武時太后得志逼幸清河王懌媱亂肆情為天下所惡領軍元又長秋卿劉騰等奉肅宗於顯陽殿幽太后於北宮於禁中殺懌自劉騰死義又寬怠太后與肅宗及高陽王雍為計解又領軍太后復臨朝大赦改元自是朝政踈緩威恩不立天下牧守所在貪婪音嵐鄭儼寵私宮掖勢傾海內李神軌徐紇並見親待一二年中位總禁要手握王爵輕重在心宣淫於朝為四方之所厭穢文武懈體所在亂逆土崩魚爛始於此矣及武太元年爾朱榮稱兵渡河太后盡召明帝六宮皆令入道太后亦自落髮榮遣騎拘送太后及幼主河陰太后對榮多所陳説榮拂衣而起太后及幼主並沉於河水太后妹馮翊君收瘞於雙靈寺武帝時始葬以后禮而追加諡焉又曰靈太后頗事莊飾數出遊幸元順面諍曰禮婦人夫喪自稱未亡人首去珠珥音餌衣不被綵陛下母臨天下年垂不惑過修容飾何以示後世靈太后慚而還入召順責曰千里相徵豈欲衆見辱也順曰陛下盛服炫容不畏天下所笑何恥臣之一言乎孝明胡皇后後魏書曰孝明胡皇后靈太后從兄冀州刺史盛之女也靈太后欲榮重門族故立為皇后肅宗頗在酒德專嬖充華潘氏及嬪御並無過寵太后為肅宗選納抑屈人流時博陵崔孝芬女范陽盧道約女隴西李瓚等女俱為世婦諸人訴訟咸見忿責武太初后既入道遂居於瑤光寺焉西魏孝武高皇后後魏書曰孝武皇后高氏齊神武長女也帝見立乃納為后及帝西幸關中降為彭城王妃文帝乙弗后後魏書曰文帝文皇后乙弗氏河南洛陽人也其先世為吐谷渾渠帥居青海號青海王涼州平后之高祖莫瓌擁部落入附拜定州刺史封西平公自莫瓌後三世尚公主女乃多為王妃甚見貴重父瑗儀同三司兗州刺史母淮陽長公主孝文之第四女也后美容儀少言笑年數歲父母異之指示諸親曰生女何妨也若此者實勝男年十六文帝納為妃及帝即位以大統元年册為皇后后性好節儉蔬食故衣珠玉羅綺絶於服玩又仁恕無嫉妬之心帝益重之生男女十二人多早夭唯太子及武都王戍存焉時新都關中務欲東討蠕蠕音軟寇邊未遑北伐故帝結婚以撫之於是更納悼后命后遜居別宮出家為尼悼后猶懷猜忌復徙后居秦州依子秦州刺史武都王帝雖限大計恩好不忘後密令養髮有追還之意然事祕禁外無知之者六年春蠕蠕舉國渡河前驅已過而頗有言虜為悼后之故興此役帝曰豈有百萬之衆為一女子舉也雖然致此物論朕亦何顏以見將帥耶乃遣中常侍曹寵齎手勑令后自盡后奉勑揮淚謂寵曰願至尊享千萬歲天下康寧死無恨也因命武都王前與之決遺語皇太子辭皆悽愴因慟哭久之侍御咸垂涕失聲莫能仰視召僧設供令侍婢數十人出家手為落髮事畢乃入室引被入自覆而崩年三十一鑿麥積崖為龕而葬神柩將入有二藂雲先入龕中頃之一滅一出後號寂陵及文帝山陵畢手書云萬歲后欲令后配饗公卿乃議追諡曰文皇后祔於太廟廢帝時合葬於永陵郁久閭后後魏書曰文帝悼皇后郁久閭氏蠕蠕主阿那環之長女容貌端嚴夙有成智大統初蠕蠕屢犯北邊文帝乃與通好結婚扶風王孚受使奉迎蠕蠕俗以東為貴后之來營幕戶席一皆東向車七百乘馬萬匹駝千頭到黑鹽池魏朝鹵簿文物始至孚奏請正南面后曰我未見魏王故蠕蠕女也魏伏向南我自東面孚無以辭四年正月至京師立為皇后時年十四六年后懷孕將産居於瑤華殿聞上有狗吠聲心甚惡之又見婦人盛飾來至后所后謂左右曰此為何人醫巫傍侍悉無見者時以為文后之靈産訖而崩年十六葬於少陵原十七年合葬永陵當會橫橋北后梓宮先至鹿苑帝轀音京音溫車涼后來將就次所軸折不進西魏廢帝宇文后後魏書曰廢帝皇后宇文氏周文帝女也后初産之日有雲氣滿室氣久之幼有風神好陳列女圖置之左右周文曰每見此女良慰人意廢帝之為太子納為妃及即位為皇后志操明秀帝深重之專寵後宮不置嬪御帝既廢崩后亦以忠於魏室羅禍恭帝若干后後魏書曰恭帝皇后若干氏司空長樂公正惠之女也有容色恭帝納之為妃及即位立為皇后後出家為尼在佛寺葬竟無諡東魏孝靜高皇后後魏書曰孝靜高皇后齊獻武王之第二女也天平四年詔娉以為皇后王前後固辭帝不許興和初詔侍中司空孫騰司空公襄城王旭一云昶兼尚書令司州牧西河王悰藏宗切兼太常卿及宗正卿元孝支等奉詔致禮并備宮官侍衛以后駕迎於晉陽之丞相第五月立為皇后大赦天下齊受禪降為山王妃後周文元皇后後周書曰文元皇后魏孝武妹初封平原公主適開府張歡遇后無禮帝殺歡改封后馮翊公主以配太祖生孝閔薨祔葬成陵文叱奴后後周書曰文叱奴后太祖為丞相納后為姬生高祖高祖即位後尊為皇太后建德三年三月己酉崩四月丁巳葬固陵閔元后後周書曰閔元皇后名胡摩魏文帝第五女初封晉安公主愍帝為洛陽公尚焉及踐祚立為皇后帝被廢后出俗為尼高祖誅晉公護上帝尊號為愍帝以后為孝愍皇后號崇義宮隋氏革命出居里第大業十二年殂明獨孤后後周書曰明獨孤后太保衛公信之長女也帝在藩納為夫人帝即位立為王后在位數日崩葬昭陵世宗崩與后祔葬之武阿史那后後周書曰武阿史後突厥木杆可汗俟斤之女突厥蠕蠕而恕反後盡有塞表之地控弦十數萬於是陵逼中原太祖方與齊人爭衡結以為媛俟斤初欲以女配帝保定五年二月詔陳公純等備皇后文物及行殿并六宮已下一百二十人至俟斗牙帳所迎后俟斗又許齊人以婚將有異志純等在彼纍載不得返命會雷風大起飄壞其穹廬等旬日不止俟斗大懼以為天譴去戰切乃禮送后及純等設行殿列羽儀奉之以歸高祖行親迎之禮后有姿貌善容止高祖深敬焉宣帝即位尊為天元上皇太后隋開皇二年殂年三十一隋文詔后祔葬孝陵孝帝李后後周書曰孝帝李后名娥姿楚人也于謹平江陵后家被籍沒至長安太祖以后賜高祖高祖幸之生宣帝宣帝即位尊為天元聖皇太后宣帝崩靜帝尊為大帝太后隋開皇初出俗為尼改名常悲薨以尼禮葬之京城南宣帝楊后後周書曰宣帝楊后名麗華隋文帝長女帝在東宮高祖為帝納后為皇太子妃宣政元年立為天元皇后后性柔婉不妬忌四皇后及嬪御等咸愛而仰之帝後昏暴滋甚喜怒乖度嘗譴后欲加之罪后進止詳間辭色不撓帝大怒遂賜后死逼令引決后母獨孤氏聞之詣閣陳謝叩頭流血然後得免帝崩靜帝尊后為皇太后號弘聖皇太后初宣帝不豫詔隋文帝入禁中侍疾及大漸劉昉鄭譯等因矯詔以后父受遺輔政后雖初不預謀然以嗣主幼沖恐權在他族不利於己聞昉譯已行此詔甚悅後知父有異圖意頗不平形於言色及行禪代憤惋愈甚隋文帝既不能譴責內甚愧之開皇六年封后為樂平公主後又議奪其志后誓不許乃止大業中殂祔葬定陵宣朱后後周書曰宣朱皇后名滿月吳人也其家唑事沒入東宮帝為太子后被選掌衣服召而幸之遂生靜帝靜帝立尊為天元太皇后后本非良家子年又大帝十歲踈賤無寵以靜帝之故特尊崇之宣帝崩靜帝即位尊為太后隋初出俗為尼改名法淨後殂以尼禮葬之宣陳后後周書曰宣陳后名月儀自云潁川人大將軍山提之女以選入宮拜為德妃月餘立為天元左大皇后帝崩出俗為尼改名華光父山提本爾朱兆之隸仕齊為特進開府謝陽王高祖平齊拜大將軍以后父超授上柱國除大宗伯宣元后後周書曰宣元皇后名樂尚河南洛陽人開府晟之第二女也年十五被選入宮拜貴妃後立為天元右大皇后宣帝崩出俗為尼名華勝父晟少以元氏宗室拜開府宣尉遲后後周書曰宣尉遲皇后名繁熾蜀公迥之孫女也有美色初適杞公亮之子西陽公溫後以宗婦入朝帝逼而幸之後亮聞謀逆帝遂誅溫追后入宮立為天元右大皇后帝崩出俗為尼改名華道年四十殂靜司馬后後周書曰靜帝司馬后名令姬柱國滎陽公消難之女宣帝傳位於帝納后為皇后隋文帝以后父消難擁衆奔陳廢后為庶人後嫁為隋司州史李丹妻隋文獨孤皇后隋書曰文獻獨孤皇后河南雒陽人周大司馬河內公信之女也信見高祖有奇表故以后妻焉時年十四高祖與后相得誓無異生之子后初亦柔順恭孝不失婦道后姊為周明帝后長女為周宣帝后貴戚之盛莫與為比而后每謙卑自守世以為賢及周宣帝崩高祖居禁中揔百揆后使人謂高祖曰大事已然騎獸之勢必不得下勉之高祖受禪立為皇后性尤妬忌上亦每事唯后言是用后見諸王及朝士有妾孕者必勸上斥之時皇太子多內寵妃元氏暴薨后意太子愛妾雲氏害之由是風上竟廢太子立晉王廣皆后之謀也仁壽二年八月甲子月暈四重己巳太白犯軒轅其夜后崩於永安宮時年五十葬於太陵宣華夫人隋書宣華夫人陳宣帝之女也性聰慧姿貌無雙及陳滅配掖庭後選入宮為嬪時獨孤皇后性妬後宮罕得進御唯陳氏有寵晉王廣之在藩也陰有奪宗之計陳氏皇太子廢立之際頗有力焉及文獻皇后崩進位為貴人專房擅寵主斷內事六宮莫與為比及上大漸遺詔拜為宣華夫人煬帝嗣位之後出居仙都宮尋召人歲餘而終時年二十九帝深悼之為製神傷賦煬帝蕭皇后隋書曰煬帝蕭皇后梁明帝巋丘軌切之女也江南風俗二月生子者不舉后以二月生由是季父岌收而養之未幾岌夫妻俱死轉養舅氏張軻家然軻甚貧窶具宇切后躬親勞苦煬帝之為晉王時高祖將為王選妃於梁遍占諸女皆不吉巋迎后於舅氏令使者占之曰吉於是遂策為王妃后性婉順有智識好學解屬文頗知占候高祖大善之帝甚寵敬焉及帝嗣位詔立為后帝每遊幸未嘗不隨侍從及宇文氏之亂隨軍至聊城化及敗沒竇建德突厥處羅可汗遣使迎后於洺州建德不敢留遂入於虜庭唐貞觀四年滅突厥乃以禮致之歸于京師
