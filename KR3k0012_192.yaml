body:
  text: 居處部十九府庫藏釋名曰庫舍也物在舍也齊魯謂庫為舍也說文曰庫兵車所藏也帑金幣所藏也府文書所藏也禮記曰季秋之月命百工審五庫之量蔡雍月令章句曰五庫者一曰車庫二曰兵庫三日祭器庫四曰樂器庫五曰宴器庫又月令曰季春命有司開府庫出幣帛聘名士周禮曰太府掌九貢九賦九功之二以受其貨賄之入頒其貨于受藏之府頒其賄于受用之府萬民之貢以充府庫太府下大夫若今之司農又曰玉府掌王之金玉玩好兵器凡良貨賄之藏共王之服玉佩玉珠玉含玉諸侯則共珠盤玉敦又曰內府掌受九貢九賦九功貨賄良兵器以待邦之大用凡四方之幣獻之金玉齒革兵器凡良貨賄入焉又曰外府掌邦布之出入以供百物而待邦之小用注布帛之藏帛曰布小用賜也又天官玉府曰合諸侯則供珠盤鄭玄注曰以注飾盤承牛耳又春官天府曰天府掌祖廟之守藏與其禁令凡國之玉鎮大寶器藏焉若有大祭大喪則出而陳之既事藏之凡官府鄉州及都鄙之治中受而藏之以詔王察群吏之治察二其黜陟也治中謂治簿書之要尚書曰武王克殷散鹿臺之財紂所積之府庫曰鹿臺春秋文曜鉤曰咸池天潢五星五帝車舍也宋均注曰舍庫也五帝庫府曲禮天子六府曰司土司木司水司草司器司貨典六職注謂主藏物之稅也左傳曰晉侯之豎頭須守藏者也及公子出也竊藏以逃盡用以求納之求納文公論語曰魯人為長府藏貨曰府閔子騫曰仍舊貫如之何何必改作漢書曰漢高祖七年蕭何立東闕前殿武庫又曰立武庫以藏禁兵又曰枚乘諫吳王曰夫漢并二十四郡十七諸侯轉輸錯出軍行數千里不絶於郊其珍怪不如東山之府如淳曰吳王之府藏也謝承後漢書曰靈帝光和中武庫屋自壞司隸許冰上書曰武庫禁兵所在國之禁為災深矣魏志曰嘉平中二魚集於武庫屋上晉書曰武庫封閉甚密忽有雉雊張華曰此必蛇化為雉視之果有蛇蛻也又曰趙王倫既還諂事賈后因求録尚書事後又求尚書令張華與裴頠皆固執不可由是致怨倫秀疾華如讎武庫火華懼因此變作列兵固守然後救之故纍代之寶及漢高斬蛇劍王莽頭孔子履等盡焚焉時華見劍穿屋而飛莫知所向又曰裴楷有知人之鑒目鍾會云如觀武庫森森但見矛戟在前商君書曰湯武破桀紂海內無患遂筑五庫藏五兵偃武也鍾會芻堯論曰國之稱富者在乎豐人非獨謂府庫盈倉廩實非上天所降皆資之於人人困則國虛矣洞冥記曰元狩四年將夕有黃髮叟懷內探徑尺玉以授帝帝以玉還寶庫即龍玉也王子年拾遺記曰縻笁用陶朱公計術日益億萬之利資擬王家有寶庫千間世說曰郤公大聚斂錢數千萬嘉賓甚不同嘗朝且問訊郗家法子弟不坐因倚語移時遂及錢貨事郗云汝正當欲得我錢耳乃聽一日開庫任意用郗公始止謂損數百萬許嘉賓遂一日中乞與人都盡郗公聞之驚怪不能巳拾遺録曰太上皇以寶劍賜高祖及呂后藏於瑤庫守者見白氣從戶中出如龍蛇呂氏更瑤庫名曰靈金藏及諸呂擅權白氣亦滅惠帝即位以此貯禁兵名曰靈金府韓詩外傳曰晉平公藏寶之臺燒救火三日三夜公子晏賀曰臣聞王者藏於天下諸侯藏於百姓農夫藏於囷倉商賈藏於篋匱今百姓乏於外而賦斂無巳者是桀紂殘賊而為天下戮今皇天降災於藏臺是君之福也莊子曰天地有官陰陽有藏魏都白藏之藏注曰白藏庫在西城有屋一百七十四間爾雅秋為白藏因以為名列子曰范氏之藏大火商丘開入火往還無難色埃不漫身不燋子華之客乃謝之晉摯虞武庫屋銘曰有財無義惟家之殃無愛糞土以毀五常張衡西京賦曰武庫禁兵設在蘭錡曹毗魏都賦曰百藏之庫戎儲攸歸潘嶽詩曰微火不戎延我寶庫廄說文曰廄馬舍也釋名曰廄鳩也聚也牛馬之所聚也詩曰乘馬在廄左傳曰莊二十九年新作延廄書不時也凡馬日中而出目中而入注日中春秋分也治廄當以秋分今以春作不時也榖梁傳曰二十九年新延廄延廄者法廄注周禮天子十二間言法廄者六間之舊制又曰晉獻公欲伐虢荀息曰何不以屈産之乘垂棘之壁假道于虞也公曰此晉之寶也息曰是我取之中府而藏之外府取之中廄而藏之外廄禮記雜記曰廄焚孔子拜鄉人為火來者拜之士一大夫再亦相豫之道也論語鄉黨曰廄焚子退朝曰傷人乎不問馬史記曰夏侯嬰為沛廄司御每送客還過高祖語未嘗不移日東觀漢記曰順帝漢安元年始置承華廄舍令又曰靈帝光和四年初置緑驥廄領受郡國調馬調謂徵發漢舊儀曰天子六廄未央廄承華廄皆方匹三輔黃圖曰未央宮有金廄輅軨廄大廄果馬廄乾梁廄騎馬廄大宛廄胡河廄騊駼廄九在城內孟子曰廄有肥馬野有餓殍是率獸而食人也郡國志曰雍州霸昌廄在長安西二十五里王莽使司徒王尋發長安宿此春秋佐助期曰廄星傳令神名詩時市古史考曰神農作市世本祝融作市說文曰市買賣之所也古今注曰闤市垣也闠市門也風俗通曰俗言市井者言至市鬻賣當須於井上洗濯令物鮮潔然後市案二十畝為一井今因井為市禮記曰用器不中度不鬻於市布帛精粗不中數幅廣狹不中量不鬻於市奸色亂正色不鬻於市也周禮曰大市日昃而市百族為主朝市朝時而市商買為主夕市夕時而市販夫販婦為主法云主者言其多也百族百姓也又曰凡國凶荒札喪則市無征又曰國君過市刑人赦夫人過市罰一幕世子過市罰一帟命夫過市罰一蓋命婦過市罰一帷注曰市者交利而行刑之處也君子無故不遊觀焉史記曰呂不韋撰春秋成榜於秦市曰有人能改一字者賜金三十斤後漢書曰張楷字公超通嚴氏春秋古文尚書門徒常數百人賓客慕之自父黨夙儒皆造門焉車馬填街黃門及貴戚之家皆起舍巷次以候過客來往之利楷疾其如此輒徙避之家貧無以為業常乘驢車至縣賣藥足給食者輒還鄉里司隸舉茂才除長陵令不之官隱居弘農山學者隨之所居成市後華陰山中遂有公超市又曰王充家貧無書嘗遊洛陽市閲所賣書一遍而誦之晉書曰羊祐疾漸篤乃舉杜預自代尋卒時年五十八帝素服哭之甚哀是日大寒帝涕淚霑鬚皆為冰南州人方市聞祜喪莫不號慟罷市巷哭者聲相接吳守邊將士亦為之泣其仁德感人如此韓子曰龐共與魏太子質於邯鄲共謂魏王曰今一人言市有虎王信乎王曰否二人言王信乎曰否三人言王信乎王曰寡人信矣共曰夫市無虎明矣三人言成市虎今邯鄲去魏遠於市謗臣者過於三人願王察之越絶書曰伍子胥至吳徒跣被髮乞於吳市三日市正疑之而導於闔閭曰市中有非常人徒跣被髮乞於吳市三日吳闔閭曰吾聞荊王殺其臣伍奢而非其罪其子胥勇且智彼必經諸侯之邦可以報其父之讎者王即使召子胥入吳王下階迎而唁數之曰吾知子非常人也何素窮如此子胥跪而垂泣曰胥父無罪而楚王殺之并其子子胥得道遁逃出走唯可以歸骸骨者唯大王哀之吳王曰諾上殿與語三日語無復者王乃令邦中無貴賤長少有不聽子胥教者猶不聽寡人之罪至死不赦又曰吳市者春申君所造闕兩城以為市在湖里班固兩都賦曰內則街衢洞達閭閻且千九市開場貨別隧分人不得顧車不得旋闐城溢郭傍流百廛紅塵四合煙雲相連宮闕記云長安市有九所各方二百六十六步六市在道西三市在道東西里為市凡九市致九州之人在突門夾橫橋大道南又有當市觀又曰旗亭樓在社門大道南又有當市觀張衡西京賦云郭開九市通闤帶闐旗亭五重俯察百隧是也又按郡國志云長安大俠萬子夏居柳市司馬季主卜東市西市在醴泉坊隋曰利人市因有西市署洛陽記曰三市大市名也金市在大城西南市在大城南馬市在大城東按金市在臨商觀西兌為金故曰金市馬市在東舊置丞焉又酈道元注水經云馬市即嵇康為司馬昭所害之處蜀本紀曰老子為關令尹喜著道經臨別曰子行道千日後於成都青羊肆尋吾今為青羊觀是也郡國志曰幽州有邠亭新論云添縣邠亭本大王所部其人相與夜市不為則有重害焉又曰始皇陵有銀蠶金鴈以多奇物故俗云秦王地市又曰郢城內有市名蒲胥故南齊校尉府也又曰越州梅市即梅福為市門卒之所又曰齊桓公宮內有七市韓娥東之齊乏糧過雍門鬻歌於市乃此也又曰雍州富平西南十五里有直市城秦文王造物無二價以直市為名西京記曰東京豐都市東西南北居二坊之地四面各開三門邸凡三百一十二區資貨一百行初築市掘得古冢上藏無磚甓棺木陳朽觸之便散尸著平上幘朱衣得銘曰筮道居朝龜言近市五百年間於斯見矣當時達者參驗其文魏黃初二年所葬也又曰大業六年諸夷來朝請入市交易煬帝許之於是修飾諸行葺理邸店皆使甍宇齊正卑高如一瑰貨充積人物華盛時諸行鋪竟崇侈麗至賣菜者亦以龍鬚席藉之夷人有就店飲噉皆令不取直胡夷驚視𥧲以為常又曰西市隋曰利人市市西北隅有海池長安中僧法成所穿分永安渠以注之以為放生之所穿池得古石銘云百年為市而後為池自置都立市至是時百餘年矣
