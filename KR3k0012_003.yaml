body:
  text: 天部二天部下老子曰天得一以清天無以清將恐裂又曰域中有四大道大天大地大王亦大莊子曰天之蒼蒼其正色耶以其遠而至極也文子曰朴至大者無形狀道至大者無度量故天圓不中規地方不中矩又曰天明日明然後能照四方君明臣明然後能正萬物域中四明故能久又曰高莫高於天下莫下於澤天高澤下聖人法之又曰天愛其精地愛其平人愛其情天之精日月星辰雷霆風雨也地之平水火金木土也人之情思慮聰明喜怒也列子曰杞國有人憂天崩墜身亡所寄廢於寢食又有憂彼憂者因曉之曰天積氣耳若屈伸呼吸終日在天中行止奈何憂崩墜乎其人曰果積氣日月星辰不當墜耶曉者云日月星辰亦積氣之光耀者也長盧子聞而笑曰虹霓也雲霧也風雨也四時也此積氣之成乎天者也知積氣也何以不壞夫天地空中之細物有中之最巨也難窮終始此固然矣憂其壞者亦為遠大言不壞者亦為未是天地不得不壞之則會歸於壞時奚為不憂哉列子聞而笑曰天地壞亦謬矣言不壞亦謬矣壞與不壞吾所不知也雖然彼一也此一也故生不知死死不知生來不知去去不知來壞與不壞吾何容心哉又曰湯問夏革曰四海之外奚有乎曰猶齊州也湯曰汝奚以實之革曰朕東行至營人民猶是也問營之東復猶營也西行之豳民人猶是也問豳之西復猶豳也朕以是知四海四荒四極之外不異是也故大小相含無窮極也含萬物者亦如含天地含天地者亦如含萬物含萬物也故不窮含天地之表故無極朕亦焉知天地之表不有大天地者乎亦吾所不知也天地亦物物有不足故昔者女媧氏選五色之石以補闕斷鼇之足鼇巨龜也以立四極其後共工氏與顓頊爭為帝淮南子曰與神農爭怒獨不周之山折天柱絶地維故天傾西北日月星辰就焉地不滿東南故百川水潦歸焉抱朴子曰宣夜之書亡而郤萌記先師相傳宣夜説云天無質仰而瞻之高遠無極眼瞀精極蒼蒼然也譬旁望遠道黃山而皆青俯察千仞之谷而黝黑夫青冥色黑非有體也日月星象浮生空中行止皆須氣焉故七耀或住或遊逆順伏見無常進退不同由無所根繫故各異也故辰極常居其所北斗不與衆星西沒焉七曜皆東行日日行一度月行十三度遲疾任性若綴附天體不得爾也又曰良將剛則法天可望而不可干柔則象淵可觀而不可入淮南子曰四時天之吏日月天之使星辰天之期虹霓彗星天之忌又曰天有九野九千九百九十里隅去地五萬里楊子法言曰唯天為聰唯天為明夫能高其目而下其耳者匪天也夫又曰或問天曰吾於天歟見無為之為矣或曰雕刻衆形者匪天歟曰以其不雕刻也如物刻而雕之焉得力而給諸又曰天可度則覆物淺矣申子曰天道無私是以恆正天常正是以清明管子曰天或維之地或載之莫之維天已墜矣况於人乎曾子曰單居離問曾子曰天圓而地方誠有之乎曾子曰天之所生上首地之所生下首上首之謂圓下首之謂方始識天圓而地方則是四角之不掩也參嘗聞之夫子曰天道曰圓地道曰方方曰幽圓曰明明者吐氣是故外景幽者含氣是故內景墨子曰飄風苦雨溱溱而至此天之所以罰百姓不上同於天也孔叢子曰魏王問子順曰寡人聞昔者上天神異后稷而為之下嘉穀周遂以興呂氏春秋曰天道圓地道方聖人所以立天下天圓謂精氣圓通周復無雜故曰圓地方謂萬物殊形皆有分職不能相為故曰方主執圓臣處方方圓不易國乃昌又曰天地車輪輪轉也終則復始極則復反又曰天地大矣生而不子成而不有萬物皆被其澤得其利而莫知其所由始三皇五帝之德也又曰天有九野何謂九野中央曰鈞天東方曰蒼天尚書考靈耀曰皋天廣雅曰上天東北方曰變天北方曰玄天西北方曰幽天西方曰皓天尚書考靈耀曰廣雅皆曰成天西南方曰朱天南方曰炎天尚書考靈曜曰赤天南東方曰陽天太玄經曰九天一為中天二為羡天三為順天四為更天五為晬天六為廊天七為咸天八為沉天九為成天又曰天以不見為玄地以不形為玄人以心腹為玄天奧西北鬱化精也地奧黃泉隱營魄也人奧思慮含至精也説苑曰齊景公問子貢曰仲尼賢乎曰賢又問曰奚若曰不知也公怪之子貢曰今謂天高無少長賢愚皆知若問其高幾何皆曰不知仲尼之賢猶天之高也奚得以知又曰臣事仲尼猶執柸就江海飲莫知淺深也又曰齊桓公問管仲曰王者何貴對曰貴天桓公仰視天管仲曰所謂天者非謂蒼蒼莽莽之天也居人上者以百姓為天蔡雍天文志曰言天體者有三家一曰周髀二曰宣夜三曰渾天宣夜之學絶無師法周髀術數具存驗天狀多所違失故史官不用惟渾天者近得其情今史官所用候臺銅儀則其法也立八尺圜儀之度而具天地之象以正黃道名察發斂以行日月以步五緯精微深妙百世不易之道異苑曰陶侃夢飛翔沖天天門九重已入其八餘一門不得進以翼搏天一翅致折驚而墜下左腋腫痛後威果振主欲有窺擬之志每憶折翅之祥抑心而止徐整三五曆紀曰天地渾沌如雞子盤古生其中萬八千歲天地開闢陽清為天陰濁為地盤古在其中一日九變神於天聖於地天日高一丈地日厚一丈盤古日長一丈如此萬八千歲天數極高地數極深盤古極長後乃有三皇數起於一立於三成於五盛於七處於九故天去地九萬里廣雅曰太初氣之始也清濁未分太始形之始也清者為精濁者為形太素質之始也已有素朴而未散也三氣相接剖判分離清濁為天地又曰天圓廣南北二億三萬三千五百里七十五步東西短減四步周六億十萬七百里二十五步從地至天一億一萬六千七百八十一里半下地至厚與天高等又曰南方曰炎天西南方曰朱天西方曰成天西北方曰幽天北方曰玄天東北方曰變天東南方曰陽天中央曰鈞天東方曰上天謂之九天九天之際曰九垠垠堮也九天之外曰次九垓垓階也言其階次九也纂要曰天地四方曰六合四方上下謂之宇古往今來謂之宙白虎通曰男女惣名為人天地所以無惣名何天圓地方不相類也天左旋地右周猶君臣陰陽相向也又曰天所以有災變何所以謹告人君覺悟其過欲令悔慎思慮也黃帝素問曰積陽為天故曰清陽河圖挺佐輔曰百世之後地高天下不風不雨不寒不暑民復食土皆知其母不知其父如此千歲之後而天可倚杵洶洶隆隆曾莫知其始終汲冢紀年書曰懿王元年天再旦於鄭東方朔神異經曰崑崙有銅柱焉其高入天謂之天柱皇覽冢墓記曰好道者言黃帝乘龍升雲登朝霞上至列闕倒影天體如車有蓋日月懸著何有可上哉張衡靈憲曰天有九位自地至天一億萬六千二百五十里懸天之晷薄地之儀皆千里而差一寸孫氏瑞應圖曰舜時后稷播植天降秬秠故詩曰天降嘉種惟秬惟秠秬音巨秠音丕論衡曰天門在西北又日月五星隨天而西移行遲天耳譬若磑石之上行蟻蟻行遲磑轉疾內雖異行外猶俱轉又曰天行六十五度凡積十三萬里也其行甚疾無以為驗儻與陶鈞之運弩矢之流相類似乎又曰天平與地無異若覆盆之狀洛書甄耀度曰周天三百六十五度四分度之一夫一度為千九百三十二里則天地相去十七萬八千五百里關令內傳曰天地南午北子相去九千萬里東卯西酉亦九千萬里四隅空相去九千萬里天去地四十千萬里又曰天有五億五萬五千五百五十里地亦如之各以四海為脈伏侯古今注曰成帝建始三年七月夜有黃白氣長十餘丈明照地或曰天裂或曰天劍五經通義曰神之大者昊天上帝即耀魄寶也又曰天皇大帝亦曰太一又曰其佐曰五帝東方青帝靈威仰南方赤帝赤熛怒西方白帝白招拒北方黑帝汁光紀中央黃帝含樞紐又曰天所以有雷霆風雨霜雪霧露何欲以成歲潤萬物因以見災異也鄒衍大言天事號談天衍虞昺穹天論曰天形穹隆如笠而冒地之表浮元氣之上譬覆奩以抑水而不沒者氣充其中也日繞辰極沒西南還東不入地中也天文録曰古人言天地之形者有三一曰渾天二曰蓋天三曰宣夜宣夜之説未嘗聞也後有虞昺作穹天論姚信作昕天論虞喜作安天論衆形殊象參差其間蓋天之説又有三體一云天如車蓋遊乎八極之中一云天形如笠中央高而四邊下亦云天如欹車蓋南高北下桓談新論曰通人揚子雲因衆儒之説天以為蓋常左旋日月星辰隨而東西乃圖畫形體行度參以四時曆數昏明晝夜欲為世人立紀律以垂法後嗣余難之曰春秋晝夜欲等平旦日出於卯正東方暮日入於酉正西方今以天下之占視之此乃人之卯酉非天卯酉當北斗極北斗天極樞樞天軸也猶蓋有保斗矣蓋雖轉而保斗不移天亦轉周匝斗極常在知為天之中也仰視之又在北不正在人上而春秋分時日出入乃在斗南如蓋轉則北道近南道遠彼晝夜數何從等乎子雲無以解也後與子雲奏事坐白虎殿廊廡下以寒故背日曝背有頃日光去背不復曝焉因以示子雲曰天即蓋轉而日西行其光影當照此廊下而稍東耳無乃是反應渾天家法焉子雲立壞其所作則儒家以天為左轉是也楊泉物理論曰天者旋也均也積陽純剛其體回旋群生之所大仰又曰儒家立渾天以追天形從車輪焉周髀立蓋天言天氣循邊而行從磨石焉斗極天之中也言天者必擬之人故自臍以下人之陰也自極以北天之陰也所以立天地者水也成天地者氣也水土之氣升而為天天者君也夫地有形而天無體譬如火焉煙在上灰在下也渾天説天言天如車輪而轉日月旦從上過夜從下過故得出卯入酉或以斗極難之故作蓋天言天左轉日月不行皆緣邊為道就渾天之説則斗極不正若用蓋天則日月出入不定夫天元氣也皓然而巳無他物焉姚信昕天論曰若使天裹地如卵含雞地何所倚立而自安固若有四維柱石則天之運轉將以相害使無四維因水勢以浮則非立性也若天經地行於水中則日月星辰之行將不得其性是以兩地之説下地則上地之根也天行乎兩地之間矣今地形立於下天象運乎上譬人頤移臨胸而頂不覆背近取諸身故知天體南低入地北則高也冬至極低天運近南故日去人遠斗去人近北氣至故冰寒也夏至極起天運近北故斗去人遠日去人近南天氣至故蒸熱也極之高時日所行地中淺故夜短天去地高故晝長極之低時日所行地中深故夜長天去地下故晝短然則天行寒依於渾夏依於蓋也楚辭天問曰圓則九重孰營度之言天圓九重誰度知之惟茲何功孰初作之言此天九重誰功始之管維焉系天極焉加管轉綱也言天夜轉徙寧有維綱繫其際極安所加乎也八柱何當東南何虧言天有八山為柱皆缺何直東南不足誰能缺也古樂府詩曰天上何所有曆歷種白榆渾儀説文曰渾者制儀器也書曰正月上日受終於文祖在璇璣玉衡以齊七政范寧注曰璇為衡璣者轉也衡者平也若今渾天矣王者所以正天文之器尚書考靈耀曰觀玉儀之旋昏明主時以玉王為渾儀故曰王儀也文耀鈞曰高辛受命重黎説天文唐堯即位羲和立渾儀孝經援神契曰后偷任威折其玉斗失其金椎后君也偷獨苟自專也玉斗北斗以玉為之偷渾儀也金椎以喻國之重寶也劉氏曆正問曰説云顓頊造渾儀黃帝為蓋天皆以天象蓋也渾天儀曰天如雞子地如中黃居其天內天大地小表裏有水天地各乘氣而立載水而浮日月星辰繞地下故二十八宿半見隱天轉如車轂之運王蕃渾天説曰渾天之作由來尚矣考之於天信而有徵舊説天地之體狀似鳥卵天苞地外猶殼之裹黃也周回如彈丸故曰渾天言其形體渾渾如也周天三百六十五度五百八十九分度之百四十五東西南北展轉周規半覆地上半在地下故二十八舍半見半隱以儀準之其見常八十二度有奇是以知其半覆地上半在地下也黃赤二道見與交錯一間相去二十七度以兩儀準之俱三百六十五度有赤道見者常百八十二度半強又南北考之天見者亦一百八十二度半強是知天之體圓如彈丸北出地三十六度是知南極入地亦三十六度而兩相去百八十二度半強也虞喜安天論曰太史令陳季胄以先賢制木為儀名曰渾天又曰言天體者三家渾蓋之術具存而宣夜之法絶滅有意續之而未遑也近見姚元道造昕天論又覩族祖河間立穹天摸鄙意多嫌喜以為天高無窮地深不測地居卑靜之體則天有常安之象形相覆冒無方圓之義渾蓋之家依易立説云天運無窮或謂渾然苞地或謂渾然而蓋愚謂若必天裹地似卵中黃則地是天中一物聖人何別為名而配天乎古之遺語日月行於飛谷謂在地中也不聞列星復流於地又飛谷一道何以容此且谷有水體日為火精冰炭不共器得無傷日之明乎此蓋天所以為臣難也或難曰周禮有方圓之丘祭天地則知乾坤有方圓體也答曰郊祭大報天而主日配日月形圓圓立似之非天體也祭方者別之於天尊卑異位何足怪哉周髀之術多是蓋天蓋天雖與渾異而星辰有常數今陳氏見髀上觀周因言周渾周髀宣夜或人姓名猶星家有甘石也蓋天之體轉四方地卑不動天周其上故云周髀宣明也夜幽之數其術兼之故云宣夜賀道養渾天記曰昔記天體者有三渾儀莫知其始書以齊七政蓋渾體也二曰宣夜夏殷之法也三曰周髀當周髀之所造非周家術也近世復有四術一曰方天興於王充二曰軒天起於姚信三曰穹天由於虞喜皆以抑斷浮説不足觀也唯渾天之事徵驗不疑晉陽秋曰吳有葛衜字思真改作渾天使地居中以機轉之天轉而地止衜古道字義熙起居注曰十四年相國表曰間者平長安獲張衡所作渾儀土圭歷代寶器謹遣奉送歸之天府梁書曰陶弘景嘗造渾天象高三尺許地居中央天轉而地不動以機動之悉與天相會又曰虞僧誕會稽餘姚人以左氏教授聽者亦數百人該通義例當世莫及先是儒者論天互執渾蓋二義論蓋不合渾論渾不合蓋崔靈恩立義以渾蓋為一焉隨書曰耿詢見其故人高智寶以玄象直太史詢從之受天文算術詢創意造渾天儀不假人力以水轉之施於暗室中外候天時合如符契唐書曰將軍李守忠奏三殿上所安置渾天儀銅鼎上津流事具雨門董卓別傳曰卓冶鑄候望璇機儀益部耆舊傳曰漢武帝時落下閎明曉天文於地中轉渾天定時節風土記曰璇衡即今渾儀云古者以玉為之轉運者為機持正者為衡一説言以良玉為管中有光蓋取明以助遠察張衡渾天儀曰赤道橫帶天之腹去極九十一度十九分之五黃道邪帶其腹出赤道表裏各二十四度故夏至去極六十七度而強冬至去極百一十五度亦強也然則黃道邪截赤道者則秋分之去極也今此春分去極九十度秋分去極九十一度少者就夏歷晷景去極之法以為率也王蕃渾天説曰渾天遭周秦之亂師徒斷絶而喪其文唯渾儀常在候臺是以不廢故其楊榷可得而言至於纖微委曲闕而不傳蔡雍以為精微深妙百世不易之道楊子法言曰或問渾天曰落下閎營之鮮于望人度之耿中丞象之請問蓋天曰蓋哉未幾也李軌注曰幾近桓子新論曰揚子雲好天文問之於黃門作渾天老工曰我少能作其事但隨尺寸法度殊不曉達其意後稍稍益愈到今七十乃甫適知已又老且死矣今我兒子愛學作之亦當復年如我乃曉知已又且復死焉其言可悲可笑也顏延之上立渾天銅儀表曰臣昔奉使入關值大軍旋師渾儀在路肆觀奇祕絶代異寶刻漏説文曰漏以銅盛水刻節晝夜百刻周禮夏官挈壺氏掌挈壺以令軍井謂軍穿井成挈壺懸其上令軍中士衆皆望見知下有井也壺所以盛飲故以壺表井也凡軍事懸壺以序聚托凡喪懸壺以代哭皆以水火守之分以日夜鄭司農曰懸壺以為漏也以序聚托以次更聚繫托備守也玄謂繫托兩木相敲行夜時也喪禮未大斂代哭以水守壺者為沃漏也以火守壺者夜則視刻數也分以日夜者異書夜漏也詩序曰東方未明刺無節也朝廷興居無節號令不時挈壺氏不能掌其職焉挈壺氏掌刻漏漢書曰董賢為郎傳漏陛下上見悅之又哀帝紀曰詔大赦天下以建平二年改為太初元年號曰陳聖劉太平皇帝韋昭曰敷陳聖劉之德也漏刻以百二十為度韋昭曰舊漏晝夜共百刻今增其二十也續漢書律曆志曰建武十年詔施行漏刻以日長短為數率日南北二度四分而增成一刻一氣永元十年太史霍融上言官漏刻率九日增減一等不與天相應不如夏曆東觀漢記曰樊梵每當直事常晨駐車待漏漢雜事曰鼓以動衆鉦以止衆夜漏盡鼓鳴則起晝漏盡鉦鳴則息吳録曰吳範字文則善占候知風氣關羽將降孫權問範範期日中權立表下漏以待之及中不至權問其故範曰未正中也頃之有風動帷範曰羽至矣斯須外稱萬歲傳言得羽齊書曰武帝時宮內深隱不聞端門鼓漏聲置鐘於景陽樓上應五鼓及三鼓宮人聞鐘聲早起粧飾後魏書曰自魏初大將行兵長孫嵩拒宋武奚斤征河南獨給漏刻隋書曰耿詢作馬上刻漏世稱其妙煬帝即位進欹器帝善之東方朔別傳曰武帝常飲酎以八月九月中禾稼方盛熟夜漏下水十刻微行乃出桓子新論曰漏刻燥濕寒溫輒異度晝日參以晷景暮夜參以星宿則得其正陸機漏賦曰激懸泉以遠射跨飛途而遙集伏陰蟲以承波吞絙流其如挹王廙洛都賦曰挈壺司刻漏樽瀉流仙叟秉尺隨水沉浮孫綽漏刻銘曰纍筒三階積水成淵器滿則盈承虛赴下靈虬吐注陰蟲承瀉
