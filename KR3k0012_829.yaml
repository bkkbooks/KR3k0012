body:
  text: 資産部八屠周禮地官下曰凡屠斂其皮角筋骨入于王府以當稅給作器物也史記曰魏公子母忌請朱亥奪晉鄙軍亥笑曰臣乃市井鼓刀屠者公子親數存之所以不報謝者小禮無所用今乃臣效命之秋也又曰淮陰屠中少年有侮韓信者曰汝雖長大好帶刀劍中情怯耳又曰樊噲少以屠狗為事東觀漢記曰閔仲叔客居安邑者老病家貧不能買肉日買一片豬肝屠者不肯為斷王隱晉書曰愍懷太子令人屠肉自已分齊手揣輕重斤兩不差公曰其母本屠家女齊書曰王敬則少時屠狗商販遍於三吳後為吳興太守入烏程從市過見屠肉枅歎是我少時在此作也召故人飲酒說平生不以屑也蕭子顯齊書曰帝於芳樂苑立市太官每旦進酒肉雜肴使宮人屠酤周書曰太祖常遊上黨有市屠壯健衆多畏憚太祖氣凌淩之嘗醉命屠進几割肉小不如意叱之屠坦其腹謂太祖曰爾豪則刺我太祖即剚其腹市人駭觀執之屬吏李繼韜惜而逸之孔叢子曰子高謂齊王曰昔臣嘗行臨淄市見屠商焉身修八尺鬚髯如戟市易之男女未有敬之者無德故也莊子曰楚昭王謂司馬子綦曰屠羊說居處卑賤陳義甚高子為我延之以三旌之位說曰夫三旌之位吾知其貴於屠羊之肆萬鍾之祿吾知其富於屠羊之利然豈可貪爵祿使吾君有妄施之名願復反吾屠羊之肆遂不受也又曰朱泙漫學屠龍於支離益單千金之家技成而無所用尉繚子曰太公望行年七十屠牛朝歌尸子曰屠者割肉則知牛長少又曰宋人有公斂皮者適市反呼曰公斂皮屠者遽收其皮燕丹子曰荊軻與武陽入秦過陽翟軻買肉爭輕重屠辱軻武陽欲擊軻止之淮南子曰命屠而享其肉或以酸或以甘齊和萬方其本一牛之體也又曰屠牛坦一朝解九牛而刃可以剃毛庖丁為刀十九年刃如新砥硎庖丁宋人砥磨也何則遊乎衆虛之門賈誼書曰屠牛坦朝解十二牛而芒刃不頓剝割皆中理鹽鐵論曰騏驥挽鹽車垂頭於太行之坂屠者脫之桓談新論曰關東鄙語曰人聞長安樂出門西向笑知肉味美則對屠門而嚼魏文帝與吳質書亦云也三輔舊事曰太上皇不樂關中思慕鄉里高祖徙豐沛屠兒酤酒賣餅商人立為新豐縣故一縣多小人又曰更始遣將軍李松攻王莽屠兒賣餅者皆從之屠兒杜虞手殺莽涼州異物志曰大秦之國斷首去軀操刀屠人杜夷幽求曰齊宣王見屠牽羊哀其無罪以豕代之傳咸集曰屠牛酤酒鑿錢作錫皆有損害酤毛詩鹿鳴伐木曰有酒湑我無酒酤我論語鄉黨曰酤酒市脯不食漢書曰武帝天漢三年初榷酒酤應劭曰縣官自榷賣酒小民不復得酤後漢書曰琅琊海曲呂母家素豐資産數百萬乃益釀醇酒買刀劍衣服少年來酤者皆賖與之視其乏者輒假衣裳不問多少又曰劉寬嘗坐客遣蒼頭市酒遷久大醉而還遷久猶良久也客不堪之罵曰畜産寬須臾遣人視奴疑必自殺顧左右曰此人也罵言畜産辱孰甚焉故吾懼其死也又曰崔實初父卒剽賣田宅起家瑩立碑頌廣雅曰剽削也音匹妙反葬訖資産竭盡因窮困以酤釀販鬻為業時人多以此譏之實終不改亦取足而已不致盈餘吳志曰潘璋字文章性博蕩嗜酒居貧好賒酤債家至門輒言後豪當相還宋書曰吏部尚書庾仲文尚書中令奴酤酃酒利其百十後魏書曰鄭羲為西兗州刺史多所受納政以賄成性又嗇吝人有禮餉者不與杯酒臠肉西門受羊酒東門酤賣之唐書曰建中三年初榷酒天下悉令官釀斛收直三千米雖賤不得減二千委州縣綜領醨薄私釀罪有差以京師王者都特免其榷又曰和元十四年湖州刺史李應奏先是官酤酒代百姓納榷歲月既久為弊滋深伏望許令百姓自酤取登舊額仍許入兩稅隨貫均出依舊例折納輕貨送上都許榷酒錢舊皆隨兩稅徵衆戶自貞元已來有土者競為進奉故上言百姓困弊納輸不充請置官坊酤酒以代之既得請則嚴設酒法閭閻之人舉手觸禁而官收厚利以濟其私為害之日久矣及李應奏罷議者謂宰臣能因一州之請推為天下之法則其弊革矣韓子曰宋有酤酒者升概甚平遇客甚謹為酒甚美懸旗甚高然而酒酸不售怪其故問所知閭長者楊青青曰汝狗猛也曰狗猛也何故不售曰人畏焉或令孺子懷錢挈壺往酤而狗迎齕之酒所以酸而不售夫國亦有狗猛欲道之士懷其術而往欲以明萬乘之主臣為狗猛迎而齕之如此則主所以蔽賢士所以不用也賈誼新書曰鄒穆公視民如子及死酤家不售酒童子不謳歌列仙傳曰酒客者梁市上酒家客也作酒常美日售萬錢有過主人逐之主人酒更酸敗遂至貧窮又曰女凡者陳留酤酒婦也作酒甚美遇仙人過飲以素書五卷為質久開書乃養性交接之術閉房與諸少年飲酒與宿止行文書法顏色更好如二十時仙人後過之笑曰盜道無師有翅不飛遂追仙人去曹植樂府歌曰市肉取肥酤酒取醇交觴接杯以致殷勤盧漢書曰司馬相如與卓文君馳歸成都家徒四壁立文君久之不樂謂長卿曰弟俱如臨卭弟旦也從昆弟假貸猶足以為生何至自苦如此相如與俱之臨卭盡賣車騎買酒舍乃令文君當盧郭璞曰盧酒也師古曰賣酒之處纍土為盧以居酒瓮四邊隆起其一面高形如鍛盧故名盧耳又曰霍光秉政趙廣漢事光及薨後廣漢為京兆尹心知微指發長安吏自將與俱至光子禹弟直突入其門搜索私屠酤椎破盧罌又曰魯匡曰今絶天下之酒則無以行禮相養放而亡限費財傷民請法古令官作酒以千五百石為一率開一盧以賣如淳曰酒家開肆得客設酒盧故以盧名肆臣瓚案盧酒瓮世說曰阮公邑家婦有美色當盧酤酒阮與王安豐常從婦飲酒既醉便眠其婦側夫始殊疑之伺察終無他意又曰王濬冲為尚書令著公服乘軺車經黃公酒盧下回顧謂後車客曰吾與嵇叔夜阮嗣宗共酣飲於盧竹林之遊亦預其末自嵇生阮公亡以來便為時所羈紲今日視此雖近邈若山河南史曰齊謝幾卿性通脫會意便行不拘朝憲嘗預樂遊苑宴不得醉而還因詣道邊酒盧停車褰幔與車前三騶對飲時觀者如堵幾卿處之自若肆周禮天官內宰之職曰凡建國佐后立市設其次置其敘正其肆又地官下曰肆長各掌其肆之政令陳其貨賄名相近者相遠也實相近者相邇也而平正之爾亦近也俱是物也使惡者遠善善自相近鄭司農云謂若殊王之屬俱名為珠俱名為王而賈或百萬或數萬恐農夫愚民見欺故別異令相遠使賈人不得雜亂以欺人左傳襄三十年曰伯有死於羊肆羊肆市列子産禭之枕之股而哭之斂而殯諸伯有之臣在市側者既而葬諸斗城論語曰百工居肆以成其事君子學以致其道包曰言百工處其肆則事成猶君子學以致其道續漢書曰孝靈皇帝於後宮與人列肆販賣使偷盜爭鬥上視以為樂謝承後漢書曰郭秦拔申屠子龍於漆工之中嘉許偉康於屠酤之肆袁山松後漢書曰世祖憐盆子賞甚厚以為趙王郎中後疾失明賜滎陽均輸官地以為列肆使食稅終其身晉中興徵祥記曰烈宗世會稽王輔政於府內園中穿池築山山池之間處處有肆使婢酤賣肉於其中道子將見幸乘船至酒肆輒攜入肆買酒肉狀如市鄽以為笑樂梁書曰呂僧珍為南兗州刺史從父兄子先以販葱為業僧珍至乃棄業求州官僧珍曰吾荷國恩重無以報效汝等自有常分豈可妄求叨越當速反葱肆耳皇甫謐高士傳曰許邵名知人歷客舍則知虞求賢人幘肆則拔楚子昭晉令曰坐盧肆者皆不得宿肆上殷氏世傳曰蓋寬字元祚河南鄭廉始出寒賤未知名君見而友之廉父常居肆乃就拜其父於市衆皆驚由是顯名位至司徒楚辭曰連蕙若以為佩過鮑肆而失香張衡西京賦曰彼肆人之男女麗靡奢于許史繁欽嘲應德璉文曰應溫德云昔與季叔才俱到富波飲於酒肆日暮留宿主人有養女年十五肥頭赤面形似鮮卑偶悅之夜與姦通便生足下莊子曰曾不如早索我於枯魚之肆楊子法言曰好書不能要諸仲尼書肆也李軌注曰賣書市也書不經非書也語林曰王仲祖少有三達覽鏡自玩曰王開山郍生此兒又酷貧帽敗自以形美乃入帽肆就帽嫗戲乃得新帽店世說曰阮修字宣子常步行以一百錢桂杖頭至酒店上便獨酣暢崔豹古今注曰店置也以置貨鬻之物賣買周禮地官下曰泉府掌以市之征布斂市之不售貨之滯於民用者以其賈買之物揭而書之以待不時而買者賣者各從其抵都鄙從其主國人郊人從其有司然後豫之又曰司市掌市之治教以量度成賈而徵儥儥買也物有定賈則買者來也以質劑結信而止訟質劑謂兩書一札而別之也以賈民禁僞而除詐以賈民為之者知物之情僞與實詐以刑罰禁暴而去盜以泉府同貨而斂賖同者謂民貨不售則為斂而買之民無貨則貫而子之凡會同師役市司帥賈師而從治其市政掌其賣儥之事儥買也會同師役必市者大衆所在來物以備之質人掌成市之貨賄人民牛馬兵器珍異凡賣儥者質劑焉大市以質小市以劑鄭玄曰質劑月平賈也質大賈劑小賈玄謂質劑者為之劵書藏之也又曰賈師凡國之賣儥各帥其屬而嗣掌其月禮記曲禮曰君子雖貧不鬻祭器左傳昭七曰公在乾侯平子每歲賈馬賈買也具從者之衣履而歸之于乾侯公執歸馬者賣之賣其馬用不歸馬史記曰子貢既學於仲尼退而仕衛鬻財於曹魯之間戰國策曰燕昭王見郭隗曰齊因孤國之亂而襲破燕對曰古之人君以千金求千里馬者三年不得涓人請求之三月得千里馬馬已死五百金買其首反以報君君大怒對曰死馬尚市況生馬乎朞年千里馬至者二漢書曰漢興接秦之弊諸侯並起民失作業而大飢饉米石五千人相食死者過半高祖令人無得賣子就食蜀漢天下既定民無蓋藏蘇林曰無物可蓋藏又曰衛青比年學擊胡賦稅既不足以奉戰士有司請令民得買爵及贖禁錮免罪請買賞官名曰武功爵級七十萬又曰桑弘羊置平准於京師當天下委輸王官治車諸器比市給大農大農諸官盡籠天下之貨物貴則賣之賤則買之如富商大賈亡所牟大利牟取又曰禹貢尚書欲令近臣自諸曹侍中以上家無得私販賣者又曰中平元年初賣官自關內侯以下至虎賁羽林入錢各有差公千萬卿五百萬東觀漢記曰光武嘗與朱祐昔買蜜合藥上追念之即賜祐白密一石問今憶與朕長安時共買蜜乎又曰郭舟從師長買繻入函谷關乃慨然歎曰丹不乘使者車終不出關又曰司空宋弘常受俸得盬豉千斛遣諸生迎取上河令糶之盬賤諸生不糶弘怒便遣及其賤悉糶賣不與民爭利謝承後漢書曰靈帝數遊戲於西園令後宮綵女為客主身為商賈謝承後漢書曰張揩字公超治嚴氏春秋家貧無以為業嘗乘驢車至縣賣藥足給食者輒還鄉王隱晉書曰劉實字子真平原人少貧苦糠飯繩索作牛衣賣手繩口誦齊書曰朱文濟字敬達吳興人自賣以葬母太守謝瀹命為儒林不就又曰吳達之義興人也嫂亡無以葬自賣為十天客以營冢槨從祖弟敬夫妻荒年被略賣江北達之有田十畝貨以贖之南史曰會稽寒人陳氏有三女無男祖父母年八九十老無所知又篤癃病每不安其室遇寒飢三女相率於西湖採菱蒪更日至市貨賣未嘗虧怠鄉里稱為義門北史曰齊常景耽好經史愛玩文詞若遇新異之書殷勤求訪或復貨買不問價之貴賤必以得為期晏子春秋曰靈公好婦人丈夫飾者國盡服之公使禁之曰女子以男飾者裂其衣斷其帶裂衣斷帶相望不止公問晏子晏子曰公服之於內而禁之於外猶懸牛首於門鬻馬肉於市公曰善使內勿服不環月而國人莫服韓子曰楚人賣珠於鄭為木蘭之櫝薰以桂椒綴以珠玉飾以玫瑰緝以翡翠鄭人買其櫝還其珠可謂善賣櫝不可謂善鬻珠又曰宋之富賈有監止子者與人爭買百金之璞因佯失而毀之負其百金而理其毀得千溢焉又曰諺所謂傭自賣哀而不售士自譽辨而不信者也又曰田修教其子田章曰主賣官爵臣賣知力故曰自恃無恃人淮南子曰郢人有鬻其母者為請於買者曰此母老矣幸善食之而無多苦也此行大不義而欲為小義也三輔決録曰五門子孫凡民之五門今在河南西四十里馬氏兄弟五人共居此地作五門客舍因以為名主養豬賣豬故民為之語曰苑中三公巨下二卿五門藿藿但聞豚聲三輔黃圖曰元始四年起明堂辟雍長安城南北為會市但列槐樹數百行為隊無牆屋諸生朔望會此市各持其郡所出貨物及經書傳記笙磬器物相與賣買雍容揖讓或論議槐下董卓別傳曰呂布殺卓百姓相對欣喜抃舞皆賣家中珠環衣服床榻以買酒食自相慶賀長安酒肉為之踊貴漢武內傳曰帝先有玉板一枝杖是西胡王所獻帝甚愛之崩後故以入槨其年有人於扶風郿市中買得者帝時左右侍人識之以告有司詰問云見市中一人於巷賣之責三十匹即雇交直實不識賣主姓名皇甫謐高士傳曰毛公薛公皆趙人也遭戰國之亂二人俱以處士隱於邯鄲市毛公隱為博徒薛公隱於賣膠又曰韓康字伯休京兆霸陵人常採藥名山賣於長安市口不二價三十餘年時女子從買藥康守價不與女子怒曰是韓伯休耶乃不二價康歎曰我本避名今小女子皆知有何用藥為乃遁霸陵山中搜神記曰南陽宗定伯少年夜行逢鬼鬼問為誰定伯欺云我亦鬼遂共為侶赴宛行極困相檐問鬼曰畏何物曰唯不喜人唾欲至宛便擔鬼著酒瓮上徑詣宛市鬼化為羊恐其變並唾之賣得錢千五百晉後記曰成都王圍京邑城中魚肉無出營巷賣死驢馬肉雜死人肉賣之車頻秦書曰王猛攻鄴慕容評拒猛而恆賣水與軍人衆思為亂猛因得敗之周景式廬山記曰山有康皇廟廟有銅馬一枚道士丁玄真取擲置澗中經宿復還丁乃賣與遠村人買者盡病即送還悉愈列仙傳曰安期生琅琊阜鄉人賣藥海邊秦始皇請見與語三日三夜賜金璧數千萬風俗通曰夜糴俗說市買者當清旦而行日中交易所有夕時便罷無人也今乃夜糴穀明癡騃不足也凡靳不敏惠者曰夜糴傳子曰靈帝榜門賣官崔烈入錢五百萬取司徒語林曰蘇峻新平帑藏空猶餘數千端分粗練王公謂諸公曰國家凋弊貢御不至但恐賣練不售吾當與諸賢各製練服之月日間賣遂大售端至一金應璩新詩曰太官有餘廚大小無不賣豈徒脯與糗醯醢及鹽豉劉超讓表曰臣家理應用一純色牛連市素不如意外廄猥牛中牛色有任用者臣有正陌三萬錢五匹布乞以買此牛詔曰監此不足賣與宜便賜之然義與前後辭讓不妄受一賜今亦必復不受可聽如所啓駔儈說文曰駔馬儈也漢書曰子貸金錢千貫節駔儈孟康曰節節物貴賤也謂除估儈其節利比於千乘之家師古曰儈者合會二家易者駔者其首辛也駔音子郎切儈音貢外切後漢書曰吳漢字子顏家貧給事縣為亭長王莽末以賓客犯法乃亡命至漁陽資用乏以販馬為業續漢書曰平原王君公以明道深曉陰陽懷德滅行和光同塵不為皎皎之操王葬世退身儈牛自給有似蜀之嚴君平搜神記曰羊公字雍伯雒陽人本以儈賣為業性篤孝父母終葬無終山遂家焉晉令曰儈賣者皆當著巾白帖額題所儈賣者及姓名一足著白履一足著黑履淮南子曰假于木晉國之大駔詩慎注曰馬駔市儈也而為文侯師
