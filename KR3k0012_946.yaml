body:
  text: 蟲豸部二蚊說文曰秦謂之蚋楚謂之蚊大戴禮夏小正曰丹鳥羞白鳥白鳥蚊也漢書曰中山靖王朝天子置酒聞樂聲而泣問其故靖王對曰臣聞衆喣漂山藂蚊成雷後漢書曰趙炳有道術人服從者如歸章安令惡其惑衆收殺之人為立祠室於永康至今蚊蚋不敢入也晉書曰道安曰猛虎當道食不覺蚊虻來唐史曰江東有吐蚊鳥夏夜鳴吐紋於蘆荻中湖湘尤甚晏子曰東海有蟲巢蚊睫乳而不飛蚊不驚名曰焦冥列子曰江浦之間生麼蟲麼細也名曰焦螟群飛而集於蚊睫弗相觸也又曰焦螟生於蚊睫離珠子羽拭眼而望弗能見也莊子曰夫愛馬者以筐盛屎以筐盛溺適有蚊撲緣而拊之不時則缺銜毀首碎胸又曰肩吾見狂接輿狂接輿曰日中始何以語汝肩吾曰告我君人者以己出經式義度民孰敢不聽而化接輿曰是欺德也其於治天下也猶涉海鑿河而使蚊負山也又曰孔子見老聃而語仁義老聃曰夫播糠瞇目則天地四方易位矣蚊虻噆音匝膚則通霄不寐矣淮南子曰夫貴賤之於身也猶條風之時麗也時麗忽一過也毀譽之於己也猶蚊虻之一過也又曰蜂蠆螫指而神不能掞音淡蚊蚊音文虻噆膚噆齧也而性不能平今憂患之來嬰人心也非直蜂蠆之螫毒而蚊虻之憯音慘怛也而欲靜漠虛無奈何哉牟子曰昔公明儀為牛彈清角之操伏食如故轉為蚊虻聲則翹尾而躡躒夏侯子曰一蟻之行一蚊之飛聖人皆知之金樓子曰荊州高齊盛夏之月無白鳥余亟寢處於其中及移餘齊則藂蚊之聲如雷矣數丈之間如此之異吁可怪哉又曰白鳥蚊也齊桓公臥於柏寢謂仲父曰吾國富民殷無餘憂矣一物失所寡人猶為之於邑白鳥營飢而求飽寡人因之開翠紗之帳進蚊子焉其蚊有知禮者不食公之肉而退其蚊有知足者㗱子立切公之肉而退其蚊有不知足者遂長噓短吸而食之及其飽也腹腸為之破潰公曰嗟乎民生亦猶是矣孝子傳曰吳猛年七歲時夏日伏於母床下恐蚊虻及父母蕭廣濟孝子傳曰鄧展父母在牖下臥多蚊展伏床下以自當之神異經曰南方蚊翼下有小蜚蟲焉目明者見之每生九卵復成九子蜚而俱出蚊遂不知論衡曰蚊虻不如牛馬之力牛馬困於蚊虻蚊虻有勢也搜神記曰吳猛性至孝小兒時在父母邊臥夏時多蚊蚋而終不搖扇恐蚊蚋去己而及父母嶺南異物志曰嶺表有樹如冬青實生枝間形如枇杷子每熟即拆裂蚊子群飛唯皮殼而已士人謂之蚊子樹嶺表録異曰蚊母鳥形如青鷁觜大而長於池塘捕魚而食每叫一聲則有蚊蚋飛出其口俗云採其翎為扇可辟蚊子亦呼為吐蚊鳥虻晉書曰惠帝時洛陽南山有虻作聲曰韓尸識者以為韓氏將尸戮俄而韓謐被誅淮南子曰虻戢精血以類推之也許慎曰虻食血又曰虻與驥致千里而不飛無糗糧之資而不飢又曰上古之時冬日則不勝霜雪霧露夏日則不勝暑熱蚊虻蚋梁書曰梁武丁貴嬪諱令光譙國人也初貴嬪少時與鄰女月下紡績諸女並患蚊蚋而貴嬪弗之覺也又曰孫謙居身儉素床施蘧蒢屏風冬則布被莞席夏日無幬帳而夜臥未嘗有蚊蚋人多異焉列子曰目將眇者先暑秋毫耳將聾者先聞蚋飛淮南子曰涵牛之鼎沸而蠅蚋弗敢入涵牛受一牛之鼎也崑山之玉瑱崑山崑崙也瑱式也而塵垢弗能汙也又曰羊肉不慕蟻蟻慕於羊肉羶也醯酸不慕蚋蚋慕於醯酸也呂氏春秋曰缶醯黃蚋藂之有酸也美羹徒水則必不可以狸致鼠以冰致蠅雖上聖不能以茹魚去蠅蠅愈至茹女居反臭也以致之之道去之也蜉蝣毛詩曹蜉蝣曰剌奢也蜉蝣之羽衣裳楚楚蜉蝣渠略也朝生夕死猶有羽翼以自修飾楚楚鮮明貌爾雅曰蜉蝣渠略似蛣蜣身狹而長角黃黑色叢生糞土中朝生暮死豬好啖之說文曰秦晉之間謂蜉蝣為渠略郭璞注曰似天牛而小有甲也又曰𧑀音略蟲也一名蜉蝣朝生暮死陸機毛詩疏義曰蜉蝣方土通謂之渠略似甲蟲有角大如指長三四寸甲下有翅能飛夏月陰雨時地中出令人燥炙噉之美於蟬也樊光曰是糞中蠍蟲隨雨而出朝生而夕死淮南子曰龜三千歲蜉蝣不飲食三日而死以蜉蝣為龜憂養生之具必失之廣志曰蜉蝣可燒啖美於蟬蜉蝣在水中翕上尋死隨流而去傅咸蜉蝣賦曰讀詩至蜉蝣感其雖朝生夕死而能修其翼可以有興遂賦之王褒聖主得賢臣頌曰蟋蟀候秋吟蜉蝣出以陰蠛蠓爾雅曰蠛蠓小蟲似蚋喜亂飛漢實録曰周太祖軍至北郊時慕容彥超自負沉勇謂上曰北來都將臣盡諳知以臣觀之蜉蝣蠛蠓耳列子曰朽壤之土春夏之月蠛蠓者因雨而生見陽而死莊子曰孔子聞老聃之言出告顏回曰丘之於道也其猶醯雞歟醯雞者甕中之蠛蠓也淮南子曰衰世則藂蟲滿野許慎日飛蟲蠛蠓抱朴子曰蠓蟈之育於醢酢芝檽之産於木石蛣𧌑之滋於汙游翠蘿之老於松枝非彼四物所創造也字書曰蠛蠓小蟲三風舂雨磑者也蝴蝶北齊書曰魏收嘗在洛京輕薄尤甚人號云魏收驚蛺蝶文襄曾遊東山令給事黃門侍郎等宴文襄曰魏收博才無宜適須出其短往復數番收忽大唱曰楊遵彥理屈已倒遵彥從容曰我綽有餘暇山立不動若遇當塗恐翩翩遂逝當塗者魏翩翩者蝶也文襄先知之大笑稱善梁書曰沈麟士年過八十耳目猶聰明反故抄寫火下細書復成二三千卷滿數十篋時人以為養身靜默所致仍製黑蝶賦以寄意漢實録曰右監門衛大將軍許遷言臣奉命博州至博平縣戴村有蝝彌亙數里一夕言並化蝶飛去列子曰烏足以其根為蠐螬其葉為蝴蝶莊子曰昔周夢為胡蝶林林然胡蝶也不知周也俄覺則瞿瞿然周也不知周之夢為胡蝶與胡蝶之夢為周與周與胡蝶則必有分矣此謂物化抱朴子曰髻孺背千金而逐蛺蝶越人棄八珍而甘龜蛇金樓子曰陳思之文群才之俊也而武帝誅之尊靈永蟄明帝頌云聖體浮輕浮輕有似於胡蝶永蟄頗擬於昆蟲施之尊極不其蚩乎崔豹古今注曰蛺蝶一名野蛾一名風蝶東人謂為撻末色白背青者是也其大有如蝙蝠者或黑色或亦斑名曰鳳子一名鳳車一曰鬼車生江南甘橘園中廣五行記曰晉安帝義熙中烏傷人葛輝在妻家宿三更有兩人把火徑至階前疑是惡人便打之欲下杖悉化為蝶蠙紛飛散有一物衝輝腋下便打倒地輝少時而死嶺南異物志曰嘗有人浮南海泊於孤岸忽有物如蒲帆飛過海將到舟竟以物擊之如帆者盡破碎墜地視之乃蛺蝶也海人去其翅足稱之得肉八十斤噉之極肥美嶺表録異曰鶴子草蔓上春生雙蟲只食其葉越女收於粧奩中養之如蠶摘其葉飼之蟲老不食而蛻為蝶蝶赤黃色婦女收而帶之謂媚蝶螢毛詩豳七月曰町畽鹿場熠耀宵行螢火也大戴禮夏小正曰丹鳥羞白鳥丹鳥也者謂丹良也白鳥也者謂蛟蚋也其謂之鳥者重其養也凡有翼者為鳥羞也者進也禮記月令曰季夏之月腐草為螢爾雅曰螢火即照夜飛腹下有火音照廣雅曰景天螢火燐也續晉陽春秋曰車胤字武子好學不倦家貧不常得油夏月則練囊盛數十螢火以夜繼日焉後漢書曰光熹元年秋張讓段圭劫少帝及陳留王協走小平津帝與王夜步逐螢火光行數里得民家露車共乘還宮隋書曰大葉十二年煬帝幸景華宮徵求螢火得數斛夜出遊山而放之光遍巖谷崔豹古今注曰螢一名輝夜一名景輝天一名熠耀一名燐一名丹良一名夜光一名宵燭腐草為之食蚊蚋焉月令曰丹鳥羞白鳥白鳥即蚊也丹鳥螢也說文云秦人謂蚊曰蚋淮南萬畢術曰螢火卻馬注云取螢火裹以羊皮置土中馬見之鳴卻不敢行祖台之志怪曰昔懷帝永嘉中譙國丁祚渡江至陰陵界時天昏霧在道北有社見一物如人到立兩眼垂血從額下藂地兩處各有升餘祚與從弟齊喝之滅而不見立處藂血皆化為螢火數千枚縱橫飛起本草經曰螢一夕夜光一名即照一名熠耀潘嶽螢火賦曰爛若飛景之霄遊彗音衛如移星之雲流動集飄揚灼如隨珠熠爚若丹蘂之初葩彯頴若流金之在沙傅咸螢火賦曰余曾獨處夜不能寐顧見螢火意遂有感於是執以自照而為之賦其辭曰感詩人之攸懷兮覽熠耀於前庭不以姿質之鄙薄兮欲增輝乎太清雖無補於日月期自竭於陋形螟蛉毛詩節小宛曰螟蛉有子蜾螺負之螟蛉桑蟲也蜾螺蒲盧也負持也箋云蒲盧取桑蟲之子脅持而去煦嫗養之以成子毛詩義疏曰螟蛉似步屈其色青細小或在草葉上土蜂取之置木穴中或書卷間筆筒中七日而成其子里語曰呪云象我象我陸機毛詩義疏曰螟蛉犍為文學舍人曰桑上小青蟲也似步屈郭璞注方言曰尺蠖又呼步屈其色青而細小或在草木葉上今蜾螺所負為子者爾雅曰螟蛉桑蟲也俗亦謂桑蟃亦曰戎支蠮螉爾雅曰蜾螺蒲盧也郭璞注曰細腰蜂也俗呼為蠮螉音咽翁陸機毛詩疏義曰蜾螺土蜂一名蒲盧似蜂而小腰故許慎云細腰也取桑蟲負之於木空中筆筒中七日而化其子里語曰呪云象我象我也禮記中庸曰哀公問政於孔子孔子對曰文武之政布在方策其人存則其政舉其人亡則其政息人道敏政地道敏樹夫政也者蒲盧也蒲盧蜾螺土蟲也取螟蛉而化之以為子為政化百姓亦如蒲盧也故為政在人揚子法言曰螟蛉之子殪而逢蜾螺祝曰類我久則肖之矣速哉七十子之肖仲尼也肖類也
