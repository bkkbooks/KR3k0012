body:
  text: 職官部二丞相上尚書曰成湯居亳初置二相以伊尹仲虺為之又君奭曰我聞在昔成湯既受命則有伊尹格于皇天又說命曰高宗夢得說使百工營求諸野說築傅巖之野爰立作相置諸左右命之曰若金用汝作礪若濟巨川用汝作舟楫若歲大旱用汝作霖雨啓乃心沃朕心若藥不瞑眩厥疾弗瘳韓詩外傳曰田饒事魯哀公而不見察田饒謂哀公曰臣將去君黃鵠舉矣哀公曰何謂也饒曰君獨不見雞乎雖有五德君猶日滿而食之者何以其所從來者近也夫黃鵠一舉千里止君園池食君魚鱉啄君忝梁無此五德猶貴之以其所從來者遠也臣將去君黃鵠舉矣哀公曰止吾將書子之言也饒曰臣聞食其食者不毀其器蔭其樹者不折其枝有臣不用何書其言遂去之燕燕用為相三年燕政大治哀公喟然太息為之避寢左傳曰仲虺居薛為湯左相又曰齊桓公置射鉤而使管仲相國語曰季文子相宣公成公無衣帛之妾無食粟之馬仲孫他諫曰子為魯上卿相二君矣妾無衣帛馬不食粟人其以子為愛且不華國乎文子曰吾亦願之然吾觀國人其父兄之食粗衣惡而我美妾與馬無乃非相人乎且吾聞之以德榮為華不聞以妾與馬文子以告孟獻子獻子囚之七日自是子服之妾衣不過七升之布馬餼不過稂莠餼米也稂童稂史記曰黃帝得六相而天地治神明至黃帝得蚩尤而明天道得太常而察地利得奢龍而辨東方得祝融而辨南方得風后而辨西方得后土而辨北方謂之六相又曰堯舉八凱倉舒隤敳檮戭大臨尨降庭堅仲容叔達為八凱即垂益禹皋陶之倫也庭堅即皋陶字也使主后土后土地官也以揆百事莫不時敘地平天成揆度成亦平也舉八元伯奮仲堪叔獻季仲伯虎仲熊叔豹季狸為八元也使布五教于四方內平外成內諸夏外夷狄謂之十六相亦曰十六族又曰秦悼武王二年始置丞相官樗里疾甘茂為左右丞相又曰鄭以子産為相一年豎子不戲狎班白不提挈童子不犁畔二年市不豫賈三年門不夜閉道不拾遺四年田器不歸五年土無尺籍喪期不令而治鄭二十六年而死丁壯號哭老人兒啼子産去我死乎民將安歸又曰公儀休為魯相客有遺魚者不受客曰聞君嗜魚何故不受相曰以嗜魚故今為相能自給魚今受而魚誰復給我魚故不受食茹拔其園葵而棄之見布好而出其家婦燔其機云欲令農士工女安其所豈可害其貨乎又曰石奢楚昭王相也堅直廉士無所避行縣道有殺人者相追之乃其父也縱其父還自繫使人言之於王曰殺人者臣之父也夫以父立政不孝也廢法縱罪非忠也臣罪當死王曰追而不及不當伏罪奢曰不私其父非孝也不奉主法非忠也王赦罪上惠也伏誅而死臣職也遂不受令自刎而死又曰五羖大夫之相秦也勞不坐乘暑不張蓋行國中不驅車乘不操干戈功名藏於府庫德行施於後世五羖大夫死國中男女流涕童子不歌謠舂者不相杵又曰秦莊襄王薨太子政立尊呂不韋為相國號稱仲父又曰二世亡誅李斯乃拜趙高為中丞相事無大小皆決之又曰趙高為丞相欲為亂恐群臣不聽乃先設驗持鹿獻於二世曰馬也二世笑曰丞相誤耶謂鹿為馬問左右或默或言馬以阿順趙高或言鹿高因陰中諸言鹿者以法又曰韋丞相賢者魯人以讀書術為吏至大鴻臚有相工相之當至丞相有男四人相之至第二子名玄成相工曰此子貴當封侯丞相曰我為丞相有長子是安從得之後賢竟為丞相病死而長子有罪論不得嗣而立玄成又曰魏相者濟陰人以文吏至丞相其人好武令諸吏帶劍前奏事或有不帶劍者當入奏事乃借劍而敢入又曰匡衡為御史大夫歲餘韋丞相死代為丞相封樂安侯衡十年之間不出長安城門至丞相豈非遇時而合也漢書曰陳平陽武人周勃沛人高帝即位以勃為右丞相以平為左丞相帝問勃曰一歲決獄錢穀出入幾何勃不知汗出浹背上問平平曰有主者上曰主者誰曰決獄責廷尉錢穀責治粟內史上曰君所主何事平曰臣主佐天子理陰陽調四時理萬物撫四夷上曰善於是出勃語平曰君獨不早教我乎又曰蕭何沛人陳狶反上自將聞呂后用何計誅韓信拜何相國何病惠帝自臨視何疾因問君百歲後誰可代君對曰知臣莫若主帝曰曹參何如何曰帝得之矣臣雖死無恨矣又曰曹參沛人聞蕭何薨告舍人趨治裝吾當入相使者果召參為相擇郡國長史訥文辭謹厚者為丞相史參日夜飲酒賓客見參不事事皆欲有言至者參輒飲以醇酒醉而後去終莫得開說又曰蕭何拜相國益封五千戶卒五百人為衛衆人皆賀邵平獨弔謂何曰禍自此始也何乃讓封悉以家財佐軍上喜又曰張蒼免相文帝以皇后弟竇廣國賢有行欲相之恐天下以吾私廣國久念不可而高帝時大臣餘見無可者乃以御史大夫申屠嘉為丞相嘉為人廉直門不受私謁時太中大夫鄧通方愛幸賞賜纍巨萬文帝常燕飲通家是時嘉入朝而通居上旁有怠慢之禮嘉奏事畢因言曰陛下幸愛其臣則富貴之至於朝廷之禮不可以不肅朝罷嘉為檄召通通至詣丞相府免冠徒跣頓首謝嘉嘉坐自如弗為禮責曰夫朝廷者高皇帝之朝廷通小臣戲殿上大不敬當斬使吏今行斬之如淳曰嘉語其吏曰今便行斬之上度丞相巳困通使使持節召通而謝丞相此吾弄臣君釋之又曰公孫弘頴川人武帝以弘為丞相掌列侯唯弘無爵詔封平津鄉侯六百五十戶丞相封侯自弘始也弘食一肉脫粟飯故人賓客仰衣食家無餘財又曰公孫賀字子叔北地人引拜為丞相不受印綬泣涕曰臣本邊鄙鞍馬騎射不任宰相又曰車千秋本姓田為高寢郎訟太子冤曰子弄父兵罪當笞天子之子過誤殺人何罪哉臣嘗夢見白頭公教臣言於是上召見千秋千秋體貌甚嚴帝說之曰高廟神靈使公教我公當遂為吾輔相數月為丞相封富民侯千秋一言寤主旬月至宰相世未嘗有又曰蔡義河內人詔求能為韓詩者徵義待詔久不進見義上疏曰臣行能無所比容貌不及衆而不棄人倫者竊以聞於先師自託於經術願賜清間之燕盡精思於前上召見說詩悅之擢為光祿大夫代楊敞為丞相時年八十餘短小無鬚眉貌類老嫗行步傴僂常兩吏扶乃能行又曰邴吉為丞相寬大好禮讓掾史有罪輒豫長休吉終無所案驗客或謂吉侯為漢相奸吏成其私吉曰夫以三公之府有案吏之名吾竊陋焉後人代吉公府不案吏自吉始也吉馭吏嗜酒數逋蕩嘗從吉出醉嘔丞相車茵上西曹主吏白欲斥之吉曰以醉飽之失去士使此人將復何所容西曹忍之此不過汙丞相茵耳遂不去也又曰王啇字子威涿郡人為丞相有威重長八尺餘身體鴻大容貌過人河平四年單于來朝引見白虎殿丞相啇坐未央庭中單于前拜謁啇啇起離席與言單于仰視啇貌大畏之遷延却退天子聞而歎曰此真漢相也又曰邴吉為丞相常出逢鬭者死傷橫道吉不問又逢人逐牛牛喘息吐舌止駐使騎使問逐牛行幾里吏怪之吉曰人鬭殺傷長安令京兆尹所當禁吾備宰相不親小事方春少陽用事未可以熱恐牛近行此時氣失節三公典調陰陽職所憂也又曰薛宣為丞相相府辭訟例不滿萬錢不為移書後皆遵用薛侯故事然官屬譏其煩碎無大體不稱賢相也又曰韋賢字長孺為丞相年七十餘乞罷歸賜第丞相致仕自賢始也又曰田蚡為丞相絀黃老刑名百家之言延文學儒者數百人儒由是興又曰丞相有病皇帝法駕親至問疾及瘳視事則賜以養牛上尊酒如淳曰律稻米一㪷得酒一㪷為上尊稷米一㪷得酒一㪷為中尊粟米一㪷得酒一㪷為下尊顏師古曰稷即粟也中尊者宜為黍米不當言稷且作酒自有澆淳之異為上中下耳非必繫於米也又曰有天地大變天下大過皇帝使侍中持節乘四白馬賜上尊酒十斛牛一頭策告殃咎使者去半道丞相追上病使者還未白事尚書以丞相不起病聞若丞相不勝任使者策書駕駱馬即時布衣步出府免為庶人若丞相有他過使者奉策書騅騩馬即時步出府乘棧車牝馬歸田里思過又曰大司空朱博奏曰帝王之道不必相襲高帝置御史大夫次丞相典政度以職相參歷載二百天下安寧今更大司空與丞相同故事選中二千石為御史大夫任職者為丞相位次有敘所以尊聖德重國相也今中二千石未更御史而為丞相非所以重國政也臣願罷大司空以御史大夫為百僚師哀帝從之又曰相國丞相皆秦官金印紫綬掌承天子助理萬機秦有左右丞相高帝更名相國蕭何曹參並為之哀帝更名大司徒後漢書曰李通自為宰相謝病不視事連年乞骸骨帝每優寵之令以公位歸第養疾漢舊儀曰丞相車兩黑轓騎者戈絳掾史見禮如師白録不拜朝示不臣也聽事閣曰黃閣無鍾鈴漢雜事曰田蚡為丞相中二千石拜謁蚡不為禮汲黯為主爵都尉見蚡未嘗拜揖之而巳漢舊儀曰丞相有病皇帝法駕親至問疾薨即移於第中賜棺賻葬地葬日公卿以下會選應劭漢官曰丞相有疾御史大夫日一問起居百官亦如之魏志曰曹公初平十三年漢罷三公官置丞相御史大夫夏六月以公為丞相又曰鍾繇字元常魏國初建為大理遷相國文帝在東宮賜繇五熟釜為之銘曰於赫有魏作漢藩輔厥相惟鍾實幹心膂靖恭夙夜匪遑安處百僚師師楷茲度矩蜀志曰諸葛亮率諸軍攻祁山魏明帝使張郃距亮亮使馬謖督諸軍在前馬謖違亮節度為所破戮謖以謝衆上疏自貶以右將軍行丞相事吳志曰張昭字子布初孫權當置丞相衆議歸昭權曰方今事職冗者貴重非所以優也後孫劭卒百寮復舉昭權曰孤豈為子布愛乎顧丞相事煩而此公性剛所言不從怨咎將至非所以益之又曰顧雍為丞相孫權常遣中書郎詣雍有所咨訪若合雍意事可施行雍即與相反覆究而論之為設酒食如有不合雍即正色改容默然不言無所施設即退告權權曰顧公歡悅是事合宜也其不言者是意未平也孤當重思之其見敬信如此又曰萬彧為右丞相王蕃啁彧曰魚潛於淵出水吹沫何則物有本性不可橫處非分也彧出自溪谷羊質虎皮虛受光赫之寵跨越三九之位犬馬猶能識養將何以報厚施乎彧曰唐虞之朝無謬舉之才造父之門無駑蹇之質蕃上誣明選下訕楨幹亦何傷於日月多見其不知量耳又曰顧雍字元歡吳郡人也代孫邵為丞相平尚書事其所選用文武將吏隨能所任心無適莫時訪逮民間及政職所宜輒密以聞若見納用則歸之於上不用終不宣泄權以此重之又曰步騭字子山代陸遜為丞相猶誨育門生手不釋書被服居處有如儒生然門內妻妾服飾奢綺頗以此見譏又曰陸凱遷丞相孫皓性不好人視巳群臣侍見睛莫敢忤凱說皓曰夫君臣無不相識之道若卒有不虞不知所赴皓聽凱自視晉書曰東海王越為太博問王尼何以獨不拜尼數越事事非宰相是以不拜又曰山濤薨魏舒領司徒有頃即真舒居位持重為任職不顯人之矩咸推有宰相望祿賜散之九族家無餘財齊書曰褚淵美儀貌善容止俯仰進退盛有風則每朝會百僚遠國莫不延首目送之宋明帝常歎曰褚淵能遲行緩步便持此得宰相矣又曰明帝顧命江祐兄弟及始安王遙光尚書令徐孝嗣領軍蕭坦之更曰帖勑時呼為六貴皆宰相也齊職儀曰相國緑綟綬袞冕服湯以伊尹為宰相仲虺為右相高宗得傅說立為相魏襄王以公孫衍為相邦趙孝成王以廉頗為相國
