body:
  text: 獸部七馬三晉書曰王濟善解馬性嘗乘一馬著連乾鄣泥前有水終不肯渡濟云此必是惜鄣泥使人解去便渡故杜預謂濟有馬癖又曰王師敗於蕩陰嵇紹被害初紹之行也侍中秦准謂曰今日向難卿有佳馬否紹正色曰大駕親征以正伐邪理必有征無戰若使乘輿失守臣節有在駿馬何為聞者莫不歎息載記曰慕容廆有駿馬曰赭白有奇相逸力石季龍之伐棘城也皓將出避難欲乘之馬悲鳴踶齧人莫能近皓曰此馬見異先朝孤常仗之濟難今不欲者蓋先君之意乎乃止季龍尋退皓益奇之至是四十九歲矣而駿逸不虧俊比之於鮑氏驄命鑄銅以為其象親為銘讚鐫其旁置之薊城東掖門是歲象成而馬死又曰符堅遣使西域稱楊堅之盛德并以繒綵賜諸國王於是朝獻者十有餘國大宛獻天馬千里駒皆汗血朱鬣五色鳳膺麟身及諸珍異五百餘種堅曰吾思漢文之返千里馬咨嗟美詠今獻馬其悉返之庶剋念前王髣佛古人矣乃命群臣作止馬詩而遣之示無欲也又曰武昭王皓字玄盛少而好學性沉敏寬和美器度通涉經史尤善於文義及長頗習武藝誦孫吳兵法嘗與呂光太史令郭黁及其同母弟宋繇同宿黁起謂繇曰君當位極人臣李君有國土之分家有騧草馬生白額駒此其時也呂光末京兆假業自稱涼州牧以燉煌太守趙郡孟敏為沙州刺史署玄盛效輦今敏尋卒燉煌護軍馮翊郭謙沙州治中燉煌索仙等以玄盛溫毅有惠政推為寧朔將軍燉煌太守玄盛初難之會宋繇仕於業告歸燉煌言於玄盛曰兄忘郭黁之言耶白額駒今已生矣玄盛乃從之又曰庾亮所乘馬的顱殷浩以為不利勸賣之亮曰曷有己之不安移於人乎晉中興書曰恭帝之為琅邪王好奇戲閉一匹馬於門內令人射之欲觀幾箭而死左右曰馬國姓而射之不祥甚矣乃止俄而桓玄篡位續安帝紀曰司馬休之奔廣固慕容超有欲害心而休之不知休之常以所乘騅馬於床前養飼忽連鳴不食注目視鞍休之試被之即不動也訖還床坐馬又驚跳因試騎視馬即驟出裁至門外奔而馳之走行數里休之顧望所住已有寇至乘以南奔殆而獲免後還荊州加騅馬揚武之號王隱晉書曰馬隆子咸為成都王前鋒長沙王所統冠軍司馬王湖率衆討咸於馬市咸堅不動湖乃使數十騎下馬縛戟於鞍而令向咸又使數十騎各㓨所放馬馬驚奔咸軍軍壞湖因馳逐猛戰臨陳斬咸干寶晉紀曰桓範出赴曹爽宣王謂蔣濟曰智囊往矣濟曰智則智矣駑馬戀芻豆爽必不能用也鄧粲晉紀曰王湛有隱兄弟宗族皆以為癡居墓次不交當世兄子濟性好馬所乘駿快意甚愛之湛曰此馬雖快力薄不堪苦近見督郵馬當勝此濟然之取督郵馬穀食十數日與湛試之湛未嘗乘馬卒然便騎馳騁步驟不異於濟而馬不相勝湛曰直行平路何以別馬唯當於蟻封於是就蟻封盤馬濟馬果倒躓濟乃服崔鴻十六國春秋曰驍騎將軍呂光封西域平上疏曰唯龜茲據三十六國之中制彼王侯之命入其國城天驥龍麟腰裊丹髦萬計盈廄雖伯益更生衛賜復出不能辨也又曰太上四年高麗使至獻美女十人千里馬一匹兗州民王蒲率衆二千來降獻千里馬一匹羊鬚去地九寸拜蒲長水校尉廩丘公宋書曰宋大明五年吐谷渾拾寅遣使獻舞馬沈約宋書曰鮮卑二子長曰吐谷渾少曰若洛廆若洛廆別為渾庶長廆正嫡父在特分七百戶與渾渾與廆二部俱牧馬馬鬥相傷廆怒讓渾曰鬥在馬而怒及人耶乖別甚易今當去汝萬里於是擁馬西行廆悔悟深自咎責遣舊父老及長吏乙郍樓追渾令還渾曰我是卑庶理無並大今以馬致別殆天所啓諸君試擁馬令東馬若還東我當相隨去即使二千騎共遮馬令回馬回不盈三百步顃然悲鳴西走聲若頽山如是者十餘回一回一遠樓跪曰可汗此非復人事又曰劉瑀為右衛將軍年位本在何偃前孝武初偃為吏部尚書瑀圖侍中不得與偃同從郊祀時偃乘在前瑀策駟居後相去數十步瑀踏徒合切馬及之謂偃曰君轡何疾偃曰牛駿馭精所以疾耳偃曰君馬何遲曰騏驥羅於羈絆所以居後偃曰何不著鞭使致千里答曰一蹙造青雲何至與駑馬爭路蕭子顯齊書曰楊玉夫殺宋蒼梧王將首與王敬則敬則送太祖太祖夜乘常所騎赤馬入殿及踐祚號此馬為龍驤將軍後魏書曰高肇字道文文昭王太后之兄也大舉征蜀以肇為大將軍都督諸軍面辭世宗於東堂親奉規略是日肇所乘駿馬停於神虎門外無故驚倒又轉臥倒渠中鞍且瓦解衆咸怪異肇辭出見而惡焉世宗崩肇還高陽王與領軍于忠遣壯士殺之後周書曰于謹嘗率騎追茹茹前後十七戰盡降其衆嘗為賊所圍謹乘駿馬一紫一騧賊所先識乃使二人各乘為突陳而出賊以為謹也皆爭逐之謹乃入塞三國典略曰西魏孝武將為齊太祖所殺孝武索所乘波斯騮馬命太宰南陽王躍之將舉其鞍馬蹶而死帝惡之日晏還宮至後門馬驚不前捶之鞭折入謂潘彌曰今日幸無他不彌曰過夜半則大吉須臾帝飲酒遇鴆而崩時年二十五諡曰孝武殯於草堂佛寺十餘年乃葬又曰高歡歸爾朱榮劉貴事榮盛言歡美榮未朱之奇也歡更衣服重求見焉因隨榮之廄廄有害馬榮命翦之歡不絆翦竟不蹄齧已而起曰凡御惡人亦如此矣榮遂坐歡於床下屏左右而訪時事歡曰聞公有馬十二各色別為群將此竟何用也榮曰且言爾意歡曰方今天子愚弱太后淫亂四方雲擾朝政不行以明公雄武乘時奮發但將討鄭儼徐紇為辭舉鞭足以定天下此是賀六渾意榮大悅曰爾意即我意也自是每參軍謀又曰齊盧潛與特進慕容儼善儼之將死謂其子曰盧尚書教我為人我死之後將吾騂馬與之其子遂以他馬與潛儼喪出得停不肯進巫祝為儼聲曰何意不與盧尚書騂馬其子遵命儼喪乃行又曰齊馮子琮被執於省內以弓弦絞殺之使內參以庫車載其尸歸人無知者子琮所乘之馬曳韁走以頭扣車狀如號哭見者異之車至其門諸子方握槊聞庫車來以為賜也大喜開視乃哭又曰齊主北伐太保領太僕安定玉賀拔仁進馬並非駿足齊王讓之仁對曰御馬超逸群下不逮齊主大怒免為庶人命之負炭輸於晉陽又曰周裴果字戎昭魏齊州刺史遵之子也從軍征討乘黃驄馬衣青袍每先登陷陳時人號為黃驄年少又曰周賀若敦與陳侯瑱相拒敦軍數有叛人乘馬投瑱者輒納之乃別取一馬牽以赴船中人逆以鞭之如是者再三馬便畏船不上後伏兵於岸乃遣人乘以招瑱瑱兵迎接競來牽馬敦發伏兵掩之盡殪後有亡命者猶謂為詐不復納也又曰梁普通中童謠言或云青絲白馬者侯景乃常乘白馬以青絲為勒用應謠言陳書曰初有童謠曰黃班青驄馬發自壽陽涘來時冬氣末去日春風來始其後陳主果為韓擒所敗擒本名擒虎黃班之謂也破建康之始復乘青驄馬往反時節皆相應隋書曰吐火羅國有山穴中出神馬每歲牧牝馬於穴所産必名駒又曰吐谷渾有青海周回千餘里中有小山其俗至冬輒放牝馬於其上言得龍種嘗得波斯草馬放入海因生驄駒日行千里故時稱青海驄焉又曰長孫晟從晉王破突厥玉大喜引晟入內同宴極歡有突厥達官來預坐說言突厥之內大畏長孫揔管聞其弓聲謂為霹靂見其走馬稱為閃電王笑曰將軍震怒威行域外遂與雷霆為比一何壯哉唐書曰貞觀十三年三月乙巳辰廄産白馬朱鬣又曰貞觀中骨利幹遣使朝貢太宗遣雲麾將軍康蘇密往慰撫之仍列其地為玄闕州俄又遣使隨蘇密使入朝獻良馬十匹太宗奇其駿異為之制名號為十驥一曰騰霜白二曰皎雪驄三曰凝露驄四曰懸光驄五曰決波騟六曰飛霞驃七曰發雷赤八曰流金騧九曰翔麟紫十曰奔紅赤又為文以敘其事又曰永徽中吐谷渾河源郡王慕容諾曷鉢遣使獻駿馬上問其馬之種性對曰臣國中之最者所以獻之上曰良馬人之所欲豈可輟彼不足而加我之有餘哉乃命還之又曰永徽中駮馬國遣使朝貢其地在突厥之北漸近北海去京師一萬四千里戶十萬勝兵三萬人馬三十萬匹馬色並駮故以為名又曰開元十二年太原獻異馬駒其耳如筒左右各一十六肋肉尾無毛又曰天寶中隴右節度皇甫惟明奏龍支縣人庫狄孝義有馬生龍駒經九旬有九日身有鱗而不生毛臣就檢視時有慶雲五色遙覆馬上久而不散伏望宣付史官以光實録從之又曰吐火羅國有頗梨山南崖穴中有神馬國人每牧牝馬於其側時産名駒皆汗血焉又曰李懷遠雖久居榮位而弘尚簡率其園宅無所改作嘗乘款假馬左僕射豆盧欽望謂曰公榮貴如此何不買駿乘答曰此馬幸免驚蹶無假別求聞者莫不歎美周史曰徐台符仕晉為翰林學士中書舍人契丹之陷中原也台符從虜帳北至於薊門及戎人內潰乃竄身南歸初台符所乘馬好嘶鳴及自虜中回常露宿於草中雖胡騎連群經其左右而台符馬若箝其口然及行至漢地即嘶鳴如故時人以為積善之所感也
