body:
  text: 人事部一百二十一盟誓說文曰誓約束也尚書甘誓曰大戰于甘乃召六卿王曰嗟六事之人豫誓告汝有扈氏威侮五行怠棄三正天用勦絶其命今豫惟龔行天之罰左弗攻于左汝弗龔命左軍左之主射攻治之其職也右弗攻于右汝弗龔命禦非其馬之正汝弗龔命三者有失皆不奉我命也用命賞于祖弗用命戮于社天子親又載社主謂之社土不用命則戮於社也豫則孥戮汝又泰誓王曰王乃徇師而誓曰嗚呼西土有衆咸聽朕言豫有亂臣十人同心同德雖有周親不如仁人周禮司盟曰掌盟載之法載盟辭也凡邦有疑會同則掌其盟約之載及其禮儀北面詔明神既盟則二之二之者寫副當之授六官之也盟萬民之犯命者詛其不信者亦如之左傳曰陳五父如鄭蒞盟歃如忘薛伯曰五父必不免不賴盟矣又曰莊公許孟任以為夫人割臂以盟又曰子犯以壁授公子曰臣負羈紲從君巡於天下臣之罪多矣請由此亡公子曰所不與舅氏同心者有如白水子犯重耳舅氏言與舅氏同心之盟如此白水也投其璧於河又曰王子虎盟諸侯于王庭要言曰皆獎王室無相害也有渝此盟明神殛之俾墜其師無克祚國又曰寧武子與衛人盟於宛濮曰天禍衛國君臣不協以及此憂今天誘其衷使皆降心以相從也不有居者誰守社稷不有行者誰扞牧圉有渝此盟以相及者明神先君是紏是殛國人聞此盟也而後不二又曰楚師將去宋申犀稽首於王之馬前曰無畏知死而不敢廢王命王棄言焉王不能答申叔僕曰築室反耕者宋必命從人宋之懼使華元夜入楚師登子反之床而起之曰寡君使元以病告曰斃邑易子而食折骸以爨雖然城下之盟有以國弊不能從也去我三十里唯命是聽子反懼與之盟而告王退三十里宋及楚平華元為質盟曰我無爾詐爾無我虞楚不詐宋宋不備楚也又曰晉士燮會楚公子罷許偃盟于宋西門之外曰凡晉楚無相加戎好惡同之同恤災危備救凶患交贄往來道路無壅謀其不協而討不庭也又曰秋七月盟于毫范宣子曰不慎必失諸侯乃盟載曰凡我同盟無蘊年蘊積年穀而不分定無壅利無姦保藏罪人也無留慝救災患恤禍亂同好惡獎王室也又曰鄭大夫盟於伯有氏裨諶曰是盟也其與幾何言其不能久也裨諶鄭大夫也詩曰君子屢盟亂是用長又曰小邾射以句繹來奔曰使季路要我吾無盟矣以子路信誠故得與相要誓而不須盟也子路即季路使子路子路辭季康子使冉有謂之曰千乘之國不信其盟而信子之言子何辱焉公羊傳曰莊公會齊侯盟於柯曹子進曰君之意何如莊公曰寡人之生則不若死曹子曰然則君請當其君臣請當其臣莊公曰諾於是會桓公莊公升壇曹子手劍而從之管子進曰君何求曹子曰城壞厭境齊數侵取魯邑以喻侵近君不圖歟願請汶陽之田管仲顧曰君其許諾桓公曰諾已盟曹子摽劍而去之要盟可犯而桓公不欺曹氏可讎而桓公不怨桓公之信著乎天下自柯之盟始也穀梁傳僖公曰葵丘之盟陳牲而不殺牘書加於牲上曰毋榷水毋訖糴訖止毋以妾為妻使婦人與國事又成公曰湨梁之會諸侯失政諸侯會而曰大夫盟政在大夫也諸侯在而不曰諸侯之大夫大夫不臣也三禮圖曰方盟木方四尺設六色東青西白南赤北黑上玄下黃設六玉上圭下璧南方璋西方琥北方璜東方圭方盟者上下四方之神明天之司盟史記曰吳起東出衛郭門與其母別齧指而盟起不為卿相不復入衛也又曰秦之圍邯鄲趙使平原君求救於楚門下有毛遂者前自贊於平原君曰遂願備員而行平原君曰夫賢士之處世也若錐處囊中其末立見今先生處勝之門下三年於此矣左右未有所稱遂曰臣乃今日請處囊中爾使早處囊必頴脫而出非特其末見而已平原君與楚合從言其利害日出而言日中不決遂按劍而前曰從之利害兩言而決耳今日出而言日中不決何也楚王叱曰胡不下遂按劍而前曰今十步之中王不得恃楚國之衆王之命懸於遂今楚地五千里持戟百萬此霸王資白起小豎子耳率數萬之衆一戰而舉鄢郢再戰而燒夷陵三戰而辱王之先人此百世之怨也楚王曰謹奉社稷以從遂奉銅盤北面跪進之定於殿上遂招堂下十九人曰公等碌碌因人成事者也漢書曰王陵為右丞相惠帝崩高后欲立諸呂為王問陵陵曰高皇帝刑白馬而盟曰非劉氏而王者天下共擊之今王諸呂非約也東觀漢記曰隗囂字季孟天水人也以王莽篡逆復漢之祚乃立高祖太宗之廟稱臣執事史奉壁而告祝畢有司穿坎於庭割牲而盟魏志曰臧洪字子原廣陵射陽人也張邈起兵請洪與計事又致之於劉兗州公山孔豫州公緒乃設壇場方共盟誓諸州郡相讓乃共推洪洪乃升壇操盤血而盟晉中興書曰符洪第三子健陰圖關中陽使其徒種麥示無西意有微知其計不肯耕種者健殺之後十餘日師衆西行到孟津作浮橋渡河使弟雄步騎五千人入潼關兄子青軹關入河東誓曰若事不捷汝死河北我死河南為鬼無相見也王羲之為會稽內史慨然稱疾去郡於父母墓前自誓曰維永和十一年二月九日小子羲之敢昭告尊靈義之不天夙遭閔凶不遂過庭之訓母兄鞠育得漸庶幾遂因人之力蒙國寵榮進無忠孝之節退違聖賢量力之義將憂及宗祀豈在微身是用寤寐永嘆若墜淵谷羲之既去官與東士人士盡山水之遊弋釣為娛與道士許玄度共修服食採求藥石不遠千里朝廷以其誓苦亦不徵又曰祖逖說中宗以掃平中原於是以逖為前鋒都督奮威將軍豫州刺史給布三千匹逖乃徑北渡江中流誓曰祖逖不清中原而復濟者如此江蕭子顯齊書曰王敬則為暨陽令縣有一部劫逃柴山中為民患敬則遣人致意劫師悉可出首當先申論治下廟神甚酷烈百姓畏之敬則引神為誓必不相負劫師既出敬則於廟中設酒會於坐收縛之曰吾先啓神若負誓還神十牛今不得違誓即殺十牛併斬諸賊百姓悅之漢書春秋曰梁皇后崩桓帝獨呼小黃門唐衡至北戶如廁問左右梁冀不相得者皆誰衡對曰單起左悺前詣河南尹不疑禮敬小簡不疑收其兄弟送雒陽獄於是帝與入室定謀齧起臂出血以為盟乃誅梁冀高士傳曰胡昭初晉宣帝為布衣時與昭有舊昭同郡周士等謀害帝昭聞而步險邀士於濟澠之間止士士不肯昭泣以示誠士感義乃止昭斫棗樹共士盟而別昭雖有陰德於帝口終不言時人莫知華陽國志曰昭王時有一虎傷害千餘人昭王乃募有能殺虎者賞時巴夷廖仲作白竹之弩乃射殺虎昭王刻石盟要曰秦犯夷輸黃龍一雙夷犯秦輸清酒一鍾夷人安之晏子春秋曰崔杼殺莊公盟於國者戟鉤其頸劍承其心晏子不與盟而出上車其僕將馳晏子撫其手曰鹿生於山命懸於廚命有所懸矣成節而去黃庭經曰黃庭為不死之道受者齊九日或七日或三日然後授之者為師受者奉焉結盟立誓期以勿泄古者盟用玄雲之錦九十尺金簡鳳文之羅四十尺竹林七賢論曰劉伶常病酒渴求酒於其妻妻捐酒毀器泣而諫曰君酒過非攝生之道也必宜斷之伶曰善吾不能自禁唯酒當禮鬼神自誓以斷之耳便可具酒肉妻敬聞命供酒肉於前請伶祝誓伶跪而祝曰天生劉伶以酒為名一飲一斛五斗解酲婦人之言慎不可聽仍引酒御肉隗然而已復醉矣孫卿子曰盟詛不及五帝誓誥不及三王交質不及五伯穀梁二傳交質不及二伯淮南子曰胡人彈骨胡人之盟約置酒人頭骨中飲以相咀也越人契臂中國唼盟所由名異其於信一也質左傳曰鄭武公莊公為平王卿士賈逵曰卿士也有事者六卿也王二于虢鄭伯怨王王曰無之故周鄭交質王子狐為質於鄭鄭公子忽為質於周王子狐周平王之子鄭子忽鄭莊公太子忽也王崩周人將畀虢公政夏鄭祭仲帥師取溫之麥溫周地也蘇氏邑也秋又取成周之禾周鄭交惡君子曰信不由中質無益也又曰楚子圍鄭旬有七日鄭人卜行成不吉卜臨于大宮且巷出車吉賈達曰臨哭也巷出車陳於巷街示雖困不降必欲戰也國人大臨守陴者皆哭俾城堞也楚子退師鄭人修城進復圍之三月克之入自皇門至於達路皇門鄭城門也鄭伯肉袒牽羊以逆曰孤不天不為天所佑也不能事君使君懷怒以及弊邑孤之罪也敢不唯命是聽其俘諸江南以實海濱亦唯命其翦以賜諸侯使臣妾之亦唯命若不泯其社稷使改事君君之惠也孤之願也非所敢望也敢布腹心左右曰不可得國無赦王曰其君能下人必能信用其人矣庸可冀乎退三十里而許之平潘尪入盟子良出質潘尪楚大夫師叔守也子良鄭公子也穀梁曰晉大夫敗齊師於鞍郤克曰與我紀侯之甗甗齊襄滅紀所得邑且以蕭同叔子為質史記曰越王勾踐欲使范蠡治國政對曰兵甲之事種不如蠡鎮撫國家親百姓蠡不如種於是舉政屬種而使蠡與大夫柘稽行成為質於吳也又曰蔡昭侯十年朝楚昭王持善裘二獻其一於昭王而自衣其一楚相子常欲之弗與子常讒蔡侯留之於楚三年蔡侯知之獻其裘子常受之乃言歸蔡侯蔡侯歸而之晉請與晉伐楚夏晉滅沈楚怒攻蔡昭侯使其子為質於吳謀共伐楚後與吳王闔閭遂破楚入郢又曰張儀說楚王曰大王誠能聽臣臣請使秦太子入質於楚秦女為大王箕帚之妾效萬里之都以為湯沐之邑戰國策曰濮陽人呂不韋賈於邯鄲見秦質子異人謂其父曰耕田之利幾倍曰十倍珠玉之贏幾倍曰百倍立主定國之贏幾倍曰無數曰今力田疾作不得暖衣餘食今建國立君澤可以遺後願往事之太子異人質於趙處於聊城故往說之又曰楚相王太子之時為質王崩太子辭歸齊王曰與我東地五百里則子得歸太子入致命曰敬獻地五百里齊王歸楚太子太子歸即位為王齊使車五十乘來取東地於楚王朝群臣曰寡人之得來及主墳墓復群臣歸社稷以東地五百里許齊今求地為之奈何上柱國子良曰王不可不與也王身出玉聲許強萬乘之齊而弗與則不復信不可以約結諸侯又曰楚王死太子在齊質蘇秦謂薛公曰君不如留楚太子以市其下東國薛公曰君不如不我留太子郢中立王蘇秦曰不然郢中立王君因謂其新王曰與我下東國吾為王殺太子不然則吾將與三國共立之然則下東國必可得矣又曰趙太后新用事秦急攻之趙氏求救於齊齊曰必以長安君為質兵乃出太后不肯大臣強諫太后謂左右言有復今長安君為質老婦必唾其面左師觸龍言曰今媼尊長安君之位而封之以膏腴之地與之重器不令有功於國若山陵崩長安君何以自託於趙老臣以媼為長安君計短也太后曰諾於是為長安君約車百乘質於齊齊兵乃出也東觀漢記曰隗囂負隴城之固納王元之說雖遣子春卿入質猶持兩端世祖於是稍黜其禮正君臣之義晉中興書曰諸葛誕叛遣子靚入質於吳吳亡入洛自以父誕為太祖所斬誓不見太祖叔母琅耶武王妃靚之姊也帝後因靚在姊間往就見焉靚逃于廁帝又逼之靚流涕曰臣不能漆身吞炭復覩聖顏燕丹子曰太子丹質於秦秦王遇之無禮不得意欲歸秦王不聽謬言曰令烏白頭馬生角乃可丹仰天而歎烏即白頭馬為生角秦王不得已而造機發之橋欲陷丹丹過之橋為不發也
