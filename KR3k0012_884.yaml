body:
  text: 鬼神鬼部三鬼上易曰鬼神害盈而福謙又曰睽孤見豕負塗載鬼一車見鬼盈車吁可怪也左傳莊公曰齊侯田于貝丘見大豕從者曰公子彭生也公見大豕而從者見彭主皆妖鬼公怒曰彭生敢見射之豕人立而啼公懼墜于車傷足喪屨又僖公曰晉侯改葬共太子秋狐突適下國遇太子太子使登僕而告之曰夷吾無禮余得請於帝矣將以晉畀秦秦將祀余對曰臣聞之神不歆非類民不祀非族君祀無乃殄乎且民何罪失刑乏祀君其圖之君曰諾吾將復請七日新城西偏將有巫者而見我焉許之遂不見及期而往告之曰帝許我罰有罪矣斃於韓又文上曰有事於太廟躋僖公逆祀也於是夏父弗忌為宗伯曰吾見新鬼大故鬼小先大後小順也君子以為失禮又宣公曰楚司馬子良生子越椒子文曰是必滅若敖氏矣及將死泣曰鬼猶求食若敖氏之鬼不其餒而又宣公曰初魏武子有嬖妾無子武子疾命顆曰必嫁是疾病則曰必以為殉及卒顆嫁之及輔氏之役顆見老人結草以亢杜回杜回躓而顛故獲之夜夢之曰余而所嫁婦人之父也爾用先人之治命余是以報又成公曰晉侯夢大厲被髮及地搏膺而踊曰殺余孫不義厲鬼也趙氏之先祖也八年晉侯殺趙同趙括故怒余得請於帝矣壞大門及寢門而入公懼入于室又壞戶公覺召桑田巫巫言如夢巫云鬼怒如公所夢又昭二曰鄭子産聘于晉晉侯有疾韓宣子逆客私焉曰寡君寢疾於今三月矣並走群望有加而無瘳今夢黃熊入於寢門何厲鬼也對曰昔堯殛鯀于羽山其神化為黃熊以入于羽淵實為夏郊三代祀之晉為盟主其或者未之祀也乎宣子祀夏郊晉侯有間又昭二曰鄭人相驚以伯有曰伯有至矣則皆走不知所往鄭人殺伯有言其鬼至鑄刑書之歲二月或夢伯有介而行曰壬子余將殺帶也明年壬寅余又將殺假也及壬子駟帶卒國人益懼齊及燕平之月壬寅公孫假卒國人愈懼其明月子産立公孫泄及良止以撫之乃止子太叔問其故子産曰鬼有所歸乃不為厲吾為之歸也又哀上曰初曹人或夢衆君子立干社宮而謀亡曹曹叔鐸請待公孫疆許之旦而求之曹無之戒其子曰我死爾聞公孫疆為政必去之又哀下曰衛侯夢于北宮見人登昆吾之觀被髮北面而譟曰登此昆吾之虛綿綿生之瓜余為渾良夫叫天無辜大當免三死并數一時之事為盟三罪殺之故自謂無辜也論語曰樊遲問知子曰敬鬼神而遠之可謂知矣敬鬼神而不賣爾雅曰鬼之為言歸也史記始皇本紀曰使者從關東夜過華陰平野道有人持壁遮使者曰為吾遺滈池君因言曰今年祖龍死使者問其故忽不見遂乃置其壁去使者奉璧具以聞始皇默然良久曰山鬼固不過知一歲事也漢書郊祀志曰既滅兩粵人勇之乃言粵人俗鬼言其土俗尚鬼神之事而其祠皆見鬼數有效昔東甌王敬鬼壽百六十歲後世怠慢故衰耗乃命粵巫立粵祠安臺無壇亦祠天神帝百鬼漢書曰田蚡疾一身盡痛若有擊者呼服謝罪上使視鬼者瞻之曰魏其侯與灌夫共守笞欲殺之竟死後漢書曰第五倫為會稽太守俗好淫祀人常以牛祭神百姓財産以之困匱其自食牛肉而不以薦祠者發病且死先為牛鳴倫到官移書屬縣曉告百姓其巫祝有依託鬼神詐怖愚民皆按論之後遂斷絶又曰宋均為辰陽長其俗少學者而信巫鬼均為立學校禁絶淫祀人皆安之又曰劉根有神術太守史祈以為妖乃執而數之曰若有神可願一驗根曰頗能使鬼乃左顧右嘯祈之亡父近親數十皆反縛在祈前向根叩頭曰小兒無狀分當萬死叱祈曰汝子孫不能光榮先祖而辱如此何不叩頭謝之祈哀驚悲泣頓首請罪根默然忽去不知所之王隱晉書曰鎮南劉弘以故刺史王毅子衡陽太守矩為廣州矩至長沙見一人長大著布單衣自持奏左岸上矩省奏云京兆杜靈之仍入船共語稱敘稀闊矩問君京兆人何時發來答曰朝發矩怪問京兆去此數千那得朝發今到杜答曰僕曰天上在京兆去此乃數萬何止數千乎晉書曰鄒湛字潤甫嘗見一人自稱甄仲舒餘無所言如此非一久之乃悟曰宅西有積土敗瓦其中有死人甄仲舒者豫舍西土瓦中人也撿之果然厚加斂葬葬畢遂夢此人來謝又曰蘇韶字孝先安平人也仕至中牟令卒韶伯父第九子節在車上晝日韶自外入乘馬日黑又介幩黃疏單衣白襪絲履憑節車轅節謂兄弟曰中牟在此兄弟皆愕視無所見問韶君何由來韶曰吾欲改葬即求去數日又來兄弟遂與韶坐節曰若必改葬別自勑兒韶曰吾將為書節授筆韶不肯曰死者書與生者異為節作其字像胡書也乃笑喚節為書曰昔魏武侯浮於西河而下中流顧謂吳起曰美哉河山之固此魏國之寶也吾性愛好京洛每往來出入瞻視邙山樂哉萬世之基也北背孟津洋洋之河南望天邑濟濟之盛此志雖未言銘之於心矣不圖奄忽所懷未果前去十月便速改葬買數畝地便足矣節延韶入室設坐祀之不肯坐又無所饗謂韶曰中牟平生好酒可少飲韶手執杯飲盡曰佳酒也節視杯空既去杯酒乃如故前後三十餘來兄弟狎玩節問所疑韶言天上及地下事亦不能悉知也顏淵卜商今見在為修文郎凡有八人鬼之聖者梁成賢者吳季子節問死何如生韶曰無異耳死者虛生者實此其異也節曰死者何不歸尸骸韶曰譬如斷卿一臂以投地就剝削之於卿有患乎死之去尸骸如此也節曰厚葬美墳死者樂乎韶曰無在也節曰若無在何改葬韶曰今我誠無所在但欲述生時意耳韶欲去節留之閉門下鎖鑰韶為之少住韶去節見門故閉韶已去矣韶與節別曰吾今見為修文郎守職不下得來也節執手乃別自是遂絶續晉陽春秋曰襄陽羅友在桓溫府屢以貧乞祿溫以其誕肆許而不用同府人有得郡者溫為坐別友亦被命至尤晚溫問之曰出門於中路遇一鬼大見耶榆曰見汝送人作郡不見人送汝作郡友始怖終慚不覺淹緩溫笑而用之晉書曰周訪宿宮亭湖廟晨起如廁見一老父訪執之化為雄鴨晉陽春秋曰符堅未敗長安市鬼夜哭一月止前趙録曰麟嘉三年螽斯則百堂災自此鬼哭二宮夜夜不絶崔鴻十六國春秋後趙録曰魏豹字叔虎范陽人也遷中山太守所在有治名豹嬖妾先死豹後守于廩丘南妾形見與豹言翌日而卒後魏書曰先是河邊人夢神謂己曰爾朱家欲渡河用爾作灅波津令為之縮水脈月餘夢者死及兆至有行人自言知水淺深以草往往表插而導焉忽失所在兆遂策馬涉渡宋書曰劉伯龍少而貧薄及長歷位尚書左丞武陵太守貧窶尤甚嘗在家慨然召左右將營十一之方忽見一鬼在傍撫掌大笑伯龍歎曰貧窮固有命乃復為鬼所笑也遂止梁書曰范雲嘗與梁武同宿顧皓之舍妻方産鬼在外曰此中有王有相雲起曰王當仰屬相以見歸因是盡心推事老子曰以道蒞天下者其鬼不神鬼不敢見其精神以干犯人非其鬼不神其神不傷人其鬼非無精神也邪不入正不能傷自然莊子曰齊桓公田於澤管仲御見鬼焉公撫管仲之手曰仲父何見對曰臣無所見也公反誒詒為疾數日不出齊士有皇子告敖者曰公則自傷鬼惡能傷公夫忿滀之氣散而不反則為不足上而不下則使人善怒下而不上則使人善忘不上不下者中身當心則為病耳桓公曰然則有鬼乎曰有沉有履竈有髻戶內之煩壤雷霆處之水有岡象丘有莘山有夔野有倣徨澤有委蛇公曰請問委蛇之狀何如曰委蛇其大如轂其長若轅紫衣而朱冠其為物也惡聞雷車之聲則捧首而立見之者其殆乎霸桓公囅然而笑曰寡人之所見者也墨子曰周宣王殺杜伯不以罪後宣王田於圃見杜伯執弓矢射宣王伏弓衣而死呂氏春秋曰梁北有黎丘部有奇鬼焉喜效人之子姪昆弟之扶邑丈人布之市醉而歸者黎丘之鬼效其子之狀扶而道苦之丈人歸酒醒而譙譙責也其子曰吾為汝父也豈為不慈哉我醉汝道苦我何故其子伏而觸地曰孽無此事也其父信之曰嘻是必奇鬼我固聞之明日復於市欲遇而刺殺之則旦之市而醉其真子恐其父之不能返也遂往迎之丈人望見之拔劍而刺之韓詩外傳曰人死曰鬼鬼者歸也精氣歸於天肉歸於土血歸於水脈歸於澤聲歸於雷動作歸於風眼歸於日月骨歸於木筋歸於山齒歸於石膏歸於露髮歸於革呼吸之氣歸復於人淮南子曰蒼頡作書鬼夜哭董仲舒五行逆順曰人君簡宗廟不禱祀則鬼夜哭風俗通曰汝南周翁仲初為太尉椽婦産男及為北海相吏周先能見鬼書署為主簿使還致敬於本郡縣因告之曰事訖臘日可與小男俱侍祠主簿事還翁仲問之對曰但見屠人弊衣蠡髻而踞神座持刀割肉有衣冠青墨綬數人倣徨堂東西不進不知何故翁仲問妻曰何以養此子嫗大怒曰君常言兒體質聲氣喜學似我公欲死為作狂語翁仲具告之祠祭如此不具服子母立截嫗泣涕言昔以年長無男不自安實以女易屠者之男裨錢一萬此子年已十八遣歸其家迎其女女嫁為賣餅者妻後適隴西李文思文思官至南陽太守抱朴子曰按九鼎記及青靈經言人物之死俱有鬼也馬鬼常以晦夜出行狀如炎火玄中記曰姑獲鳥夜飛晝藏蓋鬼神類衣毛為飛鳥脫毛為女人名為帝少女一名夜遊一名鉤星一名隱飛鳥無子喜取人子養為子人養小兒不可露其衣此鳥度即取兒也荊州為多昔豫章男子見田中有六七女人不知是鳥匍匐往先得其毛藏之往就諸鳥諸鳥各走就毛衣衣之飛去一鳥獨不得去男子以為婦生三女其女母後令問父知衣在積稻下得衣飛去後以衣迎三女三女得衣亦飛去神異經曰東北方有鬼星石室三百戶而共一門石榜題曰鬼門晝日不開至暮即有人語有火青色又曰南方有人長三二尺裸形而目在頂上走行如風名曰魃所見之國大旱赤地千里一名旱母一名狢遇者得之投溷中乃死旱災銷也又曰西方深山有人焉長尺餘袒身捕蝦蟹性不畏人止宿喜依其火以炙蝦蟹伺人不在而盜人鹽以食蟹名曰山㺑其音自呌人常以竹著火中焷音朴音卑而山㺑皆驚犯之令人寒熱此雖人亦鬼魅耳所在山中皆有之齊諧記曰廣陵王瓊之為信安令在縣忽有一鬼自稱姓蔡名伯喈或復談議誦詩書知古今靡所不諳問是昔蔡雍不答云非也與之同姓字耳問此伯喈今何在云在天上或下作仙人飛來去受福甚快非復疇昔也論衡曰上古之人有神荼鬱壘者昆弟二人生而執鬼居東海度朔山上亡桃樹下簡閲百鬼鬼道理妄興人禍荼與鬱壘縛以蘆索執以食虎幽明録曰阮瞻常著無鬼論而一鬼通姓名作客詣之寒溫畢聊談名理客甚有才辨與言良久及鬼神事乃作色曰鬼神古今聖賢所共傳君何獨言無即僕便是鬼於是變為異形須臾便滅阮默然大惡之年餘卒又曰王輔嗣注易輒笑鄭玄為儒云老奴無意于時夜分忽聞外閣有著屐聲須臾進白于鄭玄責之曰君年少何以輒穿鑿文句而妄譏詆老子也極有忿色言竟便退輔嗣心生畏惡經少時遇厲病而卒又曰阮德如嘗於廁見一鬼長丈餘色黑而眼大著皂單衣平上幘去之咫尺德如心安定徐笑語之曰人言鬼可憎果然鬼即赧愧而退又曰晉世王彪之年少未官常獨坐齋前有竹忽聞有歎聲彪之惕然怪似其母因往看之見母衣服如昔彪之跪拜歔欷母曰汝方有奇厄自今已去當見一白狗若能東行出千里三年然後可得免災忽不復見彪之悲悵達旦既明獨見一白狗恆隨行止便經營行裝將往會稽及出千里外三年乃歸齋中復聞前聲往見母如先謂曰能用吾言故來慶汝汝自今已後年踰八十位班台司後皆如母言又曰殷仲宗以隆安初入蜀為毛璩參軍至涪陵郡暮宿在亭屋中忽有一鬼體上皆毛於窗櫺中執仲宗臂牽仲宗大呼左右來救之鬼乃去又曰河南楊起字聖卿少時病虐逃於社中得素書一卷譴劾百鬼法所劾輒效為日南太守母至則上見鬼頭長數尺以告聖卿曰此肅霜之神劾之出來變形如奴送書京師朝發暮反作使當千人之力又曰東昌縣山有物形如人長四五尺裸身被髮髮長五六寸常在高山巖石間住喑啞作聲而不成語能嘯相呼常隱於幽昧之間不可恆見有人伐木宿於山中至夜眠後此物抱子從澗中發石取蝦蟹就人火邊燒炙以食兒時人有未眠者密相覺語齊起共突擊便走而遺其子聲如人啼也此物使男女群共引石擊人趣得然後止
