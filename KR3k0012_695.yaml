body:
  text: 服章部十一裘說文曰裘皮衣也禮曰十月之節天子始裘又曰唯君黼裘以誓省大裘非古也君衣狐白裘錦衣以禓之君之右虎裘厥左狼裘士不衣狐白君子狐青裘豹襃玄綃衣以禓之麛裘青豻襃絞衣以裼之豻胡犬也音岸絞蒼黃之色羔裘豹飾緇衣以禓之狐裘黃衣以禓之錦衣狐裘諸侯之飾也犬羊之裘不禓庶人無文飾裘之禓也見美也又曰童子不衣裘裳裘大溫又曰有若曰晏子一狐裘三十年言其太儉偏下又曰良冶之子必學為裘捕器者其金柔乃合有似於裘詩曰羔裘如濡洵直且侯羔裘豹飾孔武有力羔裘晏兮三英粲兮晏鮮盛貌三英三德剛克柔克正直也又曰君子至止錦衣狐裘顏如渥丹其君也哉又曰一之日于貉取彼狐狸為公子裘又曰羔裘逍遙狐裘以朝羔裘翱翔狐裘在堂羔裘如膏日出有曜又曰彼都人士狐裘黃黃又曰狐裘尨茸一國三公吾誰適從又曰齊人以郲寄衛侯右宰穀從而逃歸衛人將殺之辭曰余不悅初矣余狐裘而羔袖乃赦之狐裘羔袖言一身盡蓋唯少有惡喻己雖從出其罪不多又傳曰公賜公衍羔裘使獻龍輔於齊侯龍輔玉名遂入羔裘齊嘉與之陽穀陽穀齊色又傳曰齊侯伐晉夷儀東郭書讓登犂彌從之齊侯賞犂彌辭曰有先登者臣從之晳幘而衣貍製晳白也幘齒上下相值製裘也公使視東郭書曰乃夫子也論語曰緇衣羔裘素衣麑裘黃衣狐裘褻裘長短右袂周禮曰司裘掌為大裘以供王祀天之服仲秋獻良裘季秋獻功裘良善也仲秋鳥獸毛毬因良時而用之功裘人功做麤謂孤青麛裘之屬也大裘廞裘飾皮車廞涇也鄭司農云涇裘陳裘也又曰宮伯掌王宮之士庶子庶子宿衛之言月終則均秩歲終則均敘以時頒其衣裘史記曰秦昭王囚孟嘗君欲殺之孟嘗使人抵昭王幸姬求解姬曰妾願得君狐白裘此時孟嘗君有一狐白裘直千金天下無雙入秦獻之昭王更無他裘孟嘗君患之客最下坐為狗盜者曰臣能得狐白裘乃夜為狗盜以入秦宮藏中取所獻裘奉姬姬為言於王王釋孟嘗君漢書曰賈誼上書諫文帝曰天下咸知陛下之義臥赤子天下之上而安植遺腹朝委裘服虔曰言天下安雖赤子遺腹在位猶不危也孟康曰委裘若容衣太子未坐朝事先帝衣裘也東觀漢記曰東平王蒼來朝章帝以王觸寒涉道賜乘輿貂裘又曰祭彤為遼東太守鮮卑奉馬一疋貂裘二領後漢書曰馬援歎曰殖貨財產貴其能施賑也不則守錢虜耳乃盡散以班昆弟故舊身服羊裘皮袴又曰嚴光世祖時遊學及世祖即位乃變名隱身不見帝思其賢乃令以物色訪之後齊國上言曰有男子披羊裘釣澤中帝令齎玄纁聘之三聘而後至謝承後漢書曰劉虞為幽州剌史常著氈裘魏氏春秋曰高文惠為剌姦令史夙夜匪懈至擁膝抱文書而寤寐太祖嘗夜微出觀察諸吏見而哀之徐解裘覆之而去吳志曰陸遜破曹休上為群僚大會酒與遜對舞解所著𤟤子裘賜遜晉書曰趙王倫字子彝初封琅邪郡王坐使散騎劉緝買工所將盜御裘廷尉杜友正緝棄市倫當與緝同罪有司奏倫爵重屬親可不坐諫議大夫劉毅駮曰王者之法罰不阿貴賤然後可以齊禮制而明典刑也倫知裘非常蔽不語吏與緝同罪又曰桓玄殺羅企生先是玄以羔裘遺企生所生母氏及企生遇害即日焚裘又曰王恭嘗披鶴氅裘涉雪行孟旭曰此神仙中人也王隱晉書曰步熊字叔羆好學兼術數趙王倫辟熊熊言倫死不久不足應有人告倫倫遣圍之熊使諸生著己裘南走圍者皆奔之熊密從北道走得脫又曰王敦參軍摯瞻見敦以故懷裘賜老外部都督曰此裘雖故不如與小吏敦曰何故瞻曰上服賜下貂蟬亦可賜下乎齊書曰文帝製孔雀毛裘又曰文惠太子性奢侈製珍玩之物織孔雀毛為裘光采金翠過於雉頭遠矣北齊書曰唐邕字道和少明敏有治世才斛律金啟太后曰唐邕強幹一人當千顯祖乃解所服青鼠皮裘賜之云意在與卿共弊趙書曰汲桑盛暑重裘重茵使人扇之恚不清涼斬扇者軍中為之語曰仕為將軍何可羞六月重茵披狐裘不識寒暑斷人頭晉咸寧起居注曰大司馬程據上雉頭裘一領詔曰據此裘非常衣服消費功用其於殿前燒之勑內外有造異服詔罪之晉令曰山鹿白豽遊毛狐白貂蟬黃貂班白鼲子渠搜國裘皆禁服也瑞應圖曰王者奉五行教民種植以事則渠搜國來獻裘王者德藏不恥惡衣服則四夷乘白鹿來獻白裘黃帝出軍決曰黃帝伐蚩尤未克夢西王母遣道人披玄狐之裘以符授之管子曰武王為役靡令曰豹䄡豹裘方得入朝故豹皮百金功臣之家糴千鍾未得一豹皮晏子曰景公時雨雪三日公披狐白之裘曰怪哉雨雪三日不寒晏子曰古之賢者君飽而知人飢溫而知人寒今君不知也公乃命出裘以與寒發粟以與飢又曰晏子適晉至中暏弊冠皮裘負芻者晏子曰子何者對曰我越石父也不免凍餓為人僕三年晏子解左驂贖之也又曰景公賜晏子狐白裘其貿千金晏子辭而不受三反曰君服之上而使嬰服之下不可以為教墨子曰江河之水非一源千鎰之裘非一狐又曰晉文公好士之惡衣故文公之臣皆䍧裘列子曰林類年且百歲書傳旡聞蓋古之隱士底春而裘於畦底當也秦青子曰有千金之裘而無千金之布田休子曰渠搜之人服夏禹德獻其珍裘毛出五彩光曜五色又曰少昊氏都於曲阜鞬鞮毛人獻其羽裘韓子曰齊有盜狗子與胡跪子相誇盜狗子曰吾父之裘獨有尾胡跪子曰吾父冬夏獨有一足袴又曰堯之王天下也冬則鹿裘夏則葛絺又曰孫叔敖相楚衣羖羊裘又孔藂子曰田子方遺孔子思狐白裘也符子曰為千金之裘而與狐謀之其皮不可得呂氏春秋曰天下無粹白之狐而有粹白之裘粹純取之於眾白也又曰孔子始用於魯魯人謗之曰麛裘而𩏂投之無戾𩏂而麛裘投之無郵用三年男行乎途左女行乎途右物之遺者民莫之舉淮南子曰夫夏日之不披裘者非愛之也煖有餘於身也裘與蓑孰急見雨則裘不用上堂則蓑不御此代為帝者代更帝王貴也白狐之裘天子之被也而在朝堂然為狐計者不若走於澤披羊裘而賃固其事也狐裘而負籠甚可怪也抱朴子曰狐白不可以當暑說苑曰晉平公使叔嚮聘吳吳人飾舟以逆左右各五百人有繡衣而貂裘者說苑曰林既衣韋衣而朝齊景公曰此君子服耶既作色曰服何足以端士行如君言衣狗裘當犬號羊裘當羊鳴乎今君衣狐意得無變乎又曰千金之裘非一狐之皮也說苑曰晉平出朝有鳥環平公不去平公謂師曠曰吾聞之霸王之主鳳下之今者出朝有鳥環寡人終朝不去是其鳳鳥耶曠對曰東方有鳥名諫珂其為鳥也文身而赤足憎鳥而愛狐今者君必衣狐裘以朝乎平公曰然又曰趙簡子獘車瘦馬衣羖羊之裘其宰曰車新則安馬肥則疾狐裘則溫君宜改之簡子曰君子服善則益恭小人服善則益踞新序曰魏文侯出遊見反裘負芻者問之對曰愛毛者文侯曰爾不知皮盡而已無所附耶明年東陽上計其布十倍大夫賀之文侯曰民不憎而稅倍亦何異反裘負芻者厚取於下則上不安此自危之道也子何用賀乎新論曰振裘時領萬毛皆整潛夫論曰扶夫私計以論公政與狐議裘無時可得也西京雜記曰司馬相如初與卓文君至成都居貧愁懣以所服鷫鶴裘貰酒與文君為歡又曰度安為十五為成帝侍郎善鼓琴趙后悅之白上得出入御內絕見愛幸常著輕絲履招風紫綈裘與后同居又曰成帝好蹙鞠群臣以勞體非尊者所宜帝曰可擇似而不勞者奏之劉向作彈碁以獻帝大悅賜青羔裘紫絲履拾遺錄曰周昭王綴青鳳毛為二裘一名煩質一名暄風可以禦寒也至厲王流于彘人得而奇之以裂此裘遍彘罪人大辟者抽裘一毛以贖死價直萬金也五經要義曰古者著裘於內而以繒衣覆之乃加以朝服會之時祖其朝服見裘裒覆衣謂之禓之言露可見之辭所以示美呈好而為飾加以朝服謂之襲祖謂之禓大裘不覆反本以其質也又曰諸侯黼裘以誓田新羔狐為黼文也白虎通曰裘所以佐女工助溫也古者緇衣羔裘黃衣狐裘禽獸眾多獨以狐羔取其輕暖因狐死首丘明君子不忘本也羔取其跪乳遜順也帝王世紀曰夏禹時渠搜國來獻褐裘也春秋後語曰淳于髡見鄒忌曰狐裘雖獘不可補以黃犬之皮忌曰諾謹受教請擇君子無雜小人其間戰國策曰蘇秦說李兌兌送秦黑貂裘黃衣百鎰又曰蘇秦詣秦王上書十上而說不行黑貂之裘弊黃金百鎰盡形容枯槁及歸妻不為下機嫂不為炊又曰或謂孟嘗君曰太廟之椽非一木之枝也千鎰之裘非一狐之裘也吳越春秋曰延陵季子適齊見路有遺金當夏五月有披裘而薪者季子呼取金薪者曰吾五月披裘而薪資以金者哉外國圖曰毛民國出名裘去朔方七千里十洲記曰漢武帝天漢三年西國獻吉光裘色黃蓋神馬之類入水不沉入火不灼管寧別傳曰寧字幼安至孝每祭祀未嘗不伏地流涕恒著布裳貂裘會稽典略曰魏朗字少英為郡功曹佐正旦掾吏顧龕被裘以加朝服朗以裘非臣服龕不敬勃卒撤去龕恚而不聽朗右手鳴鼓左手撤裘以聞府君喜朗遂退龕以朗代之朗辭病不就語林曰謝萬就安乞裘云畏寒荅曰君妄語正欲以為豪具耳若畏寒無復勝綿者以三十斤綿與謝世說曰謝萬與安共詣簡文萬來無衣幘可前簡文曰俱但前不須衣幘即呼使入萬著白綸布鵠氅裘履板而前共談移日大器重之宋玉風賦曰主人之女被翠雲之裘崔寔四民月令曰囊蟲並興以灰藏氈裘魏武與楊彪書曰今贈足下錦裘二領魏文與孫權書曰今因趙咨致文馬一疋鼲子裘一領王昶家戒曰止寒莫若重裘止謗莫若自脩
