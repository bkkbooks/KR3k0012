body:
  text: 皇王部十二漢高祖皇帝河圖曰帝劉季曰角戴勝斗胸龜背龍眼長七尺八寸明聖而寬仁又曰劉受紀昌光出軫五星聚井龍魚河圖曰高皇攝正揔萬庭四海歸詠治武明文德道治承天精元祚興隆協聖靈尚書帝命驗曰賊起蜚卯生虎賊起蜚始皇立也卯劉字之別也皇立而劉生虎仁男高祖又曰有人雄起戴玉英玉英寶物之名戴之謂骨表祈旦失籥亡其金虎祈讀曰哲白也謂之秦也且失籥戶將開金虎獸之長喻於秦君東南紛注精起紛紛動擾之貌注星之精起謂劉氏也尚書考靈耀曰卯金出軫握命孔符卯金劉字之別軫楚分野之星符圖書劉所握天命孔子制圖書詩含神霧曰含始吞赤珠刻曰玉英生漢皇刻刻鏤也有玉英之文春秋演孔圖曰其人曰角龍顏始卯金刀含仁義春秋耀鉤曰庶人爭權赤帝之精庶人項羽劉季者也爭權並欲起也史記曰高祖沛豐邑中陽里人姓劉氏字季媼嘗息大澤之陂夢與神遇是時雷電晦暝父太公往視則見蛟龍於上已而有娠遂産高祖高祖為人隆準而龍顏美鬚髯左股有七十二黑子仁而愛人意豁如也為泗上亭長廷中吏無不狎侮好酒及色常從王媼武負貰酒時飲醉臥武負王媼見其上常有龍怪之高祖每酤留飲酒讎如淳曰讎音售數陪嘗繇咸陽縱觀始皇帝曰嗟乎丈夫當如此也高祖以亭長為縣送徒驪山到豐西澤中止飲夜皆解縱所送徒徒中壯士願從者十餘人高祖被酒夜經澤中令一人行前還報曰前有大蛇當徑願還高祖醉曰壯士行何畏乃前拔劍斬蛇蛇分為兩道開行數里醉困臥後人來至蛇所有一老嫗夜哭人問何哭嫗曰人殺吾子人曰嫗子何為見殺嫗曰吾子白帝子也化為蛇當道今為赤帝子斬之因忽不見後人至告高祖高祖乃心獨喜秦始皇帝曰東南有天子氣於是東遊以厭當之高祖隱於芒碭山間呂后與人俱來常得之高祖怪問呂后曰季所居上常有雲氣故從往常得季高祖又喜沛中子弟或聞之多欲附者秦二世元年秋陳勝等起沛令欲以沛應勝沛父老皆曰生平所聞劉季奇怪當貴且卜筮之莫如劉季最吉乃立為沛公祠黃帝祭蚩尤於沛庭而釁鼓旗熾皆赤漢元年冬十月五星聚於東井沛公兵先諸侯至霸上秦王子嬰降軹道旁遂西入咸陽召諸縣豪桀曰父老苦秦苛法久矣誹謗者族偶語者棄市吾與諸侯約先入關者王之吾當王關中與父老約法三章耳殺人者死傷人及盜抵罪餘悉除去秦民大喜五年項羽滅諸侯尊漢王為皇帝天下大定高祖都雒陽置酒南宮高祖曰通侯諸將無敢隱朕皆言其情吾所以有天下者何項氏之所以失天下者何高起孟康曰姓高名起也王陵對曰陛下慢而侮人攻城略地降下者因以豫之與天下同利也項羽妬賢嫉能有功者害之賢者疑之戰勝而不與人功得地而不與人利此所以失天下者也高祖曰公知其一未知其二運籌策於帷帳之中決勝於千里之外吾不如子房鎮國家撫百姓給餉饋不絶糧道吾不如蕭何連百萬之衆戰必勝攻必取吾不如韓信此三人者皆人傑也吾能用之此所以取天下也戍卒婁敬説高祖曰都雒陽不便不如入關據秦之國上以問張良因勸上即日車駕西都長安九年高祖大朝諸侯群臣置酒未央前殿上奉玉巵起為太上皇壽曰始大人嘗以臣無賴不能治産業不如仲力今某之業所就與仲力孰多群臣皆稱萬歲大為笑樂高祖回歸過沛留置酒沛宮悉召故人父老子弟佐酒發沛中兒得百二十人教之歌酒酣高祖擊築自為歌詩曰大風起兮雲飛揚威加海內兮歸故鄉安得猛士兮守四方令兒皆和習之高祖乃起舞慷慨傷懷泣數行下謂沛父兄曰遊子悲故鄉吾雖都關中萬歲後吾魂魄猶樂思沛且朕自沛公以誅暴逆遂有天下其以沛為朕湯沐邑後其民世世無有所與沛父兄諸母故人曰樂飲極歡道舊故為笑樂十餘日高祖欲去沛父兄固請留高祖曰吾人衆多父兄不能給乃去沛中空縣皆之邑西獻獻牛酒高祖復留止張飲三日張宴曰張張惟高祖擊黥布時為流矢所中行道病甚呂后迎良醫醫入見高祖問醫醫曰病可治於是高祖嫚罵之曰吾以布衣提三尺劍取天下此非天命乎命乃在天雖扁鵲亦何益遂不使治病四月甲辰崩于長樂宮時年六十二在位十二年葬長陵群臣上尊號為高皇帝令郡國諸侯各立高祖廟以歲時祠及孝惠五年思高祖之悲樂沛以沛宮為高祖原廟也初高祖不修文學而性明達好謀能聽自監門戍卒見之如舊初從民心作三章之約天下既定命蕭何治律令韓信申軍法張蒼定章程如淳曰章歷數之章術也程者權衡丈尺斛斗之平叔孫通制禮儀陸賈造新語又與功臣剖符作誓丹書鐵契金匱石室藏之宗廟雖日不暇給規摹弘遠矣又曰范增説項羽曰沛公居山東貪於財貨好美姬今入關財物無所取婦女無所幸此其志不在小漢書贊曰漢承堯運德祚已盛斷蛇著符旗幟尚赤協于火德自然之應得天統矣荀悅漢紀曰項羽自立為楚王王梁楚地九郡都彭城立沛公為漢王王巴蜀漢中四十一縣都南鄭諸侯皆就國漢王欲攻楚丞相蕭何諫曰雖王漢之惡不猶愈於死乎且語曰天漢其稱甚美夫能屈於一人之下則伸於萬人之上湯武是也願大王王漢撫其民以致賢人收用巴蜀還定三秦天下可圖乃就國又曰高祖開建大業統辟元功度量規矩不可尚矣是時天下初定而庶事草創故韶夏之音未有聞焉楚漢春秋曰項王在鴻門而亞父諫曰吾使人望沛公其氣衝天五彩相糾或似雲或似龍或似人此非人臣之氣也不若殺之帝王世紀曰豐公家于沛之豐沛邑之陽里其妻夢赤馬若龍戲已而生執嘉是為太公即太上皇也太上皇之妃曰媼是為昭靈后名含始遊於洛池有玉雞銜赤珠出刻曰玉英吞此者王含始吞之生邦字季又曰玄晏先王曰禮稱至道以王義道以霸觀漢祖之取天下也遭秦世暴亂不偕尺土之資不權將相之柄發迹泗亭奮其智謀羈勒英雄鞭驅天下或以威服或以德致或以義成或以權斷逆順不常霸王之道雜焉是以聖君帝王之位而無一定之制三代之美固難及矣後漢班叔皮王命論曰在昔帝堯之禪曰咨爾舜天之曆數在爾躬舜亦命禹暨于稷契咸佐唐堯光濟四海奕世載德至于湯武而有天下雖其遭遇異時禪代不同至于應天順民其揆一也是故劉氏承堯之祚氏族之世著于春秋唐據火德而漢紹之始起沛澤則神母夜號以彰赤帝之符由是言之帝王之作必有明聖顯懿之德豐功厚利積纍之業然後精誠通于神明流澤加於生人故能為鬼神所福饗天下所歸往未見運世無本功德不能紀而得堀然在此位者世俗見高祖興於布衣不達其故以為適遭暴亂得奮其劍遊説之士至比天下於逐鹿幸捷而得之不知神器有命不可智力求悲夫此世之所以多亂臣賊子者項籍河圖曰怪目勇敢重瞳大力楚之邦尚書中候曰自號之王霸姓有工項羽為西楚霸王工項字之側史記曰項籍者下相人也地里志云臨淮浪有下相縣字羽初起時年二十四季父項梁梁父即楚將項燕為秦將王剪所戮項氏世世為楚將封於項故姓項氏籍少時學書不成去學劍又不成項梁怒之籍曰書足以記名姓而已劍一人敵不足學學萬人敵於是項梁乃教籍兵法籍大喜梁殺人與籍避仇於吳秦始皇帝遊會稽渡浙江梁與籍俱觀籍曰彼可取而代也梁掩其口曰無妄言族矣梁以此奇之籍身長八尺餘力能扛鼎韋昭曰扛舉也才氣過人秦二世元年九月會稽守徐廣曰爾時未云太守也通謂梁曰楚漢春秋曰會稽假守適通也吾欲發兵使公及桓楚為將是時桓楚亡在澤中梁曰桓楚亡人莫知其處獨籍知召籍使授命召桓楚守曰諾梁召籍入須臾梁眴籍曰可行矣於是籍遂拔劍斬守頭遂舉吳中兵使人收下縣得精兵八千人項梁乃渡江而西凡六七萬人軍下邳此時沛公亦起沛往焉乃求楚懷王孫立以為楚懷王王召宋義以為上將軍項羽為魯公次將范增為末將諸別將皆屬宋義號為卿子冠軍項羽晨朝上將軍宋義即其帳中斬宋義頭出令軍中曰宋義與齊謀反楚楚王陰令羽誅之當是時諸將皆懾服莫敢枝梧如淳曰梧當枝猶枝桿也臣瓚曰小杜為枝邪柱為梧今屋梧邪柱是也皆曰首立楚者將軍家也今將軍誅亂乃相與共立羽為假上將軍懷王因使羽為上將軍乃悉引兵渡河皆沉船破釜甑燒廬舍持三日糧以示士必死無一還心於是至則圍王離與秦軍遇九戰絶其甬道大破之虜王離諸將皆從壁觀楚戰士無不一當十呼聲動天地項羽召見諸侯諸侯入轅門張晏注曰軍行以車為陳轅相倚為門曰轅門無不膝行而前莫敢仰視項羽引兵西屠咸陽殺秦降王子嬰燒秦宮室火三月不滅收其寶貨婦女而東人或説項王曰關中阻山河四塞地肥饒可都以霸項王見秦宮室皆以燒殘破又心懷思欲東歸曰富貴不歸故鄉如衣繡夜行誰知之者説者曰人言楚人沐猴而冠耳果然張晏曰沐猴獮猴也項王自立為西楚霸王王九部都彭城漢之二年漢王伐楚皆已入彭城收其寶貨項王乃從蕭晨擊漢軍而東至彭城大破漢軍漢軍皆走相隨入穀泗水二水皆在沛郡彭城殺漢卒十餘萬人漢卒皆南走山楚又追擊之靈壁東徐廣曰在彭城睢水上徐廣曰睢水彭城西水入泗水漢軍卻為楚所擠擠排也多殺漢卒十餘萬皆入睢水睢水為之不流圍漢王三匝於是大風從西北起折木發屋揚沙石窈冥晝晦逢迎楚軍楚軍大亂壞散而漢王乃得與數十騎遁去漢之四年項王西與漢俱臨廣武而軍孟康注曰築兩城相對在廣武敖倉西三皇山山上相守數月當此時彭越數反梁也絶楚糧道項王患之楚漢久相持未決丁壯苦軍旅老弱罷轉漕項王謂漢王曰天下胸胸數歲者徒以吾兩人耳願與漢王挑戰李奇曰桃身獨戰不須衆也挑音茶了反瓚曰挑戰擲趟撓敵求戰古謂之致師決雌雄無徒苦天下之民父子為也漢王笑謝曰吾寧鬥智不能鬥力項王命壯士出挑戰漢王有善騎射者樓煩應劭曰樓煩今樓煩縣楚挑戰三合樓煩輒射殺之項王大怒乃自被甲持戟挑戰樓煩欲射之項王瞋目叱之樓煩目不敢視手不敢發遂走還入壁不敢復出漢王使人間問之乃項王也漢王大驚於是項王乃即漢王相與臨廣武間而語漢王數之項王怒甚欲一戰漢王不聽項王伏弩射中漢王漢王傷走入成皋項王乃與約中分天下割鴻溝以西者為漢文頴曰於滎陽下引河東為鴻溝以通宋鄭陳蔡曹衛兵濟汝淮泗會於楚即今官渡水也鴻溝而東者為楚項王已約乃引兵解而東歸漢欲西歸張良陳平説曰楚兵疲食盡此天亡楚之時也漢王乃追項王至垓下項王軍壁垓下兵少食盡漢軍及諸侯兵圍之數重夜聞漢軍四面皆楚歌應劭曰楚歌者雞鳴歌也漢已略得其地楚歌者多也項王乃大驚曰漢皆已得楚乎是何楚人之多也項王乃夜起飲於帳中有美人名虞徐廣曰云虞氏常幸從駿馬名騅常騎之於是項王乃悲歌慷慨自為詩曰力拔山兮氣蓋世時不利兮騅不逝騅不逝兮可奈何虞兮虞兮奈若何歌數闋美人和之項王泣下數行左右皆泣莫能仰視於是項王乃上馬騎麾下壯士騎從者八百餘人直夜潰圍南出馳走平明漢軍乃覺之令騎將灌嬰以五千騎追之項王渡淮騎能屬者百餘人耳項王至陰陵徐廣曰在淮南迷失道問一田父田父紿曰左文頴曰紿欺也欺令左也左乃陷大澤中以故漢追及之項王乃復引兵而東至東城漢書音義曰縣名屬臨淮乃有二十八騎漢騎追者數千人項王自度不得脫謂其騎曰吾起兵至今八歲矣身七十餘戰所當者破所擊者服未嘗敗北遂霸有天下然今卒困於此天之亡我非戰之罪也項王乃欲東渡烏江瓚曰在牛渚也烏江亭長艤船待孟康曰艤音蟻附著岸也如淳曰南方人謂整船向岸曰艤謂項王曰江東雖小地方千里衆數十萬人亦足王也願大王急渡今獨臣有船漢軍至無以渡項王笑曰天之亡我我何渡為且籍與江東子弟八千人渡江而西今無一人還還江東父兄憐而王我我何面目見之縱彼不言籍獨不愧於心乎乃謂亭長曰吾知公長者吾騎此馬五歲所當無敵嘗一日千里吾不忍殺之以賜公乃令騎皆下馬步行持短兵接戰獨籍所殺漢軍數百人項王身亦被十餘創顧見漢騎呂馬童曰若非吾故人乎馬童面之張晏曰以故人難親斫聽之故皆面之也如淳曰面不視正也指王翳曰如淳曰指示王翳也此項王也項王乃曰吾聞漢購我頭千金邑萬戶吾為汝得徐廣曰亦可取是功德之德也乃自刎而死漢以魯公禮葬項王於穀城太史公曰吾聞之周生周時賢也曰舜重瞳子又聞項羽亦重瞳子豈其苗裔乎何其興之暴也夫秦失其政陳涉首難豪傑蜂起相與並爭不可勝數然羽非有尺寸乘勢起隴畝之中三年遂將五諸侯滅秦此時山東六國而齊趙韓魏燕五國並伐秦故云五諸侯也分裂天下而封王侯政由羽出號為霸王位雖不終近古以來未嘗有也周生烈子曰桀紂是湯武之梯秦項是大漢之階也四逆不興則三順不勝也蔣子萬機論曰項羽若聽范增之策則平步取天下也譙周法訓曰劉項方爭父戰於前子鬥於後孝惠皇帝史記曰孝惠為人仁弱高祖以為不類我也常欲廢太子而立戚姬子如意類我戚姬得幸常從上之關東日夜啼泣欲立其子代太子呂后年長常留守希見上益疏高祖崩太子襲號為惠皇帝呂后最怨戚夫人及其子趙王惠帝慈仁知太后怒自挾與趙王起居飲食太后欲殺之不得間孝惠元年十二月帝晨出射雉趙王少不能早起太后聞其獨居使人特鴆而飲之犂明孝惠還趙王已死徐廣曰犂猶比太后遂斷戚夫人手足去眼燻耳使居廁中命曰人彘居數日乃召孝惠帝來觀人彘孝惠見問乃知是戚夫人也乃哭因歲餘不能起使人請太后曰此非人之所為臣太后子終不能治天下孝惠以此日飲為淫樂不聽政故有疾又曰太史公曰孝惠皇帝高后之時黎民得離戰國之苦君臣俱欲休息乎無為故惠帝垂拱高后女主稱制政不出閨房天下晏然刑罰罕用罪人是希民務稼穡衣食滋殖矣漢書曰孝惠諱盈之字曰蒲應劭曰禮諡法柔質慈民曰惠矣七年帝崩于未央宮案帝年十七即位在位七年矣葬安陵漢書贊曰孝惠內修親親外禮宰相可謂寬仁之主遭呂太后虧損至德悲夫荀悅漢紀曰立皇后張氏帝姊魯元公主之女也太后欲以重親故以配於帝也論曰夫婦之際人道大倫姊子而為后昏於禮而瀆於人情非所以示天下作民則也群臣莫諫過也班固漢書述曰孝惠短世高后稱制罔顧天顯呂宗以敗前少帝史記曰惠帝崩太子即位為帝號令一出太后太后稱制宣平侯女為孝惠皇后時無子佯有娠取美人子名之殺其母死非真皇后之子乃出言曰后安能殺吾母而名我太后聞而患之恐其後為亂於是乃幽之於永巷中群臣奉旨廢帝後少帝史記曰后元年立孝惠後宮子弘為襄成侯二年以為常山王更名義四年廢少帝立常王義為帝更名私不稱元年者以太后制天下事也八年太后崩大臣誅諸呂相與陰謀曰少帝及梁淮陽常山王皆非真孝惠子乃相與陰使人召代王至長安共尊立為天子東平侯興居曰誅呂氏吾無功請得除宮乃與太僕汝陰侯滕公入宮前謂少帝曰足下非劉氏不當立乃召乘輿載少帝出少帝曰欲將我安之乎代王遂入而聽政夜有司分部誅滅梁淮陽常山王及少帝於帝邸
