body:
  text: 職官部二十五侍御史六典曰侍御史掌糾舉百寮推鞫訟凡有別付者則按其實狀以奏若尋常之獄推訖斷于大理凡事非大夫中丞所劾而合彈奏者則具其事為狀大夫中丞押大事則豸冠朱衣纁裳白紗中單以彈之小事常服而巳續漢書百官志曰侍御史員五人秩六百石以公府掾屬高第補之或牧守議郎郎中為之掌察非法受公卿群吏奏事有違失者舉劾之凡郊廟及大拜則一人監威儀有違失則劾奏漢官儀侍臣下曰御史秦官也案問有御史掌邦國都鄙及萬民之治今以贊冢宰應劭漢官儀曰侍御史周官也為柱下史冠一名曰柱後以鐵為之言其審固不撓也或説古有獬豸獸主觸邪佞故執憲者以其角形為冠耳余覽秦事云始皇滅楚以其君冠賜御史漢興襲秦因而不改漢書儀曰御史員四十五人皆是六百石其十五人衣綘給事殿中為御史宿盧在石渠門外二人尚璽四人持書給事二人持前中丞一人領餘三十人留寺理百官事也史記曰趙禹者郿人武帝即位禹以刀筆吏積勞遷為侍御史與張湯論定律令又曰下杜人程懇為御史得罪始皇幽繫雲陽十年從獄中作大篆少者增益多者損減方者使員員者使方奏之始皇善之出為御史又曰張蒼好舊曆秦時為御史主柱下方書漢書曰江充拜直指繡衣使督三輔盜賊禁察踰侈時近臣多奢僣充皆舉劾請沒入車馬令身從北軍擊胸奴奏聞貴戚惶恐又曰王駕字翁孺武帝時為繡衣御史逐捕群盜皆縱而不誅又曰嚴延年遷御史劾霍光專廢立東觀漢記曰陳寵曾祖父咸哀平間以明律為侍御史王莽篡位父子相將歸鄉里閉門不出乃收家中律令文書壁藏之以俟聖主咸常戒子孫為人議法當依輕雖有百金之利無與人重後漢書曰桓典為侍御史執政無所避常乘驄馬京師畏之語曰行行且止避驄馬御史又曰杜詩為御史安集洛陽時將軍蕭廣放縱兵士暴橫民間百姓惶擾詩勑曉不改遂格殺廣還以狀聞世祖召見賜以棨戟焉又曰李恂拜侍御史持節使幽州宣布恩澤慰撫北狄所過皆圖寫山川屯田聚落百餘卷悉封奏上肅宗嘉之又曰光武聞杜林還三輔乃徵拜侍御史引見問以經書故舊及西州事甚悅之賜以車馬衣被又曰陳翔字子麟拜侍御史元日朝賀大將軍梁冀威儀不整翔奏請收冀理罪時人奇之又曰楊秉字叔節拜侍御史京畿咸稱其宰相之才又曰譙玄為繡衣使者持節分行天下觀覽風俗所至專行誅賞續後漢書曰种音中皓字景伯順帝時為侍御史監護太子承光宮中常侍高梵受勑迎太子不齎詔書以衣車載太子欲出太子太傅高褒不知所以力不能止開門臨去皓至橫劍當車曰御史受詔監護太子太子國之儲副人命所繫常侍來無一尺詔書安知非挾姦耶今日之事有死而巳梵不敢爭又曰張綱字文紀遷侍御史漢初遣八使巡行風俗八使同日拜謂之八彥皆宿儒要位唯綱年少官微受命各之所部而綱獨埋車輪於洛陽都亭曰豺狼當路安問狐狸遂奏大將軍梁冀兄弟罪惡京師震悚魏志曰袁紹字本初有姿貌威容能折節下士士多附之太祖少與交以大將軍掾為侍御史又曰帝嘗大會殿中御史簪白筆側階而坐上問左右此為何官何主左右不對辛毗曰謂御史舊時簪筆以奏不法今者直備官但珥耳吳志曰呂岱親近吳都徐原慷愾有才志岱知其可成賜巾褠古切衣侯丹與共言論後遂薦拔官至侍御史原性忠壯好直言岱時有得失原輒諫爭又公論之人或以告岱岱笑是我所以貴德淵德淵岱字者也及原死岱哭之甚哀曰德淵呂岱之益友今不幸岱復於何聞過談者美之又曰張紘字子綱廣陵人也孫策遣紘奏章至許宮留為侍御史少府孔融等皆與親善又曰朱據字子範吳郡人也補侍御史是時選曹尚書暨艷疾貪污在位欲沙汰之據以為天下未定宜以功覆過棄瑕取用舉清勵濁足以沮勸若一時貶黜懼有後咎艷不聽卒敗晉書曰庾峻字山甫長安大獄久不決轉峻御史往斷朝野稱當又曰劉毅子它昆切正直有父風為御史庫失火尚書郭彰率百人自衛而不救火正色詰之彰怒曰我能截卿角也勃然謂彰曰君何時敢恃寵作威作福天子法冠而欲截角呼命紙筆奏之彰伏不敢言衆人皆釋乃止隋書曰柳調轉侍御史左僕射楊素嘗於朝堂見調因獨言曰柳調通體弱獨搖不須風調斂板正色曰調信無取者公不當以為侍御史調信有可取不應發此言公當具瞻之秋樞機何可輕發素甚奇之又曰遊元為侍御史奉使於黎陽督運會楊玄感作逆乃謂元曰獨夫肆虐天下士大夫肝腦塗地以陷身絶域之所軍糧斷絶此亦天亡之時我今親率義兵誅無道卿意如何元正色答曰尊公荷國寵靈功參佐命高官重祿近古莫儔公之兄弟青紫交映當謂竭誠盡節上答鴻恩豈意墳土未乾親圖反噬深為明公不取願思禍福之端僕有死而巳不敢聞命玄感怒而囚之屢脅以兵竟不屈節於是害之又曰陳孝意大業初為魯郡司法書佐郡內號為廉平太守蘇威嘗欲殺一囚孝意固諫至於再三威不許孝意因解衣請先受死良久威意乃解謝遣之漸加禮敬及威為納言奏孝意侍御史又曰獬豸冠案禮圖曰法冠也一曰柱後惠文如淳注漢官云惠蟬也細如蟬翼今御史服之禮圖也又曰獬豸冠高五寸秦制也法官服之案董巴志云獬豸神羊也蔡雍云如麟一角應劭曰古有此獸主觸不直故執憲者為冠以象之秦滅楚以其冠賜御史唐書李素立丁憂高祖令所司奪情授七品清要官所司權擬雍州刺史録參軍高祖曰此官要而不清又擬祕書郎高祖曰此官清而不要遂擢授侍御史又曰柳範為侍御史時吳王恪好畋獵損居人範奏憚之太宗因謂侍臣曰權萬紀事我兒不能匡正其罪合死範進曰房玄齡事陛下猶不能諫止畋獵豈可獨罪萬紀太宗大怒拂衣而去久之獨引範曰何得逆折我範曰臣聞主聖臣直陛下仁明臣敢不盡愚直太宗意乃解又曰高宗嘗問群臣求可為御史者僉舉萬年尉楊子失其名居數月復問之群臣又舉焉上曰吾聞斯人常褻服居公堂視事其可為準繩司乎由是百司群僚必表而視事又曰乾封中韋仁約除侍御史與公卿相見未嘗行拜禮或勉之仁約曰雕鶚鷹鸇豈衆禽之偶奈何設拜以狎之且耳目之官故當特立乃曰御史銜命出使不能動搖山嶽震懾州縣誠曠職耳又曰賈言忠河南洛陽人也乾封中為侍御史時朝廷有事遼東言忠奉使往支軍糧及還高宗問以軍事言忠畫其山川地勢具陳遼東可平之狀高宗悅又問諸將優劣言忠曰李績先朝舊臣聖鑒所悉龐同善雖非鬥將而持軍嚴整薛仁貴勇冠三軍名可振敵高侃儉素自處忠果有謀契苾何力沉毅持重有統御之才然頗有忌前之癖諸將夙夜小心忘身憂國莫逮於李績者高宗深然之又曰劉思立宋州寧陵人也高宗時為侍御史屬河南河北旱儉遣御史中丞崔謐等分道存問賑給思立上疏諫曰今麥序方秋蠶功未畢三時之務萬姓所先勑使撫巡人皆竦抃忘其家業冀此天恩踊躍參迎必難抑止集聚既廣妨廢亦多加以途程往還兼之晨夕停滯既緣賑給須立簿書本欲安存卻成煩擾又無驛之處騎馬稍難簡擇公私須臾追集雨後農務特切常情暫廢須臾即虧歲計每為一馬遂勞數家從此相乘恐更滋甚望且委州縣賑給待秋後間時出使褒貶疏奏謐等遂不行又曰李義府恃寵用事婦人淳于氏有美色坐事繫大理乃諷丞畢正義枉法出之將納為妾會有密言其狀者上令給事中劉仲軌鞠之義府恐泄其謀逼正義自縊於獄中上知而特原義府之罪侍御史王義方奏義府擅殺寺丞陛下雖巳釋放然天子置三公九卿二十七大夫八十一元士本欲水火相濟鹽梅相成然後庶績咸熙風雨交泰則知人主不得獨是非昔唐堯至聖失之於四凶漢祖深仁失之於陳狶光武聰明寬恕失之於逢萌魏武勇略英雄失之於張邈此英傑之主莫不失之於前得之於後陛下繼聖撫有萬邦蠻陬夷落猶懼刑綱况輦轂咫尺姦臣肆虐殺一六品寺丞足使忠臣抗憤縱令正義自縊此事彌不可容便是畏義府之權勢能殺身以滅口此則生殺之威巳非主出賞罰之柄下移姦佞請乞重勘當正義死之由雪冤氣於幽泉誅姦臣於白日對仗叱義府令下義府視不退義方三叱上既無言義府趍出又曰王志愔博州聊城人也少以進士擢第神龍年纍除左臺御史執法剛正百寮畏憚時人呼皂雕言其顧瞻人吏如雕鶚之視燕雀也又曰蘇瓌案問鄭普思其妻有寵於韋庶人特勑令對御辨折上屢抑瓌而伸普思侍御史范獻忠歷階而前曰臣請先罪蘇瓌上問其故獻忠曰蘇瓌國之大夫荷榮貴久矣不斬逆賊而後聞奏今使眩惑天聰搖動刑柄而普思反狀昭露陛下曲為申理此則王者不死今聖躬萬福豈有兩天子耶臣請先死終不能事普思上意乃解獄遂定又曰御史遭長官於途皆免帽降乘長官戢轡辭而上馬乾封中王本立為御史意氣頗高途逢長官端揖而巳自是諸人或降而立或足至地或側鞭弛𩍐輕重無恆開元以來但舉鞭聳揖而巳也又曰劉藏器為侍御史時衛卿尉遲寶琳抑人為妾藏器奏請還其父母上既可其奏寶琳私奏乞之上又從之藏器復執奏上又可之寶琳又請如是三藏器進言曰法者海內之懸衡上下之所共若刑罰不中則人無所措手足陛下若用捨恣情愛憎由巳則國之刑憲何所施陳今寶琳請陛下從之臣執奏陛下亦從之今日從之明日又改之欲令下人何以遵奉夫人無信不立匹夫匹婦尚不可失信況為天子安可戲言今陛下二三其言處分不定臣恐四海之內無所適從上竟從藏器所奏又曰王播為侍御史貞元末華臣李實為京兆尹恃恩頗橫嘗遇播於途不避故事尹避臺官播移文詆之又曰溫造拜侍御史請復置彈事朱衣豸冠於外廊大臣阻而不行李祐自真州入拜金吾違制進馬一百五十匹造正衙彈奏祐服戰汗流祐私謂人曰吾踰蔡州城擒吳元濟未嘗心動今日膽落于溫御史吁可畏哉英雄記曰袁紹辟大將軍府不得巳起從命舉高第遷侍御史弟術為尚書紹不欲為臺下告疾求退三輔決録曰韋約字季明司徒劉愷甚敬重之謂曰君以輕去就故大位不躋今歲垂盡選御史實欲煩君約曰犬馬齒盡既無膂力又無考課所以躊躇戀慕者以明公禮遇隆崇未能自割因稱素有風疾眩冒不堪久侍遂徒跣趍出公追不及陳留耆舊傳曰楊仁字文義明帝引見問當代政治之事仁對上大奇之拜侍御史明帝崩是時諸馬貴賤各爭入宮仁被甲持戟遮勑宮門不得令入章帝既立諸馬貴更讚仁刻峻於是上善之通典曰侍御史之職四謂推推有掌推鞠彈掌彈舉公廨知公廨事雜事臺中事悉揔之定殿中監察以下職事及進名改轉臺內之事悉主之號為臺端它人稱之曰端公其知雜事者謂之雜端最為雄極食座之南設橫榻謂之南床殿中監察不得座亦謂之癡床言處其上者皆矯傲自得使人如癡故謂之癡床也凡侍御史之例不出纍月則遷登南省故號為南床百日客其行止出入揖讓去就殿中巳下皆稟而隨之先後虧失者有罰又曰二漢侍御史所掌凡有五曹一曰令曹掌律令二曰印曹掌劾曰三曰供曹掌齊祀四曰尉馬曹掌廄馬五曰乘曹掌獲駕豹尾之內便為禁省又曰舊例御史臺不受訴訟有通辭狀者即於臺門候御史競往門外收採知可彈者略其姓名皆云風聞訪知永徽中崔義玄為大夫始定受事御史一日劾狀題告人姓名黃石公陰謀祕法曰熒惑火之精御史之象主禁令刑罰收捕糾正殿中侍御史六典曰殿中侍御史掌殿庭供奉之儀式凡冬至元正大朝會則具服升殿若郊祀巡省則其服從於旌門撿察視其文物之有虧闕則糾之凡兩京城內則分知左右巡各察其所巡之內有不法之事三國典略曰齊宋世良字元友魏孝莊時為殿中侍御史詣河北括戶大獲遊惰至汲郡帝見有骸骨移書瘞之其夜有雨滂沱孝莊勞之曰卿所括得丁倍於本帳若官人皆如此便是更生出一天下也唐書官品志曰殿中侍御史四人掌殿中禁衛內事又曰張行成為殿中侍御史糾劾不避權戚太宗以為能房玄齡曰觀古今用人必因媒介若行成者朕自舉之無先容也又曰王無競自監察御史轉殿中侍御史舊例每日更直於殿前正班宰相宗楚客楊再思嘗離班偶語無競前曰朝禮至敬公等大臣不宜輕易以慢恆典楚客等大怒轉無競為太子舍人又曰殿中侍御史郭震劾刑部尚書趙彥照太子賓客韋嗣立青州刺史韋安石曰彥照以女巫趙五娘左道亂常託為諸姑潛相影援既因提挈遂踐台階或驅車造門施婦人之服或攜妻就謁申猶子之情同惡相濟一至於此又張易之兄弟勢傾朝野嗣立此際結為舅甥神龍之初巳合誅死天網踈漏腰領誤全與安石託附阿韋編諸屬籍中宗晏駕削太皇輔正之制定阿韋臨朝之策此時朝野危懼人神怨憤臣忝司清憲敢不糾彈彥照等並請準法處分於是並貶官山公啓事曰中書屬通事令史孫琳限滿久習內事才宜殿中侍御史須空補之不審可否詔曰可曹氏傳曰左擁起於碎吏武帝以為能擢為殿中侍御史監察御史六典曰監察御史掌分察百寮巡按郡縣糾視刑獄肅整朝廷有不肅敬及鬥失者則糾而劾之唐書曰李素立武德初為監察御史時有犯法不至死者高祖將令殺之素立諫曰三尺之法與天下共之法一動搖則人無所措手足陛下甫創鴻業遐荒尚阻奈何輦轂之下便棄刑書臣忝法司不敢奉旨高祖從之又曰張嘉貞蒲州猗氏人也坐事免歸鄉里居長安侍御史張循憲為河東採訪使薦嘉貞材堪憲官請以巳之官秩授之則天召見垂簾與之言嘉貞奏曰臣以草萊而得謁九重是千載一遇也咫尺之間如隔雲霧竟不覩日月恐君臣之道有所未盡則天遽令卷簾與語大悅擢拜監察御史又曰紀履忠為監察御史劾奏御史中丞來俊臣犯狀有五一專擅國權二謀害忠善三贓賄貪濁四失義勃禮五淫昏很戾論茲五罪合至萬誅請下獄理罪又曰蕭至忠為監察御史彈鳳閣侍郎同鳳閣鸞臺三品蘇味道贓污貶官御史大夫李承嘉嘗召諸御史責之曰近日彈事不咨大夫禮乎衆不敢對至忠進曰故事臺中無長官御史人君耳目比肩事主得各自彈事不相關或先白大夫而許彈事如彈大夫不知白誰也承嘉默然而憚其剛正又曰崔琬為監察御史彈奏宰相宗楚客紀處納等驕恣跋扈請收劾之舊制大臣有被御史彈者皆俯僂趍出待罪朝省楚客瞋目作色稱以忠鯁被誣中宗令琬與楚客約為兄弟人竊歎焉又曰齊浣定州義豐人少以詞學稱弱冠制科登第景雲二年中書令姚崇用為監察御史彈劾違犯先於風教當時以為稱職又曰開元五年監察御史杜暹往磧西覆屯會郭處瓘與史獻等不叶更相執奏詔暹案其事實史獻以金遺暹固辭左右曰公遠使絶域不可失蕃人情暹不得巳受之埋於幕下既去出境乃移牒令收取之又曰李勉拜監察御史屬朝廷右武勳臣恃寵多不知禮大將榮崇嗣於行在朝堂背闕而坐言笑自若勉劾之拘於省司肅宗特原之歎曰吾有李勉始知朝廷尊矣又曰御史臺奏準舊例監察御史從下六人各察尚書省一司又準興元元年十月勑令監察從上第一人察吏部禮部第二人察兵部工部第三人察戶部刑部第四人者伏以監察第一第二人巳充監察及館驛等使新人除出使外並無以觀其能否今請守舊制新人分察從之又曰元稹拜監察御史奉使東蜀劾奏東川節度使嚴礪違制禮擅賦入籍沒塗山甫等吏民八十八戶田宅奴婢時礪巳死七州刺史皆責罰稹雖舉職而執政有與礪厚者惡之又曰楊收兄假自浙西觀察判官入為監察御史兄弟並居憲府特為新例又曰李憕音澄太原人也宇文融為御史括田戶奏知名之士崔希逸咸廙業宇文順于孺卿李宙及憕為判官攝監察御史分路檢察以課並遷監察御史又曰柳渾拜監察御史臺中執法之地動限儀矩渾性放曠不甚檢束察長拘局忿其踈縱渾不樂乞外任執政惜其才奏為左補闕
