body:
  text: 南楚諸山靜山江夏圖經曰靜山在縣東南一百一十里其山回聳無連接曲澗清流茂林高峻可以息諸仁智遷遊羽客故名靜山驚磯山江夏圖經曰在縣東九十里其山無連接西南俯臨大江下有石磯波濤迅急啇旅驚駭故以為名黃鶴山江夏圖經曰在縣東九里其山斷絶無連接舊傳云昔有仙人控黃鶴於山因以為名故梁湘東王晉安寺碑云黃鶴從天之夜響是烽火山江夏圖經曰烽火山在縣東北四十里梁典云梁武征齊頓軍於此舉烽火相應故名烽火山雞翅山江夏圖經曰雞翅山在縣南八十里昔有金雞飛集此故名雞翅山舊記云金水有金雞從雞翅山向南飛産金於此水故名金水闔閭山武昌記曰昔闔閭與伍子胥屯衆於此山為城故曰闔閭山史記曰闔閭九年子胥伐楚又春秋云子胥將兵破楚掘平王之墓皆屯軍於此山印山武昌記曰奉新縣有渚石臨水高三十丈上有書字髣佛似印故曰印山輿地志云縣西有石臨水高三十丈有書字為印山此即是也朔山武昌記曰朔山有竹長一十餘丈圍數尺常有聲天將雨此竹鳴焉今無此竹望夫山輿地記曰望夫山上有望夫石石上曾生蕪菁遂以名山上有石高三丈形如女人謂之望夫石又記曰武昌郡奉新縣北山上有望夫石狀若人立者今古傳云昔有貞婦其夫從役遠赴國難攜弱子餞送於此山既而立望其夫乃化為石因以為名焉翠屏山輿地志曰江水入富池一百八十里得奉新上流三百里有城山三面壁立一面峻極水是奉新大源本名石城山天寶五載改為翠屏山九宮山武昌記曰九宮山西北陸路去州五百八十里其山晉安王兄弟九人造九宮殿於此山遂以為名角山武昌記曰天欲雨其山有聲如吹角以此為名鍾臺山武昌記曰鍾臺山在縣東南一百里上有桃花洞洞側有李雍讀書之所荒基遺址石室花木猶在上有一石室臺上有一鍾或時鳴響遠近皆聞故名鍾臺山武昌山續搜神記曰晉武世宣城人秦精常入武昌山採茗遇一毛人長丈餘引精至山曲示以藂茗而後去俄而復還乃探懷中橘遺精怖負茗而歸樊山江夏圖經曰樊山西陸路去州一百七十三里出紫石英山東數十步有岡岡上甚平敞青松緑竹常自蔚然其下有溪凜凜然常有寒氣故謂之寒溪有磻龍石謝玄暉詩云樊山開廣宴是也又干寶搜神記云樊山若天旱以火燒山即致大雨今往往有驗武昌記曰樊山孫權常獵於下見一姥問獵得何物答曰只獵得一豹曰何不堅其尾言訖忽然不見權於後立廟祀之西塞山江夏風俗記曰西塞山高一百六十丈周回三十七里峻崿橫江危峰斷岸長波所以東注高浪為之西翻袁宏東征賦云沿西塞之峻崿是也又江表傳云劉勳敗於彭澤走之入楚江聞晥已沒遂投西塞白雉山江夏圖經曰白雉山其山上有芙蓉峰前有師子嶺後有金雞石西金南出銅鉚自晉宋梁陳以來常置立爐治烹煉鳳栖山江夏圖經曰鳳栖山西北陸路去州二百二十五里吳建興年中鳳皇降此山因以為名山有石鼓鼓鳴則雨降神人山曆帝記曰神人山吳建衡二年有神人乘白鹿從此山出因名神人山南昌山豫章圖經曰南昌山者昔吳王濞鑄錢之山時有夜光遙望如火以為銅之精光梁氏十道志云以豫章有銅山山中有洪井飛流懸注其深無底是也山有洪崖先生鍊藥之井亦號洪崖山有石臼存焉松門山豫章圖經曰松門山者以其山多松遂以為名北臨大江及彭蠡湖山上有石境光明照人謝靈運入彭蠡湖口詩云攀崖照石境牽葉入松門是也馬當山九江記曰馬當山高八十丈周回四里在古彭澤縣北一百二十里其山橫枕大江山象馬形回風急擊波浪涌沸舟船上下多懷憂恐山際立馬當山廟以祠之釣磯山異苑曰釣磯山者陶侃嘗釣於此山下水中得織梭一枚還掛壁上後化成赤龍從室而去其山石上猶有侃跡存焉雞籠山郡國志曰江州雞籠山山上有石雞冠距如生有道士李鎮住此山下常賞玩之雞一旦自毀鎮曰雞既如此吾其終乎果卒五女山郡國志曰江州五女山始皇死五女葬此山天昏每聞箏笛之聲射的山郡國志曰射的山者古老相傳云上有玉在石壁內南面遙望似有白處曾有胡人來取上山後遇風雨不果得今遠望頗似射侯故名射的焉石印山吳志曰天璽元年鄱陽郡言歷陵山石有文理成字巫言石印神有三郎皓遣使以大牢祭并印綬拜三郎為王又按江氏記云歷陵有石印山臨水高百丈有七穿駢羅穿中色黃赤相續因謂之石印山龍虎山信州圖經曰龍虎山在貴溪縣二山相對溪流其間乃張天師得道之山羊山宋永初山川記曰啇安縣西有羊山山有燃石黃白而理粗以水灌之便熱若石炭以鼎置之烹煮可熟羅霄山王孚安成記曰萍鄉羅霄山澤水所出水傍出石乳天旱吏人禱之因以大木長三四丈投井中即雨水懸湊井溢輒令木涌出而雨止蓋潛龍之穴也以陽居陰神精上通故扣之而必有玄感則蜀都賦云應鳴鼓而興雨者也鍾山裴子野宋略曰永嘉元年鍾山因洪水有鍾從山流出時人得之送上驗銘云是秦時樂器因以為名又按成記云鍾山臨水阻峽春夏則湍洑涌沸濆上白沙如米兩岸石上各九十餘里以之候歲若一岸偏饒則其方豐穰民以為準望鳳山宜春圖經曰望鳳山在州西北七十里上有一峰遠觀似鳳以此為名昌山宜春圖經曰昌山在州東六十里舊名傷山周回連延一十八里袁江流於其間巨石枕崎潺激舟人上下多傾覆故名傷山顧野王輿地記云時人以傷為非善徵乃改為昌山石室山宜春記曰郡有石室山山有數石室相連高十餘丈皆相似素壁若雪萬像森羅於其所因以為名黃唐山輿地志曰贛縣黃唐山有石室如數千間屋上通天窗下有方榻者二石人巾櫛而坐傍有小石室七所相通悉有石人室前時有車馬跡春夏草不生無諸毒蟲林木繁茂水石幽絶蓋靈仙窟宅也山下居每丙日輒聞山室有茄鼓簫樂之音鄧德明記云有石子如彈丸聚在山角至丙日不復見他日復有其山獨立高一千三百丈相傳以石室呼為黃唐廟因以名焉儲潭山南康記曰儲潭山俯臨清潭有儲君廟因以名焉輿地志云咸和二年刺史朱偉所立常有漁者釣於此潭得金鎖縈引舟中向數百丈忽一物隨瑣而來其形如水牛眼赤角白及見人驚駭拽走而漁者以刀斷得數尺不知其所由然也赤石山南康記曰赤石山大石連聳粲若舒霞山角多赤石有玉房瓊室耆舊相傳云宋元嘉年中有人自稱安道士者不知何許人披服巾褐棲於此山中數十年忽失所在其後有人時復見者天寶六年勑改為玉房山螺亭石山南康記曰螺亭山有大石臨水號曰螺亭云昔有貧女暮宿於亭採螺忽夜中見衆螺張口亂噉其肉貧女乃死其伴因殞水傍其冢化為巨石螺殼無數號曰螺亭石山上洛山輿地志曰虔州上洛山多木客乃鬼類也形似人語亦如人遙見分明近則藏隱能斫杉枋聚於高峻之上與人交市以木易人刀斧交關者前置物枋下卻走避之木客尋來取物下枋與人隨物多少甚信直而不欺有死者亦哭泣殯葬嘗有山行人遇其葬日出酒食以設人山中有石墨可書空山南康圖經云空山晉咸康五年太守庾恪於山西麓中建立神廟歷代祈雨最有靈應按郡國志云空山在郡南山多林木果實食物一郡皆資此山雖名空山其出物百倍於他山金雞山南康記曰金雞山臨貢水石色如霞其傍有穴廣四尺一石正當穴口如彈丸嘗有金雞出入此穴晉義熙中再三出見有人挾彈放丸於穴口化為石其雞至今不見因號曰金雞穴宋永初中又見棲翔於此峽山南康記曰峽山上時有夜光飛熖遙見若火照燎于原從峽泝流數十里有石臨水名曰蛟窟天寶六載勑改名夜光山梓潭山南康記曰梓潭山有大梓樹吳王令都尉蕭武伐為龍舟槽斫成而牽引不動占云須童男女數十人為歌樂乃當得遂依其言以童男女牽拽糟沒于潭中男女皆溺其後天晴朗淨髣佛若見人船焉夜宿潭邊或聞歌唱之聲因號梓潭焉柴侯峽南康記曰柴侯峽山漢靈帝時有劉叔喬避地於茲死葬村側自云柴侯墓晉末喪亂有發其冢者忽有大風雨棺及松柏悉飛渡水移上此峰其棺乃化為石因是而名之官山南康記曰官山者天寶六年改名珠玉山其山高峻有善鳥香草嘗有人於此山見大珠玉相傳謂之官山君山南康記曰君山翠麗鮮明遙若臺榭名曰媧宮亦曰女姥石山去盤固山五十里上有玉臺方廣數十丈上有自然石室形風雨之後景氣明靜頗聞山有鼓吹之聲盤固山南康記曰盤固山有石井井側有大銅人常守之按此石井五百年水一湧起高數丈銅人以手掩之其水即止其山盤紆峻嶒因號為盤固山焉歸美山南康記曰歸美山高數百丈遠望嵯峨靈闕騰空故老謂之神闕其山有水出焉西面嶮峻自然有石城高數十丈周回三百步又有石峽左右高五六十丈勢若雙闕其狀入雲復有古石室色如黃金號為金室有鸀鳥形色鮮潔自愛毛羽其隻者或鑒水向影悲鳴自絶方知孤鸞對鏡為不虛矣山頂有杉枋數百片高危懸絶非人力所及焉莫巨山荀伯子臨川記曰巖內有石人坐盤石上體有塵穢則興風雨洗訖晴日遍體潔朗如玉瑩淨民以為準焉五章山荀伯子臨川記曰五章山絶巖嶮峭有密蜂依之為房其形如笠採者皆懸磴數十丈然後獲之麻山荀伯子臨川記曰麻山或有登之者望廬嶽彭蠡皆在其下有黃連厚朴恆生焉又有楓樹及數千年者如人形眼鼻口全而無臂腳入山往往見之或斫之者皆出血人以籃冠其頭明日看輒失籃俗名楓子鬼其山竹木稠密如麻因名麻山天寶六年職方奏改名豐材山焉鄧公山信州圖經曰鄧公山在縣北本名銀山因鄧遠為鄧公場儀鳳二年祭山山頽陷焉按開山記云揔章二年邑人鄧遠經刺史豆廬公陳開山之便尋為山隱後人立鄧公廟焉明府山信州圖經曰明府山在縣東其山久晴不雨山或自鳴必有大雨久雨不晴欲晴自有煙霧蓋其頭古老相傳祈請有驗鶴嶺山信州圖經曰鶴嶺山自貴溪縣界岡阜鱗次北入縣境嶺上多松樹有鶴窠因得名為鶴嶺山石虹山鄱陽記曰虹山有石室中有石砥平如床可容置數百人旁列石鄣如屏風篆書為八十三字有橫石跨水而渡文彩青赤若虹霓因名為石虹山洪崖山豫章記曰按舊經云古老相傳昔有洪崖先生者居此山上故以為名又列仙傳云洪崖山者山之陽有洪唐寺山中有洪崖壇每亢旱禱於此
