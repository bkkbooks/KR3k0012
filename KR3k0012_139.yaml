body:
  text: 皇親部四魏武宣卞皇后魏志曰武宣卞皇后琅邪人文帝母也本倡家年二十太祖於譙納后為妾後隨太祖至洛及董卓為亂太祖微服東出避難袁術傳太祖凶問時太祖左右在洛者皆歸后止之曰曹君吉凶未定未可知今日還家明日若在何面目復相見也正使禍至共死何苦遂從后言太祖聞而善之建安初丁夫人廢遂以后為繼室諸子無母者太祖皆命后養之文帝為太子左右長御賀后曰將軍拜太子天下莫不欣喜后當傾府藏賞賜后曰王自以丕年大故用為嗣我但當以免無教導之過為幸甚耳亦何當賜遺乎長御還見以語太祖太祖悅曰怒不變容喜不改節是最為難二十四年拜為王皇后文帝踐祚尊后曰太后稱永壽宮魏書曰后以漢延熹三年生齊郡白亭有黃氣滿室移日父敬侯怪之以問卜者王旦旦曰此吉祥也為太后見外親不假以顏色常言居處當務節儉不當妄賞賜念自勉也帝為太后弟秉起第及成太后幸弟請諸家外親設下廚無異膳太后左右菜食粟飯無魚肉其儉如此文甄皇后魏志曰文昭甄皇后中山無極人明帝母父逸上蔡令后三歲失父後天下兵亂加以飢饉百姓皆賣金銀珠玉寶物時后家大有儲穀頗以買之后年十餘歲白母曰世今亂多買寶物匹夫無罪懷璧為罪又左右皆飢乏不如以穀賑給親族鄰里廣為恩惠也舉家稱善即從后言建安中袁紹為中子熙納后冀州平文帝納后於鄴有寵生明帝郭后李陰貴人並愛幸后愈失意有怨言帝大怒遣使賜死葬干鄴明帝即位有司奏請追諡又別立寢廟太和元年追封諡曰敬侯適孫像襲爵初營宗廟掘地得玉璽方一寸九分其文曰天子羡思慈親明帝為之改容以太牢告廟又嘗夢見后於是舅氏親踈高下敘用各有差賞賜纍巨萬魏書曰甄后每寢寐家中髣佛見人持玉衣覆其上者常共怪之相工劉良相后曰此女貴乃不可言后自少至長不好戲弄年八歲外有立騎戲馬者家人諸姊皆上閣觀之后獨不行年九歲喜書視字輒識數用諸兄筆硯兄謂后言汝當作女博士耶后答言聞古者賢女未有不覽前世成敗以為己誡不知書何由見之及為皇后寵愈隆而彌挹損每因間宴常言昔黃帝子孫蕃育蓋由妾媵衆多獲斯可願廣求淑媛以豐繼嗣帝心喜焉文郭皇后魏志曰文德郭皇后安平廣宗人也祖世長吏后少而父永奇之曰此乃吾女中王也遂以女王為字早失二親喪亂流離沒在銅鞮侯家太祖為魏公時得入東宮后有智數時有所獻納文帝定為嗣后有謀焉太子即王位后為夫人及踐祚為貴嬪甄后之死由后之寵也遂立為后黃初五年帝東征后留許昌永始臺時霖雨百餘日城樓多壞有司奏請移止后曰昔楚昭王出遊貞薑留漸臺江水至使者迎而無符不去卒沒今帝在遠吾幸未有是患而便移止奈何明帝即位尊后為皇太后稱永安宮明帝毛皇后魏志曰明帝悼毛皇后河內人以選入東宮明帝時為平原王進御有寵出入與同輦及即位立為皇后初明帝為王始納河內虞氏為妃帝即位虞氏不得立卞太后慰勉焉虞氏曰曹氏好立賤未有能以義舉者也嘉本典車工卒暴富貴舉動甚𧈪駭侯楷切語輒自稱侯身人以為笑帝之幸郭皇后也后愛寵日衰景初元年帝遊後園召才人以上宴樂左右宜延皇后帝不許乃禁左右使不得宣后知之明日帝見后后曰昨日遊宴北園樂乎帝以左右泄之所殺十餘人賜后死然猶加諡葬愍陵明帝郭皇后魏志曰明帝郭皇后西平人也世河右大族黃初中本部反叛遂沒入宮明帝即位甚見愛幸拜為夫人帝疾因遂立為皇后齊王即位尊后曰皇太后稱永寧宮值三主幼弱宰輔親政與奪大事皆先啓太后然後施行母丘儉鍾會等假其命以為亂焉景元四年崩晉宣穆張皇后晉書曰宣穆皇后張氏諱春華高祖同郡人也母河內山氏司徒濤之從祖姑也后少有德行智識初高祖辭仕以風痺不能起居曝書遇雨高起收書家唯一婢見之后懼言語泄漏乃手殺之而自執焉帝由是重之其後柏夫人有寵后罕得進見帝嘗臥疾后往省病帝曰老物可憎何煩出也后慚恚不食將自殺諸子亦不食帝驚而致謝后乃止退而謂人曰老物不足惜慮困我好兒耳魏正始八年崩武帝受禪追尊為太后景懷夏侯皇后晉書曰景懷夏侯皇后沛國譙人也父尚魏征南大將軍母曹氏魏德陽鄉主后雅有識度帝每有所為必預籌畫魏世宣帝居上將之重諸子並有雄才大略后知帝非魏之純臣而后既魏氏之甥帝深忌之青龍三年以鴆崩武帝登祚始加號諡文明王皇后王隱晉書曰文明皇后王肅女秉德清貞體行純和八歲誦詩論特精喪服茍有文義過目則識祖司徒朗異之曰興吾家者必此女矣惜不為男每居大喪常身不勝衣及鍾會見任言於文帝曰會好為事端寵過必斃太始元年尊曰皇后宮曰崇禮自即尊位眷戀素業忽棄華麗四年薨晉書曰后諱元姬年十二祖朗薨后哀戚哭泣發於自然其父益加敬異既笄歸于文帝生武帝武元楊皇后晉書曰楊元后父炳言后相貴故文帝為武帝娶之生惠帝武帝疑惠帝不堪奉大統密以語后后曰立嫡以長不以賢豈可動乎帝採諸葛沖等五十人入殿呈露面常衣令后選取后不取端正唯取長白時卞藩女有美色帝舉扇鄣面語后曰藩女可后曰藩三世皇后不宜枉以卑位其中者以絳紗繫臂遂取胡芳芳啼哭左右曰陛下聞聲芳曰死且不畏何畏陛下帝壯其言父奪聞女中亦哭曰老奴不死唯有二兒男在九地之下女在九天之上帝拜芳為貴嬪元后疾甚見上素敬胡夫人恐立之又慮太子不安臨終枕帝膝曰從妹男涓有德色不足復娶異姓帝許之崩于光明殿武悼楊皇后晉氏后妃列傳曰后諱芷字季蘭小字男涓武帝繼室也太傅楊駿女咸寧二年即后位婉嫕音翳才色映椒房寵禮尤隆后無子賈庶人為太子妃時數以肆情忌嫉失帝意帝慮始終之事欲廢焉后為妃陳請曰賈公有勳於王府猶將數世宥之況賈妃親則其子夫妬忌亦婦人之常事不足以一眚而忘大德帝納焉晏駕尊曰皇太后賈庶人五日一朝后既喪所天常有戚容庶人謂不悅在己愈自嫌及星辰有變占於母家不利殿中典兵中郎孟觀等遂進勸庶人有先唱者有福後發者受禍庶人遂陷誅后父駿三族及內外新屬遷后於永寧宮賈庶人尋諷百僚奏太后廢為庶人母龐付廷尉行刑詔初欲宥之卒不可事奏太后截髮稽顙稱以請母於賈庶人而龐遂見刑后不勝憂哀崩於幽宮春秋三十有四諡曰武悼皇后晉後略曰賈后既殺楊庶人於金墉城又信妖巫謂人既死必訴怨於先帝乃覆而殯之施諸厭劾符書藥物以合瘞之惠帝賈皇后王隱晉書曰后諱南風武帝謀太子婚久不決上欲娶衛瓘女元后欲娶賈充女上曰衛女有五可賈女有五不可衛家種賢而多子端正長白賈女種妬少子丑而短黑郭槐多輸寶物於后遂娶南風八年將納妃帝知太子不慧故試之盡召東宮官屬作飲食而密封詔使太子決停信待之賈妃大懼召人答詔草給使張泓曰太子不學而答詔引義必責草主更益譴負不如直以意答妃大喜語泓便為我好答得富貴與汝共之泓素有小才具草令太子自寫武帝大喜賈妃酷妬手擊數人或以刀戟擲孕妾子乃墮地上大怒治金墉城將殺之趙粲荀勗深救之故得不廢洛陽尉部小吏忽有好物尉疑為盜召詰之賈后踈親欲求盜物往聽對辭云先行逢一老嫗説家有疾師卜當得城南年少厭塞暫相煩尋重報小吏從之上車下帷內著簾箱中行十餘里過六七門限開簾忽見樓閣好屋問此何處云天上即以香湯見浴好衣美食將入見一婦人年三十五六短小青黑色眉後有疵見留數日共宿得此衆物賈氏親踈聞其形狀如是賈后慚而去尉亦解意云時他人多殺之不出唯此小吏以愛得出賈后詐有身內藁物為産遂取妹夫韓壽兒託之諒暗所生故弗顯賈庶人臨廢遙喚帝曰陛下有婦使人廢之亦當自廢詔賜死沈約宋書曰齊王入廢后后驚曰卿何為來曰有詔收后后曰詔當從我出何詔也又問曰誰起事曰梁趙后歎曰繫狗當繫其頸今反繫其尾何得不然晉後略曰載賈后以廉車出承明東掖東門詣金墉城食金屑而死惠羊皇后臧氏晉書曰惠羊皇后諱獻容太山南城人也父玄之字弘猷永康元年立為皇后將入宮衣中有火永興元年河間王顒使將張方廢后於金墉城七月陳旿等唱伐成都王復后位八月張方又廢后十一月張方逼遷大駕幸長安留臺復后位永興二年張方又廢后河間王顒矯詔賜后死劉暾他昆切等上表后得免帝還洛迎復后位後洛陽令何喬又廢后懷帝即位尊后為惠皇后居弘訓宮洛陽敗沒于劉曜曜僣位以為皇后因問曰朕何如司馬家兒后曰胡可並焉陛下開基之聖主彼亡國之暗夫有一婦一子及身三耳不能庇之貴為帝王而妻子辱於凡庶之手妾爾時實不思生何圖復有今日妾生於高門嘗謂世間男子皆然自奉巾櫛已來始知天下有丈夫耳曜甚愛寵之生二子而死偽諡獻文皇后謝夫人附晉書曰謝夫人名玖本貧賤父以屠羊為業玖清惠貞正而有淑姿選入後庭為才人惠帝在東宮將納妃武帝慮太子未知帷房之事乃遣玖往東宮侍寢由是得幸有身賈后忌之求還西宮遂生愍懷乃立為大子拜玖為淑媛及愍懷遇鴆玖亦被害焉永康初詔改葬太子因贈玖夫人印綬葬顯平陵懷王太后臧氏晉書曰懷王皇太后諱姬初入武帝宮拜中才人早崩懷帝即位追尊曰皇太后梁皇后臧氏晉書曰梁皇后諱蘭壁安定人也祖鴻季儀同三司父芬司徒后初為豫章王妃懷帝即位為皇后永嘉中沒胡賊元帝夏侯太妃晉書曰夏侯太妃名光姬沛國譙人也父莊淮南太守妃生自華宗幼而明慧琅耶武王為世子覲納焉生元帝元帝立稱王妃永嘉元年薨于江左葬琅耶國初有讖云銅馬入海建業期太妃小字銅環而元帝中興於江左矣元敬虞皇后晉書元敬虞皇后諱孟母濟陽外黃人父豫元帝為琅耶王納后為妃無子永嘉六年薨太興三年册贈皇后璽綬柎于太廟晉書曰豫章君荀氏元帝宮人也初有寵生明帝及琅邪王胄音宙由是虞后所忌漸見踈薄明帝即位封建安君別立第宅太寧元年帝迎還臺內供奉隆厚及成帝立尊同於太后咸康元年薨詔曰朕少遭憫凶慈訓無稟撫育之勤建安君之仁也一旦薨殂實思報復永懷平昔感痛哀摧其贈豫章郡君別立廟于京都明帝庾皇后晉中興書曰明穆皇后庾氏諱文君左將軍琛第三女也后少以圭璋特異令儀淑美故中宗為肅祖納焉初為世子妃仁和有禮深見敬重后生顯宗成皇帝顯宗即位尊后曰皇太后群臣奏天子幼沖宜依漢和熹皇后故事后辭讓數四不得已遂臨朝攝萬機蘇峻作逆王師敗績后以憂逼崩時年三十三成恭杜皇后晉書曰成恭杜皇后諱陵陽鎮南將軍預之曾孫也成帝以后奕世名德咸康二年備禮拜為后后少有姿色然長猶無齒有來求昏者輒中止及納采之日一夜齒盡生七年三月后崩年二十一后在位六年無子先是三吳女子相與簪白花望之如素奈傳言天公織女死為之著服至是而后崩康帝褚皇后晉中興書曰康獻皇后褚氏字蘇子太傅褒之女也后聰明有器識以名家女入為琅邪王妃生孝宗穆皇帝孝宗即位尊后曰皇太后泰元元年太后詔曰皇帝婚冠禮備遐邇宅心宜當陽親覽緝熙惟始今歸政事率由舊典於是復稱崇德太后九年崩于顯陽殿簡文鄭皇后晉中興書曰簡文宣太后鄭氏諱阿春滎陽人先適田氏生一男夫又亡后依於舅吳氏中宗為丞相敬后先崩將納吳氏女為夫人后及吳氏女並遊後園有見之者言於中宗曰鄭氏女雖嫠居賢於吳氏遠矣遂以德色納為夫人甚有寵后雖貴幸而恆有憂色中宗問其故對曰妾有妹中者適長沙王褒餘二妹未出恐姊既為人妾無復求者中宗從容謂劉隗曰鄭氏有二妹卿可求佳對使不失舊隗舉其從子傭娶第三者以小者適漢中李氏皆得舊門帝稱尊號后雖為夫人詔太子及東海武陵王皆母事之帝崩后稱建平園夫人咸和元年薨孝武李太后晉書曰孝武李太后諱陵容本出微賤始簡文帝為會稽王有三子廢黜早夭其後諸姬絶孕將十年帝令卜者扈謙筮之曰後房中有一女當育二貴男其一終盛晉室乃令善相者召諸愛妾而示之皆云非其人又悉以諸婢媵示焉時后為宮人在織坊中形長而色黑宮人皆謂之崑崙既至相者驚云此其人也帝以大計召之侍寢后數夢兩龍枕膝日月入懷帝聞異焉遂生孝武帝王皇后晉中興書曰孝武定皇后王氏字法惠寧康三年中軍將軍柏沖侍中臣康奏晉陵太守王蘊女天性柔順惠心塞淵儀度既同四業允備且盛德之兆美善先積參議可以配德乾元恭承宗廟貞進六宮母儀天下故烈宗納焉后性嗜酒驕妬帝深患之乃召蘊於東堂具説后過狀令加訓誡蘊免冠謝焉后於是少自改飾太元五年崩安帝陳太后晉中興書曰安德太后陳氏松滋人也諱歸女父廣以倡進仕至平昌太守后以美色能歌彈入宮初為淑媛生安恭二帝太元十五年薨贈夫人追崇曰皇太后恭帝褚皇后晉書曰恭思褚皇后諱靈媛河南陽翟人義興太守爽之女也后初為琅邪王妃元熙元年立為皇后生海鹽富陽公主及帝禪位于宋降為零陵王妃宋元嘉十三年崩祔葬沖平陵
