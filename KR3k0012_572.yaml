body:
  text: 樂部九歌二家語曰孔子厄於匡謂子路曰汝歌子和汝子路彈劍孔子和之曲終匡人解甲又曰孔子相魯齊人患其將霸欲敗其政乃選好女子八十人衣以文錦而舞容璣及文馬四十季桓子受女樂君臣淫荒三日不聽國政郊至又不致膰祭肉名也俎於大夫孔子遂行作歌曰彼婦人之口可以出走彼婦之請可以死敗優哉遊哉聊以卒歲呂氏春秋曰管子得於魯魯束縛而檻之使役人載而送之齊皆謳歌而引管子恐魯之止而殺己也欲速至齊因謂役人曰我為汝歌汝為我和其和適宜走役人不倦而取道甚遠管子可謂能因矣役人得其所欲己亦得其所欲以此術也是用萬乘之國其霸猶少又曰周申喜亡其母聞乞人歌於門下而悲之動於顏色自見而問焉何故而乞與之語乃是其母也故父母之於子也子之於父母也一體而分得同血氣與而異息若莽草之華實樹木之有根心離處而通憂思相感也又曰禹年三十未娶有行塗山恐時日暮吾娶必有應也乃有白狐九尾而造禹禹曰白者吾服也九尾其證也塗山人歌曰綏綏白狐九尾龐龐成家成室我都彼昌禹因娶塗山女吳越春秋曰採葛越之婦人傷越王用心乃作若何之歌辭曰嘗膽不苦味若飴今我採葛以作絲又曰越王入吳與諸大夫別於浙江遂登船徑去終不反顧越王夫人乃授船而哭復見啄江涯之暇飛去復來哭訖即承之以歌其辭曰兩飛烏兮鳶作載何居食兮江湖去復反兮嗚呼始事君兮去家終我命兮君都中年過兮何辜離我國兮入吳妻為婢兮夫為奴歲昭昭兮難極冤痛悲兮心惻嗚呼哀兮不食越絶書曰伍子胥走至吳江上見漁者曰來渡我漁者知其非恆人也欲往渡之恐衆人知之即歌而往過之曰照照侵已施於子期甫蘆之子胥從復歌曰心中悲曰已施子可渡河不出為船到即載入船而伏戰國策曰齊人馮暖屬孟嘗君願寄食門下孟嘗君笑而受之有頃倚柱彈其劍鋏歌曰長鋏歸來兮食無魚左右以告孟嘗君曰食之比門下之客復彈其劍鋏歌曰長鋏歸來兮出無車又彈其劍鋏歌曰長鋏歸來兮無以為家魏氏春秋曰阮籍少時遊蘇門山有隱者藉對之長嘯蘇門生莞爾而笑藉既降蘇門生亦嘯若鸞鳳之音藉乃假蘇門生之論以寄所懷歌曰日沒不周西月出丹淵中陽精蔽不見陰光代為雄富貴俯仰間貧賤何必終又曰歌天地解兮六合開星辰霣兮日月頽我騰而上將何懷帝王世記曰舜恭己無為歌南風之詩詩曰南風之時兮可以阜吾人之財兮南風之薰兮可以解吾人之慍兮尚書大傳曰維五紀奏鍾石論人聲始欲改堯樂及乃鳥獸咸變於前百獸率舜之屬秋養耆老而春食孤子乃浡然招樂興於大麓之野報事還歸二年𧭓然乃作大唐之歌𧭓猶灼也大唐之歌美堯之禪也歌者三年昭然乃知乎王世明有不世之義招為賓客而雍為主人招雍皆樂章名也賓入奏招主人入奏雍也始奏肆夏納以孝成始謂尺入時也納謂薦賢時也肆夏孝成皆樂章名也舜為賓客禹為主人舜既使禹攝天子之事於祭𣏌避之居賓客之位獻之位酒則為亞賢也矣樂正道贊曰尚考大室之義唐為虞賓尚考猶言古考謂往明也太室明堂之中央室也義當為儀儀禮也謂祭大室禮先為舜賓之也至今衍於四海衍猶溢也言堯之禪天下至於今其德義溢滿四海也成禹之變垂於萬世之後帝唱之曰卿雲爛兮和氣之明者也禮縵縵兮教化廣遠日月光華旦咸旦兮言明明相代八佾咸進稽首曰明明上天爛然星陳日月光華弘豫一人帝乃再歌曰日月有常星辰有行四時從經萬姓允誠施子論樂配天之靈遷于賢聖莫不咸聽長乎歌之軒乎儛之精華已竭褰裳去之於時八風循湧卿雲藂藂蟠龍僨信於其藏蛟魚躍踊於其淵龜魚咸出其穴遷虞而事夏也孔叢子曰叔孫氏之車子鉏商樵於野而獲麟焉衆莫之識以為之不祥棄之五父之衢冉有告曰麋而肉角豈天之妖乎夫子曰今何在吾將觀焉遂泣曰豫之於人猶麟仁獸出而死吾道窮矣歌曰唐虞世兮麟鳳遊今非其時來何求麟兮麟兮我心憂又曰哀公使以幣如衛迎夫子而卒不能官故夫子而作丘陵之歌曰登彼丘陵山施其阪仁道在邇求之若遠迷而不復自嬰屯蹇又曰楚王使奉金帛聘夫子宰子冉有曰夫子之道於是行矣遂請見問夫子曰太公勤身苦志七十而遇丈王孰與許由之賢夫子曰許由獨善身者也太公兼天下者也然今世無文王之君雖有太公孰識之哉乃歌曰大道隱兮禮有基賢人竄兮將待時天下如一兮欲何之説苑曰曾子耘瓜而誤斬其根曾晳怒援大杖擊之曾子仆地有頃乃蘇蹶然而起進曰曩者參得罪於大人大人得無疾乎退屏鼓琴而歌令曾晳聽其歌聲令和莊子曰孔子窮於陳蔡之間七日不火食羹不糝顏色甚憊歌於室不輟又曰子桑戶孟子反禽張三人相與友有間而子桑戶死相和而歌子貢曰敢問臨尸而歌禮乎二子相視而笑是惡知乎禮意也又曰莊子妻死惠子弔之箕踞鼓盆而歌惠子曰不哭亦足矣歌不亦甚乎莊子曰人且偃然寢乎巨室而我哭之是不通乎命故止之又曰曾子居衛捉𥘞而肘見納履而踵決曳履而歌商頌聲滿天地若出金石夏侯玄辨樂論曰昔伏羲氏因時興利教民田漁天下歸之時則有網罟之歌神農繼之教民食穀時則豐年之詠黃帝備物始垂衣裳時則有龍袞之頌古今樂録曰周文王時鳳凰銜書而至文王乃作歌又曰堯郊天地祭神在座上有響誨堯曰水方至為宮命子救之堯乃作歌又黃帝堯之世民樂無事擊壤之歡慶雲之前因以作歌又曰白日落西山歌者沈攸之發荊州未敗之前思歸京師所作歌也又曰莫愁樂者亦因石城樂而有此歌石城西有女子名莫愁善歌謠且石城樂和中有忘愁聲因有此歌又曰秦始皇祠水群有黑頭公從河中出呼始皇曰來受天寶乃與群臣作歌又曰昔炎帝時有娥之覆以玉筐少選視之燕遺二卵五色北飛逐之不及二女作歌始作北音夏孔甲田於東陽迷入民室主人方乳曰后來大吉或曰不勝之子必有殃孔甲取其子歸曰為余子誰敢殃之及成人幕動折斧被斬足孔甲為作斧斤之歌始為東音周昭王征荊辛餘靡長且多力為王右涉漢梁敗王及祭公殞于漢中辛餘靡振王北濟又反振祭公周公候之于西翟實為長公殷憖甲從宅西河追思故處始作西音長公繼是音以處西山此蓋四方之歌也又曰許由者古之貞固之士也堯時為布衣徒步不與方遠交通衣食財得自足夏則巢居冬則穴處無杯杅每以手捧水而飲之人有見其飲無杯以瓢遺之許由受以操飲畢輒挂於樹枝風吹樹瓢搖動歷歷有聲許由尚以為繁擾取而棄之以清節約聞於堯堯大其志乃遣使以符璽禪為天子於是許由喟然歎曰匹夫結志固如盤石采山飲河所以養性非以求祿位也放髮一優遊所以安己不懼非以貪天下也使者有愧還以狀報堯堯知許由不可動亦已矣夫於是許由以使者言為不善乃臨河洗耳樊堅見由方且洗耳問之耳有垢乎由曰無垢聞惡語耳堅曰何等語者由曰堯聘吾為天子堅曰尊位何為惡之由曰吾志在青雲何乃劣劣當作九州伍長乎於是樊堅方且飲牛聞其言而去恥飲子之下流於是許由名布四海堯既殂落乃作箕山之歌曰登彼箕山兮瞻望天下山川麗崎萬物還普日月運照靡不記暏遊牧其間何所卻慮嘆彼唐堯獨自愁苦勞心九州憂勤后土謂余欽明傳禪易祖我樂如何蓋不盼顧河水流兮緣高山甘瓜施兮棄綿蠻高林肅兮相錯連居此之處傲堯君其後許由死遂葬於箕山又曰周太伯者周太王古公之長子也古公有子三人長者太伯次者虞仲少者季歷季歷之子名昌昌即文王也古公寢疾將死國當有傳心欲以傳季歷乃呼三於謂曰我不起此病繼體興者其在昌乎太伯見太王傳季歷於是太伯與虞仲俱去被髮文身以變形託為王採藥後聞古公卒乃還奔喪哭於門外示夷狄之人不得入王庭於是季歷謂太伯長子也伯當立何不就太伯曰吾生不供養死不飯含哭不臨棺不孝之子焉得繼父乎斷髮文身刑餘之人也戎狄之民也三者除焉何可為君矣季歷垂涕而留之終不肯止遂委而去到江海之涯吟詠優遊仰覽俯觀求膏腴之處遂適于吳率以仁義化以道德荊越之人移風易俗成集韶夏取象中國乃太伯之化也是後季歷作哀慕之歌章曰先王既徂長霣異都哀喪腹心未寫中懷追念伯仲季我如何栝桐萋萋生于道周宮館徘徊臺閣既除何為遠去使此空虛支骨離別垂思南隅瞻望荊越涕淚交流伯兮仲兮逝肯來遊自非二人誰訴此憂又曰拘羑里者謂紂拘文王於羑里也文王未能政候時修道德百姓親附文王有子其二子皆賢是時崇侯虎與文王列為諸侯德不及文王常疾之乃譖文王於紂曰西伯昌聖人也長子發仲子旦皆聖三聖合謀將不利於君君宜慮之紂曰冠雖弊宜加於上屨雖新宜處於下文王雖聖安可剋我崇侯譖文王至十紂用其言乃徙文王於羑里欲殺之於是文王四臣太顛宏夭散宜生南宮適之屬往見文王文王為矉反目者紂之好色也拊桴其腹者言欲得奇寶也蹀躞其足者使疾迅也於是乃周流海內經歷豐土得美女二人水中太寶白馬朱鬣以獻於紂陳其中庭紂見之仰天而嘆曰嘻哉此誰寶散宜生趍而進曰是西伯之寶以贖刑罪紂曰於寡人何其厚也立出西伯紂謂宜生譖歧侯者長鼻決耳也宜生還以狀告文王乃知崇侯虎譖之文王在羑里時演八卦以為六十四作鬱厄之辭據于石困於蒺䔧乃申憤以作歌章曰殷道溷溷浸濁煩兮丹紫相合不分別兮迷亂聲色信諛言兮閻閻之虎使我騫兮幽間牢獄誰其言兮無辜桎梏誰所宣兮遘我四人皆憂勤兮得此珍玩且解大患兮倉遑迄命遺後昆兮作此象變兆在昌兮欽承祖命天不喪兮遂臨下土在聖明兮討暴除亂誅逆王兮又曰莊周者齊人也明篤學術多所博達進準見方來卻覩未發是時齊涽王好為兵事習用干戈莊周儒士不合於時自以不用行欲避亂自隱於山嶽嶽後有達莊周於涽王遣使齎金百鎰以聘相位周不就使者曰金至寶相尊官何辭之為周曰君不見夫郊祀之牛衣之以朱綵食之以禾粟非不樂也及其用時鼎鑊在前刀俎列後當此之時雖欲還就孤犢寧可得乎周所以飢不求食渴不求飲者但欲全身遠害耳於是重謝使者不得已而去後引聲歌曰天地之道近在胸臆呼吸精神以養九德渴不求飲飢不索食避世俟道志潔如玉卿相之位難可直當巖巖之石幽而清涼枕塊寢處樂在其央寒涼回固可以久長楊泉物理論曰始皇起驪山之冢使蒙恬築長城死者相屬民歌曰生男慎勿舉生女哺用晡不見長城下尸骸相支柱世説曰晉武帝問孫皓聞吳人好作汝歌頗能不皓正飲酒因舉觴勸帝而言曰昔與汝為鄰今為汝作臣上汝一杯酒令汝壽萬春帝悔琴操曰王昭君齊國王襄漢元帝時獻入後宮帝以妻單于昭君心念鄉土乃作怨曠之歌曰秋木萋萋其葉委黃有鳥爰止集于包桑既得升雲遊倚惟房志念幽沉不得頡頑我獨伊何改往變常翩翩之燕遠集西羌高山峨峨河水泱泱嗚呼哀哉憂心惻傷
