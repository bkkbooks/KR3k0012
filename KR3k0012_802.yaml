body:
  text: 北狄三託跋氏宋書曰託跋氏其先漢將李陵之後也陵降胸奴單于妻之以女字託跋其後因氏焉世豪強分建種落也又曰索頭虜姓託跋氏胸奴有數百千種各立名號索頭亦其一也晉初索頭種有部落數萬家在雲中惠帝末并州刺史司馬騰於晉陽為胸奴所圍索頭虜單于猗駝遣軍助騰懷帝永嘉三年駝弟盧率部落自雲中入鴈門就并州刺史劉琨求樓煩等五縣琨不能制且欲倚盧為援乃上言盧兄駝有救騰之功宜請移五縣民於新興以其地處之愍帝進盧為代王盧孫十翼鞬據陰山衆數十萬鞬死子開字涉圭即後魏道武皇帝又曰虜俗以四月祠火六月末率大衆至陰山謂之卻霜陰山去平城六百里深遠饒樹木霜雪未嘗釋蓋欲以暖氣禦寒也後魏書曰黃帝子昌意少子受封北土國有大鮮卑山因以為號其後世為君長統幽都之北黃帝以土德王北俗謂土為托謂后為跋故以為氏其裔始均仕堯世逐女魃於弱水北民賴其勳帝舜嘉之命為田祖歷三代至秦漢獯鬻獫狁山戎胸奴之屬纍代殘暴作害中州而始均之裔不交南夏是以載籍無聞焉積六七十世裔孫即成皇帝諱毛也毛統國三十六大姓九十九威振北方莫不率服至力微立即成元皇帝也諸部大人悉服控弦之士二十餘萬遷於定襄之盛樂也又曰祿官立始祖子也分國為三部一居上谷北濡源之西東接宇文部自統之一居代郡之參合陂北兄子猗色統之一居定襄之盛樂故城使猗色弟猗盧統之稽胡後周書曰稽胡一百步部稽蓋胸奴別種劉元海五部之苗裔也或云山戎赤狄之後離石以西安定以東方七八百里居山谷間種落繁熾其俗婦人多貫蜃貝以為耳頸飾孝昌中有劉蠡升者居雲陽谷分遣部衆抄掠居汾晉之間略無寧歲神武遷鄴後始密圖之偽許以女妻蠡升之子蠡升信之遂遣其子詣鄴齊神武厚為之禮緩以婚期蠡升既恃和親不為之備大統元年三月齊神武潛師襲之又曰保定中離石生胡數寇汾北勳州刺史韋孝寬於險要築城以遏其路又曰建德五年高祖敗齊師於晉州乘勝逐北齊人所棄甲仗稽胡乘間竊出盜而有之慕容氏晉書載記曰慕容氏其先有熊氏之苗裔世居北夷邑于紫蒙之野號曰東胡其後與胸奴並盛控弦之士二十餘萬風俗官號與胸奴略同秦漢之際為胸奴所敗分保鮮卑山因以為號通典慕容氏亦東胡之後別部鮮卑也魏初渠帥有莫謨跋率諸部入居遼西後從司馬宣王討公孫淵有功拜率義王至孫涉歸魏封為鮮卑單于涉歸有二子長曰吐谷渾西遷河湟之間次曰廆有命代才略晉太康十年又遷于徒河之青山也又曰慕容廆字奕洛瓌昌黎棘城鮮卑人也曾祖莫護跋初率諸部大人入居遼西從宣帝伐公孫氏有功拜率義王始建國於棘城之北時燕代多冠步搖冠莫護跋見而好之乃斂髮襲冠諸部因呼之為步搖其後音訛遂為慕容焉或云慕二儀之德繼三光之容遂以慕容為氏祖木延左賢王父涉歸以全柳城之功進拜鮮卑單于遷於遼東北於是漸慕諸夏之風矣又曰安北將軍張華有知人之鑒慕容廆童冠時往謁之華謂曰君至長必為命世之器因以所服簪幘遺廆又曰慕容廆謀於衆曰吾先公以來世奉中國且華裔理殊強弱固別豈宜與晉國競乎何為不和以害吾百姓耶乃遣使來降帝嘉之拜為鮮卑都督廆致敬於東夷府巾衣詣門抗士大夫之禮何龕嚴兵引見廆乃改服戎衣而入人問其故廆曰主人不以禮賓復何為哉龕聞而慚之廆以大棘城即帝顓頊之墟元康四年乃移居之教以農桑法制同於上國永嘉初廆自稱鮮卑大單于建武初元帝承制拜廆假節散騎常侍都督遼左雜夷流人諸軍事龍驤將軍大單于昌黎公廆刑政修明流亡者多歸之廆乃立郡以統流人冀州人為冀陽郡豫州人為成周郡青州人為營丘郡并州人為唐國郡廆卒皓嗣立皓雄毅多權略日強盛遂自稱燕王後遷都於柳城俊暐即其子孫宇文莫槐後漢書曰宇文莫槐出於遼東塞外其先南單于之遠屬莫槐之人皆剪髮而留其頂上以為飾婦人被長襦及足而無裳焉秋收烏頭為毒藥以射禽獸北史曰莫廆呼罪切部衆強盛自稱單于塞外諸部咸畏憚之莫廆即莫槐之姪孫莫槐父子世雄漠北又先得玉璽三釰自言為天所相每自誇大莫廆之孫曰乞得龜為慕容廆破之先是海出大龜枯死於平郭至是乞得龜敗也高車北史曰高車蓋古赤狄之種也初因號為狄歷北方以為勑勒諸夏以為高車丁零其語略與胸奴同而時有小異或云其先胸奴甥也其種有狄氏袁紇氏斛律氏解批氏護骨氏異奇斤氏其人好引聲長歌有似狼嗥本無都統大帥當種各有君長為姓粗猛黨類同心至於寇難翕然相依鬭無行陳其俗婚姻用牛馬納聘以多為榮俗無穀不作酒迎婦之日男女相將持馬酪熟肉節解主人延賓亦無行位穿廬前藂坐飲宴終日又曰高車俗不潔淨喜致震霆每震則叫呼射天而集之移去至來歲秋馬肥復相率集於震所理羖羊然火拔刀女巫祝説如中國祓除而群駝馬旋繞百匝乃止人持一束柳枝因曲豎之以乳酪灌焉又曰高車婦人以皮裏羊骸苦交切戴之首上縈屈髮髾而綴之髾所交切有似軒冕其死亡葬送掘地作坎坐尸於中張臂引弓佩刀挾矟無異於生而露坎不掩走馬繞旋多者數百匝男女無小大皆集會之又曰高車與蠕蠕同唯車輪高大輻數至多後徙於鹿渾海西北百餘里部落強大常與蠕蠕為敵後魏道武帝度弱洛水西行至鹿渾海襲破之復討其餘種於狼山又曰道武帝自牛川南引大校獵以高車為圍騎徒遮列七百餘里聚雜獸於其中因驅至平城即以高車衆起鹿苑南固臺陰北距長城東包白登之西山又曰高車族有十二姓一曰泣伏利氏二曰吐盧氏三曰乞旃氏四曰大連氏五曰窟賀氏六曰達薄氏七曰阿崙氏八曰莫允氏九曰俟分氏十曰副伏羅氏十一曰乞袁氏十二曰右叔沛氏又曰高車昧利不顧後患又曰高車斛律部帥倍侯利為蠕蠕掩襲遂奔魏賜爵孟都公倍侯利質直勇健過人北方之人畏之嬰兒啼者語曰倍侯利來便止處女歌謠云求良夫當如倍侯利其衆服如此善用五十蓍筮吉凶每中故得親幸倍侯利卒道武悼惜葬以魏禮諡曰忠壯王又曰太和十四年阿伏至羅遣使至京以二箭奉貢云蠕蠕為天子賊臣當為天子討除孝文賜繡袴褶一具雜綵百匹又曰高車部衆分散或來奔附或投蠕蠕詔遣宣威將軍羽林監孟威撫納降人又曰高車遣使貢金方一銀方一金杖二馬七匹駝十頭又曰高車與蠕蠕戰於蒲類海北割蠕蠕之髮送於羽林監孟威又曰高車遣使獻龍馬五匹金銀貂皮及諸方物詔賜樂器一部樂工八十人赤紬十匹雜綵六十匹又曰高車王伊匐遣使朝貢因乞朱畫步挽一乘并幔褥鞦䩛一副繖扇各一枚青曲蓋五枚赤漆扇五枚鼓角十枚詔給之烏洛侯北史曰烏洛侯國在地豆干北去代都四千五百餘里其地下濕多霧氣而寒國人尚勇不為姦竊故慢藏野積而無寇盜好射獵樂有箜篌木槽革面施九弦太武真君四年來朝稱其國西北有魏先帝舊虛石室南北九十步東西四十步高七十尺室有神靈人多祈請太武遣中書侍郎敞告祭刊祝文於石室之壁而還唐書曰烏羅渾國蓋後魏之烏洛侯也今亦謂之烏羅護其國在京師東北六千三百里東與靺羯西與突厥南與契丹北與烏丸接風俗與靺羯同貞觀六年其君長遣使獻貂皮庫莫奚後魏書曰庫莫奚國之先東部宇文別種也初為慕容元貞所破邑落竄匿於松漠之間後周書曰庫莫奚鮮卑之別種也先為慕容晃所破竄於松漠之間後種漸多分為五部一曰辱紇主二曰莫賀弗三曰契箇四曰木昆五曰室得每部置俟斤一人有阿會氏者最為豪帥五部受其節度北史曰登國三年道武親討庫莫奚至弱水南大破之又曰武成之世庫莫奚歲致名馬文皮太和四年輒入塞內辭以畏豆地干抄掠詔書切責之軻比能魏志曰軻比能本小種鮮卑以勇健斷法平端不貪財物衆推以為大人部落近塞自袁紹據河北中國人多叛歸之教作兵器鎧楯頗學文字故其勒御部衆擬於中國出入弋獵建立旄麾鼓節為進退又曰建安中烏桓反軻比能動為寇害太祖以鄢陵侯彰為驍騎將軍北征大破之又曰延康初軻比能遣使貢馬文帝立比能為附義王又曰黃初二年軻比能出諸魏人在鮮卑者五百餘家還居代郡黃初三年軻比能率部落與代郡烏丸等三十餘口交市遣魏人千餘家居上谷後與東部鮮卑大人素利及步度根三部爭鬭烏桓校尉田豫和之使不得相侵五年軻比能復擊鮮卑豫帥輕騎徑進椅其後比能使別小帥璅奴拒豫進討破之由是懷二乃與輔國將軍鮮卑輔書曰夷狄不識文字故校尉閻柔保我於天子我與烏丸為讎往年攻擊之而田校尉助素利烏丸也我臨陳使璅奴往聞使君來即引軍退步度根數數鈔盜又殺我弟而誣我以鈔盜我夷狄雖不知禮義兄弟子孫受天子印綬牛馬尚知美水草況我有人心耶將軍當保明我於天子輔得書聞帝帝復使豫招納安慰軻比能衆遂強盛控弦十餘萬騎每鈔掠得財物均平分付一決目前終無所私故能得衆死力餘部大人皆憚之
