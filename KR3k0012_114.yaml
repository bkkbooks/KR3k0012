body:
  text: 皇王部三八唐德宗孝文皇帝唐書曰德宗孝文皇帝諱適代宗長子母曰睿真皇后沈氏天寶元年四月癸巳生於長安東宮其年十二月拜特進封奉節郡王代宗即位之年五月以上為天下兵馬元帥改封魯王八月改封雍王廣德二年二月立為皇太子大曆十四年五月辛酉代宗崩癸亥即位於太極殿六月己亥朔御丹鳳樓大赦天下八月以門下侍郎平章事崔祐甫為中書侍郎平章事以道州司馬同正楊炎為門下侍郎平章事乙巳遣太常少卿韋倫使吐蕃以蕃俘五百人還之示修好也冬十月吐蕃合南蠻之衆號二十萬三道寇茂州扶文黎雅等州連陷郡邑發禁兵四千助蜀大破之十二月乙卯立宣王誦為皇太子建中元年春正月丁卯朔御含元殿改元建中群臣上尊號曰聖神文武皇帝己巳朝太清宮庚午謁太廟辛未有事於郊丘還宮御丹鳳門大赦天下自艱難以來徵賦名目頗多今後除兩稅外輒率一錢以枉法論二年三月築汴州城初大曆中李正己有淄青齊海登萊沂密德棣曹濮兗鄆十五州之地李寶臣有恆定易趙深冀滄七州之地田承嗣有魏博相衛洺貝澶七州之地梁崇義有襄鄧均房復郢六州之地各聚兵數萬始因叛亂得立雖朝廷寵待加恩心猶疑二皆連衡盤結以自固先是汴州以城隘不容衆請廣之至是築城五月景寅以軍興十一而稅冬十一月尚書左僕射楊炎貶崖州司馬尋賜死三年四月封朱滔為通義郡王朱滔王武俊與田悅合從而叛十一月朱滔田悅王武俊於魏縣軍壘各相推獎僣稱王號署官名如國初親王行臺之制丁丑李希烈自稱天下都元帥太尉建興王與朱滔等四盜膠固為逆四年春正月鳳翔節度使張鎰與吐蕃宰相尚結贊同盟于清水庚寅李希烈陷汝州執州將李元吉而去東都震駭甲午遣顏真卿宣慰李希烈軍八月丁未李希烈率衆三萬攻哥舒曜於襄城東都危急冬十月詔涇原節度使姚令言率涇原之師救哥舒曜丁未涇原軍出京城至滻水倒戈謀叛姚令言不能禁止上令載繒綵二車遣普王往慰諭之亂兵已陳于丹鳳闕下促神策軍拒之無一人至者上與太子諸王妃主百餘人出苑北門右龍武軍使令狐建方教射於軍中聞難聚射士得四百人扈從其夕至咸陽飯數匕而過戊申至奉天己酉元帥都虞候渾瑊以子弟家屬至乃以瑊為行在都虞候亂兵既剽京城屯於白華乃於晉昌里迎朱泚為帥稱太尉居含元殿上以奉天隘欲幸鳳翔壬子鳳翔軍亂殺節度使張鎰乃止癸丑李希烈陷襄城哥舒曜走洛陽丁巳邠寧節度韓遊環與論惟明率兵三千至才入奉天賊軍亦至乃出拒之王師不利賊攻城愈急矢石雨下死傷者衆人心危蹙上與渾瑊對泣朱泚據乾陵作樂下瞰城中辭多侮慢戊子朔方節度使李懷光遣兵馬使張韶奉表言大軍將至乃令舁韶巡城叫呼歡聲動地賊不之測疑懼緩攻癸巳懷光軍次醴泉是夜賊解圍而去神策將李晟自定州率師赴難軍於渭橋興元元年春正月上在奉天詔曰克致興化必在推誠忘已濟人不吝改過朕嗣服丕搆君臨萬邦失守宗祧越在草莽不念率德誠莫追於既往永言思咎期有復於將來明徵其義以示天下豫小子懼德不嗣罔敢怠荒然以長於深宮之中暗於經國之務積習易溺居安忘危不知稼穡之艱難不恤征戍之勞苦澤靡下究情不上通事既擁隔人懷疑阻猶昧省已遂用興戎徵師四方轉餉千里賦車藉馬遠近騷然行齎居送衆庶勞止力役不息田萊多荒暴令峻於誅求疲民空於杼軸轉死溝壑離去鄉閭邑里丘墟人煙斷絶天譴於上而朕不寤人怨於下而朕不知馴致亂階變起都邑賊臣乘釁肆逆滔天曾莫愧畏敢行凌逼萬品失序九廟震驚上纍于祖宗下負于蒸庶痛心靦面罪實在豫永言愧悼若墜泉谷賴天地降祐人祗叶謀將相竭誠爪牙宣力群盜斯屏皇維載張將弘永圖必布新令朕晨興夕惕惟省前非乃者公卿百寮用加虛美以聖神文武之號被蒙暗寡昧之躬固辭不獲俯遂群議昨因內省良所瞿然自今己後中外書奏不得言聖神文武之號今上元統曆獻歲發祥宜革紀年之號式敷在宥之澤可大赦天下改建中五年為興元元年李希烈田悅王武俊李納咸以勳舊繼守藩條朕撫馭乖方洗其疑懼皆由上失其道而下罹其災一切並與洗滌復其爵位待之如初仍即遣使宣諭朱滔以泚連坐路遠必不同謀永念舊勳務存弘貸如能效順亦與惟新朱泚反易天常盜竊名器暴犯陵寢所不忍言獲罪祖宗朕不敢赦除泚外並從原宥二月甲子加連城郡王李懷光太尉仍賜鐵券赦三死罪懷光怒曰凡人臣反逆乃賜鐵券恕以不死今懷光是反定矣因投之於地上聞懷光將叛令翰林學士陸贄往慰諭之其詞禮益倨悖尋李晟自咸陽移兵東渭橋避懷光也晟以懷光反狀已明請上幸蜀丁卯車駕幸梁州留戴休顏守奉天三月懷光燒營走歸河中庚寅車駕次城固壬辰至梁州四月辛丑朔時將士未給春衣上猶夾服漢中早熱左右請御暑服上曰將士未易冬服獨御春衫可乎俄而貢物繼至先給諸軍而始御之五月李晟自渭北移軍於光泰門外賊來薄我軍士奮擊大敗之斬馘千計戊戍晟列陳於光泰門外遣騎將史萬頃往神麚村開苑墻二百餘步賊樹柵當之我軍爭拔柵與賊血戰賊黨大敗追擊至白華朱泚姚令言率衆萬餘遁去晟收復京城是日渾瑊與戴休顏亦破賊三千於咸陽韓遊瓌追朱泚於涇州六月李晟上收城露布上覽之涕下霑襟涇州田希鑒斬姚令言幽州軍士韓旻於彭原斬朱泚並傅首至行在乙巳遣吏部侍郎班宏入京宣慰六月戊午車駕發興元秋七月景子次鳳翔府壬午至自興元辛卯御丹鳳樓大赦天下九月丁亥上顧謂宰臣曰今大盜雖除時猶多難宜廣延納以達下情近日諫官都無論奏自今每正衙及延英坐日常令朝臣三兩人面奏時政得失庶有弘益也貞元元年正月丁酉朔御含元殿受朝賀禮畢宣制大赦天下改元時關東大飢賦調不入國用益窘關中飢民蒸蝗蟲而食之五月分命朝臣禱群神以祈雨蝗自海而至群飛蔽天每下則草木及畜毛無復子遺穀價騰踊九月朔方大將牛名俊斬李懷光傳首闕下馬燧收復河中十月上御正殿策賢良方正能直言極諫等三科舉人十一月癸卯上親祀昊天上帝於圓丘禮畢御丹鳳樓大赦天下二年四月景寅淮西李希烈為其牙將陳仙奇所鴆并誅其妻子仙奇以淮西歸順九月乙巳吐蕃寇好畤京師戒嚴李晟部將王佖擊吐蕃於汧陽城敗其中軍辛亥寇鳳翔李晟出師禦之一夕而退冬十月李晟柭吐蕃摧沙堡十一月冊淑妃王氏為皇后丁酉右崩諡曰昭德辛丑吐蕃陷鹽州三年三月河東馬燧來朝時吐蕃相結贊使大將論頰熱辭厚意告焉燧請兩國同盟上疑其不誠不允故燧自將論頰熱入朝盛言蕃相請盟可以保信上從之五月辛未侍中渾瑊與吐蕃宰相尚結贊同盟于平涼為蕃兵所劫瑊遁而獲免崔漢衡已下將吏陷沒者六十餘人四年春正月上御丹鳳樓大赦天下京師地震辛亥又震壬子又震甲寅地震宴群臣於麟德殿己朱地震丁卯有司條奏省官其左右常侍太子賓客請依前置四員從之壬戍加置諫議大夫八員分中書四員為右門下四員為左是月吐蕃寇涇邠寧鄜慶等州焚彭原縣邊將閉城自固賊驅人畜三萬計凡二旬而退五年春正月乙卯詔自今宜以二月一日為中和節以代正月晦日備三令節數內外官司休假一日二月庚子以大理卿董晉為門下侍郎同平章事以御史中丞竇參為中書侍郎平章事兼轉運使六年春正月大雪二月戊辰朔百寮會宴於曲江亭上賦中和節群臣賜宴詩七韻是日百僚進兆人本業三卷八年四月乙未貶中書侍郎平章事竇參為郴州別駕以尚書左丞趙憬兵部侍郎陸贄並為中書侍郎同中書門下平章事八月以天下水災命朝臣宣撫賑貸河南河北山南江淮凡四十餘州大水漂溺死者二萬餘人九年正月癸卯初稅茶歲得錢四十萬貫從鹽鐵使張滂所奏茶之有稅自此始五月乙巳韋皋破吐蕃峨和城定廉城通鶴軍凡平堡五十餘所冬十月環王國獻犀牛上令見于太廟十年冬十月御宣政殿試賢良方正能直言極諫等舉人十二月貶中書侍郎平章事陸贄為太子賓客十二年三月以戶部侍郎裴延齡為戶部尚書六月初置左右護軍中尉十二月乙未大雪平地二尺竹柏多死環王國所獻犀牛是冬凍死上著刑政針一首癸未回紇南詔劍南西山八國女國王並來朝賀十三年春正月吐蕃贊普遣使修好塞上以聞上以犬戎負約不受其使十六年春正月恆冀易定陳許河陽四鎮之師與賊戰皆不利而退二十一年春正月御含元殿受朝賀是日上不康癸巳會群臣於宣政殿宣遺詔皇太子宜於柩前即位是日崩於會寧殿享壽六十四諡曰神武孝文皇帝廟號德宗葬崇陵朱泚附唐書曰朱泚幽州昌平人曾祖利贊善大夫贈禮部尚書祖思明太子洗馬贈太子太師父懷圭天寶初事范陽節度使裴寬為衙前將授折衝將軍及安祿山史思明反叛纍為管兵將寶應中李懷仙歸順奏為蘇州刺史平廬軍留後柳城軍使卒贈左僕射泚以父資從軍幼壯偉腰帶十圍騎射武藝亦不出人外若寬和中頗忍忌然輕財好施每征戰所得賞物輒分與麾下將士以是為衆所推故得濟其凶謀初隸李懷仙為十將改經略副使朱希採既殺李懷仙自為節度以泚宗姓甚委信之希彩為政苛酷人不堪命大曆七年秋竟為孔目官李懷瑗所殺倉卒之際未有所從泚營在城北弟滔主衙內兵亦得衆心滔變詐多端潛使百餘人於衆中大言曰節度使非城北朱副使莫可衆既無從因共推泚泚遂權知留後遣使奉表京師十月拜檢校左散騎常侍兼御史中丞幽州盧龍節度等使八年三月遷幽州盧龍節度等使幽州長史兼御史大夫其年泚上表令弟滔率兵二千五百人赴京西防秋代宗嘉之手詔褒美九年就加檢校戶部尚書賜實封百戶幽州及河北諸鎮自天寶末便為逆亂之地李懷仙朱希彩與連境三節度名雖向順未嘗朝謁至是泚率先上表請自領部騎三千人入觀覲詔修甲第以待之九月泚至京師代宗御內殿引見賜御馬兩匹戰馬十匹金銀錦綵甚厚又以器物十床馬四十匹絹二萬匹衣一千七百襲賜其將士宴犒之盛近時未有泚又上表請留京師從之因授其弟滔兼御史大夫幽州節度留後仍以河陽永平軍防秋兵郭子儀統之決勝軍楊猷兵李抱玉統之淮西鳳翔兵馬璘統之汴宋淄青兵俾泚統焉十一年八月加拜同平章事尋令出鎮奉天行營復賜金銀繒綵并內庫弓箭以寵之十二年加檢校司空代李抱玉為隴右節度使權知河西澤潞行營兵馬事德宗嗣位加太子太師鳳翔尹實封至三百戶建中元年涇州將劉文喜阻兵為亂加泚四鎮北庭行軍涇原節度使與諸軍討伐涇州平加泚中書令還鎮鳳翔而以舒王謨遙領涇原節度二年又加泚太尉朱滔將反叛陰使人與泚計議以帛書內蠟丸中置髮髻間河東節度馬燧搜獲之以聞并送帛書及所遣使泚惶懼頓首乞歸罪有司上勉之曰千里不同謀非卿之過三年四月以張鎰代泚為鳳翔隴右節度留後留泚京師加實封至一千戶與一子正員官其幽州盧龍節度太尉中書令並如故四年十月涇原兵叛鑾駕幸鳳天叛卒等以泚嘗統涇州知其失權廢居怏怏思亂群寇無帥幸泚政寬乃相與謀曰朱太尉久囚空宅若迎而為主事必濟矣姚令言乃率百餘騎迎泚於進昌里第泚乘馬擁從北向燭炬星羅觀者萬計入居含元殿明日移處白華但稱太尉朝官有謁泚者悉勸奉迎鑾駕既不合泚意皆逡巡而退源休至遂屏人移時言多悖逆又盛陳成敗稱述符命勸其僣僞泚甚悅之又李忠臣張光晟繼至咸以官間積憤樂於禍亂鳳翔涇原大將張庭芝假誠諫以潰卒三千餘自襄城而至賊泚自謂衆望所集僣竊之心自此而定乃以源休為京兆尹判度支李忠臣為皇城使假秀實久失兵柄故推心委之遂發鋭師三千言奉迎乘輿實陰有逆謀秀實與劉海賓謀誅於泚且慮叛卒之震驚法駕乃潛為賊符追所發兵至六日兵乃駱驛而回因與海賓同入見泚為陳逆順之理而海賓於靴中取匕首為其所覺遂不得前秀實知不可以義動遽奪源休象笏挺而擊泚仍大呼曰反虜當斬泚舉臂衛首秀實格拉之恟恟然李忠臣馳助泚泚素多力才破其面逆徒譟集秀實海賓遂併見害明日聲言以親王權主社稷士庶競往觀之八日源休姚令言李忠臣張光晟等八人導泚自白華入宣政僣即僞位自稱大秦皇帝號應天元年愚智莫不憤怒侍衛皆卒伍寮吏行列不過十餘人下僞詔曰幽囚之中神器自至豈朕薄德所能經營彭偃之詞也僞署姚令言為侍中李忠臣為司空兼侍中源休為中書侍郎平章事判度支蔣鎮為吏部侍郎樊系為禮部侍郎儀禮使許季常為京兆尹洪經綸為太常少卿彭偃為中書舍人裴揆崔幼真為給事中崔宣為御史中丞張光晟仇敬忠敬釭張寶何望之假誠諫張芝杜如江為節度使仍以其兄子遂為太子遙封弟滔為冀王太尉尚書令尋又號皇太弟十月泚自領兵侵逼奉天竊威儀輦輅闐隘道途蟻聚之衆軍勢頗盛以姚令言為元帥張光晟為副以李忠臣為京兆皇城留守居中書省尋以蔣鎮為門下侍郎李子平為諫議大夫並平章事泚軍合於城下渾瑊韓遊瓌禦之泚衆大敗死者萬計泚收軍於奉天東三里下營大修攻具明日泚又分兵營於乾陵下瞰城內大震十一月三日杜布全與泚衆戰於莫谷官軍不利自是賊衆驕怠王師乘城而戰人百其勇賊多敗衄或出野戰官軍又獲利焉泚乃大驅百姓填塹夜攻城城中設奇以應之賊乃退縮西明寺僧法堅有巧思為泚造雲梯十五日辰時梯臨城東北隅城內震駭渾瑊侯仲莊設火坑為地道陷之又縱火焚其梯東風起吹我軍衆頗危俄而風回吹賊軍瑊益薪潑油鼓齊震風火俱熾須臾雲梯與凶黨同為灰燼城中三門悉出兵王師又捷其夜兵復出攻泚衆敗績李懷光以五萬人來援自河北至泚衆惶駭因而潰長圍遂解衆以為懷光三日不至城則危矣二十日夜泚走至京城時姚令言於城造戰格拋樓每坊團練人心大擾泚自奉天回乃悉令去之曰攻戰吾自有計前此每三五日即使人僞自城外來周走號令曰奉天已破百姓聞之莫不飲泣道路闃寂時有入臺省吏人不過十數輩郎官六七人而亦令依常年舉選初有數十人陳狀旬日亦皆屏退泚自號其宅曰潛龍宮悉移內庫珍寶以實之識者曰易稱潛龍勿用此敗徵也無幾百姓剽奪其珍寶泚不能禁止明年正月一日泚改僞國號曰漢稱天皇元年二月李懷光既圖叛逆遣使與泚通和鑾駕幸梁洋自此衣冠之潛匿者出授僞官十七八焉懷光初與泚往復通好甚密以錢縠金帛互相饋遺泚與書事之如兄約云削平關中當割據山河永為鄰國及懷光決計背叛逼乘輿遷幸泚乃下僞詔書待懷光以臣禮仍徵兵馬懷光既為所賣慚怒憤恥遂領衆遁歸河中三月李晟駱元光尚可孤之衆悉於城東纍敗泚衆四月泚使韓旻宋歸朝張庭芝等寇武功渾瑊以衆及吐蕃論莽羅大敗旻歸朝殺逆黨萬餘人於武亭川五月泚又使仇敬忠寇藍田尚可孤擊之大破泚衆擒敬忠斬之李晟駱元光尚可孤悉還師齊進晟屯光泰門逆徒拒官軍王師纍捷二十八日官軍入苑收京師逆黨大潰泚與姚令言張庭芝源休李子平朱遂以數千人西走其餘黨或奔竄或來降泚衆緣路潰散乃奔涇州才百餘騎而已田希鑒閉門登陴泚令謂希鑒曰我與爾節度何故背恩希鑒乃使人自城上擲泚所送旌節於外續又投火焚之泚遂過數里息於逆旅泚將梁庭芬入涇州說田希鑒曰我公比日殺馮河清背叛今雖歸順國家必不能久容公他日不免受禍何如開門納朱公與共成事希鑒以為然庭芬乃追及朱泚言之泚大悅使庭芬卻往涇州庭芬請授已尚書平章事泚不從庭芬既求宰相不得不復往涇州從泚至寧州彭原縣西城屯與泚心腹朱惟孝共射泚泚走墜故窖中泚左右韓旻薛綸高幽巖武震朱進卿董希芝共斬泚使宋應傳首以獻泚死時年四十三姚令言投涇州源休李子平走鳳翔尋並斬獲宋歸朝之敗武功降於李懷光送興元斬之唯不獲朱遂傳為野人所殺或云與泚子壻為金吾將軍馬悅潛走黨項部落數月得達幽州泚之僣逆官豎朱重曜頗親密用事泚每呼之為兄時賊中以臘月大雨僞星官謂泚曰當以宗中年長者禳其災變泚乃毒殺重曜以王禮葬焉及京師平出其尸而斬之順宗安皇帝唐書曰順宗安皇帝諱誦德宗長子母昭德皇后王氏上元二年正月生於長安之東內大曆十四年封宣王建中元年正月立為皇太子貞元二十一年正月癸己德宗崩景申即位於太極殿上自二十年九月風病不能言暨德宗不豫諸王親戚皆侍醫藥獨上臥病不能侍德宗彌留思見太子涕咽久之大行發喪人情震懼上力疾纕服見百僚於九仙門既即位知社稷有奉中外始安庚子群臣上書請聽政二月以吏部郎中韋執誼為尚書右丞同中書門下平章事壬寅以太子侍書翰林待詔王伾為左散騎常侍充翰林學士以將仕郎前蘇州司功參軍翰林待詔王叔文為起居舍人充翰林學士甲子御丹鳳樓大赦天下三月癸酉詔冊廣陵郡王淳為皇太子改名純赦京城繫囚以給事中陸質中書舍人崔樞並為太子侍讀七月詔朕承九聖之列荷萬邦之重顧以寡德涉道未明虔恭畏懼不克負荷恐上墜祖宗之訓下貽卿士之憂夙夜祗勤如臨淵谷而積疾未復至于經時怡神保和常所不暇永惟四方之大萬務之殷不躬不親慮有曠廢加以山陵有日霖潦踰旬是用警于朕心以答天戒其軍國政事宜令皇太子勾當時上久疾不復延納宰臣共論大政事無巨細皆決於李忠臣王伾王叔文物論喧雜以為不可藩鎮屢上箋於皇太子指三豎之撓政故有是詔以太常卿杜黃裳為門下侍郎左金吾衛大將軍袁滋為中書侍郎並同中書門下平章事皇太子見百寮於朝堂八月庚子詔惟皇天祐命烈祖誕受方國九聖儲祉萬邦咸休肆豫一人獲纘丕業嚴恭守位不遑暇逸而天祐不降疾恙無瘳將何以奉宗廟之靈展郊禋之禮疇茲庶尹對越上玄內愧于朕心上異于天命夙夜祇栗深惟永圖一日萬機不可以久曠天工人代不可以久違皇太子純睿哲溫文寬和仁惠孝友之德愛敬之誠通乎神明格于上下是用法皇王至公之道遵父子傳歸之制付之重器以撫兆人必能宣祖宗之重光荷天地之休命奉若成憲永綏四方宜今皇太子即皇帝位朕稱太上皇居興慶宮制稱誥辛丑誥有天下傳歸於子前王之制也欽若大典斯為至公式揚耿光用體文德朕獲奉宗廟臨御萬方降疾不瘳庶政多闕乃命元子代豫守邦爰以令辰光膺冊禮宜以今月九日冊皇帝於宣政殿國有大命恩俾惟新宜因紀元之慶用覃在宥之澤宜改貞元二十一年為永貞元年天下死罪降從流已下遞減一等立良娣王氏為太上皇后良媛董氏為太上皇德妃壬寅貶王伾為開州司馬王叔文為渝州司戶元和元年正月景寅朔皇帝率百寮上太上皇尊號曰應乾聖壽甲申太上皇崩于興慶宮之咸寧殿享年四十六諡曰至德大聖大安孝皇帝廟號順宗葬于豐陵史臣韓愈曰順宗之為太子也留心藝術善隸書德宗工為詩每賜大臣方鎮詩制必命書之性寬仁有斷禮重師傅必先致拜從幸奉天賊泚逼迫常身先禁旅乘城拒戰督勱將士無不奮激德宗在位歲久稍不假權宰相左右幸臣如裴延齡李齊運韋渠牟等因間用事刻下取功而排陷陸贄張滂輩人不敢言太子從容論諍故卒不任延齡渠牟為相嘗侍宴魚藻宮張水嬉綵艦雕靡宮人引舟為櫂歌絲竹間發德宗歡甚太子引詩人好樂無荒每對於敷奏未嘗以顏色假借宦官居儲位二十年天下陰受其賜惜乎寢疾踐祚近習弄權而能傳政元良克昌運祚賢哉
