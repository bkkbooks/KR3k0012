body:
  text: 兵部三十一卒說文曰隸人給事者為卒衣有題識者也玉篇曰卒衆之名也屯戍之兵也桂苑曰卒隸人也管子曰管仲相齊作內政而寄軍令二百人為卒卒有正卒聚也韻海曰南楚謂卒為弩父卒主檐弩導因以為名也又行鞭杖者也皆赤幘絳褠左傳曰齊侯求逢丑父三入三出每出齊師以帥退入于狄卒狄卒者狄人從晉討齊也狄皆抽戈盾冒之又曰楚令尹子重將為陽橋之役赦罪悉師王卒盡行彭名御戎蔡景公為左許靈公為右又曰晉侯將伐鄭楚子救鄭六月晉楚遇於𨻳陵苗賁皇言於晉侯曰楚之良在中軍王族而已請分良以擊其左右而三軍萃於王卒必大敗又曰宣子謂鞅曰矢及君屋死之鞅用劍以帥卒而欒氏退攝車從之又曰楚伐舒鳩吳人救之楚子彊子息桓子駢子子孟五人以其私卒先擊吳師吳師奔登山以望見楚師不繼復逐之傅諸其軍又曰齊為鄎故國書高無本帥師伐我及清季孫謂其宰冉求曰齊師在清必魯故也季氏之甲七十冉有以武城人三百為己徒卒老幼守宮次于雱門之外五日右師從之又曰蔡衛不拔固將先奔既而萃於王卒可以禁事從之又曰子玉使伯棼請戰曰非敢必有功也願以間執讒慝之口王怒少與之師唯西廣東宮與若敖之六卒實從之又曰狐毛狐偃以上軍夾攻子西楚左師潰楚師敗績子玉收其卒而止故不敗史記項羽本紀曰是時呂后兄呂侯為漢將兵居下邑漢王間往從之稍稍收其士卒漢書曰吳王劉濞傳曰吳王先起兵誅漢吏二千石以下膠西膠東王為渠率與災川濟南共攻圍臨災趙王遂亦陰使胸奴與連兵七國之發也吳王悉其士卒下令國中曰寡人年六十二身自將少子年十四亦為士卒先諸年上與寡人同與少子等皆發二十餘萬人也又司馬遷傳曰且陵提步卒不滿五千深踐戎馬之地足歷王庭垂餌虎口橫挑強胡陵李陵也又刑法志曰戰國之時轉相攻伐齊愍以伎擊強魏惠以武卒奮秦昭以鋭士勝又五行志曰成帝綏和二年八月鄭通里男子王褒衣綘衣小冠帶劍入北司馬門上前殿解帷組結佩之自云天帝使我居此收縛考問故公車大誰卒病狂易不自知入宮下獄死大誰者非常之人名大姓誰是也本以誰何為稱因用名官有大誰長今此卒即長所領之卒也又食貨志曰董仲舒說武帝曰今荒淫越制踰侈以相高邑有人君之尊里有公侯之富小民焉得不困又加月為更卒已復為正一歲屯戍三十倍於古更工衡切更卒謂給郡縣一月而更也又胡建傳曰建字子孟河東人也孝武天漢中守軍正丞貧亡車馬常步與走卒起居所以尉薦走卒甚得其心尉者自上安之也薦者舉藉之也晉書天文志曰積卒十三星在房心南主為衛也又謝萬傳曰萬乃召集諸將都無所說直如意指四座云諸將皆徑卒諸將益恨之又劉元海載記曰元海薨和嗣立呼延攸等恨不參顧命也說和曰先帝不惟輕重之計而使三王㧾強兵於內大司馬握十萬徑卒居于近郊陛下今便為寄坐禍難未可惻也又劉曜載記曰劉嶽攻石生于洛陽配以近郡甲士五千宿衛精卒一萬濟自盟津鎮東呼延讓荊州之衆自崤澠而東莊子曰孔子往見盜跖盜跖乃方休卒太山之陽膾人肝而餔之魏武步戰令曰嚴鼓一通步騎士悉裝再通騎上馬步結屯三通以次出之隨幡所指住者結屯幡後聞急鼓音整陳斥候者視地形廣狹從四角面立表制陳之宜諸部曲各自按部陳兵曹舉不如令者斬陳孔璋檄吳將校部曲文曰又使征西將軍夏侯淵等帥精甲五萬巴漢鋭卒又曰城都屠勾踐武卒散於黃池曹植求自試表曰伏見先帝武臣宿兵年耆即世者有聞矣雖賢不乏世宿將舊卒猶習戰也阮嗣宗為鄭冲勸晉王箋曰東誅叛逆全軍獨剋擒闔閭之將斬輕鋭之卒以萬計威加南海名懾三越干寶晉紀論曰將相侯王連頭受戮乞為奴僕而猶不獲免嬪嬙妃主虜辱於戎卒豈不哀哉陸士衡辨亡論曰告類上帝拱揖群后虎臣毅卒循江而守劉孝摽辨命論曰楚師屠漢卒睢河鯁其流秦人坑趙士卒沸聲若雷霆班孟堅西都賦曰列卒周匝星羅雲布左太冲吳都賦曰雕題之士鏤身之卒又魏都賦曰簿戍綿冪無異蛛蝥之網弱卒瑣甲何異螳蜋之衛王仲宣從軍詩曰泛舟蓋長川陳卒被隰坰謝靈運擬魏太子鄴中集應瑒詩曰官度廁一卒烏林預艱阻賈誼過秦篇曰率罷散之卒將數百之衆轉而攻秦斬木為兵揭竿為旗又曰信臣精卒陳利兵而誰何顏延年楊給事誄曰立于將卒之間以輯華裔之衆騎釋名曰騎歧也兩腳歧別也史記曰韓信伐趙未至井陘選輕騎二千人人持一赤幟從間道而望趙軍又曰今上為膠東王時韓嫣與上學書相愛及上為太子愈益親嫣善騎射上即位欲事伐胸奴而嫣先習胡兵以故益尊貴漢書曰霍去病年十八為侍中善騎射又曰趙充國字公孫隴西上邽人也始為騎士以六郡良家子服虔曰金城隴西天水安定北地上郡也善騎射對補羽林後漢書曰景丹從擊王郎將倪宏等於南蠻郎兵迎戰漢軍追却續漢書曰甫蠻賊迎擊上營得上鼓車輜重數乘丹等縱突騎擊大破之追奔十餘里死傷者從橫丹還世祖謂曰吾聞突騎天下精兵今乃見其戰樂可言耶遂從征河北又曰呂布為曹操所敗布見操曰今日已往天下定矣操曰何以言之布曰明公之所患不過於布今已服矣令布將騎明公將步天下不足定也東觀漢記曰鄧禹攻赤眉輒不利吏士散已盡禹獨與二十四騎還詣雒陽又曰假熲移於徒中為并州刺史徵還京師馬騎五萬餘匹又曰馬魴將緹騎宿玄武門張璠漢記曰蔡雍上書靈帝曰幽州突騎冀州強弩天下精兵也魏志曰曹休字文烈太祖族子太祖指休謂左右曰此吾家千里駒也使與文帝同居止見待如子常從征伐使領虎豹騎又曰太祖哀曹真少孤占養與諸子同使與文帝共止嘗獵為虎所逐顧射應聲而倒太祖壯其勇使將虎騎又曰光和中涼州賊起發幽州突騎三千假公孫瓚都督行軍事討之吳志曰孫堅領豫州刺史遂治兵於魯陽城當進軍討董卓遣長史公仇稱將兵從事還州督軍糧施帳幔於城東門外祖道送稱官屬並會卓遣步騎數萬人逆堅輕騎數十先到堅方行酒談笑勑部典整順行陳無得妄動後騎漸益堅徐罷坐導引入城乃謂左右曰向所以不即起者恐兵相蹈襲諸君不得入耳卓兵見堅士衆甚整不敢攻城乃引還又曰孫策騎士有罪逃入袁術營隱於內廄策指使人就斬之訖詣術謝術曰兵人好叛當共疾之何為謝耶蜀志曰曹公入荊州先主奔江南曹公追之及於當陽之長阪先主棄妻子奔使張飛將二十騎據水斷橋瞋目橫矛曰張益德也可來共決死敵皆無敢近者又曰趙雲字子龍隨先主為先主主騎晉書載記曰符堅伐晉捨大軍于項城以輕騎八千兼道赴之令軍人曰敢言吾至壽春者拔舌而族之宋書曰傅弘之素善騎射高祖至長安弘之於姚泓馳道內緩服戲馬或馳或驟往反二十里中甚有節制羌胡聚觀者數十人並惋驚歎息梁書曰曹景宗謂所親曰我昔在鄉里騎快馬如龍與年少輩數十騎拍弓絃作礕靂聲箭如餓鴟叫平澤逐麞數肋射之後周書曰太祖嘗從數騎於野忽聞簫鼓之音以問從人皆莫之聞也唐書曰貞觀中左右屯營始置飛騎揀材力驍捷善騎射者為之太宗時出遊幸則從馬衣五色袍乘六間駿馬賜猛獸皮韉以摽異之又加階級廩食各有差五代周史曰顯德中世宗車駕至濠州城下戊子親破十八里灘寨在濠州東北淮水之中四面阻水上令甲士數百人跨駝以濟太祖皇帝以騎軍浮水而渡遂破其寨虜其戰艦而回三國典略曰陳韋翽字子羽有志操以孝著稱先尋以為驍騎將軍領朱衣直閣驍騎之職舊領營兵梁世已來其任逾重翽素有名望每大事恆令俠侍左右時人榮之號曰俠御將軍禰衡別傳曰衡著官布單衣以杖捶地數罵責操及其先祖無所不至操乃勑外具上廄驎馬三匹并騎二人須臾外給啓馬辨曹公謂孔文舉曰禰衡小人無狀乃爾孤今殺之無異鼠雀耳顧此子有異才遠近聞之孤今殺之將謂孤不能容劉景升天性險急不能容受此子必當殺之乃以衡置馬上兩騎挾送至南陽也會稽典録曰朱育謂鍾離曰大皇帝以神武之姿欲得五千騎乃可有圖今騎無從出而懷進取之志將何計收曰大皇以中國多騎欲得騎以當之吳神鋒弩射三四里洞三四馬騎敢近之乎鄴中記曰石虎皇后出女騎千人皆著五綵靴鄴城故事記涼馬臺一名閲馬臺亦名戲馬臺案鄴中記云趙王虎建武六年造涼馬臺在城西漳水之南約坎為臺虎常於此臺簡練騎卒虎牙宿衛號雲騰黑矟騎五千人每月朔晦閲馬於此臺乃於漳水之南張幟鳴鼓列騎星羅虎乃登臺射髇箭一發五千騎一時奔走從漳水之南齊走集於臺下隊督已下皆班賚虎又射一箭其五千騎又齊走於漳水之北其五千流散攢促若數萬人騎皆以漆矟從事故以黑矟為號季龍又常以女騎一千人為鹵簿皆著紫綸巾熟錦袴金銀鏤帶五文織成靴遊于臺上六韜曰選士之法取年四十以下長七尺五寸以上材輕捷疾力過倫等能馳彀騎射前後左右周旋進退超越溝塹馳山陵險阻絶大澤越強敵亂大衆者名曰武騎之士不可不厚也三略曰欲知敵形色可勝之符先以二十八騎感之騎象二十八宿也淮南子曰夫善游者溺善騎者墮各以其所好反自為禍禍害也是故好事者未嘗不中中傷也好為情欲之事者未嘗不自傷也爭利者未嘗不窮也通典曰孫臏云用騎有十利一曰迎敵始至二曰乘敵虛背三曰追散亂擊四曰迎敵前擊後使敵奔走五曰遮其糧食絶其軍道六曰敗其津關發其橋梁七曰掩其不備卒擊其未振八曰攻其靜怠出其不意九曰燒其積聚市里十曰掠其田野係纍其子弟此十者騎戰利也夫騎者能離能散能集百里為期千里而赴出入無間故名離合之兵也
