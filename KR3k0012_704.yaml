body:
  text: 服用部五塵尾晉陽秋曰石勒偽事王浚遺勒塵尾勒為不執置之於壁朝拜之云見王公所賜如見公也晉書曰王衍夷甫盛才美貌明悟若神每捉玉柄塵尾與手同色又曰王導妻曹氏妒導令別修館以安衆妾曹氏知之導將恐有他喧辱命駕恐遲以所執塵尾柄驅牛而進司徒蔡謨聞之謂導曰朝廷欲加公九錫導不之覺但謙退而已謨曰不聞餘物唯有短轅犢車長柄塵尾導大怒宋書曰張融字思光弱冠有名道士同郡陸修靜以白鷺羽塵尾扇遺之曰此既異物以奉異人又融臨卒遺令建白旐無旒不設祭令人捉塵尾登復魂又曰張敷好讀玄言兼屬文論弱冠初父邵使與高士南陽宗少文談繫象往復數番少文欲屈握塵尾歎曰吾道東矣於是名價日重齊書曰周顒音辭辨麗長於佛理著三宗論言空假義西涼州智林道人遺顒書深相贊美言捉塵尾來四十餘載頗見宗録唯此塗白黑無一人得者非意此音猥來入耳見重如此梁書曰廬廣有儒術為國子博士於學中講説僕射徐勉以下畢至謝舉造坐屢折廣詞理遒邁廣深歎服仍以所執塵尾贈之以況重席焉陳書曰張譏善講論後主在東宮集宮僚置宴時造玉柄塵尾新成後主親執之曰當今雖復多士如林至於堪捉此者獨張譏耳即手授譏後主嘗幸鍾山開善寺召從臣坐於寺西南松下勑譏講義時索塵尾未至後主勑取松枝手以屬譏曰可代塵尾郭子曰何次道嘗詣王丞相以塵尾敲床呼何共坐曰此君子坐也又曰孫安國往殷中軍許共語左右進食冷而復暖者數四彼我奮擲塵尾悉墮落滿飯中賓主遂至暮忘餐也又曰王長史病已篤寢燈下轉塵尾而視之歎曰如此人曾不得滿四十及亡劉尹臨殯以犀柄塵尾置柩中因慟哭世説曰王丞相常懸一塵尾著帳中及殷中軍來乃取之曰今當遺汝又曰客問樂令旨不至者樂亦不復剖析文句以塵尾柄敲機曰至不客曰至樂因又舉塵尾曰若至者郍得去客乃悟服語林曰康法暢造庾公捉塵尾至彼公曰塵尾過麗何以得在答曰廉者不求貪者不與故得在耳華陽國志曰宜君山出塵尾王道塵尾銘曰誰謂質卑御於君子拂穢靜暑虛心以俟許詢白塵尾銘曰蔚蔚秀格偉偉奇姿荏弱軟潤雲散雪霏君子運之探玄理微如意齊書曰蒼梧欲害高帝帝嘗以書案下安鼻為楯以鐵為書鎮如意甚大以備不虞欲以代仗蕭子顯齊書曰明僧紹字丞烈平原聶人也隱長廣郡勞山詔徵為正員郎稱疾不就賜竹根如意笋籜冠隱者以為榮梁書曰席闡文武帝將起兵闡文勸蕭頴胄同焉仍遣客田祖恭私報帝并獻銀裝刀帝報以金如意又曰韋睿拒魏於邵陽睿乘素木輿執白角如意以麾軍一日數合又曰殷鈞字季和梁武與鈞父睿有舊以女永興公主妻鈞公主驕淫險虐鈞形貌短小為主所憎每被召入先滿壁為殷睿字鈞輒流涕以出主命婢束而反之鈞不勝怒言於帝帝以犀如意擊主碎於背然猶恨鈞自侍中出為王府咨議又曰李膺字公胤有才辨西昌侯藻為益州以為主簿使至都武帝悅之謂曰今李膺何如膺對曰今勝昔問其故對曰昔事桓靈之主今逢堯舜之君帝嘉其對以如意擊席者久之乃以為益州別駕後魏書曰高祖孝文欲試諸子志尚乃大陳寶物任其所取京兆王愈等競取寶玩宣武皇帝惟取骨如意而已帝大奇之又曰廣陵王羽為太子太保録尚書事孝文將南討遣羽持節安撫六鎮發其突騎夷夏寧悅還領廷尉卿及車駕發羽與太尉元丕留守帝賜羽如意以表心焉拾遺記曰吳主潘夫人之父坐法夫人輸入織室夫人容態少儔為江東絶色同幽者百餘人謂夫人為神女敬而遠之有司聞於吳主使圖其容貌夫人憂戚不食減瘦改形工人寫其真狀以進吳主吳主見圖而嘉之以虎魄如意撫案辟折嗟曰此神女也遂納之又曰孫和悅鄧夫人常置膝上和月下舞火精如意誤傷夫人頰胡綜別傳曰時有掘得銅匣長二尺七寸以琉璃為蓋布雲母於其上開之得白玉如意所執處皆刻螭虎文蠅蟬等形時人莫有識者太常以問綜綜答曰昔秦始皇帝東遊以金陵有天子氣乃改名掘鑿江湖平諸山南處處輒理寶物以當王氣其事見於秦記石季倫本事曰崇有珊瑚如意長三尺二寸世説曰殷荊州有所識作賦示束晢慢戲之殷甚以為有才語王恭適見新文甚可觀便於手巾函出之王既讀殷笑不自勝王看竟既不笑亦不言好惡但以如意點之而已殷帳然自失又曰謝萬北征而常嘯詠自高未嘗撫慰衆士萬兄安謂萬曰汝為元帥宜數呼諸將宴以悅其心萬從之於是召集諸將帥無所説直以如意指四坐曰諸軍皆是徑卒諸將甚恨之語林曰石崇與王愷爭豪晉武帝愷之甥也每助愷以珊瑚高二尺許愷以示之崇以鐵如意擊之應手瓦碎愷聲色俱厲崇曰此不足恨乃命取珊瑚有三尺光彩溢目者六十七校愷悵然自失異苑曰太原郭澄之義熙初諸葛長民欲取為輔國咨議澄之不樂後為南康太守盧循反自廣州長民以其謀先告因騁私惡收澄之以付延尉將致大辟夜夢見一神人以烏角如意與之既覺便在其頭側可長尺餘形制甚陋澄之遂得無它後從入關齎以自隨忽失所在劉義慶啓事曰恩旨賜臣犀鏤竹節如意目所未覩拂晉書曰武帝泰康四年有司奏先帝舊物麻繩為細拂以明儉約宋書曰孝武大明中壞高祖所居陰壁於其處起玉燭殿與群臣觀之床頭有土障壁上挂葛燈籠麻繩拂侍中袁覬盛稱上儉素之德孝武曰田舍翁得此已為過矣齊書曰陳顯達子休尚為郢府主簿過九江拜別顯達謂曰凡奢侈者鮮有不敗塵尾繩拂是王謝家許汝不須捉此即取於前燒除之東宮舊事曰太子有白眊拂二秦嘉婦與嘉書曰今奉旄牛尾拂一枚可拂塵垢唾壺晉書曰王敦為荊州牧既專外任有問鼎之志引劉隗刀協為腹心及隗用事頗間王氏敦怒疏陳之自爾憤憤不平安每酒後詠魏武帝樂府歌曰老驥伏櫪志在千里列士暮年壯心不已以鐵如意擊唾壺為節壺邊盡鈌梁書曰天監中中天笁國奉表獻琉璃唾壺修復山陵故事曰皇后玄宮有白瓦唾壺五枚東宮舊事曰太子納妃有漆書銀帶唾壺一魏武帝上雜物疏曰御雜物用有純金唾壺一枚漆圓油唾壺四枚貴人有純銀參帶唾壺三十枚王子年拾遺記曰魏文帝納薛靈藝靈藝別父母歔欷纍日淚下沾衣至升車就路之時玉唾壺承淚壺即如紅色及至京師壺之淚如凝血矣又曰吳主潘夫人帝嘗與夫人遊昭宣之臺恣意幸適既盡酣醉唾於玉壺中使侍婢寫於臺下西京雜記曰廣川王發魏襄王冢得玉唾壺一枚交州雜記事曰太康四年臨邑王范熊獻紫水精唾壺一口青白水精唾壺各二口續齊諧記曰武昌小吏吳龕渡水得五色石夜化為女子稱是龕婦至家見婦翁被白羅袍隱漆几銅唾壺狀如天府自稱河泊馬融遺令曰冢中不得下銅唾壺賀循葬禮曰藏物今用瓦唾壺一枚蔡雍表曰詔賜薰爐唾壺朝廷之恩前後重疊父母於子無以加此孔臧與子琳書曰侍中安國群臣近見崇禮不供褻器猶復掌御唾壺朝廷之士莫不榮之書臺東宮舊事曰皇太子初拜有柏書臺又曰太子妃有漆書臺香爐漢官典曰尚書郎給女史二人潔衣服執香爐燒薰從入臺中給使護衣服梁書曰侯景即位景床東邊香爐無故墮地景呼東西南北皆謂為廂景曰此東廂香爐那忽下地議者以為湘東軍下之徵南史曰陶弘景字通明丹陽株陵人也父貞孝昌令初弘景母郝氏夢天人手執香爐來至其所已而有娠又曰庾仲文貪賄何尚之奏選令史龍向臣説亦歎其受納之過言實得嫁女具銅爐四人舉乃勝細葛斗帳等物不可稱數齊書曰江泌為南康王子琳侍讀建武中明帝召諸王後泌憂念子琳訪志公道人問其禍福志公覆香爐灰示之曰都盡無餘後子琳被害東宮舊事曰皇太子初拜有銅博山香爐一枚晉東宮舊事曰泰元中皇太子納妃王氏有銀塗博山連盤三斗香爐一西京雜記曰長安巧工丁諼作臥褥香爐一名被中香爐為機環轉四周而爐體常平可置之褥被故取被褥以為名又作九層博山香爐鏤以奇禽怪獸魏武上雜物疏曰御物三十種有純金香爐一枚貴人公主有純銀香爐四枚襄陽記曰劉和季性愛香上廁置香爐主簿張坦曰人名公作俗人真不虛也和季曰荀令君至人家坐處三日香君何惡我愛好也鄴中記曰石虎冬月為復帳四角安純金銀鑿鏤香爐徐先生南嶽記曰衡山石室中有几及香爐盧諶祭法曰香爐四時祠坐側皆置也徐爰家儀曰婚迎車前用銅香爐二集異記曰吳郡吳泰能筮會稽盧氏失博山香爐使泰筮之泰曰此物質雖為金其象實山有樹非林有孔非泉閻闔風至時發青煙此香爐也語其主處求即得之古詩曰四坐且莫喧願聽歌一言請説銅爐器崔嵬象南山上以植松柏下根據銅盤雕文各異類離婁自相連末火燃其中青煙揚其間順風入君懷四坐莫不歎香風難久居空令蕙草殘梁昭明太子銅博士香爐賦曰稟至精之純質産靈嶽之幽深經般倕之妙指運公輸之巧心有蕙帶而巖隱亦霓裳而升仙寫嵩山之巃嵸象鄧林之阡眠
