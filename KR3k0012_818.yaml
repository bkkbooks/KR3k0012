body:
  text: 布帛部四絹廣雅曰繁繐鮮文縠絹也說文曰絹似霜釋名曰絹䋗也其絲䋗厚而疏也東觀漢記曰南陽太守杜謂坐遣客為弟報仇被徵會病卒喪無所歸詔使持喪郡國邸賻絹絹千匹謝承後漢書曰陳留夏馥避黨事遁跡黑山弟靖載絹往餉之於深陽縣客舍見馥顏色衰毀不復識聞其聲乃覺之華嶠後漢書曰李𠐶等大戰弘農百官士卒死者不可勝數董承密招白波帥李樂等率衆來共擊𠐶等大破之乘輿乃得進承夜潛過曰先具舟船為應帝步出營臨河岸高不得下時中官伏德扶中宮一手持十匹絹乃取德絹連續挽而下餘人匍匐岸側或自投死亡又曰陳實在鄉閭平心率物有盜夜入其室止於梁上實見呼命子孫訓之曰不善之人未必本不慈習與性成如梁上君子是也盜驚自投地實徐譬之曰視君狀貌不似惡人宜深克己反善然當由貧今遺絹二匹自是一縣無復盜竊魏略曰文帝在東宮嘗從曹洪貸絹百匹洪不及洪犯法自分必死後遂得原魏志曰趙儼為朗陵長時袁紹舉兵南侵遣招誘豫州諸郡多受其命唯陽安郡不動而都尉李通急録戶調儼見通曰方今天下未集諸郡並叛懷附者復收其綿絹小人樂亂能無遺恨且遠近多虞不可不詳也通曰紹與大軍相持甚急左右郡縣皆叛乃爾若綿絹不調送觀聽者必謂我顧望有所須待也儼曰誠亦如君慮然當權其輕重小緩調當為君釋此患乃書與荀彧又曰孫禮為楊州刺史吳大將全琮帥數萬衆來侵寇時州兵在者無幾禮躬勤禦之戰於芍陂禮犯陷白刃馬被數創手秉桴鼓奮不顧身賊衆乃退詔書慰勞賜絹七百匹魏略曰鮮卑素利等數來多以牛馬遺田豫豫輒送官胡以為所豫物顯露不如持金乃密懷金三十斤謂豫曰願辟左右我物有所遺豫從之胡因跪曰我見公貧故前後遺公牛馬公輒送官今密以此上公可以為家資豫張袖受之答其厚意胡去後悉皆付外具以狀聞於是詔褒之曰昔魏絳開懷以納戎今卿舉袖以受狄朕甚嘉焉乃即賜絹五百匹豫得賜分以其半藏小府後胡復來以半與之又曰田豫罷官歸居魏縣會汝南遣健步詣征北感豫宿恩過拜之豫為殺雞炊黍送詣陌頭謂之曰罷老苦汝來過無能有益若何健步愍其貧羸涕流而去還為故吏民說之汝南為具資絹數千匹遣人餉豫豫一不受魏志曰景初中賜倭士王白絹五十匹魏文帝詔曰今與孫驃騎和通商旅當日月而至而百賈偷利喜賤其物平價又與其絹故官逆為平準耳官豈少比物輩耶吳志曰丹陽太守李衡每欲治家妻輒止之衡密遣客十人於武陵龍陽洲上作宅種甘千株臨死勑兒曰汝母惡吾治家故窮如是然吾州里有千頭木奴不責汝衣食歲止一匹絹亦足用耳衡亡後二十餘日以問母曰此當是種甘也汝家失十戶客七八年必汝父遣為宅汝父嘗稱太史公言江陵千樹橘當封君吾答人患無德貧方好耳用此何為吳末衡甘成歲得絹數千匹家道殷足吳録曰袁博為太守黃君舉為孝廉為業令以俸祿市縑絹餉黃君家黃氏負鄉里債債家到門輒應云待葉令家餉王隱晉書曰王尼見太傅越曰公負尼物越答初不識此事尼曰昔楚人失布謂令尹盜者以令尹執政不能奉禮率法至使盜賊公行是與自盜無異也尼舍資財軍寇輒略公為宰輔未能禁賊令尼窮困是亦明公負物也越意解大笑與尼絹五十匹王隱晉書曰劉實為伐蜀人作爭功得千匹絹又曰蘇節從兄韶亡後著青黃絹單衣來與節言虞預晉書曰武帝論平吳功唯羊𧙖王濬張華三人各賜絹万匹其餘莫得比此干寶晉紀曰華談依周馥及琅邪王遣甘卓攻馥談先於卓有恩卓募人入城求談入者至舍問華侯在不吾甘楊威使也談曰不知華侯所在抽絹二匹授之使人還以告卓曰是華侯也晉陽秋曰有司奏依舊調編絹武帝不許又曰荊州刺史庾冰中子襲嘗貸官曹絹十匹冰怒撻之市絹還官又曰胡威字伯虎父質之為荊州也威自京都省之停中十餘日告歸臨辭質賜其絹一匹為道路糧威跪曰大人清高不審於何得此絹質曰是吾俸之餘故以與汝耳又曰桓溫入蜀聞有善星人招致之獨執其手於星下問國祚修短星人曰太微紫微文昌三宮氣候決無憂虞五十年外不論耳溫不悅送絹一匹錢五千與之晉中興書曰翟楊字道淵尋陽人太守干寶遣船餉之勑吏曰翟公廉讓卿致書訖便委船還楊無人送致乃更貨易絹物因寄還寶宋書曰沈慶之年八十夢有人以兩匹絹與之謂曰此絹足度寤而謂人曰老子今年不免矣兩匹八十尺也足度無盈餘矣是歲果卒又曰李安人行南徐州事參軍王回素為安人所親盜絹二匹安人流涕謂曰我與卿契闊備嘗今日犯王法乃卿負我也於軍門斬之又曰孝武時齊庫上絹年調巨万匹綿亦稱此期嚴限峻人間買絹一匹至二三千綿一兩三四百貧者賣妻子甚者或自縊死沈懷文具陳人困由是綿絹薄有所減又曰阮佃夫佞幸專權有人餉絹二百匹嫌少不答書齊書曰豫章王嶷拜陵還過延陵季子廟觀沸井有水牛突部伍直兵執牛推問嶷不許取絹一匹撫繫牛角放歸其家又曰蕭赤斧遷給事中太子詹事卒於家貧無絹衾衣梁書曰吉士瞻少時嘗於南蠻國中擲磚無褌褰露為儕輩所侮及平魯休烈軍得絹三萬匹乃作百褌於外並賜軍士不以入室又曰劉孝綽為吏部郎坐受人絹一束為餉者所訟左遷信威臨賀王長史又曰任昉為義興太守及被代登舟止有絹七匹米五石至都無衣鎮軍將軍沈約遺裙衫迎之又曰費昶善為樂府嘗作鼓吹曲武帝重之勑曰才意新拔有足嘉異昔邯鄲慱物卞蘭巧辭束帛之賜實惟勸善可賜絹十匹又曰周石珍建康之廨隸也世以販絹為業又曰傅昭為臨海太守縣令嘗餉栗置絹于簿下昭笑而還之又曰裴邃為北梁秦二州刺史復開創屯田數千頃倉廩盈實省息邊運人吏獲安乃相率餉絹千餘匹邃從曰汝等不應爾吾又不可逆汝納其二匹而已後魏書曰李崇在官和厚明於決斷然性在財賄販肆聚斂上令王公已下從者百餘人皆令任負布絹即以賜之多者過二百匹少者百餘唯長樂公兩手持絹二十匹而出亦不異衆而當世稱其廉儉尚書令任城王澄疾不起賜絹百匹崇與章武王融以所負過多顛仆於地崇乃復腰融至損腳時人為之語曰陳留章武傷腰折股貪人敗類穢我明主又曰爾朱榮之奉莊帝召百官悉至河陰素聞元順數諫諍惜其諒直謂朱端曰可語元僕射但在省不須來順不達其旨聞害衣冠遂便出走馬為鮮于康奴所害家徒四壁無物斂尸令史王才達裂裳覆之帝勑侍中元祉曰宗室喪亡非一不可周贍元僕射清苦之節死乃益彰特贈絹百匹又曰楊津除歧州刺史巨細躬親孜孜不倦有武功人賞絹三匹去城十里為賊所劫時有使者馳馹而至被劫人因以告之使者到州以狀白津津乃下教云有人著某色衣乘某馬在城東十里被殺不知姓名若有家人可速收視有一老母行哭而出云是己子於是遣騎追收并絹具獲自是闔境畏服又曰楊津為華州刺史先是受調絹度尺特長在事因緣共相進退百姓苦之津乃令依公尺其輸物尤好者賜以杯酒而出其所輸少劣者為受之但無酒以示其恥於是競相勸勵官調更勝又曰趙柔有人遺柔鏵數百枚者柔與子善明鬻之市有人從柔買索絹二十匹有商人知其賤與柔三十匹善明欲取之柔曰與人交易一言便定豈可以利動心遂與之搢紳之流聞而敬服又曰陸馥為相州刺史發姦擲伏事無不驗百姓以為神明無敢劫盜者在州七年家至貧約徵為散騎常侍百姓乞留馥千餘人獻文不許謂群臣曰馥之著政雖古人何以加之賜絹五百匹又曰李元忠去任歸李魚川孝莊時盜賊蜂起清河有五百人西戎還經南趙郡以路梗共投元忠奉絹千餘匹元忠唯受一匹殺五牛以食之遣奴為導曰若逢賊但道李元忠遣如言賊皆舍避又曰韓麒麟為齊州刺史立性恭慎恆置律令於坐傍臨終之日唯有俸絹數十匹清貧如是又曰陽平王子衍轉徐州刺史至州病重帝勑徐成伯乘傳療疾差成伯還帝曰卿定名醫賚絹三千匹成伯辭請受一千帝曰詩云人之云亡邦國殄瘁以是而言豈惟三千匹乎又曰辛穆再轉汝陽太守遇水潦人飢上表請輕租賦帝從之遂勑汝陽一郡聽以小絹為調又曰高允卒詔給絹一千匹布二千匹綿五百斤錦五十匹雜綵百匹穀千斛以助喪用也又曰王靈字羅漢為南兗州刺史取官絹因染遂有割易御史糾劾會赦免又曰宋鴻貴為定州北平府參軍送戍兵於荊坐取兵絹四百匹兵欲告之乃斬兵十人又曰公孫軌為武牢鎮將初太武將北征發驢以運糧使軌部調雍州軌令驢主皆加絹一匹乃與受之百姓語曰驢無強弱負絹自壯衆共嗤之北齊書曰崔暹遷尚書左僕射儀同三司時調絹以七尺為丈暹言之乃依舊焉又曰孝昭常賜百官射王晞中的當得絹為不書箭有司不與晞陶陶然曰我今可謂武有餘文不足矣隋書曰庫狄士文嘗入朝遇上置酒高會賜公卿入左藏任取多少人皆極重士文獨口銜絹一匹兩手各持一匹上問其故士文曰臣口手俱滿餘無所須上異之別加賞物勞而遣之唐書曰侍御史馬周上疏云往者貞觀之初一匹絹讒得一斗米而天下怗然百姓知陛下甚憂憐之故人人自安曾無怨讟自五六年來頻歲豐稔一匹絹得粟十餘石而百姓皆以為陛下不憂憐之咸有怨言又今所營為樂頗多不急之務故也又曰太宗初即位風聞諸曹案典受賂乃遣左右試以財物遺之有司聞令史受餽絹一匹上將殺之裴短進諫曰此人受賂誠合重誅但陛下以物試人則行極法所謂固入其罪恐非導德齊禮之義上善之又曰高宗朝詔自今已後天下嫁女受財三品已上之家不得過絹三百匹四品不過二百匹六品七品不得過百匹皆充所嫁女之資裝等用其夫家不得受陪門之財又曰文宗大和六年賜故衛國公李靖五代孫前鳳翔司録參軍晨芳絹二百匹衣笏一副并還先奏高祖太宗書詔及官告衣物等後唐史曰賜宰相李愚絹百匹錢百緡鋪陳物一十三什時愚病上令中使宣問愚所居寢室蕭然四壁臥弊氈而已中使具言其事上曰嘻宰相月俸錢幾何而委頓如此故有是賜四王起事曰張方移惠帝於長安兵人入殿取物特調御絹二尺幅自魏晉之積將百餘萬匹三日取之尚不缺角四王起事曰惠帝於鄴與成都王還洛陽出城倉卒上下無持資食之調道中有驅羊二百餘口者便勒將至洛得以為糧至洛盧志啓以右藏絹倍還羊主搜神記曰永嘉中有天笁胡人能取絹與人各執一頭剪斷之已而取兩假合持之則復還連綿可練無異故體也又曰吳先主病遣人於門觀不祥巫啓見一鬼著絹巾似是大臣將相其夜先主夢見魯肅來入衣巾如之述異記曰清河崔基寓居青州朱氏女姿容絶倫崔頃懷招賢約女為妾後三更中忽聞扣門外崔披衣出迎女雨淚嗚咽云適得暴疾喪亡欣愛永奪悲不自勝女於懷中抽兩匹絹與崔曰近自織此絹欲為君作褌衫未得裁縫今以贈離崔以錦八尺答之女取錦曰從此絶矣言畢豁然而滅至旦告其家女父曰女昨夜忽心痛夜亡崔曰君家絹帛無零失耶答云此女舊織餘兩匹絹在箱中女亡之始婦出絹欲裁為送終衣轉眄失之崔因此具說事狀先賢行狀曰范郃字孝悌少時會省外家逢掠者驅其牛取衣物去郃還車知賊不得席後三匹絹乃追呼令取之賊知長者悉還所取而辭謝焉三輔決録曰平陵士孫奮資至一億七十萬富聞京師而性儉吝從子瑞辟梁冀掾奮送絹五匹食以乾魚鄴中記云石虎以辰曰臘子曰祖祖於殿庭立五仙人高數丈五綵幢蓋大會群臣於太武殿上祖曰探三探乃有得絹百匹者有得數十匹者有得土者虎輒大笑以為樂孔舒元在窮記曰太安二年六月賊遂來入門時家見有絹布三千餘匹及衣被器物皆令婢使輦出著庭中恣其所取魏武帝令曰今清時但當盡忠於國效力王事雖私結好於他人用千匹絹萬石穀猶無所益又曰東曹掾田疇言前以無功橫被封賞之賜以實自歸教從所執昨到下車見絹三千匹穀五千斛驚愕怪懼未敢自寧乞還藏府以為軍儲世語曰王經字彥律初為江夏太守大將軍曹爽附絹二十匹令交布於吳經不發書棄官歸母問歸狀經以實對母以經典兵馬而擅去對送吏杖經五十爽聞不復罪經世說曰范宣年八歲後園挑葉誤傷指大啼人問痛耶答曰非為痛也但身體髮膚不敢毀傷是以啼耳宣潔行廉約韓豫章遺絹百匹終不肯受後韓與范同車就車裂二丈韓云寧可使婦無裩也范笑而受之孝子傳曰董永父終貧不遂葬以身質錢一萬既葬就後逢一女子求與永為妻云能織絹永詣主人主人令織一旬三百匹債足女辭去曰我天之織女也帝見君孝使我共償耳因遂不見事具孝感門
