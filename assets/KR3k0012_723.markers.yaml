  - {type: variant, offset: 3240, length: 1, content: 玄, SBCK: 許愼云以石刺病也東山經髙氏之山多針石郭璞云可以爲砭針春秋羙􅐄不如惡石服子愼注云石砭石也季丗無復佳石故以鐵代也後魏書曰王顯字丗榮陽}
