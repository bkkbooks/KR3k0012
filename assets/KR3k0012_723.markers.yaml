  - {type: variant, offset: 3238, length: 1, content: 汪, SBCK: 雲疾召醫徐文伯視之文伯曰緩之一月乃復欲速即時愈正恐二年不復可救雲曰朝聞道夕死可矣而况二年文伯乃下火而壯焉重衣以覆之有頃許汗流於此即起二年果卒又曰王僧孺工屬文善楷􅀠多識古事侍郎金元起欲工素問訪以砭石僧孺荅曰古人當以石爲針必不用鐵說文有此砭}
