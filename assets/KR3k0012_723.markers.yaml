  - {type: variant, offset: 3673, length: 2, content: 嘗夜, SBCK: 與術士同合九轉金丹成顯祖置之玉匣曰我貪人間樂不能飛上天待我臨死方可服之後周書曰姚僧坦字法衛吴興武康人也父菩提梁高平令甞嬰疾歴年乃留心醫藥梁武帝性又好之毎召菩提討論方術言多㑹意由是頗禮之僧坦㓜通洽居䘮盡禮年二十四即傳家業梁武帝召入禁中面加討試僧坦酬對無滯梁武甚竒之時武陵王所生􅁑脩華􅀫患積時方術莫効帝令僧坦視之僧坦還說其狀武帝歎曰卿用意綿宻乃至於此以此候疾何疾可逃朕毎留情頗識治體今聞卿說益開人意十一年帝因發􅀬欲服大黄僧坦曰大黄乃是快藥然至尊年髙不冝輕用帝弗從遂至危篤梁元帝甞}
  - {type: page-break, offset: 3673, content: '', id: KR3k0012_SBCK_723-6a}
