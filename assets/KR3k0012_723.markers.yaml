  - {type: variant, offset: 3695, length: 12, content: 患腰痛死為鬼痛猶難忍請療, SBCK: 人也祖道㓜甞以母疾覽醫方因而究極丗號名醫誡其諸子曰爲人子者甞膳視藥不知方術豈謂孝乎由是丗相傳授仕梁官至貟外散􅀐侍郎父景武竟陵王諮議叅軍智藏少以醫術自逹仕陳爲散􅀐常侍及陳滅髙祖以爲貟外散􅀐侍郎使詣楊州㑹􅁗孝王俊有疾上馳召}
