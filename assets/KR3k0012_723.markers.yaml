  - {type: variant, offset: 979, length: 6, content: 顒先識獨覺言, WYG: 又愈王晏問之曰三病不同而皆用死人枕而俱差何也答曰尸注者鬼氣伏而未起故令人沉滯得死人枕促之魂氣飛越不得復附體故尸注可差石蚘者久蚘也醫療既僻蚘蠱轉堅世間藥不能遣所以須鬼物療之然後可散故令煮死人枕也夫邪入肝故使眼痛而見魍魎應須邪物有鈎之故用死人枕也氣因枕去故復埋於塜間也又春月出南籬門戱聞草屋中有呻吟聲嗣伯云此病甚重更日不療必死乃往視之見一老姥稱體痛而處處有􅗼音敢黒}
