  - {type: variant, offset: 3242, length: 0, content: '', WYG: 人也頗叅士流雖以醫術自達而明敏有决㫁才用初聞昭襄后之懐世宗也夢為日所逐化龍而遶后寤而驚悸遂成心疾勑召諸醫診脈徐謇云是㣲風入藏宜進湯藥顯云案三部脈非有心疾将是懐孕生男之象後果如顯言補御史常在御營進藥出入禁内世宗詔顯撰藥方三十卷頒布天下又曰徐謇字成伯丹陽人也與兄文伯皆善醫藥謇性秘忌承奉不得其意雖貴為王公不為措療魏孝文遷洛除中散大夫子雄亦以醫術稱又曰裴宣患篤世宗遣太醫令馳驛就診并賜御藥宣素明隂陽之書自始患便知不起因自剋亡日果如其言又曰高允㣲有不懌猶不寐卧呼醫請藥出入行止吟咏如常高祖文明太后聞而遣醫李循往脈視之吿以無恙循入宻陳允榮衛有異懼其不久於是遣使備賜御膳􅈿羞自酒米至於鹽醢百有餘品皆盡時味及牀帳衣服茵被几杖羅列於庭王府往還慰問相屬允喜形於色語人曰天恩以我篤疾大有所賚知非具瞻容矣表謝而已不有他慮於是數日夜中卒家人莫覺北齊書曰張子信少以醫術知名隠於白鹿山時逰京師甚為魏収崔季舒所知嘗以詩酬贈大寧中徵為尚藥典御嵗餘謝病歸又曰馬嗣明河内野王人少明醫術診脈預知生死邢劭子寳十七八苦傷寒嗣明診其脈吿楊愔曰此子今病不療自愈然不踰年必死覺之少晚不可為也數日兩公待宴酒酣顯祖曰子才兒我欲以近郡處之愔曰年少未可劭出愔以嗣明言奏乃止寳未朞而卒又楊令患背發腫嗣明以麄理色石大如鵝卵烈火焼令黄赤投醋中使屑落盡暴乾𢷬篩和傅之立愈嗣明從駕之晉陽至遼陽見牓云有人家女病乃抵其家問其由云曽得麥穗見赤物長三寸似蛇入指中因驚倒手臂腫重月餘日漸及半身疼痛不可忍呻吟晝夜不絶嗣明曰毒蛇為鶴所啄遣血於此犯而得之帥即受方令服十餘劑以湯散補之明年還鄴女疾都愈載鏹而歸嗣明恃其伎視徐之才崔鸞叔蔑如也隋開皇中卒又曰李元忠趙郡栢人人也代為著姓元忠倜儻博學通隂陽術數初以母老多患乃専心醫藥研習積年遂善於方技}
