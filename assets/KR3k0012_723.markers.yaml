  - {type: variant, offset: 1537, length: 1129, content: 先啼日以羸困問他他曰其母懷軀陽氣內養乳中虛冷兒得母寒故令不時愈他與四物紫苑九十日即除又至軍吏梅平得病除名還家家居廣陵未至二百里止親人舍有須他偶至主人許主人令他視平他謂平曰君早見我不應至此今疾已結促去可得與家人相見五日平應時歸果如他言又他行道見一人病噎塞嗜食而不得下家人車載欲往就醫他聞其呻吟駐車往視語之曰向來道傍有賣餅家䔉齏大酢從取三升飲之病自當羗即如他言立吐虵一條遂懸之車邊欲造他他尚未還他家小兒戲門前迎見自相謂曰客車邊有物必是逢我公也疾者前入唑見他壁北懸此虵輩以十數又有一郡守病他以為其人盛怒則羗乃多受其貨而不加功無何棄去留書罵之守果大怒令人追殺守子知之屬使勿逐守瞋恚吐黑血數升而愈又有一士大夫患體中不快詣他他云君病至深當破腹取之然君壽亦不過十年病不能殺君君忍痛十歲壽俱當盡不足故自刳裂也士大夫曰余不耐痛必請治之他遂下手所患尋羗十年竟死又廣陵太守陳登得胸中煩滿面赤不食他診脈曰府君胃中有蟲數升欲成肉疽食腥物所為也即作湯二升先服一升斯須盡服之食頃吐出三升許蟲赤頭皆動半身猶是生魚膾也所苦便愈他曰此病後三朞當發遇良醫乃可濟依期果發時他不在遂死又有婦人長病經年世謂為寒熱注病冬月中他令唑石槽中平且用冷水汲灌云當滿百始七十灌冷戰欲死他令滿數至八十灌熱氣乃蒸出囂囂高二三尺滿百灌他乃使然火溫床厚覆衣良久汗洽出著粉燥便愈又有人病腹中攻痛十餘日鬢眉隋落他曰是脾半腐可刳腹治也使飲藥令臥破腹就視脾果半腐壞以刀斷之割去惡肉以膏傅之即羗太祖聞而異之召他常在左右太祖苦頭風每發心亂目眩他針鬲隨手而愈又軍吏李成苦欬晝夜不寐時吐膿血以問他他言君病腸癰欬之所吐非從肺來也與君散兩錢匕已服當吐二升餘膿血訖快自養一月小起好自將愛一年便健十八歲當一小發服此亦復羗若不得此藥故當死復與兩錢散成得五六歲親人有病如成者謂成曰卿今強健我見欲死何忍急去祛舉切藏藥以待不祥先特貸我羗為卿從華他更索成與藥已故到譙從索藥適會值他見收忩忩不忍從求後十八歲病發無藥可療以至死又曰樊阿彭城人少師華他嘗問他求服食法他受以漆葉青黏散子方云服之去三蟲利五藏輕身益氣使人頭不白阿從其言年百餘歲漆葉所在有之青黏生於豊沛彭城及朝歌青黏一名地節一名黃芝主理五藏益精氣本出於迷人入山者見仙人服之以告他他以為佳語阿阿秘之近者人見阿之壽而氣力強盛怪而問之所服食阿因醉亂誤說之人服多驗蜀志曰關羽為流矢貫臂每陰雨常疼痛醫曰矢鏃有在當破臂刮骨去毒乃可除之晉書曰裴頠通博多聞兼明醫術荀勗之修定律度也檢得古尺短世所用四分有餘頠上言宜以改諸度量若是未能悉革可先改太醫權衡此若羗違遂失神農岐伯之正藥物輕重分兩乖互所可傷夭為害尤深古壽考而今短折者未必不由此也卒不能用又曰顏含兄畿咸寧中得疾就醫自療遂死於醫家家人迎喪旐每繞樹而不可解引喪者顛仆稱畿言, WYG: ''}
