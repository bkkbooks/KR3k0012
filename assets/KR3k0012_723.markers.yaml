  - {type: variant, offset: 4044, length: 0, content: '', WYG: 隋書曰許智藏高陽人也祖道㓜嘗以母疾覽醫方因而究極世號名醫誡其諸子曰為人子者嘗膳視藥不知方術豈謂孝乎由是世相傳授仕梁官至員外散騎侍郎父景武竟陵王諮議叅軍智藏少以醫術自達仕陳為散騎常侍及陳㓕高祖以為員外散騎侍郎詣揚州㑹秦孝王俊有疾上馳召之俊夜中夢其亡妃崔氏泣曰本來相迎如許智藏将至其人若到當必相苦為之柰何明夜俊又夢崔氏曰妾得計矣當入靈府中以避之及智藏至為俊診脈曰疾已入心即當發癎不可救也果如言俊數日而薨上竒其妙賫物百叚煬帝即位智藏時致仕于家帝每有所苦輒令中使就詢訪或以輿迎入殿扶登御牀智藏為方奏之用無不効唐書曰甄權許州扶溝人也嘗以母疾與弟立言專醫方得其㫖趣隋開皇初為秘書省正字後稱疾免隋魯州刺史軍狄嶔苦風患手不得引弓諸醫莫能療權謂嶔曰但将弓箭向垜一針可以射矣針其肩偶一穴應時射真觀十七年權年一百三嵗太宗幸其家觀其飲食訪以藥性因授中散大夫賜几杖衣服其年卒撰脈針經方明堂人形圖各一卷弟立言武宣中累遷太常丞御史大夫杜淹患風毒發腫太宗令立言視之既而奏曰從今更十一日午時必死其言果騐時有尼明律年六十餘患心腹鼔脹身體羸瘦已經二年立言診其脈曰腹内有蠱當是誤食髪為之耳因令食雄黄須㬰吐一蛇如人小手指惟無眼燒之猶有髪氣其􅍚乃愈又曰許𦙍宗常州義興人也初仕陳為新蔡王外兵叅軍時栁太后感風不能言名醫療皆不愈脈益沉而噤𦙍宗曰口不可下藥宜以湯氣薰之令藥入腠理周時可差乃造黄耆防風湯數十斛置於床下氣如烟霧其夜便得語武徳初關中多骨蒸病得之必死逓相連染諸醫無能療者裔宗每療無不愈或謂曰公醫術若神何不著書以貽将來𦙍宗曰醫乃意也在人思慮又脈候幽㣲苦其難别意之所解口莫能言自古之名手惟是别脈脈既精别然後識病去病别之於藥料正相當者惟須單用一味直攻彼病藥力既能病即立愈今人不能别脈莫識病源以情臆度多安藥味譬之於獵未知􅇠所多發人馬空地遮圍或兾以一人偶然逢也如此療病不亦踈乎假令一藥偶然當病復共他味相合君臣相制氣勢不行所以難差諒由於此脈之深趣既不可言虛設經方豈加於舊吾思之久矣故不能著述耳年七十餘卒又曰秦鳴鶴為侍醫髙宗苦風眩頭重目不能視武后亦幸災兾行其志至是疾甚召鳴鶴張文仲診之鳴鶴曰風毒上攻若刺頭出少血即愈矣天后自簾中怒曰此可斬也天子頭上豈是刺出血處耶上曰醫之議病理不加罪且吾頭重悶殆不能忍出血未必不佳命刺之鳴鶴刺百㑹及腦户出血上曰吾眼明也言未畢后自簾中頂禮拜謝之曰此天賜我師也躬負繒寶以遣鳴鶴又曰安金藏為太常工人時睿宗為皇嗣或有誣害皇嗣潜有異謀者則天令來俊臣按之左右不勝楚毒皆欲自誣唯金藏大呼謂俊臣曰公既不信金藏言請剖心以明皇嗣不反即引刀自剖其胸五臟並出血流被地氣遂絶則天聞之令舁入中宫遣一人却内五臟入以桑白皮縫合之傅藥經宿乃蘓太平御覽卷七百二十三}
