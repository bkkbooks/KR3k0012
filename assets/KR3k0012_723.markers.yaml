  - {type: variant, offset: 3729, length: 4, content: 為炙四處, SBCK: 俊數日而薨上竒其妙賫物百叚煬帝即位智藏時致仕于家帝毎有所苦輙令中使就詢訪或以轝迎入殿扶登御􅃺智藏爲方奏之用無不効唐書曰甄權許州扶溝人也甞以母疾與弟立言專醫方得其旨趣隋開皇􅀄爲祕書省正字後稱疾免隋魯州刺史庫狄嶔若風患手不得引弓諸醫莫能療權謂之曰欽但將弓箭向垜一針可以射矣針其肩偶一穴應時射貞觀十七年權年一百三歳太宗幸其家視其飲食訪以藥性因授朝散大夫賜几杖衣服其年卒撰脉經針方明堂人形圖各一卷弟立言武德中累遷太常丞御史大夫杜淹患風毒發腫太宗令立言視之旣而奏曰從今更十一日午時必死果如其言時有尼明律年六十餘患心腹皷脹身體羸瘦巳經二年立言􅐷其脉曰腹内有蟲當是誤食髪爲之耳因令服雄黄湏􅁷吐一虵如人手小指唯無眼燒之猶有髮氣其疾乃愈}
