  - {type: variant, offset: 664, length: 312, content: 病哉此其所為不愈也帝善其對年老卒官又曰曹褒遷城門校尉將作大匠時有疾疫褒巡行病徒為致醫藥經理饘粥多蒙濟活東觀漢記曰鄧訓謙恕下士無貴賤見之如舊朋友往來門內視之如子有過如鞭扑之教大醫皮巡從獵上林還暮宿殿門下寒疝病發時訓直事聞巡聲起往問之巡曰得火以熨背訓身至太官門為求火不得乃以口噓其背復呼同廬郎共更噓至朝遂愈鍾離意別傳曰黃讜為會稽太守建武十四年吳大疾疫署意中部尉督郵意乃露車不冠身循行病者門入家至賜與醫藥詣神廟為民禱祭召錄醫師百人合和草藥恐醫小子或不良毒藥齊賊害民命先自吞嘗然後施行其所臨護四千餘人並得差愈後日府君出行災害百姓攀車涕泣曰明郵府君不須出也但得鍾督郵民皆活也何顒別傳曰同郡張仲景總角造顒謂曰君用思精而韻不高後將為良醫卒, SBCK: 故處}
