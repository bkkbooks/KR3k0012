  - {type: variant, offset: 3674, length: 1, content: 夜, WYG: 嬰疾厯年乃留心醫藥梁武帝性又好之毎召菩提討論方術言多㑹意由是頗禮之僧坦㓜通洽居喪盡禮年二十四即傳家業梁武帝召入禁中靣加討試僧坦酬對無滯梁武甚竒之時武陵王所生葛修華宿患積時方術莫効帝令僧坦視之僧坦還説其状武帝嘆曰卿用意綿宻乃至於此以疾候疾何疾可逃朕每留情頗識治體今聞卿説益開人意十一年帝因發熱欲服大黄僧坦曰大黄乃是快藥然至尊年高不宜輕用帝弗從遂至危篤梁元帝嘗}
  - {type: page-break, offset: 3674, content: '', id: KR3k0012_WYG_723-9b, image: WYG0899/WYG0899-0391d.png}
  - {type: variant, offset: 3676, length: 1, content: 鬼, SBCK: 心腸疾諸醫咸謂冝用平藥可漸宣通僧坦曰脉洪而實此有􅀫奶非用大黄必無差理帝從而愈及大軍克荆州爲燕公于謹所召大相禮接太祖遣使馳驛徴僧坦謹固留不遣謂使人曰吾年時衰暮疢疾嬰沉今得此人望與之偕老太祖以謹勲隆重乃止明年隨至長安伊婁穆以疾還京請僧坦省疾自云自􅆎至臍似有三􅅞兩脚緩縱不復自持坦即爲診脉處湯三劑穆􅀄服一劑上􅅞解再服中􅅞解又服三􅅞悉除而兩脚疼痺猶自攣弱更爲合散稍得屈伸至九月遂能起行大將軍襄樂公賀蘭隆先有氣疾加以水腫喘息奔急㘴卧不安或有勸其服决命大散者其家疑未能决乃問僧坦僧坦曰意謂此患不與大散相當若欲自服不煩賜問因而委去其子殷勤拜請曰多時仰屈今日始來竟不下治意實未盡僧坦知其可差即爲處方諸患悉愈大將軍樂平公竇集􅁀感風疾精神瞀亂無所􅁴知諸醫先視者皆云巳不可救僧坦後至曰困矣終當不死若專以見付相爲治之其家欣然僧坦爲合湯散所患即瘳大將軍永丗公叱伏列摏苦痢積時而不廢朝謁燕公于謹甞問僧坦曰樂平永丗俱有痼疾若如㒒意永丗􅏔輕對曰夫患有􅀷淺時有克殺樂平雖困終當保全永丗雖輕必不免死謹曰君言必死當在何時對曰不岀四月果如其言謹歎異之文宣太后寢疾醫巫雜􅀃各有同異髙祖引僧坦問曰太后患勢不輕諸醫並云無慮朕人子之情可以意得君臣之義言在無隠公以爲何如對曰臣無聽}
