  - {type: variant, offset: 2907, length: 224, content: 經用救驗方三卷號曰肘後方又撰玉函方一百卷于今行用晉書曰皇甫謐字士安幼沉靜寡欲有高尚之志以著述為務自號玄晏先生後得風痺疾因而學醫習覽經方手不輟卷遂盡其妙又曰劉德彭城人也少以醫方自達眾疾於虛勞尤為精妙療之隨手而愈猶是向風千里而至者多矣官至太醫校尉又曰史脫性器沉毅志行敦簡善診候明消息多辨論以醫術精博拜太醫校尉治黃疸病最為高手又曰宮泰幼好墳典雅尚方術有一藝長於己者必千里尋之以此精心善極諸疾於氣尤精制三物散方治喘嗽上氣甚有異効世所貴焉又曰靳邵性明敏有才術, SBCK: 神農}
