  - {type: variant, offset: 122, length: 239, content: 也雅性好醫倉公淳于意教五診上下經脈奇咳四時應陰陽之法為齊侍醫又曰杜信高永侯家丞自知身病乃專心學醫倉公甚憐之教以上下經脈五診之法又曰鄧訓為護烏桓校尉羗胡俗恥病死每病臨困取以刀自剌訓聞有病困者輒拘縛束不與兵刃使醫藥療之愈者非一小大莫不感悅又王符論曰凡療病者必先知脈之虛實氣之所結然後為之方故疾可愈而壽可長也為國者必先知人之所苦禍之所起然後為之禁故奸可塞而國可安也又曰郭玉者廣漢人也初有老父不知何出常漁釣於涪水因號涪翁乞食人間見有疾者時下針石輒應時而効乃著針經診脈法傳於代弟子程高尋求, SBCK: 患滯冷}
  - {type: variant, offset: 122, length: 26, content: 也雅性好醫倉公淳于意教五診上下經脈奇咳四時應陰陽之法, WYG: 患滯冷積年不差嗣伯}
