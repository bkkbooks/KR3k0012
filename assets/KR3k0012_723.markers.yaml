  - {type: variant, offset: 3694, length: 0, content: '', SBCK: 宫甞苦心痛乃令僧坦治之其疾即愈及即位恩禮弥隆大象二年除太醫下大夫帝尋有疾僧坦􅀫直侍疾帝謂隋公曰今日性命唯委此人僧坦􅐷候知帝危殆乃對曰臣荷恩旣重思在効力但恐庸短不逮敢不盡心帝領之及静帝嗣位遷上開府儀同大將軍隋開皇􅀄卒僧坦撰集驗方十二卷行紀三卷行於丗隋書曰許智藏髙}
