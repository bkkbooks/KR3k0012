  - {type: variant, offset: 3672, length: 0, content: '', SBCK: 恒居内館所療十全皇建中除兖州刺史未行武明皇太后不豫之才奉藥立愈賞賜巨萬有人脚跟腫痛不堪忍諸醫莫識之才視日蛤精也當乗舡入海岀脚水中得之疾者曰是也之才爲割得兩蛤子大如榆莢或以五色骨爲佩刀靶之才曰此人瘤也何從得之對曰於古􅃁見髑髏額骨長數寸試削視文理故用之其通識􅀋此武成王酒色過度恍惚不恒曽病發自言􅀄見空中有五色物稍近變成一羙婦人去地數丈亭而立之才曰此色慾過多大虚所致即進藥一服稍稍逺變成五色物數服而愈病發輙馳召之針藥所加無不愈者齻音積武成王生齪牙遍召諸醫尚藥典御鄧宣文以實對帝怒而抶之之才拜賀曰此謂智牙生則聖明而壽帝大恱賜帛萬疋加金玉重寳又曰張逺遊齊人以醫藥道術知名㝷有詔徴}
  - {type: page-break, offset: 3672, content: '', id: KR3k0012_SBCK_723-5b}
  - {type: variant, offset: 3672, length: 0, content: '', WYG: 恒居内舘所療十全皇建中除兖州刺史未行武明皇太后不豫之才奉藥立愈賞賜巨萬有人脚跟腫痛不堪忍諸醫莫識之才問曰蛤精也當乘船入海出脚水中得之疾者曰是也之才為割得兩蛤子大如榆筴或以五色骨為佩刀靶之才曰此人瘤也何從得之對曰於古塜見蠋螻額骨長數寸試削視有文理故用之其通識類此武成王酒色過度恍惚不恒曽病發自言初見空中有五色物稍近變成一美婦人去地數丈亭亭而立之才曰此色慾過多大虛所致即進藥一服稍稍逺變成五色物數服而愈病病發輒馳召之針藥所加無不愈者武成王生齪牙遍召諸醫尚藥典御鄧宣文以實對帝怒而撻之之才拜賀曰此謂智牙生則聖明而夀帝大悦賜帛萬疋加金玉重寳又曰張逺遊齊人以醫藥道術知名尋有詔徵令與術士同合九轉金丹成顯祖置之玉匣曰我貪人間樂不能飛上天待我臨死方可服之後周書曰姚僧坦字法衛吴興武康人也父菩提為髙平}
