  - {type: variant, offset: 3242, length: 0, content: '', SBCK: 人也頗叅士流雖以醫術自逹而明敏有决斷才用􅀄聞昭懷后之懷丗宗也夢爲日所逐化龍而遶后后寤而驚悸遂成心疾勑召諸醫診脉徐謇云是微風入藏冝進湯藥顯云案三部脉非有心疾將是懷孕生男之象後果如顯言乃􅀘御史常在御營進藥出入禁内丗宗詔顯撰藥方三十卷頒布天下又曰徐謇字伯城丹陽人也兄文伯皆善醫藥謇性秘忌承奉不得其意雖貴爲王公不爲指療魏孝文遷洛除中散大夫子雄亦以醫術稱又曰裴宣患篤丗宗遣太醫令馳馹就視并賜御藥宣素明隂陽之書自始患便知不起因自尅亡日果如其言又曰髙允微有不適猶不寢卧呼醫請藥出入行止吟咏如常髙祖文明太后聞而遣醫李循徃脉視之告以無恙循入密陳允榮衛有異懼其不乆於是遣使備賜御膳珍羞自酒米至於塩醢百有餘品皆盡時味及牀帳衣服茵􅀍几杖羅列於庭王官徃還尉問相屬允喜形於色語人曰天恩以我篤老大有所賚得非以贍客矣表謝而巳不有他慮如是數日夜中卒家人莫􅁴北齊書曰張子信少以醫術知名隠於白鹿山時出京師甚爲魏收崔季舒所知甞以詩酬贈大寕中徴爲尚藥典御歳餘謝病歸又曰馬嗣明河内野王人少明醫術診脉預知生死邢劭子寳十七八苦傷寒嗣明診其脉告楊愔曰此子今病不療自愈然不踰年必死覺之少晚不可爲也數曰兩公侍宴酒酣顯祖曰子才兒聦冝以近郡處之愔曰年少未可劭出愔以嗣明言奏乃止寳未朞而卒其驗如此背發腫嗣明以麄理色石大如鵝卵烈火燒令黄赤投醋中使屑落盡􅁀乾擣篩和􅀓之立愈嗣明從駕之晉陽至遼陽見牓云女病能差之與錢拾萬衆醫視之無敢措手嗣明見牓􅀏曰眞得汝矣乃抵其家問其由云曽將麥穗見赤物長二尺似蛇入指中因驚倒手臂疼重月餘曰漸及半身腫痛不可忍呻吟晝夜不絶嗣明曰毒虵爲􅔏所啄遺血於此犯而得之即受方令服十餘劑以湯散􅀘之明年還鄴女疾都愈載鏹而歸嗣明恃其􅇊視徐之才崔鸞叔等蔑如也隋開皇中卒又曰李元忠趙郡栢仁人也代爲著姓元忠倜儻􅀶學通隂陽術數􅀄以母老多患乃專心醫藥研習積年遂善於方技}
