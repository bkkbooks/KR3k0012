  - {type: variant, offset: 3700, length: 143, content: 鬼痛猶難忍請療之秋夫曰云何厝法鬼請為芻人案孔穴針之秋夫如言為炙四處又針肩井三處設祭埋之明日見一人謝恩忽然不見當世伏其通靈又宋明帝宮人患腰痛牽心每至輒氣欲絕眾醫以為肉癥文伯曰此髮瘕以油投之即吐得物如髮稍引之長三尺頭已成虵能動懸柱上水滴盡一髮而已病都羗又宋後廢帝出樂遊苑門逢一婦人有娠帝亦善, WYG: ''}
