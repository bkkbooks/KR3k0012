  - {type: variant, offset: 1114, length: 422, content: 考覈遺文採摭群論撰成脈經十卷編次張仲景方論編為三十六卷大行於世魏志曰華他字元化沛國譙人遊學徐土兼通數經曉養性之術年且百歲而猶有壯災時人以為仙沛相陳珪舉孝廉太尉黃琬辟皆不就精於方藥處齊不過數種心分銖不假秤量針示過數處裁七八壯若疾發結於內針藥所不能及者乃令先以酒服麻沸散既醉無所覺因刳破腸皆抽割積聚若在腸胃則截斷洗除去疾穢既而縫合傅以神膏四五日瘡愈一月之間皆平復又曰甘陵相夫人有娠六月腹痛不安他視脈曰胎已死矣使人手摸知所在在右即女在左即男人云在左於是為湯下之果下男形即愈又曰縣吏尹世苦四支煩口乾不欲聞人聲小便不利他曰試作熱食得汗即愈不汗後三日死即作熱食而汗不出他曰藏氣已絕於內當啼泣而絕果如他言又府吏倪尋李延共止俱患頭痛身熱所苦正同他曰尋當下之延當發汗或難其病同療異他曰尋內實延外實故治之宜殊即各與藥明旦並起又督郵徐毅得病他往省之毅謂他曰昨使醫曹吏劉祖針胃管訖便若欬嗽臥不安他曰剌不到胃管誤中肝也食當日減後五日不救遂如他言又東陽陳叔山小男三歲得下痢, WYG: ''}
