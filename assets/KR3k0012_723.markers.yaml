  - {type: variant, offset: 229, length: 261, content: 愈者非一小大莫不感悅又王符論曰凡療病者必先知脈之虛實氣之所結然後為之方故疾可愈而壽可長也為國者必先知人之所苦禍之所起然後為之禁故奸可塞而國可安也又曰郭玉者廣漢人也初有老父不知何出常漁釣於涪水因號涪翁乞食人間見有疾者時下針石輒應時而効乃著針經診脈法傳於代弟子程高尋求積年翁乃授之高亦隱跡不仕玉少師事高學方診六徵之技陰陽不測之術和帝時為太醫丞多有効應帝奇之仍試令嬖臣美手睕者與女子雜處帷中使玉各診一手問所疾若玉曰左陽右陰脈有男女狀若異人臣疑其故帝歎息稱善玉仁愛不矜雖貧賤廝養必盡其心力而鑒療貴人時或不愈帝乃試令貴人羸服變處一針, WYG: ''}
