  - {type: variant, offset: 1407, length: 190, content: 他言又府吏倪尋李延共止俱患頭痛身熱所苦正同他曰尋當下之延當發汗或難其病同療異他曰尋內實延外實故治之宜殊即各與藥明旦並起又督郵徐毅得病他往省之毅謂他曰昨使醫曹吏劉祖針胃管訖便若欬嗽臥不安他曰剌不到胃管誤中肝也食當日減後五日不救遂如他言又東陽陳叔山小男三歲得下痢常先啼日以羸困問他他曰其母懷軀陽氣內養乳中虛冷兒得母寒故令不時愈他與四物紫苑九十日即除又至軍吏梅平得病除名還家家居廣陵未至, SBCK: 拳大稍稍長}
