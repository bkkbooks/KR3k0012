  - {type: variant, offset: 2319, length: 207, content: 到譙從索藥適會值他見收忩忩不忍從求後十八歲病發無藥可療以至死又曰樊阿彭城人少師華他嘗問他求服食法他受以漆葉青黏散子方云服之去三蟲利五藏輕身益氣使人頭不白阿從其言年百餘歲漆葉所在有之青黏生於豊沛彭城及朝歌青黏一名地節一名黃芝主理五藏益精氣本出於迷人入山者見仙人服之以告他他以為佳語阿阿秘之近者人見阿之壽而氣力強盛怪而問之所服食阿因醉亂誤說之人服多驗蜀志曰關羽為流矢貫臂每陰雨常疼痛醫曰矢鏃有在當破臂刮骨去毒乃可除之晉, SBCK: 尓梁}
