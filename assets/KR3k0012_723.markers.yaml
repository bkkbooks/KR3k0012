  - {type: variant, offset: 1598, length: 503, content: 百里止親人舍有須他偶至主人許主人令他視平他謂平曰君早見我不應至此今疾已結促去可得與家人相見五日平應時歸果如他言又他行道見一人病噎塞嗜食而不得下家人車載欲往就醫他聞其呻吟駐車往視語之曰向來道傍有賣餅家䔉齏大酢從取三升飲之病自當羗即如他言立吐虵一條遂懸之車邊欲造他他尚未還他家小兒戲門前迎見自相謂曰客車邊有物必是逢我公也疾者前入唑見他壁北懸此虵輩以十數又有一郡守病他以為其人盛怒則羗乃多受其貨而不加功無何棄去留書罵之守果大怒令人追殺守子知之屬使勿逐守瞋恚吐黑血數升而愈又有一士大夫患體中不快詣他他云君病至深當破腹取之然君壽亦不過十年病不能殺君君忍痛十歲壽俱當盡不足故自刳裂也士大夫曰余不耐痛必請治之他遂下手所患尋羗十年竟死又廣陵太守陳登得胸中煩滿面赤不食他診脈曰府君胃中有蟲數升欲成肉疽食腥物所為也即作湯二升先服一升斯須盡服之食頃吐出三升許蟲赤頭皆動半身猶是生魚膾也所苦便愈他曰此病後三朞當發遇良醫乃可濟依期果發時他不在遂死又有婦人長病經年世謂為寒熱注病冬月中他令唑石槽中平且用冷水汲灌云當滿百始七十灌冷戰欲死他令滿數至八十灌熱氣乃蒸出囂囂高二三尺滿百灌他乃使然火溫床厚覆衣良久汗洽出著粉燥便愈又有人病腹中攻痛, SBCK: ''}
