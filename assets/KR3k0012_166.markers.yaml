  - {type: variant, offset: 982, length: 94, content: 魏晉為諸羗所據後周書曰建德六年西逐諸戎始統有其地因置恒香郡尋改為疊州蓋以其地多山重疊以名郡也又於三交口築城置甘松防又為三川縣以隸恒香郡至建德元年改三川縣為常芬縣仍立芳州以邑隸焉取其地多芳草, WYG: 屬犍}
  - {type: variant, offset: 982, length: 8, content: 魏晉為諸羗所據後, krp: 犍爲郡之南安縣史記曰漢武使唐蒙伐西戎得夜郎國遂立犍爲郡漢志曰青衣屬蜀郡順帝改名漢嘉十道志曰}
