  - {type: variant, offset: 2348, length: 0, content: '', SBCK: 域􅁗漢諸羗居焉圖經曰郡有甘松嶺因以名郡山海經曰甘松嶺亦謂之松桑嶺江水發源於此江源記曰平康縣有羊膓嶺大江發源之所嘉州十道志曰嘉州犍爲郡禹貢梁州之域漢犍爲郡之南安縣史記曰漢武使唐蒙伐西戎得夜郎國遂立犍爲郡漢志曰青衣屬蜀郡順帝改名漢嘉十道志曰周武保定元年於此置青州遥取漢青衣縣爲名宣政二年改爲嘉州華陽國志曰青衣有沫水漢志蜀李冰鑿離塠避沫水之害又益州記曰青衣神號雷塠廟班固以爲離塠益州記曰峨眉山兩山相對望之如峨眉簡州十道志曰簡州陽安郡禹貢梁州之域漢犍爲之牛鞞縣地華陽國志曰牛鞞縣有陽明井今在郡北十里九州要記曰簡州在赤水之北今有絳水在州南周地圖記曰晉義熈末刺史朱齡石率建平人征蜀仍於東山立金戍後魏平蜀改爲金水郡陵州十道志曰陵州仁壽郡禹貢梁州之域漢犍爲郡之武陽縣東境也郡國志曰昔張陵於此得鹽井祠玉女於井内因謂之陵井郡因井得名益州記曰郡有東嵎三山相對去陵井百里郡國志曰有鼎鼻山周之九鼎淪一於此故後人徃徃見鼎耳因名之又曰郡有朝女山昔有朝祖女於此山得道今足跡尚存故名朝女山眉州十道志曰眉州通義郡禹貢梁州之域犍爲郡之武陽南境周地圖記曰梁武帝太清二年武陵王蕭紀開通}
