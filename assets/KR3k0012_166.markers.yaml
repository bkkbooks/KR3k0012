  - {type: variant, offset: 612, length: 0, content: '', SBCK: 圗記曰梁武陵王蕭紀於蒲水口改置卭州南郡卭來山因以爲名史記曰蜀卓氏之先趙人}
  - {type: variant, offset: 612, length: 0, content: '', WYG: 圖記曰梁武陵王蕭紀於蒲水口改置邛州南郡有卭來山因以為名史記曰蜀卓氏之先趙人}
  - {type: variant, offset: 612, length: 7, content: 秦併天下屬隴西, krp: 圖經曰唐顯慶三年割當州三十里左封縣界内有悉唐川因立爲悉州靜州圖經曰靜州静川}
