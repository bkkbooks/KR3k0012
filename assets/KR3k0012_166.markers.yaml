  - {type: variant, offset: 1651, length: 430, content: 匈奴昆邪王地武帝時開之莽曰設屏應劭曰張國臂掖故曰張掖也又曰鱳得屬張掖郡有千金渠西至樂涫入澤中莽曰官式涫音官音鹿又曰刪丹屬張莽曰貫虜肅州十道志曰肅州酒泉郡禹貢雍州之域古西戎地月支所居漢為武威酒泉郡也漢書曰武帝元狩二年昆邪王殺休屠王將其眾來降以其地為武威酒泉郡又匈奴傳曰漢置酒泉郡以隔絕故與羗通路又西通月支大夏以公主妻烏孫王以分匈奴西方之援國其水甘若酒故名酒泉後漢書曰班超久在西域年老思土上書曰臣不敢望到酒泉郡但願生入玉門關玉門屬燉煌今沙州也去長安三千六百里酒泉今肅州也去長安二千八百五十里路瓜州十道志曰瓜州晉昌郡禹貢雍州之域古西戎地戰國時烏孫月支居焉漢初為匈奴右地後為武威酒泉二郡漢志曰寘安屬燉煌郡寘水出焉又名籍端水出羗中西入澤寘安即晉昌地又曰廣至宜禾都尉治昆侖障莽曰廣桓即常樂地有宜禾故城沙州十道志曰沙州燉煌郡禹貢雍州之域古西戎地秦屬西戎漢置燉煌郡左傳范宣子數戎子駒支曰昔秦人迫逐乃祖吾離于瓜州蒙犯荊棘以來歸我先君惠公有不腆之田與汝剖分而食之瓜州地在燉煌漢書曰, SBCK: ''}
