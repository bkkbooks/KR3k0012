  - {type: variant, offset: 781, length: 2, content: 臨洮, krp: 越嶲郡本益州西外夷漢𥘉爲卭都國史記曰西南夷滇以北居君長十數卭都最大漢志曰越嶲郡武帝元鼎六年開莽曰集嶲屬益州應劭曰故卭都國也有嶲水言越以此水彰休盛也九州要記曰嶲之西夷人身青而有文如龍鱗慱物志曰越嶲國有牛稍割取肉經日必復生如故又玄中記曰割而復生名曰及牛十道記曰越嶲有瀘水四時多瘴氣三四月間發人衝之立死非時中人多悶絶唯五月上伏即無害故諸葛亮征越嶲上䟽曰五月渡瀘深入不毛又地記曰今昆明道渡所見有武侯道在又十道記曰水浚而巉石土人以牛皮爲舩方渉津涘九州要記曰臺登縣有奴諾川鸚鵡山黒水之間若水出其下即黄帝子昌意降居若水是此漢志曰旄牛屬蜀郡鮮水出徼外南入若水若水亦出徼外南至大莋旄牛即今臺登縣姚州十道志曰姚州雲南郡蓋夷越之地亦爲滇王國漢武開之置益州部有滇池澤後因爲益州之雲南弄㨂二縣也漢志曰益州郡武帝元封二年開王莽曰就新故滇王國也有滇池大澤又有弄㨂縣焉華陽國志曰滇漢勾町夜郎葉榆同師舊堂侯王國以十數編髮左袵隨畜遷徙莫能相禦楚項襄王遣將軍莊蹻泝沆水出苴蘭以伐夜郎而秦奪楚黔中地無路反遂留王之是爲莊王黎州圖經曰黎州洪源郡漢爲沉黎郡宋齊以來並爲沉黎郡後周破羗夷立黎州龍州十道志曰龍州江油郡秦漢及魏不置郡縣魏志曰景元四年諸軍征蜀鄧艾自隂平行無人之地七百餘里鑿山通道造作橋閣山髙谷深至爲險難艾以氊自裏轉推而下將士皆攀木縁崖魚貫而進先登至江油即此地也周地圖記曰江油帥楊李二姓各自稱蕃於梁至後魏武帝得其地置江油郡西魏於此立龍州松州十道志曰松州交川}
