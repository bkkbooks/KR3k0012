  - {type: variant, offset: 621, length: 28, content: 屬金城郡唐武德二年平李軌置西會州貞觀八年改為會州元和郡縣, SBCK: 張騫奉使尋河源得髙節竹植於卭山號曰卭竹今縁山皆是可爲杖蜀志曰臨卭有火井諸葛亮一窺更盛博物}
