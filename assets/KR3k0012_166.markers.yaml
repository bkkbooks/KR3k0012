  - {type: 'tls:seg', offset: 34, content: '', id: KR3k0012_CHANT_166-1a.10}
  - {type: variant, offset: 35, length: 0, content: '', SBCK: 廣漢郡地今州即廣漢郡之涪縣也九州記曰緜州之賔賨人旋人皆夷也郡國志曰勁勇銳氣而善舞故古有巴渝舞蜀記曰左緜緋紅三川所尚緜州左緜郡有小江所染緋紅於此水灌後益鮮人之所重宋書曰范栢年梓橦人明帝問卿郷土有貪泉不栢年曰臣梁益之地有廉泉讓水不聞有貪泉帝嘉之即以爲蜀郡太守廉讓水在昌期縣郡縣志曰神泉縣有泉十四甘香異常錮疾飲之即差故曰神泉漢書志曰涪屬廣漢郡有孱亭莽曰統眭劭曰涪水出廣漢南入漢梓州十道志曰梓州梓橦郡禹貢梁州之域漢}
  - {type: page-break, offset: 35, content: '', id: KR3k0012_SBCK_166-2a}
  - {type: variant, offset: 35, length: 0, content: '', WYG: 廣漢郡令州即廣漢郡之涪縣也九州記曰緜州之賨人濮人皆夷也郡國志曰賨人勁勇銳氣而善舞故古有巴渝舞蜀記曰左緜緋紅三川所尚緜州左郡縣有小紅所染緋紅於此水灌後益鮮宋書曰范栢年梓潼人明帝問卿鄉土有貪泉否栢年曰臣梁益之地有亷水讓水不聞有貪泉帝嘉之即以為蜀郡太守廉讓水在昌期縣郡縣志曰神泉縣有泉拾四甘香異常固疾飲之即瘥故曰神泉漢書志曰涪屬廣漢郡有孱亭莽曰統睦應劭曰涪水出廣漢南入漢梓州十道志曰梓州梓潼郡禹貢梁州之域漢}
  - {type: page-break, offset: 35, content: '', id: KR3k0012_WYG_166-3b, image: WYG0894/WYG0894-0502b.png}
  - {type: variant, offset: 35, length: 0, content: '', krp: 廣漢郡地今州即廣漢郡之涪縣也九州記曰緜州之賔賨人旋人皆夷也郡國志曰勁勇銳氣而善舞故古有巴渝舞蜀記曰左緜緋紅三川所尚緜州左緜郡有小江所染緋紅於此水灌後益鮮人之所重宋書曰范栢年梓橦人明帝問卿郷土有貪泉不栢年曰臣梁益之地有廉泉讓水不聞有貪泉帝嘉之即以爲蜀郡太守廉讓水在昌期縣郡縣志曰神泉縣有泉十四甘香異常錮疾飲之即差故曰神泉漢書志曰涪屬廣漢郡有孱亭莽曰統眭劭曰涪水出廣漢南入漢梓州十道志曰梓州梓橦郡禹貢梁州之域漢}
  - {type: variant, offset: 36, length: 0, content: '', SBCK: 分}
  - {type: variant, offset: 36, length: 0, content: '', WYG: 分}
  - {type: variant, offset: 36, length: 0, content: '', krp: 分}
  - {type: variant, offset: 37, length: 0, content: '', SBCK: 廣漢郡漢書曰文帝以蜀道銅山賜鄧通鑄錢即今銅山縣也蜀志曰先主入蜀攻劉璋遣諸􅁑亮等分定州郡略地至郪百姓以牛酒勞軍又曰姜維聞諸􅁑亮曕破乃引軍由廣漢郪道以審虚實十道記曰廣漢之地有塩井銅山之冨本禹南夷周末􅁗併爲郡有􅂼食果實之饒九州要記曰玄武山一名赤雀山一名冝君山山有鹿尾入貢又華陽國志曰玄武山一名三嵎山山出龍骨傳云龍昇不逹墜此民取以入藥用玄武縣因山得名遂州十道志曰遂州遂寜郡禹貢梁州之域漢分梁州置廣漢郡今州又爲廣漢縣九州要記曰青石縣有青石山}
  - {type: page-break, offset: 37, content: '', id: KR3k0012_SBCK_166-2b}
  - {type: variant, offset: 37, length: 0, content: '', WYG: 廣漢郡漢書曰文帝以蜀道銅山賜鄧通鑄錢即今銅山縣也蜀志曰先主入蜀攻劉璋遣諸葛亮等分州定縣略地至郪百姓以牛酒勞軍又姜維聞諸葛瞻破乃引軍由廣漢郪道以審虛實十道志曰廣漢之地有鹽井銅山之富本禹貢南夷周末秦併為郡有蔬食果實之饒九州要記曰𤣥武山一名赤雀山一名宜君山山有麈尾入貢又華陽國志曰𤣥武山一名三嵎山出龍骨傳云龍昇不達墜此民取以入藥用𤣥武縣因山得名遂州十道志曰遂州遂寧郡禹貢梁州之域漢分梁州置廣漢郡今州又為廣漢縣九州要記曰青石縣有青石山}
  - {type: page-break, offset: 37, content: '', id: KR3k0012_WYG_166-4a, image: WYG0894/WYG0894-0502c.png}
