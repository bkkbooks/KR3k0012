  - {type: variant, offset: 4, length: 0, content: '', WYG: 蜀郡漢廣漢郡之梓潼縣華陽國志曰諸葛亮鑿石架空為飛閣道通蜀漢即此三國志曰鄧艾伐蜀自隂平縣景谷歩劍閣道懸車束馬逕出江由至廣漢即此地也蜀記曰梓潼縣有五婦山一名五婦臺秦遺蜀美女五人蜀遣五丁迎女至梓潼五丁蹋地大呼驚五女並化為石郡國志曰梓潼縣北有華容水蜀都賦却背華容是也緜}
