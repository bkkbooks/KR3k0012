  - {type: variant, offset: 2349, length: 0, content: '', SBCK: 水立青州於通􅁩郡􅀯安縣北後魏二年平蜀三年改青州爲眉州用莪眉山爲名蜀記曰􅁗惠王使張儀司馬錯伐蜀蜀王開明拒之不利退至武陽見􅀗彭山縣即其地郡國志曰青神縣當羗蜀之要漢武使唐􅂪破西南夷即路始於此榮州十道志曰榮州和義郡禹貢梁州之域漢爲南安縣地屬犍爲郡九州要記曰和義郡古夜郎之地有成都市漢武時南中令使通􅈎道無功唐􅂪因殺之令曰恨不見成都市而死􅂪即立市如成都以殺之故曰成都市益州記曰旭川縣有馬鳴戌漢刺史韋枝夜過此地有神馬嘶漢中馬皆嘶以應之故以此名戍蜀記曰昔有女人於溪浣沙有大竹}
  - {type: page-break, offset: 2349, content: '', id: KR3k0012_SBCK_166-11a}
  - {type: variant, offset: 2350, length: 1, content: 沙, SBCK: 水而觸}
  - {type: variant, offset: 2350, length: 1, content: 沙, WYG: 水而觸}
  - {type: variant, offset: 2352, length: 0, content: '', SBCK: 因有孕後生一子自立爲王因以竹爲姓漢武使唐􅂪伐䍧牱軒竹王因有此地人不忘其本立竹王廟祀之資州十道志曰資州資陽郡禹貢梁州之域漢爲犍爲郡之資中縣地周地圖記曰後魏廢帝二年於武康郡之陽安縣置資州陽安在今州北簡州界郡國志曰内江縣有水深百丈實郡川揔㑹之所戎州十道志曰戎州南溪郡春秋僰侯國􅁗惠王破滇池始通五尺道漢武得蜀故使唐􅂪理道於此而破䍧牱即此道也後爲僰道縣以屬犍爲郡郡國志曰南溪縣}
  - {type: page-break, offset: 2352, content: '', id: KR3k0012_SBCK_166-11b}
  - {type: variant, offset: 2352, length: 0, content: '', WYG: 因有孕後生一子自立為王因以竹為姓漢武使唐蒙伐䍧牱郡竹王因有此地人不忘其本立王廟祀之資州十道志曰資州資陽郡禹貢梁州之域漢為犍為郡之資中縣地周地圖記曰後魏廢帝二年於武康郡之陽安縣置資州陽安在今安州北蘭州界郡國志曰内江縣有水深百丈實在羣州總㑹之所戎州十道志曰戎州南溪郡春秋僰侯國秦惠王破滇池始通五尺道漢武得蜀故使唐蒙理道於此而破䍧牱即此道也後為僰道縣以屬犍為郡郡國志曰南溪縣}
