  - {type: variant, offset: 3, length: 1, content: 秦, SBCK: 劒緜梓遂益漢彭蜀卭普雅瀘茂翼當悉静拓恭維奉嶲姚􅀺龍松嘉簡陵眉榮資戎劒州圖經曰普安郡禹貢梁州之域􅁗之蜀郡漢屬廣漢郡之梓橦縣華陽國志曰諸􅁑亮相蜀鑿石架空爲飛閣道以通蜀漢即此郡三國志曰鄧艾伐蜀自隂平縣景谷歩劒閣道懸車束馬逕出油江而至大漢是此地也蜀記曰梓橦縣有五婦山一名五婦臺􅁗遺蜀美女五人蜀遣五丁迎女至梓橦五丁蹋地大呼驚五女並化爲石郡國志曰梓橦縣北有華容水則蜀都賦曰却背華容是也緜}
