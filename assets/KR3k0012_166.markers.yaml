  - {type: punctuation, offset: 40, content: 《, id: KR3k0012_CHANT_166-bkkpn15}
  - {type: variant, offset: 40, length: 0, content: '', SBCK: 國志曰昔巴蜀爭界歷􅀊不决漢髙八年山自裂如索所界巴蜀之民懼天戒乃息所爭益州十道志曰益州成都府古梁州巴濮庸蜀之地在􅁗爲漢中巴蜀三郡地釋名曰益扼也所在之地險阨應劭地里風俗記曰疆壤益廣故號益州}
  - {type: variant, offset: 40, length: 0, content: '', WYG: 國志曰昔巴蜀爭界厯嵗不決漢髙八年山自裂如索所界巴蜀之民懼天譴乃息所爭益州十道志曰益州成都府古梁州巴濮庸蜀之地在秦為漢中巴蜀三郡地釋名曰益阨也所在之地險阨應劭地里風俗記曰疆壤益廣故號益州}
  - {type: page-break, offset: 40, content: '', id: KR3k0012_WYG_166-5a, image: WYG0894/WYG0894-0503a.png}
  - {type: variant, offset: 40, length: 0, content: '', krp: 國志曰昔巴蜀爭界歷歲不决漢髙八年山自裂如索所界巴蜀之民懼天戒乃息所爭益州十道志曰益州成都府古梁州巴濮庸蜀之地在秦爲漢中巴蜀三郡地釋名曰益扼也所在之地險阨應劭地里風俗記曰疆壤益廣故號益州}
  - {type: punctuation, offset: 42, content: ‧, id: KR3k0012_CHANT_166-bkkpn16}
  - {type: variant, offset: 42, length: 1, content: 秦, SBCK: 曰周太王逾梁山之歧山一年成邑二年成都故有成都之名又曰􅁗惠王時苴蜀相攻各告急於􅁗􅁗欲先伐韓司馬錯曰不如先伐蜀夫蜀戎狄之長也有桀之亂以􅁗攻之譬使犲狼逐群羊也又有禁止暴亂之名今攻韓周自知失九鼎韓自知亡三川二國併力合謀而求解于楚魏臣竊危之王曰善遂滅蜀漢書曰宣帝時方士上言益州部有金馬碧雞神帝令王襃入蜀祀之揚雄蜀王}
  - {type: page-break, offset: 42, content: '', id: KR3k0012_SBCK_166-3b}
  - {type: variant, offset: 42, length: 0, content: '', WYG: 曰周太王逾梁山之岐山一年成邑二年成都故有成都之名又曰}
  - {type: variant, offset: 42, length: 0, content: '', krp: 曰周太王逾梁山之歧山一年成邑二年成都故有成都之名又曰}
  - {type: variant, offset: 43, length: 0, content: '', WYG: 惠王時韓蜀相攻各告急於秦秦欲先伐韓司馬錯曰不如伐蜀蜀戎狄之長也有桀紂之亂以秦攻之譬使豺狼逐羣羊也又有禁暴止亂之名今攻韓周自知失九鼎韓自知亡三川二國併力合謀而求解于楚魏臣竊危之王曰善遂定蜀漢書曰宣帝時方士上言益州部有金馬碧鷄神帝令王褒入蜀祀之揚雄蜀王}
