  - {type: variant, offset: 2348, length: 1, content: 外, WYG: 域秦漢諸羌居焉圖經曰郡有甘松嶺因以名郡山海經曰甘松嶺亦謂之松桑嶺江水發源於此江源記曰平康縣有羊腸嶺大江發源之所嘉州十道志曰嘉州犍為郡禹貢梁州之域漢犍為郡之南安縣史記曰漢武使唐蒙伐西戎得夜郎國遂立犍為郡漢志曰青衣縣屬犍為郡順帝改名漢嘉十道志曰周武保定元年於此置青州遥取漢青衣縣為名宣政二年改為嘉州華陽國志曰青衣有沬水漢志蜀李冰鑿離塠避沬水之害又益州記曰青衣神號為雷塠廟班固以為離塠益州記曰峨眉山兩山相對望之如峨眉簡州十道志曰簡州陽安郡禹貢梁州之域漢犍為之牛鞞縣地華陽國志曰牛鞞縣有陽明井今在郡北十里九州要記曰簡州在赤水之北周地圖記曰晉義熙末刺史朱齡石率建平人征蜀仍於東山立金城後魏平蜀改為金水郡陵州十道志曰陵州仁壽郡禹貢梁州之域漢犍為郡之武陽縣東隅也郡國志曰張道陵於此得鹽井祠玉女於井内因謂之陵井郡因井得名益州記曰郡東隅有三山相對去陵丹百里郡國志曰有鼎鼻山周之九鼎淪没於此故後人往往見鼎耳因名之又曰郡有朝女山昔有朝祖女於此山得道今足跡尚存故名朝女山眉州十道志曰眉州通義郡禹貢梁州之域犍為郡之武陽南境周地圖記曰梁武帝太清二年武陵王蕭紀開通越嶲立青州於通郡南安縣北後魏二年平蜀三年改青州為眉州用峨眉山為名蜀記曰秦惠王使張儀司馬錯伐蜀蜀主開明拒之不利退至武陽見獲彭山縣即其地郡國志曰青神縣當羌蜀之要漢武使唐蒙破西南夷路即始於此榮州十道志曰榮州和義郡禹貢梁州之域漢為南安縣地屬犍為郡九州要記曰和義郡古夜郎之地有成都市漢武中時南令使通僰道無功唐蒙因殺之令曰恨不見立成都市而死蒙即立市如成都以殺之故曰成都市益州記曰旭川縣有馬鳴戍漢刺史韋枚夜過此地有神馬嘶漢中馬皆嘶以應之故以此名戍蜀記曰昔有女人於溪浣沙有大竹}
