  - {type: variant, offset: 604, length: 1, content: 雍, WYG: 梁}
  - {type: variant, offset: 604, length: 0, content: '', krp: 梁州之域漢武置十三州在益州之部周地圗記曰梁武陵王蕭紀於蒲水口改置卭州南郡卭來山因以爲名史記曰蜀卓氏之先趙人秦破趙卓氏獨夫妻推輦而行曰吾聞汶山之下沃野有蹲鴟乃求逺遷致之臨卭因銅山鑄錢此也蜀記曰漢張騫奉使尋河源得髙節竹植於卭山號曰卭竹今縁山皆是可爲杖蜀志曰臨卭有火井諸葛亮一窺更盛博物志曰後人以家火投之火卽滅至今不然普州十道志曰普州安岳郡禹貢梁州之域漢武十三州在益州之部今州境則漢之資中牛鞞墊江後漢之德陽等四縣雅州十道志曰雅州廬山郡禹貢梁州之域漢武十三州在益州之部即秦嚴道縣也蜀記曰秦滅楚徙楚嚴王之族於此故謂之嚴道漢志曰嚴道屬蜀郡卭來山卭水所出東入青衣王莽曰嚴治郡國志曰漢源縣有離崖即蜀守李冰所鑿離堆即古雅也嚴道縣有九折坂即王陽迴轡之所瀘州十道志曰瀘州瀘川郡禹貢梁州之域春秋戰國時爲郡子國秦蜀巴郡漢屬犍爲郡漢志曰江陽屬犍爲郡十道志曰瀘州本漢江陽縣地諸葛亮出師表曰五月渡瀘深入不毛茂州十道志曰茂州通化郡禹貢梁州之域夲冉駹國漢以爲郡史記曰南越破後冉駹等皆震懼請臣置吏以冉駹爲汶山郡守翼州圖經曰翼州臨翼郡秦之土地與益州同二漢屬蜀郡夲漢之蠶陵也漢志曰蠶陵屬蜀郡王莽曰歩昌當州十道志曰當州江源郡禹貢梁州之域周爲}
  - {type: variant, offset: 605, length: 0, content: '', krp: 州之境後周書曰天和元年鴈門公紇干略於此討渾胡因置同昌郡悉州十道志曰悉州歸誠郡禹貢梁}
