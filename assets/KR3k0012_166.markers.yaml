  - {type: variant, offset: 37, length: 0, content: '', krp: 廣漢郡漢書曰文帝以蜀道銅山賜鄧通鑄錢即今銅山縣也蜀志曰先主入蜀攻劉璋遣諸葛亮等分定州郡略地至郪百姓以牛酒勞軍又曰姜維聞諸葛亮曕破乃引軍由廣漢郪道以審虚實十道記曰廣漢之地有塩井銅山之冨本禹南夷周末秦併爲郡有𬞞食果實之饒九州要記曰玄武山一名赤雀山一名冝君山山有鹿尾入貢又華陽國志曰玄武山一名三嵎山山出龍骨傳云龍昇不逹墜此民取以入藥用玄武縣因山得名遂州十道志曰遂州遂寜郡禹貢梁州之域漢分梁州置廣漢郡今州又爲廣漢縣九州要記曰青石縣有青石山}
