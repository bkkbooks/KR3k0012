  - {type: variant, offset: 72, length: 249, content: 霍光為大將軍輔昭帝田千秋為丞相及昭帝初即位未任聽政事一決大將軍光千秋居相位謹厚有重名光謂千秋曰始與君侯俱受先帝遺詔令光治內君侯治外宜有以教督使光無負天下千秋曰唯將軍留意即天下幸甚終不有所言後漢書曰竇憲為大將軍威震天下復出屯武威會帝西祠園陵詔憲與車駕會長安及憲至尚書以下議欲拜之伏稱萬歲韓稜正色曰夫上交不謟下交不黷禮無為人臣稱萬歲之制議者皆慚而止又曰詔鄧騭班師朝廷以太后故遣五官中郎將迎拜騭為大將軍到河南使大鴻臚親迎中常侍齎牛酒郊勞王主以下候望於道既至大會群臣賜束帛焉應劭漢官儀曰和帝以竇憲為大將軍乃, SBCK: 宋義卿子}
