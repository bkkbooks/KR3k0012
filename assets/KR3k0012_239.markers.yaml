  - {type: variant, offset: 3562, length: 0, content: '', SBCK: 性愛之􅁪湏見耳或出遊亦以自隨人士􅀏之唐書曰貞元十一年以前太子賔客李愿爲左領軍大將軍李慿爲右威衛大將軍依前兼中丞皆太尉晟之子以免䘮故晟諸子同日授官者凢九人護軍將軍王隱晉書曰王敦將復作逆明帝問曰何如應詹厲然慷􅁣荅詔曰陛下冝奮赫斯之威臣等當􅀒戈從戎以順討逆誠社稷之計也即以詹爲護軍將軍同心滅敦中軍將軍漢書曰馮奉世字子明元帝以爲中軍屯首陽魏志曰曹真持節都督中外諸軍事中軍將軍受顧命王隱晉書曰太始元年以羊祐爲中軍將軍惣宿衛游擊將軍史記曰漢髙祖以陳狶爲游擊將軍漢書曰太祖太􅀄元年以􅂫建韓說爲游擊將軍􅀽宏漢紀曰建武二年以鄧隆爲游擊將軍助朱浮攻彭寵魏志曰卞闌少有才學爲游擊將軍加散􅀐常侍山濤啓事曰游擊將軍諸􅁑冲精果有文武擬􅀘兖州詔荅曰冲領兵未欲出之積射將軍後周書曰于謹除積射將軍又隨廣陽王元深征鮮于脩禮停軍中山侍中元晏言於靈太后曰廣陽王以宗室之重受律專征今乃盤桓不進坐圖非望又有于謹者智略過人爲其謀主風塵之隟恐非陛下純臣矣靈太后詔於尚書省門外立牓募}
