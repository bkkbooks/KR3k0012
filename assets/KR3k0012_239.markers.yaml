  body:
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 七四征將軍征東將軍征西將軍征南將軍征北將軍四鎭將軍鎭東將軍鎭西將軍鎭南將軍鎭北將軍四安將軍安東將軍安西將軍安南將軍安北將軍四平將軍平東將軍平西將軍平南將軍平北將軍雜號將軍上鎭軍將軍撫軍將軍征虜將軍冠軍將軍輔國將軍領軍將軍護軍將軍中軍將軍游擊將軍積射將軍積弩將軍強弩將軍殿中將軍貟外將軍直閣將軍征東將軍魏志曰張遼字文逺爲征東將軍征孫權􅀍甲戰先䧟陣衝壘入至權麾下又曰满寵字伯寜爲征東將軍詔曰君典兵在外專心憂公賜田十頃􅂖五百斛錢二十萬以明清忠儉約之節晉書王渾平呉轉征東大將軍復鎮夀陽渾不尚刑名處㫁明允時呉人新附頗懷畏懼渾撫循羇旅虚懷綏納座無空席門不停賔於是江東之士莫不恱附征西將軍東觀漢記曰馮異爲征西將軍入􅀜征赤眉又曰耿秉爲征西將軍領撫單于及薨南單于舉􅀦發䘮犁面流血魏志曰夏侯淵字妙才爲征西將軍守漢中後魏書曰陸眞代人也少善􅀐射數從征伐所在摧鋒䧟陣前後以功爲征西將軍征南將軍魏志曰夏侯尚字仁伯淵從子也文帝與之親友太祖定兾州尚爲軍司馬常從征討遷征南將軍又曰曹仁爲征南將軍􅋣陵侯彰北征烏丸文帝在東宫爲書戒彰曰爲將奉法不當如征南􅁘晉書曰羊祐爲征南將軍寢疾求入朝旣至洛陽㑹景獻梓宫在殯哀慟至篤中詔申諭扶疾引見命乗輦入殿無下拜甚見優禮後魏書曰司馬景之字洪略晉汝南王亮之後太宗時歸封蒼梧公加征南大將軍征北將軍魏志曰杜恕爲幽州刺吏時征北將軍程嘉屯薊尚書􅀽偘等戒恕曰程申伯今俱杖節共屯一城冝深有以禮之沈約宋書曰衡陽王義季爲征北將軍徐州刺史鎭東將軍魏志曰臧霸字宣髙太山華隂人也亡命東海以壯勇聞太祖募索得霸見而恱之以爲琅瑘相文帝即位遷鎭東將軍鎭西將軍魏志曰曹眞字子丹文帝即位以眞爲鎭西將軍蜀志曰馬超父騰靈帝末與邊章韓遂等俱起居事於西州初平三年遂騰率衆詣長安漢朝以遂爲鎭西將軍遣還金城騰爲征西將軍屯郿鄔鎭南將軍蜀志曰黃權字公衡伐呉敗於白帝旣附魏文帝曰君捨逆順欲追蹤陳韓􅁘權曰臣降呉不可歸蜀無路是以歸命敗軍之將免死焉幸何古人之可纂帝善之拜鎭南將軍呉志曰吕岱旣定交州進討九眞斬獲萬數又遣從事南宣國化及徼外扶南林邑堂明諸王各遣使奉貢權嘉其功進拜鎭南將軍􅀳書曰杜預爲鎭南將軍繕兵甲曜威武乃簡精銳襲呉西陵督張政大破之以功増封三百}
