  - {type: variant, offset: 322, length: 1034, content: 三公又曰梁冀為大將軍以三世姻媾援立之功公卿希旨上比周霍舉高第茂才官屬皆倍餘府魏志曰文帝以孫權為大將軍吳王加九錫又曰太傅司馬宣王奏免曹爽皇太后詔召高文惠假節行大將軍事據爽營太傅謂之曰君為周勃矣後魏書曰莫題有謀策為大將軍平慕容驎賜爵東宛侯後太祖欲廣宮宇規度平城四方數十里將摸鄴洛長安之制運材數百萬以題機巧令監定焉陳思王輔臣論曰知慮深奧淵然難測恭以奉上愛以接下納言左右為帝喉舌曹大將軍也大將軍魏志曰王謙為大將軍何進長史進以謙名公之冑欲與為婚見其二子使擇焉弗許以疾免臧榮緒晉書曰魯芝字世英躭思墳籍研精稽古自三代之奧典聖人之微言皆該覽焉大將軍曹爽輔政高選賢明以為官屬延芝為司馬續漢書曰李固字子堅拜議郎為洛陽令大將軍梁冀請為從事中郎晉書曰鄭冲字文和以儒雅為業簞食瓢飲布衾縕袍不以為憂大將軍曹爽以為從事中郎又曰李喜景帝輔政命喜為大將軍從事中郎喜到引見謂喜曰昔先公辟君而不應今孤命君而至何也對曰先公以禮見待喜得以禮進退明公以法見繩喜畏法而至帝甚重之何法盛晉中興書曰郭舒大將軍王敦以為從事中郎會郭討劉隗切諫敦大怒曰人中間言卿癡故炙卿眉頭今疾復發耶勿復語也舒曰明公聽舒一言舒聞古之狂也直周昌汲黯朱雲皆不癡也昔堯立誹謗之木舜懸敢諫之鼓公為勝堯舜耶而乃折舒使不得言敦默然也竹林七賢傳曰阮籍字嗣宗為太傅司馬宣王參軍遷景王大將軍從事中郎通典曰從事中郎漢末官也陳陽為大將軍王鳳從事中郎是也在主簿上所掌與長史同華嶠後漢書曰崔駰字亭伯辟大將軍竇憲府掾憲新輔政貴重掾三十人皆故刺史二千石唯駰以處士年少擢在其間憲擅權驕恣駰數諫之出為長岑長不得意不之官而歸華嶠後漢書曰馬融字季長為大將軍鄧騭舍人晉陽秋曰義興周延為左率轉尚書遷大將軍諮議參軍車騎將軍漢書曰元光元年以中尉程不識為車騎將軍屯鴈門應劭漢官儀曰帝以元舅馬防為車騎將軍銀印青綬吳志曰孫壹奔魏以壹為車騎將軍儀同三司封吳侯以故王芳貴人邢氏妻之邢美色妬忌下不堪命遂共殺壹及邢氏蜀志曰鄧芝字伯苗義陽新野人益州從事張裕相芝往從芝謂芝曰君年過七十位至大將軍封侯為車騎將軍賞罰明善䘏卒伍身之衣食資仰於官不茍素儉然終不治私產妻子不免飢寒死之日家無餘財後魏書曰王衍字文舒出為散騎常侍征東將軍西兗州刺史衍届治未幾屬爾朱仲遠稱兵內向州既路衝為其攻逼衍不能守為仲遠所擒以其名望不害也令騎牛從車久乃見釋還洛除車騎將軍隋書曰長孫覽周武帝在藩與覽親善及即位彌加禮焉超拜車騎大將軍每公卿上奏必令省讀覽有口辯聲氣雄壯凡所宣傳百寮屬目帝每嘉歎之覽初名善帝謂之曰朕以萬機委卿先覽遂賜名焉驃騎將, SBCK: ''}
