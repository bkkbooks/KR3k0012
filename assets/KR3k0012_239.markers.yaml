  - {type: variant, offset: 1873, length: 1268, content: 表曰常願侯服就列希同特進之班角巾還第不競龍驤之貴而天澤無涯名器惣集竊以驃騎之官既為上將神州之重實號土中故以彈壓六戎冠冕九牧豈止司隸絳節金吾緹騎况復任惣皇畿位重連率何則驃騎之號歷選為重元狩之中始自去病永平之建特授劉蒼齊獻為公主所申吳漢因群臣之舉驍騎將軍漢書曰李廣為驍騎將軍後出鴈門擊匈奴匈奴生得廣廣時傷陽死睨傍胡兒善馬漸騰而上南馳得脫廣亡失多當斬贖為庶人東觀漢記曰光武以劉桓為驍騎將軍攻中山又曰建武九年以劉喜為驍騎將軍攻𣵠郡華嶠後漢書曰馬成字君遷拜驍騎將軍北屯常山積數年上以其勤勞徵歸京師邊民多上書請之上復以成鎮撫之魏志曰任城威王彰字子文性勇而鬚黃為驍騎將軍北出塞為寇所要彰獨與麾下數百騎突虜王聞之曰我黃鬚兒定可用也又曰董卓立獻帝表太祖為驍騎將軍與計事太祖乃變姓名間行東歸齊書曰江斅為侍中轉都官尚書領驍騎將軍王晏啟武帝曰江斅今重登禮閣兼寄六軍慈渥所覃實有優忝但語其事任殆同閑輩天旨既欲升其名位愚謂以侍中領驍騎望實清顯有殊納言上曰斅常啟吾為其鼻中惡今既以何胤王瑩還門下故有此回換耳衛將軍漢書曰文帝至渭橋群臣奉天子法駕迎代邸皇帝即日夕入未央宮夜拜宋昌為衛將軍領南北軍又曰文帝三年遣灌嬰擊匈奴發中尉材官兵屬衛將軍軍長安晉書曰虞潛字思奧為衛將軍貌如不武內實堅明前將軍漢書曰前後左右將軍皆周末官秦因之位亞上卿金印紫綬又曰武帝征西夷有前後左右將軍宣元以後雜錯更置或為前或為後或為左或為右雖不出征猶有其官在諸卿上為國爪牙所以揚示威靈於四遠折衝萬人如虎如羆又曰左右前後將軍皆周官也秦漢因置以征四夷後雖不征伐其官常存又曰傅喜為右將軍傅太后與政喜數諫后不悅上印綬病在家上䟽固請乃拜前將軍又曰張遼字文遠鴈門馬邑人也聶壹之後以避冤變姓少為郡吏武力過人文帝即位轉前將軍又黃初二年遼至洛陽宮文帝引遼會建始殿親問破吳意狀帝歎息顧左右曰此亦古之邵虎也蜀志曰先主為漢中王遣費詩拜關羽為前將軍羽聞黃忠為後將軍怒曰大丈夫終不與老兵同列不肯拜受詩謂羽曰夫立王業者所用非一昔蕭曹與高祖少小親舊而陳韓亡命後至論在班列韓最居上未聞蕭曹以為怨也今漢中王以一時之功隆崇於漢叔然意之輕重寧當與君侯齊乎王與君譬猶一體同休等戚禍福共之愚謂君侯不宜計官號之高下爵位之多少也僕一介之使銜命之臣君侯不受拜如是便還但相謂惜此舉動恐有後悔耳羽太感悟即受拜漢叔黃忠字也後魏書曰谷楷昌黎人濮陽公渾曾孫也稱有幹局遷前軍將軍楷眇一目而性甚嚴忍時人號為瞎虎後將軍漢書曰趙充國為後將軍西羗反上使御史大夫邴吉問誰可將者充國時年已七十餘對曰無踰於老臣者矣遣問焉曰將軍度羗虜何如當用幾人充國曰百聞不如一見兵難踰度踰遠也臣願馳至金城圖上方略然羗戎小夷逆天背叛滅亡不久願陛下以屬老臣勿以為憂東觀漢記曰郅彤字瑋君信都人也為曲陽卒正更始即位上以大司馬平河北至曲陽彤舉城降為後大將軍魏志曰曹洪為文帝所廢明帝即位拜後將軍蜀志曰黃忠字漢叔先主為漢中王欲用忠為後將軍諸葛亮說先主曰忠之名望素非關馬之倫而今使令同列馬張在近親見其功尚可喻指關羽遙聞之恐必不悅得無不可乎先主曰吾當解之遂與羽等同位賜爵關內侯晉中興書曰應詹字思遠太興三年為後軍將軍, SBCK: ''}
