  - {type: variant, offset: 3669, length: 0, content: '', SBCK: 又曰神雀二年以許延夀爲強弩將軍遷大司馬􅀓暢晉讃曰晉文王晉臺置強弩將軍掌宿衛殿中將軍􅀇中記曰漢􅁊帝時出遊河上忽有一青牛從河中出直走盪桓帝邊人皆走太尉何公爲殿中將軍有勇力輙走逆之牛見公徃乃反走還河未至河公及牛乃以手拔牛左足脫以右手持斧斫牛頭殺之此青牛者是萬年木精也語林曰庾公欲伐王公先書與郄公曰老賤賊轉欲輈張殿中將軍舊用才學士以廣視聽而頃悉内面牆人是欲蔽主之明便欲勒數州之衆以除君側之惡今年之舉篾}
