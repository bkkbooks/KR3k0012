  - {type: variant, offset: 7, length: 0, content: '', WYG: 軍臨至使其將帥移易以成傾蕩之勢預處分既定乃啟請伐吳之期後魏書曰唐和詣闕世祖優之待以上客髙宗以和歸誠先朝拜鎮南將軍鎮北將軍魏氏春秋曰許元字士宗為鎮北將軍都督河北諸軍事蜀志曰魏延字文長先主大㑹羣臣問延曰今委卿以重任卿居之欲云何延對曰若曹操舉天下而來請為大王拒之偏將十萬之衆至請為大王吞之先主稱善衆咸壯其言先主踐尊號拜鎮北將軍晉書曰何曽為鎮北將軍文帝使武帝齊王攸送之帝又過其子劭曽先勑劭曰客必過汝汝當預嚴劭不冠帶侍帝良久曽深以譴劭曽見崇重如此安東將軍王隠晉書曰武帝伐吳以王渾為安東將軍晉公卿禮秩曰世祖以扶風王駿為安東大將軍安西將軍魏志曰曹仁字子孝太祖從弟也少好弓馬弋獵俊豪並起仁亦隂結少年周遊淮泗之間遂從太祖為别部司馬太祖討馬超以仁行安西將軍安南將軍謝承後漢書曰光武以岑彭為安南將軍安北將軍沈約宋書曰劉秀之東莞莒人少孤貧有志操為安北將軍雍州刺史上車駕幸新亭視秀之發引平東將軍王隠晉書曰武帝伐吳以王濬為平東將軍平西將軍蜀志曰馬超聞先主圍劉璋於成都密書請降先主遣人迎超日將兵徑到城下城中震怖璋即稽首以超為平西將軍沈約宋書曰臨川王義慶為平西將軍平南將軍王隠晉書曰武帝伐吳以胡奮為平南將軍平北將軍魏志曰太祖征冀州張燕求佐軍拜平北將軍鎮軍將軍魏志曰黄初七年魏文帝以陳羣為鎮軍大將軍録尚書事受顧命又曰甘露元年以石苞為鎮軍將軍沈約宋書曰齊王攸為鎮軍將軍撫軍將軍魏志曰黄初四年以司馬宣王為撫軍大將軍輔政又曰齊王嘉平三年以司馬景王為撫軍大將軍輔政語林曰簡文為撫軍時坐牀上生塵不聽左右拂去見䑕行跡視以為佳有叅軍見䑕以手板格煞之撫軍謂曰無乃不可征虜將軍東觀漢記曰祭遵為征虜將軍亷㓗奉公光武歎曰安得憂國奉公如祭征虜者乎魏志曰太祖以臨淄侯植為征虜將軍遣救曹仁呼之有所勑而植醉於是罷之又曰南陽周太好立功善用兵以為征虜將軍沈約宋書曰征虜將軍世號金紫將軍冠軍}
