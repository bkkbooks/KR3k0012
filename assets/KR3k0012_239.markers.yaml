  - {type: variant, offset: 5, length: 0, content: '', WYG: 七四征將軍征東將軍征西將軍征南將軍征北將軍四鎮將軍鎮東將軍鎮西將軍鎮南將軍鎮北將軍四安將軍安東將軍安西將軍安南將軍安北將軍四平將軍平東將軍平西將軍平南將軍平北將軍雜號將軍上鎮軍將軍撫軍將軍征虜將軍冠軍將軍輔國將軍領軍將軍䕶軍將軍中軍將軍㳺擊將軍積射將軍積弩將軍強弩將軍殿中將軍員外將軍直閣將軍征東將軍魏志曰張遼字文逺為征東將軍征孫權被甲持㦸先登陷陣衝壘入至權麾下又曰滿寵字伯寧為征東將軍詔曰君典兵在外專心憂公賜田十頃穀五百斛錢二十萬以明清忠儉約之節晉書曰王渾平吳轉征東大將軍復鎮夀陽渾不尚刑名處斷明允時吳人新附頗懷畏懼渾撫循羇旅虛懷綏納座無空席門不停賔於是江東之士莫不悦附征西將軍東觀漢記曰馮異為征西將軍入關征赤眉又曰耿秉為征西將軍鎮撫單于及薨南單于舉國發喪剺面流血魏志曰夏侯淵字妙才為征西將軍守漢中後魏書曰陸真代人也少善騎射數從征伐所在摧鋒陷陣後以功為征西將軍征南將軍魏志曰夏侯尚字仁伯淵從子也文帝與之親友太祖定冀州尚為軍司馬常從征討遷征南將軍又曰曹仁為征南將軍鄢陵侯彰北征烏丸文帝在東宫為書戒彰曰為將奉法不當如征南耶晉書曰羊祜為征南將軍寢疾求入朝既至洛陽㑹景獻梓宫在殯哀慟至篤中詔申諭扶疾引見命乘輦入殿無下拜甚見優禮後魏書曰馬景之字洪畧晉汝南王亮之後太宗時歸封蒼梧公加征南大將軍征北將軍魏志曰杜恕為幽州刺史時征北將軍程喜屯薊尚書袁侃等戒恕曰程申伯今俱仗節共屯一城宜深有以禮之沈約宋書曰衡陽王義季為征北將軍徐州刺史鎮東將軍魏志曰臧霸字宣髙太山華隂人也亡命東海以壯勇聞太祖募索得霸見而悦之以為琅琊相文帝即位遷鎮東將軍鎮西將軍魏志曰曹真字子丹文帝即位以真為鎮西將軍蜀志曰馬超父騰靈帝末與邉章韓遂等俱起事於西州初平三年遂騰率衆詣長安漢朝以遂為鎮西將軍遣還金城騰為征西將軍鎮南將軍蜀志曰黃權字公衡伐吳敗於白帝既附魏文帝曰君捨逆効順欲追蹤陳韓耶權曰臣降吳不可歸蜀無路是以歸命敗軍之將免死為幸何古人之可慕帝善之拜鎮南將軍吳志曰吕岱既定交州進討九真斬獲萬數又遣從事南宣國化及徼外扶南林邑堂明諸王各遣使奉貢權嘉其功進拜鎮南將軍晉書曰杜預為鎮南將軍繕兵甲曜威武乃簡精鋭襲呉西陵督張政大破之以功増封三百}
