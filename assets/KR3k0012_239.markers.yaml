  - {type: variant, offset: 6, length: 0, content: '', SBCK: 十五户政呉之名將也據要害之地耻以無備取敗不以所喪之實告于孫皓預欲間呉邊將乃表還所獲之衆於皓皓果召政遣武昌監劉憲代之故}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 十五户政吳之名將也㨿要害之地恥以無備取敗不以所喪之實告于孫皓預欲間吳邉將乃表還所獲之衆於皓皓果召政遣武昌監劉憲代之故}
  - {type: variant, offset: 6, length: 0, content: '', krp: 十五户政呉之名將也據要害之地耻以無備取敗不以所喪之實告于孫皓預欲間呉邊將乃表還所獲之衆於皓皓果召政遣武昌監劉憲代之故}
  - {type: variant, offset: 7, length: 0, content: '', SBCK: 軍臨至使其將帥移易以成傾蕩之􅀔預處分旣定乃啓請伐呉之期後魏書曰唐和詣闕丗祖優之待以上客髙宗以和歸誠先朝拜鎭南將軍鎭北將軍魏氏春秋曰許元字士宗爲鎭北將軍都督河北諸軍事蜀志魏延字文長先主大㑹群臣問延曰今委卿以重任卿居之欲云何延對曰􅀂曹操舉天下而來請爲大王距之偏將十萬之衆至請爲大王呑之先主稱善衆咸壯其言先主踐尊號進拜鎭北將軍晉書曰何曽爲鎭北將軍文帝使武帝齊王攸送之帝又過其子曽先勑劭曰客必過汝汝當預嚴劭不冠帶停帝良乆曽深以爲譴劭曽見崇重如此安東將軍王隱晉書曰武帝伐呉以王渾爲安東將軍晉公卿禮秩曰世祖以扶風王駿爲安東大將軍安西將軍魏志曰曹仁字子孝太祖從弟也少好弓馬弋獵俊豪並起仁亦隂結少年周遊淮泗之間遂從太祖爲别部司馬太祖討馬超以仁行安西將軍安南將軍謝承後漢書曰光武以岑彭爲安南將軍安北將軍沈約宋書曰劉秀之東莞莒人少孤貧有志操爲安北將軍雍州刺史上車馬幸新亭視秀之發引平東將軍王隱􅀳書曰武帝伐呉以王濬爲平東將軍平西將軍蜀志曰馬超聞先主圍劉璋於成都宻書請降先主遣人迎超超將兵徑到城下城中震怖璋即稽首以超爲平西將軍沈約宋書曰臨川王義慶爲平西將軍平南將軍王隱晉書曰武帝伐呉以胡奮爲平南將軍平北將軍魏志曰太祖征兾州張燕求佐軍拜平北將軍雜號將軍上鎭軍將軍魏志曰黄􅀄七年魏文以陳群爲鎭軍大將軍録尚書事受顧命又曰甘露元年以石苞爲鎭軍將軍沈約宋書曰齊王攸爲鎭軍驃􅀐上後復舊撫軍將軍魏志曰黃􅀄四年以司馬宣王爲撫軍大將軍輔政又曰齊王嘉平三年以司馬景王爲撫軍大將軍輔政語林曰簡文爲撫軍時坐牀上生塵不聽左右拂去見䑕行跡視以爲嘉有叅軍見䑕以手板格煞之撫軍謂曰無乃不可乎征虜將軍東觀漢記曰􅀕遵爲征虜將軍廉㓗奉公光武歎曰安得憂國奉公如􅀕征虜者乎魏志曰太祖以臨淄侯植爲征虜將軍遣救曹仁呼有所勑而植醉於是罷之又曰南陽周太好立功善用兵以爲征虜將軍沈約宋書曰征虜將軍世號金紫將軍冠軍}
