  - {type: variant, offset: 1386, length: 483, content: 秩與大將軍同又曰明帝即位以東平王蒼為驃騎輔政開東閣延英雄及蒼歸國有驃騎時吏丁牧周相以蒼敬賢下士不忍去之遂為王家大夫數十年事祖及孫帝聞襃美又曰驃騎將軍漢官也長史司馬各一人金璋紫綬五時朝服武冠佩山玄玉光武中興諸將皆稱大後天下既定武官悉省東觀漢記明帝詔曰東平王蒼寬愽有謀可以託六尺之孤臨大節而不可奪其名以蒼為驃騎將軍又曰張意拜驃騎將軍討東甌備水戰之具一戰大破所向無前又曰其將軍不常置比公者又有驃騎將軍建武二十年復置驃騎將軍位次公有長史一人後漢書曰劉隆為驃騎將軍行大司馬事隆奉法自守視事八歲上將軍印綬罷賜養牛上樽酒十斛應劭漢官儀曰漢興置驃騎將軍位次丞相隋書曰崔彭轉驃騎恒典宿衛性謹密在省闥二十餘年每當上在仗危坐終日未嘗有怠惰之容上甚嘉之上每謂彭曰卿當上日我寢處自安又嘗曰卿弓馬固以絕人頗知學不彭曰臣少愛周禮尚書每於休沐之暇不敢廢也上曰試為我言之彭因說君臣戒慎之義上稱善韋昭辯釋名曰驃騎將軍騎將軍秩比三公辯云此二將軍秩本二千石世說曰何驃騎弟第五以高情遜避而驃騎令仕對曰然第五之稱何必減之驃騎陳思王輔臣論曰魁傑雄特秉心平直威嚴足憚風行草靡戎昭果毅折衝厭難者司馬驃騎梁簡文帝讓驃騎, SBCK: ''}
