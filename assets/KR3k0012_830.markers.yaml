  - {type: variant, offset: 3558, length: 1, content: 自, krp: 江祐求雲女婚姻因酣以巾箱中剪刀與雲曰且以爲娉雲笑受之至是祐貴雲又因酣曰昔與將軍俱爲黄鵠今將軍化爲鳯皇荆布之室理隔華盛因出剪刀還之南史曰沙門寳誌不知何許人齊宋之交稍顯靈迹𬒳髪徒跣語黙不倫恒以銅鏡剪刀鑷屬挂杖}
  - {type: variant, offset: 3560, length: 1, content: 置, SBCK: 之而趍預言未兆識之多驗脩復}
  - {type: variant, offset: 3560, length: 1, content: 置, WYG: 之而趨預言未兆多驗修復}
  - {type: variant, offset: 3560, length: 1, content: 置, krp: 之而趍預言未兆識之多驗脩復}
  - {type: variant, offset: 3562, length: 0, content: '', SBCK: 陵故事曰后梓宫用剪刀六枚東宫舊事曰太子納妃有龍頭金縷交刀四銀牙鏁綵帶副丗􅀃曰爰綜爲新安太守郡南界有刻石爰至其下醼飲忽有人得剪刀於石下者衆咸異之綜問主簿主簿對曰昔呉長沙桓王嘗飲餞孫洲父老云此洲狹而長君當爲長沙乎事果應夫三刀爲州得交刀君亦當交州後果交州幽明録同衣軸丗􅀃曰張華將敗有飄風吹衣軸六七􅀝壁管禮記内則曰鍼管線纊荀卿針縷賦曰管以爲母魏武上雜物䟽曰}
  - {type: page-break, offset: 3562, content: '', id: KR3k0012_SBCK_830-7b}
  - {type: variant, offset: 3562, length: 0, content: '', WYG: 靈故事曰后梓宫用剪六枚東宫舊事曰太子納妃有龍頭金縷交刀四銀牙鏁綵帶副世說曰爰綜為新安太守郡南界有大石爰至其下醼飲忽有人得剪刀於石下者衆或疑之持問主簿主簿對曰昔呉長沙桓王嘗夢飲孫洲父老云此州狹而長君為長沙乎果應夫三刀為州得交刀君亦當交州後果交州衣軸世説曰張華將敗有飄風吹衣軸六七壁管禮記内則曰鍼管線纊荀卿針賦曰鏤管以為母魏武上雜物疏曰}
  - {type: page-break, offset: 3562, content: '', id: KR3k0012_WYG_830-11b, image: WYG0900/WYG0900-0348d.png}
  - {type: variant, offset: 3562, length: 0, content: '', krp: 陵故事曰后梓宫用剪刀六枚東宫舊事曰太子納妃有龍頭金縷交刀四銀牙鏁綵帶副丗說曰爰綜爲新安太守郡南界有刻石爰至其下醼飲忽有人得剪刀於石下者衆咸異之綜問主簿主簿對曰昔呉長沙桓王嘗飲餞孫洲父老云此洲狹而長君當爲長沙乎事果應夫三刀爲州得交刀君亦當交州後果交州幽明録同衣軸丗說曰張華將敗有飄風吹衣軸六七倚壁管禮記内則曰鍼管線纊荀卿針縷賦曰管以爲母魏武上雜物䟽曰}
