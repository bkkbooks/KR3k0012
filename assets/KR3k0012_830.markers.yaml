  - {type: variant, offset: 3558, length: 1, content: 自, SBCK: 江祐求雲女婚姻因酣以巾箱中剪刀與雲曰且以爲娉雲􅀏受之至是祐貴雲又因酣曰昔與將軍俱爲黄鵠今將軍化爲鳯皇荆布之室理隔華盛因出剪刀還之南史曰沙門寳誌不知何許人齊宋之交稍顯靈迹􅀍髪徒跣語黙不倫恒以銅鏡剪刀鑷屬挂杖}
  - {type: variant, offset: 3558, length: 1, content: 自, WYG: 江祏求雲女婚酒酣以巾箱中剪刀與雲曰且以為聘雲笑受之至是祏貴雲又因酣曰昔與將軍俱為黄雀今將軍化為鳯凰荆布之貨理隔華盛因出剪刀還之南史曰沙門寶誌不知何許人齊宋之交稍顯靈迹被髪徒跣語黙不倫恒以銅鏡剪刀鑷屬挂杖}
