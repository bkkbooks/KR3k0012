  - {type: variant, offset: 237, length: 313, content: 厚誣君子遂適齊左傳昭元曰魯曾阜曰賈而欲贏而惡囂乎言譬如商賈求贏利者不得惡諠囂之聲又昭公曰子干歸韓宣子問於叔向曰子干其濟乎對曰難宣子曰同惡相求如市賈焉何難宣子謂棄疾親恃子干共同好惡故言如市賈同利以相求對曰無與同好誰與同惡言弁疾本不與子干同好則亦不得同惡又昭公六曰臧會奔郈郈魴假使為賈正焉郈在東平旡鹽縣東南魴假郈邑大夫賈正掌貨物使有常賈若市吏又昭公十六年曰鄭子產對韓宣子曰昔我先君桓公與商人皆出自周鄭本在周畿內恒公東遷并與商人俱庸次比耦庸用也次更相從耦耕以艾殺此地斬之蓬蒿藜藿而共處之世有盟誓以相信也曰爾無我叛我無強賈旡強市其物毋或匄奪爾有利市寶賄我勿與知恃此質誓故能相保以至於今今吾子以好來辱而謂敝邑強奪商人是教敝邑背盟誓也毋乃, WYG: 輕重繩墨誠陳}
  - {type: variant, offset: 237, length: 7, content: 厚誣君子遂適齊, krp: 爲民立法者而作此量信至於道之中矣嘉量旣成以觀四國以觀示四方使放象之永啓厥後兹器維則}
