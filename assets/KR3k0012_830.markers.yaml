  - {type: variant, offset: 1031, length: 1, content: 范, WYG: ''}
  - {type: variant, offset: 1033, length: 311, content: 為始興內史入境撫以恩德罷去亭候商賈露宿梁書曰陸驗少而貧若落拓無行邑人郁吉卿者甚富驗傾身事之吉卿貸以錢米驗借以商販遂致千金因出郡下散貲以事權貴北史曰和士開母喪託附者咸往喪哭鄴中富商丁周嚴興等並為義孝有一士人在哭限封孝琰入弔出謂人曰嚴興之南丁周之北有一朝士號叫甚哀聞者傳之士開知而大怒管子曰商人通賈倍道兼行以夜續日千里而不遠者利在前也魯連子連卻秦軍平原君欲封之終不肯受平原君乃置酒酒酣起前以千金為壽先生笑曰所貴天下之士者為人排患釋難解人之締結即有取是商賈之事連不忍為也尸子曰子貢衛之賈人也韓子曰鄙諺曰長袂善舞多資善賈此言多資易為工也又曰秦韓攻魏昭卯西說罷之齊荊攻魏卯東說罷之魏襄王養之以五車將軍養以五乘使為將軍卯曰伯夷以將軍葬, SBCK: 幸}
