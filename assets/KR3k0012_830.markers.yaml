  - {type: variant, offset: 3679, length: 352, content: 謂之負他音大亦謂之荷郭璞注曰今江東單檐兩頭物為騰莊子嬴糧起之檐者用膂力因以名之先賢行狀曰平原王烈字彥考國中有盜牛者牛主得而放之盜者曰子既放我幸無使王烈聞之間年國中行路老父負檐重有人代檐行數十里至家而去問姓名不語頃之老父失劍於路有人得而守之至暮劍主還見之乃代檐人也老父曰子前代吾檐不得姓名今復守吾劍子誠賢人可語吾姓名以告王烈使人問之乃昔時盜牛人也烈使國人表其廬而異焉舂說文曰舂擣粟也周禮地官下曰舂人掌供禾物禮記檀弓上曰鄰有喪舂不相鄭玄曰相以音聲相助穀梁傳文公曰禮宗廟之事君親割夫人親舂漢書刑法志曰罪人獄已決充為城旦舂滿三歲為鬼薪白粲漢書曰呂后囚戚夫人永巷令舂又曰陳咸為南陽太守所居以殺伐立威豪猾吏乃大姓犯法論輸府為地臼木杵舂不中程輒加罪笞又曰江都王建宮人八子有過者輒令嬴立或繫居樹上或脫鉗以鈆杵舂不中程輒掠, SBCK: 罰}
