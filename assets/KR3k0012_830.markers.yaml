  - {type: variant, offset: 3, length: 0, content: '', SBCK: 十尺寸量秤剪刀衣軸管針醫針附鐟縫尺寸禮記王制曰古者以周尺八尺爲歩今以周尺六尺四寸爲歩古者百􅅿當今東田百四十六􅅿三十歩古者百里當今百二十一里六十歩四尺二寸二分周尺之數未詳聞也案禮制周猶以十寸爲尺蓋六國時多變亂法度或言周尺八寸則歩更爲八八六十四寸以此計之古者百􅅿當今百五十六畒二十五歩古者百里當今百二十五里漢書曰度者分寸尺丈引也所以度長短也度音大各反本起黄鍾之長以子榖秬􅁰中者師古曰秬即黒􅁰中者不大不小也言取黑黍穀子大小中者率爲分寸也一黍之廣度之}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 十尺寸禮記王制曰古者以周尺八尺為步今以周尺六尺四寸為步古者百畝當今田百四十六畝三十步古者百里當今百二十一里六十步四尺二寸二分漢書曰度者分寸尺丈引也所以度長短也本起黄鍾之長以子糓秬黍中者率一黍之廣度之}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_WYG_830-1b, image: WYG0900/WYG0900-0343d.png}
  - {type: variant, offset: 3, length: 0, content: '', krp: 十尺寸量秤剪刀衣軸管針醫針附鐟縫尺寸禮記王制曰古者以周尺八尺爲歩今以周尺六尺四寸爲歩古者百畝當今東田百四十六畝三十歩古者百里當今百二十一里六十歩四尺二寸二分周尺之數未詳聞也案禮制周猶以十寸爲尺蓋六國時多變亂法度或言周尺八寸則歩更爲八八六十四寸以此計之古者百畝當今百五十六畒二十五歩古者百里當今百二十五里漢書曰度者分寸尺丈引也所以度長短也度音大各反本起黄鍾之長以子榖秬黍中者師古曰秬即黒黍中者不大不小也言取黑黍穀子大小中者率爲分寸也一黍之廣度之}
  - {type: xml-element, offset: 4, content: '', id: KR3k0012_CHANT_830-bkkxmlele1}
  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_830-1a.1}
  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_830-1a.2}
  - {type: variant, offset: 4, length: 5, content: 商賈左傳僖, SBCK: 十分黄鍾之長一爲一分十分爲古尺一具隋書曰丗稱有田父於野地中得周時玉尺便是天下正尺荀朂試以校尺所造金石絲竹皆短校一米管子曰尺寸㝷丈者所以得短長之情也故以尺寸量短長則萬舉而萬不失矣是故尺寸之度雖冨貴衆強不爲益長雖卑辱貧賤則弗爲損度}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_830-1b}
  - {type: variant, offset: 4, length: 3, content: 商賈左, WYG: 十分黄鍾之長一為一分十分為寸十寸為尺十尺為丈十丈為引而五度審矣其法用銅高一寸廣二寸長一丈而分寸丈尺存焉用竹為引髙一分廣六分長十丈其方法矩髙廣之數隂陽之象也分者自三㣲而成著可分别也寸者忖也尺者蒦也丈者張也引者信也夫度者引於分忖於寸蒦於尺張於丈信於引引者信天下也職在内官内官置名廷尉掌之魏略曰昔長安市儈有劉仲始者一為市吏所辱乃感激蹹其尺折之遂行學問經明行修流名海内後以有道徵不肯就衆人歸其髙晉書荀朂别}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_WYG_830-2a, image: WYG0900/WYG0900-0344a.png}
  - {type: variant, offset: 4, length: 5, content: 商賈左傳僖, krp: 十分黄鍾之長一爲一分十分爲古尺一具隋書曰丗稱有田父於野地中得周時玉尺便是天下正尺荀朂試以校尺所造金石絲竹皆短校一米管子曰尺寸㝷丈者所以得短長之情也故以尺寸量短長則萬舉而萬不失矣是故尺寸之度雖冨貴衆強不爲益長雖卑辱貧賤則弗爲損度}
  - {type: xml-element, offset: 6, content: '', id: KR3k0012_CHANT_830-bkkxmlele2}
  - {type: xml-element, offset: 6, content: '', id: KR3k0012_CHANT_830-bkkxmlele3}
  - {type: 'tls:seg', offset: 6, content: '', id: KR3k0012_CHANT_830-1a.3}
  - {type: punctuation, offset: 6, content: 《, id: KR3k0012_CHANT_830-bkkpn1}
  - {type: punctuation, offset: 8, content: ‧, id: KR3k0012_CHANT_830-bkkpn2}
  - {type: variant, offset: 8, length: 1, content: 僖, WYG: 曰魏杜䕫制律乖錯朂知漢尺漸長於古四分䕫依為律故不諧乃令著作郎劉恭依周禮制尺鑄銅律吕以諧音韻後得古玉律鍾磬與新律合詔賜古尺一隋書曰世稱有田父於野地中得周時玉尺便是天下正尺荀朂試以較尺所造金石絲竹短較一米管子曰尺寸尋丈者所以定短長之準也故以尺寸量短長則萬舉而萬不失矣是故寸尺之度雖富貴衆强不為益長雖卑辱貧賤不為損度}
  - {type: page-break, offset: 8, content: '', id: KR3k0012_WYG_830-2b, image: WYG0900/WYG0900-0344b.png}
  - {type: variant, offset: 10, length: 1, content: 下, SBCK: 平而無所偏故姧詐之人弗能誤也故明法者不可巧以詐僞有㝷丈之數者不可欺以長短又}
  - {type: variant, offset: 10, length: 1, content: 下, WYG: 正而無所偏故好詐之人弗能誤也故明法者不可巧以詐偽有尋丈之數者不可欺以長短又}
  - {type: variant, offset: 10, length: 1, content: 下, krp: 平而無所偏故姧詐之人弗能誤也故明法者不可巧以詐僞有㝷丈之數者不可欺以長短又}
  - {type: punctuation, offset: 11, content: 》, id: KR3k0012_CHANT_830-bkkpn3}
