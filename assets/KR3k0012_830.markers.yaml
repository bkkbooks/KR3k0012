  - {type: variant, offset: 4184, length: 2, content: 夷吾, krp: 殫鳥則千金不及丸泥縫緝則長劒不及數分之針又曰結巾投地而莬走鍼綴丹帶而蛇行西京雜記曰漢綵女常以七月七日夜穿七針於開襟樓俱以習之說苑曰客因孟嘗君寄於齊王而不用客反見孟嘗君曰不知君之過臣之罪孟甞君曰夫縷因針而入不因針而急典論曰劉表子弟好酒設大針於坐端有醉伏者輙刺驗其醉醒王子年拾遺記曰魏文帝美人薛夜來妙於針巧雖處於深帷重幕之内不用燈燭裁衣製作六成非夜來所縫製帝不服也宫内號曰針神諸葛元遜傳曰昔元遜對南陽韓文晃誤呼其父字晃難之曰何人子前呼人父字是禮乎諸葛笑荅曰向天穿針而不見天何者不輕天意有所在耳即罰文晃酒一盃王郎新奏議曰至於遺針御衣懼傷至尊之體故加之以髠刑將欲懲戒先傷以防絶後傷輿地志曰齊武起曽城觀七月七夕宫人登之穿針丗謂之穿針樓劉義恭啓事曰聖恩賜金銀針七色縷并格一犀棟刷匣副綿布兆珎服寳翫以恊嘉辰孫卿針賦曰有物於此生於山阜處於堂室不盗不竊穿窬而行日夜合離以成文章以能合從又善連横下覆百姓上飾帝王時用則存不用則亡臣愚弗識敢請之王曹大家針賦曰鎔秋金之剛精形微妙而直端性通逹而漸進博庶物而一貫醫針附魏志曰樊何從華他學何善針凡醫咸言背及胷藏之間不可妄針何針背入一二寸巨闕入五六寸疾輒瘳三輔舊事曰江充爲桐人長尺以針刺其腹埋太子宫中充曉醫術因言其事燉煌實録曰張存喜針存有奴好逃亡存宿行針縮奴脚欲使則針解之王渾表曰臣有氣病善夜發服半夏湯或服湯不解尚取針前殿中醫趙恭思纂見給事醫在醫署纂能針有方伎乞以纂名課稱考課醫給臣自療治梁書曰王僧孺多識古事侍郎金元起欲注素問訪以砭石僧孺荅曰古人當以石爲針必不用鐵說文有此砭字許愼云以石刺病也東山經髙氏之山多針石郭璞云可以爲砭針春秋美疹不如惡石服子愼注云石砭石也季丗無復佳石故以鐵代之耶唐書曰貞觀中太宗幸甄權宅權頴川人醫術爲天下㝡孫思邈師之以授針法時年一百三歳唐書曰太宗征髙麗江夏王道宗在陣損足上親}
