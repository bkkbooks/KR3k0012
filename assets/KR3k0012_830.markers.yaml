  - {type: punctuation, offset: 42, content: 。, id: KR3k0012_CHANT_830-bkkpn13}
  - {type: 'tls:seg', offset: 42, content: '', id: KR3k0012_CHANT_830-1a.12}
  - {type: variant, offset: 42, length: 7, content: 韋先韋乃入牛古, WYG: 匊謂之豆豆四謂之區區四謂之釡釡二半謂之藪藪謂之缶缶謂之鍾鍾二有半謂之秉秉十六斛也曹瞞𫝊曰太祖常賦廩糓不足私謂主}
