  - {type: variant, offset: 4184, length: 2, content: 夷吾, WYG: 彈鳥則千金不及丸泥縫緝則長劍不及數分之針又曰結巾投地而兎走針綴丹帶而蛇行西京雜記曰漢彩女常以七月七日夜穿七針於開􅁭樓俱以習之説苑曰客因孟嘗君寄于齊王而不用客反見孟嘗君曰不知君之過臣之罪孟嘗君曰夫縷因針而入不因鍼而急典論曰劉表子弟好酒設大針於坐端有罪狀者輙刺驗其醉醒王子年拾遺記曰魏文帝美人薛夜來妙於針巧雖處於深帷重幕之内不用燈燭裁衣製作立成非夜來所縫製帝不服也諸葛元𫝊曰昔元遜對元南陽韓文晃誤呼其父字晃難之曰何人子前呼人父字是禮乎諸葛笑答曰向天穿針而不見天何者不輕天意有所在耳即罰文晃酒一盃王即新奏議曰至於遺針御衣懼傷至尊之體故加之以髠刑欲將懲戒先傷以防絶後傷輿地志曰齊武起曾城觀七月七夕宫人登之穿針世謂之穿針樓劉義恭啓事曰聖恩賜金銀針七色縷幷格一犀棟刷匣副綿布兆珍服寶玩以協嘉辰孫卿針賦曰有物於此生於山阜處於室堂不盜不竊穿窬而行日夜合離以成文章以能合從又善連横下覆百姓上飾帝王者特用則存不用則亡臣愚弗識敢請之王曹大家縷賦曰鎔秋金之剛精形㣲妙而直端性通逺而漸進􅀶庶物而一貫醫針附魏志曰樊阿從華佗學何善針凡醫咸言背及胷藏之間不可妄針阿針背入一二寸巨闕入五六寸疾輒瘳三輔舊事曰}
