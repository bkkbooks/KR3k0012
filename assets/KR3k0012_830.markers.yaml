  - {type: variant, offset: 3563, length: 0, content: '', SBCK: 宫雜物雜􅀞象牙鍼管一枚針􅀃文曰針綴衣也禮記内則曰舅姑衣裳綻裂紐針請􅀘綴左傳成公上曰楚伐魯賂以執針百人女工呉書曰虞翻年十二客詣翻兄不過之乃}
  - {type: variant, offset: 3563, length: 0, content: '', WYG: 宫雜物雜象牙管鍼筒一枚針説文曰針綴史也禮記内則曰舅姑衣裳綻裂紉針請補綴左𫝊成公上楚伐魯賂以執針百人呉書曰虞翻年十二客詣翻兄不過之乃}
  - {type: page-break, offset: 3563, content: '', id: KR3k0012_WYG_830-12a, image: WYG0900/WYG0900-0349a.png}
  - {type: variant, offset: 3563, length: 0, content: '', krp: 宫雜物雜畫象牙鍼管一枚針說文曰針綴衣也禮記内則曰舅姑衣裳綻裂紐針請𥙷綴左傳成公上曰楚伐魯賂以執針百人女工呉書曰虞翻年十二客詣翻兄不過之乃}
  - {type: variant, offset: 3564, length: 0, content: '', SBCK: 客書曰虎魄不受腐芥慈石不受曲針王隱晉書曰東宫舊制月請五十万以供衆用愍懐太子桓􅊥取三月以供賤妾舎人杜錫數諌太子後取針着錫常坐處氊中錫上床刺足血流晋書曰鳩摩羅什嘗講經于草堂寺姚興及朝臣大德沙}
  - {type: page-break, offset: 3564, content: '', id: KR3k0012_SBCK_830-8a}
  - {type: variant, offset: 3564, length: 0, content: '', WYG: 客書曰琥珀不受腐芥磁石不受曲鍼王隱晉書曰東宫舊制月請五十萬以供給衆用愍懷太子恒探取三月以供賤妾舍人杜錫數諫太子後取針着錫常坐處氊中錫上床刺足血流晉書曰鳩摩羅什講于寺姚興及朝臣大德沙}
