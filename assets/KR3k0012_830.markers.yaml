  - {type: variant, offset: 12, length: 6, content: 秦師及滑鄭商, SBCK: 以規矩爲方圎則成以尺寸量短長則得以法數治民則安故事廣於理者其成􅀂神孟子曰陳代謂孟子云枉尺直㝷􅀂冝可爲枉尺直㝷欲使孟子屈巳宗道也尸子云孔子曰詘寸而信尺小枉而大直吾爲之者也韓子曰釋法術而心治堯不能正一國去規矩而妄意度奚仲不能成輪廢尺寸而差短長王爾不能半中使中主守法術拙匠執規矩尺寸則萬不失孔叢子曰跬一舉足也倍跬謂之歩四尺謂之仞倍仞謂之㝷㝷舒兩肱也倍㝷謂之常五尺謂之墨倍墨謂之丈倍丈謂之端端謂之兩倍兩謂之疋兩有五謂之束家語曰孔子曰夫布指知寸布寸知尺舒肱知㝷舒身知常斯不逺之則也白虎通同􅀃苑曰度量衡以粟生之十粟爲一分十分爲一寸十寸爲一尺十尺爲一丈夣書曰丈尺爲}
  - {type: page-break, offset: 12, content: '', id: KR3k0012_SBCK_830-2a}
  - {type: variant, offset: 12, length: 6, content: 秦師及滑鄭商, WYG: 以規矩為方圓則成以尺寸量長短則行以法制民則安故事廣於理者其成若神孟子曰陳代謂孟子云枉尺直尋宜若可為枉尺直尋欲使孟子屈己信道也尸子云孔子曰詘寸而信尺小枉而大直吾不為也韓子曰釋法術而任心治堯不能正一國去規矩而委意度奚仲不能成輪廢尺寸而差短長工爾不能得中使中主守法術拙匠執規矩尺寸則萬不失孔叢子曰跬一舉足也倍跬謂之步四尺謂之仭倍仞謂之尋尋舒兩肱也倍尋謂之常五尺謂之墨倍墨謂之丈倍丈謂之端端謂之兩倍兩謂之疋兩有五謂之束家語曰孔子曰夫布指知寸布手知尺舒肱知尋舒身知常斯不逺之則也説苑曰度量衡以粟生之十粟為一分十分為一寸十寸為一尺十尺為一丈夢書曰丈尺為}
  - {type: page-break, offset: 12, content: '', id: KR3k0012_WYG_830-3a, image: WYG0900/WYG0900-0344c.png}
  - {type: page-break, offset: 12, content: '', id: KR3k0012_WYG_830-3b, image: WYG0900/WYG0900-0344d.png}
  - {type: variant, offset: 12, length: 6, content: 秦師及滑鄭商, krp: 以規矩爲方圎則成以尺寸量短長則得以法數治民則安故事廣於理者其成若神孟子曰陳代謂孟子云枉尺直㝷若冝可爲枉尺直㝷欲使孟子屈巳宗道也尸子云孔子曰詘寸而信尺小枉而大直吾爲之者也韓子曰釋法術而心治堯不能正一國去規矩而妄意度奚仲不能成輪廢尺寸而差短長王爾不能半中使中主守法術拙匠執規矩尺寸則萬不失孔叢子曰跬一舉足也倍跬謂之歩四尺謂之仞倍仞謂之㝷㝷舒兩肱也倍㝷謂之常五尺謂之墨倍墨謂之丈倍丈謂之端端謂之兩倍兩謂之疋兩有五謂之束家語曰孔子曰夫布指知寸布寸知尺舒肱知㝷舒身知常斯不逺之則也白虎通同說苑曰度量衡以粟生之十粟爲一分十分爲一寸十寸爲一尺十尺爲一丈夣書曰丈尺爲}
  - {type: punctuation, offset: 16, content: ，, id: KR3k0012_CHANT_830-bkkpn6}
  - {type: 'tls:seg', offset: 16, content: '', id: KR3k0012_CHANT_830-1a.5}
  - {type: variant, offset: 19, length: 4, content: 弦高將市, SBCK: 正長短夣得丈尺欲正人也魏武上雜䟽曰中宫用物􅄂􅀞象列尺一枚貴人公主有象牙尺三十枚宫人有象牙尺百五十枚骨尺五十枚量周禮冬官考工記曰㮚氏爲量改煎金錫則不耗消涷之精不復減也㮚古文或作歴􅀇謂量當與鍾鼎同齊工異者大器不耗然後權之權謂稱分之也雖異法用金必齊權之然後凖之凖故書或作水杜子春云當爲水金噐有孔者水入孔中則當重也玄謂凖擊平王之又當齊大小凖之然後量之鑄之}
  - {type: page-break, offset: 19, content: '', id: KR3k0012_SBCK_830-2b}
  - {type: variant, offset: 19, length: 5, content: 弦高將市於, WYG: 正長短夢得丈欲正人也魏武上雜疏曰中官用物雜闕列尺一枚貴人公主有象牙尺三十枚宫人有象牙尺百五十枚骨尺五十枚量}
  - {type: page-break, offset: 19, content: '', id: KR3k0012_WYG_830-4a, image: WYG0900/WYG0900-0345a.png}
  - {type: variant, offset: 19, length: 4, content: 弦高將市, krp: 正長短夣得丈尺欲正人也魏武上雜䟽曰中宫用物雜畫象列尺一枚貴人公主有象牙尺三十枚宫人有象牙尺百五十枚骨尺五十枚量周禮冬官考工記曰㮚氏爲量改煎金錫則不耗消涷之精不復減也㮚古文或作歴玄謂量當與鍾鼎同齊工異者大器不耗然後權之權謂稱分之也雖異法用金必齊權之然後凖之凖故書或作水杜子春云當爲水金噐有孔者水入孔中則當重也玄謂凖擊平王之又當齊大小凖之然後量之鑄之}
  - {type: variant, offset: 24, length: 2, content: 周遇, SBCK: 法中也量讀如量人之量量}
  - {type: variant, offset: 24, length: 2, content: 周遇, krp: 法中也量讀如量人之量量}
