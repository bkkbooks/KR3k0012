  - {type: variant, offset: 3574, length: 9, content: 相結破郡獄出武帝梁, SBCK: 肅然觀聽什忽下髙坐謂興曰有二小兒登吾肩慾障湏婦人興乃召宫女進入一交而生二子焉興甞謂什曰天師聦明超悟天下莫二何使法種無嗣遂以妓女十人逼令受之尓後不住僧坊別立廨舎諸僧名多効之什乃聚針􅄹鉢引諸僧謂之曰􅀂能見効食此者乃可畜室尔因舉匕進針與常食不別諸僧愧服乃止又曰頋愷之常恱一隣女挑之弗從乃圖其形於壁以􅁄針釘其心女遂患心痛愷之因致其情女從之遂宻去針而愈宋}
