  - {type: variant, offset: 25, length: 1, content: 遇, WYG: 禮冬官考工記曰㮚氏為量改煎金錫則不耗不耗然後權之權之然後凖之凖之然後量之量}
  - {type: punctuation, offset: 27, content: ，, id: KR3k0012_CHANT_830-bkkpn8}
  - {type: 'tls:seg', offset: 27, content: '', id: KR3k0012_CHANT_830-1a.7}
  - {type: variant, offset: 28, length: 4, content: 乘韋先牛, SBCK: 爲鬴􅀷尺内方尺而圜其外其實一鬴以其容爲之名也四升曰豆四豆曰區四區曰鬴鬴六斗四升也鬴十則鍾方尺積千寸於今粟米法少二升八十一分升之二}
  - {type: variant, offset: 28, length: 4, content: 乘韋先牛, WYG: 為鬴深尺内方尺而圜其外其實一鬴其臋一寸其實一豆其耳二寸其實一升重一鈞其聲中黄鍾之宫槩而不稅其銘曰時文思索允臻其極嘉量既成以觀四國永啓厥後兹器維則左𫝊昭公三年云晏子曰齊舊四量豆區釜鍾四升為豆各自其四以登於釡釡}
  - {type: page-break, offset: 28, content: '', id: KR3k0012_WYG_830-4b, image: WYG0900/WYG0900-0345b.png}
  - {type: variant, offset: 28, length: 4, content: 乘韋先牛, krp: 爲鬴深尺内方尺而圜其外其實一鬴以其容爲之名也四升曰豆四豆曰區四區曰鬴鬴六斗四升也鬴十則鍾方尺積千寸於今粟米法少二升八十一分升之二}
  - {type: variant, offset: 33, length: 0, content: '', WYG: 則鍾陳氏三量皆登一焉鍾乃大矣以家量貸而以公量収之漢書曰量者龠合升斗斛也所以量多少也本起於黄鍾之龠用度數審其容以子糓秬黍中者千有}
  - {type: variant, offset: 34, length: 15, content: 犒師商行賈也乘四韋先韋乃入牛古, SBCK: 其數必容鬴此言大方耳圜其外}
  - {type: variant, offset: 34, length: 5, content: 犒師商行賈, WYG: 百實其龠以井水凖其槩十龠為合十合為升十升為斗十斗為斛而五量嘉矣其法用銅方尺而圜其外旁有庣焉其上為斛其下為斗左耳為升右耳為龠其狀似爵以縻爵禄上三下二參天兩地圜而函方左一右二隂陽之象}
  - {type: page-break, offset: 34, content: '', id: KR3k0012_WYG_830-5a, image: WYG0900/WYG0900-0345c.png}
  - {type: variant, offset: 34, length: 15, content: 犒師商行賈也乘四韋先韋乃入牛古, krp: 其數必容鬴此言大方耳圜其外}
  - {type: punctuation, offset: 36, content: ，, id: KR3k0012_CHANT_830-bkkpn9}
  - {type: 'tls:seg', offset: 36, content: '', id: KR3k0012_CHANT_830-1a.8}
  - {type: punctuation, offset: 37, content: ，, id: KR3k0012_CHANT_830-bkkpn10}
  - {type: 'tls:seg', offset: 37, content: '', id: KR3k0012_CHANT_830-1a.9}
  - {type: punctuation, offset: 40, content: 。, id: KR3k0012_CHANT_830-bkkpn11}
  - {type: 'tls:seg', offset: 40, content: '', id: KR3k0012_CHANT_830-1a.10}
  - {type: variant, offset: 40, length: 1, content: 乘, WYG: 其圜象規其重二鈞備氣物之數合萬有一千五百二十聲中黄鍾始於黄鍾而反覆焉君制器之象也龠者黄鍾律之實也躍㣲動氣而生物也合者合龠之量也升者登合之量也斗者聚升之量也斛者角斗平多少之量也夫量者躍於龠合於合登於升聚於斗角於斛也職在太倉大司農掌之也孔叢子曰一手之盛謂之溢兩手之盛謂之匊}
  - {type: page-break, offset: 40, content: '', id: KR3k0012_WYG_830-5b, image: WYG0900/WYG0900-0345d.png}
