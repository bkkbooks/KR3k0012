  - {type: variant, offset: 253, length: 1, content: 賈, SBCK: 量者龠合升斗斛也所以量多少也本起於黄鍾之龠用度數審其容師古曰因度以生量也其容謂其中所容受之多少也以子穀秬黍中者千有二百實其龠以井水凖其槩槩欲其直故以水平之井水清清則平也師古曰槩所以槩平斗斛之上者也十龠爲合十合爲升十升爲斗十斗爲斛}
  - {type: variant, offset: 253, length: 1, content: 賈, krp: 量者龠合升斗斛也所以量多少也本起於黄鍾之龠用度數審其容師古曰因度以生量也其容謂其中所容受之多少也以子穀秬黍中者千有二百實其龠以井水凖其槩槩欲其直故以水平之井水清清則平也師古曰槩所以槩平斗斛之上者也十龠爲合十合爲升十升爲斗十斗爲斛}
  - {type: variant, offset: 255, length: 0, content: '', SBCK: 五量嘉矣其法用銅方尺而圎其外旁有焉師古曰不滿之處也音吐彫反其上爲斛其下爲斗其上謂仰斛也其下謂覆斛之厎受一斗也左耳爲升右耳爲合龠其狀似爵以縻爵禄縻散也上三下二叄天兩地圜而函方左一右二隂陽之象也其圜象規其重二鈞備氣物之數合萬有一千五百二十三十斤爲鈞萬一千五百風俗通曰斛者角也􅁃三斛四斗秉二十四斛秤廣雅曰秤謂之衡錘謂之􅁠􅀃文曰秤銓也禮記曰令仲春曰是月也日夜分則同度量平􅁠衡因春分晝夜平則正之同亦平也丈尺曰度斗斛曰量稱錘曰􅁠稱上曰衡又經解曰禮之於正國也猶衡之於輕重也繩墨之於曲直也規矩之於方圜也故衡誠縣不可欺以輕重繩墨誠陳不可欺以曲直規矩誠設不可欺以方圜漢書曰衡􅁠者衡平也􅁠重也衡所以任􅁠而鈞物平輕重也其道如厎厎平也謂以厎石厲物令平齊也厎音指以見凖之正繩之直左旋見規右折見矩其在天也佐助璇機斟酌建指以齊七政故曰玉衡論語云立則見其參於前也孟康曰􅁠衡量三䓁爲參也四百八十兩者六旬行八節之象也孟康曰六甲爲六旬一歳有八節六甲周行成歳以六乗八節得之也三十斤成鈞者一月之象也石者大也權之大者也始於銖两明於斤均於鈞終於石物終石大也四鈞爲石者四時之象也重百二十斤者十二月之象也終於十二辰而復於子黄鍾之象也孟康曰稱之數始於銖終於石石重百二十斤象十二月銖之重本􅂑於子律黄鍾一􅕛容千二百􅁰爲十二銖故曰復於子黄鍾之象也千九百二十两者陰陽之數也三百八十四爻五行之象也四萬六千八十銖者萬五千五百二十物歴四時之象也而歳功成就五權謹矣魏志曰鄧哀王冲字倉舒少聦察歧嶷生五六歳智意所及有􅀂成人孫權曽致巨象太祖}
