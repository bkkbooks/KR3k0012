  - {type: variant, offset: 1018, length: 1, content: 命, WYG: 欲知其斤重訪之羣下咸莫能出其理冲曰置象大船之上而尅其水所至稱物以載之則立可知矣太祖大恱即施行焉吳志曰薛綜上疏云九真刺史朱符多以鄉人虞衰劉彦之徒分作長吏侵虐百姓强賊於民黄魚一枚收稻一斛唐書曰安禄山晩年益肥垂肚過膝自秤得三百五十斤每朝見𤣥宗戱之曰朕過見卿肚幾垂至地管子曰權衡者所以起輕重之數也然而人不事者非心惡利也權不能}
  - {type: page-break, offset: 1018, content: '', id: KR3k0012_WYG_830-8b, image: WYG0900/WYG0900-0347b.png}
  - {type: variant, offset: 1020, length: 1, content: 丞, WYG: 之多少其數而衡不能為之輕重其量也知事權衡之無益故不事也又曰有權衡之稱者不可差以輕重有尋丈之數者不可差以長短又曰㑹諸侯令曰修道路偕度量一稱數莊子曰聖人不死大盜不止為權衡以稱之則拜與權衡而竊之雖有軒冕之賞弗能勸斧鉞之威不能禁掊斗折衡而民不爭也慎子曰厝鈞石使禹察錙銖之重則不識也縣於權衡則毫髪之於權衡則不待禹之智中人之知莫不足以識之矣慎子曰名臣之心猶權衡也權左橛則右重右重則左輕輕重迭}
  - {type: page-break, offset: 1020, content: '', id: KR3k0012_WYG_830-9a, image: WYG0900/WYG0900-0347c.png}
  - {type: variant, offset: 1022, length: 5, content: 掾徵未至卒, WYG: 折天地之理也孔叢子二十四銖曰兩兩有半曰揵倍揵曰舉倍舉曰闕謂之鈸二鈸四兩謂之斤斤十二謂之衡衡有半謂之倍稱謂之鈞鈞四謂之石石四謂之皷然則皷四百八十斤也韓子曰人之不事衡石者非真亷而逺利也石不能為人多少衡不能為人輕重求索不得故人不事也明主之國官不敢枉法吏不敢為私貨賂不行是境内之事盡如衡石也説苑曰庶量衡以十粟生之十粟重一豆六豆重一銖二十四銖重一兩十六兩一斤三斤重一鈞四鈞重一石語林曰孟業為幽州其人甚肥或以為千斤武帝欲稱之難其大乃作大秤掛壁業入見帝曰朕欲試自秤有幾斤業荅曰陛下正是欲稱臣耳無所復勞聖躬於是遂稱業果得千斤夢書曰銓衡為人正也夢得衡為平端也以銓秤平財錢也重者價貴輕者賤也銓衡折敗無平人也李尤權衡銘曰夫審輕重莫若權衡正是非其唯賢明剪刀爾雅釋言曰劑剪齊也釋名曰剪刀剪進也稍進前}
