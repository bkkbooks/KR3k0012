  - {type: variant, offset: 4187, length: 2, content: 政士, WYG: 桐人長尺以針刺其腹理太子中曉醫術因言其事燉煌實録曰張存善針存有奴好逃亡存宿行針縮奴脚欲使則針解之王渾表曰臣有氣病善夜發服半夏湯或服湯不解尚取針前殿中醫趙恭思纂見給事醫在醫署纂能針有方伎乞以纂名課考稱課醫給臣自療治南史曰王僧孺多識古事侍即金元起欲注素問訪以砭石僧孺答曰古人當以石為針必不用鉄説文有此砭許慎云以石刺病也東山經高氏之山多針石郭璞云可以為砭針春秋美疢不如惡石服子慎注云石砭石也季世無復佳石故以針代之耳唐書曰貞觀中太宗幸甄權宅權潁川人醫術為天下最孫思邈師之以授針法時年二十}
