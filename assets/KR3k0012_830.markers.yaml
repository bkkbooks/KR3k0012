  - {type: variant, offset: 1345, length: 2208, content: 首山之下而天下曰夫以伯夷之賢與其稱仁而以將軍葬是手力不掩也今臣罷四國之兵而王乃與臣五乘此其稱功猶羸勝而履屩羸利也謂賈也羸利倍勝今以薄賞報大功猶羸勝之人履屩也淮南子曰賈多端則貧工多伎則窮心不一也賈多端非一國語曰晉叔向對韓宣子曰夫絳之富商韋藩木楗以過於朝韋藩韋蔽前也木揵木擔唯其功庸少也言旡功庸雖富不得服朝服過於朝而能金玉其車文錯其服文文纖縷也言商之財足以金玉其車文錯其服以旡爵位故不得為其上為藩木楗是能行諸侯賄言其財賄足以交於諸侯而無尋尺之祿無大績於民故也績功也八尺曰尋又曰齊管仲曰昔聖王處商就市井夫商群萃而州處察其四時四時所用者豫資之而監其鄉之資監親資財視其貴賤有無以知其市之賈負任檐何脊曰負肩曰檐任抱何揭服牛軺馬以周四方周偏以其所有易其所無市賤鬻貴市取鬻賣旦暮從事於此以飾其子弟相語以利相示以賴賴羸相陳以知賈少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能夫是故商子恒為商又曰越大夫種曰臣聞之賈人賈人買賤賣貴者夏則資皮冬則資絺絺葛精曰絺麤曰綌旱則資舟水則資車以待乏也白虎通曰商賈何謂也商之為言適其遠近度其有無通四方賈之為言固也固有用物以待民來以求其利者也論衡曰揚子雲作法言蜀富賈人齎錢十萬願載於書子雲不聽夫富無仁義之行猶園中之鹿欄中之牛安得妄載異苑曰晉陵曲阿楊晚資財數千萬三吳人召取直為商估治生輒得倍宜或行長江卒遇暴風及劫盜者若捉晚錢多獲免濟晚死後先所埋金悉移去鄰人陳家嘗晨起見門外忽有百許萬鏹封題是楊晚姓字然後知財物聚散必由天運負販禮記曲禮曰夫禮者自卑而尊人雖負販者必有尊也而況富貴乎負販者尤輕恌志利宜若無禮然尚書大傳曰舜販於須丘漢書曰灌嬰睢陽販繒者說苑曰鮑叔身死管仲舉上袵而哭之泣下如雨從者曰非君臣父子也管仲曰非夫子所知也吾嘗與鮑子貧販於南陽吾三辱於市不以我為怯知我故有所明也魏志曰弘農董遇字季直性質訥而好學興平中關中擾亂與兄季忠依將軍叚煨耒耜負販而常挾持經書投閑習讀其兄笑之而不改後魏書曰景穆季年頗親近左右營立田園以收其利高允諫曰夫天下者殿下之天下富有四海何求而不獲而乃與販夫販婦競此尺寸傭賃左傳襄公二十七年曰崔氏之亂在二十五年申鮮虞求奔僕賃於野以喪莊公為齊莊公服喪冬楚人召之遂如楚為右尹傳言楚能用賢史記曰倪寬貧無資用常為弟子都養時間行傭賃以給衣食行常帶經止息則誦習之又曰范睢微時弊衣間步見須賈須賈見之驚曰叔今何事范睢曰臣為傭賃賈哀之留與坐飲食乃取一綈袍以賜之漢書曰欒布梁人彭越為家人時常興布遊窮困賣傭於齊為酒家保數歲別去而布為人所略賣為奴又曰匡衡字稚圭東海人父世農夫至行衡好學家貧傭作以供資用後漢書曰鄭均好黃老書兄仲為縣遊徼頗受禮遺均數諫止不聽即脫身為傭歲餘得錢帛歸以與兄曰物盡可復得為吏坐贓終身捐棄兄感其言遂為廉潔謝承後漢書曰施延字君子少為諸生明於五經家貧母老周流傭賃避地於廬江臨湖縣種瓜後復到吳郡海鹽取卒月直賃作半路亭下以養其母是時吳會未分山陰馮敷為督郵到縣延持箒往敷知其賢者下車謝使入亭請與飯食訖脫衣與之餉餞不受華嶠後漢書曰范式為荊州刺史友人南陽孔嵩家貧親老乃變名姓傭為新野阿里街卒式行部到新野而縣選嵩為道騶迎式式見而識之呼嵩把臂謂子曰非孔仲山耶對之歎息語及平生曰昔與子俱曳長裾遊集帝學吾蒙國恩致位牧伯而子懷道隱身處於卒伍不亦惜乎昔侯羸長守於賤業晨門肆志於抱關子居九夷不患其陋貧者士之宜豈為鄙哉勑縣代嵩嵩以為先傭未竟不肯去東觀漢記曰公沙穆來遊大學無資糧乃變服客傭為吳祐賃舂祐與語大驚遂共定交於杵臼曰之間又曰初梁鴻於大家單伯通家傭春為事歸其妻具食不敢於鴻前仰視舉案常齊眉伯通察而異之曰彼傭能使其妻敬之又曰班超字仲升家貧恒為官傭寫書嘗輟書投筆歎曰大丈夫當効傅介子張騫立功異域以取封侯安能久事筆硯乎吳志曰闞澤字德潤會稽山陰人也家世農夫至澤好學家貧無資常與人傭書以供紙筆所寫既畢誦讀亦周齊書曰張敬兒之為襄陽府將也家貧每休假輒傭賃自給嘗為城東吳泰家檐水通泰所愛婢事發將被泰殺逃賣棺材中以蓋加上乃免又曰王僧孺篤愛墳籍家貧常傭書以養每寫畢諷誦亦了又曰馮道根少孤家貧傭賃以養母行得甘肥未嘗先食必遽還以遺母南史曰吳逵經飢荒男女死者三十人唯逵夫妻獲全家徒四壁立冬無被袴晝則傭賃夜則伐木燒塼妻亦同逵此誠無有懈倦漢皇德頌曰侯瑾字子瑜燉煌人少孤貧依宗人居性篤學恒慵作為資暮還輒爇柴讀書檐釋名曰檐任也力所勝任也後漢書曰趙孝字長平父普王莽時為田禾將軍任孝為郎每告歸常白衣步檐從長安還欲止郵亭亭長先時聞孝當過以有長者客掃洒待之孝既至不自名長不肯內問曰聞田禾將軍子當從長安來何時至乎孝曰尋到矣於是遂去東觀漢記曰馬成為郯令上征河北成羸衣步檐渡河詣上魏志曰曹休年十餘歲喪父獨與一客檐喪假葬攜將老母渡江至吳魏略曰吳禧字子牙京兆人也世單家貧少好學初平中三輔亂禧南客荊州不以荒擾擔負經書每以採穭餘日則誦習之晉書曰郭文字文舉少愛山水尚嘉遁洛陽陷乃步檐入吳興餘姚大辟山中獵者時往寄宿文夜為檐水而無勌色又曰譙秀字元彥在蜀遇范賁蕭敬相繼作亂秀乃避難宕渠鄉里宗族旅憑之者以百數秀年出八十眾欲代之負檐秀曰各有老弱當先營護吾氣力猶足自堪豈以垂朽之年累諸君也又曰王澄字平子兄衍妻郭氏性貪鄙欲令婢路上檐糞澄年十四諫郭以為不可又曰董養字仲道見洛陽東北步廣里地陷有二鵝出焉其蒼者飛去白者不能飛知白者國家之象顧謂謝阮季曰易稱知幾其神君等可深藏矣乃與妻荷檐入蜀莫知所終齊書曰桓康隨武帝在贛縣泰始初武帝起義為郡所縶眾皆散康裝檐一頭貯穆后一頭貯文惠太子, SBCK: ''}
