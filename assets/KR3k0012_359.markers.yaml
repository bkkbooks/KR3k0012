  - {type: variant, offset: 110, length: 2, content: 城外, WYG: 孟衢臨南投策使陽越下取策陸璣毛詩草木蟲魚疏曰椐枝葉似楨松爾雅曰椐櫃也去櫃切節以扶老即金靈壽是也今人以為馬鞭及杖孔藂子曰刑以齊民譬之於御則鞭策也漢書曰婁敬云太王以狄伐故去豳杖馬箠去居岐又曰石慶為太僕御士上問車中幾馬慶以策數馬畢舉手曰六馬又曰李廣擊匈奴匈奴}
