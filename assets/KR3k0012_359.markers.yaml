  - {type: variant, offset: 3065, length: 0, content: '', SBCK: 令冨者黄金琅勒􅄢繡弇汗弇音奄司馬彪戰略曰孟逹將蜀兵數百降魏魏文帝以逹爲新城太守太和元年諸􅁑亮從成都到漢中逹又欲應亮遺亮玉玦織成鄣汗蘇合香亮使郭摸詐降過魏興太守申儀與逹有隙摸語儀亮言玉玦者巳決織成者言謀巳成􅂫合香者言事巳合當胷後漢書曰太守趙興署鮑永功曹時有矯稱侍中止􅀓舎者興欲謁之永疑其詐諌不聽出興遂駕徃永乃拔佩刀截馬當胷乃止當胷以韋爲之也後數日莽詔書果下捕矯稱者永由是知名鞙尾服䖍通俗文曰馬鞻音樓尾曰鞙胡畎切魏百官名曰赤茸鍮石鞙尾一具鞭禮記曰獻車馬者執筴綏}
  - {type: page-break, offset: 3065, content: '', id: KR3k0012_SBCK_359-4b}
  - {type: variant, offset: 3065, length: 0, content: '', krp: 令冨者黄金琅勒罽繡弇汗弇音奄司馬彪戰略曰孟逹將蜀兵數百降魏魏文帝以逹爲新城太守太和元年諸葛亮從成都到漢中逹又欲應亮遺亮玉玦織成鄣汗蘇合香亮使郭摸詐降過魏興太守申儀與逹有隙摸語儀亮言玉玦者巳決織成者言謀巳成蘇合香者言事巳合當胷後漢書曰太守趙興署鮑永功曹時有矯稱侍中止傳舎者興欲謁之永疑其詐諌不聽出興遂駕徃永乃拔佩刀截馬當胷乃止當胷以韋爲之也後數日莽詔書果下捕矯稱者永由是知名鞙尾服䖍通俗文曰馬鞻音樓尾曰鞙胡畎切魏百官名曰赤茸鍮石鞙尾一具鞭禮記曰獻車馬者執筴綏}
