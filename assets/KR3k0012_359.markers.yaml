  - {type: variant, offset: 1752, length: 2, content: 溫嶠, WYG: 上黨鮑瑗家多䘮病貧苦淳于叔平曰君舍東北有乘樹徑至市入門數十歩當有一人持新馬鞭便就買還以懸北桑樹三年當暴得財也瑗遂承其言詣市果得馬鞭懸之正三年浚井得錢數十萬銅鐡雜噐復可二十餘萬於是家業用展病者亦愈于寳晉記曰晉永嘉初有神見衮州甄域民家免奴為主簿自號為樊道基有嫗號成夫人欲迎致使載車行當得此免奴主簿從行為譯以宣所宜汝南梅跡}
