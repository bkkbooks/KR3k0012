  - {type: variant, offset: 2284, length: 0, content: '', WYG: 語舒曰主者誤取汝賜汝秘術卜占勿貪錢賄舒亦不覺受之劉義慶幽明錄曰餘杭人沈縱家素貧與父同入山還未至家見一人左右導從四百許前車輜重馬鞭夾道鹵簿如二千石遥見縱父子便喚住就縱手中燃火縱因問是何貴人答曰是鬭山玉在餘杭南縱知是神叩頭云願見祐助後入山得一玉㹠從此如意又曰桓𤣥既肆無君之心使御史害太傅道子於安城𤣥在南州坐忽見一平上幘人持馬鞭通云蔣侯來𤣥驚􅕎然便見階下奴子御􅎻車見一士大夫自云是蔣子文君何以害太傅與為伯仲顧視之間便不復見又曰廣陵韓咎字興彦陳敏反時與敏弟恢戰於尋陽還營下馬覺鞭重見有緑錦囊中有短卷書着鞘皆不知所從來開視之故榖紙或神呪經謝氏鬼神列傳曰下邳陳超為鬼君弼所逐改名何䂓從餘杭歩道還求福絶不敢出入五年後意漸替解與親舊臨水戱酒酣共說往來超云不復畏此鬼也小俛首乃見鬼影在水中超驚怖時亦有乘馬者超借馬騎之下鞭奔驅此鬼去超逺近常如初微聞鬼云汝何規耶急急就死吴㑹分地}
