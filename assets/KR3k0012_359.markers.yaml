  - {type: variant, offset: 3071, length: 0, content: '', krp: 中幾馬慶以䇿數馬畢舉手曰六馬又曰李廣擊匈奴匈奴兵多破廣軍生得廣廣時傷置絡間而卧行十餘里廣陽死睨其傍有一胡兒騎廣騰而上胡兒馬因鞭馬南馳數十里得其餘軍又曰大司空士夜過奉常亭亭長呵之告以官名亭長醉曰寧有符傳耶士以馬箠擊亭長漢獻帝起居注曰李􅔸性喜鬼恠左道之術又於朝廷省門爲董卓設神坐數以羊祠之祠畢過省閤問帝起居求入見􅔸帶三刀手復與鞭合持一刀侍中侍郎見􅔸帶仗皆惶恐亦帶劒持刀先入在帝側張勃呉録曰大皇帝大㑹飲宴下馬迎魯肅肅入拜起禮之謂言子敬孤持鞍下馬相迎足以顯未肅趨進曰未也衆咸愕然旣坐徐舉鞭曰願麾下威德加于四海然後以安車軟輪徴肅始當顯耳帝拊掌歡笑又曰大皇帝潜軍於晥口命陸遜爲大都督假鉞大皇帝親執鞭以見之虞溥江表傳曰孫權攻合肥不能下徹軍將退兵巳上道權與吕蒙蔣欽陵統等在後張慢飲食畢垂當發魏將張遼帥六七千人奄至圍遮數重權乗駿馬上津橋南巳見徹丈餘}
  - {type: variant, offset: 3072, length: 0, content: '', SBCK: 板谷利附在馬後使持鞍緩鞚利於後著鞭以助馬􅀔遂得超度王隱􅀳書曰上黨鮑瑗家多䘮病貧苦淳于叔平曰君舎東北有桑樹徑至市入門數十歩當有一人持新馬鞭便就買還以懸北桑樹三年當􅁀得財也瑗遂承其言詣市果得馬鞭懸之正三年浚井得錢數十萬銅鐵雜噐復可二十餘萬於是家業用展病者亦愈于寳晉記曰晉永嘉􅀄有神見兖州甄城民家免奴爲主簿自号爲樊道基有嫗號成夫人欲迎致便載車行當得此免奴主簿從行爲譯以宣所冝汝南梅蹟字仲眞去鄴來經兖州聞其然因結羊丗茂阮士公諸賔徃觀之成夫人便遣主簿出當與貴客語主簿死不肯避成夫人因大嗔索士公馬鞭脫主簿鞭之何法盛晉中興書曰祖逖與劉琨中夜而坐相謂曰􅀂四海鼎沸豪傑並起吾與足下相避於中原後琨與親舊書曰吾枕戈待且志梟逆虜常恐祖生先人着鞭耳沈約宋書曰胡蕃字道序義旗起桓􅀇戰敗將出奔藩於南掖門捉玄馬鞚曰今羽林射手猶有八百皆是義故西人一旦捨此欲歸可復得乎玄直以馬鞭指天而巳於是奔散蕭方等三十國春秋曰石勒遣石虎率精􅀐五千掩李矩營生執矩外甥郭謂之弟元教元作書與謂􅀃云去年東平曹嶷西賔猗盧矩如牛角何不歸命勒與謂書餉塵尾馬鞭􅀃賔禮賢弟想同斷金徃物爲信矩所領將士並欲歸勒矩知衆之去巳乃率衆來歸又曰城都王頴誅黄門孟􅅼於是東海王越髙宻王簡皆懼奔國琅邪王睿又將出焉而徼禁甚宻頴又先下諸津禁止諸貴人王至河陽乃見抅焉宋典後至以鞭拂之曰舎長官禁貴人而尓見止耶因大􅀏之吏乃放遣因得奔國崔鴻前􅁗録曰符堅起教武堂于渭城命太學生明隂陽兵法教爲將士朱彤諌曰虎將之士受教學生強􅆬之術乃弱本之方夫養將之法譬之養馬秣以髙􅇫習以戰馭長鞭䇿後金勒制前折旋䂓矩在知進退又曰符堅引群臣議代晉太子左率石越曰今歳鎭守斗福德在呉弗可犯且國有長江之嶮朝無昬政之臣願保境養民伺其虚􅂩堅曰武王伐紂逆歳犯星夫差威陵上國爲勾踐所滅雖有長江其能固乎吾之衆投鞭於江足斷其流吾當内斷其心矣又曰符堅時關中謡曰長鞘馬鞭擊左股太歳南行當避虜秦呼鮮卑爲白虜慕容垂起關東歳在癸未崔鴻後梁録曰咸寧二年盗發張駿墓得珠簾琉璃􅃢瑚馬鞭樂資春秋後傳曰魯仲連曰齊閔王將之魯夷維子爲執鞭而從之􅀽希之漢表傳曰費禕放離切領漢節誘納降附越嶲太守張嶷牋誡禕曰昔岑彭率師來歙杖節咸皆見害刺客不鎮重也今明公位尊權重冝覧前事後歳首禕持節行酒郭循以馬鞭中小刀刺禕禕數日薨魏百官名曰駝馬鞭二枚異苑曰長山張舒以元嘉九年二月二十四日奄見一人着朱衣平上幘手捉青柄馬鞭云汝何可教便隨我去見素絲繩繫長梯來下舒上梯仍造大城綺堂洞室地如黄金有一人長大不巾蹟獨坐絳紗帳中語舒曰主者誤取汝賜汝秘術卜占勿貪錢賄舒亦不覺受時劉義慶幽明録曰餘杭人沈縱家素貧與父同入山還未至家見一人左右導從四百許前車輜重馬鞭夾道鹵簿如二千石遥見縱父子使喚住就縱手中燃火縱因問是何貴人荅曰是闘山王在餘杭南縱知是神叩頭云願見祐􅂇後入山得一王㹠從此如意又曰桓玄旣肆無君之心使御史害太􅀓道子於安城玄在南州坐忽見一平上幘人持馬鞭通云蔣侯來玄驚愕然便見階下奴子御幰車見一士大夫自云是蔣子文君何以害太􅀓與爲伯仲頋視之間便不復見又曰廣陵韓晷字興彦陳敏反時與敏弟恢戰於尋陽還營下馬覺鞭重見有緑錦囊中有短卷書着鞘皆不知所從來開視之故榖紙佛神呪經謝氏􅀑神列傳曰下邳陳超爲􅀑君弼所逐改名何䂓從餘杭歩道還家求福絶不敢出入五年後意漸替懈與親舊臨水戯酒酣共􅀃徃事超云不復畏此􅀑也小俛首乃見􅀑影在水中超驚怖時亦有乗馬者超借馬􅀐之下鞭奔驅此􅀑去超逺近常如􅀄微聞􅀑云汝何規耶急急就死呉㑹分地記曰六山者勾踐於此山鑄銅銅不鑠則埋之上生馬箠勾踐遣使者移於南社種之飾治以爲馬箠獻於呉劉欣期交州記曰兕出九德有一角角長二尺餘形如馬鞭柄闞駰十三州志曰山桒縣人俗貪僞好持馬鞭行邑故語曰沛國龍冗至山桒詐託旅使􅀂奔喪道遇冦抄失資糧太公隂謀曰武王曰吾欲造起居之誡隨之以身箠書曰馬不可極民不可劇馬極則躓民劇則敗莊子曰莊子使楚見空髑髏髐然司馬彪曰髐曰骨皃撽以馬箠而問之曰夫子貪生理而爲此乎將有亡國之事斧􅃏之誅乎語卒援髑髏枕而寢又曰馬蹄可以踐霜雪毛可以御風寒齕草飲水翹足而陸此馬之真性也及至伯樂曰我善治之燒剔之刻之雒之連之以羈編之以皂棧馬之死者十二三矣飢之渇之馳之驟之齊之前有橛飾之患後有鞭䇿之威而馬之死者巳過半矣淮南子曰昔者王良造父御也投足調均勞逸􅀂一安勞樂進馳騖􅀂滅左右􅀂鞭周旋􅀂環丗皆以爲巧然未見其貴也􅀂夫鉗具太丙之御也除轡舎銜去鞭弃䇿軍車莫動而自舉馬莫使而自走又曰大丈夫恬然無思澹然無慮以天爲蓋以地爲輿四時爲馬隂陽爲騶電以爲鞭䇿雷以爲車}
