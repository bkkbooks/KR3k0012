  - {type: variant, offset: 113, length: 1, content: 所, WYG: 多破廣軍生得廣廣時傷置絡間而卧行十餘里廣陽死睨其傍有一胡兒騎馬騰而上胡兒馬因鞭馬南馳數十里得其餘軍又曰大司空士夜過奉長亭亭長呵之告以官名亭長醉曰寜以符傳耶士以馬箠擊亭長漢獻帝起居注曰李傕性喜鬼怪左道之術又於朝廷省門為董卓設神坐數以羊祠之詞畢過省閣問帝起居求入見傕帶三刀手復與鞭合持一刀侍中侍郎見傕帶仗皆惶恐亦帶劔持刀先入在帝側張勃吴錄曰大皇帝大㑹飲宴}
