  - {type: variant, offset: 2504, length: 190, content: 文帝馬腦勒賦曰馬腦玉屬也出自西域文理交錯有似馬腦故其方人因以名之或以繫頸或以飭勒余有斯勒美而賦之命陳琳王粲並作詞曰天珍物寄鍾山之崇崗稟金德之靈施含白虎之華章扇朔方之玄氣喜南離之焱陽翕中區之黃采曜東夏之純蒼苞五色之明麗配皎日之流光內炤音照浮景外鮮文繁奇章異采的皪其間爾乃藉彼朱罽華勒用成駢居列跱煥若羅星應瑒馳射賦曰群駿籠茸於衡首咸皆腰䮍與飛兔攏脩勒而容與並軒翥而厲怒陳琳馬腦勒賦曰五, SBCK: 百}
