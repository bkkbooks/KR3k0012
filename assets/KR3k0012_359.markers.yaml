  - {type: variant, offset: 98, length: 923, content: 景丹將兵詣上上勞勉丹出至城外兵所下馬坐鞍旃毾㲪上毾音塔㲪音登又曰王莽誅諸謀者季次元聞事發覺被馬欲亡馬駕在轅中惶遽著鞍上馬出門顧車乃自覺止又曰章帝曰明德后時廣平鉅鹿樂成王在邸入問起居朕從上望見車騎鞍勒皆純黑無金銀采飾馬不踰六尺於是以白太后即賜錢各五百萬英雄記曰呂布刺殺董卓與李𠐶戰敗乃將數百騎以卓頭繫馬鞍走出武關魏志曰許禇從討韓遂馬超於潼關太祖將北度臨濟河先度兵獨與禇及虎士百餘人留南岸斷後超將步騎萬餘人來奔太祖軍矢下如雨禇乃扶太祖上舡賊戰急軍爭濟舡重欲沒禇斬攀舡者左手舉馬鞍蔽太祖舡工為流矢所中死禇右手並棹舡僅乃得度是日微禇幾危又曰太祖馬鞍在庫為鼠所齧庫吏懼死鄧哀王冲以刀穿單衣如鼠齧者謬有愁色太祖問之冲曰俗以鼠齧衣者其主不吉太祖曰此妄言耳俄而庫吏以齧鞍聞太祖笑曰兒衣在側而齧况鞍懸柱乎魏略曰五官將知主忠昔嘗噉人時因從駕出行令取家間髑髏著忠繫馬鞍以為嬉笑吳志曰曹公破走魯肅先還權大請諸將肅將入閣拜權起禮之謂曰子敬孤持鞍下馬相迎足以顯卿未肅趨進曰未也眾人聞之無不愕然就坐徐舉鞭曰願至尊威加乎四海揔括九州克成帝業更以安車蒲輪徵肅始當顯耳權拊掌欣笑又曰孫權每田獵乘馬射虎嘗突前攀持馬鞍張昭變色而前曰將軍何有當爾夫為人君者謂能駕禦英雄驅使群臣豈謂馳逐於原野挍勇於猛獸者乎如有一旦之患奈天下笑何後魏書曰傅永有氣幹拳勇過人能手執鞍橋倒立馳騁江表傳曰孫策討祖郎生獲之策謂郎曰爾昔斫孤馬鞍今創軍立事除棄宿恨汝莫怨怖郎叩頭謝罪即破械賜衣署門下賊曹魏百官名曰紫茸題頭高橋鞍一具三輔決錄曰平陵士孫奮富聞京師梁冀知奮儉恡以鏤衢鞍遺奮從貸五十萬西京雜記曰武帝時身毒國獻白光琉璃鞍在暗室光照十丈又曰武帝得貳師天馬造玫瑰石為鞍異苑曰昔有人乘馬山行遙望岫裏有二老公相對樗蒲遂下騎造焉以策柱地而觀之自謂俄頃視其馬鞭漼然已爛顧瞻其馬鞍體骸枯朽既還至家無復親屬一慟而絕六韜曰車騎之將軍馬不具鞍勒不備者誅陸景典語曰周世以膏腴之沃壤豐鎬之寶地大啟封境以封秦釋鞍授鞚假驥他人欲無陵己其可得乎傅玄馬射賦曰百馬齊興六驥孔閑金銜玉羈文防鏤鞍明珂景服華䩸采鮮古樂府左延年從軍詩曰從軍何等樂一驅乘雙駮鞍馬照人目龍驤自動作謝惠連詩曰挂鞍長林側飲馬脩川湄劉琨扶風歌曰擊馬長松下發鞍高岳頭魏曹植上銀鞍表曰於, SBCK: ''}
  - {type: variant, offset: 98, length: 0, content: '', WYG: 光武皇帝雖發師旁縣人馬席薦䩭靽皆有成賈而貴不侵民樂與官市康泰吴時外國傳曰加營國王好馬月支賈人常以舶載馬到加營國國王悉為售之若於路失覊靽但將頭皮示王王亦售其半價郭頒晉世語曰愍懐太子好卑鷄小馬小牛置田舍令左右騎斷羈勒令墜馬韓詩外傳曰昔衛獻公走反國及郊將班邑於從者而後入太史栁莊曰如皆守社稷則孰負羈靮而從如皆從則孰守社稷君反國而復為私也無乃不可乎釋智匠古今樂錄曰襄陽銅蹄歌曰龍馬紫金鞍翠毛白玉羈照曜雙厥下知是襄陽兒杜夷幽求曰覊蚊絆蚤禁其非法刳蟣屠虱求其肝膽非至精誰能知之又曰銜覊之馬伏􅇫之駒莫不思平原曠澤翹尾而馳陸也又曰琱覊鏤絆呼名翹陸不可化也夢書曰羈韁為相要制也夢得覊韁要約士也覊結語言韁往來也覊結疆竪結勑疆也弊絶不用難俛仰也摯虞逸驥詩曰逸驥無鑣轡騰陸從長川剪落就覊靮飛軒躡雲煙孫綽詩曰野馬閑於覊澤雉屈於樊神王自有所何為人事閒傅𤣥馳射馬賦曰百鳥齊興六驥孔閑金銜玉覊文防􅍢鞍明珂}
