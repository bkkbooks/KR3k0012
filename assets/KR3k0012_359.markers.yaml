  - {type: variant, offset: 101, length: 0, content: '', WYG: 從賜馬二疋并鞍勒防汗魏百官名曰黄地金鏤織成萬嵗彰汗一具又織成彰汗一具桓寛䀋鐡論曰古者庻人賤騎䋲控草鞮皮薦而已及其後革鞍攻成鐡鑣不餙令富者黄金琅勒􅄢繡弇汗司馬彪戰略曰孟逹將蜀}
