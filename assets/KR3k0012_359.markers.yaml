  - {type: variant, offset: 98, length: 923, content: 景丹將兵詣上上勞勉丹出至城外兵所下馬坐鞍旃毾㲪上毾音塔㲪音登又曰王莽誅諸謀者季次元聞事發覺被馬欲亡馬駕在轅中惶遽著鞍上馬出門顧車乃自覺止又曰章帝曰明德后時廣平鉅鹿樂成王在邸入問起居朕從上望見車騎鞍勒皆純黑無金銀采飾馬不踰六尺於是以白太后即賜錢各五百萬英雄記曰呂布刺殺董卓與李𠐶戰敗乃將數百騎以卓頭繫馬鞍走出武關魏志曰許禇從討韓遂馬超於潼關太祖將北度臨濟河先度兵獨與禇及虎士百餘人留南岸斷後超將步騎萬餘人來奔太祖軍矢下如雨禇乃扶太祖上舡賊戰急軍爭濟舡重欲沒禇斬攀舡者左手舉馬鞍蔽太祖舡工為流矢所中死禇右手並棹舡僅乃得度是日微禇幾危又曰太祖馬鞍在庫為鼠所齧庫吏懼死鄧哀王冲以刀穿單衣如鼠齧者謬有愁色太祖問之冲曰俗以鼠齧衣者其主不吉太祖曰此妄言耳俄而庫吏以齧鞍聞太祖笑曰兒衣在側而齧况鞍懸柱乎魏略曰五官將知主忠昔嘗噉人時因從駕出行令取家間髑髏著忠繫馬鞍以為嬉笑吳志曰曹公破走魯肅先還權大請諸將肅將入閣拜權起禮之謂曰子敬孤持鞍下馬相迎足以顯卿未肅趨進曰未也眾人聞之無不愕然就坐徐舉鞭曰願至尊威加乎四海揔括九州克成帝業更以安車蒲輪徵肅始當顯耳權拊掌欣笑又曰孫權每田獵乘馬射虎嘗突前攀持馬鞍張昭變色而前曰將軍何有當爾夫為人君者謂能駕禦英雄驅使群臣豈謂馳逐於原野挍勇於猛獸者乎如有一旦之患奈天下笑何後魏書曰傅永有氣幹拳勇過人能手執鞍橋倒立馳騁江表傳曰孫策討祖郎生獲之策謂郎曰爾昔斫孤馬鞍今創軍立事除棄宿恨汝莫怨怖郎叩頭謝罪即破械賜衣署門下賊曹魏百官名曰紫茸題頭高橋鞍一具三輔決錄曰平陵士孫奮富聞京師梁冀知奮儉恡以鏤衢鞍遺奮從貸五十萬西京雜記曰武帝時身毒國獻白光琉璃鞍在暗室光照十丈又曰武帝得貳師天馬造玫瑰石為鞍異苑曰昔有人乘馬山行遙望岫裏有二老公相對樗蒲遂下騎造焉以策柱地而觀之自謂俄頃視其馬鞭漼然已爛顧瞻其馬鞍體骸枯朽既還至家無復親屬一慟而絕六韜曰車騎之將軍馬不具鞍勒不備者誅陸景典語曰周世以膏腴之沃壤豐鎬之寶地大啟封境以封秦釋鞍授鞚假驥他人欲無陵己其可得乎傅玄馬射賦曰百馬齊興六驥孔閑金銜玉羈文防鏤鞍明珂景服華䩸采鮮古樂府左延年從軍詩曰從軍何等樂一驅乘雙駮鞍馬照人目龍驤自動作謝惠連詩曰挂鞍長林側飲馬脩川湄劉琨扶風歌曰擊馬長松下發鞍高岳頭魏曹植上銀鞍表曰於, krp: ''}
  - {type: variant, offset: 99, length: 0, content: '', WYG: 朗華䩸采鮮傅𤣥良馬賦曰金覊在首發以明珂􅍢鞍采䩸織防含華䩸音茸傅𤣥難良馬賦曰餙以金覊申以玉纓結以輕軒節以和鈴曹植遊俠篇曰白馬餙金覊連翩西北馳借問誰家子幽并遊俠兒孫惠三馬哀辭序曰余於物特所留心而所服三馬壹時離覊感田子之愛遂作哀文云爾珂服䖍通俗文曰勒餙曰珂郭義恭廣志曰期調國出金銀白珠流璃水晶噐五色珠馬珂又曰剽刃國出桐華布珂珠具艾香雞舌香傅𤣥樂府豫章行曰輕裘綴孔翠明珂曜珊瑚張華輕薄篇曰文軒樹羽盖乘馬珮玉珂韀隋書曰宇文述素好着竒服炫燿時人云定興為製馬韉於後角上鉄方寸以露白色世輕薄者爭放學之謂為許公鉄勢又遇天寒定興曰宿衛必當耳冷述曰然乃製裌頭巾令深袹耳又學之名為許公袹勢述大悦曰云兄所作必能變俗我聞作事可法故不虛也障泥王隠晉書曰韓友字景先廬江舒人舒縣廷掾王睦卒病死已呼魂家人就友卜令以}
