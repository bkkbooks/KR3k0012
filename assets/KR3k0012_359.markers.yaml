  - {type: variant, offset: 3521, length: 2, content: 惣率, WYG: 舉麾枊魚豢魏畧曰獻帝露布益州曰馬擊枊而不暇解貫胄延頸以待白刃蜀志曰靈帝末先主從校尉鄒靖討賊有功除安喜尉督郵以公事到縣先主求謁不通乃直入府縳督郵杖二百解綬繫其頸著馬枊棄亡命常璩華陽國志曰建寜郡同瀨縣存馬縣雍闓反時結纍于縣山繫馬馬枊柱生成林今夷言無梁林無梁夷言馬也蕭子雲晉史草曰姚畧時有賀僧者不知何人自云遊厯五郡時人號為賀五郡齋戒奉道為百姓說吉㓙畧死泓立僧謂泓曰宜潔掃一馬廐開屋設大枊有異馬其大非常趙書曰徐光字秀武頓丘人父以牛醫為業光年十四五為將軍王陽秣馬光但書馬枊屋柱為詩頌不親馬事異苑曰丹陽甘卓字季思照鏡無頭乃見在馬枊荀氏靈鬼志曰㤗元中有道人從外國來多有術法自說所受術師曰衣非沙門也嘗行見一人擔上有小籠子可受斗餘語擔人云吾歩疲極欲􅀢寄居擔人甚怪}
