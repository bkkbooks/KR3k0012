  - {type: variant, offset: 2316, length: 187, content: 加翠毛之飾淮南子曰鴈門之北狄不穀食賤長貴壯各上氣力人不弛弓馬不解勒便之也高誘曰不穀曰不穀食𡧢酪而已北狄鮮卑也弛舍也便習也說苑曰田子方度西河造翟黃翟黃乘軒車載華蓋黃金之勒約鎮簟席如此者具駟八十乘子方望以為人君翟黃至而子方曰子人臣也將何以至此對曰此皆君之賜也臣進五大夫祿爵倍以故至於此韓陽天文要集曰造父五星在傳舍南造父洗馬轡勒銜鑣棗據詩曰騏驥伏吳坂不與伯樂俱駑馬同銜勒豈得獨卓殊, SBCK: 防汗}
