  - {type: variant, offset: 2261, length: 13, content: 涼州胡安據盜發張駿墓得珊瑚, SBCK: 髙勾驪以千里}
  - {type: variant, offset: 2261, length: 6, content: 涼州胡安據盜, WYG: 石勒遣石虎率精騎五千掩李矩營生執矩外甥郭謂之弟元教元作書與謂說云去年東平曹嶷西賔猗盧矩如牛角何不歸命勒與謂書餉麈尾歸勒說賔禮貴弟相同斷金往物為信矩所領將士並欲歸勒矩知衆之去已乃率衆來歸又曰城都王頴誅黄門孟玖於是東海王鉞髙宻王簡皆懼奔國瑯琊王睿又將出焉而徼禁甚宻頴又先下諸津禁其諸貴人王至河陽乃見拘焉宋典後至以鞭拂之曰舍長官禁貴人而爾見止耶因大笑之吏乃放遣因得奔國崔鴻前秦錄曰符堅起教武堂于渭城命太學生明隂陽兵法教為將士朱彤諌曰虎將之士受教學生强幹之術乃弱本之方夫養將之法譬之養馬秣以髙􅇫習以戰馭長鞭策後金勒制前析施規矩任知進退又曰符堅引群臣議代晉太子左率右越曰今歳鎮守斗福德在吴弗可犯且國有長江之嶮朝無昬政之臣願保境養民伺其虛隙堅曰武王伐紂逆嵗犯星夫差威陵上國為勾踐所滅雖有長江其能固乎吾之衆投鞭於江足斷其流吾當内斷其心矣又曰符堅時闗中謡曰長鞘馬鞭擊左股太歳南行當避虜秦呼鮮卑為白虜慕容垂起闗東嵗在癸未崔鴻後梁錄曰咸寜二年盗}
