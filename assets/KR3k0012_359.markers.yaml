  - {type: variant, offset: 14, length: 4, content: 鞁皮彼切, SBCK: 左傳曰晉公子重耳之及難也秦伯納之及河子犯以璧授公子曰臣􅀒羈紲從君廵於天下杜預曰羈馬羈紲馬彊也臣之罪甚多矣請由此亡又曰􅀄晉侯之竪頭湏守藏者其出也竊藏以逃文公出時也盡用以求納之及入求見公辭以沭謂㒒人曰居者爲社稷之守行者爲羈絏之僕其亦可也何必罪居者}
