  - {type: variant, offset: 104, length: 0, content: '', WYG: 取貳綏奮振去塵也貳副也執莢分轡驅之五歩而立左傳曰晉公子重耳之及於難也及楚楚子享之曰公子若反晉國則何以報不榖對曰若以君之靈得反晉國晉楚治兵遇於中原其避君三舍若不獲命其左執鞭弭右屬櫜鞬以與君周旋又曰宋告急於晉伯宗曰不可雖鞭之長不及馬腹又曰楚靈王使圍徐以懼吴楚子次于乾谿以為之援雨雪王皮冠秦復陶翠被豹舄執鞭以出執鞭以教令右尹子革夕子革鄭丹也夕暮也王見之去冠被舍鞭與之語又曰晉荀瑶帥師伐鄭鄭駟𢎞請救於齊陳成子救鄭及濮雨不能渉成子衣製杖戈製雨衣也立於阪}
