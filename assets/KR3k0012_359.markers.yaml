  - {type: variant, offset: 2251, length: 1, content: 地, SBCK: 馬韓詩外傳曰昔衛獻公走反國及郊將班邑於從者而後入太史栁莊曰如皆守社稷則孰􅀒羈靮音的而從如皆從則孰守社稷君反國而復爲私也無乃不可乎釋智匠古今樂録曰襄陽銅蹄哥曰龍馬紫金鞍翠毛白玉羈照曜􅀟闕下知是襄陽兒杜夷幽求曰羈蚊絆蚤禁其非法刳蟣屠虱求其肝膽非至精誰能知之又曰衘羈之馬伏􅇫之駒莫不思平原曠澤翅尾而馳陸也又曰琱羈鏤絆呼名翹陸不可化也夢書曰羈繮爲相要制也夢得羈繮要約士也羈結語言繮徃來也羈結韁竪結勑疆也弊絶不用難俛仰也摯虞逸􅂹詩曰逸􅂹無鑣轡騰陸從長川剪落就羈靮飛軒躡雲煙孫綽詩曰野馬閑於羈澤雉屈於樊神王自有所何爲人事間􅀓玄馳射馬賦曰百鳥齊興六􅂹孔閑金衘玉羈文防鏤鞍明珂景㓪華䩸采鮮􅀓玄良馬賦曰金羈在首發以明珂鏤鞍采䩸織防含華䩸音茸􅀓玄難良馬賦曰飾以金羈申以玉纓結以輕軒節以和鈴曹植遊俠篇曰白馬飾金羈連翩西北馳借問誰家子幽并遊俠兒孫惠三馬哀辭序曰余於物特所留心而所服三馬一時離羈感田子之愛遂作哀文云尓珂服䖍通俗文曰勒飾曰珂郭義恭廣志曰期調國出金銀白珠硫􅲚水精噐五色珠馬珂又曰剽刄國出桐華布珂珠貝艾香雞舌香􅀓玄樂府豫章行曰輕裘綴孔翠明珂曜􅃢瑚張華輕薄篇曰文軒樹羽蓋乗馬佩玉珂韀隋書曰宇文述素好着竒服炫燿時人雲定興爲製馬韀於後角上缺方三寸以露白色丗輕薄者爭放學之謂爲許公缺勢又遇天寒定興曰􅀫衛必當耳冷述曰然乃製裌頭巾令深袹音陌耳又學之名爲許公栢勢述大恱曰雲兄所作必能變俗我聞作事可法故不虚也障泥王隱晉書曰韓友字景先廬江舒人舒縣廷􅁺王睦卒病死巳呼魄家人就友卜令以丹􅀞板作日月置尸頭前及卧虎皮馬彰泥登時大愈}
