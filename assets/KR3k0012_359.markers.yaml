  - {type: variant, offset: 1034, length: 190, content: 敢乘謹奉上宋劉義恭謝金梁鞍啟曰賜臣供御金梁橋鞍制作精巧宜副龍駟聖慈下逮猥垂光賜後漢李尤鞍銘曰驅騖馳逐騰躍覆跩雖其捷習亦有顛沛井羸其瓶罔不斯敗跩丑世切轡釋名曰轡佛也言牽引佛戾以制馬也詩曰我馬維駒六轡如濡又曰我馬維駱六轡沃若又曰駟鐵孔阜六轡在手周禮曰擊壺氏絜轡以令舍懸轡於當所舍止之處又曰大馭掌馭玉路以祀及犯軷王自左馭馭下祝登受轡犯軷遂驅之家語曰古者天子以內史為左右手以德法為銜勒以百, SBCK: 侵民樂與}
