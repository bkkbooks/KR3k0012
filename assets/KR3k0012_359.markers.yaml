  - {type: variant, offset: 3521, length: 2, content: 惣率, SBCK: 舉麾枊五葬切魚豢魏略曰獻帝露布益州曰馬繫枊而不暇解貫胄延頸以侍白刄枊五剛切又五浪切蜀志曰靈帝末先主從校尉鄒靖討賊有功除安喜尉督郵以公事到縣先主求謁不通乃直入傳􅅞督郵杖二百解綬繫其頸着馬枊弃官亡命常璩華陽國志曰建寧郡同瀬縣存馬縣雍闓反時結壘於縣山繫馬馬枊柱生成林今夷言無梁林無梁夷言馬也蕭子雲晉史草曰姚略時有賀僧者不知何人自云遊歷五郡時人號爲賀五郡齋戒奉道爲百姓􅀃􅁻凶略死泓立僧謂泓曰冝絜掃一馬廐開屋設大枊有異馬其大非常自逺來天所送矣趙書曰徐光字秀武頓丘人父以牛毉爲業光年十四五爲將軍王陽秣馬光但書馬枊屋柱爲詩頌不親馬事異苑曰丹陽甘卓字季思照鏡無頭乃見在馬枊荀氏靈􅀑志曰泰元中有道人從外國來多有術法自􅀃所受術師曰衣非沙門也甞行見一人擔上有小籠子可受斗餘語檐人云吾歩疲極欲蹔􅀉君擔上人甚怪}
