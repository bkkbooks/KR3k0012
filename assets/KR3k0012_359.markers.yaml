  - {type: variant, offset: 2956, length: 385, content: 曰山巨源為吏部郎欲舉嵇康自代康聞與之書曰譬猶禽鹿少見馴育則服教從制長而見羈雖飾以金鑣饗以嘉肴愈思長林而志在豐草魯國先賢志曰黃伯仁龍馬頌曰楊鸞鑣兮揮紅沬之幡飄鹽鐵論曰古者庶人賤騎繩控草鞮音低皮薦而已及其後革鞍攻成鐵鑣不飾又曰古者樵車無輪棧車無軛其後木軨不衣長轂數輻今富者銀黃華左搔以結緌錯鑣塗朱珥勒飛軨楚辭曰絕鑣銜以馳騖兮暮著次而敢止路蕩蕩其無人兮遠不御兮千里棗據詩曰真偽各有分駑驥不齊鑣陶琬之詩曰我服既暉我駟既閑楊鑣警路哀籥清綿桓玄集載琬之為江州主簿宋文帝登景陽樓詩曰士女炫街里軒冕曜都城萬軫楊金鑣千舳樹蘭旌袁淑遊新亭曲水詩序曰離榭修幕陵隧彌阜鑣容斾綵裛野麗雲鮑昭詩曰飛鑣出荊路騖服入秦川王沉踐行賦曰六龍齊鑣鸞聲振振景動波迴天行星陳張恊玄武館賦曰天子翱翔郊甸順時巡省龍駟騰鑣羽騎遊騁顧流光以桉轡迴鸞旗而時幸李充穆天子賦曰其馬則赤驥盜驪驊騮綠耳楊和齊鑣一瞬千里董子曉乘輿駮, WYG: 𤣥良}
