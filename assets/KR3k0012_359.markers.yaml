  - {type: variant, offset: 102, length: 1, content: 詣, WYG: 數百降魏魏文帝以逹為新城太守太和元年諸葛亮從成都到漢中逹又欲應亮遺亮玉玦織成彰汗蘓合香亮使郭模詐降過魏興太守申儀與逹有隙模語儀亮言玉玦者已决織成者言謀已成蘇合香者言事已合當胷後漢書曰太守趙興署鮑永功曹時有矯稱侍中止傳舍者興欲謁之永疑其詐諫不聼出興遂駕徃永乃㧞佩刀截馬當胷乃止當胷以韋為之也後數日莾詔書果下捕矯稱者永由是知名鞘尾服䖍通俗文曰馬鞻尾曰鞘魏百官名曰赤茸鍮石鞘尾一具鞭禮記曰獻車馬者執筴綏又曰君車將駕則僕執策立於馬前已駕僕展軨鄭𤣥曰展軨具視効駕自己駕也奮衣由右}
