  - {type: variant, offset: 1225, length: 417, content: 為轡善御馬者正銜勒齊轡策均馬力和馬心故口無聲而馬應轡策不舉而極千里善御人者一其德法正其百官均齊人力和安人心故令不再而人順從刑不用而天下理矣又曰善御馬者正身以總轡又曰閔子騫為費宰問政於孔子孔子曰君者人也吏者轡也刑者策也人君之政執其轡策而已矣又曰孔子適衛衛將軍文子問曰今齊之以刑而猶弗勝何禮之齊也孔子云禮譬之於御則轡也漢春秋曰大僕公卿奉引大僕執轡大將軍陪乘光武東京郊祀法駕則河南尹奉引奉車都尉執轡侍中參乘孔叢子曰夫子云夫政令者人君之銜轡所以制下也管子曰凡赦者小利而大害也故久而不勝其禍故赦者馬之委轡也無赦者痤疽之礦石也痤作和切疽七余切列子曰凡御者得之於銜應之於轡得之手應於心淮南子曰權衡者人主之車輿爵祿者人臣之銜轡矣又曰王良造父御也上車攝轡馬為齊整班固東巡頌曰乘輿動色群后屏氣萬騎齊鏕千乘弭轡魏明帝善哉行曰百馬齊轡御由造父後漢李尤轡銘曰轡銜在手急緩必時賞罰在心中和是思馬知良御進取道里人知善政令行禁止鞚張揖埤蒼曰靮音的馬韁也鞚馬勒也𩋠音緬, SBCK: 市}
