  - {type: variant, offset: 3524, length: 0, content: '', SBCK: 慮是狂人便語君欲何許自居邪荅云君􅀂見許正欲入君此籠子中檐人愈恠其竒君能入籠中便是神人也即入籠中籠亦不更大擔亦不􅁴重至國中一家大冨而性慳惜不行仁義語檐人吾試爲君破奴慳囊即至其家有一快馬甚惜之在枊下繫忽失去尋求不知處明日見馬在五斗甖中終不可破取不知何方得取之便徃語言君作百人厨食周餉窮困者馬當得出耳主人即狼狽作之旣畢馬還在柱淮南萬畢術曰馬枊生腐芽者取馬枊生芽可以爲藥食煞鳬}
