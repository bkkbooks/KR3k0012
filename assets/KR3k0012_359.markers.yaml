  - {type: variant, offset: 100, length: 0, content: '', WYG: 畫板作日月置尸頭前及卧虎皮馬障泥登時大愈蕭方等三十國春秋曰髙勾驪以千里馬生羆皮障泥獻於南燕燕王超大恱答以水牛能言鳥世説曰王武子善解馬性嘗乘一馬着連乾障泥前有水終不肯渡王云此必是惜障泥使人觧去便徑渡防汗東觀記曰和帝永元三年西謁園陵桓郁兼羽林中郎}
