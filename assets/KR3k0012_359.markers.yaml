  - {type: variant, offset: 1750, length: 307, content: 書曰溫嶠字太真王敦舉兵內向六軍敗績太子將自出戰嶠執鞚諫太子乃止晉起居注曰冠軍將軍王浹表臣以發許昌城內北人諸將孫凱等謀欲逼臣留身驅遣南人臣初出城門乃相纏繞牽臣馬鞚臣手刃斬截僅乃得出應瑒馳射賦曰放鞚長騁神足奔越終節三驅每不虛發陳林武庫賦曰馬則飛雲絕景直鬐騧䭹走駿驚飊步象雲浮受銜斯遊歛鞚則止傅玄良馬賦曰奮舋沛艾虎據麟跱望雲睇景乘虛四起縱銜則往攬鞚則止成公綏射兔賦曰收輔車之雙轡舍良馬之長鞚禽迅羽之輕焱截逸足之狡弄盈得獲於後乘充庖廚之所貢夏侯湛征邁辭曰上伊闕兮臨川柎駿馬兮授鞍中衢兮載歎斂鞚兮盤桓閔鴻與劉子雅書曰若能控奔驥以接駑乘則力追者萬群傾脩翅以顧短翮則歸飛者如雲勒劉芳毛詩箋音義證曰轡是御者所執者也不得以轡為勒且舊, SBCK: 丗}
