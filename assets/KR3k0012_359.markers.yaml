  - {type: variant, offset: 667, length: 847, content: 策討祖郎生獲之策謂郎曰爾昔斫孤馬鞍今創軍立事除棄宿恨汝莫怨怖郎叩頭謝罪即破械賜衣署門下賊曹魏百官名曰紫茸題頭高橋鞍一具三輔決錄曰平陵士孫奮富聞京師梁冀知奮儉恡以鏤衢鞍遺奮從貸五十萬西京雜記曰武帝時身毒國獻白光琉璃鞍在暗室光照十丈又曰武帝得貳師天馬造玫瑰石為鞍異苑曰昔有人乘馬山行遙望岫裏有二老公相對樗蒲遂下騎造焉以策柱地而觀之自謂俄頃視其馬鞭漼然已爛顧瞻其馬鞍體骸枯朽既還至家無復親屬一慟而絕六韜曰車騎之將軍馬不具鞍勒不備者誅陸景典語曰周世以膏腴之沃壤豐鎬之寶地大啟封境以封秦釋鞍授鞚假驥他人欲無陵己其可得乎傅玄馬射賦曰百馬齊興六驥孔閑金銜玉羈文防鏤鞍明珂景服華䩸采鮮古樂府左延年從軍詩曰從軍何等樂一驅乘雙駮鞍馬照人目龍驤自動作謝惠連詩曰挂鞍長林側飲馬脩川湄劉琨扶風歌曰擊馬長松下發鞍高岳頭魏曹植上銀鞍表曰於光武皇帝代効此銀鞍一具初不敢乘謹奉上宋劉義恭謝金梁鞍啟曰賜臣供御金梁橋鞍制作精巧宜副龍駟聖慈下逮猥垂光賜後漢李尤鞍銘曰驅騖馳逐騰躍覆跩雖其捷習亦有顛沛井羸其瓶罔不斯敗跩丑世切轡釋名曰轡佛也言牽引佛戾以制馬也詩曰我馬維駒六轡如濡又曰我馬維駱六轡沃若又曰駟鐵孔阜六轡在手周禮曰擊壺氏絜轡以令舍懸轡於當所舍止之處又曰大馭掌馭玉路以祀及犯軷王自左馭馭下祝登受轡犯軷遂驅之家語曰古者天子以內史為左右手以德法為銜勒以百官為轡善御馬者正銜勒齊轡策均馬力和馬心故口無聲而馬應轡策不舉而極千里善御人者一其德法正其百官均齊人力和安人心故令不再而人順從刑不用而天下理矣又曰善御馬者正身以總轡又曰閔子騫為費宰問政於孔子孔子曰君者人也吏者轡也刑者策也人君之政執其轡策而已矣又曰孔子適衛衛將軍文子問曰今齊之以刑而猶弗勝何禮之齊也孔子云禮譬之於御則轡也漢春秋曰大僕公卿奉引大僕執轡大將軍陪乘光武東京郊祀法駕則河南尹奉引奉車都尉執轡侍中參乘孔叢子曰夫子云夫政令者人君之銜轡所以制下也管子曰凡赦者小利而大害也故久而不勝其禍故赦者馬之委轡也無赦者痤疽之礦石也痤作和切疽七余切列子曰凡御者得之於銜應之於轡得之手應於心淮南子曰, WYG: ''}
