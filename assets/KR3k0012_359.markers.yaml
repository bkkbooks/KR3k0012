  - {type: variant, offset: 2551, length: 404, content: 之命陳琳王粲並作詞曰天珍物寄鍾山之崇崗稟金德之靈施含白虎之華章扇朔方之玄氣喜南離之焱陽翕中區之黃采曜東夏之純蒼苞五色之明麗配皎日之流光內炤音照浮景外鮮文繁奇章異采的皪其間爾乃藉彼朱罽華勒用成駢居列跱煥若羅星應瑒馳射賦曰群駿籠茸於衡首咸皆腰䮍與飛兔攏脩勒而容與並軒翥而厲怒陳琳馬腦勒賦曰五官將得馬腦以為寶勒美其英綵之光艷也使琳賦之爾乃他山為錯荊和為理制為寶勒以御君子王粲馬腦勒賦曰因姿象形匪彫匪刻厥容應規厥性順德御世嗣之駿服兮表騄驥之儀式王沉馬腦勒賦曰厥象伊何如規之盈鮫鱗紆鬱白黑殊形如水之潔如玉之貞固乾坤之所育兮匪彫鏤而自成爾乃施飾龍首加服鸞鑣和鈴鏘鏘回景逍遙鑣釋名曰鑣包也所以在傍苞歛其口也說文曰鑣馬銜也銜馬勒口中也爾雅曰鑣謂之钀郭璞曰勒也許揭切又魚列切詩曰游于北園四馬既閑輶車鸞鑣載險歇驕毛萇曰輶軒也斂歇驕田犬也鄭玄曰軒卑驅逆之車也置鸞於鑣者異於乘車也釋智匠古今樂錄曰明帝休成之樂歌曰玉鑣息節金輅懷音文士, WYG: ''}
