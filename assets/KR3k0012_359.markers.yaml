  - {type: variant, offset: 3067, length: 1, content: 古, SBCK: 君車將駕則㒒執䇿立於馬前巳駕僕展軨鄭玄曰展軨具視効駕白巳駕也奮衣由右上取貳綏􅁬振去塵也貳副也執筴分轡驅之五歩而立左傳曰晉公子重耳之及於難也及楚楚子享之曰公子􅀂反晉國則何以報不榖對曰􅀂以君之靈得反晉國晉楚治兵遇於中原其避君三舎􅀂不􅀗命其左執鞭弭右属橐鞬以與君周旋又曰宋告急於晉伯宗曰不可雖鞭之長不及馬腹又曰楚靈王使圉徐以懼吴楚子次于乾谿以爲之援雨雪王皮冠秦復陶翠􅀍豹舄執鞭以出執鞭以敎令右尹子革夕子革鄭丹也夕暮也王見之去冠􅀍舎鞭與之語又曰晉荀瑶帥師伐鄭鄭駟弘請救於齊陳成子救鄭及濮雨不渉成子衣製杖戈製雨衣也立於阪上馬不出}
  - {type: page-break, offset: 3067, content: '', id: KR3k0012_SBCK_359-5a}
  - {type: variant, offset: 3067, length: 1, content: 古, krp: 君車將駕則㒒執䇿立於馬前巳駕僕展軨鄭玄曰展軨具視効駕白巳駕也奮衣由右上取貳綏奮振去塵也貳副也執筴分轡驅之五歩而立左傳曰晉公子重耳之及於難也及楚楚子享之曰公子若反晉國則何以報不榖對曰若以君之靈得反晉國晉楚治兵遇於中原其避君三舎若不獲命其左執鞭弭右属橐鞬以與君周旋又曰宋告急於晉伯宗曰不可雖鞭之長不及馬腹又曰楚靈王使圉徐以懼吴楚子次于乾谿以爲之援雨雪王皮冠秦復陶翠𬒳豹舄執鞭以出執鞭以敎令右尹子革夕子革鄭丹也夕暮也王見之去冠𬒳舎鞭與之語又曰晉荀瑶帥師伐鄭鄭駟弘請救於齊陳成子救鄭及濮雨不渉成子衣製杖戈製雨衣也立於阪上馬不出}
  - {type: variant, offset: 3069, length: 1, content: 樵, SBCK: 助之鞭之公羊傳曰陽虎將殺季孫于蒲圃使臨南御之至孟衢臨南投䇿使陽越下取䇿陸機毛詩草木虫魚䟽曰据枝葉似楨松尓雅曰据櫃也去匱切節似扶老即金靈壽是也今人以爲馬鞭及杖孔藂子曰刑以齊民譬之於御則鞭䇿也漢書曰婁敬云太王以狄伐故去􅃎杖馬箠去居歧又曰石慶爲太㒒御出上問}
  - {type: variant, offset: 3069, length: 1, content: 樵, krp: 助之鞭之公羊傳曰陽虎將殺季孫于蒲圃使臨南御之至孟衢臨南投䇿使陽越下取䇿陸機毛詩草木虫魚䟽曰据枝葉似楨松尓雅曰据櫃也去匱切節似扶老即金靈壽是也今人以爲馬鞭及杖孔藂子曰刑以齊民譬之於御則鞭䇿也漢書曰婁敬云太王以狄伐故去豳杖馬箠去居歧又曰石慶爲太㒒御出上問}
  - {type: variant, offset: 3071, length: 0, content: '', SBCK: 中幾馬慶以䇿數馬畢舉手曰六馬又曰李廣擊匈奴匈奴兵多破廣軍生得廣廣時傷置絡間而卧行十餘里廣陽死睨其傍有一胡兒􅀐廣騰而上胡兒馬因鞭馬南馳數十里得其餘軍又曰大司空士夜過奉常亭亭長呵之告以官名亭長醉曰寧有符􅀓耶士以馬箠擊亭長漢獻帝起居注曰李􅔸性喜􅀑恠左道之術又於朝廷省門爲董卓設神坐數以羊祠之祠畢過省閤問帝起居求入見􅔸帶三刀手復與鞭合持一刀侍中侍郎見􅔸帶仗皆惶恐亦帶劒持刀先入在帝側張勃呉録曰大皇帝大㑹飲宴下馬迎魯肅肅入拜起禮之謂言子敬􅀌持鞍下馬相迎足以顯未肅趨進曰未也衆咸愕然旣坐徐舉鞭曰願麾下威德加于四海然後以安車軟輪徴肅始當顯耳帝拊掌歡􅀏又曰大皇帝潜軍於晥口命陸遜爲大都督假􅃏大皇帝親執鞭以見之虞􅄎江表傳曰孫權攻合肥不能下徹軍將退兵巳上道權與吕蒙蔣欽陵統等在後張慢飲食畢垂當發魏將張遼帥六七千人奄至圍􅃒數重權乗駿馬上津橋南巳見徹丈餘}
