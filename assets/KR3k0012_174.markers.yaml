  - {type: variant, offset: 74, length: 1, content: 定, SBCK: 斯干宣王考室也築室百堵西南其户又曰如彼築室于道謀是用不潰于成鄭箋云如當路築室得人而與}
  - {type: variant, offset: 74, length: 1, content: 定, WYG: 斯干宣王考室也築室百堵西南其户又曰如彼築室于道謀是用不潰于成鄭箋云如當路築室而與行道}
  - {type: variant, offset: 74, length: 1, content: 定, krp: 斯干宣王考室也築室百堵西南其户又曰如彼築室于道謀是用不潰于成鄭箋云如當路築室得人而與}
  - {type: variant, offset: 76, length: 1, content: 方, SBCK: 謀所爲路人之意不同故不得成又曰彼姝者子在我室􅀆又曰宛其死矣他人入室尚書曰􅀂考作室旣厎法厥子乃不肯室矧肯構周禮冬官匠人曰內有九室九嬪居之外有九室九卿居之禮記檀弓下曰晉獻趙文子成室晉大夫發焉文子趙武也作室成晉君獻之謂賀之也諸大夫亦發禮以徃也長老曰美哉輪焉美哉奐焉歌於斯哭於斯聚國旋於斯文子曰武也得歌於斯哭於斯是全要領以從先大夫於九原也北面再拜稽首又曰室}
  - {type: page-break, offset: 76, content: '', id: KR3k0012_SBCK_174-1b}
  - {type: variant, offset: 76, length: 1, content: 方, WYG: 人謀之所謂路人之意不同故不得成又曰彼姝者子在我室兮又曰宛其死矣他人入室尚書曰若考作室旣厎法厥子乃弗肯堂矧肯構周禮冬官匠人曰内有九室九嬪居之外有九室九卿居之禮記檀弓下曰晉獻文子成室晉大夫發焉文子趙武也作室成晉君獻之謂賀也諸大夫亦發禮以往張老曰美哉輪焉美哉奐焉歌於斯哭於斯聚國族於斯文子曰武也得歌於斯哭於斯是全要領以從先大夫於九原也北面再拜稽首又曰室}
