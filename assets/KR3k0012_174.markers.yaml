  - {type: variant, offset: 84, length: 5, content: 以日作為楚, SBCK: 宫環堵之室左傳襄十五年宋向戍來聘見孟獻子尤其室曰子有令聞而美其室非所望也對曰我在晉吾兄爲之毀之重勞且不敢間又曰鄭伯有􅄝酒爲窟室而夜飲酒擊鍾焉朝至未巳朝者曰公焉在其人曰吾公在壑谷壑在窟}
