  - {type: variant, offset: 2533, length: 138, content: 峻宇雕牆殷辛以滅土階茅楝唐堯以昌秦帝增阿房之飾漢后罷露臺之費故漢祚延而秦禍速自古如土崩瓦解取譏後代良以奢虐所致太宗悅其對又曰高祖嘗避暑于仁智宮又曰閻立德受詔造翠微宮及玉華宮咸稱旨賞賜甚厚又曰太宗將幸九成宮姚思廉諫曰離宮遊幸秦皇漢武之事固非堯舜禹湯之所為也言甚切至太宗納之西京親, SBCK: 明堂有十二室法十二月楊龍驤洛陽}
