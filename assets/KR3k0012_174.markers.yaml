  - {type: variant, offset: 4461, length: 2, content: 魚鱗, SBCK: 砥室翠翹純曲瓊言卧内之室以砥爲壁干而滑澤以翠鳥之羽雕飾玉鈎以經衣曲瓊玉鈎也又曰鑿山楹而爲室下披衣於水渚霧濛濛其晨降兮雲裴斐而承宇又曰網戸朱綴刻方連冬有奥突奥復室夏大室夏有室寒事具居處部上又曰築室􅀆水中葺之以荷蓋又曰像設居室静閑安髙堂􅃉宇檻層軒潘岳狹室賦曰伊余舘之􅄶狹良窮弊而極微李尤室銘曰室以安寜􅃦息幽閑窒塞空隟遮遏風寒無曰寂寞}
  - {type: variant, offset: 4461, length: 2, content: 魚鱗, WYG: 砥室翠翹挂曲瓊些言卧之室以砥為壁平而滑凙以翠鳥之羽雕飾王鈎以懸衣曲瓊玉鈎也又曰鑿山楹而為室兮下披衣於水渚霧露濛濛其晨降兮雲依斐而承宇又曰網户朱綴刻方連冬有奥突奥複室突大室夏室寒事見居處部上又曰築室兮水中葺之以荷蓋又曰像設君室静閒安髙堂邃宇檻層軒潘岳狹室賦曰伊今館之褊狹良窮弊而極微李尤室銘曰室以安寧寢息幽閒室寒空隟遮遏風寒无曰寂漠}
