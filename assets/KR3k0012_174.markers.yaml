  - {type: variant, offset: 2091, length: 278, content: 決意修定皆仰摸玄象體合辰極並新制置省閣堂宇名署時正構太極殿欠一梁有梅木流至石頭石頭津主啟聞取用之因畫花於梁上以表瑞焉又起朱雀重樓皆繡栭藻井門開三道上重名朱雀觀觀下門上有銅雀懸楣上刻木為龍虎左右相對王隱晉書曰高堂隆刻鄴宮屋材云後若千年當有天子居此宮惠帝止鄴宮治屋土剝更渥始見刻字計年正合時載記曰石勒欲營鄴宮先是廷尉續咸諫止之及是霖雨中山西北暴水流漂巨木百餘萬根集于堂陽勒大悅謂公卿曰諸卿知否此非為災天意欲吾營都矣於是營之勒親定規模又曰劉曜命起酆明觀立西宮建凌霄樓於滈池侍中喬豫和苞上䟽曰臣聞人主之興作也上准乾坤俯順人時是以衛文承亂亡之後宗廟流漂無所而猶上憲營, SBCK: ''}
