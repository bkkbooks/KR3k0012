  - {type: variant, offset: 1098, length: 2, content: 皆謂, WYG: 是也偃為淫首其罪三也上黙然不應良久曰吾已設飲後而自改朔曰不可夫宣室者先帝之正處也非法之政不得入焉故淫亂之漸其變為簒是以豎貂為淫而易牙作患慶父死而魯國全管蔡誅而周室安上曰善有詔止更設酒北宫引董君從東司馬門入更名東交門蘇林曰以偃從北門入交㑹}
