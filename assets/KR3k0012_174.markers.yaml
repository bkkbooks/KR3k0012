  - {type: variant, offset: 869, length: 221, content: 用勝服之於是起建章宮為千門萬戶又曰梁孝王吳楚破梁最親有功又為大國居天下膏腴北界泰山西至高陽四十餘城多大縣孝王太后少子愛之賞賜不可勝道於是孝王築東苑方三百餘里廣睢陽城七十里大治宮室為複道宮連屬於平臺四十餘里如淳曰在梁東北離宮所在晉灼曰或說在城中東北角得賜天子旌旗從千乘萬騎出警入蹕擬於天子又曰孝武作建章宮為千門萬戶有鳳凰闕高二十餘丈中有蓬萊方丈瀛洲壺梁象海中神山南有玉堂壁門大鳥之屬立神明臺井幹樓度高五十餘丈輦道相屬焉又曰秦起咸陽西至雍離宮三百, SBCK: 蜮}
