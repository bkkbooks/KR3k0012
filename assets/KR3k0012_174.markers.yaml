  - {type: variant, offset: 3559, length: 435, content: 琉璃宮紀年曰穆王所居鄭宮春宮說苑曰楚使使聘齊齊王享之梧宮使者曰大哉梧乎王曰江海之魚吞舟況大國之樹三輔故事曰桂宮周匝十里內有光明殿走狗臺土山複道橫北庭從宮中西上城至神明臺三輔黃圖曰有夜光宮望遠宮昭臺宮蒲桃宮棠梨宮萯陽宮長平宮五柞宮漢宮闕名曰長安有長樂宮未央宮長門宮鼓篁宮承光宮宜春宮池陽宮長平宮黃山宮望仙宮長楊宮集靈宮延壽宮祈年宮通天宮馺娑宮沛宮林光宮甘泉宮龍泉宮首山宮交門宮明光宮五柞宮萬歲宮竹宮壽宮建章宮太一宮思子宮見漢書長樂等宮或在京師或在外邵或帝王所居或祠祀所在或因事以置夜光宮棠梨宮扶荔宮見三輔莫圖桂宮見三輔故事鼎湖宮谷口宮魏略曰大秦國城中有五宮相去各十里宮室皆以水精為梱食器亦然郡國誌曰金河府摩磷宮北二十里有石殿一飛橋向岸畫以古賢哲士太常卿蔣少遊制太和五年文明太后來幸釣得鯉魚一雙長三尺以黃金鏁穿鰓放於池中後皆長五尺沉泛相隨正光元年五月五日天清氣爽聞池內鏘鏘聲水中驚沸須臾雷電晦冥有氣五道自池中屬於天久之乃滅波止水定唯見一魚化為龍矣又曰秦川宮昔非子到秦於此築宮, SBCK: 璿}
