  - {type: variant, offset: 4279, length: 152, content: 北面西接京城之東北隅初高宗嘗患風痺以宮內湫濕屋宇擁蔽乃於此置宮司農少卿梁孝仁充使製造北據高岡南望爽塏視終南如指掌坊市俯而可窺東京記曰上陽宮在皇城西南東苑前苑東垂南臨洛水西亙穀水上元中韋機充使所造列岸脩廊連亙掘地得銅器似盆而淺中有隱起雙鯉之狀魚間有四篆字曰長宜子孫時人以為李氏再興之符高宗末年常居此宮以聽政, SBCK: 宫其外室其内}
