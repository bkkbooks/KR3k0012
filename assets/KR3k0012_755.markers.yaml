  - {type: variant, offset: 3668, length: 1, content: 獻, SBCK: 解之儒碁後魏書曰侍中游肇性謙廉不競曽撰儒碁以表其志焉肇述儒碁曰儒碁者蓋博弈之流所以逰思於文亦猶投壷之習武也故聖人因物設敎有實有權情禮稱冝有張有㢮孔子云不有愽弈者乎爲之猶賢乎巳􅀂夫井公之對周穆叔卿之接許由此或示存恐非有待然則君子之處丗也豈遂躭於所適徒費時日者哉至於几杖盤鑑猶裁銘戒矧乃諧神之器而不加勸也但古之爲玩者莫不競進其功塞殺與樂殊途異勢並傳於時未有以謙退爲勝通生爲樂者故因暇隟聊復措意此即儒碁之一名蓋遊義之所統夲諸謙浄銓各撰徳略依儒行起捨遵道􅁤法中庸時然後玩人不厭其遊讓而後勝人逾愜其􅀒矜勇所以知殘冲遜以之弥隆豈唯崇謙止競而已諒亦階善全德之所因矣積名㑹理其殆庻幾致泥之戒寧不愧乎儒碁曰投二方二分六彩也智一禮二仁三義四信五各法生數所以記彩而行於道豈唯名義而巳籍數以爲差也謙行數無准名顯義耳進退之異唯在梟伏棊十生成之數亦不是過白黒半各用五分方五分長寸分寸所以記法善六敬七德八忠九順十各據成數所以記筭而兼名義名義雖異亦符五徳隂陽配合數盡也方局尺五周道四十其用三十六取捨途異四維之道通數而碁處惡其雅也謙退爲尚故髙彩者先投耻爲道也彼此二位謂之浄凈者謂仁義也左右二道謂之中中者謂禮智之道也其凈中四道彼此左右互有二不得相干干則􅃲也行碁之法始附凈起轉㸦相順終因凈出􅀄不凈岀必曲之者避相渉也通生爲務不存塞殺志仁恕也彩越凈中者休則立梟梟者不伏彩不會也㑹凈中者梟折爲伏伏者不梟行不越也􅀂彩雖㑹而于彼擬以過之有碁則不得擬非干彼者則自居矣居擬不同以于彼也行伏碁者得異彩依數而行兩彩同者唯行一常柔齊也一謙者停兩謙退一等貴重損也行梟碁者得異彩亦依數而行兩彩同者盡行其數鄙勇均也一謙行一道兩謙者停梟致異也行伏不得行梟行梟不得行伏殊謙競也折梟伏者皆從後定重行終也因綵而閱者屈而申之謂􅀄得謙信也縁行致累者越而通足皆不限道數進退皆尓梟伏兩閱者但行於梟先梟者進耻之義道尤多故也行碁之體不相凌觸所蹈皆靈行務靈凈唯焚觸􅀜􅀌明自在不以強弱生忻懼也絶於跪巧而順消息審理中也悉遇中道勝負乃分先梟後伏驗之於凈謙勇之辦實標先後處凈不安方顯其竟道梟􅀂促不盡二彩者則全行伏先後用永防其爲也自貽全進邊之義成也梟伏兩少者行於梟系不盡彩理無兼也彼旣出盡此有不岀者即許以爲勝者之筭以後退爲費也􅀂全未出則爲之虚投損巳益人謙者所崇次局負仍先梟勇故也得十筭立一爵三爵立則成勝矣既尚冲凈豈假務於多筭但謙並見跡故假以勝爲名也擊壤釋名曰擊壤野老之戯也􅀇晏皇甫謚號􅀇晏先生曰十七年與從姑子果柳等擊壤于路逸士傳曰堯時有壤父五十人撃壤於康衢或有觀者曰大哉堯之爲君壤父作色曰吾日出而作日入而息鑿井而飲耕田而食帝何力於我哉風􅁟記曰擊壤者以木作之前廣後銳長可尺三四寸其形如履臘節僮少以爲戲分部如擿博也藝經曰擊壤古戲也又曰壤以木爲之前廣後銳長尺四闊三寸其形如履將戲先側一壤於地遥於三四十歩以手中壤敲之中者爲上呉盛彦翁子擊壤賦曰論衆戯之爲樂獨擊壤之可娯因風託勢罪一殺兩角抵左傳曰晉侯夢與楚子􅅮搏手相􅅮楚子伏巳而盬其腦是以懼漢書曰武帝元封三年春作角觝戯應劭曰戰國之時稍增講之以爲戯樂用相誇亦至秦更名角抵者也武}
