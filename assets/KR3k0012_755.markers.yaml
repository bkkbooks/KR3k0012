  - {type: variant, offset: 538, length: 272, content: 固為功曹晉中興書曰桓玄強與人博弈取其田宅穆天子傳曰天子北入邴邴鄭邑也音枋與井公博三日而決疑井公賢人而隱者故主就戲梁冀別傳曰冀好格五六愽神仙傳曰中山衛叔卿服雲母得仙漢武使其子度世往華山求之度世望見父上有紫雲白玉為床與數人博戲度世問父所與博者是誰曰洪崖先生許由巢父也秦記曰呂光破龜茲始獲鳩摩羅什光死子纘立戲弄羅什或共碁博及殺子云斫胡奴頭什曰不斫胡奴頭其胡奴斫人頭後纘弟越字胡奴果斬纘頭涼州記曰呂光太安二年龜茲國使至獻寶貨奇珍汗血馬光臨正殿設會文武愽戲西域胡曰諸愽戲取人牛馬財物者胡俗皆陪償述征記曰極西南端門外有石石色青而細修之作博碁以遺江東甚可珍玩, WYG: 罷}
