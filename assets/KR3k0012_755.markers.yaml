  - {type: variant, offset: 262, length: 332, content: 或云雲提音抵抵擲也又曰吾丘壽王字子贛少年以善格五召待詔蘇林曰博之類也孟康曰格者行忤相周故言各或曰塞法至立各不得故云格五也又曰陳遵祖父遂字長子宣帝微時與遂有故相隨愽弈數負債及宣帝即位遂稍遷至太守賜遂璽書曰制詔太原太守官尊祿厚可以償博債矣范曄後漢書曰耿恭為戊巳校尉恭至部移檄烏孫示漢威德昆彌以下皆喜遣使獻名馬及奉宣帝所賜公主愽具願遣子入侍又曰客星經帝座或問袁延延因上封事曰河南尹鄧萬有龍潛之舊封為通侯恩重公卿惠豐宗室加禮引見與之對博上下渫音薛黷有虧尊嚴魏略曰孔桂性便妍曉博弈太祖愛之每在左右又曰杜畿與衛固少相狎侮共愽爭道畿曰我今作河東也固發衣罵之及畿之官而固為功曹晉中興書曰桓玄強與人博弈取其田宅穆天子傳曰天子北入邴邴鄭邑也音枋與井公博三日而決疑井公賢人而隱者故主就戲, SBCK: ''}
