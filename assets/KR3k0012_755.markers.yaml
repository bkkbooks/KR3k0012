  - {type: variant, offset: 1422, length: 2, content: 可向, SBCK: 得妄寘宫中宫人因以金􅁫玉梳戯於粧奩之上即取􅀋於彈棊}
  - {type: variant, offset: 1422, length: 1051, content: 可向也薛孝通譜曰烏曹作愽其所由來尚矣雙箭以象日月之照臨十二碁以象十二辰之躔次則天地之運動法陰陽之消息表人事之窮達窮變化之幾微履謙謝則知冲謝以致福觀殺罰則知當路而速禍行其道則掎鹿有歸保其家乃瞻烏爰集隱顯藏用莫不合道龍潛鵲起率皆趣良足以諧暢至娛始恊妙賞者也魏曹植治子等讚曰齊彊接子勇節徇虎門之愽忽晏置釁矜而自伐輕死重分魏王粲彈碁賦序曰因行騁志通權達理六愽是也晉李尤愽銘曰夫無用心愽弈猶賢方平處下有不邪偏樗蒱晉書曰桓玄見人有好園宅悉欲取之勒以樗愽而賭之玄微聞義軍起憂懼弗能寢食或曰劉裕等狂惑事必無成玄曰裕足為一世之雄加以果於用兵劉毅家無檐石之儲樗蒱一擲百萬何無忌劉牢之外生酷似其舅共舉大事往無不成又曰葛洪字雉川性寡欲無所愛玩不知碁局幾道樗蒱齒名又曰王獻之年數歲嘗觀門生樗蒱曰南風不競門生曰此郎亦管中窺豹時見一班又曰武帝胡貴嬪帝嘗與之樗蒱爭道遂傷上指帝怒曰此固將種也對曰北伐公孫西拒諸葛非將種而何帝甚有慚色又曰謝鯤婿殷叡好樗蒱奪其妹裝物以還戲債劉湛謂謝弘微曰謝氏累代財產充殷君一朝戲債卿視而不言譬棄物江海以為廉耳又曰陶侃字士衡見諸參佐或以談戲廢事乃取其樗蒱博具悉以投于江乃曰樗蒱者牧豬奴戲耳又曰劉毅於東府聚樗蒱大擲一判應至數百萬餘人並黑犢以還唯劉裕及毅在後毅次擲得雉太喜褰衣繞床叫謂同座曰非不能盧不事此耳裕惡之因挼五木久之曰老兄試為卿荅既而四子俱黑其一子轉躍未定裕厲聲喝之即成盧焉毅意殊不快然素黑其面如鐵色焉既而乃和言曰亦知公不能以此見借又曰周顗之死也王敦坐有一參軍樗蒱馬於博頭被殺因謂敦曰周家弈世令望而位不至公及伯仁將登而墜有似下官此馬伯仁顗之字也又曰慕容寶初在長安與韓黃李根等因讌樗蒱寶危坐整容誓之曰世云樗蒱有神豈虛也哉若富貴可期頻得三盧於是三擲三盧宋書曰何尚之時頗輕薄好樗蒱既長折節蹈道以操立見稱為陳郡謝琨所知與之遊處齊書曰李安民擊鵲尾江城有功明帝大會新亭樓勞諸軍令樗蒱共賭安民五擲皆盧帝大驚目安民曰卿面方如田封侯狀也安民少時貧窶有一人從門過相之曰君後當大富貴與天子交手共戲至是果驗後周書曰王思政雖被任委自以非相府之舊每不自安太祖曾在同州與群公宴集出錦罽及雜綾絹數叚命將樗蒱取之物既盡太祖又解所服金帶令諸人遍擲曰先得盧者即與之群公將遍莫有得者次至思政乃歛容跪坐而自誓曰王思政羇旅歸胡蒙宰相國士之遇方願盡心效命上報知己若此誠有實令宰相賜知者願擲即為盧若內懷不盡神靈亦當明之便使不作也便當殺身以謝所奉辭氣慷慨一坐盡驚即拔所佩刀橫於膝上覽樗蒱拊髀擲之比太祖止之已擲為盧矣徐乃拜而受之江蕤別傳曰蕤年十一始學樗蒱祖, WYG: 忍父}
