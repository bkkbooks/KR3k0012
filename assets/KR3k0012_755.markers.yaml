  - {type: variant, offset: 3684, length: 0, content: '', SBCK: 漢武故事曰未央庭中設角抵戲角者六國所造也􅁗并天下兼而増廣之漢興雖罷然猶不都絶至上復採用之并四夷之樂􅄂以竒幻有􅀂􅀑神角抵者使角力相抵觸也彈廣雅曰彈行丸也左傳曰晉靈公臺上彈人觀其避丸者魏書曰齊王芳爲帝常喜以彈彈人齊書曰桓榮祖善彈登西樓見翔鵠謂左右曰當生取之乃彈其兩翅毛脫盡墮地無傷飬之毛生後飛去其妙如此隋書曰長孫晟洛陽人也有鳶羣飛上謂晟曰公善彈爲我取之十發俱中並應丸而落呉越春秋曰陳音百對越王曰弩生於弓弓生於彈彈生於古之孝子古者人死投之中野孝子不忍父母爲禽獸所食則作彈以守之故古人歌之曰斷竹屬木飛􅁟逐肉西京􅄂記曰韓嫣好彈常以金爲丸一日所失者十餘長安爲之語曰苦飢寒逐金丸京師兒童毎聞嫣出彈輙隨之望丸之所落而輙拾取莊子曰以隋侯珠彈千仞之雀必􅀏所用至重所取至輕}
