  - {type: variant, offset: 3455, length: 1, content: 余, WYG: 四維戲者衛尉摯侯所造也畫紙為局截木為棊取象一原分而為二准隂陽之位擬剛柔之策而變動云為成乎其中象戲周武帝造象戲王褒為象經序曰一曰天文}
  - {type: variant, offset: 3455, length: 1, content: 余, krp: 四維戯者衛尉贄侯所造也畫紙爲局截木爲棊取無一分而爲二准隂陽之位擬剛柔之棊而變動無爲生乎其中象戲周武帝造象戲王襃爲象經序曰一曰天文}
  - {type: variant, offset: 3457, length: 1, content: 臘, WYG: 觀其象天日月星是也二曰地理以法其行地水火金木土是也三曰隂陽以順其本陽數為先本於天隂數為}
  - {type: variant, offset: 3457, length: 1, content: 臘, krp: 觀其象天日月星辰是也二曰地理以法其形地水火木金土是也三曰隂陽以順其本陽數爲先本於天隂數爲先本於地是也四曰時以政其序東方之色青其餘三色例亦如之是也五曰筭數以通其變俯仰則爲天地日月星變通則爲水火金木土是也六曰律吕以宣其氣在子取未在午取丑是也七曰八卦以定其位至震取兊至离取坎是也八曰忠孝以惇其敎出則盡忠入則盡孝是也九曰君臣以事其禮不可以貴凌賤直而爲曲不可以卑畏尊隱而無犯是也十曰文武以率其務武修七德文表四敎是也十一曰禮像以制其居上不驕爲下盡敬進退有度可法是也十二曰以考其行定而}
  - {type: punctuation, offset: 3459, content: ，, id: KR3k0012_CHANT_755-bkkpn1122}
