  - {type: variant, offset: 907, length: 295, content: 之莊子曰臧與穀牧羊而俱亡其羊問臧奚事則挾策讀書問穀奚事則愽塞以遊事業不同其亡羊均也列子曰虞氏者梁之富人也登高樓大路設樂飲酒擊愽樓上抱朴子曰南陽文氏求食入山見高岩上有數人對愽淮南子曰善愽者不欲牟愽以不傷為牟牟大也進也不恐不勝平心定意投得其齊齊得其適行由其理雖不必勝得籌必多韓子曰薛公之相魏昭侯也有陽胡蕃者於王甚重而不為薛公薛公患之於是乃與之愽與之百金令與昆弟愽戲俄又益之二百金又曰齊宣王問匡倩曰儒者愽乎對曰愽也者貴梟勝者必殺梟是殺其所貴也儒者以為害義故不博尹文子曰愽者盡開塞之宜得用通之路揚子法言曰或問侍君子愽乎曰侍坐則聽言有酒則觀禮焉事愽乎說苑曰秦始皇時嫪毒驕奢後與帝左右愽爭行乃瞋目太呼又, krp: ''}
