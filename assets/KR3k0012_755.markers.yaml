  - {type: variant, offset: 3199, length: 4, content: 指骨上惡, WYG: 卵而求時夜見彈而求鴞炙世說曰潘岳少時挟彈洛陽道婦人見之無不連手縈之談藪曰齊蕭遥欣為童子時見一小兒左右彈飛鳥未有不應弦而落者遥欣謂之曰凡戲多端何急彈此鳥自雲中髙翔何闗人事小兒感之終身不為時少年士庶競為此戲聞欣說此戲遂廢之又曰梁王謂恵子曰先生直言無得引喻恵子曰今有人不識彈問彈狀如何荅曰彈狀如彈則能了否王曰不了又曰彈狀為弓以竹為繳可知之乎王曰知矣恵子曰夫說者欲人知之無喻則不知也王曰善顧子羲訓曰人有善於射而髙於顧子顧子曰子之射雖百中猶不若我}
