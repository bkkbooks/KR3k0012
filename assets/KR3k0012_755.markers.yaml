  - {type: variant, offset: 3086, length: 439, content: 余離群索居無講誦之事欲學無友欲農無耒欲弈無塞欲博無楮問可以代博弈者乎曰塞其次也書曰始作塞者其明哲乎故其用物也約其為樂也大藏鉤辛氏三秦記曰昭帝母鉤弋夫人手拳而有國色先帝寵之世人藏鉤法此也法其拳乎西京雜記曰戚夫人以百鍊金為彄環照見指骨上惡之以賜侍兒荊楚歲時記曰為藏彄之戲辛氏以為鉤弋夫人所起周鈞成公綏並作彄字藝經庾闡則作鉤字其事同也俗去此戲令人生離有禁忌之家廢不修也風土記曰臈日飲祭之後嫂嫗兒童為藏彄之戲分二曹以效勝負若人偶即敵對人奇居宜切奇獨也即使奇人為遊附或屬上曹或屬下曹名為飛烏以齊二曹人數一彄藏在數十手中曹人當射常益切知所在一藏為籌五籌為一賭異苑曰晉海西公時有貴人會因藏彄欻有一手間在眾臂之中脩骨巨指毛色麤黑舉坐咸驚尋為桓大司馬所誅舊傳藏彄令人生離斯驗深矣晉庾闡藏彄賦曰歎延夜之藏彄賞一時之戲望以道生為元師以子仁為佐相盛翁子藏彄賦序曰余以臘後要命中外以行鉤為戲心悅其事故賦之云蹴鞠風俗通曰九毛謂之鞠郭璞三蒼解詁曰鞠毛丸可蹋戲史記蘇秦傳曰臨淄民無不吹竽鼓瑟擊筑鬭鷄走狗六博蹴鞠, SBCK: ''}
