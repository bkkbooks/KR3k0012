  - {type: variant, offset: 1980, length: 512, content: 老兄試為卿荅既而四子俱黑其一子轉躍未定裕厲聲喝之即成盧焉毅意殊不快然素黑其面如鐵色焉既而乃和言曰亦知公不能以此見借又曰周顗之死也王敦坐有一參軍樗蒱馬於博頭被殺因謂敦曰周家弈世令望而位不至公及伯仁將登而墜有似下官此馬伯仁顗之字也又曰慕容寶初在長安與韓黃李根等因讌樗蒱寶危坐整容誓之曰世云樗蒱有神豈虛也哉若富貴可期頻得三盧於是三擲三盧宋書曰何尚之時頗輕薄好樗蒱既長折節蹈道以操立見稱為陳郡謝琨所知與之遊處齊書曰李安民擊鵲尾江城有功明帝大會新亭樓勞諸軍令樗蒱共賭安民五擲皆盧帝大驚目安民曰卿面方如田封侯狀也安民少時貧窶有一人從門過相之曰君後當大富貴與天子交手共戲至是果驗後周書曰王思政雖被任委自以非相府之舊每不自安太祖曾在同州與群公宴集出錦罽及雜綾絹數叚命將樗蒱取之物既盡太祖又解所服金帶令諸人遍擲曰先得盧者即與之群公將遍莫有得者次至思政乃歛容跪坐而自誓曰王思政羇旅歸胡蒙宰相國士之遇方願盡心效命上報知己若此誠有實令宰相賜知者願擲即為盧若內懷不盡神靈亦當明之便使不作也便當殺身以謝所奉辭氣慷慨一坐盡驚即拔所佩刀橫於膝上覽樗蒱拊髀擲之比太祖止之已擲為盧矣徐乃拜而受之江蕤別傳曰蕤年十一始學樗蒱祖母為說往事有以博弈破業廢身者於是即棄五, krp: 斷竹屬}
