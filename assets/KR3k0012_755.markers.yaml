  body:
  - {type: variant, offset: 4, length: 4, content: 一愽說文, SBCK: 二彈碁儒棊擊壤角抵彈四維象戲夾食悁悶射數簸子抃擲塼彈碁東觀漢記晏帝詔}
  - {type: variant, offset: 4, length: 1, content: 一, WYG: 二彈棊儒碁擊壤角抵彈四維象戲夾食悁悶射數􅉫子抃擲磚彈棊東觀漢記曰安語曰樂成王居諒闇衰服在身彈棊為戲不肯謁陵沈約宋書曰晉平刺王休祐文帝第十三子也在荆州時左右范景達善彈碁上召之休祐留不遣上怒詰責之後趙録曰石閔使將軍蘇彦周成執石遵於南臺如意觀遵時方與婦人彈棊梁冀别傳曰冀好彈棊暑夏之月露首袒體惟在摴蒱彈棊不離綺襦紈袴之側世說曰劉真長始見王丞相時盛暑丞相以腹熨彈棋局曰何乃渹劉既出人問見王何如劉曰未見他異唯作吴語耳又曰彈棊始自魏文帝宫内裝器戲也文帝於此技特妙用手巾拂之無不中者有客自云能乃使為客著葛巾拂棊妙逾於帝魏文帝典論曰余於他戲弄之事少所喜唯彈棊略盡其妙乃為之賦昔京師先工有馬合鄉侯東方安世張公子常恨不得與彼數子者對藝經曰彈棊二人對局黒白棊各六枚先列棊相當下呼上擊之彈棊經序曰彈棊者仙家之戲也昔漢武帝平西域得胡人善蹴鞠者盡􅃷其便捷跳躍帝好而為之羣臣不能諌侍臣東方朔因以此藝進之帝乃捨蹴鞠而就彈棊焉習之者多在宫禁中故時人莫得而𫝊至王莽末赤眉凌亂西京傾覆此藝為宫人所𫝊故散落人間及章帝御宇好諸伎藝此戲乃盛於當時彈棊經後序曰自後漢沖質以後此藝中絶至獻帝建安中曹公執政}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_WYG_755-1b, image: WYG0899/WYG0899-0621b.png}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_WYG_755-2a, image: WYG0899/WYG0899-0621c.png}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_WYG_755-2b, image: WYG0899/WYG0899-0621d.png}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_WYG_755-3a, image: WYG0899/WYG0899-0622a.png}
  - {type: variant, offset: 4, length: 2, content: 一愽, krp: 二彈碁儒棊擊壤角抵彈四維象戲夾食悁悶射數簸子抃擲塼彈碁東觀漢記晏帝詔曰樂成王居諒闇音隂衰服在身彈棊爲戯不肯謁陵沈約宋書曰晉平刺王休祐文帝第十三子也在荆州時左右范景達善彈棊上召之休祐留不遣上怒詰責之趙書曰冉閔収石遵遵方與女子彈棊兵至殺之梁兾別傳曰兾好彈棊抱朴子曰暑夏之月露首袒體唯在樗蒱彈綦不離綺繻紈袴之側丗}
  - {type: xml-element, offset: 5, content: '', id: KR3k0012_CHANT_755-bkkxmlele1}
  - {type: 'tls:seg', offset: 5, content: '', id: KR3k0012_CHANT_755-1a.1}
  - {type: 'tls:seg', offset: 5, content: '', id: KR3k0012_CHANT_755-1a.2}
  - {type: substitution, offset: 5, original: 愽, replacement: 博, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-17418}}
  - {type: xml-element, offset: 6, content: '', id: KR3k0012_CHANT_755-bkkxmlele2}
  - {type: xml-element, offset: 6, content: '', id: KR3k0012_CHANT_755-bkkxmlele3}
  - {type: 'tls:seg', offset: 6, content: '', id: KR3k0012_CHANT_755-1a.3}
  - {type: punctuation, offset: 6, content: 《, id: KR3k0012_CHANT_755-bkkpn1}
  - {type: variant, offset: 6, length: 5, content: 說文曰博局, WYG: 奕之具皆得寘之宫中宫人因以金釵玉梳}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_WYG_755-3b, image: WYG0899/WYG0899-0622b.png}
  - {type: substitution, offset: 6, original: 說, replacement: 説, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19811}}
  - {type: variant, offset: 7, length: 0, content: '', krp: 曰劉眞長始見王丞相時暑之月丞相以腹熨彈棊局曰何如乃㵾呉人以冷爲㵾也音楚敬切劉旣出人問見王公何如劉曰未見他異唯作呉語耳王丞相遵也又曰彈棊始自魏}
  - {type: punctuation, offset: 8, content: 》, id: KR3k0012_CHANT_755-bkkpn2}
  - {type: variant, offset: 8, length: 0, content: '', krp: 帝宫内裝器戲也文帝於此伎特妙用手巾拂之無不中者有客自云能帝使爲之客著葛巾拂棊妙逾於帝魏文帝典論}
  - {type: punctuation, offset: 9, content: ：, id: KR3k0012_CHANT_755-bkkpn3}
  - {type: 'tls:seg', offset: 9, content: '', id: KR3k0012_CHANT_755-1a.4}
  - {type: variant, offset: 9, length: 23, content: 博局戲六箸十二碁也論語曰飽食終日無所用心難矣哉, SBCK: 樂成王居諒闇音隂衰服在身彈棊爲戯}
  - {type: variant, offset: 9, length: 0, content: '', krp: 余於他戲弄之事少所喜唯彈棊略盡其功乃爲之賦昔京師先工有馬合郷侯東方丗安張公子常恨不得與彼數子者對藝經曰彈棊二人對局黒白棊各六枚先列棊相當下呼上撃之彈棊經序曰彈棊者仙家之戲也昔漢武帝平西域得胡人善蹴鞠者蓋衒其便平聲㨗跳躍帝好而爲之羣臣不能諌侍臣東方朔因以此藝進之帝就捨蹴鞠而上彈棊焉習之者多在宫禁中故時人莫得而傳至王莽末赤眉凌亂西京傾覆此藝因宫人所傳故散落人間及章帝御宇好諸伎藝此戲乃盛於當時彈棊經後序曰自後漢冲質巳後此藝中絶至獻帝建安中曹公執政禁䦨幽密至於}
  - {type: punctuation, offset: 10, content: ，, id: KR3k0012_CHANT_755-bkkpn4}
  - {type: 'tls:seg', offset: 10, content: '', id: KR3k0012_CHANT_755-1a.5}
  - {type: variant, offset: 10, length: 0, content: '', krp: 弈之具皆不得妄寘宫中宫人因以金釵玉梳戯於粧奩之上即取類於彈棊也及魏文帝受禪宫人所爲更習彈碁焉當時朝臣名士無不争能故帝與呉季量呉質字季量書曰彈碁間設者也又曰彈棊者雅戯也非同乎五白梟橛梟橛並樗蒲彩之數不游乎紛競詆欺之間淡薄自如固趨名近利之人多不尚焉蓋道家所爲欲習其偃亞導引之法擊博騰擲之妙自暢耳又曰唐順宗在春宫日甚好之時有吉逹髙釴崔同揚同愿之徒悉爲名手後有竇深崔長孺甄顒獨孤遼亦爲亞焉至于長慶之末好事之家猶見有}
  - {type: variant, offset: 11, length: 0, content: '', krp: 尚多解者後漢蔡邕彈棊賦曰夫張局陳棊取法式備因嬉}
  - {type: punctuation, offset: 12, content: ，, id: KR3k0012_CHANT_755-bkkpn5}
  - {type: 'tls:seg', offset: 12, content: '', id: KR3k0012_CHANT_755-1a.6}
  - {type: variant, offset: 12, length: 4, content: 六箸十二, WYG: 於粧奩之上即取類於彈}
  - {type: variant, offset: 12, length: 4, content: 六箸十二, krp: 以肄業託懽宴以講事設兹矢石其夷如砥采若錦繢乎若停水肌理光澤滑不可履乗色行巧據險用智魏文帝彈棊賦曰局則荆山妙璞滑如柔荑}
  - {type: variant, offset: 17, length: 0, content: '', krp: 則玄木北幹桒樹西枝象籌列植下據雙螭王粲彈碁賦曰文石爲局金碧齊精隆中夷外理緻肌平晉傅玄彈碁賦序曰漢武帝好蹴鞠劉向以爲蹴鞠勞人體竭人力非至尊所冝乃因其體而作彈碁以解之儒碁後魏書曰侍中游肇性謙廉不競曽撰儒碁以表其志焉肇述儒碁曰儒碁者蓋博弈之流所以逰思於文亦猶投壷之習武}
  - {type: punctuation, offset: 18, content: 。, id: KR3k0012_CHANT_755-bkkpn6}
  - {type: xml-element, offset: 18, content: '', id: KR3k0012_CHANT_755-bkkxmlele4}
  - {type: xml-element, offset: 18, content: '', id: KR3k0012_CHANT_755-bkkxmlele5}
  - {type: 'tls:seg', offset: 18, content: '', id: KR3k0012_CHANT_755-1a.7}
  - {type: punctuation, offset: 18, content: 《, id: KR3k0012_CHANT_755-bkkpn7}
  - {type: variant, offset: 18, length: 2, content: 論語, WYG: 及魏文帝受禪宫人因更習彈棊焉當時朝臣名士無不争能故帝與吴季重書}
  - {type: variant, offset: 18, length: 14, content: 論語曰飽食終日無所用心難矣哉, krp: 故聖人因物設敎有實有權情禮稱冝有張有㢮孔子云}
  - {type: punctuation, offset: 20, content: 》, id: KR3k0012_CHANT_755-bkkpn8}
  - {type: punctuation, offset: 21, content: ：, id: KR3k0012_CHANT_755-bkkpn9}
  - {type: 'tls:seg', offset: 21, content: '', id: KR3k0012_CHANT_755-1a.8}
  - {type: punctuation, offset: 21, content: 「, id: KR3k0012_CHANT_755-bkkpn10}
  - {type: variant, offset: 21, length: 3, content: 飽食終, WYG: 彈棊間設者也又曰彈棊者雅戲也非事乎千百梟橛之數不㳺乎紛競詆欺之間淡薄自如故趨名近利之人多不尚焉盖道家所為欲習其偃亞導引之法撃摶騰擲之妙以自暢耳又曰唐順宗在春宫}
  - {type: punctuation, offset: 25, content: ，, id: KR3k0012_CHANT_755-bkkpn11}
  - {type: 'tls:seg', offset: 25, content: '', id: KR3k0012_CHANT_755-1a.9}
  - {type: variant, offset: 25, length: 1, content: 無, WYG: 甚好之時有吉達髙釴崔同楊愿之徒委為名手後有竇深崔長孺甄顒孤獨遼亦為亞焉至於長慶之末好事之家猶見有局尚多解者後漢蔡邕彈碁賦曰夫張局陳棊取法武備因嬉戲以肄業託懽冥以講事設兹矢石其夷如砥采若錦繢平若停水肌理光澤滑不可履乗色行巧據險用智魏文帝彈棊賦曰文石為局金碧齊精隆中夷外理緻肌平晉傅𤣥彈棊賦序曰漢成帝好蹴鞠劉向以為蹴鞠勞人體竭人力非至尊}
  - {type: page-break, offset: 25, content: '', id: KR3k0012_WYG_755-4a, image: WYG0899/WYG0899-0622c.png}
  - {type: page-break, offset: 25, content: '', id: KR3k0012_WYG_755-4b, image: WYG0899/WYG0899-0622d.png}
  - {type: variant, offset: 27, length: 5, content: 用心難矣哉, WYG: 宜乃因其體而作彈碁以代之儒碁後魏書曰侍中游肇謙廉不競曽撰儒棋者盖􅀶奕之流所以逰思於文亦猶投壺之習武也故聖人因物設教有實有權情禮稱宜有張有弛孔子云}
  - {type: punctuation, offset: 29, content: ，, id: KR3k0012_CHANT_755-bkkpn12}
  - {type: 'tls:seg', offset: 29, content: '', id: KR3k0012_CHANT_755-1a.10}
  - {type: punctuation, offset: 32, content: ！, id: KR3k0012_CHANT_755-bkkpn13}
  - {type: 'tls:seg', offset: 32, content: '', id: KR3k0012_CHANT_755-1a.11}
  - {type: variant, offset: 33, length: 62, content: 有博弈者乎為之猶賢乎已家語曰哀公問於孔子曰吾聞君子不博有之乎孔子曰有之為其二乘也公曰有二乘何為不博孔子曰為其兼行惡道也史記曰, SBCK: 肯謁陵沈約}
  - {type: variant, offset: 34, length: 1, content: 博, WYG: 􅀶}
  - {type: variant, offset: 34, length: 1, content: 博, krp: 愽}
  - {type: variant, offset: 35, length: 1, content: 弈, WYG: 奕}
  - {type: substitution, offset: 35, original: 弈, replacement: 奕, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-20422}}
  - {type: punctuation, offset: 38, content: ？, id: KR3k0012_CHANT_755-bkkpn14}
  - {type: 'tls:seg', offset: 38, content: '', id: KR3k0012_CHANT_755-1a.12}
  - {type: variant, offset: 38, length: 1, content: 為, krp: 爲}
  - {type: variant, offset: 43, length: 0, content: '', krp: 巳若夫井公之對周穆叔卿之接許由此或示存恐非有待然則君子之處丗也豈遂躭於所適徒費時日者哉至於几杖盤鑑猶裁銘戒矧乃諧神之器而不加勸也但古之爲玩者莫不競進其功塞殺與樂殊途異勢並傳於時未有以謙退爲勝通生爲樂者故因暇隟聊復措意此即儒碁之一名蓋遊義之所統夲諸謙浄銓各撰徳略依儒行起捨遵道軌法中庸時然後玩人不厭其遊讓而後勝人逾愜其負矜勇所以知殘冲遜以之弥隆豈唯崇謙止競而}
  - {type: punctuation, offset: 44, content: 。, id: KR3k0012_CHANT_755-bkkpn15}
  - {type: punctuation, offset: 44, content: 」, id: KR3k0012_CHANT_755-bkkpn16}
  - {type: xml-element, offset: 44, content: '', id: KR3k0012_CHANT_755-bkkxmlele6}
  - {type: xml-element, offset: 44, content: '', id: KR3k0012_CHANT_755-bkkxmlele7}
  - {type: 'tls:seg', offset: 44, content: '', id: KR3k0012_CHANT_755-2a.1}
  - {type: 'tls:seg', offset: 44, content: '', id: KR3k0012_CHANT_755-2a.2}
  - {type: punctuation, offset: 44, content: 《, id: KR3k0012_CHANT_755-bkkpn17}
  - {type: variant, offset: 44, length: 2, content: 家語, WYG: 者若夫井公之對支同穆叔卿之接許由此或示存恐非有待然則君子之處世也豈遂耽於所適徒費時日者哉至於几杖盤檻猶載銘戒矧乃諧神之品而不加勸也但古之為玩者莫不競進其功塞殺與樂殊途異勢並𫝊於時未有以謙退為勝通生為悅者故因閒暇聊復措意此即儒碁之一名盖遊藝之所統本諸謙浄詮名撰得畧依儒行起捨遵道執法中庸時然後玩人不厭其遊讓而後勝人逾惬其負私忿以之悉化沖遜以之彌隆豈唯崇謙止敬而已諒亦諧善全徳之所因夫稽名㑹理其殆庶幾致泥之戒寜不愧乎儒碁}
  - {type: page-break, offset: 44, content: '', id: KR3k0012_WYG_755-5a, image: WYG0899/WYG0899-0623a.png}
  - {type: page-break, offset: 44, content: '', id: KR3k0012_WYG_755-5b, image: WYG0899/WYG0899-0623b.png}
  - {type: variant, offset: 44, length: 2, content: 家語, krp: 諒亦階善全德之所因矣積名㑹理其殆庻幾致泥之戒寧不愧乎儒碁}
  - {type: punctuation, offset: 46, content: 》, id: KR3k0012_CHANT_755-bkkpn18}
  - {type: punctuation, offset: 47, content: ：, id: KR3k0012_CHANT_755-bkkpn19}
  - {type: 'tls:seg', offset: 47, content: '', id: KR3k0012_CHANT_755-2a.3}
  - {type: punctuation, offset: 47, content: 「, id: KR3k0012_CHANT_755-bkkpn20}
  - {type: variant, offset: 47, length: 3, content: 哀公問, WYG: 投二智一禮二仁三義四信五棋下白黒半方五分長寸方寸所以記法善六敬七徳八忠九順十方局尺五周道四十其用三十六取捨途異四維之道通數而棊謙退為尚故髙彩者先投恥為道也彼此二位謂之浄浄者行義也左右二道謂之中其浄中四道彼此左右牙有二不得相干干則鬭也行碁之法始附浄起轉牙相順經因浄中出初不浄出必曲之進避相渉也通生為務不存塞殺志仁恕也彩越浄中者休則立梟梟者不伏彩不念也㑹浄者梟折為伏伏者不梟行不越也若彩雖㑹而干彼擬過之非干彼者則自居矣居擬不同以干彼也行伏棋者得以彩依數而行兩彩同者唯行一一謙者停兩謙退一等行梟碁者得異彩亦候數而行兩彩同者盡行其數一謙一行道兩謙者停行伏不得行梟不得行伏折梟伏者皆從后定因彩而閟者屋而申之不初得謙信也縁行致累者閱而通足皆不限道數進退皆爾梟伏而閱者但行于梟先梟者廷之又道尤恥多過也行碁之體不相凌觸所蹈皆靈孤明自在不强弱生以忻懼也絶}
  - {type: page-break, offset: 47, content: '', id: KR3k0012_WYG_755-6a, image: WYG0899/WYG0899-0623c.png}
  - {type: variant, offset: 47, length: 3, content: 哀公問, krp: 投二方二分六彩也智一禮二仁三義四信五各法生數所以記彩而行}
  - {type: variant, offset: 51, length: 1, content: 孔, WYG: 詭巧而順消息悉遇中道勝負乃分先梟後伏驗之於浄謙勇之辨實標先后竟處净不安方顯其道梟若從不盡二彩者則全行伏先后用伏防歸也自貽全進退之義成也梟伏兩少者行於梟雖不盡彩理元兼也彼既出盡此有不出者即許以為勝者之筭若全未出則為之露投損己益人謙者所崇次局負仍先得十算立一爵三爵立則成勝矣擊壤釋名曰擊壤野老之戲也𤣥晏曰十七年與從姑}
  - {type: page-break, offset: 51, content: '', id: KR3k0012_WYG_755-6b, image: WYG0899/WYG0899-0623d.png}
