  - {type: variant, offset: 51, length: 1, content: 孔, krp: 道豈唯名義而巳籍數以爲差也謙行數無准名顯義耳進退之異唯在梟伏棊十生成之數亦不是過白黒半各用五分方五分長寸分寸所以記法善六敬七德八忠九順十各據成數所以記筭而兼名義名義雖異亦符五徳隂陽配合數盡也方局尺五周道四十其用三十六取捨途異四維之道通數而碁處惡其雅也謙退爲尚故髙彩者先投耻爲道也彼此二位謂之浄凈者謂仁義也左右二道謂之中中者謂禮智之道也其凈中四道彼此左右互有二不得相干干則鬪也行碁之法始附凈起轉㸦相順終因凈出𥘉不凈岀必曲之者避相渉也通生爲務不存塞殺志仁恕也彩越凈中者休則立梟梟者不伏彩不會也㑹凈中者梟折爲伏伏者不梟行不越也若彩雖㑹而于彼擬以過之有碁則不得擬非干彼者則自居矣居擬不同以于彼也行伏碁者得異彩依數而行兩彩同者唯行一常柔齊也一謙者停兩謙退一等貴重損也行梟碁者得異彩亦依數而行兩彩同者盡行其數鄙勇均也一謙行一道兩謙者停梟致異也行伏不得行梟行梟不得行伏殊謙競也折梟伏者皆從後定重行終也因綵而閱者屈而申之謂𥘉得謙信也縁行致累者越而通足皆不限道數進退皆尓梟伏兩閱者但行於梟先梟者進耻之義道尤多故也行碁之體不相凌觸所蹈皆靈行務靈凈唯焚觸關孤明自在不以強弱生忻懼也絶於跪巧而順消息審理中也悉遇中道勝負乃分先梟後伏驗之於凈謙勇之辦實標先後處凈不安方顯其竟道梟若促不盡二彩者則全行伏先後用永防其爲也自貽全進邊之義成也梟伏兩少者行於梟系不盡彩理無兼也彼旣出盡此有不岀者即許以爲勝者之筭以後退爲費也若全未出則爲之虚投損巳益人謙者所崇次局負仍先梟勇故也得十筭立一爵三爵立則成勝矣既尚冲凈豈假務於多筭但謙並見跡故假以勝爲名也擊壤釋名曰擊壤野老之戯也玄晏皇甫謚號玄晏先生曰十七年與從姑}
