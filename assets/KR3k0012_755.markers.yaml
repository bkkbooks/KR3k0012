  - {type: variant, offset: 2493, length: 689, content: 終身不為戲抱朴子曰林盧山中有一亭其中有鬼每有宿者常有十許人衣袍或白或黑或男或女有王伯夷過宿而坐誦經夜有十餘人與伯夷對坐自持樗蒱伯夷密以鏡照之乃群犬也郭子曰恒公宣武也年少至貧嘗樗蒱失數百斛米齒既惡意亦沮自審不復振乃請救於袁彥道桓具以情告袁欣然無忤便即俱去出門云我不但拔卿要為卿破之我必作快齒卿但快喚既戲袁形勢呼咀音恒咀相呵慨牡擲必盧雉二人齊叫敵家震懼喪氣俄頃獲數百萬博物志曰老子入胡日作樗蒱焉俗說曰殷伯弟為何無忌參軍在潯陽與何共樗蒱得何百萬便住何大怒罵殷世說曰溫嶠位未高時屢與楊州淮中賈客樗蒱每輒不競嘗一過大輸物盡戲屈無因得反與太尉庾亮友善嶠於舫中大喚庾亮卿可贖我庾即送直然後得還異苑曰穎川陳寂元嘉中晝忽有一足鬼長三尺許為寂驅使欲與鄰人樗蒱而無五木鬼乃取刀斫庭中楊枝於戶間作之即燒灼黑白雖分明但朴爾又曰昔有人乘馬出行於岫裏見二老公相對樗蒱遂下馬以策拄地而觀之自謂俄頃望視其馬鞭漼然已爛顧瞻其馬鞍亦枯朽既還無復親識一慟而絕庾翼集曰頃聞諸君有樗蒱過差者初為是政事閑暇以娛意耳故未有言也今知大相聚集漸以成俗聞之能不憮然繁欽威儀箴曰其有退朝偃息閑居操橩瞿營切橩博子弄碁文局樗蒱言不及義勝負是圖塞說文曰塞行碁相塞謂之塞齊書曰沈文季字仲達吳興武康人也尤善塞用五子穆天子傳曰天子北入邴音枋與井公塞魏王朗塞勢曰余所與遊處唯東萊徐先生素習九章能為計數問可以代博弈者乎曰塞其次也乃試習其術以驚睡焉邊韶塞賦序曰余離群索居無講誦之事欲學無友欲農無耒欲弈無塞欲博無楮問可以代博弈者乎曰塞其次也書曰始作塞者其明哲乎故其用物也約其為樂也大藏鉤辛氏三秦記曰昭帝母鉤弋夫人手拳而有國色先帝寵之世人藏鉤法此也法其拳乎, krp: 飛土逐肉}
