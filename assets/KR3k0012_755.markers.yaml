  - {type: variant, offset: 3464, length: 0, content: '', WYG: 正其序東方之色青餘三色例亦如之是也五曰筭數以通其變俯仰則為天地日月星變通則為水火金木土是也六曰律吕以宣其氣在子取未在午取丑是也七曰八卦以定其位至震取兌至離取坎是也八曰忠孝以惇其教出則盡忠入則盡孝是也九曰君臣以定其禮不可以貴凌賤直而為曲不可以卑䙝尊隠而無犯是也十曰文武以成其務武論七徳文表四教是也十一曰禮儀以制其則居上不驕為下盡敬進退有度可法是也十二曰觀徳以考其}
  - {type: page-break, offset: 3464, content: '', id: KR3k0012_WYG_755-11b, image: WYG0899/WYG0899-0626b.png}
  - {type: variant, offset: 3464, length: 0, content: '', krp: 報言義存遷善或黜退以貶過事在懲惡或以沈審爲貴正其瞻視或以徇齊爲功明其糺察得失表於隆替在賤必申怠敬彰於觀沮處尊思屈片善崇於拱璧一言踰於華衮夾食藝經曰夾食者二人黄黒各十七其撗列於前第四道上甲乙迭推二棊夾一爲食棊不得食兩不得邊食不由道則不}
  - {type: variant, offset: 3465, length: 1, content: 鉤, WYG: 定而後求義而後取時然後言樂然後笑是也或升進以報徳義取遷善或黜退以貶過事在懲惡或以沈審}
  - {type: page-break, offset: 3465, content: '', id: KR3k0012_WYG_755-12a, image: WYG0899/WYG0899-0626c.png}
  - {type: variant, offset: 3465, length: 16, content: 鉤為戲心悅其事故賦之云蹴鞠風俗通, krp: 碁入夾不取食一棊爲籌賭多少隨人所制悁於玄反悶藝經}
  - {type: variant, offset: 3467, length: 0, content: '', WYG: 貴正其瞻視或以狥齊為功明其糾察得失表於隆替在賤必申怠敬彰於勸沮處尊思屈片善崇於拱璧一徳踰於華袞夾食藝經曰夾食者二人黄黒各七十棋横列於前第四道上甲乙迭推二棋夾一為食棋不得食十兩不得過食不由道則不行棋如挟不取食一棋為籌賭多少隨人所為悁悶藝經曰悁悶先悶其位以十二時相從文曰同有文章虎不如龍豕者何為来如兔宫王孫盡卜乃造黄鍾大往兢馬非類相從羊奔蛇宂牛入雞籠射數纂文曰詭億一曰射意一曰射數即擲錢也梁冀别𫝊曰冀好意錢􅉫子藝經曰子之多少人之朋數隨}
