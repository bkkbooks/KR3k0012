  - {type: variant, offset: 885, length: 21, content: 竹為之長六分或用二箸愽昌又作太愽經一篇今世, krp: 竒幻有若鬼神角抵者使角力相抵觸也彈廣雅曰彈行丸也左}
  - {type: variant, offset: 887, length: 199, content: 之長六分或用二箸愽昌又作太愽經一篇今世傳之莊子曰臧與穀牧羊而俱亡其羊問臧奚事則挾策讀書問穀奚事則愽塞以遊事業不同其亡羊均也列子曰虞氏者梁之富人也登高樓大路設樂飲酒擊愽樓上抱朴子曰南陽文氏求食入山見高岩上有數人對愽淮南子曰善愽者不欲牟愽以不傷為牟牟大也進也不恐不勝平心定意投得其齊齊得其適行由其理雖不必勝得籌必多韓子曰薛公之相魏昭侯也有陽胡蕃者於王甚重而不為薛公薛公患之於是乃與之愽與之百金令與昆弟愽, WYG: ''}
