  - {type: variant, offset: 3286, length: 3, content: 分二曹, krp: 多端何急彈此鳥自雲中髙翔何關人事小兒感之終身不捉時少年士庶競爲此戯欣之一說此戯遂廢之又曰梁王謂惠子曰先生直言無得引喻惠子曰今有人不識彈問彈狀如何荅曰彈狀如彈則能了否王曰不了又曰彈狀如弓}
  - {type: variant, offset: 3290, length: 3, content: 效勝負, krp: 竹爲弦可知之乎王曰知矣惠子曰夫說者欲人知之無諭則不知也王曰善顧子義訓曰人有善於射而髙於顧子顧子曰子之射雖百中猶不}
