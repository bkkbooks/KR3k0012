  - {type: variant, offset: 3752, length: 0, content: '', SBCK: 以政其序東方之色青其餘三色例亦如之是也五曰筭數以通其變俯仰則爲天地日月星變通則爲水火金木土是也六曰律吕以宣其氣在子取未在午取􅐫是也七曰八卦以定其位至震取兊至离取坎是也八曰忠孝以惇其敎出則盡忠入則盡孝是也九曰君臣以事其禮不可以貴凌賤直而爲曲不可以卑畏尊隱而無犯是也十曰文武以率其務武修七德文表四敎是也十一曰禮像以制其居上不驕爲下盡敬進退有度可法是也十二曰以考其行定而後求求而後取時然後言樂然後􅀏是也或外遷以報言義存遷善或黜退以貶過事在懲惡或以沈審爲貴正其瞻視或以徇齊爲功明其糺察得失表於隆替在賤必申怠敬彰於觀沮處尊思屈片善崇於拱璧一言踰於華衮夾食藝經曰夾食者二人黄黒各十七其撗列於前第四道上甲乙迭推二棊夾一爲食棊不得食兩不得邊食不由道則不行碁入夾不取食一棊爲籌賭多少隨人所制悁於􅀇反悶藝經曰悁悶者先布本位以十二時相從文曰同有文章虎不如龍豕者何爲來入莬宫王孫晝卜乃造黄鍾大往就馬非􅀋相從羊奔蛇穴牛入鷄籠射數纂文曰詭億一曰射數梁兾別傳曰兾好意錢􅉫子藝經曰子之多少人之明數隨戲者制始十子爭先以落多爲不妙抃漢書曰甘延壽字君况以良家子善􅀐射試抃爲期門以材力愛幸又曰哀帝時覽抃射武戯孟康注曰手搏爲抃角力爲武左思呉都賦曰抃壷搏擲塼續搜神}
