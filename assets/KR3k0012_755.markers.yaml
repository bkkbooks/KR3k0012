  - {type: variant, offset: 3195, length: 3, content: 彄環照, WYG: 丸一日所失者十餘長安為之語曰苦飢寒逐金丸京師兒童每聞嫣出彈輒隨之望丸之所落而輒拾取莊子曰以隋侯之珠彈千仭之雀必笑所用至重所取至輕又曰}
