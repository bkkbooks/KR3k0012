  - {type: variant, offset: 3748, length: 3, content: 起戰國, SBCK: 何以爲然顧子曰子之所射老狸之皮耳我之所彈彈狐之心濳夫論曰懷丸挾彈携手遨遊外不足防宼盗内不足禁鼷䑕四維晉李秀四維賦序曰四維戯者衛尉贄侯所造也􅀞紙爲局截木爲棊取無一分而爲二准隂陽之位擬剛柔之棊而變動無爲生乎其中象戲周武帝造象戲王襃爲象經序曰一曰天文以觀其象天日月星辰是也二曰地理以法其形地水火木金土是也三曰隂陽以順其本陽數爲先本於天隂數爲先本於地是也四曰}
