  - {type: variant, offset: 1734, length: 1349, content: 局幾道樗蒱齒名又曰王獻之年數歲嘗觀門生樗蒱曰南風不競門生曰此郎亦管中窺豹時見一班又曰武帝胡貴嬪帝嘗與之樗蒱爭道遂傷上指帝怒曰此固將種也對曰北伐公孫西拒諸葛非將種而何帝甚有慚色又曰謝鯤婿殷叡好樗蒱奪其妹裝物以還戲債劉湛謂謝弘微曰謝氏累代財產充殷君一朝戲債卿視而不言譬棄物江海以為廉耳又曰陶侃字士衡見諸參佐或以談戲廢事乃取其樗蒱博具悉以投于江乃曰樗蒱者牧豬奴戲耳又曰劉毅於東府聚樗蒱大擲一判應至數百萬餘人並黑犢以還唯劉裕及毅在後毅次擲得雉太喜褰衣繞床叫謂同座曰非不能盧不事此耳裕惡之因挼五木久之曰老兄試為卿荅既而四子俱黑其一子轉躍未定裕厲聲喝之即成盧焉毅意殊不快然素黑其面如鐵色焉既而乃和言曰亦知公不能以此見借又曰周顗之死也王敦坐有一參軍樗蒱馬於博頭被殺因謂敦曰周家弈世令望而位不至公及伯仁將登而墜有似下官此馬伯仁顗之字也又曰慕容寶初在長安與韓黃李根等因讌樗蒱寶危坐整容誓之曰世云樗蒱有神豈虛也哉若富貴可期頻得三盧於是三擲三盧宋書曰何尚之時頗輕薄好樗蒱既長折節蹈道以操立見稱為陳郡謝琨所知與之遊處齊書曰李安民擊鵲尾江城有功明帝大會新亭樓勞諸軍令樗蒱共賭安民五擲皆盧帝大驚目安民曰卿面方如田封侯狀也安民少時貧窶有一人從門過相之曰君後當大富貴與天子交手共戲至是果驗後周書曰王思政雖被任委自以非相府之舊每不自安太祖曾在同州與群公宴集出錦罽及雜綾絹數叚命將樗蒱取之物既盡太祖又解所服金帶令諸人遍擲曰先得盧者即與之群公將遍莫有得者次至思政乃歛容跪坐而自誓曰王思政羇旅歸胡蒙宰相國士之遇方願盡心效命上報知己若此誠有實令宰相賜知者願擲即為盧若內懷不盡神靈亦當明之便使不作也便當殺身以謝所奉辭氣慷慨一坐盡驚即拔所佩刀橫於膝上覽樗蒱拊髀擲之比太祖止之已擲為盧矣徐乃拜而受之江蕤別傳曰蕤年十一始學樗蒱祖母為說往事有以博弈破業廢身者於是即棄五木終身不為戲抱朴子曰林盧山中有一亭其中有鬼每有宿者常有十許人衣袍或白或黑或男或女有王伯夷過宿而坐誦經夜有十餘人與伯夷對坐自持樗蒱伯夷密以鏡照之乃群犬也郭子曰恒公宣武也年少至貧嘗樗蒱失數百斛米齒既惡意亦沮自審不復振乃請救於袁彥道桓具以情告袁欣然無忤便即俱去出門云我不但拔卿要為卿破之我必作快齒卿但快喚既戲袁形勢呼咀音恒咀相呵慨牡擲必盧雉二人齊叫敵家震懼喪氣俄頃獲數百萬博物志曰老子入胡日作樗蒱焉俗說曰殷伯弟為何無忌參軍在潯陽與何共樗蒱得何百萬便住何大怒罵殷世說曰溫嶠位未高時屢與楊州淮中賈客樗蒱每輒不競嘗一過大輸物盡戲屈無因得反與太尉庾亮友善嶠於舫中大喚庾亮卿可贖我庾即送直然後得還異苑曰穎川陳寂元嘉中晝忽有一足鬼長三尺許為寂驅使欲與鄰人樗蒱而無五木鬼乃取刀斫庭中楊枝於戶間作之即燒灼黑白雖分明但朴爾又曰昔有人乘馬出行於岫裏見二老公相對樗蒱遂下馬以策拄地而觀之自謂俄頃望視其馬鞭漼然已爛顧瞻其馬鞍亦枯朽既還無復親識一慟而絕庾翼集曰頃聞諸君有樗蒱過差者初為是政事閑暇以娛意耳故未有言也今知大相聚集漸以成俗聞之能不憮然繁欽威儀箴曰其有退朝偃息閑居操橩瞿營切橩博子弄碁文局樗蒱言不及義勝負是圖塞說文曰塞行碁相塞謂之塞齊書曰沈文季字仲達吳興武康人也尤善塞用五子穆天子傳曰天子北入邴音枋與井公塞魏王朗塞勢曰余所與遊處唯東萊徐先生素習九章能為計數問可以代博弈者乎曰塞其次也乃試習其術以驚睡焉邊韶塞, SBCK: ''}
