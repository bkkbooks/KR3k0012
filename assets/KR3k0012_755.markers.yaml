  - {type: variant, offset: 3285, length: 0, content: '', krp: 望丸之所落而輙拾取莊子曰以隋侯珠彈千仞之雀必笑所用至重所取至輕又曰見卵而求時夜見彈而思鴞肉丗說曰潘岳少時挾彈洛陽道婦人見之無不連手縈之談藪曰齊蕭遥欣爲童子時見一小兒左右彈飛禽未有不應弦而落者遥欣謂之曰凡}
