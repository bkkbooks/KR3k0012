  - {type: variant, offset: 1331, length: 399, content: 大風吹天下之塵垢皆去又夢人執千鈞之弩驅羊數萬群帝寤而歎曰風為號令執政者垢去土解清治者天下豈有姓風名后者也哉夫千鈞之弩異力能遠者也驅羊數萬群是能善牧者也天下豈有姓力名牧者也於是依二夢之占而求之得風后于海隅登以為相得力牧于大澤進以為將又曰湯思賢夢見有人負鼎抗俎對己而笑寤而占曰鼎為和味俎者割截天下豈有人為吾宰者哉初力牧之後曰伊摯耕於有莘之野湯聞以幣聘有莘之君留而不進湯乃求婚於有莘之君有莘之君遂嫁女於湯以摯為媵臣至毫乃負鼎抱俎見湯也列子曰覺有八徵夢有六候奚謂六候一曰正夢二曰噩夢三曰思夢四曰寤夢五曰喜夢六曰懼夢此六者神所交也一體之盈虛消息皆通於天地應於物類故陰氣壯則夢涉大水而恐懼陽氣壯則夢涉大火而燔𤋲陰陽俱壯則夢生殺以浮虛為疾者則夢揚以沉實為疾者則夢溺藉帶而寢則夢虵飛鳥衘髮則夢飛將陰夢火將疾夢食飲酒者憂歌舞者哭故神遇為夢形接為事古之真人其覺自忘其寢不夢又曰西極之南隅有國名古莽陰陽之氣所不交寒暑亡辯, SBCK: ''}
