  - {type: variant, offset: 624, length: 0, content: '', SBCK: 隂人寳鼎中拜司徒􅀄爲尚書夢松樹生其腹上謂人曰松字十八公也後十八年爲公乎遂如夢焉蜀志曰蔣琬字公琰夜夢有一牛頭在門前流血滂沲問占夢趙直直曰天見血者事分明也牛角及鼻公子之象君位卒當至公吴志曰孫休字子烈封瑯瑘王居㑹稽夢乗龍上天顧不見尾覺而異之孫皓廢休立七年薨孫皓悉誅其子又曰吴主孫權潘夫人㑹稽句章人得幸有身夢有似龍頭授已者已以蔽􅂰授之遂生孫亮王隱晉書曰陶侃字士衡鄱}
  - {type: page-break, offset: 624, content: '', id: KR3k0012_SBCK_398-2a}
  - {type: variant, offset: 624, length: 0, content: '', WYG: 隂人寶鼎中拜司徒初為尚書夢松樹出其腹上謂人曰松字十八公也後十八年為公乎遂如夢焉蜀志曰蔣琬字公琰夜夢有一牛頭在門前流血滂沲問占夢趙直直曰夫見血者事分明也牛角及鼻公字之象君位卒當至公呉志曰孫休字子烈封琅琊王居㑹稽夢乘龍上天顧不見尾覺而異之孫皓廢休立七年薨孫皓悉誅其子又曰呉主孫權潘夫人㑹稽句章人得幸有身夢有似龍頭授已者已以蔽膝受之遂生孫亮王隱晉書曰陶侃字士行鄱}
  - {type: page-break, offset: 624, content: '', id: KR3k0012_WYG_398-3a, image: WYG0896/WYG0896-0510c.png}
  - {type: variant, offset: 624, length: 0, content: '', krp: 隂人寳鼎中拜司徒𥘉爲尚書夢松樹生其腹上謂人曰松字十八公也後十八年爲公乎遂如夢焉蜀志曰蔣琬字公琰夜夢有一牛頭在門前流血滂沲問占夢趙直直曰天見血者事分明也牛角及鼻公子之象君位卒當至公吴志曰孫休字子烈封瑯瑘王居㑹稽夢乗龍上天顧不見尾覺而異之孫皓廢休立七年薨孫皓悉誅其子又曰吴主孫權潘夫人㑹稽句章人得幸有身夢有似龍頭授已者已以蔽膝授之遂生孫亮王隱晉書曰陶侃字士衡鄱}
