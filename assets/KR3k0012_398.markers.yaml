  - {type: variant, offset: 939, length: 0, content: '', krp: 名恪孝文帝長子也母曰髙氏𥘉夢爲日所逐避於牀下化爲龍遶巳數匝寤而驚悸遂娠而生帝也後周書曰柳霞㓜而爽邁其丗父慶逺特器異之謂霞曰吾昔逮事伯父太尉公甞語吾云我作一夢夢汝登一樓甚峻麗吾以坐席與汝汝後名官必逹恨吾不及見耳吾向聊復晝寢又夢將昔坐席還以賜汝汝之官位當復及吾特冝勉勵以應嘉祥也又日髙琳字秀琳其先髙麗人母甞祓禊泗濵卧遇見一石光彩㓪潤遂持歸是夜夢見一人衣冠若仙者謂曰夫人向所持來石是浮磬之精耳君受之必生令子母驚寤舉身流汗俄而有娠及生琳因以名字焉及長有大度智略從文帝累有戰功位至開府儀同三司三國典略曰髙勸甞夢履衆星而行覺而内喜遂傾産以結客又曰宇文}
  - {type: variant, offset: 940, length: 0, content: '', SBCK: 貴昌􅀺大􅁄人也母􅀄孕貴夢有老人抱一兒授之曰賜爾是子俾壽且貴及生形􅀋所夢故以永貴字之又曰齊陽休之㓜年將仕夢鄴城東南有大冢上有銅柱跗爲蓮花休之從西北而登以手捉柱柱右轉夢中呪曰三匝而止柱如其言榮貴之後所居之宅竟在其地又曰祖珽知齊太上有大志深自結納甞啓曰昨夢大王乗龍上天願深自愛太上大喜即位之後擢拜中書侍郎又曰梁孝元字丗誠梁武第七子也小字七符􅀄梁武夢眇目僧執香鑪稱託生王宫旣而采女石氏侍始褰户幔有風迴裙梁武帝意感幸之采女夢月墮懷中遂孕孝元載誕之夕舉室光明室中有非常香氣及紫胞之異梁書曰江淹少夢見人授之五色筆因而有文章後十餘年忽夢一丈夫自稱郭璞謂淹曰前借君筆可相還淹夢中探懷中筆自此後不復有文章時稱淹才盡又曰鄭灼少事皇侃灼性精勤尤明三禮少時甞夢皇侃謂曰鄭郎開口侃因唾灼口中自後義理益進又曰何􅀧少時嘗患渴經歳不愈後在吴中石佛寺僧建講晝寢夢一道人形貌非常授丸一掬夢中服之而差陳書曰髙祖微時甞遊義興舘於許氏夢天開數丈有四人朱衣捧日而至納之帝口及覺腹内猶􅀬南史曰徐陵字孝穆母藏氏甞夢五色雲化爲鳯集左肩上巳而誕陵年數􅀊家人携以􅀱沙門釋寳誌寳誌曰此天上石麒麟也唐書曰李嶠趙州賛皇人隋内史侍郎元操從曽孫也代爲著姓父鎮惡襄城令嶠早􅀌事母以孝聞爲兒童時夢有神人遺之􅀟筆自是漸有學業弱冠舉進士又曰尹知章絳州翼城人少勤學甞夢神人以大鑿開其心以藥内之自是日益開㓪盡通諸經義未幾而諸師反北靣受業焉又曰張薦字孝舉深州陸澤人祖鷟字文成聦警絶倫書無不覽爲兒童時夢紫色大鳥五彩成文降于家庭其祖謂之曰五色赤文鳯也紫文鸑鷟也爲鳯之佐吾兒當以文章瑞於朝廷因以爲名字又曰天寳中}
