  - {type: variant, offset: 634, length: 0, content: '', SBCK: 侃鎧者長史陳恊以爲司馬者國姓也鎧者扞禦之器節下當進位㤗興二年侃加平南將軍又曰鄧殷爲淮南太守夢行水邊見一女子虎在後來盪斷鞶囊占者以爲水邊有女汝字也斷鞶囊者新虎頭代故虎頭也不作汝隂當}
  - {type: page-break, offset: 634, content: '', id: KR3k0012_SBCK_398-2b}
  - {type: variant, offset: 634, length: 0, content: '', WYG: 侃鎧者長史陳恊以為司馬者國姓也鎧者扞禦之噐節下當進位泰興二年侃加平南將軍又曰鄧攸為淮南太守夢行水邉見一女子虎在後來盪斷鞶囊占者以為水邊有女汝字也斷鞶囊者新虎頭代故虎頭也不作汝隂當}
  - {type: variant, offset: 634, length: 0, content: '', krp: 侃鎧者長史陳恊以爲司馬者國姓也鎧者扞禦之器節下當進位㤗興二年侃加平南將軍又曰鄧殷爲淮南太守夢行水邊見一女子虎在後來盪斷鞶囊占者以爲水邊有女汝字也斷鞶囊者新虎頭代故虎頭也不作汝隂當}
  - {type: variant, offset: 636, length: 2, content: 張邵, SBCK: 也果迁汝隂續晉陽春秋曰李太后在會稽王宫夢兩龍枕􅂰曰月入懷其後果以相者之言見幸太宗凡生烈宗㑹稽王道子及鄱陽公主焉王韶之晉安帝紀曰劉敬宣在齊夢丸土吞之而於夢中占者荅曰此服土吞也旣覺喜曰丸者桓也桓既吞矣我當復夲土旬日中間玄敗遂得歸陸機晉書武紀曰王濬之在巴郡也夢懸四刀於其上甚惡之濬主簿李毅拜賀曰夫三刀爲州而見四爲益一也明府其臨益州乎後果爲益州刺史晉書曰羅含}
  - {type: page-break, offset: 636, content: '', id: KR3k0012_SBCK_398-3a}
  - {type: variant, offset: 636, length: 2, content: 張邵, WYG: 也果遷汝隂續晉陽春秋曰李太后在㑹稽王宫夢兩龍枕膝日月入懷其後果以相之言見幸太宗凡生烈宗㑹稽王道子及鄱陽公主焉王韶之晉安帝紀曰劉敬宣在齊夢丸土吞之而於夢中占者答曰此服土吞也既覺喜曰丸者桓也桓為吞矣我當復本土旬日中間元敗遂得歸陸機晉書武紀曰王濬之在巴郡也夢懸四刀於其上甚惡之濬主簿李毅拜賀曰夫三刀為州而見四為益一也明府其臨益州乎後果為益州刺史晉書曰羅含}
