  - {type: variant, offset: 2428, length: 711, content: 鉼即日顯戮覺奴已死銀由在復還之矣論衡曰趙簡子夢見天帝也以夢占之知樓臺山陵官位之象也人夢上樓臺升山陵輒得官位實樓臺山陵非官位也則知簡子夢見帝非天帝也世說曰衛玠總角時嘗問樂廣夢樂云是想衛曰神形所不接而夢豈是想樂曰因也衛思因不得遂成病樂聞故命駕為剖折之衛病即小差樂歎曰此賢胸中當必無膏肓夢書曰夢者像也精氣動也魂魄離身神來往也陰陽感成吉凶驗也夢者語其人預見過失如其賢者知之自改革也夢者告也告其形也目無所見耳無所聞鼻不喘嗅口不言也魂出遊身獨在心所思念忘身也受天神戒還告人也受戒不精忘神言也名之為寤告符臻也古有夢官世相傳也又曰昔聖帝明王之時神氣炤然先見故堯夢乘龍上太山舜夢擊天鼓禹夢其手長湯夢布令天下後皆有天下桀夢疾風壞其宮紂夢大雷擊其手齊桓夢為大禽所中秦二世夢虎齧其馬王者夢之皆失天下黃帝鍼經曰歧伯曰正邪外襲內而未有定舍也反淫於藏榮衛俱行而與魂魄飛揚使人臥不得安而喜夢氣淫於府則有餘於外不足於內氣淫於藏則有餘於內不足於外陰氣盛則夢涉大水而恐懼陽氣盛則夢涉大火而燔灼陰陽俱盛則夢相殺毀傷上盛則夢飛下盛則夢墮甚飽則夢與甚飢則夢取肝氣盛則夢怒胏氣盛則夢恐懼心氣盛則夢喜笑脾氣盛則夢歌樂體重身不舉腎氣盛則夢脊兩解不屬其氣客於心則夢見丘山爝火客於肺則夢飛揚見金鐵之奇物客於肝則夢山林樹木客於脾則夢見丘陵大澤壞屋風雨客於腎則夢臨淵沒居水中客於膀則夢遊行客於胃則夢飲食客於大腸則夢田野客於小腸則夢藂邑街衢客於膽則夢斗訟自刳客於陰則夢接內客於頂則夢斬首客於足則夢行走而不能及居深穽內客於股肱則夢禮節拜跪王子年拾遺錄曰融高西有夢草莖似蓍柯採之為占則知吉凶懷之以占夢立知禍福吉夢上尚書說命曰高宗夢得說盤庚弟小乙子名武丁德高可尊故號高宗夢得賢相其名曰說使, SBCK: ''}
