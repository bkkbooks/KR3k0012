  - {type: variant, offset: 628, length: 5, content: 仕郡為功曹, krp: 少漁於雷澤夢背上生八翅飛入天門見門非常欲入不敢而下侃後都督八州諸軍事又曰陶侃爲廣州夢有司馬}
