  - {type: variant, offset: 2371, length: 1562, content: 甕中悉是鉼銀採伐過之不得取之取必迷悶晉孝武太元初封驅之家奴竊三鉼歸發看有虵螫之而死其夜驅之夢神語之曰君奴不謹盜銀三鉼即日顯戮覺奴已死銀由在復還之矣論衡曰趙簡子夢見天帝也以夢占之知樓臺山陵官位之象也人夢上樓臺升山陵輒得官位實樓臺山陵非官位也則知簡子夢見帝非天帝也世說曰衛玠總角時嘗問樂廣夢樂云是想衛曰神形所不接而夢豈是想樂曰因也衛思因不得遂成病樂聞故命駕為剖折之衛病即小差樂歎曰此賢胸中當必無膏肓夢書曰夢者像也精氣動也魂魄離身神來往也陰陽感成吉凶驗也夢者語其人預見過失如其賢者知之自改革也夢者告也告其形也目無所見耳無所聞鼻不喘嗅口不言也魂出遊身獨在心所思念忘身也受天神戒還告人也受戒不精忘神言也名之為寤告符臻也古有夢官世相傳也又曰昔聖帝明王之時神氣炤然先見故堯夢乘龍上太山舜夢擊天鼓禹夢其手長湯夢布令天下後皆有天下桀夢疾風壞其宮紂夢大雷擊其手齊桓夢為大禽所中秦二世夢虎齧其馬王者夢之皆失天下黃帝鍼經曰歧伯曰正邪外襲內而未有定舍也反淫於藏榮衛俱行而與魂魄飛揚使人臥不得安而喜夢氣淫於府則有餘於外不足於內氣淫於藏則有餘於內不足於外陰氣盛則夢涉大水而恐懼陽氣盛則夢涉大火而燔灼陰陽俱盛則夢相殺毀傷上盛則夢飛下盛則夢墮甚飽則夢與甚飢則夢取肝氣盛則夢怒胏氣盛則夢恐懼心氣盛則夢喜笑脾氣盛則夢歌樂體重身不舉腎氣盛則夢脊兩解不屬其氣客於心則夢見丘山爝火客於肺則夢飛揚見金鐵之奇物客於肝則夢山林樹木客於脾則夢見丘陵大澤壞屋風雨客於腎則夢臨淵沒居水中客於膀則夢遊行客於胃則夢飲食客於大腸則夢田野客於小腸則夢藂邑街衢客於膽則夢斗訟自刳客於陰則夢接內客於頂則夢斬首客於足則夢行走而不能及居深穽內客於股肱則夢禮節拜跪王子年拾遺錄曰融高西有夢草莖似蓍柯採之為占則知吉凶懷之以占夢立知禍福吉夢上尚書說命曰高宗夢得說盤庚弟小乙子名武丁德高可尊故號高宗夢得賢相其名曰說使百工營求諸野得諸傅巖使百官以所夢之形像經營求之於外野德之於傅巖之谿毛詩鴻鴈斯干曰吉夢維何維熊維羆維虺維虵大人占之維熊維羆男子之祥維虺維虵女子之祥又鴻鴈無羊曰牧人乃夢眾維魚矣旐維旟矣大人占之眾維魚矣實維豐年旐維旟矣室家溱溱溱溱眾也左傳僖下曰晉侯夢與楚子搏搏手搏也楚子伏已而盬其腦盬啑也子犯曰我得天楚伏其罪吾且柔之矣晉侯上向故得天楚子下向地故伏其罪也腦所以柔物又宣上曰鄭文公有賤妾曰燕結夢天使與己蘭曰余為伯儵余而祖也以是為而子以蘭有國香人服媚之如是既而文公見之與之蘭而御之生穆公名之曰蘭又昭元曰昔武王邑姜方震大叔邑姜武王后齊太公之女也懷胎為震大叔成王之弟虞夢帝為己曰余命而子曰虞帝天也將與之唐屬諸參而蕃育其子孫又哀下曰宋景公無子取公孫周之子得與啟畜諸公宮未有立焉公卒得夢啟北首而寢於盧門盧門宋東門也北首死處在門外失國之象也己為烏而集於上咮加於南門尾加於桐門桐門北至曰余夢美必立乃立得春秋元命苞曰堯為天子夢白帝遺吾馬喙子其母為扶始升丘睹白帝上有雲虎感己生皋陶此盡夢所見告之辭也雲虎有雲狀如虎堯聘索狀如問之如堯言徵與語明於刑法周書曰文王去商在程正月既生魄大姒夢見商之庭產商小子發取周庭之梓樹乎闕間梓化為松柏棫柞寤驚以告文王王及太子發並拜吉夢受商之大命于皇天上帝史記曰秦文公夢黃虵自天下屬地其口止於鄜衍李奇曰鄜昔乎山阪曰衍問史敦敦曰此上帝之徵君其祠之又曰王太后母曰臧兒嫁為槐里王仲妻生兩女長女嫁為金王孫婦臧兒卜女當貴乃奪金氏內之太子宮太子幸愛之生三女一男男方任身時王美人夢日入懷太子曰此貴徵也孝景帝即位王夫人為皇后其男為太子景帝崩太子襲號為武皇帝漢書曰高祖薄姬內後宮歲餘不得幸始姬與管夫人趙子兒相愛約曰先貴無相忘已而管夫人子兒先幸漢王漢王四年坐河南城四幸靈臺此兩美人侍而薄姬不得見二人相與笑薄姬初時約漢王問其故兩人俱以實告漢王心悽然憐薄姬是日召欲幸之對曰昨夢龍據胸上曰是貴徵也吾為汝成之幸有身生文帝, WYG: 八}
