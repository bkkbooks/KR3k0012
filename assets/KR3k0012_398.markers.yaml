  - {type: punctuation, offset: 357, content: 《, id: KR3k0012_CHANT_398-bkkpn111}
  - {type: variant, offset: 357, length: 255, content: 左傳昭元曰鄭子產如晉晉侯有疾韓宣子曰寡君寢疾於今三月矣並走群望晉望祀山川走往祈禱有加而無瘳今夢黃熊入於寢門其何厲鬼也對曰以君之明子為大政其何厲之有昔堯殛鯀于羽山其神化為黃熊入于羽淵實為夏郊三代祀之晉為盟主其或者未之祀也韓子祀夏郊晉侯有間間差也又昭二曰楚子成章華之臺願與諸侯落之祭之為落基今在華容城內太宰薳啟疆來召公公將往夢襄公祖祖祭道神梓慎曰君不果行襄公之適楚也夢周公祖而行今襄公實祖君其不行子服惠伯曰行也先君未嘗適楚故周公祖以道之襄公適楚矣而祖以道君不行何之三月公如楚論語曰孔子曰甚矣吾衰也久矣吾不復夢見周公, SBCK: 辟賀爲􅁺}
  - {type: variant, offset: 357, length: 65, content: 左傳昭元曰鄭子產如晉晉侯有疾韓宣子曰寡君寢疾於今三月矣並走群望晉望祀山川走往祈禱有加而無瘳今夢黃熊入於寢門其何厲鬼也對曰以君之明子, WYG: 辟賀}
