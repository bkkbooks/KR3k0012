  - {type: variant, offset: 939, length: 0, content: '', SBCK: 名恪孝文帝長子也母曰髙氏􅀄夢爲日所逐避於牀下化爲龍遶巳數匝寤而驚悸遂娠而生帝也後周書曰柳霞㓜而爽邁其丗父慶逺特器異之謂霞曰吾昔逮事伯父太尉公甞語吾云我作一夢夢汝登一樓甚峻麗吾以坐席與汝汝後名官必逹恨吾不及見耳吾向􅂓復晝寢又夢將昔坐席還以賜汝汝之官位當復及吾特冝勉勵以應嘉祥也又日髙琳字秀琳其先髙麗人母甞祓禊泗濵卧遇見一石光彩㓪潤遂持歸是夜夢見一人衣冠􅀂仙者謂曰夫人向所持來石是浮磬之精耳君受之必生令子母驚寤舉身流汗俄而有娠及生琳因以名字焉及長有大度智略從文帝累有戰功位至開府儀同三司三國典略曰髙勸甞夢履衆星而行覺而内喜遂傾産以結客又曰宇文}
  - {type: page-break, offset: 939, content: '', id: KR3k0012_SBCK_398-4a}
  - {type: variant, offset: 939, length: 0, content: '', WYG: 名恪孝文帝長子也母曰髙氏初夢為日所逐避於床下化為龍遶已數匝寤而驚悸遂娠而生帝也後周書曰栁霞幼而爽邁其世父慶逺特器異之謂霞曰吾昔逮事伯父太尉公嘗語吾云我作一夢夢汝登一樓甚峻麗吾以坐席與汝汝後名宦必達恨吾不及見耳吾向聊復晝寢又夢將昔坐席還以賜汝汝之官位當復及吾特宜勉勵以應嘉祥也又曰髙琳字琇琳其先髙麗人母嘗祓禊泗濵卧遇見一石光彩朗潤遂持歸是夜夢見一人衣冠若僊者謂曰夫人向所持来石是浮磬之精耳君受之必生令子母驚寤舉身流汗俄而有娠及生琳因以名字焉及長有大度智畧從文帝累有戰功位至開府儀同三司三國典畧曰髙歡嘗夢履衆星而行覺而内喜遂傾産以結客又曰宇文}
