  - {type: variant, offset: 940, length: 0, content: '', WYG: 貴昌黎大僰人也母初孕夢有老人抱一兒授之曰賜爾是子俾壽且貴及生形類所夢故以永貴字之又曰齊陽休之幼年將仕夢鄴城東南有大冡上有銅柱跗為蓮花休之從西北而登以手捉柱柱右轉夢中呪曰三匝而止柱如其言榮富之後所居之宅竟在其地又曰祖珽知齊太上有大志深自結納嘗啓曰昨夢大王乗龍上天願深自愛太上喜即位之後擢拜中書侍郎又曰梁孝元字世誠梁武第七子也小字符初梁武夢𦕈目僧執香罏稱託生王宫既而采女石氏侍始褰戸幔有風逥裙梁武帝意感幸之采女夢月墮懷中遂孕孝元載誕之夕舉室光明室中有非常香氣及紫胞之異梁書曰江淹少夢見人授之五色筆因而有文章後十餘年忽夢一丈夫自稱郭璞謂淹曰前借君筆可相還淹夢中探懷中筆自此後不復有文章時稱淹才盡又曰鄭灼少事皇侃灼性精勤尤明三禮少時常夢皇侃謂曰鄭郎開口侃因唾灼口中自是義理益進又曰何㸃少時嘗患渴經嵗不愈後在吳中石佛寺僧建講晝寢夢一道人形貌非常授丸一掬夢中服之而差陳書曰高祖㣲時嘗遊義興館於許氏夢天開數丈有四人朱衣捧日而至納之帝口及覺腹内猶熱南史曰徐陵字孝穆母臧氏嘗夢五色雲化為鳳集左肩上已而誕陵年數嵗家人擕以候沙門釋寳誌寳誌曰此天上石麒麟也唐書曰李嶠趙州贊皇人隋内史侍郎元操從曾孫也代為著姓父鎮惡襄城令嶠早孤事母以孝聞為兒童時夢有神人遺之雙筆自是漸有學業弱冠舉進士又曰尹知章絳州翼城人少勤學嘗夢神人以大鑿開其心以藥内之自是日益開朗盡通諸經義未幾而諸師反北靣受業焉又曰張廌字孝舉深州陵澤人祖鷟字文成聪警絶倫書無不覽為兒童時夢紫色大鳥五彩成文降於家庭其祖謂之曰五色赤文鳳也紫文鸑鷟也為鳳之佐吾兒當以文章瑞於朝廷因以為名字又曰天寳中}
