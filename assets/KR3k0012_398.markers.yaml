  - {type: variant, offset: 618, length: 2, content: 范式, SBCK: 此宰相之器也一一魏書曰程昱少時常夢上太山兩手捧日昱私異之以訪荀彧及兖州平乃頼昱得完三城於是彧以昱夢白太祖曰卿當終爲吾腹心昱夲名立太祖乃加其上曰更名昱張勃吴録曰武烈皇帝母有身夢腸岀繞吴昌門孫埾妻吴氏夢月在其懷而生長沙桓王又夢月在懷而生大皇帝又曰丁固}
  - {type: variant, offset: 618, length: 2, content: 范式, WYG: 此宰相之器也魏書曰程昱少時夢上太山兩手捧日昱私異之以訪荀彧及兖州平乃賴昱得完三城於是彧以昱夢白太祖曰卿當終為吾腹心昱本名立太祖乃加其上日更名昱張勃呉録曰武烈皇帝母有身夢膓出繞呉昌門孫堅妻呉氏夢月在其懷而生長沙桓王又夢月在懷而生大皇帝又曰丁固}
