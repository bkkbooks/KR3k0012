  - {type: variant, offset: 3140, length: 793, content: 工營求諸野得諸傅巖使百官以所夢之形像經營求之於外野德之於傅巖之谿毛詩鴻鴈斯干曰吉夢維何維熊維羆維虺維虵大人占之維熊維羆男子之祥維虺維虵女子之祥又鴻鴈無羊曰牧人乃夢眾維魚矣旐維旟矣大人占之眾維魚矣實維豐年旐維旟矣室家溱溱溱溱眾也左傳僖下曰晉侯夢與楚子搏搏手搏也楚子伏已而盬其腦盬啑也子犯曰我得天楚伏其罪吾且柔之矣晉侯上向故得天楚子下向地故伏其罪也腦所以柔物又宣上曰鄭文公有賤妾曰燕結夢天使與己蘭曰余為伯儵余而祖也以是為而子以蘭有國香人服媚之如是既而文公見之與之蘭而御之生穆公名之曰蘭又昭元曰昔武王邑姜方震大叔邑姜武王后齊太公之女也懷胎為震大叔成王之弟虞夢帝為己曰余命而子曰虞帝天也將與之唐屬諸參而蕃育其子孫又哀下曰宋景公無子取公孫周之子得與啟畜諸公宮未有立焉公卒得夢啟北首而寢於盧門盧門宋東門也北首死處在門外失國之象也己為烏而集於上咮加於南門尾加於桐門桐門北至曰余夢美必立乃立得春秋元命苞曰堯為天子夢白帝遺吾馬喙子其母為扶始升丘睹白帝上有雲虎感己生皋陶此盡夢所見告之辭也雲虎有雲狀如虎堯聘索狀如問之如堯言徵與語明於刑法周書曰文王去商在程正月既生魄大姒夢見商之庭產商小子發取周庭之梓樹乎闕間梓化為松柏棫柞寤驚以告文王王及太子發並拜吉夢受商之大命于皇天上帝史記曰秦文公夢黃虵自天下屬地其口止於鄜衍李奇曰鄜昔乎山阪曰衍問史敦敦曰此上帝之徵君其祠之又曰王太后母曰臧兒嫁為槐里王仲妻生兩女長女嫁為金王孫婦臧兒卜女當貴乃奪金氏內之太子宮太子幸愛之生三女一男男方任身時王美人夢日入懷太子曰此貴徵也孝景帝即位王夫人為皇后其男為太子景帝崩太子襲號為武皇帝漢書曰高祖薄姬內後宮歲餘不得幸始姬與管夫人趙子兒相愛約曰先貴無相忘已而管夫人子兒先幸漢王漢王四年坐河南城四幸靈臺此兩美人侍而薄姬不得見二人相與笑薄姬初時約漢王問其故兩人俱以實告漢王心悽然憐薄姬是日召欲幸之對曰昨夢龍據胸上曰是貴徵也吾為汝成之幸有身生文帝, SBCK: 九十八}
