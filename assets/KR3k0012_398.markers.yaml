  - {type: variant, offset: 941, length: 0, content: '', SBCK: 禄山自范陽入朝肅宗觀其兇恣有勃逆之􅃺言之於太上皇太上皇易之不納上恐危社稷遂精誠祈夢其夜夢故内侍胡普寂等三人持案覆以黄帊自天而下至上前有素版丹書文章甚多旣寤所記者唯四句曰厥不云乎其惟其時上天所保福禄不􅃜十四年十一月甲子禄山果於范陽稱兵向闕又曰劉􅃆􅀄爲忠武小校從李光顔討淮西爲捉生將前後遇賊兵戰鋒刃所傷幾死者數四甞傷重卧草}
