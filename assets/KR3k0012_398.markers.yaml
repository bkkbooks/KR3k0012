  - {type: variant, offset: 791, length: 0, content: '', SBCK: 衆人謂之荆楚之松竹荆州刺史桓温以爲江左之清秀也􅀳書載記曰劉聦之在孕也母張氏夢日入懐寤而以告元海元海曰此􅁻徴也慎勿言十五月而生聦焉南燕録曰慕容德皝少子也皝毎對諸夫人言婦人夢日入懷當生天子}
