  - {type: variant, offset: 617, length: 0, content: '', SBCK: 華松家夲􅀌徴其母夜夢兩伍伯夾門言司􅀠在此松年十五師事丁子然學春秋十九當冠出諸生}
  - {type: variant, offset: 617, length: 0, content: '', WYG: 華松家夲孤㣲其母夜夢兩伍伯夾門言司𨽻在此松年十五師事丁子然舉春秋十九當冠出謂生}
  - {type: variant, offset: 617, length: 0, content: '', krp: 華松家夲孤徴其母夜夢兩伍伯夾門言司隷在此松年十五師事丁子然學春秋十九當冠出諸生}
