  - {type: variant, offset: 2011, length: 269, content: 召輔相而告之曰朕思有以養身治物之道弗獲疲而睡若此知至道不可以情求朕得之矣莊子曰夢者陰陽之精也心所喜怒則精氣從之又曰夢飲酒者旦而哭泣夢哭泣者旦而田獵此寤寐事變也方其夢也不知其夢夢之中又占其夢焉覺而後知其夢又曰昔者莊周夢為胡蝶栩栩然胡蝶也自喻適志與不知周也俄然覺則蘧蘧然周也不知周之夢為胡蝶與胡蝶之夢為周與傅子曰夢攀日月覺而不上天庭夢入九泉寤而不及地下高宗得說偶中耳淮南子曰若人萬化而末始有極也弊而復新其為樂可勝計耶譬若夢夢為鳥而飛於天夢為魚而沒於淵方其夢也不知其夢也覺而後知其夢也今將有所大覺乃後知今此之為大夢也博物志曰太公為灌壇令於時文王, SBCK: 遣還玄過樹隂假􅄰}
