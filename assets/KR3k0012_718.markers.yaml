  - {type: variant, offset: 2679, length: 432, content: 有純銀參帶鏡臺一純銀七貴人公主鏡臺四晉東宮舊事曰皇太子納妃有玳瑁鈿鏤鏡臺一宋起居注曰元嘉中韋朗為廣州剌史作銅鏡臺一具卿史中丞劉禎請以事追免朗官謝眺詩曰玲瓏類丹檻孤高似玄闕對鳳臨清水乘龍掛明月照粉拂紅粧插花理雲髮玉顏徒自見畏見君情歇古詩曰珊瑚掛鏡爛生光奩後漢書曰陰太后崩明帝性孝愛追慕無已謁原陵帝從席前伏御床視太后鏡奩中物感慟悲涕令易脂澤裝具左右皆泣莫能仰視焉拾遺記曰陰貴人食瓜美帝使求之時有燉煌獻異瓜云是空峒靈瓜又常山獻巨桃及后崩侍者見鏡奩中有瓜桃之核視之涕零也列仙傳曰朱崖令死當還法內珠於關者死其繼母棄其繫臂珠其男年九歲好之置鏡奩中皆不知也至海關吏收得十枚乃母子爭死吏遂棄而遣之事具義門語林曰范汪至能噉梅人致一斛奩噉須臾盡也蔡邕表曰賜鏡奩等前後重疊父母於子無以加此魏武上雜物䟽曰純銀藻豆奩純銀括摟奩孫仲寄妹臨亡書曰鏡與粉盤與郎香奩與若欲令其行身如明鏡純如粉譽如香合宋元嘉起居注曰廣州剌史韋朗被彈事有金鏤合二枚銀鏤合二枚劉向別傳曰向有合賦祖台之志怪曰吳中有王大夫行, WYG: ''}
