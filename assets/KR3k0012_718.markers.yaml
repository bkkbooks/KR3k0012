  - {type: variant, offset: 264, length: 10, content: 劉敬宣八歲喪母四月八, krp: 㤗始三年以皇后巳下六宫金釵千枚班賜北征將士列女傳曰梁鴻妻孟光荆釵布裙洞冥記曰元鼎元年起招靈閣有神女留一玉釵與帝帝以賜趙婕妤至昭帝元鳯中宫人猶見此釵共謀欲碎之明旦視之匣唯見白鷰直升天去故宫人作玉釵因改名玉鷰釵言其吉祥拾遺録曰漢獻帝爲李􅔸所敗帝傷指伏后以繡紱拭血刮玉釵以拂於創應手則愈又曰魏文帝納美女薛靈芸有獻火珠龍鸞釵帝曰珠翠尚不能勝况龍鸞之重乎又曰魏明帝時昆明國貢嗽金鳥鳥常吐金屑如粟用飾釵珮謂之辟寒金宫人相嘲曰不服辟寒金那得帝王心又曰石季倫愛婢翔風別玉聲金色爲倒龍之佩瑩金爲鳯冠之釵言刻玉如倒龍之勢鑄金象鳯皇之狀結䄂繞楹舞於晝夜使聲聲相接謂之恒舞欲有所召者不呼姓名悉聽珮聲視釵色玉輕聲者居前金色艶者居後以爲行次而進也華陽國志曰涪陽大龜其甲可卜其縁可作釵丗號靈釵裴淵廣州記曰豪富女子以金銀爲大釵執以叩銅皷號爲銅鼓釵崔豹古今注曰蟠龍釵梁兾婦所制異苑曰呉郡有徐君廟東陽長山縣吏李瑫義熈中遭事在都婦過廟乞恩拔銀釵爲願未至冨陽有白魚跳婦前剖腹得所願釵夫事㝷解幽明録曰尋陽叅軍夢一婦人前跪自稱先葬近水淪没誠能見救雖不能冨貴可令君薄免禍叅軍荅曰何以爲誌婦人曰君見渚邊上有魚釵即我也叅軍明旦覔果見一毀墳其上有釵移置髙燥處却十餘}
