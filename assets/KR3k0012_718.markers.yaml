  - {type: variant, offset: 758, length: 223, content: 人之阿甚矣而無所鏡其殘亡無日矣孰當可鏡其唯士人乎鏡明己也細士明己也大淮南子曰明鏡之始矇然未見形容也及拭之以玄錫磨之以白氈則鬚眉微毛可得而察又曰鏡便於照形承食不如竹簞又曰聖人若鏡不將不迎將送也應而不倡故萬化無傷其得之乃失之也又曰高懸大鏡坐見四鄰取大鏡高懸盆中水晃見四鄰又曰人莫鑒於沬雨而鑒於止水者以其靜也沬兩潦上沬起言其濁擾也莫窺形於生鏡而窺形於明鏡者以其易也抱朴子內篇曰或問知將來吉凶為有道乎荅曰用鏡九寸自照有所思存七月則神仙千里事也明鏡用一或二, SBCK: 環臂}
