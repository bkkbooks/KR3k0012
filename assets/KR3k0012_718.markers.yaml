  - {type: variant, offset: 1151, length: 12, content: 著衣大鏡尺八寸銀花小鏡尺, SBCK: 金釧}
  - {type: variant, offset: 1151, length: 0, content: '', WYG: 金釧二雙祖台之志怪曰建安中河間太守劉照夫人卒於府後太守至夢見一好婦人就於室家持一雙金鏆古喚切後與太守不能名婦人乃曰此錗竹志切鏆錗鏆者其状如紐珠大如指屈伸在人太守得置枕中前太守迎喪言有錗鏆開棺見夫人臂果無復有錗鏆焉甄異記曰樂安章沉病死将殯而蘇云被録到天曹主者是其外兄㫁理得免見一女同時被録乃脱金釧二雙託沉以與主者亦得還遂共讌接女云家在吴姓徐名秋英沉後尋問遂得之女父母因以女妻沉髙文惠與婦書曰令製金鏆一雙交州記曰波期玉以金釧聘斯調玉女也唐書曰交河王麹崇裕兄昭少好學嘗有鬻異事書於市者其母将為買之捜索家財不足其價惟篋中有金釧數枚既而歎曰何愛此物令吾子不有異聞乎促令貨易此書昭後厯位司膳卿頗以詩詠流譽繁欽定情詩曰何以致契濶繞臂金跳脱指環春秋繁露曰紂刑鬼侯之女取其環五經要義曰古者后妃羣妾御於君所以銀環進之女史書曰授其環以進退之有娠則以金環退之當御者以銀環進之進者}
