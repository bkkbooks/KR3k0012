  - {type: variant, offset: 1965, length: 509, content: 可復建功立事乎因椎几大叫瘡裂而卒續搜神記曰文獻文獻王道謚曾令郭璞筮己一年中吉凶璞曰當有小不吉利可取廣州二大甖盛水置床帳二角名曰鏡耗以厭之某時撤甖去水如此其災可消至日忘之尋失銅鏡不知所在後撤去水乃見所失鏡在於甖中甖口數寸鏡大尺餘王公後令筮鏡甖之意璞云撤甖違期故致此妖邪魅所為無他故也使燒車轄以擬鏡立出又曰林慮山下有一亭人過宿者或病或死常云十許男女各雜衣或白或黑輒來為害有郅伯夷者過宿於此獨坐誦經忽有十餘人來與伯夷並坐因共蒲博於是伯夷密以鏡照之乃是一群犬因執燭而起佯誤以燭燒其衣毛乃樵伯夷懷刀投一人中之遂死成犬餘悉走去神異經曰昔有夫婦將別破鏡人執半以為信其妻與人通其鏡化鵲飛至夫前其夫乃知之後人因鑄鏡為鵲安背上自此始也幽明錄曰宮亭湖邊傍山門有石數枚形圓若鏡明可以鑑人謂之石鏡後有行人過以火燎一枚至不復明其人眼乃失明地鏡圖曰欲知寶所在地以大鏡夜照見影若光在鏡中者物在下也風角要占曰厭盜賊法三月以小形銅鏡七枚埋於申地秤七百斤土覆之坎深二尺五寸廣二尺五寸築令堅固孟達與劉封書曰天地初生如鏡陸機與弟雲書曰仁壽殿前有大方銅鏡高五尺餘廣三尺二寸立著庭中向之便寫人形體了了亦怪也秦嘉與婦徐淑書曰頃得此鏡既明且好形觀文藻世所希有意甚愛之故, WYG: ''}
