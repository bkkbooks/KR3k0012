  - {type: variant, offset: 1581, length: 1586, content: 而來即腸胃五藏歷然無礙人有病在內則掩心而照之即知病之所在女子有邪心則膽張心動秦始皇帝以照宮人膽張心動者則殺之又曰宣帝被收繫郡邸獄臂上猶帶史良娣合綵婉轉繩繫身毒寶鏡一枚如八銖錢舊傳此鏡照見妖魅佩之者為天神所福宣帝從危獲濟及紹大位每持此鏡感咽移辰帝崩鏡不知所在拾遺錄曰周穆王時渠國貢火齊鏡廣三尺六寸闇中視物如晝人向鏡語鏡中則響應之也又曰周穆王時有如石之鏡此石色白如月照面如雪謂之月鏡又曰方丈山池泥百鍊成金鏡色青可照魑魅洞冥記曰望蟾閣上有青金鏡廣四尺元光年中祗國獻此鏡照見魑魅百鬼不能隱形列仙傳曰負局先生負石靡鏡局徇吳中衒摩鏡得一錢因磨之神仙傳曰河東孫博能引鏡為刀屈刀為鏡劉根別傳曰思形狀可以長生以九寸明鏡照面熟視之令自識己身形常令不忘久則身神不散疾患不入搜神記曰孫策既殺于吉每獨自髣髴見在其左右引鏡自照見在鏡中因掊大叫瘡皆裂須臾而死又吳曆曰策為許貢客所傷引鏡自照曰面如此當可復建功立事乎因椎几大叫瘡裂而卒續搜神記曰文獻文獻王道謚曾令郭璞筮己一年中吉凶璞曰當有小不吉利可取廣州二大甖盛水置床帳二角名曰鏡耗以厭之某時撤甖去水如此其災可消至日忘之尋失銅鏡不知所在後撤去水乃見所失鏡在於甖中甖口數寸鏡大尺餘王公後令筮鏡甖之意璞云撤甖違期故致此妖邪魅所為無他故也使燒車轄以擬鏡立出又曰林慮山下有一亭人過宿者或病或死常云十許男女各雜衣或白或黑輒來為害有郅伯夷者過宿於此獨坐誦經忽有十餘人來與伯夷並坐因共蒲博於是伯夷密以鏡照之乃是一群犬因執燭而起佯誤以燭燒其衣毛乃樵伯夷懷刀投一人中之遂死成犬餘悉走去神異經曰昔有夫婦將別破鏡人執半以為信其妻與人通其鏡化鵲飛至夫前其夫乃知之後人因鑄鏡為鵲安背上自此始也幽明錄曰宮亭湖邊傍山門有石數枚形圓若鏡明可以鑑人謂之石鏡後有行人過以火燎一枚至不復明其人眼乃失明地鏡圖曰欲知寶所在地以大鏡夜照見影若光在鏡中者物在下也風角要占曰厭盜賊法三月以小形銅鏡七枚埋於申地秤七百斤土覆之坎深二尺五寸廣二尺五寸築令堅固孟達與劉封書曰天地初生如鏡陸機與弟雲書曰仁壽殿前有大方銅鏡高五尺餘廣三尺二寸立著庭中向之便寫人形體了了亦怪也秦嘉與婦徐淑書曰頃得此鏡既明且好形觀文藻世所希有意甚愛之故以相與明鏡可以鑒形淑荅書曰今君征未旋鏡將何施行明鏡鑒形當待君至傅咸鏡賦曰從陰位於清商採秋金之剛精醮祝融以致度命歐冶而是營晞日月之光烈儀厥象乎曜靈鏡臺世說曰溫嶠為劉越石長史北討劉聰得玉鏡臺嶠從姑劉氏有女美嶠有意自媒數日乃下玉鏡臺姑喜既婚交禮女曰我固疑是老奴果如所卜也三國典略曰胡太后使沙門靈昭造七寶鏡臺合有三十六戶每室別有一婦人手各執鏁才下一關三十六戶一時自閉若抽此關諸門皆啟婦人各出戶前魏武雜物䟽曰鏡臺出魏宮中有純銀參帶鏡臺一純銀七貴人公主鏡臺四晉東宮舊事曰皇太子納妃有玳瑁鈿鏤鏡臺一宋起居注曰元嘉中韋朗為廣州剌史作銅鏡臺一具卿史中丞劉禎請以事追免朗官謝眺詩曰玲瓏類丹檻孤高似玄闕對鳳臨清水乘龍掛明月照粉拂紅粧插花理雲髮玉顏徒自見畏見君情歇古詩曰珊瑚掛鏡爛生光奩後漢書曰陰太后崩明帝性孝愛追慕無已謁原陵帝從席前伏御床視太后鏡奩中物感慟悲涕令易脂澤裝具左右皆泣莫能仰視焉拾遺記曰陰貴人食瓜美帝使求之時有燉煌獻異瓜云是空峒靈瓜又常山獻巨桃及后崩侍者見鏡奩中有瓜桃之核視之涕零也列仙傳曰朱崖令死當還法內珠於關者死其繼母棄其繫臂珠其男年九歲好之置鏡奩中皆不知也至海關吏收得十枚乃母子爭死吏遂棄而遣之事具義門語林曰范汪至能噉梅人致一斛奩噉須臾盡也蔡邕表曰賜鏡奩等前後重疊父母於子無以加此魏武上雜物䟽曰純銀藻豆奩純銀括摟奩孫仲寄妹臨亡書曰鏡與粉盤與郎香奩與若欲令其行身如明鏡純如粉譽如香合宋元嘉起居注曰廣州剌史韋朗被彈事有金鏤合二枚銀鏤合二枚劉向別傳曰向有合賦祖台之志怪曰吳中有王大夫行至曲阿回塘上有一女子便留住宿解臂上金合繫其肘下令暮更來遂不至更使尋求都無女人過豬欄邊見豬鉀有合多羅纂文曰多羅粉器, krp: 指環}
