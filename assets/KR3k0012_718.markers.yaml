  - {type: variant, offset: 2487, length: 191, content: 今君征未旋鏡將何施行明鏡鑒形當待君至傅咸鏡賦曰從陰位於清商採秋金之剛精醮祝融以致度命歐冶而是營晞日月之光烈儀厥象乎曜靈鏡臺世說曰溫嶠為劉越石長史北討劉聰得玉鏡臺嶠從姑劉氏有女美嶠有意自媒數日乃下玉鏡臺姑喜既婚交禮女曰我固疑是老奴果如所卜也三國典略曰胡太后使沙門靈昭造七寶鏡臺合有三十六戶每室別有一婦人手各執鏁才下一關三十六戶一時自閉若抽此關諸門皆啟婦人各出戶前魏武雜物䟽曰鏡臺出魏宮, WYG: 沛郡秦拊義熈}
