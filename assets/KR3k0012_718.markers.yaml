  - {type: variant, offset: 287, length: 1, content: 鏡, SBCK: 􅁫十二行足下絲履五文章陳司馬美女篇曰頭戴金雀􅁫􅆎珮翠琅玕崔瑗三子􅁫銘曰元正上日百福孔靈􅁂髮如雲乃象衆星三珠横􅁫攝㜎讃靈魏陳思王羙女篇曰頭戴合歡􅁫梁陽濟泄井得金􅁫詩曰昔日倡家女摘華露井邊摘華還自比挿映還自憐窺窺終不巳􅀏􅀏自成妍寳􅁫於此落從來非一年翠羽成泥去金色尚如先此人今不在此物今空傳秦嘉與婦淑書曰今致寳􅁫一􅀟價直千金可}
