  - {type: variant, offset: 3104, length: 1, content: 吳, SBCK: 建安中河間太守劉照夫人卒於府後太守至夢見一好婦人就爲室家持一􅀟金鏆古喚切與太守不能名婦人乃曰此錗竹志切鏆錗鏆者其狀如紐珠大如指屈伸在人太守得置枕中前太守迎䘮言有錗鏆開棺視夫人臂果無復有錗鏆焉甄異記曰樂安章沉病死未殯而􅂫云􅀍録到天曹主者是其外兄斷理得免見一女同時􅀍録乃說金釧二􅀟記沉以與主者亦得還遂共讌接女云家在呉姓徐名秋英沉後尋問遂得之女父母因以女妻沉髙文惠與婦書曰今致金鏆一􅀟交州記曰波斯王以金釧聘斯調王女也唐書曰交河王麹崇􅁉兄昭少好學嘗有鬻異事書於市者其母將爲買之搜索家財不足其價唯篋}
  - {type: page-break, offset: 3104, content: '', id: KR3k0012_SBCK_718-6a}
  - {type: variant, offset: 3107, length: 0, content: '', SBCK: 金釧數枚旣而歎曰何愛此物令吾子不有異聞乎促令貨易此書昭後歷位司膳卿頗以詩詠流譽繁欽定情詩曰何以致契闊繞臂金跳脫指環春秋繁露曰紂刑􅀑侯之女取其環五經要義曰古者后妃群妾禮御於君所女史書曰授其環以進退之有娠則以金環退之當御者以銀環進之進者着於左手陽也以當就男故着左手右手隂也旣御而復故此女吏之職漢書儀曰宫人御幸賜銀環後漢書曰孫程等十九人立順帝有功各賜金指釧環晉書曰羊祐年五歳令乳母取所弄玉環乳母曰汝先無此物祐乃於隣人李氏東墻桑樹中探得之李氏見驚曰余亡兒所失物也乳母具言前事李氏悲惋時人異之李氏之子即羊祐前身也又曰傅暢年五歳父友見而戲解暢衣取其金環與左右暢不惜以此賞之後選入侍講東宫宋書曰西南夷元嘉七年遣使獻金剛指環梁書曰武丁貴嬪武帝鎮樊城嘗登樓以望見漢濵五彩如龍丁有女子臂繞紌則貴嬪也帝贈以金環納之時年十四後魏書曰咸陽}
  - {type: page-break, offset: 3107, content: '', id: KR3k0012_SBCK_718-6b}
  - {type: page-break, offset: 3107, content: '', id: KR3k0012_SBCK_718-7a}
  - {type: variant, offset: 3108, length: 0, content: '', SBCK: 禧弟樹字秀和位宗正卿後奔梁武帝尤器之後復歸魏􅀄辭梁其愛妹玉兒以金指環與樹常着之􅀉以還梁表必還之意朝廷知之俄而賜死拾遺録曰呉王潘夫人以火齊指環桂石榴枝上因其處臺名曰環榴臺時有諫者云今呉蜀争雄還劉之名將爲妖乎權乃翻其名爲榴還臺也西京雜記曰戚􅁎以百鍊金爲彄照見指上骨惡之以賜侍兒益部􅂄舊􅀓曰劉寵䘮母時危亂墳墓發傷寵乃矯母令家貧無財唯有手上金環賣造墓供送免發掘西戎􅀓曰}
  - {type: variant, offset: 3109, length: 2, content: 夫行, SBCK: 宛國人深目多􅁂娶婦人以金同心指環爲聘外國雜俗曰諸問婦許婚下全同心指環保同志不改林道記曰林邑王獻金指環於呉主胡俗􅀓曰始結婚姻相然許便下金同心指環扶南􅀓曰扶南有訟者煑水令沸以金指環投湯中然後以手探湯其直者手不爛有罪者入湯即燋茅君傳曰勾曲山上有神芝五種求之法當以三月登山賫金環二雙啓以奉誓如此者三以爲盟也必得芝草投環於石間忘頋念集靈記曰王諿琅耶人也仕梁爲南康王記室亡後數年妻子困於衣食歳暮諿見形謂婦曰卿困乏衣食妻因與之酒别而去諿曰我若得財物當以相􅀉後月小女探得金指環一􅃗甄異傳曰沛郡􅁗拊義熈中}
