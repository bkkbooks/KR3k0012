  - {type: variant, offset: 1452, length: 22, content: 後得前既至祭而退荀悅申鑒曰君子三鑒鑒乎前鑒乎, krp: 許便}
  - {type: variant, offset: 1454, length: 277, content: 前既至祭而退荀悅申鑒曰君子三鑒鑒乎前鑒乎下鑒乎鏡前惟訓人惟明商德之衰不鑒於湯禹也周秦之弊不鑒於群下也側弁垢顏不鑒於明鏡也古今注曰平帝元始三年延陵西園神寢內御戶座前大鏡皆清液如汗水出狀西京雜記曰高祖入咸陽宮周行府庫有方鏡九寸表裏明人直來照之影則側見以手掩心而來即腸胃五藏歷然無礙人有病在內則掩心而照之即知病之所在女子有邪心則膽張心動秦始皇帝以照宮人膽張心動者則殺之又曰宣帝被收繫郡邸獄臂上猶帶史良娣合綵婉轉繩繫身毒寶鏡一枚如八銖錢舊傳此鏡照見妖魅佩之者為天神所福宣帝從危獲濟及紹大位每持此鏡感咽移辰帝崩鏡不知所在拾遺錄曰周穆王時渠國貢火齊鏡廣三尺六寸闇中視, WYG: 財}
