  - {type: variant, offset: 1151, length: 1, content: 著, krp: 金釧二雙祖台之志怪曰建安中河間太守劉照夫人卒於府後太守至夢見一好婦人就爲室家持一雙金鏆古喚切與太守不能名婦人乃曰此錗竹志切鏆錗鏆者其狀如紐珠大如指屈伸在人太守得置枕中前太守迎䘮言有錗鏆開棺視夫人臂果無復有錗鏆焉甄異記曰樂安章沉病死未殯而蘇云𬒳録到天曹主者是其外兄斷理得免見一女同時𬒳録乃說金釧二雙記沉以與主者亦得還遂共讌接女云家在呉姓徐名秋英沉後尋問遂得之女父母因以女妻沉髙文惠與婦書曰今致金鏆一雙交州記曰波斯王以金釧聘斯調王女也唐書曰交河王麹崇𥙿兄昭少好學嘗有鬻異事書於市者其母將爲買之搜索家財不足其價唯篋中有金釧數枚旣而歎曰何愛此物令吾子不有異聞乎促令貨易此書昭後歷位司膳卿頗以詩詠流譽繁欽定情詩曰何以致契闊繞臂金跳脫指環春秋繁露曰紂刑鬼侯之女取其環五經要義曰古者后妃群妾禮御於君所女史書曰授其環以進退之有娠則以金環退之當御者以銀環進之進者着於左手陽也以當就男故着左手右手隂也旣御而復故此女吏之職漢書儀曰宫人御幸賜銀環後漢書曰孫程等十九人立順帝有功各賜金指釧環晉書曰羊祐年五歳令乳母取所弄玉環乳母曰汝先無此物祐乃於隣人李氏東墻桑樹中探得之李氏見驚曰余亡兒所失物也乳母具言前事李氏悲惋時人異之李氏之子即羊祐前身也又曰傅暢年五歳父友見而戲解暢}
  - {type: variant, offset: 1152, length: 0, content: '', WYG: 以左手陽也當以就男故著左手右手隂也既御而復故此女史之職漢書儀曰宫人御幸賜銀環後漢書曰孫程等十九人立順帝有功各賜金指釧環晉書曰羊祜年五嵗令乳母取所弄玉環乳母曰汝先無此物祜乃於隣人李氏東牆桑樹中探得之李氏見驚曰余亡兒所失物也乳母具言前事李氏悲惋時人異之李氏之子即羊祜前身也又曰傅暢年五嵗父友見而戯解暢}
