  - {type: variant, offset: 3120, length: 282, content: 子便留住宿解臂上金合繫其肘下令暮更來遂不至更使尋求都無女人過豬欄邊見豬鉀有合多羅纂文曰多羅粉器扶南傳曰扶南國王以純金多羅遺毗騫王嚴器魏武內嚴器誡令曰孤不好鮮飾嚴具用新皮葦笥以黃葦緣中遇亂世無葦笥乃更作方竹嚴具以皂韋衣之麤布裹此孤平常之用者也內中婦曾置嚴具于時為之推壞今方竹嚴具緣漆甚華好魏武上雜物䟽曰油漆畫嚴器一純金參帶畫方嚴器一齊書曰宜都王鏗鎮姑熟于時人發桓溫女冢得金巾箱織金篾為嚴器條以啟聞鬱林勑以賜之鏗曰今取往物後取今物如此循環爾豈可不熟念使長史蔡約自往脩復纖毫不犯北史后妃傳曰舊儀司飾三人掌簪珥花嚴脩復山陵故事曰梓宮用嚴器五具馬齒嚴器五具汝南先賢傳曰戴良嫁, SBCK: 因􅀉􅀫曉臨别}
