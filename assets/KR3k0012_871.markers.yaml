  - {type: variant, offset: 2425, length: 136, content: 赴明燭焉又曰夫明燭宵舉則飛蟲群起又曰有自無而生焉形須神而立焉有者無之宮形者神之宅故譬之於堤堤壞則水不留方之於燭燭盡則火不居也文子曰鳴鐸以聲自毀膏燭以明自銷韓子曰鄭人有遺燕相國書者夜書火不明因謂持燭者曰舉燭而設書舉燭非書意也燕相國受書而悅之曰舉燭者高明高明者舉賢而任之國以治, SBCK: 餘}
