  - {type: variant, offset: 2764, length: 225, content: 盡照之後燭而益明二者相因而成大火論衡曰太公陰謀書稱武王伐紂兵至牧野晨舉脂燭權掩不備地鏡圖曰相玉見美女子載燭行壇陰從其所出入處尋之石中有玉矣蔡氏化清論曰伏龍非我馬白日非我燭藏之默之保此小朴楚辭曰室中之觀多珍怪蘭膏明燭華容備古詩曰人生不滿百常懷千載憂晝短苦夜長何不秉燭遊魏明帝樂府詩曰晝作不輟手猛燭繼望舒劉禎詩曰天地無期竟民生甚局促為稱百年壽誰能應此錄低昂倏忽去炯若風中燭傅玄燭銘曰煌煌丹燭焰焰飛光取則龍景擬象扶桑照彼玄夜炳若朝陽焚形監世無隱不彰炬東觀漢, WYG: 死史}
