  - {type: variant, offset: 3094, length: 1, content: 懿, SBCK: 沉爲豫州刺史下教求直言之士主簿禇䂮曰堯舜周公所以能致忠諌者以其帎誠之心著也氷炭不言而冷􅀬之質自明者以其有實也􅀂好忠直如氷炭之自然則諤諤之臣將濟濟而盈庭逆耳之言不求而自至矣又曰孫登住冝陽山自作炭人見之知非常人與語登不應後魏書曰髙聦卒有妓十餘人有子無子皆令燒指吞炭出家爲尼邵氏家傳曰邵貞}
