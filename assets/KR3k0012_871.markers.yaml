  - {type: variant, offset: 3457, length: 0, content: '', WYG: 懸羽與炭而知燥濕之氣燥欲炭輕濕欲炭重又曰夫濕之至也莫見其形而炭已重矣風之至也莫見其象而木已動矣又曰天下莫相憎於膠漆而莫相愛於氷炭膠漆相賊氷炭相息也抱朴子曰柳乃速朽者也而燔之為炭則億載而不敗戰國䇿曰豫讓欲報襄子滅鬚去眉變其形容作乞人而往乞其妻曰狀貎不似吾夫其音何類吾夫之甚讓乃吞炭而變其聲異苑曰信安鄭徽年少時登前橋仿佯見一老翁以小嚢與徽云此是君命慎勿零落若有破損便爲㓙兆言訖失所在徽密開看見一挺炭乃宻秘之雖家人不之知也永初三年年六十病篤語子弟云吾齒盡矣可試啟此嚢見炭碎折於是遂亡桓譚新論曰舉火夜作燃炭乾墻王况釋時論曰融融者皆趍熱之士得鑪冶之門者唯挾炭之子鹽鐵論曰氷炭不可以同噐語林曰洛下少林木炭止如粟狀羊琇驕豪乃𢷬小炭爲屑以物和之作獸形後何君之徒共集乃以温酒火熱既猛獸皆開口向人赫然諸豪相矜皆服而效之賈誼鵬鳥賦曰天地爲鑪兮造化爲工隂陽爲炭兮萬物爲銅灰}
