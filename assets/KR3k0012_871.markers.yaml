  - {type: variant, offset: 3210, length: 0, content: '', krp: 譬猶氷炭鈎䋲也何時而可合氷寒炭熱鈎绳曲直無時得今人曰懸羽與炭而知燥濕之氣燥故炭輕温故炭重又曰夫濕之至也莫見其形而炭已重矣風之至也莫見其象而木巳動矣又曰天下莫相憎於膠膝膠􅃮相持不解故曰憎一曰膠入􅃮中則敗􅃮入膠中亦敗膠以多少推之故日相憎也而莫相愛於氷炭氷得炭則解解歸水復其性炭得氷則保其炭故日相愛也膠膝相賊氷炭相息也抱朴子曰柳乃速朽者也而燔之爲炭則億載而不敗吕氏春秋曰豫讓欲報襄子滅鬢去眉變其形容作乞人徃乞於其妻曰然貌無似吾夫者其因何類吾夫之甚讓乃吞炭而變其聲異苑曰信安鄭徽年少時登前橋仿佯見一老翁以小囊與徽云此是君命愼勿零落若有破碎便爲㓙兆言訖失所在徽宻開看是一挺炭意乃袐之雖家人不之知也永𥘉三年年六十病篤語弟子云吾齒盡矣可試啓此囊見炭碎析於是遂}
  - {type: variant, offset: 3211, length: 0, content: '', SBCK: 桓譚新論曰舉火夜作燃炭乾墻王況釋時論曰融融}
  - {type: variant, offset: 3211, length: 0, content: '', krp: 桓譚新論曰舉火夜作燃炭乾墻王況釋時論曰融融}
  - {type: variant, offset: 3212, length: 0, content: '', SBCK: 皆趍􅀬之士得鑪冶之門者唯挾炭之子塩鐵論曰氷炭}
  - {type: variant, offset: 3212, length: 0, content: '', WYG: 以其誠欵之心著也氷炭}
  - {type: variant, offset: 3212, length: 0, content: '', krp: 皆趍熱之士得鑪冶之門者唯挾炭之子塩鐵論曰氷炭}
  - {type: variant, offset: 3213, length: 1, content: 敢, SBCK: 可以同器語林曰洛下少林木炭止如粟狀羊琇驕豪乃擣小炭爲屑以物和之作獸形後何召之徒共集乃以温酒火􅀬猛獸皆開口向人赫赫然諸豪相矜皆服而効之賈􅁩鵩鳥賦曰天地爲鑪兮造化爲工隂陽爲炭兮萬物爲銅􅁅周禮曰蟈氏掌去鼃黽焚壯鞠以􅁅洒之則死壯鞠鞠不華者齊魯之間謂鼃爲黽耿黽也蟈與耿黽尢怒鳴爲聒人耳去之其煙􅀍之則凢水蟲無聲杜子春云假令風從東方來則於水東靣為煙令煙西行彼之水上又曰慌力見切帛以欄爲􅁅渥淳諸帛實其澤器滛之以蜃渥讀如繒人渥管之渥以欄木之􅁅漸釋其帛也杜子春云􅁋當爲􅄺書亦或爲湛鄭司農云澤器謂澤之器蜃清其􅁅而盝力瀆切之而揮之清澄也於􅁅登而盝晞之晞而揮去其蜃史記曰􅁗啇鞅作苛法有弃􅁅於道者刑之漢書曰韓安國坐抵罪獄吏田甲辱之安國曰死􅁅獨不復燃乎甲曰燃即溺之又曰武帝穿昆明池得黒􅁅有外國胡云此是天地刼􅁅之餘也問東方朔信然後漢書曰楊琰爲零陵太守時蒼梧羣賊攻刼琰制車數十乗置􅁅車中從風散􅁅賊不得視因以敗之魏畧曰文欽爲廬江太守爲都督王陵所奏欽訴曹爽爽謂曰陵責卿載􅁅兩舡何爲乎聞足下起染舎故燒作􅁅耳吴録曰張舉字子清爲句章令有婦殺夫者因焚屋言燒死其弟疑而訟之舉按屍開口視之無􅁅令人取猪兩頭殺一生而俱焚之開視其口所殺者無􅁅生者有􅁅乃明夫先死婦後燒之婦遂首服焉晉書曰鳩摩羅什天笁人也中書監張資病驍􅀐將軍吕光􅀶營救療有外國道人羅又云能差資病光喜給賜甚厚羅什以其誑詐告資曰又不能爲益徒煩費耳􅁳運雖隱可以事試也乃以五色絲作䋲結之燒爲􅁅末投水中􅁅􅀂岀水還成䋲者病不可愈湏􅁷􅁅聚浮岀復爲䋲又療果無効少日資云少日猶無幾時隋書曰齊神武覇府田曹叅軍信都芳深有巧思能以管􅀱氣仰觀雲色甞與人對語即指天曰孟春之氣至矣人徃驗管而飛􅁅己應毎月所􅀱言皆蕪爽又爲輪扇二十四埋地中以測二十四氣毎一氣感則一扇自動他扇並住與管􅁅相應􅀂符契焉又曰開皇九年平陳後髙祖遣毛爽及蔡子元于普明等以􅀱節氣依古於三重宻室之内以木爲案十有二具毎取律吕之管隨十二辰位置于案上而以土埋之上平於地中實葭莩之􅁅以輕緹素覆律口毎其月氣至與律􅁳符則􅁅飛衝素散􅁅出外而氣應有早睌􅁅飛有多少或􅀄入月其氣即應或至中下旬間氣始應者或􅁅飛出三五}
  - {type: page-break, offset: 3213, content: '', id: KR3k0012_SBCK_871-6a}
