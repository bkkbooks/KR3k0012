  - {type: variant, offset: 3215, length: 3, content: 揭炬為, SBCK: 而盡或終一月而上末髙祖異之以問牛弘弘對曰􅁅飛半岀爲和氣吹􅁅全出爲猛氣吹􅁅不能出爲衰氣和氣應者其政平猛氣應者其臣縱衰氣應者其君􅁀髙祖駮之曰臣縱君􅁀其政不平非月別而有異也今十二月律於一歳内應並不同安得􅁀君縱臣􅀂斯之甚也弘不能對莊子曰鄭有巫曰季咸知人之死生存亡禍福壽夭期以歳月旬日􅀂神鄭}
