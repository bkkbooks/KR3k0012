  - {type: variant, offset: 272, length: 1085, content: 之燈荀采傳曰采荀爽女為陰瑜妻而夫早亡爽逼嫁與太原郭弈采入郭氏室暮乃去帷帳建四燈歛衽正坐郭氏不敢逼三秦記曰始皇墓中燃鯨魚膏為燈鄴中記曰石虎正平聲會於殿前設百二十枝燈以鐵為之西京雜記曰長安巧人丁緩者為帕滿燈七龍五鳳雜以芙蓉蓮藕之奇又曰高祖初入咸陽宮周行府庫金玉珍寶不可稱言其尤異者有青玉枝燈高七尺五寸下作蟠螭以口銜燈燈燃則鱗甲皆動炳爛若列星而盈室焉洞冥記曰漢武帝燃芳苡燈於閤上有白鳳黑龍馵足來戲於閤上芳苡草出奔盧國又曰丹豹髓白鳳膏磨青錫為屑以淳蘇油和之照於神壇夜暴雨燈光不滅羊頭山記曰漢有常滿燈不添常滿光明不絕也法顯山記曰舍衛國精舍道東有外道天寺名曰影覆與佛論議處精舍夾道相對亦高六丈許所以名影覆者日在西時佛精舍影則照外道天寺日在東時外道天寺影比暎不得照佛精舍也外道常遣人守天寺洒掃燒香燃燈供養至明旦其燈輒移在佛精舍中娑羅門恚言諸沙門取我燈自供養佛婆羅門於夜自伺候見其所天神持燈繞佛精舍三匝供養佛己忽然不見婆羅門乃知佛神即捨家入道王子年拾遺記曰董偃常臥於室中以書石為榻高三尺廣六尺石體甚輕郅支國所獻也上設紫琉璃屏風列金麻油燭如屈龍形雜采為之侍人唯見燈明以言無礙乃於屏風外扇之偃曰玉石豈扇而後消涼侍者乃以手摸之知有屏風之礙又曰穆王東至大𣟵晉奇之谷起春霄之宮集諸方士問佛道法時已將夜聞殷然雷聲伏蟄皆動俄而有流光照於宮內王更設常生之燈一名恒明亦有鳳腦之燈綴水蓮冰谷之花上去燈七八尺不欲使煙光遠照也西王母來乘翠鳳之輦共王飲會又曰燕昭王時海人乘霞舟以雕壺盛升龍膏以獻昭王王坐通雲之堂亦曰通霞臺以龍膏為燈耀百里煙色丹紫國人望之咸言瑞光遙加拜之以火浣布為纏炷光滿於宮內孫子曰火光明于天者燈燭何施焉符子曰不安其昧而樂其明也是猶夕蛾去暗赴燈而死秦子曰智惠多則引血氣如燈火消暗膏炷大而朗朗則膏消炷小而闇闇則息膏至久也說苑曰楚莊王賜群臣酒日暮燈燭既滅乃有人引美人者美人挽絕其冠纓桓譚新論曰余與劉伯師夜坐燈中脂炷燋禿將滅余謂伯師曰人衰老亦如彼禿炷矣伯師曰人衰老應自續余曰益性可使白髮更生黑至壽極亦死耳王朗秦故事曰五華燈樹正月朔朝賀設於下三階之前月照星明雖夜猶晝淮南萬畢術曰取蚢脂為燈置火中即見諸物語林曰嵇中散燈下彈琴忽有一人面甚小斯須轉大遂長丈餘單衣革帶嵇視之既熟吹其燈滅曰吾恥與鬼魅爭光燭記曰侍坐於所尊敬燭至起異晝夜又曰燭不見跋跋本燭盡則去之嫌若燼多有獻倦也又曰曾子寢疾童子隅坐而執燭隅坐不與成人並也又曰孔子曰嫁女之家三夜不息燭思相離也親骨肉也又曰祭之曰汎掃反道鄉為田燭反道剗令新土在上田燭田首為燭又曰凡飲酒為獻主者執燭抱燋主人親執燭敬賓示不倦也執燭不讓不辭不歌以燭繼盡禮殺又曰禮者何也即事之治也, SBCK: ''}
