  - {type: variant, offset: 3213, length: 5, content: 敢夜揭炬為, WYG: 言而冷熱之質自明者以其有實也若好忠直如氷炭之自然則諤諤之臣將濟濟而盈廷逆耳之言不求而自至矣又曰孫登住宜陽山有作炭}
