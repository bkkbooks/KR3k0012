  - {type: variant, offset: 1756, length: 395, content: 攻固出下策耳齊書曰竟陵王子良常集學士刻燭為詩四韻者具刻一寸以此為奇蕭文琛曰燒一寸濁為四韻詩何難之有乃與丘楷江洪共打銅鉢為五韻詩響滅皆可觀覽後魏書曰高祖嘗幸清徽堂命黃門郎崔光鄴郭雅邢巒崔休等賦詩言志燭至公卿辭退高祖曰燭至辭退無同姓之禮在夜載考宗族之義卿等且還朕與諸王宗室欲成此夜飲北齊書曰郎茂年十五師事國子愽士河間權會受詩易三禮玄象刑名之學至忘寢食家人恐成病恒節其燭唐書曰劉沔為忠武小校從李光顏討淮西為捉生將前後與賊血戰鋒刃所傷幾死者數四嘗傷重臥草中月黑不知歸路昏然而睡夢人授之雙燭曰子方大貴此行無患可持而還既行然有雙光在前自後破虜危難每行嘗有此光及罷鎮後雙光遂息又曰柳公權充翰林侍書學士每居堂召對繼燭見跋語猶未盡不欲取外宮人以蠟淚揉紙繼之會稽典錄曰盛吉拜廷尉吉性多仁恕務在寬矜每至冬月罪囚當斷其妻執燭吉手持丹筆夫妻相對垂泣又曰陳脩字奉遷鳥傷人也為豫章太守脩性清潔履約恭儉十日一炊不然官燭神仙, WYG: 烟爓張天許邁别}
