  - {type: variant, offset: 3210, length: 0, content: '', SBCK: 譬猶氷炭鈎䋲也何時而可合氷寒炭􅀬鈎绳曲直無時得今人曰懸羽與炭而知燥濕之氣燥故炭輕温故炭重又曰夫濕之至也莫見其形而炭已重矣風之至也莫見其象而木巳動矣又曰天下莫相憎於膠􅂰膠􅃮相持不解故曰憎一曰膠入􅃮中則敗􅃮入膠中亦敗膠以多少推之故日相憎也而莫相愛於氷炭氷得炭則解解歸水復其性炭得氷則保其炭故日相愛也膠􅂰相賊氷炭相息也抱朴子曰柳乃速朽者也而燔之爲炭則億載而不敗吕氏春秋曰豫讓欲報襄子滅􅁂去眉變其形容作乞人徃乞於其妻曰然貌無似吾夫者其因何􅀋吾夫之甚讓乃吞炭而變其聲異苑曰信安鄭徽年少時登前橋仿佯見一老翁以小囊與徽云此是君命愼勿零落􅀂有破碎便爲㓙兆言訖失所在徽宻開看是一挺炭意乃袐之雖家人不之知也永􅀄三年年六十病篤語弟子云吾齒盡矣可試啓此囊見炭碎析於是遂}
