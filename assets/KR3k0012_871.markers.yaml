  - {type: variant, offset: 2360, length: 2, content: 融皋, SBCK: 貟嶠之山四百里有池周一千里色隨四時變中有神􅀛八足六眼背􅀒七星日月八方之圖復有四燭時岀爛石上石上望之煌煌如列星矣於􅁳昧當雨之時而光色彌明此石常浮於水邊方數百里其色多紅燒之有煙數百里􅂛天則成香雲香雲遍潤則成香雨又曰晉文公焚林以求介推有白鵶繞繞而噪或集介子之側火不能焚晉人嘉之爲立臺號曰思煙列子曰􅁗之}
