  - {type: variant, offset: 3461, length: 1, content: 操, WYG: 爽爽謂曰陵責卿載灰兩船何為乎曰聞足下起染舍故作此灰耳吳録曰張舉子清爲句章令有婦殺夫者因焚屋言燒死其弟疑而訟之舉按屍開口視之無灰令人取猪二頭一殺一生而俱焚之聞視其口所殺者無灰生者有灰乃明夫先即婦殺後燒之婦遂首服焉隋書曰齊神武覇府田曹叅軍信都芳深有巧思能以管候氣仰觀雲色嘗與人對語仰指天曰孟春之氣至矣人徃驗管而飛灰已應毎月所候言皆無爽又爲輪扇二十四埋地中以測二十四氣毎一氣感則一扇自動他扇並住與管灰相應若符契焉又曰開皇九年平陳後髙祖遣毛爽及蔡子元于普明等以候節氣依古}
  - {type: page-break, offset: 3461, content: '', id: KR3k0012_WYG_871-10a, image: WYG0900/WYG0900-0598c.png}
  - {type: page-break, offset: 3461, content: '', id: KR3k0012_WYG_871-10b, image: WYG0900/WYG0900-0598d.png}
  - {type: variant, offset: 3463, length: 3, content: 赤壁密, WYG: 三重宻室之内以木爲案十有二具每取律吕之管随十二辰位置於案上而以土埋之上平於地中實葭莩之灰以輕緹素覆律吕毎其月氣至與律㝠符則火飛衝素散岀於外而氣應有早晩灰飛有多少或初入月其氣即應或至中下旬間氣始應者或灰飛岀三五夜而盡或終一月纔飛少許者髙祖異之以問牛𢎞𢎞對曰灰飛半出爲和氣吹灰全出爲猛氣吹灰不能出爲衰氣和氣應者其政平猛氣應者其臣縱衰氣應者其君暴髙祖駮之曰臣縱君暴其政不平非月别而有異也今十二月律於一嵗内應並不同安得暴君縱臣若斯之甚也𢎞不能對莊子曰鄭有巫曰季咸知人之死生存亡禍福夀夭期以嵗月旬日若神鄭入見之皆棄而走不喜自聞死日列子見之而心醉以告壺子曰嘗試與來以吾示之明日列子與之見壺子岀而謂列子曰嘻子之先生死矣不活矣不可以旬數矣吾見恠焉見濕灰焉濕灰均於寂魄此乃至人無感之時也又曰南郭子綦隠几而坐仰天而嘘㗳焉似喪其偶㗳焉解體若失其配匹也顏子成游立侍乎前曰何居乎形固可}
