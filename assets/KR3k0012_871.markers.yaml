  - {type: variant, offset: 1741, length: 131, content: 執蠟燭投之顗神色無忤徐曰阿奴火攻固出下策耳齊書曰竟陵王子良常集學士刻燭為詩四韻者具刻一寸以此為奇蕭文琛曰燒一寸濁為四韻詩何難之有乃與丘楷江洪共打銅鉢為五韻詩響滅皆可觀覽後魏書曰高祖嘗幸清徽堂命黃門郎崔光鄴郭雅邢巒崔休等賦詩言志燭至公卿辭退高祖曰燭至辭退無同姓之禮, SBCK: ''}
