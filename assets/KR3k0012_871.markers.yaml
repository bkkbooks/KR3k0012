  - {type: variant, offset: 3007, length: 199, content: 炬火天地赫然盡赤堂陽驚怖即夜降魏志曰滿寵字伯寧以前將軍都督楊州諸軍事孫權自將號十萬至合淝新城寵馳往赴募壯士十數人折松為炬灌以麻油從上風放火燒賊攻具射殺權弟泰賊於是引退宋書曰王懿字仲德太原人也符氏之敗仲德年十七與兄叡同起義兵與慕容垂戰敗仲德被瘡退走至滑臺復為翟遼所留使為將師仲德志欲南歸乃棄遼奔太山遼追騎甚急夜行忽見前有猛炬導之乘火夜行百里許得以免難六韜曰三軍有行臨領士眾旦則有雲梯遠望夜則設雲火萬炬, WYG: 壓死少君獨不死}
