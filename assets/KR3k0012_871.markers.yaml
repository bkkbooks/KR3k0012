  - {type: variant, offset: 3467, length: 4, content: 輕舡走舸, WYG: 如稿木而心固可使如死灰乎淮南子曰月暈以蘆灰環之缺一靣則暈亦缺一靣焉又曰爛灰生蠅又曰仲夏之月無燒灰草木盡成無暴布不可以小功干盛陽也又曰夫吹灰而欲無昩渉水而欲無濡不可得也又曰女媧殺黒龍以濟冀州黒龍爲冀州害積蘆灰以止滛水黒蘆也一曰葦灰也又曰伐薪爲炭燔草而爲灰抱朴子曰吳世姚光者有火術吳主試之積荻數千束裹之因猛火而燔荻了盡謂光當已化爲烟燼而光端坐灰中振衣而起把一卷書吳主取而視之不能解也又曰外國作米精鹽實是合五}
