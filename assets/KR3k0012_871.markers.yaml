  - {type: variant, offset: 2610, length: 0, content: '', SBCK: 二日丙子受制火用事火煙赤七十二日戊子受制土用事火煙黄七十二日庚子受制金用事火煙白七十二日壬子受制水用事火煙黒西域諸國志曰屈茨國有山夜則有光火晝則恒烟焉風俗通曰亂如俗如緼者糞除不㓗草芥集衆火就燒之謂之緼言其煙氣緼緼取其希有淆亂鍾㑹芻蕘論曰焚林成煙其似於雲顔延之廷詰曰火含煙而妨火桂懷囊而蠹殘桂然大勝滅蠹壯則桂折焦贑易林夫之小過曰十里望烟散煙日分形體滅亡終不見君炭􅀃文曰炭燒木也記曰季秋草木黄落乃伐薪爲炭左傳曰邾子在門臺門上有臺臨庭閽以瓶水沃庭邾子望見之怒閽曰夷射姑旋焉旋小便也命執之見其不㓗執射姑也弗得滋怒自投于床廢于鑪炭爛遂卒廢墮也又曰宋文公卒始厚葬用蜃炭燒蛤爲炭以瘞黄又曰宋元公惡寺人柳}
  - {type: page-break, offset: 2610, content: '', id: KR3k0012_SBCK_871-3b}
