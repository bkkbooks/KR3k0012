  - {type: variant, offset: 3210, length: 1, content: 亡, WYG: 先冬夏至懸鐵炭於衡各一端今適停冬陽氣至炭仰而鐵低夏隂氣至炭低而鐵仰以候二至焉晉書曰王沈為豫州刺史下教求直言之士主簿禇䂮入告曰堯舜周公所以能致忠諫}
