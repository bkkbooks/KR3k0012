  - {type: variant, offset: 1943, length: 7, content: 吳主曾與仙公坐, SBCK: 新蔡鄭敬都尉髙懿㕔前有槐樹有白露􅀋甘露懿問椽屬皆言是甘露敬曰明府德政未致甘露但樹汁耳懿不恱稱疾而去洞冥記曰勒畢國人長三寸有翼善言語戯􅀏因名語國飲丹露爲漿丹露者日􅀄出有露汁如朱也又曰東方朔遊吉雲之地漢武帝問朔曰何名吉雲曰其國俗常以雲氣占吉凶􅀂吉樂之事則滿室雲起五色照著}
