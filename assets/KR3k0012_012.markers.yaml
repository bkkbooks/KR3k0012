  - {type: variant, offset: 572, length: 1, content: 道, SBCK: 雲霧雨之徴也夏則爲露冬則爲霜温則爲雨寒則爲霜雨露凍凝者其由地發不從天降琴操曰曽子耕太山下雨雪不得歸思父母作梁山操廣志曰雲南郡四五月猶積雪皓代郡以五月山隂猶􅀫雪八月末復雪宋玉對問曰客有歌於郢中始曰下俚巴人國中屬而和者數千人其爲陽春白雲國中屬而和者不過數十人是其曲彌髙而和彌寡宋謝惠連雪賦曰嵗將暮時旣昏寒風積愁雲繁梁王不恱遊於兎園乃置旨酒命賔友召鄒生延枚􅅱相如末}
