  - {type: variant, offset: 574, length: 0, content: '', WYG: 五月山隂猶宿雪八月末復雪宋玉對問曰客有歌於郢中始曰下里巴人國中屬而和者數千人及爲陽春白雪國中屬而和者不過數十人是故其曲彌髙其和彌寡宋謝惠連雪賦曰歲將暮時既昏寒風積愁雲繁梁王不恱遊於兎園乃置旨酒命賔友召鄒生延枚叟相如末至居客之右俄而微霰零密雪下王乃歌北風於衛詩詠南山於周雅相如於是避席而起逡巡而揖曰臣聞雪宫建於東國雪山峙於西域岐昌發詠於來思姬滿申歌於黄竹曹風以麻衣比色楚謡以幽蘭儷曲盈尺則呈瑞於豐年袤丈則表沴於隂德其為狀也散漫交錯氛氲蕭索藹藹浮浮瀌瀌奕奕聨翩飛灑徘徊委積始緣甍而冐棟終開簾而入隙既因方而爲珪亦遇圓而成璧眄隰則萬頃同縞瞻山則千巖俱白於是臺如重璧逵似連璐庭列瑶階林挺瓊樹皓鶴奪鮮白鷴失素楚辭九辯曰雪霰紛糅女救反又䰟兮來歸兮北方不可止些層冰峨峨飛雪千里些峨鮮苛反又霰雪紛其無垠些雲霏霏承宇些司馬相如美人賦曰時既西些元隂晦㝠涼風蕭然素雪飄零伏元之雪賦序曰結隂凝雪皎如帔素謝靈運詩曰明月照積雪朔風勁且哀樂府歌詩曰皚如山上雪皎如雲間月聞君有兩意故來相决絶庾肅之雪讚曰皎如}
