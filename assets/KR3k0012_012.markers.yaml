  - {type: variant, offset: 2589, length: 1, content: 魚, SBCK: 實劉向􅀃苑曰呉欲伐荆王令曰敢有諌者死舎人有少孺子者欲諌懷彈於後園露霑其衣者三朝王曰子求何苦露霑衣如是對曰園中有樹其端有蟬蟬髙居悲鳴飲風噏露不知螗蜋在其後曲跗方無反欲取其蟬而螗蜋又不知黃雀居其後延頸欲啄之然黃雀又不知臣操彈丸在其下臣但捕其黄雀不覺露隰衣此者爲窺其利而不思後患王聞之遂不伐荆又曰騰虵遊於霧露千里不止漢武帝故事曰帝作金莖擎玉杯以承雲表之露擬和玉屑服之以求仙又曰作銅承露槃上有仙人掌以承露也蔡邕月令章句曰露者隂液也釋爲露凝爲霜白虎通曰甘露者美露也降則物無不盛又曰露者霜之始寒即變爲霜論衡曰甘露味如飴王者太平之應則降地鏡圖曰視山川多露無霜其下有美玉徐整長曆曰北斗當崑崙山氣運注天下春夏爲露崔豹古今注曰薤露䘮歌也言人命如薤上露易晞滅也其一章曰薤上露何易晞明朝更復落人死何時歸瑞應圖曰露色濃甘者爲之甘露王者施德惠則甘露降其甘草木又曰甘露者美露也神靈之精仁瑞之澤其凝如脂其甘如飴一名膏露一名天酒又曰王者德至於天和氣感則甘露降於松栢}
