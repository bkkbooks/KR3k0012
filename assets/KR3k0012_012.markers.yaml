  - {type: variant, offset: 572, length: 1, content: 道, krp: 雲霧雨之徴也夏則爲露冬則爲霜温則爲雨寒則爲霜雨露凍凝者其由地發不從天降琴操曰曽子耕太山下雨雪不得歸思父母作梁山操廣志曰雲南郡四五月猶積雪皓代郡以五月山隂猶宿雪八月末復雪宋玉對問曰客有歌於郢中始曰下俚巴人國中屬而和者數千人其爲陽春白雲國中屬而和者不過數十人是其曲彌髙而和彌寡宋謝惠連雪賦曰嵗將暮時旣昏寒風積愁雲繁梁王不恱遊於兎園乃置旨酒命賔友召鄒生延枚叟相如末}
  - {type: variant, offset: 574, length: 0, content: '', SBCK: 居客之右俄而微霰零宻雪下王乃歌北風於衛詩詠南山於周雅相如於是避席而起逡廵而揖曰臣聞雪宫建於東國雪山峙於西域岐昌發詠於來思姬滿申歌於黄竹曹風以麻衣比色楚謡以幽蘭儷曲􅄹尺則呈瑞於豐年袤丈則表沴於隂德其爲狀也散漫交錯氛氲蕭索藹藹浮浮瀌瀌弈弈連翩飛灑徘􅆦委積始縁甍而冒㨂終開簾而入􅂩旣因方而爲圭亦遇圎而成璧眄隰則萬頃同縞瞻山則千巖俱白於是臺如重璧逵如蓮璐庭列瑶階林挺瓊樹皓鶴奪鮮白鷼失素楚辭九辯曰雪霰紛揉女救反又曰䰟來歸􅀆北方不可止増氷峨峨飛雪千里些蘇笴反又曰霰雪紛其無恨些雲霏霏而承宇些司馬相如羙人賦曰時旣西夕􅀇隂晦冥凉風蕭然素雪飄零伏系之雪賦序曰結隂凝雪皎如帔素謝靈運詩曰明月照積雪朔風勁旦哀樂府歌詩曰皓如山上雪皎如雲間月聞君有兩意故來相決絶􅁃肅之雪讃曰皓若}
