  - {type: variant, offset: 1746, length: 172, content: 令有司徹樂太官以菜食常供祭奠既而澍雨大降又前涼錄曰張植為西域校尉與奮威將軍牛霸率騎救張冲六月至于流沙無水士卒渴甚植乃剪髮肉袒徒跣升壇慟泣請雨俄而雲起西北雨水成川植殺所乘馬祭天而去又前秦錄曰沙公西域沙門也有祕術每旱苻堅常使呪龍龍便下缽中天輒大雨後魏書曰孝文太和二年京師旱祈雨天子於北苑親自禮焉減膳避正殿澍雨大洽三年帝祈雨於北苑閉陽門是日澍雨益部耆, SBCK: 樹白鳩巢其廬豫章􅂄}
