  - {type: variant, offset: 1524, length: 194, content: 郡大旱苗稼敗晢乃命邑人躬共請雨三日中雨水三尺眾人以其有術數精誠感於神明百姓懽喜為之歌曰束先生通神明請天三日甘雨零我黍以萌我稷以生何以疇之報束先生高閭燕志曰太平十五年自春不雨至於五月有司奏右部王荀妻產妖傍人莫覺俄而失之乃暴荀妻於社大雨普洽魚豢典略曰舊制求雨太常禱天地宗廟社禝山川已賽如其常祭牢禮四月立夏旱乃求雨立秋雖旱不禱求雨到七月畢賽之秋冬春三時不求雨崔鴻春秋前燕錄曰建熙七年五月慕容暐下, WYG: 興}
