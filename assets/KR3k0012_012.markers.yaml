  - {type: variant, offset: 584, length: 3, content: 陰曀者, SBCK: 散􅀃文曰霰積雪也從􅀨散聲詩曰如彼􅀨雪先集維霰霰􅁀雪也箋云雪自上遇温氣而摶}
  - {type: variant, offset: 584, length: 3, content: 陰曀者, WYG: 冰寒陽氣薄之不相入則散而爲霰故沸湯之在閉噐而湛於寒泉則爲氷及雪之消亦水解而散此其驗也韓詩薛君注曰霰霙也曽子曰隂之專氣爲霰露釋名曰露慮也覆慮物也許愼說文曰露潤澤也從雨路聲詩曰厭於接反浥行露豈不夙夜}
