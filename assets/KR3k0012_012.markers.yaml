  - {type: variant, offset: 2073, length: 49, content: 湯既克夏大旱七年洛川竭湯乃以身禱於桑林剪其髮自以為犧牲祈福於上帝於是大雨惣至洽于四海又曰湘東新平縣, SBCK: 崑崙山}
  - {type: variant, offset: 2073, length: 7, content: 湯既克夏大旱七, WYG: 勒畢國人長三寸有翼善言語戲笑因名語國飲丹露為漿丹露者日初出有露如珠也又東方朔遊吉雲之地漢武帝問朔曰何名吉雲曰其國俗常以雲氣占吉凶若占樂之事則滿室雲起五色照著於草木皆成五色露露味甘帝曰吉雲五色雲可以得否朔乃東走至夕而還得元黄青露盛之琉璃噐以授帝帝遍賜羣臣得露嘗者老者少疾病皆愈又元封二}
