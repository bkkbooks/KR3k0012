  - {type: variant, offset: 3, length: 1, content: 一, SBCK: 二雪霰露雪釋名曰雪綏也水下遇寒凝綏綏然下也詩曰北風其凉}
  - {type: variant, offset: 3, length: 1, content: 一, WYG: 二雪霰露雪釋名曰雪綏也水下遇寒綏綏然下也詩曰北風其涼}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_WYG_012-1b, image: WYG0893/WYG0893-0126d.png}
  - {type: variant, offset: 3, length: 0, content: '', krp: 二雪霰露雪釋名曰雪綏也水下遇寒凝綏綏然下也詩曰北風其凉雨雪其滂又曰上天同雲雨雪雰雰雰雰雪皃也豐年之冬必有積雪又曰文王以天子之命命將帥歌采薇以遣之昔我往矣楊柳依依今我來思雨雪霏霏又曰蜉蝣掘閱麻衣如雪鄭玄注曰喻曹昭公君臣朝夕變易衣服麻衣深衣也禮曰孟春行冬令則水潦爲敗雪霜大摯傳曰隱公九年三月庚辰大雪凡平地尺三月今正月也大雪失時也又曰楚子次于乾谿雨雪王皮冠秦復陶秦所遺羽衣也翠𬒳豹舄執鞭以出易通卦驗曰乾得坎之蹇則當夏雨雪詩推度灾曰逆天地絶人倫當夏雨雪大戴禮曰天地積隂温則爲雨寒則爲雪春秋元命苞曰隂陽凝而爲雪史記曰東郭先生乆待詔公車貧困飢寒衣弊履不完行雪中履有上無下足盡踐地道中人笑之漢書曰漢女者居東海養姑姑女䜛之於姑姑經太守訴而殺之五月下雪又曰蘇武使於單于單于幽武置大窖中絶不與飲食天雨雪武卧齧雪與氊毛并咽之數日不死匈奴因以爲神又曰壷廣鞮單于自將領萬騎擊烏孫㑹天大雪}
  - {type: xml-element, offset: 4, content: '', id: KR3k0012_CHANT_012-bkkxmlele1}
  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_012-1a.1}
  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_012-1a.2}
  - {type: variant, offset: 4, length: 0, content: '', krp: 日深文餘人民畜産凍死續漢書曰赤眉入安定北地逢大雪坑谷皆滿多凍死晉書曰王恭衣鶴􅌁雪中行時人謂之神仙中人又曰太傳謝安雪驟降公欣然曰白雪紛紛何所似兄子客兒曰散鹽空中差可擬兄女道韞曰未若柳絮因風起又曰東瀛公騰公姓司馬名騰伐石勒於常山屯營時天大雪有一處方數丈融液恠而掘之得一玉馬髙尺許以爲晉家之瑞晉朝雜事曰太康七年河隂}
  - {type: variant, offset: 5, length: 6, content: 下河圖帝道紀, SBCK: 雪其滂又}
  - {type: variant, offset: 5, length: 6, content: 下河圖帝道紀, WYG: 雪其雱又上天同雲雨雪雰雰雰雰雪貎也豐年之冬必有積雪又昔我往矣楊柳依依今我來思雨雪霏霏又蜉蝣掘閱麻衣如雪禮記孟春行冬令則水潦爲敗雪霜大摯傳}
  - {type: variant, offset: 5, length: 0, content: '', krp: 赤雪二頃宋書曰大明中元日雪花降殿庭右將軍謝莊}
  - {type: xml-element, offset: 6, content: '', id: KR3k0012_CHANT_012-bkkxmlele2}
  - {type: xml-element, offset: 6, content: '', id: KR3k0012_CHANT_012-bkkxmlele3}
  - {type: 'tls:seg', offset: 6, content: '', id: KR3k0012_CHANT_012-1a.3}
  - {type: punctuation, offset: 6, content: 《, id: KR3k0012_CHANT_012-bkkpn1}
  - {type: variant, offset: 6, length: 5, content: 河圖帝道紀, krp: 殿雪集衣白上以爲嘉瑞羣臣皆作雪花詩崔鴻北凉録曰先酒泉南有銅駞出大雨雪沮渠蒙遜遣工取之得銅數萬斤宋齊語曰孫康家貧常映雪讀書唐書曰郭元振爲安西大都護時西突厥首領烏質勒部落強盛欵塞通和元振就其牙帳計㑹軍事時天大雪元振立於帳前與烏質勒言議須臾雪深風凍元振未嘗移足烏質勒年老不勝寒苦㑹罷而死録異傳曰漢時大雪積地丈餘洛陽令自岀案行見民家皆除雪出有乞食者至袁安門無有行路謂安巳死令人除雪入户見安僵卧問何不出安曰大雪人皆餓不冝干人令以爲賢舉爲孝廉韓詩外傳曰凡草木花多五出雪花獨六出雪花曰霙音英皇甫謐髙士傳曰世莫知焦先所出野火燒其廬先因露寢冬雪大至先袒卧不移人以爲死就視如故穆天子傳曰日中大雪北風雨雪有凍死人天子作黃竹詩三章以哀民曰我徂黃竹負閟寒閟閇也音祕又}
  - {type: punctuation, offset: 11, content: 》, id: KR3k0012_CHANT_012-bkkpn2}
  - {type: punctuation, offset: 12, content: ：, id: KR3k0012_CHANT_012-bkkpn3}
  - {type: 'tls:seg', offset: 12, content: '', id: KR3k0012_CHANT_012-1a.4}
  - {type: punctuation, offset: 12, content: 「, id: KR3k0012_CHANT_012-bkkpn4}
  - {type: variant, offset: 12, length: 0, content: '', SBCK: 上天同雲}
  - {type: variant, offset: 12, length: 0, content: '', WYG: 隱公九年三月庚辰大}
  - {type: variant, offset: 13, length: 1, content: 者, SBCK: 雪雰雰雰雰雪皃也豐年之冬必有積雪又曰文王以天子之命命將帥歌采薇以遣之昔我往矣楊柳依依今我來思雨雪霏霏又曰蜉蝣掘閱麻衣如雪鄭􅀇注曰喻曹昭公君臣朝夕變易衣服麻衣􅀷衣也禮曰孟春行冬令則水潦爲敗雪霜大摯傳曰隱公九年三月庚辰大雪凡平地尺三月今正月也大雪失時也又曰楚子次于乾谿􅀨雪王皮冠秦復陶秦所遺羽衣也翠􅀍豹舄執鞭以出易通卦驗曰乾得坎之蹇則當夏雨雪詩推度灾曰逆}
  - {type: page-break, offset: 13, content: '', id: KR3k0012_SBCK_012-1b}
  - {type: variant, offset: 13, length: 1, content: 者, WYG: 雪凡平地尺爲大雪三月今正月也大雪失時也又楚子次于乾谿雨雪王皮冠秦復陶秦所遺羽衣也翠被豹舄執鞭以出易通卦驗曰乾得坎之蹇則當夏雨雪詩推度灾曰逆}
  - {type: page-break, offset: 13, content: '', id: KR3k0012_WYG_012-2a, image: WYG0893/WYG0893-0127a.png}
  - {type: variant, offset: 13, length: 1, content: 者, krp: 雪}
  - {type: punctuation, offset: 14, content: ，, id: KR3k0012_CHANT_012-bkkpn5}
  - {type: 'tls:seg', offset: 14, content: '', id: KR3k0012_CHANT_012-1a.5}
  - {type: variant, offset: 15, length: 0, content: '', krp: 子獵于鈃山之西河漢武内傳曰西主母曰仙之上藥有玄霜絳雪列士傳曰羊角哀左伯桃相與爲死友聞楚王欲徃仕之道遇雨雪計不俱全乃併衣粮與角哀入樹而死陸機別傳曰機誅日平}
  - {type: variant, offset: 16, length: 0, content: '', SBCK: 絶人倫當夏雨雪大戴禮曰天地積隂温則爲雨寒則爲雪春秋元命苞曰隂陽凝而爲雪史記曰東郭先生乆待詔公車貧困飢寒衣弊履不完行雪中履有上無下足盡踐地道中人􅀏}
  - {type: variant, offset: 16, length: 0, content: '', WYG: 絶人倫當夏雨雪大戴禮曰天地積隂温則爲雨寒則爲雪春秋元命苞曰隂揚而爲雪史記曰東郭先生久待詔公車貧困饑寒衣弊履不完行雪中履有上無下足盡踐地道中人笑}
  - {type: variant, offset: 16, length: 0, content: '', krp: 尺雪時人以爲冤曹攄別傳曰攄爲洛陽令于時大雪而宫門夜忽失行馬攄曰此非他竊理可保明必是門士以療寒驗}
  - {type: variant, offset: 17, length: 1, content: 施, SBCK: 漢書曰漢女者居東海養姑姑女䜛之於姑姑經太守訴而殺之五月下雪又曰􅂫武使於單于單于幽武置大窖中絶不與飲食天雨雪武卧齧雪與氊毛并咽之數日不死匈奴因以爲神又曰壷廣鞮單于自將領萬􅀐擊烏孫㑹天大雪一日􅀷文餘人民畜産凍死續漢書曰赤眉入安定北地逢大雪坑谷皆滿多凍死晉書曰王恭衣鶴􅌁雪中行時人謂之神仙中人又曰太􅀓謝安雪驟降公欣然曰白雪紛紛何所似兄子客兒曰散鹽空中差可擬兄女道韞曰未􅀂柳絮因風起又曰東瀛公騰公姓司馬名騰伐石勒於常山屯營時天大雪有一處方數丈融液恠而掘之得一玉馬髙尺許以爲晉家之瑞晉朝雜事曰太康七年河隂雨赤雪二頃宋書曰大明中元日雪花降殿庭右將軍謝莊下殿雪集衣白上以爲嘉瑞羣臣皆作雪花詩崔鴻北凉録曰先酒泉南有銅駞出大雨雪沮渠蒙遜遣工取之得銅數萬斤宋齊語曰孫康家貧常映雪讀書唐書曰郭元振爲安西大都護時西突厥首領烏質勒部落強盛欵塞通和元振就其牙帳計㑹軍事時天大雪元振立於帳前與烏質勒言議須􅁷雪􅀷風凍元振未嘗移足烏質勒年老不勝寒苦㑹罷而死録異傳曰漢時大雪積地丈餘洛陽令自岀案行見民家皆除雪出有乞食者至􅀽安門無有行路謂安巳死令人除雪入户見安僵卧問何不出安曰大雪人皆餓不冝干人令以爲賢舉爲孝廉韓詩外傳曰凡草木花多五出雪花獨六出雪花曰霙音英皇甫謐髙士傳曰世莫知焦先所出野火燒其廬先因露寢冬雪大至先袒卧不移人以爲死就視如故穆天子傳曰日中大雪北風雨雪有凍死人天子作黃竹詩三章以哀民曰我徂黃竹􅀒閟寒閟閇}
