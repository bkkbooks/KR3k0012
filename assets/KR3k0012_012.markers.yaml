  - {type: variant, offset: 2558, length: 7, content: 土龍致雨許慎注, SBCK: 方諸取露於月高誘}
  - {type: variant, offset: 2558, length: 6, content: 土龍致雨許慎, WYG: 方諸取露於月髙誘曰方諸隂燧也東方朔神異經曰西北海有人長二千里兩脚中間相去千里腹圍一千六里但日飲天酒五斗張華云天酒甘露也又黄父以霧露為漿古史考曰太古之初民吮露精食草木實劉向說苑曰吳欲伐荆王令曰敢有諫者死舎人有少孺子者欲諫懐彈於後園露霑其衣如是三朝王曰子求何苦露霑衣如是對曰園中有樹其端有蟬蟬髙居悲鳴飲風噏露不知螗蜋在其後曲跗方無反欲取其蟬而螗蜋又不知黄雀居其後延頸欲啄之然黄雀又不知臣操彈丸在其下臣但捕其黄雀不覺露霑衣此者爲窺其利而不思其後患王聞之遂不伐荆又騰虵遊於霧露千里不止漢武帝故事曰帝作金莖擎玉杯以承雲表之露擬和玉屑服之以求仙又作銅承露槃上有仙人掌以承露也蔡邕月令章句曰露者隂液也釋爲露凝為霜白虎通曰甘露者美露也降則物無不盛又露者霜之始寒即變爲霜論衡曰甘露味如飴王者之應則降地鏡圖曰視山川多露無霜其下有美玉徐整長厯曰北斗當崑崙山氣運注天下春夏為露崔豹古今}
