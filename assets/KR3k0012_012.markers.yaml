  - {type: variant, offset: 2648, length: 0, content: '', SBCK: 主甘露占􅀂明而􅃳則甘露降不然則否也楚辭曰朝飲木蘭之墜露夕採秋菊之落英張衡奏事曰飛塵増山霧露増海曹植魏德論曰􅀇徳洞幽飛化上蒸甘露以降􅁡淳氷凝覩陽弗晞瓊爵是承獻之帝朝以明聖徴曹植承露盤銘叙曰夫形能見者莫如髙物不朽者莫如金氣之清者莫如露盛之安者莫如盤乃詔}
