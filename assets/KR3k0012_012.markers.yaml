  - {type: variant, offset: 588, length: 10, content: 之甘雨非謂雨水味甘也, WYG: 行多露}
  - {type: variant, offset: 589, length: 0, content: '', SBCK: 霰爾雅曰􅀨霰爲消雪郭璞注云霰水雪雜下故謂消雪又曰􅀨雪相和爲霰尚書洪範五行傳曰盛隂􅀨雪凝滯而氷寒陽氣薄之不相入則散而爲霰故沸湯之在閉器而湛於寒泉則爲氷及雪之銷亦氷解而散此驗也韓詩薛君注曰霰霙也曽子曰隂之專氣爲霰露釋名曰露慮也覆慮物也許愼􅀃文曰露潤澤也從􅀨路聲詩曰厭於接反浥行露豈不夙夜謂行多露又曰蒹葭蒼蒼白露爲霜又曰湛露天子燕諸侯也湛湛露斯匪陽不晞又曰野有蔓草零露摶徒官反􅀆又曰野有蔓草零露瀼瀼如章反禮曰立秋後五日白露降又曰季冬行秋令則白露早降又曰天不愛其道故天降}
