  - {type: variant, offset: 1256, length: 3, content: 荀崧從, SBCK: 田蚡封武安侯爲丞相召客飲坐其兄盖侯北郷自坐東郷以爲漢相尊不可以兄故私撓由此滋驕又曰丞相韋賢封扶陽侯長子方山早終次子弘少子玄成􅀄弘爲太常丞職奉宗廟典諸陵邑煩劇多罪過父賢以弘當爲嗣故勑令自免弘懷嫌不去官及賢病篤弘竟坐宗廟事繫獄罪未决室家問賢當爲後者賢恚不肯言於是賢門生􅀶士等與宗室計議共矯賢令以玄成爲後賢薨玄成在官聞䘮又言當爲嗣玄成深知其非賢雅意即陽爲病狂妄􅀏語士大夫多疑其欲讓爵遜兄者丞相衘史劾奏之不得巳受侯爵又曰左馮翊韓延壽行縣至髙陵有昆仲相訟田延壽耻不能明教化因入傳舎閉閤思過於是訟者自髠肉􅃝謝罪又曰嚴延年兄}
  - {type: page-break, offset: 1256, content: '', id: KR3k0012_SBCK_514-7b}
  - {type: variant, offset: 1256, length: 3, content: 荀崧從, WYG: 田蚡封武安侯為丞相召客飲坐其兄蓋侯北郷自坐東郷以為漢相尊不可以兄故私撓由此滋驕又曰丞相韋賢封武陽侯長子方山早終次子𢎞少子𤣥成初𢎞為太常丞職奉宗廟典諸陵邑煩劇多罪過父賢以𢎞當為嗣故勑令自免𢎞懐謙不去官及賢病篤𢎞竟坐宗廟事繋獄罪未决室家問賢當為後者賢恚不肯言於是賢門生博士等與宗室計議共矯賢令以𤣥成為後賢薨𤣥成在官聞䘮又言當為嗣𤣥成深知其非賢主意即揚為病狂妄笑語士大夫多疑其欲讓爵遜兄者丞相御史劾奏之不得已受封爵又曰左馮翊韓延夀行縣至髙陵有昆仲相訟曰延夀耻不能明教化因入傳舍閉閣思過於是訟者自髠肉袒謝罪又曰嚴延年兄}
