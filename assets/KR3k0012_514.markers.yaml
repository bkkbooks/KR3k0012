  - {type: variant, offset: 17, length: 0, content: '', krp: 又曰黄鳥刺宣王也刺其以隂禮敎親而不至聦兄弟之不固者也黄鳥黄鳥無集于桑無啄我梁此邦之人不可與明言旋言歸復我諸兄又斯干曰兄及弟矣式相好矣無相猶矣似續妣祖又行葦曰戚戚兄弟莫逺具爾或肆之筵或授之几又角弓曰角弓}
  - {type: variant, offset: 18, length: 0, content: '', SBCK: 兄刺幽王也不親九族而信䜛佞骨肉相怨故作是詩也騂騂角弓翩其反矣兄弟婚姻無胥逺矣此令兄弟綽綽有􅁉不令兄弟交相爲瘉又將仲子曰將仲子刺莊公也不勝其母以害其弟弟叔失道而公不制􅀕仲諌而公弗聽小不忍而致大亂焉將仲子􅀆無踰我墻無折我樹桑豈敢愛}
  - {type: variant, offset: 18, length: 0, content: '', WYG: 兄刺幽王也不親九族而信讒佞骨肉相怨故作是詩也騂騂角弓翩其反矣兄弟婚姻無胥逺矣此令兄弟綽綽有裕不令兄弟交相為瘉又将仲子刺荘公也不勝其母以害其弟弟叔失道而公弗制祭仲諫而公弗聽小不忍而致大亂焉将仲子兮無踰我墻無折我樹桑豈敢愛}
  - {type: variant, offset: 18, length: 0, content: '', krp: 兄刺幽王也不親九族而信䜛佞骨肉相怨故作是詩也騂騂角弓翩其反矣兄弟婚姻無胥逺矣此令兄弟綽綽有𥙿不令兄弟交相爲瘉又將仲子曰將仲子刺莊公也不勝其母以害其弟弟叔失道而公不制祭仲諌而公弗聽小不忍而致大亂焉將仲子兮無踰我墻無折我樹桑豈敢愛}
  - {type: variant, offset: 19, length: 0, content: '', SBCK: 畏我諸兄仲可懷也諸兄之言亦可畏也又揚之水曰揚之水不流束楚終鮮兄}
