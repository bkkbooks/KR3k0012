  - {type: 'tls:seg', offset: 272, content: '', id: KR3k0012_CHANT_514-2a.45}
  - {type: variant, offset: 272, length: 0, content: '', WYG: 兵作於内為亂於外為宼宼猶及人亂自及也今臣作亂而君不禁以啟宼讐若之何公止之惠伯成之平二子使仲舍之公孫敖返之還莒女也復為兄弟如故又文下曰齊人歸公孫敖之䘮為孟氏且國故也葬視共仲聲已不視帷堂而哭襄仲欲勿哭惠伯曰䘮}
  - {type: page-break, offset: 272, content: '', id: KR3k0012_WYG_514-6b, image: WYG0897/WYG0897-0596b.png}
  - {type: variant, offset: 273, length: 2, content: 者未, WYG: 之終也惠伯叔彭生也雖不能始善終可也史佚有言曰兄弟至美救乏賀善弔災祭敬喪哀情雖不同毋絶其愛親之道也子無}
  - {type: variant, offset: 276, length: 0, content: '', WYG: 道何怨於人襄仲說帥兄弟以哭之又昭元曰秦后子有寵於桓如二君於景后子秦桓公子景公母弟鍼也其權寵如両君也其母曰弗去懼選鍼適晉其車千乗曰秦伯之弟鍼出奔晉罪秦伯也后子享晉侯造舟於河十里舍車自雍及綘取酬幣終事八反司馬侯問曰子之車盡於此而已乎對曰此之謂多矣若能少此吾何以得見焉又隱公曰鄭荘公弟共叔叚居京謂之京城大叔祭仲諫曰都城過百雉國之害也無使滋蔓蔓草猶不可除况君之寵弟乎又襄公曰吴子諸樊既除喪将立季札杜預曰札諸樊弟也辭曰曹宣公之卒也諸侯與曹君将立子臧子臧去之遂弗為也以成曹君君子曰能守節君義嗣也諸樊適子故曰義嗣誰敢干君有國非吾節也札雖不才願附於子臧以無失節固立之棄其室而耕乃舍之傳言季札之讓且明吳兄弟相𫝊又曰兄弟天倫兄前弟後天之倫次論語曰周有八士伯達伯适仲突仲忽叔夜叔夏季隨季騧包氏曰周時四乳生八子皆為顯士故記之也又曰子路問曰何如斯可謂之士矣子曰切切偲偲怡怡如也可謂士矣朋友切切偲偲兄弟怡怡馬融曰切切偲偲切責之貌也怡怡和順之貌也又為政曰或謂孔子曰子奚不為政子曰書云孝乎惟孝友於兄弟施於有政是亦為政奚}
  - {type: page-break, offset: 276, content: '', id: KR3k0012_WYG_514-7a, image: WYG0897/WYG0897-0596c.png}
  - {type: page-break, offset: 276, content: '', id: KR3k0012_WYG_514-7b, image: WYG0897/WYG0897-0596d.png}
