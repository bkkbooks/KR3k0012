  body:
  - {type: variant, offset: 3, length: 2, content: 三伯, SBCK: 四兄弟上釋名曰兄荒也荒大也故青徐人謂兄曰荒第日第也相次第而生也􅀃文曰兄長也周易曰家人卦曰父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣尚書五子之歌曰太康尸位以逸豫滅厥德􅀺民咸貳乃盤遊無度畋于有洛之表十旬不反有窮后羿因民弗忍距于河厥弟五人御其母以從徯于洛之汭五子咸怨述大禹之戒以作歌又君陳王􅀂曰君陳惟爾令德孝恭惟孝友于兄弟克施有政又康誥曰王􅀂曰孟侯朕其弟小子封孔安國曰封康}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_514-1b}
  - {type: variant, offset: 3, length: 2, content: 三伯, WYG: 四兄弟上釋名曰兄荒也荒大也故青徐人謂兄曰荒弟弟也相次第而生也説文曰兄長也周易曰家人卦曰父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣尚書曰五子之歌曰太康尸位以逸豫滅厥德黎民咸貳乃盤遊無度畋於有洛之表十旬不反有窮后羿因民弗忍距於河厥弟五人御其母以從傒於洛之汭五子咸怨述大禹之戒以作歌又君陳王若曰君陳惟爾令德孝恭惟孝友於兄弟克施有政又康誥王若曰孟侯朕其弟小子封孔安國曰封康}
