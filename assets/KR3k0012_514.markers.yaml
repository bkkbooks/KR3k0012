  - {type: variant, offset: 317, length: 547, content: 世路威夷禍亂遂爾駑怯偷生自竄蠻貊成闊十年吉凶禮廢涉南海循岸渚五千餘里復遇疫疾伯母殞命并及群從自諸妻子一時略盡復相扶持前到此郡追計為兵害及病亡者十遺一二生民之艱辛苦之甚晉書曰羅含字君章桂陽人也含幼孤為叔母朱氏所養少有志尚晝臥夢一鳥文彩異常飛入口中因驚起說之朱氏曰鳥有文彩汝後必有才章自後藻思日新又曰餘杭婦人經年荒賣其子以活夫之兄子吳興太守孔褒薦之又曰皇甫謐字士安幼名靜安定朝那人漢太尉嵩之曾孫也出後叔父徙居新安年二十不好學遊蕩無度嘗得瓜果輒進叔母任氏任氏曰孝經云二牲之養猶為不孝汝今年餘二十目不存教心不入道無以慰我因歎曰昔孟母三徙以成仁曾父烹豕以存教豈我居不卜鄰教有所闕何爾魯鈍之甚也修身篤學自汝得之於我何有因對泣涕謐乃感激就卿人席坦受書勤力不殆居貧躬自稼穡帶經而農遂博綜典籍百家之言自號玄晏先生又曰羊耽妻辛氏字憲英隴西人鍾會為鎮西將軍憲英謂躭從子祐曰鍾士季何故西出祜曰將為滅蜀也憲英曰會所在縱恣非持久處下之道吾畏其他志也會果反祜嘗送錦被憲英嫌其華反而覆之又曰杜有道妻嚴氏字憲京兆人貞淑有識量生子植植從兄預為秦州刺史被巫徵還憲與預書戒之曰諺曰忍辱至三公卿今可謂辱矣能忍之三公是卿座預後果為儀同三司三十國春秋曰羊祐年十五而孤事伯母蔡氏以孝聞蔡氏每歎曰羊叔子可謂能養也其諸葛孔明之亞乎宋書曰謝瞻字宣遠, SBCK: ''}
