  - {type: variant, offset: 11, length: 0, content: '', SBCK: 母爲孝善兄弟爲友毛詩棠棣曰棠棣燕兄弟也閔管蔡}
  - {type: variant, offset: 11, length: 0, content: '', WYG: 母為孝善兄弟為友毛詩常棣曰常棣燕兄弟也閔管蔡}
  - {type: variant, offset: 11, length: 0, content: '', krp: 母爲孝善兄弟爲友毛詩棠棣曰棠棣燕兄弟也閔管蔡}
  - {type: variant, offset: 12, length: 0, content: '', SBCK: 失道故作棠棣焉棠棣之華蕚不􅙽􅙽凡今之人莫如}
  - {type: variant, offset: 12, length: 0, content: '', WYG: 失道故作常棣焉常棣之華蕚不韡韡凡今之人莫如}
  - {type: variant, offset: 12, length: 0, content: '', krp: 失道故作棠棣焉棠棣之華蕚不􅙽􅙽凡今之人莫如}
  - {type: variant, offset: 13, length: 3, content: 妻為世, SBCK: 弟死䘮之威兄弟孔懷原隰襃矣兄弟求矣鶺鴒在原兄弟急難毎有良朋况也永歎兄弟䦧于牆外禦其侮每有良朋烝也無戎喪亂旣平旣安且寧雖有兄弟不如友生儐爾籩豆飲酒之飫兄弟旣具和樂且孺又何人斯曰伯氏吹塤仲氏吹箎􅁟曰塤竹曰箎云伯仲喻兄弟也又頍弁曰爾酒旣旨爾肴旣嘉箋云旨嘉皆羙也汝猶己羙矣汝餚巳羙矣何巳不同與族人燕也言其知能具其禮而弗爲之也豈伊異人兄弟匪他又氓曰兄弟不知咥其􅀏矣静言思之躬自悼矣又葛藟曰綿綿葛藟在河之漘終逺兄弟謂他人昆謂他人昆亦莫我聞又曰枤杜刺時也君不能親其宗族骨肉離散獨居而無兄弟將爲沃所并爾有枤之杜其葉湑湑獨行踽踽豈無他人不如我同父嗟行之人胡不比焉人無兄弟胡不佽焉有枤之杜其葉菁菁獨行睘睘豈無他人不如我同姓嗟行之人胡不比焉人無兄弟胡不佽焉又六月日四壯廢則君臣缺矣皇皇者華廢則忠信缺矣棠棣廢則兄弟缺矣又陟岵曰陟彼岡􅀆瞻望兄􅀆兄曰嗟予弟行役夙夜必偕上慎旃哉猶來無死又泉水曰嗟我兄弟􅀖人諸友莫肯念亂誰無父}
  - {type: page-break, offset: 13, content: '', id: KR3k0012_SBCK_514-2a}
  - {type: page-break, offset: 13, content: '', id: KR3k0012_SBCK_514-2b}
