  - {type: variant, offset: 48, length: 0, content: '', SBCK: 其粥人之母以葬其母也不可旣葬子碩欲以􅉠布之餘具􅀕器子栁曰不可吾聞之也君子不家於䘮請班諸兄弟之貧者周禮春官曰大宗伯之職以脤膰之禮親兄弟之國脤膰􅀕社稷宗廟之肉也賜以同姓之國同福禄也兄弟有共先王者也魯定公十四年天王使石尚來歸脤也儀禮醮辭曰􅈲酒旣清嘉薦亶時亶誠也古文亶爲癉始加元服兄弟具來孝友時格永乃保之左傳􅁊公曰宋穆公疾召大司馬孔父而属殤公焉曰先君舎與夷而立寡人寡人不敢忘􅀂以大夫之靈得保首領以殁先君􅀂問與夷其將何辤以對請子奉之以主社稷寡人雖死亦無悔焉對曰羣臣願奉馮也公曰不可先君以寡人爲賢使主社稷􅀂棄德不讓是廢先君之舉也豈曰能賢光昭先君之令德可不務乎吾子其無廢先君之功使公子馮出居于鄭杜預曰公子馮穆公子也穆公卒殤公即位又襄公曰宋向戍來聘且㝷盟見孟獻子尤其室曰子有令聞而羙其室非所望也對曰我在晉吾兄爲之毀之重勞且不敢間杜預曰傳言獻子友于兄且不隱其實也又曰文上曰穆伯如莒莅盟且爲襄仲逆及鄢登城見之美鄢城莒邑自爲娶之仲請攻之文公將許之叔仲惠伯諌惠伯叔子孫也曰臣聞之兵作於内爲亂於外爲冦冦猶及人亂自及也今臣作亂而君不禁以啓冦讎􅀂之何公止之惠伯成之平仁子也使仲舎之公孫敖反之還莒女也復爲兄弟如􅀄又文下曰齊人歸公孫敖之喪爲孟氏且國故也葬視共仲聲巳不視帷堂而􅂘襄仲欲勿􅂘惠伯曰䘮親之終也惠伯叔彭生也雖不能始善終可也史佚有言曰兄弟致美救乏賀善弔灾􅀕敬䘮哀情雖不同母絶其愛親之道也子無失道何怨於人襄仲􅀃帥兄弟以􅂘之又昭元曰􅁗后子有寵於􅁊如二君於景后子􅁗􅁊公子景公母地鍼也其權寵如兩君也其母曰弗去懼選鍼適晉具車千乘曰􅁗伯之弟鍼出奔晉罪􅁗伯也后子享晉侯造舟于河十里舎車自雍及絳歸取酬幣終事八反司馬侯問曰子之車盡於此而巳乎對曰此之謂多矣􅀂能少此吾何以得見焉又隠公曰鄭莊公弟共叔叚居京謂之京城太叔􅀕仲諌曰都城過百雉國之害也無使滋蔓蔓難圖也蔓草猶不可除况君之寵弟乎又襄二曰吴諸樊旣除䘮將立季札杜預曰札諸樊弟也辭曰曹宣公之卒也諸侯與曹人不義曹君將立子臧子臧去之遂弗爲也以成曹君君子曰能守節君義嗣也諸樊適子故曰義嗣誰敢干君有國非吾節也札雖不才願附於子臧以無失節固立之棄其室而耕乃舎之傳言季扎之讓且明吴兄弟相傳又曰兄弟天倫兄先弟後天之倫次論語曰周有八士伯逹伯适仲突仲忽叔夜叔夏季隨季騧包氏日周時仲乳生八子皆爲顯士故記之也又曰子路問曰何如斯可謂之士矣子曰切切偲偲怡怡如也可謂士矣朋友切切偲偲兄弟怡怡馬融曰切切偲偲切責之皃也怡怡和順之皃也又爲政曰或謂}
