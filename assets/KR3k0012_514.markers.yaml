  - {type: variant, offset: 1920, length: 297, content: 曰泉水衛女思歸也問我諸姑遂及伯姊父之姊妹稱姑先生曰姊箋云甯則又問姑及姊親其類也先姑後姊尊姑也禮記曲禮曰姑姊妹女子子已嫁而返兄弟不與同席而坐不與同器而食又檀弓曰姑姊妹之薄也蓋有受我而厚之者也左傳僖上曰初晉獻公筮嫁伯姬於秦遇歸妹之睽史蘇占之曰不吉歸妹睽孤寇張之弧姪其從姑六年其逋逃歸其國而棄其家明年其死於高梁之虛震為木離為火火從木生離為震妹於火為姑謂我姪者吾謂之姑謂子圍質於秦也漢書曰成帝班婕妤彪之姑也後漢書曰桓曄字文林姑為楊賜夫人父鸞卒姑赴哀將至止於傳舍整飾從者而後入曄心非之及姑勞問終無所言號哭而已賜遣吏祠因縣發取祠具曄拒不受後每至京師未嘗舍楊氏晉書曰阮孚母祖姑家胡婢也父咸通之生孚咸遺姑書曰不, SBCK: ''}
