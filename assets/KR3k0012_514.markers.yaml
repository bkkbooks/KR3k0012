  - {type: 'tls:seg', offset: 17, content: '', id: KR3k0012_CHANT_514-1a.5}
  - {type: variant, offset: 17, length: 0, content: '', SBCK: 又曰黄鳥刺宣王也刺其以隂禮敎親而不至聦兄弟之不固者也黄鳥黄鳥無集于桑無啄我梁此􅀖之人不可與明言旋言歸復我諸兄又斯干曰兄及弟矣式相好矣無相猶矣似續妣祖又行葦曰戚戚兄弟莫逺具爾或肆之筵或授之几又角弓曰角弓}
  - {type: variant, offset: 17, length: 0, content: '', WYG: 又曰黄鳥刺宣王也刺其以隂禮教親而不至聮兄弟之不固也黄鳥黄鳥無集於桑無啄我􅆝此邦之人不可與明言旋言歸復我諸兄又斯干曰兄及弟矣式相好矣無相猶矣又行葦曰戚戚兄弟莫逺具爾或肆之筵或授之几又角弓曰角弓}
