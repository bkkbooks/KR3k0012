  - {type: variant, offset: 278, length: 0, content: '', WYG: 為政又顔淵曰司馬牛憂曰人皆有兄弟鄭𤣥曰牛兄桓魋行惡䘮死故曰我亡兄弟我獨亡子夏曰商聞之矣死生有命富貴在天君子敬而無失與人恭而有禮四海之内皆兄弟也君子何患乎無兄弟也包氏君子䟽惡而友賢九州之人皆可以禮}
  - {type: variant, offset: 279, length: 0, content: '', WYG: 之史記曰伯夷叔齊孤竹君之二子}
  - {type: punctuation, offset: 280, content: ，, id: KR3k0012_CHANT_514-bkkpn96}
  - {type: 'tls:seg', offset: 280, content: '', id: KR3k0012_CHANT_514-2a.46}
  - {type: variant, offset: 280, length: 0, content: '', WYG: 父欲立叔齊及卒叔齊讓伯夷伯夷曰父命也遂逃去叔齊不肯立而亦逃之國人立其中子輙於是伯夷叔齊聞西伯善養老徃歸焉又曰信陵君無忌謂魏王曰秦與戎翟同俗有虎狼之心不顧親戚兄弟禽獸耳}
  - {type: page-break, offset: 280, content: '', id: KR3k0012_WYG_514-8b, image: WYG0897/WYG0897-0597b.png}
