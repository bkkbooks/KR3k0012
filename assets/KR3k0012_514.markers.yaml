  - {type: variant, offset: 300, length: 6, content: 許靖字文休汝, WYG: 漢五年漢王與項羽相距京索之間數使勞苦丞相蕭何鮑生謂丞相曰王暴衣露蓋數使勞苦君者有疑君心焉為君計遣君子孫昆弟能勝兵者悉謁軍所上必益信君於是何從其計漢王大恱又曰卜式者河}
