  - {type: variant, offset: 92, length: 1, content: 孔, SBCK: 伯夷叔齊􅀌竹君之二子也父欲立叔齊及卒叔齊譲伯夷伯夷曰父命也遂逃去叔齊亦不肯立而追之國人立其中子於是伯夷叔齊聞西伯昌養老徃歸焉又曰信陵君無忌謂魏王曰􅁗與戎翟同俗有虎狼之心不顧親戚兄弟禽獸耳故太后母也而以憂死穰侯舅也功莫大焉而竟逐之兩弟無罪而再奪之國此於親戚􅀂此而况於仇讎之國乎又曰漢五年漢王與項羽相距京索之間數使使勞苦丞相蕭何鮑生謂丞相曰王􅁀衣露盖數使勞苦君者有疑君心焉爲君計遣君子孫昆弟能勝兵者悉詣君所上必益信君於是何從其計漢王大􅀃又曰卜式者河南人也以田畜爲事親死式有少弟弟壯式脫身出分獨取畜羊百餘田宅財物盡與弟式入山牧十餘􅀊羊致千餘買田宅而其弟盡破其生式輙復分與弟者數矣又曰周公旦武王弟也及武王即位旦常輔翼武王用事居多又曰朱公居於陶中男殺人囚於楚朱公告其少子生徃視之乃裝黄金千鎰置􅄄噐中載以一牛車且遣其少子朱公長男請欲行不聽長男曰家有長}
