  - {type: variant, offset: 311, length: 4, content: 靖與曹公, SBCK: 官至封侯青􅀏曰人奴之生得無笞罵即幸矣何得封侯漢}
  - {type: variant, offset: 311, length: 1, content: 靖, WYG: 以田畜為事親死式有少弟弟壮式脫身出門分獨取畜羊百餘田宅財物盡}
  - {type: variant, offset: 311, length: 4, content: 靖與曹公, krp: 官至封侯青笑曰人奴之生得無笞罵即幸矣何得封侯漢}
  - {type: variant, offset: 313, length: 1, content: 曹, WYG: 弟式入山牧羊十餘嵗羊至千餘買其田宅而其弟盡破其産式輙復分與弟者數矣又曰周}
  - {type: variant, offset: 315, length: 0, content: '', WYG: 旦武王弟也及武王即位旦常輔翼武王用事居多又曰朱公居於陶中男殺人囚於楚朱公告其少弟生徃視之乃裝黄金千鎰置褐器中載以一牛車且遣其少子朱公長男請欲行不聽長男曰家有長子曰家督今弟有罪大人不遣乃遣少弟是吾不肖欲自殺其母為言公從之長男竟持其弟喪歸至其母及邑人盡哀之唯朱公獨笑曰吾固知必殺其弟也彼非不愛其弟也顧有所不能於心者也是少與我俱見苦為生難故重棄財至如少弟者生而見我富乗堅駈良逐狡兎豈知財所從來故輕棄之吾前日所以為欲遣少子固為其能棄財而長者不能故卒以殺其弟事之理也無足悲者吾固日已望其喪之來也又曰蒙恬弟毅仕至上卿出則驂乗入則御前蒙恬任外事而毅常為内謀名為忠信故雖諸将相莫敢與之爭焉又曰漢王滅項籍立為皇帝田横懼誅與其徒屬五百餘人入海居島中髙帝聞之以為田横兄弟本定齊齊人賢者多附焉乃使赦田横罪而召之田横與其客二人乗傳詣洛陽謂其客曰横始與漢王俱南面稱尊今漢王為天子而横乃為亡虜北面事之其恥固已甚矣且吾烹人之兄與弟併肩而事主縱彼畏天子詔不敢動我獨不愧於心乎遂自剄令客奉其頭從使者馳奏之髙帝曰嗟乎以匹夫起布衣兄弟三人更主豈不賢哉為之流涕又曰季布弟季心氣蓋闗中遇人謙謹為任俠方數千里士皆爭為之死當是時季布以諾季心以勇著聞又曰衛青為侯家人少時歸其父父使牧羊先母之子皆奴畜之不以為兄弟青常數至甘泉居室有一鉗徒相青曰貴人也官封侯青笑曰人奴之生得無笞罵即幸矣何得封侯漢}
