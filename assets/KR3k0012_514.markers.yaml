  - {type: variant, offset: 15, length: 1, content: 世, WYG: 之也豈伊異人兄弟匪他又氓曰兄弟不知咥其笑矣静言思之躬自悼矣又葛藟曰綿綿葛藟在河之漘終逺兄弟謂他人昆謂他人昆亦莫我聞又曰杕杜刺時也君不能親其宗族骨肉離散獨居而無兄弟将為沃所并爾有杕之杜其葉湑湑獨行踽踽豈無他人不如我同父嗟行之人胡不比焉人無兄弟胡不佽焉有杕之杜其葉菁菁獨行睘睘豈無他人不如我同姓嗟行之人胡不比焉人無兄弟胡不佽焉又六月曰四牡廢則君臣缺矣皇皇者華廢則忠信缺矣常棣廢則兄弟缺矣又陟岵曰陟彼岡兮瞻望兄兮兄曰嗟予弟行役夙夜必偕上慎旃哉猶來無死又沔水曰嗟我兄弟邦人諸友莫肯念亂誰無父}
