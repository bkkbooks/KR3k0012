  - {type: variant, offset: 2347, length: 221, content: 生而抱兄子對曰子之於母私愛也姪之於姑公義也夫背公而向私者妾不為也於是齊軍遂止曰魯郊有婦人猶持節行況於朝廷乎遂迴軍不伐魯君聞之賜束帛號曰義姑又曰梁宣節姑者梁之婦人也其室失火兄子與己子三人在內入取兄子輒得其子及火盛不復得入婦人將赴火其友曰本取兄子卒誤得己子至於中心亦已足矣何至赴火婦曰梁國豈可以戶告人曉也被不義之名何面見弟兄吾欲復投吾子又失母子之情誓不生遂赴火而死君子曰可謂節姑也先賢行狀曰蔡伯喈母袁曜卿之姑也又曰鍾元皓妻季膺之姑也生子覲與膺齊名, SBCK: 太平御覽卷第五百一十四}
