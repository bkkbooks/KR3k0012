  - {type: variant, offset: 3644, length: 0, content: '', WYG: 東南與墮和羅接去交阯三月餘行賓服於墮和羅其王姓察失利字婆郍土無蠶桑以白疊朝霞布為衣俗皆樓居謂為䦨干貞觀十八年遣使来朝二十一年又遣使獻白鸚鵡毛羽皓素頭上有紅毛數十莖與翅齊及婆律膏仍請馬及銅鍾詔並給之墮婆登國唐書曰墮婆登國在林邑南海行二月東與訶陵西與迷黎車接}
