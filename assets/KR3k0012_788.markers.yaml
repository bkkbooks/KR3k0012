  - {type: variant, offset: 3313, length: 0, content: '', WYG: 乃集其事為王㑹篇令萬國来朝至今如此軰章服實可圖冩今請撰為王㑹圖從之以其地為應州仍拜元深為刺史領黔州都督府又}
