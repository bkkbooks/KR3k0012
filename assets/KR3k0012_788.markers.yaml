  - {type: variant, offset: 3317, length: 4, content: 元嘉孝建, WYG: 公宋鼎卭州刺史謝汕音訕蠻州巴江縣令宋乃𫝊牂州録事參軍謝文經黔中經略招討觀察王礎奏前􅟢刺史三年一度朝今年懇訴稱州接牂牁同被聲教獨此排擯竊自慚耻謹遣隨牂牁刺史授官其牂牁兩州户口殷盛人力强}
