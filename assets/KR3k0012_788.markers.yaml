  - {type: variant, offset: 3311, length: 0, content: '', WYG: 隋書曰丹丹國在多羅摩羅國西北振州東}
  - {type: variant, offset: 3312, length: 0, content: '', WYG: 振州今延德郡朱崖同島山上王姓刹利名尸陵伽理所可二萬餘家亦置州縣以相統領王每晨夕二時臨朝其大臣八人號曰八座並以婆羅門為之王身衣朝霞足履皮屨近則乗輿逺則馭象其攻伐則吹蠡撃鼔兼有幡旗刑盗賊無多少皆殺之土出金銀白檀蘇方檳榔其糓唯稻畜有沙牛羖羊猪鷄鵞鴨麞鹿鳥有越鳥孔雀果蓏力果切有蒲桃石榴􅆶瓠菱蓮菜有葱蒜蔓菁東謝唐書曰東謝蠻其地在黔州之西數百里内南接守宫獠西連夷子北至蠻土宜五榖不以牛耕但為畬田每嵗一易俗無文字刻木為契散在山洞間依樹為層巢而居汲飲皆自營生業無賦稅之事謁見貴人皆執鞭而拜有功勞者以牛馬銅鼔賞之有犯罪者小事杖罰大事殺之盗物倍還其􅂍婚姻之禮以牛酒為聘女歸夫家皆母自送之女夫慙逃避經旬乃出讌聚則撃銅鼔吹大角歌舞以為樂好帶刀劒未嘗捨離丈夫衣服有衫襖大口袴以綿紬及布為之右肩上斜束皮帶裝以螺殻虎豹猿狖及犬羊之皮以為外飾坐皆蹲踞男女椎髻以緋向後垂下其首領謝元深既世為酋長其部落皆尊畏之謝氏一族法不育女自云姓髙不可下嫁故也貞觀三年元深入朝冠烏熊皮冠若今之旄頭以金銀絡額身披毛帔韋皮行縢而着履中書侍郎顔師古奏言昔周武時天下太平逺國歸欵周}
