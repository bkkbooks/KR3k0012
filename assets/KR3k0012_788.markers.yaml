  - {type: variant, offset: 3633, length: 1, content: 槃, SBCK: 陁}
  - {type: variant, offset: 3633, length: 2, content: 槃槃, WYG: 甘堂國在大海之南崑崙人也貞觀十年與未俱婆國同日朝貢太宗謂侍臣曰南夷西域自逺而至其故何也房𤣥齡對曰當中國乂安帝德逺被也太宗曰誠如公言向使中國不安何縁而至朕何德以堪之金毗利逝國唐書曰金毗利逝國在京西南四萬餘里東去致物國二千里西去赤土國一千五百里南去波利國三千里栁衢國三千里其國有城邑庭舍衣朝霞白疊每食先泥上鋪席而後座國王名本多揚牙前有隊仗甲鍪具多樹皮其風俗物産與真臘同墮和羅國唐書曰墮和羅國南與盤盤國北與迦邏舍佛東與真臘接西隣大海去髙州五月日行貞觀十三年其王遣使貢方物二十三年又遣使獻象牙火珠請賜好馬詔許之陁洹國唐書曰陁洹}
