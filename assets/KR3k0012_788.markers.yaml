  - {type: variant, offset: 2157, length: 593, content: 偏多棧沉婆律香其俗男女皆袒而披髮以古貝為于漫其王及貴臣乃加雲霞布覆胛以金繩為絡帶金環貫耳女子則布以纓絡繞身其國累塼為城重門樓閣王出乘象有幡毦旗鼓罩白蓋兵衛甚嚴國人說立國已四百餘年後嗣衰弱王族有賢者國人歸向之王聞乃加囚執其鏁無故自斷王以為神因不敢害乃逐出境遂奔天笁天笁妻以長女俄而狼牙王死大臣迎還為王二十餘年死子婆伽達多立天監十四年遣使阿撤多奉表婆利國南史曰婆利國在廣州東南海中洲上去廣州二月日行國界東西五十日行南北二十日行有一百三十六聚土氣暑熱如中國之盛夏穀一歲再熟草木常榮海出文螺紫貝有石名坩貝大硬其國人抱古貝如袍及為都縵乃用班絲者以瓔絡繞身頭著金長冠高尺餘形如牟綴以七寶之飾帶金裝劍偏坐金高座以金鐙支足侍女皆為金花雜寶之飾或持白毦拂及孔雀扇王出以象駕輿輿以雜香為之上施羽蓋珠簾導從吹螺擊鼓自古來通中國問其先及年數不能記自言白靜王夫人即其國女天監十六年遣使奉表獻金席等普通三年其王頻伽復遣使珠智獻白鸚鵡青蟲兜鍪琉璃器古具螺杯雜色香數十種隋書曰婆利國自交阯浮海南過赤土丹丹乃至其國國界西四月行南四十五日行王姓剎利耶伽名護濫那婆官曰獨訶邪拏次曰獨訶氏拏國人善投輪刀其大如鏡中有竅外鋒如鋸遠以投人無不中其餘兵器與中國略同俗類真臘物產同於林邑其殺人及盜截其手姦者鏁其足朞年而止祭祀必以月晦盤貯酒殽浮之流水每十一月必設大祭海出珊瑚有鳥名舍利解人語大業十二年遣使入貢後遂絕訶羅陁國南史曰訶羅陁國宋, WYG: ''}
