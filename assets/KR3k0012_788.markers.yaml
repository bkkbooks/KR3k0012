  - {type: variant, offset: 3441, length: 0, content: '', WYG: 屋壁皆以綵畫之城内皆王室城外人居可萬餘家王宿衛之士百餘人每臨朝則衣朝霞冠金冠耳挂金環頸挂金涎衣涎叙連切足履寶装皮履官屬有朝請將軍緫知國政又有參軍功曹主簿城局金威將軍賛理賛府等官分理文武又有州及郡縣州有參軍郡有金威將軍縣有城局焉其長官初至各選官僚助理政事刑法盗賊重者死輕者穿耳及頰私鑄銀錢者截腕}
