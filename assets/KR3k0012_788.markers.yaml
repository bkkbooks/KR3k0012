  - {type: variant, offset: 3645, length: 0, content: '', WYG: 界大海風俗與訶陵同種稻每月一熟有文字書於貝多葉其死者口實以金又以金釧貫於四肢然後加以婆律膏及檀沉龍腦等香積薪以焚之貞觀中遣使獻金花等物王之所居堅木為城造大屋重閣覆以㯶櫚皮所坐床悉以象牙為之亦以象牙為席食以手檈之音古患切又以椰樹花為酒飲之亦醉有山穴海湧而出鹽國人收食其國人有毒與常人同止宿即令身生瘡與之交㑹便死若涎液霑著草木即枯其人死身不臭不爛多蔑國唐書曰多蔑國貞觀時通焉在南海外界週廻可一月行南阻大海西但逰國北波利日國東貞陁桓國户口極多置三十州不役屬他國有城郭宫殿樓櫓並用瓦木以十二月為嵗首其物産有金銀鐡象牙犀角朝霞朝雲等布其俗交易用金銀朝霞等為賈百姓二十而稅一五榖菜蔬與中國不殊多摩國唐書曰多摩國長居國長居於海島東與婆鳳西與多隆南與半犮䟦華言五山也北與訶陵等國接其國界東西可一月行南北可二十五日行其王之先龍子也名骨利骨利得大鳥卵剖之得一女子容色殊妙即以為妻其王尸羅劬傭伊說即其後也顯慶中遣使貢獻其俗無姓王居以栅為城以板為屋坐師子座東向衣物}
