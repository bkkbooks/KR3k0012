  - {type: variant, offset: 3692, length: 26, content: 陁利宋起居注曰孝建二年八月二日斤陁利國王釋陁羅降陁遣, SBCK: 狀如水􅆩其頭身及他處了無毛唯從鼻上以竟脊至尾上有毛廣一寸許青}
  - {type: variant, offset: 3692, length: 11, content: 陁利宋起居注曰孝建二年, WYG: 狀如水獺其身頭及他處了無毛唯從鼻上以竟脊至尾上有毛廣一寸許青毛長三四分許其無毛處則如􅅊囊人張捕得之斬刺不傷積薪烈火縳以投火中薪盡而此獸不焦須以大竹杖打之皮不傷而骨碎都盡而死太平御覽卷七百}
