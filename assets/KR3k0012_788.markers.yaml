  - {type: variant, offset: 3327, length: 3, content: 貢獻梁, WYG: 入朝二十一年以其地置明州即以首領趙磨為刺史南平蠻唐書曰南平蠻北與涪州接部落四千餘户男子左袵露髪徒跣婦人横布兩幅穿}
