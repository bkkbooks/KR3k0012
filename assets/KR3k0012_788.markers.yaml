  - {type: variant, offset: 3323, length: 2, content: 中並, WYG: 南至西洱河洱音珥山洞阻深莫知道里南北十八日行東西二十三日行其風俗物産與東謝同首領趙氏世為酋長有户萬餘貞觀三年}
