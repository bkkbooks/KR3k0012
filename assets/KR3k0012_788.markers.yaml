  - {type: 'tls:seg', offset: 1702, content: '', id: KR3k0012_CHANT_788-14a.8}
  - {type: variant, offset: 1702, length: 3, content: 聞彼鄰, SBCK: 女夫慙逃避經旬乃岀讌聚則擊銅皷吹大角歌舞以爲樂好帶刀劒未常捨離丈夫衣服有衫襖大口袴以綿紬及布爲之右肩上斜束皮帶裝以螺蚾虎豹猿􅎜及犬羊之皮以爲外飾坐皆蹲踞男女椎髻以緋向後垂下其首領謝元􅀷旣丗爲酋長其部落皆尊畏之謝氏一族法不育女自云姓髙不可下嫁故也貞觀三年元􅀷入朝冠烏熊皮冠􅀂今之旄頭以金銀絡額身披毛帔韋皮行􅅬而著履中書侍郎顔師古奏言昔周武時天下太平逺國歸欵周史乃集其事爲王㑹篇令萬國來朝至今如此輩章服實可圖冩今請撰爲正㑹圖從之以其地爲應州仍拜元􅀷爲刺史􅀠黔州都督府又曰南謝首領謝強與西謝隣共元􅀷俱來朝見爲南壽州刺史後改爲莊州貞觀十三年正月西南畨大酋長蠻州刺史資陽郡開國公宋鼎卭州刺史謝汕音訕蠻州巴江縣令宋万傳牂州録事叅軍謝文經黔中經略招討觀察使王礎奏前件刺史三年一度朝今年懇訴稱州接牂牁同􅀍聲教獨此排擯􅀼自慙恥謹遣隨牂牁刺史授官其牂牁兩州户口殷盛人力強大隣側諸蕃悉皆敬憚請比兩州每三年一度朝賀仍依牂牁輪環差定并以才幹位望爲衆推者元勑從之西趙蠻唐書曰西趙蠻在東謝之南其界東至夷子西至昆明南至西洱河洱音珥山洞阻􅀷莫知道里南北十八日行東西二十三日行其風俗物産與東謝同首領趙氏丗爲酋長有户萬餘貞觀三年遣使入朝二十一年以其地置明州即以首領趙磨爲刺史南平蠻唐書曰南平蠻北與涪州接部落四千餘户男子左祍露髪徒跣婦人横布兩幅穿中而貫其首名爲通裙其人美髪爲髻髾垂於後以竹筒如筆長三四寸斜貫其耳貴者亦有珠璫土}
