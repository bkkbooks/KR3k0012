  - {type: variant, offset: 3462, length: 0, content: '', WYG: 掩面死家殺牛親屬以猪酒相遺共飲噉而瘞之死後十日而大塟必集親賓殺馬動至十數匹立其祖父神而事之其俗以皮為㡌形圓如鉢或戴羃䍦衣多毛毼皮裘剥牛脚皮為靴項繫鐵鎻手貫鐵釧王與酋帥金首飾胸前懸一金花徑三寸其土髙氣候凉多風少雨土宜小麥青􅀈山出銀多白雉水有嘉魚長四尺而鱗細大業四年其王遣使素福等八人入朝明年又遣其弟子宜林率嘉良夷六十人朝貢欲獻良馬以路險不通請開山道脩職貢煬帝以勞人不許嘉良有水濶六七十丈附國有水濶百餘丈並南流用皮為舟而濟邊斗四國隋書曰邊斗國一云班斗都昆國一作都推拘利國一作九稚比嵩國並扶南度金陵大灣南行三千里有此四國其農作與金陵同其人多白色都昆出好棧香藿香及琉黄其藿香樹生千嵗根本甚大伐之四五年木皆朽敗唯中節堅真芬香獨存取為香殊柰國唐書曰貞觀二年殊柰國遣使貢方物殊柰者崐崙人也在林邑南去}
