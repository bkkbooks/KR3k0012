  - {type: punctuation, offset: 1685, content: 『, id: KR3k0012_CHANT_788-bkkpn377}
  - {type: variant, offset: 1685, length: 1, content: 此, SBCK: 丹丹國在多羅摩羅國西北振州東南振州今廷德郡朱雀同島上王姓刹利名尸陵伽理所可二萬餘家亦置州縣以相統領王每晨夕二時臨朝其大臣八人号曰八座並以婆畢朝其之王毎以香粉􅂗身冠通天冠掛􅄂宝瓔珞身衣朝霞足履皮屨近則乗輿逺則馭象其攻伐則吹蠡擊皷兼有幡旗其刑盗賊無多少皆殺之土出金銀白檀􅂫方㯽榔其榖唯稻畜有沙牛羖羊猪雞鵝鴨麞鹿鳥有越鳥孔雀果蓏力果切有蒲桃石榴􅀲瓠菱蓮菜有䓤䔉蔓菁東謝唐書曰東謝蠻其地在黔州之西數百里内南接守宫獠西連夷子北至白蠻土冝五􅂖不以牛耕但爲畬田毎歳一易俗無文字刻木爲契散在山洞間依樹爲層巢而居汲流以飲皆自營生業無賦稅之事謁見貴人皆執鞭而拜有功勞者以牛馬銅皷賞之有犯罪者}
  - {type: page-break, offset: 1685, content: '', id: KR3k0012_SBCK_788-3a}
  - {type: variant, offset: 1685, length: 1, content: 此, krp: 丹丹國在多羅摩羅國西北振州東南振州今廷德郡朱雀同島上王姓刹利名尸陵伽理所可二萬餘家亦置州縣以相統領王每晨夕二時臨朝其大臣八人号曰八座並以婆畢朝其之王毎以香粉塗身冠通天冠掛雜宝瓔珞身衣朝霞足履皮屨近則乗輿逺則馭象其攻伐則吹蠡擊皷兼有幡旗其刑盗賊無多少皆殺之土出金銀白檀蘇方㯽榔其榖唯稻畜有沙牛羖羊猪雞鵝鴨麞鹿鳥有越鳥孔雀果蓏力果切有蒲桃石榴瓜瓠菱蓮菜有䓤䔉蔓菁東謝唐書曰東謝蠻其地在黔州之西數百里内南接守宫獠西連夷子北至白蠻土冝五糓不以牛耕但爲畬田毎歳一易俗無文字刻木爲契散在山洞間依樹爲層巢而居汲流以飲皆自營生業無賦稅之事謁見貴人皆執鞭而拜有功勞者以牛馬銅皷賞之有犯罪者}
