  - {type: 'tls:seg', offset: 1683, content: '', id: KR3k0012_CHANT_788-14a.4}
  - {type: variant, offset: 1683, length: 206, content: 詔曰此小乘經甚少彼國所有皆可悉為寫送之聞彼鄰多有師子此所未覩可悉致之法顯記曰師子國本旡人正有鬼神及龍居之諸國商人來共市易鬼神自現身但出寶物顯其時直商人則依價直取物諸國人文其土樂悉亦復來於是遂成大國和適無冬夏之異草木常茂田種隨人無有時節毗加梨國宋元嘉起居注曰五年天笁毗加梨國王月遣使上表并奉金剛指環一枚剛印摩勒金環一枚毾㲪一具白旃檀六叚白赤鸚鵡各一頭細疊兩張干陁利國南史曰干陁利國在南海洲上其俗與林邑扶南略同出班布, WYG: 火齊珠}
