  - {type: variant, offset: 2730, length: 192, content: 年遣使入貢後遂絕訶羅陁國南史曰訶羅陁國宋元嘉七年遣使奉表曰伏承聖主重三寶興立塔寺周滿國界今故遣使二人表此微心呵羅單國宋元嘉起居注曰去年六月闍婆洲呵羅單國王毗沙跋摩遣使獻奉又曰十一年呵羅單國王尸梨毗遮耶獻銀滲柈等南史曰呵羅單國都闍婆洲元嘉七年遣使獻金剛指環鸚鵡鳥天笁國白疊等物十年呵羅單國王毗沙跋摩奉表曰常勝天子陛下諸佛世尊常樂安穩三達六通為世間尊是名如來是故至誠五體敬禮其後與子所篡奪, SBCK: ''}
