  - {type: variant, offset: 3443, length: 0, content: '', WYG: 賦稅俱隨意貢奉無多少之限多以農商為業國人乗象及馬一國之中馬不過千匹又無鞍轡唯以䋲穿頰為之節制音樂則吹蠡撃鼔死喪則祠祀哭泣又焚屍以甖盛之沉於水中若父母之喪則截髪為孝其國市六所貿易皆用銀錢小如榆莢有佛道有學校文字與中夏不同訊其耆老云王無姓名齊杖摩王所坐塔圓似佛塔以金飾之門皆東向坐亦東向唐書曰貞觀中投和國遣使奉表以金函盛之又獻金榼若盍及金鎻寶帶犀象海物等數十品附國隋書曰附國者蜀郡西北二千餘里即漢之西南夷也有嘉良夷即其東部所居種姓自相率領土俗與附國同言語少殊不相統一其人無姓氏附國王字宜繒其國南北八百里西千五百里無}
