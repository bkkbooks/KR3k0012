  - {type: variant, offset: 2540, length: 0, content: '', SBCK: 凾盛之又献金榼苦盍反金鎻寳帶犀象海物等數十品附國隋書曰附國者蜀郡西北二千餘里即漢之南夷也有嘉良夷即其東部所居種姓自相率領土俗與附國同言語少殊不相統一其人無姓氏附國王字冝繒其國南北八百里西千五百里無城柵近川谷傍山險俗好復讎故疊石而居以避其患髙至十餘丈下至五六丈每級丈餘以木隔之基方三四歩其上方二三歩狀似浮圖於下級開小門從内上通夜必􅀜閉以防賊盗國有二萬家号令自王岀嘉良夷政令擊之酋師重罪者死輕者罰牛人皆輕捷便擊劒􅃮皮爲牟甲弓長六尺以竹爲弦妻其群母及其㛐兒弟死父兄亦納其妻好歌舞皷吹長笛有死者無服制置屍髙牀之上沐浴衣服􅀍以牟甲覆以獸皮子孫不哭帶甲舞劒而呼云我父爲􅀑所取我欲報􅁈殺􅀑自餘親戚哭三聲而止婦人哭必以兩手掩面死家殺牛親属以猪酒相遺共飲噉而瘞之死後十曰而大葬必集親賔殺馬動至數十疋立其祖父神而事之其俗以皮爲帽形圎如鉢或戴􅇈䍦衣多毛毼皮裘爲靴頂繫䥫鎻手貫䥫釧王與酋師金爲飾胷前懸一金花徑三寸其土髙氣候凉多風少雨土冝小麥青科山岀銀銀多白雉水有嘉魚長四尺而鮮細大業四年其王遣使素福等八人入朝明年又遣其弟子冝林率嘉良夷六十人朝貢欲献良馬以路險不通請開山道脩職貢煬帝以勞人不許嘉良有水闊六七十丈附國有水闊百餘丈並南流用皮爲舟而濟邊斗四國隋書曰邊斗國一云班斗都昆國一作都雅拘利國一作九雅比嵩國並扶南度金隣大灣􅀯行三千里有此國其農作與金隣同其人多白色都昆出好棧香藿香及硫黃其藿香樹生千歳根本甚大伐之四五年木皆朽敗唯中節堅貞芬香獨存取爲香殊奈國唐書曰貞觀二年殊奈國遣使貢方物殊奈者崑崙人也在林邑南去交阯海行三月餘日俗習文字與婆羅門同路絶逺古未常朝中國至是始通甘堂國唐書曰甘堂國在大海之南崑崙人也貞觀十年與未俱婆國同日朝貢太宗謂侍臣曰南荒西城自逺而至其故何也房玄齡對曰當中國人安帝德逺􅀍也太宗曰誠如公言向使中國不安何縁至朕何德以堪之金利毗逝國唐書曰金利毗逝國在京西南四萬餘里東去致物國二千里西去赤土國一千五百里南去波利國三千里柳衢國三千里其國有城邑庭舎衣朝霞白疊毎食先泥上鋪}
