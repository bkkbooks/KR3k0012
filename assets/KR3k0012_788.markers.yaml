  - {type: variant, offset: 3314, length: 2, content: 槃槃, WYG: 南謝首領謝强與西隣謝元深俱来朝見為南夀州刺史後改為莊州貞元十三年正月西南畨大酋長蠻州刺史資陽郡開}
