  - {type: variant, offset: 3687, length: 1, content: 來, WYG: 朝}
  - {type: variant, offset: 3688, length: 0, content: '', SBCK: 朝二十一年又遣使獻白鸚鵡毛羽皓素頭上有紅毛數十莖與翅齊及婆律膏仍請馬及銅鍾詔並給之墮婆登國唐書曰墮婆登國在林邑􅀯海行二月東與訶陵西與迷􅀺車接北界大海風俗與訶陵同種稻毎月一熟有文字書於貝多葉其死者口實以金又以金釧貫於四支然後加以婆律膏及檀沉龍腦等香積薪以燔之貞觀中遣使獻金花等物王之所居堅木爲城造大屋重閣覆以㯶櫚皮所坐床悉以象牙爲之亦以象牙爲席食以手檈之音古患反又以椰樹花爲酒飲之亦醉有山穴海湧而出鹽國人取食其國人有毒與常人同止􅀫即令身生瘡與之交㑹便死􅀂涎液霑著草木即枯其人身死不臭不爛多蔑國唐書曰多蔑國貞觀時通焉在南海外國界周廻可一月行南阻大海西俱遊國北波利利刺國東真陁桓國户口極多置三十州不役属他國有州郭宫殿樓櫓並用瓦木以十二月爲歳其物産有金銀銅鐵象牙犀角朝霞朝雲等布其俗交易用金銀朝霞等爲賈百姓二十而稅一五榖菜􅂼與中國不殊多摩國唐書曰多摩國長居國長居於海島東與婆鳯西與多隆南與半反䟦華言五山也北與訶陵等國接其國界東西可一月行南北可二十五日行其王子先龍子也名骨利骨利得大鳥􅆑剖之得一女子容色殊妙即以爲妻其王尸羅劬傭伊􅀃即其後也顯慶中遣使}
  - {type: page-break, offset: 3688, content: '', id: KR3k0012_SBCK_788-7b}
  - {type: page-break, offset: 3688, content: '', id: KR3k0012_SBCK_788-8a}
  - {type: variant, offset: 3688, length: 0, content: '', krp: 朝二十一年又遣使獻白鸚鵡毛羽皓素頭上有紅毛數十莖與翅齊及婆律膏仍請馬及銅鍾詔並給之墮婆登國唐書曰墮婆登國在林邑南海行二月東與訶陵西與迷黎車接北界大海風俗與訶陵同種稻毎月一熟有文字書於貝多葉其死者口實以金又以金釧貫於四支然後加以婆律膏及檀沉龍腦等香積薪以燔之貞觀中遣使獻金花等物王之所居堅木爲城造大屋重閣覆以㯶櫚皮所坐床悉以象牙爲之亦以象牙爲席食以手檈之音古患反又以椰樹花爲酒飲之亦醉有山穴海湧而出鹽國人取食其國人有毒與常人同止宿即令身生瘡與之交㑹便死若涎液霑著草木即枯其人身死不臭不爛多蔑國唐書曰多蔑國貞觀時通焉在南海外國界周廻可一月行南阻大海西俱遊國北波利利刺國東真陁桓國户口極多置三十州不役属他國有州郭宫殿樓櫓並用瓦木以十二月爲歳其物産有金銀銅鐵象牙犀角朝霞朝雲等布其俗交易用金銀朝霞等爲賈百姓二十而稅一五榖菜𬞞與中國不殊多摩國唐書曰多摩國長居國長居於海島東與婆鳯西與多隆南與半反䟦華言五山也北與訶陵等國接其國界東西可一月行南北可二十五日行其王子先龍子也名骨利骨利得大鳥卵剖之得一女子容色殊妙即以爲妻其王尸羅劬傭伊說即其後也顯慶中遣使}
  - {type: variant, offset: 3689, length: 0, content: '', SBCK: 獻其俗無姓王居以稱爲城以板爲屋坐師子座東向衣物與林邑同勝兵二萬人無馬有弓刀甲矟婚姻無同姓之别其食器銅鐡金銀所食尚酥乳駱沙糖石􅁡其家畜有羖水牛野獸有麞鹿等死亡無䘮紀之制以火焚其屍其音樂略同天竺有波郍婆宅護􅃒􅍕磨石榴等菓多甘蔗從其國經薛盧都思訶盧林邑等國逹於交州哥羅舎分國唐書曰哥羅舎分國在南海之南接墮和羅勝兵二萬人其王蒲越伽摩顯慶五年遣使朝貢杜薄國唐書曰杜薄國在扶南東漲海中直渡海數十日至其人色白晢皆有衣服國有稻田女子作白疊華布出金銀䥫以金爲錢出雞舌香可含以香不入服雞舌其爲水也氣辛而性厲禽獸不能至故未可識其樹者華熟自零隨水而出}
  - {type: page-break, offset: 3689, content: '', id: KR3k0012_SBCK_788-8b}
  - {type: variant, offset: 3689, length: 0, content: '', WYG: 杜薄國唐書曰杜薄國在扶南東漲海中直渡海數十日至其人色白晢皆有衣服國有稻田女子作白疊華布出金銀鐡以金為錢出鷄舌香可含以香不入服鷄舌其為木也氣辛而性厲禽獸不能至故未有識其樹者華熟自零隨水而出}
