  - {type: variant, offset: 1891, length: 216, content: 檳榔特精為諸國之極宋孝武世王釋婆羅郍鄰陁遣長史笁留陁獻金銀寶器梁天監元年其王瞿曇脩跋陁羅以四月八日夢一僧謂曰中國今有聖主十年後佛法大興汝若遣使貢奉禮敬則土地豐樂商旅百倍若不信我則竟土不得自安初未之信既而又夢此僧曰汝若信我我當與汝往觀乃於夢中至中國拜覲天子既覺心異之陁羅本工畫乃寫夢中所見武帝容資飾以丹青仍遣使并畫工奉表獻玉盤等物使人既至摸寫帝形以還其國比本畫則符同焉因盛以寶函日加禮敬後跋陁死子毗針耶跋摩立遣長史毗員跋摩奉表獻金芙蓉, WYG: ''}
