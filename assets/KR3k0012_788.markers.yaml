  - {type: variant, offset: 3689, length: 0, content: '', krp: 獻其俗無姓王居以稱爲城以板爲屋坐師子座東向衣物與林邑同勝兵二萬人無馬有弓刀甲矟婚姻無同姓之别其食器銅鐡金銀所食尚酥乳駱沙糖石蜜其家畜有羖水牛野獸有麞鹿等死亡無䘮紀之制以火焚其屍其音樂略同天竺有波郍婆宅護遮奄磨石榴等菓多甘蔗從其國經薛盧都思訶盧林邑等國逹於交州哥羅舎分國唐書曰哥羅舎分國在南海之南接墮和羅勝兵二萬人其王蒲越伽摩顯慶五年遣使朝貢杜薄國唐書曰杜薄國在扶南東漲海中直渡海數十日至其人色白晢皆有衣服國有稻田女子作白疊華布出金銀䥫以金爲錢出雞舌香可含以香不入服雞舌其爲水也氣辛而性厲禽獸不能至故未可識其樹者華熟自零隨水而出}
  - {type: variant, offset: 3690, length: 1, content: 物, SBCK: 得之杜薄洲有十餘國城皆稱王烏篤國唐書曰烏篤國在中天竺南一名烏伏郍地方五千餘里百姓殷實人性愞弱頗詭詐尤工禁術篤信佛法文字禮儀略同天笁自古不通中國貞觀中其王逹摩因陁訶斯遣使献龍腦麝香等薄刺洲唐書曰薄刺洲隋時聞焉在拘利南海灣中其人色黒而齒白眼正赤男女並無衣服一名勃焚洲抱朴子云勃焚洲在薫縁水􅑟所出楓脂矣所以不可多得者正患狤握獸啖人狤音詰偓音屋此獸大者重十}
