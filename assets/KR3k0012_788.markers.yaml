  - {type: variant, offset: 2751, length: 438, content: 嘉七年遣使奉表曰伏承聖主重三寶興立塔寺周滿國界今故遣使二人表此微心呵羅單國宋元嘉起居注曰去年六月闍婆洲呵羅單國王毗沙跋摩遣使獻奉又曰十一年呵羅單國王尸梨毗遮耶獻銀滲柈等南史曰呵羅單國都闍婆洲元嘉七年遣使獻金剛指環鸚鵡鳥天笁國白疊等物十年呵羅單國王毗沙跋摩奉表曰常勝天子陛下諸佛世尊常樂安穩三達六通為世間尊是名如來是故至誠五體敬禮其後與子所篡奪十三年又上表二十六年文帝詔曰呵羅單國婆皇婆達三國頻越遐海款化納貢遠誠宜甄可並加除授乃遣使策命之二十九年又遣長史婆和沙彌獻方物蒲黃國宋元嘉起居注曰二十六年蒲黃國獻牛黃等物又獻鬱金香等物婆皇國南史曰婆皇國元嘉二十六年國王舍利婆羅跋摩遣使獻方物四十一種文帝策命之為婆皇國王二十八年復遣使貢獻孝武孝建三年又遣長史笁郍婆智奉表獻方物以郍婆智為振威將軍大明三年獻赤白鸚鵡大明八年明帝泰始二年又遣使貢獻明帝以其長史笁須羅遠前長史振威將軍笁郍婆智並為龍驤將軍婆達國南史曰婆達國元嘉二十六年國王舍利不陵伽跋摩遣使獻方物文帝策命之為婆達國王二十六年二十八, WYG: ''}
