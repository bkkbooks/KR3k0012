  - {type: punctuation, offset: 2987, content: 《, id: KR3k0012_CHANT_788-bkkpn686}
  - {type: variant, offset: 2987, length: 643, content: 宋元嘉起居注曰二十六年蒲黃國獻牛黃等物又獻鬱金香等物婆皇國南史曰婆皇國元嘉二十六年國王舍利婆羅跋摩遣使獻方物四十一種文帝策命之為婆皇國王二十八年復遣使貢獻孝武孝建三年又遣長史笁郍婆智奉表獻方物以郍婆智為振威將軍大明三年獻赤白鸚鵡大明八年明帝泰始二年又遣使貢獻明帝以其長史笁須羅遠前長史振威將軍笁郍婆智並為龍驤將軍婆達國南史曰婆達國元嘉二十六年國王舍利不陵伽跋摩遣使獻方物文帝策命之為婆達國王二十六年二十八年復遣使獻方物闍婆達國南史曰闍婆達國元嘉中國王師利婆達呵阿陁羅跋摩遣使奉表曰宋國大主大吉天子足下教化一切種智安穩天人師降伏四魔成等正覺轉道法輪度脫眾生我雖在遠亦霑靈潤槃槃國宋起居注曰孝建二年七月二十日槃槃國王遣長史笁伽藍婆奉獻金銀琉璃諸香藥等物南史曰槃槃國元嘉孝建大明中並遣使貢獻梁中大通元年四年其王使使奉表累送佛牙及畫塔獻沉檀等香數十種六年八月復遣使送菩提國舍利及畫塔國圖并菩提樹葉詹糖等香梁書曰槃國南海大洲中北與林邑隔小海自交州舩行四十日至其國王曰楊栗翨音翅栗翨父曰楊德武連以上無得而紀百姓多緣水而居國無城皆豎木為柵王坐金龍床每坐諸大人皆兩手交抱肩而跪及其國多有婆羅門自天竺來就王乞財物王甚重之其大臣曰勃郎索濫次曰崑崙帝也次曰崑崙勃和音胡臥切次曰崑崙勃帝索甘且其言崑崙古龍聲相近故或有謂為古龍者其在外城者曰郍延猶中夏刺史縣令其矢多以石為鏇矟則以鐵為刃有僧尼寺十所僧尼讀佛經皆食肉而飲酒亦有道士寺一所道士不飲食酒肉讀阿脩羅王經其國不甚重之俗皆呼僧為比丘呼道士為貪隋大業中亦遣使朝貢, SBCK: ''}
