  - {type: variant, offset: 554, length: 685, content: 阯以甘蔗作酒雜以紫瓜根酒色黃赤味亦香美亦名椰漿為酒又曰煬帝即位募能通絕約域者大業三年屯田主事駿虞部主事王君政等請使赤土帝大悅賜駿等帛各百疋時服一襲遣齎物五千叚以賜赤土王其年十月駿等自南海郡乘舟晝夜二旬每值便風至焦石山而過東南泊陵伽鉢拔多洲西與林邑相對上有祠神焉又南行至師子石自是島嶼連接又行二三日西望見狼牙須國之山於是南達雞籠島至於赤土之界其王遣使婆羅門鳩摩羅以舶三十艘來迎吹蠡擊鼓以樂隨使進金鏁以纜駿舩月餘至其都王遣其子郍耶迦請與駿等禮見先遣人送金盤貯香花并鏡鑷金合二枚貯香油金瓶八枚貯香水白疊布四條以擬供使者盥洗將象二頭持孔雀蓋以迎使人并致金花盤以藉詔函男女百人奏蠡鼓婆羅門二人導路至王宮宣詔訖引駿等坐奏天笁樂事畢駿等還館又遣人送食以草葉為盤其大方丈後請駿等入宴王前設兩床床上並設草葉盤方一丈五尺上有黃白紫赤四色之餅牛羊魚鱉豬蝳蝐之肉百餘品延駿升床從者坐於地席各以金鍾置酒女樂迭奏禮遺甚厚尋遣郍邪迦隨駿貢方物既入海見綠魚群飛水上浮海上十餘日至林邑東南並蒲浪北山而行其海水闊千餘步色黃氣腥舟行一日絕云是大魚糞也循海北岸達于交阯至六年春與郍耶迦於弘農謁帝帝大悅賜物及官賞各有差蒲羅中國吳時康泰為中郎表上扶南土俗曰拘利正東行極崎頭海邊有居人人皆有尾五六寸名蒲羅中國其俗食人優鈸國康泰扶南土俗曰優鈸國者在天笁之東南可五千里國土熾盛城郭珍玩謠俗與笁司橫趺國康泰扶南土俗曰橫趺國在優鈸之東南城郭饒樂不及優鈸也北攎國康泰扶南土俗曰諸薄之東南有北攎洲出錫轉賣與外徼馬五洲康泰扶南土俗曰諸薄之東有五洲出鷄舌香樹木多華少實薄歎洲康泰扶南土俗曰諸薄之西北有薄歎洲土地出金常以採金為業轉賣與, SBCK: 州}
