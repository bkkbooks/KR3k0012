  - {type: variant, offset: 3690, length: 1, content: 物, WYG: 得之杜薄洲有十餘國城皆稱王烏篤國唐書曰烏篤國在中天竺南一名烏伏邦地方五千餘里百姓殷實人性懦弱頗詭詐尤工禁術篤信佛法文字禮儀畧同天竺自古不通中國貞觀中其王逹摩因陀訶斯遣使獻龍腦香薄刺洲唐書曰薄刺洲隋時聞焉在拘利南海蠻中其人色黑而齒白眼正赤男女並無衣服一名㪍焚洲抱朴子云㪍焚洲在南海中薰緑水膠所出膠如楓脂所以不可多得者止患狤􅠝音吉屈獸啖人此獸大者重十}
