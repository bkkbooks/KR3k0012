  - {type: variant, offset: 3322, length: 0, content: '', WYG: 隣側諸蕃悉皆敬憚請比兩州每年一度朝賀仍依牂牁輪環差定并以才幹位望為衆推者充𠡠從之西趙蠻唐書曰西趙蠻在東謝之南其界東至夷子西至昆}
