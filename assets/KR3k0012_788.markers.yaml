  - {type: variant, offset: 14, length: 291, content: 之別種也在南海中水行百餘日而達所都土色赤因以為號陳婆羅剌國西婆羅婆國南訶羅旦國北巨大海地方數千里其王姓瞿曇氏名利富多塞不知有國近遠稱其父釋王位出家為道傳位於利富多塞在位十六年矣有三妻並鄰國王之女也居僧袛城有門三重相去各百許步每門圖畫仙人菩薩之像懸金花鈴毦婦女數十人或奏樂或捧金花又飾四婦人容飾如佛塔邊金剛力士之狀夾門而立門外者持兵杖門內者執白拂夾道垂素網綴花王宮諸屋悉是重閤北戶北面而坐坐三重之榻衣朝霞布冠金花冠垂雜寶瓔珞四女子立侍左右兵衛百餘人王榻後作一龕以金銀五香木雜鈿之龕後懸一金光焰夾榻又樹二金鏡鏡前首陳金甕甕前各有金香爐當前置一金伏牛牛前樹一寶蓋蓋左右皆有寶扇婆羅門等數百, SBCK: 頓遜}
  - {type: variant, offset: 14, length: 1092, content: 之別種也在南海中水行百餘日而達所都土色赤因以為號陳婆羅剌國西婆羅婆國南訶羅旦國北巨大海地方數千里其王姓瞿曇氏名利富多塞不知有國近遠稱其父釋王位出家為道傳位於利富多塞在位十六年矣有三妻並鄰國王之女也居僧袛城有門三重相去各百許步每門圖畫仙人菩薩之像懸金花鈴毦婦女數十人或奏樂或捧金花又飾四婦人容飾如佛塔邊金剛力士之狀夾門而立門外者持兵杖門內者執白拂夾道垂素網綴花王宮諸屋悉是重閤北戶北面而坐坐三重之榻衣朝霞布冠金花冠垂雜寶瓔珞四女子立侍左右兵衛百餘人王榻後作一龕以金銀五香木雜鈿之龕後懸一金光焰夾榻又樹二金鏡鏡前首陳金甕甕前各有金香爐當前置一金伏牛牛前樹一寶蓋蓋左右皆有寶扇婆羅門等數百人東西重行相向而坐其官有薩陁迦邏一人陁拏達又二人迦利密迦三人共掌政事俱羅末帝一人掌刑法每城置郍耶迦一人鉢帝十人其俗皆穿耳剪髮無跪拜之禮以香油塗身敬佛尤重婆羅門婦人作髻於項後男女通以朝霞朝雲雜色布為衣豪富之室恣意華靡唯金鏁非王賜不得服用每婚嫁擇吉曰女家先期五日作樂飲酒父執女手以授壻七日乃配焉既娶則分財別居唯幼子與父同居父母兄弟死則剔髮素服就水上構竹為棚棚內積薪以屍置上燒香建幡吹蠡擊鼓以送之縱火焚薪遂落於水貴賤皆同唯國王燒訖收灰貯以金瓶藏於廟屋冬夏常溫雨多霽少種植無時特宜稻穄白豆黑麻自餘物產多同交阯以甘蔗作酒雜以紫瓜根酒色黃赤味亦香美亦名椰漿為酒又曰煬帝即位募能通絕約域者大業三年屯田主事駿虞部主事王君政等請使赤土帝大悅賜駿等帛各百疋時服一襲遣齎物五千叚以賜赤土王其年十月駿等自南海郡乘舟晝夜二旬每值便風至焦石山而過東南泊陵伽鉢拔多洲西與林邑相對上有祠神焉又南行至師子石自是島嶼連接又行二三日西望見狼牙須國之山於是南達雞籠島至於赤土之界其王遣使婆羅門鳩摩羅以舶三十艘來迎吹蠡擊鼓以樂隨使進金鏁以纜駿舩月餘至其都王遣其子郍耶迦請與駿等禮見先遣人送金盤貯香花并鏡鑷金合二枚貯香油金瓶八枚貯香水白疊布四條以擬供使者盥洗將象二頭持孔雀蓋以迎使人并致金花盤以藉詔函男女百人奏蠡鼓婆羅門二人導路至王宮宣詔訖引駿等坐奏天笁樂事畢駿等還館又遣人送食以草葉為盤其大方丈後請駿等入宴王前設兩床床上並設草葉盤方一丈五尺上有黃白紫赤四色之餅牛羊魚鱉豬蝳蝐之肉百餘品延駿升床從者坐於地席各以金鍾置酒女樂迭奏禮遺甚厚尋遣郍邪迦隨駿貢方物既入海見綠魚群飛水上浮海上十餘日至林邑東南並蒲浪北山而行其海水闊千餘步色黃氣腥舟行一日絕云是大魚糞也循海北岸達于交阯至六年春與郍耶迦於弘農謁帝帝大悅賜物及官賞各有差蒲羅中國吳時康泰為中郎表上扶南土俗曰拘利正東行極崎頭海邊有居人人皆有尾五六寸名蒲羅中國其俗食人優鈸國康泰扶南土俗曰優鈸國者在天笁, WYG: 頓遜}
