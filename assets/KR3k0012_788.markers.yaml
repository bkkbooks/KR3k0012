  - {type: variant, offset: 3460, length: 0, content: '', WYG: 輕捷撃劒漆皮為牟甲弓長六尺以竹為弦妻其羣母及其嫂兒弟死父兄亦納其妻好歌舞鼓簧吹長笛有死者無服制置屍髙牀之上沐浴衣服被以牟甲覆以獸皮子孫不哭帶甲舞劒而呼云我父為鬼所取我欲報寃殺鬼自餘親戚三聲而止婦人哭必以}
