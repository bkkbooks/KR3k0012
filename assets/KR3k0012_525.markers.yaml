  - {type: variant, offset: 4103, length: 0, content: '', krp: 而祠於忌太一壇旁漢書曰髙祖沛公祠黄帝祭蚩尤於沛庭而釁鼔旗幟皆赤又曰髙祖微時聞魏公子賢及即位毎過大梁常祀公子髙祖十二年從擊黥布還爲公子置守冢歳四時奉祀公子矣又張子房從髙帝過濟北果得榖城山下黄石取而葆祠之及留侯死并葬黄石冢伏臘祠黄石留侯又郊祠志曰文帝下詔曰有異物之神見于成紀無害於民歳以有年朕親郊祀上帝諸神禮官議無諱以朕勞有司禮官曰古}
