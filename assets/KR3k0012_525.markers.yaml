  - {type: variant, offset: 2077, length: 1017, content: 風師雨師禋之言煙也周人尚臭煙氣之臭聞者也楢積也詩曰芃芃棫樸薪之楢之三祀皆積柴實牲體焉或有玉帛燔柴而升煙所以報陽也以血祭祭社稷五祀五嶽以理沉祭山林川澤以副辜祭四方百物不言祭地此皆地祇祭地可知也陰祀自血起貴氣臭也社稷土穀之神也有德者配食凡祭祀大神享大鬼享祭大祇帥執事而卜日宿視滌濯涖玉鬯省牲鑊奉玉齊詔大號治其大禮詔相王之大禮執事諸有事於祭者也宿申式也滌濯溉祭器也若王不與祭祀則攝位王有故代行其祭事凡大祭祠王后不與則攝而薦豆籩徹薦徹豆籩后之事國有大故則旅上帝及四望王大封則先告后土乃頒祀于邦國都家鄉邑頒讀為班班其所當祀及其禮也都家鄉邑謂王子弟及公卿大夫所食采地也又春官下太祝曰太祝掌六祝之辭太師宜于社造于祖馬融傳曰爾雅曰起大事動大眾必先有事於社也設軍社類上帝社者社主也類者以事類告祀上帝國將有事於四望將行也四望日月星辰也及軍歸獻于社則前祝獻於社主又春官曰家宗人掌家祭祀之禮凡祭祀致福大夫采地之所祀與都同若先王之子孫亦有祖廟禮記月令曰孟春之月其祖戶祭先脾春陽氣出祀之於戶內陽也祀之先祭脾者為春陽中於藏直脾為尊也仲春之月天子獻羔開冰先薦寢廟獻羔謂獻司寒也祭司寒而出冰薦於宗廟乃後賦之上丁命樂正習舞釋菜將舞必釋菜於先師以禮之天子乃率三公九卿諸侯大夫親往視之順時達物中丁又命樂正入學習樂是月也祠不用犧牲用珪璧更皮幣又月令曰孟夏之月共祀竈祭先肺夏陽氣盛熱於外祀之於竈從熱類也祀之先肺者陽位在上肺亦在上肺為尊也又月令仲夏曰祀皇地祇於方丘夏至之日祀皇地祇於方丘以高祖神堯皇帝配坐以岳瀆等神從祀又月令仲夏曰命有司祭先牧謂仲夏祭先牧於大澤用剛日又月令季夏曰其祀中霤祭先心中霤猶中室也祭中霤之禮為俎先進心是月也祀黃帝於南郊謂季夏士德王日則祀黃帝合樞紐於南郊以軒轅配坐以後土鎮星從祀也又月令曰孟秋其祀門祭先肝秋陰氣出祀之於門外陰也祭先肝者秋為陰中於藏值肝凡祀門為俎先進肝也又月令曰孟冬其祀行祭先腎冬陰氣盛寒於外祀之於行從辟除之類行謂道也祭先腎者陰位在下腎亦在下凡祀行為俎先進腎又月令孟冬日祀神州地祇於北郊謂立冬日祭神州地祇於北郊太宗文武聖皇帝配坐是月也命有司祭司寒謂孟冬祭司寒於北郊是月也命有司祭司中司命司人司祿謂立冬後亥日祀司祿等於國域西北又月令仲冬曰命有司祈祀四海大川名源淵澤井泉順其盛德之時祭也又曲禮上曰臨祭不惰祭服弊則焚之祭器弊則埋之又曲禮下曰無田祿者不設祭器有田祿者先為祭服君子雖貧不鬻祭器雖寒不衣祭服去國祭器不踰境大夫寓祭器於大夫士寓祭器於士又曲禮下, krp: 徴}
