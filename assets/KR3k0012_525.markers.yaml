  - {type: variant, offset: 143, length: 1, content: 尸, SBCK: 夏􅀕曰礿新菜可礿也秋􅀕曰甞甞新榖也冬􅀕曰烝進品物也􅀕天曰燔柴旣􅀕積薪燒之􅀕地曰瘞埋旣􅀕埋藏也􅀕山曰􅔑懸或􅔑或懸置之於山山海經曰懸以􅁻王是也􅀕川曰浮沉投􅀕水中或沉或浮也􅀕星曰布布散􅀕於地也􅀕風曰磔今俗當大道中磔狗云止風此其象也是􅀋是禡師􅀕也師岀征伐􅀋於上帝禡於}
