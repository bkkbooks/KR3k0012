  - {type: variant, offset: 3803, length: 0, content: '', krp: 曰古者歳四祭因四時所生熟而祭先祖父母也春曰祠祠者以正月始食韮也夏曰禴禴者以四月煑麫餅也秋曰甞甞者以七月甞黍稷冬曰烝烝者以十月進𥘉稲也論語季氏}
  - {type: punctuation, offset: 3804, content: ：, id: KR3k0012_CHANT_525-bkkpn1168}
