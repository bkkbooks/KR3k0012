  body:
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 四􅀕禮中又􅀕義曰􅀕不欲數數則煩煩則不敬􅀕不欲䟽䟽則怠怠則忘是故君子合諸天道春禘秋甞霜露旣降君子履之必有悽愴之心非其寒之謂也春􅀨露旣濡君子履之必有􅇶􅅥之心如將見之又􅀕義曰文王之􅀕也事死者如事生􅀕之明日明發不􅄰饗而致之又從而思之􅀕之日樂與哀半饗之必樂巳至必哀又􅀕義曰郊之􅀕大報天而主日配以月夏后氏􅀕其闇殷人􅀕其陽周人􅀕日以朝及闇􅀕日於壇􅀕月於坎以別幽明以制上下􅀕日於東􅀕月於西以別内外以端其位日出於東月生於西隂陽長短終始相廵以致天下之和又􅀕義曰􅀕之日入室僾然必有見乎其位周還出户肅然必有聞乎其容聲岀戸而聽愾然必有聞乎其嘆息之聲周還出户謂薦設時也無户者一户􅀂食間則有出户而聽之又􅀕義曰孝子將􅀕慮事不可以不豫比時具物不可以不備虚中以治之此時猶先時也虚中言不兼念餘事宫室旣脩牆屋旣設百物旣備夫婦齋戒沐浴盛服奉承而進之洞洞乎屬屬乎如弗勝如將失之其孝敬之心至也與脩設謂掃除及黝堊薦其薦爼序其禮樂備其百官奉承而進之百官助主人進之於是諭其志意以其慌愡以與神明交庶或饗之庶或饗之孝子之志也又志統曰凡治人之道莫急於禮禮有五經莫重於􅀕禮有五經謂􅁻禮凶禮賔禮軍禮嘉禮也莫重於􅀕謂以􅁻禮爲首也夫􅀕者非物自外至者也自中出生於心也心􅇶而奉之以禮是故唯賢者能盡􅀕之義􅇶感念親之貌也賢者之􅀕也必受其福非世所謂福也福者備也備者百順之名也無所不順者之謂備言内盡於巳而外順於道也忠臣以事其君孝子以事於親其夲一也又􅀕統曰􅀕者所以追飬繼孝也孝者畜也順於道不逆於倫是之謂畜畜謂順於徳敎是故孝子之事親也有}
