  - {type: variant, offset: 4350, length: 0, content: '', WYG: 渭城界中夜入廟居郎間執㦸立廟門待上至欲為逆發覺伏誅故事帝夜入廟其後待明而入自此始也又曰孔光父覇為闗内侯覇上書求奉孔子祭}
  - {type: variant, offset: 4351, length: 1, content: 典, WYG: 元帝下詔曰其令師褒成君闗内侯覇以所食邑户八百祀孔子焉又曰初朱邑且死屬其子曰我故為桐鄉嗇夫其吏民愛我𦵏必桐鄉後世子孫奉尚我不如桐鄉民及死其子𦵏之桐鄉西郭外民果共立祠嵗時祀祭至今不絶太平御覽卷五百二十五}
