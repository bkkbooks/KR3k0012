  - {type: 'tls:seg', offset: 7, content: '', id: KR3k0012_CHANT_525-1a.3}
  - {type: punctuation, offset: 7, content: 《, id: KR3k0012_CHANT_525-bkkpn1}
  - {type: variant, offset: 7, length: 0, content: '', SBCK: 爲軒轅主雷雨得冝故又應時至也士瀆四輔故四夷各貢方色之馬也精爲馬不言赤黒義足通也黄龍黄雀皆土精也周易豫象曰雷岀地奮豫先王以作樂崇徳殷薦之上帝以配祖考又困九五曰利用􅀕祀􅀕祀所以受福也象曰利用􅀕祀受福也又旣濟曰九五東鄰殺牛不如西鄰之禴􅀕實受其福牛􅀕之盛者也禴􅀕之薄者也居旣濟之時而處尊位物皆濟矣將何爲焉其所務者􅀕祀而巳􅀕祀之盛莫盛脩徳故沼沚之}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_SBCK_525-3a}
  - {type: variant, offset: 8, length: 2, content: 詩召, SBCK: 蘋繁之菜可羞於􅀑神故􅁰稷非馨明徳惟馨是以東鄰殺牛不如西鄰之禴􅀕實受其福也又曰觀盥而不薦有孚顒􅀂王道之可觀者莫盛乎宗廟宗廟之可觀者莫盛於盥也至薦􅂤略不足復觀又萃曰萃亨王假有廟假至也王以聚至有廟也􅂏曰王假有廟致孝享也全聚乃得致孝之享也左傳桓公曰凡祀啓蟄而郊言凡祀通下三句天地宗廟之事啓蟄夏正建寅之月祀天}
  - {type: punctuation, offset: 9, content: ‧, id: KR3k0012_CHANT_525-bkkpn2}
  - {type: punctuation, offset: 11, content: 》, id: KR3k0012_CHANT_525-bkkpn3}
  - {type: variant, offset: 11, length: 0, content: '', SBCK: 郊龍見而雩龍見建巳之月蒼龍􅀫之體昬見東方萬物始盛時雨而大故􅀕天逺爲百榖祈膏􅀨始殺而甞建酉之月隂氣始殺嘉榖始熟故薦甞於宗廟閉蟄而丞建亥之月昆蟲閉户萬物皆成可薦者衆故烝􅀕宗廟又僖上}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_SBCK_525-3b}
