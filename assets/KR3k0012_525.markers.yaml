  - {type: variant, offset: 34, length: 949, content: 祀也于以采蘋南澗之濱于以采藻于彼行潦蘋大萍也澗崖也藻聚藻也行潦流潦也又小雅天保曰吉蠲為饎是用孝享吉善蠲絜也饎酒食也享獻也箋云謂將祭祀也禴祠烝嘗于公先王春曰祠夏曰禴秋曰嘗冬曰烝公事也箋云公謂后稷也君曰卜爾萬壽無疆君先君也尸所以象神卜子也箋云君曰卜爾者尸嘏主人傳神辭也又小雅吉日曰吉日維戊既伯既禱維戊順類乘壯也伯馬祖也重物慎微將用馬力必先為之禱其祖禱獲也箋云戊剛日也故乘壯為順類也又小雅大田曰來方禋祀以其騂黑與其黍稷以享以祀以介景福騂牛也黑羊豕也箋云成王之來則又禋祀四方之神祈報焉陽祀用騂牲陰祀用黑牲又小雅楚茨曰濟濟蹌蹌絜爾牛羊以往烝嘗或剝或亨或肆或將濟濟蹌蹌言有容也亨飪之也肆陳將齊也或陳于皮或齊其肉箋云有容言威儀敬慎也冬祭曰烝秋祭曰嘗祀之禮各有其事有解剝其皮者有煮熟之者有肆其骨體於俎者或奉持而進之者祝祭于祊祀事孔明祊門內也箋云孔甚也明狄備也契也孝子不知神之所在故使祝博求之平生門內之旁待賓客之處祀禮於是甚明又小雅信南山曰祭以清酒從以騂牡享于祖考咸尚赤曰騂箋云清謂玄酒也酒鬱鬯五齊三酒也祭之禮先以鬱鬯降神然後迎生享于祖考納考時執其鸞刀以啟其毛取其血膋鸞刀乃有鸞者言割中節也箋云毛以告純人膋脂膏也血以告殺膋以升臭合之黍稷實之於蕭合馨香也是烝是享苾苾芬芬祀事孔明又生民曰生民尊祖也后稷生於姜嫄文武之功起於后稷故推以配天焉厥初生民時維姜嫄生民如何克禋克祀以拂無子克能也弗之言祓也姜嫄之生后稷如何乎乃禋祀上帝於郊禖以祓除其無子之疾而得其福也履帝武敏攸介攸止載震載肅載生載育祀郊媒之時有大神之跡姜嫄履其拇指生子而養之長名曰棄也又清廟曰清廟祀文王也周公既成雒邑朝諸侯率以祀文王焉清廟者祭有清明之起德者之宮也謂祭文王又清廟烈文曰烈文成王即政諸侯助祭也新王即政必以朝享之禮祭於祖考告嗣位也烈文辟公鍚茲祉福惠我無疆子孫保之烈光也文王鍚之也又臣工曰振鷺二王之後來助祭也二王殷夏也其後祀也宋也振鷺于飛于彼西雍我客戾止亦有斯容箋云白馬於西雍之澤言所集得其虔也興者喻祀宋之君有潔白之德來助祭周之廟得禮之宜又臣工潛曰潛季冬薦魚春獻鮪也猗與漆沮潛有多魚有鱣有鮪鰷鱨鰋鯉猗與欽美之言漆沮歧周二水也潛摻也以享以祀以介景福介助也景大也尚書舜典曰望于山川徧于群神孔安國傳曰謂在遠者望祭之也群神丘陵墳衍之屬又說命曰黷于祭祀時謂弗欽孔安國傳, WYG: 義}
