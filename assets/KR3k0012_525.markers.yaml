  - {type: 'tls:seg', offset: 22, content: '', id: KR3k0012_CHANT_525-1a.6}
  - {type: variant, offset: 22, length: 5, content: 能循法度則, SBCK: 見􅀍髮而􅀕於野者曰不及百年此其戎乎其禮先亡矣秋􅁗晉遷陸渾之戎于伊川又僖下曰夏四月四卜郊不從乃免牲非禮也猶三望亦非禮也禮不卜常祀而卜其牲曰牛卜日曰牲成而卜郊上怠慢也望郊之細也不郊亦無望可也又僖下曰衛成公夢康叔曰相奪予享相夏后啓之孫也居帝丘享􅀕也公命祀相寗武子曰不可􅀑神非其族􅀋不歆其祀祀鄫何事相之不享於此矣衛之罪也不}
  - {type: punctuation, offset: 26, content: ，, id: KR3k0012_CHANT_525-bkkpn10}
  - {type: 'tls:seg', offset: 26, content: '', id: KR3k0012_CHANT_525-1a.7}
  - {type: variant, offset: 29, length: 1, content: 承, SBCK: 聞成王周公之命祀請改祀命改祀相之命也又文下曰大事于太廟躋僖公逆祀也僖是閔公兄不得爲父子甞爲臣位應在下今令居閔上故曰逆祀也於是夏父弗忌爲宗伯宗伯掌宗廟昭穆之禮也尊僖公見明見曰吾見新􅀑大故􅀑小新􅀑僖公旣爲兄死時年又長也故􅀑閔公死時年小弗忌明言其所見也先大後小順也躋聖賢明也言以僖公爲聖賢也明順禮也君子以爲失禮禮無不順祀國之大事也而逆之可謂禮乎子雖齊聖不先父食乆矣故禹不先鯀湯不不先契鯀禹父契湯十二丗祖文武不先不窋不窋后稷子也宋祖帝乙鄭祖厲王猶上祖也仲尼曰臧文仲其不智者三作虚器謂居蔡山節藻梲也縱逆祀聽夏父躋僖公祀爰居三不智也海鳥曰爰居止於魯東門外文仲以爲神命國人祀之又昭二曰鄭子産聘于晉韓宣子曰寡君寢疾今夢黄熊入寢門其何厲􅀑也對曰昔堯殛鯀于羽山其神化爲黄熊以入于羽淵實爲夏郊三代祀之晉爲盟主其或未之祀乎韓宣子祀夏郊晉侯有間又曰晉侯問於史趙曰陳其遂亡乎對曰陳顓頊之後也舜重之以明徳至胡公不淫故周賜之姓使祀虞帝臣聞盛徳必百丗祀虞之丗數未也公羊傳僖公曰􅂚爲或言三卜或言四卜三十禮也四卜非禮也三卜何以禮求􅁻之道三禘甞不卜郊何以卜卜郊何禮也禮天子不卜郊卜郊何以非禮魯郊非禮也以魯郊非禮故卜耳昔武王旣没成王㓜小周公居攝行天子事制禮作樂致大平有王功周公夢成王以王禮葬之命魯使郊以彰周公之徳非正故卜三􅁻則用之不􅁻則免牲也魯郊何以非禮天子􅀕天諸侯􅀕土土謂社天子有方望之事方望謂郊時所望􅀕四方羣神日月星辰風伯雨師五嶽四瀆及餘山川三十六所也無所不通諸侯山川有不在其封内者則不􅀕也􅂚爲或言免牲或言免牛免牲禮也免牛非禮也免牛何以非禮傷者曰牛三望者何望􅀕也然則􅂚􅀕􅀕泰山河海山川有能潤千百里者天子秩而􅀕之此皆助天宣氣布功故􅀕天及之觸石而出膚寸而合不崇朝而徧􅀨乎天下者唯泰山爾河海潤于千里榖梁傳曰宫室不設不可以􅀕􅀕者薦其時也薦其敬也薦其義也非享味也又僖公曰夏四月不郊四卜非禮也免牲者爲之緇衣纁裳有司玄端奉送至於南郊免牛亦然乃者亡乎人之辭也猶者可以巳之辭也國語楚語曰屈到􅄝芰有疾召其宗老而屬之屈到楚卿屈蕩之子也芰菱也宗老宗臣屬託也曰􅀕我必以芰及祥宗老將薦芰屈建命去之建屈到之子子木也宗老曰夫子屬之子木曰不􅀕然典有之曰國君有牛享大夫有羊饋士有豚犬之奠庶人有魚炙之薦不羞珍異不陳庶侈夫子不以其私欲干國之典遂不用又楚語曰子期祀平王􅀕以牛爼於王子其楚平王之子結也牛爼致爼於王也王問於觀射父曰祀牲何及對曰祀加于舉舉人君朔望之盛饌也天子舉以太牢祀以㑹太牢牛羊豕也㑹亦太牢舉西方之貢諸侯舉以特牛祀以太牢卿舉以少牢祀以特羊大夫舉以特牲祀以少牢特牲豕也士食魚炙祀以特牲庶人食菜祀以魚上下有序則民不慢王曰其小大何如對曰禘郊不過蠒栗烝甞不過握把王曰何其小也對曰天神以精明臨下民故求備物不求豐大是故先王之祀也以一純二精三牲四時五色六律七事八種九􅀕十日十二辰以致之純心純一也二精玉帛也三牲牛羊豕也四時春秋冬夏也五色五采服也六律黄鍾太簇姑洗蕤賔夷則無射也亡事天地人四時之物也八種八音異種也九􅀕九州之助􅀕也十日甲至癸也十二辰子至亥也百姓干品萬官億醜兆民經入畡數以奉之百姓百官受民姓也千品姓有徹品十爲干品五物之官陪屬萬爲萬官官有十醜爲億醜天子之田九畡以養兆民王取經入以食萬官也明徳以昭之和聲以聽之以告徧至徧至光􅀍四表格于上下也明無不受休天子禘郊之事必自射其牲王后必自親春其粢諸侯宗廟之事必自射牛羊繫豕夫人必自舂其盛况其下之人其誰敢不戰兢以事百神春秋繁露曰大雩者何旱􅀕也難者曰大旱乃雩􅀕而請􅀨大水鳴鼓而攻社天地之所爲隂陽之所起也或請焉或怒焉何也曰大旱者陽滅隂也陽滅隂者尊􅎹卑也固其義也雖大甚拜請之而巳無敢有加也大水者隂滅陽也隂滅陽者卑勝尊也故鳴鼔攻之朱􅁝而脅之又曰古者歳四􅀕因四時所生熟而􅀕}
