  - {type: variant, offset: 1207, length: 259, content: 朝於中庭祀四方從東方始卒於北方禮志致齋三日周禮凡祭祀前期十日宗伯帥執事十日是為齋一旬乃祀也今此致齋即祀者欲得容三十也荅蓋八日為致齋明九日朝而初祀亦一旬有一日事乃畢也其祀禮曰格祀篇云今亡曰某也方祀曰播國率相行祀其祝也曰若爾神靈洪範六濔是合神靈謂木精靈威仰火精赤熛怒士精含樞細金精白招矩水精汁光紀及木帝太皞火帝炎帝土帝黃帝金帝少昊水帝顓頊木官勾芒火官祝融土官後土金官蓐收水官玄冥皆是也古者生能其事死在祀禮配其神而食合猶為也六瀰是神靈所為也無差無傾無有不正若民有不敬事則會批之于六濔言民廣及天下有過者也事六事也會合也批推也言, krp: 序焉見}
