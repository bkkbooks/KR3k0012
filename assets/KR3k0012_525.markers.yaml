  - {type: variant, offset: 3787, length: 1, content: 誤, krp: 辭也國語楚語曰屈到嗜芰有疾召其宗老而屬之屈到楚卿屈蕩之子也芰菱也宗老宗臣屬託也曰祭我必以芰及祥宗老將薦芰屈建命去之建屈到之子子木也宗老曰}
