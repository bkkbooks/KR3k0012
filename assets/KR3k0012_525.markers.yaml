  - {type: variant, offset: 4062, length: 261, content: 有天下者祭百神諸侯在其地則祭之亡其地則不祭昭明也亦謂壇也時四時也亦謂陰陽之神也埋之者陰陽出入於地中也凡此以下皆祭用少年又祭法曰聖王之制祭祀也法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大菑則祀之能捍大患則祀之是故厲山氏之有天下也其子曰農能播植百穀夏之衰也周棄繼之故祀以為稷共工氏之霸九州也其子曰后土能平九州故祀以為社帝嚳能序星辰以著眾堯能賞均刑法以義終舜勤眾事而野死鯀鄣洪水而殛死禹能脩鯀之功黃帝正名百物以明民共財顓頊能脩之契為司徒而民成冥勤其官而水死湯以寬治民而除其虐文王以文治武王以武功去民之災此皆有功烈於民者也及夫, WYG: ''}
