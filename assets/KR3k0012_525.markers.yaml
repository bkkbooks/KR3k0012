  - {type: variant, offset: 4104, length: 3, content: 陰陽出, krp: 天子夏親祠上帝於郊故曰郊於是天子始幸雍郊見五帝以孟夏四日荅禮焉又曰宣帝八月飲酎行祠孝昭廟先驅旄頭劒挺墮墜首挿泥中刃向乗輿車馬驚公孫賀筮之有兵謀不吉卜還使有司侍祠是時霍氏外孫代郡太守任宣坐謀反誅宣子章爲公車丞亡在渭城界中夜}
