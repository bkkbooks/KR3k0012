  - {type: punctuation, offset: 3804, content: 「, id: KR3k0012_CHANT_525-bkkpn1169}
  - {type: variant, offset: 3804, length: 336, content: 季氏祭逮闇而祭日不足繼之以燭雖有強力之容肅敬之心皆倦怠矣有司跛倚以臨祭其為不敬大矣他日祭子路與室事交乎戶堂事交乎階質明而始行事晏朝而退孔子聞之曰誰謂由也不知禮乎又大傳曰牧之野武王之事也既事而退柴於帝祈於社設奠於牧室柴尊告天地及先祖也遂率天下諸侯執豆籩駿奔走又祭法曰燔柴於泰壇祭天也瘞埋於泰折祭地也用騂犢壇祈封土為祭處也壇之言垣也垣明貌也折炤晢也必為炤明之名尊神也地祀用黝牲與天俱用犢連言耳埋少牢於泰昭祭時也相近於坎壇祭寒暑也王宮祭日也夜明祭月也幽宗祭星也雩宗祭水旱也四坎壇祭四方也山林川谷丘陵能出雲為風雨見怪物皆曰神有天下者祭百神諸侯在其地則祭之亡其地則不祭昭明也亦謂壇也時四時也亦謂陰陽之神也埋之者陰陽出入於地中也凡此以下皆祭用少年又祭法曰聖王之制祭祀也法施於民則祀之以, SBCK: 􅀄朱邑且}
  - {type: variant, offset: 3804, length: 8, content: 季氏祭逮闇而祭日, WYG: 仲尼曰臧文仲}
  - {type: variant, offset: 3806, length: 0, content: '', krp: 旅於泰山子謂冉有曰汝不能救與旋}
