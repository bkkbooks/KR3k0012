  - {type: 'tls:seg', offset: 4348, content: '', id: KR3k0012_CHANT_525-38a.39}
  - {type: variant, offset: 4348, length: 0, content: '', WYG: 是類是禡師祭也師出征伐類于上帝禡于所征之地既伯旣禱馬祭也伯祭馬祖也將用馬力以先祭其先祖也禘大祭也五年一祭也繹又祭也祭之明日尋繹復祭周曰繹春秋經曰壬午猶繹商曰肜音同書曰髙宗肜日夏曰復胙未見義所出也五經異義曰夏至天子親祀方澤侍中騎都尉賈逵説曰魯無圜丘方澤之祭者周兼用六代禮樂魯用四代其祭天之禮亦宜損于周故二至之日}
  - {type: page-break, offset: 4348, content: '', id: KR3k0012_WYG_525-11a, image: WYG0897/WYG0897-0667c.png}
  - {type: variant, offset: 4349, length: 0, content: '', WYG: 祭天地也二至夏至冬至謂不當祭也又曰京易今説臣動養君其義理也必望利下弗養道厥妖國有被髪于野祭者又曰古尚書説非時祭天謂之類言以事類告也肆類于上帝時舜告攝位非常祭又曰古周禮説大宗伯曰凡禮大神享大鬼祭大祇率執事而卜大鬼謂先王也史記曰亳人繆忌奏祠太乙方曰天神貴者太乙太乙佐曰五帝古者天子以春秋祭太乙又曰東南郊太牢具七日為壇開八通之鬼道于是天子令大祝立其祠長安城東南郊常奉祀如忌方其後人上書言古者天子三年一用太牢祀三一天一地一太一天子許之令太祝領祀之于忌太一壇上如其方後人復有上書言古者天子常以春解祠祀黄帝用一梟破鏡孟康曰梟鳥也食母破鏡獸名食父皇帝欲絶其類使百物祠皆用之破鏡如貙而虎眼漢使東郡五月五日送梟作梟羮以賜百官以惡鳥故食之冥羊用羊祠馬行用一青牡馬太乙澤山君地長用牛武夷君用乾魚隂陽使者以一牛令祠官領之而祀於忌太一漢書曰髙祖沛公祀黄帝祭蚩尤于沛庭而釁鼓旗幟皆赤又曰髙祖微時聞魏公子賢及即位每過大梁常祀公子髙祖十二年從擊黥布還為公子置守冢嵗四時奉祀公子矣又張子房從髙帝過濟北果得榖城山下黄石取而葆祠之及留侯死并𦵏黄石冢伏臘祠又郊祀志曰文帝下詔曰有異物之神見于成紀無害於民嵗以有年朕親郊祀上帝諸神百官以無諱于朕旁有司禮官曰古者天子夏親祠上帝于郊于是天子如幸雍郊見五帝以夏四月答禮焉又曰宣帝八月飲酎行祠孝昭廟先驅旄頭劍挺墮墜首插泥中刃向乘輿車馬驚公孫賀筮之有兵謀不吉卜還使有司侍祠是時霍氏外孫代郡太守任宣坐謀反誅宣子章為公車丞亡}
