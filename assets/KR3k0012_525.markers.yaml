  - {type: variant, offset: 3813, length: 2, content: 足繼, WYG: 智者三作虛器謂居蔡山節藻梲也縱逆祀聴夏父躋僖公祀爰居三不智也海鳥曰爰居止于魯東門外文仲以為神命國人祀之又昭七年曰鄭子産聘于晉韓宣子曰寡君寢疾今夢黄熊入寢門其何厲鬼也對曰昔堯殛鯀于羽山其神化為黄熊以入于羽淵實為夏郊三代祀之晉為盟主其或未之祀乎韓宣子祀夏郊晉侯有間又曰晉侯問于史趙曰陳其遂亡乎對曰陳顓頊之後也舜重}
