  - {type: variant, offset: 1232, length: 357, content: 祀前期十日宗伯帥執事十日是為齋一旬乃祀也今此致齋即祀者欲得容三十也荅蓋八日為致齋明九日朝而初祀亦一旬有一日事乃畢也其祀禮曰格祀篇云今亡曰某也方祀曰播國率相行祀其祝也曰若爾神靈洪範六濔是合神靈謂木精靈威仰火精赤熛怒士精含樞細金精白招矩水精汁光紀及木帝太皞火帝炎帝土帝黃帝金帝少昊水帝顓頊木官勾芒火官祝融土官後土金官蓐收水官玄冥皆是也古者生能其事死在祀禮配其神而食合猶為也六瀰是神靈所為也無差無傾無有不正若民有不敬事則會批之于六濔言民廣及天下有過者也事六事也會合也批推也言天下之有過神靈亦合推內於六濔天子以下為任者也六事之機以縣示我我民人無敢不敬事上下王祀周禮天官冢宰曰以八則治都鄙一曰祭祀以馭其神祭祀其先君社稷五祀以九式均節財用一曰祭祀之式式謂財用之節度又天官上內饔曰凡宗廟之祭祀掌割亨之事凡燕飲食亦如之又天官上獸人, WYG: 統}
