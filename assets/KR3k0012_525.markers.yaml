  - {type: variant, offset: 708, length: 332, content: 朝諸侯率以祀文王焉清廟者祭有清明之起德者之宮也謂祭文王又清廟烈文曰烈文成王即政諸侯助祭也新王即政必以朝享之禮祭於祖考告嗣位也烈文辟公鍚茲祉福惠我無疆子孫保之烈光也文王鍚之也又臣工曰振鷺二王之後來助祭也二王殷夏也其後祀也宋也振鷺于飛于彼西雍我客戾止亦有斯容箋云白馬於西雍之澤言所集得其虔也興者喻祀宋之君有潔白之德來助祭周之廟得禮之宜又臣工潛曰潛季冬薦魚春獻鮪也猗與漆沮潛有多魚有鱣有鮪鰷鱨鰋鯉猗與欽美之言漆沮歧周二水也潛摻也以享以祀以介景福介助也景大也尚書舜典曰望于山川徧于群神孔安國傳曰謂在遠者望祭之也群神丘陵墳衍之屬又說命曰黷于祭祀時謂弗欽孔安國傳曰祭不欲數數則黷黷則不敬也又洛誥曰祀于新邑咸秩無文孔安國傳曰以祀典祀于新邑皆次秩不在禮文者而禮之又多士曰罔弗明德卹, SBCK: 户八百}
