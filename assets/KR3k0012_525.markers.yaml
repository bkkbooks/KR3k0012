  - {type: variant, offset: 4, length: 1, content: 祭, SBCK: 道焉生則養殁則喪喪畢則􅀕養則觀其順也喪則觀其哀也􅀕則觀其敬而時也盡此三道者孝子之行也殁終也又􅀕統曰夫􅀕有十倫焉見事􅀑神之道焉見君臣之義焉見父子之倫焉見貴賤之等焉見親踈之殺焉見爵賞之施焉見夫婦之別焉見政事之均焉見長㓜之序焉見天下之際焉此之謂十倫倫猶義也又􅀕統曰凡􅀕有四時春􅀕曰杓夏􅀕曰禘秋􅀕曰甞冬􅀕曰烝謂夏殷時}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_525-2b}
  - {type: variant, offset: 6, length: 0, content: '', SBCK: 也礿禘陽義也甞烝隂義也禘者陽之盛也甞者隂之盛也故曰莫重於禘甞夏者尊卑著而秋萬物成又􅀕統曰周公旦有勲勞於天下成王而欲尊魯故賜之以重􅀕外􅀕則郊社是也内􅀕則大甞禘是也言此者善周公功也又表記曰􅀕極敬不繼之以樂朝極辯不繼之以倦極猶盡也辯分別政事也􅀕義曰􅀕之日樂與哀半饗之必樂巳至必哀又表記曰子曰后稷之祀易冨也其辭恭其欲儉其禄及子孫冨之言備也以傳世之禄兵倫者之􅀕易備也禮稽命徴曰天子􅀕天地宗廟六宗五嶽得其冝則五􅂖豐雷􅀨時至四夷貢物青白黄馬黄龍翔黄雀集坤爲地得冝則五榖豐矣土精}
  - {type: variant, offset: 6, length: 27, content: 上毛詩召南曰采蘋大夫妻能循法度也能循法度則可以承先祖供, WYG: 中又}
  - {type: variant, offset: 6, length: 27, content: 上毛詩召南曰采蘋大夫妻能循法度也能循法度則可以承先祖供, krp: 中又}
