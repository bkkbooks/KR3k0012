  - {type: variant, offset: 3820, length: 1, content: 強, krp: 成熟將欲食之先薦先祖念之若生不忘親也爾雅曰春祭曰祠祠之言食也夏祭曰礿新菜可礿也秋祭曰甞甞新榖也冬祭曰烝進品物也祭天曰燔柴旣祭積薪燒之祭地曰瘞埋旣祭埋藏也祭山曰􅔑懸或􅔑或懸置之於山山海經曰懸以吉王是也祭川曰浮沉投祭水中或沉或浮也祭星曰布布散祭於地也祭風曰磔今俗當大道中磔狗云止風此其象也是類是禡師祭也師岀征伐類於上帝禡於所征之地旣伯旣禱馬祭也伯祭馬祖也將用馬}
