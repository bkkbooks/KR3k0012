  - {type: variant, offset: 1789, length: 565, content: 用尨可也尨謂雜色不純毀謂副辜毀除殃咎之屬也凡祭祀共其犧牲以授充人繫之犧牲毛羽皃具也授充人者當殊養之凡牲不繫者共奉之謂非時而祭祀者又地官上曰牛人掌養國之公牛以待國之政令凡祭祀供其享牛求牛以授職人而芻之鄭司農云享牛前祭一日之牛求牛禱於鬼神祈福之牛也玄謂獻神之牛謂所以登者凡祭祀供其牛牲之牙與其盆簝以待事牙謂福衡之屬盆簝皆器名又地官下閭師曰凡庶民不畜者祭無牲不耕者祭無盛矣又春官上太宗伯曰太宗伯之職掌建邦之天神人鬼地祇之禮以佐王建保邦國建立也立天神人鬼地祇之禮者謂祀之祭之享之之禮吉禮是也自吉禮於上次以立安邦國者牙以相成明尊鬼神重人事以禋祀祀昊天上帝以實柴祀日月星辰以楢燎祀司中司命風師雨師禋之言煙也周人尚臭煙氣之臭聞者也楢積也詩曰芃芃棫樸薪之楢之三祀皆積柴實牲體焉或有玉帛燔柴而升煙所以報陽也以血祭祭社稷五祀五嶽以理沉祭山林川澤以副辜祭四方百物不言祭地此皆地祇祭地可知也陰祀自血起貴氣臭也社稷土穀之神也有德者配食凡祭祀大神享大鬼享祭大祇帥執事而卜日宿視滌濯涖玉鬯省牲鑊奉玉齊詔大號治其大禮詔相王之大禮執事諸有事於祭者也宿申式也滌濯溉祭器也若王不與祭祀則攝位王有故代行其祭事凡大祭祠王后不與則攝而薦豆籩徹薦徹豆籩后之事國有大故則旅上帝及四望王大封則先告后土乃頒祀于邦國都家鄉邑頒讀為班班其所當祀及其禮也都家鄉邑謂王子弟及公卿大夫所食采地, WYG: ''}
