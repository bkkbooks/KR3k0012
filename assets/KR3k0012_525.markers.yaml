  - {type: variant, offset: 4345, length: 0, content: '', WYG: 享味也又僖公曰夏四月不時四卜非禮也免牲者為之緇衣纁裳有司𤣥端奉送至于南郊免牛亦然乃者亡乎人之辭也猶者可以已之辭也國語楚語曰屈到嗜芰有疾召其宗老而屬之到楚卿屈蕩之子也芰蔆也宗老宗臣也屬託也曰祭我必以芰及祥宗老將薦芰屈建命去之建屈到之子子木也宗老曰夫子屬之子木曰不然祭典有之曰國君有牛享大夫有羊饋士有豕犬之奠庶人有魚炙之薦不珍羞異不陳奢侈夫子不以其私欲干國之典遂不用又楚語曰子期祀平王祭以牛爼于王子期平王子結也牛爼致爼于王也王問于觀射父曰祀牲何及對曰祀加于舉舉人君朔望之盛饋也天子舉以太牢祀以㑹太牢羊牛豕也㑹亦太牢舉四方之貢也諸侯舉以特牛祀以太牢卿舉以少牢祀以特牲庶人食采祀以魚上下有序則民不慢王曰其小大如何對曰禘郊不過繭栗烝嘗不過握把王曰何其小也對曰天神以精明臨下民故求備物不求豐大是故先王之祀也以一純二精三牲四時五色六律七事八種九祭十日十二辰以致之純心純一也二精玉帛也三牲牛羊豚也四時春夏秋冬也五色五采服也六律黄鐘太簇姑洗㽔賔夷則無射也七事天地人四時之物也八種八音九祭九州之助祭也十日甲至癸也十二辰子至亥也百姓千品萬官億醜兆民經入畡數以奉之百姓百官受民姓也千品姓有徹品十為千品五物之官陪屬萬為官官官有十醜為億醜天子之田九畡以飬兆民王取經入以食萬官也明德以昭之和聲以聽之以告徧至則無不受休天子禘郊之事必自射其牲王后必自親舂其粢諸侯宗廟之事必自射牛羊擊豕夫人必自舂其盛况其下之人其誰敢不戰兢以事百神春秋繁露曰大雩者何旱祭也難者曰大旱乃雩祭而請雨大水鳴鼓而攻社天地之所為隂陽之所起也或請焉或怒焉何也曰大旱者陽滅隂也陽滅隂者尊厭卑也固其義也雖太甚拜請之而已無敢有加也大水者隂滅陽也隂滅陽者卑勝尊也故鳴鼓而攻之朱絲而脅之可不慎哉又曰古者嵗四祭因四時所生熟而祭先祖父母也春曰祠者以正月始食韭也夏曰禴禴者以四月熟麵餅也秋曰嘗嘗者以七月嘗黍稷也冬曰烝烝者以十月進初稻也論語季氏曰季氏旅於泰山子謂冉有曰女弗能救與旅祭名諸侯祭山川在其封内者今陪臣祭泰山非禮也對曰不能子曰嗚呼曽謂泰山不如林放乎又曰祭如在祭神如神在子曰吾不與祭如不祭孝經云春秋祭祀以時思之鄭𤣥注四時變易物有成熟將欲食之故薦先祖念之若生不忘親也爾雅曰春祭曰祀祀之言食也夏祭曰禴新菜可礿也秋祭曰嘗嘗新榖也冬祭曰烝進品食也祭天曰燔柴既祭積薪燒之祭地曰瘞埋既祭埋藏也祭山曰庪縣庪縣謂懸置之于山川山海經曰懸以告玉是也祭川曰浮沉投祭水中或沉或浮祭星曰布布散祭於地祭風曰磔今俗當大道中磔狗云止風}
