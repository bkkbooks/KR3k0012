  - {type: variant, offset: 4335, length: 8, content: 谷丘陵民所取材用, WYG: 有能潤于百里者天子秩而祭之觸石而出膚寸而合不崇朝而徧雨乎天下者惟泰山耳河海潤乎千里榖梁傳曰宫室不設不可以祭祭者薦其時也薦其敬也薦其義}
