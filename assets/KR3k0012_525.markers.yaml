  - {type: variant, offset: 3796, length: 0, content: '', krp: 十日甲至癸也十二辰子至亥也百姓干品萬官億醜兆民經入畡數以奉之百姓百官受民姓也千品姓有徹品十爲干品五物之官陪屬萬爲萬官官有十醜爲億醜天子之田九畡以養兆民王取經入以食萬官也明徳以昭之和聲以聽之以告徧至徧至光𬒳四表格于上下也明無不受休天子禘郊之事必自射其牲王后必自親春其粢諸侯宗廟之事必自射牛羊繫豕夫人必自舂其}
  - {type: variant, offset: 3797, length: 2, content: 於瓮, krp: 况其下之人其誰敢不戰兢以事百神春秋繁露曰大雩者何旱祭也難者曰大旱乃雩祭而請雨大水鳴鼓而攻社天地之所爲隂陽之所起也或請焉或怒焉何也曰大旱者陽滅隂也陽滅隂者}
