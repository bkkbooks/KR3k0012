  - {type: variant, offset: 3777, length: 0, content: '', krp: 伯宗伯掌宗廟昭穆之禮也尊僖公見明見曰吾見新鬼大故鬼小新鬼僖公旣爲兄死時年又長也故鬼閔公死時年小弗忌明言其所見也先大後小順也躋聖賢明也言以僖公爲聖賢也明順禮也君子以爲失禮禮無不順祀國之大事也而逆之可謂禮乎子雖齊聖不先父食乆矣故禹不先鯀湯不不先契鯀禹父契湯十二丗祖文武不先不窋不窋后稷子也宋祖帝乙鄭祖厲王猶上祖也仲尼曰臧文仲其不智者三作虚器謂居蔡山節藻梲也縱逆祀聽夏父躋僖公祀爰居三不智也海鳥曰爰居止於魯東門外文仲以爲神命國人祀之又昭二曰鄭子産聘于晉韓宣子曰寡君寢疾今夢黄熊入寢門其何厲鬼也對曰昔堯殛鯀于羽山其神化爲黄熊以入于羽淵實爲夏郊三代祀之晉爲盟主其或未之祀乎韓宣子祀夏郊晉侯有間又曰晉侯問於史趙曰陳其遂亡乎對曰陳顓頊之後也舜重之以明徳至胡公不淫故周賜之姓使祀虞帝臣聞盛徳必百丗祀虞之丗數未也公羊傳僖公曰曷爲或言三卜或言四卜三十禮也四卜非禮也三卜何以禮求吉之道三禘甞不卜郊何以卜卜郊何禮也禮天子不卜郊卜郊何以非禮魯郊非禮也以魯郊非禮故卜耳昔武王旣没成王㓜小周公居攝行天子事制禮作樂致大平有王功周公夢成王以王禮葬之命魯使郊以彰周公之徳非正故卜三吉則用之不吉則免牲也魯郊何以非禮天子祭天諸侯祭土土謂社天子有方望之事方望謂郊時所望祭四方羣神日月星辰風伯雨師五嶽四瀆及餘山川三十六所也無所不通諸侯山川有不在其封内者則不祭也曷爲或言免牲或言免牛免牲禮也免牛非禮也免牛何以非禮傷者曰牛三望者何望祭也然則曷祭祭泰山河海山川有能潤千百里者天子秩而祭之此皆助天宣氣布功故祭天及之觸石而出膚寸而合不崇朝而徧雨乎天下者唯泰山爾河海潤于千里榖梁傳曰宫室不設不可以祭祭者薦其時也薦其敬也薦其義也非享味也又僖公曰夏四月不郊四卜非禮也免牲者爲之緇衣纁裳有司玄端奉送至於南郊免牛亦然乃者亡乎}
