  - {type: variant, offset: 3265, length: 1, content: 名, krp: 盛者也禴祭之薄者也居旣濟之時而處尊位物皆濟矣將何爲焉其所務者祭祀而巳祭祀之盛莫盛脩徳故沼沚之毛蘋繁之菜可羞於鬼神故黍稷非馨明徳惟馨是以東鄰殺牛不如西鄰之禴祭實受其福也又}
  - {type: variant, offset: 3267, length: 1, content: 淫, krp: 觀盥而不薦有孚顒若王道之可觀者莫盛乎宗廟宗廟之可觀者莫盛於盥也至薦簡略不足復觀又萃曰萃亨王假有廟假至也王以聚至有廟也彖曰王假有廟致孝享也全聚乃得致孝之享也左傳桓公曰凡}
