  - {type: variant, offset: 4332, length: 0, content: '', WYG: 注故魯郊非禮曷為或言免牲或言免牛免牲禮也免牛則非禮也免牛何以非禮傷者曰牛三望者何祭望也然則曷祭祭泰}
