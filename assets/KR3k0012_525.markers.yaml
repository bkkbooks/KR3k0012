  - {type: variant, offset: 3794, length: 1, content: 祭, WYG: 可謂禮乎子雖齊聖不先父食乆矣故禹不先鯀湯不先契鯀禹父契湯十四世祖文武不先不窋不窋后稷子}
  - {type: variant, offset: 3794, length: 0, content: '', krp: 子木曰不祭然典有之曰國君有牛享大夫有羊饋士有豚犬之奠庶人有魚炙之薦不羞珍異不陳庶侈夫子不以其私欲干國之典遂不用又楚語曰子期祀平王祭以牛爼於王子其楚平王之子結也牛爼致爼於王也王問於觀射父曰祀牲何及對曰祀加于舉舉人君朔望之盛饌也天子舉以太牢祀以㑹太牢牛羊豕也㑹亦太牢舉西方之貢諸侯舉以特牛祀以太牢卿舉以少牢祀以特羊大夫舉以特牲祀以少牢特牲豕也士食魚炙祀以特牲庶人食菜祀以魚上下有序則民不慢王曰其小大何如對曰禘郊不過蠒栗烝甞不過握把王曰何其小也對曰天神以精明臨下民故求備物不求豐大是故先王之祀也以一純二精三牲四時五色六律七事八種九祭十日十二辰以致之純心純一也二精玉帛也三牲牛羊豕也四時春秋冬夏也五色五采服也六律黄鍾太簇姑洗蕤賔夷則無射也亡事天地人四時之物也八種八音異種也九祭九州之助}
