  - {type: variant, offset: 2352, length: 0, content: '', krp: 押官一人隊頭一人副二人旗頭一人副二人火長五人六分支甲四分支戰𫀆一分支槍又曰周制萬有二千五百人爲軍軍將皆命卿二千有五百人爲師師帥皆中大夫五百人爲旅旅帥皆下大夫百人爲卒卒長皆上士二十有五人爲兩兩司馬皆中士五人爲伍伍皆有長軍師旅卒兩伍皆衆名伍一比兩一閭卒一旅旅一黨師一州軍一郷家所出人也按司馬法二十五人爲兩四兩爲卒百人也五卒爲旅五百人五旅爲師二千五百人五師爲軍一萬二千三百人萬二千象十有二月五百象閏管子言於齊桓公曰欲正卒伍脩兵甲則大國亦將爲之君有征戰之事則小國有}
  - {type: variant, offset: 2353, length: 5, content: 旗選壯勇士, SBCK: 圉之備矣公欲速得意於天下諸侯則事有所隱而政有所寓不顯習於兵事故曰事有所隱軍政寓之田獵故有所寓公作内政而寓軍令焉三分齊國爲髙子之里爲國子之里爲公之里以爲三軍擇其賢民使爲里君毎里皆使賢者爲君郷有行伍卒長則有制令且以田獵因以賞罰因曰獵之功過寄行賞罰則百姓通於軍事矣於是乃制五家以爲䡄䡄爲之長十䡄爲里里有司四里爲連連爲之長十連爲郷郷有良人以爲軍令是故五家爲䡄故五人爲䡄軏長率之十䡄爲里故}
  - {type: variant, offset: 2353, length: 5, content: 旗選壯勇士, krp: 圉之備矣公欲速得意於天下諸侯則事有所隱而政有所寓不顯習於兵事故曰事有所隱軍政寓之田獵故有所寓公作内政而寓軍令焉三分齊國爲髙子之里爲國子之里爲公之里以爲三軍擇其賢民使爲里君毎里皆使賢者爲君郷有行伍卒長則有制令且以田獵因以賞罰因曰獵之功過寄行賞罰則百姓通於軍事矣於是乃制五家以爲䡄䡄爲之長十䡄爲里里有司四里爲連連爲之長十連爲郷郷有良人以爲軍令是故五家爲䡄故五人爲䡄軏長率之十䡄爲里故}
