  - {type: variant, offset: 1103, length: 365, content: 臣咸諫云不宜引卑碎之人挾狐矢於軒陛之側上曰率土之內皆吾臣子我所恨不能將我心遍置人腹中豈有相疑之道哉由是一二年間兵士盡便弓馬又曰李抱真領澤潞觀察留後抱真密揣山東當有變上黨且當兵衛是時乘戰餘之地土塉賦重人益困無以養軍士乃籍戶丁男三選其一有材力者免租傜給弓矢令之曰農之隙則分曹角射歲終吾當會試及期按簿而徵之都試以示賞罰復命之如初比三年則皆善射抱真曰軍可用矣於是舉部內之鄉得成卒二萬前既不廩費府庫益實乃繕兵甲為戰具遂雄視山東是時稱昭義步兵冠諸軍又曰德宗即位以馬燧為太原尹北都留守河東節度觀察度支營田使是時承鮑防自百并敗軍之後兵甲寡弱騎士少燧乃悉召將吏牧馬廝役得數千人悉補騎卒教之數月皆為精騎造甲者必令長短三等稱其所衣以便進趨又造戰車以狡猊象刺戟於後行則載兵甲止則為營陣或塞險阨以遏奔衝器械無不犀利居一年陳兵三萬開廣場以習戰陣教其進退古司馬, SBCK: 事楚也穰苴}
