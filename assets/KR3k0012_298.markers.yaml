  - {type: 'tls:seg', offset: 3047, content: '', id: KR3k0012_CHANT_298-23a.4}
  - {type: variant, offset: 3049, length: 1, content: 便, WYG: 統屬改授旗鼓創造徽章取象天官定其名號庻使前矛後勁類别區分玉帳絳宫威徳充備蹈茲湯火譬彼椒蘭大定戎衣止戈斯在於是置十二軍分關内諸府以𨽻焉萬年道為參旗軍長安道為鼔旗軍富平道為𤣥武軍醴泉道為井鉞軍同州道為羽林軍華州道為騎官軍寧州道為折威軍岐州道為平道軍幽州道為招揺軍西麟道為苑游軍涇州道為天紀軍宣州道為天節軍時髙祖以天下未定實資武力將舉關中之衆以臨四方故出此制}
  - {type: page-break, offset: 3049, content: '', id: KR3k0012_WYG_298-7b, image: WYG0895/WYG0895-0591b.png}
