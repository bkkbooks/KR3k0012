  - {type: variant, offset: 250, length: 839, content: 所以示敵之輕己者也渾外本切沌徒損切周禮曰太宗伯以軍禮同邦國同謂威其不協僭差者軍禮之別五也太師之禮用眾也用其義勇也大均之禮䘏眾也均其地政地守地職之賦所以憂民也大田之禮簡眾也古之因田習兵閱其車徒之數也大役之禮任眾也築宮邑所以事民力強弱也大封之禮合眾也止封疆溝塗之固所以合聚其民也又曰夏官大司馬之職掌仲春教振旅司馬以旗致民平列陣如戰之陣以教坐作進退疾徐䟽數之節遂以蒐田仲夏教茇舍如振旅群吏撰車徒遂以苗田仲秋教治兵如振旅辨旗物之用遂以獮田仲冬教大閱前期群吏聽誓于陣前斬牲以左右徇陣曰不用命者斬之遂以狩田師以救無辜伐有罪若師有功則左執律右秉鉞以先愷樂獻于社左傳曰春蒐夏苗秋獮冬狩於農隙以講武事三年而治兵入而振旅歸而飲至以數軍實昭文章明貴賤辨等列順少長習威儀也又曰楚子文治兵於睽終朝而畢不戮一人子玉復治兵於蒍終日而畢鞭七人貫三人耳國老皆賀子文蒍賈不賀曰子玉剛而無禮過三百乘其不能以入矣子玉之敗子之舉也舉以敗國將何賀焉又曰苗賁皇徇曰蒐乘補卒秣馬利兵脩陣固列蓐食申禱明日復戰乃逸楚囚又曰宣子曰我若受秦則賓也不受寇也既不受矣而復緩師秦將生心先人有奪人之心軍之善謀也逐寇如追逃軍之善政也訓卒利兵秣馬蓐食潛師夜起戊子敗秦師于令狐至于刳首又曰宣榭火宣榭講武室也論語曰子曰善人教民七年亦可以即戎矣可就兵攻戰也又曰不教民戰是謂棄之後漢書曰靈帝時望氣以為京師有大兵兩宮血流以為太公六韜有天子將兵事可以威厭四方帝乃講武於平樂觀下起大壇建五采盖天子擐甲介馬稱無上將軍何進領兵屯於觀下置西園八校尉袁紹曹操等為之唐書曰太宗初即位突厥入寇欲諸軍皆習騎射每退朝即引諸衛將習射于顯德殿庭謂將軍已下曰古突厥與中國更有盛衰若軒轅善用五兵即能北逐獯虜周宣驅駕方召亦能制勝太原下至漢晉之君洎于隋代不使兵士素習干戈突厥來侵莫能抗禦遣中國生民塗炭於寇手我今不使汝等穿池築苑造諸淫費農民恣令逸樂兵士唯習弓馬若無賊來我則為汝博士教汝等武藝優長若有賊來我即為汝將師領汝鬭戰亦望使汝等前無橫敵於是日引數百人於殿庭教射太宗親自臨試每坐或至午時射, SBCK: ''}
