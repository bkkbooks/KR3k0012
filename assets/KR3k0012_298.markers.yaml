  - {type: variant, offset: 1472, length: 284, content: 戰非陣之難使人可陣難非可使陣難使可用難使人盡心效力用必勝也非知之難行之難教習使人知進退之便左右之利事事自行之者難又曰天子之義必純取於天地而觀於先聖天子奉天地之道調和陰陽四時之氣順先王之法度也士庶之義必奉於父母而正於君長士庶必從父母之教君長之命故雖有明君士不先教不可用也雖有明君士不教習不可以受敵也古之教民必立貴賊之經綸使高下不相凌德義不相踰材伎不相掩勇力不相犯故力同意和古者國容不入軍軍容不入國故德義不相踰治國以仁德軍事以勇德以從化義以法斷以國容入軍則軍敗軍容入國則國亂也吳起教戰法曰短者持矛戟長者持弓弩強者持旌旗勇者持金鼓弱者給廝養智者為謀士鄉里相比什伍相保一鼓整兵, WYG: ''}
