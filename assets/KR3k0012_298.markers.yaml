  - {type: variant, offset: 2359, length: 75, content: 十人奪旗左廂奪右廂右廂奪左廂鼓音動而奪角音動而止得旗者勝失旗者負勝賞而負罰離合之勢聚散之形勝負之理賞罰之信因是而教之太白陰經曰春秋末並為戰國增講武之禮, WYG: ''}
  - {type: variant, offset: 2361, length: 1, content: 奪, SBCK: 爲小戎里有司率之四里爲連故二百人爲卒連長率之十連爲郷故二千人爲族郷良人率之三軍故有中軍之鼓中軍則公之里卒也有髙子之鼓春以田曰蒐振旅因寓軍政而且整旅秋以田曰獮理兵順殺氣因理兵是故卒伍定於里軍政定於郊内敎旣成令不得遷徙故伍之人人與人相保家與家相受少同居長同游􅀕祀同福死喪相恤災禍同憂居處同樂行作同和哭泣同哀是故夜戰其聲相聞足以無亂晝戰其目相見足以相識歡欣足以相死是故以守則固以戰則勝君有此敎士三萬人以横行於天下敎士謂先敎習之士又曰凢立軍一人曰獨二人曰比三人曰叅比叅曰伍伍人爲列列有頭二列爲火十人有長立火字子五火爲隊五十人有頭二隊爲官百人立長二官爲曲二百人立􅀱二曲爲部四百人立司馬二部爲校八百人立尉二校爲禆千六百人立將軍二禆爲軍三千二百人有將軍副將軍唐書曰髙祖起義兵命太宗將兵徇西河郡下之癸巳建大將軍府以裴寂爲長史劉文静爲司馬具設官屬始置三軍分爲左右以公子建成爲隴西公左領大都督左三軍悉􅀠焉命太宗爲燉煌公右領大都督右三軍悉􅀠焉開倉庫以賑窮乏逺近響應又曰髙祖二年秋七月壬申詔曰天生五材司物資其器用武有七徳撥亂所以定功故黄帝垂衣尚有阪泉之戰放勛光宅猶稱丹浦之師禁􅁀安人率由兹道創業垂統莫此爲先以是周置六軍毎習蒐狩漢増八校畢選驍勇故能化行九有威震百蠻姧宄不興䖍劉息志季葉凌替軍政湮亡卒利不修旌}
