  - {type: variant, offset: 3056, length: 0, content: '', WYG: 夜出軍司徐徹執棨當營門曰將軍都督萬里安可輕出將軍之安危亦國之安危也徹今日若死此門乃開祜改容謝之蓋此後稀出矣又吳彦為小將吳大司馬陸抗竒}
  - {type: variant, offset: 3057, length: 1, content: 利, WYG: 勇略將㧞用之患衆情不允乃㑹諸將宻使人佯狂㧞刀跳躍來坐諸將皆懼而走惟彦不動舉几拒之衆服其勇乃擢用焉又天文志曰太白為上將羽林為中軍又文昌六星在北斗魁前天府}
