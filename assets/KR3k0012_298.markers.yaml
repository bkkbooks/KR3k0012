  - {type: variant, offset: 112, length: 137, content: 亂旌旗亂也示敵若亂以金間之紛紛旌旗像紜紜士卒貌言旌旗翻轉一合一離士卒進退或往或來視之若擾觀之若亂然其法令素定度幟分明各有分數擾而不亂也渾渾沌沌形圓而不可敗車騎齊轉也形圓者出入有道齊整也渾渾車輪轉行沌沌步騎奔馳視其行陣縱橫圓而不方然其指趣各有所應故王子曰將欲內明而外暗內理而外, SBCK: 乎弗從遂作中}
