  - {type: variant, offset: 2414, length: 0, content: '', SBCK: 有散貟散指揮内殿直散都頭鐵􅀐控鶴之號復命揔戎者自龍捷虎捷以降一一選之老弱羸小者去之諸軍士伍無不精當由是兵甲之盛近代無比偏將尚書曰司馬掌􅀖政統六師平􅀖國左傳曰趙朔趙嬰齊爲中軍大夫鞏朔韓穿爲上軍大夫荀息趙同爲下軍大夫韓厥爲司馬又曰晉侯請於王戊申以紱冕命士㑹將中軍且爲太傅命郷之服於是晉國之盗逃奔于齊又曰楚子北師次于郔沈尹將中軍子西將左子反將右將飲馬於河}
  - {type: variant, offset: 2414, length: 0, content: '', krp: 有散貟散指揮内殿直散都頭鐵騎控鶴之號復命揔戎者自龍捷虎捷以降一一選之老弱羸小者去之諸軍士伍無不精當由是兵甲之盛近代無比偏將尚書曰司馬掌邦政統六師平邦國左傳曰趙朔趙嬰齊爲中軍大夫鞏朔韓穿爲上軍大夫荀息趙同爲下軍大夫韓厥爲司馬又曰晉侯請於王戊申以紱冕命士㑹將中軍且爲太傅命郷之服於是晉國之盗逃奔于齊又曰楚子北師次于郔沈尹將中軍子西將左子反將右將飲馬於河}
