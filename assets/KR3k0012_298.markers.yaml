  - {type: variant, offset: 2538, length: 501, content: 事太古之時人食禽獸之肉坐其皮後代之人浸多時禽獸寡少衣食不足於是神農教其植穀導以紡績自是之後禽獸復盈山林下平土害禾稼為人所害於是王公秋冬無事畋獵閑習兵革奮揚威武以戒非常李冬之月獵日陰用事萬物畢成蟄蟲已伏乃具卒乘從禽于山澤以教部伍分進退之儀一人守圍地三尺十二時守三萬六千尺積尺得六千步積步得一十五里餘六十步圍中徑闊得地五里餘二十步以左右決勝將為交頭其決勝左右將各主士仵為行列皆以金鼓旌旗為節制其初起圍張翼隨山林地勢無遠近部分其合圍地虞候先擇定訖以善弧矢者為圍中騎其步卒槍旗幡守圍有漏禽獸坐守圍吏如大獸公之小獸私之以觀進止管子曰涼風至而白露下天子命左右司馬令組甲厲士眾商君書曰民之見戰如飢狼之見虎則民可用矣呂氏春秋曰世有言曰驅市人而戰可以勝人之厚祿教卒老弱罷民罷與疲同可以勝人之精士練材離散係絫音累可以勝人之行陳陳與陣同整齊鉏耰白挺可以勝人之長銚利兵此不通乎兵者之論今有利劍於此以刺則不中以擊則不及與惡劍無擇為是鬭因用惡劍則不可簡選精良兵械銛利發之則不時縱之則不當與惡卒無擇為是戰因用惡卒則不可王子慶忌陳午猶欲劍之利也陳午齊人慶忌吳公子二人皆勇有捷力簡選精良兵械銛利令將將之王者有以霸者矣湯武齊桓晉文吳闔閭是, SBCK: 備}
