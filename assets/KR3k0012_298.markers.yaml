  - {type: variant, offset: 3042, length: 0, content: '', SBCK: 畢八星主邊兵弋獵其大星曰天髙一曰邊將又曰參白獸之體其中三星横列三將也北曰左肩主左將西北曰右肩主右將}
  - {type: variant, offset: 3042, length: 0, content: '', WYG: 凡立軍一人曰獨二人曰比三人曰參比參曰伍伍人為列列有頭二列為火十人有長立火字五火為隊五十人有頭二隊為官百人立長二官為曲二百人立候二曲為部四百人立司馬二部為校八百人立尉二校為禆千六百人立將軍二禆為軍三千二百人有將軍副將軍唐書曰髙祖起義兵命太宗將兵狥西河郡下之癸巳建大將軍府以裴寂為長史劉文静為司馬具設官屬始置三軍分為左右以公子建成為隴西公左領大都督左三軍將軍悉𨽻焉命太宗為燉煌公右領大都督右三軍將軍悉𨽻焉開倉庫以賑窮乏逺近嚮應又髙祖二年秋七月壬申詔曰天生五材百物資其噐用武有七徳撥亂所以定功}
  - {type: page-break, offset: 3042, content: '', id: KR3k0012_WYG_298-6a, image: WYG0895/WYG0895-0590c.png}
  - {type: page-break, offset: 3042, content: '', id: KR3k0012_WYG_298-6b, image: WYG0895/WYG0895-0590d.png}
  - {type: variant, offset: 3042, length: 0, content: '', krp: 畢八星主邊兵弋獵其大星曰天髙一曰邊將又曰參白獸之體其中三星横列三將也北曰左肩主左將西北曰右肩主右將}
  - {type: variant, offset: 3043, length: 7, content: 凡勢險阻欲其便, SBCK: 黄帝占參應七將七將大天下兵精又曰南三星􅀐陣將軍􅀐將}
  - {type: variant, offset: 3043, length: 5, content: 凡勢險阻欲, WYG: 黄帝垂裳尚有阪泉之戰放勲光宅猶稱丹浦之師禁暴安人率由茲道創業垂統莫此為先以是周置六軍毎習蒐狩漢増八校畢選勇能故化行九有威震百蠻奸宄不興䖍劉息志季葉凌替軍政湮亡卒伍不修旌旗舛雜部伍符籍空有調發之名竟無討襲之用遂使夷狄放命盗賊交侵争戰多虞黔黎殄䘮朕受天明命撫有萬方爰自義師克成帝業至如超乗之士莫匪百金彀騎之材豈唯七萃今雖關塞寧謐荒裔肅清伊洛猶蕪江湖尚梗役車未息戎馬載馳武備之方猶宜精練所以各因部校序}
  - {type: page-break, offset: 3043, content: '', id: KR3k0012_WYG_298-7a, image: WYG0895/WYG0895-0591a.png}
  - {type: variant, offset: 3043, length: 7, content: 凡勢險阻欲其便, krp: 黄帝占參應七將七將大天下兵精又曰南三星騎陣將軍騎將}
