  - {type: variant, offset: 94, length: 4, content: 法教使強, SBCK: 征不德師謂六軍之衆公謂諸侯爲王卿士者爲元帥也元侯作師卿帥之以承天子元侯大國之君師三軍之衆大國三卿皆命於天子一卿命於其君無軍無三軍也􅀂元侯有事則命卿帥其所敎武衛之士以佐元侯禮所云次國二軍小國一軍謂以賦岀軍從征伐賛佐也自伯子男有大夫無卿無卿無命卿也王制小國二卿皆命於其君也帥賦以從諸侯賦國中出兵車甲士以從大國諸侯是以上能征下無姦慝征正慝惡今我小侯也言小侯削}
