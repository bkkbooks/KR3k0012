  - {type: variant, offset: 3051, length: 16, content: 兵甲器械欲其利也選練角材欲其精也, SBCK: 南三星車􅀐車􅀐之}
  - {type: variant, offset: 3051, length: 0, content: '', WYG: 毎軍一人副一人取威名素重者為之督以耕戰之務自是士馬精强無敵於天下矣五代周史曰顯徳初世宗自髙平還乃大閱武士帝親臨之帝自髙平之役覩諸軍未甚嚴整遂有退却至是命太祖皇帝一槩簡閱選武藝超絶者署為殿前諸班因是有散員散指揮内殿直散都頭鐡騎控鶴之號復命總戎者自龍捷虎捷以降一一選之老弱羸小者去之軍士歩伍無不精當由是}
  - {type: page-break, offset: 3051, content: '', id: KR3k0012_WYG_298-8a, image: WYG0895/WYG0895-0591c.png}
  - {type: variant, offset: 3051, length: 16, content: 兵甲器械欲其利也選練角材欲其精也, krp: 南三星車騎車騎之}
  - {type: variant, offset: 3053, length: 2, content: 器械, WYG: 之盛近代無比偏將尚書曰司馬掌邦政統六師平邦國左傳曰趙朔趙嬰齊為中軍大夫鞏朔趙穿為上軍大夫荀息趙同為下軍大夫韓厥為司馬又晉侯請於王戊申以黻冕命士㑹將中軍且為太傅於是晉國之盜逃奔於秦又楚子北師次於延沈尹將中軍子西將左子反將右將飲馬於西河而歸又魯宣公十年夏六月晉師救鄭荀林父將中軍先軫佐之士㑹將上軍郄克佐之趙朔將下軍欒書佐之公羊傳曰秋衛師入盛曷為或言帥師或不言帥師將尊師少稱將將卑師衆稱師論語曰王孫賈治軍旅奚其䘮衛靈公之無道得賈尚不䘮也史記項羽本紀曰於是梁為㑹稽守籍為禆將又項王召宋義與計事而大悅因以為上將項羽為魯公范増為末將又灌嬰傳曰嬰擊陳豨受詔别攻豨丞相侯敞斬敞及特將五人文頴注云特一之將後漢書西域傳曰大秦國一名梨鞬所治城周百餘里各有官曹文書置三十六將皆㑹議國事晉書曰張光字景武江夏鍾武人也身長八尺明眉目美聲音少為郡吏家世有部曲以牙門將伐吳有功遷江夏西部都尉又羊祜在軍常輕裘緩帶身不披甲鈴閣之下侍衛者不過十數人而頗以田漁廢政常}
