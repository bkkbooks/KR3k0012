  - {type: variant, offset: 2417, length: 0, content: '', SBCK: 士㑹將上軍郄克佐之趙朔將下軍欒書佐之公羊曰秋衛師入盛昌爲或言帥師或不言帥師將尊師少稱將將卑師衆稱師論語曰王孫賈治軍旅奚其喪衛靈公無道得賈免喪也史記項羽本紀曰於是梁爲㑹稽守籍爲禆將又曰項王召宋義與計事而大􅀃之因置以爲上將軍項羽爲魯公爲次將范増爲末將又灌嬰傳曰嬰擊陳狶受詔別攻狶丞相侯敝斬敝及特將五人文頴注云特一之將後漢書西域傳曰大秦國一名梨鞬所治城周百餘里各有官曹文書置三十六將皆㑹議國事晉書曰張光字景武江夏鐘武人也身長八尺明眉目美音聲少爲郡吏家丗有部曲以牙門將伐呉有功遷江夏西部都尉又曰羊祜在軍常輕裘緩帶身不􅀍甲鈴閤之下侍衛者不過十數人而頗以田漁廢政甞欲夜出軍司徐胤執棨當營門曰將軍都督萬里安可輕脫將軍之安危亦國家之安危也胤今日若死此門乃開耳祜改容謝之此後稀出矣又曰吾彦爲小將級呉大司馬陸抗抗竒其勇略將拔用之患衆情不允乃㑹諸將密使人佯狂􅋞刀跳躍來坐諸將皆懼而走惟彦不動舉几拒之衆服其勇乃擢用焉又天文志曰}
