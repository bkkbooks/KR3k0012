  - {type: variant, offset: 3090, length: 3, content: 闔閭試, SBCK: 狼一星在東南狼爲野將主侵掠也色有常欲不動也後周書曰賀拔岳事尔朱榮以定䇿功授前將軍時万俟醜奴僭稱大號關中騷動朝廷深以爲憂榮將岳討之岳私謂}
  - {type: variant, offset: 3090, length: 3, content: 闔閭試, WYG: 天髙二曰邊將又參白獸之體}
  - {type: variant, offset: 3090, length: 3, content: 闔閭試, krp: 狼一星在東南狼爲野將主侵掠也色有常欲不動也後周書曰賀拔岳事尔朱榮以定䇿功授前將軍時万俟醜奴僭稱大號關中騷動朝廷深以爲憂榮將岳討之岳私謂}
  - {type: variant, offset: 3094, length: 0, content: '', SBCK: 兄勝曰醜奴擁􅁗隴之兵足爲勍敵若岳徃而無功罪責立至假克定恐䜛愬生焉勝曰汝欲何計自安岳曰請尔朱氏一人爲元帥岳副貳之則可矣勝以爲然乃請於榮榮大恱乃以天光爲雍州刺史以岳爲衛將軍左都督隋書曰大業九年徴天下兵募}
  - {type: page-break, offset: 3094, content: '', id: KR3k0012_SBCK_298-7a}
  - {type: variant, offset: 3094, length: 0, content: '', WYG: 中三星横列三將也北曰左眉主左將西北曰右肩主右將故皇帝占參應七將七將大天下兵精又南三星騎陣將軍騎將也南三星車騎車騎之中將也又狼一星在東南狼為野將主侵掠也色有常欲不動也後周書曰賀㧞岳事爾朱榮以定䇿功授前將軍時万俟醜奴僣稱大號關中騷動朝廷深以為憂榮將岳討之岳私謂其兄勝曰醜奴擁秦隴之兵足為勍敵若岳徃而無功罪立至假使克定恐讒愬生焉勝曰汝欲何計自安岳曰請爾朱氏一人為元帥岳副帥之則可矣勝以為然乃請於榮榮大悅即以天光為雍州刺史以岳為衛將軍左都督隋書曰大業九年徴天下兵募}
