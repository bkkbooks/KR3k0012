  - {type: variant, offset: 1868, length: 481, content: 人百人學戰教成千人千人學戰教成萬人萬人學戰教成三軍之眾大戰之法百萬之師故能成大功也衛公兵法曰諸兵士將戰身貌尪弱不勝衣甲又戎具所施理須堅勁須簡取強兵并令試練器仗兵須徹扎陷堅皆須取甲試令所射然始取中又曰每營中兩廂置土馬十二疋大小如常馬真鞍令士卒擐甲冑櫜弓矢櫜音高佩刀劍持矛楯左右上下以便習其事又教旗法曰凡教旗於平原曠野登高遠視處大將居其上南向左右各置鼓一十二面角一十二具左右各樹五色旗六纛居前列旗節次之左右衙官駐隊如偃月形為後騎下臨平野使士卒目見旌旗耳聞鼓角心存號令乃命諸將分為左右皆去兵刃精新甲冑幡幟分為左右廂各以兵馬使為長班布其次陣間容陣隊間容隊曲間容曲以長參短以短參長廻軍轉陣以後為前以前為後進無奔迸退無趨走以正合以奇勝聽音覩麾乍合乍離於是三令五申白旗點鼓音動則左右廂齊合朱旗點角音動左右廂齊離離之與合皆不離中央之地左廂陽向西旋右廂陰向東旋左右各復本初白旗棹鼓音動左右各雲蒸鳥散彌川絡野然而不失部隊之踈密朱旗棹角音動則左右各復本初前後左右無差尺寸散則法天聚則法地如此三合而三離三聚而三散不如法者吏士之罪從軍令於是大將出五彩旗一十二口各樹於左右廂陣前每旗命壯勇士, WYG: ''}
