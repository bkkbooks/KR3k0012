  - {type: variant, offset: 533, length: 0, content: '', SBCK: 霹靂破城南髙禖石髙禖中宫求子象也賈后將誅之應曹嘉之晉紀曰諸葛誕以氣邁稱常􅀝柱讀書霹靂震其柱誕自􅀂列女後傳曰}
  - {type: variant, offset: 533, length: 0, content: '', WYG: 霹靂破城南髙禖神石中宫求子祠也賈后將誅之應曹嘉之晉紀曰諸葛誕以氣量稱常倚柱讀書霹靂震其柱誕自若列女後傳曰}
  - {type: variant, offset: 533, length: 0, content: '', krp: 霹靂破城南髙禖石髙禖中宫求子象也賈后將誅之應曹嘉之晉紀曰諸葛誕以氣邁稱常倚柱讀書霹靂震其柱誕自若列女後傳曰}
  - {type: variant, offset: 534, length: 1, content: 陰, SBCK: 南李叔卿爲功曹應舉孝廉同時應人害之使婢宣言叔卿􅁋其寡妹同舉人詣尹以骨􅁏相姧不合應孝廉叔卿杜門自絶女妹傷􅀍􅁋之名遂到府門自殺叔卿亦自殺明巳無􅄽也後三年霹靂害叔卿者以其死屍置叔卿冡前其家收而葬之秋又雷發其冡􅀇中記曰玉門之西有一國國中有山山上有人􅀊􅀊出石子林反數千輸廟中名曰霹靂給霹靂用從春雷出日減至秋而盡搜神記曰扶風楊道和於田中霹靂擊之道和以鋤格折其左肱遂落地不得去色如丹目如鏡毛角長三尺狀如六畜似獮猴續搜神記曰呉興人章荀者五月中於田耕以飯籮置菰裏晚於菰中伺之見一大虵偷其食荀即以鉟歩悲反义之虵便走去荀乗船逐之至一坂有穴虵便入穴但聞號哭云人斫傷某甲或云當如何或云付雷公令霹靂殺奴須􅁷雲􅀨􅁳合震電傷荀荀於是跳梁大罵云天公我貧窮展力耕墾虵來偷食我飯罪在虵反來霹靂我是無知雷公若來今當以鉟斫汝腹破須􅁷雲}
  - {type: page-break, offset: 534, content: '', id: KR3k0012_SBCK_013-7a}
  - {type: page-break, offset: 534, content: '', id: KR3k0012_SBCK_013-7b}
  - {type: variant, offset: 534, length: 1, content: 陰, WYG: 南李叔卿為功曹應舉孝亷同時應人害之使婢宣言叔卿淫其寡妹同舉人詣尹以骨肉相奸不合應孝亷叔卿杜門自絶女妹傷被淫之名遂到府門自殺叔卿亦自殺明已無􅄽也後三年霹靂害叔卿者以其死屍置叔卿冢前其家收而葬之秋又震發其塚𤣥中記曰玉門之西有一國國中有山山上有人歲歲出石􅀈字林反數千輸廟中名曰霹靂碪給霹靂用從春雷出碪日減至秋而盡搜神記曰扶風楊道和于田中霹靂擊之道和以鋤格折其左股遂落地不得去色如丹目如鏡角長三尺狀如六畜似獼猴續搜神記曰吳興人章荀者五月中于田耕以飯蘿置菰裏晩于菰中伺之見一大蛇偷其食食荀即以鉟少悲切斫之蛇便走去荀乗船逐之至一坂有穴蛇便入穴但聞號哭云人斫傷某甲或云當如何或云付雷公令霹靂殺奴須㬰雲}
  - {type: page-break, offset: 534, content: '', id: KR3k0012_WYG_013-11a, image: WYG0893/WYG0893-0141a.png}
