  - {type: variant, offset: 2077, length: 451, content: 於東國雪山峙於西域岐昌發詠於來思姬滿申歌於黃竹曹風以麻衣比色楚謠以幽蘭儷曲盈尺則呈瑞於豐年袤丈則表沴於陰德其為狀也散漫交錯氛氳蕭索藹藹浮浮瀌瀌弈弈連翩飛灑徘徊委積始緣甍而冒棟終開簾而入隙既因方而為圭亦遇圓而成璧眄隰則萬頃同縞瞻山則千巖俱白於是臺如重璧逵如蓮璐庭列瑤階林挺瓊樹皓鶴奪鮮白鷳失素楚辭九辯曰雪霰紛揉女救反又曰魂來歸兮北方不可止增冰峨峨飛雪千里些蘇笴反又曰霰雪紛其無恨些雲霏霏而承宇些司馬相如美人賦曰時既西夕玄陰晦冥涼風蕭然素雪飄零伏系之雪賦序曰結陰凝雪皎如帔素謝靈運詩曰明月照積雪朔風勁且哀樂府歌詩曰皓如山上雪皎如雲間月聞君有兩意故來相決絕庾肅之雪讚曰皓若天漢色踰玉粲李顒悲四時曰雲黮甚徒敢反䨴徒對反以時興雪聯翩而驟密枯林皦如瓊幹空岫朗若玉室王韶之詠雪離合曰霰先集兮雪霏霏散輝素兮被詹庭曲室寒兮朔風厲川陸涸兮百籟鳴霰釋名曰霰星也冰雪相摶補各反如星而散說文曰霰積雪也從雨散聲詩曰如彼雨雪先集維霰霰暴雪也箋云雪自上遇溫氣而摶謂之霰爾雅曰雨霰為消雪郭璞注云霰水雪雜下故謂消雪又曰雨雪相和為霰尚書洪範, WYG: ''}
