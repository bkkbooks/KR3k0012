  - {type: variant, offset: 1690, length: 304, content: 海曰勾芒北海曰玄冥西海曰蓐收河伯雨師請使謁者於殿下門內引祝融五神皆驚相視而歎語林曰王子猷居山陰大雪夜開室命酌四望皎然因詠招隱詩忽憶戴安道時在剡乘興棹舟經宿方至既造門而返或問之對曰乘興而來興盡而返何必見戴安道汜勝之書曰取雪汁漬原蠶屎五六日待釋手挼之和穀種之能御旱故謂雪為五穀精也山海經曰由首之山小咸之山空桑之山並冬夏有雪論衡曰雲霧雨之徵也夏則為露冬則為霜溫則為雨寒則為霜雨露凍凝者其由地發不從天降琴操曰曾子耕太山下雨雪不得歸思父母作梁山操廣志曰雲南郡四五月猶積雪皓代郡以五月山陰猶宿雪八月末復雪宋玉王對問曰客有歌於郢中始曰下俚巴人國中屬而和者數千人其為陽春白雲國中屬而和者不過數十人是其曲彌高而和彌寡宋謝惠連雪, SBCK: ''}
