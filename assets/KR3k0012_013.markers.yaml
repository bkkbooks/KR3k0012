  - {type: variant, offset: 432, length: 0, content: '', WYG: 圖畵之工圖雷之狀纍纍如連鼓形於其旁别畫一人狀貎若力士之容謂之雷公使之左手引連鼔右手推之世人信之莫不謂然始復原之虛妄之象也霹靂釋名}
