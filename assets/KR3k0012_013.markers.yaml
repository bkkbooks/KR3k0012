  - {type: variant, offset: 416, length: 5, content: 恭衣鶴氅雪, SBCK: 襃母生時畏雷襃至母終後天雷輙還遶墓曰襃在此褒在此齊書曰永明八年六月十日晡時雷有黃光照地􅃺如金色占曰人君有德或謂之榮光周斐汝南先賢傳曰蔡順母平生畏雷自亡後毎有雷震順輒環塚泣曰順在此韓詩外傳曰東海之上有勇士曰菑丘訢音忻以勇㳺於天下過神淵飲馬沉訢去朝服拔劒而入三日三夜殺二蛟一龍而出雷神隨而擊之十日十夜眇其左目王歆孝子傳曰笁彌字道綸父生時畏雷毎至天隂輒馳至墓伏墳哭有白兎在其左右搜神記曰義興人周永和出行因日暮路旁小屋}
