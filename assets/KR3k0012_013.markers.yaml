  - {type: variant, offset: 4210, length: 374, content: 之應則降地鏡圖曰視山川多露無霜其下有美玉徐整長曆曰北斗當崑崙山氣運注天下春夏為露崔豹古今注曰薤露喪歌也言人命如薤上露易晞滅也其一章曰薤上露何易晞明朝更復落人死何時歸瑞應圖曰露色濃甘者為之甘露王者施德惠則甘露降其甘草木又曰甘露者美露也神靈之精仁瑞之澤其凝如脂其甘如飴一名膏露一名天酒又曰王者德至於天和氣感則甘露降於松柏山海經曰仙丘降甘露人常飲之又曰諸沃之野搖山之民甘露是飲不壽者八百歲列星圖曰天乳一星在氏比主甘露占若明而潤則甘露降不然則否也楚辭曰朝飲木蘭之墜露夕棌秋菊之落英張衡奏事曰飛塵增山霧露增海曹植魏德論曰玄德洞幽飛化上蒸甘露以降蜜淳冰凝覩陽弗晞瓊爵是承獻之帝朝以明聖徵曹植承露盤銘敘曰夫形能見者莫如高物不朽者莫如金氣之清者莫如露盛之安者莫如盤乃詔有司鑄銅建承露盤于芳林園東晢集曰薄冰凝池非宗廟之寶零露垂林非綴冕之節張載羽扇賦曰濯以雲精拂以芝露, SBCK: 御覽卷第十三}
