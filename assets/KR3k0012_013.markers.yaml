  - {type: 'tls:seg', offset: 423, content: '', id: KR3k0012_CHANT_013-9a.5}
  - {type: variant, offset: 423, length: 0, content: '', SBCK: 不出三年其國亡又曰􅀄雷從金門起上旬旱下田熟一曰􅀊中兵革起也風俗通曰雷不蓋醬俗􅀃令人腹中雷鳴丗􅀃曰曹爽將誅夢二虎衘雷公若二升椀放着庭中華陽國志曰曹公從容謂先主曰天下英雄唯使君與操爾夲初之徒不足數也先主方食失匕箸㑹雷大震先主曰聖人言迅雷風烈必變良有以也一震之威乃可致此公亦悔失言酈炎對事曰或曰雷震驚百里何以知之炎曰以其數知之夫陽動爲九其數三十六隂静爲八其數三十二一陽動二隂故曰百里雷雜兵書曰雷電霹靂破軍中樹木屋舎者徙去􅁻也雷電風所從來不可逆而相代冝愼之也物理論曰積風成雷王充論衡曰子路感雷精而生尚剛好勇親涉衛難結纓而死孔子聞而覆醢毎聞雷鳴乃中心惻怛亦復如之故後人忌焉以爲常也又曰盛夏之}
  - {type: page-break, offset: 423, content: '', id: KR3k0012_SBCK_013-5b}
  - {type: page-break, offset: 423, content: '', id: KR3k0012_SBCK_013-6a}
  - {type: variant, offset: 423, length: 0, content: '', WYG: 不出三年其國亡又初雷從金門起上田旱下田熟一曰歲終兵革起風俗通曰雷不蓋醬俗說令人腹中雷鳴世說曰曹爽將誅夢二虎御雷公若二升椀放著中庭華陽國志曰曹公從容謂先主曰天下英雄唯使君與操耳夲初之徒不足數也先主方食尖匕箸㑹雷大震先主曰聖人言迅雷風烈必變良有以也一震之威乃可致此曹公亦悔失言酈炎對事曰或曰雷震驚百里何以知之炎曰以其數知之夫陽動爲九其數三十六隂靜爲八其數三十二一陽動二隂故曰百里雷雜兵書曰雷電霹靂破軍中樹木屋舎者徙去吉也雷電風所從來不可逆而伐宜慎之也物理論曰積風成雷王充論衡曰子路感雷精而生尚剛好勇親渉衛難結纓而死孔子聞而覆醢每聞雷鳴則中心惻怛亦復如之故後人忌焉以爲常也又盛夏之}
  - {type: page-break, offset: 423, content: '', id: KR3k0012_WYG_013-8b, image: WYG0893/WYG0893-0139d.png}
  - {type: page-break, offset: 423, content: '', id: KR3k0012_WYG_013-9a, image: WYG0893/WYG0893-0140a.png}
  - {type: variant, offset: 423, length: 0, content: '', krp: 不出三年其國亡又曰𥘉雷從金門起上旬旱下田熟一曰歲中兵革起也風俗通曰雷不蓋醬俗說令人腹中雷鳴丗說曰曹爽將誅夢二虎衘雷公若二升椀放着庭中華陽國志曰曹公從容謂先主曰天下英雄唯使君與操爾夲初之徒不足數也先主方食失匕箸㑹雷大震先主曰聖人言迅雷風烈必變良有以也一震之威乃可致此公亦悔失言酈炎對事曰或曰雷震驚百里何以知之炎曰以其數知之夫陽動爲九其數三十六隂静爲八其數三十二一陽動二隂故曰百里雷雜兵書曰雷電霹靂破軍中樹木屋舎者徙去吉也雷電風所從來不可逆而相代冝愼之也物理論曰積風成雷王充論衡曰子路感雷精而生尚剛好勇親涉衛難結纓而死孔子聞而覆醢毎聞雷鳴乃中心惻怛亦復如之故後人忌焉以爲常也又曰盛夏之}
  - {type: variant, offset: 424, length: 0, content: '', SBCK: 雷電疾擊殺}
