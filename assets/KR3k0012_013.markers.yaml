  - {type: variant, offset: 537, length: 4, content: 雪二頃宋, krp: 字題臂丗說曰王丞相見郭景純君可試爲作一卦卦成郭意惡云公有震厄王問可有消伏理否郭曰公能命駕西出數里得一栢樹截短如公長置寢處灾可消王悉依其語數日中果震栢樹碎門内子弟皆稱慶桓譚新論曰天下有鶴鳥郡國皆食之三輔俗獨不敢取之或雷霹靂起原夫天不獨左彼而右此殺鳥適與雷遇耳愽物志曰九眞有狸牛出谿上或闘岸上家牛皆怖或遮捕即霹靂號曰神牛山海經曰半石之山有草名曰嘉榮服之不畏霆不畏霹靂琴操曰楚髙梁子出遊九皐之澤覽漸水之臺張罛置罟於荆山臨曲池而漁而疾風霣于敏反雹雷電奄冥天火四起霹靂下臻玄鶴翔其前白虎吟其後乃援琴而歌歎作霹靂引正論曰里語云州縣符如霹靂得詔書但桂壁電釋名曰電殄也乍見則殄滅也說文曰電隂陽激燿也從雨申聲易曰离爲電又曰雷電皆至豐君子以折獄致刑詩曰燁燁震電禮記月令曰春分之日玄鳥至後五日雷乃發聲後五日始電傳曰隱九年三月癸酉大雨震電易稽覽圖曰隂陽和合爲電輝輝也其光長春秋元命包曰隂陽激爲電史記天官}
