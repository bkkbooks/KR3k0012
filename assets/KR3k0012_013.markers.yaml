  - {type: variant, offset: 427, length: 3, content: 神仙中, SBCK: 有隂過飲食不潔則天怒殺之隆隆之聲天怒之音也此虚言也道士劉春楚王英使食不潔春死必遇雷也建武四年六月夏雷擊㑹稽鄞魚巾反縣羊五頭羊有何隂過而雷擊之乎俗以爲天取龍殺}
