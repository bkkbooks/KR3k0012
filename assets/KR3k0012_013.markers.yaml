  - {type: variant, offset: 2093, length: 186, content: 姬滿申歌於黃竹曹風以麻衣比色楚謠以幽蘭儷曲盈尺則呈瑞於豐年袤丈則表沴於陰德其為狀也散漫交錯氛氳蕭索藹藹浮浮瀌瀌弈弈連翩飛灑徘徊委積始緣甍而冒棟終開簾而入隙既因方而為圭亦遇圓而成璧眄隰則萬頃同縞瞻山則千巖俱白於是臺如重璧逵如蓮璐庭列瑤階林挺瓊樹皓鶴奪鮮白鷳失素楚辭九辯曰雪霰紛揉女救反又曰魂來歸兮北方不可止增冰峨峨飛雪千里些蘇笴反又曰霰雪紛其無恨些雲霏霏而承宇些司馬相如美人, SBCK: 􅀇}
