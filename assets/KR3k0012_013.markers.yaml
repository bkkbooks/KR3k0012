  - {type: variant, offset: 534, length: 1, content: 陰, krp: 南李叔卿爲功曹應舉孝廉同時應人害之使婢宣言叔卿淫其寡妹同舉人詣尹以骨肉相姧不合應孝廉叔卿杜門自絶女妹傷𬒳淫之名遂到府門自殺叔卿亦自殺明巳無愆也後三年霹靂害叔卿者以其死屍置叔卿冡前其家收而葬之秋又雷發其冡玄中記曰玉門之西有一國國中有山山上有人歲歲出石子林反數千輸廟中名曰霹靂給霹靂用從春雷出日減至秋而盡搜神記曰扶風楊道和於田中霹靂擊之道和以鋤格折其左肱遂落地不得去色如丹目如鏡毛角長三尺狀如六畜似獮猴續搜神記曰呉興人章荀者五月中於田耕以飯籮置菰裏晚於菰中伺之見一大虵偷其食荀即以鉟歩悲反义之虵便走去荀乗船逐之至一坂有穴虵便入穴但聞號哭云人斫傷某甲或云當如何或云付雷公令霹靂殺奴須臾雲}
  - {type: variant, offset: 536, length: 0, content: '', SBCK: 輒開乃更霹靂向穴中諸蛇死者數十莊子曰隂陽錯行天地大駭於是有雷有霆劉義慶丗􅀃曰夏侯􅀇字太􅀄嘗􅀝柱讀書時暴􅀨霹靂破所􅀝柱衣服焦然􅀇神色無變讀書如故異苑曰佛佛虜凶虐暴忍常自言國名佛佛則是佛中之佛㝷􅀍震而死旣葬而後就冡中霹靂其柩引身出外題背四字表其凶逆之國也又曰滕放太元􅀄夏枕文石枕卧忽暴雷雨震其枕枕四解傍人莫不怖懾而放微覺有聲不足爲驚又曰元嘉十九年京口霹靂殺人}
  - {type: variant, offset: 536, length: 5, content: 赤雪二頃宋, WYG: 㝠合震電傷荀荀于是跳梁大罵云天公我貧窮展力耕墾蛇來偷食我飯罪在蛇反來霹靂我是無知雷公若來當以鉟斫汝腹破須㬰雲雨輒開乃更霹靂向穴中諸蛇死者數十莊子曰隂陽錯行天地大駭於是有雷有霆劉義慶世說曰夏侯𤣥字太初嘗倚柱讀書時暴雨霹靂破所倚柱衣服焦然𤣥神色無變讀書如故異苑曰狒狒虜凶虐暴忍常自言國名狒狒則是狒中之狒尋被震而死既葬而後就塚中霹靂其柩引身出題背四字表其凶逆而然也又滕放太元初夏枕文石枕卧忽暴雨雷震其枕枕四解傍人莫不怖懾而放微覺有聲不足為驚又元嘉十九年京口霹靂殺人亦自題背世說曰王丞相見郭景純君可試為作一卦卦成郭意惡云公有震厄王問可有消伏理否郭曰公能命駕西出數里得一栢樹截短如公長置寢處灾可消王悉依其言數日中果震栢樹碎門内子弟皆稱慶桓譚新論曰天下有鸛鳥羣國皆食之三輔俗獨不敢取之或取即雷霹靂起原夫天不獨左彼而右此殺鳥適與雷遇耳博物志曰九真有狸牛出谿上或鬬岸上家牛皆怖或遮捕即霹靂號曰神牛山海經曰半石之上有草名曰加榮服之不畏霆琴操曰楚膏梁子出遊九臯之澤覽漸水之臺張罛置罟于荆山臨曲池而漁疾風霣音殞雹雷電奄㝠天火四起霹靂下臻𤣥鶴翔其前白虎吟其後乃援琴而歌作霹靂引正論曰俚語云州縣符如霹靂得詔書但掛壁電釋名曰電殄也乍見則滅也說文曰電隂陽激燿也從雨甲聲易曰離為電又曰雷電皆至豐君子以折獄致刑詩曰􅂱􅂱震電傳曰隱九年三月癸酉大雨震電易稽覽圖曰隂陽和合為電輝輝也其光長春秋元命苞曰隂陽激為電史記天官}
