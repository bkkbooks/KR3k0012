  - {type: variant, offset: 622, length: 69, content: 郭元振為安西大都護時西突厥首領烏質勒部落強盛款塞通和元振就其牙帳計會軍事時天大雪元振立於帳前與烏質勒言議須臾雪深風凍元振未嘗移足烏質勒年老, krp: 王戎㓜而頴悟神彩秀徹視日}
  - {type: variant, offset: 626, length: 249, content: 安西大都護時西突厥首領烏質勒部落強盛款塞通和元振就其牙帳計會軍事時天大雪元振立於帳前與烏質勒言議須臾雪深風凍元振未嘗移足烏質勒年老不勝寒苦會罷而死錄異傳曰漢時大雪積地丈餘洛陽令自出案行見民家皆除雪出有乞食者至袁安門無有行路謂安已死令人除雪入戶見安僵臥問何不出安曰大雪人皆餓不宜干人令以為賢舉為孝廉韓詩外傳曰凡草木花多五出雪花獨六出雪花曰霙音英皇甫謐高士傳曰世莫知焦先所出野火燒其廬先因露寢冬雪大至先袒臥不移人以為死就視如故穆天子傳曰日中大雪北風雨雪有凍死人天子作黃竹詩三章以哀民曰我徂黃竹負閟寒閟閉, WYG: 之笑開口流光今電是}
