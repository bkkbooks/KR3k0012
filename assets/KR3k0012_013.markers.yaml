  - {type: variant, offset: 433, length: 42, content: 太傅謝安雪驟降公欣然曰白雪紛紛何所似兄子客兒曰散監空中差可擬兄女道韞曰未若柳絮因風起, SBCK: 圖􅀞之工圖雷之􅃺纍纍如連鼓形}
  - {type: variant, offset: 433, length: 0, content: '', WYG: 霹靂折也震戰也所擊輒破若攻戰也說文曰震霹靂折物也穀梁傳曰疾雷為霆霓為急雷為霹靂爾雅曰疾雷為霆霓郭璞曰雷之急激者為霹靂春秋繁露曰王言下不從則金不從革而秋多霹靂霹靂者金氣其音商故應霹靂五經通義曰震與霆皆霹靂也晉安帝紀曰義熙二年六月震}
