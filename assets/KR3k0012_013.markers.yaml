  - {type: variant, offset: 422, length: 0, content: '', SBCK: 有女子留􅀫一更後有喚阿香女應諾官喚汝推雷車女遂辭周云有官事須去俄而大雷旣明周自異其處返㝷唯見一新􅃁􅃁只有馬跡東方朔神異記曰八方之荒有石鼓其徑千里撞之其音即雷也天以此爲喜怒之威盛􅀪之荆州記曰朝陽縣樊重母畏雷爲母立石室以避之悉以文石爲階砌至今猶存孟奥北征記曰凌雲臺南角一百歩有白石室名避雷室又曰臨賀有石方二丈石有磨刀斧迹春夏常明浄其迹甚新秋冬則苔穢故爲雷公磨石莊子曰隂陽交爭爲雷文子曰夫目察秋毫之末耳不聞雷霆之聲耳調金石之音目不見太山之形小有所志必大有所忘曽子曰隂陽之氣俱則雷淮南子曰隂陽相薄感而爲雷又曰䕃不祥之木爲雷霆所撲又曰庻女叫天雷電下擊景公臺殞支體傷折海水大出庶賤之女齊之少寡婦人也無子不嫁事姑謹敬姑無男有女女利財令母嫁婦婦終不肯女殺母以誣寡婦婦不能自明􅁈結呌天天爲作雷電下擊景公之臺殞壞之也傷毀景公支體水爲之溢又曰雷霆之聲可以鍾鼓冩也風􅀨之變可以音律和也抱朴子曰雷天之鼓也鶡冠子曰昔者有道之君取政非取於耳目也夫耳之生聦目之生明兩葉蔽目不見太山兩豆塞耳不聞雷霆孫子曰擊電無停光疾雷無餘聲河圖帝通紀曰雷天地之鼓河圖曰玉虎晨鳴雷聲也又曰黃帝以雷精超六韜曰武王伐紂􅀨甚雷疾武王之乗雷震而死周公曰天不祐周矣太公曰君秉德而受之不可如何也伏侯古今注曰成帝建始四年無雲而風天雷如擊連鼓音可四五刻隆隆如車聲山海經曰羭音榆次之山有鳬名橐􅖦服之不畏電􅖦音肥匪備三音又曰飛魚如豚赤文無羽食之辟兵不畏雷師曠占曰春雷初起其音恪恪霹靂者所謂雄雷旱氣也其鳴依依音不大霹靂者謂之雌雷水氣也又曰春分有音如雷非雷音在地中其所住者兵起其主無雲而雷名曰天狗}
  - {type: page-break, offset: 422, content: '', id: KR3k0012_SBCK_013-4a}
  - {type: page-break, offset: 422, content: '', id: KR3k0012_SBCK_013-4b}
  - {type: page-break, offset: 422, content: '', id: KR3k0012_SBCK_013-5a}
  - {type: variant, offset: 422, length: 0, content: '', WYG: 出都日暮路傍小屋中有女子留宿一更後有喚阿香者女應諾喚者曰官喚女推雷車女遂辭周云有官事須去俄而大雷既明周自異其處返尋惟見一新塚塜上有馬跡東方朔神異經曰八方之荒有石鼔其徑千里撞之其音即雷也天以此爲喜怒之威盛宏之荆州記曰朝陽縣樊重母畏雷重爲母立石室以避之悉以文石爲階砌至今猶存孟奥北征記曰凌雲臺南角一百歩有白石室名曰避雷室又曰臨賀有石方十二丈有磨刀斧跡春夏常明凈其迹甚新秋冬則苔穢故爲雷公磨石莊子曰隂陽交爭爲雷文子曰夫耳調金石之音而不聞雷霆之聲目察秋毫之末而不見太山之形小有所戀大有所忘曾子曰隂陽之氣俱則爲雷淮南子曰隂陽相薄感而爲雷又䕃不祥之木爲雷霆所撲又庶女呌天雷電下擊景公臺殞支體傷折海水大出庶賤之女齊之少寡婦人也無子不嫁事姑謹敬姑無男有女女利母財令母嫁婦婦終不肯女殺母以誣寡婦婦不能自明寃結呌天天爲作雷電下擊景公之臺殞壊之也傷毀景公支體水爲之溢又雷霆之聲可以鐘鼓寫也風雨之變可以音律和也抱朴子曰雷天之鼓也鶡冠子曰昔者有道之君取政非取于耳目也夫耳之生聽目之生明兩葉蔽目不見太山兩豆塞耳不聞雷霆孫子曰掣電無停光疾雷無餘聲河圖帝通紀曰雷天地之鼓河圖曰玉虎晨鳴雷聲也又黄帝以雷精起六韜曰武王伐紂雨甚雷疾武王之乗雷震而死周公曰天不祐周矣太公曰君秉徳而受之不可如何也伏侯古今注曰成帝建始四年無雲而風天雷如擊連鼓音可四五刻隆如車聲山海經曰羭音榆次之山有鳬名橐􅖦服之不畏電􅖦音肥匪備三音又飛魚如豚赤文無羽食之辟兵不畏雷師曠占曰春雨初起其音恪恪霹靂者所謂雄雷旱氣也其鳴依依音不大霹靂者謂之雌雷水氣也又春分有音如雷非雷音在地中其所住者兵起其上無雲而雷名曰天狗}
