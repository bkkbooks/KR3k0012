  - {type: variant, offset: 622, length: 69, content: 郭元振為安西大都護時西突厥首領烏質勒部落強盛款塞通和元振就其牙帳計會軍事時天大雪元振立於帳前與烏質勒言議須臾雪深風凍元振未嘗移足烏質勒年老, SBCK: 王戎㓜而頴悟神彩秀徹視日}
  - {type: variant, offset: 622, length: 3, content: 郭元振, WYG: 王戎㓜而穎悟神彩秀徹視日不眩裴楷目之曰戎眼爛如巖下電神異經曰東王公與玉女投壺梟而脫悞不接者天}
