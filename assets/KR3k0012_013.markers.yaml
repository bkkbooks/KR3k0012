  - {type: variant, offset: 963, length: 237, content: 人以為冤曹攄別傳曰攄為洛陽令于時大雪而宮門夜忽失行馬攄曰此非他窮理可保明必是門士以療寒驗之而具服王子年拾遺記曰穆王東至大𣟵音奇之谷西王母來進嵰丘儼反州甜雪嵰州去玉門三十萬里地多寒雪霜露著木石之上皆融而甘可以為菓也又曰周靈王起昆明之臺召諸方士有二人乘飛遊之輦上席酣醒天赤旱地裂其一人先唱能為霜雪王乃請焉於是引氣一吸則雲起雪飛又曰廣延之國去燕七萬里在扶桑東其地寒盛夏之日冰厚至丈常雨青雪冰霜之色皆如紺碧沙州記曰自龍涸至大浸川一千九百里晝夜蕭蕭常有風寒七月雨便是雪遙望四山皓然皆白, SBCK: ''}
