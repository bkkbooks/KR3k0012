  - {type: variant, offset: 2529, length: 1900, content: 行傳曰盛陰雨雪凝滯而冰寒陽氣薄之不相入則散而為霰故沸湯之在閉器而湛於寒泉則為冰及雪之銷亦冰解而散此驗也韓詩薛君注曰霰霙也曾子曰陰之專氣為霰露釋名曰露慮也覆慮物也許慎說文曰露潤澤也從雨路聲詩曰厭於接反浥行露豈不夙夜謂行多露又曰蒹葭蒼蒼白露為霜又曰湛露天子燕諸侯也湛湛露斯匪陽不晞又曰野有蔓草零露摶徒官反又曰野有蔓草零露瀼瀼如章反禮曰立秋後五日白露降又曰季冬行秋令則白露早降又曰天不愛其道故天降甘露又曰春雨露既濡君子履之必有怵愓之心焉如將見之感時念親也又曰王所以為順而弗悖也天降甘露易通卦驗曰立秋白露下尚書中候曰堯時甘露降詩含神霧曰陽氣終白露為霜宋均曰白露行露也陽終陰用事故曰白露凝為霜也大戴禮曰露陰陽之氣也夫陰氣勝則凝為霜雪陽氣勝則散為雨露禮斗威儀曰君治政則軒轅之精散為甘露春秋繁露曰恩及於物順於人而甘露降春秋序曰桀無道露冬下春秋元命包曰霜以殺木露以潤草又曰陰陽散為露五經通義曰和氣津液凝為露露從地出吳越春秋曰子胥諫吳王王怒暮歸舉衣出宮宮中群臣皆曰天無霖雨宮中無泥露相君舉衣行高何為子胥曰吾以越諫王王心迷不聽吾言宮中生草棘霧露沾吾衣群臣聞之莫不悲傷漢書曰宣帝元康元年甘露降未央宮大赦天下又曰平帝永平十七年自春迄夏多甘露降謁元陵太常丞上言陵樹葉上有甘露令百官採之又曰成帝幸河東祠后土甘露降京師又曰宣帝詔曰乃者鳳凰集太山陳留甘露降未央宮宜赦天下後漢書曰桓帝永康元年秋八月魏郡言嘉禾生甘露降范曄後漢書曰明帝永平十七年甘露降于原陵謝承後漢書曰吳郡沈豐為零陵太守至官一年甘露降膏潤草木東觀漢記曰光武帝時甘露降四十五里又曰明帝永平十七年夢見先帝光烈皇后夢中喜覺悲不能寐明旦上陵其日甘露降於陵樹帝令百官採之帝伏御床流涕也魏志曰明帝鑄承露盤莖長一十二丈銅龍繞其根立於芳林園甘露乃降又曰明帝與東阿王詔曰昔先帝時甘露屢降於仁壽殿前靈芝生芳林園中自吾建承露盤已來甘露復降芳林園仁壽殿前晉書曰皇甫謐幼時有甘露降其柳樹謐每以食之謂蜜也晉中興書曰王者敬養耆老則甘露降於松柏尊賢容眾則竹葦受之甘露者仁澤也其凝如脂其美如飴宋書曰文帝元嘉中甘露頻降狀如細雪隋書曰李德饒趙郡柏人人也性至孝丁父憂單縗徒跣後甘露降其樹白鳩巢其廬豫章耆舊傳曰太守陳蕃臨郡二年甘露降汝南先賢傳曰新蔡鄭敬都尉高懿廳前有槐樹有白露類甘露懿問椽屬皆言是甘露敬曰明府德政未致甘露但樹汁耳懿不悅稱疾而去洞冥記曰勒畢國人長三寸有翼善言語戲笑因名語國飲丹露者曰初出有露汁如朱也又曰東方朔遊吉雲之地漢武帝問朔曰何名吉雲曰其國俗常以雲氣占吉凶若吉樂之事則滿室雲起五色照著於草樹皆成五色露露味甘帝曰吉雲五色露可得以嘗不朔乃東走至夕而還得玄黃青露盛之琉璃器以授帝帝遍賜群臣得露嘗者老者皆少疾病皆愈又曰元封二年數過國獻能言龜一頭長一尺二寸東方朔曰唯承樹露以飲之王子年拾遺記曰崑崙山有甘露望之色如丹著木石則皎然如霜雪寶器承之如飴人君聖德則下周處風土記曰白鶴性警至八月露降流於草上滴滴有聲則鳴述仙記曰八月一日作五明囊盛取百草頭露以之洗眼眼明也老子曰天地相合以降甘露莊子曰姑射之山有神人焉不食五穀吸風飲露鶡冠子曰聖德上及太清下及太寧中及萬靈則膏露下蘇子曰夫人一代若朝露之託桐葉耳其與幾何呂氏春秋曰伊尹說湯曰水之美者有三危之露三危西極山名和之美者揭雩之揭雩之露其色紫淮南子曰方諸取露於月高誘曰方諸陰燧也東方朔神異經曰西北海有人長二千里兩腳中間相去千里腹圍一千六百里但日飲天酒五斗張華云天酒甘露也又曰黃父以霧露為漿古史考曰太古之初民吮露精食草木實劉向說苑曰吳欲伐荊王令曰敢有諫者死舍人有少孺子者欲諫懷彈於後園露霑其衣者三朝王曰子求何苦露霑衣如是對曰園中有樹其端有蟬蟬高居悲鳴飲風噏露不知螗蜋在其后曲跗方無反欲取其蟬而螗蜋又不知黃雀居其后延頸欲啄之然黃雀又不知臣操彈丸在其下臣但捕其黃雀不覺露隰衣此者為窺其利而不思后患王聞之遂不伐荊又曰騰虵遊於霧露千里不止漢武帝故事曰帝作金莖擎玉杯以承雲表之露擬和玉屑服之以求仙又曰作銅承露槃上有仙人掌以承露也蔡邑月令章句曰露者陰液也釋為露凝為霜白虎通曰甘露者美露也降則物無不盛又曰露者霜之始寒即變為霜論衡曰甘露味如飴王者太平之應則降地鏡圖曰視山川多露無霜其下有美玉徐整長曆曰北斗當崑崙山氣運注天下春夏為露崔豹古今注曰薤露喪歌也言人命如薤上露易晞滅也其一章曰薤上露何易晞明朝更復落人死何時歸瑞應圖曰露色濃甘者為之甘露王者施德惠則甘露降其甘草木又曰甘露者美露也神靈之精仁瑞之澤其凝如脂其甘如飴一名膏露一名天酒又曰王者德至於天和氣感則甘露降於松柏山海經曰仙丘降甘露人常飲之又曰諸沃之野搖山之民甘露是飲不壽者八百歲列星圖曰天乳一星在氏比主甘露占若明而潤則甘露降不然則否也, WYG: 旗}
