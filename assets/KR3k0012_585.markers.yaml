  - {type: variant, offset: 936, length: 1, content: 寶, SBCK: 骨勁而荒猛也文章才力有似於此􅀂風骨乏采則鷙集翰林采乏風骨則雉竄文囿􅀂藻曜而髙翔固文章之鳴鳯也又曰括囊雜體功在銓別宫啇朱紫隨勢各配章表奏議則准的乎典雅賦頌歌詩則羽儀乎清麗符檄書移則揩式於明斷史論序注則軌範於覈要箴銘碑誄則體制於弘􅀷連珠七辭則從事於功艶此脩體而成勢隨變而立功者也雖復契㑹相叅節文牙雜譬五色之錦各以本采爲地矣又曰夫薑桂因地辛在本性文章㳂學能在天才故才自内發學以外也有學飽而才餒有才冨而學貧學貧者迍邅於事義才餒者劬勞於辭情此内外之殊分也是以屬意於文心與筆謀才爲盟主學爲輔佐合德丈采必覇才學􅄶狹雖羙少功才童學文冝正體制必以情志爲神明事義爲骨骾辭采爲肌膚宫啇爲聲氣然後品藻􅀇黄摛振金玉獻可替否以裁厥中斯綴思之􅁪數也夫文變無方意見浮雜約則義􅀌􅀶則辭叛變故多尤而爲事賤且才分不同思緒各異或製首以通尾或尺接以寸附然通製者盖寡接附者甚衆􅀂統緒失宗辭味必亂義脉不流則偏枯文體夫能懸識湊理然後節文自㑹如膠之粘木石之合玉矣是以四壯異力而六轡如琴馭文之法有似於此昔張湯疑奏而再却虞松草表而屢譴並事理之不明而辭旨之失調也及倪寛更草鍾㑹易字而漢武歎竒晉景稱善者乃理得而事明心敏而辭當也宋范曄獄中與諸生姪書以自序其略曰吾少􅈸學問年三十許始有尚耳自尔巳來轉爲心化至於所通處皆自得之胷懷常爲情志所託故當以意爲主以文傳意以意爲主則其旨必見以文傳意則其辭不流然後抽其芬芳振其金石耳金樓子曰王仲任言夫􅀃一經者爲儒生也傳古今者爲通人也上書奏事者爲文人也能精思著文連篇章爲鴻儒也􅀂劉子政楊子雲之列是也盖儒生轉通人通人爲文人文人轉爲鴻儒也又曰古之學者有二今之學者四焉夫子門徒轉相師授通聖人之經者謂之儒屈原宋玉枚乗長卿之徒止爲辭賦則謂文今之儒􅀶窮子史但能識其事不能通其理者謂之學至如不便爲詩閻纂善爲章奏如伯松􅀂此之流謂之筆吟詠風謡流連哀思者謂之文唯湏綺縠紛披宫徴靡曼脣吻適㑹情靈摇蕩潘安仁清綺􅀂是而評者止稱情切故知爲文之難也曹子建陸士衡皆文士觀其辭致側宻事語堅明雖不以儒者命家此亦悉通其義也􅀂夫今之俗也縉紳稚齒閭巷小生茍取成章貴在恱目龍首豕足隨時之冝牛頭馬髀強相附㑹夫挹酌道德憲章前言者君子所以行之也原憲云無財謂之貧學道不行謂之病末俗學徒頗或異此或假兹以爲􅇊術或狎之以爲戲􅀏未聞強學自立和}
