  - {type: variant, offset: 1569, length: 320, content: 為木鐸言施政教時天將命以號令天下文舞所執而鳴之以振文教樂書曰金鐸者形同木鐸以為金舌號令為度鳴而驚眾舞所執以振武教者也鄭注司馬職云掩上振之為摝摝者止行息氣也六軍三三而居其間相遠故振鐸以通之使軍眾知可進可止之節也司馬法曰鼓聲不過閶鼙聲不過闒鐸聲不過其琅也廣古今五行記曰晉愍帝建興四年晉陵人陳寵在田得銅鐸五枚皆有龍虎形大周正樂曰唐朝承周隋離亂之後樂懸散失獨無徵音國姓所闕知者不敢聞達其事天后末御史大夫李嗣真常密求之不得一旦秋爽聞砧聲有應之者在今弩營是當時英公宅又數年無由得之其後敬業舉兵敗走后瀦其宮嗣真乃求得喪車一鐸入而振之於東南隅果有應也遂掘之得石一段裁為四具補樂懸之散闕今享宗廟郊天掛簨簴者乃嗣真所得也鐃釋名曰鐃鐃也宮懸用之飾以流蘇禮記曰始奏, WYG: ''}
