  - {type: variant, offset: 1719, length: 919, content: 枚皆有龍虎形大周正樂曰唐朝承周隋離亂之後樂懸散失獨無徵音國姓所闕知者不敢聞達其事天后末御史大夫李嗣真常密求之不得一旦秋爽聞砧聲有應之者在今弩營是當時英公宅又數年無由得之其後敬業舉兵敗走后瀦其宮嗣真乃求得喪車一鐸入而振之於東南隅果有應也遂掘之得石一段裁為四具補樂懸之散闕今享宗廟郊天掛簨簴者乃嗣真所得也鐃釋名曰鐃鐃也宮懸用之飾以流蘇禮記曰始奏以文文擊鼓以驚眾也復亂以武武擊鐃而退也周禮曰金鐃止鼓鐃如鈴無舌者秉執而鳴之以止鼓也樂書曰金鐃小者似鈴執而鳴之以止鼓也舞武工人所執謂振而退武也大者懸而擊之象鍾形薄旁有二十四銑應律音而和樂也說文曰鉦鐃也鈴柄中上下通鉦也銑小鐃也軍法卒長執銑漢有鼓吹曲有鐃歌鐲周禮曰鼓人以金為鐲節鼓形如小鍾行鳴之以為鼓節也近代有大銅疊懸而擊之又曰卒長執鐃兩司馬執鐲言鐲鐃之用謂鉦鐸之屬以金鐃止鼓而金鐲節鼓然是四金之數故鐲者非雅樂器也角通禮義纂曰長鳴角也按蚩尤師蝄蜽與黃帝戰於𣵠鹿帝命吹角為龍鳴以禦之魏武帝征烏桓軍士思歸乃減角為中鳴其聲尤悲以應胡笳晉宋以降沿襲用之有長鳴唐禮大駕陳一百二十具是承晉魏之制也宋樂志曰西戎有吹金者銅角長可二尺形如牛角書記所不載或云出羗胡以驚中國馬又曰角長五尺形如竹筒本細末稍大未詳所起今鹵部及軍中用之或以竹木或以皮為之無定制按古軍法有吹角也此器俗名拔邏廻蓋胡虜驚軍之音所以書傳無之海內亂離至侯景圍臺城方用之也銅鉢又曰銅鉢是西涼樂也以皮細相擊應節令法樂用之通典曰銅鉢亦謂之銅盤出西戎及南蠻其圍數寸隱起如浮漚貫之以韋相擊以和樂也南蠻國大者圍數尺或謂齊穆士素所造也壤風土記曰壤者以木作前廣後銳長尺三四寸其形如履節僮少以為戲也堯時有八九十老人擊而歌曰日出而作日入而息鑿井而飲耕田而食帝何為於我哉風俗通曰相拊也所以輔相於樂奏樂之時先擊相又曰雅形如漆䇶有椎詩云訊疾以雅是也撫相大周正樂曰撫相以韋為之實以糠撫之以節也春牘周禮笙師曰云掌春牘應雅鄭司農云狀如漆䇶而弇口大長五尺六寸以革鞔之有兩紐虛無底舉以頓地如舂杵亦謂之頓相相助也以節樂也或謂梁孝王築睢陽城方十二里造時唱聲以小鼓為節築者下築和之後世謂此聲為睢陽樂柏板樂府雜錄曰玄宗令黃幡綽撰柏板譜幡綽乃於紙上畫一耳進之問其故對曰但有耳道則無失其節奏也韓文公因為樂司, SBCK: ''}
