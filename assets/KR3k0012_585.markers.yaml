  - {type: variant, offset: 50, length: 205, content: 雅樂以為雅管六竅之制則為鳳管旋宮轉器以應律管者也通典曰篳篥本名悲篥出於胡中其聲悲或云濡者得傳胡人吹以驚中國馬後乃以笳為首竹為管也通典曰桃皮東夷有卷桃皮以為篳篥也二具大蠡也容可數升並吹之以節樂亦出南蠻樂府雜錄曰篳篥者本龜茲國樂也亦名悲篥有類於笳也德宗朝有尉遟青官至將軍大曆中有幽州王麻奴者解吹𥯤觱篥河北推為第一手頗踞傲自負除戎師外莫有敢輕易請者時有從事姓盧不記名臺拜將入京臨歧把酒請麻奴吹一曲子相送麻奴偃蹇大以為, SBCK: 言性與天道}
