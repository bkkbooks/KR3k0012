  - {type: variant, offset: 695, length: 0, content: '', SBCK: 大哉堯之爲君也巍巍乎唯天爲大唯堯則之蕩蕩乎民無能名焉巍巍乎其有成功煥乎其有文章揚子法言曰或曰良玉不雕羙言不文何謂也曰玉不雕璵璠不作器言不文典謨不作經桓寛塩鐵論曰内無其實而外學其文􅀂􅀞脂鏤氷費日損功王充論衡曰學問習熟則能推􅀋興文文由外而滋未必實才與文相副也魏文帝典論曰夫文本同而末異盖奏議冝雅書論冝理銘誄尚實詩賦欲麗文以氣爲主氣之清濁有體不可力強而致古之作者􅀉身於翰墨見意於篇籍不假良史之辭不託飛馳之􅀔而聲名自傳於後故西伯幽而演易周旦顯而制禮不以隠約而弗務不以康樂而加恩夫然則古人賤尺壁而重寸隂懼乎時之過已而人多不強力貧賤則懾於飢寒冨貴則流於逸樂遂營目前之務而遺千載之功日月逝於上體貌衰於下忽然與萬物遷化斯志士之所大痛也晉摯虞文章流別論曰文章者所以宣上下之象明人倫之叙窮理盡性以究萬物之冝者也王澤流而詩作成功臻而頌興德勲立而銘著嘉羙終而誄集祝史陳辭官箴王闕周禮太師掌教六詩曰風曰賦曰比曰興曰雅曰頌言一國之事繫一人之本謂之風言天下之事形四方之風謂之雅頌者羙盛德之形容賦者敷陳之稱也比者喻􅀋之言也興者有感之辭也後世之爲詩者多矣其功德者謂之頌其餘則惣謂之詩頌詩之羙者也古者聖帝明王功成治定而頌聲興於是奏於宗廟告於􅀑神故頌之所羙者聖王之德也古之作詩也發於情止乎禮義情之發因辭以形之禮義之指湏事以明之故有賦焉所以假象盡辭敷陳其志古詩之賦以情義爲主以事􅀋爲佐今之賦以事形爲本以義正爲助情義爲主則言省而文有例矣事形爲本則言冨而辭無常矣文之煩省辭之險易盖由於此夫假象過大則與􅀋相逺免辭過壯則與事相違辯言過理則與義相失麗靡過羙則與情相悖此四過者所以背大體而害政教示以司馬遷割相如之浮􅀃揚雄疾辭人之賦麗以􅁋也沈約宋書論曰民禀天地之靈含五常之德剛柔迭用喜愠分情然則歌詠所興冝自生民始也周室旣衰風流弥著屈平宋玉導清源於前賈􅁩相如振方塵於後英辭潤金玉髙義薄雲天自兹以降情志逾廣王褒劉向楊班崔蔡之徒異䡄同奔逓相師祖雖清辭麗曲時發于篇而蕪音累氣固亦多矣􅀂夫平子􅃩發文以情變絶唱髙蹤乆無嗣響至于建安曹氏基命}
