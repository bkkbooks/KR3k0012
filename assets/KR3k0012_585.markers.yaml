  - {type: variant, offset: 1973, length: 244, content: 四銑應律音而和樂也說文曰鉦鐃也鈴柄中上下通鉦也銑小鐃也軍法卒長執銑漢有鼓吹曲有鐃歌鐲周禮曰鼓人以金為鐲節鼓形如小鍾行鳴之以為鼓節也近代有大銅疊懸而擊之又曰卒長執鐃兩司馬執鐲言鐲鐃之用謂鉦鐸之屬以金鐃止鼓而金鐲節鼓然是四金之數故鐲者非雅樂器也角通禮義纂曰長鳴角也按蚩尤師蝄蜽與黃帝戰於𣵠鹿帝命吹角為龍鳴以禦之魏武帝征烏桓軍士思歸乃減角為中鳴其聲尤悲以應胡笳晉宋以降沿襲用之有長鳴唐禮大駕陳一百二十具是承晉魏之制也宋樂志曰西戎有吹金者銅角長可二尺形如牛角書記所不載或云出羗胡以驚中國馬又曰角長, WYG: ''}
