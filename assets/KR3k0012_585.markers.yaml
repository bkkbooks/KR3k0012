  - {type: variant, offset: 729, length: 1, content: 律, SBCK: 席珎流而萬世響冩天地之輝光曉生民之耳目矣故爰自風姓曁于孔氏􅀇聖創典素王述訓莫不原道心以敷章研神理以設教著象乎河洛間數乎􅆱􅀛觀天文以極變察人文以成化然後能纒緯區宇弥綸彞憲發揮事業彪炳辭義故道㳂聖以垂文聖因文以明道旁通而無涯日用而不匱易曰皷天下之動者存乎辭辭之所以能皷天下者道之文也}
