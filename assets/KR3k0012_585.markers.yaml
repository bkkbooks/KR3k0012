  - {type: variant, offset: 703, length: 11, content: 琵琶二絃四隔孤柱一合散, SBCK: 斯可謂之文荅曰孔文舉之書陸士衡之議斯可謂成文也陸景典語曰所謂文者非徒執卷於儒生之門攄筆於翰墨之悉乃貴其造化之淵禮樂之盛也文心雕龍曰人文之元肇自泰極幽讃神明易象惟先庖犧畫其始仲尼翼其終而乾坤兩位獨制文言言之文也天地之心哉􅀂乃河圖孕乎八卦絡書韞乎九疇玉版金鏤之寳丹文緑牒之華誰其尸之亦神理而巳自鳥迹代繩文字始炳炎皥遺事紀在三墳而年世眇邈}
