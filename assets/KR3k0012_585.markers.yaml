  - {type: variant, offset: 2218, length: 420, content: 尺形如竹筒本細末稍大未詳所起今鹵部及軍中用之或以竹木或以皮為之無定制按古軍法有吹角也此器俗名拔邏廻蓋胡虜驚軍之音所以書傳無之海內亂離至侯景圍臺城方用之也銅鉢又曰銅鉢是西涼樂也以皮細相擊應節令法樂用之通典曰銅鉢亦謂之銅盤出西戎及南蠻其圍數寸隱起如浮漚貫之以韋相擊以和樂也南蠻國大者圍數尺或謂齊穆士素所造也壤風土記曰壤者以木作前廣後銳長尺三四寸其形如履節僮少以為戲也堯時有八九十老人擊而歌曰日出而作日入而息鑿井而飲耕田而食帝何為於我哉風俗通曰相拊也所以輔相於樂奏樂之時先擊相又曰雅形如漆䇶有椎詩云訊疾以雅是也撫相大周正樂曰撫相以韋為之實以糠撫之以節也春牘周禮笙師曰云掌春牘應雅鄭司農云狀如漆䇶而弇口大長五尺六寸以革鞔之有兩紐虛無底舉以頓地如舂杵亦謂之頓相相助也以節樂也或謂梁孝王築睢陽城方十二里造時唱聲以小鼓為節築者下築和之後世謂此聲為睢陽樂柏板樂府雜錄曰玄宗令黃幡綽撰柏板譜幡綽乃於紙上畫一耳進之問其故對曰但有耳道則無失其節奏也韓文公因為樂司, WYG: ''}
