  - {type: variant, offset: 343, length: 349, content: 麻奴尚未分因賂其閽者方得通見即設席於地令坐乃於高般涉調中吹一曲勒部低曲終流汗夾背尉遟頷頤謂曰此曲何必於高般涉徒費許多氣力也因自出銀字管於平般涉調中吹之麻奴驚僨垂泣拜之曰某生於偏遠之方偶有寡藝實為無人今日幸聞天樂方悟前非遂將樂器碎之而歸終身不復言觱篥明皇雜錄曰明皇既幸蜀西南行初入斜谷屬霖雨涉旬於棧道雨中聞鈴聲與山相應上既悼念貴妃採其聲為雨霖鈴曲以寄恨焉時梨園弟子善吹觱篥者張野狐唯此人從至蜀上因以其曲授野狐泊至德中車駕復幸華清宮從官嬪御多非舊人上於望京樓下命野狐奏雨霖鈴曲未半上四顧淒涼不覺流涕左右感動與之歔欷其曲今傳於法部五絃國史補云趙壁彈五弦人問其術壁曰吾之於五絃也始則心驅之中則神遇之終則天隨之方吾浩然眼如耳耳如鼻不知五絃之為壁壁之為五絃也音律圖曰五弦不知誰所造也今世有之比琵琶稍小蓋北國所出, SBCK: ''}
