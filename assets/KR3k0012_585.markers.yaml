  - {type: variant, offset: 1491, length: 206, content: 忽聞其音雅合宮調取而配奏方始克諧紹遠乃啟世宗行取通禮義纂曰鐸大鈴振之以通鼓也大周正樂曰鐸如鐃以木為舌搖之以和鼓也樂書曰木鐸者鈴也主銅為之以木作舌故天將以夫子為木鐸言施政教時天將命以號令天下文舞所執而鳴之以振文教樂書曰金鐸者形同木鐸以為金舌號令為度鳴而驚眾舞所執以振武教者也鄭注司馬職云掩上振之為摝摝者止行息氣也六軍三三而居其間相遠故振鐸以通之使軍眾知可進可止之節也司馬法曰鼓聲不過閶鼙聲不過闒鐸聲不過其琅也廣古今, SBCK: 太平御覽卷第}
