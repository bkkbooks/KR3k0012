  - {type: variant, offset: 695, length: 0, content: '', WYG: 大哉堯之為君也巍巍乎唯天為大唯堯則之蕩蕩乎民無能名焉巍巍乎其有成功煥乎其有文章揚子法言曰或曰良玉不雕美言不文何謂也曰玉不雕璵璠不作器言不文典謨不作經桓寛鹽鐵論曰内無其質而外學其文若畫脂鏤冰費日損功王充論衡曰學問習熟則能推類興文文由外而滋未必實才與文相副也魏文帝典論曰夫文本同而末異盖奏議宜雅書論宜理銘誄尚實詩賦欲麗文以氣為主氣之清濁有體不可力强而致古之作者寄身於翰墨見意於篇籍不假良史之辭不託飛馳之勢而聲名自傳於後故西伯幽而演易周旦顯而制禮不以隐約而弗務不以康樂而加思夫然則古人賤尺璧而重寸隂懼乎時之過已而人多不强力貧賤則懾於飢寒富貴則流於樂逸遂營目前之務而遺千載之功日月逝於上體貌衰於下忽然與萬物遷化斯志士之大痛也晉摯虞文章流别論曰文章者所以宣上下之象明人倫之叙窮理盡性以究萬物之宜者也王澤流而詩作成功臻而頌興勲徳立而銘著嘉美終而誄集祝史陳辭官箴王闕周禮太師掌教六詩曰風曰賦曰比曰興曰雅曰頌言一國之事繫一人之本謂之風言天下之事形四方之風謂之雅頌者美盛徳之形容賦者敷陳之稱也比者喻類之言也興者有感之辭也后世之為詩者多矣頌功徳者謂之頌其餘則總謂之詩頌詩之美者也古者聖帝明王功成治定而頌聲興於是奏於宗廟告於鬼神故頌之所美者聖王之徳也古之作詩也發於情止乎禮義情之發因辭以形之禮義之指須事以明之故有賦焉所以假象盡辭敷陳其志古詩之賦以情義為主以事類為佐今之賦以事形為本以義正為助情義為主則言省而文有例矣事形為本則言富而辭無常矣文之煩省辭之險易蓋由於此夫假象過大則與類相逺逸辭過荘則與事相違辯言過理則與義相失麗靡過美則與情相悖此四過者所以背大體而害政教所以司馬遷割相如之浮說揚雄疾辭人之富麗以淫也沈約宋書論曰民禀天地之靈含五常之徳剛柔迭用喜愠分情然則歌詠所興宜自生民始也周室既衰風流彌著屈平宋玉導清源於前賈誼相如振芳塵於後英辭潤金石髙義薄雲天自茲以䧏情志逾廣王褒劉向楊班崔蔡之徒異軌同奔逓相師祖雖清辭麗曲時發於篇而蕪音累氣固亦多矣若夫平子豔發文以情變絶唱髙蹤久無嗣響至於建安曹氏基命}
