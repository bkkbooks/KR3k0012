  - {type: variant, offset: 1242, length: 191, content: 為樂常試為之擊建鼓撞巨鐘乃始知夫瓮瓶之足差也徐幹中論曰聽黃鍾之音知擊缶之細涉庠序之教知不學之困呂氏春秋曰堯使質以麋鞅魚缶而鼓之也墨子曰農夫春耕夏耘秋歛冬藏息於吟缶大周正樂曰今缶八永太初司馬滔進獻廣平樂兼此八缶具黃鍾一均聲樂府雜錄曰唐大中初有調音律官天興縣丞郭道源善擊甌用越甌邢瓶共一十二旋加減水以筯擊之其音妙於方響也鐸周禮曰二十五人為兩置司馬一人因以名焉木舌金鈴曰鐸軍中執之以通鼓也, SBCK: 艶}
