  - {type: variant, offset: 52, length: 134, content: 食居人之左羹居人之右毋嚃羹亦嫌欲疾嚃不爵菜也音勑荅切母絮羹為其詳於味絮猶調也絮勑處切客絮羹主人辭不能烹羹之有菜者用挾無菜者不用挾又曰雉羹雞羹兔羹芼羹食自諸侯已下至於庶人無等羹食之主又曰子卯稷食菜羹忌日貶也夫人與君同庖不時殺也又曰不能食粥羹之以菜可也謂性不能者可食飯菜羹, SBCK: 牛膾羊炙魚膾芥醬}
