  - {type: variant, offset: 4576, length: 472, content: 漿而五漿先饋饋遺也伯昏瞀人曰若是則汝何為已驚遺汝之漿何故驚也曰夫內誠不解內無誠實外無解然形諜成光諜飾其形身之光也以外鎮人心外以諜形鎮人則其內不足也使人輕乎貴老重少輕老由乎形諜而察其所患形飾則心亂亂必患生故當察也夫漿人持為食羹之貨多餘之羸漿人之饋我者非貴我羸也蓋貨我以自盈耳其為利也薄其為權也輕而猶若是食羹之利薄所利之權輕相猶謀我況有國者効我以功事乎故我道中而反而況萬乘之主身勞於國而智盡乎事彼將我任以事而効我以功吾是以驚也孟子曰書曰徯我后后來無罰其君子實玄黃于篚以迎其君子其小人簞食壺漿以迎其小人袁子正書曰歲在申酉乞漿得酒歲在辰巳嫁妻賣子顧子曰非其道壺漿不可受是其道雖天下不可讓山海經曰高前之山上有水焉甚寒而清帝臺之漿也飲者不心痛漢武故事曰西王母曰太上之藥有玉津金漿其次藥有五雲之漿神異經曰東南有人名黃父以霧露為漿廣志曰醶䣼漿也醶初檻切穆天子傳曰盛姬病求飲天子命取漿而給得之遂是日壺輲壺器名輲速也音遄焦贛易林曰登上橋堂飲萬歲漿華山記曰華山上有明星玉女持玉漿孝子傳曰洛陽陽公輦義漿以給過客世說曰嵩山北有大穴晉初有一人誤墮穴中緣行十許日有草屋區中有, SBCK: ''}
