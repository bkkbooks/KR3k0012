  - {type: variant, offset: 217, length: 367, content: 鄭莊公公賜之食食而捨肉公問其故對曰小人有母皆嘗小人之食矣未嘗君之羹請以遺之肉有汁曰羹又曰臧哀伯諫曰大羹不致大羹肉汁也不致五味禮不忌本也又曰鄭侯伐宋將戰華元殺羊食士其御羊斟不與及鄭師與宋師戰曰疇昔之羊子為政疇昔猶前日也今日之事我為政與入鄭師故敗君子謂羊斟非人也以其私憾敗國殄民憾恨也殄盡也於是刑孰大焉詩所謂人之無良者詩義取不良之人相怨以亡其羊斟之謂乎又曰楚獻黿於鄭靈公宋子公與子家將見宋子公也子家婦人子公之食指動第二指也以示子家曰他日我如此必嘗異味及入宰夫將解黿相視而笑公問之問所笑子家以告及食大夫黿召子公而弗與也欲使指動無効也子公怒染指於鼎嘗之而去又曰叔鮒求貨於衛淫蒭蕘者衛人使屠伯饋叔向羹與一篋錦叔向受羹反錦又曰和如羹焉水火醯醢鹽梅以烹魚肉燀之以薪燀炊也宰夫和之齊之以味濟其不及以泄其過君子食之以平其心君臣亦然以水濟水誰能食之書曰若, WYG: 洿下地中}
