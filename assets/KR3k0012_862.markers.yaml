  - {type: variant, offset: 3873, length: 358, content: 使行人執搕承飲造于子重承奉也曰寡君乏使使使鹹御持也曰寡君乏使鍼御持矛是以不得犒從者使某攝飲子重曰夫子嘗與吾言於楚必是故也不亦識乎知其以往言好腵故致飲受而飲之免使者而復鼓免脫也又曰鄭師入陳子展執縶而見見陳侯再拜稽首承飲而進獻承飲奉觴示不失臣敬子美入數俘而出子美子產也但數其所獲人數不將以歸也又曰吳入楚申包胥乞師於秦立依於庭牆而哭日夜不絕聲勺飲不入口七日論語曰一簞食一瓢飲穆天子傳曰天子渴于中求飲未至七萃之士曰高奔戎割其左驂之頸取其清血以飲天子今西方之羌故刺馬咽取血飲之瘡示尋愈也天子美之賜佩玉一隻神仙傳曰蔡經尸解去十餘年忽還家言七月七日王君當來過到其日可多作數百斛飲以供從官乃去到期假借甕器作飲數百斛羅列覆置庭中其日方平果來語林曰陸士衡在洛夏月忽思竹篠飲語劉實云吾鄉曲之思轉深今來東歸恐無復相見理言此已復之生感漿詩曰或, SBCK: ''}
  - {type: variant, offset: 3873, length: 35, content: 使行人執搕承飲造于子重承奉也曰寡君乏使使使鹹御持也曰寡君乏使鍼御持矛是, WYG: 施麋施鹿施麕皆如牛羊欲濡肉則釋而煎之}
