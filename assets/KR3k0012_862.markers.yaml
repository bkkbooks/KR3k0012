  - {type: variant, offset: 1717, length: 2, content: 勵為, SBCK: 潁胄素能飲酒噉白􅁏膾至三􅂛葛洪神仙傳曰仙人介象字元則㑹稽人有諸方術呉主聞之徴象到武昌甚敬貴之稱爲介君與呉主共論鱠魚何者最羙象曰鯔魚爲上呉主曰論近魚耳此海中岀安可得耶象曰可得耳乃令人於殿庭中作方塪汲水滿之并求釣象起餌之垂綸於塪中不食頃果得鯔魚呉主驚喜問象曰可食否象曰故爲陛下取以作生安敢取不可食之物乃使厨下切之呉主曰聞蜀使來有蜀薑作韲甚好恨時無此象曰蜀薑豈不易得願􅆧所使者并付直呉主指左右一人以錢五十付之象書一符以着青竹杖中使行人閉目􅀐竹竹止便買薑訖復閉目此人承其言􅀐竹湏􅁷巳至成都不知是何處問人人言蜀市乃買薑于時呉使張温先在蜀旣於市中相識甚驚便作書􅀉其家此人買薑畢投書􅀒薑􅀐杖閉目湏􅁷巳還到呉厨下切鱠亦適了搜神記曰左慈字元放在曹操坐操謂衆賔曰髙㑹所少呉浙江鱸魚耳放曰此可得也因求銅藻盤貯水以竿餌釣於盤中湏􅁷引一鱸出操拊手􅀏曰可更得不放乃更引餌沉之湏􅁷復引出皆長二尺餘生鮮可愛操令目前切膾孝子傳曰曽參食生魚甚羙因吐之人問者故參曰母在之日不知生魚味今我羙吐之終身不食異物記曰􅠧魚作膾味􅈿無軰列女傳曰姜詩妻事姑􅄝魚膾又不能獨味妻與詩常力作供膾呼隣母共食其舎側忽有泉常出鯉魚一􅀟以供二母之膳呉越春秋曰伍子胥伐楚末還闔閭治魚作膾作膾過時不至魚臭猶湏子胥之至也三師到闔閭膾而食之不知其臰後王重作之者味如故人作魚湏膾者闔閭之時造也􅀶物志曰呉王江行食鱠有餘弃之於中流化而爲異魚今呼王餘魚長數寸大如筯猶有膾形齊諧記曰江南有麻姑治者爲人好噉鱠江北岸有華夲者得一大虵喚麻爲鱠得食甚羙苦索魚名華本因醉喚取虵及餘􅁏出麻治見之大吐歐血死又曰周子有女噉鱠不知足家爲之貧至長橋南見罛者挫魚作鮓以錢一千求一飽食五斛便大吐有蟾蜍從吐中出婢以魚置口中即成水女遂不復噉膾世􅀃曰張季膺辟齊王東曹􅁺在洛見秋風起因思呉中蓴羮鱸魚鱠曰人生貴得適意何覉宫千里以要名爵遂命駕便歸俄而齊王敗時人謂爲見機又曰桓車􅀐冲在荆州張玄爲侍中使至江陵路經陽歧俄見一人持小籠生魚逕來造舡云有魚欲􅀉作膾張乃維舟而納之問其姓字云是劉遺民劉驎之字遺民張素聞其名大相欣待旣知張䘖命問謝安王文度並佳不張甚欲語言劉子無意旣進膾便去云向得此魚􅀚君舡上當有膾具是故來耳於是便去杜寳大業拾遺録曰六年呉郡獻海鮸音免乾膾四瓶瓶容一斗浸一斗可得徑尺面盤并奏作乾膾法帝以示群臣云昔術人介象於殿庭釣得海魚此幻化耳亦何是珎異今日之鱠乃是海真魚所作求自數千里亦是一時竒味即出數盤以賜近臣作乾膾法當五六月盛熱之日於海取得鮸魚其魚大者長四五尺鱗細紫色無細骨不腥捕得之即去其皮骨取其精􅁏縷切隨成曬三四日湏極乾以新白瓷瓶未經水者盛之􅁡封泥勿令風入經五六十日不異新者後取噉時以新布褁於水中漬三刻乆取出灑却水則曒然矣}
