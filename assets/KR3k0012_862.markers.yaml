  - {type: variant, offset: 3225, length: 4, content: 江北華本, WYG: 劉晨阮肇入天台山有女仙人為設胡麻飯山羊脯因留連之楚詞曰折瓊枝以為羞盧諶祭法曰春祠用脯夏用疈社育菽賦曰脯則正膂通幹粗鹿肥麋梁劉孝威謝東官賚鹿脯等啓曰上林絶胡人之搏禁地無張京之犯而猶有班超之遊獵李廣之馳射逺歸於厨吏入貢於腊人形圖三事之車影入九仙之鏡鯖西京雜記曰五侯不相能賔客不得往來婁䕶傅會五侯間各得其意競致竒膳䕶乃合以為鯖世稱五侯鯖以為竒味焉齊書曰武帝就虞悰求諸飲食方悰秘不出上醉後體不快悰乃獻酢酒鯖鮓一方而已鮓釋名曰鮓葅也以鹽米釀之如葅熟而食之也呉志曰孟仁為監池司馬自能結網手捕魚作鮓寄母母曰汝為魚官而以鮓寄我非避嫌也宋書曰王瑩代謝超宗為義興太守與謝交惡超宗到都後瑩父懋往超宗處超宗設精白鮑美鮓獐巴懋問那得佳味超宗詭言瑩始見餉佯驚曰大人豈應不得耶懋大忿言於朝廷稱瑩供養不足坐失廢棄久之博物志曰仲秋月取折頭鯉去子破腹使膂割為漸米爛藻之以赤秫米飯鹽酒令糝之不苦重踰月乃熟是謂秋鯖王子年拾遺記曰漢元鳯二年於淋池之南起桂臺以望逺帝常以季秋之月泛蘅蘭雲蠲之舟窮晷係夜釣于臺下以香金為鈎霜絲為綸丹鯉為餌得白蛟長三丈若大虵無鱗甲帝曰非瑞也命太官為鮓肉紫骨青味絶香美班賜羣臣帝後思其美漁}
