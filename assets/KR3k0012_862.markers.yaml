  - {type: variant, offset: 2018, length: 885, content: 而甘之後聞其猴也據地而嘔之此不知味也又曰太宰子朱侍食於令尹子國子國伏羹而熱援漿以泛明日子朱辭官曰令尹輕行而簡禮其辱人不難明日伏節尹怒而笞之三百秦子曰五味者各稱一族之名合和一鼎名曰羹猶威重廉平恩合而為信也郭子曰陸士衡詣王武子武子有數斛羊酪指以示陸曰卿東吳何以敵此陸云千里蓴羹未下鹽豉劉向新序曰紂王天下熊羹不熟而殺庖人又曰平公問叔向曰齊桓公九合諸侯一匡天下如是君不知臣力何也師曠侍曰臣請以喻五味管仲善斷割之隰明善煎熬之賓須無善齊和之羹已熟矣而進之又曰魏文侯見箕季子曰晏進糲飡瓜瓠之羹日豈不能具五味教我無歛於百姓以省飲食之養也風俗通曰昭帝時大官上食羹中有髮切中有土令承坐不謹敬皆論劉禎毛詩義問曰鉶羹有菜鹽豉其中菜為其形象可食因以鉶為名陸機毛詩草木䟽曰梅杏類也其子赤而酢不可生噉煮而曝乾為蘇可著羹臛中廣志曰大渡蜂取其子得數升為羹亦可蒸食臨海水物志曰民皆好啖猴頭羹雖五肉矐不能及之其俗言寧負千石之粟不願負猴頭羹臛笑林曰人有和羹者以杓嘗之少鹽便益之後復嘗之向杓中者故云鹽不足如此數益升許鹽故不鹹因以為怪食經曰有豬蹄酸羹法胡羹法雞羹法簾笴鴨羹法楚辭天問曰緣鵠飾玉后帝食饗后帝殷湯也言伊尹始伏緣因烹鵠鳥之羹脩飾玉鼎以事以放湯賢之遂相也彭鏗斟雉堯帝饗何彭鏗彭祖也好和滋味斟羹事事堯堯而饗食之受壽永多夫何久長言彭祖進雉羹於堯堯饗之以壽之也又九章曰懲於羹者而吹齏言人有歠而熟中懲艾之見齏則吹之又招魂曰和酸若苦陳吳羹吳人攻作又大招曰鮮𧓈甘雞和楚酪酪昨胾也言取生大鼈烹之羹謂賂密復有肥雞肉和以酢酪其味清也又曰內鶬鴿鵠味豺羹鶬鶬鶴似鳩而青鵠黃鵠也豺以豺言畢夫巧於調和先甘酸鶬鵠肉故羹美也唐明皇雜錄曰李林甫子婿鄭平為戶部員外嘗與林甫同處一日林甫就院省其女遇平櫛髮見林甫至處遽欲退藏林甫固邀之見其鬚髮皆白謂平曰上當賜甘露羹郎其食之縱當華皓必當鬒黑明日果有中使至賜林甫食中有甘露羹遂以與平平食訖一旦髮毛如䃜嶺表異錄曰交阯之人重不祿羹羹以羊鹿鷄豬肉和骨同一釜煮之令極肥濃漉去肉進之葱薑調以五味貯以盆器置之盤中羹中有觜銀銀杓可受一升即更相楫讓多自主人先舉即滿斟一杓內觜入鼻仰首徐傾之飲盡傳杓如酒巡行之喫羹了然, SBCK: ''}
