  - {type: variant, offset: 189, length: 1, content: 饗, SBCK: 夫燕㑹有膾無脯有脯無膾士不貳羮胾庻人􅂄老不徒食尊卑差也膾春用葱秋用芥豚春用韭秋用蓼芥芥醬也􅁏腥細者爲膾大者爲軒膾者先軒}
  - {type: variant, offset: 189, length: 1, content: 饗, WYG: 夫燕會有膾無脯有脯無膾士不二羮胾庶人耆老不徒食尊卑差也膾春用葱秋用芥豚春用韮秋用蓼肉腥細者為膾大者為軒又少儀曰牛羊與魚}
  - {type: variant, offset: 189, length: 1, content: 饗, krp: 夫燕㑹有膾無脯有脯無膾士不貳羮胾庻人耆老不徒食尊卑差也膾春用葱秋用芥豚春用韭秋用蓼芥芥醬也肉腥細者爲膾大者爲軒膾者先軒}
  - {type: variant, offset: 191, length: 176, content: 禮尚玄酒而俎腥魚大羹不和有遺味者矣左傳曰頴考叔有獻於鄭莊公公賜之食食而捨肉公問其故對曰小人有母皆嘗小人之食矣未嘗君之羹請以遺之肉有汁曰羹又曰臧哀伯諫曰大羹不致大羹肉汁也不致五味禮不忌本也又曰鄭侯伐宋將戰華元殺羊食士其御羊斟不與及鄭師與宋師戰曰疇昔之羊子為政疇昔猶前日也今日之事我為政與入鄭師故敗君子謂羊斟非人也以其私憾敗國殄民憾恨也殄盡也於是刑孰大焉詩, SBCK: ''}
  - {type: variant, offset: 191, length: 4, content: 禮尚玄酒, WYG: 腥聶}
  - {type: variant, offset: 191, length: 176, content: 禮尚玄酒而俎腥魚大羹不和有遺味者矣左傳曰頴考叔有獻於鄭莊公公賜之食食而捨肉公問其故對曰小人有母皆嘗小人之食矣未嘗君之羹請以遺之肉有汁曰羹又曰臧哀伯諫曰大羹不致大羹肉汁也不致五味禮不忌本也又曰鄭侯伐宋將戰華元殺羊食士其御羊斟不與及鄭師與宋師戰曰疇昔之羊子為政疇昔猶前日也今日之事我為政與入鄭師故敗君子謂羊斟非人也以其私憾敗國殄民憾恨也殄盡也於是刑孰大焉詩, krp: ''}
