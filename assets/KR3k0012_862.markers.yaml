  - {type: variant, offset: 1721, length: 0, content: '', WYG: 張𤣥為侍中使至江陵路經陽岐俄見一人持小籠生魚逕來造舡云有魚欲寄作膾𤣥乃維舟而納之問其姓名云是劉遺民劉憐之字遺民張素聞其名大相欣待既坐張御命問謝安王文度並佳不張甚欲語言劉子無意既進膾便去云得此魚觀君舡上當有膾具是故來耳於是便去杜寳大業拾遺録曰六年吴郡獻海鮸音免乾膾四瓶瓶容一斗浸一斗可得徑尺面盤并奏作乾膾法帝以示羣臣云昔衞人介象於殿庭釣得海魚此幻化耳亦何足珍異今日之膾乃是海真所作來自數千里亦是一時竒味即出數盤以賜近臣作乾膾法當五六月盛熱之日於海取得鮸魚其魚大者長四五尺鱗細紫色無細骨不腥捕得之即去其皮骨取其精肉縷切隨成曬三四日須極乾以新白瓷瓶未經水者盛之宻封泥勿令風入經五六十日不異新者後時以新布裹於水中清三刻久取出洒却水則皦然矣明皇雜録曰邢州人和璞嘗謂房琯曰君殁之時必因食魚膾既殁之後當以梓木為棺然不得沒於君之私第不處公館不處𤣥壇佛寺不處親友之家其後譴於閬州寄居州之紫極宫卧疾數日}
