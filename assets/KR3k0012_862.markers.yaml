  - {type: variant, offset: 1721, length: 0, content: '', SBCK: 司户唐望之各集計至五品進止未出間有僧來覔􅀄不相識延之共坐少頃曰貧道出家人得飲食亦以少公名人故闇相託能設一頓鱠否司户欣然即處分買魚此僧云看有蒜否家人云蒜盡也僧即起司户留之曰蒜盡遣買即得僧云旣蒜盡不可更住苦留不止望之果無疾􅁀卒明皇雜録曰邢州人和璞甞謂房琯曰君殁之時必因食魚膾旣殁之後當以梓木爲棺然不得殁於君之私第不處公館不處玄壇佛寺不處親友之家其後譴於閬州􅀉居州之紫極宫卧疾數日}
