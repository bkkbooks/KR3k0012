  - {type: variant, offset: 3225, length: 4, content: 江北華本, SBCK: 劉晨阮肇入天台山有女仙人爲設胡麻飯山羊脯因留連之楚詞曰折瓊枝以爲羞王逸注日羞脯也盧諶􅀕法曰春祠用脯夏用煏慿逼反杜育菽賦曰脯則正膂通幹麄鹿肥麋梁劉孝威謝東宫賡鹿脯等啓曰上林絶胡人之􅅮禁地無張京之犯而猶有班超之遊獵李廣馳射逺歸於厨使入貢於脯人并圖三事之車影入九仙之鏡鯖西京雜記曰五侯不相能賔客不得徃來婁護豊辨􅀓㑹五侯間各得其意競致竒膳護乃合以爲鯖世稱五侯鯖以爲竒味焉齊書曰武帝就虞悰求諸飲食方悰祕不出上醉後體不快悰乃獻醒酒鯖鮓一方而巳鮓釋名曰鮓􅉁也以塩米釀之如􅉁熟而食之也呉志曰孟仁爲塩池司馬自能結網手以捕魚作鮓􅀉母母還之曰汝爲魚官而以鮓􅀉我非避嫌也宋書曰王􅉷代謝超宗爲義興太守與謝交惡超宗到都後􅉷父懋徃超宗處超宗設精白鮑羙鮓獐巴懋問郍得佳味超宗詭言瑩始見餉佯驚曰大人豈應不得耶懋大忿言於朝廷稱瑩供養不足坐失廢弃乆之愽物志曰仲秋月取折頭鯉子去鱗破腹使膂割爲漸米爛藻之以赤秝米飯塩酒令糝之鎮不苦重踰月乃熟是謂秋鯖王子年拾遺記曰漢元鳯二年於淋池之南起桂臺以望逺帝常以季秋之月沉衝瀾雲鷁之舟窮畧係夜釣於臺下以香金爲釣霜絲爲綸丹鯉爲餌得白蛟長三丈􅀂大虵無鱗甲帝曰非瑞也命太官爲鮓􅁏紫骨青味絶香羙班賜羣臣帝後思其羙漁}
