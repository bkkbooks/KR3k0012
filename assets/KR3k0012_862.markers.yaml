  - {type: variant, offset: 1723, length: 2, content: 徵為, SBCK: 忽具鱠邀房於郡齋房亦欣然命駕旣歸􅁀卒州主命攅櫝於宫中棺得梓木爲之脯釋名曰脯􅅮也乾燥相􅅮着也脩縮也乾燥縮也􅀃文曰脯乾􅁏也脩脯也􅀘莫切薄􅈩之屋上也腕骨脯也朐脯挺也周禮曰脯人掌乾􅁏也凢田獸腊膴羘之事夫物解肆乾謂之乾􅁏薄切日脯睡之而施薑桂曰暇脩腊小物而乾者􅀕祀共豆脯膴胖又曰膳夫凢王之稍事設薦脯醢鄭司農云稍事謂非日中大舉時而間食謂之稍事膳夫主設薦脯醢云謂稍有小而事飲酒也儀禮曰郷飲酒主人立于西階東薦脯使出祖釋軷􅀕脯士冠賔東面薦脯禮曰以脯脩置者左朐右末又曰婦人之䞇脯脩大夫燕禮有膾無脯又禮特牲曰大饗尚睱脩而巳矣榖梁傳曰束脩之􅁏不行境中有至尊者不貳公羊傳曰魯昭公出奔齊侯使髙子執簞食四脡脯公稽首以祍受易曰噬乾肺得金矢王肅注曰四體離隂卦骨之象骨在乾肉脯之象金象所以􅀗野禽故食之反得金矢君子於味必思其毒於利必備其難論語曰子曰自行束脩巳上吾未甞無誨焉孔曰言人奉禮自行束脩以上則皆教誨之也又曰沽酒市脯不食尚書大傳曰散冝生閎夭南宫适三子者學乎}
