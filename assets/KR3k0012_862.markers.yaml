  - {type: variant, offset: 1299, length: 176, content: 殷淳子孚有父風嘗與侍中何勗共食孚羹盡勗云益殷蓴羹勗司空無忌子也孚徐輟筯曰何無忌諱又曰朱脩之為荊州刺史姉在鄉里飢寒不立脩之貴為刺史未曾供贍往姉家姉為設菜羹麤飯以激之又曰毛脩之被禽入魏敬事嵩山道士寇謙之謙之在魏太武帝信敬營護之故不死脩之嘗為羊羹薦魏尚書以為絕味獻之武帝大悅以為太官令被寵遂為尚書封南郡公太官令如故又曰宋末齊高帝輔政劉彥節知運祚將遷密懷異圖及, SBCK: ''}
