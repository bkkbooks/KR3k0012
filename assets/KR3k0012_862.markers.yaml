  - {type: variant, offset: 4307, length: 268, content: 飲枝之則濫涼也紀莒之問名諸為濫漢釋名曰桃濫水也水清而藏之其味濫濫然酢也史記曰漿千儋儋甖此亦比千乘之家又曰薛公藏於賣漿家漢書郊祀歌曰奉尊柘漿折朝醒應劭曰取甘柘汁以為飲也折解醒病酒言拓漿可以解朝醒也吳書曰袁術去壽春時方盛夏欲得蜜漿又無蜜遂歐血死後魏書曰游明根幼年遭亂為櫟陽王氏奴主使牧羊明根以漿倩人書字路邊書地學之又曰咸陽王禧謀逆被禽送華林都亭著千斤錢格鏁格羽林掌衛之時熱甚禧渴悶垂死勑斷水漿侍中崔光令左右送酪漿升餘禧一飲而盡管子曰左酒右漿蔡邕注曰事尚書左酒近體也右漿上遠列子曰列子之齊中道而返遇伯昏瞀人瞀人曰奚方而反曰吾驚焉惡乎驚曰吾食於, SBCK: ''}
