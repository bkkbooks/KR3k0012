  - {type: variant, offset: 3467, length: 377, content: 正曰酒正辨四飲之物一曰清二曰醷三曰醬四曰酏清謂醴之泲者也醷內則所謂或以配為醴者凡醴濁釀馳為之則少清矣醴者馳粥清也又曰漿人掌共王之六飲水醬醴涼醷馳入于酒府醴者清也鄭司農云涼以水酒也方謂涼今寒粥若糗節雞水禮王制曰天子五飲上水醬酒醴酏上以水為上又郊特牲曰飲養陽氣故有樂又內則曰飲曰諸飲也重醴稻醴清糟黍醴清糟梁醴清糟重陪也糟醇也清泲也致飲有醇者有泲者陪設之也或以酏為醴釀粥為醴黍酏馳粥又外傳曰共王及后與世子食後所進之六飲水居其上其次曰漿三曰醴釀粥為之淨而清四曰涼暑月以雜糗為和水者五曰醴以乾梅乾木瓜相和水一名濫涼六曰酏以黍為粥之薄者左傳曰丑父使公下如華泉取飲鄭周父御佐車宛茷為右載齊侯以免佐車副車又曰鄢陵之戰欒鍼見子重之旌請曰楚人謂夫旌子重之麾也彼其子重也日臣之使於楚也子重問晉國之勇臣對曰好以眾整曰又何如又問其餘臣對曰好以暇暇閑暇今兩國治戎行人不使不可謂整臨事, WYG: 期朝}
