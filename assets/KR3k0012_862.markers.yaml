  - {type: variant, offset: 1491, length: 222, content: 潛與彥節及諸大將黃回等謀夜會石頭詰旦乃發彥節素怯搔擾不自安脯後便自丹陽郡車載婦女盡室奔石頭臨去婦蕭氏強勸令食彥節歠羹寫胸中手振不自禁齊書曰高祖既為齊王置酒為樂羹膾既至崔祖思曰此味故為南北所推侍中沈文季曰羹膾吳食非祖思所解祖思曰炰鼈鱠鯉似非勾吳之詩文季曰千里蓴羹豈關魯衛之說帝甚悅曰蓴羹故應還沈又曰朱緒無行母病積年忽思菰羹緒妻到市買菰為羹欲奉母緒曰病復安能食先嘗之遂併食盡母怒曰我病欲此羹汝何必併啖盡天若有知當令汝哽怨緒聞心中介介然即吐血明日而死, SBCK: ''}
