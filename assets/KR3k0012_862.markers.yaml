  - {type: variant, offset: 688, length: 332, content: 史記曰古者天子常以春秋解祠黃帝用一梟破鏡如淳曰漢史東郡送梟五日作梟羹以賜百官也又曰項王為高祖置太公於机上告漢王曰吾與羽俱北面受命懷王約為弟兄吾翁即若翁必欲烹而翁幸分我一杯羹又曰高祖少時與賓客過丘嫂食嫂厭叔與客來佯為羹盡櫟釜邊客以故去已而視釜中尚有羹由此怨其嫂封其子頡羹侯戰國策曰樂羊為魏將而攻中山其子在中山中山君烹其子而遺之羹樂羊啜之盡一杯文侯謂禇師贊曰樂羊以我故食其子肉對曰其子食之其誰不食羊下中山文侯賞其功而疑其心又曰中山君饗大司馬子期在焉羊羹不遍子期怒走楚說王伐中山中山君亡有二人挈子隨後問之曰臣父嘗餓且死君下壺飡哺臣之父故來死君也中山君歎曰吾以一椀羊羹亡國之一壺飡得二士死後漢書曰太尉劉寬性仁恕不妄喜怒嘗服朝侍婢奉肉羹翻汙其衣婢遽收之寬神色不異徐言羹爛汝手, SBCK: ''}
