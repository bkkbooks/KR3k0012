  - {type: variant, offset: 2904, length: 317, content: 以諸饌謂之不錄會亦呼為先腦也交阯人或經營事務彌縫推要但備此會無不諧者安南錄異圖鑿穿心飛頭鼻飲者皆遺風也張翰豆羹賦曰乃有孟秋嘉菽垂枝挺莢是刈是穫充簞盈篋香鑠和調同疾赴急桓鱗七說曰河黿之羹齊以蘭梅芬芳甘旨禾咽先滋衛洪七開曰馨羹芬臛凝色生華皇象書曰想必醉令作醴梅羹相待繆襲祭儀曰夏祀調和羹芼以葵秋祀羹芼以葱春祀和羹芼以韭臛蒼頡解詁曰臇少年汁臛也膹臛多澤膹房文切說文曰臛肉羹釋名曰臛曰蒿也香氣蒿高也齊書曰虞悰家富於財而善為滋味豫章王嶷盛饌享賓謂悰曰肴羞有所遺否悰曰何曾食䟽有黃頷臛恨無之廣志曰晨鳧肥而耐寒宜為臛劉欣期交州記曰九真太守陶璜立郡築城於土穴中得一白色形似蠶蛹無頭長數十丈大餘圍軟軟動莫能名剖腹有肉如豬昉遂以為臛甚香美璜啖一杯三軍盡食, SBCK: ''}
