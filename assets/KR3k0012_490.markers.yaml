  - {type: 'tls:seg', offset: 1048, content: '', id: KR3k0012_CHANT_490-15a.5}
  - {type: variant, offset: 1048, length: 4, content: 假節都督, SBCK: 夏侯玄又徵以爲禍必將轉相及心旣内恐又覇先與雍州刺史郭淮不和而淮代玄爲征西覇尤不安故遂奔蜀趍隂平而失道入窮谷中粮盡殺馬歩行足破卧岩石下使人求道未知所之蜀聞之乃使人迎霸􅀳中興徴祥􅀃曰海西公即位忘設豹尾夫豹尾儀服之主大人所以豹變也而海西公非可冝忘之天若曰海西凢庸不可以主社稷故忘其豹尾示不能終也山海經曰招揺之山有木焉其􅃺如􅜄而黒埋榖楮也皮中作帋也其華四照名曰迷穀佩之不迷又曰歴小之山其山多櫑是木也方莖圓葉黄華而毛其實如棟亦木名子如指頭白而粘可衣音棟也服之不忘搜神記曰蜀中西南髙山之上有物與猴相􅀋長七尺能作人行善走名猳一名馬化或曰玃伺行道人有後者輙盗取以去人不得知此物能别男女氣臰故取女而男不知也取去而共爲家室其無子者終身不得還十年之後形皆􅀋之意亦迷惑不復思歸産子者輙抱送還其家産子皆如人有不養者母輙死也廣州記曰廬山有山桃大如檳榔形亦似之色黒而味甘酢人時登山採拾正得於上飽噉不得持下輙迷不得返述異記曰南康南野有東望山民三人上山頂有湖清深又有果林周四里許衆果畢植間無􅄂木行列整齊如人功也甘子正熟三人共食致飽訖懷三枚欲以示外人廻旋迷不能得路即聞空中語云速放􅀟甘乃聽汝去投所懷甘於地轉盻即見歸途新序曰晉文公出田逐獸入大澤迷不知所出有漁者文公謂曰我􅀂君也出我且厚賜於是遂出漁者曰臣願有獻文公曰子之所欲教寡人者何等也漁者曰鴻鵠保河海之中厭而從之小澤必有丸矰之憂􅀛魚保於淵厭而出之淺渚則必有羅網之憂今君逐獸至此何行之大逺也文公曰善哉鬻子曰文王問曰人有大忘乎對曰大忘知其身之惡而不改也以賊其身乃䘮其軀有行如此之謂大忘列子曰禹治水土也迷而失墜謬之一國當國之中有山山名壷嶺有口名滋穴有水涌出名曰神瀵山頂之泉曰瀵臭過蘭椒味過醪醴其人性婉而從物不競不争柔心而弱骨不驕不妄長㓜儕居不君不民男女􅄂遊不媒不娉縁水而居不耕不稼􅁟氣温適不織不衣百年而死不夭不病又曰宋陽里華子中年病忘朝取而夕忘夕與而朝忘在途則忘行在室則忘坐又曰秦人逢有氏子少而慧及壯而有迷罔之疾聞歌以爲哭視白以爲黒饗香以爲臭甞甘以爲苦行非以爲是楊氏告其父曰魯之君子多術藝汝奚不訪焉其父之魯遇老聃因告其子之證老聃曰汝庸知汝子之迷乎今天下之人皆惑莫有覺者旦身之迷不足傾一家一家之迷不足傾一郷一郷之迷不足傾一國一國之迷不足傾天下天下盡迷孰正之哉嚮使天下之人其心盡如汝子汝則反迷矣哀樂聲色臭味是非孰能正之且吾之此言未必非迷況魯之君子迷之郵者莊子曰顔淵曰回益矣仲尼曰何謂也回忘仁義矣曰可矣猶未也他日復見曰回坐忘矣仲尼踧然曰何謂坐忘曰隳支體黜聦明離形去智同於大道此謂坐忘又曰黄帝將見大隗子具茨之山具茨山在滎陽縣今名大隗山方明爲御昌㝢􅆖乗張􅀂謵朋前馬前馬言二人先道馬昆閽骨稽後車言二人從後車也至於襄城之野七聖皆迷無所問塗適遇牧馬小童而問塗焉尸子曰魯哀公問孔子曰魯有大忘徙而忘其妻有}
