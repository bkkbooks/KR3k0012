  - {type: variant, offset: 1575, length: 599, content: 感更合吳錄曰朱桓還屯濡須權祖之桓奉觴曰臣當遠去願一捋陛下鬚無所復恨權憑几前席桓進持鬚日臣今日真可謂捋虎鬚者權大笑吳越春秋曰越王勾踐伐吳將與大夫范蠡入臣於吳群臣皆送浙江大夫文種前為祝其辭曰皇天祐助先沉後揚禍為德根憂為福堂許邁別傳曰邁好養生遣妾歸家東遊採藥於桐廬山欲斷穀以山近人不得專一移入臨安自以無復反期乃改名遠遊書與婦別管輅別傳曰諸葛與輅別戒以二言卿性樂酒雖溫克然不可保寧當節卿相有水鏡之才所見者妙福如膏火不可不慎持節散才遊於雲漢之間不受富貴也輅言酒不可極才不可盡吾欲持酒以禮持才以愚何患之有耶穆天子傳曰天子觴西王母瑤池之上王母謠曰白雲在天山川間之荊府圖曰襄陽縣南陸道六里有林館是餞行送歸之所水經曰壽春縣故城東為長瀨津津之側有射堂北亭迎送之所江表傳曰孫權乘飛雲大舡與張昭秦松魯肅十餘人共送周瑜大宴會敘別昭等皆出權獨與劉備留語因言次嘆瑜曰公瑾文武籌略萬人之英顧其器量廣大恐不久為人臣耳李陵別傳曰陵與蘇武書曰男兒生不成名死必葬蠻夷中耳誰復能屈伸稽顙還向北闕使刀筆吏弄其文墨邪願足下勿復望陵嗟乎子卿知復何言相去萬里人絕路殊生為離別之人死為異域之鬼文士傳曰張翰到京師時齊王冏擅權翰謂同郡人顧榮曰天下紛紛未已夫有四海之名者求退難吾本山林間人無望於時去矣子善以明防前以智慮後榮捉其手愴然嘆曰吾亦思汝採南山蕨飲三江水耳翰遂稱疾徑歸府以翰輒去除吏名世說曰杜預屯荊州頓七里橋朝士悉祖之又曰阮籍嫂嘗歸家籍相見與別人或譏, SBCK: 聞}
