  - {type: variant, offset: 2355, length: 646, content: 者足矣郭子曰周叔治為晉陵謨子叔治光祿大夫西平貞侯顯弟周侯仲智送之周侯名顗字伯仁仲智名嵩次弟也叔治將泣涕不止仲智恚之曰困人及婦人別惟知啼便捨去周侯獨留與飲酒言語臨別流涕撫其背曰阿孥自愛孔叢子曰子高遊趙平原君客有鄒文李節者與相友善及將還魯諸故人訣既畢文節送行三宿臨別文節流涕交頤子高徒握手而已分背就路其徒問先生與彼二子善彼有戀戀之心而先生厲聲高揖無乃非親之謂乎高曰始吾謂此二子丈夫耳乃今知其婦人人生其有四方之志豈鹿豕哉而常群藂乎其徒曰若此二子泣非耶吾荅曰斯二子良人也有不忍之心其於斷必不足矣又曰竇皇后弟廣國曰姊去我西時與我訣於傳舍中沐我而去又曰成帝遣定陶王之國王辭去上與相對涕泣而訣琴操曰商陵牧子娶妻五年無子父兄將欲與改娶妻聞中夜驚起倚戶悲嘯牧子聞援琴鼓之痛恩愛永離歎別鶴以舒情故曰別鶴操古詩曰行行重行行與君生別離相去萬餘里各在天一涯道路阻且長會面安可期胡馬嘶北風越鳥巢南枝相去日已遠衣帶日已緩棄捐勿復道努力加飡飯李陵贈蘇武詩曰攜手上河梁遊子暮何之徘徊歧路間恨恨不能辭行人難久留客言長相思安知非日月弦望自有時弩力崇明德皓首以為期又曰仰視浮雲馳奄忽互相踰風波一失路各在天一涯又曰昔為鴛與鴦今為參與商又曰二鳧俱北飛一鳧獨南翔子當留斯土我獨歸故鄉蘇武贈李陵詩云黃鵠一遠別千里影徘徊古詩曰客從遠方來遺我一書劄上有長相思下言久離別置書懷袖中三歲字不滅江淹別賦曰黯然消魂者唯別而已矣楚辭序曰離別也騷愁也經徑也言己放逐離別中心愁思猶陳道徑以諷諫君又曰草木搖落而變衰憭栗兮若在遠行登山臨水送將歸又曰悲莫悲兮生別離, SBCK: 百九十}
