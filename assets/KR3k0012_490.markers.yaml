  - {type: variant, offset: 243, length: 3, content: 聞富貴, SBCK: 兒及我亦足勝人不湏苦之遇諸父兄弟有如僕􅀠夫妻並坐共食而令諸父餕餘其自矜無禮如此爲時人所鄙􅀏蕭子顯齊書曰司徒禇淵}
