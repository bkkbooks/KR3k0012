  - {type: variant, offset: 247, length: 0, content: '', SBCK: 湘州刺史王僧䖍閣道壞墜水僕射王常牛驚跣下車謝超宗拊掌􅀏戯曰落水三公墜車僕射賈􅁩新書曰􅉑君驕恣伐之不守出走逃於山遂餓死爲禽獸食語林曰􅀳王武子與武帝圍碁孫皓看王問孫歸命何以好剥}
