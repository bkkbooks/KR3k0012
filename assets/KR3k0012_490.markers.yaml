  - {type: variant, offset: 234, length: 2, content: 去周, WYG: 謂季氏八佾舞於庭是可忍也孰不可忍也漢書曰燕刺王旦招來郡國姦人賦斂銅鐡甲兵數閱其車騎材官卒建旌旗鼓車旄頭先驅郎中侍從著貂羽黄金附蟬皆號侍中又曰韓延夀在東郡試騎士治飾兵車畫龍虎朱爵延夀衣黄紈方領晉灼曰以黄色紈作直領駕四𫝊總建幢棨植羽葆持幢傍轂歌者先居射堂望見延夀車噭咷楚歌又取官銅物候月蝕鑄作刀劒鈎錍倣尚方治飾車甲三百萬已上於是望之劾奏延夀上僭不道棄市又曰初成都侯商嘗病欲避暑從上借明光宫又穿長安城引内渭水注第中大陂以行船立羽蓋上聞之大怒廼責問司𨽻校尉京兆尹知成都侯商擅穿帝城曲陽侯根驕奢僭上赤墀青瑣司𨽻京兆尹皆為以縦不舉奏正法二人頓首省户下梁冀别𫝊曰梁冀奢僭四方調發歲時貢獻皆先輸上等於冀乗輿乃其次焉又廣開園囿採土築山千里九坺以象二崤深林􅃉澗有若自然竒禽怪獸飛走其間妻共冀乗輦張羽蓋飾以金銀逰第内董卓别𫝊曰卓遂僭擬車服乗金華青蓋車􅀞兩輪時號竿摩車言其服飾近天子也驕慢左傳成下曰晉范文子反自鄢陵使其祝宗祈死祈請也曰君驕侈}
