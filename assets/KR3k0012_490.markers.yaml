  - {type: variant, offset: 1446, length: 0, content: '', SBCK: 太祖謂尚書崔玄伯曰蠕蠕而蠢切之民昔來號爲頑嚚毎來抄掠駕㹀牛奔遁驅犍牛隨之㹀牛不能前異部人教其以犍牛易之者蠕蠕曰其母尚不能行而况其子終於不易遂爲敵所虜北史曰齊皇甫亮所居宅洿下摽牓賣之將買者或問其故亮每荅云爲宅中水淹不泄雨即流入􅇃下由是宅終不售其淳實如此隋書曰楊玄感司徒素之子也體貌雄偉羙鬢髯少時晚成人多謂之癡其父每謂所親曰此兒不癡也及長好讀書便􅀐射以父軍功位至柱國唐書曰竇威家丗勲貴諸昆弟並尚武藝而威躭翫文史介然自守諸兄哂之謂爲書癡又曰􅄂端御史㝡爲雄劇食坐之}
  - {type: page-break, offset: 1446, content: '', id: KR3k0012_SBCK_490-7b}
  - {type: variant, offset: 1446, length: 0, content: '', WYG: 太祖謂尚書崔𤣥伯曰蠕蠕而蚕切之民昔來號為頑嚚每來抄掠駕㹀牛奔遁驅犍牛隨之㹀牛不能前異部人教其以犍牛易之蠕蠕曰其母尚不能行而况其子終於不易遂為敵所虜北史曰齊皇甫亮所居宅洿下標牓賣之將買者或問其故亮每答云為宅中水淹不泄雨即流入牀下由是宅終不售其淳實如此隋書曰楊𤣥感司徒素之子也體貌雄偉美鬚髯少時晩成人多謂之癡其父每謂所親曰此兒不癡也及長好讀書便騎射以父軍功位至柱國唐書曰竇威家世勲貴諸昆弟並尚武藝而威躭翫文史介然自守諸兄哂之謂為書癡又曰雜端御史􅆟為雄劇食坐之}
