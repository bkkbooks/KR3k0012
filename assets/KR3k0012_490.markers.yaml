  - {type: variant, offset: 1211, length: 0, content: '', WYG: 徵祥說曰海西公即位忘設豹尾夫豹尾儀服之主大人所以豹變也而海西公非可宜忘之天若曰海西凡庸不可以主社稷故忘其豹尾示不能終也山海經曰招揺之山有木焉其狀如榖而墨理榖楮也皮中作紙也其華四照名曰迷榖佩之不迷又曰厯小之山其山多櫑是木也方莖圓葉黄華而毛其實如棟亦木名子如指頭白而粘可濯衣浣練也服之不忘捜神記曰蜀中西南髙山之上有物與猴相類長七尺能作人行善走名猳一名馬化或曰玃伺行道人有後者輙盗取以去人不得知此物能别男女氣臭故取女而男不知也取去而共為家室其無子者終身不得還十年之後形皆類之意亦迷惑不復思歸産子者輙抱送還其家産子皆如人有不養者母輙死也廣州記曰廬山有山桃大如檳榔形亦似之色黑而味甘美人時登山採拾止得於上飽噉不得持下輙迷不得返述異記曰南康南野有東望山民三人上山頂有湖清深又有果林周四里許衆果畢植間無雜木行列整齊如人功也甘子正熟三人共食致飽訖懐三枚欲以示外人廻旋迷不能得路即聞空中語云速放雙甘乃聽汝去投所懐甘於地轉盻即見歸途新序曰晉文公出田逐獸入大澤迷不知所出有漁者文公謂曰我若君也出我且厚賜於是遂出漁者曰臣願有獻文公曰子之所欲教寡人者何等也漁者曰鴻鵠保河海之中厭而従之小澤必有丸矰之憂龜魚保於淵厭而出之淺渚必有羅網之憂今君逐獸至此何行之太逺也文公曰善哉鬻子曰文王問曰人有大忘乎對曰大忘知其身之惡而不改也以賊其身乃喪其軀有行如此之謂大忘列子曰禹治水土也迷而失墜謬之一國當國之中有山山名壺嶺有口名滋穴有水涌出名曰神瀵山頂之泉曰瀵臭過蘭椒味過醪醴其人性婉而従物不競不争柔心而弱骨不驕不妄長幼儕居不君不民男女雜逰不媒不聘緣水而居不耕不稼土氣温適不織不衣百年而死不夭不病又曰宋陽里華子中年病忘朝取而夕忘夕與而朝忘在途則忘行在室則忘坐又曰秦人逢有氏子少而慧及壯而有迷罔之疾聞歌以為哭視白以為黑嚮香以為臭嘗甘以為苦行非以為是楊氏告其父曰魯之君子多術藝汝奚不訪焉其父之魯遇老聃因告其子之證老聃曰汝庸知汝子之迷乎今天下之人皆惑莫有覺者且一日之迷不足傾一家一家之迷不足傾一鄉一鄉之迷不足傾一國一國之迷不足傾天下天下盡迷孰正之哉嚮使天下之人其心盡如汝子汝則反迷矣哀樂聲色臭味是非孰能正之且吾之此言未必非迷况魯之君子迷之尤者莊子曰顔淵曰囘益矣仲尼曰何謂也囘忘仁義矣曰可矣猶未也他日復見曰囘坐忘矣仲尼踧然曰何謂坐忘曰隳支體黜聰明離形去智同於大道此謂坐忘又曰黄帝將見大隗于具茨之山具茨山在滎陽縣今名大隗山方明為御昌寓驂乗張若謵朋前馬前馬言二人先道馬昆閽滑稽後車言二人従後車也至於襄城之野七聖皆迷無所問途適遇牧馬小童而問塗焉尸子曰魯哀公問孔子曰魯有大忘徙而忘其妻有諸孔子曰此忘之小者也昔商紂有臣曰王子須務為謟使其君樂須臾之樂而忘終身之憂家語同韓子曰管仲隰朋従桓公伐孤竹春徃而冬返迷失忘道管仲曰老馬之智可用也乃放老馬遂得道楚辭曰入溆浦予邅廻兮迷不知其所如劉諡之迷賦曰寵郎居山中稀行出朝市蹔來到豫章因便造人士東西二城門赫奕正相似向風徑東征直去不轉耳癡周}
