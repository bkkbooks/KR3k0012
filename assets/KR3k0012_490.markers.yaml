  - {type: variant, offset: 1270, length: 172, content: 天下將亂移家南行母曰我不能捨仲寶而去也玠啟喻深至為門戶大計母涕泣從之臨別玠謂璪曰在三之義人之所重今可謂致身命之日兄其勉之乃扶將老母轉至豫章而洛城失守璪沒焉沈約宋書曰王弘字方平家貧而性好山水求為烏傷令尋以病歸桓謙以為衛軍參軍時殷仲文還姑熟祖送傾朝謙要弘之同行荅曰凡祖離送別必在有情下官與殷風馬不接無緣陪從謙貴其言又曰張敷音儀詳緩與人別執手曰念相聞, SBCK: 爲􅀏}
