  - {type: variant, offset: 237, length: 1, content: 老, SBCK: 克敵是天益其疾也難將作矣愛我者唯祝我使速死無及於難范氏之福也漢書曰淮南王長早失母常附吕后孝惠孝文帝􅀄即位自以爲㝡親驕蹇數不奉法上寛赦之三年入朝甚撗上入苑獵與同輦常謂上爲大兄文帝賜王帛以賜吏卒勞苦者長不欲受慢曰無勞苦者又曰上官安遷車􅀐將軍日以驕􅁋受賜殿中出對賔客言與我壻飲大樂見其服飾使人歸欲自燒物}
