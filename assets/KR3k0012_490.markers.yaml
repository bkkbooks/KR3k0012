  - {type: variant, offset: 247, length: 0, content: '', WYG: 湘州刺史王僧䖍閣道壊墜水僕射王常牛驚跣下車謝超宗拊掌笑戯曰落水三公墜車僕射賈誼新書曰虢君驕恣伐之不守出走逃於山遂餓死為禽獸食語林曰晉王武子與武帝圍碁孫皓看王問孫歸命何以好剝}
