  - {type: variant, offset: 247, length: 0, content: '', krp: 湘州刺史王僧䖍閣道壞墜水僕射王常牛驚跣下車謝超宗拊掌笑戯曰落水三公墜車僕射賈誼新書曰􅉑君驕恣伐之不守出走逃於山遂餓死爲禽獸食語林曰晉王武子與武帝圍碁孫皓看王問孫歸命何以好剥}
  - {type: variant, offset: 248, length: 0, content: '', SBCK: 靣皮皓曰見無禮於君者即剥其面皮乃舉碁局武子伸脚在扄下怠惰禮記玉藻曰垂緌五寸惰遊之士也左傳僖上曰天王使召武公内史過賜􅀳侯命受王惰過歸告王曰晉侯其無後乎王賜之命而惰於受瑞先自棄也已其何繼之有又成下曰晉侯使郄錡來乞師將事不敬孟獻子曰郄氏其亡乎禮身之幹也敬身之基也郄子無基且先君之嗣卿也受命}
  - {type: variant, offset: 248, length: 0, content: '', WYG: 面皮皓曰見無禮於君者即剝其面皮乃舉碁局武子伸脚在局下怠惰禮記玉藻曰垂緌五寸惰逰之士也左傳僖上曰天王使召武公内史過賜晉侯命受玉惰過歸告王曰晉侯其無後乎王賜之命而惰於受瑞先自棄也已其何繼之有又成下曰晉侯使郤錡來乞師將事不敬孟獻子曰郤氏其亡乎禮身之幹也敬身之基也郤子無基且先君之嗣卿也受命}
