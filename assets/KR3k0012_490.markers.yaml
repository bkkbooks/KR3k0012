  - {type: variant, offset: 242, length: 0, content: '', SBCK: 卿恃女更豪耶與天家婚未有不滅門者駿曰卿女復不在天家􅁘􅁬曰我女與卿女作婢耳何能憎損後魏書曰冝都王穆壽與崔浩等輔政人皆敬浩壽獨凌之又自恃任位以爲人莫巳及謂其子師曰但令}
  - {type: variant, offset: 242, length: 0, content: '', WYG: 卿恃女更豪邪與天家婚未有不滅門者駿曰卿女復不在天家邪奮曰我女與卿女作婢耳何能增損後魏書曰宜都王穆夀與崔浩等輔政人皆敬浩夀獨凌之又自恃任位以為人莫己及謂其子師曰但令}
