  - {type: punctuation, offset: 232, content: 「, id: KR3k0012_CHANT_490-bkkpn102}
  - {type: variant, offset: 234, length: 2, content: 去周, SBCK: 謂季氏八佾舞於庭是可忍也孰不可忍也漢書曰燕刺王旦招來郡國姦人賦歛銅鐡甲兵數閱其車􅀐材官卒建旌旗鼓車旄頭先驅郎中侍從著貂羽黄金附蟬皆號侍中又曰韓延壽在東郡試􅀐士治飾兵車􅀞龍虎朱爵延壽衣黄紈方領􅀳灼日以黄色統作直領駕四傳緫建幢棨植羽葆持幢傍轂歌者先居射堂望見延壽車噭咷楚歌又取官銅物􅀱月蝕鑄作刀劒鈎􅲱放尚方治飾車甲三百萬巳上於是望之劾奏延壽上僣不道棄市又曰􅀄成都侯商甞病欲避暑從上僣明光宫又穿長安城引内渭水注第中大陂以行舡立羽蓋上聞之大怒廼責問司􅀠校尉京兆尹知成都侯商檀穿帝城曲陽侯根驕奢僣上赤墀青鎻司􅈻京兆尹皆爲以縱不舉奏正法二人傾首省户下梁兾別傳曰梁兾奢僣四方調發歳時貢獻皆先輸上第於兾乗輿乃其次焉又廣開園囿採􅁟築山十里九坺以象二崤深林􅃉間有􅀂自然竒禽恠獸飛走其間妻共兾乘輦張羽蓋飾以金銀遊第内董卓別傳曰卓遂僣擬車服乗金華青蓋車􅀞兩輪時號竿摩車言其服飾近天子也驕慢左傳成下曰晉范文子反自鄢陵使其祝宗祈死祈請也曰君驕侈}
