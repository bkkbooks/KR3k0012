  - {type: variant, offset: 1447, length: 1, content: 安, SBCK: 設一撗榻謂之南床殿中監察不得坐注云亦謂之癡床言處其上者皆驕慠自得使人如癡故謂之癡床也又曰李益與李賀齊名然少有癡病而多猜忌防閑妻妾過爲苛酷而有散􅁅扄户之譚時謂妬癡風俗通曰夜糴俗說市買者當清旦而行日中交易所有夕時便罷今乃夜糴明其癡騃不足也郭子曰}
