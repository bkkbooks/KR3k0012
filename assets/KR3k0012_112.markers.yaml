  - {type: variant, offset: 5841, length: 0, content: '', SBCK: 恣行兇􅁀下無􅂓矣上元二年潜遣人反􅀃官軍曰洛中將士皆幽朔人咸思歸魚朝恩以爲然告光弼及諸節度僕固懷恩衛伯玉等可速出兵以掃殘賊光弼等然之乃出師南道齊進次榆林賊委物僞遁將士等不復設備皆入城虜掠賊伏兵在北邙山下因大下士卒咸弃甲奔散魚朝恩衛伯玉退保陜州光弼懷恩弃河陽城退居聞喜歩兵散死者數千人軍資器械盡爲賊有河陽懷州盡䧟於賊}
