  - {type: variant, offset: 173, length: 244, content: 曆元年出閤賜第於東都積善坊久視元年從幸西京賜宅於興慶坊長安中歷右衛郎將尚輦奉御神龍元年遷衛尉少卿景龍二年四月兼潞州別駕十二月州境有黃龍白日昇天嘗出畋有紫雲在其上後從者望而得之前後符瑞凡一十九事四年中宗將祀南郊來朝京師將行使術士韓禮筮之蓍一莖孑然獨立禮驚曰蓍立奇瑞非常也不可言屬中宗末年王室多故上常陰引材力之士以自助上所居宅外有水池浸溢頃餘望氣者以為龍氣四月中宗幸其第因遊其池結綵為樓二舟令巨象踏之至六月中宗暴崩韋后臨朝稱制韋溫宗楚客紀處訥等謀傾宗社以睿宗介弟之重先謀不利道士馮道力處士劉承, WYG: ''}
