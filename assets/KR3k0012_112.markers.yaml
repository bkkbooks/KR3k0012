  - {type: variant, offset: 5407, length: 1, content: 南, SBCK: 使烏承恩爲副使候伺其過而殺之􅀄承恩父知義爲節度思明常事知義亦有開奬之恩以此光弼兾其無疑因謀殺之承恩至范陽數漏其情夜取婦人衣衣之詣諸將家以飜動之意諭之諸將以白思明思明甚懼無以爲驗有頃承恩與思敬從上京來宣恩命畢將歸私第思明留承恩耳於館中思明當有所議已令幃其所􅃦之床伏二人于其下承恩有小男先留范陽思明令省其父夜後私於其子曰吾受命除此逆胡便授吾節度矣床下二人叫呼而出以告思明思明令執之搜其衣囊得朝廷所與阿史郍承慶䥫劵及光弼與承恩之牒云承慶事了即付䥫劵不了不可付之又得簿書數百􅁓皆載先所從反軍將名思明語之曰我何􅀒於汝而至是耶承恩稱死罪此太尉光弼之謀也思明集軍將官吏百姓西向大􅂘曰臣以十三州之地十萬衆之兵降國家赤心不􅀒陛下何至殺臣因榜殺承恩父子囚李思敬遣使表其事朝廷又令中使慰諭云國家與光弼無此事乃承恩所爲殺之善也又有使從京至執三司議罪人狀以示思明思明曰陳希烈巳下皆重臣上皇弃之}
