  - {type: variant, offset: 850, length: 113, content: 延和元年凶黨因術人間睿宗曰據玄象帝座及前星有災皇太子合作天子不合更居東宮矣睿宗曰傳德避災吾意決矣七月壬午下制曰皇太子某有大功於天地定阽危於社稷溫文既習聖敬克躋委之監撫已移年歲時政益明庶工惟序服之知子庶不負時曆數在躬宜陟元后可令, SBCK: 上}
