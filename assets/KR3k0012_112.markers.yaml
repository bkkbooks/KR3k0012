  - {type: variant, offset: 5414, length: 2, content: 祿山, SBCK: 光弼尚在憂不細也大夫何不取諸將狀以誅光弼以謝河北百姓主上􅀂不惜光弼爲大夫誅之大夫乃安不然爲患未巳思明曰公等言是乃令耿仁智張不矜修表請誅光弼謝河北􅀂不從臣請臣則自領兵往太原誅光弼不矜􅀄以表示思明及封入函耿仁智盡削去之冩表者宻白思明思明怒甚執二人於庭曰汝等何得􅀒我命斬之仁智事思明頗乆意欲活之却令召入謂之曰我任使汝向三十年今日之事我不􅀒汝仁智大叫曰人生固有一}
