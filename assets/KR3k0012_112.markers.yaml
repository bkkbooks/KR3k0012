  - {type: variant, offset: 1362, length: 1181, content: 攝太常少卿唐紹以軍禮有失斬於纛下甲辰畋獵于渭川同州刺史梁國公姚元崇為兵部尚書同中書門下三品十一月戊子上加尊號為開元神武皇帝十二月庚寅朔大赦天下改元為開元四年六月癸亥太上皇崩九年四月甲戍上親策試應制舉人於含元殿謂曰古有三道今減二策近無甲科朕將存其上第務收賢俊十三年冬十月辛酉東封泰山發自東都十一月丙戍至兗州岱宗頓丁亥致齋於行宮己丑日南至備法駕登山仗衛羅列嶽下百餘里詔行從留於谷口上與宰臣禮官昇山庚寅祀昊天上帝於上壇有司祀五帝百神于下壇禮畢藏玉冊於封祀壇之石䃭然後燔柴燎發群臣稱萬歲傳呼自山頂至嶽下震動山谷上還齋宮慶雲見日抱戴辛卯祀皇地祇于社首藏玉冊於石䃭如封祀壇之禮壬辰御帳殿受朝賀大赦天下封太山神為天齊王禮秩加三公一等環山十里禁其樵採賜酺七日甲午發岱嶽景申幸孔子宅親設奠祭十二月己巳至東都時累歲豐稔東都米㪷十錢青齊米㪷五錢是冬分吏部為銓勑禮部尚書蘇頲刑部尚書韋抗工部尚書盧從愿等分掌選事十四年五月癸卯戶部進計帳今年管戶七百六萬九千五百六十五管口四千一百四十一萬九千七百一十二二十二年五月關中大風拔木同州尤甚是夏上自於苑中種麥率皇太子已下躬自收穫謂太子等曰此將薦宗廟是以躬親亦欲令汝等知稼穡之難也因分賜侍臣謂曰此歲令人巡檢苗稼所對多不實故自種植以觀其成且春秋書麥禾豈非古人所重也二十五年春正月壬午制曰朕猥集休運多謝哲王然而哀矜之情小大必慎自臨寰宇子育蒸黎未嘗行極刑起大獄上玄降鑒應以祥和思叶平邦之典致之仁壽之域自今有犯死刑除十惡罪宜令中書門下與法官詳所犯輕重具狀奏聞秋七月己卯大理少卿徐岵奏天下今歲斷死刑五十八幾致刑措二十七年八月甲申制追贈孔宣父為文宣王顏回為兗國公餘十哲皆為侯夾坐後嗣褒聖侯改封為文宣公二十九年正月制兩京諸州各置玄元皇帝廟并置崇玄學天寶元年春正月丁未朔大赦天下改元常赦不原咸赦除之百姓有欠負租稅及諸色並免之前資官及白身人有儒學愽通文詞秀逸及軍謀武藝者所在具以名薦京文武官才堪為刺史者各令封狀自舉改黃鉞為金鉞內外官各賜勳兩轉甲寅陳王府參軍田同秀上言玄元皇帝降見于丹鳳門之通衢告錫靈符在尹喜之故宅上遣使就函谷故關尹喜臺西發得之乃置玄元廟於大寧坊二月丁亥上加尊號為開元天寶聖文神武皇帝辛卯親享玄元皇帝于新廟甲午親享太廟景申合祭天地于南郊制天下囚徒罪無輕重並釋放三載正月景辰朔改年為載四載秋八月甲辰冊太真妃楊氏為貴妃七載三月乙酉大同殿柱產王芝有神光照殿群臣請加皇帝尊號曰開元天寶聖文神武應道許之夏五月壬午上御興慶宮受冊徽號大赦天下六月范陽節度使安祿山賜實封及鐵劵十一載十一月庚申御史大夫兼蜀郡長史楊國忠為右相兼文部尚書十三載二月祿山奏前後討奚契丹立功將士跳盪等請超三資於是超授將軍者五百餘人中郎將者二千餘人十四載冬十月壬辰幸華清宮景寅范陽節度使安祿山率蕃漢之兵十餘萬自幽州南向指闕以誅楊國忠為名先殺太原尹楊光翽於愽陵郡壬申聞於行在所癸酉以郭子儀為靈武太守, SBCK: ''}
