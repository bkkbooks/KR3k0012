  - {type: variant, offset: 5954, length: 2, content: 僣逆, SBCK: 儀繼戰不利賊鋒方銳屢來㓂襲上選求勇幹頻挫其鋒聖慮遑寧士心大振及帥師進討雪涕辭違歩出闕門方始乗馬廻紇葉護王子率兵入􅂇勇冠諸蕃上接以優恩結爲兄弟故香積之戰賊徒大敗遂委西京而遁雖子儀嗣業之奮命由上恩信結於士心故人思自效旣收京城民庻安堵秋毫不犯遺老歡迎對之戯欷聞賊殘衆猶保陜郊即日長驅東趍􅉑略新店之役一戰大捷慶緒之黨十殱七八數旬之間河南厎定兩都恢復二聖廻鑾統率之功推而不受肅宗還京改封楚王乾元元年三月改封成王四月庚寅立爲皇太子改名豫上元末年兩宫不豫太子徃來侍疾躬甞藥膳衣不解帶者乆之及承􅁥國之命流涕從之寳應元年四月肅宗大漸所幸張皇后無子后懼上功髙難制隂引越王係於宫中將圖廢立乙丑皇后矯詔召太子中官李輔國程元振素知之乃勒兵於凌霄門俟太子至即衛從太子入飛龍廐以俟其變是夕勒兵於三殿收捕越王係及内官朱光輝馬英俊等禁錮之幽皇后於别殿丁夘肅宗崩程元振等始迎上於九仙門見羣臣行􅁥國之禮己巳即皇帝位於柩前二年秋七月壬寅朔戊申羣臣上尊號曰寳應元聖文武皇帝御含元殿授􅁽壬子御宣政殿宣制改元曰廣德大赦天下是月吐蕃大㓂河隴䧟秦成渭三州又大震􅀜西䧟蘭廓河鄯洮岷等州盗有隴右之地己丑吐蕃㓂涇州刺史髙暉以城降因爲􅄍蕃郷導冬十月庚午朔辛未髙暉引吐蕃犯京畿㓂奉天武功盩厔等縣蕃軍自司竹園渡渭循南山而東丙子車駕幸陜州戊寅吐蕃入京師立廣武王承宏爲帝仍逼前翰林學士于可封爲制封拜辛巳車駕至陜州子儀在啇州㑹六軍使張知節烏崇福長孫全緒等率兵繼至軍威遂振舊將王甫誘聚京城惡少年齊擊鼔於朱雀街蕃軍震懾狼狽奔潰庚寅子儀收京城壬辰以宰臣元載判天下元帥癸巳以郭子儀爲京城留守十二月丁亥車駕發陜郡還京辛夘鄂州大風火發江中焚舡三千艘焚居人廬舎二千家甲午上至自陜州二年二月巳巳朔􅁽天下兵馬元帥尚書令雍王适爲皇太子癸酉上親薦獻太清宫太廟乙亥祀昊天上帝於圎丘冬十月景寅僕固懷恩引吐蕃二萬㓂邠州節度使白孝德閉城拒守丁夘㓂奉天京師戒嚴先鋒將郭晞斬賊營於邠州西俘斬數百計}
