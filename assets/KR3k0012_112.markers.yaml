  - {type: variant, offset: 5397, length: 7, content: 精神言詞無序二, SBCK: 頗懼相公之衆莫敢進也請㢮弓以安之從之思明遂以承慶守忠入内㕔飲樂之別令諸將於其所分收其甲仗其諸郡兵皆給粮恣歸之欲留者分􅀠諸營遂拘承慶斬守忠及李立節之首㑹李光弼使衙官敬俛招之思明遂令衙官竇子􅄧奉表以所管兵衆八萬人兼以僞河東節度髙秀巖來降肅宗大恱封思明爲歸義王范陽長史御史大夫河北節度使朝義已下並爲列卿秀巗雲中太守以其男如嶽等七人爲大官使内侍李思敬將軍烏承恩宣慰便令討殘賊明年改元乾元四}
