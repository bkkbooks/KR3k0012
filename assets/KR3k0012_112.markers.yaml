  - {type: variant, offset: 3157, length: 389, content: 充置頓使議其所向軍士或言河隴或言靈武太原或言還京為便韋諤曰還京須有捍賊之備兵馬未集恐非萬全不如且幸扶風徐圖所向上詢于眾眾以為然及行百姓遮路乞留皇太子願戮力破賊收復京城即日留太子戊戍次扶風縣己亥次扶風郡軍士各懷去就咸出醜言陳玄禮不能制會益州貢春綵十萬疋上悉命置于庭召諸將諭之曰卿等國家功臣陳力久矣朕之優獎常亦不輕逆胡背恩事須廻避甚知卿等不得別父母妻子朕亦不及親辭九廟言發涕流又曰朕須幸蜀路險狹人若多往恐難供承今有此綵卿等即宜分取各圖去就朕自有子弟中官相隨便與卿等決別眾咸俯伏涕泣曰死生願從陛下上曰去住任卿自是悖亂之言稍息庚子以司勳郎中劍南節度留後崔圓為蜀郡長史劍南節度副大使以穎王璈為劍南節度大使以監察御史宋若思為御史中丞充置頊使韋諤充巡閣道使並令先發辛丑發扶風郡是夕次陳倉壬寅次散關分部下為六軍穎王璈先行壽王瑁等分統六軍前後左右相次景午次河池郡崔圓奏劍南歲稔民安儲供無闕上悅授圓, SBCK: 裴冕爲}
