  - {type: variant, offset: 2859, length: 294, content: 能濟命緩之辰時至咸陽望賢驛置頓官吏駭散無復儲擬上憩於宮門之樹下亭午未進食俄有老父獻麨上謂之曰爾可進飯於是百姓獻食相繼俄又尚食持御膳至上頒給從官而後食是夕次金城縣官吏已遁令魏方進男允招誘俄得智藏寺僧進芻粟行從方給景辰次馬嵬驛諸衛頓軍不進龍武大將軍陳玄禮奏曰逆胡指闕以誅國忠為名然中外群情不無嫌怨今國步艱阻乘輿震蕩陛下宜徇群情為社稷大計國忠之徒可致之於法會吐蕃使二十一人遮國忠告訴於驛門眾即呼曰楊國忠連蕃人謀逆兵士圍驛四合及誅楊國忠魏方進一族兵猶未解上令高力士詰之廻奏曰諸將既誅國忠以貴妃在宮人情恐懼上即命力士賜貴妃自盡玄禮等見上請罪命釋之丁酉將發馬嵬驛朝臣唯見韋素一人乃命素子京兆府司錄諤為, SBCK: ''}
