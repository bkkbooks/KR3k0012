  - {type: variant, offset: 879, length: 544, content: 子不合更居東宮矣睿宗曰傳德避災吾意決矣七月壬午下制曰皇太子某有大功於天地定阽危於社稷溫文既習聖敬克躋委之監撫已移年歲時政益明庶工惟序服之知子庶不負時曆數在躬宜陟元后可令即皇帝位有司擇日授冊朕方比跡洪古希風太皇神與化遊思與道合無為無事豈不美歟王公百寮宜識朕意上惶懼遽馳見叩頭請所以傳位之旨睿宗曰吾因汝功業得宗社今帝座有眚思欲遜避唯盛德大勳始轉禍為福易位於汝吾知免矣上始居武德殿視事三品以下除授及徒罪皆決之先天二年七月三日尚書左僕射竇懷貞侍中岑羲中書令蕭至忠崔湜雍州長史李晉左羽林大將軍常元揩知羽林將軍李慈等與太平公主同謀期以其月四日以羽林兵作亂上密知之因以中旨告歧王範薛王業兵部尚書郭元振將軍王毛仲殿中監姜皎中書侍郎王琚吏部侍郎崔日用等定計因毛仲取閑廄馬及家人三百餘人率太僕少卿李令問王守一內侍高力士果毅李守德等親信十數人出武德殿入虔化門梟常元揩李慈於北闕擒賈膺福李猷於內客省以出執蕭至忠岑羲於朝堂皆斬之睿宗明日下詔曰朕將高居無為自今軍國刑政一事已上並取皇帝處分上御承天門樓下制大赦天下冬十一月甲申幸新豐之溫湯癸卯講武於驪山兵部尚書代國公郭元振坐虧失軍容配流新州給事中攝太常少卿唐紹以軍禮有失斬於纛下甲辰畋獵于渭川同州刺史梁國公姚元崇為兵部尚書同中書門下三品十一月戊子上加尊號為開元神武皇帝, WYG: 寳}
