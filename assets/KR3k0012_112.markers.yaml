  - {type: variant, offset: 5958, length: 2, content: 而滅, SBCK: 春正月癸夘朔制大赦天下改爲永㤗元年三月庚戍􅄍蕃請和詔宰臣元載杜鴻漸與蕃使同盟于興唐寺辛亥大風拔木是春大旱京師米貴斛至萬錢九月丁酉僕固懷恩死于靈州之鳴沙縣時懷恩誘吐蕃數十萬㓂邠州蕃將尚給思賛磨尚悉東賛等㓂奉天醴泉党功羗渾奴刺㓂同州及奉天逼鳯翔府盩厔縣京師戒嚴九年八月辛未幽州節度使朱泚遣弟滔奉表請自入朝兼自率五千􅀐防秋許之詔所司築第待之十年春正月乙未朔丁酉昭義牙將裴志清逐其帥薛㟧㟧奔名州上章待罪志清率衆歸田承嗣乙未朱泚乞留京師西征􅄍蕃請以弟滔權爲幽州留後許之十二年三月宰相元載王縉得罪下獄命吏部尚書劉晏訊鞫之辛巳制中書侍郎平章事元載賜自盡門下侍郎平章事王縉貶撫州刺史十四年五月癸夘上不康至辛亥不視朝辛酉皇太子􅁥國是夕上崩于紫宸之内殿謚曰睿文孝武皇帝廟號代宗十月巳酉葬元陵太平御覽卷第一百一十二}
