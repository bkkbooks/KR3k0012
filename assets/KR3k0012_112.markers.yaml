  - {type: variant, offset: 479, length: 306, content: 與崇簡朝邑尉劉幽求長上折衝麻嗣宗押萬騎果毅葛福順李仙鳧寶昌寺僧普潤等定策誅之或曰先啟大王上曰我拯社稷之危赴君父之急事成福歸於宗社不成身死於忠孝安可先請憂怖大王乎若請而從是王與危事請而不從則吾計失矣遂以庚子夜率幽求等數十人自苑南入總監鍾紹京又率丁匠百餘人以從分遣萬騎往玄武門殺羽林將軍韋璿韋播高嵩持首而至眾驩叫大集攻白獸玄德等門斬關而進左萬騎自左入右萬騎自右入合於凌煙閣前時太極殿前有宿衛梓宮萬騎聞譟聲皆被甲應之韋庶人惶惑走入飛騎營為亂兵所害於是分遣誅韋氏之黨比明內外討捕皆斬之乃馳謁睿宗謝不先啟請之罪睿宗遽前抱上而泣曰宗社禍難由汝安定神祗萬姓賴汝之力也拜殿中監同中書門下三品兼押左右萬騎進封平王睿宗即位與侍臣議立, SBCK: 詔河西節度哥舒翰爲}
