  - {type: variant, offset: 3132, length: 4, content: 嵬驛朝臣, WYG: 軍従上令力士口宣曰汝好去百姓屬望慎勿違之莫以吾為意且西戎北狄吾嘗厚之當今國步艱難必得其用汝其勉之上回至渭北便橋已斷水暴漲無舟楫上號令水濱百姓歸者三千餘人渭水可涉又過潼闗㪚卒誤以為賊與之戰士衆多傷死既而覺之乃收其餘以北上軍既濟後者皆溺上喜以為天之眷佑時従上}
