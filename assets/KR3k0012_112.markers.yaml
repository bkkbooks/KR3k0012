  - {type: variant, offset: 4761, length: 476, content: 中官輔璆琳覘之得其賄賂盛言其忠十三載正月謁於華清宮因涕泣言臣蕃人不識字陛下擢臣不次被楊國忠欲得殺臣玄宗益親厚之遂以為左僕射卻廻又請為閑廄隴右群牧等都使又請知揔監事既為閑廄群牧等使上䈥腳馬皆陰選擇之三月歸范陽疾行出關日三四百里至范陽人言反者玄宗必大怒縛送與之十四載十一月反於范陽矯稱奉恩命以兵討逆賊楊國忠以諸蕃馬步十五萬以高尚嚴莊為謀主孫孝哲高邈何千年為腹心天下承平日久人不知戰聞其兵起朝廷震驚禁衛皆市井商販之人乃以高仙芝封常清等擊之祿山又嚴肅得士死力無不一當百遇之必敗十二月渡河遂入陳留郡太守郭納出降至滎陽太守崔無詖拒戰城陷死之次于汜水甖子谷乃取谷南而過東京留守李憕中丞盧弈使採訪判官蔣清燒絕河陽橋祿山入東京殺李憕盧弈蔣清召河南尹達奚珣使之蒞事十五年正月賊竊號燕國年號聖武達奚珣已下署為將相五月南陽節度魯炅率荊襄黔中嶺南子弟十萬與賊將武令珣戰于葉縣城北滍河王師盡沒六月李光弼郭子儀出土門路大破賊眾於常山郡東嘉山河北諸郡歸順者十餘祿山窘急圖欲卻投范陽會哥舒翰自潼關領馬步八萬與賊將崔乾祐戰于靈寶西為賊覆敗翰西奔潼關為其帳下執送于賊關門不守玄宗幸蜀十一月遣, WYG: ''}
