  - {type: variant, offset: 788, length: 1, content: 僉, SBCK: 前鋒兵馬元帥令率衆二十萬守潼􅀜明年六月哥舒翰爲賊所敗􅀜門不守􅀇宗幸蜀丁酉至馬嵬頓兵軍不進請誅楊氏於是誅國忠賜貴妃自盡車駕將發留上在後宣諭百姓衆泣而言}
  - {type: variant, offset: 788, length: 57, content: 僉曰除天下之禍者享天下之福拯天下之危者受天下之安平王有聖德定天下又聞成器已下咸有推讓宜膺主鬯以副群心睿宗從之景牛制, WYG: 英得罪}
  - {type: variant, offset: 788, length: 1, content: 僉, krp: 前鋒兵馬元帥令率衆二十萬守潼關明年六月哥舒翰爲賊所敗關門不守玄宗幸蜀丁酉至馬嵬頓兵軍不進請誅楊氏於是誅國忠賜貴妃自盡車駕將發留上在後宣諭百姓衆泣而言}
