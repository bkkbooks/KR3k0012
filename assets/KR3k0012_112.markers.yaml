  - {type: variant, offset: 790, length: 1, content: 除, krp: 逆胡背恩主上播越臣等生於聖代世爲唐民願勠力一心爲國討賊請從太子收復長安玄宗聞之曰此}
  - {type: variant, offset: 792, length: 0, content: '', SBCK: 啓也乃令髙力士與壽王瑁送太子内人及服御等物留後軍廐馬從上令力士口宣曰汝好去百姓屬望愼勿違之莫以吾爲意且西戎北狄吾甞厚之今國歩艱難必得其用汝其勉之上廻至渭北便橋巳斷水􅁀漲無舟檝上號令水濵百姓歸者三千餘人渭水可渉又過潼􅀜散卒誤以爲賊與之戰士衆多傷乃收其餘衆以北上軍旣濟後者皆溺上喜以爲天之睠佑時從上唯廣平建寧二王及四軍將士􅂊二千人自奉而北夕次永壽百姓􅃒道獻牛酒有白雲起西北長數丈如樓閣之狀議者以爲天子氣戊戍至新平郡時晝夜奔馳三百餘里士衆器械亡失過半所存之衆不過一旅時賊據長安知上治兵河西三輔百姓皆曰吾太子大軍即至賊望西北塵起有時奔走七月辛酉上至靈武時魏少遊預備供帳無不畢備裴冕杜鴻漸等從容進曰今㓂逆亂常毒流函洛主上倦勤大位移幸蜀川江山阻脩奏請路絶宗社神器湏有所歸萬姓顒顒思崇明聖天意人事不可固違伏願殿}
