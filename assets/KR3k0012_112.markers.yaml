  - {type: variant, offset: 5958, length: 2, content: 而滅, WYG: 春正月癸夘朔詔大赦天下改為永泰元年三月庚戌吐蕃請和勅宰臣元載杜鴻漸與蕃使同盟于興唐寺辛亥大風拔木是春大旱京師米貴斛至萬錢九月丁酉僕固懐恩死于靈州之鳴沙縣時懐恩誘吐蕃數十萬寇邠州蕃將尚給思賛磨尚悉東賛等㓂奉天醴泉黨項羌渾如刺寇同州及奉天逼鳯翔府􅉦厔縣京師戒嚴九年八月辛未幽州節度使朱泚遣弟滔奉表請自入朝兼自率五千騎防秋許之詔所司築第待之十年春正月乙未朔丁酉昭義將裴志清逐其帥薛萼萼奔洛州上章待罪志清率衆歸田承嗣乙未朱泚乞畱京師西征吐蕃以弟滔權為幽州畱後許之十二年三月宰相元載王縉得罪下獄命吏部尚書劉晏訊鞠之辛巳制中書侍郎平章事元載賜自盡門下侍郎平章事王縉貶撫州刺史十四年五月癸邜上不豫至辛亥不視朝辛酉詔皇太子監國是夕上崩于紫宸之内殿諡曰睿文孝武皇帝廟號代宗十月己酉葬元陵太平御覽卷一百十二}
