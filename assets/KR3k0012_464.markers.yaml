  - {type: variant, offset: 21, length: 2, content: 君罔, WYG: 王衍妙善𤣥理唯談莊老為事每捉玉柄麈尾與手同色義理有所不安隨即改更世號口中雌黄朝野翕然謂之一世龍門又曰謝安常賞袁宏機對辯速安為揚州刺史宏自吏部郎出為東陽郡及祖道於冶亭時賢皆集安欲}
  - {type: page-break, offset: 21, content: '', id: KR3k0012_WYG_464-1b, image: WYG0897/WYG0897-0243d.png}
  - {type: variant, offset: 21, length: 2, content: 君罔, krp: 王衍姒善玄理唯談莊老爲事毎捉玉柄塵尾與手同色義理有所不安隨即改更世號口中雌黄朝野翕然謂之一世龍門矣又曰謝安常賞袁宏機對辯速安爲楊州刺史宏自吏部郎出爲東陽郡及祖道於治亭時賢皆集安欲}
  - {type: variant, offset: 24, length: 0, content: '', WYG: 卒廹試之臨别執宏手顧左右取一扇而授之曰聊以贈行宏應聲荅曰輒當奉揚仁風慰彼黎庶又曰華譚或問曰諺云人之相去如九牛毛寧有此理乎譚對曰昔許由讓天子之貴市道小人争半錢之利此相去何啻九牛毛也聞者稱善又曰吕珩問袁甫曰卿名能}
  - {type: variant, offset: 24, length: 0, content: '', krp: 卒迫試之臨別執宏手頋左右取一扇而授之曰聊以贈行宏應聲荅曰輙當奉楊仁風慰彼黎庻又曰華譚或問曰諺云人之相去如九牛毛寜有此理乎譚對曰昔許由讓天子之貴市道小人争半錢之利此相去何啻九牛毛也聞者稱善又曰吕珩問袁甫曰卿名能}
  - {type: substitution, offset: 24, original: 辯, replacement: 辨, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-20391}}
  - {type: variant, offset: 25, length: 5, content: 言亂舊政爾, WYG: 豈知夀陽已東何以恒水甫曰夀陽已東皆是吳人夫亡國之音哀以思鼎足疆邦一朝失職憤歎甚積積憂成雨雨久成水故其地恒澇也又曰祖納謂梅陶及鍾}
  - {type: page-break, offset: 25, content: '', id: KR3k0012_WYG_464-2a, image: WYG0897/WYG0897-0244a.png}
  - {type: variant, offset: 25, length: 5, content: 言亂舊政爾, krp: 豈知壽陽巳東何以恒水甫曰壽陽巳東皆是呉人夫亡國之音哀以思鼎足疆邦一朝失職憤歎甚積積憂成雨雨乆成水故其城恒澇也又曰祖納謂梅陶及鍾}
  - {type: variant, offset: 26, length: 6, content: 亂舊政爾雅曰, SBCK: 内内􅀂不岀}
