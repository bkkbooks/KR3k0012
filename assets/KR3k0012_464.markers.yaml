  - {type: variant, offset: 3500, length: 375, content: 金家丞問其故蘇大侯曰客辯士也立談之間再奪吾地而復歸之吾地雖小豈直百金耶又曰韓宣字景然渤海人為人短小建安中丞相召署軍謀椽冗散在鄴嘗於鄴步行入宮於東掖門內與臨淄侯植相遇時天新雨地有泥潦宣欲避之閡潦不得去乃以扇自鄣住於道邊植嫌既不去又不為禮乃駐車使其常從問宣何宮宣云丞相軍謀椽也植又問曰應得唐突列侯不宣曰春秋之義王人雖微列于諸侯之上未聞宰士而為下士諸侯之禮植又曰即如所言為人父吏見其子應有禮不宣又曰於禮臣子一例也植知其難窮乃釋去去以為辯也梁祚魏國統曰黃權來降文帝從容謂權曰君舍逆効順欲進蹤陳韓邪對曰臣過受劉氏殊遇降吳不可歸蜀無路是以歸命且敗君之將免死為幸何古人之敢慕也帝善之吳志曰孫權問諸葛恪曰卿父與叔父孰賢對曰臣父為優權問其故對曰父知所事叔父不知以是為優權又大噱命恪行酒至張昭前先有酒色不肯復飲曰此非養老之禮也權曰卿其能令公辭屈乃當飲之耳恪難昭曰師尚父九, SBCK: 六}
