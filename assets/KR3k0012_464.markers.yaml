  - {type: variant, offset: 87, length: 0, content: '', WYG: 士也子路曰夫子何以識之曰其口窮􅀈其鼻空大其服博戯其睫流撝其舉足也髙其踐地也深鹿與而牛舍又曰公孫龍辯者之徒餙}
  - {type: variant, offset: 87, length: 0, content: '', krp: 士哉語林曰諸葛靚字仲思在吴於朝堂大㑹孫皓問曰卿字仲思爲欲何思之曰在家思孝事君思忠朋友思信如斯而巳王子年拾遺録曰張儀蘇秦二}
