  - {type: variant, offset: 72, length: 0, content: '', WYG: 太子洗馬召張華問曰安樂公何如宻曰可次齊桓華問其事宻曰齊得管仲而霸得竪刁而流亡安樂公得諸葛亮而抗魏後任黄皓而䘮國成敗一也又曰釋道安俊辯有髙才自北至荆州與習鑿齒初相見道安曰彌天釋道安鑿齒曰四海習鑿齒宋記曰孝武常賜謝莊寳劒莊以與豫州刺史魯爽後反叛孝武因宴集問劒所在荅曰昔與魯爽别竊為陛下杜郵之賜上甚恱當時以為知言蕭子顯齊書曰張融字思光吳郡人也𤣥義無師法而神王過人白黒談論鮮能抗拒又曰周顒字彦倫汝南人音辭雅麗出言不窮商較朱紫發}
  - {type: page-break, offset: 72, content: '', id: KR3k0012_WYG_464-3a, image: WYG0897/WYG0897-0244c.png}
  - {type: page-break, offset: 72, content: '', id: KR3k0012_WYG_464-3b, image: WYG0897/WYG0897-0244d.png}
  - {type: variant, offset: 73, length: 3, content: 給家語, WYG: 成句每賓友㑹同顒虛席晤言聲音如流聽者忘倦蕭方等三十國春秋曰劉裕為太尉中書監裕既拜朝賢畢至僕射謝混後來衣冠傾縱頗有傲慢之容裕甚不平乃謂之曰何為旁若無人混對曰明公將隆伊周之化方使四海解衿謝混何人而敢獨異乎乃以手板披撥其衿領悉皆解散裕大恱魏收魏書曰李諧字䖍和博學才辯天平中以諧兼散騎常侍為聘梁王衍遣主客郎范胥當接胥曰黄旗紫盖本出東南君臨萬邦故宜在此諧荅帝王符命豈得與中國比隆紫盖黄旗終扵入洛無乃自害耶陳書曰簡文在東宫召戚衮講論又嘗置宴集𤣥儒之士先命道學互相質難次令中庶子徐摛馳騁大義間以劇談摛辭辯縱横難以荅抗諸人懾氣皆失次序衮時騁義摛與往復衮精采自若對荅如流簡文深加欣賞隋書曰吳興沈重名為碩學髙祖嘗令辛彦之與重論議重不能抗扵是避席而謝之曰辛所謂金城湯池無可攻之勢髙祖太恱又曰蘇䕫字伯尼少聰敏有口辯煬帝嘗從容謂宇文述虞世基等曰四夷率服觀禮華夏鴻臚之職須歸令望寧有多才多藝美容儀可以接對賓客者為之乎咸以䕫對是日拜鴻臚少卿又曰栁䛒為東宫學士每召入卧内與之宴謔䛒尤俊辯多才侍從有所顧問應荅如響唐書曰薛收歸國秦府記室房𤣥齡薦之扵太宗即日召見問以經畧收辯對縱横皆合㫖要授秦王府主簿又曰文宗嘗扵誕節召白居易與僧性澄道士趙常盈對御講論扵麟徳殿居易論難鋒起辭辯泉注上疑宿構深嗟挹之列子}
