  - {type: variant, offset: 32, length: 8, content: 諸諸便便辯也論語, WYG: 君汝潁之士利如錐我幽兾之士鈍如椎持鈍椎捶君利錐皆當摧矣陶雅並稱有神錐不可得摧納}
  - {type: variant, offset: 32, length: 0, content: '', krp: 君汝潁之士利如錐我幽兾之士鈍如椎持鈍椎棰君利錐皆當摧矣陶雅並稱有神錐不可得摧納曰假有神錐必有神椎陶雅無以對又曰武帝始登祚探策得一王者世數繼此多少帝旣不怡羣臣失色莫能有言者侍中裴揩正容儀進曰臣聞天得一以清地得一以寜侯王得一以爲天下貞帝意恱群臣歎服又曰李宻字令伯犍爲武陽人蜀朝舊臣數使於呉應機當義呉人稱其才辯蜀平以太子洗馬召張華問曰安樂公何如宻曰可次齊桓華問其事宻曰齊得管仲而霸得竪刀而流士安樂公得}
  - {type: variant, offset: 33, length: 5, content: 諸便便辯也, SBCK: 其口}
  - {type: variant, offset: 33, length: 0, content: '', krp: 葛亮而抗魏後任黄皓而喪國成敗一也又曰釋道安俊辯有髙才自北至荆州與習鑿齒𥘉相見道安曰弥天釋道安鑿齒曰四海習鑿齒宋紀曰孝武常賜謝莊寳劒莊以與預州刺史魯爽後反叛孝武因宴集問劒所在荅曰昔以與魯爽別竊爲陛下杜郵之賜上甚恱當時以爲知言蕭子顯齊書曰張融字思光吳郡人也玄義無師法而神王過人白黒談論鮮能抗拒又曰周顒字彦倫汝南人音辭雅麗出言不窮啇較朱紫發口成句毎賔友㑹同顒虚席晤語聲如流聽者忘倦䔥方等三十國春秋曰劉𥙿爲太尉中書監𥙿旣拜朝賢畢至僕射謝混後來衣冠傾縱頗有傲慢之容𥙿甚不平乃謂之曰何謂旁若無人混對曰明公將隆伊周之化方使四海解衿謝混何人而敢獨異乎乃以手板披撥其衿領悉皆解散𥙿大恱魏収魏書曰李諧字䖍和博學才辯天平中以諧兼散騎常侍爲聘梁王衍遣主客郎范胥當接胥曰黄旗紫盖夲岀東南君臨萬拜故冝在此諧荅帝王符命豈得與中國比隆紫盖黄旗終於入洛無乃自害邪陳書曰簡文在東宮召戚衮講論又甞置宴集玄儒之士先命道學玄相質難次令中庻子徐摛馳騁大義間以劇談摛辭辯縱横難以荅抗}
  - {type: variant, offset: 34, length: 2, content: 便便, krp: 人懾氣皆失次序衮時騁義摛與徃復衮精采自若對荅如流簡文深加歎賞隋書曰呉興沈重名爲碩學髙祖甞令辛彦之與重論議重不能抗於是避席而謝之曰辛所謂金城湯池無可攻之勢髙祖大恱又曰蘇䕫字伯尼少聦敏有口}
