  - {type: variant, offset: 116, length: 113, content: 三子各言爾志子貢進曰賜願使齊楚合戰於莽瀁之野兩壘相當旗鼓相望埃塵相接挺刃交兵賜著縞衣白冠陳說其間推論利害二國釋患唯賜能之矣夫子曰辯哉史記曰子貢利口巧辤孔子常絀其辯田常欲為亂於齊移兵欲伐魯孔子謂弟子曰夫魯墳墓所處父母之國國危二三, krp: ''}
