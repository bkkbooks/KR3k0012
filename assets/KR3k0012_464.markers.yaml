  - {type: variant, offset: 56, length: 120, content: 孔子曰惡利口之覆邦家者又曰禦人以口給家語曰子夏問子貢何人子曰辯人丘弗及也又曰宰予魯人也有口才以言語著名又曰孔子登農山謂二三子各言爾志子貢進曰賜願使齊楚合戰於莽瀁之野兩壘相當旗鼓相望埃塵相接挺刃交兵賜著縞衣白冠陳說其間推論利害二國釋患唯賜能之, SBCK: 剛毅木訥近仁}
  - {type: variant, offset: 56, length: 2, content: 孔子, WYG: 武帝始登祚探策得一王者世數繫此多少武帝不怡羣臣失色莫能有言者侍中裴楷正容儀進}
  - {type: page-break, offset: 56, content: '', id: KR3k0012_WYG_464-2b, image: WYG0897/WYG0897-0244b.png}
  - {type: variant, offset: 58, length: 0, content: '', krp: 舎於沙丘見主人}
  - {type: punctuation, offset: 59, content: ：, id: KR3k0012_CHANT_464-bkkpn36}
  - {type: 'tls:seg', offset: 59, content: '', id: KR3k0012_CHANT_464-3a.4}
  - {type: punctuation, offset: 59, content: 『, id: KR3k0012_CHANT_464-bkkpn37}
  - {type: variant, offset: 59, length: 8, content: 惡利口之覆邦家者, WYG: 臣聞天得一以清地得一以寧侯王得一以為天下貞帝意恱羣臣歎服}
  - {type: variant, offset: 59, length: 0, content: '', krp: 辯士也子路曰夫子何以識之曰其口窮踦其鼻空大其服博戲其㫸流撝其舉足也髙其踐地也深鹿與而牛舎又曰公孫龍辯者之徒飾人之心易人之意能勝人之口不能服人之心辯者之囿也又曰古者王天下者智雖絡天地不自慮也辯雖彫萬物不自說也魯連子曰齊之辯者田巴辯於狙丘議於稷下毁五帝罪三王訾五伯離堅白合同異一日而服千人有徐刼者其弟子曰魯連謂刼曰臣願得當田子使之不敢復談可乎徐刼言之田巴曰刼弟子年十二耳然千里之駒也願得侍議於前田巴曰可魯連曰臣聞堂上之糞不除郊草不芸白刃交前不救流矢何則急者不救則緩者非務楚軍南陽趙氏伐高唐燕人十萬之衆在聊城而不去國亡在旦暮耳先王將柰何田巴曰無柰何魯連曰夫危不能爲安亡不能爲存則無爲貴學士矣今臣將罷南陽之師還高唐之兵却聊城之衆爲所貴談談者其若此也先生之言有似梟鳴岀聲而人}
  - {type: variant, offset: 60, length: 0, content: '', krp: 之願先生之勿復談也田巴曰謹聞教明日見徐刼曰先生之駒乃非兎騕褭也豈特千里哉於是杜口易業終身不復談淮南子曰智絡天地明照日月辯解連環澤潤玉石抱朴子曰飛清機之英麗言約暢而判滯辯人也太公六韜曰辯言巧辭善毁譽者曰飛言之士皇甫謐髙士傳曰趙惠文王好劒士夾門而客三千人太子悝患之募有能止王者與千金左右曰莊子必能太子使人奉周周見王曰臣有三劒唯所用焉天子之劒賔諸侯正天下諸侯之劒如雷霆之威震四封之内無不賔服庶人之劒上絶頸領下脫肺肝而此無異於闘雞而争一旦之命也今大王有天子之位而好庶人之業臣竊爲大王薄之王不出宮三月劒客皆伏韓詩外傳曰鳥之羙羽勾啄者鳥共畏之人之}
  - {type: variant, offset: 62, length: 0, content: '', krp: 巧辯者人共畏}
  - {type: variant, offset: 63, length: 4, content: 覆邦家者, krp: 是以君子避三端文士筆端辯士舌端武士鋒端}
