  - {type: variant, offset: 2861, length: 191, content: 孫早而辯慧祖父瓊為魏郡太守建和元年正月日蝕京師不見而瓊以狀聞梁太后太后詔問所蝕多少瓊思其對而未知所況時琬年七歲在旁云何不言日蝕之餘如月之初瓊大驚即以其言應詔又曰孔融字文舉孔子世孫也李膺為河南尹恃才倨傲誡守門者非吾通家子孫不得輒通融年十二入洛欲以觀其人乃謂守門者曰吾與李君通家子孫耳守門者告膺膺呼召問曰卿與吾有何所故融曰臣先君孔子與公老君同德比義則臣與公累代通家也膺大悅引坐謂曰卿欲食, SBCK: 方}
