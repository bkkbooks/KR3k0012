  - {type: variant, offset: 3876, length: 823, content: 秉旄伏鉞猶未告老也今軍旅之事將軍在後酒食之事將軍在先何謂不養老也昭卒無辭遂為盡爵又曰孫權遣都尉趙咨使魏帝問曰吳王何等主趙咨對曰聰明仁智雄略之主也帝問其狀荅曰納魯肅於九品是其聰也拔呂蒙於行軍是其明也獲于禁而不害是其仁也取荊州兵不血刃是其智也據三州虎視於天下是其雄也屈身於陛下是其略也又曰薛綜字仲文沛郡人其先田文封薛因以氏焉避地交州士爕召為交阯太守及還都蜀使張奉於權前嘲尚書闞澤澤不能荅綜曰有犬為獨無犬為蜀橫目狗身蟲入其腹奉曰不當復別吳耶綜應聲曰無口為天有口為吳君臨萬邦天子之都奉無以對焉韋昭吳書曰吳使郎中令陳化使魏魏文帝因酒酣問化曰吳魏峙立誰將平壹海內者乎化曰易稱帝出乎震化聞先哲知命舊說紫蓋黃旗運於東南帝曰昔文王以西伯天下豈復在東乎化曰周之初基大伯在東是以文王能興於西帝笑奇其辭又曰沈珩字仲山孫權以珩有智謀能專對乃使至魏魏文帝問曰吳嫌魏東向乎珩曰不嫌也曰何以言之曰恃舊盟言歸於好是以不嫌又問太子當來寧然乎珩曰臣在東朝不坐宴不與若此之議無所聞也文帝善之乃引珩自近談語終日珩隨事響應無所屈服張勃吳錄曰吳興沈友字子正善屬文有口辯每所至眾人皆默因號曰謐眾咸言其筆之妙力之妙舌之妙皆絕於人也蜀志曰先是雍闓送張裔於孫權諸葛亮遣鄧芝使吳亮令芝言次從權請裔裔自至吳數年流徙伏匿權未知也許之遣裔臨發乃引見問裔曰蜀卓氏寡女亡奔司馬相如貴土風俗何以乃爾裔對曰愚以為卓氏之女猶賢於買臣之妻權又謂裔君還必用事西朝終必不作田父於閭里也將何以報我對曰裔負罪而歸將委命有司若蒙僥倖得全首領五十以前父母之年自此以後大王之𧶽也又曰伊籍字幾伯陽人隨先主入益州東使吳孫權聞其才辯欲逆折以辭籍適入拜權曰勞事無道之君籍即對曰一拜一起未足為勞又曰吳遣使張溫來聘百官皆往餞焉溫問秦密曰天有頭乎密曰詩云乃眷西顧以此推之頭在西方溫曰天有耳乎密曰詩云鶴鳴於九皋聲聞於天若其無耳何以聽之溫曰天有姓乎密曰姓劉曰何以知之密曰天子姓劉故以此知之溫曰日生於東乎密曰雖生於東而沒於西荅問如響溫服密之文辯凡如此類也, SBCK: 四}
