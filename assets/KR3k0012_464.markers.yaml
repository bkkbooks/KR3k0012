  - {type: variant, offset: 938, length: 307, content: 於軫王以儀言召軫問之軫曰然王聞楚有兩妻者乎王曰不聞軫曰楚有兩妻者人挑其長者長者罵之挑其少者少者復挑之居無何有兩妻者死客謂挑者曰謂汝娶長者乎少者乎挑者曰娶長者客曰長者罵汝少者復挑汝何故娶長者對曰居人之所則欲其挑我為妻則欲其罵人今楚王明主昭陽賢相使軫為臣常以國情輸楚楚王將不留臣昭陽將不與臣從事矣臣必之楚足以明臣為楚與不也軫出張儀入問王曰軫果欲之楚不王曰然軫天下之辯士寡人遂無柰何也惠王終相張儀軫遂奔楚楚用為上卿後軫為楚使之秦惠王見之謂曰子去寡人之楚寡人甚思子子思寡人乎軫曰王聞越人莊舄乎王曰不聞軫曰越人莊舄仕楚執珪有頃而病楚王曰舄越之鄙人凡人之思固在其病也思越則越聲不思越則楚聲使人聽之猶尚越聲今臣棄逐之楚能無秦聲哉, SBCK: 著書}
