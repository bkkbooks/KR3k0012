  - {type: variant, offset: 377, length: 559, content: 賜金印及牛酒又曰上問上林諸尉禽獸十餘左右視不能對虎圈嗇夫從旁代尉對上所問禽獸簿甚悉次觀其口對響應無窮乃拜嗇夫為上林令又曰秦蔡澤遊學于諸侯大小甚眾而不遇因從唐舉相曰聞子相李兌百日之內持國柄有之乎曰有之澤曰今若臣者何如唐舉熟視而笑曰先生揭鼻戾脣魋顏蹙齃吾聞聖人不相殆先生乎蔡澤被唐舉之戲乃曰富貴吾所自有吾不知者壽也願聞之舉曰先生從今已往四十三歲澤笑謝去謂其御者曰吾躍馬食肉富貴四十三年亦足矣乃來入秦使人宣言以感怒應侯范睢曰燕容蔡澤天下俊雄辯智士也彼一見秦王必奪君位應侯使人召澤澤入揖應侯應侯固不快矣及見又倨應侯因讓之曰子嘗宣言欲代吾相秦豈有之乎對曰然應侯曰請聞其說澤曰吁君何見之晚耶夫四時之序功成者去未成者來君祿位貴盛私家之富皆已極矣不退將危臣之代君不亦宜乎應侯善之乃延入坐為上客後數日入朝言於王曰客有新從山東來蔡澤其人辯士臣見人眾莫能及之臣不如也王召見與語大悅之拜為客卿應侯因謝病請歸相印昭王許之以澤為相終如其志又曰蘇秦初與張儀俱事鬼谷先生十一年皆通六藝經營百家之言鬼谷先生弟子五百餘人為之土窟窖深二丈先生曰有能獨下說窖中使我泣出者則能分人主之地久蘇秦下說窖中鬼谷先生泣下沾襟次張儀下說窖中亦泣先生曰蘇秦詞說與張儀一體也又曰楚陳軫詞辯之士也初與張儀俱事秦惠王惠王皆重之儀惡軫於王曰陳軫重幣輕信秦使之楚將為交也今楚不善於秦, SBCK: 吃}
