  - {type: page-break, offset: 808, content: '', id: KR3k0012_WYG_464-12a, image: WYG0897/WYG0897-0249a.png}
  - {type: variant, offset: 808, length: 1, content: 言, krp: 送此乃清高異行也妾亦欲察君志悉還所有以成君之髙不亦可乎次陽又問曰弟先足舉猶以爲鄙髙士不爲也賢姉未嫁而新婦先行有何汲汲乎荅曰家姉有宋伯姬之風梁髙之行節操槩於青雲貞介皦於白日家君庶堯之配舜孔子妻公冶之義丗乏此賢故且躊躇妾固陋不才遭人則可次陽嘿然悵恨外聽者曰使君努力何爲新婦所困之有傅玄七禮曰辯論鋒起探虎摩龍徐幹七喻曰戰國之際秦儀之徒智畧兼人辯利軼軌倜儻挾義觀釁相時圖爵位則佩六紱謀貨財則輸海内一怒而諸侯懼安居而天下憇人主見弄於股掌之上而莫之知惡也班固荅賔戲曰子雖馳辯如濤波摛藻如春華猶無益於殿最劉邵趙都賦曰辯論之士則智凌狙兵材過東里分摘滯義割擗纎理論折堅白辯藏三耳張衡西京賦曰其都遊說辯論之士街談巷議彈射臧否剖析豪釐擘肌分理張華縱横篇曰蘇秦始爲交同學}
