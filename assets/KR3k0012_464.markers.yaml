  - {type: variant, offset: 796, length: 0, content: '', WYG: 歸之聲與鬼相亂故也桓譚新論曰公孫龍六國時辯士也為堅白之論假物取譬謂白馬為非馬非馬者言白所以名色馬所以名形也色非形形非色世說曰郭象儀如懸河瀉水注而不竭劉向别録曰鄒奭者頗采鄒衍之術逺大而閎辯文俱難勝齊人美之頌曰談天鄒說苑曰林既衣韋而朝齊景公景公曰君子之服也小人之服也林既作色曰夫服何足以揣士行乎昔荆為長劒危冠令尹子西出焉齊短衣而管仲隰明出焉越文身剪髪而范蠡大夫種出焉如君言衣狗裘者當犬號衣羊裘者當羊名今君衣􅈢裘而朝得無為狐乎文士𫝊曰劉楨字公幹年八嵗能誦論及賦數萬言性辯甚文帝嘗請同好為主人使甄夫人出拜坐者皆伏而楨獨平視如故武帝使人觀之見楨大怒命收之主者案楨大不恭應死减一等輸作部使磨石武帝嘗輦至尚方觀作者見楨故環坐正色磨石不仰武帝問曰石何如楨因得喻巳有理跪對曰石出自荆山𤣥岩之下外有五色之章内含卞氏之珍磨之不加瑩彫之不増文稟氣堅貞受茲自然顧理枉屈紆繞獨不得申武帝顧左右大笑即日還宫赦楨復署吏又曰華譚字令思年}
  - {type: page-break, offset: 796, content: '', id: KR3k0012_WYG_464-9a, image: WYG0897/WYG0897-0247c.png}
