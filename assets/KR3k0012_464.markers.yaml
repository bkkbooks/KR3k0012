  - {type: variant, offset: 37, length: 0, content: '', krp: 煬帝甞從容謂宇文述虞世基等曰四夷率服觀禮華夏鴻臚之職須歸令望寕有多才多藝羙容儀可以接對賔客者爲之乎咸以䕫對是日拜鴻臚少卿又曰柳誓爲東宮學士毎召入卧内與之宴謔誓尤俊辯多在侍從有所頋問應荅如響唐書曰薛収歸國秦府記室房玄齡薦之於太宗即日召見問以經畧収辯對縱横皆合旨要授秦王府主簿又曰文宗嘗於誕節召白居易與僧惟澄道士趙常盈對御講論於麟徳殿居易論難鋒起辭辯泉注上疑宿構深嗟挹之列子云子夏問於孔子孔子對曰賜辯賢於丘賜}
