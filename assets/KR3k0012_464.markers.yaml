  - {type: variant, offset: 1726, length: 879, content: 學盤盂諸書應劭曰黃帝史孔甲所作名也孔甲盤孟二十六篇又曰東方朔自公卿在坐朔皆傲弄無所屈上以朔口諧給嘗問先生視朕何如主也朔對曰自唐虞之隆成康之際未足喻當世臣朔伏觀陛下功德陳五帝之上在三王之右非若此而已誠得天下賢士公卿在位咸得其人譬若以周邵為丞相孔丘為御史大夫太公為將軍卞莊子為衛尉皋陶為大理後稷為司農伊尹為少府應劭曰伊尹善烹割太官屬少府故令作子貢使外國顏閔為博士子夏為太常孟子為右扶風季路為執金吾契為鴻臚龍逢為宗正伯夷為京兆管仲為馮翊魯般為將作山甫為光祿申伯為大僕延陵季子為水衡百里奚為典屬國曉其風俗故令為之柳下惠為大長秋史魚為司直蘧伯玉為太傅如淳曰太傅傅人主使無過伯玉欲寡其過也孔父為詹事叔敖為諸侯相子產為郡守王子慶忌為期門夏育為鼎官羿為旄頭宋萬為式道候上乃大笑也又曰終軍字子雲濟南人少好學以辯博能屬文聞於郡年十八選為博士弟子至府太守聞其有異才召見軍甚奇之及至長安上書言事武帝異其文拜軍為謁者給事中又曰蒯通知天下權在於韓信令背漢乃先微感信曰僕嘗受相人之術相君之面不過封侯又危而不安相君之背貴而不可言信曰何謂也通曰天下初作難也俊雄豪傑建號壹呼天下之士雲合霧集魚鱗雜襲飆至風起當此之時憂在亡秦而已今劉項分爭使人肝腦塗地流離中野不可勝數今時兩主懸命足下足下為漢則漢勝與楚則楚勝臣願披心腹肝膽效愚忠恐足下能用也方今為足下計莫若兩利而俱存之三分天下鼎足而立天下孰不聽足下願圖之信曰漢王遇我厚吾豈可見利而背恩乎通曰臣聞勇略震主者身危功蓋天下者不賞今足下挾不賞之功載震主之威歸楚楚人不信歸漢漢人震恐足下欲將安歸乎夫勢在人臣之位而有高天下之名切為足下危之信曰生且休矣吾將念之數日通復說曰聽者事之候也計者存亡之機也夫隨廝養之役者失萬乘之權守儋石之祿者闕卿相之位計誠知之而決弗敢行者百事之禍也故猛虎猶預不如蜂蠆之致螫孟賁狐疑不如童子之必至信不忍背漢遂謝通通說不聽惶恐乃佯狂為巫天下既定後信以罪廢為淮陰侯謀反誅臨死歎曰悔不用蒯通之言高帝曰是齊辯士蒯通乃詔齊召蒯通至上欲烹之曰若教韓信反何也曰狗各吠非其主當彼時臣獨知韓信非知陛下也且秦失其鹿天下共逐之高材者得天下洶洶爭欲為陛下所為顧力, SBCK: 吃}
