  - {type: variant, offset: 94, length: 2, content: 宰予, WYG: 古之王天下者智雖絡天地不自慮也辯雖彫萬物不自說也}
  - {type: variant, offset: 94, length: 21, content: 宰予魯人也有口才以言語著名又曰孔子登農山謂, krp: ''}
