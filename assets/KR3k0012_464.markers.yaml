  - {type: variant, offset: 796, length: 0, content: '', krp: 歸之聲與鬼相亂故也桓譚新諭曰公孫龍六國時辯士也爲堅白之論假物取譬謂白馬為非馬非馬者言白所以名色馬所以名形也色非形形非色世說曰郭象議如懸河㵼水注而不竭劉向別録曰鄒奭者頗采鄒衍之術迂大而閎辯文具難勝齊人美之頌曰談天鄒說苑曰林旣衣韋而朝齊景公景公日君子之服也小人之服也林旣作色曰夫服何足以揣士行乎昔荆爲長劒危冠令尹子西岀焉齊短衣而管仲隰朋岀焉越文身剪髮而范蠡大夫種出焉如君言衣狗裘者當犬號衣羊裘者當羊鳴今君衣狐裘而朝得無為變乎文士傳曰劉禎字公幹年八歲能誦論及賦數萬言性辯捷文帝嘗請同好爲主人使甄夫人岀拜坐者皆伏而禎獨平視如故武帝使人觀之見禎大怒命收之主者案禎大不恭應死減一等輪作部使磨石武帝嘗輦至尙方觀作者見禎故環坐正色磨石不仰武帝問曰石何如禎因得喻巳自理跪對曰石出自荆山玄巖之下外有五色之章内含卞氏之珎磨之不加瑩彫之不増文禀氣堅貞受兹自然頋理枉屈紆繞獨不得申武帝頋左右大笑即日還宮赦禎復署吏又曰華譚字令思年}
  - {type: variant, offset: 797, length: 1, content: 一, WYG: 四舉秀才入洛㑹宣武塲座有辯者嘲南人諸君楚人亡國之餘有何秀異忽應斯舉衆無荅譚在下行遥曰當今六合齊􅁤異人並出吾聞大禹出扵東夷文王生扵西𦍑賢聖之在豈常之有昔武王伐紂遷商頑民扵洛邑得無吾子是其苖裔時咸改視辯者無以應也王瑱之童子𫝊曰孔林魯國人}
