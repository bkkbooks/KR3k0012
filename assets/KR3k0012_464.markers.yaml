  - {type: variant, offset: 808, length: 1, content: 言, WYG: 送此乃清髙異行也妾亦欲察君志悉還所有以成君之髙不亦可乎次陽又問曰弟先兄舉猶以為鄙髙士不為也賢姊未嫁而新婦先行有何汲汲乎夫人荅曰家姊有宋伯姬之風梁髙之行節操槩扵青雲貞介皦扵白日家君庶堯之配舜孔子妻公冶長之義世乏此賢故其躊躇妾固陋不才遭人則可次陽嘿然悵恨外聽者曰使君努力何為新婦所困傅𤣥七札曰辯論鋒起探虎摩龍徐幹七喻曰戰國之際秦儀之徒智畧兼人辯利軼軌倜儻挾義觀釁相時圖爵位則佩六紱謀貨財則輸海内一怒而諸侯懼安居而天下息人主見弄扵股掌之上而莫之知惡也班固荅賓戯曰子雖馳辯如濤波摛藻如春華猶無益扵殿最劉劭趙都賦曰辯論之士則智凌徂丘材過東里分摘滯義割擗纎理論析堅白辯臧三耳張衡西京賦曰其都逰說辯論之士街談巷議彈射臧否剖析毫釐擘肌分理張華縱横篇曰蘇秦始與張儀同學}
