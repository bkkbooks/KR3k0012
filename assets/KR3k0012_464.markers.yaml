  - {type: variant, offset: 100, length: 0, content: '', WYG: 能止王者與千金左右曰莊子必能太子使人奉周周見王曰臣有三劒唯所用焉天子之劒賓諸侯正天下諸侯之劒如雷霆之威震四封之内無不賓服庶人之劒上絶頸領下脫肺肝此無異扵鬭雞而争一旦之命也今大王有天子之位而好庶人之業臣竊為大王薄之王不出宫三月劒客皆伏韓詩外𫝊曰鳥之美羽勾喙者鳥共畏之人之利}
