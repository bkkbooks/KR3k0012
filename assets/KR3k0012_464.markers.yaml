  - {type: variant, offset: 797, length: 1, content: 一, krp: 四舉秀才入洛㑹宣武塲座有卞者嘲南人諸君楚人亡國之餘有何秀異忽應斯舉衆無荅譚在下行遥曰當今六合齊䡄異人並出吾聞大禹岀於東夷文王生於西羗賢聖之所在豈常之有昔武王伐紂遷啇頑民於洛邑得無吾子是其苗裔時咸改視辯者無以應也王瑱之童子傳曰孔林魯國人}
