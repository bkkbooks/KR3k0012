  - {type: variant, offset: 231, length: 273, content: 為莫出子貢請出孔子許之遂行子貢壹出存魯亂齊破吳強晉霸越又曰漢遣陸賈說項王請大公項王弗聽漢王復使侯公往說項王乃與漢約中分天下割鴻溝以西者為漢鴻溝以東者為楚項王即歸漢王父母妻子軍皆呼萬歲漢王乃封公為平國君曰此天下辯士所居號為平國又曰范睢欲事魏王家貧無自資乃先事魏中大夫須賈為魏使齊齊襄王聞睢辯有口賜金印及牛酒又曰上問上林諸尉禽獸十餘左右視不能對虎圈嗇夫從旁代尉對上所問禽獸簿甚悉次觀其口對響應無窮乃拜嗇夫為上林令又曰秦蔡澤遊學于諸侯大小甚眾而不遇因從唐舉相曰聞子相李兌百日之內持國柄有之乎曰有之澤曰今若臣者何如唐舉熟視而笑曰先生揭鼻戾脣魋顏蹙齃吾聞聖, WYG: ''}
