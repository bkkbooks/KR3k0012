  - {type: punctuation, offset: 8, content: 《, id: KR3k0012_CHANT_464-bkkpn1}
  - {type: variant, offset: 8, length: 1, content: 說, SBCK: 疑􅀫構深嗟挹之列子云子夏問於孔子孔子對曰賜辯賢於丘賜也能辯不能訥吾兼有之所以事吾也矣莊子曰孔子舎於沙丘見主人曰辯士也子路曰夫子何以識之曰其口窮踦其􅈹空大其服􅀶戲其㫸流撝其舉足也髙其踐地也深鹿與而牛舎又曰公孫龍辯者之徒飾人之心易人之意能勝人之口不能服人之心辯者之囿也又曰古者王天下者智雖絡天地不自慮也辯雖彫萬物不自􅀃也魯連子曰齊之辯者田巴辯於狙丘議於稷下毁五帝罪三王訾五伯離堅白合同異一日而服千人有徐刼者其弟子曰魯連謂刼曰臣願得當田子使之不敢復談可乎徐刼言之田巴曰刼弟子年十二耳然千里之駒也願得侍議於前田巴曰可魯連曰臣聞堂上之糞不除郊草不芸白刃交前不救流矢何則急者不救則緩者非務楚軍南陽趙氏伐高唐燕人十萬之衆在聊城而不去國亡在旦暮耳先王將柰何田巴曰無柰何魯連曰夫危不能爲安亡不能爲存則無爲貴學士矣今臣將罷南陽之師還高唐之兵却聊城之衆爲所貴談談者其􅀂此也先生之言有似梟鳴岀聲而人惡之願先生之勿復談也田巴曰謹聞教明日見徐刼曰先生之駒乃非兎騕褭也豈特千里哉於是杜口易業終身不復談淮南子曰智絡天地明照日月辯解連環澤潤玉石抱朴子曰飛清機之英麗言約暢而判滯辯人也太公六韜曰辯言巧辭善毁譽者曰飛言之士皇甫謐髙士傳曰趙惠文王好劒士夾門而客三千人太子悝患之募有能止王者與千金左右曰莊子必能太子使人奉周周見王曰臣有三劒唯所用焉天子之劒賔諸侯正天下諸侯之劒如雷霆之威震四封之内無不賔服庶人之劒上絶頸領下脫肺肝而此無異於闘雞而争一旦之命也今大王有天子之位而好庶人之業臣竊爲大王薄之王不出宮三月劒客皆伏韓詩外傳曰鳥之羙羽勾啄者鳥共畏之人之利口巧辯者人共畏之是以君子避三端文士筆端辯士舌端武士鋒端又曰子貢曰兩國構難壯士列陳塵埃張天錫不持尺兵斗粮解兩國之難用賜者存不用賜者亡孔子曰辯士哉語林曰諸葛靚字仲思在吴於朝堂大㑹孫皓問曰卿字仲思爲欲何思之曰在家思孝事君思忠朋友思信如斯而巳王子年拾遺録曰張儀蘇秦二人遞翦髪以相活或傭力寫書行遇聖人之文無以題記則以墨書於掌中及股裏夜還折竹寫之二人假食於路剥樹皮爲囊以盛天下良書毎息大樹之下假息而寐有一先生問曰二子何勤苦􅀂是而儀秦共與言論曰于是何人荅曰吾死生歸於山谷世論謂余歸谷子也秦儀後遊學復逢歸谷子乃請其學術則教以干世俗之辯乃探􅅐中韋祑三卷書言輔時之事故儀秦學之以終身也古史考云儀秦受術􅀑谷先生歸之聲與􅀑相亂故也􅁊譚新諭曰公孫龍六國時辯士也爲堅白之論假物取譬謂白馬為非馬非馬者言白所以名色馬所以名形也色非形形非色世􅀃曰郭象議如懸河㵼水注而不竭劉向別録曰鄒奭者頗采鄒衍之術迂大而閎辯文具難勝齊人美之頌曰談天鄒􅀃苑曰林旣衣韋而朝齊景公景公日君子之服也小人之服也林旣作色曰夫服何足以揣士行乎昔荆爲長劒危冠令尹子西岀焉齊短衣而管仲隰朋岀焉越文身剪髮而范蠡大夫種出焉如君言衣狗裘者當犬號衣羊裘者當羊鳴今君衣狐裘而朝得無為變乎文士傳曰劉禎字公幹年八歲能誦論及賦數萬言性辯捷文帝嘗請同好爲主人使甄夫人岀拜坐者皆伏而禎獨平視如故武帝使人觀之見禎大怒命收之主者案禎大不恭應死減一等輪作部使磨石武帝嘗輦至尙方觀作者見禎故環坐正色磨石不仰武帝問曰石何如禎因得喻巳自理跪對曰石出自荆山􅀇巖之下外有五色之章内含卞氏之珎磨之不加瑩彫之不増文禀氣堅貞受兹自然頋理枉屈紆繞獨不得申武帝頋左右大􅀏即日還宮赦禎復署吏又曰華譚字令思年十四舉秀才入洛㑹宣武塲座有卞者嘲南人諸君楚人亡國之餘有何秀異忽應斯舉衆無荅譚在下行遥曰當今六合齊䡄異人並出吾聞大禹岀於東夷文王生於西羗賢聖之所在豈常之有昔武王伐紂遷啇頑民於洛邑得無吾子是其苗裔時咸改視辯者無以應也王瑱之童子傳曰孔林魯國人年十􅀊詣臺魯相劉公客有獻鴈者歎曰天之於人生五榖以爲之食有魚鳥以爲之肴衆賔咸曰誠如公旨林曰不然夫萬物所生各禀天氣事不必爲人人徒以智得之故蚊蚋食人蚓虫噉土非天爲蚊蚋生人爲蚓生土公曰童子辯焉郭子曰梁國楊氏子年九歳甚聦慧孔君平詣其父父不在乃呼兒出爲設菓有楊梅孔指示兒此君家果兒應聲荅曰未聞孔崔是夫子家禽王弼別傳曰弼年十餘歳好老莊通辯能言者列女傳曰􅀽次陽妻者扶風馬季長之女也下車禮畢次陽問曰爲婦之道貞順而巳何輜軿僮婢數十黼黻􅀇黄珠璣之飾耶夫人荅曰女有三從之義在家係於父母情愛無巳欲其豊麗故不敢逆命今君欲擬鮑子子都之風不受婦家之送此乃清高異行也妾亦欲察君志悉還所有以成君之髙不亦可乎次陽又問曰弟先足舉猶以爲鄙髙士不爲也賢姉未嫁而新婦先行有何汲汲乎荅曰家姉有宋伯姬之風梁髙之行節操槩於青雲貞介皦於白日家君庶堯之配舜孔子妻公冶之義丗乏此賢故且躊躇妾固陋不才遭人則可次陽嘿然悵恨外聽者曰使君努力何爲新婦所困之有傅􅀇七禮曰辯論鋒起探虎摩龍徐幹七喻曰戰國之際􅁗儀之徒智畧兼人辯利軼軌倜儻挾義觀釁相時圖爵位則佩六紱謀貨財則輸海内一怒而諸侯懼安居而天下憇人主見弄於股掌之上而莫之知惡也班固荅賔戲曰子雖馳辯如濤波摛藻如春華猶無益於殿最劉邵趙都賦曰辯論之士則智凌狙兵材過東里分摘滯義割擗纎理論折堅白辯藏三耳張衡西京賦曰其都遊􅀃辯論之士街談巷議彈射臧否剖析豪􅁵擘肌分理張華縱横篇曰􅂫􅁗始爲交同學􅀑谷先生辯􅀃剖毫􅁵變詐入無形巧言惑正理人主莫不傾聽王廙子貢􅀞讃曰端木英辯才清吐口敷華發音楊馨訥􅀃}
