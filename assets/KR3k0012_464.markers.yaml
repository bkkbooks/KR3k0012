  - {type: variant, offset: 97, length: 0, content: '', WYG: 連子曰齊之辯士田巴辯扵徂丘議扵稷下毁五帝罪三王訾五伯離堅白合同異一日而服千人有徐刼者其弟子曰魯連謂刼曰臣願得當田子使之不敢復談可乎徐刼言之田巴曰刼弟子年十二耳然千里之駒也願得侍議扵前田巴曰可魯連曰臣聞堂上之糞不除郊草不芸白刃交前不救流矢何則急者不救則緩者非務楚軍南陽趙伐髙唐燕人十萬之衆在聊城而不去國亡在旦暮耳先生將柰何田巴曰無柰何魯連曰夫危不能為安亡不能為存則無為貴學士矣今臣將罷南陽之師還髙唐之兵却􅂓城之衆為所貴談談者其若此也先生之言有似梟鳴出聲而人惡之願先生之勿復談也田巴曰謹聞教明日見徐刼曰先生之駒乃飛兎騕褭也豈特千里哉扵是杜口易業終身不復談淮南子曰智絡天地明照日月辯解連環澤潤玉石抱朴子曰飛清機之英麗言約暢而判滯辯}
