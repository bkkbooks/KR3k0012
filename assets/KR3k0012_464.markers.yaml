  - {type: variant, offset: 1398, length: 146, content: 高祖懍然而起拔足揮洗攝衣延食其坐而謝之食其因言六國縱橫王霸之道高祖大悅問其計食其曰足下起烏合之眾收散亂之兵不滿二旅而欲鼓行入秦所謂探虎口而餵餓狼也夫陳留者當天下之衝四通五達之郊城堅粟多可以少留臣知其令請使命下之如不聽可舉兵攻之臣為內應不崇朝而拔之矣於是高祖乃遣食其說陳留令高祖引兵隨之遂下陳留, SBCK: 即召除爲丞相史}
  - {type: variant, offset: 1398, length: 198, content: 高祖懍然而起拔足揮洗攝衣延食其坐而謝之食其因言六國縱橫王霸之道高祖大悅問其計食其曰足下起烏合之眾收散亂之兵不滿二旅而欲鼓行入秦所謂探虎口而餵餓狼也夫陳留者當天下之衝四通五達之郊城堅粟多可以少留臣知其令請使命下之如不聽可舉兵攻之臣為內應不崇朝而拔之矣於是高祖乃遣食其說陳留令高祖引兵隨之遂下陳留又曰少府五鹿充宗貴幸善梁丘氏易元帝好之欲考其異同令與諸家論易充宗貴辯口諸儒莫能與抗皆稱疾不敢會有薦朱雲者, WYG: 即}
