  - {type: variant, offset: 2084, length: 1238, content: 博士弟子至府太守聞其有異才召見軍甚奇之及至長安上書言事武帝異其文拜軍為謁者給事中又曰蒯通知天下權在於韓信令背漢乃先微感信曰僕嘗受相人之術相君之面不過封侯又危而不安相君之背貴而不可言信曰何謂也通曰天下初作難也俊雄豪傑建號壹呼天下之士雲合霧集魚鱗雜襲飆至風起當此之時憂在亡秦而已今劉項分爭使人肝腦塗地流離中野不可勝數今時兩主懸命足下足下為漢則漢勝與楚則楚勝臣願披心腹肝膽效愚忠恐足下能用也方今為足下計莫若兩利而俱存之三分天下鼎足而立天下孰不聽足下願圖之信曰漢王遇我厚吾豈可見利而背恩乎通曰臣聞勇略震主者身危功蓋天下者不賞今足下挾不賞之功載震主之威歸楚楚人不信歸漢漢人震恐足下欲將安歸乎夫勢在人臣之位而有高天下之名切為足下危之信曰生且休矣吾將念之數日通復說曰聽者事之候也計者存亡之機也夫隨廝養之役者失萬乘之權守儋石之祿者闕卿相之位計誠知之而決弗敢行者百事之禍也故猛虎猶預不如蜂蠆之致螫孟賁狐疑不如童子之必至信不忍背漢遂謝通通說不聽惶恐乃佯狂為巫天下既定後信以罪廢為淮陰侯謀反誅臨死歎曰悔不用蒯通之言高帝曰是齊辯士蒯通乃詔齊召蒯通至上欲烹之曰若教韓信反何也曰狗各吠非其主當彼時臣獨知韓信非知陛下也且秦失其鹿天下共逐之高材者得天下洶洶爭欲為陛下所為顧力不能何憚誅耶上乃赦之又曰淮南王黥布反朱建諫之不聽漢既誅布聞建諫之高祖賜建號平原君家徙長安為人辯有口刻廉剛直行不茍合義不取容又曰辯士曹丘生數招權顧金錢孟康曰招金錢事權貴而求事也事貴人趙談竇長君等善季布聞寄書諫長君曰吾聞曹丘非長者勿與通及曹丘歸欲得書謁布竇長君曰季將軍不說足下足下無往固請遂使書人先發書布大怒曹至則揖布曰楚人諺曰得黃金百鎰不如得季布一諾足下何以得此聲梁楚之間哉且僕與足下俱楚人使僕游揚足下名於天下顧不美乎何足下之距僕深也布乃大悅引入留數日為上客厚送之布名所以益聞者曹丘揚之也范曄後漢書曰黃琬字子琰瓊之孫早而辯慧祖父瓊為魏郡太守建和元年正月日蝕京師不見而瓊以狀聞梁太后太后詔問所蝕多少瓊思其對而未知所況時琬年七歲在旁云何不言日蝕之餘如月之初瓊大驚即以其言應詔又曰孔融字文舉孔子世孫也李膺為河南尹恃才倨傲誡守門者非吾通家子孫不得輒通融年十二入洛欲以觀其人乃謂守門者曰吾與李君通家子孫耳守門者告膺膺呼召問曰卿與吾有何所故融曰臣先君孔子與公老君同德比義則臣與公累代通家也膺大悅引坐謂曰卿欲食乎融曰須食膺曰教卿為客之禮主人問食但讓不須融曰不然教君為主之禮但置於食不須問客膺慚乃歎曰吾將老死不見卿富貴也融曰公殊未死膺曰如何融曰鳥之將死其鳴也哀人之將死其言也善向來公言未有善也故知未死膺甚奇之後與膺談論百家經史應荅如流膺不能下之又曰劉祐字伯祖中山安國人也祐初察孝廉補尚書侍侍郎閑悉故事文札強辯每有奏議對應為儕類所歸謝承後漢書曰郭宏為郡上計吏正月朝覲宏進殿下謝祖宗受恩言辭辯麗專對移時天子曰潁川乃有此辨士邪子貢晏嬰何以加之群公屬目卿士歎伏又曰郭宏為郡上計吏朝廷問宏潁川風俗所尚土地所出先賢將相儒林文學之士宏援經以對陳事荅問出言如浮引義如流, WYG: 陣}
