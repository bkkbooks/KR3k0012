  - {type: variant, offset: 799, length: 1, content: 皆, WYG: 十嵗詣臺魯相劉公客有獻鴈者歎曰天之扵人生五榖以為食有魚鳥以為之肴衆賓咸曰誠如公㫖林曰不然夫萬物所生各稟天氣事不必為人人徒以智得之故蚊蚋食人蚓虫噉土非天為蚊蚋生人為蚓生土公曰童子辯焉郭子曰梁國楊氏子年九嵗聰慧孔君平詣其父父不在乃呼兒出為設菓有楊梅孔指示兒此君家菓兒應聲荅曰未聞孔雀是夫子家禽王弼别𫝊曰弼年十餘嵗好老莊}
  - {type: page-break, offset: 799, content: '', id: KR3k0012_WYG_464-10b, image: WYG0897/WYG0897-0248b.png}
  - {type: variant, offset: 799, length: 1, content: 皆, krp: 十歲詣臺魯相劉公客有獻鴈者歎曰天之於人生五榖以爲之食有魚鳥以爲之肴衆賔咸曰誠如公旨林曰不然夫萬物所生各禀天氣事不必爲人人徒以智得之故蚊蚋食人蚓虫噉土非天爲蚊蚋生人爲蚓生土公曰童子辯焉郭子曰梁國楊氏子年九歳甚聦慧孔君平詣其父父不在乃呼兒出爲設菓有楊梅孔指示兒此君家果兒應聲荅曰未聞孔崔是夫子家禽王弼別傳曰弼年十餘歳好老莊}
  - {type: variant, offset: 801, length: 5, content: 六藝經營百, WYG: 辯能言列女𫝊曰袁次陽妻者扶風馬季長之女也下車禮畢次陽問曰為婦之道貞順而已何輜軿僮婢數十黼黻𤣥黄珠璣之飾耶夫人荅曰女有三從之義在家係扵父母情愛無已欲其豐麗故不敢逆命今君欲擬鮑子都之風不受婦}
  - {type: page-break, offset: 801, content: '', id: KR3k0012_WYG_464-11a, image: WYG0897/WYG0897-0248c.png}
  - {type: variant, offset: 801, length: 5, content: 六藝經營百, krp: 辯能言者列女傳曰袁次陽妻者扶風馬季長之女也下車禮畢次陽問曰爲婦之道貞順而巳何輜軿僮婢數十黼黻玄黄珠璣之飾耶夫人荅曰女有三從之義在家係於父母情愛無巳欲其豊麗故不敢逆命今君欲擬鮑子子都之風不受婦}
