  - {type: variant, offset: 2697, length: 151, content: 竇長君等善季布聞寄書諫長君曰吾聞曹丘非長者勿與通及曹丘歸欲得書謁布竇長君曰季將軍不說足下足下無往固請遂使書人先發書布大怒曹至則揖布曰楚人諺曰得黃金百鎰不如得季布一諾足下何以得此聲梁楚之間哉且僕與足下俱楚人使僕游揚足下名於天下顧不美乎何足下之距僕深也布乃大悅引入留數日為上客厚送之布名所以益聞者曹丘揚之也, SBCK: ''}
