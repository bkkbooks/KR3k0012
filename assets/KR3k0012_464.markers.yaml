  body:
  - {type: variant, offset: 3, length: 3, content: 一百四, WYG: ''}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 五辯下訥辯下晉書曰王衍姒善􅀇理唯談莊老爲事毎捉玉柄塵尾與手同色義理有所不安隨即改更世號口中雌黄朝野翕然謂之一世龍門矣又曰謝安常賞􅀽宏機對辯速安爲楊州刺史宏自吏部郎出爲東陽郡及祖道於治亭時賢皆集安欲以卒迫試之臨別執宏手頋左右取一扇而授之曰聊以贈行宏應聲荅曰輙當奉楊仁風慰彼􅀺庻又曰華譚或問曰諺云人之相去如九牛毛寜有此理乎譚對曰昔許由讓天子之貴市道小人争半錢之利此相去何啻九牛毛也聞者稱善又曰吕珩問􅀽甫曰卿名能辯豈知壽陽巳東何以􅁪水甫曰壽陽巳東皆是呉人夫亡國之音哀以思鼎足疆􅀖一朝失職憤歎甚積積憂成雨雨乆成水故其城􅁪澇也又曰祖納謂梅陶及鍾雅曰君汝潁之士利如錐我幽兾之士鈍如椎持鈍椎棰君利錐皆當摧矣陶雅並稱有神錐不可得摧納曰假有神錐必有神椎陶雅無以對又曰武帝始登祚探策得一王者世數繼此多少帝旣不怡羣臣失色莫能有言者侍中裴揩正容儀進曰臣聞天得一以清地得一以寜侯王得一以爲天下貞帝意恱群臣歎服又曰李宻字令伯犍爲武陽人蜀朝舊臣數使於呉應機當義呉人稱其才辯蜀平以太子洗馬召張華問曰安樂公何如宻曰可次齊桓華問其事宻曰齊得管仲而霸得竪刀而流士安樂公得諸􅁑亮而抗魏後任黄皓而喪國成敗一也又曰釋道安俊辯有髙才自北至荆州與習鑿齒􅀄相見道安曰弥天釋道安鑿齒曰}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_464-1b}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_464-2a}
  - {type: variant, offset: 5, length: 1, content: 四, krp: 五}
  - {type: xml-element, offset: 6, content: '', id: KR3k0012_CHANT_464-bkkxmlele1}
  - {type: 'tls:seg', offset: 6, content: '', id: KR3k0012_CHANT_464-1a.1}
  - {type: 'tls:seg', offset: 6, content: '', id: KR3k0012_CHANT_464-1a.2}
  - {type: variant, offset: 6, length: 0, content: '', SBCK: 海習鑿齒宋紀曰孝武常賜謝莊寳劒莊以與預州刺史魯爽後反叛孝武因宴集問劒所在荅曰昔以與魯爽別竊爲陛下杜郵之賜上甚恱當時以爲知言蕭子顯齊書曰張融字思光吳郡人也􅀇義無師法而神王過人白黒談論鮮能抗拒又曰周顒字彦倫汝南人音辭雅麗出言不窮啇較朱紫發口成句毎賔友㑹同顒虚席晤語聲如流聽者忘倦䔥方等三十國春秋曰劉􅁉爲太尉中書監􅁉旣拜朝賢畢至僕射謝混後來衣冠傾縱頗有傲慢之容􅁉甚不平乃謂之曰何謂旁􅀂無人混對曰明公將隆伊周之化方使四海解衿謝混何人而敢獨異乎乃以手板披撥其衿領悉皆解散􅁉大恱魏収魏書曰李諧字䖍和博學才}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_SBCK_464-2b}
  - {type: substitution, offset: 6, original: 辯, replacement: 辨, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-20391}}
  - {type: variant, offset: 7, length: 0, content: '', SBCK: 天平中以諧兼散􅀐常侍爲聘梁王衍遣主客郎范胥當接胥曰黄旗紫盖夲岀東南君臨萬拜故冝在此諧荅帝王符命豈得與中國比隆紫盖黄旗終於入洛無乃自害邪陳書曰簡文在東宮召戚衮講論又甞置宴集玄儒之士先命道學玄相質難次令中庻子徐摛馳騁大義間以劇談摛辭辯縱横難以荅抗諸人懾氣皆失次序衮時騁義摛與徃復衮精采自􅀂對荅如流簡文􅀷加歎賞隋書曰呉興沈重名爲碩學髙祖甞令辛彦之與重論議重不能抗於是避席而謝之曰辛所謂金城湯池無可攻之勢髙祖大恱又曰蘇䕫字伯尼少聦敏有口辯煬帝甞從容謂宇文述虞世基等曰四夷率服觀禮華夏鴻臚之職須歸令望寕有多才多藝羙容儀可以接對賔客者爲之乎咸以䕫對是日拜鴻臚少卿又曰柳誓爲東宮學士毎召入卧内與之宴謔誓尤俊辯多在侍從有所頋問應荅如響唐書曰薛収歸國􅁗府記室房玄齡薦之於太宗即日召見問以經畧収辯對縱横皆合旨要授􅁗王府主簿又曰文宗嘗於誕節召白居易與僧惟澄道士趙常􅄹對御講論於麟徳殿居易論難鋒起辭辯泉注}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_SBCK_464-3a}
  - {type: variant, offset: 7, length: 12, content: 上說文曰辯治也音被免切尚, WYG: 下晉}
  - {type: variant, offset: 7, length: 4, content: 上說文曰, krp: 下訥}
