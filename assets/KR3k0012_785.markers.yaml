  - {type: variant, offset: 44, length: 12, content: 性質直強勇便持矛步戰魏志, SBCK: 頭造闕下群臣恠而診視之乃呉將軍首也帝大喜乃以女配槃瓠槃瓠得女􅀒而走南山止石室中所處險絶人跡不至於是女解去衣裳爲僕鑒之髻結著獨力之衣僕鑒獨力皆未詳流俗或改鑒爲堅者妄穿鑿也經三年生子十二人六男六女槃瓠死後因自相夫妻織績木皮染以草實好五色衣服製裁皆有尾形其衣裳班蘭語言侏離好入山壑不樂平曠帝順其意賜以名山廣澤其後滋蔓號}
