  - {type: variant, offset: 229, length: 0, content: '', WYG: 可尚書令虞詡獨奏曰自古聖人不臣異俗非德不能及威不能加其獸心貪婪難率以禮是故覊縻而綏撫之附則受而不逆叛則棄而不追先帝舊典貢税多少所由来乆矣今猥増之必有怨叛計其所得不償所費必有後悔帝不從其冬澧中漊中蠻漊水出今澧陽郡漊音婁也果爭貢布非舊約遂殺鄉吏舉種反叛明年遣武陵太守李進討破之斬首數千級餘皆降散又曰延熹中長沙零陵蠻反叛冦江陵荆州刺史劉度謁者馬睦南郡太守李肅皆奔走肅主簿胡爽扣馬首諫曰蠻夷見郡無警備故敢乗閒而進明府為國大臣連城千里舉旄鳴鼔應聲十萬柰何委付守之重而為逋逃之人乎肅㧞刃向爽曰掾促去太守今急何暇比計抱馬固諫肅遂殺爽而走帝聞之徴肅棄市復爽門閭拜家一人為郎魏略曰髙辛氏有老}
