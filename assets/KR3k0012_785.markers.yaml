  - {type: variant, offset: 161, length: 0, content: '', krp: 遣伏波將軍馬援將兵至臨沅今武陵郡武縣即漢臨沅縣也擊破之單程等飢困乞降㑹援病卒謁者宗均聽悉受降爲}
  - {type: variant, offset: 162, length: 0, content: '', SBCK: 吏以司之群蠻遂平又曰順帝永和􅀄武陵太守上書以蠻夷率服可比漢人増其租賦議者皆以爲可尚書令虞詡獨奏曰自古聖王不臣異俗非德不能及威不能加其獸心貪婪難率以禮是故羈縻而綏撫之附則受而不逆叛則弃而不追先帝舊典貢稅多少所由來乆矣今猥増之必有怨叛計其所得不償所費必有後悔帝不從其冬澧中漊中蠻漊水出令澧陽郡漊音婁果爭貢布非舊約遂殺郷史舉種反叛明年遣武陵太守李進討破之斬首數百級餘皆降散又曰延熹中長沙零陵蠻反叛㓂江陵荆州刺史劉度謁者馬睦南郡太守李肅皆奔走肅王簿胡爽扣馬首諌曰蠻夷見郡無儆備故敢乗間而進明府爲國大臣連城千里舉旄鳴皷應聲十萬􅁗何委付守之重而爲逋逃之人平肅拔刃向爽曰􅁺促去太守今急何暇此計枹馬固諌肅遂殺爽而走帝聞之徴肅弃市復爽門問拜家一人爲郎魏略曰髙辛氏有老婦居王室得耳疾挑之乃得物大如蠒婦人盛瓠中覆之以槃俄湏化爲犬其}
