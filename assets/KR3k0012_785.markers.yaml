  - {type: variant, offset: 21, length: 0, content: '', SBCK: 􅄬公始得一蠻府叅軍郍得不作蠻語越裳國尚書大傳曰交阯之南有越裳國周公居攝六年制禮作樂天下和平越裳以三象重譯而獻曰雉曰道路悠逺山川阻深音使不通故重譯而朝成王以歸周公曰徳不加焉則君子不饗其質質亦贄也政不施焉則君子不臣其人吾何以獲此賜也其使請曰吾受命吾國之黄耇日乆矣天之無烈風注雨意者中國有聖人乎有則盍往朝之周公乃歸之於王稱先王之神致以薦于宗廟周德旣衰於是稍絶黄支國漢書曰黄支國}
  - {type: page-break, offset: 21, content: '', id: KR3k0012_SBCK_785-2b}
  - {type: variant, offset: 21, length: 0, content: '', WYG: 投公始􅀶一蠻府參軍那得不作蠻語越裳國尚書大𫝊曰交趾之南有越裳國周公居攝六年制禮作樂天下和平越裳以三象重譯而獻白雉曰道路悠逺山川阻深音使不通故重譯而朝成王以歸周公曰德不加焉則君子不饗其質質亦贄也政不施焉則君子不臣其人吾何以獲此賜也其使請曰吾受命吾國之黄耈曰乆矣天之無烈風滛雨意者中國有聖人乎有則盍往朝之周公乃歸之於王稱先王之神致以薦於宗廟周既衰於是稍絶黄支國漢書曰黄支國}
  - {type: page-break, offset: 21, content: '', id: KR3k0012_WYG_785-3b, image: WYG0899/WYG0899-0826d.png}
