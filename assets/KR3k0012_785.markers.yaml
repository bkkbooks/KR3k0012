  - {type: variant, offset: 2500, length: 195, content: 國畜牛以乳為酪有赤梨經年不壞多蒲桃其地無鐵有銅不貴金銀市無租估其婚姻法壻往女家門外竹屋晨夕灑掃經年而女不悅即驅之相悅乃成婚婚禮大抵與中國同親喪也日不食祖父母喪五日不食兄弟伯叔姑姉妹三日不食設坐為神像朝夕拜奠不制衰絰嗣王立三年不親國事其俗舊無佛法宋大明二年罽賓國常有比丘五人游行其國始佛法經教焉女國南史曰沙門惠深云女國在扶桑東千餘其人容白端正色甚潔白身體存毛髮長委地至二三月竟入水妊娠六七月產, WYG: 豪富}
