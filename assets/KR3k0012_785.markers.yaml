  - {type: variant, offset: 1843, length: 5, content: 乙力支朝獻, WYG: 右衞將軍李崇討平之徙萬餘家於河北及六鎮尋叛南走所在追討比及河殺之皆盡正始二年梁沔東太守田清喜擁七郡三十一縣戸萬九千内附永平初東荆州太守桓叔與表前後招慰太陽蠻歸附者一萬七百戸請置郡十六縣五十詔前鎮東府長史酈道元檢行置之後二荆兩郢蠻}
