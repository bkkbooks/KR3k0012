  - {type: variant, offset: 775, length: 681, content: 東夷夫餘飲食類此皆用俎豆唯挹婁獨無法俗最無綱紀魏志所載同山海經曰不咸出在肅慎國有樹名雄先人代帝於此取依其谷無衣中國有聖帝代立者則此木皮可衣家語曰孔子在陳惠公賓之於上館時有隼集於陳侯之庭而死楛矢貫之石砮楛木名砮箭鏃其長尺有咫惠公使以隼如孔子之館問焉子曰隼之來遠矣此肅慎氏之矢也事具愽物部肅慎國記曰肅慎氏其地在夫餘國北可六十日行東濱大海夏則巢居冬則穴處父子世為君長無文墨以言語為約其畜有馬豬牛羊不知乘馬以為財產而已豬放山谷中食其肉坐其皮績豬毛以為布無井竈人作瓦鬲四五升以食坐則箕踞足袂肉而啖之得凍肉坐其上令煥土地無鹽燒木作灰灌取汁食之俗皆編髮以布作褡俓尺餘以蔽前嫁娶之法男以毛羽插女頭女和則持歸然後致禮娉之婦貞而女淫貴壯賤老寡居終身不嫁性兇悍以無憂喪相尚父母死男子不哭哭者謂之不壯相盜贓物無多少盡誅殺之雖野處而不相犯死者即日便葬於野交木作小槨殺豬積槨上富室數百貧者數十以為死者之糧以土覆之以繩繫於槨頭出土上以酒灌酹纔繩腐而止無時祭祀也其檀弓三尺五寸括矢長尺有咫石砮皮骨申石山在國東北取之必先祈神石利入鐵勿吉後魏書曰勿吉國在高句驪北舊肅慎國也去洛五千里國有大水闊三里餘名速木其地下濕無牛有車馬佃則偶耕車則步推有粟及麥穄音祭菜則有葵水氣鹹凝鹽生樹上亦有鹽池多豬無羊嚼米醞酒飲之能醉婦人則布裙男子豬大皮裘婚之夕男就女家執女乳而罷便以為定仍為夫婦俗以人溺洗手面頭插虎豹尾其父母春夏死立埋之冢上作屋不令雨濕若秋冬死以其尸哺貂食其肉多得之國南有從太山魏言太皇有虎豹熊狼不害人其傍有大莫盧覆鍾國莫多廻國庫婁國素和國其伏弗國延犁小國拔大何國都羽陵國庫伏真國魯婁國羽真俟國前陵各遣朝獻, SBCK: ''}
