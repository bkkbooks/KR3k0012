  - {type: variant, offset: 5, length: 3, content: 婁後魏, SBCK: 不率從尚書舜典曰柔逺能邇惇德允元而難任人蠻夷率服帝曰臯陶蠻夷猾夏㓂賊姦宄猾乱也夏華夏也羣行攻劫曰㓂殺人曰賊在外曰姦在内曰究言無殺所致也又禹貢曰三百里蠻以文德來之不制以法論語曰子張問行子曰言忠信行篤敬雖蠻貃之􅀖行矣史記曰呉太伯弟仲雍皆周大王之子避季歴乃犇荆蠻文身斷髮示不可用荆蠻義之從西歸之千餘家漢}
