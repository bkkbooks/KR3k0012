  - {type: variant, offset: 1646, length: 190, content: 車骨西北其七曰山部在栗末東南勝兵並不過三千而黑水部尤為勁健自拂涅以東矢皆石鏃即古肅慎氏也東夷中為強國所居多依山水渠帥曰大莫弗瞞母官切咄國南有從太山者俗甚敬畏之人不得山上溲汙行經山者以物盛去地卑濕築土如堤鑿穴以居開口向上以梯出入其妻有外淫者人告其夫夫輒殺妻而後悔必殺告者由是奸淫事終不敢發人皆善射以射獵為業角弓長三尺箭長尺二寸常以七八月造毒藥傅矢以射禽獸中者立死煮毒藥氣亦能殺人又曰, SBCK: 逺將軍}
