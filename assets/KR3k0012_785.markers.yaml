  - {type: variant, offset: 2580, length: 1035, content: 日不食兄弟伯叔姑姉妹三日不食設坐為神像朝夕拜奠不制衰絰嗣王立三年不親國事其俗舊無佛法宋大明二年罽賓國常有比丘五人游行其國始佛法經教焉女國南史曰沙門惠深云女國在扶桑東千餘其人容白端正色甚潔白身體存毛髮長委地至二三月竟入水妊娠六七月產子女人胸前無乳項後生毛根白毛中有汗似乳子百日能行三四年則成人矣兒見人驚避偏畏丈夫食醎草如禽獸醎草葉似邪蒿而氣味醎文身南史曰文身國在倭國東北七千餘里人體有文如獸其額上有三文大直貴文小曲者賤土俗歡樂物豊而賤行客不齎糧有屋宇無城郭國王所居飾以金銀珍麗遶屋為壍廣一丈實以水銀雨則流于小銀之上市用珍寶大漢南史曰漢國在文身國東五千餘里無兵戈不戰代鳳俗並與文身國同而言語異流求陰書曰流求國居海島之間當建安郡東水行五日而至閩川之東也土多出銅其王姓歡斯名渴剌兜不知其由來有國代數也彼土人呼之為可老羊妻曰多快茶所居曰波羅檀洞壍柵三重環以流水樹棘為藩王所居舍其十人十六門彫刻禽獸多鬥鏤樹以橘而葉蜜條纖如髮紛然下垂國有四五師統諸洞洞有小王往往有村村有鳥了帥並以善戰者為之自相樹立理一村之事男女皆以白紵纏髮從頭盤繞婦人以羅紋白布為帽織鬥鏤皮并雜色紵及雜花以為衣製裁不一織藤為苙飾以毛羽兵有刀矟弓箭劍鼓之屬編紵為甲或以熊豹之皮王乘木獸令人舉之而行導從不過數十人國人好相攻擊人皆驍健善走難死而耐創諸洞各為部隊不相救助兩陣相當勇者三五人相擊射如其不勝一軍皆走遣人致謝即共和解收取鬥死者共聚而食之食皆用手無賦歛有事則均稅俗無文字視月虧盈以紀時節候草枯以為年歲人深目長鼻頗類於胡人縱年老髮多不白無君臣上下之節拜伏之禮父子同床而寢婦人產乳必食子衣以木槽曝海水為鹽木汁為醋釀米麴為酒遇得異味先進尊者凡有宴會執酒者必待呼名而後飲上王者酒亦呼王名衘盃同飲頗同突厥歌呼蹋蹄一人唱眾皆和音韻哀怨其死者氣將絕舉至庭浴其屍以布帛纏之裹以葦草櫬土而殯上不起墳為子者數月不食肉有熊羆豺狼尤多豬鷄無牛羊驢馬厥田良沃先以火燒而引水灌之持一插以石為刃長尺餘闊數寸而墾之宜播種樹木同江表氣候與嶺南相類俗事山海之神祀以酒肴鬥戰殺人便將所殺人祭其神煬帝大業初海帥何蠻等每春秋二時天清風靜東向依稀似有煙霧之氣亦不知幾千里三年帝令羽騎尉朱寬入海求訪異俗何蠻言之遂與蠻俱往因到流求國言語不相通掠一人并取其甲而還時倭國使來朝貢見之曰此夷邪久國人所用也帝遣武賁郎將陳稜朝請大夫張鎮同率兵自義安浮海擊之至流求初稜將南方諸國人從軍有崑崙人頗解其語遣人慰諭之流求不從拒逆官軍稜擊走之進至其都頻戰皆敗毀其宮室虜其男女數千人而還, SBCK: ''}
