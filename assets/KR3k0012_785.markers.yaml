  - {type: variant, offset: 1839, length: 9, content: 勿吉國遣乙力支朝獻, SBCK: 大陽蠻首桓誕擁河水以北滍葉以南八萬餘落内屬孝文嘉之拜誕東荆州刺史襄陽王誕字天生桓玄子也旣内屬居朗陵王師南伐請爲前駈討義陽不果而旋太和十七年蠻首田益宗率部曲四千餘户内屬襄陽蠻首雷婆思等十一人率千餘户内徙求居}
  - {type: variant, offset: 1839, length: 3, content: 勿吉國, WYG: 太陽蠻首桓誕擁河水以北强葉以南八萬餘户内屬孝文嘉之拜誕東荆州刺史襄陽王誕字天生桓𤣥子也既内屬居朗陵王師南伐請為前驅討義陽不果而旋太和十七年蠻首田益宗率部曲四千餘户内屬襄陽蠻首雷婆思等十一人率千餘戸内徙求居太和川詔給廪食後開南陽全有沔北之地蠻人安堵不為盗賊宣武景明初大陽蠻首田育丘等二萬八千户内附詔制四郡十八縣魯陽蠻魯北燕等聚衆萬餘攻逼頻陽}
