  - {type: variant, offset: 3146, length: 469, content: 人相擊射如其不勝一軍皆走遣人致謝即共和解收取鬥死者共聚而食之食皆用手無賦歛有事則均稅俗無文字視月虧盈以紀時節候草枯以為年歲人深目長鼻頗類於胡人縱年老髮多不白無君臣上下之節拜伏之禮父子同床而寢婦人產乳必食子衣以木槽曝海水為鹽木汁為醋釀米麴為酒遇得異味先進尊者凡有宴會執酒者必待呼名而後飲上王者酒亦呼王名衘盃同飲頗同突厥歌呼蹋蹄一人唱眾皆和音韻哀怨其死者氣將絕舉至庭浴其屍以布帛纏之裹以葦草櫬土而殯上不起墳為子者數月不食肉有熊羆豺狼尤多豬鷄無牛羊驢馬厥田良沃先以火燒而引水灌之持一插以石為刃長尺餘闊數寸而墾之宜播種樹木同江表氣候與嶺南相類俗事山海之神祀以酒肴鬥戰殺人便將所殺人祭其神煬帝大業初海帥何蠻等每春秋二時天清風靜東向依稀似有煙霧之氣亦不知幾千里三年帝令羽騎尉朱寬入海求訪異俗何蠻言之遂與蠻俱往因到流求國言語不相通掠一人并取其甲而還時倭國使來朝貢見之曰此夷邪久國人所用也帝遣武賁郎將陳稜朝請大夫張鎮同率兵自義安浮海擊之至流求初稜將南方諸國人從軍有崑崙人頗解其語遣人慰諭之流求不從拒逆官軍稜擊走之進至其都頻戰皆敗毀其宮室虜其男女數千人而還, WYG: ''}
