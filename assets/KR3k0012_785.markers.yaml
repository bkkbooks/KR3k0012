  - {type: variant, offset: 10, length: 9, content: 豆莫婁國在勿吉國北, SBCK: 賈􅁩上書云凢天子者天下之首何也上也蠻夷者天下之足何也夫下也丗􅀃曰郝隆爲桓温南蠻叅軍三月三日就温席作詩曰娵隅躍清池温問何物荅曰蠻名魚爲娵隅桓曰何爲作蠻語隆曰}
