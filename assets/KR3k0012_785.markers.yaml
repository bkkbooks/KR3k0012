  - {type: variant, offset: 2, length: 2, content: 五豆, SBCK: 部六南蠻一叙南蠻越裳國黄支國盤瓠􅅒君板楯蠻俚叙南蠻禮記曰王制曰南方曰蠻雕題交阯有不火食者矣雕文謂刻肌以丹青􅄺之交距足相郷不火食地氣煖不爲病傳曰庸人率群蠻以叛楚庸今上庸縣屬楚之小國麋人率百濮聚於選將伐楚選楚地百濮夷也於是申息之北門不啓又曰楚子聞蠻氏之亂也與蠻子無質也質信也使然丹誘戎蠻子嘉殺之遂取蠻氏又曰王子朝使告于諸侯曰兹不􅂖震蕩播越竄在荆蠻未有攸底詩曰蠢爾蠻荆大􅀖爲讎蠢動也蠻荆荆州之蠻也又曰脩爾車馬弓矢戎兵用戒戎作用逷蠻方蠻方蠻荆之外也此時中國微弱故復戒將率之臣以治軍實又曰保有鳬繹遂荒徐宅至于海􅀖淮夷蠻貃及彼南夷}
