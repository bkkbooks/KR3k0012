  - {type: variant, offset: 170, length: 261, content: 也以侯伯有功德者加命作州長謂之牧所謂八命作牧者也監謂公侯伯子男各監一國也鄭司農云殷治律輔為民之平也乃施則干都鄙而建其長立其兩設其伍陳其殷置其輔長謂公卿大夫兩謂兩卿也乃施法于官府而建其正立其貳設其攷陳其殷置其輔凡治以典待邦國之治以則待都鄙之治以灋待官府之治以官成待萬民之治以禮待賓客之治凡邦之小治則冢宰聽之待四方賓客之小治大事決乎王小事冢宰專平之歲終則令百官府各正其治受其會正正處也會大計也聽其政事而詔王廢置平其事來至者之功狀而奏白王三歲則大計群吏之治而誅賞之事久則聽之大無功不徒廢必罪之有大功不徒置又賞之鄭司農云三載考續是, SBCK: 斤斧}
