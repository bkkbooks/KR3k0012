  - {type: variant, offset: 3587, length: 269, content: 有弗若于汝政弗化于汝訓辟以止辟乃辭有不順於汝政不變於汝教刑之而懲止犯刑者乃刑之狃于姦宄敗常亂俗三細不宥習於姦究凶惡毀敗玉常之道以亂風俗之教罪雖小三犯不赦所以絕惡源也論語曰子禽問於子貢曰夫子至於是邦也必聞其政求之與抑與之與子貢曰夫子溫良恭儉讓以得之夫子之求之也其諸異乎人之求之與又曰為政以德譬如北辰居其所而眾星拱之又曰子貢問政子曰足食足兵民信之矣又曰齊景公問政於孔子孔子對曰君君臣臣父父子子公曰善哉信如君不君臣不臣父不父子不子雖有粟吾得而食諸又曰子張問政子曰居之無倦行之以忠又曰季康子問政於孔子孔子對曰政者正也子帥以正孰敢不正又曰季康子問於, SBCK: ''}
