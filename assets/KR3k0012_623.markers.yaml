  - {type: variant, offset: 4037, length: 2, content: 君子, WYG: 天之道莫大乎隂陽萬物之尊莫大乎黔首王政之貴莫大乎安人故人安則隂陽和隂陽和則天地平而元氣正矣是以古先帝王見人之通}
