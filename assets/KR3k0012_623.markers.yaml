  - {type: variant, offset: 4033, length: 0, content: '', SBCK: 君亦皆然矣臣恐後之視今猶今之視前也後漢書曰桓譚上䟽曰國之廢興在於政事得失由乎輔佐有國之君俱欲興化建善然而治道未洽者所謂賢者要也且設法禁者非能盡塞天下之姦皆合衆人之欲也大底取便國利民多者則可矣夫張官置吏以理萬民懸賞設罰以别善惡惡人誅傷則善人蒙福矣魏志曰􅀽渙字曜卿爲梁相每勑諸縣曰丗治則禮備丗亂則禮簡方今難以禮化在吾所以爲政又曰太祖破􅀽氏領兾州牧辟崔琰爲別駕從事請琰曰昨案户籍可得三十萬衆故爲大州也琰曰今天下分崩九州幅裂二􅀽兄弟親㝷干戈兾方蒸庻􅁀骸原野未聞王師仁聲先路存問風俗救其塗炭而較計兵甲唯此爲先豈彼州士女所望於明公哉太祖改容謝之晉書武帝􅀄受禪駙馬都尉􅀓玄上䟽曰先王之治天下也明其大教長其義節道化行於上清議隆於下上下相奉人懷義心亡􅁗蕩滅先王之制以法術相御而義心亡矣近者魏武好法術而天下貴刑名魏文慕通逹而天下賤守節其後綱維不攝而虚無放誕之論盈於朝野使天下無復清議而亡􅁗之􅁦復發焉崔洪春秋前凉録曰張天錫時小府長史紀瑞上䟽論時政曰臣聞東野善馭而敗其駕􅁗氏冨強而覆其國馬力巳盡求之弗休人旣勞竭役之無巳故也造父之御不盡其馬虞舜之治不窮其人故造父無失御虞舜無失人唐書曰魏徴上䟽曰君人者誠能見可欲則思知足以自誠將有作則思知止以安人念髙危則思冲謙而自牧懼驕滿則思江海下百川樂盤游則思三驅爲度恐懈怠則思愼始而敬終慮擁塞則思虚心以納下想䜛邪則思正身以黜惡恩所加則思無喜以謬賞罰所及則思無怒以濫刑然後簡能而任擇善而從之智者盡其謀勇者竭其力仁者播其惠信者効其忠文武争馳在君無事可以盡豫遊之樂可以養松喬之壽鳴琴垂拱不言而化何}
