  - {type: variant, offset: 486, length: 38, content: 古者將有新令必奮木鐸以警眾使明聽之木鐸木舌也丈事奮木鐸武事奮金鐸禮曰故政者君, SBCK: 􅁗丗}
  - {type: variant, offset: 486, length: 38, content: 古者將有新令必奮木鐸以警眾使明聽之木鐸木舌也丈事奮木鐸武事奮金鐸禮曰故政者君, krp: 秦丗}
  - {type: variant, offset: 488, length: 281, content: 將有新令必奮木鐸以警眾使明聽之木鐸木舌也丈事奮木鐸武事奮金鐸禮曰故政者君之所以藏身也藏謂輝光於外而形體不見若日月星辰之中是故夫政必本於天殽以降命降下也殽天之氣以下教今天有運移之期陰陽之節也命降于社之謂殽地教謂令由社下者也社土地之主也周禮土會之法有五地之物生也降於祖廟之謂仁義謂教令由社下者大傳曰自禰率而上至于祖遠者輕仁也自至率而下至于禰高者重義也降於山川之謂典作謂教令由山川下者也山川有草木禽獸可作器物共國事降於五祀之謂制度謂教令由五祖下者玉祀有中霤門戶竈行之神此始為宮室制度此聖人所以藏身之固也政之行如此何用城郭溝池之為故聖人參於天地並於神鬼以治政也又曰政以一, WYG: 非}
