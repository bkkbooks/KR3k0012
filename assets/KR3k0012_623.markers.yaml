  - {type: variant, offset: 4016, length: 0, content: '', SBCK: 生邪氣邪氣積於下怨惡畜於上上下不和隂陽繆盭而妖孽生焉此災異所縁起也臣聞命者天之令也性者生之質也情者人之欲也或夭或夀或仁或鄙陶冶而成之不能粹美有治亂之所生故不齊也堯舜行德則}
  - {type: page-break, offset: 4016, content: '', id: KR3k0012_SBCK_623-4a}
  - {type: variant, offset: 4016, length: 0, content: '', WYG: 生邪氣邪氣積於下怨惡蓄於上上下不和隂陽繆盭而妖孽生焉此災異所縁起也臣聞命者天之令也性者生之質也情者人之欲也或夭或壽或仁或鄙陶冶而成之不能粹美有治亂之所生故不齊也堯舜行徳則}
  - {type: page-break, offset: 4016, content: '', id: KR3k0012_WYG_623-5b, image: WYG0898/WYG0898-0599d.png}
  - {type: variant, offset: 4016, length: 0, content: '', krp: 生邪氣邪氣積於下怨惡畜於上上下不和隂陽繆盭而妖孽生焉此災異所縁起也臣聞命者天之令也性者生之質也情者人之欲也或夭或夀或仁或鄙陶冶而成之不能粹美有治亂之所生故不齊也堯舜行德則}
  - {type: variant, offset: 4017, length: 1, content: 無, SBCK: 仁夀桀紂行􅁀則民鄙夭夫上之化下下之從上猶泥之在鈞唯甄者之}
  - {type: variant, offset: 4017, length: 1, content: 無, WYG: 仁壽桀紂行暴則民鄙夭夫上之化下下之從上猶泥之在鈞惟甄者之}
  - {type: variant, offset: 4017, length: 1, content: 無, krp: 仁夀桀紂行暴則民鄙夭夫上之化下下之從上猶泥之在鈞唯甄者之}
  - {type: variant, offset: 4019, length: 3, content: 措手足, SBCK: 爲猶金之在鎔惟冶者之所鑄綏之斯來動之斯和也又曰董仲舒論時政曰爲政不行甚者必變而更化之譬諸琴瑟不調必解而更張之當更張而不更張雖有良工不能善調也當更化而不更化雖有大賢不能善治也又曰蕭望之上䟽曰夫民凾隂陽之氣亟與含同有仁義欲利之心在教化之所􅂇雖堯在上不能去民欲利心而能令其欲利不勝其好義也雖桀在上不能去民好義之心而能令其好義不勝其欲利也}
  - {type: variant, offset: 4019, length: 3, content: 措手足, WYG: 為猶金之在鎔惟冶者之所鑄綏之斯來動之斯和也又曰董仲舒論時政曰為政不行甚者必變而更化之譬諸琴瑟不調必解而更張當更張而不更張雖有良工不能善調也當更化而不更化雖有大賢不能善治也又曰蕭望之上疏曰夫民函隂陽之氣函與含同有好義欲利之心在教化之所助雖堯在上不能去民欲利之心而能令其欲利不勝其好義也雖桀在上不能去民好義之心而能令其好義不勝其欲利也}
  - {type: page-break, offset: 4019, content: '', id: KR3k0012_WYG_623-6a, image: WYG0898/WYG0898-0600a.png}
  - {type: variant, offset: 4019, length: 3, content: 措手足, krp: 爲猶金之在鎔惟冶者之所鑄綏之斯來動之斯和也又曰董仲舒論時政曰爲政不行甚者必變而更化之譬諸琴瑟不調必解而更張之當更張而不更張雖有良工不能善調也當更化而不更化雖有大賢不能善治也又曰蕭望之上䟽曰夫民凾隂陽之氣亟與含同有仁義欲利之心在教化之所助雖堯在上不能去民欲利心而能令其欲利不勝其好義也雖桀在上不能去民好義之心而能令其好義不勝其欲利也}
  - {type: punctuation, offset: 4022, content: 。, id: KR3k0012_CHANT_623-bkkpn1101}
  - {type: 'tls:seg', offset: 4022, content: '', id: KR3k0012_CHANT_623-31a.26}
  - {type: variant, offset: 4023, length: 0, content: '', SBCK: 堯桀之分任於義利而已故道民不可不愼也又曰匡衡上書言政治曰五帝不同樂三王各異教民俗殊務所遇之時異也比年大赦而姦邪不爲衰止盖保民者陳之以德義示之以好惡觀其失而制其冝也朝廷者天下之禎幹也公卿大夫相與循禮恭讓則民不争好仁樂施則下不􅁀上義髙節則民興行寛柔和惠則衆相愛四者明王所以不嚴而成也又曰元帝時京房問上曰幽厲之}
  - {type: page-break, offset: 4023, content: '', id: KR3k0012_SBCK_623-4b}
  - {type: variant, offset: 4023, length: 0, content: '', WYG: 堯桀之分在於義利而已故道民不可不慎也又曰匡衡上書言政治曰五帝不同禮三王各異教民俗殊務所遇之時異也比年大赦而奸邪不為衰止蓋保民者陳之以徳義示之以好惡觀其失而制其宜也朝廷者天下之楨榦也公卿大夫相與循禮恭讓則民不争好仁樂施則下不暴上義髙節則民興行寛柔和惠則衆相愛四者明王所以不嚴而成化也又曰元帝時京房問上曰幽厲之}
  - {type: page-break, offset: 4023, content: '', id: KR3k0012_WYG_623-6b, image: WYG0898/WYG0898-0600b.png}
  - {type: variant, offset: 4023, length: 0, content: '', krp: 堯桀之分任於義利而已故道民不可不愼也又曰匡衡上書言政治曰五帝不同樂三王各異教民俗殊務所遇之時異也比年大赦而姦邪不爲衰止盖保民者陳之以德義示之以好惡觀其失而制其冝也朝廷者天下之禎幹也公卿大夫相與循禮恭讓則民不争好仁樂施則下不暴上義髙節則民興行寛柔和惠則衆相愛四者明王所以不嚴而成也又曰元帝時京房問上曰幽厲之}
  - {type: variant, offset: 4024, length: 2, content: 子名, SBCK: 何以危所任者何人也上曰君不明而所任者巧佞房曰知其巧佞而任}
  - {type: variant, offset: 4024, length: 2, content: 子名, WYG: 何以危所任者何人也上曰君不明而所任者巧佞房曰知其巧佞而任}
  - {type: variant, offset: 4024, length: 2, content: 子名, krp: 何以危所任者何人也上曰君不明而所任者巧佞房曰知其巧佞而任}
  - {type: variant, offset: 4027, length: 0, content: '', SBCK: 也􅀅以爲賢也上曰賢之房曰然則今何以知其不賢也上曰以其時亂而君危知之房曰􅀂是任賢}
  - {type: variant, offset: 4027, length: 0, content: '', WYG: 邪將以為賢也上曰賢之房曰然則今何以知其不賢也上曰以其時亂而君危知之房曰若是任賢}
  - {type: variant, offset: 4027, length: 0, content: '', krp: 也将以爲賢也上曰賢之房曰然則今何以知其不賢也上曰以其時亂而君危知之房曰若是任賢}
  - {type: variant, offset: 4028, length: 2, content: 可言, SBCK: 治不肖必亂必然之道也幽厲何不􅁴寤而更求賢曷爲卒任不肖以至於是上曰臨亂之君各賢其臣令皆覺寤天下安得危亡之君房曰齊桓公􅁗二丗亦甞聞此二君而非􅀏之然則任竪刀趙髙政治日亂盗賊蒲山何不以幽厲之王而􅁴悟乎上曰唯有道者能以徃知來耳房因免冠謝曰春秋記二百四十二年灾異以示萬丗之君今陛下即位巳來日月失明星辰錯行山崩泉湧地震石隕夏霜冬雷水旱螟蟲民人飢疫盗賊不禁刑人滿市春秋所記災異盡備陛下視今爲治耶爲亂耶上曰亦極亂耳尚何道房曰今所任者誰歟上曰然幸其瘉於彼又以爲不在此人也瘉與愈同愈勝}
  - {type: page-break, offset: 4028, content: '', id: KR3k0012_SBCK_623-5a}
  - {type: variant, offset: 4028, length: 2, content: 可言, WYG: 治任不肖必亂必然之道也幽厲何不覺悟而更求賢曷為卒任不肖以至於是上曰臨亂之君各賢其臣令自覺悟天下安得危亡之君房曰齊桓公秦二世亦嘗聞此二君而非笑之然則任豎刁趙髙政治日亂盜賊滿山何不以幽厲卜之而覺悟乎上曰唯有道者能以徃知來耳房因免冠謝曰春秋記二百四十二年災異以示萬世之君今陛下即位以來日月失明星辰錯行山崩泉湧地震石隕夏霜冬雷水旱螟蟲民人饑疫盜賊不禁刑人滿市春秋所記災異盡備陛下視今為治耶為亂耶上曰亦極亂耳尚何道房曰今所任者誰歟上曰然幸其瘉於彼又以為不在此人也瘉與愈同愈勝}
