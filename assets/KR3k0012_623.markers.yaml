  - {type: variant, offset: 9, length: 0, content: '', WYG: 天下吾不能待安能邑邑待數十百年以成帝王乎故吾以强國之術説君君悦之然亦難以比徳於殷周矣漢書}
  - {type: punctuation, offset: 10, content: ：, id: KR3k0012_CHANT_623-bkkpn3}
