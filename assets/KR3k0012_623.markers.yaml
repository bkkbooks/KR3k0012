  - {type: variant, offset: 4033, length: 0, content: '', WYG: 君亦皆然矣臣恐後之視今猶今之視前也後漢書曰桓譚上疏曰國之廢興在于政事政事得失由乎輔佐有國之君俱欲興化建善然而治道未洽者所謂賢者異也且設法禁者非能盡塞天下之奸皆合衆人之所欲也大抵取便國利民多者則可矣夫張官置吏以理萬民懸賞設法以别善惡惡人誅傷則善人蒙福矣魏志曰袁渙字曜卿為梁相毎勅諸縣曰世治則禮備世亂則禮簡方今難以禮化在吾所以為之又曰太祖破袁氏領冀州牧辟崔琰為别駕從事謂琰曰昨案户籍可得三十萬衆故為大州也琰曰今天下分崩九州幅裂二袁兄弟親尋干戈冀方蒸庶暴骸原野未聞王師仁聲先路存問風俗救其塗炭而計較兵甲唯此為先斯豈鄙州士女所望於明公哉太祖改容謝之晉書武帝初受禪駙馬都尉傅𤣥上疏曰先王之治天下也明其大教長其義節道化行於上清議隆於下上下相奉人懐義心亡秦蕩滅先王之制以法術相御而義心亡矣近者魏武好法術而天下貴刑名魏文慕通達而天下賤守節其後綱維不攝而虛無放誕之論盈於朝野使天下無清議而亡秦之弊發焉崔洪春秋前涼録曰張天錫曰時小府長史紀瑞上疏論時政曰臣聞東野善馭而敗其駕秦氏富强而覆其國馬力已盡求之勿休人既勞竭役之無已故也造父之御不盡其馬虞舜之治不窮其人故造父無失御虞舜無失人唐書曰魏徴上疏曰君人者誠能見可欲則思知足以自誠將有作則思知止以安人念髙危則思謙沖而自牧懼滿溢則思江海下百川樂盤游則思三驅以為度恐懈怠則思慎始而敬終慮擁塞則思虛心以納下想讒邪則思正心以黜惡恩所加則思無縁喜以謬賞罰所及則思無因怒而濫刑然後簡能而任擇善而從之智者盡其謀勇者竭其力仁者播其惠信者効其忠文武争馳在君無事可以盡豫遊之樂可以養松喬之壽鳴琴垂拱不言而化何}
