  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_623-1a.2}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 年而後報政周公周公曰何遲伯禽曰變其俗革其禮喪三年然後除之故遲太公亦封於齊五月而報政周公曰何疾也曰吾簡其君臣禮從其俗為也及後聞伯禽報政遲乃歎曰嗚呼魯後世其北面事齊矣夫政不簡不易民不近平易近民民必歸之又曰齊威王召即墨大夫而語之曰自子之居即墨也毁言日至然吾使人視即墨田野辟民人給官無留事東方以寧是子不事吾左右以求譽也封之萬家召阿大夫語曰自子之守阿譽言日聞然使人視阿田野不辟民人貧苦昔趙氏攻甄子弗能救衛取薛陵而子不知是子以幣厚吾左右以求譽也是日烹阿大夫及左右嘗譽者於是齊國震懼人人不敢飾非務盡其誠齊國乃大}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_WYG_623-1b, image: WYG0898/WYG0898-0597d.png}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_WYG_623-2a, image: WYG0898/WYG0898-0598a.png}
  - {type: variant, offset: 5, length: 3, content: 政一釋, WYG: 又曰公孫鞅西入秦因孝公寵臣景監以求見孝公孝公既見鞅語事良乆孝公時睡弗應罷而去孝公怒景監曰子之客妄人耳安足用耶景監以讓鞅鞅曰吾說公以帝道其志不開悟矣後五日復求見鞅鞅復見孝公益愈然而未中㫖罷而去孝公復讓監監亦讓鞅鞅曰吾說公以王道而未入也請復見鞅鞅復見孝公善之而未用也罷而去孝公謂景監曰汝客善可與語矣鞅曰吾今說公以伯道其意欲用之矣誠復見我我知之矣鞅復見孝公孝公與語不自知膝之前於席也語數日不厭景監曰子何以中吾君吾君之驩甚也鞅曰吾説君以帝王之道而君曰久逺且賢君者各及其身顯}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_623-2b, image: WYG0898/WYG0898-0598b.png}
