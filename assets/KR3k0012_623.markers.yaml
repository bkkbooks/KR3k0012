  - {type: variant, offset: 1646, length: 591, content: 否其所善者吾則行之其所惡者吾則改之是吾師也若之何毀之又曰子皮欲使尹何為邑子產曰少未知可否子皮曰願吾愛之不吾叛也使夫往而學焉夫亦愈知治矣子產曰不可人之愛人求利之也今吾子愛人則以政以政與之猶未能操刀而使割也其傷寶多子之愛人傷之而已其誰敢求愛於子子於鄭國棟折榱崩僑將厭焉敢不盡言子有美錦不使人學製焉其為美錦不亦多乎僑聞學而後入政未聞以政學者也田獵射御貫則能獲禽貫習也若未嘗登車射御敗績厭覆是懼何暇思獲子皮曰善哉學者也若果行此必有所害又曰周任有言曰為政者不賞私勞不罰私怨詩云有覺德行四國順之詩大雅覺直也言德行直則四方順從之又曰鄭子產有疾謂子太叔曰我死子必為政唯有德者能以寬服民其次莫如猛火烈民望而畏之故鮮死焉水懦弱民狎而翫之則多死焉故寬難難以治疾數月而卒太叔為政不忍猛而寬鄭國多盜聚大於雚蒲之澤雚蒲澤名也於澤中劫人音符浦太叔悔之曰吾早從夫子不及此興徒兵以攻蒲之盜盡殺之盜少止仲尼曰善哉政寬則民慢慢則糺之以猛猛則民殘殘則施之以寬寬以濟猛猛以濟寬政是以和詩曰民亦勞止汔可小康惠此中國以綏四方施之以寬也書大禹謨曰后克艱厥后臣克艱厥臣政乃乂黎民敏德敏疾也能知為君難為臣不易則其政治而眾民皆疾修德禹曰於帝念哉德惟善政政在養民難而言念重其言為政以德則民懷之水火金木土穀惟修言念民之本在先修六府正德利用厚生惟和正德以率下利用以阜財厚生以養民三者和所謂善政九功惟敘九敘惟歌言六府三事之功有次敘皆可歌樂乃德政, WYG: ''}
