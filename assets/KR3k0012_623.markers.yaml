  - {type: variant, offset: 3, length: 0, content: '', WYG: 四二史記曰魯公伯禽初受封之魯}
  - {type: variant, offset: 3, length: 1, content: 三, krp: 四}
  - {type: xml-element, offset: 4, content: '', id: KR3k0012_CHANT_623-bkkxmlele1}
