  - {type: variant, offset: 547, length: 446, content: 中是故夫政必本於天殽以降命降下也殽天之氣以下教今天有運移之期陰陽之節也命降于社之謂殽地教謂令由社下者也社土地之主也周禮土會之法有五地之物生也降於祖廟之謂仁義謂教令由社下者大傳曰自禰率而上至于祖遠者輕仁也自至率而下至于禰高者重義也降於山川之謂典作謂教令由山川下者也山川有草木禽獸可作器物共國事降於五祀之謂制度謂教令由五祖下者玉祀有中霤門戶竈行之神此始為宮室制度此聖人所以藏身之固也政之行如此何用城郭溝池之為故聖人參於天地並於神鬼以治政也又曰政以一其行禮樂刑政其極一也極至也所以同民心而出治道也是故治世之音安以樂其政和亂世之音怨以怒其政乖聲音之道與政通矣是故審聲以知音審音以知樂審樂以知政而治道備矣又曰敢問何謂為政孔子對曰政者正也君為正則百姓從矣君之所為百姓之所從也君所不為百姓何從公曰敢問為政何如孔子對曰夫婦別父子親君臣嚴三者正則庶物從之矣又曰哀公問政子曰文武之政布在方策其人存則其政舉其人亡則其政息人道敏政地道敏樹夫政也者蒲盧也蒲盧課羸謂土蜂也詩曰螟蛉有子蜾羸負之螟蛉桑蟲也蒲盧取桑蟲之子去而, SBCK: ''}
