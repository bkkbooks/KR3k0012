  - {type: variant, offset: 12, length: 0, content: '', SBCK: 於是齊國震懼人人不敢飾非務盡其誠齊國乃大治又曰公孫鞅西入􅁗因孝公寵臣景監以求見孝公孝公旣見鞅語事良乆孝公時睡弗應罷而去孝公怒景監曰子之客妄人耳安足用耶景監以讓鞅鞅曰吾說孝公以帝道其志不開悟後五日復求見鞅鞅復見孝公益愈然而未中旨罷而去孝公復讓監監亦讓鞅鞅曰吾說公以王道而未入也請復見鞅鞅復見孝公善之而未甚也罷而去孝公謂景監曰汝客盖可與語矣鞅曰吾說孝公以霸道其意欲用之矣誠復見我我知之矣鞅復見孝公公與語不自知膝之前於席也語數日不厭景監曰子何以中吾君吾君之驩甚也鞅曰吾說君以帝王之道而吾君曰乆逺吾不能待安能邑邑待數十百年而成王道之業乎故吾以強國之術說君君􅀃之然亦難以比德於殷周矣漢書曰曹叅相齊召長老諸先生問以安集百姓而齊故諸儒以百數言人人殊叅未知所定聞膠西有盖公善治黄老使人厚幣請之旣見盖公盖公爲言治道貴清静而民自定推此􅀋具言之叅於是避}
