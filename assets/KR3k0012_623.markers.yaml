  - {type: variant, offset: 10, length: 0, content: '', SBCK: 魯公伯禽􅀄受封之魯三年而後報}
  - {type: variant, offset: 10, length: 1, content: 政, WYG: 曹參相齊召長老諸先生問以安集百姓齊故諸儒以百數言人人殊參未知所定聞膠西有蓋公善治黄老言使人厚幣請之既見蓋公為言治道貴清静而民自定推此類具言之參于是避正堂舍蓋公焉其治要用黄老術故相齊九年齊國安集大稱賢相及參去齊屬其後相曰以齊獄市為寄慎勿擾也後相曰治無大于此}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_WYG_623-3a, image: WYG0898/WYG0898-0598c.png}
  - {type: variant, offset: 10, length: 0, content: '', krp: 魯公伯禽𥘉受封之魯三年而後報}
  - {type: variant, offset: 11, length: 0, content: '', SBCK: 周公周公曰何遟伯禽曰變其俗革其禮䘮三年然後除之故遟太公亦封於齊五月而報政周公曰何疾也曰吾簡其君臣禮從其俗爲也及後聞伯禽報政遟乃歎曰嗚呼魯後丗其北面事齊矣夫政不簡不易民不近平易近民民必歸之又曰齊威王召即墨大夫而語之曰自子之居即墨也毀曰至然吾使人視即墨田野辟民人給官無留事東方以寕是子不事吾左右以求譽也封之萬家召阿大夫語曰自子之守阿譽日聞然使人視阿田野不辟民人貧苦昔趙氏攻甄子弗能救衛取薛陵而子不知是子以幣厚吾左右以求譽也是日烹阿太夫及左右嘗譽}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_SBCK_623-1b}
  - {type: variant, offset: 11, length: 0, content: '', krp: 周公周公曰何遟伯禽曰變其俗革其禮䘮三年然後除之故遟太公亦封於齊五月而報政周公曰何疾也曰吾簡其君臣禮從其俗爲也及後聞伯禽報政遟乃歎曰嗚呼魯後丗其北面事齊矣夫政不簡不易民不近平易近民民必歸之又曰齊威王召即墨大夫而語之曰自子之居即墨也毀曰至然吾使人視即墨田野辟民人給官無留事東方以寕是子不事吾左右以求譽也封之萬家召阿大夫語曰自子之守阿譽日聞然使人視阿田野不辟民人貧苦昔趙氏攻甄子弗能救衛取薛陵而子不知是子以幣厚吾左右以求譽也是日烹阿太夫及左右嘗譽}
