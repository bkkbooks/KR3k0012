  - {type: variant, offset: 2488, length: 1368, content: 世疆禦不順以剛能治之爕友柔克爕和也世和順以柔能治之沈潛剛克沈潛謂地雖柔亦有剛能出金石高明柔克高明謂天言天為剛德亦有柔克不干四時喻臣當執剛以正君君亦當執柔以納臣又立政曰周公若曰拜手稽首告嗣天子王矣用咸戒于王曰王左右常伯常任準人綴衣虎賁周公用王所立政之事皆戒於王曰常所長事常所委任謂三公六卿準人平法謂士官綴衣掌衣服虎賁以武力事王皆左右近臣宜得其人周公曰嗚呼休茲知恤鮮哉歎此五者立政之本知憂得其人者火古之人迪唯有夏乃有室大競籲俊尊上帝古之人道惟有夏禹之時乃有卿大夫室家大強猶乃招呼賢俊與共尊事上帝迪知忱恂于九德之行禹之臣蹈知成信於九德之行謂賢智大臣九德皋陶所謀也乃敢告教厥后曰拜手稽首后矣曰宅乃事宅乃牧宅乃準茲惟后矣知九德之臣乃敢告教其君以立政后矣亦猶王矣宅居也居汝事六卿掌事者牧牧民九州之伯居外內之官及平法者皆得其人則此惟君矣嗚呼孺子王矣歎稚子今以為王矣不可不勤法祖考之德繼自今我其立政立事準人牧夫我其克灼知厥若丕乃俾亂繼用今已往我其立政大臣立事小臣及準人牧夫我其能灼然知其順者則大乃使治之言知臣下之勤勞然後莫不盡心力也相我受民和我庶獄庶慎時則勿有間之能治我始受天民和平我眾獄眾之事如是則勿有以伐之言不可復變自一話一言我則末惟成德之彥以乂我受民言政賞用一善善在一言而已欲其口無擇言如此則我終惟有成德之美以治我所受之民嗚呼子旦己受人之徽言咸告孺子王矣歎所受賢聖說禹湯之美言皆以告稚子王矣繼自今文子文孫其勿誤于庶獄庶慎惟正是乂之文子文孫文王之子孫從今已往惟以正是人道治眾獄眾慎無忽誤也又曰成王既黜殷命滅淮夷還歸在豐作周官王曰若昔大猷制治于未亂保邦于未危言當順古大道制治安國必于未亂未危之前思患預防之曰唐虞稽古建官惟百內有百揆四岳外有州牧侯伯道堯舜考古以建百官內置百揆四岳象天之有五行外置州牧十二及五國之長上下相惟內外咸治言有法庶政惟和萬國咸寧官職有序故庶政惟和萬國皆安所以為治也夏商官倍亦克用乂禹湯建官二百亦能用治言不及唐虞之清要也明王立政不惟其官惟其人言聖帝明王立政修教不惟多其官惟在得其人王曰嗚呼凡我有官君子欽乃攸司慎乃出令令出惟行弗惟反有官君子大夫已上歎而戒之使敬汝所司慎汝出令從政之本令出必惟行之不惟反改若二三其令亂之道以公滅私民其允懷學古入官議事以制政乃不迷其爾典常作之君作之師無以利口亂厥官蓄疑敗謀怠忽荒政不學牆面莅事惟煩積疑不決必敗其謀大道怠忽必亂其政人而不學其由正牆面而立臨政事必煩又君陳曰惟爾令德孝恭惟孝友于兄弟克施有政言善父母者必友于兄弟能施其政令命汝尹茲東郊敬哉圖厥政莫或不艱有廢有興出入自爾師虞庶言同則繹謀其政無有不先慮其難有所廢有所起出納之事當用汝眾言慶之眾言同則陳而布之禁其專也有弗若于汝政弗化于汝訓辟以止辟乃辭有不順於汝政不變於汝教刑之而懲止犯刑者乃刑之狃于姦宄敗常亂俗三細不宥習於姦究凶惡毀敗玉常之道以亂風俗之教罪雖小三犯不赦所以絕惡源也論語曰子禽問於子貢曰夫子至於是邦也必聞其政求之與抑與之與子貢曰夫子溫良恭儉讓以得之夫子之求之也其諸異乎人之求之與又曰為政以德譬如北辰居其所而眾星拱之又曰子貢問政子曰足食足兵民信之矣又曰齊景公問政於孔子孔子對曰君君臣臣父父子子公曰善哉信如君不君臣不臣父不父子不子雖有粟吾得而食諸又曰子張問政子曰居之無倦行之以忠又曰季康子問政於孔子孔子對曰政者正也子帥以正孰敢不正又曰季康子問於, WYG: ''}
