  - {type: variant, offset: 4039, length: 0, content: '', SBCK: 昂上書言政理曰元氣者天地之始萬物之母王政之大端也天之道莫大乎隂陽萬物之尊莫大乎黔首王政之貴莫大乎安人故人安則隂陽和則天地平而元氣正矣是以古先帝王見人之通}
  - {type: page-break, offset: 4039, content: '', id: KR3k0012_SBCK_623-6b}
  - {type: variant, offset: 4039, length: 0, content: '', krp: 昂上書言政理曰元氣者天地之始萬物之母王政之大端也天之道莫大乎隂陽萬物之尊莫大乎黔首王政之貴莫大乎安人故人安則隂陽和則天地平而元氣正矣是以古先帝王見人之通}
  - {type: variant, offset: 4040, length: 0, content: '', SBCK: 天地天人相感隂陽相和災害之所不生嘉祥之所以作也遂則象於天則成於地輔相天地之冝以左右民於是養成羣生奉順天德故人得安}
  - {type: variant, offset: 4040, length: 0, content: '', WYG: 天地天人相感隂陽相和災害之所不生嘉祥之所以作也遂取象于天效法于地輔相天地之宜以左右民于是養成羣生奉順天徳故人得安}
