  - {type: variant, offset: 4050, length: 1, content: 葉, WYG: 景雲二年監察御史解琬陳時政曰臣聞國之安危在於為政若為政以法雖暫安而必危為政以徳雖不便而終治夫法者智也智所謂權宜道可以長乆陛下登位今已逾年上封事者多言明聖述太平或曰功巍巍徳赫赫非惟不裨於政教亦乃陛下之厭聞臣以為當今風俗未甚振理政令未息煩勞隂陽未調和庫藏未充牣流離者尚相望於道路犯禁者猶繼踵於桎牢耳未聞康哉之聲目未覩太平之事且貞觀永徽之天下亦今日之天下相去幾何而風俗淳季相反由理之失也夫伯者任智失徳於人故大偽緣生矣然巧智之士浮詭之徒知忠正為立身之階識仁義為百行之本託之以求進假之以取容口是而心非言同而意反明君哲后亦何盡能察哉趨競之吏巧知之人欲宻網以為至}
