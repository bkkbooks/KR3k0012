  - {type: variant, offset: 3371, length: 215, content: 司慎汝出令從政之本令出必惟行之不惟反改若二三其令亂之道以公滅私民其允懷學古入官議事以制政乃不迷其爾典常作之君作之師無以利口亂厥官蓄疑敗謀怠忽荒政不學牆面莅事惟煩積疑不決必敗其謀大道怠忽必亂其政人而不學其由正牆面而立臨政事必煩又君陳曰惟爾令德孝恭惟孝友于兄弟克施有政言善父母者必友于兄弟能施其政令命汝尹茲東郊敬哉圖厥政莫或不艱有廢有興出入自爾師虞庶言同則繹謀其政無有不先慮其難有所廢有所起出納之事當用汝眾言慶之眾言同則陳而布之禁其專, SBCK: 致}
