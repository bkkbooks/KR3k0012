  - {type: variant, offset: 994, length: 1339, content: 化之以成為己子政之於百姓若蒲盧之於桑蟲故為政在人又曰子曰夫人教之以德齊之以禮則民有格心教之以政齊之以刑則民有遯心格來也遯逃也又曰子曰政之不行也教之不成也爵祿不足勸也刑罰不足恥也故上不可以褻刑而輕爵言政教所以明賞罰也又曰聖人南面聽天下所且先者五民不得與焉一曰治親二曰報功三曰舉賢四曰使能五曰存愛五者一得於天下民無不足無不贍者五者一物紕繆民莫得其死物猶事也紕錯也五事得則民足一事夫則民不得其死明政之難大戴禮曰曾子曰敢問不費不勞以為明乎孔子愀然揚眉曰參汝以明主為勞乎古者舜左禹而右皋陶不下席而天下治左氏傳曰宣子於是乎始為國政宣子趙盾制事典正法罪辟獄刑辟猶理也董逋逃由質要治舊洿本秩禮續常職出滯淹既成以授太傅陽子與大師賈佗使行諸晉國以為常法又曰晉悼公即位于朝始命百官始為政施舍己責施恩惠舍勞役逋止責振廢滯起舊德匡乏困救災患匡亦救也禁淫慝薄賦歛宥罪戾宥寬也節器用節省也時用民使民以時欲無犯時不縱私欲又曰季札聘于鄭謂子產曰鄭之執政者侈難將至矣政必及子子為政慎之以禮不然鄭國將敗又曰鄭子皮授子產使都鄙有分國都及邊鄙車服尊卑車服尊卑各有分部上下有服公卿大夫服不相踰田有封洫廬井有伍大人之忠儉者謂卿大夫從而與之泰侈者因而斃之從政一年輿人誦之曰取我衣冠而禇之禇蓄也奢侈者畏法故畜藏取我田疇而伍之孰殺子產吾其與之及三年又誦之曰我有子弟子產誨之我有田疇子產殖之殖生也子產而死誰其嗣之嗣續也傳言鄭所以興又曰禮之於政如熱之有濯以救熱何患之有又曰鄭人游于鄉校以論執政論其得失然明謂子產曰毀鄉校如何子產曰何為夫人朝夕退而游焉以議執政之善否其所善者吾則行之其所惡者吾則改之是吾師也若之何毀之又曰子皮欲使尹何為邑子產曰少未知可否子皮曰願吾愛之不吾叛也使夫往而學焉夫亦愈知治矣子產曰不可人之愛人求利之也今吾子愛人則以政以政與之猶未能操刀而使割也其傷寶多子之愛人傷之而已其誰敢求愛於子子於鄭國棟折榱崩僑將厭焉敢不盡言子有美錦不使人學製焉其為美錦不亦多乎僑聞學而後入政未聞以政學者也田獵射御貫則能獲禽貫習也若未嘗登車射御敗績厭覆是懼何暇思獲子皮曰善哉學者也若果行此必有所害又曰周任有言曰為政者不賞私勞不罰私怨詩云有覺德行四國順之詩大雅覺直也言德行直則四方順從之又曰鄭子產有疾謂子太叔曰我死子必為政唯有德者能以寬服民其次莫如猛火烈民望而畏之故鮮死焉水懦弱民狎而翫之則多死焉故寬難難以治疾數月而卒太叔為政不忍猛而寬鄭國多盜聚大於雚蒲之澤雚蒲澤名也於澤中劫人音符浦太叔悔之曰吾早從夫子不及此興徒兵以攻蒲之盜盡殺之盜少止仲尼曰善哉政寬則民慢慢則糺之以猛猛則民殘殘則施之以寬寬以濟猛猛以濟寬政是以和詩曰民亦勞止汔可小康惠此中國以綏四方施之以寬也書大禹謨曰后克艱厥后臣克艱厥臣政乃乂黎民敏德敏疾也能知為君難為臣不易則其政治而眾民皆疾修德禹曰於帝念哉德惟善政政在養民難而言念重其言為政以德則民懷之水火金木土穀惟修言念民之本在先修六府正德利用厚生惟和正德以率下利用以阜財厚生以養民三者和所謂善政九功惟敘九敘惟歌言六府三事之功有次敘皆可歌樂乃德政之所致戒之用休董之用威勸之以九歌俾勿壞言善政之道美以戎之威以督之歌以勸之使政勿壞在此三者而已又太甲下曰德惟治否德亂與治同道罔不興與亂同事罔不亡言安危在所念治亂在所法終始慎厥與惟明明后明慎其所與, SBCK: ''}
