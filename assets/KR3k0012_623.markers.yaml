  - {type: variant, offset: 2750, length: 355, content: 九德之行謂賢智大臣九德皋陶所謀也乃敢告教厥后曰拜手稽首后矣曰宅乃事宅乃牧宅乃準茲惟后矣知九德之臣乃敢告教其君以立政后矣亦猶王矣宅居也居汝事六卿掌事者牧牧民九州之伯居外內之官及平法者皆得其人則此惟君矣嗚呼孺子王矣歎稚子今以為王矣不可不勤法祖考之德繼自今我其立政立事準人牧夫我其克灼知厥若丕乃俾亂繼用今已往我其立政大臣立事小臣及準人牧夫我其能灼然知其順者則大乃使治之言知臣下之勤勞然後莫不盡心力也相我受民和我庶獄庶慎時則勿有間之能治我始受天民和平我眾獄眾之事如是則勿有以伐之言不可復變自一話一言我則末惟成德之彥以乂我受民言政賞用一善善在一言而已欲其口無擇言如此則我終惟有成德之美以治我所受之民嗚呼子旦己受人之徽言咸告孺子王矣歎所受賢聖說禹湯之美言皆以告稚子王矣繼自今文子文孫其勿誤于庶獄庶慎惟正是乂之文子文孫文王之, SBCK: 禽獸草木廣􅁉累}
