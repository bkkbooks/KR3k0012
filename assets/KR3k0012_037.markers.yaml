  - {type: variant, offset: 2615, length: 0, content: '', WYG: 因此果報作戲輪王晉太康地記曰城陽姑募縣}
  - {type: variant, offset: 2617, length: 0, content: '', SBCK: 歲女孫卒得病詣市卜云犯}
  - {type: variant, offset: 2617, length: 0, content: '', WYG: 色}
  - {type: variant, offset: 2617, length: 0, content: '', krp: 歲女孫卒得病詣市卜云犯}
  - {type: variant, offset: 2618, length: 0, content: '', SBCK: 􅀇即依方治}
  - {type: variant, offset: 2618, length: 0, content: '', WYG: 吴郡記曰吳縣餘杭山出白土光潤如玉墨子曰商王紂不徳雨土於幾内孫卿子曰孔子謂子貢曰賜未知為人下者其猶土也深掘}
  - {type: variant, offset: 2618, length: 0, content: '', krp: 玄即依方治}
  - {type: variant, offset: 2619, length: 2, content: 宜各, SBCK: 病即愈然後知天下}
  - {type: variant, offset: 2619, length: 2, content: 宜各, WYG: 而得甘泉樹之而五穀蕃草木植焉禽獸育焉生則主焉死則入焉多其功而不德為人下者猶土也韓詩外傳說苑並載也申子曰四海之内六合之間曰奚貴曰貴土土食之本也淮南子曰伊尹曰興土功也修脚者使之蹠鏵強脊者使之負土淮南萬畢術曰東行馬蹄中土令人卧不起取東行白馬蹄下土三家井中泥合土而和之置臥人臍上即不能起又曰竈之土不思故鄉取竈前土三寸方半寸厚一寸將之逺出令人不思故鄉也裴𤣥新言曰俗間}
