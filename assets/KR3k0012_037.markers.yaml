  - {type: variant, offset: 19, length: 3, content: 亦言諦, SBCK: 徐州貢土五色色有黄青白赤黒}
  - {type: page-break, offset: 19, content: '', id: KR3k0012_SBCK_037-3b}
  - {type: variant, offset: 19, length: 3, content: 亦言諦, WYG: 其令曰爵有徳賞有功惠賢良救饑渴舉力農拯貧窮惠孤寡飬老疾出大禄行大賞起毁宗立無後封建侯立賢輔中央之極自崑崙東絶恒山崑崙在西方恒山北岳}
