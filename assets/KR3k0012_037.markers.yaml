  - {type: variant, offset: 2360, length: 1, content: 天, SBCK: 此土南昌西山北巖土也不如華隂山赤土封一斤與君荅書云詳觀劒體眞干將也君更用赤土磨拭逾益精明晉書符堅傳􅀄秦之未亂也􅀜中土無火而煙氣火起數十里月餘不滅宋躬孝子傳曰宗承字丗林父資喪葬舊塋􅀒土作墳不役僮僕一夕間土壤髙五尺松竹生焉荆州先徳傳曰羅獻守巴東吴遣盛曼說獻合從之計詣獻求借城門獻遣叅軍楊宗謾曰城中土一撮}
