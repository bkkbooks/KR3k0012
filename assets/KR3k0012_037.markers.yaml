  - {type: 'tls:seg', offset: 23, content: '', id: KR3k0012_CHANT_037-1a.8}
  - {type: variant, offset: 23, length: 0, content: '', SBCK: 土赤者䑕肝色也土色黒曰盧盧然解散也土黄而細宻白埴埴職也如脂之職也土色青䔧似䔧草也土色白曰漂漂輕散也尚書禹貢曰兾州土白壤孔安國曰無塊白壤兖州土黒墳孔安國曰色黒而墳起青州土白墳徐廣曰􅀺土也楊州土塗泥馬融曰漸如也荆州土塗泥豫州土白墳下墳盧孔安國曰盧踈也馬融曰豫州地青三等下者墳盧也雍州土黄壤徐州土赤戠墳謝沉注曰戠音志梁州土青驪孔安國曰色青黒又洪範曰}
  - {type: variant, offset: 23, length: 0, content: '', WYG: 日月之所道謂二十八宿舍在地之分也江漢之所出人民之野}
  - {type: variant, offset: 23, length: 0, content: '', krp: 土赤者䑕肝色也土色黒曰盧盧然解散也土黄而細宻白埴埴職也如脂之職也土色青䔧似䔧草也土色白曰漂漂輕散也尚書禹貢曰兾州土白壤孔安國曰無塊白壤兖州土黒墳孔安國曰色黒而墳起青州土白墳徐廣曰黎土也楊州土塗泥馬融曰漸如也荆州土塗泥豫州土白墳下墳盧孔安國曰盧踈也馬融曰豫州地青三等下者墳盧也雍州土黄壤徐州土赤戠墳謝沉注曰戠音志梁州土青驪孔安國曰色青黒又洪範曰}
  - {type: variant, offset: 24, length: 0, content: '', SBCK: 行其五曰}
  - {type: variant, offset: 24, length: 0, content: '', WYG: 榖之宜龍門河濟相貫以息壤堙鴻水之洲禹以息}
  - {type: variant, offset: 24, length: 0, content: '', krp: 行其五曰}
  - {type: variant, offset: 25, length: 1, content: 所, SBCK: 土爰稼穡稼穡作甘孔安國曰土可以種可以歛甘味}
  - {type: variant, offset: 25, length: 0, content: '', WYG: 堙洪水以為中國九州洲水中可居之地東至於碣石黄帝后土之}
  - {type: variant, offset: 25, length: 1, content: 所, krp: 土爰稼穡稼穡作甘孔安國曰土可以種可以歛甘味}
