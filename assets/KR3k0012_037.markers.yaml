  - {type: variant, offset: 2254, length: 306, content: 治河圖挺佐輔曰百世之後地高天下不風不雨不寒不暑民復食土皆知其母不如其父知此千歲之後而天可倚杵匈匈隆隆莫知始終河圖曰元氣無形匈匈蒙蒙偃者為地伏者為天黃帝素問曰積陰為地故地者濁陰也洪範五行傳曰地者成萬物者也周髀筭經曰天不可階而升地不可尺寸而度楚辭曰地方九則何以墳之王逸注曰墳分也謂九州之地凡九品禹貢何以能分別之也康廻馮怒地何以東南傾康廻共工也昔共工與顓頊爭為帝怒而觸不周山天柱折地維絕故傾也見淮南天道篇也鹽鐵論曰古者制地足以養民民以承其上千乘之國百里之地公侯伯子男各充其欲秦兼萬國之地有四海之富而意不贍者嗜欲多而下不堪其求也太玄經曰天以不見為玄地以不形為玄人以心腹為玄天奧西北鬱化精也地奧黃泉隱魄榮也人奧思慮含至精也, WYG: 重}
