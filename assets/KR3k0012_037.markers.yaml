  - {type: 'tls:seg', offset: 2608, content: '', id: KR3k0012_CHANT_037-36a.4}
  - {type: variant, offset: 2608, length: 1, content: 范, WYG: 也今秦當得蜀矣崔鴻十六國春秋後趙錄曰建武十二年沙門吳進言於帝曰胡運將衰晉當復興苦役晉人以壓其氣帝於是使尚書張郡發近郡男女十六萬車十萬乘運土築華林園及長墟一作墻於鄴北廣長五十里白虎通曰土在中央中央者主吐含萬物聖證論曰孔鼂云能吐生百榖謂之􅁟雷煥别傳曰煥與張華見異氣起斗牛之間煥曰此寳劍也拜煥豐城令到縣掘獄基入四十餘尺得一石函中有雙劍琢錯文采翳而未明初經南昌遣人取西山北巖下土二升黄白色拭劍光艶照耀莫不驚愕張公得劍喜置坐側曰此土南昌西山北巖土也不如華隂山赤土封一斤與君荅書曰詳觀豐城劍真干將也君更用赤土磨拭愈益精明晉書苻堅傳曰初秦之未亂也關中土無火而煙氣火起數十里月餘不滅宋躬孝}
  - {type: page-break, offset: 2608, content: '', id: KR3k0012_WYG_037-10a, image: WYG0893/WYG0893-0316c.png}
