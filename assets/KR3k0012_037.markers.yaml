  - {type: variant, offset: 3, length: 0, content: '', SBCK: 人之能不足以治三畒之宅也循道理之數因天}
  - {type: variant, offset: 3, length: 0, content: '', krp: 人之能不足以治三畒之宅也循道理之數因天}
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 之自然則六合不足均也均平也又曰盧敖游乎北海盧敖燕人秦始皇帝召以爲博士使求神僊亡而不返也徑乎太隂入乎􅀇闕太隂北方􅀇也至於蒙􅂖之}
  - {type: variant, offset: 4, length: 3, content: 上釋名, WYG: 下土壤塊塵地下淮南子}
