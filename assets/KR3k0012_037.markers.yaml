  - {type: variant, offset: 2363, length: 1, content: 階, SBCK: 得何言城門乎三輔舊事曰成帝作延陵及起廟竇將軍有青竹田在廟南恐犯蹈之言作陵不便乃徙作昌陵取土十餘里土與粟同價􅀜中記曰未央宫蕭何所造周廽二十三里䟽龍首山土爲殿基殿基出長安城上也宣城記曰江矩吴時爲廬江太守以清稱徴還舡輕皆載土時嵗暮逐除者就乞所􅀗甚少江乃語之逐除人見}
