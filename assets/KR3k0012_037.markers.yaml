  - {type: variant, offset: 2599, length: 2, content: 揔丘, WYG: 色别曰土言五方土色各異也崔寔四民月令曰正月雨水地氣上騰土長昌撅陳根可拔春秋元命苞曰土為言吐也子成父道也其氣精以附也陽立於三故成生其立字十加一為土春秋繁露曰天有十端其土為之一端春秋考異郵曰后族専則土踊宋均注曰隂盛也論語里仁曰君子懐徳小人懐土家語曰孔子曰堯以土徳王而尚黄黄土之色也又曰食土者無心而不息又曰宰我問於孔子曰聞鬼神之名而不知其所謂敢問孔子曰人生有魂氣有魄氣也神之盛也衆生必死死必歸土此之謂魄魂氣歸天此之謂神戰國䇿曰孟嘗君將入秦蘇代曰臣來過於淄上有土偶人與桃梗相與語桃梗語土人曰子西岸上土也八月降雨淄水至則爾殘矣土泥曰吾西岸之土也土則復為岸矣今子東國之桃梗也雨下水至流子而去則水漂漂將何如邪漢書張釋之傳曰文帝拜釋之為廷尉人有盗髙廟坐前玉環文帝怒下廷尉治奏當棄市上大怒釋之頓首謝曰假令愚民盗長}
  - {type: page-break, offset: 2599, content: '', id: KR3k0012_WYG_037-7a, image: WYG0893/WYG0893-0315a.png}
