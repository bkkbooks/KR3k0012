  - {type: variant, offset: 3712, length: 541, content: 日其華照地九州之大純純緣邊也方千里九州之外乃有八寅一日不溫曰寅澤亦方千里自東北方曰大澤無漸茄曰澤也曰無通東方曰大渚曰少海東南曰其區曰厄澤南方曰大夢曰浩澤西南方曰注資曰丹澤西方曰九甌曰泉澤西北方曰大夏曰海澤北方曰大冥曰寒澤凡八寅八澤之雲是雨九州八寅之外乃有八紘紘維紘也亦方千里自東北方曰和丘曰荒土東方曰棘林曰桑野東南方曰大窮曰眾女民少男多女也南方曰都廣曰反戶在日之南為北嚮戶西南方曰焦僥曰炎土焦僥人長三尺衣冠帶劍西方曰金丘曰沃野金丘金所出也西北方曰一目曰少所其人一目北方曰積冰曰委羽積冰至寒也委羽山名委羽之北蓋不見日也凡八紘之氣是出寒暑以合八正必以風雨八紘之外乃有八極自東北方曰方土之山曰蒼門東方曰東極之山曰開明之門東南方曰波海之山曰陽門南方曰南極之山曰暑門西南方曰南極編駒之山曰白門西方曰西極之山曰閶闔之門西北方曰不周之山曰幽都之門北方曰北極之山曰寒門凡八極之雲是雨天下八門之風是節寒暑八紘八夤八澤之雲以雨九州而和中土東方之美者有醫無閭之珣玗琪焉醫無閭東夷之山也珣玗其玉名也東方之美者有會稽之竹箭焉南方之美者有梁山之犀象焉西南之美者有華山之金石焉西方之美者有霍山之珠玉焉西北方之美者有崑崙虛之璆琳瑯玕焉璆琳瑯玕珠名也北方之美者有幽都之䈥角焉東北方之美者有徒格山之文皮焉文皮虎豹之皮也, SBCK: 七}
