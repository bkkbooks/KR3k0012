  - {type: variant, offset: 1711, length: 536, content: 設由來尚矣自古垂象立制而賴其用三代置其官國史掌其職暨漢祖屠咸陽丞相蕭何盡收秦之圖籍今秘書既無古之地圖又無蕭何所得秦之圖籍唯有漢氏輿地及括地諸雜圖各不設分率又不考正准望亦不備載名山大川其所載列雖有麤形皆不精審不可依據或稱外荒迂誕之言不合事實於義無取今制地圖之體有六一曰分率所以辯廣輪之度也二曰准望所以正彼此之體也三曰道里所以定所由之數也四曰高下五曰方雅六曰迂直此三者各因地而制以校夷險之數也有圖象而無分率則無以審遠近之差有分率而無准望雖得之於一隅必失之於佗方有准望而無道里則施於山海絕隔之地不能以相通有道里而無高下方斜迂直之校則徑路之數必與遠近之實相違失准望之正矣故必以此六者參而考之然后遠近之實定於高下方邪迂直之筭故雖有峻山巨海之隔絕域殊方之過登降詭曲之回皆可得舉而定者准望之法既正則曲直遠近無所隱其形也抱朴子云太極初構清濁始分故天先成而地後定河圖括地象曰八極之廣東西二億三萬三千里南北二億三萬一千五百里夏禹所治四海內地東西二萬八千里南北二萬六千里又曰天有五行地有五岳天有七星地有七表天有四維地有四瀆天有八氣地有八風天有九道地有九州又曰崑崙山為柱氣上通天崑崙者地之中也下有八柱柱廣十萬里有三千六百軸互相牽制名山大川孔穴相通又曰地廣東西二萬八千南北二萬六千有君長之州有九阻中, SBCK: ''}
