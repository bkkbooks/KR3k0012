  - {type: punctuation, offset: 5, content: 《, id: KR3k0012_CHANT_037-bkkpn1}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 見一士焉深目而􅀇􅁂渡注而鳶肩豊上而殺下軒軒然迎風而舞顧見盧敖慢然下臂遯逃乎碑盧敖就而視之方倦􅀛殻而食合梨合梨海􅑕盧敖與之語曰唯敖爲背群離黨窮觀於六合之外者非敖而巳乎敖㓜而好遊至長不渝解周行四極唯北隂之不闚今卒賭夫子於是子殆可與敖爲友乎􅀂士者音拳然嘆曰噫子中州民寕肯而逺至此此猶光日月言太隂之地尚見日月而載列星隂陽之所行四時之所生此其比夫不名之地猶突奥言我所游不可字名之地以盧敖所行之則如突奥中也􅀂我南游乎岡䍚之野北息乎沉墨之郷西窮􅁳􅁳之黨東開澒濛之光此其下無地而上無天聽焉無㫬此其外猶有􅃺沐之汜狀沐四海與天之際流聲也汜崖也其餘一舉而千萬里千萬里􅃺沐之外也吾猶未能之在吾尚未至此地今子游始此乃於語窮觀豈不亦逺哉然子處矣哉吾與若汗漫期於九垓之上汗漫不可知之地九垓九天也吾不可以乆居士舉臂而竦身遂入雲中盧敖仰而視之弗見乃止駕止其所駕而居尸子曰八極之内有君長者東西二萬八千里南北三萬六千里故曰天左舒而起牽牛地右闢而起畢􅄧孟子曰天子之地方千里不方千里不足以待諸侯諸侯之地方百里不方百里不足以守宗廟吕氏春秋曰凢四極之内東西五億有九萬七千里南北五億有九萬七千里又曰長廬子曰山海岳河水金石火木此積形成乎地也又曰冬之德寒寒不信其地不成剛地不成剛則凍閇不開天地之大四時之化而猶不能以不信成物又况於人􅀜令内傳曰地厚萬里其下得大空大空四角下有自然金柱輙方圎五千里土}
