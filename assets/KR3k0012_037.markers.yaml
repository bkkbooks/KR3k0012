  - {type: variant, offset: 2610, length: 0, content: '', WYG: 傳曰宗承字世林父資䘮𦵏舊瑩負土作墳不役童僕一夕間土壤髙五尺松生焉荆州先徳傳曰羅獻守巴東吳遣盛曼説獻合從之}
  - {type: variant, offset: 2611, length: 1, content: 然, WYG: 詣獻求借城門獻遣參軍楊宗謾}
