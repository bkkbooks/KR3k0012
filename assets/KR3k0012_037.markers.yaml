  - {type: variant, offset: 2599, length: 16, content: 揔丘陵原隰孤險曰地范子計然曰夫地, krp: 俗間有土公之神云土不可動玄}
  - {type: variant, offset: 2602, length: 4, content: 原隰孤險, WYG: 一抔土陛下復何以加其法乎後漢書}
  - {type: variant, offset: 2607, length: 0, content: '', WYG: 朱浮與彭寵書曰亦猶河濵之人捧土以塞孟津謝承後漢書曰東郡趙資病自置小素棺使人取乾黄土二十石細擣篩之遺令亡後置土棺底厚一尺内屍於中以土壅之又曰范訓母亡以布囊盛土負以成壙魏志曰魏明帝起芳林園建昭陽殿公卿以下至於學生莫不展力帝乃躬自握土以率之後漢書曰髙昻父次同語人曰吾四子皆不肖我死後豈有人與我一鍬土邪及次同死昂大起塜封之曰此老平生畏無一鍬土今日被壓竟知之否唐書天寳十三載冊楊國忠為司空其日雨土江表傳曰孫權討袁術舉兵攻睆城術閉門自守粮食盡士女或丸土而吞之晉安帝紀曰劉敬宣在鮮卑夢丸土而服之既而占焉或荅曰此服土吞丸也既覺而喜曰丸者桓也既吞矣我復本土矣旬日中聞桓𤣥敗得來歸世本曰廪君名務相姓巴與樊氏暉氏相氏鄭氏凡五姓俱出皆争神以土為船雕文畫之而浮水中其船浮立為君他船不能浮獨廪君船浮因立為君蜀王本紀曰蜀王獵於褒谷見秦王以金一筒遺蜀王蜀王報以禮物盡化為土秦王大怒臣下拜賀曰土}
  - {type: page-break, offset: 2607, content: '', id: KR3k0012_WYG_037-8b, image: WYG0893/WYG0893-0315d.png}
