  body:
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 二地下土壤塊塵地下淮南子曰東方之極自碣石碣石山在東北海中過朝鮮朝鮮東夷貫大人之國東方有大人之國也東至日出之次扶木之池青土樹木之野皆日所出之地太皥勾芒所司者萬二千里其令曰挺群禁開􅐬闔通窮窒逹障塞行優游棄怨惡解赦罪免憂患休罰刑開􅀜梁宣出財和外怨撫四方行柔惠止剛強南方之極自北户烏孫之界北户日在其北嚮以爲户貫顓頊之國南方有顓頊之國也南至委火炎風之野赤帝祝融之所司者萬二千里帝赤著明審諟也祝屬也融工也萬物盛長屬續而工也其令曰爵有德賞有功惠賢良救飢渴舉力農振貧窮惠孤寡養老疾出大禄行大賞起毁宗立無後封建侯立賢輔中央之極自崑崙東絶􅁪山崑崙在西方􅁪山北岳也日月之所道謂二十八宿舎在地之分野江漢之所出人民之野五􅂖之冝龍門河濟相貫以息壤堙鴻水之州禹以息土堙洪水以爲中國九洲洲水中可居也東至於碣石黃帝后土之所司者萬二千里黃中色帝道諟地道載物故稱后也其令曰平而不阿明而不苛包裹覆露無不囊懷普大無私正静以利和行麋粥養衰弔死問疾以送萬物之歸西方之極自崑崙絶流沙沉羽沉羽弱水也其弱至沉毛羽也西至三危之國石城金室飲氣之民不死之野少皡蓐収之所司者萬二千里少皥白帝之號少皡隂用事物浩成也蓐荗也万物茂可収用之其令曰審用法誅必辜備盗賊禁姦邪勑群牧謹貯聚脩城郭􅀘决竇塞蹊徑隄溝瀆止流水壅谿谷守門閭陳兵甲百官誅不法北方之極自九澤九澤北方之澤也窮夏海之極夏海大海也北至令止之俗令止丁令北海胡地有凍寒積氷雪雹霜霰漂潤群水之野顓頊􅀇􅁳所司者萬二千里顓頊黒帝之號頊大言大隂用事振翕而寒也陰閉不見故神爲􅀇􅁳也其令曰申群禁固閉藏脩塞障繕􅀜梁禁外徒断罰刑殺當罪􅐬閭大捜客止交游禁夜樂早閇晏開以索姦人姦人巳得執之必固節巳幾幾終也刑殺母赦雖有盛尊之親斷以法度母行水母發藏母釋刑罪又曰任}
