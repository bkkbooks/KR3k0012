  - {type: 'tls:seg', offset: 2613, content: '', id: KR3k0012_CHANT_037-36a.5}
  - {type: variant, offset: 2613, length: 1, content: 夫, WYG: 城中土一撮不可得何言城乎三輔舊事曰成帝作延陵及起廟竇將軍有青竹田在廟南恐犯蹈之言作陵不便乃徙作昌陵取土十餘里土與粟同價關中記曰未央宫蕭何所造周廽二十三里疏龍首山土為殿基宣城記曰江矩吳時為廬江太守以清稱徵還船輕皆載土時嵗暮逐除者就乞所獲甚少江乃語之逐除人見而去盛𢎞之荆州記曰武當縣有一谿岸土色鮮黄乃可噉義興記曰陽羡縣塘西潜壤中有黄土色如精金法顯記曰阿育王昔在小兒時當道戲遇迦葉佛乞食小兒欣喜即以一掬土施佛佛持還泥經行}
  - {type: page-break, offset: 2613, content: '', id: KR3k0012_WYG_037-11a, image: WYG0893/WYG0893-0317a.png}
