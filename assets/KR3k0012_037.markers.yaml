  - {type: variant, offset: 1589, length: 0, content: '', SBCK: 朱浮與彭寵書曰亦猶河濵之人捧土以塞孟津謝承後漢書曰東郡趙咨病自置小素棺使人取乾黄土二十石細擣篩之遺令亡後置土棺底厚一尺内屍於中以土壅上又曰范訓母亡以布囊盛土􅀒以成壙魏志曰魏明帝起芳林園建昭陽殿公卿以下至於學生莫不展力帝乃躬自握土以率之後魏書曰髙􅄧父次同語人曰吾四子皆五服我死後豈有人與我一鍬土邪及次同死􅄧大起􅊘對之曰此老公子平生畏無一鍬土今日􅀍壓竟知之否唐書}
  - {type: page-break, offset: 1589, content: '', id: KR3k0012_SBCK_037-5b}
  - {type: variant, offset: 1589, length: 0, content: '', krp: 朱浮與彭寵書曰亦猶河濵之人捧土以塞孟津謝承後漢書曰東郡趙咨病自置小素棺使人取乾黄土二十石細擣篩之遺令亡後置土棺底厚一尺内屍於中以土壅上又曰范訓母亡以布囊盛土負以成壙魏志曰魏明帝起芳林園建昭陽殿公卿以下至於學生莫不展力帝乃躬自握土以率之後魏書曰髙昴父次同語人曰吾四子皆五服我死後豈有人與我一鍬土邪及次同死昴大起塚對之曰此老公子平生畏無一鍬土今日𬒳壓竟知之否唐書}
  - {type: variant, offset: 1590, length: 3, content: 道貴信, SBCK: 寳十三載􅁽楊國忠爲司空其日􅀨土江表傳曰孫權討􅀽術舉兵攻晥城術閇門自守粮食乏盡士女或丸土而呑之晉安帝紀曰劉敬宣在鮮卑夢丸土而服之旣而占焉或荅曰此服土呑丸也旣􅁴而喜曰丸者桓也桓旣吞矣我復夲土也旬日中聞桓􅀇敗得來歸世本曰禀君名務相姓巴與樊氏暉氏相氏鄭氏凢五姓俱出皆争神以土爲舡雕丈畫之而浮水中其舡浮因立爲君佗舡不能浮獨禀君舡浮因立爲君蜀王本紀曰蜀王獵於褒谷見秦王以金一笥遺蜀王蜀王報以禮物盡化爲土秦王大怒臣下拜賀曰土}
  - {type: variant, offset: 1590, length: 3, content: 道貴信, krp: 寳十三載冊楊國忠爲司空其日雨土江表傳曰孫權討袁術舉兵攻晥城術閇門自守粮食乏盡士女或丸土而呑之晉安帝紀曰劉敬宣在鮮卑夢丸土而服之旣而占焉或荅曰此服土呑丸也旣覺而喜曰丸者桓也桓旣吞矣我復夲土也旬日中聞桓玄敗得來歸世本曰禀君名務相姓巴與樊氏暉氏相氏鄭氏凢五姓俱出皆争神以土爲舡雕丈畫之而浮水中其舡浮因立爲君佗舡不能浮獨禀君舡浮因立爲君蜀王本紀曰蜀王獵於褒谷見秦王以金一笥遺蜀王蜀王報以禮物盡化爲土秦王大怒臣下拜賀曰土}
