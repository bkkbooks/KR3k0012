  - {type: variant, offset: 517, length: 1550, content: 奉三無私以勞天下子夏曰敢問何謂三無私子曰天無私覆地無私載日月無私照又曰凡四海之內斷長補短方三千里為田八十萬億一萬億畝九州之大計方百里者為田九十億畝山陵林麓川澤溝瀆城郭宮室塗巷三分去一其餘六十億畝周禮曰土訓掌道地圖以詔地事道說也說地圖九州形勢山川所宜告王以施其事也又曰以天產作陰德以中禮防之以地產作陽德以和樂防之以禮樂合天地之化百物之產又曰大司徒掌天下土地之圖周知九州之地域廣輪之數東西為廣南北為輪辯五地之生物一曰山林其動物宜毛其植物宜皁二曰川澤動物宜鱗植物宜膏三曰丘陵動物宜羽植物宜覈四曰墳衍動物宜介植物宜萊五曰原隰動物宜蠃植物宜藂爾雅曰東至泰遠西至邠國南至濮鈆北至祝栗謂之四極觚竹北戶西王母日下謂之四荒九夷八狄七戎六謂之四海距齊州以南戴日為丹穴北戴斗極為空桐東至日所出為太平西至日所入為太蒙郭璞注曰極四方極遠國也觚竹在北北戶在南西王母在西日下在東皆四方昏荒之地次四極者九夷在東入狄在北七戎在北六蠻在南次四荒者距去也齊中也犍為含人注曰晦冥無識不可教晦故曰四海自中州以南日光所照故曰丹穴尚書考靈異曰地有四遊冬至地上北而西三萬里夏至地下南而東復三萬里春秋分則其中矣地恒動不止人不知譬如人在大舟中閉牖而坐舟行不覺也詩含神霧曰天地相去億里春秋感精符曰冬至成天文夏至成地理春秋元命苞曰神農世怪義生白阜怪義白阜之母名也圖地形脈道白阜為神農圖畫地形通水道之脈使不壅塞也又曰土無位而道在故太一不興化人主不任部地出雲起雨以合從天下勤勞出於地功名歸於主土以謙自正以卑自歛終不自伐生養之苦乃興雲雨不以為功天一歸於天中又曰地所以右轉者氣濁精少含陰而起遲故轉迎天佐其道地生於離既而不敢當陽動退居少陰則亦宜右行而迎陽者受其施育而成陽故曰佐其道也又曰地不足東南陰右動終而入靈門地不足東故言立子午以相明之子午者陰陽之眾所見處也故以二辰廻轉所不同以為門也右動動而東也靈門巳也陰藏於以也又曰地者易也言養物懷任交易變化含吐應節故其立字土力於一者為地地加土以力又加一者言奉大一也春秋說題辭曰地之為言婉也承天行其義也居下以山為位道之經也山陵之大非地不制含功以牧生故其立字土力於一者為地力勤也即天也春秋內事曰地有十三分王侯之所居也孝經援神契曰地順受澤謙虛開張開張九覈受流灑潤是其謙虛也又曰計校九州之別土壤山陵之大川澤所注萊沛所生鳥獸所聚凡九百一十萬八千二十四頃磽埆不懇者千五百萬二千頃家語曰子夏曰啇聞山書曰地東西為緯南北為經山為積德川為積刑高者為生下者為死丘陵為牡川谷為牝蚌蛤龜珠與月盈虛是故堅土之人剛弱土之人肥虛土之人妙實土之人細息土之人美磽土之人醜史記曰顓頊養材以任地載時以象天漢書曰天道貴信地道貴貞不信不貞萬物不生又曰秦地於天官東井輿鬼之分野周地柳七星張之分野韓地角亢氐之分野趙地昴畢之分野燕地尾箕之分野齊地虛危之分野魯地奎婁之分野宋地房心之分野衛地營室東壁之分野楚地翼軫之分野吳地斗牛之分野晉書曰裴秀禹貢九州地域圖論曰圖書之設由來尚矣自古垂象立制而賴其用三代置其官國史掌其職暨漢祖屠咸陽丞相蕭何盡收秦之圖籍今秘書既無古之地圖又無蕭何所得秦之圖籍唯有漢氏輿地及括地諸雜圖各不設分率又不考正准望亦不備載名山大川其所載列雖有麤形皆不精審不可依據或稱外荒迂誕之言不合事實於義無取今制地圖之體有六一曰分率所以辯廣輪之度也二曰准望所以正彼此之體也三曰道里所以定所由之數也四曰高下五曰方雅六曰迂直此三者各因地而制以校夷險之數也有圖象而無分率則無以審遠近之差有分率而無准望雖得之於一隅必失之於佗方有准望而無道里則施於山海絕隔之地不能以相通有道里而無高下方斜迂直之校則徑路之數必與遠近之實相違失准望之正矣故必以此六者參而考之然后遠近之實定於高下方邪迂直之筭故雖有峻山巨海之隔絕域殊方之過登降詭曲之回皆可得舉而定者准望之法既正則曲直遠近無所隱其形也抱朴子云, WYG: ''}
