  - {type: variant, offset: 4, length: 0, content: '', krp: 之自然則六合不足均也均平也又曰盧敖游乎北海盧敖燕人秦始皇帝召以爲博士使求神僊亡而不返也徑乎太隂入乎玄闕太隂北方玄也至於蒙糓之}
