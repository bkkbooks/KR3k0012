  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_565-2a}
  - {type: variant, offset: 5, length: 1, content: 中, WYG: 下律吕雅樂下國語曰夫琴瑟尚宫鍾尚羽石尚角大不踰宫細不過羽故樂器重者從細輕者從大凢絲尚商匏竹尚徴革木一聲吕以和樂律以平聲金石以動之絲竹以行之歌以詠之匏以宣之土以贊之革木以節之物得其常曰樂極極之所集曰聲聲相保曰和細大不踰曰平如是金摩之石擊之絲木越之匏竹節之以節八風春秋感精符曰冬至日人主與羣臣左右縱樂五日天下人衆亦家縱樂五日以迎日冬至人主致八能之士備人主乃使八士撞黄鍾之鐘擊黄鍾之皷公卿大夫列士乃使八能之士擊黄鍾之皷用馬革皷員徑八尺一寸鼓黄鍾之瑟瑟用槐木瑟長八尺一寸吹黄鍾之律間音以竽補竽長四尺二寸天地以和應黄鍾之音得㽔賔之律應則公卿大夫列士以德賀於人主因請政所行請五官之符管各受其賞聲之調者詩氣和則人主以禮賜公卿列士五日儀定天地之氣和人主公卿大夫列士章之徳則隂陽之咎如度數夏日至之禮如冬至日之禮舞八樂皆以肅敬為戒八音者雲門五英六莖大巻大韶大夏大濩大武也黄鍾之音調諸氣和人主之音順則㽔賔之律應磬聲和公卿大夫列士誠信林鍾之律應此謂冬至日成天文夏至日成地理頴容春秋釋例曰周用六代之禮樂故有雲門咸池大韶大夏大濩大武也魯受四代之禮樂故不舞雲門咸池示有䧏殺也五經通義曰受命而王者六樂焉以太一樂天以咸池樂地以肆夏樂人以大夏樂四時以大濩樂五行神明以大武樂六律各象其性而為之制以樂其先祖又曰歌舞同處耶異耶歌者象徳舞者象功君子尚徳下功故歌在堂舞在庭歌以養形歌者有聲舞者有形何言歌在堂也以燕禮曰升歌鹿鳴以是知之何以言舞在庭也援神契曰合忻之樂舞於堂西夷之樂陳於户以是明之韓詩外}
