  - {type: variant, offset: 8, length: 7, content: 吳季札來聘請觀, SBCK: 古者天子左右五鍾將出則撞黄鍾而右五鍾應之馬鳴中䂓律駕者文御者有數立則磬折拱則抱鼓出入中䂓折旋中矩然後太師奏升車之樂告出也入則撞蕤賔以治容貌容貌治則得顔色齊顔色齊則肌膚安蕤賔有声鵠震馬鳴及倮介之虫無不延頸以聽蕤賔在内者皆玉色在外者皆金声然後少師奏升堂即席告入也此言物􅀋相感声相應之義也又曰湯作護聞其宫声使人温良而寛大聞其啇声使人方廉而好義聞其角声使人惻隱而仁愛聞其徴声使人樂飬而好施聞其羽声使人㳟儉而好礼白虎通曰樂也君子樂得其道小人樂得其欲声音何声鳴也聞其声即知所生声音者謂官啇徴羽也音飲也剛弱清濁和而相飲也音有八謂金石􅁝竹土木匏革太平乃作樂樂所以防􅁋奢民飢寒何樂之防子思子曰繁}
  - {type: page-break, offset: 8, content: '', id: KR3k0012_SBCK_565-2b}
  - {type: variant, offset: 8, length: 5, content: 吳季札來聘, WYG: 古者天子左右五鍾将出則撞黄鍾而左右鍾應之焉鳴中規律駕者有文御者有數立則磬折拱則抱鼓出入中䂓折旋中矩然後太師奏升車之樂吿出也入則撞㽔賓以治容貌則顔色齊顔色齊則肌膚安㽔賔以治有聲鵠震馬鳴及倮介之虫無不延頸以聴㽔賔在内者皆玉色在外者皆金聲然後少師奏升堂即席告入也此言物類相感聲相應之義也又曰湯作濩聞其宫聲使温良而寛大聞其商聲使人方㢘而好義聞其角聲使人隠惻而愛人聞其徴聲使人樂養而好施聞其羽聲使人恭儉而好禮白虎通曰樂者樂也君子樂得其道小人樂得其欲聲音何聲鳴也聞其聲即知其所生聲者宫商徵角羽也音引也剛引弱清濁和而相引也音有八謂金石絲竹匏土革木也太平乃作樂所以防滛奢民有饑寒何樂之防孟子曰孟子見齊宣王曰王之好樂甚則齊國其庶幾乎臣}
