  - {type: variant, offset: 986, length: 363, content: 下未盡善致太平孝經曰移風易俗莫善於樂爾雅曰宮謂之重商謂之敏角謂之經征謂之迭羽謂之柳郭璞注皆五音之列名其義未詳史記曰趙簡子疾五日不知人扁鵲曰昔秦繆公嘗如此五日不知人七日乃寤語大夫曰我之帝所甚樂與百神遊于鈞天廣樂九奏萬舞不類三代之樂其聲動人心又曰樂所以上事宗廟下以變化黎庶又曰凡樂者使萬民感蕩滌雅穢斟酌以飾厥性又曰太史公曰音樂者所以動盪血脈通流精神而和正心也又曰凡音由於人心天之與人相通如影之象形響之應聲也故為善者天報之以福為惡者天報之以殃其自然者也故舜作五絃之琴歌南風之詩而天下治紂為朝歌北鄙之音身死國亡舜之道何弘也紂之行何隘也夫南風之詩生長之音也舜樂好之天下同意得萬國之歡心故得天下也夫朝歌者不時也北者敗也鄙者陃也紂樂好之萬國殊心諸侯不附百姓不親天下叛之故身死國亡漢書曰聲者蕩滌人之邪意全其正性也商章也物成熟可章度也角觸也物觸, SBCK: ''}
