  - {type: variant, offset: 28, length: 4, content: 美哉始基, WYG: 吾王庶幾無疾病與何以能鼓樂也此無他與民同樂也今王與百姓同樂則王矣墨子曰程繫問於墨子曰聖人不爲樂昔諸侯倦於聽治息於鐘鼓}
