  - {type: variant, offset: 3474, length: 242, content: 音以當一歲之日又祖述沉重依淮南本數用京房舊術求之得三百六十律各因其月律而為一部以律數為母以氣候為子以一中氣所有日為子以母命子隨所多少分直歲以配七音起丁冬至以黃鍾為宮太簇為商林鍾為徵南呂為羽姑洗為角其餘月建皆依運行每月各以本律宮為旋宮之義由斯著矣武德之樂漢剋暴秦之從所作也言以武德除亂使天下樂行也四時之樂文帝之作也言以己節儉澤施於四海天下和平也又曰正月享西京太廟大樂令裴知古謂萬年令元行衝曰金石諧和當有吉慶之事其在唐室子孫乎其月中宗即位復國為唐國史補曰宋沉善音律太常久亡徵調沉考鍾律得之, SBCK: 五}
