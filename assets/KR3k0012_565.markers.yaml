  - {type: variant, offset: 18, length: 3, content: 使工為, SBCK: 者重於憂厚於味者薄於行君子同則有樂異則有禮孟子曰莊暴見孟子曰暴見於王王語暴以好樂暴未有以對也孟子曰王}
