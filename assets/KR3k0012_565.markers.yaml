  - {type: variant, offset: 321, length: 0, content: '', SBCK: 好皷樂夫何使我至於此極也父子不相見兄弟妻子離散此無他不與民同樂也今王皷樂於此百姓聞王鍾鼔之声管籥之音舉欣欣然有喜色而相告曰吾王庶幾無疾病與何以能皷樂也此無他與百姓同樂也今王與百姓同樂則王矣墨子曰程繁問於子墨子曰聖王不爲樂昔諸侯倦於聽治息於鍾皷之樂士大夫倦於聽治息於竽琴之樂農夫春耕夏耘秋歛冬藏息於吟􅇲之樂今夫子曰聖王不爲樂此譬之猶馬駕而不脫弓張而不弛墨子曰昔者堯舜有茅茨者且以爲禮且以爲樂湯放桀環天下自立因先王之樂又自作樂命曰護又循九韶武王勝殷殺紂環天下自立因先王之樂又自作樂命曰象周成王因先王之山海經曰祝融生子長琴是處揺山始始作樂丗􅀃曰荀公曽善解音声時論謂之闇解遂調律吕正雅樂毎至正㑹殿庭作四指自謂宮啇無不諧韻阮咸妙賞時論謂之神解每至公㑹作樂荀心識阮意必謂之不調而阮口􅀄無言直意忌之遂出阮爲始平太守後有田父耕於野地中得周時玉尺便是天下正尺荀試以校巳所治鍾皷金石􅁝竹皆短校一米於此伏阮之妙解徴阮南還􅀃苑曰孔子至齊郭門之外遇一嬰兒擊一壷相与俱行其視精其心端孔子謂御曰趣駈之韶樂方作故樂不獨自樂也又以樂人非獨以自正也又以正人樂􅀃曰聖人作樂不以爲娱樂以觀得失之節故不取備於一人必湏八能之士故八士或調隂陽或調五行或調盛人或調律暦或調五音與天地神明合}
