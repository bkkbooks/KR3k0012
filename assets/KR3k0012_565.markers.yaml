  - {type: variant, offset: 1566, length: 144, content: 而嘉應舉故詩曰磬管鏘鏘降福穰穰魏志曰太祖以杜夔為軍謀祭酒參太樂事因令創制雅樂夔善鍾律聰思過人絲竹八音靡所不能唯歌舞非所長散騎侍郎鄧靜尹商善詠雅樂歌師尹胡能歌宗廟郊祀之曲舞師馮肅時知先代諸舞惣究研精遠考經誥近採故事教習講律備作樂器復先代之樂皆自夔始也吳錄曰吳中呼周瑜為周郎瑜精意音樂三爵之後, SBCK: ''}
