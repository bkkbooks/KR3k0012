  - {type: variant, offset: 171, length: 0, content: '', WYG: 天樂也淮南子曰奏雅樂者如於陽阿採菱許慎注曰楚樂之名也邯鄲有鬻曲者託之李竒諸人皆爭學之後復知其非皆棄其曲此未始知音也李竒趙之善樂者也穆天子傳曰天子西征至于𤣥池之上乃奏廣樂三日終是曰樂池山海經曰祝融生子長琴是處揺山始作樂世說曰荀公曽善觧音聲時論謂之闇觧遂調律吕正雅樂毎至正㑹殿庭作四指自謂宫商無不諧韻阮咸妙賞時論謂之神觧毎至公㑹作樂荀心識阮意必謂之不調而阮口初無言直意忌之遂出阮為始平太守後有田父耕於野地中得周時王尺便是天下正尺荀試以校已所治鍾鼓金石絲竹皆短校一米於此伏阮之妙觧徴阮南還說苑曰孔子至齊郭門之外遇一嬰兒擊一壺相與俱行其視精其心端孔子謂御曰趣驅之韶樂方作故樂不獨自樂又以樂人非獨以自正也又以正人樂説曰聖人作樂不以自娱以觀得失之效故不取備於一人必須八能之士故八音或調隂陽或調五行或調盛衰或調律歴或調五音與天地神明合徳者則七始八氣終各得其宜也七始謂四方天地人也又曰上元者天氣也居中調禮樂教化流行摠五行為一下元者地氣也為萬物始質也為萬物之容範中元者人氣也其氣以定萬物通於四時象天心理禮樂通上下四時之氣和合人之情以慎天地者也時元者受氣於天布之於地以時出時入物者也風元者禮樂之本萬物之首物莫不以風成熟也聖王之知物極盛則衰暑極則寒樂極則哀是以日中則昃月盈則蝕天地盈虚與時消息制禮作樂者所以改世俗致祥風和雨露為萬姓獲福於皇天者聖人作樂䋲以五元度以五星縁貞以道徳彈形以䋲墨賢者進佞人伏䋲正也度靡也貞正也弹割也要覧曰桓君山曰余兄弟頗好音嘗至洛聴音終日而心足由是察之夫深其㫖則欲罷不能不入其意故改已風俗通曰案劉韶鍾律書曰春宫秋律百世必調秋宫春律萬物必榮}
