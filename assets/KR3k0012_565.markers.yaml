  - {type: variant, offset: 2664, length: 675, content: 皆附之而短寶常數詣公卿怨望蘇因誥寶常所為何所傳受初有一沙門謂寶常曰上雅好符瑞有言徵詳者上皆悅先生當言從胡僧受學云是佛象菩薩所傳音律然則上必悅先生所為可以行矣寶常然之遂如其言以荅威怒曰胡僧所傳仍是四夷之樂非中國所宜行也其事竟寢寶常聽太常所奏樂泫然而泣人問其故寶常曰樂聲淫厲而哀天下不久相殺盡時四海全盛聞其言者皆謂為不然大業之末其言卒驗寶常貧無子其妻因其臥疾遂竊其資物逃寶常飢餧無人贍竟餓而死及將死也取其所著書焚之曰何用此為見者於火中採得數卷見行於世時論哀之開皇之世有鄭譯何妥盧賷蘇夔蕭吉並討論墳籍撰著樂書皆為當世所用至於天然識樂不及寶常遠矣安馬駒曹妙達王長通郭金樂等能造曲為一時之妙又習鄭聲而寶常所為皆歸於雅此輩雖公議不附寶常然皆心服謂以為神又曰文帝開皇六年尚因周樂命工人齊樹提撿校樂府改換聲律益不能通俄而沛公鄭譯奏上請更修正於是詔太常卿牛弘國子祭酒辛彥之國子博士何妥等議正樂然淪繆既久積年議不定帝怒曰我受天命七年樂府猶歌前代功德命治書侍御史李諤引弘等下將罪之奏曰武王剋殷至周公相成王始制禮樂所事體大不可速成帝意乃解又曰開皇中亡齊伎曹妙達安馬駒等以藝遊三公之家新聲變曲傾動當世天子不能禁也帝令妙達理郊廟樂咸寫傾杯行天之聲萬寶常觀於樂署部伎樂中唯百濟樂清有歌人間謳謠之曲為耳目之如者不可勝載唐書曰鄭從讜在汴時以兄處誨嘗為鎮師歿于是郡訖一政受代不於公署舉樂又曰王涯為太常卿文宗以樂府之音鄭衛太甚欲聞古樂命涯詢於舊工取開元時雅樂選樂童按之名曰雲韶樂樂曲成涯與太常丞李廓少府監庾丞慮押樂工獻於園亭帝按之於會昌殿上悅賜涯等錦綵又曰乾元初上謂于休烈曰古聖人作樂以應, SBCK: ''}
