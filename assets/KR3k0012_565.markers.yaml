  - {type: variant, offset: 3460, length: 2, content: 而六, WYG: 和氣灰全出為猛氣吹灰不能出為哀氣和氣應者其政平猛氣應者其臣縱哀氣應者其君暴帝駮之曰臣縱君暴其政不和非月别異也今}
  - {type: variant, offset: 3461, length: 1, content: 六, SBCK: 氣應有早晚􅁅飛有多少或􅀄入月其氣即應或至中下旬開氣始應者或􅁅飛出三五夜而盡或終一月才飛少許者帝異之問牛弘對曰􅁅飛半出爲和氣􅁅全出爲猛氣吹􅁅不能出爲衰氣和氣應者其政平猛氣應者其臣縱衰氣應者其君暴帝駮之曰臣縱君暴其政不和非月別暴也今}
