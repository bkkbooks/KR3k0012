  - {type: variant, offset: 5, length: 1, content: 中, SBCK: 下律吕雅樂下國語曰夫琴瑟尚宮鍾尚羽石尚角大不踰宫細不過羽故樂器重者從細輕者從大瓦絲尚啇匏竹尚徴革木一聲吕以和樂律以平聲金石以動之絲竹以行之歌以詠之匏以宣之􅁟以賛之革木以節之物得其常曰樂清濁相應曰聲聲相保曰和細大不踰曰平如是金磨之石擊之絲木越之匏竹節之以節八風春秋感精符曰冬至日人主與群臣左右縱樂五日天下人衆亦家縱樂五日以迎日冬至人主備八能之士撞黄鍾之鍾擊黄鍾之皷公卿大夫列士乃使八能之士擊黄鍾之皷用馬革皷貟徑八尺一寸皷黄鍾之瑟瑟用槐木瑟長八尺一寸吹黄鍾之律間音以竽􅀘竽長四尺二寸天地以和應黄鍾之音得蕤賔之律應則公卿大夫列士以德賀於人主因請政所行請五官之符各受其賞聲之調者時氣和則人主以礼賜公卿列士五日儀定天地之氣和人主公卿大夫列士之德則隂陽之晷如度數夏日至之礼如冬日至之礼舞八樂皆以肅敬爲戒八音者雲用五英大筮大卷大韶大夏大護大武也黄鍾之音調諸氣和人主之音順則蕤賔之律應磬聲和公卿大夫列士誠信林鍾之律應此謂冬日至成天文夏日至成地理頴客春秋釋例曰周用六代之禮樂故有雲門咸池大韶大夏大護大武也魯受四代之禮樂故不舞雲門咸池示有降殺也五經通義曰受命而王者六樂焉以太一樂天以咸池樂地以肆夏樂人以大夏樂四時以大護樂五行神明以大武樂六律各象其性而爲之制以樂其先祖又曰歌舞同處􅁘異􅁘歌者象德舞者象功君子尚德下功故歌在堂舞在庭歌以飬形歌者有聲舞者有形何言歌在堂也以燕礼曰升歌鹿鳴以是知之何以言舞在庭也援神契曰合忻之樂舞於堂四夷之樂陳於户以是明之韓詩外}
