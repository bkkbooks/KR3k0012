  - {type: variant, offset: 175, length: 114, content: 夏則大大之至也其周之舊乎為之歌魏曰美哉渢渢乎大而險儉而易行以德輔此則明主也為之歌唐曰思深哉其有陶唐氏之遺民乎不然其何憂之遠也非令德之後誰能若是為之歌陳曰國無主其能久乎自鄶以下無譏焉為之歌小雅曰美哉思而不貳怨而不言其周德之襄乎猶有, SBCK: 好}
  - {type: variant, offset: 175, length: 0, content: '', WYG: 作知禮樂之文能述華譚論曰夫無聲者五音之祖無形者萬物之君本其祖然後精商徴之妙理其君然後正硏樸之容推精樸以檢得失稽清濁以接存亡夫宿瘤瘼母經目而人不視者何一尺之靣醜也西施毛嬙靡服而人左顧者何一尺之靣好也}
