  - {type: variant, offset: 3382, length: 0, content: '', SBCK: 與氣諧故感天神而降􅀌竹之管律應林鍾聲與器諧故感地祇而出隂竹之管律應黄鍾聲與器諧故感人􅀑而至樂纂云昔晉人有銅藻盤無故自鳴問之於張茂先荅曰此器與洛陽宫鍾聲相諧宫中撞鍾故鳴也􅀂以鑢之音殊其鳴可止後果如其言也是故樂之制器法度均聲得之毫􅁵}
