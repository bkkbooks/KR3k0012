  - {type: variant, offset: 364, length: 2, content: 若此, SBCK: 氣以定萬物通於四時承天心理禮樂通上下四時之氣和合人之情以愼天地者也時元者受氣於天布之於地以時出入萬物者也風元者禮樂之夲萬物之首物莫不以風成熟也聖王知物極盛則衰暑極則寒樂極則哀是以日中則昊月盈則蝕天地盈虚與時消息制禮作樂者所以改丗俗致祥風和􅀨露爲萬姓􅀗福於皇天者也聖人作樂䋲以五元度以五星碌貞以道德彈形以䋲墨賢者進佞人伏䋲正也碌碌摩也貞正也彈割也要覽曰桓君山曰余兄弟頗好音甞至洛聽音終日而心足由是察之夫􅀷其旨則欲罷不能不入其意故過已風俗通曰案劉韶鍾律書曰春宫秋律百卉必凋秋宫春律萬物必榮夏宫冬律雨雹必降冬宫夏律雷必發声夫音樂至重所感者大故曰知禮樂之情能作知禮樂之文者能述華譚論曰夫無声者五音之祖无形者萬物之君夲其祖然後情啇徴之妙理其君然後正妍朴之容推精朴以撿得失稽清濁以接在亡夫􅀫瘤嫫母經日而人不視者何一尺之靣醜也西施毛嬙靡服而人左顧者何一尺之靣好也夏􅁎以容美而陳亡濮水以声好而國滅夫何媱哇之有}
