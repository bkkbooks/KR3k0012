  - {type: variant, offset: 2455, length: 207, content: 亡國之音豈陛下之所宜聞上不悅寶常因極言樂聲哀怨淫放非雅正之音請以水尺為律以調器上從之寶常奉詔遂造諸樂器其聲率下鄭譯調二律并撰樂譜六十四具論八音旋相為宮之法改絃移柱之規為八十四調一百四十四律變化終於一千八聲時人以周禮有旋宮之義自漢魏以來知音者皆不能通見寶常特創其事皆哂之至是試令為之應手成曲無所疑滯見者莫不嗟異於是損益樂器不可勝紀其聲雅淡不為時人所好太常善聲者多排毀之又太子洗馬蘇夔以鍾律自命尤忌寶常夔父威方用事凡言, SBCK: 則}
