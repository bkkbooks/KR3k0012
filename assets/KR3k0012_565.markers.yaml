  - {type: variant, offset: 94, length: 0, content: '', WYG: 弛墨子曰昔者堯舜有茅茨且以爲禮且以爲樂湯放桀於大水環天下而自立作樂命曰濩又修九韶武王勝殷伐紂環天下而自立用先王之樂又自命樂曰象周成王立因先王之樂命曰騶虞周成王之治天下也不若武王武王之治天下也不若成湯成湯之治天下也不若堯舜故樂逾繁者治逾寡自此觀之非所以治天下也又曰齊康公有樂工萬人食必梁肉衣必文繡子思子曰繁於樂者重於憂厚於味者薄於行君子同則有樂異則有禮莊子曰澶漫爲樂擿擘爲禮而天下始公矣又曰北門成聞黃帝張咸池之樂於洞庭之野始聞之}
