  - {type: variant, offset: 407, length: 3, content: 德非禹, SBCK: 曉音余頗離雅操而更爲新弄子雲曰事淺易喜􅀷者難識卿不好雅頌而恱鄭声冝也律呂周禮曰大師掌六律六同以合隂陽之声陽声黄鍾大蔟姑洗蕤賔夷則無射隂声大吕應鍾南吕函鍾小吕夾鍾皆文之以五声宫啇角徴羽皆播之以八音金石土革􅁝木匏竹注云以合隂陽之声者声之隂陽各有合也黄鍾子之氣也十一月建焉而辰在星紀大吕􅐫之氣也十二月建焉而辰在􅀇枵太簇寅之氣也正月建焉辰在娵訾應鍾亥之氣也十月建焉辰在析木之津姑洗辰之氣也三月建焉而辰在大梁南吕酉之氣也八月建焉而辰在壽星蕤賔午之氣也五月建焉而辰在鶉首林鍾未之氣也六月建焉而辰在鶉火夷則申之氣也七月建焉而辰在鶉尾中吕巳之氣也四月建焉而辰在實沈無射戍之氣也九月建焉而辰在大火夾鍾夘之氣也二月建焉而辰在降婁辰與建交錯互處如表裏然是}
