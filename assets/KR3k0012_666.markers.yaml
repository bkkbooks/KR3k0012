  - {type: variant, offset: 1986, length: 0, content: '', SBCK: 手爲經題握中祕訣門人罕能見之惟􅀓孫韜與桓闓音開二人而巳又曰朱仲甞於㑹稽賣珠漢髙后時人也仲以素書􅀝酒於女几家几盗冩學其術又曰道士不欲臨喪損神壞氣所以去世不仕而獨存焉惟父母及師不懼性命之傷必臨其䘮以此而傷是無傷也抱朴子曰薛旅字季和燕代人周武王時學道於鍾山北河經七試而不過者由􅁋佚鄙滯敗其試耳又曰郭文舉河内軹縣人入陸渾山學道獨能無情意不生也又曰吴大帝時蜀中有李阿者穴居不食累丗見之號八百歳翁人徃問事阿無所言但占阿顔色􅀂欣然則事􅁻􅀂􅃤戚則㓙􅀂含􅀏則大慶微歎則深憂如此之候未曽不審也一旦忽去不知所之又曰范零子少好仙道如此積年後遇司馬季主季主同入常山中積七年入石室北東角有石甕或作石牖季主出行懇戒之曰愼勿開零子忽發視之季主還乃遣歸後復召至使守一銅匱又戒勿發零子復發之季主乃遣之遂不得道又曰馮良者南陽人少作縣吏年三十爲尉佐史迎督郵自耻無志乃毀車殺牛裂敗衣幘去從師受詩傳禮易復學道術占遊候十五年乃還州郡禮辟不就詔特舉賢良髙第半道委還家年六十七弃世東度八山在鹿迹洞中又曰安丘望之字仲都京兆長陵人也修尚黄老漢成帝重其道德常宗師之愈自損退成帝請之􅀂值望之章醮則待事畢然後徃老子章句有安丘之學望之忽病篤弟子公沙都輿於庭樹下望之曉然有痊時冬月􅈹聞李香開目則見􅀟赤李著枯枝望之仰手承李李自墮掌中因食李所苦盡除身輕目明遂去莫知何在也道學傳曰燕濟字仲微漢明帝時人也少好道德不仕周遊名山後居武當山寢息無常所或因積石或􅀝大樹四時衣服不變恒散髮亦有練巾又曰鮑靚字太玄上黨人也漢司􅀠鮑宣之後禀性清慧學通經史修身養性蠕而允切動不犯聞人之惡如犯家諱人多從受業楊道化物號曰儒林又曰王嘉字子年隴西人也在東陽谷口鑿岸穴居其徒數百各自穴處爲人皃短陋而聦察滑稽有問世事善惡終不直說過率有驗又曰嚴遵守君平蜀郡人也修道自保與人子言孝與人臣言忠與人弟言順各因其發導之以善又曰王逺字方平常降蔡經家湏􅁷麻姑至􅀐從半於方平麻姑手􅀲如鳥經私心曰時背癢得搔之佳也方平曰姑神人汝何遽此遂鞭之經願從方平學道方平使背立從後觀之曰心邪不可教之仙道乃與度世術又曰􅁃承仙字崇光頴川人明老㽵隱文江縣白水臺立廬舎講肆儒士釋老受其學隱居江南累詔不出後來始興講道德經剖析凝滯又曰薛玉寳字延世沛國人也梁時師玄圃先生以文章見美善書翰甞書一章於崇靈觀道正省壁上見者翫之也又曰東鄕宗超字􅇣倫髙密黔陬人也甞露壇行道奩中香盡自然滿溢又爐中無火而烟氣自生氤氲周遍乆之不歇又曰張􅁉天師十二世孫起招眞觀植名果盡山栖之趣梁簡文爲製碑又}
