  - {type: variant, offset: 2149, length: 496, content: 極模範不耳凡試刃之利鈍取中形芒數枚急束以一髮懸其抄繫於杖頭令一人執之乃以刃一斫芒斷而髮猶連計芒多少為優劣劉㦎鈸千牛刀皆舊斫十三芒又有一百鍊剛刀斫十二芒國中惟稱此為絕而近造神劍斫十五芒觀其鐵色青憿光采有異蓋薛燭所謂渙如冰之將釋者矣頃來有作者十餘人皆不及此作剛朴是上虞謝平鑿鏤裝治平聲是石尚方師黃文慶並是中國絕手以齊建武元年甲戍歲八月十九日辛酉建於茅山造至梁天監四年乙酉歲勑令造刀劍形供御用窮極精功奇麗絕世別有橫法剛公家自作百鍊黃文慶因此得免隸役為山館道士也周禮制劍長三尺柄居五寸是六分之一也內刃廣二寸半重古秤一斤四兩今秤三斤十兩也今公家劍長四尺七寸柄居一尺五寸是三分之一小減也刃廣一寸六分輕重不定此寶劍長三尺九寸廣一寸四分而經有刀劍兩名晉武帝大始十年中書監荀勗及張華等校定鍾律八音不與古樂相諧由漢來用尺漸長乃更依周禮積黍法制尺以量鑄新器募求古物得周世正玉律比之毫釐無差因擊古鍾以律命之亦皆響合兼以七種古物相課皆會又得汲冢竹簡亦長二尺四寸於是施用謂之古尺阮咸聽荀樂聲以為高功非興國之音咸亡後有人掘地得銅尺長荀尺古尺之四分半時人以阮咸之解音遂復施行謂之官尺令司農相承以制五尺并取積寸以作㪷斛也宗元嘉, SBCK: ''}
