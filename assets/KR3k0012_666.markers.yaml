  - {type: variant, offset: 165, length: 1, content: 必, WYG: 變􅁪散髮亦著練巾又曰鮑靚字大𤣥上黨人也漢司𨽻鮑宣之後禀性清慧學通經史修身養性蠕而允切動不犯聞人之惡如犯家諱人多從受業楊道化物號曰儒林又曰王嘉字子年隴西人也來東陽谷口鑿􅜌穴居其徒數百各自穴處}
