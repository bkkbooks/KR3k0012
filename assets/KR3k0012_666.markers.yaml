  - {type: variant, offset: 2077, length: 0, content: '', SBCK: 山三十餘年隔絶人事一說云伯玉􅀄遊南岳路入閩中飛湍走險伯玉泊舟晚瀬衝颷忽起山水􅁀至激上巓崩落絕嶂徒侣以爲冰碎縁阻尋求見伯玉自􅀂以小杖撝舟渉不測之泉衆以駭伏入霍山而去􅀄隱瀑布山齊髙祖欽其風欲與相見辭以疾而去帝追恨詔瀑布山下立太平觀孔稚圭立碑又曰張陵􅀶學及河洛天文悉窮其妙静處衡門不求聞逹彈琴詠詩順志而巳又曰龍威丈人山中得道者也時人莫知其名號曰山隱居慠然不群髙絶人世又曰陶􅒮景字道明魏郡平陽人也自號華陽隱居常謂人曰我心􅁪如懸鏡觸物不遺好行隂德拯濟困窮合施諸藥逺近賴之平生末甞晝眠看書必至半夜好聞松風傳之郷人隱銅爲設酒旣去酒在器中不耗道士舒道雲病瘧比年猛授以三皇詩使諷之頓愈甞還豫章以白羽畫江而渡縣}
