  - {type: variant, offset: 3068, length: 0, content: '', WYG: 之先娶散騎常侍呉郡孫宏女為妻邁居臨安山中為書謝遣其妻云欲聞懸溜之響山鳥之鳴自為蕭韶九成不能勝也偶景青葱之下栖息巖岫之室}
