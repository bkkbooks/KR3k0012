  - {type: variant, offset: 707, length: 175, content: 此劍非蛻也故云上品明變遁之高道營造劍之時先齋戒百日乃於幽隱處近清泉立西向屋作灶口亦西向善鍛人鍊好鐵生鋌合鍊成令得八斤為足也若欲窮其精理當用竹炭又以銅錫柔澳如此用歲月功夫殊多所以古人作劍三年然後成也薛燭云甌冶鑄劍赤鍾之山破而出錫若耶之溪涸而出銅今以此合燒則煉多而不燥剛利而銷其鍛人亦須溫良新衣沐浴造劍之日尤不得飲酒食肉及遊履淹穢用七月庚申日八月辛酉日使, WYG: 簡寂館}
