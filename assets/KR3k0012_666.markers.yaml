  - {type: variant, offset: 2829, length: 236, content: 願真官隱浪自足者當修劍尸解之道以曲晨飛精書劍左右面先逆自託疾然後當抱劍而臥也謂先偽稱疾寢臥數日乃密脫劍青囊拔出題書及繫符都畢於是抱之而祝須天馬迎至解衣而遊勿令人知覺也又以飛精藥密拭劍鐶呼劍名字祝畢忽見太一以天馬來迎於寢臥之前於是上馬若女子則以輜軿來迎古來諸仙多有託以餘物或用竹杖或巾屨惟鮑靚用太清刀法此神變欻怳假類會形不可以理趣相求真奇事矣天馬者吉光騰黃之獸也古畫圖有此獸形皆昔真人所顯相傳示也吉光似鹿騰黃類馬男則單騎女則駕軿也太極真人命太一使者齎馬執控并迎以寶衣欻忽而來, WYG: 返亦}
