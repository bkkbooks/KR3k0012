  - {type: variant, offset: 2000, length: 70, content: 云是異人作此劍乃方佛符字殊細設婁羅鐶曰大乘法而鐵甚快利宋來便恒供御衛名曰劉㦎鈸尚千牛刀同寶女已易去鐶麾刻處亦漸漸欲滅又見有四五故鐶並相似如一, SBCK: ''}
