  - {type: variant, offset: 3071, length: 0, content: '', WYG: 情願所終志絶於此吾其去矣長離别矣又曰禇伯玉字元璩呉郡錢塘人早慕冲虛年十八父為娶婦入前門伯玉後門出徃剡居瀑布山性耐寒暑在山三十餘年隔絶人事一說云伯玉初遊南岳路入閩中飛湍走險伯玉泊舟晩瀬衝颷忽起山水暴至激船上巔崩落絶嶂徒佀以為水漬縁阻尋求見伯玉自若以小杖撝舟渉不測之泉衆以駭伏入霍山而去初隠瀑布山齊髙祖欽其風欲與相見辭以疾而去帝追恨詔瀑布山下立}
  - {type: page-break, offset: 3071, content: '', id: KR3k0012_WYG_666-10b, image: WYG0899/WYG0899-0018d.png}
  - {type: variant, offset: 3072, length: 0, content: '', WYG: 平觀孔稚圭立碑又曰張陵博學及河洛天文悉窮其妙静處衡門不求聞逹彈琴詠詩順志而已又曰龍威丈人山中得道者也時人莫知其名號曰山隱又曰陶𢎞景字通明丹陽秣陵人也自號華陽隠居常謂人曰我心恒如懸鏡觸物不遺好行隂德拯濟困窮合施諸藥逺近賴之平生嘗晝眠㸔書必至半夜好聞松風之聲少絶肥羶晩惟進飢音餕苔紫菜生姜飲酒能至}
