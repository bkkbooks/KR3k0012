  - {type: variant, offset: 2001, length: 2, content: 是異, WYG: 慕善皆外好耳未見真心可與斷金者又曰晉陸納為尚書令時年四十病瘡告杜恭云奕世短壽臨終皆患此瘡恭為奏章又與雲飛散謂納曰君命至七年果如其言王右軍病請恭恭謂弟子曰右軍病不差何用吾十餘日果卒又曰蔣負芻義興}
