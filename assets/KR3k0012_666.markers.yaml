  - {type: variant, offset: 168, length: 0, content: '', WYG: 法導之以善又曰王逺字方平常降蔡經家須臾麻姑至騎從半於方平麻姑手爪如鳥經私心曰時背癢得搔之佳也方平曰姑神人汝何􅃍此遂鞭之經願從方平學道方平使背立從後觀之曰心邪不可教之仙道乃與度世術又曰庾承先字崇光頴川人明老莊隠文江縣土臺山立廬舍講肄儒士釋老受其學隠居江南累詔不出後來始興講道德經剖析凝滯又曰薛玉字世寳沛國人也梁時師𤣥圃先生以文章見美善書翰嘗書一章於崇靈觀道正省壁上見者翫之也又曰東鄉宗超字逸倫髙密黔陬人也嘗露壇行道奩中香盡自然滿溢又爐中無火而烟氣自生氤氲周遍久之不歇又曰張裕天師十二世孫起招真觀植名果盡山栖之趣梁簡文為製碑又曰昔晉陵人錢妙真茅山鷰口洞得道門人立碑於茅山邵陵王親為序今具存焉又曰梁武帝天監二年置大小道正平昌孟景翼字道輔時為大正屢為國講說四年建安王偉於座問曰道家經教科禁甚重老子二篇盟誓乃授豈先聖之㫖非凢所說耶景翼曰崇秘嚴科正宗妙化理在相成}
