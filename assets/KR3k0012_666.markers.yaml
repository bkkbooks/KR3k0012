  - {type: variant, offset: 158, length: 1548, content: 既服腴石或當不必為其事掾從鎮南夜解則又非此法掾許長史子也若是太清解及單用劍者應不得反望故鄉而掾遊處方臺還本居邦也神劍用之而解化則能遊宴太極採五星之靈軌煥七元之威光以範儀烈映真氣故軒轅喬山之葬劍烏在焉王子渤海之家劍鳴空槨王喬有京陵之墓劍飛冲霄斯實真驗九玄精應太靈神方靈致威劍之妙化也諸以劍尸解者以劍代身五百年之後此劍皆自然還其處諸以劍解者不必止是用丹書者空劍亦可幽響無間恍惚難尋不可得言矣不可得為之者見之者惟當應之於心耳神奇歘怳變動無方非復物理所期正當心任化即事從宜耳為之者亦不覺其所以見之者固莫測其所然軒轅採百山之銅以鑄鼎虎豹百禽為之視火參鑪鼎而軒轅疾崩葬喬山五百年後山崩寶劍赤舄在焉一旦又失王子喬者曾詣鍾山獲九化十變經以隱遁日月遊行星辰後一旦疾終營家渤海山夏襄時有發王子墓者一劍在北寢上自作龍鳴人無敢近後亦失所之王子喬墓在景陵戰國時復有發其墓者見一劍人適欲取視其劍忽然上飛去王子喬事舊說浮丘公儁與乘鶴共登嵩山此事不同解化時年五十五六耳故戴遠遊冠者昔葛洪云陰君授鮑靚尸解之法後死埋石子崗有人發其棺見一大刀冢左右有人馬之聲遂不敢取此似劍解法而不能飛去此是用靈寶太玄陰生符朱書刀矣太清之下故得生者而已按玉清靈傳說揔真帶劍揚君說桐柏帶劍此並應是先解劍化也真人用寶劍以尸解蟬蛻化之上品也夫尸解之法多如蟬蛻今此劍非蛻也故云上品明變遁之高道營造劍之時先齋戒百日乃於幽隱處近清泉立西向屋作灶口亦西向善鍛人鍊好鐵生鋌合鍊成令得八斤為足也若欲窮其精理當用竹炭又以銅錫柔澳如此用歲月功夫殊多所以古人作劍三年然後成也薛燭云甌冶鑄劍赤鍾之山破而出錫若耶之溪涸而出銅今以此合燒則煉多而不燥剛利而銷其鍛人亦須溫良新衣沐浴造劍之日尤不得飲酒食肉及遊履淹穢用七月庚申日八月辛酉日使長三尺九寸廣一寸四分厚三分半謂背脊上近柄閒令厚三分半也至兩刃際可減一二釐耳又向刃邊先殺背二分乃立刃至杪亦以漸令薄也杪九寸為左右刃處當從鐶項定度整三尺刻背為刃亦廣三分八釐必使中脊餘六分也杪九分合殺兩邊令尖殺杪鋒令有兩稜如戟杪殺鋒也其柄用長短適令鐶高二寸四分身長二尺四寸則餘一尺二寸六分以為柄鐵因當中央令廣九分厚二分與鐶相連柄操梓材近環圍四寸九分刃圍三寸九分皆以釦竟為正若作劍裝則促扁於此也劍頭可安籙鐶謂發始鍊剛仍使鐶身相連勿別作模合作釘連之都使外形大小厚薄相似乃鑿除應空之內亦可先鑽作數孔鑿為易其伏基處鑿鏝之都畢令大鐶高二寸四分橫分廣處對中徑二寸八分內方員徑四分鐶形古今多法或正圓或狹長或如鼎耳乃有十許皇今此經中所圖亦是顯其左右法耳非正定形也謹准製古今取其合度立圖如右又鐶之內不得正圓如竹亦不得正方如界尺當令內面小方面外落稜角必令得刻己刃字不甚邪轉惟使長三尺九寸耳尺寸度數厚薄形制並備如別圖尋古今尺長短不同九章筭法皆積毫釐之度晉中書監茍勗善音律伎藝常恨八音不調後有人掘地得一玉律銘題周世短晉尺四分半以改定音律聲韻合度今宜用此尺為准所以爾者揔真桐柏並以周時作劍用周尺也籙鐶者鏤刻劍鐶鐶左右面刻之作刃字面有九刃字也鐶背上刻作九己字也深刻字皆從刃背而下順刃謂兩邊刃及己字皆對從刃皆邊起俱下就刃故曰順刃也順環而刻之隨鐶曲轉故曰順鐶也謂刻處得以金銀閒之益分明佳也劍身刻象鐶中央復有豎起如小手鐶者名之曰伏基伏基之義謂為日月之基隱秋光景也內鐶左面為日字內鐶者即小環之中伏基也刻右面為月字先又圓刻日月之外為郭也五百年還出以揮五岳入以藏無閒謂潛靈遁跡隱影藏形也下以制九陰謂可以攝召九陰之神也上以承玄冥謂北斗玄冥星主隱變也衛足以逐邪魔威足以鑒七精謂控威秉勢鑒照七星也仰以映五氣謂五行之氣常栖映也俯以代身化形矣欲知劍之左右內外以劍正指南使劍背在上使劍刃在下也於是以東而為右西面為左東為內面西為外面此劍尺度長短廣狹厚薄刻鏤文字乃太極四真人靈劍之模範也上清真人亦皆帶劍上清之劍, SBCK: 壇碑}
  - {type: variant, offset: 158, length: 3, content: 既服腴, WYG: 壇碑並是韜跡也陶隠居手為經題握中秘訣門人罕能見之惟傳孫韜與桓闓音開二人而已矣又曰朱仲嘗於㑹稽賣珠漢髙后時人也仲以素書貰酒於女凡家因盜寫學其術又曰道士不欲臨䘮損神壊氣所以去世不仕而獨存焉惟父母及師不懼性命之傷必臨其䘮以此而傷是無傷也抱朴子曰薛振字季和燕代人周武王時學道於鍾山北河經七試而不遇者由淫泆鄙滯敗其試耳又曰郭文舉河内軟縣人入陸渾山學道獨能無情意不生也又曰呉大帝時蜀中有李阿者宂居不食累世見之號曰百歳翁人徃問事阿無所言但占阿顔色若欣然則事吉若慘戚則㓙若含笑則大慶㣲歎則深憂如此候之未曾不審也一旦忽去不知所之又曰范零子少好仙道如此積年後遇司馬季主季主同入常山積七年入石室瓮季主出行懇戒之曰慎勿開零子忽發視之季主還乃遣歸後復召至使守一銅匱又戒勿發零子復發之季主乃遣之遂不得道又曰馮良者南陽人少作縣吏年三十為尉佐史迎督郵自耻無志乃毁車殺馬裂敗衣裳去從師受詩傳禮易復學道術占候遊十五年乃還州郡禮辟不就詔特舉賢良髙第平道委還家年六十七棄世東度入山在鹿迹洞中又曰安丘望之字仲都京兆長陵人也修尚黄老漢成帝從其道德常宗師之愈自損退成帝請之若值望之齋醮則待事畢然後徃老子章句有安丘之學望之忽病篤弟子公沙都侍於庭樹下望之自知病有痊時冬月鼻聞李香開目則見雙赤李著枯枝望之仰手承李自墜掌中因食李所苦盡除身輕目明遂去莫知何在也道學傳曰燕濟字仲㣲漢明帝時人也少好道德不仕周逰名山後居武當山􅃦息無常所或因積}
