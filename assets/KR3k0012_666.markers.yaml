  - {type: variant, offset: 1547, length: 308, content: 隱影藏形也下以制九陰謂可以攝召九陰之神也上以承玄冥謂北斗玄冥星主隱變也衛足以逐邪魔威足以鑒七精謂控威秉勢鑒照七星也仰以映五氣謂五行之氣常栖映也俯以代身化形矣欲知劍之左右內外以劍正指南使劍背在上使劍刃在下也於是以東而為右西面為左東為內面西為外面此劍尺度長短廣狹厚薄刻鏤文字乃太極四真人靈劍之模範也上清真人亦皆帶劍上清之劍並是太極所造耳故此經為太極之法乃四真人定範何必須昆吾之金割玉之鋌耶此蓋明不必須精鐵所存者模範而已王子喬劍乃凡下之鐵耳喬山尸解之劍非昆吾之流金也此太極真人紫陽公詞以告王君也軒轅駕龍玄圃是步綱之術為解化後乃行前真多有此例此劍經前章也太極上化符以飛精書紙盛以紫囊欲去時以係劍鐶右以曲晨飛精書劍左面令至劍抄, WYG: ''}
