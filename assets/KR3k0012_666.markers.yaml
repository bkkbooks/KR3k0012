  - {type: variant, offset: 2004, length: 1, content: 作, WYG: 也與晉陵薛彪之為俗外之交去來茅山有志栖託齊永明中暫徃陶隠居一過便盡素契陶後觧紱結宇中茅中茅山也仍請負度嶺相就經典藥術常共論之又曰楊超字超逺東海人也入山事陶隠居徃復與陶論難得為入室又曰諸慧開字智逺呉興烏程人也每以戒行自修拯濟為務齊大明八年天下飢饉慧開有少糓實乃賑鄉邑頼之有三人積饑食飽而致死其家訴縣穪慧開飼殺餓人苦相誣謗邑令笑曰乞食飽死反怨主人法無}
