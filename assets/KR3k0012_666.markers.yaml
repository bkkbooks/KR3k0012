  - {type: variant, offset: 1777, length: 206, content: 此太極真人紫陽公詞以告王君也軒轅駕龍玄圃是步綱之術為解化後乃行前真多有此例此劍經前章也太極上化符以飛精書紙盛以紫囊欲去時以係劍鐶右以曲晨飛精書劍左面令至劍抄也又太極藏景符飛精書紙盛以絳囊欲去時以係劍鞘右以曲晨飛精書劍右面令至劍杪也又太極籙形符以飛精書紙臨去之日服之身生七色之雲自有電光右以曲晨飛精書劍背令皆兩刃之際也又太極解化符恒日服一符七年化去朱書竹中帛祕要也是合曲晨丹成臨欲解化時以題劍七年以後朱題劍亦能解化, SBCK: ''}
