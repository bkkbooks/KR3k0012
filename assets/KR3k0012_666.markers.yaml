  - {type: variant, offset: 3240, length: 180, content: 三年自能化形不必須藥書之若不辨作藥七年之後但以丹書劍亦能潛化也單行此法似不得反故鄉矣自不及曲晨之妙精吉光騰黃之延控也雖單此猶賢於太清雜法兼得改形練化遊宴太極其用他藥得尸解非是靈丸之化者皆不得反故鄉反故鄉三官執之也太清尸解之法那得比太極之化遁乎太清尸解法五符中有太玄陰生符又用牛脂煎錫藥丸兩事耳無復餘方也佩用制劍之法具在符圖訣中其後用解化之道又非常修之事故並不載, SBCK: 六}
