  - {type: variant, offset: 1991, length: 8, content: 劉㦎呼麥切多奇識, SBCK: 投茅山講道集衆敦􅀼歎曰衆人雖云慕善皆外好耳未見眞心可與斷金者又曰晉陸納爲尚書令時年四十病瘡告杜恭云弈世短壽臨終皆患此瘡恭爲奏章又與雲飛散謂納曰君命至七十果如其言王右軍病請恭恭謂弟子曰右軍病不􅏔何用吾十餘日果卒又曰蔣負芻義興人也與晉陵薛彪之爲俗外之交去來茅山有志栖託齊永明中暫下都陶隱居一遇便盡素契陶後解􅌧結宇中茅中茅山也仍請􅀒芻度嶺相就經典藥術常共論之又曰楊超字超逺東海人也出入事陶隱居徃復與陶論難得爲入室又曰諸慧開字智逺吳興烏程人也每以戒行自修拯濟爲務齊大明八年天下飢饉慧開有少􅂖實乃悉分賑郷邑頼之有三人積飢食飽而致死其家訴縣稱慧開飼殺餓人苦相誣謗邑令􅀏曰乞食飽死反怨主人法無此科遣而不問又曰濮陽者不知何許人事道專心祈請皆驗鄭鮷音帝女足跛陽療之尋差晉簡文廢世子無嗣時使人祈請於陽於是中夜有黄氣起自西南遥墮室􅈛時李皇后懷孝武又曰許邁字叔􅀇少名映後改名逺遊志求仙道入臨安西山經月不返人}
