  - {type: variant, offset: 2307, length: 509, content: 元年甲戍歲八月十九日辛酉建於茅山造至梁天監四年乙酉歲勑令造刀劍形供御用窮極精功奇麗絕世別有橫法剛公家自作百鍊黃文慶因此得免隸役為山館道士也周禮制劍長三尺柄居五寸是六分之一也內刃廣二寸半重古秤一斤四兩今秤三斤十兩也今公家劍長四尺七寸柄居一尺五寸是三分之一小減也刃廣一寸六分輕重不定此寶劍長三尺九寸廣一寸四分而經有刀劍兩名晉武帝大始十年中書監荀勗及張華等校定鍾律八音不與古樂相諧由漢來用尺漸長乃更依周禮積黍法制尺以量鑄新器募求古物得周世正玉律比之毫釐無差因擊古鍾以律命之亦皆響合兼以七種古物相課皆會又得汲冢竹簡亦長二尺四寸於是施用謂之古尺阮咸聽荀樂聲以為高功非興國之音咸亡後有人掘地得銅尺長荀尺古尺之四分半時人以阮咸之解音遂復施行謂之官尺令司農相承以制五尺并取積寸以作㪷斛也宗元嘉中大將軍彭城王義康製物每欲廣大又加官尺寸半民閒復有相與用之至今謂之為尚方御府都水材官用尺乃復長民一分推如眾例則以古尺為勝鍾律宮商自然嚮會是合神精冥數且周世又二真製劍之時兼荀張窮極精功時又有束晢雷煥之徒妙貫神鬼阮咸雖善音樂而性度縱誕不能清切故以單緩為好耳掘地銅尺猶應是後漢時物也梁天監四年又更校尺以調正鍾律定用張荀古尺半分於事合衷今施用名曰法尺, WYG: ''}
