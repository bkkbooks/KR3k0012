  - {type: variant, offset: 988, length: 558, content: 兩稜如戟杪殺鋒也其柄用長短適令鐶高二寸四分身長二尺四寸則餘一尺二寸六分以為柄鐵因當中央令廣九分厚二分與鐶相連柄操梓材近環圍四寸九分刃圍三寸九分皆以釦竟為正若作劍裝則促扁於此也劍頭可安籙鐶謂發始鍊剛仍使鐶身相連勿別作模合作釘連之都使外形大小厚薄相似乃鑿除應空之內亦可先鑽作數孔鑿為易其伏基處鑿鏝之都畢令大鐶高二寸四分橫分廣處對中徑二寸八分內方員徑四分鐶形古今多法或正圓或狹長或如鼎耳乃有十許皇今此經中所圖亦是顯其左右法耳非正定形也謹准製古今取其合度立圖如右又鐶之內不得正圓如竹亦不得正方如界尺當令內面小方面外落稜角必令得刻己刃字不甚邪轉惟使長三尺九寸耳尺寸度數厚薄形制並備如別圖尋古今尺長短不同九章筭法皆積毫釐之度晉中書監茍勗善音律伎藝常恨八音不調後有人掘地得一玉律銘題周世短晉尺四分半以改定音律聲韻合度今宜用此尺為准所以爾者揔真桐柏並以周時作劍用周尺也籙鐶者鏤刻劍鐶鐶左右面刻之作刃字面有九刃字也鐶背上刻作九己字也深刻字皆從刃背而下順刃謂兩邊刃及己字皆對從刃皆邊起俱下就刃故曰順刃也順環而刻之隨鐶曲轉故曰順鐶也謂刻處得以金銀閒之益分明佳也劍身刻象鐶中央復有豎起如小手鐶者名之曰伏基伏基之義謂為日月之基隱秋光景也內鐶左面為日字內鐶者即小環之中伏基也刻右面為月字先又圓刻日月之外為郭也五百年還出以揮五岳入以藏無閒謂潛靈遁, WYG: 筆}
