  - {type: punctuation, offset: 1987, content: 「, id: KR3k0012_CHANT_666-bkkpn345}
  - {type: variant, offset: 1987, length: 1, content: 晉, WYG: 任敦尚慱昌人}
  - {type: variant, offset: 1988, length: 0, content: '', SBCK: 陵人錢妙眞於茅山鷰口洞得道門人立碑於茅山邵陵王爲觀序今具存焉又曰梁武帝天􅁥二年置大小道正平昌孟景翼字道輔時爲大正屢爲國講說四年建安王偉於座問曰道家經教科禁甚重老子二篇盟誓乃授豈先聖之旨非凢所􅀃耶景翼曰崇祕嚴科正宗妙化理在相成事非乖越又曰劉法先彭城人也時頋歡著道經義於孔德璋多有與奪法先與書討論同異頋道屈服乃荅曰吾自古之遺狂水火不避得足下此箴始覺醒悟旣徃狂言不足在恠又云法先毎見道釋二衆亟相是非乃著息争之論頋歡又作夷夏辯或及三科論明釋老同異又曰張詵呉郡嘉興人也善玄言屢講老子修行上道討論上經人自逺來集也詵尋求眞祕甚識宗尚又曰陳景尚呉人也善講誦道釋中皆不可及制靈書經大行於世梁邵陵王甚重之召景尚隨王之郢終於江夏又曰桓闓字音舒東海丹徒人也梁􅀄崑崙山渚平沙中有三古􅃮笥内有黄素冩于君所出太平經三部村人驚異於經所起静供養先呈陶隱居隱居云此真干君古夲闓將經至都便苦勞瘧諸治不愈陶隱居聞云此病非餘􅂲取經爲咎何不送經還本即依二日送尋愈又曰曹寳字世珎丹陽人善爲歩虚兩京冠絶貴遊見者皆稱賞焉又曰嚴智明字惠識晉陵人也受性有善聲㓜工誦詠聲明帝有疾每引法衆於内殿行道聞智明詠經甚懷賞恱云疾爲之愈及法席旣解智明還外帝中夜不安寢勑呼智明對御轉誦即覺歡又曰徐師子字德威東海人也陳武帝立宗靈大觀引德威爲觀主後卒文皇勑賫祕器葬焉太平經日嚴􅀉之字静處丹陽句容人也爲道士事親至孝住石渚觀母老不敢逺離乃迎母於觀邊立小屋以盡温清母終毀瘠過禮識者嘉之又曰郗愔字方回髙平金郷人爲晉鎭軍將軍心尚道法密自遵行善􅈻書與右軍相埒手自起冩道經將盈百卷于今多有在者又曰張孝秀以王元䂓筆跡妙巧頻相請屈元䂓但翫泉石終日撫琴嘯詠了不執筆臨還止爲行書數行而巳孝秀雅相推憚弗敢固祈今簡寂館長牓猶有筆迹也又曰許思􅀇者許逺遊之弟也生而好道儒雅知名晉簡文帝爲俗外之交也又曰任敦尚愽昌人}
