  - {type: variant, offset: 76, length: 1, content: 康, SBCK: 子曰楚人賣其珠於鄭者爲木蘭之櫝薫以桂椒綴以珠玉飾以玫瑰緝以翡翠鄭人買櫝而還珠未可謂善鬻珠也李尤匱匣銘曰國有都邑家有匣匱貨賄之用我之利器厨魏略曰扈累字}
  - {type: page-break, offset: 76, content: '', id: KR3k0012_SBCK_713-2a}
  - {type: variant, offset: 76, length: 1, content: 康, WYG: 子曰楚人賣其珠於鄭者為木蘭之櫝薫衣桂椒綴以珠玉餙以玟瑰緝以翡翠鄭人買櫝而還珠此未可謂善鬻珠也李尤匱匣銘曰國有都邑家有匣匱貨賄之用我之利器厨魏畧曰扈累字}
  - {type: page-break, offset: 76, content: '', id: KR3k0012_WYG_713-3a, image: WYG0899/WYG0899-0339a.png}
  - {type: variant, offset: 76, length: 1, content: 康, krp: 子曰楚人賣其珠於鄭者爲木蘭之櫝薫以桂椒綴以珠玉飾以玫瑰緝以翡翠鄭人買櫝而還珠未可謂善鬻珠也李尤匱匣銘曰國有都邑家有匣匱貨賄之用我之利器厨魏略曰扈累字}
  - {type: variant, offset: 78, length: 0, content: '', SBCK: 重京兆人常隨青牛先生先生字方正曉知星暦風角鳥情累得其術有婦無子後亦䘮婦獨居道側以塼爲障施一厨牀食􅀫其中晉陽秋曰顧愷之尤好丹青嘗以一厨􅀞􅀉桓玄悉糊題其前玄乃發厨後而取之封題如舊以還之愷之見封題如􅀄但失其􅀞直云妙􅀞通靈變化而去猶人登仙也沈約宋書曰収范曄家樂器服玩並皆珎麗妓妾亦盛飾母住止單陋唯有一厨盛撨薪齊書曰衡陽王鈞母區貴人卒鈞哀毀甚先是貴人花􅁫厨子賜鈞以爲玩弄貴人亡後每歳時及朔望輒開禮再拜鯁咽見者皆爲之悲又曰陸澄當丗稱爲碩學讀易三}
  - {type: page-break, offset: 78, content: '', id: KR3k0012_SBCK_713-2b}
  - {type: variant, offset: 78, length: 0, content: '', WYG: 重京兆人常隨青牛先生先生字正方晩知星厯風角鳥情累得其術有婦無子後亦喪婦獨居道側以塼為障施一厨牀食宿其中晉陽秋曰顧愷之尤好丹青嘗以一厨畫寄桓𤣥悉糊題其前𤣥乃發厨後而取之封題如舊以還之愷之見封題如初但失其畫直云妙畫通靈變化而去猶人登仙也沈約宋書曰収范曄家樂器服玩並皆珍麗妓妾亦盛餙母住止單陋唯有一厨盛樵薪齊書曰衡陽王鈞母區貴人卒鈞哀毁甚先是貴人花釵厨子鈞以為玩弄貴人亡後每嵗時及朔望輒開禮再拜鯁咽見者皆為之悲又曰陸澄當世稱為碩學讀易三}
  - {type: page-break, offset: 78, content: '', id: KR3k0012_WYG_713-3b, image: WYG0899/WYG0899-0339b.png}
  - {type: variant, offset: 78, length: 0, content: '', krp: 重京兆人常隨青牛先生先生字方正曉知星暦風角鳥情累得其術有婦無子後亦䘮婦獨居道側以塼爲障施一厨牀食宿其中晉陽秋曰顧愷之尤好丹青嘗以一厨畫寄桓玄悉糊題其前玄乃發厨後而取之封題如舊以還之愷之見封題如𥘉但失其畫直云妙畫通靈變化而去猶人登仙也沈約宋書曰収范曄家樂器服玩並皆珎麗妓妾亦盛飾母住止單陋唯有一厨盛撨薪齊書曰衡陽王鈞母區貴人卒鈞哀毀甚先是貴人花釵厨子賜鈞以爲玩弄貴人亡後每歳時及朔望輒開禮再拜鯁咽見者皆爲之悲又曰陸澄當丗稱爲碩學讀易三}
