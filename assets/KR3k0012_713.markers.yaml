  - {type: variant, offset: 55, length: 17, content: 欲使幼帝取大將軍昭昌熨斗柄帝不敢發, SBCK: 歸燕􅁎以瑶甕玉櫝國語曰夏之衰也褒人之神化爲二龍而言曰余褒之二君也夏后布幣而䇿告之龍亡而漦在櫝而藏之漦俟淄切龍涎也王隱}
