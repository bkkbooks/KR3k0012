  - {type: variant, offset: 75, length: 0, content: '', SBCK: 甘卓家金匱鳴聲似槌鏡清而悲師言金匱將離是以悲鳴尋而卓下將軍周慮等承望敦意害卓唐書曰王伾下劣闒茸不能如叔父有大志唯務金帛寳玩爲無門大櫃上開一孔使足以受物夫妻寢止其上}
  - {type: variant, offset: 75, length: 0, content: '', WYG: 甘卓家金匱鳴聲似搥鏡清而悲師言金匱將離是以悲鳴尋而將軍周憲等承望敦意害卓唐書曰王伾下劣闒茸不能如叔父有大志唯務金帛寳玩為無門大櫃上開一孔使足以受物夫妻寢止其上}
