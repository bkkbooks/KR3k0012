  - {type: variant, offset: 560, length: 297, content: 合繩一枚長二丈五尺又曰皇太子納妃有金澡灌二枚西域諸國志曰月支國有佛澡灌受二升許青石名羅勒色碧玉班白受水無定隨其多少惠遠法師澡灌銘序曰得摩羅偷石澡灌一枚故以此銘荅之伏虎周禮天官曰大尉掌王燕衣服凡褻器鄭司農云褻器溺器虎子也春秋後語曰智伯圍趙襄子於晉陽襄子大敗智伯軍殺智伯漆其頭以為飲器穢器虎子也史記曰凶奴破月氏王以其頭為飲器魏略曰蘇則為侍中舊侍中親省起居故俗因謂執虎子始蘇則同隱吉茂後見嘲之曰仕宦不己執虎子錄異傳曰吳時嘉興倪彥思忽有鬼魅其家能與人語飲食如人唯不見形思乃延道士逐之酒肴既設道士便擊鼓召請諸神魅乃取伏虎於神坐吹作角聲以亂音頃道士忽覺背中冷驚起解衣乃伏虎也馬融遺令曰穿中不得下銅虎況它銅物, SBCK: ''}
