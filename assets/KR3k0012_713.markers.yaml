  - {type: variant, offset: 14, length: 1, content: 熨, SBCK: 孔子謂冉求曰虎兕出於匣拾遺録曰含塗國人善服鳥獸雞犬皆使之能言雞犬牛豕死者以玉爲匣埋海上其主遊戲海上於地中聞犬豕雞之聲主者猶識掘而取之還養如昔焉唯毛羽秃落乆更恱弈魏武}
