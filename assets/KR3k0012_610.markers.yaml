  - {type: variant, offset: 3965, length: 3, content: 宋璟嘗, SBCK: 魏徴因炎所修更加整比兼爲之注先朝雖厚加賞錫其書竟亦不行今行冲等奉詔修撰勒成一家然與先儒義乖章句隔絶􅀂欲行用竊恐未可上然其奏遂不得立學行冲意諸儒排巳退著論以}
  - {type: variant, offset: 3965, length: 3, content: 宋璟嘗, krp: 魏徴因炎所修更加整比兼爲之注先朝雖厚加賞錫其書竟亦不行今行冲等奉詔修撰勒成一家然與先儒義乖章句隔絶若欲行用竊恐未可上然其奏遂不得立學行冲意諸儒排巳退著論以}
  - {type: variant, offset: 3969, length: 1, content: 寫, SBCK: 釋春秋杜預序云春秋者魯史記之名也楚謂之檮杌晉謂之乗而魯謂之春秋其實一也釋名曰言春秋冬夏終以成歳舉春秋則冬夏可知也春秋正義曰孔子授春秋於卜啇卜啇又授之弟子公羊髙􅂖梁赤又各爲之傳則今公羊􅂖梁二傳是也左氏傳有賈逵訓服䖍杜預注公羊傳有何休解詁􅂖梁有范寗集解春秋握成圖曰孔子作春秋陳天人之際記異考符春秋演孔圖曰作法五經連之天地稽之圖象質於三王施之四海史記太史公曰先人有言自周公卒五百歳而有孔子孔子卒後至於今五百歳有能紹明丗正易傳繼春秋本詩書禮樂之際意在斯乎意在斯乎小子何敢讓耶上大夫壷遂曰昔孔子何爲而作春秋哉太史公曰余聞董生曰周道衰廢孔子爲魯司㓂諸侯害之大夫壅之孔子知言之不用道之不行也是非二百四十二年之中以爲天下儀表貶天子退諸侯討大夫以逹王事而巳矣子曰我欲載之空言不如見之於行事之深切著明也夫春秋上明三王之道下辯人事之紀別嫌疑明是非定猶豫善善惡惡賢賢賤不肖存亡國繼絶丗􅀘敝起廢王道之大者也撥亂丗反之正莫近於春秋春秋文成數萬其指數千萬物之散聚皆在春秋春秋之中弑君三十六亡國五十二諸侯奔走不得保其社稷者不可勝數察其所以皆失其本巳故易曰失之毫釐差以千里故曰臣弑君子弑父非一朝一夕之故也其漸乆矣故有國者不可以不知春秋前有䜛而不見後有賊而不知爲人臣者不可以不知春秋守經事而不知其冝遭變事而不知其權爲人君父而不通於春秋之義者必蒙首惡之名爲人臣子而不通於春秋之義者必䧟篡弑之誅死罪之名其實皆以爲善爲之不知其義􅀍之空言而不敢亂夫不通禮義之指至於君不君臣不臣父不父子不子夫君不君則犯臣不臣則誅父不父則無道子不子則不孝此四行者天下之大過也以天下之大過予之則受而不敢辭故春秋者禮義之大宗也漢書蓺文志曰古之王者丗有史官君舉必書所以慎言行昭法式也左史記言右史記事其事爲春秋言爲}
