  - {type: punctuation, offset: 3970, content: 《, id: KR3k0012_CHANT_610-bkkpn1510}
  - {type: punctuation, offset: 3972, content: ‧, id: KR3k0012_CHANT_610-bkkpn1511}
  - {type: variant, offset: 3972, length: 0, content: '', SBCK: 帝王靡不同之周室旣微載籍殘缺仲尼思存前聖之業魯周公之國禮文備物史官有法故與左丘明觀其史記據行事仍人道因興以立功就敗以成罰假日月以定曆數籍朝聘以正禮樂有所褒諱貶損不可書見口授弟子退而異言丘明恐失其真故論本意而作傳明夫子不以空言也又云劉歆爲左傳學以左氏丘明好惡與聖人同親見夫子而公羊􅂖梁在七十之後傳聞與親見其詳略不同甞共父向校書父爲糓梁學數以難其父向向不能報也漢書曰春秋所貶損當時有威權者是以隱其書而不宣及末丗口􅀃流行故有公糓鄒夾之傳四家之中公羊􅂖梁立於學官東觀漢記曰張霸字伯饒以樊鯈刪嚴氏春秋猶多䌓辭乃減爲二十萬言更名張氏學鄭􅀇別傳曰何休字邵公作公羊解注妙得公羊本意作公羊墨守左氏膏肓􅂖梁廢疾􅀇後乃發墨守鍼膏肓起廢疾休見而歎曰康成入吾室操吾矛以伐我乎魏略曰魚豢甞問魏禧左氏傳禧曰左氏相斫書耳不足精意也又曰嚴翰字公仲善於春秋公羊時司􅀠鍾繇不好公羊而好左氏以左氏爲太官厨公羊爲賣餅家故甞數與辯折長短繇機捷善持論而翰訥口時屈}
