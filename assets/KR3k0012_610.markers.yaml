  - {type: variant, offset: 3964, length: 0, content: '', SBCK: 十四年上令太子賔客元行冲撰􅀋禮義䟽將立學官䟽成右相張􅀃駮奏曰今之禮記是前漢戴德戴聖所編録歴代傳習巳向千年著爲經教不可刋削至魏孫炎始改舊本以􅀋相比有同抄書先儒所非竟不行用貞觀}
  - {type: variant, offset: 3964, length: 0, content: '', krp: 十四年上令太子賔客元行冲撰類禮義䟽將立學官䟽成右相張說駮奏曰今之禮記是前漢戴德戴聖所編録歴代傳習巳向千年著爲經教不可刋削至魏孫炎始改舊本以類相比有同抄書先儒所非竟不行用貞觀}
