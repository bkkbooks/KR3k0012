  - {type: variant, offset: 3772, length: 0, content: '', SBCK: 九}
  - {type: variant, offset: 3772, length: 377, content: 篇漢世行之漢書曰元帝時豫章內史枚頤奏上孔傳古文尚書亡舜典一篇乃取王肅注堯典慎徽五典下分為舜典一篇以續之後漢書杜林傳曰河南鄭興東海衛宏皆長於古學林嘗言林得興固諧矣使宏得林且有以益之及宏見林闇然而服濟南徐巡始師於宏後更從林學林前於西州得漆書古文尚書一卷常寶愛之雖遭艱困握持不離身嘗以示衛宏曰林流離兵亂常恐斯經將絕何意東海衛子濟南徐生復能傳之是道竟不墜於地也宏巡益重之於是古文遂行唐書曰開元中宋璟嘗自寫尚書無逸一篇以獻玄宗置之內殿出入觀省成誦在心每歎古人至言後代莫能及故任賢誡慾朝夕孜孜開元之末因無逸圖壞始以山水圖代之及穆宗問宰臣貞觀開元之理崔植因以是對請復以無逸為誡帝深善其言又曰高郢子定幼聰警絕倫年七歲時讀尚書湯誓問郢曰奈何以臣伐君郢曰應天順人不為非道又問曰用命賞于祖不用命戮于社是順人乎父不能對已見幼敏門又曰文宗纂集尚書中君臣事跡命工圖寫於太液亭朝夕觀覽, WYG: ''}
  - {type: variant, offset: 3772, length: 0, content: '', krp: 九}
