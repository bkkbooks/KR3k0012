  - {type: variant, offset: 4064, length: 9, content: 幼聰警絕倫年七歲時, SBCK: 䇿功不忍廢而隂踈之譯乃隂呼道士章醮以祈福助其婢奏譯猒蠱左道上謂譯曰我不􅀒公此何意也譯無以對後憲司劾以不孝由是除名下詔曰譯嘉謀良䇿寂尓無聞鬻獄賣官沸騰盈耳􅀂留之於丗在人爲不道之臣戮之於朝入地爲不孝子􅀑有累幽顯無以置之冝賜以孝經令其熟}
