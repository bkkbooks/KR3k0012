  - {type: variant, offset: 1593, length: 241, content: 心為志發言為詩漢書曰通其言謂之詩左傳襄十六年曰晉侯與諸侯宴于溫使諸大夫舞曰歌詩必類歌古詩當使各從義類齊高厚之詩不類齊有二心故荀偃怒且曰諸侯有異志矣使諸大夫盟高厚高厚逃歸齊為大國高厚若此小國必當有從者又襄二十七年曰鄭伯享趙孟于垂隴子展伯有子西子產大叔二子石從二子石印段公孫段趙孟曰七子從君以寵武也請皆賦以卒君貺武亦觀七子之志子展賦草蟲草蟲召南詩曰未見君子憂心忡忡比趙孟為君子趙孟曰善哉民之主也抑武也不足以當之伯有賦鶉之賁賁賁賁鄘詩曰人之無良我以為兄我以為君趙孟曰床第之言不踰閾國況在野, WYG: 斯}
