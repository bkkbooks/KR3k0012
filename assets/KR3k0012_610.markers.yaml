  - {type: variant, offset: 3973, length: 1, content: 逸, SBCK: 以應繇曰公羊髙竟爲丘明服矣翰曰直故吏爲明公服尓公羊未肯也蜀志曰孟光字孝􅁉洛陽人􅀶物識古無書不覽尤銳意三長史於漢家舊典好公羊春秋而譏訶左氏毎與來敏争此二義常譊譊讙咋讙許􅀽切咋音俎格切晉書曰王濟解相馬又甚愛之而和嶠頗聚歛預甞稱濟有馬癖嶠有錢癖武帝聞謂曰卿有何癖對曰臣有左傳癖王隱晉書曰劉兆字延丗以春秋}
