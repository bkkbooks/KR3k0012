  - {type: variant, offset: 688, length: 799, content: 費氏之學漢書蓺文志曰虙犧氏仰觀象於天俯觀法於地觀鳥獸之文與地之宜近取諸身遠取諸物於是始作八卦以通神明之德以類萬物之情文王於是重易六爻作上下篇孔氏為之彖象繫辭文言序卦之屬十篇故曰易道深矣人更三聖韋昭曰伏犧文王孔子也世歷三古易繫辭曰易之興其於中古乎然則伏犧為上古文王為中古孔子為下古也及秦燔書而筮卜之事傳者不絕漢書曰京房學易於焦延壽常曰得我道以亡身者京生也東觀漢記曰任丹傳孟氏易作通論七卷世傳之號曰任君通論後漢書曰孔融荅虞仲翔書曰示所著易傳自商翟以來舛錯多矣去聖彌遠眾說騁辭曩聞延陵之理樂今覩吾君之治易知東南之美者非但會稽之竹箭焉又觀象雲物察應寒溫原本禍福與神會契可謂探賾窮道者也晉書曰王湛字處仲司徒渾之弟也初有隱德人莫能知兄弟宗族皆以為癡其父永獨異焉兄子濟每輕之嘗詣湛見床頭有周易問曰叔父何用此為湛曰體中不佳時復看耳濟請言之湛因剖折玄理微妙有奇趣皆濟所未聞也濟遂留連彌日累夜自視缺然乃歎曰家有名士三十年而不知濟之罪也北齊書曰權會本貧生無僕隸初任助教之日恒乘驢上下且職事處多每須經歷及其退食非晚不歸曾夜出城東門鍾漏已盡會唯獨乘驢忽有二人牽頭一人隨後有異生人漸漸失路不由本道會心甚怪之遂誦易經上篇一卷不盡前後二人忽然離散齊書曰張緒長於周易言精理奧見宗一時常云何平叔所不解易中七事梁書曰伏曼容字公儀平昌安丘人少篤學善考易倜儻好大言常曰何晏疑易中九事以吾觀之晏了不學也唐書曰文宗時裴通自祭酒改詹事因中謝上知通有易學因訪以精義仍命進所習經本著易玄解并揔論二十卷易禦寇十三卷易洗心二十卷世說曰殷荊州仲堪曾問遠公云易以何為體荅曰易以感為體曰銅山西崩靈鍾東應便是易也淮南子曰孔子讀易至於損益未嘗不喟然而歎曰或欲利之適足以害之或欲害之適足以利之利害禍福之門不可不察劉向別傳曰所校讎中易傳淮南九師道訓除復重定著二篇淮南王聘善為者九人從之採獲故中書署曰淮南九師書王叔師正部曰易與春秋同經綜一機之織經營天道以成人事金樓子曰按, SBCK: ''}
