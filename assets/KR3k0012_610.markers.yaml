  - {type: variant, offset: 4060, length: 2, content: 高郢, SBCK: 杜預大觀群典謂公羊糓梁詭辯之言又非先儒􅀃左氏未究丘明意而横以二傳亂之乃錯綜微言著春秋左氏經傳集解又叅考衆家謂之釋例又作盟㑹圖春秋長暦備成一家之學至老乃成祕書􅁥摰虞賞之曰左丘明本爲春秋作傳而傳遂自􅀌行釋例本爲傳設而所發明何但左傳故亦􅀌行也三國典略曰張曜好讀春秋每月一遍時人比之賈梁道趙隱甞謂曜曰君研㝷左氏豈求服䖍杜預之紕繆耶曜曰何爲其然乎左氏之書備叙言事惡者可以自戒善者可以庻幾故厲巳温習非欲詆訶古人之得失也梁書曰崔靈恩清河東武城人也少篤學遍習五經尤精三禮傳仕魏爲太常􅀶士天􅁥十三年歸梁累遷歩兵校尉兼國}
  - {type: variant, offset: 4060, length: 2, content: 高郢, krp: 杜預大觀群典謂公羊糓梁詭辯之言又非先儒說左氏未究丘明意而横以二傳亂之乃錯綜微言著春秋左氏經傳集解又叅考衆家謂之釋例又作盟㑹圖春秋長暦備成一家之學至老乃成祕書監摰虞賞之曰左丘明本爲春秋作傳而傳遂自孤行釋例本爲傳設而所發明何但左傳故亦孤行也三國典略曰張曜好讀春秋每月一遍時人比之賈梁道趙隱甞謂曜曰君研㝷左氏豈求服䖍杜預之紕繆耶曜曰何爲其然乎左氏之書備叙言事惡者可以自戒善者可以庻幾故厲巳温習非欲詆訶古人之得失也梁書曰崔靈恩清河東武城人也少篤學遍習五經尤精三禮傳仕魏爲太常博士天監十三年歸梁累遷歩兵校尉兼國}
  - {type: variant, offset: 4063, length: 0, content: '', SBCK: 􅀶士靈恩聚徒講授聽者常數百人性拙朴無風采及解析經理甚有精致都下舊儒咸稱重之助教孔僉尤好其學靈恩先習左傳服解不爲江東所行乃改􅀃杜義每文句常申服以難杜遂著左氏條義以明之時助教虞僧誕又精杜學因作申杜難服以荅靈恩丗並傳之顔延之庭誥曰褒貶之書取其正言晦義輔制衰王春秋爲上三輔决録曰賈逵建􅀄元年受詔列春秋公羊糓梁不如左氏四十事奏之名左氏長義帝大善賜布五百疋又魏略曰逵好左傳及爲牧守常課之月一遍桓譚新論曰左氏傳丗後百餘年魯􅂖梁赤爲春秋殘略多有遺失又有齊人公羊髙縁經文作傳弥離其本事矣左氏經之與傳猶衣之表裏相持而成經而無傳使聖人閉門思之十年不能知也又曰劉子政子駿伯玉三人尤珎重左氏下至婦女無不讀論者江表傳曰􅀜羽好左氏略諷皆上口孝經孝經序曰吾志在春秋行在孝經是知孝者德之本歟春秋􅀃題辭曰孝經者所以明君父之尊人道之素天地開闢皆有孝人非父不生非母不長天地􅀜闢而生人承天地是故親生膝下以養父母孝經鈎命決曰孝經者篇題就號也所以表指括意序中書名出義見道曰著就成也孝爲一篇之目十八章也成號序中心之事使孝義見於外一字苞十八章爲天地喉􅁭道要德本故挺以題符篇冠就又曰曽子撰斯問曰孝文乎駮不同何撰撰經異同也子曰吾作孝經以素王無爵禄之賞斧鉞之誅故稱避席復坐吾語汝遜順以避禍災與先王以託權託先以爲巳權勢力目至德要道以題行題行題天子德行致群瑞巳行所及也首仲尼以立情性情性猶天地巳不正爲天地子故行冠子以立之也言子曰以開號􅀂夫子所以自開於受命也列曽子示撰輔使若得録圖之故行冠子以立之也佐與共治天下也矣書詩以合謀二人同心其利斷金同心之言其􅆨如蘭也孝經中契曰丘作孝經文成道立齋以白天則􅀇雲踊北紫宫開北門角元星北落司命天使書題號孝經篇云神星􆄠孔丘知元今使陽衢乗紫麟下告地主要道之君後年麟至口吐圖文北落郎服書魯端門隱形不見子夏往觀冩得十七字餘字滅消文其餘飛爲赤烏翔摩青雲漢書蓺文志曰孝經者孔子爲曽子陳孝道也夫孝天之經也地之義也民之行也舉大者言故曰孝經後漢書曰向栩字輔興張角之亂栩上便冝頗譏刺左右不欲國家興兵但遣人於河上北向讀孝經賊自當消滅中常侍張讀奏栩不欲命將出師疑與角同欲爲内應收送黃門北寺獄殺之謝承後漢書曰仇覽字李智一名香陳留考城人也爲縣陽逐亭長有羊元者凶惡不孝其母詣覽告之覽呼元責哨元以子道與孝經一卷使誦讀之元深改悔至母前謝罪曰元少􅀌爲母所諺曰􅀌犢觸乳驕子詈母乞今自改卒成佳士王隱晉書曰皇甫謐督終論曰氣絶之後以蘧蒢褁屍擇不毛之地葬焉皆無以自隨唯賫孝經一卷示不忘孝道也吴均齊春秋曰沈士字雲楨臨終遺命曰棺中依皇甫謐用孝經旣殯不須立靈士安亦然也齊書曰顧懽字景怡有病邪者問懽曰家有何書荅曰唯有孝經懽曰可取仲尼居置病人枕邊恭敬之自差也病者果愈後人問其故荅曰善禳惡正勝邪此病者所以差也蕭方等三十六國春秋曰漢大將軍東平王約漢王聦戲之曰汝誦何書味何句也約曰臣誦孝經每詠身體髪膚受之父母不敢毀傷至於在上不驕髙而不危未甞不反覆誦之聦大恱後周書曰宇文貴字乾福少聦敏渉獵經史尤便􅀐射始讀孝經便謂人曰讀此一經足爲身之本三國典略曰徐陵子份陵甞遇疾甚篤份燒香泣涕跪誦孝經晝夜不息如此者三陵疾豁然而愈隋書曰鄭譯性輕髙祖以其}
