  - {type: variant, offset: 4085, length: 2, content: 伐君, SBCK: 願以此言奉獻上甚恱引智及學士儒官並賚以繒帛漢實録曰敏使於湖南途出江陵帥髙從誨爲䞇是時諌曰􅀕酒惠及經書從誨所識不過孝經十八章尓敏曰讀書不在多至德要道十八章足矣敏記諸侯章云在上不驕髙而不危制節謹度滿而不溢此一章皆經要言也時從誨兵敗於}
