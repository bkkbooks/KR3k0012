  - {type: variant, offset: 1270, length: 5, content: 文宗時裴通, WYG: 開元十四年上令太子賓客元行沖撰類禮義疏將立學官疏成左相張説駁奏曰今之禮記是前漢戴徳戴聖所編録厯代傳習已向千年著為經教不可刋削至魏孫炎始改舊本以類相比有同抄書先儒所非竟不行用貞觀中魏徵因炎所修更加整比兼為之注先朝雖厚加賞錫其書亦不行今行沖等奉詔修撰勒成一家然與先儒義乖章句隔絶若欲行用竊恐未可上然其奏遂不得立學行沖意諸儒排己退著論以}
