  - {type: variant, offset: 3220, length: 343, content: 典釋文曰孔子最先刪詩以授於子夏子夏遂作序焉口以相傳未有章句劉歆七略曰詩以言情情者信之符也書以決斷斷者義之證也書釋名曰書者言書其時事也漢蓺文志曰書以廣聽莊子曰書以道事顧子曰儀訓云三墳五典粲粲如列宿落落如連珠也春秋說題辭曰尚書者二帝之跡三王之義所以推其運明命授之際書之言信而明天地之精帝王之功凡百二篇第次委曲尚者上也上帝之書也尚書正義曰上世帝王之遺書有三墳五典訓誥誓命孔子刪而序之斷自唐虞以下訖于周凡百篇以其上古之書故曰尚書遭秦滅學並亡漢興濟南人伏勝能口誦二十九篇至漢文帝時立尚書學以勝年且九十餘老不能行迺詔太常掌故晁錯就其家傳受之其書四十一篇歐陽大小夏侯傳其學各有能名是曰今文尚書劉向五行傳蔡邕勒石經皆其本其後魯共王壞孔子故宅於壁中得古文尚書論語悉以書還孔氏武帝乃詔孔安國定其書作傳又為五, WYG: ''}
