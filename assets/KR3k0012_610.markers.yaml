  - {type: variant, offset: 3025, length: 194, content: 肖而觀盛衰也又曰哀樂之心感而歌詠之聲發誦其言謂之詩詠其聲謂之歌古有採詩之官王者所以觀風俗知得失自考正也遭秦而全者以其諷誦不獨在竹帛也晉書曰王褒字偉元性好讀詩至於哀哀父母生我劬勞未嘗不三復流涕門人弟子受業者皆廢蓼莪之篇又曰王凝之妻謝氏字道韞將軍弈之女也聰識有才辯叔父安嘗問毛詩何句最佳荅曰吉甫作頌穆如清風仲山甫永懷以慰其心安謂其雅人深致顏延之庭誥曰詠歌之書取其連類含章比物集句詩為之祖陸德明, WYG: 過孝}
