  - {type: variant, offset: 2227, length: 1203, content: 行天下將皆必有車轍馬跡焉祭公謀父作祈招之詩以止王謀父周卿士祈父周司馬掌甲兵之職招其名也祭公方諫遊行故指司馬官而言也此詩逸王是以獲沒於祗宮獲沒不見篡臣問其詩而不知若問遠焉能知乎王曰子能乎對曰能其詩曰祈招之愔愔式昭德音愔愔安和皃也式用也思我王度式如玉式如金金玉取其堅重形民之力而無醉飽之心言園之用人當隨其力往往如金治之器而制形故言形民之力去其醉飽過盈之也王揖而入饋不食寢不寐數日深感子革之言論語孔子曰小子何莫學夫詩詩可以興可以觀可以群可以怨邇之事父遠之事君多識於鳥獸草木之名又曰孔子謂伯魚曰汝為周南召南矣乎人而不為周南召南其猶正墻面而立也歟又子曰起子者商也商子夏始可與言詩已矣又曰詩三百一言以蔽之曰思無邪莊子曰詩以道志毛詩正義曰昔孔子刪古詩三千餘篇上取諸商下取諸魯皆絃歌以合韶武之音凡三百一十一篇至秦滅學亡六篇今在者有三百五篇正義云初孔子授訓卜商商為之序以授魯人曾申申授魏人李克克授魯人孟仲子仲子授振牟子振牟子授趙人荀卿荀卿授漢人魯國毛享作詁訓傳以授於趙國毛萇時人謂享為大毛公萇為小毛公以其所傳故名其詩曰毛詩又曰東漢鄭玄取毛氏詁訓所不盡及同異者續為之注解謂曰箋箋薦也言薦成毛意也詩含神霧曰集微揆著上統元皇下序四始羅列五際宋均注曰集微揆著若綿綿瓜瓞人之初生揆其如是必將至著王有天下也又曰詩者天地之心君德之祖百福之宗萬物之戶也詩推度災曰建四始五際而八節通卯酉之際為革政午亥之際為革命春秋演孔圖曰詩含五際六情六情即六義也一曰風二曰賦三曰比四曰興五曰雅六曰頌春秋說題辭曰詩者天文之精星辰之度又曰在事為詩未發為謀恬澹為心思慮為志故詩之為言志也史記曰古詩三千餘篇孔子刪取三百五篇皆絃歌以合昭武之音然雅音之韻四言為主其餘非音之正也漢書曰匡衡字稚圭好學家貧傭作以給資用尤精力絕人諸儒為之語曰無說詩匡鼎來應劭曰鼎方也張晏曰匡衡少時字鼎匡說詩解人賾又藝文志曰古諸侯卿大夫交鄰國之微言相感當揖讓之時必稱詩以喻其志蓋以別賢不肖而觀盛衰也又曰哀樂之心感而歌詠之聲發誦其言謂之詩詠其聲謂之歌古有採詩之官王者所以觀風俗知得失自考正也遭秦而全者以其諷誦不獨在竹帛也晉書曰王褒字偉元性好讀詩至於哀哀父母生我劬勞未嘗不三復流涕門人弟子受業者皆廢蓼莪之篇又曰王凝之妻謝氏字道韞將軍弈之女也聰識有才辯叔父安嘗問毛詩何句最佳荅曰吉甫作頌穆如清風仲山甫永懷以慰其心安謂其雅人深致顏延之庭誥曰詠歌之書取其連類含章比物集句詩為之祖陸德明經典釋文曰孔子最先刪詩以授於子夏子夏遂作序焉口以相傳未有章句劉歆七略曰詩以言情情者信之符也書以決斷斷者義之證也書釋名曰書者言書其時事也漢蓺文志曰書以廣聽莊子曰書以道事顧子曰儀訓云三墳五典粲粲如列宿落落如連珠也春秋說題辭曰尚書者二帝之跡三王之義所以推其運明命授之際書之言信而明天地之精帝王之功凡百二篇第次委曲尚者上也上帝之書也尚書正義曰上世帝王之遺書有三墳五典訓誥誓命孔子刪而序之斷自唐虞以下訖于周凡百篇以其上古之書故曰尚書, SBCK: 禮}
