  - {type: variant, offset: 1530, length: 695, content: 記曰我欲觀殷道得坤乾焉今歸藏先以坤後乾則知是殷明矣推歸藏既在殷制連山理是夏書詩卜商詩序曰詩者志之所之也情動於中而形於言也又曰在心為志發言為詩漢書曰通其言謂之詩左傳襄十六年曰晉侯與諸侯宴于溫使諸大夫舞曰歌詩必類歌古詩當使各從義類齊高厚之詩不類齊有二心故荀偃怒且曰諸侯有異志矣使諸大夫盟高厚高厚逃歸齊為大國高厚若此小國必當有從者又襄二十七年曰鄭伯享趙孟于垂隴子展伯有子西子產大叔二子石從二子石印段公孫段趙孟曰七子從君以寵武也請皆賦以卒君貺武亦觀七子之志子展賦草蟲草蟲召南詩曰未見君子憂心忡忡比趙孟為君子趙孟曰善哉民之主也抑武也不足以當之伯有賦鶉之賁賁賁賁鄘詩曰人之無良我以為兄我以為君趙孟曰床第之言不踰閾國況在野乎非使人之所得聞也子西賦黍苗之四章黍苗小雅曰肅肅謝功召伯營之列列征師召伯成之比趙孟於召伯趙孟曰寡君在武何能焉子產賦隰桑隰桑詩義取思見君子盡心以事之趙孟曰武請受其卒章卒章曰心乎愛矣遐不謂矣中心藏之何日忘之趙孟欲子產之見規誨子太叔賦野有蔓草野有蔓草詩鄭風取其邂逅相遇適我願兮趙孟曰吾之惠也太叔喜於相遇故趙孟愛其惠印段賦蟋蟀蟋蟀詩唐風曰無以太康職思其居好樂無荒良士瞿瞿言瞿瞿然顧禮儀之所趙孟曰善哉保家之主也吾有望矣公孫段賦桑扈桑扈詩小雅義取君子有禮文故能受天之祐趙孟曰匪交匪敖福將焉往若保是言也欲辭福祿得乎卒享文子告叔向曰伯有將為戮矣詩以言志志誣其上而公怨之以為賓榮言誣則鄭伯未有其實趙倡賦詩以自寵其能久乎幸而後亡言必先亡叔向曰然已侈所謂不及五稔者夫子之謂矣又曰楚靈王與子革語左史倚相趍過倚相楚史名也王曰是良史也子善視之是能讀三墳五典八索九丘皆古書名對曰臣嘗問焉昔穆王欲肆其心周穆王也肆極, SBCK: ''}
