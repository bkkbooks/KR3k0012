  - {type: variant, offset: 2995, length: 0, content: '', WYG: 之王者世有史官君舉必書所以慎言行昭法式也左史記言右史記事其事為春秋言為尚書帝王靡不同之周室既微載籍殘闕仲尼思存前聖之業以魯周公之國禮文備物史官有法故與左丘明觀其史記據行事仍人道因興以立功就敗以成罰假日月以定厯數藉朝聘以正禮樂有所褒諱貶損不可書見口授弟子退而異言丘明恐失其真故論本意而作傳明夫子不以空言説經也晉書曰杜預大觀羣典謂公羊榖梁詭辯之言又非先儒説左氏未究丘明意而横以二傳亂之乃錯綜微言著春秋長厯備成一家之學至老乃成秘書監摰虞賞之曰左丘明本為春秋作傳而傳遂自孤行釋例本為傳設而所發明何但左傳故亦孤行也三國典畧曰張曜好讀春秋每月一遍時人比之賈梁道趙隱嘗謂曜曰君研尋左氏豈求服䖍杜預之紕繆耶曜曰何為其然乎左氏之書備序言事惡者可以自戒善者可以庶幾故厲己温習非欲詆訶古人之得失也梁書曰崔靈恩清河東武城人也少篤學遍習五經尤精三禮三傳仕魏為太常博士天監十三年歸梁累遷歩兵校尉兼國子博士靈恩聚徒講授聽者常數百人性拙朴無風采及解經析理甚有精致都下舊儒咸稱重之助教孔僉尤好其學靈恩先習左傳服解不為江東所行乃解説杜義每文句常申服以難杜遂著左氏條義以明之時助教虞僧誕又精杜學因作申杜難服以荅靈恩世並傳之顔延之庭誥曰褒貶之書取其正言晦義輔制衰王春秋為上三輔决録曰賈逵建初元年受詔列春秋公羊榖梁不如左氏四十事春秋傳左氏為長帝大善賜布五百疋又魏畧曰逵好學左傳及為牧守常課之月一遍桓譚新論曰左氏傳世後百餘年魯榖梁赤為春秋殘畧多所遺失又有齊公羊髙縁經文作傳彌離其本事矣左氏經之與傳猶衣之表裏相持而成經而無傳使聖人閉門思之十年不能知也又曰劉子政子駿伯王三人尤珍重左氏下至婦女無不讀誦者江表傳曰闗公好左氏畧諷皆上口孝經孝經序曰吾志在春秋行在孝經是知孝者徳之本歟春秋説題辭曰孝經者所以明君父之尊人道之素天地開闢皆在孝人非父不生非母不長天地開闢而生人承天地是故親生膝下以養父母孝經鈎命决曰孝經者篇題就號也所以表指括意序中書名出義見道曰著就成也孝為一篇之目十八章也成號序忠之事使孝義見於外一字苞十八章為天地喉襟道要徳本故挺以題符篇冠就又曰曾子撰斯問曰孝文乎駮不同何撰撰經異同也子曰吾作孝經以素王無爵之賞斧鉞之誅故稱辟席復坐吾語汝順孫以避禍災與先王以託權託先王以為己權勢力首至徳要道以題行題行題天子徳行致羣瑞己行所及也首仲尼以立情性情性猶天地己不正為天地子故行冠子以立之也首子曰以開號若夫子所以自開於受命也列魯子示撰輔使若得録圖之故行冠子以立之也佐與共治天下也矣詩書以合謀二人同心其利斷金同心之言其臭如蘭也孝經中契曰孔著孝經文成道立齊以白天則𤣥靈踊北紫宫開北門角元星北落司命天使書題號孝經篇云神星裳孔子知元命使陽衢乗紫麟下告地主要道之君後年麟至口吐圖文北落郎服書魯端門隱形不見子夏往觀寫得十七餘字滅消文其餘飛為赤烏翔摩青雲漢書藝文志曰孝經者孔子為曾子陳孝道也夫孝天之經地之義也民之行也舉大者言故曰孝經後漢書曰向栩字甫興張角之亂栩上便宜頗譏刺左右不欲國家興兵但遣人於河上北向讀孝經賊自當消滅中常侍張讀奏栩不欲命將出師疑與角圖欲為内應收送黄門北寺獄殺之謝承後漢書曰仇覽字季智一名香陳留考城人也為縣陽遂亭長有陳元者凶惡不孝其母詣覽告之覽呼元誚責元以子道與孝經一卷使誦讀之元深改悔至母前謝罪曰少孤為母所驕諺曰孤犢觸乳驕子詈母乞今自改卒成佳士王隱晉書曰皇甫謐篤終論曰氣絶之後以蘧蒢裹屍擇不毛之地葬焉無以物自隨唯齎孝經一卷示不忘孝道也吳均齊春秋曰沈麟士字雲禎臨終遺命曰棺中依皇甫謐用孝經既殯不須立靈座士安亦然也南史曰顧歡字景怡有病邪者問歡歡曰家有何書答曰唯有孝經歡曰可取仲尼居置病人枕邊恭敬之自瘥也病者果愈後人問其故歡曰善禳惡正勝邪此病者所以瘥也蕭方等三十六國春秋曰漢大將軍東平王約漢王聰戲之曰汝誦何書味何句也約曰臣誦孝經每詠身體髮膚受之父母不敢毁傷至於在上不驕髙而不危未嘗不反覆誦之聰大悦後周書曰宇文貴字乾福少聰敏渉獵經史尤便騎射始讀孝經便謂人曰讀此一經足為身之本三國典畧曰徐陵子份陵嘗遇疾甚篤份燒香泣涕跪誦孝經晝夜不息如此者三陵疾忽然而愈隋書曰鄭譯性輕險髙祖以其定䇿功不忍廢而隂疎之乃隂呼道士章醮以祈福助其婢奏譯猒蠱左道上謂譯曰我不負公此何意也譯無以對後憲司劾以不孝由是除名下詔曰譯嘉謀良䇿寂爾無聞鬻獄賣官沸騰盈耳若留之於世在人為不道之臣戮之於朝入地為不孝之鬼有累幽顯無以置之宜賜以孝經令其熟讀後復其爵位又曰韋師字公頴京兆杜陵人也少沉謹有至性初就學始讀孝經捨書而嘆曰名教之極其在兹乎又曰蘇威嘗謂煬帝曰先人誡臣唯讀孝經一卷可以立身何用多為帝亦然之何妥曰蘇威所學非止孝經厥父若信有斯言威不從命是其不孝若無斯言而面欺陛下是其不誠不誠不孝何以事君且夫子曰不學詩無以言不學禮無以立豈容蘇綽教子獨反聖人之㫖乎唐書曰永徽中上命陳王師趙𢎞智於百福殿講孝經召中書門下三品及𢎞文館學士國子監學官並令與坐𢎞智演暢微言備陳五孝之義學士等難問連環𢎞智酬應如響上謂𢎞智曰宜畧陳此經要道以輔不逮對曰昔者天子爰及}
