  - {type: variant, offset: 4081, length: 1, content: 奈, SBCK: 名教之極其在兹又曰􅂫威甞謂煬帝曰先臣謂臣唯讀孝經一卷可以立身何用多爲帝亦然之何安曰􅂫威所學非止孝經厥父􅀂信有斯言威不從命是其不孝􅀂無斯言而面欺陛下是其不誠不誠不孝}
  - {type: variant, offset: 4081, length: 1, content: 奈, krp: 名教之極其在兹又曰蘇威甞謂煬帝曰先臣謂臣唯讀孝經一卷可以立身何用多爲帝亦然之何安曰蘇威所學非止孝經厥父若信有斯言威不從命是其不孝若無斯言而面欺陛下是其不誠不誠不孝}
  - {type: variant, offset: 4084, length: 0, content: '', SBCK: 事君且夫子曰不學詩無以言不學禮無以立豈容􅂫綽教子獨反聖人之旨乎唐書曰永徽中上命陳王師趙引智於百福殿講孝經召中書門下三品及引文舘學士國子􅁥學官並令預坐引智演暢微言備陳五孝之義學士等難問連環引智酬應如響上謂引智曰冝畧陳此經要道以輔不逮對曰昔者天子爰及諸侯卿大夫皆有諍}
