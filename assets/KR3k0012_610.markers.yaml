  - {type: variant, offset: 1835, length: 590, content: 非使人之所得聞也子西賦黍苗之四章黍苗小雅曰肅肅謝功召伯營之列列征師召伯成之比趙孟於召伯趙孟曰寡君在武何能焉子產賦隰桑隰桑詩義取思見君子盡心以事之趙孟曰武請受其卒章卒章曰心乎愛矣遐不謂矣中心藏之何日忘之趙孟欲子產之見規誨子太叔賦野有蔓草野有蔓草詩鄭風取其邂逅相遇適我願兮趙孟曰吾之惠也太叔喜於相遇故趙孟愛其惠印段賦蟋蟀蟋蟀詩唐風曰無以太康職思其居好樂無荒良士瞿瞿言瞿瞿然顧禮儀之所趙孟曰善哉保家之主也吾有望矣公孫段賦桑扈桑扈詩小雅義取君子有禮文故能受天之祐趙孟曰匪交匪敖福將焉往若保是言也欲辭福祿得乎卒享文子告叔向曰伯有將為戮矣詩以言志志誣其上而公怨之以為賓榮言誣則鄭伯未有其實趙倡賦詩以自寵其能久乎幸而後亡言必先亡叔向曰然已侈所謂不及五稔者夫子之謂矣又曰楚靈王與子革語左史倚相趍過倚相楚史名也王曰是良史也子善視之是能讀三墳五典八索九丘皆古書名對曰臣嘗問焉昔穆王欲肆其心周穆王也肆極也周行天下將皆必有車轍馬跡焉祭公謀父作祈招之詩以止王謀父周卿士祈父周司馬掌甲兵之職招其名也祭公方諫遊行故指司馬官而言也此詩逸王是以獲沒於祗宮獲沒不見篡臣問其詩而不知若問遠焉能知乎王曰子能乎對曰能其詩曰祈招之愔愔式昭德音愔愔安和皃也式用也思我王度式如玉式如金金玉取其堅重形民之力而無醉飽之心言園之用人當隨其力往往如金治之器而制形故言形民之力去其醉飽過盈之也王揖而入饋不食寢不寐數日深感子革之言論語孔子曰, WYG: ''}
