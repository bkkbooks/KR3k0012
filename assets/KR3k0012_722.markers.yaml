  - {type: variant, offset: 3737, length: 423, content: 餘日果病疽發乳上入𡙇盆死此所謂論之大體也必有經紀拙工有一不習文理陰陽失矣齊丞相舍人奴從朝入宮意見之食閨門外望其色有病氣意即告宦者平平好為脈學意所即示之舍人奴病告之曰此傷脾氣也當至春鬲塞不通不能飲食法至夏泄血而死宦者平即往告相曰君之舍人奴有病重死期有日相君曰何以知之曰君朝入宮君之舍人奴盡食閨門外平與倉公立公乃示平曰病如是者必死相即召舍人奴而謂之曰奴有病不舍人奴曰無病身無痛者至春果病四月泄血死所以知奴病者脾氣周乘五藏傷部而交外故傷脾之色也望之殺然黃殺蘇葛切察之如死青之滋眾醫不知以為大䖝不知傷脾所以至春死者胃氣黃氣黃者土氣也土不勝木故至春死所以至夏死者脈法曰病重而脈順清者曰內關內關之病人不知其所痛心急然無若若加以一病死中春一愈順及一時其所以四月死者診其人時愈順愈順者人尚肥也奴之病得之流汗數出炙於火而以出見大風也齊淳于司馬病意診其脈告曰當病迵音洞風迵風之狀飲食下嗌輒後之如廁也病得之飽食而疾走淳于司馬曰我之王家食馬肝飽甚見酒來即出驅疾至舍即泄數, WYG: 二}
