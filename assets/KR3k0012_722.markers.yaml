  - {type: variant, offset: 2918, length: 2, content: 倉公, SBCK: 醫令武帝􅀄受魏禪改元爲太始而據貢雉頭裘帝以竒􅇊異服典禮所禁焚之于殿前據以醫術承恩岀入禁闥因爲賈后合巴豆杏子丸害􅉖懐太子遂就戮焉又曰范汪字玄平性仁愛善醫術常以拯恤爲事凢有疾病不限貴賤皆爲治之十能愈其八九撰方五百餘卷又一百七卷後人詳用多􅀗其効又曰殷仲堪陳郡人能清言善屬文名士咸愛之謝玄以爲長史厚遇之仲堪父病積年衣不解帶躬夲醫術究其精妙執書揮淚遂眇一目又曰魏詠之字長道任城人也家貧素而躬耕爲事好學不倦生而菟缺有善相}
  - {type: page-break, offset: 2918, content: '', id: KR3k0012_SBCK_722-7b}
  - {type: variant, offset: 2918, length: 2, content: 倉公, WYG: 醫令武帝初受魏禪改元為太始而據貢雉頭裘帝以竒伎異服典禮所禁焚之于殿前據以醫術承恩出入禁闥因為賈后合巴豆杏子丸害愍懐太子遂就戮焉又曰范汪字𤣥平性仁愛善醫術常以拯恤為事凡有疾病不限貴賤皆為治之十能愈其八九撰方五百餘卷又一百七卷後人詳用多獲其効又曰殷仲堪陳郡人能清言善屬文名士咸愛之謝𤣥以為長史厚遇之仲堪父病積年衣不解𢃄躬學醫術究其精妙執書揮淚遂𦕈一目又曰魏詠之字長道任城人也家貧素而躬耕為事好學不倦生而兔缺有善相}
  - {type: page-break, offset: 2918, content: '', id: KR3k0012_WYG_722-12a, image: WYG0899/WYG0899-0386a.png}
