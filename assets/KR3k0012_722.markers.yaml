  - {type: variant, offset: 263, length: 0, content: '', krp: 疫褒廵行病徒爲致醫藥經理饘粥多蒙濟活東觀漢記曰鄧訓謙恕下士無貴賤見之如舊朋友徃來門内視之如子有過如鞭扑之教大醫皮廵從獵上林還暮宿殿門下寒疝病發時訓直事聞廵聲起徃問之廵曰異得火以熨背訓身至太官門爲求火不得乃以口嘘其背復呼同廬郎共更嘘至朝遂愈鍾離意别傳曰黄讜爲㑹稽太守建武十四年吴大疾疫署意中部尉督郵意乃露車不冠身循行病者門入家至賜與醫藥詣神廟爲民禱祭召録醫師百人合和草藥恐醫小子或不良毒藥齊賊害民命先自吞甞然後施行其所臨護四千餘人並得差愈後日府君岀行災害百姓攀車涕泣曰明郵府君不湏岀也但得鍾督郵民皆活也何顒别傳曰同郡張仲景緫角造顒謂曰君用思精而韻不髙後將爲良醫卒如其言顒先識獨覺言無虚發王仲宣年十七甞遇仲景仲景曰君有病冝服五石湯不治且成門後年三十當眉落仲宣以其貰音賖長也逺不治也後至三十疾果成竟眉落其精如此仲景之方術今傳於丗張仲景方序曰衛汎好醫術少師仲景有才識撰四逆三部厥經及婦人胎藏經小兒𩕄方三卷皆行於丗髙湛養生論曰王叔和性沉静好著述考覈遺文採摭羣論撰成脉經十卷編次張仲景方論編爲三十六卷大行於丗魏志曰華他字元化沛國譙人遊學徐土兼通數經曉飬性之術年且百歳而猶有壯灾時人以爲仙沛相陳珪舉孝廉太尉黄琬辟皆不就精於方藥處齊不過數種心分銖不假秤量針灸過數處裁七八壯若疾發結於内針藥所不能及者乃令先以酒服麻沸散旣醉無所覺因刳破腸皆抽割積聚若在腸胃則截斷洗除去疾穢旣而縫合傳以神膏四五日瘡愈一月之間皆平復又曰甘陵相夫人有娠六月腹痛不安他視脉曰胎已死矣使人手摸知所在在右即女在左即男人云在左於是爲湯下之果下男形即愈又曰縣吏尹丗苦四支煩口乾不欲聞人聲小便不利他曰試作熱食得汗即愈不汗後三日死即作熱食而汗不岀他曰藏氣巳絶於内當啼泣而絶果如他言又府吏倪㝷李延共止俱患頭痛身熱所苦正同他曰尋當下之延當發汗或難其病同療異他曰尋内實延外實故治之冝殊即各與藥明旦並起又督郵徐毅得病他徃省之毅謂他曰昨使醫曹吏劉祖針胃管訖便若欬嗽卧不安他曰刺不到胃管誤中肝也食當日减後五日不救遂如他言又東陽陳叔山小男三歳得下痢常先啼日以羸困問他他曰其母懷軀陽氣内養乳中虚冷兒得母寒故令不時愈他與四物紫苑九十日即除又至軍吏梅平得病除名還家家居廣陵未至二百里止親人舎有湏他偶至主人許主人令他視平他謂平曰君早見我不應至此今疾巳結促去可得與家人相見五日平應時歸果如他言又他行道見一人病噎塞嗜食而不得下家人車載欲徃就醫他聞其呻吟駐車徃視語之曰向來道傍有賣餅家䔉韲大酢從取三升飲之病自當差即如他言立吐虵一條遂懸之車邊欲造他他尚未還他家小兒戲門前迎見自相謂曰客車邊有物必是逢我公也疾者前入㘴見他壁北懸此虵輩以十數又有一郡守病他以爲其人盛怒則差乃多受其貨而不加功無何弃去留書罵之守果大怒令人追殺守子知之属使勿逐守瞋恚吐黒血數升而愈又有一士大夫患體中不快詣他他云君病至深當破腹取之然君壽亦不過十年病不能殺君君忍痛十歳壽俱當盡不足故自刳裂也士大夫曰余不耐痛必請治之他遂下手所患㝷差十年竟死又廣陵太守陳登得胷中煩滿靣赤不食他侯脉曰府君胃中有蟲數升欲成肉疽食腥物所爲也即作湯二升先服一升斯湏盡服之食頃吐出三升許蟲赤頭皆動半身猶是生魚膾也所苦便愈他曰此病後三朞當發遇良醫乃可濟依期果發時他不在遂死又有婦人長病經年丗謂爲寒熱注病冬月中他令㘴石槽中平且用冷水汲灌云當滿百始七十灌冷戰𣣔死他令滿數至八十灌熱氣乃蒸出囂囂髙二三尺滿百灌他乃使然火温牀厚覆衣良乆汙洽出着粉燥便愈又有人病腹中攻痛十餘日鬢眉墮落他曰是脾半腐可刳腹治也使}
