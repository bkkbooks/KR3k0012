  - {type: variant, offset: 265, length: 1, content: 臣, SBCK: 令卧破腹就視脾果半腐壞以刀断之割去惡肉以膏􅀓之即􅆧太祖聞而異之召他常在左右太祖苦頭風每發心亂目眩他針鬲隨手而愈又軍吏李成苦欬晝夜不􅄰時吐膿血以問他他言君病腸癰欬之所吐非從肺來也與君散兩錢匕巳服當吐二􅂛餘膿血訖快自養一月小起好自將愛一年便徤十八歳當一小發服此亦復􅆧若不得此藥故當死復與兩錢散成得五六歳親人有病如成者謂成曰卿今強徤我見欲死何忍急去祛舉切藏藥以待不祥}
  - {type: variant, offset: 265, length: 1, content: 臣, WYG: 令卧破腹就視脾果半腐壊以刀斷之割去惡肉以膏傅之即差太祖聞而異之召佗常在左右太祖苦頭風每發心亂目眩佗針鬲隨手而愈又軍吏李成苦欬晝夜不寐時吐膿血以問佗佗言君病腸癰欬之所吐非從肺來也與君散兩錢已服當吐二升餘膿血訖快自養一月小起好自将愛一年便健十八嵗當一小發服此亦復差若不得此藥故當死復與兩錢散成得藥去五六歳親人有病如成者謂成曰卿今強健我見欲死何忍無急去藥古語以藏為去以待不祥}
