  - {type: variant, offset: 216, length: 4, content: 以五味節, SBCK: 愈者非一小大莫不感恱又王符論曰凡療病者必先知脉}
  - {type: variant, offset: 216, length: 0, content: '', WYG: 愈者非一小大莫不感悦又王符論曰凡療病者必先知脈之虛實氣之所結然後為之方故疾可愈而夀可長也為國者必先知人之所苦禍之所起然後為之禁故奸可塞而國可安也後漢書曰郭玉者廣漢人也初有老父不知何出常漁釣於涪水因號涪翁乞食人間見疾者時下針石輒應時而見效乃著針經診脈法𫝊於後弟子程高尋求積年翁乃授之高亦隠跡不仕玉少師事高學方診六徵之技隂陽不測之術和帝時為太醫丞多有効應帝竒之仍試令嬖臣美手腕者與女子雜處帷中使玉各診一手問所疾苦玉曰左陽右隂脈有男女状若異人臣疑其故帝歎息稱善玊仁愛不矜雖貧賤厮養必盡其心力而至療貴人時或不愈帝乃試令貴人羸服變處一針即差召玉詰問其状對曰醫之為言意也腠理至㣲隨氣用巧針石之間毫芒即乖神存於心手之際可得解而不可得言也夫貴者處尊高}
