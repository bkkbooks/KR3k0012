  - {type: variant, offset: 3035, length: 461, content: 飲得前後溲再飲得大溲三飲而疾愈淄川王美人懷子而不乳來召意意往飲以茛𦿆藥一撮以酒飲之旋乳意復診其脈躁躁者有餘疾即飲以消石一齊即出血如豆比五六枚濟北王侍者韓女病意診脈曰內寒月事不下也即竄以藥旋下病已病得之欲男子而不可得也菑川王病召意診脈曰蹶上為重頭痛身熱使人煩懣意即以寒水拊其頭剌足陽明脈左右各三所疾旋已病得之沐髮未乾而臥診如前所以蹶頭熱至肩齊王黃姬兄黃長卿家有酒召客意與諸客坐未上食意望見王后弟宋建吉曰君有病往四五日君腰脅痛不可以俛仰又不得小溲不亟治病即入濡腎及其未舍五藏急治之病方今在客腎濡此所謂腎痺也宋建曰然建故有腰脊痛往四五日天雨黃氏諸倩方言曰東齊之間壻謂之倩見建家京下方石京者倉廩之屬取弄之建炙欲効之効之不能起即復置之暮腰脊痛不能溺至今不愈建病得之好持重所以知建病者意見其色太陽色乾腎部上及界腰以下者枯四分所故以往四五日知其發也意即為柔湯使服之十八日而病愈臨菑女子薄吾病甚眾醫皆以為寒熱篤當死不治意診其脈曰蟯瘕蟯音饒蟯瘕為病腹大上膚黃麤循之戚戚然意飲以芫華一撮即出蟯可數升病愈三十日如故齊王侍醫遂病自鍊五石服之意往過, SBCK: 卷因精心學}
  - {type: variant, offset: 3035, length: 35, content: 飲得前後溲再飲得大溲三飲而疾愈淄川王美人懷子而不乳來召意意往飲以茛𦿆藥, WYG: 男}
