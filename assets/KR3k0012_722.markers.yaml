  - {type: variant, offset: 294, length: 172, content: 事上者祝史射御醫卜及百工又曾子問世子之記曰若內豎言疾藥必親嘗之左傳曰晉侯疾求醫於秦秦伯使醫緩為之緩醫名為猶治也未至公夢疾為二豎子曰彼良醫也懼傷我焉逃之其一曰居肓之上膏之下若我何肓心鬲也心下為膏醫至曰疾不可為也在肓之上膏之下攻之不可達之不及藥不至焉不可為也公曰良醫也厚為之禮而歸之又襄三曰楚子使薳子馮為令尹訪於申叔豫叔豫曰國多寵而王弱國不可為也遂, SBCK: 告他他}
