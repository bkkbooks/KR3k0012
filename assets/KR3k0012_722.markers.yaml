  - {type: variant, offset: 2914, length: 0, content: '', SBCK: 又曰劉德彭城人也少以醫方自逹衆疾於虚勞尤爲精妙療之隨手而愈猶是向風千里而至者多矣官至太醫校尉又曰史脫性器沉毅志行敦簡善􅐷候明消息多辨論以醫術精愽拜太醫校尉治黄疸病最爲髙手又曰宫㤗㓜好墳典雅尚方術有一藝長於巳者必千里㝷之以此精心善極諸疾於氣尤精制三物散方治喘嗽上氣甚有異効丗所貴}
