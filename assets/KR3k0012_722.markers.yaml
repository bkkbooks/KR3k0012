  - {type: variant, offset: 221, length: 4, content: 凡藥以酸, SBCK: 虚實氣之所結然後爲之方故疾可愈而壽可長也爲國者必先知人之所苦禍之所起然後爲之禁故姧可塞而國可安也又曰郭玉者廣漢人也􅀄有老父不知何出常漁釣於涪水因號涪翁乞食人間見有疾者時下針石輙應時而効乃著針經􅐷脉法傳於代弟子程髙㝷求積年翁乃授之髙亦隠跡不仕玉少師事髙學方􅐷六徴之技隂陽不測之術和帝時爲太醫丞多有効應帝竒之仍試令嬖臣美手睕者與女子雜處帷中使玉各􅐷一手問所疾若玉曰左陽右隂脉有男女狀若異人臣疑其故帝歎息稱善玉仁愛不矜雖貧賤厮}
