  - {type: variant, offset: 217, length: 2, content: 五味, WYG: 臨臣臣懐怖懾以承之其為療也有四難焉自用意而不任臣一難也将身不謹二難也骨}
  - {type: variant, offset: 220, length: 0, content: '', WYG: 不强不能使藥三難也好逸惡勞四難也針有分寸時有破漏分寸淺深}
