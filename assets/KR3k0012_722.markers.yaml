  - {type: variant, offset: 221, length: 1, content: 凡, WYG: 度破漏日有衝破者也重以恐懼之心加以裁慎之志臣意且猶不盡何有於病哉此其所為不愈也帝善其對年老卒官又曰曹褒遷城門校尉将作大匠時有疾疫褒巡行病徒為致醫}
