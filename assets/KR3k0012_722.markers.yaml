  - {type: variant, offset: 1308, length: 88, content: 以長久以教眾庶亦不疑殆醫道論篇可傳後世可以為寶世本曰巫咸堯臣也以鴻術為帝堯之醫史記曰扁鵲渤海鄭人姓秦名越人少時為人舍客桑君過扁鵲扁鵲獨奇之常謹遇之長桑君亦知扁鵲非常人乃呼鵲與語, SBCK: 解引䘮者顛仆􅁛畿言}
