  - {type: variant, offset: 2976, length: 0, content: '', WYG: 鏡經一卷因以精心學之遂名震海内生子秋夫彌工其術仕至射陽令嘗夜有鬼聲甚悽愴秋夫問何所須答言姓斛斯家在東陽患腰痛死為鬼痛猶難忍請療之秋夫曰云何厝法鬼請為芻人案孔穴針之秋夫如言為炙四處又針肩井三處設祭理之明日一人謝恩忽不見當世伏其通靈又宋明帝宫人患腰痛牽心每至輒氣欲絶衆醫以為肉癰文伯曰此髪瘕以油投入之即吐得物如髪稍引之長三尺頭已成蛇能懸住上水滴盡一髪而已病都差又宋後廢帝出樂遊苑門逢一婦人有娠帝亦善診}
