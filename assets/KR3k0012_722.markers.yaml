  - {type: variant, offset: 253, length: 6, content: 藥焉禮記曲禮, SBCK: 心力而鑒療貴人時或不愈帝乃試令貴人羸服變處一針即差召玉詰問其狀對曰醫之爲言意也腠理至微腠理皮膚之間也韓子曰扁鵲見晉桓侯}
  - {type: variant, offset: 253, length: 6, content: 藥焉禮記曲禮, WYG: 所臨䕶四千餘人並得差愈後日府君出行災害百姓攀車涕泣曰明郵府君不須出也但得鍾督郵民皆活也何顒别𫝊曰周郡張仲景總角造顒謂曰君用思精而韻不高後将為名醫卒如其言顒先識獨覺言無虛發王仲宣年十七嘗遇仲景仲景}
