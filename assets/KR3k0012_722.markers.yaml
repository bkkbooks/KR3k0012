  - {type: variant, offset: 3502, length: 1, content: 肖, SBCK: 見當丗伏其通靈又宋明帝宮人患􅆎痛牽心毎至輒氣欲絶衆醫以爲肉癥文伯曰此髮瘕以油投之即吐得物如髪稍引之長三尺頭巳成虵能動懸柱上水滴盡一髪而巳病都差又宋後廢帝出樂遊苑門逢一婦人}
