  - {type: variant, offset: 867, length: 323, content: 以事君舍藥物可也藥物有毒當由醫非凡君之名人所知譏上不舍藥物所以加弒尚書說命曰若藥弗瞑眩厥疾弗瘳開汝心以沃我心如服藥心瞑眩極其病乃除欲其出言以自警也論語曰子曰人而無恒不可以作巫醫帝王世紀曰伏羲氏仰觀象於天俯觀法於地觀鳥獸之文與地之宜近取諸身遠取諸物於是造書契以代結繩之政畫八卦以通神明之德以類萬物之情所以六氣六府五藏五行陰陽四時水火昇降得以有象百病之理得以有類乃嘗味百藥而制九針以拯夭枉焉又曰炎帝神農氏長於姜水始教天下耕種五穀而食之以省殺生嘗味草木宣藥療疾救夭傷之命百姓日用而不知著本草四卷又曰黃帝有熊氏命雷公歧伯論經脈傍通問難八十一為難經教制九針著內外術經十八卷又曰歧伯黃帝臣也帝使歧伯嘗味草木典主醫病經方本草素問之書咸出焉素問曰黃帝坐明堂召雷公, SBCK: 強盛怪}
  - {type: variant, offset: 868, length: 3, content: 事君舍, WYG: 改諸度量若是未能悉革可先考太醫權衡此若差違遂失神農岐伯之正}
