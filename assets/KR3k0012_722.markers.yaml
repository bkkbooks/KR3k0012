  - {type: variant, offset: 3504, length: 313, content: 病幸診遂也意即診之告曰公病中熱論曰中熱不溲者不可服五石石之為藥精悍公服之不得數溲亟勿服色將發癰遂曰扁鵲曰陰石以治陰病陽石以治陽病夫藥石者有陰陽水火之齊故中熱即為陰石柔齊治之中寒即為陽石剛齊治之意曰公所論遠矣扁鵲雖言若是然必審診起度量立規矩稱權衡合色脈表裏有餘不足逆順之法參其人動靜與息相應乃可以論論曰陽疾處內陰形應外者不加悍藥及鑱石夫悍藥入中則邪氣辟矣而宛氣愈深診法曰二陰應外一陽接內者不可以剛藥剛藥入則動陽陰病益衰陽病益著邪氣流行為重困於俞如喻切忿發為疽意告之後百餘日果病疽發乳上入𡙇盆死此所謂論之大體也必有經紀拙工有一不習文理陰陽失矣齊丞相舍人奴從朝入宮意見之食閨門外望其色有病氣意即告宦者平平好為脈學意所即示之舍人奴病告, SBCK: 娠帝亦善􅐷脉爲􅐷}
