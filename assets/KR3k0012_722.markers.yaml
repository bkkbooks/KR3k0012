  - {type: variant, offset: 341, length: 326, content: 之緩醫名為猶治也未至公夢疾為二豎子曰彼良醫也懼傷我焉逃之其一曰居肓之上膏之下若我何肓心鬲也心下為膏醫至曰疾不可為也在肓之上膏之下攻之不可達之不及藥不至焉不可為也公曰良醫也厚為之禮而歸之又襄三曰楚子使薳子馮為令尹訪於申叔豫叔豫曰國多寵而王弱國不可為也遂以疾辭方暑闕地下冰而床焉重繭衣裘鮮食而寢楚子使醫視之復曰瘠則甚矣而血氣未動乃使子南為令尹又昭元曰晉侯求醫於秦伯秦伯使醫和視之曰疾不可為也是謂近女室疾如蠱惑疾非鬼非食惑以喪志惑女色而失志良臣將死天命不祐良臣不匡救君過故將死而不為天所右公曰女不可近乎對曰節之先王之樂所以節百事也故有五節五聲之節遲速本未以相及中聲以降五降之後不容彈矣於是有煩手淫聲慆堙心耳乃忘平和君子弗聽也物亦如之至於煩乃舍也已無以生疾君子, WYG: 佳語阿阿秘}
