  - {type: variant, offset: 2921, length: 1, content: 齊, SBCK: 謂之曰卿當冨貴年十八聞荆州刺史殷仲堪帳下有名醫能療之貧無行裝謂家人曰殘醜如此用活何爲遂齎數斛米西上以投仲堪旣至造門自通仲堪嘉其盛意召醫語視之醫曰可割而􅀘之但湏百日進粥不得語􅀏詠之曰半生不語而有半生亦當療之况百日耶仲堪於是處之別屋令醫善療之詠之遂􅐬口不言唯食薄粥其厲志如此及􅏔仲堪厚資遺之劉敬叔異􅁐曰王纂海陵人少習經方尤精針石宋元嘉中縣人張方女日暮􅀫廣陵廟門下夜有物假作其壻來魅惑成病纂爲治之始下一針有􅆩從女􅀍内走岀病遂愈宋書曰徐文伯字德秀濮陽}
  - {type: page-break, offset: 2921, content: '', id: KR3k0012_SBCK_722-8a}
