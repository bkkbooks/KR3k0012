  - {type: variant, offset: 267, length: 1, content: 嘗, SBCK: 特貸我􅏔爲卿從華他更索成與藥巳故到譙從索藥適㑹值他見收忩忩不忍從求後十八歳病發無藥可療以至死又曰樊阿彭城人少師華他甞問他求服食法他受以􅃮葉青黏散子方云服}
