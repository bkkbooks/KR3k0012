  - {type: variant, offset: 1230, length: 1680, content: 足至侯王願得受樹天之度四時陰陽合之別星辰與日月光以彰經術後世益明上通神農著至教疑於二黃帝曰善無失之此皆陰陽表裏上下雌雄相輸應也而道上知天文下知地理中知人事可以長久以教眾庶亦不疑殆醫道論篇可傳後世可以為寶世本曰巫咸堯臣也以鴻術為帝堯之醫史記曰扁鵲渤海鄭人姓秦名越人少時為人舍客桑君過扁鵲扁鵲獨奇之常謹遇之長桑君亦知扁鵲非常人乃呼鵲與語曰我有禁方年老欲傳與公公無泄乃出其懷中藥與扁鵲飲是以上池之水三十日當知物矣乃悉取禁方盡與扁鵲以其飲藥三十日視見垣外一方人以此視疾盡見五藏癥結特以診脈為名耳為醫或在齊或在趙趙簡子疾五日不知人召扁鵲入視疾出董安于問扁鵲扁鵲曰血脈滯也而何怪昔秦穆公嘗如此七日而寤居二曰半簡子寤語諸大夫曰我之常所甚樂與百神遊于鈞天廣樂九奏萬舞不類三代之樂其聲動心有一熊欲援我帝命我射之中熊熊死有羆來我又射之中羆羆死帝甚喜賜我二笥皆有副吾見兒在帝側屬我一翟犬曰及而子之壯也以賜之帝告我晉國且世衰七世而亡嬴姓將大敗周人於范魁之西而亦不能有也董安于受言書而藏之以扁鵲言告簡子簡子賜扁鵲田四萬畝其後扁鵲過虢虢太子死扁鵲至虢宮門下問中庶子喜百者曰太子何病國中治穰過於眾事中庶子曰太子病血氣不時交錯而不得泄暴發於外則為中害精神不能上邪氣邪氣畜積而不得泄是以陽緩而陰急故暴蹶而死扁鵲曰其死何時曰雞鳴時至今日收乎曰未也收謂棺歛其死未能半日鵲曰臣齊渤海秦越人也家在鄭未嘗得望清光侍謁於前也聞太子不幸而死臣能生之中庶子曰先生得無誕乎何以言太子之可生也臣聞上古之時醫有俞附治病不以湯液醴灑鑱石撟引案杭毒熨一撥見病之應因五藏之輸乃割皮解肌訣脈結䈥搦髓折肓爪膜湔浣腸胃漱滌五藏鍊精易形先生之方能若是則太子可生也若不如是而欲生之曾不可以告孩嬰之兒扁鵲仰天嘆曰夫子之為方也若以管窺天以隙視文越人之為方也不待切脈望色聽聲寫形言病之所在聞病之陽論得其陰聞病之陰論得其陽病應見於大表不出千里決者至眾不可曲止也子以吾言為不誠試入診太子當聞其耳中鳴而鼻張循其兩股以至於陰當尚溫也中庶子聞扁鵲言目眩然而不能瞚舌橋然而不能下乃以扁鵲言入報虢君虢君聞之大驚出見扁鵲於中闕曰竊聞高義之日久矣然未嘗得拜謁於前也先生過小國幸而舉之偏國寡臣幸甚有先生則活無先生則棄捐溝壑長終而不反言未及畢因歔欷服皮力切臆涕泣撗流不能自止容皃變更扁鵲曰太子病者所謂尸蹶者也夫以陽入陰中動胃繵緣中經維絡別下於三焦膀胱是以陽脈下遂音墜陰脈上爭會氣閉而不通陰上而陽內行下內鼓而不起上外絕而不為使上有絕陽之絡下有破陰之紉破陰絕陽之色已廢脈亂故形靜如死狀太子未死也夫以陽入陰支蘭藏者生以陰入陽支蘭藏者死凡此數事者皆五藏蹶中之時暴作也良工取之拙者疑殆扁鵲乃使弟子子陽礪針砥石以取外三陽五會有間太子蘇乃使子豹為五分之熨以八減之齊和煮之以更熨兩臍下太子起坐更適陰陽但服湯二旬而復故故天下盡以扁鵲為能生死人扁鵲曰越人非能生死人也此自當生者越人能使之起耳扁鵲過齊齊桓侯客之入朝見曰君有疾在腠理不治將深桓侯曰寡人無疾扁鵲出桓侯謂左右曰醫之好利欲以不病者為功後五日復見曰君有疾在血脈不治將深桓侯曰寡人無疾扁鵲出桓侯不悅後五日扁鵲復見曰君有疾在腸胃不治將深桓侯不應扁鵲出桓侯不悅後五日扁鵲復見望桓侯退走桓侯使人問其故扁鵲曰疾在腠理湯熨所及其在血脈針石可理其在腸胃酒醪所能及其在骨髓雖司命無奈之何今在骨髓臣是以無請後五日桓侯體病使人召扁鵲鵲已逃遁焉桓侯遂卒扁鵲名滿天下旁遊六國至邯鄲聞趙貴女病扁鵲即為帶下醫過洛陽聞周人愛老人扁鵲即為耳目痺醫入咸陽聞秦人愛小兒即為小兒醫隨俗改變無所滯礙秦太醫令李醯自知伎不如遂密使人剌殺之又曰公孫光齊淄川唐里人善為古方及傳語法淳于意師之悉授其書意欲盡求他精方光曰吾方盡矣吾身已衰無所事之是吾少年所受妙方也公母以教人意曰悉得禁方幸甚死不妄傳人光喜曰公後必為國工臨菑楊慶有奇方吾不如之汝可謹事必得之意遂捨光而事慶焉又曰楊慶齊人也年七十餘有古先黃帝扁鵲脈書五色診病知人死生決嫌疑定可否治及藥論之書甚精妙又家自給富不肯為人治病亦不教子孫後淳于意以父道事之甚謹慶愛之盡以其禁方與之曰汝慎勿令我子孫知汝學吾此法意曰謹聞命矣意行用其方, WYG: 輟卷}
