  - {type: variant, offset: 263, length: 0, content: '', WYG: 穢既而縫合傅以神膏四五日瘡愈一月之間皆平復又曰甘陵相夫人有娠六月腹痛不安佗視脈曰胎已死矣使人手摸知所在在右即女在左即男人云在左於是為湯下之果下男形即愈又曰縣吏尹世苦四支煩口乾不欲聞人聲小便不利佗曰試作熱食得汗即愈不汗後三日死即作熱食而汗不出佗曰藏氣已絶於内當啼泣而絶果如佗言又府吏倪尋李延共止俱患頭痛身熱所害正同佗曰尋當下之延當發汗或難其病同療異佗曰尋内實延外實故治之宜殊即各與藥明旦並起又督郵徐毅得病佗往省之毅謂佗曰昨使醫曹吏劉租針胃管訖便苦咳嗽卧不安佗曰刺不到胃管誤中肝也食當日减後五日不救遂如佗言又東陽陳叔山小男三嵗得下痢常先啼日以羸困問佗佗曰其母懐軀陽氣内養乳中虛冷兒得母寒故令不時愈佗與四物紫苑丸十日即除又軍吏梅平得病除名還家家居廣陵未至二百里止親人舎有頃佗偶至主人計令佗視平佗謂平曰君早見我不應至此今疾已結促去可得與家人相見五日平應時歸果如佗言又佗行道見一人病噎塞嗜食而不得下家人車載欲往就醫佗聞其呻吟駐車往視語之曰向來道有賣餅家蒜虀大酢從取三升飲之病自當差即如佗言立吐虵一條遂懸之車邉欲造佗佗尚未還佗家小兒戱門前迎見自相謂曰客車邉有物必是逢我公也疾者前入坐見佗北壁懸此虵輩以十數又有一郡守病佗以為其人盛怒則差乃多受其貨而不加治無何棄去留書罵之守果大怒令人追殺守子知之屬使勿逐守瞋恚吐黒血數升而愈又有一士大夫患體中不快詣佗佗云君病至深當破腹取之然君夀亦不過十年病不能殺君君忍痛十嵗夀俱當盡不足故自刳裂也士大夫曰余不耐痛必請治之佗遂下手所患尋差十年竟死又廣陵太守陳登得胷中煩滿面赤不食佗診脈曰府君胃中有蟲數升欲成内疽食腥物所為也即作湯二升先服一升斯須盡服之食頃吐出三升許蟲赤頭皆動半身猶是生魚膾也所苦便愈佗曰此病後三月當發遇良醫乃可濟依朞果發時佗不在遂死又曰婦人長病經年世謂為寒熱注病冬月佗令坐石槽中平旦用冷水汲灌云當滿百始七八灌冷戰欲死佗令滿數至八十灌熱氣乃蒸出囂囂髙二三尺滿百灌佗乃使然火温牀厚覆衣良久汗洽出着粉燥便愈又有人病腹中攻痛十餘日鬚眉墮落佗曰是脾半腐可刳腹治也使}
