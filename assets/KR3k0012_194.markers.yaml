  - {type: variant, offset: 91, length: 8, content: 白馬城吳時為烽火, SBCK: 􅀫􅀫有路室路室有委五十里有市市有􅀱館館有積注云􅀱樓館可以􅀚望也又秋官司宼下云凡諸侯入王則逆勞于畿及郊勞視館注云視館致館也又司儀云主君郊勞交擯三辭車送拜三揖三辭受拜車送三辭再拜致館亦如之注云館舎也使大夫授之君又以禮親致之儀禮聘禮云卿致館注云致至也至此館主人以禮致}
  - {type: variant, offset: 91, length: 8, content: 白馬城吳時為烽火, WYG: 宿宿有路室路室有委五十里有市市有候館候館有積注云候館樓館可以觀望也又曰秋官司寇下云凡諸侯入王則逆勞于畿及郊勞視館注視館致館也又司儀云主君郊勞交擯三辭車送拜三揖受拜車送三辭再拜致館亦如之注云館舍也使大夫授之君又以禮親致之儀禮聘禮云卿致館注云致至也至此館主人以禮致}
