  - {type: page-break, offset: 2665, content: '', id: KR3k0012_SBCK_194-8b}
  - {type: variant, offset: 2665, length: 1, content: 汝, WYG: 蒼梧廣信女子蘇娥行宿鵲巢亭為亭長龔夀所殺及婢致富取財物埋置樓下交阯刺史周敞行部宿亭覺夀奸罪奏之殺夀列異傳云鵠奔亭漢書典職曰洛陽二十四街街一亭十二城門門一亭魏畧曰從長安至大秦人民連屬十里一亭魏書曰元皇后以漢延嘉三年二月生齊郡白亭有黄氣滿室移日不散吳志曰孫權將如吳親乘馬射虎凌亭馬為虎所傷權投以雙㦸虎即廢又曰太史慈劉繇住涇縣立屯府大為山越所附孫䇿躬自攻討遂見囚執䇿即觧縛捉其手曰寧識神亭戰時耶卿爾時得我云何慈曰未可量也䇿大笑王隠晉書曰徐苗字叔胄髙宻淳于人也事曽祖至行感靈夜有神人告亭欲崩苗出亭崩得免又曰王羲之初度江㑹稽有佳山水名士多居之與孫綽許詢謝尚支遁等宴集於山隂之蘭亭崔鴻十六國春秋曰慕容垂請入鄴城拜廟苻登不許乃潜服而入亭吏禁之垂怒斬吏燒亭而去沈約宋書曰孔寗子與王華並有富貴之願自徐羡之等秉權日夜搆之於太祖曰寗子常東歸至金昌亭左右欲泊船寗子命去之曰此弑君亭不可泊也又曰徐湛之為廣陵郡守善為政威恵並行廣陵城舊有髙樓湛之更加修整更起風亭月觀吹臺琴室果竹繁茂成行帝王世紀曰桀敗於鳴條之野案孟子舜卒鳴條乃在東夷之地或言陳留平丘今有鳴條亭在安邑之西世説曰過江諸人每至暇日輙相要出新亭籍卉飲宴周顗在亭嘆曰風景不殊舉目有河山之異皆相視流淚惟丞相愀然變色曰當共戮力王室克復神州何至作楚囚相對泣耶夣書曰亭為積功民所成也夣築亭者功積成也夣亭壊敗恩澤傷也韋耀雲陽賦曰八鄉九市亭侯三六列樹表塗路有廬宿丹陽記曰京師三京新亭吳舊亭也故基淪廢丹陽尹司馬恢移創今地謝石創征虜亭三吳搢紳創治亭並太元中丹陽記曰稽亭北瞰大江}
