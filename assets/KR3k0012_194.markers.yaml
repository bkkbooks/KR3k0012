  - {type: variant, offset: 609, length: 0, content: '', SBCK: 張平子西京賦曰頋徃昔之遺舘􅀗林光於秦餘又云郡國宫舘百四十五右極􅉦厔并卷酆鄠又云豫樟珍館揭焉中峙班婕妤自傷賦曰痛陽禄與柘館皆宫名生二子處此二館皆失也仍襁褓而罹災豈妾人之殃咎􅀆將天命之不可求也張衡西京賦曰旣新作於迎風增露寒與儲胥託髙基於山岡直摕霓以髙居薛綜注曰此二皆館名張衡東京賦曰其西則有平樂都場示逺之館龍省盤蜿天馬半漢劉邵趙都賦曰置酒乎黄華之館左思魏都賦曰營密館以周坊飾賔侣之所集潘尼東都館賦曰東館者蓋東武陽侯之館也我而遷居謂余曰吾將老焉故有終焉之心而無移易之意子且爲我賦之傳舎釋名曰傳傳也人所止息而去後人復來轉相傳無常人也史記相如爲趙王奉璧使􅁗王舎之廣成傳舎古縣也或云􅁗始皇因爲望海臺傳載曰鄭審開元中爲殿中侍御史充館驛使令每傳舎立十二辰候自審始也亭釋名曰亭停也人所停集也風俗通曰謹案春秋國語有寓望謂金亭也民所安定也亭有樓從髙省丁聲也漢家因􅁗大率十里一亭亭留也今語有亭留亭待蓋行旅􅀫食之所館也亭亦平也民有訟諍吏留辯處勿失其正也漢書項羽傳曰烏江亭長艤舡待羽}
