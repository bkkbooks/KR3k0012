  - {type: variant, offset: 196, length: 400, content: 亂奔湖自縊壺關三老太廟令田千秋訴太子之冤築思子宮於湖其城存焉續述征記曰廣固城有大澗甚廣阻之為固謂之廣固又曰白馬城魏黃初中曹彪封白馬王治于此城又曰小城陽城在陽城西南半里許實中俗說囚堯城羊頭山記邯鄲城邯山名鄲盡也邯山至此而盡也又曰曲阜城城內有曲阜逶迆長八九里東方朔十洲記曰崑崙山有積金為天城四面千里關中記曰長安城其形似北斗其土本皆黑壤今城赤如火堅如金父老所傳鑿龍首山土以為城也幽明錄曰始興縣有皋天子廟因山崎嶇十有餘里坑塹數重阡陌交通城內堂基碎瓦柱穿猶存東有皋夫子冢皋天子未之聞也劉植京口記曰有小昇城鄧德明南康記曰歸美山下有石城高數丈有一門門外有二石夾左右高數百丈遠望嵯峨雲闕騰空故老謂之神仙游焉江寧圖曰石頭城吳之金陵城為石城郡國誌曰兗州兩觀城即仲尼為魯司寇誅少正卯之處又曰陜州魏城即芮伯萬母惡芮伯逐之出居于魏此也晉獻公滅之以賜畢萬山河之間土地迫隘故魏周著十畝之詩又曰雲中府快馬城有綾羅泉即塞上翁所居之邑有, SBCK: ''}
