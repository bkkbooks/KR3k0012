  - {type: variant, offset: 101, length: 0, content: '', krp: 以安之也又環人云掌送迎邦國之通賔客以路節逹諸四方舎則授館又云至于國賔入館次于舎門注云次待事于客儀禮公食大夫禮云有司卷三牲之爼歸于賔館注云牲之爼正饌尤尊盡以歸尊賔之至也又聘禮云厥明訝迎于館注云此訝下大夫以君命迎賔謂之訝迎亦皮弁也禮記曲禮上云問疾弗能遺不問其所欲見人弗能館不問其所舎又檀弓上云賔客至無所館夫子曰生於我乎館死於我乎殯又云子貢曰於門人之喪未有所說驂於舊館無乃以重乎又曽子問云卿大夫之家曰私館公館與公所爲曰公館注云公館若今縣官舎也左傳莊元年經云夏單伯送王姬秋築王姬之館于外注云公在諒闇慮齊侯當親迎不忍便以禮接於廟又不敢逆王命故改築舎於外也又僖三十年傳云晉分曹衛之田公使臧文仲徃宿於重館重館人告曰晉新得諸侯必親其㳟不速行將無及也又襄三十一年傳云子産相鄭鄭伯如晉晉侯以我喪故未之見也子産使壞其館之垣而納車馬士文伯讓之曰弊邑以政刑之不脩宼盗充斥是以令吏人完客所館今吾子壞之其若異客何子産曰僑聞之文公之爲盟主也宫室無觀卑庳臺榭以崇大諸侯之館今銅鞮之宫數里而諸侯舎於隷人門不容車不可踰越士文伯不能對晉侯見鄭伯有加禮厚其宴好而歸之乃築諸侯之館又昭十三年傳云宣子謂叔向曰子能歸季孫乎對曰不能鮒也能乃使叔魚見季孫曰鮒聞諸吏將爲子除館於西河其若之何且泣又曰叔孫所館雖一日必葺其牆屋去之如始至漢書薛宣子惠爲彭城令宣過之橋梁郵驛不脩宣知其不能又郊祀志曰孫卿曰仙人可見上徃常遽以故不見今陛下可爲館如維氏城置脯酒神人可致且仙人好樓居於是上令長安作飛廉桂館甘泉作延夀館又曰鄭莊置驛以延賔客又曰公孫弘起徒歩數年至宰相封侯於是起客館開東閤以延賢人與叅謀議又元后傳曰王莽又知}
  - {type: variant, offset: 102, length: 0, content: '', SBCK: 后婦人饜居深宫中莽欲娱樂以示其􅁠迺令太后四時車駕廵狩四郊存見􅀌寡婦人春幸蠒館率皇后列侯夫人桑遵霸水而祓除又外戚傳曰成帝許美人在上林鹿館數召入飾室中元延二年懷子漢書叙傳述元紀云宫不新館陵不崇墓又揚雄傳長楊賦云張網置罘捕熊豪猪狖玃狐兎麋鹿載以檻車輸長楊射熊館又羽獵賦云於是禽彈中衰相與集於靖􅁳之館魏志曰文昭甄宣后明帝母也后已早廢父逸上蔡令早卒及明帝即位追封逸爲上蔡侯謚敬侯適孫蒙襲爵薨子暢嗣上爲暢起大第車駕自臨之故丗說曰魏明帝爲外祖母築館于甄氏自行視謂左右曰館當以何爲名侍中繆襲對曰陛下聖恩齊于哲王罔極過于曽閔此館之興情鍾舅氏冝以渭陽爲名魏書曰帝於後園爲母起觀及宫名其里曰渭陽里晉書天文志云傳舎九星在莖善上近河賔客之館主胡人入中國客星守之備姧使亦曰胡兵起宋書文帝夲紀云帝臨􅀇武館閱武又隱逸雷次宗傳云徴詣京邑爲築室於鍾山西巖下謂之招隱館齊書禇伯玉傳云髙帝即位手詔呉㑹二郡以禮迎伯玉伯玉辭疾上不欲違其志勑於剡白石山立太平館以居之梁書髙祖紀云大統七年幸於宫城西立士林館延集學徒置集雅館以招逺學冲虚真經黄帝云黄帝於是放萬機舎寢室去直待徹鍾縣減厨膳退而閑居大庭之館齋心服形三月不親政事漢武帝故事云上自封禪後夢髙祖坐明堂羣臣亦夢於是祀髙祖於明堂以配天還作髙陵館郡國誌台州仙石山有館土人謂之黄公客堂堂兩邊有石歩廊觸石雲起崇朝必有雨有四竿筋竹風吹自成隂拂石皆淨即王方平遊處荆州圖記云襄陽縣南水行四十里陸道六十里有桃林館建}
