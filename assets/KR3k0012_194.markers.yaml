  - {type: variant, offset: 12, length: 29, content: 石頭城吳時悉土塢義熙始加塼累石頭因山以為城因江以為池形險固, SBCK: 舊館人之喪脫驂而􅐠左傳曰敢辱大館又莊公曰楚令尹子元欲蠱文夫人爲館於其宫側而振萬焉萬儛又僖上曰改館晉侯饋七牢焉詩國風鄭緇衣曰適子之館兮還子授子之粲􅀆又大雅云篤公劉于􅃎斯館周禮地官司徒下云國野之道十里}
