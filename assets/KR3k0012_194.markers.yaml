  - {type: variant, offset: 2649, length: 3, content: 馬援所, SBCK: 靈帝到夏門亭使竇武持節以王青蓋迎入殿中又曰蔡邕避難在呉告人曰吾昔至㑹稽髙遷亭見竹椽從東間數第十六可以爲籥取用果有異聲東觀漢記曰王郎起光武自薊東南馳晨夜至饒陽無蔞亭時天寒衆皆飢馮異上豆粥又曰趙孝父爲田禾將軍孝甞從長安來欲止亭亭長難之言有貴客}
