  - {type: variant, offset: 1629, length: 1017, content: 水冬夏常冷因曰寒泉又曰滑州鹿鳴城城內有鳴鹿臺又曰陳官城周二十里東晉所築號曰六門城宣陽門楣上作虎刻木相對又施雲楣藻井言武門上作重樓號曰西辰觀吳初築在府宮南號太初宮正殿曰神龍殿又有臨海赤烏殿孫皓起顯明宮引水激之飾以珠玉有彎崎臨硎之觀門及樓皆擊鼓持夜以齊以鼓多驚眠改為鐵磬過秦論曰秦踐華以為城因河以為池越絕書曰石城者吳王闔閭所置美人離城也又曰樓門外馬寧溪止復城者故越王餘復君所治也又曰樓門外鴻城者故越王城也去縣百五十里吳雞籠山外雞陂故吳王所畜雞使李保之養去縣二十里闔閭姑胥臺外有九曲路闔閭造以遊姑胥之臺太湖中窺百姓去縣三十里又曰吳大城周四十七里二百一十步陸門二有樓水門八南面十四里四十二步西面七里百一十二步北面八里二百六十步東面一十里七十九步闔閭所造也吳郭周六十八里六十步吳小城周一十二里其下廣二丈七尺高四丈門三皆有樓東宮周一里二百步路西宮在長秋門周一里二百二十六步秦始皇帝二十一年守宮者照鷰失火燒之吳越春秋曰鯀築城以衛君造郭以居人此城郭之始也又曰范蠡觀天文法於紫宮築作小城周千一百二十二步一員三方西北立飛翼之樓以象天門東南服漏石竇以象地戶陵門四達以象八風外郭築城而缺西北示服事吳也不敢壅塞內以取吳故缺西北而吳不知也又曰伍子胥為吳相土嘗水象天法地造築大城周廻四十七里陸門八以象天之八風水門八以象地之八窗築小城十里陸門三東面者欲以絕越明矣立閶門者以象天門通閶闔風立地門者以象地戶也闔閭欲西破㢰強楚楚在西北故立閶門以通天氣也因復名破楚門水經注云葉東界有故城犨縣東至瀙水達泚陽縣界南北聯聯數百里號為方城一謂之長城云酈縣有故城一面未詳里數號為長城即此城之西隅其間相去六百里北南雖無基築皆連山相接而漢水流其南故屈完荅齊桓公云楚方城以為城漢水以為池郡國志曰葉縣有長城曰方城指此城也吳地記曰袁山松城晉書云左將軍袁山松陳郡人時為吳郡太守隆安五年築此城在灋瀆邊江城之以禦孫恩圍山松於此城陷害山松城今為波潮所衝以半毀江中山松城東夾江又有二城相對闔閭所築以備越處鄱陽記曰仙人城在縣東南其城皆峭壁危石直上千仞自古呼為仙人城每天空無雲秋日清澈其上宮殿倉廩歷歷可見趙曄吳越春秋曰堯聽四嶽之言用鯀修水鯀曰帝之遭天災厥黎及康乃築城造郭以為國固淮南子曰崑崙山上有層城九重列女傳曰齊人杞梁殖襲莒戰而死其妻無所歸乃就夫尸於城下而哭之七日城崩妻遂投淄水而死郭說文曰郭廓也廓落在城也禮記月令曰孟秋之月修宮室補城郭又禮記曰正月無置城郭妨農也國語曰火見而清風戒寒而修城郭月令曰孟夏坯城郭, SBCK: 續}
