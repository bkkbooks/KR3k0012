  - {type: variant, offset: 101, length: 0, content: '', SBCK: 以安之也又環人云掌送迎􅀖國之通賔客以路節逹諸四方舎則授館又云至于國賔入館次于舎門注云次待事于客儀禮公食大夫禮云有司卷三牲之爼歸于賔館注云牲之爼正饌尤尊盡以歸尊賔之至也又聘禮云厥明訝迎于館注云此訝下大夫以君命迎賔謂之訝迎亦皮弁也禮記曲禮上云問疾弗能遺不問其所欲見人弗能館不問其所舎又檀弓上云賔客至無所館夫子曰生於我乎館死於我乎殯又云子貢曰於門人之喪未有所說驂於舊館無乃以重乎又曽子問云卿大夫之家曰私館公館與公所爲曰公館注云公館若今縣官舎也左傳莊元年經云夏單伯送王􅁎秋築王􅁎之館于外注云公在諒闇慮齊侯當親迎不忍便以禮接於廟又不敢逆王命故改築舎於外也又僖三十年傳云晉分曹衛之田公使臧文仲徃􅀫於重館重館人告曰晉新得諸侯必親其㳟不速行將無及也又襄三十一年傳云子産相鄭鄭伯如晉晉侯以我喪故未之見也子産使壞其館之垣而納車馬士文伯讓之曰􅁦邑以政刑之不脩宼盗充斥是以令吏人完客所館今吾子壞之其若異客何子産曰僑聞之文公之爲盟主也宫室無􅀚卑庳臺榭以崇大諸侯之館今銅鞮之宫數里而諸侯舎於􅀠人門不容車不可踰越士文伯不能對晉侯見鄭伯有加禮厚其宴好而歸之乃築諸侯之館又昭十三年傳云宣子謂叔向曰子能歸季孫乎對曰不能鮒也能乃使叔魚見季孫曰鮒聞諸吏將爲子除館於西河其若之何且泣又曰叔孫所館雖一日必葺其牆屋去之如始至漢書薛宣子惠爲彭城令宣過之橋梁郵驛不脩宣知其不能又郊祀志曰孫卿曰仙人可見上徃常遽以故不見今陛下可爲館如維氏城置脯酒神人可致且仙人好樓居於是上令長安作飛廉桂館甘泉作延夀館又曰鄭莊置驛以延賔客又曰公孫弘起徒歩數年至宰相封侯於是起客館開東閤以延賢人與叅謀議又元后傳曰王莽又知}
