  - {type: variant, offset: 2665, length: 1, content: 汝, SBCK: 倉梧廣信女子􅂫娥行􅀫􅍎巢亭爲亭長龔壽所殺及婢致富取財物埋置樓下交阯刺史周敞行部􅀫亭覺夀姧罪奏之殺夀列異傳云鵠奔亭漢官典職曰洛陽二十四街街一亭十二城門門一亭魏略曰從長安至大􅁗人民連屬十里一亭魏書曰元皇后以漢延熹三年二月生齊郡白亭有黄氣滿室移日不散呉志曰孫權將如呉親乗馬射虎庱亭馬爲虎所傷權投以雙㦸虎即斃又曰大史慈與劉繇住縣立屯府大爲山越所附孫䇿躬自攻討遂見囚執䇿即解􅅞捉其手曰寜識神亭戰時􅁘若卿尓得我云何慈曰未可量也䇿大􅀏王隱晉書曰徐苗字叔胄髙密淳于人也曾祖至行感靈夜有神人告亭欲崩苗岀亭崩得免又曰王羲之􅀄渡江會稽有佳山水名士多居之與孫綽許詢謝尚支遁等宴集於山隂之蘭亭崔鴻十六國春秋曰慕容垂請入鄴城拜廟符不許乃潛服而入亭吏禁之垂怒斬吏燒亭而去沈約宋書曰孔􅇞子與王華並有富貴之願自徐羡之等秉權日夜構之於太祖寗子甞東歸至金昌亭左右欲泊船􅇞子命去之曰此弑君亭不可泊也又曰徐湛之爲廣陵郡守善爲政威惠並行廣陵城舊有髙樓湛之更加脩整更起風亭月觀吹臺琴室果竹繁茂花藥成行帝王丗紀曰桀敗於鳴條之野案孟子舜卒鳴條乃在東夷之地或言陳留平丘今有鳴條亭在安邑之西丗說曰過江諸人每至暇日輙相要出新亭藉卉飲宴周侯在坐而歎風景不殊舉目有江河之異皆相視流淚唯丞相愀然變色曰當共勠力王室尅復神州何至作楚囚相對泣􅁘夢書曰亭爲積功民所成也夢築亭者功積成也夢亭壞敗恩澤傷也韋耀雲陽賦曰八郷九市亭􅀱三六列樹表塗路有廬􅀫丹陽記曰京師三亭新亭呉舊亭也故基淪毁隆安中有丹陽尹司馬恢移創今地謝石創征虜亭三呉搢紳創治亭並太元中㝷陽記曰稽亭北瞰大江}
