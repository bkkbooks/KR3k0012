  - {type: variant, offset: 2667, length: 4, content: 廖扶畢志, SBCK: 望髙岳淹留逺客因以爲名焉劉楨京口記曰劫亭湖亭通阿湖陵郡治丹徒縣八縣來徃經過此湖中多劫於邊立亭因以爲名裴淵明廣州記曰尉佗築臺以朔望􅂛拜號爲朝拜臺傍江構起華館以送陸賈因稱朝亭永嘉記曰樂城縣三京亭此亭是祖送行人之所王韶之始興記曰淘水源有堯山長嶺}
