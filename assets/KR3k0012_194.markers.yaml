  - {type: variant, offset: 2653, length: 6, content: 為郡縣治城郭, SBCK: 掃灑不欲穢汙地良乆乃聽止吏因問曰田將軍子從長安來何時發幾日至孝曰㝷到矣張璠漢記曰楚曄爲天水太守之官與故太守䘮會於隴亭堂吏移䘮避曄曄讓䘮於正堂􅀜西稱之}
