  - {type: variant, offset: 630, length: 1, content: 坂, krp: 西則有平樂都場示逺之館龍省盤蜿天馬半漢劉邵趙都賦曰置酒乎黄華之館左思魏都賦曰營密館以周坊飾賔侣之所集潘尼東都館賦曰東館者蓋東武陽侯之館也我而遷居}
