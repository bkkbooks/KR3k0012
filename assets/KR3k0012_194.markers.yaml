  - {type: variant, offset: 5, length: 2, content: 一城, SBCK: 二館驛傳舎亭館驛說文云館客舎也從食官聲周禮曰五十里有市市有館館有積以待朝聘之客廣雅釋宫云館舎也桂􅁐云客舎也待賔之舎曰館開元文字云凡事之賔客館焉舎也館有積以待朝聘之官是也客舎逆旅名􅀱館也公館者公宫與公所爲也私館者自卿大夫以}
