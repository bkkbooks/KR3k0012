  - {type: variant, offset: 2697, length: 0, content: '', SBCK: 蹕㑹稽記云江夏太守宋輔於重山南白樓亭立學敎授又郡國志云沛國桓儼避地至㑹稽聞陳業賢而徃􅀱之不見臨去入交州留書繫白樓亭柱而别翻陽記曰白雲亭在縣西南旁對干越亭而峙焉跨古城之危瞰長江之深隋州刺史劉長卿題詩曰􅀌城上與白雲齊因以白雲爲名豫章記曰徐孺}
