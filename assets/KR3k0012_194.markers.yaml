  - {type: punctuation, offset: 637, content: 「, id: KR3k0012_CHANT_194-bkkpn203}
  - {type: variant, offset: 637, length: 10, content: 汴之高陵城即高陽之墟, krp: 傳傳}
  - {type: variant, offset: 639, length: 768, content: 高陵城即高陽之墟也繁陽城漢云外黃縣有繁陽亭張耳為外黃令有夏后祠神井能興雨雹又曰徐州薛城高厚無比多出暴桀子弟蓋孟嘗君餘風也又曰六壁府後魏太平真君五年討胡於六壁即此城俗以城有六面因以為名焉又有虢城虞城相傳云晉既滅虞虢遷其人於此築城以居之又曰幽州無終縣西平城即李廣射石虎之處又曰復州竟陵城雲夢城城西大澤即古雲夢澤也卻月城在河口魏將黃祖所守處又曰媯州涿鹿城即黃帝擒蚩尤處黃帝泉今枯而不流即古之版泉也又曰涼州昌松縣有鸞鳥城魏改為神鳥城張軌時有五色鳥集於其處築城又曰衛州有狗城蓋紂養狗之處也又曰洛州夫人城即趙武靈王夫人築也又曰衛州有酒城又曰涼州臥龍城又云鳥城亦名多翅城又曰登州文登縣有不夜城尚書城有石橋即秦始皇造欲觀日處文登山始皇召文士而登此山又曰齊有士鄉城鄭玄云齊有士鄉城越有君子軍又曰同州韓城即韓原也詩所謂韓侯受命是此韓地春秋時秦擒晉惠公處也又曰肅州福祿城因謝艾所築也又曰廉州宋太始年陳伯紹平夷至合浦見三青牛圍之不獲即其處置城俗號青牛城又曰箕子城石勒每破一州必簡別衣冠號為君子城泊乎幽州擢荀綽裴憲等還襄國路經此後俗訛為箕子城又曰平州孤竹城即孤竹國也漢靈帝時遼西守廉翻夢人云余孤竹君之子也今遼海漂吾棺明日見浮棺因葬之又曰雲中府齊柳牙舒城有道人城初築時有仙人遊其地遂名城焉又曰成都郡城秦惠王二十七年張儀築以象咸陽沃野千里號曰陸海有萬歲池即築城取土之處也又曰定州博陵縣唐城堯為唐侯國於此又曰陽翟縣舊屬汝州有雞鳴城又曰隨州博望城即張騫封侯之國也又曰許州雍城即黃帝臣雍父始作杵臼處又曰朔州太平城後魏穆帝治也太極殿琉璃臺瓦及鴟尾悉以琉璃為之又曰鄭州博浪城即張良為韓報仇擊秦王處又曰雍州杜城在安仙門南七里春秋范宣子云在周為唐杜氏即是此也又曰益陽城魯肅築也云登之望見長沙城邑人馬形色宛然相去三百里故老云長沙益陽一時相望又曰廣州萬人城即尉佗故城也又曰張掖郡竇融築, WYG: ''}
