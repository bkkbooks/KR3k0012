  - {type: variant, offset: 101, length: 0, content: '', WYG: 以安之也又環人云掌送迎邦國之通賔客以路節達諸四方舍則授館又云至于國賔入館次于舍門注次待事于客儀禮公食大夫禮云有司卷三牲之爼歸于賔館注云牲之爼正饌尤尊盡以歸尊賔之至也又聘禮云厥明訝迎于館注云此訝下大夫以君命迎賔謂之訝迎亦皮弁也禮記曲禮上云問疾弗能遺不問其所欲見人弗能館不問其所舎又檀弓上云賔客至無所館夫子曰生於我乎舘死於我乎殯又曰子貢曰於門人之䘮未有所脱驂脫驂於舊館無乃已重乎又曽子問云卿大夫之家曰私館與公所為曰公館注云公館若今縣之官舍也左傳荘元年經曰夏單伯送王姬秋築王姬之館于外注云公在諒闇慮齊侯當親迎不忍便以禮接於廟又不敢逆王命故改築舎於外也又僖三十年傳云晉分曹衛之田公使臧文仲往宿於重館重館人曰晉新得諸侯必親其恭不速行将無及也又襄三十一年傳云子産相鄭伯如晉晉侯以我䘮故未之見也子産使壊其館之垣而納車馬士文伯讓之曰敝邑以政刑之不修寇盜充斥是以令吏人完客所館今吾子壊之其若異客何子産曰僑聞之文公之為盟主也宫室無觀臺榭以崇大諸侯之館今銅鞮之宫數里而諸侯舎於𨽻人門不容車不可踰越士文伯不能對晉侯見鄭伯有加禮厚其宴好而歸之乃築諸侯之館又昭十三年傳云宣子謂叔向曰子能歸季孫乎對曰不能鮒也能乃使叔魚見季孫曰鮒聞諸吏将為子除館於西河其若之何且泣又曰叔孫所館雖一日必葺其牆屋去之如始至漢書薛宣子恵為彭城令宣過之橋梁郵驛不修宣知其不能又郊祀志曰孫卿曰僊人可見上往常遽以故不能見今陛下可為館如緱氏城置脯棗神人可致且􅋖人好樓居於是上令長安作飛廉桂館甘泉作延夀館又曰鄭荘置驛以延賔客又曰公孫𢎞起徒歩數年至宰相封侯於是起客館開東閣以延賢人與叅謀議又元后傳曰王莽又知}
