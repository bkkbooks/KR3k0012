  - {type: variant, offset: 109, length: 5, content: 築睢陽城十, SBCK: 遊於忘憂之館進諸游士各使爲賦隱訣易遷館含眞臺有女眞}
  - {type: variant, offset: 109, length: 2, content: 築睢, WYG: 逰於忘憂之館進諸逰士各使為賦隐設易遷館􅅤貞臺有女貞二人為主一曰張微子二曰傅禮和晉宫閣名云華林園有繁昌館建康館顯昌館延祚館夀安館千禄館班孟堅西都賦云於是天子乃登屬玉之館厯長楊之榭張平子西京賦曰顧往昔之遺館獲林光於秦餘又云郡國宫館百四十五石極盩厔并卷鄷鄠又云豫章珍館掲焉中峙班􅀈妤自傷賦曰痛}
  - {type: page-break, offset: 109, content: '', id: KR3k0012_WYG_194-8a, image: WYG0894/WYG0894-0710c.png}
  - {type: variant, offset: 109, length: 5, content: 築睢陽城十, krp: 遊於忘憂之館進諸游士各使爲賦隱訣易遷館含眞臺有女眞}
  - {type: variant, offset: 112, length: 1, content: 城, WYG: 禄與柘館皆宫名生二子處此二館皆失也乃褓襁而罹災豈妾人之殃咎兮将天命之不可求也張衡西京賦曰既新作於迎風增雨露與儲胥託髙基於山岡直摕霓以髙居薛綜注曰皆係館名張衡東京賦曰其西則有平樂都場示逺之館龍省盤蛇天馬半漢劉劭趙都賦曰置酒乎黄華之館左思魏都賦曰營宻館以周坊飭賔侣之所業潘尼東都館賦曰東館者盖東都侯之館也俄而遷居謂余曰吾将老焉故有終焉之心而無移易之意子且為我賦之傳舍釋名曰傳傳也人所止息而去後人復來轉相傳無常人也史記曰藺相如為趙王奉璧使秦秦王舍之廣成傳舍索隠曰廣成是傳舍之名傳載曰鄭審開元中為殿中侍御史充館驛使令每傳舍立}
