  - {type: variant, offset: 3120, length: 1511, content: 九月始平獻嘉禾一莖十七穗白虎通曰嘉禾者太和之為美瑞者也晉徵祥說曰王者盛德則嘉禾生嘉禾者仁卉也其大盈箱一桴二米國政質則同本而異頴國政文則同頴而異本唐書曰開元十九年楊州奏穭生稻二百一十五頃再熟稻一千八百頃其粒與常稻無異穭音旅又曰大中二年福建進瑞粟十五莖莖有五六穗又曰大中六年淮南節度使杜悰奏海陵高郵兩縣百姓於宮河中漉得異米煮食呼為聖米秬鬯孫氏瑞應圖曰秬鬯者三隅之黍一粰三米王者宗廟修則生又曰昭穆序祭祠宰人咸有敬讓禮容之節威儀之美則秬鬯生又曰王者節敬依禮度親踈有別則秬鬯生又曰黃帝時南夷乘白鹿來獻秬鬯孝經援神契曰王者德至於地則秬鬯生福草孫氏瑞應圖曰王者宗廟至敬則福草生於廟一云禮草禮斗威儀曰君乘木而王其政升平則福草生廟中宋均曰廟中生草蓋福草也即朱草之別名可以染祭服故應仁孝而生廟中福并孫氏瑞圖曰福并瑞草生王者有德則福并生威蕤孫氏瑞應圖曰王者禮備則威蕤生一曰威蕤又曰王者愛人倫則威蕤生於殿前屈軼孫氏瑞應圖曰屈軼者太平之代生於庭有佞人則草指之延嘉孫氏瑞應圖曰延嘉王者有德則見又曰王孝道行則延嘉生孝經援神契曰天子至德屬于木四海則延嘉生紫達孫氏瑞應圖曰紫達者王者仁義行則常見禮斗威儀曰君乘土而王其政太平則紫達常生芝孫氏瑞應圖曰王者慈仁則芝草生食之令人延年又曰王者寵近耆老養有道則芝莢生春秋運斗樞曰搖光得則陵出玄芝孝經援神契曰王者德至於草木則芝草生漢書曰武帝元封六年甘泉宮內產芝草九莖連葉宣帝神雀元年金芝九莖產于涵德殿銅池中如淳曰銅池承霤也晉灼曰以銅作池韋昭曰以銅飾池邊也後漢書曰明帝時郡國上芝英又曰章帝建初三年零陵獻芝草東觀漢記曰桓帝時芝草生中黃藏府宋書曰順帝時臨城縣生紫芝齊書曰武帝時襄陽獲紫芝隋書曰開皇十九年朱雀等十六門生芝草唐書曰貞觀十七年安禮門御榻產靈芝五莖又皇太子寢室中產素芝十四莖悉為龍鳳之狀又曰貞觀十七年滁州言所部川源徧生芝草百寮及雍州父老上表固請封禪唐春秋曰貞觀十九年雍州李樹生芝英赤蓋紫光色鮮麗司徒長孫無忌與官方岳上表請禪不許又曰天寶七載三月大同殿柱礎產王芝兩莖又曰肅宗上元二年甲辰延英殿御卒梁上玉芝生一莖三花御製靈芝詩以示群下又曰上元二年九月壬午朔皇后奏含暉院生金芝大同起居注曰九年金芝二十八莖生于殿庭少府卿蕭介以聞古今注曰漢武時甘泉殿房內產芝九莖連葉作芝房之歌白虎通曰王者德至於山則芝實茂孫整長歷曰黃帝以五芝為房名瑞令記曰食芝延年不終與真人同論衡曰建初三年零陵泉陵縣女子愽寧宅內生芝草五本莖葉紫色太守沈酆遣門下掾奉獻皇帝悅懌又曰芝草一年三華食之令人眉壽慶世蓋仙人之所食又曰紫芝者其栽如豆繆襲神芝讚曰青龍元年神芝產于長平之習陽許昌典農中郎蔣充奉表以聞其色丹紫其質光耀上別為三幹分為九枝散為三十六莖委綏連屬有似珊瑚之狀考圖按譜蓋美乎前代矣蘭禮斗威儀曰君乘金而王其政和平則蘭常生宋均曰蘭生主給和調也茅史記曰齊桓公欲封禪管仲曰古之封禪鄗上之黍北里之禾江淮之間有一茅三脊所以為藉周書曰成王時奇幹獻茅其頭若雄雉佩之不昧宋書曰孝武時三脊茅生石頭西岸江夏王義恭表勸封禪唐書曰麟德元年毫州奏老君廟側生三脊茅蒿大戴禮曰周時德澤洽和蒿大可以為宮柱曰蒿宮此天子之路寢也木禮稽命徵曰王者得禮之制則澤谷之中生赤木又曰王者得禮之宜則宗廟生祥木地鏡圖曰國治益地則木生水上又曰國理君喜則樹木忽自大京房易傳曰君有德生聖子則木生屋上及朝廷又曰君德強且高昌則木生城脅一尺圍已上長數丈此謂城強孫氏瑞應圖曰王者德化洽八方合為一家則木連理又曰王者不失民心則木連理漢書曰武帝幸雍得奇木枝旁出復合上異之終軍曰眾枝內附示無外也殆將有削尤袵而蒙化者後漢書曰明帝永安十七年甘露仍降樹枝內附仍頻也內附謂木連理也西南夷哀牢儋耳僬僥槃木白狼動黏諸種前後慕義貢獻西域諸國遣子入侍, SBCK: 祚􅀍殺}
