  - {type: variant, offset: 840, length: 1793, content: 者痼疾皆差也唐書曰貞觀二十三年肅州醴泉出有文石五彩蓋泉尚書中候曰醴甘也取名醴酒又曰堯砥德匪懈醴泉出又曰文命盛德俊乂在官醴泉出山禮斗威儀曰醴泉味甘王政和可貴故水甘也禮稽命徵曰王者刑殺當罪賞賜當功得禮之儀則醴泉出闕庭也又曰王者得禮之制則澤谷之中白泉出飲之使壽長禮含文嘉曰神農修德作耒耨地應以醴泉春秋潛潭巴曰君德應陽則醴泉出焉春秋潛潭樞曰旋星得則醴泉出春秋感精符曰德淪於地則醴泉出焉孝經援神契曰王者德至淵泉則醴泉出孫氏瑞應圖曰醴泉者水之精也味甘如醴泉出流所及草木皆茂飲之令人壽也又曰理訟得所醴泉出於京師有仙人以爵酌之白虎通曰德至淵泉則醴泉湧醴泉者美泉也狀如醴酒可以養老也鶡冠子曰聖人德上及太寧中及萬靈則醴泉出徐整正曆曰黃帝上時以醴泉為漿井孫氏瑞應圖曰王者清淨則浪井出有仙人主之典略曰浪井者不鑿自成之井池唐書曰大曆八年解州安邑兩池生乳鹽後賜號寶應靈慶池土左傳曰晉文公過衛文公不禮出於五鹿乞食於野野人與之塊公子欲鞭之子犯曰天賜也稽首受而載之史記曰黃帝時有土瑞故以土德王庚溫瑞應圖曰王者德溫遠方則物化為土蜀王本紀曰蜀王獵於褒谷秦王以金一笥遺蜀報以禮物盡化為土秦王大怒臣下拜賀曰土者地也今秦當有蜀矣社漢書曰昌邑王門社有枯樹復生枝葉後宣帝立晉書曰武帝時洛陽太社中有青氣占者以為東莞後當有天子東莞王改封琅邪王江東之應也春秋潛潭巴曰里社鳴此里有聖人其呴百姓歸之呴鳴之怒者湯起放桀時有此祥呴呴呼后切石漢書曰昭帝時太山萊蕪山南匈匈有數千聲民視之有大石自立高一丈五尺大三十八圍入地深八尺三石為足立後有白鳥數千集其旁宣帝中興之瑞也唐書曰貞觀十九年陝州有石理成文曰李君王三字甚明又曰永徵二年藍田縣令田仁注獻瑞石文理成字曰天安永得立祥瑞圖曰張掖之柳谷有石始見於建安成形於黃初文備於太和建安黃初太和皆年號其石狀象龜嶷然盤峙廣一丈六尺長一丈七尺周圍五丈餘蒼質麟鳳龍馬炳燠成形文字燦然斯蓋大晉受終聖德兼該之應也魏氏春秋曰明帝青龍三年張掖刪丹縣金山玄川溢涌寶石負圖狀象靈龜立于川西有石馬七其一仙人騎之其一羈絆其五有形而不善成有玉匣關闔於前上有玉字玉缺二王橫一又有麒麟在東鳳凰在南白虎在西犧牛在北馬自中布列南方有字曰大討曹金但取之此司馬氏革運之徵瑞應圖曰碧石玉者玩弄之物不用則出禮稽命徵曰王者得禮之制則澤谷之中乃生白石又曰王者君臣父子夫妻尊卑有別則石生於澤也禮含文嘉曰內外之制各得其宜則山澤出龜寶石萐莆孫氏瑞應圖曰萐莆王者不徵滋味庖廚不踰深盛則生於廚一名倚扇一名實閭一名倚萐生如蓮枝多葉少根如絲轉而生風主於飲食清涼驅殺蟲蠅舜時生於廚又堯時冬死夏生又舜時生於廚及階左春秋潛潭巴曰君臣和得道度叶中則萐莆孳於庖廚孝經援神契曰王者德至山陵則阜出萐莆宋均注曰文典備則萐莆應也華莆祥瑞圖曰雙蓮為苹又曰華苹者其枝正平王者德剛則仰弱則低又曰王者政令均則華苹孝經援神契曰王者德至於地則華苹感朱草孫氏瑞應圖曰朱草草之精也聖人之德無所不至則生又曰朱草者百草之精也王者德無所不通四方有歌詠之聲則生大戴禮共朱草日生一葉至十六日落一葉周而復始尚書大傳曰王者德下究地之厚則朱草生又曰帝命周公踐祚朱草暢生尚書中候曰文命咸得俊乂在官則朱草在郊又曰堯德清平比隆伏羲故朱草生郊禮斗威儀曰君乘火而王其政頌平則地生朱草春秋感精符曰王者德洽於地則朱草生食之令人不老春秋運鬥樞曰樞星則朱草生春秋繁露曰君勸農事無奪民時使之歲不過三日行十一之稅進經術之士開閶閭通障塞恩及草木則朱草生孝經援神契曰王者德至草木則朱草生後漢書曰光武時朱草生于水涯晉書曰武帝時朱草生白虎通曰朱草赤色也可以染綘別成黼黻之服列為尊卑之差淮南子曰太清之世四時不失其房日月揚光五星循軌則朱草生抱朴子曰朱草狀似小桑裁長三四尺枝葉皆赤莖如珊瑚生名山嶺石之下刻之汁流如血以玉及八石金銀投中中立可丸為泥以金投中名曰金漿以玉投之名曰玉釀服之皆長生也鶡冠子曰聖王德上及太清下及太寧中及萬靈則朱草生魏略曰文帝欲受禪朱草生於文昌殿側蓂莢孫氏瑞應圖曰蓂莢者葉圓而五色一名曆莢十五葉日生一葉從朔至望畢從十六日毀一葉至晦而盡月小則一葉卷而不落聖明之瑞也人君德合乾坤則生祥瑞圖曰蓂莢堯時生尚書大傳曰周公輔幼主不矜功則蓂莢生尚書中候曰周公作樂而治蓂莢生春秋運斗樞曰老人星臨國則蓂莢生又曰箕星得則蓂莢生孝經援神契曰王者德至於地則蓂莢生風俗通曰按孝經說古太平蓂莢生階其味酸王者取以調味後以醯醢代之徐整正曆曰黃帝之時以蓂莢者瑞草也蓋神靈之嘉應, WYG: 妖}
