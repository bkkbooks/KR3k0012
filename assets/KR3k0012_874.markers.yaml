  - {type: variant, offset: 2291, length: 342, content: 服列為尊卑之差淮南子曰太清之世四時不失其房日月揚光五星循軌則朱草生抱朴子曰朱草狀似小桑裁長三四尺枝葉皆赤莖如珊瑚生名山嶺石之下刻之汁流如血以玉及八石金銀投中中立可丸為泥以金投中名曰金漿以玉投之名曰玉釀服之皆長生也鶡冠子曰聖王德上及太清下及太寧中及萬靈則朱草生魏略曰文帝欲受禪朱草生於文昌殿側蓂莢孫氏瑞應圖曰蓂莢者葉圓而五色一名曆莢十五葉日生一葉從朔至望畢從十六日毀一葉至晦而盡月小則一葉卷而不落聖明之瑞也人君德合乾坤則生祥瑞圖曰蓂莢堯時生尚書大傳曰周公輔幼主不矜功則蓂莢生尚書中候曰周公作樂而治蓂莢生春秋運斗樞曰老人星臨國則蓂莢生又曰箕星得則蓂莢生孝經援神契曰王者德至於地則蓂莢生風俗通曰按孝經說古太平蓂莢生階其味酸王者取以調味後以醯醢代之徐整正曆曰黃帝之時以蓂莢者瑞草也蓋神靈之嘉應, SBCK: 妭}
