markers:
  front:
  - {type: variant, offset: 0, length: 65, content: 地地禮曰地不愛其寶符瑞圖曰地得其性不震搖也祥瑞圖曰王者益土地則社稷及市中地長山管子曰霸王之主興則昇山之神見休子曰少皞生於稚華之渚渚, SBCK: 太平御覽卷第八百七十四咎徴部}
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_874-1a}
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書太平御覽卷八百七十四宋李昉等撰咎徴部一叙咎徴天天裂天開天光天崩天鳴四時叙咎徴易曰履霜堅氷至文言曰積善之家必有餘慶積不善之家必有餘殃又曰吉凶悔吝生乎動者也尚書洪範曰咎徴曰狂恒雨若僭恒暘若豫恒燠若急恒寒若䝉恒風若左傳曰初内虵與外蛇鬭於鄭南門中内虵死六年而厲公入公聞之問於申繻曰猶有妖乎對曰人之所忌其氣􅆋以取之妖由人興也人無釁焉妖不自作人棄常則妖興故有妖易筮謀類曰斗機絶綱玉衡撥攝提亡鄭𤣥注曰斗機羅斗者天中之星天失其平故斗機絶綱玉衡機也攝提者斗前之星爲斗施政教布之八野今斗失其正故攝提亦爲之不見五星合狼􅈢張晝視無日虹蜺煌煌夜視無月彗孛蔣蔣此皆屬乾乾多爲天失其正故著天者皆失其正也當藏者出當出者消危處易期當藏者出解晝視無日虹蜺煌煌也當出者消解夜視無月也是爲危處易期太山失金雞西岳亡玉羊太山失金雞者箕星亡也箕者爲風風動雞鳴今期候者亡故雞亦亡西岳亡玉羊者狼星亡狼在於未爲羊也天卑}
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_874-1a, image: WYG0900/WYG0900-0623a.png}
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_874-1b, image: WYG0900/WYG0900-0623b.png}
