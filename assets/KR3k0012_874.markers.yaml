  - {type: variant, offset: 725, length: 114, content: 水清天下平禮斗威儀曰君乘土而王其政太平則蒙水出於山宋均曰蒙小水也出可溉灌生無不植也異苑曰臨淄牛山下有女水齊人諺曰世治則女水流世亂則女水竭慕容超時乾涸彌載暨宋武薄伐而激洪波醴泉禮曰地出醴泉東觀漢記曰光武中元元年祠長陵還醴泉出京師飲, WYG: 殷國}
