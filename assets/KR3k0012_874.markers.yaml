  - {type: variant, offset: 1224, length: 1, content: 禮, SBCK: 自作人弃常則妖興故有妖易是􅀋謀曰斗機絶綱玉衡撥攝提亡鄭玄注曰斗機絶綱斗者天中之精天失其平故斗機絶綱玉衡撥也攝提者斗前之星爲斗施政教布之八野今斗失其正故攝提亦爲之亡不見五星合狼弧張晝視無日虹蜺煌煌夜視無月彗孛蔣蔣此皆屬乾乾多爲天失其主故著天者皆失其正也當藏者}
