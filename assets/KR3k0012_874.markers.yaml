  - {type: variant, offset: 1326, length: 750, content: 今秦當有蜀矣社漢書曰昌邑王門社有枯樹復生枝葉後宣帝立晉書曰武帝時洛陽太社中有青氣占者以為東莞後當有天子東莞王改封琅邪王江東之應也春秋潛潭巴曰里社鳴此里有聖人其呴百姓歸之呴鳴之怒者湯起放桀時有此祥呴呴呼后切石漢書曰昭帝時太山萊蕪山南匈匈有數千聲民視之有大石自立高一丈五尺大三十八圍入地深八尺三石為足立後有白鳥數千集其旁宣帝中興之瑞也唐書曰貞觀十九年陝州有石理成文曰李君王三字甚明又曰永徵二年藍田縣令田仁注獻瑞石文理成字曰天安永得立祥瑞圖曰張掖之柳谷有石始見於建安成形於黃初文備於太和建安黃初太和皆年號其石狀象龜嶷然盤峙廣一丈六尺長一丈七尺周圍五丈餘蒼質麟鳳龍馬炳燠成形文字燦然斯蓋大晉受終聖德兼該之應也魏氏春秋曰明帝青龍三年張掖刪丹縣金山玄川溢涌寶石負圖狀象靈龜立于川西有石馬七其一仙人騎之其一羈絆其五有形而不善成有玉匣關闔於前上有玉字玉缺二王橫一又有麒麟在東鳳凰在南白虎在西犧牛在北馬自中布列南方有字曰大討曹金但取之此司馬氏革運之徵瑞應圖曰碧石玉者玩弄之物不用則出禮稽命徵曰王者得禮之制則澤谷之中乃生白石又曰王者君臣父子夫妻尊卑有別則石生於澤也禮含文嘉曰內外之制各得其宜則山澤出龜寶石萐莆孫氏瑞應圖曰萐莆王者不徵滋味庖廚不踰深盛則生於廚一名倚扇一名實閭一名倚萐生如蓮枝多葉少根如絲轉而生風主於飲食清涼驅殺蟲蠅舜時生於廚又堯時冬死夏生又舜時生於廚及階左春秋潛潭巴曰君臣和得道度叶中則萐莆孳於庖廚孝經援神契曰王者德至山陵則阜出萐莆宋均注曰文典備則萐莆應也華莆祥瑞圖曰雙蓮為苹又曰華苹者其枝正平王者德剛則仰弱則低又曰王者政令均則華苹孝經援神契曰王者德至於地則華苹感朱草孫氏瑞應圖曰朱草草之精也聖人之德無所不至則生又曰朱草者百草之精也王者德無所不通四方有歌詠之聲則生大戴禮共朱草日生一葉至十六日落一葉周而復始, SBCK: ''}
