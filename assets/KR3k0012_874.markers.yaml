  - {type: variant, offset: 185, length: 134, content: 高宗永徽五年六日濟州黃河清十六里又曰肅宗乾元二年嵐州言黃河三十里清如井水十月李光弼破史思明眾五萬易乾鑿度曰聖人受命瑞應先見於河河水清又曰孔子云天之將降嘉應河水清變為白白變為赤赤變為黑黑變為黃各三日鄭玄曰聖王為政理之所致禮斗威儀曰君乘土而王其政太平則河溓宋均曰溓不決不溢, SBCK: 􅁻凶悔吝生乎動者}
  - {type: variant, offset: 185, length: 134, content: 高宗永徽五年六日濟州黃河清十六里又曰肅宗乾元二年嵐州言黃河三十里清如井水十月李光弼破史思明眾五萬易乾鑿度曰聖人受命瑞應先見於河河水清又曰孔子云天之將降嘉應河水清變為白白變為赤赤變為黑黑變為黃各三日鄭玄曰聖王為政理之所致禮斗威儀曰君乘土而王其政太平則河溓宋均曰溓不決不溢, krp: 吉凶悔吝生乎動者}
  - {type: variant, offset: 192, length: 431, content: 日濟州黃河清十六里又曰肅宗乾元二年嵐州言黃河三十里清如井水十月李光弼破史思明眾五萬易乾鑿度曰聖人受命瑞應先見於河河水清又曰孔子云天之將降嘉應河水清變為白白變為赤赤變為黑黑變為黃各三日鄭玄曰聖王為政理之所致禮斗威儀曰君乘土而王其政太平則河溓宋均曰溓不決不溢也謂溓然不盛也溓勒兼切符瑞圖曰河溓者河水清也孫氏瑞應圖曰王者循天命而行天道四通則河出龍圖東觀漢記曰光武從邯鄲避王郎兵南至下曲陽滹沱河道吏還言河水流澌無舡不可渡左右皆惶畏為王郎所及上命王霸前往視之實然霸念還言驚眾雖不可渡且臨水止尚阻即白冰堅可渡士眾大喜上大笑曰果妄言也比至河流澌冰合可履馬欲僵以囊盛沙布冰上既度未數里冰陷也海孫氏瑞應圖曰王者出而王道通移則海不揚鴻波禮斗威儀曰君乘水而王其政和平則江海著其神象宋均曰神不見但著象而已青黃赤白玄冰具有此色焉春秋運斗樞曰搖光則海出明珠雒謝承後漢書曰沛國陳宣子字子建建武十年雒水出造津城門或欲築塞之宣諫曰昔王尊正身金隄水退況聖主耶言未絕而水去尚書中候曰堯沉壁於洛赤光起又, WYG: 韜}
