  - {type: variant, offset: 1226, length: 0, content: '', krp: 當出者消危處易期當藏者岀解晝視無日虹蜺煌煌也當岀者消解夜視無月也是爲危處易期太山失金雞西岳亡玉羊太山失金雞者箕星亡也箕者爲風風動雞鳴今期侯者亡故雞亦亡西岳亡玉羊者狼星亡狼在}
  - {type: variant, offset: 1227, length: 4, content: 五鹿乞食, SBCK: 未爲羊也天卑地髙雷讙公行天下雷同讙譁公行無所畏也星晝奔蜺夜光上無乾下無常天昧昧履踐氷上無乾乾氣不正故下無常天地昧昧喻不正也晝視無日夜視無月何明之有乎履踐氷者峻急之法行􅀍其刑也民衣霧主吸霜民衣霧侫政行􅀍其毒也主吸霜􅀍隂毒將害躬也間可􅀝杵}
