  - {type: variant, offset: 746, length: 467, content: 水出於山宋均曰蒙小水也出可溉灌生無不植也異苑曰臨淄牛山下有女水齊人諺曰世治則女水流世亂則女水竭慕容超時乾涸彌載暨宋武薄伐而激洪波醴泉禮曰地出醴泉東觀漢記曰光武中元元年祠長陵還醴泉出京師飲之者痼疾皆差也唐書曰貞觀二十三年肅州醴泉出有文石五彩蓋泉尚書中候曰醴甘也取名醴酒又曰堯砥德匪懈醴泉出又曰文命盛德俊乂在官醴泉出山禮斗威儀曰醴泉味甘王政和可貴故水甘也禮稽命徵曰王者刑殺當罪賞賜當功得禮之儀則醴泉出闕庭也又曰王者得禮之制則澤谷之中白泉出飲之使壽長禮含文嘉曰神農修德作耒耨地應以醴泉春秋潛潭巴曰君德應陽則醴泉出焉春秋潛潭樞曰旋星得則醴泉出春秋感精符曰德淪於地則醴泉出焉孝經援神契曰王者德至淵泉則醴泉出孫氏瑞應圖曰醴泉者水之精也味甘如醴泉出流所及草木皆茂飲之令人壽也又曰理訟得所醴泉出於京師有仙人以爵酌之白虎通曰德至淵泉則醴泉湧醴泉者美泉也狀如醴酒可以養老也鶡冠子曰聖人德上及太寧中及萬靈則醴泉出徐整正曆曰黃帝上時以醴泉為漿井孫氏瑞應圖曰王者清淨則浪井出有仙人主之典略曰浪井者不鑿自成之井池唐書曰大曆八年解州安邑兩池生乳鹽後賜號寶應靈慶池土, SBCK: 􅁪風若}
