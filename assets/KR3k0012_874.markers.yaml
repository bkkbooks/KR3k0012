  - {type: variant, offset: 4977, length: 0, content: '', SBCK: 周宣帝建徳年天西北有聲如雷未幾吐谷渾大㓂邊又曰陳宣帝太建十二年天有聲如風水相擊三夜乃止又曰後主􅀄即位八月天有聲如風水相擊俄又如之九月夜天東北有聲如䖝飛漸移西北至徳元正月天東南有聲如䖝飛後降於隋隋書曰開皇二十年四月天有聲如㵼水自南而北六月􅁗王俊薨河圖稽命徴曰帝劉即位百七十年大隂在庚辰江充詭其變天鳴所坼四時禮記月令曰孟春行夏令則雨水不時草木早落國時有恐行秋令則人有大疫猋風暴雨揔至藜莠蓬蒿並興行冬令則水潦爲敗雪霜大摯首種不入仲春行秋冬則其國大氷寒氣揔至㓂戎來征行冬令則陽氣不勝麦乃不熟民多相掠行夏令則國乃大旱煖氣早來䖝螟爲害季春行冬令則寒氣時發草木皆肅國有大恐行夏令則人多疾疫時􅀨不降山陵不収行秋冬則天多沉隂􅁋雨早降兵革並起孟夏行秋令則苦雨數來五􅂖不滋四鄙入保行冬令則草木早枯後乃大水敗其城郭行春令則蝗虫爲災􅁀風來格秀草不實仲夏行冬令則雹凍傷􅂖道路不通􅁀兵來至行春令則五􅂖晩熟百螣時起其國乃饑行秋令則草木零落果實早成民殃於疫季夏行春令則榖實鮮落國多風欬民乃遷徙行秋令則丘隰水潦禾稼不熟乃多女災行冬令則風氣不時鷹隼早鷙四鄙入保孟秋行冬令則隂氣大勝介䖝敗􅂖戎兵乃來行春令則其國乃旱陽氣復還五穀無實行夏令則其國多火災寒􅀬不節民多瘧疾仲秋行春令則秋雨不降草木生榮國乃有恐行夏令則其國大旱蟄蟲不藏五榖復生行冬令則風災數起􅀵雷先行草木早死季秋行夏令則其國大水冬藏殃敗民多􅍠嚏行冬令則國多盗賊邊境不寧􅁟地分裂行春令則煖風來至民氣懈惰師興不居孟冬行春令則凍閉不宻地氣上洩民多流亡行夏令則國多􅁀風方冬不寒蟄䖝復出行秋令則霜雪不時小兵時起土地侵削仲冬行夏令則其國乃旱氛霧􅁳􅁳雷乃發聲行秋令則天時雨汁􅀲瓠不成國有大兵行春令則䖝蝗爲敗水泉咸竭民多疥癘季冬行秋令則白露早降介䖝爲妭四鄙入保行春令則胎天多傷國多固疾命之曰逆行夏令則水潦敗國時雪不降水凍消釋太}
