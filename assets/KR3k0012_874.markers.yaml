  - {type: variant, offset: 46, length: 145, content: 興則昇山之神見休子曰少皞生於稚華之渚渚一旦化為山鬱鬱葱葱焉湖吳志曰孫皓天璽年吳郡言臨平湖自漢來草穢壅塞今更開通長老傳言此湖塞天下大亂此湖開天下寧河北齊書曰武帝大寧二年齊州黃河清改清河元年隋書曰煬帝大業三年武陽言河水清唐書曰貞觀十四年陝州奏界內二百余裏正月元日河水變清四日乃止又曰高宗永徽五年, WYG: 也寤寐徴怪所以儆人臣也災妖不勝善政怪夢不勝善行}
