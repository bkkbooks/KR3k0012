  - {type: variant, offset: 31, length: 9, content: 社稷及市中地長山管, WYG: 木不曲直棄法律逐功臣殺太子以妾爲妻則火不炎上好治宫室飾臺榭内淫亂犯親戚侮父兄則稼穯不成好攻戰輕百姓飾城郭侵邊境則金不從革簡宗廟不禱祠廢祭祀逆天時水不潤下又曰爰用五事建用皇極一曰貌貌之不恭是謂不肅厥咎枉厥罰常雨厥極惡時則有龜孽時則有雞禍次二曰言言之不從是謂不乂厥咎僭厥罰常𤾉厥極憂時則有詩妖時則有介蟲之孽時則有大禍三曰視視之不明是謂不哲厥咎豫厥罰常燠厥極疾時則有草妖時則有果蟲之孽次四曰聽聽之不聰是謂不謀厥咎急厥罰常寒厥極貧時則有鼓妖時則有豕禍次五曰思思之不睿是謂不聖厥咎霧厥罰常風厥咎凶短折時則有脂夜之妖時則有乖孽時則有牛禍王之不極是謂不建厥咎震厥罰常隂厥極弱時則有射妖時則有龍蛇之孽時則有馬禍時則有日月亂行星辰逆行洪範五行𫝊曰凡有所害謂之災無所害而異於常謂之異故害爲已至異爲方來家語孔}
