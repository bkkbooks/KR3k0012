  - {type: variant, offset: 3382, length: 408, content: 如等緣宿憾乃奏暹及季舒過狀各鞭二百徒於馬城晝則供役夜置地牢璅語曰晉治氏女徒病棄之舞嚚之馬僮飲馬而見之病徒曰吾良夢馬僮曰汝奚夢乎曰吾夢乘水如河汾三馬當以告舞僮舞嚚自往視之曰尚可活吾買汝答曰既棄之矣猶未死乎舞嚚曰未遂買之至舞嚚氏而疾有間而生荀林父神異記又載之鍾離意別傳曰司徒侯霸辟意署議曹掾以詔書送囚徒三百餘人到河北連陰冬盛寒徒皆貫連械不復能行到弘農縣使令出見錢為徒作𥜗袴各有升數令對曰被詔書不敢妄出錢意曰使者奉詔命寧私行耶出錢便上尚書使者亦當上之光武皇帝得上狀見司徒侯霸曰所使吏何乃仁怒用心乎誠良吏也𥜗袴既且悉到前縣給賜糜粥後謂徒曰使者不忍善人嬰刑飢寒感惻於心今以得衣矣欲悉解善人械桎得逃去耶皆曰明使君哀徒恩過慈父身成灰土不敢逃亡意復曰徒中無欲歸候親者耶其有節義名者五六十人悉解械桎先遣之與期日會作所徒皆先期至也劉楨京口記曰有龍目湖秦始皇東遊觀地勢曰有天子氣使赭衣徒三千人鑿此中間長堽使斷因改名為丹徒風俗通曰徒不上墓說, krp: ''}
