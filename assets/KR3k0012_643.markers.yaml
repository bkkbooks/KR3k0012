  - {type: variant, offset: 1146, length: 8, content: 時楚王英謀反陰䟽, krp: 乎遂平理所出二千餘人掾吏叩頭諌曰誠仁者之心然獨爲君子將有悔乎篆曰邾文公不以一人易其身君子謂之知命如煞大尹贖二千人盍所願也遂稱疾去又曰鮑昱爲泚陽長縣人趙堅殺人繫獄其父母詣昱自言年七十餘唯有一子適新娶今繫獄當死長無種類涕泣求哀昱憐其言令將妻入獄解止宿遂任身有子衛宏漢舊儀曰郡邸獄理}
