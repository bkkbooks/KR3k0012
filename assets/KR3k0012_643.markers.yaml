  - {type: variant, offset: 1155, length: 1, content: 下, WYG: 有同懸鏡而鏁械膚體鬰結其中夫循諸己者可以知物傳曰其恕乎由此言之不可不慎又曰陽城為道州刺史觀察使判官督其賦至州恠城不出逆以問州吏吏曰刺史聞判官来以為有罪自囚於獄不敢出判官大驚馳入謁城於獄曰使君何罪某奉令来候安否耳留一二日未出去城因不復歸館門外有故門扇横地城晝夜坐卧其上判官不自安辭去晏子春秋曰景公籍重而獄多拘者滿圄怨者滿朝晏子諌不聴淮南子曰君不入獄為傷恩也論衡曰獬豸者一角之羊也性知有罪臯陶治其罪疑者令羊觸之有罪則觸無罪則不斯盖天生一角聖獸助獄為騐故臯陶禮羊跪坐事之此則神竒瑞應之類風俗通曰易噬嗑為獄獄十月之卦從犬言聲二犬亦存以守也廷者陽也陽主生長獄者隂也隂主刑煞故讞獄在廷皆順其位又曰詩云宜犴宜獄犴司空也周禮凡萬民之有罪過未離於法者桎梏以上坐諸嘉石役諸司空令平易道路也又曰周禮三王始有獄夏曰夏䑓言不害人若逰觀之臺桀拘湯是也殷曰羑里言不害人若於閭里紂拘文王是也周曰囹圄囹圄舉也言人幽閉思愆改惡為}
  - {type: page-break, offset: 1155, content: '', id: KR3k0012_WYG_643-10a, image: WYG0898/WYG0898-0738c.png}
  - {type: page-break, offset: 1155, content: '', id: KR3k0012_WYG_643-10b, image: WYG0898/WYG0898-0738d.png}
  - {type: variant, offset: 1156, length: 0, content: '', krp: 郡國上計屬大鴻臚東市獄屬京兆尹王隱晉書曰太康五年夏六月𥘉置黃沙獄晉書曰武帝置黃沙獄以典詔囚以髙光歴丗明法用爲黃沙御史又曰帝至平陽爲劉聦所幽辱麹允伏地號哭不能𧺫聦大怒幽之於獄允發憤自殺聦}
  - {type: variant, offset: 1157, length: 8, content: 士及楚事覺顯宗得, WYG: 因原之也今縣官録囚皆舉也三輔黄圖曰長安有九市二十四獄扶南傳曰扶南俗理訟無牢獄鞭杖唯以探湯捧鎻没水為信先使沐浴齋戒乃令以手内湯或捧熱鎻或没水中無罪者不爛不燋不沈犯罪者即騐也㑹稽典録曰鍾離意為堂邑令縣民防廣為父報仇繋獄}
  - {type: page-break, offset: 1157, content: '', id: KR3k0012_WYG_643-11a, image: WYG0898/WYG0898-0739a.png}
  - {type: variant, offset: 1157, length: 1, content: 士, krp: 其忠烈贈車騎將軍節愍侯又曰喬智明爲殁㓂將軍隆慮共二縣令愛之号爲神君部人張兊爲父報仇母老單身有妻無子智明愍之停其獄嵗餘令兊將妻入獄兼隂縱之人有勸兊免兊曰有君如此吾何忍累之縱吾得免作何面目視息丗間於獄産一男㑹赦得免又曰霍原字休明燕國廣陽人也少有智力叔父坐法當死原入獄訟之毒備加終免叔父晉令曰獄屋皆當完固厚其草蓐家人餉饋獄卒爲温暖傳致去家逺無餉饋者悉給􅮇獄卒作食寒者與衣疾者給醫藥宋書曰漑撝明帝立擢爲太子洗馬撝資籍豪冨厚自奉養供一身一月十萬宅宇山池妓妾姿藝皆窮上品才調流贍善納交遊愛妓陳玉珠明帝遣求不與逼奪之撝頗怨帝令有司誣奏將殺之撝入獄數宿鬚皆白免死繫尚方蕭子顯齊書曰戴僧静㑹稽永興人也少有膽力便弓馬於都載錦爲歐陽式所得繫兖州獄太祖遣薛深餉僧静酒食以刀子置魚腹中僧静與吏飲以刀刻械手自折鎻發屋而出歸太祖送止之齋内以其家貧年給粟千斛崔鴻後趙録曰石季龍幽中書令徐光于襄陽國詔獄光在獄中注解經史十餘萬言三國典略曰周諜入于齊爲楊州刺史平鍳所獲繫之獄妻生男鑒因喜醉檀放免之旣醒知非上啓自劾齊主特原其罪隋書曰裴政爲襄州緫管妻子不之官所受秩奉散給寮吏民有犯罪罪者隂悉知之或竟歲不發至再三犯乃因都㑹時於衆中召出親案其罪五人處死徒流者甚衆合境惶懾令行禁止小民蘇息稱爲神明尓後不修囹圄殆無爭訟又曰薛胄爲兖州刺史}
