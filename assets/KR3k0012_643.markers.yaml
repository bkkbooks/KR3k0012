  - {type: variant, offset: 1581, length: 659, content: 十餘冬至日悉遣還家過節皆反唯一人失期志曰此自太守事主者勿憂明旦果至以婦孕吏人又益歎服之又曰謝方明為驃騎長史理南郡年終江陵縣獄囚事無輕重悉放歸家使過正三日還到罪重者二十餘人綱紀已下莫不疑懼時晉陵郡送故主簿弘季咸徐壽之並隨在西固諫以為昔人雖有事或是記籍過言且當今人情薄不可以古義相許方明不納一時遣之囚及父兄並驚喜涕泣以為就死無恨至期有重罪二人其一醉不能歸逮二日反餘一囚十日不來五官朱千期請見自討之方明知為囚事使左右謝五官不須入囚當自反囚逡巡墟里不能自歸鄉村責讓率領將送意逃者遠近歎服焉北齊書曰梁湘東王繹遣世子方諸出鎮郢州顏之推常管記室值侯景陷郢之推被執頻欲殺之賴其行臺郎中王則屢護救免囚送建鄴北史曰蕭撝入周為上州剌史為政以禮讓為本嘗至元日獄中囚繫悉放歸家聽三日然後赴獄主者爭之撝曰昔王長虞延見稱前史吾雖寡德竊懷景行以之獲罪彌所甘心諸囚荷恩並依限而至吏人稱其惠化陳書曰張種以外戚賜無錫嘉興縣秩嘗於無錫見有重囚在獄天寒呼囚曝日遂失之陳文帝聞之笑而不責南史曰吉翰遷豫州梁郡諸軍時有死罪囚典籤意欲活之因翰入閤齋呈事翰省說語令且去明可更呈典籤不敢復入呼之乃來取昨所呈事視訖謂曰卿意當欲宥此囚死命昨於齋坐見其事亦有心活之但此囚罪重不可全貸既欲加恩卿便當代任其罪因命左右收典籤付獄殺之原此囚生命唐書曰韋仁壽隋大業末為蜀郡法司書佐獄無冤囚其有得罪者臨將就戮猶西向為仁壽禮佛而死又曰太宗親錄囚徒多所原宥見死罪者憫之放歸于家限至來秋即戮乃勑天下死囚皆放令入京並依期而集於是天下死罪囚三百九十人皆釋禁自至朝堂不勞督領一無逃散太宗感其奉法竟盡赦之, WYG: ''}
