  - {type: variant, offset: 3123, length: 4, content: 能生臣俊, SBCK: 詣昱自言年七十餘唯有一子適新娶今繫獄當死長無種類涕泣求哀昱憐其言令將妻入獄解止􅀫遂任身有子衛宏漢舊儀曰郡邸獄理天下郡國上計屬大鴻臚東市獄屬京兆尹王隱晉書曰太康五年夏六月􅀄置黃沙獄晉書曰武帝置黃沙獄以典詔囚以髙光歴丗明法用爲黃沙御史又曰帝至平陽爲劉聦所幽辱麹允伏地號􅂘}
