  - {type: variant, offset: 1198, length: 649, content: 京師覘候消息獄事持急無緣與續相聞母但作饋食付門卒以進之對食悲泣不能自勝使者怪而問其故續曰母來不得相見故但使泣耳使者大怒以為門吏通傳意氣將召案之續曰因食餉羹識母所自調和故知來耳非人告也母嘗截肉未嘗不方斷葱以寸為度是以知之魏志曰太祖征劉備先遣賈逵至斜谷視形勢道逢水衡載囚數十車逵以運急輒載重者一人皆放其餘太祖善之晉書曰曹攄為臨淄令獄有死囚歲夕攄行獄愍之曰卿等不幸至此非所如何新歲人情所重豈欲暫見家耶眾囚皆泣曰若得暫歸死無恨也攄悉開獄出之剋日令還掾史固爭咸謂不可攄曰此雖小人義不見負自為諸君任之至日相率而還並無違者一縣歎服號曰聖君北史曰後魏元麗拜雍州剌史為政嚴酷吏人惡之其妻崔氏誕一男麗遂出州獄囚死及徒流案未由臺者一時放免宋書曰王志累遷宣城內史清謹有恩惠郡人張倪吳慶爭囚經年不決志到官父老相謂曰王府君有德政吾鄉里乃有如此爭倪慶因相攜請罪所訟地遂成閑田後為東陽太守郡獄有重囚十餘冬至日悉遣還家過節皆反唯一人失期志曰此自太守事主者勿憂明旦果至以婦孕吏人又益歎服之又曰謝方明為驃騎長史理南郡年終江陵縣獄囚事無輕重悉放歸家使過正三日還到罪重者二十餘人綱紀已下莫不疑懼時晉陵郡送故主簿弘季咸徐壽之並隨在西固諫以為昔人雖有事或是記籍過言且當今人情薄不可以古義相許方明不納一時遣之囚及父兄並驚喜涕泣以為就死無恨至期有重罪二人其一醉不能歸逮二日反餘一囚十日不來五官朱千期請見自討之方明知為囚事使左右謝五官不須入囚當自反囚逡巡墟里不能自歸鄉村責讓率領將送意逃者遠近歎服焉北齊書曰梁湘東王繹遣世子方諸出鎮郢州顏之推常管記室值, SBCK: 更始奔走式}
