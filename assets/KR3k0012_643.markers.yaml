  - {type: variant, offset: 3454, length: 982, content: 馬當以告舞僮舞嚚自往視之曰尚可活吾買汝答曰既棄之矣猶未死乎舞嚚曰未遂買之至舞嚚氏而疾有間而生荀林父神異記又載之鍾離意別傳曰司徒侯霸辟意署議曹掾以詔書送囚徒三百餘人到河北連陰冬盛寒徒皆貫連械不復能行到弘農縣使令出見錢為徒作𥜗袴各有升數令對曰被詔書不敢妄出錢意曰使者奉詔命寧私行耶出錢便上尚書使者亦當上之光武皇帝得上狀見司徒侯霸曰所使吏何乃仁怒用心乎誠良吏也𥜗袴既且悉到前縣給賜糜粥後謂徒曰使者不忍善人嬰刑飢寒感惻於心今以得衣矣欲悉解善人械桎得逃去耶皆曰明使君哀徒恩過慈父身成灰土不敢逃亡意復曰徒中無欲歸候親者耶其有節義名者五六十人悉解械桎先遣之與期日會作所徒皆先期至也劉楨京口記曰有龍目湖秦始皇東遊觀地勢曰有天子氣使赭衣徒三千人鑿此中間長堽使斷因改名為丹徒風俗通曰徒不上墓說新遭刑罪原解者不可以上墓祠祀令人死亡謹案孝經身體髮膚受之父母曾子病困啟手足以歸全也今遭刑者髡首剔髮身被加笞新出狴犴臭穢不潔凡祭祀者孝子致齋貴馨香如親存也時見子被刑心有惻愴緣生事死恐明不歆承當不上墓耳郭子曰劉道真嘗為徒扶風王司馬駿以五疋布贖之既而用為從事中郎當時以為美談孔融肉刑論曰今之洛陽道橋作徒囚於廝役十死一生故國家常遣三府請詔月一案行又置南甄官使者主養病徒僅能存之語所謂洛陽豪徒韓伯密加笞三百不中一髡頭至耳髮詣膝此自為刑非國法之意徒作年數周禮秋官上大司寇曰以嘉石平罷民凡萬民之有罪過而未麗於法而害於州里者桎梏而坐諸嘉石役諸司空重罪旬有三日坐朞役其次九日坐九月役其次七日坐七月役其次五日坐五月役其下罪三日坐三月役使州里任之則宥而舍之又秋官上曰司圜掌收教罷民凡害人者弗使冠飾而加明刑焉任之以事而收教之能改者上罪三年而舍中罪二年而舍下罪一年而舍其不能改出圜土者殺漢書曰罪人獄已決完為城旦舂滿三歲為鬼薪白粲應邵注曰鬼薪為宗廟取薪白粲澤米使正白鬼薪白粲一歲為隸臣妾隸臣妾一歲免為庶人晉律曰髡鉗五歲刑笞二百若諸亡詐偽將吏越武庫垣兵守逃歸家兄弟保人之屬並五歲刑也四歲刑若復上聞入殿門上變事漏露泄選舉事誤發密事歐兄姊之屬並四歲刑三歲刑若傷人上而謗偽造官印不憂軍事戲殺人之屬並三歲刑也二歲刑二歲刑減一等入罰金二歲以至五歲刑皆耐罪若越城作弈走馬眾中有挾天文圖識之屬並為二歲刑張斐律序曰徒加不過六囚加不過五罪已定為徒未定為囚累作不過十一歲五歲徒犯一等加六歲犯六等加為十一歲作累笞不過千二百五歲徒加六等笞一千二百, WYG: ''}
