  - {type: variant, offset: 285, length: 177, content: 曰乘丘之役公以金僕姑射南宮長萬公右歂孫生搏之宋人請之宋公靳之曰始吾敬子今子魯囚也吾不敬子矣又曰晉襄公縛秦囚使萊駒以戈斬之囚呼萊駒失戈狼瞫音審取戈以斬囚遂以為右又曰鄭公子歸生受命于楚伐宋宋華元樂呂禦之戰于大棘宋師敗績囚華元獲樂呂又曰晉侯觀于軍府見鍾儀問之曰南冠而縶者誰也南冠楚冠也縶拘繫也有司對曰鄭人所獻楚囚也使稅之召而弔之再拜稽首問其族對曰伶人也公曰能樂, SBCK: 等足與治}
