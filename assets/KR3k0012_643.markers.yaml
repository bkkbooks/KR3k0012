  - {type: variant, offset: 1168, length: 4, content: 尹興名興, WYG: 義則還無義則已丞掾諌以為不可意曰不還之罪令自受之廣臨殯畢即自歸獄以状表上詔减死一等又曰盛吉字君達山隂人司徒虞延辟西曺掾時隴西太守鄧融以賍罪徴}
  - {type: page-break, offset: 1168, content: '', id: KR3k0012_WYG_643-11b, image: WYG0898/WYG0898-0739b.png}
  - {type: variant, offset: 1168, length: 4, content: 尹興名興, krp: 罪過巳離於法者桎梏以上坐諸嘉石役諸司空仐平易道路也又曰周禮三王始有獄夏曰夏臺言不害人若遊觀之臺桀拘湯是也殷曰姜里言不害人若於閭里紂拘文王是也周曰囹圄令圄舉也言人幽閉思愆改惡爲善因原之也今縣官録囚皆舉也三輔黄圗曰長安有九市二十四獄扶南傳曰扶南俗理訟無牢獄鞭杖唯以探湯捧鑕没水爲信先使沐浴齋戒乃令以手内湯或捧熱鑕或没水中無罪者不爛不燋不沒罪者即驗也㑹稽典録曰鍾離意爲堂邑令縣民房廣爲父報仇繫獄其母病死廣聞之號泣獄意爲之悽惻出廣見之曰今欲出若歸家殯歛有義則還無義則巳丞掾諌以爲不可意曰不還之罪令自受之廣臨殯畢即自獄以狀表上詔減死一等又曰盛吉字君逹山隂人司徒虞延辟西曹掾時隴西太守鄧融以贓罪徴}
