  - {type: variant, offset: 1147, length: 50, content: 楚王英謀反陰䟽天下善士及楚事覺顯宗得其錄有尹興名興詣廷尉獄續與主簿梁宏及掾史五百餘人詣洛陽詔獄續母遠, SBCK: 式侯恭以弟盆子爲赤眉所尊故自繫赤眉}
  - {type: variant, offset: 1147, length: 1, content: 楚, WYG: 於衆中召出親案其罪五人處死徒流者甚衆合境惶懾令行禁止小民蘇息稱為神明爾後不修囹圄殆無争訟又曰薛胄為兖州刺史及到官繋囚數百胄剖斷旬日便了囹圄空虛又曰栁儉拜蓬州刺史獄訟者庭遣不為文書約束縦容而已獄無繋囚唐書曰太祖行次靈石縣指獄而謂皇太子曰此何謂皇太子對曰此所謂圜獄将繋罪人太宗因曰文}
