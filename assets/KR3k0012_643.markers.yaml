  - {type: variant, offset: 224, length: 0, content: '', SBCK: 下也上作政而下行之不逆故上下無怨今叔父作政而不行無乃不可乎不行謂不順也夫君臣無獄獄訟也無是非曲直獄訟之義也今元咺雖直不可聽也君臣皆獄父子將獄是無上下也而叔父聽之一逆矣又爲臣殺其君安庸刑庸用刑法布刑而不庸再逆矣一合諸侯而有再逆政余懼其無後也在魯僖三十年無後無以復合諸侯不然余何私於衛侯晉人乃歸衛侯史記}
