  - {type: variant, offset: 2156, length: 179, content: 佛而死又曰太宗親錄囚徒多所原宥見死罪者憫之放歸于家限至來秋即戮乃勑天下死囚皆放令入京並依期而集於是天下死罪囚三百九十人皆釋禁自至朝堂不勞督領一無逃散太宗感其奉法竟盡赦之又曰高宗遵貞觀故事務在恤刑嘗問大理卿唐臨在獄繫囚之數臨對曰見囚五十餘人唯二人合死上以囚數少甚喜又曰呂元膺為蘄州剌史頗著恩信嘗歲終閱郡囚囚有自告者曰某有父母在明日元正不得相見因泣下元膺憫焉盡脫, SBCK: 解}
