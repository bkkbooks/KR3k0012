  - {type: variant, offset: 1921, length: 234, content: 長虞延見稱前史吾雖寡德竊懷景行以之獲罪彌所甘心諸囚荷恩並依限而至吏人稱其惠化陳書曰張種以外戚賜無錫嘉興縣秩嘗於無錫見有重囚在獄天寒呼囚曝日遂失之陳文帝聞之笑而不責南史曰吉翰遷豫州梁郡諸軍時有死罪囚典籤意欲活之因翰入閤齋呈事翰省說語令且去明可更呈典籤不敢復入呼之乃來取昨所呈事視訖謂曰卿意當欲宥此囚死命昨於齋坐見其事亦有心活之但此囚罪重不可全貸既欲加恩卿便當代任其罪因命左右收典籤付獄殺之原此囚生命唐書曰韋仁壽隋大業末為蜀郡法司書佐獄無冤囚其有得罪者臨將就戮猶西向為仁壽, SBCK: 劉}
