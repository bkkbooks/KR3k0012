  - {type: variant, offset: 2849, length: 145, content: 皇至湘山逢大風不得渡上問博士曰湘君何神對曰堯女舜妻也死而葬此始皇大怒使刑徒三千伐湘山樹赭其山上又曰高祖以亭長為縣送徒驪山徒多道亡自度比至多亡之到豐西澤中止飲夜乃解縱所送徒曰公等皆去吾亦從此逝矣徒中壯士願從者十餘人漢書曰匈奴侵寇王莽大募天下囚徒乃名曰豬突狶勇服虔曰突者逐也惟觸突人故取以為喻也, SBCK: ''}
  - {type: variant, offset: 2850, length: 4, content: 至湘山逢, WYG: 時拘繫無罪幽殺無辜衆庶怨恨無所告訴仰天而嘆曰恠哉感動皇天此憤氣之所生也故名之曰恠哉是地必秦之獄處也上有詔使丞相公孫𢎞案地圗果秦之獄處也上曰善當以去之朔曰夫積憂者得酒而去之以酒注虫立消靡上}
  - {type: variant, offset: 2850, length: 4, content: 至湘山逢, krp: 時拘繫無罪幽殺無辜衆庻怨恨無所告訴仰天而歎曰恠哉感動皇天此憤氣之所存也故名之曰怪哉是地必秦之獄處也上有詔使丞相公孫弘案地圗果秦之獄處也上曰善當何以去之朔曰夫積憂者得酒而去之以酒置中立消靡上}
