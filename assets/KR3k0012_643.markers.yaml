  - {type: variant, offset: 234, length: 2, content: 凡囚, SBCK: 孝文女也勃子勝之尚公主故獄吏教引爲證薄太后亦以勃無反事文帝朝太后以冒絮提文帝曰絳侯綰皇帝璽將兵於北軍不以此時反今居一小縣頋反耶文帝使持節赦絳侯復爵邑絳侯旣岀曰吾嘗將百萬軍然安知獄吏之貴也又曰鈎弋夫人得幸武帝乃生昭帝帝立時年五􅀊衛太子廢後上幸甘泉宫命􅀞工圗􅀞周公􅀒成王於是左右群臣知帝欲立少子後數日帝譴責鈎弋夫人夫人脫簮珥叩頭帝曰引持去送掖庭獄夫人還顧帝曰趣行汝不得活夫人死雲陽宫時􅁀風􅀭塵百姓感傷使}
