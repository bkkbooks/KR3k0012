  - {type: variant, offset: 1145, length: 0, content: '', WYG: 倪敞諌篆乃强起班春所至之縣獄犴填滿篆垂涕曰嗟乎刑罰不中乃陥民於穽此皆何罪至}
  - {type: variant, offset: 1145, length: 0, content: '', krp: 倪敝諌篆乃強起班春所至之縣獄犴填滿篆垂涕曰嗟乎刑罰不中乃䧟民於穽此皆何罪於}
  - {type: variant, offset: 1146, length: 0, content: '', WYG: 乎遂平理所出二千餘人掾吏叩頭諌曰誠仁者之心然獨為君子将有悔乎篆曰邾文公不以一人易其身君子謂之知命如殺大尹贖二千人葢所願也遂稱疾去又曰鮑昱為泚陽長縣人趙堅殺人繋獄其父母詣昱自言年七十餘唯有一子適新娶今繋獄當死長無種類涕泣求哀昱憐其言令将妻入獄遂妊身有子蕭子顯齊書曰戴僧静㑹稽永興人也少有膽力便弓馬於都載錦出為歐陽式所得繋兖州獄太祖遣薛淵餉僧静酒食以刀子置魚腹中僧静與吏飲醉以刀刻械手自折鎻發屋而出歸太祖遂匿之齋内以其家貧年給粟千斛崔鴻後趙録曰石季龍幽中書令徐光于㐮陽國詔獄光在獄中注觧經史十餘萬言三國典畧曰周諒入齊為揚州刺史平鍳所獲繋之獄妻生男鍳因喜醉擅放免之既醒知非上唘自劾齊主特原其罪隋書曰裴政為㐮州搃管妻子不之官所受秩奉散給寮吏民有犯罪者隂悉知之或竟嵗不發至再三犯乃因都㑹}
