  - {type: variant, offset: 4055, length: 0, content: '', SBCK: 仐平易道路也又曰周禮三王始有獄夏曰夏臺言不害人􅀂遊觀之臺桀拘湯是也殷曰姜里言不害人􅀂於閭里紂拘文王是也周曰囹圄令圄舉也言人幽􅐬思愆改惡爲善因原之也今縣官録囚皆舉也三輔黄圗曰長安有九市二十四獄扶南傳曰扶南俗理訟無牢獄鞭杖唯以探湯捧鑕没水爲信先使沐浴齋戒乃令以手内湯或捧􅀬鑕或没水中無罪者不爛不燋不􅃿罪者即驗也㑹稽典録曰鍾離意爲堂邑令縣民房廣爲父報仇繫獄其母病死廣聞之號泣獄意爲之悽惻出廣見之曰今欲出􅀂歸家殯歛有義則還無義則巳丞􅁺諌以爲不可意曰不還之罪令自受之廣臨殯畢即自獄以狀表上詔減死一等又曰盛􅁻字君逹山隂人司徒虞延辟西曹􅁺時隴西太守鄧融以贓罪徴詣廷尉前後考驗歴􅀊不服明帝下三府遣精能􅁺屬更就彈劾􅁻到詔獄但勑主者供湯沐飲食不去問事明日復徃解融桎梏安徐以情責君􅀂無贓強見誣枉冝具列辭當相伸理如審有罪不得誣罔國家融感􅁻意即移辭首服又曰黄昌爲蜀郡太守宻捕得盗師一人悉使䟽諸縣強盗宻往捕録其諸小盗皆原其死讁作棧道以代民􅃥由是道不拾遺獄至連年無有}
  - {type: page-break, offset: 4055, content: '', id: KR3k0012_SBCK_643-8a}
  - {type: variant, offset: 4056, length: 0, content: '', SBCK: 囚又曰髙豊字文林爲鄼縣獄吏刺史虞孟行部到旬日鄼縣僻勑鄼長將囚徒就所在録見林􅀍文書􅐬獄下籥不肯送徒自詣諌曰明使君乗法駕騑驂衘命理􅁈當縣縣乃至今乃遥召囚徒欲省更煩盍普天之下莫非王􅁟率􅁟之濵莫非王臣鄼獄非漢地乎囚徒終不出縣特望朱軒廻輪向鄼孟遂到鄼㐮陽耆舊記諸葛亮出關中使馬謖統大衆在前爲魏將張郃所破坐下獄死時年四十九臨終與亮書曰明公視謖猶子謖視明公猶父願推殛鯀興禹之義使平生之交不􅃜謖雖死無恨於黄泉􅀶物志曰夏曰念室殷曰動止周曰稽留三代之異名也又狴犴者亦獄别名韓陽天文要集曰貫索貴人之牢中星實則囚多虚則開出搜神記曰漢武帝東遊未岀凾谷關有物當道其身數丈其狀像牛青眼而矅精四足入􅁟動而不死百官驚懼東方朔乃請酒以灌之灌之十斛而物消帝問其故荅曰此名爲患憂之物氣之所生此必􅁗之獄地不然則}
  - {type: page-break, offset: 4056, content: '', id: KR3k0012_SBCK_643-8b}
