  - {type: variant, offset: 1149, length: 5, content: 英謀反陰䟽, WYG: 作罰刑兹無赦而漢文帝志在輕刑但以詳平為佳非謂有罪而釋也濫繋無辜則政道缺乆需有罪則怒氣生圜土之中仰視青}
