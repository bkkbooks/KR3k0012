  - {type: variant, offset: 3335, length: 0, content: '', SBCK: 周諜入于齊爲楊州刺史平鍳所獲繫之獄妻生男鑒因喜醉檀放免之旣醒知非上啓自劾齊主特原其罪隋書曰裴政爲襄州緫管妻子不之官所受秩奉散給寮吏民有犯罪罪者隂悉知之或竟􅀊不發至再三犯乃因都㑹時於衆中召出親案其罪五人處死徒流者甚衆合境惶懾令行禁止小民蘇息稱爲神明尓後不修囹圄殆無爭訟又曰薛胄爲兖州刺史及到官繫囚數百冑剖斷旬日便了囹圄空虚又曰枊儉拜蓬州刺史獄訟者庭遣不爲文書約束縱容而巳獄無繫囚唐書曰}
  - {type: page-break, offset: 3335, content: '', id: KR3k0012_SBCK_643-6b}
  - {type: variant, offset: 3335, length: 18, content: 太原公洋之赴晉陽也陽休之勸崔季舒曰一, WYG: 近哀平間道士臨淮董仲君坐繫獄病死數}
  - {type: variant, offset: 3336, length: 3, content: 原公洋, SBCK: 宗行次靈石縣指獄而謂皇太子曰此何謂皇太子對曰此所謂圎獄將繫罪人太宗因曰文王作罰刑兹無赦而漢文帝志在輕刑但以詳平爲佳非謂有罪而釋也濫繫無辜則政道缺乆滯有罪則怨氣生圎􅁟}
  - {type: variant, offset: 3340, length: 2, content: 赴晉, SBCK: 中仰視青天有同懸鏡而鏁械虜體􅊊結其中夫循諸己者可以知物傳曰其恕乎由此言之不言不愼又曰}
  - {type: variant, offset: 3343, length: 8, content: 也陽休之勸崔季舒, SBCK: 城爲道州刺史觀察使判官督其賦至州恠城不出迎以問州吏吏}
