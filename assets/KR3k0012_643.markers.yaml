  - {type: variant, offset: 2984, length: 338, content: 惟觸突人故取以為喻也范曄後漢書曰尚書郎張俊自獄中上書訟罪而俊獄已報廷尉將出穀門臨行刑鄧太后詔馳騎以減死論俊上書謝曰孤恩負義自陷重刑請斷竟訖無所復望廷尉鞠遣刀斧在前棺絮在後魂魄飛揚形容已枯陛下聖澤以臣嘗在近密識其狀皃復其眼目留心曲慮特加偏覆喪車復還白骨更肉披棺發槨起見白日天地父母能生臣俊不能使臣俊當死復生陛下德過天地恩重父母誠非臣俊破碎骸骨舉宗腐爛所報萬一臣俊徒也不得上書不勝去死就生驚死踊躍冒昧拜章世皆哀其文魏略曰人得崔琰書以褁情籠持其籠行都道中時有與琰宿不平遙見琰名著幘籠從而視之遂白太祖以為琰腹誹心謗乃收付獄髡刑輸徒前所白琰者又白云琰為徒虬鬚直視心似不平太祖亦以為然遂殺之又曰王陵字彥雲太原人陵為發干長遇事髡刑五年當道掃除時太祖下車過問此何徒左右以狀對太祖曰此所坐亦公耳, WYG: ''}
