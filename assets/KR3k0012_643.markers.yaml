  - {type: variant, offset: 3952, length: 484, content: 府請詔月一案行又置南甄官使者主養病徒僅能存之語所謂洛陽豪徒韓伯密加笞三百不中一髡頭至耳髮詣膝此自為刑非國法之意徒作年數周禮秋官上大司寇曰以嘉石平罷民凡萬民之有罪過而未麗於法而害於州里者桎梏而坐諸嘉石役諸司空重罪旬有三日坐朞役其次九日坐九月役其次七日坐七月役其次五日坐五月役其下罪三日坐三月役使州里任之則宥而舍之又秋官上曰司圜掌收教罷民凡害人者弗使冠飾而加明刑焉任之以事而收教之能改者上罪三年而舍中罪二年而舍下罪一年而舍其不能改出圜土者殺漢書曰罪人獄已決完為城旦舂滿三歲為鬼薪白粲應邵注曰鬼薪為宗廟取薪白粲澤米使正白鬼薪白粲一歲為隸臣妾隸臣妾一歲免為庶人晉律曰髡鉗五歲刑笞二百若諸亡詐偽將吏越武庫垣兵守逃歸家兄弟保人之屬並五歲刑也四歲刑若復上聞入殿門上變事漏露泄選舉事誤發密事歐兄姊之屬並四歲刑三歲刑若傷人上而謗偽造官印不憂軍事戲殺人之屬並三歲刑也二歲刑二歲刑減一等入罰金二歲以至五歲刑皆耐罪若越城作弈走馬眾中有挾天文圖識之屬並為二歲刑張斐律序曰徒加不過六囚加不過五罪已定為徒未定為囚累作不過十一歲五歲徒犯一等加六歲犯六等加為十一歲作累笞不過千二百五歲徒加六等笞一千二百, krp: ''}
