  - {type: variant, offset: 2508, length: 57, content: 臣請一見問疾太宰入言吳王乃見越王也列女傳曰嚴延年為河南太守河南號曰屠伯以其刑殺為主若屠者也其母嘗從東海來欲就延年臈, WYG: 徒終不出縣特望朱軒廻輪向鄼孟遂}
  - {type: variant, offset: 2508, length: 57, content: 臣請一見問疾太宰入言吳王乃見越王也列女傳曰嚴延年為河南太守河南號曰屠伯以其刑殺為主若屠者也其母嘗從東海來欲就延年臈, krp: 徒終不出縣特望朱軒廻輪向鄼孟遂}
  - {type: variant, offset: 2512, length: 336, content: 問疾太宰入言吳王乃見越王也列女傳曰嚴延年為河南太守河南號曰屠伯以其刑殺為主若屠者也其母嘗從東海來欲就延年臈到洛陽適見執囚所執決刑戮之囚也母大驚便止都亭不肯入府會稽典錄曰盛吉拜廷尉吉性多仁恩務在哀矜每至冬月罪囚當斷夜省刑狀其妻執燭吉持筆夫妻相向垂泣妻常謂吉曰君為天下執法不可使一人濫罪太公金匱曰文王問太公曰天下失道忠諫者死予子伯邑考為王僕御無故烹之囚予於羑里以其羹歠予風俗通曰囚遒也言辭窮得罪誅遒也禮罪人寘諸圜土故囚字為口中人此其象也陳留耆舊傳曰虞延除細陽令每至歲時伏臘輒休遣囚各歸家囚並感其恩應期而還韓陽天文要集曰流星入昂貴人有繫囚也論衡曰李子長為政欲知囚情以梧桐為人象囚之形鑿地為塪臥木囚其中罪正者木囚不動冤侵奪者木囚動出不知囚之精神著木人耶將天神之氣動木囚也徒史記曰秦, SBCK: 更}
