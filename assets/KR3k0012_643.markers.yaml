  - {type: variant, offset: 1159, length: 1, content: 楚, krp: 到官繫囚數百冑剖斷旬日便了囹圄空虚又曰枊儉拜蓬州刺史獄訟者庭遣不爲文書約束縱容而巳獄無繫囚唐書曰太宗行次靈石縣指獄而謂皇太子曰此何謂皇太子對曰此所謂圎獄將繫罪人太宗因曰文王作罰刑兹無赦而漢文帝志在輕刑但以詳平爲佳非謂有罪而釋也濫繫無辜則政道缺乆滯有罪則怨氣生圎土之中仰視青天有同懸鏡而鏁械虜體欝結其中夫循諸己者可以知物傳曰其恕乎由此言之不言不愼又曰陽城爲道州刺史觀察使判官督其賦至州恠城不出迎以問州吏吏曰刺吏聞判官來以爲有罪自囚於獄不敢出判官大驚馳入謁城於獄曰使君何罪某奉命來候安否耳留一二日未出去城因不復歸館門外有故問扇撗地城晝夜坐卧其上判官不自安辭去晏子春秋曰景公籍重而獄多拘者蒲圄怨者滿朝晏子諌不聽淮南子曰君不入獄爲恩也論衡曰獬豸者一角之羊也性知有罪臯陶治其罪疑者令羊觸之有罪則觸無罪則不斯盍天生一角聖獸助獄爲驗故臯陶禮羊跪坐}
  - {type: variant, offset: 1161, length: 4, content: 覺顯宗得, krp: 之此則神竒瑞應之類風俗通曰易噬嗑爲獄獄十月之卦從犬言聲二犬亦存以守也廷者陽也陽尚生長獄者隂也隂主刑煞故獄皆在庭北順}
