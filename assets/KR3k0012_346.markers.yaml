  - {type: variant, offset: 265, length: 0, content: '', krp: 王雙曽於市中買得一刀賣人曰得之者貴因之不見雙後佩之果爲將將此刀與曹真真以一刀換之又曰鍾㑹克蜀於成都土中得一刀文曰太一刀㑹死入帳下王伯昇後渡浮江刀遂飛入水又曰鄧艾年十二曽讀太山碑碑下掘得一刀黒如􅃮色長三尺餘上常有風氣冷凄凄然時人以爲神賜又曰孫權遣張昭代周瑜爲南郡太守曽作一刀背上有盪冦將軍四字八分書又曰蔣欽拜別部司馬造一刀文曰司馬古隷書又曰周㓜平擊曹公勝拜平虜將軍因造一刀遂銘曰㓜平又曰董元代少果勇自打鐵作刀後討黄祖蒙衝俠河元代引刀断蒙衝纜分爲二流大司馬號刀曰断蒙刀又曰潘文珪偏將軍爲擒關羽拜固陵太守因刻刀曰固陵又曰朱理君少愛征討黄武中累功拜安國將軍作佩刀文曰安國又曰關羽爲先主所重不惜身命自採武都山鐵爲二刀銘曰萬人及羽敗惜刀投於水又曰張益德𥘉受新亭侯自命匠錬赤珠山鐵爲一刀銘刄曰新亭侯蜀帝大將也後𬒳范強將此刀入吴又曰黄中從先主定南郡得一刀赤如血於漢中擊夏侯軍一日之中手刄數百又曰諸葛亮定黔中從青石祠過抜刀刺山没刃不拔而去行者莫測又曰蜀主劉備令蒲元造刀五千口皆連環及刃口刻七十二錬柄中通之兼有二字又曰西晉司馬炎咸寕元年造刀八千口銘曰司馬又曰東晉司馬聃永和五年於房山造五口刀銘曰五方單符隷書又曰前趙劉元海元熈二年造滅賊刀長三尺九寸隷字又曰後蜀主李雄晏平元年造騰馬刀五百口隷字又曰前凉張寔造刀一百口無故盡生文曰覇又曰後趙石勒建平元年造一刀用五金工用萬人尖頭長三尺六寸銘曰建平隷書又曰石勒未貴時耕得一刀銘曰石氏昌篆書又曰石季龍建武十四年造一刀長五尺銘曰皇帝石勒氏隷書又曰西凉李暠玄威元造珠碧刀銘曰百勝隷書又曰前秦符堅甘露四年造一刀用五千功銘曰神術隷書又曰前燕慕容俊元年造二十八口刀銘曰二十八將又曰後燕慕容垂興元元年於中山造刀一口長三尺六寸隷書又曰後秦姚萇建𥘉元年造二刀長七尺一銘曰雄一曰雌隷字若叩即鳴又曰西秦乞伏國仁建義三年造刀一口銘曰建義隷字又曰後凉吕光麟嘉元年造一刀銘曰背麟長三尺六寸又曰南凉秃髪烏孤大𥘉三年造一刀狹小長三尺五寸青色匠云當作之時夢見一人𬒳朱衣云吾是太一神故看尓作此刀有敵至刀必鳴後落突厥可汗處又曰南凉慕容去明建平元年造刀四口文曰建平隷書又曰北凉沮渠蒙遜永安三年造刀百口銘曰永安隷書又曰夏赫連勃勃龍昇二年造五刀背上有龍雀環兼金鏤作一龍形長三尺九寸劉𥙿破長安得此刀後入梁又曰北燕馮跋太平八年造一刀銘曰太平隷書又曰宋髙祖劉𥙿永𥘉元年造一刀銘其背曰定國小篆書長八尺後入梁又曰宋劉義符景平元年造一刀銘曰五色小篆書又曰劉淮昇明元年掘得一刀銘曰上血其刀光照一室帝竒之常服至二年七月帝使楊玉夫候織女玉夫候不得懼死因用弑帝果如其銘故知吉凶其兆見矣又曰齊髙祖蕭道成建元二年克位造一刀銘曰定業長五尺篆書帝自制之又曰明帝鸞建武二年造一刀銘曰朝儀刀小篆書長四尺又曰後魏宣武帝以景明元年於白鹿山造白鹿刀隷書又曰後魏元昭成帝建國元年於赤冶城鑄刀十口金鏤赤冶二字隷書莊子曰庖丁爲惠文君解牛丁曰今臣之刀十九年矣所解數千牛矣而刃若新發於硎彼節者有間而刀刃者無厚以無厚入無間恢恢乎其游刃必有餘地是以十九年而刀刃如新發於硎列子曰周穆王征西戎獻赤刀切玉如切泥墨子曰墨子見齊王曰有刀於此試之人頭倅然断之可謂利也王曰利墨子曰刀則利矣孰將受其不祥王曰刀受其利試者受其不祥墨子曰并國覆軍賊殺百姓孰謂受其不祥王俯仰曰我受其不祥孔叢子曰秦王得西戎利刀以之割玉如割木淮南子曰屠牛坦一朝解九牛而刀可以剃毛又曰鈆不可以爲刀銅不可以爲弩鐵不可以爲弓木不可以爲斧又曰金勝木者非以一刀殘林也土勝水者非以一墣塞江也墣塊也法言曰刀不利筆不銛冝加諸礪阮子曰裁國無利器猶鈆刀而望其巧抱朴子曰金丹以塗刀辟兵萬里論衡曰丗諱厲刀井上恐刀墮井中或說以爲刑之字井與刀也厲刀井上井刃相見恐𬒳刑也典論曰魏太子丕造百辟寳刀三其一長四尺三寸六分重三斤六兩文似靈龜名曰靈寳其二采似丹霞名曰含章長四尺四寸三分重三斤十兩其三鑒似崩霜刀身劒鋏名曰素質長四尺三寸重二斤九兩又造百辟露陌刀一長三尺二寸重二斤二兩狀似龍文名曰龍鱗聖證論曰昔國家有優曰史利漢氏舊優也云梁兾有火浣布切玉刀一朝以爲誕而不信也正始𥘉得火浣布乃信楚辭曰師望在肆昌何識師望謂太公也昌文王名池言太公在市肆而屠何似知識之皷刀楊聲后乃喜后謂文王又曰鈆刀進御違棄太阿太阿劒名張衡西京賦曰吞刀吐火雲霧杳冥畫地成川流渭通涇劉揁瓜賦曰折以金刀四剖三離曹植寳刀賦曰建安中家父魏王乃命有司造寳刀五枚三年乃就以龍虎熊馬雀爲識太子得一余及余弟饒陽侯各得一焉其餘二枚家王自杖之賦曰有皇漢之明后思潜逹而玄通飛文義以博致揚武備以禦凶乃熾火炎爐融鐵挺英烏獲奮椎歐冶是營扇景風以激氣飛光鑑於天庭爰告祠於太一乃感夢而通靈然後礪以五方之石鑿以中黄之壤䂓貟景以定衆攄神思而造像垂華紛之葳㽔流翠采之晃陸斬犀象水断龍舟輕擊浮截刃不瀐流踰南越之巨闕超有楚之太阿寔真人之攸御永天禄而是荷樂府歌曰秦家有好女自名曰女休休年十四五爲宗行報讎左執白陽刀右據宛景矛張華詩曰吴刀鳴手中利劒嚴秋霜古詩曰美人贈我金錯刀}
