  - {type: variant, offset: 4266, length: 0, content: '', SBCK: 其銘尚存叶前疑也工人即持以授上皇上皇賜髙祖髙祖長佩於身以殱三猾天下巳定吕后藏於寳庫之中守藏者見白氣如雲出户外如龍虵庫名曰靈禽藏及諸吕擅權白氣亦滅案鈎命决蕭何爲􅄧屋精項羽陳勝胡亥爲之三猾晉張載匕首銘曰先民造制戒豫惟謹匕首之設應速用近旣不忽備亦無輕忿利以形彰功以道隱鋏史記曰馮煖聞孟嘗好客見之君置之傳舎五日彈其劒鋏而歌曰長鋏歸來兮食無魚君遷之幸舎五日彈其鋏歌曰長鋏歸來兮出無輿又遷之代舎五日又彈其劒歌曰長鋏歸來兮無以爲家一出戰國䇿曹子建詩曰長鋏鳴韒中晉張恊長鋏銘曰五才並建金作明威長鋏陸離弭凶防違素刃霜厲溢景撗飛又短鋏銘曰噐用名品詭制殊觀亦有短鋏清暉載爛昔在光明戢兵静亂惟皇寳之優而弗玩左思吴都賦曰毛羣以齒角爲矛鋏劉淵林注曰鋏}
