  - {type: variant, offset: 339, length: 0, content: '', WYG: 曰秦家有好女自名曰女休休年十四五為宗行報讎左執白陽刀右據宛景矛張華詩曰吳刀嗚手中利劒嚴秋霜古詩曰美人贈我金錯刀何以報}
  - {type: variant, offset: 340, length: 24, content: 聲夫子莞爾而笑曰割雞焉用牛刀春秋繁露曰禮之所為興, SBCK: 士說劒}
  - {type: variant, offset: 340, length: 0, content: '', WYG: 雙瓊瑶後漢馬敬通刀陽銘曰脩爾甲兵用戒不虞見危授命臨事而懼又刀隂銘曰温温穆穆配天之威苖裔無疆福禄來綏後漢李尤錯佩刀銘曰佩之有錯抑武揚文豈為麗好將戒其身又金馬書刀銘曰巧冶鍊剛金馬託形黄文錯鏤兼勒工名魏文帝露陌刀銘曰於鑠良刀胡練亶時譬諸麟角靡所任兹不逢不若永世寳持曹植寳刀銘曰造兹寳刀既礱既礪匪以尚武予身是衛麟角匪觸鸞距匪蹶王粲刀銘曰相時隂陽制法利兵陸剸犀兕水截鯢鯨君子服之式章威靈何晏斫猛獸刀銘曰徒摶不兵作戎宣邱用造斯噐螭獸是劉制禽允良昏明亶時永釐厥後蠲民之災言作斬虎刀銘曰螭虎是劉晉張協把刀銘曰奕奕名金昆吾遺璞裁為把刀利亞切玉時文斯􅅯含精内燭威􅂇雖化武不可黷裴景}
