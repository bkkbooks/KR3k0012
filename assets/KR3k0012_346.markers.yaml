  - {type: variant, offset: 333, length: 0, content: '', WYG: 丕造百辟寳刀三其一長四尺三寸六分重三斤六兩文似靈龜名曰靈寳其二采似丹霞名曰含章長四尺四寸三分重三斤十兩其三鋒似崩霜刀身劒鋏名曰素質長四尺三寸重二斤九兩又造百辟露陌刀一長三尺二寸重二斤二兩狀似龍文名曰龍鱗聖證論曰昔國家有優曰史利漢氏舊優也云梁冀有火浣布切玉刀一朝以為誕而不信也正始初得火浣布乃信楚辭曰師望在肆昌何識師望謂太公也昌文王名也言太公在市肆而屠何以知識}
