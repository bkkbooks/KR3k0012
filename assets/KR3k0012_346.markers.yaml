  - {type: variant, offset: 334, length: 0, content: '', SBCK: 鄭司農云謂劒脊兩面殺趣鄂者也以其臈廣爲之莖圍長倍之鄭司農云莖謂劒夾人所握鐔以上也玄謂莖在夾中者莖長五寸也叅分其臈廣去一以爲首廣而圍之身長五其莖長重九鋝音刷謂之上制上士服之身長四其莖長重七鋝謂之中制中士服之身長三其莖長重五鋝謂之下制下士服之上制長三尺重三斤十二兩中制長二尺五寸重二斤十四兩三分兩分下制長二尺重二斤一兩三分兩之一此今之匕首也各以其形㒵大小帶之此上謂國勇力之士能用五兵者也樂記}
  - {type: variant, offset: 334, length: 0, content: '', WYG: 鼓刀揚聲后何喜又曰鈆刀進御遥棄太阿太阿劒名張衡西京賦曰吞刀吐火雲霧杳冥畫地成川流渭通涇劉楨𤓰賦曰折以金刀四剖三離曹植寳刀賦曰建安中家父魏王乃命有司造寳刀五枚三年乃就以龍虎熊馬雀為識太子得一余及余弟饒陽侯各得一焉其餘二枚家王自杖之賦曰有皇漢之明后思潜逹而𤣥通飛文義以博致揚}
