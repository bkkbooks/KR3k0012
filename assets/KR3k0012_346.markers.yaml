  - {type: variant, offset: 283, length: 0, content: '', WYG: 袁紹在黎陽夢有人授一寳刀及覺果在牀前銘曰思紹思紹字也又曰郭璞于太原得一刀文曰宜為將後遂為將軍及與蜀戰敗走遂失此刀又曰王雙曽于市中買得一刀賣人曰得之者貴因之不見雙後佩之果為將將此刀與曹真真以一刀換之又曰鍾㑹克蜀於城都土中得一刀文曰太一刀㑹死入帳下王伯昇後渡浮江刀遂飛入水又曰鄧艾年十二曽讀太山碑碑下掘得一刀黑如漆色長三尺餘上常有風氣冷凄凄然時人以為神賜又曰孫權遣張昭代周瑜為南郡太守曽作一刀背上有盪冦將軍四字八分書又曰蔣欽拜别部司馬造一刀文曰司馬古𨽻書又曰周幼平擊曹公勝拜平虜將軍因造一刀遂銘曰平又曰董元代少果勇自打鐵作刀後討黄祖蒙衝挾河元代引刀斷蒙衝纜分為二流大司馬號刀曰斷蒙刀又曰潘文珪偏將軍為擒雲長拜固陵太守因刻刀曰固陵又曰朱理君少愛征討黄武中累功拜安國將軍作佩刀文曰安國又曰雲長為先主所重不惜身命自採武都山鐵為二刀銘曰萬人及雲長敗刀投於水又曰張翼徳初受新亭侯自命匠錬赤珠山鐵為一刀銘刃曰新亭侯蜀帝大將也後被范强將此刀入吳又曰黄忠從先主定南郡得一刀赤如血於漢中擊夏侯軍一日之中手刃數百又曰諸葛亮定黔中從青石祠過㧞刀刺山没刃不㧞而去行者莫測又曰蜀主𤣥德令蒲元造刀五千口皆連環及刄口刻七十二錬柄中通之兼有二字又曰西晋司馬炎咸寜元年造刀八千口銘曰司馬又曰東晋司馬􅅨永和五年於房山造五刃刀銘曰五方單符𨽻書又曰前趙劉元海元熈二年造滅賊刀長三尺九寸𨽻字又曰后蜀主李雄晏平元年造騰馬刀五百口𨽻字又曰前凉張寔造刀一百口无故盡生文曰覇又曰後趙石勒建平元年造一刀用五金工用萬人尖頭長三尺六寸銘曰建平𨽻書又曰石勒未貴時耕得一刀銘曰石氏昌篆書又曰石季龍建武十四年造一刀長五尺銘曰皇帝石勒氏𨽻書又曰西凉李暠𤣥威元造珠碧刀銘曰百勝𨽻書又曰前秦符堅甘露四年造一刀用五千功銘曰神術𨽻書又曰前燕慕容俊元年造二十八口刀銘曰二十八將又曰後燕慕容垂興元元年於中山造刀一口長三尺六寸𨽻書又曰後秦姚萇建初元年造一刀長七尺一銘曰雄一曰雌𨽻字若叩即鳴又曰西秦乞伏國仁建義三年造刀一口銘曰建義𨽻字又曰後凉吕光麟嘉元年造一刀銘背曰麟嘉長三尺六寸又曰南凉禿髮烏孤初三年造一刀狹小長三尺五寸青色匠云當作之時夢見一人被朱衣云吾是太乙神故看爾作此刀有敵至必鳴後落突厥可汗處又曰南涼慕容去明建平元年造刀四口文曰建平𨽻書又曰北凉沮渠蒙遜永安三年造刀百口銘曰永安𨽻書又曰夏赫連勃勃龍昇二年造五刀背上有龍雀環兼金鏤作一龍形長三尺九寸劉裕破長安得此刀後入梁又曰北燕馮䟦太平八年造一刀銘曰太平𨽻書又曰宋髙祖劉裕永初元年造一刀銘其背曰定國小篆書長八尺後入梁又曰宋劉義符景平元年造一刀銘曰五色小篆書又曰劉淮昇明元年掘得一刀銘曰上血其刀光照一室帝奇之常服至二年七月帝使楊玉夫候織女玉夫候不得懼死因用弑帝果如其銘故知吉凶其先兆又曰齊髙祖蕭道成建元二年克位造一刀銘曰定業長五尺篆書帝自制之又曰明帝鸞建武二年造一刀銘曰朝儀刀小篆書長四尺又曰後魏宣武帝以景明元年於白鹿山造白鹿刀刀書白鹿二字又曰後魏元昭成帝建國元年於赤冶城鑄刀十口金鏤赤冶二字𨽻書莊子曰庖丁為惠文君解牛丁曰今臣之刀十九年矣所解數千牛矣而刃若新發於硎彼節者有間而刀刃者無厚以無厚入無間恢恢乎其游刃必有餘地是以十九年而刀刃若新發於硎列子曰周穆王征西戎獻赤刀切玉如泥墨子曰墨子見齊王曰有刀於此試之人頭倅然斷之可謂利也王曰利墨子曰刀則利矣孰將受其不祥王曰刀受其利試者受其不祥墨子曰并國覆軍賊殺百姓孰為受其不祥王俯仰曰我受其不祥孔叢子曰秦王得西戎利刀以之}
