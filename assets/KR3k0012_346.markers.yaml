  - {type: variant, offset: 430, length: 428, content: 遣李陵故人隴西任立政等三人俱至匈奴招陵立政等至單于置酒賜漢使者李陵衛律皆侍坐立政等見陵未得私語即目視陵而數自循其刀環握其足陰諭之言可歸漢也又曰龔遂為渤海太守民有帶持刀劍者使賣劍買牛賣刀買犢可為帶牛而佩犢者也又曰盖寬饒奏事上以為怨謗下吏寬饒引佩刀自剄北闕下眾莫不憐之又曰李廣利為貳師將軍征大宛軍中無水拔佩刀刺山飛泉涌出又曰王尊為東平王相王曰願觀相國佩刀尊前引刀視王後漢書班固與弟超書曰竇侍中遺仲升楚騰陵錯橫刀皁音皂削一枚金錯半垂刀一枚又曰河南尹朱儁為董卓陳軍事卓折儁曰我百戰百勝決之於心卿勿妄說且污我刀續漢書輿服志曰佩刀乘輿黃金通身雕錯半蛟魚鱗金染錯雌黃室五色諸侯黃金錯環狹半枚墨室公卿百官皆淳墨不半杖小黃郎雌黃室中黃門郎朱室童子皆虎爪文虎賁黃室虎文其將白虎文皆以白珠蛟為標口之飾乘輿者加翡翠山紆嬰其側謝承後漢書曰丹陽方儲為郎中章帝使文郎居左武郎居右儲正住中曰臣文武兼備在所用施上嘉其才以繁亂絲付儲使理之儲拔佩刀三斷之對曰反經任勢臨事宜然又曰應奉得賜金錯把刀, SBCK: 匕首}
