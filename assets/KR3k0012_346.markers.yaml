  - {type: variant, offset: 4320, length: 461, content: 子遭疫而死壽大喜娥親聞曰李壽汝莫喜焉知娥親不手刃汝耶乃陰市刀志在殺壽後於都亭奮刀斫壽刀折拔壽佩刀斷壽頭詣獄求死詔赦之吳時外國傳曰扶南諸王殺其國人以刀斫刺往往有不入者以汗露塗刀刃斫之乃入國人名之曰蟬也蒲元傳曰君性多奇思得之天然象類之事出若神不嘗見鍜功忽於斜谷為諸葛亮鑄刀三千口鎔金造器特異常法刀成白言漢水鈍弱不任淬用蜀江爽烈是謂大金之元精天分其野乃命人於成都取之有一人前至君以淬乃言雜涪水不可用取水者猶悍言不雜君以刀畫水云雜八升何故言不取水者方叩頭首伏云實於涪津渡負倒覆水懼怖遂以涪水八升益之於是咸共驚服稱為神妙刀成以竹筒密內鐵珠滿其中舉刀斷之應手靈落若薙生蒭故稱絕當世因曰神刀今之屈耳環者是其遺範也費禕別傳曰孫權以手中嘗所執寶刀贈之禕荅曰臣不才何以堪明命然刀所以討不庭禁暴亂者也但願大王勉建功業同獎漢室臣雖闇弱不負來顧桂陽先賢畫讚曰成武丁以疾而終殮畢其友從臨武縣來至郡道與武丁相逢友曰子欲何之而不將人荅曰今吾南遊為過報小兒善護大刀到其門見其妻哭泣問之荅曰夫沒友大驚曰吾適與相逢乃發棺視了無所見遂除縗絰而心喪之咸以武丁得神仙, SBCK: 百四十六}
