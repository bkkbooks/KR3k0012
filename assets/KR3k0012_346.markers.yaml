  - {type: variant, offset: 4256, length: 8, content: 當生毛欺則無毛也, SBCK: 雜而冶之即成神噐可以尅定天下􅄧星爲輔以殱三猾木衰火盛此爲興何上皇曰余此物爲匕首其利難儔水斷虬龍陸斬虎豹魑魅魍魎莫能逢之切玉鐫金其刃不卷工人曰􅀂不得此匕首以和鑄雖歐冶專精越礪劒鍔終爲鄙噐上皇即解之以投鑪中俄而煙􅆋衝天日爲之晦及乎劒成殺三牲以釁􅀕工問上皇曰何時得此匕首荅曰􅁗昭襄王時余時行逢一野人於野授余云是殷髙宗􅀄時物此丗丗相傳上有古書字記其年月及成劒工人}
