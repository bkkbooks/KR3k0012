  - {type: variant, offset: 269, length: 1, content: 維, SBCK: 􅀟瓊瑶後漢馬敬通刀陽銘曰脩尓甲兵用戒不虞見危授命臨事而懼又刀隂銘曰温温穆穆配天之威苗裔無疆福禄來綏後漢李元錯佩刀銘曰佩之有錯抑武􅀭文豈爲麗好將戒其身又金馬書刀銘曰巧冶練剛金馬託形黄文錯鏤兼勒工名魏文帝露陌刀銘曰於鑠良刀胡練亶時譬諸麟角靡所任兹不逢不􅀂永丗寳持曹植寳刀銘曰造兹寳刀旣礱旣礪匪以尚武予身是衛麟角匪觸鸞距匪蹷王粲刀銘曰相時隂陽制法利兵陸剸犀兕水截鯢鯨君子服之式章威靈何晏斫猛獸刀銘曰徒摶不共作戒宣丘用造斯噐螭獸是劉制禽允良昬明亶時永釐厥後蠲民之災一作斬虎刀銘曰螭虎是劉晉張協把刀銘曰赫赫名金昆吾遺璞裁爲把刀利亞切}
