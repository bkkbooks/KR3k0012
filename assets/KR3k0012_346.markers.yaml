  - {type: variant, offset: 1489, length: 213, content: 武帝令曰往歲作百辟刀五枚適成先以一與五官將其餘四吾諸子中有不好武而文學將以次與之吳志曰孫堅至錢塘會海賊掠賈人堅行操刀上岸以手東西指麾若分部人兵以邏遮收賊賊望見以為官兵捕之即委財物散走又曰孫權以公孫淵稱蕃遣張彌許晏至遼東拜淵為燕王張昭諫切權不能堪按刀而怒曰吳國士人入宮則拜孤出宮則拜君孤之敬君亦為至矣而數於眾折孤孤常恐失計昭熟視權曰臣雖知言不見用而每竭愚忠者誠以太后臨崩呼老臣於床下遺詔顧命之言故耳因泣涕撗流權擲刀置地與昭對泣吳, SBCK: ''}
