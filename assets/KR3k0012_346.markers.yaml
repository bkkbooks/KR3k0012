  - {type: variant, offset: 4, length: 1, content: 六, SBCK: 七}
  - {type: variant, offset: 4, length: 194, content: 六刀上釋名曰刀到也以斬伐到其所乃擊之也其末曰鋒言若蜂刺之毒利也其本曰環形似環也其室曰削削峭也其形峭殼褁刀體也室口之飾曰琫琫捧也捧來口也下末之飾曰琕琕卑也在下之言也短刀曰拍髀帶時拍體旁也又曰露拍言露見也佩刀在佩旁之刀也或曰容刀為刀形而幾刃備容儀而已剪刀剪進前也書刀給書簡札有所刊削之刀也封刀鉸刀皆隨時名之也說文曰刀兵也象形也㓵五各切刀劍刃也削髀也欹劂曲刀也鞞布頂切剞居綺切劂居衛切字林曰琫佩, WYG: 七}
  - {type: variant, offset: 4, length: 1, content: 六, krp: 七}
