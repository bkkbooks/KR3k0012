  - {type: variant, offset: 2766, length: 214, content: 法也刀猶甚快利但不能截札耳梁書曰席闡文為西中郎中兵參軍領城扄梁武帝之將起兵闡主勸頴曹同焉仍遣客田祖恭私報帝并獻銀裝刀帝報以金如意南史曰韓子高會稽山陰人也家本微賤侯景之亂寓都下景平陳文帝出守吳興子高年十六為揔角容皃美麗狀似婦人於淮渚附部伍寄載還鄉里文帝見而問曰能事我乎子高許諾子高本名蠻子帝改名之性恭謹恒執備身刀唐書曰李嗣業京兆高陵人也身長七尺壯勇絕倫天寶初隨募至安西頻經戰鬭于時諸軍初用陌刀業善用之每為隊頭所向必陷又曰王及善初除, SBCK: 左}
