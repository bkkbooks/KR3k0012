  - {type: variant, offset: 924, length: 352, content: 金對鮮卑緄帶一具金錯刀五十辟把刀墨再屈環撗刀金錯屈尺八佩刀各一又曰祭遵襲略陽遣護軍王忠皆持鹵刀斧伐樹開道至略陽襲隗囂又曰班超曰臣乘聖威神出萬死之志冀立鈆刀一割之用又曰馬嚴為陳留太守建初中嚴病遣功曹史李襲奉章詣闕上親召見襲問疾病形狀以黃金十斤佩刀書刀革帶付龔賜嚴遣太醫送方藥又曰張步攻耿弇營飛矢中弇股以佩刀截之左右無知者獻帝春秋曰越騎校尉汝南伍孚忿董卓無道欲身自殺之挾佩刀詣卓孚語畢辭出卓至閤執手孚因引刀刺卓卓多力却不中即殺孚英雄記曰董卓謂袁紹曰劉氏種不足復遺紹勃然曰禾下健者豈唯董公撗刀長揖徑出懸節於上東門而奔冀州漢魏春秋曰劉琮乞降不敢告備備亦不知久而覺之遣所親問琮琮令宋忠詣備宣白是時曹公在宛備乃驚駭謂忠曰卿諸人作事如此不早相語今禍至告我不亦大劇乎引刀向忠曰今斷卿頭誠不足以解忿亦恥大丈夫臨別復殺卿輩也, SBCK: 破匈奴得劒匕首二三千枚}
