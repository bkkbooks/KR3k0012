  - {type: variant, offset: 335, length: 3, content: 城聞弦, WYG: 備以禦凶乃熾火炎爐融鐵挺英烏獲奮權歐冶是營扇景風以激氣飛光鑑於天庭爰告祠于太乙乃感夢而通靈然後礪以五方之石鑿以中黄之壤規員景以定衆撼神思而造像垂華紛之葳㽔流翠采之晃􅀈陸斬犀象水斷龍舟輕撃浮截刃不瀐流踰南越之巨闕超有楚之太阿寔真人之攸御永天禄而是荷樂府}
