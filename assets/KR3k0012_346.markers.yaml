  - {type: variant, offset: 1570, length: 340, content: 官兵捕之即委財物散走又曰孫權以公孫淵稱蕃遣張彌許晏至遼東拜淵為燕王張昭諫切權不能堪按刀而怒曰吳國士人入宮則拜孤出宮則拜君孤之敬君亦為至矣而數於眾折孤孤常恐失計昭熟視權曰臣雖知言不見用而每竭愚忠者誠以太后臨崩呼老臣於床下遺詔顧命之言故耳因泣涕撗流權擲刀置地與昭對泣吳書曰凌統怨甘寧殺其父操寧常備統不得讎之嘗於呂蒙舍會酒酣統乃以刀儛寧起曰寧能雙戟儛蒙曰寧雖能未若蒙之巧也因操刀持楯以身分之後權知統意因令寧將兵徙屯江表傳曰孫權拔刀斫前奏案曰諸將吏敢復有言當迎曹操者與此案同蜀志曰初孫權以妹妻先主妹才捷剛猛有諸兄風侍婢百餘人皆親執刀侍立先主每入心常懔懔王隱晉書曰衛瓘監軍護軍鍾會素與瓘至厚坐則同床行則同輿會書板上欲殺胡烈等示瓘瓘言不可會自削棄反問瓘何許聞消息相疑益露瓘廁上見烈故給使令出語, WYG: ''}
