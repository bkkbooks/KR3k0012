  - {type: variant, offset: 277, length: 3, content: 舟帶也, SBCK: 銘曰良金百錬名工展巧寳刀旣成窮理盡妙文繁波廽流光霆一作電照在我皇丗戢而不耀張恊露陌刀銘曰露陌在服威靈逺振遵養時晦曜得崇信魏武䇿軍令曰􅀌先在襄邑有起兵意興工師共作卑手刀時北海孫賔碩來候􅀌譏􅀌曰當慕其大者乃與工師共作刀耶􅀌荅曰能小復能大何苦曹植表曰昔歐冶改視鈆刀易價伯樂所眄駑馬百倍王濬表曰孫皓出案行石頭還左右兵皆跳刀大呼云要當爲國家一死戰决之勝魏帝尚以千人定天下况今有數萬衆自足辯事晧意大喜便開庫藏盡出金寳以賜與之小人無狀得便持走陶侃表曰伏承大官厨器損失謹奉獻狼炙刀槃二具張衡與特進書曰以爲鈆刀強可一割謝尚與張凉州書曰今致五尺金断頭刀一口班固與竇憲牋曰今月中以令賜固刀曰此將軍少小時所服今賜固伏念大恩且喜且慙謝尚與楊征南書曰云今餉五尺金頭刀碧綾車中盾梁簡文帝謝勑賚善勝威勝刀啓曰冰鍔含采彫琰表飾名均素質神號脫光五寳􅀄成曹丕先荷其三勝今造愚臣揔􅀍其恩錫韓非之書未足爲比給博山之筆方此更輕梁劉孝儀爲晉安王謝東宫賜玉環刀啓曰苗峯珎鋌利極銛鋩謹當擁以雄身藉而安體匕首通俗文曰匕首劒属其頭􅀋匕故曰匕首短而便用周}
