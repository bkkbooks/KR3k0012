  - {type: variant, offset: 348, length: 0, content: '', WYG: 露陌在服威靈逺振遵養時晦曜徳崇信魏武策軍令曰孤先在襄邑有起兵意與工師共作卑手刀時北海孫賔碩來候孤譏孤曰當慕其大者乃與工師共作刀耶孤答曰能小復能大何害曹植表曰昔歐冶改視鈆刀易價伯樂所眄駑馬百倍王濬表曰孫皓出案行石頭還左右兵皆跳刀大呼云要當為國家决一死戰魏帝尚以千人定天下况今有數萬衆自足辦事皓意大喜便開庫藏盡出金寳以賜予之小人無狀得便持走陶侃表曰伏承大官厨噐損失謹奉獻狼炙刀槃二具張衡與特進書曰以為鈆刀强可一}
  - {type: page-break, offset: 348, content: '', id: KR3k0012_WYG_346-11b, image: WYG0896/WYG0896-0110b.png}
  - {type: variant, offset: 349, length: 2, content: 雞焉, WYG: 謝尚與張凉州書曰今致五尺金斵頭刀一口班固與竇憲牋曰今月中舎以令賜固刀把曰此將軍少小時常服今賜固伏念大恩且喜且慙謝尚與楊征南書曰云今餉五尺金頭刀碧綾車中盾梁簡文帝謝勅賚善勝威勝刀啓曰水鍔含采彫琰表飾名均素質神號脫光五寳初成曹丕先荷其一二勝今造愚臣總被其恩錫韓非之書未足為比給愽山之筆方此更輕梁劉孝儀為晋安王謝東宫賜玉環刀啓曰苖峯珍鋌利極鈎鋩謹當擁以雄身藉而安體匕首通俗文曰匕首劒屬其頭類匕故曰匕首短而便}
