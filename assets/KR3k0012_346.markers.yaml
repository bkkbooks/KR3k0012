  - {type: variant, offset: 2782, length: 330, content: 席闡文為西中郎中兵參軍領城扄梁武帝之將起兵闡主勸頴曹同焉仍遣客田祖恭私報帝并獻銀裝刀帝報以金如意南史曰韓子高會稽山陰人也家本微賤侯景之亂寓都下景平陳文帝出守吳興子高年十六為揔角容皃美麗狀似婦人於淮渚附部伍寄載還鄉里文帝見而問曰能事我乎子高許諾子高本名蠻子帝改名之性恭謹恒執備身刀唐書曰李嗣業京兆高陵人也身長七尺壯勇絕倫天寶初隨募至安西頻經戰鬭于時諸軍初用陌刀業善用之每為隊頭所向必陷又曰王及善初除右千牛衛將軍高宗曰朕以卿忠謹故與卿三品要職他人非搜辟不得至朕所卿佩大橫刀在朕側知此官貴否河圖曰怪目勇敢重瞳天雨刀楚之邦宋均注曰項羽遁甲開山圖曰神芝五色生於名山之陰五色雲氣覆之其味甘苦以銅刀收之又曰霍山有玉石芝生大石上萬人牽終不拔以竹刀割之即斷太公六韜曰大擼刀重一斤, WYG: 素質}
