  - {type: variant, offset: 3823, length: 247, content: 如之何樹三百歲作華九百歲作實實有核形如棗子長五尺金刀割之則飴木刀割之則辛食之得地仙列仙傳曰丁次卿者不知何許人也漢順帝賣刀遼東市時人名之丁氏次卿有寶刀神仙傳曰蜀人李阿傳世不老有古強者隨阿入青城山恐有虎狼取父大刀阿見而怒取強刀以擊石刀折敗強竊憂刀敗阿復取刀左右擊地刀復如故還強也列異傳曰有神王方平降陳節方家以刀一口長五尺一長五尺三寸名泰山環語節方曰此刀不能為餘益然獨臥可使無鬼入軍不傷勿以入廁溷且不宜久服三年後求者急與果有戴卓以錢百萬請刀錄異傳曰有王更生者為漢中太守郡界有袁氏廟靈響更生過廟祭去而遺, SBCK: 冶鑄上皇息}
