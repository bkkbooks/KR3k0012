  - {type: variant, offset: 1877, length: 888, content: 示瓘瓘言不可會自削棄反問瓘何許聞消息相疑益露瓘廁上見烈故給使令出語三軍會逼瓘不得議定經宿不眠各撗刀膝上陸機晉書曰王濬之在巴郡也夢懸四刀於其上甚惡之濬主簿李毅拜賀曰夫三刀為州而見四刀為益一也明府其臨益州乎後果為益州晉中興書曰初魏徐州刺史任城呂虔有佩刀工相之以為必三公可服此刀虔謂別駕王祥曰茍非其人刀或為害卿有公輔之量故以相與祥始辭之固強乃受祥為司空祥死之日以刀授弟覽曰吾兒皆凡汝後必興足稱此刀故以相與覽後弈世賢興於江東又曰孫恩者亦名靈秀琅邪人孫秀之族也世奉事北斗之道恩叔泰字敬遠師事錢塘杜子恭弟子子恭有祕術嘗就人借爪刀其主求之子恭曰當送相還刀主行至嘉興有魚躍入舩中破魚得爪刀其為神效往往如此又曰郭翻武昌人墜刀於水路人為取翻仍以與之路人不取至於三四固辭翻曰爾尚不取我豈能復得路人曰我若取此將為天地鬼神之所責矣翻知其終不受復沈刀於水路人悵然乃復驚汲為取之翻於是不逆其意十倍刀價與之其廉不受惠皆此類矣晉書曰元帝以劉琨為侍中太尉其餘如故并贈名刀琨荅曰謹當躬自執佩馘截二虜又載記曰慕容翰北投宇文歸既而逃還歸乃遣勁騎百餘追之翰遙謂追者曰吾既思戀而歸理無反面吾之弓矢汝曹足知無為相逼自取死也汝可百步豎刀吾射中者汝便宜反不者可來前也歸騎解刀豎之翰一發便中刀鐶追騎乃散又曰赫連勃勃以叱干阿利領將作大匠發嶺北夷夏十萬人於朔方之北黑水之南營起都城勃勃自言朕方統一天下君臨萬邦可以統萬為名阿利性尤工巧然殘忍刻暴乃蒸土築城錐入一寸即殺作者而并築之勃勃以為忠故委營繕之任又造五兵之器精銳尤甚既成呈之工匠必有死者射甲不入即斬弓人如其入也便斬鎧匠又造百鍊剛刀為龍雀大環號曰大夏龍雀銘其背曰古之利器吳楚湛盧大夏龍雀名冠神都可以懷遠可以柔逋如風靡草威服九區世甚珍之復鑄銅為大鼓飛廉翁仲銅駞龍獸之屬皆以黃金飾之列於宮殿之前凡殺工匠數千以是器物莫不精麗蕭子顯齊書曰世祖武皇帝諱賾字宣遠不豫徙御延昌殿乘輿始登階而殿屋鳴咤上惡之詔曰我識滅之後身上著畫天衣純鳥犀導常所服身刀長短二口鐵環者隨我入梓宮北齊書曰綦母懷文造宿鐵刀其法燒生鐵精以重柔鋌數宿則成鋼以柔鋌為刀脊浴以五牲之溺淬以五特之脂斬甲三十札今襄國治家所鑄宿鐵柔鋌是其, SBCK: 拾}
