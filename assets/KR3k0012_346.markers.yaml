  - {type: variant, offset: 3258, length: 451, content: 出洞冥記林邑記曰林邑王范文先是夷奴初收牛洞中得鱧魚私將還欲食之其主撿求文恐因曰將礪石還非魚也主往看果是石文知異看石有鐵鑄石為兩刀呪曰魚為刀若斫石入者文當為此國王斫石即入人情漸附之裴淵廣州記曰石林竹勁利削為刀切象皮如纖茅楊泉物理論曰古有阮師之刀天下之所寶貴也阮之作刀受法於金精之靈七月庚辛見金神於治監之門其人光色煒燿向而再拜神執其手曰子可教也阮致之閑宴設饌而問焉神教以水火之齊五精之陶用陰陽之候取剛軟之和行其術三年作刀千七百七十口而喪其明其刀平背狹刃方口洪首截輕微絕絲髮之系斫堅剛無變動之異世不恡百金精求不可得也其次有蘇家刀雖不及阮家亦一時之利器也次有陽紀趙青間皆不能繼虞喜志林曰古人鑄刀以五月丙午取純火精以恊其數也魏武帝內戒令曰百鍊利器以辟不祥攝服姦宄者也搜神記曰宮亭湖孤石有估客下都徑其下見二女子云可為買兩量絲履自厚相報估客至都有好絲履并箱盛之自市一書刀亦在箱中既還以箱及香置廟中而去忘取刀湖中正汎忽有鯉魚跳入船中破魚得刀祖台志怪曰廷尉徐元禮嫁女從祖與外兄孔正陽共詣徐家道中有土墻見一小兒倮身正赤手持, SBCK: ''}
