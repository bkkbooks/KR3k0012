  - {type: variant, offset: 1497, length: 426, content: 步有東西谷廣十許步南岸下有風穴厥大容人其深不測而穴中肅肅常有微風雖三伏亦凜列三山隋圖經曰河東都三山即舜所耕歷山也禹貢所謂壺口雷首至于太岳壺口山在慈州太岳在晉州雷首在河東界此山有九名謂歷山首山薄山襄山甘棗山渠豬山獨頭山陑山等名又湯伐桀升自陑之所稷山隋圖經曰稷山在綘郡后稷播百穀於此山亦左氏傳謂晉侯治兵於稷以略狄土是此也後魏曰高涼山隋以後又為稷山霍山隋圖經曰霍山在洪洞縣東北霍水出焉水經注云發源成潭潭闊七十步而不測其深爾雅云霍山之珠玉焉又有聖人崖崖有七穴相通又水經云霍山北有雀鼠谷中道險左右柱結成偏梁閣道累石成路俗謂之魯班橋也平山隋圖經曰平山在平陽一名壺口山尚書謂壺口治梁及歧即此地也今名姑射山在縣西平水出其下又山海經云憲山之南三百里有姑射山冀州圖經云西入文成郡以山為界又莊子云堯見姑射神人杳然喪其天下即是此山也發鳩山山海經曰上黨發鳩山多柘木有鳥狀如烏而文首白喙赤足名曰精衛其鳴自相呼云炎帝女東遊溺海化鳥今猶銜石以填之抱犢山道書福地記曰抱犢山在上黨東南高七, SBCK: ''}
