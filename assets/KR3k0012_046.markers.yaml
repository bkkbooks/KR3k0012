  - {type: variant, offset: 2537, length: 453, content: 鼓山隋圖經曰鼓山亦名塗山宋永初古今山川記云鼓山如石鼓形二所南北相當二鼓相去十里冀州圖經云鄴城西有石鼓鼓自烏即有兵魏都賦云神誕召於高巒是也高齊末此鼓鳴未幾云鄴城有兵而齊滅隋文季年又鳴聞數百里也隆慮山隋圖經曰隆慮山一名林慮蓋隋縣西二十里山有三峰南第一峰名仙人樓高五十丈下有黃花谷北巖出瀑布水注成池黃花谷西北有洞穴去地十餘仞下有小山孤竦謂之玉女臺高九百丈其山北一峰名舉峰其北有偏橋即抱犢因也南接大行北連恒岳又按顏脩內傳曰橋順字仲產有二子曰璋曰琮師事仙人盧子基於隆慮山栖霞谷教二子清虛之術服飛龍藥一九千年不飢魏文帝詩曰西山有雙童不飲亦不食謂此也鮮卑山隋圖經曰鮮卑山在柳城縣東南崔鴻十六國春秋慕容廆先代君遼左號曰東胡其後雄昌與勾奴爭盛秦漢之際為匈奴所敗分保鮮卑山因復以山為號也棘城之東塞外又有鮮卑山在遼西之西北一百里與此異山而同號大碣石山地理志曰大碣石山在右北平驪城縣西南王莽改曰碣石也漢武帝亦常登之以望巨海而勒其石今於此枕海有石如埇道數十里當山頂有大石如柱形往往而見立於海之中潮水大至及潮波退不動不沒不知深淺世名之, SBCK: ''}
