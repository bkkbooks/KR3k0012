  - {type: variant, offset: 2320, length: 2, content: 柏仁, WYG: 風渚在武康縣東十八里古防風國有風公廟水經曰風渚山即封山也岝萼山吳興記曰於潛縣西二里有岝㟧山有絶壁髙三十許丈謝安嘗登之臨壁垂足曰伯昏無人何以過是當時稱以為難一云本在太湖中禹治水移於此孺子山吳興記曰東遷}
