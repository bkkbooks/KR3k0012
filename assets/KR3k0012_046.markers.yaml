  - {type: variant, offset: 3589, length: 203, content: 水雍伯置飲有人就飲與石一升令種之後玉生得白壁五雙娉北平徐氏遂家焉燕山隋圖經曰燕山在易縣東南七十里巖側有石鼓去地百餘丈望之若數百石囷左右梁貫之鼓東南有石人援桴之狀同擊勢云燕山石鼓鳴則有兵龍山隋圖經曰龍山在易縣西南三十里有龍山石上往往有仙人及龍跡西麓谷有一坑大如車輪春則風出東夏出南秋出西冬出北有沙門法猛以夏日入其東穴見石堂石人欲窮諸穴便有一人厲聲云法師有滯三穴皆如東者不宜仍來見穢猛仍意不息不覺忽在穴外也孔山, SBCK: 毒虫}
