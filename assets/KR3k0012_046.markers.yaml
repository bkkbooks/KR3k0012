  - {type: variant, offset: 2331, length: 202, content: 出宿于干飲餞于言是此也黑山九州要記曰墨子昔居汲郡黑山採茯苓餌五百歲或老或少又魏志漢獻帝初平二年黑山賊為毒自統睦固等十萬餘眾以掠魏郡也又云一名青山列仙傳曰犢子鄴人在黑山常牽一黃犢來過鄴城沽酒陽都女見悅之遂留相奉都女生死連眉即此者也土地十三州志云黑山險為逋逃幽藪隋區宇圖志云周太祖諱黑因改黑山為青山也雷公山隋圖經曰雷公山耆老傳曰魏時黑山群盜張燕等不立君長直以名號為稱多髯者謂之羝公大聲者謂之雷公時雷公賊保此山, SBCK: 渚次石文似印}
