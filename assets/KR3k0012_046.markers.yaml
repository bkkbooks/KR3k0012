  - {type: variant, offset: 87, length: 0, content: '', krp: 呼爲鼔吹山山有慈母祠也蕪湖山宣城圖經曰蕪湖山在縣西南山因湖以}
  - {type: variant, offset: 88, length: 0, content: '', SBCK: 之漢末於湖側置蕪湖縣以其地卑畜水非深而生蕪藻故因以名縣焉晉爲重鎭謝尚王敦皆鎭於此陳平縣廢以其地入當塗縣望夫山宣城圖經曰望夫山昔人往楚累歳不還其妻登此山望夫乃化爲石其山臨江周廻五十里髙一百丈博望山宣城圖經曰博望山有二山夾大江東曰博望西曰天門按郡國志云天門山亦曰峨嵋山楚獲吴艅艎於此按其山相對時人呼爲東梁西梁山據縣圖爲天門山輿地志云博望梁山東西隔江相對如門相去數里謂之天門宋孝武詔曰梁山天表象魏以旌國形仍以二山爲立闕故曰天門陵陽山宣城圖經曰陵陽山在涇縣西南一百三十里列仙傳云陵陽子明釣得白龍放之後五年龍來迎子明}
