  - {type: variant, offset: 988, length: 2, content: 隱泉, SBCK: 姑胥連撗山之北越絶書云吴地胥門外有九曲路闔閭造以逰姑胥之臺望湖中闚百姑淮南子亦謂之姑餘硯石山董監吴地記曰硯石山在縣西門外亦名石鼔山又有琴臺在其上越絶書云呉人於硯石置館娃宫劉逵注吴都賦引楊雄方言云吴有館娃宫吴人呼美女爲娃故三都賦云幸乎館娃之宫張女樂而娱群臣今吴縣有館娃郷香山董監吴地記曰香山吴王遣美人採香於山因以爲名故有採香徑華山華山精舎記曰老子枕中記云呉西界有華山可以度難父老云山頂北有池上生千葉蓮花服之羽化因曰華山長林森大荒楚蔽日輿地志云山上有石鼔晉隆安中鳴乃有孫恩之乱山在縣西六十三里包山呉地記曰包山在縣西一百三十里中有洞庭深逺世莫能測呉王使霊威丈人入洞穴十七日不能尽因得玉葉上刻霊寳經二卷使示孔子云禹之書也又郡國志云洞庭}
