  - {type: variant, offset: 90, length: 0, content: '', SBCK: 陵陽山一百餘年乃得仙山髙一千餘丈又有子安仙人也來就子明二十年一旦忽死因葬山下常有黃鵠栖其處樹上鳴云子安子安也白紵山宣城圖經曰宣州白紵山在縣東五里本名楚山桓温領妓逰此山奏樂好爲白紵歌因改爲白紵山中山宣城圖經曰宣州中山又名獨山有溧水縣東南一十里不與群山連接古老相傳云中山有白兎世稱爲筆最精山前有水源號爲獨水按輿地記云宣州溧水縣有獨山下有獨水流演不息即此山也}
