  - {type: punctuation, offset: 2072, content: 《, id: KR3k0012_CHANT_046-bkkpn672}
  - {type: variant, offset: 2072, length: 246, content: 後漢書曰章帝永和三年幸趙祠房山即謂此山也在縣西北十里濊水出焉亦謂石臼水又謂之鹿水出行唐東入博陵謂之木刀溝一謂袈裟水又從此過石童山南流入滹沱河前燕慕容雋時房山王母祠前大樹自拔根下得玉圭壁八十三顆光色稍苛雋以為岳神之命以太牢祭之每祀有一虎來往祠側性頗馴狎而不害於物韓信山隋圖經曰韓信山圓峻俗呼為韓信臺又乎為土門口西入井陘即向太原路是此也又有韓信城信破趙駐軍於此湯山山海經曰湯山湯水出焉此湯能愈疾為天下最又按隋圖經云湯後側巖上有石室一戶無塵穢俗號曰聖人室下經銅鳥廟有碑題云漳河神壇是也干山言山李公緒, SBCK: 呉興}
