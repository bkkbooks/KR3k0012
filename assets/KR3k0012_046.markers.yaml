  - {type: variant, offset: 628, length: 357, content: 管涔山汾水所出土人亦云箕管山見多管草或以為名又為管字前趙錄云劉元海族子曜嘗隱避於管涔之山夜忽有二童子入跪曰管涔王使小臣奉謁趙皇帝獻劍一口置前再拜而去以燭視之劍長二尺光輝非常背有名云神劍服御除眾毒曜遂服之隋時變為五色也又有三城堆故縣城於此置也又有汾陽宮隋大業四年置隋末廢也又有汾水出山陽山海經云管涔之山汾水出焉西流至于河十二州記云汾水出周武縣之燕京山蓋管涔之異名也五臺山水經注曰五臺山其山五蠻巍然故曰五臺晉永嘉三年鴈門郡人五百餘家避亂入此山見山中人為先驅因而不返遂寧巖野往還之士稀有望見其村居者至詣尋訪莫知所在故俗人以為仙者之都矣中臺之山山頂方三里西北陬有一泉水不流謂之太華泉蓋五臺之層秀仙經云此山名為紫府仙人居之其北臺之山冬夏常冰雪不可居即文殊師利常鎮毒龍之所今多佛寺四方僧徒善信之士多往禮焉謁泉山隋圖經曰西河謁泉, SBCK: 姑􅂫}
