  - {type: variant, offset: 7, length: 1, content: 隋, SBCK: 花山虞山陽城山姑􅂫山硯石山香山華山包山石鼓山粟山定山封山岝㟧山孺子山響山晚山百丈流襄二山印渚山天目山卞山敬亭山郡國志及宋永初山川記曰宛陵北有敬亭山山有神祠即謝朓賽雨賦詩之所其神云梓華府君頗有靈驗蓋山紀義宣城記曰登蓋山一百許歩有泉俗傳云昔有舒氏女未適人其父析薪於此女忽坐泉處牽挽不動父遽告家比來唯見清泉湛然其女性好音樂乃作􅃶􅁔即泉涌浪廻復有赤鯉一􅀟躍岀今作樂嬉遊泉猶故沸涌九華山九華山録曰此山竒秀髙岀雲表峯巒異狀其數有九故號九子山焉李白因遊江漢覩其山秀異遂更號曰九華又曰山之上有池塘數畒水田千石其池有魚長者半㝷頒首頳尾朱鬐丹腹人欲觀之叩木魚即躍以可食之物散於池中食訖而藏焉其水流􅂥爲龍池溢爲瀑泉入龍潭溪有白墡窟其􅁟如麵不墋歉歳人多食之顧野王輿地記曰九華山山髙一千丈劉禹錫序曰余嘗愛終南太華以爲此外無竒愛女几荆門以爲此外無秀及見九華始悼前言之容易也幘山宣城}
