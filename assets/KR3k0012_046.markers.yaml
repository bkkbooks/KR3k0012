  - {type: variant, offset: 1808, length: 473, content: 南三百里有姑射山冀州圖經云西入文成郡以山為界又莊子云堯見姑射神人杳然喪其天下即是此山也發鳩山山海經曰上黨發鳩山多柘木有鳥狀如烏而文首白喙赤足名曰精衛其鳴自相呼云炎帝女東遊溺海化鳥今猶銜石以填之抱犢山道書福地記曰抱犢山在上黨東南高七丈有石城高十丈方一里東南角有草名玉照下枝冬生花高五六尺味頗甘取其末服之方寸匕日三不饑宜五穀多食物無惡毒寇賊不至玉匱云抱犢山東北去恒山之南數百里云南有穴行三百里出美陽縣西七十里名洞口又隋圖經曰卑山今名抱犢山四面危絕山頂有二泉後魏葛榮亂百姓抱犢上山因以名之也房山隋圖經曰房山嶺上有王母祠甚靈俗號為王母山後漢書曰章帝永和三年幸趙祠房山即謂此山也在縣西北十里濊水出焉亦謂石臼水又謂之鹿水出行唐東入博陵謂之木刀溝一謂袈裟水又從此過石童山南流入滹沱河前燕慕容雋時房山王母祠前大樹自拔根下得玉圭壁八十三顆光色稍苛雋以為岳神之命以太牢祭之每祀有一虎來往祠側性頗馴狎而不害於物韓信山隋圖經曰韓信山圓峻俗呼為韓信臺又乎為土門口西入井陘即向太原路是此也又有韓信城信破趙駐軍於此湯山山海經曰湯山湯水出焉此湯能愈疾為天下最又按隋圖經云湯後側巖, WYG: ''}
