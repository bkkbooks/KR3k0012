  - {type: variant, offset: 3204, length: 382, content: 載後誰畏軒轅臺大翮山小翮山山海經曰大翮山小翮山有王仲廟仲字次仲年小入學而遠常先到其師怪之謂不歸使人候焉實在家等輩常見次仲捉一小棘木長三尺餘至著屋間欲取輒不見及年弱冠變蒼頡舊文為今隸書秦始皇時官務繁多次仲為文簡略赴急用之大嘉使徵不至始皇大怒詔檻車送之次仲吟詠化為大鳥出車外翮然高飛徘徊長引至于西門山落二翮因名之也飛龍山隋圖經曰飛龍山又名封龍山十六國春秋前趙錄云王俊遣祁弘率鮮卑討石勒戰於飛龍山下勒師大敗酈元水經注云汶水東經飛龍山北又趙記云每歲有疾風雹雨東南而行俗傳此山神女為東海而三石人猶存衣冠全具其北即張耳故墟耳無終山隋圖經曰無終山一名步陰山又名翁同山神仙傳云仙人白仲理者遼東人也隱居無終山中合神丹又於山中作金五千斤以救百姓即此山也又水經云翁伯周末避亂適無終山山前有泉水甚清夏嘗澡浴得玉藻架一雙於泉側又搜神記云無終山又有陽翁玉田昔雍伯雒陽人父母終葬於無終山山高八十, SBCK: ''}
