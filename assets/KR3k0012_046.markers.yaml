  - {type: variant, offset: 86, length: 0, content: '', SBCK: 北謂之採石按今對採石渡口上有謝將軍祠又按江源記云啇侶於此取石至都輸造石渚因名採石呉初以周瑜屯牛渚鎭西將軍謝尚亦鎭此城慈母山宣城圖經曰慈母山在當塗縣北臨江丹陽記云山生簫管竹王襃洞簫賦云原夫簫管之所生于江南之丘墟即此處也其竹圎緻異於衆處自伶倫採竹嶰谷巳後唯此簳見珎歴代常給樂府而}
