  - {type: variant, offset: 3393, length: 144, content: 勒戰於飛龍山下勒師大敗酈元水經注云汶水東經飛龍山北又趙記云每歲有疾風雹雨東南而行俗傳此山神女為東海而三石人猶存衣冠全具其北即張耳故墟耳無終山隋圖經曰無終山一名步陰山又名翁同山神仙傳云仙人白仲理者遼東人也隱居無終山中合神丹又於山中作金五千斤以救百姓即此山也又水經云翁伯周末避亂適無終山山前有, WYG: ''}
