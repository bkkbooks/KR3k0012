  - {type: variant, offset: 1248, length: 260, content: 東北登之望桑乾代郡數百里內宛然又郡國志云望之數百里內夏恒積雪故彼人語曰紇真山頭涼死雀何不飛去生處樂又有神泉人歌曰紇真山頭有神丹入地千尺絕骨冷是山北十里有白登山元姬山冀州圖經曰元姬山在馬邑後魏書云道武侍人姓李善謳歌死葬此山魏主思之樂府為之曲其曲存焉白登山冀州圖經曰白登山在定襄縣東北漢高所困之處上有臺因山為名火山冀州圖經曰火山在定襄縣西五里水經注曰西溪水源出火山山有火井南北七十步深不見底炎熱上升常若雷之發嚮以草爨之則煙騰火發其山一名熒臺井東五六尺有陽井廣輪與火井相狀熱勢亦同東有火井祠歲時祀之井北百步有東西谷廣十許步南岸, WYG: ''}
