  - {type: 'tls:seg', offset: 5, content: '', id: KR3k0012_CHANT_135-1a.2}
  - {type: variant, offset: 5, length: 4, content: 陳陳蒨陳, SBCK: 十一御妻以德天下之内治以明章天下之婦順故内和而家理天子立六官三公九卿二十七大夫八十一元士以聽天下之外治以明章天下之男教故外和而國治故曰天子聽男教后聽女順天子理陽道后治陰德天子聽外治后聽内職教順成俗外内和順國家治理此之謂盛德白虎通曰天子之妃謂之后何后者君也天子妃至尊故謂君也明海内之小君也史記曰自古受命帝王及繼體守文之君非獨内德茂也蓋亦有外戚之助焉夏興也以塗山而桀放也用妹喜殷之興也以有娀及有新女而紂之滅也嬖妲巳周之興也以姜嫄及大任大姒而幽王之擒也淫襃姒故易基乾坤詩首􅀜雎書羙􅁵降春秋譏不親迎夫婦之際人道之大倫也漢}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_135-2b}
