  - {type: variant, offset: 1654, length: 642, content: 辛酉齊軍救秦州吳明徹又破之癸亥詔北伐眾軍所殺齊兵令埋掩甲子南譙太守徐槾剋石梁城六年春正月壬戍朔詔曰王者以四海為家萬姓為子一物乖方夕惕猶厲六合未混旰食彌憂朕嗣纂鴻基思弘經略上符景宿下叶人謀命將興師大拯淪溺灰琯未周凱捷相繼拓地數千連城將百蠢彼餘黎毒茲異境江淮年少猶有剽掠鄉閭無賴擿他歷切出陰私將帥軍人罔顧刑典今使符法蠲除仁聲載路且肇元告慶邊服來荒始覩皇風宜覃曲澤可赦江右淮北南司霍光歷陽臨江等郡士民罪無輕重悉皆原宥七年春正月辛未輿駕親祠南郊四月乙未陳桃根表上織成羅文錦被裘各二百首詔於雲龍門外焚之八月周遣使來聘是月甘露頻降樂遊苑丁未輿駕幸樂遊苑採甘露宴群臣詔於苑龍舟山立甘露亭十一年春正月丁酉龍見于南兗州永寧樓側池中二月癸亥輿駕親耕藉田三月丁未詔淮北義人率戶口歸國建其本屬舊名置立郡縣即隸近州賦給田宅秋七月辛卯初用大貨六銖錢八月甲子青州義主朱顯宗等率所領七百戶入附丁卯輿駕幸太社觀閱武十一月詔建子令月微陽初載應此加辰宜播寬澤可大赦天下甲午周遣柱國梁士彥率眾至肥口戊戍周軍進圍壽陽以新除中衛大將軍楊州刺史始興王叔陽為大都督揔督水步眾軍十二月乙丑南北兗晉三州及盱眙山陽平馬頭秦歷陽沛北譙南梁等九州並自拔還京師譙北徐州又陷自是淮南之地盡沒于周矣十四年春正月己酉高宗弗豫甲寅崩于宣福殿時年五十三上謚孝宣皇帝廟號高宗葬顯寧陵陳叔寶陳書曰後主諱叔寶字元秀小字黃奴高宗嫡長子也梁承聖二年生于江陵江陵陷高宗遷關右留後主于穰城夫嘉三年歸京師立為安成王世子太建十四年正月高宗崩即皇帝位于太極前殿詔大赦尊皇后為, SBCK: ''}
