  - {type: variant, offset: 2366, length: 1053, content: 年為至德元年二年十二月夜天開自西北至東南其內有青黃雜色隱隱若雷聲後主在東宮好學有文藝及即位耽於酒色常在後庭不恤政事又於光昭殿前起臨春結綺望仙三閣閣高數丈竝數十間其牕牖欄檻之類悉以沈檀香木為之飾以金玉間以珠翠微風暫至香聞數里瑰寶奇麗近古未有其下積石為山引水為池植以奇樹雜以花藥後主自居臨春閣孔貴人居望仙閣張貴妃居結綺閣並複道往來婦人麗質巧態以從者常千餘人張貴妃孔貴人等八人侍坐尚書令江揔孔範等十人侍宴號曰狎客上令八婦人制五言詩十客一時繼和遲則罰酒君臣酣飲從夕達曙所司皆因閹人奏事主者由此擅作威福軍旅警備並皆不修任用沈客卿施文慶等以苛刻為忠於是文武離心莫肯用命隋文帝謂高頴曰我為百姓父母豈可限一衣帶水不拯之乎命大作戰船人請密之隋文曰吾將行天討何密之有使投梀於江彼若能改吾又何求乃遣晉王廣為元帥以討之及聞隋軍臨江孔範曰必無渡理但恣妓樂縱酒作詩不輟明日隋軍濟江陵文武百寮皆遁出唯尚書僕射袁憲侍側憲勸端坐殿上正色以待之後主曰鋒刃之下未可當之吾自有計乃逃于井既軍人窺井呼之後主不應欲下石乃叫以繩引之驚其太重及出與張貴妃孔貴人三人同束而上賀若弼呼後主視之惶懼汗流股慄再拜弼謂之曰大國之卿當小國之君拜禮也入朝不失作歸命侯亦無勞恐懼三月後主與王公百司發自建鄴至長安後主已下大小在路五百里累累不絕隋文宣詔讓後主後主伏地不能對乃宥之給賜甚厚每侍宴恐致傷心為不奏吳音後監守者言叔寶願得官號隋文曰叔寶絕無心肝監守又言叔寶日飲一石少有醒時隋文曰不爾何以過日及從東巡狩印山賦詩曰日月光天德山河壯帝居太平何以報願上封禪書并上表請封禪隋文謙讓不許後從至仁壽宮嘗侍宴及出隋文目之曰此敗豈不由飲酒作詩將此功夫何如思安邊計策初賀若弼度京口彼人密啟告急叔寶為飲酒遂不省高潁至猶見啟在床下未開封豈天亡也後主以隋仁壽四年十一月終於洛陽在位七年年五十二歲史臣曰後主生深宮之中長婦人之手既屬邦國殄瘁不知稼穡艱難初懼阽音簷危屢有哀矜之詔後稍安集復扇淫侈之風賓禮諸公唯寄情於文酒胒近群小皆委之以衡軸謀謨所及遂無骨鯁之臣權要所在莫匪侵漁之吏政刑日紊尸素盈朝耽荒為長夜之飲嬖寵同艷妻之孽危亡弗恤上下相蒙眾叛親離臨機不悟自投於井冀以茍生視其以此求全抑亦民斯下矣遐觀列辟纂武嗣興其始也皆欲齊明日月合德天地高視五帝俯協三王然而靡不有初鮮克有終其故何哉並以中庸之材懷可移之性口存於仁義心怵音黜於嗜慾仁義利物而道遠嗜慾遂性而便身便身不可久違道遠難以固志佞謟之倫承顏候色因其所好以悅導之若下坂走丸順流決壅非夫感靈辰象降生明德孰能遺其所樂而以百姓為心哉此所以成康文景千載而罕遇也, SBCK: ''}
