  - {type: variant, offset: 3, length: 0, content: '', WYG: 一總序后妃人皇后庖犧母神農母黄帝母黄帝四妃顓頊母顓頊妃帝嚳四妃堯妃舜母舜二妃夏禹母禹妃帝相后桀妃殷湯母湯妃帝乙妃紂妃周太王妃王季妃文王妃武王妃宣王后幽王褒后秦始皇太后總序后妃尚書大傳曰古者后夫人將侍君前息燭後舉燭至於房中釋朝服襲燕服然後入御史奏雞鳴於階下奏猶白階陛也然後夫人鳴佩玉於房中告去也然後應門擊柝告闢也應門朝門也闢啓也然後少師奏質明於階下質正然後夫人入庭立君出朝毛詩曰關雎后妃之徳也風之始也所以風天下而正夫婦也關關雎鳩在河之洲窈窕淑女君子好逑又曰葛覃后妃之本也后妃在父母家則志在於女功之事恭儉節用服澣濯之衣尊師敬傅則可以歸寧父母化天下以成婦道也又曰巻耳后妃之志也又當輔佐君子求賢審官知臣下之勤勞内有進賢之志而無險詖私謁之心朝夕思念至於憂勤也采采卷耳不盈頃筐嗟我懐人寘彼周行又曰樛木后妃逮下也言能逮下而無嫉妬之心焉南有樛木葛藟纍之樂只君子福履綏之又曰螽斯后妃子孫衆多也言若螽斯不妬忌則子孫衆多也螽斯羽詵詵兮宜爾子孫振振兮又曰桃夭后妃之所致也不妬忌則男女以正婚姻以時國無鰥民也桃之夭夭灼灼其華之子于歸宜其室家又曰兎罝后妃之化行也關雎之化行則莫不好徳賢人衆多也肅肅兎罝椓之丁丁赳赳武夫公侯干城又曰芣苢后妃之美也天下和平則婦人樂有子矣采采芣苢薄言采之又曰雞鳴思賢妃也哀公荒淫怠慢故陳賢妃貞女夙夜警戒相成之道焉周禮曰天子之妃曰后鄭𤣥注曰后之言後也又昏義曰古者天子后立六宫三夫人九嬪二}
