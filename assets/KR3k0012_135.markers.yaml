  - {type: variant, offset: 1369, length: 0, content: '', WYG: 文母武王妃左傳曰子産曰當武王邑姜方娠太叔杜預注曰邑姜武王后齊太公之女也懐胎為娠太叔成王之弟叔虞夢帝謂已余命而子曰虞帝天帝也虞唐君之名將與之唐屬諸參而蕃育其子孫及生有文在手曰虞遂以命之帝王世紀曰武王納太公之女曰邑姜修教於内生太叔宣王后璅語曰元妃獻后生子不完期月而生后弗敢舉王召羣吏問將棄之仲山甫曰天將以是棄周棄之何益且卜筮吉何必從乃弗棄列女傳曰周宣姜后者齊侯之女也宣王嘗早卧而晏起后夫人不出於房姜后脫簪珥待罪於永巷使其傅母通言於王曰妾之不才妾之淫心見矣至使君王失禮而晏朝以見君王之樂色而忘徳也王曰寡人不徳實自生過非夫人之罪也幽王褒后毛詩曰白華周人刺幽后也幽王娶申女以為后又得褒姒而黜申后故下國化之以妾為妻以孽為宗又曰正月刺幽王也燎之方揚寧或滅之赫赫宗周褒姒滅之國語曰夏之衰也二龍止於夏庭曰余褒之二君夏后卜殺之畱之莫吉卜請其漦而藏之吉韋昭曰龍吐沫龍之精氣也龍亡而漦在櫝而藏之三代莫發厲王之末發而觀之漦流於庭不可除王使婦人裸而譟之漦化為𤣥黿入皇后宫童妾既齔而遭之既筓而孕無夫而生子王懼而棄之宣王之時童謡曰檿弧箕服實亡周國有夫婦賣是器者王使執而戮之逃於道而見後宫童妾所棄妖子聞其啼哀而收之夫婦亡奔褒褒人有罪請入所棄女是為褒姒幽王愛之生伯服廢申后而以褒姒為后褒姒不好笑幽王欲其笑萬方不笑幽王為􅇏火有寇至則舉烽火諸侯悉至至而無寇褒姒大笑幽王恱之數為舉烽火其後不信諸侯不至西夷犬戎攻殺幽王虜褒姒史記列女傳世紀並同也列女傳曰幽王出入與褒姒同乗弋獵不時以適褒姒意秦始}
