  - {type: variant, offset: 59, length: 812, content: 此兒吾宗之英秀也梁太清初帝夢兩日鬥一大一小大者光滅墜地色正黃其大如斗世祖因三分取一而懷之侯景之亂鄉人多依山湖冠抄世祖獨保家無所犯時亂日甚乃避地臨安及高祖舉義兵侯景遣使收世祖及衡陽獻王世祖乃密裏小刀冀因入見而害景至便屬吏故其事不行高祖大軍圍石頭景欲加害者數矣會景敗世祖乃得出赴高祖營起家為吳興太守高祖受禪立為臨川郡王邑二千戶拜侍中安東將軍及周文育侯安都敗於沌口高祖詔世祖入衛軍儲戎備皆以委焉尋命率兵城南晥戶板切永定三年六月景午高祖崩遣詔徵世祖入篡皇統甲寅至自南晥入居中書省其日即皇帝位於太極前殿詔曰上天降禍奄集邦家大行皇帝背離萬國率土崩心若喪考妣龍圖寶曆眇屬朕躬運鍾擾攘事務機務南面須主西讓禮輕今便式膺景命光宅四海可大赦天下改永定四年為天嘉元年鰥寡孤獨不能自存立者賜穀人五斛孝悌力田殊行異等加爵一級甲寅分遣使者宣勞四方辛酉輿駕親祠南郊二年春正月庚戍大赦天下十二月立始興國廟於京師用王者之禮太子中庶子虞荔御史中丞孔奐以國用不足奏立煮海鹽及搉酤之稅並施行三年春正月庚戍設帷宮於南郊幣告胡公以配天辛亥輿駕親祠南郊二月甲子改鑄五銖錢三月景子安成王頊至自周詔授侍中中書監中衛將軍置佐吏是歲周所立梁王蕭詧死子巋丘軌切代立天康元年春二月景子詔曰朕以寡德纂承洪緒日昊劬勞思弘景業而政道多昧黎庶未康兼疾患淹時元陽累月百姓何咎寔由朕躬念茲在茲痛加疾首可大赦天下改天嘉七年為天康元年三月己卯以驃騎將軍開府儀同三司楊州刺史司空安成王頊為尚書令夏四月乙卯皇孫至澤生在位文武賜絹帛各有差為父後者賜爵一級癸酉世祖疾甚是日崩于有覺殿遺詔曰朕疾苦彌留遂至不救脩短有命夫復何言但王業艱難頻歲軍旅生民多弊無忘愧愓今方隅乃定俗教未弘便及大漸以為遺恨社稷任重太子可即君臨王侯將相善相輔翊內外叶和勿違朕意山陵務存儉速大斂竟群臣三日一臨公除之制率依舊典六月甲子群臣上謚曰文皇帝廟號世祖葬永寧陵陳伯宗陳書曰廢帝諱伯宗字奉業小字藥王世祖嫡長子也永定二年拜臨川王世子世祖嗣位立為, SBCK: ''}
