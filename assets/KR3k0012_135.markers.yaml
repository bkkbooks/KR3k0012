  body:
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 一揔序后妃人皇后庖羲母神農母黃帝母黄帝四妃顓頊母顓頊妃帝嚳四妃堯妃舜母舜二妃夏禹母禹妃帝相后桀妃殷湯母湯妃帝乙妃紂妃周大王妃王季妃文王妃武王妃宣王后幽王襃后秦始皇太后揔序后妃尚書大傳曰古者后夫人將侍君前息燭後舉燭至于房中釋朝服襲燕服然后入御史奏雞鳴于階下奏猶白階陛也然後夫人鳴佩玉于房中告去也然後應門擊柝告闢也應門朝門也闢啓也然後少師奏質明于陛下質正然後夫人入庭立君出朝毛詩曰􅀜睢后妃之德也風之始也所以風天下而正夫婦也􅀜􅀜睢鳩在河之洲窈窕淑女君子好俅又曰􅁑覃后妃之本也后妃在父母家則志在於女功之事躬儉節用服澣濯之衣尊敬師傅則可以歸安父母化天下以成婦道也又曰卷耳后妃之志也又當輔佐君子求賢審官知臣下之勤勞内有進賢之志而無險詖私謁之心朝夕思念至於憂勤也采采卷耳不盈頃筐嗟我懷人寘彼周行又曰樛木后妃逮下也言能逮下而無嫉妬之心焉南有樛木􅁑藟虆之樂只君子福履綏之又曰螽斯后妃子孫衆多也言􅀂螽斯不妬忌則子孫衆多也螽斯羽詵詵􅀆冝爾子孫振振􅀆又曰桃夭后妃之所致也不妬忌則男女以正婚姻以時國無鰥民也桃之夭夭灼灼其華之子于歸宜其室家又曰兔􅆯后妃之化也􅀜雎之化行則莫不好德賢人衆多也肅肅兔􅆯㭬之丁丁赳赳武夫公侯干城又曰芣苢后妃之羙也天下和平則婦人樂有子矣采采芣苢薄言采之又曰雞鳴思賢妃也哀公荒淫怠慢故陳賢妃貞女夙夜警戒相成之道焉禮記曰天子之妃曰后鄭玄注曰后之言後也又㛰義曰古者天子后立六宫三夫人九嬪二}
