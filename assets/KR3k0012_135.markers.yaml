  - {type: variant, offset: 1366, length: 0, content: '', SBCK: 正嫡稱皇后妾皆稱夫人有美人良人八子七子長使少使之號焉至武帝制婕妤娙娥傛華充衣各有爵位而元帝加昭儀之號凡十四等云昭儀位視丞相爵比諸侯王婕妤視上卿比列侯娙娥視中二千石比􅀜内侯傛華視眞二千石比大上造美人視二千石比少上造八子視千石比中更充衣視千石比左更七子視八百石比右庶長良人視八百石比左庶長長使視六百石比五大夫少使視四百石比公乗五官視三百石順常視二百石無㳙共和娯靈保林良使夜者皆視百石上家人子中家人子視有秩斗食云五官以下葬司馬門外陵上司馬門外應劭漢官曰皇后稱椒房詩云椒聊之實蔓衍盈升美其繁興以椒塗室亦取温煖除惡氣也猶天子赤泥殿上曰丹墀漢舊儀曰皇后婕妤乗輦餘皆以茵四人輿以行又曰皇后玉璽文與帝同皇后之璽金螭虎紐又曰皇后太子各食三十縣曰湯沐邑五經要義曰古者后夫人必有女史彤管之法后妃羣妾以禮御于君所女史書其日授其環以進退之法生子月娠則以金環退之當御者以銀環進者著于左手旣御著于右手左者陽也以當就男故著左手右手陰也旣御而復故此女史之職也後漢書曰夏殷以上后妃之制其文略矣周禮王者立后三夫人九嬪二十七丗婦八十一御女以備内職焉后正位宫闈同體天王夫人坐論婦禮九嬪掌教四德丗婦主䘮􅀕賔客女御序于王之燕寢頒官分務各有典司女史彤管記功書過居有保阿之訓動有環珮之響進賢才以輔佐君子哀窈窕而不淫其色所以能述宣陰化脩成内則閨房肅雍險謁不行也故康王晚朝􅀜睢作諷宣王晏起姜氏請愆及周室東遷禮序凋缺諸侯僣縱軌制無章齊桓有如夫人者六人晉獻􅂛戎女爲元妃終於五子作亂家嗣遘屯爰逮戰國風憲偷薄適情任欲顚倒衣裳以至破國亡身不可勝數斯固輕禮㢮防先色後德者也􅁗并天下多自驕大官備七國爵列八品漢興因循其號而婦制莫􅁵髙祖帷薄不脩孝文祍席無辯然而選納尚簡飾玩少華自武元之後丗増淫費至乃掖庭三千増級十四妖倖毀政之符外姻亂􅀖之迹前史載之詳矣及光武明德中興斵琱爲璞六宮稱號唯皇后貴人貴人金印紫綬俸不過粟數十斛又置美人宫人采女三等並無爵秩􅀊時賞賜充給而已漢法常因八月筭人遣中大夫與掖庭丞及相工於洛陽郷中閱視良家童女年十三已上二十已下姿色端麗合法相者載還後宫擇視可否乃用登御所以明愼娉納詳求淑哲明帝聿遵先旨宫教頗修登建嬪后必先令德内無出閫之言權無私溺之授可謂矯其􅁦矣向使因設外戚之禁編著甲令改正后妃之制貽厥方來豈不休哉雖御巳有度而防閑未篤故孝章以下漸用色授恩隆好合遂志淄蠹自古雖主㓜時艱王家多舋必委成冢宰簡求忠賢未有專任婦人斷割重器唯􅁗芊太后始攝政事故穰侯權重於昭王家冨於嬴國漢仍其謬知患莫改東京皇統屢絶權歸女主外立者四帝臨朝者六后莫不定䇿帷帟委事父兄貪孩童以乆其政抑明賢以專其威任重道悠利深禍速身犯霧露於靈臺之上家嬰縲絏於圄犴之下湮滅連踵傾輈繼路而赴蹈不息燋爛爲期終於陵夷大運淪亡神寳詩書所歎略同一揆魏志曰魏因漢法母后之號皆如舊制自夫人以下丗有増損太祖建國始命王后其下五等有夫人有昭儀有婕妤有華容有羙人文帝増貴嬪淑媛脩容順成良人明帝増淑妃昭華脩儀除順成官太和中始復命夫人登其位於淑妃之上自夫人以下爵凡十二等又曰黄􅀄三年詔曰婦人與政亂之本也自今已後羣臣不得奏事太后后族之家不得當輔政之任又不得撗授茅土之爵以此詔傳後丗􅀂有背違天下共誅之殷融議后父不應拜后曰天性之至父子之道人倫之序君臣之義性至因親故情禮無二義序縁敬故}
