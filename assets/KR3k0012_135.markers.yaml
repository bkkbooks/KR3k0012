  - {type: variant, offset: 1367, length: 0, content: '', WYG: 嚴無上易曰有父子然後有君臣有君臣然後有禮義生焉故資父事君教之至也君不以貴而臣其所尊故子爵不加於父也夫以帝王之尊猶無臣妾父母之義况后從尊於帝而令父母執臣妾耶鄭𤣥復云公朝與歸寧別有二制尊卑迭用拜謁更序亦有未詳斯議為何所據晉張華女史箴曰茫茫造化兩儀始分散氣流行既陶既甄在帝庖犧肇經天人爰始夫婦以及君臣家道以正王猷有倫婦徳尚柔含章貞吉嬺婉淑慎正位居室施衿結褵虔恭中饋肅慎爾儀式瞻清懿樊姬感莊不食鮮禽衞女矯桓耳忘和音志厲義高二主易心𤣥熊攀檻馮媛趨進夫豈無畏知死不恡班姬有詞割歡同輦夫豈不懐防微慮逺道罔隆而不殺物無盛而不衰日中則昃月滿則虧崇猶塵積替若駭機人咸知其飾容而莫知其飾性性之不飾或愆於正禮容知藻克念作聖出其言善千里應之苟違斯義同衾以疑夫出言如徴而榮辱由兹勿謂幽昧靈鑒無象勿謂𤣥漠神聽無響無矜爾榮天道惡盈無恃爾貴隆隆者墜鑒於小星戒彼攸遂比心螽斯則繁爾類歡不可以極寵不可以專專實生慢愛極則遷致盈必損理有固然美者自美翻以取尤冶容求好君子所仇結恩而絶職此之由故曰翼翼矜矜福所以興靖恭自思榮顯所基女史司箴敢告庶姬後魏書曰魏氏王業之兆雖始於神元至於昭成世崇儉質妃嬙嬪御率多闕焉唯以次第為稱而章平思昭穆惠煬烈八帝妃后無聞道武追尊祖妣皆從帝諡為皇后妃立中宫餘妾或稱夫人多少無限然皆品次太武始増左右昭儀及貴人椒房等後庭漸已多矣後魏書曰後魏故事將立皇后必令手鑄金人以成者為吉不成則不得立也又太武文成保母劬勞之恩並極尊崇之義雖事乖典禮而觀過知仁北史曰周氏率由姬制内職有序文帝創基修衽席以儉約武皇嗣立節情慾於矯枉宫闈有貫魚之美戚里無私溺之尤可謂得人君之體也宣王外行其志内逞其欲溪壑難滿採擇無厭恩之所加莫限厮皂榮之所及無隔險詖於是升蘭殿以正位踐椒庭而齊體者非一人焉階房帷而施青紫緣恩倖而擁玉帛者非一族焉雖辛癸之荒淫趙李之傾城曾未足比其髣髴也人厭苛政弊事實多文帝之祀忽諸宣王特由於此隋文思革前弊太矯其過惟皇后當室旁無私寵婦官位號未詳備焉開皇二年著内官之式略依周禮省減其數煬帝時后妃嬪御無釐婦職惟端容麗飾陪從宴遊而已帝又參詳典故自製嘉名著之於令人皇后春秋命厯序洛書擿亡辟曰人皇兄弟九人別長九州離艮地精女出為之后離艮卦所推也庖犧母河圖曰燧人之世大跡出雷澤華胥履之生伏羲帝系譜曰伏羲十月四日人定生孝經河圖云伏羲在亥得人定之時神農母春秋元命苞曰女登生神農人面龍顔始為天子孝經鈎命决曰任姒感龍生帝嵬魁嵬魁神農名帝王世紀曰炎帝神農母曰任姒有奶氏女名女登少典妃遊華陽有龍首感之生神農於裳羊山娶莾水氏之女曰聽訞音妖生帝臨魁黄帝母河圖曰黄帝母曰地祇之子名附寳之郊野大電繞北斗樞星耀感附寳生軒轅帝王世紀曰黄帝有熊氏少典之子母曰附寳其先即炎帝母家有喬氏之女世與少典氏婚及神農之末少典氏又娶附寳見大霓光繞北斗樞星照郊野附寳孕二十五月生黄帝於夀丘黄帝四妃史記曰黄帝娶於西陵之女是為嫘祖嫘祖為黄帝正妃生二子其後皆有天下漢書古今表曰黄帝妃方雷氏生𤣥囂為青陽妃嫘祖生昌意妃彤魚氏生夷鼓妃嫫母生蒼林帝王世紀曰黄帝四妃生二十五子元妃西陵氏嫘祖次妃方雷氏曰女節次曰彤魚氏次曰嫫母列女傳曰黄帝妃曰嫫母於四妃之班居下貌甚醜而最賢心每自退顓頊母河圖曰瑶光之星如虹貫月正白感女樞於幽房之宫生帝顓頊史記曰昌意娶蜀山女昌僕生高陽高陽有聖徳黄帝崩高陽立是為顓頊帝王世紀曰昌意之妃謂之女樞金天氏生顓頊於弱水顓頊妃世本曰顓頊娶於勝墳氏宋忠注曰國名之子謂女禄是生老童帝系云勝奔氏餘同帝嚳四妃河圖曰慶都與赤龍合生帝堯於伊祁世紀云從母姓毛詩曰天命𤣥鳥降而生商宅殷土芒芒春秋元命苞曰周本姜嫄遊閟宫其地扶桑履大跡生后稷春秋合誠圖曰堯母慶都有名於世蓋太常之女生於斗維之野常在三阿之東南天大雷電有血流潤大石之中生慶都長大常有黄雲覆蓋之夢食不饑天帝以氣食年二十寄伊長孺家無夫出觀三阿之首常若有神隨之有赤龍負圖至署曰赤帝起成天寳即慶都之謹任之乳之必於翼之野奄然隂風雨龍與慶都合有娠龍消不見漢書云堯母十四月生堯帝王世紀搜神記同史記曰嚳娶陳鋒氏女生放勲又曰后稷棄母有邰氏女曰姜嫄為帝嚳元妃出野見巨人跡心欣然踐之身動如孕者居期而生子以為不祥棄之隘巷以為神收養之初欲棄之因名棄毛詩生民曰厥初生民時維姜嫄生民本后稷也姜姓出后稷之母配高辛氏帝焉者也史記曰殷契母曰簡狄有娀氏為帝嚳次妃見𤣥鳥遺卵簡狄取而吞之因孕生契世本曰帝嚳卜其四妃之子而皆有天下元妃有邰國之女曰姜嫄是産后稷次妃有娀氏之女簡狄是産契次妃曰陳妃是生帝堯次妃曰娵訾産帝摯帝王世紀曰娵訾班在四人下生摯最長故登帝位堯妃世本曰堯娶散宜氏子謂之女皇宋忠曰是生丹朱帝系漢書同帝王世紀曰女瑩生丹朱漢書亦云女瑩舜母河圖著命苞曰女登見大虹意感生舜於姚墟史記曰舜父瞽叟盲而舜母死瞽叟更娶妻而生象舜二妃尚書曰師錫帝曰有鰥在下曰虞舜帝曰俞予聞如何岳曰瞽子父頑母嚚象傲克諧以孝烝烝乂不格姦帝曰我其試哉女于時觀厥刑于二女釐降二女于溈汭嬪于虞帝曰欽哉禮記曰舜塟蒼梧蓋二妃未之從也山海經曰大荒之中有不庭之山帝舜妻娥皇生焉帝系曰舜娶於帝堯謂之曰女姬列女傳曰有虞二妃帝堯之二女也長曰娥皇次曰女英堯舉舜為相攝行王政舜毎事常謀於二女舜既受禪為天子娥皇為后女英為妃事瞽瞍猶若初焉天子稱二妃聰明貞仁舜陟方死蒼梧二妃死於江湘之間故謂之湘君尸子曰堯妻舜以娥皇媵之以女英離騷九歌湘夫人曰帝子降兮北渚目渺渺兮愁予帝子謂堯二女娥皇女英隨舜不及卒於湘水因名曰湘夫人也嫋嫋兮秋風洞庭之波兮木葉下夏禹母河圖著命苞曰修已見流星意感生帝文命禹周禮含文嘉曰夏姒氏祖以薏苡生孝經鈎命决曰流星貫昴紀夢接生禹世本曰鯀娶有莘氏女志是生高密禹禹妃尚書咎繇謨禹曰予娶于塗山辛壬癸甲辛日娶妻至于甲子復往治水啟呱呱而泣予弗子塗山女史記同山海經曰太室嵩高咸陽西啟母化為石焉帝王世紀曰禹始納塗山女曰女媧合婚於台桑有白狐九尾之瑞至是為攸女故連山易曰禹娶塗山之子名曰攸女生啟是也列女傳曰啟母塗山者夏禹之妃塗山氏女也禹娶四日而去治水啟既生呱呱而泣禹三過其門不入吕氏春秋曰禹行水見塗山之女禹未之遇南音南土遇以禮成之塗山之女乃令其妾往候禹於塗山之陽女作歌曰候人實始作南音也帝相后左傳曰伍貟曰昔有過澆滅夏后相后緡方娠逃出自竇后緡相妻歸於有仍緡有仍氏女生少康焉澆求之逃奔有虞虞思妻之以二姚楚辭曰迨少康之未家留有虞之二姚桀妃洛書録運法曰孔甲見逢氏抱小女妺喜帝孔甲恱之以為太子履癸妃國語曰桀伐蒙山而得妺喜紀年曰后桀伐蒙山山民進女於桀二人曰琬曰琰桀受二女無子刻其名於苕華之上苕是琬華是琰而棄其元妃於洛曰妺喜帝王世紀曰妺喜好聞裂繒之聲而笑桀為發繒裂之以順適其意列女傳曰夏桀妺喜者桀之妃也桀伐有施有施女以妺喜以女妻人曰女殷湯母河圖著命苞曰扶都見白氣貫月意感生黑帝子湯湯妃帝王世紀曰湯娶有莘為正妃列女傳曰湯妃有莘之女也擇徳高如伊尹者為之臣佐湯致王訓正後宫嬪御有序咸無嫉妬逆理之人生三子太丁外丙仲壬教誨有成太丁早卒丙壬嗣登大位帝乙妃史記曰帝乙長子曰微子啓賤不得立立少子辛辛母正后位帝王世紀曰帝乙二妃生四子長曰微子啓中微仲少曰辛庶妃生箕子初啟母之生啟及仲尚為妾及立為后乃生紂紂妃史記曰紂伐有蘇有蘇人以妲己女焉紂愛妲己惟妲己之言是從武王殺之斬以𤣥戈懸之小白旗列女傳曰妲己者殷紂之妃也紂伐有蘇有蘇女以妲己美而辯用心邪僻巧比於體臧施於貌紂好酒淫樂不離妲己所譽者貴之所憎者誅之周太王妃毛詩曰古公亶父來朝走馬率西水滸至于岐下爰及姜女聿來胥宇又曰摯仲氏任自彼殷商來嫁于周曰嬪于京乃及王季維徳之行摯國任姓史記曰古公太姜生少子季厯季厯娶太任皆賢婦人生子曰昌列女傳曰太姜者太王之妃有台之女賢而有色生太伯仲雍王季化導三子皆成賢徳太王有事必諮謀焉王季妃河圖著命苞曰太任夢長人感已生文王毛詩曰思齊太任文王之母思媚周姜京室之婦列女傳曰太任者王季之妃摯任之女也端懿誠莊維徳之行及其有娠也目不視惡色耳不聽淫聲口不出放言溲於豕牢而生文王文王生而明聖太任教以一而知其百卒為周宗君子謂太任能為胎教文王妃毛詩曰天監在下有命既集文王初載天作之合在洽之陽在渭之涘纘女維莘長子維行纘繼也莘太姒國也長子長女也篤生武王箋云太姒厚生聖子武王又曰太姒嗣徽音則百斯男論語曰武王曰予有亂臣十人馬融曰亂理也十人謂周公旦召公奭太公望畢公榮公太顛閎夭散宜生南宫括其一人謂文母也孔子曰才難不其然乎唐虞之際於斯為盛有婦人焉九人而已列女傳曰太姒者文王之妃莘姒之女也}
