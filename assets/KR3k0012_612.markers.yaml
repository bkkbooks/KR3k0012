  - {type: variant, offset: 2664, length: 0, content: '', WYG: 嘗賜房𤣥齡黄銀帶顧謂曰昔如晦與公同心輔朕今日所賜惟獨見公因泫然流涕又曰朕聞黄銀多為鬼神所畏命取黄金帶遣𤣥齡親送于靈所也水銀史記曰秦始皇葬以水銀為百用江河大海機轉相輪終而復始皇覽曰闗東賊發始皇墓中有水銀廣雅曰水銀謂之澒呉越春秋曰閶闔葬墓中澒地廣六丈神仙傳曰封君達隴西人服鍊水銀年百餘嵗常騎青牛鉛尚書禹貢曰海岱惟青州岱畎絲枲鉛松怪石宋記曰髙漸離秦始皇矐其目使擊筑漸離乃以鉛置筑中舉筑扑秦始皇帝南史曰何承天博覽古今為一時所重張永嘗開𤣥武湖遇古塜塜上得一銅斗有柄文帝以訪}
