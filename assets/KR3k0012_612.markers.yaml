  - {type: variant, offset: 1707, length: 3, content: 目猶聰, SBCK: 在豫章豊城因以煥爲豊城令使求之煥到縣掘獄屋基得􅀟劒其夕斗牛間氣不復見焉煥以南昌西山北巖下土以拭劒光芒艶發遣使送一劒并土與華留一自佩華以南昌土不如華隂赤土因以華隂土一斤致煥煥更以拭劒倍益精}
