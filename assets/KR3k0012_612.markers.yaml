  - {type: variant, offset: 2751, length: 198, content: 原字根矩家貧早孤鄰有書舍原過其傍而泣師問曰童子何悲原曰一則顧其少孤二則羨其未學師亦哀原之言而為之泣曰童子茍有志我從相教不之求費也楚國先賢傳曰孫敬好學時欲寤寐懸頭至屋梁以自課常閉戶號為閉戶先生廬江七賢傳曰文黨字翁仲欲之學時與人俱入藂木謂侶人曰吾欲遠學先試投我斧高木上斧當掛乃仰投之斧果上掛因之長安受經七賢傳曰阮籍有奇才異質或閉戶讀書連月不出或遊行丘林經日不返益都耆舊記曰朱倉字雲卿廣漢人畜錢八百文之, SBCK: ''}
