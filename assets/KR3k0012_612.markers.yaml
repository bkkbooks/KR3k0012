  - {type: variant, offset: 2689, length: 0, content: '', WYG: 制作也臣見魏大司農盧元明}
  - {type: variant, offset: 2690, length: 0, content: '', WYG: 嵩山廟記云有神人以玉為形像長四尺四寸或出或隱出則令世延長伏惟陛下應天順民定鼎嵩雒岳神自見臣敢稱慶因再拜百官畢賀天子大悦賜縑二百匹國語曰海鳥爰居止於魯東門之外三日臧}
  - {type: variant, offset: 2691, length: 4, content: 章及注解, WYG: 仲使國人祭之文仲不知以為神展禽曰越哉臧孫之為政也越迂也言其迂闊不知所要也夫祀國之大節而節政之所成也故慎制祀以為國典今無故而加典非政之宜也夫聖王之制祀也法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能捍大患則祀之非是族也不在祀典今海鳥至已不知而祀之以為國典難以為仁且智矣夫仁者講功而智者處物無功而祀之非仁也不知而不問非智也今兹海其有災乎夫廣川之鳥獸恒知而避其災也是嵗也海多大風冬暖爰居所避文仲聞柳下季之言使}
  - {type: page-break, offset: 2691, content: '', id: KR3k0012_WYG_612-13b, image: WYG0898/WYG0898-0540d.png}
