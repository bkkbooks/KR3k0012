  - {type: variant, offset: 2679, length: 2, content: 釋卷, WYG: 對永明中天忽黄色照地衆莫能解摛云是榮光世祖大悦梁書裴子野傳曰時西北逺邊有白題及滑國遣使由岷山道入貢此二國厯代弗賔莫知所出子野曰漢潁隂侯斬胡白題将一人服䖍注曰白題胡也又漢定逺侯擊虜八滑此其後乎}
  - {type: page-break, offset: 2679, content: '', id: KR3k0012_WYG_612-12a, image: WYG0898/WYG0898-0540a.png}
