  - {type: variant, offset: 1584, length: 2, content: 顧歡, SBCK: 王儉自以􅀶聞多識讀書過陸澄澄曰僕少小來無事唯以讀書爲業其年巳倍今君少便鞅掌王務雖復一覽便諳然見卷軸未必多僕儉集學士何寧等盛自啇略澄待儉詩畢然後談所遺漏數百千條皆儉所未覩儉乃敬服儉在尚書省出巾箱机案新服飾令學士􅀠事多者與之人各得一兩物澄後來更出諸人所不知事復各數條并奪物將去梁書曰韋叡子稜}
  - {type: variant, offset: 1584, length: 64, content: 顧歡字景怡吳郡鹽官人也年六十歲書甲子有蘭三篇歡推計遂知六甲家貧父使驅田中雀歡作黃雀賦雀食稻過半父怒欲撻之見賦乃止鄉中有學舍歡貧無, WYG: 王儉自}
  - {type: variant, offset: 1584, length: 2, content: 顧歡, krp: 王儉自以博聞多識讀書過陸澄澄曰僕少小來無事唯以讀書爲業其年巳倍今君少便鞅掌王務雖復一覽便諳然見卷軸未必多僕儉集學士何寧等盛自啇略澄待儉詩畢然後談所遺漏數百千條皆儉所未覩儉乃敬服儉在尚書省出巾箱机案新服飾令學士隷事多者與之人各得一兩物澄後來更出諸人所不知事復各數條并奪物將去梁書曰韋叡子稜}
  - {type: variant, offset: 1587, length: 6, content: 景怡吳郡鹽官, SBCK: 威直性恬素以書史爲業􅀶物強記當代之士咸就質疑隋書曰王邵􅀄在齊時祖孝徴魏收陽休之等甞論古事有遺忘討閱不能得因呼邵問之邵具論所出取書驗之一無舛誤自是大爲時}
