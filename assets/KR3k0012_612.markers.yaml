  - {type: variant, offset: 2685, length: 1, content: 李, WYG: 樂藹為御史中丞時長沙宣武王將葬而車府忽於庫火油絡欲推主者藹曰昔晉武庫火張華以為積油萬石必燃今庫若有灰非吏罪也既而檢之果有積灰時稱其博物𢎞恕三國典畧曰齊徐之才見有人以五色斑爛骨為刀把者之才曰此人瘤也問所得處云於塜見髑髏骨長數寸試削之視有文理故用之又曰周平蜀還得樂器者皆莫之識太常少卿斛斯徵直陵切見之曰此錞于也人弗之信徵遂依干寳周禮注以芒筒捋之其聲極振衆乃嘆服徴取以合樂焉隋}
  - {type: page-break, offset: 2685, content: '', id: KR3k0012_WYG_612-12b, image: WYG0898/WYG0898-0540b.png}
  - {type: variant, offset: 2687, length: 1, content: 樓, WYG: 曰崔賾大業四年從駕汾陽宫次河陽鎮藍田令王曇於藍田山得一玉人長四尺四寸著大領衣冠幘奏之詔問羣臣莫有識者賾答曰謹按漢文以前未有冠幘即是文帝以來}
  - {type: page-break, offset: 2687, content: '', id: KR3k0012_WYG_612-13a, image: WYG0898/WYG0898-0540c.png}
