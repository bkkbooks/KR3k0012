  - {type: punctuation, offset: 407, content: 「, id: KR3k0012_CHANT_612-bkkpn130}
  - {type: variant, offset: 407, length: 269, content: 高鳳字文通南陽蔡人家以農畝為業而勤學專精讀誦妻嘗之田曝麥於庭令鳳護之懼雞以竿授之時天暴雨而鳳持竿讀書不覺潦水大至流其麥矣又曰袁閎傳黃巾賊起攻沒郡縣百姓驚散閎誦不移賊相約語不入其閭鄉人就閎避難皆得全免又曰曹褒博雅踈通尤好禮事常感朝廷制度未備慕叔孫通為漢禮儀晝夜研精沉吟專思寢則懷抱筆扎行則誦習文書當其念至忘所之適又曰承宮少孤年八歲為人牧豕鄉里徐子盛者以春秋經授諸生數百承宮過息廬下樂其業因就聽經遂請留門下續漢書曰宮過徐子盛好之因棄其渚而留聽經主怪其不還求索得宮欲笞之門下生共禁止因留之為諸生拾薪執苦數年勤學不倦又曰崔琦字子瑋濟北相瑗之宗也引, SBCK: 黄香知}
