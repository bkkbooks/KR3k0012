  - {type: variant, offset: 2552, length: 197, content: 豈徒然哉又曰劉炫字光伯少以聰敏見稱與信都劉焯閉戶讀書十年不出又曰王邵篤學好經史遺落世事用思既專性頗怳忽至對食閉目凝思盤中之肉輒為僕從之所噉邵弗之覺唯責肉少數罰廚人廚人以情白依前閉目伺而獲之廚人方免笞辱其專固如此唐書曰李磎昭宗朝為宰相磎自在臺省聚書至多手不釋卷時人號曰李書樓所撰文章及注解書傳之闕疑近百餘卷經亂悉亡世說曰管寧華歆嘗同席讀書有乘軒冕過門者寧讀書如故歆出觀寧割席分坐曰子非吾友也邴原別, SBCK: 部􅂄舊}
