  - {type: variant, offset: 1689, length: 2, content: 隱士, SBCK: 太宗稱虞􅁥􅀶聞德行書翰詞藻忠直一人而巳兼是五善􅀶物家語曰夫子曰子産於民爲惠主於學爲􅀶物吾以兄事之也左傳昭元年曰晉侯有疾鄭伯使公孫僑如晉聘且問疾叔向問焉曰寡君之疾病卜人曰實}
  - {type: variant, offset: 1689, length: 2, content: 隱士, krp: 太宗稱虞監博聞德行書翰詞藻忠直一人而巳兼是五善博物家語曰夫子曰子産於民爲惠主於學爲博物吾以兄事之也左傳昭元年曰晉侯有疾鄭伯使公孫僑如晉聘且問疾叔向問焉曰寡君之疾病卜人曰實}
  - {type: variant, offset: 1692, length: 4, content: 驎士火燒, SBCK: 臺駘爲崇史莫之知敢問此何神也子産曰昔髙辛氏有二子伯曰閼伯季曰實沈居于曠林不相能也日㝷干戈以相征討后帝不臧遷閼伯于啇丘主辰啇人是因故辰爲啇星遷實沈于生疾矣僑又聞之内官不及同姓内官嬪御其生不殖殖長也美先盡矣則相生疾同姓之相與先美矣美極則盡盡則生疾之君子是以惡之故志曰買妾不知其姓則卜之違此二者古之慎也一四時取同姓二者古人所慎男女辨姓禮之大司也辨別也今君内實有四􅁎焉同姓􅁎四人其無乃德是也乎􅀂由是二者弗可爲也已爲治也四􅁎有省猶可無則必生疾矣據異姓去同姓故言省叔向曰善哉􅆄未之聞也晉侯聞子産之言曰愽物君子也重賄之又昭七年傳曰子産聘于晉晉侯有疾韓宣子逆客私焉私語曰寡君寢疾於今三月矣並走羣望晉所望祀山川皆走往祈禱有加而無瘳今夢黄熊入於寢門其何厲􅀑也對曰以君之明子爲大政其何厲之有昔堯殛鯀于羽山羽山在東海祝其縣西南其神化爲黄熊以入于羽淵實爲夏郊三代祀之鯀禹父夏家郊􅀕之歴殷周二代又通在羣神之數并見祀晉爲盟主其或者未之祀乎言周衰晉爲盟主得佐天子祀羣神韓子祀夏郊祀鯀晉侯有間間差也賜子産莒之二方鼎方鼎莒所貢漢}
  - {type: page-break, offset: 1692, content: '', id: KR3k0012_SBCK_612-4b}
  - {type: page-break, offset: 1692, content: '', id: KR3k0012_SBCK_612-5a}
