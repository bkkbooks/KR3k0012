  - {type: variant, offset: 2424, length: 6, content: 外兄博弈孝寬, SBCK: 侯令守之是公侯皆屬於王者客曰防風何守仲尼曰汪茫氏之君汪芒長翟國名守封嵎山者也封封山嵎嵎山在今吴郡永安縣也爲七姓柒汪芒氏之姓在虞夏啇爲汪茫氏於周爲長翟周丗其國北遷爲長翟今爲大人今孔子時客曰人長之極幾何仲尼曰僬僥氏長三尺短之至也僬僥西南蠻之别也長者不遇十之數之極也十之三丈則防風氏又曰仲尼在陳有隼集于陳侯之庭而死楛矢貫之石砮其長尺有咫隼鷙鳥鶚也楛木名砮鏃也石爲之八寸曰咫楛矢貫之墜而死也陳惠公使以隼如仲尼之館問之惠公哀公之孫悼太子之子吴也仲尼曰隼之來也逺矣此肅慎氏之矢也肅慎北夷之國昔武王克啇通道于九夷八蠻使各}
