  - {type: punctuation, offset: 88, content: 「, id: KR3k0012_CHANT_612-bkkpn27}
  - {type: variant, offset: 88, length: 223, content: 路溫舒字長君父使牧羊溫舒取澤中蒲截以為牒編用寫書後漢書曰桓榮字春卿沛國龍亢人也少與兄元卿俱在田捃拾而榮開書讀之講誦不息元卿嗤榮曰但自苦氣力何時復施用乎榮笑不應日夜不倦世祖聞召拜議郎使入教授太子帝稱善曰得生幾晚後為太子少傅帝賜其車馬衣服榮得之陳於庭謂父兄曰此吾稽古之力也元卿歎曰我本農家子豈意學之為利乎又曰法真隱居大澤講論術藝歷年不窺園圃又曰何休作公羊解詁覃思不窺園者十有七年又曰趙昱常就處士東莞綦母公受公羊傳至歷年潛思不窺園門親踈稀見其面又曰張霸, SBCK: 楊震}
