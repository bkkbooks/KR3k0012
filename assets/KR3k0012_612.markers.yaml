  - {type: variant, offset: 2954, length: 217, content: 寧受春秋糴小豆十斛屑之為糧閉戶精誦寧矜之歛得米二十石倉不受嵇康高士傳曰逢真王莽辟不至嘗為杜陵門下掾終身不窺長安城但閉門讀書未嘗問政呂氏春秋曰甯越中牟之鄙人也苦耕稼之勞謂其友曰何為而可以逸此苦也其友曰莫如學學三十年則可以達矣甯越曰請以十五歲人將休吾不休人將臥吾不臥學十五歲而周威公師之世要論曰有讀書倦而剌其掌墨子曰墨子使衛載書甚多強唐子見而怪之墨子曰昔周公旦朝讀書百篇夕見七十士相天子猶如此況無事敢廢此乎鄒子曰朱買臣孜孜修學不知雨之流粟, SBCK: 寛}
