  - {type: variant, offset: 1594, length: 0, content: '', SBCK: 所許稱其􅀶物唐書曰李守素尤爲譜學妙諳人物自晉宋以降四海士流及周魏以來諸貴勲等華戎閥閱靡不詳究時號爲肉譜甞與虞丗南等六人同直學舘其夜七夕内出珎饌有教賦詩因共談人物􅀄言江左東南猶相酬對及言北臺諸姓次第如流顯其歴葉皆有據證丗南但撫掌而􅀏不復能荅旣而歎曰肉譜定可畏許敬宗因謂丗南曰李倉曹以善人物乃得此名雖爲美事然非雅號曰君旣言成准的冝有以改之荅曰卿言是}
  - {type: variant, offset: 1594, length: 0, content: '', krp: 所許稱其博物唐書曰李守素尤爲譜學妙諳人物自晉宋以降四海士流及周魏以來諸貴勲等華戎閥閱靡不詳究時號爲肉譜甞與虞丗南等六人同直學舘其夜七夕内出珎饌有教賦詩因共談人物𥘉言江左東南猶相酬對及言北臺諸姓次第如流顯其歴葉皆有據證丗南但撫掌而笑不復能荅旣而歎曰肉譜定可畏許敬宗因謂丗南曰李倉曹以善人物乃得此名雖爲美事然非雅號曰君旣言成准的冝有以改之荅曰卿言是}
