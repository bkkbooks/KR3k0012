  - {type: variant, offset: 1595, length: 0, content: '', SBCK: 昔任彦昇善談經籍梁代稱爲五經笥今目倉曹爲人物志可乎杜如晦等咸以爲佳又曰蔣乂㓜好學德宗甞幸凌煙閣見左壁頽剥上有殘缺文記毎行可辯三五字命録之以問宰臣宰臣卒然無以對遽召乂訪之對曰此聖歴}
  - {type: page-break, offset: 1595, content: '', id: KR3k0012_SBCK_612-3a}
  - {type: variant, offset: 1595, length: 0, content: '', krp: 昔任彦昇善談經籍梁代稱爲五經笥今目倉曹爲人物志可乎杜如晦等咸以爲佳又曰蔣乂㓜好學德宗甞幸凌煙閣見左壁頽剥上有殘缺文記毎行可辯三五字命録之以問宰臣宰臣卒然無以對遽召乂訪之對曰此聖歴}
  - {type: variant, offset: 1596, length: 0, content: '', SBCK: 侍臣圖賛也暗誦諷不失一字宰臣上奏德宗歎曰虞丗􅀯暗冩列女傳無以加也國語曰晉文公使趙衰爲卿辭云欒枝貞慎先􅎮有謀胥臣多聞皆可以爲輔也孟子曰人皆知糞其田而莫知糞其心何謂糞心􅀶學多聞也莊子曰惠施多方其書五車稱連環可解􅀽子正書曰學莫大於􅀶行莫過於約聖人者天下之至智也􅀶學以聚之兼聽而辯之抱朴子曰洪年十}
