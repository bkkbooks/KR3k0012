  - {type: variant, offset: 1070, length: 376, content: 夜繼日至於弱冠無不窮覽晉書曰王育少孤貧為人傭牧羊豕近學堂育常有暇拾薪以雇書生抄書後截蒲以學書日夜不止亡失羊豕其主笞之育甚有慚色將鬻己以償於是郭子敬聞而嘉之代育還羊豕給其衣食令育與其子同學育遂博通經史仕偽漢官至太傅又曰車胤字武子南平人勤學不倦家貧嘗不得油夏月則練囊盛數十螢火虫以照書晉中興書曰孫盛字安國為祕書監好學自少及長手常不釋卷既居史官乃著三國晉陽秋又曰劉寔長不滿七尺精學不倦雖居官職至于皓首手不釋卷崔鴻春秋前燕錄曰豫州剌史張悕字文祖清河武城人也悕少孤貧隨母長於舅氏令其牧牛悕幼而好學事母以孝聞每日必於牧暇採樵二束菜二本一以供母一以雇人書晝則折木葉學晝夜則誦所書者宋書曰沈攸之字仲達晚好讀書史漢事多所諳憶常歎曰早知窮達有命恨不七年讀書又曰鄭鮮之字道子滎陽開封人鮮之下帷讀書絕交遊之務又曰王歆字休泰琅邪人家貧好學嘗三日絕糧執書不輟父母家人或謂之曰困窮如, WYG: 過}
