  - {type: punctuation, offset: 1983, content: 》, id: KR3k0012_CHANT_612-bkkpn609}
  - {type: variant, offset: 1984, length: 415, content: 自發名伯猷謂之曰卿不值老夫猶當逐兔後周書曰樊深博物性好學老而不怠朝暮還往常據鞍讀書至馬驚墜地損折支體終亦不改後除國子博士梁史曰沈約十三而遭家難潛竄會赦乃免既而流寓孤貧篤志好學晝夜不釋卷母恐其以勞生疾常遣減油滅火而晝之所讀夜輒誦之遂博通群籍善屬文濟陽蔡興宗聞其才而善之及為郢州引為安西外兵參軍兼記室興宗常謂其諸子曰沈記室人倫師表宜善師之梁書曰韋叡族弟受字孝友沉毅有器局年十二嘗遊京師值天子出遊南苑邑里諠譁老幼爭觀受坐讀書不釋卷宗族莫不異之沈峻字士嵩師事宗人沈驎士嵩在門下積年晝夜自課或睡寢輒以杖自擊其為志如此又曰江革字休映考城人吏部郎謝眺常過革第時大寒雪革獘絮單席而躭學不倦眺乃脫其所著衣并手割半氈與革後建安王為雍州剌史表求記室人或薦之以為征北記室參軍與弟觀少長共居不忍離別苦求同行參軍沈約任昉同與革書曰此雍府妙選英才文房之職揔卿昆弟可謂馭二龍於長途騁騏驥於千里又曰劉峻字孝標平原人勤學去學五六里常行讀書不息地有坑坎每常倒蹶然後始悟, SBCK: 合樂焉}
