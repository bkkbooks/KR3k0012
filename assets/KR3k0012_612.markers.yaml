  - {type: variant, offset: 2663, length: 0, content: '', WYG: 七年傳曰子産聘于晉晉侯有疾韓宣子逆客客私焉私語曰寡君寝疾於今三月矣並走羣望晉所望祀山川皆走往祈禱有加而無瘳夢黄熊入於寝門其何厲鬼也對曰以君之明子為大政其何厲之有昔堯殛鯀于羽山羽山在東海祝其縣西南其神化為黄熊以入于羽淵實為夏郊三代祀之鯀禹父夏家郊祭之厯殷周三代又通在羣神之數見祭祀晉為盟主其或者未之祀乎言周襄晉文為盟主得佐天子祀羣神韓子祀夏郊祀鯀晉侯有間間差也賜子産莒之二方鼎方鼎莒所貴漢書曰張安世字子孺給事尚書上幸河東亡書三篋詔問莫能知惟安世識之具作其事後求得書以相校無所遺失上竒其材擢尚書令晉書張華傳曰人有得鳥毛三丈以示華華見慘然曰此謂海鳬毛也出則天下亂矣陸機餉張華鮓時賔客滿座華發器便曰龍肉也衆未之信華曰試以苦酒濯之必有異既而五色光起機問鮓主果云園中茅積下得一白魚質状殊常以作鮓過美故以相獻武庫封閉甚密其中忽有雉雊華曰此必虵化為雉開視雉側果有虵蜕焉呉郡臨平岸崩出一石皷槌之無聲帝以問華華曰可取蜀中桐材刻魚形扣之則鳴矣於是如其言果聲聞數里初呉之未滅也斗牛之間常有紫氣道術者皆以呉方强盛未可圖也唯華以為不然及呉平之後紫氣愈明華聞豫章雷煥妙達象緯要之宿登樓仰觀煥曰寳劍之氣在豫章豐城因以煥為豐城令使求之煥到縣掘獄屋基得雙劍其夕斗牛間氣不復見焉煥以南昌西山北巖下土以拭劍光芒艶發遣使送一劍并土與華留一自佩華以南昌土不如華隂赤土因以華隂土一斤致煥煥更以拭劍倍益精明又魏時殿前鐘忽大鳴人共震駭華云此蜀山毁故鐘鳴尋蜀郡上其事黄銀禮書威儀曰君乗金而黄則黄銀見隋書曰辛公義為牟州刺史時山東霖雨自陳汝至於滄海皆苦水災境内犬牙獨無所損山出黄銀獲之以獻詔水部郎婁崱就公義禱乃聞空中有金石絲竹之響唐書曰太}
