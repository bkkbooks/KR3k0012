  - {type: variant, offset: 2402, length: 4, content: 皇甫繢字, SBCK: 崔頥大業四年從駕汾陽宮次河陽鎮藍田令王曇於藍田山得一玉人長三尺四寸着大領衣冠幘奏之詔問群臣莫有識者頥荅曰謹案漢文以前未有冠幘即是文帝以來所制作也臣見魏大司農盧元明撰嵩山廟記云有神人以玉爲形像長數寸或出或隠出則丗延長伏惟陛下應天順民定鼎嵩雒岳神自見臣敢稱慶因再拜百官畢賀天子大恱賜縑二百國語曰海鳥爰居上於魯東門之外三日臧文仲使國人􅀕之文仲不知以爲神展禽曰越哉臧孫之爲政也越迂也言其迂闊不知所要也夫祀國之大節也而節政之所成也故慎制祀以爲國典今無故而加典非政之冝也夫聖王之制祀也}
  - {type: page-break, offset: 2402, content: '', id: KR3k0012_SBCK_612-8a}
  - {type: variant, offset: 2402, length: 12, content: 皇甫繢字功明三歲而孤為外, WYG: 王邵初在齊時}
  - {type: variant, offset: 2402, length: 4, content: 皇甫繢字, krp: 崔頥大業四年從駕汾陽宮次河陽鎮藍田令王曇於藍田山得一玉人長三尺四寸着大領衣冠幘奏之詔問群臣莫有識者頥荅曰謹案漢文以前未有冠幘即是文帝以來所制作也臣見魏大司農盧元明撰嵩山廟記云有神人以玉爲形像長數寸或出或隠出則丗延長伏惟陛下應天順民定鼎嵩雒岳神自見臣敢稱慶因再拜百官畢賀天子大恱賜縑二百國語曰海鳥爰居上於魯東門之外三日臧文仲使國人祭之文仲不知以爲神展禽曰越哉臧孫之爲政也越迂也言其迂闊不知所要也夫祀國之大節也而節政之所成也故慎制祀以爲國典今無故而加典非政之冝也夫聖王之制祀也}
  - {type: variant, offset: 2407, length: 1, content: 明, SBCK: 施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能扞大患則祀之非是族也不在祀典今海鳥至巳不知而祀之以爲國典難以爲仁且智矣夫仁者講功而智者處物無功而祀之非仁也不知而不問非智也今兹海其有災乎夫廣川之鳥獸􅁪知而避其災也是歳也海多大風冬煖爰居所避文仲聞栁下季之言使書以爲}
