  - {type: variant, offset: 2661, length: 1, content: 磎, WYG: 守素尤工譜學妙譜人物自晉宋以降四海士流及周魏以來諸勲貴華戎閥閲莫不詳究時號為肉譜嘗與虞世南等六人同直學館其夜七夕内出珍饌有教賦詩因共談人物初言江左東南猶相酬對及言北地諸姓次第如流顯其厯葉皆有據證世南但撫掌而笑不復能答既而嘆曰肉譜定可畏許敬宗因謂世南曰李倉曹以善譜人物乃得此名雖為美事然非雅目今君既言成準的宜有以改之答曰卿言是也昔任彦昇善談經籍梁代稱為五經笥今目倉曹為人物志可乎杜如晦等咸以為佳又曰蔣乂幼好學徳宗嘗幸凌煙閣見左壁頽剥上有殘缺文記每行可辨三五字命録之以問宰臣宰臣卒然無以對遽召乂訪之對曰此聖厯中侍臣圖贊也暗誦諷不失一字宰臣上奏徳宗嘆曰虞世南暗寫列女傳無以加也國語曰晉文公使趙衰為卿辭云欒枝貞慎先軫有謀胥臣多聞皆可以為輔也孟子曰人皆知糞其田而莫知糞其心何謂糞心博學多聞也荘子曰惠施多方其書五車稱連環可解袁子正書曰學莫大於博行莫大於約聖人者天下之至智也博學以聚之兼聽而辨之抱朴子曰洪年十六始習孝經論語易但貪廣覽於衆書曾披渉五經諸史百家之言将近萬卷吕氏春秋曰有讀史者晉史三豕渉河子夏曰非也是己亥也夫己之與三相近豕之與亥相似至晉而問之則曰晉師己亥渉河也漢書藝文志曰成帝詔光禄大夫劉向校經傳諸子詩賦歩兵校尉任宏校兵書太史令尹咸校術數侍醫李柱國校方技每一書已師古曰已畢也向輙條其篇目撮其指意録奏之㑹向卒哀帝復使向子侍中奉車都尉歆卒父業歆於是總羣書而奏其七略故有輯略師古曰輯與集同謂諸書之總要有六藝畧師古曰六藝六經也有諸子略有詩賦略有兵書略有術數略有方技略抱朴子曰書三寫以魯為魚以虞為虎劉向七畧曰古文或記闕頴容春秋例曰漢興博物洽聞著述之士前有司馬遷揚雄劉歆後有鄭衆賈逵班固之徒馬融鄭𤣥之所著作違義正者遷尤多聞略舉一兩事以言之史記不識畢公文王之子而言與周同姓揚雄著法言不載六十四卦云所從來尚矣後漢書曰和熹鄧太后從曹大家受經書兼天文算數晝省王政夜則誦讀而患謬誤懼乖典章乃博選諸儒劉珍等及博士議郎四府掾史五十餘人詣東觀校傳記蜀志曰向朗字巨達年八嵗手自校書刋定謬誤也九真中經曰奔日月之道太上上清太極九重四洞真人之所寳秘𤣥元君之玉章也自非有金闕玉名及東華紫字皆不得聞見此鬱儀奔日結隣奔月二章之篇目三元布經曰南極上上寳秘玉檢之文自無𤣥名帝圗不得見其篇第也及金羽𤣥章經此文隱藏不傳於世自無蘭臺丹字不得見聞靈寳真一訣曰洞𤣥自然經本文出乎太上道也者弥綸無極微妙無形老子曰天下莫柔弱於氣氣莫柔弱於道道之所以柔弱者包乎天地萬物夫柔之生剛弱之生强而使天下莫能知其根本所以生者乎是故有以無為毋無以虛為毋虛以道為毋道者道之根本也人能以自然為道貞則道可得而通也太上經曰道實無形隱為化本經富文字顯為教端師有形言出處為法語黙隨時為存為最期至乎道由經與師師經及道號為三寳又云化本有三道經師也大道無形以經為階經文𤣥妙非凡所知聖降為師示人㫖訣老子云道者萬物之奥善人之寳賢者得之以為真寳愚者得之不敢失道道無常術徳無常方神無常體和無常容道無中主與靜為友又曰龍景九文紫鳳赤書經舊文藏在太上六合紫房之内天人侍衛其經博物左傳}
