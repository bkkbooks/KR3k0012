  - {type: punctuation, offset: 1694, content: ，, id: KR3k0012_CHANT_612-bkkpn530}
  - {type: 'tls:seg', offset: 1694, content: '', id: KR3k0012_CHANT_612-26a.4}
  - {type: variant, offset: 1697, length: 0, content: '', SBCK: 曰張安丗字子孺給事尚書上幸河東亡書三篋詔問莫能知唯安丗識之具作其事後求得書以相校無所遺失上竒其材擢尚書令晉書張華傳曰人有得鳥毛長三丈以示華華見􅃤然曰此謂海鳬毛也出則天下亂矣陸機甞餉華鮓于時賔客滿座華發器便曰此龍肉也衆未之信華曰試以苦酒濯之必有異旣而五色光起機問鮓主果云園中茅積下得一白魚質狀殊常以作鮓過美故以相獻武庫封閉甚宻其中忽有雉雊華曰此必虵化爲雉開視雉側果有虵蛻焉吴郡臨平岸崩出一石鼓槌之無聲帝以問華華曰可取蜀中桐材刻爲魚形扣之則鳴矣於是如其言果聲聞}
