  - {type: variant, offset: 1587, length: 6, content: 景怡吳郡鹽官, krp: 威直性恬素以書史爲業博物強記當代之士咸就質疑隋書曰王邵𥘉在齊時祖孝徴魏收陽休之等甞論古事有遺忘討閱不能得因呼邵問之邵具論所出取書驗之一無舛誤自是大爲時}
