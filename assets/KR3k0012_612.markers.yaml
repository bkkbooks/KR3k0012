  - {type: variant, offset: 1698, length: 8, content: 千卷驎士年過八十, SBCK: 里􅀄吴之未滅也斗牛之間常有紫氣道術者皆以吴方強盛未可圖也唯華以爲不然及吴平之後紫氣愈明華聞豫章雷焕妙逹象緯要之􅀫因登樓仰觀煥曰寳劒之氣}
