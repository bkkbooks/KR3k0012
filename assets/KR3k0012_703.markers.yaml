  - {type: 'tls:seg', offset: 1804, content: '', id: KR3k0012_CHANT_703-25a.14}
  - {type: variant, offset: 1806, length: 398, content: 如謂可取故名莫難也虎出時以此扇挾乘輿亦用象牙桃枝扇其上竹或綠沉色或木蘭色或作紫紺色或作鬱金色異物志曰扶南國昔但知作大扇遣人持之不知人各自用也及今熱時各自用也拾遺錄曰周昭王時塗脩國獻青鳳丹鵠各一雌一雄夏至取鵠翅為扇一名施風一名條翮一名反影時有南歐獻二美女更搖此扇侍於王側世說曰王大將軍在西朝時見周侯轉扇鄣面而得住後度江左不能復爾王歎曰不知吾進伯仁退敦性強梁自少而長季倫斬妓曾無異色如斯傲恨憚於周顗斯不然之言又曰溫嶠娶姑女既婚交禮女以手披紗扇撫掌大笑我嫌是老奴果如所疑又曰羊孚作雪讚云資清以化乘氣以霏值象能鮮即潔成暉桓胤遂以書扇語林曰諸葛武侯與宣王在渭濱將戰武侯乘素輿葛巾白羽扇指麾三軍三軍皆隨其進止又曰胡母彥國至湘州坐廳事斷官事爾時三伏中傍搖扇視事其兒子光從容顧謂曰彥國復何為自貽伊戚又曰庾翼為荊州都督以毛扇上城帝疑是故物侍中劉邵曰柏梁雲構匠者先居其下管弦繁奏夔牙先聆其音翼之止扇以好不以新季恭聞之, SBCK: 泰}
