  - {type: variant, offset: 1793, length: 64, content: 縫為其際唯畫而彩色明徹看之如謂可取故名莫難也虎出時以此扇挾乘輿亦用象牙桃枝扇其上竹或綠沉色或木蘭色或作紫紺色或作鬱金色異物志曰扶, WYG: 香爐徐先生}
  - {type: punctuation, offset: 1797, content: ，, id: KR3k0012_CHANT_703-bkkpn527}
