  - {type: variant, offset: 1515, length: 2, content: 玄宮, SBCK: 皇后􅀇宫有白瓦唾壷五枚東宫舊事曰太子納妃有􅃮書銀帶唾壷一魏武帝上雜物䟽曰御雜物用有純金唾壷一枚􅃮圎油唾壷四枚貴人有純銀叅帶唾壷三十枚王子年拾遺記曰魏文帝納薛靈芸靈芸別父母歔欷累日淚下沾衣至􅂛車就路之時玉唾壷承淚壷即如紅色及至京師壷之淚如凝血矣又曰呉主潘夫人帝嘗與夫人遊昭宣之臺恣意幸適旣盡酣醉唾於玉壷}
