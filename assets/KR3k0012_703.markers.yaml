  - {type: variant, offset: 62, length: 1, content: 冀, krp: 書曰盧廣有儒術爲國子博士於學中講說僕射徐勉以下畢至謝舉造坐屢折廣詞理遒邁廣深歎服仍以所執麈尾贈之以况重席焉陳書曰張譏善講論後主在東宫集宫僚置宴時造玉柄麈尾新成後主親執之曰當今雖復多士如林至於堪捉此者獨張譏耳即手授譏後主嘗幸鍾山開善寺召從臣坐於寺西南松下勑譏講義時索麈尾未至後主勑取松枝手以屬譏曰可代麈尾郭子曰何次道嘗詣王丞相以麈尾𫾣牀呼何共坐曰此君子坐也又曰孫安國徃殷中軍許共語左右進食冷而復煖者數四彼我奮擲麈尾悉墮落滿飯中賔主遂至暮忘飡也又曰王長史病巳篤寢燈下轉麈尾而視之歎曰如此人曽不得滿四十及亡劉尹臨殯以犀柄麈尾置柩中因慟哭丗說曰王丞相常懸一麈尾著帳中及殷中軍來乃取之曰今當遺汝又曰客問樂令旨不至者樂亦不復剖析文句以麈尾柄𫾣机曰至不客曰至樂因又舉麈尾曰若至者郍得去客乃悟服語林曰康法暢造庾公捉麈尾至彼公曰麈尾過麗何以得在荅曰廉者不求貪者不與故得在耳華陽國志曰冝君山出麈尾王道麈尾銘曰誰謂質卑御於君子拂穢静暑虚心以俟許詢白麈尾銘曰蔚蔚秀格偉偉竒姿荏弱軟潤雲散雪霏君子運之探玄理微如意齊書曰蒼梧欲害髙帝帝嘗以書案下安鼻爲楯以鐵爲書鎮如意甚大以備不虞欲以代仗蕭子顯齊書曰明僧紹字丞烈平原聶人也隱長廣郡勞山詔徴爲正貟郎稱疾不就賜竹根如意笋籜冠隱者以爲榮梁書曰席闡文武帝將起兵闡文勸蕭頴胄同焉仍遣客田祖㳟私報帝并獻銀裝刀帝報以金如意又曰韋叡拒魏於邵陽叡乗素木}
