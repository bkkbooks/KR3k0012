  - {type: variant, offset: 837, length: 6, content: 臨川王宏子正, SBCK: 天􅁥中中天笁國奉}
  - {type: variant, offset: 837, length: 1, content: 臨, WYG: 天監中中天竺國奉表獻琉璃唾壺修復山陵故事曰皇后𤣥宫有白瓦唾壺五枚東宫舊事曰太子納妃有漆書銀帶唾壺一魏武帝上雜物疏曰御用雜物有純金唾壺一枚漆圓油唾壺四枚貴人有純銀參帶唾壺三十枚王子年拾遺記曰魏文帝納薛靈芸别父母歔欷累日淚下沾衣至升車就路之時玉唾壺承淚壺即如紅色及至京師壺之淚如凝血矣又曰吳王潘夫人帝嘗與夫人逰昭宣之臺恣意幸適既盡酣醉唾於玉壺中使侍婢瀉于臺下西京雜記曰廣}
  - {type: page-break, offset: 837, content: '', id: KR3k0012_WYG_703-9b, image: WYG0899/WYG0899-0283d.png}
  - {type: variant, offset: 837, length: 6, content: 臨川王宏子正, krp: 天監中中天笁國奉}
  - {type: variant, offset: 840, length: 1, content: 宏, WYG: 發魏襄王塜得玉唾壺一枚交州雜記曰太康四年臨邑王范熊獻紫水晶唾壺一口青白水晶唾壺各二口續齊諧記曰武昌小吏吳龕渡水得五色石夜化為女}
  - {type: variant, offset: 842, length: 1, content: 正, WYG: 稱是龕婦至家見婦翁被白羅袍隠漆几銅唾壺狀如天府稱河伯馬融遺令曰冡中不得下銅唾壺賀循𦵏禮曰藏物令用瓦唾壺一枚蔡邕}
  - {type: page-break, offset: 842, content: '', id: KR3k0012_WYG_703-10a, image: WYG0899/WYG0899-0284a.png}
  - {type: variant, offset: 844, length: 243, content: 幼不慧常執白團扇湘東王取題八字銘玩之正信不知嗤之終常搖握又曰柳惲早有令名少工篇什為詩云亭皋木葉下隴首秋雲飛琅琊王融見而嗟賞因書齋壁及所執白團扇南史張敷字景胤生而母亡年數歲問之雖童蒙便有感慕之色至十歲許求母遺物而散施已盡唯得一畫扇乃緘錄之每至感思輒開笥流涕又曰羊欣字敬元會稽王世子元顯每使書扇常不奉命元顯怒乃以為後軍府舍人又曰何戢美容儀動止與禇彥回相慕時人呼為小禇公家業富盛性又華侈衣被服飾極為奢麗出為吳興太守頗好畫扇宋武賜戢蟬雀扇善畫者顧景秀所畫時吳郡陸探微顧寶元皆能畫歎其巧絕戢因王晏, SBCK: ''}
