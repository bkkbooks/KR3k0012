  - {type: variant, offset: 1485, length: 1, content: 供, WYG: 有柏書臺又曰太子妃有}
  - {type: variant, offset: 1487, length: 6, content: 要弱青竹扇各, WYG: 書臺香爐漢官典職曰尚書郎給女史二人潔衣服執香爐燒薰從入臺中給使䕶衣服梁書曰侯景即位景牀東邊香爐無故墮地景呼東西南北皆謂為廂景曰此東廂香爐那忽下地議者以為湘東軍下之徵南史曰陶𢎞景字通明丹陽秣陵人也父貞孝昌令初𢎞景母郝氏夢天人手執香爐來至其所已而有娠又曰庾仲文貪賄何尚之奏選令史龍向臣說亦歎其受納之過言實得嫁女具銅爐四人舉乃勝細葛斗帳等物不可稱數齊書曰江泌為南康王子琳侍讀建武中明帝召諸王後泌憂念子琳訪誌公道人問其禍福誌公覆香爐灰示之曰都盡無餘后子琳被害東宫舊事曰皇太子初拜有銅博山香爐}
