  - {type: variant, offset: 61, length: 0, content: '', SBCK: 王衍夷甫盛才美貌明悟若神毎捉玉柄麈尾與手同色又曰王導妻曹氏妬導令別修舘以安衆妾曹氏知之導將恐有他喧辱命駕恐遲以所執麈尾柄驅牛而進司徒蔡謨聞之謂導曰朝廷欲加公九錫導不之􅁴但謙退而巳謨曰不聞餘物唯有短轅犢車長柄麈尾導大怒宋書曰張融字思光弱冠有名道士同郡陸脩静以白鷺羽麈尾扇遺之曰此旣異物以奉異人又融臨卒遺令建白旐無旒不設􅀕令人捉麈尾登復魂又曰張敷好讀玄言兼屬文論弱冠􅀄父邵使與髙士南陽宗少文談繋象徃復數畨少文欲屈握麈尾歎曰吾道東矣於是名價曰重齊書曰周顒音辭辯麗長於佛理著三宗論言空假義西凉州智林道人遺顒書􅀷相賛美言捉麈尾來四十餘載頗見宗録唯此􅂗白黒無一人得者非意此音猥來入耳見重如此}
  - {type: page-break, offset: 61, content: '', id: KR3k0012_SBCK_703-1b}
  - {type: variant, offset: 61, length: 0, content: '', WYG: 王衍字夷甫盛才美貎明悟若神每捉玊柄麈尾與手同色又曰王導妻曹氏妬導乃别修舘以安衆妾曹氏知之導恐衆妾被辱遽令命駕猶恐遲之以所執麈尾柄驅牛而進司徒蔡謨聞之謂導曰朝廷欲加公九錫導不之覺但謙退而已謨曰不聞餘物唯有短轅犢車長柄麈尾導大怒宋書曰張融字思光弱冠有名道士同郡陸修靜以白鷺羽麈尾扇遺之曰此旣異物以奉異人又融臨卒遺令建白旐無旒不設祭令人捉麈尾登復魂又曰張敷好讀𤣥言兼屬文論弱冠初父邵使與髙士南陽宗少文談繫象往復數畨少文欲屈握麈尾歎曰吾道東矣於是聲價日重齊書曰周顒音辭辨麗長于佛理著三宗論言空假義西涼州智林道人遺顒書深相贊美言捉麈尾來四十餘載頗見宗録唯此塗白黒無一人得者非意此音猥來入耳見重如此}
  - {type: page-break, offset: 61, content: '', id: KR3k0012_WYG_703-2a, image: WYG0899/WYG0899-0280a.png}
  - {type: page-break, offset: 61, content: '', id: KR3k0012_WYG_703-2b, image: WYG0899/WYG0899-0280b.png}
  - {type: variant, offset: 61, length: 0, content: '', krp: 王衍夷甫盛才美貌明悟若神毎捉玉柄麈尾與手同色又曰王導妻曹氏妬導令別修舘以安衆妾曹氏知之導將恐有他喧辱命駕恐遲以所執麈尾柄驅牛而進司徒蔡謨聞之謂導曰朝廷欲加公九錫導不之覺但謙退而巳謨曰不聞餘物唯有短轅犢車長柄麈尾導大怒宋書曰張融字思光弱冠有名道士同郡陸脩静以白鷺羽麈尾扇遺之曰此旣異物以奉異人又融臨卒遺令建白旐無旒不設祭令人捉麈尾登復魂又曰張敷好讀玄言兼屬文論弱冠𥘉父邵使與髙士南陽宗少文談繋象徃復數畨少文欲屈握麈尾歎曰吾道東矣於是名價曰重齊書曰周顒音辭辯麗長於佛理著三宗論言空假義西凉州智林道人遺顒書深相賛美言捉麈尾來四十餘載頗見宗録唯此塗白黒無一人得者非意此音猥來入耳見重如此}
  - {type: variant, offset: 62, length: 1, content: 冀, SBCK: 書曰盧廣有儒術爲國子􅀶士於學中講說僕射徐勉以下畢至謝舉造坐屢折廣詞理遒邁廣􅀷歎服仍以所執麈尾贈之以况重席焉陳書曰張譏善講論後主在東宫集宫僚置宴時造玉柄麈尾新成後主親執之曰當今雖復多士如林至於堪捉此者獨張譏耳即手授譏後主嘗幸鍾山開善寺召從臣坐於寺西南松下勑譏講義時索麈尾未至後主勑取松枝手以屬譏曰可代麈尾郭子曰何次道嘗詣王丞相以麈尾􅃻牀呼何共坐曰此君子坐也又曰孫安國徃殷中軍許共語左右進食冷而復煖者數四彼我􅁬擲麈尾悉墮落滿飯中賔主遂至暮忘飡也又曰王長史病巳篤寢燈下轉麈尾而視之歎曰如此人曽不得滿四十及亡劉尹臨殯以犀柄麈尾置柩中因慟哭丗說曰王丞相常懸一麈尾著帳中及殷中軍來乃取之曰今當遺汝又曰客問樂令旨不至者樂亦不復剖析文句以麈尾柄􅃻机曰至不客曰至樂因又舉麈尾曰若至者郍得去客乃悟服語林曰康法暢造􅁃公捉麈尾至彼公曰麈尾過麗何以得在荅曰廉者不求貪者不與故得在耳華陽國志曰冝君山出麈尾王道麈尾銘曰誰謂質卑御於君子拂􅁾静暑虚心以俟許詢白麈尾銘曰蔚蔚秀格偉偉竒姿荏弱軟潤雲散雪霏君子運之探玄理微如意齊書曰蒼梧欲害髙帝帝嘗以書案下安􅈹爲楯以鐵爲書鎮如意甚大以備不虞欲以代仗蕭子顯齊書曰明僧紹字丞烈平原聶人也隱長廣郡勞山詔徴爲正貟郎稱疾不就賜竹根如意笋籜冠隱者以爲榮梁書曰席闡文武帝將起兵闡文勸蕭頴胄同焉仍遣客田祖㳟私報帝并獻銀裝刀帝報以金如意又曰韋叡拒魏於邵陽叡乗素木}
