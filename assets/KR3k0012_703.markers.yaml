  - {type: variant, offset: 83, length: 4, content: 扇侍于親, SBCK: 進呉主呉主見圖而嘉之以虎魄如意撫案折嗟曰此神女也遂納之又曰孫和恱鄧夫人常置膝上和月下舞火精如意誤傷夫人頰胡綜别􅀓曰時有掘得銅匣長二尺七寸以琉璃爲蓋布雲母於其上開之得白玉如意所執處皆刻螭虎文蝇蟬等形時人莫有識者太常以問綜綜荅曰昔秦始皇帝東遊以金陵有天子氣乃改名掘鑿江湖平諸山南處處輙理寳物以當王氣其事見於􅁗記石季倫夲事曰崇有􅃢瑚如意長三尺二寸丗說曰殷荆州有所識作賦示束晢慢戯之殷甚以爲有才語王㳟適見新文甚可觀便於手巾函岀之王旣讀殷􅀏不自勝王看竟旣不􅀏亦不言好惡但以如意􅀧之而巳殷帳然自失又曰謝萬北征而常嘯詠自髙未嘗撫慰衆士萬兄安謂萬曰汝爲元帥冝數呼諸將宴以恱其心萬從之於是召集諸將帥無所說直以如意指四坐曰諸軍皆是勁卒諸將甚恨之語林曰石崇與王愷争豪晉武帝愷之甥也每助愷以􅃢瑚高二尺許愷以示之崇以鐵如意撃之應手瓦碎愷聲色俱厲崇曰此不足恨乃命取􅃢瑚有三尺光彩溢目者六十七校愷悵然自失異苑曰太原郭澄之義熈􅀄諸葛長民欲取爲輔國諮議澄之不樂後爲南康太守盧循反自廣州長民以其謀先告因騁私惡収澄之以付延尉將致大辟夜夢見一神人以烏角如意與之旣覺便在其頭}
  - {type: page-break, offset: 83, content: '', id: KR3k0012_SBCK_703-4a}
  - {type: page-break, offset: 83, content: '', id: KR3k0012_SBCK_703-4b}
  - {type: variant, offset: 83, length: 4, content: 扇侍于親, WYG: 進吳主吳主見圖而嘉之以虎魄如意撫案嗟嘆曰此眞神女也遂納之又曰孫和恱鄧夫人常置膝上和月下舞水精如意誤傷夫人頰胡綜别傳曰時有掘得銅匣長二尺七寸以琉璃為蓋布雲母於其上開之得白玉如意所執處皆刻螭虎如蠅蟬等形時人莫有識者太常以問綜綜答曰昔秦始皇帝東遊以金陵有天子氣乃改名掘鑿江湖平諸山南處處輒埋寶物以當王氣其事見於秦記石季倫本事曰崇有珊瑚如意長三尺二寸世說曰殷荆州有所識作賦示束晳幔戲之殷甚以為有才語王恭適見新文甚可觀便於手中函出之王既讀殷笑不自勝王看竟既不笑亦不言好惡但以如意㸃之而已殷悵然自失又曰謝萬北征而常嘯詠自髙未嘗撫慰衆士謝公萬兄安謂萬曰汝為元帥宜數呼諸將宴以恱其心萬從之於是召集諸將帥無所說直以如意指四坐曰諸君皆是勁卒諸將甚恨之語林曰石崇與王愷爭豪晉武帝愷之甥也每助愷以珊瑚髙二尺許愷以示之崇以鉄如意擊之應手瓦碎愷聲色俱厲崇曰此不足恨乃命取珊瑚有三尺光彩溢目者六七枚愷悵然自失異苑曰太原郭澄之義熈初諸葛長民欲取為輔國諮議澄之不樂後為南康太守盧循反自廣州長民以其謀先告因騁私惡收澄之以付廷尉將致大辟夜夢見一神人以烏角如意與之既覺便在其頭}
