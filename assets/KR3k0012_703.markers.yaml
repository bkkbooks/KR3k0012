  - {type: variant, offset: 142, length: 402, content: 充後宮先下書禁天下嫁娶使官者馳傳州縣召充選者使楊后選所取后妒不取端正好唯取長白時卞蕃女有美色帝舉扇彰面語后云卞蕃女好后曰蕃三世后族不宜枉以卑位帝乃止又曰何植字元幹常以縛筆織扇為業以奉供養又曰庾亮出鎮於外以帝舅故執朝權王導不能平嘗遇西風起輒舉扇自蔽曰元規塵污人又曰王羲之字逸少居蕺山見一老姥持六角扇賣之羲之書其扇各為五字姥初歎惋因謂姥曰旡苦但言是王右軍書以求百金價姥如言人競買之後姥復將數扇來請書羲之不荅又顧榮傳曰廣陵相陳敏反渡江攻楊州剌史劉機阻兵據州郡有鼎峙之意遣顧榮歛舟於岸敏率萬人出不獲濟榮自麾羽扇敏眾大潰也晉中興書曰安帝義熙元年禁絹扇及樗蒲續晉陽秋曰謝安賞袁宏機對辯速宏為東陽郡時賢祖道治亭安起執宏手顧左右取一扇授云聊以贈行宏應聲曰輒當奉揚仁風慰彼黎庶合坐稱其率要又曰謝安鄉人有罷中宿縣者還詣安問其歸貨荅曰嶺南彫獘唯有五萬蒲葵扇謂非時為滯貨安乃取其一中者捉之於是京都士庶競而慕焉增價數倍旬日則無所賣, SBCK: 明儉約}
