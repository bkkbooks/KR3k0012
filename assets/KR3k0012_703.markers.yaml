  - {type: variant, offset: 2739, length: 1302, content: 襚之襚衣也殯三加遂深禮厚之與之犀軒直蓋犀軒卿車直蓋高蓋家語曰孔子將行命從者持蓋既而果雨聖人無所不通也又曰孔子將行雨無蓋門人曰商也有焉孔子曰商也之為人也甚短於財吾聞與人交者推其長者違其短者故能以久也史記曰五羖大夫相秦也勞不坐乘暑不張蓋漢書曰上官傑少時為羽林郎從武帝上甘泉天大風車不得行解蓋投之傑奉蓋雖風常屬車雨下蓋輒御上奇其材力焉又曰黃霸為楊州剌史三年宣帝詔賜車蓋特高一尺以彰有德又王莽傳曰或言黃帝時建華蓋登仙莽乃造菙蓋高八丈一尺皆全瑵羽蓋載以秘機四輪車駕六馬輓者皆呼登山續漢書曰靈帝時講武平樂觀建十重五彩華蓋高十丈建九重華蓋高九丈又曰祠老子於濯龍中設華蓋八座東觀漢記曰隗囂破上歸過汧幸祭遵勞之時遵有疾詔賜重茵覆以御蓋後漢書曰光武東巡虞延從駕到魯還經封丘城門門小不容羽蓋封丘今東京縣也帝怒使撻御史延救之乃止事具門部吳志曰曹休入睆城陸遜破之權令左右以御蓋覆遜又曰周泰字幼平數戰有功孫權覆以御蓋江表傳曰青兼蓋也又曰劉基孫權愛敬之嘗從御樓舡上時雨甚權以蓋自覆又令覆基餘人不得也又曰賀齊為將綺飾所乘舡青蓋絳幨晉安帝記曰桓玄遊於水南飄風飛其輗蓋後義兵起遂敗宋元嘉十年起居注曰御史中丞荀伯子奏左衛將軍何尚之公事每罩笠有虧體制建野笠於公門棄華繖而不御宋元嘉二十九年起居注曰訶羅單國奉孔雀蓋一具齊書曰始安王遙光傳江祐被誅東昏召遙光入殿告以祐罪遙光懼還省便陽狂號哭自此稱疾不復入臺先是遙光行還入風飄儀繖出城外遙光後敗梁書曰王籍為中散大夫彌日忽忌不樂乃至徒行市道不擇交遊有時途中見相識輒以笠傘覆面南史曰殷孝祖與賊合戰每常以鼓蓋自隨軍中人相謂曰殷統軍可謂死將至矣今與賊交鋒而以羽儀自摽顯若此射者十手攢射欲不斃得乎是日中流矢死又曰扶南其俗罩古具繖文子曰大丈夫恬然無思淡然無慮以天為蓋以地為輿又宋玉大言賦曰圓天為蓋方地為輿淮南子曰蓋非撩不能蔽日輪非輻不能追疾然而撩蓋未足恃也撩蓋骨也孔藂子曰夫子適郯郯子遇子於塗傾蓋而語終日而別命子路將束帛贈焉尉繚子曰吳起與秦人戰僕嗽之蓋足以蔽霜露說苑曰田子方遇翟璜乘軒車戴華蓋疑以為人君也崔豹古今注曰華蓋黃帝所作也與蚩尤戰于𣵠鹿之野常有五色雲氣金枝玉葉於帝上有花蘤之象故因而作華蓋蘤韋委切又曰曲蓋太公所作武王伐紂大風折蓋太公因折蓋之形而制曲盖焉戰國常以賜將軍自漢朝乘輿用之因謂睥睨蓋有軍號者賜其一焉睥疋詣切睨五計切搜神記曰湖陂吏丁初忽見少婦人姿容可愛青衣戴傘呼初初疑而待顧視婦自投波中是大蒼獺衣傘皆是蓮荷異苑曰義熙中烏陽小吏見女子戴青繖姿容甚麗遂要之女至多雷光乃是大狸抽刀研殺其繖乃枯荷葉事具獸部真人周君傳曰紫陽真人周義山子通合會仙人在金屋銅門之內以紫雲為蓋真人王君傳曰太上大道君授務成君繡羽蓋雙明珠俗說曰徐于木年少時嘗夜夢見烏從天上飛銜繖樹其廷中如此凡三過銜來作惡聲而去徐後果得繖遂以惡終青烏子葬書曰作墓發土夕夢見罩繖入市者富貴楚辭曰孔蓋兮翠旍言以孔雀翅為車蓋翠羽為旍旗也登九天兮撫彗星又曰乘水車兮荷蓋駕雨龍兮驂螭宋玉高唐賦曰晲為旍翠為蓋風起雨霽千里而逝司馬相如大人賦曰屯余車其萬乘兮綷雲而樹華旗綷子對切阮籍清思賦曰折丹木以蔽陽竦芝蓋之三重劉植魯都賦曰蓋如飛鵠馬如游魚宋玉大言賦曰圓天為蓋方地為輿, WYG: ''}
