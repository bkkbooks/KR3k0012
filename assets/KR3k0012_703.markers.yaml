  - {type: variant, offset: 66, length: 8, content: 制作擁身扇東觀漢, SBCK: 鈞不勝怒言於帝帝以犀如意擊主碎於背然猶恨鈞自侍中岀爲王府諮議又曰李膺字公胤有才辯西昌侯藻爲益州以爲主簿使至都武帝恱之謂曰今李膺何如膺對曰今勝昔問其故對曰昔事桓靈之主今逢堯舜之君帝嘉其對以如意擊席者乆之乃以爲益州别駕後魏書曰髙祖孝文欲試諸子志尚乃大陳寳物任其所取京兆王愉等競取寳玩宣武皇帝惟取骨如意而巳帝大竒之又曰廣陵王羽爲太子太保録尚書事孝文將南討遣羽持節安撫六鎮發其突􅀐夷夏寧恱還領廷尉卿及車駕發羽與太尉元丕留守帝賜羽如意以表心焉拾遺}
