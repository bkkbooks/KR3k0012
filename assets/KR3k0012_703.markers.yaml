  - {type: variant, offset: 1088, length: 420, content: 之後魏書曰爾朱弼字輔伯節閔帝時封河間郡公尋為青州剌史韓陵之敗欲奔梁數日與左右割扇為約弼帳下都督馮紹隆為弼信待說弼曰今方同契闊宜當心瀝血示眾以為信弼從之大集部下弼乃踞胡床令紹隆持刀破心紹隆因推刃殺之唐書曰中宗為皇太子天后以時熱令皇太子外朝用扇鄣日太子讓之詔不許太公六韜云將冬不衣裘將夏不操扇名禮將之也管子曰夏行五政三曰禁扇去笠淮南子曰失火而鑿池披裘而用扇不能救也又曰夫夏日不披裘非愛之也煖有餘於身也冬日不用箑者非簡之也清有餘也抱朴子曰風不輟則扇不用日不出則燭不息春秋繁露曰以龍致雨以扇逐暑崔豹古今注曰雉尾扇起於殷高宗有雊雉之祥服章多用翟羽周制以為皇后夫人車服輦車有翣即緝雉羽為之以障翳風塵也漢朝乘輿服之後以賜梁孝王魏晉以來以為常准諸王皆得用之又曰鄣扇長柄扇也漢世多豪俠為雉尾而制長扇也又曰五明扇舜所作也既受堯禪廣開視聽求賢人以自輔故作五明扇秦漢公卿大夫皆用之魏晉非乘輿不得用也東宮舊事曰皇太子初拜供漆要弱青竹扇各一太子納妃同心扇三十單竹扇二十, SBCK: 琉璃唾壷}
