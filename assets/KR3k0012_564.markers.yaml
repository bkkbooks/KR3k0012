  - {type: variant, offset: 110, length: 1, content: 宮, SBCK: 和興之弟也尤喜音樂皆能度其盈虚増改曲調世咸傳之号濟南新調後魏書曰元孚封萬年郷男永安末樂器殘鈌莊帝命孚修之上表曰昔太和中故中書􅁥髙閭太樂令公孫崇修造金石數十年間乃奏成功時大集儒生考其得失太常卿劉芳請別營造乆而方就復召公卿量校合否論者沸騰莫有適從登􅀍旨勑並見施用徃􅀊大軍入洛戎馬交馳所有樂器亡失垂盡臣至太樂署問太樂令張軋􅀛等云丞前巳來置宫}
