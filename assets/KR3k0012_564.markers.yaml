  - {type: variant, offset: 1084, length: 1, content: 故, WYG: 詔太常卿牛𢎞國子祭酒辛彦之國子􅀶士何妥等議正樂然淪謬既乆積年議}
  - {type: variant, offset: 1086, length: 1, content: 知, WYG: 定帝怒曰我受天命七年樂府猶歌前代功德命治書侍御史李諤引𢎞等下將罪之奏曰武王尅殷至周公相成王始制禮樂所事體大不可速成意乃觧又曰開皇中亡齊伎曹妙逹安馬駒等以藝逰王公之家新}
  - {type: page-break, offset: 1086, content: '', id: KR3k0012_WYG_564-10b, image: WYG0898/WYG0898-0205b.png}
  - {type: variant, offset: 1088, length: 0, content: '', WYG: 變曲傾動當世天子不能禁也帝令妙逹理郊廟樂咸冩傾杯行天之聲萬寳常觀於樂署部伎樂中惟百濟樂清有歌人間謳謡之曲為耳目之娯}
