  - {type: variant, offset: 648, length: 384, content: 凡樂事以鍾鼓奏九夏肆夏王夏昭夏納夏章夏齊夏蔟夏祴夏驁夏以鍾鼓者先擊鍾次擊鼓九夏夏大也樂之大歌有九祴讀為陔孩鼓之陔王出入奏王夏尸出入奏肆夏牲出入奏昭夏四方賓來奏納夏臣有功奏章夏夫人出祭奏齊夏族人侍奏族夏客醉而出奏陔夏公出入奏鷔夏禮曰凡音之起由人心生也人心之動物使之然也感於物而動故形於聲聲成方謂之音方猶文章比音而樂之及干戚羽毛謂之樂千楯也戚斧也武舞所執也羽翟也旄牛尾也文武所執也樂者音之所由生也其本在人心之感於物也是故其哀心感者其聲噍以殺其樂心感者其聲嘽以緩其喜心感者其聲發以散其怒心感者其聲粗以厲其敬心感者其聲直以廉其愛心感者其聲和以柔是故先王慎所以感之者宮為君商為臣角為民徵為事羽為物五者不亂則無怗懘之音矣凡音濁者尊清者卑怗懘弊敗不和皃也宮亂則荒其君驕商亂則卑其君壞角亂則憂其民怨徵亂則哀其事勤羽亂則危其財匱五者皆亂迭相陵謂之慢鄭衛之音亂世之音也比於慢矣桑間濮上之音, SBCK: 此}
