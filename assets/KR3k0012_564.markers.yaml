  - {type: variant, offset: 1077, length: 5, content: 君子為能知, SBCK: 百濟}
  - {type: variant, offset: 1077, length: 5, content: 君子為能知, krp: 百濟}
  - {type: variant, offset: 1079, length: 0, content: '', WYG: 其妻因其卧疾刼盗其資物逃寳常饑餧無人贍竟餓而死及將死也取其所著書焚之曰何用此}
  - {type: variant, offset: 1080, length: 0, content: '', WYG: 見者於火中採得數卷見行於世時論哀之開皇之世鄭譯何妥盧賫蘇䕫蕭吉並討論文籍撰著樂書皆當世所為用至於天然識樂不及寳常逺矣安馬駒曹妙逹王長通郭金樂等}
