  - {type: variant, offset: 1115, length: 318, content: 之有德德者得也樂者為同禮者為異同則相親異則相敬同謂齊好惡謂別貴賤也樂勝則流禮勝則離流謂合行不敬也離謂析居不和也樂由中出和在心也禮自外作敬在貌也樂由中出故靜禮自外作故文大樂必易大禮必簡樂至則無怨禮至則不爭揖讓而天下治者禮樂之謂也大樂與天地同和大禮與天地同節和故百物不失節故祀天祭地明則有禮樂幽則有鬼神如此則四海之內合敬同愛矣故知禮樂之情者能作識禮樂之文者能述述謂訓其義也作者謂之聖述者謂之明樂者天地之和也禮者天地之序也和故百物皆化序故群物皆別化猶生也謂猶形體異也王者功成作樂治定制禮其功大者其樂備其治辯者其禮具五帝殊時不相沿樂三王異世不相襲禮樂極則憂禮粗則偏矣及夫敦樂而無憂禮備而不偏者其唯大聖乎春作夏長仁也秋斂冬藏義也仁近於樂義近於禮故, SBCK: 于休烈曰古}
