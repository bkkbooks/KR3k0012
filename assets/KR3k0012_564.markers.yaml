  - {type: variant, offset: 2829, length: 134, content: 同無服之喪以畜萬邦無聲之樂日聞四方無體之禮日就月將無服之喪純德孔明無聲之樂氣志既定無體之禮施及四海無服之喪施于孫子又曰入門而金作示情也升歌清廟示德也下管象武示事也是故古之君子不必親相與言也以禮樂相示而已又曰故天子之為樂也以賞諸侯之有德者也德威而教尊五穀時熟然後賞之以樂, SBCK: 平}
