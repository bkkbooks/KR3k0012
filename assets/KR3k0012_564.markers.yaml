  - {type: variant, offset: 1905, length: 554, content: 者淫於色而害於德是以祭祀弗用也詩云肅雍和鳴先祖是聽夫肅肅敬也雍雍和也夫敬以和何事不行為人君也謹其所好惡而已矣君好之則臣為之上行之則民從之詩云誘民孔易此之謂也然後聖人作為鞉鼓控楬壎箎此六者德音之音也然後鍾磬竽瑟以和之干戚旄狄以舞之此所以祭先王之廟也所以獻酬酳酢也所以官序貴賤各得其宜也所以示後世有尊卑長幼序也鍾聲鑑鑑以立號號以立撗撗以立武君子聽鍾聲則思武臣石聲磬磬以立辦辦以致死君子聽磬聲則思死封疆之臣絲聲哀哀以立廉廉以立志君子聽琴瑟之聲則思志義之臣竹聲濫濫以立會會以聚眾君子聽竽笙簫管之聲則思畜聚之臣鼓鼙之聲懽讙以立動動以進眾君子聽鼓鼙之聲則思將帥之臣君子之聽音非聽其鏗鏘而已也彼亦有所合之也君子曰禮樂不可斯須去身致樂以治心則易直子諒之心油然生矣易直子諒之心生則樂樂則安安則久久則天天則神天則不言而信神則不怒而威致樂以治心者也致猶深審也子讀如不子之子油然新生好貌也善心生則寡於利欲寡於利欲則樂矣至明行成不言而見信如天也不怒而見畏如神致禮以治躬則莊敬莊敬則嚴威心中斯須不和不樂而鄙詐之心入之矣鄙詐入之謂利欲生外貌斯須不莊不敬而易慢之心入之矣故樂也者動於內者也禮也者動於外者也樂極和禮極順內和而外順則民瞻其顏色而弗與爭也望其容貌而不生易慢焉極至也故德輝動於內而民莫不承聽理發諸外而民莫不承順故曰致禮樂之道舉而措之, SBCK: 海}
