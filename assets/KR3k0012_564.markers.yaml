  - {type: variant, offset: 306, length: 92, content: 歌大呂舞雲門以祀天神乃奏太簇歌應鍾舞咸池以祭地祗乃奏姑洗歌南呂舞大卷以祀四望乃奏蕤賓歌黃鍾舞大夏以祭山川乃奏夷則歌小呂舞大護以享先妣乃奏無射歌夾鍾舞大武以享先祖凡六樂者文之以五聲播之以, SBCK: 律遍工}
  - {type: variant, offset: 306, length: 92, content: 歌大呂舞雲門以祀天神乃奏太簇歌應鍾舞咸池以祭地祗乃奏姑洗歌南呂舞大卷以祀四望乃奏蕤賓歌黃鍾舞大夏以祭山川乃奏夷則歌小呂舞大護以享先妣乃奏無射歌夾鍾舞大武以享先祖凡六樂者文之以五聲播之以, krp: 律遍工}
