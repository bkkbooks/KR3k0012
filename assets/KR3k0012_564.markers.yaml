  - {type: variant, offset: 1457, length: 145, content: 極乎天而蟠乎地行乎陰陽而通乎鬼神窮高極遠而測深厚是故志微噍殺之音作而民憂思嘽諧幔易繁文簡節之音作而民康樂粗厲猛起奮末廣僨之音作而民剛毅廉直勁正莊誠之音作而民肅敬寬裕內好順成和動之音作而民慈愛流僻邪散簡成滌濫之音作而民淫亂故樂行而倫清耳目聰明血氣和平移風易俗天下皆寧故曰樂者樂也君子樂得其道小, SBCK: 序則}
