  - {type: variant, offset: 354, length: 0, content: '', WYG: 者禹之樂也曰美哉勤而不德非禹其誰能及之見舞韶箾者舜之樂也曰至矣哉大矣如天之無不覆也如地之無不載也雖甚盛德其蔑}
  - {type: page-break, offset: 354, content: '', id: KR3k0012_WYG_564-2b, image: WYG0898/WYG0898-0201b.png}
  - {type: variant, offset: 355, length: 0, content: '', WYG: 加此矣若有他樂吾不敢請已又曰宋公享晉侯於楚丘請以桑林桑林殷天子樂名也荀罃辭荀偃士匄曰諸侯宋魯於是觀禮宋王者後魯以周公故皆用天子禮樂故可觀也魯有禘樂賓}
  - {type: variant, offset: 356, length: 2, content: 山川, WYG: 用之禘三年大祭則作四代之樂也别祭羣公則用諸侯樂也宋以桑林享君不亦可乎言俱天子樂也舞師題以旌夏旌夏大旌也題識也以大旌表識其形列也晉侯懼而退入於房去旌卒享而還及著雍疾著雍晉地卜桑林見祟見於卜兆也荀偃士匄欲奔請禱焉奔走還宋禱也荀罃不可曰我辭禮矣彼則以之猶有鬼神於彼加之言自當加罪於宋晉侯有間又曰晉侯與諸侯伐鄭鄭人賂晉侯以師悝師觸師蠲皆樂師名歌鍾二肆肆列也懸十六為一肆三十二枚也及其鏄鍾女樂二八晉侯以樂之半賜魏綘曰子教寡人和諸戎狄以正諸華八年之中九合諸侯如樂之和無所不諧請與子樂之魏絳於是乎始有金石之樂禮也大夫有功則賜樂也論語曰師摯之始闗雎之亂洋洋乎盈耳哉魯太師摯成闗雎之聲而首理其亂者洋洋乎盈耳聴而美之又曰樂云樂云鐘鼓云乎哉言樂不但崇此鐘鼓而已所貴者貴其移風易俗也又曰子語魯太師樂曰樂其可知也始作翕如也始作謂金作時人皆翕如變動之貎從之純如也從讀曰從從之謂八音皆作純如咸動之貌皦如也繹如也以成皦如使清濁别之貌也繹如志意條逹又曰子謂韶盡美矣又盡善也韶舜樂也美舜以徳禅于堯又盡善謂太平也謂武盡美矣未盡善也武周武王樂美武王以此功定天下未盡善致太平孝經曰移風易俗莫善於樂爾雅曰宫謂之重商謂之敏角謂之經徴謂之迭羽謂之桺郭璞注皆五音之别名未詳其義史記曰趙簡子疾五日不知人扁鵲曰昔秦繆公嘗如此五日不知人七日}
