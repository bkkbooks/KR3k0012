  - {type: variant, offset: 944, length: 1, content: 亂, WYG: 虛己竦神悦而成流是以海内徧知上徳被服其風光輝日新化上遷善而不知所以然至於萬物不夭天地順而嘉應至故詩曰磬管鏘鏘降福穰穰魏志曰太祖以杜夔爲軍謀祭酒􅄁太樂事因令創制雅樂䕫善鍾律聰思過人絲竹八音靡所不能唯歌舞非所長散騎侍郎鄧靜尹商善詠雅樂歌詩尹臣能歌宗廟郊祀之曲舞師馮肅曉知先代諸舞揔究硏精逺考經語近採故事教習講律備作樂器復先代之樂皆自䕫始也吳録曰呉中目周瑜為周郎瑜精意音樂三爵之後其有闕誤瑜必知之而顧時吴人謡曰曲有誤周郎顧宋書臧喜傳曰武帝入京城進至建鄴桓𤣥走武帝使喜入収圖書器物封府庫有金飾樂器武帝問喜卿欲此乎喜正色曰主上幽逼播越非所將軍首建大義勤勞王室喜雖復不肖實無情於樂武帝笑曰聊以戯耳齊書蕭惠基傳曰自宋大明以来聲技之所尚多鄭衛而雅樂正聲鮮有好者惠基解音律尤好三祖曲及相和歌毎奏輙賞悦崖鴻十六國春秋曰後秦録姚興傳曰濟南公邕字子和興之弟也尤善音樂皆能度其盈虛増改曲調世咸傳之號濟南新調後魏書曰阮孚封萬年鄉男永安末樂器殘缺莊帝命孚修之上書曰昔太和中故中書監髙閭太平令公孫崇修造金石數十年間乃奏成功時大集儒生考其得失太常卿劉芳請别營造乆而方就復召公卿量校合否論者沸騰莫有適從登被㫖勅並勅施用往歲大軍入潞戍馬交馳所有樂器亡失垂盡臣至太樂署問太樂令張乾龜等云承前已來置宮懸四箱筍虡十六架編黃鍾之磬十四雖器名黃鍾而聲實夷}
