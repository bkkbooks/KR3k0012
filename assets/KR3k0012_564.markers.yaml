  - {type: variant, offset: 5, length: 1, content: 上, SBCK: 中傳曰呉季札來聘請觀於周樂使工爲之歌周南召南曰美哉始基之也猶未也猶有啇紂未盡善也然勤而無怨矣爲之歌邶􅅠衛曰美哉淵哉憂而不困者也吾聞衛康叔武公之徳如是是其衛風乎爲之歌王曰美哉思而不懼其周之東乎爲之歌鄭曰美哉其細巳甚民弗堪也是其先亡乎爲之歌齊曰美哉泱泱乎大風也表東海者其大公乎爲之歌􅃎曰美哉蕩蕩乎樂而不􅁋其周公之東乎爲之歌􅁗曰美哉此之謂夏聲夫能夏則大大之至也其周之舊乎爲之歌魏曰美哉渢渢乎大而險儉而}
  - {type: variant, offset: 5, length: 1, content: 上, WYG: 中傳曰呉季札来聘請觀於周樂使工為之歌周南召南曰美哉始基之矣猶未也猶有商紂未盡善也然勤而不怨矣為之歌􅆁鄘衛曰美哉淵乎憂而不困者也吾聞衛康叔武公之德如是其衛風乎為之歌王曰美哉思而不懼其周之東乎為之歌鄭曰美哉其細已甚民弗堪也是其先亡乎為之歌齊曰美哉泱泱乎大風也表東海者其太公乎為之歌豳曰美哉蕩蕩乎樂而不滛其周公之東乎為之歌秦曰美哉此之謂夏聲夫能夏則大大之至也其周之舊乎為之歌魏曰美哉渢渢乎大而婉儉而}
