  - {type: variant, offset: 1076, length: 0, content: '', SBCK: 其事竟寢寳常聽太常所奏樂􅊄然而泣人問其故寳常曰樂聲􅁋厲而哀天下不乆相殺盡時四海全盛聞其言者皆謂爲不然大業之末其言卒驗寳常貧無子其妻因其卧疾遂竊其資物逃寳常飢餧無人贍竟餓而死及將死也取其所著書焚之曰何用此爲見者於火中採得數卷見行於丗時論哀之開皇之丗有鄭譯何妥盧賷􅂫夔蕭􅁻並討論墳籍撰著樂書皆爲當丗所用至於天然識樂不及寳常逺矣安馬駒曹妙逹王長通郭金樂等能造曲爲一時之妙又習鄭聲而寳常所爲皆歸於雅此軰雖公議不附寳常然皆心服謂以爲神又曰文帝開皇六年尚因周樂命工人齊樹提撿校樂府改換聲律益不能通俄而沛公鄭譯奏上請更修正於是詔太常卿牛弘國子􅀕酒辛彦之國子􅀶士何妥等議正樂然淪繆旣乆積年議不定帝怒曰我受天命七年樂府猶歌前代功德命治書侍御史李諤引弘等下將罪之奏曰武王剋殷至周公相成王始制禮樂所事體大不可速成帝意乃解又曰開皇中亡齊伎曹妙逹安馬駒等以藝遊三公之家新聲變曲傾動當丗天子不能禁也帝令妙逹理郊廟樂咸冩傾杯行天之聲萬寳常觀於樂署部􅇊樂中}
  - {type: page-break, offset: 1076, content: '', id: KR3k0012_SBCK_564-6b}
