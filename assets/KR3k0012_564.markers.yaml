  - {type: variant, offset: 8, length: 5, content: 雷出地奮豫, SBCK: 思􅀷哉其有陶唐氏之遺民乎不然其何憂之逺也非令德之後誰能􅀂是爲之歌陳曰國無主其能乆乎自鄶以下無譏焉爲之歌小雅曰美哉思而不貳怨而不言其周德之衰乎猶有}
  - {type: page-break, offset: 8, content: '', id: KR3k0012_SBCK_564-1b}
