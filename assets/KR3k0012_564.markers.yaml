  - {type: variant, offset: 108, length: 0, content: '', SBCK: 樂者四暢交於中而發作於外此先王立樂之方也又曰樂者歌九德誦六詩是以薦之郊廟則􅀑神享之也又曰夫樂通神明安民庶故聽者無不虚巳竦神恱而成流是以海内徧知上德􅀍服其風光輝日新化上而遷善而不知所以然至於萬物不夭}
  - {type: variant, offset: 108, length: 0, content: '', krp: 樂者四暢交於中而發作於外此先王立樂之方也又曰樂者歌九德誦六詩是以薦之郊廟則鬼神享之也又曰夫樂通神明安民庶故聽者無不虚巳竦神恱而成流是以海内徧知上德𬒳服其風光輝日新化上而遷善而不知所以然至於萬物不夭}
  - {type: variant, offset: 109, length: 0, content: '', SBCK: 地順而嘉應舉故詩曰磬管鏘鏘降福穣穣魏志曰太祖以杜夔爲軍謀􅀕酒叅太樂事因令創制雅樂夔善鍾律聡思過人絲竹八音靡所不能唯歌舞非所長散􅀐侍郎鄧静尹啇善詠雅樂歌師尹胡能歌宗廟郊祀之曲舞師馮肅時知先代諸舞惣究研精逺考經誥近採故事教習講律備作樂器復先代之樂皆自夔始也呉録曰呉中呼周瑜爲周郎瑜精意音樂三爵之後其有闕誤瑜必知之而頋時呉人謡曰曲復設周郎頋宋書臧嘉傳曰武帝入京城進至建鄴桓􅀇走武帝使喜入宫収圖書器物封府庫有金飾樂器武帝問喜卿欲此乎喜正色曰主上幽逼播越非所將軍首建大義劬勞王室雖復不肖實無情於樂帝􅀏曰聊以戯耳齊書蕭惠基傳曰自宋大明巳來聲􅇊所尚多鄭衛而雅樂正聲鮮有好者惠基解音律尤好三祖曲及相和歌每奏輙賞恱崔鴻十六國春秋曰後􅁗録姚興傳曰濟南公邕字}
  - {type: page-break, offset: 109, content: '', id: KR3k0012_SBCK_564-4a}
