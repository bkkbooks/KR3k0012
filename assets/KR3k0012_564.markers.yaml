  - {type: variant, offset: 175, length: 130, content: 合國之子弟焉鄭玄注曰均調也樂師主調其音大司樂主受此成事已調之樂以樂德教國子中和祗庸孝友中猶忠也和剛柔適也祗敬也庸有常也以樂語教國子興道諷誦言語興謂以善物諭善事也道讀曰遵也者言古以喻今以樂舞教國子雲門大卷大咸大韶大夏大護大武又曰大司樂分樂而序之以祭以享以祀乃奏黃, SBCK: 妙逹}
