  - {type: variant, offset: 21, length: 1, content: 薦, krp: 美}
  - {type: variant, offset: 23, length: 0, content: '', SBCK: 又曰樂云樂云鍾鼓云乎哉言樂不但崇此鍾鼓而巳所貴者貴其移風易俗也又曰子語魯太師樂曰樂其可知也始作翕如也始作謂金奏時聞金作人皆翕如變動之㒵從之純如也從讀曰縱縱之謂八音皆作純如感和之皃皦如也繹如也以成皦如使清別之皃也繹如志意條逹又曰子謂韶盡美矣又盡善也韶舜樂也美舜自以德禪於堯又盡善謂太平也謂武盡美矣未盡善也謂周武王樂美武王以此功定天下未盡善致太平孝經曰移風易俗莫善於樂爾雅曰宫謂之重商謂之敏角謂之經徴謂之迭羽謂之栁郭璞注皆五音之列名其義未詳史記曰趙簡子疾五日不知人扁鵲曰昔秦繆公甞如此五日不知人七日乃窹語大夫曰我之帝所甚樂與百神遊于鈞天廣樂九奏萬舞不􅀋三代之樂其聲動人心又曰樂所以}
  - {type: page-break, offset: 23, content: '', id: KR3k0012_SBCK_564-2b}
  - {type: variant, offset: 23, length: 70, content: 上帝以配祖考書曰夔命汝典樂教胄子胄子國子也古者司樂以教國子詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和周禮曰大合樂以致鬼神以和邦國以諧萬, WYG: 遺}
  - {type: variant, offset: 23, length: 0, content: '', krp: 又曰樂云樂云鍾鼓云乎哉言樂不但崇此鍾鼓而巳所貴者貴其移風易俗也又曰子語魯太師樂曰樂其可知也始作翕如也始作謂金奏時聞金作人皆翕如變動之㒵從之純如也從讀曰縱縱之謂八音皆作純如感和之皃皦如也繹如也以成皦如使清別之皃也繹如志意條逹又曰子謂韶盡美矣又盡善也韶舜樂也美舜自以德禪於堯又盡善謂太平也謂武盡美矣未盡善也謂周武王樂美武王以此功定天下未盡善致太平孝經曰移風易俗莫善於樂爾雅曰宫謂之重商謂之敏角謂之經徴謂之迭羽謂之栁郭璞注皆五音之列名其義未詳史記曰趙簡子疾五日不知人扁鵲曰昔秦繆公甞如此五日不知人七日乃窹語大夫曰我之帝所甚樂與百神遊于鈞天廣樂九奏萬舞不類三代之樂其聲動人心又曰樂所以}
  - {type: variant, offset: 24, length: 1, content: 帝, SBCK: 事宗廟下}
  - {type: variant, offset: 24, length: 1, content: 帝, krp: 事宗廟下}
  - {type: punctuation, offset: 25, content: ，, id: KR3k0012_CHANT_564-bkkpn8}
  - {type: 'tls:seg', offset: 25, content: '', id: KR3k0012_CHANT_564-1a.8}
  - {type: variant, offset: 26, length: 3, content: 配祖考, SBCK: 變化􅀺庶又曰凢樂者使萬民感蕩滌雅穢斟酌以飾厥性又曰太史公曰音樂者所以動盪血脉通流精神而和正心也又曰凢音由於人心天之與人相通如影之象形響之應聲也故爲善者天報之以福爲􅁖者天報之以殃其自然者也故舜作五􅃶之琴歌南風之詩而天下治紂爲朝歌北鄙之音身死國亡舜之道何弘也紂之行何隘也夫南風之詩生長之音也舜樂好之樂天下同意得萬國之歡心故得天下也夫朝歌者不時也北者敗也鄙者陋也紂樂好之萬國殊心諸侯不附百姓不親天下叛之故身死國亡漢}
  - {type: page-break, offset: 26, content: '', id: KR3k0012_SBCK_564-3a}
