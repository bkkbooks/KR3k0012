  - {type: variant, offset: 15, length: 0, content: '', SBCK: 之遺民焉爲之歌大雅曰廣哉熈熈乎熈熈和樂聲也曲而有直躰其文王之徳乎爲之歌頌曰至矣哉盛德之所同也見舞象箾􅀯籥者曰羙哉猶有所憾見舞大武者曰羙哉周之盛也其􅀂此乎見舞詩韶護者殷湯樂也曰聖人之弘也而猶有慙德聖人之難也見舞大夏者禹之樂也美哉勤而不德非禹其誰能及之見舞韶箾者舜之樂也曰至矣哉大矣如天之無不覆也如地之無不載也雖甚盛德其蔑}
  - {type: variant, offset: 15, length: 7, content: 以作樂崇德殷薦, WYG: ''}
  - {type: variant, offset: 15, length: 0, content: '', krp: 之遺民焉爲之歌大雅曰廣哉熈熈乎熈熈和樂聲也曲而有直躰其文王之徳乎爲之歌頌曰至矣哉盛德之所同也見舞象箾南籥者曰羙哉猶有所憾見舞大武者曰羙哉周之盛也其若此乎見舞詩韶護者殷湯樂也曰聖人之弘也而猶有慙德聖人之難也見舞大夏者禹之樂也美哉勤而不德非禹其誰能及之見舞韶箾者舜之樂也曰至矣哉大矣如天之無不覆也如地之無不載也雖甚盛德其蔑}
  - {type: variant, offset: 16, length: 0, content: '', SBCK: 加此矣􅀂有他樂吾不敢請巳又曰宋公享晉侯於楚丘請以桑林桑林殷天子樂名也荀罃辝荀偃士丐曰諸侯宋魯於是觀禮宋王者後魯以周公故皆用天子禮樂故可觀也魯有褅樂賔登用之禘三年太􅀕則}
  - {type: variant, offset: 16, length: 0, content: '', krp: 加此矣若有他樂吾不敢請巳又曰宋公享晉侯於楚丘請以桑林桑林殷天子樂名也荀罃辝荀偃士丐曰諸侯宋魯於是觀禮宋王者後魯以周公故皆用天子禮樂故可觀也魯有褅樂賔登用之禘三年太祭則}
  - {type: variant, offset: 17, length: 0, content: '', SBCK: 四代之}
  - {type: variant, offset: 17, length: 0, content: '', krp: 四代之}
  - {type: variant, offset: 18, length: 0, content: '', SBCK: 也別􅀕群公則用諸樂也宋以桑林享君不亦可乎言俱天子樂也舞師題以旌夏旌夏大旌也題識也以大旌表識其行列也晉侯懼而退入於房旌夏非常卒見之人心偶有所畏卜桑林見}
  - {type: page-break, offset: 18, content: '', id: KR3k0012_SBCK_564-2a}
  - {type: variant, offset: 18, length: 0, content: '', krp: 也別祭群公則用諸樂也宋以桑林享君不亦可乎言俱天子樂也舞師題以旌夏旌夏大旌也題識也以大旌表識其行列也晉侯懼而退入於房旌夏非常卒見之人心偶有所畏卜桑林見}
  - {type: variant, offset: 19, length: 0, content: '', SBCK: 見於卜兆也荀見偃士丐欲奔請禱焉奔走還宋禱謝荀罃不可曰我辝禮矣彼則以之猶有􅀑神於彼加之言自當加罪於宋晉侯有聞又曰晉與諸侯伐鄭鄭人賂晉侯以師悝師觸師蠲皆樂師名歌鍾二肆肆列也懸十六爲一肆三十二枚也及其鎛磬女樂二八晉侯以樂之半賜魏絳曰子教寡人和諸戎狄以正諸華八年之中九合諸侯如樂之和無所不諧請與子樂之魏絳於是乎始有金石之樂禮也大夫有功則賜樂也論語曰師摯之始關雎之乱洋洋乎盈耳哉魯太師摯識關雎之聲而首理其乱者洋洋乎盈耳}
  - {type: variant, offset: 19, length: 0, content: '', krp: 見於卜兆也荀見偃士丐欲奔請禱焉奔走還宋禱謝荀罃不可曰我辝禮矣彼則以之猶有鬼神於彼加之言自當加罪於宋晉侯有聞又曰晉與諸侯伐鄭鄭人賂晉侯以師悝師觸師蠲皆樂師名歌鍾二肆肆列也懸十六爲一肆三十二枚也及其鎛磬女樂二八晉侯以樂之半賜魏絳曰子教寡人和諸戎狄以正諸華八年之中九合諸侯如樂之和無所不諧請與子樂之魏絳於是乎始有金石之樂禮也大夫有功則賜樂也論語曰師摯之始關雎之乱洋洋乎盈耳哉魯太師摯識關雎之聲而首理其乱者洋洋乎盈耳}
