  - {type: variant, offset: 2461, length: 367, content: 無難矣樂也者動於內者也禮也者動於外者也故禮主其減樂主其盈滅猶倦也盈猶溢也禮減而進以進為文樂盈而反以反為文樂以統情禮以理行之情溢而行倦則進之隘之則使反進則自免往反謂自損抑也文猶羨也禮減而不進則銷樂盈而不反則放故禮有報而樂有反放淫於聲樂不能止也報續曰褒猶進也禮得其報則樂樂得其反則安得謂曉其義知其歸禮之報樂之反其義一也夫樂者先王之所以飾喜也軍旅鈇鉞者先王所以飭怒也故先王之喜怒皆得其儕焉又曰孔子間居子夏曰敢問何謂三無孔子曰無聲之樂無體之禮無服之喪子夏曰三無既得而聞之矣敢問何詩近之孔子曰夙夜基命宥密無聲之樂也威儀棣棣不可選也無體之禮也凡民有喪匍匐救之無服之喪也子夏曰言盡於此而已乎孔子曰何為其然也君子之服猶有五起焉無聲之樂氣志不違無體之禮威儀遲遲無服之喪內恕孔悲無聲之樂氣志既得無體之禮威儀翼翼無服之喪施于四國無聲之樂氣志既從無體之禮上下, SBCK: ''}
