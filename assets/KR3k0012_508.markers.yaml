  - {type: variant, offset: 2947, length: 74, content: 世傳至何及秦焚學以易為卜筮之書獨不焚故何傳之不絕漢興何以齊諸田徙杜故號曰杜田生以易受弟子東武王仲洛陽周王孫丁寬齊服生梁項生等皆顯當世惠帝時何年老家貧, SBCK: 春秋恬居}
  - {type: variant, offset: 2947, length: 4, content: 世傳至何, WYG: 春秋恬居守義名重西州延熹中沛國橋𤣥為漢陽太守召岐欲以為功曹岐稱疾不就𤣥怒勅督郵尹益收岐若實不起者欲嫁其母而後殺岐益爭之𤣥怒益撾之益得杖且諫曰岐少修學孝義棲遅衡廬鄉里歸仁名宣州里實無罪狀益敢以死守之𤣥怒乃止岐於是髙名逾廣}
