  - {type: variant, offset: 2371, length: 0, content: '', SBCK: 郭泰字林宗太原人也少事父母以孝聞身長八尺餘家貧郡縣欲以爲吏歎曰大夫何能執鞭斗筲哉乃辝母與同郡宗仲至京師從屈伯彦學春秋􅀶洽無不通又審於人物由是名著於陳梁之間歩行遇雨巾一角蟄衆人慕之皆折巾角士争往從之載䇿􅄹車凡㤗知之於無名之中六十餘人皆先言後驗以母喪歸徐稚來吊以生芻一束頓泰廬前而去泰曰􅀯州髙士徐}
