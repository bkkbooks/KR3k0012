  - {type: variant, offset: 2332, length: 0, content: '', krp: 識唯劉龔知之又曰髙恢字伯逺少治老子經恬虚不營丗務與梁鴻善隱於華隂山又曰姜肱字伯淮彭城廣戚人也家丗名族肱兄弟三人皆孝行著肱年㝡長與二弟仲海季江同𬒳卧甚相親友及長各娶兄弟相愛不}
  - {type: variant, offset: 2333, length: 0, content: '', SBCK: 相離習學五經兼明星緯弟子自逺方至者三千餘人聲重於時凡一舉孝廉十辟公府九舉有道至孝賢良公車三徴皆不就仲季亦不應徴辟建寧三年靈帝詔徴爲犍爲太守肱得詔乃告其友曰吾以爲虚􅀗實遂藉聲價盛明之丗尚不委質况今政在私門哉乃隱遯命乗舡浮海使者追之不及再以􅀇纁聘不就即拜太中大夫又逃不受詔名振天下年七十卒于家又曰徐稚字孺子豫章南昌人也少以經行髙於南州桓帝時汝南陳蕃爲豫章太守因惟薦稚於朝廷由是三舉孝廉賢良皆不就連辟公府不詣未嘗荅命公薨輒身自赴弔太守黄瓊亦嘗辟稚至瓊薨歸葬江夏稚旣聞即負笈徒歩豫章三十餘里夏瓊墓前致酹而哭之後公車三徴不就以壽終又曰夏馥字子治陳留圉人也少爲諸生質直不茍動必依道同縣髙儉及蔡氏凡二家豪冨郡人畏事之唯馥閉門不與髙蔡通桓帝即位災異數發詔百司舉直言之士各一人太尉趙戒舉馥不詣遂隱身乆之靈帝即位中常侍曹節等專朝禁錮善士謂之黨人馥雖不交官然聲名爲節等所憚遂以汝南范滂山陽張儉等數百人並爲節所誣悉在黨中詔下郡縣各捕以爲黨魁馥於是頓足而歎曰㜸自巳作空汙良善一人逃死禍及百家何以生爲乃剪􅂡變服易形改姓入相慮山中爲冶工客作形貌毀悴積傭三年而無}
  - {type: page-break, offset: 2333, content: '', id: KR3k0012_SBCK_508-3a}
