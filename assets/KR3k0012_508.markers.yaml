  - {type: variant, offset: 2409, length: 0, content: '', SBCK: 車再徴不詣范滂羙而稱之曰隱不違親身不絶俗可謂至賢也又曰牛牢字君直丗祖爲布衣時與牢遊夜講訖共言䜟劉秀當爲天子丗祖曰安知非我萬一各言爾志牢獨黙然丗祖問之牢曰丈夫立義不與帝友衆大􅀏及丗祖即位徴牢稱疾不至詔曰朕㓜交牛君直淸髙士也􅁪有疾州郡之官者常先到家致意焉刺史郡守是以每輒奉詔就家存問牢恒􅀍髪稱疾不荅詔命又曰成公者成帝時自隱性名嘗誦經不交丗利時人號曰成公成帝時出遊問之成公不屈節上曰朕能冨貴人能殺人子何逆朕哉成公曰陛下能貴人臣能不受陛下之官陛下能冨人臣能不受陛下之禄陛下能殺人臣能不犯陛下之法上不能折使郎二人就受政事十二篇又曰彭城老父者楚之隱人也見漢室衰乃自隱修道不治名利至年九十餘王莽時徴故光禄大夫龔勝欲爲太子師友􅀕酒耻事二姓莽迫之勝遂不食而死莽使者及郡守巳下㑹斂者數百人先生痛勝以名致禍乃獨入哭勝甚悲旣而曰嗟乎薫以香自燒膏以明自煎龔先生夭天年非吾徒也哭畢而起出衆莫知其誰又曰宋勝之字即子南陽安衆人也少􅀌年十五失父母家于榖城中孝慕甚篤中化之少長有禮勝之毎}
  - {type: page-break, offset: 2409, content: '', id: KR3k0012_SBCK_508-5a}
  - {type: variant, offset: 2409, length: 0, content: '', WYG: 車再徴不詣范滂美而稱之曰隐不違親貞不絶俗可謂至賢也又曰牛牢字君直世祖為布衣時與牢遊夜講訖共言䜟劉秀當為天子世祖曰安知非我萬一各言爾志牢獨黙然世祖問之牢曰丈夫立義不與帝友大笑及世祖即位徴牢稱疾不至詔曰朕㓜交牛君真清髙士也恒有疾州郡之官者常見到家致意焉刺史郡守是以每輙奉詔就家存問牢恒被髪稱疾不答詔命又曰成公者成帝時自隐姓名常誦經不交世利時人號曰成公成帝時出遊問之成公不屈節上曰朕能冨貴人能殺人子何逆朕哉成公曰陛下能貴人臣能不受陛下之官陛下能富人臣能不受陛下之禄陛下能殺人臣能不犯陛下之法上不能折使郎二人就受政事十二篇又曰彭城老父者楚之隐人也見漢室衰乃自隐脩道不治名利至年九十餘王莽時徴故光禄大夫龔勝欲為太子師友祭酒耻事二姓莽廹之勝遂不食而死莽使者及郡守已下㑹歛者數百人先生痛勝以名致禍乃獨入哭勝甚悲既而曰嗟乎薰以香自燒膏以明自煎龔生竟夭夭年非吾徒也哭畢而起出衆莫知其誰又曰宋勝之字節夫南陽安衆人也少孤年十五失父母家於榖城􅀈中孝慕甚篤􅀈中化之少長有禮勝之每}
