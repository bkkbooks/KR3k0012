  - {type: variant, offset: 596, length: 42, content: 事卜子夏與田子方李克翟璜吳起等居於魏皆為將唯干木守道不仕魏文侯就造其門段干木踰牆而避, WYG: 焉望}
  - {type: variant, offset: 599, length: 434, content: 夏與田子方李克翟璜吳起等居於魏皆為將唯干木守道不仕魏文侯就造其門段干木踰牆而避之文侯尊以容禮出過其廬而軾其僕問曰干木布衣也君軾其廬不以甚乎文侯曰段干木不趨勢利隱處乎窮巷聲馳千里敢不軾乎文侯以名過齊桓公者蓋能尊段干木敬卜子夏友田子方故也又曰公儀潛魯人與子思為友穆公因子思而致命欲以為相子思曰公儀子逾所以不至也君若飢渴待賢納用其謀雖蔬食飲水伋亦願在下風如以高官厚祿為釣餌而無信用之心公儀子智若魚者可也不爾則不踰君之庭且臣不佞又不能為君操竿下釣以傷守節之士潛竟終身不屈又曰王斗齊人也修道不仕與顏歜並時曾造齊宣王門欲見宣王宣王使謁者延斗入斗曰趍見王為好勢趍見斗為好士於王何如謁者還報王曰先生徐之寡人請從王趨而迎之於門曰寡人奉先君之宗廟社稷願聞先生直言正諫斗曰王之憂國愛民不若王之愛尺之縠王曰何謂斗曰王使為冠不使左右便辟而使工者何也為能之也今王治齊國非左右便辟則無使也臣故曰不如愛尺之縠也王乃謝曰寡人有罪於國家矣於是舉士五人任之以官齊國大治王斗之力也又曰黔婁先生者齊人也修身清節, SBCK: 經恬静}
