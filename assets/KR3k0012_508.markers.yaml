  - {type: variant, offset: 2332, length: 0, content: '', SBCK: 識唯劉龔知之又曰髙恢字伯逺少治老子經恬虚不營丗務與梁鴻善隱於華隂山又曰姜肱字伯淮彭城廣戚人也家丗名族肱兄弟三人皆孝行著肱年㝡長與二弟仲海季江同􅀍卧甚相親友及長各娶兄弟相愛不}
  - {type: variant, offset: 2332, length: 0, content: '', WYG: 識唯劉龔知之又曰髙恢字伯逺少談老子經恬虛不營世務與梁鴻善隐於華隂山又曰姜肱字伯淮彭城廣戚人也家世名族肱兄弟三人皆孝行著肱年最長與二弟仲海季江同被卧甚相親友及長各娶兄弟相愛不}
