  - {type: variant, offset: 74, length: 224, content: 之曰果哉蔑之難矣又曰石門守者魯人也亦避世不仕自隱又名為魯守石門主晨夜開閉之子路從孔子入石門而宿問子路曰奚自子路曰自孔氏遂譏孔子曰是知其不可而為之者與時人賢焉又曰東郭順子者魏人也脩道守真田子方師事之而為魏文侯師友侍坐於文侯數稱谿工文侯曰谿工子師耶子方曰非也無擇之里人也稱道數當無擇稱之文侯曰然則子無師耶子方曰有文侯曰子師誰子方曰東郭順子也文侯曰然則夫子何故未嘗稱之子方曰其為人也直情而容物物無道則正容以悟之使人意也消無擇何也以稱之子方出文侯曰遠哉全德, SBCK: 古}
