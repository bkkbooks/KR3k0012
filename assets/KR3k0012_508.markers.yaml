  - {type: variant, offset: 3037, length: 164, content: 宗又曰王生者漢文景時人也善為黃老退居不仕與南陽張釋之交當時釋之為公車令太子與梁王共入朝不下司馬門釋之劾奏太子不敬文帝善之遷至庭尉及文帝崩太子代立為帝是謂景帝釋之懼稱病欲去用王生計乃見上謝之景帝不過也王生平常與釋之及公卿會庭中立王韤解顧謂釋之前跪而繫之既退或讓生曰獨奈何辱張廷尉使跪繫韤乎生曰吾年老老且賤矣自度終無益張廷尉廷尉方為, SBCK: 滿於}
