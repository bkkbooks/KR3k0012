  - {type: variant, offset: 930, length: 969, content: 不若王之愛尺之縠王曰何謂斗曰王使為冠不使左右便辟而使工者何也為能之也今王治齊國非左右便辟則無使也臣故曰不如愛尺之縠也王乃謝曰寡人有罪於國家矣於是舉士五人任之以官齊國大治王斗之力也又曰黔婁先生者齊人也修身清節不求進諸侯魯恭公聞其賢遣使致禮賜粟三十鍾欲以為相辭不受齊王又禮之以黃金百斤聘以為卿又不就著書四篇言道家之務號曰黔婁子終身不屈以壽終又曰原憲居環堵之甕牖桑樞上漏下濕縵衣無表手足胼胝三日不舉火十年不製衣坐而彈琴子貢相衛結駟連騎排藜藿入窮閭巷不容軒來見憲憲韋冠杖藜而出應門正冠則纓絕歛衽則肘見納屨則踵決子貢曰嘻先生何病也憲笑曰憲聞之無財謂之貧學道而不能行者謂之病若憲貧也非病也若夫仁義之慝車馬之飾憲不忍為子貢逡巡面有慚色終身恥其言之過也又曰曾參字子羽魯哀公致邑焉參辭不受曰吾聞受人者常畏人與人者常驕人縱君不我驕我豈無畏乎又曰陳仲子齊人其兄載為齊卿食祿萬鍾仲子以為不義將妻子適楚居於於陵自謂於陵子仲窮不茍求不義之食遭歲飢乏糧三日乃匍匐而食井上李實之蟲者三咽而食視身自織履妻擘纑以易衣食楚王聞其賢欲以為相遣持金百鎰至於陵聘仲子仲子入謂妻曰楚王欲以我為相今日為相明日結駟連騎食方丈於前意可乎妻曰夫子左琴右書樂在其中矣結駟連騎所安不過一肉而懷楚國之憂竟可乎於是謝使者遂相與逃而為人灌園又曰披裘公者吳人延陵季子出遊見道中有遺金顧而覩公曰取彼金公投鎌瞋目拂手而言曰何子處之高而視之卑五月披裘而負薪豈取金者哉季子大驚既謝而問姓名公曰子皮相之士何足語姓名哉又曰江上丈人者楚人也楚平王以費無忌之讒殺伍奢奢子員士將奔吳至江上欲渡無舟而楚人購員甚急自恐不脫見丈人得渡因解所佩劍以與丈人曰此千金之劍也願獻之丈人不受曰楚國之法得伍胥者爵執珪金千鎰吾尚不取何用劍為不受而別莫知其誰員至吳為相求丈人不能得每食輒祭之曰名可得聞而不可得見其唯江上丈人乎又曰漁父者楚人也見楚亂乃匿名隱釣於江濱楚頃襄王時屈原為三閭大夫名顯於諸侯為上官靳尚所譖王怒遷之江濱被髮行吟於澤畔漁父見而問之曰子非三閭大夫歟何故至斯原曰舉世混濁而我獨清眾人皆醉而我獨醒是以見放漁父曰夫聖人不疑滯於萬物故能與世推移舉世混濁何不隨其流揚其波汨其泥眾人皆醉何不餔其糟歠其醨何故懷瑾握瑜自令放焉乃歌曰滄浪之水清可以濯吾纓滄浪之水濁可以濯吾足遂去深自閉匿人莫知焉又曰河上丈人者不知何國人也明老子之術自匿姓名居河之湄, WYG: 間}
