  - {type: variant, offset: 574, length: 240, content: 姓呼曰蜜崗蜜焉仙經云蜜為眾口芝荊州圖記曰赤馬山有蜜房二百所羅綴相望因名曰百房異物志曰交阯草滋大者數寸煎之凝如冰破如愽棊謂之石蜜涼州異物志曰石蜜之茲甜於浮蓱非石之類假石之名實出甘柘變而凝輕甘柘似竹味甘煮而曝之則凝如石而甚輕范子曰白蜜出隴西天水本草經曰石蜜一名飴吳氏本草曰食蜜生武都谷劉根墨子枕中記鈔曰百花醴蜜楚辭招魂曰瑤漿勺勺沙也實羽觴左思蜀都賦曰蜜防郁毓被其阜漢昌縣多野蜂蜜蠟郭珍蜜賦曰繁布金房疊稱王室咀爵滋液釀以為蜜散似甘露凝如割肪冰鮮玉潤髓滑蘭香魏文帝與孫權書曰今因趙咨奉石蜜, SBCK: ''}
