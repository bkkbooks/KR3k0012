  - {type: variant, offset: 68, length: 11, content: 世祖嘗與朱祐共買蜜合藥, SBCK: 主乳馬取其汁桐治之味酢可飲因以爲官如淳曰桐音筩主乳馬以韋革爲夾兠受數斗咸馬乳桐取其上肥因名曰桐馬今梁州亦名馬酪爲馬酒晉灼曰桐音揵桐之桐又曰丞相孔光奏省樂官七十二人給太官桐馬酒李竒日以馬乳爲酒也撞桐乃成又曰烏孫公主歌曰以􅁏爲食兮酪爲漿又曰王莽時飢教民煑木爲酪不可食重爲煩擾受日木實爲酪也或曰如令餌木屬}
  - {type: variant, offset: 68, length: 11, content: 世祖嘗與朱祐共買蜜合藥, WYG: 主乳馬取其甘桐液之味酢可飲因以為官如淳曰桐音筩主乳馬以韋革為夾兠受數斗咸馬乳桐取其上肥因名曰桐馬今梁州亦名酪為馬酒晋灼曰桐音揵桐之桐又曰丞相孔光奏有樂官七十二人絡太官桐馬酒李竒曰以馬乳為酒也撞桐乃成又曰烏孫公主歌曰以肉為食兮酪為漿又曰王莽時飢教民煮木為酪不可食重為煩擾注曰木實為酪也或曰如今餌木屬}
