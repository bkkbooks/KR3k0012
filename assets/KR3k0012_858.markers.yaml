  - {type: variant, offset: 260, length: 5, content: 石蜜伍斤齊, SBCK: 乳酪太官隨日給之漢武内傳曰西王母曰次藥有太􅀇之酪西河舊事曰祁連山冝牧牛羊羊肥乳酪奸不用器物刈草着其上不解散一斛酪外餘酥鄴中記曰并州之俗以冬至後百五日介子推斷火冷食作醴酪煑粳米或大麦作之又投大麥於其中酪擣杏子人煑作之亦投大麥中郭子曰王武子有數斛羊酪指示陸機曰卿東呉何以敵此機曰千里蓴羹未下塩䜴世􅀃曰楊德祖爲主簿侍坐人有餉酪者魏武噉少許乃題上作合字致坐中人並不解脩即噉之云公教令人一口復何疑又曰陸太尉詣王丞相公食之以酪陸還遂病明日有牋與王曰昨食酪過通夜委頓民雖呉人幾爲傖􅀑􅀏林曰吳人至京師爲設食者有酪酥未知是何物也強而食之歸吐遂至困顧謂其子曰與傖人同死亦無所恨汝故冝愼之魏文帝集載鍾繇}
