  - {type: variant, offset: 2234, length: 0, content: '', WYG: 三版城中懸釡而炊易子而食漢記曰段熲破羗胡明年羗復冦張掖步下馬大戰弓刀折盡虜亦引退追之晝夜攻擊割肉食雪四十餘日後漢書曰車師與匃奴攻耿恭於疏勒中恭食盡乃煮鎧弩食其筋革又曰臧洪為東郡太守為袁紹所圍初尚掘䑕煮筋角後無所食取草實而食之魏志曰太祖圍張超於雍丘超言唯臧洪當來救吾衆人以為袁曹方睦洪為紹所表用必不敗好招禍洪聞之果徒跣號泣勒所部又從紹請兵馬救超紹不許遂為太祖所滅洪由是怨紹紹興兵圍之厯年不下紹忿洪無降意増兵急攻洪自度不得免呼吏士謂曰袁氏無道所圖不軌且不救洪郡將洪大義不得不死念諸君無事空與此禍耳可將妻子去吏士皆垂泣掘䑕煮筋角後無所食主簿唘内厨米三斗洪更作薄粥衆分醊之殺其愛妾以食士城中男女七八千人相枕而死莫有離叛城陷紹生執洪徐廣晉記曰霍彪為賊費黑所隔積百日殺馬燒皮鎧食又曰韓冕蘓碩等攻范城中饑米一斛萬錢晉書劉琨赴并州上表曰臣自涉州疆目覩困乏流移四散十不得存二㩦老扶弱不絶於路及其在者鬻賣妻子生相捐棄死亡接繼屍骨横野哀呼之聲感傷和氣羣胡}
