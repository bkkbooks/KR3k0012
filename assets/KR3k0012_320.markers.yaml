  - {type: variant, offset: 2202, length: 4, content: 王羆為荊, SBCK: 爲􅀽曹方穆洪爲紹所表用必不敗好招禍洪聞之果徒跣號泣勒所鎭又從紹請兵馬救超紹不許遂爲太祖所滅洪由是怨紹紹興兵圍之歷年不下紹忿洪無降意増兵急攻洪自度不得免呼吏士謂曰􅀽氏無道所圖不軓且不救洪郡洪於大義不得不死念諸君無事空興此禍耳可將妻子去吏士皆垂泣掘䑕煑筯角後無所食主簿啓内厨米三斗洪使作薄粥衆分醊之殺其愛妾以食士城中男女七八千人相枕而死莫有離叛城䧟紹生執洪徐廣晉紀曰霍彪爲賊貴黒所隔積百日殺馬燒皮鎧食之又曰韓晃􅂫碩等攻􅁐城中飢米一㪷萬錢晉書劉崑赴并州上表曰臣自渉州彊目覩困之流移四散十不得存二携老扶弱不絶於路及其在者鬻賣妻子生相􅂢弃死亡委厄白骨横野哀呼之聲感傷和氣羣胡數萬周匝四山動足遇掠開目覩㓂唯有壷􅀜可得告糴而此二道九州之險數人當路則百夫不敢進公私徃反没䘮者多嬰守窮城不得薪菜耕牛旣盡又乏田器以臣愚短當此至難憂如循環不遑寢食晉中興書曰中宗初鎭江左假郄鑒龍驤將軍兖}
