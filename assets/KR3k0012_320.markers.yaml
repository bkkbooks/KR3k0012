  - {type: variant, offset: 1058, length: 0, content: '', WYG: 士辛苦守戰伾家無尺寸之物與公等為賞獨有此女幸未嫁人願出賣之為將士一日費衆皆大哭曰誓與將}
  - {type: variant, offset: 1058, length: 0, content: '', krp: 士辛苦守戰伾之家無尺寸物與公等爲賞獨有此女幸未嫁人願出賣之爲將士一日費衆皆大哭曰誓與將}
  - {type: variant, offset: 1059, length: 0, content: '', SBCK: 死戰幸無慮也㑹馬燧以太原之師至與軍衆合擊恱於城下大敗之伾乗􅀔出戰士卒無不一當百圍解以功遷泗州刺史三國典略曰周獨􅀌永業恐洛州刺史叚思文不能自固馳入金墉助守尉遲逈爲土山地道曉夕攻戰永業選其三百人爲爪牙每先鋒死戰逈不能剋又曰臺城朱䧟侯景又燒大司馬門後閣舎人髙善寳以􅀻金千兩賞其戰士直閣將軍宗思領將士數人踰城出外灑水乆之火滅景又遣持長柯斧入門下斫門將開羊促鑿扇爲孔以槊刺倒二人斫者乃退又曰陳人侵齊北徐州刺史祖班令不􅐬城門守陴者皆下街巷業斷人行鷄犬不許鳴吠陳人莫測所以疑人走城空不設警備中夜班忽令鼓譟陳人驚散曉復結陳向城班自臨戰陳人先聞其盲謂不能抗拒忽見親在戎行彎弧縱鏑怪之遂退時穆提婆憾之不巳欲令城䧟不遣救援班軍守百日城竟保全北史曰梁將呉明徹攻圍海西齊將郎基固守乃至削木爲箭翦􅁓爲羽圍解還朝僕射楊愔迎勞之曰卿夲文吏遂}
  - {type: page-break, offset: 1059, content: '', id: KR3k0012_SBCK_320-3b}
