  - {type: variant, offset: 3525, length: 358, content: 銳攻之樓楪皆盡城雉所存尋仞而已或短兵相接或交馬出入士彥謂將士曰死在今日吾為爾先於是勇烈齊奮呼聲動地無一不當百齊師少却乃令妻妾軍民子女晝夜脩城三日而就帝率六軍亦至齊師解圍營於城東十餘里士彥見帝持帝鬚而泣曰臣幾不見陛下帝亦為之流涕時帝以將士疲倦意欲班師士庶叩馬而諫曰今齊師遁眾心皆動因其懼也而攻之其勢必舉帝從之大軍遂進帝執其手曰余之有晉州為平齊之基若不固守則事不諧矣朕無前慮惟恐後變善為我守之又曰郭榮宇丈護擢中外府水曹參軍時齊寇屢侵護令榮於汾州觀賊形勢時汾州與姚襄鎮相去懸遠榮以為二城孤逈勢不相救請於州鎮之間更築一城以相控攝護從之俄而齊將祖孝先攻陷姚襄汾州二城唯榮所立者獨能自守護作浮橋出兵渡河與孝先戰孝先於上流縱火筏以擊浮橋護令榮督便水者引取其筏以功授大都督護又曰劉弘字仲遠拜泉州刺史會高智慧作亂以兵攻州弘城中守百餘日, SBCK: ''}
