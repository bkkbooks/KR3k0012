  - {type: variant, offset: 3071, length: 368, content: 謂餉舡至逆來爭之敦甲士出而擒之此後實有饋餉乃亡命奔瑱者猶謂敦之設詐逆遣扞擊並不敢受相持歲餘瑱不能制北史曰西魏將韋孝寬守玉壁東魏大將齊神武命攻之連營數十里至於城下乃於城南起土山欲乘之以入當其山處城上先有兩高樓孝寬更縛木接之令極峻多積戰具以禦之敵人以樓高不得入遂於城南鑿地道又於城北起土山且作且攻晝夜不息孝寬復掘長塹截其道乃置戰士屯於塹上城外每穿至塹戰士即擒殺之又於塹外積柴貯火敵人有在地道內者便下柴火以皮鞴吹之鞴蒲拜切火氣一衝咸即灼爛城外又作攻車車之所及莫不摧毀雖有排楯莫之能抗孝寬乃縫布為幔隨其所向則張設之布既懸於空中其車竟不能壞城外又縛松麻於竿灌油加火規以燒布并欲焚樓孝寬復長作鐵鉤利其鋒刃火竿亦來以鉤遙割之松麻俱落城外又於城西面穿地作二十一道分為四路於其中各施梁柱作訖以油灌柱放火燒之柱折城並崩壞孝寬又隨壞處堅木柵以扞之敵不得入城外, WYG: 糧}
