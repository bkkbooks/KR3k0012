  - {type: variant, offset: 36, length: 0, content: '', SBCK: 賊於陣前嫚罵光弼並戯弄城上人光弼使人穿地道以木撑之賊明日還於舊處立將戯之地道透遂把賊脚曵入地道中光弼得而對衆戮之城中大喜思明知事不集遂退歸河北又曰薛愿爲頴川太守夲郡防禦使時賊已䧟陳留滎陽汝南等郡方圍南陽頴川當其來徃之路愿與防禦副使龐堅同力固守城中儲蓄無素}
