  - {type: variant, offset: 2354, length: 75, content: 役齊神武士馬甚盛太祖以華州衝要遣使勞羆令加守備羆語使人曰老羆當道臥驩子安得過太祖聞而壯之及齊神武至城下謂羆曰何不早降羆乃大呼曰此城是王羆家生死在此欲死, SBCK: 一無叛}
  - {type: variant, offset: 2354, length: 105, content: 役齊神武士馬甚盛太祖以華州衝要遣使勞羆令加守備羆語使人曰老羆當道臥驩子安得過太祖聞而壯之及齊神武至城下謂羆曰何不早降羆乃大呼曰此城是王羆家生死在此欲死者來齊神武遂不敢攻又曰王思政守頴川兼河南諸軍事東魏太尉高岳行, WYG: 留撫滑}
