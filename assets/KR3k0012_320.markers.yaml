  - {type: variant, offset: 986, length: 1, content: 眾, WYG: 呼懸門竊發分出其衆道古衆驚亂多為虜殺又曰王凝為宣州黄巢自嶺表北歸大掠淮南攻圍和州凝令牙將樊儔舟師據采石以援之儔違令凝即斬之以狥命别將烏頴代儔赴援竟解厯陽之圍賊怒引衆攻宣城大將王涓請出軍逆戰凝曰賊忿而來宜持重待之彼衆我寡萬一不捷則州城危矣涓鋭意請行凝即集丁壯分守要害登陴設備涓果戰死賊乗勝而來則守有備矣賊為梯衝之具急攻數月禦備力殫吏民請曰賊之兇勢不可當願自書歸欵退之懼覆尚書家族凝曰}
