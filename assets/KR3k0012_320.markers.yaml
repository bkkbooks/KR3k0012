  - {type: variant, offset: 2430, length: 1025, content: 來齊神武遂不敢攻又曰王思政守頴川兼河南諸軍事東魏太尉高岳行臺慕容紹宗儀同劉豐生等率騎十萬來攻頴川城內臥鼓偃旗若無人者岳恃其眾謂一戰可屠乃四面鼓噪而上思政選城中驍勇開門出入岳眾不能當引軍亂退思政登城遙見岳陣不整乃率步騎三千出邀擊之殺傷甚眾然後還城設守禦之備岳知不可卒攻乃多修營壘又隨地勢高處築土山以臨城中飛梯大車晝夜盡攻擊之法思政亦作火鑽子筭切因迅風便投之土山又以火箭射之燒其攻具仍募勇士縋而出戰岳眾披靡其守土山人亦棄山而走思政即命據其兩土山置折堞以助防守岳等於是奪氣不敢復攻齊文襄更益岳兵堰於建反洧水以灌城城中水泉湧溢不可防止懸釜更炊糧力俱竭慕容紹宗劉豐生及其將慕容永珍共乘樓船以望城內令善射者俯射城中俄而大風暴起船乃飄至城下城上人以長鉤牽船弓弩亂發紹宗窮急透水而死豐生向土山復中矢而斃生擒永珍思政謂之曰僕之破亡在於晷漏誠知殺卿無益然人臣之節守之以死乃流涕斬之并收紹宗等尸以禮埋瘞又曰將賀若敦率步騎六千渡江取陳湘川陳將侯瑱討之江路遂斷糧援既絕人懷危懼敦於是分兵抄掠以充資費恐瑱等知其糧少乃於營內聚土覆之以米集諸營軍士人各持囊遣官司部分若給糧者因召側近村民佯有所訪問令於營外遙見隨即遣之瑱等聞之良以為實乃據守要險欲曠日老敦敦又增脩營壘造廬舍示以持久敦軍數有叛人乘馬投瑱者遂納之敦又別取一馬趣船船中逆以鞭鞭之如是者再三馬便畏船不上後伏兵於江岸遣人乘畏船馬以招瑱軍詐稱降附瑱遣兵迎接竟來牽馬馬既畏船不上敦發伏掩之盡殪又湘之人乘輕船載米粟乃籠雞鴨以餉瑱軍敦患之乃為土人裝船伏甲士於中瑱兵見之謂餉舡至逆來爭之敦甲士出而擒之此後實有饋餉乃亡命奔瑱者猶謂敦之設詐逆遣扞擊並不敢受相持歲餘瑱不能制北史曰西魏將韋孝寬守玉壁東魏大將齊神武命攻之連營數十里至於城下乃於城南起土山欲乘之以入當其山處城上先有兩高樓孝寬更縛木接之令極峻多積戰具以禦之敵人以樓高不得入遂於城南鑿地道又於城北起土山且作且攻晝夜不息孝寬復掘長塹截其道乃置戰士屯於塹上城外每穿至塹戰士即擒殺之又於塹外積柴貯火敵人有在地道內者便下柴火以皮鞴吹之鞴蒲拜切火氣一衝咸即灼爛城外又作攻車車之所及莫不摧毀雖有排楯莫之能抗孝寬乃縫布為幔隨其所向則張設之布既懸於空中其車竟不能壞城外又縛松麻於竿灌油加火規以燒布并欲焚樓孝寬復長作鐵鉤利其鋒刃火竿亦來以鉤遙割之松麻俱落城外又於城西面穿地作二十一道分為四路於其中各施梁柱作訖以油灌柱放火燒之柱折城並崩壞孝寬又隨壞處堅木柵以扞之敵不得入城外盡其攻擊之術孝寬咸拒破之竟以全隋, SBCK: 宋}
