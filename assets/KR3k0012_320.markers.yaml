  - {type: variant, offset: 671, length: 7, content: 眾疲弊果自解去, SBCK: 見逼臣死之後願爲􅀑與賊爲厲以荅國恩及城䧟尹子竒見巡問之曰聞公每督戰皆裂齒碎實有之否巡應之曰然子竒曰何以至此日欲得殺逆賊遂至於此子竒以大刀剔其口見其存者不過三數巡因大詬罵子竒責以悖逆損害平人子竒欲存之左右曰此人必不爲我用又得衆死心不可留故害之}
