  - {type: variant, offset: 1025, length: 338, content: 京房屍至義熙中猶完具僵屍人肉堪為藥軍士分割之列女傳曰齊人𣏌梁襲莒戰而死其妻無所歸乃就夫屍於城下而哭之七日而城崩妻遂投於淄水而死博物志曰靈帝光和元年元遼西太守黃翻言海邊有流靈冠絳衣屍體完令感夢曰我伯夷弟孤竹君也海水壞吾棺求見掩藏吳會稽分地曰重山者大夫種所葬也在西鄉郭外後潮水穴山漂去其屍俗云伍子胥乘漸水取以去今山脇有缺處臨邑國記曰有靈鷲能知人吉凶覘人將死食屍肉盡乃去晏子春秋曰景公操玉加於晏子屍上涕下沾𥘞盡哀而去又曰景公伏晏子屍而號曰今天降禍不加寡人而加夫子社稷危矣論衡曰孟賁之屍人不刃者氣絕也死炭百斛人不沃者光滅也又曰淮陽都尉尹齊為吏酷雪及死怨家欲取其屍屍亡歸復魂周禮天官夏采曰掌大喪以冕服復于太祖以乘車建綏復于四郊復招魂也建綏者去其旒又春官司服曰大喪共復衣服衣服今座上魂衣也, SBCK: 􅈖}
