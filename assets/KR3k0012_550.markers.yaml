  - {type: variant, offset: 1365, length: 960, content: 檀弓曰復盡愛之道也有禱祠之心焉復謂招魂且分禱五祀庶幾其精氣之反望反諸幽求諸鬼神之道也鬼神處幽闇望其從鬼神所來北面求諸幽之義也鄉其所從來也禮復者升屋北面又檀弓曰邾婁復之以矢也蓋自戰於升陘始也時師雖勝死傷亦甚無衣可以招魂又曰曾子問曰為君使而卒於舍禮曰公館復私館不復凡所使之國有司所授舍則公館已何謂私館子曰善乎問也自卿大夫家曰私館公與公所為曰公館公館復此之謂也又禮運曰及其死也升屋而號告曰皋某復招之於天又禮運曰復諸侯以褒衣冕服爵弁服復招魂復魄也冕服者上公五侯伯四子男三褒衣亦始命為諸侯及朝覲見加賜之衣也褒猶進也夫人稅衣榆狄狄稅素沙言其招魂用稅衣上至褕狄也狄稅素伙言皆以白紗縠為褒復西上北面而西上賜長左也復者多少各如其命之數又雜記上曰大夫士死於道則升其乘車之左轂以其綏復如於館死則其復如於其家又喪大記曰復有林麓則虞人設階無林麓則狄人設階復招魂復魄也階所乘以升屋者虞人主林麓之官也狄人樂吏之賤者階弟也簨虞之類小臣復復者朝服君以卷夫人以屈狄大夫以玄頳世婦以䄠衣士以爵弁士妻以稅衣皆升自東滎中屋履危北面三號捲衣投于前司服受之降自西北榮其為賓則公館復私館不復其在野則升其乘車之左轂而復私館卿大夫之家也不於之復為主人之惡也復衣不以衣尸不以斂不以衣尸謂不襲也復者庶其生也若以其衣襲歛是用生施死於義相友喪禮云以衣衣尸俗而去之婦人復不以袡袡嫁時上服而非事鬼神之衣凡復男子稱名婦人稱字婦人不以名行唯哭先復復而後行死事氣絕則哭哭而復復而不蘇可以為死事諸侯行而死於館則其復如於其國如於道則升其乘車之左轂以其綏復館主所致舍綏旌旗又喪服小記曰復與書銘自天子達於士其辭一也男子稱名婦人書姓與伯仲如不知姓則書氏此謂殷禮也殷質不重名復則臣得名君周之禮天子崩則同復曰皋天子復諸侯薨復曰皋某甫復其餘及書銘禮記外傳曰人之精氣曰魂魂陽也云云而動形體謂之魄鬼陰也漠然不動合陰陽二氣而生也精氣聚而為一物形勞則神逝謂死而魂遊散死則難復生也孝子之心不能忍也故升屋而招其魂神也神智無涯也鬼者復於土也人皆食土之物養成形體也氣絕而收其魂使反復於體也齊書曰張融建武四年病卒遺令白旐無旒不設祭令人捉塵尾登屋復魂曰吾生平所善自當陵雲一笑三千買棺無製新衾左手執孝經老子右手執小品法華經妾二人事哀畢各遣還家含周禮天官冢宰曰太宰之職大喪贊贈玉含玉助王為之也贈玉既窆所以送先王含玉死者實也天子以玉, SBCK: ''}
