  - {type: variant, offset: 240, length: 253, content: 玉退彌子瑕是吾為臣不能正君生而不能正君死不可以成禮我死汝其陳屍牖下靈公弔焉怪而問之其子以父言告公公曰寡人過也命殯於客位進蘧伯玉退彌子瑕孔子曰史魚死而屍諫可謂直乎史記曰崔杼殺莊公晏嬰立崔杼門外曰君為社稷死死之為社稷亡亡若為己死非其私暱誰敢任之門開而入枕公屍而哭三踴而出人謂崔杼殺之杼曰民之望也舍之得民又曰吳兵入郢伍子胥求昭王既不得乃掘楚平王墓出屍鞭之三百又曰吳王取子胥屍盛以鴟夷應劭曰取馬皮以為鴟夷榼形也浮之江吳人憐之為立祠於江上因命曰胥山魏志曰宣王討王陵乃窮治其事發陵及令狐思冢剖棺暴屍於所近市三日王隱晉書, WYG: ''}
