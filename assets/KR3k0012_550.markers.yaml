  - {type: variant, offset: 2319, length: 1, content: 實, WYG: 舒卑者速也春秋傳曰天子七月而葬同軌畢至諸侯五月同盟至大夫三月同位至士踰月而外姻至者也又䘮大記曰君殯用輴攢至于上畢塗屋大夫殯以幬攢置于西序塗不暨于棺士殯見祍塗上帷之攢猶叢也屋殯上覆如屋也幬覆也暨及}
  - {type: punctuation, offset: 2321, content: 。, id: KR3k0012_CHANT_550-bkkpn695}
  - {type: 'tls:seg', offset: 2321, content: '', id: KR3k0012_CHANT_550-25a.11}
  - {type: variant, offset: 2323, length: 0, content: '', WYG: 之殯居棺}
  - {type: variant, offset: 2324, length: 1, content: 玉, WYG: 龍輴攢木題凑象槨上四柱如屋以覆之諸侯輴不畫龍攢題湊象椁其他亦如大夫之殯廢輴置棺墉下就攢三而塗之不及棺者攢中狹小裁取容棺然則天子諸侯差寛大夫及士不攢掘地下棺耳帷之者鬼神幽闇士達乎天子皆然幬亦或作棺又坊記曰子云賔禮每進以襄䘮禮每加以逺浴于中霤飯于墉下小斂于户内大斂于阼階殯于客位祖于庭葬于墓所以示逺也遠之所以崇敬左傳僖公下曰晉文公卒庚辰將殯于曲沃殯窆棺也曲沃有舊宫焉出降柩有聲如牛如牛呴聲卜偃使大夫拜曰君命大事將有西師過軼我擊之必大捷焉聲自柩出故曰君命大事戎事也偃聞奏宻謀故因柩聲以正衆心論語鄉黨曰朋友死無所歸曰于我殯重朋友恩也無所殯無親後也續漢書曰和帝追封諡皇太后父梁竦為褒親愍侯殯賜東園棺三匣衣衾范曄後漢書曰蔡順䘮母停柩未殯東隣失火燒順屋柩不可移乃伏柩上火乃越燒他舍餘見孝部宋書曰竟陵王誕據廣陵為逆事蔡興宗奉㫖慰勞廣陵别駕范長興宗素善在城内同誅興宗至躬自收殯致䘮還豫章舊墓上聞謂曰卿何故敢爾觸網興宗抗言答曰陛下自殺賊臣自葬周親既犯嚴制正甘于鉞斧耳唐書曰嚴郢以舊怨與盧杞陷楊炎趙惠伯搆成其罪貶炎于崖州惠伯于費州郢既報怨過當人頗不直郢後得罪至費州道左有柩殯問其主名或曰趙惠伯之殯也郢黙然慙恧歲餘而卒穆天子傳曰天子乃殯盛姬于榖丘之廟先王之廟有此者漢氏亦所在有廟也白虎通曰天子舟車殯為水火也故棺在車上車舟臣子更執紼晝夜千二百人紼所以牽持棺者也釋名曰于西壁下塗之曰殯殯賔也賔遇之言稍逺子思子曰殯賔也􅈖禮記}
