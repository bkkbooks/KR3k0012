  - {type: variant, offset: 2764, length: 3, content: 飯九貝, SBCK: 之􅈖緩且子氏未薨故名惠公葬在春秋前故曰緩也子氏仲子也葬薨在二年􅈖助䘮之物贈死不及尸尸未葬之通稱弔生不及哀}
  - {type: variant, offset: 2764, length: 3, content: 飯九貝, krp: 之賵緩且子氏未薨故名惠公葬在春秋前故曰緩也子氏仲子也葬薨在二年賵助䘮之物贈死不及尸尸未葬之通稱弔生不及哀}
