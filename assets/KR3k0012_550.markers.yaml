  - {type: variant, offset: 2993, length: 256, content: 釋名曰唅以米貝含其口中也莊子曰青青之麥生於陵阪生不布施死何唅珠為呂氏春秋曰含珠鱗施今葬皆用之注云含珠口實鱗施施玉匣於死者之體如魚鱗絞紟衾冒儀禮士喪禮曰死於適室撫用歛衾撫覆也斂衾大歛所用之衾也衾被也奉屍于室撫用夷衾夷衾覆屍柩之衾也又曰冒緇質長與手齊頳殺掩足冒韜尸者也制如直囊上曰質下曰殺殺韜足而上質韜首而下齊手上衣尤下赤象地也又曰厥明陳衣于房南頭西上績紟撗三縮一廣終幅拆其末綪屈也紟所以束衣服為堅急也以布為之縮從撗者三幅從者一幅折其未令可結之也禮記雜記曰唯絞紟衾冒死而後製又喪大記曰君錦冒黼殺綴旁七大夫玄冒黼殺綴旁, SBCK: 太平御覽卷第}
