  - {type: variant, offset: 2946, length: 2, content: 忍虛, krp: 入廟門以其主於生人也兵車革車也雖爲死者來陳之於外戰伐田獵之服非盛者也周禮革路建大白以即戎也􅉠者旣致命坐委之擯者舉之主人無親受也公羊傳隱公曰貨財曰􅉠榖梁傳隱公曰錢財曰􅉠􅉠助歸生者􅉠漢書曰原渉父哀帝時爲南陽太守天下殷富大郡二千石官賦斂􅉠葬皆千萬巳上妻子適共受之以定産業時又少行三年䘮者及渉父死讓還南陽􅉠送行䘮冡墓三年由是顯名京師又曰何竝字子廉徙潁川太守疾病召丞椽作先令書曰告子恢吾生素飡日乆死雖得官􅉠勿受葬爲小椁但下棺恢如其言後漢書曰魯恭字仲康父期爲武陵太守卒官恭年十二晝夜號踊聲郡中􅉠無所受乃歸服䘮禮過成人後漢書曰羊續爲南陽太守徴爲太常未及行㑹病卒遺言薄歛不受賵遺舊典二千石卒官􅉠賵百萬府丞焦儉遵續先意一無所受詔書襃美勑太山太守以府􅉠錢賜續家丗說曰王戎父渾官至梁州刺史渾所歷州郡義}
