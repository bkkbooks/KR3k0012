  - {type: variant, offset: 2769, length: 1, content: 七, SBCK: 曰上旣葬則衰麻除無􅂘位諒闇終䘮豫凶事非禮也仲子在而求贈故曰豫凶事榖梁傳隱公曰乗馬曰􅈖公羊傳隱公曰車馬曰􅈖春秋􅀃題辭曰知生則􅉠知死則􅈖􅉠之爲言助也􅈖之爲言覆也輿馬曰􅈖貨財曰􅉠玩好曰贈決其意也衣􅀍曰禭養死具也贈稱也禭遺也􅉠周禮天官曰小宰凡􅀖之弔事掌其戒令與其弊器財用凡所共者弔事弔諸侯臣弊所用贈也器所致明器也凡䘮始無弔而含隧葬而􅈖贈其間加恩厚則有􅉠焉禮記曲禮下曰弔䘮不能􅉠不問其所費又檀弓上曰孔子之衛遇舊館人之䘮入而哭之哀出使子貢稅􅆖而􅉠之子貢曰於門人之䘮未有所稅􅆖稅􅆖於舊館無乃巳重乎言稅􅆖太重比於門人恩爲偏頗也夫子曰予嚮而􅂘之遇於一哀而出涕遇見也舊館人恩雖輕我入􅂘見主人爲我盡一哀是厚恩待我也我爲之出涕恩重冝施惠之也予惡夫涕之無從也小子行之客行無他物可以昜之者使遂以徃也又檀弓曰子栁之母死旣葬子碩欲以􅉠布之餘具􅀕器古者謂錢爲泉布所以通布貨財子栁曰不可吾聞之也君子不家於䘮惡恩死者以爲利請班諸兄弟之貧者又少儀曰􅈖馬入廟門以其主於死􅉠馬與其弊}
