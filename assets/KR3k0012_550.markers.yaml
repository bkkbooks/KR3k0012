  - {type: xml-element, offset: 6, content: '', id: KR3k0012_CHANT_550-bkkxmlele1}
  - {type: 'tls:seg', offset: 6, content: '', id: KR3k0012_CHANT_550-1a.1}
  - {type: 'tls:seg', offset: 6, content: '', id: KR3k0012_CHANT_550-1a.2}
  - {type: variant, offset: 6, length: 1, content: 屍, SBCK: 卒遺令素棺斂以時服事從約省晉書曰安平王孚臨終遺令曰有魏貞士河内温司馬孚字叔逹不伊不周不夷不惠立身行道終始􅀂一當以素棺單椁歛以時服南史曰王奐爲雍州刺史􅀍誅舊人無敢至者汝南許明逹爲奐叅軍躬爲殯殮經理甚厚當時髙其節梁書曰王志天􅁥􅀄爲丹陽尹爲政清静都下有寡婦無子姑亡舉債以斂葬旣而無以還之志􅉖其義以俸償焉陳書曰周弘直卒遺䟽氣絶之後便買市中見材小形者斂以時服古人通制但見先人必湏備禮可着單衣裙衫故履旣應侍養冝備紛恱或逢善友又須香烟棺内唯安白布手巾麄香鑪而巳此外無所用釋名曰衣尸棺曰歛藏不復也風俗通曰禮天子斂以梓器宫者存時所居縁生事亡因以爲名凡人呼棺亦爲宫也宋韜遺教曰吾死斂以時服不得造新白祫單衣柩}
