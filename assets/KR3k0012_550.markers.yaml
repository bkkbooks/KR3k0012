  - {type: variant, offset: 2791, length: 0, content: '', SBCK: 秦人來歸僖公成風之禭進禮也秦慕諸夏欲通敬於魯國有翟泉之盟故贈僖公并及成風本非魯方獄同無相赴弔之制故不譏其緩而以接好爲禮諸侯相弔賀也雖不當事茍有禮焉書之可也以無忘舊好送死不及尸故曰不當事書者書於典䇿垂示子孫使無忘過厚之好又襄公曰魯公朝于楚康王卒楚人使公親禭禭諸侯有遣使􅈖禭禮今楚欲依遣使之比矣公患之穆}
  - {type: variant, offset: 2791, length: 0, content: '', WYG: 魯公朝于楚康王卒楚人使公親襚襚諸侯有遣使􅈖襚禮今楚欲依遣使之禮矣公患之穆}
  - {type: variant, offset: 2791, length: 42, content: 叔孫豹會晉士丐于柯盟于督陽荀偃癉疽生瘍於頭癉疽惡瘡二月卒而視不可唅目開口噤宣子與撫之, krp: 乗馬}
  - {type: variant, offset: 2792, length: 18, content: 孫豹會晉士丐于柯盟于督陽荀偃癉疽生瘍, SBCK: 曰祅殯而禭則布幣也先使巫祅除殯之凶邪而行禭禮與朝而布弊無異乃使巫以桃茢先殯祅茢􅁰穰楚人弗禁旣而悔之又襄公曰鄭伯有死}
