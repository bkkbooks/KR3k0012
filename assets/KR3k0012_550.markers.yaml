  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第五百五十}
  body:
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 九殮柩殯賵􅉠禭殮周禮春官大宗伯曰大宗伯王崩及執事涖大歛小歛帥異族而佐執事太祝之属也又周禮春官司服曰大䘮共其歛衣服禮記檀弓上曰康子之母死陳䙝衣非上服也陳之將歛也敬姜曰婦人不飾不敢見舅姑將有四方之賔來䙝衣何爲陳於斯命撤之又䘮大記曰小歛於户内大歛於阼階君以簟席大夫以蒲席士以葦席小歛君錦衾大夫縞衾士緇衾皆一衣十有九稱大斂布紟二者大夫士一也簟細葦席也三者下皆有莞衣十有九稱法天地之終數也二衾者或覆之或薦之也又曽子問曰下殤士周葬于園遂輿機而徃途邇故也土周聖周也周人以夏后之聖周葬下殤於園中以其未成人逺不就墓也機舉尸之牀也䋲絙其中央又以绳從旁鈎之禮以機舉屍輿之以就園而歛葬焉途近故月輿機或爲餘機今墓逺則其葬也如之何今人歛下殤於宫中而葬之於墓與成人同墓途乃逺其葬當輿其棺乎載之也問禮之變孔子曰吾聞諸老聃曰昔使佚有子而死下殤也墓逺盖欲葬之墓如長殤從成人也長殤有送葬車者則棺載之矣史佚武王時史賢猶有所不知召公謂之曰何以不棺斂於宫中欲其斂於宫中如成人也斂於宫中則葬當載之也史佚曰吾敢哉畏知禮也召公言於周公爲史佚問周公曰豈不可言是豈於禮可不許也史佚行之佚失於以爲許也遂用召公之宫言也下殤用棺衣棺自史佚始也棺謂歛於棺也又問喪曰或問曰死三日而后斂者何也怪其遲也曰孝子親死悲哀志懣故匍匐而哭之􅀂將復生然安可得奪而斂之故曰三日而后斂者以俟其生也三日而不生亦不生矣孝子之心亦益衰矣家室之計衣服之具亦可以成矣親戚之逺者亦可以至矣是故聖人爲之斷决以三日爲之禮制也左傳僖下曰許穆公卒于師葬之以侯禮也男而以侯禮加一等凡諸侯薨於朝㑹加一等死王事加二等於是有以衮斂又襄公曰魯季文子卒大夫入斂公在位宰庀家器爲葬備無衣帛之妾無食粟之馬無藏金玉無重器備君子是以知季文子之忠於公室也相三君矣而無􅀻積可不謂忠乎又定上曰季平子行東野東野季氏邑還未至丙申卒于房陽虎將以璵璠斂璵璠美王君所佩忡梁懷弗與懷亦季氏家臣曰改歩改玉昭公之出季孫行君事佩璵璠􅀕宗廟今定公立復臣位改君歩則亦當去璵璠陽虎欲逐之告公山不狃不狃曰彼爲君也子何怨焉家語曰季平子卒將以君之璵璠斂孔子􅀄爲中都宰聞之歷級而救歷登階不聚足曰送死人而以寳玉猶曝屍於中原示民以姧利之端後漢書戴封年十五詣大學時同學石敬平温病卒封養視殯殮以所齎糧市小棺送䘮到家更殮見敬平生時書物皆在棺中乃異之呉志曰張昭卒遺令幅巾素棺歛以時服孫權素服臨弔又曰諸􅁑瑾年六十}
