  - {type: variant, offset: 2933, length: 6, content: 唅緣生象食孝, krp: 賵貨財曰􅉠玩好曰贈決其意也衣𬒳曰禭養死具也贈稱也禭遺也􅉠周禮天官曰小宰凡邦之弔事掌其戒令與其弊器財用凡所共者弔事弔諸侯臣弊所用贈也器所致明器也凡䘮始無弔而含隧葬而賵贈其間加恩厚則有􅉠焉禮記曲禮下曰弔䘮不能􅉠不問其所費又檀弓上曰孔子之衛遇舊館人之䘮入而哭之哀出使子貢稅驂而􅉠之子貢曰於門人之䘮未有所稅驂稅驂於舊館無乃巳重乎言稅驂太重比於門人恩爲偏頗也夫子曰予嚮而哭之遇於一哀而出涕遇見也舊館人恩雖輕我入哭見主人爲我盡一哀是厚恩待我也我爲之出涕恩重冝施惠之也予惡夫涕之無從也小子行之客行無他物可以昜之者使遂以徃也又檀弓曰子栁之母死旣葬子碩欲以􅉠布之餘具祭器古者謂錢爲泉布所以通布貨財子栁曰不可吾聞之也君}
