  - {type: variant, offset: 2352, length: 2, content: 唅禭, WYG: 間加恩厚則有賻焉禮記曲禮下曰弔䘮不能賻不問其所費又檀弓上曰孔子之衞遇舊館人之䘮入而哭之哀出使子貢脱驂以賻之子貢曰于門人之䘮未有所脱驂脱驂于舊館無乃已重乎言脱驂未重此于門人恩為偏頗也夫子曰予嚮者入而哭之遇于一哀而岀涕遇見也舊館人恩雖輕我哭見主人為我盡一哀是厚恩待我也我為之出涕恩重宜施惠之也予惡夫涕之無從也小子行之客行無他物可以易之者使遂其性也又檀弓曰子柳之母死既葬子碩欲以賻布之餘具祭器古者謂錢為泉布所以通布貨財子柳曰不可吾聞之也君子不家于䘮因死者以為利請班諸兄弟之貧者又少儀曰賵馬入廟門以其主于門􅉠馬與其}
