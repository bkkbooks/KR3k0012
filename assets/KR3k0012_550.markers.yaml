  - {type: variant, offset: 2312, length: 2, content: 送先, WYG: 刺繡于縿幕加椁以覆棺已乃屋其上盡塗之矣天子之禮也又檀弓下曰帷殯非古也自敬姜之哭穆伯始也穆伯大夫季悼子之子公甫靖叔敬姜穆伯妻文伯歇之母也禮朝多哭不帷又}
