  - {type: variant, offset: 2161, length: 0, content: '', WYG: 亦益衰矣家室之計衣服之具亦可以成矣親戚之逺者亦可以至矣是故聖人為之斷决以三日為之禮制也左傳僖下曰許穆公卒於師葬之以侯禮也男而以侯禮加一等凡諸侯薨於朝㑹加一等死王事加二等於是以衮斂又襄公曰魯季文子卒大夫入斂公在位宰庀家器為葬備無衣帛之妾無食粟之馬無藏金玊無重器幣君子是以知季文子之忠於公室也相三君死而無私積可}
  - {type: page-break, offset: 2161, content: '', id: KR3k0012_WYG_550-3b, image: WYG0898/WYG0898-0111b.png}
  - {type: variant, offset: 2162, length: 2, content: 能忍, WYG: 謂忠乎又定上曰季平子行東野東野季氏邑還未至丙申卒於房陽虎將以璵璠斂璵璠美玉君所佩仲梁懐弗與懐亦季氏家臣曰改步改玊昭公之出季孫行君事佩璵璠祭宗廟今定公立復臣位改君步則亦當去璵璠陽虎欲逐之告公山不狃不狃曰彼為君}
  - {type: punctuation, offset: 2165, content: ，, id: KR3k0012_CHANT_550-bkkpn645}
  - {type: 'tls:seg', offset: 2165, content: '', id: KR3k0012_CHANT_550-23a.17}
  - {type: variant, offset: 2165, length: 0, content: '', WYG: 予何怨焉家語曰季平子卒將以君之璵璠斂孔子初為中都宰聞之厯級而救厯登階不聚足曰送死人而以寶玉猶曝屍於中原示民以奸利之弊後漢書戴封年十五詣太學時同學石敬平温病卒封養視殯殮以所齎糧市小棺送喪到家更斂見敬平生時書物皆在棺中乃異之吳志曰張昭卒遺令幅巾素棺斂以時服孫權素服臨弔又曰諸葛瑾年六十八卒遺令素棺斂以時服事從約省晉書曰安平王孚臨終遺令曰有魏貞士河内温縣司馬孚字叔達不伊不周不夷不惠立身行道終始若一當以素棺單椁斂以時服南史曰王奐為雍州刺史被誅舊人無敢至者汝南許明達先為奐㕘軍躬為殯殮經理甚厚時人髙其節南史曰王志天監初為丹陽尹為政清靜都下有寡婦無子姑亡舉債以斂葬既而無以還之志愍其義以俸償焉陳書曰周𢎞直卒遺疏氣絶之後使買市中素棺小形者斂以時服古人通制但見先人必須備禮可著單衣裙衫}
