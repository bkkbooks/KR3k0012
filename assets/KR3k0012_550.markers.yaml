  - {type: variant, offset: 8, length: 231, content: 記曲禮下曰在床曰屍左傳哀下曰陳侯使公孫貞子聘吳未至而卒將以屍入吳人使太宰嚭營勞且辭上介芊尹蓋對曰寡君聞楚為不道荐伐吳國滅厥民人寡君使蓋備使弔君之下吏無祿使人逢天之慼大命殞墜今君命逆使人曰無以屍造千門是我寡君之命委于草莽也且臣聞之事死如生禮也於是乎有朝聘而終以屍將事之禮又有朝聘而遭喪之禮若不以屍將命是遭喪而還也無乃不可乎以禮防民猶或踰之今大夫曰死而棄之是棄禮也茍我寡君之命達于君所雖殞于深淵則天命也吳人內之禮統曰屍之言矢也陳也家語曰史魚將卒命其子曰吾在朝不能進蘧, WYG: 春官小宗}
