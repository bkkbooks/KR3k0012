  - {type: variant, offset: 2382, length: 0, content: '', WYG: 擯者舉之主無親受也公羊傳隱公曰貨財曰賻榖梁傳隱公曰錢財曰賻􅉠謂助也歸生者焉漢書曰原涉父哀帝時為南陽太守天下殷富大郡二千石官賦斂􅉠葬皆千萬妻子適共受之以定産業時又少行三年喪者及涉父死讓還南陽􅉠送行䘮家墓三年由是顯名京師又曰何竝字子亷潁川太守疾病召丞掾作先令書曰告子恢吾生素餐日久死雖得官賻勿受葬為小槨但下棺恢如其言後漢書曰魯恭字仲康父期為武陵太守卒恭年十二晝夜號踊聲郡中贈􅉠無所受乃歸服䘮}
