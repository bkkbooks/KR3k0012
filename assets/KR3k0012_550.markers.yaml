  - {type: variant, offset: 1857, length: 0, content: '', WYG: 衾者或覆之或薦之者也又曽子問曰下殤土周葬于園遂輿機而往途邇故也土周堲周也周人以夏后之堲周葬下殤于園中以其未成人遠}
  - {type: variant, offset: 1858, length: 0, content: '', WYG: 就墓也機舉屍之牀也繩絙其中央又以繩從旁鉤之禮以機舉屍輿之以就園而斂葬為途近故耳輿機或以為餘機者也今墓遠則其葬也如之何今人斂下殯于宫中而葬之于墓與成人同墓途乃遠其葬當用棺乎則載之乎故問禮之變者也孔子曰吾聞諸老􅔶曰昔史佚有子而死下殤也墓遠葢欲葬之墓如長殤有送葬卒殤從成人也則棺載之矣史佚武王時史賢猶有所不知召公謂之曰何以不棺斂}
  - {type: page-break, offset: 1858, content: '', id: KR3k0012_WYG_550-2b, image: WYG0898/WYG0898-0110d.png}
  - {type: variant, offset: 1859, length: 0, content: '', WYG: 宫中欲其斂於宫中如成人也斂於宫中則葬當載}
  - {type: variant, offset: 1860, length: 0, content: '', WYG: 也史佚曰吾敢哉畏知禮也召公言於周公為史佚問周公曰豈不可言是豈於禮不可許也史佚行之佚於時以為許也遂用召公宫中之言也下殤用棺衣棺自史佚始也棺謂斂於棺也問喪曰或問曰死三日而後斂者何也怪其遲也曰孝子親死悲哀志懣故匍匐而哭之若將}
