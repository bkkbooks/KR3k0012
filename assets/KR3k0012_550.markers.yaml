  - {type: variant, offset: 2174, length: 11, content: 神智無涯也鬼者復於土也, WYG: 父客死蜀范乃出負䘮歸至葭萌船觸石破没范持棺柩遂俱沉溺衆傷其義鈎求得之僅免于死晉書曰東海王越薨葬東海石勒追及于莒縣寗平城將軍錢端出兵拒勒戰死軍潰勒命焚越柩曰此}
