  - {type: variant, offset: 2978, length: 0, content: '', krp: 贈僖公并及成風本非魯方獄同無相赴弔之制故不譏其緩而以接好爲禮諸侯相弔賀也雖不當事茍有禮焉書之可也以無忘舊好送}
  - {type: variant, offset: 2979, length: 1, content: 亦, krp: 不及尸故曰不當事書者書於典䇿垂示子孫使無忘過厚之好又襄公曰魯公朝于楚康王卒楚人使公親禭禭諸侯}
  - {type: variant, offset: 2981, length: 2, content: 所含, krp: 遣使賵禭禮今楚欲依遣使之比矣公患之穆叔曰祅殯而禭則布幣也先使巫祅除殯之凶邪而行禭禮與朝而布弊無異乃使巫以桃茢先殯祅茢黍穰楚人弗禁旣而悔之又襄公曰鄭伯有死於羊肆羊肆市列子産禭之枕之股而哭之斂而殯諸伯有之臣在市側者旣而葬諸斗城斗城鄭地名春秋說題辭曰衣𬒳曰禭禭之言遺也榖梁傳隱公曰衣衾曰禭}
