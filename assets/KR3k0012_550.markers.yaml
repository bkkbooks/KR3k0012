  - {type: variant, offset: 2211, length: 10, content: 張融建武四年病卒遺令, WYG: 傳琰字季珪北地靈州人也美姿儀為尚書左郎遭䘮居南岸隣家失火燒屋抱柩不動殯禮記曲禮上曰里有殯不巷歌助哀也又檀弓上曰孔子少孤不知其墓孔子之父鄹邑叔梁紇與顔氏之女徴在野合生孔子為徵在耻而不告也殯于五父之衢欲有所就而問之孔子亦為隱焉殯于家則知者無由怪也欲發問端五父之衢衢名也葢曼父之隣者也人之見之者皆以為葬也見相行于路也其慎也蓋殯也慎當為引禮家讀然聲之誤也殯引飾棺以輴葬引飾棺以翣柳孔子是以殯引不以葬引時人見者謂不知禮又檀弓上曰天子之殯也攢塗龍輴以椁攢木以周龍輴猶如椁而塗之天子殯以輴車畫轅以龍加斧于椁上畢塗屋斧謂之黼}
