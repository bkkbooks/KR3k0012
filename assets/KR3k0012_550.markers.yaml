  - {type: variant, offset: 524, length: 60, content: 時洛中震悚唯閻纘敢獨詣東市號哭弔屍而撫之曰早語君遜位而不肯去今果不免禍車頻奏書曰初慕容暐在鄴居石虎宮夢虎齧其臂募人求虎殯, SBCK: 廟有此者漢氏亦}
  - {type: variant, offset: 524, length: 757, content: 時洛中震悚唯閻纘敢獨詣東市號哭弔屍而撫之曰早語君遜位而不肯去今果不免禍車頻奏書曰初慕容暐在鄴居石虎宮夢虎齧其臂募人求虎殯所在女子李葂告暐在東明觀下掘得之屍僵不毀暐祼而罵之曰死胡敢夢生天子鞭撻毀辱投之漳河河流迅疾終不移轉暐後為臣虎所執乃悟而悔焉符堅以李葂無狀無少長悉坑之李固別傳梁冀誅固而露屍於四衢命有敢臨者加其罪固弟子汝南郭況年始成童遊學洛陽乃左提章鉞右秉鈇鑕詣闕上書乞收固屍不許往臨哭陳辭於前遂守喪不去白虎通曰屍者何謂也屍之為言陳也失氣亡神形體獨陳釋名曰死曰屍屍舒也骨節解舒不能復自勝歛搜神記曰初鉤弋夫人有罪以譴死殯屍不臭而香及昭帝即位改葬之棺空無屍獨絲履存焉異苑曰河內荀儒字君林乘冰省舅氏陷河死兄倫求屍積日不得設祭水側又箋與河伯投箋一宿岸側冰開屍手執箋浮出倫又箋謝又曰尋陽周處字孟威寧康中鎮于巳西為符堅所摧守節不屈堅使使者請通虓躬治逵陌謂使者云煩君語賊符堅何至耳煩國士如此又潛圖襲堅聞之曰小人正欲覔死殺之適足成名耳乃若考楚不食而卒歛已經旬堅怒猶未歇剖棺臨視虓屍欻廻眸鬢髭張烈精瞳明亮廻盼矚堅覩而嘉稱乃厚加贈賻又曰元嘉中豫章胡家奴開昌邑王冢青州人開齊襄公冢並得金鉤而屍骸露在巖中儼然茲亦未必有憑而然也京房屍至義熙中猶完具僵屍人肉堪為藥軍士分割之列女傳曰齊人𣏌梁襲莒戰而死其妻無所歸乃就夫屍於城下而哭之七日而城崩妻遂投於淄水而死博物志曰靈帝光和元年元遼西太守黃翻言海邊有流靈冠絳衣屍體完令感夢曰我伯夷弟孤竹君也海水壞吾棺求見掩藏吳會稽分地曰重山者大夫種所葬也在西鄉郭外後潮水穴山漂去其屍俗云伍子胥乘漸水取以去今山脇有缺處臨邑國記曰有靈鷲能知人吉凶覘人將死食屍肉盡乃去晏子春秋曰景公操玉加於晏子屍上涕下沾𥘞盡哀而去又曰景公伏晏子屍而號曰今天降禍不加寡人而加夫子社稷危矣論衡曰孟賁之屍人不刃者氣絕也死炭百斛人不沃者光滅, WYG: 屬}
