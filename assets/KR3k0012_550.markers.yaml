  - {type: variant, offset: 2166, length: 2, content: 升屋, WYG: 履既應侍養宜備紛晩或逢善友又須香煙棺内唯安白布手巾麄香罏}
  - {type: variant, offset: 2169, length: 1, content: 招, WYG: 已外無所用釋名曰衣屍棺曰斂藏不復也風俗通曰禮天子斂以梓器宫者存時所居縁生事亡因以為名凡人之棺亦為宫也宋韜遺教曰吾死斂以時服不得造新白祫單衣柩禮記曲禮下曰在棺曰柩柩之言究也又檀弓下曰君遇柩于路必使人弔之又曰襄公朝于荆康王卒在魯襄公二十八年康王楚子昭也荆人必請襲欲使襄公衣之魯人曰非禮也荆人强之巫先拂柩荆人悔之巫祝荆茢君臨臣䘮之禮記綂曰柩之言也具書其謐置棺旁萬世久藏也釋名曰柩究也送隨身之制皆究備也漢書曰薛宣守左馮翊多仁恕池陽令舉亷吏獄掾王立于府未及有聞立受囚家錢宣責讓縣縣按驗獄掾乃其妻受繫者錢萬六千受之而掾實不知掾慙恐自殺宣聞之移書池陽曰縣所舉亷吏獄掾王立家私受財而立不知殺身以自明立誠亷士甚可閔惜其以府决曹掾書立之柩以顯}
