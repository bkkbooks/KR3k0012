  - {type: variant, offset: 2383, length: 0, content: '', WYG: 過成人後漢書曰羊續為南陽太守徴為太常未及行㑹病卒遺言薄斂不受賵遺舊典二千石卒官賻賵百萬府丞焦斂遵續先意一無所受詔書褒美勑太山太守以府賻錢賜續家世説曰王戎父渾官至梁州刺史渾所厯州郡義故懐其德惠相率致􅉠數百萬戎悉不受南史曰張稷所生劉先假葬瑯琊黄山建武中改申葬禮􅉠助委積于時雖不拒絶事畢隨以還之}
