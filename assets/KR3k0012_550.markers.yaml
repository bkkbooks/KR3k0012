  - {type: variant, offset: 2974, length: 10, content: 生常食故死亦有所含說, SBCK: 榖梁傳隱公曰衣衾曰禭􅀃}
  - {type: variant, offset: 2974, length: 10, content: 生常食故死亦有所含說, WYG: 榖梁傳隱公曰衣衾曰襚説}
  - {type: variant, offset: 2974, length: 3, content: 生常食, krp: 賈人知物善惡也親者兄弟不以禭進不執將命左傳文公曰秦人來歸僖公成風之禭進禮也秦慕諸夏欲通敬於魯國有翟泉之盟}
