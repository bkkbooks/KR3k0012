  - {type: variant, offset: 2339, length: 380, content: 唅則諸侯唅以璧小宰喪荒受其唅禭幣玉之事春秋傳曰口實曰唅衣服曰禭凶荒有幣玉者賓客所賙委之禮又天官玉府曰大喪共含玉又春官典瑞曰大喪共飯玉含玉贈玉飯玉碎玉以雜米也禮記檀弓下曰邾婁考公之喪考公益之曾孫也考公或為定公也徐君使容居來弔含弔且唅非之也曰寡君使容居坐含進侯玉其使容居以唅欲親唅非禮也唅不使賤者君行則親唅耳言侯玉者徐僣稱王自比天子有司曰諸侯之來辱弊邑者易則易于則于易于雜者未之有也易謂臣禮于謂君禮也容居以臣欲行君禮于徐自比天子使大夫敵諸侯有司固拒之是也容居對曰容居聞之事君不敢忘其君亦不敢遺其祖昔我先君駒王西討濟於河無所不用斯言也容居魯人也不敢忘其祖言我祖與今君於諸侯初如是不聞義則服也駒王徐先君謂僣號者容居其孫也濟渡也言西討渡於河廣大其國也魯魯鈍也言魯鈍者欲自明不妄又檀弓下曰飯用米貝弗忍虛也不以食道用美焉爾尊之也食道米貝美也又雜記上曰唅者執璧將命曰寡君使某唅, SBCK: 􅈖}
  - {type: variant, offset: 2339, length: 1, content: 唅, WYG: 賵相者入告反命曰孤某須矣陳乗黄大路于中庭北圭將命客使自下由路西子拜稽顙坐委于殯東南隅宰舉以東下謂為在路之下覲禮曰路禮四方之客介者入設乗黄于大路之西客入}
