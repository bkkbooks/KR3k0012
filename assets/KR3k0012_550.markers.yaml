  - {type: variant, offset: 2345, length: 1, content: 璧, WYG: 上既葬則縗麻除無哭位諒闇終䘮豫凶事非禮也仲子在而賵故曰豫凶事榖梁傳隱公曰乗馬曰賵春秋説辭題曰知生則􅉠知死則􅈖賻之為言助也賵之為言覆也輿馬曰賵貨財曰賻玩好曰贈决其意也衣被曰襚養死具也贈稱也襚遺也賻周禮天官曰}
