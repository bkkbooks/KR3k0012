  - {type: variant, offset: 2784, length: 4, content: 飯唅用玉, SBCK: 適共受之以定産業時又少行三年䘮者及渉父死讓還南陽􅉠送行䘮􅃁墓三年由是顯名京師又曰何竝字子廉徙潁川太守疾病召丞椽作先令書曰告子恢吾生素飡日乆死雖得官􅉠勿受葬爲小椁但下棺恢如其言後漢書曰魯恭字仲康父期爲武陵太守卒官恭年十二晝夜號踊聲郡中􅉠無所受乃歸服䘮禮過成人後漢書曰羊續爲南陽太守徴爲太常未及行㑹病卒遺言薄歛不受􅈖遺舊典二千石卒官􅉠􅈖百萬府丞焦儉遵續先意一無所受詔書襃美勑太山太守以府􅉠錢賜續家丗􅀃曰王戎父渾官至梁州刺史渾所歷州郡義故懷其德惠相率致􅉠數百萬戎悉不受齊書曰張稷所生劉先假葬瑯瑘黄山建武中改申葬禮􅉠助委積於時雖不拒絶事畢隨以還之脱君􅀕服以禭臣親賢也又􅄂記曰諸侯相禭以後路與冕服先路與褒衣不以禭不以巳之正者施於人以彼不以爲正也後路貳車貳車行在後也又少儀曰臣致禭於君則曰致衣廢於賈人敵者曰禭言廢衣不必其以斂也賈人知物善惡也親者兄弟不以禭進不執將命}
