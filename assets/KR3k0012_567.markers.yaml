  - {type: variant, offset: 2316, length: 310, content: 平王蒼議以為漢制舊典宗廟各奏其樂皆不相襲以明功德光武帝受命中興撥亂反正脩建三雍肅祇禋祀德化巍巍比隆前代歌所以詠德舞所以象功世祖廟樂舞名宜曰大武之舞謹採百官頌可登者歌一章四句以為曲上從其議魏志曰明帝時有奏武皇帝撥亂反正為魏太祖樂用武始之舞文皇帝應天受命為魏高祖樂用咸熙之舞明帝制作興治為魏列祖樂用章斌之舞沈約宋書曰周存六代之樂至秦唯餘韶舞而已始周舞曰五行漢高改韶舞曰文始以示不相襲也高祖又作昭容樂昭容生於武德禮容生於文始五行也漢又有雲翹育命之舞雖莫知其所從來然舊以祀天地也至明帝初東平憲王蒼揔定公卿之議曰宗廟宜各奏樂不應相襲所以明功德也採文始五行武德真脩為文武之舞又制舞歌一章薦之世祖之廟皇初二年改漢巴渝舞曰昭武舞改宗廟安, WYG: 夷}
