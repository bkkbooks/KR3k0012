  - {type: variant, offset: 4186, length: 0, content: '', SBCK: 二十八解晉以來有黄鵠隴頭出閞入閞出塞入塞折楊抑落梅花黄潭子赤枝楊望行人十曲崔豹古今注曰漢樂有黄門皷吹天子所以宴樂群臣短簫饒歌皷吹之常亦以賜有功諸侯也唐㑹要曰大和中太常禮院奏謹按凱樂皷吹之歌曲也周官大司樂王師大献捷奏凱樂注云献功之樂也又司馬之職師有功則凱樂献于社注云兵樂曰凱司馬法曰得意則凱樂所以示喜也左氏傳載晉文公勝楚振旅凱以入魏晉巳來皷吹曲章多述當時戰功是則歴代献捷必有凱歌太宗平東都破宋金剛其後􅂫定方執賀魯李勣平髙麗皆俻軍容凱歌入京都謹撿貞觀顯慶開元禮書並無儀注今叅酌古今俻其陳設及奏歌曲之儀如後凡命將征討有大功献俘馘者其名曰俻神䇿兵衛於東門外如献俘常儀其凱樂用鐃吹二部笛畢簘笳鐃皷每色二人歌工二十四人樂工等乗馬執樂器次第陳列如鹵薄之式皷吹令丞前導分行於兵馬俘馘之前將入都門皷吹振作迭奏破陣樂應聖期賀朝歡君臣同慶樂等四曲破陣樂詞曰折受律辝元首相將討叛臣咸歌破敵樂共賞太平人應聖期詞曰聖德期昌運雍熈方寓清乾坤資化育海岳共休明開􅁟欣耕稼銷戈遂偃兵殊方歌}
  - {type: page-break, offset: 4186, content: '', id: KR3k0012_SBCK_567-2a}
