  - {type: variant, offset: 5542, length: 1, content: 同, WYG: 適伊川見被髪於野祭者曰不及百年此其戎乎其禮先亡矣後秦晉遷陸渾之戎于伊川以其中國之人習戎狄之事一言以貫百代可知今之乞寒濫觴胡俗伏願三思等其所至先天二年十月中書令張説諌曰韓宣適魯見周禮而歎孔子㑹齊數倡優之罪列國如此况天朝乎今外國請和選使朝謁所望接以禮樂示以兵威雖曰戎狄不可輕易焉知無駒支之辯由余之賢哉且乞寒潑胡未聞典故祼體跳足盛徳何觀揮水投泥失容斯盛法殊魯禮襲此齊優恐非羽干柔逺之義罇爼折衝之道願擇芻言特罷此戯至開元元年十二月勅臘月乞寒外蕃所出漸浸成俗因循已乆自今以後無問蕃}
