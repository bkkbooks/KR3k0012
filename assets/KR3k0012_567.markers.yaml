  - {type: variant, offset: 520, length: 1471, content: 諸侯去殷三淫而翼文王三淫割心斷脛刳孕散宜生曰殷可伐也文王弗許周公旦乃作詩曰文王在上於昭于天周雖舊邦其命惟新以繩文王之德武王即位以六師伐殷六師未至以兌以兵克之於牧野乃篇俘馘于京大室乃令周公作大武成王立殷民反王命周公伐之商服象獸名為虐于東夷周公遂以師逐于江南乃為三象以嘉其德故樂之所由來者尚矣生於度量本於太一太一出兩儀兩儀出陰陽陰陽變化一上一下合而成章渾渾純純離而復合合而復離是謂天常天地車輪終則復始極則復反莫不盛當日月星辰或疾或徐宿日不同以盡其行四時代興或寒或暑或短或長或柔或剛萬物所出造本於太一化於陰陽萌牙始厥厥動凝寒以刑形體有處莫不有聲聲出於和和出適先定樂由此生天下太平萬民安寧皆化其上樂乃可成夫音亦有適大鉅則志蕩以蕩聽鉅則耳不容不容則橫塞橫塞則振大振動小則志嫌聽小則耳不充不充則不詹詹詹音也不詹則窕大清則志危以危聽清則耳谿極谿靈極病谿極則不監不監則竭監察大濁則志下以下聽濁則耳不收不收則不搏不搏則怒不搏入不專一人故大距大小大清大濁皆非適也桀紂作為侈樂大鼓鍾磬管簫之音以鉅為美以眾為觀俶詭殊瑰耳所未嘗聞目所未嘗見務以相過不用度量宋之襄也作為十秩鍾律之名齊之襄也作為大呂楚之襄也作為巫音侈則移矣自有道者觀之則失樂之情其樂不樂其民怨其生傷其生與樂也若水之於炭反以自升此生乎不知樂之情而以侈為務故也又曰帝顓頊好音乃令飛龍作八風之音命之曰承雲帝嚳命咸池黑作唐歌九招六列禹䟽三江五湖命皋繇為夏籥九成湯率六州以誅桀之罪命伊尹為大護歌晨露武王以六師伐殷乃命周公作為大武商人服象為虐於東夷周公以師逐之至於江南乃為三象以嘉其德樂書曰謹案禮記䟽云伏羲樂曰立基言伏犧之代五運成立甲曆始基畫八卦以定陰陽造琴瑟以諧律呂繼德之樂故曰立基也神農樂曰下謀言神農播種百穀濟育群生造五弦之琴演六十四卦承基立化設降神謀故樂曰下謀以明功也黃帝樂曰雲門言黃帝之道成名百物明民共財德如雲出其門民可有於族類故樂曰雲門帝系譜曰女媧命娥陵氏制都良管以一天下之音又命聖氏為班管合日月星辰名曰充樂樂既成天下幽微旡不得理樂緯曰黃帝之樂曰咸池池者施也道施於民故曰咸池顓頊曰六莖道有根莖故曰六莖帝嚳曰五英道有英華故曰五英堯曰大章堯時仁義大行法度彰明故曰大章舜曰簫韶韶紹也舜紹堯之後修行其道故曰蕭韶禹曰大夏禺承二帝之後道重太平故曰大夏殷曰大護湯承襄而起護先王之道故曰大獲獲音護周曰勺又曰大武周承襄而起斟酌文武之道故曰勺春秋元命包曰王者不空作樂樂者和盈於內動發於外應其發時制禮作樂以成之是故作樂者必反天下之始樂於己為本舜之時民樂其紹堯業故韶者紹也舜服繼堯之業禹之時民大樂其駢三聖相繼故夏者大也駢讀曰頻頻猶旡也湯之時民大樂其救於患害故護者救也文王之時民樂其興師征伐故武者伐也四者天下所同樂一也其所同樂之端不可一也各樂其君所為故不可合四家以為一也樂苑曰文王樂名巨業武王樂名象武漢書曰樂家有能制雅樂聲律世世在大樂官但能記其鏗鎗鍾鼓而已不能言其義高祖時叔孫通因秦雅人制高廟樂太祝迎神於廟門奏嘉至李奇曰嘉善也善神之至猶古降神之樂也皇帝太廟奏永至以為行步之節猶古采薺肆夏也乾豆上奏登歌不以管絃亂人聲欲在位者遍聞之猶古清廟之歌也登歌再終下奏休成之樂服虔曰叔孫通所奏作也美神明既饗也皇帝獻酒東廂坐定奏永安之樂美禮已成也又有房中祠樂高祖唐山夫人所作也韋昭曰唐山姓也曰周有房中樂至奏名曰壽人孝惠二年使樂府令夏侯寬備其簫管更名曰安世樂高祖奏武德文始五行之儛孝文廟奏昭德文始四時五行之儛武德者高祖四年作以象天下樂已行武以除亂也文始儛者曰本韶儛也高祖六年更名曰文始以示不相襲也五行儛者本周儛也秦始皇二十六年更名曰五行也四時儛者孝文, SBCK: 伯}
