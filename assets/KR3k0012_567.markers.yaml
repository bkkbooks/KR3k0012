  - {type: variant, offset: 4976, length: 254, content: 令跪請奏雅樂皇帝乃入謂之晨賀畫漏上三刻皇帝又出百官上壽酒太樂令跪奏請進樂鼓吹合作鼓吹令又奏請進伎別置女樂三十人於黃帳外奏房中之歌江左始廢此禮宋改正德為前舞大豫為後舞至齊亡唐會要曰太宗七年正月七日製破陣樂舞左圓右方先偏後五魚麗鵝貫箕張翼舒交錯屈伸首尾廻牙以像戰陣之形起居郎呂才依圖教樂工一百二十人被甲執戟而習之凡舞三變每變為四陳有來往疾徐擊剌之象以應歌節數日而就其後令魏徵虞世南禇亮李百藥改制歌詞更名七德之舞十五日奏之於庭觀者覩其抑揚蹈厲莫不扼腕踴躍悚然震悚武臣列將咸上壽云此舞皆陛下百戰百勝之形容於是咸稱萬歲, SBCK: ''}
