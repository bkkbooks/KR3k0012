  - {type: variant, offset: 4516, length: 552, content: 代之樂唯闕六莖與五英至秦餘韶武房中而已始皇改武曰五行房中曰壽人衣服用五行之色又曰漢高帝改韶樂曰文始高帝好壽人之聲惠帝使太樂令夏侯寬合之絃管改名曰安世魏復文始曰大韶五行曰大武改安世曰正世晉改大韶曰宣文正世曰房中晉亂後亡文舞秉羽籥皆宣文之遺法又曰漢樂曰武德昭容巴渝四時昭德盛德大武雲翹育命武德昭容巴渝並高祖所造也武德舞人執干戚以象天下行武除亂也四時文帝所作以象天下太平昭德景帝作之以享太宗廟盛德宣帝作之以享世祖廟諸帝之廟常奏文始四時五行之舞武帝加武德而去四時酎祭高祖歌海泰龜龍又有青陽朱明西皓玄冥等歌以迎四氣春夏舞雲翹秋冬舞育命季夏則歌朱明而兼舞二舞光武平隴蜀尊郊祀高祖配享南祀兼用五郊歌舞他時常亦如之魏武改武德曰武頌昭容曰昭業巴渝曰昭武雲翹曰鳳翔育命曰靈應晉改昭武曰宣武遭晉亂唯巴渝存隋隸清樂部又曰宋樂曰凱容宣烈並文帝所造至梁亡梁樂曰大壯大觀並武帝所造至陳亡隋樂以夏為名舞曰大武文帝所造自東晉至隋易服變名為異其實不全殊也又曰晉樂曰正德大豫並武帝所造武帝因漢魏舊禮定會儀正且夜漏未盡七刻設庭燎漏盡皇帝出鍾磬作公卿奉贄幣訖太樂令跪請奏雅樂皇帝乃入謂之晨賀畫漏上三刻皇帝又出百官上壽酒太樂令跪奏請進樂鼓吹合作鼓吹令又奏請進伎別置女樂三十人於黃帳外奏房中之歌江左始廢此禮宋改正德為前舞大豫為後舞至齊亡唐會要曰太宗七, WYG: ''}
