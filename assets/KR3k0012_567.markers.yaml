  - {type: variant, offset: 4190, length: 0, content: '', SBCK: 南史綦母珎之貴倖珎之母隨弟欽之作曁楊令欽之罷縣還珎之迎母至湖孰輙將靑􅌁百人自隨皷角横吹都下當人追從者百數又曰桓崇祖􅀄於淮隂見髙帝便自比韓白唯上獨許之後爲豫州刺史建元二年魏攻壽春崇祖破之啓至上謂朝臣曰崇祖􅁪自擬韓白今眞人也進爲都督崇祖聞陳顯逹李安人皆増給軍儀乃啓求皷吹上勑曰韓白何可不與衆異給皷吹一部又曰張興丗致位給事中興丗父甞謂興丗曰我雖田舎老公樂聞皷角汝可送一部竹田時欲吹之興丗素恭謹畏法譬之曰此是天子皷角非田舎公所吹梁典曰髙祖衍生秣陵三樓橋宅生曰有異光頂有五岳骨當還宅范雲聞皷吹之聲雲蒙􅀍出視乃髙祖也雲乃深自結託梁書侯景即位乃以廣栁車載皷吹橐駞馬􅀒犧牲輦上置筌蹄垂脚坐焉又曰胡僧祐字顯果爲天水天門二郡太守性好葺綴文}
  - {type: page-break, offset: 4190, content: '', id: KR3k0012_SBCK_567-4a}
  - {type: variant, offset: 4190, length: 0, content: '', krp: 南史綦母珎之貴倖珎之母隨弟欽之作曁楊令欽之罷縣還珎之迎母至湖孰輙將靑􅌁百人自隨皷角横吹都下當人追從者百數又曰桓崇祖𥘉於淮隂見髙帝便自比韓白唯上獨許之後爲豫州刺史建元二年魏攻壽春崇祖破之啓至上謂朝臣曰崇祖恒自擬韓白今眞人也進爲都督崇祖聞陳顯逹李安人皆増給軍儀乃啓求皷吹上勑曰韓白何可不與衆異給皷吹一部又曰張興丗致位給事中興丗父甞謂興丗曰我雖田舎老公樂聞皷角汝可送一部竹田時欲吹之興丗素恭謹畏法譬之曰此是天子皷角非田舎公所吹梁典曰髙祖衍生秣陵三樓橋宅生曰有異光頂有五岳骨當還宅范雲聞皷吹之聲雲蒙𬒳出視乃髙祖也雲乃深自結託梁書侯景即位乃以廣栁車載皷吹橐駞馬負犧牲輦上置筌蹄垂脚坐焉又曰胡僧祐字顯果爲天水天門二郡太守性好葺綴文}
  - {type: variant, offset: 4191, length: 0, content: '', SBCK: 又多鄙拙多􅀍戯謔自矜尤甚後隨伐侯景廻拜領將軍常以所加皷部置齋中對之人或獻言此乃羽儀公望隆重不當如此荅曰我愛之人莫不􅀏之陳書劉仲舉字德言爲長安令政號廉平陳文帝居郷里甞詣仲舉時天降雨仲舉獨坐齋内聞外有簘皷聲俄而帝至仲舉異之乃深自結託北史尓朱榮少時父新興曽與榮遊池上忽聞簫皷音謂榮曰古老相傳聞此聲皆至公輔吾年老當爲汝耳隋書皷吹車上施層樓四角金龍衘流􅂫羽葆凡皷吹陸則樓車水則樓舡在殿庭則􅀞筍簴爲樓上有翔鷺棲烏或爲鵠形又曰蔡徴拜吏部尚書啓後主借皷吹後主謂所司曰皷吹軍樂有功乃授蔡徴不自量揆紊我朝章然其父景歴旣有締構之功冝且如啓唐書平陽公主葬特給皷吹太常議婦人無皷吹髙祖曰徃者公主於司竹園舉兵應義親執金皷有克定之功冝特加之又曰中宗時皇后上言自妃主及五品以上母妻請從婚葬之日特進皷吹宫官亦准此左臺御史唐紹上䟽諌曰竊聞皷吹之作夲爲軍容昔黄帝涿鹿有功以爲警衛故鉦皷有靈䕫孔雀雕鶚争石墜崖壯士怒之􅀋自昔功臣俻禮適得用之假如郊祀天地唯有宫懸而無案架故知軍樂之用尚不給於神祀豈容接於閨閫哉鄧德明南康記曰雩都縣君山絶峯髙崿逺望以舟舡上有玉臺方廣數丈周廻盡是白石柱上自然石覆如屋形風雨之後景氣明浄頗聞山上有皷吹之聲吴質別傳曰質爲北中郎將朝京師喜遟其到詔列鹵簿作皷吹至闕而止江表傳曰孫䇿賜周瑜皷吹爲治館舎䇿令曰周公瑾英俊異才與􅀌有惣角之好骨肉之分前在丹陽發衆及舡粮以濟大事論德酬功此未足報也鄴中記曰石虎正㑹置}
