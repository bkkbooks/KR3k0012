  - {type: variant, offset: 4195, length: 3, content: 沈約為, krp: 曰孤所以能常以少兵敵衆者常念増戰士忽餘事是以徃者有皷吹而使歩行爲戰士愛馬也不樂多署吏爲戰士愛糧也王渾表曰吴國臨戰牙門將張秦黄辰騎督綦母倪勇揵效武破賊制勝此}
