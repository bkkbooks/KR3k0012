  - {type: variant, offset: 5398, length: 0, content: '', WYG: 龜兹樂自吕光破龜兹得其聲吕氏云其樂分散至後魏有中原後獲之至隋有西國龜兹之號凡三部開元中大盛於時曹婆羅門者累代相承傳其業至孫妙逹尤為北齊文宣愛之每彈常自擊和之及周武帝聘突厥女為后西域諸國皆来媵遂薦有龜兹踈勒康國安國之樂又曰髙麗樂百濟樂}
