  - {type: variant, offset: 5401, length: 0, content: '', SBCK: 滅二國盡得其樂至天后時髙麗樂猶二十五曲貞元末唯能習一曲衣服亦漸變其􅁟風矣其百濟至中宗時工人死散開元中歧王爲}
  - {type: variant, offset: 5401, length: 22, content: 太宗幸慶善宮宮在武功縣即南祖舊宅宴從臣於渭濱, WYG: 滅二國盡得}
  - {type: variant, offset: 5401, length: 0, content: '', krp: 滅二國盡得其樂至天后時髙麗樂猶二十五曲貞元末唯能習一曲衣服亦漸變其土風矣其百濟至中宗時工人死散開元中歧王爲}
  - {type: variant, offset: 5402, length: 0, content: '', SBCK: 常卿復奏置焉又曰踈勒樂工人皂􅁝布頭巾白􅁝布􅂁錦衿褾白􅁝布袴舞二人白襖錦䄂赤皮鞾赤皮帶樂用竪箜篌琵琶五絃琵琶横笛簫觱篥荅臘鼔􅆎鼓雞樓鼓康國樂工人皂終布頭巾緋布􅂁錦領舞二人緋襖錦䄂緑綾淩渾襠褲赤皮鞾白袴帑舞急轉如風俗之胡旋乞寒者夲西國外蕃之樂也神龍二年三月并州清源縣尉吕無泰上䟽曰臣謹按洪範八政曰謀時寒􅀂能謀事則時寒順之何必倮露形體澆灌衢路鼓舞跳躍而索寒也禮曰立秋之月行夏令寒暑不節隂陽不調政令之失也休咎之應君臣之感也理均影響可不戒哉至景雲二年左拾遺朝曰}
  - {type: page-break, offset: 5402, content: '', id: KR3k0012_SBCK_567-9b}
  - {type: variant, offset: 5402, length: 0, content: '', krp: 常卿復奏置焉又曰踈勒樂工人皂絲布頭巾白絲布𫀆錦衿褾白絲布袴舞二人白襖錦䄂赤皮鞾赤皮帶樂用竪箜篌琵琶五絃琵琶横笛簫觱篥荅臘鼔腰鼓雞樓鼓康國樂工人皂終布頭巾緋布𫀆錦領舞二人緋襖錦䄂緑綾淩渾襠褲赤皮鞾白袴帑舞急轉如風俗之胡旋乞寒者夲西國外蕃之樂也神龍二年三月并州清源縣尉吕無泰上䟽曰臣謹按洪範八政曰謀時寒若能謀事則時寒順之何必倮露形體澆灌衢路鼓舞跳躍而索寒也禮曰立秋之月行夏令寒暑不節隂陽不調政令之失也休咎之應君臣之感也理均影響可不戒哉至景雲二年左拾遺朝曰}
  - {type: variant, offset: 5403, length: 9, content: 幸慶善宮宮在武功縣, SBCK: 諌傳曰辛有適伊川見􅀍髪於野􅀕者曰不及百年此其戎乎其禮先亡矣後秦晉遷陸渾之戎於伊川以其中國之人習戎狄之事一言以貫百代可知今之乞寒濫觴胡俗伏願三思籌其所至先天二年十月中書令張􅀃諌曰韓宣適魯見周禮而歎孔子㑹齊數倡優之罪列國如此况天朝乎今外國請和選使朝謁所望接以禮樂示以兵威雖曰戎狄不可輕易焉知無駒支之辯由余之賢哉且乞寒潑胡未聞典故倮躰跳足盛德何觀揮水􅄬􅅺失容斯甚法殊魯禮襲比齊優恐非干羽柔逺之義罇爼折衝之道願擇芻言特罷此􅃧至開元元年十二月勑臘月乞塞外蕃所出漸浸成俗因循巳乆自今巳後無問蕃漢}
  - {type: page-break, offset: 5403, content: '', id: KR3k0012_SBCK_567-10a}
