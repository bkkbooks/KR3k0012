  - {type: variant, offset: 2405, length: 1777, content: 上從其議魏志曰明帝時有奏武皇帝撥亂反正為魏太祖樂用武始之舞文皇帝應天受命為魏高祖樂用咸熙之舞明帝制作興治為魏列祖樂用章斌之舞沈約宋書曰周存六代之樂至秦唯餘韶舞而已始周舞曰五行漢高改韶舞曰文始以示不相襲也高祖又作昭容樂昭容生於武德禮容生於文始五行也漢又有雲翹育命之舞雖莫知其所從來然舊以祀天地也至明帝初東平憲王蒼揔定公卿之議曰宗廟宜各奏樂不應相襲所以明功德也採文始五行武德真脩為文武之舞又制舞歌一章薦之世祖之廟皇初二年改漢巴渝舞曰昭武舞改宗廟安之樂曰正世樂加至樂曰迎靈樂武德樂曰武頌樂昭容樂曰昭業樂雲翹舞曰鳳翔舞育命舞曰靈應舞武德舞曰武頌舞文始舞曰大韶舞五行舞曰大武舞其眾歌詩多即前代之辭唯魏國初建使王粲改作登歌安世及巴渝詩而已又曰晉武帝太始二年改郊廟新歌其樂舞亦仍舊又改魏昭武羽籥舞曰宣文舞咸寧元年詔定祖宗之號而廟樂同用正德大豫之舞至江左初立宗廟尚書下太常祭祀宜周樂名太常賀修荅云舊京荒廢今既散亡音韻曲折又無識者則於今者難以音言于時以無雅樂器及伶人省太樂并鼓吹令是後頗得登歌食舉之樂猶有未備故太寧未又訪防孚等增益之咸和中乃復置太樂官鳩習遺逸又未有金石也初荀勗既以新律造一舞次更脩正鍾磬勗薨事猶不竟元康三年詔其子黃門郎蕃脩定金石以施郊廟尋值喪亂莫有記者又曰魏公卿奏曰烈祖未制樂舞非所以昭德著功夫歌以詠德舞以象事於文武為斌兼秉文武聖德所以彰明也臣等謹制樂名曰章斌文武之舞又曰武帝永初元年有司奏皇朝肇建廟祀應設雅樂乃晉樂也太常鄭鮮之等各撰立新歌黃門侍郎王韶之撰歌七首並令施用十二月又奏依舊正朝設樂改大樂諸歌詩王韶之撰二十二章又改正德舞曰前舞文悅舞曰後舞文帝元嘉九年大樂令鍾宗之更調金石至十四年治書令史奚縱又改之二十二年南郊始設登歌詔顏延之造歌詩廟舞猶闕孝武建元元年有司奏前殿中曹郎荀萬秋議郊廟宜設備樂於是使內外博議竟陵王誕等並同萬秋議建平王宏議以凱容為韶舞宣烈為武舞祖宗廟樂揔以德為君章皇太后奏永樂永至等樂仍舊皇帝祠南郊及廟迎神送神並奏肆夏皇帝入廟門奏永至皇帝南郊初登壇及廟中諸東壁奏登歌其初獻奏凱容宣烈之舞終獻奏永安之樂郊廟同孝武又使謝莊造郊廟明堂諸樂歌辭二年有司又奏先郊廟舞樂皇帝親奉初登壇及入廟詣東壁並奏登歌不及三公行事左僕射建平王宏重議公卿行事亦宜奏登歌有司又奏元會及二廟齋祠歌伎舊並於殿設作廟祠依新儀主登歌人上殿絃管住下令元會登歌亦上殿絃管住下隋書音樂志上武帝思弘古樂天監元年下詔求學術通明者皆陳所見時對樂者七十八家咸言樂之宜改不言改樂之法帝素善音律遂自制四器名之為通以定雅樂莫不和韻初齊永明中舞人冠幘並簪武帝曰筆笏蓋以記事受言舞不受言何事簪筆豈有身服朝衣而足綦讌履於是去筆乃定郊禋宗廟及三朝之樂以武舞為大壯舞取易云大者壯也正大而天地之情可見也以文舞為大觀舞取大觀在上觀天之神道而四時不忒也國樂以雅為稱取詩序云言天下之事形四方之風謂之雅雅者正也止乎十二則天數也乃去階步之樂增撤食之雅皇帝出入宋孝建二年奏永至齊及梁初亦同至是改為皇雅取詩皇矣上帝臨下有赫也二郊太廟同用皇太子出入奏胤雅取詩君子萬年永錫爾胤王公出入奏寅雅取尚書周官貳公弘化寅亮天地也上壽酒奏介雅取詩君子萬年介爾景福也食舉奏需雅取易雲上於天需君子以飲食宴樂也撤饌奏雍雅取禮記大饗客以雍撤也並三朝用之牲出入宋廢帝元徽二年儀注奏引牲齊及梁初亦同至是改為雅取禮記帝牛必在滌三月薦毛血宋元徽三年儀注奏嘉薦至是為牲雅左氏傳牲牷肥腯北郊明堂太廟並同用降神及迎送宋元徽三年儀注奏昭夏齊及梁初亦同至是改為誠雅取尚書至誠感神皇帝飲福酒宋元徽三年儀注奏嘉胙至齊不改梁初為永胙至是改為獻雅取禮記祭統尸飲五澆玉爵獻即今之福酒亦古之獻義也北郊明堂太廟同就燎位宋元徽三年儀注奏昭遠及齊不改就埋位齊永明六年儀注奏隸幽至是燎埋俱奏禋雅取周禮太宗伯以禋祀昊天上帝也眾官出入宋元徽三年儀注奏肅咸樂齊及梁初亦同至是改為俊雅取禮記司徒選士之秀者而外之于學曰俊士也二郊太廟明堂三朝同用焉其辭並沈約所製是時禮樂制度粲然有序鼓吹宋齊並用漢曲又充庭用十六曲武帝乃去其四留其十二合四時也更製新歌以述功德天監七年將有事太廟詔曰禮云齊曰不樂今親奉始出宮振作鼓吹外可詳議八座承郎參議請輿駕始出鼓吹從而不作還宮如常儀帝從之遂為定制初武帝之在雍鎮有童謠云襄陽白銅蹄反縛楊州兒識者言白銅謂金蹄謂馬也白金色及義師之興實以鐵騎楊州之士皆面縛果如謠言故即位之後, SBCK: ''}
