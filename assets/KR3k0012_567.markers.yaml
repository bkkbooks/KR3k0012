  - {type: variant, offset: 11, length: 1, content: 昔, SBCK: 何}
  - {type: variant, offset: 11, length: 2, content: 昔葛, WYG: 横吹有雙角即胡樂以從軍也張博望入西京傳其法於西京初得摩訶兠勒一曲李延年因胡曲更造新聲二十八解晉以来有黄鵠隴頭出塞入塞出闗入闗折楊桞落梅花黄潭子赤枝楊望行人十曲崔豹古今注曰漢樂有黄門鼔吹}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_WYG_567-2a, image: WYG0898/WYG0898-0223a.png}
  - {type: variant, offset: 11, length: 1, content: 昔, krp: 何}
  - {type: variant, offset: 12, length: 1, content: 葛, SBCK: 承}
  - {type: variant, offset: 12, length: 1, content: 葛, krp: 承}
  - {type: variant, offset: 14, length: 11, content: 氏之樂三人操牛尾投足以, SBCK: 云皷吹盖短簫饒}
  - {type: variant, offset: 14, length: 1, content: 氏, WYG: 子所以宴樂羣臣短簫鐃鼓吹之常亦以賜有功諸侯也唐㑹要曰太和中太常禮院奏謹按凱樂鼓吹之歌曲也周官大司樂主師大獻則奏凱樂注云獻功}
  - {type: variant, offset: 14, length: 11, content: 氏之樂三人操牛尾投足以, krp: 云皷吹盖短簫饒}
  - {type: punctuation, offset: 17, content: ，, id: KR3k0012_CHANT_567-bkkpn5}
  - {type: 'tls:seg', offset: 17, content: '', id: KR3k0012_CHANT_567-1a.5}
  - {type: variant, offset: 17, length: 0, content: '', WYG: 也又司馬法曰得意則凱樂所以示喜也左氏傳載晉文公勝椘振旅凱以入魏晉已来鼓吹曲章多述當時戰功是則歴代獻㨗又有凱歌太宗平東都破宋金剛其後蘇定方執賀魯李勣平髙麗皆偹軍容凱歌入京都謹檢貞觀顯慶開元禮書並無儀注今㕘酌古今偹其陳設及奏歌曲之儀如後凡命將征討有大功獻俘馘首者其名曰偹神策兵衛於東門外如獻俘常儀其凱樂用鐃吹二部笛管簫笳鐃鼔每色二人歌工二十四人樂工等乘馬執樂器次第陳列如鹵簿之式鼓吹令丞前導分行於兵馬俘馘之前將入都門鼔吹振作迭奏破陣樂應聖期賀朝歡君臣同慶樂等四曲破陣樂詞曰受律辭元首相將討叛臣咸歌破敵樂共賞太平人應聖期詞曰聖徳期昌運雍熙方㝢清乾坤資化育海岳共休明開土欣耕稼銷戈遂􅅯兵殊方歌帝澤執贄賀昇平賀朝歡詞曰四美皇風被千年徳永清戎衣更不着今日告功成君臣同慶樂詞曰主聖開昌歴臣忠奉大猷君看隁草後便是太平秋候行至太社及太廟門二人下馬陳列於門外據周禮大司樂注云獻於祖大司馬云先凱樂於社謹詳禮儀明社廟之中似合奏樂㐲以尊嚴之地鐃吹讙譁既無明文或􅆾肅敬今請並於門外陳設不奏歌曲俟其獻禮畢復導引奏曲如儀至皇帝所御樓前兵㐲旌門外二十步樂工皆下馬徐行前進兵部尚書介胄執鉞於旌門内中路前導周禮師有功則大司馬左執律右秉鉞以先凱樂注曰律所以聼軍聲鉞所以示將威吹律聼聲其術乆廢請以秉鉞以存禮文次協律郎二人公服執麾亦於門外分導鼔吹令丞引樂工等至位立定太常卿於樂工之前跪具官臣某奏事諸奏凱樂恊律郎舉麾鼔吹大振作遍奏破陣樂等四曲樂闋協律郎偃麾太常卿又跪奏樂畢兵部尚書太常卿退樂工等並於門外立訖然後引俘馘入獻及稱賀如别儀晉書曰衛瓘領太子少傳加千兵百騎鼔吹之府又曰汝南王亮母伏太妃常有小疾祓於洛水亮兄弟}
