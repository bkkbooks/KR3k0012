  - {type: variant, offset: 281, length: 238, content: 堯立乃命𨟊為樂質乃效山谿谷之音以歌質當為夔乃以麇輅冥缶而鼓之乃拊石擊石以象上帝玉磬之音以舞百獸鼓搜乃拌五經之瑟拌分作以為十五絃之瑟命之曰大章以祭上帝舜立卯延乃拌瞽叟之所為琴益之八絃以為二十三絃之瑟帝舜乃令質脩九招六列六英以明帝德禹之勤勞天下日夜不解通大川決壅塞鑿龍門降通漻水以道河䟽三江五湖注之東海以利黔首於是命皋陶作為夏籥九成以招其功殷湯即位夏為無道暴害萬民侵削諸侯不用度軌天下患之湯於是率六州以誅桀之罪功名大成黔首安寧湯乃命伊尹作為大護歌晨露脩六招六列六英以見其善周文王處, SBCK: 使}
