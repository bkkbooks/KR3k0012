  - {type: variant, offset: 1157, length: 201, content: 周公以師逐之至於江南乃為三象以嘉其德樂書曰謹案禮記䟽云伏羲樂曰立基言伏犧之代五運成立甲曆始基畫八卦以定陰陽造琴瑟以諧律呂繼德之樂故曰立基也神農樂曰下謀言神農播種百穀濟育群生造五弦之琴演六十四卦承基立化設降神謀故樂曰下謀以明功也黃帝樂曰雲門言黃帝之道成名百物明民共財德如雲出其門民可有於族類故樂曰雲門帝系譜曰女媧命娥陵氏制都良管以一天下之音又命聖氏為班管合日月星辰名曰充樂樂既成天下幽微旡不得理樂緯曰黃帝, WYG: ''}
