  - {type: variant, offset: 10, length: 0, content: '', WYG: 獮田順天道至梁周随各述本朝功業随而改之以自揚其勲列又}
  - {type: punctuation, offset: 11, content: ：, id: KR3k0012_CHANT_567-bkkpn3}
