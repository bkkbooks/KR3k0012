  - {type: variant, offset: 4421, length: 0, content: '', SBCK: 貞元十八年正月驃國王來獻凡一十二曲以樂工三十五人來朝樂曲皆演釋氏經綸之詞驃囯在雲南西南以天笁囯相近故樂多演釋氏之詞每爲曲皆齊声㗩各以两手十指齊歛爲赴節之􅃺一低一仲未甞不相對}
  - {type: variant, offset: 4421, length: 94, content: 有司議以武帝議為非時碩學名儒朝端在位者咸希上旨唯祠部侍郎姚察乃轉引經籍獨違群議據梁樂為是當時驚駭莫不慚伏又曰周樂曰武曰勺武象武王能以武禁暴也勺象周公制禮斟文武之道也又有房中之歌后妃之德周備, WYG: 貞元十}
