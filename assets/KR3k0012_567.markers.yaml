  - {type: variant, offset: 1086, length: 1, content: 承, WYG: 汝子得為人吹角可矣又曰張敬兒將拜三司謂其妻嫂曰我拜後應開黄閣因口自為鼓吹聲初得鼓吹羞便奏之南史綦母珍之貴倖珍之母随弟欽之作暨陽令欽之罷縣還珍之迎母至湖孰輙將青􅌁百人自随鼓角横吹都下富人追從者百數又曰垣崇祖初於淮隂見髙帝便自比韓白唯上獨許之後為豫州刺史建元二年魏攻夀春崇祖破之啓至上謂朝臣曰崇祖恒自擬韓白今真其人也進為都督崇祖聞陳顯逹李安皆増給軍儀乃啓求鼔吹上勅曰韓白何可不與衆議給鼔吹一部又曰張興世致位給事中興世父嘗謂興世曰我雖田舎老翁樂鼔吹汝可送一部行田時欲吹之興世素恭謹畏法譬之曰此是天子鼓角非田舎翁所吹梁典曰髙祖衍生秣陵三樓橋宅生自有異光頂有五岳骨當還宅范}
  - {type: page-break, offset: 1086, content: '', id: KR3k0012_WYG_567-5b, image: WYG0898/WYG0898-0224d.png}
  - {type: page-break, offset: 1086, content: '', id: KR3k0012_WYG_567-6a, image: WYG0898/WYG0898-0225a.png}
