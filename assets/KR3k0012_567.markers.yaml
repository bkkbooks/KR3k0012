  - {type: variant, offset: 5413, length: 144, content: 南祖舊宅宴從臣於渭濱其宮即上降誕之所上乃賦詩十韻壽丘唯舊跡酆邑乃前基奧余承累聖懸弧亦在茲弱齡逢運改提劍鬱匡時指麾八荒定懷柔萬國夷梯山盛入款駕海亦來思單于陪武帳日逐衛文儀端宸朝四岳旡為任百司霜節明秋景輕水結水湄芸黃遍原隰禾頴積成坻兵樂還譙宴驩此大風詩賞賜閭里有同漢之宛沛焉於是起居郎呂才播於, SBCK: 冝禁斷}
