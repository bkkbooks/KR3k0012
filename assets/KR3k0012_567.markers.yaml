  - {type: variant, offset: 4415, length: 5, content: 陳武帝欲設, WYG: 南詔}
  - {type: variant, offset: 4416, length: 0, content: '', SBCK: 禪字紀山爲諌議大夫西南禪國王獻樂及幻人能吐火自支解易牛馬頭大㑹作之庭禪離席舉手曰帝王之庭不冝作夷狄之樂五經通義曰東夷之樂持矛舞助時之生南夷之樂持羽舞助時之養又舞四夷之樂明澤廣􅀍四表也東夷之樂曰侏離南夷之樂曰任西夷之樂曰禁北夷之樂曰昧東方所謂侏離者何陽始通萬物之属離地而生故謂之侏離南方所以謂任者何陽氣盛用事萬物懷任故謂之任西方所以謂之禁者何西方隂氣用事禁止萬物不得長大故謂之禁北方所以謂之昧者何北方隂氣盛用萬物暗昩不見故謂之昧四夷之樂何以作之於廟陳於户王子年拾遺記曰成王之時南垂之南有扶婁夷國或於掌中備百獸之樂婉轉屈曲於指間人形或長數分神怪歙忽樂府􅀓此末代猶在焉風􅁟記曰越俗飲讌即皷拌以爲樂取大素圜柈以廣尺五六者抱以着腹以右手五指更彈之以爲節舞者蹀地擊掌以應柈節而舞樂部樂志曰􅀛兹起自吕光滅􅀛兹因得其聲樂記有竪箜篌琵琶五絃笙笛簫觱篥毛圎皷都荅臘皷􅆎皷羯皷谿婁皷銅抜貝等十五種爲一郭工二十人歌曲有善善摩尼解曲娑伽兒舞曲小天踈勒􅁥天笁起自張重華據涼州重四譯来貢樂器鳯首箜篌琵琶五絃笛銅皷毛圎都曇銅抜貝等九種爲一部工十三人歌曲有沙石彊舞曲有文曲康國起自周閔帝娉北狄爲后得其所􅀗西戎狄伏因得其聲集器有笛正皷銅枝等四種爲一部工七人歌曲有三殿農和去舞曲有賀蘭體鼻始末䟽勒安國髙麗並起後魏平馮氏通西域因得其􅇊繁㑹其聲踈勒樂器有竪箜篌琵琶五絃笛簫觱篥荅臘鼓􅆎鼓羯鼓谿婁鼓十種爲一部工十二人歌曲有元利死讓樂舞曲有逺解曲有鹽曲安國樂器箜篌琵琶五絃笛簫雙觱篥正鼓和銅枝等簫小觱篥桃皮觱篥􅆎鼓齊鼓檐鼓貝等十四種爲一部工十八人歌曲有歌芝栖舞曲有舞芝栖北狄樂皆馬上樂也鼓吹夲軍旅之音馬上奏之故自漢以來北狄樂㧾歸鼓吹署後魏樂府始有北歌即魏史所謂真人歌是也代都時命掖庭宮女晨夕歌之周隋代興西涼樂雜奏今存者五十三章其名因可解者六章慕容可汗􅄍谷渾部落稽鉅鹿公主白浄王太子企俞也其餘不可解或可汗之詞按今大角即後魏代􅉫邏逈是也其曲亦多可汗之詞北虜之俗皆呼主爲可汗吐谷渾又慕容別種知此歌是燕魏之際鮮卑歌詞虜音不可曉梁有鉅鹿公主歌似是姚萇時歌詞華音與此歌不同梁樂府鼓吹又有大白浄皇太子小白浄皇太子企俞等曲隋鼓吹有白浄王太子曲與北歌校之其音皆異唐書樂志曰樂安樂後周}
