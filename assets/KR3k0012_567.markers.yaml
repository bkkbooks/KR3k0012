  - {type: 'tls:seg', offset: 1088, content: '', id: KR3k0012_CHANT_567-3a.6}
  - {type: variant, offset: 1088, length: 0, content: '', WYG: 聞鼓吹之聲雲䝉被出視乃髙祖也雲乃深自結託梁書侯景即位乃以廣桞車載鼓吹槖駞馬負犧牲輦上置筌蹄脚坐焉又曰胡僧祐字顯果為天水天門二郡太守性好葺級文詞又多鄙拙多被戱謔自矜尤甚後随伐侯景迴拜領軍將軍常以所加鼓部置齋中對之人或獻言此乃羽儀公望隆重不當如此答曰我愛之人莫不笑之陳書曰劉仲舉字徳言為長安令政號亷平陳文}
  - {type: page-break, offset: 1088, content: '', id: KR3k0012_WYG_567-6b, image: WYG0898/WYG0898-0225b.png}
  - {type: variant, offset: 1089, length: 3, content: 嚳命咸, WYG: 居鄉里嘗詣仲舉時天降雨仲舉獨坐齋内聞外有簫鼓聲俄而帝至仲舉異之乃深自結北史爾朱榮少時父新興曽與榮遊}
  - {type: variant, offset: 1093, length: 1, content: 黑, WYG: 上忽聞簫鼓音謂榮曰古老相傳聞此聲皆至公輔吾年老當為汝耳隋書曰鼔吹車上施層樓四角金龍衘流蘇羽葆凡鼓吹陸則樓車氷則樓船在殿廷則畫筍簴樓上有翔鷺棲鳥或為鵠形又曰蔡徴拜吏部尚書啓後主借鼔吹後主謂所司曰鼓吹軍樂有功乃授蔡徴不自揆量紊我朝章然其父景厯既有締搆之功自宜如啓唐書平陽公主塟特給鼓吹太常議婦人無鼓吹髙祖曰往者公主於司竹園舉兵應義親執金鼔有克定之功宜特加之又曰中宗時皇后上言自妃主及五品以上母妻請從婚塟之日特進鼓吹宫官亦准此左臺御史唐紹上䟽諌曰竊聞鼓之}
  - {type: page-break, offset: 1093, content: '', id: KR3k0012_WYG_567-7a, image: WYG0898/WYG0898-0225c.png}
