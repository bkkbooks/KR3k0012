  - {type: variant, offset: 414, length: 490, content: 降通漻水以道河䟽三江五湖注之東海以利黔首於是命皋陶作為夏籥九成以招其功殷湯即位夏為無道暴害萬民侵削諸侯不用度軌天下患之湯於是率六州以誅桀之罪功名大成黔首安寧湯乃命伊尹作為大護歌晨露脩六招六列六英以見其善周文王處歧諸侯去殷三淫而翼文王三淫割心斷脛刳孕散宜生曰殷可伐也文王弗許周公旦乃作詩曰文王在上於昭于天周雖舊邦其命惟新以繩文王之德武王即位以六師伐殷六師未至以兌以兵克之於牧野乃篇俘馘于京大室乃令周公作大武成王立殷民反王命周公伐之商服象獸名為虐于東夷周公遂以師逐于江南乃為三象以嘉其德故樂之所由來者尚矣生於度量本於太一太一出兩儀兩儀出陰陽陰陽變化一上一下合而成章渾渾純純離而復合合而復離是謂天常天地車輪終則復始極則復反莫不盛當日月星辰或疾或徐宿日不同以盡其行四時代興或寒或暑或短或長或柔或剛萬物所出造本於太一化於陰陽萌牙始厥厥動凝寒以刑形體有處莫不有聲聲出於和和出適先定樂由此生天下太平萬民安寧皆化其上樂乃可成夫音亦有適大鉅則志蕩以蕩聽鉅則耳不容不容則橫塞橫塞則振大振動小則志嫌聽小則耳不充不充則不詹詹詹音也不詹則窕大清則志危以危聽清則耳谿極谿靈極病谿極則不監不監則竭監察大濁則志下, WYG: 外奏劾保傅}
