  - {type: variant, offset: 4187, length: 0, content: '', SBCK: 澤執贄賀升平賀朝歡詞曰四每皇風􅀍千年德永清戎衣更不着今日告功成君臣同慶樂詞曰主聖開昌暦臣忠奉大猷君看偃革後便是太平秋俟行至太社及太廟門工人下馬陳列於門外據周礼大司樂注云献於祖大司馬云先凱樂于社謹詳礼儀則社廟之中似合奏樂伏以尊嚴之地鐃吹讙諽旣無明文或乖肅敬今請並於外門陳設不奏歌曲俟告獻禮畢復導引奏曲如儀至皇帝所御樓前兵仗旌門外二十歩樂工皆下馬徐行前進兵部尚書介曽執􅃏於旌門内中路前導周礼師有功則大司馬左執律右秉􅃏以先凱樂注曰律所以聽軍声􅃏所以示將威吹律聽声其術乆廢請以秉􅃏以存礼文次恊律郎二人公服執麾亦於門外分導皷吹令丞引樂工等至位立定太常卿於樂工之前跪具官臣某奏事諸奏凱樂恊律郎舉麾皷吹大振作遍奏破陣樂等四曲樂闋恊律郎偃麾太常卿又跪奏樂畢兵部尚書太常卿退樂工等並於門外立訖然後引俘馘入献及稱賀如別儀晉書曰衛瓘領太子少􅀓加千兵百􅀐皷吹之府又曰汝南王亮母伏太妃常有小疾祓於洛水亮兄弟三人侍從並持節皷吹震耀洛濵武帝登凌雲䑓望見曰伏妃可謂富貴矣又曰劉毅字仲雄轉司􅀠校尉皇太子朝皷吹將入東掖門毅以爲不敬止於門外奏劾保􅀓以下詔赦之然後得入又曰謝尚累位江夏義陽隨三郡太守徃諮事安西將軍庾翼於武昌翼呼共射曰君􅀂破的當以皷吹相賞尚應聲中之翼即以副皷吹給之王隱􅀳書曰陶侃平􅂫峻除侍中太尉加羽葆皷吹晉中興書曰漢武時南平百越始置交阯九眞日南合浦南海􅓹林蒼梧凡七郡立交趾刺史以州邊逺山越不賔冝加威重故刺史輙假節七郡皆加皷吹齊書武帝時壽昌􅀞殿南閣置白鷺皷吹二部乾光殿東西頭置鍾磬兩箱皆宴樂處也又曰王敬則臨淮射陽人也僑居晉陵南沙縣母爲女巫常謂人云敬則生時胞衣紫色後應得鳴皷角人􅀏之曰汝子得爲人吹角可矣又曰張敬兒將拜三司謂其妻㛐曰我拜後應開黄閤因口}
