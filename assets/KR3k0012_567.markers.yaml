  - {type: variant, offset: 6, length: 4, content: 呂氏春秋, SBCK: 皷吹樂樂志}
  - {type: variant, offset: 6, length: 3, content: 呂氏春, WYG: 鼔吹樂樂志曰何承天云鼔吹盖短簫鐃歌軍器也黄帝使岐伯所作以揚徳建武漢曲有朱鷺思悲翁艾如張上之囘擁離戰城南至山上陵將進酒君馬黄芳樹有所思雉子班聖人出上耶臨髙臺逺如期石榴務成𤣥雲黄鶴釣竿魏改十二曲為之平戰滎陽獲吕布克官渡舊拜定功平南荆平門中應帝期邕熈太和晉武改為靈芝祥宣受命征遼東景龍飛平王衡因時運惟庸蜀天序金靈運夏苗畋}
