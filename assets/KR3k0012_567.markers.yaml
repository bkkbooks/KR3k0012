  - {type: variant, offset: 26, length: 250, content: 八闋投猶蹲也一曰載民二曰玄鳥三曰遂草木四曰奮五穀五曰敬天常六曰達帝功七曰依地德八曰揔禽獸之極又曰黃帝命伶倫與營援鑄十二鍾和五音以詔英韶以仲春之月乙卯之日日在奎始奏之命之曰咸池帝顓頊生自若水實處空桑空桑邑名乃登為帝惟天之合正風乃行德與天合其音若熙熙淒淒鏘鏘帝顓頊好其音乃令飛龍作效八風之音命之曰承雲以祭上帝乃命鱒先為樂偈偈始鱓乃偃寢以其尾鼓其腹其音英英和盛之貌帝嚳命咸墨作為唐歌九招六列六英倕有作為擊鼓鍾磬吹笭展管箎鞀推衡帝嚳乃令人棄兩手相擊曰棄或擊鼙擊鍾磬吹笭展管箎因令鳳天翟舞之帝嚳大喜乃以康帝德康, SBCK: 軍}
