  - {type: variant, offset: 1144, length: 0, content: '', WYG: 瑾英俊異才與孤有總角之好骨肉之分前在丹陽發衆及船粮以濟大事論徳酬功此未足報也鄴中記曰石虎正㑹置三十步鼓吹三十步輙置一部十二人皆在平閣上去地丈餘又有女鼓吹摯虞新禮儀志曰漢魏故事將塟設吉凶鹵簿皆鼓吹新禮以吉事無駕凶事無樂宜除吉鹵簿凶服鼓吹虞按禮塟有客車郎吉駕之明文也徐廣車服注曰中朝公主有鼔吹幽明録曰晉臨川太守謝摛夜中聞鼔吹聲兄澡曰夜者隂間不及存將在身後及死贈長水校尉加鼔吹世説曰三都二京五經鼓吹俗説曰桓公}
  - {type: page-break, offset: 1144, content: '', id: KR3k0012_WYG_567-8b, image: WYG0898/WYG0898-0226b.png}
  - {type: variant, offset: 1145, length: 0, content: '', WYG: 詩思不来輙作鼔吹既而得詩云鳴鵠響長阜歎曰鼓吹固自来人思語林曰陸士衡}
  - {type: page-break, offset: 1145, content: '', id: KR3k0012_WYG_567-9a, image: WYG0898/WYG0898-0226c.png}
  - {type: punctuation, offset: 1146, content: 《, id: KR3k0012_CHANT_567-bkkpn333}
  - {type: variant, offset: 1146, length: 0, content: '', WYG: 河北都督日已被間搆内懷憂懣聞衆軍警角鼓吹曰我今聞此不如華亭鶴唳魏武帝令曰孤所以能常以少兵敵衆者常念増戰士忽餘事是以往者有鼓吹而使步行為戰士愛馬也不樂多署吏為戰士愛粮也王渾表曰吳國臨戰牙門將張秦黄辰騎督綦母倪勇㨗效武破賊制勝此三人之所致也秦辰巳亡今倪獨在昔伐蜀有小功戰牙門數人便加鼔吹至於滅一國而有未得鼔吹者臣愚昧謂聖詔賜倪鼓吹存録猛將以盡武人之力也陸機鼓吹賦曰原鼔吹之所始盖禀命於黄軒四夷樂毛詩谷風鼔鐘以雅以南以籥不僣為雅為南舞四夷之樂}
  - {type: page-break, offset: 1146, content: '', id: KR3k0012_WYG_567-9b, image: WYG0898/WYG0898-0226d.png}
