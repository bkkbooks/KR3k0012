  - {type: variant, offset: 3120, length: 545, content: 之造歌詩廟舞猶闕孝武建元元年有司奏前殿中曹郎荀萬秋議郊廟宜設備樂於是使內外博議竟陵王誕等並同萬秋議建平王宏議以凱容為韶舞宣烈為武舞祖宗廟樂揔以德為君章皇太后奏永樂永至等樂仍舊皇帝祠南郊及廟迎神送神並奏肆夏皇帝入廟門奏永至皇帝南郊初登壇及廟中諸東壁奏登歌其初獻奏凱容宣烈之舞終獻奏永安之樂郊廟同孝武又使謝莊造郊廟明堂諸樂歌辭二年有司又奏先郊廟舞樂皇帝親奉初登壇及入廟詣東壁並奏登歌不及三公行事左僕射建平王宏重議公卿行事亦宜奏登歌有司又奏元會及二廟齋祠歌伎舊並於殿設作廟祠依新儀主登歌人上殿絃管住下令元會登歌亦上殿絃管住下隋書音樂志上武帝思弘古樂天監元年下詔求學術通明者皆陳所見時對樂者七十八家咸言樂之宜改不言改樂之法帝素善音律遂自制四器名之為通以定雅樂莫不和韻初齊永明中舞人冠幘並簪武帝曰筆笏蓋以記事受言舞不受言何事簪筆豈有身服朝衣而足綦讌履於是去筆乃定郊禋宗廟及三朝之樂以武舞為大壯舞取易云大者壯也正大而天地之情可見也以文舞為大觀舞取大觀在上觀天之神道而四時不忒也國樂以雅為稱取詩序云言天下之事形四方之風謂之雅雅者正也止乎十二則天數也乃去階步之樂增撤食之雅皇帝出入宋孝建二年奏永至齊及梁初亦同至是改為皇雅取詩皇矣上帝臨下有赫也二郊太廟同用皇太子出入奏胤雅取詩君子萬年永錫爾胤王公出入奏寅雅取, WYG: ''}
