  - {type: variant, offset: 4194, length: 0, content: '', SBCK: 有女皷吹贄虞新禮儀志曰漢魏故事將葬設􅁻凶鹵簿皆皷吹新禮以禮􅁻事無凶事無樂冝除􅁻鹵簿凶服皷吹虞按禮葬有客車郎􅁻駕之明文也徐廣車服注曰中朝公主有皷吹幽明録曰晉臨川太守謝摛夜中聞皷吹聲兄澡曰夜者隂間不及存將在身後及死贈長水校尉加皷吹丗􅀃曰三都二京五經皷吹俗􅀃曰桓公作詩思不來輙作皷吹旣而得思云鳴鵠響長阜歡曰皷吹固自來人思語林曰陸士衡爲河北督日巳􅀍間搆内懷憂懣聞衆軍警角皷吹曰我今聞此不如華亭鵠戻魏武帝}
  - {type: page-break, offset: 4194, content: '', id: KR3k0012_SBCK_567-5b}
  - {type: variant, offset: 4194, length: 0, content: '', krp: 有女皷吹贄虞新禮儀志曰漢魏故事將葬設吉凶鹵簿皆皷吹新禮以禮吉事無凶事無樂冝除吉鹵簿凶服皷吹虞按禮葬有客車郎吉駕之明文也徐廣車服注曰中朝公主有皷吹幽明録曰晉臨川太守謝摛夜中聞皷吹聲兄澡曰夜者隂間不及存將在身後及死贈長水校尉加皷吹丗說曰三都二京五經皷吹俗說曰桓公作詩思不來輙作皷吹旣而得思云鳴鵠響長阜歡曰皷吹固自來人思語林曰陸士衡爲河北督日巳𬒳間搆内懷憂懣聞衆軍警角皷吹曰我今聞此不如華亭鵠戻魏武帝}
  - {type: variant, offset: 4195, length: 3, content: 沈約為, SBCK: 曰􅀌所以能常以少兵敵衆者常念増戰士忽餘事是以徃者有皷吹而使歩行爲戰士愛馬也不樂多署吏爲戰士愛糧也王渾表曰吴國臨戰牙門將張􅁗黄辰􅀐督綦母倪勇揵效武破賊制勝此}
