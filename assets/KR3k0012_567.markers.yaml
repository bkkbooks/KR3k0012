  - {type: variant, offset: 1095, length: 5, content: 唐歌九招六, WYG: 本為軍容昔黄帝涿鹿有功以為警鼓征鼓有虛䕫孔雀鵰鶚争石墜崖壯士怒之類自昔功臣偹禮適得用之假如郊祀天地唯有宫懸而無案架故知軍樂之用尚不給於神祀豈容接於閨閫哉鄧徳明南康記曰雩都縣軍山絶峯髙崿逺望似舟船上有玉臺方廣數丈周迴盡皆白石柱上自然石覆如屋形風雨之後景氣明净頗聞山上鼓吹之聲吴質别傳曰質為北中郎將朝京師喜遲其到詔}
