  - {type: variant, offset: 5536, length: 5, content: 詩賞賜閭里, WYG: 矣其百濟樂至中宗時工人死散開元中岐王範為太常卿復奏置焉又曰踈勒樂工人皂絲布頭巾絲布袍錦衿㬓白絲布袴舞二人白襖錦䄂赤皮靴赤皮𢃄樂用竪箜篌琵琶五絃琵琶横笛簫觱篥荅臘鼔腰鼔鷄樓鼔康國樂工人皂絲布頭巾緋布袍錦領舞二人緋襖錦袖緑綾褌襠褲赤皮鞾白褲帑舞急轉如風俗之胡旋乞寒者本西國外蕃之樂也神龍二年三月并州清源縣尉吕元泰上疏曰臣謹按洪範八政曰謀時寒若能謀事則時寒順之何必祼露形體澆灌衢路鼓舞跳躍而索寒也禮曰立秋之月行夏令寒暑不節隂陽不調政令之失也休咎之應君臣之感也理均影響可不戒哉至景雲二年左拾遺韓朝宗諌傳曰辛}
