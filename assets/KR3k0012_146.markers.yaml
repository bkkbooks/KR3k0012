  - {type: variant, offset: 1251, length: 2, content: 言數, SBCK: 敢有加焉庶幾程式之帥循也又曰樂正司業父師司成一有元良萬國以貞丗子之謂也又曰成王㓜不能蒞阼周公相踐阼而治踐履也代成王履阼階攝王位治天下抗丗子法於伯禽欲令成王之知父子君臣長㓜之道抗猶舉也謂舉丗子之法使與成王居而學之也成王有過則撻伯禽所以示成王丗子之道以成王之過擊伯禽則足以感喻焉凡學丗子及學士必時四時各有冝斈士謂司徒論俊選所􅂛於學}
  - {type: page-break, offset: 1251, content: '', id: KR3k0012_SBCK_146-7a}
