  - {type: variant, offset: 1466, length: 2, content: 吉事, SBCK: 民其謂我何遂辭諸鄭伯又曰九月乙夘子同生服䖍注曰桓太子莊公同以太子生之禮舉之接以太牢接者子初生接見於父卜士􅀒之士妻食之公與文姜宗婦命之又曰曹太子來朝曹太子桓公子莊公射姑賔之上卿之禮曹伯有故使其太子攝而朝曲禮曰諸侯之嫡子攝其君未誓於天子則以皮帛継子男如諸侯之上卿禮也上卿出入三積食三牢牽二年一享一食宴之也饗曹太子􅀄獻樂奏而歎􅀄獻酒如獻爵樂奏人上堂也􅀄獻爵奏樂太子歎而哀歎也施父曰曹太子其有憂乎非歎所也施父魯大夫古之享食所以􅀚威儀省禍福無䘮而慼憂必及焉曹太子臨樂而歎故曰其有憂乎父將死兆}
  - {type: variant, offset: 1466, length: 3, content: 吉事先, WYG: 適子庶子}
  - {type: variant, offset: 1466, length: 2, content: 吉事, krp: 民其謂我何遂辭諸鄭伯又曰九月乙夘子同生服䖍注曰桓太子莊公同以太子生之禮舉之接以太牢接者子初生接見於父卜士負之士妻食之公與文姜宗婦命之又曰曹太子來朝曹太子桓公子莊公射姑賔之上卿之禮曹伯有故使其太子攝而朝曲禮曰諸侯之嫡子攝其君未誓於天子則以皮帛継子男如諸侯之上卿禮也上卿出入三積食三牢牽二年一享一食宴之也饗曹太子𥘉獻樂奏而歎𥘉獻酒如獻爵樂奏人上堂也𥘉獻爵奏樂太子歎而哀歎也施父曰曹太子其有憂乎非歎所也施父魯大夫古之享食所以觀威儀省禍福無䘮而慼憂必及焉曹太子臨樂而歎故曰其有憂乎父將死兆}
  - {type: variant, offset: 1470, length: 0, content: '', WYG: 於外寢此適子謂世子弟庶子妾子也冢子未食而見必執其右手適子庶子已食而見必循其首未食已食急正緩庶}
  - {type: variant, offset: 1471, length: 3, content: 象蓋謂, SBCK: 也又曰晉侯使太子申生伐東山臯落氏里克諌曰太子奉冢祀社稷}
