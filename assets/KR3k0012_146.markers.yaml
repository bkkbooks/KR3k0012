  - {type: variant, offset: 3578, length: 283, content: 皆在幄帳左右侍宮人重行東面以准女尚書西面以准女尚書陸翽鄴中記曰石虎征討所得美女萬餘以為宮人簡其有才藝者為女尚書女史毛詩曰靜女刺時也衛君無道夫人無德也靜女其孌貽我彤管既有靜德又有美色又遺我以古人之法可以配人君者后夫人必有女史書其日月而以環進退之生于月娠則金環退之當御者以銀環進之著於左手既御著于右手事無大小記以成法箋云彤管色赤貌彤管有煒悅懌女美煒赤貌彤管以赤心正人者箋云赤管然煒女史以悅懌妃妾之德美之也毛詩義䟽曰女史彤管法如國史主記后夫人之過人君有柱下史后有女史外內各有官也周禮曰女史八人女史女奴曉書也掌王后之禮掌內治之藏以詔后內治內政內治之法本在內掌書而藏之送內宮考, SBCK: 覽卷第一百四十}
