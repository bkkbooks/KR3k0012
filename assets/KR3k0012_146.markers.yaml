  - {type: variant, offset: 1454, length: 1, content: 祀, SBCK: 宰掌具接續如捷捷勝也謂食其母使之􅀘虚強氣也凡接子擇􅁻日雖三日之内尊卑皆必選其􅁻日也冢子則太牢冢大也庶人特豚士特豕大夫少牢國君丗子太牢皆謂長子又曰丗子生則君沐浴朝服夫人亦如之皆立}
  - {type: variant, offset: 1454, length: 1, content: 祀, WYG: 宰掌具接讀如㨗徤勝也謂食其母使之補虛强氣也凡接子擇日雖三日之内尊卑皆集必選其吉日也冢子則太牢冢太也庶人特豚士特豕大夫少牢國君世子太牢皆謂長子又曰世子生則君沐浴朝服夫人亦如之皆立}
