  - {type: variant, offset: 5, length: 5, content: 嬪尚書堯典, SBCK: 并丗子見周易離卦}
  - {type: variant, offset: 5, length: 1, content: 嬪, WYG: 太子一世子並見周易離卦曰黄離元吉離為火土色黄火之子喻子有明德能附麗於其父之道象曰明兩作離大人以繼明照于四方王肅曰兩離相續繼明之義也周易鼎卦曰初六鼎顛趾利出否得妾以其子無咎鄭𤣥曰顛踣也趾足也無事曰趾設陳曰足爻體選為服初爻在服之下足象也足所以豖止也初隂爻而柔與乾不同體以否正豕乾為君以喻君夫人事君若失正禮踣其為足之道情無怨則當以和義出之然如否者嫁於天子雖失禮無出道逺之而已逺之子廢坤為順又為子母今在后妃之傍側妾之例也有順德子必賢賢而立以為世子又何咎也周易震卦曰震驚百里不䘮匕鬯彖曰震驚百里驚逺而懼邇也出可以守宗廟社稷以為祭主也王肅曰在有靈而尊者莫若於天有靈而貴者莫若於王有聲而威者莫若於雷有政而嚴者莫若於侯是以天子當乾諸侯用震地不過一同雷不過百里政行百里則匕鬯亦不䘮祭祀國家大事不䘮宗廟安矣處則諸侯執其政則長子掌其祀周易說卦曰震一索而得男故謂之長男又曰震為長子易緯曰震下乾上旡妄天精起鄭康成註曰起猶立也乾為天震為長子聖人立為天子天下之民各得其所也易曰主器者莫若長子故受之以震}
