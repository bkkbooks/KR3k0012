  - {type: variant, offset: 1462, length: 1, content: 高, SBCK: 之乃降子升自西階則人君見丗子於露寢也適子庶子見於外􅃦比適子謂丗子弟庶子妾子也冢子未食而見必執其右手適子庶子巳食而見必循其手未食巳食急正緩庶之義也又曰丗子佩瑜玉而綦組綬左傳桓公曰北戎伐齊齊侯使乞師於鄭鄭太子忽帥師救齊六月大敗戎師獲其二帥大良少良甲首三百以獻于齊於是諸侯之大夫戍齊齊人饋之餼使魯爲其班後鄭鄭忽以其功也怒故有郎之師公之未婚於齊也齊侯欲以文姜妻鄭太子太子忽辭人問其故太子曰人各有偶齊大非吾偶也詩云自求多福在我而巳大國何爲君子曰善自爲謀及敗戎師也齊侯又欲妻之固辭人問其故太子曰無事於齊吾}
  - {type: page-break, offset: 1462, content: '', id: KR3k0012_SBCK_146-8b}
  - {type: variant, offset: 1462, length: 3, content: 高猶尊, WYG: 之降子升自西階盖人君見世子必於露寢}
