  - {type: variant, offset: 1471, length: 3, content: 象蓋謂, WYG: 義也又曰世子珮瑜玉而綦組綬左傳桓公六年北戎伐齊齊侯乞師於鄭鄭太子忽帥師救齊六月大敗戎師獲其二帥太良少良甲首三百以獻于齊於是諸侯}
