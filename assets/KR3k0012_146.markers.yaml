  - {type: variant, offset: 380, length: 0, content: '', WYG: 年成湯既沒太甲聽於伊尹武王既䘮成王聽於周公其義一也尚書大傳曰太子年十八曰孟侯孟侯每於四方諸侯來朝迎於郊者問其所不知也問}
  - {type: variant, offset: 380, length: 4, content: 夫人九嬪, krp: 年始入小學見小節焉踐小義焉年}
  - {type: punctuation, offset: 382, content: 、, id: KR3k0012_CHANT_146-bkkpn113}
  - {type: variant, offset: 382, length: 2, content: 九嬪, WYG: 民之所好惡地土所生美珎怪異山川之所有無父在時皆知之鄭𤣥注曰十八嚮入大學為成人愽問庶事也又曰棄法律逐功臣殺太子以妾為妻則火不炎上又曰古之帝王者必立大學小學禮記曰小學在公宫之左大學在郊王太子王子羣后之子以至公卿大夫元士之嫡子十有三年始入小學見小節焉踐小義焉年}
