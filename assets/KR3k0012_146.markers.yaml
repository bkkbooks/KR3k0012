  - {type: variant, offset: 3147, length: 417, content: 生愍懷臧榮緒晉書曰懷帝王太后諱媛姬初入武帝拜中才人早卒懷帝即位追尊曰皇太后也晉中興書曰謝夫人名玖家本貧賤又以屠羊為業玖清惠貞正有淑姿選入後宮為才人後魏書曰高祖置女職中才人視五品沈約宋書曰晉武帝採漢魏之制置才人中才人爵視千石以下高祖受命省二才人世祖又置中才人以為散位崔鴻三十國春秋後趙錄曰石虎杜皇后名珠不知何許人平幽州在王浚妓中虎見而悅之因請於勒勒引見號曰才人以賜虎性恭惠柔婉寵幸亞於鄭后也保林漢書曰元帝加昭儀之號凡十四等保林視百石晉武帝起居注詔曰今出清商掖庭及諸署才人妓女保林已下二百七十餘人還家女侍中後魏書曰高祖置女侍中視三品又曰陸昕之容貌柔謹尚獻文女常山公主高祖以其主壻特垂昵睠昕之亡公主奉姑有孝稱神龜初與穆氏琅琊公主並為女侍中又曰于忠後妻中山王尼須女微解書靈太后引為女侍中又曰靈太后妹為元乂妻封平君拜女侍中鄴中記曰石虎置女侍中皆貂蟬直侍皇后女尚書魏略曰明帝遊宴在內選女子知書可付信者為女尚書省奏事當畫可魏書曰高祖置女尚書視三品晉, SBCK: ''}
