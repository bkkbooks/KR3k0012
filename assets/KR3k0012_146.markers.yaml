  - {type: punctuation, offset: 1241, content: 《, id: KR3k0012_CHANT_146-bkkpn404}
  - {type: variant, offset: 1241, length: 1, content: 周, SBCK: 又曰醯人供后及丗子之醬韲葅又曰外府掌􅀖布之出供王及后丗子之衣服之用又曰國君過市則刑人赦夫人過市罰一幕丗子過市罰一弈市者人之所交利而行刑之處君子無故不遊觀焉􅀂遊觀則施惠以爲􅀃也又曰王之諸子國有大事則帥國子而致於太子唯所用之􅀂有甲兵之事則授之車甲合其卒伍置其有司以軍法治之司馬弗正軍法百人爲卒五人爲伍弗不也國子屬太子司馬雖有軍事不賦之也凡國之政事國子存遊倅使之脩德學道春合諸學秋合諸射以考其藝而進退之遊倅之未仕者斈太斈也射名也王制曰春秋教以}
  - {type: variant, offset: 1241, length: 1, content: 周, WYG: 又曰醯人共后及世子之醬齊菹又曰外府掌邦布之出入共王及后世子之衣服之用又曰國君過市則刑人赦夫人過市罰一幕世子過市罰一帟市者人之所交利而行刑之處君子無故不遊觀焉若遊觀則惠施以為說也又曰諸子掌國子之倅國有大事則帥國子而致于大子惟所用之若有甲兵之事則授之車甲合其卒伍置其有司以軍法治之司馬弗正凡國正弗及正音征國子屬太子司馬雖有軍事不賦之也凡國之政事國子存遊倅使之脩德學道春合諸學秋合諸射以考其藝而進退之國子存遊暇之倅使之修徳學道王制曰春秋教以}
