  - {type: variant, offset: 1454, length: 1, content: 祀, krp: 宰掌具接續如捷捷勝也謂食其母使之𥙷虚強氣也凡接子擇吉日雖三日之内尊卑皆必選其吉日也冢子則太牢冢大也庶人特豚士特豕大夫少牢國君丗子太牢皆謂長子又曰丗子生則君沐浴朝服夫人亦如之皆立}
