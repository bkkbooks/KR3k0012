  - {type: variant, offset: 1197, length: 2, content: 世婦, SBCK: 惟王建國辨方正位于寶注曰辨方謂别東西南北之名以表隂陽也正位謂􅀂君南面當陽臣北靣即隂居於北宫以體太隂居太子於東宫以位少陽之􅀋又曰膳夫}
  - {type: variant, offset: 1197, length: 0, content: '', WYG: 惟王建國辨方正位干寶注曰辨方謂别東西南北之名以表隂陽也正位謂若君南面當陽臣北面即隂居官於北宫以休太隂居太子於東宮以佐少陽之類又曰膳夫掌王之食飲膳羞以養王及后}
