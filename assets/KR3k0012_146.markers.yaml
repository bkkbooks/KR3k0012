  - {type: variant, offset: 118, length: 1, content: 法, SBCK: 哉厚德廣惠忠信志愛人君之行四者君徳不爲驕侈不爲太靡不􅁋於美括柱茅茨爲民愛費言務儉也因就木枚曰括也春秋演孔圖曰聖人在後曰望陽苞懷至德據少陽文王子也故曰在後嗣文王矣賈􅁩書曰文王使太公望傅太子發嗜鮑魚不登于俎豈有非禮而可養太子哉帝王世記曰武王納太公之女曰邑姜脩教于内生太子誦尚書頋命曰􅈛尚明時朕言用敬保元子釗時是也元子釗康王名也􅀪濟于艱難穆天子傳曰成􅁎之喪邢侯曹侯來弔内史將之}
