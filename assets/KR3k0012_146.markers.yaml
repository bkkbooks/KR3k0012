  - {type: variant, offset: 1691, length: 2, content: 季春, SBCK: 􅀄鄭公子蘭出奔晉公子蘭鄭文公賤妾燕姞}
  - {type: variant, offset: 1691, length: 1, content: 季, WYG: 初鄭公子蘭出奔晉公子蘭鄭文公賤妾燕姞之子穆公也鄭逐群公子故奔晉也從於晉侯伐鄭請無與圍鄭許之晉善蘭不忘本國故也故使待命於東待命於鄭東也鄭石甲父侯宣多逆以為太子以求成於晉晉人許之又曰秦康公送公子雍於晉也康公秦穆公太子罃晉出也曰文公之入也無衛故有呂郤之難吕甥卻芮欲焚公宫也乃多與之徒衛衛從兵也穆嬴日抱太子穆嬴襄公夫人太子靈公以啼于朝曰先君何罪其嗣亦何罪舍嫡嗣不立而外求君將焉寘此寘猶置也此謂太子也出朝則抱以適趙氏頓首於宣子曰先君奉此子也而屬諸子曰此子也才吾受子之賜如子善為教誨此子使之有賢才知人君之道則吾受子之賜賜猶惠也不才吾惟子之怨才而受賜美其教也不才怨子惡其教不至也今君雖終言猶在耳君沒未久其言聲言氣尚在耳而棄之若何宣子與諸大夫皆患穆嬴且畏偪言諸大夫患穆嬴之言以君顧命之言責己也畏偪言無置太子地畏他公子相逼廹也乃背先蔑而立靈公以禦秦師又曰郕太子侏儒自安夫鍾自安猶處也夫鍾邑名國人弗循循順也十二年}
