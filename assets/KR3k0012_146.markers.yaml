  - {type: variant, offset: 2952, length: 323, content: 蕭子顯齊書曰六宮位號漢魏以來因寵增置世不同矣建元元年有司奏置美人為散職才人范曄後漢書曰和帝數失皇子鄧后憂繼嗣不廣數選進才人以愽帝意魏志曰明帝遊后園召才人以上曲宴極樂明日帝見毛后后曰昨遊宴北園樂乎帝以左右泄之所殺十餘人魏略曰明帝青龍三年於別殿之北立八坊諸才人以上轉南附焉其秩石擬百官之數王隱晉書曰太康七年出後宮才人妓女已下百七十人歸家又曰初惠帝幼世祖遣才人謝玖給惠帝因是有娠臨娶賈妃迎玖西宮遂生愍懷臧榮緒晉書曰懷帝王太后諱媛姬初入武帝拜中才人早卒懷帝即位追尊曰皇太后也晉中興書曰謝夫人名玖家本貧賤又以屠羊為業玖清惠貞正有淑姿選入後宮為才人後魏書曰高祖置女職中才人視五品沈約宋書曰晉武帝採漢魏之制置才人中才人爵視千石以下高祖受命省二才人世祖又置中才人, WYG: 髙厚傅牙}
