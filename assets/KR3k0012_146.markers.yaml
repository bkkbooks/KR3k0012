  - {type: variant, offset: 1855, length: 312, content: 親繰三盆手朱綠之玄黃之以為黼黻文章君服之以祀先王先公敬之至也故曰無或敢怠又曰孟夏之月蠶事既畢后妃獻蠒於天子進其成功也乃脩蠒稅以桑為均十而取一曰稅乃收世婦以下所蠶之稅也以桑為平者用桑多則蠒多少則蠒少也貴賤長少如一貴謂世婦賤謂妾御長謂力壯者也言無尊卑老壯各自以桑為平不得以高下為差也史記曰中宮天極星後勾四星末星正妃餘三星後宮之屬也漢書曰軒轅前大星女主象旁小星御者後宮屬也范曄後漢書曰世婦主知喪祭賓客後魏書曰高祖改定內官世婦視中大夫又曰宣武靈皇后胡氏初召入掖庭為承華世婦生肅宗明皇帝後周書武帝建德中詔曰正位於中有聖通典質文相華損益不同五帝則四星之象三王立六宮之數劉曹已降等級彌繁選擇遍於生民命秩方於庶職椒房舟地有眾如雲本由嗜欲之情, WYG: ''}
