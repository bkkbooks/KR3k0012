  - {type: variant, offset: 1682, length: 3, content: 高禖登, SBCK: 難今亂夲成矣立可必乎孝而安民子其圖之與其危身以速罪也速召也疾也言太子不去身必危疾召罪狐突知其雖夲旣成而太子拘於一節不逹至孝之義與臯落戰雖勝而歸猶不能免於難而使父有悖惑殺子之罪故傳曰備衆賢之言以迹太子所以死也經在僖公五年晉侯殺其丗子申生又曰㑹于首止㑹王太子鄭謀寕周也惠王以惠后故將廢太子鄭而立王子帶故齊桓帥諸侯㑹王太子以定其}
  - {type: page-break, offset: 1682, content: '', id: KR3k0012_SBCK_146-9b}
