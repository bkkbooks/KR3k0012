  - {type: variant, offset: 371, length: 0, content: '', SBCK: 髙宗有親䘮居廬三年然未嘗言國事而天下無背叛之心者何也及其爲太子之時盡以知天下人民之所好惡是以雖不言國事也知天下無背叛之心家語曰子張問曰書云髙宗諒闇三年不言言乃雍有諸王肅曰雍權貌書言乃雍雍和也孔子曰胡爲其不然}
  - {type: page-break, offset: 371, content: '', id: KR3k0012_SBCK_146-3b}
  - {type: variant, offset: 371, length: 0, content: '', WYG: 髙宗有親䘮居廬三年未嘗言國事然而天下無背叛之心者何也葢其為太子之時盡以知天下人民之所好惡是以雖不言國事天下無背叛之心也家語曰子張問曰髙宗諒隂三年不言言乃雍有諸王肅曰雍懽貌書言乃雍雍和也孔子曰胡為其不然}
  - {type: page-break, offset: 371, content: '', id: KR3k0012_WYG_146-5b, image: WYG0894/WYG0894-0348d.png}
  - {type: variant, offset: 371, length: 0, content: '', krp: 髙宗有親䘮居廬三年然未嘗言國事而天下無背叛之心者何也及其爲太子之時盡以知天下人民之所好惡是以雖不言國事也知天下無背叛之心家語曰子張問曰書云髙宗諒闇三年不言言乃雍有諸王肅曰雍權貌書言乃雍雍和也孔子曰胡爲其不然}
  - {type: variant, offset: 375, length: 1, content: 后, SBCK: 崩則丗子委政於家宰三年成湯旣没太甲聽於伊尹武王旣䘮成王聽於周公其義一也尚書大傳曰太子年十八曰孟侯孟侯者於四方諸侯來朝迎於郊者問其所不知也問人民之所好惡土地所生美珎恠異山川之所有無及父在時皆知之鄭􅀇注曰十八嚮入大斈爲成人愽問庶事也又曰棄法律逐功臣殺太子以妾爲妻則火不炎上又曰古之帝王者必}
  - {type: variant, offset: 375, length: 4, content: 后立六宮, WYG: 崩則世子委政於冢宰}
  - {type: variant, offset: 375, length: 1, content: 后, krp: 崩則丗子委政於家宰三年成湯旣没太甲聽於伊尹武王旣䘮成王聽於周公其義一也尚書大傳曰太子年十八曰孟侯孟侯者於四方諸侯來朝迎於郊者問其所不知也問人民之所好惡土地所生美珎恠異山川之所有無及父在時皆知之鄭玄注曰十八嚮入大斈爲成人愽問庶事也又曰棄法律逐功臣殺太子以妾爲妻則火不炎上又曰古之帝王者必}
