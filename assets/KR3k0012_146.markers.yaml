  - {type: variant, offset: 1248, length: 0, content: '', WYG: 末有原應曰諾然後退末猶勿也原再進也勿有所再進為失餁臭味惡也退反其寢武王師而行之不敢有加焉庶幾程式之師修之又曰樂正司業父師司成一有元良萬國以貞}
