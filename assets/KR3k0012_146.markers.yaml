  - {type: variant, offset: 1485, length: 189, content: 玄鳥感陽而至故重至日因以用之簡娀以玄鳥至之日有事高禖而生契焉故詩云天命玄鳥降而生商后妃率九嬪御后者天子適妻也妃命也嬪婦也御妾也周禮天子一后三妃九嬪二十七世婦八十一御妾以應外朝公卿大夫之數也世婦不見卑者文略御妾皆行世婦可知也后妃將九嬪女御皆會禖以祈孕妊也乃醴天子所御帶以弓矢天子所御謂后妃以下至妾任有萌牙者也韣弓衣也祝以高禖之命飲以醴酒帶以弓韣尚使得男也授以弓矢于高禖之前弓矢者男, SBCK: 非太}
