  - {type: variant, offset: 2734, length: 217, content: 豐姿色聰敏有才能明書會計以良家子應法相選入掖庭為何后所酖靈帝思美人作追德賦令儀頌魏志曰漢制內官十有四等魏因漢法皆如舊制自夫人以下世有增損太祖建國始命王后其下五等有美人暨太和中自夫人以下爵凡十二等美人視二千石江表傳曰孫皓以張布女為美人有寵後美人忤皓皓怒棒殺之沈約晉書曰夏殷以上內職無聞姬氏之隆婦官為盛前漢列給十四世祖受命又有美人以比職焉後魏書曰高祖改定內官美人視三品沈約宋書曰晉武帝採漢魏前事之制置三夫人其餘有美人爵視千石太宗以美人為散, WYG: ''}
