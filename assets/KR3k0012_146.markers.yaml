  - {type: variant, offset: 1259, length: 0, content: '', SBCK: 學之謂也物猶事也又丗子之記曰朝夕至于大寢之門外問内竪曰今日安否何如朝夕朝朝暮夕也日中又朝文王爲丗子也非禮之制丗子之禮亡此存其記内竪曰今日安丗子乃有喜}
