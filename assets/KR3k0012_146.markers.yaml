  - {type: variant, offset: 1475, length: 2, content: 人見, SBCK: 粢盛以朝夕視君膳者故曰冢子君行則守有守則從從曰撫軍守曰監國古之制也夫帥師專行謀誓軍旅君與國政之}
  - {type: variant, offset: 1475, length: 0, content: '', WYG: 大夫戍齊齊}
  - {type: variant, offset: 1475, length: 2, content: 人見, krp: 粢盛以朝夕視君膳者故曰冢子君行則守有守則從從曰撫軍守曰監國古之制也夫帥師專行謀誓軍旅君與國政之}
