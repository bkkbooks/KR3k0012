  - {type: variant, offset: 112, length: 0, content: '', SBCK: 主器者莫􅀂長子故受之以震尚書大傳曰唯四月太子發上􅀕于畢下至於盟津之上乃告于司馬司徒司空諸節元才予無知以先祖先父之有德之臣左右小子予受先公戰力賞罰以定厥功明于先祖之遺鄭􅀇注曰四月者周四月也發周武王也卒父業故稱太子也太子發􅂛于舟中流白魚入于舟王跪取出俟以燎羣公咸曰休哉尚書中候曰廢考立發爲太子鄭􅀇曰定王業也又曰我終之後怛稱太子終卒恒常也稱太子者明非諸侯王事未定矣又曰太子發以紂存三仁附即父位不稱王發武王名也三仁箕子比干微子文王得赤雀丹書故號以應天道未成而崩武王以天誅未行謙不自成故稱太子明統諸而未爲王又曰予稱太子發明愼父以名卒考予我也父死曰考文王命武王我終之後桓稱太子者明愼文王之命也君存稱丗子薨稱太子旣葬稱子踰年稱公今踰年而稱太子發􅀂父業有不成者而將軍周書曰文王受命}
  - {type: page-break, offset: 112, content: '', id: KR3k0012_SBCK_146-2a}
  - {type: variant, offset: 112, length: 0, content: '', WYG: 我終之後恒稱太子又曰太子發伐紂以存三仁即父位不稱王發武王名也三仁箕子比干微子文王得赤雀丹書故號以應天道未成而崩武王以天誅未行謙不自成故稱太子明統緒而未成王又曰予稱太子發明慎父以名卒考予我也父死曰考文王命武王我終之後恒稱太子者明慎文王之命也君在稱世子薨稱太子既葬稱子踰年稱公今踰年而稱太子發若父業有不成者而將卒也周書曰文王受命}
