  - {type: variant, offset: 1241, length: 1, content: 周, krp: 又曰醯人供后及丗子之醬韲葅又曰外府掌邦布之出供王及后丗子之衣服之用又曰國君過市則刑人赦夫人過市罰一幕丗子過市罰一弈市者人之所交利而行刑之處君子無故不遊觀焉若遊觀則施惠以爲說也又曰王之諸子國有大事則帥國子而致於太子唯所用之若有甲兵之事則授之車甲合其卒伍置其有司以軍法治之司馬弗正軍法百人爲卒五人爲伍弗不也國子屬太子司馬雖有軍事不賦之也凡國之政事國子存遊倅使之脩德學道春合諸學秋合諸射以考其藝而進退之遊倅之未仕者斈太斈也射名也王制曰春秋教以}
  - {type: punctuation, offset: 1243, content: ‧, id: KR3k0012_CHANT_146-bkkpn405}
  - {type: variant, offset: 1243, length: 0, content: '', SBCK: 樂冬夏教以詩書王太子羣子卿大夫元士之適子國之後選皆造焉儀禮聘禮曰遭夫人丗子之䘮君不受使大夫受於廟其他如遭君䘮夫人丗子死君爲䘮主使大夫受聘礼不以凶接吉也其他謂礼所降大戴禮曰古之王者太子生因舉之禮使士􅀒之有司叅夙興端冕見之南郊見之}
  - {type: page-break, offset: 1243, content: '', id: KR3k0012_SBCK_146-6a}
  - {type: variant, offset: 1243, length: 0, content: '', WYG: 樂冬夏教以詩書王太子群子卿大夫元士之嫡子國之俊選皆造焉儀禮聘禮曰遭夫人世子之䘮君不受使大夫受於廟其他如遭君䘮夫人世子死君為主使大夫受聘禮不以㓙接吉也其他謂禮所降大戴禮曰古之王者太子生行舉之禮使士負之有司叅之夙興端冕見之南郊見之}
  - {type: page-break, offset: 1243, content: '', id: KR3k0012_WYG_146-9b, image: WYG0894/WYG0894-0350d.png}
  - {type: variant, offset: 1243, length: 0, content: '', krp: 樂冬夏教以詩書王太子羣子卿大夫元士之適子國之後選皆造焉儀禮聘禮曰遭夫人丗子之䘮君不受使大夫受於廟其他如遭君䘮夫人丗子死君爲䘮主使大夫受聘礼不以凶接吉也其他謂礼所降大戴禮曰古之王者太子生因舉之禮使士負之有司叅夙興端冕見之南郊見之}
  - {type: variant, offset: 1244, length: 2, content: 官冢, SBCK: 也過闕則下過廟則趨孝子之道也故自爲赤子則教固以行矣又曰太子旣冠成免於保􅀓之嚴則有司過之史有虧膳之宰太子有過史必書史之義不得不書過不書過則死過書而宰徹其膳宰之義不得不徹膳不徹膳則死於是有進善之旌誹謗之木敢諌之皷禮記曰大夫士之子不敢與丗子同名鄭􅀇注曰避僣邪也其先生則亦弗改丗或爲太又曰王太子王子羣后之太子卿大夫元士之適子凡入學以齒皆以長㓜受斈尊卑不同又曰文王之爲丗子朝於王季日三雞初鳴而衣服至於寢門之外問内竪之御者曰今日安不何如内竪小臣之屬掌内外之通令也如今小史直日矣内竪曰安文王乃喜孝子恒兢兢也及日中又至亦如之又復及暮又至亦如之暮夕其有不安節則内竪以告文王文王色憂行不能正履節謂居處故事履蹈地王季復膳飲食安也然後亦復初憂解食上必在視寒煖之節在察食下問所膳所食命膳}
  - {type: page-break, offset: 1244, content: '', id: KR3k0012_SBCK_146-6b}
  - {type: variant, offset: 1244, length: 2, content: 官冢, WYG: 也過闕則下過廟則趨孝子之道也故自為赤子則教固以行矣又曰太子既冠後免於保傅之嚴則有司過之史有虧膳之宰太子有過史必書史之義不得不書過不書過則死過書而宰徹其膳宰之義不得不徹膳不徹膳則死於是有進善之旌誹謗之木敢諫之皷禮記曰大夫士之子不敢自稱曰嗣子某不敢與世子同名又曰王太子王子群后之太子卿大夫元士之嫡子凡入學以齒又曰文王之為世子朝於王季日三雞初鳴而衣服至於寢門外問内豎之御者曰今日安否何如内豎小臣之屬掌内外之通令也如今小史直日矣内豎曰安文王乃喜孝子恒兢兢也及日中又至又復也亦如之及暮又至亦如之其有不安莭則内豎以告文王文王色憂行不能正履不安莭謂不循起居之常王季復膳飲食安也然後亦復初憂觧食上必在視寒煖之節在察食下問所膳所食命膳}
