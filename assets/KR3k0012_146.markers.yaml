  - {type: variant, offset: 1200, length: 6, content: 祭祀賓客喪紀, SBCK: 王之食飲膳羞以養王及后丗子歳終則㑹唯王及后丗子之膳不㑹不㑹計多少優尊者其頒賜諸臣則計之又曰凡其死生鱻薧之物以供王之膳與其薦之物及后丗子之膳羞鄭司農云鮮謂生􅁏薧謂乾肉也又曰内饔掌王及后丗子膳羞之割烹煎和}
