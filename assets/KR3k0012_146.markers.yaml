  - {type: variant, offset: 386, length: 5, content: 七世婦八十, SBCK: 入太學見大節焉踐大義焉故入小學知父子之道長㓜之序入太學知君臣之儀上下之位小師取小學之賢者登之天子天子以爲左右天子當爲太子禮志曰周公居攝踐祚而治亢丗子法於伯禽使之爲成王居欲使成王之知父子君臣長㓜之義所以善成王也尚書洪範五行傳曰心之大星天王也其前星太子也後星庶子也荆州星占曰少微星}
  - {type: variant, offset: 386, length: 1, content: 七, WYG: 入大學見大節焉踐大義焉故入小學知父母之道長幼之序入大學知君臣之儀上下之位小師取小學之賢者登之天子天子以為左右天子當為太子禮記曰周公居攝踐祚而治抗}
