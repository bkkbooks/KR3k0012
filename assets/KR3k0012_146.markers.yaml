  - {type: variant, offset: 1518, length: 0, content: '', WYG: 自求多福在我而已大國何為君子曰善自為謀及其敗戎師也齊侯又請妻之固辭人問其故太子曰無事於齊吾猶不敢今以君命奔齊之急而受室以歸是以師婚也民其謂我何遂辭諸鄭伯又曰九月丁夘子同生服䖍注曰桓公太子莊公同以太子生之禮舉之魯十二公惟子同生是適夫人之長子故備用太子之禮舉之接以太牢接者子初生接見於父太牢牛羊豕也以禮接夫人重適也卜士負之士妻食之禮世子生三日卜士負之射人以桑弧蓬矢射}
