  - {type: variant, offset: 2659, length: 487, content: 已又曰虞美人者以良家子十三選入掖庭生舞陽長公主自漢興母氏莫不尊寵順帝既未加美人爵號而冲帝早夭梁冀秉政忌惡他族虞氏抑而不登但稱大家而已又曰王美人趙國人也豐姿色聰敏有才能明書會計以良家子應法相選入掖庭為何后所酖靈帝思美人作追德賦令儀頌魏志曰漢制內官十有四等魏因漢法皆如舊制自夫人以下世有增損太祖建國始命王后其下五等有美人暨太和中自夫人以下爵凡十二等美人視二千石江表傳曰孫皓以張布女為美人有寵後美人忤皓皓怒棒殺之沈約晉書曰夏殷以上內職無聞姬氏之隆婦官為盛前漢列給十四世祖受命又有美人以比職焉後魏書曰高祖改定內官美人視三品沈約宋書曰晉武帝採漢魏前事之制置三夫人其餘有美人爵視千石太宗以美人為散使蕭子顯齊書曰六宮位號漢魏以來因寵增置世不同矣建元元年有司奏置美人為散職才人范曄後漢書曰和帝數失皇子鄧后憂繼嗣不廣數選進才人以愽帝意魏志曰明帝遊后園召才人以上曲宴極樂明日帝見毛后后曰昨遊宴北園樂乎帝以左右泄之所殺十餘人魏略曰明帝青龍三年於別殿之北立八坊諸才人以上轉南附焉其秩石擬百官之數王隱晉書曰太康七年出後宮才人妓女已下百七十人歸家又曰初惠帝幼世祖遣才人謝玖給惠帝因是有娠臨娶賈妃迎玖西宮, SBCK: 巳}
