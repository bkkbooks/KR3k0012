  - {type: variant, offset: 1254, length: 0, content: '', krp: 春夏學干戈秋冬學羽籥皆於東序又曰凡三王教丗子必以禮樂樂所以脩内禮所以脩外也禮樂交錯於中發形於外是故其成也懌恭敬而温文中心中也懌恱懌也立太傅少傅以養之欲其知父子}
  - {type: variant, offset: 1255, length: 0, content: '', SBCK: 臣之道也仲尼曰昔者周公攝政踐阼而治抗丗子法於伯禽所以善成王也聞之曰爲人臣者殺其身有益於君則爲之況于其身以善其君乎周公優爲之于讀曰迂迂猶廣也是故知爲人子然後可以爲人父知爲人臣然後可以爲人君知事人然後能使人成王㓜不能蒞阼以爲丗子則無爲也以爲丗子􅀂爲丗子時也是故抗丗子法於伯禽使之與成王居亦學此禮於成王側欲令成王之知父子君臣長㓜之義也君之於丗子也親則父也尊則君也有父之親有君之尊然後兼天下而有之是故養丗}
  - {type: page-break, offset: 1255, content: '', id: KR3k0012_SBCK_146-7b}
  - {type: variant, offset: 1255, length: 0, content: '', WYG: 臣之道也又曰仲尼曰昔者周公攝政踐祚而治抗世子法於伯禽所以善成王也聞之曰為人臣者殺其身有益於君則為之况于其身以善其君乎周公優為之于讀曰迂優猶廣也是故知為人子然後可以為人父知為人臣然後可以為人君知事人然後能使人成王幼不能蒞阼以為世子則無為也以為世子若為世子時也是故抗世子法於伯禽使之與成王居亦名此禮於成王側欲令成王之知父子君臣長幼之義也君之於世子也親則父也尊則君也有父之親有君之尊然後兼天下而有之是知養世}
