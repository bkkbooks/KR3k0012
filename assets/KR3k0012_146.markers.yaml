  - {type: variant, offset: 1323, length: 128, content: 有世婦女御獨出帥九嬪者舉中言祠于高禖之前太祝酌飲高禖之庭又曰季春之月后齋戒親東嚮躬桑后妃親採桑示師先天下也東嚮者向時氣也是時明其不常留養蠶者所卜夫人與世婦及諸臣之妻也禮記婚義曰古者天子二十七世婦以聽天下之內治以明章婦順故天下內和而家理蔡邕月令章句曰仲春之月, SBCK: 生告於君接}
