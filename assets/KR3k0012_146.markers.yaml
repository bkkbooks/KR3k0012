  - {type: variant, offset: 1254, length: 0, content: '', SBCK: 春夏學干戈秋冬學羽籥皆於東序又曰凡三王教丗子必以禮樂樂所以脩内禮所以脩外也禮樂交錯於中發形於外是故其成也懌恭敬而温文中心中也懌恱懌也立太傅少傅以養之欲其知父子}
  - {type: variant, offset: 1254, length: 0, content: '', WYG: 春夏學干戈秋冬學羽籥皆於東序又曰凡三王教世子必以禮樂樂所以修内禮所以修外禮樂交錯於中發形於外是故其成也懌恭敬而温文中心中也懌恱懌也立太傅少傅以養之欲其知父子}
