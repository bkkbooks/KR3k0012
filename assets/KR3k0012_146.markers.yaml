  - {type: variant, offset: 1678, length: 3, content: 孕妊者, SBCK: 公曰寡人有子未知其誰立焉不對而退里克不對太子帥師公衣之偏衣佩之金玦偏衣偏裝之衣偏異色駮不純裝在中左右各異故曰偏金玦以金爲玦也太子將戰狐突諌曰不可昔辛伯諗周桓公曰内寵並后外寵貳政嬖子配嫡大都耦國亂之夲也周公弗從故及}
  - {type: variant, offset: 1678, length: 3, content: 孕妊者, WYG: 師在制命而已禀命則不威專命則不孝故君之嗣適不可以帥師君失其官帥師不威將焉用之且臣聞臯落氏將戰君其舍之舍之謂置申生勿使將兵也公曰寡人有子未知其誰立焉不對而退里克不對太子帥師公衣之偏衣佩之金玦偏衣偏裝之衣偏異色駁不純裝在中左右各異故曰偏金玦以金為玦也太子將戰狐突諫曰不可昔辛伯諗周桓公曰内寵並后外寵二政嬖子配嫡大都耦國亂之本也周公弗從故及}
