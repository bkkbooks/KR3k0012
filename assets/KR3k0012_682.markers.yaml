  - {type: variant, offset: 1646, length: 2573, content: 又曰陸遜字伯言少為孫權帳下右部督授棨戟督會稽鄱陽丹陽三郡晉書曰羊祜在軍頗以畋漁廢政嘗欲夜出軍司徐胤執棨當營門曰將軍都督萬里安可輕出今日胤死此門乃開爾祜改容謝之此後稀出宋書曰王曇首領驍騎將軍元嘉四年車駕出北堂使三更竟開廣莫門南臺云應須白獸幡銀字棨不肯開門尚書左丞羊玄保奏免御史丞傅隆已下曇首曰既無異勑又闕幡棨雖稱上旨不異單剌其不請白獸幡銀字棨致開門不時由尚書相承之失亦合糺正上特無問更立科條唐書曰龍朔中左衛大將軍范陽郡公張延師東夷都護儉弟也與兄太僕卿大師次兄儉同時三品宅中棨戟齊列時號三戟張家又曰徐泗節度李愿奏請換戟有司以官戟五年一換私家不在易限詔以李晟忠勳之家特許之又曰呂諲為相有司送戟至宅諲釋慘服以受之時譏其失襄陽記曰李衡字叔平為丹陽太守孫休加威遠將軍授以棨戟荊州先賢傳曰羅獻字令則以泰始三年進位冠軍假節增鼓吹棨戟崔豹古今注曰殳戟前驅之器也以木為之後世僣偽無復典刑以亦油韜之赤謂之油戟亦曰棨戟公主以下通之以前驅王昶謝棨表曰復假臣棨光榮照赫非臣怯弱所當荷受節說文曰節信也象相合之形釋名曰節者號令賞罰之節也後漢書注曰節所以為信以竹為之長八尺以旄牛尾為眊三重周禮地官下掌節曰掌守邦節而辯其用以輔王命邦節者鎮圭牙瑋穀圭也王有命則別其節之用以授使者輔王命執以行為信守邦國者用玉節守都鄙者用角節角用犀角其制未聞凡邦國之使節山國用虎節土國用人節澤國用龍節皆金也以英蕩輔之杜子春云函器盛此節或曰英蕩書函也關門用符節貨賄用璽節道路用旌節皆有期以反命門關司門司關也貨賄者主通貨符節宮中諸官府也璽節者今之印章也旌節者今使者所權也凡通達於天下者必有節以傳輔之無節者有幾則不達禮記玉藻曰凡君召以三節二節以走一節以趍節所以明信輔君命也使使召臣急則持二緩則持一傳曰宋襄夫人襄王之姊也昭公不禮焉昭公適祖母夫人因戴氏之族華樂皇皆族戴以殺襄王之孫孔叔公孫鍾離及大司馬公子卬皆昭公黨也司馬握節以死故書以官節國之符信也握之以死示不廢命公羊傳哀公曰齊景公謂陳乞曰吾欲立舍何如陳乞曰君欲立請立之陽生謂陳乞曰聞子將不立我也陳乞曰夫千乘之主將廢正而立不正必殺正者吾不立子者所以生也與之玉節而走之節信也折玉與陽生留其半為後當迎之合以信防稱矯也景公死而舍立陳乞使人迎陽生史記曰袁盎使吳吳王囚之盎解節毛懷之遂歸報吳楚已破漢書曰劉章已殺呂產帝令謁者持節勞章章欲奪節謁者不肯章迺從與載因節信持斬長樂衛尉呂更始因謁者所持之節用為信還入北軍復報太尉勃勃賀章曰所患獨產今已誅天下定矣又曰吳王反周丘者下邳人亡命於吳酤酒無行王簿不任周丘乃上說王曰臣以無能不得待罪行間臣非敢求有所將也願請王以一漢節必有以報王迺與之周丘得節夜持入下邳至傳舍召令斬之遂召昆弟所善豪吏一夜得三萬人又西域傳曰初公主侍者馮嫽音繚能史書習事常持節為公主使行賞賜於城郭諸國敬信之號曰馮大夫又曰蘇武使匈奴單于乃徙武北海上武仗節牧羊臥起操持節毛盡落又曰戾太子誅江充初漢節純赤以太子持赤節故更為黃毛加上以相別又曰張騫使月氏匈奴得之謂曰吾欲使越漢肯聽我乎留騫十餘歲予妻有子然騫持漢節不失又曰諸葛豐字少季為司隸校尉㓨舉無所避侍中許章以外屬貴幸賓客犯事與章相連豐案劾章欲奏其事適逢許侍中私出豐駐車舉節詔章曰下欲收之章馳車去豐追之許因得入宮門自歸奏於是收豐節司隸去節自豐始也又南越傳曰遣韓千秋入越越以兵擊千秋等滅之函封漢節置塞上好為慢辭謝罪又匈奴傳曰漢使王鳥等窺匈奴匈奴曰漢使不去節不以黑黯其面不得入穹廬王鳥北地人習胡俗去其節黯面入穹廬單于愛之又曰王莽篡位皇孫功崇公宗被誅宗姊妨為衛將軍王興夫人祝祖姑被殺婢以絕口事發覺事連及司命孔仁妻亦自殺仁見莽免冠謝莽使尚書劾仁乘乾車駕坤馬左蒼龍右白虎前朱鳥後玄武右仗威節左負威斗號曰赤皇非以驕仁乃以尊新室之威命也仁擅免天文冠大不敬有詔勿劾更易新冠其怪如此荀悅漢紀曰征和二年長安擾亂言太子反任安受太子節懷二心腰斬續漢書曰鮑永為更始大將將兵安集河東赤眉害更始三輔道絕世祖即位遣諫議大夫儲大伯持節徵永永疑為不審收繫大伯封節傳舍壁中遣人持至長安知更始審亡即發喪出降東觀漢記曰光武拜岑彭為剌姦大將軍督察營眾授以常所持節從平河北又曰郭丹為更始諫議大夫更始敗諸將軍悉歸上普獲封爵丹無所歸節傳以弊布纏褁節合如擔晝伏夜行詣更始妻子奉還節傳因歸鄉里又曰永平中遣鄭眾北使匈奴眾因上言臣前奉使不為匈奴拜單于恚恨遣兵圍臣今復御命必見凌折臣誠不忍持大漢節對氈裘獨拜如今匈奴遂能服臣將有損大漢之強上不聽又曰溫序字次房遷護羗校尉為隗囂別將荀宇所拘劫序素氣力大怒叱宇等曰虜何敢迫脅漢因以節撾殺數人宇曰此義士可賜以劍序受劍御鬚於口顧左右曰既為賊所迫殺無令鬚污地遂伏劍而死張璠漢記曰董卓謂袁紹曰劉氏種不足復遺紹勃然曰天下健者豈唯董公撗刀長揖徑出懸節於上東門而奔冀州獻帝春秋曰太傳司馬日磾假節循撫州郡袁術在壽春借節觀之因奪不還日磾失節憂恚而死魏書曰鎮北將軍劉靜卒朝廷以許允代靜已受節傳出止外舍大將軍與允書曰鎮北雖少事而都典一方念足下震華鼓建朱節歷本州此所謂著繡晝行也允心甚悅又曰桓範黃初中為洛陽典農中郎將使持節都督青徐諸軍事治下邳與徐州剌史芻歧爭屋引節欲斬歧為歧奏不直坐免吳書曰婁圭字子伯初依劉表後歸曹公曹公向荊州表子琮降以節迎曹公諸將皆疑曹公以問子伯子伯曰天下撓攘皆貪王命以自重今以節來必至誠公善之晉書曰石苞遷徐州剌史文帝之敗於東關也苞獨全軍而返帝指所持節謂苞曰恨不以此授卿以究大事又曰京師危逼王澄率眾軍將赴國難而飄風折其節柱又曰何無忌自豫章拒盧循軍敗握節受害王隱晉書曰段疋磾降石勒常著朝服持晉節勒亦不問晉中興書曰廣州人背剌史郭訥迎王機遂入廣州訥乃持節出機就訥求節訥曰昔蘇武不失節人以為美今寧可以與賊乎義不可得相與自可遣兵來取之機慚而止又曰王機篡廣州懼王敦來討杜蘎在鬱林與機結好機勸蘎取交州蘎至機執節曰節當相與疊持何可獨捉機遂以節與蘎後並為陶侃所殺晉永昌起居注曰元帝使司空王導距王敦詔曰以吾征東時節給司空晉令曰使信節皆鳥書之唐書曰頴王璬為劍南節度大使時玄宗將幸蜀璬赴藩卒遽不遑受節或說假大槊油囊蒙之璬曰但為真王何用假節漢武內傳曰西王母降殿前有五十大仙童執綵旄之節俗說曰殷伯弟為何無忌參軍在尋陽與何共樗蒲得何百便住何守請求贖決不聽何大怒罵殷曰戇子敢爾取節來殷猶慠然謂何曰朝廷授將軍三千羸兵狗頭節以威蠻獠乃復擬議國士異事何便令百人收殷付獄中兵歌嘯自若經一日遂置恚, SBCK: ''}
