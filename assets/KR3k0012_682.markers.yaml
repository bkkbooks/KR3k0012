  - {type: variant, offset: 899, length: 0, content: '', SBCK: 郎秩二等光後廢昌邑王賀立宣帝光自手解取賀璽扶令下殿至漢平帝王莽簒位就元后求璽乃出璽投之於地璽上螭一角􅆙及莽敗時帶璽綬避火於漸臺啇人杜呉殺莽取綬不知取璽及莽頭公賔就見綬問綬主所在乃斬莽首并璽與王憲憲得無所送又自乗天子車輦李松入長安斬憲送璽詣宛上更始赤眉大司馬謝禄至髙陵更始奉璽赤眉赤眉立劉盆子建武三年盆子敗於冝陽璽還光武孫堅從桂陽入討董卓卓時巳焚燒洛邑徙都長安堅軍於城南見井中旦旦有光軍人莫敢汲堅乃􅊥得璽􅀄卓作亂掌璽者投于井中故堅得之􅀽紹有僣盗意乃拘堅妻逼求之紹得璽見魏舉以向肘魏武惡之紹敗得璽還漢以禪魏魏以禪晉趙王倫簒立使義陽王威就惠帝取璽帝不與強奪之晉懷帝永嘉五年王弥入洛陽執懷帝及傳國六璽詣劉曜後爲石勒所井璽復屬勒勒刻一邊云天命石氏此題今不復存勒爲冉閔所滅此璽屬閔閔敗璽存閔大將軍蔣幹晉鎮西將軍謝尚遣督護何融至購賞得之以晉穆帝永和八年還江南晉元帝東度歷數帝無玉璽北人皆云司馬家是白板天子又曰雍州璽者晉泰光十九年雍州刺史郗恢表慕容永稱藩奉璽方六寸厚七分上蟠螭爲鼻合髙四寸六分四邊􅀛文下有八字其文曰受天之命皇帝壽昌鳥􅂐隠起巧麗驚絶是慕容所制源其所由未詳厥始也吕氏春秋曰民之於上若璽於塗印方則方印圎則圎山陽公載記曰􅀽術將僣號聞孫堅得傳國璽乃拘堅夫人而奪之王璽譜云􅀽紹拘堅夫人奪之應劭漢官儀曰孔子稱封泰山禪梁父可得而數七十有二傳曰封者以金泥銀繩印之以璽璽施也信也古者尊卑共之月令曰固封璽春秋傳襄公在楚武子使季冶問璽書而與之是也􅁗漢以來尊者以爲名乃始避又曰天子有傳國璽文曰受命於天旣壽且康漢舊儀曰􅁗巳前民皆以金玉銀銅犀象爲方寸璽各服所好漢巳來天子獨稱璽又以玉群臣莫敢用也又曰皇帝六璽皆白玉螭虎劒文曰皇帝行璽皇帝之璽皇帝信璽天子行璽天子之璽天子信璽凢六璽皇帝行璽賜諸侯王書信璽發兵徴大臣天子行璽外國事天子之璽事天地􅀑神璽皆以武都紫泥封青布囊白表裏兩端尺一櫃中約署崔浩漢紀音義曰傳國璽是和氏璧作之趙書曰劉曜於龍門河水中得玉璽文融尅昌􅋯以爲天錫神璽齋而受之石虎別傳曰武郷長城縣民韓強在長城西山巖石間得玄璽一方四寸厚二寸與璽同文曰受命于天旣壽永昌虎以爲瑞燕書曰元璽六年蔣幹遣}
