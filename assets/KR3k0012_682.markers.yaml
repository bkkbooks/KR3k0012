  - {type: variant, offset: 1165, length: 1, content: 軺, SBCK: 大夫匈奴亦同九卿中二千石一云青緺綬緺紫青色緺音􅀲二千石青綬三采青白紅淳青圭長一丈八尺一百二十首又漢官儀綬羽青桃花縹長丈八尺自青綬已上縌音逆皆長三尺二寸與綬同采而首半之縌者古佩禭也佩禭相迎受故曰縌紫綬之間得施玉環玦千石六百黒綬三采青赤紺淳青圭長丈六尺八十首官儀云墨綬白羽青地絳二采長丈七尺四百丞尉三百長相二百石皆黄綬一采淳黄圭長丈五尺六十首又漢官儀云黄綬絲八十首長丈七尺自黒綬以下縌長三尺綬同采而首半之百石青紺綬一采宛轉繆織圭長丈二尺凢先合單紡爲一絲四絲爲一扶五扶爲一首五首成一文文采淳爲一圭首多者絲細少者麤皆廣六寸史記曰武帝召東郭先生出拜爲郡都尉先生乆待詔公}
