  - {type: variant, offset: 1189, length: 201, content: 賁二十人持班劍晉中興書曰大和元年詔曰會稽王其以為丞相給羽葆鼓吹班劍六十人宋書曰張敬兒加開府儀同既得開府又望班劍語人曰我車邊猶少班闌物又曰大明元年制大臣加班劍者不入宮城門泰豫元年班劍依舊入殿徐邈奏議曰東宮班劍議者不處數案公卿故事給虎賁二十人持劍安平獻王加青蓋九旒前後鼓吹虎賁亦二十人依准此數東宮班劍當不過二十棨戟漢書曰韓延壽在東郡殖羽葆鼓車功曹引車皆駕駟馬載戟五騎為伍東觀漢記曰王郎遣諫議大夫杜威持節詣軍, WYG: 鼻}
