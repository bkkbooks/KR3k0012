  - {type: variant, offset: 386, length: 5, content: 為小鹵簿迎, SBCK: 入鄴登三臺助戍譎之曰今且出璽付我㐫㓂在外道路梗澁亦未敢即送當遣單使馳告天子天子聞璽已在吾邊知卿至誠當遣重兵相援智信之乃出璽付融融詣施施使賫璽馳還璽自秦傳漢漢入魏魏入西晉永嘉末洛京不守璽爲劉聦所得及石勒滅劉氏璽入僞趙冉閔誅石氏又入閔及是四十二年而璽復歸於晉晉中興書曰義熈十二年左衛兵陳陽於府前淮水中得璽王者不隱其過則玉壁見璽亦璧也崔鴻十六國春秋前趙録曰河瑞元年汾水中得玉璽髙一寸二分方四寸文曰有新保之盖王莽時璽也獻者因増􅀷海光三字淵以爲巳瑞大赦又前趙録曰光􅀄五年并州牧安定王䇿獻玉璽一文曰趙盛又前凉録曰張寔元年蘭池趙嬰上言於青澗水中得一玉璽鉗鈕光照水外文曰皇}
