  - {type: variant, offset: 6, length: 0, content: '', WYG: 趙封送傳國玉璽太子玉璽各一于勒又曰苻堅奔五將山姚萇遣將軍呉忠圍之堅衆奔散獨侍御十數人而已神色自若坐而待之召宰人進食俄而忠至執堅以歸新平幽之于别室萇求傳國璽於堅曰萇次膺符歴可以為惠堅嗔目叱之曰小羗乃敢干逼天子豈以傳國璽授汝羗也圖緯符命何所依據帝王次序無汝羗名違天不祥其能久乎璽已送晉不可得也又冉閔殺石袨僭大號遣其使人常煒聘慕容儁儁使記室封裕詰之曰石袨去嵗使張舉請援云璽在襄國其言信不煒曰誅殺之日在鄴者畧無所遣璽何從而向襄國此求救之辭耳又曰冉閔敗苻幹以傳國璽送于建鄴慕容儁欲神其事業言厯運在已乃詐云閔妻得之以獻賜號曰奉璽君因以永和八年僭即皇帝位大赦境内建元曰元璽宋書曰元㓙劭既敗時不見傳國璽問劭云在嚴道育處就取得之又曰蔡興宗拜侍中每正言得失無所顧憚孝武新拜陵興宗負璽陪乘齊書曰謝朏為宋侍郎領祕書監及髙帝受禪朏當日在直百僚陪位侍中當觧璽朏佯不知曰有何公事𫝊詔云觧璽授齊王朏曰齊自應有侍中乃引枕卧傳詔懼乃使稱疾欲取兼人朏曰我無疾何所稱遂朝服歩出東掖門乃得車仍還宅是日遂以王儉為侍中觧璽既而武帝請誅朏髙帝曰殺之則成其名正應容之度外北史后妃傳曰典琮三人掌琮璽翫器北齊書曰辛術鎮廣陵獲傳國璽送鄴文宣以璽告於太廟此璽即秦所制方四寸上紐交盤龍其文曰受命于天既夀永昌二漢相傳又應魏晉晉懷帝敗没於劉聰聰敗没於石氏石氏敗晉穆帝永和中濮陽太守戴僧施得之遣督䕶何融送于建鄴歴宋齊梁敗侯景得之景敗侍中趙思賢以璽投景南兖州刺史郭元建送于術故術以進焉又曰元暉業天保二年從駕至晉陽於宫門外罵元韶曰爾不及一老嫗背負璽與人何不打碎之我出此言既知也然爾亦詎得幾時文宣聞而殺之後周書曰宇文氏其先曰普廻因狩得玉璽三鈕有文曰皇帝璽普廻異之以為天授其俗謂天曰宇因號宇文國并以為氏唐書曰貞元二年神䇿將温嘉順得白玉印其文曰天子之寶獻之即傳國八寶之一上幸奉天後失之及是方獲玉璽譜曰傳國璽是秦始皇所刻其玉出藍田山是丞相李斯所書其文曰受命于天既夀永昌漢髙祖定三秦秦王子嬰獻此璽及髙祖即位仍佩之因以相傳故號曰傳國璽漢昭帝時殿中一夜相驚霍光即召持節郎取璽郎不與光欲奪之郎案劔曰頭可得而璽不可得光善之明日遷郎秩二等光後廢昌邑王賀立宣帝光自手解取賀璽扶令下殿至漢平帝王莽簒位就元后求璽乃出璽投之於地璽上螭一角缺及莽敗時帶璽綬避火於漸臺商人杜呉殺莽取綬不知取璽及莽頭公賔就見問綬主所在乃斬莽首弁璽與王憲憲得無所送又自乘天子車輦李松入長安斬憲送璽詣宛上更始赤眉大司馬謝祿至髙陵更始奉璽赤眉亦立劉盆子建武三年盆子敗於宜陽璽還光武孫堅從桂陽入討董卓卓時以焚燒洛邑徙東都長安堅軍於城南見井中旦旦有光軍人莫敢汲堅乃探得璽初卓作亂掌璽者投於井中故堅得之袁紹有盗僭意乃拘堅妻逼求之紹得璽見魏舉以向肘魏武惡之紹敗璽得還漢以禪魏魏禪晉趙王倫簒立使義陽王威就惠帝取璽帝不與强奪之晉懷帝永嘉五年王彌入洛陽執懷帝及傳國六璽詣劉曜後為石勒所并璽復屬勒勒刻一邉云天命石氏此題今不復存勒為冉閔所㓕此璽屬閔閔敗璽存閔大將軍蔣幹晉鎮西將軍謝尚遣督䕶何融至購賞得之以晉穆帝永和八年還江南晉元帝東渡厯數帝無玉璽北人皆云司馬家是白板天子又曰雍州璽者晉㤗光十九年雍州刺史郗恢表慕容永稱藩奉璽方六寸厚三寸上蟠螭為鼻合髙四寸六分四邉龜文下有八字其文曰受天之命皇帝夀昌鳥篆隱起巧麗驚絶是慕容所制原其所由未詳厥始也吕氏春秋曰民之於上若璽於塗印方則方印圓則圓山陽公載紀曰袁術將僭號聞孫堅得傳國璽乃拘堅夫人而奪之玉璽譜云袁紹拘堅夫人奪之應劭}
