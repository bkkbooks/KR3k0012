  - {type: variant, offset: 16, length: 0, content: '', WYG: 云四采絳地骨白羽青黄赤縁長二丈二尺二百六首諸侯貴人相國緑綬三采緑紫紺淳緑圭長二丈一尺二百四十首將軍紫綬二采紫白淳紫圭長一丈七尺百八十首}
  - {type: variant, offset: 17, length: 0, content: '', WYG: 主封君同又漢官儀云丞相御史大夫匈奴亦同九}
  - {type: variant, offset: 18, length: 0, content: '', WYG: 中二千石一云青緺綬緺綬青色緺音𤓰二千石青綬三采青白紅淳青圭長一丈七尺一百二十首又漢官儀綬羽青地桃花縹長丈八尺自青綬以上縌音逆皆長三尺二寸與綬同采而首半之縌者古佩襚也佩襚相迎受故曰縌紫綬以上縌綬之間得施玉環玦千石六百石黑綬三采青赤紺淳青圭長丈六尺八十首又漢官儀云黑綬白羽青地絳二采長丈七尺四百石丞尉三百石長相二百石皆黄綬淳一采黄圭長丈五尺六十首又漢官儀云黄綬縁八十首長丈七尺自黑綬以下縌長三尺與綬同采而首半之百石青紺綬一采宛轉繆織圭長丈二尺凡先合單紡為一絲四絲為一扶五扶為一首五首為一文文采淳為一圭首多者絲細少者麤皆廣尺六寸史記曰武帝召東郭先生出拜為郡督都尉先生久待詔公車行雪中履有上無下及其拜為二千石佩青緺之綬也漢書曰諸侯王髙帝初置金璽盩綬如淳曰盩音戾綠也晉灼曰盩草也出琅邪平昌縣又曰朱買臣字翁子拜㑹稽太守上謂之曰富貴不歸故鄉如衣繡夜行買臣頓首謝乃微行懷其印綬歩歸郡邸邸吏方相與羣飲不視買臣買臣共飲醉飽少間守邸微見其綬而引之即㑹稽太守章也守邸驚出相語掾吏皆云妄誕守邸曰試觀之素輕買臣者入見皆驚走大呼曰實然乃推排庭中拜謁又曰蕭育字次君與朱愽友善人稱曰蕭朱結綬又曰南越反楊僕拜樓船將軍東越反上復欲使為將僕甚伐前勞勅責之曰士卒暴露連嵗將軍不念其勤勞而造佞巧請乘傳行塞因歸家懷銀黄垂三組誇鄉里是三過也又曰金日磾兩子賞建俱侍中與昭帝同共卧起賞為}
