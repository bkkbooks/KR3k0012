  - {type: variant, offset: 184, length: 164, content: 古者諸侯貳車九乘秦滅六國兼其服故大駕屬車八十一乘又曰凡乘輿車皆羽蓋金華瓜黃屋左纛金鍐亡范切方釳繁纓重轂副鎋黃屋者蓋以黃為裏也左纛者以𣯛牛尾為之大如斗在最後左騑馬頭上金鍐者馬冠也高廣各五寸上如三華形在馬髦前方釳者鐵也廣數寸在馬髦後有三孔垂翟尾其中繁纓在馬膺前重轂者轂外復有小轂施轄晉諸公贊曰賈后女宣華公主葬皆羽葆鼓吹熊渠次飛為鹵簿, SBCK: 長壽萬年}
