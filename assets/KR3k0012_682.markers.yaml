  - {type: variant, offset: 546, length: 0, content: '', SBCK: 尅上邽遣主簿趙封送傳國玉璽太子玉璽各一于勒又曰符堅奔五將山姚萇遣將軍呉忠圍之堅衆奔散獨侍御十數人而巳神色自􅀂坐而待之召宰人進食俄而忠至執堅以歸新平幽之于別室萇求傳國璽於堅曰萇次膺符暦可以爲惠堅瞋目叱之曰小羗乃敢干逼天子豈以傳國璽授汝羗也圖緯符命何所依據五胡次序無汝羗名違天不祥其能乆乎璽巳送晉不可得也又曰冉閔殺石􅕼僣大號遣其使人}
