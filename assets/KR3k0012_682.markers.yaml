  - {type: variant, offset: 971, length: 6, content: 異起宅東陂窮, SBCK: 組綬大夫佩水倉玉而純組綬世子佩瑜玉而綦組綬士佩瓀玟緼組綬􅀃文曰緺紫青色綬也應劭漢官儀云綬者有所受以别尊卑彰有德也又云綬長一丈二尺法十二月闊三尺法天地人董巴輿服志曰戰國解去紱珮留其􅁝禭以爲章表􅁗乃以}
