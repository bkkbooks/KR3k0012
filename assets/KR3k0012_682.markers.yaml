  - {type: variant, offset: 1378, length: 0, content: '', SBCK: 楚王來朝就國明帝告諸王傳相王之子年五歲以上皆令帶列侯綬復送綬十九枚爲諸子在道欲急帶之也又曰李忠仲都發兵奉世祖封武固侯時無綬上自解所佩綬以賜忠又曰弟五倫諸王當㱕國詔書選三署}
  - {type: variant, offset: 1378, length: 0, content: '', krp: 楚王來朝就國明帝告諸王傳相王之子年五歲以上皆令帶列侯綬復送綬十九枚爲諸子在道欲急帶之也又曰李忠仲都發兵奉世祖封武固侯時無綬上自解所佩綬以賜忠又曰弟五倫諸王當㱕國詔書選三署}
  - {type: variant, offset: 1379, length: 0, content: '', SBCK: 􅀘王家長史除倫爲淮陽王醫工長時軰除者多綬盡但假印倫請於王王賜之綬又曰馬防爲車􅀐將軍城門校尉置􅁺史位在九卿上絶席詔封頴陽侯持以前叅醫藥懃勞省闥以襄城羙亭千二百五十户増防身帶三綬寵貴至盛又曰掠得羗侯君長紫綬十七艾綬二十八黄綬二枚皆入簿貴人相國緑綬三綵緑紫白純緑圭公侯將軍紫綬二彩紫白純紫圭公主封君同九卿中二千石靑綬三彩青白紅純青圭千石六百石黒綬二彩靑紺純青圭四百三百二百石黄綬純黄一彩百石青紺綬一彩宛轉繆織魏志曰太祖與吕布書國家無好金􅀌自取家好金更相爲作印國家無紫綬自取所帶綬以藉心又曰丁謚父斐字文侯建安末太祖征吴斐隨行自以家牛羸困􅀻易官牛􅀍収送獄奪宦後太祖啁斐曰文侯印綬何在斐亦知見戲也對曰以易餅晉輿服志曰諸假印綬而官不給鞶囊得自具作其但假印不假綬者不得佩綬也晉書曰衛瓘録尚書事加緑縁綬履上殿入朝不趍晉令曰皇太子及妃諸王纁朱綬郡公主朱綬郡侯青朱綬梁書曰張纉爲尚書僕射議南郊印綬官􅀂備朝服冝並着綬時並施行􅀶物志曰光武嫌二千石綬不青而細朱浮議更用青羽又曰太僕朱浮言詔書曰百官皆帶王莽時綬又不齊因前􅀽安故綬二李渉等六家所織綬不能具丙丁文能如組狀募能爲丙丁文謹圖􅀞一綬丙丁制度賜縑五十疋今王莽時六安都尉留應募能爲丙丁文謹処武庫給食留晝夜思念諷誦狂癡三十日病愈今文以成請賜縑五十疋西京雜記曰昭陽殿上設五色流􅂫帶以緑文紫綬又曰趙飛鷰爲皇后其弟上遺五色文綬蔡邕獨断曰皇后赤紱玉璽貴人緺綬金印五色也蔡邕􅄂章曰相國金印緑綬位在公上所以殊異休烈群臣莫得而齊新序曰昌邑王取侯王二千石黒綬黄綬與左右佩之龔遂諌曰髙皇帝造花綬五等陛下取之而與賤人臣以爲不可願陛下収之風俗通曰車􅀐將軍馮緄字鴻卿爲議郎發綬笥有二赤虵可長二尺分南北走大用憂怖季山孫字寜方得其先人秘要緄請使卜云君後三歳當爲邊將東北四五千里官以東爲名復五年爲大將軍南征此吉祥也居無幾拜遼東太守㑹武陵蠻夷黄髙攻燒南郡鴻卿以威名素著選登亞將奮虓虎之勢又曰􅁗昭王}
