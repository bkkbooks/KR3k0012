  - {type: variant, offset: 19, length: 1, content: 引, WYG: 軍都尉建駙馬都尉及賞嗣侯佩侯綬上謂霍將軍曰金氏兄弟兩人不可使俱兩綬耶霍光曰賞自嗣父侯耳上笑曰侯不在我與將軍乎光曰髙帝之約有功乃得封侯時俱八九嵗又曰莽上漸臺商人杜呉殺莽取其綬漢名臣奏云大司空朱浮奏曰車府丞宏受詔乘輿綬五采何多黄也可更用赤絲為地東觀漢記曰沛王楚王來朝就國明帝告諸王傅相王之子年五嵗以上皆令帶列侯綬復送綬十九枚為諸子在道欲急帶之也又曰李忠字仲都發兵奉世祖封武固侯時無綬上自解所佩綬以賜忠又曰第五倫諸王當歸國詔書選三署郎補王家長史除倫為淮陽王醫工長時輩除者多印綬皆假倫請於王王賜之綬又曰馬防為車騎將軍城門校尉置掾史位在九卿上絶席詔封頴陽侯特以前叅醫藥勤勞省闥以襄城美亭千二百五十户増防身𢃄三綬寵貴至盛又曰掠得羗侯君長紫綬十七艾綬二十八黄綬二枚皆入簿後漢書曰陳蕃為三公臨拜歎曰叔度若在吾不先佩印綬矣漢末雜事曰詔賜陳留蔡邕金龜紫紱邑表曰邕退省金龜紫紱之飾非臣庸體之所能當也魏志曰太祖與吕布書國家無好金孤自取家好金更相為作印國家無紫綬自取所帶綬以表孤心又曰丁謚父斐字文侯建安末太祖征呉斐隨行自以家牛羸困私易官牛被收獄奪官後太祖調斐曰文侯印綬何在斐亦知見戯也對曰以易餅晉輿服志曰諸假印綬而官不給鞶囊得自具作其但假印不假綬者不得佩綬也晉書曰衞瓘錄尚書事加綠綟綬履上殿入朝不趨晉令曰皇太子及妃諸王纁朱綬郡公主朱綬郡侯青朱綬梁書曰張纘為尚書僕射議南郊印綬官若備朝服宜並着綬時並施行博物志曰光武嫌二千石綬不青而細朱浮議更用青羽又曰}
