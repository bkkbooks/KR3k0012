  - {type: variant, offset: 724, length: 169, content: 佯不知指韞所畫形云是誰韞曰是我也其庸如此又曰顏延之子竣既貴重權傾一朝凡所資供延之一無所受器服不改居宅如舊常乘羸牛車逢竣鹵簿即屏住道側又曰文帝鎮江陵王華為西中郎主簿諮議參軍文帝未親政事悉委司馬張邵華性尚物不欲人在己前邵性豪每行來常引夾轂華出入乘牛車從者不過兩三人以矯之常相逢華陽若不知是邵謂左右曰此鹵簿甚盛必是殿下乃下牽車立於道側及邵至乃驚, SBCK: 􅀒璽陪乗}
