  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第六百八十二}
  body:
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 三璽綬璽說文曰璽王者印也以守􅁟故字從􅁟籕文從玉春秋後語曰􅁗破魏軍於華陽走我將軍孟夘王使叚干木子崇與􅁗南陽以千金和􅂫代謂王曰欲璽者叚干木子也欲地者􅁗也今王使欲地者制璽欲璽者制地魏地不盡則不和言叚子木子以地兊􅁗而求相印且夫以地事􅁗譬猶以薪救火薪不盡火不滅也王曰是則然矣雖然事始巳行不可更矣史記曰沛公先至覇上秦王子嬰係勁以組封皇帝璽符節降軹道旁又曰人有告絳侯周勃欲反下捕勃治之文帝曰絳侯綰皇帝璽將兵於北軍不以此時反今居一小縣頋欲反耶漢書曰􅀄髙祖入咸陽得􅁗璽及即天子位因御服其璽世世傳受號曰傳國璽以孺子未立璽藏長樂宫及莽即位請璽元后后不肯以授莽莽使安陽侯王舜諭旨太后怒罵之曰而屬父子宗族􅂪漢家力冨貴累丗旣無以報受人􅀌􅀉便奪取其國爲人如此者狗不食其餘若自以金匱符命爲新皇帝當自更作璽何以用此亡國不祥璽我爲漢家老寡婦旦暮且死欲與此璽俱葬終不可得也太后因涕泣舜曰莽必欲得傳國璽寧能終不與耶太后聞舜語切乃出璽投之地以授舜曰我老巳知而兄弟今族滅也又王莽傳曰梓橦人哀章素無行好爲大言見莽居攝即作銅匱爲兩檢署其一曰天帝行璽金匱其}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_682-1b}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 三璽綬璽説文曰璽王者印也以守土故字從土籕文從玉春秋後語曰秦破魏軍於華陽走我將軍孟卯王使段干木子從與秦南陽木以千金和蘇代謂王曰欲璽者段干木子也欲地者秦也今王使欲地者制璽欲璽者制地魏地不盡則不和言段干木于以地説秦而得求相印且夫以地事秦譬猶以薪救火薪不盡火不㓕也王曰是則然矣雖然事始已行不可更矣史記曰沛公先至覇上秦王子嬰係頸以組封皇帝璽符節降軹道旁又曰人有告絳侯周勃欲反下捕勃治之文帝曰絳侯綰皇帝璽將兵於北軍不以此時反今居一小縣顧欲反耶漢書曰初髙祖入咸陽得秦璽及即天子位因御服其璽世世傳授號曰傳國璽以孺子未立璽藏長樂宫及莽即位請璽太后后不肯以授莽莽使安陽侯王舜諭指太后怒罵之曰而屬父子宗族蒙漢家力富貴累世既無以報受人孤寄便奪取其國為人如此者狗不食其餘若自以金匱符命為新皇帝當自更作璽何以用此亡國不祥璽為我漢家老寡婦旦暮且死欲與此璽俱葬終不可得也太后因涕泣舜曰莽必欲得傳國璽寧能終不與耶太后聞舜語切乃出璽投之地以授舜曰我老已知而兄弟今族滅也又王莽傳曰梓潼人哀章素無行好為大言見莽居攝即作銅匱為兩檢署其一曰天帝行璽金匱圖其}
