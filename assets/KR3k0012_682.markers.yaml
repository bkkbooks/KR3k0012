  - {type: variant, offset: 13, length: 0, content: '', WYG: 黄赤綬四采黄赤紺縹淳黄圭長二丈九尺五百首太皇太后皇太后皇后皆同又漢官儀云乗輿綬黄地骨白羽青絳縁五采四百首長二丈三尺王赤綬四采赤黄縹紺淳赤圭長二丈八尺三百首公主}
