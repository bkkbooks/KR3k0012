  - {type: variant, offset: 351, length: 0, content: '', SBCK: 義陽王威無操行謟附趙王倫倫將簒使威與黄門郎駱休逼}
  - {type: variant, offset: 351, length: 837, content: 帝自鄴還洛河間王顒將張方遣三千騎奉迎將渡河橋方又以新乘陽燧車青蓋三百人為小鹵簿迎帝至邙山下又曰王浚都督幽州和演欲殺浚并其眾演與烏丸單于審登謀之於是與浚期遊薊城南清泉水上薊城內西行有二道演浚各從一道演與浚欲合鹵簿因而圖之值天暴雨兵器霑濕不果而還單于由是與其種人謀曰演圖殺浚事垂克而天卒雨使不得果是天助浚也違天不祥我不可久與演同乃以謀告浚浚密嚴兵夜與單于圍演演持白幡詣浚降浚遂斬之又載記曰石季龍常以女騎一千為鹵簿皆著紫綸巾熟錦袴金銀鏤帶五丈織成鞾遊于戲馬觀上安詔書五色在木鳳之口鹿盧迴轉狀若飛翔焉宋書曰孝武舉義兵沈慶之有功初慶之嘗夢引鹵簿入廁中慶之甚惡入廁之鄙時有善占夢者為解之曰君必大富貴然未在旦夕問其故荅云鹵簿故是富貴容廁中所謂後帝也知君富貴不在今主及中興之功自五校至是而登三事又曰宋劉韞字彥文歷湘雍二州剌史令畫工圖鹵簿羽儀常自披翫以示蔡興宗興宗佯不知指韞所畫形云是誰韞曰是我也其庸如此又曰顏延之子竣既貴重權傾一朝凡所資供延之一無所受器服不改居宅如舊常乘羸牛車逢竣鹵簿即屏住道側又曰文帝鎮江陵王華為西中郎主簿諮議參軍文帝未親政事悉委司馬張邵華性尚物不欲人在己前邵性豪每行來常引夾轂華出入乘牛車從者不過兩三人以矯之常相逢華陽若不知是邵謂左右曰此鹵簿甚盛必是殿下乃下牽車立於道側及邵至乃驚齊書曰虞悰遷太子右率永明八年大水百官戎服救太廟悰朱衣乘車鹵簿於宣陽門外入行馬內驅逐入被奏見原又曰陳顯達建武世心懷不安深自貶退車乘朽故導從鹵簿皆用羸小梁書曰朱異起宅東陂窮采功晚日麗來下酣飲其中每迫曛黃慮臺門將闔乃引其鹵簿自宅至城使捉城門停留管籥又曰呂僧珍為兗州剌史姊適于氏住市西小屋臨路與列肆雜僧珍常導從鹵簿到其宅不以為恥南史曰王僧孺為尚書右丞僧孺少孤貧與母鬻紗為業母嘗攜之至市道遇中丞鹵簿驅迫墜溝及是拜日引騶清道悲感不自勝陳書曰長沙王叔堅與始興王叔陵並招聚賓客各爭權寵甚不平每朝會鹵簿不肯為先後必分道而趍左右或爭道而鬥至有死者隋書曰晉氏鹵簿御史軺車行中道班劍晉公卿禮祑曰諸公及開府位從公者給, WYG: 懸}
