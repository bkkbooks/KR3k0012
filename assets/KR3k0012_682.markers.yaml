  - {type: variant, offset: 10, length: 10, content: 漢乘輿大駕儀公卿奉引, SBCK: 􅃰郡}
  - {type: variant, offset: 10, length: 0, content: '', WYG: 孔子稱封泰山禪梁父可得而數七十有二傳曰封者以金泥銀繩印之以璽璽施也信也古者尊卑共之月令曰固封璽春秋傳襄公在楚武子使治璽書而與之是也秦}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_WYG_682-11b, image: WYG0899/WYG0899-0134d.png}
  - {type: variant, offset: 10, length: 10, content: 漢乘輿大駕儀公卿奉引, krp: 涿郡}
  - {type: variant, offset: 11, length: 0, content: '', WYG: 以來尊者以為名乃使避又曰天子有傳國璽文曰受命于天既夀且康漢舊儀曰秦已前民皆以金銀銅犀象為方寸璽各服所好漢以來天子獨稱璽又以玉羣臣莫敢用也又曰皇帝六璽皆白玉螭虎紐文曰皇帝行璽皇帝之璽皇帝信璽天子行璽天子之璽天子信璽凢六璽皇帝行璽賜諸侯王書信璽發兵徴大臣天子行璽䇿拜外國事天子之璽事天地鬼神璽皆以武都紫泥封青布囊白素裏兩端尺一櫃中約署崔浩漢紀音義曰傳國璽是和氏璧作之趙書曰劉曜於龍門河水中得玉璽文曰克壽永昌曜以為天賜神璽齋而受之石虎别傳曰武鄉長城縣民韓强在長城西山巖石闕中得𤣥璽一方四寸厚二寸與璽同文曰受命于天既夀永昌虎以為瑞燕書曰元璽六年蔣幹遣太子詹事劉猗賫傳國璽詣晉求救猗負璽行數里忽黄霧四塞不得進取乃還易行璽始得去叚龜龍涼州記曰吕光時州人陳冲得玉璽廣三寸長四寸直看無文字向日視之字在腹裏言光當王王彪之議曰未詳傳國璽造創之始歴代以來揖讓禪位以兹相授故視傳國之守器也拾遺記曰武王滅紂樵夫牧豎探烏巢得赤玉璽文曰水德方滅火祚方盛文皆大篆故三分天下而二分歸周又曰晉太康元年孫皓送六金璽云時無玉故以金為印璽漢武内傳曰西王母佩金剛靈璽鄧析書曰為之符璽以信之則并與符璽而竊之綬爾雅曰繸綬也即佩玉之組也所以連繋瑞王者因通謂之繸也禮記玉藻曰天子佩白玉而𤣥組綬公侯佩山𤣥玉而朱組綬大夫佩水蒼玉而純組綬世子佩瑜玉而綦組綬士佩瓀玟韞組綬説文曰緺紫青色綬也應劭漢官儀云綬者有所受以别尊卑也彰有德也又云綬長一丈二尺法十二月濶三尺法天地人董巴輿服志曰戰國解去紱佩留其絲禭以為章表秦乃以采組結連於禭光明章表轉相結綬故謂之綬}
