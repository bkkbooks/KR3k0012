  - {type: variant, offset: 1413, length: 209, content: 設使成帝復生天下不可復得況詐子輿乎又曰建武元年杜詩為侍御史安集洛陽時將軍蕭廣放縱兵士暴橫民間詩勑曉不改遂格殺廣還以狀聞上召見賜以棨戟復使之河東誅降逆賊楊異等漢雜事曰奉車都尉竇固征匈奴騎都尉秦彭副令彭別屯彭擅斬軍司馬固奏彭不由督率專賊殺人公卿議皆以為固議是公府掾郎躬以為彭得斬人上曰軍正校尉一統督將何以得專殺躬對曰一統將者謂在部曲也今彭別將軍事至急勢不得關督漢制假棨戟以當斧鉞議者皆屈上從之吳志曰孫權拜諸葛恪撫越將軍領丹, SBCK: 南}
