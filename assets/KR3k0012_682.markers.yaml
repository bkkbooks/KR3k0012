  - {type: variant, offset: 896, length: 2, content: 虞悰, SBCK: 謝朏爲宋侍郞領祕書監及髙帝受禪朏當日在直百僚陪位侍中當解璽朏陽不知曰有何公事傳詔云解璽授齊王朏曰齊自應有侍中乃引枕卧傳詔懼乃使稱疾欲取兼人朏曰我無疾何所道遂朝服歩出東掖門乃得車仍還宅是日遂以王儉爲侍中解璽旣而武帝請誅朏髙帝曰殺之則成其名正應容之度外北史曰后妃􅀓典琮三人掌琮璽翫器北齊書曰辛術鎮廣陵獲傳國璽送鄴文宣以璽告於太廟此璽即􅁗所制方四寸上紐交盤龍其文曰受命于天旣壽永昌二漢相傳又應魏晉晉懷帝敗没於劉聦聦敗没於石氏石氏敗晉穆帝永和中濮陽太守戴僧施得之遣督護何融送于建鄴歷宋齊梁敗侯景得之景敗侍中趙思賢以璽投景南兖州刺史郭元建送于術故術以進焉又曰元暉業天保二年從駕至晉陽於宮門外罵元韶曰爾不及一老嫗背􅀒璽與人何不打碎之我出此言知即死然爾詎得幾時文宣聞而殺之後周書曰宇文氏其先曰普迴因狩得玉璽三鈕有文曰皇帝璽普迴異之以爲天授其俗謂天曰宇因號宇文國并以爲氏唐書曰貞元二年神䇿將温嘉順得白玉印其文曰天子之寳獻之即傳國八寳之一上幸奉天後失之及是方獲玉璽譜曰傳國璽是秦始皇所刻其玉出藍田山是丞相李斯所書其文曰受命于天旣壽永昌漢髙祖定三􅁗􅁗王子嬰獻此璽及漢髙即位仍佩之因以相傳故號曰傳國璽漢昭帝時殿中一夜相驚霍光即召持節郞取璽郎不與光欲奪之郞案剱曰頭可得璽不可得光善之明日}
