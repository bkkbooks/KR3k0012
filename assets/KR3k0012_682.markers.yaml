  - {type: variant, offset: 1347, length: 3, content: 韓延壽, SBCK: 諸侯王髙帝􅀄置金璽盩綬如淳曰盭音戻縁也晉灼曰盭草也出琅耶平昌縣又曰朱買臣字翁子拜㑹稽太守上謂之曰冨貴不歸故郷如衣錦夜行買臣頓首謝乃微行懷其印綬歩歸郡邸邸吏方與群飲不視買臣買臣共飲醉飽少間守邸微見其綬而引之即㑹稽太守章也守邸驚出相語􅁺吏皆云妄誕守邸曰試觀之素輕買臣者入見皆驚走大呼曰實然乃推排庭中拜謁又曰蕭育字次君與朱􅀶友善人稱曰蕭朱結綬又曰南越反楊僕拜樓舩將軍東越反上復欲使爲將僕甚伐前勞勑責之曰士卒􅁀露連歳將軍不念其懃勞而造侫巧請乗傳行塞因用㱕家懷銀黄垂三組誇鄉里是三過也又曰金日磾兩子賞建俱侍中與昭帝同共卧起賞爲奉車都尉建附馬都尉及賞嗣侯佩侯綬上謂霍將軍曰金氏兄弟兩人不可使俱兩綬耶霍光曰賞自嗣爲侯耳上􅀏曰侯不}
  - {type: page-break, offset: 1347, content: '', id: KR3k0012_SBCK_682-9b}
  - {type: variant, offset: 1347, length: 3, content: 韓延壽, krp: 諸侯王髙帝𥘉置金璽盩綬如淳曰盭音戻縁也晉灼曰盭草也出琅耶平昌縣又曰朱買臣字翁子拜㑹稽太守上謂之曰冨貴不歸故郷如衣錦夜行買臣頓首謝乃微行懷其印綬歩歸郡邸邸吏方與群飲不視買臣買臣共飲醉飽少間守邸微見其綬而引之即㑹稽太守章也守邸驚出相語掾吏皆云妄誕守邸曰試觀之素輕買臣者入見皆驚走大呼曰實然乃推排庭中拜謁又曰蕭育字次君與朱博友善人稱曰蕭朱結綬又曰南越反楊僕拜樓舩將軍東越反上復欲使爲將僕甚伐前勞勑責之曰士卒暴露連歳將軍不念其懃勞而造侫巧請乗傳行塞因用㱕家懷銀黄垂三組誇鄉里是三過也又曰金日磾兩子賞建俱侍中與昭帝同共卧起賞爲奉車都尉建附馬都尉及賞嗣侯佩侯綬上謂霍將軍曰金氏兄弟兩人不可使俱兩綬耶霍光曰賞自嗣爲侯耳上笑曰侯不}
