  - {type: variant, offset: 901, length: 6, content: 右率永明八年, SBCK: 􅉟事劉猗賷傳國璽詣晉求救猗􅀒璽行數里天黄霧四塞不得進易取行璽始得去叚􅀛龍凉州記曰吕光時州人陳冲得玉璽廣三寸長四寸直看無文字向曰視之字在腹裏言光當王王彪之議曰未詳傳國璽造創之始歷代以來揖讓禪位以兹相授故是傳國之守器也拾遺録曰武王㓕紂樵夫牧竪探鳥巢得赤玉璽文曰水德方㓕火祚方盛文皆}
