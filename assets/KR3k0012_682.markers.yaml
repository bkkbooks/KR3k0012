  - {type: variant, offset: 4, length: 2, content: 鹵簿, SBCK: 署曰赤帝行璽莽至髙廟拜授又曰王閎王莽叔父哀帝丗爲中常侍時董賢爲大司馬帝臨崩以璽綬付賢曰無妄以與人時國無嗣主内外恐懼閎白元后請奪之即帶劒至宣德闥謂賢曰宫車晏駕國嗣未立君受恩􅀷重當俯伏號泣何事乆持璽綬以待禍至耶賢不敢拒乃跪授璽綬後}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_682-2a}
  - {type: variant, offset: 4, length: 1, content: 鹵, WYG: 署曰赤帝行璽莽至髙廟拜受又曰王閎王莽叔父哀帝世為中常侍時董賢為大司馬帝臨崩以璽綬付賢曰無妄以與人時國無嗣主内外恐懼閎白元后請奪之即帶劔至宣德闥謂賢曰宫車晏駕國嗣未立君受恩深重當俯伏號泣何事久持璽綬以待禍至耶賢不敢拒乃跪授璽綬後漢書曰􅃰郡太守張豐執使者舉兵反自稱無上大將軍與彭寵連兵四年祭遵朱祐破之初豐好方術有道士言豐當為天子以五綵囊裹石繫豐肘云石中有玉璽豐信之遂反及執當斬猶曰肘石有玉璽遵為椎破之豐乃知被詐仰天歎曰當死無所恨又曰延熹八年渤海妖賊蓋豋稱太上皇帝有玉印珪璧鉄劵相署置皆伏誅續漢書曰肘豋等有玉印五皆如白石文曰皇帝信璽皇帝行璽其三無文字續漢書曰獻穆曹后曹操之女也魏受禪遣使求璽綬后怒以璽綬抵軒下因涕泣横流曰天不祚此璽魏志曰太祖崩洛陽時鄢陵侯彰行越騎將軍從長安來赴問賈逵先王璽綬所在逵正色曰太子在鄴國有儲副先君璽綬非君所宜問也又曰太和元年以中山魏昌之安城鄉追封甄逸諡曰敬侯孫豫襲爵初營宗廟掘地得玉璽方一寸九分其文曰天子羡思慈親明帝為之改容魏畧曰司馬景王廢齊王芳使郭芝入白太后取璽綬太后取璽綬置坐側及迎髙貴鄉公又請璽綬太后曰我見髙貴鄉公小時識之明白我欲自以璽綬手付之呉書曰漢大亂天子北詣河上六璽不自隨掌璽者以投井孫堅討董卓頓洛南其井每有五色氣從井中出堅使人浚之得漢傳國璽其文曰受命于天既壽永昌方圍四寸上有紐文蟠五龍龍上一角缺蜀志曰太傅許靖等上言先主曰前關公圍于禁襄陽襄陽男子張嘉王休獻玉璽潛漢水伏於淵泉暉影燭耀靈光徹天夫漢者髙祖本所起定天下之國號也大王襲先帝軌迹興於漢中也今天子玉璽神光先見璽出㐮陽漢水之末明大王承其下流授與以天子位瑞命符應非人力所致晉記曰江寧民虞迪墾地得白玉麟璽一鈿以獻文曰長夀萬年晉書曰義陽王威無操行謟附趙王倫倫簒使威與黄門郎駱休逼帝奪璽綬倫敗惠帝反正曰阿皮捩吾指奪吾璽綬不可不殺阿皮威小字也於是誅威又曰冉閔子智以鄴來降安西將軍謝尚使濮陽太守戴僧施應之進據枋頭㑹冉智行人劉猗至施乃止使猗求傳國璽猗歸以告智智猶豫不許施因遣叅將何融率壯士百人入鄴登三臺助戍譎之曰今且出璽付我㓙冦在外道路梗澁亦未敢即送當遣單使馳告天子天子聞璽已在吾邉知卿至誠當遣重兵相援智信之乃出璽付融融詣施施使賫璽馳還璽自秦傳漢漢入魏魏入西晉永嘉末洛京不守璽為劉聰所得及石勒㓕劉氏璽入偽趙冉閔誅石氏又入閔及是四十二年而璽復歸於晉晉中興書曰義熙十二年左衞兵陳陽於府前淮水中得璽王者不隱其過則玉璧見璽亦璧也崔鴻十六國春秋前趙錄曰河瑞元年汾水中得玉璽髙一寸二分方四寸文曰有新保之蓋王莽時璽也獻者因増淵海光三字淵以為已瑞大赦又前趙錄曰光初五年并州牧安定王䇿獻玉璽一文曰趙盛又前凉錄曰張寔元年蘭池趙嬰上言於青澗水中得一玉璽鉗鈕光照水外文曰皇帝璽羣寮上賀寔曰何忽有此言乃送之於京師晉書戴記曰石季龍尅上邽遣主}
