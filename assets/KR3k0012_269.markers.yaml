  - {type: variant, offset: 3689, length: 193, content: 八齊君使之治阿既行矣悔之使使追曰未至阿及之還之已至勿還也使者及之而不還君問其故對曰臣見使與共載者白首也夫以老者之智以少者之決必能治阿矣是以不還又曰魯君使宓子賤為單父宰子賤辭去因請借善書者二人其憲法教品魯君與之至單父使書子賤從旁引其肘書醜則怒之欲好則引之書者患之請辭而去歸以告魯君魯君曰子賤苦吾擾之使不得施其善政也乃命有可無得擅徵發單父單父大治故孔子曰君子哉若人魯無君子者斯焉取斯美其德也, SBCK: 九}
