  - {type: variant, offset: 2732, length: 419, content: 倪直勇悍有力便弓弩飛射走獸百不脫一桀悖好犯長吏意到官召署捕賊掾勑謂之云令昔嘗破三軍之眾不用尺兵嘗縛暴虎不用尺繩但以良詐為之耳掾之氣勢安若宜慎之因復召直子涉署門下將游徼私出入寺門無所關白收涉鞭之直走之寺門吹氣大言言無上下意氣勑直能為子屈者自縛誡令不則鞭殺其子直果自縛意告曰令前告汝嘗縛暴虎不用尺繩汝自視何如虎自縛耶勑獄械直父子結連其頭對榜愽壯切欲死掾吏陳諫乃貸之由是相率為善所謂上德之政鷹化為鳩暴虎成狸此之謂也荀氏家傳曰荀貌除太原榆次令為政以德人懷之時有鳳凰集其境內晉武帝下詔褒美太始三年卒吏人如喪親戚為之樹碑其序曰仰之如日月敬之如神明愛之如父母樂之如時雨典略曰韓攸字仲潢潁川人為嬴長時民大飢而太守未至攸因發倉賑之吏白言太守垂至軍糧重事可須來到攸言民命懸急令以擅出穀受罪合眼入地不以為恨也後竟不坐吏民蒙濟者數千人會稽典錄曰徐弘字聖通為汝陰令縣俗剛強大姓兼并弘到官誅剪姦桀豪右歛手啇旅路宿道不拾遺童歌之曰徐聖通政無雙平刑罰姦宄空華陽國志曰王長, WYG: ''}
