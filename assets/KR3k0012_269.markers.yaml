  - {type: variant, offset: 13, length: 2, content: 六國, SBCK: 四卒官詔遣使者臨視唯布􅀍覆屍妻子對哭家無餘財上歎曰董宣死乃知貧耳晉書曰何曽孫機爲鄒平令性亦矜傲責郷里謝鯤等拜或戒之曰禮敬年爵以德爲主今鯤畏勢懼傷風俗機不以爲慙羡爲離狐令旣驕且􅈔陵駕人物郷閭疾之如讎永嘉之末何氏滅亡無遺焉梁書曰沈瑀爲餘姚令冨吏鮮衣美服以自彰別瑀怒曰汝等下縣吏何自擬貴人耶悉使著芒屫麄布侍立終日足有蹉跌輙加榜捶瑀微時甞自至此鬻瓦器爲冨人所辱故因以報焉由是士庻駭怨縣丞史記曰詔捕淮南太子淮南相怒壽春丞留太子建不遣如淳注曰丞主刑獄囚徒故責之漢書曰黄霸爲潁川太守務在成就全安長吏許老丞病聲督郵白欲逐之霸曰許丞廉吏雖老尚能拜起送迎止頗重聽何傷且善助之母失賢者意如淳曰許縣丞也後漢書曰張􅀇宗君夏河陽人也少習}
  - {type: page-break, offset: 13, content: '', id: KR3k0012_SBCK_269-2a}
  - {type: variant, offset: 13, length: 2, content: 六國, WYG: 四卒官詔遣使臨視唯布被覆屍妻子對哭家無餘財上歎曰董宣死乃知貧耳晉書曰何曽孫機為鄒平令性亦矜傲責鄉里謝鯤等拜或誡曰禮敬年爵以徳為主令鯤畏勢懼傷風俗機不以為慙羡為離狐令既驕且恡陵駕人物鄉閭疾之如讐永嘉之末何氏㓕亡無遺焉梁書曰沈瑀為餘姚令富吏鮮衣美服以自彰别瑀怒曰汝等下縣吏何自擬貴人耶悉使著芒履粗布侍立終日足無蹉跌跌加榜棰瑀㣲時常自至此鬻瓦器為富人所辱故因以報焉由是士庶駭怨縣丞史記曰詔捕淮南太子淮南相怒夀春丞留太子建不遣如淳注曰丞主刑獄囚徒故責之漢書曰黄覇為潁川太守務在成就全安長吏許丞老病聾督郵白欲逐之覇曰許丞㢘吏雖老尚能拜起送迎正頗重聴何傷且善助之母失賢者意如淳曰許縣丞也後漢書曰張𤣥字君夏河陽人也少習}
