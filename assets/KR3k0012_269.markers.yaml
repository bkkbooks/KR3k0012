  - {type: variant, offset: 3049, length: 237, content: 可須來到攸言民命懸急令以擅出穀受罪合眼入地不以為恨也後竟不坐吏民蒙濟者數千人會稽典錄曰徐弘字聖通為汝陰令縣俗剛強大姓兼并弘到官誅剪姦桀豪右歛手啇旅路宿道不拾遺童歌之曰徐聖通政無雙平刑罰姦宄空華陽國志曰王長文字德儁元康初試守江源令縣收得盜馬賊及發冢賊長文引見誘慰時適臘晦皆遣歸家獄先有繫囚亦遣之謂曰教化不厚使汝等如此長史之過也蜡節慶祚歸就汝上下善相懽樂過節來還當為汝思他理郡吏惶懼爭請不許尋有赦令無不感恩又曰景毅字文堅梓潼人為高陵令立文學以禮讓化民遷侍御史吏民守闕請之三年不絕, SBCK: 焉}
