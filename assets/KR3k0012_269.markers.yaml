  - {type: punctuation, offset: 3391, content: 「, id: KR3k0012_CHANT_269-bkkpn948}
  - {type: variant, offset: 3392, length: 296, content: 子望為灌壇令朞年風不鳴條文王夢見一婦人甚麗當道而哭問其故婦人言曰我東海太山神女嫁為西海婦欲東歸灌壇令當吾道太公有德吾不敢以暴風疾雨過也文王夢覺明日召太公三日果有疾風暴雨去者皆西來也說苑曰晏子治東阿三年景公召而數之曰吾以子為可而使子治東阿今子治而亂子退而自察也寡人將加大誅乎晏子曰臣請改道易行而治東阿三年不治臣請死之景公許之於是明年上計景公迎而賀之曰善矣子之治東阿也晏子對曰前臣之治東阿屬託不行貨賂不至陂池之魚以利貧民當此之時民無飢者而君反以罪今臣之治東阿也屬託行貨賂至事左右陂池之魚入權家民之貧飢者過半君反迎而賀臣臣願乞骸骨景公乃下席而謝曰子強復治之東阿者子之東阿也寡人無復與焉新序曰昔子奇年, SBCK: 平御覽卷第二百六}
