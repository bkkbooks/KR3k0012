  - {type: variant, offset: 9, length: 0, content: '', SBCK: 縣丞主簿縣尉酷令長漢書曰何並字子廉爲長陵令道不拾遺成太后外家王氏貴而侍中王林卿坐法免歸長陵上冢因留飲連日並恐其犯法乃自造門上謁謂林卿曰冢間單外君冝以時歸林卿曰諾林卿素驕慙於賔客林卿旣去北渡涇橋令􅀐奴還至寺門拔劒剥其建鼓並自從吏兵追林卿行數十里林卿迫窘乃令奴冠􅀍其䄡䄖自代乗從車􅀐身變服從間徑馳去㑹日暮追至收縛冠奴奴曰我非侍中奴耳並心知巳失林卿乃曰君因自稱奴得脫死即叱吏斷頭持還縣所剥鼓置都亭}
  - {type: variant, offset: 9, length: 0, content: '', WYG: 縣丞主簿縣尉酷令長漢書曰何並字子㢘為長陵令道不拾遺卭成太后外家王氏貴而侍中王林卿坐法免歸長陵上冢因留飲連日並恐其犯法乃自造門上謁謂林卿曰冢間單外君宜以時歸林卿曰諾林卿素驕慙於賓客林卿既去北渡涇橋令騎奴還至寺門㧞劍剥其建皷並自從吏兵追林卿行數十里林卿迫窘乃令奴冠被其襜䄖自代乘從車騎身變服從間徑馳去㑹日暮追至收縛冠奴奴曰我非侍中奴耳並心知已失林卿乃曰君因自稱奴得脱死耶叱吏斷頭持還縣所剥皷置都亭}
  - {type: page-break, offset: 9, content: '', id: KR3k0012_WYG_269-1b, image: WYG0895/WYG0895-0403b.png}
  - {type: variant, offset: 9, length: 0, content: '', krp: 縣丞主簿縣尉酷令長漢書曰何並字子廉爲長陵令道不拾遺成太后外家王氏貴而侍中王林卿坐法免歸長陵上冢因留飲連日並恐其犯法乃自造門上謁謂林卿曰冢間單外君冝以時歸林卿曰諾林卿素驕慙於賔客林卿旣去北渡涇橋令騎奴還至寺門拔劒剥其建鼓並自從吏兵追林卿行數十里林卿迫窘乃令奴冠𬒳其䄡䄖自代乗從車騎身變服從間徑馳去㑹日暮追至收縛冠奴奴曰我非侍中奴耳並心知巳失林卿乃曰君因自稱奴得脫死即叱吏斷頭持還縣所剥鼓置都亭}
