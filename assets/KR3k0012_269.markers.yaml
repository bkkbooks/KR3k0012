  - {type: variant, offset: 1869, length: 2, content: 羅衡, krp: 仇香字季和爲書生性謙恭勤恪威矜莊皃不爲晝夜易容言不爲喜怒變聲雖同儕群居必正色後言終身無泄狎之交以是見憚學通三經然無知名之援郷里之舉年四十召爲縣主簿唐職貟令曰主簿掌付事勾稽省署抄目糾正縣内非違監印給紙筆之事縣尉春秋元命苞曰天尉主甲卒設武備今時尉官亦准此義也史記曰張湯給事内史爲寗成掾以湯爲無害言大府調爲茂陵尉治方中漢書音義曰方中陵上土作方也湯主治之也蘇林曰天子即位豫作陵諱之故言方中如淳曰大府幕府也茂陵尉主作陵之尉也韋昭曰大府公府也漢書曰李廣出鴈門匈奴兵多破廣廣亡失多當斬贖爲庻人屏居藍田南山射獵甞夜一騎出從人田間飲還至亭霸陵尉醉呵止廣廣騎曰故李將軍尉曰今將軍尚不得夜行何故也宿廣亭下居無何匈奴入隴西殺太守於是上乃召廣拜爲右北平太守廣請霸陵尉與俱因斬之又曰梅福字子真九江壽春人也少學長安明尚書榖梁春秋爲郡文學𥙷南昌尉後去官東觀漢記曰光武起兵入冦綘衣騎牛殺新野尉乃得馬又曰逢萌字子康北海人少有大節志意抗厲家貧給事爲縣亭長尉過迎拜問事微乆尉去舉拳撾地嘆曰大丈夫安能爲人役耶遂去學問後漢書曰橋玄案梁兾客陳助羊昌罪由是著名舉孝廉𥙷洛陽左部尉時梁不疑爲河南尹以公事當詣府受對玄恥爲所辱乃弃官還郷里又曰令長國相亦皆有尉大縣二人小縣一人主盗賊案察姦軌應劭漢官儀曰大縣丞左右尉所謂命卿二人小縣一人一尉命二人續漢書百官志曰邊縣有鄣塞尉掌禁備羗夷犯塞秩比二百石魏志曰太祖除洛陽北部尉𥘉入尉廨繕治四門造五色棒懸門左右各十餘枚有犯禁者不避豪強皆棒殺之後數月愛幸小黄門蹇石叔父夜行則殺之賊師歛迹莫敢犯者近習寵臣咸共疾之而不能傷蜀志曰劉備率其屬從校尉鄒靖討黄巾有功除安喜尉督郵以公事到縣先主求謁不通直入縛督郵杖二百解綬係其頸弃官亡命唐書曰顔師古隋仁壽中授安養尉尚書左僕射楊素見師古年弱皃嬴因謂曰安養劇縣何以克當師古曰割雞焉用牛刀素竒其對到官果以幹理聞又曰貟半千晉州臨汾人上元𥘉應八科舉授武陟尉屬頻歳旱飢勸縣令殷子良開倉以賑貧餒子良不從㑹子良赴州半千便發倉粟以給飢人懷州刺史郭齊宗大驚因而按之時黄門侍郎薛元超爲河北道存撫使謂齊宗曰公之百姓不能救之而使惠歸一尉豈不愧也遽令釋之又曰王無競}
