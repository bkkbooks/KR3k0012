  - {type: variant, offset: 156, length: 156, content: 庭樹甘露降其廳事後為三公北齊書曰郎茂除衛國令時有繫囚二百茂親自究審數日擇免者百餘人歷年辭訟不詣州省魏州刺史元暉謂曰長史言衛國人不敢申訴者畏明府耳茂曰人猶水也法令為隄防不固必致奔突茍無決溢使君何患哉暉無以應後周書曰辛昂行成都令昂到縣便與諸生祭文翁學堂因共歡宴謂諸生曰子孝臣忠師嚴友信立身之要如斯而已若不事斯語何以成, SBCK: ''}
