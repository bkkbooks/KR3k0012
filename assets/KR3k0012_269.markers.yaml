  - {type: variant, offset: 846, length: 450, content: 馬吏民號哭相謂曰房明府今去吾屬何用生為其後百姓思之立碑頌德又曰劉曠不知何許人也性謹厚每以誠恕應物開皇初為平鄉令單騎之官人有爭訟者輒丁寧曉以義理不加繩劾自各引咎而去所得俸祿賑施窮乏百姓感其德化更相篤勵曰有君如此何得為非唐書曰李大亮授土門令屬百姓饑荒盜賊侵寇大亮遂賣所乘馬分給貧弱勸以墾田歲因大稔躬捕寇盜所擊輒平時太宗在藩巡撫北境聞而嗟歎下書勞之又曰賈敦頤弟敦實貞觀中為饒陽令政化清靜老幼懷之時敦頤復授瀛州刺史舊制大功以上不復連官朝廷以其兄弟在職俱有能名遂不遷替又曰高宗以尚乘奉御權懷恩為萬年令賞能也時有奉乘安畢羅善於調馬上頗狎之懷恩因奏事遇畢羅在左右言戲無禮懷恩既退執而杖之上知而嗟賞謂侍臣曰懷恩乃能不避強禦真良吏也即日遷擢又曰景雲中長安縣令李朝隱加太中大夫朝隱之宰京縣也政刑畢舉權豪懾憚有內寺伯非禮干忤朝隱叱擊于獄上喜焉故有此命又曰路嗣恭京兆三原人始名劍客歷仕郡縣有能名後授神烏令考績上上而為天下最玄宗以其能嗣魯恭賜改其名又曰韋景駿開元中為肥鄉令縣人有母子相訟者景駿謂之曰吾少孤每見人養親自痛終天無分, WYG: 直}
