  - {type: variant, offset: 393, length: 561, content: 邑久無良宰卿文士之內試思其人景歷進曰禇玠廉儉有幹用未審堪其選不高宗曰甚善卿言與朕意同乃除山陰令隋書曰魏德深遷貴鄉長為政清凈不嚴而治會興遼東之役徵稅百端使人往來責成郡縣于時王綱弛紊吏多贓賄所在徵歛下不堪命唯德深一縣有無相通不竭其力所求皆給百姓不擾稱為大治尋轉館陶長貴鄉吏人聞之皆歔欷流涕語不成聲及將赴任傾城送之號泣之聲道路不絕既至館陶闔境老幼皆如見其父母有猾人員外郎趙君寔與郡丞元寶藏深相交結前後令長未有不受其指麾者自德深至縣君寔屏處於室未嘗輒敢出門逃竄之徒歸來如市貴鄉父老冒涉險難詣闕請留德深有詔許之館陶父老復詣郡相訟以貴鄉文書為詐郡不能決會持節使者韋霽杜整等至兩縣詣使訟之乃斷從貴鄉貴鄉吏人歌呼滿道互相稱慶館陶眾庶合境悲哭因而居住者數百家隋書曰蘇威薦房恭懿授新豐令政為三輔之最上聞而嘉之賜物四百叚恭懿以所得賜分給窮乏未幾復賜米三百石恭懿又以賑貧人上聞而止之時雍州諸縣令每朔朝謁上見恭懿必呼至榻前訪以理人之術又曰房彥謙遷長葛令甚有惠化百姓號為慈父仁壽中上令持節使者巡行縣察長吏能不以彥謙為天下第一超授鄀州司馬吏民號哭相謂曰房明府今去吾屬何用生為其後百姓思之立碑頌德又曰劉曠不知何許人也性謹厚每以誠恕應物開皇初為平鄉令單騎之官人有爭訟者輒丁寧曉以義理不加繩劾自各引咎而去所得俸祿賑施窮乏百姓感其德化更相篤勵曰有君如此何得為非, SBCK: 振}
