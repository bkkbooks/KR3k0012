  - {type: variant, offset: 2354, length: 251, content: 給亭於是感激學書慨然長歎曰黃浮非鄉里所知因隨人到京師求學歲餘除昌慮長濮陽令同歲子為都市掾犯罪當死一郡盡為之請浮曰周公誅二弟石碏討其子今雖同歲子浮所不能赦也治政清明號為神君又曰陳曄邵陵人也體尚篤烈學通古今除巫令民張遺腹子年十五為父報讎吏捕得之曄愍曰嗟乎今殺遺腹之孤絕人繼嗣是不仁也法復讎之子是不義也不仁不義焉可以為人君長哉遂解印綬逃亡遇赦乃出鍾玩良吏傳曰高玩字伯珍蜀郡人也除曲陽令及徵還送者不使出界布被縕裘猶去時之服朝野歸其清又曰司馬儁字元異補洛陽令豪右挫氣京都號曰臥虎又曰陳登字元龍廣漢人也為東陽長視民, WYG: 何}
