  - {type: variant, offset: 3304, length: 0, content: '', SBCK: 白羽扇侍從如平生吏見驚走子丈進馬追之謂曰我當爲此土地之神以福尓下民尓可宣告百姓爲我立祠不尓將有大咎荆州圖記曰澧陽縣西百三十里澧水之南岸有白石􅀟立狀􅀋人形髙各三十丈周廻等四十丈古之相傳昔有充縣左尉與零陵尉共論疆因相傷害化爲此石即以爲二縣界首東摽零陵西碣充縣充縣廢省今臨澧縣則其地也墨子曰備城}
