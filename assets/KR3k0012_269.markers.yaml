  - {type: variant, offset: 17, length: 0, content: '', SBCK: 顔氏兼通數家法建武􅀄舉明經􅀘引農文學遷陳倉縣丞清浄無欲專心經書方其講問乃不食終日及有難者輙爲張數家之􅀃令擇從所安諸儒皆伏其多通者録千餘人􅀇􅀄爲縣丞甞以職事對府不知官曹處吏白門下責之時扶風琅耶徐業亦大儒也聞􅀇諸生試引見之與語大驚曰今日相遭真解矇矣遭逢也遂請上堂難問極日吴志曰㑹稽妖賊許昌起於句章自稱陽明皇帝扇動諸縣衆以萬數孫堅以郡司馬募召精勇得千餘人與州郡合討破之刺史臧旻列上功狀詔書除堅鹽績丞數歳從盱眙丞又徙下邳丞又曰孫堅爲下邳丞歴佐三縣所在有稱吏民親附郷里知舊好争少年往來者常數百人堅接撫待養有􅀂子弟也唐書曰武德元年詔京令五品丞一人七品正六人八品畿令六品丞一人七品正四人八品上縣令六品丞一人八品正四人九品中下縣各有差後改爲尉主簿後漢書曰繆肜音融字孺公仕縣爲主簿時縣令􅀍章見考史皆畏懼自誣而肜獨證據掠考苦毒乃至體生虫蛆因轉換五獄踰渉四年令卒以自免又曰寧陽主簿詣闕訴其縣令之枉積六七歳不省乃復上書曰臣聞陛下爲臣父臣爲陛下子臣章百上終不見省臣豈可}
