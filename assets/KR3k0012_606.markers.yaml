  - {type: variant, offset: 276, length: 3, content: 大丈夫, SBCK: 懷幽卷頥戢妙抱宻用舎以道舒卷不失亮唯勤翫無或暇逸梁昭明太子詠書帙詩曰擢影免園池抽莖淇水側幸雜緗囊用聊因班女織槧􅀃文曰槧牘牒也釋名曰槧板長三尺者也槧漸也言漸漸然長也論衡曰断木爲槧楊雄荅劉歆書曰以鈆擿松槧二十七年矣西京􅄂記曰楊子雲好事嘗懷鈆提槧從諸計吏訪殊方絶俗四方之語㨭後漢杜篤書㨭賦曰惟書㨭之麗容象君子之淑德載方矩而履規加文藻之修飾能屈伸以和禮惟髙下而消息雖轉旋而屈橈時傾邪而返側抱六蓺而卷舒敷五經之典式封泥書春秋􅀃曰龍圖赤玉匣封泥如黄珠又曰黄龍五采􅀒圗黄玉匣黄金繩縷黄芝􅅺王子年拾遺曰元封元年浮折國貢蘭金之􅅺此金湯淵盛夏之時水常沸湧有􅀂湯火飛鳥不能過國人行者見水邊有人治此金爲器混混􅀂􅅺如紫磨之色百錬其色變白如銀名曰銀燭嘗以此􅅺封諸函匣令諸宮門􅀑魅不敢干}
