  - {type: variant, offset: 31, length: 1, content: 述, SBCK: 言間也爾雅曰簡謂之畢郭璞曰今簡札也毛詩鹿鳴曰豈不懷歸畏此簡書張璠漢記曰呉祐父恢爲南海太守欲以殺青冩書祐年十二諌曰海濵多珎玩此書􅀂成載必盈兩昔馬援以薏苡興謗王陽以書槖邀名疑惑之戒先賢所愼恢大喜范曄後漢書曰大夫司徒鄧禹西征定河東張宗詣禹自歸禹聞宗多權謀乃表爲將軍禹軍到恂邑赤眉大衆且至禹以恂邑不足守欲引師進就堅城而衆人多畏賊追憚爲後拒禹乃書諸將名於竹簡署其前後亂著笥中令各探之宗獨不肯探曰死生有命宗肯辭難就逸乎禹歎息謂曰愚聞一卒畢力一百人不當万夫致死可以横行宗今擁兵數千以承天威何遽其必敗乎魏畧曰宣王討王陵陵靣􅅞迎遥謂太􅀓曰卿直以折簡召我我當不至耶而引軍來乎太􅀓曰以卿非肯逐折簡者也瀬郷記曰老子母碑曰老子把持仙録玉簡金字編以白銀紀善綴惡楚國先賢傳曰孫敬編楊栁簡以爲經本晨夜誦習劉向別傳曰孫子書以殺青簡編以縹絲繩文士傳曰人有嵩山下得竹簡一版上有兩行科斗之書中外傳示莫能知張華以問束晢晢曰此明帝顯節陵中䇿文也驗校果然風俗通曰劉向別録殺青者直治竹作簡書之耳新竹有汁善折蠧凢作簡者皆於火上炙乾之陳楚間謂之汗汗者去其汁也呉越曰殺亦治也劉向爲孝成皇帝典校書籍二十餘年皆先書竹改易刋定可繕冩者以上素也由是言之殺青者竹斯爲明矣神仙傳曰隂長生裂黄表冩丹經一通封以文石之函著嵩髙山一通黄櫨簡染之書封以青玉之函著華山一通黄金之簡刻}
