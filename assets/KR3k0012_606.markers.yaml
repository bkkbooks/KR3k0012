  - {type: variant, offset: 266, length: 1, content: 傭, WYG: 賃運以刺詣君感見發遣何乃乆屈耶雜事曰髙彪字義方呉郡人志尚甚髙遊太學博覽經史善屬文嘗詣大儒馬融辭不見彪覆刺背書曰伏聞髙問為日乆矣兾一見龍光叙腹心之願以啓其蔽不圖辭之以疾昔周公父文王兄武王九命作相以尹華夏猶握沐吐飱以接白屋之士天下歸徳歴載邈矣今君不能相見宜哉融省大愧遣人辭謝追請徑去不肯返郭林宗别傳曰林宗名益顯士争歸之載刺常盈車禰衡别傳曰衡初遊許下乃懷一刺既到而無所用之至於刺字漫滅幽明録曰一士人姓王坐齋中有一人通刺詣之題刺云舒甄仲既去疑非人尋刺曰是子舍西土瓦中人令掘果於瓦器中得一銅人長尺餘凾呉志曰張温字惠恕使蜀謂先主曰謹奉所賷凾書封晉安帝紀曰朱齡石伐蜀太尉與齡石書署凾曰至白帝乃發書曰衆悉從外外取成都㵴燾於中水出廣漢使羸弱乗髙艦十餘由内水向黄虎傅子曰太祖徴劉煜授以腹心之任毎有疑事輙以凾令問煜乃一夜數十至􅐆說文曰􅐆書衣也晉中經簿曰盛書有縑􅐆刺青縑􅐆布􅐆絹􅐆後漢書曰楊春卿臨命戒子統曰吾綈􅐆下說文曰綈厚繒也綈音提有先祖所傳秘記為漢家用爾其脩之統感父遺言服闋辭家從犍為周循學習先法又就同郡鄭伯山受河洛書及天文推步之術益部耆舊傳曰廣漢王棠妻文拯其前妻子博學好}
