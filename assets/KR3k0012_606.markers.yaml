  - {type: variant, offset: 2532, length: 715, content: 晉傅玄硯賦採陰山之潛璞簡眾材之脩宜節方員以定形鍜金鐵而為池設上下之剖判配法象乎二儀木貴其能軟石美其潤堅加采漆之膠固含冲德之清玄永嘉中記曰硯溪一源泉中多石硯劉澄之宋永初山川古今記曰興平石穴深二百許大石青色堪為硯紙釋名曰紙砥也平滑如砥石也服虔通俗文曰方絮曰紙東觀漢記曰黃門蔡倫典作尚方作紙所謂蔡侯紙也董巴記曰東京有蔡侯紙即倫也用故麻名麻紙木皮名穀紙用故魚網作紙名網紙也王隱晉書曰魏太和六年博士河間張揖上古今字詰其巾部紙今也其字從巾古之素帛依舊長短隨事截絹枚數重沓即名幡紙字從系此形聲也後和帝元興中中常侍蔡倫以故布擣剉作紙故字從巾是其聲雖同系巾為殊不得言古紙為今紙崔鴻前燕錄曰慕容儁三年廣義將軍岷山公黃紙上表儁曰吾名號未異於前何宜便爾自今但可白紙稱䟽沈約宋書曰張永善隸書又有巧思紙及墨皆自營造上每得永表啟輒執玩咨嗟自嘆供御者不之及也唐書曰杜暹為婺州參軍秩滿將歸州吏以紙萬餘張贈之暹唯受一百時人嘆曰昔清吏受一大錢復何異也語林曰王右軍為會稽謝公乞牋紙庫中唯有九萬枚悉與之桓帝云逸少不節拾遺記曰張華獻博物志賜側理紙萬番南越所獻也漢人言陟貍與側理相亂南人以海苔為紙其理縱撗袤側因以為名世說曰戴安道就范宣學所為范宣讀書亦讀書范宣抄紙亦抄紙桓玄偽事曰古無紙故用簡非主於敬也今諸用簡者皆以黃紙代之又曰玄令平淮作青赤縹綠桃花紙使惣精令速作之石虎鄴中記曰石虎詔書以五色紙著鳳鶵口中范甯教曰土紙不可以作文書皆令用藤角紙盛弘之荊州記曰棗陽縣一百許步蔡倫宅其中具存其傍有池即名蔡子池倫漢順帝時人始以魚網造紙縣人今猶多能作紙蓋倫之遺業也異苑曰張仲舒在廣陵晨夕輒見行側有赤氣後空中忽雨絳羅於其庭周廣七八分長五六寸皆箋紙繼之廣長亦與羅等紛紛甚快經宿仲舒暴疾死孫放西寺, WYG: 滴傳𤣥水龜}
