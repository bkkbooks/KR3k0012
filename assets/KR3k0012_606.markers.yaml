  - {type: variant, offset: 357, length: 258, content: 見還淹乃控懷中得五色筆一以授之爾後為詩絕無美句時人謂之才盡梁書曰紀少瑜嘗夢陸倕以一束青鏤管筆授之云我以此筆猶可用卿自擇其善者其文因此遒進又曰鄭灼家貧好學抄義䟽以日繼夜筆毫盡每削用之隋書曰高祖復鄭譯官爵令內史令李德林立作詔書高潁戲謂曰筆乾譯荅曰出為方岳杖策言歸不得一錢何以潤筆上大笑又曰劉行本累遷掌朝下大夫周代故事天子臨軒掌朝典筆硯持至御座則承御大夫取以進之及行本為掌朝將進筆於帝承御復欲取之行本抗聲謂承御曰筆不可得帝驚視問之行本言於帝曰臣聞設官分職各有司存臣既不得佩承御刀承御亦焉得取臣筆帝曰然因令二司各行所職國朝傳, SBCK: 水銀和金爲􅅺東觀漢}
