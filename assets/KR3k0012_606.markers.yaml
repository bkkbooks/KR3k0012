  - {type: variant, offset: 257, length: 2, content: 班超, SBCK: 時天下墾田多不實詔撿覆覈百姓嗟怨諸郡遣使帝見陳留吏牘上有書視之云潁川弘農可問河陽南陽不可問上得之怒時東海公年十二在幄後言曰吏受郡勑欲以懇田相方耳帝曰即如此何故言河陽南陽不可問對曰河南帝城多近臣南陽帝郷多近親田宅踰制不可爲准帝令虎賁詰問吏吏首服遣謁者栲實具知姦狀夢書曰牘札爲薦舉夢得牘札欲薦舉也韓詩曰趙簡子太子名伯魯小子名無恤簡子自爲二牘親自表之書曰節用聽聦敬賢勿慢使能勿賤與二子使􅁪誦之居三年簡子坐青臺之上問二子書所在伯魯亡其表令誦不能得無恤出其書於左􅃑令誦習焉乃黜伯魯而嘉無恤韓詩外傳曰趙簡子有臣周舎立於門下三日三夜簡子問其故對曰臣爲君諤諤之臣秉筆操牘從君之後伺君過而書之札劉熈釋名曰札櫛也編之如櫛齒相比也晉令曰郡國諸户口黄籍籍皆用一尺二寸札巳在官役者載名漢書曰司馬長卿未死時爲一卷書曰有使來求奏之其遺札書言封禪事又曰谷永}
