  - {type: variant, offset: 1009, length: 589, content: 君名晏失筆於地世說曰王東亭嘗夢有人與大筆其管如椽既覺說人云當有大手筆事不日烈宗晏駕哀策謚議並王所作也傳子曰漢末一筆之匣雕以黃金飾以和壁綴以隋珠文以翡翠此筆非文犀之楨必象齒之管豐狐之柱秋兔之翰用之者必被珠繡之衣踐雕玉之履矣王羲之筆經曰漢時諸郡獻兔毫出鴻都惟有趙國毫中用時人咸言兔毫無優劣管手有巧拙又曰有人以綠沉漆竹管及鏤管見遺錄之多年斯亦可愛玩詎以金寶雕琢然為貴也又曰昔人或以瑠璃象牙為筆管麗飾則有之然筆須輕便重則躓矣筆墨法曰作筆當以鐵梳梳兔毫毛及羊青毛去其穢毛使不髯茹羊青為心名曰筆柱或曰墨池東宮舊事曰皇太子初拜給漆筆四枚銅博山筆床副搜神記曰王祐病有鬼至其家留赤筆十餘枚在薦下曰可使人簪之出入辟惡凡舉事者皆無恙荊楚歲時記曰陸士衡云魏武帝劉婕妤以七月七日折璃琉筆嶺表錄異曰番禺地無狐兔多用鹿毛野狸毛為筆又昭富春勤等州則擇鷄毛為筆其用也亦與兔毫無異又曰嶺南無兔嘗有郡收得其皮使工人削筆者醉失之大懼因剪鬢鬚為筆筆甚善更使為之工者辭焉詰其由以實對遂下令使一戶輸人鬚或不能致輒責其直墨釋名曰墨晦也言以物晦墨也漢書王莽傳曰漢兵起莽以墨污渭陵延陵周垣東觀漢記曰和熹鄧后即位萬國貢獻悉禁絕惟歲供紙墨而己范子計然曰墨出三輔上價石百六十中三十下十韋仲將筆墨方曰合墨法好醇煙擣訖以細絹簁於缸中簁去草芥若細沙以細絹簁塵埃此物至輕微不宜露簁慮失飛去不可不慎墨一斤以好膠五兩浸梣皮汁中梣江南樊鷄木皮也其皮入, SBCK: ''}
