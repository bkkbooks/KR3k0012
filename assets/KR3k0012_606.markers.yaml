  - {type: variant, offset: 260, length: 2, content: 仲升, krp: 子雲便於筆札故時人云子雲之筆札婁君卿之脣舌後漢書曰樊崇等西攻更始百萬之衆而無稱號欲立帝求軍中景王後者得七十餘人唯盆子與茂及前西安侯爲最崇等議曰聞古天子將兵稱上將軍乃書札爲符曰上將軍又以兩空札置笥中札簡也笥篋也遂於鄭北設壇埸祠城陽景王諸三老從事皆大㑹陛下列盆子三人居中立以年次探札盆子最幼後探得符諸將乃皆稱臣續漢書曰賈逵字景伯時有神雀入宫章帝勑蘭臺給筆札使逵作神雀頌晉張華有文雅之才晉儀禮釐革制度勑有司給筆札多有損益晉陽秋曰梁國張惲字義元爲郡吏入值太守圍棊投札於地惲曰知府君患風取以支户太守輟棊令坐漢武故事曰上崩後有一人騎馬馬異於常馬持一尺札賜將作大匠丞文曰汝績克成賜汝金十斤因忽不見札變爲金稱之重十斤抱朴子曰魏武帝以左慈爲妖妄欲殺之使人収之慈故欲見而不去欲栲之而獄中有七慈形狀如一不知何者爲真以白武帝帝使人盡將殺之湏臾七慈盡化爲札而一慈徑出走赴群羊詩云有客從南來貽我一書札上叙長相思下言乆離別牒說文曰牒札也文心雕龍曰牒者葉也如葉在枝也短簡爲牒議事未定故短牒諮謀牒之尤宻謂之籖左傳昭六年曰趙簡子令諸侯大夫輸王粟宋樂大心曰我不輸粟我於王爲客二王後爲賓客晉士伯曰自踐土以來宋何役不㑹而何盟不同王室子焉避之右師不敢對受牒而退右師樂大心也漢書曰路温舒字長君鉅鹿東野人父爲里監門使温舒牧羊取澤中蒲截爲牒編用冩書板釋名曰板昄昄平廣也昄半旱切春秋演孔圖曰孔子曰丘作春秋天授演孔圖中有大玉刻一版曰珽璣一低一昻是七期驗敗毀滅之徴也蜀志曰譙周勸劉禪降後元熈二年夏巴郡文立從洛還過見周周語次因書板示立曰典午忽兮月酉没兮典午者謂司馬也月酉八月也至八月而司馬昭果崩王隱晉書曰惠帝時謡曰二月盡三月𥘉桑生裴雷柳葉舒荆筆楊板行詔書宮中大司馬作幾驢而楊駿荆王反幽明録曰王文度鎮廣陵忽見二騶持鵠頭板來召之王大驚問騶我作何官云尊作平北將軍徐兖二州刺史王曰吾巳作此官何故復召耶鬼云此人間耳且令所作是天上官也王大懼亦㝷見迎官玄衣人及鵲衣小吏甚多王㝷疾薨桂陽先賢畫讃曰胡滕部南陽從事遇大駕南廵求索揔猥滕表曰天子無外乗輿所幸便爲京師臣請荆州刺史比司隷臣比都官從事帝竒其才悉許大將軍西曹椽亡馬召滕因作都官鵠頭板召百官敬服相板經曰板有芒角形勢上狹下廣右薄左厚光采流澤文色調逹木理通直皆爲吉反是㓙板細理輕蹙其人性簡逹周正其人寛博板有横節爲病在靣内䘮在背外䘮板有蝎穿及節對過其人凶板中字皆令筆迹調利有形勢字欲當右行空中不用對對則多牽制又上官多憎之官字欲令故官字小新官字大有波勢墨色分明板形平通無絶傷刀迹是元吉官字無形勢點染不分明皆免官或不到官官字小它字墨散入材理中必入獄死板色欲類其姓角家板色青爲吉亦不冝子白不利官屬墨不利父母黄不利妻財凢齎板來者其人姓名善爲喜祥不善則否也相板時要以手持板之若手近板後則板前低而落此則左遷板有病累皆可治改治之用庚申寅曰庚更也申伸也寅引也言更引吉祥也刺釋名曰畫姓字於奏上曰畫刺作再拜起居字皆逹其體使書盡邊徐引筆書之如畫者也下官刺長書中央一行而下也又有爵里刺書其官爵及郡縣郷里也典畧曰王符字節信安定人感激著書名曰潜夫論故渡遼將軍皇甫規去官歸安定或有人前以貨買鴈門太守者亦去官歸畫刺規規卧不迎使人呼入旣坐問啖鴈美乎又以其刺刮髀有湏聞王節信在外規乃驚起衣不及帶倒履而出援其手而還與同席坐大設賔日暮別去人或歎曰何有二千石之賤不如諸生之貴乃如此耶魏名臣奏曰黄門侍郎荀俁奏曰今吏𥘉除有二通爵里刺條䟽行狀夏侯榮傳曰榮字㓜權淵第五子㓜聦明經目輙識文帝聞而請焉賔客百餘人一奏刺悉書其郷邑姓名丗所謂爵里刺示之一過而使之遍談不謬一人帝竒之長沙耆舊傳曰夏侯叔仁氏族單微丁母憂居䘮過禮同郡徐元休弱冠知名聞而弔焉旬日之中積刺盈案呉録曰孟宗爲豫章太守謂倉掾曰君昔負太守一刺寕識之否掾曰不識宗曰吾昔}
