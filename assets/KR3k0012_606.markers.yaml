  - {type: variant, offset: 31, length: 1, content: 述, WYG: 編之篇篇有間也爾雅曰簡謂之畢郭璞曰今簡札也毛詩鹿鳴曰豈不懷歸畏此簡書張璠漢記曰吳祐父恢為南海太守欲殺青簡以冩書祐年十一諫曰海濵多珍玩此書若成載必盈兩昔馬援以薏苡興謗王陽以衣囊徼名嫌疑之間先賢所慎恢大喜范煜後漢書曰大司徒鄧禹西征定河東張宗詣禹自歸禹聞宗多權謀乃表為將軍禹軍到栒邑赤眉大衆且至禹以詢邑不足守欲引師退就堅城衆人多畏賊追憚為後拒禹書諸將名於竹簡署其前後亂著笥中令各探之宗獨不肯探曰死生有命宗肯辭難就逸乎禹歎息謂曰禹聞一卒畢力百人不當萬夫致死可以横行宗今擁兵數千以承天威何遽其必敗乎魏畧曰宣王討王陵陵面縳迎遥謂太傅曰卿直以折簡召我我當不至耶而引軍來乎太傅曰以卿非肯逐折簡者也瀨鄉記曰老子母碑曰老子把持仙録玊簡金字編以白銀紀善懲惡楚國先賢傳曰孫敬編楊柳簡以為經本晨夜誦習劉向别傳曰孫子書以殺青簡編以縹絲繩異苑曰有人嵩山下得竹簡一枚上有兩行科斗之書中外傳示莫能知張華以問束晳晳曰此明帝顯節陵中䇿文也騐校果然風俗通曰劉向别録殺青者宜治竹作簡書之耳新竹有汁善朽蠧凡作簡者皆於火上炙乾之陳楚間謂之汗汗者去其汁也呉越曰殺亦治也劉向事孝成皇帝典校書籍二十餘年皆先書竹改易刋定可繕冩者以上素也由是言之殺青者竹簡為明矣神仙傳曰隂長生裂黄素寫丹經一通封以文石之凾著嵩髙山一通黄櫨之簡漆書之封以青玉之函著華山一通黄金之簡刻}
