  - {type: variant, offset: 216, length: 1, content: 張, WYG: 何敞父比干字少卿為汝隂縣獄吏决曹掾平活數千人後為丹陽都尉獄無寃囚征和三年三月辛亥天大隂雨比干在家日中夢車騎滿門覺而語妻語未竟而門有老嫗求寄避雨雨甚而衣不霑雨止送出門語比干曰公有隂徳天賜君以䇿以廣公之子孫因出懷中符策狀如簡長九寸凡九百九十枚以授比干曰子孫佩印綬者如此數比干年五十八有六男又生三子本始元年自汝隂徙平陵代為名族呉厯曰孫皓時呉郡民掘地得物似銀長一尺三寸刻畫有年月字因改年為天䇿唐書曰貞觀中房𤣥齡議封禪儀玉䇿四枚各長一尺三寸廣一寸五分厚五分每䇿五簡俱以金編其一奠太祖一奠地祗一奠髙祖穆天子傳曰癸巳至於羣玉之山阿平無險言邊無險阻也四徹中繩言皆平直先王謂之䇿府言往古帝王以為藏書䇿之府家語曰哀公問政於孔子孔子曰文武之政布在方䇿牘說文曰牘謂書板也釋名曰牘睦也身執之以進見所以為恭睦也史記曰文帝遺單于尺一寸牘單于以尺二寸牘荅又曰東方朔初入長}
