  - {type: variant, offset: 58, length: 155, content: 來便應有筆也世稱蒙恬造筆何也荅曰自蒙恬始作秦筆耳以柘木為管以鹿毛為柱羊毛為皮所謂鹿毫竹管也非謂古筆也又問曰筆有彤管何也荅曰彤赤漆耳使史官載筆故是赤管言以赤心事也毛詩柏舟靜女曰靜女其變貽我彤管古者后夫人有女史彤管之法后妃群妾以禮御于君所女史書其日月授之環以進退也箋云彤筆赤筆也彤管有煒悅懌女美曲禮曰史載筆士載言也, WYG: 後}
