  - {type: variant, offset: 1599, length: 750, content: 綠色解膠又益墨色可下鷄子白去黃五枚亦以真朱一兩麝香一兩皆別治細簁都合調下鐵臼中寧剛不宜澤檮三萬杵杵多益善合墨不得過二月九月溫時敗臭寒則難乾湩溶見風日碎破重不得過二兩蔡質漢官曰尚書令僕丞郎月賜渝糜大墨一枚小墨一枚東宮舊事曰皇太子初拜紿香墨四丸脩復山陵故事曰玄宮物有墨五丸神仙傳曰漢桓帝徵仙人王遠遠乃題宮門四百餘字皆說方來帝惡之削之外字去內字復見墨入材裏葛龔與梁相書曰復惠善墨下士所無摧骸骨碎肝膽不足明報曹植樂府詩曰墨出青松煙筆出狡兔翰古人感鳥跡文字有改刊葛洪神仙傳曰班孟不知何許人也舒紙於前嚼墨一噴皆成字竟紙各有意義趙壹非草書曰後世慕崔杜張子專欲草書為務十日一筆月數丸墨領袖如皂脣齒常黑屈指畫地爪折䚡出亦効嚬之增醜也陸雲與兄機書曰一日上三臺曹公藏石墨數十萬斤云燒此消復可用然不知兄頗見之不今送二螺鄭氏婚禮謁文讚曰九子之墨藏于松煙盛弘之荊州記曰筑陽縣有墨山山石悉如墨顧微廣州記曰懷化郡掘壍得石墨甚多精好可寫書戴延之西征記曰石墨山北五十里山多墨可以書尋陽記曰廬山有石墨可書災祥集曰天雨墨君臣無道讒人進李尤研墨銘曰書契既造研墨乃陳煙石相附筆䟽以申顧野王輿地志曰漢時王朗為會稽太守子肅隨在郡住東齋中夜有女從地出稱越王女與肅語曉別贈一丸墨肅方注周易因此便覺才思開悟硯釋名曰硯研也研墨使和濡也晉書懷帝陷於平陽劉聰引帝入醼謂帝曰卿為豫章王時朕與王武子俱造卿武子稱朕於卿卿言聞名久矣卿以所作樂府文示朕曰聞君善詞賦試為看也朕與武子俱為盛德頌卿稱善者久之又引朕射于皇堂朕得十二籌卿與武子俱得九籌卿又贈朕柘弓銀硯卿頗憶否帝曰安敢忘之恨爾日不得早識龍顏唐書曰柳公權常寶惜筆硯圖畫自扄鐍之常評硯以青州石末為第一言墨易冷絳州黑硯次之太公金匱曰研之書曰石墨相著邪心讒言無得汙白伍緝之從征記曰夫子床前有石硯一枚作甚古朴蓋孔子平生時物也, SBCK: 滴器}
