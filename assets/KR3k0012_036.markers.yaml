  - {type: variant, offset: 10, length: 0, content: '', SBCK: 夫􅀇黃者天地之雜色也天玄而地黃又曰立地之道曰柔與剛又曰坤地也故稱乎母陸績注曰取含養也又曰夲乎地者親下又曰在地成形鄭􅀇注形謂草木鳥獸王廣注􅄱謂山川等禮記曰人道敏政地道敏樹鄭􅀇注云樹謂植草木又曰今夫地一撮土之多及其廣厚載}
  - {type: variant, offset: 10, length: 0, content: '', WYG: 夫𤣥黄者天地之雜也天𤣥而地黄又曰立地之道曰柔與剛又曰坤地也故稱乎母陸續注曰取含養也又曰本乎地者親下又曰在地成形鄭𤣥注云形謂草木鳥獸王廣注云形謂山川等禮記曰人道敏政地道敏樹鄭𤣥注云樹謂植草木又曰今夫地一撮土之多及其廣厚載}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_WYG_036-2a, image: WYG0893/WYG0893-0305a.png}
  - {type: variant, offset: 10, length: 0, content: '', krp: 夫玄黃者天地之雜色也天玄而地黃又曰立地之道曰柔與剛又曰坤地也故稱乎母陸績注曰取含養也又曰夲乎地者親下又曰在地成形鄭玄注形謂草木鳥獸王廣注形謂山川等禮記曰人道敏政地道敏樹鄭玄注云樹謂植草木又曰今夫地一撮土之多及其廣厚載}
  - {type: variant, offset: 11, length: 8, content: 黍時和歲豐宜黍稷, SBCK: 岳而不重振河海而不泄萬物載焉此言地之博厚夲由撮土山之廣大夲由拳石水之不測皆由一勺皆合少成多自少致大至誠者亦如此乎又曰地載物天垂象取財於地取法於天是以尊天而親地又曰博厚所以載物}
