  - {type: variant, offset: 828, length: 116, content: 天下化之故致充實殷富澤加黎庶穀至石數十錢上下饒羨物理論曰正月朝四面黃氣其歲大豐此黃帝用事土氣均和四方並熟鹽鐵論曰周公時天下太平丘陵高下皆熟山海經曰鰩魚見天下大穰古歌詞曰長安城西雙員闕上有一雙銅雀宿一鳴五穀生再鳴五穀熟凶荒禮曰歲凶年穀, WYG: ''}
  - {type: variant, offset: 828, length: 116, content: 天下化之故致充實殷富澤加黎庶穀至石數十錢上下饒羨物理論曰正月朝四面黃氣其歲大豐此黃帝用事土氣均和四方並熟鹽鐵論曰周公時天下太平丘陵高下皆熟山海經曰鰩魚見天下大穰古歌詞曰長安城西雙員闕上有一雙銅雀宿一鳴五穀生再鳴五穀熟凶荒禮曰歲凶年穀, krp: ''}
  - {type: variant, offset: 829, length: 686, content: 下化之故致充實殷富澤加黎庶穀至石數十錢上下饒羨物理論曰正月朝四面黃氣其歲大豐此黃帝用事土氣均和四方並熟鹽鐵論曰周公時天下太平丘陵高下皆熟山海經曰鰩魚見天下大穰古歌詞曰長安城西雙員闕上有一雙銅雀宿一鳴五穀生再鳴五穀熟凶荒禮曰歲凶年穀不登君膳不祭胏馬不食穀馳道不除祭事不懸大夫不食梁士飲酒不樂皆為自損憂民禮殺生則祭先有虞氏以首夏后氏以心殷人以肝周人胏不祭胏則不殺生也天子食曰少牢朔曰大牢諸侯食曰特牲朔曰少牢除治道為妨民取蔬食懸樂器鐘聲之屬也梁嘉食也不樂去琴瑟也又曰凶年則乘駑馬祀以下牲自貶損亦取易供也駑馬六種最下也下牲少牢若時豕特豚也傳曰五年春無冰梓慎曰今茲宋其饑乎歲在星紀而淫於玄枵以有時災陰不堪陽時災無水也陰盛用事而溫無水是陰不勝陽地氣發泄也虵乘龍虵玄武之宿虛危之星龍歲星歲星木也為青龍星失次為虵所乘龍宋鄭之星宋鄭必饑又曰晉荐飢麥未皆不熟也使乞糴于秦秦伯謂百里奚與諸乎對曰天災流行國家代有救災恤鄰道也行道有福丕鄭之子豹在秦請伐晉秦伯曰其君是惡其民何罪秦於是乎輪粟于晉自雍及綘相繼命之曰汎舟之役後秦飢晉閉之糴又曰宋公子鮑禮於國人宋飢竭其粟以貸之年自七十已上無不饋飴也穀梁傳曰一穀不熟謂之歉歉食不足二穀不熟謂之饑三穀不熟謂之饉爾雅曰穀不熟為飢蔬不熟為饉菓不熟為荒仍飢為荐漢書曰高祖二年關中大飢米斛萬錢又曰漢興接秦之弊諸侯並起民失作業而大飢饉米石五千相食死者過半高祖乃命民得賣子就食蜀漢又曰歲飢民貧卒食半菽或曰半五升器名也目瓚案士卒食蔬菜以菽莽半之又曰元帝二年齊地飢米石三千餘又曰王莽時雒陽以東米石二千莽遣三公將運關東諸侯倉賑貸窮乏又分遣大夫謁者教民煮木為酪服虔曰煮木實為酪酪不, SBCK: ''}
