  - {type: variant, offset: 3635, length: 286, content: 狀無狀謂祈雨不降乃積薪柴自焚至日中時大雨一郡沾潤神農求雨書曰春甲乙不雨東為青龍又為大龍東方老人舞之壬癸黑又曰北不雨命巫祝雨曝之不雨禱山神積薪其擊鼓而焚之瑞應圖曰遇旱責躬引咎理察冤枉退去貪殘側修惠政則降以零雨如其有道術禱祝山川致龍轉石閉陽從陰之類誠非瑞應是以魯侯有暴尫之消齊景以祠山見譏董仲舒曰春旱求雨令縣邑以水日令民禱社家人祠戶無伐名木無斬山林曝巫聚虵八日於邑東門外為四通之壇方八尺植蒼繒八其神共工祭以魚八夏求雨亦以水日家人祠戶無舉土功浚井曝釜鬲杵臼于街七日為四通壇於邑南門外方七尺植赤繒七其神蚩尤祭以赤雄雞七凡求雨之大禮丈夫欲藏匿女子欲和而樂師曠占旱曰歲欲旱旱草先生旱草, SBCK: 小害}
