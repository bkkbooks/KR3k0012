  - {type: variant, offset: 681, length: 145, content: 中延千人之命其時甘雨滂沛歲大豊稔南越志曰高興縣野多客雞其形如雞而五彩至則年穰臨海異物志曰獨舂鳥聲有似舂鳴聲多者五穀傷鳴聲少者五穀熟袁子正書曰語曰歲在辛酉乞漿得酒梅陶書曰古人就食於安里今三州米流出門無如今年豐也若以古人用之則累年之儲也廣雅曰年稔秋穀熟也桓子新論曰世俗咸曰漢文帝躬儉約修道德以先, SBCK: 後地髙}
