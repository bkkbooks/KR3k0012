  - {type: variant, offset: 3939, length: 1, content: 虵, WYG: 九部八紀地有九州八柱九州之外有八埏東方曰少海東南方曰沅澤南方曰浩澤西南方曰丹澤西方曰泉澤西北方曰海澤北方曰寒澤東北方曰無通澤又曰扶桑之上衆帝所自上下日中無景呼而無響蓋天地之中也弱水在東建木在西木有十日其華照地九州之大純純緑邉也方千里九州之外乃有八寅一曰八埏曰寅澤亦方千里自東北方曰大澤以漸加曰澤也曰無通東方曰大渚曰少海東南曰具區曰沅澤南方曰大夢曰浩澤西南方曰注資曰丹澤西方曰九歐曰泉澤西北方曰大夏曰海澤北方曰大冥曰寒澤凢八寅八澤之雲是雨九州八寅之外乃有八紘紘維也亦方千里自東北東曰和丘曰荒土東方曰棘林曰桑野東南方曰大窮曰衆女民少男多女也南方曰都廣曰反户在日之南為北嚮户西南方曰焦僥曰炎土焦僥人長三尺衣冠帶劒西方曰金丘曰沃野金丘金所出也西北方曰一目曰沙所其人一目北方曰積氷曰委羽積氷至寒也委羽山}
