  - {type: variant, offset: 3930, length: 2, content: 太華, SBCK: 帝令竪亥歩自東極至于西極五億十選郭璞注曰竪亥徤行人選萬物也九千八百八十歩竪亥左手抱筭右手指青丘北又曰天地之東西二萬八千里南北二萬六千里出水者八千里受水者八千里物理論曰地者底也底之言著也隂體下著也其神曰祇祇成也育生萬物備成也其卦爲坤其徳曰母地形有髙下氣有剛柔物有巨細味有甘苦鎭之以五岳積之以丘陵播之以四瀆流之以四川盖氣自然之體也地發黄泉周伏廽轉以生萬物地天之根夲也形西北髙而東南下東西長南北短其盡四海者也又曰地者其卦曰坤其德曰母其神曰祇亦曰媪大而名之曰黄地祇小而名之曰神州亦名后土黄地祗舉八極之内地神州王畿方千里内地神也后土祇也社地主也所在皆得言之詩推度灾曰上清下濁號曰天地􅀶物志曰地氏之位起形於崑崙從廣萬里髙萬一千里神物之所生聖人仙人之所集崑崙之東北地轉下三千六百里有八􅀇幽都方二十餘萬里下有四柱柱廣十萬里地有三千六百軸互相牽制也又曰地以名山爲之輔佐石爲之骨川爲之脉草木爲其毛土爲其肉三尺以上爲糞三尺以下爲地重隂之性也又曰中國之域左濵海右通流沙方而言之萬五千里面二千五百里東至蓬萊山西至隴右後跨荆北前及衡岳􅀂計共四隅有三億之餘降朝鮮岷山東治可西也隴川以南及北海之國此是堯舜土及萬里湯時七千里此後亦無常隨德優劣也論衡曰地户在東南人曰地之最下者有楊兖二川洪水之時此二土最􅀍水害又曰山川陵谷爲之地里又曰地性生草山性生水白虎通曰地者元氣所生萬物之祖也地之言施也諦也應施變化審諦不誤敬始重終故謂之地也老子曰地得一以寧地無以寜將恐發莊子曰天地非不廣且大也人所容足耳又曰海水三歳一周流波相薄故地動列子曰共工與顓頊争爲帝怒而觸不周}
