  - {type: variant, offset: 2912, length: 585, content: 修城郭貶食省用務嗇儉也勸分無有相濟此其務也巫尫何為天欲殺之則如勿生若能為旱焚之滋甚公從之是歲飢而不害又曰魯文十年正月不雨至于七月周正月今之十一月周十月今之五月又曰魯宣公九年葬我小君敬羸旱無麻始用葛茀茀所以引柩也又曰魯昭公十六年秋鄭大旱使屠擊有事於桑山祭山也斬其木不雨子產曰有事於山蓻山林也養護令繁植也而斬其木其罪大矣奪之官邑漢書曰百里嵩字景山為徐州刺史時旱嵩行部傳車所經甘雨輒澍東海祝其合鄉二縣在山間嵩不往二縣獨不得雨父老請之入界即雨澍又曰和帝永元六年秋旱時洛陽有冤囚帝錄囚理冤未還宮雨澍鄒太后事同續漢書曰郡國旱公卿行雩禮求雨閉諸陽門衣皂衣興土龍立土人舞童二佾七日一處又曰郡國旱各掃除社稷公卿官長以次行雩禮求雨也魏志曰衛玠見黥面者其妻子沒為官僮玠曰使天下不雨者蓋由此也太祖乃怒玠晉書曰督運令史淳于伯刑於建康市百姓諠譁咸曰伯冤於是大旱三年京氏易曰人君無惠澤於下則小旱管子曰春不收枯骨杇胔伐枯木而去之則夏旱至矣尸子曰湯之救旱也乘素車白馬著布衣身嬰白茅為牲禱於桑麻之野此時弦歌鼓舞者禁之孟子曰七月八月之間旱則苗槁槁乾也晏子春秋曰齊景公時旱欲祀靈山及河伯晏子曰夫山以石為身以草木為毛髮今久不雨毛髮將焦身且熱豈山不欲雨乎祀之何益君宜避殿暴露其索雨也公從之出野果大雨世說曰湯時大旱七年雒川竭煎沙爛石乃使持三鼎祝山川教祀曰政不節邪使人疾邪賄賂行邪讒夫昌邪宮室榮華也邪女謁成邪何不雨之甚, SBCK: ''}
