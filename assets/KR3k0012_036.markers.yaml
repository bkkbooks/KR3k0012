  - {type: variant, offset: 945, length: 1239, content: 登君膳不祭胏馬不食穀馳道不除祭事不懸大夫不食梁士飲酒不樂皆為自損憂民禮殺生則祭先有虞氏以首夏后氏以心殷人以肝周人胏不祭胏則不殺生也天子食曰少牢朔曰大牢諸侯食曰特牲朔曰少牢除治道為妨民取蔬食懸樂器鐘聲之屬也梁嘉食也不樂去琴瑟也又曰凶年則乘駑馬祀以下牲自貶損亦取易供也駑馬六種最下也下牲少牢若時豕特豚也傳曰五年春無冰梓慎曰今茲宋其饑乎歲在星紀而淫於玄枵以有時災陰不堪陽時災無水也陰盛用事而溫無水是陰不勝陽地氣發泄也虵乘龍虵玄武之宿虛危之星龍歲星歲星木也為青龍星失次為虵所乘龍宋鄭之星宋鄭必饑又曰晉荐飢麥未皆不熟也使乞糴于秦秦伯謂百里奚與諸乎對曰天災流行國家代有救災恤鄰道也行道有福丕鄭之子豹在秦請伐晉秦伯曰其君是惡其民何罪秦於是乎輪粟于晉自雍及綘相繼命之曰汎舟之役後秦飢晉閉之糴又曰宋公子鮑禮於國人宋飢竭其粟以貸之年自七十已上無不饋飴也穀梁傳曰一穀不熟謂之歉歉食不足二穀不熟謂之饑三穀不熟謂之饉爾雅曰穀不熟為飢蔬不熟為饉菓不熟為荒仍飢為荐漢書曰高祖二年關中大飢米斛萬錢又曰漢興接秦之弊諸侯並起民失作業而大飢饉米石五千相食死者過半高祖乃命民得賣子就食蜀漢又曰歲飢民貧卒食半菽或曰半五升器名也目瓚案士卒食蔬菜以菽莽半之又曰元帝二年齊地飢米石三千餘又曰王莽時雒陽以東米石二千莽遣三公將運關東諸侯倉賑貸窮乏又分遣大夫謁者教民煮木為酪服虔曰煮木實為酪酪不可食重為煩擾流民入關者數十萬人置養贍官以廩之盜發其廩民餓死者十七八東觀漢記曰王莽末南方枯旱民多飢餓郡人野澤掘鳧水草實也茨而食又曰赤眉還入長安鄧禹與戰敗走至高陵軍士飢餓皆食藻菜帝乃徵禹還勑曰赤眉無穀自當來降吾折之舌反捶笞之非諸將憂也謝承後漢書曰趙典兄子溫遭歲大飢散家糧以賑窮餓所活萬餘人王隱晉書曰永嘉五年洛中大飢五月摯虞餓死又曰劉琨與丞相牋曰夏則桑椹冬則瑩音勞豆視此哀歎使人氣盡晉中興書曰中原亂中宗初鎮江左假郗鑒龍驤將軍兗州刺史鎮鄒山又徐龕石勒左右交侵百姓飢饉野無生草時或掘野鼠蟄鷰而食之又曰太興元年詔曰亢旱穀貴百姓嗷嗷有資者貴糴貧羸之民益困漢世穀貴官賤糴使價不超越謂之平准今雖無此可出邸閣米萬斛使三分減一以平其價令貧困者悉得足以至秋也吳志曰駱公緒年八歲與親客歸會稽事嫡母甚謹時飢荒多有困乏公緒為之飢飲食衰少其姉仁愛有行寡婦無子公緒見甚哀之娣問其故公緒曰士大夫糟糠不足我亦何必獨飽姉誠知如是何不告我而自苦若此乃自以私粟與公緒又以告母母亦賢之遂使分施由是願名周書曰天有四殃水旱飢荒其至無時非積畜何以備之夏歸藏曰士無兼年之食遇天飢妻子非其妻子也大夫無兼年之食遇天飢輿馬臣妾非其有也國無兼年之食遇天飢百姓非所有也戒之哉國語曰越大夫種謀曰今吳既罷音疲罷勞也而大荒荐飢市無赤米米之惡也而囷簏空虛圓者為囷方者為簏其民必移就蒲嬴於東海之濱蒲蒲子嬴蚌蛤之屬也賓海涯又曰魯饑臧文仲以玉罄如齊告糴宋廟罄鳴球也典略曰從興平元年至建安二年其間四歲中咸陽蕭條後賊李堪等始將部曲入長安居卓故塢中拔取酸棗䔧藋藋從吊切以給食發塚取衣蓋形崔鴻三十國春秋曰諸州自建武元年十一月, WYG: 風}
