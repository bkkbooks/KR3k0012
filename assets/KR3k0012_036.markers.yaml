  - {type: variant, offset: 620, length: 0, content: '', SBCK: 分率則無以審逺近之差有分率而無准望雖得之於一隅必失之於佗方有准望而無道里則施於山海絶隔之地不能以相通有道里而無髙下方斜迂直之校則徑路之數必與逺近之實相違失准望之正矣故必以此六者叅而考之然後逺近之實定於髙下方邪迂直之筭故雖有峻山巨海之隔絶域殊方之過登降詭曲之回皆可得舉而定者准望之法旣正則曲直逺近無所隱其形也抱朴子云太極􅀄構清濁始分故天先}
