  - {type: variant, offset: 3938, length: 0, content: '', krp: 而無涯故莫能闚其門管子曰地或維之地莫之維地亡必矣又曰地者政之夲也是地可以正地不均平和調則政不可正也桓公問管子曰地數可得聞乎曰東西二萬六千里出水者八千里受水者八千里出銅山四百六十七出鐵山三千六百九處封禪之王七十二家墨子曰禽子問天與地孰仁墨子曰翟以地爲仁民衣焉食焉死焉家焉地終不責德焉故翟以地爲仁淮南子曰禹使大章歩自東極至于西極二億三萬三千五百七十里使竪亥歩自北極至于南極二億三萬三千五百七十里又曰重濁者淹滯而爲地又曰天}
  - {type: variant, offset: 3939, length: 1, content: 虵, SBCK: 九部八紀地有九州八柱九州之外有八埏東方曰沙海東南方曰沅澤南方曰浩澤西南方曰丹澤西方曰泉澤西北方曰海澤北方曰塞澤東北方曰無通澤又曰扶桑之上衆帝所自上下日中無景呼而無嚮蓋天地之中也弱水在東建木在西末有十日其華照地九州之大純純縁邊也方千里九州之外乃有八寅一曰不温曰寅澤亦方千里自東北方曰大澤無漸茄曰澤也曰無通東方曰大渚曰少海東南曰其區曰厄澤南方曰大夢曰浩澤西南方曰注資曰丹澤西方曰九甌曰泉澤西北方曰大夏曰海澤北方曰大􅄀曰寒澤凡八寅八澤之雲是雨九州八寅之外乃有八紘紘維紘也亦方千里自東北方曰和丘曰荒􅁟東方曰􅁄林曰桑野東南方曰大窮曰衆女民少男多女也南方曰都廣曰反户在日之南爲北嚮户西南方曰焦僥曰炎土焦僥人長三尺衣冠帶劒西方曰金丘曰沃野金丘金所出也西北方曰一目曰少所其人一目北方曰積冰曰委羽積氷至寒也委羽山}
