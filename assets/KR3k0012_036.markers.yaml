  - {type: variant, offset: 1516, length: 390, content: 食重為煩擾流民入關者數十萬人置養贍官以廩之盜發其廩民餓死者十七八東觀漢記曰王莽末南方枯旱民多飢餓郡人野澤掘鳧水草實也茨而食又曰赤眉還入長安鄧禹與戰敗走至高陵軍士飢餓皆食藻菜帝乃徵禹還勑曰赤眉無穀自當來降吾折之舌反捶笞之非諸將憂也謝承後漢書曰趙典兄子溫遭歲大飢散家糧以賑窮餓所活萬餘人王隱晉書曰永嘉五年洛中大飢五月摯虞餓死又曰劉琨與丞相牋曰夏則桑椹冬則瑩音勞豆視此哀歎使人氣盡晉中興書曰中原亂中宗初鎮江左假郗鑒龍驤將軍兗州刺史鎮鄒山又徐龕石勒左右交侵百姓飢饉野無生草時或掘野鼠蟄鷰而食之又曰太興元年詔曰亢旱穀貴百姓嗷嗷有資者貴糴貧羸之民益困漢世穀貴官賤糴使價不超越謂之平准今雖無此可出邸閣米萬斛使三分減一以平其價令貧困者悉得足以至秋也吳志曰駱公緒年八歲與親客歸會稽事嫡母甚謹時飢荒多有困乏公緒為之飢飲食衰少其姉仁愛有行寡婦無子公緒見甚哀之娣問其故公緒曰士大夫糟糠不足我亦何必獨飽姉誠, SBCK: 􅀝杵匈匈隆隆莫}
