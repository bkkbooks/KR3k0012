  - {type: variant, offset: 0, length: 0, content: '', SBCK: 太平御覽卷第三十六地部一地上釋名曰地底也言其底下載萬物也亦言諦也五土所生莫不審諦也亦謂之坤坤順乾也說文曰元氣初分重濁爲地萬物所陳列也易曰坤元亨利牝馬之貞馬在下而居者也而必牝者順之至也至順而後乃亨又曰至哉坤元萬物資始乃順承天坤厚載物德合無疆含弘光大品物咸亨牝馬地􅀋行地無疆象曰地􅀔坤她形不順其􅀔順也君子以厚徳載物文言曰坤至柔而動也剛至靜而德方後得主而有常含萬物而化光坤道其順乎承天而}
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_036-1a}
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書太平御覽卷三十六宋李昉等撰地部一地上地上釋名曰地底也言其底下載萬物也亦言諦也五土所生莫不審諦也亦謂之坤坤順乾也說文曰元氣初分重濁為地萬物所出列也易曰坤元亨利牝馬之貞馬在下而居者也而必牝者順之至也至順而後乃亨又曰至哉坤元萬物資生乃順承天坤厚載物徳合無疆含𢎞光大品物咸亨牝馬地類行地無疆象曰地勢坤地形不順其勢順也君子以厚徳載物文言曰坤至柔而動也剛至靜而徳方後得主而有常含萬物而化光坤道其順乎承天而}
