  - {type: variant, offset: 3938, length: 0, content: '', SBCK: 而無涯故莫能闚其門管子曰地或維之地莫之維地亡必矣又曰地者政之夲也是地可以正地不均平和調則政不可正也桓公問管子曰地數可得聞乎曰東西二萬六千里出水者八千里受水者八千里出銅山四百六十七出鐵山三千六百九處封禪之王七十二家墨子曰禽子問天與地孰仁墨子曰翟以地爲仁民衣焉食焉死焉家焉地終不責德焉故翟以地爲仁淮南子曰禹使大章歩自東極至于西極二億三萬三千五百七十里使竪亥歩自北極至于南極二億三萬三千五百七十里又曰重濁者淹滯而爲地又曰天}
  - {type: page-break, offset: 3938, content: '', id: KR3k0012_SBCK_036-8a}
  - {type: variant, offset: 3938, length: 0, content: '', WYG: 而無涯故莫能窺其門管子曰地或維之地莫之維地亡必矣又曰地者政之本也是知地可以正政也地不均平和調則政不可正也桓公問管子曰地數可得聞乎曰東西二萬八千里南北二萬六千里出水者八千里受水者八千里出銅山四百六十七出鐡山三千六百九十處封禪之王七十二家墨子曰禽子問天與地孰仁墨子曰翟以地為仁民衣焉食焉死焉家焉終不責徳焉故翟以地為仁淮南子曰禹使大章步自東極至於西極二億三萬三千五百七十里使竪亥步自北極至於南極二億三萬三千五百七十里又曰重濁者淹滯而為地又曰天}
