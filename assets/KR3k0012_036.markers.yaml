  - {type: variant, offset: 2136, length: 241, content: 將部曲入長安居卓故塢中拔取酸棗䔧藋藋從吊切以給食發塚取衣蓋形崔鴻三十國春秋曰諸州自建武元年十一月不雨雪至十二年八月穀價踴貴金斤直米二升民流散死者十有五六百姓嗷然人無生賴又曰建元元年襄國大飢穀二升直銀一斤肉一斤直銀一兩韓子曰秦大飢應侯請發五菀菓棗栗以活民王曰秦法賞有功誅有罪今發五菀是有功無功俱賞也墨子曰百穀不收謂之旱三穀不收謂之凶四穀不收謂之餽音匱五穀不收謂之飢淮南子曰畜者欲歲之荒飢謂將取厚利袁子正書曰滑釐也今當凶年有欲與子隨侯之珠者又有欲與子一鍾之粟者子將何擇釐曰吾取粟可以救窮, SBCK: 終}
