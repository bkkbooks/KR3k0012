  - {type: variant, offset: 1907, length: 228, content: 如是何不告我而自苦若此乃自以私粟與公緒又以告母母亦賢之遂使分施由是願名周書曰天有四殃水旱飢荒其至無時非積畜何以備之夏歸藏曰士無兼年之食遇天飢妻子非其妻子也大夫無兼年之食遇天飢輿馬臣妾非其有也國無兼年之食遇天飢百姓非所有也戒之哉國語曰越大夫種謀曰今吳既罷音疲罷勞也而大荒荐飢市無赤米米之惡也而囷簏空虛圓者為囷方者為簏其民必移就蒲嬴於東海之濱蒲蒲子嬴蚌蛤之屬也賓海涯又曰魯饑臧文仲以玉罄如齊告糴宋廟罄鳴球也典略曰從興平元年至建安二年其間四歲中咸陽蕭條後賊李堪等, SBCK: ''}
