  - {type: variant, offset: 2420, length: 309, content: 英雄記曰李催等相次戰長安中盜賊不禁白日虜掠是時穀一斛五十萬豆麥二萬人相食啖白骨委積臭穢蒲路又曰幽州歲歲不登人相食有蝗旱之災民人始知採以棗堪為糧穀一石十萬錢公孫伯圭開置屯田稍稍得自供給音呂又曰建安七年鄴中大飢芋一畝二萬錢愽物志曰荒年暫碎穀法但食蜡半斤輒支十日不飢漢應享應立豫讚序曰王莽居攝以病告歸後赤眉賊攻其所居城粒盡以私穀數十萬斛賑城中于時賑粟十數萬莫不稱其仁晉王洽集曰洽臨吳郡上表曰編戶僵尸葬埋無主或闔門餓餒煙火不舉旱春秋考異郵曰旱之言悍也陽驕蹇所致也詩曰旱既太甚悠悠山川又曰旱魃為虐如惔如焚我心癉暑瘴病也憂心如熏熏灼也又曰旱既大甚蘊隆蟲雷而非雨書說命曰若歲大旱用汝作霖雨又曰僣恒暘若君行僭差則常陽順之禮曰繆公召孩子, SBCK: 爲天黃帝素}
