  - {type: variant, offset: 3503, length: 8, content: 魯宣十年秋大旱時, SBCK: 地者成萬物者也周髀筭經曰天不可階而􅂛地不可尺寸而度楚辭曰地方九則何以墳之王逸注曰墳分也謂九州之地凢九品禹何以能分别之也康廽馮怒地何以東南傾康逥共工也昔共工與顓頊争爲帝怒而觸不周山天柱折地維絶故傾也見淮南天道篇也鹽鐡論曰古者制地足以養民民以承其上千乗之國百里之地}
