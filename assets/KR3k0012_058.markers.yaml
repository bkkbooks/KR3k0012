  - {type: variant, offset: 979, length: 151, content: 第一猶桂林之一枝昆山之片玉世祖笑侍中奏免詵詔曰吾與之戲耳又曰華譚移前松滋令袁甫曰枯澤非應龍之泉平林非鸞鳳之窟又曰王戎少阮籍二十餘年相得如時輩遂為竹林之遊晉書曰劉靈與阮籍嵇康相遇忻然神解便攜手入林又曰嵇康以高契難期每思郢質所與神交者唯阮籍山濤遂為竹林之遊預其流者向秀劉靈阮咸王戎干寶晉紀曰初管輅過母丘氏墓, WYG: 潤}
