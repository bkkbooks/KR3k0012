  - {type: variant, offset: 401, length: 399, content: 注曰海周禮曰凡邦工入山林而掄材不禁又曰林衡掌巡林麓之禁令而平其守以時計林簏而賞罰之鄭玄曰平其守者平其地民守林麓之部分又曰柞氏掌攻草木及林麓夏日至令刊陽木而火之冬日至令剝陰木而水之鄭玄曰刊剝也生山南為陽木生山北為陰木火之水之則使其隸鄭注曰竹木曰林大戴禮曰高山多林虎豹蕃孕焉深泉大川魚龍交焉左傳曰楚薳掩為司馬書土田度山林鳩藪澤收隰皋楊方五經鉤深曰夫鳥遊曠澤之地而北翮者万群虎居繁林之藪而接豪者千數又曰夫霜樹落葉而鴻鴈南飛桃林披華而玄鳥入字家語曰芝蘭生於深林不以無人而不芳君子脩道立德不為困窮而改節史記曰殷紂厚賦稅實鹿臺錢盈鉅橋粟廣沙丘苑臺大戲沙丘以酒為池懸肉為林為長夜之飲又曰稷母姜嫄見巨人跡心忻踐之而身動如孕胎居期生子棄之隘巷馬牛不踐徙之林中會山林多人遷之渠中水上鳥以翼覆薦之又曰單于秋馬肥大會蹛林課校人畜又曰神龜在江南嘉林中嘉林者無鳥獸無毒䖝火所不及斧所不至帝王世紀曰桀為肉山脯林以酒為池使可運舟漢, WYG: 濕}
