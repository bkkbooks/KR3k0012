  - {type: variant, offset: 3113, length: 0, content: '', WYG: 河水瀰瀰河水洋洋北流活活又曰淇水在右泉源在左又曰揚之水不流束薪又曰泌之洋洋可以樂飢言樂道也禮曰今夫水一勺之多及其不測黿鼉蛟龍魚鼈生焉貨財殖焉又曰水之於人親而不尊又曰水為無當於五色五色不得不彰又曰祭宗廟水曰清滌又曰水煩則魚鼈不大又曰小人溺於水君子溺于禮夫水近於人而易溺人周禮曰水有時以凝傳曰共工氏以水紀故為水師而水名又曰潢汙行潦之水可薦於鬼神可羞於王公又曰鄭子産謂子太叔曰唯有徳者能以寛服民其次莫如猛夫火烈人望而畏之故鮮死焉水懦弱民狎而翫之則多死焉故寛為難也春秋元命苞曰水之為言演也隂化淖濡流施潜行也故其立字兩人交一以中出者為水一者數之始兩人譬男女言隂陽交物以一起也論語曰智者樂水又曰逝者如斯夫不舍畫夜爾雅曰水别流曰派風吹水涌曰波大波曰濤小波曰淪平波曰瀾直波曰涇水朝夕而至曰潮風行水成文曰漣水波如錦文曰漪水行曰渉逆流而上曰泝洄順流而下曰泝游亦曰沿流絶流而渡曰亂以衣涉水曰厲由膝以下為掲由膝以上為涉渡水處曰津濟潜行水下為泳漢書曰成帝建始三年秋京師民無故相驚言大水至天子親御前殿召公卿議大將軍鳳以為太后與上及后宫可御舟船令吏上長安城以避水羣臣皆從鳳議左將軍王商獨曰上古無道之國水猶不冐城郭今聖政和平世無變革上下相安何因當有大水一日暴至此必訛言也不宜令民上城重驚百姓上乃止有頃長安中稍定問之果訛言上於是壯商之固守數稱其議而鳳大慙自恨後漢書東陽人趙炳字公阿能越方禁與閩中徐登遇於烏傷溪水上乃禁溪水水為不流又曰竇太后臨政竇憲兄弟各擅威權丁鴻上封事曰夫壊崖破岩之水源由涓涓干雲蔽日之木起於萌蘖魏畧曰漢火徳忌水故去洛水而闕土魏為土土水之母水得土而流土得水而柔故除木闕水晉書曰陸雲先是嘗著衰絰上船於水顧見其影因大笑落水人救獲免又曰佛圖澄傳襄國城塹水源在城西五里其水源暴竭勒問澄何以致水澄曰今當勅龍取水乃與弟子法者等數人至故泉源上坐繩牀燒安息香呪願數百言如此三日水微流有一小龍長五寸許隨水來出諸道士競往視之有頃水大至隍塹皆滿又曰鄧攸為太子中庶子吳郡闕守人多欲之帝以授攸攸載米之郡唯飲吳水而已又曰孫登素性無怒人或沒諸水中欲觀其怒既出便大笑齊書陸慧時征虜功曹與㕘府軍沛國劉璡同從述為職行至吳璡謂人曰吳間張融與陸慧並宅其間有水此水必有異味遂往酌而飲之唐書曰新豐鸚鵡谷水清俗傳云此水清天下平開皇之初暫清尋濁至是而復清又曰乾元中嵐州上言合河關黄河水四十里間清如井水經四日而變又曰楊朝晟為邠州刺史奏方渠合水波皆賊路請城其地以備之軍次方渠無水師後囂然遽有青蛇乗髙而下視其跡水隨而流朝晟令築防環之遂為停前軍仰飲以足又曰孔若思遷庫部郎中若思常謂人仕至郎中足矣至是持一石止水滿于座右以示有止足之意老子曰止善若水水善利萬物而不爭處衆人之所惡故幾於道列子曰禹治水土迷之一國無風雨霜露不生鳥獸當國之中有}
