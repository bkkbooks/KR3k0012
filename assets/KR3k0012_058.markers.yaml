  - {type: variant, offset: 100, length: 15, content: 爰居爰處爰喪其馬于以求之于林之, SBCK: 水流濕書曰水曰潤}
  - {type: variant, offset: 100, length: 226, content: 爰居爰處爰喪其馬于以求之于林之下又曰鳩彼晨風鬱彼北林毛萇曰北林名也招賢人往從之使疾如晨風之飛入北林又曰有鶖在梁有鶴在林鄭玄曰鶖之性貪惡而今在梁鶴洁白而反在林也又曰厥初生民時惟姜嫄載生載育時維后稷誕寘之隘巷羊牛腓字之毛萇曰寘置也腓辟也字愛也鄭玄曰姜嫄置后稷羊牛之徑亦以為異也誕寘之平林會伐平林置人平林又為人所收取也又曰瞻彼中林牲其鹿毛萇曰視彼林中其鹿相輩偶牲牲眾多今朝廷群臣皆相欺皆言其鹿之不知也又曰翩彼飛鴞集于泮林食我桑椹懷我好音鄭玄曰鴞惡鳴之鳥止於泮, WYG: ''}
