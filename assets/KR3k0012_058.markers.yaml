  - {type: variant, offset: 1131, length: 875, content: 倚樹哀吟精神不樂林木雖茂無形可交碑誄雖美無後可守後魏書曰魏之先居幽都也鑿石為祖宗之廟於烏洛侯國西北自後南遷其地隔遠遣中書侍郎李敞詣石室告祭天地以皇祖先妣配敞等既祭斬樺木立之以置牲體而還後所立樺木生長成林其民益神之咸謂魏國感靈祇之應也又曰太祖道武帝以建國三十四年七月七日生於參合陂北明年有榆生於埋胞之坎後遂成林又曰葬昭成皇帝於金陵營梓宮木柹盡生成林顧愷之啟蒙記曰汎林鼓於浪巔注西北海有汎林或方三百里或方百里皆生海中浮土上樹根隨浪鼓動山海經曰桃林方三百里在崑崙南夸父山北又曰夸父逐日走渴飲河不足道渴死其杖化為鄧林山謙之吳興記曰於潛縣北有天目山山上眾木甚美非常因名翔鳳林盛弘之荊州記曰宅上山頂有玉女冢瑩墳整固上有喬木叢生名為女貞林常有白猿栖遊哀鳴清絕又曰江陵縣東一百里有綠林山茂林蓊鬱襄陽大路經由其西所謂當陽之綠林也五端休江陵記曰城西北六十里有大林春秋魯文公六年楚飢戎侵其西至于阜山師于大林即此地也又曰州城東北十二里有曹公林相傳云建安十三年曹操躡劉備於當陽長坂廻師頓此林因謂之曹公林任豫益州記曰廣平有石紐林禹生處也地方百許里今人猶不敢居止外國圖曰桂林地多林木無平土眾猴居之無人民去九疑四萬里龜林地險無平土眾龜居之應劭風俗通曰配林在太山西南五六里金樹木蓋不足言劉義慶世說曰魏武行役失汲道三軍皆渴乃曰前有大梅林饒子甘酸可以解渴士卒聞之口皆水出乘此得及前源莊子曰孔子遊乎緇帷之林坐杏壇之上弟子讀書孔子絃歌鼓琴曲未半漁父下舡而來國語曰康叔射兕于徒林殪以為大甲越絕書曰麻林者越王種麻於此以為弩絃故名麻林麓說文曰林屬於山曰麓一曰麓者守山林吏也左傳僖公十四年沙麓崩書鴻範五行傳曰沙麓者山名也詩文王篇旱麓章曰瞻彼旱麓山足曰麓禮記曰林麓川澤以時入而不禁漢書曰王翁孺徙魏郡元城元城建公曰昔春秋時沙麓崩晉史卜之曰陰為雌陽為雄土火相乘後六百四十五年宜有聖女興今王翁孺徙其地日月當之翁孺生禁禁生元后漢書應劭曰麓林之大者風俗通曰尚書云堯禪舜納于大麓麓林屬於山者也原釋名曰原元也如元氣廣大也書曰既修太原至于岳陽孔安國曰高平曰原太原今以為郡又曰大野既瀦東原厎平孔安國曰東原致功而平言可耕也, WYG: 作鹹}
