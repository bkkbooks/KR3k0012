  - {type: variant, offset: 3124, length: 1, content: 苦, WYG: 也兩崖涘之間不辨牛馬言其廣於是河伯欣然自喜以天下之美盡在已矣又曰水之性不雜則清莫動則平又曰孔子觀於吕梁懸水三十仞流沫三十里黿鼉魚鼈不能游見一大夫游之數百步而去又曰水之守土地審無意則止于分所以為審又曰水靜明明燭鬢眉大匠取法焉水靜猶明而况聖人之心靜乎又曰水之積也不厚其負大舟也無力文子曰水之性欲清沙石穢之水之為道也廣不可極莫知其年深不可測長極無窮逺渝無涯息耗減益過淤不訾湧出曰息􅋩乾曰耗川枝流曰減九野注之曰益過耗曰淤不訾者言過尾閭入天壑入无底谷又曰水濁者魚噞喁又曰混混之水濁可以濯吾足青青之水清可以濯吾纓又曰水之道也大不可極深不可測上天為雨露下地為潤澤又曰猶鑿渠而止水抱薪而救火墨子曰古語君子不鏡於水而鏡於人鏡於水見面之容鏡於人則知吉凶管子曰水者地之血氣筋脈之流者故曰水具材也夫水淖溺以清仁也視之黒而白清也量之至滿而止智也流則至平義也人皆赴髙已獨趨下卑也卑也者道之室王者之器也準也者五量之宗素也者五色之質淡也者五味之中也故水藏萬物産於金石故曰水神凡有五害水一也旱二也風霧雹霜三也厲四也蟲五也五害之屬水最為大水有大小有逺邇水出山而流入海命曰經水别於他水入於大水及海者命曰枝水山之溝流於大水及海者命曰川水水出於地而不流者命曰淵水淮南子曰天下之物莫柔弱於水上天則為雨露下地則為潤澤萬物弗得不生百事不得不成大苞羣生而無所私澤及跂蹺跂蹺行也蹺微小之蟲也而不求報富贍天下而不既贍足也既盡也徳施百姓而不費徳澤加於百姓不以為費財物也行不可得而窮極也流行不止微而不可得把握也擊之無創財之不傷斬之不斷焚之不燃水之怪也淖溺流遁錯繆相紛遁逸也錯繆相紛波相經也而不可靡散利貫金石強濟天下水流缺石是其利也舟船所載無有重是其強也濟通也動容無形之域而翺翔忽區之上忽恱之區上也言其飛為雲雨無所不止邅迴川谷之間邅迴猶委曲也而滔騰大荒之野有餘不足與天地取與授萬物而無所前後前後皆與之是故無所私而無所公公私一也靡濫振蕩與天地洞鴻鴻大洞通無所左而無所右蟠委錯紾音軫與萬物始終流轉是謂至徳言水之為徳大極故曰至徳也夫水所以能成其至徳於天下者以其淖溺潤滑也故老耼之言曰天下至柔馳騁於天下之至堅出於無有入於無間是水也吾是以知無為之有益有益於生夫無形者物之大祖也無音者聲之大宗也無形生有形故萬物大祖也無音生有音故為大宗祖宗皆本也其子為光其孫爲水皆生于無形乎光無形道所貴也觀之故子為光也水形而不可闕之故為孫闕夫光可見而不可握水可循而不可毁故有像之類莫尊於水出生入死自無蹠有自有蹠無而以衰賤矣入死道謂匿于情欲也蹠適也自無形而適有形者離其本也自有形而適無形者不能復得道家之所共棄也故曰以衰賤也是故清静者德之至也而柔弱者道之要也虛無恬愉者萬物之用也注闕肅然應感殷然反本則淪於無形矣所謂無形者一之謂也一者道之本也所謂一者無匹合於天下者也卓然獨立塊然獨處上貫九天下貫九野九天八分中央九天野亦如之圓不中規方不中矩大渾而為一葉無根言微妙也懐囊天地為道開門開道之門穆文隱閔純徳獨存穆文隠閔皆無形之類也純不雜柔也布施而不既用之而不勤既盡也勤勞}
