  - {type: variant, offset: 3165, length: 2, content: 隰中, SBCK: 頋夷子與子華遊東池子華曰水有四德沐浴群生深流万丗是仁也􅀭淸激濁蕩去滓穢是義也柔而難犯弱而難勝是勇也道江䟽河惡盈流謙是智也孟子曰數􅅈不入汚池魚鼈不可勝食也数􅅈宻網也又曰民}
  - {type: variant, offset: 3165, length: 2, content: 隰中, WYG: 顧夷子與子華遊東池子華曰水有四徳沐浴羣生深流萬世是仁也揚清激濁蕩去滓穢是義也柔而難犯弱而難勝是勇也道江疏河惡盈流謙是智也孟子曰數罟不入汚池魚鼈不可勝食也數罟宻網也又曰民}
