  - {type: variant, offset: 3122, length: 1, content: 苓, krp: 神瀵臭過蘭椒味過醪醴又曰白公問扵孔子曰人可与微言乎孔子不應白公曰若以石投水何如孔子曰呉之善没者能取之曰若以水投水何如孔子曰淄澠之合易牙甞而知之白公曰人故不可与微言耶又曰人有濵河而居者習扵水勇扵泅操舟鬻渡利供百口裹粮就斈者成徒而溺死者幾半本斈泅不斈溺而利害如此莊子曰君子之交淡如水又曰秋水之至百川灌河流之}
