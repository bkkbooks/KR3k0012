  - {type: variant, offset: 3122, length: 1, content: 苓, SBCK: 神瀵􅆨過蘭椒味過醪醴又曰白公問扵孔子曰人可与微言乎孔子不應白公曰􅀂以石投水何如孔子曰呉之善没者能取之曰􅀂以水投水何如孔子曰淄澠之合易牙甞而知之白公曰人故不可与微言􅁘又曰人有濵河而居者習扵水勇扵泅操舟鬻渡利供百口裹粮就斈者成徒而溺死者幾半本斈泅不斈溺而利害如此莊子曰君子之交淡如水又曰秋水之至百川灌河流之}
  - {type: page-break, offset: 3122, content: '', id: KR3k0012_SBCK_058-4b}
  - {type: variant, offset: 3122, length: 1, content: 苓, WYG: 神瀵臭過蘭椒味過醪醴又曰白公問于孔子曰人可與微言乎孔子不應白公曰若以石投水何如孔子曰吳之善沒者能取之曰若以水投水何如孔子曰淄澠之合易牙嘗而知之白公曰人固不可與微言耶又曰人有濵河而居者習於水勇於泅操舟鬻渡利供百口里裹糧就學者成徒而溺死者幾半本學泅不學溺而利害如此禮記曰君子之交淡如水又曰秋水時至百川灌河流之}
