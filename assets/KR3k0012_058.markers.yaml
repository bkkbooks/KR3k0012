  - {type: variant, offset: 264, length: 365, content: 鹿毛萇曰視彼林中其鹿相輩偶牲牲眾多今朝廷群臣皆相欺皆言其鹿之不知也又曰翩彼飛鴞集于泮林食我桑椹懷我好音鄭玄曰鴞惡鳴之鳥止於泮水之木食桑椹改其鳴歸就我善音喻人感於恩則化之禮曰草木零落然後入山林又曰林藪川澤有能取蔬食野虞教導之又曰林麓川澤以時入而不禁蔡邕月令章句曰叢木曰林受眾流注曰海周禮曰凡邦工入山林而掄材不禁又曰林衡掌巡林麓之禁令而平其守以時計林簏而賞罰之鄭玄曰平其守者平其地民守林麓之部分又曰柞氏掌攻草木及林麓夏日至令刊陽木而火之冬日至令剝陰木而水之鄭玄曰刊剝也生山南為陽木生山北為陰木火之水之則使其隸鄭注曰竹木曰林大戴禮曰高山多林虎豹蕃孕焉深泉大川魚龍交焉左傳曰楚薳掩為司馬書土田度山林鳩藪澤收隰皋楊方五經鉤深曰夫鳥遊曠澤之地而北翮者万群虎居繁林之藪而接豪者千數又曰夫霜樹落葉而鴻鴈南飛桃林披華而玄鳥入字家語曰芝蘭生於深林不以, SBCK: ''}
