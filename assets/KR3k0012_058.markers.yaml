  - {type: variant, offset: 3260, length: 18, content: 楚薳掩為司馬書土田度山林鳩藪澤收隰皋, SBCK: 仁之勝不仁也猶水之勝火也今之爲仁者猶以一盃水救一車薪之火也又曰􅀚於海者難爲水遊於聖人之門者難爲言􅀚水有術必􅀚其瀾瀾水中大波也孫卿子曰孔子􅀚於東流之水子貢問於孔子所以見大水必􅀚焉何也孔子曰夫水柔也而无爲也似徳其浩浩乎不屈似有道其赴百仞之谷不懼似勇主量必平似法盈不求槪似正發源必東似志是以君子見大水必􅀚焉大戴礼孔子家語並有太平御覽卷第五十八}
  - {type: page-break, offset: 3260, content: '', id: KR3k0012_SBCK_058-8b}
  - {type: variant, offset: 3260, length: 3, content: 楚薳掩, WYG: 仁之勝不仁也猶水之勝火今之}
  - {type: variant, offset: 3260, length: 18, content: 楚薳掩為司馬書土田度山林鳩藪澤收隰皋, krp: 仁之勝不仁也猶水之勝火也今之爲仁者猶以一盃水救一車薪之火也又曰觀於海者難爲水遊於聖人之門者難爲言觀水有術必觀其瀾瀾水中大波也孫卿子曰孔子觀於東流之水子貢問於孔子所以見大水必觀焉何也孔子曰夫水柔也而无爲也似徳其浩浩乎不屈似有道其赴百仞之谷不懼似勇主量必平似法盈不求槪似正發源必東似志是以君子見大水必觀焉大戴礼孔子家語並有太平御覽卷第五十八}
  - {type: variant, offset: 3264, length: 14, content: 司馬書土田度山林鳩藪澤收隰皋, WYG: 仁者猶以一杯水救一車薪之火也又曰觀於海者難為水遊於聖人之門者難為言觀水有術必觀其瀾瀾水中大波也孫卿子曰孔子觀於東流之水子貢問於孔子君子見大水必觀焉何也孔子曰夫水柔也而無為也似徳其浩浩乎不居似有道其延萬仞之谷不懼似勇主量必平似法盈不求概似正發源必東似志是以君子見大水必觀焉大戴禮孔子家語並有太平御覽卷五十八}
