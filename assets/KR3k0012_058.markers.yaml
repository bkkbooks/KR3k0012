  - {type: variant, offset: 630, length: 2429, content: 人而不芳君子脩道立德不為困窮而改節史記曰殷紂厚賦稅實鹿臺錢盈鉅橋粟廣沙丘苑臺大戲沙丘以酒為池懸肉為林為長夜之飲又曰稷母姜嫄見巨人跡心忻踐之而身動如孕胎居期生子棄之隘巷馬牛不踐徙之林中會山林多人遷之渠中水上鳥以翼覆薦之又曰單于秋馬肥大會蹛林課校人畜又曰神龜在江南嘉林中嘉林者無鳥獸無毒䖝火所不及斧所不至帝王世紀曰桀為肉山脯林以酒為池使可運舟漢書曰草木未落斧不入於山林豺獺未祭罟網不布於澤又曰山林之士往而不能返朝廷之士入而不能出後漢書曰法雄為南郡太守移書屬縣曰凡虎狼之在山林猶人民之居城市張瑩漢南記樊重家素富田至三百頃竹木成林六畜放牧桑漆魚池閉門成市魏志曰曹植上疏曰東有覆敗之軍西有殪沒之將至使蜂蛤浮翔於淮泗鼲鼬讙譁於林木臧榮緒晉書曰郄詵為雍州刺史帝於東堂餞之問詵曰卿自以為何如詵對曰臣舉賢良對策為天下第一猶桂林之一枝昆山之片玉世祖笑侍中奏免詵詔曰吾與之戲耳又曰華譚移前松滋令袁甫曰枯澤非應龍之泉平林非鸞鳳之窟又曰王戎少阮籍二十餘年相得如時輩遂為竹林之遊晉書曰劉靈與阮籍嵇康相遇忻然神解便攜手入林又曰嵇康以高契難期每思郢質所與神交者唯阮籍山濤遂為竹林之遊預其流者向秀劉靈阮咸王戎干寶晉紀曰初管輅過母丘氏墓下倚樹哀吟精神不樂林木雖茂無形可交碑誄雖美無後可守後魏書曰魏之先居幽都也鑿石為祖宗之廟於烏洛侯國西北自後南遷其地隔遠遣中書侍郎李敞詣石室告祭天地以皇祖先妣配敞等既祭斬樺木立之以置牲體而還後所立樺木生長成林其民益神之咸謂魏國感靈祇之應也又曰太祖道武帝以建國三十四年七月七日生於參合陂北明年有榆生於埋胞之坎後遂成林又曰葬昭成皇帝於金陵營梓宮木柹盡生成林顧愷之啟蒙記曰汎林鼓於浪巔注西北海有汎林或方三百里或方百里皆生海中浮土上樹根隨浪鼓動山海經曰桃林方三百里在崑崙南夸父山北又曰夸父逐日走渴飲河不足道渴死其杖化為鄧林山謙之吳興記曰於潛縣北有天目山山上眾木甚美非常因名翔鳳林盛弘之荊州記曰宅上山頂有玉女冢瑩墳整固上有喬木叢生名為女貞林常有白猿栖遊哀鳴清絕又曰江陵縣東一百里有綠林山茂林蓊鬱襄陽大路經由其西所謂當陽之綠林也五端休江陵記曰城西北六十里有大林春秋魯文公六年楚飢戎侵其西至于阜山師于大林即此地也又曰州城東北十二里有曹公林相傳云建安十三年曹操躡劉備於當陽長坂廻師頓此林因謂之曹公林任豫益州記曰廣平有石紐林禹生處也地方百許里今人猶不敢居止外國圖曰桂林地多林木無平土眾猴居之無人民去九疑四萬里龜林地險無平土眾龜居之應劭風俗通曰配林在太山西南五六里金樹木蓋不足言劉義慶世說曰魏武行役失汲道三軍皆渴乃曰前有大梅林饒子甘酸可以解渴士卒聞之口皆水出乘此得及前源莊子曰孔子遊乎緇帷之林坐杏壇之上弟子讀書孔子絃歌鼓琴曲未半漁父下舡而來國語曰康叔射兕于徒林殪以為大甲越絕書曰麻林者越王種麻於此以為弩絃故名麻林麓說文曰林屬於山曰麓一曰麓者守山林吏也左傳僖公十四年沙麓崩書鴻範五行傳曰沙麓者山名也詩文王篇旱麓章曰瞻彼旱麓山足曰麓禮記曰林麓川澤以時入而不禁漢書曰王翁孺徙魏郡元城元城建公曰昔春秋時沙麓崩晉史卜之曰陰為雌陽為雄土火相乘後六百四十五年宜有聖女興今王翁孺徙其地日月當之翁孺生禁禁生元后漢書應劭曰麓林之大者風俗通曰尚書云堯禪舜納于大麓麓林屬於山者也原釋名曰原元也如元氣廣大也書曰既修太原至于岳陽孔安國曰高平曰原太原今以為郡又曰大野既瀦東原厎平孔安國曰東原致功而平言可耕也又曰若火之燎于原弗可嚮邇其猶可撲滅詩曰度其鮮原居歧之陽在渭之將萬邦之方下民之王鄭玄曰文王自知德威謀居善言岐山之南渭水側為萬國所向作民之君又曰篤公劉于胥斯原既庶既繁既順乃宣而無永嘆鄭玄曰公劉之相此原以居民而無長嘆者也又曰鶺鴒在原兄弟急難又曰原隰膴膴堇荼如飴又曰皇皇者華于彼原隰又曰漆沮之從天子之所瞻彼中原其祁孔有又曰中原有菽庶民採之又曰原隰既平泉流既清周禮曰原師辯原隰之名又曰大司徒之職辯五地之物生五曰原隰其動物宜臝物其植物宜叢物其民豊肉而庳禮曰孟夏之月子始命野虞出行田原為勸民也又曰聖王所以順山者不使居川不使渚者居中原而弗敝也傳曰晉侯蒐于清原作五軍以禦狄也又曰晉魏綘曰昔辛甲之為太史命百官官箴王闕於虞人之箴曰在帝夷羿冐于原獸用不恢于夏家獸臣司原敢告僕夫又曰晉侯宋公齊國歸父秦小子憖次于城濮楚師背酅而舍晉侯患之聽輿人之誦曰原田莓莓舍其舊而新是謀公疑焉子犯曰戰也戰而捷必得志於諸侯若其不捷表裏山河必無害也春秋說題辭曰原端也平而有度也宋均曰度法則也公羊傳曰上平曰原穀梁傳曰中國曰太原夷狄曰大鹵國語曰溫之會晉人執衛成公歸之于周使醫鴆之不死醫亦不誅臧文仲言於僖公曰刑大者陳之原野小者致之朝市五刑三利是無隱也今晉人鴆衛侯不死亦不誅其使者諱而惡之有諸侯之諸必免之爾雅曰廣平曰原又曰可食者曰原郭璞曰可食謂種穀給食也犍為舍人曰廣平謂土寬博而平史記封禪書曰秦文公作鄜畤靈公作吳陽上畤宣公又作密下畤蓋三畤在此原故號三畤原臧榮緒晉書曰宣帝鎮關中諸葛亮攻郿據渭水南五丈原帝禦之對壘相持百餘日俄而亮卒唐書高祖校獵於華池之萬壽原白鹿見高祖親御狐矢射而獲之郡國志曰韓馮翊有原按詩曰有倬其道韓侯受命是此原也又古今地名云韓武子食菜於韓原亦秦晉戰於此地即獲杜回又秦獲晉惠侯以歸之處裴景仁符書曰符健始皇五年鳳皇降渭濱杜陵南原三日而去崔鴻前秦錄曰丞相符雄與桓溫戰白鹿原晉師敗績又曰符健攻張琚于宜秋還登石安原而歎曰美哉斯原也悵然有終焉之意又曰晉梁州刺史司馬勳率步騎三萬自漢中入秦川符健拒之五丈原勳敗還潘岳關中記曰周文王葬於畢長安東南有原名畢原又曰驪山有白鹿原周平王時白鹿出此原故名之又曰宣帝少依許氏長於杜縣樂之後葬於南原立廟於曲池之北亭曰樂遊原辛氏三秦記曰長安城北有平原數百里無山川湖水民井汲巢居井深五十丈有伯夷墓人食薇可常食或云夷叔食之三年顏色如故戴延之西征記曰河東塩池東吳坂登七山原每登一原輒峭起五六里原上平廣不知巨極周處風土記曰陽羨邑者蓋吳郡之名境原則平坦高阜岡若伏龍也隰釋名曰隰蟄也蟄隰意也說文曰隰坂下濕也春秋說題辭曰下濕曰隰二者濕也下而澤也, SBCK: 津涯}
