  - {type: variant, offset: 2093, length: 966, content: 永嘆鄭玄曰公劉之相此原以居民而無長嘆者也又曰鶺鴒在原兄弟急難又曰原隰膴膴堇荼如飴又曰皇皇者華于彼原隰又曰漆沮之從天子之所瞻彼中原其祁孔有又曰中原有菽庶民採之又曰原隰既平泉流既清周禮曰原師辯原隰之名又曰大司徒之職辯五地之物生五曰原隰其動物宜臝物其植物宜叢物其民豊肉而庳禮曰孟夏之月子始命野虞出行田原為勸民也又曰聖王所以順山者不使居川不使渚者居中原而弗敝也傳曰晉侯蒐于清原作五軍以禦狄也又曰晉魏綘曰昔辛甲之為太史命百官官箴王闕於虞人之箴曰在帝夷羿冐于原獸用不恢于夏家獸臣司原敢告僕夫又曰晉侯宋公齊國歸父秦小子憖次于城濮楚師背酅而舍晉侯患之聽輿人之誦曰原田莓莓舍其舊而新是謀公疑焉子犯曰戰也戰而捷必得志於諸侯若其不捷表裏山河必無害也春秋說題辭曰原端也平而有度也宋均曰度法則也公羊傳曰上平曰原穀梁傳曰中國曰太原夷狄曰大鹵國語曰溫之會晉人執衛成公歸之于周使醫鴆之不死醫亦不誅臧文仲言於僖公曰刑大者陳之原野小者致之朝市五刑三利是無隱也今晉人鴆衛侯不死亦不誅其使者諱而惡之有諸侯之諸必免之爾雅曰廣平曰原又曰可食者曰原郭璞曰可食謂種穀給食也犍為舍人曰廣平謂土寬博而平史記封禪書曰秦文公作鄜畤靈公作吳陽上畤宣公又作密下畤蓋三畤在此原故號三畤原臧榮緒晉書曰宣帝鎮關中諸葛亮攻郿據渭水南五丈原帝禦之對壘相持百餘日俄而亮卒唐書高祖校獵於華池之萬壽原白鹿見高祖親御狐矢射而獲之郡國志曰韓馮翊有原按詩曰有倬其道韓侯受命是此原也又古今地名云韓武子食菜於韓原亦秦晉戰於此地即獲杜回又秦獲晉惠侯以歸之處裴景仁符書曰符健始皇五年鳳皇降渭濱杜陵南原三日而去崔鴻前秦錄曰丞相符雄與桓溫戰白鹿原晉師敗績又曰符健攻張琚于宜秋還登石安原而歎曰美哉斯原也悵然有終焉之意又曰晉梁州刺史司馬勳率步騎三萬自漢中入秦川符健拒之五丈原勳敗還潘岳關中記曰周文王葬於畢長安東南有原名畢原又曰驪山有白鹿原周平王時白鹿出此原故名之又曰宣帝少依許氏長於杜縣樂之後葬於南原立廟於曲池之北亭曰樂遊原辛氏三秦記曰長安城北有平原數百里無山川湖水民井汲巢居井深五十丈有伯夷墓人食薇可常食或云夷叔食之三年顏色如故戴延之西征記曰河東塩池東吳坂登七山原每登一原輒峭起五六里原上平廣不知巨極周處風土記曰陽羨邑者蓋吳郡之名境原則平坦高阜岡若伏龍也隰釋名曰隰蟄也蟄隰意也說文曰隰坂下濕也春秋說題辭曰下濕曰隰二者濕也下而澤也, WYG: 津涯}
