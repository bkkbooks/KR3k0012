  - {type: variant, offset: 3113, length: 0, content: '', SBCK: 瀏其清矣深皃河水洋洋北流活活溱與洧方渙渙兮春水盛又曰楊之水不流束薪不流束楚不流束蒲又曰泌之洋洋可以療飢言楽道也禮曰夫水一勺之多及其不測黿鼉蛟龍魚鱉生焉貨財殖焉又曰水之於人親而不尊又曰水無當於五色五色不得不彰又曰􅀕宗廟水曰清滌又曰水煩則魚鼈不大又曰小人溺於水君子溺於口夫水近於人而易以溺人同禮曰水有時以凝傳曰共工氏以水紀故爲水師而水名又曰潢汚行潦之水可薦於􅀑神可羞於王公又曰鄭子産謂子太叔曰唯有德者能以寛服民其次莫如猛火烈人望而畏之故鮮死焉水懦弱民狎而翫之則多死焉故寛爲難也春秋元命苞曰水之爲言演也隂化淖濡流施潜行也故其立字兩人交一以中岀者爲水一者數之始兩人譬男女言隂陽交物以一起也論語曰智者樂水又曰子在川上曰逝者如斯夫不舎晝夜爾雅曰水別流曰􅂀風吹水涌曰波大波曰濤小波曰淪平波曰瀾直波曰徑水朝夕而至曰潮風行水成文曰漣水波如錦文曰漪水行曰渉逆流而上曰沂洄順流而下曰泝游亦曰㳂流絶流而渡曰亂以衣渉水曰厲由􅂰以下爲掲由􅂰以上爲渉渡水處曰津済潜行水下爲泳漢書曰成帝建始三年秋京師民無故相驚言大水至天子親御前殿召公卿議大將軍鳯以爲太后與上及後宫可御舟舡令吏上長安城以避水群臣皆從鳯議左將軍王啇獨曰上古無道之國水猶不冒城郭今聖政和平世無變革上下相安何因當有大水一日􅁀至此必訛言也不冝令民上城重驚百姓上乃止有頃長安中稍定問之果訛言上於是壯啇之固守數􅁛其議而鳯大慙自恨失言後漢書東陽人趙炳字公河能越方禁與閩中徐登遇於烏傷溪水上禁小溪水不流又曰竇太后臨政竇憲兄弟各擅威􅁠丁鴻上封事曰夫壞崖破巖之水源由㳙㳙干雲蔽日之木起於葱蒨魏略曰漢火行忌水故去洛水而加佳魏爲土土水之母水得土而流土得水而柔故除佳加水晉書曰陸雲先是常着衰絰上舡於水頋見其影因大􅀏落水人救獲免又曰佛圗澄傳襄囯城壍水源在城西五里其水源􅁀竭勒問澄何以致水澄曰今當勑龍取水乃與弟子法首等數人至故泉源上坐縄牀燒安悉香呪願數百言如此三日水微流有一小龍長五寸許隨水來岀諸道士競往視之有頃水大至隍壍皆滿又曰鄧攸爲太乎中庶子呉郡闕守人多欲之帝以授攸攸載米之郡俸禄無所受唯飲呉水而巳又曰孫登性無恚怒人或没諸水中欲􅀚其怒旣岀便大􅀏齊書曰陸慧時爲征虜功曹與叅府軍沛國劉璡同從述職行至呉璡謂人曰呉間張融與陸慧並宅其間有水此水必有異味遂往酌而飲之唐書曰新豐鸚鵡谷水清代傳云此水清天下平開皇之􅀄暫清㝷濁至是而復清又曰乾元中嵐州上言合河􅀜黃河水四十里間清如井水經四日而變又曰楊朝晟爲邠州刺史奏方渠合不波皆賊路請城其地以俻之軍次方渠无水師徒嚚然遽有青虵乗髙而下視其跡水隨而流朝晟令築防環之遂爲渟泉軍人仰飲以足又曰孔􅀂思迁庫部郎中􅀂思常謂人仕至郎中足矣至是持一石止水滿於座右以示有止足之意老子曰上善􅀂水水善利万物而不争處衆人之所惡故幾於道列子曰禹治水􅁟迷之一國无風雨霧露不生鳥獸名曰終北有}
