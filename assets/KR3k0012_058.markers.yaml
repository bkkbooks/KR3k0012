  - {type: variant, offset: 3124, length: 1, content: 苦, SBCK: 也两崖涘之間不辯牛馬言其廣於是河伯欣然自喜以天下之美尽在己矣又曰水之性不􅄂則清莫動則平又曰孔子􅀚扵吕梁懸水三十仞流沫三十里黿鼉魚鼈不能游見一丈夫游之数百歩而去又曰水之守土地審无意則止於分所以為審又曰水静則明燭􅁂眉大匠取法焉水静猶明而況聖人之心静乎又曰水之積也不厚其􅀒大舟也無力文子曰水之性欲清沙石穢之水之爲道也廣不可極莫知其言􅀷不可測長極无窮逺淪无涯息耗减益過於不訾涌出日息煎乾曰耗出川枝流曰减九野注之曰益過扵不訾者此過尾閭入大壑入无底谷又曰水濁者魚噞喁又曰混混之水濁可以濯吾足青青之水清可以濯吾纓又曰水之道也大不可極深不可測上天爲雨露下地爲潤澤又曰猶鑿渠而止水抱薪而救火墨水曰古語君子不鏡扵水而鏡扵人鏡扵水見面之容鏡扵人則知􅁻㓙管子曰水者地之血氣筯脉之流者故曰水之材也夫水淖溺以清好仁視之黒而白精也量之至滿至止正也流則至平義也人皆赴髙巳獨趍下卑也卑也者道之室王者之器也淮也者五量之宗素也者五色之質也淡也者五味之中也故水藏万物産金石故曰水神凢有五害水一也旱二也風霧雹霜三也厲四也䖝五也五害之屬水最爲大水有大小有逺迩水岀山而流入海命曰經水別於他水入扵大水及海者命曰枝水山之溝流於大水及海者命曰川水水出於地而不流者命曰渊水淮南子曰天下之物莫柔弱於水上天則爲雨露下地則爲潤澤万物弗得不生百事不得不成大苞群生而无所私澤及􅉥蹺􅉥蹺行也蹺微小之䖝也而不求報冨贍天下而不旣贍足也旣尽也德施百姓而不費徳澤加扵百姓不以爲己財費也行不可得而窮極也流膏不止微而不可得把握也擊之无創䠶之不傷斬之不断焚之不燃水之性也淖溺流遁錯繆相紛遁逸也錯繆相紛波相糾也而不可靡散利貫金石強濟天下水流缺石是其利也舟舡所載无有重是其強也済通也動溶无形之域而翶翔忽區之上忽慌之區上也言其飛爲雲􅀨无所不止邅廽川谷之間邅廽猶委曲也而滔騰大荒之野有餘不足與天地取與授万物而無所前後前後皆与之是故無所私而无所公公私一也靡濫振蕩与天地同鴻鴻大同通无所左而所右蟠委錯音􅎮與万物始終流轉是謂至德言水之爲德最大故曰至德也夫水所以能成其至德於天下者以其淖溺潤滑也故老聃之言曰天下至柔馳騁於天下之至堅出於无有入於无間是水也吾是以知无爲之有益有益扵生夫无形者物之大祖也无音者聲之大宗也无形生有形故爲物大祖也无音生有音故爲声大祖大宗皆大也其子爲光其孫爲水皆生于无形乎光無形道所貴也觀之故子爲光也水形而不可毀差之故孫爲形也夫光可見而不可握水可循而不可毀故有像之􅀋莫尊於水出生入死自无蹠有自有蹠无而以衰賤矣出生出生道謂去清浄也入死入死道謂情欲也蹠適也自无形􅃴有形離其本也自有形􅃴无形不能復得道家所以衰賤也是故清浄者德之至也而柔弱者道之要也要約虚而恬愉者万物之用也万物由之得爲人用粛然應感殷然反本則淪於无形矣所謂无形者一之謂也一者道之本也所謂一者无疋合於天下者也卓然獨立塊然獨處上通九天下貫九野九天八方中央也九野亦如之貟不中䂓方不中矩大渾而爲一弃无根言微妙也懷囊天地爲道開門開道之門穆忞隱閔純德獨存穆忞隱閔皆无形之􅀋也純不􅄂糅也布施而不旣用之而不勤旣尽也勤勞}
