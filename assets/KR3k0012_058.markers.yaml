  - {type: variant, offset: 824, length: 154, content: 山林之士往而不能返朝廷之士入而不能出後漢書曰法雄為南郡太守移書屬縣曰凡虎狼之在山林猶人民之居城市張瑩漢南記樊重家素富田至三百頃竹木成林六畜放牧桑漆魚池閉門成市魏志曰曹植上疏曰東有覆敗之軍西有殪沒之將至使蜂蛤浮翔於淮泗鼲鼬讙譁於林木臧榮緒晉書曰郄詵為雍州刺史帝於東堂餞之問詵曰卿自以為何如詵對曰臣舉賢良對策為天, WYG: 潤}
