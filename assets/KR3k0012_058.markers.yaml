  - {type: variant, offset: 118, length: 145, content: 鳩彼晨風鬱彼北林毛萇曰北林名也招賢人往從之使疾如晨風之飛入北林又曰有鶖在梁有鶴在林鄭玄曰鶖之性貪惡而今在梁鶴洁白而反在林也又曰厥初生民時惟姜嫄載生載育時維后稷誕寘之隘巷羊牛腓字之毛萇曰寘置也腓辟也字愛也鄭玄曰姜嫄置后稷羊牛之徑亦以為異也誕寘之平林會伐平林置人平林又為人所收取也又曰瞻彼中林牲, SBCK: 􅀂渉大水}
