  - {type: variant, offset: 1622, length: 620, content: 為高不虧節為美豈可委身待辱哉於是自刺二嫂既死芝獨不死叔明言於將軍耿弇耿弇以駙馬負芝芝曰女子亡之餘汙將軍服乘不可也弇奇其言更以他馬負芝至營為致醫藥因乃得全郡表其閭九十壽終又曰譙國曹文叔妻者同郡夏侯文寧之女字令女文叔早死無子喪畢斷髮自誓不貳其後家欲嫁之又截兩耳依文叔從兄爽爽後被誅文寧上書與曹氏絕婚復欲嫁之乃割鼻其母謂曰曹氏夷滅已盡守此欲為譙乎令女曰仁者不以盛衰改節義者不以存亡易心曹氏前盛尚欲保終況今衰滅何忍棄之太傅司馬公聞而嘉嘆聽乞子為曹氏後又曰吳孫奇妻者廣陵范慎女名姬十八配奇一年而奇亡慎以姬少寡無子起還其家姬不肯歸迎者以父命迫之姬遂操刀割耳及鼻曰父迎我者不過以我年少色美今已殘矣行將焉之於是迎者空反又曰丹陽華穆妻者下邳劉方之女字桃樹生一男而早亡吳丁諝相與反知名之士家將嫁許焉桃樹聞之乃操刀割耳其子又亡樹桃安身守正動不踰禮又曰吳沈伯陽妻者顧文宣之女字昭君早寡無嗣盡禮供養其父陰許人姑聞之而哭昭君乃引刀剪髮割兩耳以明其志又曰吳許昇妻呂氏之女名榮升遊誕博戲不治操行榮躬勤家業以養其姑勸升學問未嘗不垂淚而言榮父疾升呼榮欲改嫁之榮曰命之所遭義無離貳終不肯歸升後感悔尋師遠學四年乃歸遂致名譽為州所辟遇劫害歲餘姑亡夫族多欲娉之誓不肯嫁後黃巾賊欲犯之榮踰垣而走賊拔刀追榮曰從我則生不從立死榮曰義不畏死而見虜辱也賊遂殺之又曰河南貞義者樂羊子之妻羊子出學七年不歸鄰人欲犯貞義而劫其姑貞義操刀而出鄰人曰從者可不從者殺汝姑貞義仰天而歎以刀刎頸而死太守以大夫葬之, SBCK: ''}
