  - {type: variant, offset: 2262, length: 0, content: '', WYG: 奉掩廹合婚其旦計欲殺奉恐禍及母叔孤兒永棄慷慨流涕自殺而死益部耆舊傳曰犍為楊鳯珪妻者蜀郡臨卭陳氏女也名姬珪早亡時姬産子適生六月躬䘮事育㓜孤三年䘮訖兄弟宗親哀其子少年壯謀議更配以許蜀中豪姓姬聞仰天歎息引刀割咽㡬死於是九族驚􅕎遂敬從其節又曰捷為南安周繕紀妻者同縣曹氏女也名禁字敬姬年十七適周氏二年而夫亡隕時禁懐妊數月後産子元餘䘮事闋遂移居依託父母欲必守義育養孤弱父愍其年少子稚黙以許同縣􅈢賔遣車馬衣服來欲迎禁父乃告禁勃然作色悽愴言曰近依父母本不圖此因流涕慷慨乃自投舍後流水於是舉家兢赴救出而氣息已絶積二日一夜乃復蘇息二親由是知其至誠謝賔解婚禁歔欷長歎乃更将予還依夫弟居止潔身執操非禮不動又曰廣漢新都便敬妻者同縣王氏女也名和年十七適敬敬亡和肓養遺孤闔門守節不隨宗家宴樂嘉㑹居理甚修蜀郡何玉因謀問和兄著取和遂相聽許著深曉曰夫死子小經有改圖加貧衰無以自立何氏公族必㨿福祚和自陳説計斷决分守全孤弱辭言未訖慷慨涕淚哀慟左右然著終受玊幣因欲廹脅和乃㫁耳示著以信至不見聽請以死謝舉宗敬重哀其大義又曰巴三貞者閬中馬𦕈新妻義西充國王元憤妻姬皆䦘中人也閬中趙君妻華西充國人也姬早失夫介然守操中平五年黄巾餘類延益州賊帥趙蕃據閬中城拘廹衣冠令入婦女為質義姬華等隨北入城後賊類争勢攻破閬中時人或死或奔家室相失義姬華隨類出城走傳聞後賊或拘略婦女於是三人自度窮廹恐不免於拘逼乃相與自沈於水而死鄉黨聞之莫不感傷號曰三貞又曰蜀郡廣都公乘士㑹妻者同縣張氏女也㑹早卒年壯無嗣欲有問者親戚将以許之發憤慷慨㫁髪割耳事姑盡禮肅恭供養養族子以承宗廟列女傳為熊氏女㫁髪割耳同又曰廣漢廖伯妻者同縣殷氏女也名紀年十六適伯伯早卒既性聦敏逹於詩書女傳進退間暇又有美色見貪割面告誠以全其節曰求生害仁仁者不為紀生見禮義豈獨使古人擅名者哉因作詩三章以風父母而舉縣嘉其才麗媒介滋繁遂援刀㫁指明情邵氏家傳曰虞建武都尉邵夫人字義姬鴻臚之弟二女夫人少而寡虞氏及夫人之宗哀夫人辛苦欲更為圖婚然重夫人宿操慮不可以非禮逼亦知夫人潜佩刀誓以必死故不敢生意夫人自以虞氏㓙短繼世無子常獨處一室絶書學非祭祀墳墓不出紡績輙貨以供祭稱其多少不求豐厚干寳捜神記曰東越閩中有庸嶺髙數十里其下北隰中有大蛇長七八丈大十圍常病治都尉及屬城長吏多有死者祭以牛羊故不得福或與人夢或下喻巫祝欲得啖童女年十二三者都尉令長並共患之然氣厲不息共請求人家生婢子有罪家女養之八月朝祭送蛇輙夜出吞噬之累年如此前後已用九女爾時豫募賚未得将樂縣李誕有六女無男其小女寄應募欲行父母不聽寄曰父母無相生女六人雖有如無無有緹縈濟父母之功不能供養消費衣食生無所益不如蚤亡賣寄之身可得少錢父母終不聽寄自潜發不可禁止寄乃行請好劒及咋蛇犬先作數石米餈用蜜灌之以置穴口蛇夜便出頭大如囤目如三尺鏡聞餈香氣先啖食之寄便放犬犬就噬咋寄從後斫得數創蛇因踊出至庭而死寄入視其穴得九女髑髏悉舉出緩步而歸越王聞之聘寄為后拜其父為将樂令母及娣皆有賜自是東治無復妖邪之物其歌謡至今存焉杜預女記曰二寡婦者淑也昺也淑䘮夫守寡兄弟将嫁之誓而不許為書曰盖聞君子導人以徳矯俗以禮是以烈士有不移之志貞女無廻二之行淑雖婦人竊慕殺身成義死而後已夙遘禍罰䘮其所天男弱未冠女㓜未笄是以僶俛求生将欲長育二子上奉祖宗之嗣下繼祖穪之禮然後覲于黄泉永無慙色仁兄徳弟既不能厲髙節於弱志發明明於闇昩許我他人逼我于上乃命官人訟之簡書夫智者不可惑以事仁者不可脅以死晏嬰不以白刃臨頸改正直之辭梁寡不以毁形之痛忘執節之義髙山景行豈不思齊計兄弟不能匡我以道􅀶我以文雖曰既學吾謂之未也祖冲之述異記曰晋元興末魏郡民陳氏女名琬家在查浦年十六饑疫之嵗父母相繼死没惟有一兄傭賃自活女容色甚艶隣中士庻見其貧弱競以金帛招要之女立操貞槩未嘗有許後值盧循之亂賊衆将加陵逼女厲然不廻遂以被害杜預女記曰大女緱玉者陳緱}
