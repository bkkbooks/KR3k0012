  - {type: variant, offset: 2253, length: 0, content: '', SBCK: 天水姜叙母者同郡楊阜之姑也阜爲州吏馬超殺刺史太守叙屯歷城阜徃見之歔欷悲悵叙曰何爲乃爾阜曰守城不能完君亡不能死何以視息於天下乎君擁兵專制而無討賊之心此趙盾所以書弑也叙母􅁣然勒叙從阜計遂起兵於鹵城超聞之襲歷城得叙母母罵之曰􅀂背父之逆子殺君之桀賊天豈乆容􅀂何不早死敢以面目視人乎超即殺之超敗隴右平定魏武令曰姜叙之母明智乃爾雖楊敞之妻蓋不過也又曰留子直妻者歷陽人}
