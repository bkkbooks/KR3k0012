  - {type: variant, offset: 2326, length: 392, content: 廣德羅勤之女為同縣朱曠所婚禮未成勤遇疫疾喪沒鄰比斷絕曠觸冒經營尋復病亡靜感其義遂誓不嫁與弟妹共居求者過十餘志無傾移有楊祚者多將人眾自往納幣靜乃逃竄祚劫其弟妹靜懼為祚所害乃出見之曰實感朱曠為妾父而死是以託身亡者自誓不貳辛苦之人願君哀而舍之如其不然請守之以死祚乃舍之靜守純固年六十餘卒又曰蜀景奇妻者羅氏之女字貢羅奇亡無嗣貢羅專心供養父青以許同郡宰詩貢羅與父母書陳其情志曆年不歸後青使詩白州告縣發遣貢羅乃由徑道詣州自訴言意慷慨請死不從州嘉而許焉貢羅恐詩於道路迫脅乃請吏兵自衛還家執義終身又曰犍為相登妻者周氏之女名度適登一年而寡牢令吳厚因人問度心執匪石引刀截髮縣長吏復遣媒欲娉度曰前已斷髮謂足表心何誤復有斯言哉取刀欲割鼻左右救止表其閭又曰廣漢馮季宰妻者季氏之女名珥字進娥早寡無嗣奉飬繼姑及宰兄顯守心純固以義自防珥母愍其姑苦陰有所許珥斷髮自明遂乞飬男女各一率道有法鄉人稱之又曰廣漢王輔妻彭氏之女, SBCK: 光武皇帝姊}
