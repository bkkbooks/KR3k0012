  - {type: variant, offset: 2253, length: 0, content: '', WYG: 天水姜叙母者同郡楊阜之姑也阜為州吏馬超殺刺史太守叙屯厯城阜往見之歔欷悲悵叙曰何為乃爾阜曰守臣不能完君亡不能死何以示志於天下乎君擁兵專制而無討賊之心此趙盾所以書弑也叙母慨然勒叙從阜計遂起兵於鹵城超聞之襲厯城得叙母罵之曰若背父之逆子殺君之桀賊天豈乆容若何不早死敢以面目視人乎超即殺之超敗隴右平定魏武令曰姜叙之母明智乃爾雖楊敞之妻盖不過也又曰留子直妻者厯楊人}
