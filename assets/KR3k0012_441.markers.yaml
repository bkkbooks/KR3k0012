  - {type: variant, offset: 2261, length: 0, content: '', SBCK: 呉氏之女漢末喪亂流寓東城東城令戚竒欲北就吕布焚城疊虜人衆聞女有容色善史書能彈琴瑟遂殺悝住車令僕者接女上車女謂竒曰君隳壞都城虜略士女殺人之夫欲以人婦爲妻何酷逆之甚願守志而死不願無行而生遂自刎竒猶有哀慙殯葬乃去又曰戎士陳南妻丹者戴氏之女羙而早寡事舅姑恭篤同伍之人咸樂其賢色求者甚多守死不嫁後之娉者告其軍主軍主命之知不得巳乃自經死韓詩外傳曰魯公甫文伯死其母不􅂘季孫聞之曰公甫文伯之母貞女也子死不􅂘必有方矣使人問焉對曰昔是子也吾使事仲尼仲尼去魯送之不出魯郡贈之不以家珎且吾聞君子貴義而賤利是子病不見士來視死不見士之流涕死之日宫女縗絰從者十人不足於士而有餘於婦人吾是以不􅂘陳壽益部􅂄舊傳曰廣漢德陽王上妻者同縣􅀽氏女也名福年二十適上舅姑旣没復遭上喪悲傷感切不妄言􅀏有二子養育遺􅀌執心純篤及叔父愍其窮困私以許}
  - {type: page-break, offset: 2261, content: '', id: KR3k0012_SBCK_441-5b}
  - {type: variant, offset: 2261, length: 0, content: '', WYG: 吳氏之女漢末䘮亂流寓東城東城令戚竒欲北就吕布楚城疊虜人衆聞女有羙色善史書能彈琴瑟遂殺悝住車令僕者接女上車女謂竒曰君隳壊都城虜略士女殺人之夫欲以人婦為妻何酷逆之甚願守志而死不願無行而生遂自刎竒猶有哀慙殯葬乃去又曰戎士陳南妻丹者戴氏之女羙而早寡事舅姑恭篤同伍之人咸樂其賢色求者甚多守死不嫁後之聘者告其軍主軍主命之知不得已乃自縊死韓詩外傳曰魯公甫文伯死其母不哭季孫聞之曰公甫文伯之母貞女也子死不哭必有方矣使人問焉對曰昔是子也吾使事仲尼仲尼去魯送之不出魯郡贈之不以家珎且吾聞君子貴義而賤利是子病不見士來視死不見士之流涕死之日宫女縗經從者十人不足於士而有餘於婦人吾是以不哭陳壽益部耆舊傳曰廣漢徳陽王上妻者同縣袁氏女也名福年二十適上舅姑既没復遭上䘮悲傷感切不妄言笑有二子養育遺孤執心純篤及叔父愍其窮困私以許}
  - {type: page-break, offset: 2261, content: '', id: KR3k0012_WYG_441-8b, image: WYG0897/WYG0897-0070d.png}
