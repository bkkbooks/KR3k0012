  - {type: variant, offset: 2261, length: 0, content: '', krp: 呉氏之女漢末喪亂流寓東城東城令戚竒欲北就吕布焚城疊虜人衆聞女有容色善史書能彈琴瑟遂殺悝住車令僕者接女上車女謂竒曰君隳壞都城虜略士女殺人之夫欲以人婦爲妻何酷逆之甚願守志而死不願無行而生遂自刎竒猶有哀慙殯葬乃去又曰戎士陳南妻丹者戴氏之女羙而早寡事舅姑恭篤同伍之人咸樂其賢色求者甚多守死不嫁後之娉者告其軍主軍主命之知不得巳乃自經死韓詩外傳曰魯公甫文伯死其母不哭季孫聞之曰公甫文伯之母貞女也子死不哭必有方矣使人問焉對曰昔是子也吾使事仲尼仲尼去魯送之不出魯郡贈之不以家珎且吾聞君子貴義而賤利是子病不見士來視死不見士之流涕死之日宫女縗絰從者十人不足於士而有餘於婦人吾是以不哭陳壽益部耆舊傳曰廣漢德陽王上妻者同縣袁氏女也名福年二十適上舅姑旣没復遭上喪悲傷感切不妄言笑有二子養育遺孤執心純篤及叔父愍其窮困私以許}
  - {type: variant, offset: 2262, length: 0, content: '', SBCK: 奉掩迫合婚其旦計欲殺奉恐禍及母叔􅀌兒永棄死讎必生忼􅁣流涕自殺而死益部􅂄舊傳曰犍爲楊鳯珪妻者蜀郡臨卭陳氏女也名􅁎珪早亡時􅁎産子適生六月躬喪事育㓜􅀌三年喪訖兄弟宗親哀其子少年壯謀議更配以許蜀中豪姓􅁎聞仰天歎息引刀割咽幾死於是九族驚愕遂敬從其節又曰犍爲南安周繕紀妻者同縣曹氏女也名禁字敬􅁎年十七適周氏二年而夫亡隕時禁懷姙數月後産子元餘喪事闋遂移居依託父母欲必守義育養􅀌弱父愍其年少子稚黙以許同縣狐賔遣車馬衣服來欲迎禁父乃告禁勃然作色悽愴言曰依近父母夲不圖此因流涕忼愾乃自投舎後流水於是舉家競赴救出而氣息已絶積二日一夜乃復蘇息二親由是知其至誠謝賔解婚禁欷歔長歎乃更將子還依夫第居止㓗身執操非禮不動又曰廣漢新都便敬妻者同縣王氏女也名和年十七適敬敬亡和育養遺􅀌闔門守節不隨宗家宴樂嘉㑹居理甚脩蜀郡何玉因媒問和兄著取和遂相聽許著􅀷曉其夫死子小冝有改圖加貧衰無以自立何氏公族必據福祚和自陳􅀃斷計決分守全􅀌弱辭言未訖忼􅁣涕淚哀慟左右然著終受玉幣因欲迫脅和乃斷耳示著以信至見聽請以死謝舉宗敬重哀其大義又曰巴三貞者閬中馬眇新妻義西充國王元憤妻􅁎皆䦘中人也閬中趙蔓君妻華西充國人也􅁎早失夫介然守操中平五年黄巾餘􅀋延益州賊帥趙蕃據閬中城抅迫衣冠令人婦女爲質義􅁎華等隨比入城後賊􅀋爭勢攻破閬中時人或死或奔家室相失義􅁎華隨􅀋出城走傳聞後賊或抅略婦女於是三人自度窮迫恐不免於據逼乃相與自沈水而死郷黨聞之莫不感傷號曰三貞又曰蜀郡廣都公乗士㑹妻者同縣張氏女也㑹早卒年壯無嗣欲有問者親戚將以許之發憤忼愾斷髮割耳事姑盡禮肅恭供養養族子以承宗廟列女傳爲熊氏女断髪割耳同又曰廣漢廖伯妻者同縣殷氏女也名紀年十六適伯伯早卒紀性聦敏逹於詩書女傳進退閑暇又有羙色見貪割面告誠以全其節曰求生害仁仁者不爲紀生見禮義豈獨使古人擅名者哉因作詩三章以風父母而舉縣嘉其才麗媒介滋繁遂援刀斷指明情邵氏家傳曰虞建武都尉邵夫人字義􅁎鴻臚之第二女夫人少而寡虞氏及夫人之宗哀夫人辛苦欲更爲圖婚然重夫人􅀫操慮不可以非禮逼亦知夫人潛佩刀誓以必死故不敢生意夫人自以虞氏凶短繼丗無子常獨處一室絶書學非􅀕祀墳墓不出紡績輙貨以供􅀕稱其多少不求豐厚于寳搜神記曰東越閩中有庸嶺髙數十里其下北濕中有大蛇長七八丈大十圍常病治都尉及屬城長吏多有死者􅀕以牛羊故不得福或與人夢或下喻巫祝欲得啖童女年十二三者都尉令長並共患之然氣厲不息共請求人家生婢子有罪家女養之八月朝􅀕送蛇輙夜出吞噬之累年如此前後巳用九女尓時豫募賫未得將樂縣李誕有六女無男其小女􅀉應募欲行父母不聽􅀉曰父母無相生女六人雖有如無無有緹縈濟父之功不能供養消費夜食生無所益不如蚤亡賣􅀉之身可得少錢父母終不聽􅀉自潛發不可禁止􅀉乃行請好劔及咋蛇犬先作數石米餈用蜜灌之以置穴口蛇夜便出頭大如囷目如三尺鏡聞餈香氣先啖食之􅀉便放犬犬就噬咋􅀉從後斫得數創蛇因踊出至庭而死􅀉入視其穴得九女髑髏悉舉出緩歩而歸越王聞之娉􅀉爲后拜其父爲將樂令母及姊皆有賜自是東冶無復祅邪之物其歌謡至今存焉杜預女記曰二寡婦者淑也昺也淑喪夫守寡兄弟將嫁之誓而不許爲書曰蓋聞君子導人以德矯俗以禮是以列士有不移之志貞女無迴二之行淑雖婦人􅀼慕殺身成義死而後巳夙遘禍罰䘮其所天男弱未冠女㓜未笄是以僶俛求生將欲長育二子上奉祖宗之嗣下繼祖禰之禮然後覲于黄泉永無慙色仁兄德弟旣不能厲髙節於弱志發明德於闇昧許我他人逼我于上乃命官人訟云簡書夫智者不可惑以事仁者不可脅以死晏嬰不以白刄臨頸改正直之辭梁寡不以毀形之痛忘執節之義髙山景行豈不思齊計兄弟備託學門不能匡我以道􅀶我以文雖曰旣學吾謂之未也祖冲之述異記曰晉元興末魏郡民陳氏女名琬家在查浦年十六飢疫之歳父母相係死没唯有一兄傭賃自活女容色甚艶隣中士庻見其貧弱竟以金帛招要之女立操貞槩未嘗有許後值盧循之亂賊衆將加凌逼女厲然不迴遂以􅀍害杜預女記曰大女緱玉者陳緱}
