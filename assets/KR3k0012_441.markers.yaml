  - {type: variant, offset: 2844, length: 241, content: 其弟會喪援刀割耳明己不貳在喪側者無不感傷宗婦謂之曰家未有相嫁之計若其有也徐可因姊妹以喻意何貴義輕身之甚耶荅曰昔我君五更學為儒宗尊為帝師歷世不替以忠孝顯女以貞順稱是以懼忝諸姑或以我年未衰又喪子卒迫之間非所能防豈可不豫見其意哉郡表其閭號曰景行義桓皇甫謐列女傳曰沛公孫去病妻者同郡戴元世之女既嫁久而無子謂其夫曰妾不才得奉巾櫛歷年無嗣禮有七出請願受訣以其夫不許復進曰福莫大於昌熾禍莫大於絕嗣君不忍見遣當更廣室夫復不肯夫死服除父母欲嫁之女遂操刀割鼻郡表其閭又曰梁夏文生妻者沛國劉景賓之女名娥生, SBCK: 太平御覽卷第四百四十}
