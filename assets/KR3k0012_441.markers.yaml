  - {type: variant, offset: 773, length: 8, content: 聞難號呼專執夫袂, SBCK: 之女字貴女與母俱流移共止孝謙好酒兇悖無子􅡾之禮貴女毎涕泣諌喻不能匡改母怨孝謙之爲貴女輙悲哀不食言於鄰人曰爲子致母於辱非孝也事無道之人非義也昔秋胡之妻不忍見不義之人我何爲於世間哉乃自殺又曰沛周明都妻有衛尉趙長平之女也名阿長平德行純粹海内知之阿少習儀訓長閑婦道而都驕􅁋暴躁不式上命都父衛謂阿曰新婦賢者女也當以禮法匡􅡾都之不改新婦之過也阿旣拜命退謂}
