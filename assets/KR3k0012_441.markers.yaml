  - {type: variant, offset: 2254, length: 3, content: 中趙嵩, SBCK: 末擾攘隨夫之從父客居豫章從父通郡牧族之妻年少有色太守客請以爲妻守死不從十餘日客以還太守夷殺之臨死不變口無言郡吏及客憐之更還救請旣得活乃自割耳乆之太守聞其夫在遂還其妻又曰下邳陳悝}
