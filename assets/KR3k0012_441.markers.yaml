  - {type: variant, offset: 1260, length: 2, content: 陽侯, SBCK: 秋㓗婦者魯秋胡子之妻也秋胡子旣納之五日而去官於陳五年乃歸未至家見路傍有一羙婦人方採桑秋胡子下車謂曰苦􅁀採桑吾行道逺願託桑隂下餐婦人採桑不輟秋胡子謂曰力田不如逢年力桑不如見郎今吾有金願與夫人曰嘻夫採桑力作紡績織以衣食奉二親飬夫子而巳矣吾不願人之金也収子之資與子笥金秋胡還家奉金遺母母使人呼其婦婦至乃向採桑者婦曰君辭家逺仕五年方還當乍驅楊塵疾至今也乃恱道旁婦人是忘母不孝好色􅁋佚是汙行也妾不忍見不義不孝之人子改娶矣妾亦不嫁遂去東走自投於河而死又曰梁寡髙行者梁之寡婦榮於色敏於行早寡不嫁梁貴人争欲取之不能得梁}
  - {type: page-break, offset: 1260, content: '', id: KR3k0012_SBCK_441-4a}
  - {type: variant, offset: 1260, length: 2, content: 陽侯, WYG: 秋潔婦者魯秋胡子之妻也秋胡子既納之五日而去官於陳五年乃歸未至家見路傍有一美婦人方採桑秋胡子下車謂曰苦暴採桑吾行道逺願托桑䕃下餐婦人採桑不輟秋胡子謂曰力田不如逄年採桑不如見郎今吾有金願與夫人曰嘻夫採桑力作紡績纎以衣食奉二親養夫子而已矣吾不願受人之金也收子之資與子笥金秋胡還家奉金遺母母使人呼其婦婦至乃向託採桑者婦曰君辭家逺仕五年方還當作驅揚塵疾至今也乃恱道旁婦人是忘母不孝好色淫佚是汚行也妾不忍見不義不孝之人子改娶矣妾亦不嫁遂去東走自投於河而死又曰梁寡髙行者梁之寡婦榮於色敏於行早寡不嫁梁貴人争欲取之不能得梁}
