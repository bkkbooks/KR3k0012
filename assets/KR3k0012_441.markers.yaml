  - {type: variant, offset: 2266, length: 0, content: '', SBCK: 夫之從母兄弟殺其父玉乃爲父報讎其殺巳至親􅅞玉付吏獄竟當行刑有名士申徒子龍者緱玉同縣人也嘉其義勇奏記於縣曰伏聞大女緱玉爲父報讎獄巳決不勝感悼之情敢陳所聞昔太原周黨感春秋義辭師復讎當時論者猶髙其節况玉女弱耳無所聞心無所激内無同生之謀外無交遊之助直推父子之情􅁬發怒之心手刄刺讎僵尸流血當時聞之人無勇怯莫不強膽増氣輕身殉義攘􅃑髙談稱羡今聞玉幽執牢檻罪名巳定皆心低意沮悵恨長歎蟠雖愚竪以爲玉之節義歷代未有定足以感無恥之􅀌激忍辱之子假玉不值明時尚望追旌閭墓顯異後嗣况事在清聽不加八議哀矜之貸誠爲朝廷痛之申屠蟠}
