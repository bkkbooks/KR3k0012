  - {type: variant, offset: 1450, length: 171, content: 夫從役遠赴國難婦攜弱子餞送此山立望而死形化為石列女傳曰息夫人者息君之夫人伐息破之虜其君使守門將其夫人而納之於宮楚王出遊夫人遂出見息君謂之曰人生要一死而已何自苦乃作詩曰穀則異室死則同穴謂予不信有如皎日息君止之夫人不聽遂自殺息君亦自殺又曰安定陳仲妻者同郡張叔明之妹名芝字李張年十四適仲朞年而寡執節不嫁叔明從軍芝與二嫂沒賊恐見侵略而相謂曰婦人以不汙, SBCK: ''}
