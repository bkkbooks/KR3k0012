  - {type: variant, offset: 1717, length: 0, content: '', WYG: 而母賤由是不為邦族所齒初為里佐屢逢屈辱於是感激逃入山中遂博覽書籍多所通涉山東學者皆宗之既還郷里不應辟命與趙郡李士謙為忘年之友每相徃來時稱李崔及士謙死廓哭之慟為之作𫝊輸之秘書府士謙妻盧氏寡居每有家事輒令人諮廓取定廓嘗著論言刑名之理其義甚精大業中終于家時年八十又曰徐則東海剡人也㓜沉靜寡嗜欲受業於周𢎞正善三𤣥精論議懐栖隱之操杖策入縉雲山後學數百人苦請教授則謝而遣不娶妻常服巾褐陳太建時應召來憩至於貞觀朞月又辭入天台山因絶粒養性所資啜松水而已雖隆冬沍寒不服綿絮初入縉雲山太極真人徐君降之曰汝年出八十當為王者師然後得道也晉王諱鎮知其名手書詔之遂詣揚州其後夕中命使者取香如平常朝禮之儀至五更而卒支體柔弱如生又曰張文詡河東人也父居開皇中為洹水令以清正聞有書千卷教訓子孫皆以明經自達文詡博覽文史特精三禮髙祖引致天下名儒碩學之士文詡時遊於太學學内翕然咸宗仰之其門生多詣文詡請質疑滯文詡輒博引證據辨說}
  - {type: page-break, offset: 1717, content: '', id: KR3k0012_WYG_506-2b, image: WYG0897/WYG0897-0541d.png}
  - {type: page-break, offset: 1717, content: '', id: KR3k0012_WYG_506-3a, image: WYG0897/WYG0897-0542a.png}
  - {type: variant, offset: 1718, length: 2, content: 紙常, SBCK: 備也示}
  - {type: variant, offset: 1718, length: 1, content: 紙, WYG: 窮唯其所擇右僕射蘇威聞其名而召之與語大悦勸令従官文詡意不在仕固辭仁夀學廢文詡策杖而歸灌園為州郡頻舉皆不應命事母以孝聞每以徳化鄉黨頗移風俗}
  - {type: page-break, offset: 1718, content: '', id: KR3k0012_WYG_506-3b, image: WYG0897/WYG0897-0542b.png}
