  - {type: punctuation, offset: 1119, content: 「, id: KR3k0012_CHANT_506-bkkpn271}
  - {type: variant, offset: 1119, length: 3, content: 樓惠明, SBCK: 崔覲梁州城固人也爲儒不樂仕進以耕稼爲業老而無子乃以田宅家財分給奴婢令各爲主業覲夫妻遂隱於城固南山家事一不問約奴婢遞過其舎至則供給酒食而己夫婦林泉相對以嘯詠自娱山南節度使鄭餘慶髙其行辟爲節度叅謀累邀方至府第爲吏無方略苦不逹人事餘慶以長者優容之太和八年左􅀘闕王直方薦覲有髙行詔以起居郎徴之覲辝疾不起卒於山皇甫士安髙士傳曰王倪者堯時賢人也師􅀍衣齧缺又學於王倪問道焉齧缺曰子不知利害則至人固不知利乎王倪曰至人神矣大澤焚而不能􅀬河漢􅴟而不能寒疾雷破山􅁀風振海而不能驚􅀂然者乗雲雨􅀐日月而遊天地之外死生無變於巳而况利害之間乎又曰善卷者古之賢人也堯聞其得道之士乃北面師之而問道焉及舜受終之後又以天下讓卷卷曰昔唐氏之有天下不教而民從之不賞而民勸之天下均平百姓安静民不知怒不知喜今子盛爲衣裳之服以觀民目調五音之聲以亂民耳作皇韶之樂以愚民心耳目益榮天下之亂從此始矣吾雖爲之其何益乎予立宇宙之中冬衣皮毛夏衣絺􅁑春耕種形足以勞秋収歛身足以休日出而作日入而息逍遥於天地之間而心意自得何以天下爲哉遂不受去入深山莫知所終矣又曰齧缺尭時人許由師事齧缺堯又師由問曰齧缺可以配天乎旣而齧缺遇由由曰子將何之曰將逃堯曰何謂也曰夫堯知賢人之利天下而不知其賊天下遂逃不見又曰巢父堯時隱人年老以樹爲巢而寢其上故時人號曰巢父堯之讓許由也由以告巢父巢父曰汝何不隱汝形藏汝光􅀂非吾友也擊其膺而下之由悵然不自得乃過清泠之水洗其耳拭其目曰向者聞言負吾矣遂去終身不相見又曰許由}
