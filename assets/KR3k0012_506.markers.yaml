  - {type: variant, offset: 823, length: 1, content: 躬, krp: 貧而母賤由是不爲邦族所齒𥘉爲里佐屢逢屈辱於是感激逃入山中遂愽覽書籍多所通渉山東學者皆宗之旣還郷里不應辟命與趙郡李士謙爲忘言之友毎相徃來時稱李崔及士謙死廓哭之慟爲之作傳輸之祕書府士謙妻廬氏寡居毎有家事輒令人諮廓取定廓嘗著論言刑名之理其義甚精大業中終于家時年八十又曰徐則東海郯人也㓜沉静寡嗜欲受業於周弘正善三玄精論議懷栖隱之操杖䇿入縉雲山後學數百人苦請教授則謝而遣之不娶妻常服巾褐陳太建時應召來憇於至真觀朞月父辤入天台山因絶粒養性所資唯松水而巳雖隆冬沍寒不服綿絮𥘉入縉雲山太極真人除君降之曰汝年出十八當爲王者師然後得道也晉王諱鎭知其名手書詔之遂詣楊州其後夕中命侍者取香火如平常朝禮之儀至五更而卒支體柔弱如生又曰張文詡河東人也父琚開皇中爲洹水令以清正聞有書千卷教訓子姪皆以明經}
  - {type: variant, offset: 825, length: 0, content: '', krp: 逹文詡愽覽文史特精三禮髙祖引致天下名儒碩學之士文詡時逰於太學學内翕然咸共宗仰其門生多詣文詡請質疑滯文詡輒博引證據辨說無窮唯其所擇右僕射蘇威聞其名而召之與語大恱勸令從官文詡意不在仕固辤仁壽末學廢文詡䇿杖而歸}
