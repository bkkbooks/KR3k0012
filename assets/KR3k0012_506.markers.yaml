  - {type: variant, offset: 2100, length: 33, content: 汝師之麟士常苦無書因遊都下歷觀四部畢乃歎曰古人亦何人哉少時稱疾歸鄉, WYG: 示以知其情必}
  - {type: variant, offset: 2102, length: 538, content: 之麟士常苦無書因遊都下歷觀四部畢乃歎曰古人亦何人哉少時稱疾歸鄉不與人物通或勸之仕荅曰魚懸獸檻天下一契聖人玄悟所以每履吉先吾誠未能景行坐忘何能不希企日損乃作玄散賦以絕世隱居吳差山講經從學之士數百人各管屋宇依止其側時為之語曰吳差山中有賢士開門教授居成市又曰諸葛璩字幼玟琅邪人也世居京口璩幼事徵士關康之博涉經史復師徵士臧榮緒榮緒著晉書稱璩有發擿之功方之靈壺齊建武初江祀薦璩於明帝言璩安貧守道閱禮敦詩如其簡退可揚清激濁辟為議曹從事帝許之璩辭不赴陳郡謝眺為東海太守下教揚其風慨餉穀百斛梁天監中舉秀才不就璩性勤於誨誘後出就學者日至居宅狹陋無以容之太守張庂為起講舍璩處身清正妻子不見喜慍之色旦夕孜孜講誦不輟時人益以此宗之又曰劉慧斐字宣文彭城人也少博學能屬文起家梁安成王法曹行參軍常還都途經尋陽遊於匡山遇處士張秀相得甚歎遂有終焉之志因不仕居東林寺又於山北構園一所號曰離垢園時人因謂離垢先生遠近欽慕之簡文遺以机杖論者云自遠法師歿後將二百年始有張劉之盛矣又曰范元琰字伯珪居父憂時童孺哀慕盡禮親黨異之及長好學博通經史兼精佛義祖母患癱常自含吮與人言常恐傷物居家不出城市雖獨居如對賓客見者莫不改容憚之家貧唯以園蔬為業常出行見人盜其菘元琰遽退走母問其故具以實荅問盜者為誰荅曰向所退畏其愧恥今啟其名願不泄也, SBCK: 鄭}
