  - {type: page-break, offset: 1780, content: '', id: KR3k0012_WYG_506-9a, image: WYG0897/WYG0897-0545a.png}
  - {type: punctuation, offset: 1782, content: ，, id: KR3k0012_CHANT_506-bkkpn437}
  - {type: 'tls:seg', offset: 1782, content: '', id: KR3k0012_CHANT_506-13a.18}
  - {type: variant, offset: 1782, length: 1, content: 究, WYG: 刑部尚書王志愔表薦履忠隠居讀書貞苦守操有古人之風堪代禇無量馬懐素入閣侍讀乃徴赴京師及至辭以老病不任職事詔授朝散大夫停留數日而歸履忠鄉人左庻子吳兢謂履忠曰吾子家室屢空竟不霑斗米疋帛雖得五品何益於實也履忠忻然}
  - {type: variant, offset: 1784, length: 4, content: 經史遊學, WYG: 以夀終又曰崔覲梁州城固人也為儒不樂仕進以耕稼為業老而無子乃以田宅家財分給奴婢令各為生業覲夫妻遂隠於城固南山家事一不問約奴婢逓過其舍至則供給酒食而已夫婦林泉相對以嘯詠自娛山南節度使鄭餘慶髙其行辟為節度叅謀累邀方至府第為吏無方畧若不達人事餘慶以長}
  - {type: page-break, offset: 1784, content: '', id: KR3k0012_WYG_506-9b, image: WYG0897/WYG0897-0545b.png}
