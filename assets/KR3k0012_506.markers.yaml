  - {type: variant, offset: 1793, length: 3, content: 守琅邪, WYG: 和八年左補闕}
  - {type: variant, offset: 1797, length: 1, content: 曇, WYG: 直方薦觀有髙行詔以起居郎徴之覲辭疾不起卒於山皇甫士安髙士𫝊曰王倪者堯時賢人也師被衣齧缺又學於王倪問道焉齧缺曰子不知利害則至人固不知利乎王倪曰至人神矣大澤焚而不能熱河漢汗而不能寒疾雷破山暴風振海而不能驚若然者乗雲雨騎日月而逰天地之外死}
