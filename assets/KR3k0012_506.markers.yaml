  - {type: variant, offset: 1734, length: 1, content: 暴, WYG: 三十餘年後入箕山就許由廟東築室而居自稱許由東隣調露中髙宗幸嵩山遣中書侍郎薜元超就問其母逰巖山衣田冠}
  - {type: punctuation, offset: 1736, content: ，, id: KR3k0012_CHANT_506-bkkpn428}
  - {type: 'tls:seg', offset: 1736, content: '', id: KR3k0012_CHANT_506-13a.9}
  - {type: variant, offset: 1736, length: 2, content: 漂溺, WYG: 拜帝令左右扶止之謂曰先生養道山中比得佳否逰巖曰臣泉石膏肓烟霞痼疾既逢聖代幸得逍遥帝曰朕今得卿何異漢獲四皓乎因將逰巖就行宫授崇文學士令與太子少傅劉仁軌談論帝後將營奉天宫于嵩山逰巖舊}
  - {type: page-break, offset: 1736, content: '', id: KR3k0012_WYG_506-5a, image: WYG0897/WYG0897-0543a.png}
  - {type: variant, offset: 1739, length: 0, content: '', WYG: 先在宫側特令不毁仍親書題額懸其門曰隠士田逰巖宅又曰史徳義蘇州崑山人也咸亨初隱居武丘山以琴書自適或騎牛帶瓢出入郊郭東市號為逸人髙宗聞其名徴赴洛陽尋稱疾東歸公卿已下皆賦詩餞别徳義亦以詩留贈其文甚美天授初江南道宣勞使周興表薦則天徴赴都詔曰蘇州隠士史徳義尚志虛𤣥素履貞確謙沖彰於里閈孝友表於閨庭固辭徴辟長徃嚴陵之瀨多謝簮裾髙邁愚公之谷朕承天革命建極開階寤寐星雲物色林壑順禎期而損薜帶應休運以解荷裳粤自海隅來逰魏闕行藏之禮斯得就去之節無違風操可嘉啓沃攸佇特宜優奬委以諌曹授諫議大夫後放歸丘壑又曰王友貞懐州河内人也將弱冠母疾篤醫言唯啖人肉乃差友貞獨念無求理乃割股肉以飴親母疾尋差則天聞之令就其家驗問特加旌表友貞素好學讀九經皆百遍訓誨子弟如嚴君焉口不言人過尤好釋典屏絶羶味出言未曽負諾時論以為真君子中宗在春宫召為司議郎不就神龍初又拜太子中書}
  - {type: page-break, offset: 1739, content: '', id: KR3k0012_WYG_506-5b, image: WYG0897/WYG0897-0543b.png}
