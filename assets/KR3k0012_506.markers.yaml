  - {type: variant, offset: 265, length: 1447, content: 原聶人也隱長廣郡嶗山詔徵為正員郎稱疾不就其後上與崔思祖書曰不食周粟而食周薇古猶發議在今寧得息談耶僧紹弟慶符為青州刺史罷任僧紹隨歸住江乘攝山太祖謂慶符曰卿兄高尚其事亦堯之外臣與朕雖不相接有時通夢乃贈紹竹根如意南史曰郭希林武昌人也曾祖翻晉世高尚不仕希林少守家業徵召一無所就卒子蒙亦隱居不仕又曰辛普明字文達少就關康之受業至性過人居貧與兄共處一帳兄亡仍帳施靈蚊甚多通夕不得寢而終不道侵螫僑居會稽會稽士子高其行當葬兄皆送金為贈後至者不復肯受人問其故荅曰本以兄墓不周故不逆親友之意今實已足豈可利亡者餘贈耶又曰杜京產字景齊吳郡錢塘人也父道鞠州從事善彈棊京產少恬靜閑意榮官頗涉文義專修黃老會稽孔覬清剛有峻節一見而為交郡命主簿州辟從事皆稱疾去與同郡顧懽同契始寧東山開舍受學齊建元中武陵王曄為會稽齊高帝遣儒士劉瓛入東為曄講瓛故往與之遊曰杜生當今之臺尚也永明十年孔珪陸澄沈約表薦京產徵為奉朝請不至於會稽藂徒教授建武初徵員外散騎常侍郎京產曰莊生持釣豈為白璧所廻辭疾不就又曰孔道徽會稽山陰人守志業不仕與杜京產友善道徽父祐至行通神隱於四明山谷中有數百斛錢視之如瓦石太守王僧虔與張緒書曰孔祐敬康曾孫也行動幽祗德標松桂引為主簿遂不可屈此古之遺德也道徽少厲高行能世其家風隱居南山終身不窺都邑豫章王嶷為楊州辟西曹書佐不至鄉宗慕之又曰臧榮緒東莞莒人也少孤躬自灌園以供祭祀母喪洒掃堂宇置筵席朔望輒拜薦焉甘珍未常先食純好學括東西晉為一紀錄志傳一百一十卷隱居京口教授齊高帝為楊州刺史徵榮緒為主簿不到建元中司徒褚彥回啟高帝稱述其美以祕閣榮緒謂人曰昔宮尚奉丹書武王致齋降位李釋教誡並有禮敬之儀因甄明至道乃著拜五經序論常以宣尼庚子日生其日陳五經拜之自號披褐先生又以飲酒亂德言常為誡永明六年卒初榮緒與關康之俱隱在京口時號為二隱又曰吳苞字天蓋濮陽鄄城人也儒學善三禮及老莊宋泰始中過江藂徒教學冠黃葛巾蔬食二十餘年與劉瓛俱於褚彥回宅講授齊隆昌元年徵為太學博士不就始安王遙光及江祐徐孝嗣共為立館於鐘山下教授朝士多到門焉當時稱儒者自劉瓛已後藂徒講授唯苞一人而已以壽終又曰樓惠明字智遠立性貞固有道術居金華山舊多毒害自惠明居之無復辛螫之苦藏名匿跡人莫之知宋明帝召不至齊高帝徵又不至文惠太子在宮苦延方至仍又辭歸俄自金華輕棹西下及就路廻之豐安旬日聞俄賊起唯豐安獨全時人以為有先覺齊武帝勑為立館又曰漁父者不知姓名亦不知何許人也太康孫緬為尋陽太守落日逍遙渚際見一輕舟凌波隱顯俄而漁父至神韻蕭灑垂綸長嘯緬甚異之乃閑問有魚賣乎漁父笑而荅曰其釣非釣寧賣魚者耶緬益怪焉遂褰裳涉水謂曰竊觀先生有道者也終朝鼓枻良足勞止吾聞黃金白壁重利也駟馬高蓋榮勞也方今王道文明守在海外隱鱗之士靡然向風子胡不贊緝熙之美何晦其用若是也漁父曰僕山海狂人不達世務未辨貴賤無論榮貴乃歌曰竹竿籊籊河水悠悠相忘為樂貪餌吞釣非夷非惠聊以忘憂於是悠然鼓棹而去又曰顧歡字景怡吳興鹽官人也家世寒賤父祖並為農歡獨好學年六七歲知推六甲家貧父使田中驅雀歡作黃雀賦而歸雀食稻過半父怒欲撻之見賦乃止鄉中有學舍歡貧無以受業於舍壁後倚聽無遺忘者夕則燃松節讀書或燃糠自照及長篤志不倦聞吳興東遷邵玄之傳五經文旬假為書師從之受業同郡顧凱之臨縣見而異之遣諸子與遊從豫章雷次宗諮玄儒諸義母亡水漿不入口廬于墓側遂隱不仕於剡天台山開館藂徒受業諸生常近百人歡早孤讀詩至哀哀父母生我劬勞輒執書慟哭由是受學者廢蓼莪篇不復講焉又曰蔡會字休明陳留人清玩不與俗人交李撝謂江斅曰古人稱安貧清白曰夷涅而不緇曰白至如蔡休明者可不謂之夷白乎又曰徐伯珍字文楚東陽太末, WYG: ''}
