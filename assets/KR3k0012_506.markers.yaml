  - {type: 'tls:seg', offset: 25, content: '', id: KR3k0012_CHANT_506-1a.6}
  - {type: variant, offset: 25, length: 0, content: '', SBCK: 髫齓喪父事母以孝聞母曽嘔吐疑爲中毒因跪而嘗之伯父瑒深所嗟尚每稱曰此兒吾家之顔子也後丁母憂居䘮骨立服闋舎宅爲伽藍脫身而出詣學請業研精不倦遂􅀶覧群籍兼善天文術數隋有天下畢志不仕自以少􅀌未嘗飲酒食肉口無殺害之言至於親賔來萃輒陳樽俎對之危坐終日不倦李氏宗黨豪盛毎至春秋二社必髙㑹極歡無不沉醉諠亂嘗集士謙所盛饌􅄹前而先爲設􅁰謂群從曰孔子稱􅁰爲五榖之長荀卿亦云食先􅁰稷古人所尚容可違乎少長肅然不敢㢮惰退而相謂曰旣見君子方􅁴吾徒之不德也士謙聞而自責曰何乃爲人所踈頓至於此家冨於財躬處節儉毎以賑施爲務開皇八}
  - {type: page-break, offset: 25, content: '', id: KR3k0012_SBCK_506-1b}
  - {type: variant, offset: 25, length: 1, content: 年, WYG: 髫}
  - {type: variant, offset: 25, length: 1, content: 年, krp: 髫}
  - {type: variant, offset: 26, length: 0, content: '', SBCK: 終於家又曰崔廓字士􅀇􅀶陵安平人也少􅀌貧而母賤由是不爲􅀖族所齒􅀄爲里佐屢逢屈辱於是感激逃入山中遂愽覽書籍多所通渉山東學者皆宗之旣還郷里不應辟命與趙郡李士謙爲忘言之友毎相徃來時稱李崔及士謙死廓哭之慟爲之作傳輸之祕書府士謙妻廬氏寡居毎有家事輒令人諮廓取定廓嘗著論言刑名之理其義甚精大業中終于家時年八十又曰徐則東海郯人也㓜沉静寡􅄝欲受業於周弘正善三玄精論議懷栖隱之操杖䇿入縉雲山後學數百人苦請教授則謝而遣之不娶妻常服巾􅄄陳太建時應召來憇於至真觀朞月父辤入天台山因絶粒養性所資唯松水而巳雖隆冬沍寒不服綿絮􅀄入縉雲山太極真人除君降之曰汝年出}
