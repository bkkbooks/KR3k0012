  - {type: 'tls:seg', offset: 1769, content: '', id: KR3k0012_CHANT_506-13a.15}
  - {type: variant, offset: 1772, length: 8, content: 講授伯珍往從學積, WYG: 唯衣履及書疏而已餘無所蓄又曰孫處𤣥者長安中徴為左拾遺頗善屬文常恨天下無書以廣所聞神龍初桓彦範等用事處𤣥遺彦範書論時事得失彦範竟不用其言乃去官還鄉里以病卒又曰白履忠陳留浚儀人也博涉文史常隠居大梁城時號為梁丘子景雲中徴拜校書郎尋棄官而歸開元}
  - {type: punctuation, offset: 1774, content: 。, id: KR3k0012_CHANT_506-bkkpn435}
