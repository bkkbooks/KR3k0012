  - {type: variant, offset: 2683, length: 316, content: 西參軍不至於時始安王遙光為楊州謂徐孝嗣曰曹武參軍豈是禮賢之職欲以西曹書佐聘之會遙光敗不果時人以為恨梁書曰阮孝緒字士宗尉氏人父彥之誡曰宜思自勗以庶爾躬荅曰願追赤松子於滄海逐許由於穹谷耳自是屏居一室非晨昏定省未常出戶外兄王晏貴顯緒度必顛覆聞笳聲至門孝緒乃穿籬逃迸及晏誅竟獲免時中丞任昉欲往見之不肯乃歎曰其室雖邇其人何遠自是飲風者莫不歛衽望塵而息也又曰陶弘景字通明丹陽人生十歲讀葛洪神仙傳曰仰青雲睹白日不覺為遠齊高祖作相引為侍讀永明初脫朝服掛神武門上表辭祿詔乃許之居勾容曲山自號華陽隱居武帝即位有吉凶征討大事皆使咨問時人號為山中宰相預知梁祚覆沒乃製詩曰夷甫任散誕平叔坐論空豈悟昭陽殿遂作單于宮及侯景傾陷篡位果在昭陽殿皆如其言大同初卒年八十, SBCK: 御覽卷第}
