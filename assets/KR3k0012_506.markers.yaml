  - {type: page-break, offset: 1745, content: '', id: KR3k0012_SBCK_506-8a}
  - {type: variant, offset: 1746, length: 12, content: 珍累床而坐講書不輟叔父璠, SBCK: ''}
  - {type: variant, offset: 1746, length: 12, content: 珍累床而坐講書不輟叔父璠, krp: ''}
  - {type: variant, offset: 1750, length: 6, content: 坐講書不輟叔, WYG: 至訪之至道有會淳風爰舉逸人用勸天下特宜授諫議大夫放還山又曰王希夷徐州滕人也孤貧好道}
