  - {type: variant, offset: 258, length: 155, content: 明僧紹字承烈平原聶人也隱長廣郡嶗山詔徵為正員郎稱疾不就其後上與崔思祖書曰不食周粟而食周薇古猶發議在今寧得息談耶僧紹弟慶符為青州刺史罷任僧紹隨歸住江乘攝山太祖謂慶符曰卿兄高尚其事亦堯之外臣與朕雖不相接有時通夢乃贈紹竹根如意南史曰郭希林武昌人也曾祖翻晉世高尚不仕希林少守家業徵召一無所就卒子蒙亦隱居不仕又曰辛普明字, SBCK: 張}
