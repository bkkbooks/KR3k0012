  - {type: variant, offset: 1089, length: 0, content: '', SBCK: 散大夫守國子􅀶}
  - {type: variant, offset: 1089, length: 22, content: 士多到門焉當時稱儒者自劉瓛已後藂徒講授唯苞一, krp: 散大夫停留數月而歸履忠郷}
  - {type: variant, offset: 1090, length: 2, content: 多到, SBCK: 聽致仕還山又曰衛大經者篤學善易口無二言則天降詔徴之辤疾不起與魏州人夏侯乹童有舊聞乹童母卒徒歩往弔之郷人止之曰當夏溽暑豈可涉千里致書可也大經曰尺書安能盡意遂行至魏州㑹乹童出行大經造}
  - {type: variant, offset: 1093, length: 18, content: 焉當時稱儒者自劉瓛已後藂徒講授唯苞一, SBCK: 設席行吊禮不訊其家}
