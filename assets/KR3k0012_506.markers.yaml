  - {type: variant, offset: 106, length: 150, content: 出居貴館此子滅影雲棲不事王侯抗高木食有年載矣自非折節好士何以致之望其還策之日蹔紆清塵亦願助為譬說荅曰褚先生從白雲遊舊矣此子索然唯朋松石介於孤峰絕嶺者積數十載近故要其來此冀慰日夜比談討芝桂借訪荔蘿若已窺煙波臨滄洲矣知君欲見之當為申譬太祖即位手詔吳會二郡以禮迎遣又辭疾上不欲違其志勑於剡白石山立太平館居之, SBCK: ''}
