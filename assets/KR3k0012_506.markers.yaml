  - {type: variant, offset: 1799, length: 13, content: 吳郡張淹並加禮辟伯珍應召便, WYG: 無與于己而況利害之間乎又曰善卷者古之賢人也堯聞其為得道之士乃北面師之而問道焉舜受終之後又以天下讓卷卷曰昔唐氏之有天下不教而民從之不賞而民勸之天下均平百姓安靜民不知怒不知喜今子盛為衣裳之服以眩民目調五音之聲以亂民耳作皇詔之樂以愚民心耳目益榮天下之亂從此始矣吾雖為之其何益乎予立宇宙之中冬衣皮毛夏服絺葛春耕種形足以勞秋收歛身足以休日出而作日入而息逍遥於天地之間而心意自得何以天下為哉遂不受入深山莫知所終矣又曰齧缺堯時人許由師事齧缺堯又師由問曰齧缺可以配天乎既而齧遇由由曰子將何之曰將逃堯曰何謂也曰夫堯知賢人之利天下而不知其賊天下遂逃不見又曰巢父堯時隠人年老以樹為巢而寢其上故時人號曰巢父堯之讓許由也由以告巢父巢父曰汝何不隠汝形藏汝光若非吾友也撃其膺而下之悵然不自得乃過清冷之水洗其耳拭其目曰向者聞言負吾矣遂去終身不相見又曰許由字武仲隠于沛澤之中堯聞乃致天下而讓焉由}
