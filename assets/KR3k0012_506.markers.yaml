  - {type: 'tls:seg', offset: 1719, content: '', id: KR3k0012_CHANT_506-13a.7}
  - {type: variant, offset: 1720, length: 0, content: '', WYG: 有人夜中竊刈其麥者見而避之盜因感悟棄麥而謝文詡慰論之自誓不言固令持去經數年盜者向鄉人論之始為逺近所悉州縣}
  - {type: variant, offset: 1721, length: 24, content: 竹葉箭若甘蔗及地上學書山水暴出漂溺宅舍村鄰皆奔走, SBCK: 知其情必不敢進矣於是乃矯鄭}
  - {type: variant, offset: 1721, length: 6, content: 竹葉箭若甘蔗, WYG: 其貧素將家賑恤輒辭不受每閑居之際從容長歎曰老冉冉而將至恐修名之不立以如意撃几皆所有處時人方之閔子騫原憲終於家時年四十鄉人為立碑頌號曰張先生唐書隱逸𫝊曰王績字無功綘州龍門人也少與李播吕才為莫逆之交隋大業中應孝悌㢘潔舉揚州六合縣丞非其所好棄官還鄉里績河渚中先有田十數頃隣渚有隱士仲長子光服食養性績重其貞素願與相近乃結廬河渚以琴酒自樂常述北山賦以見志績又常躬耕於東臯故時人號東臯子或經過酒肆動經數日徃徃題壁作詩多為好事者詠諷貞觀十八年卒臨終自剋死日遺命薄塟兼預自為墓誌又曰田逰巖京兆三原人也初補太學生後罷歸遊於太白山每遇林泉會意輙留連不能去其母}
  - {type: page-break, offset: 1721, content: '', id: KR3k0012_WYG_506-4a, image: WYG0897/WYG0897-0542c.png}
