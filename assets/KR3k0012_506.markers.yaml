  - {type: variant, offset: 1740, length: 9, content: 村鄰皆奔走伯珍累床, WYG: 人仍令所司以禮徴赴及至固以疾辭𤣥宗在東宫又表請禮徴之以年老竟辭疾不赴年九十餘開元四年卒特下制贈銀青光禄大夫又曰盧鴻一字浩然本范陽人也徙家洛陽少有學業頗善習楷𨽻隠於山開元初遣備禮再徴不至五年下詔徴之至東都謁見不拜宰相問其故奏言臣聞老君言禮者忠信之薄不可以由臣鴻敢以忠信奉見上别召昇内殿賜之酒食詔曰盧鴻一應辟}
  - {type: page-break, offset: 1740, content: '', id: KR3k0012_WYG_506-6b, image: WYG0897/WYG0897-0543d.png}
