  - {type: variant, offset: 1045, length: 2, content: 瓛俱, krp: 仁䡄談論帝後將營奉夫宫于嵩山遊岩舊宅先在宫側特令不毁仍親書題額懸其門曰隱士田遊岩宅又曰史德義蘇州崑山人也咸亨𥘉隱居武丘山以琴書自適或騎牛帶瓢出入郊郭東市號爲逸人髙宗聞其名徴赴洛陽尋稱疾東歸公卿巳下皆赴詩餞别德義亦以詩留贈其文甚羙天授𥘉江南道宣勞使周興表薦則天徴赴都詔曰蘇州隱士史德義志尚虚玄素履貞確謙冲彰}
  - {type: variant, offset: 1048, length: 5, content: 褚彥回宅講, SBCK: 里閈孝友表於閨庭固辤徴辟長徃嚴陵之瀨多謝簮􅅂髙蹈愚公之谷朕承天革命建極開階寤寐星雲物色林壑順禎期而􅂢薜帶應休運以解荷裳粤自海隅來遊魏闕行藏之理所得去就之節無違風操可知啓沃攸佇特冝優奬委以諌曹}
  - {type: variant, offset: 1048, length: 5, content: 褚彥回宅講, krp: 里閈孝友表於閨庭固辤徴辟長徃嚴陵之瀨多謝簮𥚑髙蹈愚公之谷朕承天革命建極開階寤寐星雲物色林壑順禎期而捐薜帶應休運以解荷裳粤自海隅來遊魏闕行藏之理所得去就之節無違風操可知啓沃攸佇特冝優奬委以諌曹}
  - {type: punctuation, offset: 1054, content: 。, id: KR3k0012_CHANT_506-bkkpn257}
  - {type: 'tls:seg', offset: 1054, content: '', id: KR3k0012_CHANT_506-8a.12}
  - {type: variant, offset: 1054, length: 8, content: 齊隆昌元年徵為太, SBCK: 諌議大夫後放歸丘壑又曰王友貞懷州河内人也弱冠時母疾篤醫言唯啖人肉乃差友貞獨念無可求理乃割股肉以飴親母疾尋差則天聞之令就其家驗問持加旌表友貞素好}
  - {type: variant, offset: 1054, length: 0, content: '', krp: 諌議大夫後放歸丘壑又曰王友貞懷州河内人也弱冠時母疾篤醫言唯啖人肉乃差友貞獨念無可求理乃割股肉以飴親母疾尋差則天聞之令就其家驗問持加旌表友貞素好學讀九經皆百遍訓誨子弟如嚴君焉口不言人過尤好釋典屏絶羶味出言未曽負諾時論以爲眞君子中宗在春宫召爲司議郎不就神龍𥘉又拜太子中舎人仍令所司以禮徴赴及至固以疾辤玄宗在東宫又表請禮徴之以年老竟辤疾不赴年九十餘開元四年卒特下制贈銀青光禄大夫又曰盧鴻一字浩然夲范陽人也徙家洛陽少有學業頗善籕篆楷隷隱於山開元𥘉遣備禮再徴不至五年下詔徴之至東都謁見不拜宰相問其故奏言臣聞老君言禮者忠信之薄不足可依山臣鴻一敢以忠信奉見上别召昇内殿賜之酒食詔曰盧鴻一應辟而至訪之政道有㑹淳風爰舉逸人用勸天下特冝授諌議大夫放之還山又曰王希夷徐州滕人也孤貧好道父母終爲人牧羊取傭以供葬葬畢隱於嵩山師道士黄𦣱向四十年盡能傳其閉氣道飬之術頥卒更居兖州徂徠山中與道士劉玄博爲棲遁之友好易及老子嘗餌松栢葉及雜花散景龍中年七十餘氣益壯刺史盧}
  - {type: variant, offset: 1055, length: 3, content: 隆昌元, krp: 卿就謁致禮因訪以字人之術希夷曰孔子稱巳所不欲勿施於人可以終身行之矣及玄宗東廵勑州縣以禮徴召至駕前}
  - {type: punctuation, offset: 1059, content: ，, id: KR3k0012_CHANT_506-bkkpn258}
  - {type: 'tls:seg', offset: 1059, content: '', id: KR3k0012_CHANT_506-8a.13}
  - {type: variant, offset: 1059, length: 4, content: 徵為太學, krp: 巳九十六上令中書令說訪以道義宦官扶入宫中與說甚恱詔授朝散大夫守國子}
  - {type: variant, offset: 1063, length: 2, content: 博士, SBCK: 讀九經皆百遍訓誨子弟如嚴君焉口不言人過尤好釋典屏絶羶味出言未曽􅀒諾時論以爲眞君子中宗在春宫召爲司議郎}
  - {type: page-break, offset: 1063, content: '', id: KR3k0012_SBCK_506-4a}
  - {type: punctuation, offset: 1065, content: ，, id: KR3k0012_CHANT_506-bkkpn259}
  - {type: 'tls:seg', offset: 1065, content: '', id: KR3k0012_CHANT_506-8a.14}
  - {type: variant, offset: 1065, length: 0, content: '', krp: 聽致仕還山又曰衛大經者篤學善易口無二言則天降詔徴之辤疾}
  - {type: variant, offset: 1066, length: 0, content: '', krp: 起與魏州人夏侯乹童有舊聞乹童母卒徒歩往弔之郷人止之曰當夏溽暑豈可涉千里致書可也大經曰尺書安能盡意遂行至魏州㑹乹童出行大經造門設席行吊禮不訊其家人而還開元𥘉畢勾爲刺史謂解令孔愼言曰衛生德厚冝有旌異古人式千木之閭禮賢故也愼言造門}
  - {type: punctuation, offset: 1067, content: 。, id: KR3k0012_CHANT_506-bkkpn260}
  - {type: 'tls:seg', offset: 1067, content: '', id: KR3k0012_CHANT_506-8a.15}
  - {type: variant, offset: 1067, length: 2, content: 始安, SBCK: 神龍􅀄又拜太子中舎人仍令所司以禮徴赴及至固以疾辤􅀇宗在東宫又表請禮徴之以年老竟辤疾不赴年九十餘開元四年卒特下制贈銀青光禄大夫又曰盧鴻一字浩然夲范陽人也徙家洛陽少有學業頗善籕􅂐楷􅀠隱於山開元􅀄遣備禮再徴不至五年下詔徴之至東都謁見不拜宰相問其故奏言臣聞老君言禮者忠信之薄不足可依山臣鴻一敢以忠信奉見上别召昇内殿賜之酒食詔曰盧鴻一應辟而至訪之政道有㑹淳風爰舉逸人用勸天下特冝授諌議大夫放之還山又曰}
  - {type: variant, offset: 1067, length: 1, content: 始, krp: 謁時大經巳年老辤疾不見嘗預筮死日先鑿墓自爲誌文如筮而終又曰李元凱者博學善天文律暦然性恭愼口未嘗言之郷人宋璟年少時師事之及作相使人遺元凱束帛將薦舉之皆拒而不荅景龍中元行冲爲洺州刺史邀元凱至州問以經義因遺之衣服元凱辭曰微軀不冝服新麗但恐不能勝其義以速咎也行冲乃以泥塗汚而與之不獲巳而受乃還乃以巳之所蚕素絲五兩以酬行冲曰義不受無妄之財年八十餘終又曰徐仁紀者聖曆中徴拜左拾遺三上書論得失不納謂人曰三諌不聽可去矣遂移病歸郷里神龍𥘉宣慰使舉仁紀之行可以激俗又徴拜左𥙷闕三上書又不省乃詣執政求出授靈昌令妻子不之官廨舎唯衣履及書䟽而巳餘無所蓄又曰孫處玄者長}
  - {type: variant, offset: 1069, length: 0, content: '', krp: 中徴爲左拾遺頗善屬文常恨天下無書以廣所聞神龍𥘉桓彦範等用事處玄遺彦範書論時事得失彦範竟不用其言乃去官還郷里以病卒又曰白履忠陳留凌儀人也愽渉文史嘗隱居于古大梁城時號爲梁丘子景雲中徴拜校書郎尋棄官而歸開元十年刑部尚書}
  - {type: variant, offset: 1070, length: 2, content: 遙光, SBCK: 希夷徐州􅅬人也􅀌貧好道父母終爲人牧羊取傭以供葬葬畢隱於嵩山師道士黄􅞾向四十年盡能傳其閉氣道飬之術頥卒更居兖州徂徠山中與道士劉玄􅀶爲棲遁之友好易}
  - {type: page-break, offset: 1070, content: '', id: KR3k0012_SBCK_506-4b}
  - {type: variant, offset: 1070, length: 2, content: 遙光, krp: 志愔表薦履忠隱居讀書貞苦守操有古人之風堪代禇無量馬懷素入閤侍讀乃徴赴京師}
  - {type: variant, offset: 1073, length: 9, content: 江祐徐孝嗣共為立館, SBCK: 老子嘗餌松栢葉及雜花散景龍中年七十餘氣益壯刺史盧齊卿就謁致禮因訪以字人之術希夷曰孔子稱巳所不欲勿施}
  - {type: variant, offset: 1073, length: 14, content: 江祐徐孝嗣共為立館於鐘山下教, krp: 至辭以老病不任職事詔}
  - {type: punctuation, offset: 1075, content: 、, id: KR3k0012_CHANT_506-bkkpn261}
  - {type: variant, offset: 1083, length: 4, content: 鐘山下教, SBCK: 人可以終身行之矣及􅀇宗東廵勑州縣以禮徴召至駕前年巳九十六上令中書令說訪以道義宦官扶入宫中與􅀃甚恱詔}
  - {type: punctuation, offset: 1088, content: ，, id: KR3k0012_CHANT_506-bkkpn262}
