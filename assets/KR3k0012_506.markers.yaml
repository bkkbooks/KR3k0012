  - {type: variant, offset: 1112, length: 2, content: 而已, krp: 左庶子呉兢謂履忠曰吾子家室屢空竟不霑斗米疋帛雖得五品何益於實也履忠欣然尋}
  - {type: variant, offset: 1113, length: 1, content: 已, SBCK: 還開元􅀄畢勾爲刺史謂解令孔愼言曰衛生德厚冝有旌異古人式千木之閭禮賢故也愼言造門就謁時大經巳年老辤疾不見嘗預筮死日先鑿墓自爲誌文如筮而終又曰李元凱者􅀶學善天文律暦然性恭愼口未嘗言之郷人宋璟年少時師事之及作相使人遺元凱束帛將薦舉之皆拒而不荅景龍中元行冲爲洺州刺史邀元凱至州問以經義因遺之衣服元凱辭曰微軀不冝服新麗但恐不能勝其義以速咎也行冲乃以􅅺塗汚而與之不獲巳而受乃還乃以巳之所蚕素􅁝五兩以酬行冲曰義不受無妄之財年八十餘終又曰徐仁紀者聖曆中徴拜左拾遺三上書論得失不納謂人曰三諌不聽可去矣遂移病歸郷里神龍􅀄宣慰使舉仁紀之行可以激俗又徴拜左􅀘闕三上書又不省乃詣執政求出授靈昌令妻子不之官廨舎唯衣履及書䟽而巳餘無所蓄又曰孫處􅀇者長安中徴爲左拾遺頗善屬文常恨天下無書以廣所聞神龍􅀄桓彦範等用事處玄遺彦範書論時事得失彦範竟不用其言乃去官還郷里以病卒又曰白履忠陳留凌儀人也愽渉文史嘗隱居于古大梁城時號爲梁丘子景雲中徴拜校書郎尋棄官而歸開元十年刑部尚書王志愔表薦履忠隱居讀書貞苦守操有古人之風堪代禇無量馬懷素入閤侍讀乃徴赴京師及至辭以老病不任職事詔授朝散大夫停留數月而歸履忠郷人左庶子呉兢謂履忠曰吾子家室屢空竟不霑斗米疋帛雖得五品何益於實也履忠欣然尋}
