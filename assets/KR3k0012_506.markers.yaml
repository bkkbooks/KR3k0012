  - {type: variant, offset: 1757, length: 1, content: 璠, WYG: 母終時為人牧羊傭以供塟葬畢隠於嵩山師道士黄頥向四十年盡能𫝊其閉氣導養}
  - {type: variant, offset: 1759, length: 58, content: 與顏延之友善還袪蒙山立精舍講授伯珍往從學積十年究尋經史遊學者多依之太守琅邪王曇生吳郡張淹並加禮辟伯珍應召便退如此者凡, SBCK: 命以}
  - {type: variant, offset: 1759, length: 0, content: '', WYG: 術頤卒居兖州徂徠山中}
  - {type: variant, offset: 1759, length: 58, content: 與顏延之友善還袪蒙山立精舍講授伯珍往從學積十年究尋經史遊學者多依之太守琅邪王曇生吳郡張淹並加禮辟伯珍應召便退如此者凡, krp: 命以}
  - {type: variant, offset: 1760, length: 2, content: 顏延, WYG: 道士劉𤣥博為棲遁}
  - {type: page-break, offset: 1760, content: '', id: KR3k0012_WYG_506-7a, image: WYG0897/WYG0897-0544a.png}
  - {type: variant, offset: 1764, length: 0, content: '', WYG: 好易及老子嘗餌松栢葉及雜花散景龍中年七十餘氣益壯刺史盧齊卿就謁致禮因訪以字人之術希夷曰孔子稱己所不欲勿施於人可以終身行之矣及𤣥宗東巡勅州縣以禮徴召至駕前年已九十六上令中書令張説訪以道義宦官扶入官中與語甚恱詔授朝散大夫守國子博士聽致仕還又曰衛大經者篤學}
  - {type: punctuation, offset: 1765, content: ，, id: KR3k0012_CHANT_506-bkkpn433}
  - {type: 'tls:seg', offset: 1765, content: '', id: KR3k0012_CHANT_506-13a.14}
  - {type: variant, offset: 1765, length: 0, content: '', WYG: 易口無二言則天降詔徴之辭疾不起與魏州人夏侯乾童有舊聞乾童母卒徒步徃弔之鄉人止之曰當夏盛暑豈可步涉千里致書可也大經曰尺書安能盡意遂徃至魏州會乾童出行大經造門設席行弔禮不訊其家人而}
  - {type: page-break, offset: 1765, content: '', id: KR3k0012_WYG_506-7b, image: WYG0897/WYG0897-0544b.png}
  - {type: variant, offset: 1766, length: 5, content: 袪蒙山立精, WYG: 開元初畢構為刺史謂解令孔慎言曰衛生徳厚宜有旌異古人式干木之閭禮賢故也慎言造門就謁時大經已年老辭疾不見嘗預筮死日先鑿墓自為誌文如筮而終又曰李元凱者博學善天文律厯然性恭慎口未嘗言之鄉人宋璟年小時師事之及作相使人遺元凱束帛將薦舉之皆拒而不答景龍中元行沖為洛州刺史邀元凱至州問以經義因遺之衣服元凱辭曰微軀不宜服新麗但恐不能勝其義以逺咎也行沖乃以泥塗汚而與之不獲已而受及還乃以己之所蠶素絲五兩以酬行沖曰義不受無妄之財年八十餘終又曰徐仁紀者聖厯中徴拜左拾遺三上書論得失不納謂人曰三諫不聽可去矣遂移病歸鄉里神龍初宣慰使舉仁紀之行可以激俗又徴拜左補闕三上書又不省乃詣執政求出授靈昌令妻子不之官廨}
  - {type: page-break, offset: 1766, content: '', id: KR3k0012_WYG_506-8a, image: WYG0897/WYG0897-0544c.png}
  - {type: page-break, offset: 1766, content: '', id: KR3k0012_WYG_506-8b, image: WYG0897/WYG0897-0544d.png}
