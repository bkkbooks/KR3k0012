  - {type: variant, offset: 2479, length: 0, content: '', SBCK: 志曰新溪蠣味偏甘有過紫溪者嶺表録異曰盧亭亭盧循遺􅀋也循昔據廣州旣敗餘言奔於海島野居唯食蠔蠣疊殻爲牆壁又曰蠔即牡蠣也其􅀄生海島邊如拳石四面漸長有髙一二丈者巉巖如山毎一房内蠔肉一片隨其所生前後大小不等毎潮來諸蠔皆開房伺蟻入即合之海夷盧亭亭者以斧揳取殻燒以烈火蠔即啓房挑取其􅁏貯以小竹筐趂虚市以易米盧亭好酒以蠔􅁏換酒也蠔􅁏大者爲灸小者炒食肉中有滋味食之即甚壅腸胃蜆戸典切爾雅曰蜃小者曰珧郭璞注曰新燕蛤也江}
