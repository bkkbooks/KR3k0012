  - {type: variant, offset: 2509, length: 0, content: '', SBCK: 􅀋也其中有小蟹大如揄莢蒯開甲食則蟹亦出食蒯合甲蟹亦還入爲蒯取以歸始終死不相離又曰蟹􅃮相合成水神仙服食方云又曰秋蟹毒者無藥可療目相向者尤甚􅀇中記曰天下之大物北海之蟹舉一螯能加於山身故在水中淮南万畢術曰燒蟹致䑕搜神記曰晉太康年中㑹稽郡蟛蜞及蟹皆化爲䑕甚衆覆野爲災食稻述異記曰出海口北行六十里至騰嶼之南溪有淡水清澈照底有蟹焉筐大如笠脚長三尺宋元嘉中章安縣民屠虎取此蟹食之肥美過常虎其夜夣一少嫗語之曰汝噉我知汝尋􅀍噉不屠氏明日出行爲虎所食餘家}
  - {type: page-break, offset: 2509, content: '', id: KR3k0012_SBCK_942-7a}
