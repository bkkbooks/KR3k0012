  - {type: variant, offset: 1354, length: 167, content: 厭為甲者鄧德明南康記曰平固水口下流數里有螺亭臨江昔一少女曾與伴俱乘小舩江漢採螺既逼暮因停沙邊共宿忽聞騷騷如軍馬行須臾乃見群螺張口無數相與為災來破舍噉此女子同侶諸嫗當時惶怖不敢作聲悉走上岸至曉方還但見骨耳收斂喪骨薄埋林際歸報其家經四五日間近所埋處飜見石冢穹窿高十餘丈頭可受二十人坐也今四面有階道髣髴人冢其頂上多螺殼新故相仍鄉傳謂之螺亭世, SBCK: ''}
