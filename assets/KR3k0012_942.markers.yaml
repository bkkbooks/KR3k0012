  - {type: variant, offset: 439, length: 267, content: 山海經曰虢山之尾其上多玉魚水出焉其中多文貝又曰邽山濛水出焉其中多貝貝甲中肉如科斗但有頭尾又曰赤水之東有蒼梧之野爰有文貝紫貝也南州異物志曰交阯以南海中有大文貝質白文紫天姿自然不假雕琢磨瑩而光煥爛六韜曰商王拘周西伯昌於羑里太公與散宜生金千鎰求珍物以免君罪九江之浦有大貝百馮詩作朋也鹽鐵論曰教與俗改弊與世易夏后氏以玄貝周人以紫石相貝經曰珪延得大貝於昌陽弱泉為五帝瑤器也得拘吝何貝大如輪為文王壽穆王得大紫貝懸其殼於昭陽觀以消惡霧又曰瀕水貝可以朗目南海貝如珠可以治水毒也浮貝投水則浮也醟貝使童子愚女子淫嶺表錄異曰紫貝即砑螺也儋振夷黎海畔採以為貨, SBCK: ''}
