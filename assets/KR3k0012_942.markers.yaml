  - {type: variant, offset: 1604, length: 129, content: 此名殼上青綠斑大者可受二升殼內光瑩如雲母裝為酒杯奇而可翫又紅螺大小亦類鸚鵡螺殼薄而紅亦堪為酒器刳小螺為足綴以膠漆葛龔薦戴昱曰昱年六十二兄弟同居二十餘年及為宗老分舊業昱將妻子逃入虞澤結茅為室捃穫野豆拾掇蠃蚌以自振給蚌易通卦驗曰小雪雉入水為蜄爾雅曰蜃小者珧珧玉珧, SBCK: 髙}
