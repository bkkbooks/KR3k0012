  - {type: variant, offset: 2481, length: 1, content: 採, SBCK: 山海經曰大蟹在海中盖十里之蟹又女丑有大蟹廣千里汲􅃁周書王㑹曰成王時海陽獻蟹大戴禮曰蟹二螯八足非鱣之穴而無所􅀉托者心躁也孫卿子同禮記檀弓下曰成人者兄死而不爲衰者聞子皐將爲成宰遂爲之衰成人曰蠶則績而蟹有筐范則冠而蟬有緌兄則死子臯爲之衰孝經援神契曰蟹二螯兩端傍行螯猶兵也小蟲而欲兩端自衛故使傍行也晉書曰解系坐免官以白衣還第闔}
