  - {type: variant, offset: 2501, length: 2, content: 屬博, SBCK: 􅀋唯許私家捕魚淮南子曰夫釋大道而任小數無以異於使蟹捕䑕蟾諸捕蚤不足以禁姧塞邪亂乃逾滋以艾灼蟹筐上内置穴中廼􅀬走窮穴適能擒一鼠又曰礠石引鐵蟹之敗漆置蟹􅃮中則漆敗也雖在明知弗能然也抱朴子曰􅀂蟹之化􅃮麻之壊酒此不可以理推者也又曰山中稱無腹公子者蟹也又曰兵地生蟹者冝急移軍太一在玉帳之中不可攻也郭子曰畢茂丗云一手持蟹螯一手持酒盃拍浮酒池中可了一生哉國語曰越王召范蠡而問焉曰與子謀呉子未可也今其稻蟹食不遺種其可乎范蠡對曰天應至矣謂稻蟹人事未也勤湏厲志丗􅀃曰蔡司徒渡江見蟛蜞大喜曰蟹有八足加以二螯令烹之旣食委頓吐下方知非蟹後向謝仁祖􅀃此事謝曰卿讀爾雅不熟幾爲勤學死劉孝標云大戴礼􅂆斈篇日蟹八足二螯非蛇蛆之穴無所􅀉托者用心躁也故爾雅云螖小者勞即彭螖也似蟹而小按今蜞小於蟹而大於螖爾雅所謂螖澤者也然此三物皆八足二螯狀甚相􅀋蔡謨不精其大小食而致􅁦故云讀爾雅不熟也永嘉郡記曰安國縣有山􅀑形體如人而一脚裁長一尺許好噉鹽伐木人鹽輙偷將去不甚畏人人亦不敢伐木犯之即不利也喜於山澗中取石蟹伺伐木人眠息便十十五五岀就火邊跂石灸噉之甞有伐木人見其如此未眠之前痛燃石使􅀬羅置火畔便佯眠看之湏􅁷魑出悉皆跂石石􅀬灼之跳梁叫呼罵詈而去此伐木人家後􅀍燒委頓慱}
  - {type: page-break, offset: 2501, content: '', id: KR3k0012_SBCK_942-6a}
  - {type: page-break, offset: 2501, content: '', id: KR3k0012_SBCK_942-6b}
  - {type: variant, offset: 2501, length: 1, content: 屬, WYG: 類唯許私家捕魚淮南子曰夫釋大道而任小数無以異於使􅈉捕䑕蟾蜍捕蚤不足以禁奸暴亂乃愈滋以艾灼蟹筐上納置穴中廼熱走窮穴適能擒一鼠又曰礠石引鐵蟹之敗漆置蟹漆中則漆敗也雖在明知弗能然也抱朴子曰若􅈉之化漆麻之壊酒此不可以理推者也又曰山中稱無膓公子者蠏也又曰兵地生􅈉者急宜移軍太乙在主帳之中不可攻也郭子曰畢茂公嘗云左手持蟹螯右手持酒杯拍浮酒池中足可了一生國語曰越王召范蠡而問焉曰與子謀吴子未可也今其稻蟹食不遺種其可乎范蠡對曰天應至矣謂稻蟹人事未也須勤厲志世說曰蔡司徒渡江見蟛蜞大喜曰蟹有八足加以二螯令烹之既食委頓江下方知非蟹後向謝仁祖說此事謝曰卿讀爾雅不熟幾為勤學死劉孝標云大戴禮勤學篇曰蟹八足二螯非蛇蛆之穴無所寄托永嘉郡記曰安國縣有山鬼形體如人而一脚裁長一尺許好噉鹽伐木人鹽輙偷將去不甚畏人人亦不敢犯犯之即不利也喜於山澗中取石蟹同伐木人眠息便十十五五出就火邉跂石炙噉之嘗有伐木人見其如此未眠之前痛燃石使熱羅置火畔便佯眠看之須臾魑出悉皆跂石石熱灼之跳梁呌呼罵詈而去此伐木人家後被燒委頓}
