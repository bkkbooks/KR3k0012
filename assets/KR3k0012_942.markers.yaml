  - {type: variant, offset: 816, length: 235, content: 人以為酒杯魏書曰漢末天下荒亂率乏糧穀袁術在江淮取給蒲蠃民相食州郡蕭條宋書曰元嘉末魏太武征彭城遣使求酒及甘橘張暢宣孝武帝命致螺杯雜粽南土所珍北史曰隋劉臻性好噉蜆以音同父諱呼為扁螺淮南子曰蠃𧕯愈燭睨蠃附螺也𧕯細長螺也燭睨目中疾此皆治目之藥也人無故而求此物者必有蔽其明也水經曰桂陽貞女峽峽西岸高巖名貞女山山下際有石如人形高七尺狀女子故名貞女峽古來相傳有數女取螺於此遇風雨晝晦忽化為石山海經曰旬山洵水出焉南流注于閼澤其中茈蠃紫色螺也又曰邽山濛水出焉有螺魚身而鳥翼見則其邑大水搜神, SBCK: ''}
