  - {type: variant, offset: 77, length: 227, content: 文皆行列相當大者徑一尺七寸今九真交阯以為杯盤實物也孝經援神契曰德至泉則江生大貝爾雅曰貝陸居贆方遙切在水者蜬水陸異名也貝中肉如科斗但有頭音含大者魧書大傳曰大貝如車渠車渠謂車輞即魧屬魧戶郎切小者鯖今細貝亦有紫色者出日南鯖音青玄貝貽貝黑色貝也餘貾音池黃白文以黃為質白為文點餘泉白黃文以白為質黃為文點今之紫貝以紫為質黑為文點蚆音巴博而頯頯者中央廣兩頭銳頯逵軌二音蜠音囷大而險險者污薄𧐐小而橢即上小貝橢謂狹而長此皆說貝之形容橢他果切說文曰貝海介蟲也古者貨貝而寶龜也, WYG: 蛤}
