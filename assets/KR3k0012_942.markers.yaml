  - {type: variant, offset: 1266, length: 3, content: 蝸牛宛, WYG: 島鴈常在河邉沙上食沙石悉皆消爛唯食蛤不消隨其糞出用以為藥倍勝常者本草經曰文蛤有文味醎無毒主除隂蝕惡創五痔大孔出血生東海左思賦曰蚌蛤珠胎與月虧全蛺爕附三蝬臨海水土物志曰蛺爕似蛤如蜆大又曰三蝬如蛤車螯沈約宋書曰廬陵王義真出為南豫州刺史劉湛為長史義真出時居髙祖憂使帳下偹膳湛禁之義真乃齋於内别立厨帳㑹湛入煖酒炙車螯湛正色曰公當今不宜有此設義真曰旦甚寒一杯酒亦何傷酒既至湛因起曰既不能以禮自處又不能以禮䖏人謝靈運答弟書曰前月十二日至永嘉郡蠣不如鄞縣車螯亦不如北海移角臨海水土物志曰移角似車螯角移不正名曰移角姑勞臨海水土物志曰姑勞如車螯而殻薄羊蹄臨海水土物志曰羊蹄似􅑕味似車螯羅江盧水有之蛤蜊宋書曰王融初為司徒法曹詣王僧祐因遇沈昭畧未相識昭畧屡顧盻謂主人曰是何年少融殊不平謂曰僕出於扶桑入於暘谷照曜天下誰云不知而卿此問何也昭畧云不知許事且食蛤蜊融曰物以群分方以類聚君長東隅居然應嗜此族淮南子曰若士方捲龜殻而食蛤蜊抱朴子曰若士所食此必草也又海中自有蛤蜊螺蚌之類未加煑凡人所不能噉况君子若是乎蘆雉臨海水土物志曰蘆雉似蛤蜊殻小薄耳蚶大甘切唐書曰元和中嶺南節度使崔詠卒宰臣奏擬皆不可上謂裴度曰嘗有諫進海蚶淡菜者詞甚忠正卿可求此人與之度出以訪人或有言孔戣諫者度即日以聞乃命之廣志曰巨延州以蚶與行估貨臨海水土物志曰蚶側徑四尺也盛宏之荆州記曰始安郡駭鹿山山上有石室鑿内得骨并獲蚶嶺表録異曰瓦屋子盖蚌蛤之類也南中舊呼為蚶音憨子因盧尚書鈞作鎮遂改為瓦屋子以其殻上有稜如瓦壠故名焉殻中有肉紫色而滿腹廣人尤重之多燒以薦酒俗呼為天臠炙喫多即壅氣背膞煩疼未測其本性也烏頭臨海水土物志曰烏頭似蚶下来􅒕許咸切似蛤出海中臨海水土物志曰下来􅒕雖似鳥頭各自有種又曰􅒕蛤有似烏頭越王臨海水土物志曰越王形似􅒕殻赤尾如有人爪形蠣梁書曰何子季侈於味食必方丈後稍欲去其甚者猶食白魚䱉市魚切脯糖蟹以為非見生物擬食車螯蚶蠣使門人議之學生鍾岏曰䱉之就脯驟於屈伸蟹之將糖躁􅅰彌甚仁人用意深懐慘怛至於車螯蚶蠣眉目内闕慙渾沌之竒獷殻外緘非人人之慎不悴不榮曽草木之不若無香無臭與瓦礫其何筭故宜長充庖厨永為口味竟陵王子良見岏議大怒汝南周顒與𦙍書勸令食菜茅君内傳曰欲合九}
