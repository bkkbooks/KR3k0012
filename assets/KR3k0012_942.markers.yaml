  - {type: variant, offset: 2479, length: 0, content: '', WYG: 志曰新溪蠣味偏甘有過紫溪者嶺表録異曰盧亭亭盧循昔㩀廣州既敗餘黨奔於海島野居唯食蠔蠣疊殻為墻壁又曰蠔即牡蠣也其初生海島邉如拳石四面漸長有高一二文者巉巖如山毎一房内蠔肉一片隨其所生前後大小不等毎潮來諸蠔皆開房有小蟲入即合之海夷盧亭亭者以斧揳取殻燒以烈火蠔即啓房挑取其肉貯以小竹筐趂虛市以易醉盧亭好酒以蠔肉換酒也肉大者􅀈為炙小者炒食肉中有滋味食之即能壅膓胃蜆户典切爾雅曰蜃小者曰蜆郭璞注曰新燕蛤也江}
