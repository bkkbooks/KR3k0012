  - {type: variant, offset: 1734, length: 734, content: 即小蚌珧音遙說文曰𩶁步梗切蜯也鮚巨栗切蜯音蚌也漢書曰漢律會稽獻鮚醬二升蜯蜃之屬周書曰成三時具敺獻蜃鄭玄注曰蜃大蛤也大戴禮曰十月雉入淮為蜃蜃者蒲蘆也春秋後語曰齊趙將伐燕蘇代為燕說趙王曰今者臣來過小水見小蜯方出暴而鷸啄其肉蜯合而挾其啄啄口也上啄其肉音張角切下啄音許穢切鷸曰今日不雨明日不雨必見蜯脯蜯亦謂鷸曰今日不出明日不出必見死鷸兩不相捨漁父得而併擒之今趙且伐燕燕趙久相支以弊其眾臣恐強秦之為漁父也故願大王熟計之趙王於是乃止魏志曰孔融與韋康書云元將仲將不意雙珠近出老蜯陳書曰武帝雅尚恭儉膳不過數品私饗曲宴皆用瓦器蚌盤唐書曰太宗謂侍臣曰蜃性含水待月而水生木性懷火因燧而燄發人性含靈待學而成美墨子曰申屠狄謂周公曰賤人何可薄耶周之靈珪出於土石楚之明月出於蚌蜃少家大豪出於污澤天下諸侯皆以為寶狄今請退也淮南子曰季秋爵入大水為蛤爵依屋之萑也飛鳥也隨陽下藏故為蛤又曰古者剡耜而耕摩蜃而耨剡利也耜臿屬也蜃大蛤摩令利用之耨耨除苗穢又曰孟冬水始冰地始凍雉入大水為蜃雉陽鳥也三歲而死極陽切陰故隨陰氣入水為蜃蜃大蛤也又曰明月之珠出於蛖音尨蜄珠有夜光之明月生於蛖中又曰毛羽者飛行之類也故屬於陰日者陽之主也是以春夏則群獸除日至而麋鹿解解角也月者陰之宗也是以月虧而魚腦減月死而螺蚌㾭㾭減蹴也又曰古者民茹草飲水採樹木之實食蠃蛖之肉時多疹病毒傷之害又曰明月之珠蜃蛖之病而我之利虎爪象牙禽獸之利而我之害我猶人也又曰蛖象之病人之寶也蛖大蛤中有珠象牙還以自病故人得以為寶人之病將有誰寶之者乎人以利欲為病無人寶之故曰有將誰寶西京雜記曰長安始盛飾鞍馬競加雕鏤或一馬之飾直百金皆用白蜃為珂紫金為花以飾其上越地形記曰夏靖荅車茂弘論鄮縣書曰其蜯蛤之屬目所希見耳所未聞徐衷南方記曰白珠蜯殼長三寸半漲海中深六七丈去岸四五十里, SBCK: ''}
