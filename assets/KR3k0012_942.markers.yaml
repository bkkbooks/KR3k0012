  - {type: variant, offset: 2483, length: 3, content: 凡海採, SBCK: 自守及張華裴頠之􅀍誅也倫秀以􅀫憾収系兄弟梁王彤救系等倫怒曰我於水中蟹且惡之况此人兄弟輕我􅁘此而可忍孰不可忍彤苦爭之不得遂害之又曰劉聦左都水使}
