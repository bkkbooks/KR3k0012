  - {type: variant, offset: 1266, length: 3, content: 蝸牛宛, SBCK: 島鴈常在河邊沙上食沙石悉皆銷爛唯食蛤不銷隨其糞出用以爲藥倍勝常者夲草經曰文蛤表文味鹹無毒主際隂蝕惡創五痔大孔盡血生東海左思賦曰蚌蛤珠胎與月虧全蛺爕臨海水土物志曰蛺爕似蛤如大三蝬音宗臨海水􅁟物志曰三蝬似蛤車螯沈約宋書曰廬陵王義眞出爲南豫州刺史劉湛爲長史義眞出時居髙祖憂使帳下備膳湛禁之義眞乃於齋内別立厨帳會湛入煗酒炙車螯湛正色曰公當今不冝有此設義眞曰且甚寒一盃酒亦何傷酒旣至湛因起曰旣不能以禮自處又不能以禮處人謝靈運荅弟書曰前月十二日至永嘉郡蠣不如鄞縣車螯亦不如北海移角臨海水土物志曰移角似車螯角移不正名曰移角姑勞臨海水􅁟物志曰姑勞如車螯而殻薄羊蹄臨海水土物志曰羊蹄似蚌味似車螯羅江小盧有之蛤蟍宋書曰王融􅀄爲司徒法曹詣王僧祐因遇沈昭略未相識昭略屢顧眄謂主人曰是何年少融殊不平謂曰僕出於扶桑入於􅊙谷照曜天下誰云不知而卿此問何也昭略云不知許事且食蛤蟍融曰物以羣分方以􅀋聚君長東隅居然應嗜此族淮南子曰􅀂士方捲􅀛殻而食蛤蟍抱朴子曰􅀂士所食此必草也又海中自有蛤蟍螺蚌之􅀋未加煑凢人所不能噉况君子􅀂士乎蘆雉臨海水􅁟物志曰蘆雉似蛤蟍殻小薄耳蚶火甘切唐書曰元和中嶺南節度使崔詠卒宰臣奏擬皆不可上謂裴度曰甞有諌進海蚶淡菜者詞甚忠正卿可求此人與之度出以訪人或有言孔戣諌者度即日以聞乃命之廣志曰巨延州以蚶與行估􅐙昜臨海水􅁟物志曰蚶側徑四尺也盛弘之荆州記曰始安郡駭鹿山山上有石室鑿内輙得骨并􅀗蚶嶺表録異曰瓦屋子盖蚌蛤之􅀋也南中舊呼爲蚶音憨子頃因盧鈞尚書作鎮遂改爲瓦屋子以其殻上有稜如瓦壠故名焉殻中有肉紫色而滿腹廣人尤重之多燒以薦酒俗呼爲天臠炙喫多即壅氣背􅈩煩疼未測其本性也烏頭臨海水土物志曰烏頭似蚶下來􅒕許咸均似蛤出海中臨海水土物志曰下來􅒕雖似烏頭各自有種又曰􅒕蛤有似烏頭越王臨海水土物志曰越王形似􅒕殻赤尾如人爪形蠣梁書曰何㣧􅀄侈於味食必方丈後稍欲去其甚者猶食白魚䱉市漁切脯糖蟹以爲非見生物疑食蚶蠣使門人議之學生鍾玩曰䱉之就脯驟於屈中蟹之將糖躁擾彌甚仁人用意􅀷懐如怛至於車螯蚶蠣眉目内闕慙渾沌之竒獷殻外緘非金人之愼不悴不榮曽草木之不􅀂無香無􅆨與瓦礫其何筭故冝長充庖厨永爲口味竟陵王子良見玩議大怒汝南周顒與㣧書勸令食菜茅君内傳曰欲合九}
