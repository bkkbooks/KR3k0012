  - {type: variant, offset: 1570, length: 1875, content: 因浴於後湖化為黿搜神記曰千歲之雉入海為蜃百年之雀入江為鴿千歲龜黿能與人語千歲虵斷而復續百年之鼠能相卜數之至也春分之日鷹變為鳩秋分之日鳩變為鷹時之化也故腐草之為螢也朽葦之為蠶也麥之為蛺蝶也羽翼生焉眼目成焉心知存焉此自無知而化為有知而氣易也鴇之為也虵之為鼈也蛩之為蝦也不失其血氣而形性變也又曰土蜂名曰蜾蠃今世謂之蝄䗸細腰之類也其為物純雄而無雌不交不產常取桑蟲之子而育之則皆化成己子焉又曰麥之為蝶由于濕也爾則萬物之變皆有以也農夫止麥之化者區之以灰聖人理萬物之化者濟之以道又曰南方有落頭民其頭能飛其種人部有祭祀號曰蠱落故因取名焉吳時將軍朱桓得一婢每夜臥後頭輒飛去或從狗竇或從天䆫中出入以耳為翼將曉復還如此傍人怪之夜中照視唯身無頭其體微冷氣息裁屬乃蒙之以被至時頭還礙被不得安兩三墮地噫吒甚愁而其體氣急狀若將死乃去被頭復起傅頸有頃平和桓以為巨怪畏不敢畜乃放還之既而詳之乃知天怪也時南征大將亦往往得之又嘗有覆以銅盤者頭不得進死又曰昔者高陽氏有同產而為夫婦帝殺之於崆峒之野相抱而死神鳥以不死草覆之七年男女同體而生二頭四足手是為蒙雙氏續搜神記曰尋陽縣北山中蠻人有術能使人化作虎毛色爪牙悉真虎鄉人周眕有一奴使入山伐薪奴有婦及妹亦與俱行既至奴語二人云汝旦上高樹視我所為如其言既而入草須臾見一大黃班虎從草出奮迅吼喚甚為可畏二人大怖良久還草中少時復還為人語二人曰歸家慎勿道後遂向等輩說之周得知乃以淳酒飲之令熟醉使人解其衣服及身體事事詳視了無所異唯於髻中得一紙畫作大虎虎邊有符周密取錄之奴既醒喚問之見事已露遂具說本末云先嘗於蠻中告糴有一蠻師云有此術以三尺布數升米麵一赤雄雞一升酒受此法又曰清河宋士宗母以黃初中夏天於浴室裏浴遣家中子女盡出戶獨在一室中良久家人不解其意於壁穿中闚不見人正見木盆水中有一大鼈遂開戶大小悉入乃與人相承當先著釵猶在頭上相與守之積日轉懈遂自投出戶外其去甚駛逐之不及遂便入水後數日忽還巡行宅舍如平生了無所言而去時人謂士宗應行喪治服士宗以母形雖變而生理尚存竟不治喪與江夏黃母相似異苑曰豫章郡吏易拔義熙中受番家違道不及郡遣追見拔言語如常亦為施設使者催令莊束拔因語曰汝看我面仍見眼目角張身有黃斑便結一足徑出門去家先依山為居至林麓變成三足大虎所豎之腳即成其尾又曰邵陵高平黃秀以元嘉三年無故入山經日不還其兒根生尋覔見蹲空樹中從頭毛生色如熊問其何故荅云天讁我如此汝但自去哀慟而歸踰年伐山人見之其形盡為熊矣又曰符堅建元年中長安樵人於城南見金走白堅堅遣載取倒化為銅鼎入門又變成大鐸又曰隆安中東海錯魚皆化虎上岸食人異物志云東海有虎錯或時變成虎將是此耶吳都賦所謂沉虎潛鹿也越嶲河有魚皆人形而著冠幘俗語曰故沒郡人悉變而為魚也又曰司馬軌之字道爰善射雉太元中將雉下翳此雉屢雊野雉亦應試令尋覔所應者頭翅已成雉半身後故是虵晉中朝武庫內忽有雉時人咸謂為怪張司空云此虵之所作耳即使搜除庫中果得蛇蛻又曰太元中汝南人入山伐一竹中央虵形已成枝葉如故吳郡桐盧民嘗伐竹遺竹一宿見竿化雉頭頸盡就身猶未變化亦竹為虵為雉也又曰隆安中有青雌雞化而為赤雄形尾都變冠綵皆具唯不能鳴又曰元興二年衡陽有雌雞化為雄八十日冠綏後桓玄篡八旬而敗幽明錄曰宜陽縣有女子姓彭名娥父母昆弟十餘口為長沙賊所攻時娥負器出汲於溪聞賊至走還正見塢壁已破不勝其哀與賊相格賊縛娥驅出溪邊將殺之溪際有大山石壁高數十丈娥仰天呼曰皇天有神不我為何罪而當如此因奔走向山山開廣數丈平路如砥群賊亦逐娥入山山遂崩合泯然如初賊皆壓死山裏頭出山外娥遂隱不復出娥所捨汲器化為石形頭似雞土人因號曰雞山其水為娥潭齊諧記曰義熙四年東陽郡大末縣吳道宗少失父單與母居未有婦道宗收債不在家鄰人聞其屋中砰礚之聲闚不見其母但有烏班虎在其屋中鄉曲驚怛恐虎入其家食其母便鳴鼓會人以往救之圍宅突進不見有虎但見其母語如平常不解此意兒還母語之曰宿罪見追當有變化事後一月日便失其母縣界內虎災屢起皆云烏班虎百姓患之發人格擊之殺數人後人射虎中膺并戟刺中其腹然不能即得經數日後虎還其家故床上不能復人形伏床上而死其兒號泣如葬其母法朝暝哭臨又曰太元元年江夏郡安陸縣薛道恂年二十二少來了了忽得時行病差後發狂百藥治救不損乃復病狂走猶劇忽失蹤跡遂變作虎食人不可復數有一女子樹下採桑虎往取之食食竟乃藏其釵釧著山石門後還作人皆知取之經一年還家為人遂出都仕官為殿中令史夜共人語忽道天地變怪之事道恂自云吾昔常得病發狂遂化作虎噉人一年中兼便敘其處所并人姓名其同坐人或有食父子兄弟者於是號泣捉以付官遂餓死建康獄中顧微廣州記曰湞陽縣俚民有一家牧牛牛忽蚳此兒蚳處肉悉白俄而死其家葬此兒殺牛以供賓客凡食此牛肉男女二十餘人悉變作虎, SBCK: 九}
