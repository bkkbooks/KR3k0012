  - {type: variant, offset: 560, length: 0, content: '', WYG: 中宗朝大石國使請獻獅子姚璹上疏諌曰獅子猛獸唯止食肉逺從碎葉以至神都肉既難得極為勞費陛下以百姓為心慮一物有失鷹犬不蓄漁獵摠停不殺以闡大慈好生以敷至徳凡在翔飛蠢動莫不感荷仁恩豈容自薄菲於身而厚資給於獸求之至理必不然矣疏奏遽停此使十洲記曰聚窟州在西海中申未地靣各方三千里北接崑崙山二十六里有獅子辟邪鑿齒天鹿長牙銅頭鐵額之獸宋炳獅子擊象圖序曰梁伯玉説沙門釋僧吉云嘗從天竺欲向大秦其間忽聞數十里外哮吼之聲驚天怖地頃之但見百獸率走蹌地至絶而四巨象俄焉而至以鼻卷泥自厚塗數尺數噴鼻偶立俄有獅子三頭見於山下直摶四象崩血若濫巨泉樹草偃仆法顯記曰阿育王精舍後立石柱作獅子柱内西邊有佛像内外映徹浄若琉璃有外道論獅子與沙門争此住處時沙門理屈於是共誓此處若是沙門住處者當有靈驗作是言已柱頭獅子乃大鳴吼見證外道懼怖心服而還國史補曰開元末西域獻獅子至安西道中繫於驛樹近井獅子哮吼若不自安俄頃風雷大至有龍出井而去虞世南獅子賦曰有絶域之神獸因重譯而來擾其為狀也筋骨糺纒殊姿異制闊臆修尾勁毫柔毳鈎爪踞牙藏鋒畜鋭弭耳宛足伺間借勢暨乎奮鬛䑛脣倐來忽往瞋目電曜發聲雷響拉虎吞貔裂犀分象碎隨兕於齦齶屈巴蛇於指掌踐藉則林麓摧殘吼呼則江河振蕩服猜心與猛氣遂感徳以依仁麒麟説文曰麒麟仁獸也麋身牛尾一角春秋運斗樞曰機星得則麟生春秋保乾圖曰嵗星散為麟爾雅曰麟麕身牛尾一角禮記禮運曰天不愛其道地不愛其寳人不愛其情故麟在郊藪詩國風麟之趾振振公子吁嗟麟兮左傳曰魯哀公十四年春西狩於大野叔孫氏之車子鉏商獲麟以為不祥以賜虞人仲尼觀之曰麟也然後取之家語曰叔孫氏之車士曰子鉏商採薪於大野獲麟折前左足載以歸叔孫以為不祥棄之于郭外使人告孔子曰有麕而角者何也孔子往而觀之曰麟也孰為來哉孰為來哉反袂拭面涕泗沾衿叔孫聞之然後取之子貢問曰夫子何泣矣孔子曰麟之至也為明王也出非其時而見害是以傷焉孔叢子曰叔孫氏車子鉏商獲麟以為不祥棄之冉有告夫子夫子將觀之泣曰予之於人猶麟之於獸麟出而死其道窮矣乃歌曰唐虞世兮麟鳯遊今非其時來何求麟兮麟兮我心憂因此幽憤作春秋焉孝經右契曰孔子夜夣豐沛邦有赤煙氣起顔回子夏侣往觀之驅車到楚西北范氏之廟見芻兒捶麟傷其前左足束薪而覆之孔子曰兒汝來姓為誰兒曰吾姓為赤松子孔子曰汝豈有所見乎曰吾所見一獸如麏羊頭頭上有角其末有肉方以是西走孔子發薪下麟視孔子而蒙其耳吐三卷書孔子精而讀之春秋演孔圖曰蒼之滅也麟不榮也麟木精也麒麟闘日}
