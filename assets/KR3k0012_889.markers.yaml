  - {type: variant, offset: 452, length: 3, content: 造淮南, SBCK: 子于嗟麟兮左傳曰魯哀公十四年春西狩於大野叔孫氏之車子鉏商獲麟以爲不祥以賜虞人仲尼觀之曰麟也然後取之時所末甞見故恠之爲不祥麟仁獸聖}
  - {type: variant, offset: 452, length: 3, content: 造淮南, krp: 子于嗟麟兮左傳曰魯哀公十四年春西狩於大野叔孫氏之車子鉏商獲麟以爲不祥以賜虞人仲尼觀之曰麟也然後取之時所末甞見故恠之爲不祥麟仁獸聖}
  - {type: variant, offset: 456, length: 4, content: 安初為老, SBCK: 嘉瑞時無明王出而遇獲仲尼悲周道之不興感嘉瑞無應故因魯春秋而修中興之教絶筆於獲麟一句所感而作故所以爲終家語曰叔孫氏之車士曰子鉏商車士將車者也子姓也鉏商名也採薪於大野春秋經哀}
