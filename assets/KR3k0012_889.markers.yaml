  - {type: variant, offset: 510, length: 2, content: 化民, WYG: 魏武伐冒頓經白狼山逢獅子使格之殺傷甚衆忽見一物從林中出如狸上帝車軛上獅子將至便跳上其頭獅子伏不敢起遂殺之得獅子一還來至洛陽三千里雞犬皆無鳴吠也後周書曰楊忠嘗從太祖狩於東門忠獨當一猛獸左挾其腰右㧞其舌太祖葬之北臺謂猛獸為掩于因以字之獅子説文曰虓獅子也爾雅曰狻猊如虦貓}
