  - {type: variant, offset: 0, length: 1, content: 妖, WYG: 欽定四庫全書太平御覧卷八百八十九宋李昉等撰獸部一叙獸猛獸獅子麒麟叙獸國語曰獸三為羣爾雅曰四足而毛謂之獸説文曰獸守備者也獸足謂之畨毳獸細毛也翰獸毫也荐獸所食草也周禮天官上曰獸人掌罟田獸辨其名物冬獻狼夏獻麋春秋獻獸物時田則守罟及弊田令禽注於虞中凡祭祀䘮紀賔客共其死獸生獸凡獸入于腊人皮毛筋角入于玉府凡田獸者掌其政令又天官下曰獸醫掌療獸病療獸瘍凡療獸病灌而行之以節之以動其氣觀其所發而養之凡療獸瘍灌而劀之以發其惡然後藥之養之食之獸之有病有瘍者使療之死則計其數以進退之又天官上曰内饔辨腥臊膻香之不可食者牛夜鳴則􅂒羊冷毛而毳羶犬赤股而躁臊鳥皫色而沙鳴狸豕盲眡而交􅊿腥馬黑脊而般臂螻又夏官上曰服不氏掌養猛獸而教擾之凡祭祀共猛獸又秋官下曰穴氏掌攻蟄獸各以其物火之以時獻其珍}
