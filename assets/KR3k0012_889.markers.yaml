  - {type: variant, offset: 450, length: 1, content: 八, SBCK: 曰聚窟洲在西海中申未地靣各方三千里北接崑崙二十六里有師子辟邪鑿齒天鹿長牙銅頭鐡額之獸宋炳師子擊象圗序曰梁伯玉􅀃沙門釋僧􅁻云甞從天笁欲向大􅁗其間忽聞數十里外哮噉之聲驚天怖地頃之但見百獸率走蹌地至絶而四巨象虓焉而至以鼻卷泥自厚塗數尺數噴鼻偶立俄有師子三頭見於山下直摶四象崩血􅀂濫泉巨樹草偃法顯記曰阿育王精舎後立石柱作師子柱内四邊有佛像内外映徹淨􅀂琉璃有外道論師子與沙門爭此住處時沙門理屈於是共誓此處􅀂是沙門住處者當有靈驗作是言巳柱頭師子乃大鳴吼見證外道懼怖心服而還國史􅀘曰開元末西域獻師子至安西道中繫於驛樹近井師子哮吼若不自安俄頃風雷大至有龍岀井而去虞丗南師子賦曰有絶域之神獸因重譯而來擾其爲狀也䈥骨糺􅆞殊姿異制闊臆脩尾勁毫柔毳鈎􅀲踞牙藏鋒畜銳弭耳宛足伺間借勢曁乎奮鬣䑛脣倐來忽徃瞋目電曜發聲雷響拉虎吞􅆛裂犀分象碎隨兕於齦齶屈巴虵於指掌踐籍則林麓摧殘哮呼見江河振蕩服猜心與猛氣遂感德以依仁麒麟􅀃文曰麒麟仁獸也馬身牛尾􅁏角春秋運斗樞曰機星得則麟生春秋保乹圗曰歲星散爲麟爾雅曰麟麕身牛尾一角麕居筠切禮記禮運曰天不愛其道地不愛其寳人不愛其情故麒麟在郊藪詩國風麟之趾曰麟之趾振振}
