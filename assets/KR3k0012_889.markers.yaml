  - {type: variant, offset: 469, length: 0, content: '', SBCK: 陽精􅋐作於地則日月亦將爭於上也尚書中􅀱曰黄帝時麒麟在囿毛詩義䟽白麟馬足黄色圎蹄角端有􅁏音中黄鍾王者至仁則岀大戴禮曰毛蟲三百六十而麟爲之長禮記曰麟鳯􅀛龍謂之四靈麟以爲畜則獸不狘呼厥反漢書曰終軍從上幸雍獲白麟一角五蹄又得木枝旁出輙復合上異之終軍對曰野獸并角明同本也衆支内附示無外也􅀂此之應殆將有解編髪削左袵襲冠帶要衣裳而蒙至化者焉東觀漢記曰章帝時麟五十一見􅀳書曰王濬平吴􅀍謗上表曰夫猛獸當塗麒麟恐懼况臣脆弱敢不悚慄何法盛􅀳中興徴祥􅀃曰麟麕身牛尾狼頭一角黄色馬足也􅀳書載記曰石虎時郡國前後送蒼麟十六白鹿七季龍命司虞張昌徃調之以駕芝盖列乎充庭之乗又曰吕光入姑臧時麟見金澤縣百獸從之光以爲巳瑞以孝武太元十四}
  - {type: page-break, offset: 469, content: '', id: KR3k0012_SBCK_889-7b}
