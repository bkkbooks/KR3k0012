  - {type: variant, offset: 381, length: 2, content: 案老, SBCK: 東陽西寺七佛屋太元中龕下有一物岀頭如鹿有法獻道人迫而觀之於是吐沬噴洒氣􅀂雲霧至元嘉十四年四月七日此頭復出尋覔其處亦無孔穴年年有聲殷若小雷猛獸十洲記曰漢武帝時月支國獻猛獸一頭形如犬}
  - {type: variant, offset: 381, length: 2, content: 案老, WYG: 東陽西寺七佛寺屋太元中龕下有一物出頭如鹿有法獻道人廹而觀之於是吐沫噴洒氣若雲霧至元嘉十四年四月七日此頭復出尋覔其處亦無孔穴年年有聲殷若小雷猛獸十洲記曰漢武帝時月支國獻猛獸一頭形如犬}
  - {type: variant, offset: 381, length: 2, content: 案老, krp: 東陽西寺七佛屋太元中龕下有一物岀頭如鹿有法獻道人迫而觀之於是吐沬噴洒氣若雲霧至元嘉十四年四月七日此頭復出尋覔其處亦無孔穴年年有聲殷若小雷猛獸十洲記曰漢武帝時月支國獻猛獸一頭形如犬}
  - {type: punctuation, offset: 382, content: 《, id: KR3k0012_CHANT_889-bkkpn108}
  - {type: variant, offset: 384, length: 2, content: 玉策, SBCK: 似狸而色黃帝恠其羸細秃悴問使者何謂猛獸使者對曰猛獸生崑崙食氣飮露帝使使者令猛發聲忽叫如天雷霹􅆮之聲諸牛羊馬豕犬之屬皆驚駭以付上林苑徑上虎頭溺虎口去十許歩虎輙閉目明日失使者及猛獸所在慱物志曰魏武伐蹹頓經白狼山逢師子使格之殺傷甚衆忽見一物從林中出如狸上帝車軛上師子將至便跳上其頭師子伏不敢起遂殺之得師子兒還未至四十里鷄犬皆無鳴吠也後周書曰楊忠甞從太祖狩於龍門忠獨當一猛獸左挾其腰右抜其舌太祖壯之北臺謂猛獸爲揜于因以字之師子􅀃文曰虓師子也爾雅曰狻猊如虥猫食虎豹郭璞注曰即師子也狻音酸猊音倪虥音姧文淺毛也穆天子傳曰狻猊日走五百里郭璞注曰師子也食虎豹東觀漢記曰陽嘉中䟽勒國獻師子封牛師子形似虎正黃有髯耏音而尾端茸毛大如斗司馬彪續漢書曰章和元年安息國遣使獻師子符枝形似麟而無角魏略曰大􅁗國無盗賊但有師子爲害行道不群則不得過也宋書曰宗慤討林邑王范陽邁傾國來逆以具裝􅀍象前後無際慤以爲外國有師子威服百獸乃製其形與象相禦象果驚奔衆因此潰亂遂剋林邑蕭子顯齊書曰王敬則􅀳陵南沙人也母爲巫生敬則而胞紫色謂人曰此兒有皷角相敬則年長兩腋下生乳各長數寸夢􅀐五色師子後位至太尉㝷陽公唐書曰隋大業中有波斯胡人牧駞於俱紛摩地郍之山忽有師子從地踊出人語謂之曰此山西今有三穴穴中大有兵器汝可取之穴中有刀及槊刄甚多石上有文教反叛於是糺合亡命渡恒昌水刼奪商旅其衆漸盛遂割據波斯西境自立爲王波斯拂菻各遣兵討之反爲所敗其王姓大倉名宻模末􅕹自}
  - {type: page-break, offset: 384, content: '', id: KR3k0012_SBCK_889-4a}
