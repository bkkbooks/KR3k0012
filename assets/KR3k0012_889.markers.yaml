  - {type: variant, offset: 672, length: 896, content: 里多龍螭皆白色千歲一蛻其五藏潭側有五色石云是白螭之膓化為此石又曰因墀國去王都十六萬里有解形之民放其身於空潭先使頭飛於南方次使左手飛於東方次使右手飛於西方自齊以下兩足孤立至暮頭還於體兩手不至遇疾風吹兩手於北海玄洲上化為五足之獸則一指為一足也蜀王本紀曰蜀王之先名蠶叢後代名曰柏濩後者名魚鳧此三代各數百歲皆神化不死其民亦頗隨王化去王獵至湔山便仙去今廟祀之於湔時蜀民稀少後有一男子名曰杜宇從天墮止朱提有一女子名利從江源地井中出為杜宇妻宇自立為蜀王號曰望帝治汶山下邑郫化民往往復出望帝積百餘歲荊有一人名鼈靈其尸亡去荊人求之不得鼈靈尸至蜀復生蜀王以為相時玉山出水若堯之洪水望帝不能治水使鼈靈決玉山民得陸處鼈靈治水去後望帝與其妻通帝自以薄德不如鼈靈委國援鼈靈而去如堯之禪舜鼈靈即位號曰開明奇帝生盧保亦號開明天為蜀王生五丁力士能徙蜀山王死五丁輒立大石長三丈重千鈞號曰石井千人不能動萬人不能移蜀王據有巴蜀之地本治廣都後徙治成都秦惠王時蜀王不降秦秦亦無道出於蜀蜀王從萬餘人東獵褒谷卒見秦惠王惠王以金一笥遺蜀王蜀王報以禮物物盡化為土秦王大怒臣下皆再拜賀曰土者土地秦當得蜀矣秦王恐亡相見處乃刻五石牛置金其後蜀王以為金便令五丁拖牛成道致三枚於成都秦道乃得通石牛之力也武都人有善知蜀王者將其妻女適蜀王居蜀之後不習水土欲歸蜀王愛其女留之乃作伊鳴之聲六曲以樂之或曰前是武都丈夫化為女子顏色美好蓋山之精也蜀王取以為妻不習水土疾病欲歸蜀王留之無幾物故蜀王發卒於武都檐土於成都郭中葬之蓋地數畝高七丈號曰武擔以石作鏡一枚表其墓於是秦王知蜀王好色乃獻美女五人與蜀王愛之遣五丁迎女還至梓潼見一大蛇入山穴中五丁共引蛇山崩壓五丁五丁大呼秦王五女及送迎者上化為石蜀王登臺望之不來因名五婦候臺蜀王親理作冢皆致方石以誌其墓列異傳曰昔鄱陽郡安樂縣有人姓彭世以捕射為業兒隨父入山父忽蹶然倒地乃變成白鹿兒悲號追鹿超然遠逝遂失所在兒於是終身不捉弓至孫復學射忽得一白鹿乃於鹿角間得道家七星符并有其祖姓名年月分明覩之惋悔乃燒去弧矢又曰武昌新縣北山上有望夫石狀若人立者傳云昔有貞婦其夫從役遠赴國難婦攜弱子餞送此山立望而形化為石丹陽記曰孫皓寶鼎元年丹陽宣騫之母年, SBCK: ''}
