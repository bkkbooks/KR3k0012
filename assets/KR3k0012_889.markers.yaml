  - {type: variant, offset: 375, length: 4, content: 為蟲為沙, SBCK: 而來在此直云我有三女姿容羙兼多􅇊藝彈琴賦詩閑究五典舒夫等共􅅞束令出女公曰我女仍居􅀷房洞庭之中非自徃喚不可得也請解我繩當呼女也獵人猶不置俄而變成一獸黃色四足其形似臯又復如狐頸長三尺頭生一角耳髙於頂面故􅀋人舒夫等大懼狼狽放解倐忽失處}
