  body:
  - {type: variant, offset: 2, length: 1, content: 部, SBCK: 皮革又曰囿人掌囿㳺之獸禁囿游囿之離宫小􅁐觀處也牧百獸備飬衆物也今掖庭有鳥獸自熊虎孔雀至於狐狸鳬鶴備􅀕祀喪紀賔客共其生獸死獸之物又司馬職曰中軍以鼙令皷皷人皆三皷群司馬振鐸車徒皆作遂皷行徒衘枚而進大獸公之小獸私之大獸公之輸於公也小獸私之以自卑也又曰東北曰幽州畜冝}
  - {type: variant, offset: 2, length: 1, content: 部, WYG: 皮革又囿人掌囿游之獸禁牧百獸祭祀䘮紀賔客共其生獸死獸之物又司馬職曰中軍以鼙令鼓鼓人皆三鼔司馬振鐸車徒皆作遂鼓行徒衘枚而進大獸公之小禽私之又曰東北曰幽州畜宜}
  - {type: variant, offset: 2, length: 1, content: 部, krp: 皮革又曰囿人掌囿㳺之獸禁囿游囿之離宫小苑觀處也牧百獸備飬衆物也今掖庭有鳥獸自熊虎孔雀至於狐狸鳬鶴備祭祀喪紀賔客共其生獸死獸之物又司馬職曰中軍以鼙令皷皷人皆三皷群司馬振鐸車徒皆作遂皷行徒衘枚而進大獸公之小獸私之大獸公之輸於公也小獸私之以自卑也又曰東北曰幽州畜冝}
