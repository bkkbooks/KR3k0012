  - {type: variant, offset: 461, length: 0, content: '', SBCK: 十四年西狩獲麟傳曰西狩於大野今此日採薪於大野時實自狩鉏商非狩者採薪也而獲麟瑞物時見狩獲故經書西狩獲麟焉折前左足載以歸叔孫以爲}
  - {type: variant, offset: 461, length: 0, content: '', krp: 十四年西狩獲麟傳曰西狩於大野今此日採薪於大野時實自狩鉏商非狩者採薪也而獲麟瑞物時見狩獲故經書西狩獲麟焉折前左足載以歸叔孫以爲}
  - {type: variant, offset: 462, length: 0, content: '', SBCK: 祥棄之于郭外傳曰以賜虞人棄之郭外將以賜虞人使人告孔子曰有麏而角者何也孔子徃而觀之曰麟也孰爲來哉孰爲來哉反􅃑拭靣涕泗沾衿叔孫聞之然後取之子貢問曰夫子何泣矣孔子曰麟之至也爲明王也出非其時而}
  - {type: variant, offset: 462, length: 0, content: '', krp: 祥棄之于郭外傳曰以賜虞人棄之郭外將以賜虞人使人告孔子曰有麏而角者何也孔子徃而觀之曰麟也孰爲來哉孰爲來哉反𬒮拭靣涕泗沾衿叔孫聞之然後取之子貢問曰夫子何泣矣孔子曰麟之至也爲明王也出非其時而}
  - {type: variant, offset: 463, length: 5, content: 通須臾皆成, SBCK: 害是以傷焉孔叢子曰叔孫氏子鉏商獲麟以爲不祥棄之冉有告夫子夫子將觀之泣曰子之於人猶麟之於獸出而死其道窮矣乃歌曰唐虞丗兮麟鳯遊今非其時來何求麟兮麟兮我心憂因此幽憤作春秋焉孝經右契曰孔子夜夢豐沛􅀖有赤煙氣起顔回子夏侣徃觀之驅車到楚西北范氏之廟見芻兒捶麟傷其前左足束薪而覆之孔子曰兒汝來姓爲誰兒曰吾姓爲赤松子孔子曰汝豈有所見乎吾所見一禽如麏羊頭頭上有角其末有􅁏方以是西走孔子發薪下麟視孔子而蒙其耳吐三卷書孔子精而讀之春秋演孔圖曰蒼之滅也麟不榮也麟木精也麒麟􅋐日無光宋均注曰麟木精木生於水故曰隂木氣好土土黄木青故麟色青黄不榮謂見絏也麟龍}
  - {type: page-break, offset: 463, content: '', id: KR3k0012_SBCK_889-7a}
  - {type: variant, offset: 463, length: 5, content: 通須臾皆成, krp: 害是以傷焉孔叢子曰叔孫氏子鉏商獲麟以爲不祥棄之冉有告夫子夫子將觀之泣曰子之於人猶麟之於獸出而死其道窮矣乃歌曰唐虞丗兮麟鳯遊今非其時來何求麟兮麟兮我心憂因此幽憤作春秋焉孝經右契曰孔子夜夢豐沛邦有赤煙氣起顔回子夏侣徃觀之驅車到楚西北范氏之廟見芻兒捶麟傷其前左足束薪而覆之孔子曰兒汝來姓爲誰兒曰吾姓爲赤松子孔子曰汝豈有所見乎吾所見一禽如麏羊頭頭上有角其末有肉方以是西走孔子發薪下麟視孔子而蒙其耳吐三卷書孔子精而讀之春秋演孔圖曰蒼之滅也麟不榮也麟木精也麒麟鬪日無光宋均注曰麟木精木生於水故曰隂木氣好土土黄木青故麟色青黄不榮謂見絏也麟龍}
