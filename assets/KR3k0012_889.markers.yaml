  - {type: variant, offset: 561, length: 6, content: 䏿民穴居食土, WYG: 光尚書中候曰黃帝時麒麟在囿毛詩義疏曰麟馬足黃色圓蹄角有肉音中黃鍾王者至仁則出大戴禮曰毛蟲三百六十而麟為之長禮記曰麟鳯龜龍謂之四靈麟以為畜則獸不狘漢書曰終軍從上幸雍獲白麟一角五蹄又有木枝旁出輙復合上異之終軍對曰野獸并角明同本也衆枝内附示}
