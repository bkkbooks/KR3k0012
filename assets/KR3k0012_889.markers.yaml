markers:
  front:
  - {type: variant, offset: 0, length: 1, content: 妖, SBCK: 太平御覽卷第八百八十九獸部一叙獸猛獸師子麒麟叙獸國語曰獸三爲群爾雅曰四足而毛謂之獸􅀃文曰獸守備者也獸足謂之畨毳獸細毛也翰獸豪也薦獸所食草也周禮天官上曰獸人掌􅅈田獸辨其名物􅅈網也以網摶所當田之獸冬獻狼夏獻麋春秋獻獸物狼膏聚麋膏散聚則温散則凉以救時之苦也獸物凡獸皆可獻也及狐狸時田則守􅅈備獸觸攫及弊田令禽注于虞中鄭司農云弊田謂春火弊夏車弊秋羅弊冬徒弊虞中謂虞人􅁵所田之野及弊田植虞旗於其中致禽而珥焉獸人主令曰衆得禽者置虞人所立虞旗之中當以給四時社廟之􅀕珥焉者取左耳以致攻若斬首折馘凡􅀕祀喪紀賔客共其死獸生獸共其完者凡獸入于腊人當乾之皮皮毛䈥角入于玉府給作器物凡田獸者掌其政令又天官下曰獸醫掌療獸病療獸瘍畜獸之疾病及瘍療同醫凡療獸病灌而行之以節之以動其氣觀其所發而飬之療畜獸必灌行之者爲其病狀難知灌以緩之且強其氣也節趨聚之節也氣謂脉氣旣行之乃以脉視之以知所病凢療獸瘍灌而劀之以發其惡然後藥之飬之食之亦先攻之而後飬之凢獸之有病者有瘍者使療之死則計其數以進退之又天官上曰内饔辨腥臊羶香之不可食者牛夜鳴則庮羊泠毛而毳羶犬赤股而躁臊鳥皫色而沙鳴貍豕盲眡而交睫腥馬黒脊而般臂螻腥臊羶香可食者是别其不可食者則所謂者皆􅆨味也冷毛毛長緫結也皫失色不澤美也沙斯也交睫腥腥當爲星聲之誤也肉有如米者似星般臂臂毛有文鄭司農云庮朽木􅆨也螻螻蛄􅆨也杜子春云盲眡當爲望視又夏官上曰服不氏掌飬猛獸而教擾之猛獸虎豹熊羆之屬擾馴也教習使之馴服王者之教無不服凡􅀕祀共猛獸謂中膳羞者獸人冬獻狼春秋傳曰熊蹯不熟又秋官下曰穴氏掌攻蟄獸各以其物火之蟄獸熊羆之屬冬藏者也將攻之必先燒其所食之物於穴以誘出之乃可得之者也以時獻其珎}
