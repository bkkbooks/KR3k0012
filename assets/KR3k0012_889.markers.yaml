  - {type: variant, offset: 585, length: 3, content: 埋蜻蜓, WYG: 王者徳化旁流四表則麒麟游其囿蔡邕月令章句曰凡麟生於火遊於土故修其母致其子五行之精也視明禮修則麟臻孫卿子曰古之王者好生惡殺故麒麟遊其郊野平子曰昔人不識麟問人答曰麟如麟問者惡之㑹見者曰麟麕身牛尾鹿蹄馬背問者霍然而解何法盛徵祥記曰麒麟者毛蟲之長也仁獸也牡曰麒牝曰麟牡鳴曰遊聖牝鳴曰歸昌夏鳴曰扶幼秋鳴曰養綏説苑曰麒麟麕身牛尾圓頂一角含仁懐義音中律吕行歩中規折旋中矩擇土而後踐位平然後處不羣居不旅行紛兮其有質文也幽間則循循如也西京雜記曰五柞宫前有青梧觀觀前有三梧桐樹樹下有石麒麟二枚刋其脇為文詞是秦始皇驪山墓上物也}
