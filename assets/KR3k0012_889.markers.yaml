  - {type: variant, offset: 479, length: 0, content: '', SBCK: 曰古之王者好生惡殺故麒麟遊其郊野牟子曰昔人不識麟問人荅曰麟如麟問者惡之曽見者曰麟麕身牛尾鹿蹄馬背問者霍然而解何法盛徴祥記曰麒麟者毛虫之長仁獸也牡曰騏牝曰麟牡鳴曰遊聖牝鳴曰歸和夏鳴曰扶㓜秋鳴曰飬綏􅀃苑曰麒麟麕身牛尾圓頂一角含仁懷義音中律吕行歩中䂓折旋中矩擇土而後踐位平然後處不群居不旅行紛兮其質文也幽間則循循如也西京雜記曰五柞宫前有梧桐樓樓下皆有石騏驎二枚刋其爲文字是秦始皇驪山墓上物也頭髙一丈三尺東邊者前脚折折處赤如血父老謂其神皆含血屬䈥焉抱朴子曰麒麟壽千歳論衡曰蝗虫飛至萬里麒麟湏獻乃逹闕而蝗爲災麟爲瑞麟四足不}
