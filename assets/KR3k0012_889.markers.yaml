  - {type: variant, offset: 470, length: 0, content: '', SBCK: 僣即三河王位三國典略曰徐陵東海郯人梁石右衛率摛之子母甞夢五色雲化而爲鳯集左肩上巳而誕陵年數歳家人携之以􅀱寳誌寳誌摩其頂曰天上石麒麟也春秋感精符曰麟一角明海内共一主也王者不刳胎不破􅆑則岀於郊}
  - {type: variant, offset: 470, length: 0, content: '', krp: 僣即三河王位三國典略曰徐陵東海郯人梁石右衛率摛之子母甞夢五色雲化而爲鳯集左肩上巳而誕陵年數歳家人携之以候寳誌寳誌摩其頂曰天上石麒麟也春秋感精符曰麟一角明海内共一主也王者不刳胎不破卵則岀於郊}
