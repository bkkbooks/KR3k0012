  - {type: variant, offset: 223, length: 1, content: 去, SBCK: 風視波窮究川野安審懼慎終無不可艦釋名曰上下重牀曰艦四方施板以禦失如牢檻也洞􅁳記曰昆靈弛中有淩波艦棭電艦吴志曰周瑜逆曹公部將黄公蓋取艨衝闘艦數十艘實以薪草膏灌其中裏以帷幕上建牙旗同時發火時風猛火盛悉延燒岸上營曹公軍敗退晉中興書曰建興九年冬左將軍王敦遣振威將軍周訪廣武將軍趙誘受陶偘節度征蜀賊杜㢰音韜大戰蜀賊以桔橰打没偘艦二十餘艘人皆投水義􅄉起居注曰盧循新作八槽艦九枚起四層髙十餘丈連營繕令曰諸私家不得有戰艦等舡艨衝釋名曰外狹而長曰艨衝吴志曰董襲討黄祖祖横兩艨衝夾守􅃆口栟音并櫚音閣大紲繫石爲矴軍不得前襲與陵統俱爲前部各將敢死百人人􅀍兩鎧乗舸舡突入艨衝裏身以刀斷兩紲艨衝方横流大兵遂進又曰周瑜逆曹公部將黄蓋取艨衝􅋐艦數十艦餘艦上艦門户又曰將軍賀齊性奢綺好軍事所乗舡雕刻丹鏤青蓋綘居朦衝􅋐艦之屬望之􅀂山營繕令曰諸􅀻家不得有蒙衝等舡餘具叙舟中門䑦􅑳雜字觧詁曰䑦􅑳雜舡也吴志曰吕蒙襲􅀜羽至㝷陽晝伏精兵於􅑳艑中使白衣揺櫓作啇賈販晝夜兼行故羽不聞知遂到南郡物理論曰夫工匠徑渉河海爲舸􅑳以浮大淵皆成於巧手岀乎聖意艑廣雅曰艑舟也荆州土地記曰湘洲七郡大艑之所岀皆受萬斛吴志曰吕蒙襲􅀜羽至㝷陽晝伏精兵於􅑳艑中餘上具䑦􅑳門温嶠教曰廪者無米受得艑下濕米豈是吾遇兵衆無異之懷乎雖是數合米欲令齊均􅀂有不如教鞭}
