  - {type: variant, offset: 36, length: 0, content: '', WYG: 張飛關羽曰彼欲致我今自託於東而不徃非同盟}
  - {type: variant, offset: 37, length: 3, content: 閭或謂, WYG: 意也乃乗單舸徃見瑜問曰今距曹氏深為得計戰交有機瑜曰此自足用豫州但觀瑜破}
  - {type: punctuation, offset: 38, content: ，, id: KR3k0012_CHANT_770-bkkpn12}
  - {type: 'tls:seg', offset: 38, content: '', id: KR3k0012_CHANT_770-1a.10}
  - {type: variant, offset: 41, length: 0, content: '', WYG: 吳厯曰曹公出濡湏作油船夜渡洲上權乃自乗從濡須口入公軍行五六里廻環作鼔吹公見舟船器仗軍伍整肅喟然嘆曰生子當如孫仲謀劉景升子若豚犬耳又曰孫綝上疏景帝曰少帝於宫内作小船三百餘艘飾以金銀師工晝夜不息王粲海賦曰乗菌桂之舟晨鳬之舸庾闡楊都賦曰龍坻筆屋晨鳬之舸}
  - {type: page-break, offset: 41, content: '', id: KR3k0012_WYG_770-5a, image: WYG0899/WYG0899-0728a.png}
