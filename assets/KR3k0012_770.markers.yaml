  - {type: variant, offset: 177, length: 1, content: 皓, SBCK: 權乗飛雲大舡與張昭魯肅等共追送叙别吴又曰周瑜破魏軍曹公復書與權曰赤壁之役值有疾疫􅀌燒舡自退撗使周瑜虚獲此名又曰劉備進駐鄂縣之樊口諸􅁑詣吴未還聞曹公軍下恐懼曰遣邏吏於水次候權軍吏望見周瑜舡馳還白備備曰何以知非青徐軍耶吏對曰以舡知之備遣人慰勞瑜瑜曰有軍任不得委署儻能屈威副其所望備謂張飛􅀜羽曰彼欲致我今自託於東而不徃非同盟之意也乃乗單舸徃見瑜}
