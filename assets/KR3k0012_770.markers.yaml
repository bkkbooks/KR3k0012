  - {type: variant, offset: 1264, length: 0, content: '', SBCK: 玄謨水軍大艚連以䥫鎻三重欲以絶護之還路護之中流而下毎至鐵鎻輙以長柯斧斷之虜不能禁唯失一舸吴志曰甘寜厨下兒有過走投吕蒙蒙恐寜殺之故不即還後寧齎禮禮䝉母蒙臨當輿斗堂乃岀厨下兒出還寜寜許不殺斯湏還}
