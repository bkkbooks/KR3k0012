  - {type: variant, offset: 219, length: 0, content: '', SBCK: 有飛倉集舡說苑曰楚鄂君乗青翰之舟張翠羽之鷁楚辭曰舡容與而不進奄迴水以凝滯又曰羙要妙兮冝修沛吾乗兮桂舟桂櫂兮蘭枻増水兮積雪魏文帝沂淮賦曰建安十四年王師東征泛舟萬艘楊脩岀征賦曰汎順風而廻艫徐日轉而月移斾已入乎河口殿都練切尚集於菌池班固東都賦曰命舟牧爲水嬉浮鷁首醫雲芝交又曰東郊則有通溝大漕潰渭洞河泛舟山東控引淮湖與海通波漕水運也蒼頡篇月潰傍决也前書武帝渠通渭史記曰滎陽下引河東南爲鴻溝以與淮泗㑹也􅀽宏東征賦曰驚瀾嶾音隱嶙力軫切而嶽轉頽波嵔音猥􅐑力猥切以嶺没咨余舟之小狹衝奔湍以檮杌櫂弱檝之弗施授洪流以藏骨夏侯弼吴都賦曰嚴嚴舡艫汎汎楊舟權河髙跱風駭雲浮堅壁金扶有􅀂髙樓劉謐之與公牋曰昔甲申之際遭湯旱流烟今子亥之歳值堯水滔天火延燒其廬水突壞其園何小人兮頓偷􅀟舡由是行無擔石室如懸磬魏文與孫權書曰知巳選擇見舡最大樟材者六艘受五百里石從汚水送付樊口王粲詩曰方舟浮大江日暮愁我心曹植詩曰何以汎舟媿無榜人􅄞康詩曰淵淵緑水淪滑而逝汎汎虚舟載停載滯皷枻投竿􅄖遊卒歳梁王筠詠輕利舡應臨汝侯教詩曰君侯飾輕利揺蕩邁}
