  - {type: variant, offset: 852, length: 2, content: 乘舟, WYG: 末矣舎五經}
  - {type: variant, offset: 855, length: 2, content: 來至, WYG: 濟乎道者末}
  - {type: variant, offset: 857, length: 402, content: 矣子貢朝至如顏回說苑曰梁相死惠子欲之梁渡河而遽墮水中舩人救之曰子欲何之而遽也曰梁無相吾欲往相之舡人曰子居舡楫之間而溺無我則死矣子何能相梁乎惠子曰居艘長楫之間不如子至於安國家社稷子比我矇矇如未視狗耳又曰晉平公使叔向聘吳吳人飾舟以逆之左右各五百人有繡衣豹裘者錦衣狐裘者叔向歸以告平公吳其亡乎潛夫論曰人行之動天地譬車上御駟馬蓬中櫂舟雖有覆載猶在我所之蔣子萬機論曰吳越爭於五湖用舟楫而相觸怯勇共覆鈍利俱傾顧譚新言曰蓬蒿生于泰山之上豫章長于窮藪之中良匠造舟興宮建廟必不取泰山之陋質而棄窮藪之美材明矣又曰奔事失轄泛舟無楫欲以不覆未之有也譙周法訓曰以道為天下者猶乘安舟而由廣路安舟難成可久處也廣路難至可常行也又曰秉舡曲折不失其瀆是善乘舟者袁准正書曰非其所事而強學猶以百萬之師積之河濟之中其用舟楫固不如江漢之良杜夷幽求曰輕舟可以救溺濡幕可以濟焚抱朴子曰欲以獘藥必升騰者何異策蹇驢而欲尋遺風櫂籃舟而欲濟大川語林曰劉道真遭亂, SBCK: ''}
