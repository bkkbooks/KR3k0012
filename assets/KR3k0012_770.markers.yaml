  - {type: variant, offset: 939, length: 16, content: 於安國家社稷子比我矇矇如未視狗耳, WYG: 鐡鎻輒以長柯斧斷之虜不能禁唯失一舸吳志曰甘寧厨下児有過走投呂蒙蒙恐寧殺之故不即還後寧齎禮禮蒙母蒙臨當與升堂乃出厨下児出還寧寧許不殺斯湏還船縳置桑樹自挽弓射殺之勅船人更增舸纜解衣而卧船中蒙大怒擊鼓㑹兵欲攻寧蒙母諫乃止江表傳曰劉備進住鄂縣之樊口聞曹公軍下恐懼俄周瑜船軍至備乃乗單舸徃見瑜已具船門}
