  - {type: variant, offset: 221, length: 1, content: 舡, WYG: 蒼隼船說苑楚鄂君乗青輪之舟張翠羽之鷁楚辭曰船容與而不進奄回水以凝滯又曰羙要妙兮宜修沛吾乗兮桂舟桂櫂兮蘭枻増氷兮積雪魏文帝沂淮賦曰建安十四年王師東征泛舟萬艘楊修出征賦曰汎順風而廻艫徐日轉而月移斾已入乎河口殿都練切尚集於園池張衡西京賦曰命舟牧為水嬉浮鷁首翳雲芝班固西都賦曰東郊則有通溝大漕潰渭洞河泛舟山東控引淮湖與海通波漕水運也蒼頡篇曰潰傍決也漢書武帝紀穿漕渠通渭史記曰滎陽下引河東南為鴻溝以與淮泗㑹也袁宏東征賦曰驚瀾嶾音隠嶙力軫切而嶽轉頽波嵔音猥􅐑力猥切以嶺沒咨余舟之小狹衝奔湍以杌擢弱檝之弗施授洪流以藏骨夏侯弼吳都賦曰嚴嚴船艫汎汎楊舟權河髙跱風駭雲浮堅壁金扶有若髙樓劉謐之與公牋曰昔申之際遭湯旱流烟今子亥之嵗值堯水滔天火延燒其廬水突壊其園何小人兮頓偷雙船由是行無擔石室如磬懸魏文與孫權書曰知巳選擇見船最大樟林者六艘受五百里石從沔水送付樊口王粲詩曰方舟浮大江日暮愁我心曹植詩曰何以汎舟媿無榜人嵇康詩曰淵淵緑水淪滑而逝汎汎虛舟載停載滯鼔枻投竿優遊卒嵗梁王筠詠輕利船應臨汝侯教詩曰君侯飾輕利揺蕩送飛雲淩漾浮鷁采映水煥蛟文雷流已冠絶鳥遊復超羣倐忽方千里戀兹岐路分陳張正見後湖泛舟詩曰上苑奢行樂滄池聊薄遊泛荇移蘭櫂汳槎觸桂舟殘收度雨缺岸上水新流欲知有髙趣長楊送凌秋又别韋諒賦得江潮泛别舟詩曰千里尋楊岸三翼木蘭船鷁泛青鳬後雞鳴白鷺前涵花沒淺纜帶葉動深船不言朝夕水獨自限神仙又與錢元智泛舟詩曰髙門事休沐朝野念逢迎還乗金谷水俱望洛陽城舟移洛女度檝動渭橋横風高鴈已落雨霽水還清葉盡桐門浄花秋菊岸明欲奏江南曲聊習棹歌行晉棗據船賦曰嘉聖王之神化理通㣲而達幽悼民生之隔塞愍王教之不周立成器以備用因垂象以造舟濟迅波之絶軌越巨川之互流運重固之滯質雖載沒而必浮且論器而比象似君子之淑清外質朴而無飾内空虛以受盈不辭勞而惡動不偷安以自寧且其行無轍跡止無所根不疾而速忽若馳奔晉王叔之舟賛曰塗則騁車水惟用舟弱檝輕棹利渉濟求緬彼漁人鼓枻清謳後漢李尤舟檝銘曰舟檝之利譬猶輿馬載重歴逺以濟天下}
