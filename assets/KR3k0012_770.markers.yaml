  - {type: variant, offset: 47, length: 17, content: 今江東貴人舡前作青雀是其象也東觀漢, SBCK: 相州魏縣景穆寺西有遭官有石竇橋鳴鶴飛集赤馬飛龍等舟西京􅄂}
