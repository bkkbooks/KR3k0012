  - {type: punctuation, offset: 1311, content: 「, id: KR3k0012_CHANT_770-bkkpn447}
  - {type: variant, offset: 1311, length: 436, content: 周昭王二十四年塗脩國獻青鳳丹鵠各一雌一雄孟夏之時鳳羽皆脫易毛羽聚鵠翅為羽扇鳳羽以飾車蓋扇名遊飄二名條翮三名虧光四名側影時東甌獻二美女一名延娟二名造娛使此二人更搖此扇侍於王側輕風乍至冷然自涼昭王淪於江漢二女與乘舟來願同沒漢水故江漢之民到今異之丘祠於江湄數十年間人於江漢之上猶見王與二女乘舟楫於水際至暮春上巳之日禊集於祠間或以時鮮甘味採杜蘭之葉以包褁之沉於水中或結五色紗囊盛食或用金鐵之器並沉於波中以言蛟龍水中一褁之不侵食也其祠號曰招袛之祠又曰軒皇變乘採以造舟楫水物為之翔踴滄海為之恬波又曰周武王東伐夜郎濟河時雲明如晝八百之旅皆薦賢而歌有大蜂狀如舟鳥飛集王舟困以鳥畫幡旗翌日而梟紂名其舡曰蜂舟魯哀公二年鄭人擊趙簡子得其蜂旗則其遺類也事出太公六韜又曰漢成帝嘗與飛鷰汎舟戲太液池以沙棠為舟貴不沉沒也以雲母飾於鷁首一名雲母舟又刻大桐木為虬龍雕飾如真像以夾雲舟而行又曰比翼鳥多力狀似鵠𠾑南海之舟泥巢昆岑之去木而止其中遇聖人則來翔集以表周公輔聖人之力也又曰漢武思李夫人之儔不可復得時始穿, SBCK: ''}
