  - {type: variant, offset: 33, length: 13, content: 舩首謂之閭或謂之鷁首郭璞注, SBCK: 硤州逺安縣江有狼尾灘有陸抗故城南有􅀌山􅀽山松爲郡甞登以四望大江如索帶舟舡如鳬鴈焉又}
  - {type: variant, offset: 33, length: 2, content: 舩首, WYG: 孫權乗飛雲大船與張昭魯肅等共追送叙别又曰周瑜破魏軍曹公復書與權曰赤壁之役值有疾疫孤燒船自退横使周瑜虛獲此名又劉備進駐鄂縣之樊口諸葛居吳未還聞曹公軍下恐懼曰逭邏吏於水次候權軍吏望見周瑜船馳還白備備曰何以知非青徐軍耶吏對曰以船知之備遣人慰勞瑜瑜曰有軍任不得委署倘能屈威過其所望備}
  - {type: variant, offset: 33, length: 13, content: 舩首謂之閭或謂之鷁首郭璞注, krp: 硤州逺安縣江有狼尾灘有陸抗故城南有孤山袁山松爲郡甞登以四望大江如索帶舟舡如鳬鴈焉又}
  - {type: substitution, offset: 33, original: 舩, replacement: 船, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-17330}}
