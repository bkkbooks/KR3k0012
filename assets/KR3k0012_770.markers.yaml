  - {type: variant, offset: 423, length: 283, content: 今吳之青雀昉遺象山海經曰大人之國唑而削舡世本曰共鼓貨狄作舟共鼓貨狄黃帝二臣又曰廩君名曰豫相姓巳氏即與樊氏曋音審氏柏氏鄭氏凡五姓爭神以土為舡雕文畫之而浮水中其舡浮者神以為君他姓舡不能浮獨廩君舡浮因立為君蜀王本紀曰秦為舶舡萬艘欲攻楚呂氏春秋曰虞姁作舟姁音劬詡二音又曰荊有佽飛者得寶劍涉江中流而有蛟夾繞其舡佽飛拔寶劍赴江刺蛟殺之舟中之人皆活荊王聞之位以執圭又曰楚人有涉江者其劍自舟中墜於水遽契其舟曰是吾劍所從墜也舟去從所契處入求之而舟已行劍不行若此不亦惑乎又曰伍員如吳過於荊至江上欲涉見一丈人刺小舡方將漢從而請焉丈人渡之又曰管夷吾百里奚覆王之舡驥也絕江者託於舡致遠者託於驥, SBCK: 伏及奥死遂長廢}
