  - {type: variant, offset: 27, length: 2, content: 或謂, WYG: 臣}
  - {type: variant, offset: 30, length: 1, content: 航, WYG: 職也且敬太甚必有故使人視之則兵在後矣將以襲衛矣赤市曰衛假吾道而厚贈我我見難而不吿是與為謀也稱疾而留使人告衛衛人警戒智伯聞之乃止也列女傳曰趙簡子至河津津吏醉吏女乃持檝而前為王棹舟餘具下檝門中江表傳曰孫權於昌新裝大船名為長安}
  - {type: page-break, offset: 30, content: '', id: KR3k0012_WYG_770-4a, image: WYG0899/WYG0899-0727c.png}
