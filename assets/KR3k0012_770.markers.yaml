  - {type: variant, offset: 66, length: 90, content: 鄧訓為護羗校尉綘革為舡置於箄上以渡河掩擊明羗張璠漢記曰梁冀弟池中舡無故自覆問椽朱穆穆曰舟所以濟渡萬物不施遊戲而已今覆者天戒將軍濟渡萬民不可長念遊戲也漢宮殿䟽曰武帝作大池周匝四十里名, SBCK: ''}
