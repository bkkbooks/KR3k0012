  - {type: 'tls:seg', offset: 43, content: '', id: KR3k0012_CHANT_770-1a.11}
  - {type: variant, offset: 43, length: 35, content: 郭璞注曰今江東貴人舡前作青雀是其象也東觀漢記曰鄧訓為護羗校尉綘革為舡置, WYG: 鋪}
