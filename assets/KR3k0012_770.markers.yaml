  - {type: variant, offset: 1119, length: 190, content: 譙周法訓曰以道為天下者猶乘安舟而由廣路安舟難成可久處也廣路難至可常行也又曰秉舡曲折不失其瀆是善乘舟者袁准正書曰非其所事而強學猶以百萬之師積之河濟之中其用舟楫固不如江漢之良杜夷幽求曰輕舟可以救溺濡幕可以濟焚抱朴子曰欲以獘藥必升騰者何異策蹇驢而欲尋遺風櫂籃舟而欲濟大川語林曰劉道真遭亂於河側自牽舡見一老嫗採桑逆旅劉謂之曰女子何不調機利杼而採桑逆旅女荅曰丈夫何不跨馬揮鞭而牽舡王子年拾遺, WYG: 洞㝠}
