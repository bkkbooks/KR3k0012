  - {type: variant, offset: 1262, length: 0, content: '', SBCK: 而航在北使客呼之一呼而航來楊子灋言曰舎舟航而濟乎瀆者末矣舎五經而濟乎道者末矣李􅁤注曰末無之也乗國者如乗航乎則民斯安矣孫綽子曰仲尼見滄海横流故務爲舟航左思吴都賦曰長鯨吞航脩鯢吐浪也舫說文曰舫併舡吴書陸孫破曹休當還西陵公卿並爲祖道上賜御舡一舫繒綵舟也晉書曰王廙性儁率嘗從南下旦}
  - {type: page-break, offset: 1262, content: '', id: KR3k0012_SBCK_770-7a}
  - {type: variant, offset: 1262, length: 0, content: '', krp: 而航在北使客呼之一呼而航來楊子灋言曰舎舟航而濟乎瀆者末矣舎五經而濟乎道者末矣李軌注曰末無之也乗國者如乗航乎則民斯安矣孫綽子曰仲尼見滄海横流故務爲舟航左思吴都賦曰長鯨吞航脩鯢吐浪也舫說文曰舫併舡吴書陸孫破曹休當還西陵公卿並爲祖道上賜御舡一舫繒綵舟也晉書曰王廙性儁率嘗從南下旦}
  - {type: variant, offset: 1263, length: 0, content: '', SBCK: 㝷陽迅風飛㠶暮至都􅀝舫樓長嘯神氣甚逸梁書曰安成康王秀爲江州刺史將發主者求堅舡以爲齎舫秀曰吾豈愛財而不愛士乃教以牢者給叅佐下者載齎物旣而遭風齎舫遂破舠釋名曰舡三百斛曰舠舠豹也短也江南所名短而廣安不傾危也詩曰誰謂河廣曽不容舠舸王隠晉書曰頋滎徴侍中見王路塞絶便乗舡而還過下邳遂觧舫爲單舸一日一夜行五六百里遂得免沈約宋書曰垣護之隨王玄謨入河玄謨攻滑臺護之以三百舸爲前鋒進據石濟石濟在滑臺西南百二十里玄謨敗退不暇報護之及護之聞知而虜悉巳}
  - {type: page-break, offset: 1263, content: '', id: KR3k0012_SBCK_770-7b}
