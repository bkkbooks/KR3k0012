  - {type: variant, offset: 2419, length: 88, content: 一山有水神人乘舡今有故漆舡也劉欣期交州記曰安定縣有越王銅舡潮退時有見者合浦四十里有潮陰雨日百姓樵採見銅舡出水上南州異物志曰外域人名舡曰舡大者長二十餘丈高去水三二丈望之如閣道載六, SBCK: 平御覽卷第}
