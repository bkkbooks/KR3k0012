  - {type: variant, offset: 932, length: 1, content: 楫, WYG: 鯨吞航脩鯢吐浪也舫說文曰舫併船吳書陸遜破曹休當還西陵公卿並為祖道上賜御船一舫繒綵舟也晉書曰王廙性雋率甞從南下旦自尋陽迅風飛帆暮至都倚舫樓長嘯神氣自逸梁書曰安成康王秀為江州刺史將發主者求堅船以為齋舫秀曰吾豈愛財而不愛士乃教以牢者給參佐下者載齋物既而遭風齋舫遂破舠釋名曰船三百斛曰舠舠貂也短也江南所名短而廣安不傾危也詩曰誰謂河廣曾不容舠舸王隠晉書曰顧榮徴侍中見王路塞絶便乗船而還過下邳遂解舫為單舸一日一夜行五六百里遂得免沈約宋書曰垣䕶}
