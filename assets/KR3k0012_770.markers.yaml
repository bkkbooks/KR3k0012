  - {type: variant, offset: 10, length: 2, content: 自關, SBCK: 大曰􅂳温麻五㑹者永寜縣出豫林合五板以爲大􅂳因以五㑹爲名也晨鳬即青桐大舡名諸葛恪所造鴨頭舡也預章㭠音銑􅀥木諸木皆以多曲理盤節爲堅勁也浩漂者言舡之在水如蓮花散落浮於川也武昌記曰樊口北有敗舶灣孫權嘗裝一舡名大舡容敵士三千人與羣臣泛舶中流值風起至樊口十里餘便敗故因名其處爲敗舶灣也戴延之西征記曰檀山凡去洛城水道五百三十里由新安澠池冝陽三樂三樂男女老劣未嘗見舡旣聞􅀳使溯流皆相引蟻聚川側俯仰傾􅀏越絶書曰闔閭見子胥敢問舩運之備何如對曰舩名大翼小翼突胃樓舡橋舡今舡軍之教北陵軍之法乃可用之大翼者當陵軍之車小翼者當陵軍之輕車突冐者當陵軍之衝車樓舡者當陵軍之行樓車也橋舡者當陵軍之輕足剽定􅀐也瑞應圖曰王者徳盛則金人下乗舡遊王後池郡國誌曰越州百塗山有石舡一丈禹所乗者宋元嘉中有人於舡側得䥫履一量一云有聖姑從海中乗舟張石㠶至此二物廟中有周時樂器名淳于銅作似鍾}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_SBCK_770-1b}
  - {type: variant, offset: 10, length: 2, content: 自關, WYG: 大曰船温庥五㑹者永寧縣出豫林合五板以為大船因以五㑹為名也晨鳬即青桐大船名諸葛恪所造鴨頭船也魏樟􅀈㭠音先􅀥木諸木皆以多曲理盤節為堅勁也浩漂者言船之在水如蓮花散落浮於川也武昌記曰樊口北有敗舶灣孫權甞裝一船名大船容敵士三千人與羣臣泛舶中流值風起至樊口十里餘便敗故因名其處為敗舶灣也戴延之西征記曰檀山凡去洛城水道五百三十里由親安澠池冝陽三樂三樂男女老㓜未甞見船既聞晉使溯流皆相引蟻聚川側俯仰傾笑越絶書曰闔閭見子胥敢問船運之備何如對曰船名大翼小翼突冒樓船橋船以船軍之教比陸軍之法乃可用之大翼者當陸軍之車小翼者當陸軍之輕車突胃者當陸軍之衝車樓船者當陸軍之行樓車也橋船者當陸軍之輕足驃騎也瑞應圖曰王者徳盛則金人下乗船遊王後池郡國誌曰越州白塗山有石船大禹所來乗者宋元嘉中有人於船側得鐡履一量一云有聖姑從海中乗舟張石帆至此二物廟中有周時樂器名淳于銅作似鐘}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_WYG_770-2a, image: WYG0899/WYG0899-0726c.png}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_WYG_770-2b, image: WYG0899/WYG0899-0726d.png}
  - {type: variant, offset: 10, length: 2, content: 自關, krp: 大曰船温麻五㑹者永寜縣出豫林合五板以爲大船因以五㑹爲名也晨鳬即青桐大舡名諸葛恪所造鴨頭舡也預章㭠音銑棗木諸木皆以多曲理盤節爲堅勁也浩漂者言舡之在水如蓮花散落浮於川也武昌記曰樊口北有敗舶灣孫權嘗裝一舡名大舡容敵士三千人與羣臣泛舶中流值風起至樊口十里餘便敗故因名其處爲敗舶灣也戴延之西征記曰檀山凡去洛城水道五百三十里由新安澠池冝陽三樂三樂男女老劣未嘗見舡旣聞晉使溯流皆相引蟻聚川側俯仰傾笑越絶書曰闔閭見子胥敢問舩運之備何如對曰舩名大翼小翼突胃樓舡橋舡今舡軍之教北陵軍之法乃可用之大翼者當陵軍之車小翼者當陵軍之輕車突冐者當陵軍之衝車樓舡者當陵軍之行樓車也橋舡者當陵軍之輕足剽定騎也瑞應圖曰王者徳盛則金人下乗舡遊王後池郡國誌曰越州百塗山有石舡一丈禹所乗者宋元嘉中有人於舡側得䥫履一量一云有聖姑從海中乗舟張石㠶至此二物廟中有周時樂器名淳于銅作似鍾}
  - {type: variant, offset: 13, length: 18, content: 東謂之舡自關而西或謂之舟方舟或謂之航, SBCK: 有頸映水用芒刜音弗則鳴}
  - {type: page-break, offset: 13, content: '', id: KR3k0012_SBCK_770-2a}
  - {type: variant, offset: 13, length: 2, content: 東謂, WYG: 有頸映水用芒刜音弗則鳴又曰硤州逺安縣江有狼尾灘有陸抗故城南有孤山袁山松為郡甞登以四望大江如索帶舟船如鳬雁焉又曰相州魏縣景穆寺西有遭官有石竇橋鳴鶴飛隼赤馬飛龍等舟西京雜記曰昆明池中有戈船樓船各數百艘樓船建樓櫓戈船建戈矛四角悉垂幡旄旌葆麾盖照灼涯涘又曰太液池中有鳴鶴舟容與舟清曠舟采菱舟說苑曰吳赤市使於知氏假道於衛寗文子具紵絺三百製將以送}
  - {type: page-break, offset: 13, content: '', id: KR3k0012_WYG_770-3a, image: WYG0899/WYG0899-0727a.png}
  - {type: variant, offset: 13, length: 18, content: 東謂之舡自關而西或謂之舟方舟或謂之航, krp: 有頸映水用芒刜音弗則鳴}
  - {type: variant, offset: 16, length: 7, content: 舡自關而西或謂, WYG: 大夫豹曰吳雖大國也不壤交假}
  - {type: substitution, offset: 16, original: 舡, replacement: 船, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19471}}
