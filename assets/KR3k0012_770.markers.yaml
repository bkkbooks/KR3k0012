  - {type: variant, offset: 1808, length: 610, content: 白蛇長三尺騰入舟中母呪曰若禎吉勿毒噬我及將還置諸房內一宿視之不復見蛇嗟而惜之韻集曰蠲鷁首天子舡也吳越春秋曰吳王僚二年使公子光伐楚以報前來誅慶封也吳師敗而亡舟光懼因復得王舟之而還又曰范蠡既滅吳乃乘扁舟出三江入五湖人莫知其所適郡國志曰濟州有浮山故老相傳云堯時大雨此浮水上時有人纜舡於巖石間今猶有斷鐵鎖吳時外國傳曰扶南國伐木為舡長者十二尋廣肘六尺頭尾似魚皆以鐵鑷露裝大者載百人人有長短襓及篙音高各一從頭至尾面有五十人作或四十二人隨舡大小立則用長撓坐則用短橈水淺乃用篙皆當上應聲如一杜蘭香別傳曰香降張碩碩既成婚香便去絕不來年餘碩舡行忽見香乘車於山際碩不勝驚喜遙往造香見香悲喜香亦有悅色言語頃時碩欲登其車其婢舉手排之嶷然山立碩復欲車前上車奴攘臂排之碩於是遂退續搜神記曰臨淮公荀序字休玄母華夫人憐愛過常年十歲從南臨歸經青草湖時正帆風駃音文十也序出塞郭上落水比得下帆已行數十里洪波淼漫母撫膺遠望少頃見一掘頭舡漁父以楫撥舡如飛載序還之云送府君還荀後位至常伯長沙相故云府君也又曰合肥口有大舶舡云是曹公舶舡常有漁人夜宿傍以舡繫之但聞箏絃之音又音氣非常漁人又夢人驅遣去云勿近官舡此人驚覺即移舡去相傳云曹公載數妓舡覆於此今猶存焉異苑曰扶南國治生皆用黃金僦舡東西遠近雇一斤時有不至所屆欲減金數舡主便作幻誑使舡底砥拆狀欲淪滯海中進退不動眾人驚怖還請賽舡合如初也又曰越雀門會無縣有元馬河有銅舫舡嵩陽記曰山東北五了山上有池池有破舟云禹乘來也三秦記曰俗云, SBCK: 橦雷舸}
