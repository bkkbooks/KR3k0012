  - {type: variant, offset: 159, length: 3, content: 作豫章, SBCK: 中有弋樹舡各數百艘舡上建樓櫓戈舡建戈矛四角迷垂幡音餌旌葆麾蓋照灼涯涘又曰太液池中有鳴鶴舟容與舟清曠舟採菱舟􅀃苑曰吴赤市使於知氏假道於衛寗文子具紵絺三百製將以送之大夫豹曰吴雖大國也不壤交假之道則亦敬矣又何禮焉寗文子不聽遂致之吴赤市至於知氏旣得事將歸吴智伯命造舟爲梁吴赤市曰吾聞天子濟于水造舟爲梁諸侯維舟爲梁大夫方舟臣之職也且敬太甚必有故使人視之則兵在後矣將以襲衛吴赤市曰衛假吾道而厚贈我我見難而不告是與爲謀也稱疾而留使人告衛衛人警戒智伯聞之乃止也列女傳曰趙簡子至河津津吏醉吏女乃持檝而前爲王掉舟餘具下檝門中江表傳曰孫權於武昌新裝}
