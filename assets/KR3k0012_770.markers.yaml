  - {type: 'tls:seg', offset: 17, content: '', id: KR3k0012_CHANT_770-1a.6}
  - {type: variant, offset: 24, length: 0, content: '', WYG: 道則亦敬矣又何禮焉甯文子不聴遂致之吳赤市至於知氏既得事將歸吳智伯命造舟為梁吳赤市曰吾聞天子濟於水造舟為梁諸侯維舟為梁大夫方}
  - {type: page-break, offset: 24, content: '', id: KR3k0012_WYG_770-3b, image: WYG0899/WYG0899-0727b.png}
