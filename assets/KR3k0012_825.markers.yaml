  - {type: punctuation, offset: 3938, content: 「, id: KR3k0012_CHANT_825-bkkpn1321}
  - {type: variant, offset: 3938, length: 0, content: '', SBCK: 食桑而吐絲前亂而後治夏生而惡暑疾温而惡雨蛹以爲母蛾以爲父三俯三起事乃大巳是謂􅅙理閔鴻􅅙賦曰體龍頸而驥喙邁皦素於羔羊左思呉都賦曰國稅再熟之稻郷貢八􅅙之綿古艶歌曰日出東方隅照我􅁗氏樓􅁗氏有好女自名爲羅敷羅敷善蠶桑採桑城南隅陸機詩曰老􅅙晚績縮老女晚嫁辱曽不如老䑕飜飛成蝙蝠蔡邕書曰家祖君常言客有三當死夜半蚕時至人室家也今者一行而犯其兩嵇康養生論曰火􅁞十八日寒􅅙三十餘日裴頠崇有論曰鳥無􅠛肺蛤無五藏蛭以空中而生􅅙以無􅠛而育也繰禮記􅀕義曰古之獻繭者其率用此與問者之辭及良日}
  - {type: page-break, offset: 3938, content: '', id: KR3k0012_SBCK_825-6b}
  - {type: variant, offset: 3938, length: 0, content: '', WYG: 食桑而吐絲前亂而後治夏生而惡暑疾濕而惡雨蛹以為母蛾以為父三俯而起事乃大已是謂蠶理閔鴻蠶賦曰體龍頸而􅂹啄邁皦素於羔羊左思吳都賦曰國稅再熟之稻鄉貢八蠶之綿古艶歌曰日出東南隅照我秦氏樓秦氏有好女自名為羅敷羅敷善蠶桑採桑城南隅陸機詩曰老蠶晩績縮老女晩見辱曽不如老䑕翻飛成蝙蝠蔡邕書曰家祖居常言客有三當死夜半蠶時至人室家也今者一行而犯其兩􅄞康飬生論曰火蠶十八日寒蠶三十餘日裴頠崇有論曰鳥旡胃肺蛤旡五臟蛭以空中而生蠶以旡胃而育也繰禮記祭義曰古之獻繭也其率用此與及良日}
  - {type: page-break, offset: 3938, content: '', id: KR3k0012_WYG_825-10a, image: WYG0900/WYG0900-0307a.png}
  - {type: page-break, offset: 3938, content: '', id: KR3k0012_WYG_825-10b, image: WYG0900/WYG0900-0307b.png}
  - {type: variant, offset: 3938, length: 0, content: '', krp: 食桑而吐絲前亂而後治夏生而惡暑疾温而惡雨蛹以爲母蛾以爲父三俯三起事乃大巳是謂蠶理閔鴻蠶賦曰體龍頸而驥喙邁皦素於羔羊左思呉都賦曰國稅再熟之稻郷貢八蠶之綿古艶歌曰日出東方隅照我秦氏樓秦氏有好女自名爲羅敷羅敷善蠶桑採桑城南隅陸機詩曰老蠶晚績縮老女晚嫁辱曽不如老䑕飜飛成蝙蝠蔡邕書曰家祖君常言客有三當死夜半蚕時至人室家也今者一行而犯其兩嵇康養生論曰火𧖟十八日寒蠶三十餘日裴頠崇有論曰鳥無􅠛肺蛤無五藏蛭以空中而生蠶以無􅠛而育也繰禮記祭義曰古之獻繭者其率用此與問者之辭及良日}
  - {type: variant, offset: 3939, length: 0, content: '', SBCK: 人繅三盆手遂布于三宫夫人丗婦之􅁻者使繅遂朱緑之玄黄之以爲黼黻文章服旣成君服以祀先王先公敬之至也三盆手者三淹也}
  - {type: page-break, offset: 3939, content: '', id: KR3k0012_SBCK_825-7a}
  - {type: variant, offset: 3939, length: 1, content: 凡, WYG: 人繅三盆手遂布于三宫夫人世婦之吉者使繅遂朱緑之𤣥黄之以為黼黻文章服既成君服以事先王先公敬之至也説文曰繰繹繭出絲也尸子曰夫繭合而弗治則腐蠧而棄使女工繰之以為美錦列仙𫝊曰園客蠶得繭大如甕繰一繭數十日繰訖俱去莫知所如濟陽今有華蠶祠繀車通俗文曰織纎謂之繀受緯曰孚方言曰繀車趙魏之間謂之厯鹿車東齊海岱之間謂之道軌孫得施繀車賦曰惟工藝之多門偉英麗乎創形擬老氏之轉轂兮應天運以迴行秉轉屈以成規兮不辭勞以自傾故其用同造物功叅天地軒轅垂衣因之以濟衮冕龍旂用康上帝勲存王室惠流皂𨽻觀夫微風興於輪端霧雨散於梭輻制以靈木絡以竒竹危朝日以投員兮准暈月以造象若洪輪之在雍兮似蜘蛛之結網爾乃才藝妻妾工巧是嘉或成綿組或匹綾羅舒皓腕於輕輪兮􅀈擬景乎鏡華絲成妙於指端兮號推幽而相和象蟋蟀之鳴户兮類寒蟬之吟家籰方言曰籰榬也兖豫河濟之間謂之榬説文曰籰取絲者也或作􅀈從角間聲絡車方言曰河濟之間絡謂之格柅易垢卦曰繫於金柅通俗文曰張絲曰柅也説文曰檷絡絲檷從木爾聲讀若柅機杼毛詩國風大東曰小東大東杼軸其空字林曰女渉切機下所履史記公儀休相魯見布好出家婦燔其機列女𫝊曰河南真義者樂羊子之妻也羊子出學後得遺金一餅以與真義曰妾聞君子不以利洿行反裘負薪古}
