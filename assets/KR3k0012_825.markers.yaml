  - {type: variant, offset: 328, length: 223, content: 之依稼穡農夫之艱難事先知之乃謀逸豫則知小人之所依怙相小人厥父母勤勞稼穡厥子乃不知稼穡之艱難乃逸乃諺既誕否則侮厥父母曰昔之人無聞知小人之子既不知父母之勞乃為逸豫遊戲乃叛諺不恭己欺誕父母不欺則輕侮其父母曰古老之人無所聞知物理論曰穡猶收也古今之言云爾稼農之末農本輕而末重前緩而後急稼欲少苦耨欲熟收欲速此良農之務桾毛詩大田曰彼有不穫穉此有不歛穧彼有遺秉此有滯穗伊寡婦之利秉把也成王之時百穀既多種同齊熟收刈促遽力皆不足而有不穫不歛遺秉滯德故聽矜寡取之以為利, SBCK: 助蠶瑇瑁􅁫簪珥}
