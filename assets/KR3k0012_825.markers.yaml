  - {type: variant, offset: 3911, length: 4, content: 崑崙山第, SBCK: 呉黄武三年遣交州治中吕瑜發趙嬰齊􅃁得金􅁞曰珠各數斛廣志曰有原􅁞有冬􅅙有野􅅙有柞􅅙食柞葉可以作綿崔贑易林兊之坎曰飢􅅙作室緒多亂纒端不可得又震之說曰秋􅅙不成冬種不生龍魚河圖曰􅅙沙宅亥地大富得􅁞絲吉利仲長子昌言曰北方寒其人壽南方暑其人夭此寒暑之方驗於人也約之􅅙也寒而餓之則引日多温而飽之則用日少此寒温飢飽之爲脩短驗於物者也物理論曰使人主養民如􅅙母之養􅅙則其用豈徒絲􅅙而已哉雜五行書曰含南種􅀥九株辟縣官冝蠶桑又曰}
  - {type: page-break, offset: 3911, content: '', id: KR3k0012_SBCK_825-6a}
  - {type: variant, offset: 3911, length: 1, content: 崑, WYG: 員}
  - {type: variant, offset: 3911, length: 4, content: 崑崙山第, krp: 呉黄武三年遣交州治中吕瑜發趙嬰齊冡得金𧖟曰珠各數斛廣志曰有原𧖟有冬蠶有野蠶有柞蠶食柞葉可以作綿崔贑易林兊之坎曰飢蠶作室緒多亂纒端不可得又震之說曰秋蠶不成冬種不生龍魚河圖曰蠶沙宅亥地大富得𧖟絲吉利仲長子昌言曰北方寒其人壽南方暑其人夭此寒暑之方驗於人也約之蠶也寒而餓之則引日多温而飽之則用日少此寒温飢飽之爲脩短驗於物者也物理論曰使人主養民如蠶母之養蠶則其用豈徒絲蠶而已哉雜五行書曰含南種棗九株辟縣官冝蠶桑又曰}
  - {type: variant, offset: 3912, length: 1, content: 崙, WYG: 嶠}
  - {type: variant, offset: 3914, length: 1, content: 第, WYG: 一名環丘有氷蠶長七寸黒色有角有鱗以霜雪覆之然後作繭長一尺其色五彩織為文錦入水不濡投火則經宿不燎海人獻堯以為黼黻家訓曰北人見錦不信有蟲食樹吐絲所成者在江南不信有千人氈帳及來河北不信有萬石舟船皆實騐也齊諧記曰正月有神降陳氏宅云我是蠶神能見祭當令蠶百倍今人正月半作餻糜為此也皇后親蠶儀注曰皇后躬桑始捋一條執筐受桑捋三條女尚書跪白曰可止執筐者以桑授蠶母蠶母以桑適蠶室也先蠶儀注曰親蠶前}
