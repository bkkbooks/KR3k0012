  - {type: variant, offset: 3903, length: 1, content: 從, krp: 先𧖟儀注曰親蠶前三日太祝令質明以太牢祠先蠶也周遷古今輿服雜事曰蠶始生后食之三灑而止三輔故事曰始皇后葬用金蚕二十箔玄中記曰大月支有牛名爲日及今日割取其肉三四斤明日瘡愈漢人入此國以牛示之以爲珍異漢人曰吾國有虫大小如指名爲蠶食桑葉爲人吐絲外國人不復信有蠶也又曰化民食桑三七年化能以自裹如𧖟績九年生翼七年而死去琅耶四萬里神異經同林邑記曰九眞郡蠶年八熟繭小輕薄絲弱綿細永嘉郡記曰永嘉有八軰蠶􅮤珍蠶三月績柘蠶四月𥘉績􅮤蠶四月𥘉績愛珍五月績愛蠶六月未績寒珍七月未績四出蠶九月𥘉績寒蠶十月績凡蠶再養者前軰皆謂之珍少飬之愛蠶者故􅮤蠶種也􅮤珍三月旣績出蛾取卵七月八月便割𧖟生多養之是爲􅮤蠶欲作愛者取􅮤珍之卵藏内瓮器中隨器大小亦可十𥿄百𥿄盖覆器}
  - {type: variant, offset: 3905, length: 5, content: 甫聲拾遺錄, SBCK: 安冷水使冷氣折其出􅀔僅得三七日然後劄生養之謂爲愛珍亦愛子績成繭蛾生􅆑􅆑七日又剖成􅅙多養之此則愛􅅙也頋微廣州記}
  - {type: variant, offset: 3905, length: 5, content: 甫聲拾遺錄, krp: 安冷水使冷氣折其出勢僅得三七日然後劄生養之謂爲愛珍亦愛子績成繭蛾生卵卵七日又剖成蠶多養之此則愛蠶也頋微廣州記}
