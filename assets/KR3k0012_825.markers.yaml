  - {type: variant, offset: 1484, length: 145, content: 吳祐遷膠東侯相時戴宏父為縣丞宏年十六從在承舍祐每行園常聞諷讀之音奇而候之亦與為友宏卒成儒宗知名東夏為河間相因自免歸家不復仕身灌園蔬以經書教授年九十八卒又曰中平二年造萬金堂於西園獻帝春秋曰呂布問太祖明公何瘦太祖曰君何以識孤布曰昔在洛會浸氏園太祖曰然孤忘之矣所以瘦者不早相得故也魏略曰顏斐為京兆, SBCK: 南陽范充爲呉桂陽}
