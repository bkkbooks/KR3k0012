  - {type: variant, offset: 3916, length: 20, content: 層下有芝田蕙圃皆數萬頃群仙種耨焉曹植籍田, SBCK: 月上壬取土泥屋四角冝􅁞􅁻吕氏夲草曰石􅁞一名沙蜯神農雷公醎無毒生漢中治五淋破隨肉解結氣利水道除􅀬孫卿􅅙}
  - {type: variant, offset: 3916, length: 2, content: 層下, WYG: 日太祝令質明以少牢祠所謂先蠶也古今輿服雜事曰蠶始生后食之三灑而止三輔故事曰始皇后葬用大蠶二十箔𤣥中記曰大月支}
  - {type: variant, offset: 3916, length: 20, content: 層下有芝田蕙圃皆數萬頃群仙種耨焉曹植籍田, krp: 月上壬取土泥屋四角冝𧖟吉吕氏夲草曰石𧖟一名沙蜯神農雷公醎無毒生漢中治五淋破隨肉解結氣利水道除熱孫卿蠶}
  - {type: variant, offset: 3919, length: 4, content: 芝田蕙圃, WYG: 牛名為日及今日割取其肉三四斤明日瘡愈漢人入此國見牛不知以為珍異漢人曰吾國有蟲大如小指名為蠶食桑葉為人吐絲外國人不復信有蠶也又曰化民食葉三七年化能以自裹如蠶績九年生翼十年而死去琅琊四萬里林邑記曰九真郡蠶年八熟繭小輕薄絲弱綿細永嘉郡記曰永嘉有八輩蠶蚖珍蠶三月績柘蠶四月初績蚖蠶四月績愛珎五月績愛蠶六月末績寒珍七月末績四出蠶九月初績寒蠶十月績凡蠶再熟者前輩}
  - {type: page-break, offset: 3919, content: '', id: KR3k0012_WYG_825-8a, image: WYG0900/WYG0900-0306a.png}
  - {type: punctuation, offset: 3923, content: ，, id: KR3k0012_CHANT_825-bkkpn1314}
  - {type: 'tls:seg', offset: 3923, content: '', id: KR3k0012_CHANT_825-63a.4}
  - {type: variant, offset: 3924, length: 0, content: '', WYG: 謂之珍少飬之愛蠶者故蚖蠶種也蚖繭三月既績出蛾取卵七日八日便剖蠶生多飬之是謂蚖蠶欲作愛者取蚖珎之卵藏内瓮器中隨器大小亦可十紙百紙盖覆器口安冷水使冷氣折其出勢僅得三七日然後剖生飬之謂為愛珎亦愛子績成繭蛾生卵卵七日又剖成蠶多飬之此則愛蠶也顧㣲廣州記曰吳黄武三年遣交州治中吕瑜發趙嬰齊冡得金蠶明珠各}
  - {type: page-break, offset: 3924, content: '', id: KR3k0012_WYG_825-8b, image: WYG0900/WYG0900-0306b.png}
  - {type: variant, offset: 3925, length: 4, content: 萬頃群仙, WYG: 斛廣志曰有原蠶有冬蠶有野蠶有柞葉可以柞綿焦贛易林兊之坎曰飢蠶作室緒多亂􅅶端不可得又震之兊曰秋蠶不成冬}
