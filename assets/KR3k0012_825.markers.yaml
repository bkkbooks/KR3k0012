  - {type: variant, offset: 3930, length: 6, content: 耨焉曹植籍田, WYG: 不生魚龍河圖曰蠶沙宅亥地大富得蠶絲吉利仲長子昌言曰北方寒其人夀南方暑其人夭此寒暑之方騐於人也均之蠶也寒而餓之則引日多温而飽之則用日少此寒温餓飽之為修短騐於物者也物理論曰使民主飬民如蠶母之飬蠶則其用豈徒絲而已哉雜五行書曰南舍種􅀥九株辟縣官宜蠶桑又曰二月上壬取土泥屋四角宜蠶吉吕氏本草曰石蠶一名沙蜂神農雷公鹹無毒生漢中治五淋墮胎肉解結氣利水道除熱孫卿蠶}
