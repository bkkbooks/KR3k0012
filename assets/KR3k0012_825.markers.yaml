  - {type: variant, offset: 151, length: 176, content: 此刈甚快雲曰三時之務亦甚勤勞願殿下知稼穡之艱難無徇一朝之宴逸也文惠改容謝之虞喜志林說晏子曰景公為長府有風猶作不已晏子歌曰禾有穗兮不得穫秋風至兮盡零落歌終而流涕公乃止之穡說文曰穡穀可收也愛澀也尚書大誥曰予永念曰天惟喪殷若穡夫子曷敢不終朕畝稼穡之夫除草養苗我長念天亡殷惡亦主猶是矣我何敢不順天終竟我壟畝乎又無逸周公曰嗚呼君子所其無逸先知稼穡之艱難乃逸則知小, SBCK: 貴}
