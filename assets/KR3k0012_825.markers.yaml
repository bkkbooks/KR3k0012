  - {type: variant, offset: 3868, length: 2, content: 崑崙, WYG: 季春后妃齊戒東鄉親桑省婦使勸蠶事又曰蠶食而不飲三十日而化又曰食桑者有絲而蛾又曰蠶食而不飲又曰蠶餌絲而商弦絶淮南萬畢術曰白芳七結浴蠶又曰僵蠶使馬不食抱朴子曰始以藥粉桑長蠶蠶得十月不死金樓子曰楊泉賦序曰古人作賦者多矣而獨不賦蠶乃為蠶賦是何言與楚蘭陵荀况有蠶賦近不見之有文不如無述也東方朔别𫝊曰武帝求神仙朔言能上天取藥上知其謾欲極其言即遣方士與朔上天朔曰當有神來迎我後方士晝卧遽口呼若極真者五從天上還方士遂以聞上以為面欺下朔獄泣曰臣幾死者再天公問臣下方何衣朔曰衣蠶蠶若何曰啄呥類馬色班班類虎天公大怒以臣為謾繫臣司空使使下問還報有之乃出臣今陛下以臣為詐願使使上問之上曰齊人多詐欲以喻我止方士也罷方士東方朔占曰正月旦竟日不風清明冝蠶列仙𫝊曰園客濟陽人姿貌好而性良邑人多以女妻之客終不娶種五色香草積數十年服食其實一旦五色蛾止其香樹末客收而薦之以布生華蠶焉時有女夜至自稱客妻客與俱蠶得繭大如甕郭子横洞冥記曰寒青之國其國人皆以烏為衣其地多有蠶色青長一丈亦曰青蠶績其絲大如指一絲可以羈絆牛馬國人常以十丈繫黄門之廐以拘馬也巨象獅子常令以此一絲繫之古今註曰和帝永元四年東莱郡東牟}
