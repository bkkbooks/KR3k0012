  - {type: variant, offset: 17, length: 4, content: 歲聿云暮, SBCK: 是月也蠶事旣登后妃獻繭乃収繭稅以桑爲均貴賤長㓜如一以給郊廟之服后妃献繭進其成功也乃収繭税十而取一以桑爲均者謂用桑多則繭多桑少則繭少貴賤長㓜如一各自以桑爲不得以人貴賤長㓜爲差又檀弓曰成人有其兄死而不爲衰者聞子臯將爲成宰遂爲衰成人曰蠶則績而蟹有匡范則冠而蟬有緌兄則死而子臯爲之衰􅃖兄死者言其衰之不爲兄死如蟹有匡蟬有緌不爲蚕之績范之冠也范蜂也蟬蜩也緌謂蜩啄長在腹下又􅀕義曰古者天子諸侯必有公桑􅁞室近川而爲之築宫仞有三尺􅁄牆而外閉之及大昕之朝君皮弁素積卜三宫之夫人丗婦之􅁻者使入􅁞室奉種浴于川桑于公桑風戾以食之大盺季春朔月之朝也諸侯夫人三宫半王后也風戾之者及早凉脆}
  - {type: page-break, offset: 17, content: '', id: KR3k0012_SBCK_825-1b}
  - {type: variant, offset: 17, length: 15, content: 歲聿云暮采蕭穫菽又周頌良耜曰穫, WYG: 蠶陽者火火惡水故食不飲桑者土}
