  - {type: variant, offset: 3886, length: 2, content: 淮江, SBCK: 尔馬而欲人爲婦自取屠剥何如言未竟皮蹷然起卷女而行父還失女後大樹枝得女及皮乃盡化爲蠶績於樹上其繭厚大異於常蠶隣婦取養之其収二倍今丗或謂􅁞爲女兒古之遺語也拾遺録曰貟嶠}
  - {type: variant, offset: 3886, length: 2, content: 淮江, WYG: 爾馬而欲人為婦自取屠剥何如言未竟皮蹷然起巻女而行父還失女從大樹枝得女及皮乃盡化為蠶棲於樹上其繭厚大異於常蠶隣婦取飬}
  - {type: variant, offset: 3886, length: 2, content: 淮江, krp: 尔馬而欲人爲婦自取屠剥何如言未竟皮蹷然起卷女而行父還失女後大樹枝得女及皮乃盡化爲蠶績於樹上其繭厚大異於常蠶隣婦取養之其収二倍今丗或謂𧖟爲女兒古之遺語也拾遺録曰貟嶠}
