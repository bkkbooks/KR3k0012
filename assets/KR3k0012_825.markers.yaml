  - {type: variant, offset: 3942, length: 4, content: 為圃各植, SBCK: 學一年復歸貞義引刀趣機曰此織生於􅁞桑治於絲繭加之機杼一絲而累以至丈尺今􅀂断之損弃成功稽廢日月夫子積學當日知所無中而廢歸何異斷機哉羊子大慙復出七年不歸列子曰紀昌者學射於飛衛曰尔先學不瞚而後可言射矣紀昌歸偃坐}
  - {type: page-break, offset: 3942, content: '', id: KR3k0012_SBCK_825-8b}
  - {type: variant, offset: 3942, length: 0, content: '', WYG: 恥樂羊子慚而去之學一年復歸真義引刀趣機曰此織生於蠶桑治於絲繭加於機杼一絲而累以至丈疋今若斷之捐棄成功稽廢日月夫子積學當日知所旡中而廢歸何異斷機哉羊子大慚復出七年不歸列子曰紀昌者學射於飛衛曰爾先學不瞑而後可言射矣紀昌歸偃卧其妻之機下以自承牽挺牽挺機躡二年之後雖未到家而不瞑也淮南子曰伯余之初作衣也伯余黄帝臣也緂麻索縷手經指柱後世}
