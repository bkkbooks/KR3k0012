  - {type: variant, offset: 556, length: 265, content: 桓榮遭倉卒與族人元卿俱捃拾投閑輒講元卿謂曰卿但盡氣耳當復有施用時乎後榮為太常諸子謂元卿曰平生笑吾盡氣今何如元卿曰我農家安能豫知此魏略曰焦先行不踐邪徑必循阡陌及其捃拾不失大穗飢不可食寒不可衣結草以為蓑裳被頭徒跣每出見婦人則隱翳須去乃出王隱晉書曰庾袞字叔褒年飢捃者猶殷袞乃引其群子以退曰待其間既桾焉從者以為徒捃也捃無傍掇晉書曰夏統字仲御幼孤貧養親以孝聞每探捃求食星行夜歸或至海邊拘蟛蚎以資養宋書曰沈道虔居武康北石山下常以捃拾自資同捃者或爭穟道虔諫之不止悉以其所得與之爭者愧惡後每事輒云勿令居士知庾異行別傳曰君妻樂氏生子澤初君與妻捃而產, SBCK: 明徳馬后置織室􅁞}
  - {type: variant, offset: 556, length: 96, content: 桓榮遭倉卒與族人元卿俱捃拾投閑輒講元卿謂曰卿但盡氣耳當復有施用時乎後榮為太常諸子謂元卿曰平生笑吾盡氣今何如元卿曰我農家安能豫知此魏略曰焦先行不踐邪徑必循阡陌及其捃拾不失大穗飢不可食寒不可衣結草, WYG: 明徳馬皇后置織室蠶於濯龍宫中數往來觀内}
  - {type: variant, offset: 556, length: 265, content: 桓榮遭倉卒與族人元卿俱捃拾投閑輒講元卿謂曰卿但盡氣耳當復有施用時乎後榮為太常諸子謂元卿曰平生笑吾盡氣今何如元卿曰我農家安能豫知此魏略曰焦先行不踐邪徑必循阡陌及其捃拾不失大穗飢不可食寒不可衣結草以為蓑裳被頭徒跣每出見婦人則隱翳須去乃出王隱晉書曰庾袞字叔褒年飢捃者猶殷袞乃引其群子以退曰待其間既桾焉從者以為徒捃也捃無傍掇晉書曰夏統字仲御幼孤貧養親以孝聞每探捃求食星行夜歸或至海邊拘蟛蚎以資養宋書曰沈道虔居武康北石山下常以捃拾自資同捃者或爭穟道虔諫之不止悉以其所得與之爭者愧惡後每事輒云勿令居士知庾異行別傳曰君妻樂氏生子澤初君與妻捃而產, krp: 明徳馬后置織室𧖟}
