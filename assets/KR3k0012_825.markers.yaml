  - {type: variant, offset: 3875, length: 2, content: 地滿, WYG: 自棄其蠶中華古今注曰太古時有人逺征家惟有一女并馬一疋女思父戯馬曰爾能為我迎得父吾將嫁汝馬乃絶韁而去至父所父疑家中有故乗馬而還馬後見女輙怒而奮擊父怪}
