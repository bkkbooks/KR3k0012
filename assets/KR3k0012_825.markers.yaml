  - {type: variant, offset: 3890, length: 0, content: '', SBCK: 名環丘有冰􅁞長七寸黒色有角有鱗以霜雪覆之然後作繭長一尺其色五綵織爲文錦入水而不濡投火則經􅀫不燎海人獻堯以爲黼黻顔氏家訓曰胡人見錦不信有虫食樹吐絲所成昔在江南不信有千人氈帳及來河北不信有萬石舟舡皆}
  - {type: variant, offset: 3890, length: 0, content: '', krp: 名環丘有冰𧖟長七寸黒色有角有鱗以霜雪覆之然後作繭長一尺其色五綵織爲文錦入水而不濡投火則經宿不燎海人獻堯以爲黼黻顔氏家訓曰胡人見錦不信有虫食樹吐絲所成昔在江南不信有千人氈帳及來河北不信有萬石舟舡皆}
