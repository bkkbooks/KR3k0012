  - {type: variant, offset: 3903, length: 1, content: 從, SBCK: 先􅁞儀注曰親蠶前三日太祝令質明以太牢祠先蠶也周遷古今輿服雜事曰蠶始生后食之三灑而止三輔故事曰始皇后葬用金蚕二十箔􅀇中記曰大月支有牛名爲日及今日割取其肉三四斤明日瘡愈漢人入此國以牛示之以爲珍異漢人曰吾國有虫大小如指名爲蠶食桑葉爲人吐絲外國人不復信有蠶也又曰化民食桑三七年化能以自裹如􅁞績九年生翼七年而死去琅耶四萬里神異經同林邑記曰九眞郡蠶年八熟繭小輕薄絲弱綿細永嘉郡記曰永嘉有八軰􅅙􅮤珍􅅙三月績柘􅅙四月􅀄績􅮤􅅙四月􅀄績愛珍五月績愛􅅙六月未績寒珍七月未績四出􅅙九月􅀄績寒􅅙十月績凡􅅙再養者前軰皆謂之珍少飬之愛􅅙者故􅮤蠶種也􅮤珍三月旣績出蛾取􅆑七月八月便割􅁞生多養之是爲􅮤􅅙欲作愛者取􅮤珍之􅆑藏内瓮器中隨器大小亦可十􅁓百􅁓盖覆器}
  - {type: page-break, offset: 3903, content: '', id: KR3k0012_SBCK_825-5b}
