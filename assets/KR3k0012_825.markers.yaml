  - {type: variant, offset: 3, length: 3, content: 四穫說, SBCK: 五蠶繰繀車籰絡車柅機杼梭蠶周禮天官下内宰曰中春詔后帥外内命婦始蠶于北郊以爲􅀕服蚕于北郊婦人以純隂爲尊郊必有公桑蚕室焉又夏官馬質曰馬質掌質馬禁原􅁞者原􅄪也天}
  - {type: variant, offset: 3, length: 3, content: 四穫說, WYG: 五蠶繰繀車籰絡車柅機杼梭蠶周禮天官下内宰曰中春詔后帥外内命婦治蠶于北郊以為祭服夏官馬質曰馬質掌質馬禁原蠶禮記月令曰季春曰是月也命有司無伐桑柘乃修蠶器后妃齊戒享先蠶而躬桑以勸蠶事又孟夏曰是月也蠶事既登后妃獻繭乃收繭税以桑為均貴賤長幼如一以給郊廟之服檀弓曰成人有其兄死而不為衰者聞子臯将為成宰遂為衰成人曰蠶則績而蠏有匡范則冠而蝉有緌兄則死而子臯為之衰祭義曰古者天子諸侯必有公桑蠶室近川而為之築宫仞有三尺棘墻自外閉之及大昕之朝君皮弁素積卜三宫之夫人世婦之吉者使入蠶室奉種浴於川桑於公桑風戾以食之嵗既單矣世婦卒蠶奉繭以示于君遂獻繭于夫人祭統曰是故天子親耕于南郊以供齊盛王后蠶于北郊以供純服諸侯耕于東郊以供齊盛夫人蠶于北郊以供冕服天子諸侯非莫耕也王后夫人非莫蠶也春秋}
