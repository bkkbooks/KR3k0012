  - {type: variant, offset: 2962, length: 901, content: 務得其前利不顧其後之有患也吳王曰善哉乃罷兵風俗通曰園援也從口袁聲四皓園公亦本園者玄晏春秋曰又好桑農種藏之事且養雞鶩園圃之事懃不舍力焉王子年拾遺記曰漢明帝時常山獻巨桃核此桃霜下結花隆暑方熟亦云仙人所食常使植於霜園此園皆植寒果也又曰魏明帝起靈禽之園方國所獻異鳥獸皆畜此園也世說曰王子敬入會稽經吳聞顧辟彊有名園先不識主人徑往其家顧方集賓友酣宴園中而王遊歷既畢指麾好惡傍若無人又曰簡文幸華林園顧謂左右曰會心處不必在遠醫然林水便自有濠梁間想覺鳥獸自來親人又曰管寧華歆共園中鋤菜見地片金管不釋鋤與瓦石不異華投而擲之向秀別傳曰向秀常與嵇康偶鍜於洛邑與呂安灌園於山陽收其餘利以供酒食之費桂陽先賢贊白蘇躭常聞夜有眾賓來躭告母曰人招躭去已種藥著後園梅樹下治百病一葉愈一人賣此藥過足供養仇池記曰城東有首蓿園園中有三水碓三秦記曰漢武帝名園曰樊川一名御宿有大梨如五升名含消又曰漢武帝菓園有大栗十五枚一升華陽國志曰何隨家養竹園人盜其筍隨過行見恐盜者覺怖走竹傷其足挈履徐步歸幽明錄曰武宣程羈偏生未被舉家常使種葱後連理樹生於園圃殷仲堪遊園賦曰爾乃杖策晨遊以詠以吟落葉掩蹊菓下成林曹植詩曰公子敬愛客終宴不知疲清夜遊西園飛蓋相追隨劉謐之天公牋曰昔申酉之際遭湯旱流煙今子歲值堯水滔天火延燒其廬水突壞其園謝玄與姊書曰比二日東行遊步園中已極有任家湖形摸也姊想矚此亦小有所散圃說文曰種菜曰圃毛詩雞鳴曰東方未明折柳樊圃狂夫瞿瞿又七月曰九月築場圃十月納禾稼周禮地官下曰場人掌國之場圃而樹之果蓏珍異之物以時斂而藏之果棗李之屬蓏瓜瓠之屬珍異蒲桃枇杷之屬禮記射義曰孔子射於矍相之圃觀者如堵牆左傳莊公曰子穨有寵蒍國為之師及惠王即位取蒍國之圃以為囿圃園也囿苑也遂奉子頹以代王又僖公下曰秦師襲鄭鄭使皇武子辭曰鄭之有原圃猶秦之有具圃也又哀公下曰衛侯為虎幄於籍圃於籍田之圃新造幄幕時以虎獸為飾也論語曰樊遲請學為圃子曰吾不如老圃莊子曰古之人假道於仁託宿於義於遊逍遙之廬食於荀簡之田立於不貸之圃逍遙無為也茍簡易養也不貸無出也古謂是采真之遊韓子曰景公欲移晏子家於豫章之圃晏子辭孟子曰今有場師舍其梧檟養其樲棘則為賤場師也場師治圃者梧檟皆大名樲棘酸棗言此以喻人捨大養小始賤場師, SBCK: 賁育}
