  - {type: variant, offset: 12, length: 4, content: 毛詩小雅, SBCK: 命有司無伐桑柘愛蚕食有司謂主山林之官乃修蠶器蚕器謂簿槌鈳筐之􅁼后妃齊戒享先蠶而躬桑以􅂆蠶事季春􅁻祀皇后享先蚕先蚕天駟享先蚕而後躬桑示率先天下也又孟夏}
  - {type: variant, offset: 12, length: 4, content: 毛詩小雅, krp: 命有司無伐桑柘愛蚕食有司謂主山林之官乃修蠶器蚕器謂簿槌鈳筐之類后妃齊戒享先蠶而躬桑以勸蠶事季春吉祀皇后享先蚕先蚕天駟享先蚕而後躬桑示率先天下也又孟夏}
