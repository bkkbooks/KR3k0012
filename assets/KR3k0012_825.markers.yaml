  - {type: variant, offset: 654, length: 155, content: 蓑裳被頭徒跣每出見婦人則隱翳須去乃出王隱晉書曰庾袞字叔褒年飢捃者猶殷袞乃引其群子以退曰待其間既桾焉從者以為徒捃也捃無傍掇晉書曰夏統字仲御幼孤貧養親以孝聞每探捃求食星行夜歸或至海邊拘蟛蚎以資養宋書曰沈道虔居武康北石山下常以捃拾自資同捃者或爭穟道虔諫之不止悉以其所得與之爭者愧惡後每事輒云勿令居士知庾異行別傳曰君妻, WYG: 娛}
