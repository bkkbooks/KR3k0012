  - {type: variant, offset: 2050, length: 309, content: 里竹林花藥之美公家園竹不能及又曰沈道虔居武康北石山下有人竊園中菜道虔自外還見之即自逃隱待竊者去後乃出齊書曰會稽孔珪家起園列植桐柳多構山泉殆窮真趣衡陽王鈞往遊之珪曰殿下處朱門遊紫闥詎得與山人交耶荅曰身處朱門而情遊江海形入紫闥而意在青雲珪大美之又曰豫章王嶷薨後嘗見形於第後園乘腰輿指麾處分呼直兵直兵無手板左右授一玉手板與之謂曰橘樹一株死可覔補之因出後園梁書曰徐勉為書式其子崧曰中年聊於東田間營小園者非存播藝以要利正欲穿池種樹少寄情賞爾又以郊除閑曠終可為宅儻獲懸車致事實欲歌哭於斯又曰劉慧斐隱居東林寺又於山北構園一所號曰離垢園時人仍謂為離垢先生燕書曰愍帝時有異爵素質綠首集于端門東園樹棲翔二旬而去夏以異爵故大赦名東園曰白爵園, SBCK: 歳蠶八績}
