  - {type: variant, offset: 822, length: 647, content: 澤遂以命之架釋名曰架加也加杖於柄頭以撾穗而出穀也或曰羅架三文而用之或曰以杖轉於頭故名之也廣雅曰拂謂之架說文曰拂架也拂擊禾連架也國語曰權節其用耒耜耞芟耞拂也所以擊草方言曰僉宋魏之間謂攝殳或謂之度自關而西謂之拂僉連架也所以打穀王褒僮約曰刻木為架屈竹作把架擊禾也園說文曰園所樹菓也易賁卦曰賁于丘園束帛戔戔毛詩車鄰駟驖美襄公也始命有田狩之事園囿之樂焉始命命為諸侯也秦始附庸也遊于北園四馬既閑閑習也又國風將仲子兮曰將仲子兮無踰我園無折我樹檀園所以樹木也檀強刃之木又小雅鶴鳴曰樂彼之園爰有樹檀其下維蘀何樂於彼園之觀乎蘀落也上其樹檀下其蘀周禮天宮太宰九職二曰園囿毓草木鄭注云園蕃也史記曰董仲舒廣川人以治春秋當孝景時為愽士下帷講誦三年不觀於舍園漢書梁孝王傳曰王有罪入朝乘布車從兩騎入匿長公主園張晏曰布車喪人乘之也又曰田蚡召客飲坐其兄蓋侯北向自坐東向以為漢相尊不可以兄私撓由此滋驕治宅第田園極膏腴市買郡縣器物相屬於道後漢書曰竇憲恃宮掖聲勢遂以賤直請奪沁水公主園田沁水公主明帝女主逼畏不敢計後肅宗駕出過園指以問憲憲陰喝不得對陰喝猶壹塞也陰音於禁反喝音一介反或作鳴故反後發覺帝大恕召憲切責曰深思前過主田園時何用愈趙高指鹿為馬愈猶差也久念使人驚怖昔永平中常令陰愽鄧疊二人更相紏察以陰鄧皆外戚恐其踰多故使更相紏察也愽陰興之子也故諸豪戚莫敢犯法者而詔書切切猶以舅氏田宅為言切切猶勤勤今貴主尚見枉奪何況小人哉國家棄憲如孤雛腐鼠鳥子生而啄者曰雛也憲大震懼皇后為毀服深謝良久乃得解使以田還主雖不繩其罪然亦不授以重任續漢書百官志曰, SBCK: ''}
