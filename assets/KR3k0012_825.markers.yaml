  - {type: variant, offset: 3868, length: 2, content: 崑崙, SBCK: 季春后妃齋戒東郷就桑省婦使觀蠶事又曰蠶食而不飲三十日而化又曰食桑者有絲而蛾又曰蠶食礜而不飲又曰蠶餌絲而啇􅃶絶啇絃金聲也春蚕吐絲金死故絶星墜而渤海决星流星也勃海水之勃怒也又曰原蠶一􅀊再登非不利也然王法禁之者以其殘桑淮南方畢術曰白芳七結浴蠶又曰僵蠶使馬不食欲愈之以桑拭口􅈹即食矣馬喜齧人亦以僵蠶眉拭脣即不齧也抱朴子曰甘始以藥粉桑長蠶蠶得十月不老金樓子曰楊泉蠶賦序曰古人作賦者多矣而獨不賦􅅙乃爲蠶賦是何言歟楚蘭陵荀如有蠶賦德淵近不見之有文不如無􅄒也東方朔別傳曰武帝求神仙朔言能上天取藥上知其謾欲極其言即遣方士與朔上天朔曰當有神來迎我後方士晝卧朔遽口呼􅀂極眞者吾從天上還方士遽以聞上以爲靣欺下朔獄朔泣曰臣幾死者再天公問臣下方何衣朔曰衣􅁞蠶何􅀂曰啄呥呥仁廉切􅀋馬色班班􅀋虎天公大怒以臣爲謾繫臣司空使使下問還報有之乃出臣今陛下以臣爲詐願使使上問之上曰齊人多詐欲以喻我我止方士也罷方士東方朔占曰正月旦竟日不風清明冝蠶列仙傳曰園客濟陽人姿皃好而良邑人多欲以女妻之客終不娶種五色香草積數十年服食其實一旦五色蛾止其香末客収而薦之以布生桑蠶焉蠶時有女夜至自稱客妻客與俱蠶得繭大如盆郭子横洞冝記曰寒青之國其國人皆以鳥爲衣其地多霜雪隂翳忽見日從南方出則百獸皆鳴國俗以爲祥異有蠶色青長一丈亦曰青􅁞績其絲大如指一絲可羈絆牛馬國人常以十丈充黄門之厩以拘馬也巨象師子帝令以此一絲繫之古今注曰元帝永元四年東萊郡東弁}
