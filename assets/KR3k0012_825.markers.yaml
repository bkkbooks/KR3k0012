  - {type: variant, offset: 2561, length: 175, content: 幸其第見而悅之故盛興後園之翫於是貴賤慕斅處處營造後周書曰後周文帝在天遊園以金巵置侯上令公卿射中者即以賜之宇文貴一發而中帝笑曰由基之妙正當耳唐書曰何潘仁西域胡人也家富於財潘仁厚自奉養引致賓客煬帝時嘗犯法懼罪遂亡入司竹園鳩集亡命眾至數萬及義兵起求得平陽公主而奉之以應義師莊子曰漢陰丈人為園畦鑿隧而入井抱甕而灌一日浸百畦子貢教以為桔槔列子曰楊朱見梁王曰王者, SBCK: 繭}
