  - {type: variant, offset: 3940, length: 0, content: '', SBCK: 繅每淹大揔而手振之以出緒也說文曰繰繭爲絲也尸子曰夫繭合而弗治則腐蠧而弃使女工繰之以爲美錦列仙傳曰園客􅁞得繭大如盆繰一繭數十日繰訖俱去莫知所如濟陽今有革蠶祠巳備於前故此小略繀車通俗文曰織纎謂之繀音碎受緯曰孚繀車方言曰繀車趙魏之間謂之歴鹿車東齊海岱之間謂之道􅁤孫德施繀車賦曰惟工藝之多門偉英麗乎創形擬老氏之一轂􅀆應天運以廻行秉轉屈以成規􅀆不辭勞以自傾故其用同造物功叅天地軒轅垂衣因其以濟衮冕龍旂用康上帝勲存王室惠流皂􅀠􅀚其微風興於輪端霧雨散于輻制以靈木絡以竒竹危朝日以投貟􅀆准暈月以造象􅀂洪輪之在雄􅀆似蜘蛛之結網尓乃才藝妻妾工巧是嘉或織綿組或匠綾羅舒皓腕於輕輪􅀆煥擬景乎鏡華絲成妙於指端號􅀆幽而相和象蟋蟀之鳴户􅀆􅀋寒蟬之吟家籰方言曰籰援也音爰兖䂊河濟之間謂之轅郭璞注曰所以絡絲說文曰籰収絲者也或作從角間聲絡車方言曰河濟之間絡謂之格郭璞注日所以轉籰紿事也柅易姤卦曰繫于金柅金者堅剛之物柅者制動之至通俗文曰張絲曰柅也說文曰擟絡絲檷從木爾聲讀􅀂柅機杼毛詩谷風大東曰小東大東杼軸其空字林曰􅛨女涉切機下所履史記曰公儀休相魯見布好出家婦燔其機也列女傳曰河南貞義者樂羊子之妻也羊子出學後得遺金一餅以與貞義曰妾聞君子不以利洿行反裘負薪古}
