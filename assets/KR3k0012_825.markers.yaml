  - {type: variant, offset: 1644, length: 369, content: 明帝之幸郭元后也毛皇后愛寵日衰景初元年帝遊後園召才人以上曲宴極樂元后曰宜延皇后帝弗許乃禁左右使不得宣后知之明日見帝后曰昨遊宴北園樂乎帝以左右泄之所殺十餘人魏略曰青龍十二年起土山於芳林園西北陬使公卿群寮皆負土成山樹松竹雜木善草於其上捕山禽雜獸置其中又曰馬鈞居京都城內有地可為園患無水以灌之乃作飜車令童兒轉之而灌水自覆更入更出其巧百倍於常晉書曰華廙免官後栖遲家巷武帝登凌雲臺望見廙苴蓿園阡陌甚整依然感舊太康初大赦乃得襲封王隱晉書曰王衍字夷甫戎叔父也終於平北將軍送故甚豐親故借衍車馬帷帳器物者衍因與不復錄資財盡出洛城西先人舊園田上又曰王戎為荊州刺史坐遣吏修園宅應免官詔以贖論又曰孝宗欲於後園修立池苑江逌諫以強賊未滅宜旌軍備嘗存儉約以率群下又曰汜騰字無忌應孝廉舉除郎中屬天下兵亂去官歎曰生於亂世貴而能貧乃可以免散家財五十萬以施宗於柴門灌園琴書自適, SBCK: ''}
