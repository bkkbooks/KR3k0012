  - {type: variant, offset: 976, length: 1, content: 諸, WYG: 斬之以狥從閬中入遂却劔門之師觧梓潼之圍又髙崇文平劉闢王師入城介士屯於大造軍令嚴肅珍貨山積市井不移秋毫無犯又郗士美為招義節度使朝廷討王承宗士美遣兵馬使王獻領卒一萬為前鋒獻凶惡恃亂逗撓不進遽令召至數其罪斬之下令曰敢後出者斬士美親鼓之兵既合而賊軍大敗下三營還柏鄉屢以捷聞上大悦曰固知士美之能辦吾事於時四面七八鎮兵共十餘萬以環鎮冀未有首功多犯法士美兵勇敢畏法聲甚震承宗大懼指期有破亡之勢㑹詔班師至今兩河間稱之又李師道攻徐徐}
  - {type: page-break, offset: 976, content: '', id: KR3k0012_WYG_296-10b, image: WYG0895/WYG0895-0579d.png}
  - {type: variant, offset: 976, length: 13, content: 諸將莫能察楚之曰必是覘賊截, krp: 斬}
  - {type: variant, offset: 978, length: 4, content: 莫能察楚, WYG: 王智興敗賊壁獲美妾智興懼軍士争之乃曰軍中有女子安得不敗此雖無罪違軍法也即斬之以狥韓子曰吳起為魏侯西河之守奏有小亭臨境吳起欲攻之乃倚車轅於北門外而令}
