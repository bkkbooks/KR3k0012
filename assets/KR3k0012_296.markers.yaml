  - {type: variant, offset: 1758, length: 229, content: 漢書曰袁尚據鄴率兵擊兄譚於南皮留蘇由審配守曹公圍鄴尚還救鄴諸將皆以為此歸師人自為戰不如避之公曰尚從大道來當避之若循西山來者此成擒耳尚果循西山來臨滏水為營夜遣兵犯圍公逆擊破走之城中崩潰通典曰東晉末武帝伐南燕慕容超領南賊廬循徐道覆乘虛襲建業循多疑少決每欲以万全為慮謂道覆曰大軍未至晉吏部尚書孟昶便覩風自裁大勢言之自當計日潰亂令決負於一朝既非必定之道且煞傷士卒不如案兵待之宋武奔還拒守宋武曰賊若新亭直上且當避之廻泊蔡洲乃成擒耳於是登石頭城以覩循軍初見引向新亭宋武顧, WYG: ''}
