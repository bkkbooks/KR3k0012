  - {type: variant, offset: 905, length: 8, content: 輒動錢溪信尋至果, SBCK: 干歴人家有所求取蒙麾下士是汝南民取民家一笠以覆官鎧鎧雖公物蒙猶以爲犯軍令不可以郷里故廢遂垂涕斬之晉書李特載記曰益州刺史趙廞以李庠爲威宼將軍使斷北道庠素東羌良將曉軍法不用麾幟舉矛爲行伍斬部下不用命者三人部陣肅然蕭子顯齊書曰李安民爲徐州城局叅軍王廻素爲安民所親盗絹二疋安民流涕於門斬之厚爲殮􅀕軍府皆震服焉北史曰後魏孝文車駕南征以宋弁爲司徒東道副將軍人有盗馬靽者斬而徇於是三軍震懼莫敢犯法又曰後魏安定王休車駕南伐領}
