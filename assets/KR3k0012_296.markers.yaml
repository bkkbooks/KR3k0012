  - {type: variant, offset: 1693, length: 0, content: '', SBCK: 軍令曰兵欲作陣對敵營先白表乃引兵就表而陣皆無讙譁明聽鼓音旗幡麾前則前麾後則後麾左則左麾右則右不聞令而擅前後左右者斬伍中有不進者伍長殺之伍長不進什長殺之什長不進都伯殺之督戰部曲將拔刃在後察違令不進者斬之一部受敵餘部有不進救者斬之武}
