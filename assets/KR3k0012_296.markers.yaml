  - {type: variant, offset: 2005, length: 14, content: 使羸老悉乘舟艦向白石宋武慮其, WYG: 前行不動行斬于失之行守圍不固一火及主吏並斬之遇敵攻圍危急若前後左右部隊不救至䧟者全部隊皆斬之為敵所乗失旗鼓節鉞者全隊斬之陣之旗頭被敵殺争得屍首免坐不得者一旗並斬之凡戰敵失主將隨}
  - {type: punctuation, offset: 2015, content: 。, id: KR3k0012_CHANT_296-bkkpn549}
  - {type: 'tls:seg', offset: 2015, content: '', id: KR3k0012_CHANT_296-15a.31}
  - {type: variant, offset: 2020, length: 704, content: 白石步上乃率劉毅諸葛長民北出拒之賊遂率數万屯丹陽郡宋武率諸軍馳歸眾慮賊過江咸謂當徑還拒戰宋武乃先引軍還石頭眾莫之曉是日大熱三軍疲頓既入城解甲息士洗浴飲食久之乃出列陣於南塘命參軍禇叔度朱齡石率勁勇千餘人過淮賊數千皆長刀矛鋋精甲曜日奮躍爭進齡石所領多鮮卑善步矟並結陣以待之賊短兵弗能抗死傷者數百人乃退走安眾春秋曰晉文公卒將殯于曲沃出綘柩有聲如牛如牛呴聲虛茍切卜偃使大夫拜曰君命大事將有西師過軼我擊之必大捷焉秦伯使孟明視等三將襲鄭晉師禦之于殽而敗之聲自柩出故曰君命也大事也卜偃聞秦密謀故因柩聲以正眾心也史記曰燕使騎劫代樂毅攻齊即墨齊將田單拒守乃令城中人食必祭其先祖於中庭飛鳥悉翔舞城中下食燕人怪之單復宣言曰神來下教我又令曰當有神人為我師者有一卒曰臣可以為師乎因反走田單乃起引還東嚮坐師事之卒曰臣欺君誠無能田單曰子勿言也因師之每出入約束必稱神眾心乃安竟破燕軍又曰秦二世初天下亂陳勝吳廣起兵於蘄欲收人心謀曰項燕為楚將數有功愛士卒楚人憐之或以為在今誠以吾眾為天下唱宜多應者謂首號令廣以為然迺行卜卜者知其指意曰足下事皆成功然足下卜之鬼乎卜者云事成有功然須假託鬼神乃可興起耳故勝廣曉其意則為魚書狐鳴以威眾也勝廣喜念鬼曰此教我先威眾耳迺丹書帛曰陳勝王置所罾魚腹中罾音曾卒買魚烹食得書已怪之矣又間令廣之所次旁叢祠中夜搆火狐鳴呼曰大楚興陳勝王間謂竊令人行也密於廣所次舍處旁側叢祠中為之叢謂草木之岑蔚者也祠神祠也搆謂結起也呼火故切卒皆夜驚恐朝日卒中往往指目勝廣因而號令眾遂從之又曰高帝已封大功臣二十餘人其餘日夜爭功不決未得行封帝在洛陽南宮從複道遙見諸將往往相與坐沙中語張良曰陛下起布衣以此屬取天下今為天子而所封皆蕭曹故人及親愛而所誅, WYG: ''}
