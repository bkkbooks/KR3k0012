  - {type: variant, offset: 939, length: 0, content: '', SBCK: 又曰竇􅁤􅀄入蜀將其甥從軍以爲心腹嘗夜出呼之不以時至因斬之將吏重足而立見之者莫不股慓又曰哥舒翰好讀左氏春秋及漢書踈財重氣士多歸之河西節度王忠嗣以爲大計軍副使安思順爲大使翰常怏怏不能下之忠嗣遂使翰別爲將討吐蕃于新城以同對副使爲副副使不爲翰用頗沮之翰怒甚脫甲撾殺之投其屍於坑中軍中股慓又曰馬燧討李懷光於河中帥歩􅀐三萬次于絳乃分兵收下縣略禝山拔龍門降其將馮萬興任象王燧以兵圍攻絳州拔其外城其夜僞刺史王尅同與大將逹奚小進弃城}
  - {type: page-break, offset: 939, content: '', id: KR3k0012_SBCK_296-5b}
  - {type: variant, offset: 939, length: 0, content: '', WYG: 又竇軌物入蜀將其甥從軍以為心腹嘗夜出呼之不以時至因斬之將吏重足而立見之者莫不股慄又哥舒翰好讀左氏春秋及漢書疎財重氣士多歸之河西節度王忠嗣以為大計軍副使安思順為大使翰常怏怏不能下之忠嗣遂使翰别為將討吐蕃于新城以同戴副使為副副使不為翰用頗沮之翰怒甚脫甲撾殺之投尸於坑中軍中股慄又馬燧討李懐光於河中帥歩騎三萬次於絳乃分兵收下縣略稷山㧞龍門降其將馮萬興任象王燧以兵圍攻絳州㧞其外城其夜偽刺史王尅同與大將達奚小進棄城}
