  - {type: variant, offset: 506, length: 240, content: 燕慕容超於廣固未下時後秦姚興遣使告宋武云慕容見與鄰好以窮告急今當遣鐵騎一萬遙據洛陽晉軍若不退者便當長驅而進宋武遣興使荅曰語汝姚興我定燕之後息甲三年當平關洛今能自送便可速來劉穆之聞興使入而宋武發遣已去以興所言并荅具語穆之穆之曰常日事無大小必賜與謀此宜善詳云何率爾便荅未能威敵只增彼怒耳若燕未可拔興救奄至不審何以待之宋武笑曰此是兵機非卿所解故不語耳夫兵貴神速彼若審能遣救必畏我知寧容先遣信命此是其見我伐燕內已懷懼自強之辭耳興竟不能出師廣固終拔擒慕容超平齊地又曰武帝自京口舉義兵討桓玄玄, SBCK: 郡盡得羽及}
