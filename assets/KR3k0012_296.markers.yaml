  - {type: variant, offset: 2846, length: 748, content: 史定功行封群臣皆喜曰雍齒且為侯我屬無患矣漢書曰李廣以郎中令將四千騎出右北平博望侯騫將万騎與廣俱異道行數十里匈奴萬騎圍廣軍士皆恐廣乃使其子敢往馳之敢從數十騎直貫胡騎出其右而還曰胡虜易與耳軍士乃安後漢書曰王郎起光武馳至下曲陽傳聞王郎兵在後從者恐及至呼沱河候吏還白河水流澌澌音斯無舩不可濟官屬大懼光武令霸往視之霸恐驚眾欲且前阻水還即詭曰冰堅可渡官屬皆喜光武笑曰候吏果妄語也遂前比至河河冰亦合乃令霸護渡監護渡也未畢數騎而冰解光武謂霸曰安吾眾得濟免者卿之力也霸謝曰此明公至德神靈之祐雖武王白魚之應無以加此昔武王渡盟津白魚躍入王舟光武謂官屬曰王霸權以濟事殆天瑞也晉書曰李矩守滎陽城劉聰將劉暢討矩奉牛酒詐降謀夜襲之兵士以賊眾皆有懼色矩令郭誦禱鄭子產祠曰君昔相鄭惡鳥不鳴兇胡夏羯何得過庭使巫揚言東里有教當遣神兵相助將士聞之皆踴躍爭進乃使誦選勇敢千人夜掩暢營獲鎧馬甚多斬首數千級暢僅以身免東里即子產又曰劉𥙿討慕容超圍廣固城數月不拔或說𥙿曰昔石季龍攻曹嶷瞻氣者以為澠水帶城澠音繩非可攻拔若塞五龍口城必自陷季龍從之而嶷降慕容恪圍叚龕亦如之而龕降降後無幾又震開之今舊跡猶在可塞之𥙿從其言於是城中男女患腳弱疾者太半時有蒼鵝飛入帳座眾咸驚愕其將曰蒼胡色也鵝者我也胡虜歸我之徵眾大悅將攻城諸將咸諫曰今往亡之日兵家所忌𥙿曰我往彼亡吉孰大焉乃命悉登遂剋平廣固又曰嶺南城盧循寇建業宋武擊破之走至彭蠡湖乃悉力柵斷左里大軍至左里將戰宋武所執麾竿折幡沉水眾並怪懼公歡笑曰往年覆舟之戰幡竿亦折今者復然賊必破矣即攻柵而進循兵雖殊死戰弗能禁諸軍乘勝奔之循單舸走所殺及投水死凡萬餘人納其降附宥其逼掠遣劉藩孟懷玉輕軍追之循收散卒尚有數千人逕還廣州又禿髮利鹿孤載記曰呂纂來伐使傉檀拒之纂士卒精銳進度三堆三軍擾懼傉檀下馬據胡床而坐士眾心乃安與纂戰敗之斬, SBCK: 覽卷第}
  - {type: variant, offset: 2846, length: 748, content: 史定功行封群臣皆喜曰雍齒且為侯我屬無患矣漢書曰李廣以郎中令將四千騎出右北平博望侯騫將万騎與廣俱異道行數十里匈奴萬騎圍廣軍士皆恐廣乃使其子敢往馳之敢從數十騎直貫胡騎出其右而還曰胡虜易與耳軍士乃安後漢書曰王郎起光武馳至下曲陽傳聞王郎兵在後從者恐及至呼沱河候吏還白河水流澌澌音斯無舩不可濟官屬大懼光武令霸往視之霸恐驚眾欲且前阻水還即詭曰冰堅可渡官屬皆喜光武笑曰候吏果妄語也遂前比至河河冰亦合乃令霸護渡監護渡也未畢數騎而冰解光武謂霸曰安吾眾得濟免者卿之力也霸謝曰此明公至德神靈之祐雖武王白魚之應無以加此昔武王渡盟津白魚躍入王舟光武謂官屬曰王霸權以濟事殆天瑞也晉書曰李矩守滎陽城劉聰將劉暢討矩奉牛酒詐降謀夜襲之兵士以賊眾皆有懼色矩令郭誦禱鄭子產祠曰君昔相鄭惡鳥不鳴兇胡夏羯何得過庭使巫揚言東里有教當遣神兵相助將士聞之皆踴躍爭進乃使誦選勇敢千人夜掩暢營獲鎧馬甚多斬首數千級暢僅以身免東里即子產又曰劉𥙿討慕容超圍廣固城數月不拔或說𥙿曰昔石季龍攻曹嶷瞻氣者以為澠水帶城澠音繩非可攻拔若塞五龍口城必自陷季龍從之而嶷降慕容恪圍叚龕亦如之而龕降降後無幾又震開之今舊跡猶在可塞之𥙿從其言於是城中男女患腳弱疾者太半時有蒼鵝飛入帳座眾咸驚愕其將曰蒼胡色也鵝者我也胡虜歸我之徵眾大悅將攻城諸將咸諫曰今往亡之日兵家所忌𥙿曰我往彼亡吉孰大焉乃命悉登遂剋平廣固又曰嶺南城盧循寇建業宋武擊破之走至彭蠡湖乃悉力柵斷左里大軍至左里將戰宋武所執麾竿折幡沉水眾並怪懼公歡笑曰往年覆舟之戰幡竿亦折今者復然賊必破矣即攻柵而進循兵雖殊死戰弗能禁諸軍乘勝奔之循單舸走所殺及投水死凡萬餘人納其降附宥其逼掠遣劉藩孟懷玉輕軍追之循收散卒尚有數千人逕還廣州又禿髮利鹿孤載記曰呂纂來伐使傉檀拒之纂士卒精銳進度三堆三軍擾懼傉檀下馬據胡床而坐士眾心乃安與纂戰敗之斬, WYG: 覽卷}
