  - {type: variant, offset: 969, length: 1, content: 去, SBCK: 退又曰永貞元年冬劉闢阻兵朝議討伐宰臣杜黄裳以爲獨任髙崇文可以成功元和元年春拜撿校工部尚書兼御史大夫充左神䇿行營節度使兼統左右神䇿奉天麟遊諸鎭兵討闢時􅀫將專征者甚衆人人自謂當選及詔出大驚崇文在長武練卒五千常若㓂至及是中使至長武夘時宣命而辰時岀師五千器用無闕者軍至興元軍中}
