  - {type: punctuation, offset: 3600, content: 《, id: KR3k0012_CHANT_296-bkkpn982}
  - {type: variant, offset: 3602, length: 656, content: 國春秋曰後趙石勒使將麻秋等伐張重華於武威重華將謝艾曰乞假臣兵七千為殿下吞之重華以艾為中堅將軍配步騎五千擊秋引師出振武夜有工梟鳴於牙中艾曰梟邀也六愽得梟者勝今梟鳴牙中剋敵之兆於是進戰大破之斬首五千級又曰後燕慕容寶遣將慕容賀麟率三萬餘人寇新市甲子晦後魏道武進軍討之太史令晁崇奏曰昔紂以甲子亡兵家忌不可出帝曰紂以甲子日亡周武不以甲子勝乎崇無以對帝遂進軍新市賀麟退阻泒水依漸洳澤以自固漸音子廉切洳音而據切甲戍帝臨其營戰於義臺塢大破之梁書曰庾域為華陽太守後魏軍攻圍南鄭時糧儲寡少人情忷懼忷許拱切州有空倉數十所域手自封題指示將士云此中粟皆滿足支二年但弩力堅守眾心以安虜退以功拜羽林監又曰楊公則隨武帝大軍至新林公則自越城移屯領軍府壘北樓與掖門相對嘗登樓望戰城中遙見麾蓋縱神鋒弩射之矢貫胡床左右皆失色公則曰虜幾中吾腳談笑如初通典曰隋末李密據興洛倉破宇文化及還士卒皆疲倦隋將王充欲乘其弊而擊之恐眾心不一乃假託鬼神云夢見周公乃立祠於洛水上遣巫宣言公欲令今僕射討李密當有大功不則兵皆疲死充兵多楚俗信妖言以惑之眾皆請戰遂破密唐書曰高祖為山西河東撫慰大使行至太平關遇賊數千人時所將兵少左右皆懼高祖謂之曰此烏合之賊易與耳因率騎十二人出擊之所向皆靡眾情始定世說曰曹公軍行失道三軍皆渴公令曰前大梅饒子酸可以解渴士卒聞之口皆水出三國典略曰梁蕭藻有操行以父非命而卒布衣菲食非公坐不聽音樂初為益州刺史時有焦僧護作亂掩據郫繁眾有數萬藻年未弱冠將自擊之乃乘平肩輿巡行賊城流矢雨下從者舉楯以蔽藻命去之因是物情大安賊夜遁梁武常稱其小字歎曰子弟併如迦葉吾復何憂, SBCK: ''}
