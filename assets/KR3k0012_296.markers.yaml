  - {type: variant, offset: 914, length: 1, content: 破, SBCK: 司馬孝文親行諸軍遇休以三盗人徇六軍將斬之有詔赦之休執曰不斬何以息盗詔日王者之體亦有非常之澤雖違軍法可特原之休乃奉詔帝謂司徒馮誕曰大司馬嚴而執法諸君不可不愼於是六軍肅然唐書曰闞稜容貌魁岸勇而多力每臨陣手持大刀長一丈一舉輙斃數人前無當者及杜伏威據有江淮之地兵皆出自群}
