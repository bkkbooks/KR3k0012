  - {type: variant, offset: 1895, length: 441, content: 至晉吏部尚書孟昶便覩風自裁大勢言之自當計日潰亂令決負於一朝既非必定之道且煞傷士卒不如案兵待之宋武奔還拒守宋武曰賊若新亭直上且當避之廻泊蔡洲乃成擒耳於是登石頭城以覩循軍初見引向新亭宋武顧左右失色既而廻泊蔡洲道覆猶欲上循禁之使羸老悉乘舟艦向白石宋武慮其從白石步上乃率劉毅諸葛長民北出拒之賊遂率數万屯丹陽郡宋武率諸軍馳歸眾慮賊過江咸謂當徑還拒戰宋武乃先引軍還石頭眾莫之曉是日大熱三軍疲頓既入城解甲息士洗浴飲食久之乃出列陣於南塘命參軍禇叔度朱齡石率勁勇千餘人過淮賊數千皆長刀矛鋋精甲曜日奮躍爭進齡石所領多鮮卑善步矟並結陣以待之賊短兵弗能抗死傷者數百人乃退走安眾春秋曰晉文公卒將殯于曲沃出綘柩有聲如牛如牛呴聲虛茍切卜偃使大夫拜曰君命大事將有西師過軼我擊之必大捷焉秦伯使孟明視等三將襲鄭晉師禦之于殽而敗之聲自柩出故曰君命也大事也卜偃聞秦密謀故因柩聲以正眾心也史記曰燕使騎劫代樂毅攻齊即墨齊將田單拒守乃令城中人食必祭其先祖於中庭飛鳥悉翔舞城中下食燕人怪之單復宣言曰神來下教我又令曰當有神人為我師者, SBCK: 合}
