  - {type: variant, offset: 944, length: 0, content: '', SBCK: 德宗幸奉天詔以李晟爲神䇿行營節度使晟軍令嚴肅所過樵採無犯自河中由蒲津而軍渭北壁東渭橋以逼朱泚時劉德信將神䇿兵救襄城敗於扈澗聞難率餘軍前次渭南與晟合軍軍無統一晟不能制德信因至晟軍晟乃斬之復以數􅀐入德信軍中撫勞軍士無敢動者晟旣并德信軍軍益振又曰李晟收復都城朱泚乃與妻子及姚令言張芝等數千􅀐西走涇原餘兵麋散晟乃入􅔰丹鳯門舎軍於外朝晟處於右金吾仗舎下令曰軍中五日不得通家問違者斬之遣京兆尹李齊運告諭於衆百姓安堵秋毫無犯尚可􅀌軍人有擅取馬者晟大將髙明矅虜賊女妓一人}
