  - {type: variant, offset: 10, length: 2, content: 兵怒, SBCK: 法者曲制官道主用也曲制者部曲幡幟金鼓之制也官者百官之分用也道者糧路也主用者主軍費用卒未專親而罰之則不服不服則難用也卒巳親附而罰不行者則不可用也故合之以文齊之以武文仁武法是謂少取文恩武罰令素行以教其人也令素行則人服令素不行則人不服令素信著者與衆相得也厚}
