  - {type: variant, offset: 1036, length: 396, content: 果性強記兼有權略所行之處山川形勢輒能記憶兼善伺敵虛實揣知情狀有潛匿溪谷欲為間遉者果登高視之所疑之處往必有獲通典曰周武帝帥師攻圍高齊晉州齊後主將兵十万自來援之時柱國陳王純頓千里徑大將軍永昌公椿屯雞棲原大將軍宇文盛守汾水關並受齊王憲節度憲密謂椿曰兵者詭道去留不定見機而作不得遵常汝今為營勢令兵去之後賊猶致疑不須張幕可伐疑也時齊分軍万人向千里徑又令其眾出汾水關自率大兵與椿對陣宇文盛馳騎告急憲自以千騎救之齊人覩谷中塵起相率遽退盛與柱國侯莫陳芮涉汾逐之多有斬獲俄而椿告齊眾稍逼憲又廻軍赴之會被勑追還率兵夜返齊人果謂柏菴為帳幕也不疑軍退翌日始悟周人說疑齊人不察軍讖曰夫用兵者必察敵國之情視其倉廩度其餘糧以卜其強弱運糧二百里者無二年之食也運糧三百里者無三年之糧也是謂虛國民貧上下不相親則有離叛心上行暴虐則下刻急相殘賊是為亡國若進惡不退群賢隱蔽不肖在位國受其害內貪外廉竊公為恩飾躬正顏以獲高官是謂盜端避銳孫, SBCK: ''}
