  - {type: variant, offset: 940, length: 3, content: 後魏書, SBCK: 降其衆四千人又遣大將李自良谷秀分兵略定聞喜夏縣萬泉虞郷永樂猗氏六縣降其將辛兟音詵及兵五千人谷秀以犯令虜士女斬之以徇又}
  - {type: variant, offset: 940, length: 3, content: 後魏書, WYG: 降其衆四千人又遣大將李自良谷秀分兵略定聞喜夏縣萬泉虞鄉永樂猗氏六縣降其將辛兟音詵及兵五千人谷秀以犯令擄士女斬之以徇又徳宗幸奉天詔以李晟為神䇿行營節度使晟軍令嚴肅所過樵採無犯自河中至蒲津而軍渭北進據東渭橋以逼朱泚時劉徳信將神䇿兵救襄城敗於扈澗聞難率餘軍前次渭南與晟合軍軍無統一晟不能制徳信因至晟軍晟乃斬之復以數騎入徳信軍中撫勞軍士無敢動者晟既并徳信軍軍益振又李晟收復都城朱泚乃與妻子及姚令言張芝等數千騎西走涇源餘兵靡散晟乃入據丹鳳門舍軍於外朝晟處於右金吾伏舎下令}
