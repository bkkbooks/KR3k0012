  - {type: variant, offset: 1693, length: 0, content: '', krp: 軍令曰兵欲作陣對敵營先白表乃引兵就表而陣皆無讙譁明聽鼓音旗幡麾前則前麾後則後麾左則左麾右則右不聞令而擅前後左右者斬伍中有不進者伍長殺之伍長不進什長殺之什長不進都伯殺之督戰部曲將拔刃在後察違令不進者斬之一部受敵餘部有不進救者斬之武}
  - {type: variant, offset: 1694, length: 0, content: '', SBCK: 兵法曰軍有七禁一曰輕二曰慢三曰盗四曰欺五曰背六曰亂七曰誤此治軍之禁也􅀂朝㑹不到聞鼔不行乗寛自留迴避務止􅀄近而後逺喚名而不應軍甲不具兵器不備此謂輕軍有此者斬之受令不傳傳之不審以惑吏士金鼓不聞旌旗不覩此謂慢軍有此者斬之食不廪糧軍不部兵賦賜不均阿私所親取非其物借貸不還奪人頭首以獲功名此謂盗軍有此者斬之􅀂變易姓名衣服不鮮金鼓不具兵刃不磨器仗不堅矢不着羽弓弩無􅃶主者吏士法令不從此謂欺軍有此者斬之聞鼓不行叩金不止按旗不伏舉旗不起指麾不隨避前在後縱發亂行折兵弩之􅀔却退不􅃲或左或右扶傷舉死因託歸還此謂背軍有此者斬之出軍行將士卒爭先紛紛擾擾軍􅀐相連咽塞道路後不得前呼喚喧譁無所聽聞失行亂次兵刃中傷長將不理上下縱横此謂亂軍有此者斬之屯營所止}
  - {type: page-break, offset: 1694, content: '', id: KR3k0012_SBCK_296-8b}
  - {type: variant, offset: 1694, length: 0, content: '', WYG: 兵法曰軍有七禁一曰輕二曰慢三曰盗四曰欺五曰背六曰亂七曰誤此治軍之禁也若期㑹不到聞鼔不行乗寛自畱廻避務止初近而後逺喚名而不應軍甲不具兵噐不備此謂輕軍有此者斬之受命不傳傳之不審以惑吏士金鼔不聞旌旗不覩此謂慢軍有此者斬之食不廩糧軍不部兵予賜不均阿私所親取非其物借貸不還奪人首級以獲功名此謂盗軍有此者斬之變易姓名衣服不鮮金鼔不具兵刄不利噐仗不堅矢不着羽弓弩無絃主者吏士法令不從此謂欺軍有此者斬之聞鼔不行鳴金不止按旗不伏舉旗不起指麾不隨避前在後縱發亂行折兵弩之勢却退不鬭或左或右扶傷舉死因託歸還此謂背軍有此者斬之出軍行將士卒争先紛紛擾擾軍騎相連咽塞道路後不得前呼喚諠譁無所聽聞失行亂次兵刄中傷長將不理上下縱横此謂亂軍有此者斬之屯營所止}
