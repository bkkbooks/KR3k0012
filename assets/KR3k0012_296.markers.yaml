  - {type: variant, offset: 1693, length: 0, content: '', WYG: 軍令曰兵欲作陣對敵當先整伍乃引兵就長而陣皆無諠譁明聽鼔音旗旛麾前則前麾後則後麾左則左麾右則右不聞令而擅前後左右者斬伍中有不進者伍長殺之伍長不進什長殺之什長不進部下殺之督戰部曲將㧞刄在後察違令不進者斬之一部受敵餘部有不進救者斬之武}
