  - {type: variant, offset: 109, length: 2, content: 未憖, SBCK: 震慓燕晉之師聞之悉引而歸皆復所侵之地又曰孫武以兵法見於呉王闔閭闔閭曰子之十三篇吾尽觀之可以小試勒兵乎對曰可闔閭曰可試以婦人乎曰可於是許之出宫中羙人得百八十人孫子分爲二隊以王之寵􅁎二人各爲隊長皆令持㦸令曰汝知而心與左右手背乎婦人曰知武曰前則視心左視左手右視右手後即視背婦人曰諾約束旣畢乃設鈇􅃏即三令五申之於是鼓之右婦人大􅀏武曰約束不明申令不熟將之罪}
