  - {type: punctuation, offset: 35, content: 「, id: KR3k0012_CHANT_296-bkkpn14}
  - {type: variant, offset: 35, length: 0, content: '', SBCK: 晉侯之弟楊干亂行於曲梁行軍次也魏絳戮其僕僕御也晉侯怒謂羊舌赤曰合諸侯以爲榮也楊干爲戮何辱如之必殺魏絳無失也夫對曰絳無二志事君不避難有罪不避刑其將來辝何辱命焉言終魏絳至授僕人書僕人晉候御僕也將伏劒士魴張老止之公讀其書曰君乏使使臣斯司馬斯此臣聞師衆以順爲武順莫敢違軍事有死無犯爲敬守官行法雖死不敢有違君合諸侯臣敢不敬君師不武執事不敬罪莫大焉臣懼其死以及楊干無所逃罪懼自犯不武不敬不能致訓至於用􅃏用􅃏斬楊干之僕臣之罪重敢有不從以怒君心言不敢不從戮也請歸死於司宼致尸於司宼使戮也公跣而出曰寡人之言親愛也吾子之討軍禮也寡人有弟不能敎訓使干大命寡人之過也子無重寡人之過聽絳死爲重過敢以爲請請使无死晉侯以魏絳爲能以刑佐民矣反役與之禮食使佐新軍令欲顯絳故特爲設礼食史記曰齊景公時晉伐阿鄄阿今濟陽郡東阿縣鄄音絹今濮陽郡鄄城縣而燕侵河上}
  - {type: page-break, offset: 35, content: '', id: KR3k0012_SBCK_296-1b}
  - {type: variant, offset: 35, length: 0, content: '', WYG: 晉侯之弟揚干亂行於曲梁行軍次也魏絳戮其僕僕御也晉侯怒謂羊舌赤曰合諸侯以為榮也揚干為戮何辱如之必殺魏絳無失也赤對曰絳無二志事君不避難有罪不避刑其將來辭何辱命焉言終魏絳至授僕人書僕晉侯御僕也將伏劔士魴張老止之公讀其書曰日君乏使使臣斯司馬臣聞師衆以順為武順莫敢違軍事有死無犯為敬守官行法守死不敢有失君合諸侯臣敢不敬君師不武執事不敬罪莫大焉臣懼其死以及揚干無所逃罪懼自犯不武不敬不能致訓至於用鉞用鉞斬揚干之僕臣之罪重敢有不從以怒君心言不敢不從戮也請歸死於司冦致死於司冦使戮也公跣而出曰寡人之言親愛也吾子之討軍禮也寡人有弟弗能致訓使干大命寡人之過也子無重寡人之過聴使死為重過敢以為請請使無死晉侯以魏絳為能以刑佐民矣反役與之禮食使佐新軍今欲顯絳故特為設禮食史記曰齊景公時晉伐阿鄄阿今濟陽郡東阿縣鄄音絹今濮陽郡鄄城縣而燕侵河上}
  - {type: page-break, offset: 35, content: '', id: KR3k0012_WYG_296-2a, image: WYG0895/WYG0895-0575c.png}
