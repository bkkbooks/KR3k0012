  - {type: variant, offset: 1694, length: 0, content: '', krp: 兵法曰軍有七禁一曰輕二曰慢三曰盗四曰欺五曰背六曰亂七曰誤此治軍之禁也若朝㑹不到聞鼔不行乗寛自留迴避務止𥘉近而後逺喚名而不應軍甲不具兵器不備此謂輕軍有此者斬之受令不傳傳之不審以惑吏士金鼓不聞旌旗不覩此謂慢軍有此者斬之食不廪糧軍不部兵賦賜不均阿私所親取非其物借貸不還奪人頭首以獲功名此謂盗軍有此者斬之若變易姓名衣服不鮮金鼓不具兵刃不磨器仗不堅矢不着羽弓弩無絃主者吏士法令不從此謂欺軍有此者斬之聞鼓不行叩金不止按旗不伏舉旗不起指麾不隨避前在後縱發亂行折兵弩之勢却退不鬪或左或右扶傷舉死因託歸還此謂背軍有此者斬之出軍行將士卒爭先紛紛擾擾軍騎相連咽塞道路後不得前呼喚喧譁無所聽聞失行亂次兵刃中傷長將不理上下縱横此謂亂軍有此者斬之屯營所止}
  - {type: variant, offset: 1695, length: 1, content: 吳, SBCK: 其郷里親近相隨共食相保呼召不得越入他位干誤次第不可呵止度營岀入不由門户不自啓白姧邪所}
  - {type: variant, offset: 1695, length: 0, content: '', WYG: 其鄉里親近相隨共食相保呼召不得越入他位干誤次第不可呵止度營出入不由門户奸邪所起知者不告罪同一等合人飲酒阿私所受大言驚語疑惑吏士此謂誤軍有此者斬之衛公兵法曰古之善為將者必能十卒而殺其三次者十殺其一三日威振於敵國一日令行於三軍是知畏我者不畏敵畏敵者不畏將盡忠一時輕生重節者雖讐必賞犯法怠惰敗事貪財者雖親必罰伏罪輸情質直敦素者雖重必捨遊辭巧飾虛偽狡詐者雖輕必戮善無㣲而不賞惡無纎而不貶斯乃勵衆勸功之要術也昔馬謖兵敗孔眀對泣而誅鄉人盗笠呂蒙流涕而斬馬逸踐麥曹操割髪而自刑兩椽辭屈黄蓋詰問而俱戮故知威克其愛雖少必濟如愛勝其威雖多必敗蓋賞罰不在重在必行不在數在必當尉繚子曰}
