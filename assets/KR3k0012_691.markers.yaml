  - {type: variant, offset: 35, length: 1, content: 畫, WYG: 方}
  - {type: variant, offset: 35, length: 4, content: 畫卷龍於, krp: 方言曰單衣江淮南楚之間謂之毛音疊牒關之東西謂之單趙魏之間謂之左衣古謂之深衣是也禮王制曰有虞氏深衣而養老又深衣曰古者深衣盖有制度以應規矩繩權衡短母見膚長母𬒳土帶下母厭髀上母厭脅制十有二幅以應十二月𬒮圎以應規曲祫如矩以應方負繩及踝以應直下齊如權衡以應平齊縃故䂓者行舉手以爲容負繩抱方者以直其政方其義也故易曰坤六二之動直以方也下齊如權衡者以安其志而平其心也五法以施故聖人服之故規矩取其無私繩取其直權衡取其平故先王貴之故可以爲文可以爲武可以擯相可以治軍旅又儒行曰丘少居魯衣縫掖之衣鄭玄曰縫猶大也大掖衣大袂單衣君子有道藝者所}
