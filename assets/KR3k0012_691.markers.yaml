  - {type: variant, offset: 1513, length: 233, content: 禮玉藻曰天子玄端而朝日於東門之外鄭玄曰端當為冕字之誤朝日春分時也魏臺訪議曰禮天子大夫玄冕而執鴈今秩中二千石六百石者可使玄冕而執鴈禕衣釋名曰王后之上服曰禕衣畫翬雉之文於衣也伊洛而西雉青質五色備曰翬也周禮天官下內司服曰內司服掌王后之六服禕衣王后之服刻繒為翬之形而采畫之綴於衣從王祭先王則服褘衣也禮明堂位曰夫人副褘立于房中鄭玄曰副首飾也今之步搖是也周禮追師掌王后之首服為副禕王后之上服也唯魯及王者之後夫人服之諸候夫人自褕翟而下也又曰祭義曰歲既單世婦獻繭于夫人夫人副褘而受之, WYG: ''}
