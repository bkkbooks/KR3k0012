  - {type: variant, offset: 2301, length: 266, content: 服也卿大夫之妻以從助君祭釋名曰襢展字或作此坦也坦然正白無文采也禒衣釋名曰禒衣禒然黑色也詩邶柏舟禒衣曰禒兮衣兮禒衣黃裏禒間色黃正色義云禒兮衣兮禒衣自有禮制也諸侯大夫祭服之下鞠衣為上展衣次之眾妾亦有貴賤之等服鞠衣黃展衣白禒衣黑皆以素紗為裏非其制故以喻妾上僭焉褖兮衣兮禒衣黃裳義云婦人之服不殊衣裳同色今衣黑裳黃喻亂嫡妾之禮也周禮天官下內司服曰內司服掌王后六服禒衣素紗禒衣御於王者之服也亦似燕居君子之禒衣黑則是亦黑也袗衣三禮圖曰傅母婚禮從者袗衣古者傅母選無夫與子而老賤曉習婦道者使之應對也朱衣應劭漢官儀曰虎賁中郎衣紗縠單衣續漢志同晉令絳紗縠, SBCK: 事}
