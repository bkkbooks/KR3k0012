  - {type: variant, offset: 1050, length: 102, content: 減其采章陳留風俗傳曰襄邑縣南有渙水有睢水傳曰睢渙之水出文章故有黼黻藻錦日月華蟲以奉天子宗廟御服焉鷩衣釋名曰鷩雉山雉也鷩憋并列切也性急憋不可生必自殺故畫其形於衣以象人執耿介之節也周禮春官上司服曰王之吉服享先, SBCK: 直}
