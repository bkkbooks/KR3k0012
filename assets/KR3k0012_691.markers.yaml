  - {type: variant, offset: 1037, length: 11, content: 魏明帝疑三公袞冕之服似, SBCK: 韠制}
  - {type: variant, offset: 1037, length: 0, content: '', WYG: 梁兾作火浣布单衣㑹客賔行酒食盃而汚之偽怒觧衣而燒之垢盡火㓕粲然潔白世説曰王戎性儉為其從子婚與一单衣後更責之陳留耆舊傳曰吳祐為膠東相嗇夫孫性盗富民錢五百為父市单衣父恐便以单衣詣門自謝祐以单衣遺其父梁兾别傳曰兾作狐尾单衣上短下長邉譲别傳曰譲才辯俊逸孔融薦譲於武帝曰邉譲為九州之被則不足為单衣襜褕則有餘楊彪别傳曰}
  - {type: page-break, offset: 1037, content: '', id: KR3k0012_WYG_691-5b, image: WYG0899/WYG0899-0196b.png}
  - {type: variant, offset: 1037, length: 11, content: 魏明帝疑三公袞冕之服似, krp: 韠制}
  - {type: variant, offset: 1038, length: 1, content: 明, WYG: 文}
  - {type: variant, offset: 1040, length: 2, content: 疑三, WYG: 令彪着布单衣待以賔客之禮拾遺記曰漢末羽山之民獻赤布梁兾製為衣謂之丹衣而史家云单衣則今縫掖也字異聲同未知孰是也神仙傳曰曹}
  - {type: page-break, offset: 1040, content: '', id: KR3k0012_WYG_691-6a, image: WYG0899/WYG0899-0196c.png}
  - {type: variant, offset: 1043, length: 2, content: 袞冕, WYG: 欲殺左慈将出市忽失慈所在乃閉市索}
  - {type: variant, offset: 1046, length: 0, content: '', WYG: 傳曰一目眇著葛巾幘单衣正爾視之一市中數萬人皆眇一目着葛巾績单衣竟不知所取捜神記曰永嘉以來士大夫競}
  - {type: variant, offset: 1047, length: 1, content: 似, WYG: 生单衣識者怪之曰此古練縗之布諸侯大夫所以服}
