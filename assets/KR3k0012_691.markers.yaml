  - {type: variant, offset: 1858, length: 367, content: 江淮而南雉素質五采皆備成章周禮天官下內司服曰內司服掌王后之六服䄖狄鄭玄曰䄖狄闕狄畫羽飾也玄謂䄖狄青也三禮六服圖曰䄖翟王后從王祭先公之服也侯伯之夫人服以從君祭宗廟闕翟釋名曰闕翟翦闕繒為翟雉形以綴衣也詩曰委委蛇蛇象服是宜義曰象服者謂䄖狄闕狄也周禮天官下內司服曰內司服掌王后之六服闕狄鄭司農曰䄖狄闕狄畫羽飾也鄭玄曰闕狄刻而不畫者也此三者皆祭服玄謂今世有袿衣者蓋三狄之遺象也以椎次其色闕狄赤也三禮六服圖曰闕翟王后從祭群小祀服也亦子男夫人服以從君祭宗廟鞠衣釋名曰鞠衣如菊花色也周禮天官下內司服曰內司服掌王后六服鞠衣鄭司農曰鞠衣黃桑服也色如鞠座像桑葉始生三禮六服圖曰鞠衣王后桑之服也孤之妻服以從助君祭董巴漢輿服志曰太皇太后皇太后蠶服青上縹下深衣制貴人助蠶服純縹上下深衣制公卿列侯中二千石夫人助蠶服縹絹上下深衣制自二千石夫人已上至皇后皆以蠶衣為朝服, SBCK: ''}
