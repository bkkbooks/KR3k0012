  - {type: variant, offset: 1854, length: 0, content: '', WYG: 齊人謂之巨巾田家婦女出至田野以覆其頭故因以為名也又曰跪襜跪時襜然張也爾雅曰衣蔽前謂之襜今蔽膝也易困卦曰朱韍方來詩曰赤芾在股邪幅在下芾太古蔽膝之象也冕服謂之芾其他服謂之􅔖以韋為之禮曰一命緼韍幽衡再命赤韍幽衡韍之言蔽也緼赤黄之色所謂韍也又曰韠君朱大夫素士爵韋韍以言蔽也以韋為之象裳也圜殺直日韠制天子直諸侯前後方大夫前方後剉角士前後正韠下廣二尺上廣一尺長三尺又明堂位曰有虞氏服韍夏后氏山殷火周龍章鄭𤣥曰韍􅔖也舜始作之以尊祭服禹湯至周増以畵}
