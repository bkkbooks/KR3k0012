  - {type: variant, offset: 1753, length: 1, content: 太, WYG: 祭宗廟初𤣥絳領袖為中衣絳袴袜示赤心其奉神五郊各從其色徐廣輿服雜注曰夫天子郊禮釋奠中衣以絳縁其領袖其朝皁縁魏官儀曰皁縁領袖中单衣㑹稽典録曰鄭𢎞為縣嗇夫民有弟負兄錢者未還其嫂詣𢎞賣中单為叔還錢兄聞之慙遣婦賫錢還𢎞不受曲領方領附釋名曰曲領上横壅頸其狀曲也禮曰衣曰曲祫如矩以應方祫曲領也古者方領後漢書曰朱勃字叔陽年十二能誦詩書嘗候馬援兄况勃衣方領能短歩前書音義曰頸下施領正方學者之服也袿䙱廣雅曰䙱長䄔也釋名曰婦人上服曰袿其下垂者上廣下狹如刀圭也䙱属也衣裳上下相連属也徐廣輿服雜注曰今}
