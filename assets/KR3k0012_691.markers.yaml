  - {type: punctuation, offset: 43, content: 「, id: KR3k0012_CHANT_691-bkkpn22}
  - {type: variant, offset: 43, length: 0, content: '', SBCK: 江充召見上衣紗􅜄單衣曲􅅂後垂交輸張晏曰曲􅅂者人衣也後垂覆帶半之也又曰趙王彭祖爲人巧佞持詭辯以中人毎二千石至彭祖衣皁布單衣自行迎多設疑事以詐動之得二千石失言中忌諱輙書之又曰盖寛饒左遷爲衛司馬未出殿門斷其單衣短令離地躬按行士卒廬室後漢書曰馬援爲隗嚚使公孫述述盛陳陛衛以延援入交拜禮畢使出就館更爲援制都布單衣東觀記曰都作荅史記曰荅布千疋前書音義曰荅布白疊也謝承後漢書曰陸閎建武中爲尚書令美姿皃喜著越布單衣上見而好之自是常勑㑹稽郡獻越布又曰陳留尹苞字延􅀶與同郡范史雲善二人俱貧出入共一單衣到人門外苞年長常先着單衣前入湏􅁷出解與史雲魏志曰管寜四時􅀕祀在遼東時布單衣親薦饌王隱晉書曰梁孝王彤宣帝子將單衣􅀘車㦥以爲清叅軍王銓曰晏嬰大官稱清者以爲御食七百家也公無此費冝美衣服使内外相稱晉書曰桓温廢東海王王着白帢單衣步下西堂群臣拜辭莫不歔欷又曰簡文初立於朝堂服着平巾幘單衣東向拜受璽綬又曰王導傳􅂫峻平後帑藏空竭庫中唯有練數十萬疋賣之不售而國用不足導患之與朝賢俱制練布單衣於是士庶翕然競服之練逐貴端至一金晉令曰朝服皁縁中單衣趙書曰勒叅軍周承爲館陶令斷官絹數百疋獄以八坐議宥之後毎讌大㑹使徘兒著介幘黄絹單衣優問曰汝何官荅我夲爲館陶令斗藪單衣曰正坐取是故入汝軰以爲大􅀏事具樂部梁書曰劉曇靜母亡時天寒曇靜身衣單布衣廬於􅄟所晝夜哭臨不絶聲又曰張稷爲呉郡太守就僕射徴道由呉郷人候稷者滿水陸稷單衣裝徑還都下人莫之識其率素如此董巴輿服志曰羽林左監虎賁冠鶡着紗縠單衣又曰虎賁武􅀐皆衣虎文單衣襄邑歳獻織成虎文應劭漢官儀曰謁者皆著緗幘大冠白絹單衣徐野民車服雜注曰元帝召陳郡王隱待詔著作單衣幘朝望於著作之省又曰天子郊禮釋奠中單衣絳縁其領袖其朝服皂縁也燕丹子曰荆軻抱秦王乞聽琴聲而死召姬人鼓琴聲曰羅縠單衣可製而絶八尺屏風可超而越齊桓公夜出迎客寗戚叩牛角而歌曰短布單衣適至骭終朝飲牛至夜半仲長統昌言曰薊子訓不知何郡人到陳公舎自云今日當死陳公與之一著單衣於是入室寢日中果死傅子曰梁兾作火浣布衣㑹賔客行酒失盃而汚之僞怒解衣而燒之垢盡火滅粲然㓗白世􅀃曰王戎性儉爲其從子婚與一單衣後更責償之陳留􅂄舊傳曰呉祐爲膠東相嗇夫孫性盗冨民錢五百爲父市單衣父恐便以單衣詣門自謝祐以單衣遺其父梁兾別傳曰兾作狐尾單衣上短下長邊讓别傳曰讓才辯俊逸孔融薦讓於武}
