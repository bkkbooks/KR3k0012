  - {type: variant, offset: 629, length: 0, content: '', WYG: 不售而國用不足導患之與朝賢俱制練單衣於是士庻翕然競服之練遂貴端至一金晋令曰朝服皂緣中单衣趙書曰勒恭軍周承為舘陶令斷官絹数百疋獄以八坐議宥之後每設大㑹使俳兒着介幘黄絹单衣優問曰汝何官荅我本舘陶令斗藪单衣曰正坐取是故入汝軰以為笑本事具樂部梁書曰劉曇静母亡時天寒曇静身衣单布衣廬於厝所晝夜哭臨不絶聲又曰張稷為吳郡太守就僕射徵道由吳郷人候稷者滿水陸稷单衣裝徑還都下人莫之識其率素如此}
