  - {type: variant, offset: 3919, length: 5, content: 郡縣不能制, WYG: 又聞其人多善奕棋亦令善棋人率府兵曹楊季鷹為之副璹等至彼大為蕃人所敬其國髙弈皆出季膺下於是厚賂璹等金寶及藥物又曰大歴七年新羅王金乾運遣使金標石來賀正八年又遣使獻金銀牛黄魚牙納朝霞紬等又曰元和三年新羅王金重興遣使金力竒來朝力竒上言真元十六年奉詔册臣故主金俊邕為新羅王母申氏為太妃妻叔氏為王妃册使韋丹至中路知俊邕薨其册却回在中書省今臣還國伏請授臣以歸勑金俊邕等册宜令鴻臚寺於中書省受領至寺宣授與金力竒令奉歸國仍賜其叔彦昇門㦸令本國准例給與太平御覽卷七}
