  - {type: variant, offset: 3908, length: 0, content: '', SBCK: 公新羅王其官有十七等一曰伊罰干貴如相國次伊尺干次迎干破彌干次大阿尺干次阿尺干次乙􅁻干次渉咄干次及伏干次太奈摩干次奈摩次大舎次小舎次􅁻土次大焉次小焉次逹位外有郡縣其文字甲兵同於中國選壯徤者悉入軍烽戍邏俱有屯管部伍風俗刑政衣服略與髙麗百濟同毎月旦相賀王設宴㑹班賚群官其日拜日月神主八月十五日設樂令官人射賞以馬布其有大事則聚群官詳議定之服色尚畫素婦人辮髮繞頭以新綵及珠爲飾婚嫁禮唯酒食而己輕重隨貧冨死有棺歛葬送起墳陵王及父母妻子喪居服一年田甚良沃水陸兼種其五榖果菜鳥獸物産略與華同大業以來􅀊遣朝貢唐書曰新羅王所居曰金城周七八里衛兵三千人設師子隊文武官凢有十七等武德四年其王金真平遣使朝貢髙祖遣使賜以璽書及􅀞屏風錦綵自此朝貢不絶其食器用栁箱亦以銅及瓦國多金朴兩姓異姓不爲婚又曰貞觀五年新羅遣使獻女樂二人皆鬒髮羙色太宗謂侍臣曰朕聞聲色之娯不如好德且山川阻逺懷土可知近日林邑獻白鸚鵡尚解思郷訴請還國鳥猶如此况人情乎但􅉖其逺來思戀親戚冝付使者聽其還家又曰新羅曰金眞平安卒無子立其女善德爲王貞觀九年遣使􅁽命善德爲樂浪郡王新羅王十七年遣使王言髙麗百濟累相攻襲亡失數十城兩國連兵意在滅臣社稷謹遣陪臣歸命大國乞偏師救助後太宗將親伐髙麗詔新羅纂集士馬應接大軍新羅遣大臣領兵五萬入髙麗南界攻水口城降之又曰新羅王善德卒立其妹眞德爲王貞觀二十二年其德遣其弟國相伊賛于金春秋及其子文王來朝春秋請詣國學觀釋奠及講論太宗因賜以所製温湯及晉并新撰晉書將歸國又曰永徽元年新羅王眞德大破百濟之衆遣其弟子法敏以聞眞德乃織錦作五言太平頌以獻其詞曰大唐開洪業巍巍皇猷昌止戈戎衣定修文繼百王統天崇雨施理物體含章深仁諧日月撫運邁陶唐幡旗何赫赫征皷何鍠鍠外夷違命者剪覆􅀍天殃淳風凝幽顯遐邇􅔡呈祥}
