  - {type: variant, offset: 3885, length: 1, content: 廉, SBCK: 天子賜尉仇台印綬金綵順帝永和元年其王來朝京師帝作黄門皷吹角抵戯以遣之桓帝時亦朝貢獻帝時水屬遼東云魏志曰夫餘夲屬􅀇菟其俗有敵諸加自戰下户俱擔糧飲食之其死夏月皆用氷有椁無棺停喪五月以乆爲榮其居喪男女皆純白婦人着布面衣去環珮大體與中國相􅀋漢末公孫度雄張海東威服東夷夫餘王尉仇台更屬遼東時句麗鮮卑强度以夫餘在三虜之間妻以宗女正始中幽州刺史母丘儉討句麗遣􅀇莵太守王頎詣夫餘王位居遣大加郊迎供軍粮舊夫餘俗水旱不調五穀不熟輒歸咎於王或言當易或言當殺其印文言􅐮王之印國有故城名􅐮城盖本􅐮貃之地而夫餘王其中自謂亡人抑有以也晉書曰夫餘國至太康六年爲慕容廆所襲破其依慮自殺子弟走保沃沮武帝以何龕爲護東夷校尉明年夫餘後王依羅遣使詣龕永率見人還復舊國遣督郵賈沈以送之尓後毎爲廆掠其種人賣於中國帝又以官物贖還禁市夫餘之口自後無聞新羅􅁗書曰符堅建元十八年新羅國王樓寒遣使衛頭獻羙丈國在百濟東其人多羙髮髮長丈餘又曰符堅時新羅國王樓寒遣使衛頭朝貢堅曰卿言海東之事與古不同何也荅曰亦猶中國時代變革名號改易南史曰新羅魏時曰新盧宋時曰新羅或曰}
  - {type: page-break, offset: 3885, content: '', id: KR3k0012_SBCK_781-5b}
