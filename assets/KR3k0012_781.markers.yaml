  - {type: variant, offset: 3911, length: 7, content: 謁靈帝末韓獩並, SBCK: 因請唐禮一部并雜文章則天令冩吉凶要禮并於文館詞林採其詞渉規誡者勒成五十卷以賜之又曰􅄏元二十五年新羅王興光卒􅀇宗遣左賛善大夫邢璹往吊􅀕并􅁽其子承慶爲新羅王璹將發上製詩序太子以下及百寮咸賦詩以送之謂璹曰新羅號君子之國頗知書記有􅀋中華以卿渉學善於講論故選充此使到彼冝闡揚經典使知大國儒教之}
