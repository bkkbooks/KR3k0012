  - {type: variant, offset: 3885, length: 1, content: 廉, WYG: 天子賜尉仇台印綬金綵順帝永和元年其王來朝京師帝作黄門鼓吹角抵戲送遣之桓帝時亦朝貢獻帝時其王求屬遼東云魏志曰夫餘本屬𤣥莵其俗有敵諸加自戰下户俱擔粮飲食之其死夏月皆用氷有槨無棺停喪五月以乆為榮其居喪男女皆純白婦人著布衣而去環珮大體與中國相類漢末公孫度雄張海東威服外夷夫餘王尉仇台更屬遼東時句麗鮮卑强度以夫餘在二虜之間妻以宗女正始中幽州刺史毌丘儉討句麗遣𤣥莵太守王頎詣夫餘王位居遣大加郊迎供軍粮舊夫餘俗水旱不調五榖不熟輒歸咎於王或言當易或言當殺其印文言濊王之印國有故城名濊城葢本濊貊之地而夫餘王其中自謂亡人抑有以也晉書曰夫餘國至太康六年為慕容廆所襲破其王依慮自殺子弟走保沃沮武帝以何龕為䕶東夷校尉明年夫餘後王依羅遣使詣龕求率見人還復舊國遣督䕶賈沈以送之爾後每為廆掠其種人賣於中國帝又以官物贖還禁市夫餘之口自後無聞新羅秦書曰苻堅建元十八年新羅國王樓寒遣使衞頭獻美女國在百濟東其人多美髪髮長丈餘又曰符堅時新羅國王樓寒遣使衞頭朝貢堅曰卿言東海之事與古不同何也答曰亦猶中國時代變革名號改易南史曰新羅魏時曰新盧宋時曰新羅或曰}
