  - {type: variant, offset: 853, length: 264, content: 帝服其愽識臨海水土志曰夷州在臨海東南去郡二千里土地無雪霜草木不死四面是山眾山夷所居山頂有越王射的正白乃是石也此夷各號為王分畫土地人民各自別異人皆髡頭穿耳女人不穿耳作室居種荊為蕃鄣土地饒沃既生五穀又多魚肉舅姑子婦男女臥息共一大床交會之時各不相避能作細布亦作班文布刻畫其內有文章以為飾好也其地亦出銅鐵唯用鹿觡矛以戰鬭耳磨礪青石以作矢鏃刃斧鐶貫珠璫飲食不潔取生魚肉雜貯大器中以滷之歷日月乃啖食之以為上餚呼民人為彌麟如有所召取大空材材十餘丈以著中庭又以大杵旁舂之聞四五里如鼓民人聞之皆往馳赴會飲食皆踞相對鑿床作器如稀槽狀以魚肉腥臊安中十, SBCK: ''}
