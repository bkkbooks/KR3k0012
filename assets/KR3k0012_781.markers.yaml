  - {type: variant, offset: 3111, length: 255, content: 戶在上不知跪拜無長幼男女之別少綱紀國邑雖有主師不能相制御其葬有棺無槨不知騎乘牛馬不貴金寶錦罽唯重纓珠以綴衣為飾及懸頸垂耳大率皆魁頭露紒魁頭猶科頭也謂以髮縈繞成科結也紒音計布袍草履其人壯勇少年有築室作力者輒以繩貫脊皮縋以大木嚾呼為健善用弓盾矛櫓雖有鬭爭攻戰而貴相屈服俗信鬼神常以五月竟祭鬼神晝夜酒食群聚歌舞輒數十人相隨踏地為節十月農功畢亦如之諸國邑各以一人主祭天神號為天君又立蘇塗蘇塗者似浮塗建大木以懸鈴故事鬼神其南界近倭亦有文身者魏志曰馬韓漢桓靈之末韓獩強盛郡縣不能制民多流入韓國建安中公孫康分屯右縣以南荒地為, SBCK: 府}
