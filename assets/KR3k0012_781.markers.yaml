  - {type: variant, offset: 3910, length: 0, content: '', SBCK: 和玉燭七耀巡萬方維岳降宰輔帝任忠與良五三成一德昭我家大唐帝嘉之拜法敏爲太府卿又曰永徽六年百濟與髙麗鞂鞨率兵侵新羅北界其王春秋遣使上表求救顯慶五年命左武衛大將軍􅂫定方爲熊津道大惣管統水陸十萬仍令春秋爲嵎夷道行軍揔管與定方討平百濟俘其王扶餘義慈來獻自是新羅漸有髙麗百濟之地其界益大西至于海又曰龍朔三年詔以新羅國爲雞林州都督府授其王金法敏爲鷄林都督法敏卒其子政明嗣位垂拱二年遣使來}
  - {type: variant, offset: 3910, length: 0, content: '', WYG: 和玉燭七燿巡萬方維岳降宰輔帝任忠與良五三成一德昭我家大唐帝嘉之拜法敏為大府卿又曰永徽六年百濟與髙麗靺鞨興兵侵新羅北界其王春秋遣使上表求救顯慶五年命左武衞將軍蘇定方為熊津道大總管統水陸十萬仍令春秋為嵎夷道行軍總管與定方討平百濟俘其王扶餘義慈來獻自是新羅漸有髙麗百濟之地其界益大西至于海又曰龍朔三年詔以新羅國為雞林都督府授其王金法敏為雞林都督法敏卒其子政明嗣位垂拱二年遣使來}
