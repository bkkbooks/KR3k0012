  - {type: variant, offset: 3889, length: 3, content: 諟音是, SBCK: 有子賁旱支壹旱支齊旱支謁旱支壹吉支竒貝旱支其冠曰遺子禮􅃭曰尉解袴曰柯半靴曰洗其拜及行與髙麗相􅀋無文字刻木爲信語言待百濟而後通焉北史曰新羅者其先夲辰韓種也辰韓始有六國後稍分爲十二新羅則先夲辰韓種也辰韓始一也或稱魏將母丘儉討髙麗破之奔沷沮其後復歸故國有留者遂爲新羅亦曰斯盧其人􅄂有華夏髙麗百濟之屬兼有沷沮不耐韓􅐮之地其王夲百濟人自海逃入新羅遂王其國􅀄附庸百濟百濟征髙麗不堪戎役後相率歸之遂致強盛因襲百濟附庸於迦羅國焉又曰新羅王真平以隋開皇十四年遣使貢方物文}
  - {type: page-break, offset: 3889, content: '', id: KR3k0012_SBCK_781-6b}
