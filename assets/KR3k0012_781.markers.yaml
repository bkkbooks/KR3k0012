  - {type: variant, offset: 43, length: 521, content: 武王崩三監及淮夷叛三監管祭商淮夷徐奄之屬皆叛周周公相成王將黜殷命作大誥又蔡仲之命曰成王東伐淮夷遂踐奄成王即政淮夷奄國又叛王親征之遂滅奄而徙之作成王政為平淮夷徙奄之政令又費誓曰魯侯命伯禽宅曲阜徐戎並興東郊不開徐戎淮夷並起為寇於魯故東郊不開徂茲淮夷徐戎並興令往征此淮浦之夷徐州之戎並起為寇此戎夷帝王所羈縻統敘故錯居九州之內秦始皇遂出之善敹乃甲胄敿乃干無敢不弔備乃弓矢鍜乃戈矛礪乃鋒刃無敢不善左傳僖下曰杞桓公來朝用夷禮故曰子杞先代之後而迫於東夷風俗雜壞言語衣服有時而夷故傳言其夷也又成公上莒子曰辟陋在夷其孰以我為虞又襄公六曰杞夏餘也而即東夷行夷禮又定公下曰公會齊侯于杞其實夾谷孔丘相犂彌言於齊侯曰孔丘知禮而無勇若使萊人以兵劫魯侯必得志焉菜人齊所滅菜夷也齊侯從之孔丘以公退曰士兵之以兵擊菜人兩君合好而夷之俘以兵亂之遠也非齊君所以命諸侯也不謀夏夷不亂華齊侯聞之遽辟之辟兵菜兵也毛詩云苕之華大夫閔時也幽王之時西戎東夷交侵中國師旅並起因之以饑饉君子閔周室之將亡傷己逢之故作是詩也又江漢尹吉甫美宣王也能興衰撥亂命召公平淮夷江漢浮浮武夫滔滔匪安匪遊淮夷來求論語子罕曰子欲居九夷馬曰九夷東方之夷有九種或曰陋如之何子曰君子居之何陋之有馬曰君子所居則化後漢書曰王制云, SBCK: 古沙城}
