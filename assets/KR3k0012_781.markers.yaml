  - {type: variant, offset: 1372, length: 179, content: 俗言寧自負人千石之粟不願負人猴頭羹臛朝鮮尚書大傳曰武王勝殷繼公子祿父祿父紂之子也釋箕子之囚箕子不忍商之亡走之朝鮮朝鮮今樂浪郡武王聞之因以朝鮮封之箕子既受周之封不得無臣禮故於十二祀來朝史記曰朝鮮張晏注曰朝鮮有濕水洌水汕水合為洌水疑樂浪朝鮮取名於此又曰朝鮮王滿燕人也自始燕時嘗略屬真番朝鮮為置吏築鄣塞秦滅燕屬遼東外徼漢興為遠難守復脩遼東故塞至浿水為界屬燕燕王盧綰, SBCK: 刑罰}
