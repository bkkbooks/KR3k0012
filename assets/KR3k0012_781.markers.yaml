  - {type: variant, offset: 3826, length: 2, content: 准為, SBCK: 服大䄂紫􅂁青錦袴烏羅冠金花爲飾素皮帶鳥革履官人盡緋爲衣銀花飾冠庶人不得衣緋紫􅀊時伏臘同於中國其書籍有五經子史又表䟽並依中華之法其國西南海中有三島其上出黄􅃮樹似小榎而樹大六月取其汁添器物色如黄金其光自奪目又曰武徳四年百濟王扶餘璋遣使來獻果下馬七年又遣大臣奉表朝貢髙祖嘉其誠􅅃遣使就􅁽爲帶方郡王百濟王自此􅀊遣朝貢髙祖勞撫甚厚因訟髙麗閉其道路不許來通中國詔遣朱子奢徃和之又與新羅丗爲讎敵數相侵伐貞觀元年太宗賜其玉璽書令即停兵革璋因遣使奉表陳謝雖外稱順命内實相仇如故十一年遣使來朝獻鐵甲雕斧太宗優勞之賜綵帛錦􅂁等又曰貞觀十六年百濟王義慈興兵伐新羅四十餘城又與髙麗和親通好謀欲取党項城以絶新羅入朝之道新羅遣使告急請救太宗遣司農丞相里玄􅅄賫書告諭兩蕃示以禍福及太宗親征髙麗百濟懷貳乗虚襲破新羅七城二十二年又破其十餘城數年之中朝貢遂絶髙宗嗣位始遣使朝貢六年新羅王金春秋上表稱百濟與髙麗靺鞨侵其北界己􅃿三十餘城顯慶五年命左}
