  - {type: variant, offset: 1594, length: 1178, content: 故燕齊亡命者王之子都王險王險地名會孝惠高后時天下初定遼東太守即約滿為外臣保塞外蠻夷毋使侵盜邊以聞上許之以故滿得以兵威財物侵降其旁小邑真番臨屯皆來服屬方數千里傳子至孫右渠所誘漢亡人滋多又未嘗入見真番旁眾國欲上書見天子又雍閼弗通元封二年漢使涉何譙諭右渠終不肯奉詔師古曰責讓也音才笑切何去至界臨浿水使馭刺殺送何者朝鮮禆王長長禆王名也即渡水馳入塞遂歸報天子曰殺朝鮮將上為其名美即不詰拜何為遼東東部都尉朝鮮怨何發兵襲攻殺何天子募罪人擊朝鮮其秋遣樓舡將軍楊僕自齊浮渤海兵五萬人左將軍荀彘出遼東討右渠右渠發兵距險天子為兩將軍未有利乃使衛山因兵威往諭右渠右渠見使者頓首謝欲降恐兩將詐殺臣今見信節請服遣太子入謝獻馬五千疋及餽軍糧人眾萬餘持兵渡浿水使者及左將軍疑其為變謂太子已服降宜令人毋持兵太子亦疑使者左將軍詐殺之遂不渡浿水復引歸左將軍破浿水上軍迺前至城下圍其西北樓舡亦往會居城南右渠遂堅城守數月未能下左將軍急擊之朝鮮大臣迺陰間使人約降樓舡往來言尚未肯決天子使濟南太守公孫遂往征之有便宜得以從事遂至以節召樓舡將軍入左將軍營計事即命左將軍戲下執縛樓舡將軍并其軍以報天子天子誅逐左將軍已并兩軍即急擊朝鮮朝鮮相路人韓陶尼谿相參將軍王唊師古曰相路一人也韓陶二人也尼谿相參三也將軍王唊四也唊音頰相與謀使人殺朝鮮王右渠來降王儉城未下故右渠之大臣成已又反復攻吏左將軍使右渠子長降相路人子最告諭其民誅成已遂定朝鮮為真番臨屯樂浪玄菟四郡漢書地理志曰玄菟樂浪武帝時初置皆朝鮮獩貉勾驪蠻夷殷道衰箕子去之朝鮮教其民以禮義田蚕織作樂浪朝鮮民犯禁八條如淳曰有其四其四不見相殺以當時償殺相傷者以穀償相盜者男沒入為其家奴女子為婢欲自贖者人五十萬雖免為民俗猶羞之嫁娶無所讎是以其民終不相盜無門戶之閉婦人貞信不淫辭其田民飲食以籩豆都邑頗放效吏及內郡賈人往往以杯器食郡初取吏於遼東吏見民無閉藏及賈人往者夜則為盜俗稍益薄今相犯禁䆮多致六十餘條可貴哉仁賢之化也然東夷天性柔順異於三方之外故孔子悼道之不行乘桴浮於海欲居九夷有以也獩貊魏志曰獩貊國南與辰韓北與高勾麗沃沮接東窮大海今朝鮮之東皆其地也戶二萬餘昔箕子既適朝鮮作八條之教無門戶之閉而民不為盜其後四十餘世朝鮮侯淮僣號稱王陳勝等起略叛秦燕齊趙民避地東入朝鮮數萬口燕人衛滿魋結夷服復來王之漢武帝伐滅朝鮮分其地為四郡自是之後胡漢稍別無大君長自漢已來其官有侯邑君三老統主下戶其耆舊自謂與勾麗同種其人性愨愿少嗜慾有廉恥不請勾麗言語法俗大抵與勾麗同衣服有異男女衣皆著曲領男子繫銀花廣數寸以為飾自單單大嶺以西屬樂浪以東七縣都尉主之皆以獩為民後省都尉封其渠帥為侯今不耐獩皆其種也其俗同姓不婚多忌諱每疾病死亡輒捐棄舊宅更作新居布麻蚕綿飲食亦有俎豆曉侯星宿豫知年歲豊約嫁娶喪葬之法有似勾麗不以珠玉為寶常用十月節祭天晝夜飲酒歌儛名為儛天又祭虎以為神其邑落相侵犯輒相罰責生口牛馬之名曰責禍, SBCK: ''}
