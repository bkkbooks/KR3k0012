  - {type: variant, offset: 1763, length: 488, content: 薄於虞泉羲和至此而廻六螭即六龍也薄於虞泉是謂黃昏淪于蒙谷是謂定昏日入崦音淹嵫音茲示日落嘗山經細柳細柳西方之野入虞泉之池曙於蒙谷之浦蒙谷蒙汜之水日西垂景在樹端謂之桑榆言其光在桑榆樹上又曰日中有踆七論切烏踆者趾也謂三足烏又曰若木在建木西末有十日其華照地高誘注曰末端也若木端有十日狀如連珠華光照其下地又曰日者陽之主是以春夏則群獸除角又曰堯時十日並出草木穛枯堯命羿仰射十日其九烏皆死墮羽翼又曰日積陽之熱氣生火火氣之精者為日列子曰宋有田夫曝日於野美之不識廣廈綿縞之屬謂其妻曰吾負日之暄以獻吾君將獲重賞又曰穆王駕八駿之乘西觀日所入處又曰日積氣之中有光耀者又曰孔子晨遊見兩小兒爭辯而鬥孔丘問其故一兒曰我以日始出時去人近日中時去人遠一兒曰我以為日初出時遠而日中時近曰爾何以知曰日初出大如車輪及中纔如盤蓋此不為遠者小而近者大乎一兒曰日初出滄滄涼涼及其中如探湯此不為近者熱而遠者涼乎孔子不能決兩兒笑曰丘孰謂汝多知乎文子曰日出於地萬物蕃息尸子曰日五色至陽之精象君德也五色照耀君秉土而王又曰少昊金天氏邑於窮桑日五色互照窮桑又曰聖人以日圓光盈尺光滿天下聖人居室而所燭彌綸六合又曰火在井中不能燭遠目在足下, krp: ''}
