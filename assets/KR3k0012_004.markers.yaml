  - {type: punctuation, offset: 48, content: 「, id: KR3k0012_CHANT_004-bkkpn29}
  - {type: variant, offset: 49, length: 0, content: '', WYG: 觀日觀鷄鳴時見日魏志曰程立夢登太山捧日立以白太祖太祖遂加日於立上因改名昱晋書曰荀爽曰日下荀鳴鶴晋陽秋曰建武元年三日並出三齊略曰秦始皇作石橋於海上欲過海看日出處有神人驅石去不速神人鞭之皆流血今石橋猶赤色李尤九曲歌曰年嵗晩暮日已斜安得壯士翻日車日蝕書曰乃季秋}
  - {type: page-break, offset: 49, content: '', id: KR3k0012_WYG_004-5b, image: WYG0893/WYG0893-0063d.png}
  - {type: variant, offset: 50, length: 6, content: 運行一寒一暑, WYG: 朔辰弗集于房瞽奏鼔嗇夫馳庻人走凡日食天子鼔于社責上公也嗇夫主幣之官馳取幣禮衆人走供敕日食之百役也禮記昏義曰男教不脩陽事不得謫見於天日為之蝕是故日蝕則天子素服而修六官之職蕩天下之陽事左傳曰魯昭公十七年日有蝕之祝史請用幣叔孫昭子曰日有蝕之天子不舉伐鼓於社諸侯用幣於社伐鼓於朝禮也}
  - {type: page-break, offset: 50, content: '', id: KR3k0012_WYG_004-6a, image: WYG0893/WYG0893-0064a.png}
