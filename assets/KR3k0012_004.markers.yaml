  - {type: variant, offset: 1252, length: 362, content: 江東都督鎮楊州時中原喪亂有人從長安來帝問洛下消息潛然流涕帝年數歲問泣故具以東渡意告之因問帝汝意謂長安何如日遠荅曰不聞人從日邊來聞人從長安來居然可知帝異之明日集群臣宴會說以此荅明帝又以為日近帝動容問何故異昨日之言荅曰舉頭不見長安只見日以是知近帝大悅搜神記曰吳孫堅夫人懷孫策夢日月入懷解道康齊地記曰齊有不夜城蓋古者有日夜中照於東境故萊子立此城以不夜為名七聖紀曰鬱華赤文與日同居結鱗黃文與月同居鬱華日精結鱗月精也莊子曰陽燧見日則燃為火金也摩拭令熱便置日中以艾就之火生又曰孔子圍於陳蔡太公吊之曰子其昭昭如揭日月而行故不免又曰日出東方入於西極有目有趾者待是而成功又曰至人神矣乘雲氣騎日月淮南子曰日出於陽谷浴於咸池拂於扶桑是謂晨明登於扶桑之上扶桑東方之野爰始將行是謂朏音斐明朏明將明也至于曲阿曲河山名是謂朝明臨于曾泉曾重也早食時在東方多, WYG: ''}
