  - {type: variant, offset: 3169, length: 1, content: 復, krp: 又育厥利維何而顧兎在腹言月中兎何所貪利而居月之腹顧望也運斗樞曰后族檀權月生足芒主勢奪於后族羣妃之黨撗僣則月盈並出小月承大月羣姦在宫主若贅旒大承小近臣起䜛人撗陪臣執命三公望氣崔豹古今注曰漢明帝作太子樂人歌四章以賛太子之德其一曰日重光二曰月重輪三曰星重曜四曰海重潤漢書曰月立夏夏至行南方赤道曰南陸立秋秋分行西方白道曰西陸立冬冬至行北方黑道曰北陸分則同道至則相過晦而見西方謂之朓朔而見東方謂之肭亦謂之側匿朓音他了反肭音女六反朓健行疾貌也肭縮遲貌側匿猶縮儒亦遲貌又曰月穆穆以金波蓋光彩皃又曰元后母夢月入懷而生元后又曰髙帝七年月暈圍參畢七重占曰畢昴間天街也街北胡也街南中國也昴爲匈奴參爲趙畢爲邊兵是歲髙祖自將至平城爲冒頓所圍七日廼解又曰李尋上書曰月者衆隂之長妃后大臣諸侯之象也晉書曰謝太傅庭中夜坐月色無玷歎以爲佳謝景重率爾曰意謂不如微雲點綴太傅曰卿居心不淨乃欲滓穢太清又曰徐孺子年九歲月下戯人或曰若令月中無物當極愈明徐曰不爾譬如眼中無瞳子何必不暗後魏書曰天興五年十月月暈左角太史令晁宗奏角䖝將死牛果大疫麋亦多死楊雄長楊賦曰西壓月窟窟月所出入也東震日域傅玄擬天問曰月中何有白兎擣藥傅咸詩曰團團三五月皎皎耀清輝陸機詩曰安寢北堂上明月入我牖照之有餘輝攬之不盈手宋謝靈運怨曉月賦曰卧洞房兮當何恱滅華燭兮弄曉月昨三五兮旣滿今二八兮將鈌浮雲褰兮収泛濫明舒照兮殊皎㓗墀除兮鏡監廊櫳兮澄澈宋謝莊月賦曰陳王初䘮應劉端憂多暇悄焉疚懷弗怡中夜于時斜漢左界北陸南躔白露曖空素月流天沉吟齊章殷勤陳篇抽毫進牘以命仲宣仲宣跪而稱曰臣聞日以陽德月以隂靈擅扶光於東沼嗣若英於西溟引玄兎於帝臺集素娥於后庭若夫氣霽地表雲歛天末洞庭}
