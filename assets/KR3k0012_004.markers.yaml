  - {type: variant, offset: 2047, length: 204, content: 鬥孔丘問其故一兒曰我以日始出時去人近日中時去人遠一兒曰我以為日初出時遠而日中時近曰爾何以知曰日初出大如車輪及中纔如盤蓋此不為遠者小而近者大乎一兒曰日初出滄滄涼涼及其中如探湯此不為近者熱而遠者涼乎孔子不能決兩兒笑曰丘孰謂汝多知乎文子曰日出於地萬物蕃息尸子曰日五色至陽之精象君德也五色照耀君秉土而王又曰少昊金天氏邑於窮桑日五色互照窮桑又曰聖人以日圓光盈尺光滿天下聖人居室而所燭彌綸六合又曰火在井中不能燭遠目在足下, SBCK: ''}
