  - {type: variant, offset: 3172, length: 4, content: 環無端說, WYG: 玉鈎未映東北墀姢姢似蛾眉蛾眉蔽珠櫳玉鈎隔璅窻三五二八時千里與君同夜移衡漢落徘徊帷幌中梁沈約詠月詩曰月華臨静夜夜静滅氛埃方暉竟户入圓影隙中來髙樓切思婦西園遊上才網軒映珠綴應門照緑苔洞房殊未曉清光信悠哉周王褒關山月詩曰關山夜月明愁色照孤城半形同漢陣全影逐胡兵灰寒色轉白風多暈欲生寄言亭上吏遊客解鷄鳴月蝕易曰月盈則蝕詩曰彼月而食則維其常禮曰婦順不修隂事不得謫見於天月為之蝕故月蝕則后素服而修六宫之職蕩天下之隂事淮南子曰麒麟鬭則日月食又月望日奪其光十五日與日相望東西中絶則月蝕奪光也劉向説}
