  - {type: variant, offset: 3166, length: 44, content: 度終而復始如環無端說苑曰師曠對晉平公曰少而學者如日出之光壯而學者如日中之光老而學者如秉燭, SBCK: ''}
  - {type: variant, offset: 3166, length: 2, content: 度終, WYG: 夜二萬六千里與鳬飛相類地說書曰月行四十五萬里徐整長厯曰月徑千里周圍三千里下於天七千里楚詞天問曰夜光何德死}
  - {type: variant, offset: 3166, length: 2, content: 度終, krp: 夜行二萬六千里與鳬飛相類地說書曰月照四十五萬里徐整長曆曰月俓千里周圍三千里下於天七千里楚詞天問曰夜光何德死}
