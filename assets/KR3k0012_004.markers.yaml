  - {type: variant, offset: 1051, length: 1, content: 黃, SBCK: 月之爲言闕也兩設以蟾蠩與兎者隂陽􅀟居明陽之制隂隂之􅀝陽帝王世紀曰堯時有草夾階而生毎月朔日生一莢至月半則生十五莢至十六日後日落一莢至月晦而盡􅀂月小餘一莢王者以是占曆唯盛徳之君應和}
  - {type: variant, offset: 1051, length: 130, content: 黃氣抱日輔臣忠德至於天日抱戴易傳曰聖王在上則日光明五色而備又曰日者眾陽之精內明玄黃五色無主以象人君精精似青翼翼似黑玄玄似赤縞縞似白煌煌似黃光照無主不可以一色名也劉向洪範傳曰日者照明之大表光景之大紀群陽之精眾貴之象也故曰日出而天下光明日入而天下冥晦此其効也故日者, WYG: 月}
  - {type: variant, offset: 1051, length: 1, content: 黃, krp: 月之爲言闕也兩設以蟾蠩與兎者隂陽雙居明陽之制隂隂之倚陽帝王世紀曰堯時有草夾階而生毎月朔日生一莢至月半則生十五莢至十六日後日落一莢至月晦而盡若月小餘一莢王者以是占曆唯盛徳之君應和}
