  - {type: variant, offset: 3169, length: 1, content: 復, WYG: 又育厥利維何顧兎在腹言月中兎何所貪利而居月之腹顧望也運斗樞曰后族擅權月生足芒主勢奪於后族羣妃之黨横僭則月盈並出小月承大月羣姦在宫主若贅旒大承小近臣起䜛人横陪臣執命三公望風崔豹古今注曰漢明帝作太子樂人歌四章以賛太子之徳一曰日重光二曰月重輪三曰星重曜四曰海重潤漢書曰月穆穆以金波蓋光彩貎又元后母夢月入懐而生元后又髙帝七年月暈圍參畢七重占曰畢昴間天街也街北胡也街南中國也昴為匈奴參為趙畢為邊兵是嵗髙祖自將至平城為冒頓所圍七日迺解又李尋上書曰月者衆隂之長妃后大臣諸侯之象也晋書曰謝太傅庭中夜坐月色無玷歎以為佳謝景重率爾曰意謂不如㣲雲㸃綴太傅曰卿居心不凈乃欲滓穢太清耶又徐孺子年九嵗月下戲人或曰若月中令無物當極愈明徐曰不爾譬如眼中無瞳子何必不暗後魏書曰天興五年十月月暈左角太史令晁宗奏曰角蟲將死牛果大疫鹿亦多死揚雄長楊賦曰西壓月窟窟月所出入也東震日域傳𤣥擬天問曰月中何有玉兎𢷬藥傳咸詩曰團團三五月皎皎濯清輝陸機詩曰安寢北堂上明月入我牖照之有餘耀攬之不盈手宋謝靈運怨曉月賦曰卧洞房兮當何悦滅華燭兮弄曉月照三五兮既滿今二八兮將缺浮雲褰兮收泛濫明舒照兮殊皎㓗墀除兮鏡鑒房櫳兮澄澈宋謝莊月賦曰陳王初䘮應劉端憂多暇悄焉疚懐弗怡中夜于時斜漢左界北陸南躔白露曖空素月流天沉吟齊章殷勤陳篇抽毫進牘以命仲宣仲宣跪而稱曰臣聞日以陽徳月以隂靈擅扶光於東沼嗣若英於西溟引𤣥兎於帝臺集素娥於后庭若夫氣霽地表雲歛天末洞庭}
