  - {type: variant, offset: 3160, length: 0, content: '', SBCK: 景星者天醒音精也狀如半月生於晦朔助月爲明王者不􅀻人則見虞喜安天論曰俗傳月中仙人桂樹今視其􅀄生見仙人之足漸巳成形桂樹後生焉劉向七略曰京房易􅀃云月與星至隂也有形無光}
  - {type: variant, offset: 3160, length: 0, content: '', WYG: 景星者大星也其狀如半月生於晦朔助月為明王者不私人則見虞喜安天論曰俗傳月中仙人桂樹今視其初生見仙人之足漸以成形桂樹後生焉京房易説云月與星至隂也有形無光}
  - {type: page-break, offset: 3160, content: '', id: KR3k0012_WYG_004-16b, image: WYG0893/WYG0893-0069b.png}
  - {type: variant, offset: 3160, length: 0, content: '', krp: 景星者天醒音精也狀如半月生於晦朔助月爲明王者不私人則見虞喜安天論曰俗傳月中仙人桂樹今視其𥘉生見仙人之足漸巳成形桂樹後生焉劉向七略曰京房易說云月與星至隂也有形無光}
  - {type: variant, offset: 3161, length: 0, content: '', SBCK: 照之乃有光喻如鏡照日即有影見月初光見西方望巳後光見東方皆曰所照也皇甫謐年暦曰月}
  - {type: page-break, offset: 3161, content: '', id: KR3k0012_SBCK_004-10b}
  - {type: variant, offset: 3161, length: 0, content: '', WYG: 照之乃有光喻如鏡照日即有影見月初光見西方已後望光見東方皆日所照也皇甫謐年厯曰月}
  - {type: variant, offset: 3161, length: 0, content: '', krp: 照之乃有光喻如鏡照日即有影見月初光見西方望巳後光見東方皆曰所照也皇甫謐年暦曰月}
  - {type: variant, offset: 3162, length: 0, content: '', SBCK: 羣隂之宗月以霄曜名曰夜光遁甲開山圖榮氏解曰女狄暮汲石紐山下泉水中得月精如雞子愛而含之不覺而吞遂有娠十四月生夏禹論衡曰月}
  - {type: variant, offset: 3162, length: 0, content: '', WYG: 羣隂之宗月以宵曜名曰夜光遁甲開山圖榮氏觧曰女狄暮汲石紐山泉水中得月精如鷄子愛而含之不覺而吞遂有娠十四月生夏禹論衡曰月}
  - {type: page-break, offset: 3162, content: '', id: KR3k0012_WYG_004-17a, image: WYG0893/WYG0893-0069c.png}
