  - {type: variant, offset: 924, length: 1, content: 七, SBCK: 天秉陽垂日星秉猶持也言天持陽氣施生照下土也地秉隂竅於山川播五行於四時和而后月生也是以三五而盈三五而闕竅孔也言地持隂氣岀内於山川以舒五行於四時也此氣和乃后月生而上配日若臣功成進爵位一盈也闕屈伸之義也必三五者播五行於四時一曰水二曰火三曰木四曰金五曰土合爲十五之成數也又曰月者三日而成魄三月而成時是以有三讓建國必立三卿三賔者}
  - {type: variant, offset: 924, length: 1, content: 七, krp: 天秉陽垂日星秉猶持也言天持陽氣施生照下土也地秉隂竅於山川播五行於四時和而后月生也是以三五而盈三五而闕竅孔也言地持隂氣岀内於山川以舒五行於四時也此氣和乃后月生而上配日若臣功成進爵位一盈也闕屈伸之義也必三五者播五行於四時一曰水二曰火三曰木四曰金五曰土合爲十五之成數也又曰月者三日而成魄三月而成時是以有三讓建國必立三卿三賔者}
  - {type: variant, offset: 926, length: 0, content: '', SBCK: 教之本禮之大叅也言禮者隂也大數取法於月也又曰天子與后猶日之與月陽之與隂相須而後成又曰秋分之日祀夕月於西郊又曰􅀕日於壇􅀕月於坎以別幽明以制上下幽明者謂日照晝月照夜又曰太隂之精上爲月月者天地之隂金之精也傳曰楚晉將戰吕錡夢射中月退入於泥占之曰姬姓日也異姓月也必楚王也及戰射恭王傷目吕錡死之京房易飛􅀱曰正月有偃月必有嘉主尚書大傳曰晦而月見西方謂之朓朓條也條逹行疾㒵朔而月見東方謂之側匿側匿猶行遲貌側匿則侯王其肅粛急也日君象也月臣象也君政急則日行疾月行徐臣逡廵不進朓則侯王其徐徐緩也君政緩日行徐月行疾臣放恣也詩推}
  - {type: page-break, offset: 926, content: '', id: KR3k0012_SBCK_004-7a}
