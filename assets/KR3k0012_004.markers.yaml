  - {type: variant, offset: 99, length: 1, content: 下, krp: 子不舉伐鼔於社諸侯用幣於社伐鼔於朝禮也又莊二十五年曰夏六月辛未朔日有蝕}
  - {type: variant, offset: 101, length: 1, content: 貨, SBCK: 鼔用牲于社非常也唯正月之朔慝未作日有蝕之於是乎用幣于社伐鼔于朝注曰日蝕曆之常也然食於正陽月則諸侯用幣于社請救于上公伐鼔于朝退而自責以明隂不冝侵陽臣不冝掩君公羊傳曰六月辛未朔日有蝕之以朱絲縈社或曰脅之或曰爲暗恐犯之故縈之社者土地之主日者土地之精上敷於天而犯日故朱絲縈之助陽抑隂榖梁傳曰天子救日置五麾陳五兵五鼔諸侯置三麾三兵三鼔大夫擊拆凡有聲皆陽事也以猒隂氣也論語云日月之蝕人皆見之更也人皆仰之漢書曰黄琬祖父香爲魏郡守時日蝕而京師不見魏郡乃表日食之􅃺帝問日食多少香乆而無對琬年六􅀊在傍謂香曰日食之餘如月之􅀄遂用其言荅詔漢書曰日者德也故日蝕則脩德}
