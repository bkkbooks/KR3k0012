  - {type: variant, offset: 554, length: 1, content: 傳, SBCK: 日東則景夕多風日西則景朝多隂日至之景尺有五寸謂之地中天地之所合也四時之所交也風雨之所㑹也隂陽之所和也土圭所以致四時日月之景也測猶度也不知廣􅀷故日測鄭司農云測土􅀷謂南北東西之􅀷也日南謂立表處太南近日}
