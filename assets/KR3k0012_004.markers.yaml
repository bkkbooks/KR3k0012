  - {type: punctuation, offset: 42, content: 「, id: KR3k0012_CHANT_004-bkkpn25}
  - {type: variant, offset: 43, length: 0, content: '', WYG: 南郡人應向北看日答曰臣聞鴈門不見壘鴈為門金城郡不見積金為郡臣雖居日南未嘗向北看日雜兵書曰天月無度借日度為度天月無光借日光為光經星亦然故日者實也君主之象也凡天象}
  - {type: page-break, offset: 43, content: '', id: KR3k0012_WYG_004-5a, image: WYG0893/WYG0893-0063c.png}
  - {type: variant, offset: 44, length: 3, content: 烜之又, WYG: 日為主應劭漢官儀曰太山東南名}
