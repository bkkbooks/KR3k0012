  - {type: variant, offset: 7, length: 1, content: 云, SBCK: 帝時日中有王字徐整長曆曰泉湯之精上合爲日徑千里周圍三千里下於天七千里談藪曰魏文帝爲王時夢日墜地分爲三巳得一分而内懷中鄧析書曰君者當如冬日之陽夏日之隂萬物歸之莫之使也王充論衡曰日不入地也譬人把火夜行平地去人十里火光藏矣非滅也又曰夫日月不圎視之如圎者去人逺也夫日火精也在地火不圎在天火何故獨圎日月在天猶五星五星猶列星不圎何以明之春秋之時星隕宋都視之石也不圎是知日月五星亦不圎也又曰儒書言魯陽公與韓戰戰酣日暮援戈而麾之日爲之反三舎此言虚也凡人能以精誠感動天者專心一意委務積神通天天爲變動然尚未可謂然魯陽公志在於戰爲日暮一麾安能令日反使聖人麾日日終不反魯陽公何人而使日反又曰儒言日中有三足烏}
