  - {type: 'tls:seg', offset: 34, content: '', id: KR3k0012_CHANT_004-2a.4}
  - {type: variant, offset: 34, length: 51, content: 又曰日中則昃又曰日以烜之又曰日月運行一寒一暑又曰陰陽之義配日月又曰懸象著明莫大乎日月又曰日月之道貞明者, SBCK: 氣}
  - {type: variant, offset: 34, length: 0, content: '', WYG: 汲冡書曰徹甲居於河西天有妖孽十日並出}
  - {type: page-break, offset: 34, content: '', id: KR3k0012_WYG_004-4a, image: WYG0893/WYG0893-0063a.png}
  - {type: variant, offset: 34, length: 51, content: 又曰日中則昃又曰日以烜之又曰日月運行一寒一暑又曰陰陽之義配日月又曰懸象著明莫大乎日月又曰日月之道貞明者, krp: 氣}
  - {type: variant, offset: 35, length: 0, content: '', WYG: 言本有十日迭次而遣運照無窮金匱曰三苖之時三月不見日黄帝占書}
