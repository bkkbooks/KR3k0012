  - {type: variant, offset: 12, length: 21, content: 太陽之精不虧字從口一象形也又君象也易曰離為, SBCK: 烏入火中燋爛安得而立然烏}
  - {type: variant, offset: 12, length: 0, content: '', WYG: 烏入火中燋爛安得而立然烏日氣也又日中近出入逺日中小者光明故也出入時大者光闇故也夏桀無道兩日並照在東者將起在西者將滅費昌問馮夷曰何者為殷何者為夏馮夷曰西夏也東殷也於是費昌徙族歸殷殷果克隆又儒者論日出扶桑暮入細栁扶桑東方之地細栁西方之野又日晝行千里夜行千里騏􅂹晝行亦千里然則日行舒疾與騏驥歩相類崔豹古今注曰漢明帝為太子樂人作歌詩四章一曰日重光云天子之徳光明如日太子比徳焉故云重光周髀曰日光外照徑八十一萬里徐幹中論曰文王遇姜公于渭陽若披雲見白日物理論曰日者}
  - {type: page-break, offset: 12, content: '', id: KR3k0012_WYG_004-3a, image: WYG0893/WYG0893-0062c.png}
  - {type: page-break, offset: 12, content: '', id: KR3k0012_WYG_004-3b, image: WYG0893/WYG0893-0062d.png}
