  - {type: variant, offset: 3, length: 0, content: '', WYG: 千里下於天七千里談藪曰魏文帝為王時夢}
  - {type: variant, offset: 4, length: 4, content: 上說文云, WYG: 墜地分為三已得一分而内懐中鄧析子曰君者當如冬日之陽夏日之隂萬物歸之莫之使也王充論衡曰日不入地也譬如把火夜行平地去人十里火光藏矣非滅也又夫日月不圓視之如圓者去人逺也夫日火精也在地火不圓在天火何故獨圓日月在天猶五星五星猶列星不圓何以明之春秋之時星隕宋都視之石也不圓是知日月五星亦不圓也又儒書言魯陽公與韓戰戰酣日暮援戈而以麾之日為之反三舎此言虛也凡人能以精誠感動天者専心一意委務積神通天天為變動然尚未可謂然魯陽公志在於戰為日暮一麾安能令日反使聖人麾日日終不反魯陽公何人而使日返又儒言日中有三足烏}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_WYG_004-2a, image: WYG0893/WYG0893-0062a.png}
