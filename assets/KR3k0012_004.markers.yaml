  - {type: variant, offset: 89, length: 6, content: 中為市致天下, WYG: 者徳也故日蝕則修徳又劉寵鄭𢎞徐昉趙喜虞延並無事以日食免官淮南子曰麒麟鬭則日月蝕許慎注曰麒麟獨角}
  - {type: variant, offset: 90, length: 3, content: 為市致, SBCK: 近出入逺日中小者光明故也出入時大者光闇故也又曰桀無道兩日並照在東者將起在西者將滅費昌問馮夷曰何者爲殷何者爲夏馮夷曰西夏也東殷也於是費昌徙族歸殷殷果克隆又曰儒者論日出扶桑暮入細栁扶桑東方之地細栁西方之野又曰日晝行千里夜行千里騏􅂹晝日亦千里然則日行舒疾與騏􅂹歩相􅀋崔豹古今注曰漢明帝爲太子樂人作歌詩四章一曰日重光云天子之德光明如日太子比德焉故云重也周髀曰日光外照徑八十一萬里徐幹中論曰文王遇姜公于渭陽􅀂披雲見白日物理論曰日者太陽之精也夏則陽盛隂衰故晝長夜短冬則隂盛陽衰故晝短夜長氣引之也行陽之道長故出入夘酉之北行隂之道短故出入夘酉之南春秋隂陽等故日行中平晝夜等也地說書曰日照四十五萬里皇甫謐季曆曰日者衆陽之宗陽精外發故日以晝明名曰曜靈龍魚河圖曰陽積精爲日汲􅃁書曰胤甲居於河西夫有妖㜸十日並出又言本有十日迭次而運照無窮金匱曰三苗之時三月不見日黄帝占書曰日中三足烏見者其所居分野有白衣㑹楚辭曰十日並出流金鑠石戰國筞曰聶政刺韓相荆軻刺秦王並白虹貫日史記曰漢景帝王夫人姙娠夢日入懷以生武帝又曰堯其仁如天其知如神就之如日望之如雲漢書曰李尋上䟽曰夫日者宗陽之長暉光所燭萬里同晷人君之表也故日將旦清風發暉羣隂退伏又曰文帝時新垣平上言日再中臣以􅃸知之居頃之際日却復中乃更以十七秊爲元秊又曰鄒陽上書􅀃梁孝王曰昔荆軻慕燕丹之義白虹貫日太子畏之後漢書曰張重字仲篤明帝時舉孝廉帝曰何郡小吏荅曰臣日南吏帝曰日南郡人應向北㸔日荅曰臣聞鴈門不見壘鴈爲門金城郡不見積金爲郡臣雖居日南未甞向北看日應劭漢官儀曰太山東南名曰日觀日觀雞鳴時見日魏志曰程立夢登太山捧日立以白太祖太祖遂加日於立上因改名昱􅀳書曰荀爽曰日下荀鳴鶴􅀳陽秋曰建武元年三日並出三齊略曰秦始皇作石橋於海上欲過海看日出處有神人驅石去不速神人鞭之皆流血今石橋猶赤色季尤九曲歌曰年歳晩暮日巳斜安得壯士飜日車日蝕書曰乃季秋月朔辰弗集于房瞽奏鼔嗇夫馳庶人走凡日食天子伐鼔于社責上公也嗇夫主幣之官馳取弊禮天神衆人走供敕日食之百役也禮記昏義曰男教不脩陽事不得謫見於天日爲之蝕是故日蝕則天子素服而修六官之職蕩}
