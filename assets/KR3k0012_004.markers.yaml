  - {type: variant, offset: 38, length: 2, content: 則昃, WYG: 三足烏見者其所居分野有白衣㑹楚辭曰十日並出流金鑠石戰國䇿曰聶政刺韓相荆軻刺秦王並白虹貫日史記曰漢景帝王夫人姙娠夢日入懐以生武帝}
