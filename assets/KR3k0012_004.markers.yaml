  - {type: 'tls:seg', offset: 58, content: '', id: KR3k0012_CHANT_004-3a.6}
  - {type: punctuation, offset: 58, content: 「, id: KR3k0012_CHANT_004-bkkpn34}
  - {type: variant, offset: 58, length: 1, content: 陰, WYG: 夏六月辛未朔日有蝕之鼓用牲于社非常也唯正月之朔慝未作日有蝕之於是乎用幣于社伐鼓於朝注曰日蝕厯之常也然食於正}
  - {type: variant, offset: 60, length: 0, content: '', WYG: 月則諸侯用幣於社請救於上公伐鼓於朝退而自責以明隂不宜侵陽臣不宜掩君公羊傳曰六月辛未朔日有蝕}
  - {type: page-break, offset: 60, content: '', id: KR3k0012_WYG_004-6b, image: WYG0893/WYG0893-0064b.png}
  - {type: variant, offset: 61, length: 2, content: 義配, WYG: 以朱絲縈社或曰恊之或曰為暗恐犯之故縈之社者土地之主}
  - {type: variant, offset: 64, length: 2, content: 月又, WYG: 者土地之精上敷於天而犯日故朱絲縈之助陽抑隂榖梁傳}
