  - {type: variant, offset: 1191, length: 184, content: 國之應也明王之踐位群賢履職天下和平黎民康寧則日麗其精明揚其景耀抱珥重光以見吉祥君獲慶賀劉昭幼童傳曰晉明帝諱紹元帝子初元帝為江東都督鎮楊州時中原喪亂有人從長安來帝問洛下消息潛然流涕帝年數歲問泣故具以東渡意告之因問帝汝意謂長安何如日遠荅曰不聞人從日邊來聞人從長安來居然可知帝異之明日集群臣宴會說以此荅明帝又以為日近帝動容問何故異昨日之言荅曰舉頭不見長安只見日以是知近帝大悅, SBCK: ''}
