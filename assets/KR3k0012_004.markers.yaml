  - {type: 'tls:seg', offset: 40, content: '', id: KR3k0012_CHANT_004-2a.6}
  - {type: variant, offset: 41, length: 0, content: '', WYG: 堯其仁如天其知如神就之如日望之如雲漢書曰李尋上疏曰夫日者衆陽之長暉光所燭萬里同晷人君之表也故日將旦清風𤼵羣隂伏又文帝時新垣平上言日再中臣以候知之居頃之際日却復中乃更十七年為後元年又鄒陽上書説梁孝王曰昔荆軻慕燕丹之義白虹貫日太子畏之後漢書曰張重字仲篤明帝時舉孝廉帝曰何郡小吏答曰臣日南吏帝}
  - {type: page-break, offset: 41, content: '', id: KR3k0012_WYG_004-4b, image: WYG0893/WYG0893-0063b.png}
