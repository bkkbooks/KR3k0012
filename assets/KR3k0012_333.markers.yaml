  - {type: variant, offset: 1730, length: 0, content: '', SBCK: 渠荅鐵蒺䔧也調立城邑母下千家爲中周虎落虎落外藩也上從其言募民從塞下又曰錯復言臣聞古之徙逺方以實廣虚也相其隂陽之利甞其水泉之味審其􅁟地之冝觀其草木之饒然後營邑立城製里割宅通田作之道正阡陌之界先爲築室家有一堂二内二内内房也置器物焉此民所以輕去故郷而勸之新邑爲置醫藥巫以救疾病以脩􅀕祀男女有昬生死相恤此所以使民樂其處而有長居之心也又曰宣帝地節三年詔曰朕旣不徳不能附逺是以邊境屯戍未息今復飾兵重屯乆勞百姓非所以綏天下也其罷車􅀐將軍右將軍屯兵}
