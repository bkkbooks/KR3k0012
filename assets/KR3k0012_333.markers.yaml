  - {type: variant, offset: 429, length: 741, content: 原塹壘未城蜀兵大至淮逆擊走之魏志曰諸葛誕胡遵等伐吳攻東興吳將諸葛恪率軍拒之及恪上岸部將丁奉與唐咨呂據留贊俱從山西上奉曰今軍行遟若敵據便地則難與爭鋒矣乃令諸使下道率麾下三千人遙進時風便奉舉帆二日至遂據塘天寒雪時魏諸將置酒高會奉見其前部兵少相謂曰取封侯爵賞正在今日乃使兵解鎧著冑持短兵敵人從而笑焉不為設備奉縱兵斫之大破敵前屯會據等至魏軍遂潰晉書曰劉𥙿率師伐南燕慕容超晉師度峴慕容超懼率卒四萬就其將叚暉等于臨胊其俱切謂其將公孫五樓曰宜進據川源晉軍至而失水亦不能戰矣臨𦚧有巨薎水去城四十里五樓馳據之龍驤將軍孟龍符領騎居前奔往爭之五樓乃退因而大敗崔鴻十六國春秋曰後秦姚興與前秦符登相持登自六陌向廢橋興乃自將精騎以迫登使將尹緯領步軍據廢橋以抗登困急攻緯緯將出戰興遣使謂緯曰兵法不戰而制人者盖謂此也符登窮寇特宜持重不可輕戰緯曰先帝登遐人情尚擾不因思奮之力梟殄逆豎大事去失矣遂與登戰大破之登眾渴死者十二三其夜大潰又曰夏赫連勃勃屯依力川後秦姚興將王奚聚羗胡三千餘戶于勑奇堡勃勃進攻之奚驍悍有膂力短兵接戰勃勃之眾多為所傷於是堰斷其水堡人窘迫執奚出降梁史曰宋武帝伐姚泓沈林子參征西軍事加建武將軍統軍為前鋒從汴入河偽并州刺史河東太守尹昭據蒲坂林子於陜城與冠軍檀道濟同攻蒲坂龍驤王鎮惡攻潼關姚泓聞大軍至遣偽平公姚紹爭據潼關林子謂道濟曰潼關天岨所謂形勝之地鎮惡孤軍勢危力屈若使姚紹據之則難圖也及其未至當并力爭之若潼關事捷尹昭可不戰而服道濟從之後周書曰東魏將齊神武伐西魏軍過蒲津涉洛至許原西魏將周文帝軍至沙苑齊神武聞周文帝至引軍來會詰朝候騎告齊神武軍且至周文帝部將李弼曰彼眾我寡不可平地置陣此東十里有渭曲可先據以待之遂進軍至渭曲背水東西為陣合戰大破之北史曰安同從道武征姚平於紫壁姚興悉眾救平同進計曰汾東有蒙坑東西, SBCK: 穿渠}
