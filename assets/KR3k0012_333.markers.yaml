  - {type: variant, offset: 1180, length: 2, content: 來必, SBCK: 復農官功勞報賞皆如魏氏故事一年中興百姓二年分稅三年計賦稅以使之公􅀻兼濟則倉􅁃􅄹億可計日而行也又曰穆帝升平􅀄荀羡爲北部都尉鎭下邳今臨淮郡縣也起田于東陽之石鼈亦在臨淮郡界也公􅀻利之齊書曰髙帝勑垣崇祖脩理芍陂田曰卿但努力營田自然平殄虜㓂昔魏置典農而中都足食晉開汝潁而河汴委儲卿冝勉之後魏書曰文帝大統十一年大旱十二年秘書丞李彪上表請別立農官取州郡户十分之一爲屯人相水陸之宜料頃􅅿之數以􅂍贖雜物市牛科給令其肆力一夫之田歳責六十斛甄其正課并征戍雜役行此二事數年之中則􅂖積而人足矣帝覽而善之㝷施行焉自此公􅀻豊贍雖有水旱不爲害也北史曰後魏刀雍除薄骨律鎮將雍以西土乏兩表求鑿渠溉公􅀻田又奉詔以髙平安}
  - {type: page-break, offset: 1180, content: '', id: KR3k0012_SBCK_333-4a}
  - {type: variant, offset: 1180, length: 2, content: 來必, WYG: 復農官功勞報賞皆如魏氏故事一年中興百姓二年分稅三年計賦稅以使之公私兼濟則倉庾盈億可計日而行也又曰穆帝升平初荀羡為北部都尉鎮下邳今臨淮郡縣也起田於東陽之石鼈亦作臨淮郡界也公私利之齊書曰髙帝勑相崇祖修理芍陂田曰卿但努力營田自然平殄虜冦昔魏置典農而中都足食晉開汝潁而河汴委儲卿其勉之後魏書曰文帝大統十一年大旱十二年秘書丞李彪上表請别立農官取州郡户十分之一為屯人相水陸之宜料頃畆之數以贓贖雜物市牛科給令其肆力一夫之田嵗貢六十斛甄其正課并征戍雜役行此二事數年之中則榖積而人足矣帝覽而善之尋施行焉自此公私豐贍雖有水旱不為害也北史曰後魏刁雍除薄骨律鎮將雍以西土乏雨表求鑿渠溉公私田又奉詔以髙平安}
