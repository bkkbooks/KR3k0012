  - {type: variant, offset: 1176, length: 0, content: '', SBCK: 又巴兵胡沅湘之㑹表裏山川寔爲險固荆蠻之所恃也當陽侯乃開楊口起夏水逹巴陵千餘里夏水口在今江陵郡江陵縣界巴陵即今郡也内㵼長江之險外通零桂之漕零陵桂陽並令邵地南土歌之曰後代無叛由杜翁孰識智名與勇功又曰梁武昭王暠擊王門以諸城皆下之遂屯玉門陽関廣田積􅂖爲東伐之資又曰東晉元帝督課農功二千石長吏以入糓多少爲殿其􅀫衛要任皆令赴農使軍各自佃即以爲􅅒太興中三呉大飢後軍將軍應詹上表曰魏武帝用􅀥祗韓浩之議廣建屯田又於征伐之中分帶甲之士隨冝開懇故下}
  - {type: page-break, offset: 1176, content: '', id: KR3k0012_SBCK_333-3b}
  - {type: variant, offset: 1176, length: 0, content: '', WYG: 又巴丘湖沅湘之㑹表裏山川實為險固荆蠻之所恃也當陽侯乃開楊口起夏水逹巴陵千餘里夏水口在今江陵郡江陵縣界巴陵即今郡也内㵼長江之險外通零桂之漕零陵桂陽並今郡地南土歌之曰後代無叛由杜翁孰識知名與勇功又曰凉武昭王暠擊玉門以西諸城下之遂屯玊門陽關廣田積榖為東伐之資又曰東晉元帝督課農功二千石長吏以入榖多少為殿最其宿衛要任皆令赴農使軍各自佃即以為廪太興中三吳大飢後軍將軍應詹上表曰魏武帝用棗祗韓浩之議廣建屯田又於征伐之中分帶甲之士隨宜開墾故下}
