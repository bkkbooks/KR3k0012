  - {type: variant, offset: 1428, length: 0, content: '', WYG: 臣聞秦北攻胡貊築塞河上南攻楊粤置卒戍焉非所以衛邊地而救民死也貪戾而欲廣地故功未立而天下亂夫起兵不知其勢戰則為人禽屯則卒積死夫胡貉之地積除之處也木皮三寸氷厚六尺食肉飲酪其人}
