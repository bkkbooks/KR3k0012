  - {type: variant, offset: 2840, length: 1614, content: 戶資一兵今計天下租賦一歲所入惣不過三千五百餘萬而上供之數三之一焉三分之中二給衣賜自留使兵士衣賜之外其余四十萬眾仰給度支伏以時逢理安運屬神聖然而兵不可弭食哉惟時憂勤之端兵食是功臣謬司邦計虔奉圖輒纂事功庶禆聖覽又曰黃巢既來圍陳郡三百日關東仍歲無耕稼人餓倚牆壁間賊俘人而食日殺數千賊有春磨砦為巨碓數百生納人於臼粹之合骨而食其流毒若是又曰秦宗權以蔡州叛所至屠殘人物燔燒郡邑西至關內東極青齊南出江淮北至衛滑魚爛鳥散人煙斷絕荊榛蔽野賊既乏食啖人為儲軍士四出則塩屍而從三國典略曰陳霸先遣錢明領水軍出江寧浦要擊齊人糧運盡獲其舡於是齊軍大餒殺馬驢而食之又曰以糧運不繼調市人餽軍建康令孔奐以麥屑為飯用荷葉裏之室宿之間得數萬褁以給兵士會陳遣送米三千石鴨千頭霸先即炊黍煮鴨誓申一戰計糧分肉人獲數臠絕糧道漢書曰景帝初吳楚七國反以太尉周亞夫問父綘侯客鄧都尉曰策安出客曰吳楚兵銳甚難與爭鋒而剽輕不能久莫若引兵東北壁昌邑以梁委吳吳必盡銳攻之將軍深溝高壘使輕兵絕淮泗之口塞吳饟式亮切道使吳梁相弊而糧食竭乃以全軍強制其疲極破吳必矣亞夫言於帝許之遂破吳軍又曰王莽末天下亂光武兄伯升起兵討莽為莽將甄音真阜梁丘賜所敗復收會兵眾還保棘陽阜賜乘勝留輜重於藍鄉引精兵十萬南度潢淳臨泚水潢音黃泚音蚍阻兩川間為營絕後橋示無還心伯升於是大饗軍士設盟約休卒三日為六部潛師夜起襲取藍鄉盡獲其輜重明晨漢軍自西南攻甄阜下江兵自東南攻梁丘賜至食時陣潰遂斬阜賜後漢書曰韓遂敗走榆中榆沖縣屬金城郡張溫乃遣周慎將三萬人追討之溫參軍事孫堅堅權之父也說慎曰賊城中無穀當外轉糧食堅願得萬人斷其運道將軍以大兵繼後賊必困乏而不敢戰若走入羗中并力討之則涼州可定也慎不從引軍圍榆中城而邊章遂分屯葵園峽反斷慎運道慎懼乃棄重而退又曰曹公與袁紹相持官度沮授言於紹曰北兵數眾俎側居切而果勁不及南南穀虛少而貨財不及北南利在於急戰北利在於緩持宜曠以日月紹不從連營稍前逼官度合戰曹公軍不利復壁紹為高櫓起土山射營中皆蒙楯眾大懼曹公乃為發石車擊紹樓皆破眾號霹靂車紹為地道欲襲曹公營公輒於內為長壍以拒之又遣騎兵襲擊紹運車大破之盡焚其穀會紹遣淳于瓊等將兵萬餘人北迎運沮授說紹可遣將別為軍於表以絕曹公之抄紹復不從瓊宿鳥巢去紹軍四十里紹謀士許攸奔曹公攸謂曹公曰孤軍獨守外無求索危急之時也今袁氏輜重有萬餘兩而無嚴備可輕兵襲之不慮而至燔其積聚不過三日袁氏自敗也公乃選精銳馬步秉袁氏旗幟夜衘枚縛馬口從間道出人負束薪時有問者紿之紿音怠曰袁公恐曹操掠後軍兵以益備聞者信之既至輜重圍屯燎薪火光亘天地破瓊等悉斬之數日紹棄甲而遁蜀志曰姜維率眾侵魏依麴山筑二城使牙門將勾安李韶等守之聚羗胡質任寇逼諸郡魏將陳泰禦之泰謂諸將曰麴城雖固去蜀險遠當須運糧羗夷患維勞役必未肯附今圍而取之可不血刃而拔其城雖其來救山道險阻非行兵之地乃使鄧艾等進兵圍之斷其運道及城外流水安等挑戰不許將士困窘分糧聚雪以稽日月維果來救出自牛頭與泰相對泰曰兵法貴在不戰而屈人今絕牛頭維無返道則我之擒也諸軍各堅壘勿與戰自南度白水循水而東使諸將截其還路維懼遁走安等孤懸遂皆降崔鴻十六國春秋曰前趙劉曜遣將劉胤西伐張駿之武威駿將遣辛巖韓瑛音英東拒劉胤屯于狄道城韓瑛進度沃于嶺辛巖曰我掘眾數萬籍玄羗之銳宜速戰以滅之不爾久則變生瑛曰自夏末以來太白犯月辰星逆行白虹貫日皆變之大者不可以輕動動而不捷為禍更深吾將久而斃之且曜與石勒相攻胤亦不能久積七十餘日軍糧竭遣辛巖督運於金城胤聞之大悅謂其將士曰韓瑛之眾十倍於吾糧廩將懸難以持久今分兵運糧可謂天授吾若敗辛巖英等自潰彼眾我寡宜以死戰戰而不捷當無疋馬得還咸奮於是率騎三千襲巖於沃于嶺大敗之瑛軍遂潰死者三萬餘人三國典略曰周王思政固守潁川思政運米數百車欲向孔城齊大都督破六韓常與洛州刺史可朱渾寶願前後要襲獲之乃啟于齊王澄曰常自鎮河陽已來頻出關口大谷二道所有要害莫不知悉請於形勝之處營築城戍安置士馬截其往來彼之咽喉既斷潁城吞滅可期且孔城以西年穀不稔東道斷絕亦不能存王納其計, SBCK: ''}
