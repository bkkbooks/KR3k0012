  - {type: variant, offset: 1174, length: 1, content: 徑, SBCK: 漑田二萬頃淮南淮北皆相連接自壽春到京師農官兵田雞犬之聲阡陌相屬毎東南有事大軍出征汎舟而下逹于江淮資食有儲而無水害艾所建也晉書曰羊祐爲征南大將軍鎭襄陽呉西城去襄陽七百里毎爲邊害羊祐患之意以詭計令呉罷守於是戍邏减半分以懇田八百餘頃大獲其利祐之始至也軍無百日之粮及至季年有十年之積太康元年平呉之後當陽侯杜元凱在荆州今襄陽郡脩邵信臣遺迹邵信臣所作鉗廬陂大門堰並今南陽郡􅀗縣界時爲荆州所統也激用􅘷音虽淯音育諸水以浸田原萬頃分壃刋石使有定分公私同利衆庶頼之號曰杜父舊水道淮􅃆漢逹江陵千八百里北無通}
  - {type: page-break, offset: 1174, content: '', id: KR3k0012_SBCK_333-3a}
  - {type: variant, offset: 1174, length: 1, content: 徑, WYG: 溉田二萬頃淮南淮北皆相連接自壽春到京師農官兵田雞犬之聲阡陌相屬每東南有事大軍出征杭舟而下逹於江淮資食有儲而無水害艾所建也晉書曰羊祐為征南大將軍鎮襄陽吳西城去襄陽七百里每為邊害羊君患之以意詭計令吳罷守於是戍邏减半分以墾田八百餘頃不乏其利祐之始至也軍無百日之糧及至季年有十年之積太康元年平吳之後當陽侯杜元凱在荆州今襄陽郡修召信臣遺迹召信臣所作鉏廬陂六門堰在今南陽郡虢縣界時為荆州所統也激用滍淯淯音育諸水以浸原田萬頃分疆刋石使有定分公私同之衆庶賴之號曰杜父舊水道淮沔漢逹江陵千八百里北無通}
