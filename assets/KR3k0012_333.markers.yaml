  - {type: variant, offset: 178, length: 3, content: 征隗囂, WYG: 屯田張掖郡調謂發選之也故吏前}
  - {type: variant, offset: 178, length: 3, content: 征隗囂, krp: 屯田張掖郡調謂發選之也故吏前爲官職者也令其郡習戰射士於張掖}
  - {type: punctuation, offset: 181, content: ，, id: KR3k0012_CHANT_333-bkkpn50}
  - {type: 'tls:seg', offset: 181, content: '', id: KR3k0012_CHANT_333-4a.4}
  - {type: variant, offset: 182, length: 0, content: '', SBCK: 屯田也調音從釣切將音子亮切朔方張掖並今郡地也又曰孝宣神爵元年遣後將軍趙充國將兵擊先零羗充國以擊虜殄滅爲期乃欲罷􅀐兵屯田以待其弊奏曰臣}
  - {type: variant, offset: 182, length: 0, content: '', WYG: 官職者也今其郡習戰射士於張掖為屯田也調音徒料切將音子亮切朔方張掖並今郡地也又曰孝宣神爵元年遣後將軍趙充國將兵擊先零羗充國以撃虜殄滅為期乃欲罷騎兵屯田以待其弊奏曰臣}
  - {type: page-break, offset: 182, content: '', id: KR3k0012_WYG_333-1b, image: WYG0896/WYG0896-0010b.png}
  - {type: variant, offset: 182, length: 0, content: '', krp: 屯田也調音從釣切將音子亮切朔方張掖並今郡地也又曰孝宣神爵元年遣後將軍趙充國將兵擊先零羗充國以擊虜殄滅爲期乃欲罷騎兵屯田以待其弊奏曰臣}
  - {type: variant, offset: 183, length: 2, content: 敗光, SBCK: 將吏士馬牛食月用粮􅂖十九萬九千六百三十斛塩千六百九十三斛艾槀二十五萬二百八十六石石百一十斤也難乆不解徭役不息又恐他夷卒有不虞之變且羗虜易以計破難用兵猝且没切言倉卒暴疾也故臣愚以爲擊之不便計度臨羗東至浩亹浩音閱亹音門即金城郡度}
  - {type: page-break, offset: 183, content: '', id: KR3k0012_SBCK_333-1b}
  - {type: variant, offset: 183, length: 8, content: 敗光武令悉軍栒邑, WYG: 將吏士馬牛食月用糧榖十九萬九千六百三十斛鹽千六百九十三斛茭藁二十五萬二百八十六石石百二十觔也難久不解徭役不息又恐他夷卒有不虞之變且羗虜易以計破難用兵猝且没切言倉卒暴疾也故臣愚以為擊之不便計及公田人所}
  - {type: variant, offset: 183, length: 2, content: 敗光, krp: 將吏士馬牛食月用粮糓十九萬九千六百三十斛塩千六百九十三斛艾槀二十五萬二百八十六石石百一十斤也難乆不解徭役不息又恐他夷卒有不虞之變且羗虜易以計破難用兵猝且没切言倉卒暴疾也故臣愚以爲擊之不便計度臨羗東至浩亹浩音閱亹音門即金城郡度}
