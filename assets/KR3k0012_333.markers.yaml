  - {type: variant, offset: 1895, length: 516, content: 第五種拜高密侯相是時徐兗州盜賊群聚高密在二州之郊種乃儲糧蓄勤厲吏士賊聞皆憚之又曰光武即位時軍食急乏寇恂以輦車驪駕轉輸前後不絕前書音義曰驪駕併駕也輦車人挽行也又曰詔報朱浮曰往年赤眉跋扈長安跋扈猶暴橫也吾策其無穀必東來歸降今度此反虜勢無久全其中必有內相斬者今軍資未充故須候耳又曰來歙上書曰公孫述以隴西天水為藩蔽故得延命假息今二郡平蕩則述智計窮矣宜益選兵馬儲積資糧昔趙之將帥多賈人高帝懸之以重賞高帝十年陳狶反於趙代其將多賈人帝多以金購狶將皆降今西州新破兵人疲饉若招以財穀則其眾可奪臣知國家所給非一用度不足然有不得已也帝然之東觀漢記曰來歙征公孫述詔於汧積穀六萬斛驢四百頭負馱蜀國志曰諸葛亮悉大眾由斜谷出以流馬運糧據武功五丈原與司馬宣王對於渭南晉書載記曰羅尚委城遁李雄遂剋成都于時雄軍飢甚乃率眾就穀於郪掘野鼠等食之晉書曰祖逖伐陳留太守陳川石季龍救之徙陳川還襄國留桃豹等守川故城住西臺逖遣將韓潛等鎮東台同一大城賊從南門入放牧逖軍開東門相守四旬逖以布囊盛土如米狀使千餘人運上臺又令數人擔米偽疲極而息於道賊果逐之皆棄擔而走賊既獲米謂逖士眾豊飽而胡戍飢久益懼無復膽氣石勒將劉文堂以驢千頭運糧以饋桃豹逖遣韓潛馮鐵等追擊於汴盡獲之桃豹宵退據東燕唐書曰貞元, SBCK: ''}
