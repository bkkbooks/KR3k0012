  body:
  - {type: variant, offset: 4, length: 169, content: 三據要吳子曰凡行師越境必審地形審知主客之向背地形若不悉知往必敗矣故軍有所至先五十里內山川形勢使軍士伺其伏兵將必自行視地之勢因而圖之知其險易也戰國策曰秦師伐韓圍閼與趙遣將趙奢救之軍士許曆曰秦人不意趙師至此其來氣盛將軍必厚集其陣以待之不然必敗又曰先據北山上者勝後至者敗趙奢即發萬人趍之秦兵後至爭山不得上趙奢縱兵擊之大破秦軍遂解閼與之圍與音餘後, SBCK: 四屯田戍役屯田}
