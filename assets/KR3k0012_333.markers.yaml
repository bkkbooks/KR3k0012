  - {type: variant, offset: 211, length: 1, content: 餘, WYG: 七千三百六十三斛分屯要害處氷觧漕下繕鄉亭漕下以水運木而下也繕補也理湟陿以西湟音王陿音陜道橋七十所令可至鮮水左右田事出賦}
  - {type: variant, offset: 211, length: 1, content: 餘, krp: 七千三百六十三斛塩三百八斛分屯要害處氷解漕下繕郷亭浚溝渠水運木繕𥙷也治湟陿以西漕音皇陿音峽道橋七十所令可至鮮水左右田事出賦}
