  - {type: variant, offset: 1301, length: 2, content: 鎮宜, SBCK: 旅歳興軍粮不屬静上表請於太原多置屯田以省餽運時議者以人物淍零不冝動衆書奏不省静復上書辝甚切於是徵静入朝與裴寂蕭瑀封徳彞等争論於殿庭寂等不能屈竟從静議歳収數十萬斛髙祖善之又曰開元二十五年令諸屯􅀠司農寺者每三十頃以下二十頃以上爲一屯􅀠州鎭諸軍者毎五十頃爲一屯其屯應置者皆從尚書省處分其舊屯重置者一依丞前封壃爲定新置者並取荒閑無籍廣占之地其屯雖料五十頃易田之處各依郷原量事加數其屯官取勲官五品以上及武散官并前資邊州縣府鎭戍八品以上文武官内簡堪者充據所収斛斗等級爲功優諸屯田應用牛之處山原川澤土有硬軟至於耕懇用力不同土軟處每一頃五十􅅿配牛一頭疆硬處一頃二十􅅿配牛一頭即當屯之内有硬有軟亦准此法其稻田毎八十􅅿配牛一頭諸營田􅀂五十頃外更有地剰配得丁牛者所収斛皆准頃􅅿折除其大麥喬麥乾蘿蔔等准粟計折斛斗以定等級天寶八年天下屯田百九十一萬三千九百六十石關内五十六萬三千八百一十石河北四十萬三千二百八十石河東二十四萬五千八百八十石河西二十六萬八十八石隴右四十四萬九百二石後上元中於楚州古折}
