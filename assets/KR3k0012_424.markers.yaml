  - {type: variant, offset: 2584, length: 0, content: '', SBCK: 國於季歴謂其傳曰大王欲以一國之事而以嗣我我其羞之吾聞至人也不居一丗而萬丗以之君不貴一代而萬代以之貴吾焉能貴乎一國而賤乎萬代哉山海經曰君子國民衣冠帶劒􅁟方千里多薫華之草好讓故爲君子國許遜別傳曰遜年七歳無父躬耕􅀒薪以飬母盡孝敬之道與寡㛐共田桑推讓好者取其荒者不營利母常隨之如此當乞食無處遜嘆應母曰但願母老壽耳郭翻別傳曰翻經河墜刀於水路人有爲取者翻因與之路人不取至於三四路人固辭翻曰爾向不取我豈能復得乎路人曰吾􅀂取此物爲天地􅀑神所責矣知其終不受乃沉刀於向所失處路人帳然乃復没爲取之翻於是不逆其意十倍刀價與之魏武令曰里諺曰譲禮一寸得禮一尺斯合經之要矣魏文􅄂事曰辭爵逃禄不以利累名不以位虧德之謂讓􅀶物志曰三讓一曰禮讓二曰固讓三曰終譲晉劉寔崇譲論曰古之聖王治天下所以貴譲者欲以出賢才而息爭競也夫人情莫不皆欲巳之賢以自明賢豈假讓而賢哉故讓道興賢能之人不求而自出矣至公之舉而自立矣一官鈌擇衆官所讓最多者而用之審才之道也在朝之人相譲於上草廬之人咸皆化之推能譲賢之風從此生矣爲一國所譲則一國士也爲天下所讓則天下才也推譲之風行賢不肖灼然殊矣晉孫盛周􅁗伯三讓論曰孔子曰㤗伯}
  - {type: page-break, offset: 2584, content: '', id: KR3k0012_SBCK_424-7b}
  - {type: page-break, offset: 2584, content: '', id: KR3k0012_SBCK_424-8a}
  - {type: variant, offset: 2584, length: 0, content: '', WYG: 國晏子春秋曰晏子方食景公使至分食食之使者不飽嬰亦不飽公致千金以奉賔客晏子不受公曰先君桓公以書社三百封管仲管仲不辭子獨辭何也晏子曰嬰聞聖人千慮必有一失愚人千慮必有一得以仲失之嬰得之又曰景公使晏子為阿宰三年而譽聞于國景公悅召而賞之辭而不受公問其故對曰昔嬰之治阿三邪毁于外三讒毁于内今則三邪譽于外三讒譽于内昔者因之當誅者當賞而今以當賞者當誅是故不敢受景公知晏子賢乃任三年而齊大興莊子曰堯以天下讓許由由曰日月出矣而爝火不息其于光也不亦難乎時雨降矣而猶浸灌其于澤也不亦勞乎又讓于子州支父子州支父曰我適有幽憂之疾方且治之未暇治天下也又曰舜以天下讓于善卷善卷曰余逍遥于天地之間而心意自得吾何天下為哉遂不受又曰舜以天下讓其友北人無擇北人無擇曰異哉后之為人居甽畝之中而遊于堯之門不若是而已又欲以其辱行汗漫我吾羞見之自殺於清泠之淵又曰湯將伐桀因卞隨而謀卞隨曰非吾事也湯又因務光而謀務光曰非吾事也湯曰伊尹何如曰强力忍詬吾不知其他湯遂與伊尹謀伐桀尅之以讓卞隨卞隨曰君之伐桀謀于我必以我為賊也勝桀而讓乎我必以我為貪也吾生乎亂世而無道之人再來漫我吾不忍數聞也乃自投於桐水而死桐水今在穎川又讓務光曰智者謀之武者遂之仁者居之古之道也吾子胡不立乎務光辭曰廢上非義殺人非仁子犯其難我享其利非廉也吾聞之曰非其義不受其祿無道之世不踐其土況尊我乎吾不忍見也乃負石自投於盧水盧水在遼東也吕氏春秋曰沈尹筮遊於郢五年荆王欲以為令尹辭期思之鄙人有孫叔敖彼聖人也王于是使人以王輿迎叔敖以為令尹而國治韓子曰舜耕於厯山農者讓畔漁於河濵漁者讓長符子曰禹讓天下於竒子竒子曰君之佐舜勞矣鑿山川通河漢首無髮股無毛故舜也以勞報子我生而逸不能為君之勞矣又曰武王以天下讓􅄮封子岐封子曰孰匆匆然以天下為事乎君徃矣余不忍聞之又曰泰伯將讓其國於季厯謂其𫝊曰大王欲以一國之事而以嗣我我其羞之吾聞至人也不君一世而萬世以之君不貴一代而萬代以之貴吾焉能貴乎一國而賤乎萬代哉山海經曰君子國民衣冠帶劒土方千里多薰華之草好讓故為君子國許遜别傳曰遜年七歲無父躬耕負薪以養母盡孝敬之道與寡嫂共田桑推讓好者自取其荒不營榮利母常譴之曰如此當乞食無處遜笑應母曰但願母老壽耳郭翻别傳曰翻經河墜刀于水路人有為取者翻因與之路人不取至于三四路人固辭翻曰爾向不取我豈能復得乎路人曰吾若取此物為天地鬼神所責矣翻知其終不受乃沉刀於向所失處路人悵然乃復沉沒取之翻於是不逆其意十倍刀價與之魏武令曰里諺曰讓禮一寸得禮一尺斯合經之要矣魏文雜事曰辭爵逃祿不以利累名不以位虧德之謂讓博物志曰三讓一曰禮讓二曰固讓三曰終讓晉劉寔崇讓論曰古之聖王治天下所以貴讓者欲以出賢才而息争競也夫人情莫不欲已之賢以自明賢也故勸令讓賢豈假讓不賢哉故讓道興賢能之人不求而自出矣至公之舉而自立矣百官之副亦豫具矣一官缺擇衆官所讓最多者而用之審才之道也在朝之士相讓于上草廬之人咸皆化之推賢讓能之風從此生矣為一國所讓則一國士也天下所共推則天下士也推讓之風化則賢與不肖灼然殊矣晉孫盛周泰伯三讓論曰孔子曰泰伯}
