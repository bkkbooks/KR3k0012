  - {type: variant, offset: 3329, length: 211, content: 矣又曰龔遂為渤海太守數年上遣使者徵遂議曹王生願從太守會遂引入宮王生醉從呼曰願有所白遂問其故王生曰天子即問君何以治渤海君不可有所陳宜曰皆聖主之德非小臣之力也上果問以治狀遂對如王生言天子怪其有讓嘆曰君安得長者之言而稱之遂因前曰臣非知此乃臣議曹教臣也又曰武帝屬霍光以輔少主光讓金日磾日磾曰臣外國人且使匈奴輕漢於是遂為光副又曰韋賢薨子玄成當為嗣玄成心知其兄非賢雅意欲讓即佯狂丞相御史遂以玄成實不病劾奏之有詔勿劾引拜玄成不得已受侯爵, SBCK: 百二十四}
