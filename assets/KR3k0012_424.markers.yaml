  - {type: variant, offset: 3067, length: 254, content: 南向讓者再又曰魯連既說秦軍秦軍為卻平原君欲封魯連魯連辭謝者三終不肯受平原君乃置酒酒酣起前以千金為魯連壽連嘆曰所貴天下之士者為人排難解紛而無取也即有取者是商賈之事連不忍為也遂辭而去終身不復見又曰董偃在館陶主家兒戲博殿下主伏檻觀之偃負則饒人勝則有讓主益奇之又曰伯夷叔齊孤竹君之子也父欲立叔齊乃讓伯夷伯夷曰父命也遂逃去漢書曰文帝初立以陳平為相太尉勃親以兵誅呂氏功多平欲讓勃位迺謝病文帝怪平病問之平曰高帝時勃功不如臣及誅諸呂臣切亦不如勃願以相讓勃又曰袁盎謂文帝曰陛下至代邸西鄉讓天子者三東讓天子者再夫許由一讓而陛下五, SBCK: ''}
