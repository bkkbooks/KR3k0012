  - {type: variant, offset: 2567, length: 0, content: '', WYG: 和帝納之詔下曰故居巢侯劉般嗣子愷當襲父般爵而稱父遺意致國弟憲遁亡七年所守彌固盖王法崇善成人之美其聴憲嗣爵乃徵愷拜為郎稍遷侍中愷之入朝在位者莫不仰其風行又曰淳于恭以謙儉推讓為節家有山田橡樹人有盜取者恭助為收採載之歸乃知為恭橡盜者還橡恭不受人又有盜刈恭禾者恭見之念其愧因伏草中盜去乃起續漢書曰張堪讓先人餘財數百萬與兄子謝承後漢書曰雷義舉茂才讓于陳重刺史不聴義遂佯狂不應命鄉里為之語曰膠漆自謂堅不如雷與陳又曰陳囂與鄉人紀伯為隣伯夜竊囂藩地自益囂見之伺伯去蜜移其藩一丈地以益伯伯慚懼還所侵又卻一丈二尺相避凡廣三丈太守髙其義名其閭為義里范曄後漢書曰馮緄字鴻卿巴郡宕渠人也長沙蠻寇益陽荆南皆沒于是拜緄為車騎將軍軍至長沙進擊武陵蠻夷荆州平定詔賜錢一億固讓不受振旅還京師推功於從事中郎魏志曰田疇字子泰右北平人太祖北征烏丸軍次無終夏水路不通疇將其衆為鄉導出盧龍塞乃驚太祖與戰遂大斬獲軍還論功封疇為亭侯疇上䟽陳誠以死自誓太祖不聴欲引拜之至于數四疇終不受又曰太祖署邴原為丞相徵事崔琰為東曹掾記讓曰徵事邴原議郎張範皆秉德純壹志行忠敏清静足以厲時貞固足以幹事所謂龍翰鳳翼國之重寳舉而用之不仁者逺又曰王基字伯輿東萊人基拔壽春轉基為征東將軍封東武侯基上疏固讓歸功叅佐由是長史司馬等七人皆封侯呉志曰魯肅卒孫權以嚴畯代前後固辭曰僕素書生不嫻軍事非才而據殃咎必至發言慷慨至于流涕權乃聴焉嘉其能以實讓又曰薛綜為選曹尚書固讓顧譚曰心精體密貫道達㣲才照人物德服衆望誠非愚臣所可越先王隱晉書曰司徒魏舒遜位司空衛瓘與書曰每與足下共論此事日日未果可謂瞻之在前忽然在後于時皆有欲遜者或先顯此意}
