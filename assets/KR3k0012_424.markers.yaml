  - {type: variant, offset: 1012, length: 0, content: '', SBCK: 終未有如舒者焉又曰杜夷字行齊廬江人王敦爲刺史舉方正顧榮等各薦夷於相府元帝曽欲省夷夷深譲帝荅曰吾與足下雖情在忘言然虚遲歴載正以足下羸病故欲相省寜論常敬以爲國子􅀕酒夷前後十餘表求解不聽明帝踐祚夷又頻表又曰上以羊祜爲開府儀同譲表曰今光禄李喜秉節髙亮在公正色光禄魯芝絜身寡欲和而不同光禄李胤清亮簡素正身在朝皆服事華髮以禮終始雖歴外内之寵不異寒賤之家而猶未蒙此選臣更越之何以塞天下之望又封南城郡侯祜曰昔張良請受留侯漢髙不奪其志請受鉅平薨遺令不得以南城侯入柩詔祜曰固譲歴年志不可奪身没譲存遺言益厲此夷叔所以稱賢季札所以全節重違其志今聽復夲封于寳晉紀曰鍾㑹鄧艾將伐蜀與劉寔別客謂寔曰二將當破蜀不寔曰必破蜀伹皆不還客問其故寔曰治道在於克譲因著崇讓論曰季丗不能譲賢虚謝見用之恩莫肯譲於勝巳晉中興書曰郗愔拜給事黃門侍郎愔苦求外出時呉郡缺朝議欲用愔愔以資輕而少年不冝超登大郡辭讓切至朝廷嘉之爲臨海太守在郡優游飬志不以事物縈心崔鴻前趙録曰張寔爲鉅鹿太守治任威強路不拾遺曽欲以寔爲司徒太保皆垂涕固辭身􅀐瘠馬妻乗敗車後魏書曰髙肇字首文文昭皇太后之兄也肇子植自中書侍郎出爲濟州刺史元愉之反也植率州軍出討破愉別將有功當蒙封賞朝廷論勲毎謙譲不受云其家荷重恩爲國致効是其常節何足以應進陟之報懇惻發於至誠又曰崔光韶爲司空行叅軍復請譲從叔和曰臣誠微賤未登譲品屬逢唐朝耻無譲德和亦謙退辭而不當髙祖善之遂以和爲廣陵王國常侍後周書曰􅂫祐字承先陳留圉人也有膂力便􅀐射從征伐常潰圍䧟陣還之日諸將爭功祐終無競太祖歎之常謂諸將曰承先口不言勲􅀌當代言其見知如此沈約齊紀曰朝係伯襄陽人也事母甚謹西土風俗田與隣畔者輙於畔上種桑以誌之係伯上種桑枝條䕃蔽他地毎開數尺以避焉隣者隨復侵之係伯輙伐樹更種侵畔者慙不敢犯也齊書曰謝朓遷尚書吏部郎上表三譲中書疑朓官未及譲以問國子􅀕酒沈約約曰宋嘉元中范曄譲吏部朱循之讓黃門蔡興宗讓中書並三表詔荅近代小官不譲遂成恒俗恐有乖譲意王藍田劉安西貴重􅀄自不讓今豈可慕此不讓􅁘孫興公孔覬並譲記室今豈可三署皆譲􅁘謝吏部今授超階別有意豈􅀜官之大小撝讓之美夲出人情􅀂大官必譲便與詣闕章表不異例旣如此謂都非疑朓讓優荅不許}
