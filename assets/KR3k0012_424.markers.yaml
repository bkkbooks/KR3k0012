  - {type: variant, offset: 1018, length: 8, content: 張建封在徐州辟為, SBCK: 公功績才望允稱具瞻故授此官無冝辭譲爲禮也又曰盧懷慎開元三年遷黃門􅁥懷慎與紫微令姚崇對掌樞宻懷慎自以爲吏道不及崇毎事皆推讓之周書曰湯放桀而歸於毫三年諸侯大㑹湯取天子之璽置之天子之坐再辭}
  - {type: variant, offset: 1018, length: 8, content: 張建封在徐州辟為, krp: 公功績才望允稱具瞻故授此官無冝辭譲爲禮也又曰盧懷慎開元三年遷黃門監懷慎與紫微令姚崇對掌樞宻懷慎自以爲吏道不及崇毎事皆推讓之周書曰湯放桀而歸於毫三年諸侯大㑹湯取天子之璽置之天子之坐再辭}
