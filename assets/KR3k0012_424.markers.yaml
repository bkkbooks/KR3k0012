  - {type: variant, offset: 1967, length: 365, content: 茲父固請曰目夷長且仁君其立之茲父襄公也目夷茲父庶兄子魚也公命子魚子辭曰能以國讓仁孰大焉臣不及也且又不順立庶不順禮遂走而退又文上曰穆伯如齊始聘禮也凡君即位卿出並聘踐修舊好要結外援好事鄰國以衛社稷忠信卑讓之道忠信德這固也卑讓德之基也又宣上曰鄭人立子良辭曰以賢則去疾不足去疾子良之名以順則公子堅長乃立襄公又成下曰諸侯將見子臧於王而立之子臧曰前志有之曰聖達節次守節下失節為君非吾節也雖不能聖敢失守乎遂逃奔宋又襄上曰晉韓獻子告老公族穆子有廢疾將立之辭曰詩曰豈不夙夜謂行多露無忌不才讓其可乎請立起也無忌穆子名起無忌弟宣子也又襄二曰晉侯使士丐將中軍辭曰伯游長伯游荀偃昔臣習於智伯是以佐之非能賢也請從伯游使荀偃將中軍士丐佐之使韓起將上軍辭以趙武又使欒黶辭曰臣不如韓起願上趙武君其聽之使趙武將上軍韓起佐之欒黶將下軍魏絳佐之晉國之民是以大和諸侯遂睦君, SBCK: 歧封}
