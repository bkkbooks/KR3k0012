  - {type: variant, offset: 1232, length: 645, content: 川易曰天道下濟而光明地道卑而上行老子曰高以下為基貴以賤為本此之謂乎讓上尚書舜典曰咨四岳有能奮庸熙帝之載使宅百揆亮采惠疇僉曰伯禹作司空帝曰俞咨禹汝平水土惟時懋哉禹拜稽首讓于稷契暨皋陶帝曰疇若予工工百工也僉曰垂哉垂臣名也帝曰俞咨垂汝作共工垂拜稽首讓于殳斨暨伯與帝曰俞往哉汝諧帝曰疇若予上下草木鳥獸僉曰益哉帝曰俞咨益汝作朕虞虞掌山澤官名益拜稽首讓于朱虎熊羆朱虎熊羆二臣也帝曰俞往哉汝諧帝曰咨四岳有能典朕三禮僉曰伯夷伯夷臣名帝曰俞咨伯汝作秩宗秩宗主郊廟之官伯拜稽首讓于夔龍毛詩魚藻角弓曰民之無良相怨一方受爵不讓至于己斯亡周禮地官上大司徒曰以陽禮教讓則民不爭禮記曲禮曰博聞強識而讓尊善行而不怠謂之君子又曲禮曰君子恭敬樽節退讓以明禮又坊記曰故貴賤有等衣服有別朝廷有位則民有所讓子去君子辭貴不辭賤辭富不辭貧則亂益亡子云觴酒豆肉讓而受惡民猶犯齒衽席之上讓而坐下民猶犯貴朝廷之位讓而就賤民猶犯君子云君子貴人而賤己先人而後己則民作讓又祭義曰天子有善讓德於天諸侯有善歸諸天子卿大夫有善薦於諸侯士庶人有善本諸父母又儒行曰儒有衣冠中動作慎其大讓如慢小讓如偽又鄉飲酒曰三揖至于階三讓以賓升月者三日則成魄三月則成時是禮有三讓左傳隱公曰宋穆公疾召大司馬孔父而屬殤公焉曰先君舍與夷而立寡人先君公兄宣公也與夷宣公子即所屬殤公也若以大夫之靈得保首領以歿先君若問與夷其將何辭以對請子奉之以主社稷對曰群臣願奉馮也馮穆公子莊公公曰不可先君以寡人賢使主社稷若棄德不讓是廢先君之舉也又僖上曰齊侯使管夷吾平戎于王使隰朋平戎于晉王以上卿之禮饗, SBCK: 封}
