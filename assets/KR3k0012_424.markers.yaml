  - {type: variant, offset: 2356, length: 224, content: 襄二曰吳子諸樊既除喪將立季札札諸樊少弟季札辭曰曹宣公之卒也諸侯與曹人不義曹君將立子臧子臧去之遂弗為也札雖不才願附於子臧以無失節固立之棄其室而耕乃舍之傳言季札之讓月明吳兄弟相傳又襄五年曰鄭伯賞入陳之功饗子展賜之先輅三命之服先輅次輅皆王所賜車侯伯之上卿三命先八邑賜子產次輅再命之服先六邑子產辭邑曰自上已下降殺以兩禮也臣之位在四且子展之功也臣不敢及賞請辭邑公固與之乃受三邑公孫揮曰子產其將知政矣讓不失禮也論語曰能以禮讓為國乎何有不能以禮讓為國如禮何又曰子, SBCK: ''}
