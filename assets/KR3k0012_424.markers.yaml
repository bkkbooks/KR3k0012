  - {type: variant, offset: 1015, length: 1, content: 李, krp: 温彦博與兄大雅共掌機宻彦博以昆季同在機務意不自安固請他職髙祖曰我虚心相待不以爲疑卿何自疑也彦博雖應命然毎退譲逺避機權寮列以此多之又曰長孫無忌冊拜司空無忌固辭譲不許又曰臣幸居外戚恐招聖主私親之誚敢以死請太宗曰無忌聦明鑒悟且有武略公等並知所以委之台鼎無忌又上表切譲帝使謂之曰昔黃帝得力牧而爲五帝先夏禹得咎繇而爲三王祖齊桓得管仲而爲五伯長朕自在}
