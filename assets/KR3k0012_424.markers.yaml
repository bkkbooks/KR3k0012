  - {type: page-break, offset: 840, content: '', id: KR3k0012_SBCK_424-2b}
  - {type: variant, offset: 840, length: 169, content: 蒯恩字道恩以戰功封新寧縣男武帝北伐留恩侍衛世子命朝士與之交恩益自謙損與人語常呼官位自稱鄙人撫士卒甚有恩紀又曰臨川王義慶為平西將軍荊州刺史荊州居上流之重資實兵士居朝廷之半義慶以宗室令美故特有此授性謙虛始至及去迎送物並不受又曰彭城王義康與王弘共輔朝政弘既多疾且每事推謙自省內外眾務一斷之義康又曰建平王宏為人謙儉周慎禮賢接士明達政事上甚信仗之轉, WYG: 歐陽}
