  - {type: variant, offset: 1028, length: 270, content: 居幕中謙謙未嘗論細微會稽典錄曰陳瑞字文象世為縣卒瑞謙恭敬讓及其居二千石九卿位少年童豎拜者皆正朝服與之抗禮若疾病不能荅拜輒拊頰以謝之新序曰晉人伐楚楚大夫請擊之莊王曰先君在時晉不伐楚及孤之身而晉伐楚是孤之過如何其辱諸大夫大夫曰是臣之罪請擊之莊王俛泣起拜諸大夫晉人聞之曰君臣爭以過為在己上下一心三軍同力未可攻也還師而歸袁彥伯明謙曰賢人君子推誠以存禮非降己以應世率心以成謙非匿情以同物故侯王以孤寡饗天下江海以卑下朝百川易曰天道下濟而光明地道卑而上行老子曰高以下為基貴以賤為本此之謂乎讓上尚書舜典曰咨四岳有能奮庸熙帝之載使宅百揆亮采惠疇僉曰伯禹作司空, WYG: 睾𢎞}
