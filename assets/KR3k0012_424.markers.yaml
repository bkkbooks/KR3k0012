  - {type: variant, offset: 1881, length: 0, content: '', SBCK: 不辭獨辭何也晏子曰嬰聞聖人千慮必有一失愚人千慮必有一得意以管仲失之嬰得之又曰景公使晏子爲阿宰三年而譽聞於國景公恱召而賞之辭而不受公問其故對曰昔嬰之治阿三邪毁於外三讒毀於内今則三邪譽於外三讒譽於内昔者嬰之當誅者當賞而今以當賞者當誅是故不敢受景公知晏子賢乃任以國政三年而齊大興莊子曰堯以天下讓許由由曰日月出矣而爝火不息其於光也不亦難乎時􅀨降矣而猶浸灌其於澤也不亦勞乎又譲於子州支父子州支父曰我適有幽憂之疾方且治之未暇治天下也又曰舜以天下讓於善卷善卷曰余逍遥於天地之間而心意自得吾何以天下爲哉遂不受又曰舜以天下譲其友北人無擇北人無擇曰異哉后之爲人居甽畒之中而遊於堯之門不􅀂是而巳又欲以其辱行汙漫我吾羞見之自投於清泠之淵又曰湯將伐桀因卞隨而謀卞隨曰非吾事也湯又因務光而謀務光曰非吾事也湯曰伊尹何如曰強力忍詬吾不知其他湯遂與伊尹謀伐桀尅之以譲卞隨卞隨曰君之伐桀謀乎我必以我爲賊也勝桀而譲乎我必以我爲貪也吾生乎亂丗而無道之人再來漫我吾不忍數聞也乃自投於桐水而死桐水今在頴川又譲務光曰智者謀之武者遂之仁者居之古之道也吾子胡不立乎務光}
