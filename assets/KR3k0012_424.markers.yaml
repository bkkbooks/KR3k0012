  - {type: variant, offset: 2579, length: 0, content: '', WYG: 盧懷慎開元三年遷黃門監懷慎與紫㣲令姚崇對掌樞密懷慎自以為吏道不及崇每事皆推讓之周書曰湯放桀而歸于亳三年諸侯大㑹湯取天子之璽置之天子之坐再辭從諸侯之位湯曰此天子之位有道者可以處之三讓于諸侯諸侯莫敢即位然後湯即天子之位慎}
