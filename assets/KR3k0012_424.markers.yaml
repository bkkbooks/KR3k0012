  - {type: variant, offset: 2569, length: 0, content: '', WYG: 行或以歸家申喻復還唯舒知命内定於懷未嘗形之於言論者以為晉興以來能辭榮祿終未有如舒者焉又曰杜夷字行齊廬江人王敦為刺史舉方正顧榮等各薦夷於相府元常曾欲省夷夷深讓帝答曰吾與足下雖情在忘言然虛遲厯載正以足下羸病故欲相省寧論常儀以為國子祭酒夷前後十餘表求解不聴明帝踐祚夷又頻表讓位又曰上以羊祜為開府儀同讓表曰今光祿大夫李憙秉節髙亮在公正色光祿魯芝潔身寡欲和而不同光祿大夫李𦙍清亮簡素立身在朝皆服事華髮}
  - {type: page-break, offset: 2569, content: '', id: KR3k0012_WYG_424-5b, image: WYG0896/WYG0896-0704b.png}
  - {type: variant, offset: 2571, length: 0, content: '', WYG: 終始雖厯外内之寵不異寒賤之家而猶未䝉此選臣更越之何以塞天下之望又封南城郡侯祜曰昔張良請受留侯漢髙不奪其志請受鉅平薨遺令不得以南城侯入柩詔曰祜固讓厯年志不可奪身沒讓存遺操益厲此夷叔所以稱賢季札所以全節今聴復本封以彰髙美干寳晉紀曰鍾㑹鄧艾將伐蜀與劉實别客謂實曰二將能破蜀不實曰必破蜀但皆不還客問其故實曰治道在於克讓因著崇讓論曰季世不能讓賢虛謝見用之恩莫肯讓于勝已晉中興書曰郗愔拜給事黄門侍郎愔苦求外出時呉郡守闋朝議欲用愔愔以資望少輕而少年不宜超莅大郡辭讓切至朝廷嘉之轉為臨海太守在郡優游養志不以事物縈心崔鴻前趙錄曰張寔為鉅鹿太守治任威强路不拾遺曾欲以寔為司徒太保皆垂涕固辭身騎瘠馬妻乘敗車後魏書曰髙肇字首文文昭皇太后之兄也肇子植自中書侍郎出為濟州刺史元愉之反也植率州軍出討破愉别將有功當䝉封賞朝廷論勲每謙讓不受云其家荷重恩為國致効是其常節何足以應進陟之報懇惻發于至誠又曰崔光韶為司空行叅軍復請讓從叔和曰臣誠㣲賤未登讓品屬逢唐朝恥無讓德和亦謙退辭而不當髙祖善之遂以和為廣陵王國常侍後周書曰蘇祜字承先陳留人也有膂力便騎射從征伐常潰圍陷陣還之日諸將争功祜終無競太祖歎之常謂諸將曰承先口不言勲孤當代言其見知如此沈約齊記曰朝係伯襄陽人也事母甚謹西土風俗田與隣畔者輒於畔上種桑以誌之係伯上種桑枝條䕃蔽他地每開數尺以避焉隣者隨復侵之係伯輒伐樹更種侵畔者慚不敢犯也齊書曰謝脁遷尚書吏部郎上表三讓中書疑脁官未及讓以問國子祭酒沈約約曰宋元嘉中范曄讓吏部朱修之讓黃門蔡興宗讓中書並三表詔答具事宛然近代小官不讓遂成恒俗恐此有乖讓意王藍田劉安西並貴重初不自讓今豈可慕此不讓耶孫興公孔顗並讓記室今豈可三署皆讓耶謝吏部今授超階讓别有意豈關官之大小撝謙之美本出人情若大官必讓便與詣闕章表不異例既如此謂都非疑脁又啟讓上優答不許唐書曰温彦博與兄大雅共掌機密彦博以昆季同在機務意不自安固請他職髙祖曰我虛心相待不以為疑卿何自疑也彦博雖應命然每退讓逺避機權寮列以此多之又曰長孫無忌册拜司空無忌固辭讓不許又曰臣幸居外戚恐招聖主私親之誚敢以死請太宗曰無忌聰明鑒悟且有武畧公等並知所以委之台鼎無忌又上表切讓帝使謂之曰昔黃帝得力牧而為五帝先夏禹得咎繇而為三王祖齊桓得管仲而為五伯長朕自在藩邸即任使公遂得廓清宇内君臨天下以公功績才望允稱具瞻故授此官無宜辭}
