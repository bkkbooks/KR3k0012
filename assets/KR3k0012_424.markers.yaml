  - {type: variant, offset: 23, length: 388, content: 濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也象曰地中有山謙君子以裒多益寡稱物平施初六謙謙君子用涉大川吉六二鳴謙貞吉九三勞謙君子有終吉六四無不利撝擅謙上六鳴謙利用行師征吉易下繫曰謙德之柄也尚書曰滿招損謙受益左傳莊公曰齊侯使敬仲為卿辭曰羇旅之臣敢辱高位以速官謗敢以死告又成上曰晉與齊戰而勝歸范文子後入武子曰無為吾望爾也武子士會文子之父對曰師有大功國人喜以逆也先入必屬耳目是代帥受名故不敢武子曰吾知免矣知其不益己禍漢書曰張安世兄賀為掖庭令而宣帝以皇曾孫收養掖庭賀視養拊循恩甚密焉上追思賀恩欲封其塚為恩德侯置守塚戶二百家安世深辭賀封又求損守塚戶上曰吾自為掖庭令非為將軍安世乃止又曰于定國為人謙恭尤重經術士雖卑賤徒步定國皆與均禮又曰元帝即位徵孔霸為師賜爵關內侯霸為人謙退不好權勢常爵位泰過何德以堪之霸讓位自陳上深知其志誠乃弗用, SBCK: ''}
