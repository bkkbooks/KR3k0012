  - {type: variant, offset: 22, length: 0, content: '', SBCK: 生軀蹈死地昌志登禍機魏王粲大暑賦曰或赫㸍以癉炎或鬱術而燠蒸獸狼望以􅀝喘鳥垂翼而弗翔根生苑而焦炙豈含血而能當仰庭槐而嘯風風旣生其如湯氣呼吸以祛短汗􅀨下而沾裳就清泉以自沃猶淟涊而不凉體煩茹以於悒心憤悶而窘惶又曹植大暑賦曰大暑赫其遂蒸元服革而尚黄虵拒鱗於靈窟龍解角於皓蒼遂乃温風赫㸍草木垂幹山拆海沸沙融礫爛飛魚躍渚潜黿浮岸鳥張翼以逺栖獸交逝而雲散晉傳咸感凉賦曰踐朱明之中月暑􅊊隆以肇興赫融融以彌熾乃沸海而焦陵稽含困􅀬賦序曰夫閏於夏則崇暑在冬則増寒永熈元年閏在仲夏三伏之節始奏啇秋之辰未期余以下里貧生居室卑陋小巷不來清風短廡不足增䕃外困流汗内懷煩暵歎彼夏屋之士口饜珎味體逸髙廊並天而寒暑殊同丗而憂樂異卞伯玉大暑賦曰體沸灼乎如燎汗流瀾􅀆珠連程曉詩曰平生三伏時道路無行車閉門避暑卧出入不相過今丗能襶能音柰襶音戴子觸􅀬到人家主人聞客來頻就子六切柰此何謂當行起去安坐止跘跨跘音盤跨音誇所說了無急􅊱吟一何多疲倦向之以甫問居極郍摇扇臂中疼流汗正澇沲莫謂此小事亦是人一瑕傳戒諸髙明􅀬行冝見呵晉傳􅀇詩曰朱明運將極溽暑晝夜興裁動四支廢舉身􅀂山陵珠汗洽玉體呼吸氣鬱蒸塵垢自成􅅺素粉隨手凝魏曹植九詠曰温風翕􅀆煎沙石翕􅀬皃也鳥罔竄􅀆獸無蹠蹠之石切足履踐也言天煖石焦地熱鳥無所逃獸無所蹈履也寒釋名曰寒捍也捍格也􅀃文曰寒也從雨執聲􅏮清寒也丁念切書曰休徴謀時寒􅀂咎徴急􅁪寒􅀂孔安囯曰君能謀則時寒順之君行急則常寒順之又曰冬祁寒小民亦惟曰怨咨詩曰一之日觱發風寒也二之日栗列寒氣也又曰北風刺虐也衛國並爲威虐百姓不親莫不相携持而去焉北風其凉􅀨雪其滂北風寒凉之風也滂盛貌也箋云寒凉之風病害萬物諭君政教酷􅁀使民散亂而去}
