  - {type: variant, offset: 3461, length: 2, content: 夕雖, WYG: 已熱其毛長八尺可以為褥卧之可以却寒又曰東南方海中烜與逺切洲上有湖其中惟有鯽魚長八尺食之宜暑而避風潯陽有林湖鯽魚大二尺餘食之肥美可以已寒黄帝素問曰地冽為寒太公金匱曰武王伐紂紂徃洛邑}
