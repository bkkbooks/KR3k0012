  - {type: variant, offset: 2808, length: 0, content: '', SBCK: 不可勝嚴風截人耳素雪隨地凝牀上飛霜起波中自生冰未夕結重衾崇朝不敢興又陸機樂府苦寒行曰北遊幽朔城凉野多嶮難俯入穹谷底仰陟髙山盤凝冰結重澗積雪􅀍長巒隂雲與巖側悲風鳴樹端不覩白日景但聞寒鳥喧猛虎慿林嘯􅀇猿臨岸歎平聲夕宿喬木下􅃤愴􅁪尠歎渇飲堅冰漿飢噉零露飡又連珠曰沉寒凝海不能結風琴操曰曽子嘗耕於泰山之下遭天􅀨雪寒凍旬日不得歸乃作憂思歌也宋􅀽淑七言詠寒雪曰渚幽寒􅀆石烟聚日華收􅀆山}
  - {type: page-break, offset: 2808, content: '', id: KR3k0012_SBCK_034-10a}
  - {type: variant, offset: 2808, length: 0, content: '', krp: 不可勝嚴風截人耳素雪隨地凝牀上飛霜起波中自生冰未夕結重衾崇朝不敢興又陸機樂府苦寒行曰北遊幽朔城凉野多嶮難俯入穹谷底仰陟髙山盤凝冰結重澗積雪𬒳長巒隂雲與巖側悲風鳴樹端不覩白日景但聞寒鳥喧猛虎慿林嘯玄猿臨岸歎平聲夕宿喬木下慘愴恒尠歎渇飲堅冰漿飢噉零露飡又連珠曰沉寒凝海不能結風琴操曰曽子嘗耕於泰山之下遭天雨雪寒凍旬日不得歸乃作憂思歌也宋袁淑七言詠寒雪曰渚幽寒兮石烟聚日華收兮山}
