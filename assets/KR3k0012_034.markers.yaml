  - {type: variant, offset: 27, length: 128, content: 孟冬是月也天子乃祈來年于天宗大割牲祠于公社及門閭臘先祖五祀此周禮所謂蜡祭也天宗日月星辰也大殺群牲割之也臘謂以畋獵所得禽祭也五祀門戶霤井灶也或曰祈年或曰大割或曰臘互其文也勞農休息之黨正屬民飲酒正齒位也天子乃命將帥講武習射御角力講武角力校武士材力所以備田獵之禮, SBCK: 仲春行秋令則寒氣惣至}
