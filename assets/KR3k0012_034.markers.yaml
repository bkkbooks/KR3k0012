  - {type: variant, offset: 2841, length: 0, content: '', WYG: 中有逸人王仲都能忍寒乃於盛寒日令袒衣載以駟馬於昆明池上繞氷而走御者厚衣狐裘甚寒而仲都獨無變也論衡說寒温有}
