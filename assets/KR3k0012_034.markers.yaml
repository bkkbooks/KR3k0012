  - {type: variant, offset: 156, length: 838, content: 曰郊特牲天子大蜡八伊耆氏始為蜡伊耆氏古天子號也蜡也者索也謂永索也歲十二月合聚萬物而索饗之也歲十二月周之正月謂建亥之月饗者祭其神也萬物有功民者神使為之也祭之以報焉蜡之祭也主先嗇也先嗇若神農者司嗇后稷神也又曰昔者仲尼與於蜡賓蜡者索也歲十二月索合聚萬物而索饗之亦祭宗廟孔子仕魯在助祭之中事畢出遊於觀之上喟然而嘆觀闕也子見魯君於祭禮有不備於此文覩象魏舊章之處感而嘆之仲尼之歎蓋歎魯也又曰子貢觀於蜡蜡索也歲十二月索群神而祀之蜡也孔子曰賜也樂乎對曰一國之人皆若狂賜未知其為樂也孔子曰百日之勞一日之澤非爾所知言民皆勤稼穡百日之勞喻久也今一日使之飲酒宴樂是君之恩澤也周禮曰國祭蜡則吹豳頌擊土鼓以息老鄭玄曰十二月禮謂建亥之月也索萬物而祭之者萬物天成歲事至此為其老而勞其禮而息之也幽頌七月又有穫稻作酒觥觴萬壽無疆之事是亦歌其類也謂之頌者以其言歲終又功成也周以今之十一月為正月以今十月為臘月也傳曰晉侯復假道於虞以伐虢宮之奇諫弗聽以其族行曰虞不臘矣臘祭名也日月會於龍尾百物備合國於是祭群神也史記曰秦惠文王十二年初臘始皇三十一年十二月更名臘曰嘉平太原真人茅君內記曰始皇三十一年九月庚子君魯祖父濛乃於華山之中乘雲駕龍白日升天先是其邑歌謠曰神仙得者茅初成駕龍上升入太清時下玄虛戲山赤城繼世而往在我嬴帝若學之臘嘉平始皇聞謠歌而問其故父老具對此仙人之謠勸帝求長生之志也於是始皇欣然乃有尋仙之志因改臘曰嘉平也又曰張良見老父出一編書曰讀是書為王者師後十三年濟北城山下黃石即我也良後得黃石取寶而祠之及死葬黃石每上塚伏臘祠黃石焉漢書曰高祖十年春有司奏令縣道常以春二月及臘祠社稷以羊彘又曰嚴延年為河南太守初延年母從東海來從延年臘到洛陽適見報囚報行次也母大驚便止都亭不肯入府延年出至都亭謁母母閉閤不見延年免冠頓首閤下良久乃見之因數責延年曰幸得備郡守專治千里不聞人愛多刑殺人欲以立威豈為民父母意哉延年重謝自為母御歸府舍母畢正臘已謂延年曰天道神明人不可獨殺我不自意當老見壯子被刑戮也行矣汝南東歸掃除墓地耳後延年遂敗司馬彪續漢書, SBCK: ''}
