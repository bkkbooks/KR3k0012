  - {type: variant, offset: 22, length: 0, content: '', WYG: 主驅蹈死地昌志登禍機魏王粲大暑賦曰或赫熾以瘴炎或鬱術而燠蒸獸狼望以倚喘鳥垂翼而弗翔根生苑而焦炙豈含血而能當仰庭槐而嘯風風既生其如湯氣呼吸以袪暍汗雨下而沾裳就清泉以自沃猶沃涊而不凉體煩如以於悒心情悶而窘惶又曹植大暑賦曰大暑赫其遂蒸元服華而尚黄蛇折鱗於靈窟龍觧角于皓蒼遂乃温風赫曦草木垂榦山拆海沸沙融爍爛飛魚躍渚潜龜浮岸鳥張翼以逺栖獸交逝而雲散晉傳咸感凉賦曰踐朱明之中月星鬱隆以肇興赫融融以彌熾乃沸海而焦陵􅄞含困熱賦序曰夫閏于夏則崇暑在冬則増寒永熙元年閏在仲夏三伏之節始奏商秋之辰未期於時下里貧生居室卑陋小巷不來清風短廡不足増䕃外困流汗内懐煩暵歎彼厦屋之士口饜珍味體逸髙廊並天而寒暑殊同世而憂樂異卞伯玉大暑賦曰體沸灼乎如燎汗流爛兮珠連程曉詩曰平生三伏時道路無行車閉門避暑卧出入不相過今世褦襶子褦音柰襶音戴觸熱到人家主人聞客至顰蹙子六切柰此何謂當行起去安坐止􅀈跨􅀈音彭跨音誇所說了無急踏吟一何多疲倦向之苦甫問居極那揺扇臂中疼流汗正滂沱莫謂此小事亦是人一瑕傳戒諸髙明熱行宜見訶晉傅𤣥詩曰朱朔運將極溽暑晝夜興裁動四支廢舉身若山陵珠汗洽玉體呼吸氣鬱蒸塵垢自成泥素粉隨手凝魏曹植九詠曰温風翕兮煎沙石翕熱貌也鳥罔竄兮獸無蹠蹠之石切天覆我也言天暖石焦地熱鳥無所迯獸無所蹈履也寒釋名曰寒捍也捍格也說文曰􅀢寒也從雨執聲凛清寒也􅀢丁念切書曰休徴曰謀時寒若曰咎徴曰急恒寒若孔安國曰君能謀則時寒順之君行急則常寒順之又曰冬祁寒小民亦惟曰怨咨詩曰一之日觱𤼵風寒也二之日栗烈寒氣也又曰北風刺虐也衞國並為威虐百姓不親莫不相擕而去故云北風其凉雨雪其滂北風寒凉之風也滂盛貌也箋云寒凉之風病害萬物喻君政教酷暴民皆避亂而去}
