  - {type: variant, offset: 2831, length: 2, content: 祀殷, WYG: 風戒寒火心星清風寒風也清風至而修城郭戰國䇿}
  - {type: punctuation, offset: 2832, content: ，, id: KR3k0012_CHANT_034-bkkpn763}
  - {type: 'tls:seg', offset: 2832, content: '', id: KR3k0012_CHANT_034-29a.12}
  - {type: variant, offset: 2834, length: 2, content: 嘉平, WYG: 田單為齊相過淄水有老人渉淄而寒不能行單乃解裘衣與之襄王曰單之厚施欲取我國乎有貫珠者聞之曰不如因與焉已下令曰寡人憂民之寒單解衣與之稱寡人意於是閭里相與語曰單之愛人乃王之致也}
  - {type: punctuation, offset: 2836, content: ，, id: KR3k0012_CHANT_034-bkkpn764}
  - {type: 'tls:seg', offset: 2836, content: '', id: KR3k0012_CHANT_034-29a.13}
  - {type: variant, offset: 2836, length: 322, content: 周曰大蠟漢曰臘臘者臘也因獵取獸以祭先祖或曰臘接也新故交接狎臘大祭以報功也漢火行衰於戍故以戍為臘也又曰兔髕俗說臘正旦食得兔髕者名也曰幸賞以寒酒幸者善祥令人吉利也髕毗忍切髕髕膫蓋又曰上古之時有神荼與鬱壘昆弟二人性能伏鬼度朔山桃樹下簡閱百鬼鬼無道理妄為人禍者神荼與鬱壘縛以葦索執以食虎於是縣官常以臘除文飾桃人垂葦終絞畫於門皆追效前事冀以禦凶也會稽典錄曰陳脩字奉遷烏陽人家貧為吏常步擔上下恒食乾粺音備乾飵也每至正臘僵臥不起同僚以飲食請不往其志操如此世說曰王朗中年以識度推伏華歆歆蠟日堂乃集子姪宴飲王亦學之有人向張茂先稱此事張曰王之學華皆是形骸之外去之所以更遠玉燭寶典曰臘者祭先祖蠟者報百神同日異祭也蔡邕獨斷曰臘者歲終大祭縱吏民宴飲非迎氣故但送不迎也崔寔, SBCK: 御覽卷第三十}
