  - {type: variant, offset: 2842, length: 4, content: 臘臘者臘, WYG: 人君喜則温怒則寒又曰河東項曼都好道學仙去家三年而返曰去時有數仙人將上天離月數里而上月之旁其寒凄凄穆天子傳曰天子逰黄臺之丘日中大寒雨雪有凍死人天子作黄竹詩以愍之葛仙公别傳曰公與客談語時天大寒仙公謂曰客居貧不能人人得爐火請作一大火共致煖氣何如因吐氣火赫然從口出須㬰火滿屋客皆熱脫衣孝子傳曰閔子騫事後母極孝騫衣以蘆花御車失靷父怒笞之撫背之衣單父乃去後妻騫啟父曰母在一子寒母去三子單石虎别傳曰十三年春二月虎率三公九卿躬耕籍田又令夫人與命婦先蠶近郊是嵗八月雨雪大寒行旅凍死鍾離意别傳曰嚴遵昔與光武俱為諸生暮夜宿息二人寒不得寝卧更相謂曰後日豪貴憶此勿相忘别後數年光武有天下徴遵不至}
