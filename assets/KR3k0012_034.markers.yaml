  - {type: variant, offset: 3514, length: 293, content: 二月祭飲食也一日嘗新始殺食日貙膢貙勑俱切漢書曰武帝太初二年令天下酺五日膢五日祠門戶比臘如淳曰膢者樓漢儀注立社貙膢許慎曰俗以十二月祭飲食冀州北部或以八月朝作飲為膢其俗語曰膢臘社伏蔡邕曰貙獸常以立秋日邏食其母猛䖝搏鷙時王者亦以此臘邏以祭廟膢劉劉殺也言擊殺之時者也續漢書禮儀志曰立秋之日郊禮畢始楊威武斬牲於郊東門以薦陵廟其儀乘輿御戎輅白馬朱鬣躬執弩射牲薦廟太宰令謁者各一人載獲車馳駟送廟還宮遣使者齎束帛以賜武官肆兵習戰陣之儀斬牲之禮名曰貙劉風俗通曰謹案韓子書曰山居谷汲者膢臘寡水楚俗常以十二月祭飲也又曰嘗新始殺也食新曰貙膢也又曰謹案自郊貙膢春秋饗射天子射麑掩雉獻諸宗廟扶陽發滯養老致敬化之至也, WYG: 四}
