  - {type: variant, offset: 3459, length: 1, content: 蜡, WYG: 興四年大寒傷民氷厚時王敦肆亂殺戮忠良神異經曰北方有層氷萬里厚百尺下有鼷在氷下土泥中其形如鼠食水草肉重萬斤作脯食}
