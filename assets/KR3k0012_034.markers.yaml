  - {type: variant, offset: 3490, length: 11, content: 有肉如丘有酒如淵有肴如, WYG: 嵐山寒折骨面目盡生瘡嵐山𦍑中山名傅𤣥詩曰季冬時慘冽猛寒不可勝嚴風截人耳素雪隨地凝艸上飛霜起波中自生氷未夕結重衾崇朝不敢興又陸機樂府苦寒行曰北逰幽朔城凉野多險艱俯入窮谷底仰陟髙山巔凝冰結重澗積雪被長巒隂雲興巖側悲風鳴樹端不覩白日景但聞寒鳥喧猛獸憑}
