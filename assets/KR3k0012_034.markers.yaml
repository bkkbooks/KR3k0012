  - {type: variant, offset: 1978, length: 816, content: 列傳曰玄年十二隨母還家正臘讌會同列十餘人皆美服盛飾語言閑適君獨漠然如不及母私督數乃曰此非我志不在此願列女傳曰魯之母師者魯九子之寡母也臘日休家作悉召諸子謂曰婦人之義非有大故不出夫家然吾父母家歲時祀不理吾從汝謁謁告諸子欲往往監之慎房戶之守吾夕而反於是天陰還失早至閭外而止待夕而入魯大夫從臺上見而怪之使人問對妾歸視私家諸奴孺子期夕而反妾恐其酺歠醉飽人情公有也妾反早故止閭外盡期而入大夫美之言於穆公公賜母尊號曰母師搜神記曰宣帝時陰子方者當臘日晨炊而竈神形見子方再拜受慶家有黃羊因以祠之自是以後暴至巨富故後常以臘日祠竈風土記曰醇以告蜡竭恭敬於明祀乃有藏彄蓋因婦人所作金鐶以錔指而纏者彄音鉤臘日之後叟嫗叟嫗皆男子婦人之老稱各隨其儕為藏彄分二曹以效勝負荊楚歲時記曰又為藏彄之戲辛氏以為鉤弋夫人所起周處成公綏並作彄字藝經庚闡則作鉤字其事同也俗云戲令人生離有禁忌之家廢不修也辛氏三秦記曰漢昭帝母鉤弋夫人手拳有國色世人藏鉤因此安漢鉤弋夫人姓趙為武帝婕妤生昭帝漢武故事云上巡狩河間見青氣自地屬天望氣云下有貴子上求之莫舒上自披即舒號拳夫人善素女術大有寵即鉤弋夫人也周處風土記云呼為行彄蓋婦人所用銀作環以錔指而縫者臘日祭後叟嫗兒意皆藏彄戲分為二曹以効勝負為一籌為一都負者起拜謝勝者又曰孔子所以預於蜡賓一歲之中盛於此節又曰俗又以此月為臘月案史記陳勝傳有臘月之言是謂此也諺云臘鼓鳴春草生村人並擊細霄鼓戴明頭及作金剛力士以逐大疫華陽國志曰王長文字德雋元康初守江源令縣收得盜馬賊及發冢賊長文引見誘慰時適臘晦皆遣歸家獄先有擊囚亦遣之謂曰教化不厚使汝等如此長吏之過也蜡節慶祚肆汝就上下善相歡樂過節來還當為汝思他理群吏惶怖爭請不許尋有赦無不感恩三十國春秋曰江州刺史胤自武昌以一疾被徵為右將軍而王舒未至猶在盆口後將軍郭默旋而過胤胤不禮之臘日遺默酒五升馲一頭默大怒投之於江遂與故將張丑宋侯孟純等矯詔入城門莫有禦者胤獨與其妾寢默至斬于床下及其司馬張滿參荀揩李纂慠慠默故也王肅議禮, SBCK: 詩}
