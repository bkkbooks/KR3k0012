  - {type: variant, offset: 2830, length: 0, content: '', WYG: 青女天神青女玉女仲春二月之夕乃閉其寒吕氏春秋曰衞靈公天寒鑿池苑春曰天寒恐傷民公曰寒哉春曰君衣狐裘坐熊席取火是故不寒民衣敝不補君則不寒民則寒矣公曰善命罷役左右曰是徳必歸于春公曰不可春所有之善即寡人之善也衞人悅當時衞公得君道矣又曰冬之徳寒又曰見瓶水之氷而知天下之寒國語曰火見而}
