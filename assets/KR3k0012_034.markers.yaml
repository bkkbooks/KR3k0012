  - {type: variant, offset: 999, length: 2, content: 星廻, SBCK: 命有司大儺旁磔以送寒氣鄭􅀇曰丑爲牛言}
  - {type: variant, offset: 999, length: 44, content: 星廻歲終陰陽已交勞農夫享臘已送故焉又禮儀志先臘一日大儺謂之逐疫又舊儀曰臘者報諸鬼即古聖賢, WYG: 命}
  - {type: variant, offset: 999, length: 2, content: 星廻, krp: 命有司大儺旁磔以送寒氣鄭玄曰丑爲牛言}
  - {type: substitution, offset: 1000, original: 廻, replacement: 回, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-16348}}
  - {type: variant, offset: 1002, length: 7, content: 終陰陽已交勞農, SBCK: 正者也送猶畢也又曰九月中氣是月也霜始降則百工休謂膠􅃮作停乃命有司曰寒氣惣至人力不堪其皆入室霜降後清風戒寒所以令人入室又曰孟冬行夏令則國多􅁀風巽爲風立夏巽用事故行夏令則多暴風方冬不寒夏氣干時方冬而温蟄虫復出虫以寒蟄温而復出又曰大寒之日雞始乳鴈北嚮又曰是月也乃命有司曰寒氣緫至民力不堪其皆入室又曰季春行冬令則寒氣時發草木皆肅又曰孟冬行夏令則國多􅁀風方冬不寒蟄虫復出傳曰楚莊王圍蕭申公巫臣曰師人多寒王廵三軍拊而勉之三軍之士皆如挾纊史記曰須賈見范睢曰今叔何事范睢曰臣爲人傭賃須賈意哀之留與坐飲食曰范叔寒如此哉乃取一綈􅂁以賜之漢書曰上聞韓王信降匈奴上將擊之連戰乗勝逐北至樓煩㑹大寒士卒墮指者十二三又曰邴􅁻爲廷尉時有老人年八十餘無子妻死娶後妻生一子而翁老死其子年數歳有前妻女曰非我父之胤遂上聞􅁻曰吾聞老人之子而不耐寒日中無影遂令驗之皆如其言又曰晁錯上書曰}
