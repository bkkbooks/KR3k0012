  - {type: variant, offset: 1191, length: 16, content: 自青州從事徵拜博士每臘詔書賜博士, krp: 謂之謡曰奴爲將軍何可羞六月累茵披貂裘不識寒暑斬人頭易稽覽圖曰冬至之後三十日極寒京房易妖占曰春夏寒政教急又京房傳曰有德遭險兹謂逆命厥異春寒秋運斗樞日行失則雖當燠反寒春秋考異郵曰繆公即位仲夏大寒冰錯亂甚也老子曰躁勝寒靜勝熱文子曰婦人當年不織天下有受其寒者尸子曰雨雪楚莊王𬒳裘當户曰我猶寒彼百姓賔客甚矣乃使廵國中求百姓賔客之無居宿絶粮者賑之國人大恱又曰朔方之寒冰厚六尺木皮三寸北極左右有不釋之冰晏子曰景公時雪三日公𬒳狐白裘晏子入公曰恠哉雨雪三日不寒晏子曰古之賢君飽而知人飢暖而知人寒公曰善出裘發粟以與飢寒者又曰景公起火臺歳寒役人凍餒者有焉管子曰大寒大暑大風大雨其至不時此謂四刑淮南子曰北方有北極之山曰寒門積寒}
