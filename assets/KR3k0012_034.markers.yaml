  - {type: variant, offset: 2812, length: 10, content: 臘除逐疫磔雞葦絞桃梗, WYG: 所致也東觀漢書曰王郎起兵上自東南馳夜至蕪蔞亭時天寒冽衆皆饑疲馮異上豆粥明旦上謂諸將曰昨得公孫馮異字公孫豆粥寒飢俱解續漢書五行志曰獻帝初平四年六月寒風如冬時又曰光和四年冬大寒北海東萊瑯琊井中氷厚尺餘大有年又窮谷}
