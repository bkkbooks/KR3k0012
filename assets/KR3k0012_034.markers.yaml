  - {type: variant, offset: 14, length: 5, content: 後壬戍臘祭, SBCK: 陽動於下推隂而上之故大寒於上夏至隂動於下推陽上之故大􅀬於上故易云日月運行一寒一暑日在牽牛則寒在東井則暑牽牛外宿逺人故寒東井内宿近人故温也白虎通曰夏至隂始起反大􅀬何隂起陽氣推而上故大􅀬也又曰至人神矣入大澤不濡焚而不能􅀬也又曰暍者反凍於冷風管子曰善爲國者使農寒耕而􅀬耘淮南子曰􅀬焦沙寒凝水抱扑子曰洪從祖仙公毎大醉及夏天盛熱輙入深淵之底一日許乃出以能閉氣胎息故耳又曰或問不􅀬之道或服玄冰丸或服飛雪散㓜子伯王仲都用此方也桓子新論曰元帝􅀍病廣求方士漢中送道人王仲都者詔問所能對曰但能忍寒暑耳因爲待詔至夏大暑日使暴坐又環以十鑪鑄火不言熱而身不汗出益州記曰瀘水即武侯渡處水有熱氣暑不敢行廣志曰南方炎洲炎氣薫數萬里爲寒瘴又曰南方地暑􅀬交阯麥不成秀䔉不生蕪菁無根括地圖曰天毒國最大暑􅀬夏草木皆乾死民善没水以避時暑常入寒泉之水語林曰劉眞長見王丞相時盛夏王公以腹熨彈棊局曰何乃渹吴人以冷爲渹渹音楚敬切劉旣出人問見王公如何對曰未見他異唯作吴語耳山海經曰壽林之國爰有大暑不可以徃丗􅀃曰荀奉倩與婦至篤冬月婦病􅀬倩乃出庭中自取冷還以身熨之黄帝素問曰黄帝問歧伯曰人傷於寒而轉爲􅀬何也曰夫寒盛則生於􅀬也楚招魂辭曰東方不可託些些語􅂇蘇賀切十日代出流金鑠石些鑠銷也言東方有扶桑之木十日並在其上其熱酷烈金石堅剛皆爲銷鑠也彼皆集之魂往必釋些釋解也魂徃必解爛宋鮑昭苦熱行曰赤坂撗西阻火山燃南威身􅀬頭且痛鳥墮魂未歸湯泉發雲澤燋煙起石沂日月有􅁪昬􅀨霧未嘗晞丹虵踰}
