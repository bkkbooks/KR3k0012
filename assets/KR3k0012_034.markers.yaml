  - {type: variant, offset: 2839, length: 1, content: 蠟, WYG: 水大寒之日雞不乳淫女亂男鷙鳥不厲國不除兵水澤不堅言乃不從說苑曰國有五寒而水凍不與焉一曰政外二曰女廣三曰謀泄四曰不敬卿士而國敗五曰不能治内而務外此五者一見惟禍無福桓譚新論曰元帝時}
