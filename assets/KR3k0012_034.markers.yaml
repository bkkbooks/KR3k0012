  - {type: variant, offset: 1262, length: 1, content: 虞, SBCK: 天子遊黄室之丘日中大寒􅀨雪有凍死人天子作黄竹詩以􅉖之􅁑仙公別傳曰公與客談語時天大寒仙公謂客曰居貧}
  - {type: variant, offset: 1262, length: 1, content: 虞, krp: 天子遊黄室之丘日中大寒雨雪有凍死人天子作黄竹詩以愍之葛仙公別傳曰公與客談語時天大寒仙公謂客曰居貧}
  - {type: variant, offset: 1264, length: 3, content: 臘矣唯, SBCK: 能人人得鑪火作請一大火共致暖者仙公因吐氣火赫然從口出湏􅁷火滿屋客皆􅀬脫衣孝子傳曰閔子騫事後母絮騫衣以蘆花御車寒失紖父怒笞之後撫背之衣單父乃去其妻騫啓父曰母在一子寒母去三子單石虎别傳曰十三年春二月虎率三公九卿躬耕籍田后率二夫人命婦先蠶近郊是歳八月雨雪大寒行旅凍死鐘離意别傳曰嚴遵昔與光武俱爲諸生暮夜宿息二人寒不得寢卧更相謂曰後日豪貴憶此勿相忘別後數年光武有天下徴遵不至也西京雜記曰淮南王好方士士皆以術}
