  - {type: variant, offset: 2837, length: 0, content: '', WYG: 書時訓}
  - {type: variant, offset: 2838, length: 0, content: '', WYG: 小寒之日鴈不北鄉民不懐王鵲不治巢國家不寧雉不始雊國乃}
