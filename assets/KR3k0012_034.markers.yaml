  - {type: variant, offset: 1209, length: 2, content: 京師, SBCK: 故曰寒門又曰夏䖝不可與語寒蜩蟬不知寒雪又曰青女天神青女玉女仲春二月之夕乃閉其寒吕氏春秋曰衛靈公天寒鑿池宛春曰天寒恐傷民公曰寒哉春曰君衣狐裘坐熊席取火是故不寒民衣弊不苴君則不寒民則寒矣公曰善命罷􅃥左右曰是德必歸於春不可公曰春而有之善乃寡人之善也衛人恱當時謂公得君道矣又曰冬之德寒又曰見瓶水之冰而知天下之寒淮南子又載也國語曰火見而清風戒寒火心星青風寒風也清風至而脩城郭戰國䇿曰田單爲齊相過淄水有老人渉淄而寒不能行單乃解裘衣與之襄王曰單之厚施欲取我國乎有貫珠者聞之曰不知}
