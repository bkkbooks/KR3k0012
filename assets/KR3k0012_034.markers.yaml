  - {type: variant, offset: 2809, length: 26, content: 節令之臘除逐疫磔雞葦絞桃梗之屬風俗通曰夏曰清祀殷曰嘉, SBCK: 深邊亭哀􅀆夜燧滅孫松振􅀆空岫吟魚戢鱗􅀆鳥矝翰虹蟄火􅀆龍藏金太}
  - {type: variant, offset: 2809, length: 1, content: 節, WYG: 鄭𤣥曰丑為牛又曰九月中氣是月也霜始降則百工休謂膠漆作停乃命有司曰寒氣總至人力不堪其皆入室霜降清風戒寒将以聚人入室又曰孟冬行夏令則國多暴風巽為風夏主巽風事故行夏令則多暴風方冬不寒夏氣干時方冬而温蟄蟲復出蟲以寒蟄温而復出又曰大寒之月雞始乳鴈北鄉又曰季春行冬令則寒氣時𤼵草木皆肅傳曰楚莊王圍蕭申公巫臣曰行人多寒王廵三軍拊而勉之三軍之士皆如挾纊史記曰湏賈見范雎曰今叔何事范雎曰臣為人傭賃湏賈意哀之留與坐飲食曰范叔一寒如此哉乃取一綈袍賜之漢書曰上聞韓王信降匈奴自將擊之連戰乗勝逐北至樓煩㑹天寒士卒墮指者十二三又曰邴吉為廷尉時有老人年八十無子妻死娶後妻生一子而翁老死其子年數嵗有前妻女曰非我父之𦙍遂上聞吉曰吾聞老人之子甚不耐寒日中無影遂令騐之皆如其言又曰􅄯錯上疏曰夫胡貉之地積隂之處也木皮三寸土地寒故也氷厚六尺食肉而飲酪其人密裏鳥獸毳毛其性能音柰寒又曰王莽天鳯四年八月莽親之南郊鑄作威斗是日大寒百官人馬有凍死者又曰雲南郡㸃蒼山特寒四月五月中猶積雪皓然謝承後漢書曰盛夏多寒常彪上疏諫曰臣聞政治之本必順隂陽伏見立夏以來當暑而寒殆刑罰刻急郡國不和時}
