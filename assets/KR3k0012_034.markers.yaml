  - {type: variant, offset: 11, length: 1, content: 臘, SBCK: 溽濕暑也易曰暑往則寒來書曰哲時燠􅀂又曰豫􅁪燠􅀂君行逸豫常暖順之詩曰誰能執􅀬逝不以濯禮曰季夏之月土潤溽暑鄭􅀇注曰潤溽塗漏又曰仲春行夏令則國乃大旱煖氣早來又曰仲秋行夏令則其國火災寒􅀬不節漢書曰􅄢賔國武帝時剽殺漢使成帝時復遣使奉獻謝罪杜欽􅀃大將軍王鳯不令使上聲使去聲向􅄢賔國曰此國道經大小頭痛之山赤􅁟身􅀬之坂令人頭痛歐吐唐書曰代宗時有迎凉草鳯首木迎凉草幹如竹葉細於杉乾枯而未嘗凋落盛暑而刺之䆫户間則凉風自至易稽覽圖曰夏至之後三十日極温京房易飛􅀱曰有雲大如車蓋十餘此陽水之氣必暑有暍者暍音謁禮斗威儀曰君喜怒無常時則常熱五經通義曰}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_SBCK_034-1b}
  - {type: variant, offset: 11, length: 1, content: 臘, WYG: 溽濕暑也易曰寒徃則暑來書曰哲時燠若又曰僣恒暘若詩曰誰能執熱逝不以濯禮曰季夏之月土潤溽暑鄭𤣥注曰潤溽塗温又曰仲春行夏令則國乃大旱煖氣早來又曰仲秋行夏令則其國火災寒熱不節漢書曰􅄢賓國武帝時剽漢使成帝時復遣使奉獻謝罪杜欽說大將軍王鳳不令使使者逺向􅄢賓國曰此國道經大小頭痛之山赤土身熱之坂令人頭痛嘔吐唐書曰代宗時有迎凉草鳳首木迎凉草榦如竹葉細於杉乾枯而未嘗凋落盛暑而刺之牕户間則凉風自至易稽覽圖曰夏至之後三十日極熱京房易占候曰有雲大如車蓋十餘此陽火之氣必暑有暍者暍音謁禮斗威儀曰君喜怒無常時則常熱五經通義曰}
