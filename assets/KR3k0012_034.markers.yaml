  - {type: punctuation, offset: 3158, content: 《, id: KR3k0012_CHANT_034-bkkpn861}
  - {type: variant, offset: 3159, length: 648, content: 民月令曰十月上辛命典饋清麴釀冬酒以供臘祀又曰臘明日謂小歲進酒尊長修刺賀君師又曰十二月臘時祠祝炙蓬樹瓜田四角去甘䖝瓜中䖝謂之甘䖝蔡邕王喬錄曰漢永和元年十二月腋夜王喬墓上哭聲王伯聞但往視之天大雪見大鳥跡并祭祀處採薪者尹禿見人冠衣曰我王喬也汝莫取吾墓樹忽不見徐爰家儀曰蜡本施祭故不賀其明日為小歲賀稱初歲福始罄無不宜正旦賀稱元正首慶百物惟新小歲之賀既非大慶禮止門內西域諸國志曰天笁國以十二月十六日為臘臘則麥熟盧公家範曰九臘日上澡豆帶及頭膏面脂口脂淮南萬畢術曰歲暮臘埋圓石於宅隅雜以桃弧七枚則無鬼疫養生要術云臘夜持椒臥井旁勿與人言投于井中除溫疫盛翁子藏鉤賦敘曰以臘之後因祭祀餘胙要命中外以行鉤為戲嵇含蜡賦序曰大蜡之夕雖天地同有至攜金蘭以齊聲利得意以遺榮勢孰尚我裴秀大蜡詩曰有肉如丘有酒如淵有肴如林有貨如山小歲說文曰膢楚十二月祭飲食也一日嘗新始殺食日貙膢貙勑俱切漢書曰武帝太初二年令天下酺五日膢五日祠門戶比臘如淳曰膢者樓漢儀注立社貙膢許慎曰俗以十二月祭飲食冀州北部或以八月朝作飲為膢其俗語曰膢臘社伏蔡邕曰貙獸常以立秋日邏食其母猛䖝搏鷙時王者亦以此臘邏以祭廟膢劉劉殺也言擊殺之時者也續漢書禮儀志曰立秋之日郊禮畢始楊威武斬牲於郊東門以薦陵廟其儀乘輿御戎輅白馬朱鬣躬執弩射牲薦廟太宰令謁者各一人載獲車馳駟送廟還宮遣使者齎束帛以賜武官肆兵習戰陣之儀斬牲之禮名曰貙劉風俗通曰謹案韓子書曰山居谷汲者膢臘寡水楚俗常以十二月祭飲也又曰嘗新始殺也食新曰貙膢也又曰謹案自郊貙膢春秋饗射天子射麑掩雉獻諸宗廟扶陽發滯養老致敬化之至也, SBCK: ''}
