  - {type: variant, offset: 1044, length: 807, content: 功於民者皆享之袁山松後漢書韓卓字子助陳留人臘日奴竊食祭其母卓義其心即日免之免從良也謝承後漢書曰弟五倫母老不能之官至臘日常悲戀垂涕又曰沛國陳咸為廷尉監王莽篡位還家杜門不出莽改易漢法令及臘日咸常言我先祖何知王氏之臘乎又東夷列傳曰三韓俗以臘日家家祭祀俗云臘鼓鳴春草生也東觀漢記曰甄宇字長文北海人建武中自青州從事徵拜博士每臘詔書賜博士所在京師因以號之高堂隆魏臺訪議曰詔問何以用未祖丑臘臣隆對曰按月令孟冬十月臘先祖五祀謂薦田臘所得禽獸謂之臘左傳曰虞不臘矣唯見此二者而皆不書曰聞先師說曰王者各以其行之盛祖以其終臘水始生於申盛於子終於辰故水行之君以子祖辰臘火始生於寅盛於午終於戍故火行之君以午祖戍臘木始生於亥盛於卯終於未故木行之君以卯祖未臘金始生於巳盛於酉終於丑故金行之君以酉祖丑臘土始生於未盛於戍終於辰故土行之君以戍祖辰臘今魏據土德宜以戍祖辰臘也又曰華歆常以臘日宴子弟王朗慕之蓋其家法由來漸矣杜公瞻云蜡者息民之祭故孔子云百日之勞一日之懌其所祭八神者皆報其成功則於十月農隙是也後世腊有新故交接之義遂移於夏正月十二月晉愽土張亮說蜡聚饗臘者祭廟初云蜡則黃服蜡臘不同惣非也臘宜在新故交接二祭月同而名異祭俱但而服殊今推諸經傳無正說蜡臘之文月令云蜡臘此則同日祭但互名耳據田臘取獸之名為臘因索饗百神號之曰蜡其曰上先祖旁饗百神下息萬民無別祭也即鄭玄云既蜡臘先祖五祀於是勞農者也近日蜡臈兼設蜡在十月臘在歲終隋開皇四年始停建元之蜡直為建丑之臘依五行火衰於戍而用戍日故也晉書范喬字伯孫喬邑人臘夕盜斫其樹有告者喬佯不聞邑人愧而還喬曰節日取柴欲與父母相歡耳何以愧乎遂不取又曰陳軫問方士戴洋曰江南有貴人顧彥先周宣珮是否洋曰顧不及臘周不及明年八月其年十二月十九日顧卒明日臘宣珮以明年七月晦亡又晉起居注曰安帝安隆四年十二月辛丑臘祠作樂又博士張亮議曰臘接也登宜在新故交接也俗謂之臘之明日為初歲秦漢以來有賀此古之遺語晉宋舊事曰魏帝遜位祖以酉日臘以丑日魏名臣奏曰大, WYG: ''}
