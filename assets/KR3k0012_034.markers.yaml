  - {type: variant, offset: 1223, length: 3, content: 詔問何, SBCK: 單之愛人乃王之教也周書時訓曰小寒之日鴈不北嚮民不懷主鵲不始巢國家不寧雉不始雊國乃大水大寒之日雞不乳淫女亂男鷙鳥不厲國不除兵水澤不堅言乃不從􅀃苑曰國有五寒而水凍不與焉一曰政外二曰女廣三曰謀泄四曰不敬卿士而國敗五曰不能治内而務外此五者一見惟禍無福桓譚新論曰元帝時漢中送道人王仲都能忍寒乃於盛寒日令􅃝衣載}
