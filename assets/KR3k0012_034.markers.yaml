  - {type: variant, offset: 3464, length: 3, content: 地同有, WYG: 隂雨寒雪十餘日漢張奐與延篤書曰太隂之紀氷厚三尺木皮三寸風威寒冽損筋傷骨非老憊者所堪而復加之以師旅因之以饑饉衆艱罄集不可一二言也後漢張衡思𤣥賦曰趄區中之隘陋兮将北渡而宣逰宣遍行積氷之皚皚兮清泉沍而不流沍凍也寒風凄其永}
