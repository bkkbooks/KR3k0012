  - {type: variant, offset: 14, length: 5, content: 後壬戍臘祭, WYG: 陽動于下推隂而上之故大寒於上夏至隂動于下推陽而上之故大熱于上故易云日月運行一寒一暑日在牽牛則寒在東井則暑牽牛外宿逺人故寒東井内宿近人故温也白虎通曰夏至隂始起反大熱者何隂起陽氣推而上故大熱也又曰至人神矣入大澤不濡焚而不爇也又曰暍者反凍于冷風管子曰善為國者使農寒耕而熱耨淮南子曰熱焦沙寒凝水抱朴子曰洪從祖佛公每大醉及夏天盛熱輒入深淵之底一日許乃出以能閉氣胎息故耳又曰或問不熱之道曰或服𤣥水丸或服飛霜散霜一作雪昔王仲都用此方也桓子新論曰元帝被病廣求方士有漢中逸人王仲都者詔問所能對曰但能忍寒暑耳因為待詔至夏大暑日使暴坐又環以十罏火不言熱而身汗不出益州記曰瀘水即武侯渡處水有熱氣暑天不敢行廣州志曰南方炎洲氣薫數萬里為瘴又曰南方地暑熱交趾麥不成秀麻不生蕪菁無根括地圖曰天毒國冣大暑熱夏草木皆乾死民善收水以避暑將暑常入寒泉之下語林曰劉真長見王丞相時盛夏王公以腹熨彈碁局曰乃渹吴人以冷為渹渹音虛觥切劉既出人問見王公如何對曰未見他異惟作吳語耳山海經曰夀林之國夏有大暑不可以徃世説曰荀奉倩與婦至篤冬月婦病熱倩乃出中庭自取冷以身熨之黄帝素問曰黄帝問岐伯曰人傷于寒而轉為熱何也曰夫寒盛則生熱也楚招魂辭曰東方不可託些些楚語蘇資切十日代出流金爍石些鑠銷也言東方有扶桑之木十日並在其上言熱臨則金石至剛皆為銷鑠也彼皆習之魂徃必釋些釋解也䰟徃必解爛宋鮑昭苦熱行曰赤坂横西阻火山赫南威身熱頭且痛烏墮魂來歸湯泉𤼵雲潭焦烟起石􅀈日月有恒昏雨霧未嘗晞丹蛇踰}
