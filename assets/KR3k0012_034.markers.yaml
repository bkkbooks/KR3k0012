  - {type: variant, offset: 2823, length: 1, content: 屬, WYG: 地固隂沍寒趙書曰汲桑六月盛暑重裘累茵使人扇之患不清凉斬扇者軍中謂之謡曰奴為将軍何可羞六月累茵披貂裘不識寒暑斬人頭易稽覽圖曰冬至之後三十日極寒京房易占妖曰春夏寒政教急又京房傳曰有徳遭險兹謂逆命厥異寒春秋運斗樞曰日行失則雖當暖而寒春秋考異郵曰繆公即位仲夏大寒氷錯亂甚也老子曰􅏥勝寒靜勝熱文子曰婦人當年不織天下有受其寒者尸子曰雨雪楚莊王披裘當户曰我猶寒彼百姓賓客甚矣乃廵國中求百姓賓客之無居宿餱糧者賑之國人大悅又曰朔方之寒氷厚六尺木皮三寸北極山有不釋之氷晏子曰景公時雪三日公披狐白裘晏子入公曰怪哉雨雪三日不寒晏子曰古之賢君飽而知人飢煖而知人寒公曰善出裘發粟以與飢寒者又曰景公起大臺嵗寒役人凍死者有焉管子曰大寒大暑大}
