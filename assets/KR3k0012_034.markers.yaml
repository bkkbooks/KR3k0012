  - {type: variant, offset: 1416, length: 234, content: 以臘日宴子弟王朗慕之蓋其家法由來漸矣杜公瞻云蜡者息民之祭故孔子云百日之勞一日之懌其所祭八神者皆報其成功則於十月農隙是也後世腊有新故交接之義遂移於夏正月十二月晉愽土張亮說蜡聚饗臘者祭廟初云蜡則黃服蜡臘不同惣非也臘宜在新故交接二祭月同而名異祭俱但而服殊今推諸經傳無正說蜡臘之文月令云蜡臘此則同日祭但互名耳據田臘取獸之名為臘因索饗百神號之曰蜡其曰上先祖旁饗百神下息萬民無別祭也即鄭玄云既蜡臘先祖五祀於是勞農者也近日蜡臈兼設蜡在十月臘在歲終隋開皇四年始停建元之蜡直為建丑之臘依, SBCK: 創洪範}
