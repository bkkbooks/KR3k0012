  - {type: variant, offset: 922, length: 2, content: 鯽魚, SBCK: 崑崙銅柱下有回屋焉壁方丈上有鳥名曰希有左翼覆東王公右翼覆西王母其􅁏􅀂醢仙人甘之􅀏林曰甲買􅁏過入都厠挂􅁏着外乙偷之未得去甲出覔􅁏因詐便口䘖􅁏曰挂著外門何得不失􅀂如我銜􅁏着口豈有失理世􅀃曰羅友}
  - {type: variant, offset: 925, length: 0, content: '', SBCK: 荆州從事桓宣武爲王車􅀐集別有永集坐良乆辭出宣武曰卿向以諮事今何以去荅曰友聞白羊白􅁏羙一生未甞得故來求食食了無事可諮魏文帝與呉質書曰舉太山以爲􅁏竭東海以爲酒陸凱表曰吕蒙凌統早亡先帝痛悼不巳子並㓜稚皆内省中稱􅁏食之客炙釋名曰炙炙也炙於火上也脯炙以脯餳􅁡豉汁淹之脯然也釡炙於釡中汁和熟之也衘炙細􅁺􅁏和以薑椒塩豉已乃以􅁏衘裏其表而炙之豹炙全體炙之各自方割出於胡貊之爲也禮曰}
