  - {type: variant, offset: 359, length: 4, content: 煩滿面赤, WYG: 食而肉不足王孫子曰楚荘伐宋厨有臰肉将軍子重諫王以肉饋於賢公孫尼子曰殷紂為肉圃孟子曰孔子為魯司冦從而祭膰肉不至不税冕而行不知者以為肉也其知者以無禮也又曰庖有肥肉廐有肥馬民有飢色野有餓殍此率獸而食人也又曰雞豚狗彘之畜無失其時七十者可以食肉矣韓子曰夫百日不食以待梁肉餓者不育令待堯舜之賢乃治當世之民是猶待梁肉而救餓之說也又晏子對景公曰田成子殺一牛取一豆肉餘以食士燕丹子曰荆軻入秦過陽翟買肉爭輕重屠辱軻武陽欲擊軻止之淮南子曰今屠牛而烹其肉或以酸或以甘煎􅆈燔炙有萬方其本一牛之體吕氏春秋曰肉之美者猩猩之唇獾獾之炙雋觾之翠述蕩之掔音文獸名旄象之約旄象牛獸也旄牛肉美貴之也又曰嘗一臠而知一羮之味一鼎之調又曰肥肉厚酒務以相强命之曰爛腸之食劉向新序曰趙簡子使使者聘孔子於魯以胖牛肉迎於河上使者謂船人曰孔子即上船中河安流而殺之孔子至使者致命進胖牛之肉孔子仰天而歎曰美哉水乎洋洋也使丘不濟此水者命也夫桓譚新論曰九江太守龎真案縣令髙受社祭釐有生牛肉二十斤劾以主守盗上請逮捕詔釐非贓天下縁是諸府縣社臘祠祭竈不但進熟食皆復多肉米酒脯醋諸竒珎益盛是故諸郡府至殺牛數頭又曰闗東鄙語世人聞長安樂出門西向笑知肉味美則對屠門而大嚼風俗通曰陳伯敬目有所見不食其肉王充論衡曰仲子兄禄萬鍾以兄之禄為不義而不食之避兄離母處於陵他日歸有饋其兄生鵝者曰惡用是鶂鶂者他日其母殺是鵝與之食其兄自外來至曰鶂鶂之肉而仲子耻負前言即吐而出之典畧曰凢宗廟三歳大祫每大牢分之左辦上帝右辦上后爼餘委肉積於前數千斤名堆爼博物志曰食鷰肉不可入水為蛟所吞龍肉以醢則文章生方言曰燕之北郊朝鮮洌氷間凡暴肉及披牛羊五臓謂之膊説文曰殽雜肉也腌漬肉也膊切肉也廣志曰北方有牧草便於其畜故北方出美肉異苑曰山隂有人嘗食牛肉左脾作牛鳴菜食乃止廣州先賢傳曰丁宻不食有目之肉桂陽先賢畫賛曰程曽字孝孫七歲亡母號慕毁悴王母哀憐嚼食哺之知有肉遂吐}
