  - {type: variant, offset: 1045, length: 667, content: 愽物志曰吳王江行食鱠有餘棄之於中流化而為異魚今呼王餘魚長數寸大如筯猶有膾形齊諧記曰江南有麻姑治者為人好噉鱠江北岸有華本者得一大虵喚麻為鱠得食甚美苦索魚名華本因醉喚取虵及餘肉出麻治見之大吐歐血死又曰周子有女噉鱠不知足家為之貧至長橋南見罛者挫魚作鮓以錢一千求一飽食五斛便大吐有蟾蜍從吐中出婢以魚置口中即成水女遂不復噉膾世說曰張季膺辟齊王東曹掾在洛見秋風起因思吳中蓴羹鱸魚鱠曰人生貴得適意何羈官千里以要名爵遂命駕便歸俄而齊王敗時人謂為見機又曰桓車騎冲在荊州張玄為侍中使至江陵路經陽歧俄見一人持小籠生魚逕來造舡云有魚欲寄作膾張乃維舟而納之問其姓字云是劉遺民劉驎之字遺民張素聞其名大相欣待既知張衘命問謝安王文度並佳不張甚欲語言劉子無意既進膾便去云向得此魚觀君舡上當有膾具是故來耳於是便去杜寶大業拾遺錄曰六年吳郡獻海鮸音免乾膾四瓶瓶容一斗浸一斗可得徑尺面盤并奏作乾膾法帝以示群臣云昔術人介象於殿庭釣得海魚此幻化耳亦何是珍異今日之鱠乃是海真魚所作求自數千里亦是一時奇味即出數盤以賜近臣作乾膾法當五六月盛熱之日於海取得鮸魚其魚大者長四五尺鱗細紫色無細骨不腥捕得之即去其皮骨取其精肉縷切隨成曬三四日須極乾以新白瓷瓶未經水者盛之蜜封泥勿令風入經五六十日不異新者後取噉時以新布褁於水中漬三刻久取出灑卻水則曒然矣廣五行記曰唐咸亨四年洛州司戶唐望之各集計至五品進止未出間有僧來覔初不相識延之共坐少頃曰貧道出家人得飲食亦以少公名人故闇相託能設一頓鱠否司戶欣然即處分買魚此僧云看有蒜否家人云蒜盡也僧即起司戶留之曰蒜盡遣買即得僧云既蒜盡不可更住苦留不止望之果無疾暴卒, WYG: 耶}
