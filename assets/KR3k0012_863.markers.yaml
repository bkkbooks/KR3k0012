  - {type: variant, offset: 934, length: 8, content: 姜詩妻事姑嗜魚膾, SBCK: 欒寜將飲酒炙未熟聞亂使告季子季子子路也爲孔氏宰邑也召􅀗駕乗車召􅀗衛大夫駕乗車言不欲戰也行爵食炙奉衛侯輙來奔韓子曰晉平公時進炙而髪繞之平公使殺庖人庖人呼天曰嗟乎臣有三罪而死不自知乎平公曰何謂也對曰臣刀之利風靡骨断而髪不截是臣之一死桑􅁅炙之􅁏紅白而髪不燒是臣之二死也炙熟}
