  - {type: variant, offset: 2846, length: 942, content: 事之車影入九仙之鏡鯖西京雜記曰五侯不相能賓客不得往來婁護豊辨傅會五侯間各得其意競致奇膳護乃合以為鯖世稱五侯鯖以為奇味焉齊書曰武帝就虞悰求諸飲食方悰祕不出上醉後體不怏悰乃獻醒酒鯖鮓一方而已鮓釋名曰鮓葅也以鹽米釀之如葅熟而食之也吳志曰孟仁為鹽池司馬自能結網手以捕魚作鮓寄母母還之曰汝為魚官而以鮓寄我非避嫌也宋書曰王瑩代謝超宗為義興太守與謝交惡超宗到都後瑩父懋往超宗處超宗設精白鮑美鮓獐巴懋問郍得佳味超宗詭言瑩始見餉佯驚曰大人豈應不得耶懋大忿言於朝廷稱瑩供養不足坐失廢棄久之愽物志曰仲秋月取折頭鯉子去鱗破腹使膂割為漸米爛藻之以赤秝米飯鹽酒令糝之鎮不苦重踰月乃熟是謂秋鯖王子年拾遺記曰漢元鳳二年於淋池之南起桂臺以望遠帝常以季秋之月沉衝瀾雲鷁之舟窮略係夜釣於臺下以香金為釣霜絲為綸丹鯉為餌得白蛟長三丈若大虵無鱗甲帝曰非瑞也命太官為鮓肉紫骨青味絕香美班賜群臣帝後思其美漁者不復得知為神異也列異傳曰費長房又能縮地脈坐客在家至市買鮓一日之間人見之千里外者數處世說曰有人遺張華鮓見之謂客云此龍肉也肉鮓中則有五色光試之果如言後問其主云於茅積下得白魚所作也又曰陶侃少時作魚梁吏常以一坩苦甘切鮓餉母母封鮓付反書責侃曰汝為吏以官物見餉非唯不能益吾乃以增吾憂也謝玄與婦書曰昨出釣獲魚作一坩鮓今奉送大業拾遺曰十二年六月吳郡獻太湖鯉魚腴鱔四十坩純以鯉腴為之計一坩䱹用鯉魚三百頭肥美之極冠於鱣鮪八珍周禮天官曰食醫掌王之八珍禮曰淳熬煎醢加于六稻上沃之以膏曰淳熬沃煎成之以為名淳母煎醢加于黍食之上沃之以膏曰淳母母讀曰模模象也作此象淳熬也炮取豚若將圭之刳之實棗於其腹中編萑以苴之塗之以謹音堇塗炮之塗皆乾擘之濯手以摩之去其皽音善切為稻粉糔溲之以為醴以付豚煎諸膏膏必滅之鉅鑊湯以小鼎薌脯於其中使其湯母滅鼎三日三夜無絕火而后調之以醯醢炮者以塗燒之為名將當為牂牂羊也檮珍取牛羊麋麕之肉必脄音媒每物與牛若一捶反側之去其餌熟出之去其皽柔其肉脄脊側肉漬取牛肉必新殺者薄切之必絕其理湛音尖諸美酒期朝而食之以醢若醯臆湛亦漬也為熬捶之去其皽編萑布牛肉焉屑桂與薑以酒諸上而鹽之乾而食之施羊亦如之施麋施鹿施麇皆如牛羊欲濡肉則睪而煎之以醢欲乾肉則搖而食之熬取火上為之今火脯似之此七者周禮八珍其一肝膋是也肝膋取狗肝一懞之以其濡炙之舉焦其膋不蓼膋腸間脂也, WYG: ''}
