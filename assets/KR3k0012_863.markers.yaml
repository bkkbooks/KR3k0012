  - {type: variant, offset: 943, length: 0, content: '', SBCK: 重脻而視之髪繞炙而目不見是臣三死也意者堂下有憎臣乎殺臣不亦枉乎謝承後漢書曰陳正字叔方爲太官令與黄門侍郎有􅂩因進御食以髪内炙中光武見之怒將斬正正曰臣當萬死者三一山炭増冶吐炎燋膚爛􅁏而髮不銷臣罪一也匣出佩刀匠也砥礪而虧肌截骨曽}
  - {type: variant, offset: 945, length: 0, content: '', SBCK: 断髪臣罪二也臣少事眼目書奏章表猶讀表五經具供御食與承反庖人六目齊視豈不如黄門兩目臣罪三也制赦之晉書曰王羲之年十三謁周顗顗異之時重牛心炙座客未噉顗割噉羲之於是始知名齊書曰桂揚之役詔檄乆之未就齊髙帝引江淹入中書省光賜酒食淹素能飲啖食鵝炙垂盡進酒數􅂛訖文誥亦辦隋書曰煬帝􅀄在藩魚俱羅弟賛以左右從累遷大都督及帝嗣位拜車􅀐將軍賛性㐫􅁀虐其部下令左右炙􅁏遇不中意以籖刺瞎其眼有温酒不適者立斷其舌孟子曰􅄝􅁗人之炙無以異於􅄝吾炙夫物則亦有然者也然則􅄝炙亦有外與又曰曽晳􅄝羊􅀥而曽子不忍食羊􅀥公孫􅐫問曰膾炙與羊􅀥孰羙孟子曰膾炙哉公孫􅐫曰然則何爲食膾炙而不食羊􅀥乎曰膾炙所同也羊􅀥所}
