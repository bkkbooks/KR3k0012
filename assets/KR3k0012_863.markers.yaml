  - {type: variant, offset: 383, length: 6, content: 腥物所為也即, krp: 之左右或戲曰郎爲孝何肉食􅵿瞿然歛容遂不食十洲記曰崑崙銅柱下有回屋焉壁方丈上有鳥名曰希有左翼覆東王公右翼覆西王母其肉若醢仙人甘之笑林曰甲買肉過入都厠挂肉着外乙偷之未得去甲出覔肉因詐便口䘖肉曰挂著外門何得不失若如我銜肉着口豈有失理世說曰羅友}
