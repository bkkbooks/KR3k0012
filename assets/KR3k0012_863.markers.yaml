  - {type: variant, offset: 1970, length: 573, content: 也儀禮曰鄉飲酒主人立于西階東薦脯使出祖釋軷祭脯士冠賓東面薦脯禮曰以脯脩置者左朐右末又曰婦人之贄脯脩大夫燕禮有膾無脯又禮特牲曰大饗尚睱脩而已矣穀梁傳曰束脩之肉不行境中有至尊者不貳公羊傳曰魯昭公出奔齊侯使高子執簞食四脡脯公稽首以衽受易曰噬乾肺得金矢王肅注曰四體離陰卦骨之象骨在乾肉脯之象金象所以獲野禽故食之反得金矢君子於味必思其毒於利必備其難論語曰子曰自行束脩已上吾未嘗無誨焉孔曰言人奉禮自行束脩以上則皆教誨之也又曰沽酒市脯不食尚書大傳曰散宜生閎夭南宮適三子者學乎太公見三子知三子之為賢人遂酌酒切脯約為朋友漢書曰濁氏以賣而連騎東觀漢記曰光武初起兵叔父良搏手大呼曰我欲詣納言嚴將軍叱上起去出閤令人視之還白方坐啗脯晉書曰桑虞嘗行宿寄逆旅同舍客失脯疑虞為盜虞默然無言便解衣償之主人曰此舍數失魚肉雞鴨多是狐狸偷君何以疑人乃將脯往山冢間尋求果得之客求還衣虞投之不顧北齊書曰彭城王攸為滄州刺史有一人從幽州來驢馱鹿脯至滄州界腳痛行遟偶會一人為伴遂盜驢及脯去明旦告州乃令左右及府僚吏分市鹿脯不限其至主見識之推獲盜者唐書曰太宗狩于濟源之凌山上曰古者三先驅以供宗廟今所獲鹿宜令所司造脯醢以充薦享國語曰楚成王聞子文之朝不及夕也成王楚文王之子成王頵於是乎每朝設脯一束糗一筐以羞子文至于今令尹祑之祑常呂氏春秋曰趙宣子將之絳見翳桑之下有餓人宣孟與脯二朐拜受不敢食問其故曰臣有母持, WYG: ''}
