  - {type: punctuation, offset: 354, content: 「, id: KR3k0012_CHANT_863-bkkpn141}
  - {type: variant, offset: 354, length: 0, content: '', SBCK: 趙逹甞過故知取盤中􅃗箸再縱横之乃言卿東壁下有羙酒一斛又有鹿􅁏三斤何以辭無王隠晉書曰􅉖懷太子令人屠􅁏巳自分齊手揣輕重斤兩不差云其母夲屠家之女也太康起居注曰尚書郭弈有疾日賜酒米各伍􅂛猪羊􅁏各一斤石崇崔亮母疾曰賜清酒粳米各伍􅂛猪羊􅁏各一斤半臧榮緒晉書曰趙髙爲丞相指鹿爲馬持蒲作􅁏晉中興書曰陸納爲呉興太守辭大司馬桓温因問桓公醉可飲幾酒􅁏食多少温曰温酒不過三􅂛便醉白􅁏不過十臠納後伺間求入自言外有徴禮温勑而受正有酒一斗鹿􅁏一盤一坐愕然納曰公近云飲三􅂛民正可二􅂛今有一斗似備餘􅄋温歎服晉書曰周訪郷人盗訪牛於家間殺之訪得之宻埋其􅁏不使人知宋書曰衡陽王儀季鎮荆州隊主續豊母老家貧無以充養遂不食􅁏儀季哀其志以錢米給豊母并制豊噉􅁏齊書曰髙帝雖從官而家業夲貧爲建康令時明帝等冬月猶無縑纊而奉瞻甚厚后母撤去兼􅁏曰於我過足矣梁書曰􅀓昭性尤篤愼予婦甞得家餉牛􅁏以進昭昭召其子曰食之則犯法告之則不可取而埋之隋書曰王邵篤好經史遺落世事用思旣專性頗怳忽至對食閉目疑思盤中之􅁏輙爲僕從所食邵弗之􅁴唯責􅁏少數罰厨人以情白依前閉目伺候而獲之厨人方免笞辱墨子曰孔子厄於}
  - {type: page-break, offset: 354, content: '', id: KR3k0012_SBCK_863-4a}
  - {type: page-break, offset: 354, content: '', id: KR3k0012_SBCK_863-4b}
  - {type: variant, offset: 354, length: 0, content: '', WYG: 趙達嘗過故知取盤中隻箸再縱横之乃言卿東壁下有美酒一斛又有鹿肉三斤何以辭無王隱晉書曰愍懐太子令人屠肉已自分齊手揣輕重斤兩不差云其母本屠家之女也太康起居注曰尚書郭奕有疾日賜酒米各五升猪羊肉各一斤石崇崔亮母疾日賜清酒粳米各五升猪羊肉各一斤半臧榮緒晉書曰趙高為丞相指鹿為馬持蒲作肉晉中興書曰陸納為呉興太守辭大司馬桓温因問温曰醉可飲幾酒肉食多少温曰温酒不過三升便醉白肉不過十臠納後伺間求入自言外有㣲禮温勑而受止有酒一斗鹿肉一盤一坐愕然納曰公近云三升今有一斗以備餘瀝温歎服晉書曰周訪鄉人盗訪牛於冡間殺之訪得之宻埋其肉不使人知宋書曰衡陽王義季鎮荆州隊主續豐母老家貧無以充養遂不食肉義季哀其志以錢米給豐母并豐噉肉齊書曰髙祖雖從官而家業本貧為建康令時明帝等冬月猶無縑纊而奉贍甚厚后母撤去兼肉曰於我過矣魏書曰𫝊昭性尤篤慎子婦嘗得家餉牛肉以進昭昭召其子婦曰食之則犯法告之則不可取而埋之隋書曰王邵篤好經史遺落世事用思既專性頗恍忽至對食閉目凝思盤中肉輒為僕從所食邵忽覺唯責肉少數罰厨人厨人以情白之依前閉目伺候僕人方見笞辱墨子曰孔子厄於}
