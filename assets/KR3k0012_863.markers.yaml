  - {type: variant, offset: 1282, length: 276, content: 歧俄見一人持小籠生魚逕來造舡云有魚欲寄作膾張乃維舟而納之問其姓字云是劉遺民劉驎之字遺民張素聞其名大相欣待既知張衘命問謝安王文度並佳不張甚欲語言劉子無意既進膾便去云向得此魚觀君舡上當有膾具是故來耳於是便去杜寶大業拾遺錄曰六年吳郡獻海鮸音免乾膾四瓶瓶容一斗浸一斗可得徑尺面盤并奏作乾膾法帝以示群臣云昔術人介象於殿庭釣得海魚此幻化耳亦何是珍異今日之鱠乃是海真魚所作求自數千里亦是一時奇味即出數盤以賜近臣作乾膾法當五六月盛熱之日於海取得鮸魚其魚大者長四五尺鱗細紫色無細骨不腥捕得之即去其皮骨取其精肉縷切隨成曬三四日須極乾以新白瓷瓶未經水者盛之蜜封泥勿令風入經五, SBCK: 詩也太平御覽卷第八百}
