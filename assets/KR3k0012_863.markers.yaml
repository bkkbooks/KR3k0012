  - {type: variant, offset: 1816, length: 1006, content: 棺得梓木為之脯釋名曰脯搏也乾燥相搏著也脩縮也乾燥縮也說文曰脯乾肉也脩脯也補莫切薄膊之屋上也腕骨脯也朐脯挺也周禮曰脯人掌乾肉也凡田獸臘膴胖之事夫物解肆乾謂之乾肉薄切曰脯棰之而施薑桂曰暇脩臘小物而乾者祭祀共豆脯膴胖又曰膳夫凡王之稍事設薦脯醢鄭司農云稍事謂非日中大舉時而間食謂之稍事膳夫主設薦脯醢云謂稍有小而事飲酒也儀禮曰鄉飲酒主人立于西階東薦脯使出祖釋軷祭脯士冠賓東面薦脯禮曰以脯脩置者左朐右末又曰婦人之贄脯脩大夫燕禮有膾無脯又禮特牲曰大饗尚睱脩而已矣穀梁傳曰束脩之肉不行境中有至尊者不貳公羊傳曰魯昭公出奔齊侯使高子執簞食四脡脯公稽首以衽受易曰噬乾肺得金矢王肅注曰四體離陰卦骨之象骨在乾肉脯之象金象所以獲野禽故食之反得金矢君子於味必思其毒於利必備其難論語曰子曰自行束脩已上吾未嘗無誨焉孔曰言人奉禮自行束脩以上則皆教誨之也又曰沽酒市脯不食尚書大傳曰散宜生閎夭南宮適三子者學乎太公見三子知三子之為賢人遂酌酒切脯約為朋友漢書曰濁氏以賣而連騎東觀漢記曰光武初起兵叔父良搏手大呼曰我欲詣納言嚴將軍叱上起去出閤令人視之還白方坐啗脯晉書曰桑虞嘗行宿寄逆旅同舍客失脯疑虞為盜虞默然無言便解衣償之主人曰此舍數失魚肉雞鴨多是狐狸偷君何以疑人乃將脯往山冢間尋求果得之客求還衣虞投之不顧北齊書曰彭城王攸為滄州刺史有一人從幽州來驢馱鹿脯至滄州界腳痛行遟偶會一人為伴遂盜驢及脯去明旦告州乃令左右及府僚吏分市鹿脯不限其至主見識之推獲盜者唐書曰太宗狩于濟源之凌山上曰古者三先驅以供宗廟今所獲鹿宜令所司造脯醢以充薦享國語曰楚成王聞子文之朝不及夕也成王楚文王之子成王頵於是乎每朝設脯一束糗一筐以羞子文至于今令尹祑之祑常呂氏春秋曰趙宣子將之絳見翳桑之下有餓人宣孟與脯二朐拜受不敢食問其故曰臣有母持以遺之宣孟更賜之二束遂去東方朔神異經曰北方有增水萬里厚百丈有鼠在冰下土中食冰下草木肉重萬斤可以作脯又曰西北荒有遺酒追復脯焉其味如麞食一片復一片葛洪神仙傳曰王遠至蔡經家與麻姑共設肴膳擘脯而行云是麒麟脯又曰左慈詣劉表請犒軍有酒一器脯一盤百人捷酒賜兵人三杯酒一片脯萬人皆同而酒器如故脯亦不減世語曰初太祖乏食程昱掠其本縣供三旬糧頗雜以人脯由是失朝望故位不至公也續齊諧記曰劉晨阮肇入天台山有女仙人為設胡麻飯山羊脯因留連之楚詞曰折瓊枝以為羞王逸注曰羞脯也盧諶祭法曰春祠用脯夏用煏憑逼反杜育菽賦曰脯則正膂通幹麤鹿肥麋梁劉孝威謝東宮賡鹿脯等啟曰上林絕胡人之搏禁地無張京之犯而, krp: ''}
