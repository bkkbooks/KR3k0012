  - {type: variant, offset: 338, length: 3, content: 舅馬光, SBCK: 之自以恩意遺人乎民曰自遺之茂曰人異於禽獸者以有仁愛也亭長素爲善吏歳時遺之禮也又曰賊經姜詩墓不敢驚孝子致米􅁏詩埋之後吏譴詩掘出示之又曰閔仲叔客居安邑老病家貧不能買􅁏日買猪肝一片謝承後漢書曰李萇家晝則躬耕夜則讀書日爲母市斤􅁏梁米作食後漢書曰桓任字儀遼後母生時不食猪羊􅁏故終身不以猪羊􅁏入口又曰李充延平年中}
