  - {type: variant, offset: 359, length: 4, content: 煩滿面赤, SBCK: 食而􅁏不足王孫子曰楚莊伐宋厨有臰􅁏將軍子重諌王以􅁏饋於賢公孫尼子曰殷紂爲􅁏圃孟子曰孔子爲魯司冦從而􅀕膰􅁏不至不稅冕而行不知者以爲􅁏也其知者以無禮也又曰庖有肥􅁏厩有肥馬民有飢色野有餓殍此率獸而食人也又曰雞豚狗􅇾之畜無失其時七十者可以食􅁏矣韓子曰夫百日不食以待梁􅁏餓者不育令待堯舜之賢乃治當世之民是猶待梁􅁏而救餓之􅀃也又曰晏子對景公曰田成子殺一牛取一豆􅁏餘以食士燕丹子曰荆軻入􅁗過陽翟買􅁏争輕重屠辱軻武陽欲擊軻止之淮南子曰今屠牛而烹其􅁏或以酸或以甘煎熬犢炙和有萬方其夲一牛之體吕氏春秋曰􅁏之羙者猩猩之脣貛貛之炙㑺燕之翠􅄒蕩之掔音牽獸名旄象之約旄象牛獸也族牛􅁏羮貴之也又曰甞一臠而知一鑊之味一鼎之調又曰肥􅁏厚酒務以相強命之曰爛膓之食劉向新序曰趙簡子使使者聘孔子於魯以胖牛􅁏迎於河上使者謂舡人曰孔子即上舡中河安流而殺之孔子至使者致命進胖牛之􅁏孔子仰天而歎曰羙哉水乎洋洋也使丘不濟此水者命也夫桓譚新論曰九江太守龐眞案縣令髙曾受社􅀕􅁵有生牛􅁏二十斤劾以主守盗上請逮捕詔􅁵不􅂍天下縁是諸府縣社臈祠􅀕竈不但進熟食皆復多􅁏米酒脯腊諸竒珎益盛是故諸郡府至殺牛數十頭又曰關東鄙語世人聞長安樂出門西向􅀏知􅁏味羙則對屠門而屑風俗通曰陳伯敬目有所見不食其􅁏王充論衡曰仲子兄禄萬鍾以兄之禄爲不義而不食之避兄離母處於陵他日歸有饋其兄生鵝者曰惡用是鶂鶂者他日其母殺是鵝與之食其兄自外來至曰鶂鶂之􅁏而仲子耻􅀒前言即吐而出之典略曰凢宗廟三歳大祫毎大牢分之左辯上帝右辯上后俎餘委􅁏積於前數千斤名堆俎􅀶物志曰食鷰􅁏不可入水爲蛟所呑龍􅁏以醢漬則文章生方言曰燕之北郊朝鮮洌水間凢異􅁏及披牛羊五臟謂之􅈩音慱􅀃文曰殽雜􅁏也腌漬􅁏也一刼反􅈩切􅁏也之䎡反廣志曰北方有牧草便於其畜故北方出羙􅁏異苑曰山隂有人甞食牛􅁏便作牛鳴菜食乃止廣州先賢傳曰丁宻不食有目之􅁏桂陽先賢􅀞讃曰程曽子孝孫七歳亡母號慕毀悴王母哀憐嚼食哺之知有􅁏味遂吐}
