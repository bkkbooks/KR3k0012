  - {type: variant, offset: 383, length: 3, content: 腥物所, WYG: 之炙釋名曰炙炙也炙於火上也脯炙以􅄳蜜䜴汁淹之脯脯然也釡炙於釡中汁和爇之也銜炙細蜜肉和以薑椒鹽豉已乃以肉銜裹其表而炙之也貊炙全體炙之各以方割出於胡貊之}
