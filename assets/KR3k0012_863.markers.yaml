  - {type: variant, offset: 370, length: 510, content: 府君胃中有蟲數升欲成肉疽食腥物所為也即作湯二升先服一升斯須盡服之食頃吐出三升許蟲赤頭皆動半身猶是生魚膾也沈約宋書曰張收為猘犬所傷人云宜食蝦蟆膾收難之兄暢含笑先嘗收乃食瘡即愈又曰沈攸之舉兵圍郢城獲范雲令送書入城餉柳世隆鱠魚二十頭梁書曰蕭潁胄素能飲酒噉白肉膾至三升葛洪神仙傳曰仙人介象字元則會稽人有諸方術吳主聞之徵象到武昌甚敬貴之稱為介君與吳主共論鱠魚何者最美象曰鯔魚為上吳主曰論近魚耳此海中出安可得耶象曰可得耳乃令人於殿庭中作方塪汲水滿之并求釣象起餌之垂綸於塪中不食頃果得鯔魚吳主驚喜問象曰可食否象曰故為陛下取以作生安敢取不可食之物乃使廚下切之吳主曰聞蜀使來有蜀薑作齏甚好恨時無此象曰蜀薑豈不易得願羗所使者并付直吳主指左右一人以錢五十付之象書一符以著青竹杖中使行人閉目騎竹竹止便買薑訖復閉目此人承其言騎竹須臾已至成都不知是何處問人人言蜀市乃買薑于時吳使張溫先在蜀既於市中相識甚驚便作書寄其家此人買薑畢投書負薑騎杖閉目須臾已還到吳廚下切鱠亦適了搜神記曰左慈字元放在曹操坐操謂眾賓曰高會所少吳浙江鱸魚耳放曰此可得也因求銅藻盤貯水以竿餌釣於盤中須臾引一鱸出操拊手笑曰可更得不放乃更引餌沉之須臾復引出皆長二尺餘生鮮可愛操令目前切膾, SBCK: ''}
  - {type: variant, offset: 370, length: 3, content: 府君胃, WYG: 廷年七歲葬父有酒肉左右或戱郎曰為孝何如肉食廷瞿然歛容遂不食十洲記曰崑崙銅柱下有回屋焉壁方丈上有鳥名曰希右翼覆西王母其肉若醢仙人甘之笑林曰甲買肉過入都厠拄肉着外乙偷之未得去甲出覔肉因詐使口䘖肉曰挂着外門可得不失若如我銜肉着口豈有失理世説曰羅友作荆州從事桓宣武為王車騎集别友求集良久辭去出宣武曰卿向以諮事今何以去答曰友聞白羊白肉美一生未嘗得故來求食食了無事可諮魏曹植與呉質書曰舉泰山以為肉竭東海以為酒陸凱表曰吕䝉凌統早亡先帝痛悼不已子並㓜稚皆肉省}
