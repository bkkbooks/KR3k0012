  - {type: variant, offset: 343, length: 9, content: 朝送鹿膾寧用飯也魏, SBCK: 幸託椒房位列上將幕府􅀄開欲辟天下竒偉以匡不逮惟諸君愽求其器充乃爲陳海内隠居懷道之士頗有不合隲欲絶其論以􅁏啖之充抵􅁏於地曰􅀃士猶甘於􅁏遂出徑去隲甚望之漢舊儀曰齊法食􅁏三十六兩英雄記曰兾州刺史韓馥問諸從事曰収有何長何短治中劉子曰前勞賜有餘􅁏百斤賣之一州調度奢儉不復在是猶可勞賜勤勞吏士賣之可示儉呉}
  - {type: page-break, offset: 343, content: '', id: KR3k0012_SBCK_863-3b}
  - {type: variant, offset: 343, length: 9, content: 朝送鹿膾寧用飯也魏, WYG: 幸託椒房位列上将幕府初開欲辟天下竒偉以匡不逮惟諸君博求其器充乃為陳海内隱居懐道之士頗有不合隲欲絶其論以肉啖之充抵肉於地曰說士猶甘於肉遂出徑去隲甚望之漢舊儀曰齊法食肉三十六兩英雄記曰兾州刺史韓馥問諸從事曰馥何有長何短于治中劉子曰前勞賜有餘肉百斤賣之一州調度奢儉不復在是猶可勞賜勤吏士賣之示狹吴}
