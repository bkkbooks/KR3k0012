  - {type: variant, offset: 47, length: 0, content: '', SBCK: 幾於其善道而已又爲政曰子路問孝子曰色難言和顔色恱爲難也家語曰子路見孔子曰􅀒重渉逺不擇地而遊家貧親老不擇禄而仕昔者由也事二親之時常食藜藿之實而爲親􅀒米百里之外親没之後南遊於楚從車百乗積粟萬鍾累茵而坐茵辱列鼎而食願欲食藜藿爲親􅀒米不可復得也枯魚衘索幾何不蠹二親之壽忽如過􅂩孔子曰由也事親可謂生事盡力死事盡思者也又曰曽參者武城}
