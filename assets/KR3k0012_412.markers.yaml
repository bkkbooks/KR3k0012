  - {type: variant, offset: 2592, length: 319, content: 君相母好飲江水常乘舟楫置之深浚艱辛忽有橫石特起直趍江脊後取水無復勞劇又曰辛繕字幼文母喪精廬旁有大鳥頭高五尺雞首鷰領魚尾虵頸備五色而青棲于門樹又曰文讓養母至及喪不用僮僕之力兄弟二人營築其墳蹔歸取糧群鳥數千衘壤伯而成墳小說曰宋宜都王鏗三歲喪母及有識問母所在左右告以早亡便思慕蔬食祈請幽冥求一夢見至六歲夢見一婦人謂之曰我是汝之母鏗悲泣旦說之容貌衣服事事如平生也世說曰鄭子產善事母奉命聘晉道中心痛遣人還家起居問母母曰吾忽心體不調憶想汝耳更無他也祖台志怪曰吳中書郎盛仲至孝母王氏失明仲蹔行勑婢食母婢乃取蠐螬蒸食之母甚以為美不知是何物兒還母曰汝行後婢進吾食甚甘然非魚肉汝試問之既而問婢婢服曰實是螬蠐仲抱母慟哭母目霍然立開宋躬孝子傳曰丘傑字偉跱吳興烏程, SBCK: 季珪北地靈州}
