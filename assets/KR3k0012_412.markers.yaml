  - {type: variant, offset: 3820, length: 166, content: 飡橘當差俄而不見之庭中橘樹隆冬乃有三實食之病尋愈咸以至孝所感會稽典錄曰虞國少有孝行後為日南太守常有雙鴈宿廳事每出行縣飛逐其車既卒於官逐喪還至餘姚於墓前歷三年乃去又曰沈震字彥威烏程人十歲遭飢荒忽夜中有人告震曰西籬下地中有米五十石可供養旦夕即掘之果獲焉風俗通曰楊範字文端齊人齊宋之亂母在縣賊中採椹藏於地夜取之進母如是非一忽於地中得米十斛, SBCK: 主}
