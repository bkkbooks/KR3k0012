  - {type: 'tls:seg', offset: 1828, content: '', id: KR3k0012_CHANT_412-25a.7}
  - {type: variant, offset: 1830, length: 0, content: '', WYG: 遣妻布衣蔬食如喪禮嵗時北向流涕耶利後仕魏書戒懐順不許如此懐順得書更號泣懐順從叔模為滎陽太守亦入魏模子雖居處改節不廢婚宦宋大明中懐順宗人冀州刺史元孫北使魏魏人問之曰崔耶利模並力屈來歸二家子姪出處不同義將安在元孫曰王尊叱馭王陽回車欲令忠孝並𢎞臣子兩}
  - {type: variant, offset: 1831, length: 2, content: 瘳咸, WYG: 泰始初淮北入魏懐順因此歸北至代都而耶利已卒懐順絶而復蘇載喪還青州徒跣冰雪天氣寒酷而手足不凍時人}
  - {type: page-break, offset: 1831, content: '', id: KR3k0012_WYG_412-11b, image: WYG0896/WYG0896-0616b.png}
