  - {type: variant, offset: 92, length: 6, content: 明帝光武弟四, SBCK: 汝郁字叔異陳國人年五歳母病不能飲食郁亦不肯飲食母憐之強爲飱飯欺言巳愈郁察母親色不平輙復不食宗親共竒異之因字曰異又曰蕭彪字伯文京兆杜陵人累官巴郡太守父老乞供養父有賔客輙立屏風後應受使命父􅄝䴵音餅毎自買進之又曰張霸字伯饒蜀郡成都人年數歳有所噉必先讓父母郷里號曰張曽}
  - {type: variant, offset: 92, length: 1, content: 明, WYG: 汝郁字叔異陳國人年五嵗母病不能飲食郁亦不肯飲食母憐之强為飱飲欺言已愈郁察母顔色不平輒復不食宗親共竒異之因字曰異又曰蕭彪字伯文京兆杜陵人累官巴郡太守父老乞供養父有賔客輒立屏風後應受使命父嗜䴵音餅每自買進之又曰張覇字伯饒蜀郡成都人年數嵗有所噉必先讓父母鄉里號曰張曾子七嵗通春秋復欲進業父母語汝小何能多曰我饒為之遂以伯饒字焉又曰趙咨字文楚東郡燕人大司農陳狶舉咨至孝躬率子孫耕農為養盜常夜往刼之咨恐母驚懼乃先至門迎盜因請為設食謝曰老母八十疾貧湏養居貧朝夕無儲乞少置衣糧妻子餘物一無所請盜皆慙赧奔走又曰黄香字文彊父兄舉孝廉為郡五官貧無奴僕香躬執勤苦盡心供養冬無被袴而親極滋味暑即扇枕寒即以身温席又曰鮑永字君長上黨人少有志操事後母至孝妻常於母前叱狗永即去之又曰樊儵字長魚事母至孝母常病癰儵書夜匍伏不離左右至為吮癰又曰張表字公儀奉之子也遭父喪疾病曠年目無所見耳無所聞服闋醫藥救療歴嵗乃瘳每彈琴惻愴不能成聲見酒食未嘗不泣宗人親厚節㑹飲食宴為其不復設樂又曰廉范字叔度京兆人也父客死蜀漢范與客􅇍負喪歸至葮萌載船觸石破没范持棺柩遂俱沈溜衆傷其義釣求得之療救僅免於死又曰李充兄弟六人同食遞衣家貧親老充妻勸異居充使釀酒㑹親戚充啟其母曰此婦勸異居不可奉祭祀請去之遂叱出其婦呉志曰顧悌以孝悌廉直聞於鄉黨每得父書洒掃整衣服設几筵舒書其上拜跪讀書應諾畢復再拜父終水漿不入於口五日孫權為作布衣一襲强令悌釋服悌雖以公義自割猶以不見父喪常畫壁作棺柩設象神坐於下對之哭泣服不闋卒臧榮緒晉書長孫畧字文度以富春車道少動經涇水父難於風波每行乘藍車畧常歩從遠者百里每渡浦則親入水扶持藍車又曰嵇紹事母至孝和色柔聲常若不足謹身節儉朝夕孜孜親執刀爼非無使役以他人不如已之至誠也又曰晉齊獻王司馬攸字大猷晉文少子居文}
