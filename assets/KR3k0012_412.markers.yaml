  - {type: variant, offset: 7, length: 1, content: 感, WYG: 上爾雅曰善父母為孝毛詩􅆁栢舟曰凱風美孝子也凱風南風衛之滛風流行雖有七子之母猶不安其室故美七子能盡其孝道以慰其母心又曰陟岵孝子行役思念父母也國廹而數侵削役于大國父母兄弟離散而作是詩也陟彼岵兮山有草木曰岵瞻望父兮又谷風蓼莪刺幽王也民人勞苦孝子不得終養爾蓼蓼者莪匪莪伊蒿蓼蓼長大貌也莪已蓼蓼長大我視之以為非莪反謂之蒿喻已憂思雖在役中心不精識其事哀哀父母生我劬勞尚書曰有鰥在下曰虞舜帝曰俞予聞如何岳曰瞽子父頑母嚚象傲克諧以孝烝烝乂不格姦大戴禮曰上敬老則下益孝禮記曲禮曰凡為人子者冬溫而夏凊昏定而晨省故州閭鄉黨稱其孝也孝子不服闇不登危懼辱親也服事也不於暗冥之中從事謂卒有非常失禮也又祭義曰曾子曰孝有三大孝尊親其次不辱其下能養公明儀問於曾子曰夫子可以為孝乎曾子曰是何言與是何言與君子之所謂孝者先意承志諭父母於道參直養者安能為孝曾子曰身也者父母之遺體敢不敬乎居處不莊非孝也事君不忠非孝也蒞官不敬非孝也朋友不信非孝也戰陳無勇非孝也五者不遂災及其親敢不敬乎烹熟羶薌嘗而薦之非孝也養也夫孝置之而塞乎天地溥之而横乎四海斷一樹殺一獸不以其時非孝也孝有三小孝用力中孝用勞大孝不匱思慈愛忘勞可謂用力矣尊仁安義可謂用勞矣博施備物可謂不匱矣父母愛之喜而勿忘父母惡之懼而無怨父母有過諫而不逆父母既没必求仁者之粟以祀之謂之禮終又曰先王之孝也色不忘乎目目常思父母之顔色聲不絶乎耳心志嗜欲不忘乎心君子生則敬養死則敬享思終身不辱也又曰子曰舜其大孝也歟徳為聖人尊為天子富有四海之内宗廟享之子孫保之故大徳必得其位必得其禄必得其名必得其夀又曰子夏既除喪而見與之琴和之而不和彈之不成聲夫樂之和猶未入心雖喪已除而哀未已作而曰哀未忘也先王制禮不敢過也又曰文王之為世子朝於王季日三雞初鳴而衣服至於寢門外問内豎之御者曰今日安否何如内豎曰安文王乃喜及日中又至亦如之及暮亦如之其有不安節則内豎以告文王文王色憂行不能正履王季復膳然後亦復初左傳曰鄭莊公即位姜氏愛共叔段請京使居之叔段襲鄭莊公伐京遂寘姜氏于城潁而誓之曰不及黄泉無相見也既而悔之潁考叔曰君何患焉若闕地及泉隧而相見闕穿也隧埏也其誰曰不然公從之君子曰潁考叔純孝也}
