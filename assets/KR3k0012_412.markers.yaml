  - {type: variant, offset: 4762, length: 277, content: 八見父歸遲即尋迎之父醉負而不勝脫己衣覆之是時冬中沍寒方甚俊單衣而已岳陽山多鷙獸夜有豹視之為之歧道而去將旦與父同歸縣吏異之時人以俊孝感所致父卒不呼相者自營丘封有白鵲常遊於其家棗樹俊每朝夕臨鵲為之悲鳴終喪而去會潞帥劉稹反家近潞封軍士齊討民散走時俊母年八十餘唯一子乃平其父墓別以物識之輦其母入文城西山妻蹇步捨之至山數宿妻方至逃難者多糇糧踴貴俊拾橡實飴之以木蜜供膳者終歲建稹滅復輦其母東歸岳陽丘隴悉為軍盜所發唯俊家墓得完復起塚焉母卒哀毀過制縣令京兆韋伯倫知之給米粟蠲其家俊將葬母貧鬻其子質劑已定其夜夢一人謂曰爾舍東有錢百萬乃自發之及旦俊自舍東手掘之果得錢符夢數焉, SBCK: 二}
