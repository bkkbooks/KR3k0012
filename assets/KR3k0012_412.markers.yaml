  - {type: variant, offset: 3269, length: 135, content: 嘗與其父共有所之夜宿逆旅時多虎將曉虎遶屋號吼俊乃出戶當之虎弭耳屈膝伏而不動俊跪曰汝飢可食我不宜驚吾親老虎逡巡而退屋人皆安全又曰伍襲字世長武陵人父沒羌中乃學羌語言衣服與賓客入搆羌諸令相攻襲乘其仇戎讎羌負喪而歸葬畢因居墓所每哭輒有鹿踞墳而鳴漢法死事之孤皆拜郎中而襲不忍受吏迫, SBCK: 慰勉}
