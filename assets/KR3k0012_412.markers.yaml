  - {type: 'tls:seg', offset: 430, content: '', id: KR3k0012_CHANT_412-6a.18}
  - {type: variant, offset: 430, length: 412, content: 雙鯉躍出鄉里以為孝感所致又曰吳隱之字處默年十歲丁父憂每號哭行人為流涕家貧無人鳴鼓每至號哭之時有雙鶴警叫及祥練之夕復有群鴈俱集時人咸以孝感所致晉中興書曰何琦字萬倫遭母憂停柩在殯為鄰火所逼煙熖已交家乏僮役計無從出乃匍匐棺所號哭而已俄而風止火息堂屋一間乃免又曰烏程吳達往經飢饉父母兄嫂及群從小幼之親十有三人達病篤鄰里咸葦褁衣而埋之親屬皆盡存者唯達夫妻而已家徒四壁晝則傭賃夜還燒塼伐木夜在山中屢遇虎虎下道避之夫妻勤苦朞年中成七墓十二棺鄰里嘉上其志義葬日悉出助之太守張崇之義其志行加羔鴈之禮命補功曹史達以門寒固辭不就蕭子顯齊書曰永興王氏女年五歲得毒病兩目皆盲性至孝年三十父死臨尸一叫眼皆血出小妹娥舐其血左目即開時人稱為孝感崔鴻十六國春秋前趙錄曰劉殷七歲喪父哀毀過禮曾祖母王氏盛冬思董殷年九歲乃於澤中慟哭收淚視地見有董生焉得斛餘而歸食而不減至董生乃盡其夜夢人謂殷曰西蘺下有粟窹而掘之得粟十五鐘焉銘曰七年粟百石以賜孝子劉殷自是食之七年乃盡, WYG: 彊飯}
