  - {type: variant, offset: 4517, length: 244, content: 瞑而葩蓋盈尺矣州以狀申歲餘遷監察出授并州兵曹轉憑翊令人吏畏愛風化大行貧弱之輩荷其仁恕時有雲如蓋當其廳事斯須五色雜綵周於縣郭道俗仰望久之以狀聞勑編諸國史尋遷司勳員外其并州廳前有叢葦小鳥來巢如鷦鷯矣孕卵卯纔數日殼毀而見已諭於母矣枝且不勝墜于地月餘五色成文如鵝馴擾閑睱無復驚懼泊能飛翔時歸舊所人到于今稱為兵曹鳥初居喪管城每一哭群鳥畢集至于萬數墻宇皆遍至有樹條折者周於原野村鄰嗟稱之每所居其巢燕敷乳必返哺踰旬後分飛矣此孝義感通也史系曰趙俊字子奇平陽岳陽人也父聃為縣西曹書佐嗜酒夜歸里墅橫臥途中俊年, SBCK: ''}
