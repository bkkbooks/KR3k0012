  - {type: variant, offset: 4044, length: 296, content: 者共推與之居無禍患妻產男慮養之則妨供養乃令妻抱兒欲掘地理之於土中得金一釜上有鐵券云賜孝子郭巨巨還宅主宅主不敢受遂以聞官官依券題還巨遂得兼養兒又曰前漢董永千乘人少失母獨養父父亡無以葬乃從人貸錢一萬永謂錢主曰後若無錢還君當以身作奴主甚慜之永得錢葬父畢將往為奴於路忽逢一婦人求為永妻永曰今貧若是身復為奴何敢屈夫人之為妻婦人曰願為君婦不恥貧賤永遂將婦人至錢主曰本言一人今何有二永曰言一得二理何乖乎主問永妻曰何能妻曰能織耳主曰為我織千疋絹即放爾夫妻於是索絲十日之內千疋絹足主驚遂放夫婦二人而去行至本相逢處乃謂永曰我是天之織女感君至孝天使我償之今君事了不得久停語訖雲霧四垂忽飛而去廣州先賢傳曰丁密字靖公遭, WYG: ''}
