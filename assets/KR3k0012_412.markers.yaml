  - {type: variant, offset: 7, length: 1, content: 感, SBCK: 上爾雅曰善父母爲孝毛詩鄁栢舟曰凱風美孝子也凱風南風衛之􅁋風流行雖有七子之母猶不安其室故美七子能盡其孝道以慰其母心又曰陟岵孝子行役思念父母也國小而迫數侵削役于大國父子兄弟離散而作是詩也陟彼岵􅀆山有草木曰岵瞻望父􅀆又谷風􅖋莪刺幽王也民人勞苦孝子不得終養爾蓼蓼者莪匪莪伊蒿蓼蓼長大㒵也莪已蓼長大我視之以爲非莪反謂之蒿諭已憂思雖在役中心不精識其事哀哀父母生我劬勞尚書曰有鰥在下曰虞舜帝曰俞子聞如何岳曰瞽子父頑母嚚象傲克諧以孝烝烝乂不格姦大戴禮曰上敬老則下益孝禮記曲禮曰凡爲人子者冬温而夏凊昬定而晨省故州閭郷黨稱其孝也孝子不服闇不登危懼辱親也服事也不於闇􅁳之中從事謂卒有非常失禮也又􅀕義曰曽子曰孝有三大孝尊親其次不辱其下能養公明儀問於曽子曰夫子可以爲孝乎曽子曰是何言與是何言與君子之所謂孝者先意承志諭父母於道參直養者安能爲孝乎曽子曰身也者父母之遺體也行父母之遺體敢不敬乎居處不莊非孝也事君不忠非孝也莅官不敬非孝也朋友不信非孝也戰陣無勇非孝也五者不遂災及於親敢不敬乎烹熟羶薌甞而薦之非孝也養也夫孝置之而塞乎天地􅄎之而撗乎四海斷一􅀣殺一獸不以其時非孝也孝有三小孝用力中孝用勞大孝不匱慈愛忘勞可謂用力矣尊仁安義可謂用勞矣􅀶施備物可謂不匱矣父母愛之喜而弗忘父母惡之懼而無怨父母有過諌而不逆父母旣没必求仁者之粟以祀之此之謂終禮又曰先王之孝也色不忘乎目目常思父母之顔色声不絶乎耳心志嗜欲不忘乎心君子生則敬養死則敬享思終身弗辱也又曰子曰舜其大孝也歟德爲聖人尊爲天子冨有四海之内宗廟享之子孫保之故大德也必得其位必得其禄必得其名必得其壽又曰閔子騫旣除喪而見與之琴和之而不和彈之而不成声夫樂之和猶人心雖䘮以除而哀未巳作而曰哀未忘也先王制禮不敢過也又曰文王之爲世子朝於王季日三鷄􅀄鳴而衣服至於寢門外問内竪之御者曰今日安否何如内竪曰安文王乃喜及日中又至亦如之及暮亦如之其有不安節則内竪以告文王文王色憂行不能正履王季復膳然後亦復􅀄左傳曰鄭莊公即位姜氏愛共叔叚請京使居之叔叚襲鄭莊公伐京遂寘姜氏于城潁而誓之曰不及黃泉無相見也旣而悔之潁考叔曰君何患焉若闕地及泉遂而相見闕穿也􅎬埏也其誰曰不然公從之君子曰潁考叔純孝也}
