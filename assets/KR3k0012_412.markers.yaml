  - {type: 'tls:seg', offset: 1832, content: '', id: KR3k0012_CHANT_412-25a.8}
  - {type: variant, offset: 1837, length: 0, content: '', WYG: 又曰華寶晉陵無錫人也父豪晉義熙末戍長安年八嵗臨别謂寶曰須我還當為汝上頭長安䧟寶年十七不婚冠或問之者輒號慟彌日不忍答也又曰散騎常侍袁瑜薦㑹稽郭道事繼母至孝家貧産子爰不能養謂其妻曰傷慈以終孝吾無恨也遂瘞之又曰師覺授字覺授南陽湼陽人也與外兄宗少文並有素業以琴書自娯於路忽見一人持書一函題曰至孝師君苫前俄而不見捨車奔歸聞家哭聲一呌而絶良久乃蘇又曰謝㬭字宣鏡㓜有殊行年數嵗}
  - {type: page-break, offset: 1837, content: '', id: KR3k0012_WYG_412-12a, image: WYG0896/WYG0896-0616c.png}
  - {type: variant, offset: 1838, length: 1, content: 致, WYG: 生母郭氏久嬰痼疾㬭晨昏溫凊嘗藥捧膳不闕一時勤容戚顔未嘗暫改恐僕役營疾懈倦躬自執勞母為病畏驚而微賤過甚一家尊卑感㬭至性皆納屨而行屏氣而語如此十年餘又曰蔡曇智鄉里號蔡曾子廬江何伯璵兄弟鄉里號為何展禽並為高士沈顗所稱常云聞蔡曇智之風怯夫勇鄙夫有立志聞何伯璵之風偽夫正薄夫厚伯璵與弟㓜璵俱厲節操養兄孤子及長為婚推家業盡與之安貧枯槁誨人不倦郡守下車無不脩謁又曰余齊人晉陵人也少有孝行為邑書吏大明二年父殖在家病亡信未至齊人謂人曰比者肉痛心煩有如割截居常皇皇體必有異故信㝷至以父病報之四百餘里一日而至至門方知父死號踊慟絶良久乃蘇父所遺言母曰汝父臨終恨不見汝齊人即曰相見何難於是號呌殯所須臾便絶州縣上言有司奏改其里為孝義里蠲租布賜其榖百斛又曰彭城劉悛司空勔音免之長子年十三身長七尺三寸以孝悌稱勔見害於朱雀街悛兄弟生平不行此路喪骨立杖而}
