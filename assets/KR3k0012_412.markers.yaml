  - {type: variant, offset: 1823, length: 3, content: 遐應聲, WYG: 殊無難色班}
  - {type: variant, offset: 1827, length: 2, content: 吮旬, WYG: 雄之兄子也宋書曰孫法宗一名宗之呉興人也父隨孫恩入海澨被害屍骸不收母兄並餓死法宗年少流迸至十六方得還單身勤苦霜行草宿營辦棺槨造立冢墓葬送母兄儉而有禮以父屍不測入海㝷求聞世間論至親以血瀝骨當悉凝没乃操刀㳂海見枯骸則刻肉灌血如此十餘年臂脛無完皮血脉枯竭終不能逢縗絰終身常居墓所山禽野獸皆悉馴附每麕鹿觸網必解放之又孝義傳曰崔懐順清河東武城人也父耶利魯郡太守宋元嘉中為魏所獲懐順與妻房氏篤愛聞父見虜即}
  - {type: page-break, offset: 1827, content: '', id: KR3k0012_WYG_412-10b, image: WYG0896/WYG0896-0615d.png}
