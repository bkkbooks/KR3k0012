  - {type: variant, offset: 3444, length: 215, content: 三更中忽有二神引鏁而至求斐曰尊府君昔經見侵故有怨報君至孝所感昨為天曹攝錄斐驚起視父已差父云吾昔過伍子胥廟引二神像置地當是此耳又曰紀邁廬江人本姓舒以五月五日生母棄之村人紀淳妻趙氏養之年六歲本父母時來看語曰汝是我生邁泣涕告趙趙乃具言始末及年十歲傭力所得輒分二母各半淳亡無子邁乃斬衰三年本父母繼亡又並齊衰心喪三年趙欲為娶齋酒米往婚家道值醉人打趙體悶忽有一狗直至衘邁衣若此者三邁心動走赴婚家逢醉人適共舉酌於草中邁乃以檐煞二醉人趙歸得平乃詣, SBCK: ''}
