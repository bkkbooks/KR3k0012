  - {type: variant, offset: 1374, length: 307, content: 病風積年晝夜祈禱時寒叡明下淚為冰筯額上叩血出亦冰不流忽有一人以小石函授之曰此能治丈夫百病叡明受之忽不見人以函奉母唯有三寸絹丹書為日月字母即平愈又曰解叔謙字楚梁母有疾於夜庭中祈祠聞空中云此疾無他得丁公藤為酒便差即詣醫及本草皆無識者乃求訪至宜都遙覩山中一老翁伐木問其所用荅曰此丁公藤治風尤驗叔謙伏地流涕具款求意此公與之四段并示漬酒法叔謙拜領受之復視翁不見依法為酒母疾頓愈梁書曰陸襄字師伯常卒心痛醫方須三斗粟漿時屬凝冬日又暮矣求乞無所忽有老人詣門貨漿量如方斛始欲酬直無何失之時以襄孝感致焉又曰臧盾有孝性隨父宿直廷尉母劉氏在宅暴亡盾左手中指痛不得寢及曉宅信果報凶問其感通如此又曰甄恬字彥約數歲喪父哀戚有若成人年八歲問其母恨, SBCK: 更適牽招胤}
