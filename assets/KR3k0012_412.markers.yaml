  - {type: variant, offset: 1041, length: 282, content: 遲賊轉逼驃語我不能去汝走可脫幸勿俱死驃因之坐地綜迎賊叩頭曰父年老乞賜生命賊至驃亦請賊曰兒年少自能走今為孝子不去老子不惜死乞活此兒賊因斫驃綜抱父於腹下賊斫綜頭面凡四創綜當時悶絕又一賊從傍來相謂曰卿欲舉大事此兒以死救父爾何可煞煞孝子不祥賊乃止父子乃得免齊書曰匡昕字令先廬陵人有至性隱金華山服食不與俗人交母病亡已經七月昕奔還號叫母即蘇皆謂孝感所致齊春秋曰宗元卿字希符早孤為祖母所養祖病元卿在遠輒心痛大病則大痛小病則小痛如此常也又曰焦華父遺曾病甚冬中思瓜華忽夢人謂之曰聞爾父思瓜故送助養呼從者進之華跪受窹而瓜在手香非常也父食之而病愈又曰劉靈哲字文明母病祈禱至多忽夢一人以藥, SBCK: 䘮燕國徐邈}
