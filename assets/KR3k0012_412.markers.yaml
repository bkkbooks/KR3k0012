  - {type: variant, offset: 1985, length: 391, content: 悲感鄉鄰及長報仇避地永安後欲改葬歲月淹久亡失墳墓連年於聞憙舊鄉推尋弗獲號哭之聲晝夜不止周遊巡歷叫訴神祈忽於遠達足下地陷得父銘記因遷葬曾祖已下三世九喪後周書云張元字孝始芮城人年十六祖喪明三年元居常憂泣遂請七僧燃七燈七日七夜轉藥師經行道言曰元為孫不孝使祖喪明今日燃燈光普施法界願祖目見明元求代闇如此七日其夜夢見一老翁以金鞞療其祖目謂元曰勿憂悲也三日之後祖目必差如期果明唐書曰豫州人許坦年十歲餘父入山採藥父為猛獸所噬即號以杖擊之獸遂奔走父以得全太宗聞而謂侍臣曰坦雖幼童遂能致命救親至孝自衷深可嘉尚授文林郎賜物五十段又曰博州梁文貞虢州閿鄉人少從征役比廻父母皆卒文貞恨不獲終養乃穿壙為門磴道出入晨夕灑掃其中結廬墓側未嘗蹔息自是不言三十年家人有所問但畫字以對其後山水衝斷驛路更於原上開道經文貞墓前由是行旅之遠近莫不欽歎有甘露降塋前樹白兔馴擾開元初縣令崔季友刊石以紀之十四年刺史許先奏文貞孝行特絕, WYG: ''}
