  - {type: variant, offset: 25, length: 0, content: '', SBCK: 奉公勤至皆此􅀋也又曰赫連逹遷大將軍夏州揔管三州五防諸軍事逹雖非文吏然性質直遵守法度輕於鞭撻而重愼死罪性又廉儉邊境胡民或饋逹以羊者逹欲招納異􅀋報以繒帛主司請用官}
  - {type: variant, offset: 25, length: 0, content: '', WYG: 奉公勤至皆此類也又曰赫連逹遷大將軍夏州總管三州五防諸軍事逹雖非文吏然性質直遵守法度輕於鞭撻而重慎死罪性又亷儉邊境胡民或饋逹以羊者逹欲招納異類報以繒帛主司請用官}
  - {type: variant, offset: 25, length: 0, content: '', krp: 奉公勤至皆此類也又曰赫連逹遷大將軍夏州揔管三州五防諸軍事逹雖非文吏然性質直遵守法度輕於鞭撻而重愼死罪性又廉儉邊境胡民或饋逹以羊者逹欲招納異類報以繒帛主司請用官}
  - {type: variant, offset: 26, length: 0, content: '', SBCK: 逹曰羊入我厨物出官庫是欺上也命取私帛與之識者嘉其仁恕焉北史曰韋孝寛爲延州揔􅃹兄夐至州與孝寛相見將別孝寛以所乗馬及轡勒與夐夐以其華飾心不欲之謂孝寬曰昔人不棄遺簮墜履者惡與之同出}
  - {type: page-break, offset: 26, content: '', id: KR3k0012_SBCK_251-3a}
  - {type: variant, offset: 26, length: 0, content: '', WYG: 逹曰羊入我厨物出官庫是欺上也命取私帛與之識者嘉其仁恕焉北史曰韋孝寛為延州總管兄夐至州與孝寛相見將别孝寛以所乘馬及轡勒與夐夐以其華飾心不欲之謂孝寛曰昔人不棄遺簮墜履者惡與之同出}
  - {type: page-break, offset: 26, content: '', id: KR3k0012_WYG_251-4b, image: WYG0895/WYG0895-0280d.png}
  - {type: variant, offset: 26, length: 0, content: '', krp: 逹曰羊入我厨物出官庫是欺上也命取私帛與之識者嘉其仁恕焉北史曰韋孝寛爲延州揔𬋩兄夐至州與孝寛相見將別孝寛以所乗馬及轡勒與夐夐以其華飾心不欲之謂孝寬曰昔人不棄遺簮墜履者惡與之同出}
  - {type: variant, offset: 27, length: 0, content: '', SBCK: 不與同歸吾之操行雖不逮前烈然捨舊䇿新亦非吾志也乃乗舊馬以歸隋書曰元褒爲原州揔管有啇人爲賊所刼其人疑同􅀫者而執之褒察其色寛而辝正遂捨其人啇詣闕訟褒受金縱賊上遣使窮治之使者薄責褒曰何故利金而捨盗也褒便即引咎􅀄無異詞使者與褒俱詣京師遂坐免官其盗㝷發於他所上謂褒曰公朝廷舊人位望隆重受金捨賊非善事何至自誣也曰臣受委一州不能息盗賊臣之罪一也州民爲人所謗不付法司懸即放免臣之罪二也牽率愚臣無頋刑法不持文書約束至令爲物所疑臣之罪三也臣有三罪何所逃責臣又不言受賂使者復將有所窮究然則縲絏横及良善重臣之罪是以自誣上歎異之稱爲長者又曰元景山爲豪州揔管先是州民王廽洛張季真等聚結亡命每爲刼盗前後牧守不能制景山下車遂捕之廽洛季真挺身奔江南擒其黨與數百人皆斬之法令明肅盗賊屏迹稱爲大治又曰韋丗康甞因侍宴再拜陳讓曰臣無尺寸之功位亞台鉉今犬馬齒截不益明時恐先朝露無以塞責願乞骸骨退避賢能上曰朕夙夜庶幾求賢􅀂渇兾與公共治天下以致太平今之所請深乖夲望縱令䈥力衰謝猶屈公卧治一隅於是出拜荆州揔管時天下唯置四大揔管并楊益三州並親王臨統唯荆州委於丗康時論以爲美丗康爲政簡静百姓愛恱合境無訟又曰韋藝遷營州揔管藝容皃瓌偉毎夷狄叅謁必整儀衛盛服以見之獨坐满一塌蕃人畏懼莫敢仰視又曰薜道衡聲名藉甚一時仁壽中楊素專}
  - {type: page-break, offset: 27, content: '', id: KR3k0012_SBCK_251-3b}
