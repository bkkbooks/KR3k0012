  - {type: variant, offset: 34, length: 0, content: '', WYG: 諸將曰水戰非北人所長今陳人依險泊舩必輕我而無備以夜襲之賊可破也諸將以為然安率衆先鋒大破陳師髙祖嘉之唐書曰田留安拜魏州總管劉闥之亂也來攻州城於時山東豪猾多殺長吏以應賊百姓兇人咸懐異志凡諸守皆以心腹自衛多所猜防由是上下情隔怨叛者多留安獨撫結所部示無疑阻凡有白事者無間踈逺皆至卧内謂人曰吾與卿軰同為國守自宜一心無為疑貳也必欲棄同即異背順歸逆亦任卿軰斬吾頭而去矣城中父老逓相誡勵子弟曰田公以赤心相付何得負之由是人情遂固州人苑竹林者劉闥之黨也初有異圖留安隂知之而不發其事因引置左右委以闗竹林感其意遂歸心焉卒収其力用又曰劉世讓拜廣州緫管將之官髙祖問以備邊之策世讓答曰突厥比數南冦者徒以馬邑為其中路耳臣計者於崞城置一智勇之將多貯金帛有來降者厚賜賞之數出竒兵掠其城下踐其禾稼敗其生業不出嵗餘彼當無食馬邑不足圖也髙祖曰非公無可任者乃使馳驛至彼善為經畧世讓於是以兵臨馬邑髙滿政以其地來降突厥患之遣曹繁陁來詣中國言世讓與可汗通謀將為亂由是得}
