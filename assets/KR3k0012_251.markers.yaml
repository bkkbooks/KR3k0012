  - {type: variant, offset: 13, length: 0, content: '', SBCK: 張寔都督涼州下令曰忝繼前蹤庶幾刑政不爲百姓之患而比年飢旱殆由庶事有闕竊慕箴誦之言以􅀘不逮自今有面刺孤罪者酬以束帛翰墨陳孤過者荅以筐篚謗言於市者報以羊米又曰石苞都督楊州諸軍事苞因入朝當還辝髙貴郷公留語盡日旣出白文帝曰非常主也數日而有成濟之事又曰劉胤代温嶠都督江州諸軍事領江州刺史假節胤位任轉髙放豪日甚縱酒躭樂不恤政事大殖財貨啇販百萬􅀄胤之代嶠也逺近皆謂非選陶侃郄鑒咸云胤非方伯才朝廷不從或問王恱曰今大難之後繩紀頓絶自江陵至于建康三千餘里流人萬計布在國之南藩要害之地而胤以侈汰之性卧而對之不有外變必有内患恱曰間温平南語家公云連得惡夢思見代者㝷云可用劉胤此乃温意非家公也是時朝廷空罄百官無禄唯資江州運漕而胤啇旅繼路以私廢公有}
  - {type: page-break, offset: 13, content: '', id: KR3k0012_SBCK_251-2a}
  - {type: variant, offset: 13, length: 0, content: '', WYG: 張實都督凉州下令曰忝繼前蹤庻幾刑政不為百姓之患而比年饑旱殆由庻事有闕竊慕箴誦之言以補不逮自今有靣刺孤罪者酬以束帛翰墨陳孤過者荅以筐篚謗言於市者報以羊米又曰石苞都督揚州諸軍事苞因入朝當還辭髙貴鄉公留語盡日既出白文帝曰非常主也數日間而有成濟之事又曰劉𦙍代温嶠都督江州諸軍事領江州刺史假節𦙍位任轉髙矜豪日甚縱酒躭樂不恤政事大殖財貨商販百萬初𦙍之代嶠也逺近皆謂非選陶侃郄鑒咸云𦙍非方伯才朝廷不從或問王悦曰今大難之後綱紀頓絶自江陵至於建康三千餘里流人萬計布在國之南藩要害之地而𦙍以侈汰之性卧而對之不有外變必有内患悦曰聞温平南語家公云連得惡夢思見代者尋云可用劉𦙍此乃温意非家公也是時朝廷空罄百官無禄惟資江州運漕而𦙍商旅繼路以私廢公有}
  - {type: page-break, offset: 13, content: '', id: KR3k0012_WYG_251-2b, image: WYG0895/WYG0895-0279d.png}
  - {type: page-break, offset: 13, content: '', id: KR3k0012_WYG_251-3a, image: WYG0895/WYG0895-0280a.png}
  - {type: variant, offset: 13, length: 0, content: '', krp: 張寔都督涼州下令曰忝繼前蹤庶幾刑政不爲百姓之患而比年飢旱殆由庶事有闕竊慕箴誦之言以𥙷不逮自今有面刺孤罪者酬以束帛翰墨陳孤過者荅以筐篚謗言於市者報以羊米又曰石苞都督楊州諸軍事苞因入朝當還辝髙貴郷公留語盡日旣出白文帝曰非常主也數日而有成濟之事又曰劉胤代温嶠都督江州諸軍事領江州刺史假節胤位任轉髙放豪日甚縱酒躭樂不恤政事大殖財貨啇販百萬𥘉胤之代嶠也逺近皆謂非選陶侃郄鑒咸云胤非方伯才朝廷不從或問王恱曰今大難之後繩紀頓絶自江陵至于建康三千餘里流人萬計布在國之南藩要害之地而胤以侈汰之性卧而對之不有外變必有内患恱曰間温平南語家公云連得惡夢思見代者㝷云可用劉胤此乃温意非家公也是時朝廷空罄百官無禄唯資江州運漕而胤啇旅繼路以私廢公有}
