  - {type: variant, offset: 17, length: 2, content: 也掌, krp: 書始下而爲郭黙所害又曰王㳟爲都督兖青兾幽并徐州晉陵諸軍事平北將軍假節鎮京口𥘉都督以北爲號者累有不祥故桓冲王坦之桓彛之後不受鎮北之号㳟表讓軍号以超授爲辭而實惡其名於是改号前將軍北史曰賀蘭祥除都督荆州刺史見有發掘古冢暴露骸骨乃謂守令日比豈仁者爲政耶命所在收藏時夏亢陽即日降雨唐書曰宋璟轉廣州都督仍爲}
