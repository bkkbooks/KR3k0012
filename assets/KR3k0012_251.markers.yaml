  - {type: variant, offset: 28, length: 0, content: '', SBCK: 朝政道衡旣與素善上不欲道衡乆知機宻因而檢校襄州揔管道衡乆蒙駈䇿一旦違離不勝悲戀兼之哽咽髙祖愴然改容曰尓光隂晚暮侍奉誠勞朕欲令尓將攝兼撫氓俗今尓之去朕如斷一臂於是賫物三百叚九鐶金帶并時服一襲馬十疋慰勉遣之又曰樊子蓋轉循州揔管許以便冝從事十八年入朝奏嶺南地圖賜以良馬雜物又曰令􅀌熈拜桂州揔管十七州諸軍事許以便冝從事刺史巳下官得承制􅀘授給帳内五百人賜帛五百疋發傳送}
