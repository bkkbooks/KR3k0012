  - {type: variant, offset: 1819, length: 361, content: 少時上計掾於道中遇一書生獨行時無伴卒得心痛子都下車為按摩奄忽而亡不知姓名有素書一卷銀十鉼即賣一鉼以殯其餘銀及素書著腹上呪之曰若子魂靈有知當令子家知子在此今使命不獲久留遂辭而去至京師有驄馬隨之人莫能得近唯子都得近子都歸行失道遇一關內侯家日暮住宿見主人呼奴通刺奴出見馬入白侯曰外客盜騎昔所失驄馬侯曰鮑子都上黨高士必應有語侯曰若此乃吾馬昔年無故失之子都曰昔年上計遇一書生卒死道中具述其事侯乃驚愕曰此吾兒也侯迎喪開椁視銀書如言侯乃舉家詣闕上薦子都聲名遂顯至子永孫昱並為司隸及其為公皆乘驄馬故京師歌曰鮑氏驄三入司隸再入公馬雖疲行步轉工傅咸集敘曰司隸校尉舊號臥虎誠以舉綱而萬目理提領而眾毛順州牧漢書曰何武與翟方進奏曰古選諸侯賢者以為州伯今部刺史居牧伯之位選第大吏所為位高至九卿所惡立退任重職大春秋之義用貴治賤不以卑臨尊刺史位下大夫而臨, SBCK: 護秩}
