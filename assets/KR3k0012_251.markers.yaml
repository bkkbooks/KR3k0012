  - {type: variant, offset: 34, length: 0, content: '', SBCK: 諸將曰水戰非北人所長今陳人依險泊舩必輕我而無備以夜襲之賊可破也諸將以爲然安率衆先鋒大破陳師髙祖嘉之唐書曰田留安拜魏州揔管劉闥之亂也來攻州城于時山東豪猾多殺長吏以應賊百姓兇人咸懷異志凡諸守皆以心腹自衛多所猜防由是上下情隔怨叛者多留安獨撫結所部示無疑阻九有白事者無間踈逺皆至卧内謂人曰吾與卿輩同爲國守自冝一心無爲疑貳也必欲弃同即異背順歸逆亦任卿輩斬吾頭而去矣城中父老逓相誡勵子弟曰田公以赤心相付何得􅀒之由是人情遂固州人苑竹林者劉闥之黨也􅀄有異圖留安隂知之而不發其事因引置左右委以関鑰竹林感其意遂歸心焉卒收其力用又曰劉丗讓拜廣州揔管將之官髙祖問以備邊之䇿丗讓荅曰突厥比數南宼者徒以馬邑爲其中路耳如臣計者於崞城置一智勇之將多貯金帛有來降者厚賞賜之數出竒兵掠其城下踐其禾稼敗其生業不出歳餘彼當無食馬邑不足圖也髙祖曰非公無可任者可馳驛至彼善爲經略丗讓於是以兵臨馬邑髙满政以其地來降突厥患之遣曹繁陁來詣中國言丗讓與可汗通謀將爲亂由是得}
