  - {type: variant, offset: 2183, length: 0, content: '', krp: 平帝時省都護令戊巳校尉領之沈約宋書曰𥘉漢宣帝置西域都護以加騎都尉若諌大夫護西域諸國光武建武𥘉始有督軍諸使至獻帝建安中魏武相漢遣大將外出督十軍二十軍者始号都督曹袁張楊之徒雖以三公假節領州郡然無都督之号也三國時亦有都護中都護左右都護將軍兼督諸軍猶是舊制意也黄𥘉三年上軍大將曹真始都督中外諸軍事揔諸軍髙貴卿公正元二年晉文帝都督中外諸軍事㝷加大都督之号太始中置小都督江左亦時有也吴朝鎮將揔兵亦曰都督大軍出爲二部則曰左右都督分武昌爲兩部亦曰左右部大督其揔一者則曰大都督又繞帳羽林無難之屬隨事有督無常号也至諸葛恪以下輔政乃都督中外諸軍事蜀關羽在江陵亦督軍州至張飛姜維亦爲中外都督如吴魏也晉氏以來宰輔任重者爲中外大都督方伯望隆者亦如大都督之号凡諸都督雖軍号有}
