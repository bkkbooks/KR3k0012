  - {type: variant, offset: 566, length: 492, content: 怪否對曰臣聞故事通官文書不著姓名又當司徒露布怪使司隸下書而著姓也上曰吾故欲令天下知忠臣之子復為司隸又曰李膺字元禮拜司隸校尉張讓弟朔為野王令貪殘無道畏膺而逃藏讓舍柱中膺率將吏破柱取朔付獄殺之讓訴冤於帝帝詔詰膺膺曰昔仲尼為魯司寇七日而誅少正卯今臣到官已積旬懼以淹留為不意獲速疾之罪乞留五日克殄元惡帝謂讓曰汝弟之罪也自是宦官屏氣休沐不敢復出帝問其故並叩頭泣曰畏李司隸也又曰司隸校尉下邳趙興亦不卹諱忌䘏憂也每入官舍輒更繕脩館宇移穿改築故犯妖禁而家人爵祿益用豐熾官至頴川太守子峻太傅以才器稱孫安代魯相三葉皆為司隸時稱其盛又曰江馮上言宜令司隸校尉督察三公陳元議以為不宜使有司省察公輔乃止續漢書曰陽球字方正漁陽人也少有勇氣尚書令中常侍王甫曹節等秉權勢球常唾手拊髀曰陽球作司隸此曹子何得爾耶尋為司隸明日詣闕謝恩甫時休下在舍球表甫罪收送洛陽詔獄自臨栲之甫子萌亦見收又曰牟融拜司隸校尉典司京都執憲持平多所舉正百僚莫不敬憚又曰百官志曰司隸校尉一人比千石孝武持節常察舉百僚以下及京師近都犯法者謝承後漢書曰華松擢為司隸校尉是時貴戚專勢有司軟弱莫敢糺罰松下車閉閤不通私書不與豪右相見姦慝犯者輒死奏馬氏三侯群豪歛手, SBCK: 抑}
