  - {type: variant, offset: 27, length: 0, content: '', WYG: 不與之同歸吾之操雖不逮前烈然捨舊筞新亦非吾志也乃乘舊馬以歸隋書曰元褒為凉州總管有商人為賊所刼其人疑同宿者而執之褒察其色寛其辭正遂捨其人商詣闕訟褒受金縱賊上遣使窮治之使者簿責褒曰何故利金而捨盗也褒便即引咎初無異詞使者與褒俱詣京師遂坐免官其盗尋發於他所上謂褒曰公朝廷舊臣位望隆重受金捨賊非善事何至自誣也曰臣受委一州不能息盗賊臣之罪一也州民為人所謗不付法司懸即放免臣之罪二也牽率愚臣不顧刑法不持文書約束至今為物所疑臣之罪三也臣有三罪無所逃責臣又言不受賂使者後將有所窮究然則縲絏横及良善重臣之罪是以自誣上歎異之稱為長者又曰元景山為豪州總管先是州民王廻洛張季直等聚結亡命每為刼盗前後牧守不能制景山下車遂捕之廻洛季直挺身奔江南擒其黨與數百人皆斬之法令明肅盗賊屏跡稱為大治又曰韋世康嘗因侍宴再拜陳讓曰臣無尺寸之功位亞台鉉今犬馬齒截不益明時恐先朝露無以塞責願乞骸骨退避賢能上曰朕夙夜庶幾求賢若渇冀與公共治天下以致太平今之所請深乖本望縱令筋力衰謝猶屈公卧治一隅於是出拜荆州總管時天下惟置四大總管并揚益三州并親王臨統惟荆州委於世康時論以為美世康為政簡靜百姓愛恱合境無訟又曰韋藝遷營州總管容貌瓌偉每夷狄叅謁必整儀衛盛服以見之獨坐滿一榻畨人畏懼莫敢仰視又曰薛道衡聲名籍甚一時仁壽中楊素專}
