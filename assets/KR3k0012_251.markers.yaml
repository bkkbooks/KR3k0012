  - {type: variant, offset: 2219, length: 438, content: 賑飢民民歌曰天下亂兮市為墟母不保子兮妻失夫賴有皇甫兮復安居吳志曰呂範拜楊州牧性好威儀州民如陸遜全琮及貴公子皆脩敬虔肅不敢輕脫也其居家服飾於時奢靡然勤事奉法故懽悅其忠不怪其侈又曰呂岱傅廖式作亂圍城邑零陵蒼梧鬱林諸郡騷擾岱自表輒行星夜兼路權遣使追拜岱交州牧晉書曰張茂為涼州牧武公軌之子也築靈鈞臺周輪八十餘堵其高九仞武陵人閻曾夜叩門呼曰武公遣我來曰何故勞百姓而築臺乎姑臧令辛巖以曾妖妄請殺之茂曰吾信勞人曾稱先君之令何為妖乎太府主簿馬魴諫曰今世難未夷唯當弘道業不宜勞役崇飾臺榭比年已來轉覺眾務日奢於往每所經營輕違雅度實非士女所望於明公也茂曰吾過也命止作役又曰張駿為涼州牧刑清國富群寮勸進稱涼王領秦涼二州牧置公卿百官如魏武晉文故事駿曰此非人臣所宜言也敢有言此者罪在不赦然境內皆稱之為王北史曰裴俠嘗與諸牧守俱謁周文文命俠別立謂諸牧守曰裴俠清慎奉公為天下之㝡令眾中有如俠者可與之俱立眾皆默然無敢應者周文乃厚賜俠朝野歡服焉號為獨立使君北史曰後魏廣陽王嘉遷司州牧嘉表請於京四面築坊三百二十三各周, SBCK: 銅}
