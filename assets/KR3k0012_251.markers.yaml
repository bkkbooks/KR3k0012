  - {type: variant, offset: 17, length: 2, content: 也掌, SBCK: 書始下而爲郭黙所害又曰王㳟爲都督兖青兾幽并徐州晉陵諸軍事平北將軍假節鎮京口􅀄都督以北爲號者累有不祥故桓冲王坦之桓彛之後不受鎮北之号㳟表讓軍号以超授爲辭而實惡其名於是改号前將軍北史曰賀蘭祥除都督荆州刺史見有發掘古冢􅁀露骸骨乃謂守令日比豈仁者爲政􅁘命所在收藏時夏亢陽即日降雨唐書曰宋璟轉廣州都督仍爲}
  - {type: page-break, offset: 17, content: '', id: KR3k0012_SBCK_251-2b}
  - {type: variant, offset: 17, length: 2, content: 也掌, WYG: 書始下而為郭黙所害又曰王恭為都督兖青冀幽并徐州晉陵諸軍事平北將軍假節鎮京口初都督以北為號者累有不祥故桓冲王坦之刁彛之徒不受鎭北之號恭表讓軍號以超授為辭而實惡其名於是改號前將軍北史曰賀蘭祥除都督荆州刺史見有發掘古冢暴露骸骨乃謂守令曰此豈仁者為政耶命所在収藏時夏亢陽即日降雨唐書曰宋璟轉廣州都督仍為}
