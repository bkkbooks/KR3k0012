  body:
  - {type: variant, offset: 5, length: 1, content: 八, SBCK: 九都督惣管都護都督晉書曰杜預爲都督荆州諸軍事南􅁟羙而謡之曰後丗無叛由杜翁孰識智名與勇功又曰陶侃爲都督荆雍益梁四州諸軍事是時荆州大飢百姓多飢死侃至秋熟輙糴至􅏇復價糶之士庶歡恱咸􅂪濟頼又曰羊祜都督荆州諸軍事招擕以禮懐逺以德吴人恱服呼爲羊公又曰􅁃翼都督江荆益三州刺史制度規模毎出於人數年之中軍國充實人情翕然稱其才明由是自河以南皆懷歸附又曰陳􅎰爲陶侃廣州長史侃夢有}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_251-1b}
  - {type: variant, offset: 5, length: 1, content: 八, WYG: 九都督總管都䕶都督晉書曰杜預為都督荆州諸軍事南土美而謡之曰後世無叛由杜翁孰識智名與勇功又曰陶侃為都督荆雍益梁四州諸軍事是時荆州大饑百姓多饑死侃至秋熟輒糴至饑復使糶之士庻歡悅咸䝉濟賴又曰羊祜都督荆州諸軍事招攜以禮懐逺以徳吳人悅服呼為羊公又曰庾翼都督江荆益三州刺史制度規模每出於人數年之中軍國充實人情翕然稱其才明由是自河以南皆懐歸附又曰陳􅎰為陶侃廣州刺史侃夢有}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_251-1b, image: WYG0895/WYG0895-0279b.png}
