  - {type: variant, offset: 320, length: 245, content: 東觀漢記曰鮑永為司隸校尉時趙王良從上送中郎將來歙喪還入夏城門中與五官將軍相逢道迫良怒召門候岑尊叩頭馬前永劾奏良曰今月二十七日車駕臨故中郎將來歙喪還車駕過須臾趙王良從後到與右中郎將張邯相逢城門中道迫狹叱邯旋車又召門候岑尊詰責使前走數十步按良諸侯藩臣蒙恩入侍知尊帝城門使候吏六百石而肆意加怒令叩頭都道走馬頭前無藩臣之禮大不敬也後漢書曰鮑昱為隸在職奉法守正有父風永平五年坐救火遟免又曰鮑永為司隸鮑恢為都官從事並不避強禦詔策曰貴戚且當歛手以避二鮑其見憚如此永子昱復為司隸初拜使封胡降檄世祖遣問昱曰有, SBCK: ''}
