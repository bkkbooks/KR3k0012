  - {type: variant, offset: 2183, length: 0, content: '', WYG: 平帝時省都䕶令戊巳校尉領之沈約宋書曰初漢宣帝置西域都䕶以加騎都尉若諌大夫䕶西域諸國光武建武初始有督軍諸使至獻帝建安中魏武相漢遣大將外出督十軍二十軍者始號都督曹袁張楊之徒雖以三公假節州郡然無都督之號也三國時亦有都䕶中都䕶左右都䕶將軍兼督諸軍猶是舊制意也黄初三年上軍大將軍曹真始都督中外諸軍事總諸軍髙貴鄉公正元二年晉文帝都督中外諸軍事尋加大都督之號太始中置小都督江左亦時有也呉朝鎮將總兵亦曰都督大將軍出為二部則曰左右都督分武昌為兩部亦曰左右部大都督其總一者則曰大都督又繞帳羽林無難之屬隨事有督無常號也至諸葛恪以下輔政乃都督中外諸軍事闗雲長在江陵亦督軍州至張飛姜維亦為中外都督如呉魏也晉氏以來宰相任重者為中外大都督方伯望隆者亦加大都督之號凡諸都督雖軍號有}
