  - {type: punctuation, offset: 1072, content: 、, id: KR3k0012_CHANT_251-bkkpn289}
  - {type: variant, offset: 1073, length: 496, content: 公以下及旁州郡國無不統陛坐見諸卿皆獨席魏志曰徐宣遷司隸校尉從至廣陵大軍乘舟風浪暴起帝舩迴到宣舩在後凌波而前群寮無至者帝壯之又曰鍾會為司隸校尉雖在外司時政損益當世與奪無不畢綜晉書曰傅玄轉司隸校尉獻皇后崩於弘訓宮設喪位舊制司隸於端門外坐在諸卿上絕席而入殿按本品秩在諸卿下以次坐不絕席而謁者以弘訓宮為殿內制玄位在卿下玄恚怒厲聲色而責謁者妄稱尚書所處玄對百寮而罵尚書以下御史中丞庾純奏玄不敬玄又自表不以實坐免官然玄天性峻急不能有所容每有奏劾或值日暮捧白簡整簪帶竦踴不寐坐而待旦於是貴游懾伏臺閣生風臧榮緒晉書曰傅咸以議郎長兼司隸校尉咸前後固辭辭旨懇切上不聽切勑使者逼就拜授咸悲鯁傷咽以身無兄弟職無假到官之日喪祭無主重自陳乞遂不見聽聽於官舍設靈坐朔望秦祭咸臥病治職時朝廷寬弛豪右放恣郡縣容縱寇盜充仞攻篡囚徒掠奪市道交私情託朝野溷淆咸於是奏免河南尹京都肅然貴戚憚之數月之間三奏免選官奏按謇諤終無曲撓雖不見從有司肅然晉志曰漢武帝初置十三州刺史各一人又置司隸校尉察三輔三河弘農七郡晉諸公贊曰劉毅字仲雄為司隸奏太尉何曾尚書劉寔父子及羊琇張他等所犯狼藉司部守令事相連及覩風投印綬者甚眾皆以為毅能繼諸葛豐蓋寬饒也崔鴻, SBCK: ''}
