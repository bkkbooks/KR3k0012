  - {type: variant, offset: 85, length: 0, content: '', SBCK: 趙勤南陽人太守桓虞召爲功曹委以郡事嘗有重客過欲託一士令爲曹吏虞曰我有賢功曹趙勤當與議之潜於内中聽虞乃問勤勤對曰恐未合衆客曰止止勿復道又曰楊正爲京兆功曹光武崩京兆尹出西域賈胡共起帷帳設􅀕尹車過帳胡牽車令拜尹疑止車正在前導曰禮天子不食支庶况夷狄乎勑壞􅀕遂去又曰鮑永爲郡功曹時有稱侍中止傳舎者太守趙興欲出謁永以不冝岀當車㧞佩刀興因還後數日詔書下捕之果矯稱使者由是知名又曰}
  - {type: page-break, offset: 85, content: '', id: KR3k0012_SBCK_264-1b}
  - {type: variant, offset: 85, length: 0, content: '', WYG: 趙勤南陽人太守桓虞召為功曹委以郡事嘗有重客過欲託一士令為功曹吏虞曰我有賢功曹趙勤當與議之濳於内中聽虞乃問勤勤對曰恐未合衆客曰止止勿復道又曰楊正為京兆功曹光武崩京兆尹出西域賈胡共起帷帳設祭尹車過帳胡牽車令拜尹疑止車正在前導曰禮天子不食支庶況夷狄乎勅壞祭遂去又曰鮑永為郡功曹時有稱侍中止傳舍者太守趙興欲出謁永以不宜出當車拔佩刀截馬當胸興因還後數日詔書下捕之果矯稱使者由是知名又曰}
  - {type: page-break, offset: 85, content: '', id: KR3k0012_WYG_264-2a, image: WYG0895/WYG0895-0363c.png}
  - {type: page-break, offset: 85, content: '', id: KR3k0012_WYG_264-2b, image: WYG0895/WYG0895-0363d.png}
  - {type: variant, offset: 85, length: 0, content: '', krp: 趙勤南陽人太守桓虞召爲功曹委以郡事嘗有重客過欲託一士令爲曹吏虞曰我有賢功曹趙勤當與議之潜於内中聽虞乃問勤勤對曰恐未合衆客曰止止勿復道又曰楊正爲京兆功曹光武崩京兆尹出西域賈胡共起帷帳設祭尹車過帳胡牽車令拜尹疑止車正在前導曰禮天子不食支庶况夷狄乎勑壞祭遂去又曰鮑永爲郡功曹時有稱侍中止傳舎者太守趙興欲出謁永以不冝岀當車㧞佩刀興因還後數日詔書下捕之果矯稱使者由是知名又曰}
  - {type: variant, offset: 86, length: 1, content: 伋, SBCK: 丹爲郡功曹薦隂亶程胡魯歆自代太守杜詩曰古者卿士讓位今功曹稽古經可爲至德編署黄堂以爲後法又曰吴良字大儀齊國臨淄人􅀄爲郡吏歳旦與􅁺史入賀門下􅁺王望舉觴上壽謟稱太守功德良於下席勃然進曰倿邪之人欺謟無􅃺願勿受其觴太守歛容而止讌罷轉良爲功曹耻以言受進終不肯謁又曰汝南太守歐陽歙召郅惲爲功曹汝南舊俗十月饗㑹百里内皆賫牛酒到府飲讌時臨饗禮畢歙教曰西部督郵繇延天資忠貞不嚴而治今與衆儒共論延功顯之于朝惲於下座愀然前曰案延資性貪邪外方内貟朋黨搆姦罔上害民明府以惡爲善以直從曲此旣無君又復無臣惲敢奉觥歙色慙不知所爲門下􅁺鄭敬進曰君明臣直功曹言切明府德也歙意少解曰實歙罪也又曰永平􅀄新野功曹鄧寅以外戚小侯毎預朝㑹而容姿趍歩有出於衆上目之頋左右曰朕之儀皃豈􅀂此人特賜輿馬衣服虞延以寅無實行未甞加禮上乃詔令自稱南陽功曹詣闕寅}
  - {type: page-break, offset: 86, content: '', id: KR3k0012_SBCK_264-2a}
