  - {type: variant, offset: 1933, length: 1082, content: 魏志曰審配字正南魏郡人少忠烈慷慨有不可犯之節袁紹領冀州委配腹心之任以為治中別駕又曰太祖令曰頻年已來不聞嘉謀豈吾開延不勤之耶自今已後諸掾屬治中別駕常以月旦各言其失吾將覽也又曰毛玠字孝先陳留平丘人也少為縣吏以清公稱將避亂荊州未至聞劉表政令不明遂住魯陽太祖臨兗州辟為治中從事蜀志曰龐統以從事守耒陽令不治免官魯肅遺先主書曰龐士元非百里之才使處治中別駕之任始當展其驥足耳乃以為治中江表傳曰孫權剋荊州將吏悉皆歸附而潘濬獨稱疾不見權遣人以床就家轝致之濬伏面著床席涕泣交橫權至慰勞與語使親近以手巾拭其面濬起下地拜謝即以為治中王隱晉書曰唐彬檄為治中別駕忠肅公亮匡救違闕盡規誨以納善不顯諫以彰主當朝正色焉又曰譙郡太守李詮稱散吏後竟為治中檀道鸞晉紀曰習鑿齒少愽涉才情秀逸桓溫奇之自州從事歲中三轉至治中梁書曰蕭洽為南徐州治中既近畿重鎮吏數千人前後居之者皆致巨富洽為之清身率職饋遺一無所受妻子不免飢寒又曰陸襄字師卿為楊州治中襄父終此官乃固辭高祖不許聽與府司馬換廨居之也益部耆舊傳曰柳琮字伯騫為治中與人交結久而益親其所拔進皆世所稱致位牧守鄉里為之語曰得黃金一笥不如柳伯騫所識又曰張彥字伯春為治中從事刺史每坐高床治中單席於地鄧德明南康記曰昔有盧躭仕州為治中少有棲山之術善解飛每夕輒凌虛歸家曉則還州曾元會曉不及朝則化為白鵠至閣前廻翔欲下威儀以箒擲之得一隻履躭乃驚還就列時步騭為廣州刺史意惡之便以狀列聞遂至誅滅世說曰習鑿齒才吏不常桓宣武器之未三十用為荊州治中謝牋曰不遇明公荊州老從事耳長史後周書曰劉璠為蕭循益州長史及太祖既納蕭循之降又許其返國循至長安累月未之遣也璠因待宴太祖曰我於古誰比對曰常以公命世英主湯武莫逮今日所見曾齊桓晉文之不若太祖曰我不得比湯武望與伊周為匹何桓文之不若乎對曰齊桓存三亡國晉文不失信於伐原語未終大祖撫掌曰我解爾意欲激我耳於是即命遣循陳書曰蕭濟為楊州長史高宗嘗勑取楊州曹事躬自省覽見濟條理詳悉文無滯留乃顧謂左右曰我本期蕭長史長於經傳不意精練繁劇乃至於此隋書曰榮毗楊素薦毗為華州長史世號為能素之田宅多在華陰左右放縱毗以法繩之無所寬貸毗因朝集素謂之曰素之舉卿適以自罰也毗荅曰奉法一心者但恐累公所舉素笑曰前者戲耳卿之奉法素之望也又曰高祖時制刺史二佐每歲暮更入朝上考課唐書曰張惟一為荊州長史以防禦使陳希昂為司馬希昂衡州酋帥家兵千人在部下自為藩衛有牟遂金仕至將軍為惟一將希昂積憾持兵領眾入惟一衙索遂金頭金藏於惟一後院惟一懼截頭遂與之兵始退自此之後政歸希昂惟一寄坐而已司馬北史曰魏蘇亮拜黃門侍郎文帝子宜都王武為秦州刺史以亮為司馬帝謂亮曰黃門郎豈可為秦州司馬以朕愛子出藩故以心腹相委勿以為恨, SBCK: ''}
