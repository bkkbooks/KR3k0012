  - {type: variant, offset: 3034, length: 3, content: 馬初龍, SBCK: 户叅軍時年少美容儀刺史李崇義􅀄甚輕之先是州中有積年舊案數百道崇義促琰之使斷之琰之命書吏數人連􅁓進筆斯湏剖斷並畢文翰俱美且盡與奪之理崇義大驚謝曰公何忍藏鋒以成鄙夫之過由是大知名號爲霹􅆮手司兵叅軍唐書曰杜甫字}
