  - {type: variant, offset: 187, length: 1, content: 仲, SBCK: 寵爲廣漢太守風聲大行徴爲大司農帝問何以爲治寵曰臣任功曹王渙渙由是知名魏志曰臧洪廣陵郡人也爲張超功曹超兄邈謂超曰聞弟爲郡守政教威恩不由巳出動任臧洪洪者何人超曰洪才略智數優超超甚愛之海内竒士也邈即引見洪與語大異之又曰臧洪字子原太守張超請洪爲功曹卓圖危社稷洪􅀃超曰明府歷丗受恩兄弟並據大郡今王室將危賊臣未梟此誠天下義烈報恩効命之秋也今郡境尚全吏民殷冨􅀂動桴鼓可得二萬以此誅除國賊爲天下倡先義之大者也超然其言又曰􅀽渙字曜卿當時諸公子多越法度而渙清静}
