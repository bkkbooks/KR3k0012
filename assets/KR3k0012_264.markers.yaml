  - {type: variant, offset: 118, length: 4, content: 袁紹領冀, SBCK: 虞延去官還郷里太守富宗聞延名召署功曹宗性奢靡車服器物多不中節延諌曰昔晏嬰輔齊鹿裘不完季文子相魯妾不衣帛以約失之者鮮矣宗不恱延即辭退居有頃宗果以侈縱􅀍誅臨當伏刑攬涕而歎曰恨不用功曹虞延之諌又曰周章􅀄仕郡爲功曹時大將軍竇憲免封冠軍侯就國章從太守行春到冠軍太守猶欲謁之章進諌曰今日公行春豈可越儀私交且憲椒房之親勢傾王室而退就藩國禍福難量明府剖符大臣千里重任舉止進退其可輕乎太守不聽遂便􅂛車章前抜佩刀絶馬鞅於是乃止及憲􅀍誅公卿以下多以交􅀜得罪太守幸免以此重章又曰徐穉豫章人時陳蕃爲太守以禮請署功曹穉不免之旣謁而退蕃在郡不接賔客唯稺來特設一榻去則懸之又曰韓稜􅀄爲郡功曹太守葛興中風疾不能聽政稜隂代興視事出入二年令無違者又曰廉范永平􅀄隴西太守鄧融備禮謁范爲功曹謁請㑹融爲}
