  - {type: variant, offset: 1504, length: 366, content: 刺史鄧盛聞而馳傳辟為別駕從事允由是知名路拂以之廢棄管輅別傳曰趙孔耀言輅於冀州刺史裴徽即撽召輅一相見清論終日不覺疲倦天時大熱移床在庭前樹下乃至雞鳴向晨然後出自爾引輅為別駕江氏家傳曰統字應元太傳東海王領州牧請君為別駕與君書曰昔子師作豫州末下車辟荀慈明下車辟孔文舉貴州人士有堪此求者不知君舉高平郗道微為賢良陳留阮宣子為直言濟北程弘叔為方正皆於時選為允顧和別傳曰顧球時為楊州別駕顧榮謂球曰卿速步公孝如是超卿矣和字公孝庾亮集荅郭遜書曰別駕舊與刺史別乘周流宣化於萬里者其任居刺史之半安可任非其人應享與州將牋曰誨命欲求佳別駕自頃諸府大開搜延路廣海無遺蚌山亡逸璞歸數日臥思始得一人陳國有袁琇字惠瑛者才識可以經於治亂棲跱可以勸礪後進享具所服聞而未嘗接顏交言也又宗令文早有名輩相與通家門素所具抑亦其次治中通典曰治中從事史一人居中治事主眾曹文書漢制也謝承, SBCK: 司倉叅軍}
