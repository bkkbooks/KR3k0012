  - {type: variant, offset: 873, length: 3, content: 真長沙, SBCK: 歎府君朝問昨歎息者誰主簿曰書佐魏㓪也府君由是知㓪有凌雲之志轉功曹佐正旦與􅁺史上朝時功曹吏頋翕披裘以加朝服㓪以裘非臣服非翕不敬勑卒撤去翕恚而不聽以手歐卒㓪右手鳴鼔左手撤裘以聞府君曰㓪當朝正色有不撓之節遂退翕以㓪代之㓪辭病不就又曰魏徽字孔章仕郡爲功曹史府君貴其各重徽每拜謁常跪而待之華陽國志曰公孫述入蜀蜀郡拒守述功之功曹朱尊絆馬死戰光武帝嘉之又曰李業字臣遊廣漢梓橦人少執志清白太守到咸慕其名召爲功曹十命不詣又曰朱倉字雲卿下邳人少受學於蜀郡張寧飡豆屑飲水同業憐其貧資給米􅁏不受家貧常以歩行爲郡功曹鍾岏良吏傳曰桓虞字仲春馮翊萬年}
  - {type: page-break, offset: 873, content: '', id: KR3k0012_SBCK_264-8a}
  - {type: variant, offset: 873, length: 3, content: 真長沙, WYG: 歎府君朝問昨自歎者誰主簿曰書佐魏朗也府君由是知朗有凌雲之志轉功曹佐正旦與掾史上朝時功曹吏顔翕披裘以加朝服朗以裘非臣服斥翕不敬勅卒撤去翕恚而不聽以手歐卒朗右乎鳴皷左手撤裘以聞府君以朗當朝正色有不撓之節遂退翕以朗代之朗辭病不就又曰魏徽字孔章仕郡為功曹吏府君貴其名重徽毎拜謁常跪而待之華陽國志曰公孫述入蜀郡拒守述攻之功曹朱尊絆馬死戰光武帝嘉之又曰李業字巨遊廣漢梓潼人少執志清白太守劉咸慕其名召為功曹十命不詣又曰朱倉字云卿下仰人少受學於蜀郡張寧資豆屑飲水同業憐其貧資給米肉不受家貧常以步行為郡功曹鍾岏良吏傳曰桓虞字仲春馮翊萬年}
