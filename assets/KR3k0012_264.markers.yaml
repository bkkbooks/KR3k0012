  - {type: variant, offset: 167, length: 0, content: '', SBCK: 范滂字孟愽汝南人太守宗資署功曹滂外甥西平李頌公族子孫頑嚚􅁾濁爲郷曲所棄常侍唐衡属其事資勑曹召署文學史滂不肯聽資怒召功曹書佐朱零問不召頌意狀零以告滂滂曰荅教當言頌則滂之姉子豈不樂其􅂛進但頌洿􅁾小人不冝染汙朝廷不敢以位私人是以不召零具荅教如此零入聞資使五伯亂捶困杖言辭不懾仰疾言曰范滂清議猶利刃截腐􅁏願爲明府所笞殺不爲滂所廢絶今日之死當受忠名爲滂所發永成惡人滂正直謇諤皆此􅀋也又曰許劭仕郡爲功曹抗忠舉義進善黜惡正機執衡允齊風俗所稱如龍之􅂛所貶如墮干淵清論風行所吹草偃爲衆所服又曰李壽聦明智逹有俊才太守黄讜髙其名德召署功曹毎進見常薦逹郡中善人有異行者讜輙序用壽雖見優禮愈隆壽意益下其所致逹未嘗伐其功美又曰羊定字丗德爲郡功曹病困􅀍不覆軀衣不}
  - {type: page-break, offset: 167, content: '', id: KR3k0012_SBCK_264-4a}
  - {type: variant, offset: 167, length: 0, content: '', WYG: 范滂字孟博汝南人太守宗資署功曹滂外甥西平李頌公族子孫頑嚚穢濁為鄉曲所棄常侍唐衡屬其事資勅曹召署文學吏滂不肯聽資怒召功曹書佐朱零問不召頌意狀零以告滂滂曰答教當言頌則滂之姊子豈不樂其升進但頌洿穢小人不宜染汙朝廷不敢以位私人是以不召零具答教如此零入聞資使五伯亂捶困杖言辭不懾仰疾言曰范滂清議猶利刃截腐肉願為明府所笞殺不為滂所廢問今日之死當受忠名為滂所廢永成惡人滂正直謇諤皆此類也又曰許劭仕郡為功曹抗忠舉義進善黜惡止機執衡允齊風俗所稱如龍之升所貶如墮于淵清論風行所吹草偃為衆所服又曰李壽聰明智逺有俊才太守黄讜髙其名德召署功曹毎進見常薦達郡中善人有異行者讜輒序用夀雖見優禮愈隆夀意益下其所致達未嘗伐其功美又曰羊定字世德為郡功曹病困被不覆軀衣不}
