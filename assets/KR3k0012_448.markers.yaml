  - {type: variant, offset: 265, length: 0, content: '', SBCK: 復起以吾多隂禍也又曰諸吕擅權丞相陳平患之平甞燕居􅀷念不見陸賈賈曰何念􅀷也陳平曰生揣我何念賈曰足下位爲上相食三万户侯可謂極富貴無欲矣然有憂念不過患諸吕少主耳陳平曰然爲之奈何賈曰天下安注意相天下危注意將君何不交於太尉􅀷相結友陳平用其計迺以百金爲絳侯壽厚具樂飲太尉亦報如之兩人􅀷相結友吕氏謀益壞陳平又以奴婢百人車馬五十乗錢五百萬遺賈爲食飲之費賈以此時遊漢庭公卿間名聲籍甚及誅吕氏立孝文賈頗有力又曰髙祖旣誅黥布聞朱建諌不聽賜建號平原君爲人㓻直行不苟合義不取容辟陽侯行不正得幸吕太后欲知建建不肯見建母死貧未有發䘮陸賈素與善乃賀辟陽侯曰平原君母死何乃賀我陸生曰前君侯欲知平原君義不知君以母故今其母死君誠厚送喪則彼爲君死辟陽侯迺奉百金稅韋劭曰衣服曰稅稅當爲襚也列侯貴人以辟陽侯故徃􅉠凡五百金或人毀辟陽侯惠帝大怒下吏欲誅之太后慙不可言大臣多害辟陽侯行欲遂誅之辟陽侯急使人欲見建建辭曰獄急不敢見君建迺求見孝惠幸臣閎藉孺說曰君所以得幸帝天下莫不聞今辟陽侯幸太后而下吏道路皆言君䜛欲殺之今日辟陽侯誅旦日太后怒亦誅君君何不肉􅃝爲辟陽侯言帝帝聽君出辟陽侯太后大忻兩主俱幸君君冨貴益倍矣於是閎藉孺大恐從其言帝果出之辟陽侯之囚也欲見建建不見辟陽侯以爲背之大怒及其成功出之乃大驚又曰韓信巳拜大將軍漢王曰丞相數言將軍將軍何以敎寡人計䇿信再拜曰臣嘗事項王請言項王爲人不能任屬賢將此特匹夫之勇又背約而逐義帝所過無不殘滅雖爲霸實失天下心大王之入武􅀜秋毫無害除􅁗苛法與民約法三章􅁗民無不欲大王王奈者今王舉兵而東三􅁗可傳檄而定也於是漢王大喜自以爲得信晚遂聽信計部署將舉兵東出陳倉定三􅁗又曰韓信張耳以兵數万欲東下井涇擊趙趙王及成安君陳餘聞漢且襲之聚兵井陘口號}
  - {type: page-break, offset: 265, content: '', id: KR3k0012_SBCK_448-4b}
  - {type: page-break, offset: 265, content: '', id: KR3k0012_SBCK_448-5a}
  - {type: variant, offset: 265, length: 0, content: '', WYG: 復起以吾多隂禍也又曰陳平曰方深念不見陸賈賈曰何念深也陳平曰生揣我何念賈曰足下位爲上相食三萬户侯可謂極富貴無欲矣然有憂念不過患諸吕少主耳陳平曰然爲之柰何賈曰天下安注意相天下危注意將君何不交於太尉深相結友陳平用其計迺以百金爲絳侯壽厚其樂飲太尉亦報如之兩人深相結友吕氏謀益衰陳平又以奴婢百人車馬五十乘錢五百萬遺賈爲食飲之費賈以此時遊漢庭公卿間名聲藉甚及誅吕氏立孝文賈頗有力又曰髙祖既誅黥布聞朱建諫不聽賜建號平原君爲人剛直行不苟合義不取容辟陽侯行不正得幸吕太后欲知建建不肯見建母死貧未有發䘮陸賈素與善乃賀辟陽侯曰平原君母死何乃賀我陸生曰前君侯欲知平原君義不知君以母故今其母死君誠厚送䘮則彼爲君使辟陽侯廼奉百金税應邵曰衣服曰襚税當爲襚也列侯貴人以辟陽侯故往賻凡五百金或人毁辟陽侯惠帝大怒下吏欲誅之太后慙不可言大臣多害辟陽侯行欲遂誅之辟楊侯急使人欲見建建辭曰獄急不敢見君建廼求見孝惠幸臣閎籍孺說曰君所以得幸帝天下莫不聞今辟陽侯幸太后而下吏道路皆言君讒欲殺之今日辟陽侯誅旦日太后怒亦誅君君何不肉袒爲辟陽侯言帝帝聽君出辟陽侯太后大忻兩主俱幸君君富貴益倍矣於是閎籍孺大恐從其言帝果出之辟陽侯之囚也欲見建建不見辟陽侯以爲背之大怒及其成功出之乃大驚又曰韓信已拜大將軍漢王曰丞相數言將軍將軍何以教寡人計策信再拜曰臣嘗事項王請言項王爲人不能任屬賢將此特匹夫之勇又背約而逐義帝所過無不殘名雖爲覇實失天下心大王之入武闗秋毫無害除秦苛法與民約法三章秦民無不欲大王王秦者今王舉兵而東三秦可傳檄而定也於是漢王大喜自以爲得信晩遂聽信計部置將舉兵東出陳倉定三秦又曰韓信張耳以兵數萬欲東下井陘擊趙趙王及成安君陳餘聞漢且襲之聚兵井陘口號}
