  - {type: variant, offset: 1120, length: 563, content: 風智似蘧瑗而高不及也班固稱之有大度不孜孜於富貴不戚戚於貧賤二者之美蓋亦良矣然楊子之書清貴甚遠然無廟堂之議對王公大人之辭故令其骨鯁不見節操不顯也夫孟子之書將門人所記非自作也故其志行多見非唯教辭而已或拒方鍾之祿或辭兼金之贈或以周漢禮殊二子時異不可責之於周或曰帝納異言而子雲無正論卒有投閣之累孟軻昂昂其肯然子雲保家養智之士孟軻鳳峙高世之英也又曰周勃之勳不如霍光此前史所載較然可見而人以勃功大於光意竊不安何者勃本帝大臣居太尉之位擁兵百萬既有陳平王陵之力又有朱虛諸王之據酈寄遊說以譎諸呂因眾之心易以濟事若霍光者以倉卒之際受寄託之任輔弼幼主天下晏然遇燕王上官之亂誅除凶逆以靖王室廢昌邑立宣帝任漢家之重隆中興之祚參聲伊周為賢相推驗事校優劣明矣又曰汝南陳仲舉體氣高烈有王臣之節頴川李元禮忠平正直有社稷之能海內論二士有議而未決陳留蔡伯喈云仲舉強於犯上元禮長於接下犯上為難接下為易仲舉為先元禮後矣天下於是為定愚思竊以伯喈未必可從也夫皋繇戒舜犯上之征也舜治百揆接下之效也故陳平謂王陵言面折廷爭我不如公至安劉氏公不如我而犯上則為優是王陵當高於良平朱雲殊乎吳鄧矣陸恭仲荅曰陳李二君德齊於行才等於身無長短之差時人或其先後魏文帝典論曰或有方周成王於漢昭帝者余以為周氏體聖考之作氣稟賢妣之胎教周邵為保傅呂尚為太師故咳笑必含仁義之聲觀聽必覿禮義之容弘踐祚之義隆, SBCK: ''}
