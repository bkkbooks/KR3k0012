  - {type: variant, offset: 353, length: 1, content: 釐, SBCK: 之術亮􅀄不對後乃共外髙樓因令去梯謂亮曰今日上不至天下不至地言出子口而入吾耳可以言未亮曰君不見申生在内而危重耳居外而安􅄾意感悟因規出又曰馮異字公孫潁川城父人通左氏春秋孫子兵法歸丗祖授大將軍與赤眉戰不利異乃令各更夜色伏於道傍戰移時伏兵卒起衣服相亂衆驚大敗降赤眉男女八万餘衆􅀄爲丗祖主簿}
