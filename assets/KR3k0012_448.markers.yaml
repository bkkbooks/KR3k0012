  - {type: variant, offset: 175, length: 1, content: 德, SBCK: 君不可悔也奈伯曰􅀂背其言所不歸爾孥者有如河又曰晉悼公歸謀所以息民魏絳請施舎巳責輸積聚以貸自公巳下茍有積者盡出之國無滯積亦無困人公羊傳曰權者反於經後有善者也行權有道自貶損以行權不害人以行權殺人以自生亡人以自存君子不爲也論語曰爲人謀而不忠乎又曰君子謀道不謀食也史記曰人有上書告楚王韓信謀反上問左右左右爭欲擊之用陳平計乃僞遊雲夢㑹諸侯於陳楚王迎因即執又曰魏伐趙趙急請救於齊齊王欲將孫臏臏辭謝曰刑餘之人不可於是乃使田忌將兵而徃直走梁魏將龐㳙聞之去韓而歸齊軍巳過而西矣孫子謂忌曰彼三晉之兵素悍而齊號爲怯善戰者因其勢而利導之兵法百里而走利者蹶上將魏文帝曰蹶猶挫也軍半至使齊軍入魏地爲十萬竈明日爲五萬竈明日爲二萬竈龐㳙行三日大喜曰我固知齊卒怯入吾地三日士卒亡者過半矣乃弃其歩兵與其輕輓亡辨反倍日并行逐之孫子度其暮當至馬陵馬陵道狹而傍多阻險可伏兵乃大斫樹白而書之曰龐㳙死此下於是令齊軍善射者萬弩夾道而暮見火舉而俱發㳙夜至斫木下見白書乃鑚火燭之讀未畢齊軍万弩共發軍大亂相失㳙自知計窮兵敗遂自剄曰遂成竪子之名漢書曰髙祖十年陳豨反上親征之師次邯鄲令周昌選趙壯士堪爲將者得四人及見上上罵曰竪子能爲將乎四人慙􅎼俯伏上各封千户任以爲將左右諌曰從陛下入蜀漢破強楚定海内轉􅋐數千里瘡痍遍體而功賞未行今四人何功而遽封千户上曰非尓所知也今陳豨反趙代地皆豨之有也吾以羽檄徴天下兵未有至者今唯獨邯鄲中兵耳吾何愛四千户不以慰趙子弟乎左右曰善又聞豨將皆啇賈人髙祖曰吾知其易與之矣啇人尚利乃以金購豨將多降者又曰景帝三年呉楚七國反太尉周亞夫將東擊師次㶚上趙渉􅃒􅀃亞夫曰將軍東擊呉楚勝則宗廟安不勝則天下危能用臣言乎亞夫下車禮而問之渉曰呉王素富懷輯死士乆矣此知將軍且行必置間人於崤澠阨狹之間且兵事尚神密將軍何不從此右去趨藍田出武􅀜抵洛陽間不過二三日直至武庫擊鳴鼓諸侯聞之以謂將軍從天而下也如其謀至洛陽使人索崤澠間果得伏甲以渉爲護軍竟滅呉楚又曰周勃等旣誅諸吕使迎代王郎中令張武等議皆曰不可信願稱疾無行以觀其變中尉宋昌進曰羣臣之議皆非也夫以吕太后之嚴立諸吕爲三王擅權專利然而太尉以一節入北軍一呼士皆左袒爲劉氏叛諸吕卒以滅之此乃天授非人力也内有朱虚東牟之親外畏呉楚淮南琅耶齊代之強方今髙帝子獨淮南王與代王代王又長賢聖仁孝聞於天下}
