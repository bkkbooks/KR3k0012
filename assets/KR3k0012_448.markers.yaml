  - {type: variant, offset: 1703, length: 1221, content: 二享國三十年世永治長德與年豐夫孝昭父非武王母非邑姜體不承聖化不胎育保無仁孝之德佐無隆平之治所謂生深宮中長婦人手矣德與體并智與性成孝昭之崩年二十有一承衰獘之世收彫落之民臣無淑聖之智身有短折之期欲高隆周豈不謬哉曹植漢二祖論曰高祖因暴秦而起官由亭長自亡徒招集英雄遂誅強楚光有天下功齊湯武業流後嗣誠帝王之元勳人君之盛事也直寡善人之美稱鮮君子之風采惑秦宮而不出窘項座而不起計失乎酈生忿過乎韓信太公是誥於孝違矣敗古今之大教傷王道之實義然其驍將藎臣皆古今之鮮有而能任其才而用之聽其言而察之故兼天下而有帝位也不然斯不免當世之妄夫世祖體乾靈之休德韜亞聖之才聰達而多識樂施而愛人神光前驅威風先逝軍未出於南京莽已斃于西都當此時也九州鼎沸四海淵涌言帝者二三稱王者四五咸鴟視狼顧虎超龍驤光武秉朱光之巨鉞震赫斯之隆怒盪滌凶穢勦除醜類若勁風而縱烈火曬白日而掃朝雲也計功則業殊比隆則事異語德則靡諐言行則無穢卒能立不刊之遐跡建不朽之元功故曰光武其近優也曹植成王論曰周公以天下初定武王既終而成王尚幼未能定南面之事是以推己忠誠稱制假號二弟流言邵公疑之發金縢之匱然以用寤亦未決也至於昭帝所以不疑於霍光亦緣武帝有遺詔於光使光若周公踐天子之位行周公之事吾恐叛者非徒二弟疑者非徒邵公也且賢者固不能知聖賢自其宜耳昭帝固可不疑霍光周王自可疑周公也若以昭帝勝成王霍光當踰周公耶若以堯舜為成王湯禹作管蔡邵公周公之不見疑必也陳群汝潁士論曰群以為孔氏先汝潁士勝負之評矣孔荅曰汝南戴子高親止千乘萬騎與光武帝共揖於道中潁川士雖抗節未有能頡頏天子者也汝南許子伯與友人共說世俗將壞同夜起舉聲號哭潁川士雖頗憂時未有能哭世者也汝南許掾太守劉晨圖開稻陂灌數萬頃累世獲其功韓元長雖好地理未成功見效如許掾者也汝南張元伯身死之後見夢於范巨卿頴川雖有奇異未有鬼神能靈者也汝南應世叔讀書五行並下頴川雖多聰明未有能離婁並誦者也汝南李鴻為太尉掾弟殺人當死鴻自縛詣門乞代弟命使飲鴆而死弟因得全潁川士雖欲尚節義未有能煞身成仁者也汝南翟文仲為東郡太守始舉義兵以誅王莽潁川士雖疾惡未有破家為國者也汝南袁公著為甲科郎中上書欲治梁冀潁川士雖務忠讜未有能沒命直言者也何晏冀州論曰略言春秋以來可與海內比而校也恭謹有禮莫賢乎趙衰仁德忠義莫賢乎趙盾納諫服義莫賢乎韓起決危定國莫賢乎狐偃勇謀經國莫賢乎魏絳達讎為主莫賢乎祁奚延譽先主莫賢乎張老明智識物莫賢乎趙武清直篤義莫賢乎叔向聰明肅恭莫賢乎羊舌職守信不移莫賢乎荀息見利思義莫賢乎中行穆子憂國扞君莫賢乎先軫書法不諱莫賢乎董狐分謗和眾莫賢乎郄克流放能顯莫賢乎冀缺拔幽進滯莫賢乎臼季守義死節莫賢乎欒恭子坑言不屈莫賢乎荀瑩劫略不動莫賢乎解楊審聽知機莫賢乎師曠放而益顯莫賢乎狼曋儒雅博通莫賢乎董仲舒體恭篤敬莫賢乎石奮才兼文武千金不入私門莫賢乎竇嬰明君顯賢莫賢乎田叔證主知分莫賢乎貫高忠義正直莫賢乎鮑子都謇諤忠諫莫賢乎王宏張輔名士優劣論曰世人論司馬遷班固才之優劣多以固為勝余以為失遷敘三千年事五十萬言固敘二百年事, SBCK: ''}
  - {type: variant, offset: 1703, length: 1221, content: 二享國三十年世永治長德與年豐夫孝昭父非武王母非邑姜體不承聖化不胎育保無仁孝之德佐無隆平之治所謂生深宮中長婦人手矣德與體并智與性成孝昭之崩年二十有一承衰獘之世收彫落之民臣無淑聖之智身有短折之期欲高隆周豈不謬哉曹植漢二祖論曰高祖因暴秦而起官由亭長自亡徒招集英雄遂誅強楚光有天下功齊湯武業流後嗣誠帝王之元勳人君之盛事也直寡善人之美稱鮮君子之風采惑秦宮而不出窘項座而不起計失乎酈生忿過乎韓信太公是誥於孝違矣敗古今之大教傷王道之實義然其驍將藎臣皆古今之鮮有而能任其才而用之聽其言而察之故兼天下而有帝位也不然斯不免當世之妄夫世祖體乾靈之休德韜亞聖之才聰達而多識樂施而愛人神光前驅威風先逝軍未出於南京莽已斃于西都當此時也九州鼎沸四海淵涌言帝者二三稱王者四五咸鴟視狼顧虎超龍驤光武秉朱光之巨鉞震赫斯之隆怒盪滌凶穢勦除醜類若勁風而縱烈火曬白日而掃朝雲也計功則業殊比隆則事異語德則靡諐言行則無穢卒能立不刊之遐跡建不朽之元功故曰光武其近優也曹植成王論曰周公以天下初定武王既終而成王尚幼未能定南面之事是以推己忠誠稱制假號二弟流言邵公疑之發金縢之匱然以用寤亦未決也至於昭帝所以不疑於霍光亦緣武帝有遺詔於光使光若周公踐天子之位行周公之事吾恐叛者非徒二弟疑者非徒邵公也且賢者固不能知聖賢自其宜耳昭帝固可不疑霍光周王自可疑周公也若以昭帝勝成王霍光當踰周公耶若以堯舜為成王湯禹作管蔡邵公周公之不見疑必也陳群汝潁士論曰群以為孔氏先汝潁士勝負之評矣孔荅曰汝南戴子高親止千乘萬騎與光武帝共揖於道中潁川士雖抗節未有能頡頏天子者也汝南許子伯與友人共說世俗將壞同夜起舉聲號哭潁川士雖頗憂時未有能哭世者也汝南許掾太守劉晨圖開稻陂灌數萬頃累世獲其功韓元長雖好地理未成功見效如許掾者也汝南張元伯身死之後見夢於范巨卿頴川雖有奇異未有鬼神能靈者也汝南應世叔讀書五行並下頴川雖多聰明未有能離婁並誦者也汝南李鴻為太尉掾弟殺人當死鴻自縛詣門乞代弟命使飲鴆而死弟因得全潁川士雖欲尚節義未有能煞身成仁者也汝南翟文仲為東郡太守始舉義兵以誅王莽潁川士雖疾惡未有破家為國者也汝南袁公著為甲科郎中上書欲治梁冀潁川士雖務忠讜未有能沒命直言者也何晏冀州論曰略言春秋以來可與海內比而校也恭謹有禮莫賢乎趙衰仁德忠義莫賢乎趙盾納諫服義莫賢乎韓起決危定國莫賢乎狐偃勇謀經國莫賢乎魏絳達讎為主莫賢乎祁奚延譽先主莫賢乎張老明智識物莫賢乎趙武清直篤義莫賢乎叔向聰明肅恭莫賢乎羊舌職守信不移莫賢乎荀息見利思義莫賢乎中行穆子憂國扞君莫賢乎先軫書法不諱莫賢乎董狐分謗和眾莫賢乎郄克流放能顯莫賢乎冀缺拔幽進滯莫賢乎臼季守義死節莫賢乎欒恭子坑言不屈莫賢乎荀瑩劫略不動莫賢乎解楊審聽知機莫賢乎師曠放而益顯莫賢乎狼曋儒雅博通莫賢乎董仲舒體恭篤敬莫賢乎石奮才兼文武千金不入私門莫賢乎竇嬰明君顯賢莫賢乎田叔證主知分莫賢乎貫高忠義正直莫賢乎鮑子都謇諤忠諫莫賢乎王宏張輔名士優劣論曰世人論司馬遷班固才之優劣多以固為勝余以為失遷敘三千年事五十萬言固敘二百年事, WYG: ''}
