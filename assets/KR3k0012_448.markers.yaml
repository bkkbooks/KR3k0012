  - {type: variant, offset: 331, length: 0, content: '', SBCK: 由廣武君對曰當今之計不如偃甲休兵百里之内牛酒日至以饗士大夫北首燕路然後發一乘之使持咫尺之書以使燕燕必不敢不聽從燕而東臨齊雖有智者不能爲齊計矣知如此則天下事可圖也兵固有先聲後實者此之謂也信曰敬奉敎於是用廣武君䇿發使燕燕隨風而靡又曰惠帝崩太后發喪而泣不下留侯子張辟彊爲侍中年十五謂丞相陳平曰太后獨有帝今哭而不悲君知其解未陳平曰何解辟疆曰帝無壯子太后畏君等今拜吕台産爲將將兵居南北軍及諸吕皆爲官居中用事如此則太后心安君等幸脫禍矣丞相以辟彊計請之太后恱其哭也迺哀又云藝文志云權謀者以正守國以竒用兵兵先計而後戰范曄後漢書曰􅀽紹旣兼河朔之地有驕氣曹操敗於張繡紹與操書甚倨慢大怒欲先攻之所患力不敵訪於荀彧彧量紹雖強終爲操所制乃􅀃取吕布然後圗紹操從之又曰􅀽紹引沮授爲別駕因謂授曰今賊臣作亂朝廷遷弑吾歴丗受寵志竭力命興復漢室今欲與卿勠力將何匡之授曰將軍弱冠登朝播名海内值廢立之際忠義􅁬發單􅀐出奔董卓懷懼濟河而北渤海稽服擁一郡之卒撮兾州之衆威凌河朔名重天下􅀂舉軍東}
