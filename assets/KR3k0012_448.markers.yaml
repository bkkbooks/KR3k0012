  - {type: variant, offset: 2925, length: 1852, content: 十萬言煩省不敵固之不如一也良史述事善足以獎勸惡足以鑒誡人道之常中流小事無取之因循難易益不同矣又遷為蘇秦張儀范睢蔡澤作傳逞辭流離亦足以明其大才也此真所以為良史也又曰世人見魏武皇帝處有中土莫不謂勝劉玄德也余以玄德為勝夫撥亂之主當先以能收相獲將為本一身之善戰不足恃也世人以玄德為呂布所襲為武帝所走舉軍東下為陸遜所覆未若武帝為徐榮所敗馬被創之危也玄德在荊州劉景升父子不能用其計舉州降魏手下步騎不滿數千為武帝大眾所走未若武帝為呂布奔北騎所擒勒突火之急也玄德為陸遜所覆未若武帝為張繡所困挺身逃遁以喪二子也若令高祖死於彭城世人方之不及項羽遠矣武帝死於宛下將復謂不及張繡矣而其安忍無親若楊德祖之徒多見賊害孔文舉桓文林等以宿恨見殺良將不能任行兵三十餘年無不親征功臣謀士曾無列土之封豈若玄德威而有思勇而有義諸葛孔明張飛關羽皆人傑也服而使之夫明闇不相為用臧否不相為使武帝雖處強不為用矣況在危急之間勢弱之地乎若令玄德據有中州將與周室比隆豈徒三傑而已又曰樂毅諸葛孔明之優劣乎或以毅為弱燕合五國之兵以破強齊雪君王之恥莫不謂毅為優余以為五國之兵共伐一齊不足為強大戰濟西伏尸流血不足為仁夫孔明苞文武之德劉玄德以知人之明屢造其廬諮以濟世至如奇策泉涌智謀縱橫遂東說孫權北抗大魏以乘勝之師翼佐取蜀及玄德終禪登大位在擾攘之際立童蒙之主設官分職班敘眾才文以寧內武以折衝勳業濟而殞觀其遺文謀謨弘遠雅規恢廓已有功則讓於下闕則躬自咎見善則遷納諫則改故烈聲震遐邇者也習鑿齒周魯通諸葛論曰客問曰周瑜魯肅何人也主人曰小人也客曰周瑜奇孫策於總角定大計於一面摧魏武百勝之鋒開孫氏偏王之業威震天下名馳四海魯肅一見孫權建東帝之略子謂之小人何也主人曰此乃真所以為小人也夫君子之道故將竭其忠直佐扶帝室尊主寧時遠崇名教若乃力不能合事與志違躬耕南畝遁跡當年何由盡臣禮於孫氏於漢室已亡之日耶客曰諸葛武侯翼戴玄德與瑜肅何異而子重諸葛毀瑜肅何其偏也主人曰夫論古今者故宜先定其所為之本跡其致用之源諸葛武侯龍蟠江南託好管樂有匡漢之望是有宗本之心也今玄德漢高之正胄也信義著於當年將使漢室士而更立宗廟絕而復繼誰云不可哉袁宏七賢序曰阮公瓌傑之量不移於俗然獲免者豈不以虛中犖節動無近對乎中散遣外之情最為高絕不免世禍將舉體秀異直致自高故傷之者也山公中懷體默易可因任平施不撓在眾樂同遊刃一世不亦可乎新序曰晉獻公用荀息之謀而禽虞不用宮之奇謀而亡故荀息非霸王之佐乃戰國并兼之臣也若宮之奇則可謂忠臣之謀也蔣子萬機論曰太史遷云顏回雖篤行不遇仲尼不能彰其名也故五尺之童德擬大舜使在他門未或及此也夫甘羅少回六歲獲河東五城萬乘郊迎而佩印雖所弘非道義然當秦之時染詐變之風也使羅在孔門治丘之訓亦可聞一知十乎曰未必也昔齊欲伐魯回求說陳常而孔子不許遂使子貢子貢一出破齊強晉士吳霸越存魯也夫顏子與賜程智比才相校於八至於此事而丘不使也抱朴子曰凡薄之徒雖便辟流俗而懷空枹虛有似蜀人瓠壺之喻胸中無一紙之識不過酒炙所謂冒于貨賄貪于飲食左生所載不才之子傅子曰夏侯玄求交於傅嘏嘏不納荀粲謂傅嘏曰夏侯太初一時之俊虛心交子不合則怨至二賢不睦非國之利也嘏荅之曰太初能虛聲而無實才何平叔言遠而情近好辯而無誠鄧玄茂外徇名利內無關鑰此三人者皆敗德也孫子曰譙周勸王降魏何平曰自謂天子而乞降請命何恥之深乎夫為社稷死則死亡則亡先君正魏之篡不與同天過於其父俛首而事讎可謂茍存豈大君之正道哉郭子曰庾道季云蘭相如雖千載死人懔懔恒如有生氣曹蜍李志雖見在厭厭如九泉下又曰世中稱庾文康為豐年玉庾稚恭為荒年穀又曰魏明帝世使后弟毛曾與夏侯太初共坐時人謂蒹葭倚玉樹時目夏侯太初朗如明月入懷又曰人有問王長史王仲祖也江霦群從兄弟者王荅云諸江皆能自生活又曰人問謝太傅王子敬可與先輩誰比謝荅曰阿敬近王劉之間王脩與真長又曰王子敬問謝公嘉賓何如道季嘉賓郄超小名庾和小名道季荅云道季誠杪撮清悟嘉賓故自勝桓公稱云桓溫也鏘鏘有文武又曰王右軍道劉真長樹雲柯而不扶疏又曰桓公問孔思陽安石何如文度孔思未荅反問公謂如何荅曰安石居然不可陵踐又曰簡文云謝安南名奉字弘道清泠如其弟弟名躬字弘遠學義不如孔嚴嚴字彭祖又曰王丞相云雒下論以我比安期千里王丞字安期阮瞻字千里我亦不推此二人唯共椎王太尉夷甫也又曰周伯仁道桓茂倫欽崎歷落可笑之人也或云是謝幼輿言又曰王丞相言刀玄亮之察察刀協字玄亮戴若思之巖巖戴淵字若思卞望之峰岠並一見我而服也又曰祖士少道右軍王家阿菟菟羲之小名吾菟何緣復減處仲右軍道祖士少風領毛骨恐沒世不復見如此人王子猷說世目士少為朗邁我家亦以為徹朗又曰孫子荊應上品狀王武子時為之目曰天才英博亮拔不群, SBCK: ''}
