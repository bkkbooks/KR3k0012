  - {type: punctuation, offset: 609, content: 「, id: KR3k0012_CHANT_448-bkkpn192}
  - {type: variant, offset: 609, length: 478, content: 李膺言出于口人莫得違也有難李君之言者則鄉黨非之李君子與人同輿載則名聞天下又曰或云少府楊阜豈非忠哉荅曰然可謂直士忠臣則吾不知也夫為人臣見人主失道指其非而播楊其惡可謂直士未為忠臣故司空陳群則不然其談論終日未嘗言人主之非書數十上而外不知君子謂陳群於是乎長者姚信士緯曰論清高之士上可如老子莊周下可如君平子貢耳若於陵仲子及嚴遵夏甫子治未可盡以為師矣平議之士若季札趙武逮于林宗皆可盡為則也其洩冶伯宗及末世史雲子將之屬皆美而未善也聖人考功黜陟猶以三載而子將月旦之處史雲睚眥廢人其觀進者或飾虛其怠沮者皆離叛識誠可謂妙矣然非洙泗之風三千之弘化又曰延陵季子際會之間衛尉蔡君限之於弱余必以然季子通妙達道之機假其討光恐增禍亂受光之讓非其本志若季子之為君也欲行王道其與周爭治霸術以力與列國爭強則不肯破強楚而并其封疆也國人疾光而心歸季子季子不立社稷將傾恐光憂迷內灼而異圖外生非常之變將加于高人是以季子相時慮事順以安民而謂其弱未聞厥旨蔡子荅曰諸兄以賢讓國與之冀能楊文武之遺教崇仁義之美化以移風易俗耳何必當與周爭乎而茍守一節退耕於野使還國無討賊之意反云國家有主社禝有祀乃吾君也蓋開篡弒之路, SBCK: ''}
