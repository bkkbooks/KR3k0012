  - {type: variant, offset: 270, length: 0, content: '', SBCK: 聞漢將韓信乗勝去國逺􅋐其鋒不可當臣聞千里餽粮士有飢色撨蘇後㸑師不􅀫飽仐井陘之道車不得方􅁤􅀐不得成列行數百里糧食必在後願足下假臣竒兵三万人從間路絶其輜重足下􅀷溝髙壘勿與戰彼前不得􅋐退不得還吾竒兵絶其後野無所掠不至十日兩}
