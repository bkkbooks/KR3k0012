  - {type: variant, offset: 470, length: 51, content: 為地久矣萬物在其間各自利何世莫之有乎夫使世俗皆能順其有是乃溟涬濛鴻之時為王故莫之能有七十六聖發起其所繫, krp: 中一云}
  - {type: punctuation, offset: 474, content: 。, id: KR3k0012_CHANT_002-bkkpn163}
  - {type: 'tls:seg', offset: 474, content: '', id: KR3k0012_CHANT_002-9a.11}
  - {type: variant, offset: 475, length: 975, content: 物在其間各自利何世莫之有乎夫使世俗皆能順其有是乃溟涬濛鴻之時為王故莫之能有七十六聖發起其所繫天下而有之豈一日哉楊泉物理論曰揚雄非渾天而作蓋天圓其蓋左轉日月星辰隨而東西桓譚難之雄不解此蓋天者復難知也元氣皓大則稱皓天皓天元氣也皓然而已無他物焉揚雄檄靈賦曰自今推古至於元氣始化古不覽今名號迭毀請以詩春秋言之又解嘲曰太玄五千文支葉扶疏獨說十餘萬言深者入地底高者出蒼天大者涵元氣纖者入無倫等也班固東都賦曰萬樂備百禮暨皇情浹群臣醉降烟熅調元氣又漢頌論功歌詩曰后土化育兮四時行脩靈液養兮氣覆冬同雲兮春霡霂膏澤洽兮殖嘉穀張衡玄圖曰玄者包含道德構掩乾坤櫜籥元氣稟受無原陳思王魏德論曰元氣否塞玄黃漬薄星辰逆行陰陽舛錯國無完邑陵無掩槨四海歸沸蕭條沙漠又七啟曰有形必杇有端必窮茫茫元氣誰知其終孫楚石人銘曰大象無形元氣為母杳兮冥兮陶冶眾有陸機雲賦曰攄神景於八幽合洪化於烟熅充宇宙以播象恊元氣而齊勳潘岳西征賦曰古往今來邈矣悠哉寥廓惚恍化一氣而甄三才太易老子曰有物混成先天地生易乾鑿度曰夫有形者生於無形故有太易者未見氣也帝王世紀曰天地未分謂之太易列子曰夫有形者生於無形則天地安從生自然而生故有太易太初太始太素此有物之始自微至著變化自相因襲太易者未見氣也易者不窮滯之稱凝寂於太虛之域將何見乎即如易繫之太極老氏之混成太初者氣之始也陰陽未判下句所謂渾淪太始者形之始也陰陽既判品物流形太素者質之始也質性也既為物矣則方圓剛柔靜躁各有其性氣質具未相離此直論氣之形質不復說太易為三者宗本下句別自明之故曰渾淪渾淪者言萬物相渾淪而未相離雖渾然一氣不相離襲而三才之道實潛兆乎其中淪語助也視之不見聽之不聞循之不得故曰易也易無形畔老子曰視之不見名曰希而曰易易簡之別稱也太易之義如此而已故能為萬物宗性真一而不變也易變而為一所謂易者窈冥忽恍不可變也一氣持之而化變故寄名變也一變而為七七變而為九九變者之究也究窮也一變而為七九不足以次數者全舉陽數顧其都會也乃復變而為一一者形變之始既涉於有形之域理數既終乃復反而為一反而為一歸形變之始也此蓋明變化往復無極太初易乾鑿度曰太初者氣之始也帝王世紀曰元氣始萌謂之太初詩推度災曰陽本為雄陰本為雌物本為魂宋均注曰本即原也變陰陽為雄雌魂也亦言未有形也皆無兆朕故謂之氣雄生八月仲節號曰太初行三節節猶氣也太初者氣之始也必知生八月仲者據此時薺夌生以為驗也陽生物行三節者須雌俱行物乃著也, WYG: 里}
