  - {type: variant, offset: 3694, length: 0, content: '', WYG: 天皇大帝亦曰太一其佐曰五帝東方青帝靈威仰南方赤帝赤熛怒西方白帝白招拒北方黑帝叶光紀中央黄帝含樞紐又天所以有雷霆風雨霜雪霧露何欲以成嵗潤萬物因以見災異也又鄒衍大言天事曰談天衍虞昺穹天論曰天之形穹隆如笠而冐地之表浮元氣之上譬覆奩以抑水而不没者氣充其中也日繞辰極没西而還東不入地中也天文録曰古人言天地之形者有三一曰渾天二曰蓋天三曰宣夜宣夜之說未嘗聞也後有虞昺作穹天論姚信作昕天論虞喜作安天論衆形殊象參差其間蓋天之說又有三體一云天如車蓋遊乎八極之中一云天形如笠中央髙而兩邊下一云天如欹車蓋南髙北下桓譚新論曰通人揚子雲因衆儒之說以天為蓋常左旋日月星辰隨而東西乃圖畵形體行度叅以四時厯數昏明晝夜欲為世人立紀律以垂法後嗣余難之曰春秋晝夜欲等平旦日出於卯正東方暮日入於酉正西方今以天下人占視之此乃人之卯酉非天卯酉天之卯酉當北斗極北斗極天樞樞天軸也猶蓋有保斗矣蓋雖轉而保斗不移天亦轉周匝斗極常在知為天之中也仰視之又在北不正在人上而春秋分時日出入乃在斗南如蓋轉則北道近南道逺彼晝夜數何從等乎子雲無以觧也後與子雲奏事坐白虎殿廊廡下以寒故背日曝背有頃日光去背不復曝焉因以示子雲曰天即蓋轉而日西行其光彩當照此廊下而稍東耳無乃是反應渾天家法焉子雲立壊其所作則儒家以天為左轉非也廣雅曰天圓廣南北二億三萬三千五百里七十五歩東西短减四歩周六億十萬七百里二十五歩從地至天一億一萬六千七百八十六里半下地至厚與天髙等又九天之際曰九垠垠堮也九天之外次曰九垓垓階也言其階次九也纂要曰天地四方曰六合四方上下謂之宇古往今來謂之宙白虎通曰男女總名為人天地所以無總名何天圓地方不相類也天左旋地右周猶君臣隂陽相向也又天所以有灾變何所以謹告人君覺悟其過欲令悔慎思慮也黄帝素問曰積陽為天故曰清陽河圖挺佐輔曰百世之後地髙天下不風不雨不寒不暑民復食土皆知其母不知其父如此千歲之後而天可倚杵洶洶隆隆曽莫知其始終汲冡紀年書曰懿王元年天再旦於鄭東方朔神異經曰崑崙有銅柱焉其髙入天謂之天柱皇覽冡墓記曰好事者謂黄帝乘龍升雲登朝霞上至列闗倒影天體如車蓋日月懸著何可上哉張衡靈憲}
