  - {type: variant, offset: 562, length: 1, content: 雄, SBCK: 曰春秋晝夜欲等平旦日岀於夘正東方暮日入於酉正西方今以天下之占視之此乃人之夘酉非天夘酉當北斗極北斗極天樞樞天軸也猶蓋有保斗矣蓋雖轉而保斗}
  - {type: variant, offset: 562, length: 1, content: 雄, krp: 曰春秋晝夜欲等平旦日岀於夘正東方暮日入於酉正西方今以天下之占視之此乃人之夘酉非天夘酉當北斗極北斗極天樞樞天軸也猶蓋有保斗矣蓋雖轉而保斗}
  - {type: variant, offset: 564, length: 0, content: '', SBCK: 移天亦轉周匝斗極常在知爲天之中也仰視之又在北不正在人上而春秋分時日出入乃在斗南如蓋轉則北道近南道逺彼晝夜數何從等乎子雲無以}
  - {type: variant, offset: 564, length: 0, content: '', krp: 移天亦轉周匝斗極常在知爲天之中也仰視之又在北不正在人上而春秋分時日出入乃在斗南如蓋轉則北道近南道逺彼晝夜數何從等乎子雲無以}
