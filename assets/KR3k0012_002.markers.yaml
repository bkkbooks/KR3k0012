  - {type: variant, offset: 4292, length: 5, content: 千里從內衡, SBCK: 分之五黃道邪帶其腹出赤道表裏各二十四度故夏至去極六十七度而強冬至去極百一十五度亦強也然則黄道邪截赤道者則秋分之去極也今此春分去極九十度秋分去極九十一度少者就夏歷晷景去極之法}
