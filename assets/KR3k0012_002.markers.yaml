  - {type: variant, offset: 4298, length: 18, content: 至中衡中衡以至外衡名五萬九千五里史記, SBCK: 爲率也王蕃渾天􅀃}
  - {type: variant, offset: 4298, length: 0, content: '', WYG: 為率也王蕃渾天說曰渾天遭周秦之亂師徒斷絶而䘮其文唯渾儀常在候臺是以不廢故其揚㩁可得而言}
  - {type: variant, offset: 4298, length: 18, content: 至中衡中衡以至外衡名五萬九千五里史記, krp: 爲率也王蕃渾天說}
  - {type: variant, offset: 4299, length: 0, content: '', WYG: 於纎㣲委曲闕而不傳蔡邕以為精㣲深妙百世不易之道揚子法言曰或問渾天曰洛下閎營之鮮于妄人度之耿}
  - {type: variant, offset: 4300, length: 1, content: 衡, WYG: 丞象之請問蓋天曰蓋哉蓋哉未幾也李軌注曰幾近也桓子新論曰揚子雲好天文問之於黄門作渾天老工曰我少能作其事但隨尺寸法度殊不曉達其意我稍稍益愈到今七十乃甫適知己又老且死矣今我兒子受學作之亦當復年如我乃曉知己又且復死焉其言可悲可笑也顔延之上立渾天銅儀表曰臣昔奉使入闗值大軍旋師渾儀在路肆觀竒秘絶代異寳刻漏周禮夏官挈壺氏掌挈壺以令軍井謂軍穿井成挈壺懸其上令軍}
