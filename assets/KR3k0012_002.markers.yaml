  - {type: variant, offset: 3812, length: 0, content: '', WYG: 水也成天地者氣也水土之氣升而為天天者君也夫天有形而天無體譬如火焉烟在上灰在下也渾天家說謂天如車輪而轉日月旦從上過夜從下過故得出卯入酉或以斗極難之故作蓋天言天左轉日月右行皆縁邊為道就渾天之説則斗極不正若用蓋天則日月出入不定夫天}
  - {type: variant, offset: 3814, length: 0, content: '', WYG: 也皓然而已無他物焉姚信昕天論曰若使天裹地如卵含鷄地何所倚立而自安固若有四維柱石則天}
