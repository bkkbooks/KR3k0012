  - {type: variant, offset: 4271, length: 0, content: '', SBCK: 平長安􅀗張衡所作渾儀土圭歷代寳器謹遣奉送歸之天府梁書曰陶弘景甞造渾天象髙三尺許地居中央天轉而地不動以機動之悉與天}
  - {type: variant, offset: 4271, length: 0, content: '', WYG: 平長安獲張衡所作渾儀土圭厯代寳噐謹遣奉送歸之天府梁書曰陶𢎞景嘗造渾天象髙三尺許地居中央天轉而地不動以機動之悉與天}
  - {type: variant, offset: 4271, length: 0, content: '', krp: 平長安獲張衡所作渾儀土圭歷代寳器謹遣奉送歸之天府梁書曰陶弘景甞造渾天象髙三尺許地居中央天轉而地不動以機動之悉與天}
  - {type: variant, offset: 4272, length: 0, content: '', SBCK: 㑹又曰虞僧誕㑹稽餘姚人以左氏教授聽者亦數百人該通義例當世莫及先是儒者論天㸦執渾蓋二義論蓋不合渾論渾不合蓋崔靈恩立義以渾蓋爲一焉隨書曰耿詢見其故人髙智寳以􅀇象直太史詢從之受天文筭術詢創意造渾天儀不假人力以水轉之施於闇室中外􅀱天時合如符契唐書曰將軍李守忠奏三殿上所安置渾天儀銅鼎上津流事具􅀨門董卓别傳曰卓冶鑄􅃸望璇機儀益部􅂄舊傳曰漢武帝時落下閎明暁天文於地中轉渾天定時節風土記曰璿衡即今渾儀云古者以玉爲之轉運者爲機持正者爲衡一説言以良玉爲管中有光蓋取明以助逺察張衡渾天儀曰赤道撗帶天之腹}
