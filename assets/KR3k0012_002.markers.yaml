  - {type: 'tls:seg', offset: 4264, content: '', id: KR3k0012_CHANT_002-75a.3}
  - {type: variant, offset: 4264, length: 0, content: '', SBCK: 后偷任威折其玉斗失其金椎后君也偷獨苟自專也玉斗北斗以玉爲之偷渾儀也金椎以喻國之重寳也劉氏曆正問曰說云顓頊造渾儀黃帝爲蓋天皆以天象蓋也渾天儀曰天如雞子地如中黄居其天内天大地小表裏有水天地各乗氣而立載水而浮日月星辰繞地下故二十八􅀫半見隱天轉如車轂之運王蕃渾天說曰渾天之作由來尚矣考之於天信而有徴舊說天地之體􅃺似鳥卵天苞地外猶殻之褁黄也周廻如彈丸故曰渾天言其形體渾渾如也}
  - {type: page-break, offset: 4264, content: '', id: KR3k0012_SBCK_002-9a}
  - {type: variant, offset: 4264, length: 0, content: '', WYG: 后偷任威折其玉斗失其金椎劉氏厯正問曰説云顓頊造渾儀黄帝為蓋天皆以天象蓋也渾天儀曰天如鷄子地為中黄居於天内天大地小表裏有水天地各乗氣而立載水而浮日月星辰繞地下故二十八宿半見半隠天轉如車轂之運王蕃渾天説曰渾天之作由來尚矣考之於天信而有徴舊説天地之體狀如鷄卵天包地外猶殻之裹黄圓如彈丸故曰渾天渾天言其形體渾渾如也}
  - {type: page-break, offset: 4264, content: '', id: KR3k0012_WYG_002-14b, image: WYG0893/WYG0893-0051d.png}
  - {type: variant, offset: 4264, length: 0, content: '', krp: 后偷任威折其玉斗失其金椎后君也偷獨苟自專也玉斗北斗以玉爲之偷渾儀也金椎以喻國之重寳也劉氏曆正問曰說云顓頊造渾儀黃帝爲蓋天皆以天象蓋也渾天儀曰天如雞子地如中黄居其天内天大地小表裏有水天地各乗氣而立載水而浮日月星辰繞地下故二十八宿半見隱天轉如車轂之運王蕃渾天說曰渾天之作由來尚矣考之於天信而有徴舊說天地之體狀似鳥卵天苞地外猶殻之褁黄也周廻如彈丸故曰渾天言其形體渾渾如也}
  - {type: punctuation, offset: 4265, content: 「, id: KR3k0012_CHANT_002-bkkpn1461}
  - {type: variant, offset: 4266, length: 0, content: '', SBCK: 三百六十五度五百八十九分度之百四十五東西南北展轉周䂓半覆地上半在地下故二十八舎半見半隱以儀准之其見常八十二度有奇是以知其半覆地上半在地下也黄赤二道見與交錯一間相去二十}
  - {type: variant, offset: 4266, length: 0, content: '', WYG: 三百六十五度五百八十九分度之百四十五東西南北展轉周規半覆地上半在地下故二十八宿半見半隠以儀准之其見常一百八十三度有竒是以知其半覆地上半在地下也黄赤二道相與交錯其間相去二十四度以儀准之俱三百六十五度有竒赤道見者常百八十二度半强又南北考之天見者亦一百八十二度半强是知天之體圓如彈丸北極出地三十六度是知南極入地亦三十六度兩極相去百八十二度半强也虞喜安天論曰太史令陳季胄以先賢制木為儀名曰渾天又言天體者三家渾蓋之術具存而宣夜之法絶滅有意續之而未遑也近見姚元道造昕天論又覩族祖河間相立穹天論鄙意多嫌喜以為天髙無窮地深不測地居卑静之體則天有常安之象形相覆冐無方圓之義渾蓋之家依易立説云天運無窮或謂渾然包地或謂渾然而蓋愚謂若必天裹地似卵含黄則地是天中一物聖人何别為名而配天乎古之遺語日月行於飛谷謂在地中也不聞列星復流於地又飛谷一道何以容此且谷有水日體為火精氷炭不共噐得無傷日之明乎此蓋天所以為臣難也或難曰周禮有方圓之丘祭天地則知乾坤有方圓體也答曰郊祭大報天而主日配以日月日月體圓圜丘似之非天體也祭方丘者别之於天尊卑異位何足怪哉周髀之術多是蓋天蓋天雖與渾異而星辰有常數今陳氏見髀上觀周因言周渾周髀宣夜或人姓名猶星家有甘石也蓋天之體轉四方體卑不動天周其上故云周髀宣明也夜幽數其術兼之故云宣夜賀道養渾天記曰昔記天體者有三渾儀莫知其始書以齊}
