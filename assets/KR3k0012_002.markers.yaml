  - {type: variant, offset: 228, length: 0, content: '', WYG: 與神農爭怒觸不周之山折天柱絶地維故天傾西北日月星辰就焉地不滿東南故百川水潦歸焉抱朴子曰宣夜之書亡而郄萌記先師相傳宣夜說云天了無質仰而視之髙逺無極眼瞀睛極蒼蒼然也譬旁望逺}
