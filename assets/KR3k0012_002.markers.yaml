  - {type: variant, offset: 441, length: 0, content: '', krp: 其行甚疾無以爲驗儻與陶鈞之運弩矢之流相類似乎又曰天平與地無異若覆盆之狀洛書甄耀度曰周天三百六十五度四分度之一夫一度爲千九百三十二里則天地相去十七萬八千五百里關令内傳曰天地南午北子相去九千萬里東卯西酉亦九千萬里四隅空相去九千萬里天去地四十千萬里又曰天有五億五萬五千五百五十里地亦如之各以四海爲脉伏侯古今注曰成帝建始三年七月夜有黄白氣長十餘丈明照地或曰天裂或曰天劒五經通義曰神之大者昊天}
  - {type: variant, offset: 442, length: 0, content: '', krp: 帝即耀魄寳也又曰天皇大帝亦曰太一又曰其佐曰五帝東方青帝靈威仰南方赤帝赤熛怒西方白帝白招拒北方黑帝汁光紀中央黃帝含樞紐又曰天所以}
  - {type: variant, offset: 443, length: 10, content: 金臺玉闕亦元氣之所合, WYG: 三皇數起於一立於三成於五盛於七處於九故}
  - {type: variant, offset: 443, length: 5, content: 金臺玉闕亦, krp: 雷霆風雨霜雪霧露何欲以成歲潤萬物因以見災異也鄒衍大言天事號談天衍虞昺穹天論曰天形穹隆如笠而冒地之表浮}
