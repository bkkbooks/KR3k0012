  - {type: variant, offset: 133, length: 290, content: 漢書律曆志曰黃鍾黃者中之色故陽氣施於下泉孳萌萬物為六氣元也故以黃色名元氣焉又曰太極運三辰五星於上元氣轉三統五行於下家語曰夫禮必本之太一太一分為天地轉為陰陽變為四時列為鬼神太一謂元氣也淮南子曰道始生虛霩生宇宙宇宙生元氣有涯垠清陽者薄音博劘音摩而為天又曰古未有天地之時唯象無形幽幽冥冥茫茫昩昩幕幕閔閔鴻濛澒洞莫知其門有二神混沌生高誘注曰二神經天營地之神經地營天孔深也乎莫知其終滔乎莫知其所止息於是乃別為陰陽離為八極剛柔相成萬物乃形遁甲開山圖曰有巨靈者遍得元神之道故與元氣一時生混沌又曰南溟之山金堂玉室上無元氣寔滋神化又曰麗山氏分布元氣各生次序產生山谷帝系譜曰天地初起溟涬濛鴻即生天皇始, krp: ''}
