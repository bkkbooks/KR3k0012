  - {type: variant, offset: 15, length: 91, content: 時混沌狀如雞子溟涬始牙濛莫孔切鴻胡孔切滋萌歲在攝提元氣肇始又曰清輕者上為天濁重者下為地冲和氣者為人故天地含精萬物化生河圖曰元氣闓音開陽為天又曰元氣無形洶洶蒙蒙偃者為地伏者為天也禮統曰, WYG: 表不有大}
