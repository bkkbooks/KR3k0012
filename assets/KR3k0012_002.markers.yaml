  - {type: 'tls:seg', offset: 427, content: '', id: KR3k0012_CHANT_002-8a.11}
  - {type: variant, offset: 427, length: 15, content: 以木德王十洲記曰崑陵崑崙山也上, WYG: 天數極髙地數極深盤古極長後乃}
  - {type: variant, offset: 427, length: 0, content: '', krp: 天地開闢陽清爲天隂濁爲地盤古在其中一曰九變神於天聖於地天日髙一丈地日厚一丈盤古日長一丈如此萬八千歲天數極髙地數極深盤古極長後乃有三皇數起於一立於三成於五盛於七處於九故天去地九萬里廣雅曰太𥘉氣之始也清濁未分太始形之始也清者爲精濁者爲形太素質之始也巳有素朴而未散也三氣相接剖判分離清濁爲天地又曰天圎廣南北二億三萬三千五百里七十五歩東西短減四歩周六億十萬七百里二十五歩從地至天一億一萬六千七百八十一里半下地至厚與天髙等又曰南方曰炎天西南方曰朱天西方曰成天西北方曰幽天北方曰玄天東北方曰變天東南方曰陽天中央曰鈞天東方曰上天謂之九天九天之際曰九垠垠堮也九天之外曰次九垓垓階也言其階次九也纂要曰天地四方曰六合四方上下謂之宇古徃今來謂之宙白虎通曰男女惣名爲人天地所}
  - {type: variant, offset: 428, length: 2, content: 木德, krp: 無惣名何天圎地方不相類也天左旋地右周猶君臣隂陽相向也又曰天所以有災變何所以謹告人君覺悟其過欲令悔愼思慮也黃帝素問曰積陽爲天故曰清陽河圖挺佐輔曰百丗之後地髙天下不風不雨不寒不暑民復食土皆知其母不知其父如此千歲之後而天可倚杵洶洶隆隆曽莫知其始終汲冢紀年書曰懿}
