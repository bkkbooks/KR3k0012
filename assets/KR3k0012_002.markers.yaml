  - {type: variant, offset: 20, length: 294, content: 雞子溟涬始牙濛莫孔切鴻胡孔切滋萌歲在攝提元氣肇始又曰清輕者上為天濁重者下為地冲和氣者為人故天地含精萬物化生河圖曰元氣闓音開陽為天又曰元氣無形洶洶蒙蒙偃者為地伏者為天也禮統曰天地者元氣之所生萬物之所自焉孝經左契曰元氣混沌孝在其中漢書律曆志曰黃鍾黃者中之色故陽氣施於下泉孳萌萬物為六氣元也故以黃色名元氣焉又曰太極運三辰五星於上元氣轉三統五行於下家語曰夫禮必本之太一太一分為天地轉為陰陽變為四時列為鬼神太一謂元氣也淮南子曰道始生虛霩生宇宙宇宙生元氣有涯垠清陽者薄音博劘音摩而為天又曰古未有天地之時唯象無形幽幽冥冥茫茫昩昩幕幕閔閔鴻濛澒洞莫知其門有二神混沌生高誘注曰二神經天營地之神經地營天孔深也, SBCK: 車蓋遊}
