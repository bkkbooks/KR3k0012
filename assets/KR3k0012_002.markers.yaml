  - {type: variant, offset: 565, length: 0, content: '', SBCK: 也後與子雲奏事坐白虎殿廊廡下以寒故背日曝背有頃日光去背不復曝焉因以示子雲曰天即蓋轉而日西行其光影當照}
  - {type: variant, offset: 565, length: 0, content: '', krp: 也後與子雲奏事坐白虎殿廊廡下以寒故背日曝背有頃日光去背不復曝焉因以示子雲曰天即蓋轉而日西行其光影當照}
  - {type: variant, offset: 566, length: 0, content: '', SBCK: 廊下而稍東耳無乃是反應渾天家法焉子雲立壞其所作則儒家以天爲左轉是也楊泉物理論曰天者旋也均也積陽純剛其體迴旋羣生之所大仰又曰儒家立渾天以追天形從車輪焉周髀立}
  - {type: page-break, offset: 566, content: '', id: KR3k0012_SBCK_002-7b}
