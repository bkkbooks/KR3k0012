  - {type: variant, offset: 3, length: 1, content: 元, krp: 以清天無以清將恐裂又曰域中有四大道大天大地大王亦大莊子曰天之蒼蒼其正色耶以其逺而至極也文子曰朴至大者無形狀道至大者無度量故天圎不中䂓地方不中矩又曰天明日明然後能照四方君明臣明然後能正萬物域中四明故能乆又曰髙莫髙於天下莫下於澤天髙澤下聖人法之又曰天愛其精地愛其平人愛其情天之精日月星辰雷霆風雨也地之平水火金木土也人之情思慮聦明喜怒也列子曰𣏌國有人憂天崩墜身亡所寄廢於寢食又有憂彼憂者因曉之曰天積}
