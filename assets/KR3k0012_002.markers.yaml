  - {type: variant, offset: 435, length: 5, content: 崑陵崑崙山, krp: 好道者言黃帝乗龍升雲登朝霞上至列闕倒影天體如車有蓋日月懸著何有可上哉張衡靈憲曰天有九位自地至天一億萬六千二百五十里懸天之晷薄地之儀皆千里而差一寸孫氏瑞應圖曰舜時后稷播植天降秬秠故詩曰天降嘉種惟秬惟秠秬音巨秠音丕論衡曰天門在西北又日月五星隨天而西移行遲天耳譬若磑石之上行蟻蟻行遲磑轉疾内雖異行外猶俱轉又曰天行六十五度凡積十三萬里}
