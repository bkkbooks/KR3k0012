  - {type: variant, offset: 1463, length: 274, content: 莊子曰太初有無言太古之初上下未形所有者無無有無名既無有形人無有名一之所起有一而未形一謂道也物得以生謂之德淮南子曰稽古太初人生於無當太初天地之始人生於無形無形生有形也成形於有有形而制於物為物所制揚雄檄靈賦曰太易之始太初之先馮馮沉沉奮搏無端王阜老子聖母碑曰老子者道也乃生於無形之先起於太初之前行於太素之元浮遊六虛出入幽冥觀混合之未別窺清濁之未分陳思王魏德論曰在昔太初玄黃混并渾沌濛鴻兆朕未形阮籍孔子誄曰養徒三千外堂七十潛神演思因史作書考混元於無形本造化於太初又大人先生傳曰太初真人惟太之根專氣一志萬物以存又曰馳騖乎太初之中休息乎無為之宮太初何始無後無先, WYG: ''}
