  - {type: variant, offset: 10, length: 0, content: '', SBCK: 天地渾沌如雞子盤古生其中萬八千􅀊天地開闢陽清爲天隂濁爲地盤古在其中一曰九變神於天聖於地天日髙一丈地日厚一丈盤古日長一丈如此萬八千􅀊天數極髙地數極􅀷盤古極長後乃有三皇數起於一立於三成於五盛於七處於九故天去地九萬里廣雅曰太􅀄氣之始也清濁}
  - {type: variant, offset: 10, length: 0, content: '', WYG: 天果積氣日月星辰不當墜耶曉者云日月星辰亦積氣之光耀者長廬子聞而笑曰虹霓也雲霧也風雨也四時也此積氣之成乎天者也知積氣也何以不壊夫天地空中之細物有中之最巨也難窮終始此固然矣憂其壊者誠為大逺言不壊者亦為}
