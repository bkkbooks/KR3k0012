  - {type: variant, offset: 3861, length: 397, content: 其星角亢東方皋天呂氏春秋曰蒼天廣雅曰上天其星房心東北變天其星斗箕北方玄天其星須女西北幽天其星奎婁西方成天呂氏春秋曰皓天其星胃昴西南朱天其星參狼南方赤天呂氏春秋廣雅皆曰炎天其星輿鬼柳東南陽天其星張翼軫呂氏春秋曰天有九野東方曰蒼天西方曰皓天南方曰炎天其餘悉同周書曰神農之時天雨粟神農耕而種之尚書中候曰天地開闢甲子冬至日月若懸壁五星若編珠詩記曆樞曰箕為天口主出氣大戴禮曰放勛其仁如天其智如神就之如日望之如雲春秋感精符曰人主與日月同明四時合信故父天母地兄日姊月父天於圜丘之禮也母地於方澤之祭也兄日於東郊姊月於西郊也春秋繁露曰天有十端天為一端地為一端陽為一端陰為一端水為一端土為一端人為一端金為一端木為一端火為一端凡十端天亦有喜怒之氣哀樂之心與人相副以類合之天人一也春喜氣故生秋怒氣故殺夏樂氣故養冬哀氣故藏四者天人同有之春秋內事曰天有十二分次日月之所躔也春秋元命包曰天不足西北陽極於九故周天九九八十一萬里, SBCK: 文唐堯即位羲和立渾儀}
