  - {type: variant, offset: 3029, length: 822, content: 道曰陰與陽又曰天行健君子以自強不息又曰本乎天者親上本乎地者親下又曰天地之道貞觀者也又曰天道虧盈而益謙又曰天地設位而易行乎其中又曰乾為天又曰時乘六龍以御天又曰天尊地卑異乾坤定矣又曰在天成象在地成形又曰大哉乾元萬物資始乃統天書曰高明柔克沉潛剛克高明謂天也又曰乃命羲和欽若昊天又曰皇天無親惟德是輔又曰皇天震怒命我文考肅將天威詩曰敬天之威不敢馳驅又曰天步艱難之子不猶又曰悠悠蒼天此何人哉又曰謂天蓋高不敢不跼謂地蓋厚不敢不蹐跼典也蹐累足也箋云跼蹐者天高而有雷電地厚而有淪陷此民疾若王政上下皆可畏怖之言禮曰天地之道愽也厚也高也明也悠也久也今夫天斯昭昭之多及其無窮也日月星辰繫焉萬物覆焉又曰天則不言而信天無私覆是天道也無為而物成又曰天秉陽垂日星秉待也又曰天不愛其道故天降甘露又曰天有四時春夏秋冬風雨霜露無非教也又曰著不息者天也聖人作樂以應天又曰燔柴於泰壇以祭天也又曰孟冬之月天氣上騰地氣下降又曰祭天於南郊就陽之義也祭天掃地而祭於其質而已矣又曰清明象天傳曰天有六氣降生五味六氣者陰陽風雨晦明又曰叔孫穆子夢天壓己弗勝又曰公孫歸父會楚子於宋宋人告急於晉晉侯欲殺之伯宗曰不可天方授楚未可與爭雖晉之強能違天乎又曰晉侯賜畢萬魏卜偃曰畢萬之後必大萬盈數也魏大名也以是始賞天啟之矣爾雅曰穹蒼天也天形穹隆其色蒼蒼因以名云春為蒼天萬物蒼蒼生也夏為昊天言氣皓旰秋為旻天旻猶愍悠也愍萬物凋落也冬為上天言時無事在上臨下而已語曰天何言哉四時行焉百物生焉又曰惟天為大惟堯則之又曰夫子之不可及也猶天之不可階而升也易乾鑿度曰天動而施曰仁地靜而理曰義又曰輕清者上為天重濁者下為地又曰天有陰陽地有柔剛人有仁義是謂三才京房易傳曰地動陰有餘天裂陽不足此臣下盛強害君上之變也景帝三年天東北有赤氣廣長十餘丈或曰天裂其後七國兵起春秋說題辭曰天之為言顛也居高理下為人經也白虎通亦云群陽精也合為太一分為殊名故立字一大為天禮統曰天地者元氣之所生萬物之祖也天之為言鎮也神也珍也施生為本運轉精神功効加列陳其道可珍重也, SBCK: 器}
