  - {type: variant, offset: 3824, length: 0, content: '', WYG: 間矣今地形立於下天象運乎上譬如人頥前侈臨胷而項不覆背近取諸身故知天體南低入地北則髙也冬至極低天運近南故日去人逺斗去人近北天氣至故氷寒也夏至極起天運近北故斗去人逺日去人近南天氣至故蒸熱也極之髙時日所行地中淺故夜短天去地髙故晝長極之低時日所行地中深故夜長天去地下故晝短然則天行寒依於渾夏依於蓋也楚辭天問曰圜則九重孰營度之言天圓九重誰度短之惟兹何功孰初作之言此天九重誰功始之筦維焉繋天極焉加筦轉也維綱也言天日夜轉徙寧有綱維其際極安所加乎八柱何當東南何虧言天有八山}
