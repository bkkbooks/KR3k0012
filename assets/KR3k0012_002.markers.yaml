  - {type: variant, offset: 4269, length: 0, content: '', SBCK: 十五度有赤道見者常百八十二度半強又南北考之天見者亦一百八十二度半強是知天之體圎如彈丸北出地三十六度是知南極入地亦三十六度而兩相去百八十二度半強也虞喜安天論曰太史令陳季胄以先賢制木爲儀名曰渾天又曰言天體者三家渾蓋之術具存而宣夜之法絶滅有意續之而未遑也近見姚元道造昕天論又覩族祖河間立穹天摸鄙意多嫌喜以爲天髙無窮地􅀷不測地居卑静之體則天有常安之象形相覆冒無方圎之義渾蓋之家依易立說云天運無窮或謂渾然苞地或謂渾然而蓋愚謂若必天褁地似􅆑中黃則地是天中一物聖人何别爲名而配天乎古之遺語日月行於飛谷謂在地中也不聞列星復流於地又飛谷一道何以容此且谷有水體日爲火精冰炭不共器得無傷日之明乎此蓋天所以爲臣難也或難曰周禮有方圎之丘􅀕天地則知乾坤有方圎體也荅曰郊􅀕大報天而主日配日月形圎圎丘似之非天體也􅀕方者别之於天尊卑異位何足恠哉周髀之術多是蓋天蓋天雖與渾異而星辰有常數今陳氏見髀上觀周因言周渾周髀宣夜或人姓名猶星家有甘石也蓋天之體轉四方地卑不動天周其上故云周髀宣明也夜幽之數其術兼之故云宣夜賀道養渾天記曰昔記天體者有三渾儀莫知其始書以齊七政蓋渾體也二曰宣夜夏殷之法也三曰周髀當周髀之所造非周家術也近世復有四術一曰方天興於王充二曰軒天起於姚信三曰穹天由於虞喜皆以抑斷浮說不足觀也唯渾天之事徵驗不疑􅀳陽秋曰吴有􅁑衜字思眞改作渾天使地居中以機轉之天轉而地止衜古道字義熈起居注曰十四年相國表曰}
