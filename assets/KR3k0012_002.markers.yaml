  - {type: variant, offset: 11, length: 0, content: '', SBCK: 分太始形之始也清者爲精濁者爲形太素質之始也巳}
  - {type: variant, offset: 11, length: 0, content: '', WYG: 是天地不得不壊則㑹歸於壊遇其壊時奚為不憂哉子列子聞而笑曰言天地壊亦謬矣言不壊亦謬矣壊與不壊吾所不知也雖然彼一也此一也故生不知死死不知生來不知去去不知來壊與不壊吾何容心哉又湯問夏革曰四海之外奚}
  - {type: variant, offset: 12, length: 0, content: '', SBCK: 素朴而未散也三氣相接剖判分離清濁爲天地又曰天圎廣南北二億三萬三千五百里七十五歩東西短減四歩周六億十萬七百里二十五歩從地至天一億一萬六千七百八十一里半下地至厚與天髙等又曰南方曰炎天西南方曰朱天西方曰成天西北方曰幽天北方曰􅀇天東北方曰變天東南方曰陽天中央曰鈞天東方曰上天謂之九天九天之際曰九垠垠堮也九天之外曰次九垓垓階也言其階次九也纂要曰天地四方曰六合四方上下謂之宇古徃今來謂之宙白虎通曰男女惣名爲人天地所以無惣名何天圎地方不相􅀋也天左旋地右周猶君臣隂陽相向也又曰天所以有災變何所以謹告人君覺悟其過欲令悔愼思慮也黃帝素問曰積陽爲天故曰清陽河圖挺佐輔曰百丗之後地髙天下不風不雨不寒不暑民復食土皆知其母不知其父如此千􅀊之後而天可􅀝杵洶洶隆隆曽莫知其始終汲冢紀年書曰懿王元年天再旦於鄭東方朔神異經曰崑崙有銅柱焉其髙入天謂之天柱皇覽冢墓記曰好道者言黃帝乗龍升雲登朝霞上至列闕倒影天體如車有蓋日月懸著何有可上哉張衡靈憲曰天有九位自地至天一億萬六千二百五十里懸天之晷薄地之儀皆千里而差一寸孫氏瑞應圖曰舜時后稷播植天降秬秠故詩曰天降嘉種惟秬惟秠秬音巨秠音丕論衡曰天門在西北又日月五星隨天而西移行遲天耳譬􅀂磑石之上行蟻蟻行遲磑轉疾内雖異行外猶俱轉又曰天行六十五度凡積十三萬里也其行甚疾無以爲驗儻與陶鈞之運弩矢之流相􅀋似乎又曰天平與地無異􅀂覆盆之􅃺洛書甄耀度曰周天三百六十五度四分度之一夫一度爲千九百三十二里則天地相去十七萬八千五百里􅀜令内傳曰天地南午北子相去九千萬里東卯西酉亦九千萬里四隅空相去九千萬里天去地四十千萬里又曰天有五億五萬五千五百五十里地亦如之各以四海爲脉伏侯古今注曰成帝建始三年七月夜有黄白氣長十餘丈明照地或曰天裂或曰天劒五經通義曰神之大者昊天上帝即耀魄寳也又曰天皇大帝亦曰太一又曰其佐曰五帝東方青帝靈威仰南方赤帝赤熛怒西方白帝白招拒北方黑帝汁光紀中央黃帝含樞紐又曰天所以有雷霆風雨霜雪霧露何欲以成􅀊潤萬物因以見災異也鄒􅄛大言天事號談天􅄛虞昺穹天論曰天形穹隆如笠而冒地之表浮元氣之上譬覆奩以抑水而不没者氣充其中也日遶辰極没西南還東不入地中也天文録曰古人言}
