  - {type: variant, offset: 4267, length: 1, content: 衡, SBCK: 度以兩儀准之俱三百}
  - {type: variant, offset: 4267, length: 2, content: 衡六, WYG: 政蓋渾體也二曰宣夜夏殷之法也三曰周髀當周髀之所造非周家術也近世復有四術一曰方天興於王充二曰昕天起於姚信三曰穹天由於虞喜皆以臆斷浮説不足觀也唯渾天之事徴驗不疑晋陽秋曰呉有葛衜字思真改作渾天使地居中以機轉之天轉而地止衜古道字義熙起居注曰十四年相國表曰}
