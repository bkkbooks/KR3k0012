  - {type: variant, offset: 5, length: 0, content: '', SBCK: 耳􅀂屈伸呼吸終日在天中行止奈何憂崩墜乎其人曰果積氣日月星辰不當墜耶曉者云日月星辰亦積氣之光耀者也長盧子聞而􅀏曰虹蜺也雲霧也風􅀨也四時也此積氣之成乎天者也知積氣也何以不壊夫天地空中之細物有中之最巨也難窮終始此固然矣憂其壞者亦爲逺大言不壞者亦爲未是天地不得不壞之則㑹歸於壞時奚爲不憂哉列子聞而􅀏曰天地壞亦謬矣言不壞亦謬矣壞與不壞吾所不知也雖然彼一也此一也故生不知死死不知生來不知去去不知來壞與不壞吾何容心哉又曰湯問夏革曰四海之外奚有乎曰猶齊州也湯曰汝奚以實之革曰朕東行至營人民猶是也問營之東復猶營也西行之􅃎民人猶是也問􅃎之西復猶􅃎也朕以是知四海四荒四極之外不異是也故大小相含無窮極也含萬物者亦如含天地含天地者亦如含萬物􅍭萬物也故不窮含天地之表故無極朕亦焉知天地之表不有大天地者乎亦吾所不知也天地亦物物有不足故昔者女媧氏選五色之石以􅀘闕斷鼇之足鼇巨􅀛也以立四極其後共工氏與顓頊爭爲帝淮南子曰與神農爭怒觸不周之山折天柱絶地維故天傾西北日月星辰就焉地不滿東南故百川水潦歸焉抱朴子曰宣夜之書亡而郄萌記先師相傳宣夜􅀃云天無質仰而瞻之髙逺無極眼瞀精極蒼蒼然也譬旁望逺道黄山而皆青俯察千仞之谷而􅉳黒夫靑􅁳色黒非有體也日月星象浮生空中行止皆須氣焉故七耀或住或逰逆順伏見無常進退不同由無所根繫故各異也故辰極常居其所北斗不與衆星西没焉七曜皆東行日日行一度月行十三度遲疾任性􅀂綴附天體不得尓也又曰良將剛則法天可望而不可干柔則象淵可觀而不可入淮南子曰四時天之吏日月天之使星辰天之期虹蜺彗星天之忌又曰天有九野九千九百九十里隅去地五萬里楊子法言曰唯天爲聦唯天爲明夫能髙其目而下其耳者匪天也夫又曰或問天曰吾於天歟見無爲之爲矣或曰雕刻衆形者匪天歟曰以其不雕刻也如物刻而雕之焉得力而給諸又曰天可度則覆物淺矣申子曰天道無􅀻是以􅁪正天常正是以清明管子曰天或維之地或載之莫之維天巳墜矣况於人乎曽子曰單居離問曽子曰天圎而地方誠有之乎曽子曰天之所生上首地之所生下首上首之謂圎下首之謂方始識天圎而地方則是四角之不揜也參甞聞之夫子曰天道曰圎地道曰方方曰幽圎曰明明者吐氣是故外景幽者含氣是故内景墨子曰飄風苦雨溱溱而至此天之所以罰百姓不上同於天也孔叢子曰魏王問子順曰寡人聞昔者上天神異后稷而爲之下嘉􅂖周遂以興吕氏春秋曰天道圎地道方聖人所以立天下天圎謂精氣圎通周復無􅄂故曰圎地方謂萬物殊形皆有分職不能相爲故曰方主執圎臣處方方圎不易國乃昌又曰天地車輪輪轉也終則復始極則復反又曰天地大矣生而不子成而不有萬物皆􅀍其澤得其利而莫知其所由始三皇五帝之徳也又曰天有九野何謂九野中央曰鈞天東方曰蒼天尚書考靈耀曰臯天廣雅曰上天東北方曰變天北方曰􅀇天西北方曰幽天西方曰皓天尚書考靈耀曰廣雅皆曰成天西南方曰朱天南方曰炎天尚書考靈曜曰赤天南東方曰陽天太􅀇經曰九天一爲中天二爲羡天三爲順天四爲更天五爲晬天六爲廊天七爲咸天八爲沉天九爲成天又曰天以不見爲􅀇地以不形爲􅀇人以心腹爲􅀇天奥西北鬱化精也地奥黄泉隱營魄也人奥思慮含至精也說苑曰齊景公問子貢曰仲尼賢乎曰賢又問曰奚􅀂曰不知也公恠之子貢曰今謂天髙無少長賢愚皆知􅀂問其髙㡬何皆曰不知仲尼之賢猶天之髙也奚得以知又曰臣事仲尼猶執柸就江海飲莫知淺􅀷也又曰齊桓公問管仲曰王者何貴對曰貴天桓公仰視天管仲曰所謂天者非謂蒼蒼莽莽之天也居人上者以百姓爲天蔡邕天文志曰言天體者有三家一曰周髀二曰宣夜三曰渾天宣夜之學絶無師法周髀術數具存驗天􅃺多所違失故史官不用唯渾天者近得其情今史官所用􅃸臺銅儀則其法也立八尺圜儀之度而具天地之象以正黃道名察發歛以行日月以歩五緯精微􅀷妙百丗不易之道異苑曰陶􅋲夢飛翔沖天天門九重巳入其八餘一門不得進以翼搏天一翅致折驚而墜下左腋腫痛後威果振主欲有闚擬之志每憶折翅之祥抑心而止徐整}
