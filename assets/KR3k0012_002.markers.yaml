  - {type: variant, offset: 12, length: 0, content: '', WYG: 乎曰猶齊州也湯曰汝奚以實之革曰朕東行至營人民猶是也問營之東復猶營也西行之豳人民猶是也問豳之西復猶豳也朕以是知夫四海四荒四極之不異是也故大小相含無窮極也含萬物者亦如含天地含萬物也故不窮含天地也故無極朕亦焉知}
