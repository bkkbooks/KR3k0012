  - {type: variant, offset: 229, length: 0, content: '', WYG: 之黄山而皆青俯察千仞之谷而黝黒夫青非真色黒非有體也日月衆星相浮空中行止皆須氣焉故七曜或住或逝或順或逆伏見無常進退不同由無所根繋故各異也辰極常居其所北斗不與衆星西没焉七曜皆東行日日行一度月行十三度遲疾任性若綴附天體不得不爾也又良將剛則法天可望而不可干柔則象淵可觀而不可入淮南子曰四時天之吏日月天之使星辰天之期虹蜺彗星天之忌又天有九野九千九百九十里四隅去地五萬里揚子法言曰唯天為聰唯天為明夫能髙其目而下其耳者匪天也夫又或問天曰吾於天而見無為之為矣或曰雕刻衆形者匪天歟曰以其不雕刻也如物物刻而雕之焉得力而給諸又天可度則覆物淺矣申子曰天道無私是以恒正天常正是以清明管子曰天或維之地或載之莫之維天已墜矣况於人乎曽子單居問於曽子曰天圓而地方誠有之乎曽子曰天之所生上首地之所生下首上首之謂圓下首之謂方}
