  - {type: variant, offset: 2174, length: 835, content: 為始也夜半子亦天時之始禮稽命微起於太素十一月閼逢之曰歲在攝提格之紀是云作樂制禮蓋作樂則有禮通其文耳張衡靈憲注曰太素之前幽清玄靜寂寞冥默不可為象厥中惟靈如是者永久焉斯謂冥莖蓋乃道根既建由無生有太素始萌萌而未兆并體同色坤屯不分坤屯音渾沌陳思王髑髏說曰昔太素氏不仁勞我以體苦我以生今也幸變而之死是反吾真也又魏德論曰不能貫道義之清英窮混元於太素亦以明矣又魏文帝誄曰皓皓太素兩儀始分沖和產物肇有人倫又大暑賦曰壯皇居之瑰瑋兮步八閎而為宇節四運之常氣兮踰太素之儀矩阮籍通老論曰聖人明於天人之理達於自然之分通於治化之體審於大慎之訓故君臣垂拱太素之撲百姓熙怡保性命之和又詩曰焉得松喬頤神太素逍遙區外登我年祚又老子讚曰陰陽不測變化無倫飄颻太素歸虛反祚陸機孫權誄曰皇聖膺期有命太素承亂下萌清難天步又浮雲賦曰集輕浮之眾采廁五色之藻氣貫元虛於太素薄紫微而竦戾又詩曰太素卜令宅希微啟奧基玄冲慕懿文虛無承先師又詩曰澄神玄漠流樓心太素域弭節欣高視俟我大夢覺顧公直荅陸機曰恢恢太素萬物初基在昔哲人觀眾濟時太極易繫辭曰易有太極是生兩儀兩儀生四象四象生八卦漢書律曆志曰太極元氣函三為一又曰太極中央元氣故為黃鍾又曰元以統始易太極之首也帝王世紀曰質形已具謂之太極樂動聲儀曰神守於心遊於目窮於耳往乎萬里而至疾故不得而不速從胸臆之中而徹太極援引無題人神皆感神明之應音聲相和班固典引曰太極之先兩儀始分烟烟熅熅有沉而奧有浮而清陳思王七啟曰夫太極之初混沌未分萬物純純與道俱運又晝讚敘曰上形太極混元之前却列將來未萌之事阮籍通老論曰道者法自然而為化侯王能守之萬物將自化易謂之太極春秋謂之元老子謂之道陸機雲賦曰覽太極之初化判玄黃於乾坤考天壤之靈變莫稽美乎慶雲傅玄風賦曰嘉太極之開元美天地之定位樂雷風之相薄悅山澤之通氣張華詩曰混沌無形氣奚從生兩儀元一是能分太極焉得離玄為誰翁子道是誰家兒天行自西廻日月曷東馳陸士龍荅士衡詩曰伊我世族太極降精昔在上代軒虞篤生天部釋名曰天顯也在上高顯也天坦也坦然高而遠也易曰天垂象見吉凶聖人則之又曰觀乎, SBCK: 正}
