  - {type: variant, offset: 4375, length: 14, content: 漢惠帝二年天開北廣十餘丈後漢, SBCK: 臣昔奉使入􅀜值大軍旋師渾儀在路肆觀竒祕絶代異寳刻漏􅀃文曰漏以銅盛水刻節晝夜百刻周禮夏官挈壷氏掌挈壷以令軍井謂軍穿井成挈壺懸其上令軍中士衆皆望見知下有井也壺所以盛飲故以壺表井也凡軍事懸壷以序聚􅝵凡䘮懸壷以代哭皆以水火守之分以日夜鄭司農曰懸壺以爲漏也以序聚􅝵以次更聚繫􅝵備守也􅀇謂擊􅝵兩木相㪣行夜時也䘮禮未大歛代哭以水守壺者爲沃漏也以火守壺者夜則視刻數也分以日夜者異晝夜漏也範期日中權立表下漏以待之及中不至權問其故範曰未正中也頃之有風動帷範曰羽至矣斯湏外稱萬􅀊傳言得羽齊}
