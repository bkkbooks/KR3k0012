  - {type: variant, offset: 986, length: 802, content: 易者不窮滯之稱凝寂於太虛之域將何見乎即如易繫之太極老氏之混成太初者氣之始也陰陽未判下句所謂渾淪太始者形之始也陰陽既判品物流形太素者質之始也質性也既為物矣則方圓剛柔靜躁各有其性氣質具未相離此直論氣之形質不復說太易為三者宗本下句別自明之故曰渾淪渾淪者言萬物相渾淪而未相離雖渾然一氣不相離襲而三才之道實潛兆乎其中淪語助也視之不見聽之不聞循之不得故曰易也易無形畔老子曰視之不見名曰希而曰易易簡之別稱也太易之義如此而已故能為萬物宗性真一而不變也易變而為一所謂易者窈冥忽恍不可變也一氣持之而化變故寄名變也一變而為七七變而為九九變者之究也究窮也一變而為七九不足以次數者全舉陽數顧其都會也乃復變而為一一者形變之始既涉於有形之域理數既終乃復反而為一反而為一歸形變之始也此蓋明變化往復無極太初易乾鑿度曰太初者氣之始也帝王世紀曰元氣始萌謂之太初詩推度災曰陽本為雄陰本為雌物本為魂宋均注曰本即原也變陰陽為雄雌魂也亦言未有形也皆無兆朕故謂之氣雄生八月仲節號曰太初行三節節猶氣也太初者氣之始也必知生八月仲者據此時薺夌生以為驗也陽生物行三節者須雌俱行物乃著也廣雅曰太初氣之始也清濁未分莊子曰太初有無言太古之初上下未形所有者無無有無名既無有形人無有名一之所起有一而未形一謂道也物得以生謂之德淮南子曰稽古太初人生於無當太初天地之始人生於無形無形生有形也成形於有有形而制於物為物所制揚雄檄靈賦曰太易之始太初之先馮馮沉沉奮搏無端王阜老子聖母碑曰老子者道也乃生於無形之先起於太初之前行於太素之元浮遊六虛出入幽冥觀混合之未別窺清濁之未分陳思王魏德論曰在昔太初玄黃混并渾沌濛鴻兆朕未形阮籍孔子誄曰養徒三千外堂七十潛神演思因史作書考混元於無形本造化於太初又大人先生傳曰太初真人惟太之根專氣一志萬物以存又曰馳騖乎太初之中休息乎無為之宮太初何始無後無先太始易乾鑿度曰太始者形之始也又曰雌生戍仲號曰太始雄雌俱行三節俱行起自戍仲至亥帝王世紀曰氣形之初謂之太始, SBCK: ''}
