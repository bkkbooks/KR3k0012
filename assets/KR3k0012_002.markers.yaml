  - {type: variant, offset: 1782, length: 332, content: 之初謂之太始楚辭天問曰遂古之初誰傳道之王逸注曰初始也太始之元虛廓無形神物未生誰傳此道上下未形何由考之言天地未分混沌無根誰考述而知也張衡玄圖曰玄者無形之類自然之根作於太始莫之與先阮籍大人先生傳曰登乎太始之前覽乎忽漠之初慮周旋於無外志浩蕩而遂舒太素易乾鑿度曰太素質之始也又曰雄含物魂號曰太素雌雄俱行故能含物魂而生物也獨吉雄雌主於陽故也帝王世紀曰形變有質謂之太素太素之前幽清寂寞不可為象惟虛惟無蓋道之根自道既建猶無生有太素質始萌萌而未兆謂之龐洪蓋道之幹既育萬物成體於是剛柔始分清濁始位天成於外而體陽故圓以動蓋道之實禮斗威儀曰二十九萬一千八百四十歲而反太素冥莖蓋乃道之根也禮含文嘉曰推之以上元為始起十一月甲子朔旦夜半冬至日月五星俱起牽牛之初鄭玄注上元太素已來至所求年廣雅曰, WYG: ''}
