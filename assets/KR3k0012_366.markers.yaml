  - {type: variant, offset: 1071, length: 0, content: '', WYG: 甘卓為楊威将軍歴陽内史郡人陳訓私語人曰甘公頭係視仰目中有赤脉當危於兵勿與将可也果為王敦所害又曰王敦枉害刁協及敦病白日見協乗軺車從吏騶詣敦而仰頭瞋目鄧粲晋紀阮籍能為青白眼禮俗士輙以白眼對之稽喜康之兄聞籍不哭見白眼喜不懌而退蕭子顯齊書曰褚淵有器度不妄舉動宅常失火煙燄甚逼左右驚擾淵神氣怡然索輿來徐去輕薄子頗以名節譏之以淵眼多白睛謂之白虹貫日也崔鴻十六國春秋前秦録曰符生驍果麤暴酗酒無賴祖洪甚惡之生無一目年七嵗洪戱之問侍者曰吾聞瞎兒一淚信乎侍者曰然生怒引佩刀自刺出血曰此亦一淚也洪大驚三國典畧曰齊韓鳯穆提婆髙阿那肱共處衡軸號曰三貴瞋目張拳有噉人勢又曰和士開常言曰瑯琊王目光弈弈數歩射人向者暫對不覺汗出又曰周武帝還自東伐}
  - {type: page-break, offset: 1071, content: '', id: KR3k0012_WYG_366-13a, image: WYG0896/WYG0896-0264c.png}
  - {type: page-break, offset: 1071, content: '', id: KR3k0012_WYG_366-13b, image: WYG0896/WYG0896-0264d.png}
