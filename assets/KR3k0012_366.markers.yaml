  - {type: 'tls:seg', offset: 1072, content: '', id: KR3k0012_CHANT_366-17a.4}
  - {type: variant, offset: 1072, length: 0, content: '', WYG: 遇疾口不能言臉垂覆目老子曰五色令人目盲韓非子曰目見有百歩之外而不能見其背荘子曰温伯雪子適齊舍於魯仲尼見之不言子路問焉仲尼曰若夫人者目擊而道存也又曰孔子見老􅆅而語仁義老􅆅曰夫播糠眯目則天地四方易位矣夫仁義翻然乃憒吾心亂莫大焉孟子曰伯夷目不視惡色又曰存乎人者莫良於眸子眸子不能掩其惡胷中正則眸子瞭焉胷中不正則眸子眊焉范子曰掩目别黒白雖一時中猶不知天道也慎子曰離朱之明察毫末於百歩之外尺水不能見淺深非目不足其勢難覩也尸子曰使目在足下則不可以視又曰舜兩瞳子是謂重明孫卿子曰厭目而視者視一以為兩耳燕丹子曰樊於期聞荆軻之言於是自剄頭墮背後兩目不瞑韓子曰田駟欺鄒君将殺之田駟恐告惠子見鄒君曰有人見君則䁋大叶切閉目也其一目奚如君曰我必殺之惠子曰瞽䁋兩目君奚弗殺駟東欺齊侯南欺荆}
  - {type: page-break, offset: 1072, content: '', id: KR3k0012_WYG_366-14a, image: WYG0896/WYG0896-0265a.png}
  - {type: page-break, offset: 1072, content: '', id: KR3k0012_WYG_366-14b, image: WYG0896/WYG0896-0265b.png}
