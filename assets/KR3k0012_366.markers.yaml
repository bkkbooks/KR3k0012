  - {type: variant, offset: 1095, length: 234, content: 豪爽有風概姿貌甚偉面有七星又曰劉牢之面紫赤色鬢目驚人而沉毅多計又曰劉裕於東府藂樗蒱大擲一判應至數百萬餘人並黑犢唯裕及劉毅在後毅次擲得雉大喜褰衣繞床叫謂同座曰非不能盧不事此耳裕因挼五木久之曰老兄試為卿荅即成盧焉毅意殊不快然素黑其面如鐵色焉宋書曰沈慶之謂帝曰耕當問奴織當問婢今論爭伐問白面書生事何由濟又曰明帝大會新亭接勞諸軍主樗蒲賭官李安人五擲皆盧帝大驚目安人曰卿面方如田封侯狀也又曰劉瑀為右衛將軍因求益州甚不得意至江陵與顏竣書曰朱循之三世叛兵一日居荊州青油幕下作謝宣明面, SBCK: 顯}
