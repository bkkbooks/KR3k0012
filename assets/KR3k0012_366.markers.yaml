  - {type: variant, offset: 336, length: 0, content: '', SBCK: 雄美容貌相工相之曰此君口如方器耳如相望位必過三公不疑也唐書曰汴州節度李忠臣甞因奏對德宗謂之曰卿耳甚大貴人也忠臣對曰臣聞驢耳甚大龍耳即小臣耳雖大乃驢耳也上恱之老子曰五音令人耳聾孟子曰伯夷耳不聽惡聲鶡冠子曰}
