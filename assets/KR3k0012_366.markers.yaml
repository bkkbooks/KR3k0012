  - {type: punctuation, offset: 684, content: 「, id: KR3k0012_CHANT_366-bkkpn232}
  - {type: variant, offset: 684, length: 0, content: '', SBCK: 宋公子地有白馬四公嬖向魋欲之向魋司馬植魋卜也公取而朱其尾鬛以與之與魋之地怒使其徒奪之魋懼將走公閉門而泣之目盡腫又曰公侵齊門于陽州顔息射人中眉退曰我無勇吾志其目也詩曰美目盻􅀆巧􅀏倩􅀆素以爲絢􅀆書曰正月元日舜格于文祖詢于四岳闢四門明四目逹四聦咨十有二牧曰食哉惟時易小畜曰輿􅀃輻夫妻反目象曰夫妻反目不能正室也又􅀃卦曰离爲目春秋孔演圖曰蒼頡四目是謂並明春秋元命苞曰目肝之使又曰舜重瞳子是謂慈原上應攝提下應三元尚書大傳曰舜目四瞳子論語隱義曰衛蒯聵亂子路興師往有孤黯者當師曰子欲入耶曰然黯從城上下麻繩釣子路半城問曰爲師耶爲君耶曰在君爲君在師爲師黯因投之折其左股不死黯開城欲殺之子路目如明星之光曜黯不能前謂曰畏子之目願覆之子路以衣􅃑覆目黯遂殺之史記曰吴王賜子胥屬鏤之劒以死子胥仰天歎曰嗟乎抉吾眼着吴東門上以觀越㓂之入滅吴也又曰趙王與秦王㑹􅃆池秦王不肯擊􅇲相如曰五歩之内請得以頸血濺大王矣左右欲刄相如相如}
  - {type: page-break, offset: 684, content: '', id: KR3k0012_SBCK_366-6a}
  - {type: page-break, offset: 684, content: '', id: KR3k0012_SBCK_366-6b}
