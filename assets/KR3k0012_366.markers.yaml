  - {type: variant, offset: 1891, length: 0, content: '', SBCK: 觀仲尼有聖人之表其狀河目而隆顙是黄帝之形貌也郭子曰劉尹道桓温􅂡如反蝟毛眼如紫石稜自是孫仲謀一流人也抱朴子曰眼能察天衢而不能周項領之間蔣子語曰兩目不相爲視昔吴有二人共評王者一人曰好一人曰醜乆之不决二人各曰尓可來入吾目中則好醜分矣王有定形二人察之有得失非茍相反眼睛異耳􅀽凖正書曰目}
  - {type: variant, offset: 1891, length: 0, content: '', krp: 觀仲尼有聖人之表其狀河目而隆顙是黄帝之形貌也郭子曰劉尹道桓温鬚如反蝟毛眼如紫石稜自是孫仲謀一流人也抱朴子曰眼能察天衢而不能周項領之間蔣子語曰兩目不相爲視昔吴有二人共評王者一人曰好一人曰醜乆之不决二人各曰尓可來入吾目中則好醜分矣王有定形二人察之有得失非茍相反眼睛異耳袁凖正書曰目}
  - {type: variant, offset: 1892, length: 0, content: '', SBCK: 見小爲明耳以聽大爲聦顧子義訓曰假天下之目以視則四海毫末可見也山海經曰一臂國爲人一目中其靣而居括地圖同太公金匱曰一目視則}
