  - {type: variant, offset: 341, length: 3, content: 自臨候, SBCK: 子上曰楚國之舉􅁪在少者且是人也蜂目而豺聲忍人也不可立也又曰秦伯伐晉取羈馬乃出戰交綏古名退軍爲交綏秦晉志未敢堅戰兵未致争而兩軍退故曰交綏秦行人夜戒晉師曰兩軍之士皆未愸也明日請相見愸缺也􅁷駢曰使者目動而言肆懼我也將遁矣薄諸河必敗之又曰宋華元爲植廵功植將主也城者謳曰睅其目皤其腹弃甲而復睅出目皤大腹弃甲謂師也于思于思弃甲復來于思多􅂡之貌又曰潞子嬰兒}
  - {type: variant, offset: 341, length: 3, content: 自臨候, WYG: 子上曰楚國之舉恒在少者且是人也蜂目而豺聲忍人也不可立也又曰秦伯伐晋取覊馬乃出戰交綏古名退軍為交綏秦晋志未敢堅戰兵未致争而兩軍退故曰交秦行人夜戒晋師曰兩軍之事皆未憗也明日請相見㬰駢曰使者目動而言肆懼我也将遁矣薄諸河必敗之又曰宋華元為植廵攻植将主也城者謳曰睅其目皤其腹弃甲而復于思于思弃甲復來睅出目皤大腹弃甲謂師也于思多鬚之貌又曰潞子嬰兒}
