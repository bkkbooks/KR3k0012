  - {type: variant, offset: 335, length: 0, content: '', SBCK: 楊煇報孫㑹宗書曰家本秦也能爲秦聲婦趙女也雅善鼓瑟奴婢歌者數人酒後耳熱仰天拊􅇲而呼烏烏英雄記曰曹公擒吕布布顧謂劉備曰玄徳卿爲座上客我爲降虜繩􅅞我急獨不可一言邪操曰􅅞虎不得不急乃命緩布􅅞備曰不可公不見布事丁建陽董太師乎操領之布目備曰大耳兒最叵信叵普火切魏書曰荀攸年七八歳父衢曽醉誤傷攸耳而攸出入遊戯常避護不欲令衢見衢後聞之乃驚其􅀫智如此吴録曰􅀜羽走孫權使虞翻筮之曰必當斷頭傷其耳果如翻言蜀志曰先主長七尺五寸垂臂下􅂰顧自見其耳晉書曰王導多疾每自憂陳訓曰耳竪必壽亦大貴又曰殷仲堪父患耳聞床下蟻動謂是牛􅃲王隱晉書曰張􅁤爲涼州刺史燉音煌曹祛上言軌老病更請刺史􅁤治中率數十人皆割耳於盤流血訴枉得停蜀書曰武皇帝}
