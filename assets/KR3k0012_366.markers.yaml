  - {type: variant, offset: 2422, length: 1008, content: 相決曰奇毛生身及面皆豪貴白毫黑毛生共孔帶印綬蔡邕女戒曰夫心猶面首也一旦不脩飾則塵垢穢之人心不思善則邪惡入之人盛飾其面而莫脩其心惑矣眉說文曰眉目上毛也釋名曰眉媚也有嫵媚也毛詩淇澳碩人曰螓首蛾眉螓首顙廣而方巧笑倩兮美目盼兮尚書大傳曰堯有眉八如八字也淮南子同大戴禮曰曾子曰敢問不勞可以為明乎孔子愀然揚眉曰參汝以明主為勞乎昔者舜左禹而右皋陶不下席而天下治禮說曰君子乘金而玉為人美眉左傳定公八年曰公侵齊門于陽州顏息射人中眉顏息魯人退曰我無勇吾志其目也穀梁傳曰長狄兄弟三人遞為害斷其首而載之眉見於軾戰國策曰豫讓欲報趙襄子滅鬢去眉吞炭漆春秋後語曰呂不韋謂太后曰詐腐刑嫪毒則得給事中乃令人以腐罪告之拔其鬚眉以為宦者漢書曰張敞為婦畫眉長安中傳京兆眉憮應劭曰憮大也孟康曰憮音詡北方人謂好為詡也東觀漢記曰王莽天鳳五年樊崇起兵於莒恐其眾與莽兵亂乃皆朱其眉由是號曰赤眉又曰明德馬后眉不施黛獨左眉角小缺補之以縹又曰馬援自還京數被進見為人鬒髯眉目如畫又曰梁鴻居吳賃舂每歸妻為具食不敢於鴻前仰視舉案齊眉鄧粲晉記曰荊州民宗廞嘗以酒犯王平子怒叱左右捽廞郭舒厲色謂左右曰使君醉汝輩何敢妄動平子大恚曰別駕狂郎枉言我醉因遣灸舒眉頭舒跪受炙平子意釋而廞得免宋書曰王玄謨在雍人言欲反玄謨馳啟自解帝知其虛馳遣主書吳喜公慰撫之曰七十老公反欲何求聊復為笑想足以伸卿眉頭耳玄謨性嚴未曾妄笑時人言玄謨眉頭未曾伸故以此見戲梁書曰武寧王大威字仁容美風儀眉目如畫三國典略曰梁簡文方頰豐下眉目秀發隋書曰元暉字叔平河南洛陽人也父智鬚眉如畫進止可觀少得美名於京師唐書曰毛若虛絳州太平人也眉毛覆於眼性殘忍初為蜀川縣尉天寶末為武功丞年已六十餘矣帝王世紀曰文王虎眉列仙傳曰陽都女生而連眉眾以為異列仙傳曰莫耶子赤鼻眉間一尺列士傳曰千將子赤鼻眉廣三寸荊州先賢傳曰馬良字季常襄陽宜城人兄弟五人皆有令名良眉中有白毛鄉里頌曰馬氏五常白眉最良吳越春秋曰伍子胥眉間廣一尺韓子曰失鏡無以正鬢眉失道無以知迷惑呂氏春秋曰吳闔閭使民習戰劍如眉流血不可止淮南子曰今盆水在庭清之終日未能見眉睫濁之不過一撓而不能察方圓察見也人神易濁而難清猶盆水之類也風俗通曰桓帝元嘉中京師婦人作愁眉愁眉者細而曲折此梁冀家所謂京師皆效之天戒若曰將收捕冀婦女憂愁之眉也抱朴子曰有古強者自云四千歲云見堯舜禹湯說之了了世云堯眉八采不然也直兩眉頭甚豎似八字眉唐子曰人多患遠見百步而不自知眉頰知眉頰者復不能察百步西京雜記曰卓文君妖冶好眉色如望遠山, SBCK: ''}
