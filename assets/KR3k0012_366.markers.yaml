  - {type: variant, offset: 1933, length: 6, content: 袁紹妻劉性妒, SBCK: 孟賁過於先其伍舡人怒以檝䖊音乂其頭中河孟賁瞋目視舡人髮植目烈􅂡指指直舟人盡惕駭播入於河使舡人知孟賁不敢直視渉無先者又辱之乎此不知故也又曰管子􅅞束於魯鮑叔曰君欲霸王則臣不􅀂管夷吾桓公曰夷吾寡人之賊也射我者也不可鮑叔曰夷吾爲其君射人􅀂得之則彼亦將爲君射人君不聽鮑叔固讓果聽之於是使告魯曰管仲寡人讎也願得而親加手焉魯許諾乃使吏鞟其拳膠其目以革囊其手也盛之以鴟夷置之車中至齊境桓公使人以朝車迎之又曰使其目可以見不學其見不􅀂盲春秋後語曰平原君對趙王曰􅃆池之㑹臣察安君之爲人也小頭而銳瞳子白黒分明小頭而銳断敢行也瞳子白黒分明者見事明也列仙傳曰秦召魏公子無}
