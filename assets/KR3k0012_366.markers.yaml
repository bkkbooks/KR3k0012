  - {type: variant, offset: 337, length: 0, content: '', SBCK: 耳主聽兩豆塞之則上不聞雷霆淮南子曰禹耳三漏是謂大通興利除害决江䟽河抱朴子曰老子耳長七寸又曰耳能聞雷霆而不聞蟻虱之音吕氏春秋曰雷則掩耳電則掩目耳聞所惡不如無聞目見所惡不如無見又曰且天生}
  - {type: page-break, offset: 337, content: '', id: KR3k0012_SBCK_366-3b}
  - {type: variant, offset: 337, length: 0, content: '', WYG: 耳主聼兩頭塞之則上不聞雷霆淮南子曰禹耳三漏是謂大通興利除害决江疏河抱朴子曰老子耳長七寸又曰耳能聞雷霆而不識蟻虱之音吕氏春秋曰雷則掩耳電則掩目耳聞所惡不如無聞目見所惡不如無見又曰且天生}
  - {type: variant, offset: 337, length: 0, content: '', krp: 耳主聽兩豆塞之則上不聞雷霆淮南子曰禹耳三漏是謂大通興利除害决江䟽河抱朴子曰老子耳長七寸又曰耳能聞雷霆而不聞蟻虱之音吕氏春秋曰雷則掩耳電則掩目耳聞所惡不如無聞目見所惡不如無見又曰且天生}
  - {type: variant, offset: 338, length: 2, content: 病篤, SBCK: 而使其耳可以聞不學其聞不􅀂聾使其目可以見不學其見不􅀂盲使其口可以言不學其言曲以爽使其心可以知不學其知暗以狂凢學非爲能益也達天性也􅀃苑曰昔費仲惡來膠革長鼻决耳從紂之心武王誅之􅀶物志曰南方落頭民其頭能飛以耳爲翼瀬郷記曰老子耳有三門王子年拾遺録曰沐胥國人左耳中出青龍右耳中出白虎龍虎􅀄出之時如繩縁頰手捋靣而龍虎皆飛去地十餘丈而雲氣繞龍風來吹虎俄而以手一揮龍虎皆還入耳髙士傳曰堯聘許由爲九州牧由聞之洗耳於河列仙傳曰務光夏時人耳長七寸陽都女耳細而長衆皆言此天人也又曰􅇞先生毛身廣耳阮丘耳長六七寸列士傳曰燕丹師田光往候荆軻值軻醉唾其耳中軻􅁴曰此出口入耳之言必大事也即往見光列女後傳曰劉仲敬妻者沛國桓林之姊也仲敬早亡桓乃引刀割耳宗婦問之桓曰吾自五代以來世知名男以忠孝顯女以貞順稱家以我年少必相嫁故預自裁割以信我心又曰曹文叔妻譙國夏侯寧之女文叔早亡妻斷髪自誓其家欲嫁之又截兩耳司馬太􅀓美之乞爲曹氏後又曰陽華穆妻者下邳劉方之女字桃樹生一男而穆早亡吴丁諿音緝求之諿知名之士家將許焉桃樹乃操刀割耳其子又亡桃樹乃安身守正動不諐禮諐音傜長沙􅂄舊傳曰太尉劉壽少遇相師相師曰耳爲天柱今君耳城郭必典家􅀖樊氏相法曰耳門不容麥歳至百兼冨目釋名曰目黙也謂黙而内識也眼限也童子限限而出也禮曰目者氣之清明者也又玉藻曰目容端不睇視也又曽子曰十目所視十手所指其嚴乎傳曰宋華父督見孔父之妻于路目逆而送之曰美而艷又曰冨辰曰目不別五色之章爲昧又曰子玉使􅃲勃請戰曰請與君之士戯君慿軾而觀之得臣與寓目焉又曰楚子將以啇臣爲太子訪諸令尹子}
