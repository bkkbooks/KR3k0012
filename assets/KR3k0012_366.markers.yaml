  - {type: variant, offset: 685, length: 3, content: 禹為兒, SBCK: 目叱之左右皆靡秦王不懌爲一擊􅇲又曰越王無殭與中國争強北伐齊齊威王使人􅀃越王越王不納齊使者曰幸也越之不亡也吾不貴其用智如目之見毫毛而不自見睫也今王知晉之失計不知越之過是目論也又曰大梁人尉繚曰秦王爲人蜂凖蜂一作隆長目又曰漢王詣鴻門謝項羽羽欲殺漢王樊噲帶劒擁㦸楯入軍門披帷西向而立瞋目視羽􅁂髮上指目眥盡裂又曰項王大呼馳下漢軍皆披靡時赤泉侯爲􅀐將追項王項王瞋目而叱之人馬俱驚辟易}
