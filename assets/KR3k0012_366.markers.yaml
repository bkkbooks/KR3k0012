  - {type: variant, offset: 1110, length: 0, content: '', WYG: 楚荘王子曰王之伐越何也王曰政亂兵弱荘子曰臣患知之如目也能見百歩之外而不能自見其睫王之弱亂非越王之下也而欲伐此知之如目也淮南子曰夫目察秋毫之末而耳不聞雷霆之音耳調玉石之聲而目不見泰山之髙何則不小有所志而大有所忘也孔叢子曰夫子適周見萇宏言終而退萇宏語}
