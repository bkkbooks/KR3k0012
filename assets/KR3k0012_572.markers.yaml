  - {type: variant, offset: 488, length: 2, content: 䳒作, SBCK: 西觀清水揚波兮杳􅁳禱求福兮醉不醒誅將加兮妾心驚蛟龍助兮主將歸呼來掉兮行勿疑簡子大恱立爲夫人文士傳曰太祖雅聞阮瑀辟之不應連見逼乃逃入山中使人焚山得瑀送至召入太祖時征長安大延賔客怒瑀不與言使就􅇊入列瑀善解音能鼓琴撫絃而歌曰弈弈天門開大魏應期運青盖廵九州在東西人怨士爲知已死女爲恱者玩恩義苟潜暢他人焉能亂爲曲旣捷音声殊妙太祖大恱淮南子曰歌採菱發陽阿鄙人聽之不􅀂延露陵陽非歌拙也聽各異也又曰寗戚欲干齊桓公困窮無以自逹爲啇旅將任車任}
