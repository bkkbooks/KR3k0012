  - {type: variant, offset: 484, length: 3, content: 兩飛烏, SBCK: 晨登太霞宫挹此玉水蘭夕入玄圃闕採蘂掇琅玕濯足瓠􅀲河織女立津盤􅄍納抱景雲味之當一飡朝發漫汗府暮􅀫鈎陳垣莫與丗人􅀃行尸言此難列女傳曰趙簡子南擊楚津吏醉卧不能渡召欲殺之津吏女姢持檝而前曰昔父聞君東渡不測之水恐風波之起故禱九江三淮之神不勝巫祝杯酒飲沉醉至於此矣妾願鄙􅥟易父之死簡子將渡用檝少一人姢願備貟用檝遂與渡中流奏河激之歌歌曰昇彼河}
