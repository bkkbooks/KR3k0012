  - {type: variant, offset: 484, length: 3, content: 兩飛烏, WYG: 晨登太霞宫浥此玉蘭水夕入𤣥圃國採蘂移琅玕濯足匏𤓰河織女並津盤又曰吐納抱景雲味之當一飡朝發汗漫府暮宿勾陳垣莫與世人説行尸言此難列女傳曰趙簡子南擊楚津吏醉臥不能渡召欲殺之津吏女娟持檝而前曰昔父聞君東渡不測之水恐風波之起故禱江淮之神不勝巫祝杯酒飲沉醉至於此矣妾願躬易父之死簡子将渡用檝少一人娟願備員遂與渡中流奏阿激之歌歌曰昇彼阿}
