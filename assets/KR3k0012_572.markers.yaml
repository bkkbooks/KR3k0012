  - {type: variant, offset: 1486, length: 196, content: 而遇丈王孰與許由之賢夫子曰許由獨善身者也太公兼天下者也然今世無文王之君雖有太公孰識之哉乃歌曰大道隱兮禮有基賢人竄兮將待時天下如一兮欲何之說苑曰曾子耘瓜而誤斬其根曾晳怒援大杖擊之曾子仆地有頃乃蘇蹶然而起進曰曩者參得罪於大人大人得無疾乎退屏鼓琴而歌令曾晳聽其歌聲令和莊子曰孔子窮於陳蔡之間七日不火食羹不糝顏色甚憊歌於室不輟又曰子桑戶孟子反禽張三人相與友有間而子桑戶死相和而歌子貢曰敢問臨尸而歌禮乎, SBCK: ''}
