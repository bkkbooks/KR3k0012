  - {type: variant, offset: 1683, length: 2133, content: 子相視而笑是惡知乎禮意也又曰莊子妻死惠子弔之箕踞鼓盆而歌惠子曰不哭亦足矣歌不亦甚乎莊子曰人且偃然寢乎巨室而我哭之是不通乎命故止之又曰曾子居衛捉𥘞而肘見納履而踵決曳履而歌商頌聲滿天地若出金石夏侯玄辨樂論曰昔伏羲氏因時興利教民田漁天下歸之時則有網罟之歌神農繼之教民食穀時則豐年之詠黃帝備物始垂衣裳時則有龍袞之頌古今樂錄曰周文王時鳳凰銜書而至文王乃作歌又曰堯郊天地祭神在座上有響誨堯曰水方至為宮命子救之堯乃作歌又黃帝堯之世民樂無事擊壤之歡慶雲之前因以作歌又曰白日落西山歌者沈攸之發荊州未敗之前思歸京師所作歌也又曰莫愁樂者亦因石城樂而有此歌石城西有女子名莫愁善歌謠且石城樂和中有忘愁聲因有此歌又曰秦始皇祠水群有黑頭公從河中出呼始皇曰來受天寶乃與群臣作歌又曰昔炎帝時有娥之覆以玉筐少選視之燕遺二卵五色北飛逐之不及二女作歌始作北音夏孔甲田於東陽迷入民室主人方乳曰后來大吉或曰不勝之子必有殃孔甲取其子歸曰為余子誰敢殃之及成人幕動折斧被斬足孔甲為作斧斤之歌始為東音周昭王征荊辛餘靡長且多力為王右涉漢梁敗王及祭公殞于漢中辛餘靡振王北濟又反振祭公周公候之于西翟實為長公殷憖甲從宅西河追思故處始作西音長公繼是音以處西山此蓋四方之歌也又曰許由者古之貞固之士也堯時為布衣徒步不與方遠交通衣食財得自足夏則巢居冬則穴處無杯杅每以手捧水而飲之人有見其飲無杯以瓢遺之許由受以操飲畢輒掛於樹枝風吹樹瓢搖動歷歷有聲許由尚以為繁擾取而棄之以清節約聞於堯堯大其志乃遣使以符璽禪為天子於是許由喟然歎曰疋夫結志固如盤石采山飲河所以養性非以求祿位也放髮一優游所以安己不懼非以貪天下也使者有愧還以狀報堯堯知許由不可動亦已矣夫於是許由以使者言為不善乃臨河洗耳樊堅見由方且洗耳問之耳有垢乎由曰無垢聞惡語耳堅曰何等語者由曰堯聘吾為天子堅曰尊位何為惡之由曰吾志在青雲何乃劣劣當作九州伍長乎於是樊堅方且飲牛聞其言而去恥飲子之下流於是許由名布四海堯既殂落乃作箕山之歌曰登彼箕山兮瞻望天下山川麗崎萬物還普日月運照靡不記暏游牧其間何所卻慮嘆彼唐堯獨自愁苦勞心九州憂勤后土謂余欽明傳禪易祖我樂如何蓋不盼顧河水流兮緣高山甘瓜施兮棄綿蠻高林肅兮相錯連居此之處傲堯君其後許由死遂葬於箕山又曰周太伯者周太王古公之長子也古公有子三人長者太伯次者虞仲少者季歷季歷之子名昌昌即文王也古公寢疾將死國當有傳心欲以傳季歷乃呼三於謂曰我不起此病繼體興者其在昌乎太伯見太王傳季歷於是太伯與虞仲俱去被髮文身以變形託為王採藥後聞古公卒乃還犇喪哭於門外示夷狄之人不得入王庭於是季歷謂太伯長子也伯當立何不就太伯曰吾生不供養死不飯含哭不臨棺不孝之子焉得繼父乎斷髮文身刑餘之人也戎狄之民也三者除焉何可為君矣季歷垂涕而留之終不肯止遂委而去到江海之涯吟詠優游仰覽俯觀求膏腴之處遂適于吳率以仁義化以道德荊越之人移風易俗成集韶夏取象中國乃太伯之化也是後季歷作哀慕之歌章曰先王既徂長霣異都哀喪腹心未寫中懷追念伯仲季我如何栝桐萋萋生于道周宮館徘徊臺閣既除何為遠去使此空虛支骨離別垂思南隅瞻望荊越涕淚交流伯兮仲兮逝肯來遊自非二人誰訴此憂又曰拘羑里者謂紂拘文王於羑里也文王未能政候時修道德百姓親附文王有子其二子皆賢是時崇侯虎與文王列為諸侯德不及文王常疾之乃譖文王於紂曰西伯昌聖人也長子發仲子旦皆聖三聖合謀將不利於君君宜慮之紂曰冠雖弊宜加於上屨雖新宜處於下文王雖聖安可剋我崇侯譖文王至十紂用其言乃徙文王於羑里欲殺之於是文王四臣太顛宏夭散宜生南宮適之屬往見文王文王為矉反目者紂之好色也拊桴其腹者言欲得奇寶也蹀躞其足者使疾迅也於是乃周流海內經歷豐土得美女二人水中太寶白馬朱鬣以獻於紂陳其中庭紂見之仰天而嘆曰嘻哉此誰寶散宜生趍而進曰是西伯之寶以贖刑罪紂曰於寡人何其厚也立出西伯紂謂宜生譖歧侯者長鼻決耳也宜生還以狀告文王乃知崇侯虎譖之文王在羑里時演八卦以為六十四作鬱戹之辤據于石困於蒺䔧乃申憤以作歌章曰殷道溷溷浸濁煩兮丹紫相合不分別兮迷亂聲色信諛言兮閻閻之虎使我騫兮幽閑牢獄誰其言兮無辜桎梏誰所宣兮遘我四人皆憂勤兮得此珍玩且解大患兮倉遑迄命遺後昆兮作此象變兆在昌兮欽承祖命天不喪兮遂臨下土在聖明兮討暴除亂誅逆王兮又曰莊周者齊人也明篤學術多所博達進准見方來卻覩未發是時齊涽王好為兵事習用干戈莊周儒士不合於時自以不用行欲避亂自隱於山岳嶽後有達莊周於涽王遣使齎金百鎰以聘相位周不就使者曰金至寶相尊官何辤之為周曰君不見夫郊祀之牛衣之以朱綵食之以禾粟非不樂也及其用時鼎鑊在前刀俎列後當此之時雖欲還就孤犢寧可得乎周所以饑不求食渴不求飲者但欲全身遠害耳於是重謝使者不得已而去後引聲歌曰天地之道近在胸臆呼噏精神以養九德渴不求飲飢不索食避世俟道志潔如玉卿相之位難可直當巖巖之石幽而清涼枕塊寢處樂在其央寒涼回固可以久長楊泉物理論曰始皇起驪山之冢使蒙恬築長城死者相屬民歌曰生男慎勿舉生女哺用晡不見長城下尸骸相支柱世說曰晉武帝問孫皓聞吳人好作汝歌頗能不皓正飲酒因舉觴勸帝而言曰昔與汝為鄰今為汝作臣上汝一杯酒令汝壽萬春帝悔琴操曰王昭君齊國王襄漢元帝時獻入後宮帝以妻單于昭君心念鄉土乃作怨曠之歌曰秋木萋萋其葉委黃有鳥爰止集于包桑既得升雲遊倚惟房志念幽沉不得頡頑我獨伊何改往變常翩翩之燕遠集西羗高山峨峨河水泱泱嗚呼哀哉憂心惻傷, SBCK: ''}
