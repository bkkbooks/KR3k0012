  - {type: variant, offset: 2486, length: 577, content: 十里黿鼉不得游見一丈夫游之數百步而出孔子請問曰有道乎丈夫曰吾長於性成乎命從水之道而無私焉呂氏春秋曰帝顓頊令飛龍作八風之音以祭上帝乃會為樂昌鼉乃偃寢以其尾擊腹其音美也搜神記曰滎陽張福舡行夜有女子乘小舟來投福云日暮畏虎不敢夜行福戲調之遂就福寢中夜月照乃見一白鼉枕福臂而臥福驚起鼉便去乘之舡乃枯槎也郭義恭廣志曰鼉魚長三尺有四足高尺餘尾如蝘蜓而大南方嫁娶必得食之魏武赤壁還所掘得之是也支僧載外國事曰私訶條國全道遼山有毗呵羅寺寺中有石鼉至有神靈眾僧飲食欲盡寺奴輒向石鼉作禮於是食具許氏志怪曰沙門竺僧瑤得神符尢能治邪廣陵王家女病邪召瑤治之瑤入門便瞋目大罵老魅不守道敢干犯人女在內大喚云人殺我夫鬼在側曰吾命盡於今可為痛心因歔欷悲啼又曰此神也不可爭傍人悉聞於是化為老鼉走出中庭瑤入撲殺之幽明錄曰宋高祖永初中張春為武昌太守時人有嫁女未及升車忽便失性出外歐擊人垂己不樂嫁俗人巫云是邪魅乃將女江際擊鼓以術祝治療春以為欺惑百姓制期須得妖魅後有一青虵來到巫所即以大釘釘頭至日中復見大龜從江來伏前更以赤朱書背作符更遣入立至暮有大白鼉從江中出乍沉乍浮向龜隨後催逼鼉自忿死冒來先入慢與女辭訣女慟哭云失其因好自此漸差或問巫曰魅者歸於何物巫云虵是傳通龜是媒人鼉是其對所獲三物悉示春春始知靈驗吊裴氏廣州記曰吊虵頭鼉身亦水宿亦水栖俗謂為吊膏至輕利以銅瓦器貯之浸出而唯鷄卵盛之不漏磨治諸毒腫絕驗也, SBCK: ''}
  - {type: variant, offset: 2486, length: 577, content: 十里黿鼉不得游見一丈夫游之數百步而出孔子請問曰有道乎丈夫曰吾長於性成乎命從水之道而無私焉呂氏春秋曰帝顓頊令飛龍作八風之音以祭上帝乃會為樂昌鼉乃偃寢以其尾擊腹其音美也搜神記曰滎陽張福舡行夜有女子乘小舟來投福云日暮畏虎不敢夜行福戲調之遂就福寢中夜月照乃見一白鼉枕福臂而臥福驚起鼉便去乘之舡乃枯槎也郭義恭廣志曰鼉魚長三尺有四足高尺餘尾如蝘蜓而大南方嫁娶必得食之魏武赤壁還所掘得之是也支僧載外國事曰私訶條國全道遼山有毗呵羅寺寺中有石鼉至有神靈眾僧飲食欲盡寺奴輒向石鼉作禮於是食具許氏志怪曰沙門竺僧瑤得神符尢能治邪廣陵王家女病邪召瑤治之瑤入門便瞋目大罵老魅不守道敢干犯人女在內大喚云人殺我夫鬼在側曰吾命盡於今可為痛心因歔欷悲啼又曰此神也不可爭傍人悉聞於是化為老鼉走出中庭瑤入撲殺之幽明錄曰宋高祖永初中張春為武昌太守時人有嫁女未及升車忽便失性出外歐擊人垂己不樂嫁俗人巫云是邪魅乃將女江際擊鼓以術祝治療春以為欺惑百姓制期須得妖魅後有一青虵來到巫所即以大釘釘頭至日中復見大龜從江來伏前更以赤朱書背作符更遣入立至暮有大白鼉從江中出乍沉乍浮向龜隨後催逼鼉自忿死冒來先入慢與女辭訣女慟哭云失其因好自此漸差或問巫曰魅者歸於何物巫云虵是傳通龜是媒人鼉是其對所獲三物悉示春春始知靈驗吊裴氏廣州記曰吊虵頭鼉身亦水宿亦水栖俗謂為吊膏至輕利以銅瓦器貯之浸出而唯鷄卵盛之不漏磨治諸毒腫絕驗也, WYG: ''}
