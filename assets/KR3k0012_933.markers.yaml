  - {type: variant, offset: 20, length: 5, content: 吳興陽羨縣, SBCK: 兹宋鄭其饑乎虵乗龍虵玄武之􅀫虚危之星史記曰秦文公夢黃虵自天下屬地其口岀於鄜衍文公問史敦敦曰此上帝之徴}
  - {type: page-break, offset: 20, content: '', id: KR3k0012_SBCK_933-1b}
  - {type: variant, offset: 20, length: 5, content: 吳興陽羨縣, WYG: 兹宋鄭其饑乎虵乘龍虵元武之宿虛危之星史記曰秦文公夣虵自天下属地其口止於鄜衍文公問史敦敦曰此上帝之徴}
  - {type: variant, offset: 20, length: 5, content: 吳興陽羨縣, krp: 兹宋鄭其饑乎虵乗龍虵玄武之宿虚危之星史記曰秦文公夢黃虵自天下屬地其口岀於鄜衍文公問史敦敦曰此上帝之徴}
