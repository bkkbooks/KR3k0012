  - {type: variant, offset: 1622, length: 243, content: 必嘗異味及入宰夫將解黿相視而笑公問之子家以告及食大夫黿召子公而弗與也子公怒染指於鼎嘗之而出廣雅曰海黿大畝重千鈞續漢書曰靈帝時江夏黃氏之母浴而化為黿入于深淵其後時時出見初浴簪一銀釵及見猶在其首唐史曰韋丹少在東洛嘗至中橋見數百人喧集水濱乃漁者網得大黿繫之橋柱引頸四顧有求救之意丹問曰幾錢可贖曰五千丹曰吾驢直三千可乎曰可於是與之放黿於水徒步而歸淮南子曰桀之力別觡伸釣洛骨也索鐵操金椎移大戲大戲軍之大旗水殺黿鼉陸捕熊羆又曰積力之所舉則無不勝也眾智之所為則無不成也塪井之所無黿鼉隘也園中之無脩木小, WYG: 類}
