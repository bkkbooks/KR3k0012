  - {type: variant, offset: 743, length: 371, content: 又曰忠信形於內感動應於外故禹執于戚儛於階之間而三苗服三苗畔禹禹風以禮樂而服也鷹翔川魚鼈沉禹以德服三苗猶鷹翔川上魚鼈恐皆深飛鳥揚鳥見鷹而揚去必遠實也鷹懷欲害之心故鳥魚知其情實故遠之說苑曰曾子有疾曾元抱首曾華抱足曾子曰吾無顏氏之才何以告汝雖無能君子務益夫華多實少者天也言多行少者人也夫飛鳥以山為卑而層巢其巔魚鼈以淵為淺而穿穴其中然所以得者餌也君子茍能無以利害身辱安從至乎國語曰公父文伯飲南宮敬叔酒以露賭父為客賭父曾大夫客上客也羞鼈焉小賭父怒相延食鼈辭曰將使鼈長而後食之遂出文伯之母聞之怒曰吾聞之先子曰祭養尸饗養上賓言祭祀之禮尊養尸饗宴之禮養上賓鼈於何有而使夫人怒曰遂逐之五日呂氏春秋曰水之深則魚鼈歸之樹之盛則飛鳥歸之庶草美則禽獸歸之人主賢則豪傑歸之晏子春秋曰齊大旱景公召群臣問曰寡人欲祀河伯可乎晏子曰不可河伯以水為國以魚鼈為民彼獨不欲雨乎祀之何益, SBCK: ''}
