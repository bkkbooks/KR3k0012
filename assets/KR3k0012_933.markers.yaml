  - {type: variant, offset: 1613, length: 509, content: 示子家曰他日我如此必嘗異味及入宰夫將解黿相視而笑公問之子家以告及食大夫黿召子公而弗與也子公怒染指於鼎嘗之而出廣雅曰海黿大畝重千鈞續漢書曰靈帝時江夏黃氏之母浴而化為黿入于深淵其後時時出見初浴簪一銀釵及見猶在其首唐史曰韋丹少在東洛嘗至中橋見數百人喧集水濱乃漁者網得大黿繫之橋柱引頸四顧有求救之意丹問曰幾錢可贖曰五千丹曰吾驢直三千可乎曰可於是與之放黿於水徒步而歸淮南子曰桀之力別觡伸釣洛骨也索鐵操金椎移大戲大戲軍之大旗水殺黿鼉陸捕熊羆又曰積力之所舉則無不勝也眾智之所為則無不成也塪井之所無黿鼉隘也園中之無脩木小也又曰高山險阻深林藂薄虎豹之所樂也人入之而畏川谷通原積水重淵黿鼉之所便也人入之而死魏子曰夫樹樹異風人人異心不可以一檢量故黿鼉得水則生虎豹得水則死晏子春秋曰齊三子爭桃古冶子曰吾嘗濟河黿衘左驂而入砥柱流冶潛行逆流百步從流九里得黿頭鶴躍而出若冶之功可以食桃抱朴子曰在頭水有大黿常在深潭號為黿潭此能作魅行病吳有道士戴炳者能視見之以越章封泥遍擲潭中良久有大黿徑長丈餘浮出不敢動乃格殺之而病者並愈又有小黿出羅列死於渚上甚多書紀年曰穆王三十七年起師至九江以黿為梁也璅語曰範獻子獵占之曰此其繇也君子得黿小人遺冠獻子獵而不得遺其豹冠, SBCK: 福新序同}
