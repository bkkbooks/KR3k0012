  - {type: variant, offset: 15, length: 1, content: 鼈, SBCK: 螣螣虵龍􅀋也能興雲霧而遊其中淮南云蟒虵蟒王虵郭璞注曰蟒虵最大者故曰王虵左傳莊公曰初内虵與外虵闘於鄭南門之中内虵死六年而厲公入又文下曰有虵自泉宫出入于國如先君之數自伯禽折至僖公十七君秋八月辛未聲姜薨毀泉臺魯人以爲虵妖所出而聲姜薨故壞之又襄}
  - {type: variant, offset: 15, length: 1, content: 鼈, WYG: 螣騰虵龍類也蠎王虵蠎最大故曰王左傳莊公曰初内虵與外虵鬭於鄭南門之中内虵死不踰年而厲公入又文十曰有虵自泉宮出入於國如先君之數自伯禽至僖公十七君秋八月辛未聲姜薨毁泉臺魯人以為虵如所出而聲姜薨故壊之又襄}
