  - {type: variant, offset: 1123, length: 261, content: 鼈顧譚新言曰吳之翫水若魚鼈蜀之便山若禽獸神仙傳曰汝南郡中常有鬼怪歲輒數出過時導從威儀如太守入府打鼓周行內外乃還去甚以為患後費長房詣府君而正值此鬼來到府君門常徑入獨此來至門而已不敢前欲去長房厲聲呼便促前來鬼化作老公乃下車把板伏庭中叩頭乞得自改長房曰汝死老鬼不念良善無故導從盪突官府知當死不復汝真形此鬼須臾即成大鼈如車輪頸長一丈許長房復令還就人形以一札符付之令送與葛陂君鬼叩頭流涕持一札符去使人追視之至陂邊以頸繞株而死王子年拾遺記曰容山下有水多丹鼈魚皆能飛躍星經曰天鼈十三星在南斗主水蟲南越志曰海中有朱鼈狀如肺有眼六腳而常吐珠, SBCK: 四翼}
