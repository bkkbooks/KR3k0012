  - {type: variant, offset: 394, length: 9, content: 傭奴何敢誑我汝初未, SBCK: 太宗屯桓壁常欲覘敵潜軍逺抄􅀐皆四散太宗與一甲士登丘而睡俄然賊兵四靣雲合不之覺也㑹有虵逐䑕觸甲士驚起因見賊至遽白太宗而俱上馬馳百餘歩爲賊所及發大羽箭射之殪其驍將賊􅀐乃退當時以爲神異焉又曰建中三年趙州寧晉縣仁孝里沙北有棠樹甚茂百姓禱之爲神忽有羣虵數千自東南來趨北岸集棠樹下爲二積留居南岸者爲一積俄有三􅀛徑寸繞行積傍積虵盡死而後各登其積野人以告虵腹皆有瘡􅀂矢所中又曰元和中五坊小使毎群聚於賣酒}
  - {type: page-break, offset: 394, content: '', id: KR3k0012_SBCK_933-3b}
  - {type: variant, offset: 394, length: 8, content: 傭奴何敢誑我汝初, WYG: 太宗屯桓壁常欲覘敵潛軍逺抄騎皆四散太宗與一甲士登邱而睡俄而賊兵四面雲合不之覺也㑹有虵逐鼠觸甲士驚起因見賊至遽白太宗懼而上馬馳百餘步為賊所及發大羽箭射之殪其驍将賊騎乃退當時以為神異焉又曰建中三年趙州寧晉縣仁孝里沙北有棠樹甚􅌗百姓禱之為神忽有羣虵數千自東南来趨北岸集棠樹下為二積留居南岸者為一積俄有三龜徑寸繞行積傍積虵盡死而後各登其積野人以告虵腹皆有瘡若矢所中又曰元和中五坊小使每羣聚於賣酒食家肆情飲啖将去畱虵一篋誡之曰吾以此虵致供奉者可善飼之無使饑渴主人賂而謝之方肯􅂝虵篋而去又曰李朝晟為邠州刺史城方渠無水師徒囂然遽有青虵乘髙而下視其跡水隨而流朝晟令築防環之遂為停泉軍人仰飲以是水不乏上聞詔致祠焉又曰􅄢賓國有鼠喙尖而尾赤能食虵有被虵螫者鼠輒嗅而尿之其瘡立愈後唐史曰清泰三年有虵與鼠鬭於獅子門外而鼠殺虵晉史曰髙祖即位之前一年歳在乙}
