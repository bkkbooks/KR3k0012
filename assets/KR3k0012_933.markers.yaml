  - {type: variant, offset: 408, length: 1, content: 美, SBCK: 跡水隨而流朝晟令築防環之遂爲停泉軍人仰飲以足圖其事上聞詔致祠焉又曰􅄢賔國有䑕喙尖而尾赤能食虵有􅀍虵螫者䑕輙嗅而尿之其瘡立愈止猶爲虵足昭陽解軍而歸孫子兵法曰善用兵者譬如率然率然常山之虵也擊其首則尾至擊其尾則首至擊其中身則首尾}
