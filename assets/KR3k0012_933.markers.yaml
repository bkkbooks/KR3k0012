  - {type: variant, offset: 394, length: 9, content: 傭奴何敢誑我汝初未, krp: 太宗屯桓壁常欲覘敵潜軍逺抄騎皆四散太宗與一甲士登丘而睡俄然賊兵四靣雲合不之覺也㑹有虵逐䑕觸甲士驚起因見賊至遽白太宗而俱上馬馳百餘歩爲賊所及發大羽箭射之殪其驍將賊騎乃退當時以爲神異焉又曰建中三年趙州寧晉縣仁孝里沙北有棠樹甚茂百姓禱之爲神忽有羣虵數千自東南來趨北岸集棠樹下爲二積留居南岸者爲一積俄有三龜徑寸繞行積傍積虵盡死而後各登其積野人以告虵腹皆有瘡若矢所中又曰元和中五坊小使毎群聚於賣酒}
