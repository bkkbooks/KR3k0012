  - {type: variant, offset: 408, length: 1, content: 美, WYG: 必貴敬奉愈厚戰國策曰昭陽為楚伐魏覆軍殺將移師攻齊陳軫為齊王使見昭陽曰楚有祀者賜其舎人酒一巵舎人相謂曰數人飲之不足一人飲之有餘請各畫地為虵虵先成者飲酒一人先成引酒且飲之乃左手持巵右手畫地曰吾能為之足未成一人後成奪其巵曰虵故無足子安能為之足遂飲其酒為虵足者終亡其酒今公攻魏破軍殺将又将移師攻齊齊畏公甚戰勝不知止猶為虵添足昭陽解甲而歸孫子兵法曰善用兵者譬如率然率然常山之虵也撃其首則尾至撃其尾則首至撃其中身則首尾}
