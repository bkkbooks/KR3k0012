  - {type: variant, offset: 26, length: 0, content: '', SBCK: 其祠之於是作鄜峙漢書曰髙祖以亭長送徒驪}
  - {type: variant, offset: 26, length: 0, content: '', WYG: 其祠之於是作鄜畤漢書曰高祖以亭長送徒驪}
  - {type: page-break, offset: 26, content: '', id: KR3k0012_WYG_933-2a, image: WYG0901/WYG0901-0295a.png}
  - {type: variant, offset: 26, length: 0, content: '', krp: 其祠之於是作鄜峙漢書曰髙祖以亭長送徒驪}
  - {type: variant, offset: 27, length: 0, content: '', SBCK: 夜行經豐西大澤中有大虵當道拔劒斬之遂行後人至者見一老嫗哭虵曰此白帝子也向赤帝子過而殺之媪因忽然不復見後漢書曰華他嘗行道見有病咽塞者咽喉也因語之曰向來道隅有賣餅人䓑韲甚酸可取三升飲之病自當去即如他言乃立吐一虵晉書曰杜預先在荆州因宴集醉卧齋中外人聞嘔吐聲竊窺於户而見一大虵垂頭而吐聞者異之又曰樂廣常有親客乆闕不復來廣問其故荅曰前在坐蒙賜酒方欲飲見盃中有虵意甚惡之旣飲而疾于時河南㕔事壁上角漆􅀞作虵廣意盃中虵即角影也復置酒於處謂客曰酒中復有所見不荅曰所見如􅀄廣乃告其所以客豁然而解沉痾頓愈又曰趙王倫􅆲位殿}
  - {type: page-break, offset: 27, content: '', id: KR3k0012_SBCK_933-2a}
  - {type: variant, offset: 27, length: 0, content: '', WYG: 夜行經豐西大澤中有大虵當道㧞劍斬之遂行後人至者見二老嫗哭虵曰此白帝子也向赤帝子過而殺之媪因忽然不復見後漢書曰華佗嘗行道有病咽塞者咽㗋也因語之曰向見道隅賣餅人䓅韲甚酸可取三升飲之病自當去即如佗言乃立吐一虵晉書曰杜預先在荆州因宴集醉卧齋中外人聞嘔吐聲竊窺於户而見一大虵垂頭而吐聞者異之又曰樂廣常有親客久闊不復来廣問其故答曰前在主家賜酒方欲飲見盃中有虵意甚惡之既飲而疾于時河南㕔事壁上角弓畫作虵廣意盃中虵即弓影也復置酒其處謂客曰酒中復有所見否答曰所見如初廣乃吿其所以客豁然而解又曰趙王倫􅆲位殿}
  - {type: page-break, offset: 27, content: '', id: KR3k0012_WYG_933-2b, image: WYG0901/WYG0901-0295b.png}
  - {type: variant, offset: 27, length: 0, content: '', krp: 夜行經豐西大澤中有大虵當道拔劒斬之遂行後人至者見一老嫗哭虵曰此白帝子也向赤帝子過而殺之媪因忽然不復見後漢書曰華他嘗行道見有病咽塞者咽喉也因語之曰向來道隅有賣餅人䓑韲甚酸可取三升飲之病自當去即如他言乃立吐一虵晉書曰杜預先在荆州因宴集醉卧齋中外人聞嘔吐聲竊窺於户而見一大虵垂頭而吐聞者異之又曰樂廣常有親客乆闕不復來廣問其故荅曰前在坐蒙賜酒方欲飲見盃中有虵意甚惡之旣飲而疾于時河南㕔事壁上角漆畫作虵廣意盃中虵即角影也復置酒於處謂客曰酒中復有所見不荅曰所見如𥘉廣乃告其所以客豁然而解沉痾頓愈又曰趙王倫篡位殿}
  - {type: variant, offset: 29, length: 1, content: 池, SBCK: 大蟒及小蟒耳間垂􅁏似重孝幘小蟒亦然又曰慕容熈遊干城南止大柳樹下􅀂有人呼曰大王且止熈惡之伐其樹乃有虵長丈餘從樹}
