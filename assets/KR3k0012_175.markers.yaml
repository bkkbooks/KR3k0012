  - {type: variant, offset: 1662, length: 166, content: 山頭與東海方壺山相似因名壺頭從充則塗夷而運遠充縣屬武陵郡帝初以為疑及軍至耿舒欲從充道援以為費糧不如進壺頭扼其喉咽搤持蠻賊自破以事上之帝從援策三日進營壺頭賊乘高守隘船不得上會暑甚士卒多疫死援亦以中病遂困乃穿岸為室以避炎氣武陵記曰壺頭山傍有石窟援所穿室也室內有蛇數百斛以大云是援之餘靈耳賊每乘險鼓譟援曳足以觀之左右哀其壯意莫不為流涕謝承, WYG: 塟第側}
