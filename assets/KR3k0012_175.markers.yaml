  - {type: variant, offset: 1887, length: 0, content: '', SBCK: 激洛水於殿下郡國志曰秦州上邽縣北十六里有無疆古殿基後魏太武築也王子年拾遺記曰漢成帝造飛行殿方丈如今之輦選期門羽林之士􅀒之而趨一名雲雷宫兩京記曰東京五殿壁厚五丈髙九十尺東西房廊皆五十餘間西院有厨東院有教坊内庫髙宗常御此殿又曰流盃殿東西廊殿南頭兩邊皆有亭子以間山池此殿上作􅃮渠九曲從陶光園引水入渠隋煬帝常於此爲曲水之飲在東都又曰}
