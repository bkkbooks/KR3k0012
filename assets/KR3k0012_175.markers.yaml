  - {type: variant, offset: 1492, length: 375, content: 遂散髮絕代欲投跡深林以母老不宜遠遁乃築土室四周於庭不為戶自牖納飲食東向拜母母思閎時往就視母去便自掩閉兄弟妻子莫得見也及母歿不為制服設位時莫能名或以狂生目之潛身十八年黃巾賊起攻沒郡縣百姓驚散閎誦經不移賊相約語不入其閭鄉人就閎避難皆得全免年五十七卒於土室又曰馬援之攻五溪蠻初軍至下雋有兩道可入從壺頭側路近而水嶮壺頭山名也在今辰州沅陵縣東武陵記此山頭與東海方壺山相似因名壺頭從充則塗夷而運遠充縣屬武陵郡帝初以為疑及軍至耿舒欲從充道援以為費糧不如進壺頭扼其喉咽搤持蠻賊自破以事上之帝從援策三日進營壺頭賊乘高守隘船不得上會暑甚士卒多疫死援亦以中病遂困乃穿岸為室以避炎氣武陵記曰壺頭山傍有石窟援所穿室也室內有蛇數百斛以大云是援之餘靈耳賊每乘險鼓譟援曳足以觀之左右哀其壯意莫不為流涕謝承後漢書曰陳蕃家居不好掃室賓客存之者或曰可一掃乎蕃曰丈夫當為國家掃除天下豈徒室中, SBCK: 殿}
