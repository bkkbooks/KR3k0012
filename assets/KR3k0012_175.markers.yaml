  - {type: variant, offset: 275, length: 293, content: 室曰子有令聞而美其室非所望也對曰我在晉吾兄為之毀之重勞且不敢間又曰鄭伯有嗜酒為窟室而夜飲酒擊鍾焉朝至未已朝者曰公焉在其人曰吾公在壑谷壑在窟室又曰吳公子光伏甲於窟室而享王掘地為室又曰怒於室而色於市論語曰子游為武城宰子曰汝得人焉耳乎曰有澹臺滅明者行不由徑非公事未嘗至於偃之室也澹臺滅明者孔子弟子子游之同門也修身正行公事乃肯來我室得與之語耳非公事不肯來言無私謁國語曰智襄子為室美智伯曰美則美矣抑臣亦有懼也襄子曰何懼對曰臣以秉筆事君記曰高山峻原不生草木松柏之地其土不植臣懼其不安人也室成三年而智氏亡說苑同又曰趙文子為室斫其椽而礱之礱磨張老夕焉而見之不謁而歸文子駕而往曰吾不善子亦告我何其速也對曰, SBCK: 餘皆鋪幅席席前設筵凡}
