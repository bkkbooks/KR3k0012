  - {type: variant, offset: 1889, length: 5, content: 學能屬文家, SBCK: 治宫室遂因魯僖基兆而營焉遭漢中微盗賊奔突自西京未央建章之殿皆見隳壞而靈光巋然獨存意者豈非神明依慿支持以保漢室者耶然其䂓矩制度上應星􅀫亦所以永安也晉宫閣名曰太極殿十二間徽行殿顯陽殿暉章殿含章殿建始殿仁壽殿百福殿清暑殿章華殿嘉福殿宣光殿修明殿嘉樂殿芙蓉殿崇光殿華光殿􅂼圃殿華德殿九華殿右五殿}
