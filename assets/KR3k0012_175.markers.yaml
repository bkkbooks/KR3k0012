  - {type: variant, offset: 1881, length: 2, content: 父蕃, krp: 蕭欣恐畏不敢居之頴胄改爲嘉福殿隋書宇文愷傳云時上北廵愷造觀風行殿上容侍衛者數百人離合爲之下施輪軸推移倐忽有若神功戎狄見之莫不驚駭唐}
