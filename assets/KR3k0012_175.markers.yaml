  - {type: variant, offset: 1877, length: 1, content: 徐, SBCK: 徳殿黄龍殿壽安殿竹殿晉中興書曰烈宗起清暑殿䜟者曰清暑反語楚聲也爲殿以酸楚之聲爲號非􅁻祥也有頃烈宗崩桓􅀇自號楚又孝武帝造太極殿郭璞筮云二百一十年此殿爲奴所壊後梁武帝毀之捨身爲奴落享燕書曰秋七月丁夘營新殿昌􅀺大􅁄城縣河岸崩岀鐵築頭一千一百七十四枚永樂民郭陵見之詣闕言狀以是日到詔曰經始崇殿而築具出人神允恊之應也趙書曰劉曜召構殿巧手三千人發陽平等十郡車牛五千乗運土築建徳殿臺基齊書武穆裴皇后傳云寵􅁎荀昭華居鳯華栢殿宫内御所居壽昌􅀞殿南閤置白鷺鼔吹二部又魏虜傳云虜主宏率衆至壽陽軍中黒氈行殿皆烏􅃮楯烏􅃮槊綴以黒蝦蟇幡登八公山賦詩而去又禮志云魏文脩洛陽宫室權都許昌殿狹小元日於城南立氈殿青帷以爲門又蕭赤斧子頴胄傳曰建武中荆}
  - {type: page-break, offset: 1877, content: '', id: KR3k0012_SBCK_175-3a}
