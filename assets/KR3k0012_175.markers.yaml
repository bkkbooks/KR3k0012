  - {type: variant, offset: 675, length: 557, content: 與誼言之又曰武帝為竇太主置酒宣室使謁者引內董君是時東方朔陛戟殿下辟戟而前曰董偃斬罪三安得入乎上曰何謂也朔曰偃以人臣私侍公主其罪一也敗男女之化而亂婚姻之禮傷王制其罪二也陛下富於春秋積思於六經留神於王事馳騖於唐虞折節於三代偃不遵經勸學反以靡麗為右奢侈為務盡狗馬之樂極耳目之欲行邪狂之道經淫辟之路是乃國家之大賊人主之大蜮師古曰蜮魅也音或說者以為短狐非也短狐射工用於此不當其義今俗猶言魅蜮矣偃為淫首其罪三也上默然不應良久曰吾業已設飲後而自改朔曰不可夫宣室者先帝之正處也非法度之政不得入焉故淫亂之漸其變為篡是以堅貂為淫而易牙作患慶父死而魯國全管蔡誅而周室安上曰善有詔止更置酒北宮引董君從東司馬門入更名東交門蘇林曰以偃從北門入交會於內故以名之也賜朔黃金三十斤董君之寵由是日衰又霍光傳曰蓋主等奏廢光光聞止晝室中不敢入帝召入慰勉之注晝室近臣計晝之室師古曰雕晝之室也又曰孔光凡典樞機十餘年守法度修故事上有所問據經法以心所安而對不希旨茍合如或不從不敢強諫爭以是久而安時有所言輒削草稿以為章主之過以奸忠直人臣大罪也師古曰奸求也好忠直之名也奸音干也有所薦舉唯恐其人之聞知沐日歸休兄弟妻子燕語終不及朝省政事或問光溫室省中樹皆何木也晉灼曰長樂宮中有溫文殿光嘿不應更荅以他語其不泄如是又曰京房所言屢中天子悅之數召見問房對曰古帝王以功舉賢即萬化成, SBCK: 具祥}
