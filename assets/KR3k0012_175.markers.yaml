  - {type: variant, offset: 1483, length: 134, content: 卻矣延熹末黨事將作遂散髮絕代欲投跡深林以母老不宜遠遁乃築土室四周於庭不為戶自牖納飲食東向拜母母思閎時往就視母去便自掩閉兄弟妻子莫得見也及母歿不為制服設位時莫能名或以狂生目之潛身十八年黃巾賊起攻沒郡縣百姓驚散閎誦經不移賊相約語不入其閭鄉人就閎避難皆得全免年五十七卒於土室, WYG: 善長春勝辨等殿}
