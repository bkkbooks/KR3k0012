  - {type: variant, offset: 1410, length: 4, content: 坐孔子講, SBCK: 相後起徳陽殿殿成百官大㑹上謂公卿曰鍾離尚書􅀂在不得成此殿魏志明紀云青龍三年丁巳行還洛陽宫命有司復崇華殿改名九龍殿又髙}
  - {type: variant, offset: 1410, length: 4, content: 坐孔子講, WYG: 相後欲起德陽殿成百官大㑹上謂公卿曰鍾離尚書若在不得成此殿魏志曰青龍三年丁巳還洛陽宮命有司復崇華殿改名九龍殿又髙}
  - {type: variant, offset: 1410, length: 4, content: 坐孔子講, krp: 相後起徳陽殿殿成百官大㑹上謂公卿曰鍾離尚書若在不得成此殿魏志明紀云青龍三年丁巳行還洛陽宫命有司復崇華殿改名九龍殿又髙}
