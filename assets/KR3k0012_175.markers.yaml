  - {type: variant, offset: 1425, length: 0, content: '', WYG: 亦古之名將也為起殿舍又特為遼母作殿晉書曰張駿霸西河於姑臧起謙光殿畫以五色飾以金玉窮盡珍巧四面各起一殿東方曰宜陽青殿南方曰朱陽赤殿西方曰德政白殿北方曰元武黒殿各隨方色以時居之晉載記曰石虎於襄國起}
