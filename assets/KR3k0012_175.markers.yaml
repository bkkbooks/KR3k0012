  - {type: variant, offset: 1935, length: 3, content: 脩藏水, SBCK: 前晉以爲藥園又曰陳永􅀄中於臺城中起昭德嘉德壽安乾明有覺等殿又曰光嚴殿在縣東北六里景陽山東嶺南起重雲光嚴二殿前爲兩樓又云梁於臺城中立曽城觀觀歷四代修理更起重閣七間上名重雲殿下名光嚴殿又云太􅀄宫中有神龍殿去縣三里左太沖吴都賦云杭神龍之華殿是}
