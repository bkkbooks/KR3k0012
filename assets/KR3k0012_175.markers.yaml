  - {type: variant, offset: 1884, length: 0, content: '', krp: 宗謂侍臣曰今天下無事四夷賔服唯湏守此成功以養百姓因指殿而言曰安百姓者如造此舎經始斯畢安可改移若易一榱増一瓦人足竟踐良工揮墨揺其梁棟所壞益多亦猶百姓旣安因而撫養若慕竒功變法制不恒其徳必致勞擾又曰太宗謂侍臣曰朕頃覽劉聦傳聦將爲劉后起䳨儀殿廷尉陳元逹諌聦大怒命斬之劉后手䟽啓請甚切聦怒解而甚媿之人之讀書欲廣聞見然非知之難也朕近於藍田市木將别爲一殿取制兩儀仍構重閣其木巳具逺想聦事斯作遂止又曰髙祖引蘇丗長宴於披香殿丗長酒酣奏曰此隋煬帝之所作耶何雕麗之若此髙祖曰卿好諌以直其心實詐豈不知此殿是吾所造何湏姦詭疑煬帝乎對曰臣實不知但見傾宫鹿臺琉璃之瓦並非受命帝王愛民節用之所爲也若是陛下作此誠非所冝臣昔在武功幸獲陪侍見陛下宅宇纔蔽風霜當彼時亦以爲足今目隋之侈民不堪命數歸有道而陛下得之實謂懲其奢淫不忘儉約今𥘉有天下而於隋宫之内又加雕飾欲撥其亂寜可得乎髙祖毎優容之又曰玄宗甞召張說及禮官學士等賜宴於集仙殿上謂說曰今與卿等賢才同宴於此冝改殿爲集賢殿因下制改麗正書院爲集賢殿書院又曰麗正殿髙宗降誕之所開元中繕冩圖籍貯之洛陽宫殿簿有明光殿三秦記云明光殿在桂宫中皆以金王珠璣爲簾晝夜光明太冲吴都賦云飾赤烏之暐暐是也三輔宫殿名曰未央宫有騏驎殿椒房殿又曰長樂宫前殿宣徳殿通光殿髙明殿漢宫殿名曰長安有臨華殿神仙殿髙門殿朱鳥殿曽城殿宣室殿承明殿鳯皇殿飛雲殿昭陽殿鴛鸞殿鈎臺殿合懽殿蕭何殿曹叅殿韓信殿成都記曰隋蜀王秀常造一殿飛鳥不止其上戴延之西征記曰太極殿上有金井䦨金搏山鹿盧山蛟龍山負於井上又有金師}
  - {type: variant, offset: 1885, length: 1, content: 舍, SBCK: 伏滔北征記曰梁城東有韓馮墓去城三里青蘭殿是宋王住殿山謙之丹陽記曰太極殿周制路􅃦也􅁗漢曰前殿今稱太極曰前殿洛宫之號始自魏案史記􅁗皇改命宫爲廟以擬太極魏號正殿爲太極蓋採其義而加以太亦猶漢夏門魏加曰大夏耳咸康中散􅀐侍郎􅁃闡議求改太爲泰蓋謬矣東西堂亦魏制於周小寢也皇后正殿曰顯陽東曰含章西曰徽音又洛宫之舊也含章名起後漢顯陽徽音亦起魏曰明陽晉避文帝諱改爲此周禮亦有路􅃦小寢又其制度也登真隱訣云􅋁陽殿太和殿皆云玉清宫中殿名二京雜記曰漢成帝設雲帳雲幄幕於甘泉紫殿謂之三雲殿漢官典職曰德陽殿周旋容萬}
