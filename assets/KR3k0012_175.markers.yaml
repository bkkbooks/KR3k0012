  - {type: variant, offset: 2642, length: 446, content: 姓安之鹽鐵論曰匈奴織柳為室旃席為蓋說苑曰延陵季子遊于晉曰吾入其都新室惡故室美故墻高新墻庳是以知民力屈也又曰一室之中有王道焉父母之謂也故君正則百姓治父母平則子孫孝慈是以孔子家兒不知倨所以然者生而見善教也新序曰魯哀公為室而大公儀子諫曰室大眾與人處則曄少與人處則悲願公適之也曰聞命矣築室者不輟明日又諫國小室大百姓必怨吾君諸侯聞之必輕吾國公曰聞命矣築室不輟明日又諫曰左昭右穆為室而大以臨二先君無乃害於孝乎於是哀公毀室而止風俗通曰論語夫子宮墻數仞禮記季武子入宮不敢哭由是言之宮室一也秦以來尊者以為常號乃避之耳室也實弟子職曰室中論語曰譬如墻由此言之宮其外室其內也楚辭曰砥室翠翹挂曲瓊些言臥內之室以砥為壁干而滑澤以翠鳥之羽雕飾玉鉤以經衣曲瓊玉鉤也又曰鑿山楹而為室下披衣於水渚霧濛濛其晨降兮雲裴斐而承宇又曰網戶朱綴刻方連冬有奧突奧復室夏大室夏室寒事具居處部上又曰築室兮水中葺之以荷蓋又曰像設居室靜閑安高堂邃宇檻層軒潘岳狹室賦曰伊余館之褊狹良窮弊而極微李尤室銘曰室以安寧寢息幽閑窒塞空隟遮遏風寒無曰寂寞屋漏昭然, WYG: 七十五}
