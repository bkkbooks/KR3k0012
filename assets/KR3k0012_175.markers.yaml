  - {type: variant, offset: 1432, length: 0, content: '', WYG: 所造何須姦説疑煬帝乎對曰臣實不知但見傾宫鹿臺琉璃}
  - {type: variant, offset: 1433, length: 2, content: 禦侮, WYG: 瓦並非受命帝王愛民節用之所為也若是陛下作此誠非所宜臣昔在武功幸獲陪侍見陛下宅宇纔蔽風霜當彼時亦以為足今自隋之侈民不堪命數歸有道而陛下得之實謂懲其奢滛不忘儉約今初有天下而於隋宫之内又加雕餙欲撥其亂寧可得乎髙祖毎優容之又曰𤣥宗嘗召張説及禮官學士等賜宴於集仙殿上謂説曰今與卿等賢才同宴於此宜改殿為集賢殿因下制改麗正書院為集賢殿書院又曰麗正殿髙宗降誕之所開元中繕冩圖箱貯之洛陽宫殿簿有明光殿三秦記云明光殿在桂宫中皆以金玉珠璣為簾晝夜光明太冲吳都賦曰飾赤烏之韡曄三輔宫殿名曰未央宫有麒麟殿椒房殿又曰長樂宫前殿宣德殿通化殿髙明殿漢宫閣名曰長安有臨華殿神仙殿臯門殿朱鳥殿増城殿宣室殿承明殿鳯凰殿飛雲殿昭陽殿鴛鴦殿鈞臺殿合歡殿蕭何殿曹叅殿韓信殿成都記曰隋蜀王秀常造一殿飛鳥不止其上戴延之西征記曰太極殿上有金井䦨金博山鹿盧蛟龍負山於井上又有金獅子伏滔北征記曰梁城東有韓馬墓去城三里東蘭殿是朱王行殿山謙之丹陽記曰太極殿周制路寢也秦漢曰前殿今稱太極曰前殿宮之號始自魏按史記秦皇改命宮為廟以擬太極魏號正殿為太極蓋採其義而加以太亦猶漢夏門魏加曰太夏咸康中散騎侍郎庾闡議求改太為泰蓋謬矣東西堂亦魏制於周小寢也皇后正殿曰顯陽東曰含章西曰徽音又洛宫之舊也含章名起後漢顯陽徽音亦起魏曰明陽晉避文帝諱改為此周禮亦有路寢小寢又其制度也登真隱訣云寥陽殿太和殿皆云玉清宫中殿名兩京雜記云漢成帝設雲帳雲幄幕於甘泉紫殿謂之三雲殿漢官典職曰德陽殿周旋容萬餘人激洛水於殿下郡國志曰秦州上邽縣北十六里有無疆殿後魏太武築也王子年拾遺記曰漢成帝造飛行殿方丈如今之輦選期門羽林之士負之而趨一名雲雷宫兩京記曰東京五殿䕃殿也壁厚五尺髙九十尺東西房廊皆五十餘間西院有庫厨東院有敎坊内庫髙宗嘗御此殿又曰流盃殿東西廊殿南頭兩邊皆有亭子以間山池此殿上作漆渠九曲從陶光園引水入渠隋煬帝常於此為曲水之飲在東都又曰含元殿陛土髙於平地四十餘丈南去丹鳯門四百步王文考魯靈光殿賦序曰魯靈光殿者蓋漢景帝程姬之子恭王餘之所立也初恭王始都下國好治宫室遂因魯僖基兆而營焉遭漢中微盜賦奔突自西京未央建章之殿皆見隳壞而靈光巋然獨存意者豈非神明依慿支持以保漢室者耶晉宫閣名曰太極殿十二間徽音殿顯陽殿暉章殿含章殿建始殿仁壽殿百福殿清暑殿章華殿嘉福殿宣光殿修明殿嘉樂殿芙蓉殿崇光殿華光殿蔬圃殿九華殿在五殿有華林圃章陽殿百兒殿芳德殿靈圃殿承光殿永寧殿景福殿延休殿百子殿虞清殿淵冥殿安昌殿建康宫殿簿云林光殿在縣東北十里潮溝村覆舟山前晉以為藥圃又曰陳永初中於臺城中起昭德嘉德壽安乾明有覺等殿又曰光嚴殿在縣東北六里景陽山東嶺南起重雲光嚴二殿前為兩樓又曰梁於臺城中立魯城觀觀歴四代修理大起重閣閣上名重雲殿下名光嚴殿又曰太初宫中有神龍殿去縣三里左太冲吳都賦曰抗神龍之華殿是}
