  - {type: variant, offset: 1429, length: 0, content: '', WYG: 置衛士五百人於其中東西七十五歩南北六十五步皆漆瓦金鐺銀楹金柱珠簾玉壁窮極伎巧又起靈風䑓於顯陽殿後選士庶之女以充之後庭服綺縠珍玩者萬餘人内置女官十有八等敎宫人星占及馬歩射置女}
  - {type: page-break, offset: 1429, content: '', id: KR3k0012_WYG_175-3b, image: WYG0894/WYG0894-0575d.png}
  - {type: variant, offset: 1430, length: 1, content: 僕, WYG: 史于靈臺仰視災祥以考外太史之虛實魏畧曰青龍三年起太極殿洛陽諸故宫名曰洛陽南宫有玉堂前殿却非殿銅馬殿敬法殿清凉殿鳯凰殿黄龍殿壽安殿行殿嘉徳殿晉中興書曰烈宗起清暑殿䜟者曰清暑者反語楚也為殿以酸楚之聲為號非吉祥也頃烈宗崩桓𤣥自號楚又孝武帝造太極殿郭璞筮云二百一十年此殿為奴所壞後梁武帝毁之捨身為奴燕書咸康八年秋七月丁卯營新殿昌黎大棘城縣河岸崩出鐡築頭一千一百七十四枚永樂民郭陵見之詣闕言狀以是日到詔曰經始崇殿而築具出神人允恊之應也趙書曰劉曜召搆殿巧手三千人發陽平等十郡車牛五千乘運土築建德殿基齊書武穆裴皇后傳云寵姬荀昭華居鳯華栢殿宫内御所居壽昌畫殿南閣置白鷺鼓吹二部又魏虜傳云虜主宏率衆至壽陽軍中黒氈行殿皆烏漆楯為漆槊綴以黒蝦蟇幡登八公山賦詩而去又魏志云魏文脩洛陽宫室權都許昌殿狹小元日於城南立氊殿青帷為門又蕭赤斧子穎胄傳曰建武中荆州大風兩龍入栢齋中柱壁上有爪足處刺史蕭欣恐畏不敢居之穎胄改為嘉福殿隋書宇文愷傳云時上北巡愷造觀風行殿上容侍衛者數百人離合為之下施輪軸推移倐忽有若神功戎狄見之莫不驚駭唐太宗謂侍臣曰今天下無事四夷賓服惟須守此成功以養百姓因指殿而言曰安百姓者如造此舍經始斯畢安可改移若易一榱增一瓦人足競踐良工揮墨揺其梁棟所壞益多亦猶百姓既安因而撫養若慕奇巧變法制不恒其德必致勞擾又曰太宗謂侍臣曰朕頃觀劉聰傳聰將為劉后起䳨儀殿廷尉陳元達諌聰大怒命斬之劉后手疏啟請甚切聰怒解而甚愧人之讀書欲廣聞見然非知之難也朕近於藍田市木將别為一殿取制兩儀仍搆重閣其木已具逺想聰事斯作遂止又曰髙祖引蘇世長宴於披香殿世長酒酣奏曰此隋煬帝之所作也何雕麗之若此髙祖曰卿好諫以直其心實詐豈不知此殿是}
