  - {type: variant, offset: 1939, length: 3, content: 唐書曰, SBCK: 又云臺城温德門内又起三善長春勝辯等殿又云鳯光殿在縣東北五里一百歩舊臺城内又云宋於臺城立正福清曜等殿又云臺城中有麗譙閣麗日殿飛香三重閣又云臺城温德門内有永貞温文文思壽安等殿輿地志云未央後宫有鴛鴦昭陽飛翔増地合歡蘭林披香鳯皇等八殿又云丹陽郡建康縣文德殿梁武帝移張衡渾儀置此殿又云洛陽有顯陽殿皇后正殿也魏明所建又云丹陽郡建康縣臺城華光殿梁武帝大通中毀施與草堂寺人洗取朱貨直百萬以其地起重閣七間又云丹陽郡建康縣臺城寳雲殿梁武帝以施佛事又云丹陽郡建康縣臺城惠輪殿梁武帝以供養佛又云洛陽昭陽殿魏明所治在}
