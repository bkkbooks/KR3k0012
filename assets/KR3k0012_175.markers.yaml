  - {type: variant, offset: 1895, length: 121, content: 鞏縣毫丘自號毫丘子署其門曰歸厚之門室曰慎終之室宋書曰武帝六年五月初置陰室于覆舟山脩藏水也唐書曰太子承乾盛農之時營造曲室累月不止左庶子于志寧切諫不從家語曰魯有獨處室者鄰之嫠婦亦獨處室夜暴風雨室壞趨而託之魯人閉戶不受三輔黃圖曰明堂有十二室法十二月, WYG: ''}
