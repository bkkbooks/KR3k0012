  - {type: variant, offset: 1658, length: 0, content: '', WYG: 北五里一百步舊臺城内又曰宋於臺城立正福清曜等殿又曰臺城中有麗譙閤麗日殿飛香三重閤又曰臺城温德門内有温文文思壽安等殿輿地志曰未央宫後有鴛鴦昭陽飛翔曽城合歡蘭林披香鳯凰等八殿又曰丹陽郡建康縣文德殿梁武帝移張衡渾儀置此殿又曰洛陽有顯陽殿皇后正殿也魏明帝所建又曰丹陽郡建康縣臺城華光殿梁武帝大通中毁施與草堂寺人洗取諸貨直百萬以其地起重閣九間又曰丹陽郡建康縣臺城寳雲殿梁武帝以施佛寺又曰丹陽郡建康縣臺城惠輪殿梁武帝亦供養佛又曰洛陽昭陽殿魏明帝所治在太極殿之北鑄黄龍髙四丈鳯凰二丈置殿前又曰新安郡新治縣西十里有太宰殿晉}
