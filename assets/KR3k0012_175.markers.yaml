  - {type: variant, offset: 2308, length: 390, content: 拾遺錄曰老君居反景之室日與世人絕跡又曰燕昭王坐祇明之室升於泉昭之館此館常有白鳳白鸞遞集其間列子曰虛室生白張湛注云夫視有若虛者虛室而純白獨生莊子曰原憲居圜堵之室蓬戶不完桑以為樞瓮以為牖上漏下濕匡坐而絃歌尸子曰厚積不登高臺不處大室高臺多傷大室多陰故皆不居呂氏春秋曰高元作室又曰齊宣王為大室大蓋百畝堂上三百戶三年而未成群臣莫敢諫淮南子曰高陽魋將為室問匠人匠人對曰未可也木尚生加塗其木必將撓以生材任重塗今雖成後必將敗高陽魋曰不然夫木枯則益勁塗乾則益輕以勁材任輕塗今雖惡後必善匠人窮辭無以對受命而為之室其始成竘然善也而後果敗又曰崑崙有璿室又曰有石城金室又曰古者民澤處腹穴鑿崖岸之腹以為密室冬日則不勝雪霜霧露夏日則不勝暑熱蚊䖟聖人乃作為之築土構木以為室屋上棟下宇以蔽風雨以避寒暑百姓安之鹽鐵論曰匈奴織柳為室旃席為蓋說苑曰延陵季子遊于晉曰吾入其都新室惡故室美故墻高新墻庳是以知民力屈也又曰一室之, SBCK: 在髙門直北道西宫}
  - {type: variant, offset: 2308, length: 36, content: 拾遺錄曰老君居反景之室日與世人絕跡又曰燕昭王坐祇明之室升於泉昭之館此館常, WYG: 在髙門直北道西宫中}
