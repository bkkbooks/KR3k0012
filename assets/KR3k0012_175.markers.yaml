  - {type: variant, offset: 1870, length: 6, content: 嵇含字君道祖, SBCK: 張駿覇西河於姑臧起謙光殿􅀞以五色飾以金玉窮盡珎巧四面各起一殿東方曰冝陽青殿南方曰朱陽赤殿西方曰政徳白殿北方曰􅀇武黒殿各同方色各以時居之晉載記曰石虎於襄國起太武殿於鄴造東西宫至是就太武殿基髙二丈八尺以文石綷之下穿伏室置衛土五百人於其中東西七十五歩南北六十五歩皆􅃮瓦金鐺銀楹金柱珠簾玉壁窮極􅇊巧又起靈臺于顯陽殿後選士庶之女以充之後庭服綺縠竒玩者萬餘人内置女官十有八等教宫人星占及馬歩射置女太史于靈臺仰觀災祥以考外太史之虚實魏略曰青龍三年起太極殿洛陽故諸宫有却非殿銅馬殿敬法殿清涼殿鳯皇殿}
  - {type: page-break, offset: 1870, content: '', id: KR3k0012_SBCK_175-2b}
  - {type: variant, offset: 1870, length: 6, content: 嵇含字君道祖, krp: 張駿覇西河於姑臧起謙光殿畫以五色飾以金玉窮盡珎巧四面各起一殿東方曰冝陽青殿南方曰朱陽赤殿西方曰政徳白殿北方曰玄武黒殿各同方色各以時居之晉載記曰石虎於襄國起太武殿於鄴造東西宫至是就太武殿基髙二丈八尺以文石綷之下穿伏室置衛土五百人於其中東西七十五歩南北六十五歩皆􅃮瓦金鐺銀楹金柱珠簾玉壁窮極伎巧又起靈臺于顯陽殿後選士庶之女以充之後庭服綺縠竒玩者萬餘人内置女官十有八等教宫人星占及馬歩射置女太史于靈臺仰觀災祥以考外太史之虚實魏略曰青龍三年起太極殿洛陽故諸宫有却非殿銅馬殿敬法殿清涼殿鳯皇殿}
