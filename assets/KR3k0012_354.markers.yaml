  - {type: variant, offset: 10, length: 1, content: 舊, SBCK: 矛丈八者謂之矟晉書曰劉邁毅之兄也邁字伯羣少有才幹爲殷仲堪中兵􅂙軍桓玄之在江陵甚豪橫士庶畏之過於仲堪玄曾於仲堪㕔事前戲馬以矟擬仲堪邁時在坐謂玄曰馬矟有餘精理不足玄自以才雄冠丗而心知外物不許之仲堪爲之失色齊書曰長沙王晃武帝常幸鍾山晃從駕以馬矟刺道邊枯蘗上令左右數人引之銀纒皆卷聚而矟不出乃令晃復馳馬拔之應手便去每逺州獻駿馬上輙令晃於華林中調試之髙帝常曰此我家任城也後魏書曰宋大千驍果善􅀐射遷中散至於朝賀之日大千常着御鎧盤馬殿庭莫不歎異甞從太宗獵見虎在髙巖上大千持矟直前刺之應手而死又曰于栗磾音低代人也從太祖田於白登山見熊將數子顧謂栗磾曰卿勇幹如此寧能􅅮之乎對曰天地之性人爲貴􅀂􅅮之不勝豈不虚斃壯士也自可駈致御前坐而}
