  - {type: variant, offset: 3208, length: 228, content: 先主為曹公所逐棄妻子走令張飛將二十騎拒後據水斷橋瞋目橫矛曰我張益德也可來決死無敢進者晉書載記曰蜀李雄無事小出丞相楊裒於後持矛馳馬過雄雄怪問之對曰夫統天下之重者如乘惡馬持矛也急之則慮自傷緩之則懼其失是以馬馳而不制也雄寤即還晉太康起居注詔曰諸王中尉及諸軍皆典兵以備不虞乃有著中戰衣木履持長矛者此為兒戲而無相彈懾也趙書曰劉曜討陳安於隴城城陷安死乃謠曰隴上健兒曰陳安愛養將士同心肝騄驄馬鐵鏤鞍丈八蛇矛左右盤百騎俱出如雲浮追者十萬騎脩脩戰始三交失蛇矛十騎俱蕩九騎留吳, SBCK: 大梁氏鈎焉吴}
