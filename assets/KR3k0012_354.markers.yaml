  - {type: variant, offset: 3407, length: 0, content: '', WYG: 語林曰桓宣武與殷劉談不如甚喚左右取黃皮袴褶上馬持矟數廻或向劉或擬殷意氣始得雄王傅𤣥歌詩曰彎我䌓弱弓弄我丈八矟一舉覆三軍再舉殄戎貊梁簡文帝馬槊譜序曰馬槊為用雖非逺法近代相傳稍已成藝鄧蔗縈魏后之庭武而猶質種馬入丹陽之寺雄而未巧聊以餘暇復撰斯法捜採抑揚斟酌煩簡至如春亭落景秋臯晩净青霜旦盡密雨初晴纎驪沃若天馬平馳盼金精而轉態交流汗血愛連錢而息影不畏衣香雕衢與白刃爭暉翠毦與紅塵俱動足使武夫憤氣觀者衝冠巴童留玩不待輕舟之檝越女踟蹰無假如皋之箭槍風俗通曰刻葦傷盗為槍宋元嘉起居注曰謝靈運自理文云及經山陰防禦彰赫彭排馬槍斷截衢巷衛公兵法曰聽角聲第一聲絶諸隊即一時散立第二聲絶諸隊一時捺槍巻幡張弓㧞刀第三聲絶諸隊一時舉槍第四聲絶諸隊一時籠槍跪膝坐唐書曰郯國公羅士信容貌短小而驍勇絶倫隋末賊起士信始年十四為通守張須陁執衣遇翟讓來㓂士信請自効須陁小之曰汝形容未勝衣甲何可入陣士信怒重着二甲左右雙鞬躍而上馬須陀壯之遂將其衆擊賊于澭水之上陣纔列士信執長槍立於馬上馳至賊所刺倒數人斬一人首擲於空中用槍承之戴以略陣賊衆愕然莫敢逼者士信乃弃策馳馬為十下而還須陀因而􅁬擊兵始接賊師大潰士信逐北每殺一人輙劓其鼻而懷之每歸而數其鼻以表殺賊之多少也須陁大恱之引置左右每戰須陀居前士信為副賊無敢當者又曰太宗每當大陣望賊中驍將銳士炫曜人馬出入來去者意頗怒之輒命秦叔寶徃取焉叔寶應命躍馬負槍而進必刺之萬衆之中人馬俱倒太宗因以是重之叔寶亦以此頗自矜尚貞觀以後恒多疾病每謂人曰吾少長戎馬所經二}
