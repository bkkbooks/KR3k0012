  - {type: variant, offset: 919, length: 2, content: 崔杼, SBCK: 哥舒翰爲別將時吐蕃大冦邊翰拒之于苦海吐蕃之衆三道從山相續而下翰持半叚槍當其鋒逆擊之無不摧靡又擊其次軍復走之又擊其後軍皆大破由是知名天寳六載擢受右武衛將軍仍充隴右節度使副都知􅀜西兵馬使河源軍使先是吐蕃每歳候夌秋即大掠積石軍前後不能禦至是翰使將王難德楊景暉等潜領兵候蕃兵至設伏以待之吐蕃五千􅀐旣至放馬脫甲翰以城中率驍勇合伏兵馳擊之}
