  - {type: variant, offset: 1829, length: 1441, content: 而無刃有所撞直降切桎陟降切於車上使殊離也說文曰殳以杖殊人也禮殳以積竹八觚長丈二尺建於兵車旅賁以先驅也詩曰伯也執殳為王前驅又曰彼候人兮荷戈與祋候人道路送迎賓客者也荷揭也祋殳也役丁外切周禮曰車六等之數殳長四尺崇於人四尺謂之四等左傳曰宋張匄與子皮臼任鄭翩殺華多僚子皮華貙也任翩貙家臣華氏居盧門以南里叛公子成以晉師至成前奔晉今還救宋也會晉齊衛救宋與華氏戰于赭立公子城射華豹殪張匄抽殳而下殳長丈二在車邊又曰莒子庚輿將出奔聞烏存執殳而立於道左懼將止苑羊牧之曰君過之烏存以力聞可矣何必弒君成名遂奔齊韓子曰楚國法太子不得乘車至弟門時天雨王急召太子庭中有水太子遂驅車至弟門廷尉舉殳擊馬遂敗其駕焦贛易林曰大過之訟秉鉞執殳挑戰先驅蕭子良古今蒙隸文體曰殳書者伯氏之職也古者文既記笏武亦書殳也司馬兵法曰兵雜則不利長兵以衛短兵以守太長則犯太短則不及太輕則閱閱則易亂太犯則不濟季氏曰兵長短相為衛守合同為用太長太短太輕皆不如法度者也犯者觸推故不濟不及者不還於利閱者不固則破敗故奔北走擾亂煩也故初列即戟間焉一弓一戟相間也次列殳矛間焉一殳一矛相間也又曰周左執黃鉞右執白旄所以不進者審察斬殺之威也有司皆執殳戈示諸鞭朴之辱歐使不行不進者也又曰弓矢圉殳矛守戈戟助五兵長短各有所宜因事而施凡五兵當長以衛短短以救長以戟則久皆戰則疆淮南子曰武王執戈秉鉞以勝殷搢笏杖殳以臨朝魏文帝詩曰行行遊且獵且獵路南隅彎我烏號弓騁我纖驪駒走者貫鋒鏑伏者飢戈殳白日未及移手獲三十餘王粲七釋曰流鋒四射罼罕撗厲奮千殳而捎擊弛鷹犬以搏噬畢音必夏侯湛獵兔賦曰擬以銳殳規以良弓都毫末而放鏃兮殪之于窟中左思吳都賦曰于鹵殳鋋賜夷勃盧殳鋋皆矛也謝惠連從軍行曰趙騎馳四牡吳舟浮三翼弓矛有恒用殳鋋無蹔息太公六韜曰方凶兩枝鐵叉柄長三丈以上三百枝矛釋名曰矛冒也刃下冒矜也下頭曰鐏徂悶切鐏入地也松𢷺長三丈其矜宜徑以松作之櫝速也前速之言也矛長丈八尺曰矟馬上所持言其稍矟便殺也又曰繳矛繳也可以繳截敵陣之矛也仇矛頭為三叉言以討仇敵之矛也矛戟戟常也其矝丈六尺不言常而云夷者言可夷滅敵也亦車上所持也務矛長九尺務霍也所中霍然即破裂也方言曰五湖之間矛謂之鍦音施或謂之鋋或謂之鏦音䆫其柄謂之矝又曰矛骹音敵細如鶴脛者謂之鶴膝世本曰杼作矛太公兵法曰矛之神名趺蹌書曰鍜乃戈矛礪乃鋒刃又曰門之內一人冕執銳銳矛也立于階側周成王崩士衛殯也詩曰清人在彭駟介旁旁箋云清者高克所軍之邑也駟介四馬也二矛重英河上乎翱翔重英矛之莢飾二矛重喬河上乎逍遙箋云二矛酋矛夷矛也又曰厹音求矛鋈鐓三隅矛也鋈音沃鐓音隊蒙伐有苑蒙郭羽也伐干也苑文貌也禮記曰進矛戟者前其鐓後其刃大戴禮曰武王踐祚矛之銘曰造予少聞弗忍終身之羞予一人所聞以戒後世子孫左傳曰齊伐魯冉有用矛於齊師故能入其軍史記曰武王牧野誓曰立爾矛漢書曰姑句家矛端生火光其妻曰矛端生火光此兵器也魏志曰公孫瓚手執兩頭矛殺鮮卑數十人魏書曰議者多言關中兵強習長矛非精選前鋒則不可以當也曹公謂諸將戰在我非在賊雖習長矛將使不得以刺諸君但觀之魏略曰閻行金城人後名艷字彥明少有健名始為小將隨韓約建安初約與馬騰相攻擊騰子超亦號為健行嘗刺超矛折因以矛撾超幾殺之吳書曰孫策討山越斬其渠帥悉令左右分行逐賊騎與虞飜相隨飜喜用矛謂在前得平地勸策乘馬策曰卿無馬奈何荅曰飜能步日可行三百里三國異同傳曰公孫瓚為遼東屬國長史嘗從數十騎出行塞卒遇鮮卑百騎以矛擊殺傷數十人鮮卑由是畏之蜀志曰先主為曹公所逐棄妻子走令張飛將二十騎拒後據水斷橋瞋目橫矛曰我張益德也可來決死無敢進者晉書載記曰蜀李雄無事小出丞相楊裒於後持矛, WYG: ''}
