  - {type: variant, offset: 3418, length: 5, content: 騎脩脩戰始, WYG: 變之備於是制官室出入之儀正輕重之冠故司馬殿省門闥至五六重周衛擊刁斗近臣侍側尚不得着鈎帶入房梁書曰吉士瞻初為荆府城局參軍浚池得一金革帶鈎隠起鏤甚精巧篆文曰錫爾金鈎且公且侯士瞻取夏侯洋兄之女女竊以與洋洋喜佩之及是革命洋果封侯而士瞻不錫茅土列仙傳曰鈎弋夫人姓趙病臥左手拳望氣者云東北有貴人氣推而得夫人武帝發手得玉鈎手亦舒遂幸而生昭帝後被害殯之尸不臭而香一月}
