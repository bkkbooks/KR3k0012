  - {type: variant, offset: 3478, length: 399, content: 步之外者千人韓子曰人有鬻矛楯者譽之曰吾楯之堅物莫能陷也又譽其矛曰吾矛之利於物無不陷也或曰以予之矛陷子之楯何如其人弗能應也劉向說苑曰秦急圍邯鄲邯鄲傳舍吏子李談謂平原曰邯鄲之民炊骨易子而食之而君之後宮婢妾荷綺縠餘梁肉士民兵盡或剡木為矛戟而君之器物鐘磬自恣呂氏春秋曰齊晉相與戰平阿餘子亡戟得矛退而不自決謂路人曰亡戟得矛可以歸乎路人曰戟亦兵也矛亦兵也亡兵得兵何為不可以歸心猶不決遇高唐之孤叔無孫當其馬前曰今者戰亡戟得矛可以歸乎叔無孫曰矛非戟也戟非矛也亡戟得矛豈無責乎阿餘子曰嘻還反戰死之神仙傳曰左慈見孫討逆討逆使慈著馬前欲手刺殺之討逆著鞭驅馬操矛逐慈慈著木履策杖徐步終不能及乃止列女傳曰巴趙娥者趙萬之妻郡縣遭亂萬得足疾不能行為賊所殺賊欲殺娥娥守喪不去賊舉矛指娥欲以怖之娥知賊必劫略乃以身赴矛貫心達背而死劉敬叔異苑曰河間沐堅字壁強石勒時監作水田御下苛虐百姓怨毒為堅形以刃矛斫刺呪令速斃堅尋得病若被捶割於是遂殞, WYG: 金}
