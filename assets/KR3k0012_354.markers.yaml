  - {type: variant, offset: 1209, length: 244, content: 右敢言歸者死顏歜諫曰君樂治海上不樂治國儻有治國者君且安得樂此海也公據戟將斫之歜撫衣而侍之曰君奚不斫也昔桀殺關龍逢紂殺王子比干君奚不斫以臣參此二人不亦可乎公遂歸抱朴子曰太阿臨項長戟指心而操不可奪也又曰拙者得工輸之斤斧不能以成雲梯怯者得馮婦之刀戟不能以格兕虎蔣子曰士有一飡而倒戟義所驅也應璩詩曰丈夫要雄戟更來宿紫庭今者宅四海誰復有不并又曰郡國貪慕將馳聘習弓戟雖妙未更事難用應卒迫司馬相如上林賦曰曳明月之珠旗建干將之雄戟干將韓王劍師雄戟干將所造也左思吳都賦曰吳鉤越棘越鐵利故稱越棘也又曰羽旄揚蕤, SBCK: ''}
