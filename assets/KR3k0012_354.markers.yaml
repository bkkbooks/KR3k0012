  - {type: variant, offset: 1505, length: 239, content: 有闕輒簡選其差可者奉獻金鈴大戟五十張孫盛奏事曰諸違令私作鎧一領角弩力七石以上一張戟十枚以上皆棄市張載劍閣銘曰一人荷戟萬夫趑趄難行皃也李尤戟銘曰鼓戟之設以戒非常秉執操持邪暴是防須臾之忿終日為殃山陵之禍起於豪芒張協手戟銘曰錟錟音談雄戟清金練鋼名配越棘用過于將嚴鋒勁枝摛鍔耀芒魏文帝書曰漢中地形實為險固四嶽三塗皆不及也張魯有精鉀數萬臨高守要一夫揮戟千人不得進而我軍過之若駭鯨之決綱罟奔兕之觸魯縞未足以喻其易應瑒表曰長戟百萬胡馬千群應貞華覽曰強弩連城長戟指塞傅玄翰會賦曰流蘇粲粲華蓋重陰, SBCK: ''}
