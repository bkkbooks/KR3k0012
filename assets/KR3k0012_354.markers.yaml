  - {type: variant, offset: 3408, length: 0, content: '', WYG: 餘陣屢中重瘡計吾前後出血亦數斛矣何能不病乎及卒太宗甚傷惜乆之贈徐州都督陪葬于昭陵令所司於其塋内立石人馬以旌戰之功焉又曰哥舒翰為别將時吐蕃大㓂邊翰拒之于苦海吐蕃之衆三道從山相續而下翰持半段槍當其鋒逆擊之無不摧靡又擊其次軍復走之又擊其後軍皆大破由是知名天寶六載擢授右武衛將軍仍充隴右節度使副都知關西兵馬使河源軍使先是吐蕃每歳候麥秋即大掠積石軍前後不能禦至是翰使將王難得楊景輝等潜領兵候蕃至設伏以待之吐蕃五千}
  - {type: page-break, offset: 3408, content: '', id: KR3k0012_WYG_354-7a, image: WYG0896/WYG0896-0169c.png}
  - {type: variant, offset: 3409, length: 0, content: '', WYG: 旣至放馬脫甲翰以城中率驍勇合伏兵馳擊之殺畧盡百餘騎奔突得走王難得追擊之疋馬不還翰常逐馬驚墜于河立於水中吐蕃三人擬槍力刺之翰大呌之賊驚駭}
  - {type: page-break, offset: 3409, content: '', id: KR3k0012_WYG_354-7b, image: WYG0896/WYG0896-0169d.png}
  - {type: variant, offset: 3410, length: 4, content: 出如雲浮, WYG: 廢失槍而走救騎至賊便解散翰有家臣曰左車年十五每隨翰入陣翰善使槍追賊及以槍搭其肩而遏之賊驚顧翰從而刺其喉皆剔髙三五丈而墜左車輒下馬斬其首率以為常又曰王難得有膽力善騎射天寶元年正月吐蕃大㓂河源軍難得以騎將為軍鋒贊普有子曰琅支都恃其趫悍乘諳真馬寶鈿裝鞍軍前求較鬭者難得橫槍突徃刺殺之斬其首以其馬歸虜衆無敢}
  - {type: punctuation, offset: 3414, content: ，, id: KR3k0012_CHANT_354-bkkpn1123}
  - {type: 'tls:seg', offset: 3414, content: '', id: KR3k0012_CHANT_354-55a.17}
  - {type: variant, offset: 3416, length: 1, content: 十, WYG: 軍使以聞𤣥宗召至御殿問之因令馳突作殺琅支都狀壯之衣以錦􅂁拜左金吾衛羽林將軍五代晉史曰梁將有王彦章者勇力過人常執鐵槍重百斤所向辟易莊宗畏之鋋釋名曰鋋延也逹也去此至彼之言也方言曰矛呉揚江淮南楚五湖之間謂之鋋音蟬或謂之鏦漢書曰鏦殺吳王也其柄謂之鈐東都賦曰戈鋋彗雲注鋋小矛也鈎鑲音攘又音襄又音孃戎噐也釋名曰鈎鑲兩頭曰鈎中央曰鑲或推鈎推鑲或鈎引用之宜也東觀漢記曰詔令賜鄧遵金蚩尤辟兵鈎一又曰桓帝永興二年光祿勲府吏舍夜壁下忽有氣掘之得玉玦各有鈎長七寸三分玦周五寸四分身中皆有雕鏤漢名臣奏曰丞相薛宣奏漢興以來深考古義惟}
