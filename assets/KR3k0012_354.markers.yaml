  - {type: variant, offset: 893, length: 689, content: 穰苴介冑操戟立於門曰鋪薦蓆陳簠簋者有人臣不敢與焉又曰崔杼殺莊公盟諸大夫令有敢不盟者戟鉤其頸孫卿子曰雖有戈矛之戟不如恭儉之利與人善言煖於布帛傷人以言深於矛戟又曰狐父戈以钃牛愚莫甚焉钃徐玉切又曰鉏擾棘矜非錟音談於句戟長鎩也如淳曰長刃矛也又曰矛刃下有鐵上句曲然而成敗異變功業相反也尉繚子曰夫殺之五十步之內者誰也曰矛戟也韓子曰譬如劍戟愚人行忿則禍生聖人誅暴則福成淮南子曰孟夏之月南宮御女赤色衣赤采吹竽笙其兵戟高誘曰有披幹象陽布散也劉向新序曰趙簡子上羊腸之坂群臣皆偏袒推車而席會獨擔戟行歌簡子曰寡人上坂會獨不推車而侮其主者其罪何若會曰為人臣侮其主者其罪死而又死簡子曰何謂死而又死席會對曰身死妻子為戮謂之死而又死又曰齊景公遊海上樂之六月不歸令左右敢言歸者死顏歜諫曰君樂治海上不樂治國儻有治國者君且安得樂此海也公據戟將斫之歜撫衣而侍之曰君奚不斫也昔桀殺關龍逢紂殺王子比干君奚不斫以臣參此二人不亦可乎公遂歸抱朴子曰太阿臨項長戟指心而操不可奪也又曰拙者得工輸之斤斧不能以成雲梯怯者得馮婦之刀戟不能以格兕虎蔣子曰士有一飡而倒戟義所驅也應璩詩曰丈夫要雄戟更來宿紫庭今者宅四海誰復有不并又曰郡國貪慕將馳聘習弓戟雖妙未更事難用應卒迫司馬相如上林賦曰曳明月之珠旗建干將之雄戟干將韓王劍師雄戟干將所造也左思吳都賦曰吳鉤越棘越鐵利故稱越棘也又曰羽旄揚蕤金芒繁欽撰征賦曰左騎雄戟右攢干將兩都賦曰郎將司階虎戟交鎩音殺又曰周廬千列陛戟百重陶侃表曰伏惟武庫傾蕩宿衛有闕輒簡選其差可者奉獻金鈴大戟五十張孫盛奏事曰諸違令私作鎧一領角弩力七石以上一張戟十枚以上皆棄市張載劍閣銘曰一人荷戟萬夫趑趄難行皃也李尤戟銘曰鼓戟之設以戒, WYG: 雋快}
