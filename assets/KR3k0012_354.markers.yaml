  - {type: variant, offset: 349, length: 1, content: 為, SBCK: 舉鞭一時刺殺淹留半日文宣醉不能起黃門郎連子暢進曰陛下如此諸臣恐怖文宣曰大怖耶􅀂然不湏殺乃命解圍又曰北齊文宣於臺上以矟刺都督尉子輝應手而死靈􅀑志曰河間王顒旣敗於􅀜中有給使陳安甚壯徤常乗一赤馬儁快非常􅀟持二刀皆長七尺馳馬運刀所向披靡關西爲之歌曰壟上徤兒字陳安頭小靣狹腹中寛丈八長槊左右盤語林曰桓宣武與殷劉談不如甚喚左右取黃皮袴褶音十上馬持矟數廻或向劉或擬殷意氣始得雄王􅀓玄歌詩曰彎我繁弱弓弄我丈八矟一舉覆三軍再舉殄戎貃梁簡文帝馬槊譜序曰馬槊爲用雖非逺法近代相傳稍巳成藝鄧蔗縈魏后之庭武而猶質桓馬入丹陽之寺雄而未巧􅂓以餘暇復撰斯法搜採抑掦斟酌煩簡至如春亭落景秋臯晚淨青霜旦盡宻雨􅀄晴纎驪沃􅀂天馬半漢盼金精而轉態交流汗血愛連乾而息影不畏衣春鏤衢與白刄爭暉翆眊與紅塵俱動足使武夫憤氣觀者衝冠巴童留玩不待輕舟之檝越女踟蹰無假如皐之箭槍風俗通曰刻葦傷盗爲槍宋元嘉起居注曰謝靈運自理表云及經山隂防禦彰赫彭排馬槍斷截衢巷衛公兵法曰聽角聲第一聲絶諸隊即一時散立第二聲絶諸隊一時捺槍卷幡張弓抜刀第三聲絶諸隊一時舉槍第四聲絶諸隊一時籠槍跪􅂰坐唐書曰郯國公羅士信容皃短小而驍勇絶倫隋末賊起士信始年十四爲通守張湏陁執衣遇翟讓來冦士信請自効湏陁小之曰}
