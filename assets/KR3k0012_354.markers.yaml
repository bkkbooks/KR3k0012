  - {type: variant, offset: 3424, length: 1, content: 交, WYG: 秦記曰藏鈎因鈎弋夫人世人法之也瑞應圖曰湯都于亳有神人牽白狼口衘銅鈎入湯庭捜神記曰京兆長安有張氏者晝獨處室有鳩自外入張氏惡之披懷而祝曰鳩之來為我禍耶飛上承塵為我福耶來入我懷鳩飜入懷以手探則不知鳩之所在而得一金帶鈎焉遂寶之自是之後子孫昌盛有為必偶貨財萬倍蜀客賈至長安中聞之乃厚賂内婢婢乃竊鈎以與蜀客張氏}
