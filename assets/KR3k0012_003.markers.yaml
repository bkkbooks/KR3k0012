  - {type: variant, offset: 151, length: 446, content: 星辰雷霆風雨也地之平水火金木土也人之情思慮聰明喜怒也列子曰杞國有人憂天崩墜身亡所寄廢於寢食又有憂彼憂者因曉之曰天積氣耳若屈伸呼吸終日在天中行止奈何憂崩墜乎其人曰果積氣日月星辰不當墜耶曉者云日月星辰亦積氣之光耀者也長盧子聞而笑曰虹蜺也雲霧也風雨也四時也此積氣之成乎天者也知積氣也何以不壞夫天地空中之細物有中之最巨也難窮終始此固然矣憂其壞者亦為遠大言不壞者亦為未是天地不得不壞之則會歸於壞時奚為不憂哉列子聞而笑曰天地壞亦謬矣言不壞亦謬矣壞與不壞吾所不知也雖然彼一也此一也故生不知死死不知生來不知去去不知來壞與不壞吾何容心哉又曰湯問夏革曰四海之外奚有乎曰猶齊州也湯曰汝奚以實之革曰朕東行至營人民猶是也問營之東復猶營也西行之豳民人猶是也問豳之西復猶豳也朕以是知四海四荒四極之外不異是也故大小相含無窮極也含萬物者亦如含天地含天地者亦如含萬物含萬物也故不窮含天地之表故無極朕亦焉知天地之表不有大天地者乎亦吾所不知也天地亦物物有不足故昔者女媧氏選五色之石以補闕斷鼇之足鼇巨龜也以立四極其後共工氏與顓頊爭為帝, krp: ''}
