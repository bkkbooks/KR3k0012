  - {type: variant, offset: 654, length: 1, content: 師, SBCK: 聞也旣入而暵暵者民保其福也旣去而暗暗者民失其教也文王曰受命矣又曰學聖王之道譬之如日静居而獨思譬其􅀂火夫捨學聖主之道而静居獨思譬其去日之明於庭而就火之光於室也然可以小見不可以大知山海經曰東海之外甘泉之間有羲和國有女子名羲和爲帝俊之妻是生十日常浴日於甘泉郭璞注羲和能生日也故曰爲羲和之子堯因是立羲和之官以主四時又曰日浴温源谷温源即湯谷也湯浴上於扶桑扶桑在上一日方至一日方出言交會}
  - {type: variant, offset: 654, length: 1, content: 師, krp: 聞也旣入而暵暵者民保其福也旣去而暗暗者民失其教也文王曰受命矣又曰學聖王之道譬之如日静居而獨思譬其若火夫捨學聖主之道而静居獨思譬其去日之明於庭而就火之光於室也然可以小見不可以大知山海經曰東海之外甘泉之間有羲和國有女子名羲和爲帝俊之妻是生十日常浴日於甘泉郭璞注羲和能生日也故曰爲羲和之子堯因是立羲和之官以主四時又曰日浴温源谷温源即湯谷也湯浴上於扶桑扶桑在上一日方至一日方出言交會}
  - {type: variant, offset: 656, length: 4, content: 傳宣夜說, SBCK: 代也皆戴於烏日中有三足烏又曰明星山日月所出又曰􅂫門日月所出又曰湯谷上有扶木即扶桑十日所浴此浴水中有大木九日居上枝昔堯使羿仰射九日盡墜死汲􅃁書日本有十日迭次而出運照無窮堯時爲妖十日並出故爲射所死又曰夸父逐日扶飲河渭不足北飲大澤未至道渇而死棄其杖化爲鄧林又曰􅔩山神蓐収居之是山也西望日之所入其氣圎日形圎故其氣象亦然神經光之所司也太􅀇經曰日動而東天動而西天日錯行隂陽更巡錯違也巡行也又曰日一南而萬物死日一北而萬物生升北而萬物虚升南而萬物􅄹升之南也右行而左還升之北也左行而右還或左或右或死或生纂要}
