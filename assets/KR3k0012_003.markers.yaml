  - {type: variant, offset: 647, length: 2, content: 書亡, WYG: 中有谷曰温源谷温源即湯谷也湯谷上有扶木扶桑在上一日方至一日方出言交㑹相代也皆載於烏中有三足烏又曰明星山日月所出又曰猗天山蘇門山日月所出又曰湯谷上有扶桑扶桑木也十日所浴九日居下枝一日居上枝又曰夸父逐日渇飲河渭不足北飲大澤未至道渇}
