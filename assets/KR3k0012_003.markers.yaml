  - {type: variant, offset: 5050, length: 190, content: 就夏歷晷景去極之法以為率也王蕃渾天說曰渾天遭周秦之亂師徒斷絕而喪其文唯渾儀常在候臺是以不廢故其楊搉可得而言至於纖微委曲闕而不傳蔡邕以為精微深妙百世不易之道楊子法言曰或問渾天曰落下閎營之鮮于望人度之耿中丞象之請問蓋天曰蓋哉未幾也李軌注曰幾近桓子新論曰揚子雲好天文問之於黃門作渾天老工曰我少能作其事但隨尺寸法度殊不曉達其意後稍稍益愈到今七十乃甫適知已又老且死矣今我兒子愛學作之亦當復年, SBCK: ''}
