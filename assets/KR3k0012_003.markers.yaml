  - {type: page-break, offset: 622, content: '', id: KR3k0012_SBCK_003-6a}
  - {type: variant, offset: 622, length: 0, content: '', WYG: 山名言將欲𠖇下蒙悉舂故曰下舂爰止羲和爰息六螭是謂懸車六螭即六龍也薄於虞泉是謂黄昏淪于蒙谷是謂定昏日入崦嵫經細桞細桞西方之野入虞泉之池曙於蒙谷之浦蒙谷蒙汜之水西垂景在樹端謂之桑榆言其光在桑榆樹上又日中有踆七論切烏踆者趾也謂三足烏又若木在建木西末有十日其華照地髙誘注曰末端也若木端有十日狀如連珠華光照其下地又日者陽之主是以春夏則羣獸除角又堯時十日並出草木焦枯堯命羿仰射十日其九烏皆死墮羽翼又曰積陽之熱氣生火火氣之精者為日列子曰宋有田夫曝日於野美之不識廣厦綿縞之屬謂其妻曰吾負日之暄以獻吾君將獲重賞又穆王駕八駿之乘西觀日所入處又日積氣之中有光耀者又孔子晨遊見兩小兒爭辯而鬭孔子問其故一兒曰我以日始出時去人近日中時去人逺一兒曰我以為日初出時逺而日中時近曰爾何以知曰日初出大如車輪及中纔如盤盂此不為逺者小而近者大乎一兒曰日初出蒼蒼涼涼及其中如探湯此不為近者熱而逺者涼乎孔子不能决兩兒笑曰孰謂汝多知乎文子曰日出於地萬物蕃息尸子曰日五色陽之精象君徳也五色照耀君乘土而王又少昊金天氏邑於窮桑日五色互照窮桑又聖人以日圓盈尺光滿天下聖人居室而所燭彌綸六合又火在井中不能燭逺目在足下不可以視遠君之於國也猶天之有日居不髙則不明視不尊則不逺又聖人身猶日也夫日圜尺光盈天地聖人之身小其所燭逺矣任子曰}
