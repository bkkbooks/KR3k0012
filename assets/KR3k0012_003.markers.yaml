  - {type: variant, offset: 9, length: 12, content: 天得一以清天無以清將恐裂, SBCK: 昭王其不失國也冝哉爾雅曰􅀌竹北户西王母日下謂之四荒也郭璞注曰日下在四方昬荒之國也}
  - {type: variant, offset: 9, length: 2, content: 天得, WYG: 昭王其不失國也宜哉爾雅曰觚竹北户西王母日下謂之四荒也郭璞注曰日下在西方昏荒之國也又岠齊州以南戴日為丹穴岠去也齊中也東至日所出為泰平西至日所入為泰蒙易坤靈圖曰至徳之萌日月若連璧易叅同契曰日為流珠青龍之俱日為陽陽精為流珠青龍東方少陽也尚書考靈曜曰黑帝亡二日並照又仲春仲秋日出於卯入於酉仲夏日出於寅入於戌仲冬日出於辰入於申又日光臨照四十萬六千里春秋感精符曰羣臣恣則日黄無光羣臣爭則日裂人主排斥則日夜出春秋元命苞曰陽數起於}
