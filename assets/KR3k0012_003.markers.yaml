  - {type: variant, offset: 4383, length: 342, content: 方圓之丘祭天地則知乾坤有方圓體也荅曰郊祭大報天而主日配日月形圓圓立似之非天體也祭方者別之於天尊卑異位何足怪哉周髀之術多是蓋天蓋天雖與渾異而星辰有常數今陳氏見髀上觀周因言周渾周髀宣夜或人姓名猶星家有甘石也蓋天之體轉四方地卑不動天周其上故云周髀宣明也夜幽之數其術兼之故云宣夜賀道養渾天記曰昔記天體者有三渾儀莫知其始書以齊七政蓋渾體也二曰宣夜夏殷之法也三曰周髀當周髀之所造非周家術也近世復有四術一曰方天興於王充二曰軒天起於姚信三曰穹天由於虞喜皆以抑斷浮說不足觀也唯渾天之事徵驗不疑晉陽秋曰吳有葛衜字思真改作渾天使地居中以機轉之天轉而地止衜古道字義熙起居注曰十四年相國表曰間者平長安獲張衡所作渾儀土圭歷代寶器謹遣奉送歸之天府梁書曰陶弘景嘗造渾天象高三尺許地居中央天轉而地不動以機動之悉與天相會, SBCK: 光}
