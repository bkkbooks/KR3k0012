  - {type: variant, offset: 622, length: 0, content: '', SBCK: 山名言將欲冥下蒙悉春故曰下春爰上羲和爰息六螭是謂懸車日乗車駕以六龍羲和衘之日至此而薄於虞泉羲和至此而廻六螭即六龍也薄於虞泉是謂黃昏淪于蒙谷是謂定昬日入崦音淹嵫音兹示日落甞山經細栁細栁西方之野入虞泉之池􅍼於蒙谷之浦蒙谷蒙汜之水日西垂景在樹端謂之桑榆言其光在桑榆樹上又曰日中有踆七論切烏踆者趾也謂三足烏又曰􅀂木在建木西末有十日其華照地髙誘注曰末端也􅀂木端有十日􅃺如連珠華光照其下地又曰日者陽之主是以春夏則群獸除角又曰堯時十日並出草木穛枯堯命羿仰射十日其九烏皆死墮羽翼又曰日積陽之􅀬氣生火火氣之精者爲日列子曰宋有田夫曝日於野羙之不識廣厦綿縞之屬謂其妻曰吾􅀒日之暄以獻吾君將獲重賞又曰穆王駕八駿之乗西觀日所入處又曰日積氣之中有光耀者又曰孔子晨遊見兩小兒争辯而􅃲孔丘問其故一兒曰我以日始出時去人近日中時去人逺一兒曰我以爲日􅀄出時逺而日中時近曰爾何以知曰日􅀄出大如車輪及中􅂊如盤蓋此不爲逺者小而近者大乎一兒曰日􅀄岀滄滄涼涼及其中如􅊥湯此不爲近者􅀬而逺者凉乎孔子不能决兩兒􅀏曰丘孰謂汝多知乎文子曰日出於地萬物蕃息尸子曰日五色至陽之精象君徳也五色照耀君乗土而王又曰少昊金天氐邑於窮桑日五色㸦照窮桑又曰聖人以日圎光􅄹尺光滿天下聖人居室而所燭彌綸六合又曰火在井中不能燭逺目在足下不可以視近君之於國也猶天之有日居不髙則不明視不尊則不逺又曰聖人身猶日也夫日圜尺光􅄹天地聖人之身小其所燭逺矣任子曰}
