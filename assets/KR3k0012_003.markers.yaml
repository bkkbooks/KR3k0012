  - {type: variant, offset: 9, length: 12, content: 天得一以清天無以清將恐裂, krp: 昭王其不失國也冝哉爾雅曰孤竹北户西王母日下謂之四荒也郭璞注曰日下在四方昬荒之國也}
  - {type: variant, offset: 12, length: 12, content: 以清天無以清將恐裂又曰域, WYG: 成於三故日}
