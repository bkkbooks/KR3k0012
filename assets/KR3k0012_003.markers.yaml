  - {type: variant, offset: 648, length: 1, content: 亡, SBCK: 曰周文王問鬻子曰敢問君子將入其職則於其民何如對曰君子將入其職則於其民也旭旭然如日之始岀也旣入其職則於其民暵暵音漢然如日之正中也旣去其職於其民也暗暗然如日之巳入也故君子將入}
