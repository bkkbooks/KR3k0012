  - {type: variant, offset: 2, length: 0, content: '', krp: 三日上說文云日者寳也太陽之精不虧字從口一象形也又君象也易曰离爲日又曰日中則􅉴又曰日以烜之又曰日月運行一寒一暑又曰隂陽之義配日月又曰懸象著明莫大乎日月又曰日月之道貞明者也又曰日中爲市致天下之民聚天下之貨又曰日徃則月來月往則日來日月相推而明生焉又曰日􅉴之離不鼓缶而歌則大耋之嗟凶又曰豐卦曰豐亨王假之勿憂冝日中宜照天下也以勿憂之德故冝照天下又曰日月麗乎天又曰日月得天而能乆照書曰寅賔出日平秩東作日中星鳥以殷仲春又曰日永星火以正仲夏日短星昴以正仲冬又曰寅餞納日平秩西成詩曰其雨其雨杲杲出日又曰謂予不信有如晈日又曰嗈嗈鳴鴈旭日始旦又曰日之夕矣羊牛下來又曰日居月諸胡迭而微又曰日出東方照臨下土又曰春日遲遲采蘩祁祁禮曰}
