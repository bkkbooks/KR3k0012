  - {type: variant, offset: 4183, length: 171, content: 三家渾蓋之術具存而宣夜之法絕滅有意續之而未遑也近見姚元道造昕天論又覩族祖河間立穹天摸鄙意多嫌喜以為天高無窮地深不測地居卑靜之體則天有常安之象形相覆冒無方圓之義渾蓋之家依易立說云天運無窮或謂渾然苞地或謂渾然而蓋愚謂若必天裹地似卵中黃則地是天中一物聖人何別為名而配天乎古之遺語日月行於飛谷謂在地中也不聞列星復流於地又飛谷一道何以容此且谷有水體日為, SBCK: ''}
