  - {type: variant, offset: 779, length: 3218, content: 遲疾任性若綴附天體不得爾也又曰良將剛則法天可望而不可干柔則象淵可觀而不可入淮南子曰四時天之吏日月天之使星辰天之期虹蜺彗星天之忌又曰天有九野九千九百九十里隅去地五萬里楊子法言曰唯天為聰唯天為明夫能高其目而下其耳者匪天也夫又曰或問天曰吾於天歟見無為之為矣或曰雕刻眾形者匪天歟曰以其不雕刻也如物刻而雕之焉得力而給諸又曰天可度則覆物淺矣申子曰天道無私是以恒正天常正是以清明管子曰天或維之地或載之莫之維天已墜矣况於人乎曾子曰單居離問曾子曰天圓而地方誠有之乎曾子曰天之所生上首地之所生下首上首之謂圓下首之謂方始識天圓而地方則是四角之不揜也參嘗聞之夫子曰天道曰圓地道曰方方曰幽圓曰明明者吐氣是故外景幽者含氣是故內景墨子曰飄風苦雨溱溱而至此天之所以罰百姓不上同於天也孔叢子曰魏王問子順曰寡人聞昔者上天神異后稷而為之下嘉穀周遂以興呂氏春秋曰天道圓地道方聖人所以立天下天圓謂精氣圓通周復無雜故曰圓地方謂萬物殊形皆有分職不能相為故曰方主執圓臣處方方圓不易國乃昌又曰天地車輪輪轉也終則復始極則復反又曰天地大矣生而不子成而不有萬物皆被其澤得其利而莫知其所由始三皇五帝之德也又曰天有九野何謂九野中央曰鈞天東方曰蒼天尚書考靈耀曰皋天廣雅曰上天東北方曰變天北方曰玄天西北方曰幽天西方曰皓天尚書考靈耀曰廣雅皆曰成天西南方曰朱天南方曰炎天尚書考靈曜曰赤天南東方曰陽天太玄經曰九天一為中天二為羨天三為順天四為更天五為晬天六為廊天七為咸天八為沉天九為成天又曰天以不見為玄地以不形為玄人以心腹為玄天奧西北鬱化精也地奧黃泉隱營魄也人奧思慮含至精也說苑曰齊景公問子貢曰仲尼賢乎曰賢又問曰奚若曰不知也公怪之子貢曰今謂天高無少長賢愚皆知若問其高幾何皆曰不知仲尼之賢猶天之高也奚得以知又曰臣事仲尼猶執柸就江海飲莫知淺深也又曰齊桓公問管仲曰王者何貴對曰貴天桓公仰視天管仲曰所謂天者非謂蒼蒼莽莽之天也居人上者以百姓為天蔡邕天文志曰言天體者有三家一曰周髀二曰宣夜三曰渾天宣夜之學絕無師法周髀術數具存驗天狀多所違失故史官不用惟渾天者近得其情今史官所用候臺銅儀則其法也立八尺圜儀之度而具天地之象以正黃道名察發歛以行日月以步五緯精微深妙百世不易之道異苑曰陶侃夢飛翔沖天天門九重已入其八餘一門不得進以翼搏天一翅致折驚而墜下左腋腫痛後威果振主欲有闚擬之志每憶折翅之祥抑心而止徐整三五曆紀曰天地渾沌如雞子盤古生其中萬八千歲天地開闢陽清為天陰濁為地盤古在其中一日九變神於天聖於地天日高一丈地日厚一丈盤古日長一丈如此萬八千歲天數極高地數極深盤古極長後乃有三皇數起於一立於三成於五盛於七處於九故天去地九萬里廣雅曰太初氣之始也清濁未分太始形之始也清者為精濁者為形太素質之始也已有素朴而未散也三氣相接剖判分離清濁為天地又曰天圓廣南北二億三萬三千五百里七十五步東西短減四步周六億十萬七百里二十五步從地至天一億一萬六千七百八十一里半下地至厚與天高等又曰南方曰炎天西南方曰朱天西方曰成天西北方曰幽天北方曰玄天東北方曰變天東南方曰陽天中央曰鈞天東方曰上天謂之九天九天之際曰九垠垠堮也九天之外曰次九垓垓階也言其階次九也纂要曰天地四方曰六合四方上下謂之宇古往今來謂之宙白虎通曰男女惣名為人天地所以無惣名何天圓地方不相類也天左旋地右周猶君臣陰陽相向也又曰天所以有災變何所以謹告人君覺悟其過欲令悔慎思慮也黃帝素問曰積陽為天故曰清陽河圖挺佐輔曰百世之後地高天下不風不雨不寒不暑民復食土皆知其母不知其父如此千歲之後而天可倚杵洶洶隆隆曾莫知其始終汲冢紀年書曰懿王元年天再旦於鄭東方朔神異經曰崑崙有銅柱焉其高入天謂之天柱皇覽冢墓記曰好道者言黃帝乘龍升雲登朝霞上至列闕倒影天體如車有蓋日月懸著何有可上哉張衡靈憲曰天有九位自地至天一億萬六千二百五十里懸天之晷薄地之儀皆千里而差一寸孫氏瑞應圖曰舜時后稷播植天降秬秠故詩曰天降嘉種惟秬惟秠秬音巨秠音丕論衡曰天門在西北又日月五星隨天而西移行遲天耳譬若磑石之上行蟻蟻行遲磑轉疾內雖異行外猶俱轉又曰天行六十五度凡積十三萬里也其行甚疾無以為驗儻與陶鈞之運弩矢之流相類似乎又曰天平與地無異若覆盆之狀洛書甄耀度曰周天三百六十五度四分度之一夫一度為千九百三十二里則天地相去十七萬八千五百里關令內傳曰天地南午北子相去九千萬里東卯西酉亦九千萬里四隅空相去九千萬里天去地四十千萬里又曰天有五億五萬五千五百五十里地亦如之各以四海為脈伏侯古今注曰成帝建始三年七月夜有黃白氣長十餘丈明照地或曰天裂或曰天劍五經通義曰神之大者昊天上帝即耀魄寶也又曰天皇大帝亦曰太一又曰其佐曰五帝東方青帝靈威仰南方赤帝赤熛怒西方白帝白招拒北方黑帝汁光紀中央黃帝含樞紐又曰天所以有雷霆風雨霜雪霧露何欲以成歲潤萬物因以見災異也鄒衍大言天事號談天衍虞昺穹天論曰天形穹隆如笠而冒地之表浮元氣之上譬覆奩以抑水