  - {type: variant, offset: 27, length: 0, content: '', krp: 分度之一言陽布散立數合一故立字四合其一又曰日左行周天二十三萬里又曰七政度日月明春秋内事曰日者陽徳之母也禮統曰日者實也形躰光實人君之象禮斗威儀曰政太平則日五色政頌平則日黃中而赤暈政和平則日黄中而黒暈政象平則日黄中而白暈政升平則日黃中而青暈孝經援神契曰天地至貴精不兩明注天精爲日地精爲月又曰日中則光溢又曰日神五色明照四方又曰黃氣抱日輔臣忠德至於天日抱戴易傳曰聖王在上則日光明五色而備又曰日者衆陽之精内明玄黄五色無主以象人君精精似青翼翼似黒玄玄似赤縞縞似白煌煌似黃光照無主不可以一色名也劉向洪範傳曰日者照明之}
