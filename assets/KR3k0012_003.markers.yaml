  - {type: variant, offset: 3, length: 0, content: '', SBCK: 月中氣祀朝日於東郊又曰􅀇端而朝日於東門之外又曰}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 月中氣祀朝日於東郊又𤣥端而朝日於東門之外又}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_WYG_003-3a, image: WYG0893/WYG0893-0056c.png}
  - {type: variant, offset: 3, length: 0, content: '', krp: 月中氣祀朝日於東郊又曰玄端而朝日於東門之外又曰}
  - {type: variant, offset: 4, length: 3, content: 部下老, SBCK: 無二日土無二王又曰季冬是月也日窮于次月窮于紀言運行周匝於故處次舎也紀猶㑹也又曰五月中氣是月也日長至十一月日短至周禮周官曰眂祲掌十輝之法以觀祅祥辨􅁻凶祅祥善惡之徴鄭司農云煇謂日光炁也一曰祲二曰象三曰䥴四曰􅁥五曰闇六曰瞢七曰彌八曰叙九曰隮十曰想祲隂陽氣相侵也象如赤鳥也鐫謂日旁氣四面反鄉如煇狀􅁥雲氣臨日也闇日月食也瞢瞢無光也弥者白虹弥天也叙者雲有次序如山在日上也隮者升氣也想者耀光者也又曰大司徒以土圭之法測土􅀷淺正日景以求地中日􅀯則景短多暑日北則景長多寒傳曰酆舒問於賈季曰趙衰趙盾孰賢對曰趙衰冬日之日也趙盾夏日之日也注曰冬日可愛夏日可畏又哀公六年楚有雲如衆赤烏夾日以飛三日楚子使問周太史曰其當王身􅀂禜之可移於令尹司馬王曰移腹心之疾置之肱股何益王弗禜而死孔}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_003-2b}
  - {type: variant, offset: 4, length: 3, content: 部下老, WYG: 無二日土無二王又季冬是月也日窮于次月窮于紀又五月中氣是月也日長至十一月日短至周禮春官眡祲掌十煇之灋以觀妖祥辨吉凶一曰祲二曰象三曰䥴四曰監五曰闇六曰瞢七曰彌八曰叙九曰隮十曰想又大司徒以土圭之法測土深正日景以求地中日南則景短多暑日北則景長多寒傳曰酆舒問於賈季曰趙衰趙盾孰賢對曰趙衰冬日之日也趙盾夏日之日也注曰冬日可愛夏日可畏又哀公六年楚有雲如衆赤鳥夾日以飛三日楚子使問周太史曰其當王身若禜之可移於令尹司馬王曰除腹心之疾置之股肱何益王弗禜而死孔}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_WYG_003-3b, image: WYG0893/WYG0893-0056d.png}
