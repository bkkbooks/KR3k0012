  - {type: variant, offset: 5533, length: 242, content: 皇帝韋昭曰敷陳聖劉之德也漏刻以百二十為度韋昭曰舊漏晝夜共百刻今增其二十也續漢書律曆志曰建武十年詔施行漏刻以日長短為數率日南北二度四分而增成一刻一氣永元十年太史霍融上言官漏刻率九日增減一等不與天相應不如夏曆東觀漢記曰樊梵每當直事常晨駐車待漏漢雜事曰鼓以動眾鉦以止眾夜漏盡鼓鳴則起晝漏盡鉦鳴則息吳錄曰吳範字文則善占候知風氣關羽將降孫權問範範期日中權立表下漏以待之及中不至權問其故範曰未正中也頃之有風動帷範曰羽至矣斯須外稱萬歲傳言得羽齊書曰武帝時宮內深隱不聞端門鼓漏聲置鐘於景陽樓上應五鼓及, SBCK: 御覽卷第}
