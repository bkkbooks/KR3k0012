  - {type: variant, offset: 28, length: 0, content: '', SBCK: 表光景之大紀群陽之精衆貴之象也故曰日出而天下光明日入而天下􅁳晦此其効也故日者天之象君父夫兄之􅀋中國之應也明王之踐位群賢履職天下和平􅀺民康寜則日麗其精明揚其景耀抱珥重光以見􅁻祥君獲慶賀劉昭㓜童傳曰晉明帝諱紹元帝子􅀄元帝爲江東都督鎮揚州時中原䘮亂有人從長安來帝問洛下消息澘然流涕帝年數歳問泣故具以東渡意告之因問帝汝意謂長安何如日逺荅曰不聞人從日邊來只聞人從長安來居然可知帝異之明日集群臣宴㑹說以此荅明帝又以爲日近帝動容問何故異昨日之言荅曰舉頭不見長安只見日以是知近帝大恱搜神記曰呉孫堅夫人懷孫䇿夢日月入懷解}
