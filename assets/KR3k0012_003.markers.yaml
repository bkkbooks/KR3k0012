  - {type: variant, offset: 23, length: 1, content: 域, SBCK: 岠齊州以􅀯戴日爲丹穴岠去也齊中也東至日所出爲太平西至日所入爲太蒙即蒙汜也易坤靈圖曰至徳之萌日月若連璧易叅同契曰日爲流珠青龍之俱日爲陽陽精爲流珠青龍東方少陽也尚書考靈曜曰黒帝亡二日並照又曰仲春仲秋日出於夘入於酉仲夏日出於寅入於戍仲冬日岀於辰入於申又曰日光照四十萬六千里春秋感精符曰群臣恣則日黃無光羣臣爭則日裂人主排斥則日夜岀春秋元命包曰陽數起於一成於二故日}
  - {type: page-break, offset: 23, content: '', id: KR3k0012_SBCK_003-3a}
  - {type: variant, offset: 23, length: 1, content: 域, krp: 岠齊州以南戴日爲丹穴岠去也齊中也東至日所出爲太平西至日所入爲太蒙即蒙汜也易坤靈圖曰至徳之萌日月若連璧易叅同契曰日爲流珠青龍之俱日爲陽陽精爲流珠青龍東方少陽也尚書考靈曜曰黒帝亡二日並照又曰仲春仲秋日出於夘入於酉仲夏日出於寅入於戍仲冬日岀於辰入於申又曰日光照四十萬六千里春秋感精符曰群臣恣則日黃無光羣臣爭則日裂人主排斥則日夜岀春秋元命包曰陽數起於一成於二故日}
  - {type: variant, offset: 26, length: 0, content: '', SBCK: 三足烏又曰一歳三百六十五日}
  - {type: variant, offset: 26, length: 0, content: '', WYG: 三足烏又一嵗三百六十五日}
  - {type: variant, offset: 26, length: 0, content: '', krp: 三足烏又曰一歳三百六十五日}
  - {type: variant, offset: 27, length: 0, content: '', SBCK: 分度之一言陽布散立數合一故立字四合其一又曰日左行周天二十三萬里又曰七政度日月明春秋内事曰日者陽徳之母也禮統曰日者實也形躰光實人君之象禮斗威儀曰政太平則日五色政頌平則日黃中而赤暈政和平則日黄中而黒暈政象平則日黄中而白暈政升平則日黃中而青暈孝經援神契曰天地至貴精不兩明注天精爲日地精爲月又曰日中則光溢又曰日神五色明照四方又曰黃氣抱日輔臣忠德至於天日抱戴易傳曰聖王在上則日光明五色而備又曰日者衆陽之精内明􅀇黄五色無主以象人君精精似青翼翼似黒􅀇􅀇似赤縞縞似白煌煌似黃光照無主不可以一色名也劉向洪範傳曰日者照明之}
  - {type: page-break, offset: 27, content: '', id: KR3k0012_SBCK_003-3b}
  - {type: variant, offset: 27, length: 0, content: '', WYG: 分度之一言陽布散立數合一故立字四合其一又日左行周天二十三萬里又七政度日月明春秋内事曰日者陽徳之母也禮統曰日者實也形體光實人君之象禮斗威儀曰政太平則日五色政公平則日黄中而赤暈政和平則日黄中而黒暈政象平則日黄中而白暈政升平則日黄中而青暈孝經援神契曰天地至貴精不兩明注天精為日地精為月又日中則光濫又日神五色明照四方又黄氣抱日輔臣忠徳至於天日抱戴易傳曰聖王在上則日光明而五色備又日者衆陽之精内明𤣥黄五色無主以象人君精精似青翼翼似黒𤣥𤣥似赤縞縞似白煌煌似黄光照無主不可以一色名也劉向洪範傳曰日者昭明之}
