  - {type: variant, offset: 5776, length: 203, content: 鼓宮人聞鐘聲早起粧飾後魏書曰自魏初大將行兵長孫嵩拒宋武奚斤征河南獨給漏刻隋書曰耿詢作馬上刻漏世稱其妙煬帝即位進欹器帝善之東方朔別傳曰武帝常飲酎以八月九月中禾稼方盛熟夜漏下水十刻微行乃出桓子新論曰漏刻燥濕寒溫輒異度晝日參以晷景暮夜參以星宿則得其正陸機漏賦曰激懸泉以遠射跨飛途而遙集伏陰蟲以承波吞絙流其如挹王廙洛都賦曰挈壺司刻漏樽瀉流仙叟秉尺隨水沉浮孫綽漏刻銘曰累筒三階積水成淵器滿則盈承虛赴下靈虬吐注陰蟲承瀉, SBCK: ''}
