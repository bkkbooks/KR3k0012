  - {type: variant, offset: 624, length: 5, content: 星辰就焉地, SBCK: 爲天下眼目人}
  - {type: variant, offset: 624, length: 2, content: 星辰, WYG: 為天下眼目人不知徳山川為天下衣食人不能謝符子曰盛魄重輪六合俱照非日月能乎吕氏春秋曰白水之南建木之下日中無影盖天地中也賈誼書曰周文王問鬻子曰敢問君子將入其職則於其民何如對曰君子將入其職則於其民也旭旭然如日之始出也既入其職則於其民也暵暵然如日之正中也既去其職則於其民也暗暗然如日之已入也故君子將入而旭旭者義先聞也既入而暵暵者民保其福也既去而暗暗者民失其教也文王曰受命矣暵音漢又曰湯曰學聖王之道譬其如日靜居而獨思譬其若火夫捨學聖王之道而靜居獨思譬其去日之明於庭而}
