  - {type: variant, offset: 2476, length: 118, content: 今鱓之與虵蠶之與蠋狀相類而愛憎異人愛鱓與蠶畏虵與蠋故曰異也抱朴子曰田地既有自然之鱓而有荇莁芩根土龍之屬化為鱓韓子曰䱉似虵而漁者取䱉而畏虵利之所在皆為賁盲顏氏家訓曰江陵劉氏以賣鱓羹為業後生一兒頭目是鱓自頸已下方為人耳又曰後漢書云鸛雀銜三鱓, SBCK: 虎}
