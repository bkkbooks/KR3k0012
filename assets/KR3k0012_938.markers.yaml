  - {type: variant, offset: 203, length: 179, content: 也薄而厚味宓子賤曰善具釣部宋玉釣賦曰左挾魚罶右執橋竿精不離乎魚喙思不出平鮒鯿鱮魚毛詩曰其釣維何惟魴及鱮音敘毛詩義䟽曰鱮似魴而大頭魚之不美者故里語曰買魚得鱮不如啖茹徐州謂之鰱音連或謂之鮦水經曰沔水北流注于漢漢水又左得度口水出陽平北水山有二源一曰清檢出佳鱮二曰濁撿出好鮒常以二月取之美珍常味潘岳西征賦曰素鱮楊鬐儵魚爾雅曰鮂黑鰦郭僕注曰即白儵也江東呼為鮂因茲二音莊, SBCK: 程夲}
