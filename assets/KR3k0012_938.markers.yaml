  - {type: variant, offset: 2241, length: 233, content: 陣之中恐魚多壓沉故也即可以知其多矣鱓魚䱇同音善山海經曰大樂之野夏后啟於此舞九代焉女祭女戚在其北居兩水間戚操魚䱇䱇魚屬也祭操俎肉祀也汲冢周書王會曰甌人食鱔虵鱓虵順食之美東越甌人也此交州虵特多為上珍謝承後漢書曰楊震常客於湖不荅州郡禮命數十年眾人謂之晚貴而震志愈篤後有鸛雀銜三鱣魚飛集講堂前都講取魚進曰虵鱣者卿大夫服之象也數三者法三台也先生自此升矣時年過五十乃始仕州郡梁書曰邵陵王綸攝南徐州事遨遊市里雜於廝隸嘗問賣䱇者曰刺史何如對者言躁虐綸怒令吞䱇以死百姓惶駭道路以目淮南, SBCK: 范}
