  - {type: variant, offset: 433, length: 599, content: 樂耶惠子曰我非子故不知子矣子固非魚也子之不知魚全矣山海經曰帶山茈葫之水其中多儵魚其狀如鷄而赤毛三尾六足四首其音如鵲食之已憂又圖經讚曰汩和損慘乎莫慘於憂詩詠萱草山經則儵儔二音何敬祖詩曰屬耳聽鳴鶯流目玩儵魚鯊魚爾雅曰鯊鮀郭璞曰今吹沙小魚體圓而有點文也沙陁二音毛詩魚麗曰魚麗于罶鱨鯊鯊鮀也廣志曰吹沙魚大如指沙中行鱨魚毛詩曰魚麗于罶鱨鯊鱨楊也音常毛詩義䟽曰鱨一名楊今黃頰魚是身形厚而長大頰骨正黃鮒魚周易井卦曰井谷射鮒王肅注曰鮒小魚也廣雅曰鯖鮒也莊子曰莊周家貧往貸粟於監何侯侯曰我將得邑今貸子二百金可乎莊周忿然曰周昨來有中道而呼者周視車轍中有鮒魚焉曰我東海之波臣也君豈有升斗之水而活我哉周曰諾我且南遊吳越之王激西江之水而迎之可乎鮒魚忿然作色曰吾得升斗之水可活耳君乃言此不如早索我於枯魚之肆又曰夫揭竿累趣灌竇守鯢鮒其於得大魚難矣呂氏春秋曰魚之美者有洞庭之鮒說苑曰魏楚會於晉陽將以伐齊齊王患之使人召淳于髡曰魏楚欲伐齊願先生共寡人憂之髡曰臣見鄰人之祠田也以一篋飯與一鮒魚其祝曰下田洿邪得穀百車臣笑其所祠者少所求者多王曰善立為上卿神異經曰東南海中有恒洲有溫湖鮒魚生焉長八尺食之宜暑而辟風寒盛弘之荊州記曰荊州有美鮒踰於洞庭溫湖古樂府罩辭曰罩初何得端來得鮒小者如手大者如屨孝子持歸遺我公姬安得此魚適與罩迕從今以後但當求鮒劉邵七華曰洞庭之鮒出於江岷弘腴青顱朱尾碧鱗鮎魚爾雅曰鮎別名鯷江東通呼鮎為鮧鮧音提廣雅曰鮷音提鯷音迹鮎, SBCK: 源}
