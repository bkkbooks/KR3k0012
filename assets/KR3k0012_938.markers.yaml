  - {type: variant, offset: 1809, length: 3, content: 鳥腎在, SBCK: 石頭長七八寸與石首同嶺表録異曰石頭魚狀如鱅魚隨其大小膽中有一石子如喬夌粒瑩白如玉有好竒者多市魚之小者貯於竹器任其壊爛即淘之取其魚脛石子以植酒籌黄靈魚臨海水土記曰黃靈魚小文正黄似石首烏賊魚南越記曰烏賊魚有矴遇風浪便虬前一􅂡下矴而住}
  - {type: variant, offset: 1809, length: 3, content: 鳥腎在, WYG: 石頭長七八寸與石首同嶺表録異曰石頭魚狀如鱅魚隨其大小脛有一石子如喬麥粒瑩白如玉有好竒者多市魚之小者貯於竹噐任其壊爛即淘之取其魚脛石子以植酒籌黃靈魚臨海水土記曰黃靈魚小文正黃似石首烏賊魚南越記曰烏賊魚有矴遇風浪便起虬前一鬚下矴而住}
