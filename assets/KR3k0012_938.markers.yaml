  - {type: variant, offset: 1781, length: 4, content: 仲夏始從, SBCK: 長者二丈餘有四足喙長七尺齒甚利虎及鹿渡水鰐擊之皆斷喙去齒旬日更生嶺表録異曰鰐魚其身土黃色有四足脩尾形􅃺如鼉而舉止趫疾口森鋸齒徃徃害人南中鹿多最懼此物鹿走崖岸之上群鰐嘷呌其下鹿必怖懼落崖多爲鰐魚所得亦物之相攝伏也故李太尉貶官潮州經鰐魚灘沉損平生寳玩古書圖􅀞一時沉失遂召舶上崑崙取之但見鰐魚極多不敢輙近乃是鰐魚窟宅也鮫魚􅀃文曰鮫魚也皮可以飾刀山海經曰燕山漳水出焉其中多鮫魚郭璞曰鮫背上有甲朱文尾長三四尺皮可以飾刀劒口西京􅄂記曰尉佗髙祖時獻鮫魚茘芰髙祖報以蒲匋錦四疋􅀶物志曰東}
