  - {type: variant, offset: 1816, length: 2, content: 白鳥, SBCK: 骨一片如龍骨而輕虚以指甲刮之即爲末亦無鱗而􅁏翼前有四足毎潮來即以二長足捉石浮身水上有小蝦魚過其前即􅄍涎惹之取以爲食廣州邊海人徃徃探得大者率如蒱扇煠熟以薑醋食之極脆美或入鹽渾爲乾搥如脯亦美吴中好食之左思吴都賦曰烏賊擁劒􅸕魚音佶臨海異物志曰􅸕}
  - {type: variant, offset: 1816, length: 2, content: 白鳥, WYG: 骨一片如龍骨而輕虛以指甲刮之即為末亦無鱗而肉翼前有四足每潮來即以二長足捉石浮身水上有小蝦魚過其前即吐涎惹之取以為食廣州邊海人往往探得大者率如蒲扇煠熟以薑醋食之極脆美或入鹽渾􅀈為乾槌如脯亦美吳中好食之左思吳都賦曰烏賊擁劒􅸕魚音信臨海異物志曰􅸕}
  - {type: page-break, offset: 1816, content: '', id: KR3k0012_WYG_938-9a, image: WYG0901/WYG0901-0330c.png}
  - {type: variant, offset: 1816, length: 2, content: 白鳥, krp: 骨一片如龍骨而輕虚以指甲刮之即爲末亦無鱗而肉翼前有四足毎潮來即以二長足捉石浮身水上有小蝦魚過其前即吐涎惹之取以爲食廣州邊海人徃徃探得大者率如蒱扇煠熟以薑醋食之極脆美或入鹽渾爲乾搥如脯亦美吴中好食之左思吴都賦曰烏賊擁劒􅸕魚音佶臨海異物志曰􅸕}
  - {type: variant, offset: 1819, length: 3, content: 鷖群飛, SBCK: 烏賊肥食甘美䱥魚音制臨海異物志曰䱥魚至肥炙食甘美諺曰寧去累世田宅不去䱥魚額鰒魚歩角反漢書曰王莽以􅀜東兵起憂懣不食但飲酒食鰒魚東觀漢記曰呉良字大儀齊人爲郡議曹椽正旦入賀太守門下􅁺王望前上言壽皆稱萬戚良跪曰門下侯謟明府無受其觴盗賊未弭人民困乏太守曰生言是遂不舉觴賜鰒魚百枚教署功曹良恥以言受官遂不肯謁後漢書曰張歩遣使伏隆詣闕上書獻鰒魚郭璞注三蒼云鰒似蛤偏著石廣志曰鰒無鱗有一靣附石折明細孔􅄂雜或七或九本草云石决明一名鰒魚音歩角切魏志曰倭國人入海捕鰒魚水無深淺皆沉没取之齊書曰禇彦囬時淮北属魏江南無鰒魚或有間􅀜得至者一枚直數千錢有餉彦囬鰒魚三十枚彦囬時雖貴而貧過甚門生獻計賣之云可得十萬錢彦囬變色曰我}
