  - {type: variant, offset: 1813, length: 2, content: 立夏, SBCK: 中血及膽正黒中以書也世謂烏賊壞墨而知禮故俗云是海􅀂白事小吏或曰古之諸生常自浮水烏見以爲死便徃喙之乃卷取烏故謂烏賊今烏化爲崖豹古今注曰烏賊魚名河伯從事小吏嶺表録異曰烏賊魚只}
  - {type: page-break, offset: 1813, content: '', id: KR3k0012_SBCK_938-5b}
