  - {type: variant, offset: 1976, length: 261, content: 操使目前膾之世說曰張季膺為齊王掾在洛水秋風起因思吳中菰菜羹鱸魚膾遂命駕便歸俄而齊王敗時人以為見機杜寶大業拾遺錄曰六年吳郡獻松鱸魚乾繪鱸魚肉白如雪不腥所謂金齏玉鱠東南之佳味也鯔魚神仙傳曰介象與吳王共論鯔魚為上乃於殿前作方坎汲水滿之并求釣餌起之須臾得鯔魚王驚喜乃使膾之異物志曰鯔魚長者六七尺嶺表錄異曰跳鯅乃海味之小魚鯅也以鹽藏鯔魚兒一斤不啻千箇生擘點醋下酒甚有美味余遂問蹺名之義則曰捕魚者中春於高處卓望魚兒來如陣雲闊二三百步厚亦相似者既見報漁師遂舡爭前而迎之舡衝魚陣不施罟網但魚兒自驚跳入舡逡巡而滿以此為鯅故名之跳又云舩去之時, SBCK: ''}
