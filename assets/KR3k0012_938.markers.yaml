  - {type: variant, offset: 1178, length: 3, content: 鱒魴鱒, WYG: 鯨海魚也大者長千里小者數千丈一生數萬子常以五月六月就岸邉生子至七八月導引其子還入海中鼔浪成雷噴沫成雨水族驚畏之皆逃匿莫敢當其雌曰鯢大者亦長千里眼晴為明月珠任昉述異記曰南海有珠即鯨目瞳夜可以鍳謂之夜光潘岳滄海賦曰魚則吞舟鯨鯢左思吳都賦曰長鯨吞航修鯢吐浪水元虛海賦曰其魚則橫海漢鯨突兀孤遊巨鱗刺雲洪脊挿天顱骨成􅏀流膏為淵沙毗觀濤賦曰於是神鯨來往乗波躍鱗噴氣欱霧水賦曰魚䘮成島嶼之墟目落為明月之珠鯪魚音陵山海經曰鯪魚吞舟臨海水土記曰鯪魚背腹皆有刺如三角菱䱜魚南越記曰䱜魚南越謂為壊雷魚長二丈子朝出食暮還母腹常從臍中入口中出腹内有兩洞腹貯水以養子腹容二子兩腹則四子也其鰓鱗皮有珠文可以餙刀劒口孫綽望海賦曰勁䱜揚鬐以排流槌額魚臨海水土記曰槌額}
