  - {type: variant, offset: 2642, length: 375, content: 丈安有鸛雀能勝一者況三頭乎鱣又純灰色無文章也鱣魚長者不過三尺大者不過三指黃地黑文故都講云虵鱓卿大夫服之象也續漢記及搜神記亦說此事皆作鱓字孫卿云魚鼈鱣鰌及韓非說苑皆曰鱣似虵蠶似蠋並作鱣字假鱣為鱓其來久乎周處風土記曰陽羨俗五月以薤蒸䱇而食凡䱇魚夏出冬蟄亦以將氣養和實時節也徐表南方草物狀曰白鱓生溪邊土穴中長五尺所大三寸里民剌取細槿二寸苦酒煮食之滋味如黃鱓味交阯九真有之劉敬叔異苑曰盧循以義熙五年自廣州下泊舡江西眾多疲死事平之後人往蔡州皆死人髮變而為鱓今上鎮西參軍與府司馬張逝瞻湖際有一棺棺頭有鱓眾試令撥看即是髮亦有未都化者一說云生以秫潘沐死則髮為䱇又昔有人食不能無䱇死後改棺䱇滿中又曰會稽石亭埭大有空中楓樹每雨水輒滿溢有商旅載生䱇放一頭著孔中以為狡獪後村民咸謂是神乃依樹起屋宰牲祭事未嘗輟因遂名䱇父廟人有祈請及穢慢禍福立至估客後返見其如此即取作臛於是遂絕, SBCK: 十八}
