  - {type: variant, offset: 1318, length: 9, content: 王逸死奴文篡立文本, SBCK: 國於城溝中養鰐魚門外圈猛獸有罪者輙以餧猛獸及鰐不食爲無罪三日乃放之鰐大者長二丈餘狀如鼉有四足喙長六七尺兩邊有齒如刀劒魚常遇得麞鹿及人亦噉之蒼梧以南及外國皆有唐書曰韓愈爲潮州刺史旣視事詢吏民疾苦皆曰郡西湫水有鱷魚夘而化其長數丈食民畜産將盡以是民貧居數日愈徃視之令判官􅁗濟炮一豚一羊投之湫呪之曰今潮州大海在其南鯨鵬之大蝦蟹之細無不容鱷魚朝發而夕至今與鱷魚約三日乃至七日如頑而不徙湏爲物害則刺史選林􅇊壯夫操勁弓毒矢與鱷魚從事矣呪之夕有􅁀風雷起於湫中數日湫水盡涸徙於舊湫西六十里自是潮人無鱷患虞喜志林曰方有鱷魚喙長八尺秋時最甚人在舟邊者魚或岀頭食人故人持戈於舩側而禦之􅀶物志}
