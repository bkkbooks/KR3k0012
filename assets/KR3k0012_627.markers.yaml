  - {type: variant, offset: 1910, length: 0, content: '', krp: 官人如大匠之用木也取其所長弃其所短今君以二卵弃扞城之將不可使聞於隣國也公曰謹受命淮南子曰或有罪而可賞或有功而可罪者始西門豹治鄴西門豹魏之侯之官食無積粟府無儲錢庫無兵甲官無計㑹人數言其過於文侯身徃行其縣果若人言文侯曰翟璜任子治鄴鄴大亂子能變}
