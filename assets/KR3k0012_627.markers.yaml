  - {type: variant, offset: 2168, length: 303, content: 一而稅以為天下之中正今漢人田或百一而稅可謂鮮矣然豪富強人占田踰多其賦太半官收百一之稅而人輸豪家太半之賦官家之惠優於三代豪強之暴酷於亡秦是以惠不下通而威福分於豪人也今不正其本而務除租稅適足以資富強也魚豢魏略曰漢陽嘉三年踈勒國王貢西海青石帶舟至皇甫謐帝王世紀曰西王母慕舜德來獻曰環及玦并貢益地圖西京雜記曰初脩上林苑群臣遠方各貢合枝李者楊乎楊孚異物志曰橘為樹白華而赤實皮既馨香裏又善味交阯有橘官一人秩三百石歲主貢御橘雜望氣經曰黃白氣潤澤入翼四海有侯王來獻者天子賜四海之國入軫諸侯王者有獻車者出軫天子用車為幣賜諸侯王魏文帝與王朗書曰孫權重遣使稱臣奉貢明珠百篚黃金千鎰馴象二頭或牝或牡擾禽鸚鵡其他珍玩盈舟溢航千類萬品, SBCK: 七}
