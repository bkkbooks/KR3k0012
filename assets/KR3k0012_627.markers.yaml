  - {type: variant, offset: 1751, length: 2, content: 猶譏, krp: 征賦五十而取一取其貸賄五十之一上年什取三中年什取二下年什取一歳飢不稅歳飢謂時歳惣飢故不稅歳飢施而稅此歳飢謂有飢者有不飢者施故飢而稅不飢又曰地辟而國貧者舟輿飾臺榭廣也賞罰信而兵弱者輕用衆使民勞也舟車飾臺榭廣則賦歛厚矣輕用衆使民勞則民力竭矣賦歛厚則下怨上民力竭則令不行下怨上令不行而求敵之勿謀已不可得也又曰桓公問曰梁聚謂寡人曰古者輕賦稅而肥籍歛取下無順於此者矣梁聚之言何如管子對曰梁聚之言非也彼輕賦稅則倉廩虚肥籍歛則器械不奉而諸侯之皮幣不至倉廩虛則倳賤無禄皮幣不衣於天下則國倳賤梁聚之言非也又曰桓公見黄鵠謂管仲曰鴻鵠東西南北儵忽千里所恃者六翼也今仲父寡人之翼也管子對曰民勞而亡使之不時民飢而重歛焉雖黄鵠之有羽翼其若君何晏子春秋曰爲君籍厚歛而託之爲民進䜛䛕而託之用賢逺公正而託之不順君行此三者則危墨子曰聖}
  - {type: variant, offset: 1754, length: 1, content: 制, krp: 作舟車完固輕利可以任重致逺是以民樂而利之今則厚歛百姓飾車以文采飾舟以刻鏤是以其民飢寒並至而國亂矣又曰古之民未知飲食故聖人耕稼其爲食也以増氣充虚今則厚歛百姓以爲美蒸庖魚鼈前則方丈孤寡凍餧雖欲無亂}
