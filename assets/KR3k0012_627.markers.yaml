  - {type: variant, offset: 1721, length: 0, content: '', krp: 賀曰臣聞王者藏於天下諸侯藏於百姓農夫藏於囷㡼啇賈藏於筐簣今百姓困乏於外而賦歛無已昔桀紂殘賊爲天下戮今皇天降災於藏臺是君之大福也漢書曰秦爲亂政虐刑殘㓕天下北爲長城之役南有五嶺之戍外内騒動百姓罷敝頭㑹箕歛家家箕頭數出穀以箕歛之也以供軍費財匱力盡又曰入物者𥙷官出貨者除罪選舉陵夷廉恥相冒武力進用法嚴令具興利之臣自此而始又曰衛青北擊胡賦稅旣竭不足以奉戰士有司請令民得買爵及贖禁錮减罪置賞官名曰武功爵又曰孝武時山東𬒳水災民多飢乏於是天子遣使虚郡國倉廪以振貧猶不足又募豪冨人相假貸而冨啇賈或滯財役貧轉糓百姓不佐公家之急黎民重困是時禁苑有白鹿而少府多銀錫有司言曰古者皮幣諸侯以聘享金有三等黄金爲上白金爲中赤金爲下乃以白鹿皮方尺縁以繢爲皮幣直四十萬王侯宗室朝覲聘享必以皮幣薦璧然後得行又曰東郭咸陽孔僅爲大農丞師古曰姓東郭名咸陽姓孔名僅二人也領塩鐡事而桑弘羊貴幸咸陽齊之大煑塩孔僅南陽大冶皆致産累千金弘羊洛陽賈人之子以心計故三人言利析秋毫矣其明年大將軍驃騎大出擊胡賞賜五十萬金是時財匱戰士頗不得禄矣大農上塩鐵丞孔僅咸陽言山海天地之藏冝屬少府陛下弗私以屬大農佐賦}
  - {type: variant, offset: 1722, length: 0, content: '', WYG: 募民自給費因官器作䰞鹽官與牢盆蘓林曰牢價直也今世人言顧手牢浮食竒民欲擅斡山海之貨以致富羡役利細民除故塩鐵家富者為吏吏益多賈人矣商賈以幣之變多積貨逐利于是公卿言郡國頗被灾害貧民無産業者募徙廣饒之地陛下損饍省用}
  - {type: variant, offset: 1722, length: 0, content: '', krp: 募自給費因官器作鬻塩官與牢盆蘇林曰牢價直今丗人言頋手牢浮食竒民欲擅斡山海之貨以致冨羡役利細民除故塩鐡家冨者爲吏吏益多賈人矣啇賈以幣之變多積貨逐利於是公卿言郡國頗𬒳災害貧民無産業者募徙廣饒之地陛下損膳省用}
  - {type: variant, offset: 1723, length: 0, content: '', WYG: 禁錢以賑元元寛貸而民不齊出南畆商賈滋衆貧者蓄積無有皆仰縣官異時筭軺車賈人之緡錢皆有差下請算如故率緡錢二千而筭一師古曰率計有二千錢者則出一筭諸作有租及鑄以手所作而賣之者率緍錢四千筭一非吏比者三老北邉騎士軺車一筭師古曰比例也身非為吏之例非為三老非為北邉騎士而有軺車皆令出一筭比音必寐反商賈人軺車二算商賈人有軺車又使多出一算重其賦舡五丈以上一算匿不自占占不悉戍邊一歲没入緡錢悉有盡也有能告者以半畀之畀與也音必寐反賈人有市籍及家屬皆無得名田賈人有市籍身及家内貨不得有田也以使農敢犯令没入田貨又曰晁錯奏古者之稅民不過什一其求易供使民不過三日其力易足至秦則不然用商鞅之法改帝王之制除井田民得買賣富者田連阡陌貧者亡立錐之地又顓川澤之利管山林之餘荒滛越制踰侈以相髙邑有人君之尊里有公侯之富小民安得不困乎又曰自貢禹在位數言得失書數十上禹以為古民亡賦筭口錢起武帝征伐四夷重賦于民民産子三嵗則出口錢故民重困至于生子輙殺之甚可悲痛宜令兒七嵗去齒乃出口錢年二十乃筭也又曰何武兄弟五人皆為郡吏郡縣敬憚之武弟顕家有市籍租常不入縣數負其課市嗇夫求商捕辱顕家顯怒欲以吏事中傷武曰以吾家租賦徭役不為衆先奉公吏不亦宜乎東觀漢記曰馬防多牧馬畜賦歛羗胡帝不喜之數加譴斥所以禁遏甚備由是權勢稍損賔客亦衰范􅁮後漢書曰靈帝南宫灾張譲趙忠等説帝令歛天下田畆税十錢以修宫室發太原河東狄道諸郡材木及文石毎州郡部送至京師黄門常侍輙令譴呵不中者因强折賤買十分顧一因復貨之於宦官復不為即受遂至腐積宫室連年不成刺史太守復增私調百姓呼嗟江表傳曰魏文帝遣使求雀頭香大明珠象牙犀角玳瑁孔雀翡翠闘鴨長鳴雞羣臣奏曰荆揚二州貢有常典魏所求珍玩物非禮也不宜與權曰彼所求者于我瓦石耳孤何惜焉彼在諒闇中而求若是寕可與言禮哉皆具與之晋中興書曰孔嚴補大中正時東海王奕信用羣下上䟽求海鹽錢塘以水牛牽埭税取錢直嚴奏不可從帝詔曰奕為此舉元元損害豈稱䘏民之意耶省所啟敬納忠規又曰謝安弟石尚書令薨時年六十二嵗石無他才望以宰相弟兼有大勲遂居清顕而聚歛無厭取譏當世管子曰鮑叔曰必用夷吾之言公不聼乃令四封之内修兵闗市之征侈之侈過常也謂重其賦税又曰桓公踐位十九年㢮闗市之征賦征五十而取一取其貨賄五十之一上年十取三中年十取二下年十取一嵗饑不税嵗饑謂時嵗總饑故不税嵗饑㢮而税此歲饑謂有饑者有不饑者故㢮饑而税不饑又曰地辟而國貧者舟輿飾而䑓榭廣也賞罰信而兵弱者輕用衆使民勞也舟車飾臺榭廣則賦歛厚矣輕用衆使民勞則民力竭矣賦歛厚則下怨上民力竭則令不行下怨上令不行而求敵之勿謀也不可得也又曰桓公問曰梁聚謂寡人曰古者輕賦税而肥籍歛取下無順於此者矣梁聚之言何如管子對曰梁聚之言非也彼輕賦税則倉廩虛肥籍歛則噐械不奉而諸侯之皮幣不衣倉廪虛則倳賤無禄外皮幣不衣于天下内國倳賤梁聚之言非也又曰桓公見黄鵠謂管仲曰鴻鵠東西南北倐忽千里所恃者六翼也今仲父寡人之翼也管子對曰民勞而使之不時民饑而重歛焉雖黄鵠之有羽翼其若君何晏子春秋曰為君籍厚歛而託之為民進䜛䛕而託之用賢逺公正而託之不順君行此三者則危墨子曰聖王作舟車完固輕利可以任重致逺是以民樂而利之今則厚歛百姓飾車以文采飾舟以刻鏤是以其民饑寒並至而國亂矣又曰古之民未知飲食故聖人耕稼其為食也増以氣充虗今則厚歛百姓以為羙蒸庖魚鱉前則方丈孤寡凍餒雖欲無亂不可得也孟子曰求也為季氏宰無能改}
