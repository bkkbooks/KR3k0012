  - {type: variant, offset: 200, length: 1036, content: 正卒謂給中都官者率計令人一歲之中屯戍及力役之事三十倍多於古也田租口賦鹽鐵之利二十倍於古秦賣鹽鐵貴故下人受其用也既收田租又出口賦而官更奪鹽鐵之利卒計一歲之中失其資二十倍多於古也或耕豪人之田見稅十五故貧人常衣馬牛之衣而食犬彘之食又曰倪寬為左內史勸農業緩刑獄卑體下士務在於得民心收租稅時裁闊狹與民相假貸為有貧弱及農要之時不即徵收也以故租多不入後有軍發左內史以負租課殿當免皆恐失之大家牛車小家擔負輸租繈屬不絕課吏以最上上由此愈奇寬又曰元鳳中詔曰夫穀賤則傷農今三輔太常穀減賤減猶少也其令以菽粟當今年賦租稅元年初詔曰天下以農桑為本日者省用罷不給官減外徭耕桑者益眾而百姓未能家給朕甚愍焉其減口賦錢有司奏請減什三上許之後漢書曰建武中田租三十稅一有產子者復以三年之筭明帝即位人無橫徭天下安寧時穀尚貴尚書張林上書言穀所以貴由錢賤也可盡封錢一取布帛為租以通天下之用從之魏志曰太祖初平袁紹下令田租畝收粟四升戶絹二疋綿二斤餘不得擅興晉書曰武帝平吳後制戶調之式丁男之戶歲輸絹三疋綿三斤女及次丁男為戶者半輸諸邊郡或三分之二遠者三分之一夷人輸賨布戶一疋遠者或一丈不果田者輸義米戶三斛遠者五斗極遠者輸筭錢人二十八文齊書曰高帝初竟陵王子良上表曰今所在穀價雖和而比室飢嗛縑纊雖賤駢門躶質而守宰務在裒刻圍桑品屋以准貲課致令斬樹發瓦以充重賦破人敗產賈利一時進違舊科退容姦利欲人康泰其可得乎隋書曰初蘇威父綽在西魏時以國用不足為征租稅之法頗稱為重既而歎曰今所為者正如張弓非平世也後之君子誰能施乎威聞其言每以為己任至是威為納言奏減賦役從輕典帝悉從之又曰開皇元年陳平上御朱雀門觀凱旋因行慶賞頒給所費三百餘萬帝以江表初定給復十年自餘諸州並免當年租賦十二年有司上言庫藏皆滿帝曰朕既薄賦於人又大經賜用何得爾也對曰用處常出納處常入略計每年賜用至數百萬段曾無減損乃更開左藏之院搆屋以受之詔曰既富而教方知廉恥寧積於人無藏府庫今年田租三分減一兵減半功調全免唐書曰開元八年二月制曰頃者以庸調無憑好惡須准故遣作樣以頒諸州令其好不得過精惡不得至濫任土作貢防源斯在諸州送物作巧生端茍欲副於斤兩遂即加其丈尺有至五丈為疋者理甚不然闊尺八長四丈同文共軌其事久行立樣之時須載此數若求兩而加尺甚暮四而朝三宜令所司簡閱有踰於比年常例尺丈過多者奏聞又曰開元二年十五年定令諸課戶一丁租調准武德二年之制其調絹絕布並隨鄉土所出絕絹各二丈五尺輸絹絁者綿三兩輸布麻三斤其絹絁為疋布為端綿為屯麻為綟若當戶不成疋端屯綟者皆隨近合成其調麻每年支料有餘折一斤輸粟一升與租同受管, SBCK: 孟}
