  - {type: variant, offset: 2156, length: 1, content: 年, SBCK: 萬萬以給宫室供養諸賞賜郭子曰王夷甫婦郭太寕女才拙而性剛聚歛無厭夷甫患之而不能禁時其鄉人幽州刺史李陽景都大使猶漢之樓護護字君卿郭氏甚憚之夷甫驟諌之乃云非但我言卿不可李陽亦謂不可郭氏乃爲少損京氏別對災異曰火起災何人君貪財賦歛盡民貨即火爲起不救必有日蝕之災矣其救之也舉㢘貞之士爲首之太平御覽卷第}
