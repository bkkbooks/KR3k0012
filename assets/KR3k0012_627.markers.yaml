  - {type: variant, offset: 164, length: 35, content: 法加月為更卒已復為正卒一歲屯戍一歲力役三十倍於古更卒謂給郡縣一月而更者, SBCK: 所自治}
  - {type: variant, offset: 164, length: 384, content: 法加月為更卒已復為正卒一歲屯戍一歲力役三十倍於古更卒謂給郡縣一月而更者也正卒謂給中都官者率計令人一歲之中屯戍及力役之事三十倍多於古也田租口賦鹽鐵之利二十倍於古秦賣鹽鐵貴故下人受其用也既收田租又出口賦而官更奪鹽鐵之利卒計一歲之中失其資二十倍多於古也或耕豪人之田見稅十五故貧人常衣馬牛之衣而食犬彘之食又曰倪寬為左內史勸農業緩刑獄卑體下士務在於得民心收租稅時裁闊狹與民相假貸為有貧弱及農要之時不即徵收也以故租多不入後有軍發左內史以負租課殿當免皆恐失之大家牛車小家擔負輸租繈屬不絕課吏以最上上由此愈奇寬又曰元鳳中詔曰夫穀賤則傷農今三輔太常穀減賤減猶少也其令以菽粟當今年賦租稅元年初詔曰天下以農桑為本日者省用罷不給官減外徭耕桑者益眾而百姓未能家給朕甚愍焉其減口賦錢有司奏請減什三上許之後漢書曰建武中田租三十稅一有產子者復以三年之筭明帝即位人無橫徭天下安寧時穀尚貴尚書張林上書言穀, WYG: ''}
