  - {type: variant, offset: 1723, length: 0, content: '', krp: 禁錢以振元元寛貨而民不齊出南畝啇賈滋象貧者畜積無有皆仰縣官異時筭軺車賈人之緡錢皆有差請筭如故率緡錢二千而筭一師古曰率計有二千錢者則出一筭諸作有租及鑄以手力所作而賣之者率緍錢四千筭一非吏比者三老北邊騎士軺車一筭師古曰比例也身非爲吏之例非爲三老非爲北邊騎士而有軺車者皆令出一筭比音必寐反啇賈人車二筭啇賈人有輕車又使多出一筭重其職舡五丈以上一筭匿不自占占不悉戍邊一歳没入㛰錢悉猶盡也有能告者以其半卑之卑與也音必寐反賈人有市籍及家屬皆無得名田一人有市籍身及家内皆不得有田地以便農敢犯令没入田貨又曰晁錯奏古者稅民不過什一其求易供使民不過三日其力易足至秦則不然用啇鞅之法改帝王之制除井田民得賣買冨者田連阡陌貧者亡立錐之地入顓川澤之利管山林之餘荒淫越制踰侈以相髙邑有人君之尊里有公侯之冨小民安得不困又曰自貢禹在位數言得失書數十上禹以爲古民亡賦筭口錢起武帝征伐四夷重賦}
  - {type: variant, offset: 1724, length: 0, content: '', krp: 民民産子三歳則岀口錢故民重困至於生子輙殺之甚可悲痛冝令兒七歳去齒乃出口錢年二十乃筭也又曰何武兄弟五人皆爲郡吏郡縣敬憚之武弟顯家有市籍租常不入縣數負}
  - {type: variant, offset: 1725, length: 13, content: 路矣言關禁異服異語耳不征稅, WYG: 徳而賦粟倍他日孔子曰求}
  - {type: variant, offset: 1725, length: 2, content: 路矣, krp: 課市嗇夫求商捕辱顯家顯怒欲以吏事中啇武曰以吾家租賦徭役不爲衆先奉公吏不亦冝乎東觀漢記曰馬防多牧馬畜賦歛羗胡帝不喜之數加譴勑所以禁遏甚備由是權勢稍損賔客亦衰范曄後漢書曰靈帝南宫災張讓趙忠等說帝令歛天下田畝稅十錢以修宫室發太原河東狄道諸郡材木及文石毎州郡部送至京師黄門常侍輙令譴呵不中者因強折賤買十分雇一因復貨之於官官復不爲即受遂至腐積宫室連年不成刺史太守復増私調百姓呼嗟江表傳曰魏文帝遣使求雀頭香大明珠象牙犀角瑇瑁孔雀翡翠鬪鴨長鳴鷄群臣奏曰荆楊二州貢有常典魏所求珎玩物菲禮也不冝與權曰彼所求者於我瓦石耳孤何惜焉彼在諒闇中而求若是寕可與}
  - {type: punctuation, offset: 1727, content: ；, id: KR3k0012_CHANT_627-bkkpn438}
  - {type: 'tls:seg', offset: 1727, content: '', id: KR3k0012_CHANT_627-17a.22}
  - {type: variant, offset: 1728, length: 7, content: 關禁異服異語耳, krp: 禮哉皆具與之晉中興書曰孔嚴𥙷大中正時東海王弈信用群下上䟽求海塩錢塘以水牛牽埭稅取錢直嚴啓冝寢表帝詔曰弈謂此適民無損害豈奪惠䘏之旨耶省所啓敬納忠規又曰謝安弟石尚書令薨時年六十二石無它才望直以宰相弟兼有大勲遂居淸顯而聚歛無厭取譏當丗管子曰鮑叔曰必用夷吾之言公}
