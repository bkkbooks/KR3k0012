  - {type: variant, offset: 1713, length: 1, content: 則, WYG: 譏異服異言也征亦税也又大學曰百乗之家不畜聚歛之臣與其有聚歛之臣寕有盗臣左傳宣公曰晉靈公不君厚歛以雕墻從䑓上弹人而觀其辟丸也又文公曰縉雲氏有不才子縉雲皇帝時官名貪于飲食冐于貨賄侵欲崇侈不可盈厭聚歛積實不知紀極不分孤寡不恤窮匱冐亦貪也盈滿也實財也}
  - {type: page-break, offset: 1713, content: '', id: KR3k0012_WYG_627-2a, image: WYG0898/WYG0898-0618c.png}
  - {type: variant, offset: 1713, length: 1, content: 則, krp: 譏異服識異言也征亦稅又太學曰百乘之家不畜聚歛之臣與其有聚歛之臣寕有盗臣左傳宣上曰晉靈公不君厚歛以雕牆從臺上彈人觀其避丸者又文下曰縉雲氏有不才子晉雲黄帝時官名貪于歛食冒于貨賂侵欲崇侈不可盈厭聚歛積實不知紀極不分孤寡不恤窮匱冒亦貪也盈满也實財也}
  - {type: variant, offset: 1717, length: 1, content: 旅, WYG: 民以比三凶非帝子孫故别以比三凶謂之饕餮貪財為饕貪食為餮榖梁傳文公曰天王使毛伯來求金求車猶可求金甚矣毛詩葛屦曰碩䑕刺重歛也國人刺其君重歛􅅙食于民不修其政貪而畏人若大䑕也碩䑕碩䑕無食我黍三嵗貫女莫我肯顧逝将去女適彼樂土樂土樂土爰得我所論語先進曰季氏富於周公孔子曰周公天子之宰相也而求也為之聚歛而附益之是時冉求為季氏宰為之急賦税子曰非吾徒也小子鳴鼓而攻之可也鄭曰小子門人也鳴鼔聲其罪以責之也春秋繁露曰木有變春彫冬榮水氷春多雨此徭役衆賦歛重百姓貧窮道多饑人救之者薄賦斂省徭役出倉穀賑困窮矣韓詩外傳曰晉平公藏寶之䑓燒士大夫聞者}
  - {type: page-break, offset: 1717, content: '', id: KR3k0012_WYG_627-2b, image: WYG0898/WYG0898-0618d.png}
  - {type: page-break, offset: 1717, content: '', id: KR3k0012_WYG_627-3a, image: WYG0898/WYG0898-0619a.png}
  - {type: variant, offset: 1717, length: 1, content: 旅, krp: 民以比三㐫非帝子孫故別以比三㓙謂之饕餮貪財爲饕貪食爲餮糓梁傳文公曰天王使毛伯來求金求車猶可求金甚也毛詩葛屨曰碩䑕刺重歛也國人刺其君重歛𧖟食於民不脩其政貪而畏人若大䑕也碩䑕碩䑕無食我黍三歳貫女莫我肯顧逝將去女適彼樂土樂土樂土爰得我所論語先進曰季氏冨於周公孔子曰周公天子之宰卿士而求也爲之聚歛而附益之孔曰冉求爲季氏宰爲之急賦稅子曰非吾徒也小子鳴鼔而攻之可也鄭曰小子門人也鳴鼔聲其罪以責之也春秋繁露曰木有變春彫冬榮秋水春多雨此徭役衆賦歛重百姓貧窮道多飢人救者省徭役薄賦歛出倉糓振困窮韓詩外傳曰晉平公藏寳之臺燒士大夫聞者}
