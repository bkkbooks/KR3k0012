  - {type: variant, offset: 1914, length: 2, content: 萬室, SBCK: 臣故蓄積於民君以爲不然臣請先登鼓之鉀兵粟米可立具也乃登城而鼓之致鉀笴甲鎧笴操箭失也兵弩而出再鼓服揵載粟而至服駕出也揵擔文侯曰罷之西門豹曰與民信非一日積也一舉而欺之其後不可復用也燕甞侵魏八城請北擊之以復侵地遂舉兵擊燕復地而後反此有罪而可賞者也解篇爲東封解篇魏臣治東封也上計而入三倍有司請賞之文侯曰吾土地非益廣也人民非益衆也何以三倍對以冬伐木而積之以春浮之河而鬻之文侯曰民寒以力耕暑以強耘秋以收歛冬間無事又伐林而積之負軛而浮之於河是用民不得休息也民以弊矣雖有三倍之入將焉用之此有功而可罪者也太公兵法曰武王問太公勝􅀒何如太公對曰夫紂之行不由理精兵酒池賦歛甚數百姓苦}
  - {type: page-break, offset: 1914, content: '', id: KR3k0012_SBCK_627-7a}
  - {type: variant, offset: 1914, length: 2, content: 萬室, WYG: 臣故蓄積於民君以為不然臣請升城鼓之甲兵粟米可立致也乃登城而鼔之一鼓民被甲括矢挾鉀􅀢操兵弩而出再鼓負輦粟而至文侯曰罷之西門豹曰與民約信非一日之積也一舉而欺之其後不可復用也燕嘗侵魏八城請北擊之以復侵地遂舉兵擊燕復地而後反此有罪而可賞者也觧扁為東封觧扁魏臣治東封者上計而入三倍有司請賞之文侯曰吾地土非益廣也人民非益衆也入何以三倍對曰以冬伐木而積之於春浮之河而鬻之文侯曰民春以力耕暑以强耘秋以收歛冬間無事又伐木而積之負軛而浮之於河是用力不得休息也民以敝矣雖有三倍之入将焉用之此有功而可罪者也太公兵法曰武王問太公勝負何如太公對曰夫紂之行不由理積兵酒池賦歛甚數百姓苦}
