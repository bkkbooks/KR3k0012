  - {type: variant, offset: 889, length: 670, content: 餘諸州並免當年租賦十二年有司上言庫藏皆滿帝曰朕既薄賦於人又大經賜用何得爾也對曰用處常出納處常入略計每年賜用至數百萬段曾無減損乃更開左藏之院搆屋以受之詔曰既富而教方知廉恥寧積於人無藏府庫今年田租三分減一兵減半功調全免唐書曰開元八年二月制曰頃者以庸調無憑好惡須准故遣作樣以頒諸州令其好不得過精惡不得至濫任土作貢防源斯在諸州送物作巧生端茍欲副於斤兩遂即加其丈尺有至五丈為疋者理甚不然闊尺八長四丈同文共軌其事久行立樣之時須載此數若求兩而加尺甚暮四而朝三宜令所司簡閱有踰於比年常例尺丈過多者奏聞又曰開元二年十五年定令諸課戶一丁租調准武德二年之制其調絹絕布並隨鄉土所出絕絹各二丈五尺輸絹絁者綿三兩輸布麻三斤其絹絁為疋布為端綿為屯麻為綟若當戶不成疋端屯綟者皆隨近合成其調麻每年支料有餘折一斤輸粟一升與租同受管子曰地之生財有時人之用力有倦人君之欲無窮以有時與有倦養無窮之君而度量不生於其間度量不生賦役無限也則上下相疾也又曰桓公伐楚濟汝水踰方城望汶山使貢絲於周室列子曰周穆王大征西戎西戎獻昆吾之劍切玉如泥又曰周王時西域國有山人來王為中天之臺月月獻玉衣旦旦薦玉食王執山人之祛騰而上天文子曰楚人檐山鷄路人問曰何為也欺之曰鳳凰也路人請十金弗與倍乃與之將獻楚王經宿鳥死路人不惜其金唯恨不得獻國人傳之咸以為真鳳遂聞楚王王感其貴買欲獻於己厚賜之過於買鳥之金十倍舜子曰齊威王夫人死有十孺子薛公欲知王所立為十玉珥而美其一獻於玉王以賦十孺子明曰坐視美珥所在而勸以為夫人也孟獻子曰畜馬乘不察於雞豚伐冰之家不畜牛羊百乘之家不畜聚歛之臣與其有聚歛之臣寧有盜臣此謂國不以利為利以義為利, WYG: 治}
