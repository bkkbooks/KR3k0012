  - {type: variant, offset: 1721, length: 0, content: '', WYG: 賀曰臣聞王者藏于天下諸侯藏于百姓農夫藏于囷庾商賈藏于篋匱今百姓困乏于外而賦歛無已昔桀紂殘賊為天下戮今皇天降灾於藏臺是君之大福也漢書曰秦為亂政虐刑殘滅天下北為長城之役南有五嶺之戍外内騷動百姓罷敝頭㑹箕歛家家箕頭數出以箕歛之也以供軍費財匱力盡又曰入物者補官出貨者除罪選舉陵夷亷耻相冐武力進用法嚴令具興利之臣自此而始又曰衛青北擊胡賦税既竭不足以奉戰士有司請令民得買爵及贖禁錮免臧罪置賞官名曰武功爵又曰孝武時山東被水灾民多饑乏于是天子遣使虗郡國倉廪以賑貧猶不足又募豪富人相假貸而富商賈或滯財役貧轉轂百數不佐公家之急黎民重困是時禁苑有白鹿而少府多銀錫有司言曰古者皮幣諸侯以聘享金有三等黄金為上白金為中赤金為下乃以白鹿皮方尺縁以繢為皮幣直四十萬王侯宗室朝覲享聘必以皮幣薦璧然後得行又曰東郭咸陽孔僅為大農丞師古曰姓東郭名咸陽姓孔名僅二人也領鹽鐵事而桑𢎞羊貴幸咸陽齊之大䰞鹽孔僅南陽大冶皆致産累千金𢎞羊洛陽賈人之子以心計故三人言利析秋毫矣其明年大将軍驃騎大出擊胡賞賜五十萬金是時財匱戰士頗不得禄矣大農上塩鐵丞孔僅咸陽言山海天地之藏宜屬少府陛下勿私以屬大農佐賦}
