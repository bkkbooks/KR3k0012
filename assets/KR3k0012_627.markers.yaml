  - {type: variant, offset: 1918, length: 0, content: '', SBCK: 語曰􅃲旦廷見令尹子常子常令尹子囊之孫囊瓦子常與之語問畜貨聚馬歸以語其弟曰楚其亡乎不然令尹其不免乎吾見令尹問蓄聚積實􅀂餓豺虎焉殆必亡者晁錯上書曰隂陽不和水旱爲災}
  - {type: variant, offset: 1918, length: 0, content: '', WYG: 語曰闘且廷見令尹子常子常令尹子襄之孫囊瓦子常與之語問畜貨聚馬歸以語其弟曰楚其亡乎不然令尹其不免乎吾見令尹問畜聚積實若餓豺狼焉殆必亡者也晁錯上書曰隂陽不和水旱為灾}
  - {type: variant, offset: 1918, length: 0, content: '', krp: 語曰鬪旦廷見令尹子常子常令尹子囊之孫囊瓦子常與之語問畜貨聚馬歸以語其弟曰楚其亡乎不然令尹其不免乎吾見令尹問蓄聚積實若餓豺虎焉殆必亡者晁錯上書曰隂陽不和水旱爲災}
