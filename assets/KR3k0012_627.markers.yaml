  - {type: variant, offset: 1547, length: 0, content: '', SBCK: 左傳宣上曰晉靈公不君厚歛以雕牆從臺上彈人觀其避丸者又文下曰縉雲氏有不才子晉雲黄帝時官名貪于歛食冒于貨賂侵欲崇侈不可盈厭聚歛積實不知紀極不分􅀌寡不恤窮匱冒亦貪也盈满也實財也天下之民以比三㐫非帝子孫故別以比三㓙謂之饕餮貪財爲饕貪食爲餮􅂖梁傳文公曰天王使毛伯來求金求車猶可求金甚也毛詩葛屨曰碩䑕刺重歛也國人刺其君重歛􅁞食於民不脩其政貪而畏人􅀂大䑕也碩䑕碩䑕無食我黍三歳貫女莫我肯顧逝將去女適彼樂土樂土樂土爰得我所論語先進曰季氏冨於周公孔子曰周公天子之宰卿士而求也爲之聚歛而附益之孔曰冉求爲季氏宰爲之急賦稅子曰非吾徒也小子鳴鼔而攻之可也鄭曰小子門人也鳴鼔聲其罪以責之也春秋繁露曰木有變春彫冬榮秋水春多雨}
  - {type: page-break, offset: 1547, content: '', id: KR3k0012_SBCK_627-2a}
  - {type: variant, offset: 1548, length: 0, content: '', SBCK: 徭役衆賦歛重百姓貧窮道多飢人救者省徭役薄賦歛出倉糓振困窮韓詩外傳曰晉平公藏寳之臺燒士大夫聞者皆趍車馳馬救火三日三夜乃勝之公子晏獨奉束帛而賀曰臣聞王者藏於天下諸侯藏於百姓農夫藏於囷㡼啇賈藏於筐簣今百姓困乏於外而賦歛無已昔桀紂殘賊爲天下戮今皇天降災於藏臺是君之大福也漢書曰􅁗爲亂政虐刑殘㓕天下北爲長城之役南有五嶺之戍外内騒動百姓罷敝頭㑹箕歛家家箕頭數出穀以箕歛之也以供軍費財匱力盡又曰入物者􅀘官出貨者除罪選舉陵夷廉恥相冒武力進用法嚴令具興利之臣自此而始又曰衛青北擊胡賦稅旣竭不足以奉戰士有司請令民得買爵及贖禁錮减罪置賞官名曰武功爵又曰孝武時山東􅀍水災民多飢乏於是天子遣使虚郡國倉廪以振貧猶不足又募豪冨人相假貸而冨啇賈或􅆡財役貧轉􅂖百姓不佐公家之急􅀺民重困是時禁苑有白鹿而少府多銀錫有司言曰古者皮幣諸侯以聘享金有三等黄金爲上白金爲中赤金爲下乃以白鹿皮方尺縁以繢爲皮幣直四十萬王侯宗室朝覲聘享必以皮幣薦璧然後得行又曰東郭咸陽孔僅爲大農丞師古曰姓東郭名咸陽姓孔名僅二人也領塩鐡事而桑弘羊貴幸咸陽齊之大煑塩孔僅南陽大冶皆致産累千金弘羊洛陽賈人之子以心計故三人言利析秋毫矣其明年大將軍驃􅀐大出擊胡賞賜五十萬金是時財匱戰士頗不得禄矣大農上塩鐵丞孔僅咸陽言山海天地之藏冝屬少府陛下弗私以屬大農佐賦願募自給費因官器作鬻塩官與牢盆􅂫林曰牢價直今丗人言頋手牢浮食竒民欲擅斡山海之貨以致冨羡役利細民除故塩鐡家冨者爲吏吏益多賈人矣啇賈以幣之變多積貨逐利於是公卿言郡國頗􅀍災害貧民無産業者募徙廣饒之地陛下損膳省用出禁錢以振元元寛貨而民不齊出南􅅿啇賈滋象貧者畜積無有皆仰縣官異時筭軺車賈人之緡錢皆有差請筭如故率緡錢二千而筭一師古曰率計有二千錢者則出一筭諸作有租及鑄以手力所作而賣之者率緍錢四千筭一非吏比者三老北邊􅀐士軺車一筭師古曰比例也身非爲吏之例非爲三老非爲北邊騎士而有軺車者皆令出一筭比音必􅄰反啇賈人車二筭啇賈人有輕車又使多出一筭重其職舡五丈以上一筭匿不自占占不悉戍邊一歳没入㛰錢悉猶盡也有能告者以其半􅂌之􅂌與也音必􅄰反賈人有市籍及家屬皆無得名田一人有市籍身及家内皆不得有田地以便農敢犯令没入田貨又曰晁錯奏古者稅民不過什一其求易供使民不過三日其力易足至􅁗則不然用啇鞅之法改帝王之制除井田民得賣買冨者田連阡陌貧者亡立錐之地入顓川澤之利管山林之餘荒淫越制踰侈以相髙邑有人君之尊里有公侯之冨小民安得不困又曰自貢禹在位數言得失書數十上禹以爲古民亡賦筭口錢起武帝征伐四夷重賦於民民産子三歳則岀口錢故民重困至於生子輙殺之甚可悲痛冝令兒七歳去齒乃出口錢年二十乃筭也又曰何武兄弟五人皆爲郡吏郡縣敬憚之武弟顯家有市籍租常不入縣數􅀒其課市嗇夫求商捕辱顯家顯怒欲以吏事中啇武曰以吾家租賦徭役不爲衆先奉公吏不亦冝乎東觀漢記曰馬防多牧馬畜賦歛羗胡帝不喜之數加譴勑所以禁遏甚備由是權􅀔稍損賔客亦衰范曄後漢書曰靈帝南宫災張讓趙忠等說帝令歛天下田􅅿稅十錢以修宫室發太原河東狄道諸郡材木及文石毎州郡部送至京師黄門常侍輙令譴呵不中者因強折賤買十分雇一因復貨之於官官復不爲即受遂至腐積宫室連年不成刺史太守復増私調百姓呼嗟江表傳曰魏文帝遣使求雀頭香大明珠象牙犀角瑇瑁孔雀翡翠􅃲鴨長鳴鷄群臣奏曰荆楊二州貢有常典魏所求珎玩物菲禮也不冝與權曰彼所求者於我瓦石耳􅀌何惜焉彼在諒闇中而求􅀂是寕可與言禮哉皆具與之晉中興書曰孔嚴􅀘大中正時東海王弈信用群下上䟽求海塩錢塘以水牛牽埭稅取錢直嚴啓冝寢表帝詔曰弈}
