  - {type: variant, offset: 1909, length: 0, content: '', SBCK: 思言茍變於衛君曰其才可將五百乗衛君曰吾知其才可然變甞爲吏賦於民而食人二鷄子故弗用也子思曰夫聖人}
  - {type: variant, offset: 1909, length: 0, content: '', WYG: 思言苟變于衛君曰其才可将五百乗衛君曰吾知其才可將然變嘗為吏賦于民而食人二雞子故弗用也子思曰夫聖人}
  - {type: variant, offset: 1909, length: 0, content: '', krp: 思言茍變於衛君曰其才可將五百乗衛君曰吾知其才可然變甞爲吏賦於民而食人二鷄子故弗用也子思曰夫聖人}
  - {type: variant, offset: 1910, length: 0, content: '', SBCK: 官人如大匠之用木也取其所長弃其所短今君以二􅆑弃扞城之將不可使聞於隣國也公曰謹受命淮南子曰或有罪而可賞或有功而可罪者始西門豹治鄴西門豹魏之侯之官食無積粟府無儲錢庫無兵甲官無計㑹人數言其過於文侯身徃行其縣果􅀂人言文侯曰翟璜任子治鄴鄴大亂子能變}
  - {type: page-break, offset: 1910, content: '', id: KR3k0012_SBCK_627-6b}
  - {type: variant, offset: 1910, length: 0, content: '', WYG: 官人如大匠之用木也取其所長棄其所短今君以二卵棄干城之将不可使聞於隣國也公曰謹受命淮南子曰或有罪而可賞或有功而可罪者始西門豹治鄴西門豹魏文侯之官倉無積粟府無儲錢庫無兵甲官無㑹計人數言其過於文侯文侯身行其縣果若人言文侯曰翟璜任子治鄴鄴大亂子能變}
