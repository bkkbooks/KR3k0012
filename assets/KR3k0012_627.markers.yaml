  - {type: variant, offset: 1623, length: 145, content: 尊賢使能則天下之士皆悅而願立於其朝矣市廛而不征則天下之商皆悅而願藏於其市矣廛市宅也古無征衰世征之王制曰市廛而先稅周禮曰國宅無征法而不廛者當以什一之法征其地耳不當征其廛宅也關譏而不征則天下之旅皆悅而願出於其路矣言關禁異服異語耳不征稅也周禮曰關市之賦司關門之征猶譏王制不征謂文王以前文王亦不征也, SBCK: ''}
