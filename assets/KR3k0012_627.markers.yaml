  - {type: variant, offset: 1549, length: 0, content: '', SBCK: 此適民無損害豈奪惠䘏之旨耶省所啓敬納忠規又曰謝安弟石尚書令薨時年六十二石無它才望直以宰相弟兼有大勲遂居淸顯而聚歛無厭取譏當丗管子曰鮑叔曰必用夷吾之言公不聽乃令四封之内脩兵關市之征侈之侈謂過常也謂重其賦稅又曰桓公踐位十九年施關市之征征賦五十而取一取其貸賄五十之一上年什取三中年什取二下年什取一歳飢不稅歳飢謂時歳惣飢故不稅歳飢施而稅此歳飢謂有飢者有不飢者施故飢而稅不飢又曰地辟而}
  - {type: page-break, offset: 1549, content: '', id: KR3k0012_SBCK_627-5a}
  - {type: variant, offset: 1550, length: 0, content: '', SBCK: 貧者舟輿飾臺榭廣也賞罰信而兵弱者輕用衆使民勞也舟車飾臺榭廣則賦歛厚矣輕用衆使民勞則民力竭矣賦歛厚則下怨上民力竭則令}
  - {type: variant, offset: 1551, length: 0, content: '', SBCK: 行下怨上令不行而求敵之勿謀已不可得也又曰桓公問曰梁聚謂寡人曰古者輕賦稅而肥籍歛取下無順於此者矣梁聚之言何如管子對曰梁聚之言非也彼輕賦稅則倉􅅒虚肥籍歛則器械不奉而諸侯之皮幣不至倉􅅒虛則倳賤無禄皮幣不衣於天下則國倳賤梁聚之言非也又曰桓公見黄鵠謂管仲曰鴻鵠東西南北儵忽千里所恃者六翼也今仲父寡人之翼也管子對曰民勞而亡使之不時民飢而重歛焉雖黄鵠之有羽翼其􅀂君何晏子春秋曰爲君籍厚歛而託之爲民進䜛䛕而託之用賢逺公正而託之不順君行此三者則危墨子曰聖王作舟車完固輕利可}
  - {type: page-break, offset: 1551, content: '', id: KR3k0012_SBCK_627-5b}
