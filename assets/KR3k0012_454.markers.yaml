  - {type: variant, offset: 2579, length: 673, content: 太子登數諫權不納後壹姦罪發露權引咎責躬又曰孫權既為吳王歡宴之末自起行酒虞翻伏地陽醉不持權去翻起坐權於是大怒手劍欲擊之侍坐者莫不惶遽唯大司農劉基起抱權諫曰大王以三爵後殺善士雖翻有罪天下熟知之權曰曹孟德尚殺孔文舉孤於虞翻何有哉基曰孟德輕害士人天下非之今大王躬行德義欲與堯舜比隆何自喻於彼乎翻由是得免權因勑左右自今酒後言殺皆不得殺又曰張紘字子綱廣陵人避難江東委質於孫策遣奉章詣許昌曹公聞策薨欲伐吳紘諫曰以為乘人之喪既非古義若有不克棄好成讎不如厚禮曹公從之紘歸吳後為長史權率輕騎將赴敵紘諫曰兵者凶器戰者危事麾下多強暴之勇三軍之眾莫不寒心權納而止又曰呂蒙時為護軍權將欲北取徐州以廣其地蒙諫曰不可今曹操遠在河北新破二袁撫集幽冀未暇東顧今徐州將守惡足言也往必剋之然地勢陸通四面受敵今日得之明日還失舉全吳之眾未足守也不如取關羽西據荊州則利盡長江此上流之勢於國之便十徐州也則重關西門國之固也權甚然之興師遂擒關羽而平荊州又曰華覈字永先吴人上䟽皓曰臣聞之主所求於民者二民之所望於主者三二謂求其為己勞也求其為己死者也三謂飢者能食之勞者能息之功者能賞之今民以致其二事而主失其三主二求已備民之三望未報今百工作無用之器婦人為綺靡之飾且美貌者不待華彩以崇好艷姿者不待文綺以致愛若極粉黛窮盛服未必無醜婦廢華彩文繡未必無美貌也皓終不納後以懲譴免數年而卒又曰韋曜字弘嗣吳人本名昭避晉文諱改之孫皓立曜以直諫非一漸見責怒皓每饗宴以七升為限雖不入口並澆灌取盡曜遂見逼皓輒以為曜與華覈薛瑩撰吳書皓欲以父和作帝紀曜以和不登帝位宜作傳曜遂被誅又曰賀邵字興伯孫皓時為中書令領太子太傅皓凶暴驕矜邵上疏, WYG: 汲黯}
