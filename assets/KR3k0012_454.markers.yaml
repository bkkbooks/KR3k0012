  - {type: variant, offset: 1698, length: 0, content: '', SBCK: 昔孔子論詩以關睢爲始言后妃者人倫之夲理亂之端也故皇英降而虞道興任姒歸而姬宗盛桀奔南巢禍階末嬉魯桓滅國惑以齊媛伏見陛下毎臨朝聽政皇后必施帷幔坐於殿上預聞政事}
