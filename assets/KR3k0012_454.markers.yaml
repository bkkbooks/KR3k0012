  - {type: variant, offset: 1913, length: 0, content: '', SBCK: 望風而理又曰鎮州王承宗之叛憲宗將以吐突承瓘爲招討處置使吕元靖與給事中穆質兵部侍郞許孟容等八人抗論不可且曰承瓘雖貴寵然内臣也􅀂爲師揔兵恐不爲諸將所伏指喻明切憲宗納之爲改使號然猶專戎柄又曰李絳嘗因浴堂北廊奏對違忤上㫖指切時病及論中官縱恣方鎭}
