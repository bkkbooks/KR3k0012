  - {type: variant, offset: 3288, length: 10, content: 天旱禁酒釀者有刑吏於, SBCK: 此輩何}
  - {type: variant, offset: 3288, length: 489, content: 天旱禁酒釀者有刑吏於人家索得釀具欲令與作酒者同罰簡雍從先主遊見一男子行道謂先主彼人欲淫何以不縛先主曰卿何以知之雍對曰彼有淫具與欲釀者同先主大笑而原欲釀者雍之滑稽凡此類又曰黃權字公衡州牧劉璋召為主簿時別駕張松建議宜迎先主代張魯權諫曰左將軍有驍名今欲以部曲遇之則不滿其心欲以賓客禮待則一國不容二君客若有太山之安則主有累卵之危可但閉境以待河清璋不聽又曰張松說劉璋交通先主璋從之遣法正請先主璋從事廣漢王累倒自懸於州門以諫璋一無所納勑在所供奉先主入境如歸晉書曰何尚之傳時造玄武湖上欲於湖中立萬丈蓬萊瀛洲三神山尚之固諫乃止時又造華林園並盛暑欲興人工尚之又諫宜加休息又曰續咸偽趙石勒將遷都於鄴咸固諫勒怒曰不斬此老臣朕宮不得遷也勑御史收之中書令徐光表極諫勒乃悟停作賜咸絹百疋又曰孫嵩為王彌長史彌與石勒有隙勒常惡之乃請計於右侯張賓賓曰英雄不並立宜早圖之勒於是開宴請彌彌將行嵩請諫曰石公卑甚言甘不可信也願公勿往自守保固恐有專諸孫峻之禍及耳彌曰石勒一豎子耳奚能為也不聽遂入酒酣遇害又曰裴元略事偽秦符堅為金部郎中堅常以珠璣奇異彌飾不可勝計以朝群臣元略諫曰周卑宮室慶垂八百始皇窮極嗣不及孫此萬古所以傳載也, WYG: ''}
