  - {type: variant, offset: 2543, length: 5, content: 僕射屈晃固, krp: 省校書郞李聽鎭夏州辟爲掌書記穆宗即位入奏事帝召見謂公權曰我於佛寺見卿筆蹟思之乆矣即日拜右拾遺翰林侍書學士遷左𥙷闕司封貟外郎穆宗政僻嘗問公權筆何盡善對曰用在心心正則筆正上改容知其筆諌也唐穆宗便殿對六學士上語及漢文恭儉帝舉𬒮曰此澣濯者三矣學士皆賛詠帝之儉德唯公權無言帝留而問之對曰人主當進賢良退不肖納諌諍明賞罰服澣濯之衣乃小節耳時周墀同對爲之股慄公權詞氣不可奪帝徐謂之曰極知舎人不合作}
