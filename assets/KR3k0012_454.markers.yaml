  - {type: variant, offset: 4227, length: 195, content: 后六宮常乘副車在後沈懷文與王景文每諫不宜亟出後同從坐松樹下風雨甚驟景文曰卿可以言矣懷文曰獨言無從理相與從之江智淵臥草側亦謂之為善俄而入召俱入雉場懷文曰風雨如此非聖躬所宜冒景文又曰懷文所啟宜從智淵未及言上方注弩作色曰卿欲效顏竣耶何以恒知人事又曰顏竣小子恨不得鞭其面又曰何尚之遷尚書左僕射加散騎常侍時上行幸還多侵夜尚之表諫曰萬乘宜重尊不可輕此聖心所鑒豈假臣啟輿駕比還多冒夜伏願少採愚誠上優詔納之, SBCK: 平御覧卷第四百五十四}
