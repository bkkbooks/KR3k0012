  - {type: variant, offset: 3863, length: 349, content: 叛也非有大度窺竊神器矣但迫足下嚴刑峻網今死者可不追生者猶可安莫若大赦釋諸逆人若沒官者悉還之遽相撫育聽其復業與人更始彼生路既開人情豈有樂禍好亂者也且小人藂居必有他心今無刑辟之懼以恩信懷之不降何待矣縱酋長負罪而不下者請假臣弱兵五千人為足下梟之不勞大軍此可定矣今賊黨既盛彌川被谷君臨之以兵恐非歲月而可殄也此言其術也曜大悅行其計西方遂平王隱晉書曰愍懷太子頗好遊宴洗馬江統等諫曰宜諮詢保傅引見賓客悉得自盡有增博見益多聞晉中興書曰江逌為侍中時穆宗欲於後園脩立池苑逌諫以強賊未滅宜務軍備當存儉約以率群下上即納之也徐廣晉紀曰成帝有乳母經營艱苦詔假其名號顧和諫曰保母奉祐聖躬不遺其勳第舍供給已為隆厚若假以名號非令典也書而不法後嗣何觀帝乃止臧榮緒晉書曰衛瓘字伯玉每議及經國屢形於言色晉祖恐大臣有諫瓘嘗因宴飲歡醉手撫御床, SBCK: 頓首}
