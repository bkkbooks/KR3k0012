  - {type: variant, offset: 317, length: 333, content: 之未見其便數年以來民食不足國無積盛春興擾動天下妨廢農時以事夷狄非所以垂意於中國憫念民命也又曰日蝕司徒丁鴻上䟽曰臣聞春秋日蝕三十六而殺君三十六變不空生夫帝王不宜以重器假人觀古及漢傾危之禍靡不由世位擅寵之家伏見大將軍刺史二千石初除謁辭求通待報雖奉璽書受臺勑不敢去至數十日背公室向私門此乃上威損下權盛外附之臣依託權門諂諛以求容宜誅之又曰竇憲為車騎將軍辟崔駰為掾憲府貴重掾屬三十人皆故刺史二千石唯駰以處士年少擢在其間憲擅權驕恣駰數諫之及出征匈奴道路愈多不法駰為主簿前後奏記數十指切長短憲不能容稍疏之因察駰高弟出為岑長駰自以遠去不得意遂不之官而歸卒于家又曰楊賜字伯獻代劉郃為司徒帝欲造畢圭靈昆苑賜上䟽諫曰竊聞使者並規度城南民田欲以為苑昔先王造囿裁足以脩三驅之禮薪萊芻牧皆悉往焉, SBCK: ''}
