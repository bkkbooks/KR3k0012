  - {type: variant, offset: 1512, length: 0, content: '', SBCK: 栁彧復上奏切諫上乃止唐書曰虞丗南雖容貌懦愞􅀂不勝衣而志性抗烈論及古先帝王爲政得失必存規諷多所􅀘益太宗常謂侍臣曰朕因暇日與虞丗南啇略古今有一言之失未嘗不悵恨其懇誠􅀂此朕用嘉言羣臣皆􅀂丗南天下何憂不理又曰孔頴逹數進忠言益見親待太宗嘗問曰論語云以能問於不能以多問於寡有􅀂無實􅀂虚何謂也頴逹對曰聖人設教欲以謙光已雖有能不自矜大仍就不能之人求訪能事巳之才藝雖多猶以爲少仍就寡小之人更求所益已之雖有其狀􅀂無巳之雖實其容􅀂虚非唯疋庶帝王之德亦當如此夫帝王内藴神明外湏玄黙深不可測度不可知易稱以蒙養正以明夷莅衆􅀂其位居尊極炫燿聦明以才凌人飾非拒諫則上下情隔君臣道乖自古㓕亡莫不由此也太宗深善其對又曰劉洎太宗嘗謂侍臣曰夫人臣之對帝王皆順旨而不逆甘言以取容朕今發問欲聞巳過卿等湏言朕􅄽失長孫無忌李勣楊師道等咸云陛下聖人化致太平臣等不見其失洎對曰陛下化髙萬古誠如無忌等言然頃上書人不稱旨或面加窮詰無不慙退非奬進言者之路太宗曰卿言是也當爲卿改之又曰谷郍律遷諫議大夫嘗從太宗出獵在途遇􅀨因問曰油衣􅀂爲得不漏郍律曰能以瓦爲之則不漏矣意欲太宗弗爲獵太宗大恱賜帛二百叚又曰栁範貞觀中爲侍御史}
  - {type: page-break, offset: 1512, content: '', id: KR3k0012_SBCK_454-4b}
  - {type: variant, offset: 1512, length: 0, content: '', WYG: 柳彧復上奏切諫上乃止唐書曰虞世南雖容貌懦愞若不勝衣而志性抗烈論及古先帝王為政得失必存規諷多所補益太宗常謂侍臣曰朕因暇日與虞世南商略古今有一言之失未嘗不懇懇若此朕用嘉焉使羣臣皆若世南天下何憂不理又曰孔頴逹数進忠言益見親待太宗嘗問曰論語云以能問於不能以多問於寡有若無實若虛何謂也頴達對曰聖人設教欲以謙光已雖有能不自矜大仍就不能之人求訪能事已之才藝雖多猶以為少仍就寡少之人更求所益已之雖有其状若無已之雖實其容若虛非唯臣庶帝王之徳亦當如此夫帝王内藴神明外須緘黙深不可測度不可知易稱以蒙養正以明夷莅衆若其位居曹極炫燿聰明以才凌人飾非拒諫則上下情隔君臣道乖自古滅亡莫不由此也太宗深善其對又曰劉洎太宗嘗謂侍臣曰夫人臣之對帝王皆順㫖而不逆甘言以取容朕今發問欲聞已過卿等須言朕僣失長孫無忌李勣揚師道等咸云陛下聖人化致太平臣等不見其失洎對曰陛下化髙萬古誠如無忌等言然頃上書人不稱㫖或面加窮詰無不慙退非奨進言者之路太宗曰卿言是也當為卿改之又曰谷那律遷諫議大夫嘗從太宗出獵在途遇雨因問曰油衣若為得不漏那律曰能以瓦為之則不漏矣意欲太宗弗為獵太宗大恱賜帛二百段又曰栁範貞觀中為侍御史}
