  - {type: variant, offset: 1312, length: 195, content: 厚撫遊遊即歸服又曰賈詡字文和文帝時為五官將而臨淄侯植才名方盛有奪宗之議文帝使人問詡自固之術詡曰願將軍恢崇德度躬素士之業朝夕孜孜不違子道如此而已文帝從之深自砥礪太祖又當屏除問詡詡嘿然不對太祖曰與卿言而不荅何也詡曰思袁本初劉景升父子也太祖大笑於是太子遂定又曰文帝頻出遊獵或昏夜還宮王朗上䟽曰夫帝王將行則設兵而後登輿清道而後奉引所以顯至尊務戒慎也近日車駕及昏而反非萬乘之至慎也又曰文帝踐祚以高柔為, SBCK: 入}
