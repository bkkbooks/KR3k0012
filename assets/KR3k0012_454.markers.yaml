  - {type: variant, offset: 16, length: 8, content: 自擊彭寵伏惠公諫, SBCK: 軍違謀取敗誅忠良以逞過忿􅀂死而有知當訴將軍於黃泉使將軍不得眠牀枕死趙染攻北地夢魯徽引箭射之且將攻城中弩卒又曰石虎馳獵無度晨出夜歸太子辜􅀓諌}
