  - {type: variant, offset: 2279, length: 69, content: 故周昌比高祖於桀紂劉輔譬趙后於人婢天生忠直雖白刃沸湯往而不顧者誠為時主愛惜天下也建安已來野戰死亡或門單戶盡雖有在者遺孤老弱若今宮室狹小當大, SBCK: ''}
  - {type: variant, offset: 2279, length: 0, content: '', WYG: 之誅事無巨細必言盖酬陛下特加㧞擢耳非輕言也陛下欲開諫諍之路不宜阻居易言上曰卿言是也繇是多聴納又曰栁公權字誠懸㓜嗜學十二能為詞賦元和初進士擢第釋褐秘書省校書郎李聴鎮夏州辟為掌書記穆宗即位入奏事帝召見謂公權曰我於佛寺見卿筆跡思之乆矣即日拜右拾遺翰林侍書學士遷左補闕司封員外郎穆宗政僻嘗問公權筆何盡善對曰用筆在心心正則筆正上改容知其筆諫也唐文宗便殿對六學士上語及漢文恭儉帝舉袂曰此澣濯者三矣學士皆賛詠帝之儉徳唯公權無言帝召而問之對曰人主當進賢良退不肖納諫諍明賞罰服澣濯之衣乃小節耳時周墀同對為之股慄公權詞氣不可奪帝徐謂之曰極知舍人不合作諫議以卿言事有諍臣風采却授卿諫議大夫翌日降制以諫議知制誥學士如}
