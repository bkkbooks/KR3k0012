  - {type: variant, offset: 1627, length: 4, content: 太祖征并, SBCK: 髙宗將廢皇后王氏立武昭儀爲皇后禇遂良欲陳諌及入髙宗難於發言再三顧曰莫大之罪絶嗣爲甚王后無胤息昭儀有子今欲立皇后公等以爲如何遂良曰皇后岀自名家先朝所娶伏事先帝無􅄽婦德先帝不豫執陛下手以語臣曰我好兒好婦今將付卿陛下親承德音言猶在耳皇后自此未有愆過恐不可廢臣今不敢曲從上旨違先帝之命特願再三思審愚臣上忤聖顔罪合萬死但願不負先朝厚恩何顧性命遂良致笏殿陛曰還陛下此笏乃解巾叩頭流血帝大怒令引出因左遷遂良潭}
  - {type: variant, offset: 1627, length: 4, content: 太祖征并, WYG: 髙宗将廢皇后王氏立武昭儀為皇后禇遂良欲陳諫及入髙宗難扵發言再三顧曰莫大之罪絶嗣為甚王后無𦙍息昭儀有子今欲立皇后公等以為如何遂良曰皇后出自名家先朝所娶伏事先帝無替婦徳先帝不豫執陛下手以語臣曰我好兒好婦今将付卿陛下親承徳音言猶在耳皇后自此未愆過恐不可廢臣今不敢曲從上㫖違先帝之命特願再三思審愚臣上忤聖顔罪合萬死但願不負先朝厚恩何顧性命遂良致笏殿階曰還陛下笏乃觧巾叩頭流血帝大怒令引出因左遷遂良潭}
