  - {type: variant, offset: 14, length: 1, content: 上, SBCK: 困獸猶鬭况於國乎染曰索綝小竪豈能汙吾馬蹄刀劒也師精􅀐逆戰于城西敗績悔曰吾不用魯徽之言以至於是乃斬徽徽臨刑謂染曰}
  - {type: page-break, offset: 14, content: '', id: KR3k0012_SBCK_454-1b}
  - {type: variant, offset: 14, length: 9, content: 上將自擊彭寵伏惠公, WYG: 困獸猶鬪况于國乎染曰綝小豎豈能汚吾馬蹄刀劔也帥精騎逆戰于城西敗績悔曰吾不用魯徽之言以至于是乃斬徽徽臨刑謂染曰将軍違謀取敗誅忠良以逞過忿若死而有知當訴将軍于黄泉使将軍不得眠牀枕死趙染攻北地夢魯徽引箭射之且将攻城中弩卒又曰石虎馳獵無度晨出夜歸侍中韋諛}
