  - {type: variant, offset: 2092, length: 183, content: 為河東相又曰時太祖欲征吳而大雨霖三軍多不願行太祖知其然恐外有諫者教曰今孤戒嚴未知所之有諫者死賈逵受教謂其同寮三主簿曰今實不可出而教如此不可諫也乃建諫草以示三人三人不獲皆署名入白事太祖怒收逵等當選獄教取造意者逵即言我造意遂走詣獄獄吏以逵主簿也不即著械逵謂獄吏曰促械我尊者且疑我在近職求緩於卿既而復職又曰明帝徙長安鍾簴起土山寺司徒軍議掾河東董尋上書曰臣聞古之貞士盡言於國, SBCK: ''}
