  - {type: variant, offset: 1514, length: 6, content: 間數有誹謗妖, SBCK: 範奏彈之太宗因謂侍臣曰權萬紀事我兒不能匡正其罪合死範進曰房玄齡事陛下猶不能諌止畋獵豈可獨罪萬紀太宗大怒拂衣而入乆之獨引範謂曰何得逆折我範曰臣聞主聖臣直陛下仁明臣敢不盡愚直太宗意乃解又曰薛收甞上書諌獵太宗手詔曰覽讀所陳實悟心膽今日成我卿之力也明珠兼乗豈比來}
