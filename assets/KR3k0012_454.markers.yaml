  - {type: variant, offset: 6, length: 3, content: 諫諍三, SBCK: 崔鴻前趙録曰劉聦將起鳯儀殿於後庭廷尉陳元逹諌聦怒曰將營一宫豈問汝䑕子乎將斬之時在逍遥園元逹抱堂下樹叫曰臣所言者社稷之計也劉后在後堂密手䟽救之乃解改逍遥園爲納賢園季中堂爲愧賢堂又曰閹豎王沈等用事太宰易大將軍敷御史大夫陳元逹詣闕請固請免沈等官聽以表示沈等沈等􅀏曰是兒等爲元逹所引遂成癡也聦手壞其表又曰趙染次于新豐}
  - {type: variant, offset: 6, length: 3, content: 諫諍三, krp: 崔鴻前趙録曰劉聦將起鳯儀殿於後庭廷尉陳元逹諌聦怒曰將營一宫豈問汝䑕子乎將斬之時在逍遥園元逹抱堂下樹叫曰臣所言者社稷之計也劉后在後堂密手䟽救之乃解改逍遥園爲納賢園季中堂爲愧賢堂又曰閹豎王沈等用事太宰易大將軍敷御史大夫陳元逹詣闕請固請免沈等官聽以表示沈等沈等笑曰是兒等爲元逹所引遂成癡也聦手壞其表又曰趙染次于新豐}
  - {type: variant, offset: 8, length: 1, content: 三, WYG: 四崔鴻前趙録曰劉聰将起鳯儀殿於後庭廷尉陳元逵諫聰怒曰将營二宫豈問汝䑕子乎将斬之時在逍遥園元逵抱堂下樹呌曰臣所言者社稷之計也劉后在後堂宻手疏救之乃解改逍遥園為納賢園李中堂為愧賢堂又曰閹豎王沈等用事太宰易大将軍敷御史大夫元逵詣闕固請免沈等官聰以表示沈等沈等笑曰是兒等為元逵所引遂成痴也聰手壊其表又曰趙染次于新豐}
