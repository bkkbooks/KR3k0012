  - {type: variant, offset: 1914, length: 0, content: '', krp: 獻事冝上怒甚厲聲曰卿所論事何太過耶絳前論不巳曰臣所陳豈臣身之利是國家之利陛下不以臣愚使處腹心之地豈}
