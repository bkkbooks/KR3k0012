  - {type: variant, offset: 27, length: 13, content: 文王享國五十伐崇七年而三分, SBCK: 千金之子坐不垂堂萬乗之主行不履危陛下雖天生神武雄據四海乾坤􅁳賛方無所慮者也然白龍魚服有豫且之禍海􅀂濳遊離葛陂之酷深願陛下清宫蹕路思二神爲玄鑒不忘}
  - {type: variant, offset: 27, length: 0, content: '', WYG: 千金之子坐不埀堂萬乘之主行不履危陛下雖天生神武雄據四海乾坤冥賛萬無所慮者也然白龍魚服有豫且之禍海若潜逰離葛陂之酷願陛下清宫蹕路思二神為先鑒不忘天下之重虎省善之賜以束帛又曰趙明字顯昭南陽人虎攝位拜為尚書及誅勒諸子明諫曰明帝功格皇天為趙之太祖安可以絶之虎曰吾之家事幸卿不須言也以直言忤㫖故十年不遷貞固之風時論擬之蘇則崔鴻前秦録曰苻堅如鄴狩扵西山親馳射獸逰獵旬餘昏而忘返伶人王洛叩馬諫曰若禍起須㬰變在不測者其如宗廟何其如太后何堅曰善哉昔}
  - {type: page-break, offset: 27, content: '', id: KR3k0012_WYG_454-2b, image: WYG0897/WYG0897-0164b.png}
  - {type: variant, offset: 27, length: 13, content: 文王享國五十伐崇七年而三分, krp: 千金之子坐不垂堂萬乗之主行不履危陛下雖天生神武雄據四海乾坤冥賛方無所慮者也然白龍魚服有豫且之禍海若濳遊離葛陂之酷深願陛下清宫蹕路思二神爲玄鑒不忘}
