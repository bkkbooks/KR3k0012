  - {type: variant, offset: 2280, length: 14, content: 周昌比高祖於桀紂劉輔譬趙后於, WYG: 又曰鄭覃穆宗不恤政事喜遊宴即位之始吐蕃冦邉覃與同職崔郾等廷奏曰陛下即位以來宴樂過多畋逰無度今蕃冦在境緩急奏報不知乘輿所在臣等忝備諫官不勝憂惕伏願稍减逰從留心政道伏聞陛下晨夜昵狎倡優近習之徒賞賜太厚凡金銀貨帛皆出自生靈膏血不可使無功之}
