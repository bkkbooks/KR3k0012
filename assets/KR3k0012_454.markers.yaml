  - {type: variant, offset: 29, length: 1, content: 享, WYG: 洛崔鴻前凉録曰張天錫元日與嬖䙝飲既不受羣寮朝賀又不朝扵永訓宫従事郎中張慮輿櫬切諫不納又曰張駿讌羣臣于閒豫堂又欲嚴刑峻制衆咸以為宜叅軍黄斌進曰臣未見其可若尊親犯令不行矣駿性嚴猛乃棄几改容曰微黄生吾不聞過矣黄生可謂忠之至也後魏書曰髙允為中書武帝禁封良田人無田農多游者允上疏諫曰臣少也賤所知惟田請以農事言之夫地方十里為田三頃六十畆百里為田三萬六千頃若勤之則畆増减三斗百里之内損益之率為粟可知矣况天下之廣乎若户有私儲則}
