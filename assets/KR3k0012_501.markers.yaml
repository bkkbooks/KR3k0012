  - {type: variant, offset: 1427, length: 3, content: 今重送, SBCK: 士故有志何至相逼後引光入共偃卧光以足加帝腹上明日太史奏客星犯御座帝􅀏曰朕故人嚴子陵耳除諌議不屈耕冨春山後名其釣處爲嚴陵瀨范曄後漢書逸民傳序曰易稱遯之時義大矣哉是以堯稱則天不屈潁陽之髙武盡羙矣終全孤竹之㓗自兹以降風流彌繁長徃之􅁤未殊而感致之數匪一或隱居以求其志或廻避以全其道或静已以鎮其躁或去危以圖其安或垢俗以動其槩或疪物以激其清然觀其甘心畎畒之中憔悴江海之上豈必親魚鳥樂林草哉亦云性所至而巳京房易飛候曰以知賢人隱視四方常有火雲五色具而不雨其下賢人隱莊子曰古之所謂隱士}
