  - {type: variant, offset: 60, length: 2, content: 每出, SBCK: 者乗白駒而來食我場中苗我絆之縶之也禮曰季春之月聘名士禮賢者又曰儒有上不臣天子下不事諸侯愼靜而尚寛強毅以與人愽學以知服近文章砥礪廉隅雖分國如錙銖不臣不仕其規爲有如此者論語曰子曰賢者避丗其次避地其次避色其次避}
