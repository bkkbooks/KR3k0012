  - {type: variant, offset: 3119, length: 327, content: 讓者車常數百乘累日不得通他後至諸奴迎拜徑將他車獨入眾謂他與讓善爭以物賂他他得以賂讓魏武遺令吾婢皆勤苦使著銅雀臺善待之石虎鄴中記曰石勒字世龍上黨郭季子奴也勒未生之前襄國有讖曰古在左月在右讓言退或入口襄國字也遂治襄國新序曰昌邑王冶側鑄冠十枚以冠賜之師及儒者後以冠冠奴龔遂免冠歸之曰王賜儒者冠下至臣今以餘冠冠奴是大王奴虜畜臣也郭子曰賈公問女悅韓壽問婢識不一婢云是其故主女內懷存想婢後往壽家說如此壽乃令婢通己意女大喜遂與通世說曰鄭玄家奴婢皆讀書玄嘗使一婢不稱旨將撻之方自陳說玄怒使人曳著泥中須臾復一婢來問曰胡為乎泥中答曰薄言往訴逢彼之怒誥林曰裴秀年十八有令望母是婢而嫡母妒猶令秀母親役後大集客秀母下食眾賓見並起拜之答曰微賤豈宜如此當為小兒故耳於是大母乃不敢復使之, WYG: ''}
