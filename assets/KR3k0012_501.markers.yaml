  - {type: variant, offset: 64, length: 1, content: 彼, SBCK: 作者七人矣七人謂長沮桀溺丈人石門荷蕢儀封人楚狂接輿又曰子路曰不仕無義長㓜之節不可廢也君臣之義如之何其廢之欲㓗其身而亂大倫君子之仕也行其義也道之不行巳知之矣逸民伯夷叔齊虞仲夷逸朱張柳下惠少連子曰不降其志不辱其身伯夷叔齊與謂柳下惠少連降志辱身矣言中倫行中慮其斯而巳矣謂虞仲夷逸隱居放言身中清廢中權我則異於是無可無不可漢書曰薛方字子容王莾以安車迎方因使者辤謝曰尭舜在上下}
