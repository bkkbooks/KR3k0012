  - {type: variant, offset: 2767, length: 1880, content: 婢玄道問婢所由云本良家子為君廓所掠玄道因放遣之管子曰齊桓公使管仲求甯戚應之曰浩浩乎管仲不能知婢子問之仲曰非婢子所知也婢子曰詩有之浩浩之水游游之魚未有室家我將安居甯子其欲室乎仲以言告桓公風俗通曰南陽龐儉少失其父後居閭里鑿井得錢千餘萬行求老蒼頭使主牛馬耕直錢二萬有賓婚大會奴在竈下竊言堂上母我婦也婢即白其母母使驗問曰是我公也因下堂抱其頸啼泣遂為夫婦儉及子歷二千石刺史七八人時人為之語曰廬里龐公鑿井得銅買奴得公又曰將作大匠陳國公孫志節有蒼頭地餘年十七情性聰惠儀狀端正工書䟽志節為戶曹史令地餘歸取資用因持車馬亡去到丹陽自云姓王名斌字文高遂留為諸曹史志節拜揚州刺史郡選曹史衣冠子弟皆出斌下乃用之斌乞屏左右叩頭涕洟曰斌即明使君地餘也斌後為蒼梧太守三輔決錄曰平陵孟他盡以家財賂張讓監奴奴慚問所欲他曰欲得卿曹拜時賓客求見讓者車常數百乘累日不得通他後至諸奴迎拜徑將他車獨入眾謂他與讓善爭以物賂他他得以賂讓魏武遺令吾婢皆勤苦使著銅雀臺善待之石虎鄴中記曰石勒字世龍上黨郭季子奴也勒未生之前襄國有讖曰古在左月在右讓言退或入口襄國字也遂治襄國新序曰昌邑王冶側鑄冠十枚以冠賜之師及儒者後以冠冠奴龔遂免冠歸之曰王賜儒者冠下至臣今以餘冠冠奴是大王奴虜畜臣也郭子曰賈公問女悅韓壽問婢識不一婢云是其故主女內懷存想婢後往壽家說如此壽乃令婢通己意女大喜遂與通世說曰鄭玄家奴婢皆讀書玄嘗使一婢不稱旨將撻之方自陳說玄怒使人曳著泥中須臾復一婢來問曰胡為乎泥中答曰薄言往訴逢彼之怒誥林曰裴秀年十八有令望母是婢而嫡母妒猶令秀母親役後大集客秀母下食眾賓見並起拜之答曰微賤豈宜如此當為小兒故耳於是大母乃不敢復使之又曰石崇廁有十餘婢侍列莫不畢備又與新衣出客多羞不能如廁王敦大將軍往脫故衣著新衣意慠然群婢謂曰此客必能作賊又曰宗岱為青州刺史禁淫祀著無鬼論甚精莫能屈後有書生詣岱岱與談論書生乃振衣而去曰絕我輩血食二十餘年君有青牛髯奴所以未得相困耳奴已叛牛已死今日得相制矣言絕而失明日而岱亡搜神記曰諸葛恪已被殺其妻在室問婢曰汝何故血臭婢蹶然起躍至於棟榱臂切齒而言曰諸葛恪公乃為孫峻所殺又曰晉杜世嘏家葬而婢誤不得出十餘年開墓而婢尚生云其始如眠有頃漸覺自謂一再宿初婢之埋年十五六及開冢更生猶十五六也嫁之有子續搜神記曰勾章張然滯役在都有少婦遂與奴通然養一狗甚快後還奴欲謀殺然張弓拔刀當戶然大喚曰烏龍狗遂咋奴頭然因取刀殺奴以婦付官梁冀別傳曰梁冀愛監奴秦宮官至太倉令得出入妻所每見輒屏御者託以言事因通焉內外兼寵刺史二千石皆謁拜之扶風人士孫奮居富冀從貸錢五千萬奮以三千萬與之冀大怒乃告郡縣認奮母為守臧婢云盜白珠十斛紫磨金千斤以叛遂牧考奮兄弟死於獄中悉沒貨財顧譚別傳曰譚為太常錄尚書事從交州家無私積奴婢不滿十人杜蘭香傳曰晉太康中蘭香降張碩為詩贈碩云縱轡代摩奴須臾就尹喜摩奴是香御車奴曾忤其旨是以自御碩說如此異錄傳曰廬陵歐明商行經彭澤湖每以物投湖中為禮後見湖中有吏著單衣乘馬云青洪君使要明過至一府舍吏曰青洪感君以禮必有重送者皆勿取但求如願明從之青洪君不得已呼如願送明去如願者神婢也所願輒得數年大富列女傳曰周室大夫仕於周妻淫於鄰人恐主父還覺之為毒藥使媵婢進之婢恐進之則殺主父言之則殺主母因僵仆覆酒主父怒而笞妻恐婢言之因他過欲殺婢婢就杖將死而不言主父之弟聞之具以告主人殺其妻將納婢以為妻婢辭欲自殺主父乃厚幣嫁之列女後傳曰會稽翟素者翟氏之女受娉未及配適遭賊欲犯之臨以刃曰不從者今即死矣素曰我可得而殺不可得而辱素婢名青青乞代素賊遂殺素復欲犯青青曰向欲代素者恐彼恥獲害今素已死我豈有欲哉賊復殺之漢王褒僮約曰蜀郡王褒以事止寡婦楊惠舍有一奴名便倩行酤酒便曰大夫買便時但要守家不約為他家男子酤酒也褒大怒曰寧欲賣耶奴復曰欲使便皆當上券不上券便不能為也褒乃為券曰奴百役不得有二言晨起早掃飲食洗滌居當穿臼縛帚裁盂鑿斗出入不得騎馬載車踑坐大呶下床振頭垂鉤刈芻織履作麤黏雀張鳥結網捕魚繳鴈彈鳧登山射鹿入水捕龜後園縱魚鴈騖百餘驅逐鴟鳥持梢牧豬種薑養羊長育豚駒糞除堂廡飲馬食牛鼓四起坐夜半益芻舍中有客提壺行酤汲水作餔滌杯整按奴但當飯豆飲水不得嗜酒欲飲美酒唯得染脣口不得傾盂覆斗不得晨出夜入交關伴偶多取蒲茅益作繩索雨墮無所為當編蔣織植種桃李梨柿柘桑三丈一樹八尺為行菓類相從縱橫相當果熟收歛不得吮嘗犬吠當起驚告鄰里槍門柱戶上樓擊柝持楯曳矛還落三周勤心疾作不得遨遊奴老力索種莞織席事訖欲休當舂一石夜半無事浣衣當白若有私錢主給賓客奴不得有奸私事當聞白奴不聽教當笞一百讀券文訖辭窮咋索仡仡叩頭兩手自搏目淚下落鼻涕長尺審如王大夫言不如早歸黃土陌丘蚓鑽額早知當爾為王大夫酤酒真不敢作惡, SBCK: ''}
