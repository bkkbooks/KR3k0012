  - {type: variant, offset: 1482, length: 211, content: 志曰晉室踐阼下詔曰故司空王基著德立勳不營產業其以官奴二人賜其家又曰陳泰護匈奴中郎京邑貴人多寄寶貨因泰市奴婢泰皆挂之於壁不發其封及徵為尚書悉以還之蜀志曰劉琰侈靡侍婢能為聲樂又教誦靈光殿賦又曰初孫權以妹妻先主妹才捷剛猛有諸兄風侍婢百餘人執刀立先主每入心常懍懍晉書曰石崇有蒼頭八百餘又崇有婢綠珠美而豔善吹笛孫秀使人求之崇時在金谷別館方登涼臺臨清流婦人侍側使者以告崇盡出婢妾數十人以示之皆蘊蘭麝被羅縠曰在所擇使者曰君侯服御麗矣然本, SBCK: 興}
