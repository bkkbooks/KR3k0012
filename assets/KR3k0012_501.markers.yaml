  - {type: 'tls:seg', offset: 3546, content: '', id: KR3k0012_CHANT_501-46a.13}
  - {type: variant, offset: 3546, length: 0, content: '', WYG: 時有女子從康買藥守價不移女子怒曰公是韓伯休耶乃不二價乎康歎曰我本欲辟名今女子皆知有我遂遁入霸陵山中博士公車連徴不至桓帝乃備𤣥纁之禮以安車聘之使者賷詔造康不得已乃許諾辭安車自乗柴車冒晨先使者發至亭亭長以韓徵}
  - {type: variant, offset: 3547, length: 0, content: '', WYG: 當過方發人牛修道橋及見康柴車幅巾以為田叟也使奪其牛康即釋駕與之}
  - {type: page-break, offset: 3547, content: '', id: KR3k0012_WYG_501-6b, image: WYG0897/WYG0897-0517b.png}
  - {type: variant, offset: 3548, length: 1, content: 青, WYG: 頃使者至奪}
  - {type: variant, offset: 3550, length: 2, content: 髯奴, WYG: 翁乃徴君也使者欲奏殺亭長康曰此自老子與之亭長何罪康因中道逃遁以夀終又曰矯慎字仲彦扶風茂陵人也少好黄老隠遁山谷因穴為屋仰慕松喬導引之術汝南吳蒼甚重之遺書以觀其志慎不答年七十餘竟不肯娶後忽歸家自言死日及期果卒又曰馬瑶矯慎同郡人也隱於汧山以􅇠罝為事}
  - {type: punctuation, offset: 3552, content: ，, id: KR3k0012_CHANT_501-bkkpn1046}
  - {type: 'tls:seg', offset: 3552, content: '', id: KR3k0012_CHANT_501-46a.14}
  - {type: variant, offset: 3553, length: 3, content: 以未得, WYG: 居俗化百姓恱之號為馬牧先生又曰陳留老父不知何許人也桓帝代黨錮事起守外黄令陳留張升去官歸鄉里道逢友人共班草而言升曰吾聞趙殺鳴犢仲尼臨河而返覆巢竭淵龍鳳逝而不至今宦豎日亂陷􅊣忠良賢人君子其去朝乎夫徳之不建人之無援將性命之不免奈何因}
  - {type: page-break, offset: 3553, content: '', id: KR3k0012_WYG_501-7a, image: WYG0897/WYG0897-0517c.png}
  - {type: variant, offset: 3557, length: 16, content: 困耳奴已叛牛已死今日得相制矣言絕, WYG: 抱}
