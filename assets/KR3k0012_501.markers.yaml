  - {type: variant, offset: 2551, length: 215, content: 六亦有膂力翰善使槍追賊及之以槍搭其肩而喝之賊驚顧翰從而剌其喉皆剔高三丈而墮無不死者左車輒下馬斬首率以為常又曰德宗初即位詔曰邕府歲貢奴婢使其離父母之鄉絕骨肉之戀非仁也罷之又曰羅讓累遷至福建觀察使兼御史中丞甚著仁惠有以女奴遺讓者讓訪其所自曰本某寺家人兄姊九人皆為官所鬻其留者唯老母耳讓慘然焚其丹書以歸其母又曰李玄道累遷給事中封姑臧縣男時王君廓為幽州都督朝廷以其武將不習時事拜玄道幽州長史以維持府事廓在郡屢為非法玄道數正議裁之嘗又遺玄道, SBCK: 百}
