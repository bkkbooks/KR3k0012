  - {type: variant, offset: 1416, length: 0, content: '', SBCK: 臣諸侯有所不友司徒侯覇讓位於覇閻陽毁之遂止以病歸隱居守志連徴不至又曰閔叔仲代稱節士雖周黨之㓗清自以弗及也黨見其含菽飲水遺之以生蒜受而不食建武中應司徒侯覇之辟旣而投劾而去復徴愽士不至客居安邑老病家貧不能得肉日買猪肝一斤屠者或不肯}
  - {type: variant, offset: 1416, length: 0, content: '', krp: 臣諸侯有所不友司徒侯覇讓位於覇閻陽毁之遂止以病歸隱居守志連徴不至又曰閔叔仲代稱節士雖周黨之㓗清自以弗及也黨見其含菽飲水遺之以生蒜受而不食建武中應司徒侯覇之辟旣而投劾而去復徴愽士不至客居安邑老病家貧不能得肉日買猪肝一斤屠者或不肯}
  - {type: variant, offset: 1417, length: 1, content: 婢, SBCK: 安邑令聞勑市吏常給焉仲叔恠而問之知乃歎曰閔叔仲豈以口腹累安邑乎遂去客沛以壽卒又曰野王二老不知何許人也􅀄丗祖貳於更始㑹􅀜中擾亂遣鄧禹西征送之於道旣反因於野王獵路見二老即禽丗祖問曰禽何向舉手西指言此中多虎臣每即禽虎亦即臣大王勿往也丗祖曰苟有其備虎亦何患二老曰何大王之謬耶昔湯即桀於鳴條而大城於亳武王即紂於牧野而大城於郟鄏彼二王}
  - {type: page-break, offset: 1417, content: '', id: KR3k0012_SBCK_501-6a}
  - {type: variant, offset: 1417, length: 1, content: 婢, krp: 安邑令聞勑市吏常給焉仲叔恠而問之知乃歎曰閔叔仲豈以口腹累安邑乎遂去客沛以壽卒又曰野王二老不知何許人也𥘉丗祖貳於更始㑹關中擾亂遣鄧禹西征送之於道旣反因於野王獵路見二老即禽丗祖問曰禽何向舉手西指言此中多虎臣每即禽虎亦即臣大王勿往也丗祖曰苟有其備虎亦何患二老曰何大王之謬耶昔湯即桀於鳴條而大城於亳武王即紂於牧野而大城於郟鄏彼二王}
