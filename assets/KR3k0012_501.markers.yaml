  - {type: variant, offset: 219, length: 479, content: 名私語行事人使不加力既而載出城外根得蘇因得逃竄為宜城山中酒家保保使也言為人傭力保任而使也積十五年酒家知其賢厚敬待之神仙傳曰仙人李八伯者欲授唐公房仙術乃為作傭客身作惡瘡膿潰臭惡使公房夫人舐之瘡愈乃授以丹經一卷奴婢說文曰奴婢皆古之罪人也方言曰荊淮海岱雜齊之間俗不純為雜罵奴曰臧罵婢曰獲齊之北鄙燕之北郊凡民男而婿婢謂之臧女而婦奴謂之獲亡奴謂之臧亡婢謂之獲皆異方罵奴婢之醜稱也周禮天官上酒人職曰女酒三十人奚三百人女酒女故曉酒者古者徒男女沒入縣官曰奴其少才智者以為奚今之侍史官奴是也又秋官上司厲職曰其奴男子入於罪隸女子入於舂槀鄭司農云謂坐為盜賊而為奴者輸於罪隸舂人槀人之官也由是觀之今之奴婢古之為人也凡有爵者與七十者與未齓者皆不為奴有爵謂命士以上也齔毀也男年八歲女七歲而毀齒左傳襄四年曰斐豹隸也著於丹書隸罪隸斐豹有罪沒官為奴丹書罪約也論語微子曰殷有三仁焉微子去之箕子為之奴比干諫而死史記曰季布者楚人也項籍使將兵數窘漢王及項羽滅季布匿濮陽周氏周氏曰漢求將軍急且至臣家能聽臣臣敢進計季布許之乃髡鉗季布賣之朱家朱家心知是季布乃買而置之因誡其子曰田事聽此奴必與同食又曰欒布為人, SBCK: ''}
