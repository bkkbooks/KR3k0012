  - {type: variant, offset: 115, length: 5, content: 公沙穆來遊, SBCK: 或問汝南范滂曰郭林宗何如人滂曰隱不違親貞不絶俗天子不得臣諸侯不得友吾不知其他又曰隗囂素聞杜林志節深相敬待以爲治書後因疾告去囂復欲留強起遂稱疾篤􅅝意雖相望且欲復容之乃岀命曰杜伯山伯山林之字也天子所不能臣諸侯所不能友蓋伯夷叔齊不食周粟令且從師友之位林雖拘於囂終不屈節又曰趙歧􅀄名嘉年四十有重疾卧蓐七年慮奄然乃遺令勑兄子曰大丈夫遁無箕山之操仕無伊尹之勲天不我與復何言哉可立一圓石於吾墓側前刻之曰漢有逸人姓趙名嘉有志無時命也奈何又曰樊曄字子融有俊才好黄老不肯爲吏又逢萌字子廉北海都昌人也家貧給事縣爲亭長時尉行過亭萌候迎拜謁旣而擲楯歎曰大丈夫安能爲人役哉遂去之長安學通春秋時王莽殺其子宇萌謂友人曰三綱絶矣不去禍將及人即解冠桂東都城門歸將家属浮海客於遼東萌素明隂陽知莽將敗有頃乃首戴瓦盆哭於市曰新乎新乎因遂潜藏及光武即位乃之琅邪勞山飬志修道人皆化其德北海太守素聞其髙遣吏奉謁致禮萌不荅後詔書徴萌託以老耄迷路東西詔使者云朝廷所以徴我者以其有益於政尚不知方面所在安能濟時乎即便駕歸連徴不起以壽終又曰井丹字大春扶風郿人也少受業}
