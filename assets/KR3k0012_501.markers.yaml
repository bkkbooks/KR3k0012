  - {type: variant, offset: 122, length: 143, content: 無資糧乃變服客傭為吳祐賃舂祐與語大驚遂共定交於杵臼之間又曰杜根字伯永初元年舉孝廉為郎中時和熹鄧后臨朝權在外戚根以帝年長宜親政事乃與同時郎上書直諫太后大怒收執根等令盛以縑囊於殿上撲殺之執法者以根知名私語行事人使不加力既而載出城外根得蘇因得逃竄為宜城山中酒家保保使也言為人傭力保任而使也積十, WYG: 通}
