  - {type: variant, offset: 1523, length: 1430, content: 邑貴人多寄寶貨因泰市奴婢泰皆挂之於壁不發其封及徵為尚書悉以還之蜀志曰劉琰侈靡侍婢能為聲樂又教誦靈光殿賦又曰初孫權以妹妻先主妹才捷剛猛有諸兄風侍婢百餘人執刀立先主每入心常懍懍晉書曰石崇有蒼頭八百餘又崇有婢綠珠美而豔善吹笛孫秀使人求之崇時在金谷別館方登涼臺臨清流婦人侍側使者以告崇盡出婢妾數十人以示之皆蘊蘭麝被羅縠曰在所擇使者曰君侯服御麗矣然本受命止索綠珠不識孰是崇勃然曰綠珠吾所愛不可得也秀遂誅崇又曰郭璞愛主人婢無由而得乃取小豆三斗繞主人宅散之主人晨起見赤衣人數千圍其家就視則滅甚惡之請璞為卦璞曰君家不宜畜此婢可於東南二十里賣之慎勿爭價則此祓可除也主人從之璞陰令人賤買此婢復為符投井中數千赤衣人皆反縛一一自投於井主人大悅璞攜婢去又曰祖納少孤貧自炊以養母平北將軍王敦聞之遺其二婢辟為從事中郎有戲之曰奴價倍婢納曰百里奚何必輕於五羖皮又曰劉惔性簡貴與王羲之雅相友善郄愔有傖奴善知文章羲之愛之每稱奴于惔惔問何如方回耶羲之曰小人耳何比郄公惔曰若不如方回故常奴耳又曰桓溫自以雄姿風氣是宣帝劉琨之儔有以比王敦者意甚不平及是征還於北方得一巧作老婢訪之乃琨妓女也一見溫便潛然而泣溫問其故答曰公甚似劉司空溫大悅出外整理衣冠又呼婢問之婢云脣甚似恨薄眼甚似恨小鬢甚似恨赤形甚似恨短聲甚似恨雌溫於是褫冠解帶昏然而睡不怡者數日又曰幸靈周旋江州間謂其士人曰天地之於人物一也咸欲不失其性奈何制服人以為奴婢乎諸君若欲享多福以保姓命可悉免遣之又曰干寶父先有所寵侍婢母甚妒忌及父亡母乃生推婢於墓中寶兄弟年小不審之也後十餘年母喪開墓而婢伏棺如生載還經日乃蘇言其父常取餘食與之息情如生家中吉凶輒語之考校悉驗地中亦不覺為惡既而嫁又生子又曰桓伊傳晉孝武帝召伊飲帝命伊吹笛伊即吹為一弄乃放笛云臣於箏分乃不及笛然自足以韻合歌管請以箏歌并請一吹笛人帝善其調達乃勑御妓奏笛伊又云御府人於臣自不合臣有一奴善相便串帝彌賞其放率乃許召之奴既吹笛伊便撫箏而歌晉中興書曰祖約為丞相從事中郎於府內為婢所傷司真劉隗奏約患生婢僕身被刑傷約甚慚恥遂解職還家齊書曰虞悰治家富殖奴婢無游手雖在南土而會稽海味無不畢致焉又曰陸澄弟鮮揚州主簿顧測以兩奴就鮮質錢鮮死子晫誣為買券澄為中丞測與書相往反後又牋與太守蕭緬云澄欲成子弟之非未近義方之訓此趍販所不為況搢紳領袖儒宗勝達乎崔鴻十六國春秋前秦錄曰慕容沖進逼長安堅登城觀之歎曰此虜何從出也其強若斯大言責沖曰爾輩群奴正可牧牛羊何為送死沖曰奴則奴矣既猒奴苦復欲取爾見代唐書曰哥舒翰有家奴曰左車年十五六亦有膂力翰善使槍追賊及之以槍搭其肩而喝之賊驚顧翰從而剌其喉皆剔高三丈而墮無不死者左車輒下馬斬首率以為常又曰德宗初即位詔曰邕府歲貢奴婢使其離父母之鄉絕骨肉之戀非仁也罷之又曰羅讓累遷至福建觀察使兼御史中丞甚著仁惠有以女奴遺讓者讓訪其所自曰本某寺家人兄姊九人皆為官所鬻其留者唯老母耳讓慘然焚其丹書以歸其母又曰李玄道累遷給事中封姑臧縣男時王君廓為幽州都督朝廷以其武將不習時事拜玄道幽州長史以維持府事廓在郡屢為非法玄道數正議裁之嘗又遺玄道一婢玄道問婢所由云本良家子為君廓所掠玄道因放遣之管子曰齊桓公使管仲求甯戚應之曰浩浩乎管仲不能知婢子問之仲曰非婢子所知也婢子曰詩有之浩浩之水游游之魚未有室家我將安居甯子其欲室乎仲以言告桓公風俗通曰南陽龐儉少失其父後居閭里鑿井得錢千餘萬行求老蒼頭使主牛馬耕直錢二萬有賓婚大會奴在竈下竊言堂上母我婦也婢即白其母母使驗問曰是我公也因下堂抱其頸啼泣遂為夫婦儉及子歷二千石刺史七八人時人, WYG: 師}
