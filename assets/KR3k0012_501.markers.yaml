  - {type: variant, offset: 4239, length: 408, content: 奴名便倩行酤酒便曰大夫買便時但要守家不約為他家男子酤酒也褒大怒曰寧欲賣耶奴復曰欲使便皆當上券不上券便不能為也褒乃為券曰奴百役不得有二言晨起早掃飲食洗滌居當穿臼縛帚裁盂鑿斗出入不得騎馬載車踑坐大呶下床振頭垂鉤刈芻織履作麤黏雀張鳥結網捕魚繳鴈彈鳧登山射鹿入水捕龜後園縱魚鴈騖百餘驅逐鴟鳥持梢牧豬種薑養羊長育豚駒糞除堂廡飲馬食牛鼓四起坐夜半益芻舍中有客提壺行酤汲水作餔滌杯整按奴但當飯豆飲水不得嗜酒欲飲美酒唯得染脣口不得傾盂覆斗不得晨出夜入交關伴偶多取蒲茅益作繩索雨墮無所為當編蔣織植種桃李梨柿柘桑三丈一樹八尺為行菓類相從縱橫相當果熟收歛不得吮嘗犬吠當起驚告鄰里槍門柱戶上樓擊柝持楯曳矛還落三周勤心疾作不得遨遊奴老力索種莞織席事訖欲休當舂一石夜半無事浣衣當白若有私錢主給賓客奴不得有奸私事當聞白奴不聽教當笞一百讀券文訖辭窮咋索仡仡叩頭兩手自搏目淚下落鼻涕長尺審如王大夫言不如早歸黃土陌丘蚓鑽額早知當爾為王大夫酤酒真不敢作惡, WYG: ''}
