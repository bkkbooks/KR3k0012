  - {type: variant, offset: 3629, length: 2, content: 晉杜, WYG: 龎公者南郡襄陽人也居峴山之南未嘗入城府夫妻相敬如賔荆州劉表數延請不能屈乃就候之謂曰夫保全一身孰若保全天下乎公笑曰鴻鵠巢於髙林之上暮而得所棲黿鼉穴於深淵之下夕而得所宿夫趨舍行止亦人之巢穴也且各得其栖宿而已天下非所保也因釋耕於壠上而妻子耘於前表指而問曰先生苦居􅅵畝而不肯官禄後代何以遺子孫乎公曰}
  - {type: page-break, offset: 3631, content: '', id: KR3k0012_WYG_501-8a, image: WYG0897/WYG0897-0518a.png}
  - {type: variant, offset: 3632, length: 1, content: 嘏, WYG: 人皆遺之以危今獨遺之以安雖所遺不同未為無所遺也表歎息而去後攜其妻子而登鹿門山因採藥不返又曰向長字子平髙士傳向字作尚河内朝歌人也隠居不仕性尚中和好誦易老貧無資食好事者更饋焉受之取足而反其餘王莽大司空王邑辟之連年乃至欲薦於莽固辭乃止遂求退讀易至於損益卦喟然嘆曰吾已知富不如貧貴不如賤未知死何如生耳建武中男女嫁娶既畢勅斷}
  - {type: page-break, offset: 3632, content: '', id: KR3k0012_WYG_501-8b, image: WYG0897/WYG0897-0518b.png}
  - {type: variant, offset: 3634, length: 4, content: 葬而婢誤, WYG: 事勿相闗當如我死也於是遂肆意與同好北海禽慶俱遊五嶽名山}
  - {type: punctuation, offset: 3635, content: ，, id: KR3k0012_CHANT_501-bkkpn1072}
