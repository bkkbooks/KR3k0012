  - {type: variant, offset: 1421, length: 5, content: 財貨汙府君, SBCK: 即人者人亦即之雖有其備庸可忽乎丗祖悟其旨謂左右曰此隱者也將用之辝去莫知所在又曰嚴光字子陵㑹稽餘姚人少有髙名與丗祖同逰學及丗祖即位光乃變姓名隱身不見帝思其賢乃令以物色訪之齊國上言有一男子披羊裘釣澤中乃備安車􅀇纁聘之三反而後至車駕即幸其館至光卧所撫光腹曰咄咄子陵何不出相助爲治耶光曰昔唐虞著德巢父洗}
