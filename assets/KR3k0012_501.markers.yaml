  - {type: variant, offset: 425, length: 1097, content: 曉酒者古者徒男女沒入縣官曰奴其少才智者以為奚今之侍史官奴是也又秋官上司厲職曰其奴男子入於罪隸女子入於舂槀鄭司農云謂坐為盜賊而為奴者輸於罪隸舂人槀人之官也由是觀之今之奴婢古之為人也凡有爵者與七十者與未齓者皆不為奴有爵謂命士以上也齔毀也男年八歲女七歲而毀齒左傳襄四年曰斐豹隸也著於丹書隸罪隸斐豹有罪沒官為奴丹書罪約也論語微子曰殷有三仁焉微子去之箕子為之奴比干諫而死史記曰季布者楚人也項籍使將兵數窘漢王及項羽滅季布匿濮陽周氏周氏曰漢求將軍急且至臣家能聽臣臣敢進計季布許之乃髡鉗季布賣之朱家朱家心知是季布乃買而置之因誡其子曰田事聽此奴必與同食又曰欒布為人所略賣為奴於燕燕將臧茶舉以為都尉又曰衛青為侯家人少時歸其父使牧羊先母之子皆畜奴之不以為兄弟有鉗徒相青官至封侯青笑曰人奴之生得無笞罵即足矣安得封侯又曰漢武帝時東置滄海郡人徙之費府庫並虛募民能入奴婢得以終身為郎增秩又曰霍光愛幸監奴馮子都常與計事又曰薛宣奏張於驕縱奴者並乘勢為暴至求吏妻不得殺其夫又曰原涉遣奴至市買肉奴秉涉氣與屠爭言斫傷屠者亡是時茂陵令尹翁歸新視事知涉名豪欲以厲俗遣兩使脅守涉至日中奴不出吏欲殺涉涉肉袒自縛箭貫耳詣廷尉門謝罪又曰張安世家僮七百人皆有手技又曰齊俗賤奴虜而刀間獨愛貴之桀黠奴人之所患唯刀間收取使之終得其力又曰王鳳群弟爭為驕侈奴僮以千數又曰孝宣皇帝詔曰夫褒有德賞元功古今通議也大司馬大將軍霍光宿衛忠正宣德明恩守節秉義以安宗廟賞賜前後奴婢百七十人又曰王丹盡得父財家累千金奴僮數百又曰傅太后使謁者置諸官婢賤取之復取執金吾官婢八人東觀漢記曰彭寵奴子密等三人共謀劫寵寵時齋獨在便坐室中晝臥子密等三奴縛寵著床板告外吏大王解齋吏皆便休又用寵聲呼其妻入室見寵寵曰趍為諸將軍辨裝兩奴將妻入取寵物一奴守寵寵謂奴曰若小兒我素所愛今解我縛當以女珠妻若小奴見子密聽其語遂不得解子密收金玉衣物使寵妻縫兩縑囊夜解寵手令作記告城門將軍云今遣子密等詣蘭卿子后所其開門出勿稽留書成即斷寵及妻頭置縑囊中西入上告又曰劉寬嘗有客遣蒼頭市酒迂久大醉而還罵曰畜生遣人視奴疑必自殺寬嘗朝會莊嚴已訖妻使婢奉羹飜汙朝衣婢遽收之寬徐曰羹爛汝手又曰司隸校尉梁松奏特進馬防兄廖廖子孫三家奴婢千人又曰鄧弘字叔紀奴醉擊長壽亭長亭長將詣第白之弘即見亭長賞錢五千異日奴復與宮中衛士忿爭衛士歐箠奴弘問復賞五千又曰朱暉為郡督郵太守阮況當嫁女欲買暉婢不與及況卒暉送金三斤人問其故暉曰前不與婢者恐以財貨汙府君耳今重送者以明己心也又曰祝良為洛陽令常侍樊豐妻殺侍婢置井中良收其妻殺之又曰韓卓臘日奴竊食祭其母卓義其心即日勉之魏志曰晉室踐阼下詔曰故司空王基著德立勳不營產業其以官奴二人賜其家又曰陳泰護匈奴中郎, WYG: ''}
