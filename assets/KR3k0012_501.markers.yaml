  - {type: variant, offset: 1764, length: 494, content: 請璞為卦璞曰君家不宜畜此婢可於東南二十里賣之慎勿爭價則此祓可除也主人從之璞陰令人賤買此婢復為符投井中數千赤衣人皆反縛一一自投於井主人大悅璞攜婢去又曰祖納少孤貧自炊以養母平北將軍王敦聞之遺其二婢辟為從事中郎有戲之曰奴價倍婢納曰百里奚何必輕於五羖皮又曰劉惔性簡貴與王羲之雅相友善郄愔有傖奴善知文章羲之愛之每稱奴于惔惔問何如方回耶羲之曰小人耳何比郄公惔曰若不如方回故常奴耳又曰桓溫自以雄姿風氣是宣帝劉琨之儔有以比王敦者意甚不平及是征還於北方得一巧作老婢訪之乃琨妓女也一見溫便潛然而泣溫問其故答曰公甚似劉司空溫大悅出外整理衣冠又呼婢問之婢云脣甚似恨薄眼甚似恨小鬢甚似恨赤形甚似恨短聲甚似恨雌溫於是褫冠解帶昏然而睡不怡者數日又曰幸靈周旋江州間謂其士人曰天地之於人物一也咸欲不失其性奈何制服人以為奴婢乎諸君若欲享多福以保姓命可悉免遣之又曰干寶父先有所寵侍婢母甚妒忌及父亡母乃生推婢於墓中寶兄弟年小不審之也後十餘年母喪開墓而婢伏棺如生載還經日乃蘇言其父常取餘食與之息情如生家中吉凶輒語之考校悉驗地中亦不覺為惡既而嫁又生子又曰桓伊傳晉孝武帝召伊飲帝命伊吹笛伊即吹為一弄乃放笛云臣於箏分乃不及笛然自足以韻合, SBCK: ''}
