  - {type: variant, offset: 122, length: 0, content: '', SBCK: 通五經善談論故京師爲之語曰五經紛紛井大春性清髙未嘗修刺􅀱人建武末沛王輔等五王居北宫皆好賔客更遣請丹不能致信陽侯隂就光烈皇后弟也以外戚貴盛乃詭說五王求錢千萬約能致丹而别使人要刼之丹不得巳旣至就故爲設麥飯葱菜之食丹推去之曰以君侯能供甘旨故來相過何其薄乎更置盛饌乃食及就左右進輦丹􅀏曰吾聞紂駕人車豈此耶㘴中皆失色就不得巳而令去輦自是隱閉不􅀜人事以壽終又曰髙鳯字文通南陽葉人也少爲書生家以農畒爲業而專精誦讀晝夜不息妻常之田曝麥於庭令鳯護雞時天􅁀雨而鳯持竿誦經不覺潦水流麥妻還怪問鳯方悟之其後遂爲名儒鄰里有争財者持其兵而􅃲鳯徃解之不巳乃脫巾叩頭固請曰仁義遜讓柰何弃之於是争者懷感􅄬兵謝罪鳯年老執志不倦名聲著聞太守連召請恐不得免自言夲巫家不應爲吏又詐與寡嫂訟田遂不仕又曰臺佟音同字孝威魏郡鄴人也隱於武安山鑿穴爲居採藥自建業􅀄中州辟不就刺史行部乃使從事致謁佟病徃謝刺史曰孝威居身如是甚苦如何佟曰佟幸得保終性命存神飬和如明使君奉宣詔書夕􅅥庻事反不苦耶遂去隱逸終不見又曰韓康字伯林京兆霸陵人常採藥名山賣於長安市口不二價三十餘年時有女子從康買藥守藥價不移女子怒曰公是韓伯林耶乃不二價乎康歎曰我夲欲避名今女子皆知有我遂遁入覇陵山中愽士公車連徴不至桓帝乃備􅀇纁之禮以安車聘之使者奉詔造康不得巳乃許諾辤安車自乗柴車冒晨先使者發至亭亭長以韓徴君當過方發人牛修道橋及見康柴車幅巾公爲田􅅱也使奪其牛康即釋駕與之有頃使者至奪牛翁乃徴君也使者欲奏殺亭長康曰此自老子與之亭長何罪康因中道逃遁以壽終又曰矯愼字仲彦扶風茂陵人也少好黄老隱遁山谷因穴爲屋仰慕松喬導引之術汝南呉蒼甚重之遺書以觀其志慎不荅年七十餘竟不肯娶後忽歸家自言死日及期果卒又曰馬瑶矯慎同郡人也隱於汧山以兎置爲事所居俗化百姓􅀃之号馬牧先生又曰陳留老父不知何許人也桓帝代黨錮事起守外黄令陳留張升去官歸郷里道逢友人共班荆而言升曰吾聞趙殺鳴犢仲尼臨河而返覆巢竭淵龍鳯逝而不至今官竪日亂䧟害忠良賢人君子其去朝乎夫德之不建人之無援將性命之不免柰何因相抱而泣老父趍而過之植杖太息而言曰吁二丈夫何泣之悲也龍不隱鱗鳯不藏羽網羅髙懸去將安所雖泣何及乎二人欲與之語不頋而去莫知所終又曰龐公者南郡襄陽人也居峴山之南未常入城府夫妻相敬如賔荆州劉表數延請不能屈乃就候之謂曰夫保全一身孰􅀂保全天下乎公􅀏曰鴻鵠巢於髙林之上暮而得所栖黿鼉穴於深淵之下夕而得所􅀫夫趍舎行止亦人之巢穴也且各得其栖􅀫而巳天下非所保也因釋耕於壠上而妻子耘於前表指而問曰先生苦居畎畒而不肯官禄後代何以遺子孫乎公曰伐人皆遺之以危今獨遺之以安雖所遺不同未爲無所遺也表歎息而去後携其妻子而登鹿門山因采藥不返又曰向長字子平髙士傳向字作尚河内朝歌人也隱居不仕性尚中和好通易老貧}
