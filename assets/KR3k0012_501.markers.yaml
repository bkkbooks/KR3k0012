  - {type: variant, offset: 3673, length: 179, content: 開冢更生猶十五六也嫁之有子續搜神記曰勾章張然滯役在都有少婦遂與奴通然養一狗甚快後還奴欲謀殺然張弓拔刀當戶然大喚曰烏龍狗遂咋奴頭然因取刀殺奴以婦付官梁冀別傳曰梁冀愛監奴秦宮官至太倉令得出入妻所每見輒屏御者託以言事因通焉內外兼寵刺史二千石皆謁拜之扶風人士孫奮居富冀從貸錢五千萬奮以三千萬與之冀大怒乃告郡縣認奮母為守臧婢云盜白珠十斛紫磨金千斤以叛遂牧考奮兄弟死於獄, WYG: 王莽簒位棄冠帶絶交游建武}
