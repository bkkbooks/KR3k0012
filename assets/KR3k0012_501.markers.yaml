  - {type: variant, offset: 998, length: 411, content: 馬大將軍霍光宿衛忠正宣德明恩守節秉義以安宗廟賞賜前後奴婢百七十人又曰王丹盡得父財家累千金奴僮數百又曰傅太后使謁者置諸官婢賤取之復取執金吾官婢八人東觀漢記曰彭寵奴子密等三人共謀劫寵寵時齋獨在便坐室中晝臥子密等三奴縛寵著床板告外吏大王解齋吏皆便休又用寵聲呼其妻入室見寵寵曰趍為諸將軍辨裝兩奴將妻入取寵物一奴守寵寵謂奴曰若小兒我素所愛今解我縛當以女珠妻若小奴見子密聽其語遂不得解子密收金玉衣物使寵妻縫兩縑囊夜解寵手令作記告城門將軍云今遣子密等詣蘭卿子后所其開門出勿稽留書成即斷寵及妻頭置縑囊中西入上告又曰劉寬嘗有客遣蒼頭市酒迂久大醉而還罵曰畜生遣人視奴疑必自殺寬嘗朝會莊嚴已訖妻使婢奉羹飜汙朝衣婢遽收之寬徐曰羹爛汝手又曰司隸校尉梁松奏特進馬防兄廖廖子孫三家奴婢千人又曰鄧弘字叔紀奴醉擊長壽亭長亭長將詣第白之弘即見亭長賞錢五千異日奴復與宮中衛士忿爭衛士歐箠奴弘問復賞五千又曰朱暉為郡督郵太守阮況當嫁女欲買暉婢不與及況卒暉送金三斤人, SBCK: ''}
