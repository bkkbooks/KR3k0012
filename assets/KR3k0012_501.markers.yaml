  - {type: variant, offset: 59, length: 0, content: '', SBCK: 修先公之業使賢者退而窮處也考盤在澗碩人之寛獨寐寤言永矢弗諼考成盤樂也箋云有窮處成樂在此澗者又曰白駒大夫刺宣王也刺其不能留賢也皎皎白駒食我塲苗縶之維之以永今朝宣王之未不能用賢賢者乗白駒而}
