  - {type: variant, offset: 115, length: 5, content: 公沙穆來遊, WYG: 或問汝南范滂曰郭林宗何如人滂曰絶不違親貞不絶俗天子不得臣諸侯不得友吾不知其他又曰隗囂素聞杜林志節深相敬待以為治書後因疾告去囂復欲令强起遂稱疾篤囂意雖相望且欲復容之乃出令曰杜伯山伯山林之字也天子所不能臣諸侯所不能友盖伯夷叔齊不食周粟今且從師友之位林雖拘於囂終不屈節又曰趙岐初名嘉年四十有重疾卧褥七年自慮奄忽乃遺令勅兄子曰大丈夫遁無箕山之操仕無伊吕之勲天不我與復何言哉可立一圓石於吾墓前刻之曰漢有遺人姓趙名嘉有志無時命也奈何又曰樊􅁮字子融有俊才好黄老不肯為吏又曰逄萌字子康北海都昌人也家貧給事縣為亭長尉時行過亭萌候迎拜謁既而擲楯歎曰大丈夫安能為人役哉遂去之長安學通春秋時王莽殺其子宇萌謂友人曰三綱絶矣不去禍將及人即解冠挂東都城門歸將家屬浮海客於遼東萌素明隂陽知莽將敗有頃乃首戴瓦盆哭於市曰新乎新乎因遂潜藏及光武即位乃之瑯琊勞山養志修道人皆化其徳北海太守素聞其髙遣使奉謁致禮萌不答後詔書徴萌託以老耄迷路東西語使者云朝廷所以徴我者以其有益於政尚不知方面所在安能濟時乎即便駕歸連徴不起以夀終又曰井丹字大春扶風郿人也少受業}
