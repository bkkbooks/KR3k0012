  - {type: variant, offset: 0, length: 1, content: 飲, krp: 太平御覧卷第八百六十八火部一火上釋名曰火化物也亦言燬也物入即皆毀壞也易曰水流濕火就燥又曰風自火出家人由内以相成熾也又曰天與火同人君子以類族辨物君子小人各得所同又曰火在天上大有君子以遏惡揚善順天休命大有包容之象也故遏惡揚善成物之羙順夫天徳休物之命又曰燥萬物者莫熯呼旱切乎火書曰火炎崐崗玉石俱焚又曰惟女含德不惕予一人予若觀火惕懼也觀執也我觀火者喻刑罰可畏之也又曰若火之燎于原弗可嚮迩火之燎于原其炎熾之明不可嚮近也又曰五行二曰火火曰炎上炎上作苦詩曰叔在藪火烈具舉禮曰孟夏之月盛徳在火又曰季春出火爲焚也謂焚菜也凢出火以火出建辰之月火始出又曰火之於民也尊而不親左傳曰人火曰火天火曰災又曰兵猶火也不戢將自焚也又曰火龍黼黻火畫爲龍又曰古之火正或}
  body:
  - {type: variant, offset: 2, length: 2, content: 部二, SBCK: 於心或食於咮以出内火是故味爲鶉火心爲大火謂火正之官配食於火星也建辰之月鶉火星昬在南方則令民放火建戍之月大火星伏在日下夜不得見則令民内火禁放火也陶唐氏之火正閼伯居啇丘閼伯髙辛氏之子也傳曰遷閼伯於啇丘主辰大火也今爲宋星然則啇丘在宋地也祀大火而火紀時焉謂岀内火時也相土因之故啇主大火相土契孫啇之租也始代閼伯之後居啇丘祀大火也又曰郯子云炎帝以火紀故爲火師而火名又曰昭公}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_SBCK_868-2a}
  - {type: variant, offset: 2, length: 2, content: 部二, WYG: 扵心或食於咮以出内火是故咮為鶉火心為大火謂火正之官配食于火星也建辰之月鶉火星昏在南方則令民放火建戌之月大火星伏在日下夜不得見則令民内火禁放火也陶唐氏之火正閼伯居商邱閼伯髙辛氏之子也𫝊曰遷閼伯于商邱主辰辰大火也今為宋星然則商邱在宋地也祀大火而火紀時焉謂出内火時也相土因之故商主大火相土契孫商之祖也始代閼伯之後居商邱祀大火也又曰剡子云炎帝以火紀故為火師而火名又曰昭公}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_WYG_868-2b, image: WYG0900/WYG0900-0575b.png}
  - {type: variant, offset: 2, length: 2, content: 部二, krp: 於心或食於咮以出内火是故味爲鶉火心爲大火謂火正之官配食於火星也建辰之月鶉火星昬在南方則令民放火建戍之月大火星伏在日下夜不得見則令民内火禁放火也陶唐氏之火正閼伯居啇丘閼伯髙辛氏之子也傳曰遷閼伯於啇丘主辰大火也今爲宋星然則啇丘在宋地也祀大火而火紀時焉謂岀内火時也相土因之故啇主大火相土契孫啇之租也始代閼伯之後居啇丘祀大火也又曰郯子云炎帝以火紀故爲火師而火名又曰昭公}
  - {type: variant, offset: 5, length: 4, content: 五茗爾雅, SBCK: 七年冬有星孛于火辰西及漢夏之八月辰星見在天漢西今孛星出辰西光芒東及天漢申湏}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 七年冬有星孛于大辰西及漢夏之八月辰星見在天漢西今孛星出辰西光芒東及天漢申須曰彗所以除舊布新也天事恒象天道恒以象類告示人今除於火火出必布焉諸侯其有火災乎今火向伏故知當須火出乃布散為災周禮曰春秋以木鐸修火禁又曰亨人掌供鼎鑊以給水火之齊又曰師卜掌開龜揚火以作龜致其墨又曰司爟掌行火之政令四時變國火以救時疾季春出火民咸從之季秋内火民亦如之以三月本時昏心星見于辰上使民出火九月本黄昏心星伏在戌上使民内火故春秋𫝊曰以出内火時則施火令凡祭祀則祭爟凡國失火野焚莱則有刑罰焉又曰穴氏掌攻蟄獸各以其物火之以時獻其珍異皮革又曰柞氏掌攻草木及林麓夏日至令刋陽木而火之冬日至令剥隂木而水之若欲其化也則春秋變其水火又曰秋官司烜氏掌以夫燧取明史記曰燕攻即墨田單乃収城中牛千頭為絳繒衣畫以}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_868-3a, image: WYG0900/WYG0900-0575c.png}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_868-3b, image: WYG0900/WYG0900-0575d.png}
