  - {type: variant, offset: 10, length: 7, content: 檟苦茶矮小似梔, SBCK: 彗所以除舊布新也申須魯大夫天事􅁪象天道􅁪以象頴告示人今除於火火出必布焉諸侯其有火災乎今火向伏故知當湏火乃布散爲災周禮曰春秋以木鐸脩火禁火星以春出以秋入因天時而以成又曰亨人掌供鼎鑊以給水火之齊鑊所以煑􅁏及魚腊之器旣熟乃脀于鼎齊多少之量齊音劑又曰卜師掌開􅀛揚火以作􅀛致其墨揚火猶熾也致其墨者熟灼之明其兆又曰司爟掌行火之政令四時變國火以救時疾行猶用也变猶易也鄭司農􅀃以鄹}
  - {type: variant, offset: 10, length: 5, content: 檟苦茶矮小, WYG: 龎涓追孫臏度其行暮當至馬陵乃斫大樹白而書之曰龎涓死此樹下於是令齊軍萬弩夾道而伏期曰見火舉而俱發龎涓夜至樹下見白書乃鑚火讀之未畢萬弩俱發龎涓大敗又曰蘇代謂魏王曰夫以王事秦猶抱薪救火薪不盡火不滅也又曰顔叔子獨居一室夜雨比舍屋崩有女子投之叔子令秉燭燭盡乃徹屋草續之至明不亂又曰武王既渡河有火自上復於王屋流為烏其色赤漢書曰項羽西屠咸陽燒其宫室火三月不滅又曰孝平后王莽女有節操及漢兵誅莽燔燔未央宫后曰何面見漢家因自投火而死又曰漢兵圍王莽城中少年朱弟張魚等恐見虜掠燒作室門呼曰反虜王莽何不出降火及掖庭莽避火宣室前殿火輒隨之又曰陳勝吳廣夜構火狐鳴呼曰大楚興陳勝王郡國志曰連渾府有火井深不可見厎炎氣上昇常若微電以草焚之則煙騰火發其山}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_WYG_868-4b, image: WYG0900/WYG0900-0576b.png}
