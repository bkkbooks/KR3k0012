  - {type: variant, offset: 547, length: 243, content: 道鹽鐵使張滂奏曰伏以去秋水災詔令減稅今之國用須有供備伏請出茶州縣及茶山外商人要略委所由定二等時估每十稅一價錢充所放兩稅其明年已後所得稅外收貯若諸州遭水旱賦稅不辯以此代之詔曰可仍委張滂具處置條奏自是每歲得錢四十萬貫茶之有稅自此始也然稅茶無虛歲遭水旱處未嘗以茶稅錢拯贍又曰大和七年正月吳蜀貢新茶皆於冬中作法為之上務恭儉不欲逆其物性詔所貢新茶宜於立春後造又曰大和九年十月王涯獻茶以涯為搉茶使茶之有稅自涯始又曰大和九年十二月諸道鹽鐵轉運搉茶使令狐楚奏搉茶不便於民請停從之又曰元和十四年歸光州茶園, WYG: 侯藏}
