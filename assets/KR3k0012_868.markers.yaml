  - {type: variant, offset: 956, length: 7, content: 茗苦茶味甘苦微, WYG: 蔡君仲有至孝之行母終棺在堂西舍失火火將至君仲伏屍號哭火越其家陳留耆舊𫝊曰劉昆為江陵令民有火災昆向火叩頭即霈然下雨詔問反風滅火虎北渡河何以致此昆曰偶然耳帝曰此長者之言也鄭𤣥别𫝊曰𤣥年十七在家見大風起詣縣曰某時當有火災宜祭爟禳廣設禁備時火果起而不為害樊英别𫝊曰英隠於壺山嘗有黑風從西方起英謂學者曰成都市火甚盛因含水西向潄之乃令記其日後有客從蜀來者云是日大火有黑雲平旦從東起須臾大雨火遂得滅葛仙公别𫝊曰公與客談話時天}
