  - {type: variant, offset: 1339, length: 304, content: 留採須臾復來乃採懷中橘與精精甚怖負茗而歸又曰桓宣武有一督將因時行病後虛熱更能飲複茗必一斛二斗乃飽裁減升合便以為大不足非復一日家貧後有客造之正遇其飲複茗亦先聞世有此病仍令更進五升乃大吐有一物出如升大有口形質縮縐狀似牛肚客乃令置之於盆中以一斛二斗複茗澆之此物噏之都盡而止覺小腹又增五升便悉混然從口中涌出既吐此物病遂差苦問之此何病荅云此病名斛茗瘕異苑曰剡縣陳矜妻少寡與二子同居好飲茶家有古塚每飲輒先祠之二子欲掘之母止之夜夢人云吾止此塚三百餘年今二子恆欲見毀賴相保護又享吾佳茗雖潛朽壞豈忘翳桑之報及曉於庭中獲錢十萬似久埋者唯貫新母告二子禱祠愈切世說曰任瞻少時有令名自過江失志既不飲茗問人云此為茶為茗覺人有怪色乃自申明, WYG: 請}
