markers:
  front:
  - {type: variant, offset: 0, length: 1, content: 飲, SBCK: 太平御覧卷第八百六十八火部一火上釋名曰火化物也亦言燬也物入即皆毀壞也易曰水流濕火就燥又曰風自火出家人由内以相成熾也又曰天與火同人君子以􅀋族辨物君子小人各得所同又曰火在天上大有君子以遏惡揚善順天休命大有包容之象也故遏惡揚善成物之羙順夫天徳休物之命又曰燥萬物者莫熯呼旱切乎火書曰火炎崐崗玉石俱焚又曰惟女含德不惕予一人予若觀火惕懼也觀執也我觀火者喻刑罰可畏之也又曰􅀂火之燎于原弗可嚮迩火之燎于原其炎熾之明不可嚮近也又曰五行二曰火火曰炎上炎上作苦詩曰叔在藪火烈具舉禮曰孟夏之月盛徳在火又曰季春出火爲焚也謂焚菜也凢出火以火出建辰之月火始出又曰火之於民也尊而不親左傳曰人火曰火天火曰災又曰兵猶火也不戢將自焚也又曰火龍黼黻火􅀞爲龍又曰古之火正或}
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_868-1a}
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_868-1b}
  - {type: variant, offset: 0, length: 1, content: 飲, WYG: 欽定四庫全書太平御覽卷八百六十八宋李昉等撰火部一火上釋名曰火化物也亦言煆也物入即皆毁壞也易曰水流濕火就燥又曰風自火出又曰天與火同人君子以類族辨物君子小人各得所同又曰火在天上大有君子以遏惡揚善順天休命又曰燥萬物者莫熯乎火書曰火炎崑崗玉石俱焚又曰惟女含徳不惕予一人予若觀火又曰若火之燎于原弗可嚮邇又曰五行二曰火火曰炎上炎上作苦詩曰叔在藪火烈具舉禮曰孟夏之月盛徳在火又曰季春出火為焚也謂焚萊也凡出火以火出建辰之月火始出又曰火之於民也尊而不親左傳曰人火曰火天火曰災又曰兵猶火也不戢将自焚也又曰火龍火畫火龍畫龍又曰古之火正或}
