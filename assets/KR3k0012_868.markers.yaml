  - {type: variant, offset: 1855, length: 217, content: 里有茶山茶溪天台記曰丹丘出大茗服之生羽翼夷陵圖經曰黃木女觀望州等山茶茗出焉楊衒之洛陽伽藍記曰彭城王勰戲謂王肅曰卿不重齊魯大邦而愛邾莒小國肅對曰鄉曲所美不得不好勰復謂曰卿明日顧我為卿設邾莒之飡亦有酪奴因此復號茗取飲為酪奴時給事中劉縞慕肅之風專習茗飲彭城王謂縞曰卿不慕王侯八珍如好蒼頭水厄海上有逐臭之夫里內有學嚬之婦以卿言之是也其彭城王家有吳嫗以此言戲之自是朝貴讌會雖設茗飲皆恥不復食雖江表殘民遠來降者侍中元叉欲為之設茗先問卿於水厄多少蕭, WYG: 二月火滅}
