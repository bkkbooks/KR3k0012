  - {type: variant, offset: 993, length: 2, content: 死三, WYG: 能得爐火請作一大火以共煖焉公因吐氣火赫然從口而出須臾火滿室坐客皆熱而脫衣也列仙𫝊曰陶安公六安冶師也數行火火一旦散上紫色衝天須臾朱雀止冶上曰安公安公冶與天通七}
