  - {type: variant, offset: 514, length: 0, content: '', WYG: 張亮守河陽周文帝於上流放火船欲燒河橋亮乃備小艇百餘皆載長鏁鏁頭施釘火船將至即馳小艇以釘釘之引鏁向岸火船不得及橋橋之獲全亮之計也尚書大𫝊曰燧皇以火紀物火陽尊故託燧皇於天春秋元命苞曰火之為言委隨也故其立字人散二者為火也}
