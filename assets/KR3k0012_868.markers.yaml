  - {type: variant, offset: 260, length: 0, content: '', SBCK: 西征登鳯陵命中外府司馬李義􅀷相府城局李士畧共作檄文皆辭請以孫搴代神武乃引塞入帳自爲吹火催促之搴神色安然授筆立䟽又曰文宣曽近出令張曜居守}
  - {type: variant, offset: 260, length: 6, content: 帝遺詁靈坐勿, WYG: 西征登鳯陵命中外府司馬李義深相府城局李士略共作檄文皆辭請}
  - {type: variant, offset: 260, length: 0, content: '', krp: 西征登鳯陵命中外府司馬李義深相府城局李士畧共作檄文皆辭請以孫搴代神武乃引塞入帳自爲吹火催促之搴神色安然授筆立䟽又曰文宣曽近出令張曜居守}
  - {type: variant, offset: 261, length: 3, content: 遺詁靈, SBCK: 夜還曜不時開門勒兵嚴備駐蹕門外乆之催迫甚急曜以夜􅀷湏火至面識門乃可開於是獨出見帝帝使曜前開門然後入又曰張亮守河州周文帝於上流放火舡欲燒河橋亮乃備小艇百餘皆載長鏁鏁頭施釘火舡將至即馳小艇以釘釘之引鏁向岸火舡不得及橋全亮之功也尚書大傳曰燧人爲燧皇以火紀物火陽尊故託燧皇於天春秋元命苞曰火之爲言委隨也故其字人散二者爲火也韓詩外傳曰晉平公藏寳之臺燒救火三日三夜乃勝之公子晏束帛而賀曰臣聞王者藏於天下諸侯藏於百姓農夫藏於囷􅁃啇賈藏於篋匱今百姓乏於外而賦歛無已昔桀紂殘賊爲天下戮今皇天降災於皇臺是君之福也戰國䇿曰楚王遊雲夢野火之起也􅀂雲蜺呉越春秋曰越王思報呉冬則抱氷夏則握火後趙録曰石勒禁火百鼔之後燃火者鞭之一百延火燒一家斬五部都督汝南先賢傳曰郭憲從南郊含酒東北三噀云齊失火以厭之後齊果上火事又曰蔡君仲有至孝之心母終棺在堂西舎失火火將至君仲伏屍號哭火越向東家陳留􅂄舊傳曰劉昆爲江陵令民有火災昆向火叩頭即霈然下雨詔問反風滅火虎北渡河何以致此昆曰偶然耳帝曰此長者之言也鄭玄別傳曰玄年十七在家見大風起詣縣曰某時當有火災冝􅀕爟禳廣設禁備時火果起而不爲害樊英別傳曰英隠於􅁐山甞有黒風從西方起英謂學者曰成都市火甚盛因含水西向漱之乃令記其日後有客從蜀來者云是日有大火有黒雲平旦從東起湏􅁷大雨火遂得滅􅁑仙公别傳曰公與客談話時天寒公謂客曰居貧不能得爐火請作一大火公遂吐氣火赫然從口而出湏􅁷火滿室}
