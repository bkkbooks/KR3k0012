  - {type: variant, offset: 50, length: 0, content: '', SBCK: 連渾府遥火山而有火井􅀷不可見底炎氣上昇常􅀂微電以草㸑之則煙騰大發其山似火從地而發故名熒臺東觀漢記曰梁鴻牧豕長安上林􅁐中失火延及人家問所燒財物悉推豕償之其主言少鴻願以身作躬執其勤又曰長沙有義士古􅀄遭父䘮未葬隣人火起及􅀄舎棺不可移冒火伏棺上火乃滅又曰廉范字叔度爲蜀郡太守成都地迫屋狹百姓夜作以供衣食又禁火民覆蔽之失火者日屬范放令夜作但使儲水百姓皆恱歌曰廉叔度來何暮不禁火民安堵昔日無􅃭今五袴魏略曰􅁗伯出獵至於咸陽有火流下化爲白雀衘緑丹書集於公車呉志曰張昭字子布}
  - {type: page-break, offset: 50, content: '', id: KR3k0012_SBCK_868-3b}
  - {type: variant, offset: 50, length: 0, content: '', WYG: 張昭字子布}
  - {type: variant, offset: 50, length: 0, content: '', krp: 連渾府遥火山而有火井深不可見底炎氣上昇常若微電以草㸑之則煙騰大發其山似火從地而發故名熒臺東觀漢記曰梁鴻牧豕長安上林苑中失火延及人家問所燒財物悉推豕償之其主言少鴻願以身作躬執其勤又曰長沙有義士古𥘉遭父䘮未葬隣人火起及𥘉舎棺不可移冒火伏棺上火乃滅又曰廉范字叔度爲蜀郡太守成都地迫屋狹百姓夜作以供衣食又禁火民覆蔽之失火者日屬范放令夜作但使儲水百姓皆恱歌曰廉叔度來何暮不禁火民安堵昔日無𥜗今五袴魏略曰秦伯出獵至於咸陽有火流下化爲白雀衘緑丹書集於公車呉志曰張昭字子布}
  - {type: variant, offset: 51, length: 4, content: 皓每宴席, SBCK: 權以公孫淵稱藩遣張珎許晏至遼東拜淵爲燕王昭諌權權不從昭忿稱疾不朝權恨之土塞其門昭又於内以土封之淵果殺珎晏權數慰謝昭固不起權因出過其門呼昭昭辭病篤權燒其門欲以恐之昭更閉户孫權使人滅火徃問良乆昭諸子扶昭起權載以還宫晉書曰􅉖懷太子遹字熈祖惠帝長子也宫中甞夜失火武帝登樓望之太子時年五歳牽帝􅅂入闇中帝問其故太子曰暮夜倉卒冝備非常不冝令照見人也由是竒之又曰張華字茂先武庫火華懼因此變作列兵固守然後救之果累代之寳及漢髙斬虵劒王莽頭孔子履等盡焚焉又曰韓康伯家貧窶伯年數歳至大寒母方爲作􅃭令伯投熨斗而謂之曰且著􅃭尋當作複禈伯曰不復湏母問其故對曰火在斗中而柄尚熱今旣著􅃭下亦當煖母甚異之又曰王獻之常與兄徽之共在一室忽然火發徽之遽走岀不遑取履獻之神色恬然徐呼左右扶出又曰郭璞字景純門人趙載甞竊青囊書未及讀而爲火所焚又曰􅁃亮鎮武昌夜半望見城内有數炬火從城上岀如火車􅃺白布慢覆與火俱出城東北行至江乃滅又曰佛圖澄甞與石季龍􅂛中臺澄忽驚曰幽州當火災仍取酒噀之乆而􅀏曰救巳得矣季龍遣驗幽州云是曰火從四門起西南有黒雲來驟雨㓕之雨亦頗有酒氣又曰􅄞康從孫登遊三年康問其所終不荅康毎歎息將別謂曰先生竟}
