  - {type: variant, offset: 2073, length: 361, content: 德不曉人意荅下官雖生水鄉立身已來不遭陽侯之難舉坐笑焉桐君錄曰西陽武昌晉陵皆出好茗巴東別有真香茗煎飲令人不眠又曰茶花狀如梔子其色稍白永嘉圖經曰縣東有白茶山吳興記曰烏程縣西有溫山出御茆淮陰圖經曰山陽縣南二十里有茶坡茶陵縣圖經曰茶陵者謂陵谷生茶茗本草拾遺曰皋盧茗作飲止渴除疫不睡利水道明目生南海諸山中南人極重之廣州記曰酉平縣出皋盧茗之利茗葉大而澀南人以為飲南越志曰茗苦澀亦謂之過羅陸羽茶經曰茶者南方嘉木自尺二尺至數十尺其巴川峽山有兩合抱者伐而掇之其樹如瓜蘆葉如梔子花如白薔薇實如栟櫚蒂如丁香根如胡桃其名一曰茶二曰檟三曰蔎四曰茗五曰荈周公云檟苦茶楊執戟云蜀西南人謂茶曰蔎郭弘農云早取為茶晚取為茗一曰荈蔎音設荈音昌兗切其上者生爛石中者生櫟壤下者生黃土凡藝而不茂法如種苽三歲可採陽岸陰林紫者上綠者次笋者上牙者次葉卷者上葉舒者次凡採茶在, WYG: 月}
