  - {type: variant, offset: 996, length: 1438, content: 二日採乾華佗食論曰苦茶久食益意思壺居士食志曰苦茶久食羽化與韭同食令人身重陶弘景新錄曰茗茶輕身換骨丹丘子黃山君服之王浮神異記曰餘姚人虞洪入山采茗遇一道士牽三青牛引洪至瀑布山曰吾丹丘子也聞子善具飯常思見惠山中有大茗可以相給祈子他日有甌蟻之餘不相遺也因立奠祀後令家人入山獲大茗焉廣陵耆老傳曰晉元帝時有老姥每旦擎一器茗往市鬻之市人競買自旦至暮其器不減茗所得錢散路傍孤貧乞人人或異之執而繫之於獄夜擎所賣茗器自牖飛去廣志曰茶叢生直煮飲為茗茶茱萸檄子之屬膏煎之或以茱萸煮脯冒汁為之曰茶有赤色者亦米和膏煎曰無酒茶晉書蓺術傳曰燉煌人單道開不畏寒暑常服小石子所服者有桂花心氣兼服茶酥而已續搜神記曰晉孝武世宣城人秦精入武昌山中採茗忽見一人身長一丈通體毛精見之大怖自謂必死毛人牽其臂將至山中大叢茗處放之便去精因留採須臾復來乃採懷中橘與精精甚怖負茗而歸又曰桓宣武有一督將因時行病後虛熱更能飲複茗必一斛二斗乃飽裁減升合便以為大不足非復一日家貧後有客造之正遇其飲複茗亦先聞世有此病仍令更進五升乃大吐有一物出如升大有口形質縮縐狀似牛肚客乃令置之於盆中以一斛二斗複茗澆之此物噏之都盡而止覺小腹又增五升便悉混然從口中涌出既吐此物病遂差苦問之此何病荅云此病名斛茗瘕異苑曰剡縣陳矜妻少寡與二子同居好飲茶家有古塚每飲輒先祠之二子欲掘之母止之夜夢人云吾止此塚三百餘年今二子恆欲見毀賴相保護又享吾佳茗雖潛朽壞豈忘翳桑之報及曉於庭中獲錢十萬似久埋者唯貫新母告二子禱祠愈切世說曰任瞻少時有令名自過江失志既不飲茗問人云此為茶為茗覺人有怪色乃自申明之曰向問飲為熱為冷又曰晉司徒長史王濛好飲茶人至輒命飲之士大夫皆患之每欲往候必云今日有水厄江氏傳曰統遷愍懷太子洗馬嘗上䟽諫云今西園賣醯麵茶菜藍子之屬虧敗國體晉四王起事曰惠帝蒙塵洛陽黃門以瓦盂盛茶上至尊晉劉琨與兄子南兗州刺史演書曰前得安州乾茶二斤薑一斤桂一斤皆所須也吾體中煩悶怕假負茶汝可信信致之傳咸司隸教曰聞南方有蜀嫗作茶粥賣廉事歐其器具無為又賣餅於市而禁茶粥以囷蜀姥何哉坤元錄曰辰州漵浦縣山上多茶樹括地圖曰臨城縣東北一百四十里有茶山茶溪天台記曰丹丘出大茗服之生羽翼夷陵圖經曰黃木女觀望州等山茶茗出焉楊衒之洛陽伽藍記曰彭城王勰戲謂王肅曰卿不重齊魯大邦而愛邾莒小國肅對曰鄉曲所美不得不好勰復謂曰卿明日顧我為卿設邾莒之飡亦有酪奴因此復號茗取飲為酪奴時給事中劉縞慕肅之風專習茗飲彭城王謂縞曰卿不慕王侯八珍如好蒼頭水厄海上有逐臭之夫里內有學嚬之婦以卿言之是也其彭城王家有吳嫗以此言戲之自是朝貴讌會雖設茗飲皆恥不復食雖江表殘民遠來降者侍中元叉欲為之設茗先問卿於水厄多少蕭正德不曉人意荅下官雖生水鄉立身已來不遭陽侯之難舉坐笑焉桐君錄曰西陽武昌晉陵皆出好茗巴東別有真香茗煎飲令人不眠又曰茶花狀如梔子其色稍白永嘉圖經曰縣東有白茶山吳興記曰烏程縣西有溫山出御茆淮陰圖經曰山陽縣南二十里有茶坡茶陵縣圖經曰茶陵者謂陵谷生茶茗本草拾遺曰皋盧茗作飲止渴除疫不睡利水道明目生南海諸山中南人極重之廣州記曰酉平縣出皋盧茗之利茗葉大而澀南人以為飲南越志曰茗苦澀亦謂之過羅陸羽茶經曰茶者南方嘉木自尺二尺至數十尺其巴川峽山有兩合抱者伐而掇之其樹如瓜蘆葉如梔子花如白薔薇實如栟櫚蒂如丁香根如胡桃其名一曰茶二曰檟三曰蔎四曰茗五曰荈周公云檟苦茶楊執戟云蜀西南人謂茶曰蔎郭弘農云早取為茶晚取為茗一曰荈蔎音設荈音昌兗切其上者生爛石中者生櫟壤下者生黃土凡藝而不茂法如種苽三歲可採陽岸陰林紫者上綠者次笋者上牙者次葉卷者上葉舒者次凡採茶在, SBCK: ''}
