  - {type: variant, offset: 20, length: 4, content: 生葉可煮, SBCK: 馬陵乃斫大樹白而書之曰龐㳙死此下於是令齊軍万弩夾道而伏日暮見火舉而俱發龐㳙夜至見白書乃鑚火讀之未畢万弩俱發龐㳙大敗又曰􅂫代謂魏王曰夫以地事􅁗猶抱薪救火薪不盡火不滅也又曰顔叔子獨居室夜雨比舎屋角有女子投之叔子令秉燭燭盡乃徹屋草續之至明不亂又曰武王旣渡河有火自上復於王屋流爲烏其色赤漢書曰項羽西屠咸陽燒其宫室火三月不㓕又曰孝平后王莽女有節操及漢兵誅莽燔燒未央宫后曰何面目見漢家因自投火而死又曰漢兵圍王莽城中少年房朱張魚等恐見虜掠􅀻燒}
  - {type: variant, offset: 20, length: 11, content: 生葉可煮作羹飯今早采者, WYG: 於咸陽有火流下化}
