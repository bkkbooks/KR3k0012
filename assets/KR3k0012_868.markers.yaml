  - {type: variant, offset: 755, length: 240, content: 諸道鹽鐵轉運搉茶使令狐楚奏搉茶不便於民請停從之又曰元和十四年歸光州茶園於百姓從刺史房克讓之請又曰初常魯使西蕃烹茶帳中蕃人問曰何為者魯曰滌煩療濁所謂茶也蕃人曰我此亦有命取以出指曰此壽州者此顧渚者此蘄門者晏子春秋曰嬰相齊景公時食脫粟之飯炙三弋五卯茗菜而已廣雅曰荊巴間采茶作餅成以米膏出之若飲先炙令色赤擣末置瓷器中以湯澆覆之用葱薑芼之其飲醒酒令人不眠愽物志曰飲真茶令少眠睡神農食經曰茶茗宜久服令人有力悅志又曰茗苦茶味甘苦微寒無毒主瘻瘡利小便少睡去痰渴消宿食冬生益州川谷山陵道傍凌冬不死三, SBCK: 火滅正}
