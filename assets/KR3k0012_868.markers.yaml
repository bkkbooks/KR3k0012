  - {type: variant, offset: 16, length: 3, content: 梔子冬, WYG: 火從地而發故名焚臺東觀漢記曰梁鴻牧豕長安上林苑中失火延及人家問所燒財物悉推豕償之其主言少鴻願以身傭作躬執其勤又曰長沙有義士古初遭父喪未𦵏隣人火起及初舎棺不可移初冒火伏棺上火乃滅又曰廉范字叔度為蜀郡太守成都地迫屋狹百姓夜作以供衣食又禁火民復蔽之失火者日屬范乃令夜作但使儲水百姓皆恱歌曰廉叔度來何暮不禁火民安作昔無襦今五袴典略曰秦伯出獵}
  - {type: page-break, offset: 16, content: '', id: KR3k0012_WYG_868-5b, image: WYG0900/WYG0900-0576d.png}
