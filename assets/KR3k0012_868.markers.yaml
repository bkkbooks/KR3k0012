  - {type: variant, offset: 338, length: 414, content: 牙夔州有香山江陵有南木湖南有衡山岳州有㴩湖之舍膏常州有義興之紫笋婺州有東白睦州有鳩坑洪州有西山之白露壽州有霍山之黃芽蘄門之商貨不在焉又曰竟陵僧有於水濱得嬰兒者育為弟子稍長自筮遇蹇之漸繇曰鴻漸于陸羽可用為儀乃姓陸氏字鴻漸名羽羽有文學多意思恥一物不盡其妙茶術最著鞏縣為瓷偶人號陸鴻漸買十器得一鴻漸市人沽茗不利輒灌之羽於江湖稱竟陵人於南越稱桑苧翁貞元末卒又曰韓滉聞奉天之難以采練囊緘茶末健步其以進也又曰貞元九年春初稅茶先是諸道鹽鐵使張滂奏曰伏以去秋水災詔令減稅今之國用須有供備伏請出茶州縣及茶山外商人要略委所由定二等時估每十稅一價錢充所放兩稅其明年已後所得稅外收貯若諸州遭水旱賦稅不辯以此代之詔曰可仍委張滂具處置條奏自是每歲得錢四十萬貫茶之有稅自此始也然稅茶無虛歲遭水旱處未嘗以茶稅錢拯贍又曰大和七年正月吳蜀貢新茶皆於冬中作法為之上務恭儉不欲逆其物性詔所貢新茶宜於立春後造又曰大和九年十月王涯獻茶以涯為搉茶使茶之有稅自涯始又曰大和九年, SBCK: ''}
