  - {type: variant, offset: 2477, length: 1, content: 枝, WYG: 寸或赤或白山可百里許晦夜即見此山林乃此獸光照狀如火相似乃取其獸毛績以為布名曰火浣布國人服之此布垢汚唯以火燒布兩食許出振之其垢即去潔白如雪述征記曰北征有張母墓舊說張母是王氏妻王家𦵏經有年載後開墓而香火猶燃其家奉之稱清火道英雄記曰周瑜鎮江夏曹操欲從赤壁渡江南無船乗簰步皆反㳂漢水下至浦口未即渡瑜夜密使輕船走舸百艘艘有}
