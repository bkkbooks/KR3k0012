  - {type: variant, offset: 2459, length: 273, content: 能不屈者稱為壯士釋而與交黨與三百人其趫捷者號為餓鶻隊唐書曰元和四年藹德曷里祿設弭施合蜜里迦可汗遣使請改廻紇為廻鶻義取廻旋輕犍如鶻又曰元和八年淄青節度使李師道進鶻十二命還之唐杜甫義鶻行曰陰崖二蒼鷹養子黑柏顛白虵登其巢吞噬恣朝飡雄飛遠求食雌者鳴辛酸力強不可制黃口寧半存其父從西來翻身入長煙斯須領健鶻憤懣寄所宣斗上捩孤影無聲來九天脩鱗脫遠枝巨顙拆老拳高空得蹭蹬短草辭蜿蜒折尾能一擺飽腸今已穿生雖滅眾鶵死亦垂千年物情有報復快意貴目前茲實鷙鳥最急難心炯然功成失所往用捨何其賢近經潏水湄此事樵夫傳飄蕭覺素髮凜欲衝儒冠人生所與分亦在顧眄間聊為義鶻行永激壯士肝鸇, WYG: 鴝鵅}
