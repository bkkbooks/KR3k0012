  - {type: variant, offset: 451, length: 0, content: '', SBCK: 旦聞梟聲乎公曰一鳴而不復聞使人徃視之梟當陛布翼伏地而死又曰梟逢鳩鳩曰子安之梟曰我將東徙鳩曰何故梟曰一郷皆惡我鳴故徙也鳩曰更鳴則可不更鳴東徙亦惡子之聲桓譚新論曰王翁時男子畢康殺其母詔焚燒其屍􅁀其罪扵天下余上封章言宣帝時公卿朝㑹丞相語次曰聞梟生子長旦食其母寜然有賢者應曰但聞烏子反哺耳丞相大慙君子之於鳥獸尚爲之諱況人乎又曰余前爲典樂大夫有梟鳴扵庭樹府中皆懼余後與典謝侯爭闘俱坐免說文曰梟不孝鳥也至}
  - {type: variant, offset: 451, length: 0, content: '', krp: 旦聞梟聲乎公曰一鳴而不復聞使人徃視之梟當陛布翼伏地而死又曰梟逢鳩鳩曰子安之梟曰我將東徙鳩曰何故梟曰一郷皆惡我鳴故徙也鳩曰更鳴則可不更鳴東徙亦惡子之聲桓譚新論曰王翁時男子畢康殺其母詔焚燒其屍暴其罪扵天下余上封章言宣帝時公卿朝㑹丞相語次曰聞梟生子長旦食其母寜然有賢者應曰但聞烏子反哺耳丞相大慙君子之於鳥獸尚爲之諱況人乎又曰余前爲典樂大夫有梟鳴扵庭樹府中皆懼余後與典謝侯爭闘俱坐免說文曰梟不孝鳥也至}
  - {type: variant, offset: 452, length: 0, content: '', SBCK: 捕梟磔之趙壹解擯賦曰甑瓦可以令梟寂嶺表録異曰北方梟鳴人家以爲恠共惡之南中晝夜飛鳴與烏鵲無異桂林人羅取生鬻之家家養使捕䑕以爲勝狸鴞禮記内則曰鵠鴞胖毛詩曰墓門有梅有鴞萃止夫也不良歌以訊之又曰翩彼飛鴞集于泮林食我桑椹懷我好音又詩義䟽曰鴞大如鳩緑色惡聲鳥也入人家凶賈􅁩所賦是也其􅁏甚美可爲羮臛又可炙}
  - {type: page-break, offset: 452, content: '', id: KR3k0012_SBCK_927-6b}
  - {type: variant, offset: 452, length: 0, content: '', krp: 捕梟磔之趙壹解擯賦曰甑瓦可以令梟寂嶺表録異曰北方梟鳴人家以爲恠共惡之南中晝夜飛鳴與烏鵲無異桂林人羅取生鬻之家家養使捕䑕以爲勝狸鴞禮記内則曰鵠鴞胖毛詩曰墓門有梅有鴞萃止夫也不良歌以訊之又曰翩彼飛鴞集于泮林食我桑椹懷我好音又詩義䟽曰鴞大如鳩緑色惡聲鳥也入人家凶賈誼所賦是也其肉甚美可爲羮臛又可炙}
  - {type: variant, offset: 453, length: 0, content: '', SBCK: 供御物各隨其時唯鴞冬夏施以美故也莊子曰見􅆑而求時夜見彈而求鴞炙魏志曰夫鴞天下賤鳥也及其在林食椹則懷我好音晉書曰王羲之好鴞炙三國典略曰齊太山主武成之長也母曰胡太后夢扵海上坐玉盆日入裙下遂有娠生扵并州其日有鴞鳴於産帳之上盛弘之荆州記曰巫縣有鳥如雌鷄其名爲鴞廣志曰鴞楚鳩所生如驢巨靈種􅀋不滋乳也鵩西京雜記曰賈􅁩在長沙鵩鳥集其承塵而鳴長沙俗以爲鵩至人家主人當死􅁩作鵩鳥賦齊死生等榮辱以遣憂累焉賈􅁩鵩鳥賦曰􅁩爲長沙王傅三年有鵩鳥飛入舎止于坐隅鵩似鴞不祥鳥也􅁩旣謫居長沙長沙卑濕自傷悼以爲壽不長爲賦以自廣漢太常孔臧仲尼之後以才學知名作鴞賦曰季夏􅁃子思道静居爰有飛鴞集我室隅異物之來􅁻凶是符昔在賈生有識之士忌兹鵩鳥卒用䘮巳咨我今考信道秉真變性生家謂之天神脩德滅邪化及其鄰梅陶鵩鳥賦序曰余旣遭王敦之難遂見忌録居于武昌其秋有野鳥入室感賈􅁩鵩鳥依而作焉神仙傳曰尹䡄字公度人有怪鳥鳴其屋上者以語公度公度爲一奏符著鳥鳴處其夕鳥伏符下死鴝鵒爾雅曰鵅鵋䳢郭璞注曰江東呼鵂鶹爲忌欺亦曰鴝鵅音句格纂文曰􅝐鶹一名忌欺白日不見人夜能拾蚤虱也蚤􅀲音相近俗人云鵂鶹拾人弃􅀲相其􅁻凶妄說也􅀶物志曰鵂鶹一名鵄鵂晝日無所見夜則目至明人截爪甲弃露地此鳥夜至人家拾取􅀲分别視之則知有􅁻凶凶者輙便鳴其家有殃莊子曰鵂鶹夜撮蚤察毫末畫暝目不見丘山殊性也淮南萬畢術曰鵄鵂致鳥取鵄鵂折其大羽絆其兩足以爲媒張羅其旁鳥自聚矣南史曰侯景入臺城在昭}
