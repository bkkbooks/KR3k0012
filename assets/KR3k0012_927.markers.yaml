  - {type: variant, offset: 3243, length: 1544, content: 日龍飛二十一日有獻鷂鶵者此乃前朝之弊風少年之事務何忽今日行之又曰太子承乾與漢王元昌相託附承乾賜以琵琶名馬元昌報以鷂子山鷄又曰太宗得鷂絕俊異私自臂之望見鄭公魏徵乃藏於懷公知之遂前白事因語古帝王逸豫微以諷諫語久帝惜鷂且死而素嚴敬徵欲盡其言徵語不時盡鷂死懷中又曰楊德幹高宗朝為萬年令有宦官恃貴寵放鷂不避人禾稼德幹擒而杖之二十悉拔其鷂頭宦者涕泣袒背以示於帝帝曰爾情知此漢獰何須犯他百姓竟不之問又曰貞元十四年九月中書門下奏賀嵯峨山獲白鷂莊子曰鷂為鸇鸇為布谷布谷復為鷂此物變也列士傳曰魏公子無忌方食有鳩飛入案下公子使人顧望見一鷂在屋上飛去公子乃縱鳩令出鷂逐而殺之公子暮為不食曰鳩避患歸無忌竟為鷂所得吾負之為吾捕得此繇者無忌無所愛於是左右宣公子慈聲旁國左右捕得鷂三百餘頭以奉公子公子欲盡殺恐無辜乃自案劍至其籠上曰誰獲罪無忌者耶一鷂獨低頭不敢仰視乃取殺之盡放其餘名聲布流天下歸焉論衡曰儒書稱魏公子方欲與客飲有鸇擊鳩鳩逃公子案下鸇追殺之於公子之前公子使人設罔捕鸇得數十責殺鳩之罪擊鳩之鸇俯頭不敢仰視公子乃殺之此虛言也鸇有千數擊鳩飛去安可復得或是捕鸇者折其頸也夢書曰鷹鷂為攻剽殘心也夢見鷹鷂憂賊人也魏陳思王曹植鷂雀賦曰鷂欲取雀雀自言雀微賤身體柴小肌肉痟瘦所得蓋少君欲相噉實不足飽鷂得雀言初不敢語頃來轗軻資糧乏旅三日不食略思死鼠今日相得寧復置汝雀得鷂言意甚怔營性命至重雀鼠貪生君得一食我命隕傾皇天是鑒賢者是聽鷂得雀言意甚泹惋當死獘雀頭如果蒜不早首服烈頸大喚行人聞之莫不往觀雀得鷂言意甚不移目如擘椒跳蕭二翅我雖當死略無可避鷂乃置雀良久方去二雀相逢似是公嫗相將入草共上一樹仍共本末辛苦相語向者近出為鷂所捕賴我番揵體素便附說我辯語千條萬句欺恐舍長令兒大怖我之得免復勝於汝自今後竟莫復相妒鵰毛詩谷風四月曰匪鶉匪鳶翰飛戾天毛曰鶉鵰也鵰鳶貪殘之鳥也說文曰鷲黃頭赤目五色皆備一曰鵰漢書曰李廣為上郡守匈奴入上郡武帝使中貴人從廣匈奴射中貴人廣曰是必射鵰者也廣射殺二人生得一人果射鵰者也穆天子傳曰春山爰有青鵰執犬豕食鹿列子曰周宣王之牧正有役人梁鴦者能養野禽獸委食於園庭之內雖虎狼鵰鶚之類無不柔者雌雄在前孳尾成群異類雜居不相搏噬後魏書曰秦王幹機悟壯勇善弓馬太宗出遊白登之東北幹以騎從有雙鵰飛於上太宗命左右射之莫能中鵰旋飛稍高幹自請射之以二箭而下雙鵰太宗嘉之賜御弓矢金帶以旌其能軍中於是號幹為落鵰都尉北齊書曰斛律光嘗從世宗於洹橋校獵見一大鳥雲表飛颺光引弓射之正中其頸此鳥形如車輪旋轉而下至地乃大鵰也世宗取而觀之深壯異焉丞相屬邢子高見而歎曰此射鵰手也當時傳號落鵰都督隋書曰長孫晟周宣帝時突厥攝圖請婚于周以趙王招女妻之然周與攝圖各相誇競妙選驍勇以充使者因遣晟副汝南公宇文神慶送千金公主于其牙前後使數十輩攝圖多不禮見晟而獨愛焉每共遊獵留之竟歲嘗有二鵰飛而爭肉因以兩箭與晟曰請射取之晟乃彎弓馳往遇鵰相攫遂一發而雙貫焉攝圖喜命諸子弟貴人皆親友冀昵近之以學彈射鷲漢書曰匈奴有計入漢地直張掖郡直當也生奇材箭竿鷲羽師古曰大鵰也黃頭赤目其羽可用為箭西域諸國記曰耆闍崛山在王舍城北四里山有兩崖鷲鳥常群居其顛土人號為靈鷲山也佛國記曰山石頭似鷲阿育王使鑿石假安兩翼兩腳今見存林邑國記曰西南遠界有靈鷲鳥能知吉凶覘人將死食尸肉盡乃去家人取骨燒為灰投之漲海鶚毛詩曰關睢后妃之德也風之始也所以風化天下而正夫婦也關關睢鳩在河之洲一名王睢一名鵰鷞江東呼為鶚食魚鷙而有別倉頡解詰曰鶚金喙鳥也見則天下兵能擊殺麞鹿漢書曰鄒陽諫吳王曰臣聞鷙鳥累百不如一鶚孟康曰鶚大鵰白鷢爾雅曰揚白鷢郭璞注曰以鷹尾上白也廣雅曰白鷢鷹也說文曰白鷢玉鵰也崔豹古今注曰揚白鷢似鷹而尾上白也亦號為印尾鷹風土記曰說詩義者或說睢鳩為白鷢白鷢鸇屬於義無取蓋蒼鷃大如白鷢而色蒼其鳴戛戛和順又遊於水而息於洲常隻不雙, SBCK: 七}
