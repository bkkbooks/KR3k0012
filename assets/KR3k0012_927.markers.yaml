  - {type: variant, offset: 1414, length: 1656, content: 雉鷹有菟鷹一歲為黃二歲為撫三歲為青胡鷹獲麞出廬江幽明錄曰楚文王少時好獵有人獻一鷹文王見之爪距神爽殊絕常鷹故為獵於雲夢置網雲布煙燒張天毛群羽族爭噬競搏此鷹軒頸瞪目遠視雲際無搏噬之志王曰吾鷹所獲以百數汝鷹曾無奮意將欺余耶獻者曰若效於雉兔臣豈敢獻俄而雲際有一物凝翔鮮白不辯其形鷹便竦翮而升矗若飛電須臾羽墮如雪血下如雨有大鳥墮地度其兩翅數十里眾莫能識時有博物君子曰此大鵬鶵也文王乃厚賞之西京雜記曰茂陵少年李亭好馳駿狗逐獸或以鷹鷂逐兔皆以為佳名狗則有修毫釐睫白望青曹之名鷹則有青翅草眸青冥金距之屬鷂則有從風鷂孤飛鷂論衡曰孔子畏陽虎卻行流汙陽虎未必色白孔子未必面青鷹擊雀鶚啄鴈未必鷹鶚南方雀鴈西方自以筋力勇壯相勝服也秦子曰虎能雄猛不可以託麑鷹能飄擊不可以寄鶵物理論曰使武士宰民如使狼牧羊使鷹養鶵也焦贛易林曰鷹棲茂樹候雀往來益部耆舊傳曰廣漢馮顥為謁者逐單于至雲中大將軍梁冀遣人求鷹止晉陽舍人不避顥顥收之使人擊鷹而亡也顥追捕甚急冀辭乃止古樂府曰豹則虎之弟鷹則鷂之兄魏文帝荅繁欽書曰商風振條秦鷹秋吟斯可謂聲協鍾石氣應風律孫楚鷹賦曰郭延考與余辭其後從者韝二鷹以侍側郭邊人也好弋獵顧眄心欲自娛樂請余為賦曰其為相也踈尾闊臆高鬐圓顱深自娥眉狀似愁胡曲觜短頸足若雙枯隋魏彥深鷹賦曰惟茲禽之化育實鍾山之所生資金方之猛氣擅火德之炎精何虞者之多端運橫羅以羈束綴輕絲於雙臉結長皮於兩足飛不遂於本情食不充於所欲逸翰由其暫歛雄心為之自局若乃貌非一體相乃多途指重十字尾貴合盧立如植木望似愁胡觜同劍利腳等荊枯亦有白如散花赤如點血大文若錦細班似纈眼類明珠毛猶霜雪身重若金爪剛如鐵或復頂平似削頭圓如卵臆闊頸長筋粗脛短翅厚羽勁髀寬肉緩求之事用俱為絕伴或似鶉頭或似鵄首赤精黃足細骨小肘懶而易驚姦而難誘住不可呼飛不及走若斯之輩不如勿有若夫疾食速消此則有命兔頸猴立是為無病廁門忌大結肚惡軟條不欲絕背不宜喘生於窟者則好眠巢於木者則常立雙骹長者則起遟六翮短者則飛急毛衣屢改厥色無常寅生酉就總號為黃二周作鴘千日成蒼雖日排虛性殊眾鳥雌則體大雄則形小遇犬則驚猜得人則馴擾養鶵則少病野羅則多巧察之為易調之實難格必高逈屋必華寬薑以取熱酒以排寒韝須溫煖肉不陳乾近之令狎靜之使安晝不離手夜便火宿微加其毛少減其肉肌肥骨瘦心和性熟念絕雲霄志在馳逐鶻北齊書曰上洛王思宗弟思好少以騎射事文襄及文宣受命為左衛將軍本名思孝天保五年討賊文宣悅其驍勇謂曰爾擊賊如鶻入鵶群宜思好事故改名焉隋書曰劉昶子居士為太子千牛備身藂徒任俠不遵法度公卿子弟有力雄健者輒將至家以車輸括其頸而捧之殆死能不屈者稱為壯士釋而與交黨與三百人其趫捷者號為餓鶻隊唐書曰元和四年藹德曷里祿設弭施合蜜里迦可汗遣使請改廻紇為廻鶻義取廻旋輕犍如鶻又曰元和八年淄青節度使李師道進鶻十二命還之唐杜甫義鶻行曰陰崖二蒼鷹養子黑柏顛白虵登其巢吞噬恣朝飡雄飛遠求食雌者鳴辛酸力強不可制黃口寧半存其父從西來翻身入長煙斯須領健鶻憤懣寄所宣斗上捩孤影無聲來九天脩鱗脫遠枝巨顙拆老拳高空得蹭蹬短草辭蜿蜒折尾能一擺飽腸今已穿生雖滅眾鶵死亦垂千年物情有報復快意貴目前茲實鷙鳥最急難心炯然功成失所往用捨何其賢近經潏水湄此事樵夫傳飄蕭覺素髮凜欲衝儒冠人生所與分亦在顧眄間聊為義鶻行永激壯士肝鸇爾雅日晨風鸇也郭璞注曰鷂屬孟子曰為叢驅雀者鸇也為湯武驅民者桀與紂也隼毛詩曰織文鳥章白斾央央箋云鳥章隼之文章將帥之服又曰鵷彼飛隼其飛戾天亦集爰止隼急疾之鳥詩義䟽曰鷂也齊人謂之擊正或謂之題肩或曰雀鷹春化為布穀此屬數種皆為隼周易曰公用射隼于高墉之上春秋考異郵曰陰陽氣貪故題肩擊宗均注曰題肩有爪芒為陽中陰故擊殺也國語曰仲尼在陳有隼集于陳侯之庭而死楛矢貫之石弩其長尺有咫陳惠公使以隼如仲尼之館問之仲尼曰隼之來也遠矣此肅慎氏之矢也昔武王克商通道于九夷八蠻使各以其方賄來貢使無忘職業於是肅慎氏貢楛矢石弩其長尺有咫先王欲昭其令德之致遠也故銘其括曰肅慎氏之貢矢以分大姬配虞胡公而封諸陳古者分同姓以寶玉展親也分異姓以遠方之職貢使無忘服也故分陳以肅慎氏之貢君若使有司求諸故府其可得也使求得之金櫝鷂說, SBCK: ''}
