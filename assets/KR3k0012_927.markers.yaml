  - {type: variant, offset: 169, length: 1081, content: 如鷹鸇之逐鳥雀毛詩曰維師尚父時惟鷹揚如鷹之飛揚也箋云鷹鷙鳥也爾雅曰鷹鶆鳩郭璞注曰鶆當為鷞字之誤也左傳作鷞鳩是也善擊官於代郡捕之又曰鷹隼醜其飛也翬鼓趐翬翬然疾春秋考異郵曰金伐木故鷹擊雉易通卦驗曰鷹者鷙殺之鳥周書曰驚蟄之日鷹變為鳩小暑之日鷹乃學習處暑之日鷹乃祭鳥大戴禮日正月鷹則為鳩鷹也者非其殺之時也鳩也者非其殺之時也善變而知仁故具言之也鳩為鷹而不仁故不盡其辭史記曰李斯臨刑思牽黃犬臂蒼鷹出上蔡東門不可得矣漢書曰鷹隼未擊矰弋不得施於蹊隧又酷吏傳曰郅都為濟陽太守時人號為蒼鷹又曰孫寶為京兆尹請故吏侯文為椽立秋日文謂寶曰今鷹隼始擊當順天氣成嚴霜之誅後漢書曰崔駰與竇憲牋曰今日漢陽太守率吏卒數十人皆臂鷹牽狗云欲上幕府夫鷹犬所獲不過雉兔斯乃細人之事東觀漢記曰和熹皇后臨朝上林鷹犬悉斥賣之又曰趙勤字孟卿太守桓虞署督郵新野令自責還印綬去虞歎曰善吏如使良鷹下韝即中馬融與伯世書曰憒憒愁思猶不解懷思在竹間放狗逐麋晚秋涉冬大蒼出籠黃棘下菟芼以乾蔡以送餘日茲樂而已魏志曰呂布因陳登求徐州牧不得布怒登喻之曰登見曹公言待將軍譬如養虎當飽其肉不則噬人公曰不如養鷹飢則為用飽則揚去布乃解晉書曰虞潭字思奧會沈充等逼京師潭起義軍至上虞有野鷹飛集屋梁眾懼潭曰起大義而剛鷙之鳥來破賊必矣後如其言又曰崔洪清厲骨鯁為尚書左丞時人為之語曰叢生荊棘來自博陵在南為鷂在北為鷹又載記曰慕容垂請至鄴拜墓符堅許之權翼諫曰垂猶鷹也飢則附人飽便高颺遇風塵之會必有凌霄之志唯宜急其羈靽不可任其所欲堅不從南史曰王僧達性好鷹犬何尚之致仕復膺朝命於宅設八關齊大集朝士自行香次至僧達曰願即且放鷹犬勿復遊獵又曰齊鬱林王即位未踰旬多藂飛鷹快犬以梁肉俸之陳書曰侯安都率水軍於中流斷齊軍糧運又襲秦郡破徐嗣徽柵收其家口得嗣徽所彈琵琶及所養鷹遣信餉之曰昨至弟住處得此今以相還嗣徽等見之大懼北史曰後魏華山郡王澄弟嵩孝文時位步兵校尉大司馬安定王休薨未及卒哭嵩便遊田帝聞大怒曰嵩大司馬薨殂一月爾便以鷹鷂自娛有叔父之痛無猶子之情損心棄禮何其太速便可免官又曰齊廣寧王孫孝珩好綴文有技藝嘗於廳事壁自畫一蒼鷹見者皆以為真三國典略曰元坦為冀州刺史不恤人事專為藂歛性好畋漁無日不出秋冬獵禽獸春夏捕水族鷹犬常數百頭器網十餘車自云寧三日不食不能一日不獵唐書曰太宗初傳位舊苑中有籠鷹悉斷聯任去良犬並解絏放之又曰太宗謂侍臣曰李大亮可謂忠直矣朕遣使至其所見有佳鷹諷令獻朕大亮因密表責朕云陛下久絕田獵而使者求鷹若是陛下之意深乖昔旨如其自擅便是任使非人朕覽表嘉歎不能自己有臣若是朕復何憂於是賜之金壺以彰忠讜又曰源乾曜為京兆尹仍京師留守乾曜政存寬簡不嚴而理嘗有仗內白鷹因縱逸遂失, WYG: ''}
