  - {type: variant, offset: 446, length: 3, content: 竇憲牋, SBCK: 彭寵書曰惜乎弃休令之嘉名造鴟梟之逆謀晉書曰張重華爲石季龍所攻重華掃境内使其征南將軍裴恒禦之恒壁于廣武欲以持乆􅁦之張躭舉主簿謝艾兼資文武必能折衝禦侮殱殄凶􅀋重華召艾艾曰昔耿弇不欲以賊遺君父黄權願以萬人當㓂乞假臣兵七千爲殿下吞王擢麻秋等重華大恱以艾爲中堅將軍配歩􅀐五千擊秋引師出振武夜有二梟鳴於牙中艾曰梟邀也六􅀶得梟者勝今梟鳴牙中尅敵之兆於是進戰大破之斬首五千級又載記曰乞伏乾歸略于五谿有梟集于其手甚惡之六年爲兄子公府所弑并其諸子十餘人北史李元忠性甚工彈甞從文襄入謁魏帝有梟鳴殿下文襄命元忠彈之問得幾丸而落對曰一丸承大將軍意氣兩丸足矣如其言而落之唐書曰有梟晨鳴扵張率更庭樹其妻以爲不祥連唾之文収云急灑掃吾當改官言末畢賀者巳在門淮南子曰白公之嗇財􅀂梟之愛其子也許慎曰梟子大食其母也淮南萬畢術曰甑瓦止梟鳴取破甑瓦向抵之輙自止物相勝其性耳魯連子曰齊辯士田巴毀五帝罪三王離堅白合同異一日服千人有徐刼者弟子曰魯仲連年十二號千金駒徃詣田巴曰臣聞白刃交前者不救流矢急不暇救援也今楚軍南陽趙伐髙唐燕人十萬守􅂓城國之危在旦夕先生柰何不能却者先生之言有以梟鳴出聲而人惡之願先生勿復言田巴曰謹聞命矣說􅁐曰齊景公爲露寢之臺成而不通焉栢常騫曰爲臺甚急臺成君何爲不通焉公曰然梟昔鳴梟鳴者其聲無不爲也吾惡之甚是以不通焉栢常騫曰臣請禳而去之公曰阿具對曰築新室爲置白茅焉公使爲室成置白茅焉栢常騫夜用事明日問公}
