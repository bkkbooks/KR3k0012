  - {type: variant, offset: 1634, length: 0, content: '', WYG: 飛鴞集我室隅異物之來吉凶是符昔在賈生有識之士忌兹鵩鳥卒用䘮已咨我令考信道秉直變怪生家謂之天神}
  - {type: variant, offset: 1635, length: 7, content: 毫釐睫白望青曹, WYG: 德威邪化及其鄰梅陶鵩鳥序曰余既遭王敦}
