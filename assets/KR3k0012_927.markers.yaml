  - {type: variant, offset: 453, length: 0, content: '', krp: 供御物各隨其時唯鴞冬夏施以美故也莊子曰見卵而求時夜見彈而求鴞炙魏志曰夫鴞天下賤鳥也及其在林食椹則懷我好音晉書曰王羲之好鴞炙三國典略曰齊太山主武成之長也母曰胡太后夢扵海上坐玉盆日入裙下遂有娠生扵并州其日有鴞鳴於産帳之上盛弘之荆州記曰巫縣有鳥如雌鷄其名爲鴞廣志曰鴞楚鳩所生如驢巨靈種類不滋乳也鵩西京雜記曰賈誼在長沙鵩鳥集其承塵而鳴長沙俗以爲鵩至人家主人當死誼作鵩鳥賦齊死生等榮辱以遣憂累焉賈誼鵩鳥賦曰誼爲長沙王傅三年有鵩鳥飛入舎止于坐隅鵩似鴞不祥鳥也誼旣謫居長沙長沙卑濕自傷悼以爲壽不長爲賦以自廣漢太常孔臧仲尼之後以才學知名作鴞賦曰季夏庾子思道静居爰有飛鴞集我室隅異物之來吉凶是符昔在賈生有識之士忌兹鵩鳥卒用䘮巳咨我今考信道秉真變性生家謂之天神脩德滅邪化及其鄰梅陶鵩鳥賦序曰余旣遭王敦之難遂見忌録居于武昌其秋有野鳥入室感賈誼鵩鳥依而作焉神仙傳曰尹䡄字公度人有怪鳥鳴其屋上者以語公度公度爲一奏符著鳥鳴處其夕鳥伏符下死鴝鵒爾雅曰鵅鵋䳢郭璞注曰江東呼鵂鶹爲忌欺亦曰鴝鵅音句格纂文曰􅝐鶹一名忌欺白日不見人夜能拾蚤虱也蚤瓜音相近俗人云鵂鶹拾人弃瓜相其吉凶妄說也博物志曰鵂鶹一名鵄鵂晝日無所見夜則目至明人截爪甲弃露地此鳥夜至人家拾取瓜分别視之則知有吉凶凶者輙便鳴其家有殃莊子曰鵂鶹夜撮蚤察毫末畫暝目不見丘山殊性也淮南萬畢術曰鵄鵂致鳥取鵄鵂折其大羽絆其兩足以爲媒張羅其旁鳥自聚矣南史曰侯景入臺城在昭}
