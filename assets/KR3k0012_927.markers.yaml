  - {type: variant, offset: 1597, length: 1, content: 文, WYG: 至日捕梟磔之趙一解㯽賦曰甑瓦可以令梟寂嶺表録異曰北方梟人家以為怪共􅁖之南中晝夜飛鳴與鳥鵲無異桂林人羅取生鬻之家家養使捕鼠以為勝狸鴞禮記内則曰鴞胖人亦尚之毛詩曰墓門有梅有鴞萃止夫也不良歌以訊之又曰翩彼飛鴞集于泮林食我桑揕懐我好音又詩義䟽曰鴞大鳩綠色􅁖聲鳥也入人家凶賈誼所賦是也其肉甚美可為美臛又可炙漢供御物各随其時唯鴞冬夏施以美故也荘子曰見卵而求時夜見弹而求鴞炙魏志曰夫鴞天下賤鳥也及其在林食椹則懐我好音晉書曰}
