  - {type: variant, offset: 770, length: 261, content: 凌霄之志唯宜急其羈靽不可任其所欲堅不從南史曰王僧達性好鷹犬何尚之致仕復膺朝命於宅設八關齊大集朝士自行香次至僧達曰願即且放鷹犬勿復遊獵又曰齊鬱林王即位未踰旬多藂飛鷹快犬以梁肉俸之陳書曰侯安都率水軍於中流斷齊軍糧運又襲秦郡破徐嗣徽柵收其家口得嗣徽所彈琵琶及所養鷹遣信餉之曰昨至弟住處得此今以相還嗣徽等見之大懼北史曰後魏華山郡王澄弟嵩孝文時位步兵校尉大司馬安定王休薨未及卒哭嵩便遊田帝聞大怒曰嵩大司馬薨殂一月爾便以鷹鷂自娛有叔父之痛無猶子之情損心棄禮何其太速便可免官又曰齊廣寧王孫孝珩好綴文有技藝嘗於廳事壁自畫一蒼鷹見者皆以為真, SBCK: 凶咎}
