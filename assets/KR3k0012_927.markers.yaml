  - {type: variant, offset: 1471, length: 8, content: 夢置網雲布煙燒張, WYG: 之翼如山之形海運水擊扶揺上征又曰習鑿齒詣釋道安值衆僧齋皆捨鉢斂衽唯道安食不輟齒曰大鵬從南來衆鳥皆戢翼向從東老鴟腩腩低頭食鷖一名}
