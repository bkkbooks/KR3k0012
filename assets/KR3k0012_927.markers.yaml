  - {type: variant, offset: 352, length: 10, content: 臨刑思牽黃犬臂蒼鷹出, SBCK: 地治鳥捜神記曰越地深山有鳥大如鳩青色名曰治鳥穿大樹作窠如五六􅂛噐口徑數寸周飾以􅁟堊赤白相分狀如射侯伐木者見此樹即避之或夜􅁳不見鳥亦知人不見己也鳴曰咄咄}
