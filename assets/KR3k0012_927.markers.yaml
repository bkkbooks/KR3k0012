  - {type: variant, offset: 365, length: 1, content: 門, SBCK: 有之惡鳥爾雅曰梟鵄郭璞注曰土梟鳥少尾長醜爲流粟史記曰古者天子常以春祠黄帝用一梟如淳曰漢使東郡送梟五月五日作梟羮以賜百官以其惡鳥故食之春秋後語曰􅂫代謂魏王曰王獨不見夫􅀶之所以貴梟乎愽之竪者爲梟楚詞云成梟而牟乎五白梟古堯切便則食不便則止今王曰事始巳行}
