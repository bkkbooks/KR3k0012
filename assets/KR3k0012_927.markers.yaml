  - {type: variant, offset: 2749, length: 6, content: 叢驅雀者鸇也, WYG: 媒張羅其旁鳥聚矣南史曰侯景入臺城在昭陽殿廊下居處常有鵂鶹鳥鳴呼景惡之使人窮山野捕焉三國典略曰侯景矯豫章嗣王揀命禪位於已將拜受冊命忽有丹嘴鵲集于冊書又夜有鵂鶹鳴于太極殿上景深以}
