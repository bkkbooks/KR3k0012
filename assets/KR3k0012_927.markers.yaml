  - {type: variant, offset: 1458, length: 2, content: 爪距, WYG: 晉書曰賈彪鵬鳥賦序曰余覽張安世鷦鷯賦以其質為處䙝而陋以逺害愚以為未若大鵬栖形遐逺自育之全也此固禍福之機聊賦之云又曰阮脩夫鵬賛曰蹌蹌大鵬誕自北溟假精靈鱗}
