  - {type: variant, offset: 1572, length: 3, content: 墮地度, WYG: 其高千里頭文曰天維又曰雞左翼文曰鷖右翼文曰勤左足在海北崕右足在海南崕其毛蒼其喙赤其脚黒名曰天雞一名鷖勤頭河東止海央唯捕鯨魚死則北海水流不犯觸人不干物或時舉翼飛}
  - {type: punctuation, offset: 1574, content: 。, id: KR3k0012_CHANT_927-bkkpn533}
  - {type: 'tls:seg', offset: 1574, content: '', id: KR3k0012_CHANT_927-24a.30}
  - {type: variant, offset: 1577, length: 0, content: '', WYG: 羽初如雷如風驚動天地張氏曰先北海多鯨魚而産子多北海屯塞故鳥食此魚海水通流希有東方朔神異經曰崑崙銅柱有屋壁方百丈上有一鳥名希有張左翼覆東王公右翼覆西王母一嵗再登翼之東王公也其啄赤目黄如金其肉苦醎仙人甘之金}
  - {type: page-break, offset: 1577, content: '', id: KR3k0012_WYG_927-3a, image: WYG0901/WYG0901-0249c.png}
  - {type: variant, offset: 1578, length: 0, content: '', WYG: 鳥符子曰齊景公謂晏子曰韓人既得寶千乗聚萬駟矣方欲珍懸黎㑹金玉其得之耶奚若晏嬰曰臣琬琰之外有鳥焉曰金翅民謂為羽豪其為鳥也非龍肝不食非鳳血不飲其食也常飢而不飽其飲也常渇而復充生未幾何失其天年而死珠玉之珍非乃為君之患也齊書曰初武帝梦金翅下殿摶食小龍無}
  - {type: page-break, offset: 1578, content: '', id: KR3k0012_WYG_927-3b, image: WYG0901/WYG0901-0249d.png}
  - {type: variant, offset: 1579, length: 0, content: '', WYG: 乃飛上天明帝初其梦竟驗意怠莊子曰東海有鳥名意怠進不敢為前退不敢為後食不敢先嘗必取其緒行列不斥而人不得害以免于患大風淮南子曰堯使羿繳大風於青丘大風鷙鳥在東方一云大風風伯也兼兼周書曰成王時巴人獻比翼鳥爾雅曰南方有比翼鳥焉不比不飛其名曰兼兼郭璞註曰似烏赤色一曰一翼相得乃飛也山海經曰有鳥其狀如鳬一翼一目相得乃飛名曰蠻比翼鳥色青赤見則大水史記曰管仲說桓公古之封禪南海致比翼之鳥瑞應圖曰王者得其高逺則比翼鳥至一本云王者有徳則至愽物志曰崇吾之山有鳥焉一足一翼一目相得乃飛名曰鶼鶼見則天下大水世樂臨海異物志曰世樂鳥五色頭上有冠丹喙赤足有道則見端琦說苑曰晉平公出朝其鳥環平公不去平公顧謂師曠曰是鳳邪曠對曰東方有鳥名為端琦憎鳥而愛狐令吾君必衣狐裘以朝乎平公曰然青鳥山海經曰三危之山有三青鳥歸青鳥主為西王母使者别自栖息于此山食紀年曰穆王}
  - {type: page-break, offset: 1579, content: '', id: KR3k0012_WYG_927-4a, image: WYG0901/WYG0901-0250a.png}
  - {type: page-break, offset: 1579, content: '', id: KR3k0012_WYG_927-4b, image: WYG0901/WYG0901-0250b.png}
  - {type: page-break, offset: 1579, content: '', id: KR3k0012_WYG_927-5a, image: WYG0901/WYG0901-0250c.png}
  - {type: variant, offset: 1580, length: 3, content: 里眾莫, WYG: 三年西征直于青鳥之所解漢武故事曰七月七日上於承華殿齋正中忽有一青鳥從西方來集殿前上問東方朔朔曰此西王母欲來也有頃西王母至有二青鳥如挾侍王母旁又曰鉤弋夫人卒上為起通靈䑓常有一青鳥集䑓上晉中興書曰顔含嫂病困須蚺蛇膽不}
  - {type: page-break, offset: 1580, content: '', id: KR3k0012_WYG_927-5b, image: WYG0901/WYG0901-0250d.png}
  - {type: punctuation, offset: 1581, content: ，, id: KR3k0012_CHANT_927-bkkpn534}
  - {type: 'tls:seg', offset: 1581, content: '', id: KR3k0012_CHANT_927-24a.31}
  - {type: substitution, offset: 1581, original: 眾, replacement: 衆, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19653}}
  - {type: variant, offset: 1584, length: 1, content: 識, WYG: 得含憂歎累日忽有一童子持青囊授含蚺蛇膽也童子化為青鳥飛去神仙傳曰東陵聖母廣陵海陵人杜氏妻也學劉綱道座在立亡杜公不言誣言聖母作奸收付獄聖母從窓中飛去於是逺近為立廟甚有神常有一青鳥在祭所人有失物者青鳥便飛集物上路無失遺晉郭璞青鳥賛曰山名三危青鳥所解往來崑崙王母是𨽻穆王西征旅軫斯地治鳥捜神記曰越地深山有鳥大如鳩青色名曰治鳥穿大樹作窠如五六升器口徑數寸周飾以堊赤白相分状如射侯伐木者見此樹即避之或夜㝠不見鳥亦知人不見已也鳥曰咄咄上去明日便急上去曰咄咄下去明日便宜急下去若不便去但言笑而已可止火也若有穢惡及犯其所止者則虎害之白日見其形鳥也夜聴其鳴亦鳥也}
  - {type: page-break, offset: 1584, content: '', id: KR3k0012_WYG_927-6a, image: WYG0901/WYG0901-0251a.png}
  - {type: page-break, offset: 1584, content: '', id: KR3k0012_WYG_927-6b, image: WYG0901/WYG0901-0251b.png}
  - {type: punctuation, offset: 1585, content: ，, id: KR3k0012_CHANT_927-bkkpn535}
  - {type: 'tls:seg', offset: 1585, content: '', id: KR3k0012_CHANT_927-24a.32}
  - {type: variant, offset: 1586, length: 0, content: '', WYG: 作人形三尺入澗中取石蟹就人間火炙之越人謂此越祝之祖木客異物志曰木客鳥大如雀數千百頭為羣飛集}
  - {type: variant, offset: 1587, length: 0, content: '', WYG: 度不與衆鳥相厠又俗云木客白黄文者謂之君長有翼有綬飛高而正赤者在前謂之五伯居前正黒者謂之鈐下緗色而頳雜者謂之功曹左脇有白帶似鞶囊者謂之主簿長次君後其五曹官属各有章色廬陵郡東有之惡鳥爾雅曰梟鳥郭璞注曰土梟鳥少美長醜為流栗史記曰古者天子常以春祠黄帝用一梟如淳曰漢使東郡送梟五月五作梟羮以賜百官以其惡鳥故食之春秋後語曰蘇代謂魏王曰王獨不見夫}
  - {type: page-break, offset: 1587, content: '', id: KR3k0012_WYG_927-7a, image: WYG0901/WYG0901-0251c.png}
  - {type: page-break, offset: 1587, content: '', id: KR3k0012_WYG_927-7b, image: WYG0901/WYG0901-0251d.png}
  - {type: variant, offset: 1588, length: 0, content: '', WYG: 之所以貴梟乎博之堅者為梟楚詞賦云梟而羮乎五百梟克堯切便則食不便則止令主曰事始以行不可更是何言歟王之用智不若梟乎王乃止其行後漢書曰朱浮與彭寵書曰惜乎棄休令之加名造䲭梟之逆謀晉書曰張重華為石季龍所攻重華掃境内使其征南將軍裴恒禦之恒壁於廣武欲以持久弊之張躭舉主簿謝艾兼資文武必能折衝禦侮殲彌凶類重華召艾艾曰昔耿弇不欲以賊遺君父黄權願以萬人當冦乞假臣兵七千為殿下吞王曜麻秋等重華大恱以艾為中堅将軍配歩騎五千擊秋引師出振武夜有二梟鳴於牙中艾曰梟邀也六愽得梟者勝今梟鳴牙中克敵之兆於是進戰大破之斬首五千級又載記曰乞伏乾歸略于五谿有梟集于其手甚惡之六年為兄子公府所殺并其諸子十餘人北史李元忠性甚攻弹嘗從文襄入謁魏帝有梟鳴殿下文襄命元忠弹之問得幾丸而落對曰一丸承大将軍意氣兩丸足矣如其言而落之唐書曰有梟晨鳴于張率更庭樹其家以為不祥連唾之張聞之曰急灑埽吾當改官言未畢賀者已在門淮南子曰白公之嗇財若梟之愛其子也許慎曰梟子大食其母也淮南萬畢術曰甑止梟鳴取破甑瓦向抵之輙自止}
  - {type: page-break, offset: 1588, content: '', id: KR3k0012_WYG_927-8a, image: WYG0901/WYG0901-0252a.png}
  - {type: page-break, offset: 1588, content: '', id: KR3k0012_WYG_927-8b, image: WYG0901/WYG0901-0252b.png}
  - {type: variant, offset: 1589, length: 0, content: '', WYG: 相勝其性耶魯連子曰齊辨士田巴服徂丘議稷下毁五帝罪三王離堅白合同異一日服千人有餘刼者子弟百人魯仲連年十二號千金駒往詣田巴曰吾聞白刃交前者不救流矢急不暇救也今楚軍南陽趙代髙唐燕人失守聊城國之危在旦夕先生奈何不能却者先生之言有似梟鳴出聲而人惡之願先生勿復言田巴曰謹聞命矣說苑曰齊景公為露寝之臺成而不通焉栢常騫曰為臺甚急臺成君何為不通焉公曰然梟昔鳴梟者其聲無不惡也吾惡之甚是以不通焉栢常騫曰臣請禳而去之公曰何懼對曰築新室為置白茅焉公使為室成置白茅焉栢常騫夜用事明日問公曰今旦聞梟聲乎公曰一鳴而不復聞使人往視之梟當陛布翼伏地而死又曰梟逢鳩鳩曰子安之梟曰我将東徙鳩曰何故梟曰一鄉皆惡鳴故徙也鳩曰更鳴則可不更鳴東徙亦惡子之聲桓譚新論曰王翁時男子畢康殺其母詔焚燒其屍暴其罪于天下余上章言宣帝時公卿朝㑹丞相語次曰聞梟生子長且食其母然乎有賢者應曰但聞烏子反哺耳丞相大慙}
  - {type: page-break, offset: 1589, content: '', id: KR3k0012_WYG_927-9a, image: WYG0901/WYG0901-0252c.png}
  - {type: page-break, offset: 1589, content: '', id: KR3k0012_WYG_927-9b, image: WYG0901/WYG0901-0252d.png}
  - {type: page-break, offset: 1589, content: '', id: KR3k0012_WYG_927-10a, image: WYG0901/WYG0901-0253a.png}
  - {type: variant, offset: 1591, length: 0, content: '', WYG: 之於禽獸尚為之諱况人乎又}
