  - {type: variant, offset: 1884, length: 550, content: 侍側郭邊人也好弋獵顧眄心欲自娛樂請余為賦曰其為相也踈尾闊臆高鬐圓顱深自娥眉狀似愁胡曲觜短頸足若雙枯隋魏彥深鷹賦曰惟茲禽之化育實鍾山之所生資金方之猛氣擅火德之炎精何虞者之多端運橫羅以羈束綴輕絲於雙臉結長皮於兩足飛不遂於本情食不充於所欲逸翰由其暫歛雄心為之自局若乃貌非一體相乃多途指重十字尾貴合盧立如植木望似愁胡觜同劍利腳等荊枯亦有白如散花赤如點血大文若錦細班似纈眼類明珠毛猶霜雪身重若金爪剛如鐵或復頂平似削頭圓如卵臆闊頸長筋粗脛短翅厚羽勁髀寬肉緩求之事用俱為絕伴或似鶉頭或似鵄首赤精黃足細骨小肘懶而易驚姦而難誘住不可呼飛不及走若斯之輩不如勿有若夫疾食速消此則有命兔頸猴立是為無病廁門忌大結肚惡軟條不欲絕背不宜喘生於窟者則好眠巢於木者則常立雙骹長者則起遟六翮短者則飛急毛衣屢改厥色無常寅生酉就總號為黃二周作鴘千日成蒼雖日排虛性殊眾鳥雌則體大雄則形小遇犬則驚猜得人則馴擾養鶵則少病野羅則多巧察之為易調之實難格必高逈屋必華寬薑以取熱酒以排寒韝須溫煖肉不陳乾近之令狎靜之使安晝不離手夜便火宿微加其毛少減其肉肌肥骨瘦心和性熟念絕雲霄志在馳逐鶻北齊書曰上洛王思宗弟思好少以騎射事文襄及文宣受命為左衛將軍本名思孝天保五年討賊文宣悅其驍勇謂曰爾擊賊如鶻入鵶群宜思好事故改名焉隋書曰劉昶子居士為太子千牛備身藂徒任俠不遵法, WYG: 語公}
