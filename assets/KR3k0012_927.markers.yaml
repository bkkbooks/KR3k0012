  - {type: punctuation, offset: 350, content: 「, id: KR3k0012_CHANT_927-bkkpn156}
  - {type: variant, offset: 350, length: 1, content: 李, SBCK: 管仲說桓公古之封禪西海致比翼之鳥瑞應圖曰王者德及髙逺則比翼鳥至一本云王者有孝德則至􅀶物志曰崇吾之山有鳥焉一足一翼一目相得乃飛名曰鶼鶼見則天下大水丗樂臨海異物志曰丗樂鳥五色頭上有冠丹喙赤足有道則見端􅄾說􅁐曰晉平公出朝其鳥環平公不去平公頋謂師曠曰是鳯耶師曠對曰東方有鳥名爲端􅄾憎鳥而愛狐今吾君必衣狐裘以朝乎平公曰然青鳥山海經曰三危之山有三青鳥居青鳥主爲西王母取者別自栖息於此山食紀年曰穆王十三年西徃至于青鳥之所解漢武故事曰七月七日上於承華殿齊止中忽有一青鳥從西方來集殿前上問東方朔朔曰此西王母欲來也有頃西王母至有二青鳥如烏俠侍王母旁又曰鈎弋夫人卒上爲起通靈臺常有一青鳥集臺上晉中興書曰顔含嫂病困湏髯虵膽不能得含憂歎累曰忽有一童子持青囊授含乃虵膽也童子化爲青鳥飛去神仙傳曰東陵聖母廣陵海陵人杜氏妻也學劉綱道座在立亡杜公不信誣言聖母作姧収付獄聖母從䆫中飛去於是逺近爲立廟甚有神效常有一青鳥在􅀕所人有失物者青鳥便非集物上路無拾遺晉郭璞青鳥賛曰山名三危青鳥所解徃來崑崙王母是􅀠穆王西征旋軫}
