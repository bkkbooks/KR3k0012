  - {type: variant, offset: 363, length: 1, content: 蔡, SBCK: 去明日便急上去曰咄咄下去明日便冝急下去􅀂不便去但言􅀏而巳可止伐也􅀂有穢惡及犯其所止者則虎害之白日見其形鳥形也夜聽其鳴亦鳥也時作人形長三尺入澗中取石蟹就人間火炙之越人謂此越祝之祖木客異物志曰木客鳥大如鵲數千百頭爲羣飛集有度不與衆鳥相厠人俗云木客白黄文者謂之君長有翼有綬飛髙而正赤者在前謂之五伯居前正黒者謂之鈴下緗色而頳雜者謂之功曹左脇有白帶似鞶囊者謂之主簿長次君後其五曹官属各有章色廬陵郡}
