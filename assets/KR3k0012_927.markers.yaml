  - {type: variant, offset: 1505, length: 64, content: 吾鷹所獲以百數汝鷹曾無奮意將欺余耶獻者曰若效於雉兔臣豈敢獻俄而雲際有一物凝翔鮮白不辯其形鷹便竦翮而升矗若飛電須臾羽墮如雪血下如雨, WYG: 北海}
