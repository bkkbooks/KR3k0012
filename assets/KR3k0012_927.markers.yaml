  body:
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 四異鳥鵬鷖希有金翅意怠大風兼兼丗樂端􅄾青鳥治鳥木客惡鳥鴞鵩鴝鵅鴆􅀑車不孝鳥鵬莊子曰北溟有魚其名爲鯤鯤之大不知幾千里化而爲鳥其名爲鵬鵬背不知幾千里也怒而飛翼􅀂垂天之雲是鳥也海運將徙於南溟南溟者天池也水激}
  - {type: variant, offset: 4, length: 59, content: 三鷹春秋運斗樞曰瑤光星散為鷹禮記月令曰驚蟄之日鷹化為鳩又曰七月鳩化為鷹然後設罻羅左傳文公十八年季文子使太史克對宣公曰先, WYG: 四異鳥鵬鷖希有金翅鳥意怠}
  - {type: variant, offset: 4, length: 0, content: '', krp: 四異鳥鵬鷖希有金翅意怠大風兼兼丗樂端琦青鳥治鳥木客惡鳥鴞鵩鴝鵅鴆鬼車不孝鳥鵬莊子曰北溟有魚其名爲鯤鯤之大不知幾千里化而爲鳥其名爲鵬鵬背不知幾千里也怒而飛翼若垂天之雲是鳥也海運將徙於南溟南溟者天池也水激}
