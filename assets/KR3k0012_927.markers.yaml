  - {type: variant, offset: 47, length: 0, content: '', SBCK: 曰鷖右翼文曰勤左足在海北涯右足在海􅀯涯其毛蒼其喙赤其脚黒名曰天鷄一名鷖勒頭河東止海央唯捕鯨魚死則北海水流利不犯觸人不干物或時舉翼飛其兩羽切如雷如風驚動天地張茂先曰北海多鯨魚而産子多北海溢塞故鳥食此魚海水通流希有東方朔神異經曰崑崙銅柱有屋辟方百丈上有一鳥名希有張左翼覆東王}
