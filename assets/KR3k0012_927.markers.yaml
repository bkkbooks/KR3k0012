  - {type: variant, offset: 1629, length: 1, content: 佳, WYG: 鵩至人家主人當死誼作鵩鳥賦齊死生等榮辱以遣憂累焉賈誼鵩鳥賦曰誼為長沙王傳三年有鵩鳥飛入舍止於坐隅鵩似鴞不祥鳥也誼既謫居長沙長沙卑濕自傷悼以為夀不長為賦以自廣漢太常孔臧仲尼之後以才學知}
