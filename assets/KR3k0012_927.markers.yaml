  - {type: variant, offset: 1647, length: 126, content: 青翅草眸青冥金距之屬鷂則有從風鷂孤飛鷂論衡曰孔子畏陽虎卻行流汙陽虎未必色白孔子未必面青鷹擊雀鶚啄鴈未必鷹鶚南方雀鴈西方自以筋力勇壯相勝服也秦子曰虎能雄猛不可以託麑鷹能飄擊不可以寄鶵物理論曰使武士宰民如使狼牧羊使鷹養鶵也焦贛易林曰鷹棲茂樹候雀往來益部耆舊, WYG: 野鳥入室感賈誼鵩鳥依而作焉神仙}
