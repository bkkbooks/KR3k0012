  - {type: variant, offset: 2743, length: 3, content: 鷂屬孟, WYG: 江東呼鵂鶹為忌欺亦曰鴝鵅音句格纂文曰鵂鶹一名忌欺白日不見人夜能食蚤虱也蚤爪音相近俗人云鵂鶹拾人棄爪相其吉凶妄說也愽物志曰鵂鶹一名鵄鵂晝目無所見夜則目至明人截爪甲棄露地此鳥夜至人家拾取𤓰分别視之則知吉凶凶者輒便鳴其家有殃莊}
