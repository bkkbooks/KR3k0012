  - {type: variant, offset: 48, length: 2, content: 十八, SBCK: 右翼覆西王母一歳再登翼上之東王公也其喙赤目黄如金其􅁏苦鹹仙人甘之金翅鳥符子曰齊景公謂晏子曰寡人旣得寳千乗聚萬駟矣方欲珎懸􅀺㑹金玉其得之耶奚􅀂晏嬰曰臣聞琬琰之外有鳥焉曰金翅民謂爲羽豪其爲鳥也非龍肺不食非鳯血不飲其食也常飢而不飽其飲也常渇而弗充生未幾何天其大}
