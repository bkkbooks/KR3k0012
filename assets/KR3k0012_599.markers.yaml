  - {type: variant, offset: 53, length: 1, content: 資, krp: 年壽有時而盡榮樂止乎其身二者必至之常期未若文章之無窮是以古之作者寄身於翰墨見意於篇籍不假良史之辭不託飛馳之勢而聲名自傳於後故西伯幽而演易周旦顯而制禮不以隱約而不務不以康樂而加思夫然則古人賤尺璧而重寸隂懼乎時之過巳而人多不強力貧賤則懼於饑寒冨貴則流于逸樂遂營目前之務而遺千載之功日月逝于上體皃衰於下忽然與萬物遷化斯亦志士大痛也融等巳逝唯幹著論成一家之言傅子曰或問劉歆劉向孰賢傳子曰向才學俗而志}
  - {type: variant, offset: 55, length: 1, content: 孚, WYG: 瑞錦仍令大錄所著古體詩以獻世說曰孫興公作天台賦成以示范榮期曰卿試擲置地要作金石之聲范曰恐子之金石非宫商中聲然每至佳句輒云應是我軰語又曰左思字太冲作}
  - {type: page-break, offset: 55, content: '', id: KR3k0012_WYG_599-9a, image: WYG0898/WYG0898-0450a.png}
  - {type: variant, offset: 55, length: 2, content: 孚三, krp: 歆才學通而行邪詩之雅誦書之典謨文質足以相副玩之若近㝷之益逺陳之若肆研之若隱浩浩乎其文章之淵府也李充翰林論曰潘安仁爲文也猶翔禽之羽毛衣𬒳之綃縠抱朴子曰丗謂王充一}
