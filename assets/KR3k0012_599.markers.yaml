  - {type: variant, offset: 3396, length: 33, content: 卿罪死即死少被刑而成極刑自以不復收於是解脫詐刻傳出關歸家漢書曰文帝, SBCK: ''}
  - {type: variant, offset: 3396, length: 516, content: 卿罪死即死少被刑而成極刑自以不復收於是解脫詐刻傳出關歸家漢書曰文帝十三年詔除關無用傳張晏注曰傳信也若今過所李奇曰傳棨也顏師古曰或用棨或用繒帛棨者刻木為合符魏略曰倉慈為燉煌太守胡欲詣國家為封過所廷尉決事曰廷尉上廣平趙禮詣雒治病博士弟子張策門人李臧齎過所詣洛還責禮冒名渡津平裴諒議禮一歲半刑策半歲刑晉令曰諸渡關及乘舡筏上下經津者皆有所寫一通付關吏零丁齊諧記曰國步山有廟又一亭呂思與少婦投宿失婦思逐覔見天城廳事一人紗帽馮几左右競來擊之思以刀斫計當殺百餘人餘者便乃大走向人盡成死狸看向廳事乃是古始大冢冢上穿下甚明見一群女子在冢裏見其婦如失性人因抱出冢口又入抱取於先女子有數十中有通身已生毛者亦有毛腳面成狸者須臾天曉將婦還亭亭吏問之具如此荅前後有失兒女者零丁有數十吏便歛此零丁至冢口迎此群女隨家遠近而報之各迎取於此後一二年廟無復靈戴良字文讓失父零丁曰敬白諸君行路者敢告重罪自為積惡致災交天困我今月七日失阿爹念此酷毒可痛傷當以重幣繒用相賞請為諸君說事狀我父軀體與眾異脊背傴僂捲如胾脣吻參差不相值此其庶形何能備請復重陳其面目鴟頭鵠頸獦狗眼淚鼻涕相追逐吻中含納無牙齒食不能嚼左右蹉似西域駱駞請復重陳其形骸為人雖長甚細材面目芒蒼如死灰眼眶曰陷如米羹柸, WYG: ''}
  - {type: variant, offset: 3396, length: 33, content: 卿罪死即死少被刑而成極刑自以不復收於是解脫詐刻傳出關歸家漢書曰文帝, krp: ''}
