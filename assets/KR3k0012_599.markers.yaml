  - {type: variant, offset: 155, length: 9, content: 今邯鄲旦暮降秦魏救, SBCK: 或問劉歆劉向孰賢􅀓子曰向才學俗而志中歆才學通而行邪詩之雅誦書之典謨文質足以相副玩之􅀂近㝷之益逺陳之􅀂肆研之􅀂隱浩浩乎其文章之淵府也李充翰林論曰潘安仁爲文也猶翔禽之羽毛衣􅀍之綃縠抱朴子曰丗謂王充一代英偉所著文時有小疵猶鄧林枯枝滄海流芥未易貶者又曰歐陽生曰張茂先潘正叔潘安仁文逺過二陸又曰張潘與二陸爲比}
