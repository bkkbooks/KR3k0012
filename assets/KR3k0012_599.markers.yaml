  - {type: variant, offset: 2913, length: 5, content: 任果降同果, SBCK: 國舊敦好睦聞其姦計乃欲規謀冝令上黨王渙揔勒熊熊星流風卷王者之言明如日月冝宣内外咸使聞知書成齊主覽之於兇首下足九言曰雖藏山没水終不縱赦於是遣渙南侵曹植與楊脩書曰丗人之著述不能無病僕常好譏彈其文有不善者應時改定昔丁敬禮常作小文使僕潤飾之僕自以才不過􅀂人辭不爲也敬禮謂僕卿何所疑難文佳麗吾自得之後丗誰相知定吾文者耶常歎此言逹以爲美譚丗􅀃曰司馬景王令中書虞松作表再呈輙不可意令松更定松思竭不能改心存之形於顔色鍾㑹察其憂問松松恱以實荅㑹取爲定五}
