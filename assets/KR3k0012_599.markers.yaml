  - {type: variant, offset: 13, length: 0, content: '', WYG: 禮不}
  - {type: variant, offset: 14, length: 24, content: 竹長六寸分而相合釋名曰符付也書所勑命於上付使傳行, SBCK: 徐􅁃爲宗氣調漸劣嘉謨與少微屬詞皆以經典爲本時人欽慕}
  - {type: variant, offset: 14, length: 3, content: 竹長六, WYG: 隱約而不務不以康樂而加思夫然則古人賤尺璧而重}
  - {type: variant, offset: 14, length: 24, content: 竹長六寸分而相合釋名曰符付也書所勑命於上付使傳行, krp: 徐庾爲宗氣調漸劣嘉謨與少微屬詞皆以經典爲本時人欽慕}
