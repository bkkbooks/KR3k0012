  - {type: variant, offset: 48, length: 21, content: 徵召防偽事資中孚三代玉瑞漢世金竹末代從省代, SBCK: 今之文人魯國孔融文舉廣陵陳琳孔璋山陽王粲仲宣北海徐翰偉長陳留阮瑀元瑜汝南應瑒德璉東平劉楨公幹斯七子者於學無所遺於辭無所假咸自}
  - {type: variant, offset: 48, length: 4, content: 徵召防偽, krp: 今之文人魯國孔融文舉廣陵陳琳孔璋山陽王粲仲宣北海徐翰偉長陳留阮瑀元瑜汝南應瑒德璉東平劉楨公幹斯七子者於學無所遺於辭無所假咸自以騁騄驥於千里仰齊足而並馳以此相服亦良難矣盖君子審巳以度人故能免於斯累而作論文王粲長於辭賦徐翰時有逸氣然粲之匹也如粲之𥘉征登樓槐賦翰之玄猿漏巵貟扇橘賦雖張蔡不足過也然於它文未能稱是琳瑀之章表書記今之俊也應瑒和而不壯劉楨壯而不宻孔融體氣髙妙有過人者然不能持論理不勝辭至于雜以謿戲及其時有所善楊班之儔也常人貴逺賤近向聲背實又患闇於自見謂巳爲賢夫文本同而未異盖奏議冝雅書論冝理銘誄尚實詩賦欲麗此四科不同故能之者偏也唯通才能備其體文以氣爲主氣之清濁有體不可力強而致譬諸音樂曲度雖均節奏同撿至於引氣不齊巧拙有素雖在父兄不能以移子弟盖文章經國之大業不朽之盛}
  - {type: variant, offset: 50, length: 4, content: 防偽事資, WYG: 昇階文宗自吟送客西江詩吟罷益喜因錫以禁}
