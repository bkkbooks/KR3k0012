  - {type: variant, offset: 58, length: 17, content: 玉瑞漢世金竹末代從省代以書翰矣史記, krp: 英偉所著文時有小疵猶鄧林枯枝滄海流芥未易貶者又曰歐陽生曰張茂先潘正叔潘安仁文逺過二陸又曰張潘與二陸爲比不徒驟歩之間也歐陽曰二陸文詞源流不出俗撿又}
