  - {type: variant, offset: 2912, length: 0, content: '', SBCK: 齊王在東山飲酒投柸怒赫召魏収於前丘爲書曰朕歷數在射志清四海蕞尓􅁗隴乆阻風化混一之事期在今日必當訓旅誓衆天動雲臨朕巳下木汾流成舡晉地便當躬先將士入王璧徑掩長安梟彼兇首朕與}
