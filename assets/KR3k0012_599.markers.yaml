  - {type: 'tls:seg', offset: 34, content: '', id: KR3k0012_CHANT_599-1a.13}
  - {type: variant, offset: 34, length: 2, content: 付使, WYG: 體貌衰於下忽然與萬物遷化斯亦志士之大痛也融等已逝惟幹著論成一家之言傅子曰或問劉歆劉向孰賢}
  - {type: variant, offset: 37, length: 0, content: '', WYG: 子曰向才學俗而志忠歆才學通而}
  - {type: variant, offset: 38, length: 0, content: '', WYG: 邪詩之雅頌書之典謨文質足以相副玩之若近尋之益逺陳之若肆研之若隠浩浩乎其文章之淵府也李充翰林論曰潘安仁之為文也猶翔禽之羽毛衣被之綃縠抱朴子曰世謂王充一代英偉所著文時有小疵猶鄧林枯枝蒼海流芥未易貶者又曰歐陽生曰張茂先潘正叔潘安仁文逺過二陸或曰張潘與二陸為比不徒步驟之間也歐陽曰二陸文詞源流不出俗檢又曰秦時不覺無鼻之醜陽翟憎無癭之人陸君深疾文士放蕩流遁遂往不為虗誕之言非不能也陸君}
