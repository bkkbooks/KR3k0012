  - {type: punctuation, offset: 8, content: 「, id: KR3k0012_CHANT_599-bkkpn4}
  - {type: variant, offset: 8, length: 2, content: 符信, SBCK: 前中書􅁥盧柔學業優􅀷文藻華贍而寘與之方駕故丗號曰盧薛焉梁書曰何遜文章與劉孝綽並見重時謂之何劉梁元帝著論云詩多而能者沈約文少而能者謝眺何遜三國典畧曰劉逖字子長少好弋獵􅀐射後發憤讀書頗工詩詠行臺尚書席毗嘗嘲之曰君軰詞藻譬􅀂春榮湏􅁷之翫非宏材}
  - {type: variant, offset: 8, length: 2, content: 符信, WYG: 李華善屬文與蘭陵蕭頴士友善華舉進士時著含元殿賦萬餘言頴士見而賞之曰景福之上靈光之下華文體温麗少宏傑之氣頴士詞鋒俊發華自以所業過之疑其誣詞乃為祭古戰塲文燻汚之如故置於佛書之閣華與頴士因閱佛書得之華謂之曰此文何如頴士曰可矣華曰當代秉筆者誰及于此頴士曰君稍精思便可及此華愕然而服又曰元和詞人元稹論杜子美詩盖所謂上薄風騷下該沈宋言奪蘇李氣吞曹劉掩顔謝之孤高雜徐庾之流麗盡得古今之體勢而兼昔人之所獨專矣則詩人以來未有如子羙者是時山東人李白亦以文奇取稱時人謂之李杜予觀其壯浪縱恣擺去拘束模寫物象及樂府歌詩誠亦差肩於子美矣至若鋪陳終始排比聲韻大或千言次猶數百詞氣豪邁而風調清深属對律切而脫棄凡近則李尚不能厯其藩榦况堂奥乎魏文帝典論曰文人相輕自古而然傅毅之於班固伯仲之間耳而固小之與弟超書曰武仲以能屬文為蘭臺令史下筆不能自休夫人闇於自見而文非一體鮮能備善是以各以所長相輕所短俚語曰家有弊帚享之千金斯不自見之患}
  - {type: page-break, offset: 8, content: '', id: KR3k0012_WYG_599-3a, image: WYG0898/WYG0898-0447a.png}
  - {type: page-break, offset: 8, content: '', id: KR3k0012_WYG_599-3b, image: WYG0898/WYG0898-0447b.png}
  - {type: page-break, offset: 8, content: '', id: KR3k0012_WYG_599-4a, image: WYG0898/WYG0898-0447c.png}
  - {type: variant, offset: 8, length: 2, content: 符信, krp: 前中書監盧柔學業優深文藻華贍而寘與之方駕故丗號曰盧薛焉梁書曰何遜文章與劉孝綽並見重時謂之何劉梁元帝著論云詩多而能者沈約文少而能者謝眺何遜三國典畧曰劉逖字子長少好弋獵騎射後發憤讀書頗工詩詠行臺尚書席毗嘗嘲之曰君軰詞藻譬若春榮湏臾之翫非宏材}
