  body:
  - {type: variant, offset: 3, length: 1, content: 四, SBCK: 五}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 五品量文章嘆賞改易詆訶品量文章後周書薛寘傳曰前中書監盧柔學業優深文藻華贍而寘與之方駕故世號曰盧薛焉梁書曰何遜文章與劉孝綽並重時人謂之何劉梁元帝著論云詩多而能者沈約文少而能者謝眺何遜三國典畧曰劉逖字子長少好弋獵騎射後發憤讀書頗工詩詠行臺尚書席毗常嘲之曰君輩詞藻譬若春榮湏臾之翫非宏材也豈比吾徒千丈松柏常有風霜不可凋悴逖報之曰既有寒木又發春榮何如也毗笑曰可矣唐書曰富嘉謨雍州武功人也舉進士長安中累轉晉陽尉與新安吳少微友善同官先是文士撰碑頌皆以徐庾為宗氣調漸劣嘉謨與少微屬詞皆以經典為本時人欽慕之史體一變稱為吳富體嘉謨作雙龍泉頌千蠋谷頌少微撰崇福寺鍾銘詞最髙雅作者推重又曰張鷟字文成凡八登甲科員外郎貟半千謂人曰張子之文如青銅錢萬選萬中未聞退時時流重之目為青錢學士又曰楊炯華州華隂人少與綘州王勃范陽盧照隣東陽駱賓王皆以文詞知名海内稱為王楊盧駱亦號為}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_WYG_599-1b, image: WYG0898/WYG0898-0446b.png}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_WYG_599-2a, image: WYG0898/WYG0898-0446c.png}
