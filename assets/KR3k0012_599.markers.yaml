  - {type: page-break, offset: 46, content: '', id: KR3k0012_SBCK_599-2b}
  - {type: variant, offset: 46, length: 3, content: 孚也徵, WYG: 不易措言坐中解其所賜玉𢃄以遺敖深禮重之又曰馮定為太常少卿文宗每臨樂鄙鄭衛詔奉常習開元中霓裳羽衣舞以雲韶樂和之定統樂立於廷文宗以其端凝若植問其姓氏翰林學士李珏奏定之名文宗喜問曰豈非能為古章句者耶遂}
