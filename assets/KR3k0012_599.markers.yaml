  - {type: variant, offset: 105, length: 78, content: 王弟平原君夫人平原君數遺公子書請救於魏魏王使將軍晉鄙將十萬眾救趙實持兩端以觀望平原君使者相屬謂公子曰今邯鄲旦暮降秦魏救不至獨不憐公子姊也公子患之過侯嬴問屏人, krp: 改易}
  - {type: variant, offset: 106, length: 0, content: '', SBCK: 粲長於辭賦徐翰時有逸氣然粲之匹也如粲之􅀄征登樓槐賦翰之􅀇猿漏巵貟扇橘賦雖張蔡不足過也然於它文未能稱是琳瑀之章表書記今之俊也應瑒和而不壯劉楨壯而不宻孔融體氣髙妙有過人者然不能持論理不勝辭至于􅄂以謿戲及其時有所善楊班之儔也常人貴逺賤近向聲背實又患闇於自見謂巳爲賢夫文本同而未異盖奏議冝雅書論冝理銘誄尚實詩賦欲麗此四科不同故能之者偏也唯通才能備其體文以氣爲主氣之清濁有體不可力強而致譬諸音樂曲度雖均節奏同撿至於引氣不齊巧拙有素雖在父兄不能以移子}
  - {type: page-break, offset: 106, content: '', id: KR3k0012_SBCK_599-3a}
  - {type: variant, offset: 107, length: 3, content: 平原君, SBCK: 盖文章經國之大業不朽之盛事年壽有時而盡榮樂止乎其身二者必至之常期未􅀂文章之無窮是以古之作者􅀉身於翰墨見意於篇籍不假良史之辭不託飛馳之勢而聲名自傳於後故西伯幽而演易周旦顯而制禮不以隱約而不務不以康樂而加思}
  - {type: variant, offset: 111, length: 0, content: '', SBCK: 然則古}
