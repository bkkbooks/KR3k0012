  - {type: 'tls:seg', offset: 11, content: '', id: KR3k0012_CHANT_599-1a.6}
  - {type: variant, offset: 11, length: 2, content: 漢制, SBCK: 豈比吾徒千丈松樹常有風霜不可雕悴逖報之曰旣有寒木又發春榮何如也毗􅀏曰可矣唐書曰富嘉謨雍州武功人也舉進士長安中累轉晉陽尉與新安呉少微友善同官先是文士撰碑頌皆}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_SBCK_599-1b}
  - {type: variant, offset: 11, length: 1, content: 漢, WYG: 今之文人魯國孔融文舉廣陵陳琳孔璋山陽王粲仲宣北海徐幹偉長陳留阮瑀元瑜汝南應瑒德璉東平劉楨公幹斯七子者於學無所遺於辭無所假咸自以騁騄驥於千里仰齊足而並馳以此相服亦良難矣盖君子審己以度人故能免於斯累而作論文王粲長於辭賦徐幹時有齊氣然粲之匹也如粲之初征登樓槐賦幹之𤣥猿漏巵圎扇橘賦雖張蔡不過也然於他文未能稱是琳瑀之章表書記今之俊也應瑒和而不壯劉楨壯而不密孔融體氣高妙有過人者然不能持論理不勝辭至於雜以嘲戲及其時有所善楊班之儔也常人貴逺賤近向聲背實又患闇於自見謂己為賢夫文本同而末異盖奏議宜雅書論宜理銘誄尚實詩賦欲麗此四科不同故能之者偏也惟通才能備其體文以氣為主氣之清濁有體不可力强而致譬諸音樂曲度雖均節奏同檢至於引氣不齊巧拙有素雖在父兄不能以移子弟盖文章經國之大業不朽之盛事年壽有時而盡榮樂止乎其身二者必至之常期未若文章之無竆是以古之作者寄身於翰墨見意於篇籍不假良史之辭不託飛馳之勢而聲名自傳於後故西伯幽而演易周旦顯而}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_WYG_599-4b, image: WYG0898/WYG0898-0447d.png}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_WYG_599-5a, image: WYG0898/WYG0898-0448a.png}
