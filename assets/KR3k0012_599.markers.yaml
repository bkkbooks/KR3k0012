  - {type: variant, offset: 961, length: 281, content: 女楚昭王之夫人也昭王平王子昭王軫也昭王出遊留夫人漸臺而上之去漸臺水上之臺王聞江水大遣使者迎夫人忘持符使者至請夫人曰王召宮人皆以符令使者不持符妾不敢從使者而行使者反取反取符未還則大水至臺弛壞夫人流而死王曰唴乎夫守義死不為茍處約持信以成其貞乃號曰貞姜契券釋名曰券綣也相約束綣綣為限以別也大書中央破別之契刻也刻識其數也說文曰券契也別之書以刀刻其旁也故曰契也漢書曰高祖微時好酒及色從王媼武負貰酒時飲醉臥武負王媼見其上有怪高祖每酤留飲酒讎數倍及見怪歲竟兩家常折券棄責以簡牘為契券既不徵索故折毀之棄其所負也楚漢春秋曰高帝初侯者皆書券曰使黃河如帶泰山如礪漢有宗廟無絕世也東觀漢, WYG: 誚國朝傳}
  - {type: punctuation, offset: 962, content: ，, id: KR3k0012_CHANT_599-bkkpn240}
