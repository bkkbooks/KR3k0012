  - {type: variant, offset: 594, length: 357, content: 或以詔令如有姦人詐偽無由知覺愚以為軍旅尚興賊虜未殄徵兵郡國宜有重慎可立虎符以絕姦端昔魏之公子威傾鄰國猶假兵符以解趙圍若無如姬之仇則其功不顯事有煩而不可省費而不得已蓋謂此也書奏從之漢記曰延嘉五年長沙賊起攻沒蒼梧取銅虎符太守甘定剌史侯輔各奔出城又曰郭丹字少卿初之長安買符以入函谷關歎曰丹不乘使者車終不出關後果如本心赤眉欲立宗室以木札符書曰上將軍與兩空札置笥中大集會三老從事令劉盆子等三人居中央一人奉符以年次探之盆子最幼探得將軍三老等即皆稱臣隋書曰高祖頒青龍符於東方總管剌史西方以騶虞南方以朱雀北方以玄武又頒木魚符於總管剌史雌一雄一又頒木魚符於外官五品已上煬帝顧謂樊子蓋曰朕遣越王留守東都示以皇枝盤石社稷大事終以委公特宜持重甲五百人而後出此亦勇夫重閉之義也無賴不軌者便誅鋤之凡可以施行無勞形跡今為公別造玉麟符以代銅獸列女, SBCK: 文苑}
