  - {type: variant, offset: 1681, length: 871, content: 賜民此為君市義也魏子曰仲尼無券契於天下而德著於古今善惡明也王褒約僮曰蜀郡王子淵以事到湔上寡婦楊惠舍惠有夫時奴名便子淵倩奴行酤酒便拽大杖上家顛曰大夫買便時但要守冢不要為它人男子酤酒子淵大怒曰奴寧欲賣邪惠曰奴父訝人人無欲者子淵即決買券之奴復曰欲使皆上券不上券便不能為也子淵曰諾券文曰神爵三年正月十五日資中男子王子淵從成都安志里女子楊惠買亡夫時戶下髯奴便決賈萬五千奴當從百役使不得有二言晨起早掃食了洗滌浚渠縛落鉏園研陌杜地刻大枷屈竹作杷削治鹿盧居當穿臼縛帚栽芋鑿斗織履作鹿黏雀張鳥結網捕魚種薑養羊長育豚駒二月春分披椶種瓜作音昨瓠別茄披蔥焚槎發芋鷄鳴起舂魚落三重調治馬臚滌柸整案園中柭蒜斲蘇切脯飲酒裁得染脣漬口不得傾盃覆斗用錢推紡堊敗棕索綿席買席往來都洛當為婦女求脂澤轉出旁蹉牽犬販鵝武都買茶楊氏池中掘荷入市不得夷蹲旁臥惡言醜罵椶栟櫚也皮可為繩作廬也音鑿蜀土收芋皆窖藏之至春乃發馬戶水門也蜀每落流水養魚欲食乃取之訪堊白墡地蹉市名武都縣出名茶楊氏池出好多作刀矛持入益州貨易羊牛自教精慧不得癡愚持斧入山斷輮裁轅若有餘殘當作俎几木履及彘槃焚薪作炭石礨薄岸治舍蓋屋書削代牘日暮欲歸當送乾薪兩三束四月當披九月當穫十月拔豆掄夌窖芋南安拾栗採橘持車載輳多取蒲茅蓋作繩索兩墮所無為當編蔣織薄植種桃李梨柿柘桑三丈一樹八尺為行果類相從從橫相當果熟收歛不得吮嘗犬吠當起驚告鄰里棖門柱戶上樓擊鼓持楯曳矛還落三周勤心疾作不得遨遊奴老力索種莞織席事訖休息當舂一石夜半無事浣衣當白若私錢主給賓客奴不得有奸私事當關白奴不聽教當笞一百讀券文適訖辭窮詐索仡仡叩頭兩手自縛目淚下落鼻涕長一尺審如王大夫言不如早歸黃土陌丘蚓鑽額早知當爾王大夫酤酒真不敢作惡也輮車輞也疊石竹籠盛石以薄岸也豕槃豬槽也南安縣出摽掄麥種麥也十月民輸租載輳有利也漢時官不禁報怨民家皆作高樓致其上有急則上樓擊以告邑里令救助也石崇奴券曰余元康之際至在滎陽東住聞主人公言聲大高須臾出趣吾車曰公府當怪吾家嘵嘵邪中買得一惡羝奴名宜勤身長九尺餘力舉五千斤挽五石力弓百步射錢孔言讀書欲使便病日食三斗米不能柰何吾聞公賣不公喜便下絹百疋, WYG: ''}
