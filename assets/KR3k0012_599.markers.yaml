  - {type: variant, offset: 4, length: 1, content: 符, WYG: 傑炯聞之謂人曰吾愧在盧前恥居王後當時議者亦以王勃文章宏逸有絶人之跡固非常流所及炯與照隣可以企之盈川之言信矣張}
  - {type: variant, offset: 4, length: 1, content: 符, krp: 品}
