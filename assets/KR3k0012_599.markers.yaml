  - {type: variant, offset: 44, length: 1, content: 符, SBCK: 張子之文如青銅錢萬選萬中未聞退時時流重之目爲青錢學士楊盈川華州華隂人少與絳州王勃范陽盧照隣東陽駱賔王皆以文詞知名海内稱爲王楊盧駱亦號爲四傑烱聞之謂人曰吾愧在盧前恥居王後當時議}
  - {type: variant, offset: 44, length: 1, content: 符, WYG: 張載為濛汜池賦司𨽻校尉傳𤣥見而嗟嘆以車迎之言譚盡日為之延譽遂知名又曰張華字茂先阮籍見華鷦鷯賦許以王佐之才中書郎成公綏亦推華文義勝己又曰陸機弟雲嘗與機書云君苖見兄文輙欲燒其筆硯後葛洪著書稱機文猶𤣥圃之積玉無非夜光焉五河之吐流泉源如一焉其靡麗英銳漂逸亦一代之絶乎南史曰王筠字元禮善屬文沈約每見其文嘗咨嗟謂曰昔蔡伯喈見王仲宣曰吾家書籍悉當相與僕雖不敏請附斯言筠嘗以詩呈約報書嘆詠以為後進擅羙約又嘗謂筠叔志曰賢弟子文章之羙可謂後來獨秀又曰謝朓好奬人才㑹稽孔闓粗有文筆才未為時人所知孔稚圭嘗令草讓表以示朓朓嗟嘆良久手自折簡寫之謂稚珪曰是子聲名未立應共奬成無惜齒牙餘論其奬善如此吳均齊春秋曰丘靈鞠善屬文宋孝武殷貴妃亡靈鞠上挽歌詩云雲横廣階闇霜深高殿寒帝摘句咨嗟賞之即轉為新安王北中郎叅軍唐書曰封敖為翰林學士拜中書舍人敖搆思敏速語近而理勝不務竒澁武宗深重之嘗草賜陣傷邉將詔警句云傷居爾體痛在朕躬帝覧而善之賜之宫錦李德裕在相位定策破廻鶻誅劉稹議兵之際同列或有不可之言惟德裕籌計指畫竟立奇功武宗賞之封衛國公守太尉其制語有遏横議於風波定奇謀於掌握逆稹盗兵壼闗晝鏁造膝嘉話開懐静思意皆我同言不他惑制出敖往慶之德裕口誦此數句撫敖曰陸生有言所恨文不逮意如卿此語秉筆}
