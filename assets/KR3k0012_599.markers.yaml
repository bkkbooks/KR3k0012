  - {type: variant, offset: 92, length: 0, content: '', krp: 定統樂立於庭文宗以其端凝若植問其姓氏翰林學士李玨奏定之名文宗喜問曰豈非能爲古章句者耶遂召昇階文宗自吟送客西江詩吟罷益喜因錫以禁中瑞錦仍令大録所著古體詩以獻丗說曰孫興公作天台賦成以示范榮期曰卿試擲置地要作金石之聲范曰恐}
  - {type: variant, offset: 93, length: 11, content: 無忌號信陵君其姊為趙惠, SBCK: 審巳以度人故能免於斯累而作論}
  - {type: variant, offset: 93, length: 0, content: '', krp: 之金石非宫啇中聲然毎至佳句輙云應是我軰語又曰左思字太冲作三都賦時人互有譏訾思意不甚愜後示張華曰此二京可三然君文未重於丗冝以示髙名之士思乃請序於皇甫謐謐見之嗟嘆遂爲作序於是先相訾者莫不歛袵讃述焉又曰庾仲𥘉作楊都賦成呈庾亮以親族之懷大爲其名價云可三二京四三都於是人人競冩都下𥿄爲之貴顔氏家訓劉孝綽當時旣有重名}
  - {type: variant, offset: 94, length: 47, content: 忌號信陵君其姊為趙惠文王弟平原君夫人平原君數遺公子書請救於魏魏王使將軍晉鄙將十萬眾救趙實持兩端, WYG: 所與讓唯服謝朓常}
