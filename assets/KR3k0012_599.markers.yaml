  - {type: variant, offset: 46, length: 1, content: 孚, SBCK: 亦以爲然其後崔融李嶠張說皆爲一時宗匠崔李甞曰王勃文章宏逸有絶塵之跡固非常流所及炯與照隣則可企而致盈川之言不信矣張􅀃謂人曰楊盈川之文如懸河注水酌之不竭旣優於盧亦不减王耻居王後則信然愧在盧前爲誤矣李華善屬文與蘭陵蕭潁士友善華舉進士時著含元殿賦萬餘言潁士見而賞之曰景福之上靈光之下華文體温麗少宏傑之氣潁士詞鋒俊發華自以所業過之乃爲􅀕古戰場文燻汚之如故置於佛書之閣華與潁士因閱佛書得之華謂之曰此文何如潁士曰可矣華曰當代秉筆者誰及於此潁士曰君稍加精思便可及此華愕然又曰元和詞人元稹論杜子美之詩盖所謂上薄風騷下該沈宋古奪􅂫李氣呑曹劉掩顔謝之􅀌髙雜徐􅁃之流麗盡得古今之體勢而兼人之所獨專矣則詩人巳來未有如子美者是時山東人李白亦以文竒取稱時人謂之李杜予觀其壯浪縱恣擺去拘束模冩物象及樂府歌詩誠亦􅏔肩於子美矣至􅀂鋪陳終始排比聲韻大或千言次猶數百詞氣豪邁而風調清深屬對律切而脫弃凢近則李尚不能歷其藩翰况堂奥乎魏文帝典論曰文人相輕自古而然傅毅之於班固伯仲之間耳而固小之與弟超書曰武仲以能屬文爲蘭臺令史下筆不能自休夫人善於此自見而文非一體鮮能備善是以各以所長相輕所短矣里諺曰家有弊帚享之千金斯不自見之患}
