  - {type: variant, offset: 5, length: 1, content: 說, krp: 量}
  - {type: substitution, offset: 5, original: 說, replacement: 説, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19811}}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 謂人曰楊盈川之}
  - {type: punctuation, offset: 7, content: 》, id: KR3k0012_CHANT_599-bkkpn2}
  - {type: variant, offset: 7, length: 0, content: '', SBCK: 章歎賞改定詆訶品量文章後周書薛寘傳}
  - {type: variant, offset: 7, length: 0, content: '', WYG: 如懸河注水酌之不竭既優於盧亦不減王恥居王後則信然愧在盧前謙也又}
  - {type: variant, offset: 7, length: 0, content: '', krp: 章歎賞改定詆訶品量文章後周書薛寘傳}
  - {type: punctuation, offset: 8, content: ：, id: KR3k0012_CHANT_599-bkkpn3}
