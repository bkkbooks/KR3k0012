  - {type: variant, offset: 368, length: 5, content: 二年九月初, SBCK: 崩從叔尚書令珣爲哀䇿出夲示誕曰猶少叙節物一句誕便攬筆益之接其秋冬代變云霜繁廣除風回髙殿詢歎美因而用之齊書曰張融作海賦文詞詭激獨}
