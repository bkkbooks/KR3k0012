  - {type: variant, offset: 1300, length: 352, content: 契債家聞者皆慚爭往償之諸子從勑竟不肯受晉書曰諸王官司徒吏應給職使者每歲先計偕文書上道五十日宣勑使使各手書書定見破券諸送迎者所受郡別校數寫朱券為簿集上宋書曰顧綽覬之子也有私財甚豐鄉里士庶多負債覬之禁不能止及覬之為吳郡太守出文券一大廚悉令焚之宣言遠近皆不須還綽懊歎彌日唐書曰太宗時東謝渠帥來朝東謝者南蠻之別種也在黔安之東地方千里其俗無文書刻木為約又曰羅讓為福建觀察使兼御史中丞甚著仁惠有以女奴遺讓者讓問其所因者曰本某處家人兄姊九人皆為官所賣其留者唯老母耳讓慘然焚其券書以女奴歸其母夢書曰券契為有信夢得券契有信士也文心雕龍曰契者結也上古純質結繩執契今羌胡徵數負販其遺風也又曰券者束也明白約束約束以備情偽自形半分故周稱判書古有鐵券以堅信誓王褒髯奴則券之諧也戰國策曰孟嘗君使馮驩收責於薛曰責畢市吾家所寡者馮驩召民畢, WYG: ''}
