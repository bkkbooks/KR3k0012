  - {type: 'tls:seg', offset: 162, content: '', id: KR3k0012_CHANT_599-3a.14}
  - {type: variant, offset: 165, length: 0, content: '', SBCK: 徒驟歩之間也歐陽曰二陸文詞源流不出俗撿又曰􅁗時不􅁴無鼻之醜陽翟憎無癭之人陸君深疾文士放蕩流遁遂往不爲虚誕之言非不能也陸君之文猶玄圃之積玉無非夜光也吾生之不別陸文猶侏儒測海非所長也歎賞晉書曰張載爲濛汜池賦司􅈻校尉傅􅀇見而嗟歎以車迎之言譚盡日爲之延譽遂知名又曰張華字茂先阮籍見華鷦鷯賦許以王佐之才中書郎成公綏亦推華文義勝巳陸機弟雲嘗與機書云君苗見兄文輙欲燒其筆硯後􅁑洪著書稱機文猶玄圃之積玉無非夜光焉五河之吐流源如一焉其􅒮麗妍贍英銳源逸亦一代之絶乎􅀯史曰王筠字元禮善屬文沈約每見其文常咨嗟謂曰昔蔡伯喈見王仲宣曰吾家書籍悉當相與㒒雖不敏請附斯言筠嘗以詩呈約報書歎詠以爲後進擅美約又嘗謂筠叔志曰賢弟子文章之美可謂後來獨秀又曰謝眺好奬人才㑹稽孔闓粗有文筆才未爲時人所知孔稚珪嘗令草讓表以示眺眺嗟吟良乆手自折簡冩之謂珪曰士子聲名未立應共奬成無惜齒牙餘論其好善如此吴均齊春秋曰丘靈鞠善屬文宋孝武殷貴妃亡靈鞠上挽歌詩云雲横廣陌闇霜深髙殿寒帝摘句咨嗟賞之即轉爲新安王北平中郎中叅軍唐書曰封敖爲翰林學士拜中書舎人敖搆思敏速語近而理勝不務竒澁武宗深重之嘗草賜陣傷邊將詔警句云傷居尓體痛在朕躬帝覽而善之賜之宫錦李德􅁉在相位定䇿破廽鶻誅劉稹議兵之際同列或有不可之言唯德􅁉籌計相畫竟立竒功武宗賞之封衛國公守太尉其制語有遏横議於風波定竒謀於掌握逆稹盗兵壷􅀜晝鏁造􅂰嘉話開懷静思意皆我同言不它惑制出敖往慶之德􅁉口誦此數句撫敖曰陸生有言所恨文不迨意如卿此語秉筆者不易措言坐中解其所賜玉帶以遺敖深禮重之又曰馮定爲太常少卿文宗毎臨樂鄙鄭衛詔奉常習開元中霓裳羽衣舞以雲韶樂和之定統樂立於庭文宗以其端凝􅀂植問其姓氏翰林學士李玨奏定之名文宗喜問曰豈非能爲古章句者耶遂召昇階文宗自吟送客西江詩吟罷益喜因錫以禁中瑞錦仍令大録所著古體詩以獻丗􅀃曰孫興公作天台賦成以示范榮期曰卿試擲置地要作金石之聲范曰恐子之金石非宫啇中聲然毎}
