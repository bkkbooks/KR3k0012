  - {type: variant, offset: 2740, length: 655, content: 一臨卒取其貸錢物書券自於目前焚之曰吾不能以德教子孫不欲復以賄利累之及貸者還錢子孫不受曰不能光顯先人豈可傷其義乎鐵券東觀漢記曰桓帝延熹八年妖賊蓋登稱太皇帝有壁二十珪五鐵券十一後伏誅晉中興書曰初閔帝在關中與氐羗破鐵券約不役使又曰應詹督天門等郡天門武陵谿蠻並反詹誅其魁帥餘皆當降自元康已來政令不洽谿蠻懷化數郡無憂其後州郡所有敗唯詹獨保之一境三國典略曰梁任果降同果字靜鸞南安人也世為方隅豪族仕於江左志在立功太祖嘉其遠來待以優禮後除始州剌史封樂安公賜以鐵券聽世傳襲又曰侯景圍臺城陳昕說范桃捧令率所領二千人襲殺王偉宋子仙帶甲歸降桃捧許之使昕夜入官城密啟梁主梁主大悅命使納之並鐫銀券賜桃捧曰事定日當封汝為河南王即有景眾并給金帛女樂以報元功而太子恐其詭詐猶預不決隋書曰李穆累以軍功進爵為伯從太祖擊齊師於郎山太祖臨陣墜馬穆突圍而進以馬策擊太祖而詈之授以從倚潰圍俱出賊見其輕侮謂太祖非貴人遂緩之以故得免既而與穆相對泣顧謂左右曰成事我者其此人乎即令撫慰關中所至剋定擢授武衛將軍賜以鐵券恕其十死又曰越王侗立以段達為納言右翊衛大將軍攝禮部尚書王世充亦納言左翊衛大將軍攝吏部尚書元文都內史令左驍衛大將軍盧楚亦內史令皇甫無逸兵部尚書右武衛大將軍郭文懿內史侍郎長文黃門侍郎委以機務為金書鐵券藏之宮掖于時洛陽稱段達等為七貴唐書曰李懷光既解奉天之圍不獲朝見因大怒德宗遣中使諭旨加太尉賜鐵券懷光怒甚投券於地曰人臣反則賜鐵券今賜懷光是使反也上遂幸也梁洋過所釋名曰過所至關津以示之或曰傳傳也轉移所在識以為信也史記曰甯成為右內史外戚多毀成之短抵罪髡鉗是時, WYG: ''}
