  - {type: variant, offset: 366, length: 0, content: '', krp: 倪寛善屬}
  - {type: variant, offset: 367, length: 0, content: '', SBCK: 張湯爲廷尉廷尉府盡用文史法律之吏而寛以傳生在其間見謂不習事不署曹除爲從吏之北地租畜數年還至府上畜薄㑹廷尉時疑奏巳再却矣􅁺吏莫知所爲寛言其意􅁺吏因使寛爲奏奏成讀之皆服以白廷尉張湯湯大驚召寛與語乃部其材以爲􅁺上寛所作奏郎時得可意異曰湯見上問曰前奏非俗吏所及誰爲之者湯言兒寛上曰吾固聞之乆矣湯由是嚮學以寛爲奏讞􅁺晉書曰􅀽宏從桓温北伐又作北征賦皆其文之髙者嘗與王珣伏滔讀其北征賦至聞所傳於相傳云獲麟於此野但靈物以瑞德奚受體於虞者䆒尼父之慟哭似實慟而非假豈一性之足傷乃致傷於天下至此便改韻珣云此賦必傳千載無容率尓今於天下之後便移韻結事然於冩送之致似未爲盡桓温曰卿思益之宏應聲曰感不絶於予心愬流風而獨冩珣諷味乆之謂滔曰當今文章之美當共推此生宋書曰王誕字茂世有才藻晉孝武}
