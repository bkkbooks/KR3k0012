  - {type: variant, offset: 1078, length: 263, content: 貞乃號曰貞姜契券釋名曰券綣也相約束綣綣為限以別也大書中央破別之契刻也刻識其數也說文曰券契也別之書以刀刻其旁也故曰契也漢書曰高祖微時好酒及色從王媼武負貰酒時飲醉臥武負王媼見其上有怪高祖每酤留飲酒讎數倍及見怪歲竟兩家常折券棄責以簡牘為契券既不徵索故折毀之棄其所負也楚漢春秋曰高帝初侯者皆書券曰使黃河如帶泰山如礪漢有宗廟無絕世也東觀漢記曰樊重字君雲南陽人家素富外孫何氏兄弟爭財重恥之以田二頃解其忿縣中稱美推為三老年八十餘終其所假貸人間數百萬遣令焚削文契債家聞者皆慚爭往償之諸子從勑竟不肯受晉書曰諸王官司徒吏應給職使者每歲先計偕文書上, SBCK: ''}
