  - {type: variant, offset: 2209, length: 337, content: 不容也其將自反子姑待之三旬果自歸孟氏武伯將執之訪於夫子夫子曰無也子之於臣禮意不至是以去子今其反罪以反除又何執焉子脩禮以待之則臣去子將安往哉武伯乃止孟子曰孟子見齊宣王曰所謂故國者世臣之謂也世臣先世舊國也王者當有累世脩德之臣常能輔其君以道也王無親臣矣今王無可親任之臣昔者所進今日不知其亡也言王取人不詳審往日之所知臣今日為惡當誅亡王無知之王曰吾何以識其不才而捨之曰國君進賢如不得已將使卑踰尊踈踰戚可不慎歟言國君欲進用當留意考擇如使忽言不精心意如不得已而取備官則使卑親踈相踰也又曰景子曰內則父子外則君臣人之大倫也父子主恩君臣主敬又曰故將大有為之君必有所不召之臣欲有謀焉則就之故湯之於伊尹學焉而後臣之故不勞而王桓公之於管仲學焉而後臣之故不勞而霸又曰欲為君盡君道欲為臣盡臣道二者皆法堯舜, SBCK: 苟}
