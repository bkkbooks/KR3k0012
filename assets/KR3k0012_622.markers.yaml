  - {type: variant, offset: 3267, length: 302, content: 姓實倉廩使民人各得其所令尹子西在此奉珪璋使諸侯解忿狷之難交兩國之忻使無兵革憂大宗子敖在此守封疆謹境界不侵鄰國鄰國亦不見侵葉公子高在此理師徒正兵戎以當強敵提桴鼓以動百萬之眾使赴湯火蹈白刃出萬死不顧一生司馬子反在此若懷霸王之餘義撮治亂之餘風昭奚恤在此唯大國之所觀秦使者瞿然無以對反言於秦曰楚多賢臣未可謀也遂不敢伐又曰周舍事趙簡子立門三日三夜簡子使人出問之夫子將何以令我周舍曰臣願為諤諤臣墨筆操牘隨君之後司君之過而書之日有記也月有効也歲有約也簡子悅之賈誼新書曰智足以謀國事行足以為人師仁足以為上下之聲國有法則守之君有難則死之謂之大臣也古詩為君既不易為臣良獨難應璩百一詩曰茫茫九州內莫非帝者民民有忠信行莫非帝者臣, SBCK: 二十二}
