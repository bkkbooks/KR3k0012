  - {type: variant, offset: 218, length: 1, content: 公, SBCK: 外而形體不見􅀂日月星辰之中是故夫政必本於天殽以降命降下也殽天之氣以下教今天有運移之期隂陽之節也命降于社之謂殽地教謂令由社下者也社土地之主也周禮土㑹之法有五地之物生也降於祖廟之謂仁義謂教令由社下者大傳}
  - {type: variant, offset: 218, length: 1, content: 公, WYG: 天殽以降命降下也殽天之氣以下教令天有運移之期隂陽之節也命降于社之謂殽地謂教令由社下者也社土地之主也周里土㑹之法有五土之物生也降于祖廟之謂仁義謂教令由廟下者也大傳}
  - {type: variant, offset: 218, length: 1, content: 公, krp: 外而形體不見若日月星辰之中是故夫政必本於天殽以降命降下也殽天之氣以下教今天有運移之期隂陽之節也命降于社之謂殽地教謂令由社下者也社土地之主也周禮土㑹之法有五地之物生也降於祖廟之謂仁義謂教令由社下者大傳}
