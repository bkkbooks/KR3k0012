  - {type: variant, offset: 215, length: 0, content: '', SBCK: 天官小宰之職曰正歳帥治官之屬而觀治象之法徇以木鐸曰不用灋者國有常刑正歳謂夏之正月得四時之正以岀教令者審也古者􅀅有新令必奮木鐸以警衆使明聽之木鐸木舌也文事奮木鐸武事奮金鐸禮曰}
  - {type: variant, offset: 215, length: 0, content: '', WYG: 天官小宰之職曰正嵗帥治之官屬而觀治象之法徇以木鐸曰不用法者國有常刑正嵗謂夏之正月得四時之正以出政令者審也古者将有新令必奮木鐸以警衆使明聴之木鐸木舌也文事奮木鐸武事奮金鐸禮曰}
  - {type: variant, offset: 215, length: 0, content: '', krp: 天官小宰之職曰正歳帥治官之屬而觀治象之法徇以木鐸曰不用灋者國有常刑正歳謂夏之正月得四時之正以岀教令者審也古者将有新令必奮木鐸以警衆使明聽之木鐸木舌也文事奮木鐸武事奮金鐸禮曰}
  - {type: variant, offset: 216, length: 1, content: 仕, SBCK: 政者君之所以藏身也藏謂輝光}
