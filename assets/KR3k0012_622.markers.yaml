  - {type: variant, offset: 84, length: 128, content: 士不二心之臣保乂王家用端命于上帝詩曰進厥虎臣闕如虓虎闕呼檻切禮曰衛有大夫曰柳莊寢疾公曰若疾亟雖當祭必告公再拜稽首請於尸曰有臣柳莊也者非寡人之臣社稷之臣也聞之死請往不釋服而往遂以檖之又曰為人臣者殺其身有益於君則為之況於其身以善其君乎周公優為之于讀為迂迂廣也大, SBCK: 鄭司農云三載考績是}
