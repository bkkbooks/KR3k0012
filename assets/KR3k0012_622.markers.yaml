  - {type: variant, offset: 593, length: 1366, content: 記私相親也故大臣不可不敬也是民之表也邇臣不可不慎也是民之道也民之道言民循從也君毋以小謀大毋以遠言近毋以內圖外則大臣不怨邇臣不疾而遠臣不蔽矣左傳曰石碏純臣也怨州吁而厚與焉大義滅親其是之謂乎又曰晉惠公卒懷公命無從亡人期朞而不至無赦狐突之子毛及偃從重耳在秦弗召懷公執狐突曰子來則免對曰子之能仕父教之忠古之制也策名委質貳乃辟也今臣之子名在重耳有年數矣若又召之教之貳也父教子貳何以事君刑之不濫君之明也臣之願也淫刑以逞誰則無罪乃殺之又曰秦醫和謂晉侯曰良臣將死天命不祐趙孟曰誰當良臣對曰主是謂矣主相晉國於今八年晉國無亂諸侯無闕可謂良矣和聞之國之大臣榮其寵祿任其大節有菑禍興而無改焉必受其咎又曰陳無宇謂楚王曰天子經略諸侯正封封略之內何非君土食土之毛誰非君臣毛草也故詩曰普天之下莫非王土率土之濱莫非王臣詩小雅濱涯也天有十日甲至癸人有十等下所以事上上所以共神也故王臣公公臣大夫大夫臣士士臣皁皁臣輿輿臣隸隸臣僚僚臣僕僕臣臺馬有圉牛有牧以待百事春秋說曰正氣為帝間氣為臣臣之論語曰舜有臣五人而天下治武王曰予有亂臣十人亂治也又曰季子然問仲由冉求可謂大臣與子曰所謂大臣者以道事君不可則止今由與求也可謂具臣矣言備官數而已孝經曰君子之事上也進思盡忠退思補過將順其美匡救其惡故上下能相親也漢書曰張良未嘗持兵為將常為畫策臣又曰絳侯周勃為丞相罷趍出意甚得上禮之恭常目送之袁盎進曰丞相何如人也上曰社稷臣盎曰絳侯所謂功臣非社稷臣社稷臣者主存與存主亡與亡又曰上居禁中召周亞夫賜食因趍出上目送之曰此怏怏非幼主臣也又曰辛慶忌居處恭儉食飲被服尤節約然性好輿馬號為鮮明惟是為奢荀悅漢記曰臣有六有王臣有良臣有直臣有具臣有嬖臣有佞臣以道事君匪躬之故達節通方立功興化是謂王臣忠順不失夙夜匪懈循理愛和以輔上德是謂良臣犯顏拂意砥矢弗撓直諫遏非不避死罪是為直臣奉法守職無能往來是謂具臣便僻茍容順意從諛是謂嬖臣傾險讒回誣上惑下專權檀寵唯利是務是謂佞臣或有君而無臣或有臣而無君用善則治用惡則亂難則交爭故明主慎所用焉又東觀記曰祭遵死後每至朝會上常歎曰安得憂國奉公之臣如祭征虜者沈約宋書曰謝弘微為鎮西諮議參軍太祖即位為黃門侍郎與王華王曇首殷景仁劉湛等號曰五臣遷尚書吏部郎唐書曰或有言魏徵阿黨親戚者帝使御史大夫溫彥博按驗無狀彥博曰徵為人臣須存形跡不能遠避嫌疑遂招此謗帝令彥博讓徵曰自今已後不得不存形跡它日徵入奏曰臣聞君臣叶契義同一體不存公道唯事形跡若君臣上下同遵此路則邦之興喪或未可知願陛下使臣為良臣勿使臣為忠臣帝曰忠良有異乎徵曰良臣稷契皋陶是也忠臣龍逢比干是也良臣使身獲美名君受顯號子孫傳世福祿無疆忠臣身受誅夷君陷大惡家國並喪空有其名以此而言相去遠矣又曰盧懷慎臨終遺表曰宋璟立性公直執心貞固文學足以經務識略足以佐時動惟直道行不茍合聞諸朝野之說實為社稷之臣晏子春秋曰景公問於晏子曰忠臣之事君何若對曰有難不死出亡不送公不說曰君裂地而富之䟽爵而貴之有難不死出亡不送其說何也對曰言而見用終身無難臣何死焉諫而見從終身不出臣何送焉孔藂子曰夫為人臣見非而不爭以陷主於危亡罪之大者也人主疾臣之弼己而惡之資臣以箕子比干之忠惑之大者也又曰魏王問何如可謂大臣子高荅曰大臣則必取眾人之選能犯顏諫爭公正無私者陳計事成主裁其賞事敗臣執其咎主任之而無疑臣當之而弗避君惣其契臣行其義然君不猜其人臣不隱於其君故動無過計舉無敗事是以臣主並有德, SBCK: 政兄弟}
