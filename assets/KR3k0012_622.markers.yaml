  - {type: variant, offset: 299, length: 0, content: '', SBCK: 政教所以明賞罰也又曰聖人南面聽天下所且先者五民不得與焉一曰治親二曰報功三曰舉賢四曰使能五曰存愛五者一得於天下民無不足無不贍者五者一物紕繆民莫得其死物猶事也紕錯也五事得則民足一事夫則民不得其死明政之難大戴禮曰曽子曰敢問不費不勞以爲明乎孔子愀然􅀭眉曰參汝以明主爲勞乎古者舜左禹而右臯陶不下席而天下治左氏傳曰宣子於是乎始爲國政宣子趙盾制事典正法罪辟獄刑辟猶理也董逋逃由質要治舊洿夲秩禮續常職出滯淹旣成以授太傅陽子與大師賈佗使行諸晉國以爲常法又曰晉悼公即位于朝始命百官始爲改施舎巳責施恩惠舍勞役逋止責振廢滯起舊德匡乏困救災患亦救也禁淫慝薄賦歛宥罪戾宥寛也節器用節省也時用民使民以時欲無犯時不縱私欲又曰季札聘于鄭謂子産曰鄭之執政者侈難􅀅至矣政必及子子爲政愼之以禮不然鄭國將敗又曰鄭子皮授子産使都鄙有分國都及邊鄙車服尊卑各有分部上下有服公卿大夫服不相踰田有封洫廬井有伍大人之忠儉者謂卿大夫從而與之㤗侈者因而斃之從政一年輿人誦之曰取我衣冠而禇之禇蓄也奢侈者畏法故畜藏取我田疇而伍之孰殺子産吾其與之及三年又誦之曰我有子弟子産誨之我有田疇子産殖之殖生也子産而死誰其嗣之嗣續也傳言鄭所以興又曰禮之於政如熱之有濯以救􅀬何患之有又曰鄭人游于郷校以論執政論其得失然明謂子産曰毁郷校如何子産曰何爲夫人朝夕退而游焉以議執政之善否其所善者吾則行之其所惡者吾則改之是吾帥也􅀂之何毀之又曰子皮欲使尹何爲邑子産曰少未知可否子皮曰愿吾愛之不吾叛也使夫徃而學焉夫亦愈知治矣子産曰不可人之愛人求利之也今吾子愛人則以政以政與之猶未能操刀而使割也其傷實多子之愛人傷之而巳其誰敢求愛於子子於鄭國棟折榱崩僑將厭焉敢不盡言子有羙錦不使人學製焉其爲美錦不亦多乎僑聞學而後入政未聞以政學者也田獵射御貫則能􅀗禽貫習也􅀂未甞登車射御敗績厭覆是懼何暇思􅀗子皮曰善哉學者也􅀂果行此必有所害又曰周任有言曰爲政者不賞私勞不罰私怨詩云有覺德行四國順之詩大雅􅁴直也言德行直則四方順從之又曰鄭子産有疾謂子太叔曰我死子必爲政唯有德者能以寛服民其次莫如猛火烈民望而畏之故鮮死焉水懦弱民狎而翫之則多死焉故寛難難以治疾數月而卒太叔爲政不忍猛而寛鄭國多盗聚大於雚蒲之澤雚蒲澤名也於澤中刼人音符浦太叔悔之曰吾早從夫子不及此興徒兵以攻蒲之盗盡殺之盗少止仲尼曰善哉政寛則民慢慢則糺之以猛猛則民殘殘則施之以寛寛以濟猛猛以濟寛政是以和詩曰民亦勞止汔可小康惠此中國以綏四方施之以寛也書大禹謨日后克艱厥后臣克艱厥臣政乃乂􅀺民敏德敏疾也能知爲君難爲臣不易則其政治而衆民皆疾修德禹曰於帝念哉德惟善政政在養民難而言念重其言爲政以德則民懷之水火金木土􅂖惟修言念民之本在先修六府正德利用厚生惟和正德以率下利用以阜財厚生以養民三者和所謂善政九功惟叙九叙惟歌言六府三事之功有次叙皆可歌樂乃德政之所致戒之用休董之用威勸之以九歌俾勿壊言善政之道美以戎之威以督之歌以􅂆之使政勿壞在此三者而巳又太甲下曰德惟治否德亂與治同道罔不興與亂同事罔不亡言安危在所念治亂在所法終始愼厥與惟明明后明愼其所興治亂之機則爲明王明君又盤庚上曰古我先王亦惟圖任舊人共政先王謀任乆老成人共治其政王播告之修不匿厥指王布告人以所修之政不匿其指王用丕欽罔有逸言民用丕變王用大敬其政教無有逸豫之言民用大變從化又洪範曰乂用三德治民必用剛柔正直之三德一曰正直二曰剛克剛能立事三曰柔克和柔能治三者皆德平康正直平出安用正直治之疆弗友剛克友順也丗疆禦不順以剛能治之爕友柔克􅝂和也丗和順以柔能治之沈潜剛克沈潜謂地雖柔亦有剛能出金石髙明柔克髙明謂天言天爲剛德亦有柔克不干四時喻臣當執剛以正君君亦當執柔以納臣又立政曰周公􅀂曰拜手稽首告嗣天子王矣用咸戒于王曰王左右常伯常任凖人綴衣虎賁周公用王所立政}
