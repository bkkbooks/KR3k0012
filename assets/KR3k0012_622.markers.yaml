  - {type: variant, offset: 2679, length: 399, content: 得志則不可王曰皆如西門豹之為人臣也史起對曰魏氏之行田也以百畝鄴獨二百畝是田惡也漳水在旁而西門豹不知用是其愚也又曰柱厲叔事莒敖公自以為不知而去居於海上莒敖公有難柱厲叔辭其友而往死之其友曰子自以為不知故去今又往死之是知與不知無異別也柱厲叔曰不然自以為不知故去今死而不去是果知我也吾將死之以醜後世之人不知其臣者也所以激君人者之行而厲人臣之節也行激節厲忠臣幸於得察忠臣察則君道固矣淮南子曰周公事文王行無專制事無由已身若不勝衣言若不出口有所奉持於前洞洞囑囑如不能如將失之可謂能子矣及繼文武之業履天子之國則平夷狄之亂誅管蔡之罪無所顧問威動天地聲懾海內可謂能武矣成王長北面致政委質而臣事之請而後行無擅恣之意無矜伐之色可謂能臣矣說苑曰人臣之術隨順復命無所敢專議不茍合位不茍尊必有益於國必有補於君故其身尊而子孫保之臣之行有六邪六正行六正則榮犯六邪則辱賢臣處六正之道不行六邪之術故上安而下治生則見樂死則見思此人臣之本也, SBCK: 來}
