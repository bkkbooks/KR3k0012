  - {type: variant, offset: 298, length: 0, content: '', SBCK: 曰政之不行也教之不成也爵禄不足勸也刑罰不足耻也故上不可以褻刑而輕爵}
  - {type: variant, offset: 298, length: 0, content: '', WYG: 曰政之不行也教之不成也爵禄不足勸也刑罰不足恥也故上不可以䙝刑而輕爵又曰聖人南面而聽天下所且先者五民不與焉一曰治親二曰報功三曰舉賢四曰使能五曰存愛五者一得于天下民無不足無不贍者五者一物紕繆民莫得其死物猶事也紕錯也五事得則民足一事失則民不得其死大戴禮曰曽子曰敢問不費不勞可以為明乎孔子愀然揚眉曰參汝以明主為勞乎古者舜左禹而右臯陶不下席而天下治左氏傳曰宣子于事乎始為國政宣子趙盾制事典正法罪辟刑獄辟猶理也董逋逃由質要治舊洿本秩禮續常職出滯淹既成以授太傅楊子與太師賈佗使行諸晉國以為常法又曰晉悼公即位于朝始命百官始為政施舍己責施恩惠舍勞役止逋責振廢滯起舊徳匡乏困救灾患匡亦救也禁淫慝薄賦斂宥囚戾宥寛也節器用節省也時用民使民以時欲無犯時不縱私欲又曰季札聘于鄭謂子産曰鄭之執政者侈難将至矣政必及子子為政慎之以禮不然鄭國将敗又曰鄭子皮授子産政子産使都鄙有章國都及邊鄙車服尊卑各有分部上下有服公卿大夫服不相踰田有封洫廬井有伍大人之忠儉者謂卿大夫從而與之泰侈者因而斃之從政一年輿人誦之曰取我衣冠而楮之楮蓄也奢侈者畏法故當藏取我田疇而伍之孰殺子産吾其與之及三年又誦之曰我有子弟子産誨之我有田疇子産殖之殖生也子産而死誰其嗣之嗣續也又曰鄭人游于鄉校以論執政論其得失也然明謂子産曰毁鄉校如何子産曰何為夫人朝夕退而游焉以議執政之善否其所善者吾則行之其所惡者吾則改之是吾師也若之何毁之又曰子皮欲使尹何為邑子産曰少未知可否子皮曰愿吾愛之不吾叛也使夫徃而學焉夫亦愈知治矣子産曰不可人之愛人求利之也今吾子愛人則以政以政與之猶未能操刀而使割也其傷實多子之愛人傷之而已其誰敢求愛於子子於鄭國棟也棟折榱崩僑将厭焉敢不盡}
