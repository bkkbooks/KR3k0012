  - {type: 'tls:seg', offset: 300, content: '', id: KR3k0012_CHANT_622-8a.4}
  - {type: variant, offset: 301, length: 0, content: '', SBCK: 皆戒於王曰常所長事常所委任謂三公六卿凖人平法謂士官綴衣掌衣服虎賁以武力事王皆左右近臣冝得其人周公曰嗚呼休兹知恤鮮哉歎此五者立政之本知憂得其人者少古之人迪唯有夏乃有室大競􅈼俊尊上帝古之人道惟有夏禹之時乃有卿大夫室家大強猶乃招呼賢俊與共尊事上帝迪知忱恂于九德之行禹之臣蹈知成信於九德之行謂賢智大臣九德臯陶所謀也乃敢告教厥后曰拜手稽首后矣曰宅乃事宅乃牧宅乃凖兹惟右矣知九德之臣乃敢告教其}
  - {type: page-break, offset: 301, content: '', id: KR3k0012_SBCK_622-5b}
  - {type: variant, offset: 301, length: 0, content: '', WYG: 皆戒于王曰常所長事常所委任謂三公六卿準人平法謂士官綴衣掌衣服虎賁以武力事王皆左右近臣宜得其人周公曰嗚呼休兹知恤鮮哉嘆此五者立政之本知憂得其人者少古之人迪唯有夏乃有室大競籲俊尊上帝古之人道唯有夏禹之時乃有大夫室家大强猶乃招呼賢俊與共尊事上帝迪知忱恂于九徳之行禹之臣蹈知誠信于九徳之行謂賢智大臣九徳臯陶所謀也乃敢吿教厥后曰拜手稽首后矣曰宅乃事宅乃牧宅乃準兹惟后矣知九徳之臣乃敢告教其}
  - {type: variant, offset: 301, length: 0, content: '', krp: 皆戒於王曰常所長事常所委任謂三公六卿凖人平法謂士官綴衣掌衣服虎賁以武力事王皆左右近臣冝得其人周公曰嗚呼休兹知恤鮮哉歎此五者立政之本知憂得其人者少古之人迪唯有夏乃有室大競籲俊尊上帝古之人道惟有夏禹之時乃有卿大夫室家大強猶乃招呼賢俊與共尊事上帝迪知忱恂于九德之行禹之臣蹈知成信於九德之行謂賢智大臣九德臯陶所謀也乃敢告教厥后曰拜手稽首后矣曰宅乃事宅乃牧宅乃凖兹惟右矣知九德之臣乃敢告教其}
  - {type: variant, offset: 302, length: 0, content: '', SBCK: 以立政后矣亦猶王矣宅居也居汝事六卿掌事者牧牧民九州之伯居外内之官及平法者皆得其人則此惟君矣嗚呼孺子王矣歎稚子今以爲王矣不可不勤法祖考之德繼自今我其立政立事凖人牧夫我其克灼知厥􅀂丕乃俾亂繼用今已徃我其立政大臣立事小臣及凖人牧夫我其能灼然知其順者則大乃使治之言知臣下之勤勞然後莫不盡心力也相我受民和我庶獄庶愼時則勿有間之能治我始受天民和平我衆獄衆之事如是則勿有以伐之言不可復變自一話一言我則末惟成德之彦以乂我受民言政賞用一善善在一言而巳欲其口無擇言如此則我終惟有成徳之美以治我所受之民嗚呼予旦已受人之徽言咸告孺子王矣歎所受賢聖說禹湯之美言皆以告稚子王矣繼自今文子文孫其勿誤于庻獄庶愼惟正是乂之文子文孫文王之子孫從今巳徃惟以正是人道治衆獄衆愼無忽誤也又曰成王旣黜殷命滅淮夷還歸在豐作周官王曰􅀂昔大猷制治于未亂保􅀖于未危言當順古大道制治安國必于未亂未危之前思患預防之曰唐虞稽古建官惟百内有百揆四岳外有州牧侯伯道堯舜考古以建百官内置百揆四岳象天之有五行外置州􅀵十二及五國之長上下相惟内外咸治言有法庶政惟和萬國咸寜官職有序故庶政惟和萬國皆安所以爲治也夏啇官倍亦克用又禹湯建官二百亦能用治言不及唐虞之清要也明王立政不惟其官惟其人言聖帝明王立政修教不惟多其官惟在得其人王曰嗚呼凢我有官君子欽乃攸司慎乃出令令出惟行弗惟反有官君子大夫已上歎而戒之使敬汝所司慎汝出令從政之本令岀必惟行之不惟反改􅀂二三其令亂之道以公滅私民其允懷學古入官議事以制政乃不迷其爾典常作之君作之師無以利口亂厥官蓄疑敗謀怠忽荒政不學牆面莅事惟煩積疑不决必敗其謀大道怠忽必亂其政人而不學祖由正牆面而立臨政事必煩又君陳曰惟爾令德孝恭惟孝友于兄弟克施有政言善父母者必友于兄弟能施其政令命汝尹兹東郊敬哉圖厥政莫或不艱有廢有興出入自爾師虞庶言同則繹謀其政無有不}
  - {type: page-break, offset: 302, content: '', id: KR3k0012_SBCK_622-6a}
  - {type: variant, offset: 302, length: 0, content: '', WYG: 以立政君矣亦猶王矣宅居也居汝事六卿掌事者牧牧民九州之伯居外内之官及平法者皆得其人則此唯君矣嗚呼孺子王矣嘆孺子今已為王矣不可不勤法祖考之徳繼自今我其立政立事準人牧夫我其克灼知厥若丕乃俾亂繼用今以徃我其立政大臣立事小臣及準人牧夫我其能灼然知其順者則大乃使治之言知臣下之勤勞然後莫不盡其力也相我受民和我庶獄庶慎時則勿有間之能治我所受天民和平我衆獄衆慎之事如是則勿以代之言不可復變自一話一言我則末惟成徳之彦以乂我受民言政當用一善善在一言而已欲其口無擇言如此則我終惟有成徳之美以治我所受之民嗚呼予旦已受人之徽言咸告孺子王矣歎所受賢聖說禹湯之美言皆以告稚子王矣繼自今文子文孫其勿誤于庶獄庶慎唯正是乂之文子文孫文王之子孫從今以徃唯以正是之道治衆獄衆慎勿誤也又曰成王既黜殷命滅淮夷還歸在豐作周官王曰若昔大猶制治于未亂保邦于未危言當順古大道制治安國于未亂未危之前思患預防之曰唐虞稽古建官惟百内有百揆四岳外有州牧侯伯道堯舜考古以建百官内置百揆四岳象天之有五行外置州牧十二及五國之長上下相維内外咸治言有法庶政惟和萬國咸寜官職有序故庶政惟和萬國皆安所以為治也夏商官倍亦克用乂禹湯建官二百亦能用治言不及唐虞之清要也明王立政不惟其官惟其人言聖帝明王立政脩教不惟多其官惟在得其人王曰嗚呼凡我有官君子欽乃攸司慎乃出令令出惟行弗惟反有官君子大夫已上歎而戒之使敬汝所司慎汝出令従正之本令出必惟行之不惟反政若二三其令亂之道以公滅私民其允懐學古入官議事以制政乃不迷其爾典常作之師無以利口亂厥官蓄疑敗謀怠忽荒政不學牆靣莅事惟煩積疑不决必敗其謀大道怠忽必亂其政人而不學其猶正牆面而立臨政事必煩又君陳曰惟爾令徳孝恭惟孝友于兄弟克施有政言善父母者必友于兄弟能施其政令命汝尹兹東郊敬哉圖厥政莫或不艱有廢有興出入自爾師虞庶言同則繹謀其政無有不}
