  - {type: variant, offset: 248, length: 1, content: 為, SBCK: 政以一其行禮樂刑政其極一也極至也所以同民心而出治道也是故治丗之音安以樂其政和亂丗之音怨以怒其政乖聲音之道與政通矣是故審聲以知音審音以知樂審樂以知政而治道備矣又曰敢問何謂爲政孔子對曰政者正也君爲正則百姓從矣君之所爲百姓之所從也君所不爲百姓何從公曰敢問爲政何如孔子對曰夫婦别父子親君臣嚴三者正則庻物從之矣又曰哀公問政子曰文武之政布在方䇿其}
