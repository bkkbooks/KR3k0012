  - {type: variant, offset: 13, length: 1, content: 慎, SBCK: 下所以取正也周禮天官太宰之職曰正月之􅁻始和布治于邦國都鄙乃縣讀爲懸治象之灋與法同于象魏使萬民觀法象挾日而歛之太宰以正月朔日布王治之事}
  - {type: variant, offset: 13, length: 1, content: 慎, WYG: 下所以取正也周禮天官太宰之職曰正月之吉始和布治于邦國都鄙乃縣讀懸治象之灋與法同于象魏使萬民觀法象挾日而斂之太宰以正月朔日布王治之事于天下至正歲又書而懸于象魏振木鐸以徇之使萬民觀焉小宰亦帥其屬而往皆所以重治法新王事也凡治有改言始和者改造云耳挾日凡十日乃施典于邦國而建其牧立其監設其參傳其伍陳其殷置其輔乃者更申勅之也以侯伯有功徳者加命作長謂之牧所謂八命作牧者也監謂公侯伯子男各監一國也鄭司徒云殷治律輔為民之平也乃施則于都鄙而建其長立其兩設其伍陳其殷置其輔長謂公卿大夫兩謂兩卿也乃施法于官府而建其正立其貳設其攷陳其殷置其輔凡治以典待邦國之治以則待都鄙之治以灋待官府之治以官成待萬民之治以禮待賓客之治凡邦之小治則冢宰聴之待四方賓客之小治大事決}
  - {type: page-break, offset: 13, content: '', id: KR3k0012_WYG_622-1b, image: WYG0898/WYG0898-0591d.png}
  - {type: page-break, offset: 13, content: '', id: KR3k0012_WYG_622-2a, image: WYG0898/WYG0898-0592a.png}
  - {type: variant, offset: 13, length: 1, content: 慎, krp: 下所以取正也周禮天官太宰之職曰正月之吉始和布治于邦國都鄙乃縣讀爲懸治象之灋與法同于象魏使萬民觀法象挾日而歛之太宰以正月朔日布王治之事}
  - {type: variant, offset: 15, length: 0, content: '', SBCK: 天下至正歳又書而縣於象魏振木鐸以徇之使萬民觀焉小宰亦帥其屬而徃皆所以重治法新王事也凡治有故言始和者改造云耳挾日九十日乃施典于􅀖國而建其牧立其監設其叅傅其伍陳其殷置其輔乃者更申勑之也以侯伯有功德者加命作州長謂之牧所謂八命作牧者也監謂公侯伯子男各監一國也鄭司農云殷治律輔爲民之平也乃施則干都鄙而建其長立其兩設其伍陳其殷置其輔長謂公卿大夫兩謂兩卿也乃施法于官府而建其正立其貳設其攷陳其殷置其輔凢治以典待􅀖國之治以則待都鄙之治以灋待官府之治以官成待萬民之治以禮待賔客之治凢􅀖之小治則冢宰聽之待四方賔客之小治大事决乎王小事􅃁宰專平之歳終則令百官府各正其治受其㑹正正處也㑹大計也聽其政事而詔王廢置平}
