  - {type: variant, offset: 2818, length: 217, content: 謀卞隨曰非吾事也湯又因務光而謀務光曰非吾事也湯曰伊尹何如曰強力忍詬吾不知其他湯遂與伊尹謀伐桀剋之以讓卞隨卞隨曰君之伐桀謀乎我必以我為賊也勝桀而讓乎我必以我為貪也吾生乎亂世而無道之人再來漫我吾不忍數聞也乃自投於桐水而死桐水今在穎川又讓務光曰智者謀之武者遂之仁者居之古之道也吾子胡不立乎務光辭曰廢上非義殺人非仁子犯其難我享其利非廉也吾聞之曰非其義不受其祿無道之世不踐其土況尊我乎吾不忍見也乃負石自沉於盧水盧水在遼東也呂氏春秋曰沈尹筮遊於郢, SBCK: 去太平御覽卷第四百二十}
