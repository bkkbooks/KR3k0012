  - {type: variant, offset: 646, length: 3, content: 雷義舉, SBCK: 黄向字文章爲性廉㓗常歩行於路中得金璣一囊可直二百餘萬募求得其主還之又曰范丹姉病往看之姉設食丹以姉壻不德出門留二百錢姉使人追索還之丹不得巳受之聞里中芻藁僮僕更相怒曰言汝清髙豈范史雲軰而云不盗我菜乎丹聞之曰吾之微志乃在僮竪之口不可不勉遂投錢去又曰羊}
