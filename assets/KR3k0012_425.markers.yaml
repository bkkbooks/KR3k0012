  - {type: variant, offset: 345, length: 295, content: 封而悉以租入與之帝以郁先師子有禮讓甚見親厚又曰上欲封樊興置印綬於前興固讓曰臣未有先登陷陣之功而一家數人並蒙爵土令天下觖望誠不願帝嘉興之讓不奪其志又曰劉愷字伯豫以當襲父般爵讓與弟憲逃避封有司奏請絕國上美其義特優加之愷猶不出有司復奏之侍中賈逵上書曰孔子稱能以禮讓為國於從政乎何有和帝納之詔下曰故居巢侯劉般嗣子愷當襲父般爵而稱父遺意致國弟憲遁亡七年所守彌固蓋王法崇善成人之美其聽憲嗣爵乃徵愷拜為郎稍遷侍中愷之入朝在位者莫不仰其風行又曰淳于恭以謙儉推讓為節家有山田橡樹人有盜取之者恭助為收拾載之歸乃知其恭橡盜者還橡恭不受人又有盜刈恭禾者恭見之念其愧因伏草中至去乃起續漢書曰張堪讓先人餘財數百萬與兄子, SBCK: ''}
