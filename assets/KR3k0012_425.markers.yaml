  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第四百二十五}
  body:
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 六清廉上釋名曰清青也去濁逺穢色如青也廉歛也自檢歛也左傳襄元曰季文子卒宰庀家噐爲葬具無衣帛之妾無食粟之馬無藏金玉無重噐備噐備謂珎寳甲兵之物君子是以知季文子之忠於公室也相三君矣而無私積可不謂忠乎又襄二曰宋人或得玉獻諸子罕子罕弗受獻玉者曰以示玉人玉人以爲寳也故敢獻之子罕曰我以不貪爲寳爾以玉爲寳􅀂以與我皆喪寳也不􅀂人有其寳又襄}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 六清廉上釋名曰清青也去濁逺穢色如青也廉斂也自檢斂也左傳襄}
  - {type: variant, offset: 5, length: 0, content: '', krp: 六清廉上釋名曰清青也去濁逺穢色如青也廉歛也自檢歛也左傳襄元曰季文子卒宰庀家噐爲葬具無衣帛之妾無食粟之馬無藏金玉無重噐備噐備謂珎寳甲兵之物君子是以知季文子之忠於公室也相三君矣而無私積可不謂忠乎又襄二曰宋人或得玉獻諸子罕子罕弗受獻玉者曰以示玉人玉人以爲寳也故敢獻之子罕曰我以不貪爲寳爾以玉爲寳若以與我皆喪寳也不若人有其寳又襄}
  - {type: xml-element, offset: 6, content: '', id: KR3k0012_CHANT_425-bkkxmlele1}
  - {type: 'tls:seg', offset: 6, content: '', id: KR3k0012_CHANT_425-1a.1}
  - {type: 'tls:seg', offset: 6, content: '', id: KR3k0012_CHANT_425-1a.2}
  - {type: variant, offset: 6, length: 2, content: 讓下, SBCK: 曰與晏子邶殿其鄙六十弗受子尾曰富人之所欲也何獨弗欲對曰慶氏之邑足欲故亡吾邑不足欲也益之以邶殿乃足欲足欲亡無日矣耳夫富如布帛之有幅焉爲之制度使無遷也謂之幅利利過則爲敗吾不敢貪多所謂幅也與子雅邑辭多受少漢書曰琅瑘邴漢以清行徴爲京兆尹漢遂歸老於郷里漢兄子曼容亦飬老自脩爲官不肯過六百石輙自免去其名過出於漢又曰盖寛饒身爲司􅀠子常歩行自戍北邊蘇林日子自行戍不敢伐也公廉如此又曰趙禹以佐吏􅀘中都官用廉爲令史事太尉周亞夫爲丞相史府中皆稱其廉平然亞夫弗任曰極知禹無害然文􅀷禹持文法深刻續漢書曰第五倫字伯魚京兆長陵人倫脩行清白甞召見上曰聞卿爲吏不過從弟兄飯寧有之􅁘倫對曰臣生遭飢饉米石萬錢不敢妄過人飯又曰􅀽彭字伯楚祖父安歴廣漢南陽太守順帝􅀄爲光禄勲行至清爲吏麤􅂁糲食終於議郎}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_SBCK_425-1b}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_SBCK_425-2a}
  - {type: variant, offset: 6, length: 2, content: 讓下, WYG: 曰季文子卒宰庀家器為葬具無衣帛之妾無食粟之馬無藏金玉無重器備器備謂珍寶甲兵之物君子是以知季文子之忠於公室也相三君矣而無私積可不謂忠乎又襄十五曰宋人或得玉獻諸子罕子罕弗受獻玉者曰以示玉人玉人以為寶也故敢獻之子罕曰我以不貪為寶爾以玉為寶若以與我皆喪寶也不若人有其寶又襄二十八曰與晏子􅆁殿其鄙六十弗受子尾曰富人之所欲也何獨弗欲對曰慶氏之邑足欲故亡吾邑不足欲也益之以􅆁殿乃足欲足欲亡無日矣且夫富如布帛之有幅焉為之制度使無遷也謂之幅利利過則為敗吾不敢貪多所謂幅也與子雅邑辭多受少漢書曰琅琊邴漢以清行徵為京兆尹漢遂歸老於鄉里漢兄子曼容亦飬老自修為官不肯過六百石輒自免去其名過出於漢又曰盖寛饒身為司𨽻子常歩行自戍北邊蘇林曰子自行戍不敢代也公廉如此又曰趙禹以佐吏補中都官用廉為令史事太尉周亞夫為丞相史府中皆稱其廉平然亞夫弗任曰極知禹無害然文深禹持文法深刻續漢書曰第五倫字伯魚京兆長陵人倫脩行清白嘗召見上曰聞卿為吏不過從弟兄飯寧有之耶倫對曰臣生遭飢饉米石萬錢不敢妄過人飯又曰袁彭字伯楚祖父安厯廣漢南陽太守順帝初為光禄勲行至清為吏粗袍糲食終為議郎}
