  - {type: variant, offset: 1326, length: 199, content: 同光祿李胤清亮簡素正身在朝皆服事華髮以禮終始雖歷外內之寵不異寒賤之家而猶未蒙此選臣更越之何以塞天下之望又封南城郡侯祜曰昔張良請受留侯漢高不奪其志請受鉅平薨遺令不得以南城侯入柩詔祜曰固讓歷年志不可奪身沒讓存遺言益厲此夷叔所以稱賢季札所以全節重違其志今聽復本封干寶晉紀曰鍾會鄧艾將伐蜀與劉寔別客謂寔曰二將當破蜀不寔曰必破蜀伹皆不還客問其故寔曰治道在於克讓因著崇讓論曰季世不能讓賢虛謝見用之恩莫肯讓於勝己, WYG: 如逺矣}
