  - {type: variant, offset: 684, length: 3, content: 陳囂與, WYG: 羊續字興祖泰山人為廬江太守卧一幅布綯穿敗糊紙以代焉為南陽太守初之郡府丞嘗獻其生魚續受而懸之於庭丞後又進之續乃出所懸者以杜其意又曰徐稚字孺子豫章南昌人也少為諸生隠處篤行常自躬耕非其衣不服非其食不食糠粃不厭所居閭里服其徳化又曰河南陶碩鄉曲餉之碩無所受但食棗飲水而已袁山松後漢書曰范丹字史雲外黄人為縣吏年十八棄衣物道邉家以為死遂西入闗學為莱蕪長去官於市賣卜紡績以自給辟公府步行無被囊自隨常使兒捃麥得五斛}
