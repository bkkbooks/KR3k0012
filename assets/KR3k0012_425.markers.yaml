  - {type: variant, offset: 3036, length: 893, content: 年荊王欲以為令尹辭期思之鄙人有孫叔敖彼聖人也王於是使人以王興迎叔敖以為令尹而國治韓子曰舜耕於歷山農者讓畔漁於河濱漁者讓長符子曰禹讓天下於奇子奇子曰君之佐舜勞矣鑿山川通河漢首無髮股無毛故舜也以勞報子我生而逸不能為君之勞矣又曰武王以天下讓歧封子歧封子曰孰勿勿然以天下為事乎君往矣余不忍聞之又曰太伯將讓其國於季歷謂其傅曰大王欲以一國之事而以嗣我我其羞之吾聞至人也不居一世而萬世以之君不貴一代而萬代以之貴吾焉能貴乎一國而賤乎萬代哉山海經曰君子國民衣冠帶劍土方千里多薰華之草好讓故為君子國許遜別傳曰遜年七歲無父躬耕負薪以養母盡孝敬之道與寡嫂共田桑推讓好者取其荒者不營利母常隨之如此當乞食無處遜嘆應母曰但願母老壽耳郭翻別傳曰翻經河墜刀於水路人有為取者翻因與之路人不取至於三四路人固辭翻曰爾向不取我豈能復得乎路人曰吾若取此物為天地鬼神所責矣知其終不受乃沉刀於向所失處路人帳然乃復沒為取之翻於是不逆其意十倍刀價與之魏武令曰里諺曰讓禮一寸得禮一尺斯合經之要矣魏文雜事曰辭爵逃祿不以利累名不以位虧德之謂讓博物志曰三讓一曰禮讓二曰固讓三曰終讓晉劉寔崇讓論曰古之聖王治天下所以貴讓者欲以出賢才而息爭競也夫人情莫不皆欲己之賢以自明賢豈假讓而賢哉故讓道興賢能之人不求而自出矣至公之舉而自立矣一官鈌擇眾官所讓最多者而用之審才之道也在朝之人相讓於上草廬之人咸皆化之推能讓賢之風從此生矣為一國所讓則一國士也為天下所讓則天下才也推讓之風行賢不肖灼然殊矣晉孫盛周秦伯三讓論曰孔子曰泰伯可謂至德也已矣三以天下讓民無得而一焉鄭玄以為託採藥而行一讓也不奔喪二讓也斷髮文身三也三者之美皆蔽隱不著王蕭曰其讓隱故民無得而稱焉咸謂玄既失之而肅亦未為暢也玄之所云三跡顯然天下所共見也何得云隱而未著乎三跡茍著則高讓知亦復不得云其讓隱也蓋泰伯之出讓跡已露不奔喪故一事耳斷髮之與左傳明文相背又不經也然則稱三讓者其在古公至文王乎周之王業顯於亶父受命於昌泰伯玄覽棄周太子之位一讓也假託遜遁受不赴喪之譏潛推大美二讓也無胤嗣而養仲雍之子以為己後是深思遠防令周嗣在昌天人叶從四海悠悠無復纖介疑惑三讓也凡此三者帝王之業故孔子曰三以天下讓言非直常讓若禮臧之倫者, SBCK: ''}
