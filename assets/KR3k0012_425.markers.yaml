  - {type: variant, offset: 1695, length: 220, content: 云其家荷重恩為國致效是其常節何足以應進陟之報懇惻發於至誠又曰崔光韶為司空行參軍復請讓從叔和曰臣誠微賤未登讓品屬逢唐朝恥無讓德和亦謙退辭而不當高祖善之遂以和為廣陵王國常侍後周書曰蘇祐字承先陳留圉人也有膂力便騎射從征伐常潰圍陷陣還之日諸將爭功祐終無競太祖歎之常謂諸將曰承先口不言勳孤當代言其見知如此沈約齊紀曰朝係伯襄陽人也事母甚謹西土風俗田與鄰畔者輒於畔上種桑以誌之係伯上種桑枝條蔭蔽他地每開數尺以避焉鄰者隨復侵之係伯輒伐樹更種侵畔者慚不敢犯也, SBCK: 北}
