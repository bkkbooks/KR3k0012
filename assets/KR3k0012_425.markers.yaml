  - {type: variant, offset: 805, length: 2, content: 振旅, SBCK: 郷里施惠又曰鄭均字仲虞東平人少好黄老書兄爲縣吏頗受禮遺均數諌止不聽即脫身爲傭餘得錢帛歸以與兄曰物盡可復得爲吏坐贓身􅂢弃兄感其言遂爲廉㓗典略曰程竪字謀甫南陽武隂人仁孝清㓗居貧無資磨鏡自給不受人施諸嫗共漂更相呼食或不食者相謂曰汝非程謀甫何爲不食人食魏略曰沭並字德信河間人少􅀌苦􅀽紹父子時始爲吏名有志介甞過姉姉爲殺鷄炊􅁰而不留爲三府長吏時呉使朱然諸􅁑瑾攻圍樊城遣舩兵於峴山東斫材兵人作食有先熟者呼後熟者荅言不也呼者曰汝欲作沐德信􅁘其名流布播於異域如此又曰舊故西征有官厨財藉遷轉之際無不因縁而趙儼又手上車發到㶚上忘持其常所服藥雍州聞之乃追送雜藥朴數箱儼􅀏曰人言語殊不易我偶問所服耳何用是爲遂不取魏志曰盧欽著書稱徐邈曰徐公志髙行㓗才􅀶氣猛其施之也髙而不狷㓗而不介􅀶而守約猛而能寛聖人以清爲難而徐公之所易也或問欽徐公當武帝之時人以爲通向在凉州及}
  - {type: page-break, offset: 805, content: '', id: KR3k0012_SBCK_425-4b}
  - {type: variant, offset: 805, length: 2, content: 振旅, WYG: 鄉里施惠又曰鄭均字伯虞東平人少好黄老書兄為縣吏頗受禮遺均數諫止不聽即脱身為傭餘得錢帛歸以與兄曰物盡可復得為吏坐贓終身捐棄兄感其言遂為廉潔典畧曰程堅字謀甫南陽舞隂人仁孝清潔居貧無資傭磨自給不受人施諸媪與漂更相呼食或不食者相謂曰汝非程謀甫何為不食人食魏畧曰沐並字徳信河間人少孤苦袁紹父子時始為吏雅有志操嘗過姊姊為殺鷄炊黍而不留為三府長吏時吴使朱然諸葛瑾攻圍樊城遣舡兵於峴山東斫材兵人作食有先熟者呼後熟者答言不徃也呼者曰汝欲作沐徳信耶其名流布播於異域如此又曰舊故西征有官厨財藉遷轉之際無不因縁而趙儼义手上車發到灞上忘持其常服藥雍州聞之乃追送雜藥裹數箱儼笑曰人言語殊不易我偶問所服耳何用是為遂不取魏志曰盧欽著書稱徐邈曰徐公志髙行潔才博氣猛其施之也髙而不狷潔而不介博而守約猛而能寛聖人以清為難而徐公之所易也或問欽徐公當武帝之時人以為通向在凉州及}
