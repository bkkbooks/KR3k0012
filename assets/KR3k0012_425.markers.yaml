  - {type: variant, offset: 2040, length: 759, content: 大小撝讓之美本出人情若大官必讓便與詣闕章表不異例既如此謂都非疑朓讓優荅不許唐書曰溫彥博與兄大雅共掌機密彥博以昆季同在機務意不自安固請他職高祖曰我虛心相待不以為疑卿何自疑也彥博雖應命然每退讓遠避機權寮列以此多之又曰長孫無忌冊拜司空無忌固辭讓不許又曰臣幸居外戚恐招聖主私親之誚敢以死請太宗曰無忌聰明鑒悟且有武略公等並知所以委之台鼎無忌又上表切讓帝使謂之曰昔黃帝得力牧而為五帝先夏禹得咎繇而為三王祖齊桓得管仲而為五伯長朕自在藩邸即任使公遂得廓清宇內君臨天下以公功績才望允稱具瞻故授此官無宜辭讓為禮也又曰盧懷慎開元三年遷黃門監懷慎與紫微令姚崇對掌樞密懷慎自以為吏道不及崇每事皆推讓之周書曰湯放桀而歸於毫三年諸侯大會湯取天子之璽置之天子之坐再辭從諸侯之位湯曰此天子之位有道者可以處之三讓于諸侯諸侯莫敢即位然後湯即天子之位慎子曰堯讓許由舜讓善卷皆辭為天子而退為疋夫列子曰昔堯舜為以天下讓許由善卷而不失天下伯夷叔齊實以孤竹讓而終亡其國晏子春秋曰晏子方食景公使至分食食之使者不飽嬰亦不飽公致千金以奉賓客晏子不受公曰先君桓公以書社百封管仲管仲不辭獨辭何也晏子曰嬰聞聖人千慮必有一失愚人千慮必有一得意以管仲失之嬰得之又曰景公使晏子為阿宰三年而譽聞於國景公悅召而賞之辭而不受公問其故對曰昔嬰之治阿三邪毀於外三讒毀於內今則三邪譽於外三讒譽於內昔者嬰之當誅者當賞而今以當賞者當誅是故不敢受景公知晏子賢乃任以國政三年而齊大興莊子曰堯以天下讓許由由曰日月出矣而爝火不息其於光也不亦難乎時雨降矣而猶浸灌其於澤也不亦勞乎又讓於子州支父子州支父曰我適有幽憂之疾方且治之未暇治天下也又曰舜以天下讓於善卷善卷曰余逍遙於天地之間而心意自得吾何以天下為哉遂不受又曰舜以天下讓其友北人無擇北人無擇曰異哉后之為人居甽畝之中而遊於堯之門不若是而已又欲以其辱行汙漫我吾羞, SBCK: 屬顗}
