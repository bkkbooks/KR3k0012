  - {type: variant, offset: 754, length: 1, content: 錄, SBCK: 境遭旱嵩行部傳車所經甘雨輙霔東海金郷祝其兩縣僻在山間嵩傳駟不徃二縣不得雨父老干請嵩曲路到二縣入界即雨又曰巴祗字敬祖爲楊州刺史在官不迎妻子俸禄不使有餘積毀壞不復改易以水澡傅墨用之夜與士對坐暗中不燃官燭又曰弟五種遷兖州刺史中常侍單超兄子匡爲濟隂太守􅀒􅀔貪放種欲収舉未知所使㑹聞從事衛羽素抗直乃召羽具告之曰聞公不畏強禦今欲相委以重事􅀂之何對曰願庶幾於一割羽出遂馳到定陶閉門収匡賔客親吏四十餘人六七日中紏發其贓五六十萬種即奏匡并以劾超魏志曰劉馥字元頴沛國相人也太祖方有􅀽紹之難謂馥可任以東南之事遂表爲楊州刺史馥旣受命單馬造合肥空城建立州治南懷緒等皆安集之貢獻相繼南懷緒數年恩化大行百姓樂其政流民越江山而歸者以萬數於是聚諸生立學校廣屯田興治芍陂及茄陂七門吴塘以漑稻田官民有稸陂塘之利至今爲用又曰徐邈爲涼州刺史進}
