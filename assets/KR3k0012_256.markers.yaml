  - {type: variant, offset: 1506, length: 604, content: 劾詔下削階受代親友唁之復怡然曰茍利於人敢憚薄責又曰趙昌除華州刺史辭於麟德殿時年八十有餘趨拜輕捷占對詳明上退而歎異宣令宰臣密訪其頤養之道以奏焉又曰咸通中衛洙奏狀稱蒙恩除授滑州刺史官號中一宇而臣家諱音同雖文字有殊而聲韻難別請改授閑官者勑曰嫌名不諱著在禮文成命已行固難依允五代史後唐書曰李嗣肱克脩之子也少有膽略時朱溫將賀德倫急攻蓨縣朱溫率師五萬合勢營於蓨之西嗣肱自下愽率騎三百薄晚與賊之樵蒭者相雜日既晡入朱溫營門諸騎相合大譟弓矢星發虓闞馳突汴人不知所為營中大擾既暝歛騎而退是夜朱溫燒營而遁解蓨縣之圍以功特授蔚州刺史又曰莊宗以教坊使陳俊為景州刺史內園栽接使儲德源為憲州刺史伶人剖符非制也上初平汴州陳俊德源皆為樂官周匝所薦上許之典郡郭崇韜以為不可遂寢伶官言之者眾上密召崇韜謂之曰予已許陳俊一郡今經年未行卿雖以正言匡諫我每慚見二人卿當屈意行之故有斯命又曰前洋州節度副使程乂徽陳利見請於瀛莫兩州界起置營田以備邊因授乂徽莫州刺史充兩州營田使五代史梁書開平四年九月詔曰魏愽管內刺史比來州務並委督郵遂使曹官擅其威權州牧同於閑冗俾循通制宜塞異端並河南諸州例刺史得以專達時議者曰唐朝憲宗烏重裔為滄州節度使嘗稱河朔六十年能抗拒朝命者以奪刺史權與縣令職而自作威福耳若二千石各得其柄又有鎮兵雖安史挾奸豈能據一墉而叛哉遂奏以所管德棣景三州各還刺史職分州兵並隸收管是後雖幽鎮魏三道以河北舊風自相傳襲唯滄州一道獨稟命受代自重裔制置使然也則梁氏之, SBCK: ''}
