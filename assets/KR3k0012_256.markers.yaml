  - {type: variant, offset: 1029, length: 0, content: '', SBCK: 政化大行百姓稱之雖在軍旅常惡衣惡食以儉率下魏略云裴潜爲兖州時甞作一胡牀及去留以挂柱吴志曰吕岱爲交州刺史歴年不餉家妻子飢乏孫權聞之歎息以讓羣臣曰吕岱出身萬里爲國勤事家内困而􅀌不早知股肱耳目其責安在於是加賜錢米絹布􅀊有常限晉書曰杜元凱爲荆州人號爲杜父舊水道唯㳂漢逹江陵千數百里君乃開陽口起夏水導洪洞逹巴陵徑近千里南土美而謡曰後世無叛由杜翁孰識知名與勇功}
