  - {type: variant, offset: 599, length: 5, content: 坐小法貶潮, SBCK: 甚有威名是時州郡災旱百姓窮荒望行部道見飢者祼行草食五百餘人􅉖然哀之因以便冝出所在布粟給其廪粮爲作􅄄衣又曰中平元年交阯屯兵反執刺史及合浦太守自稱柱天將軍靈帝特勑三府精選能吏有司舉賈琮爲交趾刺史琮到部訊其反狀咸言賦歛過重百姓莫不空單京師遥逺告􅁈無所民不聊生故聚爲盗賊琮即移書告示使安其資業招撫荒散蠲復徭役誅斬渠帥爲大害者簡選良吏使試守諸縣歳間蕩定百姓以安巷路爲之歌曰賈父來晚使我先反今見清平吏不敢飯在事三年爲十三州最又曰郭伋爲并州牧入界所到縣邑老㓜相携逢迎道路所過問民疾苦聘求􅂄德雅俊設几杖之禮朝夕與叅政事又曰􅂫章爲冀}
