  - {type: variant, offset: 1031, length: 3, content: 崔珙大, SBCK: 吴隠之爲廣州州界有貪泉父老云飲此水使廉士變貪隱之先至水酌而飲之賦詩曰古人云此水一飲重千金􅀂使夷齊飲終當不易心王隱晉書曰華軼爲江州刺史得江表之歡心流亡之士赴之如歸時天子􅀌危四方瓦解軼有匡天下之志毎遣貢獻入洛不失臣節謂使者曰􅀂洛都道斷可輸之琅耶王以明吾之爲司馬氏也又曰山濤爲冀州刺史冀州舊名尅俗略無人士自濤居州捜求賢才旌命所知三十餘人皆顯名當世冀州之士於是爲盛晉陽秋曰劉弘字}
