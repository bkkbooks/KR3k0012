  - {type: variant, offset: 1040, length: 0, content: '', SBCK: 侍中遷尚書裒以后父苦求外出除江州刺史莅政貞素毎崇清約常使私僮樵採晉桓伊字叔夏譙國人湛隱有武幹又善音律爲中興第一遷都督江州荆州十郡豫州四郡軍事江州刺史伊到鎮以邊境無虞冝以寛恤爲務乃上䟽江州虚耗加連􅀊不登冝併合小縣除諸郡逋米州治冝還豫章詔荅移州潯陽其餘皆聽伊隨冝拯撫甚得南土清和宋書曰陸徴爲益州刺史䘏隱有方威惠兼著冦盗静息民物殷阜蜀士安恱至今稱之齊書曰臨川王映爲雍州刺史甞至錢還都買物有獻計者於江陵買貨至都廻換可得微有所増映􅀏曰我是賈客耶乃復求利又曰王琨爲}
