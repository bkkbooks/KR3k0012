  - {type: variant, offset: 362, length: 0, content: '', WYG: 瑞水也君乗土而王其政太平則蒙水出於山焉韓詩外傳曰夫水者縁理而行不遺大小似有智者動而之下似有禮者踏深不疑似有勇者障防而清似知命者厯險致逺似有徳者天地以成羣物以生國家以寧萬事所平此智者所以樂於水也呉氏春秋曰伍子胥奔呉至溧陽漂陽女子擊縹瀨水之上子胥過跪而乞食女子簞食壺漿而飯之子胥食而去謂女子曰掩子壺漿勿令其露女子曰行矣子胥行五步還顧女子已自投瀨中後子胥伐楚}
