  - {type: variant, offset: 639, length: 368, content: 言大水至天子親御前殿召公卿議大將軍鳳以為太后與上及後宮可御舟舡令吏上長安城以避水群臣皆從鳳議左將軍王啇獨曰上古無道之國水猶不冒城郭今聖政和平世無變革上下相安何因當有大水一日暴至此必訛言也不宜令民上城重驚百姓上乃止有頃長安中稍定問之果訛言上於是壯啇之固守數稱其議而鳳大慚自恨失言後漢書東陽人趙炳字公河能越方禁與閩中徐登遇於烏傷溪水上禁小溪水不流又曰竇太后臨政竇憲兄弟各擅威權丁鴻上封事曰夫壞崖破巖之水源由涓涓干雲蔽日之木起於蔥蒨魏略曰漢火行忌水故去洛水而加佳魏為土土水之母水得土而流土得水而柔故除佳加水晉書曰陸雲先是常著衰絰上舡於水顧見其影因大笑落水人救獲免又佛圖澄傳襄國城壍水源在城西五里其水源暴竭勒問澄何以致水澄曰今當勑龍取水乃與弟子法首等數人至故泉源上坐繩床燒安悉香呪願數百言如此三日水微流有一小龍長五寸許隨水來出諸道士競往視之有頃, SBCK: 駭洪}
