  - {type: variant, offset: 1839, length: 0, content: '', WYG: 白無水王以劍擊石出水今竹王水是也又曰趙人有琴髙者以善鼓琴為康王舎人行龎涓之術遊浮碭郡門二百餘年後入碭取水龍子與弟子期曰皆潔齋待於水傍果乗赤鯉出入碭中有萬人觀之留月餘復入水也又曰姜水按世本炎帝姜姓帝王世紀曰炎帝神農氏其母曰似遊華陽感神而生炎帝長於姜水又曰昔沫水自蒙山至南安而溷崖水脚漂疾破害舟船歴代為患蜀郡太守李氷𤼵卒鑿平溷崖河神贔怒氷乃操刀入水與水神鬭遂平溷崖通水路開處即水所穿也又曰黄水出夏陽縣西北連巫山溪出雄黄頗有神異採之常以冬月祭祀鑿石深數丈方得雄黄故溪水取名焉又曰沁水南歴猗氏又南與驫驫水合水出東北巨駿山乗髙瀉浪觸石流響世人因聲以稱之又曰池郡魚復縣夷水即佷山清江也水色清照十丈蜀人見其澄清因名清江焉又曰溱水出浮石嶺北青衣山亦謂之青衣水也又曰廬山之北有石門水水出嶺有雙石髙竦其狀若門因有石門之名焉水導雙石之中懸流飛㴻近三百步許下散漫十步許上望之連天若曳飛練於霄中也又曰永昌郡有蘭蒼水出西南博南縣漢明帝永平十二年置博南山名也縣以山名之其水東北流出博南山漢武帝時通博南山道渡蘭蒼津土地絶逺行者苦之歌曰漢徳廣開不賔渡博南越蒼津一渡蘭蒼為他人山髙四十里蘭蒼水有金沙越人收以為黄金又有充珠穴穴出光珠又有琥珀珊瑚黄白青珠也荆州記曰夏首東二十里有涌口二水之間謂之夏洲首尾七百里華容監利二縣在其中楚詞曰過夏首而西浮郭仲産云此水冬斷夏通因名夏水述異記曰睢渙二水波文皆若五色其人多文章故名績水又曰漢沔㑹流處岸上有石銘云下至水有三十里皆傳李斯刻石於此龍魚河圖曰𤣥洲在北海中地方三十里去南岸十萬里上有芝草𤣥澗澗水如蜜味服之長生淮南子又載也萬震南州異物志曰天竺有恒水一號新陶水水特甘香下有真鹽也廣志曰臨川郡有粉水得其水汰粉益潔盛𢎞之荆州記曰陽縣西有粉水源出房陵縣取其水為粉鮮潔異於餘水故因粉為名也巴郡臨江縣有此水舊常獻之也韓詩外傳曰溱與洧三月桃花水下之時衆士女執蘭祓除鄭國之俗三月上巳之日此兩水上招魂祓除不祥也秦州記曰成紀縣有石臼中水深數尺水旱無增減故名其地為天水郡搜神記曰漢末零郡太守有女恱門下書佐使婢取書佐飲餘水飲之有娠而生子至能行太守抱兒使求其父兒直上書佐膝書佐推之兒仆地為水三齊畧記曰康浪水在齊城西南十五里康衢州甯戚扣牛角歌於此也述征記曰臨淄牛山下有女水齊人諺曰世治則女水流世亂則女水竭慕容超時乾涸彌載及宋武北征而激洪流蕩又曰梁鄒城西有籠水云齊孝婦誠感神明湧泉𤼵於室内潜以績籠覆之由是無瓮汲之勞家人疑之乃待其出而搜其室試𤼵此籠而泉遂湧流漂居宇故名曰籠水始興記曰林水源中有石室室前磬石上行羅千瓮中悉是餅銀採伐遇之不得取取必迷悶名山畧記曰僧權道人居晉安霍山晨出澗忽見白水異常飲之甘如醴水過甚迅疾取得少許以餉陶晉安不復中飲權夀百三十嵗不知其終盛𢎞之荆州記曰桂陽郡有國水一邊冷一邊暖冷處青且清暖處白且濁隴右記曰武都紫水有泥其色亦紫而粘貢之用封璽書故詔誥有紫泥之美方輿韶州記曰曲江縣修仁水西南注連水北有三楓亭五渡水齊范雲為始興太守至修仁水酌而飲之賦詩曰三楓何習習五渡何悠悠且飲修仁水不挹偕和流吳録地理志曰天門零陵縣有溪水山獸從數十里往飲廣志曰弱水不勝毛羽世無見者博物志曰水有濁有清河淮濁江漢清南陽有清泠之水丹水泉水汝南有黄水華山南有黒水天下之水皆類五色今載其名也泞水不流郡國志曰隆州析五縣置果州閬中有隂水其民銳氣而酣舞也又曰湓水昔有人此處洗銅盆水暴漲失盆乃投水取盆見一龍銜盆奪之而去故曰湓水又曰藍田灞水滴漏若以金銀銅鐵器盛之皆漏唯匏葉則不漏人掌中亦漏服之闕毛闕得仙論衡曰陽燧取火於日方諸取水於月天}
