  - {type: variant, offset: 1214, length: 536, content: 備之軍次方渠無水師徒囂然遽有青虵乘高而下視其跡水隨而流朝晟令築防環之遂為渟泉軍人仰飲以足又曰孔若思遷庫部郎中若思常謂人仕至郎中足矣至是持一石止水滿於座右以示有止足之意老子曰上善若水水善利萬物而不爭處眾人之所惡故幾於道列子曰禹治水土迷之一國無風雨霧露不生鳥獸名曰終北有山名壺領頂有口若圓環名曰滋穴有水涌出名曰神瀵臭過蘭椒味過醪體又曰白公問於孔子曰人可與微言乎孔子不應白公曰若以石投水何如孔子曰吳之善沒者能取之曰若以水投水何如孔子曰淄澠之合易牙嘗而知之白公曰人故不可與微言耶又曰人有濱河而居者習於水勇於泅操舟鬻渡利供百口裹糧就學者成徒而溺死者幾半本學泅不學溺而利害如此莊子曰君子之交淡如水又曰秋水之至百川灌河流之大也兩崖涘之間不辯牛馬言其廣於是河伯欣然自喜以天下之美盡在己矣又曰水之性不雜則清莫動則平又曰孔子觀於呂梁懸水三十仞流沫三十里黿鼉魚鼈不能游見一丈夫游之數百步而去又曰水之守土地審無意則止於分所以為審又曰水靜則明燭鬢眉大匠取法焉水靜猶明而況聖人之心靜乎又曰水之積也不厚其負大舟也無力丈子曰水之性欲清沙石穢之水之為道也廣不可極莫知其言深不可測長極無窮遠淪無涯息耗減益過於不訾涌出日息煎乾曰耗出川枝流曰減九野注之曰益過於不訾者此過尾閭入大壑入無底谷又曰水濁者魚噞喁又曰混混, SBCK: 濯吾纓滄浪}
