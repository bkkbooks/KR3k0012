  - {type: variant, offset: 63, length: 223, content: 又曰水流濕書曰水曰潤下潤下作鹹又曰若涉大水其無津涯尚書大傳曰非水無以准萬里之平非人無以通遠道重任也詩曰相彼泉水載清載濁又曰沔彼流水朝宗于海又曰濟有深涉渡也深則厲淺則揭有彌濟盈濟盈不濡軌盈宜濡不宜喻淫亂犯禮者也又曰就其深矣方之舟之方柎就其淺矣永之游之又曰毖彼泉水亦流于淇又曰瀏其清矣深貌河水洋洋北流活活溱與洧洧方渙渙兮春水盛又曰楊之水不流束薪不流束楚不流東蒲又曰泌之洋洋可以療飢言樂道也禮曰夫水一勺之多及其不測黿鼉蛟龍魚鱉生焉貨財殖焉又曰水之於人親, WYG: ''}
