  - {type: variant, offset: 1970, length: 0, content: '', SBCK: 史記曰秦武王三年渭水赤三日昭王三十四年謂水大赤三日洪􅚘五行傳曰赤者火色也水盡赤者以火殄水也渭水秦大川者隂陽色乱秦用嚴刑敗乱之象也漢書五行志曰髙后三年漢中南郡河陽大水流數萬家是時女主獨治諸吕相王續漢書五行志曰桓帝永興三年彭城泗水逆流永壽元年洛水溢至津城門漂流人物是時梁兾争政嫉害忠直後遂誅滅獻帝建安二年漢水溢害人物是時天下大亂古今注曰安帝延平六年河東水化爲血元初二年潁川襄城臨水化爲血不流京房易曰君湎於酒􅁋於色賢人潜國家危厥異流水赤救水災史記曰堯命鯀治水九載績用不成謝承後漢書曰沛國陳宣字子輿建武十年雒水岀造津城門或欲築塞之宣諌曰昔王尊正身金堤水退況聖主􅁘言未絶而水去范曄後漢書曰公沙穆銳思河洛推歩之術永壽元年􅀨大水三輔以東無不漂没穆明曉占候乃預告令百姓徙居髙地故弘農人獨得免災又曰任文公巴郡人也爲治中從事時天大旱白刺史曰五月一日當}
