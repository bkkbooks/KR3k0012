  - {type: variant, offset: 3003, length: 500, content: 二月壬子夜半作之以承水即來抱朴子曰火出於陽燧陽燧員而火不員也水出於方諸方諸方而水不方又曰黃帝曰天在地外水在天外浮天而載地者水也又曰左慈以氣禁水水為逆流一二丈禁水著中庭露之大寒不冰尸子曰凡水其方折者有玉其圓折者有珠清水有黃金龍淵有玉英顧子曰顧夷子與子華遊東池子華曰水有四德沐浴群生深流万世是仁也揚清激濁蕩去滓穢是義也柔而難犯弱而難勝是勇也道江䟽河惡盈流謙是智也孟子曰數罟不入污池魚鼈不可勝食也數罟密網也又曰民之歸仁也猶水之就下也又曰仲尼亟稱於水曰水哉水哉何取於水也又曰原泉混混不舍晝夜盈科而後進放乎四海有本者如是也茍為無本七八月之間雨集溝會皆盈其涸也可立而待也故聲聞過情君子恥之又曰性猶湍水也決諸東方則東流決諸西方則西流人性之無分於善不善也猶水之無分於東西也人無有不善水無有不下也又曰仁之勝不仁也猶水之勝火也今之為仁者猶以一盃水救一車薪之火也又曰觀於海者難為水遊於聖人之門者難為言觀水有術必觀其瀾瀾水中大波也孫卿子曰孔子觀於東流之水子貢問於孔子所以見大水必觀焉何也孔子曰夫水柔也而無為也似德其浩浩乎不屈似有道其赴百仞之谷不懼似勇主量必平似法盈不求概似正發源必東似志是以君子見大水必觀焉大戴禮孔子家語並有, SBCK: 九}
