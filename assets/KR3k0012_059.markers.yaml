  - {type: variant, offset: 1839, length: 0, content: '', krp: 白無水王以劒擊石岀水今竹王水是也又曰趙人有琴髙者以善鼔琴爲康王舎人行彭㳙之術遊浮碭郡間二百餘年後入碭水取龍子與弟子期期日皆㓗齊待於水傍果乗赤鯉岀入碭中有萬人觀之留月餘復入水也又曰姜水按世本炎帝姜姓帝王世紀曰炎帝神農氏姜母曰姒遊華陽感神而生炎帝長於姜水又曰昔沬水自蒙山至南安而溷崖水脉漂疾破害舟舡歴代爲患蜀郡太守李氷發卒鑿平溷崖河神贔怒氷乃操刀入水與神鬪遂平溷崖通水路開處即水所穿也又曰黃水岀零陽縣西北連巫山溪岀雄黃頗有神異採之常以冬月祭祀鑿石深數丈方得佳黃故溪水取名焉又曰沁水南歷猗氏開又南與驫驫水合水岀東北巨峻山乗髙㵼浪觸石流響世人因聲以稱之又曰巴郡魚復縣夷水即佷山清江也水色清照十丈蜀人見其澄清因名清池也又曰溱水岀浮石嶺北青衣山亦謂之青衣水也又曰廬山之北有石門水水岀嶺端有雙石髙竦其狀若門因有石門之目焉水導雙石之中懸流飛澍近三百許歩下散漫十許歩上望之連天若曵飛練於霄中矣又曰永昌郡有蘭倉水岀西南博南縣漢明帝永平十二年置博南山名也縣以山名之其水東北流岀博南山漢武帝時通博南山道渡蘭倉津土地絶逺行者苦之歌曰漢德廣開不賔渡博南越倉津一渡蘭倉爲他人山髙四十里蘭倉水有金沙越人収以爲黃金又有光珠穴穴岀光珠又有琥珀珊瑚黃白青珠也荆州記曰夏首東二十里有涌口二水之間謂之夏洲首尾七百里華容監利二縣在其中楚詞曰過夏首而西郭仲産云此水冬断夏通因名夏水述異記曰濉二水波文皆若五色其人多文章故名繢水又曰漢沔㑹流處岸上有石銘云下至水府三十一里皆傳李斯刻石於此龍魚河圖曰玄洲在北海中地方三十里去南岸十万里上有芝著玄澗澗水如宻味服之長生淮南子又載也萬震南州異物志曰天笁有恒水一號新陶水水特甘香下有眞塩也廣志曰臨川郡有粉水得其水汰粉益㓗盛弘之荆州記曰陽縣西有粉水源出房陵縣取其水爲粉鮮㓗異於餘水故因粉爲名也巴郡臨江縣有此水舊常獻之也韓詩外傳曰溱與洧三月桃花水下之時衆士女執蘭拂除鄭國之俗三月上已之日此雨水上招魂拂除不祥也秦州記曰成紀縣有石臼中水深數尺水旱無増减故名其地爲天水郡捜神記曰漢末零陵太守有女恱門下書佐使婢取盥手水飲之而有娠而生子至能行太守抱兒使求其父兒直上書佐膝書佐推之兒仆地爲水三齊略記曰康浪水在齊城西南十五里康衢則寗戚扣牛角歌於此也述征記曰臨淄牛山下有女水齊人諺曰世治則女水流丗亂則女水竭慕容超時乾涸弥載及宋武北征而激洪流續述征記曰梁邹城西有籠水云齊孝婦誠感神明湧泉發於室内潜以績籠覆之由是無瓮汲之勞家人疑之時其岀而搜其室試發此籠而泉遂涌流漂居宇故名曰籠水始興記曰林水源中有石室室前磬石上行羅千瓮中悉是餅銀採伐遇之不得取取必迷悶名山略記曰僧權道人居晉安霍山晨岀澗忽見白水異常飲之甘如體水過甚迅器取得少許以餉陶晉安不復中飲權壽百三十歳不知其終盛弘之荆州記曰桂陽郡有圎水水一邊冷一邊暖冷處清且緑暖處白且濁隴右記曰武都紫水有泥其色亦紫而粘貢之用封璽書故詔誥有紫泥之美方輿記韶州曲江縣修仁水西南注連水北有三楓亭五渡水齊范雲爲始興太守至修仁水酌而飲之賦詩曰三楓何習習五渡何悠悠且飲修仁水不挹偕邪流呉録地理志曰天門零陵縣有溪水山獸從數十里往飲之越他水則不飲廣志曰弱水夫餘北其水不勝毛羽世無見者博物志曰水有濁有清河淮濁江濟清南陽有清冷之水丹水泉水汝南有黃水華山南有黒水天下之水皆類五色今載其名也泞水不流郡國志曰隆州析五縣置果州閬中有隂水其民銳氣而善舞也又曰湓水昔有人此處洗銅盆水暴漲失盆乃投水取盆見一龍銜盆奪之而去故曰湓水又曰庭州㶚水滴滴若以金銀銅䥫器盛之皆漏唯瓠葉則不漏人掌中亦漏服之少臰毛落得仙論衡曰燧之取火於日方諸取露於月天}
