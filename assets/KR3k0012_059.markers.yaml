  - {type: variant, offset: 1758, length: 2, content: 青青, SBCK: 􅀇中記曰天下之多者水焉浮天載地髙下無不至萬物無不潤山海經曰剡山有獸焉名曰合窳見則天下大水髙箭之山其上有水焉甚寒而清帝臺之漿水也郭璞注曰河東解縣檀道山有水潜岀山上俗名曰盎漿即此􅀋也大荒之隅有山而不合名曰不周有寒暑}
  - {type: variant, offset: 1758, length: 2, content: 青青, WYG: 𤣥中記曰天下之多者水焉浮天載地髙下無不至萬物無不潤山海經曰剡山有獸焉名曰合窳見則天下大水髙簡之山其上有水焉甚寒而清帝臺之漿水也郭璞注曰河東觪縣櫓道山有水潜出山上俗名曰鴦漿即此類也大荒之隅有山而不合名曰不周有寒暑}
