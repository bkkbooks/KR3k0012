  - {type: variant, offset: 1900, length: 1, content: 茂, WYG: 華華曰君欲如何卞曰東宫雋乂如林四率精兵萬人公居阿衡之任若得公命皇太子因朝録尚書事廢賈后金墉兩黄門力耳華曰廢立大事又非所能賈后微聞遷卞為雍州刺史恐終漏乃服藥卒晉中興書曰禇翼字謀逺少失父以材藝堪幹立名肅祖即位徵拜屯騎都尉遷太子左衛率隋書曰宇文述每與晉王謀事及晉王為皇太子以述為左衛率舊令率官第四品}
  - {type: variant, offset: 1902, length: 1, content: 便, WYG: 以述素貴遂進率品為第三其見重如此唐書官品志曰左右衛率各一人位視御史中丞各有丞左率領果毅統逺立忠建寧凌鋒夷冠祚徳等七營右率領崇榮永吉崇和細射等四營二率各置尉山公啓事曰太子左率缺待威重}
