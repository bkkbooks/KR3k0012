  - {type: variant, offset: 850, length: 3, content: 冑撫軍, WYG: 胄皆摠其儀注而為之導引若皇太子備禮出入乘軺車位亞家令焉漢書曰顔師古注曰掌知漏刻曰率更續漢書百官志曰率更令秩千石與庶子舎人更直職似光禄勲掌宫殿門户之禁郎将屯衛之士晉起居注曰武帝太康八年詔曰太子率更僕東宫之達官也其進品第五秩與中庶子左右衛率同職擬光禄勲也隋書曰明克譲轉率更令進爵為侯太子以師道處之恩禮甚厚有四方珍味輒以賜之于時東宫盛徵天下才學之士至於博物洽聞皆出其下唐書百官品志曰率更令掌伎樂漏刻也物理論曰今有吕子義清賢士也為太子率更令太子家令六典曰家令之職掌皇太子之飲膳食儲庫藏之政令總食官典倉司藏三署之官屬皇太子備禮出入則乘軺車威儀先諸臣以導引若祭祀賔客則供酒食以為獻主漢書曰文帝以晁錯為太子家令多所獻替稱為智嚢漢書曰疏受字子公為太子家令恭謹敏而有辭宣帝置酒太子宫受奉觴上夀辭禮嫻雅上甚歡極續漢書百官志曰太子家令秩千石主倉榖物職如司農少府擬廷尉也蜀志曰譙周字尹南後主為太子以周為家令後主時頗出逰觀増廣聲樂周上疏諫曰昔王莽之敗豪傑並起跨州據郡欲併神器於是賢才智士思望所歸未必以其勢之廣狭唯其徳之厚薄也宋書曰太子家令主内裀褥床机諸宫中之物又知官奴婢月用錢内庫米鹽車牛刑獄唐書官品志曰家令掌刑法食膳倉庫什物奴婢等事太子僕六典曰太子僕之職掌車輿乘騎儀仗之政令及喪葬之禮物辨其次序與其出入而供給之皇太子之車輅三一曰金輅二曰軺車三曰四望凡皇太子備禮而出則率廐牧令進輅僕親馭焉後漢書曰太子少傅屬官有太子僕一人秩千石主車馬職如太僕太子五日一朝非入朝日遣僕及中允朝焉入請朝起居沈約宋書曰太子僕秦官也宋起居注曰元嘉中以散騎常侍荀伯子為太子僕隋書曰栁肅為太子僕太子廢坐除名為民大業中帝與段達語及庶人罪惡之状達云栁肅在官大見踈斥帝問其故答曰學士劉臻嘗進章仇太翼於宫中為巫蠱事肅知而諫曰殿下帝之冡子位當儲貳誡在不孝無患見疑劉臻書生鼓搖唇舌適足以相誑誤願殿下勿納之矣庶人不懌他日謂臻曰汝何故漏洩使栁肅知之令面折我唐書官品志曰僕掌宗族親踈車輿騎乘也太子典膳丞六典曰典膳郎掌進膳嘗食之事丞為之貳每夕局官於厨更直北齊書曰門下坊始别置典膳局}
