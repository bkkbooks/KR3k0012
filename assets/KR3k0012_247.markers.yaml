  - {type: variant, offset: 34, length: 806, content: 出入動靜茍非其德義則必陳古以箴焉右贊善大夫掌如其左凡皇太子朝宮臣則列於右階之下唐書曰貞元十六年以山人崔芊為右贊善大夫充太子侍直新名也太子洗馬六典曰洗馬掌四庫圖籍繕寫刊緝之事立正本副本以備供進凡天下之圖書上於東宮者皆受而藏之國語曰夫差為勾踐洗馬續漢書百官志曰洗馬員十六人秩六百石職如謁者太子出則當直一人在前導威儀蓋洗馬之義也漢書曰司馬安少與汲黯為太子洗馬安為人深巧善官四至九卿魏略曰顏斐字文林以才學為太子洗馬晉書曰江統為洗馬太子頗好遊宴或闕朝侍統以五事諫之又曰解系兄弟少連叔連各清身潔己仕皆為洗馬梁書曰庾於陵拜太子洗馬舊東宮官屬通為清選洗馬掌文翰尤其清者近世用人皆取甲族有才望者時於陵與周捨並擢充職高祖曰官以人而清豈限以甲族時論以為美唐書曰李綱字文紀隋開皇末為太子洗馬皇太子勇嘗以歲首宴宮臣左庶子唐令則自請奏琵琶又歌武媚娘之曲綱白勇曰令則身任宮卿職當調護乃於宴座自比倡優進淫聲穢視聽事若上聞罪在不測豈不累於殿下臣請遽正其罪勇曰我欲為樂耳君勿多事綱趨而出及勇廢黜文帝召東宮官屬切讓之無敢對者綱對曰今日之事乃陛下之過非太子罪也太子才非上品性是常人若得賢明之士輔道之足堪繼嗣皇業方今多士盈朝當擇賢居任奈何以絃歌鷹犬之才日在其側致令至此乃陛下誡道不足豈太子之罪耶辭氣凜然左右皆為之失色文帝曰令汝在彼豈非擇人文士傳曰江統字應元召補洗馬每有疑滯大事章表奏議輒為同官所推常為之作草韓子曰勾踐入宦於吳執干戈為吳王洗馬故能殺夫差於姑蘇傅咸申懷賦序曰余自無施謬為眾論所許補太子洗馬才不稱職意常默然傅咸感別賦序曰有人魯庶叔雅量弘濟思心邃遠余自少與之相長情相親愛有如同生其後遷太子洗馬俄而謬蒙朝私猥黍斯職雖懼不稱而喜得與此子同班共事天下之遇未有若此周旋三載魯生遷尚書郎雖別不遠而情甚悵恨退作茲賦云爾徐邈問玉珉曰漢法制洗馬冠高山冠職如謁者中朝新制洗馬進賢冠出則在馬前清道故曰洗馬太子司議郎六典曰司議郎掌侍從規諫駮正啟奏凡皇太子出入朝謁從享及, SBCK: ''}
