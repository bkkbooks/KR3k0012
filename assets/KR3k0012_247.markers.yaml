  - {type: variant, offset: 1924, length: 0, content: '', SBCK: 主通逺近牋表宫門禁防唐書曰龍朔二年改門大夫爲宫門郎職比城門郎三輔決録曰桓帝以平陵魯寛爲太子門大夫太子左衛率六典曰左右衛率掌東宫兵仗羽衛之政令揔諸曹之事凡親勲翊府及廣濟等五府屬焉副率爲之貳凢元正冬至皇太子朝宫臣及諸方使則率衛府之屬以儀仗爲左右廂以衛之􅀂皇太子備禮出入則如鹵簿之法以從續漢書百官志曰衛率四百石主門衛晉志曰凢太子出前衛率導在前廣麾外左右二率從夾導輿車後衛率從在烏皮外並帶㦸執刀其服並視左右衛將軍晉書曰劉卞爲􅉖懐太子左率知賈后必害太子乃問張華華曰君欲如何卞曰東宫儁乂如林四率精兵万人公居阿衡之任􅀂得公命皇太子因朝使録尚書事廢賈后金墉兩黄門力耳華曰廢立大事又非所能賈后微聞迁卞爲雍州刺史卞恐終露乃服藥卒晉中興書曰禇翼字謀逺少失父以才藝堪幹立名粛祖即位徴拜屯􅀐校尉迁太子左衛率隋書曰宇文述毎與晉王謀事及晉王爲皇太子以述爲左衛率舊令率官第四品上以述素貴遂進率品爲第三其見重如此唐書官品志曰左右衛率各一人位視御史中丞各有丞左率領果毅統逺立忠建寜凌鋒夷冠祚德等七營右率領崇榮永􅁻崇和細射等四營二率各置尉山公啓事曰太子左率鈌侍威重冝得其才無疾患者城陽太守石崇忠讜有文武河東太守焦勝清貞有信義皆其選也右衛率晉中興書曰郄恢字道弲爲太子右衛率恢八尺美􅂡髯風神魁梧烈宗異之}
