  - {type: variant, offset: 850, length: 3, content: 冑撫軍, SBCK: 胄皆揔其儀注而爲之導引􅀂皇太子備禮出入乗軺車位亞家令焉漢書曰顔師古注曰掌知漏刻曰率更續漢書百官志曰率更令秩千石與庶子舎人更直職似光禄勲掌宫殿門户之禁郎將屯衛之士晉起居注曰武帝太康八年詔曰太子率更僕東宫之逹官也其進品第五秩與中庶子左右衛率同職擬光禄勲也隋書曰明克讓轉率更令進爵爲侯太子以師道處之恩禮甚厚有四方珎味輙以賜之于時東宫盛徴天下才學之士至於􅀶物洽聞皆出其下唐書官品志曰率更令掌􅇊樂漏刻也物理論曰今有吕子義清賢士也爲太子率更令太子家令六典曰家令之職掌皇太子之飲膳食儲庫藏之政令揔食官典倉司藏三署之官屬皇太子備禮出入則乗軺車威儀先諸臣以導引􅀂􅀕祀賔客則供酒食以爲獻王漢書曰文帝以晁錯爲太子家令多所獻替稱爲智囊漢書曰踈受字公子爲太子家令恭謹敏而有辤宣帝置酒太子宫受奉觴上壽辝禮閑雅上甚􅂬愜續漢書百官志曰太子家令秩千石主倉榖物職如司農少府擬廷尉也蜀志曰譙周字尹南後主爲太子以周爲家令後主時頗出遊觀増廣聲樂周上諌曰昔王莽之敗豪桀並起跨州據郡欲併神器於是賢才智士思望所㱕未必以其􅀔之廣狹唯其德之薄厚也宋書曰太子家令主内茵蓐床机諸供中之物又知官奴婢月用錢内庫米塩車牛刑獄唐書官品志曰家令掌刑法食膳倉庫什物奴婢等事太子僕六典曰太子僕之職掌車輿乗􅀐儀仗之政令及䘮葬之禮物卞其次叙與其出入而供給之皇太子之車輅三一曰金輅二曰軺輅車三曰四望凢皇太子備禮而出則率廐牧令進輅僕親馭焉後漢書太子少傅屬官有太子僕一人秩千石主車馬職如太僕太子五日一朝非入朝日遣僕及中允朝朝入請問起居沈約宋書曰太子僕􅁗官也宋起居注曰元嘉中以散􅀐常侍荀伯子爲太子僕隋書曰柳粛迁太子僕太子廢坐除名爲民大業中帝與叚逹語及庶人罪惡之狀逹云柳粛在宫大見踈斥帝問其故荅曰學士劉臻甞進章仇太翼於宫中爲巫蠱事粛知而諌曰殿下帝之冢子位當儲二誡在不孝無患見疑劉臻書生皷揺脣舌適足以相誑誤願陛下勿納之庶人不懌他日謂臻曰汝何故漏洩使栁肅知之令面折我唐書官品志曰僕掌宗族親踈車輿􅀐乗也太子典膳丞六典曰典膳郎掌進膳甞食之事丞爲之貳每夕􅈰官於厨更直北齊書曰門下妨始別置典膳􅈰有}
