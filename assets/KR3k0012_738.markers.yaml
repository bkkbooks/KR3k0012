  - {type: variant, offset: 28, length: 0, content: '', WYG: 都}
  - {type: variant, offset: 29, length: 0, content: '', WYG: 守百姓李道念以公事到澄見謂汝有重病荅曰舊有冷病至今五年衆醫不差澄為診謂曰汝病非冷非熱當是食鷄子過多所致今取蒜一升煮服仍吐一物如升涎褁之動開㸔是鷄雛羽翅𤓰距具足能行走澄曰此未盡更服所餘藥又吐得如何者雞十三頭而病差當時稱妙北史曰齊蘭陵王長恭有戰功帝忌之人謂長恭勿預事長恭然其言未能退及江淮冦擾恐復為将歎曰我去年面腫今何不發自是有疾不療後魏書曰李諧為人短小六指因癭而舉頥因跛而緩歩因謇而徐言人言李諧善用三短北史曰周裴俠嘗遇􅍚沉頓士友憂之忽聞五鼔便即驚起問左右可向府耶所苦因此而瘳晉公䕶聞之曰裴俠危篤若此不應憂公因聞聲疾病遂愈此豈非天祐其勤恪也唐書曰太宗謂侍臣曰治國與養病無異也病人覺愈彌須將䕶若有觸犯必至殞命治國亦然天下稍安尤須兢慎若便縱逸必至䘮敗又曰有患應病者問醫官蘇澄云自古無此方今吾所撰本草網羅天下藥物亦謂盡矣試將讀之應有所覺其人每發一聲腹中輙應唯至一藥再三無聲過至他藥復應如故澄因為處方以此藥為主其病自除老子曰知不知上不知知病聖人不病以其病病}
