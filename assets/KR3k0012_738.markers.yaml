  - {type: variant, offset: 981, length: 2, content: 於吾, WYG: 三月不愈孤聞人臣之道主疾臣憂且吴王遇孤恩澤甚厚恐疾之無瘳也唯先生卜焉范蠡曰今日日展陽隂上下和親無相入者}
  - {type: variant, offset: 984, length: 19, content: 所攝耳問之果然法善悉為禁劾其病遂愈六韜, WYG: 日天一救且何憂哉王不死明矣到己巳當有瘳也吕氏春秋}
