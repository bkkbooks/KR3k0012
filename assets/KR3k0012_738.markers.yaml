  - {type: variant, offset: 973, length: 1, content: 免, WYG: 與不智者敗之使秦政如此則一舉而亡國矣韓詩外傳曰人主之病十有二發非有賢醫莫能治也何謂十二發曰痿瘚逆脹滿支隔盲煩喘痺風賢醫治之如何曰省事輕刑則痿不作無使小民飢寒則蹶不作無令財貨上流則逆不作無使倉廩積腐則脹不作無使府庫充實則滿不作無使群臣縱恣則支不作無使下情不上通則隔不作上則恤下則盲不作}
