  - {type: variant, offset: 2552, length: 279, content: 肯舍乃攜玉至幻人宮稱以金銀絡以珠玉鼻口所納皆非常人閒物也由是王心厭宮室幻人曰易之耳王悅遂肆志遠遊西京雜記曰余所知有鞠道龍善為幻術向余說古事有東海人黃公少時為幻能刺虵御虎佩赤金為刀以絳繒束髮立興雲霧坐成山河及衰老氣力羸憊飲酒過度不能復行其術又曰淮南王好方士皆以術見遂後畫地為江河攝土為山嶽嚱呼為寒暑噴嗽為雨露王亦卒與諸方士俱去異苑曰高陽新城叟晉咸寧中為淫祠妖幻署置百官又以木自鑒輒見所署置之人衣冠麗然百姓信惑京都翕習收而斬之又曰上虞孫湲奴多諸幻伎元嘉初叛建安中復出民閒治人頭風流血滂沱噓之便斷創又即歛虎傷虵噬煩毒乘死禁護皆差向空長嘯則群雀來萃夜呪蚊虻悉皆死於側, SBCK: ''}
