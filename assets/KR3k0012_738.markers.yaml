  - {type: variant, offset: 2095, length: 0, content: '', SBCK: 旣飲而疾作時河南廳事壁上有角漆畫作虵廣意盃中虵卽角影也復置酒於前處謂客曰酒中復有所見不荅曰所見如初廣乃告其所以豁然意解沉痾頓愈又風俗通曰予之祖郴爲汲令以夏至日}
  - {type: page-break, offset: 2095, content: '', id: KR3k0012_SBCK_738-4b}
  - {type: variant, offset: 2095, length: 0, content: '', krp: 旣飲而疾作時河南廳事壁上有角漆畫作虵廣意盃中虵卽角影也復置酒於前處謂客曰酒中復有所見不荅曰所見如初廣乃告其所以豁然意解沉痾頓愈又風俗通曰予之祖郴爲汲令以夏至日}
  - {type: variant, offset: 2096, length: 2, content: 郭璞, SBCK: 主簿杜宣賜酒時北壁上有懸弓照於杯中某影如虵宣畏惡之然不敢不飲其日便得病云虵入腹郴召宣於故處設酒盃中有一虵因謂宣此乃壁上弓影耳非他恠宣意遂解甚夷懌又}
