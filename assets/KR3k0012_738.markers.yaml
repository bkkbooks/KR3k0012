  - {type: variant, offset: 2483, length: 2, content: 金樓, SBCK: 見曰君有疾在腠理不治將深腠理皮膚也􅁊侯曰寡人無疾扁鵲岀􅁊侯謂左右曰醫之好利欲以不病爲功後五日復見曰君疾在血脉後五日復見曰疾在腸胃後五日見􅁊侯而還走􅁊侯使人問其故曰疾在骨髓臣是以無請也􅁊侯遂卒戰國策曰扁鵲見秦武王示之病扁鵲請除之左右曰君之病在耳之前目之下也除之使耳不聦目不明君以告扁鵲扁鵲怒而投其石曰君與智者謀之而與不智者敗之使秦政如此則一舉而亡國矣韓詩外傳曰人主之疾十有二發非有賢醫莫能治也何謂十二發曰痿蹶逆脹滿支隔肓煩喘痺風賢醫治之如何曰省事輕刑則痿不作無使小民飢寒則蹶不作無令財貨上流則逆不作無使倉廪積腐則脹不作無使府庫充實則滿不作無使群臣縱􅔤則支不作無使下情不上通則隔不作上材恤下則盲不作法令奉用則煩不作無使下怨則喘不作無使賢人伏匿則痺不作無使百姓歌吟誹謗則風不作夫重臣羣下者人主之心腹支體也心腹支體無患則人主無疾矣故非有賢醫莫能治也人主有此十二疾而不用賢醫則國非其國也趙曄吳越春秋曰越王出石室召范蠡謂之曰吳王疾病三月不愈􅀌聞人臣之道主疾臣憂且吳王遇􅀌恩澤甚厚恐疾之無瘳也唯先生卜焉范蠡曰今日日辰陰陽上下和親無相入者法曰天一救且何憂矣王不死明矣到已巳當有瘳也吕氏春秋曰齊王疾瘠使人之宋迎文摯摯視疾謂太}
