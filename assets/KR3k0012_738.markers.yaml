  - {type: variant, offset: 5, length: 2, content: 禁後, krp: 疾病部一揔敘疾病上說文曰疾病也疹病加也疢熱病也癉勞病也疸黃病也痁入病也釋名曰疾病也客氣中人急疾也病並也與正氣並在膚體中也疹診也有結聚可得侯見也痛通也通在膚脉中也癢楊也其氣在皮中人摇發之揚出也爾雅曰痛瘏虺頽玄黃劬勞咎顇瘽瘉鰥戮癙癵㾖痒疷疵閔逐疚痗瘥痱􅓠瘵瘼癠病也方言曰南楚疾愈謂之差或謂之閒或謂之知通語也或謂之慧或謂之了或謂之瘳或謂之除殗於怯反殜音業㣲也晉楚之閒凡病不甚日殗殜郭曰半臥半起也凡病少愈而加劇謂之不斟斟盆也或謂之何斟言雖小損無所益也瘼音莫復病也東濟海岱之閒曰瘼或曰癁泰曰瘎音閻或諶周易無妄卦曰無妄之疾勿藥有喜也周禮天官下曰疾醫掌養萬民之疾病四時皆有癘疾春時有痟首疾夏時有痒疥疾秋時有瘧寒熱疾冬時有嗽上氣疾又曰醫師掌醫之政令凡邦之有疾病者有疕瘍者造焉則使醫分而治之禮記曲禮下曰君使士射不能則辭以疾曰某有負薪之憂又曰曾子寢疾病樂正子春坐於狀下鄭玄注子春曾參弟曾元曾申坐於足元申曾參之子童子隅坐而執燭童子曰華而睆大夫之簀與華畫也謂牀簀也說者以睆爲刮節月字或爲刮子春曰止以病困不可動曾子聞之瞿然曰呼呼虚憊之聲也曰華而睆大夫之簀與曾子曰然斯季孫之賜也我未之能易也元起易簀曾元曰夫子之病革矣不可以變幸而至於旦請敬易之革急也變動也又喪服大記曰疾病外内皆掃爲賔客將來問病也疾困曰病也君大夫徹懸士去琴瑟聲音動人病欲靜也寢東首于北牖下廢床徹䙝衣加新衣體一人男子不死于婦人之手婦人不死于男子之手又曰君於大夫疾三問之士疾一問之左傳成十五年曰晉侯疾病求醫于秦泰伯使醫緩爲之未至公夢疾爲二竪子曰彼良醫也懼傷我焉逃之其一曰居肓之上膏之下若我何醫至曰疾不可爲也在肓之上膏之下攻之不可達之不及藥不至焉不可爲也公曰良醫也厚爲之禮而歸之又昭上曰晉侯有疾鄭伯使公孫僑如晉聘且問病叔向問焉曰寡君之疾病卜人曰實沉臺駘爲祟史莫之知敢問此何神也子産曰若君身則亦出入飲食哀樂之事也山川星辰之神又何爲焉言實沉臺駘不爲君疾僑聞之君子有四時朝以聽政晝以訪問夕以脩令夜以安身於是節宣其氣勿使有所壅閉湫子小切小底以露其體湫集底帶也露羸也一之則血氣集滯面體羸露今無乃一之則切生疾矣又昭上曰晉侯有疾求醫於秦泰伯使醫和視之曰疾不可爲也是謂近女室疾如蠱蠱惑也非鬼非食惑以喪志惑女色而失志良臣將死天命不祐良臣不折君過故將死而天不祐公曰女不可近乎對曰節之天有六氣降生五味發爲五色徵爲五聲淫生六疾事具醫門又昭二曰鄭子産聘于晉韓宣子曰寡君寢疾今夢黄熊奴才反入于寢門其何厲鬼也對曰堯殛鯀于羽山其神化爲黄熊以入于羽淵實爲夏郊三代祀之晉爲盟主其或未之祀乎韓子祀夏郊晉侯有閒春秋穀梁傳曰季孫行父秃晉郄克跛孫良父眇曹公子手僂同聘于齊齊使秃者御秃者跛者御跛者眇者御眇者僂者御僂者蕭同叔子處臺而笑之客不恱相立胥閭而語移日不解齊有知者曰齊患必自此始也麋俗胥閭門名也御迎也春秋公羊傳曰衛縶不立惡疾也何休解曰惡疾聾盲之屬國語魯語曰子叔聲伯如晉郄犨欲與之邑弗受郄犨晉卿苦成叔也歸鮑國謂之曰子何以辭苦成叔之邑對曰吾聞之不厚其棟不能任重重莫若國棟莫若德夫苦成叔欲任兩國而無大德亡無日矣譬之如疾余懼易焉疾疫厲病論語曰曾子有疾召門弟子曰啓予足啓予手啓開也曾以爲孝子受體於父母當完全之今疾或死故使弟子開衾而視之史記曰陳􅎮適秦秦惠王曰子去寡人之楚亦思寡人不陳􅎮對曰聞夫越人莊舄乎王曰不聞曰越人莊舄化楚執珪有頃而病爲越聲楚王曰舄故越之鄙細人也今仕楚執珪貴極矣亦思越不對曰凡人思故在其病也彼思越則越聲不思越則且楚聲使人往聽之猶尚越聲也今臣雖弃逐之楚豈能無秦聲哉又曰留侯多疾即導引不食穀}
