  - {type: variant, offset: 24, length: 1, content: 壽, WYG: 虵入腹郴召宣}
  - {type: variant, offset: 26, length: 1, content: 姚, WYG: 故處設酒杯中有一虵因謂宣此乃壁上弓影耳非他怪宣意遂解甚夷懌又曰皇甫諡字士安因病服寒食散而性與之忤每委頓不倫嘗悲忿叩刄欲自殺叔母諌而止諡嘗上䟽曰久嬰篤􅍚軀半不仁右脚偏小十有九載又服寒食藥違諸節度辛苦荼毒于今七年隆冬祼􅃝食氷當暑煩悶加以咳逆或若温瘧或類傷寒浮氣流腫四支酸重於今困劣宋書曰羊欣有病不服藥飲符水而已兼善醫術撰藥方數十卷沈休文宋書曰謝述有心虛疾性理時或􅆾謬除吴郡太守以疾不之官裴子野宋畧曰殷景仁入居西州疾篤上為之累息勅西州道上不得有車聲謝綽宋拾遺曰宋慤表曰臣昔貧賤時嘗􅍚病家人為臣齋勤苦七日臣晝夜夢見一童子青衣持縑廣數寸與臣臣問之用此何為荅曰西王母符也可服之服竟便覺一二日病差梁書曰范雲忽中􅍚居二日半召醫徐文伯視之文伯曰緩之一月乃復欲速即時愈正恐二年不復可救雲曰朝聞道夕死可矣而况二年文伯乃下火而壯焉重衣以覆之有頃許汗流於地即起二年果卒南史曰褚澄善醫術建元中為}
