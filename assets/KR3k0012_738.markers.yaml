  - {type: variant, offset: 751, length: 0, content: '', WYG: 也用道術則無所不治也淮南子曰土地各以類生人是故山氣多男澤氣多女水氣多瘖風氣多聾林氣多瘧木氣多傴生子多有此疾岸下氣多尰温氣所生石氣多力險阻氣多癭暑氣多殘殘折不緒寒氣多夀谷氣多痺丘氣多狂平氣多仁下而平也陵氣多貪象陵積聚春秋後語曰齊桓公六年越醫扁鵲過齊桓侯客待之入朝見曰君有疾在腠理不治将深腠理皮膚也桓侯曰寡人無疾扁鵲出桓侯謂左右曰醫之好利欲以不病為功後五日復見曰君疾在血脈後五日復見曰疾在腸胃後五日見桓侯而還走桓侯使}
