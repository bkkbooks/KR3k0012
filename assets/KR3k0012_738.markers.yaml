  - {type: variant, offset: 3546, length: 160, content: 牲積薪燃火盛熾束帶入火中章紙燒盡而開形體衣服猶如初時王凝之為江祠王當酒行為王刷頭簪荷葉為帽與王亦當不覺有異到坐之後荷葉乃見一坐驚駭桓譚新論曰方士董仲君犯事繫獄佯死目陷虫爛故知幻術靡所不有又能鼻吹口歌聳眉動目荊州有鼻飲之蠻南城有頭飛之夷非為幻也孔偉七引曰弄幻之士因時而作殖苽種菜立起尋尺投芳送臭賣黃售白麾天興雲霧畫地成江海, SBCK: 十八}
