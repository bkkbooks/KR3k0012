  - {type: variant, offset: 2293, length: 98, content: 人以道榮好尚將法授之謂道榮曰我本恒山仙人有罪為天官所謫今限滿將歸鄉里卿且送吾至於汾水及至汾河值水暴至其人乃臨水禹步以一符投水中流便絕徐自沙石上渡河而去道榮嘗至遼陽山中夜逢猛獸以杖畫地成大坑猛獸逐走, SBCK: 勤恪也}
