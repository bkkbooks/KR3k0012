  - {type: variant, offset: 30, length: 11, content: 能劾百鬼眾魅令自縛見形, WYG: 唯病病是以不病莊子曰尭以天下譲許由許由不受又讓於子州支父子州支父曰以我為天子可也雖然我􅃴有憂幽之病方且治之未暇治天下也又曰子耒有病喘喘然將死}
