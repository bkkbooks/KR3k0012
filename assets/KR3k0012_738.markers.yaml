  - {type: variant, offset: 749, length: 1, content: 果, WYG: 或由此乎非吾淺術所能已也又曰秦人逢氏有子少而慧及壯而有迷罔之疾聞歌以為哭視白以為黒饗香以為杇嘗甘以為苦行非以為是意之所之天地四方水火寒暑無不倒錯者焉列子曰鼻将窒者先覺燋朽體将僵者先亟犇佚心将迷者先識是非故物不至者則不反又曰宋陽里華子中年病忘朝取而夕忘夕與而朝忘在􅂗則忘行在室則忘坐不識先後不識今古魯有儒生自媒能治之華子之妻以居室之半請其方儒生曰吾試化其心變其慮庶㡬其瘳乎於是試露之而求衣飢之而求食幽之而求明生欣然吿其子曰疾可已也然吾方宻𫝊不可吿人試屏左右獨與居室七日而積年之病一日都盡又曰楊朱之友曰季梁季梁得病七日大漸其子環而泣之請謁醫季梁謂楊朱曰吾子不肖如此之甚汝奚不為我歌以曉之乎其子弗曉終謁三醫而季梁之疾自瘳墨子曰墨子病洗鼻問曰先生以鬼神為明福善禍惡今先生聖人也何故病墨子曰病者多方有得之勞苦有得之寒暑今有百門而閇其一賊何處不入哉管子曰凡國都皆有養疾聾盲喑啞跛躄偏枯不耐自生者上収而養之尹子曰與死者同病難為良醫與亡國同道不可為謀又曰人将疾也必先不甘魚肉之味韓子曰秦昭王有疾百姓買牛而家為王禱魏子曰待扁鵲乃治病終身不}
