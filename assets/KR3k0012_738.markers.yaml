  - {type: variant, offset: 2833, length: 11, content: 十年於長山為本主所得知, krp: 齊王巳怒文摯至不解履登牀王重怒叱而起病乃巳生烹文摯物理論曰趙簡子}
  - {type: variant, offset: 2834, length: 872, content: 年於長山為本主所得知有術慮必亡叛約縛枷鏁極為重複明日己失所在搜神記曰永嘉中有天竺胡人來渡江南其人有數術能斷舌復續之吐火所在人士聚觀試其斷時先以舌示賓客然後刀截血流覆地乃取置器中傳以示人視之舌頭半舌猶在既而還取續之坐有頃坐人見舌則如故不知其實斷否其續斷取絹布與人各執一頭對剪一斷之己而兩段合將視之則復還連絹無異故體時人多疑以為幻陰乃試之真斷絹也其吐火先有藥在器中取一片與黍餹合之再三吹呼己而張口火滿口中因就爇取以爨則火也又取書紙及繩縷之屬投火中眾共視之見其燒燃消糜乃盡及舉而出之故向物也靈鬼志曰太元十二年有道人外國來解吞刀吐火珠玉金銀說其所受術師曰衣非沙門也行見一人擔擔上有小籠子可受升餘語擔人云吾步行疲極欲寄君擔擔人甚怪之慮是狂人便語之云自可爾君欲何許自厝耶其人荅云若見許正欲入籠子中籠不便擔人逾怪之乃下擔入籠中籠更不大其人亦不更小擔之亦不覺重於先既行數里樹下住食擔人呼共食云我自有食不肯出止住籠中飲食器物羅列肴饍豐腆亦辨乃呼擔人來食未半語擔人我欲婦共食腹中吐出一女子年二十許衣裳容皃甚美二人共食食欲竟其夫便臥嬌語擔人云我有外夫欲來共食夫覺君勿道之婦便口中出一年少丈夫食籠中便有三人寬急之事亦復不異有頃其夫動如欲覺婦便以外夫內口中夫起語擔人曰可去即以婦內口中次及食器物此人既至國中有一家大富資財巨萬而性慳悋語擔人云試為君破慳即至其家有好馬甚珍之繫在柱上忽失去尋索不得明日見馬在五升甖中終不可破便語君作百人廚以周一窮乏馬得出耳主人即作之畢馬還在柱下明早其父母在堂上忽然不見舉家惶怖不知所在開裝器忽然見父母在澤壺中不知何由復往請之其人云君當更作千人飲食以飴百姓窮者當時便作父母在床也幽明錄曰安城人俗巫也善於幻術每至祠神時擊鼓宰三牲積薪燃火盛熾束帶入火中章紙燒盡而開形體衣服猶如初時王凝之為江祠王當酒行為王刷頭簪荷葉為帽與王亦當不覺有異到坐之後荷葉乃見一坐驚駭桓譚新論曰方士董仲君犯事繫獄佯死目陷虫爛故知幻術靡所不有又能鼻吹口歌聳眉動目荊州有鼻飲之蠻南城有頭飛之夷非為幻也孔偉七引曰弄幻之士因時而作殖苽種菜立起尋尺投芳送臭賣黃售白麾天興雲霧畫地成江海, WYG: 八}
