  - {type: variant, offset: 11, length: 6, content: 帝時有壽光侯, SBCK: 爲諸生學長安獨與妻居章病無被臥牛衣中與妻決涕泣其妻呵怒之曰仲􅀸京師尊貴在朝廷人誰踰仲􅀸}
  - {type: variant, offset: 11, length: 0, content: '', WYG: 為諸生學長安獨與妻居章病無被卧牛衣中與妻决涕泣其妻呵怒之曰仲卿京師尊貴在朝廷人誰踰仲卿者今病困不自激卭乃返涕泣何鄙也又曰朱雲年七十餘終於家病不呼醫飲藥遺言以身服歛棺周於身土周於椁魏志曰太傅鍾繇有膝疾時華歆亦以高年疾病朝見皆使虎賁轝上殿就坐後三公􅍚常以為故事吴志曰吕䝉獲關某封爵未下㑹疾發權時在公安迎置内殿所以治䕶者萬方募封内有能愈䝉疾者賜千金恐其勞動常穿壁瞻之見其小能下食則喜顧左右言笑不然則咄嗟夜不能寐病中瘳為下赦令羣臣畢賀後更増篤權自臨視命道士於星辰下為之請命晉書曰王戎先有吐􅍚居喪増甚}
