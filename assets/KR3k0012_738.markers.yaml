  - {type: variant, offset: 2099, length: 1, content: 君, SBCK: 皇甫謐字士安因病服寒食散而性與之忤毎委頓不倫嘗悲恚叩刃欲自殺叔母諌而止謐嘗上䟽曰乆嬰篤疾軀半不仁右腳偏小十有九載又服寒食藥違錯節度辛苦茶毒于今七年隆冬裸袒食冰當暑煩悶加以咳逆或若温瘧或􅀋傷寒浮氣流腫四支酸重於今困劣宋書曰羊欣有病不服藥飲符水而已兼善醫術撰藥方數十卷沈休文宋書曰謝述有心虚疾性理時或乖謬除吳郡太守以疾不之官裴子野宋略曰殷景仁入居西州疾篤上爲之累息勑西州道上不得有車聲謝綽宋拾遺曰宋慤表曰臣昔貧賤時嘗疾病}
