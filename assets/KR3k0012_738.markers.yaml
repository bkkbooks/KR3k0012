  - {type: variant, offset: 1683, length: 409, content: 治之陳尉以此符治病有効事之者數百家壽一百一十歲而死後弟子行其符不効也抱朴子曰治金創以氣吹之即斷痛登山蛇虺毒蟲中人在近者就以氣禁之其相遠者或數十里便延治之呯其姓名而呪之男也吹我右手記識其時後校問之皆即時愈也又有介象者能以氣禁一里中愈居人炊之不得蒸以氣禁樹上群鳥即墮地又於茅屋上火煮雞熟而茅不燋又禁刀矛以剌人腹以椎打之刃曲而不復入又燒釜正赤而立上久之不知熱以錢投於沸釜湯中亦探取錢而手不灼能令一市人皆坐不得起幻說文曰幻相詐幻惑幻人從反子周書云無或譸張為幻後漢書曰永寧元年西南夷撣國王詣闕獻樂及幻人能變化吐火自支解易牛馬頭元會在庭作安帝與群臣共觀大奇之又曰安帝時作九賓樂有含和賓利之獸從西方來戲于庭入前殿激水化成魚嗽水作霧化成黃龍長八丈出水遨戲于庭炫熠日光又曰解奴辜張貂者亦不知是何郡國人也皆能隱淪出入不由門戶奴辜能變易物形以誑幻人晉書曰郭璞將促裝去愛主人婢無由而得乃取小豆三斗繞主人宅散之主人晨起見赤衣人數千圍其家就視則滅, SBCK: ''}
