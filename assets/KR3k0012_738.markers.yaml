  - {type: variant, offset: 12, length: 0, content: '', WYG: 遣醫療之并賜藥物又斷賔客晉書曰樂廣字彦輔嘗有親客久濶不復來廣問其故答曰前在坐䝉賜酒方欲飲見盃中有虵意甚惡之既飲而􅍚作}
