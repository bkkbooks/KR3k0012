  - {type: variant, offset: 3194, length: 148, content: 其人亦不更小擔之亦不覺重於先既行數里樹下住食擔人呼共食云我自有食不肯出止住籠中飲食器物羅列肴饍豐腆亦辨乃呼擔人來食未半語擔人我欲婦共食腹中吐出一女子年二十許衣裳容皃甚美二人共食食欲竟其夫便臥嬌語擔人云我有外夫欲來共食夫覺君勿道之婦便口中出一年少丈夫食籠中便有三人寬急之事亦復不異有頃其夫動如欲覺婦, SBCK: 怒}
