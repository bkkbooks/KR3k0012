  - {type: variant, offset: 766, length: 205, content: 所以瘳北齊書曰崔子武季舒之族孫也幼時宿於外祖揚州剌史趙郡李憲家一夜夢一女姿色甚麗自云封龍王女願與崔郎私通子武悅之牽其衣裙微有裂綻未曉告辭結帶而別至明訪問乃是山神遂往祠中觀之傍畫女容狀即夢中見者裂裙尚存結帶猶在子武自是通夢忽恍成疾後逢醫禁之乃絕隋書曰張文詡常有腰疾會醫者自言善禁文詡令禁之遂為刃所傷至於頓伏床枕醫者叩頭請罪文詡遽遣之唐書曰葉法善嘗於東都凌空觀設壇醮祭城中士女競往觀之俄頃數十人自投於火中觀者大驚救, WYG: 謀}
