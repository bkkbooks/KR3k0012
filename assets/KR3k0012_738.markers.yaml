  - {type: variant, offset: 53, length: 104, content: 得大虵數丈死於門外又有神樹人止者輒死鳥過者必墜侯複劾之樹盛夏枯落見大虵長七八尺懸死其閒帝聞而徵之謂曰吾殿下夜半復常有數人絳衣被髮持杖相隨豈能劾之乎侯曰此小怪易消耳帝偽使三人為之侯劾三人登時仆他無氣帝大驚曰非魅, SBCK: 意}
