  - {type: variant, offset: 1699, length: 1133, content: 家壽一百一十歲而死後弟子行其符不効也抱朴子曰治金創以氣吹之即斷痛登山蛇虺毒蟲中人在近者就以氣禁之其相遠者或數十里便延治之呯其姓名而呪之男也吹我右手記識其時後校問之皆即時愈也又有介象者能以氣禁一里中愈居人炊之不得蒸以氣禁樹上群鳥即墮地又於茅屋上火煮雞熟而茅不燋又禁刀矛以剌人腹以椎打之刃曲而不復入又燒釜正赤而立上久之不知熱以錢投於沸釜湯中亦探取錢而手不灼能令一市人皆坐不得起幻說文曰幻相詐幻惑幻人從反子周書云無或譸張為幻後漢書曰永寧元年西南夷撣國王詣闕獻樂及幻人能變化吐火自支解易牛馬頭元會在庭作安帝與群臣共觀大奇之又曰安帝時作九賓樂有含和賓利之獸從西方來戲于庭入前殿激水化成魚嗽水作霧化成黃龍長八丈出水遨戲于庭炫熠日光又曰解奴辜張貂者亦不知是何郡國人也皆能隱淪出入不由門戶奴辜能變易物形以誑幻人晉書曰郭璞將促裝去愛主人婢無由而得乃取小豆三斗繞主人宅散之主人晨起見赤衣人數千圍其家就視則滅甚惡之請郭璞曰君家不宜畜此婢可於東南二十里賣之慎勿爭價則此妖可除也主從之璞陰令人賤買此婢復為符投井中數千赤衣人皆反縛一一自投于井主人大悅璞攜婢而去後魏書曰悅般國真君九年遣使朝貢并送幻人稱能割人喉脈令斷擊人頭令碎陷皆血出淋落數升或盈鬥以草藥令嚼咽之須臾血止世祖恐言是虛乃取死囚試之皆驗崔鴻北涼錄曰玄始十四年七月西域貢吞刀吐火秘幻奇伎北齊書曰由吾道榮琅琊人也初晉陽有人甚明法術為人傭力無識知者道榮聞之訪得其人以道榮好尚將法授之謂道榮曰我本恒山仙人有罪為天官所謫今限滿將歸鄉里卿且送吾至於汾水及至汾河值水暴至其人乃臨水禹步以一符投水中流便絕徐自沙石上渡河而去道榮嘗至遼陽山中夜逢猛獸以杖畫地成大坑猛獸逐走唐書曰顯慶元年上御安福門樓觀大酺胡人欲持刀自剌以為幻戲上不許之乃下詔曰如聞在外有婆羅門胡等每於戲處乃將劍剌肚以刀割舌幻惑百姓極非道理宜並遣發還蕃勿令久住仍約束邊州若更有此色並不須遺入朝金樓子曰周穆王時西極有化人入水火貫石及山川移城邑秉虛不墜觸實不礙千變萬化不可窮極穆王為起中天之臺鄭衛奉承雲之樂日日獻玉衣月月薦玉食幻人猶不肯舍乃攜玉至幻人宮稱以金銀絡以珠玉鼻口所納皆非常人閒物也由是王心厭宮室幻人曰易之耳王悅遂肆志遠遊西京雜記曰余所知有鞠道龍善為幻術向余說古事有東海人黃公少時為幻能刺虵御虎佩赤金為刀以絳繒束髮立興雲霧坐成山河及衰老氣力羸憊飲酒過度不能復行其術又曰淮南王好方士皆以術見遂後畫地為江河攝土為山嶽嚱呼為寒暑噴嗽為雨露王亦卒與諸方士俱去異苑曰高陽新城叟晉咸寧中為淫祠妖幻署置百官又以木自鑒輒見所署置之人衣冠麗然百姓信惑京都翕習收而斬之又曰上虞孫湲奴多諸幻伎元嘉初叛建安中復出民閒治人頭風流血滂沱噓之便斷創又即歛虎傷虵噬煩毒乘死禁護皆差向空長嘯則群雀來萃夜呪蚊虻悉皆死於側至, WYG: ''}
