  - {type: variant, offset: 67, length: 643, content: 止者輒死鳥過者必墜侯複劾之樹盛夏枯落見大虵長七八尺懸死其閒帝聞而徵之謂曰吾殿下夜半復常有數人絳衣被髮持杖相隨豈能劾之乎侯曰此小怪易消耳帝偽使三人為之侯劾三人登時仆他無氣帝大驚曰非魅也朕相試耳解之而蘇又曰徐登萬者閩中人也本女子化為丈夫善為巫術又曰趙炳字公阿東陽人能為越方時遭兵亂疾疫大起二人遇於烏溪水之上酈元長注水經曰吳寧溪出吳寧縣烏傷之烏傷溪在今婺州義烏縣東也遂結言約共以其術療病各相謂曰今既同志旦可試各所能登乃禁溪水水為不流炳復次禁枯樹樹即生荑易曰枯楊生荑王弼注云荑者楊之秀也二人相視而笑共行其道焉登年長炳師事之貴尚清儉禮神唯以東流水為酌削桑皮為晡但行禁架所療皆除禁架即禁術也後登物故炳東入章安百姓未之知也炳乃故升第屋捂鼎而爨主人見之驚懅捂支也懅忙也炳笑不應既而爨熟屋無損異又嘗臨水求渡船人不和之和猶許也俗本作者知誤也炳乃張蓋坐其中長笑呼風亂流而濟吳志曰賀齊討山賊中有善禁者每當交戰官軍刀劍皆不得拔弓弩射矢皆還自向輒致不利齊有長思乃曰吾聞金有刃者可禁蟲有毒者可禁其無刃毒則不可禁彼必能禁吾兵也必不能禁無刃物矣乃多作勁木棓選勇力精卒五千人為先登盡捉棓彼山賊恃其善禁不嚴備於是官軍以白棒擊之彼禁不復行打殺者萬計蕭子顯齊書曰陳顯達南彭城人顯達出杜姥宅大戰被賊矢中左眼拔箭而鏃不出地黃村潘嫗善禁先以釘釘柱中嫗禹步作氣釘即時出乃禁顯達目中鏃出之又曰顧歡弟子鮑靈綬門前有一株樹本十餘圍上有精魅數見影動印樹即枯死山陰白石村多邪病村人告訴求哀歡住村人為講老子規地作獄有頃見狐狸黿鼉自入獄中者甚多即命殺, WYG: 問}
