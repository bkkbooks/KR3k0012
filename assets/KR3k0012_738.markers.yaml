  - {type: variant, offset: 5, length: 2, content: 禁後, WYG: 宋李昉等撰疾病部一總叙疾病上説文曰疾病也疹病加也疢熱也痺癆病也疽黄病也痞入病也釋名曰疾病也客氣中人急疾也病並也與正氣並在膚體中也疹診也有結聚可得診見也痛通也通在膚脈中也癢揚也其氣在皮中人揺發之揚出也爾雅曰痛瘖虺頺𤣥黄劬勞咎卒瘽瘉鰥戮癙癵㾖痒疷疪閔逐疚􅸟􅂒痱􅓠瘵􅇤病也方言曰南楚􅍚愈謂之差或謂之間或謂之知通語曰或謂之愈或謂之了或謂之瘳或謂之除奄於怯反渫音業㣲也晉楚之間凡病不甚曰奄溝郭曰半卧生起也凢病少愈而加劇謂之不斟斟益也或謂之何斟言雖小損無所益也瘼音莫復病也東濟海岱之間曰瘼或曰憂秦曰瘎昔門或諶周易无妄卦曰无妄之􅍚勿藥有喜周禮天官下曰􅍚醫掌養萬民之􅍚病四時皆有癘疾春時有痟首疾夏時有痒疥􅍚秋時有瘧寒􅍚冬時有嗽上氣􅍚又曰醫師掌醫之政令凢邦之有疾病者有疕瘍者造焉則使醫分而治之禮記曲禮下曰君使士射不能則辭以􅍚曰某有負薪之憂又曰曽子寢疾病樂正子春坐於􅇃下曽元曾申坐於足童子隅坐而執燭童子曰華而睆大夫之簀與子春曰止曽子聞之瞿然曰呼曰華而睆大夫之簀與曽子曰然斯季孫之賜也我未之能易也元起易簀曽元曰夫子之病革矣不可以變幸而至于旦請敬易之又喪服大記曰􅍚病外内皆掃君大夫徹懸士去琴瑟聲音動人病欲静也寢東首于北牖下廢床徹䙝衣加新衣體一人男子不死于婦人之手婦人不死于男子之手又曰君於大夫􅍚三問之士􅍚一問之左傳成十五年曰晉侯􅍚病求醫于秦秦伯使醫緩為之未至公夢􅍚為二竪子曰彼良醫也懼傷我焉逃之其一曰居肓之上膏之下若我何醫至曰􅍚不可為也在肓之上膏之下攻之不可逹之不及藥不至焉不可為也公曰良醫也厚為之禮而歸之又昭上曰晉侯有􅍚鄭伯使公孫僑如晉聘且問病叔向問焉曰寡君之疾病卜人曰實沉臺駘為祟史莫之知敢問此何神也子産曰若君身則亦出入飲食哀樂之事也山川星辰之神又何為焉僑聞之君子有四時朝以聽政晝以訪問夕以脩令夜以安身於是乎節宣其氣勿使有所壅閉湫底以露其體今無乃壹之則生􅍚矣又昭上曰晉侯有疾求醫於秦秦伯使醫和視之曰􅍚不可為也是謂近女室疾如蠱非鬼非食惑以喪志良臣将死天命不祐公曰女不可近乎對曰節之天有六氣降生五味發為五色徵為五聲滛生六􅍚又昭二曰鄭子産聘于晉韓宣子曰寡君􅃦􅍚今夢黄熊奴才反入于寢門其何厲鬼也對曰堯殛鯀于羽山其神化為黄熊以入于羽淵實為夏郊三代祀之晉為盟主其或未知祀乎韓子祀夏郊晉侯有間春秋榖梁傳曰季孫行父秃晉郄克跛孫良父𦕈曹公子手僂同聘于齊齊使秃者御秃者跛者御跛者僂者御僂者蕭同叔子處臺而笑之客不悦相立胥閭而語移日不解齊有知者曰齊患必此始也春秋公羊傳曰衛縶不立惡􅍚也國語魯語曰子叔聲伯如晉郄犨欲與之邑弗受郄犨晉卿若成叔也歸鮑國謂之曰子何以辭苦成叔之邑對曰吾聞之不厚其棟不能任重重莫若國棟莫若徳夫苦成叔欲兩國而無大徳亡無日矣譬之如􅍚余懼易焉論語曰曽子有􅍚召門弟子曰啟予足啟予手史記曰陳軫適至秦惠王曰子去寡人之楚亦思寡人不陳軫對曰聞夫越人莊舄乎王曰不聞曰越人荘舄仕楚執珪有頃而病為越聲楚王曰舄故越之鄙人今仕楚執珪貴極矣亦思越不對曰凡人思故在其病也彼思越則越聲不思越則且楚聲使人往聽之猶尚越聲也今臣雖棄逐之楚豈能無秦聲哉又曰留侯多􅍚即導引不食榖}
