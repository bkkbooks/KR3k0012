  - {type: variant, offset: 975, length: 1, content: 善, WYG: 令奉用則煩不作無使下怨則喘不作無使賢人伏匿則痺不作無使百姓歌吟誹謗則風不作夫重臣群下者人主之心腹支體也心腹支體無患則人主無疾矣故非有賢醫莫能治也人皆有此十二疾而不用賢醫則國非其國也趙􅁮吴越春秋}
