  - {type: punctuation, offset: 2426, content: 『, id: KR3k0012_CHANT_738-bkkpn638}
  - {type: variant, offset: 2426, length: 0, content: '', SBCK: 嘻吾見子之心矣方寸之地虚矣幾聖人也子心六孔流通一孔不達今以聖智爲病者或由此乎非吾淺術所能已也又曰秦人逢氏有子少而慧及壯而有迷罔之疾間歌以爲哭視白以爲黑響香以爲朽嘗甘以爲苦行非以爲是意之所之天地四方水火寒暑無不倒錯者焉列子曰鼻將窒者先覺燋朽體將僵者先亟犇佚心將迷者先識是非故物不至者則不反又曰宋陽里華子中年病忘朝取而夕忘夕與而朝忘在塗則忘行在室則忘坐不識先後不識今古魯有儒生自媒能治之華子之妻以居室之半請其方儒生曰吾試化其心變其慮庶幾其瘳乎於是試露之而求衣飢之而求食幽之而求明生欣然告其子曰疾可已也然吾方密傳不以告人試屏左右獨與居室七日而積年之病一日都盡又曰楊朱之友曰季梁季梁得疾七日大漸其子環而泣之請謁醫季梁謂楊朱曰吾子不肖}
  - {type: page-break, offset: 2426, content: '', id: KR3k0012_SBCK_738-7b}
  - {type: variant, offset: 2426, length: 0, content: '', krp: 嘻吾見子之心矣方寸之地虚矣幾聖人也子心六孔流通一孔不達今以聖智爲病者或由此乎非吾淺術所能已也又曰秦人逢氏有子少而慧及壯而有迷罔之疾間歌以爲哭視白以爲黑響香以爲朽嘗甘以爲苦行非以爲是意之所之天地四方水火寒暑無不倒錯者焉列子曰鼻將窒者先覺燋朽體將僵者先亟犇佚心將迷者先識是非故物不至者則不反又曰宋陽里華子中年病忘朝取而夕忘夕與而朝忘在塗則忘行在室則忘坐不識先後不識今古魯有儒生自媒能治之華子之妻以居室之半請其方儒生曰吾試化其心變其慮庶幾其瘳乎於是試露之而求衣飢之而求食幽之而求明生欣然告其子曰疾可已也然吾方密傳不以告人試屏左右獨與居室七日而積年之病一日都盡又曰楊朱之友曰季梁季梁得疾七日大漸其子環而泣之請謁醫季梁謂楊朱曰吾子不肖}
  - {type: variant, offset: 2427, length: 3, content: 聞在外, SBCK: 此之甚汝奚不爲我歌以曉之其子曰不曉終謂三醫而季粱之疾自瘳墨子曰墨子病洗鼻問曰先生以􅀑神爲明福善禍惡今先生聖人也何故病墨子曰病者多方}
