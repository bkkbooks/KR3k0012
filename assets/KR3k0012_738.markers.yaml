  - {type: variant, offset: 1345, length: 311, content: 應對不知是青因叱從兵使錄夜行人青亦復叱其從神曰皆縛夜行人青便去而都督及從者數十人人馬皆不復得去明旦行人見都督問何為在此都督曰事狀如此行人曰必是嚴公也都督曰我不能得動可報余家家人知之往叩頭啟謝青自說昨宵不知是先生乞得放遣青乃大聲曰解遣昨宵所錄夜行人還去都督乃得去其後夜行每見行人先逆問非嚴公乎又曰王方平降蔡經家北舍有姓陳者失其字嘗罷尉也聞經家有人乃詣門叩頭求乞拜見方平遣人引前與語此人便乞得隨從驅使北於蔡經方平曰君旦起向日方平從後視之言曰噫君心敘不正終不可教以仙道也當授君以地上主者之職臨去以符併一傳著小箱中以與陳尉告言此不令君度世也能令君本壽自出百餘歲也可穰災治病者命未終及無罪過者君以符到其家便愈矣若有邪鬼血食作禍崇者君, WYG: ''}
