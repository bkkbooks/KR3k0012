  - {type: variant, offset: 2420, length: 0, content: '', SBCK: 知知病聖人不病以其病病夫唯病病是以不病莊子曰堯以天下讓}
  - {type: variant, offset: 2420, length: 0, content: '', krp: 知知病聖人不病以其病病夫唯病病是以不病莊子曰堯以天下讓}
  - {type: variant, offset: 2421, length: 0, content: '', SBCK: 由許由不受又讓於子州支父子州支父曰以我爲天子可也雖然我適有幽憂}
  - {type: page-break, offset: 2421, content: '', id: KR3k0012_SBCK_738-6b}
  - {type: variant, offset: 2421, length: 0, content: '', krp: 由許由不受又讓於子州支父子州支父曰以我爲天子可也雖然我適有幽憂}
  - {type: punctuation, offset: 2422, content: ，, id: KR3k0012_CHANT_738-bkkpn636}
  - {type: 'tls:seg', offset: 2422, content: '', id: KR3k0012_CHANT_738-19a.8}
  - {type: variant, offset: 2422, length: 0, content: '', SBCK: 病方且治之未暇治天下也又曰子來有病喘喘然將死其妻子環而泣之子黎往問之倚其戸與之語曰偉哉造化以女爲䑕肝乎以女爲蟲臂乎子來曰父母於子東西南北唯命之從陰陽於人不翅爲父母信陰陽制人甚於父母又曰南榮趎曰里人有疾里人問之病者能言其病病者猶未病也若趎之問大道也譬猶飲藥以加病者也司馬彪曰加增加也趎願聞衛生之經而已矣衛生謂衛護其生全性命列子曰龍叔謂文摯曰子之術微矣吾有疾病子能已乎文摯曰唯命所聽然先言子所病之證龍叔曰吾鄕譽不以爲榮國毁不以爲辱得而弗喜失而弗憂視生如死視富如貧此奚疾哉奚方能巳之乎文摯}
  - {type: variant, offset: 2422, length: 0, content: '', krp: 病方且治之未暇治天下也又曰子來有病喘喘然將死其妻子環而泣之子黎往問之倚其戸與之語曰偉哉造化以女爲䑕肝乎以女爲蟲臂乎子來曰父母於子東西南北唯命之從陰陽於人不翅爲父母信陰陽制人甚於父母又曰南榮趎曰里人有疾里人問之病者能言其病病者猶未病也若趎之問大道也譬猶飲藥以加病者也司馬彪曰加增加也趎願聞衛生之經而已矣衛生謂衛護其生全性命列子曰龍叔謂文摯曰子之術微矣吾有疾病子能已乎文摯曰唯命所聽然先言子所病之證龍叔曰吾鄕譽不以爲榮國毁不以爲辱得而弗喜失而弗憂視生如死視富如貧此奚疾哉奚方能巳之乎文摯}
  - {type: variant, offset: 2423, length: 2, content: 下詔, SBCK: 命龍叔背明而立文摯從後向明而望之旣而}
