  - {type: variant, offset: 828, length: 854, content: 裂綻未曉告辭結帶而別至明訪問乃是山神遂往祠中觀之傍畫女容狀即夢中見者裂裙尚存結帶猶在子武自是通夢忽恍成疾後逢醫禁之乃絕隋書曰張文詡常有腰疾會醫者自言善禁文詡令禁之遂為刃所傷至於頓伏床枕醫者叩頭請罪文詡遽遣之唐書曰葉法善嘗於東都凌空觀設壇醮祭城中士女競往觀之俄頃數十人自投於火中觀者大驚救之而免法善曰此皆魅病於吾法所攝耳問之果然法善悉為禁劾其病遂愈六韜曰武王代殷丁侯不朝太公乃畫丁侯於策三箭射之丁侯病困卜者占云崇在周恐懼乃請舉國為臣太公使人甲乙日拔丁侯著頭箭丙丁日拔著口箭戊巳日拔著腹箭丁侯病稍愈四夷聞各以來貢異苑曰永嘉陽童孫權時俗師也嘗獨乘船往建寧泊在渚次宵中忽有一鬼來欲擊童因起謂曰誰敢近楊童者鬼即稽顙云實不知是楊使者童便勑使乘船飛迅駃有過猛帆至縣乃遣之又曰趙侯少好諸術姿形悴陋長不滿數尺以盆盛水閉目作禁魚龍立見侯有白米為兒所盜乃把刀畫地作獄四面開門向東嘯群鼠俱到呪曰凡非噉者過去有止者十餘剖腹看藏有米在焉曾徒跣須履因仰頭微吟雙屐自至有笑其形容者便佯說以酒杯向口中即掩鼻不脫仍稽顙謝過著地不舉永康有騎石山山上有石人騎石馬侯仰指之人馬一時落首今猶在山下神仙傳曰嚴青常從弟子家夜歸都督夜行逢青呵問何人夜行青亦厲聲問曰汝是何人而夜行都督怒應對不知是青因叱從兵使錄夜行人青亦復叱其從神曰皆縛夜行人青便去而都督及從者數十人人馬皆不復得去明旦行人見都督問何為在此都督曰事狀如此行人曰必是嚴公也都督曰我不能得動可報余家家人知之往叩頭啟謝青自說昨宵不知是先生乞得放遣青乃大聲曰解遣昨宵所錄夜行人還去都督乃得去其後夜行每見行人先逆問非嚴公乎又曰王方平降蔡經家北舍有姓陳者失其字嘗罷尉也聞經家有人乃詣門叩頭求乞拜見方平遣人引前與語此人便乞得隨從驅使北於蔡經方平曰君旦起向日方平從後視之言曰噫君心敘不正終不可教以仙道也當授君以地上主者之職臨去以符併一傳著小箱中以與陳尉告言此不令君度世也能令君本壽自出百餘歲也可穰災治病者命未終及無罪過者君以符到其家便愈矣若有邪鬼血食作禍崇者君便以符帶此傳以勑社吏當收送其鬼心中亦當知其輕重臨時以, SBCK: 虵}
