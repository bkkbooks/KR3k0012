  - {type: variant, offset: 2101, length: 0, content: '', SBCK: 人爲臣齊勤苦七日臣晝寢夢見一童子靑衣持縑廣數寸與臣臣問之用此何爲荅曰西王母符也可服之服符竟便覺一二日病差梁書曰范雲忽中疾居二日半召醫徐文伯視之伯曰緩之一月乃復欲速卽時愈止恐二年}
  - {type: variant, offset: 2101, length: 0, content: '', krp: 人爲臣齊勤苦七日臣晝寢夢見一童子靑衣持縑廣數寸與臣臣問之用此何爲荅曰西王母符也可服之服符竟便覺一二日病差梁書曰范雲忽中疾居二日半召醫徐文伯視之伯曰緩之一月乃復欲速卽時愈止恐二年}
  - {type: variant, offset: 2102, length: 2, content: 宜畜, SBCK: 復可救雲曰朝聞道夕死可矣而況二年文伯乃下火而壯焉重衣以覆之有頃許汗流於背卽起二年果卒南史曰褚澄善醫術建元中爲吳郡太守百姓李道念以公事到郡澄見謂汝有重病荅曰舊有冷病至今五年衆醫不差澄爲􅐷謂曰汝病非冷非􅀬當是食白瀹雞子過多所致今取蒜一升煑服乃吐一物如升涎裹之動開看是雞雛羽翅􅀲距具足能行走澄曰}
