  - {type: variant, offset: 3012, length: 5, content: 唯用告神為, krp: 殺婦正直也信事人也信婦德也一與之齊終身不改故夫死不嫁男子親迎男先於女剛柔之義也天先乎地君先乎臣其義一也執贄以相見敬章别也男女別然後父子親父子親然後義生義生然後禮作然後萬物安無別無義禽獸之道也壻親迎授綏親之也親之也者敬之也敬而親之先王之所以得天下也出乎大門而先男帥女女從男夫婦之義由此始婦人從人者也㓜從父兄嫁從夫夫死又雜記下曰納幣一束束五兩兩五尋納幣謂婚禮納也十箇爲束貴成數也兩者合其卷是謂五兩八尺曰尋則每卷二束也合之謂四十尺謂之疋由匹偶之云也又祭統曰國君娶夫人之辭曰請君之玉女與寡人共有幣邑事宗廟社稷此求助之夲也又經解曰婚姻之禮廢則夫妻之道苦而淫僻之罪多矣又哀公問曰哀公問於孔子曰敢問爲政如之何孔子對曰古之爲政愛人爲大所以治愛人禮爲大所以治禮敬爲大敬之至矣大婚爲大大婚旣至冕而親迎親之也公曰冕而親迎不巳重乎巳猶大也怪親迎乃服祭服也對曰合二姓之好以継先聖之後以爲天地宗廟社稷之主君何謂巳重乎天地不合萬物不生大婚萬丗之嗣也君何謂巳重焉又婚禮曰婚禮者將合二姓之好上以事宗廟而下以継後丗也故君子重之是以婚禮納采問名吉納吉納徴致禮幣爲徴信也請期求請迎之吉也皆主人筵几於廟而拜迎於門外入揖讓而升聽命於廟所以敬慎重正婚禮也父親醮子而命之迎男先於女也子丞命以迎主人筵几於廟而拜迎於門外壻執鴈而入揖譲外再拜奠鴈蓋親授之於父母也又外傳曰古者謂婚姻爲兄弟因成兄弟之義也壻曰婚以昏時徃婦曰姻因壻之來則從之而去又壻之父曰姻婦之父曰婚爾雅取其内外父黨之新者壻者陽也婦者隂也日徃而隂氣}
