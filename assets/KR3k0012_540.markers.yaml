  - {type: variant, offset: 2820, length: 0, content: '', WYG: 育人民也育生長也又小雅曰我行其野刺宣王也刺其不正嫁娶之數而有荒政多淫婚之俗我行其野蔽芾其樗婚姻之故言就爾居樗惡木也箋云樗之蔽芾始生謂仲春之時嫁娶之月婦之父壻之父相謂為婚姻言我乃以此二人之命故我就女居我豈不以其禮来乎責之也爾不我蓄復我邦家我行其野言采其蓫婚姻之故言就爾宿爾不我蓄言歸思復又文王大明曰摯仲氏任自彼殷商来嫁於周曰嬪於京摯國任姓也摯國之中女也王季太王之子文王父也太任從殷商之畿内嫁為婦扵周之京配王季共行仁義之徳同志意也大戴禮逸禮曰子孫娶妻嫁女必擇孝弟世世有行義者是則其子孫慈悌孝愛不敢淫暴黨無不善三族輔之故鳯凰生而有仁義之意虎狼生而有貪戾之心嗚呼戒之哉無}
