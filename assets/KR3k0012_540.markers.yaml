  - {type: variant, offset: 2084, length: 564, content: 東觀漢記曰吳良濟郡人為郡議曹掾正旦史入賀太守門下掾王望前言曰齊郡敗亂遭離盜賊人民飢餓不聞雞鳴狗吠之音明府視事五年五穀豐熟家給人足今日歲首請上雅壽掾史皆稱萬歲良跪曰門下掾侒謟明府勿受其觴盜賊未盡人民困乏良曹掾尚無絝望曰議曹憜寙自無絝寧足不為家給人足耶太守曰此生言是也遂不舉觴賜鰒魚百枚署功曹後漢書曰竇后定策立靈帝帝以太后有授立之功率群臣朝于南朝親饋上壽也魏書曰文帝為魏王南征次譙大饗六軍及譙父老設伎樂百戲令曰先王云樂其所自生禮不忘其本譙霸王之邦真人本土其復譙租稅二年三老上壽日久而罷晉書禮志曰元正上壽謁者引王詣樽酌壽酒跪授侍中侍中跪置卿座前王還王自酌置位前謁者跪奏藩王臣某等奉觴再拜上千萬歲四箱樂作百官再拜已飲又再拜唐書曰元和十四年齊魯初平宴文武百寮裴度舉觴獻壽跪而言曰陛下德配天地明並日月神武獨斷寇逆削平錫宴群臣當茲令節臣備位台司幸逢昌運願與四海九州之人同上千萬歲壽上執酒為飲之管子曰桓公管仲鮑叔牙甯戚四人飲飲酣桓公謂鮑叔牙曰盍不起為寡人壽乎鮑叔牙奉杯而起曰使公母忘出在莒時也使管子母忘束縛在於魯也使甯戚母忘其飯牛車下也桓公避席再拜曰寡人與二大夫能毋忘夫子之言則齊國之社稷不危也燕丹子曰太子置酒請荊軻酒酣太子起為壽贄尚書曰五玉三帛二牲一死贄三帛諸侯世子執緟公之孤執玄附庸之君執黃二生卿執羔大夫執鴈一死士執雉玉帛生死所為以贄以見之, SBCK: ''}
  - {type: variant, offset: 2084, length: 4, content: 東觀漢記, WYG: 問乃致髙車子孫千億廣樹厥家婚姻上易歸妹九四}
