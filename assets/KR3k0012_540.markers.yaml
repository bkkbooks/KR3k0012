  - {type: variant, offset: 10, length: 5, content: 鹿鳴宴群臣, SBCK: 士冠禮筮于廟門鄭玄注云筮者告於廟重成人之禮主人玄冠朝服緇帶素韠即位于門東西面筮人即席坐西靣卦者在左卒筮書卦執以示主人筮人還東而疾占卒進告吉前期三日筮賔如求日之儀筮賔筮可使冠子者乃賔􅀫賔許厥明夕爲期于廟門之外主人立于門東兄弟在其南擯者請期宰告曰質明行事夙興設洗陳服于房中西墉下爵弁服纁裳純衣緇帶韐皮弁服素積緇帶素韠􅀇裳黄裳􅄂裳緇帶爵韠緇布冠主人立于阼階下兄弟立于洗東將冠者出房南面賛者奠纚笄櫛于筵南端􅜂皮弁冠櫛筵入于房筵于戸西南面冠者就筵西拜受觶冠者奠觶于薦東筵北面坐取脯降自西適東壁北面見于母時母在闈門之内婦人入廟内闈門母拜受子拜送母又拜賔降直西序東面主人降復􅀄位冠者立于西階東南面賔字之冠者對賔出主人送于廟門外請醴賔就次此醴當作禮禮賔者謝其自勤勞冠者見於兄弟兄弟再拜冠者荅拜入見姑姉如見其母如見母者亦北面姑姉不拜也不見妹妹卑也乃易服服玄冠玄端爵韠奠贄見于君遂以贄見于大夫郷先生􅀂􅀌子則父兄戒􅀫􅀂庶子則冠于房外南面遂醮焉加始祝曰令月吉日始加元服弃尒㓜志順􅈛成德壽考惟祺介尒景福再加曰吉月令辰乃申尒服敬尒威儀淑愼􅈛德眉壽萬年永受斯福三加曰以歲之正以月之令咸加􅈛服兄弟具在以成厥德黄耇無疆受天之慶醴辭曰甘醴惟厚}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_SBCK_540-1b}
  - {type: variant, offset: 10, length: 5, content: 鹿鳴宴群臣, WYG: 士冠禮筮於廟門鄭𤣥注曰筮者告於廟重成人之禮主人𤣥冠朝服緇帶素韠即位於門東西面筮人即席坐西面卦者在左卒筮書封執以示主人筮人還東面旅占卒進告吉前期三日筮賔如求日之儀筮賔筮可使冠子者乃宿賔賔許厥明夕為期於廟門之外主人立於門東兄弟在其南擯者請期宰告曰質明行事夙興設洗陳服於房中西墉下爵弁服纁裳純衣緇帶韎韐皮冠服素積緇帶素韠𤣥端黄裳雜裳緇帶爵韠緇布冠主人立於阼階下兄弟立於洗東将冠者出房南面賛者奠纚䈂櫛于筵南端徹皮弁冠櫛筵入于房筵於户西南面冠者就筵西拜受觶冠者奠觶於薦東筵北面坐取脯降自西適東壁北面見於母時母在闈門之内婦人入廟由闈門母拜受子拜送母又拜賔降立西序東面主人降復初位冠立於西階東南面賔字之冠者對賔出主人送於廟門外請醴賔就次此醴當作禮禮賔者謝其勤勞也冠者見於兄弟再拜冠者答拜入見姑姊如見其母如見母者亦北面姑姊亦俠拜也不見妹妹卑也乃易服服𤣥冠𤣥端爵韠奠贄見於君遂以贄見卿大夫鄉先生若孤子則父兄戒宿若庶子則冠於房外南面遂醮焉加始祝曰令月吉日始加元服棄爾幼志順爾成徳夀考維祺介爾景福再加曰吉月令辰乃申爾服敬爾威儀淑慎爾徳眉夀萬年永受斯福三加曰以嵗之正以月之令咸加爾服兄弟具在以成厥徳黄耉無疆受天之慶醴辭曰甘醴惟厚}
