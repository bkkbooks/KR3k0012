  - {type: variant, offset: 2074, length: 5, content: 薦勳祖廟布, SBCK: 蕭子冠子箴曰是月惟令敬擇良辰式遵又國風曰谷風刺夫婦失道也衛人化其上􅁋於新婚而弃其舊室夫婦離絶國俗傷敗焉習習谷風以隂以雨僶俛同心不冝有怒德音莫違及爾同死又曰綢繆刺晋亂也國亂則婚姻不得其時焉不得其時謂不及中春之月又曰東門之楊刺時也婚姻失時男女多違親迎女猶有不至者也東門之楊其葉牂牂興也牂牂然盛貌言男女失時不速秋冬箋云楊葉牂牂三月中也興者言時晚也失仲春之月婚以爲期明星煌煌期而不至也箋云親迎之禮以婚時女留他色不肯時行乃至}
