  - {type: variant, offset: 25, length: 3, content: 宴兄弟, krp: 將冠子冠者至揖譲而入聞齊衰大功之喪如之何冠者賔及賛者孔子曰内喪則廢外喪則冠而不醴徹饌而歸即位而哭如冠者未至則廢内喪同也不醴不醴子也其廢者喪成服因喪不冠如將冠子而未及期日而有齊衰大功小功之喪則因喪服而冠廢告禮而因喪冠俱成人之服及至也除喪不改冠乎孔子曰天子賜諸侯大夫冕弁服於太廟歸設奠服賜於斯乎有冠醮無冠醮酒爲醮冠禮醴重而醮輕此服賜服酌用酒尊賜也不醴明不爲改冠改冠當醴之父没而冠則巳冠掃地而祭於禰巳祭而見伯父叔父而后饗冠者饗謂之禮又冠義曰冠而后服備服備而后容體正顔色齊辭令順言報未備者未可求以三始也童子之服采衣紒故曰冠者禮之始也是故古者聖王重冠古者冠禮筮賔所以敬冠事敬冠事所以重禮重禮所以爲國本也國以禮爲夲故冠於阼以著代也醮於客位三加彌尊加有成也阼謂主人之北也適子冠於阼者不醮則醮用酒於客位敬而成之也户西爲客位庶子冠於房户外又因醮焉不代父也冠者𥘉加緇布冠次加受弁次弃次加爵弁毎加益尊所以益成}
