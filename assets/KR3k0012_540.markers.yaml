  - {type: variant, offset: 3012, length: 4, content: 唯用告神, WYG: 教婦正直也信事人也信婦徳也壹與之齊終身不改故夫死不嫁男子親迎男先於女剛柔之義也天先乎地君先乎臣其義一也執贄以相見敬章别也男女有别然後父子親父子親然後義生然後禮作然後萬物安無别無義禽獸之道也壻親迎授綏親之也親之也者敬之也敬而親之先王之所以得天下也出乎大門而先男帥女女從男夫婦之義由此始婦人從人者也幼從父兄嫁從夫夫死從子無所感自遂也又雜記下曰納幣一束束五兩兩五尋十個}
