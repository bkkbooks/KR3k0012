  - {type: variant, offset: 1059, length: 218, content: 衣鶡尾以列陛讌則服常服設絲竹之樂唯宿衛者列伏大會於太極殿小會於東堂世說曰過江諸人每至暇日相要出新亭藉卉飲宴周侯中坐而歎曰風景不殊舉目有江河之異皆流淚唯丞相愀然作色曰當共勠力王室剋復神州何至作楚因相對而泣也傅玄元會賦曰考夏后之遺訓綜殷周之典藝採秦漢之舊儀定元正之嘉會潘岳閑居賦曰席長筳列孫子柳垂陰車結軌陸㰅紫房水佳頳鯉或宴于林或禊於汜昆弟班白兒童稚齒稱萬壽以獻觴咸一懼而一喜壽觴舉慈顏和浮水樂飲絲竹駢羅頓足起舞柷音高歌人生安樂熟知其他古詩, SBCK: ''}
