  - {type: variant, offset: 3625, length: 152, content: 子非天子所命者有列會之事則執皮帛繼子男之下婦人初見舅姑執榛栗棗脩脯棗進於姑榛栗進於舅也執贄幣相見相敬也白虎通曰臣見君有贄者何贄者質己之誠王者緣臣子心以為之制差有尊卑以副其意也公侯以玉為質玉者取其燥不輕濕不重明公侯之德全也卿以羔為贄羔者取其群而不黨卿職在盡忠率下不黨大夫以鴈為贄者取其飛成行列大夫職在奉命適, SBCK: 平御覽卷第五百}
