  - {type: variant, offset: 2659, length: 217, content: 雉夏用腒下大夫相見以鴈飾之以布維之以索如執雉上大夫相見以羔飾之以布四維之結于面左頭如麛執之如士相見之禮周禮春官上大宗伯曰以玉作六瑞以等邦國王執鎮圭公執桓圭侯執信圭伯執躬圭子執穀璧男執蒱璧鄭玄注曰鎮安也以四鎮之山為琢飾長一尺二寸公二王後及王之上公雙植謂之桓桓宮室之象所以安其上也信當為身身圭躬圭蓋皆象人形為琢飾家長七寸穀所以養人蒱為席所以安人二王或以穀為飾或以蒱為琢飾璧皆徑五寸不執珪者未成國也以禽作六摯以等諸臣執之言致也所執以自致孤執, SBCK: 死}
