  - {type: variant, offset: 3132, length: 492, content: 執鴈七執雉以章物也章所執之物別貴賤女贄不過榛栗棗脩以告虔也榛小栗脩脯虔敬也皆取其名以示敬又定公下曰公會晉師于耳范獻子執羔趙簡子中行文子皆執鴈魯於是乎始尚羔禮卿執羔大夫執鴈魯則同之今始知執羔之尊也穀梁傳莊公曰大夫宗婦覿用幣宗婦同宗大夫之婦覿見也禮大夫不見夫人不言及不正其行婦道故列數之也男子之一贄羔鴈雉腒贄所以至者也上大夫用羔取其從群帥而不黨也下大夫用鴈取其知時飛翔有行列也士冬用雉夏用腒取其耿介交有時別有倫也腒腊也雉必用死為其不可生膳也夏用腒備腐臭也婦人之贄棗栗腵脩棗取其早自矜莊栗取其敬栗腵脩取斷斷自脩整用幣非禮也用者不宜用者也大夫國體也國體謂為君股肱而行婦道惡之故謹而日之也公羊傳莊公曰戊寅大夫宗婦覿用幣宗婦者何大夫之妻也覿者何見也用者何用者不宜用也不宜用幣為贄也見用幣非禮也以文在覿下不使齎見知非禮也然則曷用棗栗云暇脩云乎禮記外傳曰王者朝臣諸侯之朝臣非南面之尊地不成國德不比玉故不執玉孤卿執皮帛虎豹之皮與束帛天子之孤卿少師少傅少保卿執羔天子六卿即諸侯之上大夫羔取其不亂群大夫執鴈鴈飛有行列士執雉雉性剛有死節夏執乾雉餘三時皆執死雉工商執鷄鷄司而鳴庶人執鶩鶩家鳴不遠飛庶人不出鄉諸侯, SBCK: ''}
