  - {type: variant, offset: 2241, length: 279, content: 太后有授立之功率群臣朝于南朝親饋上壽也魏書曰文帝為魏王南征次譙大饗六軍及譙父老設伎樂百戲令曰先王云樂其所自生禮不忘其本譙霸王之邦真人本土其復譙租稅二年三老上壽日久而罷晉書禮志曰元正上壽謁者引王詣樽酌壽酒跪授侍中侍中跪置卿座前王還王自酌置位前謁者跪奏藩王臣某等奉觴再拜上千萬歲四箱樂作百官再拜已飲又再拜唐書曰元和十四年齊魯初平宴文武百寮裴度舉觴獻壽跪而言曰陛下德配天地明並日月神武獨斷寇逆削平錫宴群臣當茲令節臣備位台司幸逢昌運願與四海九州之人同上千萬歲壽上執酒為飲之管子曰桓公管仲鮑叔牙甯戚四人飲飲酣桓公謂鮑叔牙曰盍不起為寡人壽乎鮑叔牙奉杯而起曰使公母忘出在莒, WYG: 徃故愆期遲歸以待}
