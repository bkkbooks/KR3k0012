  - {type: variant, offset: 2797, length: 2, content: 信當, WYG: 國亂則婚姻不得其時焉不得其時謂不及中春之日又曰東門之楊刺時也婚姻失時男女多違親迎女猶有不至者也東門之楊其葉牂牂興也牂牂然盛貌言男女失時不逮秋冬箋曰楊葉牂牂三月中也興者言時晚也失中春之月婚以}
