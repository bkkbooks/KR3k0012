  - {type: variant, offset: 16, length: 1, content: 賓, SBCK: 薦令芳拜受􅀕之以定爾祥承天之休壽考不忘醮辭曰㫖酒旣清嘉薦既時始加元服兄弟具來孝友時格永乃保之􅄪醮曰㫖酒旣湒嘉薦伊脯乃中爾服禮儀有序􅀕此嘉爵承天之祐三醮曰旨酒令芳籩豆有楚咸加􅈛服肴􅂛折俎承天之慶受福無疆字辭曰禮儀旣備令月􅁻曰昭告􅈛字爰字孔嘉髦士攸冝冝之于嘏永受保之大戴禮逸禮曰太子旣冠成人免於師傳則有司過之史有虧膳之宰太子有過史必書之禮記郊特牲曰始冠緇布之冠也大吉冠布齊則緇之嫡子冠於阼以著代也醮於客位加有成也三加弥尊喻其志也冠而字之敬其名也無大夫冠禮而有其婚禮古者十五而后爵何大夫冠禮之有諸侯之有冠禮也夏之未造言下􅀄以上諸侯雖有㓜而即位者猶以士禮冠五十而爵命又曰始冠緇布自諸侯下達冠而幣之可也本古耳非時王之法服}
  - {type: page-break, offset: 16, content: '', id: KR3k0012_SBCK_540-2a}
  - {type: variant, offset: 16, length: 1, content: 賓, WYG: 薦令芳拜受祭之以定爾祥承天之休夀考不忘醮辭曰㫖酒既清嘉薦亶時始加元服兄弟具來孝友時格永乃保之再醮曰㫖酒既湑嘉薦伊脯乃申爾服禮儀有序祭此嘉爵承天之祜三醮曰㫖酒令芳籩豆有楚咸加爾服肴升折爼承天之慶受福無疆字辭曰禮儀既備令月吉日昭告爾字爰字孔嘉髦士攸宜宜之於假永受保之大戴禮逸禮曰太子旣冠成人免於傅則有司過之史有虧膳之宰太子有過史必書之禮記郊特牲曰始冠緇布之冠也太古冠布齊則緇之嫡子冠於阼以著代也醮於客位加有成也三加彌尊喻其志也冠而字之敬其名也無大夫冠禮而有其婚禮古者十五而后爵何大夫冠禮之有諸侯之有冠禮也夏之末造言夏初以上諸侯雖有㓜而即位者猶以士禮冠十五而爵弁又曰始冠緇布冠自諸侯下逹冠而敝之可也本古禮非時王之法服}
