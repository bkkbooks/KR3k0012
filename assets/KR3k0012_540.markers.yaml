  - {type: variant, offset: 25, length: 3, content: 宴兄弟, SBCK: 將冠子冠者至揖譲而入聞齊衰大功之喪如之何冠者賔及賛者孔子曰内喪則廢外喪則冠而不醴􅜂饌而歸即位而􅂘如冠者未至則廢内喪同也不醴不醴子也其廢者喪成服因喪不冠如將冠子而未及期日而有齊衰大功小功之喪則因喪服而冠廢告禮而因喪冠俱成人之服及至也除喪不改冠乎孔子曰天子賜諸侯大夫冕弁服於太廟歸設奠服賜於斯乎有冠醮無冠醮酒爲醮冠禮醴重而醮輕此服賜服酌用酒尊賜也不醴明不爲改冠改冠當醴之父没而冠則巳冠掃地而􅀕於禰巳􅀕而見伯父叔父而后饗冠者饗謂之禮又冠義曰冠而后服備服備而后容體正顔色齊辭令順言報未備者未可求以三始也童子之服采衣紒故曰冠者禮之始也是故古者聖王重冠古者冠禮筮賔所以敬冠事敬冠事所以重禮重禮所以爲國本也國以禮爲夲故冠於阼以著代也醮於客位三加彌尊加有成也阼謂主人之北也適子冠於阼者不醮則醮用酒於客位敬而成之也户西爲客位庶子冠於房户外又因醮焉不代父也冠者􅀄加緇布冠次加受弁次弃次加爵弁毎加益尊所以益成}
  - {type: page-break, offset: 25, content: '', id: KR3k0012_SBCK_540-3a}
  - {type: variant, offset: 25, length: 3, content: 宴兄弟, WYG: 將冠子冠者至揖讓而入聞齊衰大功之䘮如之何冠者賔及賛者孔子曰内䘮則廢外䘮則冠而不醴徹饌而埽即位而哭如冠者未至則廢内䘮同也不醴不醴子也其廢者䘮成服因䘮不冠如將冠子而未及期日而有齊衰大功小功之䘮則因䘮服而冠廢禮而因䘮冠俱成人之服及王也除䘮不改冠乎孔子曰天子賜諸侯大夫冕弁服於太廟歸設奠服賜服於斯乎有冠醮無冠醴酒為醮冠禮醴重而醮輕也服賜服酌用酒尊賜也無醴明不為改冠改冠當醴之父沒而冠則已冠埽地而祭於禰已祭而見伯父叔父而後饗冠者饗謂之禮又冠義曰冠服備而後容體正顔色齊辭令順冠服未備者未可求以三事也童子之服采衣也故曰冠者禮之始也是故古者聖王重冠古者冠禮筮賔所以敬冠事敬冠事所以重禮重禮所以為國本也國以禮為本故冠於阼以著代也醮於客位三加彌尊加有成也阼謂主人之地也適子冠於阼者将以代父醮用酒於客位敬而成之也户西為客位庶子則冠於房中外遂因醮焉不代父也冠者初加緇布再加皮弁終加爵弁毎加益尊所以益成}
