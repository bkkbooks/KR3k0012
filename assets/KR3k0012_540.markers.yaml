  - {type: variant, offset: 1555, length: 484, content: 所生一女者父為金王孫王已死韓王孫名媯乘間而言曰太后有女在長陵武帝曰何不早言武帝乃自往迎取乘輿至金氏門外使騎圍其宅女亡匿內中床下扶持出詔副車載之馳還入長樂宮太后曰帝何從來帝曰今者至長陵得臣姊與俱來帝奉酒前為壽賜錢千萬奴婢三百人公田百頃甲第以奉姊太后謝曰為帝費漢書衛青傳曰時王夫人方幸於上甯乘說青曰今王夫人幸而宗族未富貴願將軍奉所賜千金為夫人親壽青以五百金為壽上聞問青以實對上迺拜甯乘為東海都尉又曰倪寬為御史大夫從東封泰山登明堂寬奉觴再拜上千萬歲壽制曰敬舉君之觴又曰隆慮公主子昭平君尚帝女夷安公主隆慮主病困以金千斤錢十萬為昭平君豫贖死罪上許之隆慮王卒昭平君日驕醉殺主傅繫獄廷尉上請上良久曰法令者先帝所造也因弟故而誣先帝之法吾何面目入高廟乎又下負萬民乃奏其可哀不能自止左右盡悲東方朔前上壽曰臣聞聖王為政賞不避仇讎誅不擇骨肉書曰不偏不黨王道蕩蕩此二者五帝所重三王所難也陛下行之是以四海之內元元之民各得其所天下幸甚臣朔奉觴昧死再拜上萬歲壽上乃起入省中久時召讓朔免冠頓首曰臣聞樂大甚則陽溢哀大甚則陰頓陽變則心氣動心氣動則精神散而邪氣入銷憂者莫若酒臣朔以上壽者明陛下正而不阿思以止哀, SBCK: ''}
