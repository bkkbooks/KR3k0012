  - {type: variant, offset: 2793, length: 1, content: 安, WYG: 為禮彖曰咸感也柔上而剛下二氣感應以相與止而說男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平萬物感陽而生民感聖人之化而和毛詩鵲巢何彼穠矣美王姬也雖則王姬亦下嫁於諸侯猶執婦道以成肅雍之徳也又國風曰谷風刺夫婦失道也衛人化}
