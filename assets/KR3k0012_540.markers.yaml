  - {type: variant, offset: 2074, length: 7, content: 薦勳祖廟布大喜, WYG: 蕭子範冠子箴曰是月維令敬擇良辰式遵士典諮筮}
  - {type: variant, offset: 2074, length: 5, content: 薦勳祖廟布, krp: 蕭子冠子箴曰是月惟令敬擇良辰式遵又國風曰谷風刺夫婦失道也衛人化其上淫於新婚而弃其舊室夫婦離絶國俗傷敗焉習習谷風以隂以雨僶俛同心不冝有怒德音莫違及爾同死又曰綢繆刺晋亂也國亂則婚姻不得其時焉不得其時謂不及中春之月又曰東門之楊刺時也婚姻失時男女多違親迎女猶有不至者也東門之楊其葉牂牂興也牂牂然盛貌言男女失時不速秋冬箋云楊葉牂牂三月中也興者言時晚也失仲春之月婚以爲期明星煌煌期而不至也箋云親迎之禮以婚時女留他色不肯時行乃至}
  - {type: punctuation, offset: 2078, content: ，, id: KR3k0012_CHANT_540-bkkpn648}
  - {type: 'tls:seg', offset: 2078, content: '', id: KR3k0012_CHANT_540-25a.9}
  - {type: variant, offset: 2080, length: 1, content: 喜, SBCK: 星煌煌也又曰有狐刺時也衛之男女失時喪其妃耦焉古者國有凶荒則殺禮而多婚㑹男女之無夫家者所以育人民也育生長也又小雅曰我行其野刺宣王也刺其不正嫁取之數而有荒政多􅁋婚之俗我行其野蔽芾其樗婚姻之故言就爾居樗惡木也箋云樗之蔽取芾始生謂仲春之時嫁取之月婦之父壻之父相謂婚姻言我也我乃以此二父之命故我就女居我豈其無禮來乎責之也我行其野言采其遂婚姻之故言就爾􅀫又文王大明曰贄仲氏任自􅀍殷啇來嫁于周曰嬪于京贄國任姓也贄國之中女也王季大王之子文王父也太任從殷啇之畿内嫁爲婦}
  - {type: page-break, offset: 2080, content: '', id: KR3k0012_SBCK_540-6b}
  - {type: variant, offset: 2080, length: 1, content: 喜, krp: 星煌煌也又曰有狐刺時也衛之男女失時喪其妃耦焉古者國有凶荒則殺禮而多婚㑹男女之無夫家者所以育人民也育生長也又小雅曰我行其野刺宣王也刺其不正嫁取之數而有荒政多淫婚之俗我行其野蔽芾其樗婚姻之故言就爾居樗惡木也箋云樗之蔽取芾始生謂仲春之時嫁取之月婦之父壻之父相謂婚姻言我也我乃以此二父之命故我就女居我豈其無禮來乎責之也我行其野言采其遂婚姻之故言就爾宿又文王大明曰贄仲氏任自𬒳殷啇來嫁于周曰嬪于京贄國任姓也贄國之中女也王季大王之子文王父也太任從殷啇之畿内嫁爲婦}
  - {type: variant, offset: 2082, length: 0, content: '', SBCK: 周之京配王季共行仁義之德同志意也大戴禮逸禮曰子孫娶妻嫁女必擇孝悌丗丗有行義者是則其子孫慈悌孝愛不敢􅁋􅁀黨無不善三族輔之故鳯皇生而有仁義之意虎狼生而有貪戾之心嗚呼戒之哉無飬乳虎將傷}
  - {type: variant, offset: 2082, length: 1, content: 天, WYG: 賔嘉字爰錫醮酒方陳禮荘爾質徳成爾身梁沈約冠子祝文曰蠲兹令日元服肇加成徳旣學童心自化行之則至無謂道賖敦以秋實食以春華無恥}
  - {type: page-break, offset: 2082, content: '', id: KR3k0012_WYG_540-8a, image: WYG0898/WYG0898-0053c.png}
  - {type: variant, offset: 2082, length: 0, content: '', krp: 周之京配王季共行仁義之德同志意也大戴禮逸禮曰子孫娶妻嫁女必擇孝悌丗丗有行義者是則其子孫慈悌孝愛不敢淫暴黨無不善三族輔之故鳯皇生而有仁義之意虎狼生而有貪戾之心嗚呼戒之哉無飬乳虎將傷}
