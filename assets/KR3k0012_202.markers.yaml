  - {type: variant, offset: 1830, length: 181, content: 時與賓客過其丘嫂食應劭曰丘氏女也孟康曰西方謂上女婿立為婿立空也上有嫂也晉灼曰丘大也大婦為冢婦也嫂厭叔與客來佯為羹盡鑠釜客以故去巳而視釜中有羹由是怨嫂及立齊岱等王而伯子獨不得侯太上皇以為言高祖曰某非敢忘封之也為其母不長者七年十月封其子信為頡羹侯又曰霍去病以校尉伐匈奴乃封為冠軍侯又曰趙破奴以司馬再從驃騎將軍擊匈奴封為從驃騎侯東觀漢記曰彭寵奴子密殺寵詣闕降封為不義侯, SBCK: 卿相奉引輕車整駕介亡列陣鸞輅依容輼車􅂛襯郷君}
