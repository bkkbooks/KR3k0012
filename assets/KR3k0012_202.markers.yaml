  - {type: variant, offset: 2057, length: 1, content: 十, SBCK: 封晉安縣侯母愛氏爲安國郷君也又曰元敬皇后虞氏字孟母濟陽外黃人也祖壽撫軍大將軍􅁺父豫太傅叅軍中宗之爲瑯瑘王納后爲妃豫妻王氏爲邢陽縣君從母散􅀐常侍新野王罕妻爲平陽郷君又曰康獻皇后禇氏太傅襃之女封母謝氏爲㝷陽郷君又曰成恭皇后杜氏陵陽京兆人也母裴氏爲廣德縣髙安郷君賜錢百萬布}
