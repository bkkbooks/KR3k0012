  - {type: variant, offset: 1691, length: 0, content: '', SBCK: 中任邕州都督府録事叅軍爲招討使董昌齡誣枉殺之方厚妻程氏力不能免乃抑其哀如非􅁈者昌齡雅不疑慮聽其歸喪程氏故得以徒行詣闕截耳於右銀臺門告夫􅀍殺之􅁈御史臺鞠之得實諌官亦有章䟽故昌齡再授譴逐程氏開成}
