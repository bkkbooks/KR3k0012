  - {type: variant, offset: 77, length: 42, content: 生存也太子太傅夏侯勝曰此未死也臣聞有陰德者必饗其樂以及子孫今未獲其樂而病甚非死也後愈, WYG: 功特}
  - {type: punctuation, offset: 80, content: 。, id: KR3k0012_CHANT_202-bkkpn19}
  - {type: 'tls:seg', offset: 80, content: '', id: KR3k0012_CHANT_202-1a.17}
  - {type: variant, offset: 80, length: 356, content: 太子太傅夏侯勝曰此未死也臣聞有陰德者必饗其樂以及子孫今未獲其樂而病甚非死也後愈封為愽陽侯東觀漢記曰建武元年詔曰故密令卓茂束身自脩執節悙固斷斷無他其心休休焉夫士誠能為人所不能為則名冠天下當受天下重賞故武王誅紂封比干之墓表商容之閭今以茂為太傅封褒德侯賜安車一乘衣一襲金五百斤討亂定策封漢書曰莽何羅與弟重合侯通謀逆時霍光金日磾音低上官桀等共誅之功未錄武帝病封璽書曰帝崩發書以從事遺詔封金日磾為秺丁固切侯上官桀為安陽侯光為愽陸侯文頴曰愽大陸平取其嘉名無此縣也食邑北海之河間臣瓚案漁陽有愽陸城也皆以前捕反者功封時衛尉王莽子男忽侍中楊語曰帝崩忽常在左右安得遺詔封三子事群兒自相責耳光聞之切讓王莽莽酖殺忽奉使封史記曰高祖使劉敬使匈奴還報曰匈奴不可擊此必見短伏奇兵以爭利上怒械繫敬必往而厄於白登七日乃得解還至廣武赦敬封千戶號建信, SBCK: 郡}
