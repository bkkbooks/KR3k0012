  - {type: variant, offset: 2014, length: 0, content: '', SBCK: 卞隆以后父封睢陽郷侯隆妻王氏爲顯陽君追封隆前妻劉氏爲仁愼郷君后親母故也又曰甄儼孫女爲齊王皇后后父巳没封后母爲廣陽郷君晉書曰立皇后楊氏母太原龐氏爲安昌郷君追外曽祖母故司徒王朗夫人夏氏爲滎陽郷君晉中興書曰哀靖皇后王氏字穆之司徒左長史濛之女也}
