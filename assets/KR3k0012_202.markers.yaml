  - {type: variant, offset: 2441, length: 1, content: 帝, WYG: 爾萬方萬方有罪在予一人在予一人乃我教道之過在盤庚曰國之臧則維汝衆今商書盤庚是也臧善國俗之善則維汝衆歸功於下也國之不臧則惟余一人有逸罰逸過罰罪也國俗之不善則惟一人是我有過其罪當在我也如是則長衆使人不可不慎也人之所急在於大事大事戎祀也先王知大事必以衆濟故祓除其心以和惠人被拂也考中度衷以蒞之蒞臨考中省已之中心以度人人之心恕以臨之也昭明物則以訓之制義庶孚以行之義宜庶衆孚信當制立事宜為衆所信也祓除其心精也精潔考中度衷忠也忠恕也昭明物則禮也制義庶孚信也然則長衆使人之道非精不和非忠不立非禮不順非信不行今晉侯即位而背内外之賂背外不與}
  - {type: page-break, offset: 2441, content: '', id: KR3k0012_WYG_202-11a, image: WYG0894/WYG0894-0774a.png}
  - {type: variant, offset: 2441, length: 1, content: 帝, krp: 尓万方万方有罪在子一人在余一人乃我教道之過在盤庚曰國之臧則維汝衆今啇書盤庚是也臧善國俗之善則維女衆歸功於下也國之不臧則維余一人是有逸罰逸過罰罪也國俗之不善則維一人是我有過其罪當在我也如是則長衆使人不可不愼人之所急在大事大事戎祀也先王知大事之必以衆濟故祓除其心以和惠人祓拂也考中度衷以莅之莅臨考中省巳之中心以度人之中心恕以臨之也昭明物則以訓之制義庶孚以行之義冝庻衆孚信當制立事冝爲衆所信也祓除其心精也精潔考中度衷忠也忠恕也昭明物則禮也制義庶孚信也然則長衆使人之道非精不和非忠不立非禮不順非信不行今晉侯即位而背内外之賂背外不與}
  - {type: variant, offset: 2443, length: 0, content: '', WYG: 也背内不與里丕田也虐其處者棄其信虐其處者殺里丕}
  - {type: variant, offset: 2443, length: 0, content: '', krp: 也背内不與里丕田也虐其處者弃其信虐其處者殺里丕}
  - {type: variant, offset: 2444, length: 8, content: 害秦軍為卻平原君, SBCK: 過在盤庚曰國之臧則維汝衆今啇書盤庚是也臧善國俗之善則維女衆歸功於下也國之不臧則維余一人是有逸罰逸過罰罪也國俗之不善則維一人是我有過其罪當在我也如是則長衆使人不可不愼人之所急在大事大事戎祀也先王知大事之必以衆濟故祓除其心以和惠人祓拂也考中度􅂨以莅之莅臨考中省巳之中心以度人之中心恕以臨之也昭明物則以訓之制義庶孚以行之義冝庻衆孚信當制立事冝爲衆所信也祓除其心精也精潔考中度􅂨忠也忠恕也昭明物則禮也制義庶孚信也然則長衆使人之道非精不和非忠不立非禮不順非信不行今晉侯即位而背内外之賂背外不與􅁗也背内不與里丕田也虐其處者弃其信虐其處者殺里丕之黨不敬王命弃其禮施其所惡弃其忠巳所不}
