  - {type: variant, offset: 52, length: 3, content: 轉遷御, SBCK: 領兵討擊旣而城􅀌援寡勢將欲䧟奚氏乃率家僮及城内女丁相助固守賊退所司以聞優制封爲誠節夫人又曰王君㚟上嘗於廣逹樓引君􅎢及妻夏氏設宴賜以帛夏氏亦有戰功故特賞之封爲武威郡夫人五代}
