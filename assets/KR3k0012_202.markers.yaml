  - {type: variant, offset: 13, length: 4, content: 劉德謹重, WYG: 殊禮賜號義成夫人金印紫綬文軒丹轂於新代唐書曰魏衡妻王氏梓州郪人也武徳初薛仁杲舊将房企地侵掠梁部因獲王氏逼而妻之後企地漸强盛衡謀以城應賊企地領衆将趨梁州未至數十里飲酒醉臥王氏取其佩刀斬之攜其首入城賊衆乃散高祖大悦}
