  - {type: variant, offset: 2432, length: 4, content: 魯連說魏, SBCK: 襄十四年王使劉定公賜齊靈公命曰昔伯舅太公佑我先王股肱周室師保万民世胙太師以表東海王室之不壞繄伯舅是賴余今命汝環環齊靈公名也兹帥舅氏之典纂乃祖考無忝乃舊勲敬之哉無廢朕命纂継也因昏而加褒顯傳言王室不能命有功國語曰襄王使邵伯過及内史過賜晉惠公命吕甥郤芮相晉侯不敬晉侯執玉卑拜不稽首内史過歸以告王曰晉不亡其君必無後且吕郤將不免王曰何故對曰夏書有之曰衆非元后何戴后非衆無以守邑邑國在湯誓曰余一}
