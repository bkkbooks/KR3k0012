  - {type: variant, offset: 1689, length: 0, content: '', SBCK: 靈思何皇后追封父眞爲車􅀐將軍舞陽宣德侯封后母與爲舞陽君魏志曰文德郭皇后安平廣宗人也母董爲郡君追改封父永爲灌津敬侯丗婦董爲常陽君又曰青龍二年春追謚后兄儼曰安成郭穆侯封儼丗婦劉爲東郷君又追封逸丗婦張爲安嘉君又曰明}
  - {type: variant, offset: 1689, length: 0, content: '', WYG: 靈思何皇后追封父真為車騎将軍舞陽宣徳侯封后母為舞陽君魏志曰文徳郭皇后安平廣宗人也母董為郡君改封父永為灌津敬侯世婦董為常陽君又曰青龍二年春追謚后兄儼曰安城郭穆侯封儼世婦劉為東鄉君又追封逸世婦張為安嘉君又曰明}
  - {type: page-break, offset: 1689, content: '', id: KR3k0012_WYG_202-5a, image: WYG0894/WYG0894-0771a.png}
  - {type: variant, offset: 1689, length: 0, content: '', krp: 靈思何皇后追封父眞爲車騎將軍舞陽宣德侯封后母與爲舞陽君魏志曰文德郭皇后安平廣宗人也母董爲郡君追改封父永爲灌津敬侯丗婦董爲常陽君又曰青龍二年春追謚后兄儼曰安成郭穆侯封儼丗婦劉爲東郷君又追封逸丗婦張爲安嘉君又曰明}
  - {type: variant, offset: 1690, length: 0, content: '', SBCK: 郭皇后西平人也齊王即位尊后皇太后封太后母杜爲郃陽君又曰明悼毛皇后河內人黃初中以選入東宫明帝時爲平原王進御有寵出入與同輿輦追封后母夏氏爲野王君又曰太始三年詔曰漢文追崇靈文之號武宣有平原愽平之封咸所以奉尊尊之敬廣親親之恩冝追封故衛將軍景侯夫人羊氏爲平陽君也臧榮緒晉書曰武悼楊皇后廢在金墉城與母髙都君龐氏共止髙都君臨刑后抱持號叫不食而崩晉中興書曰穆皇后􅁃氏字文君左將軍琛第三女贈琛爲車􅀐將軍母丘氏封安陽縣君從母荀氏永宣縣君又曰簡文順皇后王氏字蘭始驃􅀐將軍述之再從妹追贈前夫人成氏東豐縣君後夫人成氏東興君沈約宋書曰孝穆趙皇后諱安宗下邳僮人也父裔永初二年有司奏裔命婦孫可建昌縣君又曰孝穆蕭皇后名文壽蘭陵人父卓初與裔俱贈金紫光禄大夫妻下邳趙氏封呉郡壽昌縣君唐書曰古􅀇應妻髙氏固守飛狐縣城卒免爲突厥所䧟下詔曰頃屬黙啜攻城咸憂䧟没丈夫固守猶不能堅婦人懷忠不憚流矢由兹感激危城重安如不襃昇何以􅅄勸古􅀇應妻可封爲徇忠縣君又曰衡方厚妻程氏方厚太}
  - {type: page-break, offset: 1690, content: '', id: KR3k0012_SBCK_202-3b}
  - {type: page-break, offset: 1690, content: '', id: KR3k0012_SBCK_202-4a}
  - {type: variant, offset: 1690, length: 0, content: '', WYG: 郭皇后西平人也齊王即位尊皇后封太后母杜氏為郃陽君又曰明悼毛皇后河内人黃初中以選入東宫明帝時為平原王進御有寵出入與同輿輦追封后母夏氏為野王君又曰太始三年詔曰漢武追崇靈文之號武宣有平原博平之封咸所以奉尊尊之敬廣親親之恩宜追封故衞将軍景侯夫人羊氏為平陽君也臧榮緒晉書曰武悼楊皇后廢在金墉城與母高都君龎氏共止高都君臨刑后把持號叫不食而崩晉中興書曰穆皇后庾氏字文君左将軍琛第三女贈琛為車騎将軍母丘氏為安陽縣君從荀氏永宣縣君又曰簡文順皇后王氏字蘭始驃騎将軍述之再從妹追贈前夫人成氏東豐縣君後夫人成氏東興君沈約宋書曰孝穆趙皇后諱安崇下邳僮人也父裔永初二年有司奏裔命婦孫可建昌縣君又曰孝穆蕭皇后名文夀蘭陵人父卓初與裔俱贈金紫光禄大夫妻下邳趙氏封吴郡夀昌縣君唐書曰古元應妻高氏固守飛狐縣城卒免為突厥所陥下詔曰頃属黙啜攻城咸憂陷没丈夫固守猶不䏻堅婦人懐忠不憚流矢由兹感激危城重安如不褒昇何以奨勸古元應妻可封為徇忠縣君又曰衛方厚妻程氏方厚太}
