  - {type: variant, offset: 2963, length: 329, content: 司奏之侍中賈逵上書陳之和帝詔愷致國於弟遁亡所守彌固乃拜為郎又曰丁綝拜河南太守及封功臣上令各言所樂綝曰昔孫敖教其子受必求磽確之地綝德薄功微鄉亭可矣上從之封為定陵謝安鄉食千戶又曰帝欲封樊興置印綬於前固讓曰臣未有先登陷陣之功一家數人並受爵土令天下觖望上嘉興之讓不奪其志又曰封朱祐為高侯邑七千三百戶祐自陳功薄而國大願受南陽五百戶足矣上不許也又曰翟歆字敬子父于以功封臨沮侯歆當嗣爵以母年老國遠上書辭讓詔許乃賜關內侯又曰丁綝卒子鴻上書讓國於弟盛既葬乃挂縗結冢盧而逃又曰大將軍竇憲封舞陽侯食邑二萬戶憲固辭封詔曰大將軍憲前歲出征克滅北狄朝加封賞固辭不受舅氏舊典並蒙爵土其封憲冠軍侯邑二萬戶魏志曰田疇從太祖入盧龍塞太祖猶欲侯之疇素與夏侯悙善太祖語悙曰且往以情喻之荅曰疇負義逃竄, SBCK: 斧􅃏刀墨}
