  - {type: variant, offset: 50, length: 1, content: 長, SBCK: 李謹行大破髙麗叛徒於瓠蘆河之西俘獲數千人自是平壤餘衆走投新羅時謹行妻劉氏留在代奴城髙麗引靺羯攻之劉氏擐甲率衆守城乆之賊乃退上嘉其功特封爲燕郡夫人又曰鄒保英妻奚氏不知何許人也萬歳通天年中契丹賊李盡來冦平州保英時任刺}
