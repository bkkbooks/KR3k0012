  - {type: variant, offset: 1209, length: 214, content: 建德子橫皆為侯楚王反太傅趙夷吾相張尚並諫不聽死景帝封夷吾子周尚子居皆為侯魏志曰鮑信為濟北相協視太祖身以遇害太祖追錄信功封子郈音后為新都亭侯說苑曰邯鄲傳舍吏子李談說平原君令盡散家財以饗士攻秦國平原從其計勇敢三千人皆出從談赴秦軍秦軍為卻三十里亦會楚魏救至秦軍遂罷李談死封其父為李侯異域降封漢書曰匈奴王徐盧等五人降漢景帝欲侯之以勸後亞夫曰彼背其王降陛下陛下侯之即何以責人臣不守節者乎上曰丞相議不可用乃悉封徐盧等為列侯亞夫因謝病免相又曰, SBCK: 也}
