  - {type: variant, offset: 2892, length: 0, content: '', SBCK: 春秋受職于王以臨其人大夫士曰恪位著以儆其官中庭之左右曰位門屏之間曰着也庶人工啇各守其業以共其上猶恐有墜失也故爲車服旗章以旌之爲班爵貴賤以別之爲令聞嘉譽以聲之猶有散遷懈慢而著在刑辟流在裔土於是乎有蠻夷}
