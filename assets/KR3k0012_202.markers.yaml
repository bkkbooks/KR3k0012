  - {type: variant, offset: 7, length: 0, content: '', SBCK: 夫人郡君縣君郷君􅃬命附婦人封左傳成公上曰晉敗齊師齊侯遂自徐􅀜入見保者曰勉之齊師敗矣曰避女子使避君也齊侯單還婦人不知之也女子曰君免乎曰免矣曰銳司徒免乎曰免矣曰苟君與吾父免矣可􅀂何乃奔齊侯以爲有禮旣而問之壁司徒之妻也壁司徒主壘壁予之石􅐎石􅐎邑名濟北盧縣東有地名石􅐎音溜陳留風俗傳曰髙祖與項氏戰厄於延郷有翟母者免其難故以延郷爲封丘縣以封翟母焉夫人後}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_SBCK_202-1b}
  - {type: variant, offset: 7, length: 0, content: '', WYG: 夫人郡君縣君鄉君錫命附婦人封左𫝊成公上曰晉敗齊師齊侯遂自徐關入見保者曰勉之齊師敗矣避女子使避君也齊侯單還婦人不知避也女子曰君免乎曰免矣曰鋭司徒免乎曰免矣曰苟君與吾父免矣可若何乃奔齊侯以為有禮既而問之壁司徒之妻也壁司徒主壘壁予之石窌石窌邑名濟北盧縣東有地名石窌音溜陳留風俗𫝊曰高祖與項氏戰厄於延鄉有翟母者免其難故以延鄉為封邱縣以封翟母焉夫人後}
