  - {type: variant, offset: 2273, length: 593, content: 其友見楚相楚相待之無以異讓其友其友曰夫薑挂因地而生不因地而辛女因媒而嫁不因媒而親子之於王未也何怨於我也史記曰萬家之城千畦薑與千戶侯等魏志曰倭國有薑不知其滋味齊書曰孔琇之為臨川太守在任清約罷郡還獻乾薑二斤武帝嫌其少知琇之清乃歎息梁書曰周拾占對辯捷嘗居直盧語及嗜好裴子野言從來不嘗食薑拾應聲曰孔稱不撤裴乃不嘗一坐皆悅呂氏春秋曰和之美者楊璞之薑招搖之桂楊璞地名在蜀郡招搖山名在桂楊越駱之箘神仙傳曰吳孫權曰權使介象作變化種瓜菜百菓皆立生可食先主論膾魚何者最美象曰鯔魚為上先主曰論近道魚耳此出海中安可得乎象曰可得耳乃令人於殿庭中作方坑汲水滿之并求釣象餌之垂綸於坑中不過頃得鯔魚先主驚嘉問象曰可食否象曰故為陛下取安敢取不可食之物乃使廚下切之先主曰聞蜀薑作虀至佳此間薑永不及也恨爾時無此薑耳象曰蜀薑豈不易得願差所使行者并付以直象自書一符以青竹杖使行人閉目騎杖杖止便買薑買薑畢復閉目此人承其言騎杖須臾止已到成都不知是何處問從言是蜀市乃薑于時吳使張溫於市見之問曰與帝買薑於是甚驚作書寄家比人買薑畢捉書騎竹杖閉目復須臾已還到吳廚下切膾亦適了也李先生傳曰郎中喬飜於牛渚遇神人意欲啖薑而市無之神人以絹數匹并書一牒付信入市門南下任意所如須臾得薑數斗還以問神人神人曰問李先生當知我博物志曰伏波將軍唐資傳蜀人煞薑法先栖掃別麤細為三輩盛著籠中作沸湯沒籠著湯中須臾取一片橫截斷視如熱否裏既熱訖便內著甖中細擣米末以覆上令薑, WYG: ''}
