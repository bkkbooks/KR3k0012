  - {type: variant, offset: 1277, length: 2, content: 豫章, krp: 文帝用法定制行署取一錢巳上聞見不告言者坐至死自此四人共盗一榱桶三人同竊一瓜事發即時行決又曰秦孝}
  - {type: variant, offset: 1280, length: 0, content: '', SBCK: 俊奢侈過甚頗好於内妃崔氏性妬甚不平之遂於􅀲中進毒俊由是遇疾徴還京師上以其奢縱免官以王就弟唐書曰杜如晦薨後太宗食􅀲美愴然思之遂輟其半使置之於靈座又曰髙宗子八人武后所出者自爲行第長曰孝敬皇帝􅁥國仁明爲后所忌而鴧之次曰雍王賢爲太子次曰中宗次曰睿宗及孝敬遇害諸第甞所不安晨夕懷懼雖父母之前無由敢言乃作黄䑓􅀲詞令樂人歌之欲微悟上意歌曰種􅀲黄䑓下􅀲熟子離離一摘使􅀲好再摘令􅀲稀三摘尚由可四摘抱蔓歸然太子竟亦流竄於黔州又曰徳宗建中􅀄誤以髙力士養女楊氏婦爲沈太后是時沈氏故老巳盡無識太后者上宻使中人就洛陽視髙氏年狀頗同曩時太后甞削􅀲哺上刃傷左拇指髙氏甞剖􅀲亦傷左拇指中人皆閹官女子且非審識太后見上仁孝有殊喜莫敢沮者髙氏辭曰實非太后具陳族姓内外以自明又曰貞元四年夏右神䇿軍獻瑞􅀲三蔓各爲一蔕而生三􅀲莊子曰朽􅀲化爲魚物之變也墨子曰今有入人塲園取人􅀲者得罰今之諸侯攻伐踰􅀼人􅀲者數千萬而自曰義也􅁗子曰食􅀲者雖去蔕何以連其根孫卿子曰臯陶之色如削􅀲抱扑子曰五原蔡誕入山而還欺家人云至崑崙山有玉􅀲其形如丗間􅀲但爲光明洞徹而堅須以玉井水洗之便軟而可食又曰曽參鋤􅀲三足烏集其冠孝故也家語曰曽子芸􅀲而誤斷其根曽晢怒以}
