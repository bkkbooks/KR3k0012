  - {type: variant, offset: 7, length: 2, content: 凡進, WYG: 五月乃𤓰乃者急𤓰之辭也𤓰也者始}
  - {type: variant, offset: 7, length: 2, content: 凡進, krp: 五月乃瓜乃者治瓜之辭也瓜也者始}
  - {type: variant, offset: 10, length: 0, content: '', SBCK: 􅀲八月剥􅀲蓄􅀲時也禮曰爲天子削􅀲者副}
