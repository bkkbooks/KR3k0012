  - {type: variant, offset: 1424, length: 0, content: '', SBCK: 宋就爲邊縣令與楚隣界梁亭楚亭皆種􅀲梁亭劬力數灌其􅀲羙楚人窳而稀灌其􅀲惡楚令以梁􅀲之美怒其􅀲之惡因徃夜竊搔梁􅀲皆}
  - {type: variant, offset: 1424, length: 0, content: '', WYG: 宋就為邉縣令與楚鄰界梁亭楚亭皆種𤓰梁亭劬而數灌其𤓰美楚人窳而稀灌其𤓰惡楚令以梁𤓰之美怒其爪之惡因往夜竊搔梁爪皆}
  - {type: page-break, offset: 1424, content: '', id: KR3k0012_WYG_978-9b, image: WYG0901/WYG0901-0589d.png}
  - {type: variant, offset: 1424, length: 0, content: '', krp: 宋就爲邊縣令與楚隣界梁亭楚亭皆種瓜梁亭劬力數灌其瓜羙楚人窳而稀灌其瓜惡楚令以梁瓜之美怒其瓜之惡因徃夜竊搔梁瓜皆}
  - {type: variant, offset: 1425, length: 2, content: 范仲, SBCK: 焦者矣梁亭􅁴請其尉欲執搔楚􅀲宋就曰是構怨分禍之道也令人􅀼爲楚亭夜灌其􅀲令勿知也楚亭旦而徃􅀲則巳灌􅀲日以美楚亭徃而察之則梁亭之爲也楚令大恱因以聞楚王楚王聞之恱梁之隂讓也乃謝以重幣而友於梁王新序同裴淵廣州記有􅀲冬熟號爲金叙味乃甜美廣志曰􅀲之所出以遼東廬江燉煌之種爲美有鳥􅀲狸頭􅀲􅁡䇶􅀲女臂􅀲龍蹄􅀲羊髓􅀲又有魚􅀲犬􅀲如斛出涼州陽城􅀲有青登􅀲大如三􅂛魁有桂枝􅀲長二尺餘蜀地温食􅀲至冬熟有春日􅀲細小小瓣冝藏正月種三月成有秋泉􅀲秋種十月熟形如羊角色蒼黒列仙傳曰溪人者南郡編人居山間有仙人常止其家從之買􅀲教之練􅀲與附子桂實服之一年能飛登山入水徃來海邊又曰服閭者不知何許人常徃來海邊諸祠中有三仙於祠中􅀶賭􅀲雇閭使擔黄􅀲數十頭令瞑目乃上方大山神仙傳曰葛}
  - {type: page-break, offset: 1425, content: '', id: KR3k0012_SBCK_978-6b}
  - {type: variant, offset: 1425, length: 7, content: 范仲公鹽豉蒜果, WYG: 焦者矣梁亭覺請其尉欲報搔楚𤓰宋就曰是搆怨分禍之道也令人竊為楚亭夜灌其𤓰令勿知也楚亭旦而往𤓰則已灌𤓰日以美楚亭往而察之則梁亭之為也楚令大悦因具聞楚王楚王聞之悦梁之隂讓也乃謝以重幣而交於梁王裴淵廣州記曰有𤓰冬熟號為金釵味乃甘美廣志曰𤓰之所出以遼東廬江燉煌之種為美有鳥𤓰貍頭𤓰密角𤓰女臂𤓰龍蹄𤓰羊髓𤓰又名魚𤓰𤓰大如斛出梁州陽城有青登𤓰大如三升魁有拄杖𤓰長二尺餘蜀地温食𤓰至冬熟有春日𤓰細小小瓣宜藏正月種三月成有秋泉𤓰秋種十月熟形如羊角色蒼黑列仙傳曰溪人者南郡鄘人居山間有仙人常止其家從之買𤓰教之鍊𤓰與附子桂實服之廿年能飛登山入水徃來海邉又曰服閭者不知何許人常徃來海邉諸祠中有三仙於祠中博賭𤓰顧閭使擔黄白𤓰數十頭令瞑目及覺乃在方丈山神仙傳曰葛𤣥冬為客設生𤓰漢武内傳曰西王母謂上元夫人曰}
