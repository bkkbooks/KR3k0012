  - {type: variant, offset: 3056, length: 4, content: 名薑芥也, WYG: 浮一藏析以金刀四剖三離承之雕盤幕以纎絺甘侔蜜房冷甚氷圭稽含𤓰賦序曰世云三芝𤓰處一焉謂之土芝張載𤓰賦曰羊骹虎掌桂枝蜜䇶𤣥表丹裏呈素含紅豐膚外偉緑瓤内釀傅𤣥𤓰賦曰白者如素黑者如漆黄踰金箱青侔含翠舊有蜜筩及青括蔞嘉味溢口異類鮮儔一齧之傾至三揺頭細肌密理多瓤少瓣豐㫖絶異食之不䬼陸機𤓰賦曰夫其種族類數則括蔞定桃黄㼐白摶金釵蜜筩小青大班𤣥骭素腕狸首虎磻東陵出於秦谷桂髓起於巫山夏侯孝若賦曰入果園造𤓰田摘虎掌拾黄班落蔕離母漬於寒泉左思蜀都賦曰其園有𤓰疇芋區王廙洛都賦曰𤓰則桂枝括蔞緑瓤青肌消暑蕩熱解渴療飢樂府歌詩曰君子防未然不處嫌疑間𤓰田不納履李下不整冠古詩曰甘𤓰抱苦蔕美棗生荆棘愛利傍有刀貪人還自賊阮籍曰昔聞東陵𤓰近在青門外連畛距阡陌子母相鈎蔕張華眞人篇曰朱李生東苑甘瓜出西郊曹植求祭先王表曰乞請氷瓜五枚太平御覽卷九百七十八}
