  - {type: variant, offset: 1899, length: 296, content: 頃間曰貧道出家人得飲食亦少以公名故闇相記能設一頓鱠否司戶欣然即處分買魚此僧云看有蒜否司戶家人云蒜盡僧云蒜盡去也即起留之云蒜盡遣得買僧云蒜既盡不可更住苦留不止司戶果無疾暴亡延薦與李文德書曰五折張騫大宛之蒜潘泥釣賦曰西戎之蒜南夷之薑茄梁書曰蔡樽為吳興太守不飲郡井水齋前自種白莧紫茄以為常餌詔襃其清加信武將軍杜寶大業拾遺錄曰四年改胡床為交床改胡瓜為白露黃苽改茄子為崑崙紫苽嶺南異物志曰南土無霜雪生物不復凋枯種茄子十年不死生子人皆攀緣摘之樹高至二丈嶺表錄異曰南中草菜經冬不衰故蔬園之中栽種茄子宿根有二三年者漸長枝幹乃為大樹每夏秋熟則梯樹摘之三年後樹漸老子稀即伐去別栽嫩者薑春秋運斗樞曰琁星散為薑失德逆, WYG: ''}
