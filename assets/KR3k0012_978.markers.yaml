  - {type: variant, offset: 1280, length: 6, content: 大會賓僚張融, WYG: 賢為太子次曰中宗次曰睿宗及孝敬遇害諸弟常不自安晨夕懐懼雖父母之前無由敢言乃作黄臺𤓰詞令樂人歌之欲㣲悟上意歌曰種𤓰黄臺下𤓰熟子離離一摘使𤓰好再摘令𤓰稀三摘尚猶可四摘抱蔓歸然太子竟亦流竄於黔州又曰德宗建中初誤以髙力士養女楊氏歸為沈太后是時沈氏已老故盡無識太后者上密使中人就洛陽視髙氏年狀頗同曩時太后嘗削𤓰哺上刃傷左拇指髙氏嘗剖𤓰亦傷左拇指中人皆閹官女子且非審識太后見上仁孝有殊喜莫敢沮者髙氏辭曰實非太后具陳族姓内外以自明又曰貞元四年夏右神䇿軍獻𤓰三蔓各為一蒂而成三𤓰莊子曰朽𤓰化為魚物之變也墨子曰今有人入塲園取人𤓰者得罸今之諸侯攻伐踰竊人𤓰者數千萬而謂義也秦子曰}
