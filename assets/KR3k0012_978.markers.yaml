  - {type: variant, offset: 1277, length: 2, content: 豫章, WYG: 杜如晦薨後太宗食𤓰美愴然思之遂轍其半使置之於靈座又曰髙宗子八人武后所出者自為行第長曰孝敬皇帝監國仁明為后所忌而鴆之次曰雍}
