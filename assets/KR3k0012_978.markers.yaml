  - {type: variant, offset: 2025, length: 265, content: 飲郡井水齋前自種白莧紫茄以為常餌詔襃其清加信武將軍杜寶大業拾遺錄曰四年改胡床為交床改胡瓜為白露黃苽改茄子為崑崙紫苽嶺南異物志曰南土無霜雪生物不復凋枯種茄子十年不死生子人皆攀緣摘之樹高至二丈嶺表錄異曰南中草菜經冬不衰故蔬園之中栽種茄子宿根有二三年者漸長枝幹乃為大樹每夏秋熟則梯樹摘之三年後樹漸老子稀即伐去別栽嫩者薑春秋運斗樞曰琁星散為薑失德逆時則薑有翼辛而不臭也援神契曰薑禦溫菜也禮記檀弓上曰喪有疾食肉飲酒必有草木之滋焉以為薑桂之謂也論語鄉黨曰不撤薑食撤去齊禁薰物薑卒而不臭故不去也韓詩外傳曰宋玉因其友見楚相楚相待之無以異讓其友其友, SBCK: 䬼音烏懸切陸機􅀲賦}
