  body:
  - {type: variant, offset: 1, length: 1, content: 茹, WYG: 茄}
  - {type: variant, offset: 3, length: 2, content: 二蔥, SBCK: 三􅀲易夬卦曰九五以􅂎瓠􅀲含章有隕自天􅂎木之柔者􅀲之果大者龍魚河圗曰􅀲有兩鼻者煞人詩曰文王之興夲由太王也綿綿􅀲瓞民之􅀄生自土沮􅃮興也箋云􅀲之本實継先歳之􅀲必小狀似瓞故謂之瓞綿綿然若將無長大時興者喻后稷乃帝嚳之曹封於部其後公劉失職遷于幽居沮􅃮之地歷丗亦綿綿然至太王而得其民心而生王業故本周之興云于沮􅃮也耳大戴}
  - {type: variant, offset: 3, length: 2, content: 二蔥, WYG: 三𤓰易姤卦曰九五以杞包瓜含章有隕自天龍魚河圖曰𤓰有兩鼻者殺人詩序曰文王之興本由太王也綿綿𤓰瓞民之初生自土沮漆興也箋云𤓰之本實繼先嵗之𤓰必小狀似瓞故謂之綿綿然若將無長大時興者喻后稷乃帝嚳之胄封於邰其後公劉失職遷於豳居沮漆之地奕世亦綿綿然至太王而得其民心而生王業故本周之興云乎沮漆也耳大戴}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_WYG_978-1b, image: WYG0901/WYG0901-0585d.png}
  - {type: variant, offset: 3, length: 2, content: 二蔥, krp: 三瓜易夬卦曰九五以𣏌瓠瓜含章有隕自天𣏌木之柔者瓜之果大者龍魚河圗曰瓜有兩鼻者煞人詩曰文王之興夲由太王也綿綿瓜瓞民之𥘉生自土沮􅃮興也箋云瓜之本實継先歳之瓜必小狀似瓞故謂之瓞綿綿然若將無長大時興者喻后稷乃帝嚳之曹封於部其後公劉失職遷于幽居沮􅃮之地歷丗亦綿綿然至太王而得其民心而生王業故本周之興云于沮􅃮也耳大戴}
