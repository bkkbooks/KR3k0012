  - {type: variant, offset: 2870, length: 166, content: 向湯令復沸使相淹消息視甖中當自沸沸便陰乾之又曰任娠者可啖生薑令兒盈指嶺表錄異曰山薑花莖葉即薑也根不堪食而於葉間吐花穗如麥粒嫩紅色南人選未拆開者謂之含胎以鹽淹藏入甜糟中終冬如琥珀香辛可重用為膾無加也又曰以鹽藏曝乾煎湯之極能治冷氣蘇爾雅曰蘇桂荏也蘇荏類故名桂荏方言曰周鄭之間謂之公蕡湘沅之間謂之𦵯湘沅在武陵沙州記曰乞佛虜不識五榖唯食蘇于, WYG: 罪免官}
