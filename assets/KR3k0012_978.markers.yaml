  - {type: variant, offset: 1420, length: 2, content: 前隊, WYG: 曾子芸𤓰而誤㫁其根曾晳怒以大杖擊其背曾子仆地有頃乃蘇孔子聞之吿門弟子曰參來勿内曾子使人請孔子孔子曰舜之事瞽瞍小捶則受大杖則走參委身以待暴怒既身死陷父于不義不孝孰大焉古文竒字曰秦改古文為大篆及𨽻字周人多誹謗怨恨秦苦天下不從而諸生到者拜為郎凡七百人密種𤓰於驪山硎谷中温處𤓰實成使上書曰𤓰冬有實有詔曰博士諸生説之人人各異説則皆使往視之而為伏機諸生賢儒皆致焉方相難不决因發機從上塡之以土皆壓死古文𤨏語曰初刑史子臣謂宋景公從今已往五月五日臣死後五年五月丁亥吳亡又後五年八月辛巳君薨刑臣将至死日朝見景公夕死後吳亡景公懼思刑史子臣之言将至死日乃逃于𤓰圃遂死之求得已䖝矣賈誼新書曰昔梁}
