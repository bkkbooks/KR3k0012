  - {type: variant, offset: 1425, length: 2, content: 范仲, krp: 焦者矣梁亭覺請其尉欲執搔楚瓜宋就曰是構怨分禍之道也令人竊爲楚亭夜灌其瓜令勿知也楚亭旦而徃瓜則巳灌瓜日以美楚亭徃而察之則梁亭之爲也楚令大恱因以聞楚王楚王聞之恱梁之隂讓也乃謝以重幣而友於梁王新序同裴淵廣州記有瓜冬熟號爲金叙味乃甜美廣志曰瓜之所出以遼東廬江燉煌之種爲美有鳥瓜狸頭瓜蜜䇶瓜女臂瓜龍蹄瓜羊髓瓜又有魚瓜犬瓜如斛出涼州陽城瓜有青登瓜大如三升魁有桂枝瓜長二尺餘蜀地温食瓜至冬熟有春日瓜細小小瓣冝藏正月種三月成有秋泉瓜秋種十月熟形如羊角色蒼黒列仙傳曰溪人者南郡編人居山間有仙人常止其家從之買瓜教之練瓜與附子桂實服之一年能飛登山入水徃來海邊又曰服閭者不知何許人常徃來海邊諸祠中有三仙於祠中博賭瓜雇閭使擔黄瓜數十頭令瞑目乃上方大山神仙傳曰葛}
  - {type: punctuation, offset: 1428, content: ，, id: KR3k0012_CHANT_978-bkkpn521}
  - {type: 'tls:seg', offset: 1428, content: '', id: KR3k0012_CHANT_978-27a.12}
  - {type: variant, offset: 1428, length: 4, content: 鹽豉蒜果, SBCK: 冬爲客設生􅀲漢武内傳曰西王母謂上元夫人曰後造朱炎山陵食靈􅀲其味甚好頋此未乆巳七千歳矣又曰仙之上藥有空同靈􅀲四刼一實也道學傳曰禇雅字􅀇通人與}
  - {type: variant, offset: 1428, length: 4, content: 鹽豉蒜果, krp: 冬爲客設生瓜漢武内傳曰西王母謂上元夫人曰後造朱炎山陵食靈瓜其味甚好頋此未乆巳七千歳矣又曰仙之上藥有空同靈瓜四刼一實也道學傳曰禇雅字玄通人與}
  - {type: variant, offset: 1433, length: 131, content: 一筩言其廉儉也袁子正書曰袁子曰吾嘗與陳子息於鄴東門之外見一老父方坐而食其子授之蒜食必有餘欲棄則惜欲持去則暑遂盡食於是大辛螫其腸胃兩目盡赤陳子笑之吾謂曰子之家中牛羊數千而不敢食天暑有喝音謁死者而後食之病子之軀亦由是也晉四王起事曰成都王頴奉惠帝還洛陽道中於客舍作食宮, SBCK: 居常取水洒掃或夏月種􅀲恣}
  - {type: variant, offset: 1433, length: 0, content: '', WYG: 造朱炎山陵食靈𤓰其味甚好顧此未乆已七千嵗矣又曰仙之上藥有空同靈𤓰四刼}
