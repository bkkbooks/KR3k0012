  - {type: variant, offset: 11, length: 5, content: 禮蔥葉處末, SBCK: 巾以絺副拆也旣削四祁之乃横断而巾覆焉爲國君華之巾以綌華中製之不四折也爲大夫累之果倮也倮不巾覆也士㚄之不中裂横断去㚄而巳音帝庶人齕之不横断}
  - {type: variant, offset: 11, length: 5, content: 禮蔥葉處末, WYG: 巾以絺副削也既削四析之乃横㫁而巾覆焉為國君華之巾以綌華中裂之不四折也為大夫累之累倮也不以巾覆也士㚄之不裂横截去㚄而已音帝庶人齕之}
