  - {type: variant, offset: 1797, length: 4, content: 孟卿號叫, SBCK: 里從人乞􅀲其主弗與便從索瓣種之俄而􅀲蔓延生花實乃取食之因賜􅀚者及視所賫皆亡耗矣幽明録曰安定人周敬種􅀲時亢旱鬼爲槤音輦水澆􅀲􅀲大滋䌓問姓名不荅還白父甞有惠於人否父曰西郭樊營先作郡吏償官數百斛米我時以百斛助之其人巳死又曰孫鍾冨春人堅父也與母居至孝篤信種􅀲爲業有三少年容服妍麗詣鍾乞􅀲愛樂}
