  - {type: punctuation, offset: 77, content: ，, id: KR3k0012_CHANT_189-bkkpn36}
  - {type: 'tls:seg', offset: 77, content: '', id: KR3k0012_CHANT_189-3a.5}
  - {type: variant, offset: 77, length: 0, content: '', SBCK: 十年九潦而水不爲加益湯之時八年七旱而崖不爲加損夫不爲頃乆之推移者此亦東海之大樂於是塪井之鼃聞之適適然驚規規然自失墨子云備城五十歩一井范子曰直木先伐甘井先竭孫子兵法曰地多䧟曲曰天井墨子云二舎共一井抱朴子内篇曰臨沅縣有寮氏家世老壽後子孫輙夭賤折他人居其故宅復丗夀乃知是宅所爲不知何故疑井中赤乃掘井左右得古人埋丹砂數十斛丹汁入井是}
  - {type: page-break, offset: 77, content: '', id: KR3k0012_SBCK_189-4b}
  - {type: variant, offset: 77, length: 0, content: '', WYG: 十年九潦而水不為加益湯之時八年七旱而崖不為加損夫不為頃乆之推移者此亦東海之大樂於是蹈井之鼃聞之適適然驚規規然自失墨子云備城五十歩一井范子曰直木先伐甘井先竭孫子兵法曰地多陷曲曰天井墨子云二舎共一井抱朴子内篇曰臨沅縣有寥氏家世老夀後子孫輒殘折他人居其故宅復世夀乃知是宅所為不知何故疑井中赤乃掘井左右得古人埋丹砂數十斛丹汁入井是}
