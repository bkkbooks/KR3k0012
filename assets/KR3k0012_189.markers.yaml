  - {type: variant, offset: 71, length: 0, content: '', krp: 獲狂狡君子曰失禮違命冝其爲擒也戎昭果毅以聽之之謂禮聽謂常在於耳著於心想聞其政令殺敵爲果致果爲毅易之戮也史記曰瞽叟使舜穿井穿井匿空旁出舜旣入深瞽叟與弟象共下土實井從匿空出去漢書曰蜀多鹽井羅襃以鹽井致冨又曰陳遵每大飲㑹賔客滿堂輙閉門取客車轄投井中漢書曰元帝時謡曰井水溢滅竈烟灌玉堂流金門至成帝北宫井水溢王莽之徴也又曰朱愽爲御史大夫府吏舎百餘區井水俱竭長老異之後果廢焉又曰王莽時井得白石上圎下方有丹書著文曰告安漢公莽爲皇帝符命之興自此始矣莽使羣公白太后太后曰此誣罔天下不可施行宗廣劉京上書言七月中齊郡臨淄縣昌興亭長辛當歹暮數夢曰吾天公使也公使我告亭長曰攝皇帝當爲眞即不信我此亭中當有新井亭長晨起視亭中有新井入地且百尺也後漢書曰琅邪有冰井冰厚尺餘又曰耿恭之攻匈奴以䟽勒城傍有澗水可固五月引兵據之七月匈奴復攻恭恭募先登數千人直馳之胡騎散走匈奴遂於城下擁絶澗水恭於中穿井十五丈不得水吏士渴乏笮馬糞汁而飲之恭仰天歎曰聞昔貳師將軍㧞佩刀刺山飛泉涌岀今漢徳神明豈有窮哉乃整衣服向井再拜爲吏士禱有頃水泉奔出衆皆稱万歳乃令士揚水以示虜東觀記曰恭親自挽籠於是令士且勿飲先和泥塗城并揚示之虜岀不意以爲神明遂引去又曰淳于恭門側有井郷里小兒爭飲牛恭惡之名置水器汲水滿之又曰張讓刧天子至河掌璽者投璽井中後孫堅討董卓至𣏌國見井有五色光後浚井得璽呉書曰孫䇿功曹魏滕有罪譴欲殺之左右憂恐計無所出夫人乃倚大井召䇿謂曰汝新造江南其事未集方當優賢禮士闡過録功功曹在公盡規汝今殺之他人明日皆叛汝矣吾不忍見汝禍及當先投此中䇿大驚遽釋滕罪晉書曰阮瞻甞羣行冒熱渴甚逆旅有井衆人競趣之瞻獨逡巡在後須臾飲者畢乃進其夷退無競如此又曰元帝爲晉王使郭璞筮遇豫之睽璞曰會㮷當岀鍾以告成功上有勒}
  - {type: punctuation, offset: 72, content: 》, id: KR3k0012_CHANT_189-bkkpn33}
  - {type: variant, offset: 72, length: 0, content: '', SBCK: 應在人家井􅅺中得之繇所謂先王以作樂崇徳殷薦之上帝也及帝即位太興􅀄㑹稽剡縣人果於井中得一鍾長七寸二分口徑四寸半上有古文竒書十八字云會稽岳命餘字時人莫識之璞}
  - {type: variant, offset: 72, length: 0, content: '', WYG: 應在人家井泥中得之繇所謂先王以作樂崇徳殷薦之上帝也及帝即位太興初會稽剡縣人果於井中得一鍾長七寸二分口徑四寸半上有古文竒書十八字云會稽岳命餘字時人莫識之璞}
