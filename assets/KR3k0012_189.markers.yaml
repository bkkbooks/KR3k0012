  - {type: variant, offset: 922, length: 2, content: 梠釋, SBCK: 即水岀事了即乾又曰柳州昔相嶺西麓下有潮井廣半􅅿一日三湧三落又曰堯井在汜水縣東十五里漢髙祖敗項羽追之入此井得免見井中有􅀟鳩飛出有踟跦網因而得免又曰濟州榖城管仲􅀻邑今城内有夫子五井焉又曰洪州龐源山山上有風雨池言山髙水􅀷流激着樹灑如風􅀨云是洪崖之井又曰廣州越井岡一云越王井云趙佗誤墜酒盃於井遂浮出石門故詩云石門通越井是也又曰儋州滔㳂井與淪水通有人以竹置井口淪水得之俚人呼竹爲滔㳂因以爲}
  - {type: page-break, offset: 922, content: '', id: KR3k0012_SBCK_189-9b}
  - {type: variant, offset: 922, length: 2, content: 梠釋, WYG: 水即出事了即乾又曰栁州昔相嶺西麓下有潮井廣半畝一日三湧三落又曰堯井在汜水縣東十五里漢髙祖敗項羽追之入此井得免見井中有雙鳩飛出有蜘蛛網因而得免又曰濟州穀城管仲私邑今城内有夫子五井焉又曰洪州獻源山山上有風雨池言山髙水深流激著樹灑如風雨云是洪崖之井又曰廣州越井岡一云越王井云趙佗誤墜酒杯於井遂浮出石門故詩云石門通越井是也又曰儋州滔㳂井與淪水通有人以竹置井中淪水得之俚人呼竹為滔㳂因以為}
