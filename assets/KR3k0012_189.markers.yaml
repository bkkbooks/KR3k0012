  - {type: variant, offset: 908, length: 2, content: 楣秦, SBCK: 頻思之國人皆多力拳頸不食五榖日中無影飲桂漿雲露羽毛爲衣髮大如縷堅韌如筋申之裁至一丈置則自縮如螺績此人髪以爲繩以汲丹井之水至乆方得􅂛合之水水中有白蛙兩翅去來常在井上仙者食之至周王子晉臨井而窺有青雀衘土杓以授子晉取而飲之乃有雪飛子晉以衣䄂撝雪則雪自止白蛙化爲􅀟白鳩入雲又曰王􅀓先時家貧穿井得鐵印銘曰傭力得冨至億庚一土三田軍門主果大冨永􅀄中以錢買官至中壘校尉三田一土乃壘字也郡國誌曰姑衍州有湯井風穴深不可測常有微風雖三伏盛暑猶須衣裘又曰􅁪州常穿井得白玉方四尺下有石石有􅀛長二尺許又曰連渾府姑衍州遥火山西有火井深不可見底炎氣上昇常若微電以草㸑之則煙騰火發其山似火從地發故}
  - {type: page-break, offset: 908, content: '', id: KR3k0012_SBCK_189-8b}
  - {type: variant, offset: 908, length: 2, content: 楣秦, WYG: 頻思之國人皆多力拳頸不食五穀日中無影飲桂漿雲霧羽毛為衣髮大如縷堅韌如觔伸之裁至一丈置則自縮如螺續此人髮以為繩以汲丹井之水乆乆方得升合之水水中有白蛙兩翅去来常在井上仙者食之至周王子晉臨井而窺有青雀銜一杓以授子晉取而飲之俄有雪飛子晉以衣袖揮雪則雪自止白蛙化為雙白鳩入雲又曰王傳先時家貧穿井得鐵印銘曰傭力得富至億庾一土三田軍門主果大富永初中以錢買官至中壘校尉三田一土乃壘字也郡國志曰姑衍州有涼風井穴深不可測常有微風雖三伏盛暑猶須衣裘又曰恒州常川井得白玉方四尺下有石龜形長二尺許又曰連渾府姑衍州遙火山西有火井深不可見底炎氣上昇常若㣲電以草爨之則烟勝火發其山似火従他發故}
