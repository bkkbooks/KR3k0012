  - {type: variant, offset: 2442, length: 2, content: 上起, SBCK: 江陵城東二十里有天井周廻二里其􅀷不測旱而禱之即大􅀨時至隋圖經云常山唐縣中出城西北隅有一大井俗名趙母井昔云醇酎千日即是此井所醖後以石蓋之人不敢開齊刺史􅀶陵王濟欲開之即有雲霧隠蔽懼不敢開魏文詩曰􅀟桐生空井枝葉自交加白澤圖曰井}
