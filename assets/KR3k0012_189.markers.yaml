  - {type: variant, offset: 918, length: 3, content: 檐楚謂, SBCK: 入後於長溪口得笠則知潜通也又曰朔州有神泉人歌曰紇眞山頭有神井入地千尺絶骨冷又曰貴州有司命井半甘半淡潜涌江波虚􅄹如勢又曰衡山侯曇山山有溪豪神祠壇壇傍有石井常無水人祀}
