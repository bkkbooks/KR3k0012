  - {type: variant, offset: 512, length: 10, content: 盈盈樓上女皎皎當䆫牖, SBCK: 臨卭有火井縱廣五尺􅀷二三丈在縣南百里昔時有竹木投之以取火諸葛丞相徃視之後火轉盛􅀬以盆着井煑鹽得鹽後以燭火投井中即滅迄今不復也盛􅀪之荆州記隨郡北界有廟郷村南有重山山下有一村父老相傳云是神農所生村西有重塹内周廻一頃二十􅅿地中有九井相傳神農旣育九井自穿又云汲一井則衆井水動則以地爲神農社年常祀之㝷陽記龍窟有􅀷泉泉側常見龍曽有人於水邊洗銅椀忽浪起水漲便失椀此人没水逐取旣出復失去後人見龍衘椀在城裏井邊幽明録曰襄邑縣南有瀬郷老子廟廟中有九井㓗齋入者温清隨人意念瀨郷記老子廟中有九井汲一井餘井水並動廣志曰臨卭有粉井得其水汰粉則益光嵩山記少室山有雲母井出雲母洛陽記宫牆西有兩銅井連御溝名曰濛汜羊頭山記衛青破月支月支有井色如酒因名曰酒井}
  - {type: page-break, offset: 512, content: '', id: KR3k0012_SBCK_189-7a}
  - {type: variant, offset: 512, length: 10, content: 盈盈樓上女皎皎當䆫牖, WYG: 臨卭有火井縱廣五尺深二三丈在縣南百里昔時有竹木投之以取火諸葛丞相往視之後火轉盛熱以盆著井煮鹽得鹽後人以燭火投井中即滅迄今不復也盛𢎞之荆州記曰随郡北界有廟村南有重山山下有一村父老相傳云是神農所生村西有重塹内週迴一頃二十畆地中有九井相傳神農既育九井自穿又云汲一井則衆井水動則以地為神農社年常祀之潯陽記曰龍窟有深泉泉側常見龍曽有人於水邊洗銅碗忽浪起水漲便失碗此人沒水逐取既出復失去後人見龍銜碗在城裏井邊幽明録曰襄邑縣南有瀨鄉老子廟廟中有九井潔齋入温清随人意念瀨鄉記老子廟中有九井汲一井餘井水並動廣志曰臨卭有粉井得其水沃則益光嵩山記少室山有雲母井出雲母洛陽記宫牆西有兩銅井連御溝名曰濛汜羊頭山記衛青破月支月支有井色如酒因名曰酒井}
