  - {type: variant, offset: 1731, length: 327, content: 治晉陽公之堂皆以黃銅為柱礩請發而用之則有餘銅矣古史考曰秦始皇使刑徒七萬人作驪山以北山石為舄異物志曰大秦國以水精為舄淮南子曰山雲蒸柱礎潤張衡西京賦曰彫楹玉舄何平叔景福殿賦曰金楹齊列玉舄承跌奧論語八佾曰與其媚於奧寧媚於竈爾雅曰西南隅謂之隩郭璞注曰室中隱隩處通俗文曰奧內曰扆韓子曰衛將軍文子見曾子曾子不起而延之於坐席正身見於奧文子謂其御曰曾子愚人哉以我為君子也君子安可不敬以我為愚人愚人安可侮也呂氏春秋曰苑春諫衛公云君因隅隩有竈不知寒矣屋漏毛詩蕩抑曰相在爾室尚不愧于屋漏爾雅曰東北隅謂之屋漏郭璞注曰屋漏義未詳也犍為舍人曰古者撤屋西北猥以炊浴沒者訖而復之古謂之屋漏也宦爾雅曰東北隅謂之宦郭璞注曰義未詳犍為舍人曰東北陽氣始起萬物所養故謂之宦說文曰宦養也室東北隅食所, SBCK: ''}
