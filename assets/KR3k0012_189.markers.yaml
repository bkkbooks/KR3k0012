  - {type: variant, offset: 4, length: 2, content: 六窗, SBCK: 七井釋名井清也泉之清㓗者也風俗通云井者法也節也言法制居人令節其飲食無窮禍也乆不滯渫滌爲井泥易云井泥不食不停汚曰井渫易云井渫不食滌井曰浚井水清曰洌井易云井洌寒泉甃聚塼修井也易云井甃無咎易傳曰井通也物所通用也禮記曰井與門户竈中霤爲五祀世夲曰伯益作井周書云黄帝作井}
  - {type: variant, offset: 4, length: 44, content: 六窗說文曰䆫穿壁以木為交䆫所以見日也向北出牖也在牆曰牖在屋曰䆫又曰櫺楯間子也櫳房室之䟽也, WYG: 七井井}
  - {type: variant, offset: 4, length: 2, content: 六窗, krp: 七井釋名井清也泉之清㓗者也風俗通云井者法也節也言法制居人令節其飲食無窮禍也乆不滯渫滌爲井泥易云井泥不食不停汚曰井渫易云井渫不食滌井曰浚井水清曰洌井易云井洌寒泉甃聚塼修井也易云井甃無咎易傳曰井通也物所通用也禮記曰井與門户竈中霤爲五祀世夲曰伯益作井周書云黄帝作井}
