  - {type: variant, offset: 2059, length: 380, content: 也窔爾雅曰東南隅謂之窔郭璞注曰窔闇也犍為舍人日東北萬物生蟄蟲必出蟄不由戶窔釋名曰窔幽也亦取宜也塼詩曰乃生女子載弄之瓦瓦紡塼也又曰中堂有甓注一名瓴甋晉書曰陶侃字士行在廣州無事輒朝運百甓於外暮運於內人問其故荅曰吾方致力中原過爾優逸恐不堪事宋書范曄母如廁而產額為塼所傷故以塼為小字瓦說文曰瓦土器已燒之惣名也禮記曰有虞氏瓦棺又曰毀方而瓦合史記曰秦軍武安西鼓譟勒兵武安屋瓦盡震漢書曰霍光巷行人見有人在屋上撤瓦投地就視不見而霍氏誅又曰平帝元始四年東風吹長安城東門屋瓦盡落魏志曰魏文帝謂周宣曰朕夢殿上雙瓦落地化為鴛鴦何也宣曰後宮當有暴死者須庾後宮相害死者吳錄曰景帝時戎將於廣陵掘諸冢取版塼以城所壞甚多晉書曰張孟陽貌醜嘗從潘岳遊洛陽市岳美皃群女爭以果擲岳滿車廂孟陽被投之瓦石愽物志曰桀作瓦古史曰昆吾氏作瓦老子曰挻埴以為器夢書云夢見瓦為甲鎧禦禍患春秋潛巴潭曰宮瓦自墜至死不祥漢武, SBCK: 舊井存焉渚宫}
