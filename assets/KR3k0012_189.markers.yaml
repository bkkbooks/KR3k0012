  - {type: variant, offset: 1393, length: 237, content: 䟽布也以板為井形飾以丹青如綺也王延壽魯靈光殿賦曰圓析方井反植荷蕖緣房紫的咄咤垂珠左思魏都賦曰綺井列䟽以懸蔕華蓮重葩以到披曹植七啟曰綺井含葩金壁玉箱顏延之七繹曰木寫雲氣土祕椒芳既挻天而到井又斲圓而鏤方鴟尾晉中興書曰泰元十年鸛巢太極殿東鴟尾晉安帝紀曰義熙六月雷震太廟鴟尾徹壁柱若有文字宋武大明元年五月戊午嘉禾一株五莖生清暑殿鴟吻中陳書曰高祖二年戊辰重雲殿東鴟吻有紫煙出屬天唐會要曰漢柏梁殿災後越巫言海中有魚虬尾似鴟激浪即降雨遂作其象於屋以厭火祥時人或謂鴟吻非也質礎尚書大傳曰大夫, SBCK: 鄴西髙陵}
