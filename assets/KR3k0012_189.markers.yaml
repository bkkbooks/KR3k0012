  - {type: variant, offset: 1081, length: 224, content: 楶郭璞曰注即櫨也三輔故事曰王莽起九廟為銅鑮櫨楊子法言曰吾未見斧藻其德若斧藻其楶者也枅爾雅曰笄謂之疾郭璞注曰柱上薄也亦名枅犍為舍人曰朱儒下小方木廣雅曰薄謂之枅曲枅謂之欒說文曰枅屋強也王延壽靈光殿賦曰曲枅夭矯而環勾韋仲將景福殿賦曰於是周覽升降流目詳觀叢楹負極飛櫨承欒枅梧綺錯梲楶鮮攢鋪首通俗文曰門扇飾謂之鋪首說文曰門扇環謂之鋪首風俗通曰門戶鋪首百家書云輸般見水上蠡謂之曰開汝頭見汝形蠡適出頭般以足畫圖之蠡引閉其戶終不可開設之門戶欲使閉藏當如此固密也揚雄, SBCK: 聲因掘得}
