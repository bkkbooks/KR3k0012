  - {type: variant, offset: 253, length: 6, content: 䆫八所綾綺連, SBCK: 廣數尺每旱不竭有於其中得銅釡及鑵各一又曰謝晦字宣明宅南路上有古井以元嘉二年汲者忽見三龍甚分明行道住觀莫不嗟異有人入井始知是塼􅀮起作龍形又曰潯陽曇椿丗居長沙宅有古井每夜輙聞有如炮竹聲相承謂爲龍吒風俗通曰龐儉父先逃走隨母流宕後居郷里鑿井得銅生遂温冨後買奴曰堂上者我婦也問其故奴曰我婦姓艾字阿宏足下有黒子腋下有赤志母曰我翁也遂爲夫妻時人曰鑿井得銅買奴得翁又曰龐儉鑿井得}
