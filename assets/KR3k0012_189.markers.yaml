  - {type: variant, offset: 75, length: 0, content: '', SBCK: 人之心與神物合契然後可以言受命矣梁書曰巴郡忽有地自開成井方六丈深三十二丈帝王丗紀曰堯時老人擊壤於路而歌曰鑿井而飲耕田而食帝力於我何有哉南史曰延陵縣季子廟沸井之北忽聞金石聲疑有異鑿深三尺得沸井奔涌若浪其地又響即復鑿之復得一井涌沸亦然井中得一木簡長一尺廣二分上有􅀮起字曰廬山道人張陵再拜謁簡大堅白字色乃黄魚豢魏略曰明帝九龍殿前爲玉井綺欄髙士傳曰管寜所居井會汲者或男女􅄂錯或爭井􅃲寧乃多買器分置井旁汲以待之唐書曰長慶中長安主簿鄭翦主役太清宫御院忽於院前西序見一白衣老人云此下有井正直皇帝過路汝速實之不然罪在不測翦惶恐遽領役人視之其處巳䧟數尺發之則一古井宛然驚頋之際巳失老人所在翦以聞上旣至宫羣臣及供奉官於馬前蹈舞賀有詔命翰林學士韋處厚紀述以表其異孟子曰有爲者譬若掘井九軔而不及泉猶爲弃井也有爲仁義也軔八尺也雖􅀷不及泉喻有爲者中道而盡弃前行也莊子曰公孫龍問於魏牟曰龍困百家之智窮衆口之辯以爲至逹今吾聞莊子之言茫然異之無所開吾喙公子牟􅀏曰子獨不聞塪井之鼃謂東海之鼈曰吾跳梁乎井幹之上入休乎缺甃之岸赴水則接掖持頥蹶泥則滅足没跗還虷蠏與科斗莫吾能若也且夫擅一壑之水而跱塪井之樂亦至矣夫子奚不時來入觀乎東海之鼈左足未入而右􅂰已墊矣於是逡廵而却告之海若曰夫万里之逺不足舉其大千仞之髙不足極其􅀷禹}
  - {type: page-break, offset: 75, content: '', id: KR3k0012_SBCK_189-3b}
  - {type: page-break, offset: 75, content: '', id: KR3k0012_SBCK_189-4a}
  - {type: variant, offset: 75, length: 0, content: '', WYG: 人之心與神物合契然後可以言受命也梁書曰巴郡忽有地自開成井方六丈深三十二丈帝王世紀曰堯時老人擊壤於路而歌曰鑿井而飲耕田而食帝力何有於我哉南史曰延陵縣季子廟沸井之北忽聞金石聲疑有異鑿深三尺得沸井奔湧若浪其地又響即復鑿之復得一井湧沸亦然井中一木簡長一尺廣二寸上有隠起字曰廬山道人張陵再拜謁詣闕起居簡文堅白字色乃黄魚豢魏畧曰明帝九龍殿前為玉井髙士傳曰管寧所居會汲者或男女雜錯或争井鬪寧乃買噐分置井傍汲以待之唐書曰長慶中長安主簿鄭翦主役太清宫御院忽於院前西序見一白衣老人云此下有井正直皇帝過路汝速實之不然罪出不測翦惶恐遽領役人視之其處已陷數尺發之則一古井宛然驚顧之際已失老人所在翦以聞上既至宫羣臣及供奉官於馬前蹈舞賀有詔命翰林學士韋處厚紀述以表其異孟子曰有為者辟若掘井掘井九軔而不及泉猶為棄井也有為為仁義也仞八尺也雖深不及泉喻有為者中道而盡棄前功也荘子曰公孫龍問於魏牟曰龍困百家之智窮衆口之辨以為至達今古聞莊子之言茫然異之無所開吾喙公子牟笑曰子獨不聞䧟井之鼃謂東海之鼈曰吾跳梁乎井榦之上入休乎缺甃之岸赴水則接掖持頥蹶泥則滅足没跗還􅀈䲒與科斗莫吾能若也且夫擅一壑之水而跱陷井之樂亦至矣夫子奚不時来入觀乎東海之鼈左足未入而右膝已蟄矣於是逡廵而却告之海若曰夫萬里之逺不足舉其大千仞之髙不足極其深禹}
