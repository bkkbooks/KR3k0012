  - {type: variant, offset: 81, length: 0, content: '', SBCK: 羙者崑崙之井又曰宋丁氏無井常一人漑汲於外及自穿井喜而告人吾穿井得一人人傳之者聞於宋君召問其故對曰得一人之使非得一人於井中也說􅁐曰季桓子穿井得土􅇲中有羊以問孔子言得狗孔子曰以吾所聞非狗乃羊也木之怪夔罔兩水之怪龍罔象土之怪棼羊也非狗也桓子曰善哉管子曰桓公將與管仲飲十日齋戒掘新井而柴焉注新井以柴蓋覆之取其清㓗示}
