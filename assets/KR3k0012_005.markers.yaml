  - {type: variant, offset: 1690, length: 722, content: 之所會也陰陽之所和也土圭所以致四時日月之景也測猶度也不知廣深故曰測鄭司農云測土深謂南北東西之深也日南謂立表處太南近日日北謂立表處太北遠日景夕謂日趺景乃中立表處太東近日景朝謂未中而景中立表處太西遠日玄謂晝漏半而置土圭表陰陽審其南北焉景短於土圭謂之日南是地於日為近南景長於土圭謂之日北是地於日為近北東於土圭謂之日東是地於日為近東西於土圭謂之日西是地於日為近西如是則寒暑陰陽風雨偏而不和是未得其所求凡日景於地千里而差一寸易通卦驗曰冬至晷長丈三尺鄭玄注曰晷者所立八尺表陰也三尺長之極也春分晷長七尺二寸四分夏至晷長尺有四寸八分秋分晷長二寸四分又曰冬至之日樹八尺之表日中視其晷晷如度者則歲美人民和順晷不如度者則其歲惡人民為偽言政令不平晷進則水晷退則旱晉太康記曰河南陽城縣是為土中夏至之景尺有五寸所以為候南越志曰日南五月立表望之日在表北景居南風土記曰鄭仲師以為夏至之日立八尺之表景尺有五寸謂之地中一云陽地城一云洛陽淮南子曰都廣南方山名眾帝所自上下日中無景蓋天地之中日中時日直無晷故曰地中山海經曰長留之山其神白帝少吳居之是神也主司反景日西入則景反東照言司察之也鄭康成謂移一寸於地千里景尺五寸於南戴日下萬五千里然則千里寸景已課不效交州大搉去洛九十余里蓋水陸曲非論景度徑意也推直考實其五千乎昔交州主簿學士孫悚云已常立表效景景在表南豈古郡以日南為名者其斯義乎此郡又有北景縣北此二字既相似音又相近加以蠻土舌軟聲淺事在可疑月釋名曰月闕也言滿則復鈌也又曰朔月之名也朔蘇也月死復蘇生也晦盡之名也晦灰也火死為灰月光盡似之也昡月半之名也其形一旁曲一旁直若張弓弦也望月滿之名也日月遙相望也說文曰朏月未成明也魄月始生魄然也承大月月生二日謂之魄承小月月生三日謂之朏朏音斐易曰坎為月書曰, SBCK: ''}
