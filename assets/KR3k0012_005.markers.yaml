  - {type: variant, offset: 413, length: 875, content: 東殷也於是費昌徙族歸殷殷果克隆又曰儒者論日出扶桑暮入細柳扶桑東方之地細柳西方之野又曰日晝行千里夜行千里騏驥晝日亦千里然則日行舒疾與騏驥步相類崔豹古今注曰漢明帝為太子樂人作歌詩四章一曰日重光云天子之德光明如日太子比德焉故云重也周髀曰日光外照徑八十一萬里徐幹中論曰文王遇姜公于渭陽若披雲見白日物理論曰日者太陽之精也夏則陽盛陰衰故晝長夜短冬則陰盛陽衰故晝短夜長氣引之也行陽之道長故出入卯酉之北行陰之道短故出入卯酉之南春秋陰陽等故日行中平晝夜等也地說書曰日照四十五萬里皇甫謐季曆曰日者眾陽之宗陽精外發故日以晝明名曰曜靈龍魚河圖曰陽積精為日汲冢書曰胤甲居於河西夫有妖㜸十日並出又言本有十日迭次而運照無窮金匱曰三苗之時三月不見日黃帝占書曰日中三足烏見者其所居分野有白衣會楚辭曰十日並出流金鑠石戰國策曰聶政刺韓相荊軻刺秦王並白虹貫日史記曰漢景帝王夫人妊娠夢日入懷以生武帝又曰堯其仁如天其知如神就之如日望之如雲漢書曰李尋上䟽曰夫日者宗陽之長暉光所燭萬里同晷人君之表也故日將旦清風發暉群陰退伏又曰文帝時新垣平上言日再中臣以候知之居頃之際日却復中乃更以十七季為元季又曰鄒陽上書說梁孝王曰昔荊軻慕燕丹之義白虹貫日太子畏之後漢書曰張重字仲篤明帝時舉孝廉帝曰何郡小吏荅曰臣日南吏帝曰日南郡人應向北看日荅曰臣聞鴈門不見壘鴈為門金城郡不見積金為郡臣雖居日南未嘗向北看日應劭漢官儀曰太山東南名曰日觀日觀雞鳴時見日魏志曰程立夢登太山捧日立以白太祖太祖遂加日於立上因改名昱晉書曰荀爽曰日下荀鳴鶴晉陽秋曰建武元年三日並出三齊略曰秦始皇作石橋於海上欲過海看日出處有神人驅石去不速神人鞭之皆流血今石橋猶赤色季尤九曲歌曰年歲晚暮日已斜安得壯士飜日車日蝕書曰乃季秋月朔辰弗集于房瞽奏鼓嗇夫馳庶人走凡日食天子伐鼓于社責上公也嗇夫主幣之官馳取弊禮天神眾人走供救日食之百役也禮記昏義曰男教不脩陽事不得謫見於天日為之蝕是故日蝕則天子素服而修六官之職蕩天下之陽事傳曰魯昭公十七年日有蝕之祝史請用幣叔孫昭子曰日有蝕昭子不舉伐鼓於社諸侯用幣於社伐鼓於朝禮也又莊二十五年曰夏六月辛未朔日有蝕之鼓用牲于社非常也唯正, SBCK: ''}
