  - {type: variant, offset: 3656, length: 814, content: 曰月群陰之本月望則蚌蚪蛤實群陰盈月晦則蚌蛤虛群陰廢夫月形乎天而群陰化于淵又曰月群陰之宗月毀則魚朏減符子曰盛魄重輪六合俱照非日月能乎張衡靈憲曰羿請不死藥於西王母羿妻姮娥竊以奔月託身於月是為蟾蜍又曰月者陰精積而成獸象兔蛤焉其數偶荊州占曰月珥且戴不出百日主有大喜山海經曰大荒之中有日月山日月所出入風俗通曰吳牛望見月則喘使之苦於日見月怖喘矣河圖令占篇曰地淪月散必有立王龍魚河圖曰帝淫佚則奎有角月有足又曰月有九行黑道二出黃道北赤道二出黃道南白道二出黃道西青道二出黃道東立春春分月從東青道立秋秋分從西白道立夏夏至從南赤道立冬冬至從北黑道天有四表月有三道聖人知之可以延年益壽劉義慶世說曰滿奮疾畏風在武帝坐北䆫作琉璃屏風實密似踈奮有難色帝笑之奮荅曰臣猶吳牛見月而喘白虎通曰月所滿缺何歸功於日也三日成魄八日成光二八十六轉如歸功晦朔至旦受符得復行也月有小大何天左旋日月右行日行遲月行疾月及日為一月至二十九日未及七度即須三十日過七度日不可分故乍大乍小明有陰陽也有閏月何周天三百六十五度四分度之一十二月日不匝十二度故三年一閏五年再閏名陰不足陽有餘閏者陽之餘也軍國占候曰若月三珥者大臣有喜若月冠而復暈者天下有喜廣雅曰夜光謂之月五經通義曰月中有兔與蟾蠩何月陰也蟾蠩陽也而與兔并明陰係於陽也孫氏瑞應書曰君不假臣下之權則月楊光又曰景星者天醒音精也狀如半月生於晦朔助月為明王者不私人則見虞喜安天論曰俗傳月中仙人桂樹今視其初生見仙人之足漸已成形桂樹後生為劉向七略曰京房易說云月與星至陰也有形無光日照之乃有光喻如鏡照日即有影見月初光見西方望已後光見東方皆日所照也皇甫謐年曆曰月者群陰之宗月以霄曜名曰夜光遁甲開山圖榮氏解曰女狄暮汲石紐山下泉水中得月精如雞子愛而含之不覺而吞遂有娠十四月生夏禹論衡曰月行一日一夜行二萬六千里與鳧飛相類地說書曰月照四十五萬里徐整長曆曰月徑千里周圍三千里下於天七千里楚詞天問曰夜光何德死而又育厥利維何而顧兔在腹言月中兔何所貪利而居月之腹顧望也, SBCK: ''}
