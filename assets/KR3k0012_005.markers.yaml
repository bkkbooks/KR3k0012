  - {type: variant, offset: 192, length: 623, content: 猶列星不圓何以明之春秋之時星隕宋都視之石也不圓是知日月五星亦不圓也又曰儒書言魯陽公與韓戰戰酣日暮援戈而麾之日為之反三舍此言虛也凡人能以精誠感動天者專心一意委務積神通天天為變動然尚未可謂然魯陽公志在於戰為日暮一麾安能令日反使聖人麾日日終不反魯陽公何人而使日反又曰儒言日中有三足烏日者火也烏入火中燋爛安得而立然烏日氣也又曰日中近出入遠日中小者光明故也出入時大者光闇故也又曰桀無道兩日並照在東者將起在西者將滅費昌問馮夷曰何者為殷何者為夏馮夷曰西夏也東殷也於是費昌徙族歸殷殷果克隆又曰儒者論日出扶桑暮入細柳扶桑東方之地細柳西方之野又曰日晝行千里夜行千里騏驥晝日亦千里然則日行舒疾與騏驥步相類崔豹古今注曰漢明帝為太子樂人作歌詩四章一曰日重光云天子之德光明如日太子比德焉故云重也周髀曰日光外照徑八十一萬里徐幹中論曰文王遇姜公于渭陽若披雲見白日物理論曰日者太陽之精也夏則陽盛陰衰故晝長夜短冬則陰盛陽衰故晝短夜長氣引之也行陽之道長故出入卯酉之北行陰之道短故出入卯酉之南春秋陰陽等故日行中平晝夜等也地說書曰日照四十五萬里皇甫謐季曆曰日者眾陽之宗陽精外發故日以晝明名曰曜靈龍魚河圖曰陽積精為日汲冢書曰胤甲居於河西夫有妖㜸十日並出又言本有十日迭次而運照無窮金匱曰三苗之時三月不見日黃帝占書曰日中三足烏見者其所居分野有白衣會楚辭曰十日並出流金鑠石戰國策曰聶政刺韓相荊軻刺秦王並白虹貫日史記曰漢景帝王夫人妊娠夢日入懷以生武帝又曰堯其仁如天其知如神就之如日望之如雲漢書曰李尋, WYG: ''}
