  - {type: variant, offset: 4478, length: 0, content: '', SBCK: 第五玉衡第六開陽第七摇光廣雅又云樞爲雍州璇爲兾州機爲青兖州􅁠爲徐揚州衡爲荆州開陽爲梁州摇光爲豫州第一至第四爲魁第五至第七爲扚合爲斗居隂布陽故稱北又曰五帝所行同道異位皆循斗樞機衡之分遵七政之紀九星之法又曰天樞得則景星見衡星得則麒麟生萬人夀春秋佐助期曰蕭何禀昴星而生春秋後傳曰魏人唐睢對秦王曰專諸之刺王僚彗星籠}
  - {type: page-break, offset: 4478, content: '', id: KR3k0012_SBCK_005-4b}
  - {type: variant, offset: 4478, length: 0, content: '', WYG: 第五玉衡第六開陽第七揺光廣雅又云樞為雍州璇為冀州機為青兖州權為徐揚州衡為荆州開陽為梁州揺光為豫州第一至第四為魁第五至第七為杓合為斗居隂布陽故稱北斗又五帝所行同道異位皆循斗樞璣衡之分遵七政之紀九星之法又天樞得則景星見衡星得則麒麟生萬人夀春秋後傳曰魏人唐睢對秦王曰専諸之刺王僚彗星籠}
