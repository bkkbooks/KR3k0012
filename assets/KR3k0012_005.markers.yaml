  - {type: variant, offset: 2, length: 7, content: 四日下帝王世紀, SBCK: 五星上釋名}
  - {type: variant, offset: 2, length: 186, content: 四日下帝王世紀曰文王夢日月著身望氣經曰日上有黃氣君喜下有黃氣名永福又曰漢文帝時日中有王字徐整長曆曰泉湯之精上合為日徑千里周圍三千里下於天七千里談藪曰魏文帝為王時夢日墜地分為三已得一分而內懷中鄧析書曰君者當如冬日之陽夏日之陰萬物歸之莫之使也王充論衡曰日不入地也譬人把火夜行平地去人十里火光藏矣非滅也又曰夫日月不圓視之如圓者去人遠也夫日火精也在地火不圓在天火何故獨圓日月在天猶, WYG: ''}
