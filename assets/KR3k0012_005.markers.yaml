  - {type: variant, offset: 5079, length: 289, content: 命仲宣仲宣跪而稱曰臣聞日以陽德月以陰靈擅扶光於東沼嗣若英於西溟引玄兔於帝臺集素娥於后庭若夫氣霽地表雲歛天末洞庭始波木葉微脫列宿掩縟長河韜映柔祇雪凝圓靈水鏡連觀霜縞周除冰凈歌曰美人邁兮音塵闊隔千里兮共明月宋鮑昭玩月詩曰始見西南樓纖纖如玉鉤未映東北墀娟娟似蛾眉蛾眉蔽珠攏玉鉤隔璅䆫三五二八時千里與君同夜移衡漢落徘徊帷戶中梁沈約詠月詩曰月華臨靜夜夜靜滅氛埃方暉竟入戶圓影隙中來高樓切思婦西園遊上才臨軒映珠綴應門照綠苔洞房殊未曉清光信悠哉周王襃關山月詩曰關山夜月明愁色照孤城半形同漢陣金影逐胡兵天寒光轉白風多暈欲生寄言亭上吏遊客解雞鳴月蝕易曰月盈則蝕詩曰彼月而食則維其常禮曰婦順不脩陰事, SBCK: 瓢接取並}
