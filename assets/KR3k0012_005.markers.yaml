  - {type: variant, offset: 1344, length: 344, content: 明陰不宜侵陽臣不宜掩君公羊傳曰六月辛未朔日有蝕之以朱絲縈社或曰脅之或曰為暗恐犯之故縈之社者土地之主日者土地之精上敷於天而犯日故朱絲縈之助陽抑陰穀梁傳曰天子救日置五麾陳五兵五鼓諸侯置三麾三兵三鼓大夫擊拆凡有聲皆陽事也以猒陰氣也論語云日月之蝕人皆見之更也人皆仰之漢書曰黃琬祖父香為魏郡守時日蝕而京師不見魏郡乃表日食之狀帝問日食多少香久而無對琬年六歲在傍謂香曰日食之餘如月之初遂用其言荅詔漢書曰日者德也故日蝕則脩德又曰劉寵鄭弘徐昉趙喜虞延並為三事以日蝕免官淮南子曰騏驎斗則日月蝕許慎注曰騏驎大角之獸故與日相符晷釋名曰晷規也如規畫也說文曰晷日影也周禮地官曰大司徒以土圭之法測土深正日景以求地中日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多陰日至之景尺有五寸謂之地中天地之所合也四時之所交也, SBCK: ''}
