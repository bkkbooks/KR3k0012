  - {type: variant, offset: 4725, length: 0, content: '', SBCK: 後有平成之圍又曰太微之十二星東相西將又曰戴主六星曰文昌宫一曰上將二曰次將三曰貴相四曰司命五曰司禄六曰司灾又曰危東六星兩兩而比曰司宼又曰古人有言曰天下太平五星循度又曰革命創制三章是紀應天順人五星同軌又郊祀志曰漢祖詔御史令天下立靈星祠常􅀊時祠以牛又曰天文志曰金木水火土五星天之五佐爲經緯伏見有時􅀊星東方春於人五常仁也五事貌也仁􅃜皃失逆春令傷木氣罰見􅀊星熒惑南方夏禮也視也禮􅃜視失逆夏令傷火氣罰見熒惑太白西方秋義也言也義􅃜言失逆秋令傷金氣罰見太白太白經天孟康注曰謂出東入西出西入東也太白隂星出東當伏西過午爲經天􅀳灼曰星盡見午爲經天天下兵革民更主是謂亂紀人民流亡晝見與日爭明強國弱小國強女主昌辰星北方冬智也聽出智虧聽失逆冬令傷水氣罰見辰星鎭星中央土主季夏信也思心也仁義禮智以信爲主貌言視聽以心爲正四星皆失鎭星乃爲之動又曰凡五星色皆白爲䘮爲兵爲旱青爲憂爲水黑爲疾多死黃吉五星同色天下偃兵百姓安寧歌舞以行不見災疾五榖蕃昌又曰天星皆有州圖分野角亢氐房心豫州之分尾箕幽州之分牽牛婺女揚州之分虚危青州之分營室東壁并州之分胃徐州之分畢}
