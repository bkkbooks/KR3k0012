  - {type: variant, offset: 4483, length: 2, content: 勢奪, SBCK: 安不見則兵起論語䜟曰仲尼曰吾聞堯率舜等遊首山觀河渚有五老遊河渚一老曰河圖將來告帝期二老曰河圖將來告帝謀三老曰河圖將來告帝書四老曰河圖將來告帝圖五老曰河圖將來告帝符龍衘玉苞金泥玉撿封盛書五老飛爲流星上入昴孝經援神契曰歳星守心則年榖豐廣雅曰太白謂之長庚或謂之太􅅝又曰熒惑謂之罰星或謂之執法又曰天宫謂之參旗紫宫參伐謂之大辰太微謂之明堂史記天官書曰星者金之散氣又曰漢中四星曰天駟旁一星玉良王良䇿馬車􅀐滿野又曰星墮至地則石也河濟之間時有墜星又曰畢爲罕車爲邊兵主戈獵其大星傍小星爲附耳附耳動有䜛臣在側又曰四鎭星所出四隅􅀂月始出也又曰咸池曰天五潢五帝車舎又曰中端門門左右掖門門内六星諸侯其内五星五帝坐又曰漢武帝以正月上辛祠太一甘泉夜祠到明怱有流星至}
