  - {type: variant, offset: 816, length: 780, content: 䟽曰夫日者宗陽之長暉光所燭萬里同晷人君之表也故日將旦清風發暉群陰退伏又曰文帝時新垣平上言日再中臣以候知之居頃之際日却復中乃更以十七季為元季又曰鄒陽上書說梁孝王曰昔荊軻慕燕丹之義白虹貫日太子畏之後漢書曰張重字仲篤明帝時舉孝廉帝曰何郡小吏荅曰臣日南吏帝曰日南郡人應向北看日荅曰臣聞鴈門不見壘鴈為門金城郡不見積金為郡臣雖居日南未嘗向北看日應劭漢官儀曰太山東南名曰日觀日觀雞鳴時見日魏志曰程立夢登太山捧日立以白太祖太祖遂加日於立上因改名昱晉書曰荀爽曰日下荀鳴鶴晉陽秋曰建武元年三日並出三齊略曰秦始皇作石橋於海上欲過海看日出處有神人驅石去不速神人鞭之皆流血今石橋猶赤色季尤九曲歌曰年歲晚暮日已斜安得壯士飜日車日蝕書曰乃季秋月朔辰弗集于房瞽奏鼓嗇夫馳庶人走凡日食天子伐鼓于社責上公也嗇夫主幣之官馳取弊禮天神眾人走供救日食之百役也禮記昏義曰男教不脩陽事不得謫見於天日為之蝕是故日蝕則天子素服而修六官之職蕩天下之陽事傳曰魯昭公十七年日有蝕之祝史請用幣叔孫昭子曰日有蝕昭子不舉伐鼓於社諸侯用幣於社伐鼓於朝禮也又莊二十五年曰夏六月辛未朔日有蝕之鼓用牲于社非常也唯正月之朔慝未作日有蝕之於是乎用幣于社伐鼓于朝注曰日蝕曆之常也然食於正陽月則諸侯用幣于社請救于上公伐鼓于朝退而自責以明陰不宜侵陽臣不宜掩君公羊傳曰六月辛未朔日有蝕之以朱絲縈社或曰脅之或曰為暗恐犯之故縈之社者土地之主日者土地之精上敷於天而犯日故朱絲縈之助陽抑陰穀梁傳曰天子救日置五麾陳五兵五鼓諸侯置三麾三兵三鼓大夫擊拆凡有聲皆陽事也以猒陰氣也論語云日月之蝕人皆見之更也人皆仰之漢書曰黃琬祖父香為魏郡守時日蝕而京師不見魏郡乃表日食之狀帝問日食多少香久而無對琬年六歲在傍謂香曰日食之餘如月之初遂用其言荅詔漢書曰日者德也故日蝕則脩德又曰劉寵鄭弘徐昉趙喜虞延並為三事以日蝕免官淮南子曰騏驎斗則日月蝕許慎注曰騏驎大角之獸故與日相符晷, WYG: ''}
