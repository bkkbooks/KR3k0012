  - {type: variant, offset: 4725, length: 0, content: '', WYG: 後有平城之圍又太微十二星東相西將又斗魁戴匡六星曰文昌宫一曰上將二曰次將三曰貴相四曰司命五曰司禄六曰司灾又危東六星兩兩相比曰司㓂又古人有言曰天下太平五星循度又革命創制三章是紀應天順人五星同軌又郊祀志曰漢祖詔御史令天下立靈星祠常嵗時祠以牛又天文志曰金木水火土五星天之五佐為經緯伏見有時嵗星東方春於人五常仁也五事貎也仁虧貎失逆春令傷木氣罰見嵗星熒惑南方夏禮也視也禮視失逆夏令傷火氣罰見熒惑太白西方秋義也言也義虧言失逆秋令傷金氣罰見太白太白經天孟康注曰謂出東入西出西入東也太白隂星出東當㐲東出西當伏西過午為經天晉灼曰星晝見午上為經天天下革民更主是謂亂紀人民流亡晝見與日爭明强國弱小國强女主昌辰星北方冬智也聽也智虧聽失逆冬令傷水氣罰見辰星填星中央土主季夏信也仁義禮智以信為主貎視聽以心為正四星皆失填星乃為之動又凡五星色皆圜白為䘮為旱赤中不平為兵青為憂為水黒為疾為多死黄吉五星同色天下偃兵百姓安寧歌舞以行不見災疾五榖蕃昌又天星皆有州國分野角亢氐房心豫州之分尾箕幽州之分牽牛婺女揚州之分虛危青州之分營室東壁并州之分胃徐州之分畢昴冀州之分觜參益州之分東井輿鬼雍州之分栁七星張三河之分翼軫荆州之分析木之津燕之分大火宋之分夀星鄭之分鶉尾楚之分鶉首秦之分鶉火周之分實沉魏之分大梁趙之分降婁魯之分訾即移反娵于于反衛之分𤣥枵齊之分星紀吳越之分太史掌之以觀妖祥又秦地於天官東井輿鬼之分野周地柳七星張之分野韓地角亢氐之分野趙地昴畢之分野燕地箕之分野齊地虛危之分野魯地奎之分野宋地房心之分野衛地營室東壁之分野楚地翼軫之分野呉地斗牛之分野漢武故書曰西王母使者至東方朔死上問使者對曰朔是木帝精為嵗星下遊人中以觀天下非陛下臣也漢書音義曰瑞星曰景星亦曰徳星妖星曰孛星偏指曰彗光芒四出曰孛長星亦曰欃槍絶跡而去曰飛星光跡相連曰流星亦曰奔星星光曰芒後漢書曰嚴光字子陵與光武為友後光武登祚忘之光怨帝是時太史云天上有客星恨帝帝曰豈非朕故人嚴子陵乎遽命徴之夜與子陵共卧光以脚加帝腹太史奏客星侵御座子陵縮脚客星尋退竟不仕又李固對詔陛下有尚書猶天之有北斗北斗天之喉舌尚書陛下之喉舌斟酌元氣運於四時出納王命所謂制氣之臣也又和帝分遣使者二人各至州郡觀採風謡二人當到益州投候館吏李郃舎郃問曰二君發京師時知朝廷遣二使耶問何以知之郃指星云前有二星向益州分野謝承後漢書曰吳郡周敞師事京房房為石顯所譖繫獄謂敞曰吾死後四十日客星必入天市即吾無辜之驗也房死後果如房言東觀漢記曰光武破聖公與伯叔書曰交􅄡之日辰星晝見太白清明蜀志曰漢安二十五年劉豹舉上言於先主曰乃年太白熒惑鎮從嵗漢初興五星聚嵗星主義漢位在西義之上方故漢法常以嵗星候人主當有聖主起於此以致中興頃者熒惑復追嵗見在胃}
