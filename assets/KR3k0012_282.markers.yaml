  - {type: variant, offset: 78, length: 0, content: '', SBCK: 制人敗燕師于北制君子曰不備不虞不可以師又曰宋襄公及楚人戰于泓宋人旣成列楚人未旣齊未盡度弘水也司馬子魚曰彼衆我寡及其未旣濟也請擊之公曰不可旣濟而未成列又以告公曰未可旣陣而後擊之宋師敗績公傷股門官殱焉國人皆咎公公曰君子不重傷不擒二毛二毛頭白有二色者也古之爲}
