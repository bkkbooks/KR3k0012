  - {type: variant, offset: 118, length: 1, content: 給, krp: 僞遁曳柴起塵詐爲衆走楚師馳之原􅎮郄溱以中軍公族横擊之公族公所師之軍狐偃以上軍夾攻楚左師潰楚師敗績子玉収其卒而止故不敗晉師三日館糓館舎也食楚軍穀三日也又曰楚將鬪廉帥師及巴師圍鄾音憂鄧養甥􅡭甥音男帥師救鄾三逐巴師不克鬪廉衡陣其師於巴師之中以戰而北衡横也分巴師爲二部鬭廉横陣於其間以與鄧師戰而僞北北走鄧人逐之背巴師而夾攻之楚師僞走鄧師逐之背巴師巴師攻之楚師自前與戰也鄧師大敗鄾人宵潰宵夜又曰晉師伐秦秦人毒涇上流師人多死又曰楚師伐呉鍼音針尹固與王同舟王使執燧象以奔呉師燒火燧繫象尾使赴呉師驚之鍼軄深切又曰時邾人城翼翼邾邑也還將自離姑離姑邾邑也從離姑則道經魯之武城也大夫公孫鉏曰魯將禦我欲自武城還循山而南至武城而還依山南行不欲過武城鉏助魚切大夫徐鉏丘弱茅地二子邾大夫曰道下遇雨而將不出是不歸也謂此道下山濕遂自離姑遂過武城武城人塞其前以兵塞其前道斷其後之木而弗殊邾師過之乃推而蹷之遂取邾師推士追切蹷其月切又曰晋將陽處父侵蔡父音甫楚將子上救之與晉師夾泜而軍泜直利切處父患之使謂子上曰吾聞之文不犯順武不違敵子若欲戰則吾退舎子濟而陣欲避楚使度成陣而後戰遲速唯命不然紓我紓緩老師費財亦無益也乃駕以待子上欲渉大孫伯曰不可晉人無信半渉而薄我悔敗何及不如紓之乃退舎楚退欲使晉度陽子宣言曰楚師遁矣遂歸楚師亦歸太子啇臣譛子上曰受晉賂而避之楚之恥也罪莫大}
