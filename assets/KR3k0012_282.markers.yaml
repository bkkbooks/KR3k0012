  - {type: variant, offset: 10, length: 4, content: 太宗征遼, SBCK: 凢戰者以正合以竒勝正者當敵竒兵從旁擊其不備故善竒者無窮如天地不竭如江海終而復始日月是也死而更生四時是也故聲不過五五聲之變不可勝聞色不過五五色之變不可勝觀味不過五五味之變不可勝嘗以喻竒正無窮也戰數不過竒正竒正之變不可勝窮也竒正相生如循環之無端孰能窮之哉故水之疾至於漂石者􅀔也鷙鳥之擊至於毀折者節也發起討擊敵之是以善戰者其􅀔險險猶疾也其節短短近勢如彍弩節如發機在疾不遠發則中也紛紛紜紜􅃲亂而不可亂旌旗亂也示敵者若亂以金鼓齊之渾渾沌沌形圎而不可敗也}
  - {type: variant, offset: 10, length: 4, content: 太宗征遼, WYG: 凢戰者以正合以竒勝正者當敵竒兵從旁擊其不備故善竒者無窮如天地不竭如江海終而復始日月是也死而更生四時是也故聲不過五五聲之變不可勝聞色不過五五色之變不可勝觀味不過五五味之變不可勝嘗戰勢不過竒正竒正之變不可勝窮也竒正相生如循環之無端孰能窮之哉故水之疾至於漂石者勢也鷙鳥之擊至於毁折者節也是以善戰者其勢險其節短勢如彍弩節如發機紛紛紜紜聞亂而不可亂渾渾沌沌形圓而不可敗也左𫝊曰齊侯登巫山以望晉師晉人使司馬斥山澤之險雖所不至必斾而䟽陳之使乗}
