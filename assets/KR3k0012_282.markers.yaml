  - {type: variant, offset: 100, length: 2, content: 愛女, SBCK: 軍爲二陣拒越越王乃以其中軍銜枚潜涉不鼓不譟以襲攻之呉師大敗此與左氏傳事同小異故附于此又曰呉子闔廬問於伍貟曰􅀄而言伐楚余知其可也而恐其使余徃也又惡人之有余之功也今余將自有之矣伐楚何如對曰楚執政衆而乖莫適任患適音的􅀂爲三師以􅀠焉􅀠猶勞也一師至彼必皆}
