  - {type: variant, offset: 118, length: 1, content: 給, WYG: 南至武城而還依南山行不欲過武城鉏助魚切大夫徐鉏丘弱茅地三子邾大夫曰道下過雨而將不出是不歸也謂此道下山濕遂自離姑遂過武城武城人塞其前以兵塞其前道㫁其後之木而弗殊邾師過之乃推而蹷之遂取邾師又曰晉将陽處父侵蔡父音甫楚將子上救之與晉師夾泜而軍泜直利切處父患之使謂子上曰吾聞之文不犯順武不違敵子若欲戰則吾退舍子濟而陣欲避楚使渡成陣而後戰遲速唯命不然紓我紓緩老師費財亦無益也乃駕以待子上欲渉太孫伯曰不可晉人無信半渉而薄我悔之何及不如紓之乃退舍楚退欲使晉渡陽子宣言曰楚師遁矣遂歸楚師亦歸太子商臣譖子上曰受晉賂而避之楚之耻也罪莫大}
