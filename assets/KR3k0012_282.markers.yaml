  - {type: variant, offset: 154, length: 2, content: 燧誓, SBCK: 怒皆十倍因大敗燕又曰魏趙相攻齊將田忌引兵救趙孫臏曰夫解雜亂紛糺者不控捲丘貟切救􅃲者不搏撠音㦸批亢擣虚形格􅀔禁則自爲解耳今魏趙相攻輕兵銳卒必竭}
