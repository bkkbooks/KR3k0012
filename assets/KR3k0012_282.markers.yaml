  - {type: variant, offset: 157, length: 0, content: '', SBCK: 外老弱罷於内君不􅀂引兵疾走大梁據其街路衝其方虚彼必釋趙而自収弊於魏也田忌從之直走大梁魏師遂退又曰齊孫臏謂齊王曰凢伐國之道攻心爲上務先伏其心今􅁗之所恃爲心者燕趙也當收燕趙之權今􅀃燕趙之君勿虚言空辭必將以實利以回其心所謂攻其心者也史記曰秦伐韓}
