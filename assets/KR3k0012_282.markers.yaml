  - {type: variant, offset: 140, length: 3, content: 馬燧既, WYG: 燕師伐齊已下七十餘城圍即墨未下齊将田單乃收城中得千餘牛為縫繒衣畫以五綵龍文束兵刃於其中角而灌脂束葦於尾燒其端鑿城数十穴夜縱牛壮士五千人随其後牛尾熱怒而奔燕軍燕軍夜大驚牛尾炬火光明炫燿燕軍視之皆龍文所觸盡死傷五千人因銜枚擊之而城中皷譟從之老弱者皆擊銅噐為聲聲動天地燕軍大駭}
