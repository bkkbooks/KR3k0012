  - {type: variant, offset: 96, length: 1, content: 賙, SBCK: 亦可乎猶有懼焉雖因阻擊之猶恐不勝也且今之勍者皆吾敵也雖及胡耇􅀗則取之何有於二毛今之勍者謂與吾竸者也胡耇元老之稱也耇音苟明恥教戰求殺敵也明設刑戮以恥不果也傷未及死如何勿重言尚能害已也􅀂愛重傷則如勿傷愛其二毛則如服焉言苟不欲傷殺敵人則本可不湏鬬也三軍以利用也爲利興也金鼓以聲氣也鼓以佐士衆之聲􅂔也利而用之阻隘可也聲盛致志鼔儳可也儳巖未整陣也儳音䜛通典曰宋公違之而敗也又曰越伐呉呉子禦于笠澤夾水而陣越爲左右勾卒勾卒伍伍相著别爲左右屯也勾音鈎使夜或左或右鼔譟而進呉師分以禦之越以三軍潜渉當呉中軍而鼓之呉師大亂遂敗之左右勾卒爲聲勢以分呉而三軍精卒并力擊其中軍故得勝呉越春秋越伐呉起軍於江南}
