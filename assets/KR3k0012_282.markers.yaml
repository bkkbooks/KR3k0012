  - {type: variant, offset: 107, length: 2, content: 室家, SBCK: 呉伐越越子勾踐禦之陣于擕李擕將遂切勾踐患呉之整也使死士再擒焉不動使敢死之士往輙爲呉師}
  - {type: variant, offset: 107, length: 1, content: 室, WYG: 吴伐越越子勾踐禦之陣于㰎李㰎將遂切勾踐患吴之整也使死士再擒焉不動使敢死之士徃輙為吴師所擒欲使吴師亂取之而吴不動使罪人三行屬劒於頸以劒注頸行户郎切而辭曰二君有理理軍旅也臣奸旗鼓犯軍令也不敏於君之行前不敢逃刑將歸死遂自剄也師屬之目越子因而伐之大敗之又曰楚子圍宋宋公孫固如晉告急先軫曰報施救患取威定伯於是乎在矣狐偃曰楚始得曹而新婚於衞若伐曹衞楚必救之則宋免矣又曰晉楚戰于城濮楚将子玉從晉師晉師陣于莘北胥臣以下軍之佐當陳蔡子玉以若敖之六卒将中軍曰今日必無晉矣鬬宜申将左鬬勃将右晉禆将胥臣䝉馬以虎皮先犯陳蔡陳蔡奔楚右師潰陳蔡属楚之師狐毛設二斾而退之斾大旗也又建二斾而退使若大将稍却也欒枝使輿曳柴而偽遁曳柴起塵詐為敗走楚師馳之原軫郤溱以中軍公族横擊之公族公}
