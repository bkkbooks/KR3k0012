  - {type: variant, offset: 1195, length: 1745, content: 十餘人皆割股肉以祭重胤古之良將無以加也三國典略曰北齊斛律光雖居大將未嘗戮人軍士未安終不入幕寒不服裘夏不操扇所得果糒徧分麾下號令不過數句言皆切要每戰居險為士卒先有士卒中蠱親嘗其唾三軍感之樂為致命戰國策曰魏以吳起為將與士卒最下者同衣食臥不設席行不騎乘親羸糧與士分勞羸音盈卒有病疽者吳起為吮疽七余反卒母聞而哭之或謂之曰母子卒也而將軍自吮其疽何哭矣母曰非然也往年吳公吮其父父戰不旋踵遂死於敵今又吮此子妾不知其所死處矣是以哭之於是擊秦拔其五城呂氏春秋曰勾踐苦會稽之恥欲深得民心必致死於吳有酒流之江與人同有甘肥不分不敢食又曰昔秦繆公乘馬而車為敗右服失而野人取之四馬車兩馬在中為服詩曰兩服上襄兩在邊為驂繆公自往求焉見野人方將食之於歧山之陽繆公笑曰食駿馬之肉不還飲酒余恐其傷汝也徧飲而去之處一年為韓原之戰晉人已環繆公之車矣晉梁由靡已扣繆公之左驂矣扣持晉惠公之右路右奮役而擊繆公其甲之抎者已六扎矣抎者配隕也文有所失也野人之嘗食馬肉者三百有餘人畢力為繆公疾鬭於車下遂大克晉反獲惠公以歸此詩所謂君子正以行德愛人則寬以盡其力人主胡可不務行德愛人行德愛人則民親其上皆樂為其死符子曰秦穆公伐晉及河將勞師而醪唯飲一鍾蹇叔曰一米可投河而釀也穆公乃以一醪投河三軍醉矣三略曰夫將之為帥者必同滋味共安危人有遺一簞之醪者使投諸河令士眾向流而挹之夫一簞之醪不能味一河然而三軍之士思為之死者何也以滋味及己也又曰用兵之要在於崇禮而重祿崇高也祿廩食也崇禮則賢士至重祿則戎士輕死賢士至謂若燕禮郭隗而樂毅之徒鱗集也故曰重賞之下必有死夫又曰良將之統軍也恕己活人推惠施恩士力日親戰如風發攻如河決淮南子曰古人善將者必以其身先之暑不張蓋寒不被裘所以均寒暑也陰陽不乘上陵必下所以齊勞佚也軍食熟然後敢食軍井通然後敢飲所以同飢渴也合戰必立矢射之所及以其安危也故良將之用兵也常以積德擊積怨以積愛擊積憎何故而不勝主之所求於民者二求民為之勞也欲民為之死也民之所望於主者三飢者能食之勞者能息之有功者能德之民已償其二責而失其三望國雖大兵猶且弱也又曰苦者必得其樂勞者必得其利斬首之功必全死事之後必賞死事以軍事死賞其後子孫也四者既信於民矣主雖射雲中之鳥而釣深淵之魚彈琴瑟聲鍾竿敦六愽敦致也投高嗇兵猶且強令猶且行也是故上足仰則下可用也德足慕則威可立也又曰上視下如子則下事上如父上視下如弟則下事上如兄夫上視下如子則必王四海下事上如父則必正天下上視下如弟則不難為之死下事上如兄則不難為之亡是故父子兄弟之寇不可與鬭者積恩先施也故四馬不調造父不能以致遠弓矢不調羿不能以必中君臣乖心則孫子不能以應敵孫子名武吳王闔閭之將也是故內脩其政以積其德外塞其醜以服其威察其勞佚以知其飽飢故戰日有期視死若歸故將必與卒同甘苦共飢寒故其死可得而盡也說苑曰楚莊王賜群臣酒多燈燭滅乃有人引美人衣者美人援絕其冠纓告王曰今者燭滅有引妾衣者妾援得其冠纓持之趣火來上視絕纓者曰賜人酒使醉失禮奈何欲顯婦人之節而辱士乎乃命左右曰今日與寡人飲不絕冠纓者不懽群臣百有餘人皆絕去其冠纓而上火卒盡懽而罷居二年晉與楚戰有一臣常在前五合五獲首却敵卒得勝之莊王怪而問曰寡人德薄又未嘗異子子何故出死不疑如是對曰臣當死往者醉失禮王隱忍不暴而誅也臣終不敢以蔭蔽之德而不顯報王也常願肝腦塗地用頸血濺敵久矣臣乃夜絕纓者也遂斥晉軍楚得以強此有陰德者必有陽報也又曰平原君既歸趙楚使春申君將兵救趙魏信陵君亦矯奪晉鄙軍往救趙未至秦急圍邯鄲邯鄲急且降平原君患之甚邯鄲傳舍吏子李談謂平原君曰君不憂趙亡乎平原君曰趙亡即勝虜何為不憂李談曰邯鄲之民炊骨易子而食之可謂至因而君之後宮百數婦妾荷綺縠廚糧餘梁肉士民兵盡或剡木為矛戟而君之器物鍾磬自恣若使秦破趙君安得有此使趙而全君誠能令夫人以下徧於士卒間分功作之家所有盡散以饗士方其危苦時易惠耳於是平原君如其計而勇敢之士三千人皆出死因從李談赴秦軍為却三十里亦會楚魏救至秦軍遂罷李談死封其父為侯列女傳曰楚子反攻秦軍絕糧使人請於王因問其母母問使者曰士卒無恙乎使者曰士卒分菽粒而食之又問曰將軍無恙乎對曰將軍朝夕蒭豢黍梁子反破秦軍而歸母閉門不內使數之曰子不聞越王勾踐之伐吳耶客有獻醇酒一器者王使人注上流使卒飲下流味不加喙而士卒戰自五也異日又有獻一囊糒王又使以賜軍士分而食之甘不踰嗌而戰自十也今士卒分菽粒而食之子獨朝夕芻豢何也, SBCK: ''}
