  - {type: variant, offset: 231, length: 963, content: 口亦同陷泚左右或有言者晟曰乘輿何在而敢言乎泚又間日使人至晟軍則晟小吏王無忌之婿也因無忌以謁晟且曰公家無恙城中有書問以此誘晟晟怒曰爾敢為賊傳命耶立斬之時轉輸不至盛夏軍士或衣裘褐晟必同勞苦每以大義奮激士皆涕流感悅卒無離叛者於是軍士皆角力馳騎超踰為戲晟知可用又曰德宗在梁州山南地偏及夏尤熱將士未給春服上亦御裌服以視朝左右請御衫上曰將士從我者冬服未易我豈可獨衣衫乎將士聞之無不感涕至五月諸道財賦稍至先令給將士衣服而後御衫又曰李光顏為陳許節度使會討吳元濟詔光顏以本軍獨當一面光顏性忠義善撫養士卒士卒樂為用每戰甚苦及賊將鄧懷金以郾城兵三千人降光顏益堅平賊之志時韓弘為汴帥驕矜倔強常恃賊勢索朝廷姑息且惡光顏力戰陰圖撓屈計無所施遂舉大梁城求得一美婦人教以歌舞絃管六愽之藝飾之以珠翠金玉衣服之具計費凡數百萬命使者送遺光顏冀光顏一見悅惑而怠於軍政也使者即齎書先造光顏戰壘曰本使令公德公私愛憂公暴露欲進一妓以慰公征役之思謹以候命光顏曰今日已暮明旦納焉詰朝光顏乃大宴軍士三軍咸集命使者進妓妓至則容止端麗殆非人間所有一座皆驚光顏乃於座上謂來使曰令公憐光顏離家室久捨美妓見贈誠有以荷德也然光顏受國恩深誓不與逆賊同生日月下今戰卒數萬皆棄妻子蹈白刃光顏奈何獨以女色為樂言訖涕泣嗚咽堂下兵士數萬皆感激流涕乃厚以縑帛酬來使俾令領其妓自席上而廻仍謂使者曰為光顏多謝令公光顏事君許國之心死無貳矣明日遂大戰兵士無不一當百終殄蔡孽光顏功㝡居多又曰令狐楚為汴州刺史汴軍素驕累逐主帥前使韓弘兄弟率以峻法繩之人皆偷生未能革志楚長於撫理前鎮河陽代烏重胤重胤移鎮滄州以河陽軍三千人為牙卒咸不願從中路叛歸又不敢歸州聚於境上楚初赴任聞之乃疾驅赴懷州潰卒亦至楚單騎喻之咸令櫜弓解甲用為前驅卒不敢亂及蒞汴州解其酷法以仁惠為治去其太甚軍民感悅翕然從化後竟為善地又曰柳公綽鎮鄂州時吳元濟叛公綽請討之鄂軍既在行營公綽時令左右省問其家如疾病養生送死必厚廩給之軍士之妻冶容不謹者沉之于江行卒相感曰中丞為我輩知家事何以報效故鄂人戰每剋捷又曰鄭從讜為北都留守舊府城都虞候張彥球者前帥令率兵三千逐沙陁於百井中路而還縱兵破鑰殺故帥康傳圭及從讜至搜索其魁誅之知彥球善有方略召之開喻坦然無疑悉以兵柄委之又曰烏重胤為長帥赤心奉上能與下同甘苦所至立功未嘗矜伐而善待寮佐體分周密曲盡禮敬故當時名士咸願依焉歿數日有軍士, SBCK: 八十}
