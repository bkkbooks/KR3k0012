  - {type: variant, offset: 145, length: 1, content: 悅, WYG: 單拒守乃宣言曰吾惟懼燕軍之劓所得齊卒置之前行與我戰即墨敗矣燕人聞之如其言城中人見齊降者盡劓皆怒堅守唯恐見得田單又縱反間曰吾懼燕人掘吾城外塜墓戮先人可為寒心燕軍盡掘壟墓燒死人即墨人從城上遥見皆涕泣共欲出戰怒皆十倍因大敗燕又曰魏趙相攻齊將田忌引兵救趙孫臏曰夫解雜亂紛糺者不控棬巨員切救鬭者不捍擑音㦸批亢𢷬虛形格勢禁則自為解耳今魏趙相攻輕兵鋭卒必竭於外老弱罷於内君不若引兵疾走入大梁深據其街路衝其方虛彼必釋趙而自収弊於魏也田忌從之直走大梁魏師遂退又曰齊孫臏謂齊王曰凡伐國之道攻心為上務先伏其心今秦之所恃為心者燕趙也當収燕趙之權今說燕趙之君勿虛言空亂必將}
