  - {type: variant, offset: 2664, length: 2, content: 疾風, WYG: 張平叔長慶中為戸部侍郎平叔狡險大言因王播以進既掌財用常屈公利以便嬖倖多狎之既有寵於上進退便僻雜以優諧或自稱老奴無復大臣之體嘗奏事畢降階復昇又有論奏佻盪輕脱上每為笑容之在班列間玩狎郎吏譁肆無忌請變㩁鹽法請宰相為之使因以自求樞機之任每月内制出輙疑授已整衣冠以俟後人多笑之又曰庾敬休字順之為户部侍郎奏两川米價騰踊百姓流亡請糶兩川闕官職田䘵米以救貧人從之户部郎中六典曰户部郎中員外郎掌分理户口井田之事凡天下大道任土所出而為貢賦之差隋書曰高構徴拜比部郎㝷轉民部時内史侍郎晉平東與兄子長茂争嫡尚書省不能斷朝臣三議不決構斷而合理上以為能召入内殿勞之曰我聞尚書郎上應列宿觀卿才識方}
