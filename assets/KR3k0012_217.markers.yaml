  - {type: variant, offset: 2653, length: 0, content: '', WYG: 主人吏上尚書事呉志曰孫休初即位户部尚書階下讀奏梁書曰到溉為左民尚書溉身長八尺美風儀善容止所蒞以清白自脩性又率儉不好聲色虛室單牀傍無姬侍自外車服不事鮮華冠履十年一易朝服或至穿補傳呼清路示有朝章而已又曰何𦙍字子季為左民尚書後辭官隱於若邪山雲門寺勑給白衣尚書禄𦙍固辭又曰到洽為御史中丞兄溉為左民尚書舊中丞不得入尚書下舍洽引服親不應有礙刺省詳决乃許入溉省亦以其兄弟素篤不能相别也又曰周𢎞正為左民尚書夏月著犢鼻褌衣朱衣為有司所彈其放達如此戸部侍郎唐書曰李林甫引蕭炅為户部侍郎嘗與嚴挺之同行慶弔客次有禮記一卷炅讀之曰蒸嘗伏獵炅早從官無學術不識伏臘之意誤讀之挺之戲問炅對如初挺之白張九齡曰省中豈得有伏獵侍郎由是出為岐州刺史又曰李絳為户部侍郎嘗因次對憲宗曰戸部比有進獻至卿獨無何也絳曰將户部錢獻入内藏是用官物以結私恩上聳然益嘉其直又曰長慶中孟簡代崔群為户部侍郎是官有}
