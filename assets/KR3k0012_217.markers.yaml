  - {type: variant, offset: 9, length: 2029, content: 六典曰吏部郎中掌考天下文吏之班秩階品魏志曰諸葛誕字公休為吏部郎人有所囑託輒顯其言而亟用之後有當否則公議其得失以為襃貶自是群寮莫不慎其所舉魏志曰袁侃論議清當柔而不犯善與人同當廢興之間人所趨務者常謙退不為也時人以是稱之歷選部郎號為清平魏氏春秋曰許允為吏部郎選郡守明帝疑其所用非次召入將加罪允妻阮氏跣出謂曰明主可以理奪難以情求允領之而入帝怒詰之允對曰某郡守雖限滿文書先至年限在後某守雖後日限在前帝取事視乃釋遣出望其衣敗曰清吏也蜀志曰趙戩字叔茂京兆長陵人質而好學言稱詩書愛鄙於人不論踈密辟公府入為尚書選部郎董卓欲以所私並充臺閣戩拒不聽卓怒召戩欲殺之觀者皆為戩懼而戩自若及見卓列辭正色陳說是非卓雖凶戾屈而謝之晉書曰山濤為吏部郎文帝與書曰足下在事明雅邁時念多所乏今致錢二十萬絲百斤穀二百斛又曰李重字茂曾遷尚書吏部郎詢朝眾而斥華競存公平而塞私謁是以群才罔不畢舉又曰吏部郎缺文帝問人於鍾會會曰裴楷清通王戎簡要皆其選也於是以楷為吏部郎又曰徐寧少未知名為興縣令時廷尉桓彝稱有人倫鑒識護軍庾亮每屬之訪一佳吏部郎彝嘗去職至廣陵尋親舊還遇風停浦中累日憂悒因上岸見一室宇有似廨署訪之云是興縣彝乃造之寧清惠愽涉相遇欣然因留數夕彝大賞之結交而別至都謂庾亮曰吾為卿得一佳吏部郎亮問所在彝曰人所應有不必有人所應無不必無徐寧真海岱清士因為敘之即遷吏部郎又曰杜錫字世嘏補吏部郎不敢用鄉曲一人又曰王戎少頴悟二十四為吏部郎又曰李胤為吏部清慎選舉號為廉平荀綽晉後略曰武含字景緯官歷中庶子遷散騎常侍以母在日誨云汝修其志仕當為尚書郎懼進敘有違前言乃辭常侍為吏部郎晉中興書曰阮放與從弟孚齊名為吏部郎銓管之任甚有稱譽性清約不理產業為郎不免飢乏王導庾亮以其名士供給衣食放由是得立又曰畢卓字茂世新蔡人少亦放達泰興末為吏部郎常飲酒廢職比舍郎釀卓因醉夜至其甕間取酒飲之掌酒者不察執而縛之郎往視乃畢吏部也遽釋其縛卓遂引主人宴於甕側取醉而去卓常謂人曰右手持酒杯左手持蟹螯拍浮酒池中便足了一生宋書曰王僧綽為吏部郎參掌大選究識流品諳悉人物拔才舉能咸得其分又曰何尚之遷吏部郎告休定省傾朝廷送別於治渚及至郡叔度謂曰聞汝來此傾朝相送可幾客荅曰殆數百人叔度笑曰此是送吏部郎耳非關何彥德也昔殷浩亦嘗作豫章定省送別者甚眾及廢徙東陽船泊征虜亭積日乃至親舊無復相窺者又曰王微字景玄吏部尚書江湛舉微為吏部郎微與湛書曰君平生云揚我名者殺我身天爵且猶滅名安用吏部郎哉其舉何陋其事不經非獨搢紳者不道僕妾皆笑之又曰王悅之為吏部郎鄰舍有會同者遺悅之餅一甌辭不受曰此費誠小然少來不願當之又曰袁淑為吏部郎其秋大舉北伐淑侍坐從容曰今當鳴鑾中岳席卷趙魏撿玉岱宗今其時也臣逢千載之會願上封禪書一篇太祖笑曰盛德之事我何足以當之齊書曰陸慧曉遷吏部郎尚書令王晏選門生補內外要局慧曉為用數人而止晏恨之送女妓一人欲與申好慧曉不納吏曹都令史歷政以來諮執選事慧曉任巳獨行未嘗與語帝遣左右單景儁以事誚問慧曉謂景儁曰六十之年不復能諮都令史為吏部郎也上若謂身不堪便當拂衣而退帝甚憚之又曰謝朓遷尚書吏部郎中上表三讓中書疑朓官未及讓以問沈約曰宋元嘉中范曄讓吏部朱循之讓黃門蔡興宗讓中書並三表詔答其事宛然近代小官不讓遂成恒俗恐此有乖讓意王藍田劉安西並貴重初自不讓今豈可慕此不讓耶孫興公孔覬並讓記室今豈可三署皆讓耶謝吏部今授超階讓別有意豈關官之大小梁書曰顧憲之字士思為吏部郎初其祖凱之嘗為吏部於庭列植嘉樹謂人曰吾為憲之種耳至是憲之果為此官又曰王亮字奉叔為吏部郎銓序著稱及後為吏部尚書拘資次而巳當代謂為不能後魏書曰宋繇沮渠蒙遜平酒泉於繇室得書數千卷鹽米十斛而巳蒙遜歎曰孤不喜克李歆欣得宋繇耳拜尚書吏部郎中委以銓衡之任又曰鄧淵愽覽經書長於易筮太祖定中原擢為吏部郎淵明解制度多識故事與崔玄伯參定朝儀律令音樂及軍國文記詔策多淵所為又曰孝文帝欲創革舊制選置百官謂群臣曰為朕舉一吏部郎給卿三日假尋曰朕巳得之矣乃徵崔亮為之亮字敬儒自參選事垂將二十年廉慎明決尚書曰非崔郎中選事不辨又曰韋瑒為吏部郎性貪婪鬻賣官吏皆有定價王蘊別傳曰蘊字叔仁為吏部郎欲使時無屈滯曾下鼓急出日昃乃至家去臺數里高褰車帷先後與語不得進也一官缺求者十輩蘊連狀呈宰錄曰某人有地某人有才不得者甘心無怨晉懷帝永嘉官名曰吏部郎太原溫畿字元甫世論以其為人夷曠似玉郭子曰劉道真少時漁釣草澤善歌嘯聞之者莫不留連有一老嫗識其非人甚樂其歌嘯及殺豚進之道真食豚盡了不謝嫗見其不飽又進一豚又食半餘半還之後道真為吏部郎嫗兒為小令史道真乃超用之兒不知所由問母而後知之於是齎牛酒以詣道真道真笑曰去去無可復相報者世說曰山濤舉阮咸為吏部郎白曰清直寡欲萬物不能移也山濤啟事曰人才既自難知中人巳下情偽又難吏部郎以碎事日夜相接非但當正巳而巳乃當能正人議郎杜默德履亦佳太子庶子崔諒中郎陳淮皆有意正又其次不審有可用者不袁宏與謝僕射書曰聞見擬為吏部郎不知審爾果當至此誠相遇之過梁陸倕拜吏部郎表曰銓衡庶品歷選賓實阮咸真素屢薦未登陸亮忠心裁居敗職自非季重清識李毅恬正何以區分管庫式鑒胥吏吏, WYG: 兵}
