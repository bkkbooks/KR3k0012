  - {type: 'tls:seg', offset: 5, content: '', id: KR3k0012_CHANT_217-1a.2}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 司郎中貟外户部尚書户部侍郎户部四司郎中貟外兵部尚書六典曰兵部尚書侍郎之職掌天下武官選授及地圖輿馬甲仗之政令其屬有四一曰兵部二曰職方三曰駕部四曰庫部揔其職務而行其制命凡中外百司之事由於所屬咸質正焉五代史晉史曰王權轉兵部尚書髙祖德契丹屈節以事之馳馹乗軺道路交織一日勑權爲使權以前丗累爲將相未嘗有􅁛臣於戎虜者謂人曰我雖不才年今耄矣豈能稽顙於穹廬之長乎違詔得罪亦所甘心由是停任兵部侍郎唐書曰太宗以楊􅀪禮有文武材擢拜兵部侍郎專典兵機之務􅀪禮每入叅謀議出則統衆攻戰駐蹕之陣領馬歩二十四軍出其不意以擊之所向摧破太宗自山下見􅀪禮所統之衆人皆盡力殺獲居多甚壯之謂許敬宗等曰越公兒郎故有家風矣又曰崔湜遷兵部侍郎父挹爲禮部侍郎父子同爲南省副貳有唐已來未有其事兵部郎中兵部貟外郎六典曰兵部郎中二人一人掌判帳及天下武官之階品衛府之名數一人掌判簿以揔軍戎差遣之名數貟外郎二人職方郎中職方貟外郎六典曰職方郎中貟外郎掌天下之地圖及城隍鎭戍烽候之數辨其􅀖國都鄙之逺近及四夷之歸化者外夷每有蕃客至委鴻臚訊其人本國山川風土修圖以進周禮曰夏官職方氏中大夫之職掌天下地圖主四方之職貢駕部郎中駕部貟外郎六典曰駕部郎中貟外郎掌􅀖國輿輦車乗傳驛厩牧官私馬牛􅄂畜簿籍辨其出入司其名數北史曰馮子琮爲尚書駕部郎中攝庫部孝昭曽閱簿領試令口陳子琮闇對無有遺失隋書曰辛公義爲駕部郎勾撿馬牧所獲十餘萬疋帝喜曰唯我公義奉國竭心庫部郎中庫部貟外郎六典曰庫部郎中貟外郎掌􅀖國軍州戎器儀仗凡元正冬至陳設并祠􅀕喪葬所供之物皆辦其出入之數量其繕造之功以分給焉宋書曰文帝宴㑹有荒外歸化人帝問尚書庫部顧琮曰庫中仗有幾許琛跪對曰有十萬人仗舊武庫仗多祕不言帝旣問失言及琛跪對甚善之又曰江智泉除尚書庫部郎時髙流官序不爲臺郎智泉問􅀌援寡獨有此選意甚不恱固辭不拜唐書曰孔􅀂思遷庫部郎中􅀂思常謂人仕至郎中足矣至是持一石止水滿於座右以示有止足之意戸部尚書六典曰戸部尚書侍郎之職掌天下田戸均輸錢榖之政令其屬有四一曰户部二曰度支三曰金部四曰倉部揔其職務而行其制命凡中外百司之事由於所屬皆質正焉漢書曰成帝置尚書五人其三曰民曹主人}
