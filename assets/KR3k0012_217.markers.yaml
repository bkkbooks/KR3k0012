  - {type: variant, offset: 5, length: 1, content: 吏, WYG: 軍出其不意以擊之所向摧破太宗自山下見𢎞禮所統之衆人皆盡力殺獲居多甚壮之謂許敬宗等曰越公兒郎故有家風矣又曰崔湜遷兵部侍郎父挹為禮部侍郎父子同為南省副貳有唐已來未有其事兵}
