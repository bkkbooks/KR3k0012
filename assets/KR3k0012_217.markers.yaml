  body:
  - {type: variant, offset: 3, length: 0, content: '', WYG: 一十五兵部尚書兵部侍郎兵部四司郎中員外戸部尚書戸部侍郎戸部四司郎中員外兵部尚書六典曰兵部尚書侍郎之職掌天下武官選授及地圖輿馬甲仗之政令其屬有四一曰兵部二曰職方三曰駕部四曰庫部總其職務而行其制命凡中外百司之事由於所屬咸質正焉五代史晉史曰王權轉兵部尚書高祖徳契丹屈節以事之馳馹乘軺道路交織一日勅權為使權以前世累為將相未嘗自稱臣於戎虜者謂人曰我雖不才年今耄矣豈能稽顙於窮廬之長乎違詔得罪亦所甘心由是停任兵部侍郎唐書曰太宗以楊𢎞禮有文武材擢拜兵部侍郎專典兵機之務𢎞禮每入叅謀議出則統衆攻戰駐蹕之陣領馬步二}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_WYG_217-1b, image: WYG0895/WYG0895-0027d.png}
