  - {type: variant, offset: 2879, length: 818, content: 一月定京官考不避權幸皆行昇黜奏曰宰臣蕭俛叚文昌崔植是陛下君臨之初用為輔弼安危理亂決在此時况陛下思天下和平敬大臣禮切固未有昵比左右侈滿自賢之心而宰相之權宰相之事陛下一以付之實君義臣行千載一遇之時也此時若失他更無時而俛等上不能推至公申炯誡陳先王道德以沃君心又不能正色匪躬振舉舊法復百司之本如此則教化不立矣臣聞政之興廢在於賞罰俛等作相巳來未聞獎一人德義舉守官奉公者使天下在官之徒有所激勸又不聞黜一人職事不理持祿養交者使尸祿之徒有所懼如此則刑法不立矣雅正莫辯混然無章教化不行賞罰不設天下之事復何望哉一昨陛下遊幸驪山宰相翰林學士是陛下股肱心腹宜皆知之蕭俛等不能先事未形忘軀懇諫而使陛下有忽諫之名流於史冊是䧟君於過也孔子曰所謂大臣者以道事君不可則止若俛等言行計從不當如是若言不行計不從須奉身速退不宜尸素於化源進退戾也何所避辭其蕭俛叚文昌崔植三人并翰林學士杜元頴等並請考中下御史大夫李絳左散騎常侍張惟素右散騎常侍李益等諫幸驪山鄭覃等諫畋遊是皆恐陛下行幸不息恣情無度又恐馬有銜蹶不測之變風寒生疾之憂急奏無所詣國璽委於婦人中倖之手絳等能率御史諫官論列於朝有懇激事君之禮其李絳張惟素李益三人伏請賜上下考外特與遷官以彰陛下優忠賞諫之美其崔元略冠供奉之首合考上下緣與于翬上下考于翬以犯贓處死准令須降請賜考中中大理卿許季同任使于翬韋道冲韋正牧皆以犯贓或左降或處死合考中下然頃者䧟劉闢之亂棄家歸朝忠節明著今宜以功補過請賜考中中少府監裴通職事修舉合考中上以其請追封所生母而捨嫡母是明罔於君幽欺其先請考中下伏以昔在宰夫入寢擅飯師曠李調今愚臣守官請書宰相學士中下考上愛聖運下振頹綱故臣懼不言之為罪不懼言之為罪也其三品官考伏綠限在今月內進輒先具如前其四品巳下官續具條流聞奏狀入留中不下議者以宰輔曠官自宜上䟽論列而渤越職釣名非盡事君之道唐新語曰李廻秀任考功員外知貢舉有進士姓崔者文筆非佳廻秀覽之良久謂曰清河崔郎儀貌不惡鬚眉如戟精彩甚高出身何處量豈必須進士再三喻而遣之聞者大噱, SBCK: 七}
