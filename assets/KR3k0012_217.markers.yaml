  - {type: variant, offset: 6, length: 0, content: '', SBCK: 上尚書事呉志曰孫休􅀄即位戸部尚書階下讀奏梁書曰到漑爲左民尚書漑身長八尺美風儀善容止所蒞以清白自脩性又率儉不好聲色虚室單牀傍無􅁎侍自外車服不事鮮華冠履十年一易朝服或至穿􅀘傳呼清露示有朝章而巳又曰何㣧字子季爲左人尚書後辭官隱於􅀂邪山雲門寺勑給白衣尚書禄胤固辭又曰到洽爲御史中丞兄漑爲左人尚書舊中丞不得入尚書下舎洽引服親不應有礙刺省詳決乃許入漑省亦以其兄弟素篤不能相別也又曰周􅀪正爲左民尚書夏月著犢鼻禈衣朱衣爲有司所彈其放逹如此户部侍郎唐書曰李林甫引蕭炅爲戸部侍郎甞與何挺之同行慶弔客次有禮記一卷炅讀之曰蒸甞伏臘炅早從宦無學術不識伏臘之意誤讀之挺之戲問炅對如􅀄挺之白張九齡曰省中豈得有伏獵侍郎由是出爲歧州刺史又曰李絳爲戸部侍郎甞因次對憲宗曰戸部比有進獻至卿獨無何也絳曰將户部錢獻入内藏是用官物以結私恩上聳然益嘉其直又曰長慶中孟簡代崔羣爲戸部侍郎是官有二貟其判使案者別居一署謂之左戸元和以還號爲清重之最宰輔登用多由此而去又曰張平叔長慶中爲户部侍郎平叔狡險大言囚王播以進旣掌財用常屈公利以便嬖倖多狎之旣有寵於上進退便僻􅄂以優諧或自稱老奴無復大臣之體甞奏事畢降階復昇又有論奏佻盪輕脫上每爲􅀏容之在班列間玩狎郎吏譁肆無忌請變榷鹽法請宰相爲之使因以自求樞機之任每有内制出輙疑授巳整衣冠以俟後人多􅀏之又曰􅁃敬休字順之爲戸部侍郎奏兩川米價騰踊百姓流亡請糶兩川闕官職田禄米以救貧人從之户}
