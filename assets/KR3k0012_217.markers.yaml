  - {type: variant, offset: 649, length: 794, content: 郎懼進敘有違前言乃辭常侍為吏部郎晉中興書曰阮放與從弟孚齊名為吏部郎銓管之任甚有稱譽性清約不理產業為郎不免飢乏王導庾亮以其名士供給衣食放由是得立又曰畢卓字茂世新蔡人少亦放達泰興末為吏部郎常飲酒廢職比舍郎釀卓因醉夜至其甕間取酒飲之掌酒者不察執而縛之郎往視乃畢吏部也遽釋其縛卓遂引主人宴於甕側取醉而去卓常謂人曰右手持酒杯左手持蟹螯拍浮酒池中便足了一生宋書曰王僧綽為吏部郎參掌大選究識流品諳悉人物拔才舉能咸得其分又曰何尚之遷吏部郎告休定省傾朝廷送別於治渚及至郡叔度謂曰聞汝來此傾朝相送可幾客荅曰殆數百人叔度笑曰此是送吏部郎耳非關何彥德也昔殷浩亦嘗作豫章定省送別者甚眾及廢徙東陽船泊征虜亭積日乃至親舊無復相窺者又曰王微字景玄吏部尚書江湛舉微為吏部郎微與湛書曰君平生云揚我名者殺我身天爵且猶滅名安用吏部郎哉其舉何陋其事不經非獨搢紳者不道僕妾皆笑之又曰王悅之為吏部郎鄰舍有會同者遺悅之餅一甌辭不受曰此費誠小然少來不願當之又曰袁淑為吏部郎其秋大舉北伐淑侍坐從容曰今當鳴鑾中岳席卷趙魏撿玉岱宗今其時也臣逢千載之會願上封禪書一篇太祖笑曰盛德之事我何足以當之齊書曰陸慧曉遷吏部郎尚書令王晏選門生補內外要局慧曉為用數人而止晏恨之送女妓一人欲與申好慧曉不納吏曹都令史歷政以來諮執選事慧曉任巳獨行未嘗與語帝遣左右單景儁以事誚問慧曉謂景儁曰六十之年不復能諮都令史為吏部郎也上若謂身不堪便當拂衣而退帝甚憚之又曰謝朓遷尚書吏部郎中上表三讓中書疑朓官未及讓以問沈約曰宋元嘉中范曄讓吏部朱循之讓黃門蔡興宗讓中書並三表詔答其事宛然近代小官不讓遂成恒俗恐此有乖讓意王藍田劉安西並貴重初自不讓今豈可慕此不讓耶孫興公孔覬並讓記室今豈可三署皆讓耶謝吏部今授超階讓別有意豈關官之大小梁書曰顧憲之字士思為吏部郎初其祖凱之嘗為吏部於庭列植嘉樹謂人曰吾為憲之種耳至是憲之果為此官又曰王亮字奉叔為吏部郎銓序著稱及後為吏部尚書拘資次而巳當代謂為不能, SBCK: ''}
