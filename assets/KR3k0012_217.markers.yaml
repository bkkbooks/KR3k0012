  - {type: variant, offset: 2672, length: 2, content: 考功, WYG: 嫡庶者禮教之所重我讀卿判數遍詞理愜當意所不能及也賜米百石由是知名唐書曰韋維少習儒業博渉文史舉進士自大理丞累至戸部郎中善於剖判時員外郎宋之問工於詩時人以為戸部有二妙戸部員外郎唐新語曰吕太一遷戸部員外戸部與吏部隣司吏部移牒戸部令􅘘宇悉竪棘以防令史交通太一報牒曰眷彼吏部銓綜之司當須簡要清通何必竪籬揷棘省中賞其俊抜度支尚書晉書曰初魏文帝置度支尚書專掌軍國支計朝議以征討未息動須節量及明帝嗣位欲用安平王孚問左右曰有兄風不答曰似兄帝曰吾得司馬懿二人復何憂哉轉為度支尚書又曰當陽侯杜元凱為度支尚書内以利人外以救邉備物致用以濟當時之益者五十餘條朱鳳晉書曰文帝立度支尚書軍糧計校一由之以司馬孚為之晉起居注曰咸寧五年詔曰一年不收使公私俱匱不唯天時乃人事有不盡也故摠要者正在度支尚書也其以散騎常侍中書令張華為度支尚書後魏書曰陽平王子匡除度支尚書匡與尚書令高肇不平常無降下之色時世宗委政於肇朝夕傾憚惟匡與肇抗衡先自造棺置於㕔事意欲輿棺詣闕論之隋書曰長孫平開皇三年徴拜度支尚書平見天下州縣多罹水旱百姓不給奏令民間每秋家出粟麥一石已下貧富為差等儲之閭里以備㓙年名曰義倉度支郎中唐書曰崔仁師為度支郎中嘗奏度支財物數千言手不執本太宗怪之令黃門侍郎杜正倫齎本仁師對唱一無差殊太宗大竒之六典曰度支郎中員外掌判天下租賦少多之數物産豐約之宜水陸道路之利每嵗計其所出而支其所用凡物之精與地之近者以供國物之粗與地之逺者以供軍皆料其逺近時月衆寡好惡而節制之度支}
