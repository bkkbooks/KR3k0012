  - {type: variant, offset: 2715, length: 0, content: '', WYG: 黃巢將逼關輔濬託疾請告侍其母挈族避亂商州賊犯京師僖宗出幸途無供須衞軍不得食漢陰令李康獻糗餌數百騾綱軍士始得食僖宗召康問之曰卿為縣令安操心及此康對曰臣為塵吏安敢有此進獻張濬員外教臣也帝異之金部郎中金部員外郎隋書曰盧昌衡字子均為僕射祖孝徴所薦遷尚書金部郎孝徴每曰吾用盧子均為尚書郎自謂無愧幽明矣六}
