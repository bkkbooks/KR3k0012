  - {type: variant, offset: 33, length: 98, content: 間垣內有小冢墳上殆平朝日初升見一女子立冢上近視則亡或以告玄象便命發之有一棺尚全有金蚕銅人以百數剖棺見一女子可二十姿質若生臥而言曰我東海王家女應生資財相奉幸勿見害女臂有玉釧斬臂取之於是女復死又曰大明, WYG: 居甘泉宫}
