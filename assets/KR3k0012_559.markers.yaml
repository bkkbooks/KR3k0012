  - {type: variant, offset: 3036, length: 0, content: '', SBCK: 爲刺史躬乗􅀐徃開之還即墜馬而卒又曰潁川諸闔字道明墓在楊州蔣山之西每至隂􅀨冢中輙有􅃶管之音又曰魏武北征蹹頓升嶺眺瞩見一崗不生百草王粲曰必是古冢此人在丗服特生礜石死而石生􅀬蒸出外致大木燋滅即令鑿果得大墓有礜石滿塋志恠集曰陶􅋲微時遭大喪葬家貧親自營塼有班特牛專以載致忽然失去便自尋覔道中逢一老公便舉手指云向於崗上見一牛眠山洿中必是君牛眠豦便好可作墓安墳則致極貴小下當位極人臣丗爲方嶽􅋲指一山云此好但不如下當丗有刺史言訖便不復見太尉之葬如其言􅋲指別山與周訪家則并丗刺史矣潘岳􅀜中記曰􅁗始皇陵上驪山之北髙數十丈周廻六七里今在隂盤界此陵雖髙大不足以銷六十萬人積年之功也其用功力或隱而不見者驪山泉夲北流者皆陂障使西流又此無大石運取於渭北諸山故其歌曰運石甘泉口渭水爲不流千人一唱萬人相鈎又曰漢諸陵皆髙十二丈方百二十歩唯茂陵髙十四丈方百四十歩徙民置諸縣者凡七陵長陵茂陵各萬戸其餘五陵皆各五千縣属太常不領郡也守衛陵掃除凡五千戸陵令一人食官令一人􅃦廟令一人園長一人園門令史三十二人􅀱四人元帝時三輔七十萬戸始不復從民陪陵渭陵延陵義陵皆不立縣也雷次宗豫章記曰郡東南二十里有一大冢號丹陽郭長老云是郡人丹陽太守聶友冢也外形甚髙大内一大冢居中兩邊各有四小冢横首大冢外作徼道周匝皆通冢裏髙二丈餘小者半之徼道又半之此冢相通一埏似是殉葬者不聞聶友奢僣以人從死也且今新塗音紺縣南十里見聶友墓荆州圗記曰酈縣北三十里有一墓甚崇偉前有石樓髙一丈五尺上作石鳯將九子相傳云是姚家墓不詳其人又曰江陵縣東南七十里有楚昭王墓髙四丈餘王粲登樓賦所謂西接昭丘是也盛弘之荆州記曰霄城東南有單龍村村外有單龍冢甚髙大舊傳單龍能仰觀俯察少公之儔也數稱劉氏當王聖公應其符聖公潜嘉之固此起兵後稱号於宛而龍卒故厚爲其葬又曰鄭郷即鄭城地也崗南有劉長沙墓益州牧焉之父其南又有漢魏郡太守黄香冢鄧德明南康記曰白水有髙巖臨水頂有柴侯墓遥望松樹卒歳不彫􅀃者云墓豦極峻及累石爲冢又別有金錢藏不可得開􅀂欲上山必遇雷晦之異夜時見光色如雷之爛音艶所謂寳精也又曰平固水口下數里有螺亭昔一少女曽江畔乗小船採螺停沙邊共􅀫夜聞騷騷如軍馬行須􅁷見羣螺張口無數突來破舎噉此女子同侣悉走上岸至曉方還伹見骨耳収埋林際報其家經西五日間所埋豦飜見古冢髙十餘丈穹隆頂可受二十人坐其旁多螺新故相傳謂之螺亭又曰南}
