  - {type: variant, offset: 906, length: 366, content: 萬與之三副密啟武帝言太子所得地不如今所得地於帝吉帝末年多忌便命市之葬畢有道士善圖墓云地不利長子若厭伏或可申延乃為蠟鵝及諸物埋墓側長子位有宮監鮑邈之魏雅者二人初並為太子所愛邈之晚見踈於雅密啟武帝云雅為太子厭禱帝密遣檢點果得鵝等物大驚將窮其事徐勉固諫得止唯誅道士又曰蕭斅太清初為梁州長史梁州有古墓名曰尖冢或云張騫墳欲有發者輒聞鼓角與外相拒堆埋者懼而退斅謂無此理求自監督及開唯有銀鏤銅鏡方尺唐書曰代宗時號州剌史王奇光上言閿鄉縣女媧墓去天寶末失所在今一夜河上側近忽聞風雷聲曉見其墓踊出上有雙柳樹下有巨石其柳各高丈餘又曰天后西幸京師路經楊玄感墓上誦李百藥過玄感墓詩云劍有萬人敵文為一代英除昏志不遂僣亂道難平歎曰百藥唯解綴文不識大義又曰韓恩復則天朝為太常博士定南郊儀注云太妃鼓吹排群邪守大體國家賴之睿宗朝為給事活嚴善思於雷霆之下拒武三思於陷附之, SBCK: 歩陽隂里}
