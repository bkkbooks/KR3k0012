  - {type: variant, offset: 523, length: 291, content: 氣山中得金轉相誑惑永明二年冬宇之聚黨遂陷富陽至錢塘又曰始興王鑑鎮蜀於州園地得古冢無復棺但有石槨銅器十餘種並古形玉璧三枚珍寶甚多不可皆識金銀為蚕形者數斗又以朱砂為阜水銀為池左右咸勸取之鑑曰皇太子昔在雍有發古冢者得玉鏡玉屏風玉匣之屬皆將還都吾意常不同乃遣功曹何佇之為起墳諸寶物一不得犯又曰宜都王鑑鎮姑熟于時人發桓溫女冢得金巾箱織金篾為嚴器又有金蚕銀繭等物甚多條以啟聞鬱林勑以賜之鑑曰今取往物後取今物如此循環豈可熟念使長史蔡約自往脩復纖毫不犯又曰文惠太子鎮雍州有盜發古冢者相傳云是楚王冢大獲寶物玉履玉屏風竹書青絲綸簡廣數分長二丈皮節如新有得十餘簡以示王僧虔云是科斗書考工記周官所闕文也南史, SBCK: 智􅀷宋紀}
