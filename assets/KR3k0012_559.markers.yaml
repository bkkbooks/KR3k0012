  - {type: variant, offset: 3043, length: 2, content: 丹州, WYG: 死於所犯栽之下孜埋死鹿有小墳至今猶存又曰獨公山有古墓臨其溪塼文曰筮言吉龜言凶公三百年墮水中義熈中冢猶半存自後稍以崩盡會稽郡十城地志曰上虞縣東南古冢二十餘墳永嘉之初潮水壊其大冢所壊一冢塼題文曰居在本土厥姓黄卜葬于此大富强易卦吉龜卦凶四百年後墮江中當墮不墮值王顒縣令皮熈祖取數磚置縣樓下池中録之悵然}
