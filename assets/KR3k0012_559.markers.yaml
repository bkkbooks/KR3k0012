  - {type: variant, offset: 3033, length: 0, content: '', krp: 之中野百鳥衘土爲墳羣獸爲之掘穴不封不樹西京雜記曰青龍觀前有三梧樹樹下石麒麟二枚始皇葬墓中物也又曰廣川王去疾好聚無頼少年遊獵無度國内冢藏一切發掘其竒異者魏襄王冢以文石爲椁髙八尺許廣狹容四十人以手捫棺滑液如新中有石床石屏風婉然周正不覺棺柩盥器縱跡但床上玉唾盂一枚銅劒二枚金雜具皆如新玉自取服之襄王冢以鐵灌其上穿鑿三日乃開黄氣如霧觸人鼻目痺辛不可入以兵守之經曰乃歇𥘉至一户無扉籥石床方四尺床上有石几左右各三石人立侍皆武冠帶劒復入一户石扉有關籥叩見棺椁黒光照人刀斫不入燒鋸截之乃􅃮雜兕革爲棺椁厚數寸累積十餘重力不能開乃止復入一戸亦石扉關鑰得一石床方七尺屏風銅帳鈎或在床上或在地下似是帳糜杇而銅鈎墮落床上石枕一枚床上塵埃朏朏音斐甚髙似是衣服床左右婦女二十悉皆立侍或有執巾櫛鏡鑷之象或有執盥捧食之形無餘異物俱見䥫鏡數百所魏王子且渠冢甚淺狹無柩但有石床廣六尺長一丈石屏風下悉是雲母床上兩屍一男一女年皆二十許俱東首祼形卧無衣裳肌膚顔色髪齒如生人畏懼不敢侵擁閇如故袁盎冢以瓦爲棺器物都無唯銅鏡一枚晉靈公冢甚瑰壯四角皆以石爲玃大奉燭石人男女四十餘皆立侍棺器無復形兆尸猶不壞穴竅中皆有金玉其餘器物皆朽爛不別唯玉蟾一枚大如拳腹空容五合水光潤如新玉取以成水書幽公冢甚髙壯羡門旣開皆是石惡撥除深文餘乃得雲母深尺所乃得百餘尸縱横相枕皆不朽唯一男子餘悉女子或卧亦有立者衣服形色不異生人欒書冢棺柩明器朽爛無餘有白狐見人驚走左右逐㦸之不能得傷其左脚夕王夢一丈夫鬢眉盡白來謂王曰何故傷吾左脚仍以杖叩王左脚王覺左脚腫痛生瘡至死不差述征記曰梁孝王冢斬山徙户以石爲藏行一里到藏中有數尺水有大鯉魚人皆潔而進不齊輙有獸噬其足獸似豹也幽明録曰漢未大亂頴川有人將避地他郡有女年七八歳不能渉逺勢不兩全道邊有古冢穿敗以繩繫女下之經年餘還於冢尋覔欲更殯葬忽見女尚存父大驚問女得活意女云冢中有一物於晨暮際輙伸頭翕氣爲試效之果覺不復飢渇家人於冢尋索此物乃是大龜又曰孫鍾呉郡冨春人堅之祖也與母居至孝篤信種瓜爲業忽有三年少詣乞瓜鍾爲設食臨去曰我司命也感君不知何以相報此山下善可作冢復言欲連丗封侯而數代天子耶鍾跪曰數代天子故當所樂便爲定墓曰君可山下百歩後頋見我去豦便是墳所也下山行百歩便頋見悉化成白鶴也述異記曰南康郡鄧德明常在豫章就雷次宗學雷家丗東郊之外去史豫章墓半里許元嘉十四年德明與諸生歩月逍遥忽聞音樂諷誦之聲即夜白雷出聽曰此間去人尚逺必鬼神也乃相與尋之遥至史墓但開墳下有管綰女歌講吟詠之聲咸歎異焉酈善長注水經曰智水東逕七女冢冢夾水羅布如七星髙十餘文周廻數畒元嘉六年大水破墳崩出銅不可稱計北有七女池池東有明月池狀如偃月皆相通注謂之張良渠盖良所開也又曰粉水有文將軍冢前有石虎石柱甚脩麗閭丘羡爲南陽葬婦墓側將平其域夕夢文諌止之而羡不從後羡乃爲人所害又曰淄水出太山萊蕪縣原山東過利縣東水西有桓公冡冢東有女水或云桓公女冢在其上故以名水甚有神焉化隆則水生政薄則津竭又曰潜水縣有車騎將軍馮緄音衮桂陽太守李温冢二子之靈常以日還郷潜水暴長郡縣吏莫不水上祭之搜神記曰宋大夫韓馮取妻而美康王奪之馮怨王囚之論爲城旦妻宻遺馮書謬其辭曰其雨淫淫河大水深日出當心王以問蘇賀對曰其雨淫淫言愁且思也河大水深不得徃來也日出當心有死志也俄而馮自殺妻乃隂腐其衣王與之登䑓遂自䑓投下左右攬之衣不中手遺書於帶曰願以骨與馮而合葬王怒弗聽使人埋之冢相望也王曰尓夫婦相愛不巳能使冢合則弗禁也一宿有丈梓木生於二冢之端旬日其大合抱屈體以相就根交於下又有鴛鴦雌雄各一恒栖樹上晨夕交頸悲鳴音聲感人宋人哀之遂號其木曰相思樹又曰漢馮貴人死將百歳盗賊發冢貴人顔色如故但微令羣盗共姦之致妬忌争闘然後事覺續捜神記曰王伯陽家東有一冢傳云魯肅墓伯陽婦喪乃平其墳以葬後數年伯陽白日在㕔事忽見一貴人乗平肩轝將從數百人馬皆浴䥫徑來坐謂伯陽曰吾是魯子敬安冢在此二百許年君何敢壊吾冢目頋左右掌伯陽下床以刀環築之數百而去登時絶良乆乃蘇築破豦皆發疽潰尋便死又曰承儉者東莞音管人病亡葬夲縣界後十年忽與其縣令夣云故民承儉今見刼明府急見救令便勑内外裝乗作百人仗便令馳馬徃冢上日向巳出天忽大霧對靣不相見但聞冢中忷忷破棺聲有二人墳上望霧冥不見人百人同聲大呌收得冢中三人墳上二人得逸走其夜令夢云二人雖得走民巳誌之一人靣上有青誌如藿業一人斵其兩齒折明府但案此尋覔也追捕並擒獲異苑曰}
