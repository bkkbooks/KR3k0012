  - {type: variant, offset: 93, length: 388, content: 臥而言曰我東海王家女應生資財相奉幸勿見害女臂有玉釧斬臂取之於是女復死又曰大明三年孝武幸籍田經袁湛墓使致祭增守墓五戶又曰何承天博見古今為一時所重張永嘗開玄武湖遇古冢冢上得一銅斗有柄文帝以訪於朝士承天曰此亡新威斗王莽時三公亡皆賜之一在冢外一在冢內時三台居江左者唯甄邯為大司徒必邯之墓俄而又啟冢內更得一斗復有一石銘云大司徒甄邯之墓又曰張𥙿曾祖澄當葬父郭璞為占墓地葬某豦年過百歲位至三司而子孫不蕃某豦年幾減半裁卿校而後累世貴顯澄乃葬其劣豦位至光祿年六十四而亡其子孫遂昌又曰周山圖為淮南太守時盜發桓溫冢大獲寶物客竊取以遺山圖山圖不受簿以還官齊書曰柳世隆曉數術於倪塘創墓與賓客踐履十往五往常坐豦及卒墓工圖墓取其坐豦焉又曰王倫之為豫章太守下車祭徐孺子許子將墓又曰初荀伯玉微時有善相墓者謂其父曰君墓當出暴貴者但不得久耳又出失行女子伯玉聞之曰朝聞道夕死可矣頃之伯玉姑當嫁明日應行今夕逃隨人去尋求, SBCK: ''}
