  - {type: variant, offset: 3038, length: 1, content: 鳥, SBCK: 漢太傅陳蕃冢墓昔值軍亂聞墓有寳三軍争掘忽有大虵圍繞墳前崩雷晦雨當時竟不得發鄭緝之東陽記曰孝子許孜父墓去虎山十里在山之麓曲隧三里鹿甞食其松栽孜心念之即日鹿自死於所犯栽之下孜埋死鹿有小墳至今猶存又曰獨公山有古冢臨溪其塼丈曰筮言􅁻􅀛言凶三百年墮水中義熈中冢猶半存自後稍以崩盡㑹稽郡十城地志曰上虞縣東南有古冢二十餘墳宋元嘉之􅀄潮水壞其大冢􅀄壞一冢塼題文曰居在夲土厥姓黄卜葬於此大冨強易卦􅁻亀卦凶四百年後随江中當值王顒縣令皮熈祖取數塼置縣樓下池中録之悵然而巳輿地志曰瑟琶折有古冢半在水中甓有隱起字云瑟琶筮云􅁻􅀛云凶八百年墮水中謝靈運取甓至京師諸貴傳觀之神恠志曰王果經三峽見石壁有物懸之}
