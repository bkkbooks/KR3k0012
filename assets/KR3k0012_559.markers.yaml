  - {type: variant, offset: 1273, length: 1751, content: 玄宗御筆題碑云有唐忠孝韓長公之墓又曰伊慎兗州人善騎始為果毅喪母將營合附不識其父之墓晝夜號哭未浹日夢寐有指導焉遂發壠果得舊記驗又曰盧坦為侍御史會李錡反有司請毀錡祖父廟墓坦嘗為錡從事乃上言曰淮安王神通有功於草昧且古之父子兄弟罪不相及況以錡故可累五代祖乎乃不毀因賜神通墓五戶以備洒掃白虎通曰春秋之義王者墳高三仞樹以松諸侯半之樹以柏大夫八尺樹以欒士四尺樹以槐庶人無墳樹以楊柳晏子曰梁丘據死景公召晏子告之據曰忠臣愛我欲厚葬之高大其壟晏子對曰不可公遂止列子曰燕人長於楚老而還過晉國同行者紿之指城曰此燕國之城其人愀然變容指社曰此若里之社若猶汝也乃喟然而歎指舍曰此君先人之廬乃泫然而泣指壠曰若先人冢其哭不自禁同行者啞然大笑曰余等紿君乃晉國耳其人慚及至燕國之城社真見先人之廬冢悲心更微傅子曰太原民發冢破棺中有婦人將出與語生人也視其冢上木三十歲不知此婦人三十歲常生地中也將一朝欻然生偶與發冢者會也抱朴子曰吳景帝時於江陵掘冢取板治城後發一大冢內有重閤石扉皆樞轉開閉四周徼道通事具高可乘馬又鑄銅為人數十枚長五尺皆大冠衣執劍列侍靈坐皆刻銅人背後石壁言殿中將軍或言侍郎似公王冢也破其棺棺中有人鬢已班白鮮明面體如生人棺中有白玉壁三十枚藉尸兵人舉出死人以倚冢壁一玉長一尺形似冬瓜從死人懷中出墮地兩耳中及鼻中有黃金如棗此則骨骸有假物而不朽之効也呂氏春秋曰世之為丘壟也其大若山其樹若林以此觀世示富則可矣以此為死則不可自古及今未有不亡之國者則是無不掘之墓也是故大墓無不掘者而世爭為之豈不悲哉堯葬於穀林通樹枝舜葬於紀市不變其肆禹葬於會稽不變人徒是故先王以儉葬也非愛其費非惡其勞以為死者虛也越絕書曰宋大夫華元冢在華原陳留小黃縣城北吳越春秋曰虎丘者吳王闔閭墓也下池廣六十步深一丈五赤銅槨三重中池廣六尺金鴈玉鳧專諸魚膓之劍以送焉取士臨海潮千萬人築治之以葬後金精上地為白虎據墳故以為虎丘越傳曰禹到大越上苗山更名山曰會稽因死葬焉穿壙深七尺上無寫泄下無流水壇高三尺土階三等周方一畝華陽國志曰周失綱紀蜀先稱王有名蠶藂其目縱死作石階石棺國人化之故俗以石棺槨為縱目人冢又曰蜀有五丁能移山舉萬鈞其王薨輒立大石長三丈重千鈞為墓志又曰蜀遣使朝秦秦惠王許嫁五女於蜀蜀遣五丁力士奉迎虵山崩同時壓殺五丁及秦五女蜀王痛傷命曰五婦冢今其人或名五丁冢又曰武都有一丈夫化為女子美而艷蓋山精也蜀王納為妃不習水土欲去王必留之乃作東平之歌以樂之無幾歿故王哀之乃遣五丁之武都擔土為妃作冢三輔決錄曰竇后父名猗遭秦亂隱身鉤魚墜淵而卒后登尊號遣使者於父墜所築起大墳世說曰戴公見林法師墓曰德音未遠而拱不已積冀神理綿綿不與氣運俱盡耳又曰黃初末吳人發長沙王吳芮冢以其材於臨湘為孫堅立廟容皃如生衣服不朽後預發者見綱曰君何類長沙王芮但微短耳綱瞿然曰是先祖也自芮之卒至冢發四百餘年綱芮之十六世孫也又曰有人相羊祜應出受命君忌其言遂使掘斷墓後以壞之相者云墓勢相讓猶有折臂三公俄而祜墜馬折臂後至三公又曰郭景純過江居于暨陽母亡安墓不盈百步時人以為近水景純曰將當為陵今沙漲去數十里皆為人居家桑田博物志曰漢末發范明友冢奴猶活明友是霍光女婿奴記言光家事廢立之際多與漢書相應又曰漢末有發前漢時宮人冢者宮人獨活既出平如復舊列士傳曰羊角哀葬友人在柏桃與荊將軍冢比他日角哀夢柏桃語己曰蒙子之恩而獲原厚葬荊將軍自以豪欲役伏吾吾不聽與連戰不勝期十五日大合戰以決勝負得子則勝不得則負矣角哀至期日陳兵詣其冢上三輔決錄曰趙嘉年三十餘有重疾七年不樂乃為令勑兒曰丈夫生一世豦無箕山二公之操仕無伊擊呂尚之勳天不我與復何言哉聊立一圓石樹吾墓前刻之曰漢有逸民姓趙名嘉有志無時命也奈何後病愈楚國先賢傳曰李善字次孫南陽人也本同縣李元蒼頭建武中元家死沒唯孤兒續始生善親自哺養世祖拜善及續並為太子舍人善顯宗時辟公府以能治劇再遷日南太守從京師之官道經南陽李元冢未至一里乃脫服持劍去草及拜墓哭泣甚悲身炊爨自執姐鼎以脩祭揚雄家諜曰子雲天鳳五年卒葬安陵阪上所厚沛郡桓君山平陵如子禮弟子鉅鹿侯子芭共為治喪諸公遣世子朝郎更行事者會送桓君山為歛賻起祠塋侯芭負土作墳號曰玄冢七略曰揚雄死弟子共為起冢號曰楊冢趙歧別傳曰歧字臺卿年九十餘建安六年卒先自為壽藏圖季札子產晏嬰叔向四像居賓位又自像其像居主位皆為讚頌勑其子曰我死之日墓中聚沙為床布簟白衣散髮其上覆以單被即曰便下下訖便掩, SBCK: ''}
