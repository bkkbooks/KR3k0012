  - {type: variant, offset: 3038, length: 4, content: 鳥如丹雀, WYG: 漢太傅陳蕃冢昔值軍亂聞墓有寳三軍争掘忽有蛇圍繞墳前雷雨晦𠖇當時竟不得發鄭緝之東陽記曰孝子許孜父母葬虎山十里在山麓曲隧三里鹿甞食其松栽孜心念之即日鹿}
