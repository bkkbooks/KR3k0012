  - {type: variant, offset: 394, length: 792, content: 壯士路潤等數十人斷髮請戰挑戰孫子曰忿速可侮急疾之人可忿怒而致死忿速易怒者也主不可以怒而興軍不可以慍而致戰合於利而用不合於利而止人主聚眾興軍以道理勝負之計不可以己之私舉兵則以策不可以慍恚之故而合戰也怒而可以復喜慍而可以復悅亡國不可以復存死者不可以復生主怒興伐人無素謀明計則破亡矣將慍怒而鬥倉卒而合戰所傷殺必多怒慍復可以悅喜言亡國不可復存死不可復生言當須憤之也故曰明王慎之良將儆之此安危之道也儆戒也左傳曰趙旃求卿未得且怒於失楚之致師者請挑戰弗許請召盟許之左傳曰楚許伯御樂伯攝叔為右以致晉師許伯曰吾聞致師者御靡旍摩壘而還靡近也靡於馳也樂伯曰吾聞致師者代御執轡御下兩馬掉鞅而還叔曰吾聞致師者右入壘折或馘斷首耳也執俘而還皆行所聞而復晉人逐之左右角之樂伯左射馬而右射人角不能進矢一而已麋興於前射麋麗龜戰國策曰魏武侯問吳起曰兩軍相常不知其將欲擊何如起曰令賤而勇者將而擊銳交合而北告而勿罰觀敵進取一來一起其政以理奔北不追見利不取此將有謀若其眾追北旗幟雜亂自止自行或縱或橫貪利務得凡若此類將令不行史記曰吳世家曰夏吳伐越越王勾踐迎擊之雋李賈逵曰越地也越使死士挑戰三行造吳師自頸左傳曰使罪人三行屬劍亦頸吳師觀之因伐吳敗之姑蘇又曰漢王項羽相與臨廣武間而語項羽欲與漢王獨身挑戰漢王數項羽十罪大怒伏弩射中王胸漢王捫足曰虜中吾指又曰王翦代李信擊荊荊兵數挑戰終不出久之翦使人問軍中戲乎曰方投石超距翦曰士卒可用矣漢書曰項羽使人謂漢王曰天下匈匈以吾兩人願與王挑戰決雌雄無徒罷天下父子為漢王笑謝曰吾寧鬥智不鬥力羽令壯士出挑戰三合樓煩輒射殺之羽大怒自被甲挑戰樓煩欲射羽嗔目叱之樓煩目不能視手不能發走還入壁不敢復出漢王使問之迺羽漢王大驚又曰楚漢相持彭城數絕楚糧道項羽欲討越謂其將曹咎曰謹守成皋即漢欲挑戰慎勿與戰無令得東我十五日必誅彭越定梁地漢果數挑戰楚軍不出使人辱之五六日曹咎怒度兵汜水漢擊之大破楚軍盡得楚國貨賂曹咎自刎汜水上, SBCK: ''}
