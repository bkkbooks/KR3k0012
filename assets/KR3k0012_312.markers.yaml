  - {type: variant, offset: 2587, length: 1274, content: 首數百級決戰上六韜曰周武王將伐紂問太公曰今敵人圍我斷後絕糧吾欲徐以為陣以敗為勝奈何太公曰不可此天下困兵也暴用之則勝徐用之則敗可為四衝陣以驍騎驚其親君左軍疾左右軍疾右中軍迭前迭後往敵之空吾軍疾擊鼓而當之又曰敵踈其陣又遠其後跳我流矢以弱我弓弩勞我士卒為之奈何太公曰發我銳士先擊其前車騎獵其左右引而分隊以隨其後三軍疾戰凡以少擊眾避之於易要之於險避之以晝取之於夜故曰以一擊十莫善於阨以十擊百莫善於險以千擊萬莫善於阻用眾者務易用少者務阨也左傳曰晉師伐齊陣于莘所臻切晉解張御郄克鄭丘緩為右及戰郄克傷於矢流血及屨未絕鼓音中軍將自執旗鼓故雖傷而擊鼓不息也曰余病矣張侯曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病吾子忍之丘緩曰自始合茍有險余必下推車子豈識之然子病矣以其不識己推車也張曰師之耳目在吾旗鼓進退從之此車一人殿之可以集事殿鎮也集成也若之何以病敗君之大事也擐甲執兵固即死也擐貫即就也擐音患病未及死吾子勉之左并轡并畢正切右援抱音桴而鼓馬逸不能止師從之晉師從郄克車齊師敗績又曰齊侯伐晉夷儀敝無存之父將室之辭以與其弟無存齊人也室之為取婦曰此役也不死反必娶於高國高氏國氏齊貴族也無存欲必有功還取卿相之女也先登求自門出死於霤下既入城夷儀人不服故鬥死於門屋霤下也齊侯克夷儀謂夷儀人曰得敝無存者以五家免給五家不使役乃得其尸公三禭之禭衣也比殯加禭深厚禮之也與之犀軒直蓋犀軒卿車直蓋高蓋也親推之三齊候自推喪車輪三轉也國語曰齊莊公且伐莒為車五乘之賓而杞梁華舟獨不與焉故歸而不食其母曰汝生而無義死而無名則雖非五乘孰不汝笑也生而有義死而有名則五乘之賓盡汝下也趣食乃行杞梁華舟同車侍於莊公而行至莒莒人逆之杞梁華舟下鬥獲甲首三莊公止之曰子止與子同齊國杞梁華舟曰君為五乘之賓而舟梁不與焉是少吾勇也臨敵涉難止我以利是惡吾行也深入多殺者臣之事也齊國之利非吾所知也遂進鬥壞軍陷陣三軍不敢當戰國策曰齊上將田單率師將攻狄魯仲連子曰將軍攻狄必不能下矣單曰單以破亡餘卒破萬乘之燕今攻狄而不能下何也上車不謝而去遂攻狄三月不克齊嬰兒謠曰大寇若箕修劍柱歸單乃懼問仲連子對曰將軍在即墨之時坐即織簣立即杖插為士卒唱當此之時將軍有死之心而士卒無生之氣聞是言莫不掩泣奮臂而欲戰此所以破燕也當今將軍東有掖邑之封西有淄上之寶足以樂生而惡死此以不勝也田單明日結髮勵氣立於矢石間引抱而鼓之狄人乃下漢書曰御史大夫韓安國曰魏其言灌夫父死事荷戟驅不測之吳軍身被數十創名寇三軍此天下壯士也非有大惡爭杯酒不足引他過以誅之後漢書曰劉伯升起兵光武守昆陽莽將王尋王邑來討兵號百萬先至昆陽已十萬圍數重時伯升已拔宛三日而光武尚未知乃偽使持書報城中云宛下兵到而佯墮其書尋邑得其書不喜諸將既經累捷膽氣益壯無不一當百光武乃與敢死者三千人從城西水上衝其中堅尋邑陣亂乘勢崩之遂殺王尋城中亦鼓噪而出中外合勢震呼動天莽兵大潰走者相騰踐又曰郟令馮魴力戰死帝曰此健令又曰吳漢率兵圍蘇茂於廣樂劉永將周建來救漢將輕迎戰不利墮馬傷膝還營諸將謂漢曰大敵在前而公傷臥眾心懼矣漢乃勃然褁瘡而起椎牛饗士令軍中曰賊眾雖多皆劫掠群盜勝不相讓敗不相救非有杖節義者也今日封侯之秋諸君勉, WYG: ''}
