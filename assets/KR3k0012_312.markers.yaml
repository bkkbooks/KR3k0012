  - {type: variant, offset: 2177, length: 169, content: 陣高祖以中軍與建成合陣於城東太宗及柴紹陣於城南老生麾兵疾進先薄高祖而建成墜馬老生乘之中軍與左軍咸却太宗自南原遙見塵起知義師退率二百騎馳下峻坂殺一賊將遂衡斷其軍出于陣後表裏齊譟響若崩山隋師大潰各捨杖而走懸門發老生不得入城乃棄馬投壍甲士斬之致其首於麾下流血數里僵死屍相枕四面乘勝進薄其城時無攻具士卒緣矟而上一時攀堞無敢當者遂平霍邑撫其餘眾而用, WYG: 壯}
