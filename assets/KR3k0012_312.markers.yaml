  - {type: variant, offset: 1741, length: 190, content: 反自江陵舉兵東下分兵出夏口據魯山攸之既至郢以郢城弱小足攻宋郢州今江夏郡遣人告郢州守將柳世崇曰被太后令當蹩還都卿既相與奉國想得此意世崇荅曰東下之師久承聲問郢城小鎮自守而已攸之將去世崇遣軍於西渚挑戰攸之果怒令諸軍登岸燒郭邑築長圍攻之世崇隨宜拒應眾皆披却攸之軍因之敗潰隋書曰陳茂從高祖與齊師戰於晉州賊甚盛高祖將挑戰茂固止不得因捉馬鞚高祖忿之拔刀斫其額流血被面詞氣不撓高祖感而謝之厚加禮敬, WYG: 號為杜彪}
