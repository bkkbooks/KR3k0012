  - {type: variant, offset: 1451, length: 2, content: 公西, SBCK: 母丘儉字仲恭有幹䇿爲幽州刺史度遼將軍儉以髙句驪數侵叛督將軍出􅀇莵從道滑討之句驪王宫將歩􅀐逆軍沸水上大戰宫連破走遂束馬懸車登九都山屠髙麗所斬獲首虜以千數使􅀇莵太守王頎追過沷沮千餘里至肅慎界刻石紀功刋丸都之山銘不耐之城又曰代郡烏􅁊反以任城王彰爲北中郎將行驍􅀐將軍臨發太祖誡彰曰居家爲父子受事爲君臣動以王法從事爾其誡之彰北}
