  - {type: variant, offset: 1563, length: 0, content: '', SBCK: 皆弃􅂳投水死者太半賊夜還長沙伺追至蒲沂不及而反加威逺將軍赤幢曲盖又曰朱伺劉浚與鄭攀戰楊口壘伺常所調弩忽噤不發伺甚惡之及賊攻䧟北門伺退入􅂳􅀄浚開諸􅂳底以木掩之名爲􅂳械伺旣入賊舉鋌擿伺伺逆接鋌反以擿賊賊走上􅂳屋大喚云賊帥在此伺從􅂳底沉行五十歩}
  - {type: variant, offset: 1563, length: 0, content: '', WYG: 皆棄船投水死者大半賊夜還長沙伺追至蒲圻不及而反加威逺將軍赤幢曲蓋又曰朱伺劉浚與鄭攀戰楊口壘伺常所調弩忽禁不發伺甚惡之及賊攻䧟北門伺退入船底初浚開諸船底以木掩之名為船械伺既入賊舉鋌摘伺伺接鋌反以摘賊賊走上船屋大喚云賊帥在此伺從船底沉行五十步}
