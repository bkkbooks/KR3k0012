  - {type: variant, offset: 1738, length: 2, content: 沈攸, WYG: 大同初魏軍復圍南鄭杜􅅛瑶命第三子嶷帥二百人與魏前鋒戰于光道寺溪矢中其目失馬敵人交矟將至嶷斬其一騎躍而上馳以歸嶷膂力絶人便馬善射一日戰七八合所佩霜明朱弓四石餘力挽絲纒矟長二丈五同心敢死士百七十人每出殺傷數百人敵憚}
