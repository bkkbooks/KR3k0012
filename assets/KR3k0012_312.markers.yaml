  - {type: 'tls:seg', offset: 1526, content: '', id: KR3k0012_CHANT_312-16a.9}
  - {type: variant, offset: 1526, length: 1, content: 而, SBCK: 我欲以卿爲將不早降爲德罵羽曰竪子何謂降也魏王帶甲百萬威振天下汝}
  - {type: variant, offset: 1526, length: 0, content: '', WYG: 我欲以卿為將不早降何為徳怒曰丈夫何能降也魏王帶甲百萬威振天下汝地一隅耳豈能敵耶我寧為忠義鬼不求主也遂為所殺吳志曰孫權討黄祖祖横兩蒙衝挾守沔口以栟櫚大紲繫石為矴上有千人以弩交射飛矢雨下軍不得前董襲與凌統俱為前部各將敢死百人被兩鎧乗大舸船突入蒙衝裏襲身以刀㫁兩紲蒙衝乃横流大兵遂進祖便開門走兵追斬之明日大㑹權舉觴屬襲曰今日之㑹斷紲之功也晉書曰劉毅等討桓𤣥兵至竹里𤣥使其將皇甫敷吳甫之拒毅軍遇之於江東臨陣斬甫之進至羅洛橋又斬敷首𤣥大懼使桓謙何澹之屯覆舟山毅等軍至蔣山裕使羸弱登山多張旗幟𤣥不之測益以危懼謙等士卒多北府人素懼伏裕莫敢出鬬裕與毅等分為數隊進突謙陣皆殊死戰無不一當百時東北風急毅令放火煙塵障天鼓譟之音震駭京邑謙等諸軍一時奔散又曰周處攻齊萬年於六陌將戰軍人未食齊王彤促命速進}
  - {type: page-break, offset: 1526, content: '', id: KR3k0012_WYG_312-6a, image: WYG0895/WYG0895-0693c.png}
  - {type: page-break, offset: 1526, content: '', id: KR3k0012_WYG_312-6b, image: WYG0895/WYG0895-0693d.png}
  - {type: variant, offset: 1526, length: 1, content: 而, krp: 我欲以卿爲將不早降爲德罵羽曰竪子何謂降也魏王帶甲百萬威振天下汝}
  - {type: variant, offset: 1527, length: 3, content: 劉備栖, WYG: 絶其後繼處知必敗賦詩曰去去世事已䇿馬觀西戎藜藿甘梁黍期之克命終言畢而戰自旦及暮斬首萬計弦絶矢盡左右勸退處按劒曰是吾効節授命之日何退之為且古者良將受命凶門以出蓋有進無退也今諸軍負信勢必不振我為大臣以身殉國不亦可乎遂力戰而殁又曰明威將軍朱伺隨陶侃討杜弢有殊功石勒夏口之戰伺用鐵面自衛以强弩射賊大帥數人皆殺之賊挽船上岸}
  - {type: page-break, offset: 1527, content: '', id: KR3k0012_WYG_312-7a, image: WYG0895/WYG0895-0694a.png}
  - {type: variant, offset: 1529, length: 1, content: 栖, SBCK: 庸才耳豈能敵耶我寧爲國家􅀑不爲賊將也遂爲羽所殺呉志曰孫權討黄祖祖横兩蒙衝俠守􅃆口以栟櫚大紲繫石爲磴上有千人以弩交射飛矢雨下軍不得前董襲與陵統俱爲前部各將敢死百人􅀍兩鎧乗大􅂳突入蒙衝裏身以刀斫兩紲蒙衝横流大兵遂進祖便開門走兵追斬之明日大㑹權舉觴屬襲曰今之㑹斷紲之功晉書曰劉毅等誅􅁊􅀇兵至竹里􅀇使其將皇甫敷呉甫之拒毅軍遇之}
