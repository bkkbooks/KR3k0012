  - {type: variant, offset: 1599, length: 2, content: 黃眉, WYG: 士人思為亂有可乗之㑹乃遣逰擊將軍郭慶以鋭卒五千夜從間道出評營後傍山起火燒其輜重暐懼遣使讓評催之速戰評遣使求戰乃陣於潞原面衆曰今與諸君深入賊地當竭力致死有進無退共立大功以報國家受爵明君之朝稱觴父母之室不亦美乎衆皆踴躍破釡棄糧大呼竟進猛覩評師之衆也惡之謂}
