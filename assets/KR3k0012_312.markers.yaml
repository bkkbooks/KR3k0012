  - {type: variant, offset: 3892, length: 0, content: '', SBCK: 縱火焼齋閤福時在内延突火而入抱福出外支體灼爛髮盡於是勒衆與賊苦戰賊乃散走以此見稱又曰趙遐爲滎陽太守時蕭衍將馬仙琕率衆攻圍昫城戍主傅文􅂹嬰城固守以遐爲别將與劉思祖等救之次於鮑口去的城五十里夏雨頻降厲渉長駈將至的城仙琕見遐營壘未就徑來逆戰思祖率彭沛之衆望陣奔退遐􅀌軍􅁬擊獨破仙琕斬其直閤將軍軍主李魯生仙琕先分軍於昫城之西阻水列柵以圍固城遐身自潜行觀水深淺結草爲筏衘枚夜}
