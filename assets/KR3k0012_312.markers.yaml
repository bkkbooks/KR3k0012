  - {type: variant, offset: 1564, length: 5, content: 召曹彰晨夜, krp: 免又載記曰劉曜使其將軍平先丘中伯率勁騎追陳安安與壯士十餘騎於陜中格戰安左手奮七尺大刀右手執丈八虵矛近交則刀矛俱發輙害五六人逺則帶雙鞬左右馳射而走平先亦壯徤絶人勇捷如飛與安摶戰三交奪其虵矛而退㑹日暮雨甚安弃馬與左右五六人歩踰山嶺匿于嵠澗翌日㝷之遂不知所在㑹連雨始霽輙振威呼延青㝷其徑迹斬安于澗曲隴上歌之曰隴上壯士有陳安丈八虵矛左右槃戰始三交上虵矛東流之水名去不還劉曜命樂府歌又曰秃髮傉檀追赫連勃勃遣善射者射之中勃勃乃勒衆逆擊敗之追奔八十餘里殺傷萬計斬其大將十餘人以爲京觀号髑髏臺還于嶺北又曰前秦符堅爲姚萇所攻符堅率兵攻姚萇皆刻鋒鎧爲死休字示以戰死爲志每戰以長矟鈎刃爲方圎大陣知有厚薄從中分配故人自爲戰所向無前又曰後趙冉閔之亂石琨及張舉王㓪率衆七萬伐鄴石閔帥騎千餘拒之城北閔執兩刃矛馳騎擊之皆應鋒摧潰斬級三千琨等大敗歸于兾州又曰朱伺善戰人或問之伺荅諸人以舌擊賊伺唯以刀耳又問曰將軍前後擊賊何以每得勝耶伺曰兩敵共對唯當忍之佊不能忍我能忍是以勝耳又曰周訪討江沔間賊杜曽訪有衆八千}
  - {type: variant, offset: 1570, length: 3, content: 追西到, SBCK: 至張陽曽銳氣甚盛訪曰先人有奪人之心善謀也使將軍李􅁪督左甄許朝督右甄訪自領中軍髙張旗幟曽果先攻左右甄曽勇冠三軍訪甚惡之自於陣後射雉以安衆心令小將趙胤領其父餘兵屬左甄力戰敗而復合胤馳馬告急訪怒叱令更進号哭還戰自辰至申兩甄皆敗訪選精銳八百人自行酒飲之勑不得輒動聞鼓音乃進賊未至三十歩訪親鳴鼓將士皆騰躍奔赴曽遂大潰殺千餘人遂定漢􅃆又曰劉裕舉兵伐後􅁗姚泓王鎭惡爲前鋒軍至渭橋鎭惡所乗皆蒙衝小艦鎭惡登岸渭水流急倐忽間諸艦悉逐流去時泓屯軍在}
