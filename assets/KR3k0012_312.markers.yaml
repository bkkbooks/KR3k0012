  - {type: variant, offset: 3828, length: 0, content: '', SBCK: 顧望者斬首轉歩者斬足士皆用命}
  - {type: variant, offset: 3828, length: 0, content: '', krp: 顧望者斬首轉歩者斬足士皆用命}
  - {type: variant, offset: 3829, length: 1, content: 眾, SBCK: 死者萬餘血流没踝流矢貫頸墮馬死宋書鄧琬傳曰殷孝祖屯軍鵲洲沈沖之謂陶亮曰昔孝祖梟將一戰便死孝祖與賊合戰毎戰常以鼓盖自隨軍中人相謂曰殷統兵可謂死將矣今與賊交鋒而以羽儀自顯欲不斃得乎又曰􅀓弘之字仲度凉僞太子赫連瓌率衆襲長安弘之領歩􅀐五千大破之瓌又抄渭南弘之又於寡婦渡破瓌獲賊二百及義真東歸赫連佛佛傾國追躡於青泥大戰弘之射貫甲胄氣冠三軍陣敗䧟没佛佛逼令降弘之不爲屈也又髙祖紀曰于時北師始還傷痍未復戰士􅂊數千賊衆十餘萬舳艫亘千里孟昶諸􅁑長仁懼欲擁天子過江帝曰今兵士}
  - {type: page-break, offset: 3829, content: '', id: KR3k0012_SBCK_312-7a}
  - {type: variant, offset: 3829, length: 1, content: 眾, krp: 死者萬餘血流没踝流矢貫頸墮馬死宋書鄧琬傳曰殷孝祖屯軍鵲洲沈沖之謂陶亮曰昔孝祖梟將一戰便死孝祖與賊合戰毎戰常以鼓盖自隨軍中人相謂曰殷統兵可謂死將矣今與賊交鋒而以羽儀自顯欲不斃得乎又曰傳弘之字仲度凉僞太子赫連瓌率衆襲長安弘之領歩騎五千大破之瓌又抄渭南弘之又於寡婦渡破瓌獲賊二百及義真東歸赫連佛佛傾國追躡於青泥大戰弘之射貫甲胄氣冠三軍陣敗䧟没佛佛逼令降弘之不爲屈也又髙祖紀曰于時北師始還傷痍未復戰士纔數千賊衆十餘萬舳艫亘千里孟昶諸葛長仁懼欲擁天子過江帝曰今兵士}
  - {type: variant, offset: 3831, length: 0, content: '', SBCK: 少猶足一戰􅀂其克濟臣主同休如其不然不復能草間求活吾計決矣又曰薛安都北征至陜下魏}
  - {type: variant, offset: 3831, length: 0, content: '', krp: 少猶足一戰若其克濟臣主同休如其不然不復能草間求活吾計決矣又曰薛安都北征至陜下魏}
  - {type: punctuation, offset: 3832, content: ，, id: KR3k0012_CHANT_312-bkkpn1061}
  - {type: 'tls:seg', offset: 3832, content: '', id: KR3k0012_CHANT_312-32a.20}
  - {type: variant, offset: 3832, length: 0, content: '', SBCK: 縱突􅀐衆軍患之安都怒甚乃脫兠鍪解所帶鎧唯着絳衲兩襠衫馬亦去具裝馳入賊陣猛氣咆􅣋所向無敵當其􅄡者無不應刃而倒如是數四毎入衆無不披靡又曰髙祖義軍進至覆舟東張疑兵以油怶冠株布滿山谷帝先馳之將}
  - {type: page-break, offset: 3832, content: '', id: KR3k0012_SBCK_312-7b}
  - {type: variant, offset: 3832, length: 0, content: '', krp: 縱突騎衆軍患之安都怒甚乃脫兠鍪解所帶鎧唯着絳衲兩襠衫馬亦去具裝馳入賊陣猛氣咆勃所向無敵當其鋒者無不應刃而倒如是數四毎入衆無不披靡又曰髙祖義軍進至覆舟東張疑兵以油怶冠株布滿山谷帝先馳之將}
  - {type: variant, offset: 3833, length: 5, content: 劫掠群盜勝, SBCK: 殊死戰無}
