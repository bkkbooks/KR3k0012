  - {type: variant, offset: 1524, length: 0, content: '', krp: 長安召彰彰自代過鄴太子謂彰曰卿新有功今西見上勿冝自伐彰到如太子言歸功諸將太祖喜持彰鬚曰黄鬚兒竟大可用又曰龐德與曹仁討關羽德屯沔北十里㑹天霖雨十餘日漢水暴溢樊下平地五六丈德與諸將避水上隄羽乗船攻之以大舡四靣射隄上德披甲荷弓箭不虚發將軍董衝部曲將統超等欲降德皆収斬之自平旦力戰至日過中羽攻益急德謂督將成何曰吾聞良將不怯死以苟免烈士不毀節以永生今日我死日也戰益怒氣愈壯而水浸盛吏士皆降德與麾下將一人伍伯二人彎弓傳矢登小船欲還仁營水盛船覆失弓矢獨抱船覆水中爲羽所得立而不跪羽謂曰卿兄在}
