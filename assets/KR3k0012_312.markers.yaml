  - {type: variant, offset: 1524, length: 0, content: '', SBCK: 長安召彰彰自代過鄴太子謂彰曰卿新有功今西見上勿冝自伐彰到如太子言歸功諸將太祖喜持彰鬚曰黄鬚兒竟大可用又曰龐德與曹仁討􅀜羽德屯􅃆北十里㑹天霖雨十餘日漢水􅁀溢樊下平地五六丈德與諸將避水上隄羽乗􅂳攻之以大舡四靣射隄上德披甲荷弓箭不虚發將軍董衝部曲將統超等欲降德皆収斬之自平旦力戰至日過中羽攻益急德謂督將成何曰吾聞良將不怯死以苟免烈士不毀節以永生今日我死日也戰益怒氣愈壯而水浸盛吏士皆降德與麾下將一人伍伯二人彎弓􅀓矢登小船欲還仁營水盛􅂳覆失弓矢獨抱船覆水中爲羽所得立而不跪羽謂曰卿兄在}
  - {type: page-break, offset: 1524, content: '', id: KR3k0012_SBCK_312-3b}
  - {type: variant, offset: 1524, length: 0, content: '', WYG: 長安召彰彰自代過鄴太子謂彰曰卿新有功今西見上勿宜自伐彰到如太子言歸功諸將太祖喜持彰鬚曰黄鬚兒竟大可用又曰龎徳與曹仁討雲長徳屯樊北十里㑹天霖雨十餘日漢水暴溢樊下平地五六尺徳與諸將避隄上雲長乗船攻之以船四面射隄上徳披甲荷弓箭不虛發將軍董衡部曲將統超等欲降徳皆收斬之自平旦力戰至日中雲長攻益急徳謂督將成何曰吾聞良將不怯死以苟免烈士不毁節以求生今日我死日也戰益怒氣愈壯而水漫盛船覆失弓矢船覆水中遂為雲長所得立而不跪雲長曰卿兄在}
