  - {type: variant, offset: 1564, length: 5, content: 召曹彰晨夜, WYG: 免又曰劉曜使其將軍平先丘中伯率勁騎追陳安安與壯士十餘騎於陜中格戰安左手奮七尺大刀右手執丈八蛇矛近交則刀矛俱發輙害五六逺則帶雙鞬服左右馳射而走平先亦壯健絶人勇㨗如飛與安摶戰三交奪其蛇矛而退㑹日暮雨甚安棄馬與左右五六人步踰山嶺匿于溪澗翼日尋之遂不知所在㑹連雨始霽輔威呼延青尋其徑迹斬安于澗曲隴上歌之曰隴上壯士有陳安丈八蛇矛左右槃戰始三交失蛇矛西流之水東流河一去不還奈子何劉曜命樂府歌之又曰秃髪傉檀追赫連勃勃遣善射者射之中勃勃乃勒衆逆擊敗之追奔八十餘里殺傷萬計斬大將十餘人以為京觀號髑髏臺還于嶺北又曰前秦苻堅為姚萇所殺苻登率兵攻姚萇皆刻鋒鎧為死休字示以戰死為志每戰以長矟鈎刃為方圓大陣知有厚薄從中分配故人自為戰所向無前又曰後趙石閔之亂石琨及張舉王朗率衆七萬伐鄴石閔帥騎千餘拒之城北閔執兩刃矛馳騎擊之皆應鋒摧潰斬級三千琨等大敗歸于冀州又曰朱伺善戰人或問之伺答曰諸人以舌擊賊伺惟以刀耳又問曰將軍前後擊賊何以每得勝耶伺曰兩敵共對唯當忍之彼不能忍我能忍是以勝耳又曰周訪討江沔間賊杜曽訪有衆八千}
