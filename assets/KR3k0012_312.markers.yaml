  - {type: variant, offset: 7, length: 386, content: 左傳曰帥師以來固敵是求敵至不擊將何俟矣又曰晉師至于靡笄之下齊侯使請戰又曰子玉使伯棼請戰曰非敢必有功也願以間執讒慝之口又曰晉侯逆秦師使韓簡視師韓簡晉大夫韓萬之孫復曰師少於我鬥士倍於我公曰何故對曰出因其資請奔梁求秦也入用其寵為秦所納飢食其粟三施而無報是以來也今又擊之我怠秦奮倍猶未也公曰一夫不可狃況國乎狃忲也言避秦則使忲來遂使請戰曰寡人不佞能合其眾而不能離也君若不還無所逃命秦伯使公孫枝對曰君之未入寡人懼之入而未定列猶吾憂也茍列定矣敢不承命又曰子玉使鬥勃請戰曰請與君之士戲君憑軾而觀之得臣與寓目焉晉侯使欒枝對曰煩夫子謂二三子戒爾車乘敬爾軍事詰朝將見穀梁曰請一戰不克請再再不克請三三不克請四四不克請五五不克舉國而授於是而與之盟史記楚世家曰六年秦使白起伐韓於伊闕大勝斬首三十四萬秦乃與楚王書曰楚倍秦秦且率諸侯伐爭一旦之命願王之飭士卒得一樂戰楚頃襄王患之乃謀與秦平後漢書王霸傳曰霸軍, SBCK: ''}
  - {type: variant, offset: 7, length: 33, content: 左傳曰帥師以來固敵是求敵至不擊將何俟矣又曰晉師至于靡笄之下齊侯使請, WYG: 中决}
