  - {type: variant, offset: 3842, length: 0, content: '', SBCK: 齊書曰薛安都討魯爽及沈慶之濟江安都望見爽便躍馬大呼直往刺之應手而倒左右范􅀟斬爽首爽丗裊猛咸云萬人敵安都單􅀐直入斬之而返時人皆云􅀜羽斬顔良}
  - {type: variant, offset: 3842, length: 0, content: '', krp: 齊書曰薛安都討魯爽及沈慶之濟江安都望見爽便躍馬大呼直往刺之應手而倒左右范雙斬爽首爽丗裊猛咸云萬人敵安都單騎直入斬之而返時人皆云關羽斬顔良}
  - {type: variant, offset: 3843, length: 1, content: 相, SBCK: 足過也梁書曰大同􅀄魏軍復圍南鄭杜懷瑶命第三子嶷帥二百人與魏前鋒戰於光道寺溪矢中其目失馬敵人交矟將至嶷斬其一􅀐躍而上馳以歸嶷旅力絶人便馬善射一日戰七八合所佩霜明朱弓四石餘力班􅁝纒矟長二丈五同心敢死士百七十人每出殺傷數百人敵人憚之號爲杜彪又曰侯景圍王僧辨於巴陵元帝乃引僧祐於獄拜爲假節武猛將軍封新市縣侯令援僧辨將行泣下謂其子玘曰汝可開朱白二門吾不捷則死吉則由朱凶則由白也元帝聞而壯之又曰蔡道班爲湖陽戍主攻蠻􅃬城反爲蠻困馮根年十六}
  - {type: page-break, offset: 3843, content: '', id: KR3k0012_SBCK_312-8a}
  - {type: variant, offset: 3843, length: 1, content: 相, krp: 足過也梁書曰大同𥘉魏軍復圍南鄭杜懷瑶命第三子嶷帥二百人與魏前鋒戰於光道寺溪矢中其目失馬敵人交矟將至嶷斬其一騎躍而上馳以歸嶷旅力絶人便馬善射一日戰七八合所佩霜明朱弓四石餘力班絲纒矟長二丈五同心敢死士百七十人每出殺傷數百人敵人憚之號爲杜彪又曰侯景圍王僧辨於巴陵元帝乃引僧祐於獄拜爲假節武猛將軍封新市縣侯令援僧辨將行泣下謂其子玘曰汝可開朱白二門吾不捷則死吉則由朱凶則由白也元帝聞而壯之又曰蔡道班爲湖陽戍主攻蠻錫城反爲蠻困馮根年十六}
