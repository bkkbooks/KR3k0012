  - {type: variant, offset: 1563, length: 0, content: '', krp: 皆弃船投水死者太半賊夜還長沙伺追至蒲沂不及而反加威逺將軍赤幢曲盖又曰朱伺劉浚與鄭攀戰楊口壘伺常所調弩忽噤不發伺甚惡之及賊攻䧟北門伺退入船𥘉浚開諸船底以木掩之名爲船械伺旣入賊舉鋌擿伺伺逆接鋌反以擿賊賊走上船屋大喚云賊帥在此伺從船底沉行五十歩}
  - {type: variant, offset: 1564, length: 5, content: 召曹彰晨夜, SBCK: 免又載記曰劉曜使其將軍平先丘中伯率勁􅀐追陳安安與壯士十餘􅀐於陜中格戰安左手􅁬七尺大刀右手執丈八虵矛近交則刀矛俱發輙害五六人逺則帶􅀟鞬左右馳射而走平先亦壯徤絶人勇捷如飛與安摶戰三交奪其虵矛而退㑹日暮雨甚安弃馬與左右五六人歩踰山嶺匿于嵠澗翌日㝷之遂不知所在㑹連雨始霽輙振威呼延青㝷其徑迹斬安于澗曲隴上歌之曰隴上壯士有陳安丈八虵矛左右槃戰始三交上虵矛東流之水名去不還劉曜命樂府歌又曰秃髮傉檀追赫連勃勃遣善射者射之中勃勃乃勒衆逆擊敗之追奔八十餘里殺傷萬計斬其大將十餘人以爲京觀号髑髏臺還于嶺北又曰前秦符堅爲姚萇所攻符堅率兵攻姚萇皆刻鋒鎧爲死休字示以戰死爲志每戰以長矟鈎刃爲方圎大陣知有厚薄從中分配故人自爲戰所向無前又曰後趙冉閔之亂石琨及張舉王㓪率衆七萬伐鄴石閔帥􅀐千餘拒之城北閔執兩刃矛馳􅀐擊之皆應鋒摧潰斬級三千琨等大敗歸于兾州又曰朱伺善戰人或問之伺荅諸人以舌擊賊伺唯以刀耳又問曰將軍前後擊賊何以每得勝耶伺曰兩敵共對唯當忍之佊不能忍我能忍是以勝耳又曰周訪討江􅃆間賊杜曽訪有衆八千}
