  - {type: variant, offset: 1451, length: 2, content: 公西, WYG: 母丘儉字仲恭有幹䇿為幽州刺史加渡遼將軍儉以髙句驪數侵叛督諸軍出𤣥菟從諸道討之句驪王宫將步騎逆軍沸流水上大戰破走遂束馬懸車登丸都山屠句麗所斬獲首虜以千數遣𤣥菟太守王頎追過沃沮千餘里至肅慎界刻石記功刋丸都之山銘不耐之城又曰代郡烏桓反以任城王彰為北中郎將行驍騎將軍臨發太祖誡彰曰在家為父子受事為君臣動以王法從事爾其誡之彰北}
