  - {type: variant, offset: 3845, length: 1, content: 非, SBCK: 之疋馬交戰提􅀟劒左右􅁬擊殺傷甚多道班以免由是知名又曰武帝師次秣陵東昬遣大將王珎國盛兵朱雀門衆號二十萬及戰梁武軍引却王茂疋馬單刀直前外生韋欣慶勇力絶人執䥫纒矟翼茂而進故大破之茂勲第一欣慶力也陳書曰武帝入援建鄴杜僧明爲前鋒與蔡路飬戰於南野僧明馬􅀍傷武帝馳救之以所乗馬援僧明僧明上馬復進殺數十人因而乗之遂敗路飬南史曰陳將蕭摩訶隨都督呉明徹濟江攻􅁗郡時齊遣大將尉破胡等率衆十萬夾援其前隊}
