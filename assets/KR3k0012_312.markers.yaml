  - {type: variant, offset: 1357, length: 3, content: 所謂不, SBCK: 以須上來弇曰乗輿且到臣子當擊牛釃酒以待百官反欲以賊虜遺君父耶乃出兵大}
  - {type: page-break, offset: 1357, content: '', id: KR3k0012_SBCK_312-1b}
  - {type: variant, offset: 1357, length: 0, content: '', WYG: 以須上來弇曰乗輿且到臣子當擊牛釃酒以待百官反欲以賊虜遺君父耶乃出兵大戰自旦及昏復大破之殺傷無數城中溝塹皆滿又曰岑彭征公孫述乃令軍中募攻浮橋先登者上賞于是偏將軍魯竒應募而前時大風狂急彭竒船還流而上直衝浮橋而攅柱鈎而不能去續漢書曰時大東風其攅柱有反把勾竒船不得去竒等乗勢殊死戰因飛炬焚之風急火盛橋樓崩燒彭復悉軍順風並進}
  - {type: page-break, offset: 1357, content: '', id: KR3k0012_WYG_312-2b, image: WYG0895/WYG0895-0691d.png}
  - {type: variant, offset: 1357, length: 3, content: 所謂不, krp: 以須上來弇曰乗輿且到臣子當擊牛釃酒以待百官反欲以賊虜遺君父耶乃出兵大}
  - {type: variant, offset: 1358, length: 1, content: 謂, WYG: 向無前蜀兵大亂溺死者數千人又曰張步攻耿弇營與劉歆等戰弇升王宮壊臺望之臨淄本齊國所都即齊王宫中有壊臺也東觀記作􅉞臺視歆等鋒交乃引精兵横突步陣于東城下大破之飛矢中弇股以佩刀截之左右無知者又曰袁紹使麴義攻公孫瓉紹在後十數里聞瓉已破發鞍息馬惟衛帳下強弩數十張大㦸士百許人瓉散兵二千餘騎卒至圍紹數重射矢雨下田豐扶紹使却入空垣紹脫兠鍪抵地曰大丈夫當前鬬死而返逃垣墻間耶促使諸弩競發多傷瓉騎衆}
  - {type: page-break, offset: 1358, content: '', id: KR3k0012_WYG_312-3a, image: WYG0895/WYG0895-0692a.png}
  - {type: variant, offset: 1360, length: 0, content: '', WYG: 知是紹頗稍引却㑹麴義來迎騎乃散退又曰鄧禹還長安張宗夜將鋭士入城襲赤眉中矛貫胛胛背兩腋間又轉攻諸營堡為流矢所激幾至于死又曰賈復從上擊青犢於射犬大}
  - {type: variant, offset: 1361, length: 0, content: '', SBCK: 自旦及昬復大破之殺傷無數城中溝壍皆滿又曰岑彭征公孫􅄒乃令軍中募攻浮橋先登者授上賞於是偏將軍魯竒應募}
  - {type: variant, offset: 1361, length: 3, content: 而屈人, WYG: 至日中賊陣堅不却光武傳召復曰吏士皆饑可且朝飯復曰先破}
