  - {type: variant, offset: 1599, length: 2, content: 黃眉, SBCK: 慕容評屯於潞川以拒之猛與評相持遣禆將郭慶以銳卒五千夜從間道出評營後傍山起火燒其輜重暐懼遣使讓評催之遣戰猛知評賣水鬻薪有可乗之㑹評又求戰乃陳於潞原而誓衆曰今與諸君􅀷入賊地冝各勉進不可退也願勠力行間以報恩願受爵明君之朝慶觴父母之室不亦羙乎衆皆勇􅁬破釡棄糧大呼競進猛覩評師之衆也惡之謂}
