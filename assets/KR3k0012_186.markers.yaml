  - {type: variant, offset: 1839, length: 0, content: '', SBCK: 夜有惡夢以問人教使晨起厠中說之三旦而人告以爲呪咀捕治數日曹毗曰杜蘭香戒張碩不冝露頭上厠夜行必燭若脫誤當跪拜謝周景式孝子傳曰管寧避地遼東經海遇風船人危懼皆叩頭思過寜思惟無諐念常如厠不冠即便悔過海風㝷止異苑陶􅋲曽如厠見數十人悉持杖有一人著平上介幘自稱後帝云君長者故岀相見襄􅃆記蜀先主之依劉表起至厠見髀裏生肉􅁣然流涕還坐表怪問之備曰平常身不離鞍髀肉皆消今不復􅀐髀裏肉生日月若馳老將至矣而功業不建是以悲耳表雖}
