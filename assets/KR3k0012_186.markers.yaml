  - {type: 'tls:seg', offset: 13, content: '', id: KR3k0012_CHANT_186-1a.5}
  - {type: variant, offset: 18, length: 2, content: 滕脩, WYG: 兵厨中有美酒求}
  - {type: substitution, offset: 19, original: 脩, replacement: 修, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-16957}}
  - {type: variant, offset: 21, length: 5, content: 刺史未至州, WYG: 步兵校尉司馬相如上林賦曰庖厨不徙後宫不移古詩曰左顧賴中厨竈禮}
  - {type: punctuation, offset: 23, content: ，, id: KR3k0012_CHANT_186-bkkpn6}
  - {type: 'tls:seg', offset: 23, content: '', id: KR3k0012_CHANT_186-1a.6}
  - {type: punctuation, offset: 26, content: ，, id: KR3k0012_CHANT_186-bkkpn7}
  - {type: 'tls:seg', offset: 26, content: '', id: KR3k0012_CHANT_186-1a.7}
  - {type: variant, offset: 28, length: 0, content: '', WYG: 祀竈居一焉月令孟夏其祀竈祭先肺註陽氣熱盛祀之於竈從熱類也禮臧文仲燔柴於竈夫爨者老婦之祭也盛於盆尊於缾文仲焉知禮禮庶人立一祀或立户或立竈論語王孫賈曰與其媚於奥寧媚於竈史記孫臏救韓入魏為十萬竈明日為五萬竈又明日為三萬竈龎㳙經三日大喜曰吾固知齊人怯入吾地三日士卒亡者過半遂逐之又李斯曰由竈上騷除此萬世之一時也騷音掃漢書李少君言祀竈皆可致神物而丹砂可化為黄金黄金成以為器以食則益夀夀益則海中蓬萊}
  - {type: page-break, offset: 28, content: '', id: KR3k0012_WYG_186-2b, image: WYG0894/WYG0894-0653b.png}
  - {type: page-break, offset: 28, content: '', id: KR3k0012_WYG_186-3a, image: WYG0894/WYG0894-0653c.png}
  - {type: variant, offset: 29, length: 0, content: '', WYG: 者乃可見之封禪則不死黄帝是也天子親祀竈焉又曰初霍氏奢侈茂陵徐生曰霍氏必亡夫奢則不遜不遜必侮上侮上逆道也在}
  - {type: variant, offset: 30, length: 3, content: 騎五色, WYG: 之右衆必害之也霍氏秉權日乆害之者多矣天下害之而又行以逆道不亡何待迺上疏言霍氏太盛陛下即愛厚之宜以時抑制無使至亡書三上輒報聞其後霍氏誅滅而告霍氏者皆封人為徐生上書曰臣聞客有過主人者見其竈直突傍有積薪客謂主人更為曲突逺徙其薪不者且有火患主人不應俄而家果失火鄰里共救之幸而得息於是殺牛置酒謝鄰人灼爛者在於上行餘各以次不録言曲突者人謂主人曰鄉使聴客之言終無火患今論功而請賓曲突徙薪無恩澤燋頭爛額為上客主人乃悟而請之茂陵徐福數上書曰霍氏且變鄉使福説得行則國無裂土出爵之費臣無逆亂誅滅之敗往事既已而福不䝉其功唯陛下察之貴徙薪曲突之䇿使居焦髮爛額之右上迺賜福帛十疋後以為郎又曰息夫躬祀竈人見之告呪詛遂棄市又曰昭帝時燕王宫豕出圂胡困切壊都竈注都竈蒸炊之大竈也劉向以為豕禍後漢書李南女曉術為由拳縣妻晨詣竈室卒有㬥風婦上堂従姑求歸辭其二親姑不許乃跪而泣曰家世傳術疾風起先吹竈突及井此禍為婦女主爨者妾将應之因著其亡日乃聴還家如期病卒又更始傳李軼朱鮪擅命山東王匡張卬横㬥三輔其所官爵皆羣小賈豎或有膳夫庖人多著繡面衣錦袴襜褕諸于罵詈道中長安為之語曰竈下養中郎将爛}
