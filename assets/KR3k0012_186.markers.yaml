  - {type: variant, offset: 1795, length: 4, content: 玉為階呂, krp: 和不恊卿善爲我籌之戎曰公首舉義衆定大業開闢已來未始有也然論功報賞不及有勞朝野失望人懷貳志今二王帶甲百萬其鋒不可當若以王就第不失故爵委權崇讓此求安之計也冏謀臣葛旟怒曰漢魏以來王公就第寜有得保妻子乎議者可斬於是百官震悚戎僞藥發墯厠得不及禍又曰郭璞素與桓彛友善彛每造之或值璞在婦女間便入璞曰卿來他處自可徑前但不可厠上相㝷耳必客主有殃彛後因醉詣璞正逢在厠掩而觀之見璞躶身𬒳髮銜刀設醊璞見彛撫心大驚曰吾每屬卿勿來反更如是非但禍吾卿亦不免矣天實爲之將以誰咎璞終嬰王敦之禍彛亦死蘇峻之難魏}
  - {type: variant, offset: 1797, length: 2, content: 階呂, WYG: 我籌之戎曰公首舉義衆定大業開闢以来未始有也然論功報賞不及有勞朝野失望人懐二志今二王帶甲百萬其鋒不可當若以王就第不失故爵委權崇讓此求安之計也冏謀臣葛旟怒曰漢魏以來王公就第寧有得保妻子乎議者可斬於是百官震悚戎偽藥發墮厠得不及禍又曰郭璞素與桓􅉓友善􅉓每造之或值璞在厠婦聞使入璞曰卿來他處自可徑前但不可厠上相尋耳若來必客主有殃􅉓後因醉詣璞正逢在厠掩而觀之見璞裸身被髮銜刀設醊璞見􅉓撫心大驚曰吾每屬卿勿來反更如是非但禍吾卿亦不免矣天實為之將以誰咎璞終罹王敦之禍􅉓亦死蘇峻之難魏}
