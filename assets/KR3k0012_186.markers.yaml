  - {type: variant, offset: 707, length: 1, content: 房, SBCK: 厨庖屋也易曰庖有魚義不及賔也毛詩大庖不􅄹禮記玉藻曰君子逺庖厨凡有血氣之􅀋弗身踐也又田獵之禮一爲乾豆二爲賔客三爲充君之庖漢書賈􅁩曰其禽獸見其生不忍見其死聞其聲不忍食其肉故逺胞厨所以長恩且明有仁也後漢書祢衡到許都人問荀文若趙稚子云何趙爲盪冦將軍見魏志也衡曰文若可使借面吊䘮稚長可􅁥厨請客典略曰衡見苟儀容但有皃耳故可吊丧趙有腹徤啖􅁏故可􅁥厨也七賢􅀓曰阮籍以歩兵厨中有羙酒求爲歩兵校尉司馬相如上林賦曰庖厨不徙後宫不移古詩曰左顧勅中厨竈禮有五祀竈居一焉月令孟夏其祀竈􅀕先肺陽氣盛􅀬外祀之於竈從􅀬􅀋也禮臧文仲燔柴於竈者竈者老婦之􅀕也盛於盆尊於鉼非所柴也文仲焉知禮禮庶人立一祀或立户或立竈論語王孫賈曰與其媚於奥寜媚於竈史記孫臏救韓入魏爲十萬竈明日爲五萬竈又明日爲三萬竈龐㳙經三日大喜曰我固知齊人怯入吾地三日士卒亡者過半遂逐之又曰李斯曰竈上騷除萬世一時也騷音掃漢書李少君言祀竈皆可致神物而丹砂可化爲黄金黄金成以爲器以食則益夀夀益則海中蓬萊仙者乃可見之封禪則不死黄帝是也天子親祀竈焉又曰􅀄霍氏奢侈茂陵徐生曰霍氏必亡夫奢則不遜不遜必侮上侮上逆道也在人之右衆必害之也霍氏秉權日乆害之者多矣天下害之而又行以逆道不亡何待迺上䟽言霍氏太盛陛下即愛厚之冝以時抑制無使至亡書三上輙不報聞其後霍氏誅滅而告霍氏者皆封人爲徐生上書曰臣聞客有過主人者見其竈直突傍有積薪客謂主人更爲曲突逺徙其薪不者且有火患主人不應俄而家果失火鄰里共救之幸而得息於是殺牛置酒謝其人灼爛者在於上行餘各以次不録言曲突者人謂主人曰郷使聽客之言不費牛酒終亡火患今論功而請賔曲突徙薪亡恩澤燋頭爛額爲上客主人迺寤而請之茂陵徐福數上書言霍氏且變冝防絶之郷使福說行則國士裂土岀爵之費臣亡逆亂誅滅之敗往事旣巳而福不蒙其功唯陛下察之貴徙薪曲突之䇿使居焦髮灼爛之右上迺賜福帛千疋後以爲郎又曰息夫躬祠竈人見之告呪詛遂弃市又曰昭帝時燕王宫豕岀圂胡困切壞都竈注都竈蒸炊之大竈也劉向以爲豕禍後漢書李南女曉術爲由拳縣人妻晨詣竈}
