  - {type: variant, offset: 11, length: 6, content: 廣州吳孫皓時, WYG: 文若可使借面弔喪稚長可監厨請客典略曰衡見荀儀容但有貎耳故可弔喪趙有腹健啖肉故可監厨也七賢傳曰阮籍}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_WYG_186-2a, image: WYG0894/WYG0894-0653a.png}
