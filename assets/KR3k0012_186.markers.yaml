  - {type: variant, offset: 2175, length: 1127, content: 里臨流虛構高可數丈長三十丈可容百人坐韓子曰師曠為晉平公請角一奏有雲從西北方起再奏大風而隨之裂幃幕破俎豆墯廊瓦平公懼伏于廊室兩京記曰隋焬帝從東都至西京御道並作長廊枚乘七發曰連廊四注臺城增光陸機與弟雲書曰聽頌觀東作百丈許廊屋塾爾雅曰門側之堂謂之塾郭璞注曰東門堂尚書顧命曰先輅在左塾之前次輅在右塾之後禮記學記曰古之教者家有塾白虎通曰所以必有塾何以飾門因取其名也明臣下當見於君先孰思其事也東觀漢記曰趙孝為郎每告歸往來常白衣步檐過道上郵亭但稱書生寄止於亭門塾魏武制度奏曰三公列侯門施內外塾方三十畝壇左傳曰子產相鄭伯以如楚舍不為壇漢書曰蕭何荐韓信於高祖高祖擇日齋戒設壇拜為將軍莊子曰孔子遊乎緇帷之林休坐乎杏壇之上弟子讀書孔子絃歌鼓琴奏曲未終有漁父者下船而來左手據膝右手柱頤以聽曲終而招子貢子路二人俱對客指孔子曰彼何為者也子路曰魯之君子也徐靈期南岳記曰南岳山上有飛流壇懸水激石飛湍百仞即孫溫伯所喪身處也又有曲水壇水行石上成溝瀆如世人臨河壇也三月三日時來逍遙梁州記曰沔陽城先沔陽縣所治也在漢水南舊蕭何所築劉備為漢王權住此城盟於城下今門外有盟壇猶存帝王世紀曰雍郊有五畤壇漢武獲麟處屏爾雅曰屏謂之樹郭璞曰小墻當門中者也犍為舍人曰以垣當門蔽為樹廣雅曰復罳謂之屏說文曰屏蔽也釋名曰屏自鄣屏也蕭牆在門內蕭肅也臣將入於此自肅警之處也罘罳在門外罘復也臣將入請事於此復重思也禮記禮器曰康王䟽屏天子廟飾也鄭玄注云屏樹也今謂之罘罳論語八佾曰或問管氏知禮乎曰邦君樹塞門管氏亦樹塞門管氏而知禮孰不知禮鄭玄注曰樹屏也又季氏曰吾恐季孫之憂不在顓臾而在蕭牆之內蕭牆謂之屏也漢書佞幸傳曰哀帝令將作為董賢起冢營義陵旁內為便房剛柏題湊外徼道周垣數里門闢罘罳甚盛又曰王莽傳曰莽性好時日小數及事迫急但為厭勝遣使壞渭陵園門罘罳曰無使民復思漢也漢官典職曰省閣下大屏稱曰丹屏尚書郎含雞舌香伏其下奏事晉書曰阮籍為東平相徹去屏障使內外相對孫卿子曰天子外屏諸侯內屏禮也外屏不欲見於外內屏不欲見於內也風俗通曰屏卿大夫以帷士以簾稍有第以自障蔽也示臣臨見自整屏氣處也吳越春秋曰越將伐吳越王命於夫人王背屏夫人向屏而立王曰自今日之後內政無出外政無入各守其職已盡其信內中辱者則是子境外千里辱者則是予也吾見子於是已明試矣王出宮夫人送王不過屏因反闔其門填之以土白虎通曰所以設屏何所以自障也示極臣下之故也天子德大故外屏諸侯德小所照見近故內屏扆爾雅曰戶牖之間謂之扆郭璞注曰牖東戶西也禮云斧扆形如屏風畫為斧文置扆地以其所名之耳尚書顧命曰設黼扆儀禮覲禮曰天子負扆南面朝諸侯是升致命也禮記明堂位曰天子負斧扆南而立宁爾雅曰門屏之間謂之宁郭璞注曰人君視朝門宁立處也釋名曰宁佇也見君所佇立定氣之處也毛詩曰俟我於著乎而曲禮曰天子當宁而立諸公東面諸侯西面曰朝, SBCK: 六}
