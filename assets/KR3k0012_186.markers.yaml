  - {type: 'tls:seg', offset: 5, content: '', id: KR3k0012_CHANT_186-1a.2}
  - {type: variant, offset: 5, length: 4, content: 廳事郡國, WYG: 為充君之庖漢書賈誼曰其於禽獸見其生不食其死聞其聲不食其肉故逺庖厨所以長恩且明有仁也後漢書禰衡到許都人問荀文若趙稚長云何趙為盪寇将軍見魏}
  - {type: xml-element, offset: 7, content: '', id: KR3k0012_CHANT_186-bkkxmlele2}
  - {type: xml-element, offset: 7, content: '', id: KR3k0012_CHANT_186-bkkxmlele3}
