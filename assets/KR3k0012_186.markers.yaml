  - {type: variant, offset: 707, length: 1, content: 房, krp: 厨庖屋也易曰庖有魚義不及賔也毛詩大庖不盈禮記玉藻曰君子逺庖厨凡有血氣之類弗身踐也又田獵之禮一爲乾豆二爲賔客三爲充君之庖漢書賈誼曰其禽獸見其生不忍見其死聞其聲不忍食其肉故逺胞厨所以長恩且明有仁也後漢書祢衡到許都人問荀文若趙稚子云何趙爲盪冦將軍見魏志也衡曰文若可使借面吊䘮稚長可監厨請客典略曰衡見苟儀容但有皃耳故可吊丧趙有腹徤啖肉故可監厨也七賢傳曰阮籍以歩兵厨中有羙酒求爲歩兵校尉司馬相如上林賦曰庖厨不徙後宫不移古詩曰左顧勅中厨竈禮有五祀竈居一焉月令孟夏其祀竈祭先肺陽氣盛熱外祀之於竈從熱類也禮臧文仲燔柴於竈者竈者老婦之祭也盛於盆尊於鉼非所柴也文仲焉知禮禮庶人立一祀或立户或立竈論語王孫賈曰與其媚於奥寜媚於竈史記孫臏救韓入魏爲十萬竈明日爲五萬竈又明日爲三萬竈龐㳙經三日大喜曰我固知齊人怯入吾地三日士卒亡者過半遂逐之又曰李斯曰竈上騷除萬世一時也騷音掃漢書李少君言祀竈皆可致神物而丹砂可化爲黄金黄金成以爲器以食則益夀夀益則海中蓬萊仙者乃可見之封禪則不死黄帝是也天子親祀竈焉又曰𥘉霍氏奢侈茂陵徐生曰霍氏必亡夫奢則不遜不遜必侮上侮上逆道也在人之右衆必害之也霍氏秉權日乆害之者多矣天下害之而又行以逆道不亡何待迺上䟽言霍氏太盛陛下即愛厚之冝以時抑制無使至亡書三上輙不報聞其後霍氏誅滅而告霍氏者皆封人爲徐生上書曰臣聞客有過主人者見其竈直突傍有積薪客謂主人更爲曲突逺徙其薪不者且有火患主人不應俄而家果失火鄰里共救之幸而得息於是殺牛置酒謝其人灼爛者在於上行餘各以次不録言曲突者人謂主人曰郷使聽客之言不費牛酒終亡火患今論功而請賔曲突徙薪亡恩澤燋頭爛額爲上客主人迺寤而請之茂陵徐福數上書言霍氏且變冝防絶之郷使福說行則國士裂土岀爵之費臣亡逆亂誅滅之敗往事旣巳而福不蒙其功唯陛下察之貴徙薪曲突之䇿使居焦髮灼爛之右上迺賜福帛千疋後以爲郎又曰息夫躬祠竈人見之告呪詛遂弃市又曰昭帝時燕王宫豕岀圂胡困切壞都竈注都竈蒸炊之大竈也劉向以爲豕禍後漢書李南女曉術爲由拳縣人妻晨詣竈}
  - {type: punctuation, offset: 708, content: ，, id: KR3k0012_CHANT_186-bkkpn184}
  - {type: 'tls:seg', offset: 708, content: '', id: KR3k0012_CHANT_186-10a.5}
  - {type: variant, offset: 709, length: 0, content: '', SBCK: 卒有暴風婦上堂從姑求歸辭其二親姑不許乃跪而泣曰家世傳術疾風起先吹竈突及井此禍爲婦女主㸑者妾將應之因著其亡日乃聽還家如期病卒又曰更始李軼朱鮪擅命山東王匡張印撗􅁀三輔其所與官爵皆羣小賈竪或有膳夫庖人多著繡面衣錦袴䄡䄖諸子罵詈道中長安爲之語曰竈下養中郎將爛羊頭關内侯又曰虞詡爲懷令後羗㓂武都鄧太后以詡有將帥之略遷武都太守引見嘉徳殿厚加賞賜羗乃率衆數千遮詡於陳倉崤谷詡即停軍不進而宣言上書請兵須到當發羌聞之乃分鈔傍縣詡因其兵散日夜進道兼行百餘里令吏士各作兩竈日増倍之羌不敢迫或問曰孫臏減竈而君増之兵法日行不過三十里以戒不虞而今日行二百何也詡曰虜衆多吾兵少徐行則易爲所及速過則彼所不測虜見吾竈日増必謂郡兵來迎衆多行速必憚追我孫臏見弱吾今示強勢有不同故也又曰向栩性不􅁪又似狂坐於竈北板屋上又曰張忠署孫賔爲主簿遂􅀕竈請比隣又曰隂識之臘日晨炊而竈神見殺黄羊因祀之三世繁昌遂常以臘日􅀕也戰國䇿曰智伯攻􅀳陽城城不沉者三板洎竈生蛙懸釡而炊魯連子曰一井五鉼洩可立待一竈五突烹餁十倍分烟者衆淮南子曰黄帝作竈死爲竈神莊子曰仲尼讀春秋老聃踞竈觚而聽觚竈額也又曰陽子居南郭之沛老聃西遊於􅁗邀還於郊至於梁而遇老子中道仰天而歎曰始以汝爲可敎今不可也陽子居不荅至舎進盥漱巾櫛脫屨户外􅂰行而前曰向者弟子欲請夫子夫子行不閑是以不敢問今閑矣請聞其過老子曰而睢睢盱盱而誰與居大白若辱盛徳若不足陽子居蹵然變容曰敬聞命矣其徃也舎者迎將家公執席妻執巾櫛舎者避席煬者避竈其反也舎者與之爭席矣冝都縣記曰冝都山絶崖壁立數百丈有一火燼挿}
