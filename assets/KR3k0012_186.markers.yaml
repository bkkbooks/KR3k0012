  - {type: variant, offset: 2069, length: 105, content: 卦也王延壽魯靈光殿賦曰東序重深而奧祕廊周書作雒曰凡五宮明堂咸有重廊史記紂有諛臣曰左強夸而目巧教紂為象廊漢書曰武帝策茂才曰蓋聞虞舜之時遊巖廊之上文穎注曰殿下外屋也晉灼注曰堂邊曰巖峻之廊也鄭緝之東陽記曰石步廊去歌山, SBCK: ''}
