  - {type: variant, offset: 711, length: 0, content: '', SBCK: 㸑餘留之故曰挿竈崖萬畢術曰竈神晦日歸天白人罪夢書曰竈主食夢者得食李尤竈銘曰燧人造火竈能以興竇周禮考工記曰宫中之竇其崇三尺左傳曰蓽門圭竇之人皆凌其上又曰有渦氏滅夏立相后緍方娠逃岀自竇晉書阮逸避乱依胡母輔之􅀄至屬輔之與謝鯤阮放畢卓羊曼桓彛阮孚散髮祼􅃝閉室酣飲己累日逸將排户入守者不聽逸便於户外脫衣露頭於狗竇中窺之而大呌輔之驚曰他人决不能尓必我孟祖也遽呼入遂與飲不捨晝夜時人謂之八逹家語曰子羔爲衛之士師刖人之足衛有蒯瞶之亂子羔逃至郭門刖者守焉謂子羔曰彼有鈌子羔曰君子不踰又曰彼有竇子羔曰君子不隧又曰彼有室子羔入焉追者罷子羔乃去厠溷附廣雅曰清溷屏厠也說文曰厠清}
