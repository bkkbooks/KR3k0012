  - {type: variant, offset: 1791, length: 0, content: '', SBCK: 范睢事魏中大夫須賈賈爲魏昭王使於齊睢從齊襄王聞睢辯有口才乃使人賜睢金十斤及牛酒須賈以睢持魏隂事告齊故睢獨得此饋心怒㱕以告魏相魏齊齊使人笞撃睢折脅摺齒睢佯死卷以置厠中賔客飲者醉更溺睢以懲後無妄言者又曰李斯者楚之上蔡人也少時爲郷小吏見吏舎厠中鼠食不絜近人犬數驚恐之斯入倉觀倉中䑕食積粟居大廡下不見人犬之憂於是李斯乃嘆曰人之賢不肖譬如鼠矣在所自處耳乃從荀卿學帝王之術又曰萬石君長子建老白首萬石君尚無恙建爲郎中令每五日洗沐歸謁親入子舎竊問侍者取親中裙厠牏身自浣滌徐廣曰牏築垣短版也音注厠牏謂溷垣牆建隱於其側而浣滌也一謂牏爲竇言建又自洗盪厠竇厠竇舄除穢汚之穴也吕静曰楲窬䙝器音威豆復與侍者不敢令萬石君知以爲常又曰趙襄子滅智伯其臣豫讓遁逃山中曰嗟乎士爲知巳者死女爲說巳者容今智伯知我我必爲報讎而死以報智伯則吾魂魄不媿矣乃變名姓爲刑人入宫塗厠中挾匕首欲以刺襄子襄子如厠心動執問􅂗厠之刑人豫讓内持刃兵曰欲爲智伯報仇左右欲誅之趙襄子曰彼義人也吾謹避之耳且智伯亡無後而其臣欲爲報仇此天下之賢人也卒釋去之又曰大將軍衛青侍中上據厠而視之注溷厠也漢書郅都侍上賈􅁎如厠有野彘入厠上目都擊之都不徃上欲自行都伏諫曰一􅁎死復一􅁎進上雖自輕奈太后宗廟何太后聞之賜都金􅀳書王戎惠帝反宫以戎爲尚書令旣而河間王顒遣使說成都王潁將誅齊王冏檄書至冏謂戎曰孫秀作逆天子幽偪􅀌糾合義兵掃除元惡臣子之節信著神}
