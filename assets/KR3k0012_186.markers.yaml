  - {type: variant, offset: 1795, length: 4, content: 玉為階呂, SBCK: 和不恊卿善爲我籌之戎曰公首舉義衆定大業開闢已來未始有也然論功報賞不及有勞朝野失望人懷貳志今二王帶甲百萬其鋒不可當若以王就第不失故爵委權崇讓此求安之計也冏謀臣􅁑旟怒曰漢魏以來王公就第寜有得保妻子乎議者可斬於是百官震悚戎僞藥發墯厠得不及禍又曰郭璞素與􅁊彛友善彛每造之或值璞在婦女間便入璞曰卿來他處自可徑前但不可厠上相㝷耳必客主有殃彛後因醉詣璞正逢在厠掩而觀之見璞躶身􅀍髮銜刀設醊璞見彛撫心大驚曰吾每屬卿勿來反更如是非但禍吾卿亦不免矣天實爲之將以誰咎璞終嬰王敦之禍彛亦死蘇峻之難魏}
