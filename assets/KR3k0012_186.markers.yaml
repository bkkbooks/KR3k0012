  - {type: variant, offset: 281, length: 286, content: 寐忘倦飢渴無已盧諶祭法曰凡祭法有廟者置之於座未遑立廟祭於廳事可也兩京記曰考功員外廳有薛稷畫鶴寧之問為讚工部尚書廳有薛稷畫樹石並為時所重齋王安成記曰大和中陳郡殷府君引水入城穿池殷仲堪又於池北立小屋讀書百姓于今呼曰讀書齋晉徵祥說曰桓玄鎮姑熟屋壁先畫作黃盤龍號盤龍齋俄而玄敗將軍劉毅居之毅小名盤襄沔記曰金城內刺史院有高齋梁昭明太子於此齋造文選鮑至云簡文為晉安王鎮襄陽日又引劉孝威庾肩吾徐防江伯操孔敬通惠子悅徐陵王囿孔鑠等於此齋綜覆詩集于時鮑至亦在數凡十人資給豐厚曰設肴饌于時號為高齋學士雍州記云高齋其泥色其鮮凈故此名焉南平世子恪臨州有甘露降此齋前竹林昭明太子於齋營休道義以時相繼, WYG: 踰}
