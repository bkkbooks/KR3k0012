  - {type: variant, offset: 732, length: 180, content: 將侍於君前息燭後舉燭至于房中釋朝服襲燕服然後入御于君毛詩黍離曰君子陽陽左執簧右招我由房漢書曰哀帝初即位躬行儉約省減諸用政事由已出朝廷翕然望焉有詔問丞相大司空定陶恭王太后宜當何居孔光不欲令帝旦夕相近即議以為定陶王太后宜改築宮大司空何武曰可居北宮有紫房複道通未央宮太后果從複道朝夕至帝所求欲稱尊號貴寵其屬使上以不得直道而行應劭漢官儀曰皇后稱椒房以椒塗室主溫暖除惡氣, SBCK: 温厠温塞}
