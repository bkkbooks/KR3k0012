  - {type: variant, offset: 999, length: 575, content: 異味以進於吳殺三牲以祈天地殺龍以祠川海以江南億萬戶民輸為傭保越又有美女二人一名夷光一名脩明以貢於吳吳處之以椒華之房貫細珠為簾熀熀內竊窺者莫不動心驚魂謂之神人吳王妖惑怠於國政及越兵入乃抱二女以逃吳苑晉宮閣名曰洛陽宮內有義和溫房十洲記曰崑崙山有紫翠丹房拾遺錄曰崑崙丹密雲房東西千步望之如丹霞尸子曰泰山之中有神房阿閣楚辭曰姱容脩態絙洞房又九歌曰桂棟兮蘭橑新夷楣兮藥房宋玉風賦曰主人女子乃更有蘭房奧室止臣其中庭說文曰庭朝中也尚書曰咸造勿褻在王庭周易曰揚于王庭孚號有厲造自邑不利即戎利有攸往禮記曰諸侯之庭毛詩曰洒掃庭內又曰俟我于庭乎而又曰殖殖其庭又曰子有庭內弗洒弗掃又曰有瞽有瞽在周之庭左傳曰庭實旅百論語曰鯉趨而過庭曰學詩乎又曰孔子謂季氏八佾舞於庭是可忍也孰不可忍也周書曰成王四征不庭漢書曰王商為人多質有威重師古曰多質言不為文飾長八尺餘身體鴻大容貌絕人河平四年單于來朝引見白虎殿丞相商坐未央庭中單于前拜謁商師古曰單于將見天子而經未央庭中過商起離席與言單于仰視商貌大畏之遷延卻退天子聞而歎曰真漢相矣晉書曰謝玄字幼度少潁悟與從兄朗俱為叔父安所器重安嘗戒約子姪曰子弟亦何豫人事而正欲使其佳諸人莫有言者玄荅曰譬如芝蘭玉樹欲使其生於庭階耳安悅說苑曰吳入楚申包胥告急於秦秦哀公曰諾固將圖之申包胥立哭於秦庭晝夜哭七日七夜不絕聲哀公曰有臣如此可不救乎興師救楚吳人引兵而還昭王反, SBCK: ''}
