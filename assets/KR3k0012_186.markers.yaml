  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書太平御覽卷一百八十六宋李昉等撰}
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_186-1a, image: WYG0894/WYG0894-0652c.png}
  - {type: variant, offset: 0, length: 0, content: '', krp: 太平衘覽卷第一百八十六}
  body:
  - {type: variant, offset: 4, length: 700, content: 三廳事郡國志曰廣州吳孫皓時以滕脩為刺史未至州有五仙人騎五色羊負五榖來迎而去今州廳事梁上畫五仙人騎五色羊為瑞裴淵廣州記曰州廳事梁上畫五羊像又作五榖囊隨像懸之云昔高固為楚相五年銜榖莖于楚庭於是圖其像廣州則楚分野故因圖象其瑞焉臨海記曰章安縣南門有赤蘭橋世傳成公綏作縣此橋上製廳縣令年常祭廳事神用生鹿其年活得白鹿還於廳事上生以祭神仍遂食之歲時用焉自是以後白鹿不可復得而必須生鹿歷代相承迄今不絕世說曰庾太尉兄弟初渡江行路人有避雨者悉聚諸廳事上征西車騎自譬遣之不肯去太尉新沐頭散髮高詠從閤內出避雨者退莫有留者王朗與許靖書曰武皇帝於江陵劉景升廳事上共論道足下至于通夜不寐忘倦飢渴無已盧諶祭法曰凡祭法有廟者置之於座未遑立廟祭於廳事可也兩京記曰考功員外廳有薛稷畫鶴寧之問為讚工部尚書廳有薛稷畫樹石並為時所重齋王安成記曰大和中陳郡殷府君引水入城穿池殷仲堪又於池北立小屋讀書百姓于今呼曰讀書齋晉徵祥說曰桓玄鎮姑熟屋壁先畫作黃盤龍號盤龍齋俄而玄敗將軍劉毅居之毅小名盤襄沔記曰金城內刺史院有高齋梁昭明太子於此齋造文選鮑至云簡文為晉安王鎮襄陽日又引劉孝威庾肩吾徐防江伯操孔敬通惠子悅徐陵王囿孔鑠等於此齋綜覆詩集于時鮑至亦在數凡十人資給豐厚曰設肴饌于時號為高齋學士雍州記云高齋其泥色其鮮凈故此名焉南平世子恪臨州有甘露降此齋前竹林昭明太子於齋營休道義以時相繼又曰白土齋南道有一齋以栗為屋梁武帝臨州寢臥於此齋中常有五色雲廻轉狀如盤龍屋上恒紫雲騰起形似繖蓋遠近望者莫不異焉梁武帝于此龍飛又曰高齋東北有一齋名曰下齋次於高齋制度壯麗極爽塏刺史辯決獄訟舊出此齋國史補曰梁武造寺令蕭子雲飛白大書一蕭字在焉李約自江淮竭產買歸洛中置於小亭號曰蕭齋房, SBCK: 四厨竈竇厠厨}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 四厨竈竇厠厨説文曰厨庖室也易曰庖有魚義不及賓也毛詩大庖不盈禮記玉藻曰君子逺庖厨凡有血氣之類弗身踐也又曰獵之禮一為乾豆二為賓客}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_WYG_186-1b, image: WYG0894/WYG0894-0652d.png}
