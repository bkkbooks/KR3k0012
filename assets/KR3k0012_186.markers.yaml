  - {type: variant, offset: 1791, length: 0, content: '', WYG: 范雎事魏中大夫須賈賈為魏昭王使於齊睢從齊襄王聞睢辯有口才乃使人賜金十斤及牛酒須賈以睢持魏事告齊故睢獨得此饋心怒歸以告魏相魏齊齊使人笞擊睢折脅摺齒睢佯死即裏以簀置厠中賔客飲者醉更溺睢以懲後令無妄言者又曰李斯者楚之上蔡人也少時為鄉小吏見吏舎厠中鼠食不潔近人犬數驚恐之斯入倉觀倉中鼠食積粟居大廡下不見人犬之憂於是李斯乃嘆曰人之賢不肖譬如鼠矣在所自處耳乃從荀卿學帝王之術又曰萬石君長子建老白首萬石君尚無恙建為郎中令每五日洗沐歸謁親入子舎竊問侍者取親中裙厠牏身自浣滌徐廣曰牏築垣短版也音注厠牏謂溷垣牆建隠於其厠而浣滌也一謂牏為竇言建又自洗盪厠竇則竇瀉除穢汚之穴也吕静曰楲窬褻器音威豆復與侍者不敢令萬石君知以為常又曰趙襄子滅智伯其臣豫讓遁逃山中曰嗟乎士為知己者死女為説己者容今智伯知我我必為報讐而死以報智伯則吾魂魄不愧矣乃變姓名為刑人入宫塗厠中挾匕首欲以刺襄子襄子如厠心動執問塗厠之刑人豫讓内持刃兵曰欲為智伯報仇左右欲殺之襄子曰彼義人也吾謹避之耳且智伯亡無後而其臣欲為報仇此天下之賢人也卒釋去之又曰大将軍衛青侍中上據厠而視之注溷厠也漢書曰郅都侍上賈姬如厠有野彘入厠上目都擊之都不往上欲自行都伏諫曰一姬死復一姬進上雖自輕奈太后宗廟何太后聞之賜都金晉書王戎傳惠帝反宫以戎為尚書令既而河間王顒遣使説成都王穎将誅齊王冏檄書至冏謂戎曰孫秀作逆天子幽偪孤糾合義兵掃除元惡臣子之節信著神}
