  - {type: variant, offset: 34, length: 3, content: 負五榖, WYG: 頭闗内侯又曰虞詡為懐令西羌寇武都鄧太后以詡有将帥之略遷武都太守引見嘉徳殿厚加賞賜羌乃率衆數千遮詡於陳倉崤谷詡即停軍不進而宣言上書請兵須到當發羌聞之乃分鈔傍縣詡因其兵散日夜進道兼行百餘里令吏士各作兩竈日増倍之羌不敢迫或問曰孫臏減竈而君増之兵法日行不過三十里以戒不虞而今日且二百何也詡曰虜衆多我兵少徐行則為所及速過則彼所不測虜見吾竈日増必謂郡兵}
  - {type: page-break, offset: 34, content: '', id: KR3k0012_WYG_186-5a, image: WYG0894/WYG0894-0654c.png}
  - {type: punctuation, offset: 38, content: ，, id: KR3k0012_CHANT_186-bkkpn8}
  - {type: 'tls:seg', offset: 38, content: '', id: KR3k0012_CHANT_186-1a.8}
  - {type: variant, offset: 39, length: 0, content: '', WYG: 衆多行速必憚追我孫臏見弱吾今示强勢有不同故也又曰向栩性不恒少似狂常於竈北坐板床上又曰張忠署孫賓為主簿遂祭竈請比鄰又曰陰識之子方臘日晨炊}
  - {type: page-break, offset: 39, content: '', id: KR3k0012_WYG_186-5b, image: WYG0894/WYG0894-0654d.png}
  - {type: variant, offset: 40, length: 1, content: 去, WYG: 竈神見因殺黄羊祀之三世繁昌遂常以臘日祭也戰國䇿曰智伯攻晉陽城城不没者三版沈竈生蛙懸釡而炊魯連子曰一井五缾洩可立待一竈五突烹餁十倍分烟者衆淮南子曰黄帝作竈死為竈神荘子曰仲尼讀春秋老耼踞竈觚而聴觚竈額也又曰陽子居南之沛老聃西逰於秦邀還於郊至於梁而遇老子老子中道仰天而嘆曰始以汝為可教}
  - {type: page-break, offset: 40, content: '', id: KR3k0012_WYG_186-6a, image: WYG0894/WYG0894-0655a.png}
  - {type: punctuation, offset: 41, content: 。, id: KR3k0012_CHANT_186-bkkpn9}
  - {type: 'tls:seg', offset: 41, content: '', id: KR3k0012_CHANT_186-1a.9}
  - {type: variant, offset: 42, length: 19, content: 州廳事梁上畫五仙人騎五色羊為瑞裴淵廣州, WYG: 不可也陽子居不答至舎進盥漱巾櫛脱屨户外膝行而前曰向者弟子欲請夫子夫子行不間是以不敢問今間矣請問其過老子曰而睢睢盱盱而誰與居大白若辱盛徳若不足陽子居蹵然變容曰敬聞命矣其往也舍者迎將其家公執席妻執巾櫛舎者避席煬者避竈其反也舎者與之争席矣宜都縣}
