  - {type: variant, offset: 913, length: 428, content: 酈善長注水經曰芑水出南山芒水谷北流遙玉女房水側山際有石室世謂之玉女房郡國誌曰葭萌縣玉女房昔有玉女入石穴空有竹數莖下有青石壇每因風恒自掃壇王子年拾遺記曰越欲滅吳蓄天下奇寶美人異味以進於吳殺三牲以祈天地殺龍以祠川海以江南億萬戶民輸為傭保越又有美女二人一名夷光一名脩明以貢於吳吳處之以椒華之房貫細珠為簾熀熀內竊窺者莫不動心驚魂謂之神人吳王妖惑怠於國政及越兵入乃抱二女以逃吳苑晉宮閣名曰洛陽宮內有義和溫房十洲記曰崑崙山有紫翠丹房拾遺錄曰崑崙丹密雲房東西千步望之如丹霞尸子曰泰山之中有神房阿閣楚辭曰姱容脩態絙洞房又九歌曰桂棟兮蘭橑新夷楣兮藥房宋玉風賦曰主人女子乃更有蘭房奧室止臣其中庭說文曰庭朝中也尚書曰咸造勿褻在王庭周易曰揚于王庭孚號有厲造自邑不利即戎利有攸往禮記曰諸侯之庭毛詩曰洒掃庭內又曰俟我于庭乎而又曰殖殖其庭又曰子有庭內弗洒弗掃又曰有瞽有瞽在周之庭左傳曰庭實旅百論語曰鯉趨而過庭曰學詩乎又曰孔子謂季氏八佾舞於庭是可忍也孰不可忍也周書曰成王四征不庭漢書曰王商, WYG: ''}
