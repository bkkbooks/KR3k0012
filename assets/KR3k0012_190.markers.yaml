  - {type: variant, offset: 3432, length: 24, content: 家貧穿井得鐵印銘曰傭力得富至億庚一土三田軍門主果, WYG: 年豐人少利時}
  - {type: variant, offset: 3433, length: 378, content: 貧穿井得鐵印銘曰傭力得富至億庚一土三田軍門主果大富永初中以錢買官至中壘校尉三田一土乃壘字也郡國誌曰姑衍州有湯井風穴深不可測常有微風雖三伏盛暑猶須衣裘又曰恒州常穿井得白玉方四尺下有石石有龜長二尺許又曰連渾府姑衍州遙火山西有火井深不可見底炎氣上昇常若微電以草爨之則煙騰火發其山似火從地發故名熒臺又曰濮州姚墟有二井是舜井也以物投一井即二井水皆動耕於歷山漁於雷澤即此也又曰硤州宜陽山有風井穴大如甕夏出冬入有樵人置笠穴口風翕之入後於長溪口得笠則知潛通也又曰朔州有神泉人歌曰紇真山頭有神井入地千尺絕骨冷又曰貴州有司命井半甘半淡潛涌江波虛盈如勢又曰衡山侯曇山山有溪豪神祠壇壇傍有石井常無水人祀之即水出事了即乾又曰柳州昔相嶺西麓下有潮井廣半畝一日三湧三落又曰堯井在汜水縣東十五里漢高祖敗項羽追之入此井得免見井中有雙鳩飛出有踟跦網因而得免又曰濟州榖城管仲私邑今城內有夫子五井, SBCK: 書倉}
