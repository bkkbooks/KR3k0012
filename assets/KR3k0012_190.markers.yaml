  - {type: variant, offset: 2053, length: 307, content: 新異苑曰蘭陵昌慮縣郳城有華山山上有井鳥巢其中金喙黑色而團翅此禽見則大水井又不可窺窺者盈歲輒死又曰廣陵郡東界有黃公塚高墳二所前有一井面廣數尺每旱不竭有於其中得銅釜及罐各一又曰謝晦字宣明宅南路上有古井以元嘉二年汲者忽見三龍甚分明行道住觀莫不嗟異有人入井始知是塼隱起作龍形又曰潯陽曇椿世居長沙宅有古井每夜輒聞有如炮竹聲相承謂為龍吒風俗通曰龐儉父先逃走隨母流宕後居鄉里鑿井得銅生遂溫富後買奴曰堂上者我婦也問其故奴曰我婦姓艾字阿宏足下有黑子腋下有赤志母曰我翁也遂為夫妻時人曰鑿井得銅買奴得翁又曰龐儉鑿井得錢數萬又曰郄子路行飲馬投錢井中續漢禮儀志曰夏至日浚井改水冬至日鑽燧改火淮南子曰伯益作井而黃龍登異物志曰盧陵城中有一井井中, SBCK: 倉􅁃}
