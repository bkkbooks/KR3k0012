  - {type: variant, offset: 3535, length: 2, content: 姑衍, WYG: 注不涸之倉言務五榖也述征記曰東城二石橋舊於王城之東北開渠引洛水名曰陽渠東流經洛陽於城之東南然後北迴通運至建春門以輸常滿倉永嘉郡記曰青田溪發源太湖湖是白土無復細石中生藴藻冬天水熱如湯故衆魚歸之名曰魚倉益}
  - {type: variant, offset: 3538, length: 3, content: 遙火山, WYG: 記曰今成都縣東有頺城毁垣土人云古白帝倉也異苑曰餘姚縣倉封閉甚宻而年年輒大損耗是富陽縣桓王陵上雙石龜所食即斷毁龜口於是無復虧減三輔故事曰漢大将軍周亞夫軍於細栁今石激是也石激}
  - {type: page-break, offset: 3538, content: '', id: KR3k0012_WYG_190-9b, image: WYG0894/WYG0894-0685d.png}
  - {type: variant, offset: 3543, length: 35, content: 火井深不可見底炎氣上昇常若微電以草爨之則煙騰火發其山似火從地發故名熒臺, WYG: 細栁倉城東嘉禾倉老子曰田甚蕪倉甚虚管子曰倉廩實而知禮節}
