  - {type: variant, offset: 3580, length: 4, content: 濮州姚墟, WYG: 不務地利則倉不盈荘子曰諸中國之在海内不似稊米之在太倉乎韓子曰韓昭侯之時黍種貴昭侯令人覆廩吏果竊黍種糶之淮南子曰近敖倉者不為之多飯期滿腹而已鹽鐵論曰匈奴因山谷為城池水草為倉廩地理志曰敖倉在河南廣武山鄭國所置漢王與項王争天下運敖倉之粟是也囷西京雜記曰曹元理善算友人陳廣漢者}
