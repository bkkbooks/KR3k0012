  - {type: variant, offset: 3482, length: 2, content: 姑衍, WYG: 常平倉百姓利之後漢書曰韓韶字仲黄潁川舞陽人也少仕郡辟司徒府泰山賊公孫舉偽號厯年守令不能破多為坐法尚書選三府掾屬能治劇者乃以韶為嬴長嬴縣故城在今兖}
  - {type: variant, offset: 3485, length: 6, content: 有湯井風穴深, WYG: 塼城縣東北賊聞其賢相戒不入嬴境餘縣多被寇廢耕桑其流入縣界求索衣糧者甚衆韶愍其飢乃開倉賑之所贍萬餘户主者爭謂}
