  - {type: variant, offset: 3964, length: 140, content: 清凈則浪井出符瑞圖曰浪井者不鑿自成王者清凈則有仙人主之丹陽記曰句容縣有沸井亦曰沸潭兩京記曰醴泉坊本名承明坊開皇初繕築此坊忽聞金石之聲因掘得甘泉浪井七所飲者疾愈因以名坊水經注云襄國西石岡上有井大如車輪圖志云此井光武營軍所鑿魏都賦曰墨井鹽池注鄴西高陵有石墨井嶺表錄曰綠珠井在白州雙角山, WYG: 藏於天}
