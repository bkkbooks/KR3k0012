  - {type: variant, offset: 4051, length: 1, content: 襄, SBCK: 汾陽故城積粟所在名之曰羊膓倉在晉門閭陽北石磴縈委若羊膓故以爲名即今羊膓坂是也越絶書曰君均東倉春申君造西倉名曰君均西倉門周一里八歩又曰呉兩倉春申君所造一名均輸洛陽記曰有常滿倉天門集曰廪星主倉說􅁐曰子路爲蒲令備水災興民春修溝瀆爲民煩苦故人予一簞食一壷漿孔子聞之使子貢止之子路忿然不恱往見夫子曰由也以暴雨將至恐有水災故與民脩溝瀆以備之而民多匱於食故與人一簞食一壷漿而夫子使賜止之何也夫子止由之行仁也夫子以仁敎而禁其行仁由也不受子曰尓以爲餓何不告於君發倉􅅒以給食之而以尓􅀻饋之是汝不明君之惠見汝之􅀻義也速巳則可矣否則尓受責不乆矣子路心服而退又曰北郭騷踵見晏子曰竊恱先生之義願乞所以養母者晏子使人分倉粟府金而遺之辭金而受粟有間晏子見疑於景公出犇北郭子召其友而告之曰吾恱晏子之義而甞乞所以養母者吾聞之曰養及親者身更其難今晏子見疑吾將以身白之遂造公庭求復之曰晏子天下之賢者也今去齊}
  - {type: page-break, offset: 4051, content: '', id: KR3k0012_SBCK_190-5a}
  - {type: variant, offset: 4051, length: 1, content: 襄, krp: 汾陽故城積粟所在名之曰羊膓倉在晉門閭陽北石磴縈委若羊膓故以爲名即今羊膓坂是也越絶書曰君均東倉春申君造西倉名曰君均西倉門周一里八歩又曰呉兩倉春申君所造一名均輸洛陽記曰有常滿倉天門集曰廪星主倉說苑曰子路爲蒲令備水災興民春修溝瀆爲民煩苦故人予一簞食一壷漿孔子聞之使子貢止之子路忿然不恱往見夫子曰由也以暴雨將至恐有水災故與民脩溝瀆以備之而民多匱於食故與人一簞食一壷漿而夫子使賜止之何也夫子止由之行仁也夫子以仁敎而禁其行仁由也不受子曰尓以爲餓何不告於君發倉廩以給食之而以尓私饋之是汝不明君之惠見汝之私義也速巳則可矣否則尓受責不乆矣子路心服而退又曰北郭騷踵見晏子曰竊恱先生之義願乞所以養母者晏子使人分倉粟府金而遺之辭金而受粟有間晏子見疑於景公出犇北郭子召其友而告之曰吾恱晏子之義而甞乞所以養母者吾聞之曰養及親者身更其難今晏子見疑吾將以身白之遂造公庭求復之曰晏子天下之賢者也今去齊}
  - {type: variant, offset: 4053, length: 0, content: '', SBCK: 國必侵矣方必見國之侵也不若先死請絶頸以白晏子逡廵而退因自殺也公聞之大駭乘馳而自追晏子及之郊請而反之晏子不得巳而反之聞北郭子之以死白巳也太息而嘆曰嬰不肖罪過固其所也而士以身明之哀哉晉陽秋曰泰始四年七月立常平倉豐則糴儉則糶以利民也管子曰錯國不傾之地積不涸之倉藏不竭之府注不涸之倉言務五榖也述征記曰東城二石橋舊於王城之東北開渠引洛水名曰陽渠東流經洛陽於城之東南然後北廻通運至建春門以輸常滿倉永嘉郡記曰青田溪發源太湖湖是白土無復細石中生藴藻冬天水􅀬如湯故衆魚歸之名爲魚倉益州記曰今成都縣東有頽城毀垣土人云古白帝倉也異􅁐曰餘姚縣倉封閇完密而年年輙大損耗是冨陽縣桓王陵上雙石􅀛所食即斵毁􅀛口於是無復􅃜減三輔故事曰漢大將軍周亞夫軍於細柳今石激是也石激}
  - {type: page-break, offset: 4053, content: '', id: KR3k0012_SBCK_190-5b}
