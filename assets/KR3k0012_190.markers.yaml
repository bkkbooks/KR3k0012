  - {type: variant, offset: 3533, length: 1, content: 渾, WYG: 年州郡不能禁乃以詡為朝歌長故舊皆弔詡曰得朝歌何衰詡笑曰志不求易事不避難臣之職也不遇盤根錯節何以别利器乎始到河内太守馬稜勉之曰君儒者當謨謀廟堂之上反在朝歌邪詡曰初除之日士大夫皆見弔勉詡籌之知其無能為也朝歌者韓魏之郊背太行臨黄河去敖倉百里而青冀之人流亡萬數賊不知開倉招衆刧庫兵守成皋斷天下右臂不足憂也今其衆新盛難與爭鋒兵不厭權願寛假轡䇿勿令有所舉閡而已及到官設令三科以募求壮士自掾吏以下各舉所知攻刧者為上偷盜為次帶喪服而不事家業者為下収得百餘人詡為之饗會悉貰其罪使入賊中誘令刧掠乃伏兵以待之遂殺賊數百人又潜遣貧民能縫者傭作賊衣以綵縫其裾為幟幟記也續漢書曰以綘縷縫其裾也有入市里者吏輒擒之賊由是駭散咸稱神明晉陽秋曰泰始四年七月立常平倉豐則糴歉則糶以利民也管子曰錯國不傾之地積不涸之倉藏不竭之}
