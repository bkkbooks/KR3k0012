  - {type: variant, offset: 497, length: 297, content: 臨淄縣昌興亭長辛當一夕暮數夢曰吾天公使也公使我告亭長曰攝皇帝當為真即不信我此亭中當有新井亭長晨起視亭中有新井入地且百尺也後漢書曰琅邪有冰井冰厚尺餘又曰耿恭之攻匈奴以䟽勒城傍有澗水可固五月引兵據之七月匈奴復攻恭恭募先登數千人直馳之胡騎散走匈奴遂於城下擁絕澗水恭於中穿井十五丈不得水吏士渴乏笮馬糞汗而飲之恭仰天歎曰聞昔貳師將軍拔佩刀刺山飛泉涌出今漢德神明豈有窮哉乃整衣服向井再拜為吏士禱有頃水泉奔出眾皆稱萬歲乃令士揚水以示虜東觀記曰恭親自挽籠於是令士旦勿飲先和泥塗城并揚示之虜出不意以為神明遂引去又曰淳于恭門側有井鄉里小兒爭飲牛恭惡之名置水器汲水滿之又曰張讓劫天子至河掌璽者投璽井中後孫堅討董卓至祀, WYG: ''}
