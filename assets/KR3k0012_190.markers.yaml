  - {type: variant, offset: 4105, length: 40, content: 昔梁氏之女有容貌石季倫為交趾使以真珠三斛買之梁氏之居舊井存焉渚宮故事云江陵城東二, WYG: 諸侯藏於百姓農夫藏於囷庾商賈藏於篋笥太平御覽卷一百九}
