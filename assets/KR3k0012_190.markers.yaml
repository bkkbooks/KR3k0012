  - {type: variant, offset: 1526, length: 526, content: 壑之水而跱塪井之樂亦至矣夫子奚不時來入觀乎東海之鼈左足未入而右膝已墊矣於是逡巡而卻告之海若曰夫萬里之遠不足舉其大千仞之高不足極其深禹之時十年九潦而水不為加益湯之時八年七旱而崖不為加損夫不為頃久之推移者此亦東海之大樂於是塪井之蛙聞之適適然驚規規然自失墨子云備城五十步一井范子曰直木先伐甘井先竭孫子兵法曰地多陷曲曰天井墨子云二舍共一井抱朴子內篇曰臨沅縣有寮氏家世老壽後子孫輒夭賤折他人居其故宅復世壽乃知是宅所為不知何故疑井中赤乃掘井左右得古人埋丹砂數十斛丹汁入井是以飲其水而得壽呂氏春秋曰天下之美者崑崙之井又曰宋丁氏無井常一人溉汲於外及自穿井喜而告人吾穿井得一人人傳之者聞於宋君召問其故對曰得一人之使非得一人於井中也說苑曰季桓子穿井得土缶中有羊以問孔子言得狗孔子曰以吾所聞非狗乃羊也木之怪龍罔兩水之怪龍罔象二之怪棼羊也非狗也桓子曰善哉管子曰桓公將與管仲飲十日齋戒掘新井而柴焉注新井以柴蓋覆之取其清潔示敬也葛仙公傳曰仙公取數十錢使一人投井水公從井上呼錢又一一飛從井中出入公器中也桂陽列仙傳曰蘇躭啟母曰有賓客來會躭受性當仙今招耽去違於供養今年多疫竊有此井水飲之可得無恙賣此水過於供養使賓客隨去焉水經注曰華林園䟽圃中有古井悉珉玉為之以繢石為口玉作精密獨不變古粲焉, SBCK: ''}
