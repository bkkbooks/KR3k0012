  - {type: variant, offset: 4109, length: 124, content: 女有容貌石季倫為交趾使以真珠三斛買之梁氏之居舊井存焉渚宮故事云江陵城東二十里有天井周廻二里其深不測旱而禱之即大雨時至隋圖經云常山唐縣中出城西北隅有一大井俗名趙母井昔云醇酎千日即是此井所醞後以石蓋之人不敢開齊刺史愽陵王濟欲開之即有雲霧隱蔽懼不敢開魏文, SBCK: 便貧}
