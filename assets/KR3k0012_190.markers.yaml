  - {type: variant, offset: 1080, length: 182, content: 成井方六丈深三十二丈帝王世紀曰堯時老人擊壤於路而歌曰鑿井而飲耕田而食帝力於我何有哉南史曰延陵縣季子廟沸井之北忽聞金石聲疑有異鑿深三尺得沸井奔涌若浪其地又響即復鑿之復得一井涌沸亦然井中得一木簡長一尺廣二分上有隱起字曰廬山道人張陵再拜謁簡大堅白字色乃黃魚豢魏略曰明帝九龍殿前為玉井綺欄高士傳曰管寧所居井會汲者或男女雜錯或爭井鬥寧乃多買器分置井旁汲以待之唐書曰長慶中長安, SBCK: 倉贍䘏}
