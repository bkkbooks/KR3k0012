  - {type: variant, offset: 2381, length: 818, content: 金井幽明錄曰山陰縣九侯神山上有靈壇壇前有古井常無水及請告神即水涌出供用足乃復漸止潯陽記曰盆城漢灌嬰所築孫權經此城自立摽井令人掘得井銘曰潁陰侯所開三百年當塞不滿百年為當運者所開權忻以為瑞井江中風浪井水輒動豫章記曰厭源山西北余侔村五六里有洪井說云洪崖先生之井蜀都賦曰火井炤熒於幽泉注蜀都有火井欲出其火先將家火投之隆隆如雷聲須庾火出光耀十里以竹筩盛之其光不滅愽物志曰臨邛有火井縱廣五尺深二三丈在縣南百里昔時有竹木投之以取火諸葛丞相往視之後火轉盛熱以盆著井煮鹽得鹽後以燭火投井中即滅迄今不復也盛弘之荊州記隨郡北界有廟鄉村南有重山山下有一村父老相傳云是神農所生村西有重塹內周廻一頃二十畝地中有九井相傳神農既育九井自穿又云汲一井則眾井水動則以地為神農社年常祀之尋陽記龍窟有深泉泉側常見龍曾有人於水邊洗銅椀忽浪起水漲便失椀此人沒水逐取既出復失去後人見龍衘椀在城裏井邊幽明錄曰襄邑縣南有瀨鄉老子廟廟中有九井潔齋入者溫清隨人意念瀨鄉記老子廟中有九井汲一井餘井水並動廣志曰臨邛有粉井得其水汰粉則益光嵩山記少室山有雲母井出雲母洛陽記宮牆西有兩銅井連御溝名曰濛汜羊頭山記衛青破月支月支有井色如酒因名曰酒井又曰東阿城北門有大井深七尺煮之得膠貢之又曰雍丘縣有神井興霧雹享祀不輟又曰盤固山有大井銅人嘗守之五十年一踊水起數十丈銅人每以手掩之即止又曰零浦有鹽井二十四其一出火筩取密閉萬里不滅又曰金龍井西京太極殿上有之金龍負山於上兼金鹿盧山海經曰崑崙山墟在西北帝之下都高百仞面有九井以玉為檻洞冥記珠甜水去虞淵八千里有甜溪水如蜜東方朔遊此水還將數斛以獻帝帝投陰井井遂恒甜而寒洗肉肌理柔滑瑤琨去玉門九萬里有碧草如麥剉之以釀則味如酒而驗烈看之則顏色如醉飲一合則三旬不醒啜甜水則隨飲隨醒又曰長安東七百里有雲山山頭有井雲從中出若土德王則黃雲出火德王則赤雲出水德王則黑雲出金德王則白雲出木德王則青雲出荊州記風井夏則風出冬則風入又曰益陽縣有岡岡上有金井數百尺傳云昔有金人以杖撞地而輒成井, SBCK: 形}
