  - {type: variant, offset: 772, length: 170, content: 張讓劫天子至河掌璽者投璽井中後孫堅討董卓至祀國見井有五色光後浚井得璽吳書曰孫策功曹魏滕有罪譴欲殺之左右憂恐計無所出夫人乃倚大井召策謂曰汝新造江南其事未集方當優賢禮士闡過錄功功曹在公盡規汝今殺之他人明日皆叛汝矣吾不忍見汝禍及當先投此中策大驚遽釋滕罪晉書曰阮瞻嘗群行冒熱渴甚逆旅有井眾人競趣之瞻獨逡巡在後須臾飲者畢乃進其夷退無競如此又曰元帝為晉, SBCK: ''}
