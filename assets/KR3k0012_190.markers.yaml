  - {type: variant, offset: 4054, length: 0, content: '', SBCK: 有細柳倉城東嘉禾倉老子曰田甚蕪倉甚虚管子曰倉廪實知禮節又曰不務地利則倉不􅄹莊子曰諸中國之在海内不似稊米之在太倉乎韓子曰韓昭侯之時黍種貴昭侯令人覆廪吏果竊黍種糶之淮南子曰近敖倉者不爲之多飯期滿腹而巳鹽鐵論曰匈奴因山谷爲城池水草爲倉廪地理志曰敖倉在河南廣武山鄭國所置漢王與頃羽爭天下運敖倉之粟囷西京􅄂記曰曹元理善筭友人陳廣漢有二囷忘其}
