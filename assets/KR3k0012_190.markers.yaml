  - {type: 'tls:seg', offset: 795, content: '', id: KR3k0012_CHANT_190-10a.12}
  - {type: variant, offset: 795, length: 1524, content: 見井有五色光後浚井得璽吳書曰孫策功曹魏滕有罪譴欲殺之左右憂恐計無所出夫人乃倚大井召策謂曰汝新造江南其事未集方當優賢禮士闡過錄功功曹在公盡規汝今殺之他人明日皆叛汝矣吾不忍見汝禍及當先投此中策大驚遽釋滕罪晉書曰阮瞻嘗群行冒熱渴甚逆旅有井眾人競趣之瞻獨逡巡在後須臾飲者畢乃進其夷退無競如此又曰元帝為晉王使郭璞筮遇豫之睽璞曰會稽當出鍾以告成功上有勒銘應在人家井泥中得之繇所謂先王以作樂崇德殷薦之上帝也及帝即位太興初會稽剡縣人果於井中得一鍾長七寸二分口徑四寸半上有古文奇書十八字云會稽岳命餘字時人莫識之璞曰蓋王者之作必有靈符塞天人之心與神物合契然後可以言受命矣梁書曰巴郡忽有地自開成井方六丈深三十二丈帝王世紀曰堯時老人擊壤於路而歌曰鑿井而飲耕田而食帝力於我何有哉南史曰延陵縣季子廟沸井之北忽聞金石聲疑有異鑿深三尺得沸井奔涌若浪其地又響即復鑿之復得一井涌沸亦然井中得一木簡長一尺廣二分上有隱起字曰廬山道人張陵再拜謁簡大堅白字色乃黃魚豢魏略曰明帝九龍殿前為玉井綺欄高士傳曰管寧所居井會汲者或男女雜錯或爭井鬥寧乃多買器分置井旁汲以待之唐書曰長慶中長安主簿鄭翦主役太清宮御院忽於院前西序見一白衣老人云此下有井正直皇帝過路汝速實之不然罪在不測翦惶恐遽領役人視之其處已陷數尺發之則一古井宛然驚顧之際已失老人所在翦以聞上既至宮群臣及供奉官於馬前蹈舞賀有詔命翰林學士韋處厚紀述以表其異孟子曰有為者譬若掘井九軔而不及泉猶為棄井也有為仁義也軔八尺也雖深不及泉喻有為者中道而盡棄前行也莊子曰公孫龍問於魏牟曰龍困百家之智窮眾口之辯以為至達今吾聞莊子之言茫然異之無所開吾喙公子牟笑曰子獨不聞塪井之蛙謂東海之鼈曰吾跳梁乎井幹之上入休乎缺甃之岸赴水則接掖持頤蹶泥則滅足沒跗還虷蟹與科斗莫吾能若也且夫擅一壑之水而跱塪井之樂亦至矣夫子奚不時來入觀乎東海之鼈左足未入而右膝已墊矣於是逡巡而卻告之海若曰夫萬里之遠不足舉其大千仞之高不足極其深禹之時十年九潦而水不為加益湯之時八年七旱而崖不為加損夫不為頃久之推移者此亦東海之大樂於是塪井之蛙聞之適適然驚規規然自失墨子云備城五十步一井范子曰直木先伐甘井先竭孫子兵法曰地多陷曲曰天井墨子云二舍共一井抱朴子內篇曰臨沅縣有寮氏家世老壽後子孫輒夭賤折他人居其故宅復世壽乃知是宅所為不知何故疑井中赤乃掘井左右得古人埋丹砂數十斛丹汁入井是以飲其水而得壽呂氏春秋曰天下之美者崑崙之井又曰宋丁氏無井常一人溉汲於外及自穿井喜而告人吾穿井得一人人傳之者聞於宋君召問其故對曰得一人之使非得一人於井中也說苑曰季桓子穿井得土缶中有羊以問孔子言得狗孔子曰以吾所聞非狗乃羊也木之怪龍罔兩水之怪龍罔象二之怪棼羊也非狗也桓子曰善哉管子曰桓公將與管仲飲十日齋戒掘新井而柴焉注新井以柴蓋覆之取其清潔示敬也葛仙公傳曰仙公取數十錢使一人投井水公從井上呼錢又一一飛從井中出入公器中也桂陽列仙傳曰蘇躭啟母曰有賓客來會躭受性當仙今招耽去違於供養今年多疫竊有此井水飲之可得無恙賣此水過於供養使賓客隨去焉水經注曰華林園䟽圃中有古井悉珉玉為之以繢石為口玉作精密獨不變古粲焉如新異苑曰蘭陵昌慮縣郳城有華山山上有井鳥巢其中金喙黑色而團翅此禽見則大水井又不可窺窺者盈歲輒死又曰廣陵郡東界有黃公塚高墳二所前有一井面廣數尺每旱不竭有於其中得銅釜及罐各一又曰謝晦字宣明宅南路上有古井以元嘉二年汲者忽見三龍甚分明行道住觀莫不嗟異有人入井始知是塼隱起作龍形又曰潯陽曇椿世居長沙宅有古井每夜輒聞有如炮竹聲相承謂為龍吒風俗通曰龐儉父先逃走隨母流宕後居鄉里鑿井得銅生遂溫富後買奴曰堂上者我婦也問其故奴曰我婦姓艾字阿宏足下有黑子腋下有赤志母曰我翁也遂為夫妻時人曰鑿井得銅買奴得翁又曰龐儉鑿井得錢數萬又曰郄子路行飲馬投錢井中續漢禮儀, WYG: ''}
