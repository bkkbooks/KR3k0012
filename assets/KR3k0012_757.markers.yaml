  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_757-1a.2}
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 置楊龍驤洛陽記云鐵鑊合一百八十枚也搜神記曰武帝從南岳著廬江濳霍山之上無水廟有四鑊可受四十斛至􅀕時水輙自滿用之足了事畢即空塵􅁟樹葉莫之汙也積五十歳歳作四􅀕後但作三􅀕一鑊自敗朱崖傳曰朱崖大家有銅鑊多者五三百積以爲貨南越志曰龍川縣營崗北有巨鑊􅁪有懸泉注之終歳不滿嘗有採薪者欲推動之忽然震電迷失路十許日乃至家湘州記曰伍子胥廟中有大銅}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_757-2a}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 置搜神記曰武帝從南岳至廬江濳霍山之上無水廟有四鑊可受四十斛至祭時水輒自滿用之足了事畢即空塵土樹葉草之汙也積五十歳歳作四祭後但作三祭鑊日敗朱崕𫝊曰朱崖大家大銅鑊多者三五百積以為貨南越志曰龍川縣營崗北有巨鑊恒有懸泉注之終嵗不滿甞有採薪者欲推動之忽然震電迷失路十許日乃至家湘州記曰伍子胥廟中有大銅}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_WYG_757-3a, image: WYG0899/WYG0899-0634c.png}
  - {type: variant, offset: 4, length: 0, content: '', krp: 置楊龍驤洛陽記云鐵鑊合一百八十枚也搜神記曰武帝從南岳著廬江濳霍山之上無水廟有四鑊可受四十斛至祭時水輙自滿用之足了事畢即空塵土樹葉莫之汙也積五十歳歳作四祭後但作三祭一鑊自敗朱崖傳曰朱崖大家有銅鑊多者五三百積以爲貨南越志曰龍川縣營崗北有巨鑊恒有懸泉注之終歳不滿嘗有採薪者欲推動之忽然震電迷失路十許日乃至家湘州記曰伍子胥廟中有大銅}
  - {type: variant, offset: 5, length: 2, content: 皿說, SBCK: 元嘉中沙門釋亮啓乞此廟器鑄丈六金像始廟所有大銅鑊可容三百斛許即䧟入地中僧亮夢神語云今捨此器相與發願免此神形殷斌當山記曰魏興反照山上有三公鐵鑊常有數十斛雖大旱而不減長老云有天子女欲來此山愁思而死三公衛送故於此烹之羅浮山記曰有名鑊容千餘斛溢爲瀑布墨子曰守死曰二十五歩一竈竈有鐵鑊容二石以上爲湯釜􅀃}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_757-2b}
