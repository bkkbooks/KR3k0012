  - {type: page-break, offset: 1254, content: '', id: KR3k0012_WYG_757-13a, image: WYG0899/WYG0899-0640c.png}
  - {type: variant, offset: 1255, length: 357, content: 右成公成公乃命莊叔隨難干漢陽即宮于宗周奔走無射啟右獻公獻公乃命成叔纂乃祖服乃考文叔興舊嗜欲作率慶士躬恤衛國其勤公家夙夜不解民咸曰休哉公曰叔舅子女銘若纂乃服悝拜稽首曰對揚以辟之勤大命施于烝彝鼎施猶著也言我將行君之命又刻著於烝祭之彝鼎也又曰崇鼎貫鼎夫子之器崇貫皆國名左傳曰宋華父督殺殤公召莊公于鄭而立之以郜大鼎賂公郜國所造器也四月取郜大鼎于宋納于太廟非禮也臧哀伯諫曰武王克商遷九鼎于洛邑義士猶或非之而況將昭違亂之賂器於太廟其若之何公弗聽又曰楚子伐陸渾之戎遂至于雒定王使王孫蒲勞楚子楚子使問鼎之大小輕重焉對曰在鼎不在鼎昔夏之方有德也遠方圖物貢金九牧鑄鼎象物桀有昏德鼎遷于商商紂暴虐鼎遷于周德之休明雖小重也其姦固昏亂雖大輕也天祚明德有所底止成王定鼎于郟鄏卜世三十卜年七百天所命也周德雖衰天命未改鼎之輕重未可問也又曰魯襄公享, WYG: 𫝊}
