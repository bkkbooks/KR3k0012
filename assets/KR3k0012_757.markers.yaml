  - {type: variant, offset: 105, length: 0, content: '', SBCK: 鬴音輔有足曰鐺齊書曰明帝毎存儉約鑄壊太官元日上壽銀酒鐺尚書令王晏等咸稱盛德蕭頴曹曰朝庭盛禮莫過三元此一路器旣是舊物不足爲侈帝不恱預曲宴銀器蒲席頴曹曰陛下前欲壞酒鐺恐冝移在此器也帝甚慙唐書曰薛大鼎爲滄州太守政化大行百姓利之賈敦頥爲瀛州刺史鄭徳本爲兾州刺史俱有異政時人號曰鎗脚刺史東宫舊事曰皇太子􅀄拜給銅龍頭鎗孝子傳曰陳遵母好食鐺底焦飯孔氏志恠曰有人苦心腹病死後剖視之得銅鐺一枚容數合許疾病部廢門中備云其事述異記日諸葛景之亡後宅上常聞語聲當酤酒還而無温鎗􅀑云􅀸無温鎗那得飲酒即見一銅鎗從空中來續齊諧記日王敬伯夜見一女子命婢取酒須􅁷持一銀酒鎗􅀏林日太原人夜失火欲出銅鎗設得熨斗便大驚怪日異事火未至已􅀍燒失腳梁王筠以服散鎗贈殷鈞别詩日玉鉉布交文}
  - {type: page-break, offset: 105, content: '', id: KR3k0012_SBCK_757-6a}
  - {type: variant, offset: 105, length: 0, content: '', WYG: 鬴有足曰鐺齊書曰明帝每存儉約元日大官上夀帝欲壞銀酒鐺尚書令王晏等咸稱盛徳蕭頴曺曰朝廷盛禮莫過三元此一銀器既是舊物不足為侈帝不悅預曲宴銀器滿席頴曺曰陛下前欲壊酒鐺恐宜移在此器也帝甚慚唐書曰薛大鼎為滄州太守政化大行百姓利之賈敦頤為瀛州刺史鄭徳本為冀州刺史俱有異政時人號曰鎗脚刺史東宫舊事曰皇太子初拜給銅龍頭鎗孝子𫝊曰陳遵母好食鐺底焦飯孔氏志曰昔有人苦心腹病死後剖視之得銅鐺一枚容數合許述異記曰諸葛景亡後宅上常聞語當酤酒還而無鎗鬼云卿無温鎗那得飲酒見一銅鎗從空中来續齊諧記曰王敬伯夜見女子命婢取酒須臾持一銀酒鎗笑林曰太原人夜失火欲出銅鎗誤持熨斗便大驚怪曰異事火未至已被燒失脚梁吳筠以服散鎗贈殷鈞别詩曰玉鉉布交文}
