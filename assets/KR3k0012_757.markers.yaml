  - {type: variant, offset: 75, length: 2, content: 璺音, WYG: 鍑廣雅曰錪鬲鍑鏕鏝鍪􅀢錡釡也埤蒼曰錫䥈小釡也易說卦曰坤為釡詩曰于以湘之維錡及釡又曰誰能烹魚溉之釡鬵左𫝊曰筐筥錡釡之器潢汙行潦之水三禮圖曰釡制度云三斛或曰二斛春秋繁露曰夏求雨曝釡於衍十日史記曰項籍救鉅鹿沈船破釡甑以示必死古史考曰黄帝始造釡甑戰國䇿曰蔡澤入韓魏遇奪釡鬲於途東觀漢記曰梁鴻少孤詣太學受業同房先炊已呼鴻及熱釡炊鴻曰童子不因人熱者也減竈更燃火又曰鄧遵破匈奴得釡鑊二三千枚謝承後漢書曰范丹為莱蕪長遭黨錮有特操閭里歌曰釡中生魚范莱蕪又曰胡郡為淮南太守使羣下閣外炊曝作乾飯閣中不設釡竈又曰頴川尹暹為徐州刺史以小銅釡甑十日一炊後漢書曰王莽納言將軍嚴尤欲據宛伯升乃陳兵誓衆焚積聚破釡甑鼔行而前魏略曰鍾繇為相國作五熟釡鼎範因太子鑄之釡成太子與繇書曰昔有黄三鼎周之九寳咸一體調一味豈若斯釡五味時芳盖鼎之烹餁饗帝養賢今之嘉釡有踰茲美晉諸公讃曰尚書杜預欲為平厎釡謂欲薪火為省黄門郎賈尋於世祖前面折預曰釡之尖下以備沃洗今若平底無以去水預亦不能折也前秦録曰處士張忠隠於山中鑿石為釡容六斗四升河圖曰漢髙祖觀汶水見一黄釡驚却反化為一翁責言劉季何不受河圖莊子曰曾子再仕而心再化曰吾及親仕三釜而心樂後仕三千鍾不洎親吾心悲韓子曰智伯圍襄子於晉陽决晉水以灌之城中巢處懸釡吕氏春秋曰晉文公反國介子推不肯受賞或遇之山中負釡淮南子曰鉛不可以為刀木不可以為釡又曰太王亶父處邠狄人攻之杖策而去百姓釡甑踰梁山而國乎岐淮南萬畢術曰膽鳴取牛膽以圖熱釡扣則鳴矣風俗通曰俗說齊人有空車行魯人有負釡者便持置車中二三百里臨别取釡不相}
