  - {type: variant, offset: 116, length: 0, content: '', WYG: 也嵩髙山記曰壑左右有古人住處銅銚器物猶存衡山記曰有人採藥暮宿石室石室中見一銅銚是煑藥處蠻人聞之取銚還用舉村盡病送返乃已夢書曰夢見得新銚當取好婦也魏武上獻帝表曰臣祖騰有順帝賜器今上四石銅鋗四枚五石銅鋗一枚御物有鈍銀粉銚一枚束晢貧家賦曰執偏隳之漏鋗鑪說文曰鑪方鑪也鏇圜鑪也周禮曰宫人掌王之六寢凡寢之事掃除執燭共鑪炭凡勞事左𫝊曰邪子在門臺臨廷閽以鉼水沃庭邪子望見之怒閽曰夷射姑旋焉命執之弗得兹怒自投於牀廢於爐炭爛遂卒魏略曰孫權上書稱臣稱說天命太祖以權書示外曰是兒欲踞吾著爐火上耶崔豹古今注曰漢成帝顧成廟有二真金鑪拾遺録曰周靈王出於宣昭之臺望東方雲氣蓊鬱俄而有二人乗飛遊之輦上帝酣醉其一人能為霜雪坐者皆噤乃命青金洪鑪青金洪者出青零淵石色皆如紺中有金鑄為大鑪異苑曰龎猗義熙中為宜都太守御人牧馬於野見一銅鍼上焰帶鏁而行持歸以呈猗遂檻盛送下荆州至都北界忽風雨有呌聲光火燭天徑来趨船失鑪所在鹽鐵論曰歐冶能因國君之銅鍼以為金鑪大種而自不能為壺鼎盤盂無其用也桓譚新論曰元帝求方士漢中道人王仲都大暑日使暴坐又環以十鑪不言熱論衡曰當風鼓絃向日燃鑪而天中不為冬夏易氣又曰推無益之能納無補之說似以夏進鑪以冬奏扇賈誼鵩鳥賦曰且夫天地為鑪兮造化為工隂陽為炭兮萬物為銅甑說文曰窐甑空也古史考曰黄帝始作甑方言曰甑自闗而東}
