  - {type: variant, offset: 118, length: 4, content: 笭箵笭郎, SBCK: 銚說文日銚温器也嵩髙山記日岳左右有古人住處銅銚器物猶存衡山記日有人採藥暮宿石室中見一銅銚是煑藥處蠻人聞之取銚還用舉村盡病送返乃己夢書日夢見得新銚鋗取婦好也魏武上獻帝表日臣祖騰有順帝賜器今上四石銅鋗四枚五石銅鋗一枚御物有純銀粉銚一枚束晳貧家賦曰執偏隳之漏鋗鑪􅀃文曰鑪方鑪也鏇似絹反圜鑪也周禮曰宫人掌王之六寢凡寢中之事掃除執燭共鑪炭凡勞事勞事勞䙝之事也左傳曰邾子在門臺臨廷閽以缾水沃庭邾子望見之怒閽曰夷射姑旋焉旋小便也命執之弗得滋怒自投于牀廢廢墮也于鑪炭爛遂卒魏略曰孫權上書稱臣稱􅀃天命太祖以權書示外曰是兒欲路吾著爐炭上耶崔豹古今注曰漢成帝顧成廟有二眞金爐拾遺録曰周靈王出於宣昭之臺望東方雲氣蓊鬱俄而有二人乗飛遊之輦上帝酣其一人能爲霜雪坐者皆噤乃命青金洪鑪青金洪者出青零淵石色皆如紺中有金鑄爲大鑪異􅁐曰龐猗義熈中爲冝都太守御人牧馬於野見一銅鑪上焰帶鏁而行持歸以呈猗遂檻盛送下荆州至郡北界夜忽風雨有呌聲光火燭天徑來趨舡失鑪所在鹽鐵論曰歐冶能因國君之銅鐵以爲金鑪大鍾而自不能爲壷}
