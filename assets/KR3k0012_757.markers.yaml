  body:
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 二鑊釡鬲鐺鎢錥銚鑪甑箄甑帶鑊周禮曰烹人掌供鼎鑊所以煑肉反魚腊之器旣熟乃辱於鼎脣音蒸儀禮曰雍人陳三鼎在羊鑊之西二鼎在豕鑊之西史記曰藺相如謂秦王曰今以􅁗之强而先割十五都與趙趙豈敢留壁而得罪於大王乎臣知欺大王當誅臣請就湯鑊唯大王羣臣熟計議之晉書曰張平自稱豫州刺史樊雅自號譙郡太守元帝皆版爲四品將軍豫州刺史祖逖出屯廬洲遣叅軍殷乂詣平雅乂意輕平視其屋云當持作馬厩見大鑊云欲鑄作鐵器平曰此是帝王大鑊天下定後方當用之奈何打破乂曰卿能保頭而不惜大鑊耶平大怒於坐斬乂阻兵固守歳餘逖攻平殺之而雅據譙城文子曰養魚於沸鑊之中棲鳥於炎鑪之上雖欲其生養理失矣陸機洛陽記曰宫牆外以大鐵鑊盛水以救火鑊受百斛百歩}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_757-1b}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 二鑊釡鬲鐺鎢銚鑪甑箄甑帶鑊周禮云烹人掌供鼎鑊儀禮曰雍人陳三鼎在羊鑊之西二鼎在豕鑊之西史記曰藺相如謂秦王曰今以秦之强而先割十五郡與趙豈敢留璧而得罪於大王乎臣知欺大王當誅臣請就湯鑊唯大王羣臣熟計之晉書曰張平自稱豫州刺史樊雅自號譙郡太守元常皆為四品將軍豫州刺史祖逖出屯廬州遣參軍殷義詣平雅義意輕平視其室云當作馬廐見大鑊云欲鑄作鐵器平曰此是帝王大鑊天下定後方當用之奈何打破義曰卿不能保頭足而惜大鑊耶平大怒於坐斬義阻兵固守嵗餘逖攻平殺之而雅據譙城文子曰養魚於沸鑊之中棲烏於炎鑪之上雖其或生養理失矣陸機洛陽記曰宫牆外有大鐵鑊盛水以救火受百斛百步}
