  - {type: variant, offset: 2485, length: 139, content: 則五鼎烹又曰宣帝時美陽得鼎獻之京兆尹張敞上議曰案鼎有刻書曰王命尸臣官此㧦邑賜爾旂鸞黼黻琱弋李奇曰琱鏤也尸臣拜稽首曰敢對揚天子丕顯休命此鼎殆周之所以褒賜子孫刻銘其先功藏之于宮廟也又曰質氏以洒削而鼎食東觀漢記曰廬江獻鼎詔召鄭眾問齊桓公之鼎在柏寢臺見何書春秋左氏有鼎事幾眾對狀除為郎中, SBCK: 無廻心}
