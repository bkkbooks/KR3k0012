  - {type: variant, offset: 106, length: 4, content: 銀鏤飾器, WYG: 丹煥仙說九沸翻成緩七轉良為切執以代疎麻長貽故人别鎢錥廣雅曰鎢錥之銼􅟋說文曰銼􅟋鍑也纂文曰秦人以鈷䥈為銼􅟋魏畧曰徐晃性嚴驅使將士不得閒息於時軍中為之語曰不得餉屬徐晃晃聞此語笑曰我槌破汝鎢錥耶杜預奏事曰藥杵臼澡槃熨斗釡瓮銚槃鎢錥皆亦民間之急用者也江道表曰昔康皇帝𤣥宫内金烏肓銚廣雅曰鋗}
