  - {type: variant, offset: 1624, length: 411, content: 先吳壽夢之鼎壽夢吳子也獻鼎於魯因以為名又曰晉叔向謂晏子曰然雖吾公室今亦季世也君日不悛以樂慆憂公室之卑其何日之有讒鼎之銘曰昧旦丕顯後世猶怠讒鼎鼎銘也況日不悛其能久乎又曰楚薳啟彊曰是以聖王朝聘有珪享覜他弔切有璋宴有好貨飧有陪鼎飧饔飧也熟食為飧陪加也加鼎所以厚殷勤之又曰鄭人鑄刑書鑄刑書於鼎以為國之常法又曰宋正考父佐戴武宣三命茲益恭故其鼎銘云鼎正考父之廟鼎也一命而僂再命而傴三命而俯循墻而走亦莫余敢侮饘於是粥於是以餬余口又曰鄭子產聘于晉晉侯有疾韓宣子逆客私焉曰寡君寢疾於今三日矣並走群望有加而無瘳今夢黃熊入於寢門其何厲鬼也對曰昔堯殛鯀于羽山其神化為黃熊以入羽淵實為夏郊三代祀之晉為盟主其或未之祀也乎韓子祀夏郊晉侯有間賜子產莒之二方鼎方鼎莒所貢又曰楚子次於乾谿僕析父從右尹子革夕王語曰昔我先王熊繹與呂仍王孫牟爕父禽父並事康王四國皆有分器我獨無有今吾使人於周求鼎以為分器王其與我乎對曰與君王哉今周與四國服事君王將唯命是聽豈其愛鼎又曰, SBCK: 陘}
