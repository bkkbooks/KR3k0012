  - {type: variant, offset: 201, length: 886, content: 月其器高以粗孟秋之月其器廉以深孟冬之月其器閎以掩又曰侍食於君君賜餘器之溉者不寫陶淬之器其餘皆寫雚行之器又曰作奇巧之器以疑眾殺宗廟之器不鬻於市錦文珠玉成器不鬻於市又曰玉不琢不成器人不學不知道論語曰工欲善其事必先利其器史記曰舜陶於河濱器不苦窳以主切舜作什器於壽丘又曰通邑大都木器髹者千伏徐廣曰髹音休漆也漢書曰木器千伏銅器千鈞素木鐵器千石此亦千乘之家也又曰武帝有故銅器李少君曰此器齊桓公十年陳於柏寢案其刻果然漢書曰賈誼言夫天下大器也今人之置器置諸安處則安置諸危處則危天下之情與器無以異在天子之所置之又曰里諺曰欲投鼠而忌器此善諭也鼠近於器尚憚不投恐傷其器況於臣之近主乎又曰罽賓國以金銀銅錫為器續漢書曰桓帝祠老子於濯龍用淳金釭器魏氏春秋曰武王過故人呂伯奢家聞其動食器之聲疑其圖己是夜手劍殺八人後魏書曰獠鑄銅為器大口寬腹名曰銅既薄且輕易於熟食晉令曰欲作漆器物賣者各先移主吏者名乃得作皆當淳漆著布器器成以朱題年月姓名車頻秦書曰符堅建元十八年新平縣民耕地獲玉器初有金彫者頗知圖記王猛以為左道勸堅誅之彫臨死表堅曰新平地古顓頊墟其故有白鷄閭記言此里應出古帝王寶至是果得之家語曰孔子觀於魯桓公之廟有欹器焉孔子問於守廟者曰此為何器曰此蓋宥坐之器孔子曰吾聞宥坐之器者虛則欹中則正滿則覆顧謂弟子曰試注水焉即挹水而注之中而正滿而覆虛而欹孔子喟然而歎曰鳴呼物焉有滿而不覆者乎老子曰埏埴以為器當其無有器之用韓子曰堯有天下飯於土軌飲於土鉶舜作食器斬山木而材之削踞脩其跡流漆墨其上諸侯以為益侈國之下伏者十三禹作為祭器黑漆其外朱畫其內觴酌有采而樽俎有飾殷人食器彫琢觴酌刻鏤淮南子曰崑崙旁有九井玉橫橫或作彭器名也受不死藥世說曰晉武帝嘗際王武子供饌悉用琉璃器涼州異物志曰方外殊珍車渠馬瑙器無常形為時之寶隨其大小以作盂椀杯槃也視之目眩希世之巧羅剎所作非人所造羅利鬼遠外國巧成器物與人交市非人能所造地鏡圖曰銅器之屬見其狀如望馬煇煇然齊器之見為牛楚器之見為馬越器之見為蝦蟆宋器之見為白狗秦器之見為豚燕器之見為豕揚雄蜀都賦曰彫鐫釦器百伎千工魏武內誡令曰孤有逆氣病常儲水臥頭以銅器盛臭惡前以銀作小方器人不解謂孤喜銀物令以木作鼎, WYG: 酢􅿰}
