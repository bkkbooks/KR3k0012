  - {type: variant, offset: 2628, length: 1, content: 孝, SBCK: 范史雲爲萊蕪長時人歌曰甑中生塵范史雲􅀽山松後漢書曰荀淑與陳寔神交棄官常命駕相就令元方侍側季方作食甞一朝食遟季方跪曰向聞大人與荀君言甚善竊聽之甑壞飯縻寔曰汝聽談解乎荅曰解令􅀃之不誤一言公恱韓詩外傳曰舜甑無羶淮南子曰粟得濕而熯音罕甑得火而液白虎通曰王者德至山陵丹甑見京房易逆刺曰天雨釜甑歳一熟益部􅂄舊傳曰任文公知有王莽之變悉賣竒物唯存銅甑蓑笠郭林宗别傳曰鉅鹿孟敏容居太原林宗見而問之對曰甑巳破矣視之無益林宗以其分決勸使學果爲美士郭文傳曰文以竹爲甑録異傳曰隆安中呉縣張君林忽有􅀑來助其驅使林家甑破無可用􅀑乃撞盆底穿以充甑錢塘記曰石姥莫􅀘切山有甑大數十圍下有三石支足一人摇之輙動縱使千百人引之與一人不異離騷曰珪璋􅄂於甑窐窐士甑孔也箄􅀃文曰箄蔽也所以蔽甑底也淮南子曰}
  - {type: page-break, offset: 2628, content: '', id: KR3k0012_SBCK_757-9a}
  - {type: variant, offset: 2628, length: 1, content: 孝, WYG: 范史雲為莱蕪長時人歌曰甑中生塵范史雲袁山松後漢書曰荀淑與陳寔相善常命駕相就令元方侍側季方作食甞一朝食荀季方跪曰向聞大人與荀君言善竊聴之甑壊飯縻寔曰汝聽談解乎荅曰解令說之不誤一言公說淮南子曰粟得濕而熯甑得火而液白虎通曰王者徳至山林丹甑見京房易逆刺曰天雨釡甑嵗一熟益部耆舊𫝊曰任文公有莽之變悉賣竒物維存銅甑蓑笠郭林宗别𫝊曰鉅鹿孟敏客居太原墮甑不顧林宗見而問之對曰甑已破矣視之無益林宗勸使學果為美士郭文𫝊曰文以竹為甑録異𫝊曰隆安中呉縣張君林忽有鬼来其家取林甑使破無何鬼乃撞盆厎穿以充甑錢塘記曰石姥山有甑大數十圍有三十六足一人揺之輙動縱使千百人引之與一人不異離騷曰珪璋雜於甑窐箄說文曰箄蔽也所以蔽甑底也淮南子曰}
