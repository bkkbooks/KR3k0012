  - {type: variant, offset: 79, length: 1, content: 楚, SBCK: 蠻獠民格曰諸告言伯叔外祖父母裴淵廣州記曰東官郡煑鹽織竹爲釡以牡蠣屑泥之燒用七夕一易異苑曰長山朱郭夫妻􅁪採藻澗濵見二銅釡㳂流而下取之而歸有圎蓋滿中銅器光輝輝目自然作聲郭懼運著北山埋之而後賣釡與人主載出爲貨舡無故自覆失釡所在又曰薛願家有虹飲釡中水盡以酒灌之便吐金滿釡而願因之豐富離騷曰黄鍾毀棄瓦釡雷鳴鬲音曆爾雅曰鼎疑足者謂之鬲郭璞曰曲脚也或曰疑定也犍爲舎人曰鼎足相去䟽曰鬲方言曰鍑或謂之鏤呉揚}
