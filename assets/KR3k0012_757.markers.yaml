  - {type: variant, offset: 78, length: 0, content: '', SBCK: 爲誰亦不謝後車家繫獄當死釡不相問爲誰主徑徃募人取之穿壁未逹車者怒不肯出釡主慙欲俱死明日主者以事白齊君義而原之魏子曰鼎以爲希出而丗貴之釡鬲常用而丗輕之兵書曰􅀄出軍行日三炊釡不得覆覆釡軍敗物理論曰堯丗洪水民登木而栖懸釡而㸑茅君内傳曰欲合九轉先作神釡郭文傳曰文以石爲釡婁承先別傳曰昔山越民反所過殘毀望婁氏之里徃中庭顧見釡甑尚省於竈曰恐他逺宼取之仍爲取洗沈著井中而去婁家後還皆盡得之朱崖傳曰朱崖俗多用􅁟釜}
  - {type: page-break, offset: 78, content: '', id: KR3k0012_SBCK_757-4b}
  - {type: variant, offset: 78, length: 2, content: 南楚, WYG: 為誰亦不謝後車家擊獄當死釡主徑往募人取之穿壁未達車者怒不肯出釡主慙欲俱死明日主者以事白齊君義而原之魏子曰鼎以為希出而世貴之釡鬲常用而世輕之兵書曰初出軍行三炊釡不得覆覆釡軍敗物理論曰堯世洪水民登木而栖懸釡而爨茅君内𫝊曰欲合九轉先作神釡婁承先别𫝊曰西山越民反所過殘毁至婁氏之家往中庭顧見釡甑尚著於竈曰恐他方寇取之仍為取洗沈於井中而去婁家後還皆盡得之裴淵廣州記曰東官郡煮鹽織竹為釡以牡蠣屑泥之燒用七夕一易異苑曰長山朱郭夫妻採藻澗濱見二銅釡沿流而下取之而歸有圓盖滿中銅器光輝曜目自然作聲郭懼運著北山埋之而後賣釡與人方載出為貨船無故自覆失釡所在又曰薛願家有虹飲釡中水盡以酒灌之便吐金滿釡而願因之豐富離騷曰黄鍾毁棄瓦釡雷鳴鬲爾雅曰鼎空足者謂之鬲方言鑊或謂之鏤吴楊}
