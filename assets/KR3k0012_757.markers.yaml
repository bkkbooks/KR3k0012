  - {type: variant, offset: 2045, length: 1, content: 甲, SBCK: 紀}
  - {type: variant, offset: 2045, length: 290, content: 甲父之鼎甲父古國名也又曰晉趙鞅荀寅率師城汝濱遂賦晉國一鼓鐵以鑄刑鼎刑書之鼎著范宣子所為刑書焉穀梁傳曰桓公二年夏四月取郜大鼎于宋戊申納于太廟郜鼎者郜之所為也孔子曰器從邑名從主人故曰郜大鼎史記曰黃帝採首山銅鑄鼎於荊山下鼎既成有龍垂胡髯下迎黃帝又曰伊尹欲干湯而無由乃為有莘氏媵臣負鼎俎以滋味說湯致於王道又曰周末有九鼎徙秦氏曰太丘社亡而鼎沒于泗水彭城下其後百一十五年而秦兼天下始皇二十八年過彭城齋戒禱祀欲出周鼎使千人沒水求之不得又曰秦武王與孟說舉龍文之鼎絕臏而死又曰孝文帝時新垣平言周鼎亡在泗水中今河溢通泗臣望東北汾陰直有金寶氣意周鼎其出乎兆見不迎則不至於是上使使治廟汾陰南臨河欲祠出周鼎, WYG: 紀甗}
