  - {type: variant, offset: 118, length: 73, content: 笭箵笭郎鼎切箵桑鼎切竹器邊緣曰匴先管切書曰遟任有言曰人惟求舊器非求舊惟新言人貴舊器貴新又曰武王既勝殷邦諸侯班宗彝作分器賦宗廟彝器酒鐏賜諸侯禮曰孟春, WYG: 甗或謂}
