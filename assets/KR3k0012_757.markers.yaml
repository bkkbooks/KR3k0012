  - {type: variant, offset: 2630, length: 2, content: 帝永, SBCK: 鏡可鑑形蒸食不如竹箄裴􅀇論云尹氏鏡蒸食不如三錢竹箄夢書曰夢見新箄婦女憙孔融同歲論曰弊箄徑尺不足以救鹽池之鹹甑帶淮南子曰琬琰之玉汗􅅺土之中雖廉者弗釋琬琰美玉釋捨也弊箄甑瓾在旃茵之上雖貪者不􅅮瓾甑帶也􅅮取也瓾讀鼃黾之也美之所在雖汙辱丗不能賤惡之所在雖髙隆丗不能貴夢書曰夢見甑欲娶婦夢見甑帶煤灼來太}
