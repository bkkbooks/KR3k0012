  - {type: variant, offset: 1485, length: 0, content: '', krp: 屯西河美稷美稷縣名衛護南單于聽置司馬從事牧守謁敬同之將軍勑嚴過武庫祭蚩尤武庫掌兵器令一人秩六百石前書音義曰蚩尤古夫子好五兵故合祭之見髙祖紀過帝親御阿閣阿曲觀其士衆時人榮之又曰馬成拜楊武將軍督誅虜將軍劉隆振威將軍宋登射聲校尉王賞發㑹稽丹陽九江六安四郡兵擊李憲時帝幸夀春設壇埸祖禮遣之又曰涼部叛羌揺蕩四州朝廷憂之於是詔鄧騭將左右羽林北軍五校士及諸部兵擊之車駕幸平樂餞近又曰馬援出師詔百官祖道又曰光武籌赤眉必破長安欲乗舋并入關中而方自事山東未知所寄}
