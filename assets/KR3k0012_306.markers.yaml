  - {type: variant, offset: 1655, length: 495, content: 之不恭卑梁人怒殺而去之吳人往報之盡屠其家卑梁公怒曰吳人焉敢攻吾邑舉兵反攻之老弱盡殺之吳王夷昧聞之怒使人舉兵侵楚邊邑堯夷而復去之吳公子光又率師與楚人戰於雞父大敗之獲其師又曰荊莊王欲伐陳使人視之使者曰陳不可伐也莊公曰何故對曰城郭高溝洫深畜積多也寧國曰陳可伐也寧國楚臣夫陳小國也而畜積多賦斂重也則民怨上矣城郭高溝洫深則民力罷矣興兵伐之陳可取也莊王聽之遂取陳又曰箴尹為荊使於宋司城子罕觴之西家之潦經其庭而不禁箴尹問其故曰西家高吾宮卑潦不經吾庭不得寫為是吾不禁也箴尹歸適遇荊欲攻宋箴尹諫於王曰宋不可攻也其君賢相仁賢者得民仁者能用之攻之必無功也淮南子曰堯時十日並出焦禾稼殺草木民人無食羿窳九嬰大風封豕鑿齒脩虵皆為害堯乃使羿誅鑿齒於疇華之澤南地也殺九嬰於水凶水火之怪在北狄之地繳大風於青立之野大風鷙鳥也射十日而下其九日殺羿窳狀如龍首食人在西方也斷脩虵於洞庭在南方擒封豕於桑林封豕大彘也桑林湯禱旱地又曰晉伐楚三舍不止大夫擊之莊王曰先君之時晉不伐楚及孤之身而晉伐楚是孤之過也若何其辱群大夫曰先臣之時晉不伐楚今臣之身而晉伐楚此臣之罪也請擊之王俛而泣涕沾襟起而拜群大夫晉人聞之曰君臣爭以過為在己不可伐也夜還師而歸, WYG: 變}
