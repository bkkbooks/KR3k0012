  - {type: variant, offset: 1401, length: 1, content: 國, WYG: 甥姪及僮使僅二百人每以自隨臨入敵輙分其隊為四五隨逐水草每日各}
  - {type: variant, offset: 1401, length: 1, content: 國, krp: 甥姪及僮使僅二百人每以自隨臨入敵輙分其隊爲四五隨逐水草毎數日各}
  - {type: variant, offset: 1404, length: 0, content: '', SBCK: 知及相遇巳皆有獲虜矣三國典略曰北齊乎廣陵王孝珩曰奈何嗣君無獨見之明宰相非柱石之􅀉内叅羣竪離間骨肉恨不得握兵符受廟筭出萬死身先士卒展我力耳又曰齊主曰今日飲酒樂哉武衛將軍斛光進曰􅀜西未平人爲仇敵陛下亦何樂哉㑹當馬歩十萬三道渡由平道䧟玉璧拔長安自􅀲涼色來納在掌握使百官襲冠冕軍士釋介胄然後稱樂齊主謂羣臣曰明月常有此意憂國如家卿輩無及之者平原王叚韶出謂光曰卿勝先帝耶先帝以四十萬攻玉璧不利而還將兵如盤擎水誤即傾覆何容易而輕言之光􅀏曰非卿所知出師易曰師出以律失律凶也書曰張皇六師肅將天威兼弱攻昧推亡固存無作神羞詩曰維師尚父時維鷹揚禮記曰師出不踰時爲怨思也踰時即内有怨女外有曠夫又曰天子將出}
  - {type: page-break, offset: 1404, content: '', id: KR3k0012_SBCK_306-3a}
  - {type: page-break, offset: 1404, content: '', id: KR3k0012_SBCK_306-3b}
  - {type: variant, offset: 1404, length: 0, content: '', WYG: 知及相遇已皆有獲虜矣三國典畧曰北齊平廣陵王孝珩曰奈何嗣君無獨見之明宰相非柱國之寄内參羣奸離間骨肉恨不得握兵符受廟算出萬死先士卒展我力耳又曰齊主曰今日飲酒樂哉武衛將軍斛律光進曰關西未平人為仇敵陛下亦何樂哉㑹當馬歩十萬三道渡由平道陷玉壁收長安自𤓰凉一帶悉在掌握使百官襲冠冕軍士釋介胄然後稱樂齊王謂羣臣曰明日當有此意憂國如家卿輩無及之者平原叚王昭出謂光曰卿勝先帝耶先帝以四十萬攻玉壁不利而還將兵如盤擎水誤即傾覆何容易而輕言之光笑曰非卿所知出師易曰出師以律失律凶也書曰張皇六師肅將天威兼弱攻昧推亡固存無作神羞詩曰維師尚父時維鷹揚禮記曰師出不踰時為怨思也踰時即内有怨女外有曠夫又曰天子將出}
