  - {type: variant, offset: 1512, length: 1, content: 蜀, krp: 陵惠正辭以不堪舉天門郡守胡僧祐以自代王以爲武猛將軍令其進發僧祐謂其子玘曰汝可開兩髙門一朱一白吾當以死決之不捷不歸也王聞而壯之厚撫其家謂僧祐曰景便於陸道不閑水鬪賊若水戰但以大艦臨之自當必克若其歩戰自可鼓棹直就巴丘不湏交鋒又曰周遣常山郡公子謹率中山公宇文護大將軍楊忠等歩騎五萬南伐太祖餞於青泥谷時庾信來聘未返太祖問之曰我遣此兵馬縛取湘東關西作博士卿以爲得不信曰必得之後王勿以爲不忠太祖笑而頷之白虎通曰王者之伐所以皮弁素幘何服皮弁素幘也王者將出辭於禰還假禰祖言辭反之禮尊親之義王制曰王者將出類于上帝冝于社造于禰尚書曰歸假于蓻祖出以告天至告祖也先告廟後告天者示不敢留尊者之命也吿天何示不敢專也非出辭反面道也與宗廟異義還不復吿天者天道質無内外故不復吿也尚書言歸假于祖社不見告天知不告也又曰遣將軍必於廟何示不敢自專獨於祖廟何制法度者祖也王制曰受命于祖受成于學此言於祖廟命遣之也摯虞決疑要注曰古者帝王出征以齊車載遷廟之主及社主以行故尚書甘誓曰用命賞于祖不用命戮于社秦漢及魏行不載王也衛公兵法曰諸大將出征且約授兵二萬人而即分爲七軍如或多或少臨時更定大率十分之中以三分爲竒兵太白隂經曰參七星伐三星連體十星爲十將西方白虎宿也主殺伐此星出而天下秋草木摇落有若軍威故兵岀而法焉張平子南都賦曰爾其則有謀臣武將皆能獲戾執猛破堅摧剛虞子陽霍將軍}
  - {type: punctuation, offset: 1513, content: ，, id: KR3k0012_CHANT_306-bkkpn431}
  - {type: 'tls:seg', offset: 1513, content: '', id: KR3k0012_CHANT_306-14a.12}
  - {type: variant, offset: 1514, length: 4, content: 迫齊晉令, SBCK: 伐詩曰擁旄爲漢將汗馬出長城魏明帝善哉}
  - {type: variant, offset: 1514, length: 2, content: 迫齊, krp: 伐詩曰擁旄爲漢將汗馬出長城魏明帝善哉行曰我祖我征伐𬒳蠻虜練師簡卒爰整其旅輕舟竟川傍江依浦桓桓猛毅如熊如虎發桴若雷吐氣成雨旌旄指麾進退合矩軍行禮記曰軍行在青龍而右白虎前朱雀而後玄武招摇在上急繕其怒前有水則載青旌前有車騎則載飛鴻前有塵埃則載鳴鳶左傳曰凡師出一宿爲舎再宿爲信過信爲次後魏書曰于栗磾太宗南臨孟津請衆磾曰可作橋乎對曰杜預造橋遺事可相乃編次大舡搆橋於野坂六軍旣濟太宗深歎焉隋書曰煬帝征髙麗宇文述爲扶餘道將軍臨發帝謂述曰禮七十者行役以婦人從公冝以家累自隨古稱婦人不入軍臨戰時耳至於營壘之間無所傷也項籍虞姬即其故事唐書曰太宗率衆平汾}
  - {type: punctuation, offset: 1517, content: ，, id: KR3k0012_CHANT_306-bkkpn432}
  - {type: 'tls:seg', offset: 1517, content: '', id: KR3k0012_CHANT_306-14a.13}
  - {type: variant, offset: 1517, length: 1, content: 令, krp: 趨龍門闕履冰而渡進屯柏璧白虎通曰王法年四十受兵法何重不絶人丗也師}
  - {type: variant, offset: 1519, length: 1, content: 中, SBCK: 曰我祖我征伐􅀍蠻虜練師簡卒爰整其旅輕舟竟川傍江依浦􅁊􅁊猛毅如熊如虎發桴􅀂雷吐氣成􅀨旌旄指麾進退合矩軍行禮記曰軍行在青龍而右白虎前朱雀而後􅀇武招摇在上急繕其怒前有水則載青旌前有車騎則載飛鴻前有塵埃則載鳴鳶左傳曰凡師出一􅀫爲舎再􅀫爲信過信爲次後魏書曰于栗磾太宗南臨孟津請衆磾曰可作橋乎對曰杜預造橋遺事可相乃編次大舡搆橋於野坂六軍旣濟太宗􅀷歎焉隋書曰煬帝征髙麗宇文述爲扶餘道將軍臨發帝謂述曰禮七十者行役以婦人從公冝以家累自隨古稱婦人不入軍臨戰時耳至於營壘之間無所傷也項籍虞􅁎即其故事唐書曰太宗率衆平汾􅀳趨龍門闕履冰而渡進屯柏璧白虎通曰王法年四十受兵法何重不絶人丗也師行不必反戰不必勝故湏其有丗也年六十歸者何不忍並門人父子也孫子曰凡用兵之法馳車千乗輕車也駕駟千乗也革車千乗重車也言萬􅀐之重也一車駕四卒十􅀐一重養一人主炊冡子一人主保}
  - {type: page-break, offset: 1519, content: '', id: KR3k0012_SBCK_306-7a}
  - {type: variant, offset: 1519, length: 1, content: 中, WYG: 不必反戰不必勝故須其有世嗣年六十歸兵者何不忍並鬭人父子也孫子曰凡用兵之法馳車千乘輕車也駕馳千乘也革車千乘重車也言萬乘之重也一車駕四卒十竒一重養二人主炊家子一人主保}
