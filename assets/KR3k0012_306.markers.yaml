  - {type: variant, offset: 1614, length: 2, content: 邊邑, krp: 上山無登遂也此處山谷之軍也絶水必逺水引敵使渡客絶水而來迎之於水内令之半渡而擊之利欲戰無附於水而迎於客也視在處髙水上亦當處其髙也無迎水流恐漑我也處水上之軍也絶斥澤唯亟去無流交軍於斥澤之中必依水草而倍衆樹不得巳與敵戰而㑹斥澤之中此處斥澤之軍也平陸處易車之利也而左右倍髙前死後生戰便此處平陸之軍也凡四軍之利黄帝所以勝四帝者也黄帝始立四方諸侯亦稱帝以此四地勝之也凡軍喜鬲而惡下貴陽而賤隂喜一作好山南}
