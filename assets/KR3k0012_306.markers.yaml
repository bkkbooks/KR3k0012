  - {type: variant, offset: 11, length: 4, content: 趙簡子舉, SBCK: 勇哉史記曰終軍請願受長纓必覊南越王而致之闕下又曰單于爲書慢罵太后樊噲曰臣願得十萬衆横行匈奴中季布曰髙皇帝以三十萬困於平城噲亦在其中且􅁗以事胡陳勝等起後漢書曰劉尚擊武陵五溪蠻􅀷入軍􅃿援因復請行時年六十二帝恐其老未許之援自請曰臣尚能􅀍甲上馬帝令試之援據鞍顧盻以示可用􅀏曰矍鑠哉是翁也矍鑠勇皃也東􅀚記作矍哉是翁矍音許約反遂遣援援馬援也又曰更始郾王尹尊及諸大將在南方未降者尚多帝召諸將議}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_SBCK_306-1b}
  - {type: variant, offset: 11, length: 4, content: 趙簡子舉, WYG: 勇哉史記曰終軍請願受長纓必羈南越王而致之闕下又曰單于嘗為書嫚太后樊噲曰臣願得十萬衆横行匃奴中季布曰髙皇帝將}
  - {type: variant, offset: 11, length: 4, content: 趙簡子舉, krp: 勇哉史記曰終軍請願受長纓必覊南越王而致之闕下又曰單于爲書慢罵太后樊噲曰臣願得十萬衆横行匈奴中季布曰髙皇帝以三十萬困於平城噲亦在其中且秦以事胡陳勝等起後漢書曰劉尚擊武陵五溪蠻深入軍沒援因復請行時年六十二帝恐其老未許之援自請曰臣尚能𬒳甲上馬帝令試之援據鞍顧盻以示可用笑曰矍鑠哉是翁也矍鑠勇皃也東觀記作矍哉是翁矍音許約反遂遣援援馬援也又曰更始郾王尹尊及諸大將在南方未降者尚多帝召諸將議}
