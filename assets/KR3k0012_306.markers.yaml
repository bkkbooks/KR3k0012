  - {type: variant, offset: 1487, length: 0, content: '', WYG: 武猛將軍令其進發僧佑謂其子玘曰汝可以膏塗門一朱一白吾當以死决之不捷不歸也王聞而壯之厚撫其家謂僧佑曰景便於陸道不嫻水鬭賊若水戰但以大艦臨之自當必克若其歩戰自可鼔棹直就巴丘不須交鋒又曰周遣常山郡公于謹率中山公宇文護大將軍楊志等歩騎五萬南伐太祖餞於青泥谷時庾信來聘未返太祖問之曰我遣此兵馬縛取湘東關西作博士卿以為得不信曰必得之後王勿為不忠太祖笑而頷之白虎通曰王者征伐所以必皮弁素幘何伐者凶事素服示有悽愴也王者將出辭於禰還假祖禰者言子辭面之禮尊親之義也王制曰王者將出類於上帝宜于社造于禰尚書曰歸假于藝祖出以告天至告祖先吿廟後告天者示不敢留尊者之命也告天何示不敢自專非出辭反面之道也與宗廟異義還不復告天者天道質無内外故不復吿也尚書言歸假于祖禰不見告天知不告也又曰遣將軍必於廟何制法度者祖也王制曰受命于祖受成于學此言於祖廟命遣之也摯虞决疑要注曰古者帝王出征伐以齊車載遷廟之主及社主以行故尚書甘誓曰用命賞于祖不用命戮於社秦漢及魏行不載主也衛公兵法曰諸大將出征且約舉兵二萬人而即分為七軍如或多或少臨時更定大率十分之中以三分為竒兵太白隂經曰參七星伐三壘連體十星為十將西方白虎宿也主殺伐此星出而天下秋草木揺落有若軍威故兵出而法焉張平子南都賦曰爾其則有謀臣武將皆能攫戾執猛破堅摧剛虞子陽霍將軍北伐詩曰擁旄為漢將汗馬出長城魏明帝善哉行曰我徂我征伐彼蠻虜練師簡卒爰整其旅輕舟竟川傍依於浦桓桓猛毅如熊如虎發桴若雷吐氣成雨旌旄指麾進退合矩軍行禮記曰}
