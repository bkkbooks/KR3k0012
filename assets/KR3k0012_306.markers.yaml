  - {type: variant, offset: 1625, length: 2, content: 邊邑, SBCK: 戰之便也此兵之利而地之助也故用兵之法髙陵勿向也敵若據山􅁜依附險阻陳待敵勿輕攻趣也旣地􅀔不便有損石之衝也背丘勿迎敵背丘陵爲陣無有後患則當引置平地勿迎而擊之又曰上雨水水沬至欲渡者待其定恐半渡而水便漲也絶磵過天井天牢天羅天䧟天郄去逆切大害必亟之勿近也山也深大爲絶澗四方高中央下爲天井深水所居朦朧者爲天牢四維絶人者爲天羅地形䧟者爲天䧟山澗夾地深數尺長數尺者謂之天郄也吾逺之敵近之吾迎之敵倍之也用兵常遠六害令敵近倍則利敵凶軍旁有險阻蔣潢井生葭葦小林翳薈烏㑹反者必謹覆索之此伏姦之所藏}
  - {type: variant, offset: 1625, length: 2, content: 邊邑, WYG: 便也此兵之利而地之助也故用兵之法髙陵勿向也敵若據山林以附險阻陳待敵陳勿攻趣之因地勢不便有損之衡也背丘勿迎敵背丘陵為陣無有後患則當隠之乎現勿迎而擊之又曰上雨水沫至欲涉者待其定也恐半渡而水便溺也絶澗過天井天牢天羅天陷天郄大害必亟之勿近也山峻水深為絶澗四方高中央下為天井深水所居朦胞者為天羅陂陁泥濘車騎滅没者為天陷澗夾道深數丈長尺者謂之天郄矣吾逺之敵近之吾迎之敵背之也用兵長逺六害令敵近信則利敵也凶軍旁有險阻薄漢并生葭葦小林翳薈烏㑹反者必謹覆索之此伏奸之藏}
