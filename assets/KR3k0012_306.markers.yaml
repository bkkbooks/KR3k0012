  - {type: variant, offset: 781, length: 592, content: 七年伐紆大起九師東至于九江比黿以為梁春秋後秦語曰陳軫為楚使來見秦惠王曰卞莊子方刺獸而管豎子止之曰兩獸方食牛牛必甘甘必爭爭必鬥鬥則大者傷小者死從傷而刺之一舉必有雙獸之功卞莊子以為然立待之頃有兩獸之功今韓魏相攻朞年不解是必大國傷小國亡從傷而伐之一舉必有兩實此猶卞莊子刺虎之類也惠王曰善又楚語曰白起將兵伐楚楚人黃歇者遊學愽聞襄王以為辯故使於秦說昭王曰天下莫強於秦楚今聞大王欲伐楚此猶兩虎相與鬥而怒犬受其弊不如善楚秦王乃止不伐楚約為與國黃歇受約而歸又趙語曰張孟談陰見韓魏之君曰臣聞脣亡者齒寒今智伯率二君而伐趙趙亡矣趙亡則二君為之次二君曰我知其然吳越春秋曰夫差令於邦中曰寡人欲伐齊敢有諫者死太子友請朝時懷丸挾彈從後園而來衣沾履濡吳王夫差怪而問之太子友對曰臣遊後園聞秋蟬之鳴往而觀之秋蟬登高樹飲清露悲吟以為安不知螳蜋超枝緣條曳腰舉刃欲援其形也螳蜋貪心時進志在有利不知黃雀緣茂林徘徊枝葉欲啄螳蜋也夫黃雀知伺螳蜋之有味不知臣躊躇引彈蜚丸之集其背也又曰越王勾踐請大夫種曰孤聞吳王淫而好色因此而壞其謀可也大夫種曰可唯君王選擇美女二人而進之於是越王曰善哉乃使相工索國中得苧羅山賣薪之女名西施鄭旦而獻於吳又曰越王念吳欲復承之乃中夜抱柱而哭訖復承之以嘯於是群臣咸曰君王何愁心之甚夫復讎謀敵非君王之憂自臣下急務也又曰吳王闔閭將伐楚登臺向風而嘯有頃而歎群臣莫有曉王意者子胥乃薦孫子孫子者吳人也名武善為兵法僻隱幽居世, SBCK: 餘日}
