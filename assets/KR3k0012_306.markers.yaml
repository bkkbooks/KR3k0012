  - {type: variant, offset: 1414, length: 3, content: 伐仇繇, SBCK: 興兵造於先祖􅀕也􅂖梁曰甲午治兵出曰治兵習戰入曰振旅習戰也後漢書曰光武起王莽徴天下能爲兵法者六十三家數百人並以爲軍吏選練武衛招募猛士􅀃文云慕廣求也旌旗輜重千里不絶時有長人巨無霸王莽連率韓慱上言有竒士長一丈大十圍自謂巨無霸出於蓬萊東南五城西北昭如海濵軺車不能載三馬不能勝卧則枕鼔以鐵箸食見前書長一丈大十圍以爲壘尉鄭􅀇注周禮六軍壁三壘崔瑗中壘校尉箴曰堂堂皇帝設爲壘尉尉者主壘壁}
