  - {type: variant, offset: 1485, length: 0, content: '', SBCK: 屯西河美稷美稷縣名衛護南單于聽置司馬從事牧守謁敬同之將軍勑嚴過武庫􅀕􅃖尤武庫掌兵器令一人秩六百石前書音義曰􅃖尤古夫子好五兵故合􅀕之見髙祖紀過帝親御阿閣阿曲觀其士衆時人榮之又曰馬成拜楊武將軍督誅虜將軍劉隆振威將軍宋登射聲校尉王賞發㑹稽丹陽九江六安四郡兵擊李憲時帝幸夀春設壇􅂣祖禮遣之又曰涼部叛羌揺蕩四州朝廷憂之於是詔鄧騭將左右羽林北軍五校士及諸部兵擊之車駕幸平樂餞近又曰馬援出師詔百官祖道又曰光武籌赤眉必破長安欲乗舋并入關中而方自事山東未知所􅀉}
  - {type: page-break, offset: 1485, content: '', id: KR3k0012_SBCK_306-4b}
  - {type: variant, offset: 1485, length: 0, content: '', WYG: 屯西河美稷美稷縣名衛護南單于聽置司馬從事牧守謁敬同之將軍勅嚴過武庫祭蚩尤武庫掌兵器令一人秩六百石前書音義曰蚩尤古天子好五兵故今祭之帝親御阿閣阿曲也觀其士衆時人榮之又曰馬成拜揚武將軍督誅虜將軍劉龍振威將軍宋登射聲校尉王賞發㑹稽丹陽九江六安四郡兵擊李憲時帝幸夀春設壇塲祖禮遣之又曰涼部叛羗揺蕩四州朝廷憂之扵是詔鄧騭將左右羽林北軍五校士及諸部兵擊之車駕幸平樂餞送又曰馬援出師詔百官祖道又曰光武籌赤眉必破長安欲乘釁并關中而方事山東未知所寄以鄧禹沈深有大度故授以西討之畧乃拜為前將軍持節中分麾下精兵二萬人遣西入關令自選偏禆以下可與俱者晉書曰何曽正元中為鎮北將軍都督河北諸軍事假節將之鎮文帝使武帝齊王攸辭送數十里曽盛為賔主備太牢之饌侍從吏騶莫不醉飽又載記曰苻堅以苻融為鎮東大將軍代王猛為冀州牧融將發堅祖于霸東奏樂賦詩堅母苟氏以融少子甚愛之比發三至霸上其夕又竊如融所内外莫知是夜堅寢于前殿魏延上言天市南門屏内后妃星失明左右閽寺不見后妃移動之象堅推問知之驚曰天道與人何其不逺遂重星官後魏書曰車駕南征以劉藻為征虜將軍督統軍髙聰等四軍為東道將别辭於洛水之南孝文曰與卿石頭相見藻對曰臣雖不逮古人度亦不留賊虜陛下輙當釃曲阿之酒以待百官帝大笑曰今未及曲阿且以河東數郡賜卿後周書曰武帝保定四年冬十月甲子詔大將軍大冡宰晉國公護率軍伐齊帝於太廟庭授以斧鉞護總大軍出潼關大將軍崔景宣率山南諸軍出豫州少師楊標出枳關丁夘幸沙苑勞師三國典畧曰侯景西逼梁湘東王遣晉州刺史蕭惠正率兵援于霸陵惠正辭以不堪舉天門郡守胡僧佑以自代王}
