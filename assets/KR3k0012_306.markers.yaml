  - {type: variant, offset: 2880, length: 579, content: 軍以討之征暴亂誅罪人群臣皆賀而子不賀何申叔時曰人有牽牛而往蹊於人之田中田主殺其人而奪之牛罪則有矣罰亦重矣今君王以陳為無道舉兵而征之因誅罪人遣卒戍陳諸侯聞之非以王為誅罪人也貪陳國也蓋聞君子不棄義以為利王曰善乃罷陳之戍後諸侯聞之朝於楚此務崇君之德也始張式為智伯謀張式晉人晉六將軍中行子取弱而上下離心可伐以廣地於是伐范中行滅之矣又教智伯求地於韓魏韓魏裂地而授之趙氏不予乃率韓魏而伐趙圍晉陽三年三國陰謀遂滅之此務為其君廣地也夫為君崇德者霸為君廣地者滅故千乘之國文德行者王湯武是也萬乘之國好廣地者亡智伯是也莊子曰犀首請魏伐齊季子諫勿伐華子聞而醜之曰善言伐齊亂人也善言勿伐亦亂人謂伐之與不伐亂人者又亂人也列子曰晉文公出會欲伐衛公子鋤御而笑之公問之對曰笑臣鄰之人也鄰之人有送其妻適私家者道見桑婦悅而與之言然顧視其妻亦有招之者臣竊笑此也公悟乃引師而還未至而有伐其北鄙矣墨子曰天賜武王黃鳥之旗以伐紂又曰湯在鏕宮夢神謂之曰夏桀無道汝克戡之孫卿子曰堯伐驩兜舜伐三苗禹伐共工湯伐有夏文王伐崇武王伐紂此兩帝四王者仁義之兵於天下也尉繚子曰武王之伐紂也河水逆流左驂霆死地方百里戰卒三萬紂之陣起自黃鳥至于赤斧其間百里武王不罷士民兵不血刃克殷誅紂其人事然韓子晉獻公欲伐虞虢乃遺之屈產之乘垂棘之璧女樂二八以縈其心以亂其政阮嗣宗為鄭冲勸晉王牋曰前者明公東誅叛逆全軍獨剋禽闔閭之將斬輕銳之卒以萬萬計, SBCK: ''}
