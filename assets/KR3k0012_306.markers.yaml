  - {type: variant, offset: 2446, length: 433, content: 新婚於衛也宋人使門尹班告急於晉門尹班宋大夫公告大夫曰宋人告急舍之則宋絕舍不救則宋降楚與我絕告楚則不許我告請請宋於楚楚不許我我欲擊楚齊秦不欲其若之何又曰自大畢伯士之終也大畢伯士犬戎氏之二君終卒也犬戎氏以其職來王以其職謂其嗣子以其貴寶來見王天子曰予必以不享征之且觀之兵享賓服服禮以責犬戎而示之兵非也其無乃廢先王之訓而王幾頓乎幾危頓敗吾聞夫犬戎樹敦樹立言犬戎立性悙樸師舊德而守終純固師循也純專固一言犬戎氏脩先王之舊德奉其常職天性專一終身不移不聽穆王責其厚享也其有以禦我矣禦應距也王不聽遂征之得四白狼四白鹿以歸白狼白鹿犬戎自是荒服者不至穆王責犬戎非禮暴兵露師傷滅毀信荒服者不至又曰啇王帝辛大惡于人啇殷人本號辛紂名大惡大為人所惡也庶人不忍欣載武王以致戎于啇牧載奉武兵牧啇郊牧野也是先王非務武也勤恤人隱而除其害恤憂隱痛又曰忠臣者務崇君之德讇臣者務廣君之地何以明之陳夏徵舒殺其君楚莊王伐之陳之人聽命莊王已討有罪遣卒戍陳戍守也欲守陳大夫畢賀申叔時使於齊及還而不賀莊王曰陳為無道寡人起, SBCK: 浮渡太平御覽卷第三百}
