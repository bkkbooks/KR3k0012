  - {type: variant, offset: 77, length: 422, content: 之臣笑其曠也簡子曰今吾伐國失國是吾曠也還師而歸又曰中行獻子將伐鄭范文子曰不可得志於鄭諸侯讎我憂必滋長郄至又曰得鄭是兼國也則王者固多憂乎文子曰王者盛其德而遠人歸故無憂今我寡德而有王者之功故多憂今子見無事而欲富樂者乎新序曰秦欲伐楚使使者往觀楚重寶楚王聞之召令尹子西問焉曰秦欲觀楚寶器和氏之璧隋侯之珠可以示諸侯乎對曰臣不知也召昭奚恤問焉對曰此欲觀吾國之得失而圖之非國之重寶也遂使恤應之恤發精兵三百人陳於西門之內為東西之壇秦使者至恤曰君客也請就上位東子西南面太宗子方次之葉公子高次之司馬子反次之恤自居西面之壇稱曰客觀楚之寶器楚所寶者賢臣也理百姓實倉廩使民人各得其所子西在此奉珪璧使諸侯解忿憤之難交兩國之欣使無兵革之憂太宗子方在此守封疆謹境界不侵鄰國鄰國亦不見侵葉公子高在此理師旅正兵戎以當強敵提桴鼓以動百萬人眾使皆赴湯火蹈白刃出萬死不顧一生司馬子反在此若懷霸王之餘義撮治亂之遺風昭奚恤在此唯大國所觀秦使者懼然無以對遂揖而去使者反言於秦君曰楚多賢臣未可謀, SBCK: ''}
  - {type: variant, offset: 77, length: 23, content: 之臣笑其曠也簡子曰今吾伐國失國是吾曠也還師而歸, WYG: ''}
