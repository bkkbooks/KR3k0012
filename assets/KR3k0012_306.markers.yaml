  - {type: variant, offset: 1930, length: 220, content: 出焦禾稼殺草木民人無食羿窳九嬰大風封豕鑿齒脩虵皆為害堯乃使羿誅鑿齒於疇華之澤南地也殺九嬰於水凶水火之怪在北狄之地繳大風於青立之野大風鷙鳥也射十日而下其九日殺羿窳狀如龍首食人在西方也斷脩虵於洞庭在南方擒封豕於桑林封豕大彘也桑林湯禱旱地又曰晉伐楚三舍不止大夫擊之莊王曰先君之時晉不伐楚及孤之身而晉伐楚是孤之過也若何其辱群大夫曰先臣之時晉不伐楚今臣之身而晉伐楚此臣之罪也請擊之王俛而泣涕沾襟起而拜群大夫晉人聞之曰君臣爭以過為在己不可伐也夜還師而歸, SBCK: 非所管}
