  - {type: variant, offset: 3271, length: 1874, content: 十二萬三千男女口二百三十萬後宮五千餘人晉書曰樊雅據譙郡祖逖使桓宣說之雅與宣置酒結友遣子隨宣詣逖少日雅便自詣逖逖遣雅還撫其眾僉謂前數罵辱逖懼罪不敢降雅復閉城自守逖往攻之復遣宣入說雅即斬異己者遂出降又曰建興中陳聲聚諸無賴二千餘家斷江抄掠陶侃遣朱伺為督護討聲聲眾雖少伺容之不擊聲求遣弟詣侃降伺外許之及聲去伺乃遣勁勇要聲弟斬之潛軍襲聲聲正旦並出祭祀飲食伺軍入其門方覺聲將閻晉鄭進皆死戰伺軍人多傷乃還營聲東走保董城伺又率諸軍圍守之遂重柴繞城作高櫓以勁弩下射之又斷其水道城中無水殺牛飲血閻晉聲婦弟也乃斬聲首出降又曰桓溫伐蜀軍次彭模乃命參軍周處孫盛守輜重自將步卒直指成都李勢使其叔父福及從兄權等攻彭模楚等禦之福退走溫又擊權等三戰三捷賊眾散自間道歸成都勢於是悉眾與溫戰于笮橋參軍襲護戰沒眾懼欲退而鼓吏誤鳴進鼓於是攻之勢眾大潰溫乘勝直進焚其小城勢遂夜遁九十里至晉壽葭萌城其將軍鄧嵩昝堅勸勢降乃面縛輿襯請命溫解縛焚襯送于京師溫亭蜀三旬舉賢旌善百姓大悅齊書曰始興王鑑鎮益州益州劫帥韓武方常聚黨于余人斷流為暴郡縣不禁行旅斷絕鑑行至上明武方乃出降長史虞悰等咸請殺之鑑曰武方為暴積年所不能制今降而被殺失信且無以勸善於是啟臺果被宥自巴西變夷兇惡皆望風降附三國典略曰侯景黨儀同司馬世雲率其所領降于慕容紹宗仍以鐵騎五千夾而擊景景謂其眾曰汝輩家口高澄悉已殺之弩力何慮無妻子待向江東當還入鄴用汝輩悉作本州刺史眾信之紹宗遙呼曰爾居家悉在但能歸來官勳如舊乃被髮向北斗以誓之於是景眾大潰爭赴渦水為之不流後周書曰武帝平齊齊主至帝降自阼階以賓主之禮相見高湝在冀州擁兵末下遣上柱國齊王憲與柱國隨公楊堅率軍討平之齊定州刺史范陽王高紹義叛入突厥齊諸行臺州鎮悉降關東平合州五十郡一百六十二縣三百八十五戶三百三十萬二千五百二十八口二千萬六千八百八十六唐書曰王行本仕隋以軍功為朝散大夫堯君素之鎮河東也令行本統精甲七百人及君素被誅於東樓行本率兵赴之不及因捕殺君素者黨屬與數百人皆誅之後兵出戰官軍高祖更令將軍秦武通擊之武通令軍中無得泄其謀於是掘長圍以逼之武通謂掘圍者曰若見賊但疾走以避之行本果出兵掘圍者走行本奔數里通率騎撗出擊之賊眾潰因縱兵乘之殺七百餘人自此兵勢漸弱太宗求得其所親婦人遣入城喻意行本曰罪戾既深自知不免止當逃竄山谷耳因潛引武周又求援於竇建德武周遣其將尋相以兵援之太宗邀擊大破之行本窮急糧盡謀欲突圍而出人無從者遂面縛請降又曰劉闥亡將張君立奔於高開道因與其將張金樹潛相連結時開道親兵數百人皆勇敢士也號為義兒恒在閤內金樹每督兵於閤下及將為變潛令其黨數人入其閤內與諸義兒陽為遊戲至日將夕陰斷其弓弦又藏其刀杖聚其矟於床下合暝金樹以其徒大呼來屯閤下向所遣人抱義兒矟一時而出諸義兒遽將出戰而弓弦皆絕刀仗已失張君立於外城舉火相應表裏驚擾義兒窮蹙爭歸金樹開道知不免死於是擐甲持兵坐於堂上與妻妾奏妓樂酣宴金樹之黨憚其勇不敢逼之天將曉開道先縊其妻及諸子而後自殺金樹陳兵大集執其義兒皆斬之又殺張君立死者五百餘人於是來降詐降史記曰楚漢相持項羽圍漢王於滎陽漢王請和割滎陽以西者為漢亞父勸項王急攻滎陽漢王患之陳平反間既行羽果疑亞父亞父大怒而去發病死漢將紀信曰事急矣臣請誑楚可以間出於是陳平夜出女子東門三千餘人楚因擊之紀信乃乘王車黃屋左纛曰食盡漢王降楚楚軍皆呼萬歲之城東觀之上以故與數十騎出西門遁走後漢書曰時漢中賊延岑出散關及更始將軍李寶合兵數萬人與逢安戰於杜陵岑等大敗死者萬餘人寶遂降安而延岑收散卒走寶乃密使人謂岑曰子弩力還戰吾當於內反之表裏合勢可大破也岑即還桃戰安等空營擊之寶從後悉拔赤眉旌幟更立己幡旗安等戰疲還營見旗幟皆白大驚亂走自投川谷死者十餘萬後漢書曰万俟醜奴万音墨俟音其宿勤明達等反叛寇掠涇州魏將崔延伯率眾軍將出營討賊未戰之間有賊數百騎詐持文書云是降簿乞且緩師延伯謂其事實逡巡未間俄而宿勤明達率眾自東北而至乞降賊從西競下諸軍前後受敵延伯上馬突陣賊勢摧挫便爾逐北遙造其營賊本輕騎延伯軍兼步卒兵力疲怠賊乃乘間得入城延伯軍遂大敗傷死者二萬人通典曰西魏大將周文帝征東魏戰於邙山禆將于謹率其麾下偽降立於路左東魏大將齊神武軍乘勝逐北不以為虞追騎過盡謹乃自後擊之敵人大駭獨孤信又收集兵士於後奮擊齊神武軍遂亂以此西魏軍得全而返之又曰隋煬帝征高麗九軍已度鴨綠水糧盡議欲班師諸將多異同又不測帝意會高麗國相乙亥文德來詣其營都將宇文述不能執文德逃歸述內不自安遂與諸將更進追擊時文德見軍中多飢色欲疲述眾每鬥便北述一日之中七戰皆捷既恃驟勝又內逼郡議於是遂進逼平壤城文德偽降述料攻之未可卒拔因而班師文德隨擊之大敗文德之戰之北遷延令敵飢瘦亦同持久之義, SBCK: ''}
