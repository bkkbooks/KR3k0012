  - {type: variant, offset: 10, length: 1, content: 叔, krp: 卿又曰東門襄仲臧文如楚乞師㐮仲居東門故以爲氏文爲㐮仲副使故不書又曰夏公使如楚乞師以伐齊公不事齊與晉盟故懼而乞師於楚又曰晉侯使荀罃來乞師又十三年晉侯使郗錡來乞師將事不敬將事敬君命也孟獻子曰郄氏亡乎禮身之幹也敬身之階也郄子無階且先君之嗣卿受命以求師將社稷是衛而惰棄君命也不亡何爲郄錡郄克子故曰嗣卿爲十七年春殺郄錡傳也又曰晉侯使士魴來乞師又曰郄犨如衛遂如齊皆乞師焉欒黶來乞師孟獻子曰晉有勝矣卑讓有禮故知其將勝楚也又曰秋齊侯聞將有晉師使陳無宇從薳啓彊如楚辭且乞師辭有晉師未得相見也糓梁曰師出不必反戰不必勝故言乞也戰國䇿曰楚圍雍氏韓使求救於秦秦師不下殽令斳尚使謂秦王曰今韓巳病矣秦師不下脣竭齒寒願大王熟計之宣太后召尚曰妾事先王也先王以髀如妾身妾困弗支也盡身妾上而弗重也何以其少有利焉夫救韓日費千金獨不使妾少有利耶靳尚歸韓襄王賂於太后復使張翠至甘茂曰韓急翠曰未也茂曰先生言不急可乎翠曰韓急則折而入楚矣臣安敢來茂曰先生勿復言也乃言於秦王曰今雍氏圍而秦兵不下是無韓也楚韓爲一魏不敢不聽是楚以三國謀秦也秦王乃下師於郩以救韓後漢書曰曹操與袁紹相持於官渡紹遣人求救劉表許之而不至亦不援曹操且欲觀天下之變從事中郎南陽韓嵩别駕劉先說表曰今豪傑並起兩雄相持天下之重在於將軍將軍若欲有爲起乗其弊可也救援春秋後齊語曰秦攻趙長平齊楚救之趙人無食請粟於齊齊欲勿與周子曰不如與之以退秦兵不與則秦兵不却是秦之計中而齊楚之計過也且趙之於齊楚捍蔽也猶齒之於脣脣亡則齒寒今日亡趙明日患及齊楚是故趙之務冝若奉漏甕沃燋釡也夫救趙髙義也却秦兵顯名也義救亡國威却強秦之兵不務爲此而務愛粟爲國計者過矣齊王不聽秦破趙於長平遂圍邯鄲焉又韓語曰襄王十二年楚圍雍氏韓令使者求救於秦冠盖相望秦師不出使靳尚如秦謂秦王曰韓之於秦居爲隱蔽出爲鴈行令韓病矣秦師不出脣亡齒寒願大王計之也史記曰趙平原君使者冠盖相屬讓信陵君以請救曰勝所結爲婚姻者以公子髙義今縱輕勝獨不憐公子之姉耶公子說王不可乃將車騎欲與趙俱死行過夷門見侯嬴坐而去公子曰侯生無一言半辭送我哉乃復見之生曰知公子之必來乃謂曰嬴聞晉鄙之兵符常在王卧内而如姬最幸可爲如姬復父之讎求其虎符奪晉鄙軍此五覇之伐也然恐鄙有所疑臣客朱亥可與俱行至軍亥以四十斤鐵椎殺晉鄙引兵救趙却秦軍趙王再拜曰自古賢人未有及公子公子懼不歸趙以五城封之魏志曰太祖征張繡荀攸言於太祖曰繡與劉表相恃爲強然繡以逺軍仰食於表表不能供勢必離不如緩軍以待之若急之其勢必相救太祖不從遂進軍至襄繡戰急表果救之軍不利太祖謂攸曰不用君言至是矣魏略曰臧洪太祖爲族弟興平末太祖甞與洪出爲宼刼失馬追者在後洪下馬與太祖太祖辭曰各自急洪言曰天下諸將可无洪不可无君也太祖乃乗之遂相扶佐得濟魏志曰太祖爲卓敗失馬晉書曰桓宣屯馬頭山爲祖煥桓撫所攻求援於盧江太守毛寳宣遣子戎重請寳即隨戎赴之未至而賊巳與宣戰寳軍縣兵少器仗艦惡大爲煥抚所破寳中箭貫髀徹鞌使人蹋鞌抜箭血流滿鞾去舡所百餘里望星而行到先哭戰亡將士洗瘡訖夜還救宣寳至宣營而煥撫亦退又曰淮南妖賊張昌旬月之間衆三萬皆絳科頭攅之以毛王歆上言妖賊張昌劉尼稱神聖犬羊万計絳頭毛面挑刀走㦸其鋒不可當請諸軍以助三十六國春秋曰姚㐮南至滎陽與髙昌李歷戰于麻田馬中流矢死弟萇下馬授襄曰汝何以自免萇曰但令兄濟此竪子何敢害萇㑹救至俱不死北史曰齊蘭陵武王長恭一名孝瓘文襄第四子累迁并州刺史突厥入晉陽長恭盡力擊之芒山之敗長恭爲中軍五百騎再入周軍遂至金墉之下𬒳圍甚急城上人不識長恭免胄示之靣乃下弩手殺之於是大捷武士共歌謡之爲蘭陵王入陣曲是後魏書曰齊將陳伯之進逼壽春㳂淮爲宼時司徒彭城王勰廣陵侯衍同鎭壽春以九江初附人情未洽兼臺援不至深以爲憂詔遣傳永爲統軍領汝隂之兵三千人援永揔勒士卒水陸俱下而淮水口伯之防甚固永去二千餘里牽舡上汝南岸以水牛挽之直南趣淮下舡便渡適上岸賊軍追及㑹時巳夜永乃潜進時曉逵壽春城下勰衍聞外有軍共上門樓觀望然不意永至永免胄乃信之遂引永上勰謂永曰北望以乆恐洛陽難復再見不意卿能至也勰令永引軍入城永曰埶兵𬒳甲固敵是求若如教㫖便共殿下同𬒳圍守豈是救援之意遂孤軍城外與勰并勢以擊伯之頻有克捷又曰辛淵私署凉王李暠騎將軍暠子欽亦厚遇之欽與沮渠蒙遊戰於􅖋泉軍敗失馬淵以所乗馬授欽而身死於難以義烈見稱西土又曰裴駿盖呉作亂於闕中汾隂人薛永宗聚衆應之殘破諸縣來襲聞憙縣中先無兵杖人情駭動縣令憂惶計無所出駿在家聞之便率厲郷豪曰在禮君父危臣子致命府君今爲賊所逼是吾等徇節之秋諸君可不免乎諸豪皆奮激請行駿乃簡騎驍勇數百人奔赴賊聞救至引兵退走刺史嘉之以狀表聞㑹丗祖親討盖呉引見駿駿陳叙事冝甚㑹機理丗祖大恱顧謂崔浩曰裴駿有當丗才是且忠義可嘉𥙷中書博士浩亦深器駿目爲三河領䄂轉中書侍郎後周書曰蕭察大統十五年乃遣使稱藩請爲附庸太祖令丞相東閤祭酒榮權使焉察大恱是歳梁元帝令柳仲禮率衆進圖襄陽察懼乃遣其妻王氏及丗子寮爲質以請救太祖又令榮權報命仍遣開府楊忠率兵援之十六年楊忠擒仲禮平漢東察乃獲安又曰李賢時有賊帥逹符顯圍逼州城晝夜攻戰屢𬒳摧衂賢間赴雍州詣天光請援天光許之賢乃返而賊營壘四合無因入城候日向夕乃僞負薪與賊樵采者俱得至城下城中垂布引之賊衆方覺乃}
  - {type: variant, offset: 12, length: 0, content: '', SBCK: 弩亂發射之不中遂得入城告以大軍將至賊聞之便即散走又曰邵惠公顥太祖長兄德皇帝娶樂浪王氏爲德皇后生顥及連次太祖德皇帝與衛可􅀌戰於武川臨陣墜馬顥奔救擊殺數十人賊衆披靡德皇帝乃得上馬引去俄而賊追􅀐大至顥遂戰殁保定􅀄追贈太師㝷追封邵公又曰太祖率輕􅀐追侯景于河上景等北據河橋南屬邙山爲陣與諸軍合戰太祖馬中流矢驚逸遂失之因此軍中擾亂都督李穆下馬授太祖軍以復振於是大捷斬髙敖曹及其儀同李猛隋書曰張湏陁爲齊郡丞賊裴長才石予河等衆二萬奄至城下縱兵大掠湏陁未暇集兵親率五􅀐與賊競赴之圍百餘重身中數瘡勇氣弥厲㑹城中兵至賊稍却湏陁督軍復戰長才敗走後數旬賊帥􅁗君弘郭方預等合軍圍北海兵鋒甚銳湏陁謂官屬曰賊自恃強謂我不能救吾今速去破之必矣於是簡精兵倍道而進賊果無備擊大破之斬數萬級獲輜重三千兩唐書曰李晟兼左金吾大將軍涇原四鎭都知兵馬使并惣遊兵無何節度使馬璘與吐蕃戰於監倉兵敗晟率所部撗擊之抜璘出於亂兵以功封合川郡王璘忌晟威名又遇之不以禮令朝京師代宗知之留􅀫衛上即位吐蕃㓂劒南時節度使崔寜在京師三川皆恐詔晟將神䇿兵五百救援晟乃踰漏天攻㧞飛越廊清肅寜三城絶大渡河獲虜首千餘級虜乃引去因留成都數月而還又曰裴度征蔡州計築赫連城於池口未畢役度領師及賔從徃觀之導􅀐將及城門左右曰五溝賊至言未畢賊以突來哮謼争進城震壞者十餘板注弩挺刃勢將及度頼李光顔决戰於前以却之時光顔先慮其來使田希以二百􅀐伏於溝中出賊不意交擊之方得入城希又先扼其溝中歸路賊多棄􅀐越溝相牽墮􅎹而死者千餘人是日非光顔救度幾䧟又曰辛讜性慷􅁣重然諾專務賑人之急年五十不求茍進有濟時匡難之志咸通十年龐勛亂徐泗時杜慆守泗州賊以郡當江淮要害極力攻之時兩淮郡縣皆䧟獨慆守臨淮乆之援軍雖集賊未解圍時讜寓居廣陵乃仗劒挐小艇趍泗口貫賊柵入城見慆慆素聞有義而不相面喜讜至握手謝曰判官李延樞方話子爲人何遽至􅁘吾無憂矣時賊三靣攻城王師結壘于洪源驛相顧不前讜夜以小舟穿賊壘至洪源驛見監軍郭厚夲論泗州危急且冝速救厚夲然之淮南都將王公弁謂厚夲曰賊軍衆我寡無冝輕舉當俟可行讜坐中㧞劒瞋目謂公弁曰賊百道攻城䧟在旦夕公等奉詔赴援而逗留不進心欲何爲不唯有􅀒國恩丈夫氣義亦冝感發假如臨淮䧟賊淮南即是㓂塲公何獨存耶即欲揮刃向公弁厚夲持之讜望泗州大哭者經日帳下爲之流涕厚夲義其心選甲士三百隨讜入泗州夜半斬賊柵大呼由水門而入賊軍大駭旣知援兵入賊乃退舎人心遂固浙西觀察使杜審權遣大將翟行約率軍三千赴援屯蓮塘驛慆欲遣人勞之將吏皆憚其行讜曰杜相公以大夫宗盟急難相赴安得令使者無言而還即賷慆書幣犒其使淮南大將李湘率師五千來援受賊詐降敗於淮口湘與郭厚夲皆爲賊所執自是無援賊併兵急攻以鐵索斷淮流梯衡雲合凢周七月晝夜不息乗城之士不遑寢寐面目瘡生軍儲漸少分食稀粥頼讜犯難仗義求救於淮北諸軍旣而馬舉以大軍至賊解圍而去讜無子猶子山僧元老等􅀉在廣陵每出城則書二姪名謂慆曰志之得嗣爲幸慆益感之賊平授讜泗州團練判官侍御史繁欽丘儁碑曰故右扶風都尉主簿有丘儁者從都尉討叛胡官兵敗績卒伍奔散都尉臨陣墜馬儁於是下馬援甲以身禦寇遂致死戰塲都尉乗儁馬得免擒獲上左傳曰鄭將公子歸生伐宋戰于大􅁄宋師敗績宋將狂狡輅鄭人鄭人入於井輅迎也五駕切倒㦸而出獲狂狡君子曰失禮違命冝其擒也戎昭果毅以聽之謂禮聽謂常在放身着於心想聞其政令殺敵爲果致果爲毅􅂖梁曰宋華元}
