  - {type: variant, offset: 2729, length: 144, content: 里西域南北有大山中央有河東西六千餘里東至王門陽關有兩道從鄯善傍南山北渡河西行至莎車為南道雄張猶熾盛也張音丁亮反波傍也波音詖而匈奴遣使監護其國超既西先至于寘廣德禮意甚踈且俗信巫言神怒何故欲向漢使有騧馬急求取以祠我廣德乃遣使就超請馬續漢書及華嶠書騧字並作騩說文馬淺墨色也音京媚也超密知其狀報許, SBCK: 疋金銀各一簏贖末杯勒歸}
