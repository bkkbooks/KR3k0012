  - {type: variant, offset: 10, length: 1, content: 叔, SBCK: 卿又曰東門襄仲臧文如楚乞師㐮仲居東門故以爲氏文爲㐮仲副使故不書又曰夏公使如楚乞師以伐齊公不事齊與晉盟故懼而乞師於楚又曰晉侯使荀罃來乞師又十三年晉侯使郗錡來乞師將事不敬將事敬君命也孟獻子曰郄氏亡乎禮身之幹也敬身之階也郄子無階且先君之嗣卿受命以求師將社稷是衛而惰棄君命也不亡何爲郄錡郄克子故曰嗣卿爲十七年春殺郄錡傳也又曰晉侯使士魴來乞師又曰郄犨如衛遂如齊皆乞師焉欒黶來乞師孟獻子曰晉有勝矣卑讓有禮故知其將勝楚也又曰秋齊侯聞將有晉師使陳無宇從薳啓彊如楚辭且乞師辭有晉師未得相見也􅂖梁曰師出不必反戰不必勝故言乞也戰國䇿曰楚圍雍氏韓使求救於􅁗􅁗師不下殽令斳尚使謂􅁗王曰今韓巳病矣􅁗師不下脣竭齒寒願大王熟計之宣太后召尚曰妾事先王也先王以髀如妾身妾困弗支也盡身妾上而弗重也何以其少有利焉夫救韓日費千金獨不使妾少有利􅁘靳尚歸韓襄王賂於太后復使張翠至甘茂曰韓急翠曰未也茂曰先生言不急可乎翠曰韓急則折而入楚矣臣安敢來茂曰先生勿復言也乃言於􅁗王曰今雍氏圍而􅁗兵不下是無韓也楚韓爲一魏不敢不聽是楚以三國謀􅁗也􅁗王乃下師於郩以救韓後漢書曰曹操與􅀽紹相持於官渡紹遣人求救劉表許之而不至亦不援曹操且欲觀天下之變從事中郎南陽韓嵩别駕劉先􅀃表曰今豪傑並起兩雄相持天下之重在於將軍將軍􅀂欲有爲起乗其弊可也救援春秋後齊語曰􅁗攻趙長平齊楚救之趙人無食請粟於齊齊欲勿與周子曰不如與之以退􅁗兵不與則􅁗兵不却是􅁗之計中而齊楚之計過也且趙之於齊楚捍蔽也猶齒之於脣脣亡則齒寒今日亡趙明日患及齊楚是故趙之務冝􅀂奉漏甕沃燋釡也夫救趙髙義也却􅁗兵顯名也義救亡國威却強􅁗之兵不務爲此而務愛粟爲國計者過矣齊王不聽􅁗破趙於長平遂圍邯鄲焉又韓語曰襄王十二年楚圍雍氏韓令使者求救於􅁗冠盖相望􅁗師不出使靳尚如􅁗謂􅁗王曰韓之於􅁗居爲隱蔽出爲鴈行令韓病矣􅁗師不出脣亡齒寒願大王計之也史記曰趙平原君使者冠盖相屬讓信陵君以請救曰勝所結爲婚姻者以公子髙義今縱輕勝獨不憐公子之姉􅁘公子􅀃王不可乃將車􅀐欲與趙俱死行過夷門見侯嬴坐而去公子曰侯生無一言半辭送我哉乃復見之生曰知公子之必來乃謂曰嬴聞晉鄙之兵符常在王卧内而如􅁎最幸可爲如􅁎復父之讎求其虎符奪晉鄙軍此五覇之伐也然恐鄙有所疑臣客朱亥可與俱行至軍亥以四十斤鐵椎殺晉鄙引兵救趙却􅁗軍趙王再拜曰自古賢人未有及公子公子懼不歸趙以五城封之魏志曰太祖征張繡荀攸言於太祖曰繡與劉表相恃爲強然繡以逺軍仰食於表表不能供勢必離不如緩軍以待之􅀂急之其勢必相救太祖不從遂進軍至襄繡戰急表果救之軍不利太祖謂攸曰不用君言至是矣魏略曰臧洪太祖爲族弟興平末太祖甞與洪出爲宼刼失馬追者在後洪下馬與太祖太祖辭曰各自急洪言曰天下諸將可无洪不可无君也太祖乃乗之遂相扶佐得濟魏志曰太祖爲卓敗失馬晉書曰桓宣屯馬頭山爲祖煥桓撫所攻求援於盧江太守毛寳宣遣子戎重請寳即隨戎赴之未至而賊巳與宣戰寳軍縣兵少器仗艦惡大爲煥抚所破寳中箭貫髀徹鞌使人蹋鞌抜箭血流滿鞾去舡所百餘里望星而行到先哭戰亡將士洗瘡訖夜還救宣寳至宣營而煥撫亦退又曰淮南妖賊張昌旬月之間衆三萬皆絳科頭攅之以毛王歆上言妖賊張昌劉尼稱神聖犬羊万計絳頭毛面挑刀走㦸其鋒不可當請諸軍以助三十六國春秋曰姚㐮南至滎陽與髙昌李歷戰于麻田馬中流矢死弟萇下馬授襄曰汝何以自免萇曰但令兄濟此竪子何敢害萇㑹救至俱不死北史曰齊蘭陵武王長恭一名孝瓘文襄第四子累迁并州刺史突厥入晉陽長恭盡力擊之芒山之敗長恭爲中軍五百􅀐再入周軍遂至金墉之下􅀍圍甚急城上人不識長恭免胄示之靣乃下弩手殺之於是大捷武士共歌謡之爲蘭陵王入陣曲是後魏書曰齊將陳伯之進逼壽春㳂淮爲宼時司徒彭城王勰廣陵侯衍同鎭壽春以九江初附人情未洽兼臺援不至􅀷以爲憂詔遣􅀓永爲統軍領汝隂之兵三千人援永揔勒士卒水陸俱下而淮水口伯之防甚固永去二千餘里牽舡上汝南岸以水牛挽之直南趣淮下舡便渡適上岸賊軍追及㑹時巳夜永乃潜進時曉逵壽春城下勰衍聞外有軍共上門樓觀望然不意永至永免胄乃信之遂引永上勰謂永曰北望以乆恐洛陽難復再見不意卿能至也勰令永引軍入城永曰埶兵􅀍甲固敵是求􅀂如教㫖便共殿下同􅀍圍守豈是救援之意遂􅀌軍城外與勰并勢以擊伯之頻有克捷又曰辛淵􅀻署凉王李暠􅀐將軍暠子欽亦厚遇之欽與沮渠􅂪遊戰於􅖋泉軍敗失馬淵以所乗馬授欽而身死於難以義烈見稱西土又曰裴駿盖呉作亂於闕中汾隂人薛永宗聚衆應之殘破諸縣來襲聞憙縣中先無兵杖人情駭動縣令憂惶計無所出駿在家聞之便率厲郷豪曰在禮君父危臣子致命府君今爲賊所逼是吾等徇節之秋諸君可不免乎諸豪皆􅁬激請行駿乃簡􅀐驍勇數百人奔赴賊聞救至引兵退走刺史嘉之以􅃺表聞㑹丗祖親討盖呉引見駿駿陳叙事冝甚㑹機理丗祖大恱顧謂崔浩曰裴駿有當丗才是且忠義可嘉􅀘中書􅀶士浩亦􅀷器駿目爲三河領䄂轉中書侍郎後周書曰蕭􅊫大統十五年乃遣使稱藩請爲附庸太祖令丞相東閤􅀕酒榮權使焉􅊫大恱是歳梁元帝令柳仲禮率衆進圖襄陽􅊫懼乃遣其妻王氏及丗子寮爲質以請救太祖又令榮權報命仍遣開府楊忠率兵援之十六年楊忠擒仲禮平漢東􅊫乃獲安又曰李賢時有賊帥逹符顯圍逼州城晝夜攻戰屢􅀍摧衂賢間赴雍州詣天光請援天光許之賢乃返而賊營壘四合無因入城候日向夕乃僞􅀒薪與賊樵采者俱得至城下城中垂布引之賊衆方覺乃}
