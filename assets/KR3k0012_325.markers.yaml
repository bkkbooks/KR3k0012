  - {type: variant, offset: 1336, length: 658, content: 曰馬燧討李懷光自京師與渾瑊駱元光韓遊瓌合軍次于長春宮懷光遣驍將徐廷光以精卒六千守城兵械甚嚴燧度長春不下則懷光自固攻之則曠日持久死傷必甚乃挺身至城下呼廷光廷光素懼燧威名則拜於城上燧度廷光心已屈乃謂曰我來自朝廷可西面受命廷光復西拜又曰公等皆朔方將士祿山已來首立大勳四十餘年功伐最高奈何棄祖父之勳力為滅族之計耶從吾言非止免罪富貴可圖也賊徒皆不對燧又曰爾以吾言不誠今相去數步爾當射我乃披襟示之廷光感泣俯伏軍士亦泣光一日賊將尉珪率兵二千以焦離堡降燧廷光道既絕乃因率其下出降燧乃以數騎徑入城處之不疑莫不畏服眾大呼曰吾復得為王人矣渾瑊私歎謂參佐曰瑊謂馬公用兵與僕不相遠但怪累敗田悅今覩其行師料敵僕不逮遠矣又曰曹王皋為衡州刺史初湖南團練使辛京杲遣將軍王國良鎮武崗京杲侵刻之又虐其士卒國良以兵叛因據山河守險劫行旅以自給詔徵荊南江西黔桂兵誅之二歲不下乃以皋為潭州刺史湖南都團練使皋率諸軍至武崗國良阻險兵不得進皋乃謂諸軍曰國良怨京杲刻害本非反也其情易不如降之乃三遺之書國良因請降未得其情皋曰其心屈矣乃捨軍自稱使者乘偏舟直造其壘曰曹王也國良遂出降又曰于邵為巴州刺史時歲儉夷獠相聚山澤為盜數千百人來圍州城邵撫勵州兵與之拒戰凡旬有二日間遣使說喻示以善惡山盜邀邵出乃以儒服出城致之不疑因皆降之又曰范希朝為朔方節度使至靈武突厥別部有沙陁者北方推其勇勁希朝誘致之自甘州舉族來歸眾且萬人其後以之討賊所至有功降左傳曰蔡穆侯將許僖公以見楚子於武城許男面縛衘壁大夫衰絰士輿襯楚子問諸逢伯對曰昔武王剋殷微子啟如是武王親釋縛受其壁焚其襯禮而命之使復其所楚子從之史, SBCK: 載}
