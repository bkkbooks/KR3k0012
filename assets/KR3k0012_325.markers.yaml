  - {type: variant, offset: 365, length: 3, content: 岑彭與, SBCK: 􅀛兹王攻破䟽勒殺其王而立􅀛兹人兠題爲䟽勒王明年春班超從間道至䟽勒去兠題所居槃橐城九十里逆遣吏田慮光徃降之勑慮曰兠題夲非䟽勒種國人必不用命􅀂不即降便可執之慮旣到兠題見慮輕弱殊無降意慮因其無備遂前刼􅅞兠題左右出其不意皆警而立定慮馳報超超即赴之悉召䟽勒將吏􅀃以􅀛兹無道之􅃺因立其故王兄子忠爲王王兄子榆勒立之更名曰忠也國人}
