  - {type: variant, offset: 2425, length: 301, content: 赴敵羽請譬降之種敬諾羽乃往備說禍福無忌即帥其黨與三千餘人降又曰劉盆子遣劉恭乞降曰盆子將百萬眾降陛下何以待之帝曰待汝以不死耳樊崇乃將盆子及丞相徐宣以下三十餘人肉袒降上所得傳國璽綬更始七尺寶劍及玉壁各一積兵甲宜陽城西與熊耳山齊又曰龐雄與梁慬及耿種步騎萬六千人攻虎澤連營稍前單于惶怖遣左奧鞬曰遂王詣慬乞降慬乃大陳兵受之單于脫帽徒跣面縛稽顙納質又曰岑彭與嚴說共守宛漢兵攻之數月城中糧盡人相食彭乃與說舉城降諸將欲斬之大司徒伯升曰彭郡之大吏執心堅守是其節也今舉大事當表義士不如封之以勸其後更始乃封彭為歸德侯又曰班超復使西域是時于寘王廣德新攻破莎車遂雄張南于寘國去長安九千六百七十里南與始羗西與姑墨莎車國去長安九千九, SBCK: 鎧馬二}
