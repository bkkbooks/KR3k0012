  - {type: variant, offset: 2874, length: 260, content: 而令巫自來取馬有頃巫至超斬其首以送廣德因辭讓之廣德素聞超在鄯善誅滅虜使大惶恐即攻殺匈奴使者而降超重賜其王以下因鎮撫焉又曰張步戰敗退保平壽今青州北海縣蘇茂將萬餘人來救之茂讓步曰以南陽兵精延岑善戰而耿弇走之奈何就攻其營既呼茂不能待耶步曰負無可言者負愧也再言之者愧之甚帝乃遣使告步茂能相斬降者封為列侯步遂斬茂使奉其首降又曰田戎聞秦豐被圍懼大兵方至欲降而妻兄辛臣諫戎曰今四方豪傑各據郡國洛陽地如掌耳續漢書曰辛臣為戎作地圖圖彭寵張步董憲公孫述等所得郡國云洛陽所得如掌耳不如按甲以觀其變戎曰以秦王之強猶為征南所圍豈况吾耶降計決矣四年, SBCK: 吕氏}
