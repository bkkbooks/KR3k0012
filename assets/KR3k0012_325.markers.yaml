  - {type: variant, offset: 1172, length: 163, content: 崇共坐并從者四人為設酒食遣之崇大悅歸洞不設備稠至五更掩入其洞悉散俚兵以臨餘賊象州逆帥杜條遼羅州逆帥龐靖等相繼降款又曰仁壽初山獠作亂出衛玄為資州刺史以鎮撫之玄既到官時獠攻圍大牢鎮玄單騎造其營謂群獠曰我是刺史銜天子詔安養汝等勿驚懼也諸賊莫敢動於是說以利害渠帥感悅解兵而去前後歸附者十餘萬口高祖大悅賜縑二千疋除遂州惣管仍令劍南安撫唐, SBCK: 爲賔客晉}
