  - {type: variant, offset: 10, length: 1, content: 叔, WYG: 卿又曰東門襄仲臧文仲如楚乞師襄仲居東門故以為氏文仲為襄仲副使故不書又曰夏公如楚乞師以伐齊公不事齊與楚盟故懼而乞師於楚又曰晉侯使荀罃來乞師又曰十三年晉侯使郤錡來乞師將事不敬將事致君命也孟獻子曰郤氏其亡乎禮身之幹也敬身之階也郤子無階且先君之嗣卿受命以求師將社稷是衛而惰棄君命也不亡何為又曰晉侯使士魴來乞師又曰郤犨如衛遂如齊皆乞師焉欒黶來乞師孟獻子曰晉有勝矣卑讓有禮故知其將勝楚也又曰秋齊侯聞將有晉師使陳無宇從薳啓疆如楚辭且乞師糓梁曰師出不必反戰不必勝故言乞也戰國䇿曰楚圍雍氏韓使求救于秦秦師不下郁令靳尚使謂秦王曰今韓已病矣秦師不下唇亡齒寒願大王熟計之宣太后召尚曰妾事先王也先王以髀加妾身妾困弗支也盡身妾上而弗重也何也以其少有利焉夫救韓日費千金獨不使妾少有利也靳尚歸韓襄上賂於太后復使張翠至丼茂曰韓急翠曰未也茂曰先生言不急可乎翠曰韓急則入楚矣臣安敢來茂曰先生勿復言也乃言於秦王曰今雍氏圍而秦兵不下是無韓也楚韓為一魏不敢不聽是楚以三國謀秦也秦王乃下師於郁以救韓後漢書曰曹操與袁紹相持於官渡紹遣人求救劉表許之而不至亦不援曹操且欲觀天下之變從事中郎南陽韓嵩别駕劉先説表曰今豪傑並起兩雄相持天下之重在於將軍將軍若欲有為起乘其弊可也救援春秋後齊語曰秦攻趙長平齊楚救之趙人無食請粟於齊齊欲勿與周子曰不如與之以退秦兵不與則秦兵不却是秦之計中而齊楚之計過也且趙之於齊楚捍蔽也猶齒之於唇唇亡則齒寒今日亡趙明日患及齊楚是故趙之務宜若奉漏甕汲焦金也夫救趙髙義也却秦兵顯名也義救亡國威却強秦之兵不務為此而務愛粟為國計者過矣齊王不聽秦破趙於長平遂圖邯鄲焉又韓語曰襄王十二年楚圍雍氏韓令使者求救於秦冠蓋相望秦師不出使靳尚如秦謂秦王曰韓之於秦居為隠蔽出為鴈行今韓病矣秦師不出唇亡齒寒願大王計之也史記曰趙平原君使者冠蓋相屬讓信陵君以請救曰勝所以結為婚姻者以公子髙義今縱輕勝獨不憐之姊耶公子説王不可乃將車騎欲與趙俱死行過夷門見侯嬴坐而去公子曰侯生無一言半辭送我哉乃復見之生曰知公子之必來乃謂曰嬴聞晉鄙之兵符常在王卧内而如姬最幸可為如姬復父之讎求其虎符奪晉鄙軍此五覇之功也然恐鄙有所疑臣客朱亥可與俱行至軍亥以四十斤鐵椎殺晉鄙引兵救趙却秦軍趙王再拜曰自古贒人未有及公子公子懼不歸趙以五城封之魏志曰太祖征張繡荀攸言於太祖曰繡與劉表相恃為強然急以逺軍仰食于表表不能供必離不如緩軍以待之若急之其勢必相救太祖不從遂進軍至穰繡戰急表果救之軍不利太祖謂攸曰不用君言至是矣魏畧曰曹洪為太祖族弟興平末太祖嘗與洪出為宼刼失馬追者在後洪下馬太祖辭曰各自急洪言曰天下諸將可無洪不可無君也太祖乃乗之遂相扶佐得濟晉書曰桓宣屯馬頭山為祖煥桓撫所攻求援於廬江太守毛寳宣遣子戎重請寳即隨戎赴之未至而賊已與宣戰寳軍縁兵少噐仗濫惡大為煥撫所破寳中箭貫髀徹鞍使人蹋鞍㧞箭血流滿鞾去船所百餘里望星而行到先哭戰亡將士洗瘡訖夜還救宣寳至宣營而煥撫亦退又曰淮南妖賊張昌旬月之間衆三萬皆絳績科頭攢面以毛王歆上言妖賊張昌劉尼稱神聖犬羊萬計絳頭毛面挑刀走戰其鋒不可當請諸軍以助三十六國春秋曰姚襄南至滎陽與髙昌李歴戰于麻田馬中流矢死弟萇下馬授襄曰汝何以自免萇曰但令兄濟此豎子何敢害萇㑹救至俱不死北史曰齊蘭陵武王長恭一名孝瓘文襄第四子累遷并州刺史突厥入晉陽長恭盡力擊之芒山之敗長恭為中軍五百騎再入周軍遂至金墉之下被圍甚急城上人不識長恭免胄示之面乃下弩手殺之於是大㨗武士共歌謡之為蘭陵王入陣曲是也後魏書曰齊將陳伯之假逼夀春㳂淮為㓂時司徒彭城王勰廣陵侯衍同鎮夀春以九江初附人情未洽兼臺援不至深以為憂詔遣傅永為統軍領汝隂之兵三千人援永總勒士卒水陸俱下而淮水口伯之防甚固永去二千里牽船上汝南岸以水牛挽之直南趨淮下船便渡適上岸賊軍追及㑹時已夜永乃潛進時曉逹夀春城下勰衍聞外有軍共上門樓觀望然不意永至永免胄乃信之遂上永勰謂永曰北望已久恐洛陽難復再見不意卿能至也勰合永引軍入城永曰執兵被甲固敵是求若如教㫖便共殿下同被圍守豈是救援之意遂孤軍城外輿勰并勢以擊伯之頻有克㨗又曰辛淵私署凉王李暠騎將軍暠子欽亦厚遇之欽與沮渠􅂪遜戰於蓼泉軍敗失馬淵以所乗馬授欽而身死於難以義烈見稱西土又曰裴駿值賊作亂於關中汾隂人薛永宗聚衆應之殘破諸縣來襲聞喜縣中先無兵杖人情駭動縣令憂惶計無所出駿在家聞之便率厲鄉豪曰在禮君父危臣子致命府君今為賊所逼是吾等狥節之秋諸君可不勉乎諸豪皆奮激請行駿乃簡騎驍勇數百人奔赴賊聞救至引兵退走刺史嘉之以狀表聞㑹世祖親討蓋吳引見駿駿陳叙事宜甚㑹機理世祖大悦顧謂崔浩曰裴駿有當世才是且忠義可嘉補中書博士浩亦深噐駿目為三河領袖轉中書侍郎後周書曰蕭詧大統十五年乃遣使稱藩請為附庸太祖令丞相東閣祭酒營權使焉詧大悦是嵗梁元帝令栁仲禮率衆進圖襄陽詧懼乃遣其妻王氏及世子寮為質以請救太祖又令榮權報命仍遣開府楊忠率兵援之十六年楊忠擒仲禮平漢東詧乃獲安又曰李賢時有賊師逹符顯圍逼州城晝夜攻戰累被摧衂賢間赴雍州詣天光請援天光許之賢乃返而賊營壘四合無因入城候日向夕偽負薪與賊樵采者俱得至城下城中垂布引之賊衆方覺乃}
