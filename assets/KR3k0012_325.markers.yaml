  - {type: variant, offset: 12, length: 0, content: '', WYG: 弩亂發射之不中遂得入城告以大軍將至賊聞之便即散走又曰邵惠公顥太祖長兄德皇帝娶樂浪王氏為德皇后生顥及連次太祖德皇帝與衛可孤戰於武川臨陣墜馬顥奔救擊殺數十人賊衆披靡德皇帝乃得上馬引去俄而賊追騎大至顥遂戰殁保定初追贈太師尋追封邵公又曰太祖率輕騎追侯景於河上景等北據河橋南屬邙山為陣與諸軍合戰太祖馬中流矢驚逸遂失之因此軍中擾亂都督李穆下馬授太祖軍以復振於是大㨗斬髙敖曹及其儀同李猛隋書曰張湏陁為齊郡丞賊裴長才石子河等衆七萬奄至城下縱兵大掠湏陁未暇集兵親率五騎與賊競赴之圍百餘重身中數鎗勇彌厲㑹城中兵至賊稍却湏陁督軍復戰長才敗走後數旬賊帥秦君𢎞郭方預等合軍圍北海兵鋒甚鋭湏陁謂官屬曰賊自恃強謂我不能救吾今速去破之必矣於是簡精兵倍道而進賊果無備擊大破之斬數萬級獲輜重三千兩唐書曰李晟為左金吾大將軍涇原四鎮都知兵馬使并總逰兵無何節度使馬璘與吐蕃戰於監倉兵敗晟率所部橫擊之扳璘出於亂兵以功封合川郡王璘忌晟威名又遇之不以禮令朝京師代宗知之留宿衛上即位吐蕃㓂劒南時節度使崔寧在京師三川皆恐詣晟將神䇿兵五百救援晟乃踰漏天攻㧞飛越廓清肅寧三城絶大渡河獲虜首千餘級虜乃引去留成都數月而還又曰裴度征蔡州計築赫連城於池口未畢役度領師及賔從徃觀之導騎將及城門左右曰五溝賊至言未畢呼賊以突來哮爭進城震壊者十五餘注弩挺刃勢將及度頼李光顔决戰於前以却之時光顔先慮其來使田希以二百騎伏於溝中出賊不意交擊之方得入城希又先扼其溝中歸路賊多棄騎越溝相牽墮壓而死者千餘人是日非光顔救度幾陷又曰辛讜性慷慨重然諾專務賑人之急年五十不求苟進有濟時匡難之志咸通十年龎勛亂徐泗時杜慆守泗州賊以郡當江淮要害極力攻之時兩淮郡國皆䧟獨慆守臨淮久之援軍雖集賊未解圍時讜寓居廣陵乃仗劒拏小艇趨泗口貫賊栅入城見慆慆素聞有義而不相面喜讜至握手謝曰判官李延樞方話子為人何遽至也吾無憂矣時賊三面攻城王師結壘于洪源驛相顧不前讜夜以小舟穿賊壘至洪源驛見監軍郭厚本論泗州危急且宜速救厚本然之淮南都將王公弁謂厚本曰賊車衆我寡無宜輕舉當宜候可行讜坐中㧞劒瞑目謂公弁曰賊百道攻城䧟在旦夕公等奉詔赴援而逗留不進心欲何為不唯有負國恩丈夫氣義亦宜感發假如臨陷賊淮南即是冦塲公何獨存耶即欲揮刃向公并厚本持之讜望泗州大哭者經日帳下為之流涕厚本義其心選甲士三百隨讜入泗州夜半斬賊栅大呼由水門而入賊軍大駭既知援兵入城賊乃退舎人心遂固浙西觀察使杜審權遣大將翟行約率軍三千赴援屯蓮塘驛慆欲遣人勞之將吏皆憚其行讜曰杜相公以大夫宗盟急難相赴安得令使者無言而還即賫慆書幣犒其使淮南大將李湘率師五千來援受賊詐降敗於淮口湘與郭厚本皆為賊所執自是無援賊併急攻以鐵索斷淮流梯衡雲合凡周七月晝夜不息乘城之士不遑寢寐面目瘡生軍儲漸少分食稀粥頼讜犯難仗義求救於淮北諸軍既而馬舉以大軍至賊解圍而去讜無子猶子山僧元老等寄在廣陵毎出城則書二姪名謂慆曰志之得嗣為幸慆益感之賊平授讜泗州團練判官侍御史繁欽丘雋碑曰故右扶風都尉主簿有丘雋者從都尉討叛胡官兵敗績卒伍奔散都尉臨陣墜馬雋於是下馬授甲以身禦冦遂致死戰塲都尉乘雋馬得免擒獲上左傳曰鄭將公子歸生伐宋戰于大棘宋師敗績宋將狂狡輅鄭人鄭人入於井輅迎也五駕切倒㦸而出獲狂狡君子曰失禮違命冝其擒也戎昭果毅以聽之謂禮聽謂常在放聞身著於心想政其令殺敵為果致果為毅榖梁曰宋華元}
