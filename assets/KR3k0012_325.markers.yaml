  - {type: page-break, offset: 365, content: '', id: KR3k0012_WYG_325-13a, image: WYG0895/WYG0895-0792c.png}
  - {type: variant, offset: 365, length: 19, content: 岑彭與大司馬吳漢等圍洛陽數月朱鮪等堅守, krp: 龜兹王攻破䟽勒殺其王而立龜兹人兠題爲䟽勒王明年春班超從間道至䟽勒去兠題所居槃橐城九十里逆遣吏田慮光徃降之勑慮曰兠題夲非䟽勒種國人必}
  - {type: variant, offset: 369, length: 348, content: 司馬吳漢等圍洛陽數月朱鮪等堅守不肯下帝以彭嘗為校尉令往說之鮪在城上彭在城下相勞苦歡語如平生彭因曰彭往者得執鞭侍從蒙薦舉柭擢常思有以報恩今赤眉已得長安更始為三王所反皇帝受命平定燕趙盡有幽冀之地百姓歸必賢俊雲集親率大兵來攻洛陽天下之士逝其去矣公雖嬰城固守將何待乎嬰繞也謂以城自嬰繞而守之鮪曰大司徒被害時鮪與其謀與音預又諫更始無遣蕭王北伐自知罪深彭還具言於帝帝曰夫建大事者不忌小怨鮪今若降官爵可保况誅罰乎河水在此吾不食言指河水為信言其明白也彭復往告鮪鮪從城上下雲索曰必信可乘此上彭趣索欲上趣向也鮪見其誠即許降後五日鮪將輕騎詣彭顧勑謂部將曰堅守待我我若不還諸君徑將大兵上轘轅歸郾王更始傳尹尊為郾王乃面縛與彭俱詣河陽東觀記曰詣行在所河津亭帝即解其縛召見之復令彭夜與鮪歸城明旦悉其眾出降拜鮪為平狄將軍封扶溝侯, SBCK: 恱}
