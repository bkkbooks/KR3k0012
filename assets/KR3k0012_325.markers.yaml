  - {type: variant, offset: 906, length: 263, content: 降三國典略曰梁蕭乾字思惕梁秘書監子範之子容止雅正志性恬簡善隸書得叔父子雲之法閩中豪帥反叛陳武謂乾曰陸賈南征趙佗歸順隨何奉使黥布來臣追想清風髣髴在目乃令乾往使諭以逆順渠帥並即款附北史曰魏可朱渾元歸齊神武聞其來遣平陽太守高崇持金環一枚賜元并運資糧候接隋書曰劉權為南海太守行至鄱陽會群盜起不得進詔令權召募討之權率兵與賊相遇不與戰先乘單舸詣賊營說以利害而群賊感悅一時降附帝聞而嘉之又曰開皇末桂州俚李光仕聚眾為亂詔何稠召募討之師次衡嶺遣使者諭其渠師洞主莫崇解兵降款桂州長史王文周鏁崇以詣稠所詐宣言曰州縣不能綏養致使邊民擾叛非崇之罪也乃命, SBCK: ''}
