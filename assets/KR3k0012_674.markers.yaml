  - {type: variant, offset: 227, length: 0, content: '', krp: 以定天下萬民之罪福又曰西華堂在上清王母所居又曰文德宫張叔隱處之又曰八景城在上清玉晨道君所居又曰赤城}
  - {type: variant, offset: 228, length: 1, content: 極, SBCK: 元眞人所居又曰上清有楊􅋁殿上皇太帝玉尊集羣眞於内又曰希琳殿在上清東海八停山上太帝君所居又曰琅玕殿在上清金闕聖君所居也又曰上清之境有丹城紫臺上皇大帝君玉尊集處又曰七靈臺在上清境玉晨道君所居又曰明眞臺在上清境東海八停太山上帝所居又曰郍弗臺在上清境方諸東華山上青童君所居又曰上清境有希林臺太帝道君居之東方朔十洲記曰有光碧堂西王母所處也三}
