  - {type: variant, offset: 404, length: 433, content: 皇三元東華太上當遣真人授其真經後聖眾真莫不先奏金簡於東華投玉札於上清然後得授大洞真經而或青宮無金簡之籙玉格無玄編之名則神經亦不可得而授也金根經曰開雲鳳之蘊紫錦之囊出紫書真訣玉篇太有經曰帝卿執大洞真經盛以紫玉函又曰太一君執素靈洞玄大有妙經盛以黃玉函又曰大有經金縷玉字以明其篇又曰大有妙經九真科檢校祕於金藏玉匱大洞雌一篇目曰大洞真經在九天之上大有宮太玄靈臺又曰華玉堂仙母金丹在其內奔日月二景隱文曰西玄山下洞臺中有鬱儀結鄰經也王屋山清虛中亦有此經也而不備惟太上玄宮高上臺及蓬萊府北室金柱玉壁刻此並備八素經日太上曰諸學真人而受玄清八素經皆有太帝篇目西華宮有玉簡藻書當為真人者乃得此文也又曰西龜之山玄圃之上積石之陰八素真經在其內龜山元籙曰龜山丹皇飛玄紫文西母常所寶祕其旨隱奧自無仙名不得眄其篇目得者皆九天書籙名題龜山又曰玉華之室丹景玉文在其內飛行羽經曰峨嵋山金臺之室飛玄羽經祕其內又曰太上飛經藏於玉清上宮七映紫臺五寶經曰靈寶紫文祕在九天之上太玄靈臺又曰神州七轉舞天經祕於紫天元, SBCK: 寳}
