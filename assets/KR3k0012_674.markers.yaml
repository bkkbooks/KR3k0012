  - {type: variant, offset: 47, length: 166, content: 真源廻九乙天霄白簡青籙在其內也本行經曰九都之上金格玉書並題得道人名展轉劫數又曰紫蘭臺瓊文紫字在其中西極明科曰龜山西室王屋南洞天經備足也又曰玉清洞房三氣金章封於玉京紫戶之內又曰玉籙寶章藏紫房九戶之內大洞雌一經云有玄琳玉殿五老鎮生上經藏在其中又曰四極明科封於金闕紫臺又曰華耀景真經祕在九天之上大有之宮金映七寶臺又有三寶玄臺上清隱書祕其中, SBCK: 所宗}
