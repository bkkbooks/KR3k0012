  - {type: variant, offset: 90, length: 0, content: '', WYG: 華室西王母處之又曰𤣥洲在北海亥地有大𤣥仙都伯真公治也又曰聚窟洲在西海中北接崑崙多仙真宫第有辟邪天鹿之獸洲上有樹與楓木相似而芳華聞數里又曰神仙島有紫石宫室九老仙都治處仙官數萬人又曰方丈在東海中三天司命所居處群仙徃來其上大洞真經曰太素三元山有中黄太一上帝之館又曰玉晨大道經君治蘂珠日闕又曰玊皇道君居青雲之城玉階}
  - {type: page-break, offset: 90, content: '', id: KR3k0012_WYG_674-3b, image: WYG0899/WYG0899-0064d.png}
  - {type: variant, offset: 91, length: 0, content: '', WYG: 階又曰玉容堂者虛無真人之逸宅亦真氣之明堂又曰玉容堂者大上之明堂也得道符籍之所治又曰萬華宫在小有玉真之天小有先生之所治又絶空之宫在𤣥洲之北九真仙山帝司禁君㑹仙之處也又曰圓華宫黄老之所處又曰大霞之中太虛元君之所處又曰秀華山太極真人呼曰圓明丹室五靈員君處之又曰青精君登}
