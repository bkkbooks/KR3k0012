  - {type: 'tls:seg', offset: 257, content: '', id: KR3k0012_CHANT_674-6a.4}
  - {type: variant, offset: 257, length: 0, content: '', SBCK: 上有積石圃大冶井西母宴㑹之所也又曰崑崙有瓊華室西王母處之又曰玄洲在北海亥地有太玄仙都伯眞公所治也又曰聚窟洲在西海中北接崑崙上多眞仙宫弟有辟邪天鹿之獸洲上有大樹與楓木相似而芳華聞數里又曰神仙島有紫石宫室九老仙都治處仙官數萬人又曰方丈在東海中三天司命所居處羣仙皆徃來其上太洞眞經曰太素三元山有中黄太一上帝之館又曰玉晨大道君治蘂珠貝闕又曰玉皇道君居青雲之城玉堦文陛又曰玉容堂者虚無眞人之逸宅亦眞氣之明堂又曰玉容堂者太上之明堂也得道符籍之所在又曰萬華宫在小有玉眞之天小有先生之所治又曰絶空之宫在玄洲之北九眞仙上帝司禁君㑹仙處也又曰圎華宫黄老之所處又曰太霞之中太虚元君之所處也又曰秀華山太極真人呼曰圎明丹室五靈眞君處之又曰青精君登紫空之山化玉室之内又曰崑崙山有金丹流雲之堂上接琁璣之輪下在太室之中西王母所治眞仙之女所處也又曰玉室青精君之所處又曰玉華三元君處流逸之室又曰太虚有太霞之室合九雲而立宇太虚元君之所處也又曰青華之室青童君乗玉彫之軿御圎珠之氣而入山室又曰大老之室在上清八皇老君乗廣琅車而入又曰流剛山上有暉景之室西王母治所也金根經曰青要帝君在丘玉國黄金紫殿青要帝君所處又曰八闕天人散香其間闕上有金臺九層臺上玉晨鎮君所進居也有金輝紫殿後聖金闕帝君所居處也上清經曰上清南極長生司命君藏瑶臺丹靈宫又在蘭庭雲臺又登絶空之中紫碧玄臺又曰有紫微玄琳殿中央黄老君居之又曰恊晨虚觀層之室太上大道君閑居處也又曰元始居紫雲之闕碧霞爲城又曰有黄房之室一石玉容之堂眞晨道君治其中太眞科崇玄臺天師朝禮處又曰有燕仙室天師教化處也南眞􅀃曰西王母女媚蘭字申林治滄浪山受書爲雲林天人又曰北元中玄道君李慶賔女受書爲東宫靈昭文人治方丈臺第十三朱館中又曰閬野者閬風之府是也崑崙上有九府是爲九宫太極爲太宫諸仙皆是九宫之官僚耳至於眞人乃九宫之公卿也又曰大方諸宫青君常治處也其上人皆天眞髙仙太極公卿諸司命所處有服日月芒法雖巳得道爲眞猶故服之霍山赤城亦爲司命之府惟太元眞人南岳夫人在焉李仲甫在西方韓衆在南方餘三十二司命當皆在東華東華青童爲大司命㹅統也楊君亦去東􅎮執事不知當在第幾耳又曰句曲山漢三茅君治其上各乗一白鵠集於處所時人㸦有見者山生黄金漢靈帝時詔勑郡縣採句曲之金以充武庫至孫權時又遣􅀫衛人採金常輸於官又曰方丈西北有隂成大山滄浪西南有陽長大山其山多眞仙之所處是陽九百六應數之摽掲也秀華山有玉堂乃五靈眞君所處也又曰金華山上有五宫太一所處又曰玄洲之上有景暉之室}
