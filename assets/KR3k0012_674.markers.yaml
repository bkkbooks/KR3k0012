  - {type: variant, offset: 53, length: 3, content: 霄白簡, WYG: 之門上皇太皇帝君王尊集群神於其中以定天下萬民之罪福又曰西華堂在上清王母所又曰文德宫張叔隠取之又曰八景城在上清玉晨道君所又曰赤城太元真人所居又曰上清有楊寥殿上皇大帝王尊集郡於真内又曰希琳殿在上清東海八停山上大帝君所居又曰琅玕殿在上清金闕聖君所居又曰上清之境有丹紫臺上皇大帝君尊集處王又曰七靈臺在上清境玉晨道君所居又曰明貞臺在上清境方諸東華山上}
