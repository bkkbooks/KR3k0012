  - {type: variant, offset: 1603, length: 612, content: 以柔弱者苞乎天地萬物夫柔之生剛弱之生強而天下莫能知其根本所從生者乎是故有以無為母無以虛為母虛以道為母自然者道之根本也人能以自然為道真則道可得而通也太上經曰道實無形隱為化本經有文字顯為教端師有形言出處為法語默隨時為存為最期至乎道白經與師師經及道號為三寶又云化本有三道經師也大道無形須經為階經文玄妙非凡所知聖降為師示人旨訣老子云道者萬物之奧善人之寶賢者得之以為真寶愚者得之不敢失道道無常術德無常方神無常體和無常容道為中主與靜為友又曰龍景九文紫鳳赤書經舊文藏在大上六合紫房之內天人侍衛其經太微黃書經曰天真三皇藏八會之文於委羽山太微天帝藏一通於龜山其靈書八會字無正形趣究乎奧難可尋詳得為天書自然至真斯八會之氣全五和之音非淺近者所能洞明天真皇人竭其所見注解其意八會多文者生天立地開化人神萬物之本主召九天上帝校定神仙圖籙政天分度安國息民攝制酆都降魔伏鬼勑命水帝召龍上雲論天地劫期辨聖真名氏所理城臺種種因緣廣宣區別五方元精服御求仙化形之法皆演玄妙自然虛無正真妙趣明了具足也又有玉訣者天真上聖述釋天書八會之文以為正音又有靈圖者玄聖表化示以靈變像形述理令物易悟也玉皇譜籙者眾聖紀述聖君名姓宗本繼嗣神官位緒也誡律者玄聖製勑詮量罪福輕重科條防檢過失也威儀自然經者具示齋戒奉法俯仰進止容式軌範節度也方法者眾聖著述丹藥祕要神草靈芝柔金水玉修養之道也術數者明辨思神存真念道齋心虛志遊空飛步飡吸元和導引三光仙度之法也記傳者眾聖載述學業得道成真證果眾事之跡, SBCK: ''}
