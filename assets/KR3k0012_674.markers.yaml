  - {type: variant, offset: 253, length: 89, content: 崑崙瑤臺西母之宮所謂西瑤上臺天真祕文在其中金書王字上經曰西玄洞臺有金書洞房經又曰骨命已定於玄閣綠字已有生名仙籍故也洞玄經曰有始陽臺在阮樂天中內音書在其上又曰三層玉臺在九天闕之上臺, WYG: 流剛山}
  - {type: variant, offset: 255, length: 1, content: 瑤, SBCK: 山一名昆陵山一名玄圃}
