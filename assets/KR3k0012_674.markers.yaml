  - {type: variant, offset: 2900, length: 796, content: 符空山石函丹臺章玄黃五行天母抱圖者皆不得聞見至道也洞真經曰玉室者三九素語玄丹上化三真洞元之道藏於內又曰高上藏三元玉撿三元布經於其內曲室者太微天帝君祕九丹上仙文之所也元始五老又祕五篇真文於其內又曰東海青華小童治玉革青宮內其東殿架上有寶經三百卷玉訣九千篇主學仙簿籙應為真人者授之玉晨監仙侍郎典之又曰玄靈臺五老寶經及玄母八門金臺玄丹三真洞元之經藏其內又曰九天關臺上有上皇太真高帝玉名及後聖真人簿籙太虛玉晨監典之太洞玉經曰玉晨延以金華之堂太上書以明玉之札又曰龍山是玉清天中高臺名也天帝玉字在其中又曰萬華宮有上帝寶經玉清隱書大洞經曰有玄雲羽室黃老元君經封在其中又曰黃老元君經封在素瑤臺及北寒金臺又曰有聞風玉臺惣司學道仙籍又曰雌一玉檢祕在九天之上大有之名太玄靈臺又曰有混成玉堂大洞真經在其中又曰大洞真經者三五之祕號真道之至精三一之極章並玉清之禁訣高上之祕篇也又太上九真明科經云大洞真經雌一寶經素靈妙經三奇之章高上玉皇寶篇祕在九天之上大有之宮太玄靈臺玉房之中也三籙者眾經之端也金籙黃籙玉籙也夫靈寶經者有內外外教雜教隨人所悟說之不必盡言也趣令前人受悟為限也內教者真一妙術發自內心行善得道非從外來若道可假外而得者便應以道授至真不變湛然常存也三皇經者玉清洞真上清洞玄太清洞神又太極隱注寶訣經云受三洞經當絕人事而行之也惣三洞名太上洞一高上之經矣大洞真經或曰太真道經或曰太清上道觀天內經上清之高旨極真之微辭飛仙之妙經也靈寶經或曰洞玄或云太上昇玄經曰皆高仙之上品虛無之至真大道之幽贊也三皇天文或云洞神或云洞仙或云太上玉策此三洞經符道之綱紀太虛之玄宗上真之首經矣豈中仙之所聞哉又金籙簡文經曰三洞寶經自然天文也又太上太真科經云大化始立人風真淳故三寶度三品人洞神名仙寶之道接三皇之世洞玄名靈寶之道明三才度五帝之世洞真名天寶之道紀清正之方濟三代之後又太上倉元經云三洞經者洞真上清也洞玄靈寶也洞神三皇也又靈書經曰元始以龍漢之年撰, SBCK: ''}
