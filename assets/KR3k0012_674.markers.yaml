  - {type: variant, offset: 2378, length: 2, content: 列紀, SBCK: 仙公又曰羡門今在蒙山大洞黄金之庭受書爲中元仙卿又曰廣漢郡綿竹縣東九里有山昔韓衆於上得仙有大石銅爲誌治應箕􅀫又曰廣漢郡新都縣去成都一百五十里山有芝草神藥前有池水中有神魚五頭昔王方平於此與太上相見治應斗􅀫又曰越雋郡卭都縣有小山大山名􅂪治山其髙無踰伊尹於此學道上有芝英金液草服之度世治應奎􅀫又曰雲臺山有桃一樹三年一花五年一實懸絕無底之谷唯趙昇乃自擲取得桃子餘者無能取之治應胃宿又曰天柱山有玉女乗白鶴仙人乗白鹿在雲臺治前有兩碑又曰玉局治在成都南永壽元年正月七日太上乗白鹿張天師乗白鶴來至此坐局脚玉􅇃即名玉局治應􅀑􅀫又曰鍾山在北海子地隔弱水自生神草仙家種芝課計頃畒如稻􅃺亦有玉石泉上有九源丈人宫主領天下水神又曰扶桑在碧海中大帝宫太眞東主所治處也又曰蓬萊山上有九天眞宫蓋太眞仙人所居玉凉仙山}
