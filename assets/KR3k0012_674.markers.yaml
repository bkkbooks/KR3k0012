  - {type: variant, offset: 2641, length: 258, content: 寔靈文之妙德摽天地之玄根威靈恢廓普加無窮蕩蕩大化為神明之宗其量莫測巍巍太空生天立地開化神明上謂之靈施鎮五岳安國長存下謂之寶靈寶玄妙為萬物之尊又曰太上八威策文今靈寶五符後有一符名太上八威策以制虎豹山精也太上隱書金真玉光經即太上玉晨傳也素靈洞玄大有妙經即西王母傳也玉佩金璫太極金書即扶桑大帝君傳也飛行羽經即中央黃老君傳也太宵隱書瓊文玉章即太帝傳也凡諸傳並有真經或人高而法下或術重而位輕此傳雖有新法以黃庭內經為主是為太極經也赤丹金精石景水母經此似紫文照日精法天皇象符以合元氣黃書赤界長生之要洞真玄經曰無太一金閣五星隱籙後聖, SBCK: 御覽卷第六百}
