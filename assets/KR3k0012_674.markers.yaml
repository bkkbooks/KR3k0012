  - {type: variant, offset: 1509, length: 0, content: '', WYG: 上清玊景宫佩三元布人在其中道迹經曰秀華玉堂五靈真之所處也又曰真堂元始天王太一髙聖君說觀身太戒之所昇𤣥經曰玉清臺仙聖逰衍之所又曰廣漢郡新都縣去城都一百五十里山有芝草神道前有池水中神魚五頭昔王方平於此與太上相見治應斗宿又曰越雋郡卭都縣有小山名濛治山其髙無踰伊尹於此學道上芝英金液草服之度世治應奎宿又曰雲臺山有桃一樹三年一花五年一實懸無底之谷為趙昇乃自鄭鄭取得桃子餘者無能取之治應胃宿又曰天柱山有女乗白鶴仙人乗白鹿在雲臺治前有兩碑又曰玊局治在成都南永壽元年正月七日太上乗白鹿張天師乗白鶴來至此坐局脚玊牀郎名玊局治應鬼宿又曰鍾山在北海子地隔弱水自生神草仙家種芝課計頃畝如稻狀亦有玊石泉上有九元丈人宫主領天下水神又曰扶桑在碧海中大帝宫大眞東王所治處也又曰􅅫萊上有九天真宫蓋大真仙人所居玊京仙山經曰方諸宫青童君治之大丹宫}
