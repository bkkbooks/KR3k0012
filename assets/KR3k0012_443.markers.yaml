  - {type: variant, offset: 3386, length: 1, content: 奇, WYG: 歎曰皆南金也又曰陸華童齕中從兄機稱之為陸氏之寳我家不世之才也又曰禇季野翼從弟弱冠譙國橋彛見而異之曰禇季野有皮裏春秋又曰王敦為太子舍人滎陽潘滔為洗馬見而目之曰處仲蜂目已露但豺聲未振若不噬人亦當為人所噬沈約宋書曰桓𤣥聞義軍起便憂悴無復計或曰劉裕等衆力㣲弱豈便有成陛下何慮之甚𤣥曰劉裕足為一世之雄劉毅家無儋石之儲樗蒲一擲百萬何無忌劉牢之甥酷似其舅共舉大事何慮無成宋書曰謝𢎞㣲童㓜時精神端審時然後言叔父混嘗異}
