  - {type: variant, offset: 2850, length: 229, content: 子崇字季倫苞臨終預分諸子財物獨不及崇其母以為言苞曰此兒雖小大自能得財也又曰魏舒字陽元任城人容貌朴實少號遟鈍人莫之知唯叔父衡知其奇每有賓客己常勸使過舒言吾兄子非常人也虞預晉書曰魏舒少名遟鈍唯太原王又曰卿終當為台輔然亦不能令妻子免飢寒吾當助卿營之常借給舒受而不辭又曰武陔字元夏沛國竹邑人父同有顯名陔及二弟韶茂皆總角見稱時同郡劉公榮名人嘗詣同過陔兄弟與觀其舉動便出語同曰君三子皆國士也元夏量最優出輔佐之風仕官可為亞公叔夏季夏不減常伯納言陔後果開府徐廣晉書曰鄭齊純和, WYG: 孤早}
