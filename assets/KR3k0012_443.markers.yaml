  - {type: variant, offset: 18, length: 1, content: 在, SBCK: 又曰賀循少玩篇籍善屬文􅀶覽衆書尤精禮傳雅有知人之鑒抜同郡楊方於卑陋卒成名於丗又曰應詹鎭南大將軍劉􅀪詹之祖舅也請爲長史謂之曰君器識􅀪􅀷後當代老子於荆南矣乃委以之軍政又曰楊方字公回少好學有異才初爲郡鈐下威儀公事之暇輙讀五經郷邑未之知内史諸葛恢見而竒之待以門人之禮由是始得周旋貴人間又曰郭奕字大業太原陽曲人也少有重名山濤稱其髙簡有雅量爲野王令羊祜嘗過之奕歎曰羊叔子何必減郭大業少選復又歎曰羊叔子去人逺矣遂送祜出界數百里又曰李憙薦樂}
  - {type: page-break, offset: 18, content: '', id: KR3k0012_SBCK_443-1b}
  - {type: variant, offset: 18, length: 1, content: 在, krp: 又曰賀循少玩篇籍善屬文博覽衆書尤精禮傳雅有知人之鑒抜同郡楊方於卑陋卒成名於丗又曰應詹鎭南大將軍劉弘詹之祖舅也請爲長史謂之曰君器識弘深後當代老子於荆南矣乃委以之軍政又曰楊方字公回少好學有異才初爲郡鈐下威儀公事之暇輙讀五經郷邑未之知内史諸葛恢見而竒之待以門人之禮由是始得周旋貴人間又曰郭奕字大業太原陽曲人也少有重名山濤稱其髙簡有雅量爲野王令羊祜嘗過之奕歎曰羊叔子何必減郭大業少選復又歎曰羊叔子去人逺矣遂送祜出界數百里又曰李憙薦樂}
