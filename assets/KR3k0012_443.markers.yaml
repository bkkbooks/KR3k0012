  - {type: variant, offset: 230, length: 288, content: 殺申侯初申侯申出也姊妹之子日出有寵於楚文王文王將死與之璧使行曰唯我知女女專利而不厭予取予求不女疪瑕從我取從我求我不以女為罪後之人將求多於女謂嗣君也求多以禮義大望責之女必不免我死女必速行無適小國將不女容焉政狹法峻既葬出奔鄭又有寵於厲公子文聞其死也曰古人有言曰知臣莫若君弗可改也已又曰晉文公及曹曹共公聞其駢脅欲觀其裸浴薄而觀之薄迫也駢脅合幹僖負羈之妻曰吾觀晉公子之從者皆足以相國若以相若遂以為傅相夫子必反其國反其國必得志於諸侯而誅無禮曹其首也子盍蚤自貳焉自貳自別異於曹乃饋盤飧寘璧焉臣無竟外之交故用盤藏璧飧中不欲令人見也公子受飧反璧又曰秦伯伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟, SBCK: 袤字林叔榮陽開}
