  - {type: variant, offset: 60, length: 168, content: 禮記曰趙文子與叔譽觀乎九原文子曰死者如可作也吾誰與歸叔譽曰其陽處父乎處父字文公之傳也文子曰行并植音特於晉國不沒其身其智不足稱也并專也謂剛而專為狐射姑所殺其咎犯乎文子曰見利不顧其君其仁不足稱也我則隨武子乎利其君不忘其身謀其身不遺其友晉人謂文子其中退然如不勝衣其言吶吶然如不出諸其口所舉於晉國管庫之士七十有餘家生不交利死不屬其子焉春秋僖五年, SBCK: 明又}
