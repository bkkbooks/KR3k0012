  - {type: variant, offset: 3110, length: 3, content: 諷姦雄, WYG: 我為兒時亡伯車騎謂我汝後當與伯父争名汝今器宇宏深亦當名出我右由是少有名望又曰吳隠之字處黙少有孝行遭母憂哀毁過禮時與太常韓康伯隣居伯母語伯曰汝後若居銓衡之職當用如此軰人及伯為吏部尚書因進用之遂厯清顯又曰范汪字𤣥平少失父年六嵗過江依外家庾氏荆州刺史王澄見而竒之以為興范族者}
