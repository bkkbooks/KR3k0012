  - {type: variant, offset: 1170, length: 1, content: 韓, SBCK: 王戎傳云阮籍與渾爲友戎年十五隨渾在郎舎戎少籍二十歳而籍與之交籍每適渾俄頃去過戎良乆然後出謂渾曰濬冲清貴非卿倫也共卿言不如共阿戎譚又曰樂廣字彦輔父方叅魏征西將軍夏侯􅀇軍事廣時年八歳􅀇甞見廣在路因呼與語還謂方曰向見廣神姿朗徹當爲名士卿家雖盆可令專學必能興卿門户也又曰曹攄字顔逺譙國人也祖肇魏將軍攄少有孝行好學善屬文太尉王衍見而器之調􅀘臨淄令又曰潘京舉秀才到洛尚書令樂廣京州人也共談累日深歎其才謂京曰君天才過人恨不學耳􅀂學必爲一代談宗京感其言遂勤學不倦又曰王澄傳云王衍有重名於丗時人許以人倫之鑒尤重澄及王敦􅁃敳常爲天下士目曰阿平第一子嵩第二處仲第三澄嘗謂衍曰兄形似道人而神峯太㑺衍曰誠不如卿落落穆穆然澄由是顯名又曰戴􅀂思徃武陵省父時同郡人潘京素有理鑒名知人其父遣􅀂思就京與語旣而稱􅀂思有公輔之林又曰周顗傳云同郡賈嵩有清操見顗歎曰汝頴固多竒士自湏雅道陵遟今復見周伯仁將振起舊風清我􅀖族矣又曰劉隗伯父訥字令言有人倫鑒識初入洛見諸名士而歎曰王夷甫大鮮明樂彦輔我所敬張茂先我所不解周􅀪武巧於用短杜方叔拙於用長又曰周浚有人倫鑒識其郷人史曜素微賤衆所未知浚獨引之爲友遂以妹妻之曜竟有名於丗又曰阮脩傳云王衍當時談宗自以論易略盡然有所未了研之終莫悟毎云不知此後當見能通之者不衍族子敦謂衍曰阮}
