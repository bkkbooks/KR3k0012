  - {type: variant, offset: 2378, length: 461, content: 許也唯博陵崔州平頴川徐庶與亮友善謂為信然先主屯新野庶見先主器之庶謂先主曰諸葛孔明臥龍也將軍豈願見之先主曰君與俱來庶曰此人可就見不可屈致也將軍宜枉駕顧之由是先主詣亮又曰龐統字士元襄陽人少時樸鈍未有識者頴川司馬微清雅有知人鑒統弱冠往見微微採桑樹上坐統桑下共語自晝達夜微甚異之稱當為南州士人冠冕由是漸顯也吳志曰顧邵字孝則雍長子也年三十七起家為豫章太守小吏姿質佳者令獎就學擇其先進擢置左右職舉善以教風化大行初錢塘丁謂出於役伍陽羨張康生乎民庶烏程吳粲雲陽殷禮起乎微賤邵皆拔而友之謂至典軍中郎康至丹陽禮至零陵令粲至太子少保又曰張溫字惠恕少脩操容貌瓌偉權聞之以問公卿曰溫當今與誰為北大司農劉基曰無可與為輩顧雍曰溫當今無輩權曰如是張允不死也徵到延見文辭占對觀者傾悚權改容加禮又曰張昭字子布為人矜嚴忠謹能識人諸葛恪字元遜年少之時眾人奇其英才昭言終敗葛氏者元遜吳書曰陶謙字恭祖年十四獨帛幡乘竹馬而戲邑中兒童皆隨之蒼梧太守同縣甘公出遇之於塗見其容貌異住車與語甚悅之因許妻以女甘夫人怒曰聞陶家兒遨戲無度如何以女許之甘公曰彼有奇志必大成遂與之後為徐, SBCK: 伯父魏歧}
