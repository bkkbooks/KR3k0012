  - {type: variant, offset: 415, length: 1015, content: 相國若以相若遂以為傅相夫子必反其國反其國必得志於諸侯而誅無禮曹其首也子盍蚤自貳焉自貳自別異於曹乃饋盤飧寘璧焉臣無竟外之交故用盤藏璧飧中不欲令人見也公子受飧反璧又曰秦伯伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽戶而還遂霸西戎用孟明也君子是以知秦穆之為君也舉人之周也與人之壹也壹無二心孟明之臣也其不解也能懼思也子桑之忠也其知人也能舉善也子桑公孫枝舉孟明者詩曰于以采繁于沼于沚于以用之公侯之事秦穆有焉詩國風言沼沚之繁至薄猶采以共公侯以喻秦穆不遺小善夙夜匪懈以事一人孟明有焉詩大雅善仲山角也一人天子也詒厥孫謀以燕翼子子桑有焉詒遺也燕安也翼成也詩大雅美武王能遺其子孫善謀以安成子孫言子桑有舉善之謀又曰晉陽處父聘于衛反過甯甯嬴從之及溫而還其妻問之嬴曰以剛商書曰沈潛剛克高明柔克夫子壹之其不沒乎陽子性純剛天為剛德猶不干時寒暑相順況在人乎且華而不實怨之所藂也言過其行犯而藂怨不可以定身剛則犯人余恐不獲其利而離其難是以去之為六年晉殺處父又曰晉侯觀于軍府見鍾儀問之曰南冠而縶者誰也有司對曰鄭人所獻楚囚也使稅之稅解也召而弔之再拜稽首問其族對曰伶人也伶人樂官公曰能樂乎對曰先父之職官也敢有二事使與之琴操南音南音楚聲公曰君王何如對曰非小人之所得知也固問之對曰其為太子也師保奉之以朝于嬰齊而夕于側也嬰齊令尹子重側司馬子反言其尊卿敬老不知其他公語范文子文子曰楚囚君子也言稱先職不背本也樂操土風不忘舊也稱太子抑無私也舍其近事而遠稱少子以示性所自然明至誠名其二卿尊君也尊晉君也不背本仁也不忘舊信也無私忠也尊君敏也仁以接事信以守之忠以成之敏以行之事雖大必濟言有此四德必能成大事君盍歸之使合晉楚之成公從之重為之禮使歸求成又曰子產始知然明問為政焉對曰視民如子見不仁者誅之如鷹鸇之逐鳥雀也子產喜以語子太叔且曰他日吾見蔑之面而已蔑然明名今吾見其心矣又曰韓宣子如齊納幣見子雅子雅召子旗子旗子雅之子使見宣子曰非保家之主也不臣志氣亢見子尾子尾見疆疆子尾之子宣子謂之如子旗亦不臣大夫多笑之唯晏子信之曰夫子君子也夫子韓起君子有信其有以知之矣為十年齊欒施高疆來奔漢書曰薛宣為丞相而翟方進為司直宣知方進大儒有宰相器深結厚焉後方進竟代為丞相又曰薛宣字貢君初宣察孝廉瑯琊太守趙貢見宣異之令妻子與相見戒曰貢君至丞相我兩子亦中丞相史宣為相除趙貢兩子為史東觀漢記曰上既破邯鄲誅王郎召鄧禹宿夜語曰欲北發幽州突騎諸將誰可使者禹曰吳漢可其人勇鷙有智謀諸將鮮能及者上於是以漢為大將軍漢遂斬幽州牧苗曾上以禹, WYG: 奕}
