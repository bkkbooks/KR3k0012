  - {type: variant, offset: 2655, length: 3, content: 溫當今, WYG: 唐彬初受學於東海閬徳徳門徒甚多獨目彬有廊廟才及彬官成而徳已卒乃為之立碑又曰韋忠年十二䘮父哀慕毁悴杖而後起司空裴秀弔之匍匐號訴哀慟感人秀出而告人曰此子長大必為佳器歸而命子頠造焉又曰沛國戴晞少有才智}
  - {type: variant, offset: 2659, length: 1, content: 誰, WYG: 嵇紹從子含相友善時人許以逺致紹以}
  - {type: variant, offset: 2661, length: 2, content: 北大, WYG: 必不成器晞後為司州主簿以無行被斥州黨稱有知人之明又曰鄭袤字林叔滎陽開封人也髙祖衆漢太}
