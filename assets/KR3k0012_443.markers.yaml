  - {type: variant, offset: 111, length: 168, content: 晉國不沒其身其智不足稱也并專也謂剛而專為狐射姑所殺其咎犯乎文子曰見利不顧其君其仁不足稱也我則隨武子乎利其君不忘其身謀其身不遺其友晉人謂文子其中退然如不勝衣其言吶吶然如不出諸其口所舉於晉國管庫之士七十有餘家生不交利死不屬其子焉春秋僖五年曰鄭殺申侯初申侯申出也姊妹之子日出有寵於楚文王文王將死與之璧使行曰唯我知女女專利而不厭予取予求不女疪瑕, WYG: ''}
