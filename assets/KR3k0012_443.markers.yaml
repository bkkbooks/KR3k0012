  - {type: variant, offset: 1653, length: 830, content: 拜郎中遷玄武司馬寅在職不服父喪帝聞乃歎曰知人則哲惟帝難之信哉斯言以延為明謝承後漢書曰許邵字子將汝南平輿人清論風行高唱草偃多所賞識拔樊子昭於未聞天下咸稱許郭袁山松後漢書曰李膺子瓚位至東平相初曹操微時瓚異其才將沒謂子宣等曰世將亂矣天下英雄無過曹操張孟卓與吾善袁本初汝外親雖爾勿依必歸曹氏諸子從之並免亂世矣又曰南陽何顒初見曹操歎曰漢將亡安天下者必此人也操以是嘉之魏志曰武帝機警有權數時人莫知者橋玄見而異焉謂曰今天下將亂安生民者其在君乎太祖常感其知己後經過玄墓輒悵然致祭又曰王粲字仲宣蔡邕見而奇之時邕才學顯著常車騎填巷賓客盈座聞粲在門倒屣迎之粲年既幼弱容狀短小一座皆驚邕曰此王公孫也有異才媿吾不如也吾家書籍文章盡當與之又曰陳群為童兒時祖晏常異之曰此兒必興吾門群為司空而曹屬時薦樂安王摸下邳周逵者太祖辟之還教以為摸逵穢德終必敗太祖不聽後摸逵皆坐奸宄誅太祖以謝群群薦廣陵陳喬丹陽戴乾太祖皆用之後吳人叛乾忠義死難喬為名臣又曰楊駿字季才司馬宣王年十六七與駿相遇駿曰此非常人也同邵王象少孤特為人僕隸年十七八使牧羊而私讀書駿見美其人質即贖著家中娉妻立屋然與別駿自少及長以人倫自任魏略曰趙歧逃難匿姓名賣餅北海市時安丘孫嵩字賓石遊市見歧察非常人呼與共載歧懼失色嵩乃令騎屏行人從容問曰視子非賣餅者不有重怨即亡命乎北海孫賓石闔門百口勢能相濟歧素聞嵩名即以實告之遂與俱歸藏歧複壁中孫盛魏氏春秋曰嘉平元年右將軍夏侯霸本蜀人問太傅之德霸對曰彼自為家非人臣也問京師雋士對曰有鍾會者若管朝政吳蜀之憂也蜀志曰先主年十五母使學同宗劉德然遼西公孫瓚俱事同郡盧植德然父元起常資給先主與德然等起妻曰各自一家何能常爾耶起曰吾宗中有此非常人也又曰諸葛亮字孔明瑯琊人耕壟畝好為梁父吟自比於管仲樂毅時人莫之許也唯博陵崔州平頴川徐庶與亮友善謂為信然先主屯新野庶見先主器之庶謂先主曰諸葛孔明臥龍也將軍豈願見之先主曰君與俱來庶曰此人可就見不可屈致也將軍宜枉駕顧之由是先主詣亮又曰龐統字士元襄陽人少時樸鈍未有識者頴川司馬微清, WYG: 𫝊}
