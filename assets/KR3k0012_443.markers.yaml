  - {type: variant, offset: 3094, length: 0, content: '', WYG: 又曰王戎傳云阮籍與渾為友戎年十五隨渾在郎舍戎少籍二十嵗而籍與之交籍毎適渾俄頃去過戎良乆然後出謂渾曰濬冲清貴非卿倫也共卿言不如共阿戎譚又曰樂廣字彦輔父方叅魏征西将軍夏侯𤣥軍事廣}
  - {type: page-break, offset: 3094, content: '', id: KR3k0012_WYG_443-3b, image: WYG0897/WYG0897-0083b.png}
  - {type: variant, offset: 3095, length: 1, content: 相, WYG: 年八嵗𤣥嘗見廣在路因呼與語還謂方曰向見廣神姿朗徹當為名士卿家雖貧可令專學必能興卿門戸也又曰曹攄字彦逺譙}
  - {type: variant, offset: 3097, length: 1, content: 掾, WYG: 人也祖肇}
  - {type: variant, offset: 3099, length: 1, content: 諷, WYG: 将軍攄少}
  - {type: variant, offset: 3101, length: 1, content: 盛, WYG: 孝行好學善属文太尉王衍見而器之調補臨淄令又曰潘京舉秀才到洛尚書令樂廣凉州人也共談累日深歎其才謂京曰君天才過人恨不學耳若學必為一代談宗京感其言遂勤學不倦又曰王澄傳云王衍有重}
  - {type: page-break, offset: 3101, content: '', id: KR3k0012_WYG_443-4a, image: WYG0897/WYG0897-0083c.png}
  - {type: punctuation, offset: 3103, content: ，, id: KR3k0012_CHANT_443-bkkpn961}
  - {type: 'tls:seg', offset: 3103, content: '', id: KR3k0012_CHANT_443-33a.8}
  - {type: variant, offset: 3103, length: 0, content: '', WYG: 於世時人許以人倫之鑒尤重澄及王敦庾凱常為天下士目曰阿平第一子嵩第二處仲第三王澄嘗謂衍曰兄形似道人而神峯太雋衍曰誠不如卿落落穆穆然澄由是顯名又曰戴若思往武陵省父時}
  - {type: variant, offset: 3105, length: 0, content: '', WYG: 人潘京素有理鑒名知人其父遣若思就京與語既而稱若思有公輔之才又曰周顗傳曰同郡賁嵩有清操見顗歎曰汝潁固多竒士頃雅道陵遲今復見周伯仁将振起舊風清我邦族矣又曰劉隗伯父納字合言有人倫鑒識初入洛見諸名士而歎曰王夷甫大鮮明樂彦輔我所敬張茂先我所不觧周𢎞武巧於用短杜方叔拙於用長又曰周浚有人倫鑒識其鄉人史曜素㣲賤衆所未知浚獨引之為友遂以妹妻之曜竟有名於世又曰元修傳云王衍當時談宗自以論易畧盡然有所未了研之終莫悟每云不知此後當見能通之者不衍族子敦謂衍曰阮宣子可與言衍曰吾亦聞之但未知其亹亹之處定何如耳及與循談言寡而㫖暢衍乃歎服焉又曰桓􅉓字茂倫庾亮每属彛覔一佳吏部及至都謂亮曰為卿得一吏部矣亮問安在彛曰人所應有而不必有人所應無而不必無徐寕眞海岱清士因為叙之即遷吏部郎又曰謝𤣥時符堅盛邉境數被侵尅朝廷求文武良将可以鎮禦北方者安乃以𤣥應舉中書郎郄超素與𤣥不善聞而歎曰安違衆舉親然𤣥亦必不負舉時咸以為不然超曰吾嘗與𤣥共在桓公府見其使才雖履屐間亦得其}
