  - {type: variant, offset: 44, length: 1, content: 吁, SBCK: 唐彬􅀄受學於東海閬德德門徒甚多獨目彬有廊廟才及彬官成而德巳卒乃爲之立碑又曰韋忠年十二喪父哀慕毀悴杖而後起司空裴秀弔之匍匐號訴哀慟感人秀出而告人曰此子長大必爲佳器歸而命子頠造焉也又曰沛國戴晞少有才智與􅄞紹從子含相友善時人許以逺致紹以爲必不成器晞後爲司州主簿以爲無行􅀍斥州黨稱有}
