  - {type: variant, offset: 1272, length: 4, content: 薛宣為丞, krp: 何充字次道年在童齓伯父邃謂之曰我爲兒時亡伯車騎謂我汝後當與伯父爭名汝今器宇宏深亦當名出我右由是少有名望又曰呉隱之字處默少有孝行遭母憂哀毀過禮時與太常韓康伯鄰居伯母語伯曰汝後若居銓衡之職當用如此軰人及伯爲吏部尚書因進用之遂歷清顯又曰范汪字玄平少失父年六歳過江依外家庾氏荆州刺史王澄見而竒之以爲與范族者必是人也又曰魏徐州刺史吕䖍有佩刀工}
