  - {type: variant, offset: 2130, length: 1, content: 自, SBCK: 之鑒常稱爲千里駒也陳書曰杜之偉強識俊才頗有名當丗吏部尚書張瓉􅀷知之以爲廊廟器也又曰陸慶永陽王爲呉郡太守聞其欲與相見慶固辭以疾時宗人陸榮爲郡五官慶嘗詣焉王乃微服徃榮舎穿壁以觀之王謂榮曰觀陸慶風神凝峻殆不可測嚴君平鄭子眞何以尚兹北史曰于謹南伐江陵以唐瑾爲元帥府長史及軍還諸將多因虜掠大獲財物瑾一無所取唯得書兩車載之以歸或言於周文曰唐瑾大有輜重悉是梁朝珍玩周文􅀄不之信然欲明其實密遣使檢閱唯見墳籍而已乃歎曰􅀌知此人來二十許年耳其不以利汚義向􅀂不令撿視恐常人有投杼之疑􅀌所以益明之耳凡受人委}
