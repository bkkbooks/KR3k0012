  - {type: variant, offset: 3471, length: 67, content: 輩宜束之高閣候天下太平然後議所任耳見桓溫總角之中便期之以遠略因言於成帝曰桓溫有英雄之才願陛下勿以常輩畜之宜委以方部之任必有弘濟艱難之勳, WYG: 足矣}
  - {type: punctuation, offset: 3477, content: ，, id: KR3k0012_CHANT_443-bkkpn1074}
  - {type: 'tls:seg', offset: 3477, content: '', id: KR3k0012_CHANT_443-37a.17}
  - {type: punctuation, offset: 3482, content: ，, id: KR3k0012_CHANT_443-bkkpn1075}
  - {type: 'tls:seg', offset: 3482, content: '', id: KR3k0012_CHANT_443-37a.18}
  - {type: variant, offset: 3482, length: 236, content: 然後議所任耳見桓溫總角之中便期之以遠略因言於成帝曰桓溫有英雄之才願陛下勿以常輩畜之宜委以方部之任必有弘濟艱難之勳又曰謝安常疑劉牢之不可獨任又知王味之不宜專城牢之既以亂終而味之亦以貪敗由是識者服其知人又陶侃傳曰劉弘為荊州刺史將之官辟侃為南蠻長史遣先向襄陽討賊張昌破之弘既至謂侃曰吾昔為羊公參軍語吾其後當居此今相觀察必繼老夫矣又曰時豫章郎中令楊晫陶侃州里人也為鄉論所歸侃詣之晫曰易稱貞固足以幹事陶士行是也與同乘見中書郎顧榮榮甚奇之吏部郎溫雅謂晫曰奈何與小人共載晫曰此人非凡器也, SBCK: 御覽卷第四百四十三}
