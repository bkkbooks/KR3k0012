  - {type: variant, offset: 969, length: 198, content: 知其他公語范文子文子曰楚囚君子也言稱先職不背本也樂操土風不忘舊也稱太子抑無私也舍其近事而遠稱少子以示性所自然明至誠名其二卿尊君也尊晉君也不背本仁也不忘舊信也無私忠也尊君敏也仁以接事信以守之忠以成之敏以行之事雖大必濟言有此四德必能成大事君盍歸之使合晉楚之成公從之重為之禮使歸求成又曰子產始知然明問為政焉對曰視民如子見不仁者誅之如鷹鸇之逐鳥雀也子產喜以語子太叔且曰他日吾見蔑之面而已蔑然明名今吾見其心, SBCK: 亡}
