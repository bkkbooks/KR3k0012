  - {type: variant, offset: 3541, length: 1, content: 安, WYG: 𢎞㣲叔父混尚晋陵公主髙祖受命晋陵公主降東鄉君以混得罪前代東鄉君節義可嘉聴還謝氏自混亡至是數載而室宇修整倉廪充盈門徒業使不異平日田疇墾闢有加於舊東鄉君歎曰僕射平生重此子可謂知人僕射為不亡矣又曰袁淑字陽源陳郡陽夏人丹陽尹豹少子也少有風格年數嵗伯湛謂家人此非凡児齊書曰随郡王子􅂭能属文明帝謂儉曰我家東阿也儉曰東阿重出實為皇家藩屏又曰徐孝嗣姑適東莞劉舍舍兄藏為尚書左丞孝嗣往詣之藏退語舍曰徐即是令僕人三十餘可知矣汝冝善自結又曰江斆為丹陽丞時袁粲為尹見斆嘆曰風流不墜正在江郎數與宴賞流連日夜蕭子顯齊書曰禇淵字彦囬河南陽翟人也父卒悉推財與弟唯取書數千卷初與從弟炤同載道遇太祖淵舉手指太祖車謂炤曰此非}
  - {type: page-break, offset: 3541, content: '', id: KR3k0012_WYG_443-8a, image: WYG0897/WYG0897-0085c.png}
  - {type: page-break, offset: 3541, content: '', id: KR3k0012_WYG_443-8b, image: WYG0897/WYG0897-0085d.png}
  - {type: variant, offset: 3543, length: 4, content: 疑劉牢之, WYG: 人将來}
  - {type: variant, offset: 3549, length: 0, content: '', WYG: 測梁書曰沈瑀起家州從事奉朝請嘗詣齊尚書右丞殷濔濔與語及政事甚器之謂曰觀卿才幹當居我此職又曰范述曽字子𤣥吳郡錢塘人也好學從餘杭吕道惠受五經略通章句道惠學徒常有百數}
  - {type: variant, offset: 3550, length: 0, content: '', WYG: 稱述曽曰此子必為王者師又曰賀琛字國寳㑹稽山隂人也伯父瑒歩兵校尉為世碩儒琛㓜瑒授其經業一聞便通義理瑒異之常曰此兒當以明經致貴又曰臧質㓜從徴士瑯琊諸葛璩受五經通章句璩學徒常有數十百人質處其間無所狎比璩異之歎曰此生重器王佐才也又曰賀瑒時沛國劉瓛為㑹稽府丞見瑒深器異之嘗與俱造吳郡張融指瑒謂融曰此生神明聰敏将來當為儒者宗又曰丘仲孚字公信吳興烏程人也少好學從祖靈鞠有人倫之鑒嘗稱為千里駒陳書曰杜之偉強識俊材頗有名當世吏部尚書張瓉深知之以為廊廟器又曰陸慶永陽王為吳郡太守聞其名欲與相見慶固辭以疾時宗人陸榮為郡五官慶嘗詣焉王乃㣲服過榮舍穿壁以觀之王謂榮曰觀陸慶風神凝峻殆不可測嚴君平鄭子真何以尚兹北史曰于謹南伐江陵以唐瑾為元帥府長史及軍還諸将多因擄掠大獲財物瑾一無所取唯得書兩車載之以歸或言於周文曰唐瑾大有輜重悉是梁朝珍玩周文初不之信然欲明其實宻遣使檢閲唯見墳籍而已乃歎曰孤知此人來二十許年矣必不以利汚義向若不令檢視恐常人有投杼之疑孤所以益明之耳凡受人委}
  - {type: page-break, offset: 3550, content: '', id: KR3k0012_WYG_443-9a, image: WYG0897/WYG0897-0086a.png}
  - {type: page-break, offset: 3550, content: '', id: KR3k0012_WYG_443-9b, image: WYG0897/WYG0897-0086b.png}
