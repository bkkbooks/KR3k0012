  - {type: variant, offset: 2133, length: 1, content: 略, SBCK: 任城王諧薦李德林因遺尚書令楊遵彦書云燕趙固多竒士此言誠不爲謬今歳所貢秀才李德林者文章學識固不待言觀其風神器宇終爲棟梁之用至如經國大體是賈生晁錯之儔彫蟲小􅇊殆相如子雲之軰今雖唐虞君丗俊乂盈朝然脩大厦豈厭夫良材之積也吾甞見孔文舉薦祢衡表云洪水撗流帝思俾乂以正平比夫大禹常謂擬諭非倫今以德林言之便覺前言非大又}
