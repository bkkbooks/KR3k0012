  - {type: variant, offset: 2665, length: 174, content: 劉基曰無可與為輩顧雍曰溫當今無輩權曰如是張允不死也徵到延見文辭占對觀者傾悚權改容加禮又曰張昭字子布為人矜嚴忠謹能識人諸葛恪字元遜年少之時眾人奇其英才昭言終敗葛氏者元遜吳書曰陶謙字恭祖年十四獨帛幡乘竹馬而戲邑中兒童皆隨之蒼梧太守同縣甘公出遇之於塗見其容貌異住車與語甚悅之因許妻以女甘夫人怒曰聞陶家兒遨戲無度如何以女許之甘公曰彼有奇志必大成遂與之後為徐, WYG: 父㤗揚}
