  - {type: punctuation, offset: 3551, content: ，, id: KR3k0012_CHANT_443-bkkpn1091}
  - {type: 'tls:seg', offset: 3551, content: '', id: KR3k0012_CHANT_443-38a.4}
  - {type: variant, offset: 3551, length: 0, content: '', WYG: 當如此也隋書曰魏任城王楷薦李徳林因遺尚書令楊遵彦書云燕趙固多竒士此言誠不為謬今嵗所貢秀才李德林者文章學識固不待言觀其風神器宇終為棟梁之用至如經國大體是賈生晁錯之儔雕蟲小技殆相如子雲之軰今雖唐虞君世俊乂盈朝然修大厦豈厭夫良材之積也吾嘗見孔文舉薦禰衡表云洪水横流帝思俾乂以正平比夫大禹常謂擬諭非倫今以徳林言之便覺前言非大}
  - {type: page-break, offset: 3551, content: '', id: KR3k0012_WYG_443-10b, image: WYG0897/WYG0897-0086d.png}
  - {type: page-break, offset: 3551, content: '', id: KR3k0012_WYG_443-11a, image: WYG0897/WYG0897-0087a.png}
  - {type: variant, offset: 3552, length: 0, content: '', WYG: 曰楊素少落拓有大志不拘小節世人多未之}
  - {type: variant, offset: 3553, length: 0, content: '', WYG: 唯從叔祖魏尚書僕射寛深異之每謂子孫曰處道當逸羣絶倫非常之器非汝曹所逮也又曰柳荘少有逺量愽覧墳集兼善辭令濟陽蔡大寳有重名於江左時為岳陽}
  - {type: variant, offset: 3554, length: 1, content: 味, WYG: 蕭詧諮議見荘便歎曰襄陽水鏡在於兹矣大寳遂以女妻}
  - {type: variant, offset: 3556, length: 0, content: '', WYG: 又曰髙構河東薛道衡材髙大當世每稱構有清鍳所為文筆必先以草呈構有所詆訶道衡未嘗}
  - {type: variant, offset: 3557, length: 8, content: 宜專城牢之既以亂, WYG: 嗟伏大業七年}
  - {type: page-break, offset: 3557, content: '', id: KR3k0012_WYG_443-11b, image: WYG0897/WYG0897-0087b.png}
