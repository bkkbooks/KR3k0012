  - {type: variant, offset: 30, length: 80, content: 難之言堯亦以知人安民為難故曰吁知人則哲能官人安民則惠黎民懷之禮記曰趙文子與叔譽觀乎九原文子曰死者如可作也吾誰與歸叔譽曰其陽處父乎處父字文公之傳也文子曰行并植音特, WYG: 曽祖既長遂􅀶學逹}
