  - {type: variant, offset: 1594, length: 202, content: 功曹鄧寅以外戚小侯每豫朝會而容姿趍步有出於眾顯宗目之顧左右曰朕之儀貌豈若此人特賜輿馬之服延以寅雖有容儀而無實行未嘗加禮拜郎中遷玄武司馬寅在職不服父喪帝聞乃歎曰知人則哲惟帝難之信哉斯言以延為明謝承後漢書曰許邵字子將汝南平輿人清論風行高唱草偃多所賞識拔樊子昭於未聞天下咸稱許郭袁山松後漢書曰李膺子瓚位至東平相初曹操微時瓚異其才將沒謂子宣等曰世將亂矣天下英雄無過曹操張孟卓與吾善袁本初汝外親雖爾勿依必歸曹氏諸子, SBCK: 翼}
