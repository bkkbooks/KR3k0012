  - {type: variant, offset: 2885, length: 595, content: 又曰魏舒字陽元任城人容貌朴實少號遟鈍人莫之知唯叔父衡知其奇每有賓客己常勸使過舒言吾兄子非常人也虞預晉書曰魏舒少名遟鈍唯太原王又曰卿終當為台輔然亦不能令妻子免飢寒吾當助卿營之常借給舒受而不辭又曰武陔字元夏沛國竹邑人父同有顯名陔及二弟韶茂皆總角見稱時同郡劉公榮名人嘗詣同過陔兄弟與觀其舉動便出語同曰君三子皆國士也元夏量最優出輔佐之風仕官可為亞公叔夏季夏不減常伯納言陔後果開府徐廣晉書曰鄭齊純和有識初荀攸見齊曰鄭公業為不亡矣時相國掾魏諷有盛名同郡任覽謂齊曰諷姦雄必以禍終子宜絕之後諷果敗司空王朗辟掾委以求才齊舉高陽許允扶風魯芝東萊王基並為名臣又曰魏謁者郭玄信出使從弘農求御人遣石苞及鄧艾為御行十餘里玄信謂二人曰子並當至將相既而苞為縣吏到鄴賣鐵于市長趙元儒異之曰公輔才也遂與交稍遷至弘農司馬欲求縣吏部郎許允謂苞曰君我輩人也當相引置朝廷何欲小縣乎苞還歎不意允之知己晉書陶侃傳曰樂廣欲會荊楊士人武庫令黃慶進侃於廣人或非之慶曰此子終當遠到復何疑也又曰王導少有風鑒識量清遠年十四陳留高士張公見而奇之謂其從兄敦曰此兒容貌志氣將相之器也又石苞傳曰趙元儒有知人鑒見苞異之因與結交歎苞遠量當至公輔又曰陸雲幼時吳尚書廣陵閔鴻見而奇之曰此兒若非龍駒當是鳳鶵又曰劉裕為布衣眾未之識也唯王謐獨奇貴之嘗謂裕曰卿當為一代英雄晉書曰庾翼字稚恭風儀俊偉少有經綸大略京兆杜乂陳郡殷浩並才名冠世而翼弗之重也每語人曰此輩宜束之高閣候天下, SBCK: ''}
