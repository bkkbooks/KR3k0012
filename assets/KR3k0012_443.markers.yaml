  - {type: variant, offset: 648, length: 185, content: 焉詩大雅善仲山角也一人天子也詒厥孫謀以燕翼子子桑有焉詒遺也燕安也翼成也詩大雅美武王能遺其子孫善謀以安成子孫言子桑有舉善之謀又曰晉陽處父聘于衛反過甯甯嬴從之及溫而還其妻問之嬴曰以剛商書曰沈潛剛克高明柔克夫子壹之其不沒乎陽子性純剛天為剛德猶不干時寒暑相順況在人乎且華而不實怨之所藂也言過其行犯而藂怨不可以定身剛則犯人余恐不獲其利而離其難是以去之為六年晉殺處父又曰晉侯觀于軍府, SBCK: 識鑒荀攸}
