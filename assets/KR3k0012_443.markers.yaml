  - {type: variant, offset: 1174, length: 3, content: 齊納幣, SBCK: 耳及與循談言寡而㫖暢衍乃歎服焉又曰桓彛字茂倫􅁃亮毎屬彛覔一佳吏部及至都謂亮曰爲卿得一吏部矣亮問安在彛曰人所應有而不必有人所應無而不必無徐寜眞海岱清士因爲叙之即遷吏部郎又曰謝􅀇時符堅強盛邊境數􅀍侵冠朝廷求文武良將可以鎭禦北方者安乃以􅀇應舉中書郎郗超素與􅀇不善聞而歎曰安違衆舉親然􅀇亦必不􅀒舉時咸以爲不然超曰吾嘗與􅀇共在桓公府}
