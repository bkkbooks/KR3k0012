  - {type: variant, offset: 2400, length: 518, content: 志曰豹有赤豹南山有玄豹南多赤豹狐死首丘豹死首山是性之異也詩義䟽曰毛赤而文黑謂之赤豹毛白而文黑謂之白豹也帝王世紀曰紂為王者箕子曰王箸必食熊蹯豹胎散宜生獻紂黑豹孫氏瑞應圖曰文王拘於羑里散宜生於懷塗山得玄豹以獻紂免西伯之難莊子曰夫豐狐文豹棲於山林處於巖穴靜也夜行晝居戒也然不免於網羅之患是何罪之有其皮為之災也管子曰武王為侈靡令人貂襜豹裘方得入廟故豹皮百金臣家糶千鍾未得一豹皮韓子曰虎豹不用爪牙與鼷鼠同威文子曰虎豹之文來射猨狖之捷來格淮南子曰蝟使虎申蛇令豹止物有所制也又曰高山險阻深林榛薄藂木曰榛深草曰薄虎豹之樂也人入之而畏川谷通源積水重淵黿鼉之所便也人入之而死范子計然曰豹皮出南郡雜道書曰南海愽羅縣有羅山高入雲霧諸仙人所遊之山也上有豹獸似猴猴南海人名之為累下洞冥記曰青豹出浪坂之山狀如虎色如翠殺之為脯食之不飢馮邪說鄧禹書曰夫虎豹愛大林蛟龍愛大水列女傳曰陶荅子妻曰妾聞南山有文豹霧雨七日不下食者何也欲以澤其衣毛而成其文章也後秦記曰狄伯奇少曾遊獵得豹見其文采炳煥遂自感歎始學書藝林邑國記曰西南界有唼臈蟲食死人肉豹皮覆尸畏而不來謝朓詩曰雖無玄豹姿且隱南山霧晉中朝大駕鹵簿曰豹尾車駕一蘭臺符節令史載自豹尾後徐廣車服注曰乘輿之後有屬車最後一車懸豹尾駮爾, WYG: ''}
