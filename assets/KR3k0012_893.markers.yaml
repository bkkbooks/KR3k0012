  - {type: variant, offset: 2117, length: 341, content: 士殺虎如何子曰捉虎尾子路出尾棄之懷石盤曰夫子知虎在水而使我取水是欲殺我也乃欲殺夫子問曰上士殺人云何曰用筆端中士殺人云何曰用言語下士殺人云何曰用石盤子路乃棄石盤而行國史補曰裴旻為龍華軍使守北平北平多虎旻善射常一日斃虎三十有一既而息於山下四顧自若有父老至曰此皆彪似虎而非將軍若遇真虎無能為也旻曰真虎安在父老曰自此而北三十里往往有之旻躍馬而往果有一虎騰出狀小而勢猛據地一吼山石震烈旻擗易弓矢皆墜殆不得免自此慚懼不復射虎吳氏虎賦曰蓋其狀也誕節緩腕續背連骸細腰鼓胸方口大鼻似黼組雜間若錦繡相連豹說文曰豹似虎周易革卦曰上六君子豹變小人革面象曰君子豹變其文蔚也小人革面順以從君也廣志曰豹有赤豹南山有玄豹南多赤豹狐死首丘豹死首山是性之異也詩義䟽曰毛赤而文黑謂之赤豹毛白而文黑謂之白豹也帝王世紀曰紂為, SBCK: ''}
