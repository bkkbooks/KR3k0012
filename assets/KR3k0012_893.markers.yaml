  - {type: variant, offset: 952, length: 6, content: 即能跳透噬逐, WYG: 唐侯曰寡人之過也二三子無辱皆賞之又定傳曰衞公子地有白馬四公嬖向魋向魋欲之公取而朱其尾鬛以與之地怒使其徒抶魋而奪之魋懼將走公閉門而泣之目盡腫糓梁傳僖公曰晉獻公將伐虢荀息請以屈産之乗垂棘之璧假道於虞公曰此晉寶也荀息曰是取中府藏外府取中廐藏外廐也晉舉虞荀息牽馬操璧而前曰璧猶是也馬齒長矣周禮夏官下曰校人掌王馬之政辨六馬之屬種馬一物戎馬一物齊馬一物道馬一物田馬一物駑馬一物天子十有二閑馬六種邦國六閑馬四種家四閑馬二種凡馬特居四之一春祭馬祖執駒夏祭先牧頒馬攻特秋祭馬社臧僕冬祭馬步獻馬講馭夫凡大祭祀朝覲㑹同毛馬而頒之餙幣馬執扑而従之凡賓客受其幣馬大喪飾遣車之馬及𦵏埋之田獵則帥驅逆之車凡將事扵四海山川則餙黄駒凡國之使者共其弊馬凡軍事物馬而頒之又夏官下曰趣馬掌贊正良馬而齊其飲食簡其六節掌駕説之頒辨四時之居治以聼馭夫巫馬掌養疾馬而乗治之相醫而藥攻馬疾受財于校人馬死則使其賈粥之入其布于校人}
