  - {type: variant, offset: 26, length: 8, content: 為降虜繩縛我急獨, WYG: 場藿縶之維之以永今夕皎皎白駒在彼空谷生芻一束其人如玉左傳僖十五年曰秦晉戰于韓晉惠公乗小駟鄭入也慶鄭曰古者大事必乗其産生其水土而知其人心安其教訓而服習其道惟所納之無不如志今乗異産以従戎事及懼而變將與人易亂氣狡憤隂血周作張脈僨興外彊中乾進退}
