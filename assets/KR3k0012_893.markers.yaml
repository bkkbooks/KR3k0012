  - {type: variant, offset: 1080, length: 7, content: 扶南王范尋常畜, SBCK: 大夫士卒下公門式路馬乗路馬必朝服歩路馬必中道蹙路馬芻有誅路馬死埋之以帷詩國風卷耳曰陟彼崔嵬我馬虺隤又曰陟彼髙岡我馬􅀇黄虺隤􅀇黄皆病又魯頌曰駉頌僖公也僖公能遵伯禽之法務農重榖牧于垧野而史克作是頌史克魯人也駉駉牡馬在垧之野駉駉良馬也垧逺野也薄言駉者有驈有皇有驪有黃以車彭彭驪馬白跨曰驈黃白曰皇純黒曰驪黄騂曰黄彭彭有容力也駉駉牡馬在坰之野薄言駉者有騅有駓有騂有騏以車伾伾倉白􅄂毛曰騅黄白雜毛曰駓赤黄曰騂倉祺曰騏伾伾有力也駉駉牡馬在坰之野薄言駉者有驒有駱有駵有雒以車繹繹青驪驎曰驒白馬黒折曰駱赤身黒曰駵黒身白曰駱繹繹善走也駉駉牡馬在坰之野薄言駉者有駰有騢有驔有魚以車祛祛隂白􅄂毛曰駰彤白􅄂毛曰騢豪骭曰驔二目白曰魚祛祛彊徤也又曰叔于田乗乗馬執轡如組兩驂如舞叔于田乗乗黃四馬皆黄兩服上襄兩驂鴈行又白駒曰皎皎白駒食我􅂣藿縶之維之以永今夕皎皎白駒在彼空谷空大}
