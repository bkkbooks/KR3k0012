  - {type: variant, offset: 1883, length: 233, content: 三尺布巾一赤雄雞一斗酒受此法俗說曰桓石虎是桓征西兒未被舉時西出獵石虎亦從獵圍中射虎虎被數箭伏在地諸將請石虎曰惡郎能拔虎箭不石虎小名惡子荅曰可拔耳惡子於是逕至虎邊便拔得箭虎跳越惡子亦跳跳乃高虎跳虎還伏惡子持箭便還又曰齊沈僧照別名法朗攸之之孫也記人吉凶頗有應驗嘗校獵中道而還左右問何故荅曰國家有邊事須還處分問何以知之曰向聞南山虎嘯知耳俄而使至金樓子曰孔子遊舍於山使子路取水逢虎於水與共戰攬尾得之內於懷還問子曰上士殺虎如何子曰上士殺虎持虎頭又問中士殺虎如何子曰中士捉耳又問, SBCK: 理天}
