  - {type: variant, offset: 443, length: 634, content: 鶖少焉化為虎周景式廬山記曰有嫗事康王廟林中有一虎祠祭輒以餘肉及骨與之有人惡畏之嫗使避之人去復來陳留耆舊傳曰王業字子春為荊州刺史有德政卒於支江有三白虎低頭曳尾宿衛其側及喪去踰州境忽然不見民共立碑文號曰支江白虎竹林七賢論曰王戎幼而清秀魏明帝時於宣武場上為欄鬥虎使力士逆與之搏縱人觀之戎年七歲亦往觀焉虎乘間薄欄而吼其聲震地觀者無不僻易顛仆戎安然不動帝於閣上見之使問姓名而異焉殷氏世傳曰亮字子華少學公羊十四傳祖父業多所綜覽舉孝廉到陽城遇虎爭一羊亮乃按劍瞋目斬羊腹虎乃各以其半羊去述異記曰漢中有虎生角道家云虎千歲則牙蛻而角生漢宣城郡守封邵一日忽化為虎食郡民民呼曰封使君因去不復來故時人語曰無作封使君生不治民死食民異苑曰太元末徐桓出門仿佯見一女子因言曲相調便要桓入草中桓說其色乃隨去女子忽然變成虎負桓著背上逕向深山其家左右尋覔唯見虎跡旬日虎夜送徐桓著門外又曰樊陽鄭襲太元中為廣陵太守閤下騶忽如狂奄失其所經日裸身吟呼膚血流灕問其意故云社公命令作虎以班皮衣之辭以執鞭之士不堪虓躍神怒還便剝皮皮以著肉瘡毀慘痛旬日乃差又曰都陽桓闡以太元十九年殺犬祭鄉里綏山煮肉不熟神怒即下教於巫曰桓闡以生肉貽我當謫令自食也其年便作虎作虎之始見人以班衣衣之即能跳透噬逐又曰彭城劉黃雄以太元中為京佐被使還都路經竹里停於邏宿此邏多虎劉極自防衛繫馬於戶前手刀布於地上宵中士庶同睡虎乘間跳入獨取劉而去又曰邵都梁馮恭永初中醉臥於山路夜有虎來以頭枕其背恭中宵展轉之以手搏之復大寢向曉始醒猶見虎蹲在腳後若有宿命非智力所加, SBCK: 螻蛄奥}
