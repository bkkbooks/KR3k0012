  - {type: variant, offset: 1186, length: 1127, content: 者何常穴壁作溺穴其夜趨穴欲溺虎忽囓斷陰莖即死又曰晉孝武帝母李太后本賤人簡文無子曾遍令善相者相宮人李太后給皂役不豫焉相者指之此當生貴子而有虎厄帝因幸之生孝武及會稽王道子既登尊位服相者之驗而怪有虎害且生所未見乃令人畫作虎象因以手撫欲打虎戲便患手腫痛遂以疾崩神仙傳曰介象入山冀遇神仙臥石上有一虎往砥象額寤而見虎謂虎曰天使汝來侍衛我者汝且停若山神使汝來試我者汝自去虎乃去搜神記曰蘇易者廬陵婦人善看產夜忽為虎所取行六里至大曠見有牝虎當產不得解匍匐欲死輒仰視易悟之乃為探出之有三子生畢虎負易送還并送野肉於門內又曰漢江之域貙人能化為虎長沙居民作檻捕虎檻發明日眾人共往格之見一亭長赤幘大冠在檻中坐民問君何以入此中亭長大怒曰昨被縣召夜避雨誤入此中急出我民曰君見召當有文書即出懷中召文書於是出之尋視之化為虎即上走續搜神記曰丹陽縣人沈宗居在縣下以卜為業義熙中左將軍檀侯鎮姑熟好獵以格虎為事忽有一人著皮袴乘烏馬從者一人亦著皮袴以紙裏十餘錢來詣宗卜云西去覔食好東去覔食好宗為作卦卦成告之東向吉西向不利因就宗乞飲內口著甌中狀如牛飲既出門東行百步從者及馬皆化虎自此以後暴虎非常又曰吳猛有道術同縣鄒惠政迎猛夜於家中庭燒香忽有虎來抱政兒超籬去猛語云無所苦須臾果還云虎將去數十步忽然復送歸政遂精進為道士又曰尋陽縣北山中蠻人有術能使人化為虎毛色牙瓜悉如真爾鄉人前將軍周眕有奴使入山伐薪奴有婦及妹亦俱行既至奴語二人云且高樹上視我所為如其言既而入草須臾見一黃班虎從草中出奮迅吼喚甚為可畏少時復為人奴語二人曰歸家慎勿道後向等輩說之周得知飲淳酒令熟醉使人解其衣服及身體唯於髻髮中得一紙畫作大虎邊有符周密取錄之奴既醒喚問之事已露遂具說有術其以三尺布巾一赤雄雞一斗酒受此法俗說曰桓石虎是桓征西兒未被舉時西出獵石虎亦從獵圍中射虎虎被數箭伏在地諸將請石虎曰惡郎能拔虎箭不石虎小名惡子荅曰可拔耳惡子於是逕至虎邊便拔得箭虎跳越惡子亦跳跳乃高虎跳虎還伏惡子持箭便還又曰齊沈僧照別名法朗攸之之孫也記人吉凶頗有應驗嘗校獵中道而還左右問何故荅曰國家有邊事須還處分問何以知之曰向聞南山虎嘯知耳俄而使至金樓子曰孔子遊舍於山使子路取水逢虎於水與共戰攬尾得之內於懷還問子曰上士殺虎如何子曰上士殺虎持虎頭又問中士殺虎如何子曰中士捉耳又問下士殺虎如何子曰捉虎尾子路出尾棄之懷石盤曰夫子知虎在水而使我取水是欲殺我也乃欲殺夫子問曰上士殺人云何曰用筆端中士殺人云何曰用言語下士殺人云何曰用石盤子路乃棄石盤而行國史補曰裴旻為龍華軍使守北平北平多虎旻善射常一日斃虎三十有一既而息於山下四顧自若有父老至曰此皆彪似虎而非將軍若遇真虎無能為也旻曰真虎安在父老曰自此而北三十里往往有之旻躍馬而往果有一虎騰出狀小而勢猛據地一吼山石震烈旻擗易弓矢皆墜殆不, WYG: 救}
