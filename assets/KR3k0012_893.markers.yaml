  - {type: variant, offset: 1225, length: 3, content: 曾遍令, SBCK: 之路車乗馬喪紀之馬啓後所薦焉廞馬亦如之廞馬遣車之馬人棒之赤牽而入陳又夏官上曰馬質掌質馬馬量三物一曰戎馬二曰田馬三曰駑馬皆有物賈此三馬買以給官府之使無種也鄭司農曰皆有物賈皆有物色及賈直網惡馬鄭司農云網讀爲以亢其讎之亢書亦或爲亢亢御也禁也禁去惡馬不畜也玄謂網以縻索維網狎習之凡受馬於有司者書以齒毛與其賈馬死則旬之內更旬之外入馬耳以其物更外其否鄭司農云更謂償也􅀇謂旬之内死者償以齒毛與賈受之日淺養之惡也旬之外死入馬耳償以毛色不以齒賈任之過其任也其外否旬之外踰二十日而死不任用非用者罪馬及行則以任齊其行識其所載輕重及道里齊其勞逸乃復用之􅀂有馬訟則聽之訟謂賣買之言相􅀒禁原􅁞者原再也天文辰爲馬􅁞書􅁞爲龍精月直大火則浴其種是􅁞與馬同氣物莫能兩大禁再蠶者爲傷馬與論語曰齊景公有馬千駟死之日民無德而稱焉又憲問曰􅂹不稱其力稱其德也􅂹古之}
