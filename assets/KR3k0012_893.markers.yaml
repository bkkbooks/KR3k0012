  - {type: variant, offset: 9, length: 8, content: 曹公擒呂布顧劉備, SBCK: 始駕馬反之車在馬前又内則}
  - {type: variant, offset: 9, length: 1, content: 曹, WYG: 月令孟春之月天子駕蒼龍孟夏之月天子駕赤駵孟秋之月天子駕白駱孟冬之月天子駕鐵驪又學記曰始駕馬者反之車在馬前又内則曰馬黑脊而般臂漏又曰大夫士下}
