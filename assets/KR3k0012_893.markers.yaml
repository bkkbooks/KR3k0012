  - {type: variant, offset: 98, length: 344, content: 諫權謝昭曰年少慮事不遠然猶不能已乃作射虎車又曰孫權親乘馬射虎庱亭慶音攄淩馬為所傷權投以雙戟虎即廢魏名臣奏曰世祖時有獻虎者問虎何食對曰食肉詔曰下民厭糠何忍以肉食虎乃命虎賁射之斯實得計於時而名垂於後晉令曰諸有虎皆作檻穽籬柵皆施餌捕得大虎賞絹三疋虎子半之魏略曰文帝欲受禪郡國奏白虎二十七見博物志曰江陵有人化為虎俗云猛虎化為人好著紫葛衣足無踵有五指者人化為虎又曰虎知衝破又能畫地卜今人有畫物上下者推其奇偶謂之虎卜孝子傳曰楊香其父為虎噬忿憤搏之父免害又曰郭文舉為虎探鯁骨虎常衘鹿以報之括地圖曰越俚之民老者化為虎王孚安成記曰平都區寶者後漢人居父喪鄰人格虎虎走趨其孤廬中即以蓑衣覆藏之鄰人尋跡問寶寶曰虎豈有可舍而藏之乎此虎後送禽獸以助寶祭孝慈之志通於神明由是知名裴淵廣州記曰興寧縣義熙四年忽有數十大鳥大, SBCK: 般臂漏漏當爲螻}
