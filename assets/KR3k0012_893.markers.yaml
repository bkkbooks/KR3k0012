  - {type: variant, offset: 1221, length: 0, content: '', krp: 未聞夏通淫之後攻其特爲其蹄不可乗用鄭司農云攻特謂騬之秋祭馬社臧僕馬社始乗馬者丗夲作曰相士作乗馬鄭司農云臧僕謂}
  - {type: variant, offset: 1222, length: 1, content: 文, SBCK: 練馭者令皆善也玄謂僕馭五路之僕冬􅀕馬歩獻馬講馭夫馬歩神爲災害馬者献馬見成馬於王也馭夫馭貳車從車使車者也講猶簡習凡大􅀕祀朝覲會同毛馬而頒之毛馬齊其色也頒授當乗之飾幣馬執朴而從之鄭司農云校人主飾之也幣馬以馬遺人當幣處者也聘禮曰馬則北靣奠幣于其前士喪礼下篇曰薦馬纓三就入門北靣交轡圉人夾牽之馭者執榮立于馬後凡賔客受其幣馬賔客之幣馬來朝聘而享王者大喪飾遣車之馬及葬埋之言埋之則是馬塗車之芻靈田獵則師驅逆之師猶將也凡將事于四海山川則飾黃駒四海猶四方也王廵守過大山川則有殺駒以祈沈禮與王人職有宗祀以黄金勺前馬之禮凡國之使者共其幣馬使者所用私覿凡軍事物馬而頒之物色齊其力又曰圉師掌敎圉人養馬春除蓐釁廐始牧夏庌馬冬獻馬射則充椹質茨牆則翦闔蓐馬兹也馬旣出而除之新釁焉神之也春秋傳曰凢馬日中而出日中而入故字庌爲訝鄭司農云當爲庌玄謂庌廡也廡所以庇馬凉也充猶居也茨蓋也闔苫也椹質翦闔圉人所習也杜子春讀椹爲齊人言缺椹之椹椹質所射者習射處圉人掌養馬芻牧之事以役圉師役者圉師使令焉凡賔客喪紀牽馬而入陳賔客之馬王所以賜之者詩云雖}
