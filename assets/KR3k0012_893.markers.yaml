  - {type: variant, offset: 1211, length: 0, content: '', SBCK: 侯伐齊齊師夜遁邢伯告中行伯曰有班馬之聲夜道馬不相見故鳴斑别也齊師其遁又昭四年傳曰魯使椒舉如􅀳求諸侯晉侯欲勿許司馬侯曰不可公曰晉有三不殆其何敵之有國險而多馬齊楚多難有是三者何郷而不濟對曰侍險與馬而虞鄰國之難是三殆也四嶽三塗陽城大室荆山中南九州之険也是不一姓兾之北土馬之所生無興國焉恃險與馬不可以爲固也又宣上曰宋人以文馬百駟以贖華元於鄭半入華元逃歸又昭七年曰衛侯來獻其乗馬曰啓服啓服馬名壍而死墮壍死也公將爲之櫝爲作棺也子家曰從者病矣請以食之乃以帷裏之又定三年曰唐成公如楚有雨肅爽馬子常欲之成公唐惠侯之後肅爽駿馬名弗與三年止之唐人或相與謀請代先從者許之飲先從者酒醉之竊馬而獻之子常子常歸唐侯自拘於司敗竊馬者自拘曰君以弄馬之故隱君身隱􅁨約也弃國家羣臣請相夫人以償馬必如之相助也夫人謂養馬者唐侯曰寡人之過也二三子無辱皆賞之又定下曰衛公子地有白馬四公嬖向魋向魋欲之向魋司馬桓魋公取而朱其尾鬛以與之與桓魋也地怒使其徒扶魋而奪之魋懼將走公閉門而泣之目盡腫榖梁傳僖公曰晉獻公將伐虢荀息請以屈産之乗垂􅁄之璧假道於虞公曰此晉寳也荀息曰是取中府藏外府取中廐藏外厩也後舉虞荀息牽馬操璧而前曰璧猶是馬齒長矣周禮夏官下曰校人掌王馬之政政謂差擇養乗之數也月令日班馬政辨六馬之屬種馬一物戎馬一物齊馬一物道馬一物田馬一物駑馬一物種謂上善似母者以次差之玉路駕種馬戎路駕戎馬金路駕齊馬象路駕道馬田路駕田馬駕馬給宫中之役天子十有二閑馬六種􅀖國六閑馬四種家四閑馬二種降殺之差毎廐爲一閑諸侯有齊馬道馬田馬大夫有田馬各一閑其駑馬則皆分爲三焉凡馬特居四之一欲其乗之性相似也物同氣則心一鄭司農云四之一者三牝一牡春􅀕馬祖執駒馬祖天駟也}
