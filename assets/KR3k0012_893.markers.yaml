  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第八百九十三}
  body:
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 五馬一􅀃文曰馬怒也武也馬一歲曰􅑓音環二歲曰駒三歲曰駣音兆八歲曰􅦩音八髙六尺曰驕七尺曰騋音來八尺曰龍騊音陶駼音途北野之良馬也驁駿馬也以壬申日死乗馬者忌之爾雅曰騊駼馬野馬北海內有獸􅃺如與名騊駼青色騊駼一名野馬昆蹄趼善􅂛甗甗山形似甑上大下小時有昆蹄之馬蹄平如研善􅂛甗甗山嶺也研音吟燕切甗音魚徤切昆賖枝蹄研善升甗小領盗驪盗驪千里馬也領頃也昆駼之馬枝蹄如牛而下平小領馬種一名盗驪絶有力駥馬髙八尺􅂰上皆白􅑓馵後左脚白音注也}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 五馬一説文曰馬怒也武也馬一嵗曰􅑓二嵗曰駒三嵗曰駣八嵗曰􅦩高六尺曰驕七尺曰騋八尺曰龍騊駼北野之良馬也驁駿馬也以壬申日死乗馬者忌之爾雅曰騊駼馬野馬北海内有獸狀如馬名騊駼青色騊駼一名野馬騉蹄趼善升甗甗山形似甑上大下小時有昆蹄之馬蹄平如趼善升甗甗山隒也趼音吟燕切甗音魚建切騉駼枝蹄趼善升甗小領盜驪盜驪千里馬也領頸也昆駼之馬枝蹄如牛而下平絶有力駥膝上皆白􅑓}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_WYG_893-1b, image: WYG0901/WYG0901-0007d.png}
  - {type: variant, offset: 2, length: 0, content: '', krp: 五馬一說文曰馬怒也武也馬一歲曰馵音環二歲曰駒三歲曰駣音兆八歲曰􅦩音八髙六尺曰驕七尺曰騋音來八尺曰龍騊音陶駼音途北野之良馬也驁駿馬也以壬申日死乗馬者忌之爾雅曰騊駼馬野馬北海內有獸狀如與名騊駼青色騊駼一名野馬昆蹄趼善升甗甗山形似甑上大下小時有昆蹄之馬蹄平如研善升甗甗山嶺也研音吟燕切甗音魚徤切昆賖枝蹄研善升甗小領盗驪盗驪千里馬也領頃也昆駼之馬枝蹄如牛而下平小領馬種一名盗驪絶有力駥馬髙八尺膝上皆白馵馵後左脚白音注也}
  - {type: xml-element, offset: 3, content: '', id: KR3k0012_CHANT_893-bkkxmlele1}
  - {type: 'tls:seg', offset: 3, content: '', id: KR3k0012_CHANT_893-1a.1}
  - {type: 'tls:seg', offset: 3, content: '', id: KR3k0012_CHANT_893-1a.2}
  - {type: variant, offset: 3, length: 1, content: 虎, SBCK: 骹音􅃻皆白驓骹􅂰}
  - {type: variant, offset: 3, length: 1, content: 虎, WYG: 骹皆白驓四蹢皆白首俗呼為踏雪馬蹢蹄也前足皆白騱後足皆白翑前右足白啓左白踦後右足白驤左白􅑓駵馬白腹騵驪馬白跨驈驪黒色跨髀間白州驠尾本白騴尾白駺馰顙白顛白達素懸素鼻莖也俗所謂漫髗徹齒􅆕顙皆白惟駹回毛在膺宜乗樊光曰俗謂之官府馬伯樂相馬法旋毛在腹}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_WYG_893-2a, image: WYG0901/WYG0901-0008a.png}
  - {type: variant, offset: 3, length: 1, content: 虎, krp: 骹音𫾣皆白驓骹膝}
  - {type: xml-element, offset: 5, content: '', id: KR3k0012_CHANT_893-bkkxmlele2}
  - {type: xml-element, offset: 5, content: '', id: KR3k0012_CHANT_893-bkkxmlele3}
  - {type: 'tls:seg', offset: 5, content: '', id: KR3k0012_CHANT_893-1a.3}
  - {type: punctuation, offset: 5, content: 《, id: KR3k0012_CHANT_893-bkkpn1}
  - {type: variant, offset: 5, length: 2, content: 英雄, SBCK: 也四蹢皆白首俗呼爲折雲馬蹢蹄也前足皆白騱下鷄切後足皆白翑巨俱切前右足曰啓左傳曰啓服也左白踦後右足白驤左白􅑓音注駵音流馬白腹騵魚􅀽切驪馬白跨驈驪黒色跨髀間白州驠州竅於見切尾夲白騴尾抹白也尾白駺音郎馰顙白顚載星馬也白逹素懸素鼻莖也俗所謂漫髗徹齒面顙皆白惟駹顙額回毛在膺冝乗樊光曰俗謂之宮府馬伯樂相馬法旋毛在腹下如乳者千里馬也在肘後減陽在翰茀方幹脅在背闋廣皆别旋毛所在之名逆毛居馬毛逆刺騋音來牝驪牡馬七尺巳爲騋􅀇駒􅒁驂􅀇駒小馬别名褭驂耳或曰此即騕􅒁古之良馬牡曰騭今江東呼駮馬爲騭牝曰騇草馬名也駵白駁黃白騜詩云騜駮其馬駵馬黃脊騝竒連切驪馬黃脊騽青驪駽今之鐵􅍡青驪驎驒色有淺深斑駮隱驎今連錢􅍡也青驪繁鬣騥驪白雜毛鴇今之烏騘黃白雜毛駓今之桃花馬隂白雜毛駰隂淺黒今之泥騘也蒼白雜毛騅彤白􅄂毛騢彤赤也今之赭白馬白馬黒鬣駱白馬黒脣駩七全切黒喙騧一目白􅳌音閑二目白魚似魚眼也旣差我馬宗廟齊毫尚純也戎事齊力田獵齊足周易􅀃卦曰乾爲馬又坤卦􅂏曰牝馬地􅀋行地無疆又􅀃卦曰震其於馬也爲善鳴爲􅑓音注足爲作足爲的顙又曰乾爲良馬爲老馬爲瘠馬爲駁馬又屯卦曰六四乗馬般如匪㓂婚媾徃􅁻無不利又下繫曰服牛乗馬引重致逺以利天下盖取諸隨又曰坤元亨利牝馬之貞王弼文言注曰以龍叙乾以馬明坤隨事義而取象也禮記月令曰孟春之月天子駕蒼龍孟夏之月天子駕赤駵孟秋之月天子駕白駱孟冬之月天子駕鐵驪又學}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_893-1b}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_893-2a}
  - {type: variant, offset: 5, length: 2, content: 英雄, WYG: 如乳者千里馬也在肘後減陽在幹茀方在背闋廣皆别旋毛所在之名逆毛居馻騋牝驪牡𤣥駒褭驂𤣥駒小馬别名褭驂耳或曰此即腰褭古之良馬名牡曰騭牝曰騇駵白駁黄白騜駵馬黄脊騝驪馬黄脊騽青驪驎驒色有淺深斑駁隱驎今連錢驄也青驪繁鬛騥驪白雜毛駂黄白雜毛駓隂白雜毛駰隂淺黒今之泥驄也蒼白雜毛騅彤白雜毛騢白馬黑鬛駱白馬黑脣駩黑喙騧一目白瞷二目白魚既差我馬差擇也宗廟齊亳戎事齊力田獵齊足又坤卦彖曰牝馬地類行地无疆又説卦曰震其於馬也為善鳴為􅑓足為作足為的顙又曰乾為良馬為老馬為瘠馬為駁馬又屯卦曰六四乗馬般如匪冦婚媾徃吉无不利又下繫曰服牛乗馬引重致逺以利天下蓋取諸隨又曰坤元亨利牝馬之貞王弼文言注曰以龍叙乾以馬明坤隨事義而取象也禮}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_893-2b, image: WYG0901/WYG0901-0008b.png}
