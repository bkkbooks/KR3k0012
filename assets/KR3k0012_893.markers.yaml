  - {type: variant, offset: 18, length: 65, content: 玄德卿為坐上客我為降虜繩縛我急獨不可一言耶操曰縛餓虎不得不急乃命緩縛布吳志曰呂蒙欲從軍母止之蒙曰不探虎穴安得虎子又曰孫權每田獵常乘, SBCK: ''}
  - {type: variant, offset: 18, length: 5, content: 玄德卿為坐, WYG: 陟彼崔嵬我馬虺隤又曰陟彼高岡我馬𤣥黄又魯頌曰䮐頌僖公也僖公能遵伯禽之法牧于坰野而史克作頌駉駉牡馬在坰之野薄言駉者有驈有皇有驪有黄以車彭彭駉駉牡馬在坰之野薄言駉者有騅有駓有騂有騏以車伾伾駉駉牡馬在坰之野薄言駉者有驒有駱有駵有騅以車繹繹駉駉牡馬在坰之野薄言駉者有駰有騢有驔有魚以車袪袪又曰叔于田乗乗馬執轡如組兩驂如舞叔于田乘乗黄兩服}
