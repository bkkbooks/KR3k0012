  - {type: variant, offset: 1229, length: 1, content: 相, SBCK: 馬也德謂在五御之威儀周書曰其西天子車立馬乗六青馬隂羽鳬旌鳬羽爲旌旄也周公旦主東青馬黒謂之母兒周公主東則太公主西也東青馬則西白矣馬名未聞也又曰義渠以兹白兹白}
