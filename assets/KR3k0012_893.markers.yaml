  - {type: variant, offset: 1729, length: 153, content: 有術能使人化為虎毛色牙瓜悉如真爾鄉人前將軍周眕有奴使入山伐薪奴有婦及妹亦俱行既至奴語二人云且高樹上視我所為如其言既而入草須臾見一黃班虎從草中出奮迅吼喚甚為可畏少時復為人奴語二人曰歸家慎勿道後向等輩說之周得知飲淳酒令熟醉使人解其衣服及身體唯於髻髮中得一紙畫作大虎邊有符周密取錄之奴既醒喚問之事已露遂具說有術其, SBCK: 乗}
