  - {type: variant, offset: 2103, length: 5, content: 徐台符緯邑, WYG: 旋知貢舉私自謂曰此二筆之應也洎入中書吏奉二筆熟視大小如昔夢中所授漢官儀曰尚書令僕丞郎月給赤管大筆一雙篆題曰北宫工作西京雜記曰漢制天子筆以錯寳為跗毛皆秋兎之毫官師路扈為之又以雜寳為匣厠以玉璧翡翠皆值百金揚子法言曰搥提仁義絶滅禮學吾无取焉五帝者三王之筆舌寧有書不用筆言不由舌耶刀不利筆不銛宜加砥削之論衡曰知能之人須三寸之舌一尺之筆然後能自通神仙傳曰李仲甫潁川人漢桓帝時賣筆遼東市一筆三錢如无錢亦與筆魏末傳曰司馬宣王欲誅曹爽呼何晏作奏曰宜上君名晏失筆于地世說曰王東亭嘗夢有人與大筆其管如椽既覺與人云當有大手筆事不日烈宗晏駕哀䇿謚議三者並所作也傅子曰漢末一筆之匣雕以黄金飾以和璧綴以隋珠文以翡翠此筆非文犀之植必象齒之管豐狐之柱秋兎之翰用之者必被珠綉之衣踐雕玉之履王羲之筆經曰漢時諸郡獻兎毛書鴻都門惟有趙國毫中用時人咸言兎毫无優劣管手有巧拙又曰有人以緑沉漆竹管及鏤管見遺録之多年斯亦可愛玩詎以金寳雕琢然後為貴也又曰昔人或以琉璃或以象牙為筆管麗飾則有之然筆須輕便重則躓矣筆墨法曰作筆當以鐵梳梳兎豪毛及羊青毛去其穢毛使不髯茹羊青為心名曰筆柱或曰墨池東宫舊事記曰皇太子初拜給漆筆四十枝銅博山筆牀一副搜神記曰王祐病有鬼至其家留赤筆十餘枝在薦下曰可使人簮之出入辟惡凡舉事皆無恙荆楚歳時記曰陸士衡云魏武帝劉媫妤以七月七日祈琉璃筆嶺表録異曰畨禺地無狐兎多用鹿毛野狸毛為筆又昭富春勒等州則擇雞毛為筆其用也亦與兎毛无異又曰嶺南无兎嘗有郡牧得其皮使工人削筆者醉失之大懼因剪鬚髩為筆筆甚善更使為之工者辭焉語其由以實對遂下令使一户輸人鬚或不能致輒責其值墨釋名曰墨晦也言似物晦黒也漢書王莽傳曰漢兵起莽以墨汚渭陵延陵周垣東觀漢紀曰和熹鄧后即位萬國貢獻悉禁絶唯歳供紙墨而已范子計然曰墨出三輔上價石百六十中三十下十韋仲將筆墨方曰合墨法好醇烟𢷬訖以細絹蓰于缸中蓰去草芥若細沙以細絹蓰塵埃此物至輕微不宜露蓰慮失飛去不可不愼墨一斤好膠五兩浸梣皮汁中梣江南樊鷄木皮也其皮入水緑色解膠又益墨色可下雞子白去黄五枚亦以真珠一兩麝香一兩皆别治細蓰都合調下鐵臼中寧剛不宜澤𢷬三萬杵杵多益善合墨不得過二月九月溫時敗臭寒則難乾凍鎔見風日碎破重不得過二兩蔡質漢官儀曰尚書令僕丞郎月賜隃糜大墨一枚小墨一枚東宫舊事曰皇太子初拜給香墨四丸修復山陵故事曰𤣥宫物有墨五丸神仙傳曰漢桓帝徴仙人王逺逺乃題宫門四百餘字皆說方來之事帝惡之削去内字復見墨入板裏葛龔與梁相書曰復惠善墨下士所无摧體骨碎肝膽不足明報曹植樂府詩曰墨出青松烟筆出狡􅇠翰古人感鳥跡文字有改判葛洪神仙傳曰班孟不知何許}
