  - {type: variant, offset: 888, length: 0, content: '', SBCK: 尓後爲詩絶無美句時人謂之才盡梁書曰紀少瑜嘗夢陸倕以一束青鏤管筆授之云我以此筆猶可用卿自擇其善者其文因此遒進又曰鄭灼家貧好學抄義䟽以日繼夜筆毫盡每削用之隋書曰髙祖復鄭譯官爵令内史令李德林立作詔書髙潁戯謂曰筆乾譯荅曰出爲方岳杖䇿言歸不得一錢何以潤筆上大􅀏又曰劉行本累遷掌朝}
