  - {type: variant, offset: 2441, length: 260, content: 七年詔曰司馬遷著書成一家揚名後世至以身陷刑之故反微文諷剌貶損當代非誼士也又魏志曰明帝問王肅司馬遷以受刑之故內懷隱切著史記非貶孝武令人切齒又晉張輔嘗著論論班固司馬遷之著述辭約而事舉敘三千年事唯五十萬言班固敘二百年事乃八十萬言煩省不同不如遷一也良史述事善足以獎勸惡足以鑒誡人道之常中流小事亦無取焉而班皆書之不如二也毀貶朝錯傷忠臣之道不如三也遷既造創固又因循難易益不同矣又遷為蘇秦張儀范睢蔡澤作傳逞辭流離亦足以明其大才故述辯士則藻辭華靡敘實錄則隱核名撿此所以遷稱良史也文心雕龍曰昔者夫子慜王道之缺傷斯文之墜靜居以歎鳳臨衢而泣麟, SBCK: 餘丈}
