  - {type: variant, offset: 2223, length: 5, content: 司馬遷發憤, SBCK: 天子以玉爲硯取其不凍拾遺記曰張華撰博物志奏武帝帝賜青鐵硯鐵是于闐國所獻鑄以爲硯魏武帝上雜物䟽曰御物有純銀叅帶臺硯一枚鈍銀叅帶貟硯大小各一枚陳留志曰范喬年二歳祖父馨卒臨終撫其首曰恨不見汝成人以吾所用硯與之至五歳祖母以此言告喬便執硯啼􅂘東宫舊事曰皇太子􅀄拜給漆石硯一枚崔寔四民月令曰正月硯凍釋令童㓜入小學學篇章十一月硯凍命童㓜讀孝經論語丗語曰曹爽與明帝少同硯書晉傅􅀇硯賦採隂山之潜璞簡衆材之脩冝節方貟以定形鍜金鐵而爲池設上下之剖判配法象乎二儀木貴其能軟石美其潤堅加采漆之膠固含冲德之清􅀇永嘉中記曰硯溪一源中多石硯劉澄之宋永􅀄山川古今記曰興平石穴深二百許大石青色堪爲硯􅁓釋名曰􅁓砥也平滑如砥石也服䖍通俗文曰方絮曰􅁓東觀漢記曰黄門蔡倫典}
  - {type: page-break, offset: 2223, content: '', id: KR3k0012_SBCK_605-6b}
  - {type: page-break, offset: 2223, content: '', id: KR3k0012_SBCK_605-7a}
  - {type: variant, offset: 2223, length: 5, content: 司馬遷發憤, WYG: 天子以玉為硯取其不凍拾遺記曰張華撰博物志奏武帝帝賜青鉄硯是于闐國所獻鑄以為硯魏武帝上雜物疏曰御物有純銀參帶䑓硯一枚純銀參帶圓硯大小各一枚陳留志曰范喬年二嵗祖父馨卒臨終撫其首曰恨不見汝成人以吾所用硯與之至五嵗祖母以此言告喬便執硯啼哭東宫舊事曰皇太子初拜給漆石硯一枚崔實四民月令曰正月硯凍釋命童㓜入小學學篇章十一月硯凍命童㓜讀孝經論語世語曰曹爽與明帝少同筆硯晉傳𤣥硯賦採隂山之潜璞簡衆材之修宜節方圓以定形鍜金鉄而為池設上下之剖判配法象乎二儀木貴其能軟石美其潤堅加采漆之膠固含冲徳之清𤣥永嘉中記曰硯溪一源中多石硯劉澄之宋永初山川古今記曰興平石穴深二百許丈石青色堪為硯紙釋名曰紙砥也平滑如砥石也服䖍通俗文曰方絮曰紙東觀漢記曰黄門蔡倫典}
