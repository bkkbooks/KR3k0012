  - {type: variant, offset: 890, length: 0, content: '', SBCK: 職國朝傳記曰虞監草行本師於釋智永智永常樓上學業成方下其棄筆頭至盈瓮唐書曰柳公權爲司封貟外郎穆宗政僻嘗問公權筆何盡善對曰用筆在心心正則筆正上改容知其筆諌也五代史周史曰和凝年十七舉明經至京師忽夢人以五色筆一束以與之謂曰子才可以舉進士自是才思敏贍十九登進士第又曰馬裔孫􅀄爲河中從事因事赴闕􅀫於邏店其地}
