  - {type: variant, offset: 1055, length: 1044, content: 脩憲宗實錄後文宗復令改正永貞時事隨奏曰臣昨面奉聖旨以順宗實錄頗非詳實委臣等重加刊正伏以史冊之作勸誡所存事有當書理宜歸實疋夫美惡尚不可誣人君得失無容虛載聖旨以前件實錄記貞元末數事稍非摭實蓋出傳聞審知差舛更令刊正頃因坐日屢形聖言通計前後至于數日臣等伏以貞觀已來累朝實錄有輕重撰不敢固辭但欲粗刪深悞亦固盡存諸說宗閔僧孺相與商量緣此書成於韓愈今史官李漢蔣係皆愈之子壻若遣參撰或致私嫌縱臣獲脩成必懼終為時累且韓愈所書亦非己出元和之後已是相循伏望條示舊記最錯悞者宣付史官委之脩定詔曰其實錄中所書德宗順宗朝禁中事尋訪根柢蓋起謬傳諒非信史宜令史官詳正刊去其它不要更脩又曰文宗嘗問曰順宗實錄似未詳實史官韓愈不是當時屈人否李石曰韓愈貞元末為四門博士上曰司馬遷與任安書全是怨望所以漢武本紀事多不實鄭覃曰漢武中年後大發戎馬拓土開邊生人耗竭糧饟不給本紀所述亦非過言石曰史筆不直率多無後鄭覃所陳志在譏諫欲陛下究竟盛德故言漢武不屈上曰靡不有初鮮克有終此誠可為戒覃因曰伏知陛下乙夜觀書無不該涉然經典切切不過一二百言聖意所存靡不有初鮮克有終此兩句實可寢食佩服又曰張次宗有文學稽古厲行開成中為起居舍人文宗復故事每入閤左右史執筆立于螭頭之下宰相奏事得以備錄宰臣既退上召左右更質證所奏是非故開成政事詳於史氏又曰文宗朝對宰臣退上命起居郎鄭朗等適所紀錄者將來一觀鄭朗對曰臣執筆所紀便目為史臣聞自古帝王不合觀史上曰故事何在朗曰臣不敢遠徵故實嘗聞太宗皇帝欲親覽國史用知得失諫議大夫朱子奢上表云史官所述義歸盡善若至會玄已後或非上智中主庸君飾非護短見極陳善惡致怨史官何地逃刑又問禇遂良對曰今之起居古之左右史以記人君言行善惡必書庶幾不為非法不聞帝王躬自觀史上又謂朗曰適之所紀且是直書未有否臧一見無爽朗乃進所紀上略覽曰卿宜門外重寫錄進其日晚內出詔示宰臣曰適鄭朗奏朝來所紀之事擬不進本人君之言良史善惡必書或有平生之閑話不關理道之體要垂諸將來實為愧恥異日臨朝庶幾稍改何妨一見得戒醜言又嘗於紫宸殿對百寮遣閤門使就起居舍人魏謨取注記謨奏曰臣以自古置此以為聖王鑒戒陛下但為善勿畏臣不書如陛下所行錯誤臣不書之天下之人皆得書之臣願以陛下為太宗文皇陛下許臣比禇遂良上曰我前亦嘗觀之謨曰是前起居不詳故事臣今豈得陷陛下為非若陛下一覽之後自此文字須有廻避如此則善惡不直如何遣後代取信上遂止周書曰賈緯乾祐中受詔與王伸竇儼脩晉高祖少帝漢高祖三朝實錄緯以筆削為己任然而褒貶任情記注不實晉宰相桑維翰執政嘗薄緯之為人不甚見禮緯深銜之及敘維翰傳稱維翰身沒之後有白金八千鋌他物稱是, SBCK: 爲}
