  - {type: punctuation, offset: 2231, content: 》, id: KR3k0012_CHANT_605-bkkpn523}
  - {type: variant, offset: 2231, length: 0, content: '', SBCK: 曰東京有蔡侯􅁓即倫也用故麻名麻􅁓木皮名榖􅁓用故魚網作􅁓名網􅁓也王隱晉書曰魏太和六年博士河間張揖上古今字詰其巾部􅁓今也其字從巾古之素帛依舊長短隨事截絹枚數重沓即名幡􅁓字從系此形聲也後和帝元興中中常侍蔡倫以故布擣剉作􅁓故字從巾是其聲雖同系巾爲殊不得言古􅁓爲今􅁓崔鴻前燕録曰慕容儁三年廣義將軍岷山公黄􅁓上表儁曰吾名號未異於前何冝便尓自今但可白紙稱䟽沈約宋書曰張永善􅀠書又有巧思紙及墨皆自營造上毎得永表啓輙執玩咨嗟自嘆供御者不之及也唐書曰杜暹爲婺州叅軍秩滿將歸州吏以􅁓万餘張贈之暹唯受}
  - {type: page-break, offset: 2231, content: '', id: KR3k0012_SBCK_605-7b}
  - {type: variant, offset: 2231, length: 0, content: '', WYG: 曰東京有蔡侯紙即倫也用故麻名麻紙木皮名榖紙用故魚網作紙名網紙也王隠晉書曰魏太和六年博士河間張揖上古今字詁其巾部云紙今帋其字從巾古之素白依書長短隨事截絹枚數重沓即名幡紙字從系此形聲也後和帝元興中中常侍蔡倫以故布𢷬剉作紙故字從巾是其聲雖同系巾為殊不得言古之紙為今紙崔鴻前燕録曰慕容雋三年廣義將軍岷山公黄紙上表雋曰吾名號未異于前何便宜爾自今但可白紙為疏沈約宋書曰張永善𨽻書又有巧思紙及墨皆自營造上每得永表啓輒執玩咨嗟自嘆供御者不及也唐書曰杜暹為婺州叅軍秩滿將歸吏胥以紙萬餘張贈之暹惟受百幅時人嘆曰昔清吏受一大錢何異也語林曰王右軍為會稽謝公乞紙庫中惟有九萬枚悉與之桓宣云逸少不節拾遺記曰張華獻博物志賜側理帋萬畨南越所獻也後人言陟里與側理相亂南人以海苔為帋其理縱横袤側因以為名世説曰戴安道就范宣學所為范宣讀書亦讀書范宣抄紙亦抄紙桓𤣥偽事曰古旡紙故用簡非主于敬也今諸用簡者皆以黄紙代之又曰𤣥令平凖作青赤縹緑桃花紙使物精令速作之石虎鄴中記曰石虎詔書以五色紙著鳯雛口中范寗教曰土紙不可以作文書皆令用藤角紙盛宏之荆州記曰棗陽縣}
