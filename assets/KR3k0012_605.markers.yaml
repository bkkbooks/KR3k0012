  - {type: variant, offset: 889, length: 0, content: '', SBCK: 大夫周代故事天子臨軒掌朝典筆硯持至御座則承御大夫取以進之及行本爲掌朝將進筆於帝承御復欲取之行本抗聲謂承御曰筆不可得帝驚視問之行本言於帝曰臣聞設官分職各有司存臣旣不得佩承御刀承御亦焉得取臣筆帝曰然因令二司各行}
