  - {type: variant, offset: 2231, length: 0, content: '', krp: 曰東京有蔡侯𥿄即倫也用故麻名麻𥿄木皮名榖𥿄用故魚網作𥿄名網𥿄也王隱晉書曰魏太和六年博士河間張揖上古今字詰其巾部𥿄今也其字從巾古之素帛依舊長短隨事截絹枚數重沓即名幡𥿄字從系此形聲也後和帝元興中中常侍蔡倫以故布擣剉作𥿄故字從巾是其聲雖同系巾爲殊不得言古𥿄爲今𥿄崔鴻前燕録曰慕容儁三年廣義將軍岷山公黄𥿄上表儁曰吾名號未異於前何冝便尓自今但可白紙稱䟽沈約宋書曰張永善隷書又有巧思紙及墨皆自營造上毎得永表啓輙執玩咨嗟自嘆供御者不之及也唐書曰杜暹爲婺州叅軍秩滿將歸州吏以𥿄万餘張贈之暹唯受}
  - {type: variant, offset: 2233, length: 8, content: 三十篇先達為良史, SBCK: 時人嘆曰昔清吏受一大錢復何異也語林曰王右軍爲㑹稽謝公乞牋紙庫中唯有九萬枚悉與}
  - {type: variant, offset: 2233, length: 1, content: 三, WYG: 許歩蔡倫宅其中有造紙具其傍有池即名蔡子池倫漢順帝時人始以魚網造紙縣人今猶多能作紙葢倫之遺業也異苑曰張仲舒在廣陵晨夕輒見門側有赤氣布空中忽雨綘羅于其庭周廣七八分長五六寸皆以箋紙繫之廣長亦與羅等紛紛甚駛經宿仲舒暴疾死孫放西寺銘曰長沙西寺層搆傾頽謀欲建立其日有童子持紙花揷地故寺東西相去}
