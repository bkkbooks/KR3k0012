  - {type: variant, offset: 280, length: 371, content: 史館以記注為職夫勸善懲惡正言直筆紀聖朝功德述忠賢事業載姦臣醜行以傳無窮者史宮之任也凡人事跡非大善大惡則眾人無由得知舊例皆訪於人又取行狀謚議以為一據今之作行狀者多是其門生故吏莫不虛加仁義禮智妄言忠肅惠和此不唯處其心不實茍欲虛美於受恩之地耳蓋為文者又非游夏遷雄之列務於華而忘其實溺於文而棄其理故為文則失六經之古風紀事則非史遷之實錄臣今請作行狀者但指事說實直載事功假如作魏徵傳伹記其諫諍之詞足以為正直段秀實伹記其倒用司農印以追逆兵以象笏擊朱泚足以為忠烈若考功視行狀不依此者不得受依此則考功下太常牒史館然後定謚伏乞以臣此奏下考功從之又曰元和中宰臣已下候到于延英殿上以時政記問於宰臣脩國史李元甫對曰是宰相記天子事以授史官之實錄也古者左史記言今起居舍人是也右史記事今起居郎是也永徽中宰相姚璹監脩國史慮造膝之言或不下聞因請隨奏對而記是也上曰其間或脩或不脩者, SBCK: ''}
