  - {type: variant, offset: 2867, length: 732, content: 通號曰紀紀綱之號亦宏稱也故本紀以述皇王列傳以揔侯伯八書以鋪政體十表以譜年爵雖殊古式而得事序焉爾其實錄無隱之旨博雅弘辯之才愛奇反經之尤條例踳落之失叔皮論之詳矣及班固述漢因循前業觀史遷之辭思實過半其十志該富讚序弘麗儒雅彬彬信有遺味至於宗經規聖之典端緒豊瞻之功遺親攘善之罪徵賄鬻筆之愆公理辦之究矣至于後漢紀傳發源東觀袁張所制偏駮不倫薛謝之作踈謬少信若司馬彪之祥實華嶠之准當則其冠也及魏代三雄記傳並出陽秋魏略之屬江表吳錄之類或激抗難徵或踈闊寡要惟陳壽三志文質辨洽荀張比之於遷固非妄譽也至於晉代之書繁乎著作陸機肇始而未備王韶續末而不終干寶述紀以審正明序孫盛陽秋以約舉為能案春秋經傳舉例發目史漢以下莫不准的至鄧粲晉紀始立條例又擺落漢魏憲章殷周雖湘川曲學亦有心放典謨及安國立例乃鄧氏之規焉又曰傳託為式編年經事文非記論按實而書歲遠則周曲難密事積則起記易踈斯固惣合之為難也或有同歸一事數人分功兩紀則失於複重偏舉則漏於不周此又銓配之易也故張衡擿史班之舛濫傅玄譏後漢之尤煩皆類也若夫追述遠代代遠多偽公羊皋云傳聞異詞荀悅稱錄遠略近蓋文疑則闕貴信史也然俗皆愛奇莫顧理實傳聞而欲偉其事錄遠而欲詳其跡於是棄同即異穿鑿傍說舊史所無我書則博此訛濫之本源而述遠之巨蠹也至於記編同時時同多詭雖定哀徵詞而世情利害勳榮之家雖庸夫而盡飾屯貶之士雖令德而蚩埋吹霜煦露寒暑筆端此又同時之枉論可為歎息者也故述遠則誣矯如彼略近則回邪如此折理居正唯懿上心乎談藪曰後魏太保清河崔光樂陵太守曠之孫長廣太守靈延之子光博學有史才本名孝伯字長仁高祖賜名焉除著作郎撰國史遷黃門侍郎為高祖所重帝曰孝伯之才渾渾如黃河東注今之文宗也及魏收為史改渾渾為浩浩光有大度喜慍不形於色有毀之者必善言以報之雖見誣謗終不自申曲直士君子以此稱之光脩國史, SBCK: 卷}
