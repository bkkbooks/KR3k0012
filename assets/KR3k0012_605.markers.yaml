  - {type: variant, offset: 2340, length: 83, content: 百二十卷五十萬字談子遷以世官復為太史公序事如古春秋司馬氏本古周佚後也作景帝本紀極言其短及武帝之過帝怒而削去坐舉李陵降匈奴下遷蚕室有怨言下獄死宣帝以其官為太史令行太史公, krp: ''}
  - {type: variant, offset: 2341, length: 3, content: 二十卷, WYG: ''}
  - {type: variant, offset: 2345, length: 1274, content: 十萬字談子遷以世官復為太史公序事如古春秋司馬氏本古周佚後也作景帝本紀極言其短及武帝之過帝怒而削去坐舉李陵降匈奴下遷蚕室有怨言下獄死宣帝以其官為太史令行太史公文書而已不復用其子孫班固典引曰永平十七年詔曰司馬遷著書成一家揚名後世至以身陷刑之故反微文諷剌貶損當代非誼士也又魏志曰明帝問王肅司馬遷以受刑之故內懷隱切著史記非貶孝武令人切齒又晉張輔嘗著論論班固司馬遷之著述辭約而事舉敘三千年事唯五十萬言班固敘二百年事乃八十萬言煩省不同不如遷一也良史述事善足以獎勸惡足以鑒誡人道之常中流小事亦無取焉而班皆書之不如二也毀貶朝錯傷忠臣之道不如三也遷既造創固又因循難易益不同矣又遷為蘇秦張儀范睢蔡澤作傳逞辭流離亦足以明其大才故述辯士則藻辭華靡敘實錄則隱核名撿此所以遷稱良史也文心雕龍曰昔者夫子慜王道之缺傷斯文之墜靜居以歎鳳臨衢而泣麟於是就大師以正雅頌因魯史以脩春秋舉得失以表黜陟徵存亡以標勸戒然叡旨幽祕經文婉約丘明同恥實得微言乃原始要終創為傳體傳者轉也轉授經旨以授於後實聖文之羽翮記籍之冠冕也及至縱橫之世史職猶存秦并七王而戰國有策蓋錄而不序故即簡為名也漢滅嬴項武功積年陸賈稽古作楚漢春秋爰及史談世惟執簡子長經志甄序帝續比堯稱典則位雜中賢法孔題經則文非元聖故取式呂覽通號曰紀紀綱之號亦宏稱也故本紀以述皇王列傳以揔侯伯八書以鋪政體十表以譜年爵雖殊古式而得事序焉爾其實錄無隱之旨博雅弘辯之才愛奇反經之尤條例踳落之失叔皮論之詳矣及班固述漢因循前業觀史遷之辭思實過半其十志該富讚序弘麗儒雅彬彬信有遺味至於宗經規聖之典端緒豊瞻之功遺親攘善之罪徵賄鬻筆之愆公理辦之究矣至于後漢紀傳發源東觀袁張所制偏駮不倫薛謝之作踈謬少信若司馬彪之祥實華嶠之准當則其冠也及魏代三雄記傳並出陽秋魏略之屬江表吳錄之類或激抗難徵或踈闊寡要惟陳壽三志文質辨洽荀張比之於遷固非妄譽也至於晉代之書繁乎著作陸機肇始而未備王韶續末而不終干寶述紀以審正明序孫盛陽秋以約舉為能案春秋經傳舉例發目史漢以下莫不准的至鄧粲晉紀始立條例又擺落漢魏憲章殷周雖湘川曲學亦有心放典謨及安國立例乃鄧氏之規焉又曰傳託為式編年經事文非記論按實而書歲遠則周曲難密事積則起記易踈斯固惣合之為難也或有同歸一事數人分功兩紀則失於複重偏舉則漏於不周此又銓配之易也故張衡擿史班之舛濫傅玄譏後漢之尤煩皆類也若夫追述遠代代遠多偽公羊皋云傳聞異詞荀悅稱錄遠略近蓋文疑則闕貴信史也然俗皆愛奇莫顧理實傳聞而欲偉其事錄遠而欲詳其跡於是棄同即異穿鑿傍說舊史所無我書則博此訛濫之本源而述遠之巨蠹也至於記編同時時同多詭雖定哀徵詞而世情利害勳榮之家雖庸夫而盡飾屯貶之士雖令德而蚩埋吹霜煦露寒暑筆端此又同時之枉論可為歎息者也故述遠則誣矯如彼略近則回邪如此折理居正唯懿上心乎談藪曰後魏太保清河崔光樂陵太守曠之孫長廣太守靈延之子光博學有史才本名孝伯字長仁高祖賜名焉除著作郎撰國史遷黃門侍郎為高祖所重帝曰孝伯之才渾渾如黃河東注今之文宗也及魏收為史改渾渾為浩浩光有大度喜慍不形於色有毀之者必善言以報之雖見誣謗終不自申曲直士君子以此稱之光脩國史第敬友子鴻復撰十六國春秋一門二史當代為榮, WYG: ''}
