  - {type: variant, offset: 884, length: 0, content: '', SBCK: 故是赤管言以赤心事也毛詩柏舟静女曰静女其孌貽我彤管古者后夫人有女史彤管之法后妃羣妾以禮御于君所女史書其日月授之環以進退也箋云􅊮笔赤筆也􅊮管有煒恱懌女美曲禮曰史載筆士載言也漢書曰張安丗持橐簮筆橐挈橐也近臣􅀒橐簮筆從備顧問或有所記事孝武帝數十年見謂忠謹東觀漢記曰班超字仲升家貧爲官傭冩書嘗輟書投筆歎曰大丈夫當效􅀓介子張騫立功異域以取封侯安能乆事筆硯乎呉志曰曹公聞孫權以荆州資劉備大懼方作書不􅁴落筆}
