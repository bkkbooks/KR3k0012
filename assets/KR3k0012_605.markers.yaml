  - {type: variant, offset: 2103, length: 5, content: 徐台符緯邑, SBCK: 旋知貢舉私自謂曰比二筆之應也洎入中書吏奉二筆熟視大小如昔時夢中所授者漢官儀曰尚書令僕丞郎月給赤管大筆一􅀟􅂐題曰北宮二作西京雜記曰漢制天子筆以錯寳爲跗毛皆秋兎之毫官師路扈爲之又以雜寳爲匣厠以玉壁翠羽皆直百金楊子法言曰槌提仁義絶滅禮學吾無取焉五帝者三王之筆舌寕有書不用筆言不由舌耶刀不利筆不銛冝加砥削之論衡曰知能之人湏三寸之舌一尺之筆然後能自通神仙傳曰李仲甫潁川人漢桓帝時賣筆遼東市一筆三錢如無錢亦與筆魏末傳曰司馬宣王欲誅曹爽呼何晏作奏曰冝上君名晏失筆於地丗􅀃曰王東亭嘗夢有人與大筆其管如椽旣􅁴􅀃人云當有大手筆事不日烈宗晏駕哀䇿謚議並王所作也傳子曰漢末一筆之匣雕以黄金飾以和壁綴以隋珠文以翡翠此筆非文犀之楨必象齒之管豐狐之柱秋􅇠之翰用之者必􅀍珠繡之衣踐雕玉之履矣王羲之筆經曰漢時諸郡獻兎毫出鴻都惟有趙國毫中用時人咸言􅇠毫無優劣管手有巧拙又曰有人以緑沉􅃮竹管及鏤管見遺録之多年斯亦可愛玩詎以金寳雕􅅣然爲貴也又曰昔人或以瑠璃象牙爲筆管麗飾則有之然筆湏輕便重則躓矣筆墨法曰作筆當以鑯梳梳兎毫毛及羊青毛去其穢毛使不髯茹羊青爲心名曰筆柱或曰墨池東宫舊事曰皇太子􅀄拜給􅃮筆四枚銅􅀶山筆床副捜神記曰王祐病有􅀑至其家留赤筆十餘枚在薦下曰可使人簮之出入辟惡凢舉事者皆無恙荆楚歳時記曰陸士衡云魏武帝劉婕妤以七月七日折璃琉筆嶺表録異曰畨禺地無狐兎多用鹿毛野狸毛爲筆又昭冨春勤等州則擇鷄毛爲筆其用也亦與兎毫無異又曰嶺南無兎嘗有郡収得其皮使工人削筆者醉失之大懼因剪􅁂䰅爲筆筆甚善更使爲之工者辭焉詰其由以實對遂下令使一户輸人􅂡或不能致輙責其直墨釋名曰墨晦也言以物晦墨也漢書王莽傳曰漢兵起莽以墨汚渭陵延陵周垣東觀漢記曰和熹鄧后即位万國貢獻悉禁絶惟歳供紙墨而己范子計然曰墨出三輔上價石百六十中三十下十韋仲將筆墨方曰合墨法好醇煙擣訖以細絹簁於缸中簁去草芥􅀂細沙以細絹簁塵埃此物至輕微不冝露簁慮失飛去不可不慎墨一斤以好膠五兩浸梣皮汁中梣江南樊鷄木皮也其皮入水緑色解膠又益墨色可下鷄子白去黄五枚亦以眞朱一兩麝香一兩皆別治細簁都合調下鐵臼中寕剛不冝澤擣三万杵杵多益善合墨不得過二月九月温時敗臭寒則難乾湩溶見風日碎破重不得過二兩蔡質漢官曰尚書令僕丞郎月賜渝糜大墨一枚小墨一枚東宫舊事曰皇太子􅀄拜給香墨四丸脩復山陵故事曰玄宫物有墨五丸神仙傳曰漢桓帝徴仙人王逺逺乃題宫門四百餘字皆􅀃方來帝惡之削之外字去内字復見墨入材裏􅁑龔與梁相書曰復惠善墨下士所無摧骸骨碎肝膽不足明報曹植樂府詩曰墨出青松煙筆出狡兎翰古人感鳥跡文字有改刋􅁑洪神仙傳曰班孟不知何許}
