  - {type: variant, offset: 373, length: 578, content: 智妄言忠肅惠和此不唯處其心不實茍欲虛美於受恩之地耳蓋為文者又非游夏遷雄之列務於華而忘其實溺於文而棄其理故為文則失六經之古風紀事則非史遷之實錄臣今請作行狀者但指事說實直載事功假如作魏徵傳伹記其諫諍之詞足以為正直段秀實伹記其倒用司農印以追逆兵以象笏擊朱泚足以為忠烈若考功視行狀不依此者不得受依此則考功下太常牒史館然後定謚伏乞以臣此奏下考功從之又曰元和中宰臣已下候到于延英殿上以時政記問於宰臣脩國史李元甫對曰是宰相記天子事以授史官之實錄也古者左史記言今起居舍人是也右史記事今起居郎是也永徽中宰相姚璹監脩國史慮造膝之言或不下聞因請隨奏對而記是也上曰其間或脩或不脩者何也吉甫對曰凡面奉德音未及施行惣為機密固不可書以送史官其間謀議有發自臣下者又不可自書以付史官及事已行者制令昭然天下皆得聞知即史官之記不待書以授也且臣觀時政記者姚璹脩之於長壽及璹罷而事廢賈躭齊杭脩之於貞元躭抗罷而事廢然則關於政化者不虛美不隱惡謂之良史也又曰憲宗銳意於為理徧讀列聖實錄見貞觀關元故事竦慕不能釋卷嘗謂宰臣曰太宗之創業如此玄宗之致理如此我讀國史始知萬倍不如先聖焉又曰長慶中中書門下請脩聖政紀云古之王者必置史官以紀善惡國朝貞觀永徽以前宰臣及百官正衙奏事史官載筆於階戺之下所有奏議悉約書之自永徽以後許敬宗李義府作相事多姦蔽遂奏史官與庶僚俱退然後宰臣請事由是君臣之間咨謀啟沃不復知矣左右史唯寫詔誥除, WYG: 手}
