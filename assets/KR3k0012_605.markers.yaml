  - {type: variant, offset: 4, length: 5, content: 史傳下唐書, SBCK: 一筆墨硯􅁓筆􅀃文}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 一筆墨硯紙筆說文曰楚謂聿呉謂之不律燕謂之弗秦謂之筆釋文曰筆述也述而書之博物志曰蒙恬造筆崔豹古今注曰牛亨問曰古有書契以來便應有筆也世稱蒙恬造筆何也答曰自蒙恬始作秦筆耳以柘木為管以鹿毛為柱羊毛為被所謂蒼豪非􅇠豪竹管也非謂古筆也又問曰筆有彤管何也答曰彤赤漆耳使}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_WYG_605-1b, image: WYG0898/WYG0898-0486d.png}
  - {type: variant, offset: 4, length: 5, content: 史傳下唐書, krp: 一筆墨硯𥿄筆說文}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 官載事故以赤管言用赤心記事也毛詩栢舟静女曰静女其孌貽我彤管古者后夫人有女史彤管之法后妃羣妾以禮御於君所女史書其日月授之環以進退也箋云彤管筆赤管也彤管有煒悦懌女美曲禮曰史載筆士載言也漢書曰張安世持槖簪筆槖契槖也近臣負槖簪筆從備顧問或有所記事孝武帝數十年見謂忠謹東觀漢記曰班超字仲升家貧為官傭寫書嘗輟書投筆嘆曰大丈夫當效傅介子張騫立功異域以取封侯安能久事筆硯乎呉志曰曹公聞孫權以荆州資劉備大懼方作書不覺落筆於地南史曰江淹嘗宿於冶亭夢一丈夫自稱郭璞謂淹曰吾有筆在卿處多年可以見還淹乃探懷中得五色筆一以授之爾後為詩絶無美句時人謂之才盡梁書曰紀少瑜嘗夢陸倕以一束青鏤管筆授之云我以此筆猶可用卿自擇其善者其文因此遒進又曰鄭灼家貧好學抄義疏以日繼夜筆毫盡毎削用之隋書曰髙祖復鄭譯官爵令内史令李徳林立作詔書髙熲戱謂曰筆乾譯答曰出為方岳杖䇿言歸不得一錢何以潤筆上大笑又曰劉行本累遷掌朝下大夫周代故事天子臨軒掌朝典筆硯持至御坐則承御大夫取以進之及行本為掌朝將進筆於帝承御復欲取之行本抗聲謂承御曰筆不可得帝驚視問之行本言於帝曰臣聞設官分職各有司存臣既不得佩承御刀承御亦焉得取臣筆帝曰然因令二司各行其所職國朝}
