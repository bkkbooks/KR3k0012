  - {type: variant, offset: 2111, length: 3, content: 緯相善, WYG: 兄機書曰一日上三臺曹公藏石墨數十萬斤云燒此消復可用然不知兄頗見之不今送二螺鄭氏婚禮謁文讃曰九子之墨藏于松烟盛宏之荆州記曰筑陽縣有墨山山石悉如墨顧微廣州記曰懷化郡掘壍得石墨甚多精好可寫書戴延之西征記曰石墨山北五十里山多墨可以書潯陽記曰廬山有石墨可書灾祥集曰天雨墨君臣无道䜛人進李尤研墨銘曰書契既造研墨乃陳烟石附筆以疏以申顧野王輿地志曰漢時王朗為㑹稽太守子肅隨在郡住東齋中夜有女從地出稱越王女與肅語曉别贈一丸墨肅方注周易因此才思開悟硯釋名曰硯研也研墨使和濡也晉書懷帝陷于平陽劉聰引帝入燕}
