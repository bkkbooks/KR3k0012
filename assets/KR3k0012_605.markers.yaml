  - {type: variant, offset: 177, length: 195, content: 長壽中姚璹知政事以為親承德音謨訓若不宣自宰相史官無由得書遂請仗下後所言軍國政要宰相專知撰錄號為時政記每月送史館無何此事又廢上曰君舉必書義存勸誡既有時政記宰臣宜依故事為之又曰李翱以史官記事不實奏狀曰臣謬得秉筆史館以記注為職夫勸善懲惡正言直筆紀聖朝功德述忠賢事業載姦臣醜行以傳無窮者史宮之任也凡人事跡非大善大惡則眾人無由得知舊例皆訪於人又取行狀謚議以為一據今之作行狀者多是其門生故吏莫不虛加仁義, WYG: 優}
