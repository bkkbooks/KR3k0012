  - {type: variant, offset: 2111, length: 1, content: 緯, SBCK: 兄機書曰一日上三臺曹公藏石墨數十萬斤云燒此消復可用然不知兄頗見之不今送二螺鄭氐㛰禮謁文讃曰九子之墨藏于松煙盛弘之荆州記曰筑陽縣有墨山山石悉如墨顧微廣州記曰懷化郡掘壍得石墨甚多精好可冩書戴延之西征記曰石墨山北五十里山多墨可以書㝷陽記曰廬山有石墨可書災祥集曰天雨墨君臣無道䜛人進李尤研墨銘曰書契旣造研墨乃陳煙石}
