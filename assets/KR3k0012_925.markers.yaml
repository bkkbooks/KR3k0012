  - {type: variant, offset: 238, length: 174, content: 鸚鵡能言而不可使長官是得其所言不得所以言說文曰鸚鵡能言鳥也文士傳曰黃祖世子射賓客大會有獻鸚鵡鳥射舉巵酒於禰衡曰願先生為之賦成公綏鸚鵡賦曰小鳥以其能言解意故育以金籠昇之堂殿然未得鳥之性張華鷦鷯賦曰鸚鵡慧而入籠傅咸荅李斌書曰吾作左丞未幾而以吾為京兆雖心知此為不合然是家親鄉里自願便欲從耳時足下問吾當去否吾荅鸚鵡子言阿安樂今到阿安樂何為不去宣驗記曰有鸚鵡, SBCK: 鴛鴦雌雄相􅀋}
