  - {type: variant, offset: 1019, length: 300, content: 羽皓素頭上有紅毛數十垂與翅齊并五色鸚鵡各一明皇雜錄曰開元中嶺南獻白鸚鵡養之宮中歲久頗聰慧洞曉言詞上及貴妃皆呼雪衣女性既馴擾常假其飲啄飛鳴然亦不離屏帷間上令以近代詞臣詩篇授之數遍便可諷誦上每與貴妃及諸王博戲上稍不勝左右呼雪衣娘必飛入局中一鼓舞以亂其行列或啄嬪御及諸王手使不能爭道忽一日飛上貴妃鏡臺語曰雪衣娘昨夜夢為鷙鳥所搏將盡於此乎上使貴妃授以多心經記誦頗精熟日夜不息若懼禍難有所攘者上與貴妃出於別殿貴妃致雪衣娘於步輦竿上與之同去既至上命從官校獵於殿下鸚鵡方戲於殿檻瞥有鷹至立時而斃上與貴妃歎息久之遂命瘞於苑中為立冢呼為鸚鵡塚赤鸚鵡沈約宋書曰謝莊為太子庶子時南平王鑠上赤鸚鵡普詔群臣為賦太子左衛率袁淑文, SBCK: ''}
