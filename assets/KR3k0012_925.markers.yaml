  - {type: variant, offset: 3286, length: 356, content: 呼飛但南不北其肉肥美宜炙可以飲酒為諸膳也嶺表錄異曰鷓鴣臆前有白圓點背上間紫赤毛其大如小野雞多對啼南越志云鷓鴣雖東西迴翔然開翅之始必先南翥亦胡馬嘶北之義也其鳴自呼社薄州本草云自呼鉤輈格磔李群玉山行聞鷓鴣詩云方穿詰曲崎嶇路又聽鉤輈格磔聲白鷳西京雜記曰南越王獻高帝白鷳黑鷳各一隻後漢書班固傳西都賦曰招白鷳下雙鵠榆文竿出比目王彪之閩中賦曰林鷳繡白謝惠連雪賦曰白鷳失素南雲記曰韋齊休使至雲南其國饋白鷳皆生致之鶡說文曰鶡似雉出上黨列子曰黃帝與炎帝戰以鵰鶡為旗幟漢書曰京兆尹張敞言鶡雀飛集丞相府丞相黃霸以為神雀欲以上聞敞劾奏之霸大慚續漢書輿服志曰虎賁武騎皆鶡者勇雉也其鬭死乃止故趙武靈王以表武士焉晉八王故事曰張方將移惠帝於長安入殿奉迎自領五千騎皆捉鐵纏槊二節髮眊繫兜鍪皆用涼州白鶡毛望之若茶天子見之大驚山海經曰惲諸之山其鳥多鶡, SBCK: ''}
