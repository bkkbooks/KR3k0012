  - {type: variant, offset: 3203, length: 318, content: 公子姓辛氏字文子博學無所不通范蠡知其賢人卑身事之請受道藏於石室乃刑白鷸而盟焉鷓鴣崔鴻蜀錄曰蜀連有災天雨血地仍震地生毛鷓鴣集城下異物志曰鷓鴣其形似雌雞其志懷南不思北其名呼飛但南不北其肉肥美宜炙可以飲酒為諸膳也嶺表錄異曰鷓鴣臆前有白圓點背上間紫赤毛其大如小野雞多對啼南越志云鷓鴣雖東西迴翔然開翅之始必先南翥亦胡馬嘶北之義也其鳴自呼社薄州本草云自呼鉤輈格磔李群玉山行聞鷓鴣詩云方穿詰曲崎嶇路又聽鉤輈格磔聲白鷳西京雜記曰南越王獻高帝白鷳黑鷳各一隻後漢書班固傳西都賦曰招白鷳下雙鵠榆文竿出比目王彪之閩中賦曰林鷳繡白謝惠連雪賦曰白鷳失素南雲記曰韋齊休使至雲南其國饋白鷳皆生致之鶡說文曰鶡似雉出上黨列子曰黃帝與炎帝戰以鵰鶡為旗幟漢書曰京兆尹張敞言鶡雀, WYG: 鱣魚}
