  - {type: punctuation, offset: 2785, content: 《, id: KR3k0012_CHANT_925-bkkpn925}
  - {type: variant, offset: 2785, length: 0, content: '', SBCK: 飛則鳥行則摇鷁左傳曰正月戊申六鷁退飛過宋都風也莊子曰夫白鷁之相視眸子不運而風化列子曰河澤之鳥視而孕曰鶂録異傳曰弘公者吴興烏程人患瘧經年弘後獨至旁舎瘧發有數小兒或􅀐公腹或扶公首脚公因佯眠忽起捉得一兒遂化成黄鷁餘者皆走公乃􅅞以還家暮懸䆫上云明日當殺食之比曉失鷁處公瘧遂斷于時人有得瘧者但依弘便瘧斷晉書曰武帝謀伐吴詔王濬修舟艦濬乃作大舩連舫方百二十歩受二千餘人以木爲城起樓櫓開四出門其上皆得馳馬來徃又􅀞鷁首怪獸於舩首以懼江神􅀶物志曰白鷁雄雌相視則孕或曰雄鳴上風雌鳴下風則亦孕劉禎魯都賦曰緑鷁葱鶖鸊虎鷉爾雅曰鷉湏羸似鳬而小膏中蜇刀楊雄方言曰野鳬甚小而好没水中者南楚之外謂之鸊鵜大者謂之鶻鵜纂文曰鵅施石撽开零皆野鴨没食曰鵅長頸曰施多白曰开零在山澗曰石撽白􅖂音剥爾雅曰鵅烏􅖂郭璞注曰水鳥也似鶂而短頸後翅紫白色皆上緑色江東呼爲烏􅖂音駮卞敬宗􅖂賦曰烏真野之性備於俯仰之間專視緩歩有自卑之志鴇詩曰鴇羽刺時也晉昭公之後大亂五丗君子下從征役不得養父母也肅肅鴇羽集于苞栩肅肅鴇行集于苞桑肅肅鴇翼集于苞􅁄禮曰鷄肝鴈腎鴇奥鹿胃鄭玄云奥脾鶢鶋爾雅曰鶢鶋雜縣郭璞注曰漢文帝時琅琊有大鳥如馬駒時人謂之爰居廣志曰馬鳥鶢鶋莊子曰海鳥止於魯郊魯侯觴之於廟奏九韶以爲樂具太牢以爲膳鳥胘視憂悲不敢食一臠不敢飲一杯三日而死此以人養鳥也不如以鳥養鳥司馬彪曰即鶢鶋也國語曰海鳥曰委居止於魯東門之外三日妥居􅄂縣東門城門臧文仲使國人􅀕之文仲不知以爲神展禽曰越哉臧孫之爲政也越足也言其迂闊不知政要也夫祀國之大節也節制而節政之所成也言節所以成政故慎制祀以爲國典今無故而加典非政之冝也夫聖王之制祀也功施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能扞大患則祀之非是族也不在祀典今海鳥至巳不知而祀之以爲國典難以爲仁且智矣夫仁者講功而智者處物無功而祀之非仁也不知而不問非智也今兹海其有災乎夫廣川之鳥獸􅁪知而避其災也是歳也海多大風鵜鶘爾雅曰鵜鶘鴮鸅郭璞注曰今之鵜鶘也折好羣飛入水食魚故名夸睪俗呼爲陶河毛詩䟽曰唯鵜在梁許愼曰鵜鶘也一名汗澤陶河水鳥身形似鴆而極大啄長尺餘直而廣目中赤􅟀下故大如數斗囊􅀂有小水魚便抑水满其湖而棄之令水竭盡魚在陸地乃共食之故曰陶河魏志曰五月有鵜鶘集靈芝地詔曰此詩人所謂汚澤也曹詩㓨㳟公逺君子而近小人今豈有賢智之士處于下位乎否則斯鳥胡爲而至其􅀶舉天下雋德茂材獨行君子以荅曹人之㓨山海經曰憲斯之山沙水出焉其中多鵜鶘如鴛鴦而人足其鳴自呌見國有土功莊子曰魚不畏網而畏鵜鶘網者公平無私鵜鶘有心故魚畏之明主行賞罰如網淮南子曰鵜鶘飲水數􅂛而不足鸕鷀爾雅曰鶿鷧郭璞注曰即鸕鶿也觜角曲如鈎食魚}
