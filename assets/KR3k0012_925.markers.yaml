  - {type: variant, offset: 2810, length: 159, content: 翠唯六翮毛長寸餘青茸翡大於鷰小於烏臼楊孝元交趾異物志曰翠鳥先高作巢及生子愛之恐墜稍下作巢子生羽毛復益愛之又更下作巢也南中八郡異物志曰翠大如鷰腹背純赤民捕食之不知貴其毛羽也廣志曰翡色赤紺皆出交趾興古縣交州記曰翡翠出九真頭黑腹下赤青縹色似鷓鴣太玄經曰翡翠狐鼠好作也離騷曰翾飛兮翠層曾舉也言巠舞工巧翾然若翠舉楚辭曰翡翠幬王逸, SBCK: 紡澤虞孫炎}
