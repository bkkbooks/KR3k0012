  - {type: variant, offset: 2351, length: 1, content: 翅, WYG: 屬也飛則鳥行則搖鷁左傳曰正月戊申六鷁退飛過宋都風也莊子曰夫白鷁之相視眸子不運而風化列子曰夫河澤之鳥視而孕曰鷁錄異傳曰宏老吳興烏程人患瘧經年宏後獨至旁舍瘧發有數小鬼或騎公腹或扶公首脚公因佯眠忽起捉得一鬼遂化成黄鷁餘者皆走公乃縛以還家暮懸窓上云明日當殺食之比曉失鷁處公瘧遂斷于時人有得瘧者往依宏便瘧斷晉書曰武帝謀伐吳昭王濬修舟鷁濬乃作大船連舫方百二十丈受二千餘人以水}
