  - {type: 'tls:seg', offset: 522, content: '', id: KR3k0012_CHANT_925-9a.9}
  - {type: variant, offset: 522, length: 258, content: 大如青而小於白者交州以南盡有之白及五色出杜薄州凡鳥四指三向後此鳥兩向前兩指向後異於凡鳥也行則以口啄地然後足從之又曰廣管雷羅春勤等州多鸚鵡野者翠毛丹觜可效人言但稍小不及隴山者每群飛皆數百隻山果熟者遇之立盡南中云養之切忌以手捫摸其背犯者即不飲不啄病而卒余寓番禺曾遊新會縣遇安南歡好使麴將軍名承美見代為交趾使也見養一鸚鵡背尾有深淺翠毛臆前淡紫嫩紅間出兩腋別垂黃毛翅尾甚奇雲南行記曰瞿笇館磴道崎危又過兩重高山上下各十四五里山頂平四望無人煙多鸚鵡又曰新安城路多縵山盡是松林其上多鸚鵡飛鳴周宣夢書鸚鵡為亡人居宅也夢見鸚鵡是亡人也, SBCK: 食短}
