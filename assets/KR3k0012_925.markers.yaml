  - {type: variant, offset: 521, length: 43, content: 色大如青而小於白者交州以南盡有之白及五色出杜薄州凡鳥四指三向後此鳥兩向前兩指向後異於凡, WYG: 堅反說文曰鳽鵁鶄也曰鵁一曰石}
