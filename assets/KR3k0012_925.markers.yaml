  - {type: variant, offset: 2367, length: 1, content: 雲, WYG: 白鷁雄雌相視則孕或曰雄鳴上風雌鳴下風則亦孕劉禎魯都賦曰綠鷁葱鶖鸊鷉爾雅曰鷉須鸁揚雄方言曰野鳬甚小而好沒水中者}
  - {type: page-break, offset: 2367, content: '', id: KR3k0012_WYG_925-8b, image: WYG0901/WYG0901-0235b.png}
  - {type: variant, offset: 2369, length: 1, content: 郡, WYG: 楚之外謂之鸊鵜大者謂之鶻蹄纂文曰鵅施石檄零皆野鴨名沒食曰鵅長頸曰施多白曰零在山間曰石檄白􅖂爾雅曰鵅鳥􅖂卜敬宗􅖂賦曰鳥真野之性備於俯仰之間專視緩步有自卑之志鴇詩曰鴇羽刺時也晉昭公之後大亂五世君子下從征役不得養父母也肅肅鴇羽集于苞栩肅肅鴇行集于苞桑肅肅鴇翼集於苞棘禮曰鷄肝鴈腎鴇奥鹿胃鶢鶋爾雅曰爰居襍縣郭璞注曰漢文帝時瑯琊有大鳥如馬駒時人謂之𤣥居廣志曰馬鳥鶢鶋莊子曰海鳥止於魯魯侯􅜠之於廟奏九韶以為樂具太牢以為膳鳥眩視憂悲不敢食一臠飲一杯三日而死此以人養鳥也不如以鳥養鳥司馬彪曰即鶢鶋也國語曰海鳥曰鶢鶋止於魯東門之外二日鶢鶋雜縣東門城門臧文仲使國人祭之文仲不知以為神展禽曰越哉臧孫之為政也越迂也言其迂濶不知政要也夫祀國之大節也而節政之所成也言節所以成政故慎制祀以為國典今無故而加典非政之宜也夫聖王之制祀也功施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能扞大患則祀之非是族也不在祀典今海鳥至已不知而祀之以為國典難以為仁且智矣夫仁者講功而智者處物無功而祀之非仁也不知而不問非智也今茲海其有災乎夫廣川之鳥獸恒知而避其災也是歲也海多大風冬煖鵜鶘爾雅曰鵜鴮鸅郭璞注曰今之鵜鶘也好羣飛沉水食魚故名洿澤俗呼為淘河詩云維鵜在梁毛傳曰洿澤也許慎曰鵜一名洿澤一名淘河陸疏曰水鳥形如鶚而極大喙長尺餘直而廣口中正赤頷下胡大如數升囊若有小水魚便抒水滿其胡而棄之令水竭盡魚在陸地乃共食之故曰淘河魏志黄初時有鵜鶘集靈芝池詔曰此詩人所謂洿澤也曹詩刺共公逺君子而近小人今豈有賢智之處於下位乎否則斯鳥胡為而至其博舉天下雋徳茂才獨行君子以荅曹人之刺山海經曰憲期之山沙水}
