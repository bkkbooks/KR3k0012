  - {type: variant, offset: 1144, length: 1032, content: 或啄嬪御及諸王手使不能爭道忽一日飛上貴妃鏡臺語曰雪衣娘昨夜夢為鷙鳥所搏將盡於此乎上使貴妃授以多心經記誦頗精熟日夜不息若懼禍難有所攘者上與貴妃出於別殿貴妃致雪衣娘於步輦竿上與之同去既至上命從官校獵於殿下鸚鵡方戲於殿檻瞥有鷹至立時而斃上與貴妃歎息久之遂命瘞於苑中為立冢呼為鸚鵡塚赤鸚鵡沈約宋書曰謝莊為太子庶子時南平王鑠上赤鸚鵡普詔群臣為賦太子左衛率袁淑文冠當時作賦畢齎以示莊莊賦亦竟淑見而歎曰江東無我卿當獨秀我若無卿亦一時傑也遂隱其賦南史曰西南夷訶羅陁國宋元嘉七年遣使貢金指環赤鸚鵡五色鸚鵡吳時外國傳曰扶南東漲海中有洲出五色鸚鵡曾見其白者如母鷄廣志同唐書曰玄宗有五色鸚鵡能言育於宮中上命左右試牽御衣鳥輒瞋目吨吨歧王能文學因獻鸚鵡篇以贊其事上以示百寮尚書左丞相張說上表賀曰伏見天恩以靈異鸚鵡及所述篇出示朝列臣按南海異物志有時樂鳥鳴皆太平天下有道則見臣驗其圖丹首紅臆朱冠綠翼與此鸚鵡無異而心聰性辯護主報恩故非常品凡禽實瑞經所謂時樂鳥也歧王雖敘其事未正其名望編國史以彰聖瑞又曰元和十年訶陵國遣使獻五色鸚鵡頻伽鳥嶺表異錄曰容管廉白州產秦吉了大約似鸚鵡觜腳皆紅兩眼後夾腦有黃肉冠善效人言語音雄大分明於鸚鵡以熟鷄子和飯如棗飼之或云容州有純白色者俱未之見也孔雀春秋元命苞曰火離為孔雀周書曰成王時方獻孔雀方亦戎別名漢書曰罽賓國出孔雀又曰尉佗獻文帝孔雀二雙續漢書曰西南夷魚池出孔雀又曰西域條支國出孔雀張璠漢記曰條支國臨西海出師子孔雀江表傳曰魏文帝遣使於吳求孔雀群臣以為非禮欲不與孫權勑付使魏文帝與朝臣詔曰前于寘王所上孔雀尾萬枚文采五色以為金根車蓋遙望耀人眼吳志曰孫休永安五年使察獸到交趾調孔雀大豬又曰薛綜上䟽曰日南遠致孔雀充備寶玩不抑其賦以益中國吳錄地理志曰交阯西子縣多孔雀在山草中郡內及朱崖皆有之晉書公卿贊曰世祖時西域獻孔雀解人語彈指應聲起儛晉書公孫皓時交趾太守孫諝貪累為百姓所患會察獸鄧荀至擅調孔雀三千頭人畜一頭遣送秣稜和既苦遠役咸思為亂郡吏呂興殺諝及荀以郡內附齊書曰武帝年十三夢人以筆畫身左右為兩翅又著孔雀羽衣裳空中飛舉又曰文惠太子長懋製珍翫之物織孔雀毛為裘光采金翠過於雉頭遠矣後魏書曰龜茲國地多孔雀群飛山谷人取養及食乳如雞鶩唐書曰高祖穆皇后少時父母私相謂曰我女貌非常不可妄以許人當為之求賢夫矣乃於門屏畫二孔雀相對公子有求婚者輒與兩箭令射之父母潛相謂曰若中孔雀之目者即以妻之前後射者數千人莫能中高祖後至發各中一目肅公大悅因即與婚山海經曰南方多孔鳥郭璞曰孔雀也列仙傳曰蕭史吹簫致孔雀, WYG: ''}
