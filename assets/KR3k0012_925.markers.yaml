  - {type: variant, offset: 2348, length: 1, content: 孔, WYG: 異物奉異人􅜇鴒詩曰􅜇鴒在原兄弟急難毛詩義疏曰􅜇鴒水鳥一名渠梁大如鷃雀脚長尾尖喙背上青灰色腹下白頸下黑如連錢故杜陽謂之連錢爾雅曰䳭鴒雝渠郭璞注曰}
