  - {type: variant, offset: 3685, length: 311, content: 世俗之富貴也鴾爾雅曰鴾母也其子鸋郭璞注曰鴾青州呼鴾母廣雅曰鴽鴾也說文曰鴾鶉屬也一曰牟母一曰鴽呂氏春秋曰季春之日桐始華鼠化為鴽桐梧也是月華故曰始華田鼠化鴽幽州謂之鴾鶉詩曰鶉之奔奔剌衛宣姜也鶉之奔奔鵲之疆疆人之無良我以為兄又曰不狩不獵胡瞻爾庭有懸鶉兮爾雅曰鷯鶉其雄鶛牝庫其子文郭璞曰鶉鵪屬者也春秋運斗樞曰機星散為鶉德義少殘百家則鶉生狗大戴禮夏小正曰三月田鼠化為鴽鴽鷯也化而之善故盡其辭也鴽為鼠化而不善故不盡其辭也廣志曰宛鶉以供御孔元舒在窮記曰趙太龍以鶉二十枚奉上老母南方草物狀曰短頭細黃魚以九月中因秋風而變成鶉上圃吏民捕取鹽炙食滋味肥美出交趾合浦郡東方朔別傳曰占人被召見人以罔求鶉鶉飛入罔知必有罪非入罔罪字故也莊子曰田鼠化為鶉, WYG: 升矣}
