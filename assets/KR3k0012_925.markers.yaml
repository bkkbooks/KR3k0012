  - {type: variant, offset: 4396, length: 0, content: '', SBCK: 秃鶖鳥集于禁苑鶬爾雅曰鶬縻鴰郭璞注曰今呼鶬鴰音箭括一音利也莊子曰大鶬飽食仰天而嘘列子曰蒲且子之弋連雙鶬扵青雲之際楚辭曰酸鵠臇鳥臇}
  - {type: variant, offset: 4396, length: 67, content: 小鳥如鷦鷯來巢孕卵五色旦如鷄子數日𪆪毀鶵見已踰於母月餘五色成文大如鷄馴擾閑暇頃之飛翔時歸舊所人到令號兵曹鳥巢衣鳥洞冥記曰漢武帝時忽有細, WYG: 秃鶖}
  - {type: variant, offset: 4396, length: 0, content: '', krp: 秃鶖鳥集于禁苑鶬爾雅曰鶬縻鴰郭璞注曰今呼鶬鴰音箭括一音利也莊子曰大鶬飽食仰天而嘘列子曰蒲且子之弋連雙鶬扵青雲之際楚辭曰酸鵠臇鳥臇}
  - {type: variant, offset: 4397, length: 0, content: '', SBCK: 臛也煎鴻鶬江賦曰竒鶬九頭精衛山海經曰炎帝之女名媱游于東海溺而不反是爲精衞常取西山之木石以堙東海述異記曰昔炎帝女溺死東海中化爲精衞其鳴自呼毎衘西山木石以填東海怨溺死故也海畔俗說精衞無雄耦海燕而生生雌􅃺如精衞生雄􅃺如海鷰今東海畔精衛誓水處猶存溺扵此川誓不飲其水一名誓鳥一名宛禽又名志鳥俗呼爲帝女雀􅀶物志曰有}
