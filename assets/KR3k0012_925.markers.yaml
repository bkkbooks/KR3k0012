  - {type: variant, offset: 2312, length: 0, content: '', WYG: 江鷗一名海鷗在漲海中隨潮上下常以三月風至乃還洲嶼生卵似雞卵色青頗知風雲若羣飛至岸必風漁人及渡海者皆以此為候列子曰海上之人有好鷗鳥者每旦至海上從鷗鳥游鷗鳥之至者百數而不止其父曰吾聞鷗鳥皆從汝游取來吾翫之明日之海上鷗鳥舞而不下也晉咸和起居注曰二年正月饗萬國有五鷗集太極殿前晉中興徴祥說曰鷗集太極殿鷗湖澤鳥也殿非所處時蘇峻作逆宫室被焚周書曰崔湜既私附太平公主時人咸為之懼門客陳振鷺獻海鷗賦以諷之湜雖稱善而心實不恱鷺詩曰坎其擊鼓宛丘之下無冬無夏值其鷺羽鷺鳥之羽可以翳舞者所持以指麾又曰振鷺二王之後來助祭也振鷺于飛于彼西雝我客戾止亦有斯容又曰振振鷺鷺于下鼔咽咽醉言舞於胥樂兮毛詩}
  - {type: page-break, offset: 2312, content: '', id: KR3k0012_WYG_925-5b, image: WYG0901/WYG0901-0233d.png}
