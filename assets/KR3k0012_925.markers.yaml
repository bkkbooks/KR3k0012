  - {type: variant, offset: 2733, length: 469, content: 九革加翡翠吳錄曰薛綜上䟽曰日南遠致翡翠充備寶玩晉令曰翡鳥不得西度隴倉頡解詁曰鷸翠別名也說文曰翡翠青赤雀也異物志曰翠鳥似鷰翡赤而翠青其羽可以為飾南州異物志曰翠唯六翮毛長寸餘青茸翡大於鷰小於烏臼楊孝元交趾異物志曰翠鳥先高作巢及生子愛之恐墜稍下作巢子生羽毛復益愛之又更下作巢也南中八郡異物志曰翠大如鷰腹背純赤民捕食之不知貴其毛羽也廣志曰翡色赤紺皆出交趾興古縣交州記曰翡翠出九真頭黑腹下赤青縹色似鷓鴣太玄經曰翡翠狐鼠好作也離騷曰翾飛兮翠層曾舉也言巠舞工巧翾然若翠舉楚辭曰翡翠幬王逸注曰翡翠之羽彫飾幬帳宋玉登徒子賦曰眉如翠羽司馬相如子虛賦曰錯翡翠之葳蕤以翡翠之羽飾步搖置之笄頭也左司吳都賦曰山鷄歸飛而來栖翡翠列巢以重行劉邵七華曰剪儁陵之縹翠承蔥嶺之碧鷄秦書曰符堅時西域獻翠鳥四頭雄雌各二籠盛之月餘並死左傳曰鄭子臧好藂鷸冠戰國策曰趙且伐燕蘇代謂燕惠王曰今者臣來過水蚌方出曝而鷸啄其肉蚌合而拑其啄鷸曰今日不雨明日不雨即見蚌脯蚌亦謂鷸曰今日不出明日不出必有死鷸蚌鷸兩不肯解漁者併擒之今趙且伐燕燕趙久相支以獘眾臣恐強秦之為漁父也范子計然曰計然者蔡丘濮上人晉, WYG: 銜}
