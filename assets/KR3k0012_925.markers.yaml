  - {type: variant, offset: 677, length: 466, content: 鸚鵡背尾有深淺翠毛臆前淡紫嫩紅間出兩腋別垂黃毛翅尾甚奇雲南行記曰瞿笇館磴道崎危又過兩重高山上下各十四五里山頂平四望無人煙多鸚鵡又曰新安城路多縵山盡是松林其上多鸚鵡飛鳴周宣夢書鸚鵡為亡人居宅也夢見鸚鵡是亡人也其在堂上憂豪賢白鸚鵡笁法真登羅浮山記曰山中有純白鸚鵡異苑曰張華字茂先有一白鸚鵡華每行還鳥輒說僮使善惡後寂無言華問其故鳥云見藏甕中何由得知公後在外令喚鸚鵡鸚鵡曰昨夜夢惡不出戶公猶強之至庭為鸇所撥教其啄鸇腳僅而獲免南史曰婆皇國宋大明三年獻赤白鸚鵡又曰婆利國梁普通三年其王頻伽遣使珠智獻白鸚鵡隋書曰杜正玄幼聰敏博涉多通開皇末舉秀才會林邑獻白鸚鵡僕射楊素促召正玄使作賦正玄倉卒之際援筆立成素見文不加點始異之又曰獨孤師受蕃客鸚鵡帝察知遂斬之唐書曰貞觀中陁洹國王察失利多婆末郍遣使獻曰鸚鵡毛羽皓素頭上有紅毛數十垂與翅齊并五色鸚鵡各一明皇雜錄曰開元中嶺南獻白鸚鵡養之宮中歲久頗聰慧洞曉言詞上及貴妃皆呼雪衣女性既馴擾常假其飲啄飛鳴然亦不離屏帷間上令以近代詞臣詩篇授之數遍便可諷誦上每與貴妃及諸王博戲上稍不勝左右呼雪衣娘必飛入局中一鼓舞以亂其行, WYG: 名精}
