  - {type: 'tls:seg', offset: 2781, content: '', id: KR3k0012_CHANT_925-39a.4}
  - {type: variant, offset: 2782, length: 0, content: '', SBCK: 頗知風雲􅀂羣飛至岸必風漁人及度海者皆以此爲候列子曰海上之人有好鷗鳥者毎旦之海上從鷗鳥遊鷗鳥之至者百數而不止其父曰吾聞鷗鳥皆從汝遊取來吾翫之明日之海上鷗鳥舞而不下也晉咸和起居注曰二年正月饗萬國有五鷗集太極殿前晉中與徴祥說曰鷗集太極殿殿非鷗所處湖澤鳥也時􅂫峻作逆宫室􅀍焚唐書曰崔湜旣私附太平公主時人咸爲之懼門客陳振鷺獻海鷗賦以諷之湜雖稱善而心實不恱鷺詩曰坎其擊鼔宛丘之下無冬無夏值其鷺羽鷺鳥之羽可以翳舞者所持以指麾又曰振鷺二王之後來助􅀕也振鷺于飛于彼西雝我客戾止亦有斯容又曰振振鷺鷺于下鼔咽咽醉言舞于胥樂兮毛詩義䟽曰鷺水鳥好白而潔故謂之白鳥齊魯之間謂之春鋤遼東樂浪吴楊人皆云白鷺大小如鷂青脚髙尺七八寸解指尾如鷹尾啄長三寸頂上有毛十數枚長尺餘毿毿然衆毛異甚好將欲取魚時弭之今吴人亦養之好羣飛行楚成王時有朱鷺合沓飛舞則復有}
  - {type: page-break, offset: 2782, content: '', id: KR3k0012_SBCK_925-3b}
  - {type: variant, offset: 2782, length: 0, content: '', krp: 頗知風雲若羣飛至岸必風漁人及度海者皆以此爲候列子曰海上之人有好鷗鳥者毎旦之海上從鷗鳥遊鷗鳥之至者百數而不止其父曰吾聞鷗鳥皆從汝遊取來吾翫之明日之海上鷗鳥舞而不下也晉咸和起居注曰二年正月饗萬國有五鷗集太極殿前晉中與徴祥說曰鷗集太極殿殿非鷗所處湖澤鳥也時蘇峻作逆宫室𬒳焚唐書曰崔湜旣私附太平公主時人咸爲之懼門客陳振鷺獻海鷗賦以諷之湜雖稱善而心實不恱鷺詩曰坎其擊鼔宛丘之下無冬無夏值其鷺羽鷺鳥之羽可以翳舞者所持以指麾又曰振鷺二王之後來助祭也振鷺于飛于彼西雝我客戾止亦有斯容又曰振振鷺鷺于下鼔咽咽醉言舞于胥樂兮毛詩義䟽曰鷺水鳥好白而潔故謂之白鳥齊魯之間謂之春鋤遼東樂浪吴楊人皆云白鷺大小如鷂青脚髙尺七八寸解指尾如鷹尾啄長三寸頂上有毛十數枚長尺餘毿毿然衆毛異甚好將欲取魚時弭之今吴人亦養之好羣飛行楚成王時有朱鷺合沓飛舞則復有}
  - {type: variant, offset: 2783, length: 0, content: '', SBCK: 色舊鼔吹曲有朱鷺是也爾雅曰鷺舂鋤郭璞注曰白鷺也頭翅背上皆有長翰毛江東以取爲接離名之月白鷺穆天子傳曰天子作詩三章以哀民曰有皎者鴼鴼鳥名音路鶣鶣其飛幽明録曰巴東有一道士忘其姓名事道精進入屋燒香忽有風􅀨至家人見一白鷺從屋中飛出􅀨住遂失道士所在古金樂録曰吴王夫差時有􅀟鷺飛出皷中而去南史曰張融年弱冠同郡道士陸修靖以白鷺羽扇遺之曰此異物奉異人䳭鴒詩曰䳭鴒在原兄弟急難毛詩義䟽曰䳭鴒水鳥一名渠梁大如鷃}
  - {type: page-break, offset: 2783, content: '', id: KR3k0012_SBCK_925-4a}
  - {type: variant, offset: 2783, length: 0, content: '', krp: 色舊鼔吹曲有朱鷺是也爾雅曰鷺舂鋤郭璞注曰白鷺也頭翅背上皆有長翰毛江東以取爲接離名之月白鷺穆天子傳曰天子作詩三章以哀民曰有皎者鴼鴼鳥名音路鶣鶣其飛幽明録曰巴東有一道士忘其姓名事道精進入屋燒香忽有風雨至家人見一白鷺從屋中飛出雨住遂失道士所在古金樂録曰吴王夫差時有雙鷺飛出皷中而去南史曰張融年弱冠同郡道士陸修靖以白鷺羽扇遺之曰此異物奉異人䳭鴒詩曰䳭鴒在原兄弟急難毛詩義䟽曰䳭鴒水鳥一名渠梁大如鷃}
