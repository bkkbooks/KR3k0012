  - {type: variant, offset: 2313, length: 7, content: 寧縣杜山多孔雀, WYG: 疏曰鷺水鳥好而潔白故謂之白鳥齊魯之間謂之舂鋤遼東樂浪吳揚人皆云白鷺大小如鴟青脚高尺七八寸尾如鷹尾喙長三寸頭上有毛十數枚長尺餘毿毿然與衆毛異將欲取魚時則弭之今吳人亦養之好羣飛鳴楚成王時有朱鷺合㳫飛舞則復有赤者舊鼓吹曲有朱鷺是也爾雅曰鷺舂鋤郭璞注曰白鷺也頭翅背上皆有長翰毛江東取以}
