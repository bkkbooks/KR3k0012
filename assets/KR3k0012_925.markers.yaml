  - {type: variant, offset: 2200, length: 183, content: 鹽鐵論曰南越以孔雀珥門戶今貴其所饒非所以厚中國也太玄經曰孔鴈之義可法則也虞翻注曰鴈飛成列亦成行故可法則也郭子曰梁國陽氏子年九歲甚聰慧孔君平詣其父不在乃呼兒出為之設果有楊梅孔指以示兒此實君家果應聲荅曰未聞孔雀是夫子家禽南越志曰義寧縣杜山多孔雀為鳥不必疋合止以音影相接便有孕楚辭曰孔雀蓋兮翠旌王延曰以孔雀之翅為車蓋登九天兮撫慧星華陽國志曰雲南郡出孔雀常以二月來翔月餘而去, SBCK: ''}
