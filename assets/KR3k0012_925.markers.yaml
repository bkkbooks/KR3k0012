  - {type: variant, offset: 2779, length: 2, content: 翡翠, SBCK: 鷗水鴞也山海經曰玄服國其人食鷗南越志曰江鷗一名海鷗在漲海中隨潮上下常以三月風至乃還洲嶼生夘似鷄夘色}
  - {type: variant, offset: 2779, length: 2, content: 翡翠, krp: 鷗水鴞也山海經曰玄服國其人食鷗南越志曰江鷗一名海鷗在漲海中隨潮上下常以三月風至乃還洲嶼生夘似鷄夘色}
