  - {type: variant, offset: 792, length: 121, content: 為縣門下小吏縣令劉雄為賊所攻欲以矛剌雄輔前叩頭以身代雄賊等遂戟剌輔貫心洞背即死東郡太守捕得賊具以狀上詔書傷痛之蜀志曰劉琮聞曹公來征遣使請降先主在樊聞之率眾南行諸葛亮與友人徐庶並從為曹公所追獲庶母庶辭先主而指其心曰本欲與將軍共圖王霸之業者以此方, SBCK: 也長八尺九}
