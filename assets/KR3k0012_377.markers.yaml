  - {type: variant, offset: 2554, length: 2205, content: 千人橫行天下竟以壽終漢書曰蒯通說韓信曰今劉項分爭使人肝腦塗地流離中野不可勝數又曰息夫躬絕命辭曰涕泣流雚蘭心結愲音骨兮傷肝魏末傳曰諸葛誕殺文欽及城陷欽子鴦虎先入殺誕噉其肝續晉陽秋曰會稽太守謝琰拒孫恩恩帳下都督張猛於後斫馬琰墮地遂殺之高祖左里之捷生禽猛送琰小子混混刳肝生食之崔鴻十六國春秋北涼錄曰馬權兄為涼將綦母詡所殺權後殺詡食其肝括地圖曰細民肝不朽死八年復生穴處衣皮莊子曰盜跖居太山膾人肝而食之呂氏春秋曰衛懿公有臣弘演有所使翟人攻衛殺懿公盡食其肉獨舍其肝弘演至報使見肝盡哀而止曰臣請為襮音博因自殺先出其肝內公之肝齊桓公聞之復衛高誘注曰襮表也賈子曰武王伐紂紂鬭而死棄之王門外民蹈其腹蹙其腎踐其肺履其肝武王以幃守之民褰而入以石抵之者猶未止唐書曰天寶三年有星如月墜于東南墜後有聲京師訛言官遣棖捕人肝以祭天狗人相恐畿縣尤甚發使安之談藪曰徐摛好為體語嘗體一人病癰曰朱血夜流黃膿晝寫斜看紫肺正視紅肝肺說文曰肺水藏也釋名曰肺勃也其氣勃鬱也毛詩蕩桑柔曰自有肺腸俾民卒狂博物志曰鏐音留民其肺不朽百年復生白虎通曰肺所以義者何肺者金之精義者斷決西方亦殺成萬物故肺象金色白繫於鼻脾說文曰脾金藏也釋名曰脾裨也在胃下裨助胃氣主化穀也陳思王辨道論曰甘始論車師之西國兒生劈背出脾欲其食少而努行也白虎通曰脾之為言併也所以併積氣又曰脾所以信何脾者土之精土尚任養萬物無所私信之至也故脾象土色黃繫於舌腎說文曰腎水藏也釋名曰腎屬水主引水氣灌注諸脈也尚書盤庚曰今我其敷心腹腎腸歷告爾百姓于朕志布心腹言輸誠於百姓以告志文子曰腎主鼻白虎通曰腎所以智何腎者水之精智者進止無所疑惑水亦進而不惑北方水故腎黑陰故腎雙居膽說文曰膽連肝之府也史記曰吳既赦越王勾踐返國苦身焦思置膽於坐臥即仰飲膽曰汝忘會稽之恥乎魏志曰樂進字文謙陽平衛國人容貌短小心膽烈從太祖為帳下吏又曰袁紹在黎陽將南渡時程昱有七百兵守鄄城太祖使人告昱欲益二千兵昱不肯曰袁紹擁十萬眾自以所向無前今見昱兵少必不來攻太祖從之紹果不往太祖謂賈詡曰程昱之膽過於賁育又曰袁紹既并公孫瓚兼四州地眾十餘萬諸將以為不可敵公曰紹志大而智小色厲而膽薄土地雖廣糧食豐適所以為奉吾也吳志曰呂蒙病篤孫權問曰卿如不起誰可代者對曰朱然膽有餘愚以為可任蒙卒權假朱然節鎮江陵又曰朱然長不過七尺氣候分明內行修潔其所文彩唯施軍器餘皆質素終日欽欽常存戰場臨急膽定尤過絕人管輅別傳曰輅年十五琅耶太守單子春雅有才度欲見輅輅造之客百餘人有能言之士輅謂子春曰府君名士加有雄貴之姿輅既年少膽未堅剛若欲相觀懼失精神先飲三升清酒然後而言子春大喜酌三升獨使飲之於是輅與人人荅對言皆有餘趙雲別傳曰雲字子龍先主入益州雲留守營曹公爭漢中地運米北山下數千萬囊黃忠以為可取過期不還雲將數十人出圍視忠值曹公揚兵大出為前鋒所擊且卻公軍散走已復合雲陷敵還入營更大開門偃旗鼓公疑雲有伏兵引去雲鼓震以戎弩於後射公軍公軍驚駭因相蹂踐墮漢水死者甚多先主明日自來視昨戰處曰子龍一身都為膽宋書曰太學生會稽魏淮以才學為王融所賞既欲奉子良而淮鼓成其事太學生盧義丘園賓竊相謂曰竟陵才弱王中書無斷敗在目中矣及融誅召淮入舍人省詰問遂懼而死舉體皆青時人謂淮膽破唐書曰武懿宗安撫河北諸州先是百姓有脅從賊者後得歸來懿宗以為同反盡生刳取其膽然後行刑流血盈前言笑自若又曰孫思邈對盧照鄰曰膽欲大而心欲小黃帝素問曰膽者中心之官斷決出焉白虎通曰膽者肝之府肝者木之精主仁仁者苦不忍故以膽斷是以仁者有勇故膽斷也肝膽異處何以其相為府也肝者木精木之為言牧也人怒無不色青目振張者是其效也西京雜記曰秦有方鏡廣四尺高五尺九寸表裏有明人直來照之影則倒見以手掩心而來即見腸胃五藏歷然人有疾病在內即掩心照之即知病之所在女有邪心則膽張心動秦始皇帝以照宮人膽張心動者則殺之世說曰姜維死時見剖膽大如斗胃說文曰胃穀府也釋名曰胃圍也受食物也春秋元命苞曰胃者脾之府主稟氣胃者穀之委故脾稟氣也魏略曰陳思王精意著作食飲損減得反胃病也物理論曰腹胃五藏之府陶冶之大化也腸說文曰腸大小腸也釋名曰腸暢也暢胃氣去滓穢也史記曰聶政剌殺韓累因自披面抉眼自屠出腸遂以死又曰衛綰為中郎將郎官有譴常蒙其罪不與他將爭有功常讓他將上以為廉忠實無他腸後漢書曰董卓將兵擊韓遂詔徵卓為少府不肯就上書言所將湟中義從及秦胡兵牽挽臣車使不得行羌胡弊腸狗態言羌胡心腸弊情態如狗也臣禁不能止魏略曰丁沖為司隸校尉後數歲遇諸將飲美不能止醉爛腸而死吳書曰孫堅母懷堅夢腸出繞吳昌門寤而懼之告鄰母母曰安知非吉徵梁書曰王偉嘗為侯景作檄檄湘東王及景敗獲偉王怒釘其舌抽其腸而死抱朴子曰欲得長生腸中清欲得不死腸無屎白虎通曰大賜小腸心之府也主禮禮有分理腸亦大小相承受也王子年拾遺錄曰北有浣腸之國從口中引腸出出而浣濯之更遞易其五藏浣畢嘯慠而飛焉楚辭九章曰惟郢路之遼遠腸一夕而九廻膀胱廣雅曰膀胱謂之脬音胞釋名曰胞𩎘步交切也𩎘虛空之言也主以虛承水汋也或曰膀胱言體短而橫廣也脬輿胞同音春秋元命苞曰膀胱者肺之府也肺者斷決膀胱亦常張有勢故膀胱決難也尻說文曰睢尻也脽音誰釋名曰尻寥也所在寥牢深也漢書曰文帝嘗夢欲上天不能有一黃頭郎推之上天顧見其衣尻帶後穿師古曰衣尻帶後謂衣當尻上而居革帶之下處也覺而之漸臺以夢中陰目推者郎見鄧通其衣後穿夢中所見也召問其姓名文帝甚悅尊幸之王隱晉書曰成都王攻洛大駕幸北城上觀看孟豺軍人擘尻面天子豺士皆切後降長沙王以豺軍人辱帝東市斬之晉中興書曰胡母輔之子謙之醉與父語常呼父字輔之亦不怪也常窺輔之厲聲曰彥國老, SBCK: ''}
