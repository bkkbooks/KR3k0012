  - {type: variant, offset: 776, length: 0, content: '', SBCK: 養馬日磾長八尺二寸容貌甚嚴馬又肥好上異而問之以夲狀對上即日賜湯沐衣冠拜爲馬監又曰王商長八尺餘身體洪大容貌絶人單于來朝見商而拜又曰王莽夙夜連率韓愽上言有竒士長一丈大十圍來至臣府曰欲奮擊胡虜自謂巨母霸出於蓬萊東南五城西北昭}
