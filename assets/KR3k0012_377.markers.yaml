  - {type: variant, offset: 787, length: 0, content: '', SBCK: 馮勤字衛伯魏郡人曽祖父楊宣帝時爲弘農太守有八子皆爲二千石趙魏間榮之號萬石焉兄弟形皆偉壯唯勤祖優知長不滿七尺常自謂短陋恐子孫似之乃爲子汎娶長妻生勤長八尺三寸又曰賈逵長八尺二寸京師爲之語曰問事不休賈長頭華嶠後漢書曰趙壹字元淑漢陽人體貌魁梧身長八尺羙􅂡眉望之甚偉范曄後漢書曰虞延字子大陳留人延生其上有物􅀂一疋絹遂上􅂛天占者以爲􅁻及身長六尺六寸􅆎帶十圍力能扛鼎又曰大將軍􅀽紹揔兵兾州遣使要鄭玄大㑹賔客􅀇最後至乃延􅂛上坐身長八尺飲酒一斛秀眉明目容儀温偉又曰郭林宗儀貌魁岸身八尺聲如鍾􅀽宏漢紀曰長樂衛尉馬騰其長八尺身體洪大面鼻雄異而性賢厚人多敬之魏志曰}
  - {type: page-break, offset: 787, content: '', id: KR3k0012_SBCK_377-2b}
  - {type: variant, offset: 787, length: 0, content: '', WYG: 馮勤字衛伯魏郡人曽祖父陽宣帝時為𢎞農太守有八子皆為二千石趙魏間榮之號萬石焉兄弟形皆偉壯唯勤祖優知長不滿七尺常自謂短陋恐子孫似之乃為子汎娶長妻生勤長八尺三寸又曰賈逵長八尺二寸亰師為之語曰問事不休賈長頭華嶠後漢書曰趙一字元淑漢陽人體貌魁梧身長八尺美鬚眉望之甚偉范曄後漢書曰虞延字子大陳留人延生其上有物若一疋絹遂上升天占者以為吉及身長六尺六寸腰帶十圍力能扛鼎又曰大將軍袁紹總兵兾州遣使要鄭元大㑹賔客元最後至乃延升上坐身長八尺飲酒一斛秀眉眀目容儀温偉又曰郭林宗儀貌魁岸身八尺聲如鍾袁宏漢記曰長樂衛尉正騰其長八尺身體洪大面鼻䧺異而性賢厚人多敬之魏志曰}
  - {type: page-break, offset: 787, content: '', id: KR3k0012_WYG_377-3b, image: WYG0896/WYG0896-0357b.png}
  - {type: page-break, offset: 787, content: '', id: KR3k0012_WYG_377-4a, image: WYG0896/WYG0896-0357c.png}
  - {type: variant, offset: 787, length: 0, content: '', krp: 馮勤字衛伯魏郡人曽祖父楊宣帝時爲弘農太守有八子皆爲二千石趙魏間榮之號萬石焉兄弟形皆偉壯唯勤祖優知長不滿七尺常自謂短陋恐子孫似之乃爲子汎娶長妻生勤長八尺三寸又曰賈逵長八尺二寸京師爲之語曰問事不休賈長頭華嶠後漢書曰趙壹字元淑漢陽人體貌魁梧身長八尺羙鬚眉望之甚偉范曄後漢書曰虞延字子大陳留人延生其上有物若一疋絹遂上升天占者以爲吉及身長六尺六寸腰帶十圍力能扛鼎又曰大將軍袁紹揔兵兾州遣使要鄭玄大㑹賔客玄最後至乃延升上坐身長八尺飲酒一斛秀眉明目容儀温偉又曰郭林宗儀貌魁岸身八尺聲如鍾袁宏漢紀曰長樂衛尉馬騰其長八尺身體洪大面鼻雄異而性賢厚人多敬之魏志曰}
  - {type: variant, offset: 788, length: 0, content: '', SBCK: 禇字仲康長八尺餘大十圍容貌雄異勇力絶人晉書曰羊祐身長七尺三寸羙􅂡眉太原郭奕見之曰此今之顔子也晉書載記曰劉曜子胤風骨俊茂爽朗卓然身長八尺三寸髮與身齊多力善射驍捷如風雲曜因以重之三十國春秋曰燕徴其東萊太守王鸞鸞身長九尺􅆎帶十圍貫甲跨馬不據鞌由鐙燕王徳見而竒其魁偉賜之食一進一斛餘徳驚曰所噉如此非耕而能飽但才貌不凢堪爲貴人可以一縣試之繇是拜逢陵長甚有治績崔鴻前􅁗録曰鹿緼字處嘿西平人也身長八尺􅆎帶十圍清辯善論雄武便弓馬孝友貞亮聲髙一時車頻􅁗書曰符堅時有申香長十尺以上爲拂盖郎裴景仁􅁗書曰姚萇圍符堅遣僕射尹緯詣闕陳事堅見緯貌魁梧志氣秀傑􅆎帶十圍瑰偉異常驚而問曰卿於朕丗何爲所作偉荅曰尚書令史堅􅀏曰卿宰相才也宋書曰南郡王義宣爲荆州刺史白晢羙􅂡眉身長七尺五寸􅆎帶十圍齊書曰王茂先身長八尺㓗白羙容儀齊武帝布衣時常見之歎曰王茂先年少堂堂如此必爲公}
  - {type: page-break, offset: 788, content: '', id: KR3k0012_SBCK_377-3a}
  - {type: page-break, offset: 788, content: '', id: KR3k0012_SBCK_377-3b}
  - {type: variant, offset: 788, length: 0, content: '', WYG: 禇字仲康長八尺餘大十圍容貌䧺異勇力絶人晉書曰羊祜身長七尺三寸美鬚眉太原郭奕見之曰此今之顔子也晉書載記曰劉曜子允風骨俊茂爽朗卓然身長八尺三寸髪與身齊多力善射驍捷如風雲曜因以重之三十國春秋曰燕徴其東莱太守王鸞鸞身長九尺腰帶十圍貫甲跨馬不㨿鞍由鐙燕王徳見而竒其魁偉賜之食一進一斛餘徳驚曰所噉如此非耕而能飽但才貌不凡堪為貴人可以一縣試之繇是拜逢陵長甚有治績崔鴻前秦録曰鹿緼字處嘿西平人也身長八尺腰帶十圍清辯善論䧺武便弓馬孝友貞亮聲髙一時車頻秦書曰符堅時有申香長十尺以上為拂盖郎裴景仁秦書曰姚萇圍符堅遣僕射尹緯詣闕陳事堅見緯貌魁梧志氣秀傑腰帶十圍瑰偉異常驚而問曰卿於朕世何所作為偉荅曰尚書令史堅笑曰卿宰相才也宋書曰南郡王義宣為荆州刺史白晢美鬚眉身長七尺七寸腰帶十圍齊書曰王茂先身長八尺潔白美容儀齊武帝布衣時常見之嘆曰王茂先年少堂堂如此必為公}
