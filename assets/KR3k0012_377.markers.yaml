  - {type: variant, offset: 1172, length: 0, content: '', SBCK: 凢人司馬彪序傳曰朗祖父儁字元異􅀶學好古倜儻有大度長八尺三寸腰十圍儀狀魁岸行與衆有異郷黨宗族咸影附焉祖冲之述異記曰符徤皇始四年有長人見身長五丈語人張靖曰今當太平新平令以聞健以妖妄召靖繫之是月霖雨河渭泛溢蒲坂津監登於河中流得大􅄚一􅃗長七尺三寸足跡稱􅄚指長尺餘文深七寸璅語曰齊景公伐宋至曲陵夢見大君子甚長而大大下而小上其言甚怒好仰晏子曰􅀂是則盤庚也夫盤庚之長九尺有餘大下小上白色而髯其言好仰而聲上公曰是也是怒君師不如違之遂不伐宋也丗說曰滿寵寵子偉偉子奮皆長八尺長絶域人河圖玉板曰從崑崙以北九萬里得龍伯國人長三十丈生萬八千歳而}
