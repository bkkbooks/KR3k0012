  - {type: variant, offset: 110, length: 172, content: 信神則不怒而威致樂以治心者也又緇衣曰子曰民以君為心君以民為體心莊則體舒心肅則容敬心好之身必安之君好之民必欲之心以體全亦以體傷君以民存亦以民亡又大學曰欲脩其身者先正其心左傳莊公曰楚武王伐隨入告夫人鄧曼曰余心蕩矣鄧曼歎曰王祿盡矣盈而蕩天之道也故臨武事將發大命而蕩王心焉若師徒無虧王薨於行國之福也王遂行卒於樠音門木之下又昭公五年曰周景王鑄無射泠州鳩曰, SBCK: ''}
