  - {type: variant, offset: 1787, length: 256, content: 也子心六孔通流一孔不達舊說聖人心有七孔今聖智為病者或由此乎孟子曰人皆知糞其田莫知糞其心糞田不過苗利得粟糞心易行而得所欲何謂糞心博學多聞何謂易行一欲止淫又曰見孺子入井皆有惻隱之心非子父母也無此心者非人也無善惡之心非人也莊子曰孔子曰凡人心險於山川難知於天又曰萬惡不可納於靈臺司馬注曰心為神聖之臺又曰至人之用心若鏡郭象注曰鑒物無錯不將不迎應而不藏來即應去即止韓子曰西門豹性急佩韋以緩己董安于心緩佩弦以自急子思子曰百心不可得一人一心可得百人孫卿子曰君子之學入乎耳著乎心布乎四支動靜皆可為法公孫尼子曰心者眾智之要物皆求於心, SBCK: 猶長數十丈}
