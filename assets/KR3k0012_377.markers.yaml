  - {type: variant, offset: 1172, length: 4, content: 死也天帝, WYG: 凡人司馬彪序傳曰郎祖父髙字元興博學好古倜儻有大度長八尺三寸腰十圍儀狀魁岸行與衆有異鄉黨宗族咸影附焉祖冲之述異記曰符徤皇始四年有長人見身長五丈語人張靖曰今當太平新平令以聞徤以妖妄}
