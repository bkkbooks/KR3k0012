  - {type: variant, offset: 2319, length: 154, content: 相問無病也案易傳上古露宿患恙虫噬食人心凡相訪問曰無恙乎非謂病也世說曰魏武云人欲危己己輒心動因語所親小人曰汝懷刀密來我側我必心動使戮汝但勿言當厚相報懷刀者信焉遂斬之謀逆者挫氣又曰簡文帝入華林園顧左右曰會心處不必在遠翳然林木便自有濠梁想覺魚鳥自來見親諸葛亮書曰吾心如秤不能為人作輕重肝說文曰肝火藏也釋名曰肝幹也於, SBCK: 長一丈}
