  - {type: variant, offset: 3037, length: 308, content: 史大夫公孫弘曰臣居山東為少吏時寧成為濟南都尉其治如狼牧羊誠不可令治民上乃拜成為關都尉又曰汲黯字長孺為東海太守歲餘大治上聞召為主爵都尉治務在無為而已引大體不拘文法漢書曰主爵中尉秦官掌列侯景帝中元六年更名都尉武帝太初元年更名右扶風治內史右地與左馮翊京兆是為三輔皆有兩丞又曰韓信數以策干項羽羽弗用亡楚歸漢未得知名為連敖楚官坐法當斬信乃仰視滕公曰不欲就天下乎而斬壯士滕公奇壯之與語大說言於漢王以為治粟都尉東觀漢記曰樊曄與世祖有舊世祖常於新野坐文書事被拘時曄為市吏餽餌一笥上德之後拜為河東尉臨發之官引見雲臺賜御食衣被上啁曄曰一笥餌得都尉何如曄頓首曰小臣蒙恩特見拔擢陛下不忘往舊臣得竭死自効又曰任延字長孫南宛人更始拜為西部都尉年, SBCK: 覽卷第二百四}
