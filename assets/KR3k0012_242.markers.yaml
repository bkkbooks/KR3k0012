  - {type: variant, offset: 3489, length: 868, content: 千石後更為典弩都尉又有典鎧都尉秩與弩同皆屬積弩又曰撫軍都尉秩比二千石本校事官始太祖欲廣耳目使盧洪趙達二人主剌舉洪達多所陷入故于時軍中為之語曰不畏曹公但畏盧洪盧洪尚可趙達殺我後達竟為人迫死魏志曰韓暨為監冶謁者在職七年器用充實詔書襃歎就加司金都尉班亞九卿吳志曰孫桓字叔武儀容端正器懷聰朗愽學強記能論議應對權常稱為宗室顏淵擢為武衛都尉從討關羽於華容誘羽餘黨得五千人牛馬器械甚眾臨海記曰漢元鼎五年立都尉府於侯官以鎮撫二越所謂東南一尉者也黃帝占軍氣決曰都尉氣如合抱之榆周紹新論曰散騎侍郎武衛都尉孫奇字仲容年十七以秀才入侍帷幄余作詩一篇美而風之恂恂周公美妙無已誕姿既豐世冑有紀平南之孫奮威之子胡廣邊都尉箴曰巍巍上聖光被八堤矧惟內外罔不來賓季末陵遲王澤壅隔戎狄作難鬼方騷逖桓桓猛將是攘是闢殷宗周宣用顯其績大漢龍興念存治平蕩蕩率土來同門并守撫其民尉典其戎五才並用文武程功奉車都尉韋昭辯釋名曰奉車都尉奉天子乘輿辯云奉車都尉主乘輿乘車尊不敢言主故言奉漢書曰奉車都尉掌御乘輿車騎都尉魏略曰李豐字安國年十七在鄴下名為清白識別人物明帝時得吳降人問江東聞中國名士為誰降人云聞有李安國者是時豐為黃門郎上曰豐名乃播於吳越耶轉拜騎都尉又曰畢軌字昭先明帝在東宮時軌在文學中及即位入為黃門郎拜騎都尉魏志曰徐晃字公明河內東陽人也為郡吏從車騎將軍楊奉討賊有功拜騎都尉吳志曰駱統字公緒會稽烏陽人時飢荒多有困乏統為飲食衰少其姉仁愛寡歸無子見統甚哀之數問其故統曰士大夫糟糠不足我何心獨飽姉曰誠如是何不告我而自苦若此乃自以私粟與統又以告母母亦賢之遂使分施由是顯名孫權以將軍領會稽太守統年二十試為烏程相民戶過萬咸歎其惠理權嘉之召為功曹行騎都尉又曰孫權遣騎都尉趙咨使魏魏帝問曰吳王何等主也咨對曰聰明仁智雄略之主也帝問其狀咨曰納魯肅於凡器是其聰也拔呂蒙於行陣是其明也獲于禁而不害是其仁也取荊州而不血刃是其智也據三州而虎視天下是其雄也屈身於陛下是其略也又曰顧承字子直嘉禾中與舅陸瑁俱以禮徵權賜丞相雍書曰貴孫子直令問休休至與相見過於所聞為君嘉之拜騎都尉吳志曰諸葛恪字元遜瑾長子也少知名弱冠拜騎都尉, SBCK: ''}
