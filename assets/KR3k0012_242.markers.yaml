  - {type: variant, offset: 629, length: 0, content: '', SBCK: 越􅀐校尉鄧康以太后乆臨朝政宗門盛满數上書長樂宫諌爭冝崇公室自損私權言甚切至太后不從康心懷畏懼永寜元年遂謝病不朝又曰桓郁遷越􅀐校尉詔勑太子諸王各奉賀致禮郁數進忠言多見納録又曰董卓傳越􅀐校尉汝南伍孚忿卓凶毒忘手刃之及朝懷佩刀以見卓孚語畢辭去卓起送至閤以手撫其背孚因出刀刺之不中卓自􅁬得免急呼左右執殺孚而大詬曰虜欲反耶孚大言曰恨不得磔裂姧賊於都市以謝天地言未畢而斃謝承後漢書曰曹節弟破石爲越􅀐校尉越􅀐營}
