  - {type: variant, offset: 2457, length: 435, content: 人又當得親親有文武器任者高陽王珪今來之國雖當出為蕃輔以才幹事亦古之制也其以珪為督鄴城守事北中郎將晉中興書曰荀羨為北中郎將徐州刺史時年二十八郭泰別傳曰王叔優問才之所宜泰曰當以武官顯叔優後至北中郎將匈奴中郎將續漢書曰張奐字然明與叚紀明皇甫威明俱顯京師號為涼州三明並為匈奴中郎將司金中郎將魏略曰河北始開冶遂以王脩為司金中郎將脩奏記曰脩聞枳棘之材無柱梁之質涓流之水無洪波之勢是以在職七年忠謹不昭於時功業不見於事力少任重不堪為擢典農中郎將數年魏志曰任峻字伯遠為典農中郎將數年所在積粟倉廩皆盈又曰毋丘儉字仲恭河東聞喜人為洛陽典農時取農民以治宮室儉上䟽曰臣愚以為天下所急除者二賊所急務者衣食誠使二賊不滅士民飢凍雖崇美宮室猶無益也魏略曰上以農殖大事將選典農以徐邈為頴川典農中郎將所在著稱武衛中郎將魏志曰許禇字仲康太祖與遂超等單馬會語左右皆不得從唯禇在超負其力陰欲突太祖素聞禇勇疑從騎是禇乃問太祖曰公有虎侯者安在太祖顧指褚褚瞋目眄之超不動乃各罷後數日會戰大破超等禇身斬首級遷武衛中郎將武衛, SBCK: 期門}
