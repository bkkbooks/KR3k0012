  - {type: punctuation, offset: 683, content: 「, id: KR3k0012_CHANT_242-bkkpn202}
  - {type: variant, offset: 683, length: 2, content: 江革, SBCK: 崔􅂐王莽時爲郡文學以明經徴詣公車太保甄豐舉爲歩兵校尉􅂐辭曰吾聞伐􅀦不問仁人戰陣不訪儒士此舉奚至哉遂投劾歸又曰梁不疑拜歩兵校尉上書曰刋校之職上應天工下厭羣望實非過少所任梁史曰韋粲長八尺容觀甚偉􅀄爲雲麾晉安王行叅軍後爲外兵叅軍兼中兵時頴川􅁃仲容呉郡張率前軰才名與粲同府並忘年交好及王爲皇太子粲自記室遷歩兵校尉後魏春秋曰阮籍以丗多故禄仕而巳聞歩兵鈌厨多美酒營人善釀求爲校尉遂縱酒昬酣遺落丗事長水校尉釋名曰長水校尉長於水戰用船之事韋昭辯云長水校尉典胡􅀐不主水戰也其厩近水故以爲名東觀漢記曰賈宗}
  - {type: page-break, offset: 683, content: '', id: KR3k0012_SBCK_242-2b}
  - {type: page-break, offset: 683, content: '', id: KR3k0012_SBCK_242-3a}
  - {type: variant, offset: 683, length: 2, content: 江革, WYG: 崔篆王莾時為郡文學以明經徴詣公車太保甄豐舉為歩兵校尉篆辭曰聞伐國不問仁人戰陣不訪儒士此舉奚至哉遂投劾歸又曰梁不疑拜歩兵校尉上書曰刋校之職上應天工下厭羣望實非過少所任梁史曰韋粲長八尺容觀甚偉初為雲麾晉安王行叅軍後為外兵叅軍兼中兵時潁川吳仲容吳郡張率前輩才名與粲同府並忘年交好及王為皇太子粲自記室遷歩兵校尉魏氏春秋曰阮籍以世多故禄仕而已聞歩兵校尉多美酒營人善釀求為校尉遂縱酒昏酣遺落世事長水校尉釋名曰長水校尉長於水戰用船之事韋昭辯云長水校尉典胡騎不主水戰也其廐近長水故以為名東觀漢記曰賈宗}
