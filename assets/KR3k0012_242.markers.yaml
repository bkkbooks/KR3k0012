  - {type: variant, offset: 10, length: 143, content: 書曰武帝拜張騫為中郎將使西域又曰宣帝即位詔曰朕微眇時故掖庭令張賀輔導朕躬賀有孤孫霸七歲拜為中郎將又曰宣帝時楊惲為中郎將郎官故事郎出錢市財用給文書乃得出名曰山郎山郎以資財為郎也山之所出財用故取名焉惲罷山郎皆以法令從事有罪過輒奏免郎官化之莫不自勵又曰司馬相如為中郎將持節過蜀縣令負弩前導蜀人, WYG: 置}
