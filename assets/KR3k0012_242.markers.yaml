  - {type: variant, offset: 92, length: 300, content: 資財為郎也山之所出財用故取名焉惲罷山郎皆以法令從事有罪過輒奏免郎官化之莫不自勵又曰司馬相如為中郎將持節過蜀縣令負弩前導蜀人以為榮又曰衛綰為中郎將醇謹無他孝景幸上林詔中郎將參乘還問曰君知所以得參乘乎綰曰臣代戲車士得功次遷待罪中郎將不知也又曰張安世長子千秋與霍光子禹俱為中郎將將兵隨渡遼將軍范明友擊烏桓還謁大將軍光問千秋戰鬥方略山川形勢千秋口對兵事畫地成圖無所忘失問禹禹不能記曰皆有文書光由是賢千秋以禹為不才歎曰霍氏世衰張氏興矣後霍禹誅滅安世子相繼為侍中常侍列校十餘人又曰卜式為中郎初式不願為郎上曰吾有羊在上林欲令子牧之式即為郎而牧羊歲餘肥息上善之式曰非獨羊也治民亦猶是矣以時起居惡者輒去無令敗群上奇其言, SBCK: 叙勲舊}
