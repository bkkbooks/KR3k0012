  - {type: variant, offset: 1962, length: 163, content: 不訪之僚佐咸莫能定參軍劉蘭之對曰昔潘岳為秋興賦序云兼虎賁中郎將寓直於散騎之省以此言之是直官也後魏書曰韓荗膂力絕人尤善騎射太宗曾親征丁零翟猛荗為中軍執幢時大風諸軍旌旗皆偃仆茂於馬上持幢初不傾倒太宗異而問之徵茂所屬具以狀對太宗謂左右曰記之尋徵詣行在所試以騎射太宗深奇之以茂為虎賁中郎將九州春秋曰袁術為虎賁中郎將張讓殺何進術斫閤起火, SBCK: 王象等典集皇覽}
