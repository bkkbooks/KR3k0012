  - {type: variant, offset: 1261, length: 174, content: 將冠兩鶡尾鶡鷙鳥中之異勁者也每所攫取應爪摧碎鶡尾上黨所貢周禮夏官下虎賁氏曰虎賁掌先後王而趍以卒伍軍旅會同亦如之舍則守王閑閑梐枑也尚書牧誓曰戎車三百兩虎賁三百人與受戰于牧野作牧誓周書曰古有虎賁士千人以牛投牛以馬投馬以車捧車漢書百官表曰期門僕射秩比千石平帝元始元年更名虎賁郎置中郎將秩比二千石東觀漢記曰馬援從隴西太守遷虎賁中郎將又曰馬后不以私家于朝廷兄, WYG: 印綬復}
  - {type: variant, offset: 1261, length: 297, content: 將冠兩鶡尾鶡鷙鳥中之異勁者也每所攫取應爪摧碎鶡尾上黨所貢周禮夏官下虎賁氏曰虎賁掌先後王而趍以卒伍軍旅會同亦如之舍則守王閑閑梐枑也尚書牧誓曰戎車三百兩虎賁三百人與受戰于牧野作牧誓周書曰古有虎賁士千人以牛投牛以馬投馬以車捧車漢書百官表曰期門僕射秩比千石平帝元始元年更名虎賁郎置中郎將秩比二千石東觀漢記曰馬援從隴西太守遷虎賁中郎將又曰馬后不以私家于朝廷兄為虎賁中郎將訖永平世不轉又曰明德太后姉子夏壽等私呼虎賁張鳴與敖戲爭鬭上特詔曰爾虎賁將軍蒙國厚恩位在中臣宿衛禁門當進人不避仇讎舉罰不避親戚今者反於殿中交通輕薄虎賁蘭內所使至命欲相殺於殿下不避門內畏懦恣縱故不逐捕此皆生於不學之門所致也又曰馬廖任傀皆從, krp: 印綬復爲}
