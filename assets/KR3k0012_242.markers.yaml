  - {type: variant, offset: 880, length: 232, content: 郎將副丞相者也左中郎將天文錄曰郎將星若今之左右郎將也故星讚曰郎將星主閱具為武備漢書曰辛慶忌字子貢從光祿大夫遷左曹中郎將後漢書曰左宮為左中郎將擊武陵賊降凡將兵二十餘年以信謹質朴故常見用續漢書曰丞宮遷左中郎將數進忠諫論議守正不希世偶朝臣憚其節名稱聞於匈奴單于遣使來貢求見宮詔勑宮自整頓宮曰夷狄眩名非識實也聞臣虛稱故欲見臣臣醜陋形寢見必輕賤不如選長大有威容者時以大鴻臚魏應示之又曰楊秉字叔節以尚書侍講蔡雍字伯喈以侍中並為左中郎將又曰皇甫嵩為左中郎將擊匈奴漢舊儀曰左中郎將, SBCK: 置}
