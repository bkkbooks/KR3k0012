  - {type: variant, offset: 683, length: 2, content: 江革, krp: 崔篆王莽時爲郡文學以明經徴詣公車太保甄豐舉爲歩兵校尉篆辭曰吾聞伐國不問仁人戰陣不訪儒士此舉奚至哉遂投劾歸又曰梁不疑拜歩兵校尉上書曰刋校之職上應天工下厭羣望實非過少所任梁史曰韋粲長八尺容觀甚偉𥘉爲雲麾晉安王行叅軍後爲外兵叅軍兼中兵時頴川庾仲容呉郡張率前軰才名與粲同府並忘年交好及王爲皇太子粲自記室遷歩兵校尉後魏春秋曰阮籍以丗多故禄仕而巳聞歩兵鈌厨多美酒營人善釀求爲校尉遂縱酒昬酣遺落丗事長水校尉釋名曰長水校尉長於水戰用船之事韋昭辯云長水校尉典胡騎不主水戰也其厩近水故以爲名東觀漢記曰賈宗}
  - {type: variant, offset: 686, length: 2, content: 次翁, SBCK: 武孺爲長水校尉數言便冝賞賜殊特上美宗旣有武節又兼經術毎燕㑹令與當世大儒司徒丁鴻問難經傳蜀志曰秦密爲長水校尉呉遣張温來聘百官皆徃餞而密後徃旣至温曰彼何人也亮曰益州學者也及至温問密曰君學乎荅曰五尺童子皆學何必小人荅問如響應聲而出温大敬服之王隱晉書曰下邳王晃起家爲長水校尉給千人營置長史司馬射聲校尉漢書曰射聲校尉掌待詔射聲􅀿劭曰士工射者􅁳中聞聲射之則中因以名也湏待所命而射故曰待詔射聲東觀漢記曰班超在西域三十一歳還洛陽}
