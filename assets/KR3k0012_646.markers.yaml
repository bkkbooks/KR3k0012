  - {type: variant, offset: 1224, length: 1, content: 常, SBCK: 市齊書曰􅁃弘逺字士操清實有士譽仕齊爲江州長史刺史陳顯逹舉兵敗斬於朱雀航將刑索帽着之曰子路結纓吾不可以不冠而死又曰陳顯逹起兵官軍繼至顯逹不能抗退走至西州趙譚注矟刺落馬斬之於籬側血涌湔籬似淳于伯之􅀍刑也崔鴻前趙録曰卜栩隱于龍門山嘗與郭璞論易栩曰吾大厄在四十一亦未見子之令終璞曰戮吾禍在江南不在此也鎮北靳冲攻太原不剋歸罪於栩輒斬之劉聦大怒曰此人朕所不得加刑冲何人哉遣御史丞誥衍持節斬冲也隋書曰刑部}
