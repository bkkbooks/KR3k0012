  - {type: variant, offset: 1713, length: 156, content: 於水中蟹尚惡之況其兄弟耶晉書曰孟玖譖陸機於成都王潁言其有異心將軍王闡郝昌公師蕃等皆玖所用與牽秀等共證之頴大怒使秀密收機其夕機夢黑幔繞車手決不開天明而秀兵至機釋戎服著白祫與秀相見神色自若謂秀曰自吳朝傾覆吾兄弟宗族蒙國重恩入侍幃幄出剖符竹成都命吾以重任辭不獲已今日受誅豈非命也因與頴牋詞甚悽惻既而歎曰華亭鶴唳豈可復聞, SBCK: ''}
