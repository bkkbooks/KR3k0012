  - {type: variant, offset: 1205, length: 8, content: 專朝逼脅內外公卿, WYG: 者苟道将以嚴刻斬戮號曰屠伯後為石勒所殺又曰石閔仕偽趙石鑒為侍中録尚書事鑒使石苞夜誅閔不克反為閔攻殺鑒苞等胡人欲殺閔踰城不可勝數閔知胡人不為己用頒令下每人斬一胡文官賞爵一級武官立拜牙門時一日之中斬胡一萬人於是鼻髙多鬚濫死者甚衆胡人死至二十餘萬又曰皇甫謐字方回少遵父操永嘉中博士徵不起避亂荆州閉門居未嘗入城府蠶而后衣耕而後食南土人士咸尊敬之刺史陶侃禮之甚厚王敦弟王廙代侃廙至荆州大失物情百姓叛廙大行誅戮立威以方回為侃所禮責其不來詣}
