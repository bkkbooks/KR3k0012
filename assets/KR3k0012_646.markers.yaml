  - {type: variant, offset: 1097, length: 0, content: '', SBCK: 心勇士七十餘人僞着衛士服於北掖門内以待卓卓將至馬驚不行恠懼欲還吕布勸令進遂入門肅以㦸刺之卓衣甲不入傷臂墜車顧大呼曰吕布何在布曰有詔討賊臣卓大罵曰庸狗敢如是耶布應聲持矛刺卓趣兵斬之主簿田儀及卓倉頭前赴其尸布又殺之馳賫赦書以令宫陛内外士卒皆稱萬嵗魏略曰京兆鮑出字文才值丗飢餓出覔食後噉人賊以繩貫其母手掌駈去出走追斬賊得其母還魏志曰于禁字文則昌狶叛太祖遣禁征之禁急進攻狶與禁有舊詣禁降諸將皆以爲狶已降當送太祖也禁曰諸君不知公常令先圍而後降者不赦夫奉法行令事上之節也狶雖舊交禁可失節乎自臨與狶訣霣涕而斬之郡中震慄無求不獲又曰夏侯玄雅量弘濟臨斬東市顔色不變舉動自􅀂又曰鄧艾父子旣囚鍾㑹至成都先送艾然後作亂㑹巳死本營將士追艾檻車迎還衛瓘遣田續等討艾遇於綿竹西斬之蜀志曰魏延夢頭上生角以問占夢趙直直詐延曰夫麟有角而不用此不戰而賊欲自破之象也退而告人曰角之爲字刀下用也頭上用刀其㓙甚矣後爲馬岱所斬又曰劉璋勑􅀜戍諸將文書勿復通先主先主大怒召璋白水軍督陽琛責以無禮斬之又曰張松書與先主及法正曰今日大事垂可立功如何釋此去乎松兄廣漢太守肅懼禍退以白璋發其謀於是璋収斬松晉書曰楚王瑋旣誅汝南王亮衛瓘㝷又詔解嚴云瑋矯詔解嚴斬刑臨死出其懷中青紙詔以示監刑尚書劉頌流涕言此詔書也奉此而行謂爲社禝今更爲罪託體先帝受枉如此幸見申列頌亦歔欷不能仰視又曰荀晞字道將河南山陽人爲兖州刺史斷决如流人不敢欺以從母子爲都護犯法晞斬之旣而素服哭曰殺汝者兖州刺史哭弟者荀道將以嚴刻斬戮号曰屠伯後爲石勒所殺又曰石閔仕僞趙石鑒爲侍中録尚書事鑒使石苞夜誅閔不剋反爲閔攻殺鑒苞等殺胡人斬􅀜踰城不可勝數閔知胡人不爲}
  - {type: page-break, offset: 1097, content: '', id: KR3k0012_SBCK_646-2b}
