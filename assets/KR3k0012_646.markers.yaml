  - {type: variant, offset: 1099, length: 4, content: 榮顯違迕, SBCK: 甚衆胡人死至二十餘萬又曰皇甫謐字子方少遵父操永嘉中愽士徴不起避亂荆州􅐬門居未嘗入城府􅁞而後衣耕而後食南土人士咸尊敬之刺史陶􅋲禮之甚厚王敦弟王廙代􅋲廙至荆州大失物情百姓叛廙大行誅戮立威以方回爲􅋲所禮責其不來詣巳乃収而斬焉荆􅁟華夷莫不流涕三十國春秋曰丙寅丞相府斬督運令史淳于伯于建康於是以力拭柱血逆流上二丈三尺下四尺五寸其直如絃後魏書曰叚暉從丗祖至長安有人告暉欲南奔丗祖問曰何以知之告}
