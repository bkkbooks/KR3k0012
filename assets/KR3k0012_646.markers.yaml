  - {type: variant, offset: 4413, length: 325, content: 子曰非怒王則疾不可活王怒則摯必死太子頓首強請曰茍已王疾臣與母以死事之願先生勿患也摯曰諾與太子期而至將往不當者三齊王固已怒矣摯至不解履登床問疾王怒不與言摯因出固辤以重怒王吐而起疾乃遂已王大怒不悅將烹擊太子與王左右急爭之不得果以鼎烹摯爨之三日三夜顏色不變摯曰誠欲殺我則胡不覆之以絕陰陽之氣王使覆之乃死新序曰田卑處中牟佛肹以中牟叛置鼎於庭致士大夫曰與我者受邑不吾與者烹大夫從之至於田卑曰義士死不避斧鉞之罪窮不受軒冕之服無義而生不仁而富不若死褰衣將入鼎佛肹說乃止趙氏攻取之聞田卑不肯與也求而賞之卑曰不可也一人舉而萬夫俛首智者不為賞一人而慚萬夫義者不取我受賞使中牟之士皆恥不義吾去耳遂之南楚英雄記曰董卓攻得李昊張安畢圭死中生烹之二人臨入鼎相謂曰不同日生而同日烹, WYG: 平御覽卷六百四十六}
