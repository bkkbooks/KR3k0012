  - {type: variant, offset: 3776, length: 393, content: 傳曰寒浞伯明氏之讒子弟也伯明后寒棄之夷羿收之夷氏也信而使之以為己相浞行媚于內內宮人信施賂于外愚弄其民欺罔也而虞羿于田樂之以游田樹之詐慝以取其國家樹立也外內咸服信足詐羿猶不悛悛改也將歸自田羿獵還家眾殺而烹之以食其子食羿子其子不忍食諸死於窮門殺之於國門又曰楚客聘於晉過宋太子知之請野烹之公使往伊戾請從之公曰夫不惡汝乎對曰小人之事君也惡之不敢遠好之不敢近敬以待命敢有二心乎縱有供其內莫供其外臣請往也遣之至則欿用牲加書徵之詐作盟處為太子反徵驗也而騁告公曰太子將為亂既與楚客盟矣公囚太子乃縊而死公徐聞其無罪也乃烹伊戾又曰楚白公為亂既死其徒徵之生拘石乞而問白公之死焉乞白此事也克則卿不克則烹何害固其所也乃烹石乞史記曰齊威王召阿大夫語曰自子之守阿譽言日聞然使使視阿田野不辟民貧苦昔者趙攻甄子弗能救衛取薛陵子弗知是子以幣厚吾左右以求譽也是日烹阿大夫及左右嘗譽者并烹之又曰主父偃曰丈夫生不五鼎食死則五鼎烹, WYG: 後}
