  - {type: variant, offset: 618, length: 156, content: 大惡者五而竊盜不與焉一曰心逆而險二曰行僻而堅三曰言偽而辯四曰記醜而博五曰順非而澤此五者有一於人則不免君子之誅而少正卯皆兼有之居處足以撮徒成黨談說足以褒飾榮眾強禦足以反是獨立此乃人之姦雄不可不除夫湯誅尹諧文王誅潘正周公誅管蔡太公誅華士管仲誅付乙子產誅史何此七子皆異世而同誅者七子異世而同惡故不可赦也吾始誅之不亦可乎, WYG: 慙色}
