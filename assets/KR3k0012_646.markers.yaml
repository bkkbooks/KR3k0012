  - {type: variant, offset: 2720, length: 373, content: 少西氏遂入陳煞夏徵舒轘之栗門又曰楚觀起有寵於令尹子南未益祿而有馬數十乘楚人患之王煞子南於朝轘起於四境孔藂子曰齊王行車裂之刑群臣諫不聽子高見齊王曰聞君行車裂之刑夫車裂之刑無道之刑也而君行之臣切以為下吏之過也王曰寡人耳民多犯法為法之輕也子高曰然此誠君之盛意也夫人含五常之性有哀樂喜怒無不過其節節過則毀於義多犯法以法之重無所措手足故也今天下悠悠士無定處有德則往無德則去欲規霸王之業與眾大國為難而行酷刑以懼遠近國內之民將畔四方之士不至此乃亡國之道君之下吏不得以聞是為自居於中正之地而闇推之君王使同於桀紂也且夫為人臣見主非而不爭以陷主於危亡罪之大者也人主疾臣之弼已而惡之資臣以箕子比干之忠惑之大者也齊王曰謹聞命遂除車裂之法焉史記曰秦發兵攻商君殺之於鄭澠池秦惠王車裂商君徇曰莫如鞅反滅商君之家又曰張儀西說趙王曰蘇秦熒惑諸侯以是為非以非為是欲反之不可一亦以明矣, SBCK: 寜風􅁄上}
