  - {type: 'tls:seg', offset: 74, content: '', id: KR3k0012_CHANT_646-1a.19}
  - {type: variant, offset: 74, length: 293, content: 使以下得冠飾幪音蒙以居州里而民恥之漢書刑法志曰孫卿之論刑也曰世俗之為說者以為治古無肉刑治古謂上古至治之時也有象刑墨黥之屬菲屨赭衣而不純菲草也屨履也純緣衣也不加緣示有恥也是不然矣以為治古則人莫觸罪非獨無肉刑哉亦不待象刑矣人不犯法即象刑無所施也以為人或觸罪矣而直輕其刑是殺人者不死而傷人者不刑也罪至重而刑至輕民無所畏亂莫大焉故象刑非生於治古方起於亂今也如淳曰古無象刑也所以有象刑之言者近起於今人惡刑之重故遂推言古之聖君但以象刑天下自治白虎通曰聖人治天下必有刑罰何所以助治順天之度也故懸爵賞者示有所勸也設刑罰者明有所懼也傳曰三王肉刑應世以立刑者五帝之鞭策刑所以五何法五行也五帝畫其衣象五行也誅, SBCK: 周}
