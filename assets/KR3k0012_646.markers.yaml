  - {type: variant, offset: 726, length: 202, content: 誅管蔡太公誅華士管仲誅付乙子產誅史何此七子皆異世而同誅者七子異世而同惡故不可赦也吾始誅之不亦可乎史記曰二世遵用趙高之法乃陰與謀曰大臣不服官吏尚強及諸公子必與我爭奈何高曰臣固願言而未敢也先帝之大臣皆天下累世名貴人也人積功勞世以相傳久矣今高素小賤陛下幸稱舉令在上位管中事大臣鞅鞅特以貌從臣其心實不服今上出不因此時案郡縣守尉有罪者誅之上以振威天下下以除去上生平所不可者願陛下遂從時無疑二世曰善乃行誅大臣及諸公子, SBCK: 救勿斬}
