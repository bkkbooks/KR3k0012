  - {type: variant, offset: 84, length: 475, content: 居州里而民恥之漢書刑法志曰孫卿之論刑也曰世俗之為說者以為治古無肉刑治古謂上古至治之時也有象刑墨黥之屬菲屨赭衣而不純菲草也屨履也純緣衣也不加緣示有恥也是不然矣以為治古則人莫觸罪非獨無肉刑哉亦不待象刑矣人不犯法即象刑無所施也以為人或觸罪矣而直輕其刑是殺人者不死而傷人者不刑也罪至重而刑至輕民無所畏亂莫大焉故象刑非生於治古方起於亂今也如淳曰古無象刑也所以有象刑之言者近起於今人惡刑之重故遂推言古之聖君但以象刑天下自治白虎通曰聖人治天下必有刑罰何所以助治順天之度也故懸爵賞者示有所勸也設刑罰者明有所懼也傳曰三王肉刑應世以立刑者五帝之鞭策刑所以五何法五行也五帝畫其衣象五行也誅書曰昏迷于天象以干先王之誅又曰商罪貫盈天命誅之子不順天厥罪惟均禮曰振書端書於君前有誅倒筴側龜於君前有誅臣不豫事不敬也振去塵也端正也倒顛倒也側反也皆謂甫省視之也又曰以足蹙路馬芻有誅齒路馬有誅皆廣敬也路馬君之馬誅罰也周禮秋官下曰布憲掌憲邦之刑禁傷人見血而不以告者攘獄者遏訟者故以告而誅之謂吏民相殺傷見血者攘獄者距卻不受也遏訟者上遏公羊傳曰君親無將將而必誅傳曰見無禮於君者誅之如鷹鸇之逐鳥雀, WYG: 分謗}
