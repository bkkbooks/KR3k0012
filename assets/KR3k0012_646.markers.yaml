  - {type: variant, offset: 2521, length: 163, content: 應雨注襄陽耆舊記曰李衡聞王道音道有人物往干之道曰多士世尚書劇曹郎才也後數年校書郎呂壹操弄權柄大臣逼畏莫敢言或問衜衜曰非李衡無能困之者遂共薦衡為郎衡一引見口奏壹數千語孫權有愧色劉助復告壹壹即伏誅世說曰桓宣武之誅袁真也未當其罪世以為冤焉袁真在壽春嘗與宣武一妾妊焉生玄及篡亦覆桓族識者以為天理之所至轘釋名曰車裂曰轘轘也者散也支體分散, SBCK: 梟首}
