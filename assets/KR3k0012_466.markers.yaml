  - {type: variant, offset: 971, length: 1, content: 暮, SBCK: 典記嘲者大慙呉志曰諸葛瑾字子瑜面長似驢吳王使優人牽驢入題其上曰諸葛子瑜瑾子恪請筆益兩字曰之驢人伏其敏權即以驢賜恪蜀志曰先主與劉璋㑹涪時張􅁉爲璋從事侍坐其人饒􅂡先主嘲之曰昔吾居涿縣時多毛姓東西南北皆諸毛也􅁉即荅曰昔有士作上黨潞長遷爲涿郡令者去官還家時人與書欲曙潞則失涿欲署涿則失潞乃署曰潞涿君先主無􅂡故􅁉以此及之晉書曰范寗甞患目痛就中書侍郎張湛求方湛因嘲之曰右方宋陽里子少得其術以授魯東門伯東門伯以授左丘明遂世世相傳及漢杜子春鄭康成魏髙堂隆晉左太冲凢此諸賢並有目疾得此方云用損讀書一减思慮二專内視三簡外觀四旦晚起五夜早眠六凢六物熬以神火下以氣篩藴於胷中七日然後納諸方寸脩之一時近能數其目㫸逺視尺捶之餘長服}
