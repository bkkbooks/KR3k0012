  - {type: variant, offset: 520, length: 416, content: 小馮君兄弟繼踵相因循聰明聖智惠吏人政如魯衛德化鈞周公康叔猶二君又曰王氏五侯爭為奢侈大起第宅百姓歌曰五侯初起曲陽最怒壞決高都連境外杜土山漸臺象西白虎白虎殿名後漢書曰皇甫嵩討平黃巾請冀州一年田租以瞻飢民百姓歌曰天下亂兮市為墟母不保子兮妻失夫賴得皇甫兮復汝居又曰劉陶除順陽長以病免吏民思而歌之曰邑然不樂思我劉君何時復來安此下民又曰郭賀字喬卿為荊州刺史到官有殊政百姓歌之曰厥德仁明郭喬卿忠正朝廷上下平謝承後漢書曰岑熙遷魏郡太守民歌之曰我有枳棘岑君伐之我有蟊賊岑君遏之狗吠不驚足下生氂含哺鼓腹焉知凶災我嘉我生獨丁斯時美矣岑君於戲在茲又曰陳臨字子然為蒼梧太守人遺腹子報父怨捕得繫獄傷其無子令其妻入獄遂產得男人歌曰蒼梧陳君恩廣大令死罪囚有後代德參古賢天報施司馬彪續漢書曰賈琮為交州刺史歲間清平百姓安土為之歌曰賈父來晚使我先反今見清平吏不敢飯又曰李爕拜京兆尹詔發西園錢爕上一封事遂止不發吏民愛仰乃歌曰我府君道教舉恩如春威如虎剛不吐弱不茹愛如母訓如父, SBCK: ''}
