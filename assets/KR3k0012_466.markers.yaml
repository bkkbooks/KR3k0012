  - {type: variant, offset: 1982, length: 7, content: 帶丘墓陳留耆舊, SBCK: 穿所聞賢聖以道德爲人未聞以飲也平原君曰即如先生言則此言何生子髙曰生於􅄝酒者蓋其勸勵采戲之辭非實然也平原欣然曰吾弗戲子無所聞此雅言也吕氏春秋曰成王與唐叔虞燕居援梧葉以爲珪授虞曰此封汝虞喜以告周公公請曰天子封耶成王曰余一人與虞戲尓周公曰臣聞之天子無戲言天子言則史書之工誦之士稱之於是遂封虞于唐裴啓語林曰劉道眞遭亂於河側自牽舡見一老嫗採穭劉謂之曰女子何不調機利杼而採櫓女荅曰丈夫何不跨馬揮鞭而牽舡又曰祖士言與鍾雅相調鍾語祖曰我汝潁之士利如錐卿燕代之士鈍如槌祖曰以我鈍搥打尔利錐鍾曰自有神錐不可得打祖曰旣有神錐亦有神搥鍾遂屈劉義慶世􅀃曰謝太傳始有東山之志祖公見藥中有逺志公問謝此藥又曰小草何以一物二稱謝未即荅郝叅軍荅曰處則爲逺志岀則爲小草謝公殊有愧色又曰鄧艾口吃語艾艾晉文王戲之曰爲云艾艾故是幾艾鄧荅曰鳯兮鳯兮故是一鳯諸􅁑恪別}
  - {type: page-break, offset: 1982, content: '', id: KR3k0012_SBCK_466-5b}
  - {type: page-break, offset: 1982, content: '', id: KR3k0012_SBCK_466-6a}
  - {type: variant, offset: 1982, length: 7, content: 帶丘墓陳留耆舊, WYG: 穿所聞聖賢以道徳燕人未聞以飲也平原君曰即如先生言則此言何生子髙曰生於嗜酒者盖其勸勵采戯之辭非實然也平原欣然曰吾弗戯子無所聞此雅言也吕氏春秋曰成王與唐叔虞燕居援梧葉以為珪授虞曰以此封汝虞喜以告周公公請曰天子封耶成王曰余一人與虞戱爾周公曰臣聞之天子無戱言天子言則史書之工誦之士稱之於是遂封虞于唐裴啟語林曰劉道真遭亂於河側自牽船見一老嫗操櫓劉謂之曰女子何不調機理杼而操櫓女荅曰丈夫何不跨馬揮鞭而牽船又曰祖士言與鍾雅相調鍾語祖曰我汝潁之士利如錐卿燕代之士鈍如槌祖曰以我鈍槌打爾利錐鍾曰自有神錐不可得打祖曰既有神錐亦有神槌鍾遂屈劉義慶世説曰謝太傅始有東山之志桓公見藥中有逺志公問謝此藥又曰小草何以一物二稱謝未即荅郝叅軍荅曰處則為逺志出則為小草謝公殊有愧色諸葛恪别𫝊曰孫權嘗宴見蜀使費禕逆勑羣臣使至伏勿起禕至權輟食而羣下不起禕嘲之曰鳯凰來翔麒麟吐哺驢騾無知伏食如故恪荅曰愛植梧桐以待鳯凰是何燕雀自稱來翔何不彈射使還故鄉劉昭㓜童𫝊曰張𤣥字祖希年八嵗虧齒先逹知其不常故戯之曰君口何為開狗竇𤣥荅曰正使君軰從中入釋名曰罵廹也以惡言被廹人也又曰詈厯也以惡言相彌厯左}
