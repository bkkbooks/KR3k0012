  - {type: variant, offset: 1188, length: 220, content: 王譚字世容為成武令民服德化宿惡奔迸父老歌之曰王世容治無雙省傜役盜賊空晉書束晳傳太康中郡界大旱晳為邑人請雨三日而雨注眾謂晳誠感為作歌曰束先生通神明請天三日甘雨零零我黍以育我稷以成何以酬之報束先生又曰鄧攸為吳郡守刑政清明百姓歡悅為中興良守後稱疾去職郡常有送迎錢數百萬攸去郡不受一錢百姓數千人留牽攸舡不得進攸乃少停夜中發去吳人歌之曰纔如打五鼓雞鳴天欲曙鄧侯挽不留謝令推不去又曰徐州刺史呂虔檄王祥為別駕祥年垂耳順固辭不受為具車牛祥乃應召虔委以州事於, SBCK: 郄超爲桓温叅軍}
