  - {type: variant, offset: 2581, length: 2, content: 羊祜, SBCK: 叚疋磾弟文鴦與石勒戰所乗馬乏勒呼曰大兄乆望共同天不違願今日相見何復戰請釋㐲語鴦罵曰汝爲虐乆應死吾兄不能用吾計故令汝得至此吾寕死不忍爲汝所擒遂下馬與戰山海經曰􅀂山有獸焉名曰山膏其狀如豚赤􅀂丹火善罵好罵也賈􅁩新書曰紂自謂天王而桀自謂天父巳滅之後民}
