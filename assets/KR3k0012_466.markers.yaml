  - {type: variant, offset: 1053, length: 4, content: 豊熟人為, SBCK: 談雲因撫手曰雲間陸士龍隠曰日下荀鳴鶴鳴鶴隠字也雲又曰旣開青雲覩白雉何不張尓弓挾尔矢隠曰本謂是雲龍騤騤乃是山鹿野麋獸微弩彊是以發遟華撫手大􅀏又曰􅀽山松欲以女妻謝混王珣曰卿莫近禁臠􅀄元帝始鎮建業公私窘罄毎得一扽以爲珎膳項下一臠尤羙輙以薦帝羣下未甞敢食于時呼爲禁臠故珣以爲戲混果尚主又曰郄詵遷雍州刺史東堂㑹送武帝問詵卿自以爲何如詵對曰臣舉賢良對䇿爲天下第一猶桂林一枝崑山}
