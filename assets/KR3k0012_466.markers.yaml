  - {type: variant, offset: 139, length: 165, content: 歌柯也所歌之聲是其質也以聲吟詠有上下如草木之有柯葉也說文曰歌詠也詩曰心之憂矣我歌且謠家語曰孔子相魯齊人歸女樂魯君淫荒孔子遂行師已送曰夫子則非罪也孔子曰欲歌可乎歌曰彼婦人之口可以出走彼婦人之謁可以敗死優哉游哉聊以卒歲史記曰曹參為漢相國三年百姓歌之曰蕭何為法講若畫一曹參代之守而勿失載其清靜人以寧一又曰衛子夫為皇后弟青貴震天下天下歌之, SBCK: 令}
