  - {type: variant, offset: 1409, length: 442, content: 寇盜充斥祥率勵兵士頻討破之州界清靜政化大行時人歌之曰海沂之康實賴王祥邦國不空別駕之功又曰諸葛恢字道明荀闓字道明蔡謨字道明皆有名譽號曰中興三明時人之曰京師三明各有名蔡氏儒雅荀葛廉清王隱晉書曰應詹為南平郡郡人歌之曰亂離既著殆為灰朽僥倖之運賴茲應后蔭我塗炭惠隆丘阜潤曰江海恩猶父母崔鴻前秦錄曰王猛化洽六州人移風變百姓歌之曰長安大街夾樹楊槐下走朱輪上有鸞栖英彥雲集誨我人黎又曰符堅時鳳皇集于東闕歌之曰鳳皇于飛其羽翼翼淵哉聖后饗齡萬億崔鴻崔氏家傳曰崔瑗為汲令開溝澮興造稻田長老歌之曰上天降神明錫我慈仁父臨人布德澤恩惠施以序唐書顏師古叔父遊秦武德初累遷廉州刺史封臨沂縣男時劉黑闥初平人多以強暴寡禮風俗未安遊秦撫恤境內禮讓大行邑人歌之曰廉州顏有道性行同莊老愛人如赤子不煞非時草高祖璽書勞勉之韓子曰齊桓公飲酒醉遺其冠恥之管仲曰公胡不雪之以政公曰善因發困倉賜貧窮論囹圄三日而人歌之曰公胡不復遺其冠乎呂氏春秋曰魏襄王使吳起為鄴令引漳水灌田民大得利相與歌曰鄴有吳聖令為公決漳水灌鄴旁終古斥鹵生稻粱世說曰郗超, SBCK: ''}
