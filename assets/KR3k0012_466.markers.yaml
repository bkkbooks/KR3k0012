  - {type: variant, offset: 1996, length: 0, content: '', SBCK: 岀罵者斬不罵者原之漢書曰項羽拔滎陽城生得周苛羽謂苛爲我將以公爲上將軍苛罵曰􅀂不趍降漢今爲虜矣又曰陳稀反上自至邯鄲令周昌選趙壯士可令將者昌見四人上嫚罵曰竪子能爲將乎四人慙伏地上以爲將又曰張湯以更定律令爲􅋝尉汲黯於上前憤發罵曰天下刀筆}
