  - {type: variant, offset: 2509, length: 1, content: 王, WYG: 劉寛嘗坐客遣蒼頭市酒迂乆大醉而還詈曰畜生寛遣人視奴疑必自殺魏志曰諸葛恪圍合肥新城中遣士劉整出圍𫝊消息為賊所得拷問所𫝊語整罵曰死狗此何言也我當必死為魏國鬼不苟求活逐汝去又曰龎徳曹仁與闗雲長戰徳敗被執謂曰我欲以卿為将何不早降徳怒罵曰大丈夫何能降也遂被殺又曰劉𤣥徳嘗薦舉袁}
