  - {type: variant, offset: 2760, length: 405, content: 謠曰後進領袖有裴秀又曰杜預開楊口起夏口水道洪洞達巴陵經千餘里內寫長江之險外通零桂之漕南土美而謠之曰後世無叛由杜翁孰識智名與勇功又曰潘岳字安仁清辯能屬文早辟賈充府太子舍人出為河陽令以仕次宜為郎不得意時僕射山濤領選岳內非之密作謠曰閣道東有大牛王濟鞅裴楷鞦和嶠剌促不得休崔鴻後趙錄曰張樓為臨水長嚴政酷刑殘忍無惠人謠之曰陽平張樓頭如箱見人切齒劇虎狼崔鴻前秦錄曰符洪母姜氏因寢產洪驚悸而寤先是隴右大霖雨百姓苦之謠曰雨若不止洪水必起故名之曰洪又曰初符生夢大魚食蒲又長安謠曰東海大魚化為龍男便為王女為公問在何所洛門東海堅將也時為龍驤將軍第在洛門之東是月生以謠夢之故誅侍中魚遵趙書曰劉膠討陳安於隴城安下小將劉牙趙牢路松多堅戍不下城內得安死力謠曰隴上健兒曰陳安軀幹雖小腹中寬愛養將士同心肝騄驄馬鐵瑕鞍七尺大刀配齊鐶丈八虵矛左右盤十盪十決無當前百騎俱出如雲浮追者千萬騎悠悠戰始三交失虵矛十騎俱盪九騎留棄我騄驄巖悲天降雨迨者休阿呵鳴, SBCK: ''}
