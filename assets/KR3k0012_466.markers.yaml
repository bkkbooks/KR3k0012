  - {type: variant, offset: 1928, length: 10, content: 習習晨風動澍雨潤乎苗, SBCK: 呼爲妳母承天曰卿當云鳯凰將九子妳母何言耶又曰􅀽淑憙爲誇誕毎爲時人所嘲始興王濬甞送錢三萬餉淑一􅀫復遣追取謂使人謬誤欲以戲淑齊書曰陵澄當世稱爲碩學讀易三年不解義欲操宋書終不就王儉戲之曰陸公書厨也又曰􅁃杲之清貧自業食唯有韭菹􅊪韭生韭雜菜或戲之曰誰謂􅁃郎貧食常有二十七種言三九也又曰謝超宗送湘州刺史王僧䖍閣道壞墜水僕射王儉甞牛驚跣下車超宗撫掌􅀏戲曰落水三公墮車僕射梁書曰朱异遍治五經涉獵文史慱弈書筭皆其所長年二十詣尚書令沈約誡之因戲异曰卿年少何乃不廉异逡廵未逹約乃曰天下唯有文義棊書卿一時將去可謂不廉也陳書曰徐陵使魏魏人授館宴賔是日甚熱其主客魏収嘲陵曰今日之熱當因徐常侍來陵即荅曰昔王肅至此爲魏始制禮儀今}
