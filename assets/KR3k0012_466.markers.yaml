  - {type: variant, offset: 1991, length: 4, content: 爰珍除六, SBCK: 孫權甞宴見蜀使費禕逆勑羣臣使至伏勿起禕至權輟食而羣下不起禕嘲之曰鳯凰來翔騏驎吐哺驢騾無知伏食如故恪荅曰愛植梧桐以待鳯凰是何燕雀自稱來翔何不彈射使還故郷劉昭㓜童傳曰張玄字祖希年八歳虧齒先逹知其不常故戲之君口復何爲開狗竇玄荅云正使君軰從中入罵詈釋名曰罵迫也以惡言􅀍迫人也又曰詈歴也以惡言相弥歴音力智反左傳曰冉堅射陳武子中手失弓而罵戰國䇿曰宋康王時有雀生鸇於城之陬使史占之曰小而生巨必覇天下王大喜於是滅滕伐薛取淮北之地逾自信欲覇之亟成故射天笞地斬社稷而焚㓕之曰威服天下􅄦神罵國老諌者爲無頭之冠以是示勇國人大駭齊聞而伐之史記曰陳狶將趙利守東垣髙祖攻之月餘不下卒衆罵髙祖髙祖怒城降}
