  - {type: variant, offset: 3166, length: 484, content: 奈子乎鳴呼阿呵柰子何又曰汲桑六月盛暑而重裘累茵使人扇之患不清涼斬扇者時軍中為之謠曰士為將軍何可羞六月重茵被納裘不識寒暑斷他頭又曰燕人龐世為光祿動奏案豪強苛剋人物咸懼疾之及卒門無弔客時人為之謠曰龐家之巷車馬鱗鱗泥丸之日無弔賓弔賓不來何所因由性苛剋寡所親隋書曰韓擒虎先是江東有謠曰黃斑青驄馬發自壽陽溪來時冬氣木去日春風始皆不知所謂擒虎本名豹平陳之際又乘青驄馬往反時節與謠相應至時是方悟列子曰堯微服遊於康衢開童謠曰立我蒸民莫匪爾極不識不知順帝之則抱朴子曰童謠猶助聖人之耳目豈況墳素之宏博哉益部耆舊傳曰王忳字少林詣京師於見諸生病甚困生謂忳曰腰下有金十斤願以相與乞收藏尸骸未問姓名呼吸因絕忳賣金一斤以給棺絮九斤置生腰下後署大度亭長到亭日有馬一疋到亭中其日大風有一繡被隨風以來後忳騎馬突入金彥父見曰真得盜矣忳說馬狀又取被示之彥父帳然曰被馬俱止卿有何陰德忳具說葬諸生事彥父曰此吾子也遣迎彥喪金具存民謠之曰信哉少林世為遇飛被走馬與鬼語陳留耆舊傳曰吳祐為恒農令勸善懲姦貪濁出境甘露降年穀豊童謠曰君不我憂人何以休不行界署焉知人處商氏世傳曰商亮字子華舉孝廉到陽城遇兩虎爭一羊亮案劍直前斬羊虎, SBCK: 卓}
