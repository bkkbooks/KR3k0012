  - {type: variant, offset: 1928, length: 10, content: 習習晨風動澍雨潤乎苗, WYG: 呼為嬭母承天曰卿當云鳯凰將九子嬭母何言耶又曰袁淑喜為誇誕每為時人所嘲始興王濬嘗送錢三萬餉淑一宿復遣追取謂使人謬誤欲以戲淑齊書曰陸澄當世稱為碩學讀易三年不解義欲草宋書終不就王儉戯之曰陸公書厨也又曰庾杲之清貧自業食唯有韭葅􅊪韭生韭雜菜或戱之曰誰謂庾郎貧食常有二十七種言三九也又曰謝超宗送湘州刺史王僧䖍閣道壊墜水僕射王儉駕牛驚跣下車超宗撫掌笑戯曰落水三公墮車僕射梁書曰朱异遍治五經渉獵文史博奕書筭皆其所長年二十詣尚書令沈約試之因戱异曰卿年少何乃不㢘异逡廵未逹約乃曰天下唯有文義棋書卿一時將去可謂不㢘也陳書曰徐陵使魏魏人授館宴賓是日甚熱其主客魏收嘲陵曰今日之熱當因徐常侍來陵即荅曰昔王肅至此為魏始制禮儀今}
