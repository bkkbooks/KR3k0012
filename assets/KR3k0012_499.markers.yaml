  - {type: variant, offset: 3049, length: 0, content: '', krp: 隨典儀口唱旣謁讃曰可拜堅亦曰可拜讃者曰就位堅亦曰就位因復着履上座將離席不知履所在讃者曰履着脚堅亦曰履着脚也又曰平原陶丘氏取渤海墨台氏女女色甚美才甚令復相敬已生一男而歸母丁氏年老進見女􅡾女􅡾旣歸而遣婦婦臨去請罪夫曰曩見夫人年徳巳衰非昔日比亦恐新婦老後必復如此是以遣實無他故崔駰與竇憲牋曰文淺而言深者愚也在賤而望貴者惑也如愚論語爲政曰吾與囬言終日不違如愚退而省其私亦足以發囬也不愚又公治長曰寗武子邦有道則智邦無道則愚其智可及其愚不可及也華陽國志曰王長文字徳儁天姿聦警察孝廉不就遂陽愚甞着綘衣帽牽猪過市中乞人與語僞不聞常騎牛周遊說苑曰齊桓公獵逐鹿入谷中見一老公問是爲何谷對曰爲愚公之谷以臣名之臣故畜㹀牛生子大賣之而買馬少年曰牛不能生馬遂持駒去家隣以臣爲愚故名愚公之谷愚怯釋名曰怯脅也見敵恐脅也崔贑易林曰任將力薄駑孱思怯如蝟見鵲不敢拒格韓詩外傳曰崔杼殺莊公陳不占東觀漁者聞君有難將往死之飡則失哺上車失軾僕曰敵在數百里外今食則失哺上車失軾雖徃其有益乎陳不占曰死君義也無勇私也遂驅車比至門聞鍾鼓之音闘戰之聲遂駭而死君子聞之曰陳不占可謂志士矣無勇而能行義天下鮮矣東觀漢記曰杜篤仕郡文學掾以目疾二十餘年不窺京師篤外髙祖破羗將軍辛武賢以武略稱篤常歎曰杜氏文明善政而篤不任爲吏辛氏秉義經武而篤又怯於事外内五丗至篤衰矣沈約宋書曰周朗兄嶠爲吴興太守賊劭弑立隨王誕舉義於㑹稽劭加嶠冠軍將軍誕檄又至嶠素恇怯廻惑不知所從爲府司馬丘珍孫所殺又曰劉彦節少以宗室清謹見知齊髙帝輔政彦節知運祚將遷密懷異圖及沈攸之舉兵齊髙帝入屯朝堂袁粲鎮石頭潜與彦節及諸大將黄回等謀夜㑹石頭詰旦乃發彦節素怯騷擾不自安再晡後便自丹楊郡車載婦女盡室奔石頭臨去婦蕭氏強勸令食彦節歠羮冩胷中手振不自禁事敗𬒳殺趙書曰石勒屯葛陂值天雨不息勒長史刁應勸勒降晉勒啾然而嘯張賔勸勒還北勒欣然曰賔計是也應冝斬明其性怯可退爲將軍孫卿子曰夏首之南有人曰㳙濁梁其爲人愚善畏明月而霄行俯見其影以爲伏鬼仰見其髮以爲伏魅匍踣而走比至其家失氣而死愼子曰有勇不以怒反與怯均也吕氏春秋曰夫民無常怯有義則實實則勇無氣則虚虚則怯怯勇虚實其所由甚微不可不知淮南子曰怯者夜見立表以爲鬼見寢石以爲兕懼掩其氣也掩奪也抱朴子曰拙人得工輸之斤斧不能以成雲梯怯者得馮婦之刀㦸不能以格兕虎也智怯韓詩外傳曰楚白公之難有杜之善者辭其母將死君其母曰死君可乎杜之善曰聞事君者内其禄而外其身今所養母者君之禄也請往死之比至朝三廢車中其僕曰子懼何不返也杜之善曰懼吾私也死君公也吾聞君子不以私害公遂往死也家語曰或問孔子曰顔淵何人曰仁人也丘弗如也子貢何人曰辯人也丘弗如也子路何人曰勇人也丘弗如也客曰三子者皆賢於夫子而服役何也孔子曰丘能仁且忍辯且訥勇且怯以三子之能易丘之道弗如也史記曰管仲曰吾甞三戰三走鮑叔不以我爲怯知我有老母也又曰淮隂屠中少年有侮韓信者曰若雖長大好帶劒中情怯耳衆辱之曰能死刺我不能出我跨下信視之俛出跨下匍匐一市人皆笑信怯也尸子曰聖人畜仁而不主仁畜智而不主智畜勇而不主勇昔齊桓公脅於魯君而獻地勾踐脅於㑹稽而身宫之趙襄子脅於智伯而以顔爲愧其卒桓公臣魯君勾踐滅吴襄子以智伯爲戮此謂勇而能怯者也盗竊易繫辭曰慢藏誨盗冶容誨滛又曰負且乗致㓂至盗之招也禮記月令曰季秋行冬令則國多盗賊左傳僖中曰介之推曰竊人之財猶謂之盗况貪天之功以爲已力乎又昭五年曰鄭子産有疾謂子太叔曰我死子必爲政唯有徳者能以寛服民其次莫如猛太叔爲政不忍猛而寛鄭國多盗取人於雚蒲之澤太叔悔之曰吾早從夫子之言不及於此興徒兵以攻雚蒲之盗盡殺之盗少止論語顔淵曰季康子患盗問於孔子孔子對曰茍子之不欲雖賞之不竊家語曰子貢爲信陽宰將行辭於孔子孔子曰勤之愼之奉天之時無奪無伐無暴無盗子貢曰賜也少事君子豈以盜爲累哉孔子曰爾未之詳夫以賢代不賢是之謂奪以不肖代賢是之謂伐緩令急誅是之謂暴取善自與是之謂盜非竊財之謂也史記曰秦昭王囚孟甞君謀欲殺之孟甞使人􅔰昭王幸姬求解姬曰妾願得君狐白裘此孟甞有一狐白裘直千金天下無雙入獻昭王無他裘孟甞患之偏問客莫能對最下座爲狗盗者曰臣能得乃夜爲狗以入秦宫藏中取所獻狐白裘至以獻秦幸姬幸姬爲言昭王釋孟甞君又曰有盗髙廟座前玉環捕得文帝怒下廷尉治之張釋之案律盗宗廟服御物者奏當弃市耳漢書曰彭越字仲昌邑人常漁鉅野澤中爲盗又曰龔遂字少卿山陽人恭帝時渤海左郡歳飢盗賊並起二千石不能擒制上選能治者御史舉遂可用上以爲渤海太守問曰渤海廢亂君欲何以息盗賊對曰海濵遐逺不沾聖化其民困於飢寒而吏不恤故使弄陛下之兵於潢池中耳今欲使臣勝之耶將安之也臣聞理亂民如理亂䋲唯緩之而後可吴志曰孫堅與父之錢塘㑹海賊胡玉等取賈人財物岸上分之堅追斬一級晉書曰蔡裔有勇氣甞二盗入室裔不知拊床一呼二盗俱殞又曰王獻之夜卧齊中而有偷入其室盗物獻之徐曰偷兒青氊我家舊物可特置之羣偷驚走崔鴻十六國春秋後趙録曰徐龕勇果薄行舊爲刼盗者無不歸之公行掠抄迅如風雲北齊書曰宋世良字元}
  - {type: variant, offset: 3050, length: 1, content: 欽, krp: 爲清河太守郡東有南曲隄成公一姓阻而居之羣盗多萃於此人爲之語曰寧使東吴㑹稽不歷成公曲隄世良施八條以制盗盗奔他境人又謡曰曲隄之險賊何益但有宋公自屏跡吕氏春秋曰秦繆公乗馬車敗右服失而野人取之繆公自往求馬見野人方將食之於岐山之陽繆公笑曰食駿馬之肉不飲酒余恐其傷汝也遍飲而去處一年韓原之戰晉人巳環繆公之車矣甞食馬肉三百餘人畢力爲繆公疾鬪大尅晉軍反獲惠公以歸莊子曰將爲胠篋探囊發匱之盗爲守備則必攝緘縢固扄鐍此丗俗所謂智也巨盗至則負掲篋擔囊而趍唯恐緘縢扄鐍之不固然向所謂智者不乃爲大盗積者乎又曰絶聖棄智大盗乃止摘玉毁珠小盗不起也列子曰晉國苦盗有郄雍者能視盗之皃察其眉睫之間而得其情晉侯使視千里無遺一焉晉侯大喜告趙文子曰吾得一人而一國盗爲之盡矣文子曰君司察而得盗盗不盡矣且郄雍必不得其死俄群盗謀曰吾所以窮者郄雍也遂戕之晉侯聞大駭召文子曰果如子言然取盗何方文子曰君欲無盗舉賢而任之遂取隨㑹爲政而君盗奔秦焉又曰牛缺者上地之大儒之邯鄲遇盗於耦沙之中盡取其衣車牛歩而去視之欣然無憂怯之色盗追而問其故曰君子不以所養害其所以養盗曰嘻賢失矣徃彼見趙君以我爲事必困乃相與追而殺之又曰東方有人曰爰旌目將有所適而餓於}
  - {type: variant, offset: 3052, length: 5, content: 嗜味昨奉教, WYG: 狐父之盜曰邱見而下壺飡以餔之爰旌目三餔而後能視曰子能何為者也曰我狐父之人邱也爰旌目曰嘻女非盜耶胡為而食我吾義不食子之食也兩手據地而嘔之不出喀喀然而死淮南子曰楚將子發好求伎道之士有善為偷者往見曰聞君求伎道之士臣楚市偷也願以伎修一卒子發備見而禮之無幾何齊興師伐楚子發將師以當之兵三却於是市偷請曰臣有薄伎願君行之子發曰諾偷則夜出解齊將軍之綢帳而獻之子發使歸之明夕復往取其枕又使歸之明夕復往取其簪又使歸之於是齊師大駭將軍與軍吏謀曰今夕不去楚軍恐取吾首即還秦子曰孔文舉為北海相有母病差者思食新麥家無}
