  - {type: variant, offset: 3033, length: 5, content: 溫為坐別友, krp: 日流影移而徙祍以從隂及至暮反席於樹下及月流影移復徙祍以從隂而患露之濡於身其隂逾去而其身逾濕是巧於用晝而拙於用夕奚不處曜而辭隂反林息露此}
  - {type: variant, offset: 3035, length: 2, content: 坐別, WYG: 渤海太守問曰渤海廢亂君欲何以息盜賊對曰海濵遐逺不沾聖化其民困於饑寒而吏不恤故使弄陛下之兵於潢池中耳今欲使臣勝之耶將安之也臣聞理亂民如理亂繩唯緩之而後可呉志曰孫堅與父之錢塘㑹海賊胡玉等取賈人財物岸上分之堅追斬一級晉書曰蔡裔有勇氣嘗二盜入室裔不知拊牀一呼二盜俱殞又曰王獻之夜卧齋中而有偷入其室盜物獻之徐曰偷兒青氊我家舊物可特置之羣偷驚走崔鴻十六國春秋後趙録曰徐龕勇果薄行舊為刼盜者無不歸之公行掠抄迅如風雨北齊書曰宋世良字元}
