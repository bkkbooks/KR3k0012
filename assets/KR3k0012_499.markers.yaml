  - {type: variant, offset: 3030, length: 2, content: 得郡, krp: 逃暑於孤林之下}
  - {type: variant, offset: 3031, length: 0, content: '', WYG: 公輸之斤斧不能以成雲梯怯者得馮婦之刀㦸不能以格兕虎智怯韓詩外傳曰楚白公之難有杜之善者辭其母將死君其母曰死君可乎杜之善曰聞事君者内其禄而外其身今所養母者君之禄也請往死之比至朝三廢車中其僕曰子懼何不返也杜之善曰懼吾私也死君公也吾聞君子不以私害公遂往死也家語曰或問孔子曰顔淵何人曰仁人也丘弗如也子貢何人曰辨人也丘弗如也子路何人曰勇人也丘弗如也客曰三子者皆賢於夫子而服役何也孔子曰丘能仁且忍辨且訥勇且怯以三子之能易丘之道弗如也史記曰管仲曰吾嘗三戰三走鮑叔不以我為怯知我有老母也又曰淮隂屠中少年有侮韓信者曰若雖長大好帯劒中情怯耳衆辱之曰能死刺我不能出我跨下信視之俛出跨下匍匐一市人皆笑信怯也尸子曰聖人畜仁而不主仁畜智而不主智畜勇而不主勇昔齊桓公脅於魯君而獻地句踐脅於㑹稽而身宫之趙襄子脅於智伯而以顔為愧其卒桓公臣魯君句踐滅呉襄子以智伯為戮此為勇而能怯智也盜竊易繫辭曰慢藏誨盜冶容誨淫又曰負且乘致冦至盜之招也禮記月令曰季秋行冬令則國多盜賊左傳僖中曰介之推曰竊人之財猶謂之盜况貪天之功以為己力乎又昭公中曰鄭子産有疾謂子太叔曰我死子必為政唯有德者能以寛服民其次莫如猛太叔為政不忍猛而寛於是鄭國多盜取人於萑苻之澤太叔悔之曰吾早從夫子之言不及於此興徒兵以攻萑苻之盜盡殺之盜少止論語顔淵曰季康子患盜問於孔子孔子對曰苟子之不欲雖賞之不竊家語子貢為信陽宰將行辭於孔子孔子曰勤之慎之奉天之時無奪無伐無暴無盜子貢曰賜也少事君子豈以盜為累哉孔子曰爾未之詳夫以賢代不賢是之謂奪以不肖代賢是之謂伐緩令急誅是之謂暴取善自與是之謂盜非竊財之謂也史記曰秦昭王囚孟嘗君謀欲殺之孟嘗君使人私昭王幸姬求解姬曰妾願得君狐白裘比孟嘗君有一狐白裘值千金天下無雙入獻昭王無他裘孟嘗君患之徧問客莫對最下座為狗盜者曰臣能得乃夜為狗以入秦宫藏中取所獻狐白裘至以獻秦幸姬幸姬為言昭王釋孟嘗君又曰有盜髙廟座前玉環捕得文帝怒下廷尉治之張釋之案律盜宗廟服御物者奏棄市漢書曰彭越字仲昌邑人常漁鉅野澤中為盜又曰龔遂字少卿山陽人宣帝時渤海左}
