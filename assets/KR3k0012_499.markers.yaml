  - {type: variant, offset: 2993, length: 1, content: 襄, SBCK: 秦繆公乗馬車敗右服失而野人取之繆公自往求馬見野人方將食之於岐山之}
  - {type: variant, offset: 2993, length: 1, content: 襄, WYG: 顧愷之於夜月下長詠自云得先賢風致謝瞻遙稱讚之愷之得此彌自力忘倦瞻將眠語搥脚人令代焉愷之不覺其異遂幾旦而後止沈約宋書曰劉義基封營道縣侯凡鄙無識毎為始興王濬兄弟所戯濬嘗謂義基曰陸士衡詩曰營道無烈心其何意苦阿父如此義基曰下官初不識士衡何忽見苦廣陵列士傳曰呉武字季濟篤學好古師事陳仲考子升性頑愚考曰父子情重不忍戮之卿可為吾敎也趙書曰石肇前石之昆弟也前石既貴肇在軍中不能自達人送詣前石前石哀之拜建威將軍以肇無才力毎髙選參佐補之為聘廣川劉興兄女肇甚懼之拜長樂太守治官毎入門動稱阿劉敎可爾不可爾時人以為嗤謠鬻子曰愚者不自謂愚見於言語者雖自謂智人皆謂之愚也列子曰宋人有於道得人遺契者歸而藏之宻數其齒告鄰人曰吾富可得矣又曰把國有人憂天崩地墜身無所寄廢寢與食又有憂彼所憂往曉之曰天積氣耳其人曰天果積氣日月星宿不當墜耶對曰日月星宿亦積氣中之有光耀者只使墜亦不能中傷其人曰奈地壊何對曰地積塊耳充塞四虛何憂其壊其人大喜荀卿子曰宋之愚人得燕石於梧臺之東歸而藏之以為大寳周客觀之掩口而笑曰此燕石也其與瓦甓不差主人大怒曰商賈之言醫匠之口藏之愈固守之彌謹莊子曰人有畏影惡迹而去之走者舉足愈數而迹愈多走疾而影不離自以為尚遲疾走不休絶力而死韓子曰燕李季好逺出其妻有士李季至士在内中妻患之乃令士裸而解髮直出門吾屬}
