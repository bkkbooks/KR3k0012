  - {type: variant, offset: 1557, length: 164, content: 會稽典錄曰嚴光一名遵帝引入論故舊累日因共臥光以足加帝腹上明日太史奏客星犯帝坐甚急帝曰朕故人嚴子陵共臥耳語林曰羅含在宣武坐人介與他人相識含正容曰所識已多不煩復爾世說曰王子猷作桓溫車騎參軍桓謂王曰卿在府久當相斷理王初不答直高視手板柱頰云西山朝來致有爽氣應璩與崔元書曰豈有亂首抗巾以入都城衣不在體而以適人乎昔戴叔鸞箕坐見邊文祖此皆衰世, SBCK: 重擅寵專事如賢愚者}
