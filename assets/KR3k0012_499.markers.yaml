  - {type: variant, offset: 2976, length: 2, content: 大笑, SBCK: 􅀏信怯也尸子曰聖人畜仁而不主仁畜智而不主智畜勇而不主勇昔齊桓公脅於魯君而獻地勾踐脅於㑹稽而身宫之趙襄子脅於智伯而以顔爲愧其卒桓公臣魯君勾踐􅌍吴襄子以智伯爲戮此謂勇而能怯者也盗竊易繫辭曰慢藏誨盗冶容誨滛又曰􅀒且乗致㓂至盗之招也禮記月令曰季秋行冬令則國多盗賊左傳僖中曰介之推曰竊人之財猶謂之盗况貪天之功以爲已力乎又昭五年曰鄭子産有疾謂子太叔曰我死子必爲政唯有徳者能以寛服民其次莫如猛太叔爲政不忍猛而寛鄭國多盗取人於雚蒲之澤太叔悔之曰吾早從夫子之言不及於此興徒兵以攻雚蒲之盗盡殺之盗少止論語顔淵曰季康子患盗問於孔子孔子對曰茍子之不欲雖賞之不􅀼家語曰子貢爲信陽宰將行辭於孔子孔子曰勤之愼之奉天之時無奪無伐無􅁀無盗子貢曰賜也少事君子豈以盜爲累哉孔子曰爾未之詳夫以賢代不賢是之謂奪以不肖代賢是之謂伐緩令急誅是之謂􅁀取善自與是之謂盜非竊財之謂也史記曰秦昭王囚孟甞君謀欲殺之孟甞使人􅔰昭王幸􅁎求解􅁎曰妾願得君狐白裘此孟甞有一狐白裘直千金天下無􅀟入獻昭王無他裘孟甞患之偏問客莫能對最下座爲狗盗者曰臣能得乃夜爲狗以入秦宫藏中取所獻狐白裘至以獻秦幸􅁎幸􅁎爲言昭王釋孟甞君又曰有盗髙廟座前玉環捕得文帝怒下廷尉治之張釋之案律盗宗廟服御物者奏當弃市耳漢書曰彭越字仲昌邑人常漁鉅野澤中爲盗又曰龔遂字少卿山陽人恭帝時渤海左郡歳飢盗賊並起二千石不能擒制上選能治者御史}
