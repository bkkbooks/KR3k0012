  - {type: variant, offset: 2990, length: 1, content: 陽, SBCK: 書曰蔡裔有勇氣甞二盗入室裔不知拊床一呼二盗俱殞又曰王獻之夜卧齊中而有偷入其室盗物獻之徐曰偷兒青氊我家舊物可特置之羣偷驚走崔鴻十六國春秋後趙録曰徐龕勇果薄行舊爲刼盗者無不歸之公行掠抄迅如風雲北齊書曰宋世良字元友爲清河太守郡東有南曲隄成公一姓阻而居之羣盗多萃於此人爲之語曰寧使東吴㑹稽不歷成公曲隄世良施八條以制盗盗奔他境人又謡曰曲隄之險賊何益但有宋公自屏跡吕氏春}
