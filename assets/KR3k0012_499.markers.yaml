  - {type: variant, offset: 1722, length: 1229, content: 慢行也晉書曰何綏性既輕物翰札簡傲城陽王尼見綏書疏謂人曰伯蔚居亂而矜豪乃爾豈其免乎晉書曰謝弈與桓溫善溫辟為安西司馬猶推布衣好在溫坐岸幘嘯詠無異常日溫指曰我方外司馬又曰王獻之嘗經吳郡聞顧辟彊有名園先不相識乘平肩轝逕入時辟彊方集賓友而獻之遊歷既畢傍若無人辟彊勃然數之曰傲主人非禮也以貴驕士非道也失是二者不足齒之傖耳便驅出門又曰王導子恬性傲誕不拘禮法謝萬嘗造恬既坐少頃恬便入內萬以為必厚待己殊有喜色恬久之乃沐頭髮而出據胡床於庭中曬髮神氣慠邁竟無賓主之意萬帳然而還又曰王徽之字子猷性卓犖不羈大司馬桓溫參軍蓬首散帶不綜府事又為車騎桓沖騎兵問卿署何曹對曰似是馬曹又問管幾馬曰不知馬何知數又問馬比死多少曰未知生焉知死嘗從沖行值暴雨徽之因下馬排入車中謂曰公豈得獨擅一車又曰劉伶常著袒服乘車客有詣伶值其裸袒責伶伶曰吾以天為屋以屋為褌諸君不當入中又曰謝萬既受任北征矜豪傲物常以嘯詠自高未嘗撫眾兄安深憂之自隊主將帥已下安無不慰勉謂萬曰汝為元帥諸將宜數接對以悅其心豈有慠誕若斯而能濟事也萬乃召集諸將都無所說直以如意指四座云諸將皆勁卒諸將益恨之又曰周顗王導甚重之嘗枕顗膝而指其腹曰卿此中何所有也荅曰此中空洞無物然足容卿輩數百人導亦不以為忤又於導座慠然嘯詠導云卿欲希嵇阮耶顗曰何敢近捨明公遠希嵇阮又曰王澄為荊州刺史澄將之鎮送者傾朝澄見樹上鵲巢便脫衣上樹探鷇而弄之神氣肅然傍若無人劉琨謂澄曰卿形雖散朗而內實動俠以此處世難得其死澄默然不荅宋書曰張敷遷中書舍人與狄當周赴並管要務以敷同省名家欲詣之赳曰彼若不相容便不如不往詎可輕往耶當曰吾等並已員外郎何憂不得共坐敷先設二床去壁三四尺二客就席酬接甚歡既而呼左右曰移我遠客赳等失色而去又曰陶潛有造之者設酒潛若先醉便語客曰我醉欲眠卿可去宋書曰張敷永興初遷祕書郎嘗在省直中書令傳亮聞其好學過候之敷臥不即起亮怪而去齊書曰張欣泰領羽林監欣泰通涉雅俗交結多是名素下直輒遊園池著鹿皮冠納衣錫杖挾素琴有以啟世祖曰將家兒何敢作此舉止齊書丘靈鞠好飲酒臧否人物在沈淵座見王儉詩淵曰王令文章大進靈鞠曰何如我未進此言達儉靈鞠宋世文名甚盛入齊頗減蓬髮弛縱無形儀不治家業王儉謂人曰丘公仕官不進才亦退矣梁書曰何點雖不入城府而邀遊人世不簪不帶或駕柴車躡草屩恣心所適致醉而歸士大夫多慕從之時人號為通隱隋書曰崔儦每以讀書為務負恃才地忽略世人大署其戶曰不讀五千卷書者無得入此室數年之間遂博覽群言多所通涉唐書曰鄭仁表洎之子也文章尤稱俊拔然恃才傲物人士薄之自謂門地人物文章具美嘗曰天瑞有五色雲人瑞有鄭仁表劉鄴少時投文於洎仁表兄弟嗤鄙之咸通末鄴為宰相仁表竟貶死南荒又曰崔元翰入朝為太常博士禮部員外郎竇參輔政用為知制誥詔令溫雅合於典謨然性太剛褊簡傲不能取容於時每發言論略無阿徇忤執政旨故掌誥二年而官不遷又曰李白嘗醉令高力士脫靴由是斥去乃浪跡江湖終日飲沉時侍御史崔宗之謫官金陵與白詩酒唱和嘗月夜乘舟自採石達金陵著白衣宮錦袍於舟中顧瞻嘯傲傍若無人初賀知章見白賞之曰此天上謫仙人也耶歈說文曰人相笑相耶歈, SBCK: 情}
  - {type: variant, offset: 1722, length: 1229, content: 慢行也晉書曰何綏性既輕物翰札簡傲城陽王尼見綏書疏謂人曰伯蔚居亂而矜豪乃爾豈其免乎晉書曰謝弈與桓溫善溫辟為安西司馬猶推布衣好在溫坐岸幘嘯詠無異常日溫指曰我方外司馬又曰王獻之嘗經吳郡聞顧辟彊有名園先不相識乘平肩轝逕入時辟彊方集賓友而獻之遊歷既畢傍若無人辟彊勃然數之曰傲主人非禮也以貴驕士非道也失是二者不足齒之傖耳便驅出門又曰王導子恬性傲誕不拘禮法謝萬嘗造恬既坐少頃恬便入內萬以為必厚待己殊有喜色恬久之乃沐頭髮而出據胡床於庭中曬髮神氣慠邁竟無賓主之意萬帳然而還又曰王徽之字子猷性卓犖不羈大司馬桓溫參軍蓬首散帶不綜府事又為車騎桓沖騎兵問卿署何曹對曰似是馬曹又問管幾馬曰不知馬何知數又問馬比死多少曰未知生焉知死嘗從沖行值暴雨徽之因下馬排入車中謂曰公豈得獨擅一車又曰劉伶常著袒服乘車客有詣伶值其裸袒責伶伶曰吾以天為屋以屋為褌諸君不當入中又曰謝萬既受任北征矜豪傲物常以嘯詠自高未嘗撫眾兄安深憂之自隊主將帥已下安無不慰勉謂萬曰汝為元帥諸將宜數接對以悅其心豈有慠誕若斯而能濟事也萬乃召集諸將都無所說直以如意指四座云諸將皆勁卒諸將益恨之又曰周顗王導甚重之嘗枕顗膝而指其腹曰卿此中何所有也荅曰此中空洞無物然足容卿輩數百人導亦不以為忤又於導座慠然嘯詠導云卿欲希嵇阮耶顗曰何敢近捨明公遠希嵇阮又曰王澄為荊州刺史澄將之鎮送者傾朝澄見樹上鵲巢便脫衣上樹探鷇而弄之神氣肅然傍若無人劉琨謂澄曰卿形雖散朗而內實動俠以此處世難得其死澄默然不荅宋書曰張敷遷中書舍人與狄當周赴並管要務以敷同省名家欲詣之赳曰彼若不相容便不如不往詎可輕往耶當曰吾等並已員外郎何憂不得共坐敷先設二床去壁三四尺二客就席酬接甚歡既而呼左右曰移我遠客赳等失色而去又曰陶潛有造之者設酒潛若先醉便語客曰我醉欲眠卿可去宋書曰張敷永興初遷祕書郎嘗在省直中書令傳亮聞其好學過候之敷臥不即起亮怪而去齊書曰張欣泰領羽林監欣泰通涉雅俗交結多是名素下直輒遊園池著鹿皮冠納衣錫杖挾素琴有以啟世祖曰將家兒何敢作此舉止齊書丘靈鞠好飲酒臧否人物在沈淵座見王儉詩淵曰王令文章大進靈鞠曰何如我未進此言達儉靈鞠宋世文名甚盛入齊頗減蓬髮弛縱無形儀不治家業王儉謂人曰丘公仕官不進才亦退矣梁書曰何點雖不入城府而邀遊人世不簪不帶或駕柴車躡草屩恣心所適致醉而歸士大夫多慕從之時人號為通隱隋書曰崔儦每以讀書為務負恃才地忽略世人大署其戶曰不讀五千卷書者無得入此室數年之間遂博覽群言多所通涉唐書曰鄭仁表洎之子也文章尤稱俊拔然恃才傲物人士薄之自謂門地人物文章具美嘗曰天瑞有五色雲人瑞有鄭仁表劉鄴少時投文於洎仁表兄弟嗤鄙之咸通末鄴為宰相仁表竟貶死南荒又曰崔元翰入朝為太常博士禮部員外郎竇參輔政用為知制誥詔令溫雅合於典謨然性太剛褊簡傲不能取容於時每發言論略無阿徇忤執政旨故掌誥二年而官不遷又曰李白嘗醉令高力士脫靴由是斥去乃浪跡江湖終日飲沉時侍御史崔宗之謫官金陵與白詩酒唱和嘗月夜乘舟自採石達金陵著白衣宮錦袍於舟中顧瞻嘯傲傍若無人初賀知章見白賞之曰此天上謫仙人也耶歈說文曰人相笑相耶歈, WYG: 情}
