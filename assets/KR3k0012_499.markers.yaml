  - {type: variant, offset: 3025, length: 2, content: 用同, SBCK: 罪抱朴子曰夷吾奪田不可以薄蕭何竊妻不可以廢也郭子曰王安期爲東海太守小吏盗池中魚綱紀推之王曰與衆共之魚何足恡皇甫士安髙士傳曰孔嵩字仲山辟公}
  - {type: variant, offset: 3025, length: 1, content: 用, WYG: 悲西家子見之歸謂其母曰社何憂速死吾必悲哭社淮南間謂母為社又曰故聖人}
  - {type: variant, offset: 3025, length: 1, content: 用, krp: 悲西家子見之歸謂其母曰社何憂速死吾必悲哭社淮南間謂母爲社又曰故聖人}
