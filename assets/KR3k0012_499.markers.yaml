  - {type: variant, offset: 2993, length: 1, content: 襄, krp: 顧愷之夜於月下長詠自云得先賢風製謝瞻遥稱讃之愷之得此弥自力忘倦瞻將眠語搥脚人令代焉愷之不覺其異遂幾旦而後止沈約宋書曰劉義綦封營道縣侯凢鄙無識知每爲始興王濬兄弟所戲濬常謂義綦曰陸士衡詩曰營道無烈心其何意苦阿父如此義綦曰下官𥘉不識士衡何忽見苦廣陵列士傳曰吴武字季濟篤學好古師事陳仲考子升性頑愚考曰父子情重不忍戮之卿爲吾教也趙書曰石肇前石之昆弟也前石旣貴肇在軍中不能自逹人送詣前石前石哀之拜建威將軍以肇無才力毎髙選參佐輔之爲娉廣川劉典兄女肇甚懼之拜長樂太守治官每入門動稱阿劉教可尔不可尔時人以爲嗤謡鬻子曰愚者不自謂愚而愚見於言愚者雖自謂智人皆謂之愚也列子曰宋人有於道得人遺契者歸而藏之密數其齒告鄰人曰吾冨可待矣又曰𣏌國有人憂天崩地墜身無所寄廢寢與食又有憂彼所憂往曉之曰天積氣耳其人曰天果積氣日月星宿不當墮耶對曰日月星宿亦積氣中之有光耀者只使墮亦不能中傷其人曰柰地壞何對曰地積塊耳充塞四虚何憂其壞其人大喜荀卿子曰宋之愚人得燕石於梧臺之東歸而藏之以爲大寳周客觀之掩口而笑曰此燕石也其與瓦甓不差主人大怒曰啇賈之言醫匠之口藏之愈固守之弥謹莊子曰人有畏影惡迹而去之走者舉足愈數而迹愈多走疾而影不離自以爲尚遟疾走不休絶力而死韓子曰燕李季好逺出其妻有士李季至士在内中妻患之乃令士祼而解髪直出門吾屬}
  - {type: variant, offset: 2995, length: 2, content: 羅友, SBCK: 繆公笑曰食駿馬之肉不飲酒余恐其傷汝也遍飲而去處一年韓原之戰晉人巳環繆公之車矣甞食馬肉三百餘人畢力爲繆公疾􅃲大尅晉軍反獲惠公以歸莊子曰將爲胠篋探囊發匱之盗爲守備則必攝緘縢固扄鐍此丗俗所謂智也巨盗至則􅀒掲篋擔囊而趍唯恐緘縢扄鐍之不固然向所謂智者不乃爲大盗積者乎又曰絶聖棄智大盗乃止摘玉毁珠小盗不起也列子曰晉國苦盗有郄雍者能視盗之皃察其眉睫之間而得其情晉侯使視千里無遺一焉晉侯大喜告趙文子曰吾得一人而一國盗爲之盡矣文子曰君司察而得盗盗不盡矣且郄雍必不得其死俄群盗謀曰吾所以窮者郄雍也遂戕之晉侯聞大駭召文子曰果如子言然取盗何方文子曰君欲無盗舉賢而任之遂取隨㑹爲政而君盗奔秦焉又曰牛􅆙者上地之大儒之邯鄲遇盗於耦沙之中盡取其衣車牛歩而去視之欣然無憂怯之色盗追而問其故曰君子不以所養害其所以養盗曰嘻賢失矣徃彼見趙君以我爲事必困乃相與追而殺之又曰東方有人曰爰旌目將有所適而餓於道狐父之盗曰丘見而下壷飡以餔之爰旌目三餔而後能視曰子能何爲者也曰我狐父之人丘也爰旌目曰嘻女非盗耶胡爲而食我吾義不食子之食也兩手據地而歐之不岀喀喀然而死淮南子曰楚將子發好求􅇊道之士有善爲偷者往見曰聞君求􅇊道之士臣楚市偷也願以􅇊該一卒子發見而禮之無幾何齊興師伐楚子發將師以當之兵三却於是市偷請曰臣有薄伎願君行之子發曰諾偷則夜出解齊將軍之綢帷而獻之子發使歸之明夕復往取其枕又使歸之明夕復往取其簮又使歸之於是齊師大駭將軍與軍吏謀曰今夕不去楚軍恐取吾首即還秦子曰孔文舉爲北海相有母病差者思食新麥}
