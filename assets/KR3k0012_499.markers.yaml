  - {type: variant, offset: 2959, length: 1, content: 令, SBCK: 子􅀖有道則智􅀖無道則愚其智可及其愚不可及也華陽國志曰}
  - {type: variant, offset: 2961, length: 3, content: 霸至薊, SBCK: 長文字徳儁天姿聦警察孝廉不就遂陽愚甞着綘衣帽牽猪過}
  - {type: variant, offset: 2961, length: 6, content: 霸至薊市中募, WYG: 問劉禪曰頗思蜀不禪曰此間樂不思蜀也卻正聞之求見禪曰若王後問宜泣而後答㑹王復問禪曰先}
  - {type: variant, offset: 2961, length: 6, content: 霸至薊市中募, krp: 問劉禪曰頗思蜀不禪曰此間樂不思蜀也郗正聞之求見禪曰若王後問冝泣而後荅㑹王復問禪曰先}
  - {type: variant, offset: 2966, length: 1, content: 募, SBCK: 乞}
  - {type: punctuation, offset: 2968, content: ，, id: KR3k0012_CHANT_499-bkkpn902}
  - {type: 'tls:seg', offset: 2968, content: '', id: KR3k0012_CHANT_499-41a.8}
  - {type: variant, offset: 2968, length: 0, content: '', SBCK: 與語僞不聞常􅀐牛周遊說苑曰齊桓公獵逐鹿入谷中見一老公問是爲何谷對曰爲愚公之谷以臣名之臣故畜㹀牛生子大賣之而買馬少年曰牛不能生馬遂持駒去家隣以臣爲愚故名愚公之谷愚怯釋名曰怯脅也見敵恐脅也崔贑易林曰任}
  - {type: variant, offset: 2968, length: 1, content: 將, WYG: 墳墓逺在隴蜀乃心西望無日不思因閉其眼王曰何}
  - {type: variant, offset: 2968, length: 1, content: 將, krp: 墳墓逺在隴蜀乃心西望無日不思因閉其眼王曰何}
  - {type: variant, offset: 2969, length: 0, content: '', SBCK: 力薄駑孱思怯如蝟見鵲不敢拒格韓詩外傳曰崔杼殺莊公陳不占東觀漁者聞君有難將往死之飡則失哺上車失軾僕曰敵在數百里外今食則失哺上車失軾雖徃其有益乎陳不占曰死君義也無勇私也遂驅車比至門聞鍾鼓之音闘戰之聲遂駭而死君子聞之曰陳不占可謂志士矣無勇而能行義天下鮮矣東觀漢記曰杜篤仕郡文學􅁺}
  - {type: page-break, offset: 2969, content: '', id: KR3k0012_SBCK_499-5a}
  - {type: variant, offset: 2970, length: 1, content: 擊, SBCK: 目疾二十餘年不窺京師篤外髙祖破羗將軍辛武賢以武略稱篤常歎曰杜氏文明善政而篤不任爲吏辛氏秉義經武而篤又怯於事外内五丗至篤衰矣沈約宋書曰周朗兄嶠爲吴興太守賊劭弑立隨}
  - {type: variant, offset: 2970, length: 5, content: 擊王郎市人, WYG: 似卻正語耶禪驚視曰如尊命左右}
  - {type: page-break, offset: 2970, content: '', id: KR3k0012_WYG_499-2b, image: WYG0897/WYG0897-0498b.png}
  - {type: variant, offset: 2970, length: 5, content: 擊王郎市人, krp: 似郗正語耶禪驚視曰如尊命左右}
  - {type: variant, offset: 2972, length: 1, content: 郎, SBCK: 誕舉義於㑹稽劭加嶠冠軍將軍誕檄又至嶠素恇怯廻惑不知所從爲府司馬丘珍孫所殺又曰劉彦節少以宗室清謹見知齊髙帝輔政彦節知運祚將遷密懷異圖及沈攸之舉兵齊髙帝入屯朝堂􅀽粲鎮石頭潜與彦節及諸大將黄回等謀夜㑹石頭詰旦乃發彦節素怯騷擾不自安再晡後便自丹楊郡車載婦女盡室奔石頭臨去婦蕭氏強勸令食彦節歠羮冩胷中手振不自禁事敗􅀍殺趙書曰石勒屯􅁑陂值天雨不息勒長史刁應勸勒降晉勒啾然而嘯張賔勸勒還北勒欣然曰賔計是也應冝斬明其性怯可退爲將軍孫卿子曰夏首之南有人曰㳙濁梁其爲人愚善畏明月而霄行俯見其影以爲伏􅀑仰見其髮以爲伏魅匍踣而走比至其家失氣而死愼子曰有勇不以怒反與怯均也吕氏春秋曰夫民無常怯有義則實實則勇無氣則虚虚則怯怯勇虚實其所由甚微不可不知淮南子曰怯者夜見立表以爲􅀑見寢石以爲兕懼掩其氣也掩奪也抱朴子曰拙人得工輸之斤斧不能以成雲梯怯者得馮婦之刀㦸不能以格兕虎也智怯韓詩外傳曰楚白公之難有杜之善者辭其母將死君其母曰死君可乎杜之善曰聞事君者内其禄而外其身今所養母者君之禄也請往死之比至朝三廢車中其僕曰子懼何不返也杜之善曰懼吾私也死君公也吾聞君子不以私害公遂往死也家語曰或問孔子曰顔淵何人曰仁人也丘弗如也子貢何人曰辯人也丘弗如也子路何人曰勇人也丘弗如也客曰三子者皆賢於夫子而服役何也孔子曰丘能仁且忍辯且訥勇且怯以三子之能易丘之道弗如也史記曰管仲曰吾甞三戰三走鮑叔不以我爲怯知我有老母也又曰淮隂屠中少年有侮韓信者曰􅀂雖長大好帶劒中情怯耳衆辱之曰能死刺我不能出我跨下信視之俛出跨下匍匐一}
