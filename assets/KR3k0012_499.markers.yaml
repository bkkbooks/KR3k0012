  - {type: variant, offset: 2978, length: 1, content: 舉, WYG: 王隱晉書曰䜟書有蝦蟇當貴惠帝在宫時出問左右此鳴蛙為官乎為私乎賈𦙍對曰在官地中為官蝦蟇在私地中為私蝦蟇於是世間遂傳此語後魏書曰宋弁族弟鴻貴為定州北平府參軍送戍兵於荆州坐取兵絹四百疋兵欲告之乃斬兵十人又疏凡不達律令見律有梟首之罪乃生斷其}
