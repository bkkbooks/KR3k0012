  - {type: variant, offset: 302, length: 1233, content: 今天下諸侯方欲力爭競招英雄以自輔翼此得士則昌失士則亡之秋也不自高人將下吾不自貴人將賤吾舜禹揖讓湯武用師非故相詭乃時也耳華嶠後漢書曰趙壹字元淑恃才倨傲為鄉里所擯東觀漢記曰博士范升奏曰伏見太原周黨解履升華轂陛下見帝庭偃蹇慠慢逡巡進退臣願與並論靈臺之下魏略曰丁謐少不肯交遊但博觀書傳為人亢毅頗有才略太和中常於鄴借人空屋其中而諸王亦欲借之不知謐已得直開門入謐望見王交腳臥不起而呼其奴客曰此等人促呵使去王怒其無禮還具上聞之明帝收繫鄴獄以其功臣子原之蜀志簡雍字憲和涿郡人與先主有舊性簡慠跌蕩在先主座席猶箕倨傾倚威儀不肅自從適諸葛亮已下則獨擅一榻傾枕臥語無所為屈蜀志曰彭羕字永年廣漢人身長八尺容貌甚偉姿性驕慠多所輕忽唯敬同郡秦子整王隱晉書曰魏末阮籍有才而嗜酒荒放露頭散髮裸袒箕踞作二千石不治官事日與鈴下共飲酒歌呼時人或以籍生在魏之交欲佯狂避時不知籍本性自然也干寶晉記曰呂安友嵇康相思則命駕千里從之或遇其行康兄喜位至方伯拭席而待弗之顧也獨宿車中康母設酒求康兒共戲則去鄧粲晉記曰劉伶常著袒服而乘鹿車客有詣伶值其裸袒責伶伶笑曰吾以天為屋以屋為褌諸君不當入中又何怨乎其自任若此又曰胡母輔之過河南門下將飲酒河南卒王子博倨坐其傍輔之叱使取火子博曰我卒也唯不乏吾事安能為人使輔之與語歎曰吾弗及也因言河南尹以為功曹習鑿齒漢晉陽春秋曰陳蹇兄丕有名於世與夏侯玄親交玄拜其母蹇時為中領軍聞玄會於其家悅而歸既入戶玄曰相與未至於此蹇當戶立良久曰如君言乃趨而出意氣自若玄大以此知之後魏書曰季栗鴈門人也性簡慢務寵不率禮度每在太祖前舒放倨傲不自祗肅笑唾任情太祖積其宿過天興三年遂誅之於是威嚴始厲制勒群下盡卑謙之禮自栗始也後魏書曰元順字子和起家為給事中時尚書令高肇帝舅權重天下人士望塵拜伏順曾懷剌詣肇門門者以其年少荅云在座大有賓客不肯為通順叱之曰任城王兒可是賤也及見直往登床捧手抗禮王公先達莫不怪懼而順辭吐傲然若無所覩謂眾曰此兒豪氣尚爾況其父耶澄聞之大怒杖之數十晉中興書曰蔡謨讓司徒李宗臨軒遣侍中璩黃門郎丁纂徵謨謨陳疾篤使主簿謝攸對自平旦至日中使者十餘反而謨不至孝宗時年八歲甚怪之極問左右曰所召何人何以至今不來軒臨何當竟會稽王曰蔡公慠違上命無人臣之禮若人主卑屈於上大義不行於下亦不知復所以為治於是奏送謨廷尉以正刑書謨懼率子弟素服詣闕稽顙到廷尉待罪皇太后詔可依舊制免為庶人沈約宋書曰會稽太守孟顗事佛精懇而為謝靈運所輕嘗謂顗曰得道應須慧業丈人生天當在靈運前成佛必在靈運後顗深恨此言禰衡傳曰衡字正平建安初自荊州北遊許都恃才慠逸臧否過差見不如己者不肯與言語人皆以是憎之文士傳曰阮籍從容曰平生曾遊東平縣樂其土風願得為東平太守文帝大悅即從之籍便騎驢逕到郡至皆壞壁障內外相望教令清當十餘日便騎驢歸淮南子曰賓有見人於季子者賓出季子曰子之賓獨有三過望我而笑是慢也談語而不稱師是叛也交淺而言深是亂也賓曰望君而笑是公也談語不稱師是通也交淺而言深是忠也故賓之賓客一體也或以為小人或以為君子視之異也物理論曰今有呂子義清賢仕為率更令有人就之宿, SBCK: ''}
