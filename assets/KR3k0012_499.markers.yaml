  - {type: 'tls:seg', offset: 3037, content: '', id: KR3k0012_CHANT_499-42a.13}
  - {type: variant, offset: 3038, length: 3, content: 亦被命, WYG: 為清河太守郡東有南曲隄成公一姓阻而居之羣盜多萃於此人為之語曰寧使東呉㑹稽不厯成公曲隄世良施八條以制盜盜奔他境人又謠曰曲隄之險賊何益但有宋公自屏跡吕氏春秋曰秦繆公乘馬車敗右服失而野人取之繆公自往求馬見野人方將食之於岐山之陽繆公笑曰食駿馬之肉不飲酒余恐其傷汝也遍飲而去處一年韓原之戰晉人已環繆公之車矣嘗食馬肉三百餘人畢力為繆公疾鬭大尅晉軍反獲惠公以歸莊子曰將為胠篋探囊發匱之盜為守備則必攝緘縢固扄鐍此世俗所謂智也巨盜}
  - {type: page-break, offset: 3038, content: '', id: KR3k0012_WYG_499-14a, image: WYG0897/WYG0897-0504a.png}
