  - {type: variant, offset: 3028, length: 0, content: '', SBCK: 之京師道􅀫下亭盗共竊其馬尋問知是嵩也乃相責讓曰孔仲山善士豈冝侵盗乎於是遂以馬還之先賢行􅃺曰王烈字彦考通識逹道時國中有盗牛者先主得之盗曰邂逅迷惑從仐巳後將改過子旣巳赦宥幸勿使王烈知之海内先賢傳曰姜肱字伯淮甞與弟季江遇盗將奪其衣}
  - {type: page-break, offset: 3028, content: '', id: KR3k0012_SBCK_499-10a}
  - {type: variant, offset: 3029, length: 0, content: '', SBCK: 問不言盗聞叩頭謝罪還肱衣肱不受陳寔別傳曰}
  - {type: variant, offset: 3030, length: 1, content: 得, SBCK: 盗夜入其室止於梁上寔隂見之乃起呼命子孫正色訓之曰夫人不可不勉不善之人未必本惡習與性成遂至於此如梁上君子是矣盗大驚自投于地稽顙歸罪寔徐譬之曰視君狀皃不是惡人冝深克巳反善當由困貧今遺絹二疋自是一縣無復盗竊劉欣期交州記曰趙嫗者乳長數尺不嫁入山聚羣盗遂北}
  - {type: variant, offset: 3030, length: 0, content: '', WYG: 逃暑於孤林之下者日流影移而徙袵以從隂及至暮反席於樹下及月流影移復徙袵以從隂而患露之濡於身其隂逾去而其身逾濕是巧於用晝而拙於用夕奚不處曜而辭隂反林自露此亦愚之至也笑林曰漢司徒崔烈辟上黨鮑堅為掾將謁鮑自慮不過問先到者儀適有答曰隨典儀口喝既謁讚曰可拜堅亦曰可拜讚者曰就位堅亦曰就位因復着履上座將離席不知履所在讚者曰履着脚堅亦曰履着脚也又曰平原陶邱氏取渤海墨台氏女女色甚美才甚令復相敬已生一男而歸母丁氏年老進見女聓女聓既歸而遣婦婦臨去請罪夫曰曩見夫人年德以衰非昔日比亦恐新婦老後必復如此是以遣實無他故崔駰與竇憲牋曰交淺而言深者愚也在賤而望貴者惑也如愚論語為政曰吾與回言終日不違如愚退而省其私亦足以發回也不愚又公冶長曰甯武子邦有道則智邦無道則愚其智可及其愚不可及也華陽國志曰王長文字德雋天姿聰警察孝廉不就遂陽愚嘗着絳衣帽牽猪過市中乞人與語偽不聞常騎牛周遊説苑曰齊桓公獵逐鹿入谷中見一老公問是為何谷對曰為愚公之谷以臣名之臣故畜㹀牛生子大賣之而買馬少年曰牛不能生馬遂持駒去家鄰以臣為愚故名愚公之谷愚怯釋名曰怯脅也見敵恐脅也焦贛易林曰任將力薄駑孱思怯如蝟見鵲不敢拒格韓詩外傳曰崔杼殺莊公陳不占東觀漁者聞君難將往死之飡則失哺上車失軾僕曰敵在數百里外今食則失哺上車失軾雖往其有益乎陳不占曰死君義也無勇私也遂驅車比至門聞鼓鐘之音闕㦸之聲遂駭而死君子聞之曰陳不占可謂志士矣無勇而能行義天下鮮矣東觀漢記曰杜篤仕郡文學掾以目疾二十餘年不窺京師篤外髙祖破羗將軍辛武賢以武略稱篤常歎曰杜氏文明善政而篤不任為吏辛氏秉義經武而篤又怯於事外内五世至篤衰矣沈約宋書曰周朗兄嶠為呉興太守賊劭弑立隨王誕舉義於㑹稽劭加嶠冠軍將軍誕檄又至嶠素恇怯迴惑不知所從為府司馬邱珍孫所殺又曰劉彦節少以宗室清謹見知齊髙帝輔政彦節知運祚將遷宻懐異圖及沈攸之舉兵齊髙帝入朝堂袁粲鎮石頭潛與彦節反諸大將黄回等謀夜㑹石頭詰旦乃發彦節素怯騷擾不自安日晡後便自丹陽郡車載婦女盡室奔石頭臨去婦蕭氏强勸令食彦節歠羮冩胷中手振不自禁事敗被殺趙書曰石勒屯葛陂值天雨不息勒長史刁應勸勒降晉勒啾然而嘯張賔勸勒還北勒欣然曰賔計是也應宜斬明其性怯可退為將軍孫卿子曰夏首之南有人曰涓濁梁其人愚善畏明月而宵行俯見其影以為伏鬼仰見其髮以為伏魅匍踣而走比至其家失氣而死慎子曰有勇不以怒反與怯均也吕氏春秋曰夫民無常怯有義則實實則勇無氣則虛虛則怯怯勇虛實其所由甚微不可不知淮南子曰怯者夜見立表以為鬼見寢石以為兕懼掩其氣也掩奪也抱朴子曰拙人}
