  - {type: variant, offset: 3020, length: 3, content: 誕肆許, WYG: 耳惡人聞也又曰楚人有涉江者其劒自舟中墜於水遽刻其舟曰是吾劒之所從墜處舟止從其所刻入水求之淮南子曰楚人有東家母死其子哭}
  - {type: variant, offset: 3020, length: 3, content: 誕肆許, krp: 耳惡人聞也又曰楚人有渉江者其劎自舟中墜於水遽刻其舟曰是吾劒之所從墜處舟止從其所刻入水求之淮南子曰楚人有東家母死其子哭}
