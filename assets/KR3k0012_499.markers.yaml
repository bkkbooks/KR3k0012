  - {type: 'tls:seg', offset: 3044, content: '', id: KR3k0012_CHANT_499-42a.15}
  - {type: variant, offset: 3046, length: 0, content: '', WYG: 其故曰君子不以所養害其所以養盜曰嘻賢矣彼往見趙君以我為事必困乃相與追而殺}
