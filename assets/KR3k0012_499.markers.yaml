  - {type: variant, offset: 2957, length: 0, content: '', SBCK: 上破賊入漁陽諸將上尊號上不許議曹􅁺張祉言俗以爲燕人愚方定大事反與愚人相守非計也上大􅀏漢􅀳陽秋曰司馬文王問劉禪曰頗思蜀不禪曰此間樂不思蜀也郗正聞之求見禪曰􅀂王後問冝泣而後荅㑹王復問禪曰先人墳墓逺在隴蜀乃心西望無日不思因閉其眼王曰何以似郗正語耶禪驚視曰如尊命左右皆大􅀏王隱晉書曰䜟書有蝦蟇當貴惠帝在宫時出問左右此鳴是官蝦蟇爲私乎賈胤對曰在官地中爲官蝦蟇在私地中爲私蝦蟇於是丗間遂傳此語後魏書曰宋弁弟族鴻貴爲定州北平府參軍送戍兵於荆州坐取兵絹四百疋兵欲告之乃斬兵十人又踈凢不逹律令見律有梟首之罪乃生斷其手以水澆之然後斬决尋坐㐲法時人哀兵之苦􅀏鴻貴之愚續􅀳陽秋曰顧愷之夜於月下長詠自云得先賢風製謝瞻遥稱讃之愷之得此弥自力忘倦瞻將眠語搥脚人令代焉愷之不􅁴其異遂幾旦而後止沈約宋書曰劉義綦封營道縣侯凢鄙無識知每爲始興王濬兄弟所戲濬常謂義綦曰陸士衡詩曰營道無烈心其何意苦阿父如此義綦曰下官􅀄不識士衡何忽見苦廣陵列士傳曰吴武字季濟篤學好古師事陳仲考子升性頑愚考曰父子情重不忍戮之卿爲吾教也趙書曰石肇前石之昆弟也前石旣貴肇在軍中不能自逹人送詣前石前石哀之拜建威將軍以肇無才力毎髙選參佐輔之爲娉廣川劉典兄女肇甚懼之拜長樂太守治官每入門動稱阿劉教可尔不可尔時人以爲􅅓謡鬻子曰愚者不自謂愚而愚見於言愚者雖自謂智人皆謂之愚也列子曰宋人有於道得人遺契者歸而藏之密數其齒告鄰人曰吾冨可待矣又曰􅂎國有人憂天崩地墜身無所􅀉廢寢與食又有憂彼所憂往曉之曰天積氣耳其人曰天果積氣日月星􅀫不當墮耶對曰日月星􅀫亦積氣中之有}
  - {type: page-break, offset: 2957, content: '', id: KR3k0012_SBCK_499-2a}
  - {type: page-break, offset: 2957, content: '', id: KR3k0012_SBCK_499-2b}
  - {type: variant, offset: 2957, length: 3, content: 光武令, WYG: 上破賊入漁陽諸將上尊號上不許議曹掾張祉言俗以為燕人愚方定大事反與愚人相守非計也上大笑漢晉陽秋曰司馬文}
  - {type: variant, offset: 2957, length: 3, content: 光武令, krp: 上破賊入漁陽諸將上尊號上不許議曹掾張祉言俗以爲燕人愚方定大事反與愚人相守非計也上大笑漢晉陽秋曰司馬文}
  - {type: variant, offset: 2958, length: 0, content: '', SBCK: 耀者只使墮亦不能中傷其人曰柰地壞何對曰地積塊耳充塞四虚何憂其壞其人大喜荀卿子曰宋之愚人得燕石於梧臺之東歸而藏之以爲大寳周客觀之掩口而􅀏曰此燕石也其與瓦甓不差主人大怒曰啇賈之言醫匠之口藏之愈固守之弥謹莊子曰人有畏影惡迹而去之走者舉足愈數而迹愈多走疾而影不離自以爲尚遟疾走不休絶力而死韓子曰燕李季好逺出其妻有士李季至士在内中妻患之乃令士祼而解髪直出門吾屬陽不見也於是士從其計疾走出門季曰是何人也家室皆曰無有季曰吾見􅀑也季婦曰爲之柰何然取五牲之矢浴之季曰諾乃浴矢又曰鄭有人身買履者先自度其足而買之及至市得履乃曰吾忘度乃歸取之頃返市罷遂不得履人曰何不試以足曰寧信度數無自信也又曰宋人有耕者田中有株􅇠走􅔰株折頸而死因釋耕而守株爲宋國􅀏今欲以先王之政治當丗民皆守株之心也吕氏春秋曰范氏之亡也百姓有得鍾者欲􅀒之則鍾大不可􅀒以搥毀之恐人聞而奪巳也遽掩其耳惡人聞也又曰楚人有渉江者其劎自舟中墜於水遽刻其舟曰是吾劒之所從墜處舟止從其所刻入水求之淮南子曰楚人有東家母死其子􅂘而不悲西家子見之歸謂其母曰社何憂速死吾必悲􅂘社淮南間謂母爲社又曰故聖人同死生愚人亦同死生聖人同死生通於分理也愚人之同死生不知利害之所在也符子曰鄭人有逃暑於􅀌林之下者日流影移而徙祍以從隂及至暮反席於樹下及月流影移復徙祍以從隂而患露之濡於身其隂逾去而其身逾濕是巧於用晝而拙於用夕奚不處曜而辭隂反林息露此亦愚之至也􅀏林曰漢司徒崔烈辟上黨鮑堅爲􅁺將謁見自慮不過問先到者儀適有荅曰隨典儀口唱旣謁讃曰可拜堅亦曰可拜讃者曰就位堅亦曰就位因復着履上座將離席不知履所在讃者曰履着脚堅亦曰履着脚也又曰平原陶丘氏取渤海墨台氏女女色甚美才甚令復相敬已生一男而歸母丁氏年老進見女􅡾女􅡾旣歸而遣婦婦臨去請罪夫曰曩見夫人年徳巳衰非昔日比亦恐新婦老後必復如此是以遣實無他故崔駰與竇憲牋曰文淺而言深者愚也在賤而望貴者惑也如愚論語爲政曰吾與囬言終日不違如愚退而省其私亦足以發囬也不愚又公治長曰寗}
