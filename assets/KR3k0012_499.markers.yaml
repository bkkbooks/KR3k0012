  - {type: 'tls:seg', offset: 3042, content: '', id: KR3k0012_CHANT_499-42a.14}
  - {type: variant, offset: 3042, length: 3, content: 尤晚溫, WYG: 則必負篋擔囊而趍唯恐緘縢扄鐍之不固然向所謂智者不乃為大盜積者乎又曰絶聖棄智大盜乃止摘玉毁珠小盜不起列子曰晉國苦盜有郗雍者能視盜之貌察其眉睫之間而得其情晉侯使視千里無遺一焉晉侯大喜告趙文子曰吾得一人而一國盜為之盡矣文子曰君司察而得盜盜不盡矣且郗雍必不得其死俄羣盜謀曰吾所以窮者郗雍也遂戕之晉侯聞大駭召文子曰果如子言然取盜何方文子曰君欲無盜舉賢而任之遂取隨㑹為政而羣盜奔秦焉又曰牛􅀈者上地之大儒之邯鄲遇盜於耦沙之中盡取其衣車牛步而去視之欣然無憂怯之色盜追而}
  - {type: page-break, offset: 3042, content: '', id: KR3k0012_WYG_499-14b, image: WYG0897/WYG0897-0504b.png}
  - {type: page-break, offset: 3042, content: '', id: KR3k0012_WYG_499-15a, image: WYG0897/WYG0897-0504c.png}
  - {type: variant, offset: 3042, length: 3, content: 尤晚溫, krp: 也笑林曰漢司徒崔烈辟上黨鮑堅爲掾將謁見自慮不過}
