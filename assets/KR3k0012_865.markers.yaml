  - {type: variant, offset: 540, length: 2, content: 朱脩, WYG: 豫章王大㑹賓僚張融食灸始畢行灸人便去融欲求鹽蒜口終不言方揺食指半日乃息又曰張融作海賦文辭詭激獨與衆異後以示鎮軍將軍顧顗}
  - {type: variant, offset: 540, length: 2, content: 朱脩, krp: 豫章王大㑹賔僚張融食炙始畢行炙人便去融欲求塩䔉口終不言方食捶指半日乃息又曰張融作海賦文辭詭激獨與衆異後以示鎮軍將軍頋顗}
  - {type: substitution, offset: 541, original: 脩, replacement: 修, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-16957}}
  - {type: variant, offset: 543, length: 2, content: 為荊, SBCK: 曰卿此賦實超􅀇虚但恨不道塩耳融即永筆注曰漉沙搆白􅆈波出素積雪中春飛霜暑路齊書曰崔慰祖父䘮不食塩母曰汝旣無兄弟又未有子息毀不滅性故當不進肴羞耳如何絶塩吾今亦不食矣慰祖不得已從之梁書曰侯景䧟臺城宴集其黨又召僧通僧通取􅁏揾塩以進景問曰好不景荅所恨大鹹僧通曰不鹹則爛及景死王僧辨截其二手送齊宣又傳首徃江陵果以塩五斛置腹中送于建康􅁀之于市百姓爭取屠膾羹食皆盡後魏書曰丗祖南伐遺李伯賜劉義㳟等塩各九種并胡䜴孝伯日有後詔凢此諸塩各有所冝白塩食塩主上自所食黒塩治腹脹氣滿末之六銖以酒下胡塩治目痛戎塩治諸瘡赤塩駮塩臰塩馬齒塩四種並非食塩又曰忽􅁻國水氣鹹凝塩生樹上又曰沮渠􅀩遜平酒泉於宋繇室得書數千卷塩米數十斛而巳􅀩遜歎曰􅀌不喜尅李氏欣得宋繇耳北齊書曰房景伯母亡居䘮不食塩菜因此遂爲水病積年不愈又曰崔暹奏請海沂煑塩有利軍國文襄以問崔􅄧􅄧曰亦旣官煑断之竈官力雖多不及人廣諸淮開市薄爲竈稅􅀻館給彼此有冝朝廷從之唐書曰武德中長安古城塩渠水生塩色紅白味甘狀如方印又曰左右神䇿塩}
  - {type: page-break, offset: 543, content: '', id: KR3k0012_SBCK_865-3b}
  - {type: variant, offset: 543, length: 0, content: '', WYG: 曰卿此賦實超𤣥虛但恨不道鹽耳融即求筆注曰漉沙搆白熬波出素積雪中春飛霜暑路又曰崔慰祖父喪不食鹽母曰汝既無兄弟又未有子息毁不滅性故當不進肴羞耳至扵鹽不食吾今亦不食矣慰祖不得已從之梁書曰侯景䧟臺城宴集其黨又召僧通僧通取肉揾鹽以進景問曰好不景答所恨太鹹僧通曰不鹹則爛及景死王僧辨截其二手送齊文宣又𫝊首江陵果以鹽五斗置腹中送于建康暴之于市百姓争取屠膾羮食皆盡後魏書曰世祖南伐遣李孝伯賜劉義恭等鹽各九種并胡豉孝伯曰有後詔凡此諸鹽各有所宜白鹽食鹽主上自所食黑鹽治腹脹氣滿用每六銖以酒下胡鹽治目痛戎鹽治諸瘡赤鹽駮鹽臰鹽馬齒鹽四種並非食鹽又曰忽吉國水氣鹹凝鹽生樹上又曰沮渠蒙遜平酒泉於宋繇室得書數千卷鹽米數十斛而已蒙遜歎曰孤不喜尅李氏欣得宋繇耳北齊書曰房景伯母亡居喪不食鹽菜因此遂}
