  - {type: variant, offset: 825, length: 3, content: 杏油亦, SBCK: 江淮試鹵濃淡昻置飯粒於鹵中粒浮者即是純鹵也醬禮記曰膾炙處外醯醬處内又曰獻熟食者操醬齊又曰濡雞醢醬實􅖋濡魚􅆑醬實􅖋濡鼈醢醬實􅖋魚膾芥醬麋腥醢醬論語曰不得其醬不食漢書曰劉歆謂楊雄云今學有禄利然尚不能明易又}
