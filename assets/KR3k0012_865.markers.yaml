  - {type: variant, offset: 822, length: 0, content: '', SBCK: 其下有鹽累棊而生其地化爲鹵而㓻堅嶷如蒺䔧撥發其厎塩方大如棊以次相累也坐以鹽乞天帝故使此地化生塩也又曰鹽山二岳三色爲質赤者如丹黒者如􅃮小大從意鏤之冩物赤與黒者皆小惟白大或如篋箱從人所爲形也作獸辟惡佩之爲􅁻或治爲鳥獸以佩之戎鹽可以療疾四方皆用白者作散以除頭風以其出胡國故言戎塩也凉州記曰有青塩池出塩正方半寸其形}
  - {type: page-break, offset: 822, content: '', id: KR3k0012_SBCK_865-7a}
  - {type: variant, offset: 822, length: 0, content: '', WYG: 其下有鹽累祺而生其地化為鹵而剛堅凝如蒺䔧撥發其底鹽方大如棊以次相累也坐以鹽乞天帝故使此地化生鹽也又曰鹽山二岳三色為質赤者如丹黑者如漆大小如意鏤之冩物赤與黑者皆小惟白大或如篋箱從人所為形也作獸辟惡佩之為吉戎鹽可以療疾凉州記曰有青鹽山出鹽正方半寸其形}
  - {type: variant, offset: 822, length: 0, content: '', krp: 其下有鹽累棊而生其地化爲鹵而㓻堅嶷如蒺䔧撥發其厎塩方大如棊以次相累也坐以鹽乞天帝故使此地化生塩也又曰鹽山二岳三色爲質赤者如丹黒者如􅃮小大從意鏤之冩物赤與黒者皆小惟白大或如篋箱從人所爲形也作獸辟惡佩之爲吉或治爲鳥獸以佩之戎鹽可以療疾四方皆用白者作散以除頭風以其出胡國故言戎塩也凉州記曰有青塩池出塩正方半寸其形}
  - {type: variant, offset: 823, length: 1, content: 油, SBCK: 石甚甜羙益州記曰汶山越嶲煑塩法名異汶山有鹹石先以水漬旣而煎之越嶲先燒炭以塩井水沃炭刮取塩荆州記曰塩水自凝生傘子塩方寸中央隆起形如張傘夲草經曰鹵塩一名寒石味苦戎塩主明目大塩一名胡塩吕氏春秋日本草云戎塩一名胡塩崔駰􅀶徒論曰江陽六塩􅀏林曰姚彪至武昌遇風與沈浙江渚守風粮用盡遣人從彪貸鹽百斛彪得書不荅勑左右倒鹽百斛着江水中曰明吾不惜惜所與耳嶺表異録曰野煎塩廣南煑海其無限啇人納攉計價極微數内有恩州􅂣石橋􅂣俯迩滄溟去府最逺啇人於所司給一百石搉課止銷􅄂貨三二千及徃本􅂣塩並無官者給遣啇人但將人力收聚鹹沙掘地爲坈坈口稀布竹木鋪蓬簟於其上堆沙潮來投沙鹹鹵淋在坈内伺候潮退以火炬照之氣衝火滅則取鹵計用竹盤煎之頃尅而就竹盤者以􅑪細織竹鑊表裏以壯礪􅁅泥之自収海水煎塩謂之野煎易得如此}
