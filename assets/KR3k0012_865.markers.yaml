  - {type: variant, offset: 669, length: 7, content: 曲項木驢攻城矢, WYG: 兄弟之國而韓魏稱為藩臣齊獻魚鹽之地斷趙之右臂淮南萬畢術曰鹽能累卵戎鹽塗卵取他卵置其上即累也鹽鐵論曰古者豪強大家得煮海為鹽民皆依為姦之業也世說曰秦穆公使賈人載鹽百里奚使将車風俗通曰醎如炭俗説鹹亦與熱正等炭火不可以入口人食得大醎亦吐之謹按東海昫人曉知鹽法者云欖鹽水多日毎燋黑如炭非謂竈中火炭也吴時外國傳曰漲海中有灣灣中常出自然白鹽嶧嶧如細}
