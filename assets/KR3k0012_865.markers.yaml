  - {type: variant, offset: 786, length: 2, content: 氣盡, SBCK: 煑之則鹽後人以火投井中火即滅至今不然梁四公子記曰髙昌國遣使貢鹽二顆顆大如斗狀白似玉帝以其自萬里絶域而來獻數年方逹命杰音竭公迓之謂其使曰鹽一顆是南燒羊山月望收之者一是北燒羊山非月望收之者使者具陳鹽奉王急命故非時尓因問紫鹽磬碧珀云中路遭北涼所奪不敢言之帝問杰曰公羣物之異對曰南燒羊山鹽文理粗北燒羊山鹽文理密月望收之者明徹如氷以氊槖煑之可驗交河之間平磧中掘􅀷數尺有末鹽如紅如紫色鮮味甘食之止痛更􅀷一丈下有碧珀黒逾純漆或大如車輪末而食之攻婦人小腹癥瘕諸疾彼國珎異必當致貢是以知之凉州異物志曰姜賴之墟今稱龍城恒溪}
  - {type: page-break, offset: 786, content: '', id: KR3k0012_SBCK_865-6b}
  - {type: variant, offset: 786, length: 2, content: 氣盡, WYG: 煮之則鹽後人以火投井中火即滅至今不然梁四公子記曰髙昌國遣使貢鹽二顆顆如斗􅃺白似玉帝以其自萬里絶域而来獻數年方達命杰音竭公迓之謂使曰鹽一顆是南燒羊山月望収之者一是北燒羊山非月望収之者使者具陳鹽奉王急命故非時爾因問紫鹽磬碧珀云中路遭北凉所奪不敢言之帝問􅇐公羣物之異對曰南燒羊山鹽文理粗北燒羊山鹽文理宻月望収之者明徹如氷以氈槖煮之可驗交河之間平磧中掘深數尺有末鹽如紅如紫色鮮味甘食之止痛更深一丈下有碧珀黑逾純漆或大如車輪末而食之攻婦人小腹癥瘕諸疾彼國珍異必當致貢是以知之凉州異物志曰姜頼之墟今稱龍城恒溪}
