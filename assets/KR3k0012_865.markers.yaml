  - {type: variant, offset: 830, length: 0, content: '', SBCK: 變有時而重又曰雷不作醬俗􅀃令人腹内雷聲桉子路感雷精而生尚十罡好勇死衛人醢之孔子覆醢毎聞雷心惻怛耳桓譚新論曰鄙人得鯅音羶醬而羙與人共食少唾其中因弃之俱不得食論衡曰作豆醬惡聞雷此欲使人急作不欲積乆世􅀃曰陸機入洛欲爲三都賦聞左司作之撫掌而􅀏與弟雲書云此間有傖父欲作三都賦湏其成當以覆醬瓮耳宋書曰孝武甞爲王玄謨作四時書云匏醬調秋菜白醝解冬寒又曰阮孝緒外兄王晏貴顯屢至其門孝緒度之必至顚覆聞其笳管穿籬逃匿不與相見曽㑹醬羙問之云是王家所得便吐餐覆醬及晏誅親戚咸爲之懼孝緒曰親而不黨唯坐之及竟􅀗免梁劉孝儀謝智安王賚蝦醬啓曰龍醬傳甘退成可陋蚿醢稱貴追覺失言上聖聞雷未之能覆嘉賔流歠差以無辭太平御覽卷第八百六十五}
  - {type: page-break, offset: 830, content: '', id: KR3k0012_SBCK_865-8b}
  - {type: variant, offset: 830, length: 0, content: '', WYG: 變有時而重又曰雷不作醬俗說令人腹内雷聲按子路感雷精而生尚剛好勇死衛人醢之孔子覆醢每聞雷心惻怛耳桓譚新論曰鄙人得鯅音延醬而美與人共食少唾其中因棄之俱不得食論衡曰作豆醬惡聞雷此欲使人急作不能積久世說曰陸機入洛欲為三都賦聞左思作之撫掌而笑與弟雲書云此間有滄父欲作三都賦須其成當以覆醬瓮耳宋書曰孝武嘗為王𤣥謨作四時詩云匏醬調秋菜白醝解冬寒又曰阮孝緒外兄王宴貴顯屢至其門孝緒度其必至顛覆聞其笳管穿籬逃匿不與相見曾食醬美問之云是王家所得便吐餐覆醬及宴誅親戚咸為之懼孝緒曰親而不黨誰坐之後竟獲免梁劉孝儀謝晉安王賚蝦醬啓曰龍醬𫝊甘退誠可陋蚳醢稱貴追覺失言上客聞雷未之能覆嘉賓流歠羞以無辭太平御覽卷八百六十五}
