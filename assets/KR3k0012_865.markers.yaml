  - {type: variant, offset: 665, length: 6, content: 攻臺城為曲項, SBCK: 山􅀯望塩皈或無皈字敗之池北望少澤其草多藷藇􅁗菽其隂多頳其陽多玉郭景純云塩敗澤即解縣塩池也吕氏春秋曰和之羙者大夏之塩髙誘曰大夏澤名或山名春秋後語曰張儀􅀃趙王曰今日楚與􅁗爲兄弟之國而韓魏稱爲藩臣齊獻魚塩之地断趙之右臂齊􅀒海有魚塩之利今云献魚塩之地矯辞以脅趙也淮南萬畢術曰塩能累􅆑取戎監塗􅆑取他夘置其上即累也塩鐵論曰古者豪強大家得煑海爲塩民皆依爲姦之業也世􅀃曰􅁗繆公使賈人載塩百里奚使將軍風俗通曰鹹如炭俗􅀃鹹亦與熱正等炭火不可以入口人食得大鹹亦吐之謹案東海昫人曉知塩法者云攪塩}
  - {type: page-break, offset: 665, content: '', id: KR3k0012_SBCK_865-5b}
  - {type: variant, offset: 665, length: 3, content: 攻臺城, WYG: 山南望鹽敗之池北望少澤其草多藷藇蓁菽其隂多頳其陽多土郭景純云鹽敗澤即斛縣鹽池也吕氏春秋曰和之美者即大夏之鹽春秋後語曰張儀說趙王曰今日楚與秦}
  - {type: variant, offset: 665, length: 6, content: 攻臺城為曲項, krp: 山南望塩皈或無皈字敗之池北望少澤其草多藷藇秦菽其隂多頳其陽多玉郭景純云塩敗澤即解縣塩池也吕氏春秋曰和之羙者大夏之塩髙誘曰大夏澤名或山名春秋後語曰張儀說趙王曰今日楚與秦爲兄弟之國而韓魏稱爲藩臣齊獻魚塩之地断趙之右臂齊負海有魚塩之利今云献魚塩之地矯辞以脅趙也淮南萬畢術曰塩能累卵取戎監塗卵取他夘置其上即累也塩鐵論曰古者豪強大家得煑海爲塩民皆依爲姦之業也世說曰秦繆公使賈人載塩百里奚使將軍風俗通曰鹹如炭俗說鹹亦與熱正等炭火不可以入口人食得大鹹亦吐之謹案東海昫人曉知塩法者云攪塩}
