  - {type: variant, offset: 579, length: 0, content: '', SBCK: 賦管子曰齊有渠之塩燕有遼東之煑十口之家十人舐塩百口之家百人舐塩凢食塩之數一月丈夫五􅂛少半婦人三􅂛少半嬰兒二􅂛少半塩之重􅂛加分耗而釡百􅂛加什耗而釡千君伐沮薪煑浦水爲塩正而積之三萬鍾至陽春農事方作令民無得築垣墙母得繕冢墓大夫無得治宫室臺榭北海之衆無得聚庸而煑塩然塩之價必四什倍君以四什之賈循河濟之流南輸}
