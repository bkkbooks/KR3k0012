  - {type: variant, offset: 100, length: 1, content: 八, SBCK: 賔客共其形塩散塩王之膳羞共飴塩飴塩之怡者今戎塩有也凢齊事鬻塩以待戒令齊事和五味之事鬻塩凍治之鬻音煑也記曰􅀕宗廟塩曰鹹鹺大鹹日鹺又曰醯醢之羙而煎塩之尚貴天産也又曰桃諸􅆑塩大塩又曰功衰食菜果飲水漿無塩酪不能食食塩酪可也功衰齊斬之未也酩酢酨左傳曰王使周公閱來聘饗有昌歜白黒形塩辭曰國君文足昭也武可畏也則有備}
