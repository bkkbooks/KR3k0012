  - {type: variant, offset: 540, length: 2, content: 朱脩, SBCK: 豫章王大㑹賔僚張融食炙始畢行炙人便去融欲求塩䔉口終不言方食捶指半日乃息又曰張融作海賦文辭詭激獨與衆異後以示鎮軍將軍頋顗}
