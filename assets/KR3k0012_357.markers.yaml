  - {type: variant, offset: 558, length: 550, content: 者王曰可得而聞乎對曰甲惡於此王曰何謂也對曰甲冬日則寒夏日則暑衣無惡乎惡乎甲者贊也貧貧故衣惡今大王萬乘之主富厚無敵而好衣民以甲臣弗得也意者為其義也甲之事兵之事也刈人之頸刳人之腹墮人之城郭刑人之父子其名又甚不榮也呂氏春秋曰邾之故為甲裳以帛以帛縕甲公息忌謂邾君曰不若以組凡甲之所以為固者以滿竅也今竅滿矣而任力者半組則不然竅滿則盡任力矣邾君以為然曰將何所得組公息忌對曰上用之則民為之矣邾君曰善下令令官為甲必以組公息忌知說之行也因令其家皆為組人有傷之者曰公息忌之所以欲用組者其家多為組也邾君不說於是乎止官無以組以用邾君有所尤也為甲以組而便公息忌雖多為組何損以組不便公息忌雖無為組亦何益為組與不為組不足以累公息忌之說用組之心不可不察又曰趙攻中山中山有多力者曰丘鳩衣鐵甲操杖擊無不碎衝無不陷以車投車以人投人說苑曰孔子之匡簡子殺陽虎孔子似之甲士以圍孔子之舍子路怒奮戟將下鬥孔子止之曰何仁義之不免俗也夫詩書之不習禮樂之不脩是吾之過也若非陽虎而以為陽虎則非丘之罪也夫由歌方和汝子路歌孔子和之三終而甲罷崔寔政論曰貪饕之吏競納財用狡猾之工復盜竊之至以麻枲被弓弩鐵焠醘中令脆易治鎧孔又褊小不足容入凡漢所以能制胡者徒襦鎧弩之利也今鎧則不堅弩則不勁永失所恃矣袍朴子曰屠犀為甲給乎專征之服裂翠為華集乎后妃之首雖出於幽谷遷于喬木然為二, SBCK: ''}
