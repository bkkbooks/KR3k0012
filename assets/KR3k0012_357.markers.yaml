  - {type: variant, offset: 2084, length: 1, content: 校, SBCK: 武衛姚鸞營于大路晉將沈林子簡其軍中精銳朱逺等銜枚夜襲鸞營鸞死之又前凉録曰張璩字元琰年十四拜奉車都}
  - {type: variant, offset: 2086, length: 2, content: 發騎, SBCK: 從梁肅征隴右與王擢遇於邢崗相拒十日璩銜枚宻擊大破之由是顯名又蜀録曰李特使弟驤屯軍毗橋以備羅尚尚遣將張興僞降於驤以觀虚實興夜歸白尚尚遣精勇萬人銜枚隨興夜襲驤營驤及將}
  - {type: variant, offset: 2089, length: 2, content: 四百, SBCK: 奔于流柵越絶書曰呉王闔閭問伍子胥軍法子胥曰王身將即疑舡旌麾兵㦸與王舡等者七艘將軍疑舡兵㦸與將軍舡等三舡皆居於大陣之左右有敵即出就陣吏卒皆銜枚敖歌擊皷者斬曹瞞傳曰公將襲􅀽紹軍乃選精銳歩􅀐皆銜枚􅅞馬口夜從問道出}
