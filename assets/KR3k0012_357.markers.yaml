  - {type: variant, offset: 420, length: 2, content: 山發, SBCK: 􅀂何管子對曰輕罪贖一楯一㦸潜夫論曰虜或持銅鏡以象兵或􅀒板案以􅀋楯遑遽擾攘未能相一誠易制也淮南子曰夫栝淇衛箘簬音路髙誘曰栝翦栝也淇衛箘簬箭所出也載以銀錫戴飾也飾翦以銀錫雖有薄縞之䄡腐荷之櫓荷蓮草也櫓大楯也然猶不能獨穿也􅀂假之䈥角之力弓弩之勢則貫兕甲}
  - {type: variant, offset: 420, length: 2, content: 山發, WYG: 若何管子對曰輕罪贖一楯一㦸潛夫論曰虜或持銅鏡以象兵或負板案以類楯遑遽擾攘未能相一誠易制也淮南子曰夫括淇衛菌蕗音路髙誘曰栝剪括也淇衛菌蕗箭所出也載以銀錫載飾也飾翦以銀錫雖有薄縞之䄡腐荷之櫓荷蓮草也櫓大楯也然猶不能獨穿也若假之筋角之力弓弩之勢則貫兕甲}
