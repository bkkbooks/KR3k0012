  - {type: variant, offset: 58, length: 0, content: '', SBCK: 脩整戰具鈎鑲刀楯大㦸長弓弩勁兵轉送承接余來亟戰失利遂見梟獲孝順帝喜其功賜以劒珮後漢書曰􅀽紹爲髙櫓起土山射曹操營中皆蒙楯而行東觀漢記曰逢萌字子康北海人少有大節家貧給事爲縣亭長尉過迎拜問事尉去舉楯擿地歎曰大丈夫安能爲人後耶遂去學問魏志曰建安五年太祖軍}
  - {type: variant, offset: 58, length: 0, content: '', WYG: 脩整戰具鈎鑲刀楯大㦸長矛弓弩勁兵轉送承接余來亟戰失利遂見梟獲孝順帝喜其功賜以劒珮後漢書曰袁紹為髙㯭起土山射曹操營中皆蒙楯而行東觀漢記曰逢萌字子康北海人少有大節家貧給事為縣亭長尉過迎拜問事尉去舉楯撾地歎曰大丈夫安能為人後耶遂去學問魏志曰建安五年太祖軍}
  - {type: page-break, offset: 58, content: '', id: KR3k0012_WYG_357-3a, image: WYG0896/WYG0896-0189a.png}
  - {type: variant, offset: 58, length: 0, content: '', krp: 脩整戰具鈎鑲刀楯大㦸長弓弩勁兵轉送承接余來亟戰失利遂見梟獲孝順帝喜其功賜以劒珮後漢書曰袁紹爲髙櫓起土山射曹操營中皆蒙楯而行東觀漢記曰逢萌字子康北海人少有大節家貧給事爲縣亭長尉過迎拜問事尉去舉楯擿地歎曰大丈夫安能爲人後耶遂去學問魏志曰建安五年太祖軍}
  - {type: variant, offset: 59, length: 4, content: 私室具酒, SBCK: 官渡􅀽紹進保武陽稍前依沙塠爲屯合戰不利紹射營中雨下行者皆蒙楯衆大懼又曰太祖與吕布戰太祖募䧟陣典韋先將應募者數十人皆衣兩鎧棄楯但持長矛撩㦸魚豢魏略曰鮑出字文才京兆新豐人也逰俠興平中三輔亂出母爲賊所略出攘臂結袵獨持楯追之行數里及賊殺十餘人賊乃解還出母韋昭呉書曰魯肅欲渡江衆􅀐追肅肅植楯引弓射之矢貫洞􅀐度不制乃相率還呉録曰交阯朱鳶縣有㯽榔正直髙六七丈葉大如盾王隱􅀳書曰朱伺字仲文小爲牙門將内渉江夏便鞍馬弓弩刀楯射獵于寳􅀳記曰呉軍師張悌帥衆三萬濟江與討吴護軍張翰楊州刺史周凌成陣相對沈瑩領丹陽銳卒刀楯五千號青巾兵屢䧟堅陣沈休文宋書曰宗越南陽葉人也爲隊主蠻有爲冦盗者常使越討伐徃輙有功家貧無以市馬刀楯歩出單身挺戰衆莫能當每一捷郡將輙賞錢五千因此得買馬宋略曰寧朔將軍益州刺史劉豪少工刀楯勇冠三軍及在漢中忽脩長生之術使道士合金丹餌之咽}
  - {type: page-break, offset: 59, content: '', id: KR3k0012_SBCK_357-2b}
  - {type: variant, offset: 59, length: 4, content: 私室具酒, WYG: 官渡袁紹進保武陽稍前依沙塠為屯合戰不利紹射營中雨下行者皆􅂪楯衆以大懼又曰太祖與吕布戰太祖募䧟陣典韋先將應募者數十人皆衣兩鎧棄楯但持長矛撩㦸魚豢魏畧曰鮑出字文才京兆新豐人也遊俠興平中三輔亂出毋為賊所畧出攘臂結袵獨持楯追之行數里及賊殺數十餘人賊乃解還毋韋昭吳書曰魯肅欲渡洱衆騎追肅肅植楯引弓射之矢貫洞騎度不制乃相率還吳録曰交趾朱鳶縣有㯽榔正直髙六七丈葉大如楯王隠晉書曰朱伺字仲文小為才門將陶丹給使吳平内涉江夏便鞍馬弓弩刀楯射獵于寶晉記曰吳軍師張悌帥衆一二萬濟江與討吳護軍張翰揚州刺史周陵成陣相對沈瑩領丹陽銳卒刀楯五千號青巾兵屢䧟堅陣沈休文宋書曰宗越南陽葉人也為隊主蠻有為冦盗者常使越討伐徃輙有功家貧無以市馬刀楯步出单身挺戰衆莫能當每一㨗郡將就賞錢五千因此得買馬宋略曰寧朔將軍益州刺史劉豪少工刀楯勇冠三軍及在漢中忽修長生之術使道士合金丹餌之咽}
