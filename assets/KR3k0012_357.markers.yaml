  - {type: variant, offset: 2487, length: 3, content: 思道迎, WYG: 計獻謂諸將曰今據孤城百姓無主吳人因釁公敢西過宜一决戰以示衆心遂衘枚夜出}
  - {type: variant, offset: 2487, length: 3, content: 思道迎, krp: 計獻謂諸將曰今處孤城百姓無主呉人因釁公敢西過冝一决戰以示衆心遂銜枚夜岀}
  - {type: variant, offset: 2491, length: 348, content: 之殺傷甚眾會紹髻解兜鍪墜地退走見禽車頻秦書曰符登堅族曾孫堅死登自立皆刻兜鍪作死休字示士以必死為度故戰所向無前崔鴻前秦錄曰符堅末慕容冲率眾登城堅身貫甲冑飛矢滿身後周書曰突屈之先臣於茹茹居金山之陽為茹茹鐵工金山形似兜鍪其俗謂兜鍪為突厥因以為號春秋繁露服制象曰夫執介冑而後能距敵者固非人之所貴也孝經威嬉拒曰欲去惡鬼五刑具五人皆持大斧著鐵兜鍪將之常使去四五十步不可令近人也戰國策曰蘇秦說韓王曰韓之劍當敵則斬甲楯鞮鍪國語曰靡笄之役郄獻子傷曰余病矣張御曰受命於廟受脤於社甲冑而效死戎之政也又晉語曰郄至甲冑而見客免冑而聽命樂資春秋後傳曰吳越令魏武侯厲眾五年秦人興師而臨西河魏士聞之介冑不待令而奮擊殺秦人者萬數英雄記曰袁紹為公孫瓚所圍別駕田豐扶紹入空垣紹脫兜鍪抵地云丈夫當前鬥死而返逃入牆間豈可得活一云入匿牆間廬, WYG: 破憲盧}
