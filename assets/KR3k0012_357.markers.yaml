  - {type: variant, offset: 423, length: 0, content: '', SBCK: 經革楯矣經猶逹也楊泉物理論曰古有阮師之刀􅂫家之楯皆爲良工利噐時所寳貴也夫刀者身之寳也楯者身之衛也禦難之藩牆守之城池也夢書曰夢}
