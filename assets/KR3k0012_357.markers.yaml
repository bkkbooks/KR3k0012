  - {type: variant, offset: 2042, length: 3, content: 河南愽, SBCK: 于城下又曰王浚都督幽州諸軍事成都王使和演發兵殺浚單于以演謀告浚州府逼近銜枚宻嚴夜與單于圍演演持白幡請降孫嚴宋書曰栁元景揔軍北討元景至弘農營於開方口衆軍並造陜下元景遣軍副柳元怙簡歩􅀐二千一􅀫而至遂合戰元怙悉偃旗皷}
  - {type: page-break, offset: 2042, content: '', id: KR3k0012_SBCK_357-7a}
  - {type: variant, offset: 2042, length: 61, content: 河南愽士范升上䟽曰遵為將軍雖在軍旅心存王室不忘俎豆可謂守死善道者也乃贈將軍給侯印綬遣校尉發騎士四百人被玄甲兜鍪兵車軍陣送葬, WYG: 於城下}
