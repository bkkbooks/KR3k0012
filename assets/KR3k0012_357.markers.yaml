  - {type: variant, offset: 1650, length: 320, content: 軫曰匹夫逞志於君而無討敢不自討乎免冑入狄師死焉狄人歸其元面如生又曰晉楚戰於鄢陵郄至見楚子必下免冑而趨風疾如風也楚子使工尹襄問之以弓問遺也郄至見客免冑承命曰君之外臣從寡君之戎事以君之靈間蒙甲冑間尤近也不敢拜命介者不拜三肅使者而退又曰楚白公亂葉公亦至及北門或遇之曰君胡不冑國人望君如望慈父母焉盜賊之矢若傷君是絕民望也若之何不冑乃冑而進又遇人曰君胡冑國人望君如望歲焉冐日以冀若見君面是得艾也艾安也而又掩面以絕民望不亦甚乎乃免冑而進言葉公得民心也穀梁傳曰古者被甲嬰冑非以興國也則以征無道豈曰以報其恥哉漢書曰王莽傳云元始五年策王莽加九命之錫於是稽首拜受甲冑一具後漢書曰劉虞積忿公孫瓚不已自率兵十萬攻瓚將出從事代郡程緒免冑而前曰公孫瓚雖有過惡而罪名未正, SBCK: 渡渡輙營陣㑹}
