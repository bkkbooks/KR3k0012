  - {type: variant, offset: 3629, length: 267, content: 者曰吳魁本出於吳為魁師者所持也隆者曰滇盾本出於蜀蜀滇所持也或曰羗盾言出於羗也約脅而鄒者曰陷虜言可陷破虜敵今謂之曰露是也狹而長者曰步盾步兵所持與刀相配者也狹而短者曰夾子盾車上所持者也子小稱也以縫音逢編板者謂之木絡盾以犀皮作之曰犀盾以木作之曰木盾皆因所用為名也許慎說文曰楯音伐也所以杆音汗身蔽目象形聲也櫓大楯也櫓音魯揚雄方言曰楯自關而東或謂之瞂或謂之干干者扞也關西謂之楯張揖埤蒼曰戟盾也廣雅曰果科于𢲸戟盾也龍魚河圖曰楯名自障禮記曰仲夏之月命樂師脩鞀音桃鞞鼓均琴瑟管簫執干戚戈羽又曰春夏學干戈秋冬學羽籥皆於東序又曰季夏以禘禮祀周公於太廟朱干, SBCK: 御覽卷第}
