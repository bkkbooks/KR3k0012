  - {type: variant, offset: 54, length: 3, content: 光伏甲, SBCK: 節地皇六年爲府丞虞卿書佐時太守缺丞視事毗陵有賊丞討之未到縣道路逢賊吏卒迸散政操刀楯與賊相擊丞得免難政遂死於路又曰江漢字山甫遷丹陽太守是時太江劇賊余來等刼擊牛渚丹陽邊水諸縣居民歐略良善經歳爲害漢到郡㑹集勁}
