  - {type: variant, offset: 12, length: 4, content: 勾踐使大, SBCK: 帝俈戴干是謂清明發節移度蓋象招摇宋均曰干楯也招揺爲天戈戈楯相副戴之者象見天中以爲表者也史記曰項羽在戯下欲攻沛公沛公從百餘􅀐因項伯面見羽謝無有閉􅀜事羽旣饗軍士中酒亞父謀欲殺沛公令項莊拔劒舞坐中欲擊沛公樊噲在營外聞事急乃持劒楯入營衛士止噲噲直橦音撞入立帳下羽目之問爲誰良曰沛公叅乗樊噲羽曰壯士賜之巵酒􅇾肩噲旣飲酒拔劒切而㗖之羽曰能復飲乎曰臣死且不辭豈特巵酒乎漢書曰周亞}
