  - {type: variant, offset: 2958, length: 155, content: 是有虎皮冑焉蜀隊戴貝冑被犀角此古制也詩云貝冑朱綅謂以貝齒飾冑朱縷綴之也冑插以翟尾垂以紅絮朱綅之象也晉令曰軍列營步騎士以下皆著兜鍪郭義恭廣志曰獠音老在䍧柯興古鬱林交阯蒼梧皆以朱漆皮為兜鍪家語曰孔子對魯哀公曰介冑執戈者無退懦之氣非體純猛服使之然孔叢子曰陳王曰將居軍之禮勝敗之變如之何太師曰介冑在身執銳在列雖君父不拜, krp: 而尅賊}
