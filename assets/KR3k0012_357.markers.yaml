  - {type: variant, offset: 358, length: 0, content: '', SBCK: 苦求可得也敬叔寤問縣後果有何家因求買楯何氏云實有此楯甚愛惜之明府何以得知敬叔具􅀃所夢何氏驚奉以製先山海經曰羿與鑿齒戰于壽華之野羿射殺之羿持弓矢鑿齒持㦸盾郭璞曰鑿齒人類齒如鑿長五六尺又曰開明北有鳯鳥鸞鳥背戴􅚛􅚛音伐盾也張華􅀶物志曰朝廷都許時上先人刀劒楯物及銅犬盆殿上四角鼎皆先侯所賜得也劉義慶丗􅀃曰魏武征􅀽夲􅀄治裝餘有數}
