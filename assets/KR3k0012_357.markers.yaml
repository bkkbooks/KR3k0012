  - {type: variant, offset: 2482, length: 4, content: 陳伯紹討, krp: 卜天生推車塞壍率敢死數百人銜枚先登習鑿齒漢晉陽秋曰𥘉魏軍始入蜀劉禪分二千人付羅獻留守呉聞蜀敗遂起兵遣盛憲謝詢等水陸並到說獻以合從}
