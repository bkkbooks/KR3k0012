  - {type: variant, offset: 2833, length: 637, content: 云入匿牆間廬綝晉四王起事曰建武元年天子還洛陽右將軍張方啟曰陛下自鄴來還宜謁宗廟天子出因便刦居鄴切啟移都其夜方悉引兵從西明廣陽諸城門入自領五千騎皆捉鐵纏矟擊兜鍪燋茸皆用涼州白鶡毛望之若荼周遷輿服雜事曰刺校者挍人之執刺兵者也首戴虎皮冑傳曰蒙皋貔以犯陳蔡因是有虎皮冑焉蜀隊戴貝冑被犀角此古制也詩云貝冑朱綅謂以貝齒飾冑朱縷綴之也冑插以翟尾垂以紅絮朱綅之象也晉令曰軍列營步騎士以下皆著兜鍪郭義恭廣志曰獠音老在䍧柯興古鬱林交阯蒼梧皆以朱漆皮為兜鍪家語曰孔子對魯哀公曰介冑執戈者無退懦之氣非體純猛服使之然孔叢子曰陳王曰將居軍之禮勝敗之變如之何太師曰介冑在身執銳在列雖君父不拜又曰子高曰夫儒者居德行道則袞冕之服統師旅則有介冑之服韓子曰天下無道攻戰不已甲冑生蟣虱燕雀處帷幄虞喜志林曰宋祭酒云可以扞禦者為械謂鎧甲兜鍪也抱朴子曰夫德教者黼黻祭服也刑罰者扞刃之甲冑也若以德教治狡暴猶以黼黻禦剡音琰鋒也以刑罰施平世是以甲冑升廟堂也又曰忍痛苦之藥石者所以除伐命之疾嬰甲冑之重冷者所以扞鋒鏑之集又曰盤旋揖讓非禦寇之容摜甲纓冑非廟堂之飾曹植表曰兩當鎧二十領兜鍪自副鎧百領兜鍪自副陶侃荅溫嶠書曰奉所送帳下得蘇峻兜牟兜牟作之巧劼用功殊多戰器不事須此也意謂不如三甲者逆賊身所服此是凶器古人惡其名得此兜牟者猶以有功今賞其細葛一端魏武帝上事曰臣前上言逆賊袁尚還即厲精銳討之今尚人徒震蕩部曲喪守引兵遁亡臣陳軍被堅執銳朱旗震耀虎士雷譟望旗眩精聞聲喪氣投戈解甲翕然沮壞尚單騎迸走捐棄偽節鉞鈇大將軍邟鄉侯印各一枚兜鍪萬九千六, SBCK: ''}
