  - {type: variant, offset: 2950, length: 3, content: 蒙皋貔, WYG: 操為洛陽北部尉繕治四門造五色棒懸門左右各數十條有犯禁者不避豪強輙棒殺之虞翻江表傳曰孫皓}
  - {type: variant, offset: 2950, length: 3, content: 蒙皋貔, krp: 操爲洛陽北部尉繕治四門造五色棒懸門左右各數十枚有犯禁者不避豪強輙棒殺之虞浦江表傳曰孫皓}
  - {type: variant, offset: 2954, length: 4, content: 犯陳蔡因, WYG: 張布女為美人皓先殺布後問美人曰爾父何在答曰賊已殺之皓大怒即棒殺美人沈約宋書曰後廢帝昱或有忤意者輙加以虐刑有白棓數十枚各有名號鍼鑿錐鋸之徒不離左右嘗以鐡錐錐人隂破六韜曰方胥鐡棓重十二斤柄長五尺千二百枚一名天棒許慎注曰大杖以桃為之擊殺羿}
  - {type: page-break, offset: 2954, content: '', id: KR3k0012_WYG_357-14a, image: WYG0896/WYG0896-0194c.png}
  - {type: variant, offset: 2954, length: 3, content: 犯陳蔡, krp: 張布女爲羙人皓先報布後問羙人曰尓父何在荅曰賊巳殺之皓大怒即棒殺美人沈約宋書曰後廢帝昱或有忤意者輙加以虐刑有白棒數十枚各有名號鍼鑿錐鋸之徒不離左右甞以鐵錐椎人隂破六韜曰方胥鐵棓重十二斤柄長五尺千二百枚一名天棓許慎注曰大杖以桃爲之擊殺羿是以鬼畏挑人也枹朴子呉遣賀將軍討山賊中有善禁者每交戰官軍刀劒皆不得拔將軍乃多作勁木白棓擊之禁不復行}
