  - {type: variant, offset: 2037, length: 4, content: 祭遵薨喪, SBCK: 呉漢伐蜀分營於水南水北北營戰不利乃銜枚引兵徃合水南營大破公孫述梁祚國統曰孫權甞賜甘寧酒米寧以米賜帳下乃以銀椀酌酒自飲次與其郡督次酌其次命銜杖出斫敵王隱晉書曰母丘儉文欽反遣鄧艾進屯樂嘉欽果夜銜枚襲艾等昧爽}
  - {type: variant, offset: 2037, length: 4, content: 祭遵薨喪, WYG: 吳漢伐蜀分營於水南水北北營戰不利乃銜枚引兵往合水南營大破公孫述梁祚國統曰孫權嘗賜甘寧酒米寧以米賜帳下乃以銀碗酌酒自飲次與其郡督次酌其次命銜枚出斫敵王隠晉書曰毋丘儉文欽反遣鄧艾進屯樂嘉欽果夜銜枚襲艾等昩爽}
