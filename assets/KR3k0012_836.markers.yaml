  - {type: variant, offset: 3087, length: 179, content: 奸詐以狀上憲追奴騶帳下吏李文迎錢阜以詔書末報距不與文積二十餘日詔書報給文以錢市馬獻帝春秋曰靈帝作錢猶五銖而有四道連於邊輪識者以為妖竊言錢有四道京師將破壞此錢四出散於四方於還如其言范曄後漢書云四出錢應劭漢官曰王莽篡位以劉字金刀罷五銖更作小錢文曰貨泉其文反白水真人此則世祖中興之瑞也魏書曰劉虞在幽州清淨儉約以禮義化民靈帝時南宮災吏遷補州郡者皆責助治宮錢或一千萬或, SBCK: 冨豪家訾}
