  - {type: variant, offset: 4222, length: 673, content: 一白母曰一家由來豐儉必共今日宅直不宜受也母悅而從焉軌之深有愧色謂其子談曰我年六十行事不及十歲小兒又曰劉凝之隱居荊州年饑衡陽王義季慮凝之餒斃餉錢十萬凝之大喜將錢至市門觀有飢色者悉分與之俄頃而盡又曰山陰人孔祐至行通神隱於四明山嘗見山谷中有數百斛錢視之如瓦石不異又曰戴法興父碩子法與二兄延壽延興並脩立延壽善書延興好學山陰有陳戴者家富有錢三千萬鄉人或云戴碩子兒敵陳戴三千萬錢齊書曰曹武為右衛將軍晚節在雍州致見錢七千萬皆厚輪大郭又曰丘冠先使于蠕蠕執節不拜為所殺武帝以冠先不辱命賜其子雄錢一萬布三十疋雄不受又曰范述曾任永嘉太守勵志清白不受饋遺明帝下詔襃美徵為游擊將軍郡故舊送錢二十餘萬一無所受又曰趙僧巖栖遲山谷常以一壺自隨一旦謂弟子曰吾今夕當死壺中大錢一千以通九泉之路蠟燭一梃以照七尺之尸至夜而亡梁書曰顧協為舍人常有門生始來事協知其廉潔不敢厚餉止送錢二千協發怒杖二十因此事者絕於饋遺又曰庾丹父景休位御史中丞丹少有才儁與伏挺何子明俱為周捨所狎初景休罷巴東郡頗有資產丹負錢數百萬責者填門景休怒不為之償既而朝賢之丹不之景休景休悅乃悉為還之梁書曰宋季雅罷南康郡市宅居呂僧珍宅側僧珍問宅價曰千一百萬怪其貴季雅曰一百萬買宅千萬買鄰及僧珍生子季雅往賀署函曰錢一千閽人少之不為通強之乃進僧珍疑其故親自發乃金錢又曰江祿為武寧郡頗有資產積錢於壁壁為之倒迮銅物皆鳴人戲之曰所謂銅山西傾洛鍾東應者也又曰何遠為武昌太守武昌俗皆汲江水盛夏遠患水溫每以錢買人井寒水不受錢者則摙水還之其他事率多如此南史曰蕭惠明子聄素梁天監中位丹陽尹丞初拜日武帝賜錢八萬聄素一朝散之親友又曰謝譓為東陽內史及還, SBCK: ''}
