  - {type: variant, offset: 3302, length: 393, content: 使出錢也又曰劉類為弘農太守使人掘地求錢所在市里皆有孔穴又曰文帝夢磨錢文欲令滅而更明周宣占之曰陛下家事時帝欲治第植逼太后加貶守吳書曰嘉禾五年春鑄大錢一當五百詔使吏民輸銅討銅卑直設盜鑄之科蜀志曰先主攻劉璋與士眾約若事定府庫百物孤無豫焉及援成都士眾捨干戈赴庫藏競取寶物軍用不足備甚憂之劉巴曰易耳但當鑄直百錢平諸物價令吏為官市備從之數月之間府庫充實晉陽秋曰朝士以牛酒勞齊王冏平原王幹獨齎百錢晉書曰阮宣子常杖頭挂百錢造市店酣飲而歸又曰王衍疾其妻郭氏之貪鄙故口末嘗言錢郭氏欲試之令婢以錢繞床使不得行衍晨起見錢謂婢曰舉阿堵物卻其措意如此又曰王導子悅少侍講東宮歷吳王友中書侍郎導夢人以百萬錢買悅意甚惡之後掘地得錢二皆藏閉而悅果以疾終又曰張軌為涼州參軍索輔言於軌曰古以金貝皮幣為貨息穀帛量度之耗二漢制五銖錢通易不滯太始中河西荒廢遂不用錢裂疋以為叚數縑布既壞市易又難徒壞女工不任衣用弊之甚也今中州雖亂此方安, SBCK: ''}
