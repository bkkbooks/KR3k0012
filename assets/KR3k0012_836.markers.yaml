  - {type: variant, offset: 320, length: 225, content: 民患幣輕而物貴則作重幣以行其輕也於是乎有母權子而行民皆得焉重曰母輕曰子以子貨物物輕則子獨行物重則以母權而行之也子母相通民皆得其欲也若不堪重則多作輕而行之亦不廢重於是乎有子權母而行小大利之堪任也不任者幣重物輕則妨其用也故雜而用之子權母者母不足則以子平而行之故民皆以為利今王廢輕而作重民失其資能無匱乎廢輕而作重則大竭而未寡故民失其資若匱王用將有所乏民財匱無以供上故王用將乏乏則將厚取於民民不給將有遠志是離民也給供也遠志通逃也若民離而財匱災至而備亡王其若之, SBCK: 彼復}
