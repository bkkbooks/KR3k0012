  - {type: variant, offset: 1435, length: 0, content: '', SBCK: 則元象􅀄除洛州刺史則性貪惏在州取受非舊京諸像毀以鑄錢于時丗號河陽錢皆岀其家後周書田大象元年􅀄鑄永通萬國錢以一當千與五行大布並行北史曰隋鄭譯自隆州徴還帝令内史李德林立作詔書復爵國公位上柱國髙頴戯謂曰筆乾荅曰岀爲方岳杖䇿言歸不得一錢何以潤筆上大􅀏唐書曰武德中置錢􅁥於洛并益等諸州今上齊王元􅁻賜三鑪鑄錢右僕射裴寂一鑪敢有盗鑄者身死家口配没又曰髙宗時詔復開元通寳錢其乾封所鑄錢令所司貯納􅀄開元錢之文給事中歐陽詢制詞及書時稱其工其字合八分及􅂐􅀠三體其詞先上後下次左後右讀之及上反左廻環其義皆通議者以乾封不通啇賈米帛翔踴以開元錢輕重大小近古㝡爲折衷百姓便之又曰乾元中李輔國奏内飛龍厩鑄銅投乾元新錢二文於鑪中而祈曰如聖躬萬福國祚無疆兇孽殄除四方寧謐則願不銷不鑠一隂一陽並見於外鍾成一如所祈又曰崔衍居宣州十年頗以勤儉府庫盈溢及穆賛代衍宣州􅀊饉賛遂以錢四十二萬貫代百姓之稅故宣州人不流散又曰元和中王鍔奏請於當管蔚州界加置鑪鑄銅錢漸廢􅃬錢詔河東道自用􅃬錢以來百姓不堪其弊其蔚州鼓鑄漸致銅錢則公私之間皆得充用冝委所司子細計料量借錢夲積漸加至五鑪又曰李希烈旣平淮西節度使陳仙竒進錢一文大小如開通之狀文曰天下太平云於希烈庭中得之命宰臣召百寮遍視之後唐書曰朱守殷奏於積善坊役所得古文錢四百五十六丈曰得一元寳四百四十文順天元寳守殷進納勑凡窺竒異盡繫休明所獲錢文式昭􅀇貺得一者佇歸於一統順天者式契於天心道煥一時事光千載殊休繼出信史必書冝付史館又曰劉仁恭在幽州以墐士爲錢令部人行使聚銅錢於山上鑿穴藏之爲無窮之計晉書曰右驍衛大將軍張籛始在雍州因春景舒和出遊近郊憇於大塚之上忽有黄雀衘一銅錢置之而去未幾復於衙院晝卧見二燕相闘畢各衘一錢落於錢首後所􅀗三錢甞秘於巾箱識者以爲大冨之徴又曰天福三年勑先許鑄錢仍令毎一錢重二銖四􅁰十錢重一兩者切慮逐處闕銅難依先定銖兩冝令天下無問公私應有銅欲鑄錢者一任取便酌量輕重鑄造因兹不得入􅃬并錢及令缺漏不堪乆逺行用仍委塩鐡司明行暁示誡約管子曰桓公請棧䑓之錢散諸城陽鹿䑓之布散諸濟隂啇子曰今臣之所言民無一日之繇官無數錢之費其弱晉而強􅁗有過三戰之勝韓子曰或令孺子懷錢挈壷瓮徃酤而狗齕之酒所以酸吕氏春秋曰趙桑子見翳桑之下有卧餓人不能起趙宣子命食之拜受而不食問其故曰臣有母請持以遺之宣子更賜之脯二束錢一百賈􅁩書曰銅不布下不得採銅不得鑄錢則民反耕田矣鹽鐡論曰教與俗改弊與丗易夏后以貝周人以紫石後丗或金錢刀布極而衰終始之運也又曰古者市朝而無刀弊各以所有易所無抱布貿絲而已後丗則有􅀛貝金錢又曰夫鑠金在爐盗蹠不頋錢刀在路疋婦撥之諭衡曰人文章豈徒調墨弄筭爲英麗哉載人行傳人名楊子法言蜀冨貴人賫錢十萬願載一名子雲不聽夫冨人無仁義正如圈中之鹿欄中之牛安得妄載又曰手中無錢而欲徃市决貨貨主問錢何在曰無錢貨主必不與也胷中無學猶手中無錢也又曰淮陽鑄僞錢吏不能禁汲黯爲太守不壞一爐不刑一人髙枕安卧淮陽政清郭子璜洞􅁳記曰帝􅂛望月䑓有三青鴨化爲三小童皆着青綺文􅃭各握鯨文大錢五枚以置帝几前身止而影動因名曰輕影錢潜夫論曰諺曰痛不着身言忍之錢不出家言與之猶見朝廷有宼而言不足憂也風俗通曰潁川黃子廉毎飲馬輙投錢於水又曰河南平隂龐儉夲魏郡鄴人遭倉卒之丗失亡其父時儉三四歲在鏹母抱轉流客居廬中鑿井得錢千餘萬遂巨冨行求老蒼頭堂上作樂奴在厨中􅀼言堂上老母我婦也婢以告母呼問事實復爲夫婦時人爲之語曰廬里龐公鑿井得銅買奴得翁又曰錢刀俗􅀃害中有利旁有刀言人治生卒多得錢財者必有刀劒之禍也案漢書曰王莽造大錢作契刀錯刀錯銖錢凡四品並行故稱錢刀也列仙傳曰祝雞公洛陽人户郷北山下養雞百餘年雞皆有名字千餘頭暮棲樹晝四散欲取呼名即至賣雞及子得千萬輒置錢去䂊章烈士傳曰施陽字季儒爲舒令經江夏遇賊刼奪陽物賊去後車上有五千錢遣人追與賊聞知陽悉還其物陽以付亭長邴原別傳曰原字根短避地遼東甞行得遺錢拾以繫樹枝此錢旣不見取而繫錢者多原問其故荅者謂之神樹原惡由巳而成􅁋祀乃辯之由是里中遂歛其錢以爲社供桓範丗論曰靈帝置西園之邸賣爵號曰禮錢錢積如屋封塗􅃮書杜恕體論曰可以使􅀑者錢也可以使神者誠也語林曰杜預道王武子有馬癖和長輿有錢癖竹林七賢傳曰王戎女適裴氏乏用遣女爲貸錢數萬文而未還女歸戎色不恱女遽還錢乃懌于寳搜神記曰南方有蟲其形􅀂蟬而大其子著草葉如􅁞種得子以歸則母飛來就之殺其母以塗錢以其子塗貫用錢貨市旋則自還故淮南子術以之還名曰青鳬丗􅀃曰王武子私第近北邙山于時人多地貴濟好馬射買地作埒編錢布地竟埒時人號爲金埓又曰郗公大聚歛數千萬}
