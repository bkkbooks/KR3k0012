  - {type: variant, offset: 3791, length: 469, content: 萬錢與家以觀上意宿昔便得因此恚恨成疾不復見上宋書曰劉秀之為南秦州刺史加都督漢饑饉秀之躬自儉約先是漢川悉以絹為貨秀之限令用錢百姓利之又曰始興王濬嘗送錢三萬餉袁淑一宿復遣追取謂為使人謬誤欲以戲淑淑與濬書曰聞之前志七年之中一與一奪義士猶或非之況密邇旬次何其裒益之亟也竊恐二三諸侯何以觀之又曰廢帝即位鑄二銖錢形式轉細官錢每出人間即摸效之而大小厚薄皆不及也無郭不磨鑄如今之剪鑿者謂之耒子錢景和元年沈慶之啟通私鑄錢一千錢長不盈三寸大小稱此謂之鵝眼錢劣於此者謂之綖環錢貫之以縷入水不沉隨手破碎市井不復料數十萬錢盈一掬斗米一萬商貨不行明帝初唯禁鵝眼綖環其餘皆通用又曰張融解褐為新安王子鸞行參軍王母殷淑儀薨後四月八日建齋并權佛僚佐襯者多至一萬少者不減五千融獨注襯百錢帝不悅曰融貧當序以佳祿出為封溪令又曰郭世通嘗與人共於山陰市貨物誤得一千錢當時不覺分背方悞追還本主驚歎以半直與之世通委之而去又曰蔡廓罷豫章郡還起二宅先成東宅以與兄軌之廓亡後軌之罷長沙郡還送錢五十萬以裨宅直廓子興宗年十一白母曰一家由來豐儉必共今日宅直不宜受也母悅而從焉軌之深有愧色謂其子談曰我年, WYG: ''}
