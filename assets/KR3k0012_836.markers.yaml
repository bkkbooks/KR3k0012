  - {type: variant, offset: 1473, length: 578, content: 林後宮貴人從上林獸圈猛獸驚出馮貴人當之文帝嘉其義賜錢五萬掖庭見親加賜親屬其人勿眾謝重失人心賞賜節約是時外戚資千萬者少是故少府水衡錢多又曰王莽居攝欲防民盜鑄乃禁不得挾銅炭又曰罽賓國以銀為錢騎馬漫為人面楚漢春秋曰項梁陰養生士九十人參木者所與計謀者也木佯疾於室中鑄大錢以具甲兵後漢書曰明帝時館陶公主光武女為子求郎不許而賜錢千萬謂群臣曰郎官上應列宿出宰百里史記曰太微宮後二十五星郎位也有非其人則民受其殃是以難之又曰樊儵卒帝遣小黃門張音問所遺言先是河南縣亡失官錢典負者典謂主典負謂欠負坐死及罪徙者甚眾遂委責於人以償其耗鄉部吏司因此為奸儵常疾之欲奏罷之疾病未及得上音歸具以聞帝覽之而悲歎勑郡並從之又曰京兆尹閻興召第五倫為主簿時長安鑄錢多姦巧乃署倫為督鑄錢掾領長安市東觀漢記曰時長安市未有祑又鑄錢官輕姦所集無能整齊理之者興署倫督鑄錢掾領長安市其復小人爭頌皆云第五掾所平亦無姦枉又曰初馬援在隴西上書言宜如舊鑄五銖錢事三府三府奏以為未可事遂寢及援還從公府求得前奏難十餘條乃隨牒解釋東觀漢記曰十三難援一一解之條奏其狀也更具表言帝從之天下賴其便又曰公孫述廢銅錢用鐵官錢置鐵以鐵錢百姓貨幣不行蜀中童謠言黃牛白腹五銖當復好事者竊言王莽稱黃述自號白五銖錢漢貨也言天下當并還劉氏又曰江革建武末年與母歸鄉里每至歲時縣當案比安驗以比之猶今皃閱也革以母老不欲搖動自在轅中輓車不用牛馬由是鄉里稱, SBCK: 息患}
