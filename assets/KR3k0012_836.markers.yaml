  - {type: variant, offset: 1451, length: 2, content: 都內, WYG: 逺逰疑遂不還乃作辭詣闗令就老子求直闗令以辭呈老子老子語甲曰前與女約至安息國頓以黄金相還云何不能忍耐便興辭訟乎汝隨我已三百餘歳汝命早應死頼我太𤣥生符在汝身耳言畢見符従甲口中出甲已成一聚白骨矣尹喜為請老子以符投之甲立更生喜即以見錢百萬與甲遣之汝南先賢傳曰平與閻敞字張為郡五官掾太守第五嘗被徴以俸}
