  - {type: variant, offset: 1457, length: 2, content: 水衡, SBCK: 􅀉敞敞埋置堂上後甞舉家病死唯見􅀌孫九歳甞未死語云吾有錢三十萬􅀉椽閻敞孫長大來求敞見之悲喜取錢盡還之孫白祖唯言三十萬今乃百三十誠不敢當敞曰府君固謬言耳郎君無疑之列異傳曰西河鮮子冀建武中爲清河太守言岀錢六百萬屋未成而死趙髙代之計功用錢凡二百萬耳五官黃秉功曹劉啇言是冀所自取便表没冀田宅奴婢妻子送曰南俄而白曰冀􅀑見入府與啇秉等共計校定餘}
