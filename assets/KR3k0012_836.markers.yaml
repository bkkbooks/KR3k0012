  - {type: variant, offset: 2863, length: 6, content: 林馬適死援遣, SBCK: 縣名泉亭於是改爲錢塘百姓懷德立碑塘所至今猶在地境圗曰錢銅之氣望之如有青雲又曰望錢千萬以上如車十萬之精如一素木萬錢精盖地如甕江津上便冝曰夫錢之爲物無益飢寒之用而儲之家利其不朽古今行之蓋亦由此又便交冝易小市之冝誠勝寸裂尺斷破爲大小也過此以徃無所一用軍國唯榖與帛錢雖可積未急寳也殷仲堪集太}
