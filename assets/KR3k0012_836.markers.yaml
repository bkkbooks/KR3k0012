  - {type: variant, offset: 2243, length: 479, content: 為司徒及拜日天子臨軒百僚畢會帝顧謂親倖者曰悔不小靳可至千萬靳固惜之也程夫人於傍應曰崔公冀州名士豈買官賴我得是反不知姝邪姝美也言反不可斯事之美也姝或作株株根本也又曰董卓壞五銖錢更鑄小錢悉取洛陽及長安銅人鍾虞飛廉銅馬之屬以充鑄焉故貨錢物貴穀不數萬又錢無輪郭文章不便人用魏志曰卓鑄小錢大五分無文章肉好無輪郭不磨鑢也時人以為秦始皇見長人於臨洮乃鑄銅人卓臨洮人也而今毀之雖成毀不同凶暴相類焉又曰車駕西巡乃厚賜韋彪錢珍羞食物使歸平陵上家又曰鄭弘為陽羨令都鄉部民有弟用兄錢者為嫂所責叔未還嫂詣弘言之弘賣中單為叔還錢兄慚自繫婦即去又王符論曰夫竊位之人天奪其鑒寧見朽千萬而不忍賜人一錢續漢書曰劉寵字祖榮遷會稽太守正身率下郡中大治徵入為將作大匠山陰民去治數拾里有若郍水在山谷間五六老翁年七八十聞遷相率共送寵人齎百錢寵見勞來曰父老何乃自苦遠來皆對曰山父鄙老生未嘗到郡縣他時吏發求不已民間或夜行不絕狗吠竟夕人不得安自明府下車以來狗不吠夜吏希至人間年老遭值聖化聞當見棄去故戮力來送寵謝之為選受壹大錢故寵在會稽號為取一錢其清如是又曰扶風人事孫奮居富而慳恡梁冀因以馬乘遺之從賃錢二十萬奮以, SBCK: ''}
