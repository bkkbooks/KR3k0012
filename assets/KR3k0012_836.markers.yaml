  - {type: variant, offset: 2889, length: 6, content: 數日林遣子奉, SBCK: 前錢少者居後綦母氏論錢曰黄銅中方叩頭對曰僕自西方庚辛分土諸國處處皆有長沙越儁僕之所守黄金爲父白銀爲母鈆爲長男􅃬爲少婦伊我􅀄生周末時也景王尹丗大鑄兹也貪人見我如病得醫飢饗太牢未之喻也成公綏錢神論曰路中紛紛行人悠悠載馳載驅唯錢是求朱衣素帶當塗之士愛我家兄皆無能巳執我之手分終始不計優劣不論能否賔客輻湊門常如市諺曰錢無耳何可闇使豈虚也哉趙壹疾邪賦曰文籍雖滿腹不如一囊錢曹植樂府歌曰巢許蔑四海啇賈争一錢鄭氏婚禮謁讃文曰金錢爲質所歷長乆金取和明錢用不止貲財周禮地官下司􅀜曰司􅀜司貨賄之岀入後漢}
  - {type: page-break, offset: 2889, content: '', id: KR3k0012_SBCK_836-9a}
  - {type: variant, offset: 2889, length: 6, content: 數日林遣子奉, WYG: 前錢少者居後綦母氏論錢曰黄銅中方叩頭對曰僕自西方庚辛分土諸國處處皆有長沙越雋僕之所守黄金為父白銀為母鉛為長男錫為少婦伊我初生周末時也景王尹世大鑄兹也貪人見我如病得醫飢饗太牢未之喻也成公綏錢神論曰路中紛紛行人悠悠載馳載驅唯錢是求朱衣素帶當塗之士愛我家兄皆無能已執我之手説分終始不計優劣不論能否賔客輻凑門常如市諺言錢無耳何可闇使豈虛也哉趙歧疾邪賦曰文籍雖滿腹不如一嚢錢曹植樂府歌曰巢許蔑四海啇賈争一錢鄭氏婚禮謁讃文曰金錢為質所歴長久金取和明錢用不止貲財周禮地官屬司闗曰司闗司貨賄之出入後漢}
