  - {type: variant, offset: 2846, length: 5, content: 光祿勳杜林, SBCK: 義熈十二年有童子羣浴南陽淯水忽岸邊有錢出如流沙因競取之手滿放地㝷復行去乃以衫衣裏􅅞各有所得王韶之始興記曰勞口東岸有石四方髙百餘仭其狀如䑓父老相傳此石昔有三人伐木以作橋於石頂戲見數甕錢共取半甕還劉道眞錢塘記曰防海大塘郡議曹華信象家冨乃議立此塘以防海水信始開募有致土石一斛即}
