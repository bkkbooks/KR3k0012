  - {type: variant, offset: 1439, length: 4, content: 孝元皇帝, SBCK: 何至須阿堵物葛仙公別傳曰取十錢使人一一投井中公井上以器呼錢人見從井中一一飛岀入公器中投人刻識之所呼皆得是所投者􅀜令内傳曰􅀜令尹喜周大夫也善於天文登樓四望見東極有紫氣喜曰應有聖人經過果有老子過喜設坐行弟子之禮老子時貧徐甲曰雇錢一百與約須逹安息國以黄金頓備錢還甲旣見老子方欲逺遊疑遂不還乃作辭詣􅀜令就老子求直􅀜令以辭呈老子老子語甲曰前與汝約至安息國頓以黄金相還云何不能忍辱便興辭訟乎汝隨我巳三百餘歳汝命早應死頼我太􅀇生符在汝身耳言畢見符從甲口岀甲巳成一聚白骨矣尹喜爲請老子以符投之甲立更生喜即以見錢二百萬與甲遣之汝南先賢傳曰平輿閻敞字張爲郡五官椽太守第五甞􅀍徴以}
