  - {type: variant, offset: 1435, length: 0, content: '', WYG: 則元象初除洛州刺史則性貪惏在州取受舊京諸象毁以鑄錢行于世時號河陽錢皆出其家後周書曰大象元年初鑄永通萬國錢以一當千與五銖大布並行北史曰隋鄭譯自隆州徴還帝令内史李徳林立作詔書復爵國公位上柱國髙熲􅃧謂曰筆乾答曰出為方岳杖策言歸不得一錢何以潤筆上大笑唐書曰武徳中置錢監於洛并益等諸州今上齊王元吉賜三鑪鑄錢右僕射裴寂一鑪敢有盗鑄者身死家口配沒又曰髙宗時詔復開元通寳錢其乾封新鑄錢令所司貯納初開元錢之文給事中歐陽詢制詞及書時稱其工其字合八分及篆隸三體其詞先上後下次左後右讀之自上及左廻環其義皆通議者云乾封不通商賈米帛翔踴以開元錢輕重大小近古最為折𠂻百姓便之又曰乾元中李輔國奏内飛龍廐鑄鐘投乾元新錢二文扵罏中而祈曰如聖躬萬福國祚無彊兇孽殄除四方寧謐則願不銷不爍一隂一陽并見於外鐘成一如所祈又曰崔衍居宣州十年頗以勤儉府庫盈溢及穆賛代衍宣州歳饉賛遂以錢四十二萬貫代百姓之税故宣州人不流散又曰元和中王鍔奏請於當管蔚州界加置鑪鑄銅錢漸廢錫錢詔河東道自用錫錢以来百姓不堪其弊其蔚州鼔鑄漸致銅錢則公私之間皆得充用宜委所司仔細計料量借錢本積漸加至五鑪又曰李希烈既平淮西節度使陳仙竒進錢一文大小如開通之狀文曰天下太平云於希烈庭中得之命宰臣召百寮遍示之後唐書曰朱守殷奏於積善坊役所得古文錢四百五十六文曰得一元寳四百四十文順天元寳一十六文守殷進納𠡠曰凡窺竒異盡繫休明所獲錢文式昭𤣥貺得一者佇歸於一統順天者式契於天心道煥一時事光千載殊休繼出信史必書宜付史舘又曰劉仁恭在幽州以墐土為錢令部人行使聚銅錢於山上鑿穴蔵之為無窮之計晉書曰右驍衛大將軍張籛始在雍州因春景舒和出遊近郊憇於大冡之上忽有黄雀啣一銅錢置之而去未㡬復於衙院晝卧見二雀相闘畢各啣一錢落於籛首後所獲三錢嘗秘於巾箱識者以為大富之徴又曰天福三年𠡠先許鑄錢仍令每一錢重二銖四黍十錢重一兩者切慮逐處闕銅難依先定銖兩宜令天下無問公私應有銅欲鑄錢者一任取便酌量輕重鑄造因兹不得入錫并鉄及令缺漏不堪久逺行用仍委鹽鐡司明行曉示誡約管子曰桓公請棧臺之錢散諸城陽鹿臺之布散諸濟隂商子曰今臣之所言民無一日之繇官無數錢之費其弱晋而强秦有過三戰之勝韓子曰或令孺子懷錢挈一甕往酤而狗齕之酒所以酸吕氏春秋曰趙宣子見翳桑之下有卧餓人不能起趙宣子命食之拜受而不食問其故曰臣有母請持以遺之宣子更賜之脯二束錢二百賈誼書曰銅刀布下不得採銅不得鑄錢則民反耕田矣鹽鐡論曰教與俗改弊與世易夏后以貝周人以紫石後世或金錢刀布極而衰終始之道也又曰古者市朝而無刀幣各以所有易所無抱布貿絲而已後世則有龜貝金錢又曰夫鑠金在鑪盗者不顧錢刀在路匹婦撥之論衡曰夫文章豈徒調弄筆為英麗哉載人𫝊行人名掦子法言曰蜀富賈人賫錢十萬願載一名子雲不聽夫富人無仁義正如圏中之鹿欄中之牛安得妄載又曰手中無錢而欲往市决貨貨主問錢何在曰無錢貨主必不與也胷中無學猶手中無錢也又曰淮陽鑄偽錢吏不能禁汲黯為太守不壞一鑪不刑一人髙枕卧淮陽政清郭子横洞㝠記曰帝升望月臺有三青鴨化為三小童皆着青絹文襦各握鯨文大錢五枚以置帝几前身止而影動因名曰輕影錢潛夫論曰諺曰牙不着身言忍之錢不出家言與之猶見朝廷而言不足憂也風俗通曰潁川黄子産每渡輒投錢於水又曰河南平隂龎儉奉魏郡鄴人遭倉卒之世失亡其父時儉三四歳在襁褓母抱流轉客居廬中鑿井得錢千餘萬遂巨富又曰錢刀俗説害中有利利旁有刀言人治下率多得錢財者必有刀劔之禍也漢書曰王莽造大錢作契刀錯刀五銖錢凡四品並行故稱錢刀也列仙傳曰祝雞翁洛人居尸鄉北山下養雞百餘年雞皆有名字千餘頭暮棲樹晝四散欲取呼名即至賣雞及子得千萬輙置錢豫章烈士傳曰施陽字季儒為舒令經江夏遇賊刼奪陽物賊去後車上有五千錢遣人追與賊聞知悉還其物陽以付亭長邴原别傳曰原字根矩避地遼東嘗行得遺錢拾以繫樹枝此錢既不見取而繫錢者多原問其故答曰謂之神樹原惡由己而成滛祀乃辯之由是里中遂歛其錢以為社也桓範世論曰靈帝置西園之邸賣爵號曰禮錢錢積如屋封塗漆書杜恕體論曰可以使鬼者錢也可以使神者誠也語林曰杜預稱王武子有馬癖和長興有錢癖竹林七賢傳曰王戎女適裴氏乏用遣女為貸錢數萬文而未還女歸戎色不悦女遽還錢乃懌干寳捜神記曰南方有蟲其形若蟬而大其子著草葉如蚕種得子以歸則母飛来就之殺其母以塗錢以其子塗貫用錢貨市旋則自還故淮南子術以之還錢名曰青鳬世説曰王武子私第近北邙山于時人多地貴濟好馬射買地作埒編錢布地竟埒時人號為金埒又曰郗公好聚歛數千子}
