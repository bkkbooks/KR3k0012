  - {type: variant, offset: 1439, length: 6, content: 孝元皇帝奉承, WYG: 何至須阿堵物葛仙翁别傳曰取十錢使人一一投井中公井上以器呼錢人見従井中一一飛出入公器中投人刻識之所呼皆得是所投者闗令内傳曰闗令尹喜周}
