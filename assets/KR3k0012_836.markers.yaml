  - {type: variant, offset: 546, length: 279, content: 病亡無救災之備也王其圖之王弗聽卒鑄大錢歸藏曰有人將來遺我錢財曰夜望之周書曰武王剋商發鹿臺之錢散鉅橋之粟韓詩曰既詐我德賈用不售一錢之物舉賣百何時當售乎史記曰初蘇秦之燕貸百錢為資及得資以百金償之又曰高祖以愛繇咸陽吏皆送奉錢三李奇注或三百或五百蕭何獨以五後益封二千戶又曰單父人呂公善沛令避仇從之沛中豪傑吏聞令有客皆往賀蕭何為主吏主進令諸大夫曰不滿千錢坐堂下高祖為亭長素易諸吏乃紿為謁曰賀錢萬實不持一錢又曰上使善相者相鄧通曰當貧餓死文帝曰能富通者在我何謂貧於是賜通蜀嚴道銅山自鑄錢鄧氏錢布天下又曰安息在大月氏西以銀為錢錢如其王面王死轉更錢效王面焉又曰今上即位武帝數歲, SBCK: 罪昔}
