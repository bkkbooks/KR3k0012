  - {type: variant, offset: 2841, length: 3, content: 東觀漢, SBCK: 遂擅名於江表三輔黃圗曰金寳一銀寳二􅀛寳三貝寳四布寳五泉寳六凡寳貨六種丗八品煩碎難行乃羅本貨五百枚爲重十二斤百姓安之闞駰十三州志曰青州平原國和帝延平九年以封子懷王勝風俗與舊齊同然吏姧倍於他民給衛士吏賦狐􅁏稍從假錢積至萬餘􅀊竟交代吏無償意衛士恨恚取狐􅁏沃以酒從而呪之曰狐􅁏狐􅁏尾斯尾斯身軀雖小錢多吏聞之恐乃償之錢盛弘之荆州}
