  - {type: variant, offset: 2668, length: 0, content: '', SBCK: 宋良字元友爲清河太守甚有善政天保􅀄大赦清河獄内蓬蒿但滿無囚可赦唯率將吏拜詔而已又曰後主將大赦時臨漳令李丗業爲臺所劾􅂍多至死丗業即穆提婆對門陸令萱言於齊主所以大赦後由是頻赦遂以爲常平恩縣功曹賀肫小人姦貪數犯刑憲但入狴牢無不遇赦故丗人以肫爲赦之􅀱又曰赦日武庫令設金雞及鼓於閶闔門外之右勒集囚徒於闕前撾鼓千聲脫枷鏁遣之隋書曰張煚爲天官司㑹與宗伯斛斯徴素不恊徴出爲齊州刺史坐事下獄自知罪重遂踰獄而走帝大怒購之急煚上宻奏曰徴自以􅀒罪深重懼死遁逃􅀂不北竄匈奴則南投呉越徴雖愚陋乆歴清顯奔波敵國無益聖朝今者炎旱爲災可因兹大赦帝從之徴賴以獲免煚卒不言唐書曰太宗以法吏舞文尤留意於刑政毎親録囚徒貞觀􅀄時方發生乃悉放京城死罪繫囚徒歸家期以秋分還繫所囚勑天下皆放之是嵗天下死罪囚如期而還者凢二百九十人太宗愍其奉法悉赦之自是犯法者鮮貞觀二年上謂侍臣曰凢赦唯及不軌之軰古語曰小人之幸君子不幸一􅀊再赦奴人喑啞凢養稂莠者傷禾稼惠姧宄者賊良人昔文}
  - {type: page-break, offset: 2668, content: '', id: KR3k0012_SBCK_652-6a}
  - {type: page-break, offset: 2668, content: '', id: KR3k0012_SBCK_652-6b}
  - {type: variant, offset: 2668, length: 0, content: '', WYG: 宋世良字元友為清河太守甚有善政天禄初大赦獄内穭生桃樹蓬蒿亦滿無囚可赦唯率羣吏拜詔而已又曰後主將大赦時臨漳令李世業為臺所劾贓多至死世業即穆提婆對門陸令宣言於齊主所以大赦後由是頻赦遂以為常平息縣功曹賀肫小人奸貪數犯刑憲但入狴牢無不遇赦故世人以肫為赦之候又曰赦日武庫令設金鷄及鼓於閶闔門外之右勒集囚徒於闕前撾鼔千聲脱枷鎻遣之隋書曰張煚為天官司㑹與宗伯斛斯徵素不協徵出為齊州刺史坐事下獄自知罪重遂踰獄而走帝大怒購之急煚上宻奏曰徵自以負罪深重懼死遁逃若不北竄匈奴則南投吳越徵雖愚陋久厯清顯奔波敵國無益聖朝今者炎旱為灾可因兹大赦帝從之徵賴以獲免煚卒不言唐書曰太宗以法吏舞文尤留意於刑政每親録囚徒貞觀初時方發生乃悉放京城死罪撃囚徒歸家期以秋分還繫所囚勅天下皆放之是歲天下死罪囚如期而還者凡二百九十人太宗愍其奉法悉赦之自是犯法者鮮貞觀二年上謂侍臣曰凡赦宥之恩唯及不軌之輩古語曰小人之幸君子之不幸一歲再赦善人喑啞凡養稂莠者傷禾稼惠奸宄者賊良人昔文}
