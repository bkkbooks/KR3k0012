  - {type: variant, offset: 271, length: 121, content: 所部內獄囚武帝以南越邊遠治從其俗務適便宜不依律令而每言當今法急官不可為上令有司案其事皆驗上大怒命斬之武於獄中上書言其父為武元皇帝戰死於馬前以此求哀由是除名為民晉律曰吏犯不孝謀殺其國王侯伯子男官長誣偷受財枉法及掠人和賣誘藏亡奴婢雖遇赦皆除名為民, SBCK: 天下}
