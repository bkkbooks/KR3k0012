  - {type: variant, offset: 195, length: 7, content: 高熲得罪除名為, SBCK: 成帝元封二年四月臨决河塞隄作瓠子歌赦所過徒六月詔曰甘泉宫内銅池中産芝九莖連葉赦天下作芝房之歌五年冬行􅀯廵還至泰山増脩封禪赦天下六年詔曰朕禮首山昆田出珎物化爲黄金􅀕后土神光三燭其赦汾隂殊死以下賜天下貧}
  - {type: variant, offset: 195, length: 2, content: 高熲, WYG: 武帝元封二年四月臨決河塞隄作瓠子歌赦所過徒六月詔曰甘泉宫銅池中産芝九莖連葉赦天下乃作芝房歌五年冬行南廵還至㤗山増修封禪赦天下六年詔曰朕禮首山毘田出珍物化為黄金祭后土神光三燭其赦汾隂殊死以下賜天下貧民布帛人一疋益州昆明反赦京師亡命令從軍擊之後元年二月詔曰朕郊見上帝廵于北邊見羣鶴留止以不羅網靡所獲獻薦于㤗畤光景並見其赦天下又曰宣帝地節二年四月鳳凰集魯郡羣鳥從之戊申立皇太子赦天下神爵四年春二月詔曰嘉瑞並見修興太乙五帝后土之祠為百姓蒙福鸞鳳萬舉集止于傍齋戒之暮神光顯著薦獻之夕神光交錯或降於天或登于地或從四方來集于壇上帝嘉饗海内承福其赦天下又曰成帝建始元年二月詔曰廼者火灾降于祖廟有星孛于東井其大赦天下咸與自新永始元年丙寅立皇后趙氏大赦天下四年正月行幸甘泉郊㤗峙神光降集紫殿大赦天下又曰哀帝建平二年四月詔曰漢家之制推親親以顯尊尊定陶恭皇之號不宜復稱定陶尊恭皇太后曰帝太太后稱永信宫恭皇后曰帝太后稱中安宫立恭皇廟于京師赦天下東觀漢記曰吳漢疾篤上乃親自臨問所欲言對曰臣愚無所知識唯願無赦而已又曰郭躬家世掌法務在寛平章和元年赦天下繫囚在四月丙子以前減死罪一等勿笞詣金城而文不及亡命躬上封事曰伏惟天恩莫不蕩宥死罪以下並蒙更生而亡命捕}
