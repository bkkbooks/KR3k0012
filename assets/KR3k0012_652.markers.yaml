  - {type: variant, offset: 2311, length: 6, content: 書誣告膺等養, WYG: 犯天時下違人理老夫耄朽不達治體竊謂斯法難以經久豈具瞻之髙美所望於明德哉禕但顧謝踧踖而已干寶晉紀曰庻人楊氏幽于金墉城陳留董仲道遊於}
  - {type: variant, offset: 2311, length: 6, content: 書誣告膺等養, krp: 仁賢百僚稱職有何旦夕之危倒懸之急而數施非常之恩以惠姦宄之惡乎又鷹隼始擊而更原宥有罪上犯天時下違人理老夫耄朽不逹治體竊謂斯法難以經乆豈具瞻之髙羙所望於明德哉禕但頋謝踧踖而已于寳晉紀曰庶人楊氏卒于金墉城陳留董仲道遊於}
  - {type: variant, offset: 2319, length: 8, content: 遊士交結諸郡生徒, SBCK: 喟然而歎曰建斯室也何爲者乎每見國家赦書謀反大逆皆除其殺祖父母父母者不除以爲道法所不容也何今日公卿而處議文飾禮典以至此事乎天人之理旣惑大亂將作矣頋謂謝鯤阮千里等曰易稱知幾其神卿等各可深逃乃身荷檐妻子惟鹿車以入于蜀山莫知所至王隱晉書曰武帝咸熈二年十二月丙寅上乃設壇受命于郊即洛陽宮幸太極前殿大赦天下又曰愍帝建興元年夏四月壬申上即位于長安宫改年大赦天下與之}
