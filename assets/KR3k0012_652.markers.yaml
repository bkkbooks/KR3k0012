  - {type: variant, offset: 586, length: 659, content: 異志靈運馳詣闕上表自陳本末文帝知其見誣不罪也以為臨川內史在郡遊放不異永嘉為有司遣使隨州從事鄭望生收靈運興兵叛逸遂有逆志為詩曰韓亡子房奮秦帝魯連恥本自江海人忠義感君子追討禽之送廷尉廷尉論上斬刑上愛其才欲免官而己彭城王義康堅執謂不宜恕詔以謝玄勳參微管宜宥及後嗣降死徙廣州晉律曰免官比三歲刑其無真官而應免者正刑召還也又曰有罪應免官而有文武加官者皆免所居職官又曰其犯免官之罪不得減也又曰其當免官者先上免官謂不聽應收治者也收贖書曰金作贖刑又曰墨辟疑赦其罰百鍰六兩曰鍰鍰黃鐵也劓辟疑赦其罰惟倍倍百為二百也剕辟疑赦其罰倍差倍差謂俗之文半為五百鍰宮辟疑赦其罰六百鍰大辟疑赦其罰千鍰國語曰桓公問齊國寡甲兵為之若何甲鎧兵弓矢之屬管仲對曰輕過而移諸甲兵諸之也謂輕其過使以甲兵贖罪制重罪贖以犀甲一戟重罪死罪犀犀皮可為甲戟戰戟也秘長二丈六尺輕罪贖以鞼劬位切盾一戟輕罪劓刖之屬鞼盾綴革有文加續小罪讁以金分小罪不入五刑者以金贖分兩之差今之罪金是也書曰金作贖刑也家語曰魯國之政法贖人臣妾於諸侯者皆取金於府子貢贖之而辭不取孔子聞之曰賜失之矣夫聖人舉事可以移風易俗而教導不可施於百姓非獨適身之行也今魯國富者寡貧者多贖人受之益金則為不廉則何以相贖乎自今已後魯人不復贖人法於諸侯矣漢書曰文帝常行中渭橋有一人聞蹕匿橋下久以為蹕過走出乘輿馬驚廷尉張釋之奏犯蹕當罰金帝怒曰賴吾馬和柔他馬已傷敗我廷尉乃罰金耶又曰張敞上書論死刑以下出粟贖罪以給軍用蕭望之以為父兄囚執子弟將不顧死亡之患敗亂之行以赴財利求救一人得生十人以喪且富者得生貧者獨死刑法不一也又曰禹貢上言孝文皇帝, SBCK: 貶議}
