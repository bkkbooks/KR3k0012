  - {type: variant, offset: 2689, length: 6, content: 射聲校尉陰玄, SBCK: 其殺不辜寧失有罪與其増以有罪寧失過以有赦家語曰孔子爲司㓂有父子訟者父子同狴狴獄也而執之三月而不别也其父請止夫子赦焉季孫聞之不恱曰司㓂欺余曩告余曰爲國家必先以孝余今戮一不孝以教民孝不亦可乎又赦之何哉冉有以其言告孔子喟然歎曰上失其道而煞其下非理也不教以孝而聽以獄是煞不辜三軍大敗不可斬也獄犴不理不可刑也何者上教之不行罪不在民故也管子曰凢赦者小利而大害也故乆而不勝其禍無赦者小害而大利也故乆而不勝其福故赦者奔馬之委轡也無赦者痤疽之砭石也又曰赦者先易後難法者先難後易故惠者民之仇讎也法者民之父母也莊子曰聞在宥天下不聞治天下郭象注曰宥使自有則治法治之則乱在也者恐天下之滛其性也宥也者恐天下之遷其德也天下不􅁋其性也不遷其德有治天下者哉無治乃不遷􅁋耳淮南子曰或曰}
