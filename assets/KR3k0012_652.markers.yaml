  - {type: variant, offset: 2311, length: 6, content: 書誣告膺等養, SBCK: 仁賢百僚稱職有何旦夕之危倒懸之急而數施非常之恩以惠姦宄之惡乎又鷹隼始擊而更原宥有罪上犯天時下違人理老夫耄朽不逹治體竊謂斯法難以經乆豈具瞻之髙羙所望於明德哉禕但頋謝踧踖而已于寳晉紀曰庶人楊氏卒于金墉城陳留董仲道遊於}
