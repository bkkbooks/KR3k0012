  - {type: variant, offset: 1558, length: 691, content: 南尹苛碎坐桎梏罪人以泥墨塗面置深坑中餓不與食又擅縱五歲刑以下二十人為有司所劾帝以宏累有功績聽以贖論又曰烈王無忌閔王承之子也承為荊州剌史王廙所害江州剌史禇襃當之鎮無忌及丹陽尹桓景等餞於版橋時王廙子丹陽丞耆之在坐無忌志欲復讎拔刀將手刃之襃景命左右救捍獲免御史中丞車灌奏無忌欲專殺人付廷尉科罪成帝詔曰王當以體國為大豈可尋繹由來以亂朝憲主者其申明法令自今已往有犯必誅於是聽以贖論齊書曰到撝永明元年為御史中丞車駕幸丹陽郡宴飲撝恃舊酒後狎侮同列謂庾景之蠢爾蠻荊其俗鄙復謂虞悰曰斷髮文身其風陋王晏既貴雅步從容又問曰王散騎復可故爾晏先為國常侍轉員外散騎郎此二職清華所不為故以此嘲之王敬則執榠查以刀子削之又曰此非元徽頭何事自喫之為左丞庾景之所糺以贖論唐書曰後魏起自北方屬晉室之亂部落漸盛其主乃峻刑法每以軍令從事人乘寬政多以違令得罪死者以萬計於是國落騷然其後當死者聽其家獻金馬以贖會稽典錄曰楊矯為右丞詣南宮取急案條閣舊事於複道中逢太常羊柔不避車又下矯糺奏柔以為知丞郎應行威儀有序九列外官而公干犯請廷尉治柔罪詔勿治以三月俸贖罪晉律曰其年老小篤癃病及女徒皆收贖又曰諸應收贖者皆月入中絹一疋老小女人半之又曰贖死金二斤也又曰失贖罪囚罰金四兩也又曰以金罰相代者率金一兩以當罰十也禁錮傳曰楚共王即位將為陽楊橋之役使屈巫聘于齊且告師期巫臣盡室以行遂奔晉晉人使為刑大夫子反請以重幣錮之禁錮勿令仕王曰其自為謀也則過矣其為吾先君謀也則忠忠社稷之固也所蓋多矣蓋覆也旦彼若能利國家雖重幣晉將可乎言不許若無益於晉晉將棄之何勞錮焉又曰會於商任錮欒氏也禁錮欒盈使諸侯不得受之二十二年會於沙隨復錮欒氏也晉知樂盈在齊故復錮也後漢書曰河內, SBCK: 内}
