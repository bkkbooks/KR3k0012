  - {type: variant, offset: 2290, length: 1, content: 成, WYG: 大赦天下又曰陳留王奐即位咸熙二年二月加相國晉王冕十二旒建天子旌旗出警入蹕乘金根車等癸未大赦八月辛卯晉王薨壬辰晉太子炎紹封襲位襄武縣言有大人見長三丈餘跡長三尺二寸白髮著黄單衣黄巾拄杖呼人王始語云今當太平九月乙未大赦吳志曰吕蒙病發孫權迎置内殿夜不能寢病中有瘳為下赦令又曰孫皓天璽元年吳都言臨平湖自漢末草穢壅塞令更開通長老相傳此湖邊石凾中有小石青白色長四寸廣二寸刻上作皇帝字於是改年大赦蜀志曰孟光字孝裕河南人延熙九年秋大赦光責大將軍費禕曰大赦者偏枯之物非明世所宜有也衰弊窮極必不得已然後乃可權而行之耳今主上仁賢百僚稱職有何旦夕之危倒懸之急而數施非常之恩}
  - {type: page-break, offset: 2290, content: '', id: KR3k0012_WYG_652-6b, image: WYG0898/WYG0898-0791d.png}
  - {type: page-break, offset: 2290, content: '', id: KR3k0012_WYG_652-7a, image: WYG0898/WYG0898-0792a.png}
  - {type: variant, offset: 2292, length: 3, content: 方伎交, SBCK: 苟免永受侵辱之耻生爲惡吏死爲弊􅀑乞傳尚詣廷尉面對曲直廷尉以其狀上詔書徴尚到廷尉辭窮受罪以先有功得原又曰董卓死陜中諸將後共相要遣使詣長安相聞求乞大赦尚書令王允等以爲殺卓時已赦今復求一􅀊不可再赦李􅔸等曰京師不赦我我當死不􅀂决之􅀂攻長安克之則可大得天下不克則盡鈔取三輔婦女財物西上隴歸郷里作賊延命尚可數年於是帥兵西向長安魏志曰文帝延康元年受禪即位改延康爲黄􅀄大赦天下又曰陳留王奐即位咸熈二年二月加相國晉王冕十二旒天子旌旗出驚入蹕乗金銀車等癸未大赦八月辛夘晉王薨壬辰晉太子紹封襲位襄武縣言有大人見長三丈餘跡長尺二寸白髮着黄單衣黄巾柱杖呼人王始語云今當太平九月乙未大赦呉志曰吕蒙病發孫權迎置内廐夜不能寐病中有瘳爲下赦令又曰孫皓天璽元年呉郡言臨平湖自漢末草􅁾擁塞今更開}
