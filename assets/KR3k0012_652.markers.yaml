  - {type: variant, offset: 2289, length: 2, content: 初成, SBCK: 又曰度尚爲荆州刺史尚見胡蘭餘黨南走蒼梧懼爲巳􅀒仍僞上言蒼梧賊入荆州界於是徴交趾刺史張磐下廷尉辭狀未正㑹赦見原磐不肯出獄方更牢持械節獄吏謂磐曰天恩曠然而君不出何乎磐因自列曰前長沙賊胡蘭作難荆州餘黨散入交趾磐身嬰甲胄渉危履險討擊㐫患斬殄渠帥餘燼鳥竄冒遁還奔荆州刺史度尚懼磐先言怖畏罪戾伏奏見誣磐備位方伯爲國爪牙而爲尚所枉受罪牢獄夫事有虚實法有是非磐實不辜赦無所除如忍}
  - {type: page-break, offset: 2289, content: '', id: KR3k0012_SBCK_652-3b}
  - {type: variant, offset: 2289, length: 0, content: '', WYG: 又曰度尚為荆州刺史尚見胡蘭餘黨南走蒼梧懼為己負乃偽上言蒼梧賊入荆州界於是徵交趾刺史張磐下廷尉辭狀未正㑹赦見原磐不肯出獄方更牢持械節獄吏謂磐曰天恩曠然而君不出何也磐因自列曰前長沙賊胡蘭作難荆州餘黨散入交趾磐身嬰甲胄涉危履險討擊凶惡斬殄渠帥餘燼鳥竄冒遁還奔荆州刺史度尚懼磐先言怖畏罪戾伏奏見誣磐備位方伯為國爪牙而為尚所枉受罪牢獄夫事有虛實法有是非磐實不辜赦無所除如忍以苟免永受侵辱之恥生為惡吏死為弊鬼乞傳尚詣廷尉對面曲直廷尉以其狀上詔書徵尚到廷尉辭窮受罪以先有功得原又曰董卓死陜中諸將共相要遣使詣長安相聞求乞大赦尚書令王允等以為殺卓時已赦今復求乞一歲不可再赦傕等曰京師不赦我我當以死決之若攻長安克之則可得天下矣不克則盡鈔取三輔婦女財物西上隴歸鄉里作賊延命尚可數年於是帥兵西向長安魏志曰文帝延康元年受禪即位改延康為黄}
