  - {type: variant, offset: 2669, length: 13, content: 晏弟詡位少府卿勑未登黃門郎, SBCK: 作罰刑兹無赦夫小仁者大仁之賊故我有天下以來}
  - {type: variant, offset: 2669, length: 3, content: 晏弟詡, WYG: 作罰刑兹無赦夫小仁者大仁之賊故朕有天下以來不甚放赦今四海安寧禮義興行非常之恩施不可數將恐愚人冀僥倖唯欲犯法不能改過當須慎赦尚書大傳曰有過必赦小罪勿增大罪勿赦老弱不受刑有過不受罰故老而受刑謂之悖弱而受刑謂之克不赦有過謂之賊故與其殺不辜寧失不經與其増以有罪寧失過與其有罪殺寧以有過赦家語曰孔子為司冦有父子訟者夫子同狴犴獄也而執之三月而不判也其父請夫子赦焉季孫聞之不悦曰司冦欺余曩吿余曰為國家者先以孝余今戮不孝以教民孝不亦可乎又赦之何哉冉有以其言吿孔子喟然嘆曰上失其道而殺其下非理也不教以孝而聽以獄是殺不辜三軍大敗不可斬也狴犴不理不可刑也何者上教之不行罪不在民故也管子曰凡赦者小利而大害也故久而不勝其禍無赦者小害而大利也故久而不勝其福故赦者奔馬之委轡也無赦者痤疽之砭石也又曰赦者先易後難法者先難後易故惡者民之仇讐也法者民之父母也莊子曰聞在宥不聞治天下郭象注曰宥使之自新則治法治之則亂刑也者恐天下之淫其性也宥也者恐天下之遷其德也天下不淫其性不遷其徳有治天下者哉無治乃不遷德耳淮南子曰或曰知夫將赦也而殺人或曰知夫且赦而治人其望赦同其所殺害異也故或吹火而燈或吹火而滅以吹者異也李爕别傳曰爕常逃亡匿臨淄界為酒家傭靈帝即}
