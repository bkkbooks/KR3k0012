  - {type: variant, offset: 4, length: 1, content: 七, WYG: 八赦赦周易解卦象曰雷雨作解君子以赦過宥罪尚書舜典曰眚灾肆赦眚過灾害肆緩言大過害當緩赦之又吕刑曰五行之疑有赦五罰之疑有赦其審克之刑疑赦從罰罰疑赦從免其當審察能得其理周禮冬官司市曰國君過市則刑人赦又曰司刺掌三宥三赦之法一宥曰不識再宥曰過失三宥曰遺亡一赦曰㓜弱再赦曰老耄三赦曰蠢愚爾雅曰赦舎也舎放置也論語仲弓為季氏宰問政子曰先有司赦小過舉賢才史記曰陶朱公中子殺人囚於楚朱公曰殺人而死職也使少子往視之乃裝黄金千鎰以置褐器中載以一牛車遣其少子長男固請欲行公不許長男曰長子家督也今弟有罪大人不遣是吾不肖欲自殺其母為言不得已而遣長子為一封書及金令遺故所善莊生生乃見楚王曰某星犯某宿獨以德報可以}
