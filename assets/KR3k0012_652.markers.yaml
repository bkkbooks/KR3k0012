  - {type: variant, offset: 2850, length: 5, content: 吾預黨禁錮, krp: 文王作罰刑兹無赦孝明帝時荆州舉茂才𥘉過謝恩賜食事訖問何異聞曰巫有劇賊九人刺史數以牙郡訖不能得帝曰汝非部南郡從事耶對曰是帝乃震怒曰賊發部中不能擒然才何以爲茂乃棰數百便免官而切讓州郡}
  - {type: variant, offset: 2856, length: 0, content: '', SBCK: 日之間賊即伏誅由此觀之擒盗賊在於明法不在數赦崔寔政論曰孝文皇帝即位二十三年乃赦示不廢舊章而已近永平建􅀄之際亦六七年乃赦亡命之子皆老於草野窮困懲艾皆至於死頃間以來􅀊旦赦百姓輕爲姦非前年一朞之中大小}
  - {type: variant, offset: 2856, length: 0, content: '', WYG: 日應也又曰候赦法冬至後盡丁巳之日南風從已上來滿三日以上必有大赦望氣經曰黄氣}
