  - {type: variant, offset: 2842, length: 4, content: 玄病篤與, SBCK: 爕年逃亡匿臨淄男爲酒家傭靈帝即位時月經隂道暈五車史官曰有流星昇漢而北陽芒迫卯熒惑入大角犯帝座其占當有大臣􅀍誅者故太尉李固西土人占在固今月經隂道圍五車冝有赦令以除此異上感此變大赦天下求公子孫酒家具車乗厚送之漢舊儀曰踐祚改元立皇后太子赦天下每赦自殊死以下及謀反大逆不道諸不當得赦者皆赦除之令下丞相御史復奏可分遣丞相御史乗傳駕行郡國解囚徒布詔書郡國各分遣吏傳廐車馬行屬縣解囚徒海内先賢傳曰王允字子師誅董卓卓將郭汜李􅔸等聞卓死引兵還圍長安燔掠官省死者萬數大赦天下􅁢忠節三朝更赦書云其赦射帝營宫闕不從此令是日遂及於難華陽國志曰丞相諸􅁑亮時有言公惜赦亮荅曰治丗以大德不以小惠故匡衡呉漢不願爲赦先帝亦言吾周旋陳元方鄭康成間毎見啓亂之道悉矣曽不語赦也􅀂劉景升父子􅀊􅀊赦宥何}
