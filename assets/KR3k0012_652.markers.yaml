  - {type: variant, offset: 2857, length: 0, content: '', krp: 赦諺曰一歲再赦奴兒喑啞况不軌之民孰不肆意遂赦爲常俗赦以趣赦轉相駈踧而不得息雖日赦之亂捕擊耳郭子曰孫秀降晉武帝厚存寵之妻以姨妹蒯氏室家甚睦妻嘗怒乃罵秀爲狢子秀大不平遂出不復入蒯氏自悔責遂請救於帝時大赦群臣咸見既出帝獨留秀從容言天下曠蕩蒯夫人可得從其例不秀免冠謝爲夫婦如初傅子曰若親貴犯罪大者必議小者必赦是縱封豕於境内放長蛇於左右也荀恱漢紀論曰夫赦權時之冝非常典也漢興承兵革之後大過之代比屋可刑故設三章之法申以大赦之令蕩滌穢流與人更始時勢然也後代承業習而不革失時冝矣風角書曰春甲寅日風髙去地三四丈鳴條從甲上來爲大赦期六十日又曰候赦法冬至後盡丁巳之日南風從巳上來滿三日以上必有大赦望氣經曰黄氣四出注期五十日赦古樂府歌詩曰始出上西門遥望秦氏樓秦氏有好女自名爲女休女休}
