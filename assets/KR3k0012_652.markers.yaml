  - {type: variant, offset: 2673, length: 9, content: 少府卿勑未登黃門郎, WYG: 時月經隂道暈五車史官曰有流星昇漢而北陽芒迫卯熒惑入大角犯帝座其占當有大臣被誅者故太尉李固西土人占在固今月經隂道圍五車宜有赦令以除此異上感此變大赦天下求公子孫酒家具車乘厚送之漢舊儀曰踐祚改元立皇后太子赦天下每赦自殊死以下及謀反大逆不道諸不當得赦者皆赦除之令下丞相御史復奏可分遣丞相御史乘傳駕行郡國解囚徒布詔書郡國各分遣吏傳廐車馬行屬縣解囚徒汝南先賢傳曰王允字子師誅董卓卓將郭汜李傕等聞卓死引兵還圍長安燔掠宫省死者萬數大赦天下允忠節三朝更赦書云卓黨不赦郭汜李傕等不從是日遂及於難華陽國志曰丞相諸葛亮時有言公惜赦亮答曰治世以大德不以小惠故匡衡吳漢不願為赦先帝亦言吾周旋陳元方鄭康成間每見言理亂之道悉矣曾不語赦也若劉景升父子歲歲赦宥何益於治也王符潜夫論曰凡治疾者必先知脉之虛實氣之所結然後為之方故疾可愈也為國者必先知斯人之所苦禍之所起然後為之禁故姦可塞也夫賊良人之甚者莫大於數赦赦數則惡人昌狂而善人傷矣養稂莠者傷禾稼惠奸宄者賊良人書曰文王作罰刑兹無赦孝明帝時荆州舉茂才初過謝恩賜食事訖問何異聞曰坐失劇賊九人刺史數以牙郡訖不能得帝曰汝非部南郡從事耶對曰是帝乃震怒曰賊發部中不能擒殺才何以為茂乃捶數百便免官而切讓州郡十日之間賊即伏誅由此觀之擒盜賊在於明法不在數赦崔寔政論曰孝文皇帝即位二十三年乃赦示不廢舊章而已近永平建初之際亦六七年乃赦亡命之子皆老於草野窮困懲艾皆之老死頃間以來歲且赦百姓輕為姦非前年一春之中大小四散諺曰一歲再赦奴兒喑啞況不軌之民孰不肆意遂以赦為常俗赦以趣赦轉相驅踧而}
