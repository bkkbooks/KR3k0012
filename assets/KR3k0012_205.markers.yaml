  - {type: variant, offset: 3317, length: 6, content: 諮訪若合雍意, SBCK: 失安可遽辭以彰吾薄德處厚謝之而去出延英門復令召還謂曰凡卿所欲言並冝啓諭處厚因對彰善癉惡歸之法制凡數百言又言裴度勲高望重爲人盡心切直冝乆任可以壯國威帝皆聽納自是宰臣敷奏人不敢撗議又曰文宗朝宰臣楊嗣復因對奏曰使府判官今人數猥多徒有麋費臣欲條䟽上曰莫限及才人否嗣復曰有才人自別但澄去滓弊者菁華自出上曰蕭復爲相難言者必言貞元之名相也卿其志之又曰宋申錫爲相尤以公廉爲巳任四方問遺悉無受者旣􅀍罪爲有司驗劾多獲其四方受領所還問遺之􅃺朝野爲之歎息又曰宋申錫以障王}
