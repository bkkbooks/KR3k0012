  - {type: variant, offset: 2453, length: 410, content: 遵用薛侯故事然官屬譏其煩碎無大體不稱賢相也又曰韋賢字長孺為丞相年七十餘乞罷歸賜第丞相致仕自賢始也又曰田蚡為丞相絀黃老刑名百家之言延文學儒者數百人儒由是興又曰丞相有病皇帝法駕親至問疾及瘳視事則賜以養牛上尊酒如淳曰律稻米一㪷得酒一㪷為上尊稷米一㪷得酒一㪷為中尊粟米一㪷得酒一㪷為下尊顏師古曰稷即粟也中尊者宜為黍米不當言稷且作酒自有澆淳之異為上中下耳非必繫於米也又曰有天地大變天下大過皇帝使侍中持節乘四白馬賜上尊酒十斛牛一頭策告殃咎使者去半道丞相追上病使者還未白事尚書以丞相不起病聞若丞相不勝任使者策書駕駱馬即時布衣步出府免為庶人若丞相有他過使者奉策書騅騩馬即時步出府乘棧車牝馬歸田里思過又曰大司空朱愽奏曰帝王之道不必相襲高帝置御史大夫次丞相典政度以職相參歷載二百天下安寧今更大司空與丞相同故事選中二千石為御史大夫任職者為丞相位次有敘所以尊聖德重國相也今中二千石未更御史而為丞相非所以重國政也臣願罷大司空以御史大夫為百僚師哀帝, SBCK: ''}
