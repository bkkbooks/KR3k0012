  - {type: variant, offset: 131, length: 915, content: 見察田饒謂哀公曰臣將去君黃鵠舉矣哀公曰何謂也饒曰君獨不見雞乎雖有五德君猶日滿而食之者何以其所從來者近也夫黃鵠一舉千里止君園池食君魚鼈啄君忝梁無此五德猶貴之以其所從來者遠也臣將去君黃鵠舉矣哀公曰止吾將書子之言也饒曰臣聞食其食者不毀其器蔭其樹者不折其枝有臣不用何書其言遂去之燕燕用為相三年燕政大治哀公喟然太息為之避寢左傳曰仲虺居薛為湯左相又曰齊桓公置射鉤而使管仲相國語曰季文子相宣公成公無衣帛之妾無食粟之馬仲孫他諫曰子為魯上卿相二君矣妾無衣帛馬不食粟人其以子為愛且不華國乎文子曰吾亦願之然吾觀國人其父兄之食麤衣惡而我美妾與馬無乃非相人乎且吾聞之以德榮為華不聞以妾與馬文子以告孟獻子獻子囚之七日自是子服之妾衣不過七升之布馬餼不過稂莠餼米也稂童稂史記曰黃帝得六相而天地治神明至黃帝得蚩尤而明天道得太常而察地利得奢龍而辨東方得祝融而辨南方得風后而辨西方得后土而辨北方謂之六相又曰堯舉八凱倉舒隤敳檮戭大臨尨降庭堅仲容叔達為八凱即垂益禹皋陶之倫也庭堅即皋陶字也使主后土后土地官也以揆百事莫不時敘地平天成揆度成亦平也舉八元伯奮仲堪叔獻季仲伯虎仲熊叔豹季狸為八元也使布五教于四方內平外成內諸夏外夷狄謂之十六相亦曰十六族又曰秦悼武王二年始置丞相官樗里疾甘茂為左右丞相又曰鄭以子產為相一年豎子不戲狎班白不提挈童子不犁畔二年市不豫賈三年門不夜閉道不拾遺四年田器不歸五年土無尺籍喪期不令而治鄭二十六年而死丁壯號哭老人兒啼子產去我死乎民將安歸又曰公儀休為魯相客有遺魚者不受客曰聞君嗜魚何故不受相曰以嗜魚故今為相能自給魚今受而魚誰復給我魚故不受食茹拔其園葵而棄之見布好而出其家婦燔其機云欲令農士工女安其所豈可害其貨乎又曰石奢楚昭王相也堅直廉士無所避行縣道有殺人者相追之乃其父也縱其父還自繫使人言之於王曰殺人者臣之父也夫以父立政不孝也廢法縱罪非忠也臣罪當死王曰追而不及不當伏罪奢曰不私其父非孝也不奉主法非忠也王赦罪上惠也伏誅而死臣職也遂不受令自刎而死又曰五羖大夫之相秦也勞不坐乘暑不張蓋行國中不驅車乘不操干戈功名藏於府庫德行施於後世五羖大夫死國中男女流涕童子不歌謠舂者不相杵又曰秦莊襄王薨太子政立尊呂不韋為相國號稱仲父又曰二世亡誅李斯乃拜趙高為中丞相事無大小皆決, WYG: 穩必須執}
