  - {type: variant, offset: 2923, length: 92, content: 病不視事連年乞骸骨帝每優寵之令以公位歸第養疾漢舊儀曰丞相車兩黑轓騎者戈絳掾史見禮如師白錄不拜朝示不臣也聽事閤曰黃閤無鍾鈴漢雜事曰田蚡為丞相中二千石拜謁蚡不為禮汲黯為主爵都尉見蚡未嘗拜揖, WYG: ''}
