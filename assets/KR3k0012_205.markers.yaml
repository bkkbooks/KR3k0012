  - {type: variant, offset: 879, length: 267, content: 不孝也廢法縱罪非忠也臣罪當死王曰追而不及不當伏罪奢曰不私其父非孝也不奉主法非忠也王赦罪上惠也伏誅而死臣職也遂不受令自刎而死又曰五羖大夫之相秦也勞不坐乘暑不張蓋行國中不驅車乘不操干戈功名藏於府庫德行施於後世五羖大夫死國中男女流涕童子不歌謠舂者不相杵又曰秦莊襄王薨太子政立尊呂不韋為相國號稱仲父又曰二世亡誅李斯乃拜趙高為中丞相事無大小皆決之又曰趙高為丞相欲為亂恐群臣不聽乃先設驗持鹿獻於二世曰馬也二世笑曰丞相誤耶謂鹿為馬問左右或默或言馬以阿順趙高或言鹿高因陰中諸言鹿者以法又曰韋丞相賢者魯人以讀書術為吏至大鴻臚有相工相之當至丞相有男四人相, SBCK: 待}
