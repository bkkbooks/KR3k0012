  - {type: variant, offset: 2922, length: 10, content: 謝病不視事連年乞骸骨, SBCK: ''}
  - {type: variant, offset: 2922, length: 0, content: '', WYG: 天子責成如是安可乆處兹地邪旬日間三上章請退不許又曰韋處厚為相時文宗勤於聴政然浮於決斷宰臣奏事得請往往中變處厚常獨論奏曰陛下不以臣等不肖用為宰相叅識大政凡有奏請初蒙聴納尋易聖懐若出宸衷即示臣等不信若出於横議臣等何名鼎司且裴度元勲宿徳厯輔四朝孜孜竭誠人望所属陛下固宜親重竇易直良厚忠事先朝陛下固當委信微臣才薄首蒙陛下擢用非出他門言既不從臣宜先退即趨下拜陳乞上矍然曰何至此耶卿之志業朕素自知登庸作輔百職斯舉縱朕有所失安可遽辭以彰吾薄徳處厚}
  - {type: page-break, offset: 2922, content: '', id: KR3k0012_WYG_205-8b, image: WYG0894/WYG0894-0792b.png}
