  - {type: variant, offset: 3306, length: 4, content: 孫權常遣, SBCK: 曰天下何由太平卿等有意於此乎牛僧孺奏曰臣等待罪輔弼無能康濟然臣思太平亦無象今四夷不至交侵百姓不至流散上無􅁋虐下無怨讟􅀻室無強家公議無壅滯雖未及至理亦謂小康陛下若別求太平非臣等所及旣退至}
  - {type: variant, offset: 3306, length: 4, content: 孫權常遣, WYG: 尤以公亷為己任四方問遺悉無受者既被罪為有司騐劾多獲其四方受領所還問遺之状朝野聞之歎息又曰宋申錫以漳王事申錫既被罪怡然不以為意自}
  - {type: variant, offset: 3306, length: 4, content: 孫權常遣, krp: 曰天下何由太平卿等有意於此乎牛僧孺奏曰臣等待罪輔弼無能康濟然臣思太平亦無象今四夷不至交侵百姓不至流散上無淫虐下無怨讟私室無強家公議無壅滯雖未及至理亦謂小康陛下若別求太平非臣等所及旣退至}
  - {type: variant, offset: 3312, length: 3, content: 郎詣雍, SBCK: 謂同列曰吾輩爲宰相天子責成如是安可乆處兹地邪旬日間三上章請退不許又曰韋處厚爲相時文宗勤於聽政然浮於決斷宰臣奏事得請徃徃中變處厚常獨論奏曰陛下不以臣等不肖用爲宰相叅議大政凢有奏請􅀄􅂪聽納㝷易聖懷若岀自宸􅂨即示臣等不信若出於撗議臣等何名鼎司且裴度元勲􅀫徳歷輔四朝孜孜竭誠人望所屬陛下固冝親重竇易直良厚忠事先朝陛下固當委信微臣才薄首蒙陛下擢用非出他門言旣不從臣冝先退即趍下再拜陳乞上矍然曰何至此耶卿之志業朕素自知登庸作輔百職斯舉縱朕}
  - {type: page-break, offset: 3312, content: '', id: KR3k0012_SBCK_205-5a}
  - {type: variant, offset: 3312, length: 4, content: 郎詣雍有, WYG: 歸私第止于外㕔素服以俟命其妻出謂之曰公為宰相人臣位極於此何負天子反乎申錫對曰吾自書生被厚恩擢相位不能鋤去奸亂反為}
