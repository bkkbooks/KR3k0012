  - {type: variant, offset: 2919, length: 0, content: '', WYG: 古聖帝明王以慈儉化天下陛下在諒闇之中不宜興作願以瓦木廻奉園陵上忻然從之又曰文宗問宰相曰天下何由太平卿等有意於此乎牛僧孺奏曰臣等待罪輔弼無能康濟然臣思太平亦無象今四夷不至交侵百姓不至流散上無淫虐下無怨讟私室無强家公議無壅滯雖未及至理亦謂小康陛下若别求太平非臣等所及既退至中書謂同列曰吾輩}
