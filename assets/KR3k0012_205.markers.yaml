  - {type: variant, offset: 1627, length: 283, content: 高帝時大臣餘見無可者乃以御史大夫申屠嘉為丞相嘉為人廉直門不受私謁時太中大夫鄧通方愛幸賞賜累鉅萬文帝常燕飲通家是時嘉入朝而通居上旁有怠慢之禮嘉奏事畢因言曰陛下幸愛其臣則富貴之至於朝廷之禮不可以不肅朝罷嘉為檄召通通至詣丞相府免冠徒跣頓首謝嘉嘉坐自如弗為禮責曰夫朝廷者高皇帝之朝廷通小臣戲殿上大不敬當斬使吏今行斬之如淳曰嘉語其吏曰今便行斬之上度丞相巳困通使使持節召通而謝丞相此吾弄臣君釋之又曰公孫弘頴川人武帝以弘為丞相掌列侯唯弘無爵詔封平津鄉侯六百五十戶丞相封侯自弘始也弘食一肉脫粟飯故人賓客仰衣食家無餘財又曰公孫賀字子叔北地人引拜為丞相不受印綬泣涕曰臣本邊鄙鞍馬騎射不任, SBCK: 憲宗終用鏄爲}
