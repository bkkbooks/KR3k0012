  - {type: variant, offset: 39, length: 0, content: '', SBCK: 爲衣冠失緒則爲匹庶來護兒兒作宰相虞丗南男作木匠忠賢文武固無種也又曰杜景儉爲相則天常以季秋内出梨花一枝示宰臣曰是何祥也諸宰臣曰陛下德及草木故能秋木再花雖周文德及行葦無以過也景儉獨曰謹按洪範五行傳隂陽不相奪倫瀆之即爲災又春秋云冬無愆陽夏無伏隂春無凄風秋無苦􅀨今巳秋矣草木黄落而忽生此花瀆隂陽也臣慮陛下布教施令}
