  - {type: variant, offset: 2058, length: 343, content: 聞於先師自託於經術願賜清間之燕盡精思於前上召見說詩悅之擢為光祿大夫代楊敞為丞相時年八十餘短小無鬚眉貌類老嫗行步傴僂常兩吏扶乃能行又曰邴吉為丞相寬大好禮讓掾史有罪輒予長休吉終無所案驗客或謂吉侯為漢相奸吏成其私吉曰夫以三公之府有案吏之名吾竊陋焉後人代吉公府不案吏自吉始也吉馭吏嗜酒數逋蕩嘗從吉出醉嘔丞相車茵上西曹主吏白欲斥之吉曰以醉飽之失去士使此人將復何所容西曹忍之此不過汙丞相茵耳遂不去也又曰王啇字子威涿郡人為丞相有威重長八尺餘身體鴻大容貌過人河平四年單于來朝引見白虎殿丞相啇坐未央庭中單于前拜謁啇啇起離席與言單于仰視啇貌大畏之遷延却退天子聞而歎曰此真漢相也又曰邴吉為丞相常出逢鬭者死傷橫道吉不問又逢人逐牛牛喘息吐舌止駐使騎使問逐牛行幾里吏怪之吉曰人鬭殺傷長安令京兆尹所當禁吾備宰相不親小, SBCK: 應}
