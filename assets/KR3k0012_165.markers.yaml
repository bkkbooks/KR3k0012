  - {type: variant, offset: 2047, length: 707, content: 大坂名也三秦記俗歌曰隴頭流水鳴聲嗚咽遙望秦川肝膓斷絕又曰隴渭西關也其坂九廻不知高幾許欲上者七日乃得越漢志曰隃麋屬右扶風即今之汧陽縣邠州元和郡縣圖曰邠州新平郡禹貢雍州之域公劉所居之地秦為內史地漢為右扶風本作豳字開元中以豳與幽字相涉改為邠漢志栒邑屬右扶風有豳鄉詩豳國公劉所都也左傳曰畢原豐郇文之昭也十六國春秋曰符堅時新平人王雕陳圖讖王猛以為左道惑眾勸堅誅之雕臨刑上䟽曰臣師劉湛明於圖記謂臣曰新平應出帝王寶器願陛下志之後果獲玉器焉十道志曰宜祿縣本漢鶉觚縣後魏又分置東陰盤縣周地圖記曰秦使蒙恬北築長城又於北原築城以觚奠酒而祭有鶉飛止觚上因以名縣今有鶉觚原元和郡縣圖曰新平本漢漆縣後漢書曰建武八年隗嚚攻略陽上至漆進止未定會馬援夜至上喜問之援聚米以為山谷於上前指軍所從入上笑曰虜在吾目中矣涇州元和郡縣圖曰涇州安定郡禹貢雍州之域春秋時屬秦始皇時屬北地郡漢置安定郡宋永初山川記曰安定處山谷之間昆戎舊壤迫近夷狄修習武備人皆以馳射為事國語曰周恭王遊於涇上密康公從有三女奔之其母曰必致之於王夫獸三為群人三為粲美之物也眾以美物歸汝而何德以堪王猶不堪況汝小醜備物終必亡康公不獻王王滅密地有陰密城詩大雅曰密人不恭敢拒大邦寧州元和郡縣圖曰寧州彭原郡禹貢雍州之域當夏之衰公劉邑焉周時為義渠戎王國至秦昭王殺義渠戎王併其地始皇時為北地郡漢因之漢志曰泥陽屬北平郡莽曰泥陰應劭曰泥水出郁郅北蠻中十道志後漢改泥陽為富平後魏文改定平又曰義渠道屬北郡莽曰義溝史記曰夏道衰而公劉失其稷官變于西戎邑于邠至秦繆公得由余西戎八國服於秦梁山涇漆之北有義渠氏昫衍之戎築城郭以居秦稍蠶食至於惠王遂拔義渠二十五城秦昭王殺義渠戎王於是秦有北地隴西上郡之地慶州元和郡縣圖曰慶州順化, SBCK: ''}
