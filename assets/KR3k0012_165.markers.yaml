  - {type: variant, offset: 4338, length: 0, content: '', WYG: 居焉漢為匈奴右地尚書禹貢曰道弱水至于合黎十道志曰今張掖有合黎水漢志西域傳曰月支本居敦煌祁連間霍去病傳曰濟居延遂臻小月支攻祁連即此道也漢志曰張掖郡匈奴昆邪王地武帝時開之莽曰設屏應劭曰張國臂掖故曰張掖也又曰觻得屬張掖郡有千金渠西至樂涫入澤中莽曰官式涫音官觻音鹿又曰刪丹屬張莽曰貫虜肅州十道志曰肅州酒泉郡禹貢雍州之域古西戎地月支所居漢為武威酒泉郡也漢書曰武帝元狩二年昆邪王殺休屠王將其衆來降以其地為武威酒泉郡又匈奴傳曰漢置酒泉郡以隔絶胡與羌通之路又西通月支大夏以公主妻烏孫王以分匈奴西方之援國其水甘若酒故名酒泉後漢書曰班超乆在西域年老思土上書曰臣不敢望到酒泉郡但願生入玉門闗玉門屬敦煌今州地也去長安三千六百里酒泉今肅州也去長安二千八百里𤓰州十道志曰𤓰州晉昌郡禹貢雍州之域古西戎}
