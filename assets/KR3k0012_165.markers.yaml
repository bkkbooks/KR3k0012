  - {type: variant, offset: 89, length: 829, content: 俗亦堅春秋元命苞曰雍壅也東距坂西有漢中南含高山阻居庸是釋名曰雍州在西山之內壅翳也應劭注漢書曰四面積高曰壅李巡注爾雅曰河西其氣蔽壅也晉太康地志曰雍州西北之地陽所不及陰氣壅遏故以為名呂氏春秋曰西方為壅州三輔黃圖曰始皇表河以為秦東門表汧以為秦西門地理通說曰東自同華略河西北西自歧隴會原極于此盡其地挾灃灞據函崤方千里得百二之固史記蘇秦說蘇孝公曰秦四塞之國被山帶河外有洪河之險西有漢中巴蜀北有代馬之利此天府也又曰獻公徒居櫟陽孝公用商鞅作咸陽築冀闕徙都之貨殖傳曰關中由汧雍以東至河華膏壤沃野千里自虞夏之貢以為上田漢書曰秦形勝之國也帶河阻山懸隔千里持戟百万秦得百二焉言秦地險固二万人足敵諸侯百万人也地勢便利以其下兵於諸侯譬猶居高屋之上建瓴水也瓴盛水瓶也居高屋之上而播瓴水言其向下之勢易也又婁敬說高祖曰陛下都洛陽豈欲與周室比隆哉周之都洛以為天下之中四方納貢道里均有德則易以王無德則易以亡今陛下欲比隆成康之時為不侔矣且秦地被山帶河四塞以為固卒然有變急百万之眾可具故秦膏膄之地以為天府陛下入關而都之山東雖亂秦故地可全而有也夫與人鬥不搤其吭而拊其背未能全勝今陛下入關而都之此亦搤天下之吭而拊其背也高祖以問群臣群臣皆山東人爭言周王數百年秦二世而亡高祖疑未能決及留侯明言入關便即日車駕西都關中又百官表曰內史周官秦因之掌治京師景帝二年分置左內史右內史太初元年更為京兆尹又東方朔曰三輔之地南有江淮北有河渭汧隴以東商雒以西厥壤肥饒此所謂天府陸海之地也後漢書曰董卓徙都長安謂陳紀曰三輔平敞四面險固土地肥美號曰陸海三輔黃圖曰太初元年以渭城以西屬右扶風長安以東屬京兆尹長陵以北屬左馮翊以輔京師謂之三輔關中記曰秦西以隴關為限東以函谷為界二關之間謂之中地地東西方千餘里十道志曰雍州京兆郡禹貢九州之一舜置十二牧雍亦在焉周武王都酆鎬平王東遷以歧酆之地賜秦孝公始都咸陽秦兼天下置內史以領關中項籍滅秦分其地為三以章邯為雍王都廢丘司馬欣為塞王都櫟陽董翳為翟王都高奴謂之三秦高祖入關定三秦復為內史武帝改為京兆尹華, SBCK: ''}
