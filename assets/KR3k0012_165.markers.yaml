  - {type: variant, offset: 4338, length: 0, content: '', krp: 月攴居焉漢𥘉爲匈奴右地釋名曰西方寒凍或云河西土田薄故曰凉晉書曰姑臧城匈奴所築舊蓋臧城語訛後云姑臧又曰惠帝末張䡄求爲凉州於是大城此地爲一㑹府以據之號前凉後吕光復據之號後凉禹貢曰原隰厎績至于豬野織皮崑崙析支渠捜西戎即叙續漢書曰西羗自賜支以西濵河首左右居今河關西可十餘里有河曲羗謂之賜支異物志曰古渠捜國當大宛北界豬野今姑臧界豬野澤是劉昞燉煌實録曰晉安帝隆安元年凉州牧李暠微服出城逢虎道邊虎化爲人遥呼暠爲西凉君暠因彎弧待之又遥呼暠曰有事告汝無疑也暠知其異投弓於地人乃前曰燉煌空虚不是福地君之子孫王於西凉不如徙酒泉言訖乃失暠乃移都酒泉後漢書曰安帝時匈奴冦常山於是西北有事民飢民用不足大將軍鄧騭欲棄凉州專務北邊曰譬若家人衣壞敗一以相𥙷猶有所完若不如此將兩無所保郎中虞討曰大將軍之䇿不可者三先帝闢境而今棄之不可一也棄凉州即以三輔爲塞園陵單外不可二也諺曰關西出將關東出相烈士武臣多出凉州風土壯猛便習兵事今羗所以不過三輔爲腹心害者以凉州在其後也甘州十道志曰甘州張掖郡禹貢雍州之域六國至秦戎狄月支居焉漢爲匈奴右地尚書禹貢曰道弱水至于合黎十道志曰今張掖有合黎水漢志西域傳曰月支本居祁連燉煌間霍去病傳曰濟居延遂臻小月支攻祁連即此道也漢志曰張掖郡匈奴昆邪王地武帝時開之莽曰設屏應劭曰張國臂掖故曰張掖也又曰觻得屬張掖郡有千金渠西至樂涫入澤中莽曰官式涫音官音鹿又曰刪丹屬張莽曰貫虜肅州十道志曰肅州酒泉郡禹貢雍州之域古西戎地月支所居漢爲武威酒泉郡也漢書曰武帝元狩二年昆邪王殺休屠王將其衆來降以其地爲武威酒泉郡又匈奴傳曰漢置酒泉郡以隔絶故與羗通路又西通月支大夏以公主妻烏孫王以分匈奴西方之援國其水甘若酒故名酒泉後漢書曰班超乆在西域年老思土上書曰臣不敢望到酒泉郡但願生入玉門關玉門屬燉煌今沙州也去長安三千六百里酒泉今肅州也去長安二千八百五十里路瓜州十道志曰瓜州晉昌郡禹貢雍州之域古西戎}
