  - {type: variant, offset: 2765, length: 0, content: '', SBCK: 􅁗始封之邑􅁗爲隴西郡漢武置天水郡史記秦本紀曰周孝王時非子好馬及善畜養孝王曰昔栢翳爲舜主畜多息故有土賜姓嬴今其後丗亦爲朕息馬遂分土地爲附庸邑之􅁗使續嬴氏漢志曰天水郡莽曰填戎明帝改曰漢陽􅁗州記曰郡前有湖水冬}
