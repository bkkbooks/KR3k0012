  - {type: variant, offset: 4336, length: 0, content: '', krp: 屬秦秦併天下爲隴西之臨洮縣史記曰蒙恬築長城起臨洮廓州十道志曰廓州寜塞郡禹貢雍州之域古西羗地漢書曰宣帝時諸羗數背叛後將軍趙充國屯隴西羇縻之諸羗不敢動後漢書叚熲傳曰延熹中燒當煎河勒姐等八種羗冦隴西金城熲追討大破之明年澆河大豪㓂張掖熲斬澆河大帥五千餘人西羗於是弭定疊州十道志曰疊州合川郡禹貢梁州之域歷秦漢魏晉爲諸羗所據後周書曰建德六年西逐諸戎始統有其地因置恒香郡㝷改爲疊州蓋以其地多山重疊以名郡也又於三交口築城置甘松防又爲三川縣以隷恒香郡至建德元年改三川縣爲常芬縣仍立芳州以邑隷焉取其地多芳草爲郡之名鄯州十道志曰鄯州西平郡禹貢雍州之域古西戎之地漢志曰允吾屬金城郡今龍攴縣即其地凉州十道志曰凉州武威郡禹貢雍州之域六國至秦}
