  - {type: variant, offset: 925, length: 1120, content: 華陰郡置在鄭縣禹貢雍州之域元和郡縣圖曰周為畿內之國鄭桓公始封之邑其地一名咸林春秋時為秦晉之地戰國為秦魏二國之境西岳華山在焉秦為內史地漢為亦京兆尹國語曰鄭桓公為周司徒食菜咸林也左傳曰晉侯許賂秦伯以河外列城五南及華山史記曰秦武公十一年初縣北鄭漢志曰鄭屬京兆尹周宣王弟鄭桓公邑師古曰幽王既敗鄭桓公死之其子武公與平王東遷也爾雅曰河西曰華西南之美者有華山之金玉焉魏志曰董卓遷都長安華歆求出為下邽令史記曰秦始皇三十六年東遊海上遣使關中至平舒道有人持壁遮使者曰為我遺鎬池君事具璧門水經曰渭水東經平舒城即江神返壁於華陰平舒道遺鎬池君之處也尚書秦誓曰歸馬于華山之陽放牛于桃林之野左傳曰晉使詹嘉處瑕以守桃林之塞杜曰今華陰東潼關是也同州元和郡縣志曰同州馮翊郡禹貢雍州之域春秋時屬秦本大荔戎國秦獲之更名曰臨晉七國時屬魏秦併天下京兆馮翊扶風並內史之地漢為河上郡復為內史武帝更名左馮翊郡後改為同州以其書云灃水攸同故名之也十道志曰漢王定三秦關中置三郡以塞國為河上郡後罷三郡以為內史武帝改為左馮翊應劭漢官解詁曰馮輔翊蕃故以為名水經曰洛水東南經沙阜北其阜東西八十里南北三十里俗名沙苑史記曰魏文侯十六年代秦築臨晉十六國春秋曰符健時河渭溢蒲津監寇登得一履於河中長七尺健歎曰覆載之內何所不有穆天子傳曰陽䊸之山何伯馮夷之所都漢志曰臨晉縣有河水祠又郊祀志祠河於臨晉愽物志曰馮夷華陰人得道水仙為河伯左傳曰秦晉戰于彭衙注曰馮翊郃陽縣西北有衙城又曰秦伐晉晉使呂相絕秦曰俘我王官剪我羈馬羈馬今在郃陽王官今在登城漢書曰宣帝微時嘗困於蓮勺鹵中如淳曰為人所辱也蓮勺有鹽池名曰鹵中又漢志曰屬馮翊蓮音輦勺音酌漢志曰郃陽屬左馮翊在郃水之陽即大雅大明之詩曰在郃之陽歧州元和郡縣圖曰歧州扶風郡今為鳳翔府禹貢雍州之域春秋戰國時為秦都屬內史高帝更名中地郡復屬內史景帝更名主爵都尉武帝改右扶風所以扶助京師行風化也史記曰秦文公作鄜畤靈公作吳陽上畤又作下畤今郡內有三畤原又曰皇始二十九年巡隴西北地出笄頭山過回中回中在扶風郡漢書曰文帝十四年匈奴入蕭關殺北地都尉回中宮候騎至雍水經曰郿縣積石原魏青龍二年諸葛亮出斜谷與司馬宣王屯渭南郭洎筭亮必爭比原遂先據之亮至果不得上又魏氏春秋曰亮據渭南宣王謂諸將曰亮若出武功依山東轉是其勇也若西上五丈原即諸君旡事矣亮果屯此原五丈原亦在郿國語曰周之興也鸑鷟鳴于歧山今歧山縣是三秦記曰陳倉山上有石雞與山雞不別趙高燒山山雞飛去而石雞不去晨鳴山頭聲聞三十里或云王雞耀州五代史曰耀州本京兆府華原縣唐末李茂貞據鳳翔僣行墨制建為耀州以義勝為軍額命溫韜為節度使乾州又曰本唐之奉天縣也唐末李茂貞建之為州後因之不改隴州元和郡縣圖曰隴州汧陽郡禹貢雍州之域秦文公所都漢為汧縣屬右扶風禹貢曰道汧及歧至于荊山說文曰隴, SBCK: ''}
