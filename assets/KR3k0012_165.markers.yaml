  - {type: variant, offset: 4311, length: 1, content: 上, WYG: 初匈奴右地釋名曰西方寒凍或云河西土田薄故曰凉晉書曰姑臧城匈奴新築舊盖臧城語訛後云姑臧又曰惠帝末張軌求為凉州於是大城此地為一會府以據之號前凉後吕光據之號後凉禹貢曰原隰底績至于瀦野織皮崑崙折支渠搜西戎即叙續漢書曰西羌自賜支以西至河首左右居今河闗西可十餘里有河曲羌謂之賜支異物志曰古渠捜國當大宛北界瀦野今姑臧界瀦野是劉􅷶燉煌實錄曰晉安帝隆安元年凉州牧李暠㣲服出城逢虎道邊虎化為人遥呼暠為西凉君暠因彎弧待之又遥遥呼暠曰有事告汝無疑也暠知其異投弓於地人乃前曰燉煌空虛不是福地君之子孫王於西凉不如從酒泉言訖乃失暠乃移都酒泉續漢書曰安帝時匈奴冦常山於是西北有争民饑民用不足大將軍鄧隲欲棄凉州專務北邊曰譬若家人衣壊敗一以相補猶有所完若不如此將两無所保郎中虞詡曰大將軍之䇿不可者三先帝闢境而今棄之不可一也棄凉州}
