  - {type: variant, offset: 3307, length: 349, content: 洛交郡禹貢雍州之域春秋時秦地始皇時為上郡漢為上郡雕陰縣地史記曰秦文公畋于汧渭之間夢黃蛇首上鄜以為上帝之徵遂以鄜立鄜畤祠白帝也漢書云匈奴南侵至朝郍膚施即此地也漢志曰雕陰屬上郡有雕陰山坊州元和郡縣圖曰坊州中部郡禹貢雍州之域春秋時翟國秦屬內史漢為右馮翊翟道縣之地符姚時時置杏城周置馬坊唐高祖因置坊州取馬坊為名漢書曰朔方為西部都尉休屠為北部都尉搜渠為中部都尉郡國志曰鄜城本三秦高奴之地翟道故城即今郡城是也俗謂之高樓城穆天子傳曰癸酉天子命駕八駿之駟造父為御翔行經翟道昇於太行元和郡縣圖曰宜君縣前秦符堅於祋祤縣故城置之延州元和郡縣圖曰延州延安郡禹貢雍州之域春秋時白狄所居秦漢屬上郡高奴之地項羽以董翳為翟王居高奴即其地也漢志曰膚施屬上郡有五龍山水經曰渭水東經高奴水漢志高奴水合豐林水謂之清水丹州元和郡縣圖曰丹州咸, WYG: 會}
  - {type: variant, offset: 3307, length: 812, content: 洛交郡禹貢雍州之域春秋時秦地始皇時為上郡漢為上郡雕陰縣地史記曰秦文公畋于汧渭之間夢黃蛇首上鄜以為上帝之徵遂以鄜立鄜畤祠白帝也漢書云匈奴南侵至朝郍膚施即此地也漢志曰雕陰屬上郡有雕陰山坊州元和郡縣圖曰坊州中部郡禹貢雍州之域春秋時翟國秦屬內史漢為右馮翊翟道縣之地符姚時時置杏城周置馬坊唐高祖因置坊州取馬坊為名漢書曰朔方為西部都尉休屠為北部都尉搜渠為中部都尉郡國志曰鄜城本三秦高奴之地翟道故城即今郡城是也俗謂之高樓城穆天子傳曰癸酉天子命駕八駿之駟造父為御翔行經翟道昇於太行元和郡縣圖曰宜君縣前秦符堅於祋祤縣故城置之延州元和郡縣圖曰延州延安郡禹貢雍州之域春秋時白狄所居秦漢屬上郡高奴之地項羽以董翳為翟王居高奴即其地也漢志曰膚施屬上郡有五龍山水經曰渭水東經高奴水漢志高奴水合豐林水謂之清水丹州元和郡縣圖曰丹州咸寧郡禹貢雍州之域春秋時為白翟所居秦漢為上郡地隋圖經集記曰義川蓋春秋時白翟也其俗語云丹州白窒即白翟語訛耳綏州元和郡縣圖曰綏州上郡禹貢雍州之域春秋白翟所居七國時屬秦秦併天下為上郡漢初屬翟國復改為上郡山海經曰上郡有䟽屬二負之臣曰危與二負殺窫寙帝梏之䟽屬之山即此也銀州元和郡縣圖曰銀州銀川郡禹貢雍州之域春秋時白翟地秦為上郡漢為河西郡圁圖陰縣地前漢志曰圜陰屬西河郡莽曰方陰師古曰圜字本作圁縣在圁水之陰因以為名也今有銀川銀水即是舊名猶存但字變耳耆舊傳驄馬城即銀川城也符秦建元元年自驄馬城巡撫夷狄麟州元和郡縣圖曰禹貢雍州之域秦漢為雲中郡隋為勝州天寶中分勝州地置麟州晉太康地志曰自北地郡北行九百里得五原塞即此地後漢光祿徐自為出五原塞數百里築城鄣列亭至盧朐山即今縣北光祿塞是也夏州元和郡縣圖曰夏州朔方郡禹貢雍州之域春秋及戰國時屬魏秦併天下屬上郡漢武分置朔方郡詩曰王命南仲城彼朔方漢書曰武帝元朔二年遣將軍衛青將兵擊匈奴出雲中至高關遂至符離收河南地置朔方五原郡符離漢北塞名十六國春秋曰赫連勃勃於朔方縣築大城既成下書曰今都城已建宜立美名朕方統一天下君, krp: ''}
