  - {type: variant, offset: 663, length: 1696, content: 余難云若如來言子雲亦不應作太玄經也瓦甂木柸比門所饒金觴玉爵萬家無一也又曰孔鄭之門耳聽口受者滅絕而託竹素者為世寶也又曰余家遭火典籍蕩盡困於無力不能更得故抄掇眾書撮其精要用功少而所收多思不煩而所見博或謂洪曰流無源則乾條離株則悴吾恐玉屑盈車不如金璧余荅曰詠圓流者採珠而捐蚌登荊嶺者拾玉而棄石余之抄略譬猶擿翡翠之藻羽脫犀象之角牙又曰嵇君道問二陸優劣抱朴子曰朱淮南嘗言二陸重規沓矩無多少也一手之中不無鈍利方之它人若江漢之與潢潦陸子十篇誠為快書者其辭之富者雖覃思不可損也其理之約者雖潛筆腐豪不可益也陸平原作子書未成吾門生有在陸君軍中嘗在左右說陸君臨亡曰窮通時也遭遇命也古人貴立言以為不杇吾所作子書未成以此為恨耳余謂仲長統作昌言未竟而亡後董襲撰次之桓譚新論未備而終班固謂其成琴道今才士何不贊成陸公子書頴容春秋例曰著述之事前有司馬遷揚雄後有鄭眾班固近即馬融鄭玄其所著作違義正者略舉一兩事以言之遷史記不識畢公文王之子而言與周同姓揚雄法言不識六十四卦云所從來尚矣論衡曰畫工好畫上世人不畫秦漢士者尊古卑今楊子云作太玄經法言張伯松不肯一觀與並肩故賤其言也若生周世則為金匱也又曰淮南呂覽文不無累害所以出者家富官貴也人有難充書者繁重云不在多以為龍少魚眾少者為神充荅曰文眾勝寡財富愈貧世無一分吾有百篇人無一字吾有萬言孰為賢也充仕數不遇以章和二年徙家避難楊州丹陽入為治中才小任大職在剌劾筆札之思歷年寢廢章和三年罷州還年漸七十時可懸輿髮白齒落日月逾邁貧無供養忘不娛快乃作養生之書凡十六篇論衡造於永平末定於建初之年耳新論曰余為新論術辨古今亦欲興治也何異春秋褒貶耶今有疑者所謂蚌異蛤二五為非十也譚見劉向新序陸賈新語乃為新論莊周寓言乃云堯問孔子淮南子云共工爭帝地維絕亦皆為妄作故世人多云短書不可用然論天間莫明於聖人莊周等雖虛誕故當採其善何云盡棄耶風俗通應邵撰序云風者天氣有寒煖地形有陰陽泉水有美惡草木有剛柔俗者含血之類象而生之百里不同風千里不同俗周秦嘗以月遣輶軒使采異代方知載之秘府及羸氏之亡遺棄殆盡蜀人嚴君平有千餘言林陶翁儒才有梗概揚雄續注二十七年凡九千字猶不如爾雅之宏麗張竦云縣諸日月不刊之書余不才敢比隆於斯人金樓子曰王仲宣昔在荊州著書數十篇荊州壞盡焚其書今在者一篇知名之士咸重之見虎一毛不知其班又曰劉輔性矜嚴有盛名沉深好經書善說京氏易論集經傳及圖讖文作五經通論世號之曰沛王通明帝甚敬重之賞賜恩寵加異又曰或問余曰子何不詢之有識共著此書曷為區區自懃如此予曰夫荷旃被毳者難與道純緜之緻密羹藜唅糗者不足論大牢之滋味故服綌之涼者不知盛暑之鬱燠襲貂狐之煖者不知至寒之悽愴予之術業豈賓客之能闚斯蓋以筳撞鍾以蠡測海也予常切齒淮南不韋之書謂為賓遊所製每至著述之間不令賓客闚之也又曰桓譚新論華譚又有新論揚雄有太玄經楊泉有太元經談此多誤動形色或云桓譚有新論何處復有華譚楊子但有太玄經何處復聞太元也皆由不學使之然矣隋大業拾遺曰大業之初勑內史舍人竇威起居舍人崔祖濬及龍川贊治侯偉等三十餘人撰區宇圖志一部五百餘卷新成奏之又著丹陽郡風俗乃見以吳人為東夷度越禮義及屬辭比事全失脩撰之意帝不悅遣內史舍人柳逵宣勑責威等云昔漢末三方鼎立大吳之國以稱人物故晉武帝云江東之有吳會猶江西之有汝潁衣冠人物千載一時及永嘉之末華夏衣纓盡過江表此乃天下之名都自平陳之後碩學通儒文人才子莫非彼至爾等著其風俗乃為東夷之人度越禮義於爾等可乎然於著術之體又無次序各賜杖一頓即日勑追祕書學士十八人脩十郡志內史侍郎虞世基惣檢於是世基先令學士各序一郡風俗擬奏請體式學士著作佐郎虞綽序京兆郡風俗學士宣惠尉陵敬序河南郡風俗學士宣德郎杜寶序吳郡風俗四人先成以簡世基世基曰虞綽序京兆文理俱贍優博有餘然非眾人之所能繼陵敬論河南雖文華才富序事過繁袁朗杜寶吳蜀二序不略不繁文理相副宜具狀以四序奏聞去取聽勑及奏帝曰學士脩書頗得人意各賜物二十段付世基擇善用之世基乃鈔吳郡序付諸頭以為體式及圖志第一副本新成八百卷奏之帝以部秩太少更遣子細重脩成一千二百卷卷頭有圖別造新樣紙卷長二尺敘山川則卷首有山水圖敘郡國則卷首有郭邑圖敘城隍則卷首有公館圖其圖上山水城邑題書字極細並用歐陽肅書即率更令詢之長子攻於草隸為時所重幼屬文, SBCK: ''}
