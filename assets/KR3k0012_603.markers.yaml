  - {type: variant, offset: 25, length: 1, content: 所, SBCK: 君以示於朝宣子曰不然對曰子爲正卿亡不越境反不討賊非子而誰宣子曰嗚呼我之懷矣自詒伊慼其我之謂矣孔子曰董狐古之良史也書法不隱趙宣子古之良大夫也爲法受屈惜也越境乃免又襄二十五年傳曰齊崔杼弑莊公太史書曰崔杼弑其君崔子殺之其弟嗣書而死者二人其弟又書乃舎之南史}
