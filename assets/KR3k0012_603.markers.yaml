  - {type: variant, offset: 19, length: 5, content: 集諸儒使著, SBCK: 史明乎得失之迹韓詩外傳曰周舎對趙簡子曰臣操牘秉筆從君之後司君過而書之周禮曰外史掌四方之志鄭􅀇注曰志記也謂􅀂魯之春秋晉之乗楚之檮杌左傳昭十五年曰荀躒如周籍談爲介王謂籍譚曰昔而髙祖孫自黶司晉之典籍以爲大政曰籍氏及辛有之二子董之晉於是乎有董史汝司典之後也何故忘之籍談不能對又宣二年傳曰晉趙穿弑靈公宣子未出境而復太史書曰趙盾弑}
  - {type: page-break, offset: 19, content: '', id: KR3k0012_SBCK_603-1b}
  - {type: variant, offset: 19, length: 5, content: 集諸儒使著, WYG: 史明乎得失之迹韓詩外傳曰周舍對趙簡子曰臣操牘秉筆從君之后司君過而書之周禮曰外史掌四方之志鄭𤣥注曰志記也謂若魯之春秋晉之乘楚之檮机左傳昭十五年荀躒如周藉談為介王謂藉談曰昔而髙祖孫伯黶司晉之典籍以為大政曰籍氏及辛有之二子董之晉於是乎有董史汝司典之後也何故㤀之籍談不能對又宣二年傳曰晉趙穿弑靈公宣子未出境而復太史書曰趙盾弑}
