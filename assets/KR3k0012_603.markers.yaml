  - {type: variant, offset: 2742, length: 230, content: 詩一篇或數日不作則追補之稍進作賦頌至年十六向作二千餘首有虞訥者見而詆之率乃一旦焚毀更為詩示焉託云沈約訥便向之唴稱無字不善率曰此吾作也訥慚而退南史曰劉孝綽本名冉幼聰敏七歲能屬文舅齊中書郎王融深賞異之與同載以適親友號曰神童融每曰天下文章若無我當歸阿士阿士即孝綽小字也又曰謝貞八歲嘗為春日閑居詩從舅王筠奇之謂所親曰至如風定花猶落乃追步惠連矣年十三尤善左氏春秋工草隸蟲篆後周書曰李旭幼年已解屬文有聲洛下時洛陽刱置明堂旭年十歲數為明堂賦雖優洽未足才制可觀見者咸曰有家風矣, WYG: 失實}
