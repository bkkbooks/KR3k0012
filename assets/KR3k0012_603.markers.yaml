  - {type: variant, offset: 3069, length: 8, content: 諱綱字世讚六歲能, SBCK: 雖好文儒尤疾學者前丗史籍竟無所成數代之事殆將泯絶朕意則不然將欲覽前王之得失爲在身之􅀛鏡公軰以數年之間勒成五代之史副朕深懷極可嘉尚又詔司空房􅀇齡等脩晉書以臧榮緒書爲夲採摭諸家傳記而益附之爰及晉代文集罔不畢舉爲十夲紀二十志七十列傳三十載記其太宗所著宣武二帝及陸機王羲之四論皆稱制焉房玄齡以下爲論皆稱史臣後數載而書就藏之祕府頒賜加級各有差以其書賜皇太子及新羅使者各一部焉又曰顯慶中髙宗以許敬宗所撰太宗實録所紀多非實乃謂劉仁軌曰朕昨觀國史所書多不周悉卿等必湏窮微索隱原始要終盛業鴻勲咸使詳備至如先聖作威鳯賦意}
