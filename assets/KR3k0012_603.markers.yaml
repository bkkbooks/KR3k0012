  - {type: variant, offset: 3058, length: 5, content: 執白闌團扇, SBCK: 害封德彞時爲内史舎人備見其事因謂人曰丗基􅀍戮丗南匍匐而請代善心之死敬宗舞蹈以求生敬宗聞而銜之及爲德彛立傳盛加其罪惡在監門大將軍錢九隴皇家之􅀠也敬宗與之結婚乃爲九隴曲叙門閥妄加功績又蠻首龐孝㤗率郷兵從征髙麗賊知其怯愞先擊破之敬宗納其家寳貨妄稱其頻破賊徒斬獲數萬漢將驍徤者唯􅂫定方龐孝泰耳曹繼叔劉伯英皆出其下虚美如此}
  - {type: variant, offset: 3058, length: 5, content: 執白闌團扇, WYG: 害封德彛時為内史舍人備見其事因謂人曰世基被戮世南匍匐而請代善心之死敬宗舞蹈以求生敬宗聞而衘之及為德彛立傳盛加其罪惡左監門大將軍錢九隴皇家之𨽻也敬宗與之結婚乃為九隴曲叙門閥妄加功績又蠻酋龎孝泰率郷兵從征髙麗賊知其怯愞先擊破之敬宗納其寳貨妄稱其頻破賊徒斬獲萬數漢將驍徤者唯蘇定方龎孝泰耳曹繼叔劉伯英皆出其下虗美如此}
