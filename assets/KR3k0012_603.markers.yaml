  - {type: variant, offset: 3066, length: 1, content: 祖, SBCK: 宗謂諌議大夫禇遂良曰卿猶知起居皆書何等事大底人君得見否遂良曰今之起居古之左右史書人君言事且記善惡以爲鑒誡庻幾人主不爲非法不聞帝王躬自觀史太宗曰朕有不善卿必記之耶遂良曰守道不如守官臣職當載筆君舉必記黄門侍郎劉洎曰設令遂良不記天下之人皆記之矣帝曰然又曰貞觀十年尚書左僕射房􅀇齡侍中魏徴散􅀐常侍姚思廉太子右庻子李百藥孔潁逹守禮部侍郎令狐德蔡守中書侍郎岑}
  - {type: variant, offset: 3066, length: 1, content: 祖, WYG: 宗謂建議大夫褚遂良曰卿今知起居記録何等事大底人君得見否遂良曰今之起居古之左右史書人君言事且記善惡以為鍳誡庶幾人主不為非法不聞帝王躬自觀史太宗曰朕有不善卿必記之耶遂良曰守道不如守官臣職當載筆君舉必記黄門侍郎劉洎曰設令遂良不記天下之人皆記之矣帝曰然又曰貞觀十年尚書左僕射房𤣥齡侍中魏徵散騎常侍姚思亷太子右庶子李百藥孔頴達守禮部侍郎令狐德棻守中書侍郎岑}
