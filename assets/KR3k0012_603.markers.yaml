  - {type: variant, offset: 2856, length: 3, content: 文章若, SBCK: 人情何由悉稱謗者當加重罪不然不止齊主於是禁止諸人各杖二百斐庶死於臨漳獄中又北史収所引史官恐其陵逼唯取髣髴學流先相依附者其房延祐辛元植睦仲讓雖夙渉朝伍並非史才刁柔裴􅄧之以儒業見知全不堪編緝髙孝幹以左道求進脩史諸人父祖姻戚多􅀍書録飾以羙言収性頗不甚能平夙有怨者多没其善每言何物小子敢共魏収作􅂩􅀂舉之則使上天按之當使入地収在神武時爲太常少卿脩國史得陽休之助因謂休之曰}
