  - {type: variant, offset: 495, length: 164, content: 荅曰通才著書以百數唯太史公為廣大餘皆藂殘小論不能比之子雲所造法言太玄也人貴所聞賤所見故輕昜之若遇上好事必以太玄次五經也抱朴子曰王充作論衡北方都未有得之者蔡伯喈嘗到江東得之歎其文高度越諸子及還中國諸儒覺其談論更遠嫌得異書或搜求至隱處果得論衡捉取數卷將去伯喈曰唯我與爾共之勿廣也又曰盧生問曰蔡伯喈張平子才足著子書正恐言遠旨深世人不解, SBCK: 家}
