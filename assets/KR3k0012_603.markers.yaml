  - {type: variant, offset: 31, length: 5, content: 八覽六論合, SBCK: 曰􅁗趙澠池之㑹其君相爲鼓瑟扣缶皆命御史書之漢書曰司馬喜生談爲太史公談生遷遷爲太史令掌紬史記紬綴集也又曰武帝始置太史天下計書先上太史副上丞相故司馬談父子丗居此職得撰史記又曰劉向楊雄皆稱遷有良史之才服其善序事理辨而不華質而不俚其文直其事該不虚美不隱惡故謂之實録後漢書曰班彪續司馬遷後傳數}
