  - {type: variant, offset: 2977, length: 0, content: '', WYG: 齊王以魏收之卒他命中書監陽休之裁正其所傳魏書休之以收叙其家事稍美且寡才學淹延歲時竟不措手惟削去嫡庶一百餘字又曰周}
  - {type: variant, offset: 2979, length: 4, content: 心字仁恕, WYG: 圜為滕王逌友逌問于大圜曰吾聞湘東王作梁史有之乎餘傳乃可抑揚帝紀奚若隠則非實記則攘羊對曰言之者妄也如使有亦不足怪昔漢明為世祖紀章帝為顯宗紀殷鍳不逺足為成例且君子之過如日月之蝕彰于四海安得隱之如有亦安得而不隱盖子為父隠直在其中諱國之惡抑又禮也逌乃大笑又曰齊主命魏收撰魏史至是未成常令羣臣各言其志收曰臣願得直筆東觀早出魏書齊主乃令收專在史閣不知郡事謂收曰當直筆我終不學魏大武誅史官于是廣徴百官傳總斟酌之既成上之凡十二帙一百三十卷尚書陸操謂楊愔曰魏收可謂博物宏才有大功于魏室愔曰此不刋之書傳之萬古但恨論及諸家枝葉過為繁碎時論收為尔朱榮作傳以榮比韓彭伊霍者盖由得其子文賂黄金故也邢邵父兄書事皆優邵唯笑曰列女傳悉是史官祖母尚書左丞盧斐臨漳令李庶度支郎中王松年中書舍人盧潜等言曰魏收誣㒺一代其罪合誅盧思道曰東觀筆殊不直斐庶等與收面相毁辱無所不至齊主大怒乃親自詰問斐曰臣父位至儀同收附於族祖中書即𤣥傳之下收之外親博陵崔綽位止功曹乃為傳首齊主問收曰崔綽有何事迹卿為之立傳收曰雖無爵位而道義可嘉魏司空高允曾為其賛稱有道德臣所以知之齊王曰司空才士為人作賛理合稱揚亦如卿為人作文章道其好者豈能皆實收不能對以其才名不欲加罪高德正其家傳甚美乃言於齊主曰國史一定當流天下人情何由悉稱謗者當加重罪不然不止齊王於是禁止諸人各杖二百斐庶死於臨漳獄中又北史收所引史官恐其陵逼唯取學流先相依附者其房延祐辛元植眭仲讓雖夙涉朝伍並非史才刁柔裴昻之以儒業見知全不堪編緝高孝幹以左道求進修史諸人父祖姻戚多被書錄飾以美言收性頗不甚能平夙有怨者多沒其善每言何物}
