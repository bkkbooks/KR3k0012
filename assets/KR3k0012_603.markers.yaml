  - {type: variant, offset: 3208, length: 292, content: 能含清濁守今古見之何生矣沈約亦愛其文又曰陸從典字由儀幼聰敏年八歲讀沈約集見廻文妍麗援筆擬之便有佳致十二作柳賦其辭甚美從父瑜特所賞愛隋書曰李德林幼聰敏年數歲誦左思蜀都賦十餘日便度高隆之見而唴歎遍告朝士云若假其年必為天下偉器鄴京人士多就宅觀之月餘日中車馬不絕年十五誦五經及古今文集日數千言俄而該博墳典陰陽緯候無不通涉善屬文辭覈而理暢又曰于宣敏字仲達少沉密有才思年十一詣周趙王王命之賦詩宣敏為詩甚有幽貞之志王大奇之坐客莫不唴賞起家右侍上士文選人名錄曰曹植年十歲誦讀詩論及賦數萬言能屬文又曰謝靈運幼而聰慧善屬文舉筆立成文章之盛獨絕當時幼童傳曰謝瞻字宣遠幼而聰悟五歲能屬文通玄理又曰孫士潛字石龍, SBCK: 事太平御覽卷第}
