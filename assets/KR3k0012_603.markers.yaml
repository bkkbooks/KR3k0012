  - {type: variant, offset: 2457, length: 1, content: 文, WYG: 裴松之字世期註陳壽三國志松之鳩集傳記廣增異聞既成奏之上覧之曰裴世期為不朽矣又曰范􅁮獄中與諸生姪書曰既造後漢轉得統緒詳觀古今著述及評論殆少可意者班氏最有髙名既任情無例惟志可推耳博瞻不可及之整理未必媿也吾雜傳論皆有深意精㫖至於循吏以下及六夷諸序論筆勢縱放實天下之奇作其中合者往往不減過秦論嘗共比方班氏所作非但不媿之而已欲徧作諸志前漢所有者悉令備雖事不必多且使見聞得盡此書行故應有賞意者自古體大而思精未有此也梁書曰吳均欲撰齊書求借齊起居注及羣臣行狀武}
