  - {type: variant, offset: 2148, length: 8, content: 若金用汝作礪史記, SBCK: 藏舟於壑藏山於澤謂之固矣然則夜半有力者􅀒之而走昧者不知也又}
  - {type: variant, offset: 2148, length: 0, content: '', WYG: 藏舟於壑藏山於澤謂之固矣然而夜半有力者負之而走昧者不知也又曰水之積也不厚則其負大舟也無力覆桮水於㘭於交切堂之上而芥為之舟置杯焉則膠水淺而舟大也又曰孔子遊乎緇帷之林坐杏壇之上有漁父者下船而來孔子乃下求之至於津畔方将杖挐而引其船顧見孔子再拜而起乃刺船而去延縁葦間顔淵還車子不顧待水波定不聞挐音而後敢乗又曰方舟而濟河有虛舟來觸雖有褊心之人終不怒也忽有一人在其上則惡聲随之向不怒向虛而今實也又曰巧者勞而智者憂無能者無所求飽食而遨遊泛然}
  - {type: page-break, offset: 2148, content: '', id: KR3k0012_WYG_768-11a, image: WYG0899/WYG0899-0720a.png}
  - {type: variant, offset: 2148, length: 0, content: '', krp: 藏舟於壑藏山於澤謂之固矣然則夜半有力者負之而走昧者不知也又曰水之積也不厚則其負大舟也無力覆盃水於拗於交切堂之上則芥爲之舟置杯焉則膠水淺而舟大也又曰孔子遊乎緇維之林坐杏壇之上有漁父者下舡而來孔子乃下求之至於澤畔有將杖挐而引其舡頋見孔子再拜而起乃刺舡而去延縁葦間顔淵還車了不頋待水波定不聞挐音只而後敢乗又曰方舟而濟河有虚舡來觸舟雖有惼心之人終不怒也忽有一人在其上則惡聲隨之向不怒向虚而今實也又曰巧者勞而智者憂無能者無所求也食而遨汎}
