  - {type: variant, offset: 488, length: 5, content: 南北宮雒陽, SBCK: 舡歎曰郭奉孝􅀂在不使􅀌至此奉孝嘉字又曰鄧哀王仲字蒼舒五六歳智􅀂成人孫權曽致巨象太祖欲知其輕重訪之羣下咸莫能岀其理仲曰量象大舡之上而刻其所至稱物以載之則交可知矣太祖大恱即施行焉魏略曰孫權乗大舡來觀軍公使弓弩亂發箭着其舡舡偏重將覆權因廻舡復以一靣受箭箭均船平乃還吴志曰諸􅁑恪岀征東興有虹見其舡又曰吴人以舟檝爲輿馬以巨海爲夷庚也􅀳書曰陸機􅀄詣張華華問雲何在機曰雲有􅀏疾未敢自見俄而雲至華爲人多髭製好帛䋲纒髭雲見而大􅀏不能自巳先是常着縗絰上舡於水中顧見其影因大􅀏落水人救獲免又曰張慿字長宗祖鎮蒼梧太守慿年數歳鎮謂其父曰我不如汝有佳兒慿曰阿翁詎冝以子戯父耶及長有志氣爲郷閭所稱舉孝廉􅀒其才自謂必叅時彦􅀄欲詣劉惔郷里及同舉者共􅀏之旣至惔處之下座神意不接憑欲自發而無端㑹王濛就惔清言有所不通慿於末制之言旨深逺足暢彼我之懷一座皆驚惔延之上座清言彌日留􅀫至旦遣之慿旣還舡湏􅁷遣傅教覔張孝廉舡便召與同載遂言之於簡文帝帝召與語歎曰張慿勃窣爲理窟官至吏部郎御史中丞又曰王濬徴拜右衛將軍除大司農車􅀐將軍羊祜雅知濬有竒略乃宻表留濬於是重拜益州刺史武帝謀伐吴詔濬修舟艦濬乃作大艦連舡方百二十歩受二千餘人以木爲}
  - {type: page-break, offset: 488, content: '', id: KR3k0012_SBCK_768-4b}
  - {type: page-break, offset: 488, content: '', id: KR3k0012_SBCK_768-5a}
  - {type: variant, offset: 488, length: 5, content: 南北宮雒陽, WYG: 船歎曰郭奉孝若在不使孤至此奉孝嘉字又曰鄧哀王冲字倉舒五六歲智若成人孫權曽致巨象太祖欲知其輕重訪之羣下咸莫能出其理冲曰置象大船之上而刻其水㾗所至稱物以載之則校可知矣太祖大悦即施行焉魏畧曰孫權乘大船來觀軍公使弓弩亂發箭著其船船偏重将覆權因廻船復以一靣受箭箭均船平乃還呉志曰諸葛恪出住東興有虹見其船又曰呉人以舟檝為輿馬以巨海為夷庚也晉書曰陸機初詣張華華問雲何在機曰雲有笑疾未敢自見俄而雲至華為人多姿制好帛繩纒鬚雲見而大笑不能自已先是嘗著衰絰上船於水中顧見其影因大笑落水人救獲免又曰張憑字長宗祖鎮蒼梧太守慿年數歲鎮謂其父曰我不如汝有佳兒慿曰阿翁詎宜以子戯父耶及長有志氣為鄉閭所稱舉孝亷負其才自謂必參時彦初欲詣劉惔鄉里及同舉者共笑之比至惔處之下座神意不接慿欲自發而無端㑹王濛就惔清言有所不通慿於末坐判之言㫖深逺足暢彼我之懐一座皆驚惔延之上座清言彌日留宿至旦遣之慿既還船須㬰惔遣傳覔張孝亷船便與同載遂言之於簡文帝帝召與語歎曰張憑勃窣為理窟官至吏部郎御史中丞又曰王濬徴拜右衛将軍除大司農車騎將軍羊祜雅知濬有竒畧乃密表留濬於是重拜益州刺史武帝謀伐呉詔濬修船艦濬乃作大船連舫方百二十歩受二千餘人以木為}
