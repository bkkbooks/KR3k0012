  - {type: variant, offset: 425, length: 2, content: 秦攻, WYG: 項羽欲東渡烏江烏江亭長艤船待謂項王曰江東雖小地方千里衆數十萬人亦足王也願大王急渡今獨臣有船漢軍至無以渡項王笑曰天之亡我我何渡為且籍與江東子弟八千人渡江而西今無一人還縱江東父老憐而王我何面目見之縱彼不言籍獨不愧於心乎顧謂亭長曰吾知公長者吾騎此馬五歲所當無敵嘗日行千里吾不忍殺之以賜公又曰}
