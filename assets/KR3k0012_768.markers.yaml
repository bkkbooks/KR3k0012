  - {type: punctuation, offset: 619, content: 「, id: KR3k0012_CHANT_768-bkkpn181}
  - {type: variant, offset: 619, length: 234, content: 武帝起神明殿砌以文石用布為瓦而淳漆其外四門並如之語林曰晉張載字孟陽甚醜每出為小兒擲瓦盈車葛洪神仙傳曰孫愽者河東人也有藏人亡奴在軍中者因以求之不得愽語奴主曰吾為卿燒其營舍奴出走卿但諦伺取之於是愽以一赤瓦擲之須臾火起張天奴果出走而得之愽乃以青瓦擲之火即滅屋舍百物向已燋燃者悉復如故靈鬼志曰有士人姓鄒唑齋中忽有一人通刺詣之題刺云舒甄仲既去疑其非人尋其刺曰吾知之矣是子舍西土瓦中人耳便往令人將鏵掘之果於瓦器中得桐人長尺餘管子曰棟橈不勝任則屋覆而人不怨者其理然也弱子慈母之所愛也, SBCK: 使君}
