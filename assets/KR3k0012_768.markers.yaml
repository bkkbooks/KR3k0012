  - {type: variant, offset: 483, length: 2, content: 董卓, SBCK: 馬援平南越將樓舡大小二千餘艘士二萬餘人進擊九真賊徴側餘黨都羊等自無功至居風無功居風二縣並属九真郡斬􅀗五千餘人嶠南悉平嶠嶺嶠也廣州記曰援到交趾立銅柱爲漢之極界又曰第五倫爲㑹稽太守永平五年坐法徴老小攀車叩馬啼呼相隨曰裁行數里不得前倫乃僞止亭舎隂乗舡去衆知復追之及詣廷尉吏人上書守闕者千餘人是時顯宗方按梁松事亦多爲松訟者帝患之詔公車諸爲梁氏及㑹稽太守上書者勿復受㑹帝幸􅋝尉録囚徒得免歸田里身自耕種不交通人物數年拜宕渠令又曰任文公巴郡人爲從事天大旱白刺史曰五月一日當有大水其變巳至不可防救冝令吏人預爲其備刺史不聽文公獨儲大舩百姓或聞頗有爲防者到其日旱烈文公急命促載使白刺史刺史􅀏之日將中天北方雲起湏􅁷大雨至脯時湔水涌起十餘丈酈元水經注云湔水出綿道玉疊山在今益州湔音子建反突壞廬舎所害數千餘人文公遂以占術馳名又曰郭林宗遊洛陽始見河南尹李膺大竒之遂相友善於是名震京師後歸郷里衣冠諸儒送至河上車數千兩林宗唯與李膺同舟而濟衆賔望之以爲神仙焉又曰趙炳嘗臨海求􅂳人不和之和許也俗夲}
