  - {type: variant, offset: 855, length: 2, content: 其理, SBCK: 民鄙賤}
  - {type: variant, offset: 855, length: 0, content: '', WYG: 民鄙賤而辱臨之此固野人之舟也翼俯屈入}
  - {type: variant, offset: 855, length: 2, content: 其理, krp: 民鄙賤}
  - {type: variant, offset: 856, length: 136, content: 理而下瓦則慈母笞之故其理動者雖覆屋不為怨不以其理動者下瓦必笞莊子曰師曠為晉平公作清角一奏有雲從西北起再奏大雨大風隨之裂帷幕破俎豆墮廊瓦平公懼伏于室內抱朴子曰土柈瓦胾不可救飢甎爾雅曰瓴謂之甓甎也今江東呼甓甓音蒲歷切古史考曰烏曹氏作甎魏略曰扈累獨居道側以㼾甎為障施一廚床食宿其, WYG: 船}
  - {type: variant, offset: 858, length: 6, content: 下瓦則慈母笞, SBCK: 辱臨}
  - {type: variant, offset: 858, length: 6, content: 下瓦則慈母笞, krp: 辱臨}
