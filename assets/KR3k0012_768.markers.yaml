  - {type: variant, offset: 1921, length: 224, content: 陵自知罪重試索棺釘以觀太傅意太傅給之陵夜呼掾屬與訣曰行年八十身名並滅遂自殺盛弘之荊州記曰冠軍縣東有魏征南司馬張詹墓元嘉初尚儼然六年民飢始被發金銀朱漆之器爛然有二朱漆棺棺前垂竹薄簾以金釘釘之楊龍驤洛陽記曰石牛一頭在城西北九重里耆舊傳說者云石虎當襄國石牛夜喚聲三十里事奏虎虎遣人打落牛兩耳及尾以鐵釘釘四腳今見存抱朴子曰吳有趙炳以大釘釘柱入尺許以氣刀吹之即釘躍出如弩箭之發鐷廣雅曰鏶音集謂之鐷弋涉切說文曰鏶鐷也礪詩曰周道如砥書曰楊州厥貢礪砥砥細於礪皆磨石, WYG: ''}
