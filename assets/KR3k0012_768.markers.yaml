  - {type: variant, offset: 520, length: 0, content: '', SBCK: 率巴東􅁥軍廣武將軍唐彬攻吴丹陽尅之擒其丹陽􅁥盛紀吴人江險磧要害之處並以䥫鎻横截之又作䥫錐長丈餘暗置江中以逆拒舡先是羊祐獲吴間諜具知情狀濬乃作大筏數十亦方百餘歩縳草爲人􅀍甲持仗令善水者以筏先行筏旣行遇䥫錐䡄着筏去又作炬長十餘丈大數十圍灌以麻油在舡前遇鏁然炬燒之湏􅁷融液斷絶於是舡無所礙}
