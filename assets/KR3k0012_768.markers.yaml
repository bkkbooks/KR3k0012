  - {type: variant, offset: 4, length: 5, content: 板葛洪神仙, SBCK: 子乗舟汎汎其景二子伋夀願言思子中心養養又曰汎汎楊舟載沉載浮楊木也舟之汎浮隨所載旣見君子我心則休書曰予乗四載隨山刋夲所載者四其一曰水乗舟又曰􅀂乗舟汝弗濟臭厥載禮曰季春之月舟牧覆舟五覆五反乃吿舟備具于天子鄭玄曰舟官覆反舟者備傾漏也蔡邕章句曰備謂檝擢紼纚維引之具左}
