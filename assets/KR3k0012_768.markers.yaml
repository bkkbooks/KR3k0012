  body:
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 一叙舟上釋名曰舡循水而行又曰舟言周流也舡上屋曰廬象舎也其上重室曰飛廬在上故曰飛也又在其上曰雀室於中候望􅀂鳥雀之驚視也又曰舟名青翰千翼赤鳥亦名鷁首說文曰舡從舟從鈆省聲艘舡揔名也艘音騷易曰刳木爲舟剡木爲檝舟檝之利以濟不通詩曰汎彼栢舟在彼中河舟在河中猶婦人在夫家是其常處又曰}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 一叙舟上釋名曰船循水而行又曰舟言周流也船上屋曰廬象舎也其上重室曰飛廬在上故曰飛也又在其上曰雀室於中候望若鳥雀之驚視也又曰舟名青翰千翼赤馬亦名鷁首說文曰船從舟鈆省聲艘船總名也艘音騷易曰刳木為舟剡木為楫舟楫之利以濟不通詩曰汎彼栢舟在彼中河舟在河中猶婦人在夫家是其常處又曰}
