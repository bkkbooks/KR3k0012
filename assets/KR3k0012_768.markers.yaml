  - {type: variant, offset: 55, length: 0, content: '', krp: 遂自茅津濟封崤屍而還第津在河東埋文陽縣西封藏又曰楚敗吴師獲其舟餘皇餘皇舟名又曰晉楚將戰趙嬰齊}
  - {type: variant, offset: 56, length: 1, content: 郡, SBCK: 其徒先具舟于河故敗而先濟也春秋潜潭巴曰澤浮舟天子以亡爲憂宋均注曰潭無底之澤令浮舟言隂盛之耳論語曰南宮适問於孔子曰羿善射奡盪舟俱不得其死然爾雅曰舫舟也天子造舟諸侯維舟大夫方舟士特舟庶人乗柎郭璞注曰造北舡爲橋也維連四舡也方併兩舡也特單舡也柎編木以渡也廣雅曰艦大舡也舫艕舩也蒙衝艑歩典切䑦音鈎􅑳音鹿舸古我切共音廷音孟音舟洪舟挺舟猛舟也家語曰舟非水不行水入舟則没君非民不治民犯上則君危戰}
