  - {type: variant, offset: 1688, length: 457, content: 濮水之上莊子持竿不顧鉤史記曰桀有功能伸鉤索鐵搜神記曰京兆長安有張氏晝獨處室有鳩自外入止前床張氏惡之披懷而祝曰鳩爾來為我禍耶飛上承塵為我福耶來入我懷鳩飜入懷以手探之則不知鳩之所在而得一金鉤焉遂寶之自是之後子孫昌盛資財萬倍蜀賈客至長安中聞之乃厚賂內婢婢竊鉤以與客張氏既失鉤漸貧死喪而蜀客亦數罹窮厄不為己利或告之天命也不可以力求於是齎鉤以返張氏張氏復昌故關西稱張氏鉤風俗通曰順帝時京師謠曰直如弦死道邊曲如鉤乃封侯張衡賦曰仰飛纖繳俯鉤長流觸矢而斃貪餌吞釣釘魏略曰晉宣王討王陵陵自知罪重試索棺釘以觀太傅意太傅給之陵夜呼掾屬與訣曰行年八十身名並滅遂自殺盛弘之荊州記曰冠軍縣東有魏征南司馬張詹墓元嘉初尚儼然六年民飢始被發金銀朱漆之器爛然有二朱漆棺棺前垂竹薄簾以金釘釘之楊龍驤洛陽記曰石牛一頭在城西北九重里耆舊傳說者云石虎當襄國石牛夜喚聲三十里事奏虎虎遣人打落牛兩耳及尾以鐵釘釘四腳今見存抱朴子曰吳有趙炳以大釘釘柱入尺許以氣刀吹之即釘躍出如弩箭之發鐷廣雅曰鏶音集謂之鐷弋涉切說文曰鏶鐷也礪詩曰周道如砥書曰楊州厥貢礪砥砥細於礪皆磨石, SBCK: 􅄮}
