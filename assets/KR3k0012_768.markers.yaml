  - {type: variant, offset: 993, length: 498, content: 晉書曰吳興吳陸經痑癘死者十三在青唯逵夫妻家貧冬無被袴晝傭賃夜還燒甎伐木朞年中成七墓葬十二喪宋書曰范曄字蔚宗母如廁產之額為塼所傷故以塼為小字鄭緝之東陽記曰獨公冢在縣東八十里有冢臨溪其甎文曰筮言吉龜言凶三百年墮水中義熙中冢猶半在自後稍已崩盡續搜神記曰順陽范啟母喪當葬前母墓在順陽往迎之既至而墳壟沓難可識別不知何許袁彥仁時為豫州往看之因云間有一人見鬼范即如言令物色覔之云此墓中一人衣服顏狀如之即開墓棺物皆爛塚中灰壤深尺餘意甚疑試令人以足撥灰中土冀得舊物果得一甎銘云順陽范堅之妻然後信之述異記曰豫章胡茲家在郡治宋泰始四年空中忽有故冢墓甎青笞石灰著之礚然擲其母前其數或五三俱至舉家驚懼然終不中人旬日乃止語林曰陶太尉既作廣州優遊無事常朝自運甓甎也於齋外暮運於齋內人問之陶曰吾方致力中原恐為爾優遊不復堪事塹東觀漢記曰周紆字文通為渤海太守坐事免家貧身築塹以自給食蒭茭書曰峙迺蒭茭亡敢弗多詩曰生蒭一束其人如玉禮曰以足蹙路馬蒭有誅聲類曰茭乾蒭也老子曰天地不仁以萬物為蒭狗聖人不仁以百姓為蒭狗趙壹嫉邪賦曰勢家多所宜欬唾自成珠被褐懷金玉蘭蕙化為蒭堊禮曰在堊室之中不與唑焉山海經曰慈聾之山其中有大谷是多白墨青堊謂有雜色之堊, SBCK: 舡}
