  - {type: variant, offset: 283, length: 0, content: '', WYG: 曰王晉賢晉王夷甫女也為愍懐太子妃洛城亂劉曜畧晋欲妻之晋賢太罵曰我皇太子婦司徒公之女胡羗小醜敢欲干我乎言畢投河其侍婢名六出亦投河死時遇嵩髙山女真韓西華出逰遂俱獲内救外示其死體密濟賢將入嵩髙山今在華陽内洞中六出年二十餘體貌脩整後有郎姓田漁陽人魏故浚儀令田諷之孫諷有隂徳配以六出耳又曰董奉字君異侯官人也吳先主時有少年為奉本縣長奉年四十餘始知學道隨少年罷官去後五十餘年復見行經侯官諸故吏人皆往見之奉顔貌一如往日奉居山不種田為人治病亦不取錢愈使栽五株杏數年計十餘萬株令人将榖一噐自往取杏一器貨杏得榖賑救貧乏供給行旅不逮者歳二萬餘斛乃尸觧去裴君曰尸觧之仙不得䕃華盖乗飛龍登太極逰九宫也諸有单用曲晨飛精劔觧者得八素列紀惟奉寳秘不脩行皆白日尸觧其有作水火病兵及用大力竹杖觧去者先詣名山並為太清尸觧凢脩劔觧之道並紀名紫簡上𨽻髙仙諸有宿功善業隂徳之仙其神得詣朱火丹陵官受學仙道為九宫真人諸用太極尸觧之道夜半去者職為地真應尸觧者或學功淺深志髙頽廢或為祭酒精勤救治者並得為三十六洞天文觧地下主者一百四十年一轉武觧鬼師二百八十年一轉凢有二等乃得進補仙職九天生神章經曰夫人學道希慕神仙及得尸觧者終歸仙道神化雖同兩不相雜俱入道真明真科曰生世好道積功布徳名書上清者得尸觧下仙逰行五嶽後生人中更受經法為人宗師雌一五老經曰夫仙之去世也或絶跡藏住而内栖外或觧劍遺杖飄然雲霧神寄𤣥冥莫知其端緒也又曰若有此五老經雖不齋戒存思與俗混雜故不失隠存下神白日尸觧及命過太隂地下主者或遺骨胎變受化南宫是必宿有骨縁也上清經曰元始天地以上清變化七十四方觧形之道授南極元君太清真人内傳及}
