  - {type: punctuation, offset: 5, content: 《, id: KR3k0012_CHANT_664-bkkpn1}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 傳曰介象字元則㑹稽人也吳先主甚重之常謂曰介君象速求去先主不聽象言病先主使左右賜美棃一奩須􅁷象死解去又曰紫淸上宫九華安祀謂楊君曰可尋解劒之道作吉終之術自盡出嘿之㑹隱顯之迹又曰葛􅀇字孝先從左慈受九丹金液經常餌术語弟子張奉曰當尸解去八月十二日時當發至期􅀇衣冠而卧無氣而色不變尸解而去又曰壺公謝元厯陽人也費長房師之及道士李意期將兩弟子去積年長房及兩弟子皆隱變解化又曰鮑靚字太􅀇琅邪人晉明帝時人葛洪妻父陰君授其尸解法一說云靚上黨人漢司隷鮑宣之後修身養性年過七十而解去有徐寧者師事靚寧夜聞靚室有琴聲而問焉荅曰嵇叔夜昔示迹東市而實兵解耳晉中興書曰葛洪赴岣嶁令行至廣州其刺}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_664-3a}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 傳曰介象字元則㑹稽人也吳先主甚重之常謂曰介君象連求去先生不聼象言病先主使左右賜美梨一奩湏㬰象死觧去又曰紫清上宫九華安賜謂楊君曰可尋觧劔之道作吉終之術目盡出嘿之㑹隠顕之近又曰葛𤣥字孝先從左慈受九丹金液經常餌木語弟子張奉曰當尸解去八月十二日時當發至期𤣥衣冠而卧無氣而色不變尸觧而去又曰壼公謝元陽歴人也費長房師之及道士李意期将兩弟子去積年長房及兩弟子皆隠變觧化又曰鮑靚字太𤣥瑯瑘人晋明帝時人葛洪妻父隂君受其尸觧法一説靚上黨人漢司徒鮑宣之後修身飬性年過七十而解去有徐寕者師事靚寕夜聞靚室有琴聲而問焉答曰稽叔夜昔示迹之市而實尸解去晋中興書曰葛洪赴岣嶁令與刺}
