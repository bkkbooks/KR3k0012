  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第六百六十四}
  body:
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 六尸解西城王眞人傳曰解化之道尸不不能俱神化者也寶劒上經曰尸解之法有死而更生者有頭斷從一旁出者有形存而無骨者又曰夫尸解者本眞之錬蛻也}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 六尸觧西城王真人傳曰解化之道尸不能俱神化者也寳劔上經曰尸解之法有死而便生者有死而從一旁生者有形存而無骨者又曰夫尸解者本真之練蛻也}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_WYG_664-1b, image: WYG0899/WYG0899-0001b.png}
  - {type: variant, offset: 2, length: 0, content: '', krp: 六尸解西城王眞人傳曰解化之道尸不不能俱神化者也寶劒上經曰尸解之法有死而更生者有頭斷從一旁出者有形存而無骨者又曰夫尸解者本眞之錬蛻也}
  - {type: xml-element, offset: 3, content: '', id: KR3k0012_CHANT_664-bkkxmlele1}
  - {type: 'tls:seg', offset: 3, content: '', id: KR3k0012_CHANT_664-1a.1}
  - {type: 'tls:seg', offset: 3, content: '', id: KR3k0012_CHANT_664-1a.2}
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 屬之隱適也雖仙品之下第其禀受亦不輕也所謂隱回三光白日陸沉者也夫修下尸解者皆不得返望故鄉此謂上解之道也名配紫􅂤三官不得復窺其閒隟雖獲隱遯世志未厭又不得返歸故遊栖不定也又曰以丸藥和水而飲之又并抱草而卧則傷死於空室中謂之兵解又日上品惟八素列紀受而不行餘皆白日尸解得爲飛仙登眞隱訣曰尸解者當死之時或刀兵水火痛楚之切不異世人也旣死之後其神方得遷逝形不能去尔又曰董仲居淮南人也少時服氣鍊形年百餘歲不老常見誣繫獄尸解仙去又曰清平吉沛人也漢髙祖時卒也至光武時故不老後尸解去眞誥曰頋歡字􅀇平吳郡人齊永平中卒於剡山葬鹽官樂附里木連理生墓縣令江山圖表狀歡尸解而去又曰辛􅀇子字延期隴西定谷人好道行渡秦川長梁津致溺水解而去之又曰張祖常者彭城人吳時北來行入方山洞室中託形墮車隱化幽館而修守一之業又曰劉平河者無名字漢末爲九江平河長行醫術有功德救人疾患如己之病行遇仙人周正時授以隱存之道居於方山洞室常服日月晨氣顔兒甚少後尸解而去又曰受大戒者死滅度鍊神上補天官謂之尸解又曰人死必視其形如生人視足不青皮不皺目光不毁者皆尸解也白日尸解自是仙也非尸解之例其用藥得尸解非是用靈丸之解化者皆不得返故鄕三官執之也白日去謂之上尸解夜半去謂之下尸解向晚暮之際去者謂之}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_664-1b}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_664-2a}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 屬之隠形也雖仙品之下第其禀受亦不輕也所云隠回三光白日陸沈者也若修下尸解者皆不得返望故鄉此謂下解之道也名配紫簡三宫不得復窺其間巢雖獲隠遯世志未厭之不得返歸故鄉遊栖不定也又曰以丸藥和水而飲之又并抱草而卧則傷死於空室中謂之兵解又曰上品惟八素列紀受而不行餘皆白日尸解得為飛仙登真隠訣曰尸解者當死之時或遇刀兵水火痛椘之功不累世人也既死之後其神方得遷逝形不能去爾又曰董仲居淮南人也少時服氣煉形年百餘歳不老常見誣繫獄尸解仙去又曰清平吉沛人也漢髙祖時卒及至光武時猶不老後尸解去真誥曰願歡字𤣥平吳興人齊永平中卒於剡山葬鹽官樂附里墓生連理木縣令江山圗表狀歡尸解而去又曰辛𤣥子之无期隴西定谷人好道行渡秦川長梁津致溺水觧而去之又曰張常祖者彭城人吳時北來行入方山洞室中託形墮車隠化幽舘而修守一之業又曰劉平河者無名字漢末為九江平河長行醫術有功徳救人疾患如已之病行遇仙人周正時授以隠存之道居於方山洞室常服日月神氣顔色如少後尸觧而去又曰受大戒者死滅度煉神上補天宫謂之尸觧又曰人死必視其形如生人視足不青皮不皺目光不毀者皆尸解也白日尸解自是仙也非尸解之例其用也藥得尸解非是用靈丸之解化者皆不得返故鄉三官執之也白日去謂之上尸解夜半去謂之下尸解向晩暮之際去者謂之}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_WYG_664-2a, image: WYG0899/WYG0899-0002a.png}
