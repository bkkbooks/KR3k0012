  - {type: variant, offset: 185, length: 2, content: 進至, SBCK: 曰王晉賢晉王夷甫女也爲愍懷太子妃洛城亂劉曜略晉賢欲妻之晉賢大罵曰我皇太子婦司徒公之女胡羌小醜敢欲干我乎言畢投河其侍婢名六出投河死時遇嵩髙女眞韓西華出遊遂俱獲内救外示其死體實密濟脟人嵩髙山今華陽内洞中六出年二十餘體貌脩整有節操姓田漁陽人魏故浚儀令田諷之孫諷有陰德以及六出耳又曰董奉字君異候宫人也吳先主時有少年爲奉本縣長見奉年四十餘不知有道罷官去後五十餘年復見他職行經候官諸故吏人皆往見之奉顔皃}
