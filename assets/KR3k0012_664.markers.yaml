  - {type: variant, offset: 6, length: 1, content: 記, SBCK: 鄧岱留不聽去洪乃止羅浮山中錬丹積年忽與岱書當逺行尋藥岱得書徑住别而洪已亡年八十一顔色如平生入棺輕如空衣尸解而去道學傳}
  - {type: variant, offset: 6, length: 1, content: 記, WYG: 鄧岱書當逺行岱留不聴去洪乃止羅浮山煉丹積年忽與岱藥岱得書徑往别而洪已亡年八十餘顔色如平生入棺惟有空衣尸解而去道學傳}
