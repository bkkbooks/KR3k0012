  - {type: variant, offset: 263, length: 12, content: 青城山洞周二千里蜀郡界黃, krp: 諸尸解者按四極眞科云一百四十年乃得神中眞官於是始得飛華蓋乘輦龍登太極遊九宫也雌一五老經曰夫仙之去世也或絶跡藏往而内栖事外或解劒遺杖飄然雲霧延神寄玄莫知其端緒也又曰若有此五老經雖不齋戒存思與俗混雜故不失隱存下神白日尸解及命過大陰地下主者或遺骨胎變受化南宫是必宿有骨縁也上淸經曰元始天}
