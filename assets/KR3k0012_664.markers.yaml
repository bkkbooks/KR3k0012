  - {type: variant, offset: 136, length: 1, content: 沓, krp: 去又曰張微子漢昭帝時將作大匠張慶女也微子好道得尸解又曰蘇子訓者齊人也人莫知其有道在鄉里行信讓積年顔色不老人追隨之}
  - {type: variant, offset: 139, length: 14, content: 底晉咸康中江州剌史庾亮迎吳猛, SBCK: 所常服餌好淸談常閑居讀易爲文皆有意義京師貴人聞之莫不虚心謁見不可致之後至適出門諸貴人冠蓋塞路諸生具言適去矣東陌上乘驢者是也各奔馬逐之不及子訓至陳公家言曰吾明日當去不復還也陳公以葛布單衣一送之至時子訓死解化仙去又曰陰長生新野人也後漢戚里專務道術聞馬明生得度世之道乃造焉明生但日夕別與之高談論語當世之事治田農之業如此十餘年長生不懈同事明生者十二人皆悉歸唯長生彌肅明生曰子眞得道矣乃}
