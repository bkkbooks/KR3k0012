  - {type: variant, offset: 72, length: 1, content: 彭, SBCK: 道林中有五種尸解符今太􅀇陰生符及是一病解者列仙傳曰􅇞封黃帝時爲陶正以火自燒而隨煙上下眞誥云􅇞生服石腦而火則是作火解也又曰司馬季主漢文帝時人受西靈子都劒解之道在委羽山大有宮服明丹之華抱扶晨之暉兒如女子􅁂長三尺一男名法育一女名濟華同得道眞訣云季主服靈散濳升猶首足異處此語似作劒兵解法兵解則不得在太極而其女尚讀洞經便是別修髙法也守􅀇白術隱居太茅山東守􅀇白能隱形亦數見身介琰者白羊公弟子也今在建安方山琰初爲孫權所殺解化而去又曰愕綠華者女仙也顔整晉穆帝昇平三年己未十一月十日降於羊權家自云南山人權字道學即晉􅂤文時黃門侍郞羊欣之}
  - {type: page-break, offset: 72, content: '', id: KR3k0012_SBCK_664-4a}
  - {type: variant, offset: 72, length: 1, content: 彭, WYG: 道林子有五種尸解符太太𤣥隂生符及是一病解上者列仙傳曰寗封黄帝時為陶丘以火自燒而隨煙上下真誥云寗生服石腦而火則是作火解也又曰司馬季主漢文景時人受四靈子都劔解之道在委羽山洞天服明宫丹之華抱扶晨之暉貌如子女鬢長三尺有男名法霄一女名濟華同得道真誥云季主服靈散替升猶首足異此諳可以知劔兵解法兵解則不得在太極而其女尚讀洞經便是别修髙法也守𤣥曰陶隠居在茅山東守𤣥白能隠形亦教見身介琰者貞白公弟子也今在建安方山琰初為孫權所殺解化而去又曰萼緑華者女仙容顔齊整晉穆帝升平三年已來十一月十日降於羊權家自云南山人權好道學即晋簡文時黄門待即羊欣之}
  - {type: page-break, offset: 72, content: '', id: KR3k0012_WYG_664-6a, image: WYG0899/WYG0899-0004a.png}
  - {type: page-break, offset: 72, content: '', id: KR3k0012_WYG_664-6b, image: WYG0899/WYG0899-0004b.png}
  - {type: variant, offset: 72, length: 1, content: 彭, krp: 道林中有五種尸解符今太玄陰生符及是一病解者列仙傳曰寗封黃帝時爲陶正以火自燒而隨煙上下眞誥云寗生服石腦而火則是作火解也又曰司馬季主漢文帝時人受西靈子都劒解之道在委羽山大有宮服明丹之華抱扶晨之暉兒如女子鬢長三尺一男名法育一女名濟華同得道眞訣云季主服靈散濳升猶首足異處此語似作劒兵解法兵解則不得在太極而其女尚讀洞經便是別修髙法也守玄白術隱居太茅山東守玄白能隱形亦數見身介琰者白羊公弟子也今在建安方山琰初爲孫權所殺解化而去又曰愕綠華者女仙也顔整晉穆帝昇平三年己未十一月十日降於羊權家自云南山人權字道學即晉簡文時黃門侍郞羊欣之}
  - {type: variant, offset: 74, length: 0, content: '', SBCK: 也權及欣皆濳修道要躭􅀇味眞緑華云凡修道之士視爵位如過客視金玉如瓦礫則得長生因授權尸解法亦隱景化去又曰中侯王夫人於兄子晉處受飛解脫網之道又曰蔡天生上谷人少賣香於野外性仁好道逢河伯少女市香天山又曰韓崇字長季吳郡人也漢明帝時人少好道林屋仙人王瑋􅀇曾授以流珠丹一法祟奉而修之太有驗後瑋􅀇授以隱解而去入大霍山度世爲右理中監漢起居注曰李少君之將去也武帝夢共登髙山見使者稱太一之命召請旣􅁴語左右曰少君將去數日果病死解去靈寶赤書曰三元王符與靈寶五篇眞文同出太􅀇都玉京山紫㣲上宫此文禳陽九百六刼會之數度學者之身􅀇都有此經佩之得爲聖上朝太淸功德未滿即得尸解又曰社契字廣平京兆人建安初來江東依孫䇿後遇介琰先生授之以稱異人再拜奉其香火少女乃教其朝天帝王皇之法尸解而去隱存方臺老君傳九眞五石並日暫入太陰權過三官者始得上解之法又曰紫陽公傳西城劒解之法修佩神劒七年朱書符解化去若以曲晨飛精題之者立能變遁隱化太一遣吉光寶衣來迎又曰王逺字方平見蔡經骨相當尸解且告以要}
  - {type: page-break, offset: 74, content: '', id: KR3k0012_SBCK_664-4b}
  - {type: page-break, offset: 74, content: '', id: KR3k0012_SBCK_664-5a}
  - {type: variant, offset: 74, length: 0, content: '', WYG: 也􅁠及欣皆潜修道要丹𤣥味真綠華云凢脩道之士視爵位如過客視金玉如瓦礫則得長生因受􅁠尸解法亦隠景化去又曰中侯王夫人於兄子晋䖏受飛解脱綱之道又曰蔡天生上谷人少賣香於野外性仁恕道河伯少如市香天山又曰韓崇字長季吳郡人漢明帝時人少好道林屋仙人王瑋𤣥曽授以琉珠丹一法崇奉而脩之大有騐後瑋𤣥授以隠解而去入霍太山度世為右理中監漢起居注曰李少君之将去也武帝夢共登髙山見使者稱太乙之命召請既覺語左右曰少君将去數日果病死解去靈寳赤書曰三元玉符干靈寳五篇真文同出太𤣥都玉京山紫微上宫此文記陽九百六刼㑹之數度學者之身𤣥都有此經佩之得為上聖朝太清功徳未徳即得尸觧又曰杜契字廣平京兆人建安初來江東依孫䇿後遇介琰先生授之以異人丹拜奉其香火少女乃教其朝天帝玉皇之法尸觧而去隠存方臺老君傳九真五石並曰暫入太隂権過三官者始得上觧之法又曰紫陽公傳西城劔觧之法脩佩神劍七年朱書符觧化去若以曲神飛精題之者立能變遁隠化太乙遣吉光寳衣來迎又曰王逺字方平見蔡經骨相當尸觧且告以要}
