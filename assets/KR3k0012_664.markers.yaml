  - {type: variant, offset: 506, length: 152, content: 太湖中下有洞潛通五岳號天后別宮夏禹治水平後藏五符於此吳王闔閭使龍威丈人入山所得是也真誥云包山下有石室銀房方圓百里又有白芝隱泉泉水紫色又曰城玉山洞周三千里周司命先在恒山中太玄玉女語令往西城師王君於是往焉即此山也又曰厚載之中有洞天三十六所又八海中諸山亦有洞宮或方千里五百里非三十六洞天之例也五岳名山皆有洞宮或, SBCK: 㑹稽南行}
