  - {type: variant, offset: 1818, length: 274, content: 復內篋中辭石室中人及還家著奮葛單衣及自負竹篋而去遂不復還後三十年弟子見遙在馬蹄山下顏更少蓋地仙也又曰陳子皇濟陰人也得餌朮方服之絕穀初年七十餘衰老及服餌反少在民閒積年入霍山去又曰葛洪字稚川琅邪人不好榮爵閉門卻掃尚神仙道術未嘗交遊於餘杭山見何多道郭文舉目擊而已各無所言從祖玄吳時學道得成以其鍊丹術授弟子鄭隱字思遠洪就隱學悉得其法道學傳曰鮑靚字太玄以太興元年八月二十日步道上京行達龍山見前有一少年姿容整茂徒行甚徐而去殊疾靚垂名馬密逐數里終不能及意甚異之及澗曰視若似有道者少年荅曰我中山陰辰生也又曰介像字元則會稽人也學通五經能屬文後學道聞有還丹經周疑天下求, WYG: ''}
