  - {type: variant, offset: 154, length: 0, content: '', SBCK: 入靑城山以太淸神丹經授之丹成仙去著書九篇云上占仙者多矣伹漢興以來四十五人連金爲六矣三十人尸解餘並白日仙去陰君自序曰漢延光元年新野山北之子受仙君神丹要訣道成去世付之名山於是陰君裂黃素舄丹經一通函以文石置嵩髙山一通黃櫨􅂤漆書之函以青玉置太華山一通黃金之􅂤刻而書之函以白銀著蜀經山一封縑書合爲一篇付}
  - {type: variant, offset: 154, length: 0, content: '', krp: 入靑城山以太淸神丹經授之丹成仙去著書九篇云上占仙者多矣伹漢興以來四十五人連金爲六矣三十人尸解餘並白日仙去陰君自序曰漢延光元年新野山北之子受仙君神丹要訣道成去世付之名山於是陰君裂黃素舄丹經一通函以文石置嵩髙山一通黃櫨簡漆書之函以青玉置太華山一通黃金之簡刻而書之函以白銀著蜀經山一封縑書合爲一篇付}
  - {type: variant, offset: 156, length: 0, content: '', SBCK: 使世世當有所傳付又著詩三篇以示將來也又曰成仙公名武丁桂陽人也後漢時爲縣小吏少言大度博通經學不從師授有自然之性時先被使京還過長沙郡投郵舎不及遂宿於野忽聞樹上人語云向長沙市藥平旦視之乃二白鶴仙公異之遂往市見二人張白蓋相從而行謂仙公曰君當得地仙耳令還仙公病卒尸解又曰龍伯髙者後漢伏波將軍馬援戒其兄子稱此人之美可法者也伯高後從仙人刁道林受服胎氣之法又受服青䭀方醉亡隱處方臺師定籙君伯高名述京兆人漢建武中爲仙都長至零陵太守馬援戒兄子嚴書曰龍伯高敦厚周愼口無擇言謙約節儉公廉有威吾愛之重之願汝曹効之又曰漢期門郎程偉妻得道者也能通變化偉逼求術妻不傳逼之不巳妻蹷然而死尸解而去南岳魏夫人内傳曰淸虚眞人王子}
