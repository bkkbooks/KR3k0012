  - {type: variant, offset: 8, length: 2, content: 蓬萊, SBCK: 吳猛字雲世有道術􅁃亮聞其神異厚禮迎之來武昌尋求歸辭以筭盡請具棺􅁃公閔然卽日發遣未達家五十里而終形狀如生又曰若六行未通宿植尚少則入中品以爲尸解遁變也降此以下是正服御功行淺劣則入階下階勝者則滅度更生更生之後修道隨功多少}
  - {type: variant, offset: 8, length: 2, content: 蓬萊, WYG: 吳云字云世有道術庾亮聞其神異厚禮遺之來武昌尋求歸辭以筭盡命具棺庾公閔然即日發遣未逹家五十里而終形狀如生存又曰若六行未通宿根常在則入中品以為尸觧遁變也降此以下是正服御功行淺劣則入下階階勝者則滅度更生更生之後修道隨功多少}
