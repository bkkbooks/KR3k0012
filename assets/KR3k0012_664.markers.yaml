  - {type: variant, offset: 217, length: 2, content: 西玄, SBCK: 尸解之仙不得御華蓋乘飛龍登太極遊九宫也諸有單用曲晨飛精劒解者得八素列紀惟奉寶祕不修行皆白日尸解其有作水火兵病及用大刀竹杖解去者先詣名山並爲太淸尸解凡修劒解之道並紀名紫􅂤上隷髙仙諸有宿功善業陰德信仙其神得詣朱火丹陵宮受學仙道爲九宫眞人諸有用大極尸解之道夜半去者職爲地眞應尸解者或學功淺深志尚頽廢或爲祭酒精勒救治者並得爲}
