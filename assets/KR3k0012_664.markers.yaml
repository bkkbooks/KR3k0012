  - {type: variant, offset: 266, length: 0, content: '', WYG: 以太清神丹經授之丹成仙去著書九篇云上古仙者多矣但漢興以來四十五人連余為六矣三十人尸觧餘並白日仙去隂君自序曰漢延光二年新野闕之子受仙君神丹要訣道將去世付之名山於是隂君裂黄素寫麻經一通凾以文石置嵩髙山一通黄櫨漆簡書之函以青玉置太華山一通黄金之簡刻而書之函以白銀置蜀經山一封縑書合為一篇付弟子使世世當有所傳付又著詩三篇以示將來也又曰成仙公名武丁桂陽人也後漢時為縣小吏少言大度兼通經學不從師授有自然之性以吏事至京還過長沙郡投郵舍不及遂宿於野忽聞樹上人語云向長沙市藥平旦視之乃二白鶴仙公異之遂往視市見二人張白蓋相從而行與仙公曰君當得地仙耳令還仙公病卒尸觧又曰龍伯髙者後漢伏波將軍馬援戒其兄亟稱此人之美可法者也伯髙後從仙人刁道休受服胎氣之法又受服青飢方醉亡隠䖏方臺師定籙君伯髙名述京兆人漢建武中為仙都長至零陵太守馬援戒兄子嚴書曰龍伯髙敦厚周慎口無擇言謙約節儉亷公有威吾愛之重之願汝曹効之又曰漢期門郎程偉妻得道者也能通變化偉逼求術妻不傳逼之不已妻蹷然而死尸觧而去南嶽魏夫人内傳曰清虛真人王子登與東華青童君來降受夫人曰隠遷曰醫神散一劑又與白石精金化形靈丸使頓服之稱疾弗行尅期有定俱㑹丹壠之南陽洛陽山中言畢二真人去即服藥因稱脚疾閉目寝息飲而不食夜半之後太一𤣥仙遣颷車來迎駕氣騁御經入帷中其時弟子侍疾衆親滿側莫之覺也洛陽山西夏禹廵狩名山刻石於此下有}
