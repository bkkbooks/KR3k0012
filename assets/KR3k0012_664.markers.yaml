  - {type: variant, offset: 4, length: 0, content: '', SBCK: 下主者也瓊文四紀篇曰得九眞中經者白日尸解或曰飛行羽經輕也又六紀篇曰靈書紫芝或五老寶經有之者尸解神}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_664-2b}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 下主者也瓊文四紀篇曰得九真中經者謂之白日尸解或曰飛行羽經輕也又曰六紀篇曰靈書紫芝或五老寶經有之者尸觧神}
