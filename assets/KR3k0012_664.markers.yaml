  - {type: variant, offset: 1192, length: 1027, content: 止嵩高山又曰李意期蜀人也世常見之衍道行於人於蜀城角穴土居之當劉備欲東伐吳報關羽之怨使迎意期到甚重之問其伐吳不荅而求紙畫兵馬器仗萬數乃一一裂壞之又畫一尊官掘地埋之乃徑去備不悅後果為吳所破大敗十餘萬眾纔數百人還器甲軍資略盡備恚怒病終於永安宮意期少言人有所問都不對蜀中人有憂患往問之曰吉凶自有常候但占其顏色慘悅耳後入琅琊山不復出又曰封君達隴西人服黃連五十年餘入鳥鼠山中服練百餘歲往來故里常騎青牛施藥愈病人惟呼青牛道士居人閒積年後入虎丘山仙去又曰王仲都西漢人也少修道德孝文以積寒之日令仲都單衣載四馬於上林昆明環水而馳御者原衣狐裘而寒慄垂死仲都色曾不變體和氣溢如焰及盛暑圍以烈火體亦不汗後不知所之又曰有稷丘公者太山下道士也漢武帝東巡狩至泰山稷丘公乃冠章甫衣黃擁琴來迎上曰陛下勿上也恐傷足帝必欲上及數里果如言但諱之故伹祠而還為稷丘公立祠復百戶使奉承之也又曰戴孟本姓燕名濟字仲微漢明帝時人入華山及武當山受裴君玉佩金璫經及受石精金光符復有太微黃書能周旋名山又曰左慈字元放廬江人也明五經通星氣見漢祚衰微乃學道精思於天柱山得石室中九丹金液經是太清中經法也師李仲甫又葛玄師於慈曹操聞而召之問學道之由慈不荅操怒欲規殺之乃為置酒俄失慈建安末渡江尋山入洞在小括山顏色甚好又曰王遙字伯遼鄱陽人也頗行治病皆愈遙有篋長數寸一弟子姓錢隨遙十數年未嘗見開之一夕天雨晦冥遙使錢以九節杖負此篋將錢出行所道非所曾經度行十數里登一小山入石室中先有二人遙見既至取篋發之中有五舌竹簧三枚三人各鼓一簧良久復內篋中辭石室中人及還家著奮葛單衣及自負竹篋而去遂不復還後三十年弟子見遙在馬蹄山下顏更少蓋地仙也又曰陳子皇濟陰人也得餌朮方服之絕穀初年七十餘衰老及服餌反少在民閒積年入霍山去又曰葛洪字稚川琅邪人不好榮爵閉門卻掃尚神仙道術未嘗交遊於餘杭山見何多道郭文舉目擊而已各無所言從祖玄吳時學道得成以其鍊丹術授弟子鄭隱字思遠洪就隱學悉得其法道學傳曰鮑靚字太玄以太興元年八月二十日步道上京行達龍山見前有一少年姿容整茂徒行甚徐而去殊疾靚垂名馬密逐數里終不能及意甚異之及澗曰視若似有道者少年荅曰我中山陰辰生也又曰介像字元則會稽人也學通五經能屬文後學道聞有還丹經周疑天下求之不得其師乃入山精思遇一人授以還丹經告曰得此便仙勿復他為也乃辭歸像嘗往弟子駱延雅舍帷下平床中有諸生論左氏義不平像傍聞為辨正諸生知非常人密表薦於吳主像欲去吳主詔至武昌甚尊異之稱為介君為賜第供帳黃金千斤像後告病須臾便死詔葬之為立廟先主時躬祭常有白鶴集座上徘徊, SBCK: 解形}
