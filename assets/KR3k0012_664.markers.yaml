  - {type: variant, offset: 2356, length: 1432, content: 百餘歲又曰王烈字長休邯鄲人也常黃精及鈆二百餘歲行步若飛博極群書嵇甚重之數數就學共入太行山見山裂有青石髓流出烈取髓丸之成石氣如米飯嚼之亦然烈因攜少歸欲遺康康取而視之已成青石擊之錚錚康即與往視斷山山已如故烈入河東抱犢山見一石室室中有石架架上有素書兩卷莫識其字暗記數十字以示康康盡識之烈喜乃與康共往讀之至其所失其石室烈私語弟子曰叔夜來合得道故也按神仙經云神仙五百年山輒一開其中石髓出得而服之壽老烈後莫知所之又曰步正者字玄真巴東人也說秦始皇時事了如目前漢末將數十弟子入吳授以服氣及石髓方小丹法年四百歲又曰焦光宇孝然河東人也常食白石煮如芋每入山伐薪負之與人魏受禪與人別去不知所適又曰孫登不知何許人常止山門穴地而坐彈琴讀易冬單衣天大寒人視之被髮丈餘自覆身歷世見之顏色如故更無餘資亦不食時楊駿為太傅使迎問之不荅駮遺布袍登出門借刀斷袍上下異處置駿門下知駿當伏誅時曾稽嵇康曾詣登登不與語康乃扣難之登彈琴自若久之康退登曰康才高識寡劣於保身又曰帛和宇仲理遼東人也入地肺山事董奉奉以行氣服術法授之告和曰吾道盡此不能得神丹金沙周遊天下無山不往汝今少壯廣求索之和乃到西城山事王君君語和大道訣曰此山石室中當熟視北壁當見壁有文字則得道矣視壁三年方見文字乃古人之所刻刻太清中經神丹方及三皇天文大字五岳真形圖皆著石壁和諷誦其萬言義有所不解王君乃授之訣曰作地仙在林慮山又曰宮嵩琅邪人也能文著道書二百卷服雲母為地仙又曰李常在蜀郡人也少治道術世常見之在虎壽山下陶潛桃源記曰晉太康中武陵人捕魚從溪而行忘路遠近忽逢桃花林夾岸芳華鮮美落英繽紛林盡得山山下有一小口初極狹行四五步豁然開朗屋宇連接雞犬相聞男女衣著悉如外人見漁父驚為設酒食云先世避秦難率妻子來此遂與外隔問今是何代不知有漢魏晉既出白太守遣人隨往尋之迷不復得真誥曰劉憑沛人也學道於稷丘子常服石英年三百餘歲有少容嘗到長安諸貴人聞憑有道乃往拜見之又有百餘人隨憑語賊曰汝輩作人何豺狼其心相教斷道危人利己此是伏尸都市肉饗鳥鳶之法賊忽頓伏駭去憑後入太白山數十年歸鄉里顏色更少又曰尹思字少龍安定人晉元康五年正月十五日夜坐屋中遣兒視月中有異物否兒曰今當有大水月中有一人披蓑帶劍思自視之曰月中人乃帶劍伏矛當大亂三十年復當小清思後不知所之又曰皇初平者丹谿人年十五家使牧羊有道士見其良謹便將至金華山石室中四十餘年不復念家其兄初起尋索歷年後見市中一道士言其處初起即隨去得見語畢問羊何在曰近在東耳初起往視之但見白石初平乃往叱石為羊數萬頭初起知得仙道便棄家其服松脂茯苓至五百歲初平改字為赤松子初起改字為赤魯班又曰呂恭字文敬於太行山採藥忽逢人授以仙方得道因遣恭去曰可視卿里及孫呂習者作道士民多奉事之恭傳言到習家扣門問訊奴出問公從何來恭曰此是家習聞驚喜出拜恭乃以神方授習而去習時已年八十服之還少至二百歲乃入山中子孫世不復老又曰沈建丹陽人世為長吏建好道不仕學服餌之術能治病飛行或去還如此三百餘年乃絕跡不知所之又曰許遠遊第三男名翽字道翔小名王斧糠粃世務居雷平山下修業精勤常願早遊洞室不欲久停人世遂詣北洞以梁太和六年於茅山舊宅年三十而告終即居方隅山洞方園館中常去來四平方臺後為上清仙去又曰馬明生臨淄人為縣吏逐賊被傷遇太真以靈丸得差後師安期生受服太清丹在世五百年漢靈帝光和中去世集仙籙曰楊平不知名姓在楊平山居多變化之術或問之乃曰我楊平洞中仙人耳稱每歲三元大節諸天各有上真下游洞天以觀其善惡人世死生興廢水旱風雨預開報洞中其龍神祠廟血食之司皆為洞府所統洞中仙曹如人閒郡縣聚落耳不可一一詳記也言訖而去, SBCK: ''}
