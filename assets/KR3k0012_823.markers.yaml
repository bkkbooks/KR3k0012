  - {type: variant, offset: 1003, length: 253, content: 上又曰夫國富多粟生於農故先王貴之民事農則田墾田墾則粟多粟多則國富國富則兵強兵強則戰勝戰勝者地廣農夫終歲之作不足以自食也故農者月不足而歲有餘也又曰先王者善為民興利除害故天下歸之所謂興利者利農事也所謂除害者禁害農事也又曰一農之量襃百畝也又曰上農挾五中農挾四下農挾三農有常業女有常事一農不耕民有饑者一女不織民有寒者孟子曰不違農時穀不可勝食者也孫卿子曰農精於田不可為農師賈精於市不以為市師又曰良農不為水旱不耕韓子曰歷山農者侵畔舜往耕其年讓畔國語管仲曰昔者先王處農就田野令農夫群萃而州處察其四時四時樹藝各有宜權節其用, WYG: ''}
