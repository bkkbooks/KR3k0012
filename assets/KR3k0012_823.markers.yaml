  - {type: variant, offset: 4034, length: 0, content: '', SBCK: 金言此黃帝榖仙之術以樂爲黄門郎令主之東觀漢記曰范充爲桂陽太守俗不種桑無蚕織絲麻之利􅀋皆以麻枲頭緼着衣民墮窳少麄履盛冬皆以火燎充令屬縣教民益種桑柘養蚕桑織履復令種紵麻數}
  - {type: variant, offset: 4036, length: 0, content: '', SBCK: 間人刺其利衣履温煖呉㑹分地記曰卞山者勾踐於此山鑄銅銅不鑠埋之生馬箠勾踐遣使者取徙於南社種之飾治以爲馬箠獻於呉陳書曰陳靈洗爲重安公性好播植躬勤耕稼至於水陸所冝刈穫早晚雖老農不能及也淮南子曰夫樹林者灌以梁水疇以肥壤疇壟也梁或作潦也一人養之十人㧞之林必無餘枿又曰昬􅓡中則務種􅂖二月昬時􅓡星中於南方朱鳥之􅀫也大火中則種􅁰菽大火東方蒼龍之􅀫四月建巳中南方也菽豆也虚中則種粟麥北方玄武之􅀫也八月建酉中於南方也又曰古者民茹草飲水}
  - {type: page-break, offset: 4036, content: '', id: KR3k0012_SBCK_823-6a}
  - {type: punctuation, offset: 4037, content: ；, id: KR3k0012_CHANT_823-bkkpn1362}
  - {type: 'tls:seg', offset: 4037, content: '', id: KR3k0012_CHANT_823-60a.8}
  - {type: variant, offset: 4037, length: 3, content: 九年耕, SBCK: 樹木之實蠃蚌之􅁏多􅐄毒傷之患患害於是神農乃始教民播五穀相土地原隰燥濕肥墝髙下百草之滋味水泉甘苦令民知避就當此之時一日}
  - {type: variant, offset: 4037, length: 20, content: 九年耕而餘三年之食三十歲民有十年之蓄說苑, WYG: 鳧鴈必以秕吏請以粟公}
  - {type: variant, offset: 4037, length: 20, content: 九年耕而餘三年之食三十歲民有十年之蓄說苑, krp: 鳬鴈必以秕吏請以粟公}
