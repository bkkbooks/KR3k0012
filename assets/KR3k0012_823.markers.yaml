  - {type: variant, offset: 3974, length: 2, content: 臣孝, WYG: 乘馬者足以代勞而已故行}
  - {type: variant, offset: 3974, length: 0, content: '', krp: 乗馬者足以代勞而巳故行則服軛止則就犂下種軛樓皆取備焉日種一頃至今三輔猶頼其利遼東耕犂轅長四尺廻轉相妨旣用兩牛兩人牽之一人耕一人種二人軛樓凡用兩牛六人一日則種二十五畝其懸絶如此陳留耆舊傳曰蕭令陳弇字叔明躬自握犂種五種榖有黄雀隨犂翔上崔寔政論曰武帝以隨遇爲搜粟都尉教民耕植其法三犂共一牛一人將之唐書曰天寳𥘉開砥柱之險以通流石中得古鐵犂鏵有平陸縣字因改河北縣名爲平陸縣後唐史明宗上顧謂侍}
  - {type: variant, offset: 3975, length: 9, content: 孝則事君忠臨難死士, SBCK: 曰朕昨日出城觀稼見百姓父子三人同曳犂耒者力農如是深軫子懷可賜耕牛二頭耦說文曰耦耕廣五寸爲伐二伐爲耦周禮地官下曰里宰以歳時合耦于耡以治稼穡趨其耕耨行其秩叙以待有司之政令而徴斂其財賦考工記日耜廣五寸二耜爲耦此言兩人相助耦而耕也鄭司農云耡讀爲籍杜子春云耡讀爲助謂相佐助又冬官曰匠人爲溝洫主通利田間之水道耜廣五寸二耜爲耦一耦之伐廣尺深尺謂之􅍒田首倍之廣二尺深二尺謂之遂古者耜一金兩人併發之其壟中曰􅍒畎上日伐伐之言發也􅍒􅅵也今之耜岐頭兩金象古之耦也毛詩周頌曰駿發爾私終三十里亦服爾耕十千維耦私}
