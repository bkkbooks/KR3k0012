  - {type: variant, offset: 3973, length: 0, content: '', krp: 弘農太守劉類多市犂鎋載所部貿絲管子曰距國門以外窮四竟之内丈夫二犂童子五尺一犂以爲三日之功令農始作服于公田鹽鐵論曰庶}
  - {type: variant, offset: 3974, length: 0, content: '', SBCK: 乗馬者足以代勞而巳故行則服軛止則就犂下種軛樓皆取備焉日種一頃至今三輔猶頼其利遼東耕犂轅長四尺廻轉相妨旣用兩牛兩人牽之一人耕一人種二人軛樓凡用兩牛六人一日則種二十五􅅿其懸絶如此陳留􅂄舊傳曰蕭令陳弇字叔明躬自握犂種五種榖有黄雀隨犂翔上崔寔政論曰武帝以隨遇爲搜粟都尉教民耕植其法三犂共一牛一人將之唐書曰天寳􅀄開砥柱之險以通流石中得古鐵犂鏵有平陸縣字因改河北縣名爲平陸縣後唐史明宗上顧謂侍}
