  - {type: variant, offset: 2073, length: 269, content: 非吾節札雖不才願附於子臧以無失節固立之棄其室而耕乃舍之傳言季禮之讓且明吳兄弟相傳又昭公五曰伍員如吳言伐楚之利於州于州于吳王僚公子光曰是宗為戮而欲反其讎不可從也光吳公子闔閭也反復也員曰彼將有他志光欲殺僚不利員用事故破其議而員亦知之余姑為之求士而鄙以待之計未得用故進勇士以求入於光退居邊鄙乃見專諸焉專諸勇士而耕於鄙穀梁傳成公曰郄克曰反魯衛之侵地使耕者皆東畝欲以利其戎車論語衛靈公曰君子謀道不謀食耕也餒在其中矣學也祿在其中矣又微子曰長沮桀溺耦而耕論語比考讖曰叔孫武叔毀孔子譬若堯民曰我耕田而食穿井而飲堯何力功周書曰神農之時天雨粟神農耕而種之韓詩, WYG: 風}
