  - {type: variant, offset: 4330, length: 2, content: 階為, SBCK: 􅁗民借父耰鋤猶有德色銍廣雅曰銍謂之刈綦文曰江湖以銍爲刈也尚書禹貢曰二百里納銍銍刈謂禾穗也說文曰銍穫禾短鎌釋名曰銍穫禾鐵也銍銍斷禾穗聲也銚說文曰錢銚也古田器也世夲曰倕作銚管子曰一農之事必有一銚然後成農鏄釋名曰鏄亦鋤􅀋迫也迫地去草也毛詩周頌良耜曰其饟伊黍其笠伊紏其鏄斯}
