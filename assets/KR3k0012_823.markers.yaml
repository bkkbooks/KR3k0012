  - {type: variant, offset: 4314, length: 1, content: 琴, krp: 治民君請用之爾雅曰斪斸謂之定郭璞曰鋤屬也犍爲舎人曰拘􅠁名定廣雅曰定耨纂又曰養苗之道鋤耨如銍柄長三尺刃廣三寸以封地除草也魏}
  - {type: variant, offset: 4316, length: 0, content: '', SBCK: 曰公孫淵官屬上書曰七營虎士五部蠻夷各懷素飽不謀同心􅁬臂大呼排門遁出近郊農民釋其耨鏄淮南子曰耨者剡耜而耕摩蜃蜃大蚌也摩令利用耨除草也又曰茢先稻熟農夫耨之者不以小利害大穫茢稈又曰聖人之用兵􅀂櫛髮耨苗所去者少所利者多吕氏春秋曰先生者美米後生者爲秕是故其耨也長其兄而去其弟養大殺小不知稼者其耨也去其兄而養其弟不収其粟而収其秕钃釋名曰钃誅也主以誅除物根株也說文曰钃斫也齊謂兹基一曰斤柄性}
  - {type: variant, offset: 4316, length: 0, content: '', WYG: 曰公孫淵官属上書曰七營虎士五部蠻夷各懐素抱不謀同心奮臂大呼排門遁出近郊農民失其耨鎛淮南子曰耨者剡耜而耕摩蜃蜃大蚌也摩令利用耕除草也又曰茢先稲熟農夫耨之者不以小利害大穫又曰聖人之用兵若櫛髪耨苖所失者小所利者多吕氏春秋曰先生者為米後生者為秕是故其耨也長其兄而去其弟養大殺小不知稼者其耨也去其兄而養其弟不收其粟而收其秕钃釋名曰钃誅也主以誅除物根株也說文曰钃斫也齊謂鎡基一曰斤柄性}
