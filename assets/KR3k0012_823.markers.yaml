  - {type: variant, offset: 2974, length: 252, content: 閑靜寡欲好學而貧常以耕藝為事又曰趙至字景真代郡人也寓居洛陽維氏令初到官至年十三與母同觀母曰汝先世本非微賤世亂流離遂為士伍耳爾後能如此不至感母言詣師受業聞父耕叱牛聲投書而泣師怪問之至曰我小未榮養使老父不免勤苦師甚異之宋書曰王韶之家貧好學嘗三日絕糧而執卷不輟家人請之曰囷窮如此何不耕荅曰我自耕耳齊書曰戴僧靜為北徐州刺史買牛給貧人令耕種梁書曰孔子祛會稽山陰人也少孤貧好學耕耘樵採常懷書自隨投閑則誦讀勤苦自勵遂通經術趙書曰東耕儀直殿中監鋪席於侍臣之南北面解匣出御表跽受黃門侍中侍中釋劍擎跽以頴授尊太常讚曰皇帝親耕, WYG: ''}
