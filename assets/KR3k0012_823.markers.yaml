  - {type: variant, offset: 1769, length: 303, content: 蔡邕章句曰禮成於三故天子三推卑者勞故三公五推也又王制曰三年耕必有一年之食九年耕必有三年之食以三十年之通雖有凶旱水溢民無菜色又少儀曰問士之子長幼長則曰能耕矣又表記曰天子親耕粢盛秬鬯以事上帝故諸侯勤以輔事於天子言無事而居位食祿是不義而富且貴左傳襄公七年曰夏四月三卜郊不從乃免牲孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也郊祀后稷以配天后稷周始祖能播植者是故啟蟄而郊郊而後耕今就耕而卜郊宣其不從也啟蟄夏正建寅之月耕謂春分又襄公十三年曰吳子諸樊既除喪諸樊吳子桑之長子也桑卒至此春十七月既葬而除喪將立季札札諸樊少弟季札辭曰曹宣公之卒也諸侯與曹人不義曹人將立子臧子臧去之遂弗為也以戌曹君君子曰能守節君義嗣也誰敢奸君有, WYG: 毛詩}
