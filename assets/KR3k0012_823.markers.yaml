  - {type: variant, offset: 2421, length: 281, content: 作百日不食肅侯下車而謝之又曰伍子胥進專諸於公子光退而與故太子建之孤子勝耕於野又曰陳涉少時與人傭耕輟耕壟上曰富貴無相忘傭者笑而應曰子為人傭耕何富貴耶涉曰嗟乎燕雀安知鴻鵠之志哉又曰高后立諸呂為王擅權用事朱虛侯年二十有氣力忿劉氏不得勢常入侍高后醼飲曰請為太后歌田太后曰試為我言田意曰深耕穊種立苗欲踈非其種者鋤而去之呂后默然戰國策曰主父欲代中山使李疵觀之疵曰舉士即民務名不好本朝上賢即耕者隋而戰士懦若此不亡者未之有也漢昭紀曰上耕于鉤盾弄田應劭曰昭帝九年未能親耕帝籍鉤盾有田近署故往試耕為戲弄也又曰江南之地火耕水耨應劭曰燒草下水種稻又曰夏侯勝每授書謂諸生曰學經不明不如歸耕, WYG: 廢讀誦}
