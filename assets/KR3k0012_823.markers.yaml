  - {type: variant, offset: 4019, length: 2, content: 賈誼, SBCK: 過十室之邑而下見山仰之見谷俯之種殖周禮地官大司徒之職曰辨十有二壤之物而知其種以教稼穡樹藝禮記月令曰孟春行冬令則水潦爲敗首種不入舊說云首種謂稷也又仲秋曰是月也勸人種麥無或失時又禮運曰爲禮不夲於義猶耕而弗種也嘉穀無由生也尚書洪範五行曰土爰稼穡種曰稼斂曰穡土可以耕可以歛稼穡作甘甘味生於百穀尚書酒誥曰妹土嗣爾股肱純其藝􅁰稷奔走事厥考厥長今徃當使妺土之人繼汝股肱之教爲純一之行其當勤種􅁰稷奔走土其父兄也尚書考靈耀曰春鳥星昏中以種稷鳥朱鳥謂鶉火夏火星昏中以種􅁰菽火大火也孝經援神契曰土黃白冝種禾黒墳冝􅁰麥蒼赤冝菽汙泉宜稻說文曰禾之秀實曰稼莖節爲禾從禾家聲一曰稼家事也一曰在野曰稼史記曰棄爲兒時其游戯好種樹麻菽漢}
  - {type: page-break, offset: 4019, content: '', id: KR3k0012_SBCK_823-4b}
  - {type: page-break, offset: 4019, content: '', id: KR3k0012_SBCK_823-5a}
  - {type: variant, offset: 4019, length: 0, content: '', WYG: 過十室之邑而下見山仰之見谷俯之種植周禮地官大司徒之職曰辨十有二壤之物而知其種以教穡稼樹藝禮記月令曰孟春行冬令則水潦為敗首種不入又仲秋月是月也勸人種麥無或失時又禮運曰為禮不本於義猶耕而勿種也尚書洪範五行曰土爰稼穡稼穡作甘尚書酒誥曰妺土嗣爾股肱純其藝黍稷奔走事厥考厥長尚書考靈耀曰春鳥星昏中以種稷夏火星昏中以種黍菽孝經援神契曰土黄白宜種禾黒墳宜黍麥蒼赤宜菽泉宜稲說文曰禾之秀實曰稼莖節為禾家聲一曰稼家事也一曰在野曰稼史記曰棄為兒時其游戲好樹麻菽漢書曰景帝三年春正月詔曰農天下之本也黄金珠玉飢不可食寒不可衣以為幣用不識其終始間嵗或不登意為末者衆農民寡也其令郡國務勸農桑益種樹可得衣食勸吏發民若取庸黄金珠玉者坐贜為盗二千石聴者與同罪又曰王莽篡位二年興神仙事以方士蘇樂言起肖臺於宫中臺成萬金作樂其上順風作液湯又種梁禾於殿中或曰五色禾也先鬻鶴髓鬻者煮也瑇瑁犀玉二十餘物漬種計粟斛成一金言此黄帝榖仙之術以樂為黄門郎令主之東觀漢記曰范克為桂陽太守俗不種桑無蠶織絲麻之利類皆以麻枲頭緼著衣民墮窳少麄履盛冬皆以火燎充令属縣教民益種桑柘養蚕絲織履復令種紵麻數年之間人賴其利衣履温煖吴會分地記曰卞山者勾踐於此山鑄銅銅不鑠埋之生馬箠勾踐遣使者取徒於南村種之飾治為馬箠獻於吴陳書曰陳靈洗為重安公性好播植躬勤耕稼至於水陸所宜刈穫早晩雖老農不能及也淮南子曰夫樹林者灌以梁水疇以肥壤一人養之十人㧞之林必無耕又曰昏孤中則務種榖二月昏時孤星中於南方朱雀之宿也大火中則種黍菽大火東方蒼龍之宿四月建巳中南方也虛中則種粟麥北方𤣥武之宿也八月建酉中於南方也又曰古者民茹草飲水食樹木之實蠃蚌之肉多疾毒傷之患於是神農乃始教民播五榖相土地原隰燥濕肥墝髙下百草之滋味嘗泉甘苦令民知避就當此之時一日而遇七十毒又曰文公種米吕氏春秋曰氷凍方固后稷不種后稷之種必待春論衡曰后稷為種藝為戲汜勝之書曰稗水旱無不熟之時又特滋盛易得蕪穢良田畆得二三十斛宜種之以備凶年又稗中有米熟時一可𢷬取炊之不減粢米又可釀酒武帝時令典農種之一頃收二千斛斛得米三斗大儉可磨食之又曰三月榆莢雨時髙地強土可種禾薄田不能糞者以原蠶矢雜禾種之則禾不蟲又取馬骨莝之一石以水三石煮之三沸漉滓以汁漬附子五枚漬三四日去附子以汁和蠶矢燒如粥先種二十日以溲種曝勿令濕至種時以餘汁溲之種之則不生蝗蟲無馬骨汁亦可用雪雪者五榖之精也常以冬藏雪汁器盛埋地中治種如此則收萬倍又曰種傷濕鬱熱則生蟲取麥種候熟可穫擇穂大疆者秤束立塲之髙燥處無令有白魚取乾草雜藏之欲知嵗所宜以布囊盛粟諸物種平量埋隂垣之下冬至後五十日發取量之息􅇰多者嵗所宜又曰凡田種麥為首傷於大稠者鋤而稀之秋以鋤以棘柴曵之以壅麥根故曰子将欲富黄金覆土至春冬凍解棘柴曵之絶其乾葉到榆莢雨時候土白覆鋤如此收必倍冬雨雪止掩雪勿令從風飛去後雪復如此麥能早多實春凍解耕種土和遊麥生或茂大鋤如宿麥也又曰黍者暑也禾生心天雨灌其心必傷無實初種時務令兩人對持長索去其白露日出乃止種黍覆土鋤治如禾法欲稀於禾又曰大豆保歳易為宜古之所備㓙年也大豆生戴甲而出種土不可厚厚則項折不能長逹屈於土中而死又曰種稲春凍解地氣和時耕冬至後百三十日種大種時也又曰種麻預軟和田二月下旬三月上旬傍雨種其秕又曰種枲春凍解耕治其土春草生布糞田復耕平摩之又曰種小豆忌夘稲忌辰禾忌丙黍忌丒麻忌辰秫忌未寅小麥忌戌大麥忌子大豆忌甲凡九榖忌日不種之避其忌不可敗傷諸事忌禁日此非空言也其道自然若燒黍穰則害瓠也崔寔四民月令曰正月可種葵四月可収冬葵子六月六日可種葵中伏之後可種冬葵八月可種乾葵物理論曰稼借種也古今之言云餘夫稼農之本也耘說文曰耘除田間穢也左𫝊昭元年曰晉趙文子曰譬如農夫是穮是蓘毛詩甫田曰或耘或耔黍稷薿薿又周頌曰載芟載旅其耕澤澤千耦其耘徂隰徂畛論語曰子路從而後遇丈人以杖荷蓧子路問曰子見夫子乎丈人曰四體不勤五榖不分孰為夫子植其杖而芸宋書曰栁元景顔師伯嘗詣沈慶之會其遊田元景等鳴笳列卒滿道慶之獨與左右一人在田見之悄然改容曰夫貧賤不可卑富貴亦難守吾與諸公並出貧賤因時際會榮貴至此惟當共思損挹之事老子八十之年自見成敗者幾多諸君炫此車服欲何為於是挿杖而耘不為之顧元景等徹侍褰裳從之管子曰萬室之都必有萬鍾之藏藏鏹千萬千室之都必有千鍾之藏藏鏹百萬春以奉耕夏以奉耘孟子曰人病舍其田而耘人之田所求於人者重而所以自任者輕}
