  - {type: variant, offset: 4011, length: 0, content: '', WYG: 天寶初開砥柱之險以通流石中得古鐵犁鏵有平陸縣字因改河北縣為平陸縣後唐史明宗上顧謂侍臣曰朕昨日出城觀稼見百姓父子三人同曳犁耒者力農如是深歉予懐可賜耕牛二頭耦説文曰耦耕廣五寸為代二代為耦周禮地官下曰里宰以歳時合耦于鋤以治稼穡耨行秩叙以持有司之政令而徴歛其財賦又冬官曰匿人為溝洫耜廣五寸二耜為耦一耦之伐廣尺深尺為之畝田首倍之廣二尺深二尺謂之遂毛詩周頌曰駿發爾私終三十里亦服爾耕十千為耦國語曰吴王還自伐齊乃誶申胥曰昔吾先王體徳聖明達于上帝譬如農夫作耦以刈殺四方之蓬蒿董仲舒云}
