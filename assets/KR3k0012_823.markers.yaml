  - {type: variant, offset: 4068, length: 137, content: 人致邑曾子不受曰受人者畏人與人者驕人終不受太元經曰神農冬耕被服純青崔元始正論曰宣帝使蔡登校民耕相三犂共一牛一人持之下種挽摟皆取備焉一日種頃也拾遺錄曰而而支夫善耕婦人善織以五色絲稍內口中兩手引而結之則成文錦丈夫多力勤稼一日耡十頃之地董正則傳曰劉恭嗣少有異才聞司馬操愽物多通故往, SBCK: 過冀}
