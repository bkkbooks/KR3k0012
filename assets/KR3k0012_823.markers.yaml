  - {type: variant, offset: 2706, length: 148, content: 王莽末盜賊起人皆憂移徙遁逃莫事農桑淳于恭遂獨耕鄉人止之曰世方散亂死生未分何空自苦為恭曰正我不得食他人食之何傷柰何不耕東觀漢記曰梁鴻乃將妻之霸陵山中耕耘織作以供衣食彈琴誦書以娛其志又曰承宮將妻之華陰山谷耕種禾黍臨熟人就認之宮悉推與去由是顯名又曰第五倫為會稽太守免官歸田里身自耕種不交通人物魏略曰常林, SBCK: 徐苗}
