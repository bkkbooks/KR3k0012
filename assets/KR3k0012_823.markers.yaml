  - {type: variant, offset: 2855, length: 232, content: 單貧自非手力不取之於人性好學漢末為諸生帶經耕鋤其妻常自擔餉餽之林雖在田野其相敬如賓吳錄曰徵崇字子知遭亂遂隱於會稽躬耕以求其志好尚者從學所教不過數人輒止欲令其業必有成也吳志曰薛綜上䟽云任延為九真太守乃教其耕犁使之冠履晉書曰朱冲字巨容少有志行閑靜寡欲好學而貧常以耕藝為事又曰趙至字景真代郡人也寓居洛陽維氏令初到官至年十三與母同觀母曰汝先世本非微賤世亂流離遂為士伍耳爾後能如此不至感母言詣師受業聞父耕叱牛聲投書而泣師怪問之至曰我小未榮養使老父不免勤苦師甚異之宋書曰王韶之, SBCK: 􅀌}
