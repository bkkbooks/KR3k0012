  - {type: variant, offset: 4317, length: 2, content: 娛覩, SBCK: 曲者也管子曰美金以鑄戈劒矛㦸試諸狗馬惡金以鑄斤斧鉏夷屬欘試諸木士夷鉏􅁼也屬欘钁􅀋又曰匠人有感斤欘故繩可得斷也孟子曰齊人有言曰雖有智慧不如乗􅀔雖有鎡基不如待時兹基田器耰說文曰耰摩田器也論語曰長沮桀溺耦而耕孔子過之使子路問津焉桀溺曰子爲誰曰爲仲由曰是魯孔丘之徒與對曰然滔滔者天下皆是也誰以易之且而與}
