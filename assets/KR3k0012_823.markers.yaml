  - {type: variant, offset: 1276, length: 348, content: 所以擊草芟大鎌所以芟草及寒擊槁除田寒季冬大寒之時槁枯草也以時時耕時耕立春之後及耕深耕而疾耰之以待時雨疾速耰磨時雨至當種時雨既至挾其搶刈耨鎛在掖曰挾搶樁也刈鎌耨茲其鎛鋤也以旦暮從事於田野脫衣就功首戴茅蒲身衣襏襫脫解茅蒲簦笠也襏襫簑蘗也茅或作萌竹萌之皮所以為笠沾體塗足沾濡暴其髮膚盡其四支之敏以從事於田野少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能夫是故農之子恒為農野處而不暱暱近呂氏春秋曰匡章謂惠子於魏王之前曰蝗螟者農夫得而殺之奚故為其害稼也汜勝之書曰農士惰勤其功力相什倍又曰衛尉前上蠶法今上農法民事人所忽略衛尉懃之可謂忠國愛民之至風俗通曰古者使人如借故曰籍田孫盛作南昌令教曰且欲先婚配境內然後督其農桑梁州記曰黑水村有魚池池上立美臺下四周有水左右官良田數十頃故以美農為名耕, SBCK: ''}
