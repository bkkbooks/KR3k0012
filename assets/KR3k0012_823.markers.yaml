  - {type: variant, offset: 4050, length: 0, content: '', SBCK: 月令曰正月可種葵四月可収冬葵子六月六日可種葵中伏之後可種冬葵八九月可種乾葵物理論曰稼借種也古今之言云余夫稼農之夲也耘說言曰耘除田間􅁾也左傳昭元年曰晉趙文子曰譬如農夫是穮是蓘穮耘也壅苗爲蓘毛詩甫田曰或耘或耔􅁰稷薿薿又周頌曰載芟載旅其耕澤澤千耦其耘徂隰徂畛論語曰子路從而後遇丈人以杖荷蓧色曰丈夫老人也蓧竹器子路問曰子見夫子乎丈人曰四體不勤五穀不分孰爲夫子包曰夫丈人云不勤勞四體不分殖五榖誰爲夫子而索之邪植其杖而芸孔曰植􅀝也除草曰芸宋書曰柳元景顔師伯甞詣沈慶之㑹其逰田元景等鳴笳列卒滿道慶之獨與左右一人在田見之悄然改容曰夫貧賤不可畢富貴亦難守吾與諸公並出貧賤因時際㑹筞貴至此唯當共思損挹之事老子八十之年目見成敗者巳多諸君炫此車服欲何爲於是揷杖而耘不爲之顧元景等徹侍褰裳從之管子曰萬室之都必}
