  - {type: variant, offset: 26, length: 200, content: 孟春曰乃命有司布農事舍東郊修封疆審端徑術善相丘陵阪險原隰土地所宜五穀所殖以教導人必躬親之田事既飾先定準直農乃不惑又仲春曰無作大事以妨農事大事兵役之屬又孟夏曰無起土功無發大眾無伐大樹為妨蠶農之事是月也命有司巡行田原勸農勉人無或失時勸農人以及時又孟秋曰是月也築場圃農乃登穀天子嘗新先薦寢廟又季秋曰乃命有司農事備收舉五穀之要又孟冬曰是月也勞農以休息之又仲冬曰是月也農有不收藏積聚者馬牛禽獸有放逸者取之不詰又, SBCK: ''}
