  - {type: variant, offset: 709, length: 547, content: 田間候勤者而勞之東觀漢記曰載酒肴便於田頭大樹下飲食勸勉之因留其餘酒肴而去其墮孏者恥不致丹皆兼功自厲孏與嬾同音力亶反邑聚相率以致殷富其輕黠游蕩廢業為患者輒曉其父兄使黜責之沒則膊給親自將護其有遭喪憂者輒待丹為辦鄉鄰以為常行之十餘年其化大洽風俗以篤又曰崔恢字行遜遷鄢陵令每至春農身到廬陌觀民耕桑農無廢業東觀漢記曰樊重字君雲世善農稼好貨植南史曰梁張興世為方伯父仲子由興世致位給事中興世欲將往襄陽愛鄉里不肯去嘗謂興世曰我雖田舍老公樂聞鼓角汝可送一部行田時吹之管子曰一農之事必有一耜一鎌一耨一雅一銍然後成為農也又曰北澤燒火照堂下管子入賀桓公曰吾田野辟農夫必有百倍之利也又曰善為國者使農寒耕而熱耘力歸于上又曰夫國富多粟生於農故先王貴之民事農則田墾田墾則粟多粟多則國富國富則兵強兵強則戰勝戰勝者地廣農夫終歲之作不足以自食也故農者月不足而歲有餘也又曰先王者善為民興利除害故天下歸之所謂興利者利農事也所謂除害者禁害農事也又曰一農之量襃百畝也又曰上農挾五中農挾四下農挾三農有常業女有常事一農不耕民有饑者一女不織民有寒者孟子曰不違農時穀不可勝食者也孫卿子曰農精於田不可為農師賈精於市不以為市師又曰良農不為水旱不耕韓子曰歷山農者侵畔舜往耕其年讓畔國語管仲曰昔者先王處農就田野令農夫群萃而州處察其四時四時樹藝各有宜權節其用, SBCK: ''}
