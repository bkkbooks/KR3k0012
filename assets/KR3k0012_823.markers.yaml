  - {type: variant, offset: 2821, length: 142, content: 由是顯名又曰第五倫為會稽太守免官歸田里身自耕種不交通人物魏略曰常林少單貧自非手力不取之於人性好學漢末為諸生帶經耕鋤其妻常自擔餉餽之林雖在田野其相敬如賓吳錄曰徵崇字子知遭亂遂隱於會稽躬耕以求其志好尚者從學所教不過數人輒止欲令其業必有成也吳志曰薛綜上䟽云任延為九真太守乃教其耕犁使之冠履晉, WYG: 唐}
