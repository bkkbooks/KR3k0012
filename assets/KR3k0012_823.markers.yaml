  - {type: variant, offset: 4041, length: 3, content: 餘三年, SBCK: 七十毒又曰文公種米吕氏春秋曰氷凍方固后稷不種后稷}
  - {type: variant, offset: 4045, length: 1, content: 食, SBCK: 種必待春論衡曰后稷爲兒種藝爲戲汜勝之書曰稗水旱無不熟之時又特滋盛易得蕪穢良田􅅿得二}
  - {type: punctuation, offset: 4046, content: 。, id: KR3k0012_CHANT_823-bkkpn1364}
  - {type: 'tls:seg', offset: 4046, content: '', id: KR3k0012_CHANT_823-60a.10}
  - {type: variant, offset: 4048, length: 1, content: 歲, SBCK: 斛宜種之以備凶年又稗中有米熟時一可擣取炊之不減粢米又可釀作酒武帝時令典農種之一頃収二千斛斛得米三􅂛大儉可磨食之又曰三月榆莢雨時髙地強土可種禾薄田不能糞者以原蚕矢􅄂禾種之則禾不虫又取馬骨莝之一石以水三石煑之三沸漉去滓以汁漬附子五枚漬三四日去附子以汁和蚕矢撓如粥先種二十日以溲種曝勿令濕至種時以餘汁溲而種之則不蝗虫無馬骨汁亦可用雪雪者五榖之積也常以冬藏雪汁器盛埋地中治種如此則収萬倍又曰種傷濕鬱􅀬則生虫取麥種􅃸熟可穫䆁穗大彊者秆束立場之髙燥處無令有白魚取乾艾􅄂藏之欲知歳所宜以布囊盛粟諸物種平量埋隂垣之下冬至後五十日發取量之息㝡多者歳所冝又曰凡田種麥爲首傷於太稠者鋤而稀之秋以鋤以􅁄柴曵之以壟麥根故曰子將欲富黃金覆士至春凍解􅁄柴曵之絶其乾葉到榆莢雨時候土白復鋤如此収必倍冬雨雪止掩雪勿令從風飛去後雪復如此麥能旱多實春凍解耕和土種遊麥麥生成茂大鋤如宿麥也又曰􅁰者暑也未生心天雨灌其心必傷無實初種時天霧令兩人對持長索戞去其露日出乃止種􅁰覆出鋤治如禾法欲稀於禾又曰大豆保歳易爲冝古之所備凶年也大豆生載甲而出種土不可厚厚則折項不能上達屈於土中而死又曰種稻春凍解地氣和時耕冬至後百三十日種大稻時也又曰種麻預軟和田二月下旬三月上旬傍雨種其秕又曰種葈春凍解耕治其土春草生布糞田復耕平摩之又曰種小豆忌夘稻忌辰禾忌丙􅁰忌丑麻忌辰秫忌未寅小麥忌戍大麥忌子大豆忌甲凡九穀忌日不種之避其忌不可敗傷諸事忌禁日此非空言也其道自然􅀂燒􅁰穰則害瓠也崔寔四}
