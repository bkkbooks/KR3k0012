  - {type: variant, offset: 3291, length: 552, content: 國可以知也又曰耕者出入不應於父兄用力不農農不事賢行此三者有罪無赦又曰地大而不耕非其地也文子曰其耕不強者無以養生晏子春秋曰有納書景公者云吾不知晏子之忠臣也公以為然晏子入朝公色悅晏子退而窮處東耕于海濱墨子曰魯南鄭人吳憲者冬陶夏耕自比於舜又曰墨子之齊遇故人曰今天下莫為義子獨自苦而為義子不若已墨子曰今小人一人耕九人處耕者不可以不急何食者眾而耕者寡也今天下莫為義子宜勸我何以止我樂曰使丈夫為之廢丈夫耕稼樹藝之時使婦人為之廢婦人紡織之事莊子曰堯治天下伯成子高立為侯堯授舜舜授禹伯成子高辭而耕禹往見之則在野又曰堯以天下讓許由許由不受退而耕於潁水之陽終身不見尸子曰有虞氏身有南畝妻有桑田神農耕而王所以觀耕商子曰今一人耕而百人食之此為螟螣蚵胡多切蠋之欲切亦大矣雖有詩書猶無益於治孟子曰伊尹耕於有莘之野湯躬詣之伊尹囂然弗顧又曰耕者助而不稅則天下之農皆悅而願耕於其野也孫卿子曰子路問孔子曰有耕耘樹藝手足胼胝以養其親而無孝名何也子曰但使入則篤行出則友賢何患無孝名也韓子曰宋人有耕者田中有株兔走觸林而死因釋耕而守株冀更得兔宋人笑之淮南子曰夫織者日以進耕者日以卻事相反成功一也楊子法言曰谷口鄭子真不屈其志而耕乎喦石之下名振京師傅子曰耕根車天子親耕乘之蹋豬車畋獵乘之山海經曰后稷播百穀始作耕六韜曰昔帝堯之王天下不以私曲之故留耕績之時, SBCK: ''}
