  - {type: variant, offset: 425, length: 2, content: 食稻, WYG: 以氷致蠅昜子法言曰或問蒼蠅紅紫蒼蠅間乎白黒紅紫似朱而非朱也論衡曰清受塵白受垢青蠅所汚常在練色邑犬羣吠吠所怪也虞翻别傳曰翻放棄南方自恨疏節骨體不媚犯上獲罪當長沒海隅生無可與語死以青蠅}
