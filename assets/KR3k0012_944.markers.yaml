  - {type: variant, offset: 413, length: 0, content: '', SBCK: 東陽劉寵北征􅀅炊飯盡變爲蟲又家人蒸粆亦化爲蟲火愈猛而蟲愈壯寵遂見誅仲興書又載廣五行記曰漢武帝幸甘泉宫馳道中有蟲赤色頭目鼻盡具觀者莫識帝使東方朔視之對曰此􅁗時拘繫無辜衆庶愁死咸仰首歎曰恠哉故名恠哉此必􅁗之獄處朔又曰凢憂者得酒而解以酒沃之當消於是取蟲致酒中湏􅁷糜散􅁊譚新論曰睢陵有董仲君好方道嘗坐重罪繫獄佯病死數日毁蟲出而復活蟬昜通卦驗曰遘上九候蟬始鳴不鳴國多妖言蟬應期鳴言語之象今失節不鳴鳴則失時故多妖言毛詩蕩之什曰咨汝殷啇如蜩如螗注蜩蟬也螗蝘也毛詩䟽義曰鳴蜩蟬也宋衛謂之唐蜩陳鄭云蜋海岱之間謂之蟬通語也禮記月令曰仲夏之月蜩始鳴季秋之月寒蟬鳴又檀弓曰范則冠而蟬有緌蟬蜩也緌謂蜩啄長在腹下爾雅曰蜩蜋蜩夏小正曰蜋蜩者五彩具螗蜩夏小正曰螗蜩者蝘俗呼為胡蟬江南謂之螗􅡻音荑蚻蜻蜻如蟬而小方言云有文者謂之螓夏小正曰鳴蚻虎懸􅝺茅蜩江東呼爲茅截似蟬而小青色蝒馬蜩蜩中最大者爲馬蟬蜺寒蜩寒螿也似蟬而小青赤月令日寒蟬鳴蝒音绵孝經援神契曰蟬無力故不食周書曰夏至又五日蜩始鳴不鳴貴臣放逸立秋之日寒蜩鳴不鳴人臣不力爭梁書曰朱异爲通事舎人後除中書郞時秋日始拜有飛蟬正集异武冠上時咸謂蟬珥之兆又曰何戢爲呉興太守頗好􅀞扇宋孝武賜戢蟬雀扇善􅀞者顧景秀所􅀞時呉郡陸探微顧寳先皆能􅀞歎其巧絶戢因王晏獻之上令晏厚酬其意後周書曰宣帝汰侈旣自比上帝不欲令人同巳甞自􅅁綬及通天冠加金附蟬顧見侍臣武弁上有金蟬及王公有綬者並令去之荘子曰仲足適楚出遊林中見痀僂者承蜩猶掇之也仲尼曰巧乎有道􅁘曰我有道也五六月累丸二而不墜則失者錙銖累二九於竿頭是用手足亭審世累三而不墜則失者十一所失愈少也累五而不墜猶掇之也吾處身也􅀂厥株拘吾執臂也􅀂槁木之枝雖天地之大萬物之多而唯蜩翼之知吾不反不側不以萬物易蜩之翼何爲不得遺彼故得此也又曰鵬之飛其翼􅀂垂天之雲搏扶揺而上者九萬里去以六月一息者也蜩與鸒鳩􅀏之曰我決處而飛槍榆枋而止時則不至而空於地而巳奚以九萬里而圖南爲也孫卿子曰曜蟬者務明其火振其樹􅀂火不明雖振樹無益人有明德則天下㱕之若蟬㱕明火也又見吕氏春秋淮南子曰孟秋凉風至白露降寒蟬鳴寒蟬青蟬也蟲隂􅀋感氣鳴也又曰蛇不足而行魚無耳而聽蟬無口而鳴有然之者也然如是也又曰蚕食而不飲二十二日而化蟬飲而不食三十日而蛻􅀃苑曰呉王欲伐荆吿其左右曰敢有諌者死舎人有少孺子者欲諌不敢則懷九操彈於後園露沾其衣如是者三旦吴王曰子来何若沾衣如此對曰園中有樹其上有蟬蟬髙居悲鳴飲露不知螳蜋在其後也螳蜋委身曲附欲取蟬而不知黃雀在其旁也黄雀延頸欲啄螳蜋而不知彈丸在其下也此三者皆務欲得其前利而不顧其後之有患也呉王曰善哉乃罷其兵論衡曰王充建武三年生爲小兒不妄狎倫不掩雀捕蟬􅐭鐵論曰以所不覩不信人􅀂蟬之不知雪􅀭雄方言曰蟬楚謂之蜩宋衛之間謂之螗蜩江南呼爲螗蛦也陳鄭之間謂之蜋蜩蜋音良􅁗}
