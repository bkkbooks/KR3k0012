  - {type: variant, offset: 413, length: 0, content: '', krp: 東陽劉寵北征将炊飯盡變爲蟲又家人蒸粆亦化爲蟲火愈猛而蟲愈壯寵遂見誅仲興書又載廣五行記曰漢武帝幸甘泉宫馳道中有蟲赤色頭目鼻盡具觀者莫識帝使東方朔視之對曰此秦時拘繫無辜衆庶愁死咸仰首歎曰恠哉故名恠哉此必秦之獄處朔又曰凢憂者得酒而解以酒沃之當消於是取蟲致酒中湏臾糜散桓譚新論曰睢陵有董仲君好方道嘗坐重罪繫獄佯病死數日毁蟲出而復活蟬昜通卦驗曰遘上九候蟬始鳴不鳴國多妖言蟬應期鳴言語之象今失節不鳴鳴則失時故多妖言毛詩蕩之什曰咨汝殷啇如蜩如螗注蜩蟬也螗蝘也毛詩䟽義曰鳴蜩蟬也宋衛謂之唐蜩陳鄭云蜋海岱之間謂之蟬通語也禮記月令曰仲夏之月蜩始鳴季秋之月寒蟬鳴又檀弓曰范則冠而蟬有緌蟬蜩也緌謂蜩啄長在腹下爾雅曰蜩蜋蜩夏小正曰蜋蜩者五彩具螗蜩夏小正曰螗蜩者蝘俗呼為胡蟬江南謂之螗􅡻音荑蚻蜻蜻如蟬而小方言云有文者謂之螓夏小正曰鳴蚻虎懸􅝺茅蜩江東呼爲茅截似蟬而小青色蝒馬蜩蜩中最大者爲馬蟬蜺寒蜩寒螿也似蟬而小青赤月令日寒蟬鳴蝒音绵孝經援神契曰蟬無力故不食周書曰夏至又五日蜩始鳴不鳴貴臣放逸立秋之日寒蜩鳴不鳴人臣不力爭梁書曰朱异爲通事舎人後除中書郞時秋日始拜有飛蟬正集异武冠上時咸謂蟬珥之兆又曰何戢爲呉興太守頗好畫扇宋孝武賜戢蟬雀扇善畫者顧景秀所畫時呉郡陸探微顧寳先皆能畫歎其巧絶戢因王晏獻之上令晏厚酬其意後周書曰宣帝汰侈旣自比上帝不欲令人同巳甞自帶綬及通天冠加金附蟬顧見侍臣武弁上有金蟬及王公有綬者並令去之荘子曰仲足適楚出遊林中見痀僂者承蜩猶掇之也仲尼曰巧乎有道耶曰我有道也五六月累丸二而不墜則失者錙銖累二九於竿頭是用手足亭審世累三而不墜則失者十一所失愈少也累五而不墜猶掇之也吾處身也若厥株拘吾執臂也若槁木之枝雖天地之大萬物之多而唯蜩翼之知吾不反不側不以萬物易蜩之翼何爲不得遺彼故得此也又曰鵬之飛其翼若垂天之雲搏扶揺而上者九萬里去以六月一息者也蜩與鸒鳩笑之曰我決處而飛槍榆枋而止時則不至而空於地而巳奚以九萬里而圖南爲也孫卿子曰曜蟬者務明其火振其樹若火不明雖振樹無益人有明德則天下㱕之若蟬㱕明火也又見吕氏春秋淮南子曰孟秋凉風至白露降寒蟬鳴寒蟬青蟬也蟲隂類感氣鳴也又曰蛇不足而行魚無耳而聽蟬無口而鳴有然之者也然如是也又曰蚕食而不飲二十二日而化蟬飲而不食三十日而蛻說苑曰呉王欲伐荆吿其左右曰敢有諌者死舎人有少孺子者欲諌不敢則懷九操彈於後園露沾其衣如是者三旦吴王曰子来何若沾衣如此對曰園中有樹其上有蟬蟬髙居悲鳴飲露不知螳蜋在其後也螳蜋委身曲附欲取蟬而不知黃雀在其旁也黄雀延頸欲啄螳蜋而不知彈丸在其下也此三者皆務欲得其前利而不顧其後之有患也呉王曰善哉乃罷其兵論衡曰王充建武三年生爲小兒不妄狎倫不掩雀捕蟬􅐭鐵論曰以所不覩不信人若蟬之不知雪揚雄方言曰蟬楚謂之蜩宋衛之間謂之螗蜩江南呼爲螗蛦也陳鄭之間謂之蜋蜩蜋音良秦}
  - {type: variant, offset: 414, length: 0, content: '', SBCK: 之間謂之蟬海岱之間謂之䗁斉人呼爲巨䗁音枝其小者謂之蟧或謂之蝒音綿馬按尔雅蛨者馬蜩非别名蝒馬也此方言誤耳其小者謂之陵蚻如蟬而小青色今開西呼爲凌􅝺也有文者謂之蜻蜻尔雅云蜻即夌蚻也其雌謂之疋必一切大而黒者謂之踐音棧黒而赤者謂之蜆雲霓蜩蟧謂之芽蜩江東呼為芽􅝺􅣒謂之寒蜩闇蜩按尔雅以蜺爲寒蜩月令亦曰寒蟬鳴蝒寒蟬非瘖者此諸蟬名通出尔雅而多駮錯未可詳據也寒蟬寒螿也似蟬而小􅣒音應崔豹古仐註曰牛亨問董仲舒曰蟬爲齊女何荅曰昔薺王后怨王而死尸變爲蟬登庭樹嘒唳而鳴王悔恨之故曰斉女又曰貂蟬胡服也貂者取其有文而不煥外柔而昜内剛而勁也蟬者取其清虚而識時變也在位者有文而自耀有武而不示人清虚自牧識時而動也曹大家蟬賦曰吸清露於丹園抗喬枝而理翮崇皇朝之輝光映豹豹而灼灼陸雲寒蟬賦曰昔人稱雞有五德而作賦焉至於寒蟬才齐其美獨未之思而莫斯􅄒夫頭上有幘則其文也含氣飲露則其清也􅁰稷不享則其廉也處不巢居則其儉也應候守常則其信也加以冠冕取其君子則其操可以事君可以立身豈非至德之蟲哉且攀木寒鳴貪士所歎余昔僑處􅀼有感焉公侯常伯乃身紆紫黻手執龍淵俯鳴佩玉仰撫貂蟬於上盧之多士光帝皇之侍人騰儀像於雲闥望景曜乎通天邁休声之五德豈烏雞之獨珎傅􅀇蟬賊曰美兹蟬之純㓗禀隂陽之微靈傅咸粘蟬賦曰櫻桃其爲樹則多䕃其爲果則先熟故種之於㕔所之前時以盛暑逍遥其下有蟬鳴仰而見之故命粘取以弄小兒退惟當蟬之得意於冨貴而不虞禍之􅀅來也蠅韓詩曰雞鳴䜛人也匪雞則鳴蒼蠅之聲薛君曰雞逺鳴蝇声相似也毛詩甫田曰青蠅大夫刺幽王也營營青蠅止于樊蠅之爲蟲汙白使黑汙黑使白喻佞人變亂善惡也豈弟君子無信䜛言營營青蠅止于􅁄䜛人罔極交亂四國漢書曰成帝建始元年六月青蠅萬數集未央宫殿中朝者坐服䖍曰公卿以下朝㑹坐也又曰昌邑王賀夢青蠅矢積西階可五六石以屋版瓦覆發視之青蠅矢也以問龔遂遂曰陛下之側䜛人衆多願皆放逐之賀不用其言卒至於廢也東觀漢記曰光武與隗􅅝書曰蒼蝇之飛不過三數歩托􅂹之尾得以絶羣後漢書曰楊章爲杜喬李固薦爲平原令後喬固􅀍刑章行赴洛見喬固暴屍坐其旁驅逐蠅蟲魏略曰王思正始中爲大司農性急甞執筆作書蠅集筆端驅去復來如是再三思怒自趂逐蠅不能得還取筆擲地踏壞之張勃呉録曰曹不興帝使􅀞屏風筆落素便􅀧爲蠅帝疑生乃彈之前􅁗書曰苻堅欲赦與王猛符融議甘露堂悉屏左右堅親爲赦文有大蒼蠅集于筆端驅而復來俄而長安街巷人相告曰官令大赦有司以聞堅驚曰禁中無屬耳之垣事何從泄也勑窮之咸言有一小兒衣青衣大呼于市曰官令大赦湏􅁷不見堅歎曰其向蒼蠅乎梁書曰昭明}
