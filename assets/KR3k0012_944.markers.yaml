  - {type: variant, offset: 26, length: 0, content: '', krp: 之蟲斷而不蹶持之衆也淮南子曰凢有血氣之蟲含牙戴角前爪後距有角者觸有齒者噬有毒者蠚有蹄者趹喜而相戲怒而相害天之性也又曰故草食之獸不疾易藪疾患水居之蟲不疾易水行小變而不失常小變易水易草食故食草水居故水中故曰不疾失其常也又曰太隂所在蟄蟲首穴處鵲巢以郷爲户又曰水食者善游能寒魚鼈之屬是也土食者無心不惠蚯蚓之屬是也又曰介蟲之動以固介甲龜鼈之屬動行也貞蟲之動以毒螫貞蟲細腰蜂蟲蜾蠃之屬無牡牡之合曰貞而有毒故能螫又曰山有猛獸林木爲之不斬園有螫蟲藜藿爲之不採言人畏也抱朴子曰毒粥陳則旁有爛腸之䑕明膏舉則下有聚死之蟲又曰慕惡者猶宵蟲之赴明燭學惡者猶輕埃之應飄風也孫卿子曰肉腐出蟲魚枯生蠧論衡適蟲篇曰變復之家謂蟲食榖者吏貪狼所致也蟲頭赤者武官黒者文吏按蟲頭赤身白頭黒身黄復應何官耶今蟲食五榖則爲災桂蠧桑蝎不恠何也桂中藥桑給蠶何可不恠書卷不舒衣襞不懸皆生蟲也此復閞何吏耶又曰司南之杓投於地其柄南指魚肉之蟲集地北行自然之性也丗夲曰廪君乗土船至􅐭塲􅐭水神女子止廪君廪君不聽􅐭神爲飛蟲諸神從而飛蔽日爲之晦廪君不知東西所當七日七夜使人以青縷遺􅐭神曰纓此與爾俱生􅐭神受縷而纓之廪君應青縷所射􅐭神死天則}
  - {type: variant, offset: 27, length: 42, content: 指長三寸餘有光其短細者如簪異物志云擁劍狀如蟹但一螯偏大耳何遜詩云躍魚擁劍是不分魚蟹也, SBCK: 開}
