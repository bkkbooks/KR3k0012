  - {type: variant, offset: 424, length: 0, content: '', WYG: 蟲火愈猛而蟲愈壯寵遂見誅廣五行記曰漢武帝幸甘泉宫馳道中有蟲赤色頭目鼻盡具觀者莫識帝使東方朔視之對曰此秦時拘繫無辜衆庶愁死咸仰首嘆曰怪哉故名怪哉此必秦之獄處朔又曰凡憂者得酒而解以酒沃之當消於是取蟲置酒中須臾糜散栢譚新論曰睢陵有董仲君好方道嘗坐重罪繫獄佯病死數日毁蟲出而復活蟬易通卦驗曰姤上九候蟬始鳴不鳴國多妖言蟬應期鳴古語之聚今失節不鳴鳴則失時故多妖言毛詩蕩之什曰咨汝殷商如蜩如螗毛詩疏義曰鳴蜩蟬也宋衛謂之唐蜩陳鄭云蜋海岱之間謂之蟬通語也禮記曰月令仲夏之月蜩始鳴季秋之月寒蟬鳴又檀弓曰范則冠而蟬有緌爾雅曰蜩蜋蜩夏小正曰蜋蜩者五彩具螗蜩夏小正曰螗蜩者蝘俗呼為胡蟬江南謂之螗蛦音夷蚻蜻蜻如蟬而小方言云有文者謂之螓夏小正曰鳴蚻虎懸蠽茅蜩江東呼為茅截似蟬而小青色蝒馬蜩蜩中最大者為蟬蜺寒蜩寒螿也似蟬而小黒色月令曰寒蟬鳴蝒音綿孝經援神契曰蟬無力故不食周書曰夏至又五日蜩始鳴不鳴貴臣放逸立秋之日寒蜩鳴不鳴人臣不力爭梁書曰朱异為通事舍人後除中書郎時秋日始拜有飛蟬正集异武冠上時咸謂蟬珥之兆又曰何戢為呉興太守頗好畵扇宋孝武賜戢蟬雀扇善畵者顧景秀所畵時呉郡陸探㣲顧寳先皆能畵歎其巧絶戢因王晏獻之上令晏厚酧其意後周書曰宣帝汰侈既自北上帝不欲令人同已常自帶綬其通天冠加金附蟬顧見侍臣武弁上有金蟬及王公有綬者並令去之莊子曰仲尼適楚出遊林中見痀僂者承蜩猶掇之也仲尼曰巧乎有道耶曰我有道也五六月累丸二而不隊則失者錙銖累二丸於竿頭是用手之停審也累三而不隊則失者十一所失愈少也累五而不隊猶掇之也吾處身也若厥株拘吾執臂也若槁木之枝雖天地之大萬物之多而唯蜩翼之知吾不反不側不以萬物易蜩之翼何為而不得遺彼故得此也又曰鵬之飛其翼若垂天之雲扶揺而上者九萬里去以六月息者也蜩與鷽鳩笑之曰我決起而飛槍榆枋時則不至而控於地而已矣奚以之九萬里而南為也孫卿子曰曜蟬者務明其火振其樹若火不明雖振樹無益人有明德則天下歸之若蟬歸夫明火也淮南子曰孟秋涼風至白露降寒蟬鳴又曰蛇不足而行魚無耳而聽蟬無口而鳴自然者也又曰蠶食而不飲二十二日而化蟬飲而不食三十日而蛻說苑曰呉王欲伐荆告其左右曰敢有諫者死舍人有少孺子者欲諫不敢則懷丸操彈於後園露沾其衣如是者三旦呉王曰子來何苦沾衣如此對曰園中有樹其上有蟬蟬髙居悲鳴飲露不知螳蜋在其後也螳蜋委身曲附欲取蟬而不知黄雀在其旁也黄雀延頸欲啄螳蜋而不知彈丸在其下也此三者皆務欲得其前利而不顧其後之有患也呉王曰善哉乃罷其兵論衡曰王充建武三年生為小兒不妄狎人而不掩雀捕蟬鹽鐡論曰以所不覩而不信若蟬之不知雪也揚雄方言曰蟬楚謂之蜩宋衛之間謂之螗蜩江南呼為螗蛦也陳鄭之間謂之蜋蜩蜋音良秦晉之間謂之蟬海岱之間謂之䗁齊人呼為巨䗁音技其大者謂之蟧或謂之蝒音綿馬按爾雅蝒馬者蜩之别名蝒馬也此方言誤耳其小者謂之麥蚻如蟬而小青色今關西呼為麥蠽也有文者謂之蜻蜻爾雅云蜻蜻即蚻也其雌謂之疋必一切大而黒者謂之䗃音棧黒而赤者謂之蜺雲霓蜩蟧謂之茅蜩江東呼為茅􅝺􅣒謂之寒蜩寒蜩瘖蜩也崔豹古今註曰牛亨問董仲舒曰蟬謂齊女何答曰昔齊王后怨王而死尸變為蟬登庭樹嘒唳而鳴王悔恨之故曰齊女又曰貂蟬胡服也貂者取其有文而不雜外柔而易内順而勁也蟬者取其清虛而識時變也在位者有文而不耀有武而不示人清虛自守識時變而動也輝光外映灼灼於目也曹大家蟬賦曰吸清露於丹園抗喬枝而理翮陸雲寒蟬賦曰昔人稱雞有五德而作賦焉至於寒蟬才齊其美獨未之思而莫斯述夫頭上有緌則其文也含氣飲露則其清也黍稷不享則其廉也處不巢居則其儉也應候守常則其信也加以冠冕則其容也君子則其操可以事君可以立身豈非至德之䖝哉且攀木寒鳴貧士所歎余昔僑處竊有感焉公侯常伯乃身紆紫黻手執龍淵俯鳴珮玉仰撫貂蟬飾黄廬之多士光帝皇之侍人騰儀像於雲闥望景曜於通天邁休聲之五德豈唯鳴雞之獨珍傅𤣥蟬賦曰美兹蟬之純㓗稟隂陽之㣲靈傅咸粘蟬賦曰櫻桃其為樹則多隂其為果則先熟故種之於㕔事之前時以盛暑逍遥其下有蟬鳴焉仰而見之聊命粘取以弄小兒退惟當蟬之得意於斯樹而不虞粘之將來也蠅韓詩曰雞鳴刺讒人也匪雞則鳴蒼蠅之聲薛君曰雞與鳴蠅聲相似毛詩甫田曰青蠅大夫刺幽王也營營青蠅止于樊蠅之為䖝汙白使黒汙黒使白喻讒人變亂善惡也豈弟君子無信䜛言營營青蠅止于棘䜛人罔極交亂四國漢書曰成帝建始元年六月青蠅萬數集未央宫殿中朝者坐服䖍曰公卿以下朝㑹坐也又曰昌邑王賀夢青蠅矢積西堦可五六尺以屋版瓦覆發視之青蠅矢也以問龔遂遂曰陛下之側䜛人衆多願皆放逐之賀不用其言卒至於廢也東觀漢記曰光武與隗囂書曰蒼蠅之飛不過三數步托驥之尾得以絶羣後漢書曰楊匡因杜喬李固薦為平原令後喬固被刑匡行之洛見喬固暴屍坐其旁驅逐蠅䖝魏畧曰王思正始中為大司農性急嘗執筆作書蠅集筆端驅去復來如是再三思怒自趕逐蠅不能得還取筆擲地踏壞之張勃呉録曰曹興帝使畵屏風筆落興便㸃為蠅帝疑生乃彈之前秦書曰苻堅欲赦與王猛苻融議甘露堂悉屛左右堅親為赦文有大蒼蠅集於筆端驅去復來俄而長安街巷人相告曰官今大赦有司以聞堅驚曰禁中無屬耳之垣事何從泄也勅窮之咸言有一小兒衣青衣大呼於市曰官今大赦須臾不見堅歎曰其向蒼蠅乎梁書曰昭明太子食中頻得蠅䖝之類宻置案邉恐厨人獲罪不令人知見北史曰庫狄伏連居室患蠅杖門者曰何故聽入唐書曰武儒衡為中書舍人元稹知制誥儒衡一日因㑹食公堂有蠅集𤓰上忽發怒命撃去之曰適從何所來而遽集此淮南子曰夫江河之腐胔不可勝數也然祭者汲焉大也一盃酒蠅漬其中匹夫不飲小也韓子曰以火去蛾蛾愈多以魚毆蠅蠅愈至吕氏春秋曰以狸致}
