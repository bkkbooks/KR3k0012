  - {type: variant, offset: 818, length: 1959, content: 足漫湖無指甲前有黑珠可以飾物臨海水土物志曰䵶𧓄其狀龜形如笠味如黿可食卵大如鴨卵正圓中生噉味美於諸鳥卵其甲黃點注之廣七八寸長二三尺有光色左思吳都賦曰䵶鼊鯖鰐鱟廣志曰鱟似便面負雌而行失雄則不能獨活出交阯南海中吳錄地理志曰交阯龍編縣有鱟形如惠文冠青黑色十二足似蟹長五寸腹中有子如麻子取以作醬尤美裴淵廣州記曰鱟廣尺餘形如熨斗頭如蜣蜋腹下有十足南人重之以為鮓南越志曰漲海口有鱟每過海輒相積於背高尺餘如帆乘風而遊嶺表錄異曰鱟魚其殼瑩淨滑如青瓷盌鏊背眼在背上口在腹下青黑色腹兩傍為六腳有尾長尺餘三稜如棕莖常雌附雄而行捕者必雙得之若摘土雄者雌者即自止背負之方行腹中有子如菉豆南人取之碎其肉腳和以為醬食之尾中有珠如粟色黃雌者小置之水中即雄者浮雌者沉瑟𩻮臨海水土物志曰瑟𩻮與鼂相似海臨海水土物志曰海如鼂狹後廣前其肉中食亦又多膏鼂類臨海水土物志曰鼂類似䵶𧓄腸如羊胃中啖越王筭臨海水土物志曰越王筭如笄大正白長尺餘生海邊沙中見仍取之即可心中存來取即入土中石蚑臨海水土物志曰石蚑生附石長三寸如小竹大有甲正黑中食陽遂足臨海水土物志曰陽遂足此物形狀背青黑腹下正白有五足長短大小皆等不知頭尾所在生時體軟死即乾脆𪓬𪓹臨海水土物志曰𪓬𪓹䵶𧓄相似形大如䉬生渤海邊沙中肉極好噉一枚有三斛膏土肉臨海水土物志曰土肉正黑如小兒臂大長五寸中有腹無口自有三十足如釵股大中食蝦爾雅曰鰝大蝦也蝦大者出海中長二三丈鬚長數尺今青州呼蝦魚為鰝音鄗東觀漢記曰馬稜字伯威為廣陵太守奏罷鹽官賑貧羸薄賦稅蝗蟲飛入海化為魚蝦王隱晉書曰吳後置廣州以南陽滕脩為刺史或語脩蝦長一丈脩不信其人後故至東海取蝦鬚長四五尺封以示脩脩乃服廣州記亦云金樓子曰舜攝天子有緩耳貫胸之民來獻珠蝦世說曰虞嘯父為孝武帝侍中帝從容謂曰卿在閤下初不聞有獻替虞家富近海謂帝望其意對曰天時尚暖魚鼈蝦鮓未可致尋有所獻帝撫掌大笑異物志曰蝦種多最大中作脯南越志曰南海以蝦頭為杯鬚長數尺金銀鏤之晉簡文以盛酒未及飲酒躍於外筮之曰三旬當後庭有告變者果有生子人面犬身博物志曰東海有物狀如凝血縱廣數丈正方圓名曰鮓魚無頭目處所內無腹藏眾蝦附之隨其東西越人煮食之嶺南異物志曰南海有蝦鬚長四五十尺嶺表錄異曰海蝦皮殼嫩紅色就中腦殼與前雙腳有鉗者其色如朱余嘗曾登海𦨴忽見窗版懸二巨蝦殼頭尾鉗足具全各七八尺首占其一分剌尖利如鋒刃剌上有鬚如紅筯各長二三尺前雙腳上有鉗云以此捉食鉗麤如人大指長三尺餘上有芒剌如薔薇枝赤而銛硬手不可觸腦殼烘透變環尺餘何止於盃盂也北戶錄云滕脩為廣州刺史有客語脩曰蝦鬚有一丈者堪為柱杖脩不之信故去東海取鬚長四丈以示脩方服其異寧蝦大者亦首尾尺餘閩越率取其肉臠而為炙又渾以鹽藏自然紅色謂之紅蝦貢送白蝦肉薄而白瑩如水精廣人偏食之蓋美而毒詢於閩川吳中悉無此類嶺表錄異曰南人多買蝦之細者生切綽菜蘭香蓼等用濃醬醋先潑活蝦蓋以生菜然以熱飲覆其上就口跑之亦有跳出醋揲者謂之蝦生鄙俚重之以為異饌也王朗荅魏文表曰夫張大網以漉鰌蝦辱九鼎以烹黿鼂應璩百一詩曰大龜承衰弊復欲密其羅蚍蜉猶見得何云鰌與蝦葛龔與張季景書曰夜從劉伯宣舍西垂過龔家無飯噉炒蝦海月臨海水土物志曰海月大如鏡白色正圓常死海邊其指如搔頭大中食謝靈運詩曰挂席拾海月玉䖴臨海水土物志曰玉䖴似蚌長二寸廣五寸上大下小其殼中拄炙之味似酒陵龍臨海水圭物志曰陵龍之體黃身四足形短尾長有鱗無角南越嘉羞見之竟逐石矩嶺表錄異曰石矩亦章舉之類身小而足長入鹽為乾燒食極美又有小者兩足如帶曝乾後似射踏子故南中呼為射踏子也玳瑁嶺表錄異曰玳瑁形狀如龜唯腹背甲有烘點其大者悉似盤蓋本草經云玳瑁解毒兼云辟邪余寄居廣南日見盧亭海島夷人獲活玳瑁龜一枚以獻連帥嗣薛王王令生取背甲小者二片帶於左臂上以辟毒龜被生揭其甲亦甚苦楚後養於使宅後北池伺其揭處漸生復遣盧亭送於海畔或云玳瑁若生帶之有蠱毒玳瑁甲即自搖動若死無此驗蟕𧓈嶺表錄異曰蟕𧓈俗謂之茲夷乃山龜之巨者人立其背可負而行產潮循山中鄉人採之取殼以貨要全其殼須以木楔其肉龜吼如牛聲響山谷廣州有巧匠取其甲以為梳篦盃器之屬水母廣志曰水母如羊胃在海中常浮聞人聲沉水底可生切食沈懷遠南越志曰海岸間育水母東海謂之䖳音蝔張茂先博物志曰東海有物狀如凝血廣數尺正方圓名曰水母無頭目所處則眾蝦附之隨其東西南北可煮食之異物志曰水母在海汎汎常浮其體正白常在水上浮也嶺表錄異曰水母廣州謂之水母閩人謂之䖳癡駕切其形乃渾然凝結一物有淡紫色者大如覆帽小者如盌腹下有物如懸絮俗謂之足而無口眼常有數十蝦寄腹下咂食其涎浮凡水上捕者或遇之即歘然而沒乃是蝦有所見耳越絕書云海鏡蟹為腹水母即蝦為目也南中好食之海鏡嶺表錄異曰海鏡廣人呼為膏葉盤兩片合以成形殼圓中甚瑩滑日照如雲母光內有少肉如蚌胎腹中有小蟹子其小如豆黃而螯足具備海鏡飢則蟹出拾食蟹飽歸腹海鏡亦飽余曾市得數箇驗之或迫之以火即蟹子走出離腸腹立斃或生剖之有蟹子活在腹中逡巡亦斃, SBCK: ''}
