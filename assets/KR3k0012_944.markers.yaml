  - {type: variant, offset: 19, length: 0, content: '', SBCK: 赤頭皆揺半軀皆是生魚膾也趙書曰前石時淳觚曰􅆧婦産􅆑大如盂剖之有蟲如巨蟻二足立行異苑同蕭子顯齊書曰王敬則少時於草中射獵有蟲如烏豆集}
  - {type: page-break, offset: 19, content: '', id: KR3k0012_SBCK_944-2a}
  - {type: variant, offset: 19, length: 0, content: '', WYG: 赤頭皆揺半身皆是生魚膾也趙書曰前石時淳闕羌婦産卵大如盂剖之有蟲如巨蟻二足立行蕭子顯齊書曰王敬則少時於草中射獵有蟲如烏豆集}
  - {type: page-break, offset: 19, content: '', id: KR3k0012_WYG_944-2b, image: WYG0901/WYG0901-0365d.png}
  - {type: variant, offset: 19, length: 0, content: '', krp: 赤頭皆揺半軀皆是生魚膾也趙書曰前石時淳觚曰羌婦産卵大如盂剖之有蟲如巨蟻二足立行異苑同蕭子顯齊書曰王敬則少時於草中射獵有蟲如烏豆集}
  - {type: variant, offset: 20, length: 5, content: 一螯偏長如, SBCK: 身擿去乃脫脫處皆流血敬則惡之詣道士卜曰不湏憂此侯之瑞也敬則聞之喜故出都自効後魏書曰蠕蠕東胡之苗裔也木骨閭死子車庶㑹自號柔然役屬於魏丗祖以其無知狀􅀋於蟲故改其號爲蠕蠕隋書曰田式拜襄州揔管專以立威爲務所愛奴嘗詣式白事有蟲上其衣衿上揮䄂拂去之式以爲慢巳立棒殺之莊子曰井蛙不可以語於海者拘於墟也夏蟲不可以語於冰者篤於時也魯連子曰百}
  - {type: variant, offset: 20, length: 5, content: 一螯偏長如, WYG: 身擿去乃脫脫處皆流血敬則惡之詣道士卜曰不須憂此封侯瑞也敬則聞之喜故出都自効後魏書曰蠕蠕東蕃之苖裔也木骨閭死子車鹿㑹自號柔然役屬於魏世祖以其無知狀類於蟲故改其號為蠕蠕隋書曰田式拜襄州總管專以立威為務所愛奴嘗詣式白事有蟲上其衣衿奴揮袖拂去之式以為慢已立棒殺之莊子曰井蛙不可以語於海者拘於墟也夏蟲不可以語於氷者篤於時也魯連子曰百}
  - {type: page-break, offset: 20, content: '', id: KR3k0012_WYG_944-3a, image: WYG0901/WYG0901-0366a.png}
  - {type: variant, offset: 20, length: 5, content: 一螯偏長如, krp: 身擿去乃脫脫處皆流血敬則惡之詣道士卜曰不湏憂此侯之瑞也敬則聞之喜故出都自効後魏書曰蠕蠕東胡之苗裔也木骨閭死子車庶㑹自號柔然役屬於魏丗祖以其無知狀類於蟲故改其號爲蠕蠕隋書曰田式拜襄州揔管專以立威爲務所愛奴嘗詣式白事有蟲上其衣衿上揮䄂拂去之式以爲慢巳立棒殺之莊子曰井蛙不可以語於海者拘於墟也夏蟲不可以語於冰者篤於時也魯連子曰百}
