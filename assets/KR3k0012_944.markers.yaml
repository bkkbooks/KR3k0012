  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第九百四十四蟲豸部一蟲蟬蝇蟲爾雅曰有足謂之蟲無足謂之豸周禮冬官梓人曰外骨内骨卻行仄行連行紆行以脰鳴者以注鳴者以旁鳴者以翼鳴者以股鳴者以胷鳴者謂之小蟲之屬外骨龜屬内骨鼈屬郤行螾衍之屬灰行蟹屬連行魚屬紆行蛇屬脰鳴鼃屬注鳴精列屬旁鳴蝟蜆屬翼鳴發皇屬股鳴蚣蝑動股屬胷鳴榮原屬大戴禮曰毛蟲之精者曰麟羽蟲之精者曰鳯介蟲之精者曰龜}
  body:
  - {type: variant, offset: 1, length: 2, content: 介部, SBCK: 蟲之精者曰龍倮蟲之精者曰聖人禮記月令曰孟春之月蟄蟲始振仲春之月蟄蟲咸動啓户始出仲秋之月蟄蟲坏户坏益也季秋之月蟄蟲咸俯在内皆墐其户墐謂塗閉之春秋考異郵曰二九}
  - {type: page-break, offset: 1, content: '', id: KR3k0012_SBCK_944-1b}
  - {type: variant, offset: 1, length: 6, content: 介部十五擁劍, WYG: 蟲之精者曰龍倮蟲之精者曰聖人禮記月令曰孟春之月蟄蟲始振仲春之月蟄蟲咸動啓户始出仲秋之月蟄蟲坏户季秋之月蟄蟲咸俯在内皆墐其户墐塗閉之也春秋考異郵曰二九闕八主風闕為蟲八日而化風列波激故其名從蟲蟲之爲言屈申也東觀漢記曰永平三年春有司奏立長秋宫以率八妾上未有所言皇太后曰馬貴人德冠後宫遂登至尊先之數日夢有飛蟲萬數著身入皮膚中復飛去魏志華佗傳曰}
