  - {type: variant, offset: 26, length: 0, content: '', WYG: 之蟲斷而不蹶持之衆也淮南子曰凡有血氣之蟲含牙戴角前爪後距有角者觸有齒者噬有毒者螫有蹄者踢喜而相戲怒而相害天之性也又曰草食之獸不闕疾患水居之蟲不疾易行小變而不失常又曰太隂所在蟄蟲闕穴處鵲巢以鄉為户又曰水食者善游能寒魚鼈之屬是也土食者無心不惠蚯蚓之屬是也又曰介蟲之動以固介甲龜鼈之屬動行也貞蟲之動以毒螫貞無牝牡之屬又曰山有猛獸林木為之不斬園有螫蟲藜藿為之不採抱朴子曰毒粥陳則旁有爛膓之鼠明膏舉則下有聚死之蟲又曰慕惡者猶宵蟲之赴明燭學惡者猶輕埃之應飄風也孫卿子曰肉腐出蟲魚枯生蠧論衡商蟲篇曰變復之家謂蟲食穀者吏貪很所致也蟲頭赤者武官黒者文吏按蟲頭赤身白頭黒身黄復應何官耶今蟲食五穀則為灾桂蠧桑蝎不怪何也桂中藥桑給蠶何可不怪書卷不舒衣襞不縣皆生蟲也此復關何吏耶又曰司南之杓投於地其柄南指魚肉之蟲集地北行自然之性也世本曰廩君乘土船至鹽塲鹽水神女子止廩君廩君不聽鹽神為飛蟲諸神從而飛蔽日為之晦廩君不知東西所向七日七夜以青縷遺鹽神曰纓此與爾俱生鹽神受縷而縷之廩君應青縷所射鹽神死天則}
