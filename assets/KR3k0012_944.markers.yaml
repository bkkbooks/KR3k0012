  front:
  - {type: variant, offset: 0, length: 0, content: '', SBCK: 太平御覽卷第九百四十四蟲豸部一蟲蟬蝇蟲爾雅曰有足謂之蟲無足謂之豸周禮冬官梓人曰外骨内骨卻行仄行連行紆行以脰鳴者以注鳴者以旁鳴者以翼鳴者以股鳴者以胷鳴者謂之小蟲之屬外骨􅀛屬内骨鼈屬郤行螾衍之屬􅁅行蟹屬連行魚屬紆行蛇屬脰鳴鼃屬注鳴精列屬旁鳴蝟蜆屬翼鳴發皇屬股鳴蚣蝑動股屬胷鳴榮原屬大戴禮曰毛蟲之精者曰麟羽蟲之精者曰鳯介蟲之精者曰􅀛}
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_944-1a}
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書太平御覽卷九百四十四宋李昉等撰蟲豸部一蟲爾雅曰有足謂之蟲無足謂之豸周禮冬官梓人曰外骨内骨卻行灰行連行紆行以脰鳴者以注鳴者以旁鳴者以翼鳴者以股鳴者以胷鳴者謂之小蟲之屬外骨龜屬内骨蟞屬卻行螾衍之屬仄行蟹屬連行魚屬紆行蛇屬脰鳴鼃屬注鳴精列屬旁鳴蜩蜆屬翼鳴蝗屬股鳴蚣蝑動股屬骨鳴榮原屬大戴禮曰毛蟲之精者曰麟羽蟲之精者曰鳯介蟲之精者曰龜}
