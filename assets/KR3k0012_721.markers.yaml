  - {type: variant, offset: 2467, length: 138, content: 病者各有所制攝生食不欲飽眠不欲扇星下不臥里語曰人在人間日失一日如牽牛以詣屠所每進一步去死轉近也夫入九泉之下長夜罔極始為螻蟻之糧終與塵埃合體令人怛然心熱求生之志何可不營新論曰曲陽侯王根迎方士西門君惠從其學養生卻老之術君惠曰龜鶴稱三千歲以人之才何乃不如蟲鳥耶白虎通曰男子六十閉房戶, SBCK: 知傷脾}
