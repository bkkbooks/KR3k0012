  - {type: variant, offset: 803, length: 618, content: 死豹養其內而虎食其外毅養其外而病攻其內此二子者皆不鞭其後者夫守一方之事至於過理者不及於會通之適者鞭其後者去其不及耳又曰養形必先無物物有餘而形不養者有之矣有生必先無離形形離而生亡者有之矣其來不能卻其去不能止也悲夫世之人以為養形足以存養形神清果不足以存生文子曰太上養神其次養形神清意平百節皆寧養生之本也肥肌膚充腹腸開嗜欲養生之末也淮南子同韓子曰神不注於外則身全身全之謂得得者得身也呂氏春秋曰凡生之長也順之也使生不順者欲也故聖人必先適欲適節也室大則多陰臺高則多陽多陰則蹶多陽則痿蹶也逆寒疾也痿躄不能行此陰陽不適之患也是故先王不處大室不為高臺味不眾珍衣不燀之演切熱燀熱則理塞脈則閉結理塞則氣不達味眾珍則胃充胃充則中大鞔音墜憊也中大鞔則氣不達以此求長生其可得乎昔先聖王之為苑囿園池也足以觀望勞形而己矣其為宮室臺榭也足以辟燥備濕而已矣其為輿馬衣裘也足以逸身煖骸而已矣其為飲食酏音移醴也足以適味充虛而已矣其為聲色音樂也足以安性自娛而已矣此五者之所以養性也非好儉而惡費也節於性也又曰天生陰陽寒暑燥濕四時之化萬物之變莫不為利莫不為害聖人察之以便生故精神安乎形而年壽長焉長也者非短而續之者也畢其數也畢數之務在去乎害何謂去害大甘大酸大苦大辛大醎五者充形則生害矣大喜大怒大憂大恐大哀五者接神則生害矣大寒大熱大燥大濕大風大霧六者動精則生害矣諸言大者皆謂過制故凡養生莫若知本知本則疾無由至矣又曰湯問伊尹曰欲取天下若何伊尹曰欲取天下天下可取身將先取身先為天下所取也凡, SBCK: 父道}
