  - {type: variant, offset: 2343, length: 0, content: '', SBCK: 十八日而病愈臨菑女子薄吾病甚衆醫皆以爲寒􅀬篤當死不治意􅐷其脉曰蟯瘕蟯音饒蟯瘕爲病腹大上膚黄麄循之戚戚然意飲以芫華一撮即出蟯可數升病愈三十日如故齊王侍醫遂病自錬五石服之意往過之遂謂意曰不肖有病幸􅐷遂也意即􅐷之告曰公病中􅀬論曰中􅀬不溲者不可服五石石之爲藥精悍公服之不得數溲亟勿服色將發癰遂曰扁鵲曰隂石以治隂病陽石以治陽病夫藥石者有隂陽水火之齊故中􅀬即爲隂石柔齊治之中寒即爲陽石剛齊治之意曰公所論逺矣扁鵲雖言}
