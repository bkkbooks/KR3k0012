  - {type: variant, offset: 2619, length: 478, content: 王充年漸七十乃作養生之書凡十六篇養氣自守閉明塞聰愛精自輔服藥道引庶幾獲道劉根別傳曰取七歲男齒女髮與己頸垢合燒服之一歲則不知老常為之使老有少容也嵇康養生論曰養生有五難名利不滅此一難也喜怒不除此二難也聲色不去此三難也滋味不絕此四難也神慮精散此五難也五者必存雖心希難老口誦至言咀嚼英華呼吸太陽不能不夭其年也五者無於胸中則信順日深玄德日全不祈喜而自福不求壽而自延此養生大理所歸也又曰夫為稼於陽世偏有一溉之功者雖終歸於樵爛必一溉者後枯然則一溉之益固不可誣也而世常謂一怒不足以侵性一哀不足以傷身輕而肆之是猶不識一溉之益而望嘉穀於旱苗者也是以君子知形恃神以立神須形以存悟生理之易失知一過之害生故脩性以保神安心以全身愛憎不捿於情憂喜不留於心泊然無感而體氣和平又呼吸吐納服食養身使形神相親表裏俱濟也夫種田者一畝十斛謂之良田此天下通稱也不知區種可百餘斛田種一也至於樹養不同則功收相懸謂商無十倍之價農無百斛之望此守常而不變者也且豆令人重榆令人瞑合歡蠲忿萱草忘憂愚智所知也薰辛害同豚魚不養世所識也虱處頭而黑麝食柏而香頸處險而癭齒居晉而黃推此而言凡所食之氣蒸性染身莫不相應豈惟蒸之使, SBCK: 病}
