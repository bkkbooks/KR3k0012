  - {type: variant, offset: 2074, length: 174, content: 夫太元之山難知易求不天不地不沉不浮絕險緬邈崔巍崎嶇和氣煙熅神童並遊玉井泓窈灌溉延休百二十官曹府相由离坎列位玄芝萬株絳樹特生其實如珠金玉嵯峨醴泉出隅還年之土甘其清流于能修之松喬同儔此一山也長谷之山杳杳巍巍玄靈飄飄玉液霏霏金紫之房在乎其隈愚人競往至皆死歸有道之士登之不衰採服黃精以致天飛此二山也古賢之所祕子思之又曰凡養生者欲令多聞而貴要博見而擇善偏修一, SBCK: 内寒月}
