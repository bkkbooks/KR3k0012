  - {type: variant, offset: 3549, length: 4, content: 道養神氣, SBCK: 四月死者􅐷其人時愈順愈順者人尚肥也奴之病得之流汗數出炙於火而以出見大風也齊淳于司馬病意􅐷其脉告曰當病迵音洞風迵風之狀飲食下嗌􅂺後之如厠也病得之飽食而疾走淳于司馬曰我之王家食馬肝飽甚見酒來即岀驅疾至舎即泄數十餘出意告曰爲火齊米汁飲之七八日當愈時醫􅁗信在旁意出信謂左右閤都尉曰意以淳于司馬病爲何曰以爲迵風可治信即􅀏曰是不知也淳于司馬病法當後九日死即後九日不死其家復召意意徃問之盡如意􅐷即爲一火齊米汁}
