  - {type: variant, offset: 2753, length: 514, content: 言咀嚼英華呼吸太陽不能不夭其年也五者無於胸中則信順日深玄德日全不祈喜而自福不求壽而自延此養生大理所歸也又曰夫為稼於陽世偏有一溉之功者雖終歸於樵爛必一溉者後枯然則一溉之益固不可誣也而世常謂一怒不足以侵性一哀不足以傷身輕而肆之是猶不識一溉之益而望嘉穀於旱苗者也是以君子知形恃神以立神須形以存悟生理之易失知一過之害生故脩性以保神安心以全身愛憎不捿於情憂喜不留於心泊然無感而體氣和平又呼吸吐納服食養身使形神相親表裏俱濟也夫種田者一畝十斛謂之良田此天下通稱也不知區種可百餘斛田種一也至於樹養不同則功收相懸謂商無十倍之價農無百斛之望此守常而不變者也且豆令人重榆令人瞑合歡蠲忿萱草忘憂愚智所知也薰辛害同豚魚不養世所識也虱處頭而黑麝食柏而香頸處險而癭齒居晉而黃推此而言凡所食之氣蒸性染身莫不相應豈惟蒸之使重而無使輕害之使闇而無使明薰之使黃而無使堅芬之使香而無使延哉故神農曰上藥養命中藥養性者誠知性命之理因輔養以通也而世人不察唯五穀是嗜聲色是躭目惑玄黃耳務淫哇滋味煎其腑臟醴醪煮其膓胃香芳腐其骨髓喜怒悖其正氣思慮消其精神哀樂殃其平粹夫以蕞爾之軀攻之者非一途易竭之身而內外受敵身非木石其能久乎神仙傳曰彭祖云養壽之道但莫傷之而已夫冬溫夏涼不失四時之和, WYG: 春死}
