  - {type: variant, offset: 750, length: 2, content: 巖居, SBCK: 越人能使之起耳扁鵲過齊齊桓侯客之入朝見曰君有疾在腠理不治將深桓侯曰寡人無疾扁鵲出桓侯謂左右曰醫之好利欲以不病者爲功後五日復見曰君有疾在血脉不治將􅀷桓侯曰寡人無疾扁鵲出桓侯不恱後五日扁鵲復見曰君有疾在腸胃不治將􅀷桓侯不應扁鵲出桓侯不恱後五日扁鵲復見望桓侯退走桓侯使人問其故扁鵲曰疾在腠理湯熨所及其在血脉針石可理其在腸胃酒醪所能及其在骨髓雖司命無奈之何今在骨髓臣是以無請後五日桓侯體病使人召扁鵲鵲已逃遁焉桓侯遂卒扁鵲名滿天下旁遊六國至邯鄲聞趙貴女病扁鵲即爲帶下醫過洛陽聞周人愛老人扁鵲即爲耳目痺醫入咸陽聞􅁗人愛小兒即爲小兒醫隋俗改變無所滯礙􅁗太醫令李䤈白知􅇊不如遂宻使人刺殺之又曰公孫光齊淄川唐里人善爲古方及傳語法淳于意師之悉授其書意欲盡求他精方光曰吾方盡矣吾身巳衰無所事之是吾少年所受妙方也公母以教人意曰悉得禁方幸甚死不妄傳人光喜曰公後必爲國工臨菑楊慶有竒方吾不如之汝可謹事必得之意遂捨光}
