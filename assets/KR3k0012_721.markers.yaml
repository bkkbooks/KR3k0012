  - {type: variant, offset: 104, length: 637, content: 也爽明也百度百事之節老子養生要訣曰一人之身一國之象胸臆之設猶宮室也支體之位猶郊境也骨節之分猶百川也腠七搆切理之間猶四衢也神猶君也血猶臣也氣猶民也故志人能理其身亦猶明君能治其國夫愛其民所以安其國愛其氣所以全其身民弊即國亡氣衰即身謝是以志人上士當施醫於未病之間不追修施於既敗之後故知國難保而易喪氣難清而易濁審機權可以安社稷制嗜慾可以保性命若能攝生者當先除六害然後可以延駐何名六害一曰薄名利二曰禁聲色三曰廉貨財四曰損滋味五曰屏虛妄六曰除疽妒六者若存則養生之道徒設耳蓋未見其有益也雖心希妙理口念真經咀才與切嚼英華呼吸景象不能補其促矣誠者所以保和全真當須少思少念少笑少言少喜少怒少樂少愁少惡少好少事少機夫多思則神散多念則心勞多笑則臟腑上飜多言則氣海虛脫多喜則膀胱納客風多怒則腠理奔浮血多樂則心神邪蕩多愁則頭面燋枯多好則氣智潰溢多惡則精爽奔騰多事則䈥脈乾急多機則智慮沉迷茲乃伐人之生甚於斤斧蝕人之性猛於豺狼無久行無久坐無久立無久臥無久視無久聽不飢強食則脾勞不渴強飲則胃脹體欲少勞食欲常少勞則勿過少勿令虛冬則朝勿虛夏則夜勿飽早起不在雞鳴前晚起不過日出後心內澄則真人守其位氣內定則邪物去其身行欺詐則神悲行爭競則神沮輕侮於人當減筭殺害於物必傷年行一善則魂神歡搆一惡則魄神喜魂神欲人生魄神欲人死常欲寬泰自居恬惔自守則神形安靜災病不生仙錄必書其名死籍必消其咎養生之理盡在此矣至於鍊瓊丹而補腦化金液以留神此上真之妙道非食穀啗血越分而修之萬人之中得者殊少深可誡焉莊子曰善養生若牧羊視其後者而鞭之周威公, SBCK: 乎趙孟}
