  - {type: variant, offset: 3609, length: 1957, content: 歲三百六十交精氣和合者有四故能生育萬物不知窮極人能則之可以長存次則有服氣得其道則邪氣不能入治身之本要也其餘歷藏導引之術及念體中萬神有含影中形之事不然于心志也人能愛精養體服氣鍊神則萬神自守其不然者營衛枯疲萬神自逝非思念所留者也魏志曰吳普嘗問道於華佗佗謂普曰人體欲得勞動但不當使極耳如搖動則穀氣易消血脈通流病不得生譬猶戶樞不蠹流水不腐以其常動故也是以仙者及漢時有士君舊為導引之事熊經鵄顧引挽腰體動諸關節以求難老吾有一術名五禽之戲汝可行之一曰虎二曰鹿三曰熊四曰猨五曰鳥亦以除疾並利蹄足以當導引體中不快起作一禽之戲普施行之遂年九十餘博物志曰魏武帝問封君達養生之術君達曰體欲常勞食欲常少勞無過虛省肥濃節醎酸減思慮損喜怒除馳逐慎房室春夏施寫秋冬閑藏武帝行之有効高湛養生論曰王叔和高平人也博好經方洞識攝生之道嘗謂人曰食不欲雜雜則或有所犯當時或無災患積久為人作疾尋常飲食每令得所多飡今人彭亨短氣或致暴疾夏至秋分少食肥膩餅臛之屬此物與酒食瓜果相妨當時不必習病入秋節變陽消陰息寒氣惣至多諸暴卒良由涉夏取冷大過飲食不節故也而不達者皆以病至之日便謂是受病之始而不知其所由來者漸矣豈不惑哉養生要曰起東向坐以兩手相摩令熱以手摩額上至頂上滿二九止名曰存泥丸又清旦初起以兩手人兩耳極上下之二七止令人不聾次縮鼻閉氣右手從頭上引左耳二七止次引兩髮鬢舉之令人血氣流通頭不白又摩手令熱以摩身體從上至下名乾浴令人勝風寒時氣寒熱頭痛百病皆除莊子曰吹喣呼吸吐故納新熊經鳥伸為壽而已矣此道引之士養形之人也彭祖壽考者之所好也養生要伏氣經曰道者氣也寶氣得道長存神者精也寶精則神明長生精者血脈之川流守骨之靈神精去則骨枯骨枯則死矣是以為道者務寶其精從夜半至日中為生氣時正僵仆瞑目握固掘固者如嬰兒之捲手閉氣不息於心中數至二百乃口吐氣出之曰增息如此身神具五藏安能閉氣數至二百五十華蓋明華蓋眉也耳目聰舉無病邪不入寶氣一名日行氣一名長息其法正僵仆徐漱澧泉豐泉唾也而咽之因行氣口但吐氣鼻但內氣徐縮引之莫大極滿者難還入五息已一息自可吐也一息數之至九十息頻伸訖復為之滿四九三百六十息為一竟咽之乃鼻內氣也不爾或令欬凡內氣上外吐氣則氣不流自覺周身也抱朴子曰城陽郄儉少時行獵墮空塚中飢餓見塚中先有大龜數數廻轉所向無常張口吞氣或俛或仰儉素亦聞龜能導引乃試隨龜所為遂不復飢百餘日後人有偶窺塚中見儉而出之後竟能咽氣斷穀魏王拘置土室中閑試之一年不食顏色悅澤氣力自若又曰爾乃咀吸寶華谷神太清外珍五耀內守九精修養雜訣曰老子云玄牝之門是謂天地根綿綿若存用之不勤言口鼻也天地之門以吐納陰陽生死之氣每至旦面向午展兩手於膝之上徐按捺百節口吐濁氣鼻引清氣所以吐故納新是蹙氣良久徐徐吐之仍以左右手上下前後柘取氣之時意想太和元氣下入毛際流於五臟四支皆受其潤如山納雲如地受澤若氣通則竟腹中咽咽轉動若得十通即竟身體潤澤而色光渙耳目聰明飲食有味氣力倍加諸疾去矣守九精法言曰生氣時床鋪厚軟枕與身平仰臥展腳握固去身四五寸兩手亦去身四五寸微微鼻引大陽清氣入意送此氣遍身體即閉氣至極然後細從口吐之勿令耳聞吐氣之聲也著生論曰大凡著生先調元氣身有四氣人多不明四氣之中各主生死一日乾元之氣化為精精反為氣精者連於神精益則神明精固則神暢神暢則生健若精散則神疲精竭則神去神去則死二曰坤元之氣化為血血復為氣氣血者通於內血壯則體豐血固則顏盛顏盛則生合若血衰即髮變血敗則腦空腦空則死三曰庶氣庶氣者二元交氣氣化為津津復為氣氣運於生生託於氣陰陽動息滋潤形骸氣通即生氣乏則死四曰眾氣眾氣者穀氣也穀濟於生終誤於命食穀味雖生蘊穀氣還死精能附血氣能附生常使循環即身永固乾元之陽陽居陰位臍下氣海是也坤元之陰陰居陽位腦中血海是也生者屬陽陽貫五臟喘息之氣是也死者屬陰陰納五味穢惡之氣是也氣海之氣以壯精神以填骨髓血海之氣以補肌膚以流血脈喘息之氣以通六腑以扶四支穢惡之氣以亂身神以腐五臟修養雜訣氣銘曰一氣未分三才同源清濁既異元精各存天法象我我法象天我命在我不在於天昧用者夭善用者延性和者寂守一神閑靈芝在身不在於山返一守和理合玄玄精極乃明神極乃靈氣極乃精無精氣乃冥因氣而衰因氣而榮因氣而死因氣而生喜怒亂氣性情交爭擁構成患神形豈寧鍊陽銷陰其氣自行以正遣邪其患自平乾坤澄淨子後午前閉目平坐握固冥然納息盧中吐息天關入息微微出息綿綿以意引氣臟腑廻旋然後呵之榮衛通宣但有不和遣之踵前五呵六呵無疾不蠲凡欲胎息導引為先經脈不擁關節不煩或如射雕側身彎環或舉腰膝如蟾半圓交枝腦後左旋右旋勁展兩足氣出指端擺掣四肢捉搦三關熟摩尺澤氣海亦然叩齒集神合眸固關寘心亡形任意往還覺氣調勻擁塞喉間擁氣則咽三咽相連轉舌漱入咽下丹田以意送之令聲泊然一咽三咽再咽如前三十六咽胎息成焉大道無為為於無為不為無為莫若無為不思為思莫若無思萬法自然不假施為不寒不熱不渴不飢恬淡無為以道自怡妙中