  - {type: variant, offset: 1452, length: 430, content: 去反其天年此之謂真人昔先聖王成其身而天下成治其身而天下治故善響者不於響於聲善景者不於景於形為天下者不於天下於身詩曰淑人君子其儀不忒其儀不忒正是四國言正諸身也故反道而身善矣行義而人善矣淮南子曰君子行正氣不行邪氣內便於性外合於義循理而動不繫於物而者正氣也推於滋味淫於聲色發於喜怒不顧後患者邪氣也邪與正相傷欲與性相害不可兩立一植一廢故聖人損欲而從事於性凡治身養性節寢處適飲食和喜怒便動靜而邪氣自不生豈若憂瘕疵之興痤疽之廢而豫備之哉又曰今萬物之來擢拔吾性𢷘取吾精勢若泉原雖欲勿廩庸可得乎今夫樹木灌以潦水疇以肥壤十人養之一人拔之則必無餘蘖況以一國同伐之雖欲久生豈可得哉今盆水在廷清之終日未能見眉睫濁之不過一撓而不能察方員人神易濁而難清猶盆水之類也又曰夫水之性清而沙土汨之人之性安而嗜慾亂之夫人之所受於性者耳目之於聲色也鼻口之於芳臭也肌膚之於寒煖也其情一也或通於神明或不免於癡狂者也其所以為制者異也是故神者智之淵也神清則智明矣智心之府也智公則心平矣人莫鑒於洙泗而鑒於止水者, SBCK: ''}
