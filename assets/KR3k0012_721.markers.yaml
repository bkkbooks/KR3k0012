  - {type: variant, offset: 4, length: 0, content: '', SBCK: 周禮天官下曰醫師掌醫之政令聚毒藥以共醫事凡􅀖之有疾病者疕瘍者造焉則使醫分而治之歳終則稽其醫事以制其食十全爲上十失一次之十失四爲下又天官疾醫職曰疾醫掌}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 周禮天官下曰醫師掌醫之政令聚毒藥以共醫事凡邦之有疾病者疕瘍者造焉則使醫分而治之嵗終則稽其醫事以制其食十全為上十失一次之十失四為下又天官疾醫職曰疾醫掌}
