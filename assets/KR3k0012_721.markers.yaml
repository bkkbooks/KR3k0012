  - {type: variant, offset: 6, length: 1, content: 易, SBCK: 兩之以九竅之變叅之以九藏之動凡民之有疾病者分而治之死終則各書其所以而入于醫師瘍醫掌腫瘍潰瘍金瘍折瘍之祝音注藥劀音刮殺之劑凡療瘍以五毒攻之以五氣養之以五藥療之以五味節之凡藥以酸養骨以辛養筯以鹹養脉以苦養氣以甘養肉以滑養竅凡有瘍者受其藥焉禮記曲禮}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_SBCK_721-1b}
  - {type: variant, offset: 6, length: 1, content: 易, WYG: 兩之以九覈之變㕘之以九藏之動凡民之有疾病者分而治之死終則各書其所以而入於醫師瘍醫掌腫􅅑潰瘍金􅅑折􅅑之祝音注藥劀音刮殺之劑凡療痬以五毒攻之以五氣養之以五藥療之以五味節之凡藥以酸養骨以辛養筋以鹹養脈以苦養氣以甘養肉以滑養竅凡有􅅑者受其藥焉禮記曲禮}
