  - {type: punctuation, offset: 17, content: 「, id: KR3k0012_CHANT_721-bkkpn10}
  - {type: variant, offset: 17, length: 0, content: '', SBCK: 晉侯疾求醫於􅁗􅁗伯使醫緩爲之緩醫名爲猶治也未至公夢疾爲二竪子曰彼良醫也懼傷我焉逃之其一曰居肓之上膏之下若我何肓心鬲也心下爲膏醫至曰疾不可爲也在肓之上膏之下攻之不可逹之不及藥不至焉不可爲也公曰良醫也厚爲之禮而歸之又襄三曰楚子使薳子馮爲令尹訪於申叔豫叔豫曰國多寵而王弱國不可爲也遂以疾辝方暑闕地下氷而床焉重繭衣裘鮮食而寢楚子使醫視之復曰瘠則甚矣而血氣未動乃使子南爲令尹又昭元曰晉侯求醫於􅁗伯􅁗伯使醫和視之曰疾不可爲也是謂近女室疾如蠱惑疾非􅀑非食惑以喪志惑女色而失志良臣將死天命不祐良臣不匡救君過故將死而不爲天所右公曰女不可近乎對曰節之先王之樂所以節百事也故有五節五聲之節遟速本未以相及中聲以降五降之後不容彈矣於是有煩手淫聲慆堙心耳乃忘平和}
  - {type: page-break, offset: 17, content: '', id: KR3k0012_SBCK_721-2a}
  - {type: variant, offset: 17, length: 0, content: '', WYG: 晉侯疾求醫於秦秦伯使醫緩為之緩醫名為猶治也未至公夢疾為二豎子曰彼良醫也懼傷我焉逃之其一曰居肓之上膏之下若我何肓心鬲也心下為膏醫至曰疾不可為也在肓之上膏之下攻之不可逹之不及藥不至焉不可為也公曰良醫也厚賜之而歸又襄三曰楚子使薳子馮為令尹訪於申叔豫叔豫曰國多寵而王弱國不可為也遂以疾辭方暑闕地下氷而床焉重繭衣裘先食而寝楚子使醫視之復曰瘠則甚矣而血氣未動乃使子南為令尹又昭元曰晉侯求醫於秦秦伯使醫和視之曰疾不可為也是謂近女色疾如蠱非鬼非食惑以喪志惑女色而失志良臣将死天命不祐良臣不匡救君過故将死而不為天所祐公曰女不可近乎對曰節之先王之樂所以節百事也故有五節五聲之節遲速本末以相及中聲以降五降之後不容彈矣於是有煩手淫聲慆堙心耳乃忘和平}
  - {type: page-break, offset: 17, content: '', id: KR3k0012_WYG_721-2b, image: WYG0899/WYG0899-0374b.png}
  - {type: page-break, offset: 17, content: '', id: KR3k0012_WYG_721-3a, image: WYG0899/WYG0899-0374c.png}
  - {type: variant, offset: 17, length: 0, content: '', krp: 晉侯疾求醫於秦秦伯使醫緩爲之緩醫名爲猶治也未至公夢疾爲二竪子曰彼良醫也懼傷我焉逃之其一曰居肓之上膏之下若我何肓心鬲也心下爲膏醫至曰疾不可爲也在肓之上膏之下攻之不可逹之不及藥不至焉不可爲也公曰良醫也厚爲之禮而歸之又襄三曰楚子使薳子馮爲令尹訪於申叔豫叔豫曰國多寵而王弱國不可爲也遂以疾辝方暑闕地下氷而床焉重繭衣裘鮮食而寢楚子使醫視之復曰瘠則甚矣而血氣未動乃使子南爲令尹又昭元曰晉侯求醫於秦伯秦伯使醫和視之曰疾不可爲也是謂近女室疾如蠱惑疾非鬼非食惑以喪志惑女色而失志良臣將死天命不祐良臣不匡救君過故將死而不爲天所右公曰女不可近乎對曰節之先王之樂所以節百事也故有五節五聲之節遟速本未以相及中聲以降五降之後不容彈矣於是有煩手淫聲慆堙心耳乃忘平和}
  - {type: variant, offset: 19, length: 0, content: '', SBCK: 弗聽也物亦如之至於煩乃舎也巳無以生疾君子之近琴瑟以儀節也非以慆心也天}
  - {type: variant, offset: 19, length: 0, content: '', WYG: 弗聼也物亦如之至於煩乃舍也已無以生疾君子之近琴瑟以儀節也非以慆心也天}
