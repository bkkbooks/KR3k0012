  - {type: variant, offset: 747, length: 1, content: 單, krp: 毒當由醫非凡折君之名人所知譏上不舎藥物所以加弑尚書說命曰若藥弗瞑眩厥疾弗瘳開汝心以沃我心如服藥心瞑眩極其病乃除欲其出言以自警也論語曰子曰人而無恒不可以作巫醫帝王丗紀曰伏羲氏仰觀象於天俯觀法於地觀鳥獸之文與地之冝近取諸身逺取諸物於是造書契以代結繩之政畫八卦以通神明之德以類萬物之情所以六氣六府五藏五行隂陽四時水火昇降得以有象百病之理得以有類乃甞味百藥而制九針以拯夭枉焉又曰炎帝神農氏長於姜水始教天下耕種五榖而食之以省殺生甞味草木宣藥療疾救夭傷之命百姓日用而不知著本草四卷又曰黄帝有熊氏命雷公歧伯論經脉傍通問難八十一爲難經教制九針著内外術經十八卷又曰歧伯黄帝臣也帝使歧伯甞味草木典主醫病經方夲草素問之書咸岀焉素問曰黄帝㘴明堂召雷公而問之曰子知醫之道乎雷公對曰誦而未能解解而未能別別而未能明明而未能彰足以治羣僚不足至侯王願得受樹天之度四時隂陽合之別星辰與日月光以彰經術後丗益明上通神農著至教疑於二黄帝曰善無失之此皆隂陽表裏上下雌雄相輸應也而道上知天文下知地理中知人事可以長乆以教衆庶亦不疑殆醫遒論篇可傳後丗可以爲寳丗本曰巫咸堯臣也以鴻術爲帝堯之醫史記曰扁鵲渤海鄭人姓秦名越人少時爲人舎客桑君過扁鵲扁鵲獨竒之常謹遇之長桑君亦知扁鵲非常人乃呼鵲與語曰我有禁方年老欲傳與公公無泄乃出其懷中藥與扁鵲飲是以上池之水三十日當知物矣乃悉取禁方盡與扁鵲以其飲藥三十日視見垣外一方人以此視疾盡見五藏癥結特以侯脉爲名耳爲醫或在齊或在趙趙簡子疾五日不知人召扁鵲入視疾岀董安于問扁鵲扁鵲曰血脉滯也而何恠昔秦穆公甞如此七日而寤居二日半簡子寤語諸大夫曰我之常所甚樂與百神遊于鈞天廣樂九奏萬舞不類三代之樂其聲動心有一熊欲援我帝命我射之中熊熊死有羆來我又射之中羆羆死帝甚喜賜我二笥皆有副吾見兒在帝側属我一翟犬曰及而子之壯也以賜之帝告我晉國且丗衰七丗而亡嬴姓將大敗周人於范魁之西而亦不能有也董安于受言書而藏之以扁鵲言告簡子簡子賜扁鵲田四萬畝其後扁鵲過􅉑􅉑太子死扁鵲至􅉑宫門下問中庶子喜百者曰太子何病國中治穰過於衆事中庶子曰太子病血氣不時交錯而不得泄暴發於外則爲中害精神不能上邪氣邪氣畜積而不得泄是以陽緩而隂急故暴蹷而死扁鵲曰其死何時曰雞鳴時至今日収乎曰未也収謂棺歛其死未能半日鵲曰臣齊渤海秦越人也家在鄭未甞得望清光侍謁於前也聞太子不幸而死臣能生之中庶子曰先生得無誕乎何以言太子之可生也臣聞上古之時醫有俞附治病不以湯液醴灑鑱石撟引案杭毒熨一撥見病之應因五藏之輸乃割皮解肌訣脉結䈥搦髓折肓瓜膜湔浣腸胃漱滌五藏錬精易形先生之方能若是則太子可生也若不如是而欲生之曽不可以告孩嬰之兒扁鵲仰天嘆曰夫子之爲方也若以管窺天以隙視文越人之爲方也不待切脉望色聽聲冩形言病之所在聞病之陽論得其隂聞病之隂論得其陽病應見於大表不出千里决者至衆不可曲止也子以吾言爲不誠試入侯太子當聞其耳中鳴而鼻張循其兩股以至於隂當尚温也中庶子聞扁鵲言目眩然而不能瞚舌橋然而不能下乃以扁鵲言入報􅉑君􅉑君聞之大驚岀見扁鵲於中闕曰竊聞髙義之日乆矣然未甞得拜謁於前也先生過小國幸而舉之偏國寡臣幸甚有先生則活無先生則弃捐溝壑長終而不反言未及畢因歔欷服皮力切臆涕泣撗流不能自止容皃變更扁鵲曰太子病者所謂尸蹷者也夫以陽入隂中動胃繵縁中經維絡别下於三焦膀胱是以陽脉下遂音墜隂脉上爭㑹氣閉而不通隂上而陽内行下内皷而不起上外絶而不爲使上有絶陽之絡下有破隂之紉破隂絶陽之色巳廢脉亂故形静如死狀太子未死也夫以陽入隂支蘭藏者生以隂入陽支蘭藏者死凡此數事者皆五藏蹷中之時暴作也良工取之拙者疑殆扁鵲乃使弟子子陽礪針砥石以取外三陽五㑹有間太子蘇乃使子}
  - {type: variant, offset: 749, length: 0, content: '', SBCK: 爲五分之熨以八减之齊和煑之以更熨兩臍下太子起坐更適隂陽但服湯二旬而復故故天下盡以扁鵲爲能生死人扁鵲曰越人非能生死人也此自當生}
