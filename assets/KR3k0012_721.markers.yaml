  - {type: variant, offset: 4, length: 0, content: '', krp: 周禮天官下曰醫師掌醫之政令聚毒藥以共醫事凡邦之有疾病者疕瘍者造焉則使醫分而治之歳終則稽其醫事以制其食十全爲上十失一次之十失四爲下又天官疾醫職曰疾醫掌}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 萬民之疾病四時皆有癘疾春時有痟首疾夏時有痒疥疾秋時有瘧寒疾冬時有嗽上氣疾以五味五榖五藥養其病以五氣五聲五色視其死}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 萬民之疾病四時皆有癘疾春時有痟首疾夏時有痒疥疾秋時有瘧寒疾冬時有𠻳上氣疾以五味五榖五藥養其病以五氣五聲五色視其死}
  - {type: variant, offset: 5, length: 0, content: '', krp: 萬民之疾病四時皆有癘疾春時有痟首疾夏時有痒疥疾秋時有瘧寒疾冬時有嗽上氣疾以五味五榖五藥養其病以五氣五聲五色視其死}
