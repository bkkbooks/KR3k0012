  - {type: variant, offset: 52, length: 2, content: 王隱, SBCK: 勢不得展自當疲於木石之間徐制其弊耳備知其計不行乃引伏兵八千人從谷中出遜曰所以不聽諸君擊班者揣之必有巧故也諸將並曰攻備當在􅀄今乃令入五六百里相銜持經七八月其諸要害皆巳固守擊之必無利矣遜曰備是猾虜更嘗事多其軍始集思慮精專未可干也今住巳乆不得我便兵疲意沮計不復生掎角此㓂正在今日乃先攻一營不利遜曰巳曉破之術乃令各持一把茅以火攻抜之俄爾成勢遂率諸軍同時俱攻破四十餘營備􅂛馬鞍山陳兵自繞遜督促諸軍四靣蹙之土崩瓦解死者萬數備因夜遁}
