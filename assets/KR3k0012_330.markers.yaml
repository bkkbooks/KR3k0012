  - {type: variant, offset: 2833, length: 1, content: 江, WYG: 將本軍與侍中渾瑊㑹吐蕃盟於平源元諒謂瑊曰戎狄多詐不可無備公奉國命輕重宜有以防之瑊不從且不設備及㑹元諒命軍中皆衣甲持兵整部隊以候變去壇十里虜果衷甲乗瑊無備伏精騎以圍城士大夫皆衣朝服就執及軍士死者不可勝數所脱者百無一二瑊挺身走虜騎逐瑊至元諒軍士皆堅陣持滿虜騎望見之乃引去是日無元諒軍瑊幾不免元諒除盗必殺無赦戎冦甚憚之又曰元和中城臨涇源從涇源節度使叚祐之請也臨涇城直涇州}
