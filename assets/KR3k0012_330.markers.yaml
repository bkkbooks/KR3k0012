  - {type: variant, offset: 582, length: 0, content: '', WYG: 武徳中太宗領兵征仁杲於析摭城析音昔思厯切摭音炙之石切賊有十餘萬兵鋒甚鋭數來挑戰諸将咸請戰太宗曰我士卒新經挫衂鋭氣猶少賊驟勝必輕進好鬭我且閉壁以待其氣衰而後擊可一戰而破此萬全計也因令軍中曰敢言戰者斬相持者乆之賊粮盡軍中頗擕其將翟長孫梁胡郎率所部相繼來降太宗知仁杲心腹内離謂諸將曰可以戰矣因令行軍梁實營於淺水原以誘之賊大將宗羅}
