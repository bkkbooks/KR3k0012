  - {type: variant, offset: 2481, length: 349, content: 餘黨據晉絳等三州未下詔羅㬋行絳晉呂三州諸軍事進兵圍之為流矢所中卒于師時年六十曰送柩還京行數里無故輿馬自止策之不動有飃風旋遶焉絳州長史郭雅稽顙呪之曰公恨小寇未平耶尋即除殄無為戀恨於是風靜馬行見者莫不悲歎其年秋七月予仲隱夢見羅㬋曰我明日當戰其靈座所有弓箭刀劍無故自動若人帶持之狀絳州城陷是其日也唐書曰高祖初起師次霍邑隋武牙郎將宋老生陳兵拒險義師不得進屯軍於賈胡堡會霖雨積旬餽運不給高祖患之忽有白衣人詣軍門見曰霍山神遣語大唐皇帝若向霍山邑當東南傍山取路八月雨止我當助爾破之高祖初哂之遣人東南視地果有微道高祖笑曰此神不欺趙襄子豈負吾耶時有訛言云突厥將襲太原又軍糧且盡高祖命旋師太宗切諫乃止八月巳卯雨果霽高祖太悅以大牢祭霍山辛巳引師從傍山道趨霍邑去城十餘里有陣雲起軍北東西竟天高祖謂裴寂曰雲色如此必當有慶又曰, SBCK: ''}
