  - {type: variant, offset: 41, length: 3, content: 雨沾衣, SBCK: 下兵起我謂唾掌而决至於今日兵革方始觀此非我所决不如休兵力耕以救㐫年兵法百樓不攻今吾諸營樓樐千里樐即魯字見􅀃文釋名曰擼露也上元覆屋也積榖三百萬斛食此足以待天下慶也魏志曰兾州牧韓馥}
