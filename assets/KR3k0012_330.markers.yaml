  - {type: variant, offset: 11, length: 0, content: '', SBCK: 古曰謂季氏亡則魯不昌楚以子玉輕重師古曰謂楚殺子玉而晉侯喜可知也魏以無知折衡師古曰信陵君也項以范増存亡故楚跨有南土帶甲百万隣國不以爲難子玉爲}
