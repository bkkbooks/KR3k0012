  - {type: variant, offset: 2069, length: 4, content: 祖遣驃騎, SBCK: 宗知仁果心腸内離謂諸將曰可以戰矣因令行軍㹅管梁實營於淺水原以誘之賊大將宗羅侯曰恃驍悍求戰不得氣憤者乆之及是盡銳攻梁實兾逞其志梁實固險下以挫其鋒羅緱攻之愈急太宗度賊已疲復謂諸將曰彼氣將衰吾當取之必矣申令諸軍遟明合戰復令}
