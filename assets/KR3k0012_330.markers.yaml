  - {type: variant, offset: 442, length: 309, content: 仲德初欲南歸奔太山追騎急夜行忽見前有猛炬導之乘火行百許里以免又曰元兇弒逆孝武率眾入討荊州刺史南譙王義宣雍州刺史臧質並舉義兵三月乙未建牙軍門是時多不悉舊儀有一翁班白自稱少從武帝征伐頗悉其事因使指麾事畢忽失所在自冬至春常東北風連陰不霽其日牙立之後風轉西南景色開霽有紫雲陰于牙上北齊書曰侯景遣將任約伐湘東王於江陵陸法和自請征之至赤沙湖與任約相對縱大舫於前而逆風不便法和執白羽以麾風即返於是大潰約逃竄不知所之後周書曰太祖既繼賀拔岳起事將刑牲盟誓同奬王室初賀拔岳營於河曲有軍吏獨行忽見一老公鬢眉皓素謂之曰賀拔雖復據有此眾然無所成當有一宇文家從東北來後必大盛言訖不見此吏恒與所親言之至是方驗隋書曰張祥開皇中累遷并州司馬仁壽末漢王諒, SBCK: 休範}
  - {type: variant, offset: 442, length: 2, content: 仲德, WYG: 休範舉兵於尋陽已發東下朝廷惶駭宋相齊髙祖議曰昔上流謀逆皆因淹緩至於覆敗休範必逺懲前失輕兵急下乗我無備今應變之術不宜在逺若偏師失律則大沮衆心頓新亭堅守宫掖東府石頭以待賊至千里孤軍無復委積求戰不得自然瓦解請頓新亭以當鋒休範果敗又髙祖紀曰時議者欲分兵屯守諸津帝曰賊衆我寡分兵測人虛實一處失利則沮三軍之心若聚衆石頭則力不分也三國典畧曰梁武六王蕭紀在蜀一十七年開拓土宇噐甲殷積有馬八千疋既便騎射尤工舞弰後魏書曰任城王澄時四中郎將兵數寡弱不足以襟帶京師澄奏宜以東中帶營陽郡南中帶魯陽郡西中帶𢎞農郡北中帶河内郡選二品三品親賢兼稱者居之省非急之作配以強兵如此則深根固本強榦弱枝之義也靈太后}
