  - {type: variant, offset: 1204, length: 18, content: 射則中之不然則否一發而斃左右咸稱萬歲, WYG: 將於是大潰殺傷畧盡}
  - {type: variant, offset: 1206, length: 376, content: 中之不然則否一發而斃左右咸稱萬歲又曰建中三年哥舒曜欲攻李希烈於許州師次潁橋大電雷而雨營中震不能言者三四十人驢馬死者有七曜惡之乃退又曰田悅為魏王受冊之日其軍上有雲物稍異馬燧等望而笑曰此雲無知乃為賊瑞又曰田悅稱魏王其營地前二年土長高三尺餘魏州戶曹韋稔為土長頌曰公益土之兆也管子曰桓公北征孤竹未至卑耳之谿十里援弓而射射未發也謂左右曰見前人乎對曰不見公曰寡人見人長尺而人物具焉冠冠右袪衣馬前疾走寡人其不濟乎管仲曰祛衣示前有水也右示涉也至卑耳之谿從左涉深及冠從右方深至𣍿已涉大濟公拜曰仲父之聖若此也山海經曰鹿臺之山有鳥焉如雄雞而人面名曰島溪其鳴自呼見則有兵小決之山有獸焉如猨白首赤足見則有兵能山之穴恒出神人夏啟而冬閉是穴也冬啟乃必有兵郭璞注曰今鄴西北有石鼓鳴乃有兵即北類淮南子曰人主有伐國之志邑犬群嗥雄雞夜鳴庫兵動而戎馬驚戎馬兵馬也雞夜鳴而兵馬起氣之感動也六韜曰, SBCK: 沮}
