  - {type: variant, offset: 1694, length: 505, content: 先以造于殷天下從之甲子之日至于牧野舉師而討之紂城備設而不守親擒紂縣其首於白旗又曰武王伐紂諸侯已至未知士民何如太公曰天道無親今海內陸沉於殷久矣百姓可與樂成難與慮始伯夷叔齊曰殺一人而有天下聖人不為太公曰師渡孟津六馬仰流赤烏降白魚外入此豈非天所命也師到㙁音牧野天暴風電前後不相見車蓋發越轅衡摧折旌旄三折旗幟飛揚者精銳感天也雨以洗吾兵雷電應天也吳越春秋曰越王追攻吳兵欲入胥門未至六里望吳南城見伍子頭眉若車輪目垂光烈髮鬢四張耀於十數里大懼留兵即日夜半暴風疾雨雷電鳴沙石飛射疾於弓弩越軍壞敗桓譚新論曰維四月太子發上祭于畢下至孟津之上此武王已畢三年之喪欲卒父業升舟而得魚則地應也㷈祭降烏天應也二年聞紂殺比干囚箕子太師少師抱樂器奔周甲子日月若連壁五星若連珠昧爽武王朝至于南郊牧野從天以討紂故兵不血刃而定天下三國典略曰東魏以平鑒為懷州刺史鑒乃於軹開道築城以防于我尋而太祖遣驃騎將軍楊檦儀同長孫慶明率兵東伐是時新築之城少糧乏水眾情大懼南門內有一土井隨汲即竭鑒乃具衣冠俯井而祝俄而泉湧城內皆足楊水示檦檦無功而還檦疋眇切又曰周帝問齊王延宗曰鄴城若為可取延宗辭曰亡國之大夫不可與圖存強問之乃曰若任城據鄴臣不能知若今主自守陛下兵不血刃時好, WYG: 言}
