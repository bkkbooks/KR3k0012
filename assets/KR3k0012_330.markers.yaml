  - {type: variant, offset: 1616, length: 423, content: 又曰紂為無道武王於是東伐紂至于河上雨甚雷疾王之乘黃振而死旗旌折陽侯波周公進曰天不祐周矣意者君德行未盡而百姓疾怨故天降吾禍於是太公援罪人而戮之於河三鼓之率眾而先以造于殷天下從之甲子之日至于牧野舉師而討之紂城備設而不守親擒紂縣其首於白旗又曰武王伐紂諸侯已至未知士民何如太公曰天道無親今海內陸沉於殷久矣百姓可與樂成難與慮始伯夷叔齊曰殺一人而有天下聖人不為太公曰師渡孟津六馬仰流赤烏降白魚外入此豈非天所命也師到㙁音牧野天暴風電前後不相見車蓋發越轅衡摧折旌旄三折旗幟飛揚者精銳感天也雨以洗吾兵雷電應天也吳越春秋曰越王追攻吳兵欲入胥門未至六里望吳南城見伍子頭眉若車輪目垂光烈髮鬢四張耀於十數里大懼留兵即日夜半暴風疾雨雷電鳴沙石飛射疾於弓弩越軍壞敗桓譚新論曰維四月太子發上祭于畢下至孟津之上此武王已畢三年之喪欲卒父業升舟而得魚則地應也㷈祭降烏天應也二年聞紂殺比干囚箕子太師少師抱樂器奔周甲子日月若連壁五星若連珠昧爽武王朝至于南郊牧野從天以討紂故兵不血刃而定天下, SBCK: ''}
