  - {type: variant, offset: 4, length: 2, content: 徵應, WYG: 一警備警備孫子曰用兵之法無恃其不來也恃吾有能以待之也無恃其不攻吾也恃吾不可攻也安則思危存則思亡常有備也左傳曰不備不虞不可以師又曰諸侯相見軍衛不徹警也又曰晋欒書伐楚將戰楚晨壓晋軍而陣壓乗其未備也軍吏患之晋將范匄趨進曰塞井夷竈陣於軍中而䟽行首䟽行有當陣前户决開疊戰道行部郎切晋楚唯天所授何患焉楚師輕窕固壘而待之三日必退退而擊之必獲勝焉終敗楚師戰國䇿曰蘇秦將合從說燕文侯曰燕地方二千里帶甲十萬車七百騎六千粟支十年南有碣石鴈門之饒北有棗栗之利又曰張儀為秦以連横説韓王曰秦帶甲百餘萬虎賁之士不勝計秦卒猶孟賁之與怯夫又曰江乙對宣王曰今王之地方五千里帶甲百萬而屬之於昭奚恤故北方之畏昭奚恤也春秋後語曰蘓秦南説楚威王曰楚天下之强國也王天下之賢主也西有黔中郡東有夏周海南有洞庭蒼梧北有汾陰地方五千里帶甲百萬車千乗騎萬疋粟支十年此霸王之資也史記曰周夫二人伐陳吳救之軍行三十里雨十日夜見星左史倚相謂荆大將子期曰雨十日甲輯兵聚吳又必至不如備之乃為陣而吳人至見荆有備而反史曰其反覆六十里其君子休小人為食我行三十里擊之必克從之遂破吳軍又曰秦將王翦率兵六十萬伐楚楚王悉國中兵以拒之王翦至堅壁而守之不肯戰楚兵數挑戰終不出王翦曰休士洗沐而善飲食拊循之親與士卒同食乆之王翦使人問軍中戲乎曰方投石超距於是王翦曰士卒可用矣楚又數挑戰而秦不出乃引而東翦因舉兵追之大破楚軍於南因滅其國又曰漢景帝時吳王濞反初吳王之渡淮與楚王遂西敗棘壁乘勝前鋭甚梁孝王恐大將軍擊吳又敗梁將士卒皆還走梁數使使報漢大將周亞夫求救亞夫不許又使使惡亞夫於上上使人告之救梁惡禹路反亞夫復守便宜不行梁使韓安國及楚死事相弟張羽為將軍楚相張尚諫呉王而死乃得頗敗呉兵呉兵欲西梁城守堅不敢西即走亞夫軍㑹下邑師欲戰亞夫壁不肯戰呉糧絶卒飢數挑戰遂夜奔亞夫壁亞夫終不出中夜驚内相擾亂至帳下亞夫卧不起湏㬰纔定吳士卒多飢死遂以叛散}
