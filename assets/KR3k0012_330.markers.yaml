  - {type: variant, offset: 3050, length: 122, content: 人在江津二日便登艦大笑曰無量兵馬江陵舊多神祠俗恒祈禱自法和軍出無復一驗人以諸神皆行從故也又曰梁臨汝侯蕭猷嘗為吳郡太守與楚廟神交飲至一石而神亦有酒色所禱必從後遷益州刺史江陽人齊茍兒反率眾攻城猷乃遙禱請救將戰之日有田老逢一騎絡鐵從東來問去城幾里曰四, SBCK: 三}
