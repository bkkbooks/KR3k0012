  - {type: variant, offset: 52, length: 2, content: 王隱, WYG: 勢不得展自當疲於木石之間徐制其弊𤣥徳知其計不行乃伏兵八千人從谷口中出遜曰所以不聽諸君擊班者揣之必有巧故也諸將並曰攻彼當在初今乃令人五六百里相御持守又已經七八月其諸要害皆已固守擊之必無利矣遜曰𤣥徳猾虜更嘗事多其軍始集思慮精專未可干也今住已乆不得我便兵疲意沮計不復生犄角此冦正在今日乃先攻一營不利遜曰吾已曉破之術乃令人各持一把茅以火攻㧞俄而成勢遂率諸軍同時俱攻破四十餘營𤣥徳升馬鞍山陳兵自繞遜督促諸軍四面蹙之土崩瓦解死者萬數𤣥徳夜遁}
