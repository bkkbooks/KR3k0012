  - {type: variant, offset: 4, length: 2, content: 徵應, SBCK: 一警備孫子曰用兵之法無恃其不來也恃吾有能以待之也無恃其不攻吾也恃吾不可攻也安則思危存則思亡常有備也左傳曰不備不虞不可以師又曰諸侯相見軍衛不徹警也又曰晉欒書伐楚將戰楚晨壓晉軍而陣壓窄其未備也軍吏患之晉將范丐趨進曰塞井夷竈陳於軍中而踈行首踈行有當陣前戸决開壘戰道行部切晉楚唯天所受何患焉楚師輕窕固壘而待之三日必退退而擊之必􅀗勝焉終敗楚師戰國䇿曰􅂫秦將從􅀃燕文侯曰燕地方二千里帶甲十万車七百􅀐六千粟支十年南有碣石門鴈之饒北有􅀥粟之利又曰張儀爲秦連撗􅀃韓王曰秦帶甲百餘万虎賁之士不勝計􅁗卒猶孟賁之與怯夫又曰江乙對江宣王曰今王之地方五千里帶甲百万而專屬之於昭奚恤故北方之畏昭奚恤也春秋後語曰􅂫􅁗南􅀃楚威王曰楚天下之強國也王天地之賢主也西有黔中巫郡東有夏周海陽南有洞庭蒼梧北有汾隂地方五千里帶甲百万車千乗􅀐万疋粟支十年此覇王之質也史記曰周末荆人伐陳呉救之軍行三千里雨十日夜見星左史􅀝相謂荆大將子期曰雨十日甲輯兵聚呉人必至不如備之乃爲陣而呉人至見荆有備而反史曰其反覆六十里其君子休小人爲食我行三十里擊之必克從之遂破呉軍又曰􅁗將王翦率兵六十萬伐楚楚王悉國中兵以拒之王翦至堅壁而守之不肯戰楚兵數挑戰終不出王翦日休士洗沐而善飲食拊循之親與士卒同食乆之王翦使人問軍中戯乎對曰方投石超距於是王翦曰士卒可用矣楚又數挑戰而􅁗不出乃引而東翦因舉兵追之大破楚軍蘄南因滅其國又曰漢景帝􅀄呉王濞反惣兵度淮與楚王戰遂敗􅁄壁乗勝前銳甚梁孝王恐六將軍擊呉又敗梁將士卒皆還走梁數使使報漢大將周亞夫求救亞夫不許又使使惡亞夫於上上使人告之救梁􅁖烏路切亞夫復守便冝不行梁使韓安國及楚死事相弟張羽爲將軍楚相張尚諌呉王而死乃得頗敗呉兵西梁城守堅不敢西即走亞夫軍㑹下邑矣師欲戰亞夫壁不肯戰呉粮絶卒飢數挑遂死奔亞夫壁亞夫終不出中夜驚内相擾乱至帳下亞夫卧不起頃之復定呉士卒多飢死遂以叛散}
