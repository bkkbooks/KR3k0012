  - {type: variant, offset: 36, length: 2, content: 祖都, SBCK: 吏皆曰茂前日已破今易擊也覇曰不然􅂫茂客兵逺來粮食不足故數挑戰以徼一切之勝徼要也一切猶權時也徼古蕘切今閇營休士所謂不戰而屈人之兵善之善者也茂建旣不得戰乃引還營其夜建兄子誦反閇城拒之茂建遁去誦以城降又曰公孫瓉旣爲鮮于輔所敗慮有非常乃告於髙京以䥫爲}
