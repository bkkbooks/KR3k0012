  - {type: variant, offset: 48, length: 0, content: '', SBCK: 兾州雖鄙帶甲百萬􅂖支十年又曰大軍南征呉到積湖大將滿寵帥諸軍在前與賊隔水相對令諸將曰今夕風甚猛賊必來燒營冝爲之備諸軍皆驚夜半賊果遣十部來燒營寵掩擊破之又曰呉將諸􅁑恪圍新城司馬景王使鎮東將軍母丘儉陽州刺史文欽等距之儉欽請戰景王曰恪卷甲􅀷入投兵死地其鋒未易當且新城小而固攻之未可拔遂命諸將髙壘以弊之相持數月恪攻城力屈死傷太半景王乃令欽督銳卒趣合榆断要其歸路儉帥諸軍以爲後継恪懼而遁欽逆擊大破之斬首萬餘級吴書曰趙咨字德度南陽人􅀶學多智應對辯捷孫權爲吴王擢至太中大夫使魏文帝嘲咨曰吴王頗知學乎咨曰浮江萬艘帶甲百萬任賢使能志在經略雖有餘閑􅀶覽書傳歴史籍採竒異不效書生㝷章􅎥句而已又曰吴難魏不咨曰帶甲百萬江漢爲池何難之有蜀志曰先主率大衆東伐呉呉將陸遜拒之蜀主從建平連圍至夷陵界立數十屯以金帛爵賞誘動諸夷先遣將呉班以數千人於平地立營欲以挑戰諸將皆欲擊之遜曰備舉軍東下銳氣始盛且乗髙阻險難可卒攻攻之縱下猶難盡尅􅀂有不利損我大勢非小故也今但奬厲將士廣施方略以觀其變􅀂此間}
  - {type: page-break, offset: 48, content: '', id: KR3k0012_SBCK_330-4a}
  - {type: variant, offset: 48, length: 0, content: '', WYG: 冀州雖鄙帶甲百萬榖支十年又曰大軍南征吳到積湖大將漢寵帥諸軍在前與賊隔木相對令諸將曰今夕風甚猛賊必來燒營宜為之備諸軍皆驚夜半賊果遣十部來燒營寵掩擊破之又曰吳將諸葛恪圍新城司馬景王使鎮東將軍毋丘儉揚州刺史文欽等拒之儉欽請戰景王曰恪卷甲深入投兵死地其鋒未易當且新城小而固攻之未可㧞遂命諸將髙壘以弊之相持數月恪攻城力屈死傷大半景王乃令欽督鋭卒趣合偷斷要其歸路儉帥軍以為後繼恪懼而遁欽逆擊大破之斬首萬餘級吳書曰趙咨字徳度南陽人愽學多智應對辨㨗孫權為吳王擢為大中大夫使魏文帝嘲咨曰吳王頗知學乎咨曰浮江萬艘帶甲百萬任賢使能志在經畧雖有餘閒愽覧書傳渉厯史籍採竒異不效書生尋章摘句而已又曰吳難魏否咨曰帶甲百萬江漢為池何難之有蜀志曰先主率大衆東伐吳吳將陸遜拒之蜀主從建平連圍至夷陵界立數十屯以金帛爵賞誘動諸夷先遣將吳班以數千人於平地立營欲以挑戰諸將皆欲擊之遜曰𤣥徳軍東下鋭氣始盛且乗髙阻守險難可卒攻攻之縱下猶難盡克若有不利損我大勢非小故也今但奬勵將士廣施方畧以觀其變若此間}
