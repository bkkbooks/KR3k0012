  - {type: variant, offset: 722, length: 162, content: 從河東擊馮翊而反守潼關引日而後北度何也公曰賊守潼關若吾入河東賊必引守諸津則西河未可度也吾欲盛兵向潼關賊悉眾南守西河之備虛故徐晃等得擅取西河然後引軍北度賊不能與吾爭西河者以有二將之軍也連車樹柵為甬道而南既為不可勝且以示弱度渭為堅壘虜至不出所以驕之也故賊不為營壘而求割地吾順偽言許之所以縱逸其意使自安而不為備因蓄士卒之力一朝擊之, SBCK: 及設}
