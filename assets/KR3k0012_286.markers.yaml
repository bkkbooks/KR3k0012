  - {type: variant, offset: 938, length: 2, content: 遂前, SBCK: 甚銳幸我速戰􅀂逆擊之落其計矣靖以待之必懷疑貳迭相猜防一則疑吾與毖譎而覆之二則自疑三國之中與吾有韓魏之謀者待其人情沮惑然後取之矣於是三國攻􅁄城廆閉門不戰遣使送牛酒以犒宇文大言於衆曰崔毖昨有使}
  - {type: variant, offset: 938, length: 74, content: 遂前至偃城晃詭道作都壍示欲截其後賊燒屯走晃得偃城兩面連營稍前去賊圍三丈所未攻賊圍頭有屯又別屯四冢晃揚聲當攻圍頭屯而密攻四冢羽見四冢欲壞自將步兵五千出, WYG: 甚銳幸吾速}
  - {type: variant, offset: 938, length: 2, content: 遂前, krp: 甚銳幸我速戰若逆擊之落其計矣靖以待之必懷疑貳迭相猜防一則疑吾與毖譎而覆之二則自疑三國之中與吾有韓魏之謀者待其人情沮惑然後取之矣於是三國攻棘城廆閉門不戰遣使送牛酒以犒宇文大言於衆曰崔毖昨有使}
