  - {type: variant, offset: 2239, length: 773, content: 部比能彌如素利等割地統御各有分界乃共要盟不得以馬與中國市豫以戎狄為一非中國之利乃先搆離之使自為讎敵牙相攻伐素利違盟出馬千疋與官為比能所擊求救於豫豫深入虜廷胡圍豫於馬邑城十重豫密使司馬建旌旗鳴鼓吹從南門出胡人皆往赴之豫將精銳自北門出鼓譟而赴兩頭俱發出虜不意虜眾亂棄馬步走追討二十餘里僵屍蔽地胡人破膽威振沙漠又曰諸葛亮出斜谷司馬宣王屯北原亮盛兵西行諸將皆欲攻西圍郭淮獨以為此見形於西欲使官兵重應之必攻陽遂耳其夜果攻陽遂有備不得上吳志曰曹公入荊州劉備為曹公所破與魯肅遇於當陽遂共圖計遣諸葛亮詣孫權權遣周瑜程普與備并力逆曹公遇於赤壁瑜部將黃蓋曰今寇眾我寡難與持久觀操舩艦相接可燒而走也乃取蒙衝數十實以薪草上建牙旗蓋乃先報書欺以欲降曹公軍延頸指言蓋降蓋收諸舡同時發火時風盛猛悉延燒岸上營落頃之熛炎張天人馬燒溺死者甚眾軍遂敗退又曰周瑜使甘寧據夷陵魏將曹仁圍寧呂蒙往救之仍分遣三百人柴斷嶮道賊走可得其馬軍到夷陵即日交戰所殺過半敵夜遁去行過此道騎皆捨馬步走蒙兵追蹙獲馬三百疋方舡載還又曰賀齊討黟歙賊帥黟音伊凡切歙音攝陳僕祖山等二萬戶屯歷林山四面壁立高數十丈逕路危狹下容方楯賊臨高下石不可得攻軍住經日將吏患之齊身出周行觀視形便陰募輕捷士為作鐵戈密於隱嶮賊所不備處以戈柘山為緣道道成夜令潛上乃多懸布以受不人得上百數十人四面流布俱鳴鼓角齊勒兵待之賊夜聞鼓聲四合謂大軍悉已得上驚懼惑亂不知所為守路備險者皆走還依眾大軍因是得上其中有善禁術吳師刀劍不得拔弓弩射矢皆還自向輒致不利齊曰吾聞之雄黃勝五兵還丹能威敵夫金有刃䖝有毒者皆可禁之以無刃之兵不毒之䖝彼必無能為也遂伐木為棓列陣四面羅布俱鳴鼓角勒兵待𥌓賊惶遽無依禁術不效遂大破而降之蜀志曰諸葛孔明率眾定南夷擒夷師孟獲七縱七擒獲曰公天威也南人不復反矣揚雄蜀王記云秦王石牛置金於後蜀人以為牛便金蜀王發卒開道令五丁拖牛置成都蜀道乃通, WYG: 六}
