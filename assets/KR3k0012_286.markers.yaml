  - {type: variant, offset: 1396, length: 10, content: 昱為然遂北渡河攻藩破, SBCK: 人將侮我矣閔威名素振燕衆咸憚}
  - {type: variant, offset: 1396, length: 190, content: 昱為然遂北渡河攻藩破之水道得通又曰司馬宣王征公孫文懿沉舟潛濟遼水作長圍忽棄賊而向襄平諸將言曰不攻賊而作圍非所以示眾也宣王曰賊堅營高壘欲以老吾兵也攻之正入其計此王邑所以恥過昆陽也古人云敵雖高壘不得不與我戰者攻其所必救也賊大眾在此則賊窟虛矣我直指襄平必懷內懼懼而求戰破之必矣遂整陣而過賊見兵出其後果邀之宣王謂諸將曰所以不攻其營正欲致此不可失也乃縱兵逆擊大破之三戰皆捷又曰田豫字國讓率擊, WYG: 斬}
