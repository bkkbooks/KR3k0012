  - {type: variant, offset: 898, length: 0, content: '', SBCK: 計也放之必恱不復爲浚用矣於是納其質而遣末杯就六眷等引還終􅀗其用又曰杜預以太康元年正月陳兵于江陵遣叅軍樊顯尹林鄧圭襄陽太守周竒等率衆循江西上授以節度旬日之間累尅城邑皆如預䇿焉又遣牙門管定周旨伍巢等率竒兵八百汎舟夜渡以襲樂郷多張旗幟起火巴山於要害之城以奪賊心呉都督孫歆震恐與伍延書曰北來諸軍乃飛渡江也呉之男女降者萬餘口旨巢等伏兵樂郷城外歆遣軍出拒王濬大敗而還旨等發伏兵隨歆軍而入歆不覺直至帳下虜歆而還故軍中爲之謡曰以計伐戰}
  - {type: variant, offset: 898, length: 0, content: '', WYG: 計也放之必悦不復為浚用矣於是納其質盟于渚陽就六眷等引還又曰杜預以太康元年正月陳兵于江陵遣參軍樊顯尹林鄧圭襄陽太守周竒等率衆循江西上授以節度旬日之間累尅城邑皆如預䇿焉又遣牙門管定周㫖伍巢等率竒兵八百汎舟夜渡以襲樂鄉多張旗幟起火巴山出於要害之地以奪賊心吴都督孫歆震恐與伍延書曰北來諸軍乃飛渡江也吴之男女降者萬餘口㫖巢等伏兵樂鄉城外歆遣軍出拒王濬大敗而還㫖等發伏兵随歆軍而入歆不覺直至帳下虜歆而還故軍為之謡曰以計伐戰}
