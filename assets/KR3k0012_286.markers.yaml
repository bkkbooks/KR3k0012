  - {type: variant, offset: 1208, length: 2, content: 遂超, SBCK: 崔鴻十六國春秋曰北涼泪渠蒙遜率兵伐南凉秃髮傉檀傉奴沃切入其境徙數千户而還傉檀追及蒙遜于窮泉蒙遜將擊之諸將皆曰賊已安營不可犯也蒙遜曰傉檀謂吾逺來疲􅁦必輕而無備及其壘壁未成可一鼓而滅進擊敗之乘勝至于姑臧夷夏降者乃數千戸傉檀懼請和之而歸又曰前燕將慕容垂討丁零翟釗于滑臺次于􅀺陽津釗於南岸拒守垂徙營就西津爲牛皮舡百餘艘載疑兵列仗泝流而上釗先以大衆備􅀺陽見垂向西津乃弃營西拒垂潜遣其桂林王慕容鎮率驍􅀐於􅀺陽津夜濟壁于河南釗聞而奔士衆疲渇}
  - {type: variant, offset: 1208, length: 0, content: '', WYG: 崔鴻十六國春秋曰北凉沮渠蒙遜率兵伐南凉秃髪傉檀傉奴沃切入其境徙数千戸而還傉檀追及䝉遜于窮泉䝉遜將擊之諸將皆曰賊已安營不可犯也䝉遜曰傉檀謂吾逺來疲弊必輕而無備及其壘壁未成可一鼓而滅進擊敗之乗勝至于姑臧夷夏降者乃数千戸傉檀懼請和之而歸又曰前燕将慕容垂討丁零翟釗于滑臺次于黎陽津釗于南岸拒守垂徙營就西津為牛皮船百餘艘載疑兵列仗泝流而上釗先以大衆備黎陽見垂向西津乃棄營西拒垂潜遣其桂林王慕容鎮率驍騎於黎陽津夜濟壁于河南釗聞而奔士衆疲渴走歸滑臺釗攜妻子率数百騎北趣日鹿垂遣追擊盡擒其衆又曰後燕慕容盛據遼東其遼西太守李朗隂引後魏軍上表請發兵以拒冦盛曰此必詐也召其使而詰之果驗盡滅其族遣將李悍率騎討之師次建安召悍旋師朗聞其家被誅也擁二千餘户以自固及聞悍中路而還謂有内變不復為備留其養子守令支迎魏師于北平悍候知之襲尅令支遣禆将追朗及于無終斬之盛謂羣臣曰前以追悍還者朗新為叛逆必忌官威一則鳩合同類刼害良善二則亡竄山澤未可卒平故非意而還以盈怠其志卒然掩之必尅之理也羣臣皆曰非所及也又曰前秦符堅䧟襄陽晉將桓冲攻之堅將慕容垂等率歩騎五萬救襄陽以石越為前鋒次于沔水垂越夜命三軍人持火炬於樹枝光照数里冲懼退還又曰後趙石勒將石季龍大掠陳蔡間而去晉將姚豹守譙城住西臺東晉將祖逖遣將韓潜等鎮東䑓同一大城賊從南門出入放牧逖軍開東門相守四旬逖以布囊盛土如米狀使千餘人運上臺又令数人擔米偽為疲極而息於道賊果逐之皆棄擔而走賊既獲米謂逖士衆豐飽而北兵饑乆益懼無復膽氣又曰後凉吕光遣將吕延伐西秦乞伏乾歸}
