  - {type: variant, offset: 1620, length: 154, content: 里結屯營多聚牛馬糞燃之從他道引去胡見煙火不絕以為尚在去行數十里乃知之又曰諸葛誕文欽反據壽春司馬景王揔兵討之謂諸將曰彼當突圍決一朝之命或謂大軍不能久省食減口冀有他變料賊之情不出此二者今當多方以亂之備其越逸此勝計也因命合圍分遣羸疾就穀淮北廩軍士大豆人三勝欽聞之果喜景王愈羸形以示之多縱反間揚言吳救方至誕等益寬恣食, SBCK: 級}
