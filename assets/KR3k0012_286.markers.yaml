  - {type: variant, offset: 1786, length: 366, content: 景王曰誕聚糧完守外結吳人自謂足據淮南必不便走今若急之損遊軍之力外寇卒至表裏受敵此危道也且堅守三面若賊陸道而來軍糧必少吾以遊兵輕騎絕其轉輸可不戰而破外賊欽等必為擒矣誕欽等出攻長圍諸軍逆擊走之初誕欽內不相協乃至窮蹙轉相疑貳誕殺欽子鴦踰城以為將軍封侯使巡城而呼景王見城上持弓者不發因令攻而拔之又曰諸葛誕據壽春反命將王基討之吳遣朱異來救誕於安城詔王基引諸軍轉據北山基謂諸將曰今圍壘轉固兵馬向集但當精脩守備以待越逸而列移兵守險使得放縱雖有智者不能善其後矣遂守便宜上䟽曰今與賊交利對敵當不動如山若遷移依險人心搖蕩於勢大損諸軍並據深溝高壘眾心皆定不可傾動此御兵之要地也書奏報聽之壽春竟破司馬文王與基書曰初議者云云求移者甚眾時未臨履亦謂宜然將軍深笇利害獨秉固志上違詔命下距眾議終至制敵擒寇雖古人所述不足過也又曰郭淮在漢中蜀主劉備欲度漢水來攻諸將議眾, SBCK: 數周閔衆}
