  - {type: variant, offset: 394, length: 2, content: 鮮卑, SBCK: 長沙王乂方率衆自凾谷入屯河南入遣左將軍皇甫啇拒之而敗張方率兵入洛陽又奉惠帝討方于城内方軍遥見乗輿於是引退方止之不得衆遂大敗方退壁于十二里撟人情挫衂無復固志或勸方夜遁方曰兵之利鈍是常貴因敗以爲成耳我更前作壘}
