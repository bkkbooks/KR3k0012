  - {type: variant, offset: 903, length: 12, content: 蜀將關羽圍曹公將曹仁於樊, SBCK: 李矩守滎陽後趙石勒親率兵襲矩矩遣老弱入山令所在散牛馬因設伏以待之賊爭取牛馬伏發齊呼聲動山谷遂大敗之斬􅀗甚衆勒乃退}
  - {type: variant, offset: 903, length: 10, content: 蜀將關羽圍曹公將曹仁, WYG: 李矩守滎陽後趙石勒親率兵襲矩矩遣老弱入山令所在散牛馬因設伏以待之賊争取牛馬伏發齊呼聲動山谷遂大敗之斬獲甚衆乃退又曰劉琨守太原遣将姬澹率十餘萬討石勒勒将拒之或諫曰澹兵馬精盛其鋒不可當宜深溝髙壘以挫其銳攻守勢異必獲萬全勒曰澹大衆逺來體疲力竭犬羊烏合號令不齊可一戰擒之何强之有冦已垂至胡可捨去大軍一動豈易中還若澹乗我之退顧無暇焉得深溝髙壘乎此不戰而自滅亡之道立斬諫者以孔萇為前鋒都督令三軍後出者斬設疑兵}
