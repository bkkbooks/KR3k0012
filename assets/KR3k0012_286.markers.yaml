  - {type: variant, offset: 201, length: 187, content: 為敵騎多不如還保營荀攸曰此所以餌敵也如何去之紹騎將文醜與劉備將五六千騎前後至諸將復白可上馬公曰未也有頃騎至稍多或分輜重公曰可矣乃皆上馬時騎不滿六百遂縱兵擊之大破又曰曹公既剋鄴袁尚熙遂奔遼東眾有數千初遼東太守公孫康恃遠不服曹公破烏丸或說公遂征之尚熙可擒公曰吾方使康斬送其首不煩兵矣公引兵還康果斬送尚熙傳其首諸將或問曰公還而康斬尚熙何也公曰彼素畏尚熙其急之則并力緩之則相圖其勢然, SBCK: 爲神}
