  - {type: punctuation, offset: 391, content: 「, id: KR3k0012_CHANT_286-bkkpn118}
  - {type: variant, offset: 391, length: 1, content: 曹, SBCK: 衛瓘旣囚鄧艾諸將圖欲刼艾整仗趨瓘營瓘輕岀迎之僞作表草將申明艾事諸將信之而止又曰劉琨少負壯氣有縱横之才善交勝已而頗浮誇與范陽祖逖爲友聞逖􅀍用與親故書曰吾枕戈待用志梟逆虜常恐祖生先吾着鞭其意相期如此在晉陽甞爲胡􅀐所圍數重城中窘迫無計琨乃乘月登樓清嘯胡賊聞之皆悽然長歎中夜奏胡笳賊又流涕歔欷有懷土之切向暁復吹之賊弃圍而走又曰盧循自廣州南下戎卒十萬舩艫千艘討敗將軍劉毅于桑落逕至江寧循妹夫徐道覆素有膽决知􅁉已還欲乾没一戰請於新亭白石焚舟而上數道攻之循多謀少决欲以萬全爲討固不聽道覆曰我終爲盧}
  - {type: variant, offset: 391, length: 1, content: 曹, WYG: 衞瓘既囚鄧艾諸將圖欲結艾整仗趨瓘營輕出迎之偽作表章將申明艾事諸將信之而止又曰劉琨少負壮氣有縱横之才善交勝已而頗浮誇與范陽祖逖為友聞逖被用與親故書曰吾枕戈待用志梟逆虜常恐祖生先吾着鞭其意相期如此在晉陽嘗為敵兵所圍數重城中窘迫無計琨乃乗月登樓清嘯敵兵聞之悽然長嘆中夜奏胡笳敵皆又流涕歔欷有懐土之切曉復吹之敵棄圍而走又曰盧循自廣州南下戎卒十萬舩艫千艘討敗將軍劉毅于桑落逕至江寧循妺夫徐道覆有膽决知裕已還欲乾没一戰請於新亭至白石焚舟而上数道攻之循多謀少决欲以萬全為計固不聴道覆曰我終為盧}
  - {type: page-break, offset: 391, content: '', id: KR3k0012_WYG_286-2b, image: WYG0895/WYG0895-0507d.png}
  - {type: variant, offset: 391, length: 1, content: 曹, krp: 衛瓘旣囚鄧艾諸將圖欲刼艾整仗趨瓘營瓘輕岀迎之僞作表草將申明艾事諸將信之而止又曰劉琨少負壯氣有縱横之才善交勝已而頗浮誇與范陽祖逖爲友聞逖𬒳用與親故書曰吾枕戈待用志梟逆虜常恐祖生先吾着鞭其意相期如此在晉陽甞爲胡騎所圍數重城中窘迫無計琨乃乘月登樓清嘯胡賊聞之皆悽然長歎中夜奏胡笳賊又流涕歔欷有懷土之切向暁復吹之賊弃圍而走又曰盧循自廣州南下戎卒十萬舩艫千艘討敗將軍劉毅于桑落逕至江寧循妹夫徐道覆素有膽决知𥙿已還欲乾没一戰請於新亭白石焚舟而上數道攻之循多謀少决欲以萬全爲討固不聽道覆曰我終爲盧}
  - {type: variant, offset: 393, length: 0, content: '', SBCK: 所誤事必不成使我得爲英雄主驅馳天下不足定也後循戰敗又曰王敦反敦旣死以兄子應爲嗣沈充自呉率衆萬餘人至與王含等合充司馬顧颺􅀃充曰今日舉大事而天子巳扼其喉情離衆沮鋒挫持疑猶豫必致禍敗今􅀂決破栅塘因湖水灌京邑肆舟艦之􅀔極水軍之用此所謂不戰而屈人之兵上䇿也藉􅀄至之銳并東南衆軍之力十道俱進衆寡過倍理必摧䧟中䇿也轉禍爲福因敗爲成召錢鳯計事因斬之以降下䇿也充不能用颺逃歸于呉含復率衆渡淮蘇峻等逆擊大敗之充亦燒營而退旣而周光斬錢鳯呉儒斬充並傳首京師又載記曰符登攻姚萇萇退還安定登就食新平留其大軍于胡空堡率􅀐萬餘圍萇營四靣大􅂘哀聲動人萇惡之命三軍哭以應登登乃引退又曰河間王顒在関中遣將張方}
  - {type: page-break, offset: 393, content: '', id: KR3k0012_SBCK_286-2a}
  - {type: page-break, offset: 393, content: '', id: KR3k0012_SBCK_286-2b}
  - {type: variant, offset: 393, length: 0, content: '', WYG: 所誤事必不成使我得為英雄主驅馳天下不足定也循後戰敗又曰王敦反敦既死以兄子應為嗣沈充自吴率衆萬餘人至與王含等合充司馬顧颺説充曰今日舉大事而天子已扼其喉情離衆沮鋒摧勢挫持疑猶豫必致禍敗今若决破柵塘因湖水灌京邑肆舟艦之勢極水軍之用此所謂不戰而屈人之兵上䇿也藉初至之銳并東南衆軍之力十道俱進衆寡過倍理必摧䧟中䇿也轉禍為福因敗為成召錢鳯計事因斬之以降下䇿也充不能用颺逃歸於吴含復率衆渡淮蘇峻等逆擊大破之充亦燒營而退既而周光斬錢鳯吴儒斬充並𫝊首京師又載記曰符登攻姚萇萇退還安定登就食新平留大軍于胡空堡率騎萬餘圍萇營四面大哭哀聲動人萇惡之命三軍哭以應登登乃引退又曰河間王顒在關中遣将張方}
