  - {type: variant, offset: 1620, length: 0, content: '', SBCK: 髙貴郷公即位神明爽㑺德音宣朗罷朝景王私曰上何如主也鍾㑹對曰才同陳思武􅀋太祖景王曰􅀂如卿言社稷之福也又曰髙貴郷公爲宴羣臣於泰極東堂與侍中荀顗崔賛􅀽亮鍾毓虞松等講􅄒因帝問顗等曰有夏旣衰后相殄滅少康収集夏衆復禹之績髙祖抜起壠畒驅帥豪㑺芟夷􅁗項苞舉宇内斯二主可謂殊才異略命丗大賢者也考其功德誰宜爲先顗等對曰造之與因難易不同少康功德雖羙至如髙祖臣等以爲優帝曰未必創業者皆優紹繼者咸劣少康中宗中興之羙論德覈實方諸漢祖吾見其優未聞其劣少康生於滅亡之後降爲諸侯能布其德而兆其謀卒滅過戈復禹之績非至德豈能濟斯漢祖因土崩之勢專任智力爲人子則數危其親爲人君則囚擊賢相爲人父則不能衛其子身没之後社稷幾傾􅀂與少康易時而處或未能復大禹之績推此言之冝髙夏康而下漢祖矣帝又曰夫太上立德其次立功漢祖功髙未􅀂少康武烈之威豈必降於漢祖哉但夏書淪士舊文殘缺故勲羙闕而罔載向今墳典俱存行事詳備亦豈有異同之論哉於是羣臣咸恱服也又曰胡綜論呉朝俊士英才卓越超踰倫疋則諸葛恪清識知機逵究幽微則頋譚淑辯宏逹言能釋結則謝景究學甄微游夏同科則范愼羊衜恪才而踈譚精而俱景辯而校後恪譚果以強呉人論綜言而有徴蜀志曰大鴻臚張徴作黙記諸葛亮與司馬宣王書曰漢朝傾覆天下分崩豪傑之士竟希神器}
