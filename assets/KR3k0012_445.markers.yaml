  - {type: variant, offset: 1632, length: 0, content: '', SBCK: 瑾雄烈膽略兼人遂破孟德開拓荆州邈焉難繼君今繼之子敬東來􅀌與宴語便及大略帝主之䇿一決也後孟德率數十萬衆水歩俱下􅀌請諸將問其所冝子布文表俱言而遣迎之子敬即駮言不可勸􅀌呼公瑾付兵衆逆而擊之此二決也勸吾借􅀇德地是其一短不足以損二長也􅀌忘其短而不遺其長子明少果敢有膽而長大學問籌略可以次公瑾但言議不及耳又曰周昭著書稱歩騭及嚴畯等曰古今賢士大夫所以失名喪身者其由非一也大歸四者而巳急論議一也爭名勢二也重朋黨三也務欲速四也急論議則傷人爭名勢則敗友重朋黨則蔽主務欲速則失德此四者不除未有能全者也當丗君子能不然者亦比有之豈獨古人乎然論其絶異未􅀂顧豫章諸葛使君歩丞相嚴衛尉張􅁬威之爲羙也論語言夫子恂恂然善誘人又曰成人之羙不成人之惡豫章有之矣望之儼然即之也温聽其言也厲使君體之矣恭而不猛丞相嚴履之矣學不求禄心無苟得衛尉􅁬威蹈之矣此吾君雖德實有差輕重不同至於趨舎大檢不犯四者俱一揆也昔丁謂出於􅀌家呉粲由於牧竪䂊章楊其羙以並隆全之列是以人無幽滯而風俗厚焉使君丞相衛尉三君昔以布衣俱相友善論者因名叙其優劣初先衛尉次丞相而後使君也其後並事明主經營丗務出處之才儀有不同先後之名湏反其初比丗常人所决懃也至於三君分好卒無􅃜損豈非古哉又魯横江昔仗万兵屯據陸口當丗之羙業也能與不能孰不願焉而撗江旣亡衛尉應其選自以才非將帥􅀷辭固讓終於不就後徙九列遷典八座榮不足以自奉至於二君皆位爲上將窮富極貴衛尉旣無求欲二君又不稱薦各守所志保其名好孔子曰君子矜而不爭羣而不黨斯有風矣又􅁬威之名亦三君之次也當一方之戍受上將之任與使君丞相不異也然歷國事論功勞實有先後故爵位之榮殊焉而􅁬威將處此决能明其部分心無失道之欲事無充詘之求毎􅂛朝堂循禮而動辭氣蹇蹇㒺不惟忠}
