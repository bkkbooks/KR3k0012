  - {type: variant, offset: 1657, length: 1, content: 若, WYG: 列是以人無幽滯而風俗厚焉使君丞相衛尉三君昔以布衣俱相友善論者因各叙其優劣初先衛尉次丞相而後使君也其後並事明主經營世務出處之才儀有不同先後之名須反其初此世常人所决勤薄至於三君分好卒無虧損豈非古哉又魯横江昔仗萬兵屯據陸口當世之美業也能與}
