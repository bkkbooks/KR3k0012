  - {type: variant, offset: 1634, length: 2, content: 病甚, WYG: 子敬東來孤與宴語便及大畧帝王之䇿一快也後孟德率數十萬衆水陸俱下孤請諸將問其所宜子布文表俱言遣迎而子敬駁言不可勸孤呼公瑾付兵衆逆而擊之此二快也勸吳借𤣥德地是其一短不足以損二長也孤忘其短而不遺其長子明少果敢有膽而長大學問籌畧可以次公瑾但言議不及耳又曰周昭著書稱歩隲及嚴畯等曰古今賢士大夫所以失名䘮身者其由非一也大歸四者而已急論議一也争名勢二也重朋黨三也務欲速四也争論議則傷人争名勢則敗友重朋黨則蔽主務欲速則失德此四者不除未有能全者也當世君子能不然者亦比有之豈獨古人乎然論其絶異未若顧豫章諸葛使君歩丞相嚴衛尉張奮威之爲美也論語言夫子循循然善誘人又曰成人之美不成人之惡豫章有之}
