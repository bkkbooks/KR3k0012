  - {type: variant, offset: 3067, length: 240, content: 明死有鬼靈之驗又曰王諶字子嗣博學有才辨洛陽种景伯武原吳季高未知名諶數稱二人於朱伯厚有宰輔之器退語二人曰卿必為公而景伯至司徒季高至司空世以是服諶之知人也會稽典錄曰盛憲字孝章嘗出行逢一童容貌非常憲怪而問之是魯國孔融融時年十餘歲憲下車執手載以歸舍與融談宴知其不凡便結為兄弟因升堂見親汝南先賢傳曰薛勤字恭祖仕郡功曹陳仲舉時年十五為父齎書詣勤勤見而察之明日往造焉仲舉父出見勤勤曰足下有不凡子吾來候之不從卿也言議盡日乃歎曰陳仲舉有命世才王才之具又見黃叔度於童幼云當為內盛德其後二賢英名並耀於世, SBCK: 羙}
