  - {type: variant, offset: 7, length: 0, content: '', SBCK: 其一不知其二夫運籌䇿於帷幄之中决勝於千里之外吾不如張子房鎭國家撫百姓吾不如蕭何連百万之衆戰必勝攻必取吾不如韓信三者}
  - {type: variant, offset: 7, length: 0, content: '', WYG: 者三是則不及武仲也回曰可得聞乎孔子曰下展禽置六關六關關名置之以税行者妾織席三不仁也設虛器縱逆祀祀海鳥三不智也武仲在齊齊將有禍不受更其國以避其難是智難之也又曰澹䑓子羽有君子之容而行不勝其貌宰我有文雅之辭而智不充其辯孔子曰以容取}
  - {type: variant, offset: 7, length: 0, content: '', krp: 其一不知其二夫運籌䇿於帷幄之中决勝於千里之外吾不如張子房鎭國家撫百姓吾不如蕭何連百万之衆戰必勝攻必取吾不如韓信三者}
  - {type: variant, offset: 8, length: 0, content: '', SBCK: 傑也吾能用之此吾能以取天}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 則失之子羽以言取人則失之宰予又曰子夏三年之喪畢見於孔子孔子與之琴使之弦侃侃而樂子曰君子也閔子三年喪畢見孔子孔子與之琴使之弦切切而悲子曰君子也子貢曰閔子哀未盡矣子曰君子也子夏哀已盡矣子曰君子也二者殊情而俱君子賜也惑之敢問孔子曰閔子哀未盡能遊之以禮子夏哀已盡能引之及禮均之君子不亦可乎又曰孔子曰不遷怒不深怨不録舊罪冉雍之行也不畏強禦不侮鰥寡才任治戎仲由之行也文勝其質好學愽藝省物而動是冉求之行也齋荘而能肅志通而好禮篤雅而有節是公西華之行也滿而不盈實而不虛其徳敢言於人無所不信是曾參之行也送迎必敬上交}
