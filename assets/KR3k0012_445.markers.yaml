  - {type: variant, offset: 1672, length: 230, content: 右曰豈不悲哉以叔之賢而今謂寡人以聽鞅悖也公叔死公叔鞅西遊秦秦孝公聽之秦果強魏果弱竹林七賢論曰山濤與阮籍嵇康皆一面而契若金蘭濤妻韓氏嘗以問濤濤曰當年可為友者唯此二人耳妻曰負羇之妻亦觀狐趙意欲一窺之可乎濤曰可也二人至妻勸濤留之宿其酒食夜穿牖而窺之濤入曰所見何如吾妻曰君才殊不如也正當以識度相友濤曰然伊輩亦當謂我識度勝世說曰袁宏少貧常為人傭載運謝鎮西常夜泊舟江渚清風明月聞賈客舫上有詠聲甚有清致聽所詠詩又所未嘗聞歎美不能已即遣人委曲訊問乃是袁宏自誦其詠史詩遂厚相賞重, SBCK: 傳癖}
