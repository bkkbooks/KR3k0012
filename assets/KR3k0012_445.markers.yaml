  - {type: variant, offset: 1047, length: 386, content: 人千百不失臣見回非不偉其體幹然甚疑其目王卒用之三月果以謟得罪淮南子曰甯戚欲干齊桓公困窮無以自達於是為商旅將牛車暮宿於郭門之外桓公郊迎客夜爝火甚盛從者甚眾戚飯牛車下望見桓公而悲擊角而疾商歌桓公聞之撫其僕之手曰異哉歌者非常人也命後車載之賜衣冠說苑曰楚令尹虞丘子復相莊王曰臣聞奉公行法可以得榮能淺行薄無望上位臣為令尹十年矣國故不治獄訟不息臣竊選國俊士孫叔敖秀才多能其性無欲君舉而授之政則國可使寧而士民可使附莊王從之虞丘子萊田三畝號曰國老以孫叔敖為令尹虞丘子家干法叔敖執而戮之虞丘子喜曰叔敖果可使持正矣傅子曰劉備襲蜀丞相掾趙幾曰劉備其不濟乎拙於用兵每戰每敗奔亡不暇何以圖人徵士傅朝曰劉備寬仁有度能得人死力諸葛亮達治知變正而有謀而為之相張飛關羽勇而有義皆萬人之敵而為之將此三人者皆人傑也以劉備之略三傑佐之何為而不濟也郭子曰冀州刺史楊淮字彥清二子喬髦有識俱總角為成器淮與裴頠樂廣友善遣, SBCK: ''}
