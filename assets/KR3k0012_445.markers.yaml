  - {type: variant, offset: 1630, length: 0, content: '', krp: 任輔翼㓜生亦一國之守臣霸王之賢佐也歷前丗以觀近事二相優劣可得而詳也孔明起巴蜀之地蹈一州之士方之大國其戰士人民蓋有九分之一也提歩卒數萬長驅祁山慨然有飲馬河雒之志逹據天下十倍之地杖兼并之衆據牢城擁精銳無擒敵之意務自保而巳使彼孔明若此而不亡則凉雍不解甲中國不解鞍勝負之䇿亦决矣方之司馬不亦優乎呉志曰孫㩲與陸遜論周瑜魯肅及吕蒙}
