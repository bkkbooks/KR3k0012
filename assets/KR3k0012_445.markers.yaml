  - {type: variant, offset: 1634, length: 1, content: 病, SBCK: 趨唯篤人物成敗得失皆如所慮可謂守道見機好古之士也􅀂乃經國家當軍旅於馳鶩之際立霸王之功此五君者未爲過人至其純粹履道求不苟得􅂛降當丗保全名行邈然絶俗實有所師故粗論其事以示後之君子又曰薛瑩王蕃器量綽異􅀪􅀶多通樓􅀇清白節操文理條暢賀邵厲行貞㓗機理清要韋曜篤學好古􅀶見羣籍有記述之才胡冲以爲􅀇邵蕃一時清妙略無優劣必不得巳􅀇冝在先邵當次之華覈詩賦之才有過於曜典誥不及也王隱晉書曰河南郭象著文稱􅄞紹父死在非罪曽無耿介貪位死闇主義不足多曽以問郄公曰王襃之父亦非罪死襃猶辭徴紹不辭用誰爲多少郄公曰王勝於􅄞或曰魏晉所殺子皆仕官何以無非也荅曰殛鯀興禹禹不辭興者以鯀犯罪也􅀂以時君所殺爲當耶則同於禹以不當耶則同於􅄞又曰丗皆以􅄞見危授命荅曰紀信代漢髙之死可謂見危授命如􅄞偏善其一可也以備體論之則未得也又曰頋榮謂中宗曰陸士元貞正清貴金相玉質甘季思忠欵誠盡加以膽幹殊快殷慶元質略有明規文武可用榮族兄公讓明亮守節困不易操㑹楊彦明謝行言皆服膺儒敎足爲民望賀生沉潜青雲之士陶恭兄弟才力雖少實事極佳凡此諸人皆南金也中宗納之又曰衛玠妻父樂廣有海内重名議者以爲婦公氷清女壻玉􅃳又曰裴憲字景思陳郡謝鯤潁川􅁃鼔皆㑺朗士也見而竒之相謂曰裴憲鯁亮宏逹通機識命不知其何如父然至於􅀷􅀪保素不以丗物嬰心者其殆過之又曰裴楷嘗目夏侯􅀇云肅肅如入宗廟中但見禮樂器鍾㑹如觀武庫森森迫見矛㦸在前傅嘏汪翔靡所不見山濤􅀂登山臨下幽然􅀷逺又曰杜預在內七年損益万機不可勝數朝野稱羙號曰杜武庫言其無所不有也又曰杜預傳云時王濟解相馬又}
