  - {type: variant, offset: 13, length: 0, content: '', SBCK: 允字子師太原人丗仕州郡郭林宗嘗見允而竒之曰王生一日千里王佐才也遂與友善允至司徒范曄後漢書曰許劭嘗到潁川多長者之遊唯不詣陳蕃蕃喪妻還葬郷人畢至而劭獨不徃或問其故劭曰太丘道廣廣則難周仲舉性峻峻則少通故不造其多所裁量􅀂此曹操微時常卑辭厚禮求爲巳助劭鄙其爲人而不肯對操乃伺􅂩脅劭不得巳曰君清平之姧賊亂丗之英雄操大恱而劭與從兄靖俱有髙名好共覈論郷黨人物毎月更其品題故汝南俗有月旦評焉魏志曰盧欽著書稱徐邈曰徐公志髙行㓗才綽氣猛聖人以清爲難而徐公之所易也或問欽徐公當武帝之時爲通自在凉州及還京都人以爲介何也欽荅曰徃者毛孝先崔季}
