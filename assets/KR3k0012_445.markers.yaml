  - {type: variant, offset: 1660, length: 2, content: 聽勿, WYG: 孰不願焉而横江既亡衛尉應其選自以才非將帥深辭固讓終於不就後徙九列遷典八座禄不足以自奉至於二君皆位爲上將窮富極貴衛尉既無求欲二君又不稱薦各守所志保其名好孔子曰君子矜而不争羣而不黨斯有風矣又奮威之名亦三君之次也當一方之戍受上將之任與}
