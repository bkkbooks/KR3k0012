  - {type: variant, offset: 439, length: 372, content: 詔處死勉問其故乃為權倖所誣勉詢將吏曰上方藉牧宰為人父母豈以譖言而殺不辜乎即亭詔拘晬飛表上聞晬遂獲宥而勉竟為執政所非追入為大理少卿謁見面陳王晬無罪政事修舉盡力吏也肅宗嘉其守正即日除太常少卿王晬後以推擇拜大理評事龍門令終有能名時稱知人又曰李晟德宗之幸山南既入駱谷謂渾瑊曰渭橋在賊腹內兵勢懸隔李晟可辦事乎瑊對曰李晟秉義執志臨事不可奪以臣計之破賊必矣帝意始安又曰楊嗣復字繼之僕射於陵之子也初於陵十九登進士第二十再登博學宏詞科調補潤州句容尉浙西觀察使韓滉有知人之鑒見之甚悅滉有愛女方擇佳婿謂其妻柳氏曰吾閱人多矣無如楊生貴而壽生子必為宰相於陵秩滿寓居楊子而生嗣復後滉見之撫其首曰名位果踰於父楊門之慶也因字曰慶門竟如其言又曰于邵傳云樊澤嘗舉賢良方正邵一見之於京師謂樊將相之材也不五年擇為節將又曰李德裕與牛僧孺有隙或以韋溫厚於牛僧孺言於德裕裕曰此人堅正中立君子, SBCK: 貌趙但啖肉}
