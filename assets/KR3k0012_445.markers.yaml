  - {type: variant, offset: 1651, length: 2, content: 願王, WYG: 温聽其言也厲使君體之矣威而不猛丞相嚴履之矣學不求禄心無苟得衛尉奮威蹈之矣此諸君雖徳實有差輕重不同至於趨舍大檢不犯四者俱一揆也昔丁諝出於孤家吳粲由於牧竪豫章揚其美}
