  - {type: variant, offset: 1630, length: 0, content: '', WYG: 任輔翼㓜主亦一國之守臣霸王之賢佐也歴前世以觀近事二相優劣可得而詳也孔明起巴蜀之地踏一州之土方之大國其戰士之民蓋有九分之一也提歩卒數萬長驅祁山慨然有飲馬河雒之志逹據天下十倍之地杖兼并之衆據牢城擁精銳無擒敵之意務自保而已使彼孔明若此而不亡則凉雍不觧甲中國不觧鞍勝負之䇿亦决矣方之司馬不亦優乎吳志曰孫權與陸遜論周瑜魯肅及吕蒙}
