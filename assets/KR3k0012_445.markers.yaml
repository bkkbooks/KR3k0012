  body:
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 六品藻上論語子曰管仲之器小哉又子貢問曰賜也何如子曰汝器也言女器用之人也曰何器也曰瑚璉也瑚璉􅁰稷之器夏曰瑚啇曰璉周曰簋簋宗廟之貴器又曰由也千乗之國可使治其賦也求也千乗之邑百乗之家可使爲之宰赤也束帶立於朝可使與賔客言也又曰子謂子産有君子之道四焉其行己也恭其事上也敬其飬民也惠其使民也義又曰子張問令尹子文三仕爲令尹無喜色三巳之無愠色舊令尹之政必以告新令尹何如子曰忠矣曰仁矣乎曰未知焉得仁崔子弑齊君陳文子有馬十乗弃而違之至於他􅀖則曰猶吾大夫崔子也違之何如子曰清矣曰仁矣乎曰未知焉得仁又曰子曰雍也可使南面仲弓問子桑伯子子曰可也簡仲弓曰居敬而行簡以臨其民不亦可乎居簡而行簡無乃太簡乎又曰季康子問仲由可使從政也與子曰由也果於從政乎何有曰賜也可使從政也與曰賜也逹於從政乎何有曰求也可使從政也與曰求也藝於從政乎何有家語曰子貢曰陳靈公君臣宣􅁋於朝泄冶諌而殺之是與比干同也可謂仁乎子曰比干於紂親則叔父官則少師忠疑之心在於宗廟而巳固必死爭之兾身死之後紂悔寤其夲志情在乎仁者也泄冶位下大夫無骨肉之親懷寵不去以區區之一身欲正一國之􅁋昬死而无益可謂懷矣詩曰民之多僻無自立辟其泄冶之謂也又曰孔子北遊農山顔回侍曰願得明王聖主而輔相之敷其}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_445-1b}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_445-2a}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 六品藻上論語子曰􅃹仲之器小哉又子貢問曰賜也何如子曰女器也言汝器用之人也曰何器也曰瑚璉也瑚璉黍稷之器夏曰瑚商曰璉周曰盙簋宗廟之貴器又曰由也千乗之國可使治其賦也求也千室之邑百乘之家可使爲之宰也赤也束帶立於朝可使與賔客言也又曰子謂子産有君子之道四焉其行已也恭其事上也敬其養民也惠其使民也義又曰子張問令尹子文三仕爲令尹無喜色三巳之無慍色舊令尹之政必以告新令尹何如子曰忠矣曰仁矣乎曰未知焉得仁崔子弑齊君陳文子有馬十乗棄而違之至于他邦則曰猶吾大夫崔子也違之何如子曰清矣曰仁矣乎曰未知焉得仁又曰子曰雍也可使南靣仲弓問子桑伯子子曰可也簡仲弓曰居敬而行簡以臨其民不亦可乎居簡而行簡無乃太簡乎又曰季康子問仲由可使從政也與子曰由也果於從政乎何有曰賜也可使從政也與曰賜也逹於從政乎何有曰求也可使從政也與曰求也藝於從政乎何有家語曰子貢曰陳靈公君臣宣淫於朝洩冶諫而殺之是與比干同也可謂仁乎子曰比干於紂親則叔父官則少師忠欵之心在於宗廟而已固必死争之冀身死之後紂悔悟其本志情在乎仁者也洩冶位下大夫無骨肉之親懷寵不去以區區之一身欲正一國之淫昏死而無益可謂懷矣詩曰民之多僻無自立僻其洩冶之謂也又曰孔子北遊農山顔回侍曰願得明王聖主而輔相之敷其}
