  - {type: variant, offset: 9, length: 0, content: '', SBCK: 也項羽有一范増而不能用之此其所以爲我擒也羣臣皆恱服又曰公孫􅀪傳賛云儒雅則公孫􅀪董仲舒倪寛篤行則石建石慶質直則汲黯卜式推賢則韓安國鄭當時律令則趙禹張湯文章則司馬遷相如滑稽則東方朔枚臯應對則嚴助朱買臣歷數則}
  - {type: variant, offset: 9, length: 0, content: '', WYG: 接是卜商之行也先成其慮及事而用故動則非妄是言偃之行也三復白珪之玷是南容之行也執親之喪未嘗見齒是髙柴之行也不念舊惡蓋伯夷叔齊之行也畏天而敬人蓋趙文子之行也臨其難不愛其死謀其身不遺其友君若用則進蓋隨武子之行也國家有道其言足以治無道其黙足以生蓋伯華之行也外寛而内方直已而不直人以善自終蓋蘧伯玉之行也孝恭慈仁充徳圖義終貧去怨輕賤不道蓋柳下惠之行也君有道從命無道衡命蓋平仲之行也漢書曰髙帝置酒洛陽南宫上曰吾所以有天下者何項氏之所以失天下者何王陵對曰陛下嫚而侮人項羽仁而敬人然陛下使人攻城略地所降者因以與之天下同利也項羽疾能妬賢有功者害之賢者疑之戰勝而不與大功得地而不與人利此所以失天下也上曰公知其一不知其二夫運籌䇿於帷幄之中决勝於千里之外吾不如張子房鎮國家撫百姓吾不如蕭何連百萬之衆戰必勝攻必取吾不如韓信三者人傑也吾能用之此吾所以取天下也項羽有一范增而不能用之此其所以爲我擒也羣臣皆恱服又曰公孫𢎞𫝊賛云儒雅則公孫𢎞董仲舒倪寛篤行則石建石慶質直則汲黯卜式推賢則韓安國鄭當時律令則趙禹張湯文章則司馬遷相如滑稽則東方朔枚臯應對則嚴助朱買臣厯數則}
