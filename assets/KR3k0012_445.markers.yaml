  - {type: variant, offset: 10, length: 0, content: '', SBCK: 都洛下閎恊律則李延年運籌則桑􅀪羊奉使則張騫蘇武將師則衡青霍去病受遺則霍光金曰磾其餘不可勝記是以興造功業制度遺文後丗莫及孝宣承統纂循洪業招選茂異而蕭望之梁丘賀夏侯勝韋􅀇成嚴彭祖尹始以儒術進劉向王襃以文章顯將相則張安丗趙充國魏相邴吉于定國杜延年治民則黃霸王成龔遂鄭􅀪邵信臣韓延壽尹翁歸趙廣漢嚴延年張敞之屬皆有功迹見述於丗叅其名臣亦莫次也謝承後漢書曰桓帝徴徐稺等不至因問陳蕃曰徐稺􅀽閎韋著誰爲先後蕃對曰閎生公族聞道漸訓長於三輔仁義之俗所謂不扶自直不鏤自雕至於稺者爰自江南卑薄之城而角立傑出冝當爲先􅀽山松後漢}
