  - {type: 'tls:seg', offset: 6, content: '', id: KR3k0012_CHANT_445-1a.2}
  - {type: variant, offset: 6, length: 0, content: '', SBCK: 敎道之以禮樂使城郭不修溝渠不越鑄劔㦸爲農器放牛馬於原藪室家無怨曠之思千歳無􅋐戰之患子曰羙德也不傷財不害人不繁辭則顔氏之子有矣又曰顔回問於孔子曰臧文仲武仲孰賢孔子曰武仲賢哉回曰武仲丗稱聖人而身不免於罪是智不足稱好言兵計而挫銳於邾是勇不足名也夫文仲其身雖没而言不朽惡有未賢孔子曰身没言立所以爲文猶有不仁者三不智者三是則不及武仲也回曰可得聞乎孔子曰下展禽置六􅀜大關關名置之以稅行者妾織席三不仁也設虚器縱逆祀祀海鳥三不智也武仲在齊齊將有禍不受更其國以避其難是智難之也又曰澹臺子羽有君子之容而行不勝其貌宰我有文雅之辭而智不充其辯孔子曰以容取人則失之子羽以言取人則失之宰予又曰子夏三年之喪畢見於孔子孔子與之琴使之弦偘偘而樂子曰君子也閔子三年喪畢見孔子孔子與之琴使子之絃切切而悲子曰君子也子貢曰閔子哀未盡矣子曰君子也子夏哀巳盡矣子曰君子也二者殊情而俱君子賜也惑之敢問孔子曰閔子哀未盡能遊之以禮子夏哀已盡能引之及禮均之君子不亦可哉又曰孔子曰不遷怒不􅀷怨不録舊罪冉雍之行也不畏強禦不侮鰥寡才任治戎仲由之行也文勝其質好學􅀶藝省物而動是舟求之行也齊莊而能肅志通而好禮篤雅而有節是公西華之行也滿而不盈實而不虚其德敢言於人無所不信是曽參之行也送迎必敬上交下接是卜啇之行也先成其慮及事而行故動則非妄是言偃之行也三復白珪之玷是南容之行也執親之喪末嘗見齒是髙柴之行也不念舊惡蓋伯夷叔齊之行也畏天而敬人蓋趙文子之行也臨其難不愛其死謀其身不遺其友君􅀂用則進蓋隨武子之行也國家有道其言之足以治無道其黙之足以生蓋伯華之行也外寛而内亡直已而不直人以善自終蓋蘧伯玉之行也孝恭慈仁允德圖義終貧去怨輕財不道蓋柳下惠之行也君有道從命無道衡命蓋平仲之行也漢書曰髙帝置酒洛陽南宫上曰吾所以有天下者何項氏之所以失天下者何王陵對曰陛下嫚而侮人項羽仁而敬人然陛下使人攻城略地所降下者因以與之天下同利也項羽疾能妬賢有功者害之賢者疑之戰勝而不與人功得地而不與人利此所以失天下也上曰公}
