  - {type: variant, offset: 2347, length: 239, content: 器定難濟時者也遺廆冠簪以結慇懃崔鴻前秦錄曰姜宇字子居天水冀人也少孤貧為河北陳不識家牧羊年十五身長七尺九寸聰惠美風儀每夜專讀書睡則縣頭于屋梁達旦而止不識奇之將妻以女其妻弗聽不識乃置酒引宇令女潛觀之問女曰姜宇人士才明吾欲以汝妻之汝母難曰宇家之牧人汝意云何女曰觀宇之姿才豈復為人牧羊也遂妻之宇後歷位京兆尹御史中丞郭林宗別傳曰郭泰字林宗入頴川則友李元禮至陳留則結符偉明之外黃則親韓子助過蒲亭則師仇季智止學舍則收魏德公觀耕者則拔茅季偉皆為名士至汝南見袁閎不宿而去從黃憲三日乃去過新蔡薛懃問, SBCK: 羲}
