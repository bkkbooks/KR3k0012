  - {type: variant, offset: 1663, length: 2, content: 出境, WYG: 君丞相不異也然歴國事論功勞實有先後故爵位之榮殊焉而奮威將處此决能明其部分心無失道之欲事無充詘之求每升朝堂循禮而動辭氣謇謇罔不惟忠叔嗣雖親貴言憂其敗文至雖踈賤談稱其賢女配太子受禮若弔慷慨之趨唯篤人物成敗得失皆如所慮可謂守道見機好古之士也若乃經國家當軍旅於馳騖之際立霸}
