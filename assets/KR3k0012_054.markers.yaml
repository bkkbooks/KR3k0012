  - {type: variant, offset: 1116, length: 190, content: 專是林木故一名青丘仙草靈藥甘液玉英靡所不有齊地記曰營丘在臨淄小城內古以為齊室也丘下周三百餘步高九丈北廂下隆丈五造井水深七丈餘井與地平伏韜北征記曰博望城內有成湯伊尹箕子冢今皆為丘述異記曰南海中有軒轅丘鸞自歌鳳自舞古云天之樂也郡國志曰濮陽縣本顓頊之城今謂之帝丘夏后之代昆吾居之春秋衛遷于帝丘夢人登昆吾之墟是也又曰濮州初徒陶於乘丘故縣掘得漆盃二底內有朱書曰乘丘既見風日糜然爛碎矣陶今定陶, SBCK: ''}
