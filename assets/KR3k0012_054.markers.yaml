  - {type: variant, offset: 3574, length: 431, content: 石皆淬裂因鐫去焉遂無泛溺之害又曰涇水東南逕都盧山山路之中常有如彈箏之聲行者鼓舞樂而後去即絃歌之山也故謂此山峽為彈箏峽隴西記曰襄武有錦鏡峽即黑水所經其峽四望花木明媚照影於其中因以稱之也峽程記曰瀘合遂蜀四郡皆峽之郡自蠻江桔柏沱導等江至此二百八十江會于峽前次荊門都四百五十灘即有清水重峰胡灘漢灘忽雷閃電咤灘瀨灘狼尾使君主簿皆使君主簿沉舟之所遂為名其他不悉記之三峽者即明月峽仙山峽廣澤峽其有瞿塘灩澦鷰子屏風之類皆不預三峽之數李膺益州記曰廣陽州東七里水南有遮要二塠石石東二里至明月峽峽前南岸壁高四十丈其壁有圓孔形如滿月因以為名崗釋名曰崗亢也在上言之詩曰陟彼高崗我馬玄黃又曰如山如阜如崗如陵又曰謂山蓋高為崗為陵又曰陟彼崗矣瞻望兄矣尚書曰火炎崑崗玉石俱焚爾雅曰山脊曰崗山謙之丹陽記曰句容縣東三十五里有龍崗崗頂有沸潭周廻十三丈聞人聲水便沸動不聞不涌也王韶之始興記曰郡西南有芙蓉崗高若玉山鄰枕郊郭周廻連亙四十餘里又曰含縣白鹿城南有白鹿崗晉咸和中郡民張鮑作令著惠有白鹿遊此崗因以為名, SBCK: 狀}
