  - {type: variant, offset: 3446, length: 1, content: 峽, SBCK: 宇故老云北嶺秋夏之際常有暴風迅雨巖石盡落相傳云是龍道不可乆立挺曰人神相去何逺之有虬龍倐忽豈唯一路乎遂營之數年果無風雨之患挺還歸㝷爲雷風所毀後不能立呉地志云南野縣有大􅁃嶺通廣州晉太康地志嶺峻阻螺轉上踰九磴二里至頂}
