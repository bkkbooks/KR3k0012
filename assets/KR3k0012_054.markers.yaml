  - {type: variant, offset: 2942, length: 232, content: 旦朝視之果如其言故為立廟號朝雲焉其間首尾一百六十里謂之巫峽蓋因山為名也盛弘之荊州記曰舊云自二峽取蜀數千里中恒是一山此蓋好大之言也唯三峽七百里中兩岸連山略無闕處重巖疊嶂隱峰蔽日自非停午夜分不見日月至於夏水襄陵沿泝阻絕或王命急宣有時朝發白帝暮至江陵其間一千二百里雖乘奔御風不為疾也春冬之時則素湍淥潭廻清到影絕巘多生檉柏懸泉瀑布飛其間清榮峻茂良多雅趣每晴初霜旦林寒澗肅常有高猿長嘯屬引凄異空岫傳嚮哀轉久絕故漁者歌曰巴東三峽巫峽長猿鳴三聲淚沾裳又曰南崖有重嶺疊起最大高崖間, SBCK: ''}
