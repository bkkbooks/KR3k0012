  - {type: variant, offset: 2048, length: 457, content: 危馳不側之淵如馬警車敗奈高廟何上乃止漢書地理志曰河東蒲坂縣故曰蒲泰更名應劭曰秦始皇東巡見有長坂孟康曰本屬晉文公以賂秦秦人還蒲魏人喜曰蒲反矣漢書曰王陽為益州至邛𤏡蒲比切坂九折歎曰奈何以先人之遺體乘此險乎遂以病去及王遵為刺史至此坂問吏曰此非王陽所畏道耶叱其馭驅之曰王陽為孝子王遵為忠臣應劭注曰坂在嚴道縣界漢書西域傳曰西域有赤玉身熱之坂上即今人身熱無色頭痛嘔吐續漢書地理志曰河東大陽縣有顛軨坂蜀志曰先主至當陽之長坂為曹公所追敗王隱晉書曰孫登楊駿逼迎之與語不荅賜布袍登借刀截斷棄門中大呼云刺斫刺斫卒病死後人見在貴馬坂穆天子傳曰天子南還昇于長松之坂郭僕注曰坂有長松酈善長注水經曰洛水東逕九曲其地千里有九坂之曲穆天子傳所謂天子西征升九阿是也又曰河水東逕旋門坂北今城皋西大坂是也昇陟此坂而東趣成皋城列女後傳曰呂榮者吳郡許昇之妻也昇為賊所害榮貞固自守黃巾賊陳寶欲干穢之榮執節不聽寶遂殺榮是日疾風暴雨雷電晦冥寶恐懼叩頭謝葬之而去麇府君聞榮高行遣主簿祭之又出錢助縣為冢於嘉興郭里墟北名曰義婦坂華陽國志曰有牛叩頭坂馬搏頰坂其嶮如此晉太康, WYG: ''}
