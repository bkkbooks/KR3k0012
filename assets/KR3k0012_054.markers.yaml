  - {type: variant, offset: 3412, length: 0, content: '', SBCK: 九寸或二三日聮綿從穴岀躍相傳名爲嘉魚即左太冲蜀都賦所謂嘉魚岀於丙穴是也武陵記云鹿山有穴昔宋元嘉初武陵溪蠻入射鹿逐入一石穴穴才可容人蠻人入穴見有梯在其傍因上梯豁然開朗桑果靄然行人翶翔不似戎境此蠻乃枇樹記之其後㝷之莫知所處谷􅀃文曰泉通川曰谷易曰入于幽谷三歳不覿㓙詩曰􅁑之覃􅀆施于中谷唯葉萋萋又曰惴惴小心如臨于谷又曰伐木丁丁鳥鳴嚶嚶岀於幽谷遷于喬木又曰皎皎白駒在彼空谷左傳曰莫敖縊于荒谷盛弘之荆州記曰今竹林是也爾雅曰水注溪曰谷蜀志曰谷口今之斜谷是也唐書曰王􅀛字大年性簡淡蕭灑不樂仕進少以詩酒琴書自適不從科試京城光福里起第兄弟同居斯爲宏敞􅀛意在人外倦接朋游乃於永逹里園林深僻處創書齋吟嘯其間目爲半隱亭及從父起在河中於條山谷中起草堂與山人道士遊朔望一還府第後人目爲郎君谷老子曰谷得一以盈谷無以盈將恐竭又曰江海能爲百谷王者以其善下之也故能爲百谷王又曰知其辱爲天下谷􅁊子曰昔齊桓公入谷問父老曰此何谷荅曰謂臣愚名爲愚公谷風俗通曰南陽酈縣有甘泉谷水甘美云其山上有菊花水從山中流下得其滋液谷中三}
  - {type: page-break, offset: 3412, content: '', id: KR3k0012_SBCK_054-6a}
