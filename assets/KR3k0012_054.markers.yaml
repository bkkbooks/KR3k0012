  - {type: variant, offset: 50, length: 142, content: 送子涉淇至于頓丘又曰子之蕩兮苑丘之上兮又曰崇丘萬物得極其高大也又曰楊園之道猗于畝丘又曰綿蠻黃鳥止于丘隅又曰丘中有麻彼留子嗟禮曰太公封於營丘比及五世皆反葬於周君子曰樂樂其所自生禮不忘其本古之人有言曰狐死正丘首仁也正丘首正首丘也仁恩也又曰公叔文子升於瑕丘蘧伯玉從二子衛大夫文子曰樂哉斯丘也, SBCK: 榖則異室}
