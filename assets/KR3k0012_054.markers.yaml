  - {type: variant, offset: 23, length: 0, content: '', SBCK: 葬數年尸猶儼然今舟行者過其山渚長聞香氣咸歎異焉水經注曰層山石室中有積書卷矣而世士罕有逹者因謂之積書巖鄱陽記曰香巖在貴溪縣東五里舊名腥腥巖昔術者許旌陽斬蛟於此巖下因此名焉又以板塞巖口㝷蛟潜通洪州橫泉井每至天景澄霽見水底板木存焉後}
