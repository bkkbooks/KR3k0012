  - {type: variant, offset: 3407, length: 4, content: 鄉峽峽西, krp: 崖有太尉公藏書穴太元初人入穴見古書二十餘卷焉㑹稽記曰郡有禹穴案漢書司馬遷傳云上㑹稽探禹穴又有禹井楊都云入洞穴出蒼梧注云在零陵言人從禹穴入至蒼梧出也周地圗記曰順政郡丙穴以其口向因以爲名沮水經穴間而過或謂之大丙水每春三月上旬復有魚長}
