  - {type: variant, offset: 3443, length: 1, content: 湞, krp: 令居縣面北塞外瓦街容水文成龍試攪破之㝷手成龍畜生將飲皆畏而走又燉煌西有馬蹄谷漢武帝聞大宛有天馬遣李廣利伐而得之甚以爲竒故賦天馬之歌秦州記曰古有神婦負圡欲塞谷縄絶墜負押木因成二樹其大數圍㝷}
  - {type: variant, offset: 3445, length: 0, content: '', SBCK: 記曰廬山西南有康王谷又北嶺有劉成谷天欲雨輙聞鼔角簫笳之聲戴延之西京記曰梓澤去洛城二十里澤在金谷之中朝賢所集賦詩是石崇所居郡國志曰武都沮水之西有角弩谷即蜀將姜維勦五部溪羗之所又曰王喬谷俗謂太公即王喬所隱處谷有喬堂歳常祀之雲陽記曰龍谷水出雲陽宫東南又有鄭泉云漢時鄭朴字子眞隱於谷口不屈其志耕於巖石之下名震京師時人亦因子眞所居以爲名也又有冶谷封禪書所謂谷口是也去雲陽宫八十里岀䥫冶鑄之所因以爲名入谷便流潦沸騰飛泉激兩岸峭壁􅀌竪盤橫枕谷口凛然凝冴常如八九月中朱明盛暑當晝暫暄凉秋晚候緼􅂁不暖所謂寒門也又云入冶谷二十里有百里槐樹樹北有泉名曰金泉按此樹猶存金泉西南百歩谷中今有毛原監也十道志曰大谷在鞏縣東五里張衡東京賦曰孟津達其後大谷通其前陳思王洛神賦曰經通大谷潘岳閑居賦曰張公大谷之梨皆謂此也嶺廣州記曰有五嶺大􅁃始安臨賀桂陽掲陽是也南康記曰秦始皇略定楊越謫戍五方南守五嶺第一塞上嶺即南康大􅁃嶺是第二􅀐田嶺今桂陽郡臘嶺是第三都龐嶺今江華郡永明嶺是第四甿渚嶺亦江華郡白芒嶺是第五越城嶺即零陵郡南臨源嶺是也談藪曰光州西北有一嶺髙峻北臨滄江齊尚書郎崔挺遷光州於嶺上欲立}
