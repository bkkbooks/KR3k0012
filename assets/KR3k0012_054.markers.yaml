  - {type: variant, offset: 3406, length: 0, content: '', SBCK: 䖍州㱕義山夢水出焉有石室金色號爲金穴室内常有金䑕岀入又曰􅀲州常樂縣縣有風穴􅁪以大石棧之􅀂開暴風起連日又曰循州有龍穴潜通于海傍于洞庭呉都賦云目龍川而帶垧是此也又曰􅉑州楊震宅西有龍望原}
  - {type: variant, offset: 3406, length: 0, content: '', WYG: 虔州歸義山夢水出焉有石室金色號為金穴室内常有金鼠出入又曰瓜州常樂縣有風穴恒以大石棧之若開暴起風連日又曰循州有龍穴潛通于海傍于洞庭吳都賦云目龍川而帶垧是也又曰虢州揚震宅西有龍望原}
  - {type: variant, offset: 3406, length: 0, content: '', krp: 䖍州㱕義山夢水出焉有石室金色號爲金穴室内常有金䑕岀入又曰瓜州常樂縣縣有風穴恒以大石棧之若開暴風起連日又曰循州有龍穴潜通于海傍于洞庭呉都賦云目龍川而帶垧是此也又曰􅉑州楊震宅西有龍望原}
  - {type: variant, offset: 3407, length: 4, content: 鄉峽峽西, SBCK: 崖有太尉公藏書穴太元初人入穴見古書二十餘卷焉㑹稽記曰郡有禹穴案漢書司馬遷傳云上㑹稽探禹穴又有禹井楊都云入洞穴出蒼梧注云在零陵言人從禹穴入至蒼梧出也周地圗記曰順政郡丙穴以其口向因以爲名沮水經穴間而過或謂之大丙水每春三月上旬復有魚長}
  - {type: page-break, offset: 3407, content: '', id: KR3k0012_SBCK_054-5b}
  - {type: variant, offset: 3407, length: 4, content: 鄉峽峽西, WYG: 崖有太尉公藏書穴太元初人入穴見古書二十餘卷焉會稽記曰郡有禹穴案漢書司馬遷傳云上會稽探禹穴又有禹井揚都賦云入洞穴出蒼梧註云在零陵人從禹穴入至蒼梧出也周地圖記曰順政郡丙穴以其口向丙因以為名沮水經穴間而過或謂之大丙水每春三月上旬復有魚長}
