  - {type: variant, offset: 1487, length: 1018, content: 渚謂之鮪渚十道志云岑原丘在縣西北三十三里陵釋名曰陵隆也體隆高也易曰天險不可升地險山川丘陵又曰躋於高陵三歲不覿詩曰鴥彼飛隼率彼中陵又曰高岸為谷深谷為陵禮曰五月可以居高明可以遠眺望可以處臺榭傳曰蹇叔送其子曰殽有二陵其南陵夏后皋之墓其北陵文王之所避風雨也春秋說題辭曰陵之為言稜也輔山成其廣層稜扶推益厥長也孝經援神契曰德至山川丘陵則景雲出宋均注曰景雲應間澤不偏也爾雅曰大阜曰陵又曰東陵阠所陳切南陵息慎西陵威夷中陵朱勝北陵西隃鴈門是也音戍陵莫大於加陵梁莫大於溴梁墳莫大於河墳謂之八陵穆天子傳曰天子東遊次于崔梁曝蠹書于羽陵莊子曰盜跖死於東陵之上又曰步仞之丘陵巨獸無所隱其軀而孽狐天子東征釣于隰水祭淑人是日祭丘為之降呂氏春秋曰凡葬必於高陵之上以避狐狸之患水泉之濕此則善矣楊子法言曰百川學海而至於海丘陵學山而不至山是故惡夫住者住止魏子曰堯入百仞之溪則不照三里非矇闇位卑勢下故也桀紂昇百丈之陵能見四海非照明位高勢尊故也十洲記曰崑崙陵即崑崙山也西海之戍地北海之亥地去中國十萬里有弱水周匝繞山吳錄曰張紘言於孫權曰秣陵楚武王所置名為金陵秦始皇時望氣故掘斷連崗改名秣陵物理論曰地者鎮之以五岳積之以丘陵阪詩曰阪有漆隰有栗爾雅曰坡者曰阪郭璞注曰阪地不平也史記曰漢文帝嘗從霸陵西馳下峻坂表盎攬轡上曰將軍怯也盎曰臣聞千金之子坐不垂堂百金之子立不倚衡今聖主乘危馳不側之淵如馬警車敗奈高廟何上乃止漢書地理志曰河東蒲坂縣故曰蒲泰更名應劭曰秦始皇東巡見有長坂孟康曰本屬晉文公以賂秦秦人還蒲魏人喜曰蒲反矣漢書曰王陽為益州至邛𤏡蒲比切坂九折歎曰奈何以先人之遺體乘此險乎遂以病去及王遵為刺史至此坂問吏曰此非王陽所畏道耶叱其馭驅之曰王陽為孝子王遵為忠臣應劭注曰坂在嚴道縣界漢書西域傳曰西域有赤玉身熱之坂上即今人身熱無色頭痛嘔吐續漢書地理志曰河東大陽縣有顛軨坂蜀志曰先主至當陽之長坂為曹公所追敗王隱晉書曰孫登楊駿逼迎之與語不荅賜布袍登借刀截斷棄門中大呼云刺斫刺斫卒病死後人見在貴馬坂穆天子傳曰天子南還昇于長松之坂郭僕注曰坂有長松酈善長注水經曰洛水東逕九曲其地千里有九坂之曲穆天子傳所謂天子西征升九阿是也又曰河水東逕旋門坂北今城皋西大坂是也昇陟此坂而東趣成皋城列女後傳曰呂榮者吳郡許昇之妻也昇為賊所害榮貞固自守黃巾賊陳寶欲干穢之榮執節不聽寶遂殺榮是日疾風暴雨雷電晦冥寶恐懼叩頭謝葬之而去麇府君聞榮高行遣主簿祭之又出錢助縣為冢於嘉興郭里墟北名曰義婦坂華陽國志曰有牛叩頭坂馬搏頰坂其嶮如此晉太康, SBCK: 蝙蝠來撲火江乗}
