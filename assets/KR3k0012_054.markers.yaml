  - {type: variant, offset: 8, length: 0, content: '', SBCK: 巖者崖也山邊謂之崖書曰髙宗夢得􅀃使百工營求諸野得諸傅巖孔安囯注曰使百官以所夢之形像經營求之外野得之於傳巖之溪晉書曰許詢移居臯屯之巖常與沙門支遁及謝安石王羲之等同逰往來今臯屯呼爲許度巖齊書曰徐伯珎宅南九里有髙山班固謂之九巖山後漢龍}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 巖者崖也山邊謂之崖尚書髙宗夢得説使百工營求諸野得諸傅巖孔安國注曰使百官以所夢之形像經營求之外野得之於傅巖之溪晉書曰許詢移居臯屯之巖常與沙門支遁及謝安石王羲之等同遊往來今臯屯呼為許度巖齊書曰徐伯珍宅南九里有髙山班固謂之九巖山即後漢龍}
