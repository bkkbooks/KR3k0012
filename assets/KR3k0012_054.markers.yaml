  - {type: variant, offset: 302, length: 591, content: 扶始昇高丘賭白帝上有雲虎之狀感己生皋陶春秋說題辭曰丘者墓也又曰丘谷輔氣元士扶化爾雅曰丘一成為敦丘成猶重周禮曰為壇三成今江東呼地高堆者為敦舊音頓再成銳上為融丘三成為崑崙丘崑崙山三重形如累三盂如乘者乘丘形似乘車如渚者渚丘水中小洲為渚水潦所止泥丘頂上洿下丘方胡丘形万四絕高為之京人力所作非人為之曰丘地自然生水潦所還曰將丘宮音謂丘邊有界埒水繞環之上正章丘頂平澤中有丘都丘在水澤內當塗梧丘塗道塗出其右而還之重丘言為道所規畫途出其前戴丘道出丘南途出其後昌丘道出丘北水出其前渻丘水出其後沮丘水出其右正丘水出其左營丘今齊之營丘淄水過其南及東如覆敦者敦丘邐迤沙丘左高咸丘右高臨丘前高旄丘後高陵丘偏高阿丘丘背有丘為負丘中央隆峻狀如負一丘於背上右澤定丘右陵泰丘宋有泰丘見史記如畝畝丘丘有壟界如田如陵陵丘丘上有丘為宛丘陳有宛丘今在陳郡陳縣晉有潛丘今在太原晉楊陽縣淮南有州𥠖丘今在壽春天下有名丘五其三在河南二在河北說者多以州黎宛營為河南者潛敦為河北者案北方稱天下之名丘恐此諸丘碌碌未足用當之殆別有魁梧桀大者五但未詳其名號所在耳廣雅曰小陵曰丘又曰丘上有木為祕丘家語曰丘陵為牡谿谷為牝方言曰冢大者謂之丘穆天子傳曰天子昇于崑崙之丘以觀黃帝之宮郭璞注曰黃帝巡狩四海登崑崳山起宮室於其上又曰為盛姬謚曰哀淑人之丘天子名之為丘作名是曰淑人之丘乙丑天子東征舍乎五鹿叔㛗七和切且哭思盛姬也㛗穆王女也是曰女㛗之丘因以名五鹿也丁卯, WYG: 金穴}
