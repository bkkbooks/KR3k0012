  - {type: variant, offset: 3840, length: 0, content: '', WYG: 鞏縣東五里張衡東京賦曰孟津造其後大谷通其前陳思王洛神賦曰經通大谷潘岳閒居賦曰張公大谷之梨嶺廣州記曰有五嶺大庾始安臨賀桂陽揭陽也南康記曰秦始皇略定揚越謫戍五方南守五嶺第一塞}
  - {type: page-break, offset: 3840, content: '', id: KR3k0012_WYG_054-13a, image: WYG0893/WYG0893-0464a.png}
  - {type: variant, offset: 3841, length: 0, content: '', WYG: 嶺即南康大庾嶺是第二騎田嶺今桂陽郡臘嶺是第三都龎嶺今江華郡永明嶺是第四甿渚嶺亦江華郡白芒嶺是第五越城嶺即零陵郡南臨源嶺是也談藪曰光州西北有一嶺髙峻北臨滄江齊尚書郎崔挺遷光州於嶺上欲立觀宇故老云此嶺秋夏之際常有暴風迅雨嶺石盡落相傳云是龍道不可久立挺曰人神相去何遠之有虬龍恍忽豈唯一路乎遂營之數年果無風雨之患挺還歸尋為雷風所毁後不能立吳地志云南野縣有大庾嶺通廣州晉太康地志嶺峻阻螺轉上踰九磴二里至頂下七里平行十里至亭一名横亭一名塞上嶺建安記曰建安縣有禱嶺與泉州分界}
  - {type: page-break, offset: 3841, content: '', id: KR3k0012_WYG_054-13b, image: WYG0893/WYG0893-0464b.png}
  - {type: variant, offset: 3842, length: 0, content: '', WYG: 嶺髙禱而方過又有飛猿嶺喬木造天猿猱}
