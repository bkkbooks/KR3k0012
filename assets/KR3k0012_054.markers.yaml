  - {type: variant, offset: 986, length: 0, content: '', SBCK: 昔巴蠻有五姓未有君長俱事􅀑神乃共擲劒於石穴約能中者衆奉以爲君巴氏子務相乃中之又各令乗土舡約浮者當以爲君唯務相獨浮因共立之是爲廪君又曰江陵有駕部口宋文帝車駕發江陵至此黒龍躍岀􅀒帝乗舟左右失色上謂長史王曇首曰此乃夏禹所以受天命矣我何德以堪之故穴爲龍穴焉又曰夏平縣有重山即烈山也山下有一穴父老相傳是神農所生處也又曰}
  - {type: variant, offset: 986, length: 0, content: '', krp: 昔巴蠻有五姓未有君長俱事鬼神乃共擲劒於石穴約能中者衆奉以爲君巴氏子務相乃中之又各令乗土舡約浮者當以爲君唯務相獨浮因共立之是爲廪君又曰江陵有駕部口宋文帝車駕發江陵至此黒龍躍岀負帝乗舟左右失色上謂長史王曇首曰此乃夏禹所以受天命矣我何德以堪之故穴爲龍穴焉又曰夏平縣有重山即烈山也山下有一穴父老相傳是神農所生處也又曰}
