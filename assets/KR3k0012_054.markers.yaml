  - {type: variant, offset: 3398, length: 1, content: 奔, SBCK: 􅀇中記曰蜀郡有青城山有洞穴分爲三孔西北通崑崙婁地記曰太湖東小山名洞庭純石巉巖木唯松栢山有三穴東頭北面一穴不容人西頭南面一穴亦然並有青泉流出西北一穴傴僂􅂊得入穴外石盤礴形勢驚人穴裏}
  - {type: variant, offset: 3398, length: 1, content: 奔, krp: 玄中記曰蜀郡有青城山有洞穴分爲三孔西北通崑崙婁地記曰太湖東小山名洞庭純石巉巖木唯松栢山有三穴東頭北面一穴不容人西頭南面一穴亦然並有青泉流出西北一穴傴僂纔得入穴外石盤礴形勢驚人穴裏}
  - {type: variant, offset: 3400, length: 2, content: 轉輪, SBCK: 一間堂屋上髙丈餘恒津潤四壁石色青白南壁開處側肩得入潜行二道北通琅瑘東通武縣西通長沙巴陵湖呉大帝使人行三十餘里而反云上聞有浪聲有大蝙蝠如鳥拂殺人火穴中髙處火照不見穴有鵞管鍾乳氷寒可得入春夏不可入}
