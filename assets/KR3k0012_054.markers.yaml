  - {type: variant, offset: 3389, length: 1, content: 雩, SBCK: 西南有通天穴四壁石色似書丈六像下有石床有石子彈丸聚有一角又曰平固縣西覆笥下有洞穴穴口可廣五六尺髙五尺餘昔有人採鍾乳深入爲瞑不得出遂留住宿忽聞頭上有篙舡之聲北征記曰姑熟有井山有九穴與江通呉郡臨海記曰虞縣有穿山下有洞穴昔有在海中行者㪯㠶從穴中過盛弘之荆州記曰冝}
