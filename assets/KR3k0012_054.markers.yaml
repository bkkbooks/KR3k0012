  - {type: variant, offset: 3393, length: 0, content: '', WYG: 笠則知溪穴潛通𤣥中記曰蜀郡有青城山有洞穴分為三孔西北通崑崙輿地記曰太湖東小山名洞庭絶石巉巖本唯松柏山有三穴東頭北面一穴不容人西頭南面一穴亦然並有清泉流出西北一穴傴僂纔得入穴外石盤礴形勢驚人穴裏如一間堂屋上髙丈餘恒津潤四壁石色青白南壁開處側肩得入潜行三道北通琅琊東通武縣西通長沙巴陵湖吳大帝使人行三十餘里而反云上聞有浪聲有大蝙蝠如鳥拂殺人火穴中髙處火照不見穴有鵝管鍾乳}
