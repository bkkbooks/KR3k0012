  - {type: variant, offset: 1855, length: 6, content: 太興二年海監, krp: 有氣象人青衣無手在日西天子之氣也遁甲開山圖曰巨靈者偏得元氣之道故以元氣一時生混沌又曰自老子生周青氣凌遲俗儒道士無所通驗河圖曰崑崙山有水水氣上蒸爲霞地鏡圖曰望百姓家黄氣者蘖梔子樹也山有白氣而鬰鬱中有神龍三輔舊事曰漢作靈臺以四孟月登而觀黃氣爲疾病赤兵黒水荆州圖曰冝都郡望州山袁山松冝都記曰武鍾山山根有涌泉成溪溪注丹水天隂欲}
  - {type: variant, offset: 1856, length: 0, content: '', WYG: 祖廟中有青氣占之者以為東莞音官王後當有天子後改封瑯邪江東之應也又魯勝字叔時以嵗日望氣乃長歎知將來多故便稱疾去官中書令張華敬之欲用之遣二子諭意竟不起又張華察牛斗間有紫氣乃豐城之劔氣也吳志曰朝宫井上旦有五色氣孫堅令浚之得漢傳國璽又孫堅𦵏富春城東塜有光上屬天蔓數里皆曰非凡氣也孫氏其}
