  - {type: variant, offset: 1901, length: 2, content: 匈奴, SBCK: 南方來戲於殿前激水化成比目跳躍嗽水作霧翳日燕書烈祖後記曰無璽六年蔣幹遣侍中繆髙太子詹事劉猗賷傳國璽詣晉求救猗􅀒引行數百里黃霧四塞迷荒不得進乃還易取行璽始得去帝王丗紀曰凡重霧三日必大􅀨雨未降霧不可冒行又曰帝沃丁八年伊尹卒年百有餘􅀊天霧三日沃丁葬以天子之禮祀以太牢親自臨喪}
