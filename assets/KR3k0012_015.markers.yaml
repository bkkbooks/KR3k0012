  - {type: variant, offset: 1873, length: 5, content: 劉曜光初三, SBCK: 霧冒也氣蒙冒覆地物也昏暗之時則爲妖灾明王聖主則爲祥瑞禮記月令曰仲冬行夏令則其國乃旱氛霧􅁳冥爾雅曰地氣發天不應曰霧尚書中候曰桀無道地吐黄霧春秋元命包曰霧隂陽之氣也隂陽怒而爲風亂而爲霧漢書曰爰盎諌文帝勿遷淮南王恐其逢霧露病死又曰王氏五侯同日俱封其日黄霧四塞又曰漢髙祖至平城匈奴圍上七日天大霧漢使人還徃胡不覺後得免平城之難又曰孝成帝建始元}
  - {type: page-break, offset: 1873, content: '', id: KR3k0012_SBCK_015-6a}
  - {type: variant, offset: 1873, length: 5, content: 劉曜光初三, WYG: 霧冐也氣蒙冐覆地物也昏暗之時則為妖災明王聖主則為祥瑞禮記月令曰仲冬行夏令則其國乃旱氛霧㝠㝠爾雅曰地氣發天不應曰霧尚書中候曰桀無道地吐黄霧春秋元命苞曰霧隂陽之氣也隂陽怒而為風亂而為霧漢書曰袁盎諫文帝勿遷淮南王恐其逢霧露而死又王氏五侯同日俱封其日黄霧四塞又漢髙祖至平城匈奴圍上七日天大霧漢使人還往胡不覺後得逸平城之難又孝成帝建始元}
