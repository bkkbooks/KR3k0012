  - {type: variant, offset: 1859, length: 0, content: '', WYG: 中數有氣如旗從西竟東中天而行圖書曰必有天子出其方南中八郡志曰永昌郡有禁水水有惡毒氣中去聲下同物則有聲中樹木則折名曰鬼彈中人則奄然潰爛宋永初山川記曰寧州瘴氣莽露四時不絶列仙記曰老子西出關關令尹喜占氣知神仙過荆州記曰夷道縣有望州山山下有泉欲雨泉中有赤氣上騰于天莊子曰若夫乗天地之正而御六氣之辨以逰於無窮者彼惡乎待哉郭象曰御六氣之辨即是逰變化之塗也又人之生氣聚則為生散則為死列子曰太初者氣之始也又天積氣之所成孫卿子曰水火有氣而無生草木有生而無知抱朴子曰軍上氣黑如樓將軍移軍必敗其將勇則氣如火炎勢如張弩雲如日月赤氣繞之所見之地大勝不可攻也又或問登步之道曰或用棘心為飛車存念則五蛇六龍至乗之上升三十里名為太清其氣甚剛勝人也師言鳶飛漸髙直舒兩翅而自漸進乗剛氣也淮南子曰土地各以類生人是故山氣多男澤氣多女水氣多瘖於金反風氣多聾林氣多癃木氣多傴髙誘曰自此上至山氣多男皆生子乃有此疾也下氣多尰岸下下虚腫足曰尰石氣多力象石也險阻氣多癭暑氣多殀音夭寒氣多壽谷氣多痺丘氣多狂廣氣多仁下平者其聚為廣陵氣多貪象陵積聚也輕土多力利疾也重土多遲清水音小濁水音大湍水人重湍急流悍水也中土多聖人皆應其類也又太清之始世天覆以徳地載以樂四時不失其序風雨不降其虐日月淑清而揚光五星循軌而不失其行此氣之至休者也吕氏春秋曰天圎謂精氣圎通周復無雜故曰圎魏子曰北夷之氣象羣羊南夷之氣類船山}
