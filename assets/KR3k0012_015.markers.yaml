  - {type: variant, offset: 1855, length: 6, content: 太興二年海監, SBCK: 有氣象人青衣無手在日西天子之氣也遁甲開山圖曰巨靈者偏得元氣之道故以元氣一時生混沌又曰自老子生周青氣凌遲俗儒道士無所通驗河圖曰崑崙山有水水氣上蒸爲霞地鏡圖曰望百姓家黄氣者蘖梔子樹也山有白氣而鬰鬱中有神龍三輔舊事曰漢作靈臺以四孟月登而觀黃氣爲疾病赤兵黒水荆州圖曰冝都郡望州山􅀽山松冝都記曰武鍾山山根有涌泉成溪溪注丹水天隂欲}
