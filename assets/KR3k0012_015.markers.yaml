  - {type: variant, offset: 3227, length: 0, content: '', SBCK: 六月三日有霧則􅀊大熟地鏡圖曰玉之千􅀊者行遊諸國其所居國必三日變爲日中之霧漢武帝故事曰武帝葬茂陵芳香之氣異常積於憤之間如大霧黃帝􅀇女戰法曰黄帝與􅃖尤九戰九不勝黄帝歸於}
  - {type: variant, offset: 3227, length: 0, content: '', krp: 六月三日有霧則歲大熟地鏡圖曰玉之千歲者行遊諸國其所居國必三日變爲日中之霧漢武帝故事曰武帝葬茂陵芳香之氣異常積於憤之間如大霧黃帝玄女戰法曰黄帝與蚩尤九戰九不勝黄帝歸於}
  - {type: variant, offset: 3228, length: 0, content: '', SBCK: 山三日三夜霧􅁳有一婦人人首鳥形黃帝稽首再拜伏不敢起婦人曰吾􅀇女也子欲何問黃帝曰小子欲萬戰萬勝遂得戰法焉徐幹中論曰文王遇姜公於渭陽執竿而釣文王得之灼若披雲而見白日霍若開霧而覩青山温嶠與陶􅋲箋曰霧氣過差則君道幽晦霾釋名曰霾晦也如物塵晦之色也詩曰終風且霾惠然肯來爾雅曰風而雨土爲霾崔豹}
  - {type: page-break, offset: 3228, content: '', id: KR3k0012_SBCK_015-10a}
  - {type: variant, offset: 3228, length: 0, content: '', krp: 山三日三夜霧冥有一婦人人首鳥形黃帝稽首再拜伏不敢起婦人曰吾玄女也子欲何問黃帝曰小子欲萬戰萬勝遂得戰法焉徐幹中論曰文王遇姜公於渭陽執竿而釣文王得之灼若披雲而見白日霍若開霧而覩青山温嶠與陶侃箋曰霧氣過差則君道幽晦霾釋名曰霾晦也如物塵晦之色也詩曰終風且霾惠然肯來爾雅曰風而雨土爲霾崔豹}
  - {type: variant, offset: 3229, length: 43, content: 二皇得道之柄立於中央二皇伏羲神農神與化遊以撫四方是故虹蜺不出賊星不行賊星妖星含德之所致, SBCK: 今注曰漢昭帝元鳯三年天雨黄土晝夜昏霾曀􅀃文曰曀天隂沉}
