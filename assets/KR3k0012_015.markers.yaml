  - {type: variant, offset: 3219, length: 2, content: 乘雷, SBCK: 遊微霧經霜雪而無迹照日光而無影魏子曰雲霧之盛須􅁷而訖暴􅀨之盛不過終日是以人君喜怒不見於容魚龍河圖曰山冬天霧十日巳上不除者山崩之後出水脉也京房易占曰大霧君迷惑雲霧四起則時多隱士伏侯古今注曰漢元帝竟寧元年大霧樹皆白潜潭巴曰大霧三十日群猾起上下相蒙上少下多故群猾起志林曰黄帝與􅃖尤戰於涿鹿之野􅃖尤作大霧弥三日軍人皆惑黄帝乃令風后法斗機作指南}
