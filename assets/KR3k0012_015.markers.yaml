  - {type: variant, offset: 1950, length: 0, content: '', WYG: 朔乘雲飛去仰望大霧覆之不知所在劉向列女傳曰陶答子妻者陶大夫答子之妻也答子化陶三年名譽不興家富三倍其妻數諫曰夫子能薄而官大是謂嬰害無功而家富是謂積殃昔楚令尹子文之化家貧而國富福結于子孫名垂於後代今夫子貪富務大不顧後害妾聞南山}
