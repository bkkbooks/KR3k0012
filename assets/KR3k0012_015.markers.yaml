  - {type: variant, offset: 3740, length: 379, content: 八年青虹見瑞應圖曰大虹竟天握登見之意感生帝舜於姚墟太玄經曰紫霓圍日其疾不割雜兵書曰日暈有白虹貫內出外者從所止戰勝華陽國志曰李特生長子盪字仲平少子雄字仲儁初特妻羅氏妊雄夢雙虹自地升天一虹中斷羅曰吾二兒有先亡者有貴者後雄王蜀黃帝占軍決曰攻城有虹從南方入飲城中者從虹攻之勝白虹繞城不匝從虹所在擊之勝謹守其鈌賊乃從其地破走文子曰父無喪子之憂兄無哭弟之哀童子不孤婦人不孀虹蜺不見盜賊不行含德之所致也楚辭曰青雲衣兮白蜺裳楚辭天問曰白蜺嬰茀胡為此堂王逸注曰蜺雲之有色似龍者茀白雲逶迤若虵者言有此蜺茀氣氣逶迤相嬰何為於此堂乎蓋屈原所見祠堂也安得失夫良藥不能固臧臧善也崔文子學仙於王子喬子喬化為白虹而如嬰茀持藥與崔文子文子驚怪引戈擊蜺中之因墮其藥俯而視之王子喬之履也故言得藥不善也揚雄甘泉賦曰曳虹彩之流離左思吳都賦曰虹蜺迴帶於雲館潘尼苦雨賦曰收絳霓於漢陰楊文雲賦曰浮素霓之逶迤, SBCK: 五}
