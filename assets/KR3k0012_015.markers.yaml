  - {type: variant, offset: 1822, length: 0, content: '', SBCK: 武帝咸寕元年洛陽}
  - {type: variant, offset: 1822, length: 0, content: '', WYG: 郎顗上書曰去年閠月白氣從天漢入玉井西將有叛戾之患金精之變}
  - {type: variant, offset: 1822, length: 0, content: '', krp: 武帝咸寕元年洛陽}
  - {type: variant, offset: 1823, length: 1, content: 元, SBCK: 祖廟中有青氣占者云以爲東莞音官王後當有天子後改封琅邪江東之應也又曰魯勝字叔時以􅀊日望氣乃長歎知將來多故便稱疾去官中書令張華敬之欲用之遣二子諭意遂不動又曰張華察牛斗間有紫氣乃豐城之劒氣也呉志曰朝宫井上旦有五色氣孫堅令浚之得漢傳國璽又曰孫堅葬冨春城東􅊘有光上屬天下蔓數里皆曰非凡氣也孫氏其興乎蜀志曰劉毅向攀等上言建安}
  - {type: variant, offset: 1823, length: 0, content: '', WYG: 尉所掌宜責以災異漢書五行志曰永興二年光禄勲舍壁下有青氣視之得玉鈎玦漢光武封禪儀曰}
  - {type: page-break, offset: 1823, content: '', id: KR3k0012_WYG_015-5a, image: WYG0893/WYG0893-0154c.png}
  - {type: variant, offset: 1823, length: 1, content: 元, krp: 祖廟中有青氣占者云以爲東莞音官王後當有天子後改封琅邪江東之應也又曰魯勝字叔時以歲日望氣乃長歎知將來多故便稱疾去官中書令張華敬之欲用之遣二子諭意遂不動又曰張華察牛斗間有紫氣乃豐城之劒氣也呉志曰朝宫井上旦有五色氣孫堅令浚之得漢傳國璽又曰孫堅葬冨春城東塚有光上屬天下蔓數里皆曰非凡氣也孫氏其興乎蜀志曰劉毅向攀等上言建安}
  - {type: variant, offset: 1824, length: 0, content: '', WYG: 年封禪晝有白氣夜有赤光又建武三十二年二月十九日之山此日山上雲氣成宫闕百官皆見之}
  - {type: variant, offset: 1826, length: 1, content: 一, SBCK: 二}
  - {type: variant, offset: 1826, length: 1, content: 一, krp: 二}
  - {type: variant, offset: 1827, length: 5, content: 年四月雨雹, WYG: 日夕牲}
  - {type: variant, offset: 1828, length: 0, content: '', SBCK: 數有氣必有天子出其方南中八郡志曰永昌郡有禁水水有惡毒氣中去聲物則有聲中樹木則折名曰􅀑彈中人則􅍕然青爛宋永初山川記曰寧州瘴氣􅞒露}
  - {type: page-break, offset: 1828, content: '', id: KR3k0012_SBCK_015-4a}
  - {type: variant, offset: 1828, length: 0, content: '', krp: 數有氣必有天子出其方南中八郡志曰永昌郡有禁水水有惡毒氣中去聲物則有聲中樹木則折名曰鬼彈中人則奄然青爛宋永初山川記曰寧州瘴氣􅞒露}
  - {type: variant, offset: 1829, length: 0, content: '', SBCK: 時不絶西升記曰老子西出關關令尹喜占氣知神仙過荆州記曰夷道縣有望州山山下有泉欲雨泉中有赤氣騰上于天莊子曰􅀂夫乗天地之正而御六氣之辨以遊無窮者彼惡乎待哉郭象曰御六氣之辦即是遊變化之塗也又曰人之生氣聚則爲生散則爲死列子曰太􅀄者氣之始也又曰天積氣之成者也孫卿子曰水火有氣而無生草木有生而無知抱朴子曰軍上氣黒如樓將軍移軍必敗其將勇則氣如火火􅀔如張弩雲如日}
  - {type: variant, offset: 1829, length: 0, content: '', krp: 時不絶西升記曰老子西出關關令尹喜占氣知神仙過荆州記曰夷道縣有望州山山下有泉欲雨泉中有赤氣騰上于天莊子曰若夫乗天地之正而御六氣之辨以遊無窮者彼惡乎待哉郭象曰御六氣之辦即是遊變化之塗也又曰人之生氣聚則爲生散則爲死列子曰太𥘉者氣之始也又曰天積氣之成者也孫卿子曰水火有氣而無生草木有生而無知抱朴子曰軍上氣黒如樓將軍移軍必敗其將勇則氣如火火勢如張弩雲如日}
  - {type: variant, offset: 1830, length: 2, content: 雨雹, SBCK: 赤氣繞之所見之地大勝不可攻也又曰或問登陟之道曰或用􅀥心爲飛車存念則五虵六龍而乗之上升三十里名爲太清其氣甚剛勝人也師言鳶飛漸髙直舒兩翅而自進漸乗剛氣也淮南子曰土地各以􅀋生人是故山氣多男澤氣多女水氣多瘖於金風氣多聾林氣多癃木氣多傴髙誘曰自此上至山氣多男皆生子乃有此疾也下氣多尰岸下下濕腫足日尰石氣多力象石也險阻氣多癭暑氣多殀音夭寒氣多壽谷氣多痺丘氣多狂廣氣多仁下而平者爲廣陵氣多貪象陵積聚也輕土多利利疾也重土多遲清水音小濁水音大湍水人重湍急流悍水也中土多聖人皆應其􅀋也又曰太清之始世天覆以德地載以樂四}
  - {type: page-break, offset: 1830, content: '', id: KR3k0012_SBCK_015-4b}
  - {type: variant, offset: 1830, length: 0, content: '', krp: 赤氣繞之所見之地大勝不可攻也又曰或問登陟之道曰或用棗心爲飛車存念則五虵六龍而乗之上升三十里名爲太清其氣甚剛勝人也師言鳶飛漸髙直舒兩翅而自進漸乗剛氣也淮南子曰土地各以類生人是故山氣多男澤氣多女水氣多瘖於金風氣多聾林氣多癃木氣多傴髙誘曰自此上至山氣多男皆生子乃有此疾也下氣多尰岸下下濕腫足日尰石氣多力象石也險阻氣多癭暑氣多殀音夭寒氣多壽谷氣多痺丘氣多狂廣氣多仁下而平者爲廣陵氣多貪象陵積聚也輕土多利利疾也重土多遲清水音小濁水音大湍水人重湍急流悍水也中土多聖人皆應其類也又曰太清之始世天覆以德地載以樂四時不失其序風}
  - {type: variant, offset: 1831, length: 1, content: 雹, krp: 不降其虐日月淑清而楊光五星循軌而不失其行此}
  - {type: punctuation, offset: 1832, content: 。, id: KR3k0012_CHANT_015-bkkpn687}
  - {type: 'tls:seg', offset: 1832, content: '', id: KR3k0012_CHANT_015-34a.12}
  - {type: variant, offset: 1833, length: 1, content: 道, SBCK: 不失其序風􅀨不降其虐日月淑清而楊光五星循􅁤而不失其行此時􅀇元氣至休氣者也吕氏春秋曰天圎爲精氣圎通周復無雜故曰圎魏}
  - {type: page-break, offset: 1833, content: '', id: KR3k0012_SBCK_015-5a}
  - {type: variant, offset: 1833, length: 10, content: 道子專政姦佞競進烈宗, WYG: 有白氣廣一丈東南極望二十二日禮畢正直壇所有氣與天屬遥望}
  - {type: variant, offset: 1833, length: 1, content: 道, krp: 玄元氣至休氣者也吕氏春秋曰天圎爲精氣圎通周復無雜故曰圎魏}
  - {type: variant, offset: 1835, length: 18, content: 專政姦佞競進烈宗不能禁終至大亂晉中興, SBCK: 曰北夷之氣象群羊南夷之氣􅀋􅂳山海之氣象樓臺宫闕都邑之氣象林木家語曰食氣者神明而夀洛}
