  - {type: variant, offset: 1951, length: 1, content: 柴, SBCK: 􅀇豹霧雨七日不下食者何也欲以澤其衣毛而成其文章故藏以逺害今君與此背不無後患乎􅁑洪神仙傳曰欒巴爲尚書郎一旦天大霧對坐不相見失巴所在後問其故乃是巴還成}
