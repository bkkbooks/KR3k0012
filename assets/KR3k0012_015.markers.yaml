  - {type: variant, offset: 3448, length: 2, content: 覺有, WYG: 敢起婦}
  - {type: variant, offset: 3451, length: 384, content: 道感接忽忽如眠耳如是積年春每往期會不復畏難比鄰人觀其所至輒有虹見秦云至水側丈夫金瓶引水共飲後遂有娠生兒如人多肉不覺有手足濟尋假還秦懼見之乃內兒著瓮中因見此丈夫以金瓮與之令覆兒濟時醉眠在牗下聞人與秦語語聲至愴濟亦不疑也又丈夫語秦云兒小未可得將去不須作衣我自衣之即以絳囊與裹之令可時出與乳于時風雨晦冥鄰人見虹下其庭秦常能辨佳食肴饌豐美有異於常丈夫復少時將兒去亦風雨晦冥人見二虹出其家從此遂踈異苑曰古語有之曰古者有夫妻荒年菜食而死俱化成青虹故俗呼為美人又曰晉陵薛願義熙初有虹飲其釜煥吸響便竭願輦酒灌之隨投便竭吐金滿器於是災弊日祛而豐富歲臻述異記曰有黑虹下樂輯營少日輯病卒紀年曰晉定公十八年青虹見瑞應圖曰大虹竟天握登見之意感生帝舜於姚墟太玄經曰紫霓圍日其疾不割雜兵書曰日暈有白虹貫內出外者從所止戰勝華陽國志曰李特生長子盪字仲平少子雄字仲儁初特妻羅氏妊雄夢雙虹自地升天一虹中斷羅, WYG: ''}
