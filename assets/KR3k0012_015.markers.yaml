  - {type: variant, offset: 391, length: 1002, content: 凝以為霜霜從地升也五經鉤沉曰天霜樹落葉而鴻鴈南飛家語曰霜降而婦功成嫁娶者行焉季秋霜降娶者始也詩曰將子無怒秋以為期國語曰駟四馬見而霣于敏反霜霣霜而冬裘具賈逵曰駟房星也漢武內傳曰西王母云仙之上藥玄霜絳雪王子年拾遺記曰廣延國有霜色紺碧又曰嵰立儼反州霜甘又曰員嶠之山名環丘有冰蠶以霜雪覆之然後作璽其色五采織為文錦入水不濡以投火經宿不燎唐堯之代海人獻以為黼黻莊子曰馬蹄可以踐霜雪毛可以禦風寒曾子曰陰氣勝則凝為霜淮南子曰芝蘭以芳未嘗見霜先霜刈之又曰聖人行於水無跡眾人行霜有跡又曰至秋三月青女乃出降以霜雪高綉注曰青女天神青天玉女主霜雪也又曰鄒衍事燕惠王盡忠左右譖之王王繫之獄仰天哭夏五月天為之下霜地鏡圖曰視屋上瓦獨無霜者其下有寶山海經曰豐山有九鍾霜降其鍾即鳴命曆序曰桀無道夏隕霜師曠占曰春夏一日有霜雪者君治政大嚴刻太殺天以示之宜損威殺重人命崔豹古今注曰鷓鴣常向日而飛畏霜露夜棲則以樹葉覆其背上蔡邕月令章句曰露凝為霜徐整長曆曰北斗當崑崙山氣運注天下秋冬為霜雪唐書曰寧王憲疾時京城寒甚凝霜封樹時學者以為春秋雨木冰即此是亦名樹介言其象介冑也憲見而歎曰此俗謂樹稼者也諺曰樹稼達官怕必有大臣當之吾其死矣十一月薨琴操曰履霜者伯奇之所作也伯奇者吉甫之子也吉甫聽其後妻之言疑其孝子伯奇遂逐之伯奇編水荷而衣采楟音亭山棃木也花而食之清朝履霜自傷無罪見放逐乃援琴而鼓之楚辭曰秋既戒之以白露冬又申之以嚴霜古艷歌辭曰秋霜白露下桑葉鬱為黃何瑾悲秋夜曰霜凝條兮璀璀露霑葉兮泠泠雹釋名曰雹砲疋巧反又音雹也其所中物皆摧折如人所蹙砲也許慎說文曰雹雨冰也從雨包聲禮曰仲夏行冬令則雹凍傷穀傳曰昭四年正月大雨雹季武問於申豐曰雹可禦乎對曰聖人在上無雹雖有不為災古者日在北陸而藏冰西陸朝覿而出之其入也時今藏川池之冰棄而不用風不越而殺雷不發而震雹之災誰能禦之穀梁傳曰僖公二十九年秋大雨雹雹者陰脅陽臣侵君之象也京房易傳曰飛雹下盡樹木之枝害五穀者君賦歛刻民也焦貢易林曰陰雨泥寒常冰不溫凌人惰怠大雹為災尚書洪範五行傳曰陰陽相脅而雹霰盛陰而雪凝滯而冰寒陽氣薄之不相入則散而為霰盛陽雨水溫煖而湯熱陰氣脅之不相入則轉而為雹霰者陽脅陰也雹者陰脅陽也又曰人君妬賢疾善在下謀上則日蝕而雹殺走獸春秋感精符曰大臣擅法則雨雹又曰九月十月日色青則寒有雪雹春秋考異郵曰陰陽專精凝合成雹雹之言合也春秋漢含孳曰專一精并氣凝為雹宋均注曰謂若魯僖公脅於齊以妾為妻尊重齊勝無廻曲之心感陰水氣乃使結而不解散, SBCK: ''}
