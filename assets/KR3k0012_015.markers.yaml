  - {type: variant, offset: 1894, length: 6, content: 鮮卑兵投鹿侯, SBCK: 河南張楷字公超性好道術能作五里霧於華隂時關西人裴優亦能作三里霧魏略曰劉雄鳴每出雲霧中識道不迷惑時人因謂爲雲霧王隱晉書曰樂廣爲尚書令衛瓘見而竒之令諸子造焉曰此人之水鏡也每見瑩然􅀂開霧覩青天又曰大寧元年黃霧四塞王敦之應也宋元嘉起居注曰盱眙民王彭先丁母艱居喪至孝元嘉之始父又喪亡彭兄弟二人土功未就郷人助彭作塼塼事須水濟值天旱穿井盡力不得水彭號窮無計一旦天霧霧消之後於塼竈前自然水生沈約宋書曰後漢正月朝天子臨徳陽殿受朝賀舎利}
