  - {type: variant, offset: 2270, length: 242, content: 為升平歷代記曰石遵襲位於鄴暴風雨震電雹如斗其太武殿及兩廂端門光豔照天金石皆消為火月餘乃滅紀年曰夷王七年冬雨雹大如礪白虎通曰自上而下曰雨雹風角占曰徵動羽有雹霜陳陸璦和張湖孰雹詩曰惟徵動羽惟陰脅陽雨冰作冷凝氣為祥虹蜺釋名曰虹攻也純陽攻陰氣故也陰陽不和昏姻錯亂淫風流行男女互相奔隨則此氣盛霓齧也其體絕見於非時此災氣傷害物如有所食齧說文曰霓屈虵青赤或白色陰氣者也河圖稽耀鉤曰鎮星散為虹霓虹霓主內淫又霓者氣也起在日側其色青赤白黃周書曰清明後十日虹始見小雪日虹藏不見虹不收藏婦不專一詩曰螮蝀在東莫, SBCK: 以望尋常}
