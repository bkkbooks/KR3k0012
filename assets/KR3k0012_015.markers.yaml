  - {type: variant, offset: 1958, length: 0, content: '', SBCK: 道術之士必卑辭厚幣以致之於是八公乃往一人能坐致風􅀨立起雲霧王試之無不効李先生傳曰先生名廣字祖和夲南陽人劉備遣軍欲取先生先生起霧半天備􅀐自相殺先生因此乃入呉冝都山川記曰郡西北三十里有丹山天晴山嶺忽有霧起迴轉如煙不過再朝􅀨必降王烈之安成記曰縣人有謝􅅒者行田歸路中忽遇雲霧霧中有一人乗􅀛而行􅅒知神人拜請求隨去父曰汝無仙骨不得去也湘州記曰曲江縣有銀}
  - {type: page-break, offset: 1958, content: '', id: KR3k0012_SBCK_015-8a}
  - {type: variant, offset: 1958, length: 0, content: '', WYG: 道術士必卑辭厚幣以致之於是八公乃往一人能坐致風兩立起雲霧王試之無不效李先生傳曰先生名廣字祖和本南陽人先主遣軍欲取先生先生起霧半天騎自相殺先主因此乃入呉宜都山川記曰郡西北三十里有丹山天晴山嶺忽有霧起廻轉如烟不過再朝雨乃降王烈之安城記曰縣人有謝廪者行田歸路中忽遇雲霧霧中有一人乗龜而行廪知為神人拜請隨去此人曰汝無仙骨不得去也湘州記曰曲江縣有銀}
