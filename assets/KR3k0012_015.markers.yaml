  - {type: variant, offset: 1950, length: 0, content: '', SBCK: 朔乗雲飛去仰望天霧覆之不知所在劉向列女傳曰陶荅子妻者陶大夫荅子之妻也荅子仕陶三年名譽不興家冨三倍其妻數諌曰夫子能薄而官大是謂嬰害無功而家昌是謂積殃昔楚令尹子文之仕家貧而國冨福結於子孫名垂於後代今夫子貪冨務大不顧後害妾聞南山}
