  - {type: variant, offset: 2549, length: 653, content: 曰玉氣如白虹天也又曰清明後十日虹始見爾雅曰螮蝀虹也蜺為挈貳易通卦驗曰虹不時見女謁亂公虹者陰陽交接之氣陽唱陰和之象今失節不見似君心在房內不修外事廢禮失義夫人淫恣而不敢制故曰女謁亂公詩含神霧曰瑤光如蜺貫月感女樞生顓頊尚書考靈曜注曰日傍白者為虹日旁青赤者為霓春秋演孔圖曰霓者斗之亂精也斗失度則投霓見宋均注曰投應也春秋元命苞曰陰陽交為虹蜺春秋運斗樞曰樞星散為虹蜺蔡邕月令章句曰虹螮蝀也陰陽交接之氣著於形色者也雄曰虹雌曰霓虹常依陰雲晝見於日衝無雲不見大陰亦不見蜺常依蒙濁見日旁白而直曰白虹凡日旁者四時常有之唯雄虹起季春見至孟冬乃藏史記曰荊軻慕燕丹之義白虹貫日太子畏之如淳注曰虹臣象日君象烈士傳曰荊軻發後太子見虹貫日不徹曰吾事不成矣後聞軻死事不立曰吾知之矣漢書曰武帝遊東萊臨大海是歲虹氣蒼黃色若飛鳥集城陽宮南又曰上官桀謀廢昭帝迎立燕王是時天雨虹下屬宮中飲井井水竭又天文志曰虹霓者陰陽之精光如淳注曰雄曰虹雌曰霓張璠漢紀曰靈帝和光元年虹晝御座殿庭前色青赤上引蔡邕問之對曰虹霓小女子之祥又名臣蔡邕奏詔曰有黑氣墮溫殿東庭中如車蓋騰起奮迅五色有頭體長十余丈形似龍占者以虹蜺對虹著於天而降於庭以臣之聞則天所投虹者也吳志曰諸葛恪圍新城不剋引軍出往東興有虵見其船還拜蔣陵白虹復繞其車吳錄云恪曰虹何為此來哉果為孫峻所誅晉陽秋曰建武元年虹長彌天晉安帝紀曰義熙二年七月夜彩虹出西方蔽月前涼錄曰張駿六年有彩虹五里隆隆如鍾鼓之聲沈約宋書曰劉義慶在廣陵有疾而白虹貫城野麕入府心甚惡之因自陳求還莊子曰陽炙陰為虹文子曰天地二氣即成虹人二即生病淮南子曰, WYG: ''}
