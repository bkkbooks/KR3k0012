  - {type: variant, offset: 1860, length: 1, content: 監, WYG: 之氣象樓臺宫闕都邑氣象林木家語曰食氣者神眀而夀洽書曰有氣象人青衣無手在日西天子之氣象也遁甲開山圗曰巨靈者偏得元氣之道故以元氣一時生混沌又自老子生周清氣凌遲俗儒道士無所通驗河圗曰崑崙山有水水氣上蒸為霞地鏡圗曰望百姓家有黄氣蘖梔子樹也山有白氣而鬱鬱中有神龍三輔舊事曰漢作靈臺以四孟月登而觀黄氣為疾病赤兵黑水荆州圖曰宜都郡望周山袁山松宜都記曰鍾山山根有涌泉成溪溪水清天隂欲}
  - {type: page-break, offset: 1860, content: '', id: KR3k0012_WYG_015-8b, image: WYG0893/WYG0893-0156b.png}
  - {type: page-break, offset: 1860, content: '', id: KR3k0012_WYG_015-9a, image: WYG0893/WYG0893-0156c.png}
  - {type: variant, offset: 1862, length: 1, content: 雹, SBCK: 輒有赤氣故名丹溪論衡曰陳留虞延字君人夜生母見其上氣如一疋絹徑上天以問人人曰吉氣與天通後仕至司徒楚辭曰飡六氣而飲沆􅒭􅀆漱正陽而含朝霞王逸日飡吞日精食元符也陵陽子明經曰春食朝霞朝霞者日始出赤氣也秋食淪漢淪漢者日没後赤黄氣也冬食沆瀣沆瀣者北方夜半氣也夏食正陽正陽者南方日中氣也又天問曰伯強安處惠氣安在注曰伯強是}
  - {type: variant, offset: 1862, length: 1, content: 雹, WYG: 輙有赤氣故名曰丹溪論衡曰陳留虞延字君人夜生母見其氣如一疋絹徑上天以問人人曰吉氣與天通後位至司徒楚辭曰飡六氣而飲沆瀣兮潄正陽而含朝霞王逸曰飡吞也吞日精氣也凌陽子曰春日朝霞朝霞者日始出赤氣也秋日淪漢瀹漢者日沒後赤黄氣也冬日沆瀣沆瀣者北方半夜氣也夏飡正陽正陽者南方日中氣也又天問曰伯强安處惠氣安在注曰伯強是}
