  - {type: variant, offset: 3292, length: 303, content: 征西夷怨南面而征北狄怨民之望湯也若大旱之望雲霓戰國策曰唐睢謂秦王曰聶政刺韓相白虹貫日搜神記曰孔子修春秋制孝經既備齋戒向北斗星而拜告備于天乃有赤氣如虹自上而下化為玉璜上有刻文孔子跪而授之又曰廬陵巴丘民陳濟者作州吏其婦姓秦獨在家忽疾病恍惚發狂後漸差常有一丈夫長大儀貌端正著絳碧袍采色炫燿來從之常相期於一山澗至於寢處不覺有人道感接忽忽如眠耳如是積年春每往期會不復畏難比鄰人觀其所至輒有虹見秦云至水側丈夫金瓶引水共飲後遂有娠生兒如人多肉不覺有手足濟尋假還秦懼見之乃內兒著瓮中因見此丈夫以金瓮與之令覆兒濟時醉眠在牗下聞人與秦語語聲至愴濟亦不疑也又丈夫語秦云兒小未可得將去不須作衣我自衣之即以絳囊與裹之令可時出與乳于時, SBCK: ''}
