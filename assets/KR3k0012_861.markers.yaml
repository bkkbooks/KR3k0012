  - {type: variant, offset: 21, length: 0, content: '', SBCK: 梟羮以賜百官也又曰項王爲髙祖置太公於机上告漢王曰吾與羽俱北面受命懷王約爲弟兄吾翁即􅀂翁必欲烹而翁幸分我一杯羮又曰髙祖少時與賔客過丘嫂食嫂厭叔與客來佯爲羮盡櫟釡邊客以故去已而視釡中尚有羮由此怨其嫂封其子頡羹侯戰國䇿曰樂羊爲魏將而攻中山其子在中山中山君烹其子而遺}
  - {type: variant, offset: 21, length: 0, content: '', WYG: 梟羮以賜百官也又曰項王為高俎置太公於机上告漢王漢王曰吾與羽俱北面受命懐王約為兄弟吾翁即若翁必欲烹而翁幸分我一杯羮髙祖少時與賔客過嫂嫂厭叔與客來佯為羮盡瀝釡客以故去已而視釡中尚有羮由此怨其嫂封其子戞羮侯戰國䇿曰樂羊為魏將而攻中山其子在中山中山君烹其子而遺}
