  - {type: variant, offset: 1256, length: 609, content: 餅即還然竊之楚四境之田蕪廣不可勝闢見宋鄭之門邑則還然竊之與彼異乎抱朴子曰莽之世賣餅小人皆得等級斗筲之徒兼金累紫揚子雲確然忠貞之節形矣三輔舊事曰太上皇不樂關中高祖徙豐沛屠兒沽酒賣餅商人立為新豐縣故一縣多小人李固別傳曰質帝暴得疾云食煮餅腹中悶遂崩蔡質漢官儀曰尚書郎直太官供餅餌五熟玄晏春秋曰衛倫過予而讌論及於味倫稱侍中劉子楊食餅知鹽生精味之至也予曰昔師曠識勞薪易牙別淄澠子楊之妙抑末乎倫曰晉曠齊牙古之精也魏之子楊今之妙也子何間焉語林曰何平叔面絕白魏文帝疑其著粉正夏月喚來與熱湯餅大汗出隨以朱衣自拭色轉皎然幽明錄曰姚泓叔父大將軍紹揔司戎政召胡僧問以休咎僧乃以麵為大胡餅形徑一丈僧坐其上先食正西次食正北次食正南所餘卷而吞之訖便起去了無所言是歲五月楊盛大破姚軍於清水九月晉師北討掃定熲洛明年遂席卷酆鎬生禽泓焉葛洪神仙傳曰壺公者從遠方來賣藥常懸一壺干坐上每日入後跳入壺中市掾費長房於樓上見之知非常也身為掃除并進餅公令長房共跳入壺但見樓觀五色重門閣道侍者數十人京兆舊事曰蕭彪為巴郡守父老歸供養父嗜餅從至市立車下自進之廷尉決事曰廷尉上士張柱私賣餅為蘭臺令史所見方言曰餅謂之飩徒昆切或謂之餦音張或謂之餛音混說文曰餅麵餈也雜五行書曰十月亥日食餅令人無病食經有髓餅法以髓脂合和麵崔寔四民月令曰五月距立秋無食煮餅及水溲餅夏月飲水時此二餅得水即冷堅不消不幸便為食作傷寒矣以餅置水中則滲唯酒溲之入則闌也王郎上劉纂等樗蒲曰左中郎樂林得纂麵肉共啖湯䴵, WYG: 醴梅相待}
