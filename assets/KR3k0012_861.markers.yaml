  - {type: variant, offset: 3011, length: 410, content: 而已後年貧人來歸者千餘戶又曰賀玄字文弘為九江太守行縣齎持乾糒但就溫湯而已謝承後漢書曰沈景為河間相恒食乾糒後漢書曰趙孝兄禮為餓賊所得孝聞之即自縛詣賊曰禮久餓羸瘦不如孝肥飽賊大驚並放之謂曰可且歸更持米糒來孝求不能得復往報賊願就烹眾異之遂不害鄉黨服其義魏略曰寒貧者本姓石後還長安車騎將軍郭淮以意氣呼之問其所欲亦不肯言淮因與脯糒及衣財取脯一朐糒一升而止唐書曰黃巢將逼三輔僖宗出幸途無供頓衛軍不得食張濬謂漢陰令李康曰公可為糗餌以供行在康乃鳩集騾乘分道進饔糗列女傳曰勾踐伐吳有獻一囊糒者王以賜軍士甘不踰嗌而戰自十倍孟子曰舜之飯糗茹草也若將終身焉玄晏春秋曰衛倫過予而讌論及於味命僕取糗以進予予嘗之曰吾知之矣麥其主者也有李柰杏味三果不同予焉得兼之倫曰吾之將來家實多故杏時將發故糅之以杏汁李柰時發又糅之以李柰汁故有三果之味也物理論曰呂子義清賢之士也思之宜往存省懷乾糒而往主人盛為饌食乃出懷中糒求冷水一杯而食之楚辭九章曰播江離與滋菊兮願春日, WYG: ''}
  - {type: variant, offset: 3011, length: 8, content: 而已後年貧人來歸, krp: 醬醴涼醷馳入于酒府醴}
