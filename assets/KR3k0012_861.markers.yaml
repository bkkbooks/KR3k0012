  - {type: variant, offset: 1147, length: 2, content: 間唐, WYG: 葱薑調以五味貯以盆器置之盤中羮中有觜銀杓可受一升即揖讓多自主人先舉即滿斟一杓内觜入鼻仰首徐傾之飲盡傳杓如酒廵行之喫羮了然後續以諸饌謂之不録㑹亦呼為先腦也交趾之人或經營事務彌縫權要但備此㑹無不諧者張翰豆羮賦曰乃有孟秋嘉菽垂枝挺莢是刈是穫充簞盈篋香鑠和羮同疾赴急桓驎七説曰河黿之羮齊以蘭梅芬芬甘㫖未咽先滋衛洪七開曰馨羮芬臛凝色生華皇象}
