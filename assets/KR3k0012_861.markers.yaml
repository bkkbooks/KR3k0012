  - {type: variant, offset: 3763, length: 0, content: '', SBCK: 見韲則吹之又招䰟曰和酸􅀂苦陳呉羮呉人攻作又大招曰鮮甘雞和楚酪酪昨胾也言取生丈鼈烹之羮調賂宻復有肥雞􅁏和以酢酪其味清也又曰内鶬鴿鵠味豺羮鶬鶬鴿鶴似鳩而青鵠黄鵠也􅉘以豺言畢夫巧於調和先甘酸鶬鵠肉故羮羙也唐明皇雜録曰李林甫子鄭平爲户部貟外甞與林甫同處一日林甫就院省其女遇平櫛髪見林甫至處遽欲退蔵林甫固邀之見其􅁂髪皆白謂平曰上當賜甘露羮郎其食之縱當華皓必當鬒黒明日果有中使至賜林甫食中有甘露羮遂以與平平食訖一旦髪毛如䃜嶺表異録曰交阯之人重不禄羮羮以羊鹿鷄猪􅁏和骨同一釡煑之令極肥濃漉去􅁏進之葱薑調以五味貯以盆器置之盤中羮中有觜銀銀杓可受一􅂛即更相揖讓多自主人先舉即滿斟一杓内觜入􅈹仰首徐傾之飲盡傳杓如酒廵行之喫羮了然續以諸饌謂之不録㑹亦呼爲先腦也交阯人或經營事務弥􅂊縫推要但備此㑹無不諧者安南録異圖鑿穿心飛頭鼻飲者皆遺風也張翰豆羮賦曰}
