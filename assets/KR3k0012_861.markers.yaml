  - {type: variant, offset: 2933, length: 4, content: 李陵擊匈, WYG: 奉尊柘漿折朝醒取甘柘汁以為飲也可解酒病酒亦柘漿可以觧朝醒也吴書曰袁術去壽春時方盛夏欲得蜜漿又無蜜遂嘔血死後魏書曰游明根㓜年遭亂為櫟陽王氏}
  - {type: variant, offset: 2933, length: 23, content: 李陵擊匈奴兵敗令軍士人持二升糒一片冰相待東觀漢, krp: 虞悰家冨於財而善爲滋味豫章王嶷盛饌享賔謂悰曰肴羞有所遺否悰曰何曽食䟽有黄頷臛恨無之廣志曰晨鳬肥而耐寒冝爲臛劉欣期交州}
  - {type: substitution, offset: 2936, original: 匈, replacement: 胸, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-3879}}
