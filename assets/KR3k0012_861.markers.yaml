  - {type: variant, offset: 1151, length: 104, content: 僧萬廻閿鄉人也恢諧以狂發言屢中其兄戍邊五載母思之萬廻年幼請詣兄所策竹馬去經歸而返白母曰兄還矣請辦餅更往迎之數日持襆而至母發襆乃戍子衣也尋而子至母大驚范子曰餅出三輔墨子曰魯陽文君云有人於此牧羊芻豢不可勝食也見人, WYG: 想必醉令}
