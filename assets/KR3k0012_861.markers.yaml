  - {type: variant, offset: 2975, length: 11, content: 隗囂且病餓出城飡糗糒腹, WYG: 可飲此墜者飲之氣力十倍歸問}
  - {type: variant, offset: 2975, length: 16, content: 隗囂且病餓出城飡糗糒腹張悉憤而死, krp: 醬四曰也清謂醴之折者也醷内則所謂或以配爲醴者酉凢醴濁釀馳爲之則少清矣醴者馳粥清}
