  body:
  - {type: variant, offset: 4, length: 2, content: 八餅, SBCK: 九羮臛飲漿羮周禮天官亨人曰􅀕祀共大羮鉶羮賔客亦如之大羮􅁏湆者鄭司農云大羹不致五味也鉶羮加塩菜也涪音泣禮曰食居人之左羮居人之右母嚃羮亦嫌欲疾遲不爵菜也音勑荅切母絮羮爲其詳於味絮猶調也絮勑慮切客絮羮主人辭不能烹羮之有菜者用梜無菜者不用梜又曰雉羮雞羮兎羮芼羮食自諸侯巳下至於庶人無等羮食之主又曰子夘稷食菜羮忌日貶也夫人與君同庖不時殺也又曰不能粥食粥羮之以菜可也謂性不能者可食飯菜羮又曰大饗之禮尚玄酒而俎腥魚大羮不和有遺味者矣左傳曰頴考叔有獻於鄭莊公公賜之食食而捨􅁏公問其故對曰小人有母皆甞小人之食矣未甞君之羮請以遺之􅁏有汁曰羮又曰臧哀伯諌曰大羮不致大羮􅁏汁也不致五味礼不忌夲也又曰鄭侯伐宋將戰華元殺羊食士其御羊斟不與及鄭師與宋師戰曰疇昔之羊子爲政疇昔猶前日也今日之事我爲政與入鄭師故敗君子謂羊斟非人也以其􅀻憾敗國殄民憾恨也殄盡也於是刑孰大焉詩所謂人之無良者詩義取不良之人相怨以亡其羊斟之謂乎又曰楚獻黿於鄭靈公宋子公與子家將見宋子公也子家婦人子公之食􅃌動第二􅃌也以示子家曰他日我如此必甞異味及入宰夫將解黿相視而􅀏公問之問所􅀏子家以告及食大夫黿召子公而弗與也欲使指動無効也子公怒染指於鼎甞之而去又曰叔鮒永貨於衛淫蒭蕘者衛人使屠伯饋叔向羮與一篋錦叔向受羮反錦又曰和如羮焉水火醯醢塩梅以烹魚􅁏燀之以薪燀也宰夫和之齊之以味濟其不及以泄其過君子食之以平其心君臣亦然以水濟水誰能食之書曰􅀂作和羮尓唯塩梅塩鹹梅鮓羹湏鹹鮓以和之詩義䟽曰鴞􅁏甚羙可以爲羮臛語曰雖􅂼食菜羹􅀲􅀕必齊如也爾雅曰􅁏謂之羮郭􅒄注日􅁏臛也舊􅀃􅁏有汁日羮孫氏以爲􅁏作羮之物因以名云廣雅曰羮謂之湆􅀃文曰羮五味和粥也}
