  - {type: variant, offset: 3965, length: 0, content: '', SBCK: 犒從者使某攝飲子重曰夫子甞與吾言於楚必是故也不亦識乎知其以徃言好腵故致飲受而飲之免使者而復鼔免脫也又曰鄭師}
