  - {type: variant, offset: 3061, length: 2, content: 乾糒, SBCK: 彦節歠羮冩胷中手振不自禁齊書曰髙祖旣爲齊王置酒爲樂羮膾旣至崔祖思曰此味故爲南北所推侍中沈文季曰羮膾呉食非祖思所解祖思曰炰鼈鱠鯉似非勾呉之詩文季曰千里蓴羮豈􅀜魯衛之􅀃帝甚恱曰蓴羹故應還沈又曰朱緒無行母病積年忽思菰羮緒妻到市買菰爲羮欲奉母緒曰病復安能食先甞之遂併食盡母怒曰我病欲此羮汝何必併啖盡天􅀂有知當令汝哽怨緒聞心中介介然即吐血明日而死梁書曰蕭勵爲廣州刺史徴爲太子左衛率勵性率儉而器度寛􅁉左右甞將羮正胷前翻之顔色不異徐呼更衣}
