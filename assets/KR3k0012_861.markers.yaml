  - {type: variant, offset: 1565, length: 725, content: 起去了無所言是歲五月楊盛大破姚軍於清水九月晉師北討掃定熲洛明年遂席卷酆鎬生禽泓焉葛洪神仙傳曰壺公者從遠方來賣藥常懸一壺干坐上每日入後跳入壺中市掾費長房於樓上見之知非常也身為掃除并進餅公令長房共跳入壺但見樓觀五色重門閣道侍者數十人京兆舊事曰蕭彪為巴郡守父老歸供養父嗜餅從至市立車下自進之廷尉決事曰廷尉上士張柱私賣餅為蘭臺令史所見方言曰餅謂之飩徒昆切或謂之餦音張或謂之餛音混說文曰餅麵餈也雜五行書曰十月亥日食餅令人無病食經有髓餅法以髓脂合和麵崔寔四民月令曰五月距立秋無食煮餅及水溲餅夏月飲水時此二餅得水即冷堅不消不幸便為食作傷寒矣以餅置水中則滲唯酒溲之入則闌也王郎上劉纂等樗蒲曰左中郎樂林得纂麵肉共啖湯䴵繆襲祭儀曰夏祀以蒸餅盧諶祭法曰四時祠用曼頭餲餅體牢九夏祠別用乳餅冬祠用白環餅荀氏四時列饌注曰夏祠以薄液代曼頭徐暢祭記曰舊五月麥熟薦新麥作起漱白餅明皇雜錄曰武惠妃生日上與諸公主按舞於萬歲樓下上乘步輦從複道窺見衛士食畢以餅餌棄水竇中上大怒命高力士杖殺之上方震怒左右莫敢言者寧王從容謂上曰從複道窺見獲衛士之過而殺之恐人臣不能自安又失大體陛下志在勤儉愛物惡棄於地柰何性命至重重於殘飧者乎上蹶然大悟遽命赦之荊楚歲時記曰六月伏日並作湯餅名為辟惡時鏡新書曰四月八日長沙市肆之人無子者供寺閣下羊肉薄餅結願以乞兒往往有驗束晳餅賦曰禮仲春之月天子食麥而朝事之籩煮麥為麵內則諸饌不說餅然則雖云食麥而未有䴵䴵之作也其來近矣若夫安乾粔籹之倫糺耳狗后之屬釰帶案成餢飳髓燭或名生於里巷或法出乎殊俗三春之初陰陽交際寒氣既消溫不至熱于時享宴則曼頭宜設吳回司方純陽布暢服飾飲冰隨陰而涼此時為餅莫若薄壯商風既厲太火西移鳥獸氄毛樹木䟽枝肴饌尚溫則起溲可施玄冬猛寒清晨之會涕凍鼻中霜成口外充虛, SBCK: 諷吏}
