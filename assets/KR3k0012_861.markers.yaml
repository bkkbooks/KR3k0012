  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_861-2a}
  - {type: variant, offset: 4, length: 2, content: 八餅, WYG: 九羮臛飲漿羮周禮天官亨人曰祭祀共大羮鉶羮賔客亦如之禮曰食居人之左羮居人之右毋嚃羮毋絮羮客絮羮主人辭不能烹羮之有菜者用梜無菜者不用梜又曰雉羮雞羮兎羮芼羮食自諸侯已下至於庶人無等又曰子夘稷食菜羮忌日貶也夫人與君同庖不特殺也又曰不能食粥羮之以菜可也又曰大饗之禮尚𤣥酒而爼腥魚大羮不和有遺味者矣左傳曰潁考叔有獻於鄭公公賜之食食而捨肉公問其故對曰小人有母嘗小人之食矣未嘗君之羮請以遺之又曰臧哀伯諫曰大羮不致又曰鄭伐宋将戰華元殺羊食士其御羊斟不與及鄭師斟曰疇昔之羊子為政今日之事我為政輿入鄭師故敗君子謂羊斟非人也以其私憾敗國殄民於是刑孰大焉詩所謂人之無良者其羊斟之謂乎又曰楚獻黿於鄭靈公宋與子家将見宋子公也子家歸生子公之食指動以示子家曰他日我如此必嘗異味及入宰夫将解黿相視而笑公問之子家以告公食大夫黿召子公而弗與也子公怒染指於鼎嘗之而出又曰叔鮒求貨於衛滛芻蕘者衛人使屠伯饋叔向羮與一篋錦叔向受羮反錦又曰和如羮焉水火醯醢鹽梅以烹魚肉燀之以薪宰夫和之齊之以味濟其不及以泄其過君子食之以平其心君臣亦然以水濟水誰能食之書曰若作和羮爾唯鹽梅詩義䟽曰鴞肉甚美可以為羮臛語曰雖䟽食菜羮𤓰祭必齊如也爾雅曰肉謂之羮廣雅曰羮謂之湆說文曰羮五味和粥也}
