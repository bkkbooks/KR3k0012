  - {type: variant, offset: 22, length: 0, content: '', SBCK: 羮樂羊啜之盡一杯文侯謂禇師賛曰樂羊以我故食其子􅁏對曰其子食之其誰不食羊下中山文侯賞其功而疑其心又曰中山君饗}
