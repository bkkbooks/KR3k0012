  - {type: variant, offset: 3966, length: 0, content: '', SBCK: 陳子展執縶而見見陳侯再拜稽首承飲而進獻承飲奉觴示不失臣敬子羙入數俘而岀子羙子産也但數其所􅀗人數不將以歸也又曰呉入楚申包胥乞師於􅁗立依於庭牆而哭日夜不絶聲勺飲不入口七日論語曰一簞食一瓢飲穆天子傳曰天子渴于中求飲未至七萃之士曰髙奔戎割其左􅆖之頸取其清血以飲天子今西方之羌故刺馬咽取血飲之瘡示尋愈也天子羙之賜佩玉一􅃗神仙傳曰蔡經尸解去十餘年忽還家言七月七日王君當來過到其日可多作數百斛飲以供從官乃去到期假借甕器作飲數百斛羅列覆置庭中其日方平果來語林曰陸士衡在洛夏月忽思竹篠飲語劉實云吾郷曲之思轉􅀷今來東歸恐無復相見理言此巳復之生感漿詩曰或以其酒不以其漿或醉其酒者或不得漿者禮記曲禮曰酒漿處右又檀弓曰曽子謂子思曰伋吾執親之䘮也水漿不入於口者七日又内則曰漿酢胾也水清意梅新酉漿濫以諸和水也以周禮六飲校之則濫凉也紀莒之問名諸爲濫漢釋名曰桃濫水也水清而藏之其味濫濫然酢也史記曰漿千儋儋甖此亦比千乗之家又曰薛公藏於賣漿家漢書郊祀歌曰奉尊柘漿折朝醒應劭日取甘柘汁以爲飲也折解醒病酒言拓漿可以解朝醒也呉書曰􅀽術去壽春時方盛夏欲得􅁡漿又無􅁡遂歐血死後魏書曰游明根㓜年遭亂爲櫟陽王氏奴主使牧羊明根以漿倩人書字路邊書地學之又曰咸陽王禧謀逆􅀍禽送華林都亭着千斤錢格鏁格羽林掌衛之時􅀬甚禧渴悶垂死勑斷水漿侍中崔光令左右送酪漿􅂛餘禧一飲而盡管子曰左酒右漿蔡邕注曰事尚書左右酒近體也右漿上逺列子曰列子之齊中道而返遇伯昏瞀人瞀人曰奚方而反曰吾驚焉惡乎驚曰吾食於十漿而五漿先饋饋遺也伯昏瞀人曰􅀂是則汝何爲已驚遺汝之漿何故驚也曰夫内誠不解内無誠實外無解然形諜成光諜飾其形身之光也以外鎭人心外以諜形鎮人則其内不足也使人輕乎貴老重少輕老由乎形諜而察其所患形飾則心亂亂必患生故當察也夫漿人持爲食羮之貨多餘之嬴漿人之饋我者非貴我嬴也盖貨我以自􅄹耳其爲利也薄其爲權也輕而猶􅀂是食羮之利薄所利之􅁠輕相猶謀我况有國者効我以功事乎故我道中而反而况万乗之主身勞於國而智盡乎事彼將我任以事而効我以功吾是以驚也孟子曰書曰徯我后后來無罰其君子實玄黄于篚以迎其君子其小人簞食壷漿以迎其小人􅀽子正書曰歳在申酉乞漿得酒歳在辰巳嫁妻賣子頋子曰非其道壷漿不可受是其道雖天下不可讓山海經曰髙前之山上有水焉甚寒而清帝臺之漿也飲者不心痛漢武故事曰西王母曰太上之藥有玉津金漿其次藥有五雲之漿神異經曰東南有人名黄父以霧露爲漿廣志曰醶䣼漿也醶􅀄檻切穆天子傳曰盛􅁎病求飲天子命取漿而給得之速是日壷輲壷器名輲速也音遄焦贛易林曰登上橋堂飲萬歳漿華山記曰華山上有明星玉女持玉漿孝子傳曰洛陽陽公輦義漿以給過客世􅀃曰嵩山北有大穴晉􅀄有一人誤墮穴中縁行十許日有草屋區中有二人對坐圍碁局下有一杯白飲墮者告以飢渴碁者曰可飲此墜者飲之氣力十倍歸問張華華曰所飲者玉漿典術曰餌桃膠五十日後飲玉漿楚辭九歌曰奠桂酒兮椒漿以椒置漿中也援北斗兮酌桂漿也西京􅄂記枚乗栁賦曰樽􅄹縹玉之酒爵獻金漿之醪梁人作諸柘酒名日金漿張衡思玄賦曰斟白水以爲漿太平御覽卷第八百六十一}
