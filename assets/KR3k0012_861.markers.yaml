  - {type: variant, offset: 2291, length: 756, content: 戰湯餅為最爾乃重羅之麮丘與切塵飛雪白膠黏䵑䈥膏溔柔澤肉則羊膀豕脅脂膚相半臠若繩首珠連礫散薑株葱本莑音封縷切判剉末椒蘭是灑是畔和鹽漉豉攬合樛亂於是火盛湯涌猛氣蒸作攘衣服振掌握搦俯摶麵彌離於指端手縈回而交錯紛紛馺馺星分雹落籠無逆肉餅無流麵妹媮咧敕薄而不綻巂巂和和䑋色外見柔如春綿白若秋練氣㪍鬱以揚布香飛散而遠遍行人失涎於下風童僕空爵而斜盻擎器者砥脣立侍者千咽爾乃換增濯以玄醢鈔以象著曳要虎丈叩膝遍據槃案財投而輒盡庖人參潭而促遽手未及換增禮復至脣齒既調口習咽利三籠之後轉更有次庾闡惡餅賦序曰范子常者造余宿曤鷄為餅遟御之情甚虛奇嘉之味不實聊作惡餅賦以釋之弘君舉倉檄曰催廚人作茶䴵熬油煎葱例茶以絹當用輕羽拂取飛麵剛軟中適然後水引細如委綖白如秋練羹杯半在財得一咽十杯之後顏解體潤梁吳均餅說曰宋公至長安得姚泓時故太官承程季者了了人也公曰今日之食何者最先季曰仲秋御景離蟬欲靜變變曉風淒淒夜冷臣當此時唯能說䴵公曰善季乃稱曰安定噎鳩之麥雒陽董德之磨河東長若之葱隴西舐背之牘枹音夫罕赤恥之羊張掖北門之豉燃以銀屑煎以銀銚洞庭負霜之橘仇池車帶之椒調以濟北之鹽剉以新豊之雞細如華山玉屑白如梁甫銀渥既聞香而口悶亦見色而心迷公曰善糗糒書曰峙乃糗糧亡敢弗逐峙具糗熬稻也儀禮曰四籩棗糗粟脯左傳曰陳轅頗賦封田以嫁公女以為己大器公逐之出奔鄭道渴其族轅咺進稻醴梁糗腵脯焉曰何其給也曰器成而具公羊曰公出奔齊國子執壺漿曰敢致糗從者公稽首以衽受說文曰糒平祕切乾食也糗熬米也久切釋名曰糗齲也飯而磨散之使齲碎也餱侯也候人飢者以飡之漢書曰李陵擊匈奴兵敗令軍士人持二升糒一片冰相待東觀漢記曰嚴尤擊江賊世祖奉糗一斛脯三十朐又曰隗囂且病餓出城飡糗糒腹張悉憤而死也又曰張禹巡行守舍止大樹下食糒乾飯屑飲水而已後年貧人來歸者千餘戶又曰賀玄字文弘為九江太守行縣齎持乾糒但就溫湯而已, SBCK: 遺}
