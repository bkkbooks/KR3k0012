  - {type: variant, offset: 2246, length: 214, content: 壯商風既厲太火西移鳥獸氄毛樹木䟽枝肴饌尚溫則起溲可施玄冬猛寒清晨之會涕凍鼻中霜成口外充虛解戰湯餅為最爾乃重羅之麮丘與切塵飛雪白膠黏䵑䈥膏溔柔澤肉則羊膀豕脅脂膚相半臠若繩首珠連礫散薑株葱本莑音封縷切判剉末椒蘭是灑是畔和鹽漉豉攬合樛亂於是火盛湯涌猛氣蒸作攘衣服振掌握搦俯摶麵彌離於指端手縈回而交錯紛紛馺馺星分雹落籠無逆肉餅無流麵妹媮咧敕薄而不綻巂巂和和䑋色外見柔如春綿白若秋練氣㪍鬱以揚布香飛散而遠遍行人失涎於下風童僕空爵而斜盻擎器, WYG: ''}
