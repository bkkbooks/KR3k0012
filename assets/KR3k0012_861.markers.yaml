  - {type: variant, offset: 1135, length: 1, content: 遁, WYG: 嘗向杓中煮故云鹽不足如此數益升許鹽故不鹹因以為食經曰有猪蹄酸羮法胡羮法雞羮法蔗笴鴨羮法楚辭天問曰縁鵠飾玉后帝是饗伊尹烹鵠羮以事湯彭鏗斟雉帝何饗受壽永多夫何長言彭祖進雉羮於堯堯饗之以受壽之也又九章曰懲於羮者而吹韲言人有猷而熱中艾之見韲則吹之九招曰酸若苦陳吴羮又大招曰解螭甘鷄和楚酪言取生大鱉烹之羮調酪宻復有肥鷄肉和以酢酪其味清也又曰内鶬鴿鵠味豺羮鶬鵠肉於調和先甘酸畢夫巧故羮味美也唐明皇雜録曰李林甫子壻鄭平為户部員外嘗與林甫同處一日林甫就院省其女遇平方櫛髪謂平曰上明日當賜甘露羮鄭郎食此縱當華皓必轉髮黒明日果有中使至賜林甫食中有甘露羮遂以與平平食訖一旦髪毛如漆嶺表異録曰交趾之人重不録羮羮以羊鹿雞猪肉和骨同一釡煮之令極肥濃漉}
