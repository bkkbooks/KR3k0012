  - {type: variant, offset: 3883, length: 2, content: 朝事, SBCK: 飲用六清六清水漿醴䣼􅬙酏也􅬙於羙切酏以支切又食醫曰飲齊眡冬時飲冝寒也又酒正曰酒正辨四飲}
  - {type: variant, offset: 3886, length: 1, content: 籩, SBCK: 物一曰清二曰醷三曰醬四曰也清謂醴之折者也醷内則所謂或以配爲醴者酉凢醴濁釀馳爲之則少清矣醴者馳粥清也又曰漿人掌共王之六飲水醬醴涼醷馳入于酒府醴者清也}
