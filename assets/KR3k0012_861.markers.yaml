  - {type: variant, offset: 2938, length: 2, content: 兵敗, WYG: 主使牧羊明根以漿倩人書字路邊畫地學之又曰咸陽王禧謀逆被擒送華林都亭着千斤鏁格鏁格羽林掌衛之時熱甚禧渇悶垂死勑㫁水漿侍中崔光}
  - {type: page-break, offset: 2938, content: '', id: KR3k0012_WYG_861-16a, image: WYG0900/WYG0900-0541c.png}
  - {type: punctuation, offset: 2940, content: ，, id: KR3k0012_CHANT_861-bkkpn944}
  - {type: 'tls:seg', offset: 2940, content: '', id: KR3k0012_CHANT_861-37a.13}
  - {type: variant, offset: 2941, length: 2, content: 軍士, WYG: 左右送酪漿升餘禧一飲而盡管子曰左酒右漿左酒近體也右漿上逺也列子曰列子之齊中道而返遇伯昬瞀}
  - {type: variant, offset: 2944, length: 9, content: 持二升糒一片冰相待, WYG: 瞀人曰奚方而反曰吾驚焉惡乎驚曰吾食於十漿而五漿先饋伯昏瞀人曰若是則汝何為已驚遺汝之漿何故驚也曰夫内誠不觧内無誠實外無觧然形諜成光諜飾其形身之光也以外鎮人心外以諜形鎮人則其内不足也使人輕乎貴老重少輕老由於形諜而察其所患形飾則心煩亂必患生故當察也夫漿人特為食羮之貨無多餘之贏漿人之饋我者非貴我贏也盖貨我以自盈耳其為利也薄其為權也輕而猶若是而况萬乗之主身勞於國而智盡乎事彼任我以事而効我以功吾是以驚也孟子曰書曰徯我后后來無罰其君子實𤣥黄于篚以迎其君子其小人簞食壺漿以迎其小人袁子正書曰歳在申酉乞漿得酒歲在辰巳嫁妻賣子顧子曰非其道壼漿不可受是其道雖天下不可讓山海經曰髙前之山上有水焉甚寒而清帝王之漿也飲者不心痛漢武故事曰西王母曰太上之藥有玉津金漿其次藥有五雲之漿神異經曰}
