  - {type: variant, offset: 3272, length: 615, content: 若將終身焉玄晏春秋曰衛倫過予而讌論及於味命僕取糗以進予予嘗之曰吾知之矣麥其主者也有李柰杏味三果不同予焉得兼之倫曰吾之將來家實多故杏時將發故糅之以杏汁李柰時發又糅之以李柰汁故有三果之味也物理論曰呂子義清賢之士也思之宜往存省懷乾糒而往主人盛為饌食乃出懷中糒求冷水一杯而食之楚辭九章曰播江離與滋菊兮願春日以為糗芳崔寔四民月令曰四月可作棗糒餌粢周禮曰羞籩之實糗餌粉粢鄭玄曰二物皆粉稻米黍米所為也合蒸曰餌餅之曰餌糗者擣粉熬文豆為餌餈之粘著以粉之也餌言糗餈言粉牙相明也廣雅曰鐸餈餌也方言曰餌謂之餻音恙或謂之粢或謂之𩚹音鈴或謂之餣烏業切或謂之餣音原說文曰餌粉餅也餈稻餅也釋名曰餌而也相黏而也兗豫曰溏浹或作洟就形之名也餈漬也蒸糝屑使相潤漬餅之也韻集曰糖䬾餌也東觀漢記曰樊畢字仲華世祖嘗於新野坐文書見拘時畢為市吏餽餌一笥上德之建武初拜河東都尉引見雲臺上啁畢曰一笥餌得都尉何如風俗通曰汝陽彭氏墓近大道有一石人田家老母到市買數片餌以歸過蔭墓樹下以餌著石人頭忽去而忘之行道人見餌怪問之或人調云此石人有神能治病病愈者以餌來謝之轉以相語云頭痛者磨石人頭腹痛者磨石人腹遂千里來就號曰賢君如此數年前餌母聞之為人說之乃無復往者梁書曰朱異好飲食極滋味聲色之娛子鵝炰鰌不輟於口雖朝謁從車中必齎飴餌粔籹通俗文曰于䋫者謂之粔籹雜字解詁曰粔籹膏環也異苑曰張驥永初中於都喪亡司馬茂之往哭見驥憑几而坐以著刺粔籹食之楚辭招魂曰粔籹蜜餌言以蜜和米麵熬作粔籹擣黍作餌寒具周禮曰朝事之籩, krp: ''}
