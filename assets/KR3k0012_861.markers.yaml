  - {type: variant, offset: 3622, length: 344, content: 笥上德之建武初拜河東都尉引見雲臺上啁畢曰一笥餌得都尉何如風俗通曰汝陽彭氏墓近大道有一石人田家老母到市買數片餌以歸過蔭墓樹下以餌著石人頭忽去而忘之行道人見餌怪問之或人調云此石人有神能治病病愈者以餌來謝之轉以相語云頭痛者磨石人頭腹痛者磨石人腹遂千里來就號曰賢君如此數年前餌母聞之為人說之乃無復往者梁書曰朱異好飲食極滋味聲色之娛子鵝炰鰌不輟於口雖朝謁從車中必齎飴餌粔籹通俗文曰于䋫者謂之粔籹雜字解詁曰粔籹膏環也異苑曰張驥永初中於都喪亡司馬茂之往哭見驥憑几而坐以著刺粔籹食之楚辭招魂曰粔籹蜜餌言以蜜和米麵熬作粔籹擣黍作餌寒具周禮曰朝事之籩鄭司農云朝事謂清朝米食先寒具口實之籩通俗文曰寒具謂之餲音曷桓譚新論曰孔子疋夫耳而晫然名著至其冢墓高者牛羊鷄豚而祭之下及酒脯寒具致敬而去張逸遺令日閉口寒具不得入, WYG: ''}
