  - {type: variant, offset: 2461, length: 356, content: 砥脣立侍者千咽爾乃換增濯以玄醢鈔以象著曳要虎丈叩膝遍據槃案財投而輒盡庖人參潭而促遽手未及換增禮復至脣齒既調口習咽利三籠之後轉更有次庾闡惡餅賦序曰范子常者造余宿曤鷄為餅遟御之情甚虛奇嘉之味不實聊作惡餅賦以釋之弘君舉倉檄曰催廚人作茶䴵熬油煎葱例茶以絹當用輕羽拂取飛麵剛軟中適然後水引細如委綖白如秋練羹杯半在財得一咽十杯之後顏解體潤梁吳均餅說曰宋公至長安得姚泓時故太官承程季者了了人也公曰今日之食何者最先季曰仲秋御景離蟬欲靜變變曉風淒淒夜冷臣當此時唯能說䴵公曰善季乃稱曰安定噎鳩之麥雒陽董德之磨河東長若之葱隴西舐背之牘枹音夫罕赤恥之羊張掖北門之豉燃以銀屑煎以銀銚洞庭負霜之橘仇池車帶之椒調以濟北之鹽剉以新豊之雞細如華山玉屑白如梁甫銀渥既聞香而口悶亦見色而心迷公曰善糗糒書曰峙乃糗糧亡敢弗逐峙具糗熬稻也儀禮曰四籩棗糗粟脯, WYG: ''}
