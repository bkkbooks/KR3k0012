  - {type: variant, offset: 2958, length: 5, content: 嚴尤擊江賊, WYG: 華山上明星玉女持玉漿孝子傳曰洛陽陽公輦義漿以給過客}
  - {type: variant, offset: 2958, length: 3, content: 嚴尤擊, krp: 九真太守陶璜立郡築城於土穴中得一白色形似蚕蛹無頭長數十丈大餘圍軟軟動莫能名剖腹有肉如猪昉遂以爲臛甚香羙璜啖一杯三軍盡食齊諧記曰}
  - {type: variant, offset: 2962, length: 5, content: 賊世祖奉糗, krp: 北華本者爲人好鼈臛食經曰有芋子酢臛法楚辭招魄曰臛鼈炮羔有柘漿言以飴宻臑鱉炮羔或日臑鱉魚羔和牛五臟羔臑也鴶鵠酸鳬小臛也煎鴻鶬鴻鳴鴶鶬鵠也言復以酸將烹鵠爲羮小鳬煎熬鴻鶬令肥羙羮也露雞臛露露栖鷄也有菜曰羮無菜曰臛大龜也厲而不爽厲列也爽敗也楚人名敗日爽言乃復烹露棲之肥鷄鷄臛鱉肉其味清列而不知貶也又大招曰煎􅠧臛爵言煎鮒魚臛黄雀也崔駰博徒論曰鶩臛羊殘陳思王七啓曰臛江界之潜黿王粲七釋曰黿羮蠙臛飲周禮天官膳夫曰飲用六清六清水漿醴䣼􅬙酏也􅬙於羙切酏以支切又食醫曰飲齊眡冬時飲冝寒也又酒正曰酒正辨四飲之物}
