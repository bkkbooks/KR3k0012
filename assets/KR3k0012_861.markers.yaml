  - {type: variant, offset: 3053, length: 0, content: '', SBCK: 陸續詣詔獄其母至京師餉食續對餉泣曰續母來使者問其故荅曰續母作羮截􅁏未甞不方斷葱寸寸無不同是以知母來又曰陶碩字公超啖蕪菁羹無塩帝王丗紀曰文王長子曰伯邑考紂烹以爲羮以賜文王曰聖人不食其子羮文王得而食之紂曰誰謂西伯聖者與食其子羮而不知晉書曰桓温表王濬之孫曰濬今有三孫年出六十室如懸磬餬口江濵四節蒸甞菜羮不給宋書曰湘州刺史王僧䖍引樂頥之爲主簿以同僚非人弃官去吏部郎􅁃杲之甞徃候頥之爲設食唯枯魚菜􅉁杲之曰我不能食之母聞之自出甞膳魚羮數種杲之曰卿過於我非郭林宗又曰淳子孚有父風甞與侍中何朂共食孚羮盡朂云益殷蓴羮朂司空無忌子也孚徐輟筯曰何無忌諱又曰朱脩之爲荆州刺史姉在郷里飢寒不立脩之貴爲刺史未曽供贍徃姉家姉爲設菜羮麄飯以激之又曰毛脩之􅀍禽入魏敬事嵩山道士寇謙之謙之在魏太武帝信敬營護之故不死脩之甞爲羊羮薦魏尚書以爲絶味獻之武帝大恱以爲太官令􅀍寵遂爲尚書封南郡公太官令如故又曰宋末齊髙帝輔政劉彦節知運祚將遷宻懷異圗及}
