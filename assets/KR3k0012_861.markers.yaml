  - {type: variant, offset: 1135, length: 1, content: 遁, krp: 甞之向杓中者故云塩不足如此數益升許塩故不鹹因以爲怪食經曰有猪蹄酸羮法胡羮法雞羮法䉀笴鴨羮法楚辭天問曰縁鵠飾玉后帝食饗后帝殷湯也言伊尹始伏縁因烹鵠鳥之羮脩飾玉鼎以事以放湯賢之遂相也彭鏗斟雉堯帝饗何彭鏗彭祖也好和滋味斟羮事事堯堯而饗食之受壽永多夫何乆長言彭祖進雉羹於堯堯饗之以壽之也又九章曰懲於羮者而吹韲言人有歠而熟中懲艾之見韲則吹之又招䰟曰和酸若苦陳呉羮呉人攻作又大招曰鮮甘雞和楚酪酪昨胾也言取生丈鼈烹之羮調賂宻復有肥雞肉和以酢酪其味清也又曰内鶬鴿鵠味豺羮鶬鶬鴿鶴似鳩而青鵠黄鵠也豺以豺言畢夫巧於調和先甘酸鶬鵠肉故羮羙也唐明皇雜録曰李林甫子鄭平爲户部貟外甞與林甫同處一日林甫就院省其女遇平櫛髪見林甫至處遽欲退蔵林甫固邀之見其鬢髪皆白謂平曰上當賜甘露羮郎其食之縱當華皓必當鬒黒明日果有中使至賜林甫食中有甘露羮遂以與平平食訖一旦髪毛如䃜嶺表異録曰交阯之人重不禄羮羮以羊鹿鷄猪肉和骨同一釡煑之令極肥濃漉}
