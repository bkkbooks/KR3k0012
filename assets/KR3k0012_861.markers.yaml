  - {type: variant, offset: 190, length: 295, content: 肯出為叔節殺數頭肥牛提數十石酒作萬枚胡餅先持勞客魏志曰漢末趙歧避難逃之河間不知姓字又轉詣北海著絮巾袴常於市中販胡餅孫賓碩時年二十餘乘犢車將騎入市觀見歧疑其非常人也因問之自有餅耶歧曰販之賓碩曰買幾錢賣幾錢歧曰買三十賣亦三十賓碩曰視處士之望非買餅者殆有故乃開車後戶顧所將兩騎令下馬扶上之時歧以為是唐氏耳目也甚怖面失色賓碩閉後戶下前襜謂之曰視處士狀皃既非販餅者如今面色變動即不有重怨則當亡命我北海孫賓碩闔門百口又有百歲老母在堂勢能相度者也終不相負必語我以實歧乃具告之賓碩遂載歧以驅歸又曰嚴翰字公仲學問特善春秋公羊司隸鍾繇不好公羊而好左氏謂左氏為太官而謂公羊為賣餅家又曰盧毓為吏部尚書時舉中書郎昭曰, SBCK: ''}
