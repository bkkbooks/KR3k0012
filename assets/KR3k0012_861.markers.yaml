  - {type: variant, offset: 1880, length: 279, content: 四時祠用曼頭餲餅體牢九夏祠別用乳餅冬祠用白環餅荀氏四時列饌注曰夏祠以薄液代曼頭徐暢祭記曰舊五月麥熟薦新麥作起漱白餅明皇雜錄曰武惠妃生日上與諸公主按舞於萬歲樓下上乘步輦從複道窺見衛士食畢以餅餌棄水竇中上大怒命高力士杖殺之上方震怒左右莫敢言者寧王從容謂上曰從複道窺見獲衛士之過而殺之恐人臣不能自安又失大體陛下志在勤儉愛物惡棄於地柰何性命至重重於殘飧者乎上蹶然大悟遽命赦之荊楚歲時記曰六月伏日並作湯餅名為辟惡時鏡新書曰四月八日長沙市肆之人無子者供寺閣下羊肉薄餅結願以乞兒往往有驗束晳餅賦曰禮仲春之月天子食麥而朝事之籩煮麥為麵內則諸饌不說餅然則雖云食麥而未有䴵䴵之作, krp: 少年汁臛}
