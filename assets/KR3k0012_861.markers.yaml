  - {type: variant, offset: 3891, length: 1, content: 朝, SBCK: 涼以水酒也方謂涼今寒粥􅀂糗節雞水禮王制曰天子五飲上水醬酒醴酏上以水爲上又郊特牲曰飲養陽氣故有樂又内則曰飲曰諸飲也重醴稻醴清糟􅁰醴清糟梁醴清糟重陪也糟醇也清折也致飲有醇者有者陪設之也或以酏爲醴釀粥爲醴􅁰酏馳粥又外傳曰共王及后與世子食後所進之六飲水居其上其次曰漿三曰醴釀粥爲之浄而清四曰涼暑月以􅄂爲和水者五曰醴以乾梅乾木􅀲相和水一名濫涼六曰酏以黍爲粥之薄者左傳曰􅐫父使公下如華泉取飲鄭周父御佐車宛茷爲右載齊侯以免佐車副車又曰鄢陵之戰欒鍼見子重之旌請曰楚人謂夫旌子重之麾也彼其子重也日臣之使於楚也子重問晉國之勇臣對曰好以衆整曰又何如又問其餘臣對曰好以暇暇閑暇今兩國治戎行人不使不可謂整臨}
