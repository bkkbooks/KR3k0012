  - {type: variant, offset: 2892, length: 1, content: 糒, WYG: 呉入楚申包胥乞師於秦立依於庭墻而哭日夜不絶聲勺飲不入口七日論語曰一簞食一瓢飲穆天子𫝊曰天子渇於中求飲未至七萃之士曰髙奔戎割其左驂之頸取其清血以飲天子今西方之羗故刺鳥咽取血飲之瘡示尋愈也天子美之賜佩玉一㕠神仙傳曰蔡經尸解去十餘年忽還家言七月七日王君當來過到其日可多作數百斛飲以供從官乃去到期假借瓮器作飲數百斛羅列覆置庭中其日方}
