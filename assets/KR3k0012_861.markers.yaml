  - {type: variant, offset: 486, length: 937, content: 其人與不在盧生耳選舉莫取有名名如畫地作餅不可啖也魏略曰丁斐封列侯坐免官後太祖啁曰斐文侯印綬何在斐對曰以易餅太祖大笑晉書曰何曾性奢豪務在華侈幃帳車服窮極綺麗廚膳滋味過於王者每燕見不食太官所設帝輒命取其食蒸餅上不坼作十字不食王隱晉書曰王長文州辟別駕陽狂不詣舉州追求乃於成都市見蹲地嚙胡餅又曰王羲之幼有風操郗虞卿聞王氏諸子皆後令使選壻諸子皆飾容以待客羲之獨坦腹東床囓胡餅神色自若使具以告虞卿曰此真吾子壻也問為誰果是逸少乃妻之晉陽秋曰惠帝崩由食餅也又曰王歡躭學貧窶或人惠蒸餅一軸以充一日妻子常有菜色宋書曰王悅之為吏部郎鄰省有會同者遺悅之餅一甌辭不受曰此費誠小然少來不願當之蕭子顯齊書曰永明九年正月詔太廟四時祭薦宣皇帝麵起餅又曰何戢為司徒左長史太祖為領軍與戢來往數置歡宴上好水引餅戢令婦女躬自執事以設上焉梁書曰武帝嘗設大臣䴵蔡樽在坐帝頻呼其姓名樽竟不荅食餅如故帝覺其負氣乃改喚蔡尚書樽始放筯執笏曰唯帝曰卿向聾今何聰對曰臣預為右武且職在納言陛下不應以名垂喚帝有慚色也趙錄曰石勒諱胡胡物皆改名胡餅曰搏鑪石虎改曰麻餅又曰石虎好食蒸餅常以乾棗胡桃瓤為心蒸之使坼裂方食及為冉閔所篡幽廢思其不裂者不可得後魏書曰胡叟不治產業常苦飢貧能不以為恥養子字螟蛉以自結常作布囊容三四斛飲噉醉飽便盛肉餅以付螟蛉見車馬榮華者視之蔑如也北齊書曰庫狄連冬至日親表稱賀其妻為設豆餅連問此豆餅何處得來妻對曰於食中減連大怒後周書曰樊深以父遇宮因避難墜崖傷足絕食再宿後遇得一簞餅飲食之然念繼母年老患痺咸免虜掠乃弗食夜中匍匐尋覔母過得相見因以饋母還復遁去改易姓名遊學於汾晉之間唐書曰僧萬廻閿鄉人也恢諧以狂發言屢中其兄戍邊五載母思之萬廻年幼請詣兄所策竹馬去經歸而返白母曰兄還矣請辦餅更往迎之數日持襆而至母發襆乃戍子衣也尋而子至母大驚范子曰餅出三輔墨子曰魯陽文君云有人於此牧羊芻豢不可勝食也見人作餅即還然竊之楚四境之田蕪廣不可勝闢見宋鄭之門邑則還然竊之與彼異乎抱朴子曰莽之世賣餅小人皆得等級斗筲之徒兼金累紫揚子雲確然忠貞之節形矣三輔舊事曰太上皇不樂關中高祖徙豐沛屠兒沽酒賣餅商人立為新豐縣故一縣多小人李固別傳曰質帝暴得疾云食煮餅腹中悶遂崩蔡質漢官儀曰尚書郎直太官供餅餌五熟玄晏春秋曰衛倫過予而讌論及於味倫稱侍中劉子楊食餅知鹽生精味, SBCK: 輙歐罵}
