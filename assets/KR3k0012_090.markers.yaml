  - {type: variant, offset: 2402, length: 0, content: '', krp: 莽末天下旱霜連年百穀不成元年之𥘉耕作者少民飢饉黃金一斤昜粟一石至二年秋天下野穀旅生麻菽尤盛或生瓜菜菓實野𧖟成繭𬒳山民收其絮採獲榖果以爲蓄積至是歳野榖生者稀少而南畒亦益闢矣六年二月呉漢下朐城天下悉定唯獨公孫述隗囂未平上曰取此兩子置度外乃休諸將置酒賞賜之每幸郡國下與見吏輙問以數十百歳能吏次第下掾史簡練臣下之行下無所隠其情道數十歳事若案文書吏民驚惶不知所以人自以見識家自以蒙恩逺臣受顔色之惠坐席之間以要其死力當此之時賊檄日以百數憂不可勝上猶以餘間講經藝發圖讖制告公孫述署曰公孫皇帝囂雖遣子入侍尚持兩心囂故吏馬授謂囂曰到朝廷凡數十見自事主未常見明主如此也材直驚人其勇非人之敵開心見誠與人語好醜無所隱諱圖講天下事極盡下恩兵事方略量敵校勝闊逹多大節與髙帝等經學博覽政事文辯前}
