  - {type: variant, offset: 2186, length: 673, content: 黃龍元年帝崩於未央宮在位二十五年漢書曰宣帝始立謁見高廟大將軍光參乘上內嚴憚之若芒刺在背後張安世代光參乘天子從容肆意甚安及光身死而宗族竟誅漢書贊曰孝宣之治信賞必罰綜核名實政事文學法理之事咸精其能至于伎巧工匠器械自元成間鮮能及之亦足以知吏稱其職民安其業者也遭值匈奴乖亂推亡固存李奇曰宣帝能朝呼韓而固存走郅支使遠遁是推亡也信威北夷單于慕義稽首稱藩功光祖宗業垂後嗣可謂中興侔德殷宗周宣矣東觀漢記曰光武下詔曰唯孝宣皇帝有功德其上尊號曰中宗帝王世紀曰宣帝廟名樂遊後漢班固宣帝述曰中宗明明寅用刑名時舉傅納聽斷惟精柔遠能邇燀燿威靈龍荒朔漠莫不來庭丕顯烈祖尚於有成孝元皇帝漢書帝紀曰孝元皇帝諱奭之字曰盛宣帝太子也母曰共哀許皇后昔微時生民間及即位壯大和仁好儒見宣帝所用多文法吏以刑名繩下大臣楊惲等坐刺譏辭語而誅嘗從容言陛下持刑太深宜用儒生宣帝作色曰漢家自有制度本以霸王道雜理之奈何純任德教且俗儒不達時宜好是古非今使人眩於名實何足任乃歎曰亂我家者太子也由是踈太子而愛淮陽王明察好法宜為吾子而王母張婕妤尤幸上欲代太子然以少依許氏故終不背焉宣帝崩太子即位頻年行幸甘泉河東郊祀大畤祠后土幸長楊射熊館布車騎大獵竟寧元年崩於未央宮在位十六年時年四十三班固漢書贊曰臣外祖兄弟為元帝侍中應劭曰元成帝紀皆固父彪所作臣班彪自說也外祖言金敝也語臣曰元帝多才藝善史書鼓琴瑟吹洞簫自度曲被歌聲分忖節度窮極要妙少而好儒及即位徵用儒生委之以政薛貢韋匡迭為宰相而上牽制文義優遊不斷孝宣之業衰矣然寬弘盡下出於恭儉號令溫雅有古之風烈應劭漢官儀曰孝武時天子以下未有幘元帝額上有壯髮不欲使人見乃始進幘群寮隨, WYG: ''}
