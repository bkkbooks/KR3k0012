  - {type: variant, offset: 2399, length: 0, content: '', SBCK: 所上未信到鄗上所與在長安同舎諸生疆華自長安奉赤伏符詣鄗與上㑹羣臣復固請乃命有司設壇于鄗南千秋亭六月巳未即皇帝位改元爲建武十月帝入雒陽幸南宫三年正月益呉漢鄧禹等封自漢草創德運正朔服色未有所定髙祖因􅁗以十月爲正以漢水徳立北畤而祠黒帝至孝文賈􅁩公孫臣以爲􅁗水徳漢當爲土德至孝武倪寛司馬遷猶從土德自上即位案圖䜟推五運漢爲火徳周蒼漢赤水生火赤代蒼故上都雒陽制郊祀於城南行夏之時犧牲尚黑明火徳之運徽熾尚赤四時隨色郊祀帝堯以配天}
