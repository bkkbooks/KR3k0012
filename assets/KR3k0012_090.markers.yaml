  - {type: variant, offset: 29, length: 0, content: '', WYG: 財物耶諸將怒曰劉將軍何以敢如此上乃笑且去唯王常是上計㑹侯騎還言大兵已來長數百里望不見其後尾前已至城北矣諸將遽請上上到為陳相救之勢諸將素輕上及迫急上為畫成敗皆從所言二公兵已五六萬到遂還城作營圍之數重雲車十餘丈瞰臨城中旗幟蔽野塵烟連雲金鼔之聲數十里或為地道或為衝車撞城積弩射城中矢下如雨城中負户而泣二公自以為功在漏刻有流星墜營中正晝有雲氣如壊山當營而隕不及地尺而散吏士皆厭伏時漢兵在定陵郾者聞二公兵盛皆怖上厯說其意為陳天命請為前行諸部堅陳上將歩騎千餘前去大軍四五里二公遣歩騎數千合戰上奔之斬首數十級諸部將喜曰劉將軍平生見小敵怯今見大敵勇甚竒怪}
