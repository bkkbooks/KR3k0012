  - {type: variant, offset: 3671, length: 3, content: 孝哀皇, SBCK: 昔羿浞篡夏數十年少康生爲仍牧正能脩徳復夏厥勲大矣然尚有慮思及靡有鬲内外之助至於光武承王莽起自疋庶一民尺土靡有慿焉發迹於昆陽以數千屠百萬非膽智之主孰能堪之討賊平亂克復炎漢號稱中興者無以加之矣中國旣定柔逺以徳愛慎人命下及徭賦武功旣備抗文徳脩經術勲績弘矣薛瑩漢紀曰王莽之際天下雲亂英雄並發其跨州據郡僣制者多矣人皆兾於非望然考其聦明仁勇自無光武儔也弘寛􅀶納計慮如神是以任光竇融望風景附馬援一見覩顔識竒故能以十數年間掃除群凶清復海内豈非天之所輔賛哉古者師不内御而光武命將皆授以方略使奉圖而進其違失無不折傷意豈文史之過乎不然雖聖人其猶人病諸更始東觀漢記曰劉􅀇字聖公光武族兄也弟爲人所殺聖公結客欲報之客犯法聖公避吏於平林吏繫聖公父子張聖公詐死使人持䘮歸舂陵吏乃出子張聖公因自逃匿王莽末南方飢饉人庶群入野澤掘鳬茈而食更相侵奪新市人王匡王鳯爲平理諍訟遂推爲渠師衆數百人諸亡命往從之數月間至十八千人號新市兵平林人陳牧廖湛復聚衆千餘人號平林兵聖公入平林中與伯升㑹遂共圍宛聖公號更始將軍自破甄阜等衆庶來降十餘萬諸將立劉氏南陽英雄皆歸望於伯升然漢兵以新市平林爲本其將帥素習聖公因欲立之而朱鮪立壇城南淯音育火上諸伯升吕植通禮經爲謁者將立聖公爲天子儀以示諸將馬武王匡以爲王莽未滅不如且稱王張印拔劒擊地曰稱天公尚可稱天子何謂不可於是諸將軍起與聖公至於壇所奉通天冠進聖公於是聖公乃拜冠南面而立改元爲更始元年上爲太常偏將軍上破二公於昆陽城而更始収劉稷及伯升即日皆物故上馳詣宛謝罪更始大慙長安中兵攻王莽斬首収璽綬詣宛更始入便坐黄堂上視之曰莽不如此當與霍光等更始韓夫人曰莽不如此}
