  - {type: variant, offset: 27, length: 0, content: '', WYG: 行過宫常封閉上將生皇考以令舎下濕開宫後殿居之建平元年十二月甲子夜上生時有赤光室中盡明皇考異之使卜者王長占之長曰此兆吉不可言是嵗縣界有嘉禾一莖九穗縣大豐熟因名上曰秀是嵗鳳凰來集濟陽故宫皆畫鳳凰聖瑞明兆始於此上為人隆凖日角大口美鬚眉長七尺三寸仁智明逺多權略樂施受人在家重慎畏事勤於稼穡兄伯升好俠非笑上事田業比之髙祖兄仲升年九嵗而南頓君卒隨其叔公在蕭入小學後之長安受尚書經師事盧江許子威大義略舉因學世事朝政美惡必先聞知具為同舎解說南陽大人徃來長安為之邸閒稽疑議嘗訟逋租于大司馬嚴尤尤見而竒之宛大姓李伯玉從弟軼數遣客求上上欲避之先是伯玉同母兄公孫臣為醫伯升請呼難伯升殺之上恐其怨故避之使來者言李氏欲相見甚誠無他意上乃見之懐刀自備入見因始侯兄弟為上言天下擾亂飢餓下江兵盛南陽豪右雲擾因具言䜟文事上殊不意獨内念李氏富厚父為宗卿師語言譎詭殊非次第嘗疾毒諸家子數犯法令李氏家富厚何為如是不然諾其言諸李遂與南陽府掾史張順等連謀上深念良久天變已成遂市兵弩絳衣赤幘時伯升在舂陵亦已聚㑹客矣上歸舊廬望見廬南若火光以為人持火呼之光遂盛赫然屬天有頃不見異之遂還歸宅乃與伯升相見初伯升之起也諸家子弟皆逃自匿曰伯升殺我及聞上至綘衣大冠將軍服乃驚曰以為獨伯升如此也素謹厚亦如之皆合㑹共勞饗新市平林兵王鳳王匡等因率舂陵子弟隨之兵合七八千人上騎牛與俱進殺新野尉後乃得馬進圍宛城王莽遣大司徒王尋大司空王邑將兵來征更始立以上為太常偏將軍時無印得定武侯家丞印佩之二公兵到頴川嚴尤陳茂與合尤問城中出者言上不敢取財物但合㑹諸兵為之計策尤笑言曰是美鬚眉目者耶欲何為乃如此初莽遣二公欲盛威武以振山東至驅虎豹犀象竒偉猛獸以長人巨無覇為壘尉自秦漢以來師出未嘗有也上邀之於陽關二公兵盛漢兵反走上馳入昆陽諸將惶恐各欲散歸與諸將議城中兵穀}
