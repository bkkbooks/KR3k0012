  - {type: variant, offset: 19, length: 2356, content: 諱弗之字曰不武帝少子也母趙倢妤本以有奇異得幸服虔曰婕妤有奇手指不伸案外戚傳曰望氣者云北有奇女天子氣故稱奇異也及生帝有奇異文穎曰十四月乃生遂立為太子年八歲武帝崩太子即皇帝位始元元年春二月黃鵠下建章宮太液池中如淳曰謂之液者天地和液之氣所為池案時漢用土德服色尚黃鵠色皆白而今更黃以為土德之端故紀之也言承陰陽津液以作之公卿上壽賜諸侯王列侯宗室金錢各有差己亥上耕于鉤盾弄田應劭曰時帝年九歲未能親耕帝籍鉤盾官者近署故往試耕為戲弄也案西京故事弄田在未央宮中也元鳳元年左將軍上官桀桀子驃騎將軍安與大將軍霍光爭權欲害之詐使人為燕王旦上書言光罪時帝年十四覺其詐皆伏雖後有譖光者上輒怒曰大將軍國家忠臣先帝所屬敢有譖毀者坐之光由是得盡忠元年夏四月帝崩于未央宮案帝九歲即位在位十三年壽二十二也六月葬平陵漢書贊曰昔周成王以孺子繼位而有管蔡四國流言之變孝昭幼年即位亦有燕蓋上官逆亂之謀成王不疑周公孝昭委任霍光各因其時以成名大矣哉承孝武奢侈餘弊師旅之後海內虛耗戶口減半光知時務之要輕繇薄歛與民休息至始元元鳳之間匈奴和親百姓充實舉賢良文學問民所疾苦議鹽鐵而罷推酤尊號曰昭不亦宜乎後漢班固昭帝述曰孝昭幼冲冢宰惟忠燕蓋譸張實叡實聰罪人斯得邦家和同魏文帝周成漢昭論曰或方周成王於漢昭帝僉高成而下昭余以為周成王體上聖之休氣稟賢妣之胎誨周邵為保傳呂尚為太師口能言則行人稱辤足能履則相者導儀目厭威容之美耳飽仁義之聲所謂沉漬玄流而沐浴清風者矣猶有咎悔聆二叔之謗使周公東遷皇天赫怒顯明厥咎猶啟金滕稽諸國史然後乃寤不亮周公之聖德而信金縢之教言豈不暗哉夫孝昭父非武王母非邑姜養帷蓋主相則桀光體不承聖化不胎育保無仁孝之質佐無隆平之治所謂生於深宮之中長於婦人之手然而德與性成行與體并年在二七早知夙達發燕書之詐亮霍光之誠豈有金縢信國史而後乃寤哉使夫成昭均年而立易世而化質臣而治換樂而歌則漢不獨少周不獨多魏丁儀周成漢昭論曰成王昭帝俱以襁褓之幼託於冢宰流言讒興此其艱險相似者也夫以發金滕然後垂泣計日力便覺詐書明之遲速既有差矣且叔父兄子非相嫌之處異姓君臣非相信之地霍光罹人謗而不出周公賴天變而得之推此數者齊本而論末計重而量輕漢昭之優周成甚明者也成王秀而獲實其美在終昭帝苗而不秀其得在始必不得已而論二主余與夫始者也廢帝海昏侯漢書曰昌邑哀王髆天漢四年立十一年薨子賀嗣立十三年昭帝崩無嗣大將軍霍光徵王駕典喪王乘傳詣大安邸夜漏未盡一刻以火發書其日中賀發晡時至定陶行百三十五里侍從者馬死相望於道郎中令龔遂諫王令還郎謁者五十餘人賀到濟陽求長鳴雞道買積竹杖文穎注曰合竹作杖也過弘農使大奴善以衣車載女子旦至廣明東都門遂曰禮奔喪望見國都哭此長安東郭門也賀曰嗌痛不能哭至城門遂復言賀曰城門等耳旦至未央宮東闕遂曰昌邑帳在是闕外馳道北文穎曰吊哭帳未至帳所有南北行道馬足未至數步大王宜下車也嚮闕西面伏哭盡哀止王曰諾到哭如儀王受皇帝璽綬襲尊號即位二十七日行淫亂大將軍光與群臣議白孝昭皇帝后廢賀歸故國初賀在國時數有怪嘗見白犬高三尺其頸似人而冠方山冠後復見熊左右皆莫見又大鳥飛集宮中王知惡之輒以問郎中令龔遂遂為言其故後又血污王坐席王問遂遂叫然號曰空宮不久妖祥數至血者陰憂象也宜畏慎自省賀終不改節居無何就徵既即位後王夢青蠅之矢積西階東可五六石以屋版瓦覆發視之青蠅矢或曰惡虵矢也問遂而不用其言卒至於廢大將軍光更尊孝武帝曾孫是為宣皇帝漢書曰昌邑王即位好弄鬥斗虎使官奴騎乘遊戲掖庭之中與孝昭帝宮人淫亂詔掖庭令敢泄言腰斬王受璽凡二十七日有罪千一百二十七條霍光乃即持其手解脫其璽組奏上太后扶王下殿出金馬門群臣隨送王西面拜曰愚戇不任漢事起就乘輿副車大將軍光送至昌邑邸光謝曰王行自絕於天臣等駑怯不能殺身以報德寧負王不敢負社稷願王自愛漢書曰王吉字子陽為昌邑中尉上䟽諫曰大王不好書術而樂逸遊馮試樽銜服虎曰樽促也或曰桂也撙音子本反馳騁不止口倦乎叱咤手苦於轡箠身勞乎車輿朝則冒霜露晝則被埃塵夏則為大暑之所暴炙冬則為風寒之所偃薄偃靡也遇疾風而靡也薄迫也數以耎脆之玉體耎柔而兗切犯勤勞之煩毒非所以全壽命之宗也又非所以進仁義之隆也夫廣廈之下細氈之上明師居前勸誦在後上論唐虞之際下及殷周之盛學仁聖之風習治國之道忻忻焉發憤忘食日新厥德其樂豈不長哉大王誠留意則心有堯舜之志體有喬松之壽美聲譽發而上聞則福祿其臻而社稷安矣中宗孝宣皇帝漢書帝紀曰孝宣皇帝諱詢字次卿詢之字曰謀武帝曾孫戾太子孫也太子納史良娣生皇孫納王夫人生宣帝號曰皇曾孫生數月遭巫蠱事太子良娣皇孫王夫人皆遇害曾孫坐繫郡邸獄邴吉為廷尉監治巫蠱憐孫之亡辜使女徒乳養私給衣食至後元二年望氣者言長安獄有天子氣上遣使者皆殺之內署令郭穰夜至郡邸獄吉拒閉不得入曾孫賴吉得全因遭大赦吉乃載曾孫送祖母史良娣家後有詔掖庭養視上屬籍宗正時掖庭令張賀嘗事戾太子哀曾孫奉養甚謹以私錢供給教書塈壯為取暴室嗇夫許廣漢女曾孫因依倚廣漢兄弟及祖母家受詩於東海澓仲翁澓音馥高才好學然亦喜遊俠鬥雞走馬具知閭里之奸邪吏治得失周遍三輔常困於蓮芍鹵中尤樂鄠杜間率常在下杜劭應曰下杜杜陵之下時會諸朝舍長安尚冠里身足下有毛遍身及足下皆有毛臥居數有光曜每買餅所從買家輒大售亦以此自怪元平元年昭帝崩無嗣霍光徵昌邑王賀賀淫亂廢七月光奏遣宗正得至尚冠里舍沐浴賜御府衣太僕以軨獵車奉迎曾孫就齊宗正府封為陽武侯群臣上璽即皇帝位甘露三年匈奴呼韓耶單于皆來朝贊謁稱藩臣而不名黃龍元年帝崩於未央宮在位二十五年漢書曰宣帝始立謁見高廟大將軍光參乘上內嚴憚之若芒刺在背後張安世代光參乘天子從容肆意甚安及光身死而宗族竟誅漢書贊曰孝宣之治信賞必罰綜核名實政事文學法理之事咸精其能至于伎巧工匠器械自元成間鮮能及之亦足以知吏稱其職民安其業者也遭值匈奴乖亂推亡固存李奇曰宣帝能朝呼韓而固存走郅支使遠遁是推亡也信威北夷單于慕義稽首稱藩功光祖宗業垂後嗣可謂中興侔德殷宗周宣矣, SBCK: ''}
