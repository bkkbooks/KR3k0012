  - {type: variant, offset: 2412, length: 4, content: 漢班固宣, SBCK: 乃稍備具焉述伏誅之後而事少閑官曹文書減舊過半下縣吏無百里之繇民無出門之役十九年上幸南陽汝南至南頃止令舎大置酒賜吏民復南頓田租一歳吏民叩頭言皇考居此日乆陛下識知寺舎毎來輙加厚恩但復一歳少薄願復十歳上曰天下重寳大器常恐不任日慎一日安敢自逺期十歳復増一歳二十年六月上風眗黄癉病發甚以衛尉􅀜内侯隂興爲侍中興受詔雲臺廣室二十六年正月詔曰前以用度不足吏禄薄少乃自益其俸自三公下至佐史各有差四月始營陵地於臨平亭南詔曰無爲山陵陂池裁令流水而巳迭興之後亦無丘壟使合古法今日月巳逝當豫自作臣子奉承不得有加乃令陶人作瓦器又曰臨平望平隂河水洋洋舟􅂳泛泛善矣夫周公孔子猶不得存安得松喬與之而共逰乎文}
