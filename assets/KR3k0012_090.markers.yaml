  - {type: variant, offset: 2407, length: 0, content: '', SBCK: 耶曰不如也髙帝大度無可無不可今上好吏事動如節度不飲酒囂大􅀏曰如卿言反復勝也七年正月詔羣臣奏事無得言聖人又舊制上書以青布囊素褁封書不中式不得上旣上詣北軍待執前後相塵連歳月乃决上躬親萬機急於下情乃令上書啓封則用不得刮璽書取具文字而已奏詣闕平旦上其有當見及􅁈結者常以日日出時騶􅀐馳出召入其餘以俟中使者出報即罷去所見如神逺近不偏幽隱上逹民莫敢不用情追念前世園陵至盛王侯外戚葬埋僣侈吏民相効浸以無限詔有誥天下令薄葬八年閏月車駕西征河西大將軍竇融與五部太守歩􅀐二萬迎上隗囂士衆震壞皆降囂走入城呉漢岑彭追守之九年正月隗囂餓岀城飡粮糗糒腹脹死十二年呉漢引兵擊公孫述入犍爲界小縣多城守未下詔書告漢直擁兵到成都據其心腹後城營自解散漢意難前獨言朝廷以爲我縛賊手足矣遣輕騎至成都燒市橋武陽以東小城營皆奔走降竟如詔書漢兵乗勝追奔述距守詔書又戒漢曰成都十萬人且堅據廣都城去之五十里待其即營攻城罷倦引去乃首尾擊之勿與爭鋒述兵不敢來轉營即之移徙輙自堅十一月衆軍至城門述自將背城而戰呉漢攻之述軍大破刺傷述扶輿入壁其夜死夷述妻子傳首於洛陽縱兵大掠舉火燔燒上聞之下詔讓呉漢副將劉禹曰城降嬰兒老母口以萬數一旦放兵縱火聞之可爲酸􅈹禹宗室子孫故甞更職何忍行此仰視天俯視地觀於放麑啜羮之義二者孰仁矣失斬將吊民之義又議漢殺述親屬太多是時名都王國有獻名馬寳劒直百金馬以駕鼓車劔以賜騎士􅁐囿池籞音禦之官廢弋獵之事不御雅性不喜聽音樂手不持珠玉衣服大絹而不重綵征伐甞乗革輿羸馬公孫述故哀帝時即以數郡備天子用述破益州乃傳送瞽師交}
