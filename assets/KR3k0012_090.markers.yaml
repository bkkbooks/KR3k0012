  - {type: variant, offset: 106, length: 0, content: '', WYG: 為建武十月帝入雒陽華南宫二年正月益吳漢鄧禹等封自漢草創徳運正朔服色未有所定髙祖因秦以十月為正以漢水徳立北畤而祠黒帝至孝文賈誼公孫𢎞以為秦水徳漢當為土徳至孝武倪寛司馬遷猶從土徳自上即位案圗䜟推五運漢為火徳周蒼漢赤水勝火赤代蒼故上都雒陽制郊祀於城南行夏之時犧牲尚黒明火徳之運旗熾尚赤四時隨色郊祀帝堯以配天宗髙祖以配上帝上遣逰撃將軍鄧隆與幽州牧朱浮擊彭寵隆軍徽路浮軍雍奴相去百餘里遣吏上奏言寵破在旦暮上讀檄未竟怒曰兵必敗北汝歸可知吏還未至隆軍果為寵兵掩擊破浮軍逺至不能救以兵走幽州咸曰上神三年十月上幸舂陵祠園廟大置酒與舂陵父老故人為樂四年五月上幸靈奴為征彭寵故也自王莽末天下早霜連年百穀不成}
