  - {type: variant, offset: 5507, length: 596, content: 邑王尋等兵百萬號曰虎牙五威兵定山東圍昆陽世祖來救昆陽邑等大敗關中聞之震恐命張邯稱符命事因曰易言伏戎于莽升其高陵三歲不興莽皇帝名升謂劉伯升高陵謂翟義封也猶殄滅不興後莽兵敗莽憂憊不能食但飲酒啗鰒魚讀軍書倦因憑寐不復就床也但為厭勝遣壞渭陵延陵門果罳曰無使民復思漢也崔發言周禮左傳國有太災則哭以厭之莽乃至南郊陳符命仰天曰皇天即授臣莽何不殄滅眾賊因搏心大哭氣盡伏而叩頭諸生小民甚悲哀及能誦策文者除為郎拜將軍九人為九虎將漢承相司直李松與鄧曅攻京師以王曼為校尉略地至長門宮而茂陵董喜等並假以號稱漢將長安旁兵四會城下爭欲先入城貪立本大功莽分赦城內獄囚皆授兵殺狶飲其血誓曰大功莽分不為新室者社鬼記之眾兵發掘莽妻子父祖冢燒其棺及九廟明堂火照城中少年朱第張魚等燒作室門斫敬法闔呼曰反虜王莽何不出降火及掖庭莽避火宣室火輒隨之宮人婦女啼呼曰當奈何莽紺祠服帶璽韍紺深清枃音弋句切杓純也言純為紺服也韍音弗持虞帝匕首天文郎案式於前曰時加某莽旋席隨斗而坐曰天生德於予漢兵其如予何群臣扶掖莽自前殿南下椒除西出白虎就車之漸臺欲阻池水獨把持符命威斗公卿大夫從官尚千餘人王邑晝夜戰罷極入見其子侍中睦解衣冠欲逃邑叱之令還父子共守莽軍人入殿中呼曰反虜王莽安在有美人出房曰在漸臺眾兵追之圍數百重臺上亦與戰莽入室下晡時眾兵上臺臺上商人杜吳殺莽取其綬校尉公賓就見吳問綬主所在曰室中西北陬就識斬莽首軍人爭分裂莽身支節肌皮臠分爭相殺者數千人傳莽首詣, SBCK: ''}
