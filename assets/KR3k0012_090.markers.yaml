  - {type: variant, offset: 2401, length: 0, content: '', SBCK: 上遣㳺擊將軍鄧隆與幽州牧朱浮擊彭寵隆軍潞浮軍雍奴相去百餘里遣吏上奏言寵破在旦暮上讀檄未竟怒曰兵必敗北汝歸可知吏還未至隆軍果爲寵兵掩擊破浮軍逺至不能救以兵走幽州咸曰上神三年十月上幸舂陵祠園廟大置酒與舂陵父老故人爲樂四年五月上幸盧奴爲征彭寵故也自}
