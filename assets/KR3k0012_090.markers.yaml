  - {type: variant, offset: 2390, length: 0, content: '', SBCK: 漢髙帝九世孫也出長沙定王發之後袁宏漢記曰孝景帝生長沙定王發發中子買爲舂陵節侯買生鬱林太守外外生鉅鹿都尉回回生南頓令欽欽生光武皇帝諱秀字文叔東觀漢記曰皇考􅀄爲濟陽}
  - {type: variant, offset: 2390, length: 0, content: '', krp: 漢髙帝九世孫也出長沙定王發之後袁宏漢記曰孝景帝生長沙定王發發中子買爲舂陵節侯買生鬱林太守外外生鉅鹿都尉回回生南頓令欽欽生光武皇帝諱秀字文叔東觀漢記曰皇考𥘉爲濟陽}
  - {type: variant, offset: 2391, length: 0, content: '', SBCK: 武帝行過宫常封􅐬上將生皇考以令舎下濕開宫後殿居之建平元年十二月甲子夜上生時有赤光室中盡明皇考異之使􅁲者王長曰此善事不可言是歳嘉禾生一莖九穗長大於凡禾縣界大豐熟因名上曰秀是歳鳯皇來集濟陽故宫皆􅀞鳯皇聖瑞萌兆始形於此上爲人隆凖日角大口羙􅂡眉長七尺三寸仁智明遠多權略樂施愛人在家重慎畏事懃於稼穡兄伯升好俠非􅀏上事田作比之髙祖兄伯升年九歳而南頓君卒隨其叔父在蕭入小學後之長安受尚書經師事廬江許子威大義略舉因學世事朝政每下必先聞知具爲同舎解􅀃南陽大人徃來長安爲之邸闇稽疑議甞訟逋租於大司馬嚴尤尤見而竒之宛大姓李伯玉從第軼數遣客求上上欲避之先是時伯玉同母兄公孫臣爲醫伯升請呼難伯升殺之上恐其怨故避之使來者言李氏欲相見欵誠無他意上乃見之懐刀自備入見因始侯兄弟爲上言天下擾亂飢餓下江兵盛南陽豪右雲擾因具言䜟文事上殊不意獨内念李氏冨厚父爲宗卿師語言譎詭殊非次弟甞疾毒諸家子數犯法令李氏家冨厚何爲如是不然諾其言諸李遂與南陽府􅁺史張順等連謀上􅀷念良乆天變巳成遂市兵弩絳衣赤幘時伯升在舂陵亦巳聚㑹客矣上歸舊廬望見廬南􅀂火光以爲人持火呼之光遂盛赫然屬天有頃不見異之遂從南郭歸宅乃與伯升相見􅀄伯升之起也諸家子弟皆逃自匿曰伯升殺我及聞上至絳衣大冠將軍服乃驚曰以爲獨伯升如此也中謹厚亦如之皆合㑹共勞饗新市平林兵王鳯王匡等因率春陵子弟隨之兵合七八千人上􅀐牛與俱殺進新野尉後乃得馬進圍宛城王莽遣大司徒王㝷大司空王邑將兵來征更始立以上爲太常偏將軍時無印得定武侯家丞印佩之二公兵到頴川嚴尤陳茂與合尤問城中出者言上不敢取財物但合㑹諸兵爲之計􅁽尤􅀏言曰是羙眉目者耶欲何爲乃如此􅀄莽遣二公欲盛威武以振山東至驅豹犀象竒偉猛獸以長人巨無霸爲壘尉自􅁗漢以來師出未曽有也上邀之於陽􅀜二公兵盛漢兵反走上馳入昆陽諸將惶恐各欲散歸與諸將議城中兵穀少宛城未拔力不能相救今昆陽即破一日之間諸將亦滅不同力救之反欲歸守其妻子財物耶諸將怒曰劉將軍何以敢如此上乃􅀏且去唯王常是上計㑹􅀱騎還言大兵巳來長數百里望不見其後尾前巳至城北矣諸將遽請上上到爲陳相救之勢諸將素輕上及迫急上爲畫成敗皆從所言二公兵巳五六萬到遂環昆陽城營圍之數重雲車七餘丈瞰臨城中旗幟蔽野塵熛連雲金鼓之聲數十里或爲地突或爲衝車撞城積弩射城中矢下如雨城中􅀒户而汲二公自以爲}
