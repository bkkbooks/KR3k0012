  - {type: variant, offset: 2394, length: 0, content: '', SBCK: 意爲陳大命請爲前行諸部堅陳上將歩騎千餘前去大軍四五里二公遣歩騎數千乗合戰上奔之斬首數級諸部將喜曰劉將軍平生見小敵怯今見大敵勇甚竒恠也上復進二公兵却諸部乘之斬首數百千級連勝遂令輕足將書與城中諸將言宛下兵復到而陽墜其書二公得書讀之恐上遂選精兵三千人從城西水上奔陣二公兵於是大奔北殺司徒王㝷而昆陽城中兵亦出中外並擊㑹天大雷風暴雨下如注水潦成川滍水盛溢二公大衆遂潰亂奔赴水溺死者以數萬滍水爲之不流王邑嚴尤陳茂輕􅀐乗死人渡滍水逃去漢軍盡􅀗其珎寳輜重車甲連月不盡五月齊武公拔宛城六月上破二公於昆陽破宛後數日収伯升部將劉稷而伯升強爭之更始遂用譛愬復収伯升即日皆物故上在父城徴詣宛拜上爲破虜大將軍封武信侯更始欲北之雒陽以上爲司􅀠校尉先到雒陽整頓官府三輔官府吏東迎雒陽者見更始諸將過者巳數十輩皆冠幘衣婦人衣諸于繡䘿諸于大掖衣也如婦人之旌衣䘿音屈楊雄方言曰䄡褕其矩者自閔目西謂之䘿據此是諸于上加繡䘿如今半臂也大爲長安所􅀏知者或畏其衣犇走入邉郡見司􅀠官屬皆相指視之極望老吏或垂涕曰復見漢官威儀賢者蟻附更始以上爲大司馬遣之河北十月上持節度孟津鎮撫河北安集百姓趙王庶兄胡子立邯鄲卜者王郎爲太子移檄購求公十萬户世祖引兵攻邯鄲連戰郎兵挫折郎遣諌議大夫杜長威見公據地曰實成帝遺體子輿也公曰正使成帝復生天下不可復得也况詐子輿乎長威請降得萬户侯公曰一户不可得長威曰邯鄲雖鄙君臣并力城守尚可支一歳終不君臣相率而降但得全身也辤去而郎少傅李立反郎開城門漢兵破邯鄲誅郎入王宫収文書得吏民謗毁公言可擊者數千章公㑹諸將燒之曰令反側者自安也更始遣使者即立公爲蕭王諸將議}
