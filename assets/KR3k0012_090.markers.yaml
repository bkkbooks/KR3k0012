  - {type: variant, offset: 186, length: 0, content: '', WYG: 子孫故嘗更職何忍行此仰視天俯視地觀於放麑啜羮之事二者孰仁且失斬將弔民之義又議漢殺述親屬太多是時名都王國有獻名馬寳劍直百}
  - {type: variant, offset: 187, length: 1, content: 錢, WYG: 馬以駕鼓車劔以賜騎士苑囿池籞音御之官廢弋獵之事不御性不喜聽音樂手不持珠玉衣服大絹而不重綵征伐嘗乗革輿羸馬公孫述破益州乃傳送瞽師郊廟樂葆車乗輿物是後乃稍備具焉述伏誅之後而事少閒官曹文書減舊過半下縣吏無百里之繇民無出門之役十九年上幸南陽汝南至南頓止令舎大置酒賜吏民復南頓田租一歲吏民叩頭言皇考居此日久陛下發祥之地每來輙加厚恩但復一嵗少薄願復十嵗上曰天下重寳大噐常恐不任日慎一日安敢自逺期十嵗復増一嵗二十年六月上風眴黃癉病發甚以衛尉關内侯隂興為侍中興受詔雲臺廣室二十六年正月詔曰前以用度不足吏禄薄少乃自益其俸自三公下至佐吏}
