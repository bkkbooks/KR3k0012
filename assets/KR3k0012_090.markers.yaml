  - {type: variant, offset: 4207, length: 2205, content: 五年而失國始二年平陵方望等將嬰聚眾為天子數月更始乃殺之王莽漢書曰王莽字巨君孝元皇后之弟子也父及兄弟皆以元成世封侯輔政凡九侯五大司馬唯莽父曼早死不侯五侯侈靡莽獨孤貧因折節為儉受禮經勤身博學事母及寡㛐孤兄子行甚整又外交英俊內事諸父世父鳳疾莽侍病亂髮垢面鳳且死以託太后及帝拜黃門郎永始中封為新都侯遊者為之談說虛譽隆洽太后姉子淳于長為九卿先進在莽右莽陰求其罪因大司馬白之長伏誅莽以獲忠直遂擢為大司馬輔政欲令名譽過前人遂克己不倦歲餘成帝崩哀帝即位傅太后丁姬皆稱尊號丞相朱博奏莽前不廣尊尊之義請免為庶人乃遣就國杜門自守吏民怨訟莽者以百數元壽元年徵莽歲餘哀帝崩莽為大司馬平帝即位太后臨朝皆委政於莽群臣奏莽定策安宗廟賜號安漢公莽以女配帝欲擅權帝母衛姬及舅並留中山莽子宇恐帝大後見怨與師吳章夜持血灑莽門吏發覺之莽執宇送獄死莽因作書八篇以戒子孫宜班郡國令學官以著官簿比孝經吏人止書者八千餘人咸曰伊尹為阿衡周公為太宰帝採伊周稱號加公為宰衡又加九錫鸞輅龍旂莽又增法五十條犯者徙之西海徙者以千萬數民始怨矣平帝疾莽作策請問願以身代藏策金縢平帝崩莽惡立長乃選子嬰年三歲託以卜相最吉是月前煇光謝囂奏武功長孟通浚井得白石下有丹書文曰告安漢公莽為皇帝符命之興自此始矣群臣奏安漢公居攝踐祚服天子黻冕南面朝群臣車服出入如天子郊祀天地贊者曰假皇帝民臣謂之攝皇帝自稱曰予改元曰居攝二年東郡太守翟義立嚴鄉侯劉信為天子移檄郡國眾十餘萬莽惶懼抱孺子告禱郊廟倣大誥作策班於天下莽既滅翟義自謂威德已盛遂謀即真之事矣莽母功顯君死意不在哀令太后下詔議其服莽奏太后下詔議其服莽母太后稱劉京上書言臨淄縣昌興亭長辛嘗夢曰吾天公使我告亭長曰攝皇帝當為真即不信此亭中當有新井旦起視誠有新井入地且百尺梓潼人哀章即作銅匱為兩撿其上書言莽為真天子昏時衣黃衣持匱至高廟付僕射以聞莽至高廟拜受金匱還坐未央前殿下書即真天子位號曰新以十二月癸酉為建國元年莽按符命求得王盛從布衣登用百官並改名又改長安為常安立祖廟五親廟四又更作小錢與前大錢為二品百姓不便農商失業民人至泣於市道遣五威將王奇班符命四十二篇五威將乘乾文車駕坤六馬背負鷩鳥之毛服飾甚偉長安狂女子碧呼道中曰高皇帝大怒趨歸我國不者九月必殺汝莽捕殺之更名匈奴為降奴是時有用方技待詔黃門者或問莽形貌待詔曰莽所謂鴟目虎吻豺狼之聲故能食人亦當為人所食問者告之莽誅待詔後常翳雲母屏風非親近莫得見也更名高句驪為下句驪五年文母皇太后崩立廟長安新室世世獻祭先帝配食坐於床下又明六筦之令犯禁者至死臨淮瓜田儀姓瓜田名儀為盜賊琅耶女子呂母亦起莽之南郊鑄作威斗若北斗欲以厭勝眾兵莽見盜賊起乃命令太史推三萬六千歲曆紀六年一改元布天下大募天下丁男及死罪囚吏民奴名曰豬突狶勇以為銳卒莽見盜賊多欲規為自安遂營長安城南堤封百頃親舉築三千即言符命黃帝以百二十女致仙乃遣分行天下愽採淑女莽夢見長樂宮銅人起立惡之尚方鐫滅銅人膺文又令虎賁武士入高廟杖劍四面提擊桃湯赭鞭鞭灑屋壁又言黃帝建華蓋以登仙乃造之百官竊言此似轜車非仙物也莽知西方潰叛乃遣分行天下井田眾制會世祖與兄齊武王等功拔棘陽立劉聖公為天子莽愈恐欲外視自安乃染其髮鬢進所徵天下淑女立杜陵史氏女為皇后娉黃金三萬斤遣王邑王尋等兵百萬號曰虎牙五威兵定山東圍昆陽世祖來救昆陽邑等大敗關中聞之震恐命張邯稱符命事因曰易言伏戎于莽升其高陵三歲不興莽皇帝名升謂劉伯升高陵謂翟義封也猶殄滅不興後莽兵敗莽憂憊不能食但飲酒啗鰒魚讀軍書倦因憑寐不復就床也但為厭勝遣壞渭陵延陵門果罳曰無使民復思漢也崔發言周禮左傳國有太災則哭以厭之莽乃至南郊陳符命仰天曰皇天即授臣莽何不殄滅眾賊因搏心大哭氣盡伏而叩頭諸生小民甚悲哀及能誦策文者除為郎拜將軍九人為九虎將漢承相司直李松與鄧曅攻京師以王曼為校尉略地至長門宮而茂陵董喜等並假以號稱漢將長安旁兵四會城下爭欲先入城貪立本大功莽分赦城內獄囚皆授兵殺狶飲其血誓曰大功莽分不為新室者社鬼記之眾兵發掘莽妻子父祖冢燒其棺及九廟明堂火照城中少年朱第張魚等燒作室門斫敬法闔呼曰反虜王莽何不出降火及掖庭莽避火宣室火輒隨之宮人婦女啼呼曰當奈何莽紺祠服帶璽韍紺深清枃音弋句切杓純也言純為紺服也韍音弗持虞帝匕首天文郎案式於前曰時加某莽旋席隨斗而坐曰天生德於予漢兵其如予何群臣扶掖莽自前殿南下椒除西出白虎就車之漸臺欲阻池水獨把持符命威斗公卿大夫從官尚千餘人王邑晝夜戰罷極入見其子侍中睦解衣冠欲逃邑叱之令還父子共守莽軍人入殿中呼曰反虜王莽安在有美人出房曰在漸臺眾兵追之圍數百重臺上亦與戰莽入室下晡時眾兵上臺臺上商人杜吳殺莽取其綬校尉公賓就見吳問綬主所在曰室中西北陬就識斬莽首軍人爭分裂莽身支節肌皮臠分爭相殺者數千人傳莽首詣更始懸於宛市中百姓共提擊之或切食其舌應劭漢官儀曰幘本無巾如今半幘而已王莽無髮因為施巾故里語曰王莽頭禿施幘屋漢書贊曰王莽始起外戚折節力行以要名譽宗族稱孝師友歸仁及其居位攝政成哀之際勤勞國家直道而行動見稱述其竊位南面處非所據顛覆之勢險於桀紂而莽晏然自以黃虞復出乃始恣睢奮其威詐滔天虐民窮凶極惡毒流諸夏亂延蠻貊猶未足達其欲焉是以四海之內囂然喪其樂生之心中外憤怨遠近俱發城池不守支體分裂遂令天下城邑為墟丘壠發掘害徧生民辜及朽骨自書傳所載亂臣賊子無道之人考其禍敗未有如莽甚者也昔秦燔詩書以立私議莽誦六經以文姦言同歸殊途俱成滅亡此皆亢龍絕氣非命之運紫色䵷音蛙聲餘分閨位聖王之驅除云爾非命非天命也紫間色䵷邪音歲月之餘分為閏言皆非正也, WYG: ''}
