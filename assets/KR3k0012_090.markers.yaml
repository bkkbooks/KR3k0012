  - {type: variant, offset: 191, length: 2, content: 己亥, WYG: 四月始營陵地於臨平亭南詔曰無為山陵陂池裁令流水而已迭興之後亦無丘壟使合古法今日月已逝當預自作臣子奉承不得有加乃令陶人作瓦器又曰臨平望平隂河水洋洋舟船泛泛善矣夫周公孔子有不得存安得松喬與之而共逰乎文帝曉終始之義景帝所謂孝子也故遭反復覇陵獨完非成法耶}
