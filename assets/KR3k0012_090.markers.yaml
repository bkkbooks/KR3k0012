  - {type: variant, offset: 114, length: 3, content: 建章宮, WYG: 朐城天下悉定唯獨公孫述隗囂未平上曰姑置此兩子於度外乃休諸將置酒賞賜之毎幸郡國下與見吏輙問以數十百嵗能吏次第下及掾史簡練臣下之行下無所隱其情道數十嵗事若案文書吏民驚惶不知所以人自以見識家自以蒙恩逺臣受顔色之惠坐席之間以要其死力當此之時賊檄日以一日數憂不可勝上猶以餘閒講經藝發圗䜟制告公孫述署曰公孫皇帝囂雖遣子入侍尚持兩心囂故吏馬援謂囂曰到朝廷凡數十自古世主未嘗有明主如此也材智驚人其勇非人之敵開心見誠與人語好醜無所隠諱圗講天下事極盡下恩兵事方略量敵校勝闊逹多大節與髙帝等經學博覧政事文辯前世無比囂曰如卿言勝髙帝耶曰不如也髙帝大度無可無不可今上好吏事動如節度不飲酒囂大笑曰如卿言反復勝耶七年正月詔羣臣奏事無得言聖人有舊制上書以青布囊素裹封書不中式不得上既上詣北軍待命前後相屬連嵗月乃决上躬親萬幾急於下情乃令上書啓封則用不得引經書取具文字而已奏詣闕平旦上其有當見及寃結者常以日出時騶騎馳出召入其餘以次聽中使者出報即罷去如神逺近不偏幽隠上達民莫敢不用情追念前世園陵至盛王侯外戚葬埋僣侈吏民相効浸以無限詔誥天下令薄葬八年閏四月車駕西征河西大將軍竇融與五部}
