  - {type: variant, offset: 6105, length: 1, content: 懸, SBCK: 仍許赤眉求降上璽綬乃封爲畏威侯赤眉謝禄曰三輔兵多更始一旦失之遂害更始詔鄧禹牧葬}
  - {type: variant, offset: 6105, length: 1, content: 懸, krp: 仍許赤眉求降上璽綬乃封爲畏威侯赤眉謝禄曰三輔兵多更始一旦失之遂害更始詔鄧禹牧葬}
  - {type: variant, offset: 6107, length: 305, content: 宛市中百姓共提擊之或切食其舌應劭漢官儀曰幘本無巾如今半幘而已王莽無髮因為施巾故里語曰王莽頭禿施幘屋漢書贊曰王莽始起外戚折節力行以要名譽宗族稱孝師友歸仁及其居位攝政成哀之際勤勞國家直道而行動見稱述其竊位南面處非所據顛覆之勢險於桀紂而莽晏然自以黃虞復出乃始恣睢奮其威詐滔天虐民窮凶極惡毒流諸夏亂延蠻貊猶未足達其欲焉是以四海之內囂然喪其樂生之心中外憤怨遠近俱發城池不守支體分裂遂令天下城邑為墟丘壠發掘害徧生民辜及朽骨自書傳所載亂臣賊子無道之人考其禍敗未有如莽甚者也昔秦燔詩書以立私議莽誦六經以文姦言同歸殊途俱成滅亡此皆亢龍絕氣非命之運紫色䵷音蛙聲餘分閨位聖王之驅除云爾非命非天命也紫間色䵷邪音歲月之餘分為閏言皆非正也, SBCK: 霸陵}
