  - {type: variant, offset: 470, length: 716, content: 學問民所疾苦議鹽鐵而罷推酤尊號曰昭不亦宜乎後漢班固昭帝述曰孝昭幼冲冢宰惟忠燕蓋譸張實叡實聰罪人斯得邦家和同魏文帝周成漢昭論曰或方周成王於漢昭帝僉高成而下昭余以為周成王體上聖之休氣稟賢妣之胎誨周邵為保傳呂尚為太師口能言則行人稱辤足能履則相者導儀目厭威容之美耳飽仁義之聲所謂沉漬玄流而沐浴清風者矣猶有咎悔聆二叔之謗使周公東遷皇天赫怒顯明厥咎猶啟金滕稽諸國史然後乃寤不亮周公之聖德而信金縢之教言豈不暗哉夫孝昭父非武王母非邑姜養帷蓋主相則桀光體不承聖化不胎育保無仁孝之質佐無隆平之治所謂生於深宮之中長於婦人之手然而德與性成行與體并年在二七早知夙達發燕書之詐亮霍光之誠豈有金縢信國史而後乃寤哉使夫成昭均年而立易世而化質臣而治換樂而歌則漢不獨少周不獨多魏丁儀周成漢昭論曰成王昭帝俱以襁褓之幼託於冢宰流言讒興此其艱險相似者也夫以發金滕然後垂泣計日力便覺詐書明之遲速既有差矣且叔父兄子非相嫌之處異姓君臣非相信之地霍光罹人謗而不出周公賴天變而得之推此數者齊本而論末計重而量輕漢昭之優周成甚明者也成王秀而獲實其美在終昭帝苗而不秀其得在始必不得已而論二主余與夫始者也廢帝海昏侯漢書曰昌邑哀王髆天漢四年立十一年薨子賀嗣立十三年昭帝崩無嗣大將軍霍光徵王駕典喪王乘傳詣大安邸夜漏未盡一刻以火發書其日中賀發晡時至定陶行百三十五里侍從者馬死相望於道郎中令龔遂諫王令還郎謁者五十餘人賀到濟陽求長鳴雞道買積竹杖文穎注曰合竹作杖也過弘農使大奴善以衣車載女子旦至廣明東都門遂曰禮奔喪望見國都哭此長安東郭門也賀曰嗌痛不能哭至城門遂復言賀曰城門等耳旦至未央宮東闕遂曰昌邑帳在是闕外馳道北文穎曰吊哭帳未至帳所有南北行道馬足未至數步大王宜下車也嚮闕西面伏哭盡哀止王曰諾到哭如儀王受, WYG: ''}
