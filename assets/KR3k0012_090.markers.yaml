  - {type: variant, offset: 30, length: 1, content: 母, WYG: 上復進二公兵却諸部乗之斬首數百千級連勝遂令輕足將書與城中諸將言宛下兵復到而陽墜其書二公得書讀之恐上遂選精兵三千人從城西水上奔衝二公兵於是大奔遂北殺司徒王㝷而昆陽城中兵亦出中外並擊㑹天大雷風暴雨下如注水潦滍川盛溢二公大衆遂亂奔赴水溺死者以數萬滍水為之不流王邑嚴尤陳茂輕騎乗死人渡滍水逃去漢軍盡獲其珎寳輜重車甲連月不盡五月齊武公拔宛城六月上破二公於昆陽破宛後數日收伯升部將劉稷而伯升强爭之更始遂用譖愬復収伯升即日皆物故上在父城徵詣宛拜上為破虜大將軍封武信侯更始欲北之雒陽以上為司𨽻校尉先到雒陽整頓宫府三輔吏士東迎更始見諸將過者已數十軰皆冠幘衣婦人衣諸于繡䘿諸于大掖衣也如婦人之旌衣䘿音屈揚雄方言曰䄡褕其矩者自闗之西謂之䘿據此是諸于上加繡䘿如今半臂也大為長安所笑知者或畏其衣犇亡入邊避之及見司𨽻官屬皆相指視之極望老吏或垂涕曰復見漢官儀體賢者蟻附更始以上為大司馬遣之河北十月上持莭度孟津鎮撫河北安集百姓}
