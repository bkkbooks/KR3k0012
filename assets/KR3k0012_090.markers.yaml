  - {type: variant, offset: 4957, length: 508, content: 聞莽至高廟拜受金匱還坐未央前殿下書即真天子位號曰新以十二月癸酉為建國元年莽按符命求得王盛從布衣登用百官並改名又改長安為常安立祖廟五親廟四又更作小錢與前大錢為二品百姓不便農商失業民人至泣於市道遣五威將王奇班符命四十二篇五威將乘乾文車駕坤六馬背負鷩鳥之毛服飾甚偉長安狂女子碧呼道中曰高皇帝大怒趨歸我國不者九月必殺汝莽捕殺之更名匈奴為降奴是時有用方技待詔黃門者或問莽形貌待詔曰莽所謂鴟目虎吻豺狼之聲故能食人亦當為人所食問者告之莽誅待詔後常翳雲母屏風非親近莫得見也更名高句驪為下句驪五年文母皇太后崩立廟長安新室世世獻祭先帝配食坐於床下又明六筦之令犯禁者至死臨淮瓜田儀姓瓜田名儀為盜賊琅耶女子呂母亦起莽之南郊鑄作威斗若北斗欲以厭勝眾兵莽見盜賊起乃命令太史推三萬六千歲曆紀六年一改元布天下大募天下丁男及死罪囚吏民奴名曰豬突狶勇以為銳卒莽見盜賊多欲規為自安遂營長安城南堤封百頃親舉築三千即言符命黃帝以百二十女致仙乃遣分行天下愽採淑女莽夢見長樂宮銅人起立惡之尚方鐫滅銅人膺文又令虎賁武士入高廟杖劍四面提擊桃湯赭鞭鞭灑屋壁又言黃帝建華蓋以登仙乃造之百官竊言此似轜車非仙物也莽知西方潰叛乃遣分行天下井田眾制會世祖與兄齊武王等功拔棘陽立劉, SBCK: ''}
