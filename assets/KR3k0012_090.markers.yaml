  - {type: variant, offset: 3990, length: 807, content: 文辭方外百蠻無思不服休徵嘉應頌聲並作至乎變異見於上民人怨於下莽亦不能文也少帝孺子漢書曰孝平皇帝崩無子嗣絕宣帝曾孫有五人王莽惡其長也兄弟不得相後乃徵宣帝玄孫廣威侯嬰年二歲記以卜相最吉莽遂居攝如周公故事改曰居攝元年三月立嬰為皇太子號曰孺子建國元年乃策命孺子以為安定公莽執孺子手流涕曰今予迫皇天威命不得如周公哀歎良久孺子下殿北面稱臣百寮莫不感慟莽勑阿乳母不得與語常在四壁中至於長大不能名六畜後莽以女孫妻之帝王世紀曰嬰為孺子三年而廢為安定公十五年而失國始二年平陵方望等將嬰聚眾為天子數月更始乃殺之王莽漢書曰王莽字巨君孝元皇后之弟子也父及兄弟皆以元成世封侯輔政凡九侯五大司馬唯莽父曼早死不侯五侯侈靡莽獨孤貧因折節為儉受禮經勤身博學事母及寡㛐孤兄子行甚整又外交英俊內事諸父世父鳳疾莽侍病亂髮垢面鳳且死以託太后及帝拜黃門郎永始中封為新都侯遊者為之談說虛譽隆洽太后姉子淳于長為九卿先進在莽右莽陰求其罪因大司馬白之長伏誅莽以獲忠直遂擢為大司馬輔政欲令名譽過前人遂克己不倦歲餘成帝崩哀帝即位傅太后丁姬皆稱尊號丞相朱博奏莽前不廣尊尊之義請免為庶人乃遣就國杜門自守吏民怨訟莽者以百數元壽元年徵莽歲餘哀帝崩莽為大司馬平帝即位太后臨朝皆委政於莽群臣奏莽定策安宗廟賜號安漢公莽以女配帝欲擅權帝母衛姬及舅並留中山莽子宇恐帝大後見怨與師吳章夜持血灑莽門吏發覺之莽執宇送獄死莽因作書八篇以戒子孫宜班郡國令學官以著官簿比孝經吏人止書者八千餘人咸曰伊尹為阿衡周公為太宰帝採伊周稱號加公為宰衡又加九錫鸞輅龍旂莽又增法五十條犯者徙之西海徙者以千萬數民始怨矣平帝疾莽作策請問願以身代藏策金縢平帝崩莽惡立長乃選子嬰年三歲託以卜相最吉是月前煇光謝囂奏武功長孟通浚井得白石下有丹書文曰告安漢公莽為皇帝符命之興自此始矣群臣奏安漢公居攝踐祚服天子黻冕南面朝群臣車服出入如天子郊祀天地贊者曰假皇帝民臣謂之攝皇帝自稱曰予改元曰居攝二年東郡太守翟義立嚴鄉侯劉信為天子移檄郡國眾, SBCK: 冬赤眉}
