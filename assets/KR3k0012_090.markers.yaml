  - {type: variant, offset: 73, length: 0, content: '', WYG: 公曰正使成帝復生天下不可復得也况詐子輿乎長威請降得萬戸侯公曰一戸不可得長威曰邯鄲雖鄙君臣併力城守尚可支一嵗終不君臣相率而降但得全身可也辭去而郎少傅李立反郎開城門漢兵破邯鄲誅郎入宫收文書得吏民謗毁公言可繫者數千章公㑹諸將燒之曰令反側者自安也更始遣使者持節立公為蕭王諸將議上尊號上不許上發薊至中山諸將復請上尊號初王莽時上與伯升}
