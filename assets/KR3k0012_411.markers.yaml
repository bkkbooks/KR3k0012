  - {type: variant, offset: 2112, length: 0, content: '', SBCK: 便得痊差又曰宋承字丗林父資喪葬舊塋􅀒土作墳不役僮僕一夕間土壤自髙五尺松竹生焉又曰韋俊字文髙京兆杜陵人甞與其父共有所之夜宿逆旅時多虎將曉虎遶屋號吼俊乃岀户當之虎弭耳屈膝伏}
  - {type: page-break, offset: 2112, content: '', id: KR3k0012_SBCK_411-7b}
  - {type: variant, offset: 2112, length: 0, content: '', WYG: 便得痊差又曰宋承字世林父資喪𦵏舊塋負土作墳不役僮僕一夕間土壤自高五尺松栢生焉又曰韋俊字文高京兆杜陵人嘗與父共有所之夜宿逆旅時多虎將曉虎遶屋號吼俊乃出户當之虎弭耳屈膝伏}
  - {type: page-break, offset: 2112, content: '', id: KR3k0012_WYG_411-12a, image: WYG0896/WYG0896-0608a.png}
  - {type: variant, offset: 2112, length: 0, content: '', krp: 便得痊差又曰宋承字丗林父資喪葬舊塋負土作墳不役僮僕一夕間土壤自髙五尺松竹生焉又曰韋俊字文髙京兆杜陵人甞與其父共有所之夜宿逆旅時多虎將曉虎遶屋號吼俊乃岀户當之虎弭耳屈膝伏}
  - {type: variant, offset: 2113, length: 0, content: '', SBCK: 不動俊跪曰汝飢可食我不冝驚吾親老虎逡廵而退屋人皆安全又曰伍襲字丗長武陵人父没羌中乃學羌語言衣服與賔客入搆羌諸令相攻襲乗其仇戎讎羌􅀒䘮而歸葬畢因居墓所毎哭輙有鹿踞墳而鳴漢法死事之􅀌皆拜郞中而襲不忍受吏迫之乃掘室逃其中吏不知處又曰繆斐東海蘭陵人父忽患醫藥不給斐夜叩頭不寢不食氣息將盡至三更中忽有二神引鏁而至求斐曰尊府君昔經見侵故有怨報君至孝所感昨爲天曹攝録斐驚起視父巳差父云吾昔過伍子胥廟引二神像置地當是此耳又曰紀邁廬江人本姓舒以五月五日生母棄之村人紀淳妻趙氏養之年六歳本父母時來看語曰汝是我生邁泣涕告趙趙乃具言始末及年十歳傭力所得輙分二母各半淳亡無子邁乃斬衰三年本父母繼亡又並齊衰心喪三年趙欲爲娶齎酒米徃㛰家道值醉人打趙體悶忽有一狗直至衘邁衣若此者三邁心動走赴㛰家逢醉人適共舉酌於草中邁乃以檐煞二醉人趙歸得平乃詣縣首令宥之乃誓不娶後邁甞寢忽有一女言姓衛昨忽􅁀死天神矜􅉖君無妻故使相報邁具􅀃其狀母子至衛門外果如言送喪上車牛不肯動趙乃與主人具叙􅀃之主人開柩女有氣息至曉便復蘇語具說始末如趙所言遂爲夫婦趙卒邁絶復􅂫者日數四邁年五十甞病幾死夢神曰君行至孝延暦將得百歳果九十七而卒又曰王靈之年十三喪父二十年塩醋不入口􅀍病著牀忽有一人來問疾謂之曰飡橘當差俄而不見之庭中橘樹隆冬乃有三實食之病尋愈咸以至孝所感㑹稽典録曰虞國少有孝行後爲日南太守常有􅀟鴈􅀫㕔事毎出行縣飛逐其車旣卒於官逐喪還至餘姚於墓前歷三年乃}
  - {type: page-break, offset: 2113, content: '', id: KR3k0012_SBCK_411-8a}
  - {type: page-break, offset: 2113, content: '', id: KR3k0012_SBCK_411-8b}
  - {type: variant, offset: 2113, length: 0, content: '', WYG: 不動俊跪曰汝饑可食我不宜驚吾老親虎逡廵而退屋人皆安全又曰伍襲字世茂武陵人父没羌中乃學羌語言衣服與賔客入構諸羌令相攻襲乘其仇羌負喪而歸葬畢回居墓所每哭輒有鹿踞墳而鳴漢法死事之孤皆拜郎中而襲不忍受吏廹之乃掘室逃其中吏不知處又曰繆裴東海蘭陵人父忽患病醫藥不給裴夜叩頭不寢不食氣息將盡至三更中忽有二神引鏁而至求裴曰尊君昔經見侵故有怨報君至孝所感昨為天曹攝録裴驚起視父已差父云吾昔過伍子胥廟引二神像置地當是此耳又曰紀邁廬江人本姓舒以五月五日生母棄之村人紀淳妻趙氏養之年六嵗本父母時來看語曰汝是我生邁泣涕告趙趙乃具言始末及年十嵗傭力所得輒分二母各半淳亡無子邁乃斬衰三年本父母繼亡又並齊衰心喪三年趙欲為娶齎酒米往婚家逢醉人打趙體悶忽有一狗直至銜邁衣者三邁心動走赴婚家逢醉適共舉酌於草中邁乃以擔殺二醉人趙歸得平乃詣縣首令宥之邁乃誓不娶後邁嘗寢忽有一女言姓衛昨忽暴死天神矜愍君無妻故使相報邁具説其狀母子至衛門外果如言送喪上車牛不肯動趙乃與主人具叙説之主人開柩女有氣息至晚便語具説始末如趙所言遂為夫婦趙卒邁絶復蘇者數四邁五十嘗病幾死夢神曰君行至孝延歴將得百嵗果九十七而卒又曰王靈之年十三喪父二十年鹽醋不入口被病在牀忽有一人來問病謂之曰飡橘當差俄而不見庭中橘樹隆冬乃有三實食之病愈咸以至孝所感㑹稽典録曰虞國少有孝行後為日南太守常有雙鴈宿㕔事每出行縣飛逐其車既卒於官逐喪還至餘姚於墓前歴三年乃}
