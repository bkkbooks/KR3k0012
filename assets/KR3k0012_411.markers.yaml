  - {type: variant, offset: 2088, length: 0, content: '', SBCK: 明帝光武弟四子隂后所生即祚長思逺慕至踰年迺率諸王侯公主外戚郡國計吏上陵如㑹殿前禮正月上謁原陵夢先帝太后如平生親率百官上陵其日降甘露積於樹百官取以薦㑹畢上伏御牀視太后鏡奩中物感慟悲涕令易脂澤粧具左右皆泣莫能仰視又曰姜詩字士遊廣漢雒人遭值年荒與婦傭作養母賊經其里束兵安歩云不可驚孝子母好飲江水児常取水溺死夫婦痛恐母知詐云行學歳作衣投于江中俄而涌泉出於舎側味如江水井旦出鯉魚一􅀟謝承後漢書曰方儲字聖明丹陽歙人㓜䘮父事母母終自􅀒土成墳種竒樹千株白兎遊其下魏略曰程堅字謀角南陽人居貧以磨鏡給養母喪哀號􅇫下有馬毎聞堅哭輙淚岀暫輟芻草晉書曰王祥性至孝継母朱氏不慈猶令除掃牛下祥愈恭謹父母有疾衣冠不解母令守㮈實毎風雨至抱樹而立母又思黄雀炙忽有十數黄雀飛入幕以共母食又母冬月欲食生魚祥脫衣剖冰求之􅀟鯉躍出郷里以爲孝感所致又曰吴隱之字處黙年十歳丁父憂毎號哭行人爲流涕家貧無人鳴皷毎至號哭之時有􅀟鶴警呌及祥練之夕復有群鴈俱集時人咸以孝感所致晉中興書曰何􅄾字萬倫遭母憂停柩在殯爲鄰火所逼煙熖巳交家乏僮役計無從出乃匍匐棺所號哭而巳俄而風止火息堂屋一間乃免又曰烏程吴逹徃經飢饉父母兄嫂及群從小㓜之親十有三人逹病篤鄰里咸葦褁衣而埋之親属皆盡存者唯逹夫妻而巳家徒四壁晝則傭賃夜還燒塼伐木夜在山中屢遇虎虎下道避之夫妻勤苦朞年中成七墓十二棺鄰里嘉上其志義葬日悉出助之太守張崇之義其志行加羔鴈之禮命􅀘功曹史逹以門寒固辭不就蕭子􅂋齊書曰永興王氏女年五歳得毒病兩目皆盲性至孝年三十父死臨尸一呌眼皆血出小妺娥舐其血左目即開時人稱爲孝感崔鴻十六國春秋前趙録曰劉殷七歳䘮父哀毀過禮曽祖母王氏盛冬思堇殷年九歳乃於澤中慟哭収涙視地見有堇生焉得斛餘而歸食而不減至堇生乃盡其夜夢人謂殷曰西籬下有粟窹而掘之得粟十五鐘焉銘曰七年粟百石以賜孝子劉敦自是食之七年乃盡又曰王延字延元西河人也九􅀊喪母後母卜氏遇之無道延供事彌謹卜恒取蒲穰及敗麻頭與延貯衣其姑聞而問之延知不言卜盛冬􅃙延云思生魚延求魚不􅀗卜杖之流血延尋汾叩凌而哭得生魚一􅃗長五尺卜食之積日不盡爾乃心寤撫延如親子􅁗記曰符健皇始元年晋}
