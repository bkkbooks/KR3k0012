  - {type: variant, offset: 2420, length: 492, content: 九持憲綱欲與汝相面汝必得御史澳不荅溫曰高君端士汝不可輕澳曰然恐無呈身御史終不詣元裕之門袁叔真隱士傳曰鶡冠者或曰楚人也隱居山林衣獘履穿以鶡為冠莫測其名因服成號著書言道家事馮煖嘗師事焉煖後顯於趙鶡冠子懼其薦己也乃與煖絕焉新序曰吳有士張胥鄙譚夫吾前交而後絕張胥鄙有罪拘將死譚夫吾合徒取之出於道而後知其夫吾輟行而辭曰吾義不同子故前交而後絕吾聞之君子不以安肆志不為危易行吾今從子是安則肆志危則易行也吾因子而生子若反拘而死闔廬聞之命吏釋之胥鄙辭曰吾義不同於譚夫吾故不受其任矣今利以是出誠以譚夫吾故免也遂觸牆而死譚夫吾聞之曰致任而不受佞也不知而出之愚也佞不可以接上愚不可以事君吾行虛矣人惡以吾力生吾亦恥以此立於世乃絕頸而死後漢朱公叔絕交論曰世之務交遊也甚矣不惇于業不忌于君犯禮以追之背公以從之事替義退公輕私重劉孝標廣絕交論曰騁黃馬之劇談縱碧雞之雄辨於是有弱冠王孫綺紈公子道不掛於通人聲未遒於雲閣是曰談交魚以泉涸而煦沫鳥因將死而鳴哀斷金由於湫隘刎頸起於苫蓋是曰窮交馳鶩之俗澆薄之倫無不操權衡秉纖纊衡所以量其輕重纊所以屬其鼻息若衡不能舉纊不能飛雖顏冉龍翰鳳雛曾史蘭薰雪白視若遊塵遇如土梗近世有樂安任昉見, SBCK: ''}
