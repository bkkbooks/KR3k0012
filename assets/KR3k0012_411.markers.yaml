  - {type: variant, offset: 2533, length: 635, content: 士張胥鄙譚夫吾前交而後絕張胥鄙有罪拘將死譚夫吾合徒取之出於道而後知其夫吾輟行而辭曰吾義不同子故前交而後絕吾聞之君子不以安肆志不為危易行吾今從子是安則肆志危則易行也吾因子而生子若反拘而死闔廬聞之命吏釋之胥鄙辭曰吾義不同於譚夫吾故不受其任矣今利以是出誠以譚夫吾故免也遂觸牆而死譚夫吾聞之曰致任而不受佞也不知而出之愚也佞不可以接上愚不可以事君吾行虛矣人惡以吾力生吾亦恥以此立於世乃絕頸而死後漢朱公叔絕交論曰世之務交遊也甚矣不惇于業不忌于君犯禮以追之背公以從之事替義退公輕私重劉孝標廣絕交論曰騁黃馬之劇談縱碧雞之雄辨於是有弱冠王孫綺紈公子道不掛於通人聲未遒於雲閣是曰談交魚以泉涸而煦沫鳥因將死而鳴哀斷金由於湫隘刎頸起於苫蓋是曰窮交馳鶩之俗澆薄之倫無不操權衡秉纖纊衡所以量其輕重纊所以屬其鼻息若衡不能舉纊不能飛雖顏冉龍翰鳳雛曾史蘭薰雪白視若遊塵遇如土梗近世有樂安任昉見一善則盱衝搤捥遇一才則揚眉抵掌雌黃出於脣吻朱紫由其月旦於是冠蓋輕湊衣裳雲合輜軿擊轊坐客恒滿及瞑目東越歸駭洛浦繐悵猶懸門罕漬酒之彥墳未宿草野絕動輪之賓藐是諸孤朝不謀夕自昔把臂之英金蘭之友曾無羊舌下泣之仁寧慕郈成分宅之德太行孟門豈云嶄絕是以耿介之士疾其若斯獨立高山之頂驩與麋鹿同群袁嶠與禇左軍解交書曰皇太后踐登正祚臨御皇朝將軍之於國外姓之太上皇也與將軍遊處少長雖世譽先後而臭味同歸平昔之交禮與數而降箕踞之欣隨位事而替雖欲虛詠濠肆脫落儀制其能得乎嵇康與山濤絕交書曰足下見直木必不為輪曲者不以為桷蓋不欲枉其天材令得其所不, WYG: 錢百萬}
