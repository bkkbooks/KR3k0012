  - {type: variant, offset: 66, length: 792, content: 魏公子一朝以百騎造之呂望未嘗與文王同席而唑一朝讓以天下半大丈夫相知何必接塵而遊垂髮齊年哉張奧與延叔堅書曰吾與叔堅剖心相知豈以流言相猜耶曹植離友詩曰王旅旋兮背故鄉彼君子兮篤人綱騰駕行兮歸朔方馳原隰兮尋舊疆郭璞贈溫嶠詩曰人亦有言松竹有林及爾臭味異本同岑言以忘得交以淡成謝眺贈友人詩曰芳洲有杜若可以贈佳期清風動簾夜孤月照窗時安得同攜手酌酒賦新詩陸倕贈京邑僚友詩曰時逢世道泰騫足步高衢江間寒事早夜露傷秋草心屬姑蘇臺目送邯鄲道李郭或同舟潘夏時方駕歡娛終美景敷文永清夜捉膝豈異人戚戚皆明婭蕭鈞晚景遊泛懷友詩曰龍門低御溝鳳轄轉芳州雲峰初辯夏麥氣早迎秋山翠餘煙積川平晚照收浪隨文鷁轉波逐彩鴛浮風花輕未洛巖泉咽不流一辭金谷菀空想竹林遊潘岳詩曰投分寄石友白首同所歸古善哉行曰月沒參橫北斗闌干親友在門忘寢與飡請交不許後漢書曰侯霸欲友王丹霸子見丹下車拜丹荅拜霸子曰大人方願交歡奈何拜小子丹曰君房有是言丹未之許也又曰張霸遷侍中時皇后兄虎賁中郎將鄧騭當朝貴戚聞霸名行欲與為交逡巡不荅眾笑其不識世務魏志曰將軍張遼與其護軍武周有隙遼就刺史溫恢求交胡質質辭以疾遼出遇質曰僕安意於君何以相孤如此質曰古人之交也多取知其不貪奔北知其不怯聞流言而不信故可終也武伯南身為雅士往者將軍稱之不輟於口今以睚眥之恨反成嫌隙況質才薄豈能終好是以不願也遼感其言復與周平蜀志曰劉巴字子初零陵先賢傳曰張飛嘗就巴宿巴不與語飛遂忿恚諸葛亮謂巴曰飛雖實武人愛慕足不足下雖天爵素高宜少降意巴曰丈夫處世當交四海英雄如何與兵子共語晉書曰解系字少連濟南人也系及二弟結育並清身潔己甚有聲譽時荀勗門宗弘盛勗諸子謂系等曰我與卿為友應向我公拜勗曰我與君尊先使君親厚系曰不奉先君遺教公若與先君厚往日哀頓當垂書問親厚之誨非所敢承勗父子大慚梁書曰庾詵字彥實新野人也性純夷簡罕所遊狎河東柳惲欲與之交拒而不許齊春秋曰王僧祐字喬宗亭然獨立不交當代名士王思遠之徒託意請交並不降意自, SBCK: ''}
