  - {type: variant, offset: 2091, length: 0, content: '', WYG: 咸稱至行所感乂曰呉悉達河東聞喜人父母為人所殺四時號慕悲感鄉鄰及長報仇避地永安後欲改葬嵗月淹久亡失墳墓連年於聞喜舊鄉推㝷弗獲號哭之聲晝夜不止周遊廵歴呌訴神祗忽於悉達足下地䧟得父銘記因葬曾祖已下三世九喪後周書云張元字孝始芮城人年十六祖喪明三年元居憂泣遂請七僧燃七燈七日七夜轉藥師經行道言曰元為孫不孝使祖喪明今日燃燈光普施法界願祖目見明元求代闇如此七日其夜夢見一老翁以金鎞療其祖目謂元曰勿憂悲也三日之後祖目必差如期果明唐書曰豫州人許坦年十嵗餘隨父入山採藥父為猛獸所噬即號呌以杖擊之獸遂奔走父以得全太宗聞而謂侍臣曰坦雖㓜童遂能致命救親至孝自𠂻深可嘉尚授文林郎賜物五十段又曰博州梁文貞虢州閿鄉人少從征役北廻父母皆卒文貞恨不獲終養乃穿壙為門磴道出入晨夕灑掃其中結廬墓側未嘗蹔息自是不言三十年家人有所問但書字以對其後山水衝斷驛路更於原上開道經文貞墓前由是行旅之遠近莫不欽歎有甘露降塋前樹白馴擾開元初縣令崔季友刋石以記之十四年刺史許景先奏文貞孝行特絶泣血廬墓三十餘年請宣付史官又曰安金藏神龍初喪母葬於都南口之北廬於墓側躬造石墳石塔晝夜不息原上舊無水忽有湧泉自出又有李樹盛冬花開犬鹿相擾蕭廣濟孝子傳曰杜孝巴郡人也少失父}
