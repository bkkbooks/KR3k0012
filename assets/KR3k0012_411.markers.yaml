  - {type: variant, offset: 2109, length: 2, content: 書責, SBCK: 貽母後孫恩亂聚得數􅂛常帶自隨及逃竄多有餓死遺食此得活母晝夜泣涕目爲失明耳無所聞遺還入户再拜號咽母豁然有聞見又曰韓靈珍東海郯人䘮母三年貧無所葬與弟靈敏共種􅋎半畒欲以營殯及􅀲熟採賣毎朝取暮復生大小如􅀄遂得充葬又曰夏侯訢字長況梁國寧陵人也母疾屢經危困訢衣不釋帶二年母不忍見其辛苦使岀便寢息訢岀便卧忽夢見其父來曰汝母病源深痼天常矜汝至孝賜藥在屋後桑樹上訢乃驚起如言得藥而取水和進}
  - {type: variant, offset: 2109, length: 2, content: 書責, WYG: 貽母後孫恩亂聚得數升常帶自隨及逃竄多有餓死遺食此得活母晝夜涕泣目為失明耳無所聞遺還入户再拜號咽母豁然有聞見又曰韓靈珍東海郯人喪母三年貧無所葬與弟靈敏共種𤓰半畝欲以營殯及𤓰熟採賣毎朝取暮復生大小如初遂得充葬又曰夏侯訴字長泥梁國寜陵人也母疾屢經危困訴衣不釋帶二年母不忍見其辛苦使出便寢息訴出便卧忽夢見其父來曰汝母病源深痼天帝矜汝至孝賜藥在屋後桑樹上訴乃驚起如言得藥而取水和進}
