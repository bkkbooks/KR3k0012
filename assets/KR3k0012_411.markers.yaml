  - {type: variant, offset: 2092, length: 2, content: 京邑, SBCK: 父驃共走避賊驃年老行遲賊轉逼驃語我不能去汝走可脫幸勿俱死驃因之坐地綜迎賊叩頭曰父年老乞賜生命賊至驃亦請賊曰兒年少自能走今爲孝子不去老子不惜死乞活此兒賊因斫驃綜抱父於腹下賊斫綜頭面凢四創綜當時悶絶又一賊從傍來相謂曰卿欲舉大事此兒以死救父尔何可煞煞孝子不祥賊乃止父子乃得免齊書曰匡昕字令先廬陵人有至性隱金華山服食不與俗人交母病亡已經七月昕奔還號呌母即蘇皆謂孝感所致齊春秋曰宗元卿字希符早􅀌爲祖母所養祖病元卿在逺輙心痛大病則大痛小病則小痛如此常也又曰焦華父遺曽病甚冬中思􅀲華忽夢人謂之曰聞爾父思􅀲故送助養呼從者進之華跪受寤而􅀲在手香非常也父食之而病愈又曰劉靈哲字文明母病祈禱至多忽夢一人以藥與之曰煑服之即差驚窹於枕間得所夢之藥似竹根服之立差餘根於齋前種葉似􅝀茈莫有識者又曰}
  - {type: page-break, offset: 2092, content: '', id: KR3k0012_SBCK_411-3b}
  - {type: variant, offset: 2092, length: 4, content: 京邑蕭友, WYG: 母居至孝􅂶役在成都母喜食生魚孝於蜀截大竹筒盛魚二頭塞之以草祝曰我母必得此因投中流婦出渚乃見筒横來觸岸異而取視有二魚含笑曰必我壻所寄熟而進之聞者歎駭又曰邢渠失母與父仲居性至孝貧無子傭以給父父老齒落不能食渠常自哺之專專然代其喘息仲遂康休齒落更生百餘嵗乃卒也又曰隗通字君相母好飲江水常乘舟擑置之漂浚艱辛忽有横石特起直趨江脊後取水無復勞劇又曰辛繕字㓜文母喪精廬旁有大鳥頭高五丈雞首鸞領魚尾虵頸備五色而青棲于門樹又曰文讓養母至孝及喪不用僮僕之力兄弟二人營築其墳暫取歸糧羣鹿數千衘壤俄而成墳小説曰宋宜都王鑑三嵗喪母及有識問母所在左右告以早亡便慕蔬食祈請幽冥求一夢至六嵗夢見一婦人謂之曰我是汝之母鑑悲泣旦説之容貎衣服事事如平生也世説曰鄭子産}
