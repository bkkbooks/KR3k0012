  - {type: variant, offset: 2201, length: 1, content: 淺, krp: 服其至孝朝野僉載曰崔渾爲侍御史清白温恭能盡色養父母母小不康輙祈幽請以身代母甞有疾渾跪請病受已有頃覺疾從十指入俄而遍身母所苦遂愈丁父艱勺飲不入口毁脊骨立無何不勝哀而卒朝野傷心御史臺記曰崔希喬清河人也以孝悌稱解褐臨清尉丁母憂哀毀殆至滅性服闋𥙷鄭縣尉清介公方聞乎京邑轉鄭縣丞所居堂芝草生焉一暝而葩盖盈尺矣州以狀申歳餘遷監察出授并州兵曹轉慿翊令人吏畏愛風化大行貧弱之輩荷其仁恕時有雲如盖當其㕔事斯湏五色雜綵周於縣郭道俗仰望乆之以狀聞勑編諸國史尋迁司勲貟外其并州㕔前有叢葦小鳥來巢如鷦鷯矣孕卵纔數日毁而見已諭於母矣枝且不勝墜于地月餘五色成文如鵝馴擾閑睱無復驚懼泊能飛翔時歸舊所人到于今稱爲兵曹鳥𥘉居喪管城每一哭群鳥畢集至于萬數墻宇皆遍至有樹條折者周於原野村鄰嗟稱之毎所居其巢燕敷乳必返哺踰旬後分飛矣此孝義感通也史系曰趙儁字子竒平陽岳陽人也父聃爲縣西曹書佐嗜酒夜歸里墅撗卧途中儁年十八見父歸遲即尋迎之父酔負}
  - {type: variant, offset: 2204, length: 1, content: 議, SBCK: 勝脫已衣覆之是時冬中沍寒方甚儁單衣而已岳陽山多􅋧獸夜有豹視之爲之歧道而去將旦與父同歸縣吏異之時人以儁孝感所致父卒不呼相者自營丘封有白鵲常遊於其家􅀥樹儁毎朝夕臨鵲爲之悲鳴終䘮而去㑹潞帥劉稹反家近潞封軍士齊討民散走時儁母年八十餘唯一子乃平其父墓别以}
  - {type: page-break, offset: 2204, content: '', id: KR3k0012_SBCK_411-10b}
