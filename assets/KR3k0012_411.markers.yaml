  - {type: variant, offset: 2121, length: 2, content: 東海, SBCK: 楊範以資給母劉向孝子圖曰郭巨河内温人甚冨父没分財二千萬爲兩分與兩弟巳獨取母供養􅀉住鄰有凶宅無人居者共推與之居無禍患妻産男慮養之則妨供養乃令妻抱兒欲掘地理之於土中得金一釡上有鐡劵去賜孝子郭巨巨還宅主宅主不敢受遂以聞官官依劵題還巨遂得兼養兒又曰前漢董永千乗}
