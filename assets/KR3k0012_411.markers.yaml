  - {type: variant, offset: 2197, length: 3, content: 王弼為, SBCK: 丁宻字靖公遭父憂寢於塚側致飛鳬一􅀟㳺宻廬旁小池後遭母喪宻至所居一􅀫故時􅀟鳬復來時}
  - {type: variant, offset: 2197, length: 2, content: 王弼, WYG: 丁宻字靖公遭父憂寢於塜側致飛鳬一雙逰宻廬旁小池後遭母喪宻至所居一宿故時雙鳬來時人服其至孝朝野僉載曰崔渾}
  - {type: variant, offset: 2197, length: 3, content: 王弼為, krp: 丁宻字靖公遭父憂寢於塚側致飛鳬一雙㳺宻廬旁小池後遭母喪宻至所居一宿故時雙鳬復來時}
  - {type: variant, offset: 2200, length: 0, content: '', WYG: 侍御史清白温恭能盡色養父母母小不康輒祈幽請以身代母嘗有病渾跪請病受已有頃覺疾從十指入俄而遍身母所苦遂愈丁父艱勺飲不入口毁瘠骨立不勝哀而卒朝野傷心御史臺記曰崔希喬清河}
  - {type: page-break, offset: 2200, content: '', id: KR3k0012_WYG_411-16a, image: WYG0896/WYG0896-0610a.png}
  - {type: variant, offset: 2201, length: 1, content: 淺, SBCK: 服其至孝朝野僉載曰崔渾爲侍御史清白温恭能盡色養父母母小不康輙祈幽請以身代母甞有疾渾跪請病受已有頃覺疾從十指入俄而遍身母所苦遂愈丁父艱勺飲不入口毁脊骨立無何不勝哀而卒朝野傷心御史臺記曰崔希喬清河人也以孝悌稱解􅄄臨清尉丁母憂哀毀殆至滅性服闋􅀘鄭縣尉清介公方聞乎京邑轉鄭縣丞所居堂芝草生焉一暝而葩盖盈尺矣州以􅃺申歳餘遷􅁥察出授并州兵曹轉慿翊令人吏畏愛風化大行貧弱之輩荷其仁恕時有雲如盖當其㕔事斯湏五色雜綵周於縣郭道俗仰望乆之以􅃺聞勑編諸國史尋迁司勲貟外其并州㕔前有叢葦小鳥來巢如鷦鷯矣孕􅆑􅂊數日毁而見已諭於母矣枝且不勝墜于地月餘五色成文如鵝馴擾閑睱無復驚懼泊能飛翔時歸舊所人到于今稱爲兵曹鳥􅀄居喪管城每一􅂘群鳥畢集至于萬數墻宇皆遍至有樹條折者周於原野村鄰嗟稱之毎所居其巢燕敷乳必返哺踰旬後分飛矣此孝義感通也史系曰趙儁字子竒平陽岳陽人也父聃爲縣西曹書佐嗜酒夜歸里墅撗卧途中儁年十八見父歸遲即尋迎之父酔􅀒}
  - {type: page-break, offset: 2201, content: '', id: KR3k0012_SBCK_411-10a}
  - {type: variant, offset: 2201, length: 1, content: 淺, WYG: 也以孝悌稱解褐臨清尉丁内憂哀毁殆至滅性服闋補鄭縣尉清介公方聞乎京邑轉鄭丞所居堂芝草生焉一暝而葩葢盈尺矣州以狀申嵗餘遷監察出授并州兵曹轉馮翊令人吏畏愛風化大行貧弱之軰稱其仁恕時有雲如葢當其㕔事須臾五色雜綵周於縣郭道路仰望久之狀聞勅編諸國史㝷遷司勲員外其并州㕔前有叢葦小鳥來巢如鷦鷯矣孕卵纔數日􅀈毁而見已踰於母矣枝且不勝墜於地月餘五色成文如鵝馴擾閒暇無復驚懼洎能飛翔時歸舊所人到于今稱為兵曹鳥所居喪管城每一哭羣鳥畢集至千萬牆宇皆遍至有樹梢折者周於原野村鄰嗟稱之每所居其巢燕乳敷必返哺踰旬後分飛矣此孝義通也史系曰趙雋字子竒平陽岳陽人也父稱為縣西曹書佐嗜酒夜歸里墅横卧途中雋年十八見父歸遲即尋迎之父醉負}
