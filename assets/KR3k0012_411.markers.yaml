  - {type: variant, offset: 1166, length: 917, content: 祖父建少遊長安與崔篆仕王莽為建新大尹僖與崔篆孫駰復相友善焉晉書曰咸寧初有司奏何劭及兄遵等受故鬲令袁毅貨雖經赦宥宜皆禁止事下廷尉詔曰太保與毅有累世之交遵等所取蓋薄一皆置之父子交左傳襄五年曰初伍參與蔡太師子朝友其子伍舉與聲子相善聲子子朝之子也伍舉出奔鄭將遂奔晉聲子將如晉遇之於鄭郊班荊相與食班布也布荊坐地朋友世親也魏書曰陳群字長文通達有識度其所交皆父黨也魯國孔融與群父紀友又與群交王隱晉書曰王戎隨父渾在郎舍時阮籍亦為郎每詣渾輒云與卿語不如阿戎談戎時年十五籍乃交焉北齊書曰陸昂字雲駒洛陽人也父子璋魏中書監昂為河間邢劭所賞邢又與子璋交遊嘗謂子璋云吾以卿老蚌復出明珠高士傳曰班嗣在京師家有賜書內足於財父黨揚子雲已下莫不造門唐書曰郄士美字和夫少好學善記覽父友顏真卿肅潁士輩嘗與之討論經傳應對如流既而相謂曰吾曹異曰當交二郄之間矣汝南先賢傳曰薛勤字恭祖仕郡為功曹陳仲舉時年十五為父齎書詣勤勤顧而察之明日造焉仲舉父出迓勤勤曰足下有不凡子吾來候之不從卿也言義盡日道學論曰許邁字叔玄清虛接真遐棲世表志在往而不返故自改名遠遊與王右軍父子為世外之交王亦辭榮好養生之事每造遠遊未嘗不彌日忘返束哲吊蕭孟恩文曰東海蕭惠字孟恩者父昔為御史與哲先君同僚孟恩及哲旦夕同遊分義早著孟恩夫婦皆亡門無立嗣哲時有伯父從兄之憂未獲自往致文一篇以弔其魂絕交毛詩谷風曰谷風剌幽王也天下俗薄朋友道絕焉又曰伐木廢則朋友缺矣史記曰相國曹參始微時與蕭何善及為將相有隙又曰越石父賢在於縲紲之中晏子出遭塗解左驂贖之載歸弗謝入門久之石父請絕晏子懼然攝衣冠謝曰晏雖不仁免子於厄何求絕之速也石父曰不然吾聞君子屈於不知己而伸於知己者方吾在縲紲之中彼不知我也夫子既已感而贖我者是知己知己而無禮固不如縲紲之中漢書曰張耳陳餘始居約時相然信死豈顧問哉及據國爭權卒相滅亡勢利之交古人羞之蓋謂是矣又曰蕭育少與陳咸朱博為友著聞當世往者有王貢故長安人語曰蕭朱結綬王貢彈冠言其相薦達也始育與公卿子顯名咸最先進年二十餘為御史中丞時朱博尚為杜陵亭長為咸育所舉援後遂並歷刺史郡守相及為九卿而博先至將軍上卿歷位多於咸育遂至丞相育與博後有隙不能終故世以友為難也范曄後漢書曰許劭少峻名節好人倫多所賞識劭邑人李達杜直有高氣劭初善之而後有隙, SBCK: ''}
