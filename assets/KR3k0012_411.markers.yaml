  - {type: variant, offset: 2096, length: 0, content: '', krp: 刋石以紀之十四年刺史許先奏文貞孝行特絶泣血廬墓三十餘年請宣付史官又曰安金藏神龍𥘉䘮母葬於都南闕口之北廬於墓側躬造石墳石塔晝夜不息原上舊無水忽有湧泉自出又有李樹盛冬花開犬鹿相狎蕭廣濟孝子傳曰杜孝巴郡人也少失父與母居至孝充役在成都母喜食生魚孝於蜀截大竹筒盛魚二頭塞之以草祝曰我母必得此因投中流婦出渚乃見筒横來觸岸異而取視有二魚含笑曰必我壻所寄熟而進之聞者歎駭又曰邢渠失母與父仲居性至孝貧無子傭以給父父老齒落不能食渠常自哺之專專然代其喘息仲遂康休齒落更生百餘歳乃卒也又曰隗通字君相母好飲江水常乗舟檝置之深浚艱辛忽有横石特起直趍江脊後取水無復勞劇又曰辛繕字㓜文母䘮精廬旁有大鳥頭髙五尺鷄首鷰領魚尾虵頸備五色而青棲于門樹又曰文讓養母至孝及喪不用僮僕之力兄弟二人營築其墳蹔歸取糧群鳥數千衘壤俄而成墳小說曰宋冝都王鏗三歳䘮母及有識問母所在左右告以早亡便思慕食祈請幽冥求一夣見至六歳夣見一婦人謂之曰我是汝之母鏗悲泣旦說之容貌衣服事事如平生也丗說曰鄭子産}
  - {type: variant, offset: 2097, length: 1, content: 約, SBCK: 事母奉命聘晉道中心痛遣人還家起居問母母曰吾忽心體}
