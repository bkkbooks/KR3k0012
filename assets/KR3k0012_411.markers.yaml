  - {type: variant, offset: 2099, length: 6, content: 為陪臣及友為, SBCK: 調憶想汝耳更無他也祖台志怪曰吴中書郎盛仲至孝母王氏失明仲蹔行􅃙婢食母婢乃取蠐螬蒸食之母甚以爲美不知是何物兒還母曰汝行後婢進吾食甚甘然非魚肉汝試問之旣而問婢婢服曰實是螬蠐仲抱母慟哭母目霍然立開宋躬孝子傳曰丘傑字偉跱吴興烏程人也遭母䘮以熟菜有味不甞於口病歳餘忽夢見母曰死正是分別耳何事乃爾荼苦汝噉生菜遇蝦蟆毒靈牀前有甌甌中三丸藥可取服之傑驚起果得甌甌中有藥服之下科斗子數􅂛丘氏丗寳此甌宋大明七年災火焚失之又曰陳遺吴郡人少爲}
  - {type: variant, offset: 2099, length: 0, content: '', WYG: 調憶想汝耳更無他也祖洽志怪曰呉中書郎盛仲至孝母王氏失明仲蹔行勑婢食母婢乃取蠐螬蒸食之母甚以}
