  - {type: variant, offset: 2092, length: 2, content: 京邑, krp: 父驃共走避賊驃年老行遲賊轉逼驃語我不能去汝走可脫幸勿俱死驃因之坐地綜迎賊叩頭曰父年老乞賜生命賊至驃亦請賊曰兒年少自能走今爲孝子不去老子不惜死乞活此兒賊因斫驃綜抱父於腹下賊斫綜頭面凢四創綜當時悶絶又一賊從傍來相謂曰卿欲舉大事此兒以死救父尔何可煞煞孝子不祥賊乃止父子乃得免齊書曰匡昕字令先廬陵人有至性隱金華山服食不與俗人交母病亡已經七月昕奔還號呌母即蘇皆謂孝感所致齊春秋曰宗元卿字希符早孤爲祖母所養祖病元卿在逺輙心痛大病則大痛小病則小痛如此常也又曰焦華父遺曽病甚冬中思瓜華忽夢人謂之曰聞爾父思瓜故送助養呼從者進之華跪受寤而瓜在手香非常也父食之而病愈又曰劉靈哲字文明母病祈禱至多忽夢一人以藥與之曰煑服之即差驚窹於枕間得所夢之藥似竹根服之立差餘根於齋前種葉似􅝀茈莫有識者又曰}
  - {type: variant, offset: 2095, length: 0, content: '', SBCK: 叡明字景懠在計切母病風積年晝夜祈禱時寒叡明下淚爲氷筯額上叩血出亦氷不流忽有一人以小石凾授之曰此能治丈夫百病叡明受之忽不見人以亟奉母唯有三寸絹丹書爲日月字母即平愈又曰解叔謙字楚梁母有疾於夜庭中祈祠聞空中云此疾無他得丁公藤爲酒便差即詣醫及本草皆無識者乃求訪至冝都遥覩山中一老翁伐木問其所用荅曰此丁公藤治風尤驗叔謙伏地流涕具􅅃求意此公與之四叚并示漬酒法叔謙拜領受之復視翁不見依法爲酒母疾頓愈梁書曰陸囊字師伯常卒心痛醫方湏三斗粟漿時屬凝冬日又暮矣求乞無所忽有老人詣門貨漿量如方斛始欲酬直無何失之時以襄孝感致焉又曰􅆇盾有孝性隨父􅀫直廷尉母劉氏在宅暴亡盾左手中指痛不得寢及曉宅信果報凶問其感通如此又曰甄恬字彦約數歳䘮父哀戚有若成人年八􅀊問其母恨不識父悲泣累日忽云有見形􅃺即其父也及母亡廬于墓有鳥玄黄色集于廬􅀣恬哭即鳴止則無聲陳書曰吴明徹㓜􅀌性至孝年十四感墳􅉷未修家貧無以取給乃勤力耕種時天下亢旱苗稼燋枯明􅜂哀憤毎之田中號哭仰天自訴居數日有田還者云苗已更生明􅜂疑其欺已及徃如言秋而大􅀗足充葬用三國典略曰柳遐母甞乳間發疽醫去湏人吮膿遐應聲即吮旬日遂瘳咸以爲孝感所致後魏書曰王崇字乾邕陽夏雍丘人也母亡扶而後起􅁂髮墮落未及遷葬權殯宅西崇廬於殯所晝夜哭泣鳩鴿群生有一小鳥素質黒眸形大於雀拪於崇廬朝夕不去母䘮始闋復丁父憂哀毀過禮是年陽夏風雹所經之處禽獸􅁀死草木摧折至崇田畔風雹便止禾麦十頃無所損落及過崇地風雹如􅀄咸稱至行所感又曰吴逺逹河東聞憙人父母爲人所煞四時號慕悲感郷鄰及長報仇避地永安後欲改葬歳月淹乆亡失墳墓連年於聞熹舊郷推尋弗􅀗號哭之聲晝夜不止周逰廵歴呌訴神祈忽於逺逹足下地䧟得父銘記因遷葬曽祖已下三丗九䘮後周書云張元字孝始芮城人年十六祖䘮明三年元居常憂泣遂請七僧燃七燈七日七夜轉藥師經行道言曰元爲孫不孝使祖䘮明今日燃燈光普施法界願祖目見明元求代闇如此七日其夜夢見一老翁以金鞞療其祖目謂元曰勿憂悲也三日之後祖目必差如期果明唐書曰豫州人許坦年十歳餘父入山採藥父爲猛獸所噬即號呌以杖擊之獸遂奔走父以得全太宗聞而謂侍臣曰坦雖㓜童遂能致命救親至孝自􅂨深可嘉尚授文林郎賜物五十叚又曰􅀶州梁文貞􅉑州閿郷人少從征役比廻父母皆卒文貞恨不􅀗終養乃穿壙爲門磴道出入晨夕灑掃其中結廬墓側未甞蹔息自是不言三十年家人有所問但畫字以對其後山水衝断驛路更於原上開道經文貞墓前由是行旅之逺近莫不欽歎有甘露降塋前樹白兎馴擾開元􅀄縣令崔季}
