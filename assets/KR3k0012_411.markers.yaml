  - {type: variant, offset: 2380, length: 152, content: 韋澳貫之之子也大和六年擢進士弟兄溫與御史中丞高元俗友善溫請用澳為御史謂澳曰高二十九持憲綱欲與汝相面汝必得御史澳不荅溫曰高君端士汝不可輕澳曰然恐無呈身御史終不詣元裕之門袁叔真隱士傳曰鶡冠者或曰楚人也隱居山林衣獘履穿以鶡為冠莫測其名因服成號著書言道家事馮煖嘗師事焉煖後顯於趙鶡冠子懼其薦己也乃與煖絕焉新序曰吳, WYG: 爾舍東}
