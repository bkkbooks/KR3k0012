  - {type: variant, offset: 2913, length: 299, content: 善則盱衝搤捥遇一才則揚眉抵掌雌黃出於脣吻朱紫由其月旦於是冠蓋輕湊衣裳雲合輜軿擊轊坐客恒滿及瞑目東越歸駭洛浦繐悵猶懸門罕漬酒之彥墳未宿草野絕動輪之賓藐是諸孤朝不謀夕自昔把臂之英金蘭之友曾無羊舌下泣之仁寧慕郈成分宅之德太行孟門豈云嶄絕是以耿介之士疾其若斯獨立高山之頂驩與麋鹿同群袁嶠與禇左軍解交書曰皇太后踐登正祚臨御皇朝將軍之於國外姓之太上皇也與將軍遊處少長雖世譽先後而臭味同歸平昔之交禮與數而降箕踞之欣隨位事而替雖欲虛詠濠肆脫落儀制其能得乎嵇康與山濤絕交書曰足下見直木必不為輪曲者不以為桷蓋不欲枉其天材令得其所不可自好章甫強越人以文冕也今但願守陋巷教子孫時時與親舊敘闊陳說平生濁酒一杯彈琴一曲志願畢矣, SBCK: ''}
