  - {type: variant, offset: 2089, length: 2, content: 鴻初, SBCK: 州刺史司馬勲入秦州􅀗尚書趙琨煞而棄其尸琨子煥求父尸不得乃悲號不已俄有群鳥悲鳴從山而來來而復反尋鳥向山而得父尸南史曰潘綜吴興烏程人也孫恩之亂妖黨攻破村邑綜}
  - {type: page-break, offset: 2089, content: '', id: KR3k0012_SBCK_411-3a}
  - {type: variant, offset: 2089, length: 1, content: 鴻, WYG: 州刺史司馬勲入秦州獲尚書趙琨殺而棄其尸琨子煥求父尸不得乃悲號不已俄有羣鳥悲鳴從山而來來而復反㝷鳥向山而得父尸南史曰潘綜呉興烏程人也孫恩之亂妖黨破村邑綜與父驃共走避賊驃年老行遲賊轉逼驃語我不能去汝走可脱幸勿俱死驃因坐地綜迎賊叩頭曰父年老乞賜生命賊至驃亦請賊曰兒年少自能走今為孝子不去老子不惜死乞活此兒賊因斫驃綜抱父於腹下賊斫綜頭面凡四創綜當時悶絶又一賊從傍來相謂曰卿欲舉大事此兒以死救父不去何可殺殺孝子不祥賊乃止父子乃得免齊書曰匡昕字令先廬陵人有至性隠金華山服食不與俗人交母病已經七月昕奔還號呌母即蘇皆謂孝感所致齊春秋曰宗元卿字希符早孤為祖母所養祖母病元卿在遠輒心痛大病則大痛小病則小痛如此常也又曰焦華父遺曾病甚冬中思𤓰華忽夢人謂之曰聞爾父思𤓰故送助養呼從者進之華跪受寤而𤓰在手香非常也父食之而病愈乂曰劉靈哲字文明母病祈禱至多忽夢一人以藥與之曰煎服之即差驚寤於枕間得所夢之藥以竹根煎服之立差餘根於齋前種葉似鳬茨莫有識者又曰蕭叡明字景懠在計切母風病積年晝夜祈禱時寒叡明下淚為冰筋額上叩血出冰不流忽有一人以小石函授之曰此能治丈夫百病叡明受忽不見人以函奉母唯有三寸絹丹書為日月字母即平愈又曰解叔謙字楚梁母有疾於夜庭中祈禱聞空中云此疾無他得丁公藤為酒便差即詣醫及本草皆無識者乃求訪至宜都遥覩山中一老翁伐木問其所用答曰此丁公藤治風尤驗叔謙伏地流涕具欵求意此翁與之四叚并示漬酒法叔謙拜領受之復視翁不見依法為酒母疾頓愈梁書曰陸襄字師卿襄母嘗卒患心痛醫方須三升粟漿是時冬月日又逼暮求乞無所忽有老人詣門貨漿量如方劑始欲酬直無何失之時以襄孝感致焉又曰臧盾有孝性隨父宿直於廷尉母劉氏在宅暴亡盾左手中指忽痛不得寢及曉宅信果報凶問其感通如此又曰甄恬字彦約數嵗喪父哀戚有如成人年八嵗問其母恨不識父悲泣累日忽若有見言其形狀則其父也及母亡廬于墓有鳥𤣥黄色集于廬樹恬哭則鳴止則無聲陳書曰呉明徹㓜孤性至孝年十四感墳塋未備家貧無以取給乃勤力耕種時天下亢旱苖稼燋枯明徹哀憤每之田中號哭仰天自訴居數日自田還者云苖已更生明徹疑其欺已及往如言秋而大獲足充葬用三國典略曰柳遐母嘗乳間發疽醫云須人吮膿遐應聲即吮旬日遂瘳咸以孝感所致後魏書曰王崇字乾邕陽夏雍邱人也母亡杖而後起鬂髮墮落未及還葬柩殯宅西崇廬於殯所晝夜哭泣鳩鴿羣至有一小鳥素質黑眸形大於雀栖於崇廬朝夕不去母喪始闋復丁父憂哀毁過禮是年陽夏風雹所經之處禽獸暴死草木摧折至崇田畔風雹便止禾麥十頃無所損落及過崇地風雹如}
