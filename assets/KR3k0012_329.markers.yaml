  - {type: variant, offset: 2635, length: 430, content: 國典略曰十一月癸未梁主閱戎于津陽門外立二城南為吳地北為虜城西北風甚急溥天昏暗幡旗南靡乃移虜軍度南城吳軍度北城以順風也俄而驟雨暴降梁王輕輦還宮至城而霽觀者怪之又曰太原郡王高洋督兵攻王思政陷于潁川遂入東魏先是長社夜有聲如車騎從西北向城居二日黑風起於乾地吹水入城城壞風羊角而上又曰侯瑱敗王琳于梁山琳及蕭莊並奔于齊初東關水舟艦得通琳引合肥之眾相次而下瑱與琳合戰琳軍少却退保西岸及夕東北風大起吹其舟艦沒于沙中夜有流星墜於琳營及旦風靜琳入浦脩舡以鹿角繞岸不敢復出六韜曰周武王伐紂師至泥水牛頭山風雨甚疾鼓旗毀折王之驂乘惶震而死太公曰用兵者順天道未必吉逆之不必凶若失人事三軍敗亡且天道鬼神視之不見聽之不聞智將不發而愚將拘之若乃好賢而能用舉事而得此則不看時日而事利不暇卜筮而事吉不禱祝而福從遂命驅之前進周公曰今時逆太歲龜灼凶卜筮不吉星變為災請還師太公怒曰今紂刳比干囚箕子以飛廉為政伐之有何不可枯草朽骨安可知乎乃焚龜折蓍援抱而鼓率眾先涉河武王從之遂滅紂又曰從孤擊虛高人無餘一女子當, WYG: ''}
