  - {type: variant, offset: 3153, length: 159, content: 宜王曰二四凶不祥不可舉事太公進曰退非子之所及也聖人生天地之間承衰亂而起龜者枯骨蓍者折草何足以辯吉凶祖行之日雨輜車至軫是洗濯甲兵也行之日幟旗為三是軍分為三如此斬紂之首吉也抱朴子曰晉太康二年京邑始亂三國舉兵攻長沙王人小民張昌反於荊州奉劉尼為漢主乃遣石水擊定楊州屯於建業宋道衝說冰求為丹陽太守到郡發兵以攻冰召余為貯兵都尉余年, SBCK: 百}
