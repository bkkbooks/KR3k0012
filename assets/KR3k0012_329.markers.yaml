  - {type: variant, offset: 3314, length: 245, content: 一見軍旅不得已而就之宋侯不用吾計數敗吾令宋侯從月建住華盖下遂收合餘燼從吾計破石冰焉又曰凡戰觀雲如走鹿形者敗軍之氣也兵法秘訣曰鎮星所在之宿其國不可伐又彗星見大明臣下縱橫民流亡無所食父子坐離夫婦不相得四維有流星前如瓮後如火光竟天如雷聲名曰天狗其下飢荒民疾疫群臣死流星東北行名天岡天海之口必有大水土功又四維有流星入以後有白氣如雲狀似車輪是謂齧食其下大兵中國多盜賊又有星如鬥見北斗名為旬始天下大亂諸侯爭雄玄女兵法曰凡行兵之道天地大寶得者全勝失者必負北斗之中禽有旬始狀像雄雞制百兵之母能得其術何神不使, SBCK: ''}
