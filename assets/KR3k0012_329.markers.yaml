  - {type: variant, offset: 177, length: 1, content: 曹, WYG: 髙祖初起師次霍邑隋武牙郎將宋老生陳兵拒險其師不得進屯軍於賈胡堡㑹淋雨積旬餽運不給髙祖患之忽有白衣人詣軍門見曰霍山神遣語大唐皇帝若向霍山邑當東南傍山取路八月雨止我當助爾破之髙祖初哂之遣人東南視地果有㣲道髙祖笑曰此神不欺趙襄子豈負吾耶時有訛言云突厥將襲太原又軍粮且盡髙祖命旋師太宗切諫乃止八月己夘雨果霽髙祖大恱以太牢祭霍山辛巳引師從傍山道趨霍邑去城十餘里有陣雲起軍北東西竟天髙祖謂裴寂曰雲色如此必當有慶又曰貞元初江西都團練使李亷奏建中四年鄂州刺史逆賊李希烈之將董侍召率衆襲鄂州順風縱火邑屋將焚臣乃禱於城隍神倐忽風廽火烈賊潰遂擊破之連黄沔三州請付史官以答神意從之三國典畧曰齊髙緯發晋陽開府薛榮宗嘗云能使鬼兵言于齊主曰臣已發遣斛律明月將大兵往齊主信之經介休見一古塜榮宗謂舎人元行恭曰是誰冡也行恭戲之曰郭林宗是誰曰郭元真父榮宗即啓云臣向見郭林宗從冡出著大㡌吉莫鞾揺馬鞭問臣我阿貞來否又曰侯}
