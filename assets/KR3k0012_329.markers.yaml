  - {type: variant, offset: 3066, length: 246, content: 夫風鳴氣者賊存在十里鳴條百里搖技四百里雨霑衣裳者謂潤兵不霑者謂泣兵金器自鳴及焦氣者軍疲也又曰武王使散宜生卜伐殷鑽龜龜不兆下占於地數蓍蓍交而折祖行之日雨輜車至軫行至之日幟折為三宜王曰二四凶不祥不可舉事太公進曰退非子之所及也聖人生天地之間承衰亂而起龜者枯骨蓍者折草何足以辯吉凶祖行之日雨輜車至軫是洗濯甲兵也行之日幟旗為三是軍分為三如此斬紂之首吉也抱朴子曰晉太康二年京邑始亂三國舉兵攻長沙王人小民張昌反於荊州奉劉尼為漢主乃遣石水擊定楊州屯於建業宋道衝說冰求為丹陽太守到郡發兵以攻冰召余為貯兵都尉余年, WYG: ''}
