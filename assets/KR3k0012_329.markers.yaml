  - {type: variant, offset: 776, length: 1350, content: 業與王霸爭流名與天壤相弊公其圖之燕將自殺漢書高紀曰武臣自立為趙王沛令欲以沛應之恐有變欲誅蕭曹恐踰城保高祖乃書帛射城中與沛父老父老乃殺沛令開門迎高祖後漢書曰隗囂檄告州郡言王莽之罪楚越之竹不足以書其惡魏志曰開羽圍行征南將軍曹仁於樊趙儼以議郎參仁軍事儼謂軍將曰今賊猶盛我徒卒單少而仁隅絕不得同力前軍逼圍遣謀通仁使知外救以勵將士然後表裏俱發破楚必矣諸將皆喜便作地道射箭飛書與仁消息晉書曰初安南將軍甘卓與左將軍隋王承書勸使固守當以兵出沔口斷王敦歸路則湘圍自解承荅其書略曰足下若能卷甲電赴猶或有濟若其狐疑求我枯魚之肆矣梁後略曰巳酉上自長沙寺移住天居寺是日北軍射書城內今者行兵不貪城隍土地不貪子女玉帛志存救弊濟此生民廣訪民人擇善而立梁朝士庶尚未相領解蟻聚窮城寂無求問尋此異卜良用到惑又曰禇蘿率其下五百人乘大艦於鹿頭後湖以輝水戰北軍聚而觀蘿乃掉艦向岸北軍引去蘿亦廻歸上乃射書北軍大開賞募有能斬送賊帥者封五千戶侯賜絹萬疋占候孫子曰天者陰陽寒暑節制也謂順天行誅因陰陽四時剛柔之制故司馬法曰冬夏不興師所以兼受愛吾人若細雨沐軍臨機必有捷廻風相觸道還而無功雲類羊群必走之道氣如驚鹿必敗之勢黑雲出壘赤氣臨軍皆敗之兆若烟非煙此慶雲也必勝若霧非霧是泣軍也必敗是知風雲之占其來久矣孫子占曰三軍將行其旌旗從容以向前是為天送必亟擊之得其大將三軍將行其旍旗墊音店然若雨是謂天霑其師失三軍將行旍旗亂於上東西南北無所主方其軍不還三軍將陣雨甚是為浴師勿用陣戰三軍將戰有雲其上而赤勿用陣先陣戰者莫復其迹三軍方行大風飄起於軍前右周絕軍其將亡右周中其師得糧左傳曰晉侯圍上陽問於卜偃曰何時克之對曰童謠云丙子之辰龍尾伏辰均服振振取虢之旗鶉之賁賁天策焞焞火中成軍虢公其奔其九月十月之交乎韓詩外傳曰武王伐紂到刑兵軛折為三天雨三日不休武王懼召太公而問之曰紂未可伐乎太公曰不然軛折為三者軍當分為三也天雨三日者欲洒吾兵也後漢書曰韓遂屯美陽董卓與戰輒不利十一月夜有流星如火光長十餘丈照遂營中驢馬盡鳴賊以為不祥欲歸金城卓聞之喜明日乃與右扶風鮑鴻等并兵俱攻大破之斬首數千級又曰王尋王邑攻南陽積弩亂發矢下如雨城中負戶而汲王鳳等乞降不許尋邑自以為功在漏刻意氣甚逸夜有流星墜營中晝有雲氣如壞山當營而隕不及尺而散吏士皆厭伏續漢志曰雲如壞山所謂營頭之星也占曰營頭之所墜其下覆軍殺將血流千里厭音一葉反晉書載記曰劉曜咸和三年曜夢三人金面丹脣東向逡巡不言而退曜拜而履其跡旦召公卿已下議之朝臣咸賀以為吉祥唯太史令任義進曰三者歷運統之極也人為震位王者之始次也金為兌位物衰落也脣丹不言事之畢也逡巡揖讓退舍之道也為拜者屈伏於人履跡而行慎勿出壃也東井秦分也五車趙分也秦兵必暴起亡主眾師留敗趙地遠至三年近至七百日應不遠願陛下思而防之曜大懼又曰石季龍攻張重華謝艾拒之艾建牙旗盟將士有西北風吹旌東南指日風為令今旗指之天所贊也破之必矣軍次神鳥王擢與前鋒戰敗遁還河南還討叛虜斯骨真万餘落破之又天文志曰水與金合為變謀為兵夏入太白中上出破軍殺將又曰元興年八月庚子太白犯歲星在上將又曰永興二年四月丙子太白犯狼星占曰大兵起九月歲星守東井占曰有兵井又秦分野是年茍師破公師蕃張方破苑陽王虓關西諸將攻河間王顒奔走東海王迎殺之永和十四年十二月慕容儁遂據臨漳盡有幽并青冀之地緣河諸將奔散河津隔絕又曰戊子月犯牽牛大星占曰牽牛天將, WYG: ''}
