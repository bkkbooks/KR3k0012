  - {type: variant, offset: 2690, length: 0, content: '', SBCK: 防于我㝷而太祖遣驃􅀐將軍楊􅋆儀同長孫慶明率兵東伐是時新築之城少粮乏水衆情大懼南門内有一土井隨汲即竭鑒乃具夜冠俯井而祝俄而泉湧城内皆足楊水示􅋆􅋆無功而還􅋆疋眇切又曰周帝問齊王延宗曰鄴城􅀂爲可取延宗辭曰亡圍曰巳殺竟同夢者數十百焉陳書曰髙祖討侯景軍次大雷軍人社稜夢雷池君周何神自稱征討大將軍乗朱航陳甲仗稱下征侯景須􅁷便還去已殺景隋書曰漢王諒餘黨據晉絳等三州未下詔羅㬋行絳晉呂三州諸軍事進兵圍之爲流矢所中卒于師時年六十曰送柩還京行數里無故輿馬自止䇿之不動有飃風旋遶焉絳州長史郭雅稽顙呪之曰公恨小㓂未平􅁘㝷即除殄無爲戀恨於是風静馬行見者莫不悲歎其年秋七月子仲隠夢見羅㬋曰我明日當戰其靈座所有弓箭刀劒無故自動􅀂人帶持之狀絳州城䧟是其日也唐書曰髙祖􅀄起師次霍邑隋武牙郎將宋老生陳兵拒險義師不得進屯軍於賈胡堡㑹霖雨積旬餽運不給髙祖患之忽有白衣人詣軍門見曰霍山神遣語大唐皇帝􅀂向霍山邑當東南傍山取路八月雨止我當助爾破之髙祖􅀄哂之遣人東南視地果有微道髙祖􅀏曰此神不欺趙襄子豈􅀒吾􅁘時有訛言云突厥將襲太原又軍粮且盡髙祖命旋師太宗切諌乃止八月己夘雨果霽髙祖太恱以大牢􅀕霍山辛巳引師從傍山道趨霍邑去城十餘里有陣雲起軍北東西竟天髙祖謂裴寂曰雲色如此必當有慶又曰貞元􅀄江西都􅇛練使李兼奏建中四年鄂州刺史逆賊李希烈之將董侍召率衆襲鄂州}
  - {type: page-break, offset: 2690, content: '', id: KR3k0012_SBCK_329-5b}
  - {type: page-break, offset: 2690, content: '', id: KR3k0012_SBCK_329-6a}
  - {type: variant, offset: 2690, length: 0, content: '', krp: 防于我㝷而太祖遣驃騎將軍楊􅋆儀同長孫慶明率兵東伐是時新築之城少粮乏水衆情大懼南門内有一土井隨汲即竭鑒乃具夜冠俯井而祝俄而泉湧城内皆足楊水示􅋆􅋆無功而還􅋆疋眇切又曰周帝問齊王延宗曰鄴城若爲可取延宗辭曰亡圍曰巳殺竟同夢者數十百焉陳書曰髙祖討侯景軍次大雷軍人社稜夢雷池君周何神自稱征討大將軍乗朱航陳甲仗稱下征侯景須臾便還去已殺景隋書曰漢王諒餘黨據晉絳等三州未下詔羅㬋行絳晉呂三州諸軍事進兵圍之爲流矢所中卒于師時年六十曰送柩還京行數里無故輿馬自止䇿之不動有飃風旋遶焉絳州長史郭雅稽顙呪之曰公恨小㓂未平耶㝷即除殄無爲戀恨於是風静馬行見者莫不悲歎其年秋七月子仲隠夢見羅㬋曰我明日當戰其靈座所有弓箭刀劒無故自動若人帶持之狀絳州城䧟是其日也唐書曰髙祖𥘉起師次霍邑隋武牙郎將宋老生陳兵拒險義師不得進屯軍於賈胡堡㑹霖雨積旬餽運不給髙祖患之忽有白衣人詣軍門見曰霍山神遣語大唐皇帝若向霍山邑當東南傍山取路八月雨止我當助爾破之髙祖𥘉哂之遣人東南視地果有微道髙祖笑曰此神不欺趙襄子豈負吾耶時有訛言云突厥將襲太原又軍粮且盡髙祖命旋師太宗切諌乃止八月己夘雨果霽髙祖太恱以大牢祭霍山辛巳引師從傍山道趨霍邑去城十餘里有陣雲起軍北東西竟天髙祖謂裴寂曰雲色如此必當有慶又曰貞元𥘉江西都團練使李兼奏建中四年鄂州刺史逆賊李希烈之將董侍召率衆襲鄂州}
  - {type: variant, offset: 2692, length: 0, content: '', SBCK: 縱火邑屋將焚臣乃禱於城隍神倐忽風廽火烈賊潰遂擊破之連狀黄􅃆三州請付史官以荅神意從之三國典略曰齊髙緯發晉陽開府薛榮宗甞云能使􅀑兵言於齊主曰臣巳發遣斛律明月將大兵在齊主信之經介休見一古冢榮宗謂舎人元行恭曰是誰冢}
