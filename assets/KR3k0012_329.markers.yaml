  - {type: variant, offset: 200, length: 1, content: 三, WYG: 頓于安南乞征任氏湘東許之乃諸蠻子弟八}
  - {type: variant, offset: 203, length: 0, content: '', WYG: 在江津二日便登艦大笑曰無量兵馬江陵舊多神祠俗恒祈禱自法和軍出無復一驗人以諸神皆行}
  - {type: variant, offset: 204, length: 571, content: 軍後魏書曰張衮字洪龍上谷沮陽人也好學有文才太祖為代王選為左長史決策幃幄太祖器之禮遇優厚又曰韓茂從討平涼當茂所衝莫不應弦而殪由是世祖壯之又曰張衮從太祖破賀訥登勿居山聚石為峰以記功德命衮為文又曰豆代田從討平涼擊破赫連定得奚斤等世祖以定妻賜之詔斤膝行授酒於代田勑斤曰全爾命者代田功也進爵長廣公隋書曰郭榮遼東之役以功進位左光祿大夫明年帝復事遼東榮以為中國疲敝萬乘不宜屢動乃言於帝曰戎狄失禮臣下之事臣聞千鈞之弩不為鼷鼠發機豈有親辱大駕以臨小寇帝不納復從軍攻遼東城榮親蒙矢石晝夜不釋甲冑王粲從軍詩曰下舡登高防草露霑我衣廻身赴床寢此愁當告誰身服干戈事豈得念所私又曰從軍有苦樂但問所從誰所從神且武焉得久勞師鮑明遠東武吟曰始隨張校尉召募到河源後逐李輕車追虜窮塞垣曹子建詩曰從軍度函谷馳馬過西京嵇叔夜贈秀才入軍詩曰良馬既閑麗服有輝風馳霓逝躡景追飛凌厲中原顧盼生姿陸機從軍行曰朝食不免冑夕息常負戈苦哉遠征人附心悲如何薛瑩荅華永先詩曰桴鼓常在側筆研永欲捐卷袞不復開干戈以為權劉義恭擬古詩曰束甲辭京洛負戈事烏孫後軍濟太河築壘黎陽屯旦聞羽檄飛夕見邊驛奔羽書史記曰齊使魯連為書以箭射之遺燕將曰吾聞之知者不背時而棄利勇士不怯死而滅名忠臣不先身而後君忠廢名滅後代無稱非智也且吾聞效小節者不能行大威惡小恥者不能立榮名昔管仲曹沬二公者非不能効小節死小恥也以為殺身絕代功名不立非智也, WYG: ''}
