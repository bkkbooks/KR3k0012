  - {type: variant, offset: 3560, length: 424, content: 地九天各有表裏三奇六合王威軍事又曰黃帝攻𧈪尤三年城不下募求術士乃得伍胥與之言曰今日余攻𧈪尤三年城不下與咎安在伍胥曰此城中之將為人必白色商音帝始攻時得無以秋之東方行乎今皇帝為人蒼色角音此雄軍也以戰為之黃帝曰善為之若何伍胥曰臣請攻𧈪尤三日城必下黃帝大喜其中黃直曰帝積三年攻𧈪尤而城不下今予欲以三日下之何以為明伍胥曰不如臣言請以軍法論黃帝曰子欲以何時臣請朱雀之日日正中時立赤色徵音絳衣之軍于南方以輔角軍臣請以青龍之日平旦時立青色角音青衣之軍于東方以輔羽軍臣請以玄武之日人定時立黑色羽音黑衣之將于北方以輔啇軍臣請以白虎之日日入時立白色啇音白衣之將于西方以輔宮軍四將以立臣請為帝以黃龍之日日中建黃旗於中央以制四方五軍已具四面攻𧈪尤三日其城果下黃帝即封胥世世不絕又曰戰鬥不法當從九天之上擊九地之下眾士默默人無見者九天者春在青龍夏在朱雀秋在白虎冬在玄武四神為九天其衝為九地星占曰太白出高用兵深入敢戰者吉星出東方中國大利蠻夷大敗兵書曰氣聚如龍如鵠尾者其下軍兵破敗也, SBCK: ''}
