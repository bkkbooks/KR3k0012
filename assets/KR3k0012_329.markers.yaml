  - {type: variant, offset: 118, length: 1, content: 為, SBCK: 賊守馬羡犇走民皆歸降晉書桓温傳云郭璞爲䜟曰有人姓李兒專征戰譬如車軸脫作在一靣兒者子也李去子木存車去軸爲亘合成桓字也又曰成都王潁師次朝歌每夜矛㦸有光􅀂火其壘井中皆有龍象前軍大敗又曰時有重謠云阿童復阿童衘刀浮渡江不畏岸上虎但畏水中龍㑹益州刺史王濬小字阿童表請加龍驤將軍令造舟檝又曰謝艾出師振武夜有二梟鳴於牙艾曰六􅀶得梟者勝今梟鳴牙中尅敵之兆果勝之又曰王澄爲荆州時京師危逼澄率衆軍將赴國難而飄風折其節柱㑹王如㓂襄陽澄前鋒至冝城爲如黨嚴嶷所􅀗又載記曰吕光伐西域進及}
  - {type: page-break, offset: 118, content: '', id: KR3k0012_SBCK_329-1b}
  - {type: variant, offset: 118, length: 0, content: '', WYG: 賊守馬羨奔走民皆歸降晋書曰桓温傳云郭璞為䜟曰有人姓李兒傳征戰譬如車軸脫作一面兒者子也李去子木存車去軸為亘合成桓字也又曰成都王頴師次朝歌每夜矛㦸有光若大其壘井中皆有龍象前軍大敗又曰時有童謡云阿童復阿童衘刀浮渡江不畏岸上虎但畏水中龍㑹益州刺史王濬小字阿童表請加龍驤將軍令造舟楫又曰謝艾出師振武夜有二梟鳴于牙艾曰六博得梟者勝今梟鳴牙中剋敵之兆果勝之又曰王澄為荆州時京師危逼澄率衆軍將赴國難而飄風折其節柱㑹王如冦襄陽澄前鋒至宜城為如黨嚴嶷所獲又載記曰吕光伐西域進及流沙三百餘里無水將士失色光曰吾聞李廣利精誠𤣥感飛泉湧出吾等豈獨無感致乎皇天必將有濟諸君不足憂也俄而大雨平地三尺又曰石勒拒劉曜勒統歩騎四萬赴金墉自大堨先是流澌風猛軍至氷泮清和濟畢流澌大至勒以為神靈之助也命曰靈昌津宋書曰王仲徳初欲南歸奔太山追騎急夜行見山前有猛炬之棄火行百里許以免又曰元兇弑逆孝武率衆入討荆州刺史南譙王義宣江州刺史臧質並舉義兵三月乙未建牙軍門是時多不悉舊儀有一翁斑白自稱少從武帝征伐頗悉其事因使指麾事畢忽失所在自冬至春常東北風連陰不霽其日牙立之後風轉西南天色開霽有紫雲於牙上北齊書曰侯景遣將任約伐湘東王於江陵陸法和自請征之至赤沙湖與任約相對縱大舫于前而逆風不便法和執白羽以麾風即返於是大潰約逃竄不知所之後周書曰太祖既繼賀㧞岳起事將刑牲盟誓同奬王室初賀㧞岳營於河曲有軍吏獨行忽見一老翁鬢眉皓素謂之曰賀㧞岳曾據有此衆然無所成當有一宇文家從東北來後必大盛言訖不見此吏恒與所親言之至是方騐隋書曰張祥開皇中累遷并州司馬仁夀末漢王諒舉兵反遣其將劉建畧地燕趙至井陘祥勒兵拒守建攻之後縱火燒其郭下祥見百姓驚駭其城側有西王母廟祥登城望之再拜地泣而言曰百姓何罪致此焚燒神有靈可降雨相救言訖廟上雲起湏㬰驟雨其火遂滅士卒感其至誠莫不用心城圍月餘李雄援軍至賊遂退走又曰竇榮定以佐命功拜上柱國寧州刺史朱幾復為武候大將軍尋除秦州總管賜吳樂一部突厥沙鉢冦邊以為行軍元帥率九總管歩騎三萬出源州與虜戰髙越原兩相持其地無水士卒渇甚至刺馬血而飲死者十二三榮定仰天太息俄而澍雨軍乃復振扵是進擊數挫其鋒沙鉢突厥憚之請盟而去唐書曰開元中降胡叛勅王晙帥并州兵濟河以討之晙乃間行倍道以夜繼晝卷甲捨幕而往會也於山中忽遇風雪甚盛晙恐失期仰天歎曰晙若事君不忠天討有罪明神所殛固自當之而士衆何辜令此艱苦誠心忠烈天鑒孔明當止雪廽風以濟戎事言訖風廽雪止時叛者分為兩道晙追入之殺一千五百餘人生獲一千四百餘人駝馬牛羊甚衆又曰初肅宗行至豐寧見南河天塹之固欲整軍北渡將詣豐寧忽大風飛沙礫數歩之間不辨人馬由是迴軍東趨靈武風沙頓止天地清朗又曰肅宗至平源郡路傍忽遇一伏兎命左右索弓箭因謂左右曰吾若破賊射則中之不然則否一發而斃左右咸稱萬嵗又曰建中三年哥舒曜欲攻李希烈於許州師次頴橋大雷電而雨營中震不能言者三四千人驢馬死者有七曜惡之乃退又曰田悦為魏王受册之日其軍上有雲物稍異馬燧等望而笑曰此雲無知乃為賊瑞曹韋稔為士長頌曰公益土之兆也管子曰桓公北征孤竹未至卑耳之谿十里援弓而射射未發也謂左右曰見前人乎對曰不見公曰寡人見人長尺而人形具焉衣冠亦咸備馬前疾走寡人其不濟乎管仲曰袪衣示前有水也右示渉也至卑耳之谿從左渉深及冦從右方深至膝已渉大濟公拜曰仲父之聖若此也山海經曰鹿臺之山有鳥焉如雄雞而人面名曰島溪其鳴自呼見則有兵小決之山有獸焉如猨白首赤足見則有兵能山之穴恒出神人夏啓而冬閉是穴也冬啓乃必有兵郭璞注曰今鄴西北有石鼔鳴乃有兵即此類淮南子曰人主有伐國之志邑犬羣嘷雄雞夜鳴庫兵動而戎馬驚戎馬兵也鷄夜鳴而戎馬驚氣之感動也六韜曰三軍無故旌旗皆前指金鐸之聲揚以清鞞鼓之音宛而鳴此得神明之助大勝之徵也又曰紂為無道武王於是東伐紂至於河上雨甚雷疾震之驂乘横振而死旌旗折揚侯波周公進曰天不祐周矣意者君徳行未盡而百姓疾怨故天降吾禍扵是太公援罪人而戮之於河三鼓之率衆而先以造于殷天下從之甲子之日至于牧野舉師而討之紂城備設而不守親擒紂懸其首於白旗又曰武王伐紂諸侯已至未知士民何如太公曰天道無親今海内浮沉於殷乆矣百姓可與樂成難與慮始伯夷叔齊曰殺一人而有天下聖人不為太公曰師渡孟津六馬仰流赤烏銜榖白魚外入此豈非天非命也師到㙁音牧野天暴風電前後不相見車蓋發越轅衝摧折旌旄三折旗幟飛揚者精鋭盛也天雨以洗吾兵雷電應天也吳越春秋曰越王攻吳兵欲入吳門未至六里望吳南城見伍子頭巨若車輪目垂光烈髪鬢四張耀於十數里大懼留兵即日夜半暴風疾雨雷電皆鳴沙石飛射疾於弓弩越軍壊敗桓譚新論曰維四月太子發上祭于畢下孟津之上至此武王己畢三年之䘮欲卒父業升舟而魚則地應也㷈祭降烏天應也三年聞紂殺比干囚箕子太師少師抱樂噐奔周甲子日月若合璧五星若連珠昧爽武王朝至于南郊牧野從天以伐紂故兵不血刃而定天下三國典畧曰東魏以平鑒為懐州刺史鑒乃於軹開道築城以防于我尋而太祖遣驃騎將軍楊標儀同長孫慶明率兵東伐是時新築之城少井乏水衆大懼南門内有一土井隨汲即竭鑒乃具衣冠俯井而祝俄而泉湧城内皆足揚水示標標無攻而還標皮抄反又曰周帝問齊王延宗曰鄴城若為可取延宗辭曰亡國之大夫不可與圖存強問之乃曰若任城據鄴臣不能知而若今主自守陛下兵不血刃時好事者以為延宗年號徳昌得二日也及即位至敗果二日神兵梁書曰先是旱甚詔祈蔣帝廟求雨十旬不降帝怒命載荻欲焚蔣廟并神景爾日開朗欲起火當神上忽有雲如繖倐忽驟雨如㵼臺中宫殿皆自振動帝懼馳詔追停火時還静自此帝畏信遂深自踐阼以來未嘗躬自到廟於是乃法駕將朝臣修謁是時魏軍攻圍鍾離蔣帝廟報勅必有扶助既而無雨水長遂挫敵人亦神之力馬凱旋之後廟中人馬脚盡有泥濕當時並目覩焉又曰王僧辯平郢州進師潯陽軍人多夢周何二廟神兵曰吾已助天子討賊自稱征討大將軍並乗朱航俄而反曰已殺景同夢者數十百焉陳書曰髙祖討侯景軍次大雷軍人杜稷夢雷池君周何神自稱征討大將軍乗朱航陳甲仗稱下征侯景湏㬰便還云已殺景隋書曰漢王諒餘黨據晋絳吕等三州未下詔羅㬋行絳晋吕三州諸軍事進兵圍之}
