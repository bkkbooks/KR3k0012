  - {type: variant, offset: 2301, length: 333, content: 垂被地謹驗兵書此名灑血其下之國必且破亡欲滅匈奴宜在今日詔楊素為行軍元帥晟為受降使者北伐二年軍次北河值賊帥思力侯斤等領兵拒戰與大將軍梁默擊走之轉戰六十餘里賊眾多降唐書曰武德中淮南道行臺僕射輔公祏據丹陽反遣趙郡王恭為行軍元帥討之將發與諸將宴集命取水忽變為血在座中皆失色恭舉止自若諭之曰禍福無門唯人自召自顧無負於物諸君何憂懼之深公祏惡積禍盈今承廟筭以致討盆中之血乃公祏授首之徵遂盡歡而罷時人服其識度而能安眾竟平公祏焉又曰李晟之將復京師也時熒惑守歲久之方退賓介或勸晟曰今熒惑已退皇家之利也可速出兵晟曰天子外次人臣當死節垂象玄遠吾安知天道至是謂參佐曰前者公勸晟出兵非敢拒也且軍士可用之不可使知之嘗聞五緯盈縮無准懼復來守歲則我軍不戰而自潰矣參佐歎服皆非所及也尋拜晟為司徒兼中書令, SBCK: ''}
