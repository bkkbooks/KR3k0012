  - {type: variant, offset: 1460, length: 218, content: 莫之知也又曰褚炫為吏部尚書炫居身清立非弔問不雜交遊論者以為美及在選部門庭蕭索賓客罕至出行左右常捧一黃紙帽風吹紙剝殆盡南史曰初謝朓告王敬則敬則女為朓妻常懷刀欲報朓朓不敢相見及當拜吏部謙挹尤甚尚書郎范縝嘲之曰卿人才無慚小選但恨不可刑于寡妻朓有愧色南史曰蔡徵拜吏部尚書啟後主借鼓吹後主謂所司曰鼓吹軍樂有功乃授蔡徵不自量揆紊我朝章然其父景歷既有締搆之功宜且如啟拜訖即追還梁書曰蕭子明為吏部尚書性凝簡負才氣見九流賓客不與交言但舉扇一撝而巳衣冠竊恨, SBCK: 榮}
