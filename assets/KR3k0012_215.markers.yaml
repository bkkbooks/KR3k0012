  - {type: variant, offset: 3344, length: 1, content: 抑, WYG: 人論者欲有沙汰之言舒曰吾即此人也乃幞被逕出同寮素無清議者咸有自愧之色談者莫不詠其高又曰索靖同郡張勃特表靖以才藝絶人宜在臺閣不宜逺出邉塞武帝納之擢為尚書郎又曰樂廣為尚書郎與何晏鄧颺等談講衛瓘見而竒之常恐微言將絶今復聞之命諸子造焉謂曰此人之水鏡也每見此人瑩然猶披雲霧而覩青天也又曰索靖子綝字巨秀少有逸群之量靖每曰綝廊廟之材非簡札之用州郡吏不足汙吾兒也舉秀才除郎中嘗報兄讐手殺三十七人時人壮之又曰呉隠之兄坦之為袁貞功曹貞敗將及禍隠之詣桓乞代兄命温矜而釋之遂為温所知賞拜奉朝請尚書郎又曰嵇含言於長沙王又曰昔魏武每有軍事増置掾屬尚書令陳矯以有軍事亦奏増郎况今郎官中騎三曹晝出督戰夜還理事一人兩役内外廢之含謂之各有主師委之大將不宜復令臺僚雜於其間又從之乃増郎及令史也又曰賈充改為律令以裴楷為定科郎晉中興書曰王彪之字叔虎從伯遵謂曰選官欲以汝達可作諸王佐郎彪曰位之多少既不足計自當任之於時至於超遷是所不願遂為郎又曰王坦之字文度選曹將擬為尚書郎坦之聞曰自過江尚書郎正用第二人何得以此見擬其子國寳好傾側婦父謝安惡之除尚書郎國寳以為中興膏腴之族唯作吏部不作餘曹郎怨之辭不拜晉太康起居注曰故司空王基夙為先帝授任基子冲尚書郎中雖在清途猶未免楚撻其以冲為治書侍御史齊書曰陸惠曉除尚書殿中郎隣族来相賀惠曉舉酒曰陸惠曉年踰三十婦父領選始作尚書郎卿輩乃復以為慶耶梁書天監元年詔曰自禮闈陵替厯茲永久郎署備員無取職事糠粃文案貴尚虛閑空有趨墀之名了無握蘭之實曹郎可依昔奏事自是始奏事又曰王筠除尚書殿中郎王氏過江以来未有居郎署者或勸不就筠曰陸平原東南之秀王文度獨步江東吾得比蹤昔人何所多恨乃忻然就職又曰到洽為尚書殿中郎洽兄弟群從逓居此職時人榮之又曰殿中郎缺武帝曰此曹舊用文學且居雁行之首宜詳擇其人以張緬為之後魏書曰高允為郎二十七年不徙官時百官無禄允恒使諸子樵采自給初尚書竇瑾坐事誅瑾子遵亡在山澤遵母焦没入縣官焦以老得免瑾之親故莫有恤者允愍焦年老保護在家積六年遵始蒙赦其篤行如此三國典畧曰齊主命百司各列勤惰尚書郎皇甫亮三日不上齊主親詰其故亮對曰一日雨二日病酒齊主以其言實遂優容之令杖脛三十唐書曰韋虛舟家有禮則父子兄弟更踐郎省時稱郎官家又曰趙曄字雲卿鄧州穰人早擅髙名在宦途五十年累經貶謫蹇躓備至入仕三十年方霑省官身在郎署子嘗徒步官既散曹俸禄單寡衣食不充以致亡殁服名檢者為之歎息三輔决録曰田鳳字季宗為尚書郎容儀端正入奏事靈帝目送之因題柱曰堂堂乎張京兆田郎又曰陳重與其友雷義俱拜尚書郎義以左黜重見義去官亦以病免汝南先賢傳曰陳蕃上書云昔明帝時公主為子求郎不許賜錢千萬左右問之帝曰郎天官也以當叙徳何可妄與人邪今陛下以郎比一把菜臣以為反側也又曰}
