  - {type: variant, offset: 2058, length: 877, content: 吏部尚書時三公曹令史朱暉素事錄尚書高陽王雍雍欲以為廷尉評頻頻託順順不為用雍遂下命用之順投於地雍聞之大怒昧爽坐都廳召尚書及丞郎畢集欲待順至於眾挫之順日高方至雍攘袂撫几而言曰天子之子天子之弟天子之叔天子之相四海之內親尊莫二元順何人以身成命投棄於地順鬚眉俱張仰面看屋憤氣奔湧長歔而不言久之搖一白羽扇徐而謂雍曰高祖遷宅中土刱定九流官方清濁軌儀萬古而朱暉小人身為省史何令為廷尉清官殿下既先皇同氣宜遵成旨自有短垣而復踰之雍曰身為丞相錄尚書如何不用一人為官順曰庖人雖不理庖尸祝不得越樽俎而代之未聞有別旨令殿下參選事順又厲聲曰殿下必如是順當依事聞雍遂笑而言曰豈可以朱暉小人便相忿恨遂起呼順入室與之極飲順之亢毅不撓皆此類也又曰元脩義遷吏部尚書及在銓衡唯事貨賄授官大小皆有定價時中散大夫高居者有旨先敘上黨郡缺遂求之脩義私巳許人抑居不與居大言不遜脩義命左右臺曳之居對眾大呼天唱賊人問居曰白日公庭安得有賊居指脩義曰此座上者違天子明詔物多者得官京師白劫此非大賊乎脩義失色居行罵而出三國典略曰東魏以楊愔典選嘗六十人為一甲愔令其自敘訖不省文簿便次第呼之呼誤以慕容為長孫一人而巳有職人魯漫漢自言微賤不蒙記愔曰卿前在元子思坊乘驢遙見我不下以方麴障面我何不識卿耶漫漢驚服愔又謂之曰名以定體果自不虛令史唱名誤以盧士深為士琛深自言其名愔曰盧郎朗潤所以加玉北齊書曰叚孝言為吏部尚書孝言既無深鑒又待物不平抽擢之徒非賄則舊有將作丞崔成忽於眾中抗言曰尚書天下尚書豈獨叚家尚書也孝言無辭以荅唯厲色遣下而巳又曰陳孔奐為吏部尚書太子叔寶欲以江揔為太子詹事令管記陸瑜言之於奐奐謂瑜曰江有潘陸之才而無園綺之實輔弼儲后竊有所難瑜具以白太子太子深以為恨乃自言於陳主將許之奐乃啟曰江揔文章之人今太子文藻不少無藉於揔如臣愚見願選敦重之才以居輔導陳主曰即如卿言誰當居此奐曰尚書王廊世有懿德識性敦敏可以居之太子時亦在側乃曰廊王泰之子不可為太子詹事奐又啟曰宋朝范蔚宗即范泰之子亦為太子詹事前世不疑太子固爭之陳主卒以揔果共太子為長夜之飲養良娣陳氏為女太子微行遊揔家陳主怒而免之隋書曰牛弘為吏部尚書其選舉先德行而後文才所進用多稱職, WYG: ''}
