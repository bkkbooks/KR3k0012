  - {type: variant, offset: 3116, length: 2, content: 尚書, WYG: 東銓事文宗勤於政道每苦選曹訛弊延英謂宰臣曰吏部殊不選才安得摭實無濫可釐革否李石對曰令録可以商量他官且宜循舊上曰循舊如配官耳賢不肖安能甄别乃召三銓謂之曰卿等比選令録如何注擬鄲對曰資叙相當問其為治之術視可否而擬之帝曰依資合得而才劣者何授對曰與邉逺漫官帝曰如以不肖之才治邉民則疾苦可知也凡朝廷求理逺近皆須得人苟非其才人受其弊矣又曰楊纂除吏部侍郎}
