  - {type: variant, offset: 1958, length: 527, content: 人停日後者終於不得庸才下品年月久者灼然先用沉滯者皆稱其能又曰郭祚為吏部祚持身潔清重惜官位至於銓授假令得人必徘徊久之然後下筆即云此人便以貴矣由是頗勞滯當時每招怨言然所用者皆量才稱職時人以此歸之又曰元順為吏部尚書時三公曹令史朱暉素事錄尚書高陽王雍雍欲以為廷尉評頻頻託順順不為用雍遂下命用之順投於地雍聞之大怒昧爽坐都廳召尚書及丞郎畢集欲待順至於眾挫之順日高方至雍攘袂撫几而言曰天子之子天子之弟天子之叔天子之相四海之內親尊莫二元順何人以身成命投棄於地順鬚眉俱張仰面看屋憤氣奔湧長歔而不言久之搖一白羽扇徐而謂雍曰高祖遷宅中土刱定九流官方清濁軌儀萬古而朱暉小人身為省史何令為廷尉清官殿下既先皇同氣宜遵成旨自有短垣而復踰之雍曰身為丞相錄尚書如何不用一人為官順曰庖人雖不理庖尸祝不得越樽俎而代之未聞有別旨令殿下參選事順又厲聲曰殿下必如是順當依事聞雍遂笑而言曰豈可以朱暉小人便相忿恨遂起呼順入室與之極飲順之亢毅不撓皆此類也又曰元脩義遷吏部尚書及在銓衡唯事貨賄授官大小皆有定價時中散大夫高居者有旨先敘上黨郡缺遂求之脩義私巳許人抑居不與居大言不遜脩義命左右臺曳之居對眾大呼天唱賊人問居曰白日公庭安得有賊居指脩義曰此座上者違天子明詔物多者得官京師白劫此非大賊乎脩義失色居行罵而出, SBCK: ''}
