  - {type: variant, offset: 82, length: 0, content: '', SBCK: 尚書郎舊典秩滿遷令長鄭􅀪爲僕射奏以臺職任尊而賞薄人無樂者請使郎􅀘二千石自此始也又曰方儲爲郎中章帝使文郎居左武郎居右儲正位中曰臣文武兼備在所施用上嘉其才以繁亂絲付儲使理儲拔佩刀而斷之曰反經任􅀔臨事冝然又曰何湯拜郎中守􅀜陽門候上微行夜還湯閉門不納更從中東門入明旦召詣太官賜食諸門候皆奪俸華嶠後漢書曰館陶公主爲子求郎不許賜錢千万明帝謂羣臣曰郎官上應列􅀫非其人則民受其殃又曰竇攸篤學退居舉孝廉爲郎丗祖會百寮於靈臺得䑕如豹文問羣臣攸曰鼮鼠詔曰何以知曰見尓雅詔書如攸言賜帛三百更勑諸王子從攸受尓雅又曰明帝性􅄶察嘗以事怒郎樂崧崧逕入牀下上怒甚疾呼曰郎出郎出崧曰天子穆穆諸侯皇皇未聞人君自起撞郎上乃舎之漢官儀曰尚書郎四人一主匈奴單于營部一主羌夷吏民一主天下户口土田墾作一主錢帛貢獻委輸又曰尚書郎主作文書起草夜更直五日於建禮門内又曰尚書郎給青縑白綾􅀍以錦􅀍帷帳氈褥通中枕太官供食湯官供䴵餌五熟菓實下天子一等級尚書史二人女侍史二人皆選端正從直女侍執香鑪燒薫從入臺護衣奏事明}
