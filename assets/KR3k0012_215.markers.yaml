  - {type: variant, offset: 10, length: 0, content: '', krp: 曹吏部禮部兵部刑部民部工部各置侍郎一人以貳尚書之職唐書曰髙季輔爲吏部侍郎凡所銓叙時稱允當從幸翠微宫太宗賜金背鏡一面以表其清鑒焉又曰天后以許子儒爲天官侍郎儒不以藻飾爲意其𥙷官悉委令史勾直時謂勾直曰平配後崔玄暐爲之介然自守絶於請謁爲職政者所忌轉文昌左丞選司令史乃設齋自慶武太后聞之復拜爲天官侍郎又曰席豫爲吏部侍郎玄宗謂之曰以卿前爲考功職事平允故有此授豫}
  - {type: punctuation, offset: 11, content: 》, id: KR3k0012_CHANT_215-bkkpn2}
  - {type: variant, offset: 11, length: 0, content: '', SBCK: 選六年復有令譽又曰房頴叔拜天官侍郎自其髙祖景伯至頴叔四代咸居選部時論榮之又曰韋陟爲吏部侍郎常病選人冒名接脚竊授闕貟旣少取士良難正調者􅀍擠僞集者冒進陟剛腸嫉惡風彩嚴正見選人疑其有瑕按聲盤詰無不首伏每歳皆贖得數百貟闕以待淹滯常謂所親曰使陟知銓衡一二年則無人可選矣又曰崔羣徴拜吏部侍郎穆宗召見別殿謂羣曰我昇儲位知卿爲羽翼羣曰先帝意元在陛下頃者授陛下淮西節度使臣奉命草制且曰能辨􅀯陽之牘允符東海之賢􅀂不知先帝深旨臣豈敢輕言又曰崔鄲爲兵部侍郎夲官判吏部東銓事文宗勤於政道每苦選曹訛弊延英謂宰臣}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_SBCK_215-2a}
  - {type: variant, offset: 11, length: 0, content: '', krp: 選六年復有令譽又曰房頴叔拜天官侍郎自其髙祖景伯至頴叔四代咸居選部時論榮之又曰韋陟爲吏部侍郎常病選人冒名接脚竊授闕貟旣少取士良難正調者𬒳擠僞集者冒進陟剛腸嫉惡風彩嚴正見選人疑其有瑕按聲盤詰無不首伏每歳皆贖得數百貟闕以待淹滯常謂所親曰使陟知銓衡一二年則無人可選矣又曰崔羣徴拜吏部侍郎穆宗召見別殿謂羣曰我昇儲位知卿爲羽翼羣曰先帝意元在陛下頃者授陛下淮西節度使臣奉命草制且曰能辨南陽之牘允符東海之賢若不知先帝深旨臣豈敢輕言又曰崔鄲爲兵部侍郎夲官判吏部東銓事文宗勤於政道每苦選曹訛弊延英謂宰臣}
