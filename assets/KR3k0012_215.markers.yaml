  - {type: variant, offset: 3351, length: 0, content: '', WYG: 瞋睫承風子卿終不屈撓王處冲别傳曰處冲為尚書郎外望簡縱若有遺漏然事要機輒執其中中外之間亡所辨明臺閣益歸重之通典曰故事叔父兄弟不許同省為郎官格令不載亦無正勅貞觀二年十一月韋叔謹除刑部員外三年四月韋季武除主爵郎中其年七月韋叔諧除庫部郎中太宗謂曰知卿兄弟近在尚書省故授卿此官欲成一家之美無辭稍屈階資也其後同省者甚多近日非特恩除拜即須相迴避抱朴子曰漢末有襧衡者年二十三孔文舉齒過知命身居九列才譽冠群名位殊絶始友衡于布衣又薦之於朝以為宜使起家作臺郎世語曰青龍中石苞鬻鐵於長安}
