  - {type: variant, offset: 1706, length: 346, content: 又曰王泰字仲通為都官尚書能接人士士皆願其居選官頃之為吏部尚書衣冠傾屬又曰謝舉字言揚遷掌吏部舉祖莊宋代再典選至舉又三為此職前代未有也崔鴻十六國春秋曰永寧伯郭撫字仲安金城人也初為吏部尚書與郎姚範清心虛求搜揚俊乂內外稱之以擬魏之崔毛後魏書曰崔玄伯遷吏部尚書命有司制官爵撰朝儀協音樂定律令申科禁玄伯揔而裁之以為永式及置八部大夫擬八座玄伯通署三十六曹如令僕統事又曰崔亮遷吏部尚書時羽楚新害張尋之後靈太后令武官得依資入選官員既少應選者多前尚書李韶循常擢人百姓大為嗟怨亮乃奏為格制不問士之賢愚專以停解日月為斷雖復官須此人停日後者終於不得庸才下品年月久者灼然先用沉滯者皆稱其能又曰郭祚為吏部祚持身潔清重惜官位至於銓授假令得人必徘徊久之然後下筆即云此人便以貴矣由是頗勞滯當時每招怨言然所用者皆量才稱職時人以此歸, WYG: ''}
