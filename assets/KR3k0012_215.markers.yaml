  - {type: variant, offset: 10, length: 0, content: '', SBCK: 曹吏部禮部兵部刑部民部工部各置侍郎一人以貳尚書之職唐書曰髙季輔爲吏部侍郎凡所銓叙時稱允當從幸翠微宫太宗賜金背鏡一面以表其清鑒焉又曰天后以許子儒爲天官侍郎儒不以藻􅅚爲意其􅀘官悉委令史勾直時謂勾直曰平配後崔􅀇暐爲之介然自守絶於請謁爲職政者所忌轉文昌左丞選司令史乃設齋自慶武太后聞之復拜爲天官侍郎又曰席豫爲吏部侍郎􅀇宗謂之曰以卿前爲考功職事平允故有此授豫}
