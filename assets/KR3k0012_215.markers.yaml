  - {type: variant, offset: 2709, length: 411, content: 管記陸瑜言之於奐奐謂瑜曰江有潘陸之才而無園綺之實輔弼儲后竊有所難瑜具以白太子太子深以為恨乃自言於陳主將許之奐乃啟曰江揔文章之人今太子文藻不少無藉於揔如臣愚見願選敦重之才以居輔導陳主曰即如卿言誰當居此奐曰尚書王廊世有懿德識性敦敏可以居之太子時亦在側乃曰廊王泰之子不可為太子詹事奐又啟曰宋朝范蔚宗即范泰之子亦為太子詹事前世不疑太子固爭之陳主卒以揔果共太子為長夜之飲養良娣陳氏為女太子微行遊揔家陳主怒而免之隋書曰牛弘為吏部尚書其選舉先德行而後文才所進用多稱職吏部侍郎高世本鑒賞機晤清慎絕倫然爽俊有餘迹以輕薄時宰多以此疑之唯弘深識其真推心委任隋之選舉於斯為最又曰牛弘拜吏部尚書時高祖又令弘與楊素蘇威薛道衡許善心虞世基崔子發等并召諸儒論新禮降殺輕重弘所立議眾咸推服之仁壽二年獻皇后崩王公巳下不能定其儀注楊素謂弘曰公舊學時賢所仰今日之事決在於公弘了不辭讓斯須之間儀注悉備皆有故實素歎曰衣冠禮樂盡在此矣非吾所及也又曰韋世康拜吏部尚書前後, SBCK: 杖脛三}
