  - {type: variant, offset: 3342, length: 0, content: '', WYG: 不以徳顯乎其郎吏學通一經才任牧民博士課試擢其高第者亟用其浮華不務道本者皆罷退之又曰賈詡字文和武威姑臧人也少時人莫知唯漢陽閻忠異之謂有良平之計察孝亷為郎魏畧曰韓宣字景然為尚書郎嘗以職事當}
  - {type: variant, offset: 3343, length: 0, content: '', WYG: 罰已縳束竟杖未行文帝輦過問是誰左右以實對帝曰是子建所道韓宣耶特原之又曰姜維字伯約郡欲表維以為将維家本衣冠不願為將郡因表拜郎中呉志曰張純字元基少厲操行學博才秀而切問捷對容止可觀擢拜郎中又曰士燮字威彦蒼梧廣信人少遊學京師事頴川劉子竒治左氏春秋察孝亷補尚書郎又曰孫皓降晉賜歸命侯諸子為王者皆拜郎中晉書曰魏舒字陽元為尚書郎時選郎或有非}
