  - {type: variant, offset: 417, length: 1282, content: 綜晉書曰山濤為吏部尚書濤用人皆先密啟然後公奏又曰鄧攸為吏部尚書當時清靜內外肅然後牧馬於家庭妻息素食不受一錢又曰嵇紹字延祖裴頠亦深器之每曰使延祖為吏部尚書可使天下無復遺才矣又曰王戎為左僕射領吏部尚書自戎居選未嘗進一寒素退一虛名理一冤枉殺一疽嫉隨其沉浮門調戶選好營生廣收八方園田水碓周遍天下聚歛積實不知紀極又曰吳隱之與太常韓康伯鄰居康伯母殷浩之姊賢明婦人也每聞隱之哭聲輟飡投杼為之悲泣既而謂康伯曰若居銓衡當舉此輩人及康伯為吏部尚書隱之遂階清級又曰蔡克居選官茍進之徒望風畏憚初克未仕時河內山簡嘗與瑯邪王衍書曰蔡子尼今之正人衍以書示眾曰山子以一字拔人然未易可稱後衍聞克在選官曰山子正人之言驗於今矣晉起居注曰太康四年八月詔曰選曹銓管人才宜得忠恪寡欲抑華崇本者尚書朱整周慎廉敬以道素自居是其人也其以整為吏部尚書虞預晉書曰盧欽字子若少好學為尚書僕射領吏部欽清實選舉稱為廉平晉陽秋曰陳群為吏部尚書制九格登用皆由於中正考之簿冊然後授任晉書諸公贊曰李胤為吏部尚書正身率職不撓故能行其所見遂刊定選例而著于今宋書曰顏竣為吏部尚書留心選舉自強不息任遇既隆奏無不可後謝莊代竣意多不行竣容貌嚴毅莊風姿甚美賓客喧訴常懽笑荅之時人語曰顏竣嗔而與人官謝莊笑而不與人官又曰蔡廓為吏部尚書廓因傅隆問傅亮選事若悉以見付不論不然不能拜亮以語錄尚書徐羨之羨之曰黃門巳下悉以委蔡自此巳上宜共參同異廓曰我不能為徐干木署紙尾遂不拜干木羨之小字也選案錄尚書與吏部尚書連名故廓云紙尾又曰王弘自領選將加榮祿於人者每先呵責譴辱之然後施行若美相盻接語欣歡者必無所諧人問其故荅曰王爵既加於人又相撫勞便成與主分功此所謂奸以事君者也若求者絕官敘之分既無以為惠又不微借顏色即大成怨府亦鄙薄所不任問者悅伏又曰江湛為吏部尚書家甚貧不營財利餉饋盈門一無所受無兼衣餘食嘗為上所召遇澣衣稱疾經日衣成然後赴又曰庾仲文性好潔為吏部尚書用少府卿劉道錫為廣州刺史道錫至鎮餉白檀牽車常自乘焉或以白文帝帝見問曰道錫餉卿小車裝飾甚麗有之乎仲文懼起謝又曰庾炳之為吏部尚書通貨賄吏部令史錢泰能彈琵琶王客令史周伯齊善歌詣炳之宅諮事因留宿尚書舊制令史諮事不得宿停外雖有八座命亦不許為所司奏免官也又曰少帝即位以蔡廓為吏部尚書不肯拜乃以王惠代焉惠被召即拜未嘗接客人有與書求官者得轉聚置閣上及去職其封如初時談者以廓之不拜惠之即拜雖事異而意同也齊書曰褚彥回遷吏部尚書有人求官密袖中將一鉼金因求清閑出金示之曰人無知者彥回曰卿自應得官無假此物若必見與不得不相啟此人大懼收金而去彥回敘其事而不言其名時人莫之知也又曰褚炫為吏部尚書炫居身清立非弔問不雜交遊論者以為美及在選部門庭蕭索賓客罕至出行左右常捧一黃紙帽風吹紙剝殆盡南史曰初謝朓告王敬則敬則女為朓妻常懷刀欲報朓朓不敢相見及當拜吏部謙挹尤甚尚書郎范縝嘲之曰卿人才無慚小選但恨不可刑于寡妻朓有愧色南史曰蔡徵拜吏部尚書啟後主借鼓吹後主謂所司曰鼓吹軍樂有功乃授蔡徵不自量揆紊我朝章然其父景歷既有締搆之功宜且如啟拜訖即追還梁書曰蕭子明為吏部尚書性凝簡負才氣見九流賓客不與交言但舉扇一撝而巳衣冠竊恨之又曰謝覽字景滌朏之弟瀹之子也自祖至孫三代, WYG: 咸}
