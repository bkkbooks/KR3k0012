  - {type: variant, offset: 3322, length: 4, content: 制循資格, WYG: 舉孝亷試為天下第一旬日拜尚書郎又曰徐防為尚書郎性周密畏慎在臺閣典職十年奏事三世未嘗有過謝承後漢書曰尚書郎舊典秩滿遷令長鄭𢎞為僕射奏}
  - {type: page-break, offset: 3322, content: '', id: KR3k0012_WYG_215-7b, image: WYG0895/WYG0895-0015d.png}
  - {type: variant, offset: 3327, length: 0, content: '', WYG: 臺職任尊而賞薄人無樂者請使郎補二千石自始此也又曰方儲為郎中章帝使文郎居左武郎居右儲正位中曰臣文武兼備在所施用上嘉其才以繁亂絲付儲使理儲拔佩刀而斷之曰反經任勢臨事宜然又曰何湯拜郎中守開陽門候上微行夜還湯閉門不納更從中東門入明旦召詣太官賜食諸門候皆奪俸華嶠後漢書曰舘陶公主為子求郎不許賜錢千萬明帝謂群臣曰郎官上應列宿非其人則民受其殃又曰竇攸篤學退居舉孝亷為郎世祖㑹百寮於靈臺得鼠如豹文問群臣攸曰鼮鼠詔曰何以知曰見爾雅考書如攸言賜帛三百疋更勅諸王子從攸受爾雅又曰明帝性褊察嘗以事怒郎樂菘菘逕入牀下上怒甚疾呼曰郎出郎出菘曰天子穆穆諸侯皇皇未聞人君自起撞郎上乃舍之漢官儀曰尚書郎四人}
  - {type: page-break, offset: 3327, content: '', id: KR3k0012_WYG_215-8a, image: WYG0895/WYG0895-0016a.png}
  - {type: variant, offset: 3328, length: 0, content: '', WYG: 主匈奴單于營部一主羌夷吏民一主天下戸口土田墾作一主錢帛貢獻委輸又曰尚書郎主作文書起草夜更直五日於建禮門内又曰尚書郎給青縑白綾被或錦被帷帳氊褥通中枕太官供食湯官供䴵餌五熟果實下天子一等級尚書史二人女侍史二人皆選端正從直女侍執香鑪燒從入臺護衣奏事明光殿省皆胡粉塗畫古}
  - {type: page-break, offset: 3328, content: '', id: KR3k0012_WYG_215-8b, image: WYG0895/WYG0895-0016b.png}
  - {type: variant, offset: 3329, length: 11, content: 愚遵平轍者喜其循常負材, WYG: 人烈女郎握蘭含香趣走丹墀奏事黄門郎與對揖天子五時賜服若郎處曹三年稱侍郎續漢書百官志曰尚書郎三十人四百石魏志曰明帝太和四年詔曰世之質文随教而變兵亂以来經學廢絶後生進趣不由模典豈朕訓導未洽將進}
