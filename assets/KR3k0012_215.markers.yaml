  - {type: variant, offset: 1142, length: 218, content: 家甚貧不營財利餉饋盈門一無所受無兼衣餘食嘗為上所召遇澣衣稱疾經日衣成然後赴又曰庾仲文性好潔為吏部尚書用少府卿劉道錫為廣州刺史道錫至鎮餉白檀牽車常自乘焉或以白文帝帝見問曰道錫餉卿小車裝飾甚麗有之乎仲文懼起謝又曰庾炳之為吏部尚書通貨賄吏部令史錢泰能彈琵琶王客令史周伯齊善歌詣炳之宅諮事因留宿尚書舊制令史諮事不得宿停外雖有八座命亦不許為所司奏免官也又曰少帝即位以蔡廓為吏部尚書不肯拜乃以王惠代焉惠被召即拜未嘗接客人有與書求官者得轉聚置閣上及去, SBCK: 殿中郎洽兄弟羣從遞居此}
