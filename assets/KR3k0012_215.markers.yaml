  - {type: variant, offset: 14, length: 0, content: '', SBCK: 殊不選才安得摭實無濫可􅁵革否李石對曰令録可以啇量他官且冝循舊上曰循舊如配官耳賢不肖安能甄別乃召三銓謂之曰卿等比選令録如何注擬鄲對曰資叙相當問其爲治之術視可否而擬之帝曰依資合得而才劣者何授對曰與邊逺慢官帝曰如以不肖之才治邊民則疾苦可知也凢朝廷求理逺近皆湏得人苟非其才人受其􅁦矣又曰楊纂除吏部侍郎前後典選十餘載銓叙人倫稱爲允當然而抑文雅進􅃛吏觀時任數頗爲時論所譏又曰鄧􅀇挺爲吏部侍郎旣不稱職甚爲時談所鄙又時患消渴病選人因目爲鄧渴牓於衢路自有唐巳來掌選之失未有如􅀇挺者坐此左遷澧州刺史唐新語曰裴行儉爲吏部侍郎賞拔􅂫味道王勵曰二公後當相次掌鈞衡之任卒如其言又曰韋陟甞任吏部侍郎有一致仕官叙五品陟判之曰青壇展慶曾不立班朱紱承榮無冝卧拜時人推其強直又曰姜晦爲吏部侍郎性聦晤識理體舊制吏曹舎宇悉布􅁄以防令史與選人交通及晦領選事盡除之大開銓門示無所禁私引致者晦輙知之召問莫不首伏􅀄朝廷以晦改革前規咸以爲不可竟銓綜得所賄賂不行舉朝歎伏又曰馬載爲吏部侍郎時考功貟外劉思立子憲爲河內尉思立今日亡明日選人有索憲闕者載深咨嗟以爲名敎所不容乃書其無行注於集朝廷咸曰眞銓綜流品之司可謂振理風俗也其人比出選門爲衆目所視衆口所訐趑趄失歩揔叙尚書郎漢書曰南宫二十五星應臺郎位故明帝云郎官上應列􅀫即此也又曰主父偃詣闕上書朝奏暮召人見所言九事其八事爲律令其一事諌匈奴上謂曰公等安在何相見之晚乃拜偃爲郎中又曰韓信爲項羽郎中數干以䇿而弗用東觀漢記曰樊􅆊字文髙爲郎每甞直事駐車待漏雖在閑署冠劒不解於身每齋祠恐失時張燈俯伏爲郎二十三歳未甞􅀍奏三署服其愼重又曰黃香爲尚書郎甞獨止􅀫臺上晝夜不離省闥上聞善之又曰陽嘉二年汝南童子謝廉河南趙建年十二各通一經以太學􅀄繕應化而至皆除郎中又曰黄香知古今記羣書無不渉獵兼好圖䜟天官星氣鍾律曆筭窮極道術京師號曰天下無􅀟江夏黄童京師貴戚慕其聲名更饋衣物拜尚書郎後漢書曰馮豹拜尚書郎忠勤不懈每事未報常俯伏省閤或從昬至明肅宗聞而嘉之使黄門持􅀍覆豹勑令勿驚由是數加賞賜又曰馮勤除爲郎中給事尚書以圖議軍糧在事精勤遂見親識每引進帝輙顧謂左右曰佳乎吏也由是使典諸侯封事勤善量功次輕重國土逺近地􅀔豐薄不相踰越莫不厭服焉自是封爵之制非勤不定帝益以爲能又曰藥崧天性朴忠家貧爲郎常獨直臺上無􅀍枕杫杫思漬反謂爼几也方言云蜀漢之郊曰杫食糟糠帝每夜入臺輙見崧問其故甚嘉之自此詔太官賜尚書以下朝夕飡給帷􅀍皂􅂁又曰桓彬拜尚書郎時中常侍曺節女壻馮方亦爲郎彬厲志操與左丞劉歆右丞杜希同好交善未甞與方共酒食之會方深怨之遂彰言彬等爲酒黨事下尚書令劉猛猛雅善彬等不舉正其事節大怒劾奏猛以爲阿黨請􅀵下詔獄在朝者爲之寒心猛意氣自􅀂旬日得出免官禁錮彬遂見廢又曰王譯爲}
