  - {type: variant, offset: 1321, length: 218, content: 孝武皇帝時閑居無事燕坐未央前殿天新雨止朔執戟在殿階獨語上呼問之荅曰殿後柏樹上有鵲立枯枝上向東鳴上遣視如朔言上問何以知之朔曰以人事言之風從東方來鵲尾長傍風則蹶必當順風而立是以知東向鳴也何以知立枯枝上朔曰新雨止生枝滑枯枝澀是以知立枯枝上大笑風俗通曰墓上樹柏路頭石虎周禮方相氏入墟敺魍像魍像好食亡者肝腦人家不能常令方相立於墓側以禁禦之而魍像畏虎與柏列士傳曰延陵季子解寶劍帶徐君墓柏樹洞冥記曰磅山之北有穴穴上有柏昔李少翁於閬陰移來此穴種此柏已見, SBCK: ''}
