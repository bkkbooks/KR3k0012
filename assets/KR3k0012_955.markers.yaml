  - {type: variant, offset: 2913, length: 249, content: 至孝下詔褒揚號其所居為累德里唐書曰永崇二年太平公主降駙馬薛紹以萬年縣為禮會之所公主輅車自興安門南至宣陽坊之西街夜設燎炬烈熖相屬夾路槐樹多有死者又曰正元中度支欲取兩京道中槐樹為薪更栽小樹先下符牒渭南縣縣尉張造牒曰召伯所憩尚勿剪除先皇舊遊豈宜斬伐乃止又曰長慶中虢州刺史蕭祐奏湖城縣永方鄉百姓閻酆五代同居家內槐一本再生枝葉管子曰五沃之土其木宜槐晏子春秋曰齊景公有所愛槐使守令犯槐者刑傷槐者死有醉而傷槐且加刑焉其女懼而告晏子曰妾恐鄰國聞之謂君愛槐而殘人可乎晏子入言之公出傷槐之囚罷其禁淮南子曰槐之生也入季春, SBCK: 納妻}
