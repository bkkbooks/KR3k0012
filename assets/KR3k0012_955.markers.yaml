  - {type: variant, offset: 1299, length: 5, content: 隥此太行山, WYG: 中天子命桑虞主桑者也出桑者用禁暴民不得令妾割犯桑也神異經曰東方有樹焉高八十尺敷張自輔葉長一丈廣六七尺曰扶桑有椹焉長三尺五寸列女傳曰魯秋胡子納妻五日}
