  - {type: variant, offset: 2275, length: 260, content: 春秋元命苞曰樹槐聽訟其下槐之言歸也情見歸實也春秋說曰槐木者靈星之精爾雅曰懷槐大葉而黑槐樹葉大色黑者名為槐守官槐葉晝聶霄炕郭璞曰守宮槐晝日聶合而夜忼布晉儒林祭酒杜行齊說在朗陵縣南有一樹似槐葉晝藂合相著夜則舒布即守宮江東有樹與此相反俗因合昏曉晝夜異其理等霄炕音忼聶合也炕張也合晝夜開也五經通義曰士冢樹槐國語曰董叔將娶於范氏叔向曰盍已乎曰欲為繫援焉他日董祁愬之范獻子曰不吾敬也獻子執而紡之於庭槐叔向過之曰子盍為我請乎叔向曰欲而得之又何請焉紡懸也漢書曰昭帝建始四年山陽社中大槐樹吏人伐斷之其夜復自立如故晉書曰符堅僣號自長安至于諸, WYG: 荆}
