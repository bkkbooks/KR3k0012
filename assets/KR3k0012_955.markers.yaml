  - {type: variant, offset: 1542, length: 241, content: 枯海水涸竭帝覺遣人往穴掘不見其棺唯見赤鷰飛飜入雲移柏植於通靈臺水經曰陘山有鄭祭仲冢祭仲廟舊有一枯柏樹其塵根故株之上多生稚柏列秀青青望之可喜從征記曰泰山廟中柏皆三十餘圍俠兩階赤眉常斫一樹見血而止今斧創猶在地理志曰華山生文柏范子計然曰柏枝脂出輔上升價七十中三十下十漢官儀曰正旦飲柏葉酒上壽漢武故事曰柏梁臺高二十丈悉以柏香聞數十里列仙傳曰赤須子好食柏實齒落更生仙經曰服柏子人長年三輔黃圖曰漢文帝霸陵不起山陵稠種柏樹三輔舊事曰漢諸陵皆屬大常又有盜柏者棄市太山記曰山南有太山廟種柏樹千株大者十, SBCK: 尺}
