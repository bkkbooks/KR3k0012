  - {type: variant, offset: 3548, length: 0, content: '', SBCK: 化而自裏九年生翼十年而死石虎鄴中記曰幸梓苑中盡種桑三月三日及蠶時虎皇后將宫人數千出採桑遊戲其下汜勝之書曰種桑五月取椹著水中濯洒取子隂乾之好治肥田十畒荒乆不耕者先好耕治之􅁰椹子各三􅂛合和種之􅁰桑當頃俱生鉏之桑令稀䟽調適􅁰熟穫之桑生正與􅁰髙下平因以利鎌歷地刈之曝令燥後有風調放火燒之常逆起火桑至春生一畒食三簿􅁞神仙傳曰麻姑謂王方平云吾見東海三爲桑田夲草經曰桑根旁行出土上者名伏蛇治心痛神農夲草曰桑根白皮是今桑樹根上白皮常以四月採或採無時出見地上名馬領勿取毒殺人典術曰桑木者箕星之精楚辭曰衣攝葉以儲與􅀆攝葉儲與不舒展之貌左祛絓於扶桑祛神也得巳衣服長大攝葉儲與不得舒展得能弘}
