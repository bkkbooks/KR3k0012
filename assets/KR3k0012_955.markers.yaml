  - {type: variant, offset: 2023, length: 358, content: 盧氏縣有盧君古塚塚傍古柏二枝條蔭二百餘步樹文隱起皆龜甲堅如鐵石嵇康飬生論曰麝食柏而香楚詞曰山中人兮芳杜若飲石泉兮飯松柏古歌曰平陵東松柏桐不知何人卻義公劉越石扶風歌曰南山石嵬嵬松柏何摧摧上枝拂青雲中心十數圍洛陽發中梁松柏竊自悲誰能刻鏤此公輸與魯班被之用丹漆薰用蘇合香本自南山柏今為宮殿梁槐周禮曰朝士掌三槐三公位焉鄭玄曰槐之言懷言來人也又曰司烜氏掌冬取槐檀之火左傳曰趙宣子驟諫公患之使鉏麑賊之晨往寢門闢矣盛服將朝尚早坐而假寐不解衣冠而睡麑退歎曰不忘恭敬民之主也賊民之主不忠棄君之命不信有一於此不如死也觸槐而卒春秋元命苞曰樹槐聽訟其下槐之言歸也情見歸實也春秋說曰槐木者靈星之精爾雅曰懷槐大葉而黑槐樹葉大色黑者名為槐守官槐葉晝聶霄炕郭璞曰守宮槐晝日聶合而夜忼布晉儒林祭酒杜行齊說在朗陵縣南有一樹似槐葉晝藂合相著夜則舒布即守宮, SBCK: 桓冲爲}
