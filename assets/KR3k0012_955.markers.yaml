  - {type: variant, offset: 771, length: 220, content: 林乃表漢宣之應廟樹重青必彰陝西之瑞北齊書曰魏蘭根丁母憂居喪有孝稱將葬常山郡境先有董卓祠祠有柏樹蘭根以卓凶逆無道不應立祠至令乃伐柏以為槨材人或勸之不伐蘭根盡取之了無疑懼又曰樊衛性至孝喪父負土成墳植柏方數十畝朝夕號慕又曰文宣王曾晉陽夜宿松門嶺有數株松皆已千年枝葉踈茂似有神物所託文宣時已被酒向嶺瞋罵射中一株未幾枯死後周書曰武帝伐齊永昌公椿屯雞栖原齊王憲密謂椿曰兵者詭道去留不定見機而作不得遵常汝今為營不須張幕可伐柏為菴示有形勢令兵去之後賊猶致疑, SBCK: 主太封}
