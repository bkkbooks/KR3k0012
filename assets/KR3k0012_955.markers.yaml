  - {type: variant, offset: 1031, length: 23, content: 蔡景王整文帝弟也周明帝時以武元軍功賜爵從武帝平, SBCK: ''}
  - {type: variant, offset: 1031, length: 0, content: '', WYG: 齊河清中定令丁給永業二十畝為桑田給其種桑五十根榆三根棗五根土不宜桑者給麻田如桑法家語曰殷太戊之時道缺法圯以致殃孽桑榖生朝范子計然曰桑葉出出三輔列子曰晉文公㑹欲伐衛公子鉏仰而笑公問何笑對曰臣之隣有送妻適婦家者道見桑婦悦而與言然顧視其妻亦有招之者臣竊笑此也公悟其言乃止引師還未至而有伐其北鄙者孟子曰孟子謂梁惠王曰五畝之宅樹之以桑五十者可以衣帛矣孫子卿曰孔子適楚於陳}
  - {type: page-break, offset: 1031, content: '', id: KR3k0012_WYG_955-7b, image: WYG0901/WYG0901-0440d.png}
  - {type: variant, offset: 1031, length: 23, content: 蔡景王整文帝弟也周明帝時以武元軍功賜爵從武帝平, krp: ''}
  - {type: variant, offset: 1032, length: 1, content: 景, WYG: 之間七日不食曰居不隠者思不生身不佚者志不廣汝痛之吾不得之桑落之韓子曰子産開畝樹桑鄭人謗訾鄒子曰季夏取桑柘之火吕氏春秋曰伊尹之母居伊水上孕夢有神告之曰臼出水而東走無顧明日視臼中出水告其隣東走顧其邑盡為水身因化為桑有莘氏採桑得嬰兒於桑之中獻之於君君命乳之命之曰伊尹淮南子曰原蠶一嵗再登非不利也登成也然}
