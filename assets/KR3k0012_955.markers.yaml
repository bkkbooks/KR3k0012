  - {type: variant, offset: 2536, length: 938, content: 夾路皆種槐柳百姓歌曰長安大街夾路楊槐下走朱輪上有棲鸞又曰大司馬府有老槐樹殷仲文對而歎曰此樹婆娑生意盡矣崔鴻前涼錄曰初河右不生楸槐柏漆張駿之世取於泰隴而植之終於皆死而酒泉宮之北隅有槐樹生焉李玄盛著槐樹賦沈約宋書曰孔子夜夢三槐之間豐沛之邦有赤氣驅車對楚西北街之見芻兒敵麟傷其左足薪而覆之梁書曰庾肩吾常服槐實年七十餘目看細字鬢皆黑離亂之際奔于江陵後周書曰韋孝寬之為雍州刺史先是路側一里置一土堠經雨頹毀每須修之自孝寬臨州乃勒部內當堠處植槐樹代之即免修復行旅又得芘蔭文帝後見怪問知之曰豈得一州獨爾當令天下同之於是令諸州道路一里種樹一株十里種三樹百里五樹焉隋書曰高頴字昭玄領新都大監每坐槐樹下以聽事多不依行列有司伐之特令存之勿去示於後人又曰士回以孝聞開皇初卒子士雄少質直孝友喪父復廬於側負土成墳其庭前有一槐樹先甚鬱茂及士雄居喪樹遂枯死服闕還宅死槐復榮高祖聞之歎其父子至孝下詔褒揚號其所居為累德里唐書曰永崇二年太平公主降駙馬薛紹以萬年縣為禮會之所公主輅車自興安門南至宣陽坊之西街夜設燎炬烈熖相屬夾路槐樹多有死者又曰正元中度支欲取兩京道中槐樹為薪更栽小樹先下符牒渭南縣縣尉張造牒曰召伯所憩尚勿剪除先皇舊遊豈宜斬伐乃止又曰長慶中虢州刺史蕭祐奏湖城縣永方鄉百姓閻酆五代同居家內槐一本再生枝葉管子曰五沃之土其木宜槐晏子春秋曰齊景公有所愛槐使守令犯槐者刑傷槐者死有醉而傷槐且加刑焉其女懼而告晏子曰妾恐鄰國聞之謂君愛槐而殘人可乎晏子入言之公出傷槐之囚罷其禁淮南子曰槐之生也入季春五日而兔目十日而鼠耳更旬而始規二旬葉成規葉始開也又曰九月官候其樹槐是月繕修守備故官候樹槐槐懷也取懷近遠也又曰老槐生火又曰槐市學也樹以青槐燧人秋取槐檀之火天之所覆地之所載六合所包陰陽所照雨露所扶此皆生於父母所闕於一和也父天母地故槐榆與橘柚合而兄弟有廣與三危通為一家抱朴子曰槐子新瓷合泥封之二十餘日其表皮皆爛乃洗之如大豆日服之此物至補腦早服之令人髮不白而長生太公金匱曰武王問太公曰天下神來甚眾恐有識者何以待之太公曰請樹槐於王門內有益者入無益者距之三輔黃圖曰元始四年起明堂辟雍為博士舍三十區為會市但列槐樹數百行諸生朔望會此市各持其郡所出物及經書相與賣買雍雍揖讓論議槐下侃侃誾誾如也事具禮部學校篇焦贛易林家人之乾曰千歲槐身多斧斤汝南, WYG: ''}
