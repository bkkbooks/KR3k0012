  - {type: variant, offset: 128, length: 0, content: '', SBCK: 月命野虞無伐桑柘又曰古者天子諸侯必有公桑蠶室近川而爲之左傳曰晉重耳及齊桓公妻之有馬二十乗公子欲安之從者以爲不可將行謀}
  - {type: variant, offset: 128, length: 0, content: '', WYG: 月命野虞無伐桑柘又曰古者天子諸侯必有公桑蠶室近川而為之左傳曰晉重耳及齊齊桓公妻之有馬二十乗公子欲安之從者以為不可將行謀}
  - {type: variant, offset: 128, length: 0, content: '', krp: 月命野虞無伐桑柘又曰古者天子諸侯必有公桑蠶室近川而爲之左傳曰晉重耳及齊桓公妻之有馬二十乗公子欲安之從者以爲不可將行謀}
  - {type: variant, offset: 129, length: 0, content: '', SBCK: 桑下蠶妾在其上以告姜氏姜氏殺之又宣上曰趙宣子田於首山舎於翳桑田獵也翳桑桑之多䕃翳者也見靈輙餓問其病應之曰不食三日矣食之捨其半問之曰官三年矣宦未知母之存否今近焉去家近也請以遺之使盡之而爲之簞食與肉簞笥寘諸槖以與之旣而與爲公介靈輙為公甲也倒㦸以禦公徒而免問其故曰翳桑之餓}
