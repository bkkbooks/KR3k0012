  - {type: variant, offset: 2382, length: 334, content: 東有樹與此相反俗因合昏曉晝夜異其理等霄炕音忼聶合也炕張也合晝夜開也五經通義曰士冢樹槐國語曰董叔將娶於范氏叔向曰盍已乎曰欲為繫援焉他日董祁愬之范獻子曰不吾敬也獻子執而紡之於庭槐叔向過之曰子盍為我請乎叔向曰欲而得之又何請焉紡懸也漢書曰昭帝建始四年山陽社中大槐樹吏人伐斷之其夜復自立如故晉書曰符堅僣號自長安至于諸州夾路皆種槐柳百姓歌曰長安大街夾路楊槐下走朱輪上有棲鸞又曰大司馬府有老槐樹殷仲文對而歎曰此樹婆娑生意盡矣崔鴻前涼錄曰初河右不生楸槐柏漆張駿之世取於泰隴而植之終於皆死而酒泉宮之北隅有槐樹生焉李玄盛著槐樹賦沈約宋書曰孔子夜夢三槐之間豐沛之邦有赤氣驅車對楚西北街之見芻兒敵麟傷其左足薪而覆之梁書曰庾肩吾常服槐實年七十餘目看細字鬢皆黑離亂之際奔于江陵後周書曰韋孝寬之為雍, SBCK: ''}
