  - {type: variant, offset: 1380, length: 435, content: 朔曰以人事言之風從東方來鵲尾長傍風則蹶必當順風而立是以知東向鳴也何以知立枯枝上朔曰新雨止生枝滑枯枝澀是以知立枯枝上大笑風俗通曰墓上樹柏路頭石虎周禮方相氏入墟敺魍像魍像好食亡者肝腦人家不能常令方相立於墓側以禁禦之而魍像畏虎與柏列士傳曰延陵季子解寶劍帶徐君墓柏樹洞冥記曰磅山之北有穴穴上有柏昔李少翁於閬陰移來此穴種此柏已見扶桑三枯海水涸竭帝覺遣人往穴掘不見其棺唯見赤鷰飛飜入雲移柏植於通靈臺水經曰陘山有鄭祭仲冢祭仲廟舊有一枯柏樹其塵根故株之上多生稚柏列秀青青望之可喜從征記曰泰山廟中柏皆三十餘圍俠兩階赤眉常斫一樹見血而止今斧創猶在地理志曰華山生文柏范子計然曰柏枝脂出輔上升價七十中三十下十漢官儀曰正旦飲柏葉酒上壽漢武故事曰柏梁臺高二十丈悉以柏香聞數十里列仙傳曰赤須子好食柏實齒落更生仙經曰服柏子人長年三輔黃圖曰漢文帝霸陵不起山陵稠種柏樹三輔舊事曰漢諸陵皆屬大常又有盜柏者棄市太山記曰山南有太山廟種柏樹千株大者十五六圍長老傳云漢武所植三齊記曰堯山祠旁有柏樹枯而復生不知幾世陳留, WYG: 益都}
