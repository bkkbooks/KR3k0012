  - {type: variant, offset: 3545, length: 2, content: 李昌, SBCK: 扶桑在碧海中上有天帝宫東王公所治有椹樹長數千丈二千圍兩兩同根更相依􅀝故曰扶桑仙人食其椹椹體作金色其樹雖大椹如中夏桑椹也稀而色赤九千歳一生實耳味甘香玄中記曰天下之髙者扶桑無枝木焉上至天盤蜿而下屈通三泉括地圖曰化民食桑二十七}
  - {type: variant, offset: 3545, length: 2, content: 李昌, WYG: 扶桑在碧海中上有天帝宫東王公所植有椹樹長數千丈大一千圍兩兩同根更相依倚故曰扶桑仙人食椹體作金色其樹雖大椹如中夏桑椹也稀而色赤九十嵗一生實味甘𤣥中記曰天下之高者扶桑無枝木焉上至天盤屈蜿蜒而下括地圖曰化民食桑二十七}
