  - {type: variant, offset: 1784, length: 233, content: 六圍長老傳云漢武所植三齊記曰堯山祠旁有柏樹枯而復生不知幾世陳留耆舊傳曰李充喪父父冢側有夜盜斫柏樹者充手刃之述征記曰柏谷谷名也漢武帝微行所至處長慠賓於柏谷者也谷中無迴車地狹以高原林柏蔭藹窮日殆弗覩陽景也晉官闕名曰華林園柏二株崔寔四民月令曰七月收柏實列異記曰陳倉人有得異物者其形不類豬亦不似羊眾莫能名二童子曰此為媼常在地下食死人腦若欲殺之使柏葉插其頭幽明錄曰王丞相見郭景純請為一卦卦成郭意甚惡云有震厄公能命駕西出數里得一柏樹截如公長置常寢處災可消也王從之數日果震柏木粉碎, SBCK: 寸}
