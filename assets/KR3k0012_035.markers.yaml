  - {type: variant, offset: 91, length: 14, content: 仲春行夏令則國乃大旱煖氣早來, SBCK: 彼有不穫穉此有不歛穧彼有遺秉此有滯穗伊寡婦之利秉把也鄭箋云成王之時言百榖旣多穗同齊然收刈促遽力皆不足而有不􅀗不斂遺秉滯穗寡婦取之以利也}
