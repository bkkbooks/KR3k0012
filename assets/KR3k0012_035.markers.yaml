  - {type: variant, offset: 3526, length: 5, content: 寒凌破河橋, SBCK: 龍東方老人舞之壬癸黒}
  - {type: variant, offset: 3526, length: 5, content: 寒凌破河橋, WYG: 體丈夫欲藏匿女子欲和而樂師曠占旱曰嵗欲旱旱草先生旱草者蒺藜也山海經曰大華之山削成四方有蛇名肥遺六足四翼見則天下大旱湯時也東荒之北隅有山名土丘應龍處南極殺蚩尤與夸父不得復上故下數旱旱而作龍應之乃得大雨上無作雨者故也}
