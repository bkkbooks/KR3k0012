  - {type: variant, offset: 287, length: 125, content: 經通義曰冬至陽動於下推陰而上之故大寒於上夏至陰動於下推陽上之故大熱於上故易云日月運行一寒一暑日在牽牛則寒在東井則暑牽牛外宿遠人故寒東井內宿近人故溫也白虎通曰夏至陰始起反大熱何陰起陽氣推而上故大熱也又曰至人神矣入大澤不濡焚而不能熱也又曰暍者反凍於冷風管, SBCK: 寸公問晏子晏}
