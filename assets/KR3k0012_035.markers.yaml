  - {type: variant, offset: 2451, length: 0, content: '', SBCK: 又曰魯昭公十六年秋鄭大旱使屠擊有事於桑山􅀕山也斬其木不雨子産曰有事於山蓻山林也養護令繁植也而斬其木其罪大矣奪之官邑漢書曰百里嵩字景山爲徐州刺史時旱嵩行部傳車所經甘雨輙澍東海祝其合郷二縣在山間嵩不往二縣獨不得雨父}
  - {type: page-break, offset: 2451, content: '', id: KR3k0012_SBCK_035-7b}
  - {type: variant, offset: 2451, length: 0, content: '', WYG: 又曰魯昭公十六年秋鄭大旱使屠擊有事于桑山事祭山也斬其木不雨子産曰有事于山蓻山林也而斬其木其罪大矣奪之官邑漢書曰百里嵩字景山為徐州刺史時旱嵩行部傳車所經即雨輒㴻東海祝其合鄉三縣在山間嵩未徃三縣獨不得雨父}
