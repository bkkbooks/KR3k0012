  - {type: variant, offset: 2647, length: 277, content: 曰寒門積寒所在故曰寒門又曰夏䖝不可與語寒蜩蟬不知寒雪又曰青女天神青女玉女仲春二月之夕乃閉其寒呂氏春秋曰衛靈公天寒鑿池宛春曰天寒恐傷民公曰寒哉春曰君衣狐裘坐熊席取火是故不寒民衣弊不苴君則不寒民則寒矣公曰善命罷役左右曰是德必歸於春不可公曰春而有之善乃寡人之善也衛人悅當時謂公得君道矣又曰冬之德寒又曰見瓶水之冰而知天下之寒淮南子又載也國語曰火見而清風戒寒火心星青風寒風也清風至而脩城郭戰國策曰田單為齊相過淄水有老人涉淄而寒不能行單乃解裘衣與之襄王曰單之厚施欲取我國乎有貫珠者聞之曰不知因以為己下令曰寡人憂民之寒單解裘衣與之稱寡人意於是閭里相與語曰單之愛人乃王之, SBCK: 川}
  - {type: variant, offset: 2647, length: 353, content: 曰寒門積寒所在故曰寒門又曰夏䖝不可與語寒蜩蟬不知寒雪又曰青女天神青女玉女仲春二月之夕乃閉其寒呂氏春秋曰衛靈公天寒鑿池宛春曰天寒恐傷民公曰寒哉春曰君衣狐裘坐熊席取火是故不寒民衣弊不苴君則不寒民則寒矣公曰善命罷役左右曰是德必歸於春不可公曰春而有之善乃寡人之善也衛人悅當時謂公得君道矣又曰冬之德寒又曰見瓶水之冰而知天下之寒淮南子又載也國語曰火見而清風戒寒火心星青風寒風也清風至而脩城郭戰國策曰田單為齊相過淄水有老人涉淄而寒不能行單乃解裘衣與之襄王曰單之厚施欲取我國乎有貫珠者聞之曰不知因以為己下令曰寡人憂民之寒單解裘衣與之稱寡人意於是閭里相與語曰單之愛人乃王之教也周書時訓曰小寒之日鴈不北嚮民不懷主鵲不始巢國家不寧雉不始巢國乃大水大寒之日雞不乳淫女亂男鷙鳥不厲國不除兵水澤不堅言乃不從說苑曰國有五寒而水凍不與焉一, WYG: 川祝詞}
