  - {type: variant, offset: 278, length: 2, content: 喜怒, WYG: 乗木而王則草木豐茂嘉榖並生春秋元命苞曰咸池主五榖其星五者各以其職以精委為國也宋均曰榖有五故五星主之咸池之為言皆多也言榖生于子水含秀懐實至秋精垂故一名五車取載而歸之之義也孝經援神契曰嵗星守心年榖豐晏子春秋景公伐魯得東門}
