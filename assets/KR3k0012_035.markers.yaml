  - {type: variant, offset: 2182, length: 0, content: '', SBCK: 士大夫糟糠不足我亦何必獨飽姉誠知如是何不告我而自苦􅀂此乃自以私粟與公緒又以告母母亦賢之遂使分施由是顯名周書曰天有四殃水旱飢荒其至無時非積畜何以備之夏歸藏曰士無兼年之食遇天飢妻子非其妻子也大夫無兼年之食遇天飢輿馬}
