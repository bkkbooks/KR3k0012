  - {type: variant, offset: 3518, length: 7, content: 永寧二年十二月, SBCK: 春甲乙不􅀨東爲青龍又爲}
  - {type: variant, offset: 3518, length: 7, content: 永寧二年十二月, WYG: 春夏雨日而不雨甲乙不雨命為青龍又為火龍東方小童舞之凡如此而不雨濳處闔南門置水其外開北門取人骨埋之如此而不雨命巫祝而暴之不雨禱山神積薪擊鼓而焚之瑞應圖曰遇旱責躬引咎理察寃枉退去貪殘側修惠政則降以靈雨如其有道術禱祀山川致龍轉石閉陽從隂之類誠非瑞應是以魯侯有暴尫之請齊景公以祠山見譏董仲舒曰春旱求雨令縣邑以水日令民禱社家人祀戸無伐名木無斬山林曝巫聚尫八日於邑東門外為四通之壇方八尺植蒼繒八其神共工祭以魚八夏求雨亦以水日家人祀竈無舉土功更浚水井曝釜甑杵臼七日為四通壇于邑南門外方七尺植赤繒七其神蚩尤祭以赤雄雞七凡求雨之}
