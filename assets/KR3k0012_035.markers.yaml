  - {type: variant, offset: 3685, length: 360, content: 雪十餘日漢張奐與延篤書曰太陰之地冰厚三尺木皮三寸風寒冽肌傷骨但以非老憊者所堪而復加之以師旅因之以飢饉眾艱罄集不可一二而言也後漢張衡思玄賦曰逼區中之隘陋兮將北度而宣遊宣遍也行積冰之皚皚兮清泉泫而不流冱凍也寒風凄其永至兮拂穹岫之騷騷玄武縮於殼中兮騰虵冤而自紏龜與地交曰玄武也魚矝鱗而并凌兮鳥登木而失條凌冰也晉潘岳寡婦賦曰夜漫漫以悠悠兮寒凄凄以凜凜魏應璩新詩曰嵐山寒折骨面目盡生瘡嵐山羗中山名傅玄詩曰季冬時慘烈猛寒不可勝嚴風截人耳素雪隨地凝床上飛霜起波中自生冰未夕結重衾崇朝不敢興又陸機樂府苦寒行曰北遊幽朔城涼野多嶮難俯入穹谷底仰陟高山盤凝冰結重澗積雪被長巒陰雲與巖側悲風鳴樹端不覩白日景但聞寒鳥喧猛虎憑林嘯玄猿臨岸歎平聲夕宿喬木下慘愴恒尠歎渴飲堅冰漿飢噉零露食又連珠曰沉寒凝海不能結風琴操曰曾子嘗耕於泰山之下遭天雨雪寒凍旬日, SBCK: 止遂殺􅃖尤妖}
