  - {type: variant, offset: 2438, length: 0, content: '', krp: 旱之言悍也陽驕蹇所致也詩曰旱旣太甚悠悠山川又曰旱魃爲虐如惔如焚我心癉暑癉病也憂心如熏熏灼也又曰旱旣大甚藴隆蟲蟲雷而非雨書說命曰若歳大旱用汝作霖雨又曰僭恒暘若君行僣差則常陽順之禮曰}
  - {type: variant, offset: 2440, length: 3, content: 即位仲, SBCK: 召弦子問曰天乆不􅀨吾欲􅁀尫而奚􅀂對曰天則不􅀨而暴人之病子虐無乃不可乎暴巫而奚􅀂對曰天則不􅀨望之愚婦人於以求之無乃巳踈乎周禮曰司空掌羣巫之政令􅀂國大旱則率巫而舞雩又曰女巫旱暵則舞雩傳曰衛大旱寗莊子曰昔周飢克殷而年豐今邢方無道天其或者欲使衛討邢乎從之師興而􅀨又曰魯僖公三年自十月不雨至于五月不曰旱不爲災又曰衛大旱卜有事於山川不吉又曰僖公二十一年}
  - {type: page-break, offset: 2440, content: '', id: KR3k0012_SBCK_035-7a}
  - {type: variant, offset: 2440, length: 3, content: 即位仲, WYG: 召縣子問天久不雨吾欲暴尫而奚若曰天則不雨而暴人之疾子無乃不可與然則暴巫而奚若曰天則不雨而望之愚婦人於以求之無乃已踈與周禮曰司巫掌羣巫之政令若國之大旱則率巫而舞雩又曰女巫掌嵗時袚除釁浴旱暵則舞雩傳曰衛大旱寗莊子曰昔周饑克殷而年豐今邢方無道天其或者欲使衛討邢乎從之師興而雨又曰魯僖公三年自十月不雨至于五月不曰旱不為災也又曰衞大旱卜有事於山川不吉又曰僖公二十一年}
