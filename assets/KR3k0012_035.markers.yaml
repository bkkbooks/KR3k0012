  - {type: variant, offset: 1639, length: 151, content: 嚴凝之氣始於西南而盛於西北此天地之義氣也又月令曰仲春行秋令則寒氣惣至又曰季冬之月命有司大儺旁磔以送寒氣鄭玄曰丑為牛言歲正者也送猶畢也又曰九月中氣是月也霜始降則百工休謂膠漆作停乃命有司曰寒氣惣至人力不堪其皆入室霜降後清風戒寒所以令人入室又曰孟冬行夏令則國多暴風巽為風立夏巽用事故行夏令則多暴風方冬不寒夏氣, SBCK: 飢米石三}
