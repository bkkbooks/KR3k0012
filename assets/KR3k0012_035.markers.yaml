  - {type: variant, offset: 2438, length: 0, content: '', SBCK: 旱之言悍也陽驕蹇所致也詩曰旱旣太甚悠悠山川又曰旱魃爲虐如惔如焚我心癉暑癉病也憂心如熏熏灼也又曰旱旣大甚藴隆蟲蟲雷而非􅀨書􅀃命曰􅀂歳大旱用汝作霖􅀨又曰􅆫􅁪􅊙􅀂君行僣差則常陽順之禮曰}
  - {type: variant, offset: 2438, length: 0, content: '', WYG: 旱之言悍也陽驕蹇所致也詩曰旱既大甚滌滌山川又曰旱魃為虐如惔如焚我心癉暑癉疾也憂心如熏熏灼也又曰旱既大甚藴隆蟲蟲雷而非雨書說命曰若嵗大旱用汝作霖雨又曰僣恒暘若禮曰}
