  - {type: variant, offset: 1791, length: 214, content: 時方冬而溫蟄虫復出虫以寒蟄溫而復出又曰大寒之日雞始乳鴈北嚮又曰是月也乃命有司曰寒氣總至民力不堪其皆入室又曰季春行冬令則寒氣時發草木皆肅又曰孟冬行夏令則國多暴風方冬不寒蟄虫復出傳曰楚莊王圍蕭申公巫臣曰師人多寒王巡三軍拊而勉之三軍之士皆如挾纊史記曰須賈見范睢曰今叔何事范睢曰臣為人傭賃須賈意哀之留與坐飲食曰范叔寒如此哉乃取一綈袍以賜之漢書曰上聞韓王信降匈奴上將擊之連戰乘勝逐北至樓煩會大寒士卒墮指者十二三又曰邴吉為廷尉時有老人年八十, SBCK: ''}
