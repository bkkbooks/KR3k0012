  - {type: variant, offset: 278, length: 2, content: 喜怒, SBCK: 乗木而王則草木豐茂嘉􅂖並生春秋元命苞曰咸池主五􅂖其星五者各以有職以精委爲􅂖也宋均曰榖有五故五星主之咸池之爲言皆多也言榖生於子水含秀懷實至秋精垂故一名五車以載歸之爲言扶而化之孝經援神契曰歳星守心年􅂖豐晏子春秋景公伐魯得東門}
