  - {type: variant, offset: 2452, length: 0, content: '', SBCK: 請之入界即􅀨澍又曰和帝永元六年秋旱時洛陽有􅁈囚帝録囚理􅁈未還宫雨澍鄧太后事同續漢書曰郡國旱公卿行雩禮求􅀨閉諸陽門衣皂衣興土龍立土人舞童二佾七日一處又曰郡國旱各掃除社稷公卿官長以次行雩禮求雨也魏志曰衛玠見黥面者其妻子没爲官僮玠曰使天下不􅀨者盖由此也太祖乃怒玠晉書曰督運令史淳于伯刑於建康市百姓諠譁咸曰伯􅁈於是大旱三年京氏易曰人君無惠澤於下則小旱管}
  - {type: page-break, offset: 2452, content: '', id: KR3k0012_SBCK_035-8a}
