  - {type: variant, offset: 930, length: 275, content: 晨禽不敢飛毒淫尚多死渡瀘寧具腓病也生軀蹈死地昌志登禍機魏王粲大暑賦曰或赫㸍以瘴炎或鬱術而燠蒸獸狼望以倚喘鳥垂翼而弗翔根生苑而焦炙豈含血而能當仰庭槐而嘯風風既生其如湯氣呼吸以祛短汗雨下而沾裳就清泉以自沃猶淟涊而不涼體煩茹以於悒心憤悶而窘惶又曹植大暑賦曰大暑赫其遂蒸元服華而尚黃虵拒鱗於靈窟龍解角於皓蒼遂乃溫風赫㸍草木垂幹山拆海沸沙融礫爛飛魚躍渚潛黿浮岸鳥張翼以遠栖獸交逝而雲散晉傅咸感涼賦曰踐朱明之中月暑鬱隆以肇興赫融融以彌熾乃沸海而焦陵稽含困熱賦序曰夫閏於夏則崇暑在冬則增寒永熙元年閏在仲夏三伏之節始奏啇秋之辰未期余以下里貧生居室卑陋小巷不來清風短廡, SBCK: ''}
