  - {type: variant, offset: 706, length: 2, content: 壽林, SBCK: 鰩魚見天下大穰古歌詞曰長安城西􅀟貟闕上有一􅀟銅雀宿一鳴五􅂖生再鳴五􅂖熟凶荒禮曰歳㓙年􅂖不登君膳不􅀕胏馬不食􅂖馳道不除􅀕事不懸大夫不食梁士飲酒不樂皆爲自損憂民禮殺生則祭先有虞氏以首夏后氏以心殷人以肝周人胏不􅀕胏則不殺生也天子食曰少牢朔日大牢諸侯食日特牲朔日少牢除治道爲妨民取􅂼食懸樂噐鐘磬}
  - {type: page-break, offset: 706, content: '', id: KR3k0012_SBCK_035-3a}
  - {type: variant, offset: 706, length: 2, content: 壽林, WYG: 離魚見天下大穰古歌詞曰長安城西雙員闕上有一雙銅雀宿一鳴五榖生再鳴五榖熟凶荒禮曰嵗凶年榖不登君膳不祭肺馬不食粟馳道不除祭事不懸大夫不食粱士飲酒不樂皆為自損憂民禮殺生以祭先有虞氏以首夏后氏以心殷人以肝周人以肺不祭肺則不殺生也天子食日少牢朔日太牢諸侯食日特牲朔日少牢除馳道為妨民取蔬食懸樂器也鐘磬}
  - {type: variant, offset: 706, length: 2, content: 壽林, krp: 鰩魚見天下大穰古歌詞曰長安城西雙貟闕上有一雙銅雀宿一鳴五糓生再鳴五糓熟凶荒禮曰歳㓙年糓不登君膳不祭胏馬不食糓馳道不除祭事不懸大夫不食梁士飲酒不樂皆爲自損憂民禮殺生則祭先有虞氏以首夏后氏以心殷人以肝周人胏不祭胏則不殺生也天子食曰少牢朔日大牢諸侯食日特牲朔日少牢除治道爲妨民取𬞞食懸樂噐鐘磬}
  - {type: variant, offset: 709, length: 0, content: '', SBCK: 属也梁嘉食也不樂去琴瑟也又曰㓙年則乗駑馬祀以下牲自貶損亦取易供也駑馬六種最下也下牲少牢若特豕特豚也傳曰五年春無冰梓愼曰今兹宋其饑乎歳在星紀而滛於􅀇枵以有時災隂不堪陽時災無水也隂盛用事而温無水是隂不勝陽地氣發泄也虵乗龍虵􅀇武之宿虚危之星龍歳星歳星木也爲青龍星失次爲虵所乗龍宋鄭之星宋鄭必饑又曰晉荐飢麥未皆不熟也使乞糴于秦秦伯謂百里奚與諸乎對曰天災流行}
