  - {type: variant, offset: 3085, length: 397, content: 寒而仲都獨無變色此耐寒也方言曰𥘡寒也論衡曰說寒溫者曰人君喜則溫怒則寒又曰河東項曼都好道學仙去家三年而反曰去時有數仙人將上天離月數里而上月之旁其寒凄凄穆天子傳曰天子遊黃室之丘日中大寒雨雪有凍死人天子作黃竹詩以愍之葛仙公別傳曰公與客談語時天大寒仙公謂客曰居貧不能人人得鑪火作請一大火共致暖者仙公因吐氣火赫然從口出須臾火滿屋客皆熱脫衣孝子傳曰閔子騫事後母絮騫衣以蘆花御車寒失紖父怒笞之後撫背之衣單父乃去其妻騫啟父曰母在一子寒母去三子單石虎別傳曰十三年春二月虎率三公九卿躬耕籍田后率二夫人命婦先蠶近郊是歲八月雨雪大寒行旅凍死鐘離意別傳曰嚴遵昔與光武俱為諸生暮夜宿息二人寒不得寢臥更相謂曰後日豪貴憶此勿相忘別後數年光武有天下徵遵不至也西京雜記曰淮南王好方士士皆以術見噓吸為寒暑劉向別錄曰燕地寒谷不生五穀鄒衍吹律以暖之乃生禾黍因名黍谷廣志曰挹樓國城寒人多穴居也又曰北方寒冰厚三尺地凍入一丈氣出口為凌馬首常創, SBCK: ''}
