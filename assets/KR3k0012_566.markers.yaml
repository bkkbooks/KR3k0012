  - {type: 'tls:seg', offset: 3, content: '', id: KR3k0012_CHANT_566-1a.2}
  - {type: variant, offset: 3, length: 1, content: 雅, SBCK: 曰􅀇鳥三曰遂草木四曰􅁬五􅂖五曰敬天常六曰逹帝功七曰依地德八曰揔禽獸之極又曰黄帝命伶倫與營援鑄十二鍾和五音以詔英韶以仲春之月乙卯之日日在奎始奏之命之曰咸池帝顓頊生自􅀂水實處空桑空桑邑名乃登爲帝惟天之合正風乃行德與天合其音􅀂熈熈淒淒鏘鏘帝顓頊好其音乃令飛龍作效八風之音命之曰承雲以􅀕上帝乃命鱓先爲}
  - {type: variant, offset: 3, length: 1, content: 雅, WYG: 曰𤣥鳥三曰遂草木四曰奮五榖五曰敬天常六曰逹帝功七曰依地徳八曰總禽獸之極又曰黄帝命伶倫與營援鑄十二鐘和五音以詔英韶以仲春之月乙卯之日日在奎始奏之命之曰咸池帝顓頊生自若水實處空桑空桑邑名乃登為帝惟天之合正風乃行徳與天合其音若熙熙凄凄鏘鏘帝顓頊好其音乃命飛龍作效八風之音命之曰承雲以祭上帝乃命鱓先為}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_WYG_566-1b, image: WYG0898/WYG0898-0213d.png}
  - {type: variant, offset: 3, length: 1, content: 雅, krp: 曰玄鳥三曰遂草木四曰奮五糓五曰敬天常六曰逹帝功七曰依地德八曰揔禽獸之極又曰黄帝命伶倫與營援鑄十二鍾和五音以詔英韶以仲春之月乙卯之日日在奎始奏之命之曰咸池帝顓頊生自若水實處空桑空桑邑名乃登爲帝惟天之合正風乃行德與天合其音若熈熈淒淒鏘鏘帝顓頊好其音乃令飛龍作效八風之音命之曰承雲以祭上帝乃命鱓先爲}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 偈偈始鱓乃偃寢以其尾鼓其腹其音英英和盛之皃帝嚳命咸墨作爲唐歌九招六列六英倕有作爲擊皷鍾磬吹笭展管箎鞀推衡帝嚳乃令人棄两手相擊曰弃或擊􅎏擊鍾磬吹笭展管箎因令鳯天翟舞之帝嚳大喜乃以康帝德康樂也安也帝堯立乃命􅬣爲樂質乃效山谿谷之音以歌質當爲夔乃以䴢輅􅁳􅇲而皷之乃拊石擊石以象上帝玉磬之音以舞百獸鼓捜乃拌五經之瑟拌分作以爲十五􅃶之瑟命之曰大章以􅀕上帝舜立夘延乃拌􅎩􅅱之所爲琴益之八􅃶以爲二十三􅃶之瑟帝舜乃令質脩九招六列六英以明帝德禹之勤勞天}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_566-1b}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 倡倡始也乃偃寢以其尾鼓其腹其音英英和盛之貌帝嚳命咸墨作為唐歌九招六列六英倕有作為擊鼓鐘磬吹笭展管篪鞀椎鍾帝嚳乃令人抃两手相擊曰抃或擊鼙擊鐘磬吹笭展箎因令鳯天翟舞之帝嚳大喜乃以康帝德康樂也安也帝堯立乃命質為樂質乃效山谿澗谷之音以歌質當為䕫乃以糜輅置缶而鼓之乃拊石擊石以象上帝玉磬之音以舞百獸瞽瞍乃拌拌分五弦之瑟作為十五弦之瑟命之曰大章以祭上帝舜立卯延乃拌瞽瞍之所為瑟益之八弦以為二十三弦之瑟帝舜乃命質修九招六列六英以明帝徳禹立勤勞天}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_566-2a, image: WYG0898/WYG0898-0214a.png}
  - {type: variant, offset: 5, length: 0, content: '', krp: 偈偈始鱓乃偃寢以其尾鼓其腹其音英英和盛之皃帝嚳命咸墨作爲唐歌九招六列六英倕有作爲擊皷鍾磬吹笭展管箎鞀推衡帝嚳乃令人棄两手相擊曰弃或擊􅎏擊鍾磬吹笭展管箎因令鳯天翟舞之帝嚳大喜乃以康帝德康樂也安也帝堯立乃命􅬣爲樂質乃效山谿谷之音以歌質當爲夔乃以䴢輅冥缶而皷之乃拊石擊石以象上帝玉磬之音以舞百獸鼓捜乃拌五經之瑟拌分作以爲十五絃之瑟命之曰大章以祭上帝舜立夘延乃拌瞽叟之所爲琴益之八絃以爲二十三絃之瑟帝舜乃令質脩九招六列六英以明帝德禹之勤勞天}
