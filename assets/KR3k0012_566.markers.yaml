  - {type: variant, offset: 1560, length: 294, content: 曰樂池山海經曰祝融生子長琴是處搖山始作樂世說曰荀公曾善解音聲時論謂之闇解遂調律呂正雅樂每至正會殿庭作四指自謂宮商無不諧韻阮咸妙賞時論謂之神解每至公會作樂荀心識阮意必謂之不調而阮口初無言直意忌之遂出阮為始平太守後有田父耕於野地中得周時玉尺便是天下正尺荀試以校己所治鍾鼓金石絲竹皆短校一米於此伏阮之妙解徵阮南還說苑曰孔子至齊郭門之外遇一嬰兒擊一壺相與俱行其視精其心端孔子謂御曰趣驅之韶樂方作故樂不獨自樂也又以樂人非獨以自正也又以正人樂說曰聖人作樂不以為娛樂以觀得失之節故不取備於一人必須八能之士故八士或調陰陽或調五行或調盛人或調律曆或調五音與天地神明合德者則七始八終各得其宜也七始謂四方天地人, SBCK: ''}
