  - {type: variant, offset: 1483, length: 0, content: '', WYG: 皇帝乃入謂之晨賀晝漏上水三刻皇帝又出百官上夀酒太樂令跪奏請進樂鼓吹合作鼓吹令又奏請進伎别置女樂三十人於黄帳外奏房中之歌江左始廢此禮宋改正徳為前舞大豫為後舞唐㑹要曰太宗七年正月七日製破陣樂舞左圎右方先偏後互魚麗鵝貫箕張翼舒交錯屈伸首尾廻牙以象戰陣之形起居郎吕才依圖教樂工一百二十人被甲執㦸而習之凡舞三變毎變為四陣有徃来疾徐擊刺之象以應歌節數日而就其後令魏徴虞世南褚亮李百藥改制歌詞更名七徳之舞十五日奏之於庭觀}
