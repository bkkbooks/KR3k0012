  - {type: variant, offset: 1002, length: 1, content: 俗, WYG: 宗廟諸帝廟皆常奏文始四時五行儛云髙祖六年又作昭容樂禮容樂昭容者猶古之韶夏主出武德儛禮容者主出文始五行儛儛入樂者將至至尊之前不敢以樂也出用樂者言武不失節能以禮樂終也皆因秦舊事焉初髙祖既定天下過沛與故父老相樂醉酒作風起之詩令沛中兒童百二十人習而歌之至武帝定郊祀之禮祠太一於甘泉就位也祭后土於汾隂澤中方丘也乃立樂府採詩依誦有趙代秦楚之謳以李延年為恊律都尉舉司馬相如等數十人告為詩賦畧論律吕以合八音之調作十九章之歌以正月上辛用祀甘泉圓丘使童男女七十人俱與昏祠至明夜常有神光如流星止集於祠天子自竹宫而望拜韋昭曰以竹為宫天子居之後漢書東平王蒼議以為漢制舊典宗廟各奏其樂皆不相襲以明功徳光武帝受命中興撥亂反正修建三雍肅祗禋祀徳化巍巍比隆前代歌所以詠徳舞所以象功世祖廟樂舞名宜曰大武之舞謹採百官頌可登歌者一章四句以為曲上從其議魏志曰明帝時有奏武皇帝撥亂反正為魏太祖樂用武始之舞文皇帝應天受命為魏髙祖樂用咸熙之舞明帝制作興治為魏列祖樂用章斌之舞沈約宋書曰周存六代}
