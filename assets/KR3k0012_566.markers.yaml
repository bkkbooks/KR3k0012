  - {type: variant, offset: 1875, length: 251, content: 氣為一下元者地氣也為萬物始質也為萬物之容範中元者人氣也其氣以定萬物通於四時承天心理禮樂通上下四時之氣和合人之情以慎天地者也時元者受氣於天布之於地以時出入萬物者也風元者禮樂之本萬物之首物莫不以風成熟也聖王知物極盛則衰暑極則寒樂極則哀是以日中則昃月盈則蝕天地盈虛與時消息制禮作樂者所以改世俗致祥風和雨露為萬姓獲福於皇天者也聖人作樂繩以五元度以五星碌貞以道德彈形以繩墨賢者進佞人伏繩正也碌碌摩也貞正也彈割也要覽曰桓君山曰余兄弟頗好音嘗至洛聽音終日而心足由是察之夫深其旨則欲罷不能不入其意故過己風俗通曰案劉韶鍾, SBCK: 六}
