  - {type: variant, offset: 6, length: 2, content: 國語, SBCK: 日夜不解通大川决壅塞鑿龍門降通漻水以道河䟽三江五湖注之東海以利黔首林是命皐陶作爲夏籥九成以招其功殷湯即位夏爲無道暴害萬民侵削諸侯不用度􅁤天下患之湯於是率六州以誅桀之罪功名大成黔首安寧湯乃命伊尹作爲大護歌晨露脩六招六列六英以見其善周文王處歧諸侯去殷三􅁋而翼文王三􅁋割心断脛刳孕散冝生}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_SBCK_566-2a}
  - {type: variant, offset: 6, length: 2, content: 國語, WYG: 日夜不懈通大川决壅塞鑿龍門䧏通漻水以導河䟽三江五湖注之東海以利黔首於是命臯陶作為夏籥九成以昭其功殷湯即位夏為無道暴害萬民侵削諸侯不用度軌天下患之湯於是率六師以伐桀之罪功名大成黔首寧乃命伊尹作為大濩歌晨露修九招六列六英以見其善周文王處岐諸侯去殷三滛而翼文王三滛割心斷脛刳孕散宜生}
