  - {type: variant, offset: 999, length: 4, content: 直好世俗, SBCK: 孝景采武德儛以爲昭德以尊太宗廟至孝宣采昭德儛以爲采德以尊丗宗廟丗宗廟諸帝廟皆常奏文始四時五行舞云髙祖六年又作昭容樂昭容樂者猶古之韶夏也主出武城德舞禮容樂者出文始五行儛儛入無樂者將至至尊之前不敢以樂也出用樂者言武不失節能以禮樂終也皆因􅁗舊事焉􅀄髙祖旣定天下過沛與故父老相樂醉酒作風起之詩令沛中兒童百二十人習而歌之至武帝定郊祀之禮祠太一於甘泉就位也􅀕后􅁟於汾隂澤中方丘也乃立樂府採詩依誦有趙伐􅁗楚之謳以李延年爲恊律都尉舉司馬相如等數十人善爲詩賦畧論律吕以合八音之調作十九章之歌以正月上辛用是甘泉圎丘使童男女七十人俱欲昏祠至明夜常有神光如流星上集於祠壇天子自竹宫而望拜韋昭曰以竹爲官天子居之後漢書東平王蒼議以爲漢制舊典宗廟各奏其樂皆不相襲以明功德先武帝受命中興撥乱反正脩建三雍肅祇禋祀德化巍巍比隆前代歌所以詠德舞所以象功丗祖廟樂舞名冝曰大武之舞謹採百官頌可登者歌一章四句以爲曲上從其議魏志曰明帝時有奏武皇帝撥乱反正爲魏太祖樂用武始之舞文皇帝應天受命爲魏髙祖樂用咸熈之舞明帝制作興治爲魏列祖樂用章斌之舞沈約宋書曰周存六代}
