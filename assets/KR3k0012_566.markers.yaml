  - {type: variant, offset: 1357, length: 0, content: '', krp: 之事形四方之風謂之雅雅者正也止乎十二則天數也乃去階歩之樂増撤食之雅皇帝出入宋孝建二年奏永至齊及梁𥘉亦同至是改爲皇雅取詩皇矣上帝臨下有赫也二郊太廟同用皇太子出入奏㣧雅取詩君子萬年永錫尓㣧王公出入奏夤雅取尚書周官貳公弘化寅亮天地也上壽酒奏介雅取詩君子萬年介尓景福也食舉奏需雅取易雲上於天需君子以飲食宴樂也撤饌奏雍雅取禮記大饗客以雍撤也並三朝用之牲出入宋廢帝元徽二年儀注奏引牲齊及梁𥘉亦同至是改爲雅取禮記帝牛必在滌三月薦毛血宋元徽三年儀注奏嘉薦至是爲牲雅左氏傳牲牷肥腯北郊明堂太廟並同用降神及迎送宋元徽三年儀注奏昭夏齊及梁𥘉亦同至是改爲誠雅取尚書至諴感神皇帝飲福酒宋元徽三年儀注奏嘉胙至齊不改梁𥘉爲永胙至是改爲獻雅取禮記祭統尸飲五澆玉爵獻即今之福酒亦古之獻義也北郊明堂太廟同就燎位宋元徽三年儀注奏昭逺及齊不改就埋位齊永明六年儀注奏􅊢幽至是燎埋俱奏禋雅取周禮太宗伯以禋祀昊天上帝也衆官出入宋元徽三年儀注奏肅咸樂齊及梁𥘉亦同至是改爲俊雅取禮記司徒選士之秀者而外之于學曰俊士也二郊太廟明堂三朝同用焉其辝並沈約所製是時禮樂制度粲然有序皷吹宋齊並用漢曲又充庭用十六曲武帝乃去其四留其十二合四時也更製新歌以述功德天監七年將有事太廟詔曰禮云齊曰不樂今親奉始出宫振作鼓吹外可詳議八座承郎參議請輿駕始出鼓吹從而不作還宫如常儀帝從之遂爲定制𥘉武帝之在雍鎮有童謡云襄陽白銅蹄反縳楊州兒識者言白銅謂金蹄謂馬也白金色及義師之興實以鐵騎楊州之士皆靣縛果如謡言故即位之後更造新声帝自爲之詞三曲又令沈約爲三曲以𬒳管絃帝旣篤敬佛法又製善哉天樂大歡天道仙道神王龍王滅過悪除爱断水苦輪等十篇名爲正樂皆述佛法又有法樂童子伎童子倚歌𣑽唄設无遮大㑹則爲之其後䑓城淪没侯景以簡文女溧湯公主爲妃請帝及主母范淑妃宴于西州奏梁所常用樂景儀同索超丗亦在宴筵帝澘然屑涕景曰陛下何不樂也帝強笑曰丞相亦索超丗聞此以爲何声景曰臣且不知何獨超丗自此樂府修風雅咸盡及破侯景諸樂並在荆州經乱工器頗闕元帝詔有司𥙷綴纔備荆州䧟没周人𥘉不知採用工人有知音者並入関中隨例多没爲奴婢又曰陳武帝欲設樂有司議以武帝議爲非時碩學名儒朝端在位者咸希上旨唯祠部侍郎姚察乃轉引經籍獨違群議據梁樂爲是當時驚駭莫不慙伏又曰周樂曰武曰勺武象武王能以武禁暴也勺象周公制禮斟文武之道也又有房中之歌后妃之德周備六代之樂唯闕六莖與五英至秦餘韶武房中而巳始皇改武曰五行房中曰壽人衣服用五行之色又曰漢髙帝改韶樂曰文始髙帝好壽人之声惠帝使太樂令夏侯寛合之絃管改名曰安丗魏復文始曰大韶五行曰大武改安丗曰正丗晋改大韶曰宣文正丗曰房中晋乱後亡文舞秉羽籥皆宣文之遺法又曰漢樂曰武徳昭容巴渝四時昭德盛德大武雲翹育命武德昭容巴渝並髙祖所造也武德舞人執千戚以象天下行武除乱也四時文帝所作以象天下太平昭德景帝作之以享太宗廟盛德宣帝作之以享丗祖廟諸帝之廟常奏文始四時五行之舞武帝祖加武德而去四時酎祭髙祖歌海泰龜龍又有青陽朱明西皓玄冥等歌以迎四氣春夏舞雲翹秋冬舞育命季夏則歌朱明而兼舞二舞光武平隴蜀尊郊祀髙祖配享南祀兼用五効歌舞他時常亦如之魏武改武德曰武頌昭容曰昭業巴渝曰昭武雲翹曰鳯翔育命曰靈應晋改昭武曰宣武遭晋乱唯巴渝存隋􅊢清樂部又曰宋樂曰凱容宣烈並文帝所造至梁亡梁樂曰大壯大觀並武帝所造至陳亡隋樂以夏爲名舞曰大武文帝所造自東晉至隋易服變名爲異其實不全殊}
