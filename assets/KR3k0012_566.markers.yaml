  body:
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 四歴代樂吕氏春秋曰昔􅁑天氏之樂三人操牛尾投足以歌八闋投猶蹀也一曰載民}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 四厯代樂吕氏春秋曰昔葛天氏之樂三人操牛尾投足以歌八闋投猶蹀也一曰載民}
  - {type: variant, offset: 2, length: 0, content: '', krp: 四歴代樂吕氏春秋曰昔葛天氏之樂三人操牛尾投足以歌八闋投猶蹀也一曰載民}
  - {type: xml-element, offset: 3, content: '', id: KR3k0012_CHANT_566-bkkxmlele1}
