  - {type: variant, offset: 1007, length: 0, content: '', WYG: 五行改韶舞曰文始以示不相襲也髙祖又作昭容樂昭容生於武徳禮容生於文始五行也漢又有雲翹育命之舞雖莫知其所從来然因舊以祀天地也至明帝初東平憲王蒼總定公卿之議曰宗廟宜各奏樂不應相襲所以明功徳也採文始五行武徳真修為文武之舞又制舞歌一章薦之始祖之廟黃初二年改漢巴渝舞曰昭武舞改宗廟安和之樂曰正世樂嘉至樂曰迎靈樂武徳樂曰武頌樂昭容樂曰昭業樂雲翹舞曰鳳翔舞育命舞曰靈應舞武徳舞曰武頌舞文始舞曰大韶舞五行舞曰大武舞其衆歌詩多即前代之辭唯魏國初建使王粲改作登歌安世及巴渝詩而已又曰晉武帝太始二年改郊廟新歌其樂舞亦仍舊文改魏昭武羽籥舞曰宣文舞咸寕元年詔定祖宗之號而廟樂同用正徳大豫之舞至江左初立宗廟尚書下太常祭祀宜用樂名太常賀修荅云舊京荒廢}
