  - {type: variant, offset: 2601, length: 1527, content: 同以合陰陽之聲陽聲黃鍾大蔟姑洗蕤賓夷則無射陰聲大呂應鍾南呂函鍾小呂夾鍾皆文之以五聲宮商角徵羽皆播之以八音金石土革絲木匏竹注云以合陰陽之聲者聲之陰陽各有合也黃鍾子之氣也十一月建焉而辰在星紀大呂丑之氣也十二月建焉而辰在玄𢪶太簇寅之氣也正月建焉辰在娵訾應鍾亥之氣也十月建焉辰在析木之津姑洗辰之氣也三月建焉而辰在大梁南呂酉之氣也八月建焉而辰在壽星蕤賓午之氣也五月建焉而辰在鶉首林鍾未之氣也六月建焉而辰在鶉火夷則申之氣也七月建焉而辰在鶉尾中呂巳之氣也四月建焉而辰在實沈無射戍之氣也九月建焉而辰在大火夾鍾卯之氣也二月建焉而辰在降婁辰與建交錯玄處如表裏然是其合也其相生則以陰陽六體為之黃鍾初九下生林鍾之初六也林鍾又上生太簇之九二太簇又下生南呂之六二南呂又上生姑洗之九三姑洗又下生應鍾之六三應鍾又上生蕤賓之九四蕤賓又下生大呂之六四大呂又上生夷則之九五夷則又上生夾鍾之六五夾鍾又下生無射之上九無射又上生中呂之上六同位者象夫婦異位者象母子所謂律娶妻而呂生子者也又曰典同掌六律六同之和以辨天地四方陰陽之聲以為樂器注云陽聲屬天陰聲屬地天地之聲布於四方故書同或作銅鄭司農云陽律以竹為管陰律以銅為管竹陽也銅陰也各順其性呂氏春秋曰黃帝詔伶倫作為音律伶倫自大夏之西乃之崑崙之陰取竹於嶰谷以生竅厚簿均者斷兩節間其長九寸而吹之以為黃鍾之宮日含少次制十二管以崑崙之下聽鳳之鳴以別十二律其雄鳴為六雌鳴亦六此黃鍾之宮適合皆可生之而律之本也故曰黃鍾徵而均鮮全而不傷其為宮獨尊象大聖之德可以明至賢之功故奉而薦之于宗廟以歆迎功德世世不忘是故黃鍾生林鍾林鍾生大呂大呂生夷則夷則生太蔟太蔟生南呂南呂生夾鍾夾鍾生無射無射生姑洗姑洗生應鍾應鍾生蕤賓之分所生益之一分以上生三分所生去其一分以下生黃鍾太呂大蔟夾鍾姑洗中呂蕤賓為上林鍾夷則南呂無射應鍾為下生大聖至理之世天地之氣合以生風日至則曰行其風以生十二律故仲冬短至則生黃鍾季冬生大呂孟春生太蔟仲春生夾鍾季春生姑洗孟夏生仲呂仲夏生蕤賓季夏生林鍾孟秋生夷則仲秋生南呂季秋生無射孟冬生應鍾天地之風正十二律也樂書曰雅樂部器隨律定聲合德其所也黃鍾之均則用黃鍾之器合太蔟之均則用太蔟之器是故旋宮法此聲律克諧則無借器度音咸取中聲恊律是以三倍黃鍾而大至于雷霆謂黃鍾之律度三分九寸而倍成一尺八寸則合雷霆之濁聲也九寸而減餘四寸五分則應中宮之清聲也唯當九寸是謂正聲而可恊和神人感通天地流而不息合同而化是故地氣上隮天氣下降陰陽相摩天地相蕩鼓之以雷霆奮之以風雨動之以四時煖之以日月而百化興焉如此則樂者天地之和也故書云聲依永律和聲則五音不失其常六律不差其度謂孤竹之管律應夾鍾聲與氣諧故感天神而降孤竹之管律應林鍾聲與器諧故感地祇而出陰竹之管律應黃鍾聲與器諧故感人鬼而至樂纂云昔晉人有銅藻盤無故自鳴問之於張茂先荅曰此器與洛陽宮鍾聲相諧宮中撞鍾故鳴也若以鑢之音殊其鳴可止後果如其言也是故樂之制器法度均聲得之毫釐厘失之千里故大樂之道與政通矣古今樂錄曰北齊神武霸府田曹參軍信都芳代號知音能以管候氣觀雲色嘗與人對語即指天曰孟春之氣至矣人往驗管而飛灰已應每月所候言皆無爽又為輪扇二十四理地中以測二十四氣每一氣感則一扇住並與管灰相應若合符契焉又曰隋文帝遣毛爽及蔡子元于普明等以候節氣依古於三重密屋之內以木為案十有二具每取律呂之管隨十二辰置于案上而以土埋之上平於地中實葭莩之灰以輕緹素覆律口每地氣至與律冥符則灰飛衝素散出于外而氣應有早晚灰飛有多少或初入月其氣即應或至中下旬開氣始應者或灰飛出三五夜而盡或終一月才飛少許者帝異之問牛弘對曰灰飛半出為和氣灰全出為猛氣吹灰不能出為襄氣和氣應者其政平猛氣應者其臣縱襄氣應者其君暴帝駮之曰臣縱君暴其政不和非月別暴也今十二月律於一歲內應並不同安得暴君縱臣若斯之甚也弘不得對, SBCK: ''}
