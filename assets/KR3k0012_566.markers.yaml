  - {type: variant, offset: 1007, length: 0, content: '', SBCK: 五行漢髙改韶舞曰文始以示不相襲也髙祖又作昭容樂昭容生於武德禮容生於文始五行也漢又有雲翹育命之舞雖莫知其所從來然舊以祀天地也至明帝􅀄東平憲王蒼惣定公卿之議曰宗廟冝各奏樂不應相襲所以明功德也採文始五行武德真脩爲文武之舞又制舞歌一章薦之丗祖之廟皇􅀄二年改漢巴渝舞曰昭武舞改宗廟安之樂曰正丗樂加至樂曰迎靈樂武德樂曰武頌樂昭容樂曰昭業樂雲翹舞曰鳯翔舞育命舞曰靈應舞武德舞曰武頌舞文始舞曰大韶舞五行舞曰大武舞其衆歌詩多即前代之辝唯魏國􅀄建使王粲改作登歌安丗及巴渝詩而巳又曰晉武帝太始二年改郊廟新歌其樂舞亦仍舊又改魏昭武羽籥舞曰宣文舞咸寧元年詔定祖宗之号而廟樂同用正德大豫之舞至江左􅀄立宗廟尚書下太常􅀕祀冝周樂名太常賀修荅云舊京荒廢}
