  - {type: variant, offset: 1354, length: 0, content: '', SBCK: 昭德著功夫歌以詠德舞以象事於文武爲斌兼秉文武聖德所以彰明也臣等謹制樂名曰章斌文武之舞又曰武帝永􅀄元年有司奏皇朝肇建廟祀應設雅樂乃晉樂也太常鄭鮮之等各撰立新歌黄門侍郎王韶之撰歌七首並令施用十二月又奏依舊正朝設樂改大樂諸歌詩王韶之撰二十二章又改正德舞曰前舞文恱舞曰後舞文帝元嘉九年大樂令鍾宗之更調金石至十四年}
  - {type: page-break, offset: 1354, content: '', id: KR3k0012_SBCK_566-6b}
  - {type: variant, offset: 1354, length: 0, content: '', WYG: 昭徳著功夫歌以詠徳舞以象事於文武為斌兼秉文武聖徳所以彰明也臣等謹制樂名曰章斌文武之舞又曰武帝永初元年有司奏皇朝肇建廟祀應設雅樂乃晉樂也太常鄭鮮之等各撰立新歌黄門侍郎王韶之撰歌七首並令施用十二月又奏依舊正朝設樂改大樂清歌詩王韶之撰二十二章又改正徳舞曰前舞文悦舞曰後舞文帝元嘉九年大樂令鍾宗之更調金石至十四年}
  - {type: page-break, offset: 1354, content: '', id: KR3k0012_WYG_566-10b, image: WYG0898/WYG0898-0218b.png}
  - {type: variant, offset: 1354, length: 0, content: '', krp: 昭德著功夫歌以詠德舞以象事於文武爲斌兼秉文武聖德所以彰明也臣等謹制樂名曰章斌文武之舞又曰武帝永𥘉元年有司奏皇朝肇建廟祀應設雅樂乃晉樂也太常鄭鮮之等各撰立新歌黄門侍郎王韶之撰歌七首並令施用十二月又奏依舊正朝設樂改大樂諸歌詩王韶之撰二十二章又改正德舞曰前舞文恱舞曰後舞文帝元嘉九年大樂令鍾宗之更調金石至十四年}
  - {type: variant, offset: 1355, length: 0, content: '', SBCK: 書令史奚縱又改之二十二年南郊始設登歌詔顔延之造歌詩廟舞猶闕孝武建元元年有司奏前殿中曹郎荀萬秋議郊廟冝設備樂於是使内外􅀶議竟陵王誕等並同萬秋議建平王宏議以凱容爲韶舞宣烈爲武舞祖宗廟樂揔以德爲君章皇太后奏永樂永至等樂仍舊皇帝祠南郊及廟迎神送神並奏肆夏皇帝入廟門奏永至皇帝南郊􅀄登壇及廟中諸東壁奏登歌其􅀄獻奏凱容宣烈之舞終獻奏永安之樂郊廟同孝武又使謝莊造郊廟明堂諸樂歌辝二年有司又奏先郊廟舞樂皇帝親奉􅀄登壇及入廟詣東壁並奏登歌不及三公行事左僕射建平王宏重議公卿行事亦冝奏登歌有司又奏元㑹及二廟齋祠歌􅇊舊並於殿設作廟祠依新儀主登歌人上殿絃管住下令元㑹登歌亦上殿絃管住下梁書武帝思弘古樂天􅁥元年下詔求學術通明者皆陳所見時對樂者七十八家咸言樂之冝改不言改樂之法帝素善音律遂自制四器名之爲通以定雅樂莫不和韻􅀄齊永明中舞人冠幘並簮武帝曰筆笏盖以記事受言舞不受言何事簮筆豈有身服朝衣而足綦讌履於是去筆乃定郊禋宗廟及三朝之樂以武舞爲大壯舞取易云大者壯也正大而天地之情可見也以文舞爲大觀舞取大觀在上觀天之神道而四時不􅑯也國樂以雅爲稱取詩序云言}
  - {type: page-break, offset: 1355, content: '', id: KR3k0012_SBCK_566-7a}
  - {type: variant, offset: 1355, length: 0, content: '', WYG: 書令史奚縱又改之二十二年南郊始設登歌詔顔延之造歌詩廟舞猶闕孝武建元元年有司奏前殿中曹郎荀萬秋議郊廟宜設備樂於是使内外博議竟陵王誕等並同萬秋議建平王宏議以凱容為韶舞宣烈為武舞祖宗廟樂總以徳為君章皇太后奏永樂永至等樂仍舊皇帝祠南郊及廟迎神送神並奏肆夏皇帝入廟門奏永至皇帝南郊初登壇及廟中詣東壁奏登歌其初獻奏凱容宣烈之舞終獻奏永安之樂郊廟同孝武又使謝莊造郊廟明堂諸樂歌辭二年有司又奏先郊廟舞樂皇帝親奉初登壇及入廟詣東壁並奏登歌不及三公行事左僕射建平王宏重議公卿行事亦宜奏登歌有司又奏元㑹及二廟齋祠歌伎舊並於殿庭設作廟祠依新儀注登歌人上殿絃管住下今元㑹登歌亦上殿絃管住下梁書武帝思復古樂天監元年下詔求學術通明者皆陳所見時對樂者七十八家咸言樂之宜改不言改樂之法帝素善音律遂自制四器名之為通以定雅樂莫不和韻初齊永明中舞人冠幘並簮筆皆身服朝衣而足綦讌履於是去筆乃定郊禋宗廟及三朝之樂以武舞為大壯舞取易云大者壯也正大而天地之情可見也以文舞為大觀舞取大觀在上觀天之神道而四時不忒也國樂以雅為稱取詩序云言}
