  - {type: variant, offset: 1365, length: 115, content: 萬人食必梁肉衣必文繡莊子曰北門成聞黃帝張咸池之樂於洞庭之野始聞之懼後聞之怠卒聞之而惑蕩蕩默默乃不自得帝曰汝殆其然哉吾奏之以人徵之以天行之以札義建之太清奏之以陰陽之和燭之以日月之明或謂之死或謂之生行流散徙不主常聲此之謂天樂也淮南子曰, SBCK: 令跪請}
