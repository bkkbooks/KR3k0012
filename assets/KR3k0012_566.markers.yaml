  - {type: variant, offset: 2423, length: 175, content: 圜丘而天神下奏之方丘而地祗上吳楚之風好勇故其俗輕死鄭衛之風好淫故其俗輕蕩輕死故有蹈水赴火之歌輕蕩故有桑間濮上之曲懷永曰之娛抱長夜之忻云終身之樂淫縱之俗故江淮以南其民好殺漳汝之間其民好奔吳有雙劍之節趙有挾琴之客氣發於中聲入於耳手足飛揚不覺其駭也桓譚新論曰揚子雲大才而不曉音余頗離雅操而更為新弄子雲曰事淺易喜深者難識卿不好雅頌而悅鄭聲宜也律呂周禮曰大師掌, SBCK: 太平御覽卷第五百}
