  - {type: variant, offset: 2127, length: 276, content: 書曰春宮秋律百卉必凋秋宮春律萬物必榮夏宮冬律雨雹必降冬宮夏律雷必發聲夫音樂至重所感者大故曰知禮樂之情能作知禮樂之文者能述華譚論曰夫無聲者五音之祖旡形者萬物之君本其祖然後情商徵之妙理其君然後正妍朴之容推精朴以撿得失稽清濁以接在亡夫宿瘤嫫母經日而人不視者何一尺之面醜也西施毛嬙靡服而人左顧者何一尺之面好也夏姬以容美而陳亡濮水以聲好而國滅夫何媱哇之有乎是以聖王知物之感人無窮而情之好惡旡節旡窮則人不能防其行旡節則中材不能制其欲是以為制可行之禮立中庸之法使賢者俯就不肖者企及明樂之妙以為教也阮籍樂論曰聖人之作樂將以順天地之體成萬物之性也故定天地四方之音以迎陰陽, SBCK: 七政}
