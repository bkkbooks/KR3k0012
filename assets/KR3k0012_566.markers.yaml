  - {type: variant, offset: 1025, length: 326, content: 於此百姓聞王鍾鼓之聲管籥之音舉疾首蹙頞而相若曰吾王之好鼓樂夫何使我至於此極也父子不相見兄弟妻子離散此無他不與民同樂也今王鼓樂於此百姓聞王鍾鼓之聲管籥之音舉欣欣然有喜色而相告曰吾王庶幾無疾病與何以能鼓樂也此無他與百姓同樂也今王與百姓同樂則王矣墨子曰程繁問於子墨子曰聖王不為樂昔諸侯倦於聽治息於鍾鼓之樂士大夫倦於聽治息於竽琴之樂農夫春耕夏耘秋歛冬藏息於吟缶之樂今夫子曰聖王不為樂此譬之猶馬駕而不脫弓張而不弛墨子曰昔者堯舜有茅茨者且以為禮且以為樂湯放桀環天下自立因先王之樂又自作樂命曰護又循九韶武王勝殷殺紂環天下自立因先王之樂又自作樂命曰象周成王因先王之樂命曰騶吾聞周成王之治天下也不若武王武王之治天下也不若成湯成湯之治天下也不若堯舜故樂逾繁者洽逾寡自此觀之, SBCK: 舞}
