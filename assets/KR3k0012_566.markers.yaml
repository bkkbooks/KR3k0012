  - {type: variant, offset: 1497, length: 0, content: '', SBCK: 曲太宗謂侍臣曰朕昔在藩邸屢有征伐丗間遂有此歌豈意今日登於雅樂然其發􅀭蹈厲雖異文容功業由之致有今日所以􅀍于樂章示不忘夲也尚書右僕射封德彛進曰陛下以聖武戡難立極安人功成化定陳樂象德實弘濟之盛烈爲將來之觀文容習儀豈得爲比太宗曰朕雖以武功定天下終當以文德綏海内文武之道各隨其時公謂文容不如蹈厲斯爲過矣又曰貞觀中太宗幸慶善宫宫在武功縣即髙祖舊宅宴從臣於渭濵其宫即上降誕之所上乃賦詩十韻壽丘唯舊跡鄷邑乃前基奥余承累聖懸弧亦在兹弱齡逢運改提劒欝匡時指麾八荒定懷柔萬國夷梯山盛入欵駕海亦來思單于陪武帳日逐衛文儀端宸朝四岳无爲任百司霜節明秋景輕冰結水湄芸黄遍原隰禾頴積成坻兵樂還譙宴驩此大風詩賞賜閭里有同漢之宛沛焉於是起居郎吕才播於樂府􅀍之管􅃶}
