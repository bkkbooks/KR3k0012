  - {type: variant, offset: 547, length: 210, content: 歌在堂舞在庭歌以養形歌者有聲舞者有形何言歌在堂也以燕禮曰升歌鹿鳴以是知之何以言舞在庭也援神契曰合忻之樂舞於堂四夷之樂陳於戶以是明之韓詩外傳曰古者天子左右五鍾將出則撞黃鍾而右五鍾應之馬鳴中規律駕者丈御者有數立則磬折拱則抱鼓出入中規折旋中矩然後太師奏升車之樂告出也入則撞蕤賓以治容貌容貌治則得顏色齊顏色齊則肌膚安蕤賓有聲鵠震馬鳴及倮介之虫無不延頸以聽蕤賓在內者皆玉色在外者皆金聲然後少師奏升堂即席告入也此言物類相感聲相應之義, SBCK: ''}
