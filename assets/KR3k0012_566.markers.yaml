  - {type: variant, offset: 1483, length: 0, content: '', SBCK: 皇帝乃入謂之晨賀畫漏上三刻皇帝又出百官上壽酒太樂令跪奏請進樂皷吹合作皷吹令又奏請進􅇊別置女樂三十人於黄帳外奏房中之歌江左始廢此禮宋改正德爲前舞大豫爲後舞至齊亡唐㑹要曰太宗七年正月七日製破陣樂舞左圎右方先偏後五魚麗鵝貫箕張翼舒交錯屈伸首尾廻牙以像戰陣之形起居郎吕才依圗教樂工一百二十人􅀍甲執㦸而習之凡舞三變毎變爲四陳有來徃疾徐擊刺之象以應歌節數日而就其後令魏徴虞丗南禇亮李百藥改制歌詞更名七德之舞十五日奏之於庭觀}
