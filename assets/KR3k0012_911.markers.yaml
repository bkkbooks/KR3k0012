  - {type: 'tls:seg', offset: 11, content: '', id: KR3k0012_CHANT_911-1a.7}
  - {type: variant, offset: 11, length: 2, content: 狒抉, SBCK: 小而短尾夭䑕以皮爲裘今當名其裘爲天鹿裘黄䑕在田野䑕爲群害榖夌善走凢狗不得唯鼠狼能得之左傳曰齊侯將爲臧紇田與之邑臧紇聞之見齊侯與之言伐晉對曰多則多矣抑君似䑕夫䑕晝伏夜動不穴於寢廟畏人故也今君聞晉之亂而後作焉寜將事之非䑕而何乃}
  - {type: variant, offset: 11, length: 2, content: 狒抉, WYG: 小而短尾天䑕以皮為裘今常名其裘為天鹿裘黄䑕在田野間為羣害穀麥善走凡狗不得唯䑕狼能得之左傳曰齊侯將為臧紇田與之邑紇聞之見齊侯與之言伐晉對曰多則多矣抑君似䑕夫䑕晝伏夜動不穴於寢廟畏人故也今君聞晉之亂而復作焉寧將事之非䑕而何乃}
  - {type: variant, offset: 11, length: 2, content: 狒抉, krp: 小而短尾夭䑕以皮爲裘今當名其裘爲天鹿裘黄䑕在田野䑕爲群害榖夌善走凢狗不得唯鼠狼能得之左傳曰齊侯將爲臧紇田與之邑臧紇聞之見齊侯與之言伐晉對曰多則多矣抑君似䑕夫䑕晝伏夜動不穴於寢廟畏人故也今君聞晉之亂而後作焉寜將事之非䑕而何乃}
  - {type: punctuation, offset: 12, content: ，, id: KR3k0012_CHANT_911-bkkpn9}
  - {type: 'tls:seg', offset: 12, content: '', id: KR3k0012_CHANT_911-1a.8}
  - {type: variant, offset: 14, length: 2, content: 切山, SBCK: 與田詩曰誰謂䑕無牙何以穿我墉誰謂汝無家何以速我訟又曰碩䑕刺重歛也碩䑕碩䑕無食我黍又曰相䑕刺無禮也衛文公能正其羣臣而刺在位承先君之化無禮儀也相䑕有皮人而無儀人而無儀不死何爲大戴禮曰正月田䑕出田䑕者鼸䑕也詩義䟽曰尓雅鼫䑕許愼云五􅇊䑕也今之河東有石鼠大能人立交前兩脚於頭上跳善鳴食人禾稼逐則走入樹空中亦有五􅇊或謂雀䑕其形大故云石䑕也詩言其方物冝謂此䑕非今之䑕也又䑕不食禾苗夲又謂螻蛄爲碩䑕亦有五技古今工名虫鳥物異名同故記巳史記曰李斯少時爲郡小吏見吏舎厠中䑕食不潔近人犬數驚恐之入倉見倉中䑕食積粟居大廡下無人犬之憂乃歎曰人賢不肖譬如䑕在所自處耳又曰張湯杜陵人也其父爲長安丞出湯爲守舎還而䑕盗肉其父怒乃笞湯湯掘得盗䑕及􅁏鞫掠訊輷論報并取䑕與肉具獄磔堂下其父見之視其文辭如老獄吏大驚遂使書獄漢書曰古馮翊韓延夀有罪下獄楊惲上書訟延夀郎中丘常謂惲曰聞君侯訟韓馮翊當得活乎惲曰事何容易我不能自保直人所謂䑕不容穴衘窶藪故也又曰􅂫武使匈奴匈奴徙武北}
  - {type: page-break, offset: 14, content: '', id: KR3k0012_SBCK_911-2a}
  - {type: page-break, offset: 14, content: '', id: KR3k0012_SBCK_911-2b}
  - {type: variant, offset: 14, length: 2, content: 切山, WYG: 與田詩曰誰謂䑕無牙何以穿我墉誰謂汝無家何以速我訟又曰碩䑕刺重歛也碩䑕碩䑕無食我黍又曰相䑕刺無禮也相䑕有皮人而無儀人而無儀不死何為大戴禮曰正月田䑕出田䑕者鼸䑕也啇義䟽曰爾雅鼫䑕許慎云五伎䑕也今之河東有碩䑕大能人立交前兩脚於頭上跳舞善鳴食人禾苗逐則走入樹空中亦有五使或謂雀䑕其形大故序云石䑕也詩言其方物宜謂此䑕非今大鼠也又不食禾苗本草又謂螻蛄為碩䑕亦有五伎古今方士名蟲鳥物異名同故記也史記曰李斯少時為郡小吏見吏舍厠中䑕食不潔遇人犬數驚恐之入倉見倉中䑕食積粟居大廡絶無人犬之憂乃歎曰人賢不肖譬如䑕在所自處耳又曰張湯杜陵人也其父為長安丞出外湯為兒守舍而䑕盗肉其父還怒乃笞湯湯掘得盗䑕及肉掠治訊鞫論報并取䑕與肉具獄磔堂下其父見之視其文辭如老獄吏大驚遂使書獄漢書曰右馮翊韓延夀有罪下獄楊惲上書訟延夀郎中丘常謂惲曰聞君侯訟韓馮翊當得活惲曰事何容易我不能自保眞人所謂䑕不能容穴銜寠藪故也又曰蘇武使匈奴徙武北}
