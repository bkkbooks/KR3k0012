  - {type: variant, offset: 1323, length: 6, content: 手足以搏鼠然, SBCK: 云正欲水澆取我我穴周流無所不至竟日澆灌了無所獲宻令奴更借三十人䑕云吾上屋居柰我何至時處在屋上奴名同䑕云阿同盗二十萬錢試開庫實如所言奴亦叛去終祚常爲啇估閉其户}
