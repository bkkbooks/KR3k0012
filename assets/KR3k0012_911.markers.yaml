  - {type: variant, offset: 1684, length: 346, content: 而眠拾摭遺餘恣口所便後漢王延壽王孫賦曰原夫天地之造化實神偉之屈奇道玄微以密妙信無初而弗為王孫狡獸形陋觀而醜儀顏狀類乎老公軀體似乎小兒眼睚五皆切𥈬五構切以眈者血視職音戢睫側夾切以䀗乎悅切睳突烏決切高匡而曲頞䁵音儇呼切歷而隳離鼻𪖢許解切齁許侯切以䶋音吸𪖨許夾切耳聿役以𥊔音𥊔知口嗛呼忝切呥音冉以鹼則咸切齺音鄒脣喋蚩涉切㗩而躡切以𤿐疋里切齒崖崖以齡音𡼆爵任音荏𠱞音染而囁入葉切兒儲糧食於兩頰稍委輸於胃脾腃兔蹲而狗踞聲歷鹿而啒咿或嗝嗝苦革切而音的嗅火歷切若啼姿僣傔呼店切而總贛音貢豁盱鬩以頊生深山之茂林處嶄巖之嶔崎性猗僄之㺕音煩疾熊峰出而橫施猱說文曰猱貪獸也一曰母猴似人毛詩草木蟲魚䟽曰猱獼猴也楚人謂之沐猴老者為獑猢駿捷也其鳴噭噭而悲詩曰無教猱升木毛萇注曰猱猨屬也爾雅曰猱蝯善緣孫炎注曰猱母猴也江乘地, WYG: 州}
