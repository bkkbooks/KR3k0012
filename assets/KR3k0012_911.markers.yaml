  - {type: variant, offset: 796, length: 5, content: 張信少府檀, WYG: 到市顧十擔水來䑕已逆知之云止欲水澆取我我穴周流無所不至竟日澆了無所獲宻令奴更倩三十餘人䑕云吾上屋居奈我何時處在屋上奴名周䑕云阿周盜二十萬錢將叛試開庫實如所言也奴亦叛去終祚當為商賈閉其户而謂䑕曰汝欲冨我耳今逺行勤守吾房中勿令有所零失也時桓靈寳在南州禁殺牛甚急終祚載數萬錢竊買牛皮還東貨之得二十萬還室猶閉一無所失怪亦絶遂大富列異傳曰中山王周南正始中為襄邑}
