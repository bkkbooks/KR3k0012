  - {type: variant, offset: 2404, length: 233, content: 為裘蓐甚溫煖蜀地志曰涪陵南界榛峽中有果然獸形如狗子頭似虎其尾柔滑白黑色皮可為裘輕煖可珍南中八郡志曰交趾有果然白面黑身毛采班闌吳錄地理志曰九真咠浦縣有獸名果然猨狖類也色青赤有文居樹上北郡及日南皆有之南方草物狀曰果然獸生在山林上民人以毒箭射之剝取皮皮文青赤白色縫相連作蓆出九真日南郡南州異物志曰交州以南有果然獸以名自呼身如猨大面通有白色其體不過三尺而尾長四尺餘反尾度身過其頭視其鼻仍見兩孔仰向其毛長柔細滑澤色以白為質黑文視如蒼頭鴨脇邊班文集十餘皮可得一蓐繁文麗好細厚溫煖, WYG: 悉成小鼠苗稼盡耗後}
