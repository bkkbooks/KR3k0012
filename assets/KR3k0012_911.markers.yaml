  - {type: variant, offset: 7, length: 3, content: 猨狒屬, SBCK: 縁登􅀂家䑕小異者鼢䑕深目而短尾苗䑕者野䑕}
  - {type: variant, offset: 7, length: 3, content: 猨狒屬, WYG: 縁登若家䑕小異者鼢䑕深目而短尾苖䑕者野䑕}
