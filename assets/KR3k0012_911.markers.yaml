  - {type: variant, offset: 802, length: 200, content: 卿為沐猴與狗鬭蓋寬饒奏免之張晏曰沐猴獼猴也王隱晉書曰護軍張邵母病淳于智筮之使西出市彌猴繫母臂令傍人抱之拍猴恒使作聲三日三夜放去猴出門即為犬所殺母於此漸差郭頒魏晉世語曰司馬宣王辟周泰為新城太守尚書鍾毓謂泰曰君釋褐登宰府乞兒乘小車一何駚泰曰君名公之子少有文彩故守吏職獼猴乘土牛一何遲眾賓悅服莊子曰吳王浮于江登于狙且余切之山眾狙見之恂然棄而走有一狙焉委虵玃搔見巧乎王王射之敏給搏矢矢往雖速而狙猶能將也王命相, SBCK: ''}
