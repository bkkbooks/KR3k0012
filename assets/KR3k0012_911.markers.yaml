  - {type: variant, offset: 761, length: 1, content: 吾, SBCK: 鼨䑕文帝賜縑東方朔神異經曰北方有氷萬里厚百丈有鼷䑕在氷下出焉其形如䑕食草木肉重千斤可以作脯食之巳􅀬除􅀬病也其毛長可八尺可爲蓐卧之可以却寒治風病也其皮可以柔致其聲}
  - {type: variant, offset: 761, length: 1, content: 吾, WYG: 鼨䑕文帝賜縑東方朔神異經曰北方有層氷萬里厚百丈有鼷䑕在氷下出焉其形如䑕食草木肉重千斤可以作脯食之已熱除熱病也其毛長有八尺可為縟卧之可以却寒治風病也其皮可以䝉鼓其聲}
