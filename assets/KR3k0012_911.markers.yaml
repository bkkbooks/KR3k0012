  - {type: variant, offset: 999, length: 429, content: 王命相者趨射之狙死王顧謂其友顏不疑曰狙之伐巧恃其便以傲予以至此列子曰宋有狙公者飬之成群誑狙曰與若茅朝三而暮四眾狙皆怒曰朝四而暮三眾狙皆喜韓子曰燕王微巧術人請以棘剌之端為母猴母猴成巧人曰人主欲觀之必半歲不入宮不飲酒食肉雨霽日出視之晏陰之間而棘剌之母猴乃可見也燕王恩飬之不能觀也譙子法訓曰人之所以貴者以其禮節也人而無禮者獼猴乎雖人象而蟲質也淮南子曰楚有烹猴者而紿徒亥切其邦人邦人以為狗羹而甘之後聞其猴也據地而吐之盡寫其所食此未為知味者也抱朴子曰余友人騰永叔嘗養一大獼猴鏁著床間犬忽齧殺之永叔使合鏁埋之後百許日有見鬼者往見獼猴走于永叔承塵上不悟見鬼驚指之曰獼猴何以被傷流血永叔曰始乃知皆有鬼也又曰山中申日稱人君者猴也猴壽八百歲王充論衡曰鹿之角足以觸大猴之手足以搏鼠然而鹿制於大猴服於鼠氣不利也神仙傳曰有人種黍山中正患獼猴食之聞介象有道聊從之乞辟猴之法象曰無他法也汝明日往黍所望見群猴便大喚語之云已白介君教莫復侵食黍此人明日視黍遇群猴適欲下樹承象語獼猴各自還山遂絕跡, WYG: ''}
  - {type: variant, offset: 1003, length: 308, content: 趨射之狙死王顧謂其友顏不疑曰狙之伐巧恃其便以傲予以至此列子曰宋有狙公者飬之成群誑狙曰與若茅朝三而暮四眾狙皆怒曰朝四而暮三眾狙皆喜韓子曰燕王微巧術人請以棘剌之端為母猴母猴成巧人曰人主欲觀之必半歲不入宮不飲酒食肉雨霽日出視之晏陰之間而棘剌之母猴乃可見也燕王恩飬之不能觀也譙子法訓曰人之所以貴者以其禮節也人而無禮者獼猴乎雖人象而蟲質也淮南子曰楚有烹猴者而紿徒亥切其邦人邦人以為狗羹而甘之後聞其猴也據地而吐之盡寫其所食此未為知味者也抱朴子曰余友人騰永叔嘗養一大獼猴鏁著床間犬忽齧殺之永叔使合鏁埋之後百許日有見鬼者往見獼猴走于永叔承塵上不悟見鬼驚指之曰獼猴何以被傷流血永叔曰始乃知皆有鬼也又曰山中申日稱人君者猴也猴壽八百歲王充, SBCK: 論}
