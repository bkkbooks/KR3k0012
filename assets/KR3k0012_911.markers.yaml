  - {type: variant, offset: 5, length: 1, content: 猨, SBCK: 䑕穴蟲揔名也䶅下各切䑕出胡地䶉竹䑕也如犬鼨音終豹文䑕也鼷小䑕也鼩精鼩其俱切胡地風䑕也鼢䑕地中行伯勞之所化也䶄䑕䑕䶄令䑕也䶄音萍爾雅曰鼢䑕地中行者鼸䑕以頰裏藏食鼷䑕有螫毒者􅽕䑕夏小曰鼩則穴二者斯鼬䑕今鼬似鼦赤黄色大尾啖䑕江東呼爲鼪者主鼩䑕音劬小鼱鼩也鼫䑕形大如䑕頭似兎尾有毛青黄色好在田中食栗豆關中呼爲鼩鼠鼤䑕鼨䑕豹文鼮䑕音廷文彩如豹鼳䑕音孤覔切似鼠而大蒼黑色在樹上又鼯䑕夷由狀如小狐似日旦乳亦謂之蝙蝠􅁏翅飛飛生音如人呼廣志曰白援尾長白腹}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_911-1b}
  - {type: variant, offset: 5, length: 1, content: 猨, WYG: 䑕穴蟲之總名也䶅䑕出北地䶉竹䑕也似䑕而大鼨音終豹文䑕也鼷小䑕也鼩精鼩其俱切北地風䑕也鼢䑕地行伯勞之所化也䶄䑕䶄令䑕也䶄音平爾雅曰鼢䑕地中行者鼸䑕以頰中蔵食鼷䑕有螫毒鼶音斯䑕夏小正日鼶鼬則穴鼬䑕似鼦赤黄色大尾啖䑕江東呼為鼪鼪音生鼩䑕音劬小鼱鼩也鼫䑕形大如䑕頭似尾有毛青黄色好在田中食粟豆關西呼為鼩䑕鼤䑕鼨䑕豹文鼮䑕音庭文彩如豹􅂒䑕音狐覔切似䑕而大蒼黑色在樹上又鼯䑕夷由狀如小狐似蝙蝠者亦謂之蝙蝠肉翅飛且乳亦名飛生音如人呼食火煙廣志曰白猿長尾白腹}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_911-1b, image: WYG0901/WYG0901-0116b.png}
  - {type: variant, offset: 5, length: 1, content: 猨, krp: 䑕穴蟲揔名也䶅下各切䑕出胡地䶉竹䑕也如犬鼨音終豹文䑕也鼷小䑕也鼩精鼩其俱切胡地風䑕也鼢䑕地中行伯勞之所化也䶄䑕䑕䶄令䑕也䶄音萍爾雅曰鼢䑕地中行者鼸䑕以頰裏藏食鼷䑕有螫毒者􅽕䑕夏小曰鼩則穴二者斯鼬䑕今鼬似鼦赤黄色大尾啖䑕江東呼爲鼪者主鼩䑕音劬小鼱鼩也鼫䑕形大如䑕頭似兎尾有毛青黄色好在田中食栗豆關中呼爲鼩鼠鼤䑕鼨䑕豹文鼮䑕音廷文彩如豹鼳䑕音孤覔切似鼠而大蒼黑色在樹上又鼯䑕夷由狀如小狐似日旦乳亦謂之蝙蝠肉翅飛飛生音如人呼廣志曰白援尾長白腹}
