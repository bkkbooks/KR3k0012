  - {type: variant, offset: 2180, length: 1, content: 蜀, WYG: 唐房升仙雞犬並去唯以鼠惡不將去鼠自悔一月三吐腸也劉欣期交州記曰竹風鼠如小狗子食竹根出封溪縣秦州記曰乞服虜乾歸未移抱罕金城見䑕有數萬頭將諸小鼠各銜馬屎羣移而渡洮麗二水悉上抱罕自是二年而乾歸徙焉晉太康地記曰鳥䑕之山在隴西首陽縣穴入三四尺鼠在内亦有在外鄧德明南康記曰南康山石室號金堂堂内金色有金䑕時見也金樓子曰齊鬱林王夜}
