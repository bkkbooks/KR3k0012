  - {type: variant, offset: 1314, length: 1, content: 鹿, SBCK: 人生天地猶魚生泉蟣虱於人風氣而生焉食䑕膓脹䑕子水午火馬金亦勝木雞何不喙􅇠火亦勝金蛇何不食猴又曰䑕踐一篋􅂢不食􅀶物志曰䑕食巴豆三年重三十斤束晢發蒙記曰西域有火䑕}
  - {type: variant, offset: 1314, length: 1, content: 鹿, krp: 人生天地猶魚生泉蟣虱於人風氣而生焉食䑕膓脹䑕子水午火馬金亦勝木雞何不喙兔火亦勝金蛇何不食猴又曰䑕踐一篋捐不食博物志曰䑕食巴豆三年重三十斤束晢發蒙記曰西域有火䑕}
  - {type: variant, offset: 1316, length: 2, content: 角足, SBCK: 布東海有不􅁅之木語林曰簡文爲撫軍時所坐床上坐塵不聽左右掃去見䑕行跡視}
  - {type: variant, offset: 1316, length: 2, content: 角足, krp: 布東海有不灰之木語林曰簡文爲撫軍時所坐床上坐塵不聽左右掃去見䑕行跡視}
  - {type: variant, offset: 1319, length: 1, content: 觸, SBCK: 爲佳異物志曰䑕母頭脚似䑕毛蒼口銳}
