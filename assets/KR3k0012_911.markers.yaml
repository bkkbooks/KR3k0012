  - {type: variant, offset: 1321, length: 1, content: 猴, SBCK: 如水牛而獨畏狗水田時有水灾起於䑕西域諸國志曰有䑕王國䑕大如狗着金鏁小者如兎或如此間䑕者沙門過不呪願白衣不祠祀輙害人衣器異苑云釋道安昔西方適見此俗喭云䑕得死人目精則爲王于寳搜神記曰晉太康中㑹稽郡憉蜞及蟹皆化爲䑕大食稻爲災始成者有肉而無骨幽明録曰吴北寺終祚道人卧齊中䑕從坎出言終祚復數曰必當死終祚呼奴令買犬䑕云亦不畏此也但令犬入此户必死湏􅁷犬至果然終祚乃下聲語其奴曰明日市雇十檐水來䑕便巳逆知}
  - {type: page-break, offset: 1321, content: '', id: KR3k0012_SBCK_911-6b}
