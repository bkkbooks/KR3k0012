  - {type: variant, offset: 2103, length: 559, content: 美者玃猱之炙又曰聞言不可不察數傳白為黑故狗似玃玃似母猴母猴似人人與狗則遠矣毛詩草木蟲魚䟽曰猱獼猴也楚人謂之木玃老者為玃大而黑長前辟玃之白腰者為獑猢博物志曰蜀中南高山上有物似獼猴長七尺能行揵走名曰猴玃一名馬化或曰猳玃同行道婦人有好者輒盜之以玄人不得知行者每經過其旁皆以其長繩相引然故不兔此能別男女氣臭故取女不取男取玄而為家室其無子者終身不得還十年之後形類之意亦迷惑不復思歸有子者輒拘送還其家產子皆如人有不食飬者母輒死故無敢不飬也及長與人不異皆以楊為姓故今蜀中西界多謂楊率皆猳玃馬化之子孫時時有玃瓜者果然山海經曰果然獸似獼猴以名自呼聲蒼黑群行老者在前少者在後得果食輒與老者似有義焉交趾諸山有之獠人射之以其毛為裘蓐甚溫煖蜀地志曰涪陵南界榛峽中有果然獸形如狗子頭似虎其尾柔滑白黑色皮可為裘輕煖可珍南中八郡志曰交趾有果然白面黑身毛采班闌吳錄地理志曰九真咠浦縣有獸名果然猨狖類也色青赤有文居樹上北郡及日南皆有之南方草物狀曰果然獸生在山林上民人以毒箭射之剝取皮皮文青赤白色縫相連作蓆出九真日南郡南州異物志曰交州以南有果然獸以名自呼身如猨大面通有白色其體不過三尺而尾長四尺餘反尾度身過其頭視其鼻仍見兩孔仰向其毛長柔細滑澤色以白為質黑文視如蒼頭鴨脇邊班文集十餘皮可得一蓐繁文麗好細厚溫煖魏鐘毓果然賦曰果然似猴象猨黑頰青身肉非嘉肴惟皮為珍, SBCK: 含􅀪}
