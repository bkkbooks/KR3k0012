  - {type: variant, offset: 19, length: 0, content: '', SBCK: 廣陵王胥將作亂䑕舞王后庭又曰燕刺王旦將作亂䑕舞殿端門魚豢魏略曰大秦國有辟毒䑕魏志曰臧洪爲􅀽紹所圍粮乏乃掘䑕而食之又曰太祖時用刑嚴重太祖馬鞍在庫爲䑕所囓庫吏懼罪必死議欲面􅅞首罪猶慮不免其咎鄧王哀冲謂曰待三日中然後自歸冲於是以刀穿單衣如䑕嚙者謬爲失意貌有愁色太祖問之冲對曰丗俗以爲䑕嚙衣者其主不􅁻今單衣見嚙是以憂戚太祖曰此妄言耳無所苦也俄而庫吏以嚙鞍聞太祖􅀏曰衣在側尚囓况馬鞍懸在乎一無所問晉陽春秋曰大興中衡陽歐純作䑕市四方丈餘開四門門有一木人縱四五䑕於中欲出門木人輙以椎椎之北史曰盧昶爲散􅀐常侍時洛陽縣獲白䑕昶奏以爲案瑞典外鎮刺史二千石令長不祗上命刻􅁀百姓怨嗟則白䑕至因陳時政多所勸誡詔書褒美其意三國典略曰齊將誅斛律光有三䑕遊於光寢光毎投食與之一朝俱死床下唐書曰吐蕃有草石速古芒葉長二寸狀如針蒿毎莖不過三四葉其莖蔓其花黄其根連珠如麦門冬有䑕長於常䑕毎二三十同一穴至秋秋䑕皆收此草爲藏多者至數石俗亦掘草根食之而留給䑕粮其國禁殺䑕殺者輙加罪俗亦愛之不殺也洞林曰郷里人栁休祖婦病䑕瘻積年不差及困垂命令兒來從吾乞卦占得頥之復案卦應得人師姓石者而治之當以䑕出而愈者也休祖兒歸有一賤家奴姓石自言由來能治此病且炙其三處而止歸㝷差有一老鼠色正蒼黄逕就其前伏而不動呼狗嚙殺之䑕頭上有炙處病便差􅀇中記曰百歳䑕化爲神鄭氏􅀇中記曰百歳之䑕化爲蝙蝠京房易飛􅀱曰䑕舞國門厥咎亡鼠舞於庭厥咎誅死風角要占曰長居官厭盗法七月以生䑕九枚置籠中埋子地稱九百斤土覆坎深各二尺五寸築之令堅固地鏡圖曰青玉之像爲女人黄金之見爲火及白䑕百恠書曰䑕咋人衣領有福莊子曰且鳥髙飛以避矰弋之患鼷䑕深穴於神丘之下以避薫灌之患又曰惠子相梁莊子往見之或謂惠子曰莊子來欲代子相於是惠子恐搜於國中三日王夜莊子見之曰南方鳥其名鵷鶵子知之乎鵷鶵發南海而飛渡北海非梧桐不止非竹實不食非醴泉不飲於是鴟得腐䑕鵷鶵過而仰視之曰嚇今子欲以梁國相嚇我耶又曰鼹䑕飲河不過滿腹文子曰腐䑕在阼燒香於}
