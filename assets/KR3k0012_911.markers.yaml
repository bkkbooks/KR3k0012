  - {type: variant, offset: 19, length: 0, content: '', WYG: 廣陵王胥将作亂䑕舞王后庭又曰燕刺王旦將作亂䑕舞殿端門魚豢魏畧曰大秦國有辟毒䑕魏志曰臧洪為袁紹所圍糧乏乃掘䑕而食之又曰太祖時用刑嚴重太祖馬鞍在庫為䑕所嚙庫吏懼罪必死議欲面縳首罪猶慮不免其咎鄧哀王冲謂曰待三日中然後自歸冲於是以刀穿單衣如䑕嚙者謬為失意貎有愁色太祖問之冲對曰世俗以為䑕嚙衣者其主不吉今單衣見嚙是以憂蹙太祖曰此妄言耳無所苦也俄而庫吏以嚙鞍聞太祖笑曰衣在側尚囓况馬鞍懸柱乎一無所問晉陽秋曰大興衡陽區純作䑕市四方丈餘開四門有一木人縦四五䑕於中欲出門木人輙以木椎椎之北史曰盧昶為散騎尚書時洛陽縣獲白䑕昶奏以為瑞典外鎮刺史二千石令長不祗上命刻暴百姓怨嗟則白䑕至自陳時政多所勸誡詔書褒美其意三國典略曰齊将誅斛律光有三䑕逰於光寢光每投食與之一朝俱死床下唐書曰吐蕃有草石速古芒葉長二寸狀如針蒿每莖不過三四葉其莖蔓其花其根連珠如麥門冬有䑕長於常䑕每二三十同一穴至秋䑕皆收此草為藏多者至數石俗亦掘草根食之而留給䑕糧其國禁殺䑕殺者輒加罪俗亦愛之不殺也洞林曰鄉里人栁休祖婦病䑕瘻積年不差及困垂命令兒來従吾乞卦占得頥之履按卦應得人師姓石者而治之當以䑕出而愈者也休祖既歸有一賤家奴姓石自言由来能治此病且灸其三處而止婦尋差有一老䑕色正蒼黄逕就其前􅀈􅀈伏而不動呼狗囓殺之䑕頭上有灸處病便差𤣥中記曰百歲䑕化為神京房易飛候曰䑕舞於門厥咎亡䑕舞於庭厥咎誅死風角要占曰長吏厭盜賊法七月以生䑕九枚置籠中埋申子地稱九百斤土覆坎深各二尺五寸築之令堅固地鏡圖曰青玉之偽為女人黄金之見為火及白䑕百怪書曰䑕咬人衣領有福莊子曰且鳥髙飛以避矰弋之害鼷䑕深穴乎神丘之下以避重鑿之患又曰恵子相梁莊子往見之或謂恵子曰莊子来欲代子相於是恵子恐捜於國中三日三夜莊子見之曰南方有鳥其名鵷鶵子知之乎鵷鶵發於南海而飛渡北海非梧桐不止非竹實不食非醴泉不飲於是鴟得腐䑕鵷鶵過之仰而視之曰嚇今子欲以梁國相嚇我耶又曰鼷䑕飲河不過滿腹文子曰腐䑕在阼燒香於}
