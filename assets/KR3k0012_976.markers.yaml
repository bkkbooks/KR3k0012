  - {type: variant, offset: 1424, length: 0, content: '', SBCK: 寒不立脩之貴爲刺史末曽供膳徃姉爲設菜羹麄飯以激之齊書曰晉永嘉五年曲陽縣市黄慶宅左右有園東南廣數文毎種菜輙鮮異雖加採㧞更生夜􅁪有白光似懸絹道士􅀓徳占使人掘之三尺獲玉印文曰長承萬福又曰冝都王鏗生三歳䘮母及有識問母所在左右告以早亡便思慕􅂼}
  - {type: variant, offset: 1424, length: 0, content: '', WYG: 寒不立修之貴為刺史未曾供膳嘗往姊姊為設菜羮麤飯以激之齊書曰晉永嘉五年曲陽縣民黄慶宅左右有園東南廣數丈毎種菜輙鮮異雖加採㧞更生夜恒有白光似懸絹道士𫝊德占使人掘之三尺獲玉印文曰長承萬福又曰宜都王鏗生三嵗䘮母及有識問母所在左右告以早亡便思慕蔬}
  - {type: variant, offset: 1424, length: 0, content: '', krp: 寒不立脩之貴爲刺史末曽供膳徃姉爲設菜羹麄飯以激之齊書曰晉永嘉五年曲陽縣市黄慶宅左右有園東南廣數文毎種菜輙鮮異雖加採㧞更生夜恒有白光似懸絹道士傳徳占使人掘之三尺獲玉印文曰長承萬福又曰冝都王鏗生三歳䘮母及有識問母所在左右告以早亡便思慕𬞞}
  - {type: variant, offset: 1425, length: 6, content: 菱芡渴飲行潦, SBCK: 自悲不識母又曰江泌性仁孝食菜不食心以其有生意唯食老葉而巳南史隱逸傳曰沈道䖍辟州府凡十二命皆不就有竊園菜者外還見之仍自逃隠待竊者去後乃出}
