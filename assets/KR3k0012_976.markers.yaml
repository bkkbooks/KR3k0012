  - {type: variant, offset: 1417, length: 0, content: '', SBCK: 前相所種菜悉付還外魏志曰倭國地温冬夏食生菜吴書曰趙咨使魏魏人曰聞江東有耑音端蹄菜作􅀂爲食咨曰當得倉助􅁃切鰷以作羹王隱晉書曰皇甫咨姑子梁栁爲城陽太守或勸諮曰栁爲布衣過吾吾送迎栁不出門食不過塩菜貧不以酒肉爲禮也今而送是貴城陽太守而賤梁鴻季也豈中古人之道哉又曰邵續爲石勒所執身灌園鬻菜以供衣食勒屢遣察之歎曰此真髙人矣不如是安足貴乎嘉其清苦賜榖帛毎臨朝嗟歎以勵群官又曰桓温性儉毎讌唯下七奠拌菜果而巳又曰吴隱之母䘮哀毀嘗醎􅉁以其味􅈲輟而弃之及爲廣州清操踰勵常食不過菜及乾魚而巳帷帳器服皆付外庫時人頗謂其矯然亦始終不易宋書曰張敷父在吴興}
  - {type: page-break, offset: 1417, content: '', id: KR3k0012_SBCK_976-2a}
  - {type: page-break, offset: 1417, content: '', id: KR3k0012_SBCK_976-2b}
  - {type: variant, offset: 1417, length: 0, content: '', WYG: 前相所種菜悉付還外魏國志曰倭國地温冬夏食生菜吳書曰趙咨使魏魏人問曰江東有耑蹄菜作苦為食咨曰當得蒼鰷以作羮王隐晉書曰皇甫謐姑子梁栁為城陽太守或勸謐送之謐曰栁為布衣過吾吾送栁不出門食不過塩菜貧不以酒食為禮也今而送是貴城陽太守而賤梁柳也豈中古人之道哉又曰邵續為石勒所執身灌園鬻菜以供衣食勒屢遣人察之歎曰此眞髙人矣不如是安足貴乎嘉其清苦賜穀帛毎臨朝嗟嘆以勵羣臣又曰桓温性儉毎讌賔客唯下七菜果而已又曰吳隐之母䘮哀毁常啖葅以其味旨輟而棄之及為廣州清操踰勵常食不過菜及乾魚而已帷帳噐服皆付外庫時人頗謂其矯然亦始終不易宋書曰張敷父在吳興}
