  - {type: variant, offset: 919, length: 345, content: 除陰平長時年飢荒民皆菜食租入不畢安聽使輸芋曰百姓飢困長何得食榖先自引芋吏皆從之汝南先賢傳曰薛苞歸先人冢側種稻芋稻以祭祀芋以充飢耽道說禮玄虛無為列仙傳曰酒客為梁承使民益種芋三年當大餓卒如其言梁民不死風土記曰博士芋蔓生根如鵝鴨卵華陽國志曰何隨字季業蜀郫人母亡歸送吏飢輒取道側民芋隨以帛繫其處使足所取直民相語曰聞何安漢清民取糧令為之償博物志曰野芋食之煞人家芋種之三年不收後旅生亦不可食廣志曰凡十四芋有君芋大如魁有車轂芋有旁巨芋有青邊芋此四芋魁大如瓶少子葉如繖蓋緗色紫莖長丈餘易熟長味芋之最善者也莖可作羹臛有蔓芋綠支生大者二三升有雞子芋色黃有百果芋畝收百斛有卑芋七月熟有九面芋大不美有蒙控芋有青芋有曹芋子皆不可食莖可為葅又有百子芋出葉榆縣有魁芋無旁子生永昌本草經曰芋土芝八月採左思蜀都賦曰瓜疇芋區菱, SBCK: ''}
