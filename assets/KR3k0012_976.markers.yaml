  - {type: variant, offset: 1444, length: 3, content: 述職西, SBCK: 筠等叅議大餅代大晡餘悉用􅂼菜帝從之三國典略曰梁蕭棟宇􅁻豫章安王權之子也侯景以法駕迎棟時棟與其妃執鋤種菜忽然見逼駭愕乆之後魏書曰甄琛母曹氏有孝性夫氏去家路踰百里毎得魚􅁏菜菓珍羮口實者必令僮僕走奉其母乃後食焉又曰髙閭曽造胡叟短􅄄曳柴從田歸舎爲閭設濁酒􅂼食皆手自辦案其館宇卑陋園疇􅄶局而飯菜精潔醯醬調羙見其二妾並年衰跛眇衣布穿弊閭見其貧約以衣服直十餘疋贈之亦無辭媿又曰盧義僖性清儉不營財利雖居顯位毎至困乏夌飯􅂼食忻然甘之三國典略曰北齊主以鄴清風園賜穆提婆於是官無􅂼菜賖買於人負錢三百萬其人訴焉斛律光曰此園賜提婆一家足不賜提婆百官足又曰庫狄士文爲貝州刺史性清苦不受公料家無餘財其子甞噉官厨餅士文枷之繫獄累日杖之一百歩送還京僮􅈻無敢出門所買菜必於外境凡有出入皆封署其門親故絶迹慶吊不通隋書曰姚察陳亡入隋詔授秘書丞別勑成梁陳二史又勑於朱華門長叅文帝察􅂼菲别曰召入内殿賜果菜指謂朝臣曰朕聞姚察學行當今無比我平陳只得此一人唐書曰太宗回次易州界司馬陳元璹令百姓種􅂼坈}
