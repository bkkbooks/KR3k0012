  - {type: variant, offset: 42, length: 461, content: 甘蕉莖如荷芋重皮相裏大如盂升葉廣二尺長一丈子有角子長六七寸或三四寸生為行列兩兩共對若相抱形剝其上皮色黃白味似蒲萄甜而飽人其根大如芋魁大一石青色其莖解散如絲織以為葛謂之蕉葛雖脆而好色黃白不如葛色出交阯建安南州異物志曰甘蕉草類望之如樹株大者一圍餘葉長一丈或七八尺廣尺餘二尺許花大如酒杯形色如芙蓉著莖未百餘子大名為房根似芋塊大者如車轂實隨菙每華一闔各有六子先後相次子不俱生花不俱落此蕉有三種一種子大拇指長而銳有似羊角名羊角蕉味㝡甘好一種子大如雞卵有似牛乳味微減羊角蕉一種大如耦子長六七寸形正方少甘味㝡弱其莖如芋取以灰練之可以紡績異物志曰芭蕉葉大如筵席其莖如芋取鑊煮之為絲可紡續女工以為絺綌今交阯葛也其內心如蒜鵠頭生大如合柈因為實房一房有數十枚其實皮赤如火剖之中黑剝其皮食其肉如蜜甚美食之四五枚可飽而餘滋味猶在齒牙間一名甘蕉顧徽廣州記曰甘蕉與吳花實根葉不異真是南土暖不經霜凍四時花葉展其熟其未熟時亦苦澀也南方草物狀曰蕉樹子房相連累甜美亦可蜜藏遊名山志曰赤巖山水石之間唯有甘蕉林高者十丈卞敬宗甘蕉讚曰扶踈似樹質則非木扶留吳錄地理志曰, SBCK: 某氏來婦敢奠嘉菜}
