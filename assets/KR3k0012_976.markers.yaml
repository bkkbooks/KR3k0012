  - {type: variant, offset: 2220, length: 0, content: '', WYG: 徐無鬼見武侯武侯曰先生居山食芋果厭葱韭今老病欲酒肉之味耶無鬼曰君為萬乗之主以苦一國之民以養耳目鼻口君病矣何勞我乎列子曰老韭為莧老羭為猿魯連子曰市處者僕妾膾炙而食市饒也壅泉沃韭織屨之士從兄弟室父往而不得粗糒焉非愛其僕妾惡其室父也此其饒羡之與不足也説苑曰衞有五丈夫俱負缶入井灌韭終日一區鄧柝過教之曰有機重}
