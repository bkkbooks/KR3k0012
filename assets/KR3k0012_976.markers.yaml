  - {type: variant, offset: 1418, length: 2, content: 閎到, krp: 成服凡十餘日始進水漿葬畢不進塩菜遂毀瘠成疾又曰宋慤以軍功封洮陽侯先是郷人庾業家豪冨侈侯服玉食與賔客相對膳必方丈而爲慤設粟飯菜𦵔謂客曰宗上車串噉麄食慤致飽而退𥘉無異辭至是爲慤長史帶梁}
  - {type: variant, offset: 1421, length: 2, content: 迎喪, SBCK: 慤待之甚厚不以昔事爲嫌又曰栁元景爲三公時在朝勲貴多事産業唯元景獨無所營南岸有數十􅅿菜得錢三萬還宅元景怒曰我立此園采以供家啖耳乃復賣以取錢奪百姓之利耶乃以錢乞守園人又曰王玄謨栁元景桓護之雖並北人而玄謨獨受老傖之目凡諸稱爲四方書䟽亦如之甞爲玄謨作四時詩曰堇茹供春膳粟漿充夏飡匏醬調秋菜白醝解冬寒又曰朱脩之姉在郷里}
  - {type: page-break, offset: 1421, content: '', id: KR3k0012_SBCK_976-3a}
  - {type: variant, offset: 1421, length: 2, content: 迎喪, WYG: 慤待之甚厚不以昔事為嫌又曰栁元景為三公時在朝勲貴多事產業惟元景獨無所營南岸有數十畆菜得錢二萬還宅元景怒曰我立此園菜以供家啖耳乃復賣以取錢奪百姓之利耶乃以錢乞守園人又曰王𤣥謨栁元景桓䕶之雖並北人而𤣥謨獨受老傖之目凢諸為四方書疏亦如之嘗為𤣥謨作四時詩曰堇荼供春膳粟漿充夏餐􅂒醬調秋菜白醝解冬寒又曰朱修之姊在鄉里}
  - {type: page-break, offset: 1421, content: '', id: KR3k0012_WYG_976-4b, image: WYG0901/WYG0901-0574d.png}
  - {type: variant, offset: 1421, length: 2, content: 迎喪, krp: 慤待之甚厚不以昔事爲嫌又曰栁元景爲三公時在朝勲貴多事産業唯元景獨無所營南岸有數十畝菜得錢三萬還宅元景怒曰我立此園采以供家啖耳乃復賣以取錢奪百姓之利耶乃以錢乞守園人又曰王玄謨栁元景桓護之雖並北人而玄謨獨受老傖之目凡諸稱爲四方書䟽亦如之甞爲玄謨作四時詩曰堇茹供春膳粟漿充夏飡匏醬調秋菜白醝解冬寒又曰朱脩之姉在郷里}
