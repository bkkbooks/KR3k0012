  - {type: variant, offset: 2336, length: 247, content: 權貴任事人士脅肩低首候之唯馬郁以滑稽侮狎每賓僚宴集承業出異方珍菓陳列於前客無敢先嘗者當郁前者食必盡承業私戒主膳者曰他日馬監至唯以乾蓮子置前而已郁至窺之知其不可啖異日靴中置鐵鎚出以擊之承業大笑曰為公易饌勿敗予桉夏侯孝芙蓉賦曰綠房翠葉紫飾紅敷黃螺圓出垂蕤散鬚纓以金牙點以素珠孫楚蓮華賦曰攢藂星列纖離相扶皦若玄黎投幽夜粲若鄧林飛鵷鶵樂府歌曰江南可採蓮蓮葉何田田藕爾雅曰荷芙蕖其根藕吳時外國志曰大秦國有蓮藕雜菓齊書曰永明中巴東王子響殺行事劉夤等武帝聞之謂群臣曰子響遂反戴僧靜大言曰諸王應自反豈唯巴東武帝, SBCK: ''}
