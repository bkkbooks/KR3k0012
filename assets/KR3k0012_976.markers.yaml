  - {type: variant, offset: 1534, length: 1, content: 厲, WYG: 菜之美者崑崙之蘋壽木之華指姑之東赤木𤣥木之葉餘瞀之南有菜名嘉樹其色若碧桓譚新論曰董仲舒專精於述古年至六十餘不窺園中菜山東六賢傳曰袁卞字}
