  - {type: variant, offset: 1540, length: 1, content: 自, WYG: 輦水作漿以給過者兼補履􅀢不取其直天神化為書生問云何不種菜曰無菜種即與數升公種之化為白璧餘皆為錢公得以娶婦廣州先賢傳曰丁宻蒼梧人非家織布不衣非已種耕菜果不食杜蘭香别傳曰香降張碩賫瓦榼酒七子樏樏多菜而無他味亦有世間常果輙有三種色或丹或紫一物與海蛤相類并有非時菜碩云食之亦不甘然一食七八日不飢荆楚嵗時記曰正月七日謂之人日採七種菜}
