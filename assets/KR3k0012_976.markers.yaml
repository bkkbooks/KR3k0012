  - {type: variant, offset: 1444, length: 3, content: 述職西, WYG: 筠等叅議火餅代大脯餘悉用蔬菜帝從之三國典畧曰梁蕭棟字元吉豫章安王歡之子也侯景以法駕迎棟時棟與其妃執鋤種菜忽然見逼駭愕乆之後魏書曰甄琛母曹氏有孝性夫氏去家路踰百里毎得魚肉菜果珍羮口實者必令僮僕走奉其母乃後食焉又曰髙閭曾造胡叟短褐曵柴從田歸舍為閭設濁酒蔬食皆手自辦按其舘宇卑陋園疇褊局而飯菜精潔醯醬調美見其二妾並年衰跛眇衣布穿弊閭見其貧約以衣服直千餘疋贈之亦無辭媿又曰盧義僖性清儉不營財利雖居顯位毎至困乏麥飯蔬食欣然甘之三國典畧曰北齊王以鄴清風園賜穆提婆于是官無蔬菜賖買於人負錢三百萬其人訴焉斛律光曰此園賜提婆一家足不賜提婆百官足又曰庫狄士文為具州刺史情清苦不受公料家無餘財其子嘗啖官厨餅士文枷之繫獄累日杖之一百歩送還京僮肄無敢出門所買菜必出於境凡有出入皆封署其門親故絶迹慶弔不通隋書曰姚察陳亡入隋詔授秘書丞别勅成梁陳二史又勅於東華門長叅文帝以察自奉蔬菲别日召入内殿賜果菜指謂朝臣曰朕聞姚察學行當今無比我平陳只得此一人唐書曰太宗回次易州界司馬陳元璹令百姓種蔬坑}
