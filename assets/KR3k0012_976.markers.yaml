  - {type: variant, offset: 2259, length: 1, content: 周, SBCK: 北齊太上後宫無限衣皆珠玉一女歳費萬金寒月盡食韭牙莊子曰徐無􅀑見武侯武侯曰先生居山食芋壓䓗韭今老病欲酒􅁏之味耶無􅀑曰君爲萬乗之主苦國以義耳目君病矣何勞吾乎列子曰老韭爲莧老羭爲猿魯連子曰市處者僕娈膾炙而食市饒也壅泉沃韭織屨之士從兄弟室父徃而不得粗糒音俻焉非愛其僕妾惡其室父也此其饒羡之與不足也􅀃苑曰衛有一夫負􅇲入井灌韭終日一區鄧晢過教之曰有機重後輕前命曰桔橰終日訖九百區丈夫曰有機智必有機心我非不知不欲爲也正論曰小民髪如韭剪復生頭如雞割復鳴吏不必可畏從來必可輕奈何欲望致州厝乎漢武内傳西王母曰仙次藥有八阮赤韭繆襲􅀕儀曰春祀和羹芼以韭水經曰交州}
