  - {type: variant, offset: 1418, length: 2, content: 閎到, SBCK: 成服凡十餘日始進水漿葬畢不進塩菜遂毀瘠成疾又曰宋慤以軍功封洮陽侯先是郷人􅁃業家豪冨侈侯服玉食與賔客相對膳必方丈而爲慤設粟飯菜􅉁謂客曰宗上車串噉麄食慤致飽而退􅀄無異辭至是爲慤長史帶梁}
  - {type: variant, offset: 1418, length: 2, content: 閎到, WYG: 成服凡十餘日始進水漿葬畢不進鹽菜遂毁瘠成疾又曰宗慤以軍功封洮陽侯先是鄉人庾業家豪富侈服玉食與賔客相對膳必方丈而為慤設粟飯菜葅謂客曰宗軍人慣噉麤食慤致飽而退初無異辭至是為慤長史帶梁}
