  - {type: variant, offset: 1858, length: 618, content: 起星繁天下兵亂星少兵廢又曰天讒星在卷舌中亦主誹謗又曰天稟四星在昴南主積聚黍稷供享祀及御膳星明豐暗儉又曰天苑十六星在昴畢如環狀主天子苑囿五星守犯牛馬死又曰參旗九星在參畢間一曰天弓星不欲明明則白衣會邊兵動又曰闕丘二星在南河主天子門闕諸侯之兩觀也又曰文昌六星如半月形斗魁前為天府主天下集計事第一星名上將第二名次將第三名貴相第四名司錄第五名司命第六名司法星光潤則天下安又曰大理四星在斗中亦為貴人牢又為執法之宮又曰庫樓十五星在左角南器府東一名天庫兵車之府星芒角兵起又曰招搖一星在梗河北主遠狄芒角則兵起又曰貫索九星在七公前為賤人牢口一星為門門欲開開即有赦星惣見獄事繁豫章列士傳曰周騰字叔達為御史桓帝欲南郊平明出叔達仰首曰王者象星今宮中宿策馬星不出動帝何出焉四更皇子卒遂止關令內傳曰北斗一星面百里相去九千里置二十四氣四宿行四時五方立五星主五岳也黃石公記曰黃石鎮星之精也王子年拾遺記曰禹鑄九鼎擇雌金為陰鼎雄金為陽鼎太白星見九日不沒莊子曰夫道可傳而不可受可得而不可見傳說得之以相武丁奄有天下乘東維騎箕尾而比於列星列子曰星積氣之中有光耀者抱朴子曰辰星水精生玄武歲星木精生青龍又曰人初受氣皆應列宿之精值聖宿則聖值賢宿則賢也尸子曰自井中視星所見不過數星自丘上以望則見始出也非明益也勢使然也私井中也公丘上也淮南子曰太微者太一庭也紫宮者太一之居也軒轅者帝妃之舍也咸池者水魚之囿也天河者群神之闕也天河星名也闕猶門也又曰令雨師灑道使風伯掃塵高誘注曰雨師畢星也風伯箕星也, krp: ''}
