  - {type: variant, offset: 743, length: 1842, content: 一主天二主地三主火四主水五主土六主木七主金又一主秦二主楚三主梁四主吳五主隋六主燕七王齊又曰文昌六星在北斗魁前如匡形故史遷曰斗魁戴匡其第六星名曰司祿此天之府計集所會也又曰宦者四星次帝座西南主侍者帝旁閹人也占以不明則吉若明則內臣專權又曰勢四星在太陽西北主刑餘人而用事者也占以不明為吉若明則閹官用權又曰輔一星附北斗杓第六星大臣之象也占欲其小而明則吉若大而明則臣奪君政若小而不明則臣不任職若明大與斗合者則國兵暴起又曰八穀八星在紫微蕃之外五車之北其八星一主稻二主黍三主大麥四主大豆五主小豆六主小麥七主粟八主麻子占其明則八穀成若暗則不成若一星不見則一穀不登若八星不見則國人有糊口之憂又曰房四星去氐十五度為明堂布政之宮占若移徙則國流逆均明則天下大同又曰傅說一星在尾後河中也蓋後宮女巫也主祝祠神靈祈禱以求子胤占若大而明則後宮多禱祈又曰杵三星在箕南主舂杵之用占若其縱則為豐若其橫則為飢又曰農丈人一星在南斗南主農正官也占明則為豐稔若暗則為饑歉又曰南斗六星去牽牛二十六度四分之一為天廟丞相太宰之位主荐賢良授爵祿又主兵機魁南二星為天梁中央二星為天相北二星杓曰天廚庭亦為壽命之期將有天子之事占其斗星盛明則王道和平爵祿行若不然反是也又曰河鼓三星在牽牛北主軍鼓蓋天子三將軍也中央大將軍也其南左星左將軍也其北右星右將軍也所以備關梁而拒難也昔傳牽牛織女七月七日相見者則此是也故爾雅云河鼓謂之牽牛又古歌曰東飛伯勞西飛鷰黃姑織女時相見其黃姑者即河鼓也為吳音訛而然今之言者謂是列舍牽牛而會織女故為此分析令知斷其疑焉又曰臼四星在人星東南主舂臼占若覆則歲中人饑荒若仰則天下熟又曰內杵三星在人星旁主軍糧占若正直下對臼口則吉若偏與臼不相當則軍糧絕又曰漸臺四星屬織女左足主晷刻律呂占若明正則陰陽調而律呂和不然則否也又曰弧九星在狼東南謂天弓也主備賊盜常屬矢向狼星又曰天錢十星在北落西北主錢帛所聚占若明則府藏盈若不明則為虛耗又曰東壁二星去營室十六度天子圖書之祕府也占若明則圖書集道術行小人退君子入若不然則天子好武臣賤文士稽古忠正之臣隱親黨邪曲之人用也又曰羽林四十五星三三而聚在壘壁南主天軍占若星聚明則國安寧若星稀而動搖則兵輩出又曰進賢一星在太微宮東華門東平道之西主訪賢薦士也占若明則賢人進若不明則否也又曰太微宮垣十星在翼珍北主天子之宮庭五帝之座十二諸侯府也其外藩南二星間名曰端門東第一星為左執法廷尉之象也又曰軒轅十七星在七星北如龍之體主雷雨之神後宮之象陰陽交感震為雷激為電和為雨怒為風亂為霧凝為霜散為露聚為雲氣立為虹蜺離為背矞分為抱珥此十四變皆軒轅主之又曰天街二星在畢昴間主國界也街南為華夏之國街北為戎夷之國又曰玉井四星在參西主水泉石氏星經曰卷舌六星在昴北主讒佞言語之吏若移動多口舌兵起星繁天下兵亂星少兵廢又曰天讒星在卷舌中亦主誹謗又曰天稟四星在昴南主積聚黍稷供享祀及御膳星明豐暗儉又曰天苑十六星在昴畢如環狀主天子苑囿五星守犯牛馬死又曰參旗九星在參畢間一曰天弓星不欲明明則白衣會邊兵動又曰闕丘二星在南河主天子門闕諸侯之兩觀也又曰文昌六星如半月形斗魁前為天府主天下集計事第一星名上將第二名次將第三名貴相第四名司錄第五名司命第六名司法星光潤則天下安又曰大理四星在斗中亦為貴人牢又為執法之宮又曰庫樓十五星在左角南器府東一名天庫兵車之府星芒角兵起又曰招搖一星在梗河北主遠狄芒角則兵起又曰貫索九星在七公前為賤人牢口一星為門門欲開開即有赦星惣見獄事繁豫章列士傳曰周騰字叔達為御史桓帝欲南郊平明出叔達仰首曰王者象星今宮中宿策馬星不出動帝何出焉四更皇子卒遂止關令內傳曰北斗一星面百里相去九千里置二十四氣四宿行四時五方立五星主五岳也黃石公記曰黃石鎮星之精也王子年拾遺記曰禹鑄九鼎擇雌金為陰鼎雄金為陽鼎太白星見九日不沒莊子曰夫道可傳而不可受可得而不可見傳說得之以相武丁奄有天下乘東維騎箕尾而比於列星列子曰星積氣之中有光耀者抱朴子曰辰星水精生玄武歲星木精生青龍又曰人初受氣皆應列宿之精值聖宿則聖值賢宿則賢也尸子曰自井中視星所見不過數星自丘上以望則見始出也非明益也勢使然也私井中也公丘上也淮南子曰太微者太一庭也紫宮者太一之居也軒轅者帝妃之舍也咸池者水魚之囿也天河者群神之闕也天河星名也闕猶門也又曰令雨師灑道使風伯掃塵高誘注曰雨師畢星也風伯箕星也又曰歲星之所居五穀豐昌其對為衡歲乃殃又曰四守者所司賞罰許慎注曰四守紫宮軒轅咸池天河也家語曰巫馬期為單父令戴星出入以理人劉向說苑曰玄象著明莫大於日月察變之動莫著於五星也又曰秦胡亥立日月薄食山林淪亡枉矢光夜熒惑襲月景帝通紀, SBCK: ''}
