  - {type: variant, offset: 17, length: 0, content: '', SBCK: 安寧夫歳星所居國人主有福不可加以兵􅀊星一曰攝提一曰重華一曰應星一曰經星一曰脩人􅀊星動人主怒無光仁道失􅀊星順行仁德加也􅀊星農官也主五榖春不勸農則􅀊星盈縮所在之國不可以罰小則民多病}
  - {type: page-break, offset: 17, content: '', id: KR3k0012_SBCK_007-2a}
  - {type: variant, offset: 17, length: 0, content: '', krp: 安寧夫歳星所居國人主有福不可加以兵歲星一曰攝提一曰重華一曰應星一曰經星一曰脩人歲星動人主怒無光仁道失歲星順行仁德加也歲星農官也主五榖春不勸農則歲星盈縮所在之國不可以罰小則民多病}
  - {type: variant, offset: 18, length: 2, content: 上銳, SBCK: 則喜又曰熒惑主夏位在南赤帝之子方伯之象也爲天候主􅀊成敗司察祅孽所徃有兵爲亂爲賊爲疾爲䘮爲飢爲兵蓋天下不理也東西南北無有常出則有兵入則散周旋止息乃爲死䘮又曰鎮星主德女主之象也所居國有德不可以軍加也又曰辰星北之位黒帝之子宰相之祥也一名安調一名態星一名釣星一名伺晨主德常行四仲當出不出天下旱}
  - {type: variant, offset: 18, length: 2, content: 上銳, krp: 則喜又曰熒惑主夏位在南赤帝之子方伯之象也爲天候主歲成敗司察祅孽所徃有兵爲亂爲賊爲疾爲䘮爲飢爲兵蓋天下不理也東西南北無有常出則有兵入則散周旋止息乃爲死䘮又曰鎮星主德女主之象也所居國有德不可以軍加也又曰辰星北之位黒帝之子宰相之祥也一名安調一名態星一名釣星一名伺晨主德常行四仲當出不出天下旱}
