  - {type: variant, offset: 23, length: 2, content: 起地, SBCK: 中謀泄色靑大臣憂又曰太白位在西方白帝之子大將之象也一名天相一名大正一名大臣一名大皓一名明星又曰紫微者天之帝坐也一名天營一名長垣又曰北辰者一名天􅀜一名北極極者紫宫太一坐也太微者天闔也南端門間十星分爲左右掖太微之宫天子之庭五帝之坐也北斗爲帝車運於中央臨制四方北斗魁第一星少微一名處士星明大}
  - {type: page-break, offset: 23, content: '', id: KR3k0012_SBCK_007-2b}
  - {type: variant, offset: 23, length: 2, content: 起地, krp: 中謀泄色靑大臣憂又曰太白位在西方白帝之子大將之象也一名天相一名大正一名大臣一名大皓一名明星又曰紫微者天之帝坐也一名天營一名長垣又曰北辰者一名天關一名北極極者紫宫太一坐也太微者天闔也南端門間十星分爲左右掖太微之宫天子之庭五帝之坐也北斗爲帝車運於中央臨制四方北斗魁第一星少微一名處士星明大}
