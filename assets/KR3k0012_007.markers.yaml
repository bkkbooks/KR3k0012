  - {type: variant, offset: 2778, length: 260, content: 舌天老人皆西方星名也柳主材木柳星主材木也鄭玄注曰日月遺其珠囊珠謂五星也遺其囊者盈縮失度也黃石公陰謀祕訣法曰熒惑者火之精御史之象主禁令刑罰蔡邕月令章句曰天官五獸之於五事也左有蒼龍大辰之貌右有白虎大梁之文前有朱雀鶉火之體後有玄武龜蛇之質中有大角軒轅麒麟之信風俗通曰月與星并無光日照之乃光耳如以鏡照日則影見壁月初見西方月望後光見東北一照也又曰東方朔太白星精黃帝時為風后堯時為務成子周時為老子越為范蠡齊為鴟夷言其變化無常也祖台之志怪曰吳未亡前常有紫赤氣見牛斗之間星官及諸善占者咸憂吳方興惟張茂先於天文尤精獨知為神劍之氣非江南之祥, WYG: 七}
