  body:
  - {type: variant, offset: 2, length: 1, content: 六, SBCK: 七星下瑞星祅星附星下河圖曰以德布精上爲衆星龍魚河圖曰太白之精下爲風伯之神主司非星辰之氣下爲靈星之神主得土河圖帝祕微篇曰帝􅁋泆政不平則奎有角異苑曰陳仲弓從諸子姪造荀季和父家于時德星聚太史奏五百里内有賢人聚􅄂兵書曰春斗爲天􅀜軫爲地梁夏角爲天􅀜參爲地梁又曰四箒星四向守之君有德天下豐熟古辯異曰仰觀天形如車蓋衆星累累如連珠張衡靈憲曰星者體生於地精成於天列居錯峙各有攸屬中外之官帶名者百有二十可名者三百二十爲星二千五百微星之數蓋一萬一千五百二十庶􅀋蠢蠢咸得係命不然何以惣而理諸徐整長曆曰大星俓百里中星五十小星三十北斗七星間相去九千里皆在日月下天文要集曰七公天之相也三公廷尉之象也上星上公也次}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_SBCK_007-1b}
  - {type: variant, offset: 2, length: 1, content: 六, WYG: 七星下瑞星妖星附星下河圖曰以徳布精上為衆星龍魚河圖曰太白之精下為風伯之神主司刑星辰之精下為靈星之神主得土河圖帝徵篇曰帝滛佚政不平則奎有角異苑曰陳仲弓從諸子姪造荀季和父子于時徳星聚太史奏五百里内有賢人聚雜兵書曰春斗為天關軫為地梁夏角為天關參為地梁又四帚星四向守之君有徳天下豐熟古辛異曰仰觀天形如車蓋衆星纍纍如連貝張衡靈憲曰星者體生於地精成於天列居錯峙各有攸屬中外之宫常明者百有二十可名者三百二十為星二千五百㣲星之數盖一萬一千五百二十庶類蠢蠢咸得係命不然何以總而理徐整長厯曰大星徑百里中星五十小星三十北斗七星間相去九千里皆在日月下天文要集曰七公天之相也三公廷尉之象也上星上公也次}
