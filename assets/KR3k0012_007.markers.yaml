  - {type: variant, offset: 1391, length: 83, content: 舂臼占若覆則歲中人饑荒若仰則天下熟又曰內杵三星在人星旁主軍糧占若正直下對臼口則吉若偏與臼不相當則軍糧絕又曰漸臺四星屬織女左足主晷刻律呂占若明正則陰陽調而律呂和不然則否, WYG: 獄事典治囚}
  - {type: variant, offset: 1391, length: 275, content: 舂臼占若覆則歲中人饑荒若仰則天下熟又曰內杵三星在人星旁主軍糧占若正直下對臼口則吉若偏與臼不相當則軍糧絕又曰漸臺四星屬織女左足主晷刻律呂占若明正則陰陽調而律呂和不然則否也又曰弧九星在狼東南謂天弓也主備賊盜常屬矢向狼星又曰天錢十星在北落西北主錢帛所聚占若明則府藏盈若不明則為虛耗又曰東壁二星去營室十六度天子圖書之祕府也占若明則圖書集道術行小人退君子入若不然則天子好武臣賤文士稽古忠正之臣隱親黨邪曲之人用也又曰羽林四十五星三三而聚在壘壁南主天軍占若星聚明則國安寧若星稀而動搖則兵輩出又曰進賢一星在太微宮東華門東平道之西主訪賢薦士也占若明則賢人進若不明則否也, krp: 惑亂}
