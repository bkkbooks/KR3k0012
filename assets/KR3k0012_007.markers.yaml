  - {type: variant, offset: 1039, length: 0, content: '', WYG: 強臣是時鄧氏方盛此其應也續漢書曰靈帝光和中國星見東南如炬十餘日其後黃巾張角起袁紹董卓亂西漢詞圃曰項籍之敗孛大角吳志曰孫權時有長星從東南出群星從之又司馬宣王圍公孫淵夜有大流星長數十丈墜襄平東及淵走當流星處斬之晉書曰張華為司空中台星坼少子韙勸華遜位華云天道𤣥逺須修徳以應之孫氏晉陽秋曰有星赤而芒角自東北往西南沒于諸葛亮營俄而亮卒又㑹稽謝敷字慶緒隱若耶山初月犯少㣲星少㣲一名處士星時戴逵名著於敷時人憂之俄而敷死故㑹稽人士嘲曰吳中髙士求死不得死宋書曰吳孫休永安元年有諸子群嬉中有異眼光芒爚爚外射諸兒問之曰我熒惑也将示爾三公歸于司馬言畢乃聳身而躍仰視之若曵一疋練有頃而沒後四年蜀亡六年魏廢二十一年吳平是歸司馬也又沈懐文傳曰時熒惑守南斗上乃廢西州舊館使西陽王子尚移居東城以厭之懐文曰天道示變宜應之以徳今雖空西州恐無益也唐書曰有星孛于虚危厯于氐百餘日乃滅太宗謂羣臣曰天見彗星是何妖也虞世南曰昔齊景公時有彗星見公問晏嬰對曰公穿池沼畏不深起臺榭畏不髙刑罰畏不重是以天見彗星為公誡耳景公懼而修徳後十六日而星沒臣聞天時不如地利地利不如人和若徳義不脩雖獲麟鳳終是無補但政事無闕雖有灾何損於時然願陛下勿以功髙古人而自矜伐勿以太平漸久而自驕怠慎終如始彗星雖見未足為灾又元和八年太白犯上相厯執法占者言今之三相皆不利始輕末重月餘李絳以足疾免}
