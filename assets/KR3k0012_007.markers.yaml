  - {type: variant, offset: 479, length: 5, content: 官掌記宮中, krp: 元三正之始彗而岀之改更之象也其後王莾篡國又曰枉矢類大流星虵行而蒼黒望如有毛又曰鄒陽上書曰衛先生爲秦畫長平}
