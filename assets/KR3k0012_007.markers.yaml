  - {type: variant, offset: 1047, length: 0, content: '', WYG: 熒惑入地上井是為灾也郭子横洞㝠記曰武帝嘗見彗星方朔折星指之木以授帝帝以指彗彗遂沒星出之夜野獸皆鳴或訛為獸鳴星吕氏春秋曰宋景公時熒惑在心公召子韋問焉子韋曰固當君可}
