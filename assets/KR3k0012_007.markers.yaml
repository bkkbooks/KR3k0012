  - {type: variant, offset: 1079, length: 234, content: 祝祠神靈祈禱以求子胤占若大而明則後宮多禱祈又曰杵三星在箕南主舂杵之用占若其縱則為豐若其橫則為飢又曰農丈人一星在南斗南主農正官也占明則為豐稔若暗則為饑歉又曰南斗六星去牽牛二十六度四分之一為天廟丞相太宰之位主荐賢良授爵祿又主兵機魁南二星為天梁中央二星為天相北二星杓曰天廚庭亦為壽命之期將有天子之事占其斗星盛明則王道和平爵祿行若不然反是也又曰河鼓三星在牽牛北主軍鼓蓋天子三將軍也中央大將軍也其南左星左將軍也其北右星右將軍也所以備關梁而拒難也昔傳牽牛織女七月七日相見者則此是也, WYG: 西方}
