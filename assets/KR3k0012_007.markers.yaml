  - {type: variant, offset: 362, length: 541, content: 細星也此為輔臣之位贊於萬機其占以小而明則吉若微闇則官不理又曰鈞陳六星在紫微宮中華蓋之下天帝所居之宮亦護軍將軍之象占以明則吉又曰華蓋七星其杠九星合十六星如蓋狀在紫微宮臨鈞陳以蔭帝坐占若正則吉若傾則兇也又曰女史一星在紫微宮內柱史北此婦人之官掌記宮中之事占以明則為記史直詞若不明則反是又曰柱下史一星在紫微宮內近尚書此左右掌記君之過其占以明則為史直詞若不明則詞不依過無真實也又曰尚書五星在紫微宮門內東南之隅此八座大臣之象故讚曰尚書納言夙夜諮謀占以小而明則君臣和又曰北斗七星近紫微宮南在太微北是為帝車以主號令運乎中央而臨制四方建四時均五行移節度定諸紀皆繫於北斗其魁四星為璇璣其杓三星為玉衡故書云在璇璣玉衡以齊七政又其魁第一星為樞亦曰正星主陽德天子之象二曰璇亦曰法星主陰刑女主之位三曰璣亦曰令星主禍四曰權亦曰伐星主天理伐無道五曰衡亦曰殺星主中央助四旁殺有罪六曰開陽亦曰應星又一主天二主地三主火四主水五主土六主木七主金又一主秦二主楚三主梁四主吳五主隋六主燕七王齊又曰文昌六星在北斗魁前如匡形故史遷曰斗魁戴匡其第六星名曰司祿此天之府計集所會也又曰宦者四星次帝座西南主侍者帝旁閹人也占以不明則吉若明則內臣專權又曰勢四星在太陽西北主刑餘人而用事者也占以不明為吉若明則閹官用權又曰輔一星附北斗杓第六星大臣, WYG: 改更}
