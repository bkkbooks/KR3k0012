  - {type: variant, offset: 1044, length: 2, content: 宮占, WYG: 方退賔介或勸曰今熒惑已退皇家之利也可速用兵晟曰天子外次人臣但當死節垂象𤣥逺吾安知天道耶至是謂叅佐曰前者士大夫勸晟出兵非敢拒也且軍可用之不可使知之常聞五緯盈縮無准晟懼復來守嵗則我軍不戰而自潰矣叅佐歎服皆曰非所及也又傅奕相州鄴人也尤曉天文厯數隋開皇中以儀曹事漢王諒諒反問奕曰今兹熒惑入井是何祥也奕對曰天上黄道所經其中正是熒惑行路所渉不為怪異}
