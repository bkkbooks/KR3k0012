  - {type: variant, offset: 1048, length: 0, content: '', WYG: 於相公曰相所與理國家也曰可移於百姓曰百姓死寡人將誰為君曰可移於嵗公曰嵗饑人餓必死焉為人君而殺其人誰以我為君子韋曰君有至徳之言三天必三賞君熒惑必}
  - {type: variant, offset: 1049, length: 1, content: 則, WYG: 三舎後果三徙晏子春秋曰景公時熒惑守虛朞年不去晏子曰虛齊之分野當强為善公乃去寃聚之獄振孤敬老行之三日而熒惑遷尉繚子曰昔楚將軍子正與齊戰未合初夜彗星出柄在齊所在勝不可擊子正曰彗何知明與齊戰大破之天文録曰積尸大陵之尸也石氏曰積尸明有大䘮死人如立丘山也又孛星者彗星之屬也偏指曰彗芒氣四出曰孛孛謂孛孛然也又五星反羽其下之}
