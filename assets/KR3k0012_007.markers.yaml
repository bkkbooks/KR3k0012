  - {type: variant, offset: 392, length: 282, content: 鈞陳六星在紫微宮中華蓋之下天帝所居之宮亦護軍將軍之象占以明則吉又曰華蓋七星其杠九星合十六星如蓋狀在紫微宮臨鈞陳以蔭帝坐占若正則吉若傾則兇也又曰女史一星在紫微宮內柱史北此婦人之官掌記宮中之事占以明則為記史直詞若不明則反是又曰柱下史一星在紫微宮內近尚書此左右掌記君之過其占以明則為史直詞若不明則詞不依過無真實也又曰尚書五星在紫微宮門內東南之隅此八座大臣之象故讚曰尚書納言夙夜諮謀占以小而明則君臣和又曰北斗七星近紫微宮南在太微北是為帝車以主號令運乎中央而臨制四方建四時均五行移節度定諸紀皆繫於北斗其魁四星為璇璣其杓三星為玉衡故書云在璇璣玉衡以齊七政又其魁第一星為樞亦曰正, SBCK: 彗}
