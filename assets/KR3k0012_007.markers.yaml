  - {type: punctuation, offset: 29, content: 『, id: KR3k0012_CHANT_007-bkkpn11}
  - {type: variant, offset: 29, length: 2, content: 格擇, SBCK: 五星天府一名天法主察姧謀又曰軒轅主雷􅀨之神旁側郎位主􅀫衛又曰河鼓一名三武一名天鼓又曰市天子旗幟也大明則糴賤又曰五車一名庫凡十四星五車中有三柱三星􅀂不見兵盡起又曰心爲天王其宿三星一名天司空又曰箕舌一星動則大風至不出三日又曰箕宿四星第二星一名風后又曰太白出東北爲觀星出東南爲明星岀西方爲太白楊泉物理論曰星者元氣之英水之精也又曰日月之精爲星辰星辰生於地又曰星元氣之英日精也二十八􅀫度數有常故謂􅁪星􅐭䥫論曰常星猶公卿也衆星猶萬民也列星正則衆星齊常星亂則衆星墜矣崔豹古今注曰漢明帝爲太子時令樂人作歌詩曰星重輝言太子比德故云重也􅁃闡詩曰􅀇景如映壁繁星如散錦瑞星易坤靈圖曰至德之萌五星􅀂貫珠尚書中􅀱曰帝堯即政景星出翼尚書考靈曜曰天地開闢元曆名月首甲子冬首日月五星俱起牽牛􅀄日月若懸璧五星􅀂編珠史記曰黃帝時景}
  - {type: page-break, offset: 29, content: '', id: KR3k0012_SBCK_007-3a}
  - {type: page-break, offset: 29, content: '', id: KR3k0012_SBCK_007-3b}
  - {type: variant, offset: 29, length: 2, content: 格擇, WYG: 嵗星其國齊其位東方蒼帝之子人主之象也其色明而内實暗天下安寧夫嵗星所居國人主有福不可加以兵嵗星一曰攝提一曰重華一曰應星一曰經星一曰脩人嵗星動人主怒無光仁道失嵗星順行仁徳加也嵗星農官也主五榖春不勸農則嵗星盈縮所在之國不可以罰小則民多病大則喜又曰熒惑主憂位在南赤帝之子方伯之象也為天候主嵗成敗司察妖孽所徃有兵為亂為賊為疾為䘮為饑為兵蓋天下不理也東西南北無有常出則有兵入則散周旋止息乃為死䘮又曰鎮星主徳女主之象也所居國有德不可以軍加也又曰辰星北之位黒帝之子宰相之祥也一名安調一名熊星一名鈞星一名伺晨主徳常行四仲當出不出天下旱色黄五榖熟色白中謀泄色青大臣憂又曰太白位在西方白帝之子天將之象也一名天相一名大正一名大臣一名大皓一名明星又曰紫㣲者天之帝座也一名天營一名長垣又曰圵辰者一名天關一名北極極者紫宫太一座也太㣲者天闔也南端門間十星分為左右掖太㣲之宫天子之庭五帝之座也北斗為帝車運於中央臨制四方圵斗魁第一星少㣲一名處士星明大而黄澤即賢士舉忠臣用招揺者當陽也一名矛盾胡星也荆州星占曰五星天府一名天法主察奸謀又軒轅主雷雨之神旁側郎位主宿衛又河鼔一名三武一名天鼓又市天子旗幟也大明則糴賤又五車一名天庫凡十四星五車中有三柱三星若不見兵盡起又心為天王其中三星一名天司空又箕宿四星第二星一名風后又箕舌一星動則大風至不出三日又太白出東北為觀星出東南為明星出西方為太白楊泉物理論曰星者元氣之英水之精也又日月之精為星辰星辰生於地又星元氣之英日精也二十八宿度數有常故謂恒星鹽鐵論曰常星猶公卿也衆星猶萬民也列星正則衆星齊常星亂則衆星墜矣崔豹古今注曰漢明帝為太子時令樂人作歌詩曰星重輝云太子七徳故云重輝庾闡詩曰𤣥景如映璧繁星如散錦瑞星易坤靈圗曰至徳之萌五星若貫珠尚書中候曰帝堯即位景星出翼尚書考靈曜曰天地開闢甲子冬至日月五星俱起牽牛初日月若懸璧仰觀天形如車蓋衆星纍纍如連貝史記曰黄帝時景}
