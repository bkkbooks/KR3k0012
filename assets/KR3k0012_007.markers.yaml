  - {type: variant, offset: 528, length: 0, content: '', krp: 年十月李吉甫以暴疾卒九年六月武元衡爲盗所害又曰李晟初屯渭橋時熒惑守歲乆之方退賔介或勸曰今熒惑已退皇家之利也可速用兵晟曰天子外次人臣但當死節垂象玄逺吾安知天道耶至是謂叅佐曰前者士大夫勸晟出兵非敢拒也且軍可用之不可使知之常聞五緯盈縮無准晟懼復來守歲}
