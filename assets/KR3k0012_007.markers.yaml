  - {type: punctuation, offset: 2594, content: 《, id: KR3k0012_CHANT_007-bkkpn833}
  - {type: variant, offset: 2594, length: 0, content: '', SBCK: 又曰哀帝建平二年彗出牽牛日月五星所從起曆數之元三正之始彗而岀之改更之象也其後王莾􅆲}
  - {type: page-break, offset: 2594, content: '', id: KR3k0012_SBCK_007-5b}
  - {type: variant, offset: 2595, length: 2, content: 精符, SBCK: 又}
  - {type: variant, offset: 2595, length: 43, content: 精符曰地為山川山川之精上為星各應其州城分野為國作精神符驗也五姓占曰君薄德義懦弱不勝任則, krp: 皇主内難}
  - {type: punctuation, offset: 2597, content: 》, id: KR3k0012_CHANT_007-bkkpn834}
  - {type: punctuation, offset: 2598, content: ：, id: KR3k0012_CHANT_007-bkkpn835}
  - {type: 'tls:seg', offset: 2598, content: '', id: KR3k0012_CHANT_007-39a.6}
  - {type: punctuation, offset: 2598, content: 「, id: KR3k0012_CHANT_007-bkkpn836}
  - {type: variant, offset: 2598, length: 0, content: '', SBCK: 枉矢􅀋大流星虵行而蒼黒望如有毛又曰鄒陽上書曰衛先生爲秦畫長平之事太白食昴昭王疑之漢書天文志曰凡月蝕五星其國皆亡􅀊以飢熒惑以亂鎭以殺太白強國以戰辰以女亂又曰始皇之時十五年間彗星四見乆者八十日長或竟天後秦并六國外攘四夷死者如亂麻後漢書曰安帝永􅀄二年正月太白晝見占云爲強臣是時鄧氏方盛此其應也續漢書曰靈帝光和中國星見東南如炬十餘日其後黄巾張角起􅀽紹董卓亂西漢詞圃曰項籍之敗星孛大角呉志曰孫權時有長星從東南出羣星從之又曰司馬宣王圍公孫淵夜有大流星長數十丈墜襄平東及淵起當流星處斬之晉書曰張華爲司空中台星拆少子韙勸華遜位華云天道􅀇逺湏修德以應之孫氏晉陽秋曰有星赤而芒角自東比徃西南没于諸􅁑亮營俄而亮卒又曰㑹稽謝敷字慶緒隱􅀂耶山􅀄月犯少微星少微一名處士星時戴逵名著於敷時人憂之俄而敷死故㑹稽人士嘲曰呉中髙士求死不得死宋書曰吳孫休永安元年有諸子羣嬉中有異眼光芒爚爚外射諸兒問之曰我熒惑也將示爾三公歸于司馬言畢乃聳身而躍仰視之􅀂曵一疋練有頃而没後四年蜀亡六年魏廢二十一年呉平是歸司馬也又沈懷文傳曰時熒惑守南斗上乃廢西州舊館使西陽王子尚移居東城以厭之懷文曰天道示變冝應之以德今雖空西州恐無益也唐書曰有星孛于虚危歷于氐百餘日乃滅太宗謂羣臣曰天見彗星是何祅也虞丗南曰昔齊景公時有彗星見公問晏嬰對曰公穿池沼畏不􅀷起臺榭畏不髙行刑罰畏不重是以天見彗星爲公誡耳景公懼而脩德後十六日而星没臣聞天時不如}
  - {type: page-break, offset: 2598, content: '', id: KR3k0012_SBCK_007-6a}
  - {type: page-break, offset: 2598, content: '', id: KR3k0012_SBCK_007-6b}
  - {type: variant, offset: 2599, length: 5, content: 為山川山川, SBCK: 利地利不如人和若德義不脩雖獲麟鳯終是無􅀘但政事無闕雖有災何損於時然願陛下勿以功髙古人而自矜伐勿以太平漸乆而自驕怠愼終如始彗星雖見末足爲憂又曰元和八年太白犯上相歷執法占者言今}
  - {type: punctuation, offset: 2602, content: ，, id: KR3k0012_CHANT_007-bkkpn837}
  - {type: 'tls:seg', offset: 2602, content: '', id: KR3k0012_CHANT_007-39a.7}
  - {type: variant, offset: 2605, length: 1, content: 精, SBCK: 三相皆不利始輕末重月餘李絳以足疾免明年十月李􅁻甫以暴疾卒九年六月武元衡爲盗所害又曰李晟初屯渭橋時熒惑守􅀊乆之方退賔介或勸曰今熒惑已退皇家之利也可速用兵晟曰天子外次人臣但當死節垂象􅀇逺吾安知天道耶至是謂叅佐曰前者士大夫勸晟出兵非敢拒也且軍可用之不可使知之常聞五緯盈縮無准晟懼復來守􅀊則我軍不戰而自潰矣叅佐歎服皆曰非所及也又曰傳弈相州鄴人也尤暁天文曆數隋開皇中以儀曹事漢王諒舉兵謂奕曰今兹熒惑入井是何祥也弈對曰天}
  - {type: page-break, offset: 2605, content: '', id: KR3k0012_SBCK_007-7a}
  - {type: punctuation, offset: 2606, content: ，, id: KR3k0012_CHANT_007-bkkpn838}
  - {type: 'tls:seg', offset: 2606, content: '', id: KR3k0012_CHANT_007-39a.8}
  - {type: variant, offset: 2607, length: 1, content: 為, SBCK: 黃道經其中正是熒惑行路所渉不爲恠異􅀂熒惑入地上井是爲灾也郭子撗洞􅁳記曰武帝甞見彗}
  - {type: punctuation, offset: 2609, content: ，, id: KR3k0012_CHANT_007-bkkpn839}
  - {type: 'tls:seg', offset: 2609, content: '', id: KR3k0012_CHANT_007-39a.9}
  - {type: variant, offset: 2609, length: 2, content: 各應, SBCK: 東方朔折指星之木以授帝帝以指彗彗遂没星出之夜野獸皆鳴或􅀃爲獸鳴星吕氏春秋曰宋景公時熒惑在心公召子韋問焉子韋曰禍當君可移於相公曰相所與理國家也曰可移於百姓曰百姓死寡人將誰爲君曰可移於􅀊公曰􅀊飢人餓必死焉爲人君而殺}
  - {type: page-break, offset: 2609, content: '', id: KR3k0012_SBCK_007-7b}
  - {type: variant, offset: 2612, length: 2, content: 州城, SBCK: 人誰以我爲君乎子韋曰君有至德之言三天必三賞君熒惑必徙三舎後果三徙晏子春秋曰景公時熒惑守虚朞年去晏子曰虚齊之}
  - {type: punctuation, offset: 2616, content: ，, id: KR3k0012_CHANT_007-bkkpn840}
  - {type: 'tls:seg', offset: 2616, content: '', id: KR3k0012_CHANT_007-39a.10}
  - {type: variant, offset: 2616, length: 1, content: 為, SBCK: 當強爲善公乃去􅁈聚之獄振􅀌敬老行之三日而熒惑遷尉繚子曰昔楚將軍子正與齊戰未合初夜彗星出柄在齊所在勝不可擊子正曰彗何知明日與齊戰大破之天文録曰積尸大陵之尸也石氏曰積尸明有大䘮死人如立丘山也又曰孛星者彗星之屬也偏指曰彗芒氣四出曰孛孛謂孛孛然也又曰五星反羽其下之}
  - {type: page-break, offset: 2616, content: '', id: KR3k0012_SBCK_007-8a}
  - {type: variant, offset: 2618, length: 5, content: 作精神符驗, SBCK: 不可乆處反羽者光芒上大下小狀如反羽}
  - {type: variant, offset: 2618, length: 20, content: 作精神符驗也五姓占曰君薄德義懦弱不勝任則, WYG: 皇主内難}
