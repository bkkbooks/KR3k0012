  - {type: variant, offset: 2589, length: 0, content: '', SBCK: 君臣失政濁亂三光五星逆錯變氣之所生也傳曰昭五年冬有星孛于大辰西及漢申湏曰彗所以除舊布新也又曰昭二十六年齊有彗星齊侯使禳之晏子曰無益也祗取誣焉}
  - {type: page-break, offset: 2589, content: '', id: KR3k0012_SBCK_007-4b}
  - {type: variant, offset: 2590, length: 0, content: '', SBCK: 道不慆不貳其命􅀂之何禳之且天有彗也以除􅁾也君無穢德又何禳焉詩曰唯此文王小心翼翼昭事上帝聿懐多福厥徳不回以受方國君無違德方國將至何患於彗爾雅曰彗星爲􅍴搶春秋考異郵曰鯨魚死而彗星出淮南子亦云尚書帝命驗曰天鼔動玉弩發天下驚史記曰􅃖尤旗􅀋彗而後曲象旗見則王者征伐四方又曰齊景公三十二年彗出公坐柏寢歎曰堂乎堂乎誰有此乎羣臣皆泣晏子􅀏公怒晏子曰臣􅀏羣臣䛕甚景公曰彗星出東北當齊野寡人以憂晏子曰君髙臺􅀷池賦歛如弗得刑罰恐弗勝茀星將岀彗星何懼乎公曰可穰乎晏子曰使神可祝而來亦可禳而去也百姓􅀂怨以萬數而君令一人禳之安能勝衆口乎又天官書曰天狗狀如奔星有聲其下止}
  - {type: page-break, offset: 2590, content: '', id: KR3k0012_SBCK_007-5a}
  - {type: variant, offset: 2591, length: 0, content: '', SBCK: 􅀋狗望}
  - {type: variant, offset: 2592, length: 1, content: 旂, SBCK: 如火光炎炎衝天其下圎如數頃田處上兊則黄色千里破軍殺將又曰長庚如一疋布著天見則兵起漢書曰獻帝􅀄平四年有流星八九丈西北行有聲如雷望如火照地是曰天狗金門之山有赤犬其聲下者有兵}
  - {type: substitution, offset: 2592, original: 旂, replacement: 旗, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-1456}}
