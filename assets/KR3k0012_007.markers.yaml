  - {type: variant, offset: 2003, length: 613, content: 名上將第二名次將第三名貴相第四名司錄第五名司命第六名司法星光潤則天下安又曰大理四星在斗中亦為貴人牢又為執法之宮又曰庫樓十五星在左角南器府東一名天庫兵車之府星芒角兵起又曰招搖一星在梗河北主遠狄芒角則兵起又曰貫索九星在七公前為賤人牢口一星為門門欲開開即有赦星惣見獄事繁豫章列士傳曰周騰字叔達為御史桓帝欲南郊平明出叔達仰首曰王者象星今宮中宿策馬星不出動帝何出焉四更皇子卒遂止關令內傳曰北斗一星面百里相去九千里置二十四氣四宿行四時五方立五星主五岳也黃石公記曰黃石鎮星之精也王子年拾遺記曰禹鑄九鼎擇雌金為陰鼎雄金為陽鼎太白星見九日不沒莊子曰夫道可傳而不可受可得而不可見傳說得之以相武丁奄有天下乘東維騎箕尾而比於列星列子曰星積氣之中有光耀者抱朴子曰辰星水精生玄武歲星木精生青龍又曰人初受氣皆應列宿之精值聖宿則聖值賢宿則賢也尸子曰自井中視星所見不過數星自丘上以望則見始出也非明益也勢使然也私井中也公丘上也淮南子曰太微者太一庭也紫宮者太一之居也軒轅者帝妃之舍也咸池者水魚之囿也天河者群神之闕也天河星名也闕猶門也又曰令雨師灑道使風伯掃塵高誘注曰雨師畢星也風伯箕星也又曰歲星之所居五穀豐昌其對為衡歲乃殃又曰四守者所司賞罰許慎注曰四守紫宮軒轅咸池天河也家語曰巫馬期為單父令戴星出入以理人劉向說苑曰玄象著明莫大於日月察變之動莫著於五星也又曰秦胡亥立日月薄食山林淪亡枉矢光夜熒惑襲月景帝通紀曰彗星者天地之旂也國精符曰地為山川山川之精上為星各應其州城分野, WYG: 流}
