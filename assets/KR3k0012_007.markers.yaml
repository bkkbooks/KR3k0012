  - {type: variant, offset: 547, length: 3, content: 尚書五, krp: 傳弈相州鄴人也尤暁天文曆數隋開皇中以儀曹事漢王諒舉兵謂奕曰今兹熒惑入井是何祥也弈對曰天上黃道經其中正是熒惑行路所渉不爲恠異若熒惑入地上井是爲灾也郭子撗洞冥記曰武帝甞見彗}
  - {type: variant, offset: 551, length: 0, content: '', krp: 東方朔折指星之木以授帝帝以指彗彗遂没星出之夜野獸皆鳴或說爲獸鳴星吕氏春秋曰宋景公時熒惑}
  - {type: variant, offset: 552, length: 7, content: 紫微宮門內東南, krp: 心公召子韋問焉子韋曰禍當君可移於相公曰相所與理國家也曰可移於百姓曰百姓死寡人將誰爲君曰可移於歲公曰歲飢人餓必死焉爲人君而殺其人誰以我爲君乎子韋曰君有至德}
  - {type: variant, offset: 560, length: 4, content: 隅此八座, krp: 言三天必三賞君熒惑必徙三舎後果三徙晏子春秋曰景公時熒惑守虚朞年去晏子曰虚齊之分野當強爲善公乃去冤聚之獄振孤敬老行之三日而熒惑遷尉繚子曰昔楚將軍子正與齊戰未合初夜彗星出柄在齊所在勝不可擊子正曰彗何知明日與齊戰}
