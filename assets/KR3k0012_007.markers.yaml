  - {type: variant, offset: 859, length: 382, content: 勢四星在太陽西北主刑餘人而用事者也占以不明為吉若明則閹官用權又曰輔一星附北斗杓第六星大臣之象也占欲其小而明則吉若大而明則臣奪君政若小而不明則臣不任職若明大與斗合者則國兵暴起又曰八穀八星在紫微蕃之外五車之北其八星一主稻二主黍三主大麥四主大豆五主小豆六主小麥七主粟八主麻子占其明則八穀成若暗則不成若一星不見則一穀不登若八星不見則國人有糊口之憂又曰房四星去氐十五度為明堂布政之宮占若移徙則國流逆均明則天下大同又曰傅說一星在尾後河中也蓋後宮女巫也主祝祠神靈祈禱以求子胤占若大而明則後宮多禱祈又曰杵三星在箕南主舂杵之用占若其縱則為豐若其橫則為飢又曰農丈人一星在南斗南主農正官也占明則為豐稔若暗則為饑歉又曰南斗六星去牽牛二十六度四分之一為天廟丞相太宰之位主荐賢良授爵祿又主兵機魁南二星為天梁中央二星為天相北二星杓曰天廚庭亦為壽命之期將有天子之事占其斗星盛明則王道和平爵祿行若不, krp: 孛孛謂孛孛}
