  - {type: variant, offset: 503, length: 1, content: 柱, krp: 始皇之時十五年間彗星四見乆者八十日長或竟天後秦并六國外攘四夷死者如亂麻後漢書曰安帝永𥘉二年正月太白晝見占云爲強臣是時鄧氏方盛此其應也續漢書曰靈帝光和中國星見東南如炬十餘日其後黄巾張角起袁紹董卓亂西漢詞圃曰項籍之敗星孛大角呉志曰孫權時有長星從東南出羣星從之又曰司馬宣王圍公孫淵夜有大流星長數十丈墜襄平東及淵起當流星處斬之晉書曰張華爲司空中台星拆少子韙勸華遜位華云天道玄逺湏修德以應之孫氏晉陽秋曰有星赤而芒角自東比徃西南没于諸葛亮營俄而亮卒又曰㑹稽謝敷字慶緒隱若耶山𥘉月犯少微星少微一名處士星時戴逵名著於敷時人憂之俄而敷死故㑹稽人士嘲曰呉中髙士求死不得死宋書曰吳孫休永安元年有諸子羣嬉中有異眼光芒爚爚外射諸兒問之曰我熒惑也將示爾三公歸于司馬言畢乃聳身而躍仰視之若曵一疋練有頃而没後四年蜀亡六年魏廢二十一年呉平是歸司馬也又沈懷文傳曰時熒惑守南斗上乃廢西州舊館使西陽王子尚移居東城以厭之懷文曰天道示變冝應之以德今雖空西州恐無益也唐書曰有星孛于虚危歷于氐百餘日乃滅太宗謂羣臣曰天見彗星是何祅也虞丗南曰昔齊景公時有彗星見公問晏嬰對曰公穿池沼畏不深起臺榭畏不髙行刑罰畏不重是以天見彗星爲公誡耳景公懼而脩德後十六日而星没臣聞天時不如地利地利不如人和若德義不脩雖獲麟鳯終是無𥙷但政事無闕雖有災何損於時然願陛}
  - {type: variant, offset: 505, length: 2, content: 史一, krp: 勿以功髙古人而自矜伐勿以太平漸乆而自驕怠愼終如始彗}
