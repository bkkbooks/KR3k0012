  - {type: variant, offset: 1228, length: 0, content: '', WYG: 不得刻名下真廻元者太上更新之日也常以其日思存古事又曰虛妄者徳之病華衒者身之灾執滯者失之由耻辱者行之玷遣此四者然後可以向道耳有淫衒之心不可行上真之道也昨見清虛宫正除落此軰人名又考付三官推之可不慎乎紫㣲真仙之才内明外知録名太極金書東州内累既息積之勿休又曰審道之本則為上清真人仙真妙方能盡梗槩之道者便為九宫真人若各備具其道則為太極真人又曰練形於太隂易貌於三官受學化神濯景易氣俯仰四運得為真人金根經曰天圗玉闗主監衆真逰宴之所也又曰天關上有六層玉臺太上真人集宴之䖏也又曰玉保青宫北殿上有金格格上有金章鳯璽闕丹青羽蓋昇仙法服以給成真之人大有經曰玉華青宫有寶經玉訣應有真人者授之又曰天上素靈洞𤣥經上化三真又大洞真經云道有三真不可去身紫霞變景三光映真大洞玉經曰大無山中有洞宫玊户在峨嵋之上諸得道真仙之名刋列此宫也又曰上清宫門中有兩闕左金闕右玉闕有真衣守大内有土芝流霞之泉刻金題衆書飛仙之號又曰玉清中有太暉殿玉真逰宴之所也又曰九真仙伯上帝司禁之君濯纓帝}
