  - {type: variant, offset: 1290, length: 0, content: '', SBCK: 日也衆眞諸仙是日聽訟又刺姦吏及部内諸仙官並糾奏在處道士之功過及含生有罪應死生者故仙忌眞記日子欲升天愼秋分罪無大小皆上聞此朱火丹陵宫仲陽先生之要言也又云此辭出列紀是青童君述古眞人之言以傳龔氏言罪福纖介刻于丹城之籍也伏匿之善惡陰德之細功無不縷陳也又曰上眞人之道有七第一太上鬱儀奔日文二太上結隣奔月章三太上八素奔辰章四太微飛天上經五髙上太洞眞經六金闕靈書紫文七九眞中經也上眞之}
