  - {type: variant, offset: 3081, length: 276, content: 而彼年小彼是賤而我是貴此是未解正真平等之要人無貴賤有道則尊所謂長老不必耆年要當多識多見以為先生不得言彼學在我後云何更反師彼作此念者非學道也當謙下推能讓德惟善是從不得獨是非彼得道度世莫不由師也學之有師亦如樹之有根也太智既成復能成就小智由樹根生子子復能生根展轉相生種類不絕從師變道道過於師還教於師所謂道貴人賤義類如此先師並須尊異所以爾者本師者學之根也譬為山一簣之士漸得高大本師者發蒙之基也後師者備成也諭如嚴裝服飾眾事已辨惟未加冠不可以行人事也妄生下想所以然者論議言說為人模範師不明道焉能解疑難也古者賢聖上學得其師名為更生不得其師名為亂經無其師道不自生也太平, SBCK: 刼}
