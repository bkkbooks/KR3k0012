  - {type: variant, offset: 2124, length: 749, content: 極也七聖紀曰南岳赤君下教變跡為道士與六弟子俱顯姓名太一帝君經曰求道者使其心正則天地不能違也捨色累而不顧避榮利而自遠甘寒苦以存思樂靜齋於隱垣則學道之人始可與言矣太上三五順行經曰天者道之應形也應有時漸交以引之玄象虛文莫過三五三五順行運周則變通不窮三才合度太一者天也天之受一氣蕩蕩而致清道者天之積靈也昇玄經曰道之玄妙出於自然生於無生先於無先彌綸無外布神化氣淡然無上制御諸天玄妙內篇曰大道起於無為萬物之祖也正一真人經曰道之淳真非有言也借言通意因置玄都正一之化去真近矣寶玄經曰正則道合合則言志志言在正正以絕邪齋戒通經仙道自成成仙之大莫過太上太上無言言以應感感應之道表信成經也三皇經曰求索自然脫身當道三光發明天地常然智惠經曰與人君言則惠於國人父言則慈於子人師言則愛於眾人兄言則悌於行人臣言則忠於上人子言則孝於親人友言則信於交人婦言則志於夫人夫言則和於室人弟言則恭於禮野人言則勸於農道士言則止於道異國人言則各守其域奴婢言則慎於事太上經曰親近賢智博問善道賢者論議不可專執又曰末世道士講經說法儀軌云何若說五千文者亦依靈寶太上三洞寶經曰三洞傳法之師一人度世勝黃衣道士千人也又曰大茅山有銅鐵鼎可容四五斛刻甚精好在山最高處乒土八尺餘上有盤石掩鼎每吉日遠近道士咸登山瞻視無復草木壘石為小壇昔有小瓦屋為風所倒兩鉉法日月也三足法三才也羽山之銅所作神變隱顯真誥曰大茅山西南有四平山俗謂之方山其下有洞室名曰方臺洞有兩口見於山外與華陽通號為別宇幽館矣得道者處焉又曰脩於身其德乃真君子立身道德為任清淨為師太和為友為玄為默與道窮極治於根本求於未兆為善者自賞為惡者自刑故不爭無不勝不言無不應又曰能以至心學道當以道授學者裴君曰我師南岳赤松子為大虛真人昔太上以德教老子以得道松子以道授我而得仙又曰仙道十二試觀之法試皆過然後授之經此十二事大試也皆, WYG: 魂}
