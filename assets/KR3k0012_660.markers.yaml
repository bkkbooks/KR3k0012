  - {type: variant, offset: 1661, length: 272, content: 皇寶圖欲為變化當得偃息圖欲臨鑪定九丹金液當得太一圖欲登五岳求神仙芝藥當得開山芝藥圖欲保神形別邪精當得明鏡圖上清經曰氣之所守隨神所生神在則氣在神去則氣去氣散則為雲霧合則為形影出之為仙化入之為真一匕結三元下結萬物靜用為兆身動用為兆神洞真經曰凡讀太丹隱書洞真玄經能研精密感通玄達雲迴釋玄元味景太清者得為玄中法師也葛洪神仙傳曰自伏羲至三代顯名道士世世有之其老子蓋得道尤精者也內實自然欲正定本末當以史傳為據并仙經祕文以相參會其他俗說文多虛妄其後道士私有增益非真文也著道德二篇尹喜行其道至漢竇太后好黃老言孝文帝及外戚諸竇皆令讀之故莊周之徒以老子為宗太上玄一, WYG: 極}
