  body:
  - {type: variant, offset: 2, length: 188, content: 一道老子曰道可道非常道虛極之妙也無名天地之始有名萬物之母無名者妙本也道冲而用之或似不盈淵乎似萬物之宗天地之閒其由橐籥乎玄牡之門是謂天地根天地所以能長且久者以其不自生故能長生生而不有為而不恃長而不宰是謂玄德執古之道以御今之有能知古始是謂道紀萬物並作吾以觀其復功成事遂百姓皆謂我自然絕聖棄智民利百倍孔德之容惟道是從以閱眾甫吾何以知眾甫之然哉曲則全謂曲己以應務則全也枉則直謂枉己以伸, SBCK: 二眞}
