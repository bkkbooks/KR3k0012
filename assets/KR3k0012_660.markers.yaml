  - {type: variant, offset: 1170, length: 0, content: '', SBCK: 上素靈洞􅀇經上化三眞又大洞眞經云道有三眞不可去身紫霞變景三光映眞大洞玉經曰太無山中有洞宮玉戸在峨嵋之上諸得道眞仙之名刊列此宫也又曰云上淸有宫門有兩闕左金闕右玉闕有羽衣守士内有玉芝流霞之泉刻金題衆眞飛仙之號又云玉淸中有太暉殿玉眞遊宴之所也又曰九眞仙伯上帝司禁之君濯纓帝川之池也又曰太一上元君者萬仙之司主方岳眞氣太上眞人步五星之道以致降于室大洞眞經日赤城朱牎上}
