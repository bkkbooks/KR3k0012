  - {type: variant, offset: 685, length: 422, content: 德若谷謂虛沿而容物也大白若辱謂能潔而含垢也廣德若不足謂大成而執謙也建德若渝謂立功而不衒也體真若渝謂淳一而和光也大方無隅謂不小立圭角也大器晚成謂且無近功也大音希聲謂不飾小說也大象無形謂能應萬類也道隱無名謂功用不彰也道生一一生二二生三三生萬物萬物負陰而抱陽冲氣以為和為道日損損之又損以至無為故塞其兌閉其門終身不勤也謂不縱六根愛悅則禍患之門閉矣終身不勤勞也開其兌濟其事終身不救謂開縱視聽以成其愛悅之事故有禍患不救也無遣自殃是謂襲常謂不為身災是謂密用真常之道也又曰知者不言言者不知所以言者以音相聞譬如知音者識音以絃心知其音口不能傳道深微妙知者不言也太上曰知者不言言能以救物又曰上士學道受之以神中士受之以心下土受之以耳以神聽者通無形以心聽者知內情以耳聽者聞外聲又曰知者不言言者不知故聖人云我無為而民自化我無事而民自富我好靜而民自正我無欲而民自樸脩之於身天下自化深根固蒂長生久視之道以道蒞天下其鬼不神道者萬物之奧為者敗之執者失之是以聖人無為故無敗無執故無失, SBCK: ''}
