  - {type: variant, offset: 191, length: 493, content: 則直也窪則盈謂執謙則常盈也弊則新謂守弊薄則日新也少則得謂抱一不離則無失也多則惑謂有為多門則惑亂也是以聖人抱一為天下式希言自然者謂因言悟道不滯於言合自然也有物混成先天地生寂兮寥兮獨立而不改周行而不殆吾不知其名字之曰道強為之名曰大域中有四大王居其一謂王者人靈之主萬物繫其興亡也人法地地法天天法道道法自然重為輕根靜為躁君善行無轍跡謂體了真性行無行相則心與道宜也善言無瑕摘謂遣象求意理證心忘也善計不用籌筭謂一以貫之不生他見也善閉無關楗而不可開謂心無逐境之迷境無起心之累也善結無繩約而不可解謂心與道合雖無約束其不可解也是以聖人常善救人故無棄人常善救物故無棄物是謂襲明知其雄守其雌知其白守其黑知其榮守其辱謂含德內融則復歸於朴常德聽川則散而為器既涉形器必有精麤聖人用之則為群材之官長矣故大制不割謂聖人用道大制群生萬物不謝於自然曾不割傷也道之在天下猶川谷之與江海死而不亡者壽謂死者分理之終亡者夭折之數壽者一期之盡夫知足力行者得天常也死而不亡是一期之盡可謂壽矣執大象天下往往而不害安於太平化而欲作吾將鎮之無名之朴謂道也失道而後德失德而後仁失仁而後義失義而後禮天下之物生於有有生於無明道若昧進道若退夷道若類, SBCK: ''}
