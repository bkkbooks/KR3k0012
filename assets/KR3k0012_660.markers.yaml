  - {type: variant, offset: 1171, length: 0, content: '', SBCK: 絕境乃帝一内宅三眞寶堂又曰上淸眞人揔仙大司馬長生法師登大帝滄浪山洞臺中雙玉穴酣飲紫明芝液又曰長生存神者好山水之人仁知動靜所依也依仁者靜而壽依智者動而樂當投􅂤送名俾崇仁智朱書白􅂤移籍太清發爐拜手用青紙青絲裹絡巖石上詣水泛舟中流讀􅂤以名係之必能降眞也上淸}
