  - {type: variant, offset: 3372, length: 279, content: 中士學道欲度其家下士學道才脫其身又曰言則道不成多言則為害閉口不言萬歲無患又曰人得善師乃使凡賤之人成善人善不止更賢賢不止次聖聖不止乃得深知真道守道不止乃得仙仙不止乃與天比其神神不止乃得與元氣比其得元氣乃包天地八方莫不受其氣而生是善師之功也不得其善師失路矣故師師相傳迺堅於金石不以師傳之名為妄作則致邪矣叛去其師是去其真道自窮之術也道有宗師祖師定真玉籙曰治心之最不忘須臾心神乃定定則入道其狀在外慎其言語懼觸物也節其飲食慮貪叨也衣麤而靜在素淡也居陋而隱守靜篤也恭謹一切避淩辱也不敢為先免嫉謗也始終淳信潛化導也進止和光密行教也挫銳解紛明道有時也出處變化見神應之速也又曰, SBCK: ''}
