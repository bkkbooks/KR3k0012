  - {type: variant, offset: 1145, length: 4, content: 祕籍祕要, SBCK: 上眞廻元者太上更新之日也常以其日思存吉事又曰虚妄者德之病華衒者身之災執滯者失之由恥辱者行之玷遣此四者然後可以問道耳有淫􅃷之心不可行上眞之道也昨見清虚宫正除落此輩人名又考付三官推之可不愼乎紫微眞仙之才内明外知録名太極金書東州内累旣息積之勿休又曰審道之本則爲上清眞人仙眞妙方能盡梗槩之道者便爲九宫眞人若各備具其道則爲太極眞人又曰練形於太陰易皃於三官受學化神濯景易氣俯仰四運得爲眞人金根}
