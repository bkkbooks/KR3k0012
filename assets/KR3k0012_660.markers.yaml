  - {type: variant, offset: 4163, length: 0, content: '', krp: 眞人居仙府中世人得仙者皆先過此自然玉字經曰七寶林中有上眞之遊圃眞人之戲園太霄琅書曰元皇玉靈之胄位登太眞理二儀於}
  - {type: variant, offset: 4164, length: 0, content: '', krp: 圃掌玉籙於萬仙揔地司於五岳領上眞於三關上統無涯下攝洞源自天以下莫不咸隷又曰太素三元君稟靈和玉宸上氣故結生虚無含眞秀景機洞妙無神齊廣暉道周九玄呼吸未兆觸物對應太上之凝結也太上四明玉經曰眞仙之道以耳目爲主淫色則目闇廣愛則耳閉此二病從中來而外奔也非復有他今令其聦明益易耳但不爲之當洗心絶念放弃淫貪所謂嚴其始矣保利雙闕啓徹九門朝液泥丸列爲上眞視徹甚逺聽於絕響此眞仙之高不但明耳目而已三洞珠囊曰髙上玉淸刻石隱銘曰酆都山在北内有空洞洞中有六宮書此銘於宫北壁制檢群凶不使橫暴生民學者得佩此刻石文則北鄷落名南宫度命爲其眞}
  - {type: variant, offset: 4165, length: 0, content: '', SBCK: 居仙府中世人得仙者皆先過此自然玉字經曰七寶林中有上眞之遊圃眞人之戲園太霄琅書曰元皇玉靈之胄位登太眞理二儀於􅀇圃掌玉籙於萬仙揔地司於五岳領上眞於三􅀜上統無涯下攝洞源自天以下莫不咸隷又曰太素三元君稟靈和玉宸上氣故結生虚無含眞秀景機洞妙無神齊廣暉道周九􅀇呼吸未兆觸物對應太上之凝結也太上四明玉經曰眞仙之道以耳目爲主淫色則目闇廣愛則耳閉此二病從中來而外奔也非復有他今令其聦明益易耳但不爲之當洗心絶念放弃淫貪}
  - {type: page-break, offset: 4165, content: '', id: KR3k0012_SBCK_660-7a}
  - {type: variant, offset: 4165, length: 0, content: '', WYG: 居仙府中世人得仙者皆先過此自然玉字經曰七寳林中有上真之逰圃真人之戱園太霄琅書曰元皇玉靈之胄位登太真理二儀於𤣥圃堂圗籙於萬仙緫地司於五嶽領上有於三闗上統無涯下攝洞源自大以下莫不咸𨽻又曰太素三元君禀靈和玉晨上氣故結生虛無含章秀景機洞妙無神齊廣暉道周九真呼吸未兆觸物内應太上之凝結也太上四明玉經曰真仙之道以耳目為主滛色則目闇廣愛則耳閉此二病從中來而外奔也非復有他今令其聦明益易且但不為之當洗心絶念放棄滛貪}
  - {type: page-break, offset: 4165, content: '', id: KR3k0012_WYG_660-11a, image: WYG0898/WYG0898-0849c.png}
  - {type: variant, offset: 4165, length: 13, content: 所以與天地等者貴其能相教導, krp: 太平經曰後學得道各有品階至于指極聖眞仙人定眞玉籙經曰凡欲定心當受上皇民籍定眞玉籙此至要爲學之先}
  - {type: variant, offset: 4166, length: 5, content: 以與天地等, SBCK: 謂嚴其始矣保利雙闕啓徹九門朝液泥丸列爲上眞視徹甚逺聽於絕響此眞仙之高不但明耳目而已三洞珠囊曰髙上玉淸刻石隱銘曰酆都山在北内有空洞洞中有六宮書此銘於宫北壁制檢群凶不使橫暴生民學}
