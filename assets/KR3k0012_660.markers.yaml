  - {type: variant, offset: 1637, length: 122, content: 當得九九道仙圖欲食道氣當得導引圖欲治道術當得洞中皇寶圖欲為變化當得偃息圖欲臨鑪定九丹金液當得太一圖欲登五岳求神仙芝藥當得開山芝藥圖欲保神形別邪精當得明鏡圖上清經曰氣之所守隨神所生神在則氣在神去則氣去氣散則為雲霧合則為形影出之為仙化入之為真一匕結, SBCK: ''}
