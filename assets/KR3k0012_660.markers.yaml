  - {type: variant, offset: 3683, length: 2, content: 伺迎, WYG: 真人徃來也太上正法經曰九真者九天之真氣凝而成也上中下三真生於太清是元始之澄氣也各置宫室次第上清行衛之宫太上天道君萬真之主也居玉殿造上帝之章以為寶經於玉清宫中以度後學得真之士三元品戒經曰紫㣲宫有延生之儀格又云赤帝玉司君玉景度治南方朱陽之臺總統上真之界景林真人曰動感累世念真期臺皇鑒力用思太極注名玉禮於是細書紫虛之宫朱書東華之府刻名上清丹文錦籍空洞靈章曰真人彈雲嗷吹九鳯之簫神洲之笙其音逸嚮流􅈭千尋後聖列紀曰上清金闕後聖君父好道樂真紫㣲上真天帝玉清宫賜紫蕋剛丹鳯璽得在上清中遊太極下治諸天封掌兆民仙誌曰凡修行太一之事}
