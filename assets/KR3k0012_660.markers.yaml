  - {type: variant, offset: 3712, length: 418, content: 度世也又云合道不言得無之真晝夜不臥日月合光不飢不渴龜龍胎息也又云食穀者名之穀仙行之不休則可延久長也不食穀者可以度世又曰無賣吾道以行求錢無衒吾道強授豪榮無損吾道以與讒佞黃庭經曰仙人道士服氣非有神也養生所致和氣專也若道士恐畏存神可鳴天鼓聲聞太極太真科曰道士脩經習業以五千文為先又曰道有寂動氣化之有形智化之有聲又曰皇教道也帝教德也王教仁也抱朴子曰求師必須深博猶涉滄海造長洲獨以力劣為患豈以物少為憂哉夫虎豹之所餘乃狸鼠之所飫陶朱之所棄乃原憲之所專心憑師依法行道濟身度世利在永亨事師盡敬得道為期承閒候色也不盡力明其師道則罪不可除也學道得師明事之害亂不得發也三無真一經曰有大洞守一經者則為師也太清經云天地以道資聖人以道師也資者持道以養育當生也師者以教人不知而當成也又曰有大洞守一經者則為師也所以崇建本末盡善明天戒之苦至期神靈之所宗託階級以自始所以師友垣其外三一鑑其內帝君忻其赤子悅其宅老子云天地以道資聖人以道師資者持道以養育當生也師者以教人不知而當, SBCK: ''}
