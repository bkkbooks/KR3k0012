  - {type: variant, offset: 1050, length: 1, content: 苦, WYG: 警又曰劉頌為河内守郡界多公王水碓遏塞水流轉為侵害頌表罷之百姓獲其利又曰吳隱之為晉陵太守在郡清儉妻自負薪又曰鄧攸字伯道為淮南太守夢水邉見一女子猛獸自後斷其盤囊占者以為水邉有女汝字也斷盤囊者新獸頭代故獸頭也不作汝隂當汝南也果遷汝隂太守又曰鄧攸元帝以攸為太子中庶子時吳郡闕守}
