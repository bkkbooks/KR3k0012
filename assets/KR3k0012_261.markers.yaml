  - {type: variant, offset: 688, length: 1, content: 蝗, WYG: 守太祖召見計事大恱之謂左右曰使天下二千石皆如賈逵則吾何憂又曰杜畿為河東郡守寛惠與民無為民嘗辭訟有相告者親為陳大義遣令歸諦思之若意有所不盡更來詣府鄉邑父老自相責怒有君如此奈何不從其教自是少辭訟詔曰昔蕭何定關中冦恂平河内卿有竒功將授卿以納言之職顧念河東吾股肱郡充實之足以制天下故且煩卿卧而鎮之畿在河東十六年常為天下最又曰胡質字文德為常山太守遷任東莞士盧顯為人所殺質曰此士無讎而有少妻所以死乎悉見其比居年少書吏李若見問而色動遂窮詰情狀若即自首罪人斯得毎軍功賞賜皆散之於衆無}
