  - {type: variant, offset: 1232, length: 0, content: '', SBCK: 先時郡人侯音反衆數千人在山中爲群盗大爲郡患前太守収其黨與五百餘人表奏皆當死䂊悉見諸繫囚慰諭開其自新之路一時破械遣之諸囚皆叩頭願自効即相告語群賊一朝解散郡内清静具以􅃺聞太祖善之又曰自太祖迄于咸熈魏郡太守陳國呉璀清河太守樂安任燠京兆太守濟北顔斐弘農太守太原令狐邵濟南相魯國孔義或哀矜折獄或推誠惠愛或治身清白或擿姦發伏咸爲良二千石又曰凉茂守伯方時泰山多盗賊以茂爲泰山太守旬月之間繦􅀒而至者千餘家又曰鄭渾字文公遷沛郡太守郡界下濕常患水澇百姓飢乏渾於瀟湘三縣界興陂開稻田郡人皆以爲不便渾曰地勢洿下冝漑灌終成稻田經乆之利此豐民之本也遂}
