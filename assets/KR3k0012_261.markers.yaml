  - {type: variant, offset: 1269, length: 4, content: 奏信臣為, SBCK: 以介爲府長吏在職以清白稱武帝謂何敬容曰蕭介甚貧可以處一郡復曰始興郡頻無良守可以介爲之由是出焉齊春秋曰崔元祖乆景眞爲平昌太守有惠政常懸一蒲鞭而未嘗用梁書曰禇翔爲義興太守翔在政㓗巳省䌓苛去游費}
