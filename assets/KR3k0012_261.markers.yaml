  - {type: variant, offset: 690, length: 4, content: 平原界輒, WYG: 家者在郡九年吏民便安將士用命又曰倉慈字孝仁淮南人太和中遷燉煌太守郡在西陲以喪亂隔絶曠無太守二十嵗大姓雄豪遂以為俗前太守尹俸等修政而已無所匡革慈到大抑挫權右撫恤貧羸甚得其理舊大族田地有餘而小民無立錐之土慈皆隨口割賦稍使理其生業先是屬城訟獄衆多縣不能决委積不治慈躬徃省閲斟酌輕重自非殊}
