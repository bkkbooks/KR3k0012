  - {type: variant, offset: 3724, length: 272, content: 時飢荒之餘人庶流迸家戶且盡淮課督農桑廣施方略朞年間穀粟豐賤數十倍而趙魏之郊數為羗所鈔暴淮外禦寇虜內撫百姓郡境以安又曰伏湛更始立以為平原太守倉卒兵起天下驚擾而湛獨晏然教授不廢謂子曰夫一榖不登國君撤膳禮記曰年穀不登君膳不祭肺今人皆飢奈何獨飽乃共食麤糲糲麤米者九章筭術曰粟五十糲率三十一斛粟得六斗米為糲也悉分俸祿以賑鄉里來客者百餘家又曰鮑昱後拜汝南太守郡多陂池歲歲決壞年費常三千餘萬昱乃上作方梁石洫洫渠也以石為之猶今之水門也水常饒足溉田倍多人以殷富又曰第五訪為張掖太守歲飢粟石數千訪乃開倉賑給以救其弊吏懼譴爭欲上言訪曰若上須報是棄人也須待也太守樂以一, SBCK: 清}
