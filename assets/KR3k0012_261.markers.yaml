  - {type: variant, offset: 368, length: 312, content: 琅邪太守齊俗舒緩養名愽新視事右曹掾史皆移病臥愽問對言惶恐故事二千石新到輒遣吏存問致意乃敢起就職愽奮髯抵几曰觀齊兒欲以此為俗耶乃召見諸曹吏書佐及縣大吏選其可用者出教署之皆斥罷諸病吏郡中大驚又勑功曹官屬多襃衣大祒祒音紹謂大袴也不中節度自今掾史衣皆令去地三寸又曰尹翁歸字子况為東海太守郡中吏人賢不肖及奸邪盡知之東海大治以高第入守右扶風滿歲為真政雖任刑其在公卿之間清潔自守語不及私溫良廉退不以行能驕人甚得名譽於朝廷又曰薛宣字貢君東海太守左馮翊滿歲稱職宣為吏賞罰明用法平而必行所居皆有條教可紀多仁恕愛利愛人而安利之又曰朱邑字仲卿廬江人少時為舒桐鄉嗇夫廉平不苛以愛利為行未嘗笞辱人存問孤寡遇之有恩所部吏民愛敬焉遷北海太守又曰趙喜字伯陽為, SBCK: 爲}
