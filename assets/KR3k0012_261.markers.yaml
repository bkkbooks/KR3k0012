  - {type: variant, offset: 1263, length: 0, content: '', SBCK: 鄭陂魏略曰孟康正始中出爲弘農太守康到官清平嘉善而矜不能省息獄訟縁民所欲而利之郡領吏二百餘人渉春遣休常四分遣一事無􅀫諾時出案行不欲煩損吏民常豫勑卒行各持鎌所在自刈馬草不止亭傳露􅀫樹下蜀志何祗字君肅汶山夷不安以祗爲汶山太守民夷服信遷廣陵後夷反叛辭曰令得前何府君乃能安我耳時難復屈祗挾族人爲之汶山復得安吴志曰頋}
