  - {type: variant, offset: 1263, length: 0, content: '', krp: 鄭陂魏略曰孟康正始中出爲弘農太守康到官清平嘉善而矜不能省息獄訟縁民所欲而利之郡領吏二百餘人渉春遣休常四分遣一事無宿諾時出案行不欲煩損吏民常豫勑卒行各持鎌所在自刈馬草不止亭傳露宿樹下蜀志何祗字君肅汶山夷不安以祗爲汶山太守民夷服信遷廣陵後夷反叛辭曰令得前何府君乃能安我耳時難復屈祗挾族人爲之汶山復得安吴志曰頋}
  - {type: variant, offset: 1264, length: 0, content: '', SBCK: 字孝時年二十七起家爲豫章太守下車祀先賢徐􅐐子之墓優待其後禁􅁋祀非禮之􅀕看相小吏資質佳者輙令就學擇其先進擢置右職學善以教風化大行又曰孫權授諸葛恪撫越將軍領丹陽太守拜畢令恪備威儀作皷吹導引歸家恪到府乃移書四郡屬城長令各保其疆界明立部伍於是山民漸出降王隱晉書曰廣平太守􅆙宣帝謂鄭袤曰賢叔大匠垂稱於陽平魏郡並蒙惠化且盧子家王子雍繼踵此郡吾欲令郡丗不乏賢故復相屈袤在郡先以德化善作條教百姓愛之又曰鄭黙爲東郡太守值􅀊荒民飢黙輙開倉賑給自上待罪朝廷嘉黙憂國恤人詔書襃歎比之汲黯又曰應詹爲南平太守天下分崩征鎮州郡巳失城邑簷獨保境外攘狂狡内除塗炭甚便百姓之情郡人歌曰亂離旣普殆爲􅁅朽僥倖之運頼兹應后潤同江海恩猶}
  - {type: page-break, offset: 1264, content: '', id: KR3k0012_SBCK_261-3b}
  - {type: variant, offset: 1264, length: 0, content: '', krp: 字孝時年二十七起家爲豫章太守下車祀先賢徐孑焉正子之墓優待其後禁淫祀非禮之祭看相小吏資質佳者輙令就學擇其先進擢置右職學善以教風化大行又曰孫權授諸葛恪撫越將軍領丹陽太守拜畢令恪備威儀作皷吹導引歸家恪到府乃移書四郡屬城長令各保其疆界明立部伍於是山民漸出降王隱晉書曰廣平太守缺宣帝謂鄭袤曰賢叔大匠垂稱於陽平魏郡並蒙惠化且盧子家王子雍繼踵此郡吾欲令郡丗不乏賢故復相屈袤在郡先以德化善作條教百姓愛之又曰鄭黙爲東郡太守值歲荒民飢黙輙開倉賑給自上待罪朝廷嘉黙憂國恤人詔書襃歎比之汲黯又曰應詹爲南平太守天下分崩征鎮州郡巳失城邑簷獨保境外攘狂狡内除塗炭甚便百姓之情郡人歌曰亂離旣普殆爲灰朽僥倖之運頼兹應后潤同江海恩猶}
  - {type: punctuation, offset: 1265, content: 。, id: KR3k0012_CHANT_261-bkkpn314}
  - {type: 'tls:seg', offset: 1265, content: '', id: KR3k0012_CHANT_261-12a.18}
  - {type: variant, offset: 1265, length: 1, content: 荊, SBCK: 母晉書曰范粲遷武威太守到郡選良吏立學校勸農桑是時戎夷頗侵壃􅂣粲明設防備敵不敢侵西域流通無􅇏燧之警又曰劉頌爲河内守郡界多公王水碓遏塞流水轉爲浸害頌表罷之百姓獲其利又曰呉隱之爲晉陵太守在郡清儉妻自􅀒薪又曰鄧攸字伯道爲淮南太守夢行水邊見一女子猛獸自後斷其盤囊占者以爲水邊有女汝字也斷盤囊者新獸頭代故獸頭也不作汝隂當汝南也果遷汝隂太守又曰鄧攸元帝以攸爲太子中庶子時吴郡闕少人多欲之帝以授攸攸載米之郡俸禄無所受唯飲吴水而巳時郡中大飢攸賑貸未報乃輙開倉救之臺遣散􅀐常侍桓彛慰勞飢人觀聽善不乃劾攸以擅出榖俄而有詔原之攸在郡州政清明百姓歡恱爲中興良守又曰鄧攸爲吴郡太守稱疾去職郡常有送迎錢數百萬攸去郡不受一錢百姓數千人留牽攸舡不得進攸乃止停中夜發去吴人歌之曰紞如打五皷鷄鳴天欲曙鄧侯挽不留謝令推不去百姓詣臺乞留一􅀊不聽又曰陸納爲吴興太守至郡不受俸禄頃之徴拜左氏尚書領州大中正將應召外白冝裝幾舡納曰私奴裝粮食來無所復須也臨發止有􅀍幞而巳其餘並封以還宫晉中興書曰王藴字叔仁爲吴興太守時郡荒民飢藴輙開倉賑䘏主簿執諌云冝先列上藴曰行仁義而敗者尠矣於是以米賑貸頼藴活者十室而八然後具自表聞朝廷以違科免飢民多誦之詔特左遷晉陵太守又曰諸葛恢字道明中宗選爲㑹稽太守臨行上爲置酒謂之曰今之㑹稽昔􅀜中足食足兵在於良守以君有蒞任之方是以相屈恢陳謝曰今天下䘮亂之餘風俗陵遟冝尊五美屏四惡進忠實之士退浮華之黨中宗深納焉南史曰宋江秉之爲臨海太守以簡約見稱卒於官所得禄秩悉散之親故妻子常飢寒人有勸其營田秉之正色荅曰食禄之家豈可與人競利在郡作書案一枚去官留以付庫齊書曰劉懷慰拜齊郡太守上謂懷慰曰齊􅀖是王業所基吾方以爲顯任經理之事一以委卿又手勑曰有文事者必有武備今賜卿王環刀一口懷慰至郡修治城郭安集居民墾廢田二百頃决沈湖灌漑不受禮謁民有餉其新米一斛者懷慰出所食麥飯示之曰旦食有餘幸不煩此因著廉吏論以逹其意又曰虞愿爲晉平太守海邊有越王石常隨雲霧相傳云清廉太守乃得見愿徃觀視清徹無隱蔽後琅耶王秀之爲郡與朝士書此郡承虞公之後善政猶在遺風昜遵差得無事又曰王秀之爲晉平太守至郡朞年謂人曰此􅀖豐壤禄俸常充吾山資巳足豈可乆留以妨賢路上表請代時人謂王晉平恐富求歸又曰裴昭明歷郡皆有善政常謂人曰人生何事須聚蓄一身之外亦復何湏子孫􅀂不才我聚彼散􅀂能自立則不如一經故終身不治産又曰蕭介字茂鏡少頴悟有器識梁大明中武陵王紀爲楊}
