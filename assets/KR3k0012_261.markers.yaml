  - {type: variant, offset: 1045, length: 0, content: '', WYG: 値嵗荒民飢黙輒開倉賑給自待罪朝廷嘉黙憂國恤人詔書褒勸比之汲黯又曰應詹為南平太守天下分崩方鎮州郡多失城邑詹獨保境外攘狂狡内除塗炭甚便百姓之情郡人歌曰亂離既普殆為灰朽僥倖之運賴兹應后潤同江海恩猶父母晉書曰范粲遷武威太守到郡選良}
