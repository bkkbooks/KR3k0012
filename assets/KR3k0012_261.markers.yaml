  - {type: variant, offset: 1776, length: 670, content: 政樂不可支視事八年匈奴不敢犯塞又曰第五倫字伯魚為會稽太守性節儉雖身居二千石位常蔬食布衣妻自炊爨初代到當發百姓老小闐府門攀車叩馬啼呼曰捨我何之其得人心見愛如此又曰郭伋為頴川太守辭去之官光武詔曰郡得賢能太守去帝城不遠何潤九里冀京師并蒙其福也又曰秦彭遷山陽太守時山陽新遭地動後飢旱穀貴米石七八萬百姓窮困彭下車經營勞來為民四誡以父母夫妻兄弟長幼之序擇民能率眾以為鄉三老選鄉三老為縣三老令與長吏參職崇儒雅貴庠序上德化春秋饗射升降揖讓務禮示民吏民畏愛不敢欺犯又曰侯霸字君房為臨淮太守治有能名及王莽之敗霸保固守卒全一郡更始元年遣使徵霸百姓老弱相攜號哭遮使者車或當道而臥皆曰乞侯君復留民乃誡乳婦勿得舉子侯君當去必不能全使者慮霸就徵臨淮必亂不敢受璽書而具以狀聞又曰耿純字伯山鉅鹿人請治一郡盡力自効上笑曰卿乃欲以治民自効乃拜純為東郡太守後坐事免上過東郡數千人號呼涕泣云願復得耿君上復以純為東郡太守又曰王阜為益州太守邊郡吏多放縱阜以法繩正吏民不敢犯禁政教清靜百姓安業甘露降白烏見連有瑞應世謂其持法平政寬慈有化所致又曰魏霸為鉅鹿太守霸性清約質朴為政寬恕正色而已不求備於人掾吏有過輒私責數不改休罷之終不暴揚其惡又曰秦彭字伯本為山陽太守以禮訓民不任刑名崇好儒雅百姓懷之莫敢欺犯潁川太守鳳皇騏驎嘉禾甘露之瑞集於郡境元成間宗族五人同為二千石故號為萬石秦氏又曰沈豐字聖達為零陵太守為政慎刑重殺罪法辭訟初不歷獄嫌疑不決一斷於口鞭杖不舉市無刑戮僚友有過初不暴揚有奇謀異略輒為談述曰太守所不及也到官一年甘露降芝草生又曰宗慶字叔平為長沙太守民養子者三千餘人男女皆以宗為名後漢書曰光武, WYG: 汝}
