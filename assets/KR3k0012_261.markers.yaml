  - {type: variant, offset: 771, length: 5, content: 王尊為中郡, SBCK: 令狐邵字孔叔爲弘農}
  - {type: variant, offset: 771, length: 269, content: 王尊為中郡太守河溢堤壞尊執珪請以身填金堤而水稍却又曰王尊字子貢𣵠郡人也為安定太守到官出教告屬縣曰令長丞尉奏法守城為民父母禦強扶弱宣廣澤甚勞苦矣太守以今日至府願諸君自免正身又曰馮立字聖通以任為郎遷五原太守徙西河上郡立在職公廉治行略與兄野王相似而多知有恩貸好為條教吏人嘉美野王立相代為太守人歌之曰大馮君小馮君兄弟繼踵相因循聰明賢智恩惠民政如魯衛德化均周公康叔猶二君後遷為東海太守土下濕病痺天子聞之徒太原太守更治五郡所居有迹又曰韓延壽字長公燕人為淮陽太守治甚有名徙頴川多豪強難治延壽教以禮讓令文學校官諸生冠皮弁執俎豆為吏民行喪娶禮百姓遵用其教徙, WYG: 鄭黙}
