  - {type: variant, offset: 1056, length: 3, content: 憂皆便, WYG: 臺遣散騎常侍桓彛慰勞饑人觀聽善不乃劾攸以擅出穀俄而有詔原之攸在郡刑政清明百姓歡恱為中興良守又曰鄧攸為吳郡太守稱疾去職郡常有送迎錢數百萬攸去郡不受一錢百姓數千人留牽攸船不得進攸乃止停中夜發去吳人歌之曰紞如打五鼓鷄鳴天欲曙鄧侯挽不留謝令推不去百姓詣臺乞留一嵗不聽又曰陸納為吳興太守至郡不受俸祿頃之徵拜左民尚書領州大中正將應召外白宜裝幾舡納曰私奴裝糧食來無所復須也臨發止有被幞而已其餘並封以還官晉中興書曰王藴字叔仁為吳郡太守時郡荒民飢藴輒開倉賑䘏主簿執諫云宜先列上藴曰行仁義而敗者尠矣於是發米賑貸賴藴活者十室而八然後自具表奏朝廷以違科免飢民多誦之詔特左遷晉陵太守又曰諸葛恢字道明中宗遷為㑹稽太守臨行上為置酒謂之曰今之㑹稽昔之闗中足食足兵在於良守以君有蒞任之方是以相屈恢陳謝曰今天下喪亂之餘風俗陵遲宜尊五美屏四惡進忠實之士退浮華之黨中宗深納焉南史曰宋江秉之為臨海太守以簡約見稱卒於官所得祿秩悉散之親故妻子常饑寒人有勸其營田秉之正色答曰食祿之家豈可與人競利在郡作書案一枚去官留以付庫齊書曰劉懷慰拜齊郡太守上謂懷慰曰齊邦是王業所基吾方以為顯任經理之事一以委卿又手勑曰有文事者必有武備今賜卿玉環刀一口懷慰至郡脩治城郭}
