  - {type: variant, offset: 2966, length: 753, content: 用良吏王渙鐔顯等以為腹心鐔音徒南反訟者日減郡中清肅先是洛縣城南洛縣名故城在今益州雒縣南也每陰雨常有哭聲聞於府中積數十年寵聞而疑其故使吏案行還言前代衰亂時此下多死亡者而骸骨不得葬寵愴然歎即矜勑縣盡收歛葬之自是哭聲遂絕又曰宋均為九江太守山陽楚沛多蝗其飛至九江界者輒東西散去又曰劉寵為會稽太守簡除煩苛禁察非法郡中大化徵為將作大匠山陰縣有五六老叟尨眉皓髮自若耶山谷間出人齎百錢以送寵寵為人選一大錢受之又曰曹襃為河內太守時春夏大旱糧穀踊貴襃到乃省吏併職退去奸殘澍雨數降其秋大熟百姓給足流寓皆還又曰鮑德為南陽太守時歲多荒災唯南陽豐穰吏人愛悅號為神父又曰廉范遷蜀郡太守其俗尚文辨好相持短長范每厲以淳厚不受偷薄之說成都民物豐盛邑宇逼側舊制禁民夜作以防火災而更相隱蔽燒者范乃毀削先令但嚴使儲水而已百姓為便乃歌之曰廉叔度來何暮不禁火民安堵平生無襦今五袴又曰馬嚴為陳留太守下車明賞罰發奸匿郡界清靜時京師訛言賊從東方來百姓奔走轉相驚動諸郡遑急各以狀聞嚴察其虛妄獨不為備詔書勑問使驛係道嚴固執無賦後卒如言又曰黃香為魏郡太守郡舊有內外園田常與人分種收穀歲數千斛香曰田令啇者不農王制仕者不耕王制曰上農夫食九人下士視上農夫祿足以代耕也伐冰食祿之人不與百姓爭利乃悉以賊人課令耕種又曰中平三年江夏兵趙慈反叛殺南陽太守奏頡攻沒六縣拜羊續為南陽太守當入郡界乃羸服間行童子一人觀歷縣邑採問風謠然後乃進其令長貧潔吏民良猾悉迸知其狀郡內驚竦莫不震懾乃發兵與荊州刺史王敏共擊趙慈斬之獲首五千餘級屬縣餘賊並詣續降又曰羊續為南陽太守續妻後與子秘俱往郡舍續𨳲門不內妻而自將秘行其資藏唯有布衾弊祗禂監麥數斛而已說文曰祗稠短衣而已祗者丁奚反裯音丁勞也顧勑祕曰吾自奉若此何以資爾母乎使母俱歸又曰三府舉王棠治劇拜巴郡太守棠馳兵赴賊斬虜千餘級巴庸清靜吏民生為立祠又曰樊淮, SBCK: ''}
