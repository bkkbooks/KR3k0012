  - {type: variant, offset: 2447, length: 295, content: 定河內而更始大司馬朱鮪等盛兵據洛陽又并州未安光武難其守問於鄧禹曰諸將誰可使守河內者禹曰昔高祖任蕭何於關中無復西顧之憂所以得專精山東終成大業今河內帶河為固戶口殷實北通上黨南迫洛陽冠恂文武備足有牧人御眾之才非此子莫可使也乃拜恂河內太守行大將軍事又曰寇恂字子翼為潁川太守拜執金吾後光武幸潁川百姓遮道曰願陛下復借寇君一年乃留之又曰楊震遷東萊太守當之郡道經昌邑故所舉荊州茂才王密為昌邑令謁見至夜懷金十斤以遣震曰故人知君君不知故人何也密曰暮夜無知者震曰天知神知我知子知何謂無知密愧而出轉𣵠郡太守性公廉不受私謂子孫常蔬食步行故舊長者或欲令為開產業震不肯曰使後代稱為清白吏子孫以此遺之不亦厚乎又曰孟嘗遷合浦, SBCK: ''}
