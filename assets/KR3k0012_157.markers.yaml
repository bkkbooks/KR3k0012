  - {type: variant, offset: 3763, length: 2, content: 此言, SBCK: 罷天下郡其縣但􅀠州而巳九年平陳巳後四海一家大業三年罷州爲郡四年大薄凢郡國一百八十三唐貞觀十三年大簿凢州府}
  - {type: variant, offset: 3763, length: 2, content: 此言, WYG: 罷天下郡其縣但𨽻州而已九年平陳已後四海一家大業三年罷州爲郡四年大簿凡郡國一百八十三唐貞觀十三年大簿凡州府}
  - {type: variant, offset: 3763, length: 2, content: 此言, krp: 罷天下郡其縣但隷州而巳九年平陳巳後四海一家大業三年罷州爲郡四年大薄凢郡國一百八十三唐貞觀十三年大簿凢州府}
  - {type: variant, offset: 3767, length: 0, content: '', SBCK: 五十八叙之爲十道應劭漢官儀曰秦用李斯議分天下爲三十六郡凢郡或以列國陳魯齊呉是也或以舊邑長沙丹陽是也或以山大山山陽是也或以川源西河河東是也或以所出金城城下有金酒泉泉味如酒豫章章樹生庭中鴈門鴈之所育是也或以號令禹合諸侯大計東冶之山㑹稽是也京兆絶髙曰京京大也十億曰兆欲令帝都殷盈也左輔右弼蕃翊承風也張掖始開垂張臂掖也黄恭十四州記曰秦兼天下始皇二十六年廢五等之爵立郡縣之官以公國爲大侯伯爲小大郡曰守小郡曰都尉都尉之言君改公侯之封而言君}
  - {type: page-break, offset: 3767, content: '', id: KR3k0012_SBCK_157-6a}
  - {type: variant, offset: 3767, length: 0, content: '', WYG: 五十八叙之為十道應劭漢官儀曰秦用李斯議分天下爲三十六郡凡郡或以列國陳魯齊吳是也或以舊邑長沙丹陽是也或以山泰山山陽是也或以川原西河河東是也或以所岀金城城下有金酒泉泉味如酒豫章章樹生庭中鴈門鴈之所育是也或以號令禹合諸侯大計東冶之山㑹稽是也京兆絶高曰京京大也十億曰兆欲令帝都殷盈也左輔右弼蕃翊承風也張掖始開垂張臂掖也苗恭十四州記曰秦兼天下始皇二十六年廢五等之爵立郡縣之官以公國爲大郡侯伯為小郡大郡曰守小郡曰都尉改公侯之封而言郡郡}
