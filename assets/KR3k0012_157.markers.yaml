  - {type: variant, offset: 1998, length: 249, content: 非長久之地石虎傾於前慕容滅於後國富主奢暴成速敗且西有枉人山東有列人縣北有柏人城君子不飲盜泉惡其名也遂止乃都洛陽三國典略梁元帝在江陵即位欲還都建康領軍將軍胡僧祐太府卿黃羅漢吏部尚書宗懔御史中丞劉諫等曰建業王氣已盡與虜止隔一江若有不虞悔無及也且渚宮洲數滿百當出天子陛下龍飛是其應乎梁主令朝臣議之黃門侍郎周弘正尚書左僕射王褒曰帝王所都本無定處其如黔首萬姓未見輿駕入建業謂是列國諸王宜順百姓之心從四海之望時江陵人士咸云弘正等皆是東人志願東下恐非良計弘正面折之曰若東人勸東謂為非計君等西人欲西豈成良策梁主笑之, SBCK: 者爲州}
