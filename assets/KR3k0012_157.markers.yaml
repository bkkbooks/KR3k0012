  - {type: variant, offset: 3810, length: 0, content: '', SBCK: 刺史行部見之雅歎其盛勑縣號爲冠盖里荆州圖記曰秭歸縣北有屈原故宅方七頃累石爲屋今其名樂平里伏琛齊地記曰臨淄有梧臺里益州記曰州南蜀時故錦澗也其處號錦里伍輯之從征記曰譙周云孔子後魯人就冢次}
  - {type: page-break, offset: 3810, content: '', id: KR3k0012_SBCK_157-11a}
  - {type: variant, offset: 3810, length: 0, content: '', WYG: 記曰峴山南至宜城百餘里舊説其間雕牆崇峻漢靈帝末其中有卿士刺史二千石數十人朱輪駢燿華蓋接隂㑹於太山廟荆州刺史行部見其雅嘆其盛勑縣號爲冠蓋里荆州圖記曰秭歸縣北有屈原故宅方七頃累石爲屋其里名樂平里伏琛齊地記曰臨淄有梧臺里益州記曰州南蜀時故錦澗也其處號錦里伍輯之從征記曰譙周云孔子後魯人就冡次}
