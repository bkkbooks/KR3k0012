  - {type: variant, offset: 2827, length: 0, content: '', SBCK: 江南曰楊州自江至南海也濟河間曰兖州自河東至濟也濟東曰徐州自濟東至海也燕曰幽州自易水至北狄齊曰營州自岱東至海孝經援神契曰計校九州之別土壤山陵大川澤所注萊沛所生鳥獸所聚九百十一萬八千二十四頃言民少不足以盡地華利沛水傍漸洳不可耕者磽确不墾者其餘隄封千五百萬二千頃論語摘輔象曰兖豫屬上台九州繫於三台荆楊屬下級下級上之下等一台各有上下梁雍屬中上中台之上兾州屬錯錯􅄂也屬中台之之下台之上青州屬下上下台之上徐州屬下下下台之下也五經異義曰地有九州足以承天史記曰鄒􅄛云中國於天下乃八十一分之一耳中國名赤縣州内自有九州禹之序九州是也不得爲州數中國外如赤縣州者有九乃謂九州也於是有禆海環之民禽獸莫能相通者如一區中者乃爲一州如此者九乃有大瀛海環其外天地之際焉後漢書曰獻帝建安十八年復禹貢九州獻帝春秋曰時省幽并州以其郡國併於兾州省司􅀠校尉及涼州郡國以併於雍州自交州荆益州於是有兖豫青州荆揚兾益雍九數雖同禹貢无益州有梁州然梁益亦一地也又曰順帝時李固上書曰夫天下之大譬一人之身夲朝者心腹也州郡者四支也心腹病則四支不舉故臣之憂在心腹之疾非四支之患應劭漢官儀曰孝武皇帝南平百越北攘戎狄置交阯朔方之州復徐梁之地改雍曰梁改梁曰益凢十三州所以交朔獨不稱州明示帝王未必相襲始開北方遂交南方爲子孫基阯也漢官解詁曰兾趙常山胡廣注曰經曰兾州旣載居趙國今治常山兖衛濟河經曰濟河惟兖州衛國今治山陽青齊海岱經曰海岱惟青州居齊國今治焉徐魯淮沂經曰海岱及淮惟徐州又曰淮沂其又居魯國今居豫州而治東海楊呉彭蠡經曰淮海惟揚州又曰彭蠡旣瀦居呉國今治九江荆楚衡陽經曰荆及衡陽惟荆州居楚國今治武陵益庸岷梁經曰華陽黒水惟梁州漢改梁州爲益州合治廣漢凉邠黒水經曰黒水西河惟雍州居邠國漢改雍州爲邠州國右扶風拘}
