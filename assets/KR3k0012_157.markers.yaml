  - {type: variant, offset: 2451, length: 4, content: 和美卿方, SBCK: 五山帝王居之又曰天有九道地有九州天有九部八紀地有九州八柱河圖曰九州殊題水泉剛柔各異青徐角羽集寛舒遟人聲緩其泉鹹以酸荆楊角徴㑹氣漂輕人聲急其泉酸以苦梁州商徴接剛勇漂人聲塞其泉苦以辛兖豫宫徴合平靜有慮人聲端其泉甘以苦雍兾合商羽端駃烈人聲捷其泉辛以鹹尚書舜典曰肇十有二州范寗注曰禹平水土置九州舜爲兾州廣大分爲并州燕置幽州分齊爲營州始爲十二州又湯誓曰以有九有之師爰革夏政九有者九州也尚書大傳曰古之處師八家而爲鄰}
  - {type: page-break, offset: 2451, content: '', id: KR3k0012_SBCK_157-1b}
  - {type: variant, offset: 2451, length: 4, content: 和美卿方, WYG: 五山帝王居之又曰天有九道地有九州天有九部八紀地有九州八柱河圖曰九州殊題水泉剛柔各異青徐角羽集寛舒遲人聲緩其泉鹹以酸荆揚角徵㑹氣漂輕人聲急其泉酸以苦梁州商徵接剛勇漂人聲騫其泉苦以辛兖豫宫徵合平靜有慮人聲端其泉甘以苦雍冀合商羽端駃烈人聲㨗其泉辛以酸尚書舜典曰肇十有二州范寧注曰禹平水土置九州舜爲冀州廣大分爲并州燕置幽州分齊爲營州始爲十二州咸有一德曰以有九有之師爰革夏正九有者九州也尚書大傳曰古之處師八家而爲隣}
