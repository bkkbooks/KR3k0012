  - {type: variant, offset: 3777, length: 0, content: '', SBCK: 十五父死居喪以孝行稱縣令郭湛改其所居爲復禮郷至孝里老子曰以郷觀郷莊子曰遊於無何有之郷鄭􅀇別傳曰國相孔文舉敎髙密縣曰公者人}
  - {type: variant, offset: 3777, length: 0, content: '', WYG: 十五父死居喪以行孝稱縣令郭湛改其所居爲復禮鄉至孝里老子曰以鄉觀卿莊子曰遊於無何有之鄉鄭𤣥别傳曰國相孔文舉教高密縣曰公者人}
