  - {type: variant, offset: 3811, length: 3, content: 背於咸, krp: 居者百有餘家曰孔里郡國志曰齊臨淄縣東有隂陽里諸葛亮梁甫呤云歩出齊城門遥望隂陽里里内有三墳纍纍皆相似借問誰家墳田疆古冶子也㑹稽典録曰陳囂與民紀伯爲隣伯夜竊藩囂地自益囂見之伺伯去後密枝其藩一丈以地益伯伯覺之慙惶旣還所侵又却一丈太守周府君髙囂德義刻石旌表其閭號曰義里坊附漢宮閣名曰洛陽故北宮有九子坊晉宮閣名曰洛}
  - {type: variant, offset: 3812, length: 0, content: '', WYG: 隣患孰恤之又曰救災恤隣天之道也又曰親仁善隣國之寳也又昭元年曰晏子如晉景公使更其宅還而毁之曰諺曰非宅是卜惟隣是卜又曰諸侯守在四隣論語曰孰謂微生高直或乞醯焉乞諸其隣而與之又曰德不孤必有隣後漢書曰張霸字伯饒博覽五經諸生孫林劉固段著等慕之皆市宅其傍以就學焉南史曰宋季雅市宅在吕僧珍宅側吕問宅價曰千一百萬吕怪其貴宋曰一百萬買宅千萬買隣也物理論曰買宅者先定隣焉又曰置隣之直貴}
