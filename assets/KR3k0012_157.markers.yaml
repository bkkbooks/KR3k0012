  - {type: variant, offset: 3811, length: 3, content: 背於咸, SBCK: 居者百有餘家曰孔里郡國志曰齊臨淄縣東有隂陽里諸􅁑亮梁甫呤云歩出齊城門遥望隂陽里里内有三墳纍纍皆相似借問誰家墳田疆古冶子也㑹稽典録曰陳囂與民紀伯爲隣伯夜竊藩囂地自益囂見之伺伯去後密枝其藩一丈以地益伯伯覺之慙惶旣還所侵又却一丈太守周府君髙囂德義刻石旌表其閭號曰義里坊附漢宮閣名曰洛陽故北宮有九子坊晉宮閣名曰洛}
  - {type: variant, offset: 3811, length: 0, content: '', WYG: 居者百有餘家曰孔里郡國志曰齊臨淄縣東有蕩隂里諸葛亮梁父吟云歩岀齊城門遥望蕩隂里里内有三墳纍纍皆相似借問誰家墳田疆古冶子㑹稽典錄曰陳囂與民紀伯爲隣伯夜竊藩囂地自益囂見之伺伯去後密枝其藩一丈以地益伯伯覺之慙惶既還所侵又却一丈太守周府君高囂德義刻石旌表其閭號曰義里坊附漢宫閣名曰洛陽故北宫有九子坊晉宫閣名曰洛陽宫有顯昌坊修城坊緩福坊延祿坊休徵坊承慶坊桂芬坊椒房坊舒蘭坊藝文坊隣附尚書曰睦乃四隣以蕃王室毛詩曰洽比其隣周禮五家爲隣五隣爲里周易曰東隣殺牛不如西隣之禴祭左傳僖公曰棄德不祥怒隣不義又曰棄信}
