  - {type: variant, offset: 2832, length: 3, content: 始改國, SBCK: 曰神土也正南次州曰沃土沃盛也五月建午稼穡長故曰沃土西南戎州曰滔土滔大也七月建申萬物壯大故曰滔土正西弇州曰并土并猶成八月建酉百榖成熟故曰并也正中兾州曰中土兾大也爲四方内主故曰中土西北括州曰肥土正北濟州曰成土未聞東北薄州曰隱土薄猶平也隂氣所隱伏也故曰隱土正東楊州曰申土申復也隂氣盡所隱㐲也東北陽氣復起東方故曰申土輿地志}
  - {type: variant, offset: 2832, length: 3, content: 始改國, WYG: 曰神州也正南次州曰沃土沃盛也五月建午稼穡長故曰沃土西南戎州曰滔土滔大也七月建申萬物壯大故曰滔土正西弇州曰并土并猶成八月建酉百穀成熟故曰并也正中冀州曰中土冀大也爲四方内主故曰中土西北台州曰肥土正北濟州曰成土説未聞東北薄州曰隠土薄猶平也隂氣所隠伏也故曰隠土正東揚州曰申土申復也隂氣盡伏東北陽氣復起東方故曰申土輿地志}
