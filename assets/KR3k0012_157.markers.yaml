  - {type: variant, offset: 3778, length: 1, content: 衰, WYG: 之正號不必三事大夫也今鄭君鄉宜曰鄭公鄉黃公交廣記曰秦兼天下改附庸爲鄉鄉則有族今嗇夫是也鄉之言境言其在人境域内非天王所置故言鄉零陵先賢傳曰鄭産泉陵人爲白土嗇夫漢末産子一歲輒岀口錢民多不舉産乃敕民勿得殺子口錢自當代岀因名其鄉曰更生鄉萬歲厯曰黃帝六年正月獲彭綺是歲由拳西鄉人産兒墮便語云天方明河欲清鼎脚折金乃生於是因曰語兒鄉郡國志曰秭歸縣屈原鄉里南岸曰歸鄉西岸曰秭歸屈原蹔歸鄉里因曰歸鄉曰屈原姊女嬃聞原還亦來喻之因曰姊歸也王子年拾遺記曰張掖郡郅竒字君珍居喪盡禮以淚灑石石即成痕著枯木枯草在冬必茂浸地成鹹俗謂之鹹鄉漢帝嘉其孝異表銘其邑改曰孝行之鄉歲時使立廟祭祀黨附周禮地官司徒曰四閭爲族使之相葬五族爲黨使之相助釋名曰五百家爲黨黨長也一聚所尊名也六韜曰友之友謂之朋朋之朋謂之黨黨之黨謂之羣閭附周禮地官司徒曰五家爲比使之相保五比爲閭使之相愛説文曰閭里門也周禮謂比爲閭閭侣也二十五家相羣侣也尚書曰武王克商式商容閭范曄後漢書曰袁忠子秘爲郡門下義生黃巾起秘從太守趙謙以侍繫之軍敗秘與功曹封觀等七人以身扞刃皆死於陣謙以得免詔復秘等閭號曰七賢閭戰國䇿曰王孫賈年十五齊閔王岀走失王之處其母曰汝朝岀}
