  - {type: variant, offset: 3777, length: 0, content: '', krp: 十五父死居喪以孝行稱縣令郭湛改其所居爲復禮郷至孝里老子曰以郷觀郷莊子曰遊於無何有之郷鄭玄別傳曰國相孔文舉敎髙密縣曰公者人}
  - {type: variant, offset: 3778, length: 1, content: 衰, SBCK: 之正號不必三事大夫也今鄭君郷冝曰鄭公郷黄恭交廣記曰秦兼天下改附庸爲郷郷則有族今嗇夫是也郷之言境言其在人境域内非天王所置故言郷零陵先賢傳曰鄭産泉陵人爲白土嗇夫漢末産子一歳輒岀口錢民多不舉産乃勑民勿得殺子口錢自當代出因名其郷曰更生郷萬歳曆曰黄武六年正月􅀗彭綺是歳由拳西郷有産兒墮便語云天方明河欲清鼎脚折金乃生於是因曰語兒郷郡國志曰秭歸縣屈原郷里南岸曰歸郷西岸曰秭歸屈原旣放蹔歸郷里因曰歸郷縣屈原姊女湏聞原還亦來喻之因曰姊歸也王子年拾遺録曰張掖郡郅竒字君珎居喪盡禮以淚灑石石即成痕着枯木枯草在冬必茂􅪶地成鹹俗謂之鹹郷漢帝嘉其孝異表銘其邑改曰孝行之郷歳時使立廟􅀕祀黨附周禮地官司徒曰四閭爲族使之相葬五族爲黨使之相助釋名曰五百家爲黨黨長也一聚所尊長也六韜曰友之友謂之朋朋之朋謂之黨黨之黨謂之羣閭附周禮地官司徒曰五家爲比使之相保五比爲閭使之相受􅀃文曰閭里門也周禮五比爲閭閭侣也二十五家相羣侣也尚書曰武王克商軾商容閭范曄後漢書曰􅀽忠子秘爲郡門下議生黄巾起秘從太守趙謙擊之軍敗秘與功曹封觀等七人以身扞刃皆死於陣謙以侍免詔復秘等閭號曰七賢閭戰國䇿曰王孫假年十五齊閔王之出走天王之處其母曰汝朝出}
