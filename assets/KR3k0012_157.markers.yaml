  - {type: variant, offset: 2837, length: 1, content: 豳, SBCK: 成王時周公作輔定官分職改禹九州以徐梁合之於青分兾州之域爲幽并二州風俗通曰周禮五黨爲州州疇也州有長使之相周足也物理論曰九州變易交錯不同禹貢有梁州無并州周官有并州􅈛雅有營州無青州漢興武帝開拓三方立十三州通并梁之數而増交益焉太一式占周公城名録曰黄帝受命風后受圖割地布九州置十二圖張衡靈憲曰崑崙東南有赤縣之州風雨有時寒暑有節茍非此土南則多暑北則多寒東則多隂故聖王不處焉叙郡釋名曰郡群也}
