  - {type: variant, offset: 387, length: 1599, content: 謂金城千里天府之國劉敬說是也上即日車駕西都關中又曰秦中形勢之國也地勢便利以下兵於諸侯譬如高屋之建瓴水也又曰翼奉上書曰天道有常王道亡常亡常者所以應常也必有非常之主然後能立非常之功臣願陛下徙都於成周左據成皋右阻澠池前鄉嵩高後介大河師古曰鄉讀曰嚮介隔礙也建滎陽扶河東南北千里以為關而又敖倉地方千里者八九足以自娛東厭諸侯之權西遠胡羌之難師古曰厭抑也音一葉反遠音于萬反陛下恭已亡為按成周之居兼盤庚之德萬歲之後長為高宗後漢書建武元年冬十月癸丑車駕入洛陽幸南宮卻非殿遂定都洛陽宮闕名有却非殿又曰時京師脩起宮室浚繕城隍而關中耆老猶望朝廷西顧班固感前代相如壽王東方之徒造構文辭終以諷勸相如作上林子虛賦吾丘壽王作士大夫論及驃騎將軍頌東方朔作客難及非有先生論共辭以諷喻為主也乃上兩都賦盛稱洛陽制度之美以折西賓淫侈之論又黃琬傳董卓秉政以琬名臣徵為司徒遷太尉更封陽泉鄉侯卓議遷都長安琬與司徒楊彪同諫不從琬退而駮議之曰昔周公營洛邑以寧姬光武卜東都以隆漢天之所啟神之所安大業既定豈妄有遷動以虧四海之望也又曰杜篤以關中表裏山河先帝舊京不宜改營洛邑乃上奏論都賦又曰王景建初七年遷徐州刺史先是杜篤上論都賦欲令車駕遷還長安耆老聞者皆動懷土之心莫不眷然佇立而望景以宮廟已立恐人情疑惑會時有神雀諸瑞景帝時有神雀鳳皇白鹿白鳥等瑞乃作金人論頌洛邑之美天人之符文有可採又曰陳紀遷侍中出為平原相謁董卓時欲徙都長安乃謂紀曰三輔平敞四面險固土地肥美號為陸海今關東兵起恐洛陽不可久居長安猶有宮室今欲遷何如紀曰天子有道守在四夷左傳之文宜脩德政以懷不附遷移至尊誠計之末者愚以公宜以事委公卿專精外任其有違命則威之以武今關東兵起民不堪命若謙遠朝政率師討伐則塗炭之民庶幾可全若欲徙萬乘以自安將有累卵之危崢嶸之險也卓意甚恨而敬紀名行無所復言吳錄曰張紘言於孫權曰秼陵楚武王所置名為金陵秦始皇時望氣者云金陵有王者氣故掘斷連崗改名秣陵有別小江可以貯舡宜為都邑劉備勸都之自京口遷都焉吳志先亂時童謠云寧飲建業水不食武昌魚寧歸建業死不就武昌居乃遷都建業案江表傳漢建安中劉備曾宿於秣陵覩江山之秀勸帝居之初張紘當謁帝曰秣陵都楚威王所置名為金陵地勢崗阜連石頭訪問故老云昔秦始皇東巡會稽經此縣望氣者云金陵地形有王者都邑之氣故掘斷東崗改名秣陵今處所見存地有其氣象天之所會今宜為都邑帝深善之後聞劉備語曰智者意同案吳錄劉備曾使諸葛亮至京因覩秣陵山阜歎曰鍾山龍盤石頭虎踞此帝王之宅晉書周馥成都王穎以為河南尹馥觀洛陽孤危乃建策迎天子都壽春曰不圖危運戎狄交侵畿甸危逼僉以殷人有屢遷之事周王有歧山之徙方今河朔蕭條崤函阻澀宛都屢敗江漢多虞淮陽之地北阻塗山南枕靈岳名州四帶有重險之固運漕四通無空窶之難雖聖上神聰元輔明賢居儉守約用保宗廟末若相土遷宅以保永祚也載記曰劉元海之僣太史令宣于脩之言於元海曰陛下鳳翔龍興奄受大命然皇居仄陋非可久安平陽勢有紫氣兼陶唐舊都願陛下上迎乾象下協坤祥乃遷都平陽又石勒下令曰武都吾之豐沛萬歲之後魂魄歸之初張賓謂勒曰今天下鼎沸戰爭方始夫得地者昌失地者亡邯鄲襄國趙之舊都依山憑險形勝之國可擇此二國而都之然後命將四出授以奇略推亡固存兼弱攻昧王業成矣遂據襄國又符堅自臨晉登龍門顧謂群臣曰美哉山河之固婁敬有言關中四塞之國真不虛矣權翼對曰臣聞夏殷之都非不險也周秦之眾非不多也終於身殞南巢首懸白旗軀殘於犬戎國分於項籍何也德不修故也吳起有云在德不在險願陛下守之以德山河之固不足恃也江表傳孫皓欲徙都武昌楊土百姓沿流供給以為患陸凱上䟽曰臣聞有道之君以樂樂人無道之君以樂樂身樂人者其樂彌長樂身者不久而亡民者國之根也誠宜重其食愛其命民安則君樂矣又武昌土地危險磽硧非王者都安國養民之處舡泊則沉漂陵居則峻危且童謠曰寧飲建業水不食武昌魚寧還建業死不就武昌居臣聞翼星為祥熒惑作妖童謠之言發自天心也後魏書文帝泰和十八年卜遷都鄴登銅雀臺魏御史大夫崔吉等曰鄴城平原千里運漕四通有西門使起舊跡可以饒富在德不在險請都之孝, SBCK: 注仰􅀃}
