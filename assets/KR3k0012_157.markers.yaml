  - {type: variant, offset: 2456, length: 0, content: '', SBCK: 鄰而爲朋三朋而爲里五里而爲邑十邑而爲都十都而爲師州有十師焉鄭􅀇注曰州九四十三萬二千家此蓋虞夏之數也毛詩商頌曰帝命式于九圍九圍州也詩含神務曰邶鄘衛王鄭此五國者}
