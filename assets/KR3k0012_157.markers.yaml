  - {type: variant, offset: 3776, length: 0, content: '', SBCK: 户周書曰周公乃作大邑于成周左傳曰凢邑有宗廟先君之主曰都無曰邑榖梁傳曰齊人取子糺殺之十室之邑可以隱死以千乗之魯而不能存子糺公爲病矣論語曰十室之邑必有忠信如丘者焉不如丘之好學也史記曰黄帝邑于涿鹿之阿遷徙無常處以兵師爲營衛張華詩曰駕言遊東邑東邑紛穰穰㛰姻及良時嫁娶避當梁郷附釋名曰郷向也衆所向也周禮地官司徒曰五州爲郷使之相賔論語曰孔子於郷黨恂恂如也似不能言者又曰玄郷難與言童子見門人惑後漢書曰張湛爲左馮翊告歸平陵望寺門而歩主簿進白明府位尊德重不冝自輕湛曰禮下公門軾路馬孔子於郷黨恂恂如也父母之國所冝盡禮何謂輕哉唐書曰張道源并州祁人也}
  - {type: page-break, offset: 3776, content: '', id: KR3k0012_SBCK_157-7b}
  - {type: variant, offset: 3776, length: 0, content: '', WYG: 户周書曰周公乃作大邑于成周左傳曰凡邑有宗廟先君之主曰都曰邑穀梁傳曰齊人取子糾殺之十室之邑可以隱死以千乗之魯而不能存子糾公爲病矣論語曰十室之邑必有忠信如丘者焉不如丘之好學也史記曰黃帝邑于涿鹿之阿遷徙往来無常處以師兵為營衛張華詩曰駕言遊東邑東邑紛穰穰婚姻及良時嫁娶避當梁鄉附釋名曰鄉向也衆所向也周禮地官司徒曰五州爲鄉使之相賓論語曰孔子於鄉黨恂恂如也似不能言者又曰互鄉難與言童子見門人惑後漢書曰張湛爲左馮翊告歸平陵望寺門而歩主簿進曰明府位尊德重不宜自輕湛曰禮下公門軾路馬孔子於鄉黨恂恂如也父母之國所宜盡禮何爲輕哉唐書曰張道源并州祁人也}
