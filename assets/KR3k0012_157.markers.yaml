  - {type: variant, offset: 3161, length: 1, content: 云, SBCK: 置西郡閩中南海桂林象海合四十郡置一守一丞兩尉以典之監侍御史掌監諸郡漢有天下王侯郡國並置焉迄于平帝户口繁息凢新置郡國六十七與秦三十六合一百三改周雍州曰凉州復置夏之徐梁二州而改梁曰益北置朔方南有交阯別置二刺史凢十三郡凉益荆楊青豫兖徐幽并兾十一州交阯朔方二刺史合十三部刺史十三人各掌一州又曰後漢魏武輔政呉蜀三方鼎跱疆􅂣不定建安中置郡十二新興樂平西平新平略陽隂平帶方譙郡樂陵章武南陽襄陵是也又省上郡朔方五原雲中定襄漁陽廬江等七郡文帝受禪又置七郡朝歌陽平弋陽魏興新成美陽安豐也明帝置六郡平公孫度得遼西遼}
  - {type: page-break, offset: 3161, content: '', id: KR3k0012_SBCK_157-5a}
