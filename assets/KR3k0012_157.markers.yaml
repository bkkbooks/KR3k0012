  - {type: variant, offset: 3536, length: 203, content: 張衡南都賦曰於顯樂都既麗且康陪京之南居漢之陽魯都賦曰彼齊諸儒皆繪弁端衣散佩垂紳金聲玉色溫故知新訪魯都之區域弔先王之遺真左思蜀都賦曰蓋兆基於上世開國於中古廓靈關而為門苞玉疊而為宇又曰魏土者畢昴之所應夏之餘民先王之桑梓列聖之遣塵考之四奧則八紘之中測之寒暑則霜露所均後漢杜篤論都賦夫大漢之盛代籍雍土之饒得御外理內之術孰能致功若斯創業於高祖嗣傳於孝惠德隆於太宗財衍於孝景威盛於聖武政行於宣元侈極於成哀祚缺於孝平傳代, SBCK: 一百一}
