  - {type: variant, offset: 3801, length: 0, content: '', SBCK: 舎長安尚冠里東觀漢記曰鮑永字君長爲魯郡太守時彭豐等不肯降後孔子闕里無故荆􅁄自闢從講室掃除至孔里永異之召郡府丞謂曰方今阨急而闕里無故自滌意豈夫子欲令太守大行饗誅無狀也乃修學校禮請豐等㑹手格殺之張璠漢記曰荀爽兄弟八人時人謂之八龍舊居西豪里縣令􅁐康曰昔髙陽氏有才子八人署其里曰髙陽里宋書曰太原王知􅀇者僑居㑹稽剡縣居家以孝聞及丁憂哀毀而卒帝嘉之詔改所居青苦里爲孝家里宋略曰張敷㓜樹風規貞心簡立居喪滅性孝道淳深冝追甄異以旌厥美可改所居里曰孝張里又曰散􅀐常侍􅀽瑜薦㑹稽郭丗道詔改所居曰孝行里又曰太祖十三年春鳯皇見于京師衆鳥隨之改其地曰鳯皇里唐書曰劉禕之貞觀元年詔遣入京以母老固辭太宗許其終養江南道大使李襲譽嘉其至孝賜以束帛因上表旌其門閭改所居爲孝慈里典略曰衛襄字叔遼河東人也修行至孝州郡嘉之改其里謂之孝德里晉官閣名曰洛陽城}
  - {type: page-break, offset: 3801, content: '', id: KR3k0012_SBCK_157-10a}
  - {type: variant, offset: 3801, length: 0, content: '', WYG: 舍長安尚冠里東觀漢記曰鮑永字君長爲魯平太守時彭豐等不肯降後孔子闕里無故荆棘自闢從講室掃除至孔里永異之召郡府丞謂曰方今阨急而闕里無故自滌意豈夫子欲令太守大行饗誅無狀也乃修學校理請豐等㑹手格殺之張璠漢記曰荀爽兄弟八人時人謂之八龍舊居西豪里縣令苑康曰昔髙陽氏有才子八人今荀氏亦有子八人因改其里曰髙陽宋書曰太原王知𤣥者僑居㑹稽郯縣居家以孝聞及丁憂哀毁而卒帝嘉之改所居青苦里爲孝家里宋畧曰張敷幼樹風規貞心簡立居喪滅性孝道淳深宜追甄異以旌厥里改所居里曰孝張里又曰散騎常侍袁瑜薦㑹稽郭世道詔改所居曰孝行里又曰太祖十三年春鳯凰見于京師衆鳥隨之改其地曰鳯凰里唐書曰劉禕之貞觀元年詔追入京以母老固辭太宗許其終養江南道大使龔譽嘉其至孝賜以米帛因上表旌其門閭改所居為孝慈里典畧曰衛襄字叔遼河東人也修行至孝州郡嘉之改其里謂之孝德里晉宫閣名曰洛陽城}
