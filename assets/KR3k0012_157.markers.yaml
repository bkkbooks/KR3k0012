  - {type: variant, offset: 3002, length: 140, content: 年六月十八日移入新邑在漢故城之東南萬年縣界南直終南山子午谷北枕龍首原今朝堂即舊楊興村村門大樹今見在初周代有異僧名棖公言詞多驗時村人於此樹下集棖公忽來逐之曰此天子坐位何故坐之左僕射高穎總領其事太子左庶子宇文愷創制規模謂之大興城隋文初封大興公及登極縣門園池多取其名宮城東西四里南北二里, SBCK: 百}
