  - {type: variant, offset: 3270, length: 198, content: 年改為東都舊宮為洛陽宮明慶元年復為東都武太后虢為神都神龍元年復舊又改為河南府洛水貫都有河漢之象初隋煬帝登北邙觀伊闕顧曰此龍門耶自古何為不建都於此僕射蘇威對曰自古非不知以俟陛下帝大悅然其地北據山麓南望天闕水木滋茂川源形勝自古都邑莫有比也又曰太宗車駕始幸洛陽宮唯因舊宮無所改製終於貞觀永徵之間荒蕪虛耗置都之後方漸修補龍朔中詔司農少卿韋機更繕造高宗常謂機曰兩京朕東西二宅來去不恒卿宜善思修建始作上陽等宮, SBCK: 十八}
