  - {type: variant, offset: 3768, length: 0, content: '', SBCK: 君至尊也言郡守專權君臣之禮更宗也今之郡字君在其左邑在其右君爲元首邑以載民故取名於君而}
  - {type: variant, offset: 3768, length: 0, content: '', WYG: 君也君至尊也言郡守專權君臣之禮更崇也今之郡字君在其左邑在其右君爲元首邑以載民故取名於君而}
