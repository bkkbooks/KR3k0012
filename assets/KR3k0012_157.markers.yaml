  - {type: variant, offset: 3769, length: 1, content: 出, SBCK: 之郡也風俗通曰周制天子方千里分爲百縣縣有四郡故左氏傳曰上大夫受縣下大夫受郡叙縣釋名曰縣懸也懸係於郡也􅀃文曰縣邑也從口巳聲周書曰郊田方六百里因四土爲方千里分以百縣縣有四郡郡有鄙鄙不過百室以便野事周禮地官遂人曰五家爲鄰五鄰爲里四里爲鄼五鄼爲鄙五鄙爲縣五縣爲遂禮記王制曰天子之縣内方百里之國九七十里之國}
