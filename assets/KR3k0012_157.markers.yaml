  - {type: variant, offset: 3164, length: 4, content: 城隋大業, SBCK: 也晉太康平呉之後天下一統平呉得州四交廣荆楊也郡四十三凢州十六太康地記曰司兾兖豫荆楊徐靑幽并雍凉梁益交廣也晉自湯隂敗後羌羯交侵至乎劉曜䧟洛陽於是司兾雍涼青并兖豫幽平秦營十二州並淪没矣後魏孝文帝都洛陽開拓土宇明帝熈平}
