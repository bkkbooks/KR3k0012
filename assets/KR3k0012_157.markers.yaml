  - {type: variant, offset: 3772, length: 2, content: 年涉, SBCK: 里子男夲方百里也故言今之百里古之諸侯又曰縣者􅁌也言施繩用法狀如絃絃聲近縣故以取名風俗通曰周禮百里曰同所以奬王室協風俗㹅名縣縣玄也言當玄静平徭役邑附尚書大傳曰五里爲邑周禮地官曰四井爲邑易訟卦曰逋其邑人}
  - {type: page-break, offset: 3772, content: '', id: KR3k0012_SBCK_157-7a}
  - {type: variant, offset: 3772, length: 2, content: 年涉, WYG: 里之男本方百里也故言今之百里古之諸侯又曰縣者絃也言施繩用法狀如絃絃聲近縣故以取其名風俗通曰周禮百里曰同所以奬王室協風俗總名縣縣𤣥也言當𤣥靜平徭役邑附尚書大傳曰五里爲邑周禮地官曰四井爲邑易訟卦曰逋其邑人}
