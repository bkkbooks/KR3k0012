  - {type: variant, offset: 2853, length: 2, content: 授江, WYG: 則止員則行任勢自然故善戰人之勢如轉員石於千仞之山者勢也又曰凡先據戰地而待敵者佚有餘力也後據戰地而趍戰者勞故善戰者致人而不致於人能使敵人自至者利之也誘之以利能使敵人不得至者害之也岀其所必趍攻其所不救故敵佚能勞之以利煩之飽能飢之絶其粮道安能動之岀其所必趍也使敵必救又曰兵形象水水之行避高而就下兵之形避實而擊虛故水因地而制形兵因敵而制勝故兵無常勢水無常形能與敵變化而取勝者謂之神勢盛必衰形露必敗能因敵變化勝之若神故五行無常勝四時無常位日有長短月有死生兵無常勢盈縮隨敵也又曰故不知諸侯之謀者不能豫交不知敵情謀者不能交結也不知山林險阻沮澤之形者則不能行軍高而崇者爲山樹木所聚者爲林坑坎者爲險一高一下爲阻水草漸洳爲沮泉水所歸不流者爲澤也不用鄉道者不能得地利故兵以詐立以利動以分合爲變者也兵一分一合以敵爲變故兵疾如風擊虛空也徐如林不見利也侵掠如火疾如火也不動如山守固難知如隂似天隂不見列宿也動如雷霆又曰夜戰多火皷晝戰多旌旗所以變人之耳目也故三軍可奪氣將軍可奪心}
