  - {type: variant, offset: 2846, length: 1, content: 竟, SBCK: 一鼓作氣再而衰三而竭也是故朝氣銳晝氣惰暮氣歸故善用兵者避其銳氣擊其惰歸此治者也以治待亂以静待譩此治心者也以近待逺以佚待勞以飽待飢此治力者也無邀正正之旗無擊堂堂之陣此治齊人者也正正髙齊堂堂者大又曰用兵之法髙陵勿向倍兵勿迎丘阪勿迎佯北勿從銳卒勿攻餌兵勿食歸師勿遏懷歸故能死戰}
  - {type: page-break, offset: 2846, content: '', id: KR3k0012_SBCK_270-7b}
  - {type: variant, offset: 2846, length: 1, content: 竟, WYG: 上有仁化於下則能致命也天者隂陽寒暑時制地者遠近險易廣狹死生言以凡地形勢不同因時制度也將者智信仁勇嚴將宜五德備也法者曲制官道主用曲制者部曲幡幟金鼓之制官者爵賞道者粮路主者主掌軍資之人用者計度費用之物凡此五者將莫}
