  - {type: variant, offset: 1451, length: 0, content: '', SBCK: 􅃖尤虎捲威文立兵宋均注曰捲手也手文威字也書曰鴻範八政八曰師大戴禮曰魯哀公問孔子曰􅃖尤作兵與孔子曰􅃖尤庻人之人貪者也反利無義以喪厥身何兵之能作與民皆生也左傳曰武有七德禁􅁀戢兵保大定功安民和衆豊財者也又曰舉不失德賞不失勞老有加惠旅有施舎見可而進知難而退軍之善政也兼弱攻昧武之善經也又曰兵猶火也不戢將自焚又曰師直爲壯曲爲老又曰師尅在和不在衆榖梁傳曰善爲國者不師善師者不陣善陣者不戰善戰者不死國語曰穆王將征犬戎􅀕公謀父諌曰不可先王耀徳不觀兵夫兵戢而時動動則威觀則玩玩則無震注曰玩黷震懼也家語曰哀公問曰寡人欲吾國小則能守大則能攻其道􅀂何孔子曰使君朝廷有禮上下和親}
