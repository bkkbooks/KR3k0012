  - {type: variant, offset: 2839, length: 4, content: 鄭蜀賓頗, SBCK: 兵者詭道故能而示之不能用而示之不用言已實能用師外示無法近而示之逺逺而示之近欲進而治去道􅀂韓信之襲安邑陳舟臨晉而度於夏陽是也故利而誘之亂而取之實而備之敵持實湏備之強而避之避其所長怒而撓之待其衰解卑而驕之引而勞之以利勞之規而離之佚而勞之以利勞之攻其無備出其不意擊其懈怠空虚也此兵之勝不可豫傳傳洩也又曰凢用兵之法全國爲上破國次之夫興兵深入長驅敵舉國來服爲上次兵擊破得之爲次全軍爲上破國次之軍四千人全卒爲上破卒次之上一千人下五百人全伍爲上破伍次之百人至五人也是故百戰百勝非}
