  - {type: variant, offset: 1559, length: 1, content: 李, SBCK: 兵家者蓋出古司馬之職王官之武備矣後世爍金爲刃割革爲甲器械甚備下及湯武受命次師克亂而濟百姓動之以仁義行之以禮讓司馬法是其遺事也自春秋出於戰國出竒設伏變詐之兵並作漢興張良韓信序次兵法凢一百八十二家刪取要用定著三十六家又刑法志曰自黄帝有涿鹿之戰以定火灾顓頊有共工之陣以定水災唐虞之際至治之極猶流共工放讙兠􅇡三苗殛鯀然後天下服夏有甘扈之誓殷周以兵定天下矣天下旣定戢藏干戈教以文德而猶立司馬之官設六軍之衆因井田而制軍賦焉天子畿方千里提封百萬井出軍賦六十四萬井戎馬四萬疋兵車萬乗故稱萬乗之主戎馬車徒干戈素具春振旅以蒐夏軷舎以苗秋治兵以獮冬大閱以狩皆以農􅂩以講武事焉連師比年簡車率正三年簡徒群牧五載大簡車徒此先王爲國立戰足兵之大略也又曰以仁義綏民者無敵於天下也至於齊桓晉文之兵可謂入其城而節制矣然猶未本仁義之大統也故魏秦之武銳不可以當桓文之節制桓文之節制不可以當湯武之仁義故曰善師者不陣善陣者不戰善戰者不敗善敗者不亡又曰夫文德者帝王之利器威武者文德之輔助也夫文之所加者深則武之所服者大德之所施者愽則威之所制者}
