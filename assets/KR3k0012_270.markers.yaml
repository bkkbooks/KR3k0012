  - {type: variant, offset: 250, length: 188, content: 董宣死乃知貧耳晉書曰何曾孫機為鄒平令性亦矜傲責鄉里謝鯤等拜或戒之曰禮敬年爵以德為主今鯤畏勢懼傷風俗機不以為慚羨為離狐令既驕且𠫤陵駕人物鄉閭疾之如讎永嘉之末何氏滅亡無遺焉梁書曰沈瑀為餘姚令富吏鮮衣美服以自彰別瑀怒曰汝等下縣吏何自擬貴人耶悉使著芒屩麤布侍立終日足有蹉跌輒加榜捶瑀微時嘗自至此鬻瓦器為富人所辱故因以報焉由是士庶駭怨縣丞史記曰詔捕淮南太子淮南相怒壽春丞留太子建不遣如淳, SBCK: 􅃖尤作兵宋襄}
