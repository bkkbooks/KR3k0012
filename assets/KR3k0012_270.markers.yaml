  - {type: variant, offset: 2806, length: 3, content: 方壯宜, SBCK: 獮諸侯振旅秋治兵所以不忘戰也又曰古者逐奔不過百歩縱綏不過三舎是以明其禮也不窮不能而哀憐傷痛是以明其仁也成列而鼓是以明其信也争義不争利是以明其義也又能捨服是以明其勇也知始知終是以明其智也六德以時合散以爲民紀者古之道也自古之政也仁義勇智信民之本隨時而施爲民綱紀古之所傳政道也又曰先王之治順天之道設地之冝官民之德而正名治物正者正官名也名正則可治之立國辨職立國治民分守境界各任其職也以爵分禄以爵位尊卑職其禄秩也諸侯恱懷海外來服服從巳也獄弭而兵寢聖德之治也又曰有虞氏不賞不罰而民可用至德也夏后賞而不罰至教也殷罰而不賞至威也周以賞罰德衰也賞不踰時戰相爲輕重重兵主持堅固守輕兵主追兵取利相爲用也又曰民有勇心唯敵之視士卒勇銳進退前後離合左右見勝利之形唯敵所在輙得其便也民有畏心唯北之視士卒恐懼各有嫌疑不求便利懷其北心當安隠教道開示勝形以服習之兩心交支兩利􅀂一兩軍相當兵相支持各求便利共事一勝之勢在兩軍間有道者得之也兩爲之職惟權之視謂知己知彼稱輕重量多少度進退知彼巳虚實之所在也又曰軍旅以舒爲主舒則人力足雖交兵致刃徒人不趍車不馳也逐奔不踰列是以不亂軍旅之固不失行列之政不絶人馬之力遟速無過誡命軍旅政爲堅固也進退疾徐從金鼓之聲也又曰軍庸不入國國庸不入軍軍庸入國則民德廢國庸入軍則民德弱軍國異庸彊弱殊任故不相入入則乱也故在國言文而語温在朝恭以遜脩巳以待人不召不至不問不言難進易退此申叙國庸之冝在軍抗而立在行遂而果介者不拜兵車不軾城上不趍危事不齒此申致軍庸之冝抗者不待問也意者有慮於事而爲不湏令遂必也果勝也介者不拜車不軾􅀐不下所以逺屈而乱行也上趍爲驚衆也故禮與法表裏也文與武左右也古者賢王明民之德盡民之善故無廢德無簡民賞無可生罰無可殺也民有一善處一事故能盡民之善無損徳民能堪其事故賞罰無所施又曰凢從奔勿息敵或止於路則慮之追敵奔北無休懈則敵於路旁設伏當視察反覆慮之自驚戒也凢近敵都必有進路退必有反慮深入敵地必知進退便利道徑通塞利害所在避實從虚也又曰凡戰先則弊後則懾兵先舉則勞後起則士心不定而恐懼選良次兵是謂益民之強選良者墿取勁勇有材者爲前當什伍相以接之死地及見勝則心專強之棄任}
