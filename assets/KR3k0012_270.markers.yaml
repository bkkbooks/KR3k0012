  - {type: variant, offset: 27, length: 196, content: 后外家王氏貴而侍中王林卿坐法免歸長陵上冢因留飲連日並恐其犯法乃自造門上謁謂林卿曰冢間單外君宜以時歸林卿曰諾林卿素驕慚於賓客林卿既去北渡涇橋令騎奴還至寺門拔劍剝其建鼓並自從吏兵追林卿行數十里林卿迫窘乃令奴冠被其䄡䄖自代乘從車騎身變服從間徑馳去會日暮追至收縛冠奴奴曰我非侍中奴耳並心知已失林卿乃曰君因自稱奴得脫死即叱吏斷頭持還縣所剝鼓置都亭下署曰故侍中王林卿東觀漢記曰董宣為洛陽令擊持豪強在縣五年, SBCK: 平御覽卷第二百}
