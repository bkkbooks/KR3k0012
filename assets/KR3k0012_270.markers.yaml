  - {type: variant, offset: 2856, length: 0, content: '', WYG: 氏言}
  - {type: variant, offset: 2857, length: 5, content: 尉親朋餞別, SBCK: 面示生路也􅀂敵􅌹陸地必空一面以示其虚欲使戰守不周也此用兵之法也又曰故善用兵譬如帥然帥然者常山之虵也擊其首則尾至擊其尾則首至擊其中則首尾俱至又曰踐墨循敵以决戰事行踐規矩無常者也是故始如處女敵人開户後如脫􅇠敵不及矩處女示弱􅇠往也吴子曰鼓鞞金鐸所以威耳旌麾旗章所以威目禁令刑罰所以威心三者不立雖有國必散於敵故曰心威於形不可不戰管子曰夫爲兵之數存乎聚財論工造軍器制器兵器選士政教軍中號令服習謂使習武藝徧知天下謂徧知其地形隘易主將二拙士卒勇怯明於機數此八者皆湏故兵未出境而無敵八者悉備然後能正天下又曰凢民之所以守戰而死而不德其上者或守或戰雖復至死不敢持之以德}
