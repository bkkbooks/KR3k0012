  - {type: variant, offset: 2839, length: 4, content: 鄭蜀賓頗, krp: 兵者詭道故能而示之不能用而示之不用言已實能用師外示無法近而示之逺逺而示之近欲進而治去道若韓信之襲安邑陳舟臨晉而度於夏陽是也故利而誘之亂而取之實而備之敵持實湏備之強而避之避其所長怒而撓之待其衰解卑而驕之引而勞之以利勞之規而離之佚而勞之以利勞之攻其無備出其不意擊其懈怠空虚也此兵之勝不可豫傳傳洩也又曰凢用兵之法全國爲上破國次之夫興兵深入長驅敵舉國來服爲上次兵擊破得之爲次全軍爲上破國次之軍四千人全卒爲上破卒次之上一千人下五百人全伍爲上破伍次之百人至五人也是故百戰百勝非}
  - {type: page-break, offset: 2843, content: '', id: KR3k0012_WYG_270-9a, image: WYG0895/WYG0895-0413c.png}
  - {type: variant, offset: 2844, length: 0, content: '', SBCK: 之善不戰而屈人之兵者善之善者也夫不戰而敵自屈服上兵伐謀敵始有謀伐之易也又曰故用兵之法十則圍之以十敵一則圍之是爲智等而兵利釣而客勁操所以倍兵圍下邳而生擒吕布也倍則分之以二敵一二則爲當一術爲竒敵則能戰已爲士衆等差者猶設竒伏以勝之也少則能逃髙壁壘勿與敵戰也不􅀂則能逃之引兵避之故小敵之堅大敵之擒也小不能當大也又曰凢治衆如治寡分數是也部曲爲分什伍爲數也􅋐衆如􅋐少形名是也旌旗曰形金鼓曰名三軍之衆可使必受敵而無敗者竒正是也先出合戰爲當後出爲竒也兵之所加如以瑕投夘者虚實是也以實擊虚也又曰故善動敵者形之敵必從之見羸形也與之敵必取之以利動之以卒待之以利害動敵也故善戰者求之於勢􅌹在權也不責於人故能擇人而任勢以勢者權變明也任勢者其戰人也如轉木石木石之性安則静危則動方則止貟則行任勢自然故善戰人之勢如轉貟石於萬仞之山者勢也又曰凢先據戰地而待敵者佚有餘力也後據戰地而趣戰者勞故善戰者致人而不致於人能使敵人自至者利之也誘之以利能使敵人不得至者害之也出兵所必趣攻兵所必救故敵佚能勞之以利煩之飽能飢之絶其粮道安能動之出其所必趍也使敵必救又曰兵形象水水之行避髙而就下兵之形避實而擊虚故水因地而制形兵因敵而制勝故兵無常勢水無常形能與敵變化而取勝者謂之神勢盛必衰形露必敗能因敵變化勝之􅀂神故}
  - {type: page-break, offset: 2844, content: '', id: KR3k0012_SBCK_270-6b}
  - {type: page-break, offset: 2844, content: '', id: KR3k0012_SBCK_270-7a}
  - {type: variant, offset: 2844, length: 0, content: '', WYG: 故無廢德無簡民賞無可生罰無可殺也民有一善處一事故能盡民之善無損德民能堪其事故賞罰無所施又曰凡從奔勿息敵或止於路則慮之追敵奔北無休解則敵於路旁設伏當視察反覆慮之自警戒也凡近敵都必有進路退必有反慮深入敵地必知進退便利道徑通塞利害所在避實從虛也又曰凡戰先則弊後則懾兵先舉則勞後起則士心不定而恐懼選良次兵是謂益民之强選良者擇取勁勇有才者爲前什伍相當以接之死地及見勝則心專强也棄任節食是謂開民之意自古之政也任者畜積器物焚儲蓄服御之具節餘食戰之日不餘食示必死戰也開塞生意以專民心此}
