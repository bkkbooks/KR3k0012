  - {type: variant, offset: 1953, length: 745, content: 後數月愛幸小黃門蹇石叔父夜行則殺之賊師歛迹莫敢犯者近習寵臣咸共疾之而不能傷蜀志曰劉備率其屬從校尉鄒靖討黃巾有功除安喜尉督郵以公事到縣先主求謁不通直入縛督郵杖二百解綬係其頸棄官亡命唐書曰顏師古隋仁壽中授安養尉尚書左僕射楊素見師古年弱皃嬴因謂曰安養劇縣何以克當師古曰割雞焉用牛刀素奇其對到官果以幹理聞又曰員半千晉州臨汾人上元初應八科舉授武陟尉屬頻歲旱飢勸縣令殷子良開倉以賑貧餒子良不從會子良赴州半千便發倉粟以給飢人懷州刺史郭齊宗大驚因而按之時黃門侍郎薛元超為河北道存撫使謂齊宗曰公之百姓不能救之而使惠歸一尉豈不愧也遽令釋之又曰王無競字仲烈其先琅耶人因官徙居東萊宋太尉弘之十一代孫無競有文學初應舉下筆成章舉及第解褐授趙州欒城縣尉又曰李勉為開封尉升平日久且汴水陸所湊邑居厖雜號難治勉與聯尉盧城軌等並有擒姦擿伏之名又曰柳公綽為渭南尉公綽性謹重動循禮法屬歲饑其家雖給而每飯不過一器歲稔復初又曰包佶授藍田尉時有詔命畿內諸縣城奉天時嚴郢為京兆政尚峻暴加以朝旨甚迫尹正之命急如風霆本曹尉韋重規其室方娠而疾畏郢之暴不敢以事故免佶因請代役無愆素當時義之又曰竇參強直果斷少以門蔭積官至萬年尉時同僚有直官曹者將夕聞親疾參請代之會獄囚亡走京兆尹按直部將奏參遽請曰彼以不及狀謁參實代之宜當罪坐貶江夏尉人多義之唐新語曰盧莊道年十六授長安尉太宗將錄囚徒京宰以莊道幼年懼不舉欲以他尉代之莊道不從但閑暇不之省也時繫囚四百餘人令丞深以為懼翌日太宗召囚莊道乃徐書狀以進引諸囚人莊道評其輕重留繫日月應對如神太宗驚歎又曰魏奉古為雍丘尉時姚珽蒞汴州群寮畢謁珽覽刺召奉古前持廄牧令示奉古奉古一覽便諷千餘言珽驚起曰仕宦且四十年未嘗見此又曰朱履霜好學明法理補山陰尉巡察使委以推按故人或遺以數兩黃連固辭不受曰不辭受此歸恐母妻詰問從何而得不知所以對, SBCK: ''}
