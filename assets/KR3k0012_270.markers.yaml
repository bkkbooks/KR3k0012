  - {type: variant, offset: 248, length: 1, content: 歎, SBCK: 世夲}
  - {type: variant, offset: 248, length: 410, content: 歎曰董宣死乃知貧耳晉書曰何曾孫機為鄒平令性亦矜傲責鄉里謝鯤等拜或戒之曰禮敬年爵以德為主今鯤畏勢懼傷風俗機不以為慚羨為離狐令既驕且𠫤陵駕人物鄉閭疾之如讎永嘉之末何氏滅亡無遺焉梁書曰沈瑀為餘姚令富吏鮮衣美服以自彰別瑀怒曰汝等下縣吏何自擬貴人耶悉使著芒屩麤布侍立終日足有蹉跌輒加榜捶瑀微時嘗自至此鬻瓦器為富人所辱故因以報焉由是士庶駭怨縣丞史記曰詔捕淮南太子淮南相怒壽春丞留太子建不遣如淳注曰丞主刑獄囚徒故責之漢書曰黃霸為潁川太守務在成就全安長吏許老丞病聾督郵白欲逐之霸曰許丞廉吏雖老尚能拜起送迎止頗重聽何傷且善助之母失賢者意如淳曰許縣丞也後漢書曰張玄宗君夏河陽人也少習春秋顏氏兼通數家法建武初舉明經補弘農文學遷陳倉縣丞清凈無欲專心經書方其講問乃不食終日及有難者輒為張數家之說令擇從所安諸儒皆伏其多通者錄千餘人玄初為縣丞嘗以職事對府不知官曹處吏白門下責之時扶風琅耶徐業亦大儒也聞玄諸生試引見之與語大驚曰今日相遭真解矇矣遭逢也遂請, WYG: 叙兵}
