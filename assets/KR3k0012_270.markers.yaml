  - {type: variant, offset: 2857, length: 5, content: 尉親朋餞別, WYG: 皷作氣再而衰三而竭也是故朝氣鋭晝氣惰暮氣歸故善用兵者避其鋭氣擊其惰歸此治氣者也以治待亂以靜待譁此治心者也以近待遠以佚待勞以飽待饑此治力者也無邀正正之旗無擊堂堂之陣此治變者也正正整齊堂堂大也又曰用兵之法高陵勿向倍丘勿逆丘阪勿迎佯北勿從鋭卒勿攻餌兵勿食歸師勿遏懷歸故能死戰不可擊也圍師必闕司馬法曰兵三面開其一面示生路也若敵戰陸地必空一面以示其虛欲使戰守不周也此用兵之法也又曰故善用兵譬如帥然帥然者常山之蛇也擊其首則尾至擊其尾則首至擊其中則首尾俱至又曰踐墨循敵以决戰事行踐規矩無常者也是故始如處女敵人開户後如脱兔敵不及拒處女示弱脫兔往疾也吳子曰皷鞞金鐸所以威耳旄麾旗章所以威目禁令刑罰所以威心三者不立雖有國必敗於敵故曰心威於形不可不嚴管子曰夫爲兵之數存乎聚財論工造軍器制器兵器選士政教軍中號令服習謂使習武藝徧知天下謂徧知其地形隘易上將工拙士卒勇怯明於機數此八者皆强故兵未岀境而無敵八者悉備然後能正天下又曰凡民之所以守戰而死而不德其上者或守或戰雖復至死不敢恃之以德}
