  - {type: variant, offset: 2849, length: 3, content: 達年老, WYG: 知之者勝不知不勝又曰兵者詭道故能而示之不能用而示之不用言已實能用師外示無法近而示之遠遠而示之近欲進而治去道若韓信襲安邑陳舟臨晋而度夏陽故利而誘之亂而取之實而備之敵將實湏備之强而避之避其所長怒而下之待其衰解卑而驕之佚而勞之以利勞之親而離之攻其無備岀其不意擊其懈怠空虛也此兵之勝不可豫傳傳洩也又曰凡用兵之法全國爲上破國次之夫興兵深入長驅敵舉國來服爲上以兵擊破得之爲次全軍爲上破軍次之軍四千人全卒爲上破卒次之上一千人下五百人全伍爲上破伍次之百人至五人也是故百戰百勝非善之善不戰而屈人之兵者善之善者也夫不戰而敵自屈服上兵伐謀敵始有謀伐之易也又曰故用兵之法十則圍之以十敵一則圍之是爲將智勇等而兵利鈍鈞也若主弱客勁不用十也操所以倍兵圍下邳而生擒吕布也倍則分之以二敵一則一術爲正一術爲奇術音遂敵則能戰已爲士衆等差者猶設竒伏以勝之也少則能迯高壁壘勿與敵戰也不若則能避之引兵避之故小敵之堅大敵之擒也小不能當大也又曰凡治衆如治寡分數是也部勒爲分什伍爲數也鬭衆如鬭少形名是也旌旗曰形金鼓曰名三軍之衆可使必受敵而無敗者竒正是也先岀合戰爲常後岀爲竒也兵之所加如以瑕投卵者虛實是也以實擊虛也又曰故善動敵者形之敵必從之見羸形也與之敵必取之以利動之以卒待之以利害動敵也故善戰者求之於勢專在權也不責於人故能擇人而任勢任勢者權變明也任勢者其戰人也如轉木石木石之性安則靜危則動}
