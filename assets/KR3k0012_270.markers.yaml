  - {type: variant, offset: 514, length: 931, content: 後漢書曰張玄宗君夏河陽人也少習春秋顏氏兼通數家法建武初舉明經補弘農文學遷陳倉縣丞清凈無欲專心經書方其講問乃不食終日及有難者輒為張數家之說令擇從所安諸儒皆伏其多通者錄千餘人玄初為縣丞嘗以職事對府不知官曹處吏白門下責之時扶風琅耶徐業亦大儒也聞玄諸生試引見之與語大驚曰今日相遭真解矇矣遭逢也遂請上堂難問極日吳志曰會稽妖賊許昌起於句章自稱陽明皇帝扇動諸縣眾以萬數孫堅以郡司馬募召精勇得千餘人與州郡合討破之刺史臧旻列上功狀詔書除堅鹽績丞數歲從盱眙丞又徙下邳丞又曰孫堅為下邳丞歷佐三縣所在有稱吏民親附鄉里知舊好爭少年往來者常數百人堅接撫待養有若子弟也唐書曰武德元年詔京令五品丞一人七品正六人八品畿令六品丞一人七品正四人八品上縣令六品丞一人八品正四人九品中下縣各有差後改為尉主簿後漢書曰繆肜音融字孺公仕縣為主簿時縣令彼章見考史皆畏懼自誣而肜獨證據掠考苦毒乃至體生虫蛆因轉換五獄踰涉四年令卒以自免又曰寧陽主簿詣闕訴其縣令之枉積六七歲不省乃復上書曰臣聞陛下為臣父臣為陛下子臣章百上終不見省臣豈可北詣單于以告冤乎帝大怒尚書劾以大逆虞詡駮之曰主簿所訟乃君父之怨百上不達乃有司之過又曰仇覽字季和一名香初為蒲亭長有陳元者母告其不孝覽為陳慈孝之道卒成孝子考城令王渙政尚嚴猛聞覽以德化人署為主簿謂覽曰主簿聞陳元之過而不罪得無少鷹鸇之志耶覽曰以為鷹鸇不若鸞鳳渙謝遣曰枳棘非鸞鳳所棲百里非大賢之路乃以月俸資遣令入太學其名大振唐書曰蘇弁為奉天主簿朱泚之亂德宗倉卒出幸縣令杜正元上府計事聞大駕至官吏惶恐皆欲奔竄山谷弁諭之曰君上避狄臣下當伏難死節昔肅宗幸靈武至新平安定二太守皆潛遁帝命斬之以徇諸君知其事乎眾心乃安及車駕至迎扈儲峙無闕德宗嘉之就加試大理司直汝南先賢傳曰李宣之子名表宋公令寇端召表為主簿表不樂為吏於寺門中焚燒衣幘端怒收表欲殺之陳仲舉聞之至宋公欲請表先過宣宣問何故來曰欲見寇令請足下兒宣曰吾子犯罪罪當死如有明君豈妄殺人宜從此還端追問仲舉仲舉具以語之端乃歎曰李宣烈士也即原之蘇林廣舊傳曰仇香字季和為書生性謙恭勤恪威矜莊皃不為晝夜易容言不為喜怒變聲雖同儕群居必正色後言終身無泄狎之交以是見憚學通三經然無知名之援鄉里之舉年四十召為縣主簿唐職員令曰主簿掌付事勾稽省署抄目糾正縣內非違監印給紙筆之事縣尉, SBCK: ''}
