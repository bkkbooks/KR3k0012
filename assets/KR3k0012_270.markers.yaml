  - {type: variant, offset: 2810, length: 0, content: '', SBCK: 食謂開民之意自古之政也任者畜積器物焚儲畜服御之具節餘粮戰之日不餘食示必死戰也開塞生意以專民心此五帝三王用兵之道也曹公孫子兵法序曰操聞上古弧矢之刋論語足食足兵易曰師貞傳云王赫斯怒黄帝湯武咸用干戈爲民也用武者滅用文者亡夫差偃王是也聖賢之於兵也戢而時動不得已而用之觀兵書戰䇿孫武深矣孫子者齊人也名武爲吴王闔閭作兵法一十三篇試之婦人卒以爲將西破強楚入郢北滅齊晉後百餘歳有孫臏是武之後也孫子曰兵者國之大事校}
