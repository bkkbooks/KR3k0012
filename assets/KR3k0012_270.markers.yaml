  - {type: variant, offset: 2845, length: 0, content: '', SBCK: 常無常勝四時無常位日有長短月有死生兵無常􅀔盈縮隨敵也又曰故不知諸侯之謀者不能豫交不知敵情謀者不能結交也不知山林險阻沮澤之形者則不能行軍髙而崇者爲山樹木所聚者爲林坑堆者爲險一高一下爲沮水草漸洳爲沮泉水所歸不流者爲澤也不用郷導者不能得地利故兵以詐立以利動以分合爲變者也兵一分一合此敵爲變故兵疾如風擊虚空也徐如林不見利也侵掠如火疾如火也不動如山守山難知如隂似天隂不見外􅀫也動如雷霆又曰夜戰多火鼓晝戰多旌旗所以變人之耳目也故三軍可奪氣將軍不可奪心左氏}
  - {type: variant, offset: 2845, length: 0, content: '', WYG: 帝三王用兵之道也曹公孫子兵法序曰操聞上古弧矢之利論語足食足兵易曰師貞詩云王赫斯怒黄帝湯武咸用干戈爲民也用武者滅用文者亡夫差偃王是也聖賢之於兵也戢而時動不得已而用之觀兵書戰䇿孫武深已孫子者齊人也名武爲吳王闔閭作兵法一十三篇試之婦人卒以爲將西破强楚入郢北威齊晉後百歲餘有孫臏是武之後也孫子曰兵者國之大事校之以計而索其情謂下五事彼我之情一曰道二曰天三曰地四曰將五曰法道者令民與上同意謂導以教令也故可與之死可與之生而人不畏危危疑也}
