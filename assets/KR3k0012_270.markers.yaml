  - {type: variant, offset: 3087, length: 184, content: 廣陵人嗜酒好色挑撻無度常自言己青骨死當為神當漢末為秣陵尉遂死及吳先主之初其故吏見子文於道乘白馬執白羽扇侍從如平生吏見驚走子文進馬追之謂曰我當為此土地之神以福爾下民爾可宣告百姓為我立祠不爾將有大咎荊州圖記曰灃陽縣西百三十里灃水之南岸有白石雙立狀類人形高各三十丈周廻等四十丈古之相傳昔有充縣左尉與零陵尉共論疆因相傷害化為此石即以為二縣界首東摽零陵西碣充縣充縣廢省今臨澧縣則, SBCK: ''}
