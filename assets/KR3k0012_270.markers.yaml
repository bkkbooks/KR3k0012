  - {type: variant, offset: 2809, length: 0, content: '', WYG: 官民之德而正名治物正者正官名也名正則官可治之立國辨職立國治民分守境界各任其職也以爵分禄以爵位尊卑賦其禄秩也諸侯悦懷海外來服服從已也獄弭而兵寢聖德之治也又曰有虞氏不賞不罰而民可用至德也夏后賞而不罰至教也殷罰而不賞至威也周以賞罰德衰也賞不踰時欲民速得爲善之利也罰不遷刻欲民覩不善之害也賞功不移晷罰惡不踰刻所以勸善懲惡欲疾速者也又曰夏后正其德也未用兵之刃故其兵不雜設軍不陣敵服故不用五兵殷義也始用兵之刃矣陣而不戰周力也盡用兵之刃矣周不及虞夏之教討暴征亂戰乃勝夏賞於朝貴善也以德化也殷戮於市威不善也以刑禁也周賞於朝戮於市勸君子懼小人也以賞進以罰禁三王章其德一也三王皆道德文武隨而施之其致一也又曰凡戰寛而觀其慮寛者先以單弱示不能以示敵變化慮其利害得失所在也進退以觀其固遣輕兵至敵所在視察進退固備虛危處所也危而觀其懼詐説危事以知敵恐怖得失之勢也靜而觀其怠敵靜而不動相視吏士知懈惰動而觀其疑輕兵挑戰相視敵人知其疑否也襲而觀其治欲襲敵先視其守備外内什伍器械虛實治亂所在也又曰凡戰以輕行輕危輕兵高林疾足能追奔逐北翼助進退當湏歩曲什伍爲卒}
