  - {type: variant, offset: 1850, length: 20, content: 所以省費燎火同巧拙而合習俗也三輔決錄同晉, WYG: 不盈数日輙致豐積謝承後漢}
  - {type: variant, offset: 1852, length: 5, content: 省費燎火同, SBCK: 并容也今􅀂擾之姧人安所容乎又曰楚王戊與呉通謀申公曰生二子諌不聽乃胥靡之應邵曰詩云􅀂此无罪淪胥以鋪靡刑名也晉灼曰胥相也亦靡隨衣之赭衣使杵臼雅春於市又曰尹翁歸河東平陽人暁習文法大將軍霍光秉政諸霍在平陽奴客持兵入市闘變吏不能禁及翁歸之爲市門吏莫敢犯者又曰何武兄弟五人皆爲郡吏縣敬憚之武弟顯家有市籍租常不入縣數負其課市嗇夫求商辱捕顯家顯怒欲以吏事中商武曰以吾家租賦繇役不衆爲先奉公吏不亦冝乎又曰刺繡文不如􅀝市門此言末業貧者之資也又曰司􅀠校尉解光􅁗王根縱横恣意大治宫室第中起土山立兩市殿上赤墀户下青􅃈又曰永平中王尊爲京兆尹拊循貧弱不私豪強長安􅀫豪大猾東市賈萬城西市萬章箭張禁酒趙放晉灼曰箭張禁酒趙放此二人作酒箭之家尊以正法按誅皆伏其辜又曰人君不理則畜賈游市乗民之不給百倍其本矣後漢書曰㓂恂爲頴川太守執金吾賈復在汝南部將殺人頴川部將謂軍部之下小將也恂捕得繫獄時尚草創軍犯營法率多相容恂乃戮之於市復以爲耻東觀漢記曰樊君重治家産業起治廬舎髙樓閣陂池灌注竹木成林六畜雜果檀漆桑麻門成市又曰江革客東海下邳傭賃以養父母下邳知其孝市買輙與好善者雖無錢任貰與之又曰光武以蔡遵爲市令上家人犯法遵格殺之東觀漢記曰閔仲叔客居安邑老病家貧不能買肉曰買一片猪肝屠或不肯爲斷也安邑令出勑市令遂買得仲叔恠問其子道狀乃歎曰閔仲叔豈以口腹累安邑􅁘遂去之沛又曰京兆尹閻興召第五倫署督鑄􅁺領長安市平銓衡正斗其後小民爭訟輒云第五􅁺平市無姦枉欺詐之}
