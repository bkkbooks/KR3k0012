  - {type: variant, offset: 2554, length: 341, content: 曰甘茂奔齊路逢蘇代將為齊使於秦甘茂曰臣得罪於秦逃遁至此遁潛也無所容跡容跡猶容足也吾聞貧人女與富人會績貧人女曰我無錢以買燭而子燭幸有光子可以分我餘光無損子明而得一斯便焉斯在也言貧女子此一便也今臣困而子方使秦而當路矣茂之妻子在秦願君以餘光振之振整也又贍給之義蘇代許諾列女傳曰齊女徐吾者東海上貧婦人也鄰婦李吾之屬合燭相從夜績徐吾曰我無以買燭而子之火光有餘分我餘光無損子明而我為斯便不亦可乎異苑曰昔有老姥雨夜紡績斷失𨨯所在姥獨罵云何物鬼擔去戶外即有應言蹔寄避雨實不偷𨨯自執覔姥驚懼窺外無所見𨨯亦尋獲王子年拾遺記曰魏文帝所愛美人薛靈芸常山人父業經為鄭鄉亭長母陳氏隨業舍於亭傍靈芸年十七生居貧賤至夜每聚鄰婦夜績以麻蒿自照漂說文曰漂水中擊絮也史記曰韓信從下鄉城下釣有漂母見信飢飯信竟漂數十日越絕書, WYG: ''}
