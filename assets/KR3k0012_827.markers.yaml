  - {type: variant, offset: 19, length: 3, content: 緯織橫, WYG: 建國者必面朝後市王立朝而后立市隂陽相成之義又地官下司市曰司市掌市之治教政刑量度禁令大市日昃而市百族為主市雜聚之處言主者謂其多者}
