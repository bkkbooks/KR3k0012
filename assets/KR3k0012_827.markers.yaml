  - {type: variant, offset: 3745, length: 1, content: 晏, SBCK: 三市大市名金市在大城中馬市在城東陽市在城南衛玠傳曰少時乗白羊於洛陽市舉市共觀咸曰誰家壁人於是家門州黨遂號曰璧人趙書曰豐國市五日一㑹三秦記曰􅁗始皇作地市與生死人交易令云生人不得欺死者物市吏告始皇云死者陵生人生人走入市門斬斷馬脊故俗云􅁗地市有斷馬山謙之丹陽記曰京師四市建康大市孫權所立建康東市同時立建康北市永安中立秣陵闘埸市隆安中發樂營人交易因成市也太}
