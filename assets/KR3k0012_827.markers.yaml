  - {type: variant, offset: 1858, length: 1, content: 拙, SBCK: 又曰更始在長安官爵多羣小里閭語曰使兒居市決作者不能得傭之市空返問何故曰今日􅀐都尉徃㑹日也猶是四方不復信向京師又曰王郎起上在薊郎移檄購上上令王霸至市中募人將以繫郎市人皆大􅀏舉手㨿揄之霸慙}
