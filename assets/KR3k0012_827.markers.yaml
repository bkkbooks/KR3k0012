  - {type: variant, offset: 1840, length: 1, content: 月, WYG: 片猪肝屠或不肯為斷也安邑令出𠡠市令遂買}
  - {type: variant, offset: 1842, length: 0, content: '', WYG: 仲叔恠問其子道状乃嘆曰閔仲叔豈以口腹累安邑耶遂去之沛又曰京兆尹閻㒷召第五倫署督鑄椽領長安市平銓衡正斗斛其後小民爭訟輒云第五椽平市無姦枉欺詐之巧又曰更始在長安官爵多羣小里閭語曰使兒居市决作者不能得傭之市空返問何故曰今日騎都尉注㑹日也由是}
  - {type: page-break, offset: 1842, content: '', id: KR3k0012_WYG_827-6b, image: WYG0900/WYG0900-0319b.png}
  - {type: variant, offset: 1843, length: 2, content: 十五, WYG: 方不復信向京師又曰王郎起上在薊即移檄購上上令王覇至市中募人将以撃郎市人皆大咲舉手揶揄之覇慙而去又曰竇融請孔奮置議曹椽守姑臧長天下擾亂惟河西獨安而姑臧稱為富邑通市故𦍑市}
