  - {type: variant, offset: 83, length: 1662, content: 跂彼織女終日七襄史記曰公儀休相魯去織婦拔園葵戰國策曰甘茂謂秦武王曰曾子處屈人有與曾子同名族者而殺人人告曾子之母母曰吾子不殺人也織自若有頃人又曰曾參殺人曾子母懼投杼踰墻魏略曰太祖始丁夫人又劉夫人生子循及清河長公主劉早終丁養子循子循亡於穰丁常言將我兒殺之都不復念遂哭泣無節太祖忿之遣歸家欲其意折後太祖就見之夫人方織外人傳公至夫人踞機如故公到撫其背曰顧我共載歸乎夫人不顧又不應太祖卻行立於戶外復云得無尚可耶遂不應太祖曰真決矣遂與絕魏志曰中山恭王袞徙封濮陽太和二年就國尚儉約勑妃妾紡績紝織習為家人之事吳志曰陸凱上䟽云自昔先帝時後宮列女及諸織絡數不滿百米有畜積貨財有餘先帝崩後幼景在位便改奢侈不蹈先跡伏聞織絡及諸徒坐乃有千數又曰華覈上䟽云今吏士之家少無子女多者三四少者一二通令戶有一女十萬家則十萬人人人織績一歲一束則十萬束矣使四疆之內同心勠力數年之間布帛必積恣民五色唯所服用但禁葉綺繡無益之飾此救乏之上務富國之本業也南史曰齊宣孝陳皇后家貧少勤織作家人矜其勞或止之后終不改唐書曰盧坦為壽安令時河南尹徵賦限窮而縣人許以機織未就坦請延十日府不許令人就織而輸勿顧限也違之不過罰令俸耳既成而輸坦亦坐罰由是知名墨子非樂曰使婦人為之廢紡績織維之事莊子曰民有常性織而衣耕而食是謂同德又曰叔文相莒三年歸其母自織請其母曰文相莒三年有馬千駟今猶自績文之所得事皆將棄之母曰婦人不好紡績織絍必有淫泆之心韓子曰吳起示其妻以組曰為我織組令如是組已就而效之其組異善起曰非詔也使衣而歸其父請往之起曰家無虛言又曰魯人身善織履妻善織縞而欲徙於越或謂之曰子必窮矣魯人曰何也曰履之也而越人舟行縞為冠之也而越人被髮以子之所長也游於不用之國欲使無窮其可得乎國語曰勾踐非其身之所種則不食非夫人之所織則不衣十年不收於國焦贛易林蒙之無妄曰織帛未成緯盡無名長子逐兔鹿起失路列女傳曰孟子之少也既學而歸孟母方織問曰學何所至矣子曰自若也言未能愽母以刀斷其織子懼而問其故母曰子之廢學若吾斷斯織也夫君子學以立名問則廣知是以居則安寧動則遠害今而廢之則是不免於廝役而無以離於患禍何以異於織績而中道廢而不為豈能衣其夫子而長不乏糧食哉孟子懼旦夕勤學不息又曰文伯相魯敬姜謂之曰吾語汝治國之要盡在經耳經者總絲縷以成文采有經國治民之象夫幅者所以正枉也不可不強故幅可以為將枉曲也幅強乃能正曲將強乃能除亂以幅喻將也晝者所以均不服也故晝可以為正晝傍也正官長也緦縷得晝以喻徒庶得長而後齊物者所以治蕪與莫莫也故物可以為都大夫物謂一文墨也不知丈尺多少使意世與蕪而莫莫也都大夫主治民理眾也持交而不失出入不絕者悃也以為大行人悃使縷交錯出入不失理也似大行人交好鄰國不離也大行人主使命者推而往引而來者綜也綜可以為關內之師綜惟縷令往引之令來似關內師收合人眾使令有節關內師主境內之師眾主多少之數者均也均可為內史均謂一齒受一縷多少有數猶內史之治民也服重任行遠道正直而固者軸也可以為相相當大任堅固不倦死而後已有若軸舒而無窮者摘摘者可以為三公摘謂勝也舒而不窮喻三公道德潔備無匱竭也文伯載拜受教孝子傳曰董永性至孝而家貧父死賣身以備棺斂既葬即詣主人將償其直路逢一女子云能織願為永妻永不得已與同詣主人問其故永具以對主人曰必爾者但令爾婦為我織縑百疋於是妻為主人織十日百疋具焉主人大驚即遣永夫妻妻出門謂永曰我天之織女也卿篤孝賣身葬父故天使我為卿償債耳言終忽然不見仇池記曰仇池縣庫下悉安織婢綾羅絹布數十張機崔元始正論曰僕前為五原太守土地不知緝績冬至積草伏臥其中若見吏以草纏身令人酸鼻吾乃賣儲峙得二十餘萬詣鴈門廣武迎織師使巧手作機及紡以教民織具以上聞古艷歌曰孔雀東飛苦寒無衣為君作妻中心惻悲夜夜織作不得下機三日載疋尚言吾遲古歌辭曰大婦織綺羅中婦織流黃小婦無所為挾琴上高堂大人且徐徐調絃遽未央古詩曰迢迢牽牛星皎皎河漢女纖纖擢素手扎扎弄機杼被徒元書曰宜脩田農作園圃織絍紡績為坐作之本利常令供養之物有兼副紡績左傳昭公五曰初莒有婦人莒子殺其夫以為嫠婦寡婦為嫠及老託於紀鄣紡焉以度而去之因紡纑連所紡以度城而藏之以待外攻者欲以報仇及師至則投諸外投城繩外隨之而外毛詩國風, SBCK: ''}
