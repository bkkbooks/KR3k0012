  - {type: variant, offset: 14, length: 0, content: '', SBCK: 周禮天官下内宰曰凡建國佐后立市設其次置其叙正其肆陳其貨賄岀其度量淳制􅀕之以隂禮市朝者君所以建國也建國者必面朝後市王立朝而后立市隂陽相承之義又地官下司市曰司市掌市之治教政刑量度禁令量豆區斗斛之屬度丈尺也大市日側而市百族爲主朝市朝時而市啇賈爲主夕市夕時而市販夫販婦爲主市雜聚之處言主者謂其多國君過市則刑人赦夫人過市罰一幕丗子過市罰一帟命夫過市罰一盖命婦過市罰一帷又曰司虣掌憲市之禁令禁其闘􅅝者與其虣亂者出入相陵犯者以屬遊飲食于市者􅅝讙也鄭司農云以屬遊飲食羣飲食者􅀂不可禁則搏而戮之又秋官掌戮曰凡殺人者踣諸市肆之三日刑盗于市踣僵尸也肆猶申也陳也凡言刑盗罪惡莫大焉周禮冬官匠人曰左祖右社靣朝後市王宫所居也祖宗廟靣猶郷也王宫當中}
  - {type: page-break, offset: 14, content: '', id: KR3k0012_SBCK_827-1b}
  - {type: variant, offset: 14, length: 4, content: 經織從絲, WYG: 周禮天官下内宰曰凡建國佐后立市設其次置其叙正其肆陳其貨賄出其度量淳制祭之以隂禮市朝者君所以建國}
