  - {type: variant, offset: 3738, length: 0, content: '', SBCK: 曰市井俗􅀃市井者言至市有所鬻賣當於井上洗濯令其物香㓗然後到市又曰陳留太守泰山呉文章少􅀌遭憂衰之丗與兄伯武相失別二十年後㑹下邳市爭計共闘伯武歐文章欲報擊之心中惻愴手不能舉大自怪也因投杖於地觀者咸嗤􅀏之還相問乃眞兄弟也列仙傳曰隂生者長安中渭橋下乞兒也常止於市中乞市中厭􅀂以糞灑長吏試之収繫著桎梏而續在市中乞又欲殺之乃去灑者家室自壞殺十餘人長安中謡曰見乞兒與美酒可以免破家之咎神仙傳曰李阿者蜀人也傳丗見之不老如故常乞於成都市所得隨以與貧者夜去朝還市人莫知其􅀫處漢名臣奏曰太尉屬應劭司徒屬孫嵩司空􅁺孔伷議以鮮卑隔在漠北犬羊爲羣無君長之師廬落之居又其天性貪而無信故自漢興至于兹數犯障塞吏民創楚不與交􅀜唯至朝市反成靡服非畏威懷徳實玩中國珎異之故耳三輔黄圖曰元始四年起明堂辟雍長安城南北爲㑹市但列槐樹數百行爲隊無牆屋又爲方市闠門周環列肆啇賈居之都商亭在其外漢宫殿䟽曰交門市在渭橋北頭也李里市在雍門}
