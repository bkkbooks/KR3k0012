  - {type: variant, offset: 2094, length: 187, content: 容女移父母遠住紵舍晝採樵夜紡績以供養父母陳書曰陳靈洗為公侯數妾無游手普督之紡績至於散用貲財亦不儉恡隋書曰孝婦覃氏者上郡鍾氏婦也與其夫相見未幾而夫死時年十八事後姑以孝聞數年之間姑及伯叔皆相繼而死覃氏躬自節儉晝夜紡績畜財十年而葬喪為州里所敬上聞而賜米百石表其門閭又曰鄭善果母清河崔氏既寡之後恒自紡績每夜分寐善果曰兒封侯開國位居三品秩俸幸足母何自勤如是耶荅曰嗚呼汝年已長成吾謂汝知, SBCK: 征則}
