  - {type: variant, offset: 1834, length: 5, content: 從夜織婦女, WYG: 容恂乃戮之於市復以為耻東觀漢記曰樊君治家産業起治廬舍髙楼閣陂池灌注竹木成林六畜雜菓檀漆桑麻門成市又曰江革客東海下邳傭賃以飬父母下邳知其孝市買輒與好善者雖無錢任貫與之又曰光武以祭遵為市令家人犯法遵格殺之東觀漢記曰閔仲叔客居安邑老病家貧不能買肉日買}
