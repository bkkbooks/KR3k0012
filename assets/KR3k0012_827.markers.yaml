  - {type: variant, offset: 1988, length: 2, content: 武丁, WYG: 習為并州刺史鮮卑大人育延常為州所畏一旦将其部落五千餘騎詣習求互市習不聼則恐其怨若聼到州下又恐為所畧於是方許往與㑹空城中交市遂𠡠郡縣自将治中以下軍往就之市易未畢市吏縳一鮮卑延騎皆驚上馬彎弓圍習数重吏民惶怖不知所施習乃徐呼市吏問縳何意曰彼實侵民習乃使譯呼延延到習責言曰汝騎自犯法吏不侵汝汝何為使諸騎驚駭耶遂斬之餘俱破膽不敢動吴志曰孫皓愛妾或使人至市劫奪百姓財物司市中郎將陳素聲皓幸臣也時皓寵遇䋲之以法妾以愬皓皓大怒假他事焼斷聲頭投其身於四望之下晋書曰羊祜都督荆州卒而州人聞祜卒皆號慟罷市宋書申坦坐法當棄市羣臣為請莫得将行刑沈興公沈慶之入市抱坦慟哭曰卿無罪朝廷所枉誅我入市亦當不乆市以白上乃原生命撃上方尋改宥蕭子顯齊書曰帝於芳樂苑中立市大官每旦進酒肉雜肴使宫人屠酤}
