  - {type: variant, offset: 1803, length: 15, content: 張安世尊為公侯食邑萬戶身衣戈綈, krp: 曹參相齊使者召參去屬其後相曰以齊獄市爲寄愼勿擾也後相曰治無大於此者乎參曰}
  - {type: variant, offset: 1805, length: 1, content: 世, WYG: 所容乎又曰楚王戊與吴通謀申公白公二子諫不聼乃胥靡之衣之赭衣使杵臼椎舂於市又曰尹翁歸河東平陽人曉習文法大将軍霍光秉政諸霍在平陽奴客入市閗變吏不能禁及翁歸之為市吏莫敢犯者又曰何武兄弟五人皆為郡吏郡縣敬憚之武弟顯家有市籍租常不入縣數負其賦市嗇夫求商辱捕顯家顯怒欲以吏事中商武曰以吾家租賦繇役不為衆先奉公吏不亦宜乎史記刺繡文不如倚市門此言末業貧者之資也又曰司𨽻校尉解光奏王根縱横恣意大治宫室第中起土山立両市殿上赤墀户青𤨏又曰永平中王}
