  - {type: variant, offset: 1774, length: 8, content: 八月載績載玄載黃, SBCK: 定之方中衛文公徙居楚丘始建城市而營宫室論語比考䜟曰從善繹繹繦負如歸市爵不失德故耻無道主徙歸茂德之君繹繹相尋及之兒古史考曰神農作市髙陽氏衰市官不脩祝融脩市戰國䇿曰王孫假年十五事閔王王出走失王之處其母曰汝事王王岀走汝不知其處汝尚何歸王孫假乃入市中曰淖齒亂齊殺閔王欲與}
