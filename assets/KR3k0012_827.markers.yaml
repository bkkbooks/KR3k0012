  - {type: variant, offset: 1862, length: 1, content: 俗, SBCK: 爲并州刺史鮮卑大人育延常爲州所畏一旦將其部落五十餘􅀐詣習求互市習念不聽則恐其怨􅀂聽到州下又恐爲所略於是乃許徃與㑹空城中交市遂勑郡縣自將治中巳下軍徃就之市易未畢而市吏収縳一胡延􅀐皆驚上馬彎弓圍習數重吏民惶怖不知所施習乃徐呼市吏問縛胡意而胡實侵民習乃使譯呼延延到習責延曰汝胡自犯法吏不侵汝汝何爲使諸􅀐驚駭􅁘遂斬之餘胡破膽不敢動呉志曰孫皓愛妾或使人至市賤奪百姓財物司市中郎將陳聲素皓幸臣}
