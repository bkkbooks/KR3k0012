  - {type: variant, offset: 3523, length: 212, content: 侍臣衣滯卷摺帝怒曰卿衣帶如繩欲何所縛又曰昭明太子統欲以己率物服御朴素身衣浣衣膳不兼肉南史曰陳王逡之衣裳不澣几案塵黑唐書曰肅宗性儉約衣服無綺繡嘗出衣袖示韓擇木曰朕已三浣矣淮南子曰楚莊王誅里史孫叔敖制冠澣衣仲長子昌言曰攻玉以石澣布以灰龍魚河圖曰婦人無以夫衣合集澣之使之不利韓詩外傳曰孔子南遊適楚至阿谷隧有處子佩璜而澣者孔子抽觴以受子責曰以觀其辭子貢曰將南之楚逢天之暑欲乞一飲婦人曰阿谷之隧隱曲之汜其水載清流而趣海欲飲則飲何問婢子, SBCK: 羞}
