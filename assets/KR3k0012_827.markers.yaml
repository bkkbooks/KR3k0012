  - {type: variant, offset: 1860, length: 0, content: '', SBCK: 去又曰竇融請孔􅁬置議曹􅁺守姑臧長天下擾亂唯西河獨安而姑臧稱爲冨邑通貨胡羗市曰四}
  - {type: variant, offset: 1860, length: 0, content: '', krp: 去又曰竇融請孔奮置議曹掾守姑臧長天下擾亂唯西河獨安而姑臧稱爲冨邑通貨胡羗市曰四}
  - {type: variant, offset: 1861, length: 0, content: '', SBCK: 每居縣者不盈數日輙致豐積謝承後漢書曰王充家貧無書常遊洛陽市肆閱所賣書一見輙能誦憶遂􅀶通衆經又曰張楷字公超隱居弘農山中學者隨之所居成市後華隂山南遂有公超市典略曰荆軻者其先齊人也與燕之狗屠及髙漸離爲友軻􅄝酒日與狗屠飲於燕市漸離擊筑荆軻和之而歌相泣魏略曰趙岐逃難江淮海岱靡所不歴自匿姓名賣餅北海市中安丘孫嵩年二十遊市見岐察非常人乃停車問曰賣餅幾荅曰賣餅三十嵩曰視子非賣者當有怨者乃載岐歸家魏志曰遼東送􅀽尚首懸在馬市牽招覩之悲感又曰襄邑劉氏與睢陽李永爲讎典韋爲報之永故富春長備衛甚謹韋乗車載雞酒僞爲候者門開懷匕首入殺永并殺其妻徐出取車上刀㦸步去永居近市一市盡駭追者數百莫敢近又曰􅀽紹以董昭領魏郡時郡界大亂賊以萬數遣使徃來交易市買昭厚待之因以爲間乗虚掩討輒大克破之又曰顔斐爲京兆太守青龍中司馬宣王在長安立軍市而軍中吏士多侵侮縣民斐以白宣王宣王乃發怒召軍市候便於斐前杖一百時長安典農與斐共坐以爲斐冝謝乃私推築斐斐不肯謝良乆乃曰斐意觀明公受分陜之任乃欲一齊衆庶必非爲不得明公意也宣王遂嚴將吏士自是之後軍營郡縣各得其分又曰梁}
