  - {type: variant, offset: 3738, length: 0, content: '', WYG: 曰市井俗説市井者言至市有所鬻賣當於井上洗濯令其物香潔然后到市又曰陳留太守泰山吴文章少孤遭憂衰之世與兄伯武相失别二十年后㑹下邳市争計共鬬伯武毆文章欲報撃之心中惻愴手不能舉大自怵也因投杖於地觀者咸唾笑之還相問乃真兄弟也列仙𫝊曰隂生者長安中渭橋下乞兒也常止於市中乞市中厭苦以糞洒之長吏知之收繫着桎梏而續在市中乞又欲殺之乃去洒者家室自壊殺十餘人長安中謡曰見乞兒與美酒以免破家之咎神仙𫝊曰李何者蜀人也世𫝊見之不老如故常乞於成都市所得隨以與貧者夜去朝還市人不知其宿䖏漢名臣奏曰太尉属應劭司徒属孫嵩司空掾孔伷議以鮮卑隔在漠北犬羊為羣無君長帥廬落人居又其天性貪而無信故自漢興至兹数犯障塞吏民創禁不與交闗惟至互市乃來靡服非畏威懷德實欲中國珍異之貨耳三輔皇圖曰元始四年起明堂辟雍長安城南北為㑹市但列槐樹數百行無墻屋又無坊市闤門環列商賈居之都門亭在其外漢宫殿疏曰門市在渭橋北頭也季兒市}
