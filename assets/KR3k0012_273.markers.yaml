  - {type: punctuation, offset: 6, content: 《, id: KR3k0012_CHANT_273-bkkpn1}
  - {type: variant, offset: 6, length: 4, content: 開元文字, SBCK: 不知天道下不知地利專用人與勢雖未能萬全勝鈐必多矣下將之用兵也愽聞而自亂多知而自疑居則恐懼發則猶豫是以動爲人禽矣今使兩人接刃巧拙不異而勇士必勝者何也其行之誠也又曰鼓不與於五音而爲五音主水不與於五味而爲五味調將軍不與五官之事而爲五官督故能調五音者不與五音也能調五味者不與五味者也是故將軍之心滔滔如春曠曠如夏湫漻如秋典凝如冬典常凝正也常正於冬也因刑而與之化隨時而與之移夫景不爲曲物直響不爲清音濁觀彼之所以來各以其勝應之是故扶義而動推理而行掩節斷割掩覆也覆其節制断割之也因資而成功使彼知吾所岀而不知吾所入知吾所舉而不知吾所集始如狐狸彼故輕來合如兕虎敵故奔走也又}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_SBCK_273-2a}
  - {type: variant, offset: 6, length: 4, content: 開元文字, WYG: 不知天道下不知地利專用人與勢雖未能萬全勝敵必多矣下將之用兵也專鬭而自亂知多而自疑居則恐懼發則猶豫是以動爲人擒矣今使兩人接刅巧拙不異而勇士必勝者何也其行之誡也又曰鼓不與於五音而爲五音主水不與於五味而爲五味調將軍不與五官之事而爲五官督故能調五音者不與五音也能調五味者不與五味也是故將軍之心滔滔如春曠曠如夏湫漻如秋典凝如冬典常凝正也常正于冬也因形而與之化随時而與之移夫景不爲曲物直響不為清音濁觀彼之所以來各以其勝應之是故扶義而動推理而行掩截㫁割掩覆也覆其莭制㫁割之也因資而成功使彼知吾所出而不知吾所入知吾所舉而不知吾所集始如狐狸彼故輕來合如虎兕敵故奔走也又}
