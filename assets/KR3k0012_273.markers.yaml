  - {type: variant, offset: 2650, length: 191, content: 得功後戰必選為前當以激致其銳氣也若使不勝使過在己戰有失利當為吏士引其過咎今無慚愧使復可使又曰上同無獲將智與眾同等不能自用又不能用人隨眾取同故無功也上專不死將無明智恥求賢問智自專事為眾所弊故戰多死也上生多疑將無義心茍求全免害避難則士多疑者也上死不勝將無善略茍以死當敵故不勝也凡民死愛死怒死威死義死利視下如子則民生愛志意激揚則民怨怒使民以禮征伐以義則民死威賞賜分明則民死義賞爵重則民死利, SBCK: 爲動}
