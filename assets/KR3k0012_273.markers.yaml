  - {type: variant, offset: 2198, length: 316, content: 無不感泣潞公薛萬均萬徹兄也國初立大功故太宗思之又曰賈言忠乾封中為侍御史時朝廷有事遼東言忠奉使往支軍糧及還高宗問以軍事言忠畫其山川地勢具陳遼東可平之狀高宗大悅又問諸將優劣言忠曰李勣先朝舊臣聖鑒所悉龐同善雖非而持軍嚴整薛仁貴勇冠三軍名可振敵高侃儉素自處忠果有謀契苾何力沉毅持重有統御之才然頗有忌前之癖諸將夙夜小心忘身憂國莫逮於李勣者高宗深然之又曰裴度使蔡州行營宣諭諸軍既還帝問諸將之才度曰臣觀李光顏見義能勇終有所成不數日光顏奏大破賊軍於時曲帝尤歎度之知人又曰朱滔効順代宗臨軒勞問既而曰卿自謂才孰與泚多滔曰各有長短統御士眾方略明辯臣不及泚臣年二十八獲謁龍顏泚長臣五歲未朝鳳闕泚不及臣代宗愈喜古司馬兵法曰上貴不伐之士上之器也茍不伐則無求無求, SBCK: ''}
