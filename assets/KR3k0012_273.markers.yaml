  - {type: variant, offset: 265, length: 255, content: 中軍郄溱佐之使狐偃將上軍讓于狐毛而佐之毛狐偃之兄命趙衰為卿讓於欒枝先軫欒枝貞子也欒賓之孫使欒枝將下軍先軫佐之荀林父御戎魏犨為右荀林父中行桓子公羊傳曰君將使射姑將陽處父諫曰射姑民眾不說不可使將於是廢將戰國策曰秦與趙兵相距長平趙孝成王使趙奢之子將蘭相如曰王以名使括若膠柱而鼓瑟耳此子徒能讀其父奢書傳而不知合變也趙王不聽奢子括少時學兵法言兵事以天下莫能當嘗與其父言兵事奢不能難然不謂之善其母問其故奢曰兵死地也而乃易言之趙若以為將破軍者必是兒及是其母上書具言不可曰始妾事其父時為將大王及宗室所賞者盡以與軍吏士大夫受命之, SBCK: 冬}
