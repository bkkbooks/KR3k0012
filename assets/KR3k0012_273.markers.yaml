  - {type: variant, offset: 2194, length: 52, content: 前侍坐者無不感泣潞公薛萬均萬徹兄也國初立大功故太宗思之又曰賈言忠乾封中為侍御史時朝廷有事遼東言忠奉使往支, WYG: 治}
