  - {type: variant, offset: 3067, length: 355, content: 知彼知己百戰不殆不知彼而知己一勝一負不知彼不知己每戰必殆又曰凡用兵之法將受命於君合軍聚眾汜地無舍無所依也衢地交舍結諸侯也絕地無留無久止也圍地無謀發奇兵也死地則戰塗有所不由阨難之地所不當從也不得也軍有所不擊軍難可擊以地險難不留之失前利若得之又利薄城有所不攻城小固糧饒不可攻也地有所不爭皆與上同操所以置華費而深入徐州拔十四縣君命有所不受茍便於事不茍於君命也故將通於九變之利者則知用兵矣九事之變將不通於九變之利雖知地形不能得地之利矣又曰治人不知五變雖知五利不能得人用之矣下五事也是故智者之慮必雜於害在利思害在害思利雜於利而務可信計敵不能依五地為我害信務為可信也雜於害而患可解并計於害雖有患可解也害中雜利陷之死地而後生也趣之以利令自來也故用兵之法無恃其不來恃吾有以待之安不忘危常備之也無恃其不攻吾也恃吾不可攻故將有五危, SBCK: ''}
