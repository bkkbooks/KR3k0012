  - {type: 'tls:seg', offset: 3, content: '', id: KR3k0012_CHANT_273-1a.2}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 吕氏春秋曰管子言於桓公曰墾田大邑辟􅁟生粟盡地之利臣不􅀂寗邀邀乃戚也請置以爲大田登降辭讓進退閑習臣不􅀂隰朋請置以爲大行蚤入晏出犯顔進諌以忠不避死亡不重貴冨臣不􅀂東郭牙請置以爲大諌平原廣城車不結轍士不旋踵鼓之而三軍之士視死如歸臣不􅀂王子城父請置以爲大司馬决獄折中不殺不辜不誣無罪臣不􅀂􅁌章章賔胥無請置以爲大理君􅀂欲理國彊兵則五子者足矣君􅀂欲霸王則夷吾在此桓公善令五子皆任其事以受於管子十年九合諸侯一匡天下管子人臣也用不能長之而盡以五子之能又况於人主乎淮南子曰中將}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_273-1b}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 下將帥下吕氏春秋曰管子言於桓公曰墾田大邑辟土生粟盡地之利臣不若寗邀邀乃戚也請置以爲大田登降辭讓進退嫻習臣不若隰朋請置以爲大行蚤入晏出犯顔進諫不避死亡不重富貴臣不若東郭牙請置以爲大諫平原廣城車不結轍士不旋踵皷之而三軍之士視死如歸臣不若王子城父請置以爲大司馬决獄折中不殺不辜不誣無罪臣不若弦章章賔須無請置以爲大理君若欲理國强兵則五子者足矣君若欲覇王則夷吾在此桓公曰善令五子皆任其事以受於管子十年九合諸侯一匡天下管子人臣也用不能長之而盡以五子之能又况於人主乎淮南子曰中將}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_273-1b, image: WYG0895/WYG0895-0431b.png}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_273-2a, image: WYG0895/WYG0895-0431c.png}
  - {type: variant, offset: 5, length: 0, content: '', krp: 吕氏春秋曰管子言於桓公曰墾田大邑辟土生粟盡地之利臣不若寗邀邀乃戚也請置以爲大田登降辭讓進退閑習臣不若隰朋請置以爲大行蚤入晏出犯顔進諌以忠不避死亡不重貴冨臣不若東郭牙請置以爲大諌平原廣城車不結轍士不旋踵鼓之而三軍之士視死如歸臣不若王子城父請置以爲大司馬决獄折中不殺不辜不誣無罪臣不若弦章章賔胥無請置以爲大理君若欲理國彊兵則五子者足矣君若欲霸王則夷吾在此桓公善令五子皆任其事以受於管子十年九合諸侯一匡天下管子人臣也用不能長之而盡以五子之能又况於人主乎淮南子曰中將}
