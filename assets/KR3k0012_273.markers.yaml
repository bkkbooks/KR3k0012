  - {type: variant, offset: 14, length: 3, content: 春秋元, SBCK: 剛而不可折也仁而不可犯也信而不可欺也勇而不可枝也所謂一守者神清而不可濁也謀逺而不可慕也操固而不可遷也知明而不可蔽也不貪於貨不􅁋於物不嚂於辯不推於名不可喜也不可怒也是謂至於窈窈􅁳􅁳孰知其情發必中證言必合數動必順時解必中揍揍理通動静之機明開塞之節審舉錯之利害􅀂合符節疾如彍弩勢如發矢一龍一虵動無常體莫見其所中莫知其所窮攻則不可守守則不可攻也抱朴子曰良將去如收電可見不可追留如丘山可瞻不可動又曰大將民之司}
  - {type: page-break, offset: 14, content: '', id: KR3k0012_SBCK_273-2b}
  - {type: variant, offset: 14, length: 3, content: 春秋元, WYG: 剛而不可折也仁而不可犯也信而不可欺也勇而不可凌也所謂十守者神清而不濁也謀遠而不可測也操固而不可遷也明知而不可蔽也不貪於貨不滛於色不藉於辨不矜於明不可喜也不可怒也是謂至平窈窈㝠㝠孰知其情發必中證言必合數動必順時觧必中輳輳理也通動静之機明開塞之莭審舉錯之利害若合符莭疾如彍弩勢如發矢一龍一蛇動無常體莫見其所中莫知其所窮攻則不可守守則不可攻也抱朴子曰良將去如收電可見不可追留如丘山可瞻不可動又曰大將民之司}
