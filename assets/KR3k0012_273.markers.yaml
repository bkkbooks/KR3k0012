  - {type: variant, offset: 3690, length: 220, content: 怒而興軍將不可以慍而合戰合於利而用不合於利而止不得以喜怒而用兵怒不可復喜慍不可復悅亡國不可復存死者不可復生故曰明主慮之良將警之此安國之道也吳子曰人有三不和不和於國不可以出軍不和於軍不可以出陣不和於陣不可以進戰又云將之所慎者五一曰理二曰備三曰果四曰戒五曰約戒者雖剋如始戰孔叢子曰子思居衛言荀變於衛君曰其才可將五百乘君任軍旅率得此人則無敵於天下矣衛君曰吾知其才可將變也嘗為吏賦於民而食人三雞子以故弗用也子思曰夫聖人官人猶大匠之用木也取長棄短故材, SBCK: ''}
