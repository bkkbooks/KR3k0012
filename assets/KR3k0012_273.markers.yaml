  - {type: variant, offset: 1269, length: 145, content: 兵司馬穰苴弗能過也於是魏文侯以為將擊秦拔五城又王翦傳曰或曰王離秦之名將也今將彊秦之兵攻新造之趙舉之必矣客曰不然夫將三世者必敗何以其殺伐多矣其後受其不祥又淮陰侯傳曰韓信曰陛下非能將兵而善將將此迺信之所以為陛下禽也漢書韓信傳曰漢王使酈生往說魏王豹不聽乃以信為左丞相擊魏信問酈生魏得毋用周叔為大將, SBCK: 况無勇}
