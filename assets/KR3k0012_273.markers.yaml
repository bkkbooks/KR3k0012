  - {type: variant, offset: 3655, length: 0, content: '', SBCK: 略也何晏韓白論曰此兩將者殆􅃖尤之敵蓋開闢所希有也何者爲勝也或曰白起功多前史以爲出竒無窮欲闚滄海白起爲勝􅀂夫韓信断幡以覆軍拔旗以流血其以取勝非復人力也亦可謂竒之又竒者哉白起之破趙軍詐奔而断其粮道取勝之比皆此􅀋也所謂可竒於不竒之間矣安得比其竒之又竒者哉班叔皮王命論曰是時陵爲漢將而母獲於楚任彦昇奏彈曹景宗曰賞茂通侯榮髙列將潘安仁西征賦曰蕭曹魏丙之相辛李衛霍之將衘使則􅂫屬國震逺則張愽望屬國􅂫武愽望張騫范曄二十八將傳論曰中興二十八將前世以爲上應二十八􅀫未之詳也然咸能感㑹風雲􅁬其知勇議者多非光武不以功臣任職}
