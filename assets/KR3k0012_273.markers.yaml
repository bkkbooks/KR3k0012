  - {type: variant, offset: 2848, length: 1, content: 仁, SBCK: 又曰三軍之衆百萬之師張設輕重在於一人謂之氣機道峽路險名山大塞十人所守千人不過是謂地機善行間諜分散其衆使君臣相怨是謂事機車堅舟利士馬閑習是謂力機此所謂四機者也又曰夫將可樂而不可憂謀可深而不可疑將憂則内疑將有憂色則内外相疑不相信也謀疑則敵國􅁬多疑則計亂亂則令敵國􅁬也以此征伐則可致亂故將能清浄應財曰清不􅅰曰静能平能整能受諌能聽訟能納人受賢於羣英之中􅀂吴納范蠡齊納寗戚之􅀋也能採善言能知國俗能圗山川能裁阨難險難阨皆悉明也能制軍權危者安之懼者懽之叛者還之將有不合去者慰諭還之􅀂蕭何追韓信􅁈者原之訴者察之卑者貴之士卒􅀂卑賤者貴之昔吴起不與士卒同衣食是也彊者抑之敵者殘之卑中有賤而敵貴者乱上下之礼殘殺之貪者豊之懸賞以豊其心所以使貪欲者使之臨敵將戰有欲立功名有欲利敵人者皆許而使之所謂使}
  - {type: page-break, offset: 2848, content: '', id: KR3k0012_SBCK_273-5a}
  - {type: variant, offset: 2848, length: 1, content: 仁, krp: 又曰三軍之衆百萬之師張設輕重在於一人謂之氣機道峽路險名山大塞十人所守千人不過是謂地機善行間諜分散其衆使君臣相怨是謂事機車堅舟利士馬閑習是謂力機此所謂四機者也又曰夫將可樂而不可憂謀可深而不可疑將憂則内疑將有憂色則内外相疑不相信也謀疑則敵國奮多疑則計亂亂則令敵國奮也以此征伐則可致亂故將能清浄應財曰清不優曰静能平能整能受諌能聽訟能納人受賢於羣英之中若吴納范蠡齊納寗戚之類也能採善言能知國俗能圗山川能裁阨難險難阨皆悉明也能制軍權危者安之懼者懽之叛者還之將有不合去者慰諭還之若蕭何追韓信冤者原之訴者察之卑者貴之士卒若卑賤者貴之昔吴起不與士卒同衣食是也彊者抑之敵者殘之卑中有賤而敵貴者乱上下之礼殘殺之貪者豊之懸賞以豊其心所以使貪欲者使之臨敵將戰有欲立功名有欲利敵人者皆許而使之所謂使}
  - {type: variant, offset: 2850, length: 1, content: 嚴, SBCK: 使貪畏者隠之士卒有所畏懼者隠蔽於後勿使爲軍鋒軍敗由鋒怯謀者近之䜛者覆之有讒闘之覆信之毀者復之官職有毁廢者則修而復之反者廢之撗者挫之服者活之首服罪者活之降者􅀃之􅀃舎獲城者割之賞功臣}
  - {type: variant, offset: 2850, length: 1, content: 嚴, krp: 使貪畏者隠之士卒有所畏懼者隠蔽於後勿使爲軍鋒軍敗由鋒怯謀者近之䜛者覆之有讒闘之覆信之毀者復之官職有毁廢者則修而復之反者廢之撗者挫之服者活之首服罪者活之降者說之說舎獲城者割之賞功臣}
