  - {type: variant, offset: 160, length: 6, content: 禮謀元帥中軍, SBCK: 大器存亡之所由也又曰太公曰夜卧早起雖劇不悔妻子之將也長實希言賦物平均十人之將也數行刑戮不避親戚百人之將也訟辯好勝欲正一衆千人之將也知人飢飽念人劇易萬人之將也戰戰慄慄日愼一日十萬人之將也見賢進之行法不枉百萬人之將也知天文悉地理四海如妻子此天}
