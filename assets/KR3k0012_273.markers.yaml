  - {type: variant, offset: 1415, length: 298, content: 曰柏直也信曰豎子耳遂進擊魏又陸賈傳曰賈謂陳平曰天下安注意相天下危注意將將相和則士豫附士豫附天下雖有變則權不分為社稷計在兩君掌握耳又齊王傳曰祝午給琅邪王曰呂氏為亂齊王發兵欲西誅之齊王自以兒子年少不習兵革之事願舉國委大王大王自高帝將也言高帝之時為將也又高紀曰帝置酒雒陽南宮曰通侯諸將毋敢隱朕後漢書虞詡傳曰李循曰關西出將關東出相觀其習兵壯勇實過餘州又曰大將曹公每攻城破邑得靡麗之物則悉以賜有功者若勳勞宜賞則不恡萬金無功冀施分毫不與魏志曰太祖既破張繡東擒呂布定徐州遂與袁紹相距孔融謂荀彧曰紹地廣兵彊田豊許悠智計之士為之謀審配逢紀盡忠之臣也任其事顏良文醜勇冠三軍統其兵殆難剋乎彧曰顏良文醜疋夫之勇可一戰而擒, SBCK: ''}
