  - {type: variant, offset: 795, length: 391, content: 可廢也章著也使狐偃為卿辭曰毛之智賢於臣其齒又長毛偃之兄也毛也不在位不敢聞命乃使狐毛將上軍狐偃佐之尚齒也傳曰使狐偃將上軍讓于狐毛而佐之是也狐毛卒使趙衰代之虞唐云代將新軍昭謂代將上軍辭曰城濮之役先且居之佐軍也善先且居先軫之子蒲城伯復受霍為霍伯也軍伐有賞伐功也善君有賞能其官有賞且居有三賞不亦可廢也且臣之倫箕鄭胥嬰先都在倫疋三子晉大夫乃使先且居將上軍代狐毛也公曰趙衰三讓三使為卿三讓之進欒枝等八人其所讓皆社稷之衛也廢讓是廢德也以趙衰之故蒐于清源作五軍清源警地晉本三軍有中軍上下今有五益新上下使趙衰將新上軍箕鄭佐之胥嬰將新下軍先都佐之子犯卒蒲城伯清佐蒲城伯先且居公曰夫趙衰三讓不失義義宜也讓推賢也義廣德也廣德賢至有何患矣請令衰也從子從先且居乃使趙衰佐新上軍此有新字誤也趙衰從新上軍之將進佐上軍為升一等新上軍之將位在上軍佐之下此章或在狐毛卒上非也當左下史記孟嘗君傳曰文聞將門必有將相門必有相又, SBCK: 持}
