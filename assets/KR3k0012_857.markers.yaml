  - {type: variant, offset: 513, length: 152, content: 剝削淹漬以為菹貴四時之異物毛詩義䟽曰蒲周禮以為菹謂蒲始生取其中心入地蒻大如指白生噉之甘脆又煮以苦酒受之如食筍法大美今吳人以為菹廣雅曰齏墜䖆䔯菹也墜大內切䔯口故切蒼頡解詁曰䔯酢菹也說文曰菹菜酢也蘫瓜菹也蘫力甘切釋名曰菹阻也生釀之遂使阻於寒溫之間不得爛也呂氏春秋曰文王好菹孔子聞之蹙頞而食之三年然後美之賈誼新, SBCK: 與劉頌}
