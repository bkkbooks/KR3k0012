  - {type: variant, offset: 81, length: 0, content: '', SBCK: 􅀽術爲雷薄等所距士衆絶粮時盛暑欲得蜜漿又無􅁡坐床歎息良乆乃大咤曰􅀽術至於此乎吴曆曰孫亮使黄門至中藏取􅁡漬梅􅁡中有䑕矢召問藏吏曰黄門從汝求􅁡耶吏曰向求􅁡實不敢與黄門不服亮曰此易知耳令破䑕矢矢裏燥亮曰􅀂乆在􅁡中中外當俱濕裏燥必是黄門所爲黄門首服晉令曰􅁡工収􅁡十斛有能増煎二􅂛者賞榖十斛晉太康起居注曰尚書令荀勗嬴毀賜石蜜伍斤齊書曰明帝元好􅢡姨以銀鉢盛􅁡漬之一食數鉢又曰陶弘景永明十年脫朝服掛神武門上表辭禄詔許之賜以束帛勑所在月給茯苓伍斤白􅁡貳斤以供服餌梁書曰任昉爲新安太守郡有􅁡嶺及楊梅舊爲太守所採昉以冒險多物故即時停絶又曰􅀓昭爲臨海大守郡有􅁡巖前後太守皆自封固專収其利昭以周文之囿與百姓共之大可喻小乃教勿封梁四公記曰髙昌國遣使貢刺􅁡帝命􅇐音竭公迓之謂其使曰刺􅁡是塩城所生非􅀯平城者使者曰其年風災刺􅁡不熟故尓帝問杰公何得知對曰南平城羊刺無葉其􅁡色明白而味甘塩城羊刺葉大其􅁡色青而味薄以是知􅁡之僞耳唐書曰蕃胡國出石􅁡中國貴之上遣使徃摩伽池國取者法令楊州煎諸蔗之汁於中厨自造焉色味逾於西域所出神仙傳曰飛黄子服中嶽石􅁡及紫梁得仙王孚安成記曰郡東有山百姓呼曰􅁡崗􅁡焉仙經云􅁡爲衆口芝荆州圖記曰赤馬山有􅁡房二百所羅綴相望因名曰百房異物志曰交阯草滋大者數寸煎之凝如氷破如􅀶棊謂之石􅁡凉州異物志曰石􅁡之兹甜於浮蓱非石之􅀋假石之名實出甘柘變而凝輕甘柘似竹味甘煑而曝之則凝如石而甚輕范子曰白􅁡出隴西天水夲草經曰石􅁡一名飴呉氏夲草曰食􅁡生武都谷劉根墨子枕中記鈔曰百花醴􅁡楚辭招魂曰瑶漿勺勺沙也實羽觴左思蜀都賦曰􅁡防郁毓􅀍其阜漢昌縣多野蜂􅁡䗶郭珎􅁡賦曰繁布金房疊稱王室咀爵滋液釀以爲􅁡散似甘露凝如割眆氷鮮玉􅃳髓滑蘭香魏}
