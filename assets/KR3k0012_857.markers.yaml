  - {type: punctuation, offset: 122, content: 「, id: KR3k0012_CHANT_857-bkkpn45}
  - {type: variant, offset: 122, length: 237, content: 白露之茹菹周禮曰朝事之豆其實韭菹昌本菁菹茆菹昌本昌蒲祖也切之四寸為之菁菹韭菹鄭大夫讀茆為茅或曰茆水草杜子春讀茆為卯玄謂菁蔓菁也茆鳧葵也饋食之豆其實葵菹加豆之實芹菹深蒲菭菹筍菹芹楚葵也鄭司農云深蒲弱入水深故曰深蒲或曰深蒲桑耳菭水中魚衣也玄謂深蒲蒲始生水中子也菭箭葫荀竹萌王舉則共七葅韭菁茆葵芹菭筍菹凡醯醢所和細切為齏今物若䐑為菹齏菹之稱菜肉通稱矣記曰麋鹿為菹野豕為軒皆聶而不切麕為辟雞菟為宛脾皆聶而切之切葱若薤實之醯以柔之此軒辟雞宛脾皆菹類也其作之狀以醢與薰菜淹之殺肉及醒氣也, SBCK: 南方龍眼荔支寕比西國蒱桃石􅁡}
