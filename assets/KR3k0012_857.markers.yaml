  - {type: variant, offset: 680, length: 134, content: 腹有病而不能食之令尹入問曰王安得此疾王曰我食寒菹而得蛭念譴之而不得其罪乎是法廢而威不立非所以使國聞也譴而行其誅乎則庖宰監者皆當死心又弗忍也故吾恐蛭之見也因遂吞之令尹避席再拜而賀曰臣聞天道無親唯德是輔王有仁德天之所奉也是昔也惠王之後而蛭出其夕病心腹之積皆愈晉書曰吳隱之年, SBCK: 産太平御覽卷第八百五}
