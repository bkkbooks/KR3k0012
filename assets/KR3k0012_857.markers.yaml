  - {type: variant, offset: 361, length: 130, content: 水草之菹陸產之醯小物備矣三牲之俎八簋之實美物備矣昆蟲之異草木之實陰陽之物備矣水草之菹芹茆屬陸產之醯蚳蝝之屬天子之祭八簋昆蟲謂溫生寒死之蟲也內則可食之物有蜩范草木之實菱茨榛栗之屬傳曰王使周公閱來聘饗有昌歜昌菹毛詩曰中田有廬疆場有瓜是剝是菹剝瓜為菹也箋云中田土也農, SBCK: 新城孟太守道蜀䐗肫鷄鶩味皆淡故蜀}
