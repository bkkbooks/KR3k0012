  - {type: variant, offset: 1150, length: 175, content: 歎矣孫卿子曰子路問於孔子曰君子亦有憂乎孔子曰君子其未得也則樂其意既得已又樂其治是以有終身之樂無一日之憂小人未得也則憂不得既得之又恐失之是以有終身之憂而無一日之樂也淮南子曰楚王亡其猨而林木為之殘楚莊王猿也接捷依木而處故殘林以來宋王亡其珠池魚為之殫故澤火而林木憂憂見及也淮南子曰夫捧爵酒不知於邑言其輕也潔石之樽則白汗交流言其重也又況贏天下之憂而任海內之事, SBCK: 稅駕}
