  - {type: variant, offset: 1813, length: 339, content: 人乘過馬翼便進酒王語翼汝更看定非官人王語翼汝幾誤殺我楚辭曰心不怡之且久怡樂憂與憂其相接接續惟郢路之遼遠兮江與憂之不可涉又曰望孟夏之短夜何晦明其若歲惟郢路之遠兮魂一夕而九逝又曰屈原放逐憂心愁悴防徨山澤仰天歎息楚有先王之廟及公卿祠堂見圖畫天地山川神靈琦瑋及古賢聖怪物行事因書其璧呵而問之以泄情懣舒寫愁思又曰漁父者原所作也屈原放逐江湘之間憂愁歎吟曰漁父避世隱身鉤魚欣然樂時過屈原川澤之域怪而問之遂相應荅楚人思念屈原敘其辭以相傳焉揚雄連珠曰臣聞天下有三樂有三憂焉陰陽和調四時不忒年穀豊遂無有夭折災害不生兵戎不作天下之樂也聖明在上祿不遺賢罰不偏罪君子小人各處其位眾臣之樂也吏不茍暴役賦不重財力不傷安土樂業民之樂也亂則反焉故有三憂山海經讚曰焉得鬼草是樹是蓻服之不憂樂天傲世如彼浪舟任波流滯懼, SBCK: 内外百寮側目莫敢違命}
