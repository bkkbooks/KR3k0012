  - {type: variant, offset: 2268, length: 1, content: 初, krp: 士爕兄弟並爲列郡雄長一州偏在萬里威尊無上出入鳴鍾鼓備威儀笳簫鼓吹車騎滿道胡人夾轂焚香者常有數十妻妾乗輜軿子弟從兵騎當時貴重震服百蠻又曰}
