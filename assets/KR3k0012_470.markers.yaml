  - {type: variant, offset: 2607, length: 4, content: 限走向馬, WYG: 八柱國之貴吾與公家咸登此職今我為天子公為内史令本同末異乃不平矣威謝曰臣家昔在漢朝四為外戚至於後魏三處外家陛下龍興復出皇后臣又階緣戚里位忝鳳池自惟叨濫曉夕兢懼高祖笑曰比見闗中人與崔盧為婚猶自矜伐公代為帝戚不以貴乎又曰竇氏自武德至今再為外戚一品三人三品已上三十餘人尚主者八人女為王妃六人唐世貴盛莫與為比又曰姜皎長安中累遷尚衣奉御時𤣥宗在藩見而悅之皎察𤣥宗有非常之度尤委心焉尋出為潤州長史𤣥宗即位召拜殿中少監召}
