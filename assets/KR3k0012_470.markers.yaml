  - {type: variant, offset: 1469, length: 3, content: 魯有賢, SBCK: 衛子夫立爲皇后弟衛青封爲長平侯三弟皆封爲侯貴震天下天下歌之曰生男無喜生}
  - {type: page-break, offset: 1469, content: '', id: KR3k0012_SBCK_470-1b}
  - {type: variant, offset: 1469, length: 1, content: 魯, WYG: 衞子夫立為皇后弟衞青封為長平侯三弟皆封為侯貴震天下天下歌之曰生男無喜生女無怒獨不見衞子夫霸天下又曰蘇秦師於鬼谷先生後得周書陰符讀之以揣摩因說六國以拒秦為從約并相六國各佩其印行過洛陽車騎輜重諸侯各使送之甚衆擬於王者周王聞恐懼除道使人郊勞於是散千金以賜宗族漢書曰帝舅王譚為平阿侯商為成都侯立為江陽侯逢為高平侯根為曲陽侯五人同日封謂之五侯榮貴絶代又曰金日磾勒功上將傳國後嗣七葉内侍何其盛也功臣之家唯}
  - {type: page-break, offset: 1469, content: '', id: KR3k0012_WYG_470-2a, image: WYG0897/WYG0897-0285c.png}
  - {type: page-break, offset: 1469, content: '', id: KR3k0012_WYG_470-2b, image: WYG0897/WYG0897-0285d.png}
  - {type: variant, offset: 1469, length: 3, content: 魯有賢, krp: 衛子夫立爲皇后弟衛青封爲長平侯三弟皆封爲侯貴震天下天下歌之曰生男無喜生}
  - {type: variant, offset: 1471, length: 1, content: 賢, WYG: 金氏親近貴寵比於外戚又曰楊僕宜陽人也稍遷至主爵都尉南越反拜樓船將軍有功封梁侯因歸家懷銀黄秉三組以誇鄉里又曰楊惲曰吾家方全盛乗朱輪者十人又曰項羽屠咸陽殺子嬰收貨寳婦}
  - {type: punctuation, offset: 1473, content: ，, id: KR3k0012_CHANT_470-bkkpn482}
  - {type: 'tls:seg', offset: 1473, content: '', id: KR3k0012_CHANT_470-20a.4}
  - {type: variant, offset: 1473, length: 2, content: 次室, SBCK: 無怨獨不見衛子夫又曰􅂫􅁗師於鬼谷先生後得周書隂符讀}
  - {type: variant, offset: 1473, length: 0, content: '', WYG: 而東秦民失望於是韓生說羽曰闗中阻山河四塞地肥饒可都以霸羽曰富貴不歸故鄉如衣錦夜行又曰萬石君石奮長子建}
  - {type: page-break, offset: 1473, content: '', id: KR3k0012_WYG_470-3a, image: WYG0897/WYG0897-0286a.png}
  - {type: variant, offset: 1473, length: 2, content: 次室, krp: 無怨獨不見衛子夫又曰蘇秦師於鬼谷先生後得周書隂符讀}
  - {type: variant, offset: 1474, length: 1, content: 室, WYG: 甲次乙次慶皆以馴行孝謹官至二千石於是景帝曰石君及四子皆二千石號奮為萬石君又曰主父偃曰臣結髪遊學四十餘年身不得遂親不以為子昆弟不收賓客棄我我厄日久矣丈夫生不五鼎食死則五鼎烹耳吾日暮途遠故倒行逆施}
  - {type: variant, offset: 1476, length: 8, content: 子年適二十明曉經, SBCK: 以揣摩因􅀃六國以拒􅁗爲從約并六國各佩其印行過洛陽車􅀐輜重諸侯各使送之甚衆擬於王者周王聞恐懼除道使人郊勞於是散千金以賜宗族漢}
  - {type: variant, offset: 1476, length: 0, content: '', WYG: 偃為齊相至齊遍召昆弟賓客散五百金與之曰始貧時昆弟不我内今吾相齊諸君迎我或千里吾與諸君絶矣無復入偃之門又曰張安世以父}
  - {type: page-break, offset: 1476, content: '', id: KR3k0012_WYG_470-3b, image: WYG0897/WYG0897-0286b.png}
  - {type: variant, offset: 1476, length: 8, content: 子年適二十明曉經, krp: 以揣摩因說六國以拒秦爲從約并六國各佩其印行過洛陽車騎輜重諸侯各使送之甚衆擬於王者周王聞恐懼除道使人郊勞於是散千金以賜宗族漢}
  - {type: punctuation, offset: 1477, content: ，, id: KR3k0012_CHANT_470-bkkpn483}
  - {type: 'tls:seg', offset: 1477, content: '', id: KR3k0012_CHANT_470-20a.5}
  - {type: variant, offset: 1477, length: 0, content: '', WYG: 封侯在位太盛乃辭不受禄詔都内别藏張氏無名錢以五百萬數文頴曰都内主藏官也張昌曰安世以還官官不受又曰田蚡召客飲坐其兄蓋侯南鄉自坐東鄉以為漢相尊不可以兄故私撓由此滋驕治宅甲諸第田園極膏腴市買郡國市物相屬於道前堂羅鍾鼓立細旃如淳曰旌旗之名通帛曰旃後房婦女以百數諸珍物狗馬玩好不可勝數又曰孫權拜諸葛恪撫越將軍領丹陽太守授棨㦸武騎三百拜畢令恪備威儀作鼓吹導引歸家時}
  - {type: page-break, offset: 1477, content: '', id: KR3k0012_WYG_470-4a, image: WYG0897/WYG0897-0286c.png}
  - {type: variant, offset: 1478, length: 1, content: 適, WYG: 三十二何法盛晉中興書曰諸葛氏之先出自葛歸漢司𨽻校尉諸葛豐以忠强立名子孫代居二千石三國之興蜀有丞相亮吳有大將軍瑾魏有司空誕名並蓋海内為天下盛族又曰何比干字長卿武帝時為丹陽都尉有隂德嘗獨坐天大雨有一老母詣比干而衣不濕比干怪而敬焉臨去懷中出金册九百九十枚以授比干曰爾子孫當佩印綬如此册數陳書曰征南將軍歐陽頠時頠弟盛為交州刺史次弟邃為衡州刺史合門顯貴威振南土又多致銅鼓生口獻珍異前後委積頗有功於軍國焉司馬彪續漢書曰袁安字邵公桓帝初遷太尉有子逢成隗逢字周陽靈帝時為司空隗字次陽亦至司徒太傅謝承後漢書曰梁冀弟不疑為潁陽侯子允為城父侯冀一門前後七封三皇后六貴人二大將軍夫人女侯邑稱君七人尚公主三人其餘卿將尹校五十七人梁氏在位}
  - {type: page-break, offset: 1478, content: '', id: KR3k0012_WYG_470-4b, image: WYG0897/WYG0897-0286d.png}
  - {type: page-break, offset: 1478, content: '', id: KR3k0012_WYG_470-5a, image: WYG0897/WYG0897-0287a.png}
