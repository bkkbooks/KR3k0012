  - {type: variant, offset: 1604, length: 548, content: 脩短故非所計當無復近日事不超曰大司馬方將外固封疆內鎮社稷必無若斯之慮臣為陛下保之簡文因頌席仲初詩曰士痛朝危臣哀主辱臣聲甚悽愴郗受假還東帝曰致意尊公超父愔字方回家國之事遂至於此由身不能以道匡衡思患豫防愧歎之深言何能譬因泣下語林曰陸士衡為河北都督已被間搆內懷憂懣聞眾軍驚角鼓吹謂其司馬孫拯曰我聞此不如華亭鶴鳴俗說曰王孝伯起事王東亭殊憂懼時住在募士橋下持藥酒置左側諸其所念小人俞翼令在門前若見人騎儐從來汝便可取酒藥與我俄有行人乘過馬翼便進酒王語翼汝更看定非官人王語翼汝幾誤殺我楚辭曰心不怡之且久怡樂憂與憂其相接接續惟郢路之遼遠兮江與憂之不可涉又曰望孟夏之短夜何晦明其若歲惟郢路之遠兮魂一夕而九逝又曰屈原放逐憂心愁悴防徨山澤仰天歎息楚有先王之廟及公卿祠堂見圖畫天地山川神靈琦瑋及古賢聖怪物行事因書其璧呵而問之以泄情懣舒寫愁思又曰漁父者原所作也屈原放逐江湘之間憂愁歎吟曰漁父避世隱身鉤魚欣然樂時過屈原川澤之域怪而問之遂相應荅楚人思念屈原敘其辭以相傳焉揚雄連珠曰臣聞天下有三樂有三憂焉陰陽和調四時不忒年穀豊遂無有夭折災害不生兵戎不作天下之樂也聖明在上祿不遺賢罰不偏罪君子小人各處其位眾臣之樂也吏不茍暴役賦不重財力不傷安土樂業民之樂也亂則反焉故有三憂山海經讚曰焉得鬼草是樹是蓻服之不憂樂天傲世如彼浪舟任波流滯懼, WYG: ''}
