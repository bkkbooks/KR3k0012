  - {type: variant, offset: 2587, length: 1, content: 峻, WYG: 彪四葉太尉德業相繼與袁氏俱為東京名族華嶠書曰東京楊氏袁氏累世宰相為漢名族然袁氏奢僭其家風不及楊氏隋書觀徳王雄𫝊曰或奏髙熲朋黨上詰雄於朝雄對曰臣忝衞宮闈朝夕左右若有朋附豈容不知至尊欽明睿哲萬機親覽熲用心平允奉法而行此乃愛憎之理惟陛下察之高祖深然其言雄}
