  - {type: variant, offset: 589, length: 525, content: 河東太守與諸侯通坐誅應侯日以不懌昭王臨朝歎息應侯進曰臣聞主辱臣死今大王中朝而憂臣敢請其罪昭王曰吾聞楚之鐵劍利則士勇倡優拙則思慮遠夫以遠思慮而御勇士恐楚之圖秦也今武安君死鄭安平叛內無良將而外多敵國吾是以憂會稽典略曰越王近侵於強吳遠愧於諸侯乃脅諸臣而欲與之盟吾欲伐吳柰何而有功群臣未對王曰夫主憂臣辱主辱臣死何大夫而見而難使者計倪官卑年少其居在後舉手而起曰殆哉非大夫易見難使是大夫不能也王曰何謂也倪曰夫官位財弊王之所輕使死者士之所重也王愛所輕責士所重也王豈難哉辛氏三秦記曰大秦國隔海心無憂患遇善風二十日得過心憂數年不得渡諺曰心無憂患不經二旬心若憂患遠離三春土人質直男女皆長一丈端正國主風雨不和則讓賢而治燕書曰慕容恪之威聲震於外敵初列祖崩晉人喜曰中原可圖矣桓溫曰慕容恪尚存所憂方重耳列子曰杞國有人憂天地崩墜身無所寄廢寢與食列子曰仲尼間居子貢入侍而有憂色子貢不敢問出告顏回顏回援琴而歌孔子問曰若奚敢獨樂回曰吾昔聞之夫子曰樂天知命故不憂回所以樂也孟子曰樂人之樂人亦樂其樂憂人之憂人亦憂其憂從下忘反謂之流從上忘反謂之連從獸無厭謂之荒樂酒無厭謂之忘先王無流連之樂荒忘之行也王孫子曰趙簡子獵於晉陽撫轡而歎董安於曰今遊獵樂也而主君歎敢問何也簡子曰汝不知也吾效廄養食穀之馬, WYG: 壽門庭車騎}
