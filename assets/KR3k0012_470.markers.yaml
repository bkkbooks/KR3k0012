  - {type: variant, offset: 2270, length: 16, content: 權以妹妻先主妹才捷剛猛有諸兄風侍, WYG: 官府邸第相望奴}
  - {type: variant, offset: 2271, length: 0, content: '', SBCK: 拜諸􅁑恪撫越將軍領丹陽太守授棨㦸武􅀐三百拜畢令恪備威儀作皷吹導引歸家時年三十二何法盛晉中興書曰諸􅁑氏之先出自􅁑國漢司􅀠校尉諸葛豊}
  - {type: variant, offset: 2271, length: 0, content: '', krp: 拜諸葛恪撫越將軍領丹陽太守授棨㦸武騎三百拜畢令恪備威儀作皷吹導引歸家時年三十二何法盛晉中興書曰諸葛氏之先出自葛國漢司隷校尉諸葛豊}
  - {type: variant, offset: 2272, length: 3, content: 妹妻先, SBCK: 忠強立名子孫代居二千石三國之典蜀有丞相亮呉有大將軍瑾魏有司空誕名並盖海内爲天下盛族又曰何比干字長卿武帝時爲丹陽都尉有隂德嘗獨坐天大􅀨有一老母詣比干而衣不濡比干怪而敬焉臨去懐中出金􅁽九百九十枚以授比干曰尓子孫當佩印綬如此􅉺數陳書曰征南將軍歐陽頠時頠弟盛爲交州刺史次弟􅃉爲衡州刺史合門顯貴威振南土又多致銅鼓生口獻珎異前後委積頗有助於軍國焉隋書曰觀德王雄傳或奏髙潁朋黨者上次詰日之於朝雄對曰臣忝衛宫闈朝夕左右􅀂有朋附豈容不知至尊欽明睿哲萬機親覽潁用心平允奉法而行此乃愛憎之理惟陛下察之髙祖􅀷然其言雄時貴寵冠絶一時與髙潁虞慶則􅂫威稱爲四貴又曰楊素貴寵日隆其弟約從父文思弟紀及族父异並尚書列卿諸子無汗馬之勞位至柱國刺史家僮千數後庭妾曵綺羅者以千數第宅華侈制擬宮禁有鮑享者善屬文謝胄者工草􅀠並江南士人因髙智慧没爲家奴親戚故吏布列清顯素之貴盛近古未聞唐書曰竇威拜内史令威奏議雍容多引古爲證髙祖甚親重之或引入卧内帝爲前席又嘗謂曰昔周朝有八柱國之貴吾與公家咸登此職今我爲天子公爲内史令夲同末異乃不平矣威謝曰臣家昔在漢朝内爲外戚至於後魏三處外家陛下龍興復出皇后臣又階縁戚里位忝鳯池自惟叨濫曉夕兢懼髙祖􅀏曰比見關中人與崔盧爲㛰猶自矜伐公代爲帝戚不以貴乎又曰竇氏自武德至今再爲外戚一品三人三品巳上三十餘人尚}
