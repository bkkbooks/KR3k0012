  - {type: variant, offset: 2582, length: 1, content: 勒, SBCK: 惟我之先生于有晉人物盈朝衮衣暐曄六丗九公不亦偉乎磊落瓌竒光昭合同巳獨歩於古今拊萬姓而駭之矣中興丞相王公歎曰自八龍以後榮寵莫二爲天下之盛也􅂫子曰夫帶方寸之印拖丈八之組戴貂鶡之尾建千丈之城遊五里之衢走卒警蹕呌呼而行此諸侯之所謂榮華時俗之所謂冨貴也左思詠史詩曰金章籍舊業七葉珥漢貂御覽第四百七十按本卷有錯簡四處兹據日本學訓堂倣宋聚珍版曁鮑崇城本訂正並於銜接處加爲識其原式如左今第二葉後三行田比滋驕}
