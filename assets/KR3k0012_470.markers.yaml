  - {type: punctuation, offset: 89, content: 『, id: KR3k0012_CHANT_470-bkkpn29}
  - {type: variant, offset: 89, length: 327, content: 子何為泣嬰曰吾聞衛世子不肖是以泣也偶曰衛世子不肖諸侯之憂也子獨泣為何嬰曰禍相及也今衛世子甚不肖好兵吾男弟三人能無憂之毛詩小弁曰踧踧周道鞠為茂草踧踧平易皃也我心憂傷惄焉如擣假寐永歎惟憂用老惄思也擣心疚毛詩北門曰北門剌仕不得志也言衛之忠臣不得其志爾出自北門憂心殷殷殷興也北門背明嚮陰箋云自從興者諭己仕於闇君猶行而北出門也心為殷殷然也左傳僖上曰秦伯獲晉侯以歸秦穆夫人與太子罃弘與女簡璧舍之靈臺薦之以棘在京兆鄠縣周之故臺也大夫請入公曰晉人慼憂以重我天地以要我不圖晉憂重其怒也左傳宣曰荀林父請死晉侯欲許士貞子諫曰不可城濮之役晉師三日穀文公猶有憂色左右曰有喜而憂如有憂而喜乎公曰得臣猶在憂未歇也困獸猶鬭況國相乎左傳襄六年曰吳公子札來聘請觀周樂為之歌鄁鄘衛曰美哉淵乎憂, SBCK: 高}
