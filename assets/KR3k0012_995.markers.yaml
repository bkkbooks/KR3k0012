  - {type: variant, offset: 1572, length: 2, content: 文草, WYG: 葭蒲藤類延蔓他樹以自長飬實大小長短如蓮菆側尤切著枝格間實外有殻又無核剥乃食之煑而暴之甜羙食之不飢臨海異物志曰種藤附樹}
