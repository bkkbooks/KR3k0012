  - {type: variant, offset: 2510, length: 2, content: 視尔, SBCK: 不績其麻市也婆娑績麻者婦人之事也疾其今不爲禮記内則曰女子十年不出母教婉娩聽從婉謂言語也娩之言媚也謂容貌也執麻枲治絲蠒春秋􅀃題辭曰麻之爲言微也隂精􅃦密女作纎微也麻生於夏夏衣物成禮儀故麻可以爲衣陽成於三物以化故麻三變縷布加也宋均注曰麻須隂以成夏秓葉成謂之衣麻亦夏生可作衣也三變謂麻生成形之變也漚取皮一變也績成爲􅈁三變也華嶠後漢書曰崔寔爲五原太守地冝麻枲而民不知種植又不能緝績率無衣􅀍冬月止種細草卧其中吏以草衣其身乃得出寔至教之績織晉中興書曰石勒昔居與李陽相近陽性剛愎毎歳與争漚麻池共相打撲沈約宋書曰孝武帝大明中上所居隂室於此處起玉燭殿與群臣觀之床頭有土鄣壁上挂􅁑燈籠麻縄拂侍中􅀽顗盛稱上儉素之德故能光有天下莊子曰顔回曰願得郭内之田十􅅿以爲絲麻不仕也淮南子曰汾水濛濁而冝麻列女傳曰河内二義者張伯仁仲仁之妻也兄弟少􅀌共居伯仁敦厚謙苦仲仁驕戾不節二婦紡績得好枲麻輙別異之以爲仲仁衣服越絶書曰麻林山勾踐欲伐呉種麻以爲弓絃也漢武内傳曰鸚鵡食麻子晉令曰其上黨及平陽輸上麻二十二斤下麻三十六斤當絹一疋課應田者枲麻加半􅅿崔寔四民月令曰二月三月可種苴麻二月可粜麻子夲草經曰麻蕡一名麻勃味平辛生川谷治七傷利五藏下血氣多食令人見􅀑狂走乆服輕身通神明麻子􅀘中益氣乆服肥徤不老生太山呉氏夲草經曰麻子中人神農歧伯辛雷公扁鵲無毒不欲牡厲白薇先藏地中者食殺人麻藍一名麻蕡一名青羊一名青􅁑神農辛歧伯有毒雷公甘畏牡厲白薇葉上有毒食之殺人麻勃一名麻花雷公辛無毒畏牡厲風俗通曰蓬生麻中不扶自直􅁑爾雅曰拔蘢􅁑也似􅁑􅟵生有莭江東呼爲龍尾亦謂之虎􅁑細葉赤莖廣雅曰女青葛也毛詩閞睢葛覃曰􅁑之覃兮施于中谷維葉萋萋毛曰覃延也􅁑所以爲絺綌毛詩􅁰離􅁑藟曰綿綿􅁑藟在河之滸􅁑也藟也生於河之厓得其潤澤以長大而不絶又􅁰離採􅁑曰採􅁑懼䜛也彼採􅁑兮一日不見}
