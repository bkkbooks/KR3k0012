  - {type: variant, offset: 2518, length: 1, content: 荍, SBCK: 纍蔓也似燕薁連蔓生蔓白色子赤可食酢而不羙也幽州謂之推藟也山海經曰卑山其上多櫐郭璞注曰今虎豆狸豆之屬櫐也齊書曰解叔謙字楚梁鴈門人也母有疾叔謙夜於庭中稽顙祈福聞空中語云此疾得丁公藤治便差即訪毉及草注皆無識者乃求訪至冝都遥見山中}
  - {type: page-break, offset: 2518, content: '', id: KR3k0012_SBCK_995-4a}
  - {type: variant, offset: 2518, length: 221, content: 荍一名楚葵崔豹古今注曰荊葵一名茙葵一名芘芣花色奪目有紅有白有赤但花異葉不殊也蜀葵爾雅曰菺音堅戎葵也郭璞曰今蜀葵花似木槿傅玄蜀葵賦序曰蜀葵其苗如瓜瓠嘗種之一名引苗而生華經二年春乃發虞繁蜀葵賦曰惟茲珍草懷芬吐榮挺河渭之膏壤吸升井之玄精繞銅爵而䟽植映昆明而羅生莬葵爾雅曰莃虛機切莬葵郭璞曰頗似葵而葉小狀如藜有毛汋啖之滑廣志曰菟葵爚之可食鳧茈爾雅曰芍都了切鳧茈也生下田苗似龍鬚而細根如指頭黑色可食東觀漢記曰王莽末南方枯旱民多餓群入野澤掘鳧茈而食之烏韭, WYG: 揚州謂羊蹄為蓫}
  - {type: variant, offset: 2518, length: 1, content: 荍, krp: 纍蔓也似燕薁連蔓生蔓白色子赤可食酢而不羙也幽州謂之推藟也山海經曰卑山其上多櫐郭璞注曰今虎豆狸豆之屬櫐也齊書曰解叔謙字楚梁鴈門人也母有疾叔謙夜於庭中稽顙祈福聞空中語云此疾得丁公藤治便差即訪毉及草注皆無識者乃求訪至冝都遥見山中}
