  - {type: variant, offset: 1227, length: 341, content: 蹙然起走㦎怪而拔塞便復還倒如此三焉㦎蜜錄此種以來其治傷痍多愈三齊略記曰不其城東有鄭玄教授山山下生草如薤葉長尺餘堅紉異常土人名作康成書帶括地圖曰君子民帶劍使兩文虎衣野絲土方千里多薰華之草好讓故為君子國薰華草朝生夕死大極山西有采華之草服之乃通萬里之言服虔通俗曰草盛曰菶脯朦切生茂曰葆音保方言曰凡草生而初達謂之䓲䓲音悅小也荄杜根也東齊曰杜或曰茇博物志曰太原晉陽已北生屏風草又曰黃帝問天老曰天地所生豈有食之令人不死者乎天老曰太陽之草名曰黃精餌而食之可以長生太陰之草名曰鉤吻入口立死人信鉤吻之殺人不信黃精之益壽不亦惑乎又曰海上有草焉名曰蒒音師草其實食之如大夌從七月稔熟民歛穫名曰自然榖或曰禹餘糧又曰類草也其根名為弱頭大者大如升其外理白可以灰汁煮則疑成熟可以苦酒淹食之不以灰煮則不成熟蜀人珍貴之, WYG: 出興古陳祈暢}
