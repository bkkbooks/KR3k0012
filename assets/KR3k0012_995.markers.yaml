  - {type: variant, offset: 219, length: 2, content: 孟夏, WYG: 二月三月可種苴􅏘二月可糶􅏘子本草經曰􅏘蕡一名􅏘勃味平生川谷治七傷利五臟下血氣多食令人見鬼狂走乆服輕身通神明􅏘子補中益氣乆服肥徤不老生太山吴氏本草經曰􅏘子中仁神農岐伯辛雷公扁鵲無毒不欲牡厲白薇先藏地中者食殺人麻藍一名麻蕡一名青葛神農辛岐伯有毒雷公甘畏牡厲白薇葉上有毒食}
