  - {type: variant, offset: 216, length: 0, content: '', WYG: 内則曰女子十年不出母教婉娩聽從婉謂言語也娩之言媚也皆謂容貌也執麻枲治絲蠒春秋說題辭曰麻之為言㣲也隂精􅆍宻女作纎㣲也麻生於夏夏衣物成禮儀故麻可以為衣陽成於三物以變化故三變縷布成也宋君注曰麻須隂以成夏枝葉成謂之衣亦夏生可作衣也三變謂麻生成形一變也漚取皮二變也績成為縷三變也華嶠後漢書曰崔寔為五原太守地宜麻枲而民不知種植又不能績織率无衣被冬月止種細草卧其中吏以草衣其身乃得出寔至教之績織晉中興書曰石勒昔居與李陽相近陽性剛愎每歲與争漚麻池共相打撲沈約宋書曰孝武帝大明中壊上所居陰室於其處起玉燭殿與羣臣觀之床頭有土鄣壁上挂葛燈籠麻繩拂之侍中袁顗盛稱上儉素之徳故能光有天下莊子曰顔囘曰願得郭内之田十畆以為絲麻不仕也淮南子汾水濛濁而宜麻列女傳曰河內二義者張伯仁仲仁之妻也兄弟少孤共居伯仁敦厚謙苦仲仁驕戾不節二婦紡績得好枲􅏘輙别異之以為仲仁衣服越絶書曰􅏘林山勾踐欲伐吴種􅏘以為弓絃也漢武內傳曰鸚鵡食􅏘晉令曰其上黨及平陽輸上􅏘二十二斤下􅏘三十六斤當絹一疋課應田者枲􅏘加半畆崔實四民}
