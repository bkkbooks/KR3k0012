  - {type: variant, offset: 1700, length: 268, content: 鷄腸烏喙而非有翼之鳥也靈書記曰霍山上有神草三十四種典術曰壽榮草出少室金山丘下服之令人不老取葉服之可通百神又曰餌玉長生草一名通天價直千萬陰乾方寸七日再服之令人得仙師曠占曰黃帝問師曠曰吾欲知歲苦樂善惡可知不對曰歲欲豐甘草先生甘草薺也歲欲儉苦草先生苦草者葶藶也歲欲惡惡草先生惡草者水藻也歲欲旱旱草先生旱草者蒺藜也歲欲潦潦草先生潦草者蓬也淮南萬畢術曰廻風之草見八方取廻風草三寸三枚五寸五枚以城西面土三家不汲井中青泥南鷄欲上栖不上者并治合為丸磨其面目出戶視八方矣楚辭曰春草生兮萋萋王孫遊兮不歸古詩曰廻車駕言邁悠悠涉長道四顧何芒芒東風搖百草又曰新樹, SBCK: 芄}
