  - {type: variant, offset: 419, length: 606, content: 元年夏東郡陳留濟陽長垣濟陰諸縣界有草生莖大如手指狀似鳩爵龍虵鳥獸之形五色各如其物毛羽頭目足翅皆具又曰西夜國生獨白草煎以為藥傳箭所射輒死崔鴻十六國春秋西秦錄曰永和二年國中地震百草皆自及晉書載記曰符堅至壽春與符融登城而望王師見部陣齊整將士精銳又北望八公山上草木皆類人形顧謂融曰比亦勍敵也何謂少乎憮然有懼色後周書曰字文深字奴干性鯁正有器扃年數歲便累石為營伍并折草作旌旗布置行列皆有軍陣之勢父永遇見之乃大喜曰汝自然知此於後必為名將又曰宕昌羗俗無文字但候草榮落以記歲時呂氏春秋曰草有華有藟獨食之則殺人合而食之則益壽淮南子曰神農始嘗百草一日七十毒又曰逮至衰世草木之勾萌衘華佩實而死者不可勝數符子曰鄰人謂展禽曰魯聘夫子夫子三黜無憂色何禽曰春風鼓百草敷蔚吾不知其茂秋霜降百草零落吾不知其枯人物志曰草之將精者為英獸之將群者為雄張良是英韓信是雄也水經曰魏興錫義山山高谷深多生薇蘅草其草有風不偃無風獨搖又曰建寧郡山生牧靡可以解毒百卉方盛鳥多悞食烏喙口中毒必急飛往牧靡山喙牧靡以解毒也金樓子曰魯城北孔子塋中不生㓨人草木崔豹古今注曰牛亨問曰草木生類也有識乎荅曰物有生而有識者有生而無識者有不生而有識者有不生而有識者不生無識者夫生而有識者蟲類是也生而無識者草木是也不生而有識者鬼神是也不生而無識者水土是也又曰天雨草狀如莎絞如丸無數皆名曰蓮蔞草郭子橫河冥記曰東方朔曰臣有吉雲草十頃種於九景山東二千歲一花此草難種東取璋琅山表之澗以灑之臣種來一千, SBCK: 御覽卷第}
