  - {type: variant, offset: 2529, length: 2, content: 荊葵, SBCK: 酒盃藤出西域藤大如臂去實皆可以酌酒自有文章映徹可愛實大如杯味如荳􅛌香羙消酒土人提酒來至藤下摘花酌酒以其實消酒其國人寳之不傳於中國張騫大宛國得之事在張騫出􅀜志南方草物􅃺曰沉藤生子大如韲甌正月華苞仍連著實十月臘月熟色赤生食之甜酢生交趾九真事毦至藤生山中大如苹蒿蔓衍居民採取剥之以作毦然不多出興古合浦簡子藤生縁樹木正月二月華四五月熟實如梨赤如雄鷄冠核如魚鱗取生食之味淡泊無甘苦出交趾合浦野聚藤縁樹木二月華苞仍連著實五六月熟子大如羮甌里民煑食其味甜酢出蒼梧科藤生金封山烏滸人徃徃賣之其色正赤又云以草染之出興古陳祈暢異物志曰葭蒱藤類延蔓他樹以自長飬實大小長短如蓮菆側尤切着枝格間實外有殻又無核剥乃食之煑而􅁀之甜羙食之不飢臨海異物志曰鍾藤附樹作根軟弱湏縁樹而作上下條此藤旣􅅶裹樹樹死且有惡汁藤盛成樹􅀂木自然大者或至五十圍異物志曰科藤圍數寸重於竹可以爲杖篾以􅅞舩及以爲席勝於竹也始興記曰黄溪出科藤王韶之始興記曰晉中朝有質子將歸忽有人􅀉其書告曰吾家在觀亭庿石間有懸藤君扣藤家人必自出歸者如言果有二人出水取書并曰江伯令君前入水見屋舎甚麗今俗咸言觀亭有江伯神也水經又載顧徽廣州記曰科藤如栟櫚葉踈外皮青多􅁄㓨髙五六丈者如五六寸竹小者如筆管竹破其外青皮得息即科藤藤􅀋有十許種續斷草藤也}
