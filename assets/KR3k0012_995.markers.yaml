  - {type: variant, offset: 1891, length: 259, content: 城西面土三家不汲井中青泥南鷄欲上栖不上者并治合為丸磨其面目出戶視八方矣楚辭曰春草生兮萋萋王孫遊兮不歸古詩曰廻車駕言邁悠悠涉長道四顧何芒芒東風搖百草又曰新樹蘭蕙葩雜用杜衡草終朝採草榮日暮不盈抱採之欲遺誰所思在遠道又曰穆穆清風止吹我羅裳裾青袍似春草長條從風舒又曰青青陵中草傾葉晞朝日陽春被惠澤枝葉可攬結草木為恩感況人含氣血薜荔山海經曰小華之山有草焉曰薜荔狀如烏韭緣木而生或生石上食之以已心痛楚辭曰罔薜荔兮為帷罔結也結辟荔為帷帳也擗惠櫋音眠兮既張擗析也以折蕙覆櫋屋上也又曰採薜荔兮水中搴芙蓉兮木末又曰若有人兮山之阿被薜荔兮帶, WYG: 充賦稅}
