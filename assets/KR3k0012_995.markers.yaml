  - {type: variant, offset: 406, length: 71, content: 彈丸續漢書五行志曰靈帝中平元年夏東郡陳留濟陽長垣濟陰諸縣界有草生莖大如手指狀似鳩爵龍虵鳥獸之形五色各如其物毛羽頭目足翅皆具又曰西夜國生獨白草煎, WYG: 三月兮葛所}
