  - {type: variant, offset: 2520, length: 3, content: 名楚葵, SBCK: 老公伐木問其所用荅云此丁公藤療風􅀹驗叔謙便拜伏流涕具言來意此公愴然以數叚與之并示以漬酒法叔謙受之尋視此人不復知處依法爲酒母病即差梁書曰周弘正與子豫玄俱載入東郡乗小渡岸見藤花弘正挽而䚗覆俱溺僅免豫玄遂得心驚疾汝南先賢傳曰蔡順字君仲至孝所居井桔橰歳乆欲易之爲在母年上不敢一旦忽生扶老藤遶之有鳩巢其上金樓子曰合浦有康頭山山有一頭鹿額上載科藤一枚四條直上各長一丈許雲南記曰雲南出藤其色如朱小者以爲馬䇿大者可爲柱杖}
