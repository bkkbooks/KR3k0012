  - {type: variant, offset: 2152, length: 247, content: 石蘭楚辭曰䟽中石蘭兮以為芳王逸曰石蘭香草䟽布也胡繩楚辭曰索胡繩之纚纚胡繩香草也霸熏范子計然曰霸薰出霸陵也楚薰范子計然曰楚薰出洛陽也楚蘅范子計然曰楚蘅出楚國也秦蘅宋玉風賦曰夫風翱翔激水之上擊芙蓉之精獵蕙草離秦蘅龍鬚山海經曰賈超之山草多龍鬚廣志曰龍鬚一名西王母簪水經曰自洮強南北三百里中地草並是龍鬚而無樵柴周景式廬山記曰石門峰石間多龍鬚草遊名山志曰龍鬚草唯東陽永嘉有永嘉有縉雲堂意者謂鼎湖攀龍鬚時有墜落化而為草故有龍鬚之稱鄭緝之東陽記曰仙姥巖間不生蔓草盡出龍鬚本草經曰西超山多龍循龍鬚也一名續斷狼尾, WYG: ''}
