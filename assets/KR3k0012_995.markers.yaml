markers:
  front:
  - {type: variant, offset: 0, length: 418, content: 百卉部一草爾雅曰卉草也草謂之華木謂之榮不榮而實者謂之秀榮而不實者謂之英尚書禹貢曰兗州厥草惟繇繇茂也徐州草木漸包漸進也包叢生也楊州厥草惟夭少長曰夭並出書注毛詩緇衣野有蔓草曰野有蔓草零露溥兮蔓延也溥漙然盛多也毛詩問答曰國多兵役男女怨曠於是女感傷而思男故出遊於洧之外託采芬香之草而為媱妷之行時草始生而云蔓者女情急欲以促時也周禮秋官下薙氏曰薙氏掌殺草春始生而萌之夏日至而夷之秋繩而芟之冬日至而耜之鄭玄曰含實曰繩也大戴禮曰孟春冰泮百草權輿禮記月令曰孟夏之月靡草死鄭玄曰舊詵靡草薺葶藶之屬季夏之月大雨時行燒薙行水利以殺草薙迫地芟草也薙草乾燒之至此雨水蓄水其中則草死不生也又曰霜降之日草木黃落又檀弓上曰曾子曰日朋友之墓有宿草而不哭焉左傳襄公曰松柏之下其草不殖又僖公曰一薰一蕕十年尚猶有臭蕕臭草薰香草也春秋潭潛巴曰下不廉蜚廉之草為不生言瑞應之物應行上論語曰君子之德風小人之德草草上之風必偃漢書五行志曰元帝永光二年天雨草葉相糾結如彈丸續漢書五行志曰靈帝中, SBCK: 太}
