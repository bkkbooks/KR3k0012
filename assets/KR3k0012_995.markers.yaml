  - {type: variant, offset: 741, length: 0, content: '', WYG: 所處依法為酒母病即差梁書曰周宏正與子豫元俱載入東郡乗小船渡岸見藤花宏正挽而船覆俱溺僅免豫元遂得心驚疾汝南先賢傳曰蔡順字君仲至孝所居井桔橰歲久欲易之為在母没年上不敢一旦遽易勿生扶老藤遶之有鴆巢}
  - {type: variant, offset: 742, length: 107, content: 茂秋霜降百草零落吾不知其枯人物志曰草之將精者為英獸之將群者為雄張良是英韓信是雄也水經曰魏興錫義山山高谷深多生薇蘅草其草有風不偃無風獨搖又曰建寧郡山生牧靡可以解毒百卉方盛鳥多悞食烏喙口中毒必急飛往牧靡山喙牧靡以解毒也, WYG: 上}
