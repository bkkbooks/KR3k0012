  - {type: variant, offset: 1969, length: 430, content: 蕙葩雜用杜衡草終朝採草榮日暮不盈抱採之欲遺誰所思在遠道又曰穆穆清風止吹我羅裳裾青袍似春草長條從風舒又曰青青陵中草傾葉晞朝日陽春被惠澤枝葉可攬結草木為恩感況人含氣血薜荔山海經曰小華之山有草焉曰薜荔狀如烏韭緣木而生或生石上食之以已心痛楚辭曰罔薜荔兮為帷罔結也結辟荔為帷帳也擗惠櫋音眠兮既張擗析也以折蕙覆櫋屋上也又曰採薜荔兮水中搴芙蓉兮木末又曰若有人兮山之阿被薜荔兮帶女蘿石蘭楚辭曰䟽中石蘭兮以為芳王逸曰石蘭香草䟽布也胡繩楚辭曰索胡繩之纚纚胡繩香草也霸熏范子計然曰霸薰出霸陵也楚薰范子計然曰楚薰出洛陽也楚蘅范子計然曰楚蘅出楚國也秦蘅宋玉風賦曰夫風翱翔激水之上擊芙蓉之精獵蕙草離秦蘅龍鬚山海經曰賈超之山草多龍鬚廣志曰龍鬚一名西王母簪水經曰自洮強南北三百里中地草並是龍鬚而無樵柴周景式廬山記曰石門峰石間多龍鬚草遊名山志曰龍鬚草唯東陽永嘉有永嘉有縉雲堂意者謂鼎湖攀龍鬚時有墜落化而為草故有龍鬚之稱鄭緝之東陽記曰仙姥巖間不生蔓草盡出龍鬚本草經曰西超山多龍循龍鬚也一名續斷狼尾, SBCK: 麻}
