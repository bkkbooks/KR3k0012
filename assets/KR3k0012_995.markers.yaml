  - {type: variant, offset: 1045, length: 654, content: 馬食不覺飢帝許之朔平旦去至暮而返背負數束其形葉似夌而金色裁長二尺剉以飼馬即不覺飢武帝曰種之生否朔曰臣東遊過吉雲之澤多生此草移於九景之山大不如吉雲之地又曰甜溪水如蜜東方朔遊此水還將數斛以獻帝帝投陰井井裏遂恒甜而寒洗肉肌理柔滑瑤琨去玉門九萬里有碧草如夌剉之以釀則味如酒而釅烈看之則顏色如醉飲一合則三旬不醒飲甜水則隨飲隨醒也異苑曰青州劉㦎音獲元嘉初射得一麞割五藏以草塞之蹙然起走㦎怪而拔塞便復還倒如此三焉㦎蜜錄此種以來其治傷痍多愈三齊略記曰不其城東有鄭玄教授山山下生草如薤葉長尺餘堅紉異常土人名作康成書帶括地圖曰君子民帶劍使兩文虎衣野絲土方千里多薰華之草好讓故為君子國薰華草朝生夕死大極山西有采華之草服之乃通萬里之言服虔通俗曰草盛曰菶脯朦切生茂曰葆音保方言曰凡草生而初達謂之䓲䓲音悅小也荄杜根也東齊曰杜或曰茇博物志曰太原晉陽已北生屏風草又曰黃帝問天老曰天地所生豈有食之令人不死者乎天老曰太陽之草名曰黃精餌而食之可以長生太陰之草名曰鉤吻入口立死人信鉤吻之殺人不信黃精之益壽不亦惑乎又曰海上有草焉名曰蒒音師草其實食之如大夌從七月稔熟民歛穫名曰自然榖或曰禹餘糧又曰類草也其根名為弱頭大者大如升其外理白可以灰汁煮則疑成熟可以苦酒淹食之不以灰煮則不成熟蜀人珍貴之異物志曰文草作酒能成其味以金買草不言其貴以美用之故也王逸子曰草有玄巨暢威憙木有扶桑梧桐松柏皆受氣淳美異於群類者也風俗通曰靈帝光和七年陳留濟陰諸郡路邊草生作人狀操持矛弩牛馬萬狀備具後關東誅董卓陳留濟陰棄好即戎吏民殲殘草妖之興豈不或信抱朴子曰草有黃精一名白及有鴟頭鵝, SBCK: 帚羊桃羊蹄䑕耳䑕}
