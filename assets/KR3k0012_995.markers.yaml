  - {type: variant, offset: 675, length: 0, content: '', WYG: 葛根一名鷄齊根味甘平生川谷治消渴身大熱嘔吐諸痺起隂氣觧毒生汶山吴氏本草曰葛根}
  - {type: variant, offset: 677, length: 3, content: 始嘗百, WYG: 甘生太山說苑曰綿綿之葛在於曠野良工得之以為絺綌良工不得枯死於野楚辭曰石磊磊兮葛蔓蔓怨公子兮悵忘歸君思我兮不得閒藤爾雅曰諸慮山櫐今江東呼櫐為滕似葛而麄大也攝虎櫐今虎豆也纒蔓林樹而生英有尾刺今江東呼之為獵攝二音也廣雅曰藟藤也易困上六曰困于葛藟于臲卼王弼注曰困於極而乘於剛下無其應行則愈危居不穫安故曰困於葛櫐于臲卼者也毛詩南有樛木曰南有樛木葛藟虆之注云興也南南圡也木下曲曰樛南􅁟之葛藟茂盛箋云木枝以下垂之故葛也藟也妾得纍而蔓之而上下俱盛作者喻后妃能以意下逮衆詩義疏曰纍蔓也似燕薁連蔓生蔓白色子赤可食酢而不美也幽州謂之推藟也山海經曰卑山其上多纍郭璞注曰今虎豆狸豆之属也纍也齊書曰觧叔謙字楚梁雁門人也母有疾叔謙夜於庭中稽顙祈福聞空中語云此疾得丁公藤治便差即訪毉及}
