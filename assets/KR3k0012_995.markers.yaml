  - {type: substitution, offset: 2511, original: 尔, replacement: 爾, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-16262}}
  - {type: variant, offset: 2513, length: 1, content: 荍, SBCK: 三月兮􅁑所以爲絺綌也事雖小一日不見於君憂懼於䜛矣又蟋蟀􅁑生曰􅁑生蒙楚蘝蔓于野周書曰􅁑小人得其葉以爲羹君子得其材以爲絺綌以爲君子朝廷夏服吴越春秋曰採􅁑之婦人傷越王用心之苦也作苦何之歌其辭曰􅁑不連蔓葉台台甞膽不苦味苦飴令我採􅁑以作絲􅀃文曰􅁑絺綌草也夲草經曰􅁑根一名鷄齊根味甘平生川谷治消渇身大􅀬嘔吐諸痺起隂氣解毒生汶山吴氏夲草曰􅁑根神農甘生太山􅀃苑曰綿綿之􅁑在於曠野良工得之以爲絺綌良工不得枯死於野楚辭曰石磊磊兮􅁑蔓蔓思公子兮悵忘歸君思我兮不得聞藤爾雅曰諸慮山櫐今江東呼櫐爲藤似􅁑而麁大也攝虎櫐今虎豆也􅆞蔓林樹而生英有尾㓨今江東呼之爲獵攝二音渉也廣雅曰藟藤也易困上六曰困于􅁑虆于臲卼王弼注曰困於極而乗於剛下无其應行則愈繞居不穫安故曰困于􅁑纍于臲卼者也毛詩南有樛木曰南有樛木􅁑藟纍之注云興也南南土也木下曲曰樛南土之􅁑藟茂盛箋云木枝以下垂之故􅁑也藟也得纍而蔓之而上下俱盛興者喻后妃能以意下逮衆妾}
