  - {type: variant, offset: 2617, length: 12, content: 蘺棄於窮巷兮蒺藜蔓乎東廂, SBCK: 南諸山郡中大木断倒者經春夏生菌謂之椹食之有味而忽有毒殺人云此物徃徃自有毒者或云蛇所着之楓樹生者啖之令人􅀏不得止治之飲土漿多愈風土記曰陽羡􅀽君廟有祈雨者則祝稱神命常賜芝草草菌也便以神前酒盃灌地以大羹杯覆之有湏發杯而菌生今猶然異苑曰交州諸郡有菌以葉􅂗人軀便舉體菌生生旣遍便就朽爛肌􅁏消腐承露爾雅曰蔠葵蘩露璞曰承露也大莖小葉花紫黄色蔠音終陳留􅂄舊傳曰梁垣牧爲郡功曹與君歸郷爲赤眉所得賊將啖之牧求先賊長義而釋牧送繁露實一斛扶老汝南先賢傳曰蔡順事母至孝井桔橰朽壞在母生年上順不敢治之俄而有扶老生繞之遂堅晉宮閣名曰華林園扶老三株廣志曰扶老華黄如金名金草太平御覽卷第九百九十八}
