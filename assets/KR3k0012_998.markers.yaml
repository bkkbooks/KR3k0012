  - {type: variant, offset: 341, length: 112, content: 青蒿詩䟽義曰蒿青蒿也荊豫汝陰皆謂之葭東觀漢記曰杜林寄隗囂地終不降志辱身至簪蒿蓆草不食其粟也隋書曰初唐高祖欲遣李密東征朝士諫曰李密性多輕狡好為反叛願勿遣之帝曰蒿箭射蒿蘺耳吾豈不知耶三輔決錄曰孫晨字元公冬月無被以蒿一束暮臥旦收之, SBCK: 冝懷姙焉}
