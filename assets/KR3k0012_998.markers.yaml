  - {type: variant, offset: 1127, length: 371, content: 猶秋蓬也孤其根本密其枝葉也說苑又載莊子曰列子食於道見百歲髑髏攓蓬而指之曰唯予與汝知未曾死未曾生也商君書曰今夫飛蓬遇飄風而行千里者乘風之勢也淮南子曰見飛蓬轉而知為車楚辭曰蓬艾親入御于笫兮笫床簀也喻親密曹植詩曰轉蓬離本根飃搖隨長風可意廻飆舉吹我入雲中高上高無極天路安可窮類此流宕子捐軀遠從戎司馬彪詩曰百草應節生含氣有淺深秋蓬獨何華飃搖隨風轉王朗諫行役夜表曰司空臣朗言朗聞飛蓬隨風集于王梁之衡而駟馬為之奔乳虎為之走蓬非馬之策馬非蓬之敵所以或奔走者驚也蕭爾雅曰蕭荻即高音狄毛詩黍離採葛曰彼採蕭兮一日不見如三秋兮詩義䟽曰蕭今荻蒿也或謂牛尾蒿莖可作燭有香氣故祭祀脂爇之為香也許慎以為艾蒿非也禮王度記曰士蕭庶人艾艾蕭不同明矣又蓼蕭曰蓼蕭澤及四海也蓼彼蕭斯零露湑兮周禮天官上曰甸師祭祀供蕭茅說文曰蕭艾蒿也莊子曰河上有家貧窮緯蕭為業司馬彪曰蕭蒿也緯織也織蒿為箔, SBCK: ''}
