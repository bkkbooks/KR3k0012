  - {type: variant, offset: 336, length: 1, content: 蒿, SBCK: 苹鄭玄云藾蕭也詩義䟽云藾蕭葉青白色莖似􅆱而輕脆始生者可食亦可蒸也啇蕀爾雅曰髦㒹蕀孫炎曰一名白􅁄郭璞曰細葉有刺蔓生一名商蕀廣雅云女木也􅀼衣爾雅曰九例切蒘切除􅀼衣孫炎曰江淮間食之其花着人衣故曰切衣郭璞曰似芹可食實大如夌兩相合有毛着人衣芣苢爾雅曰芣苢馬舄馬舄車前也郭璞曰今車前草大葉長僡好生道邊江東呼蝦蟇衣周書所載同名耳非此芣苢廣雅曰芣苢當道馬舄毛詩閞睢曰芣苢后妃之德也採採芣音浮苢薄言採之}
