  - {type: variant, offset: 1932, length: 1, content: 莎, SBCK: 洛中人有驅羊入蜀者胡葸子着羊毛蜀人取種因名羊􅀒菜卷施爾雅曰卷施草拔心不死􅀫羌也離騷云南越志曰寜郷縣草多卷施江淮間謂之􅀫莾薔薇神農本草曰薔薇一名牛􅂰一名薔麻吴氏本草曰薔薇一名牛勒一名牛􅂰一名薔薇一名出􅀥茿爾雅曰竹篇疋善切蓄郭璞注云似小藜赤莖節好生道旁可食又殺蟲􅀃文曰萹茿也從草扁聲本草經曰萹萹一名萹竹吴氏本草曰萹蓄一名畜辯一名萹􅕃􅀑目爾雅曰符􅀑目郭璞曰今江東有􅀑目草莖似葛葉圎而毛子如耳璫赤色生吴志曰建鄴有􅀑目菜於工人黄狗家生依􅀥樹長丈餘莖廣四寸厚二分夲草經曰􅀑目一名東方􅀫一名連蟲陸名羊蹄覆盆爾雅曰茥􅀂圭切蒛去恱切葐郭璞曰覆盆也實似莓而小亦可食孫炎曰青州曰茥廣雅曰蒛葐陸英梅也抱朴子曰俗人見方用蒛葐覆葐謂之瓦噐近易之草或不知蓬累一名陵累甄氏本草曰覆葐子一名馬瘻一名陸荆酢漿爾雅曰葴寒漿今酸漿草江東呼曰􅀂葴音針夲草曰酢漿一名酸平寒無毒生川澤及人家田園中治􅀬煩滿定志益氣利水道産難吞其實立産吴氏夲草曰酸漿一名酢漿稂爾雅曰稂童梁也稂莠􅀋也國語曰季文子相宣成無衣帛之妾無食粟之馬仲孫他諌曰不華國也文子曰吾聞以德榮爲華不聞以妾與馬獻子聞囚之七日自是妾衣七升之布馬食稂莠文子曰過而能改民之上也夫逹曰仲孫他孟獻子庶字毛詩曹蜉蝣下泉曰冽彼下泉浸彼苞稂稂同梁也又大田曰不稂不莠去其螟􅭈詩義䟽曰禾粟秀爲穗而成崱嶷如骨之童稂莠毛詩甫田曰無田甫田維莠驕驕甫大也田過度而無無大人切終不能􅀗無思逺人勞心忉忉韋曜問荅曰甫田維莠今何草荅曰今之狗尾也左傳襄六曰鄭公孫揮過伯有氏其門上生莠子羽曰其莠猶在乎以莠喻伯有伯有侈知其不能乆存晉書曰明帝時王如舉兵作亂令人種禾禾悉變莠俄而軍敗降於王敦爲敦所煞綬爾雅曰虉綬小草有􅄂色似綬虉五歴切毛詩義䟽曰鵲五色作綬文故曰綬草臺爾雅曰臺夫湏臺}
