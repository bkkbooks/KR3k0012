  - {type: variant, offset: 2181, length: 409, content: 義熙中宮城上及御道左右皆生蒺藜亦草妖也說苑曰晉平公置酒虒祁之臺使郎中馬童布蒺藜於階下令召師曠師曠至履而上堂仰天歎曰夫肉生蟲還自食木生蠹還自刻人出妖還自得九鼎之具不當生王堂廂不當生蒺藜來八日脩百官立太子君將死矣至期果死又曰陽虎得罪於衛北見簡子曰自今以來不復樹人矣簡子曰何哉陽虎對曰夫堂上之人吾所樹者過半朝廷之吏邊境之士臣所立者亦過半矣今夫堂上之人親劫臣於君朝廷之吏親危於法邊境之士親劫臣於外簡子曰唯賢者為能報愚不肖者不能夫樹桃李者夏得其休息秋得食焉樹蒺藜者夏不得休息秋得其剌焉今子之所樹者蒺藜也非桃李也自今以來擇人而樹之毋已樹而擇之續搜神記曰沛國一士人姓周生三兒向應可語便啞有一人逕門過乞飲曰君有罪可遠內自思我於外待君主人異其言乃知非常人便入內思諐愆同出謂客曰昔為小兒時鷰巢中有三子試以指納巢中鷰子亦出口承之乃取三蒺藜與其子其子吞之即死其母尋還不復見其子出徘徊悲鳴而去有此事今甚悔之客曰是矣便聞其兒言語周正客乃去不知所在, SBCK: 土􅋎芴}
