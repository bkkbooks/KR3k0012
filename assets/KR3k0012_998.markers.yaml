  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_998-1a}
  - {type: variant, offset: 0, length: 2629, content: 百卉部四荼爾雅曰荼苦菜苦菜可食毛詩谷風曰誰謂荼苦其甘如薺又蟋蟀采苓曰采苦采苦首陽之下苦苦采禮記月令孟夏曰小滿之日苦菜秀蔡邕章句曰苦菜也不榮而實謂之秀廣雅曰遊冬苦菜也䓞說文曰䓞草可以染黃漢書曰諸侯王盭音戾綬如淳曰盭綠出晉灼曰盭草名出瑯琊平昌縣似艾可染因以為綬名蒿爾雅曰蘩皤蒿郭璞注曰白蒿也蒿菣也郭璞注曰今人採青蒿香中炙啗者為葭也葭愆刀切蔚牡菣無子者又曰繁之醜秋為蒿醜類也春時各有種名至秋老成皆通呼為蒿大戴記曰周時德澤洽和蒿茂大以為蒿柱名為蒿宮此天子之露寢也博物又載陸機毛詩䟽義曰采繁爾雅曰皤蒿也凡艾色白為皤今白蒿是也春生秋乃香美可生食蒸一名遊胡北海人謂之旁勃又曰匪莪伊蔚蔚牡蒿牡菣也似蒿三月始生七月花花似胡麻花而紫赤八月為角角似小豆角銳而長一名馬新蒿毛詩鹿鳴曰呦呦鹿鳴食野之蒿毛云葭也青蒿詩䟽義曰蒿青蒿也荊豫汝陰皆謂之葭東觀漢記曰杜林寄隗囂地終不降志辱身至簪蒿蓆草不食其粟也隋書曰初唐高祖欲遣李密東征朝士諫曰李密性多輕狡好為反叛願勿遣之帝曰蒿箭射蒿蘺耳吾豈不知耶三輔決錄曰孫晨字元公冬月無被以蒿一束暮臥旦收之神仙服食經曰十一月採彭勃彭勃白蒿也兔食之壽八百歲莪蒿爾雅曰莪蘿今莪蒿也亦曰廩蒿毛詩曰菁菁者莪樂育材也菁菁者莪在彼中阿又谷風蓼莪曰蓼蓼者莪匪莪伊蒿詩義䟽曰莪蒿也生澤田漸洳處葉似邪蒿細科二月中生莖葉可食又可蒸香美頗似蔞蒿說文曰莪蒿也從草我聲廣志曰莪蒿䕲蒿錢塘記曰靈隱山穀樹樹下生莪鬱茂若沃土所生蔞毛詩關睢漢廣曰言刈其蔞蔞蒿也陸機毛詩義䟽曰蔞葉似艾白長數寸高尺餘好生水中脆美可食王芻爾雅曰菉王芻也菉蓐也今呼鴟腳莎吳氏本草曰王芻一名黃草神農雷公生太山山谷治身熱邪氣小兒身熱蓍洪範五行傳曰蓍之為言蓍也百年一本生百莖此草木之壽知吉凶者也聖人以問鬼神焉說文曰蓍蒿屬也生千歲三百莖易以為數天子蓍九尺諸侯七尺大夫五尺士三尺史記曰天下和平王道得而其莖長大其叢生者百莖共根今世取八十莖八尺即難得矣六十莖長六尺即可用也淮南子曰上有叢耆下有神龜論衡曰蓍生七十歲生一莖七百歲生十莖神靈之物故遲也蓬爾雅曰齧彫蓬薦黍蓬別蓬種類尚書大傳曰子夏於壤室編蓬戶彈琴瑟以歌先生之風可以發憤矣毛詩鵲巢騶虞曰彼茁者蓬蓬草名也又伯兮曰自伯之東首如飛蓬禮記內則曰射人以桑弧蓬矢六射天地四方桑弧蓬矢本太古也天地四方男子所有事也禮記儒行篇曰蓬戶甕牖編蓬為戶也魏略曰鮑出值飢餓採蓬實得數斗為母作食三輔決錄曰張仲蔚平陵人也與同郡魏景卿俱隱身不仕明天官博物好屬詩賦所居蓬蒿沒人管子曰無法程式飛捶而無所定謂之飛蓬之間明王聽此言曾子曰蓬生麻中不扶自直白沙在泥與之皆黑晏子曰魯哀公失國走齊景公問焉曰子之年甚少矣道止于此乎哀公對曰吾少之時人多愛我者吾禮不能親人多諫我者吾忌不能從以內無弼外無輔弼輔無一人謟諛者甚眾譬之猶秋蓬也孤其根本密其枝葉也說苑又載莊子曰列子食於道見百歲髑髏攓蓬而指之曰唯予與汝知未曾死未曾生也商君書曰今夫飛蓬遇飄風而行千里者乘風之勢也淮南子曰見飛蓬轉而知為車楚辭曰蓬艾親入御于笫兮笫床簀也喻親密曹植詩曰轉蓬離本根飃搖隨長風可意廻飆舉吹我入雲中高上高無極天路安可窮類此流宕子捐軀遠從戎司馬彪詩曰百草應節生含氣有淺深秋蓬獨何華飃搖隨風轉王朗諫行役夜表曰司空臣朗言朗聞飛蓬隨風集于王梁之衡而駟馬為之奔乳虎為之走蓬非馬之策馬非蓬之敵所以或奔走者驚也蕭爾雅曰蕭荻即高音狄毛詩黍離採葛曰彼採蕭兮一日不見如三秋兮詩義䟽曰蕭今荻蒿也或謂牛尾蒿莖可作燭有香氣故祭祀脂爇之為香也許慎以為艾蒿非也禮王度記曰士蕭庶人艾艾蕭不同明矣又蓼蕭曰蓼蕭澤及四海也蓼彼蕭斯零露湑兮周禮天官上曰甸師祭祀供蕭茅說文曰蕭艾蒿也莊子曰河上有家貧窮緯蕭為業司馬彪曰蕭蒿也緯織也織蒿為箔山海經曰囊山之陰多蕭郭璞詩曰得意在蘭蓀忘懷寄蕭艾艾爾雅曰艾冰臺今艾蒿也毛詩黍離採葛曰彼採艾兮一日不見如三歲兮齊書曰紀僧真為高帝冠軍府參軍主簿僧真夢蒿艾生滿江驚而白之高帝曰詩人採蕭蕭即艾也蕭生斷流卿勿廣言陳書曰陳暄素通脫以俳優自居慠弄轉甚後主稍不能容後遂搏艾為帽加于其首以火爇之燃及於髮垂涕求哀聲聞於外而弗之釋莊子曰越王子搜逃乎丹穴越國無君求王子搜不從之丹穴不肯出越人薰之以艾孟子曰七年之病求三年之艾漢武帝內傳曰削冰令正圓舉以向月以艾於後承其影得火師曠占曰歲疫病草先生病草者艾也崔寔四民月令曰三月可採艾王瓜周書曰立夏之日螻蟈鳴又五日丘蚓出又五日王瓜生禮記月令曰孟夏之月王瓜生春秋運斗樞曰機星散為祓葜薇爾雅曰薇垂水生於水邊毛詩鵲巢草蟲曰陟彼南山方採其薇又曰采薇遣戍役也采薇采薇薇亦柔止史記曰伯夷叔齊義不食周粟隱首陽山採薇而食之廣志曰薇葉似萍可蒸食三秦記曰伯夷食薇三年顏色不異武王戒之不食而死莎爾雅曰薃胡老切侯莎其實媞夏小正曰薃也者莎䔺媞者其實媞大分切廣雅曰地毛莎䔺也廣志曰莎可以為雨衣毛詩題綱曰南山有臺臺一名夫須莎草也言山生臺及莎以自蔭喻人君得賢以自尊也後周書曰豆盧寧嘗與梁人企定遇於平涼川相與肆射乃於百步懸莎草以射之七發五中企定時以為能贈遺甚厚任昉述異記曰昔戰國時魏國苦秦之難有民從征戍秦不返其妻思之而卒既葬塚上生木枝葉皆向夫所在而傾因謂之相思木今秦趙間有相思草狀若石竹而節節相續一名斷腸草又名愁婦草亦名孀草人呼為寡婦莎蓋相思之流也蒺藜爾雅曰茨蒺藜也布地蔓生細葉子有三角剌人易困卦曰困于石據于蒺藜入于其宮不見其妻凶毛詩曰牆有茨衛人剌其上也牆有茨不可掃也晉中興書徵祥說曰義熙中宮城上及御道左右皆生蒺藜亦草妖也說苑曰晉平公置酒虒祁之臺使郎中馬童布蒺藜於階下令召師曠師曠至履而上堂仰天歎曰夫肉生蟲還自食木生蠹還自刻人出妖還自得九鼎之具不當生王堂廂不當生蒺藜來八日脩百官立太子君將死矣至期果死又曰陽虎得罪於衛北見簡子曰自今以來不復樹人矣簡子曰何哉陽虎對曰夫堂上之人吾所樹者過半朝廷之吏邊境之士臣所立者亦過半矣今夫堂上之人親劫臣於君朝廷之吏親危於法邊境之士親劫臣於外簡子曰唯賢者為能報愚不肖者不能夫樹桃李者夏得其休息秋得食焉樹蒺藜者夏不得休息秋得其剌焉今子之所樹者蒺藜也非桃李也自今以來擇人而樹之毋已樹而擇之續搜神記曰沛國一士人姓周生三兒向應可語便啞有一人逕門過乞飲曰君有罪可遠內自思我於外待君主人異其言乃知非常人便入內思諐愆同出謂客曰昔為小兒時鷰巢中有三子試以指納巢中鷰子亦出口承之乃取三蒺藜與其子其子吞之即死其母尋還不復見其子出徘徊悲鳴而去有此事今甚悔之客曰是矣便聞其兒言語周正客乃去不知所在也本草經曰蒺藜一名止行一名升雅一名傍通一名水香離騷曰江蘺棄於窮巷兮蒺藜蔓乎東廂, WYG: ''}
