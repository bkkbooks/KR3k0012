  - {type: variant, offset: 747, length: 365, content: 尺大夫五尺士三尺史記曰天下和平王道得而其莖長大其叢生者百莖共根今世取八十莖八尺即難得矣六十莖長六尺即可用也淮南子曰上有叢耆下有神龜論衡曰蓍生七十歲生一莖七百歲生十莖神靈之物故遲也蓬爾雅曰齧彫蓬薦黍蓬別蓬種類尚書大傳曰子夏於壤室編蓬戶彈琴瑟以歌先生之風可以發憤矣毛詩鵲巢騶虞曰彼茁者蓬蓬草名也又伯兮曰自伯之東首如飛蓬禮記內則曰射人以桑弧蓬矢六射天地四方桑弧蓬矢本太古也天地四方男子所有事也禮記儒行篇曰蓬戶甕牖編蓬為戶也魏略曰鮑出值飢餓採蓬實得數斗為母作食三輔決錄曰張仲蔚平陵人也與同郡魏景卿俱隱身不仕明天官博物好屬詩賦所居蓬蒿沒人管子曰無法程式飛捶而無所定謂之飛蓬之間明王聽此言曾子曰蓬生麻中不扶自直白沙在泥與之皆黑晏子曰魯哀公失國走齊景公問焉曰子之年甚少矣道止于此乎哀公對曰吾少之時人多愛我者吾禮不能親人多諫我者吾忌不能從以內無弼, SBCK: 日}
