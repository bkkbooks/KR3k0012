  - {type: variant, offset: 2607, length: 8, content: 傍通一名水香離騷, SBCK: 列子曰朝菌不知晦朔朽穰之上有菌芝者生於朝死於晦莊子曰朝菌不知晦朔司馬曰大芝也天隂時生糞土見時萎故不知月始終吕氏春秋曰菜之美者駱越之菌􅀃􅁐曰雍門周對孟常君曰夫以􅁗楚之強而報於弱薛譬猶磨蕭斧而伐朝菌也􅀶物志}
