  - {type: variant, offset: 2894, length: 0, content: '', SBCK: 苦平歧伯酸扁鵲李氏大寒雷公鹹無毒五月五日採黄環本草經曰黄環一名凌泉一名大就味苦生山谷主治蟲毒􅀑魅邪氣欬逆寒􅀬生蜀郡范子計然曰黄環出魏郡黄色者善呉氏本草經曰蜀黄環一名生蒭一名根韭神農黄帝歧伯桐君扁􅍎}
  - {type: page-break, offset: 2894, content: '', id: KR3k0012_SBCK_993-6a}
  - {type: variant, offset: 2894, length: 0, content: '', krp: 苦平歧伯酸扁鵲李氏大寒雷公鹹無毒五月五日採黄環本草經曰黄環一名凌泉一名大就味苦生山谷主治蟲毒鬼魅邪氣欬逆寒熱生蜀郡范子計然曰黄環出魏郡黄色者善呉氏本草經曰蜀黄環一名生蒭一名根韭神農黄帝歧伯桐君扁鵲}
  - {type: punctuation, offset: 2895, content: ，, id: KR3k0012_CHANT_993-bkkpn1308}
  - {type: 'tls:seg', offset: 2895, content: '', id: KR3k0012_CHANT_993-68a.9}
  - {type: variant, offset: 2895, length: 0, content: '', SBCK: 一經味苦有毒二月生􅀄出正赤高二尺葉黄貟端大莖葉有汁黄白五月實貟三月採根根黄從理如車輻解治蠱毒莵􅁝爾雅曰唐蒙女蘿莵􅁝也廣雅曰女蘿松蘿也菟丘莵絲也史記􅀛筞傳曰下有伏苓上有莵絲􅀶物志曰女蘿菟絲􅀉草上根不着地吕氏春秋曰或謂菟絲無根非無根也其不屬也伏苓是也淮南子曰莵絲無根而生伏苓抽莵絲死抱朴子曰案仙方中自有合離草一名獨摇一名離母所以謂之合離下根如芋魁有遊子十二枚周環之大魁數尺雖相湏生而實不連以氣相屬耳如莵絲之草下有茯莵之根無此莵在下則絲不得生於上又曰􅀄生之根其形似兎掘取刻其血以和丹服之立變化在意所作呉氏本草經曰兎絲實一名玉女一名松蘿一名鳥蘿一名鴞蘿一名􅃨實一名赤䋞生山谷劉楨詩曰青青女蘿草上依髙松枝幸蒙庇眷恩爲惠不可訾石芸爾雅曰茢勃茢也郭璞注曰一名石共音列范子計然曰石芸出三輔甘遂廣雅曰陵旱甘遂也建康記曰建康出甘遂本草經曰甘遂味苦寒生川谷治大腹疝瘕脹滿面目浮腫除留飲􅀫食岀中山范子計然曰甘遂出三輔呉氏本草經曰甘遂一名主田一名日澤一名重澤一名􅀑醜一名陵藁一名甘藁一名苦澤神農桐君苦有毒歧伯雷公有毒湏二月八月採馬刀本草經曰馬刀味辛微寒生池澤治􅀘中漏下赤白留寒􅀬破石淋殺禽獸賊䑕生江海范子計然曰馬刀岀河東呉氏本草經曰馬刀一名齊􅧳古納切神農歧伯桐君鹹有毒扁鵲}
