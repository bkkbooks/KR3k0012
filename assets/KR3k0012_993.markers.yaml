  - {type: variant, offset: 2929, length: 0, content: '', SBCK: 淮木吴氏本草曰淮木神農雷公無毒生晉平陽河東平澤治乆欬上氣傷中羸虚􅀘中益氣百部抱朴子内篇曰百部黄似㧞揳治咳殺風􅀶物志曰百部與門冬相似千歳垣中膚皮吴氏本草曰千歳垣中膚皮得薑赤石脂共治葐爾雅曰茥音奎葐覆葐也實似莓而小可食吴氏本草曰􅆙一名决盆蒱隂實吴氏本草曰蒱隂實生平谷或圃中延􅟵如􅀲葉實如桃七月採止温延年太平御覽卷第九百九十三}
