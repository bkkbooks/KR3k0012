  - {type: variant, offset: 338, length: 0, content: '', WYG: 桔梗一名符蔰一名白藥一名利如一名梗草一名盧如神農醫和苦無毒扁鵲黄帝鹹岐伯雷公甘無毒李氏大寒葉如薺苨莖如筆管紫赤二月生巴豆廣雅曰巴菽巴豆也蜀志曰揵為南安縣出巴豆晉書曰賈后使太醫令程㨿合巴豆杏子丸矯詔使黄門孫慮賫至許昌以害太子列仙傳曰𤣥俗河間人餌巴豆賣藥都市七丸一錢盛宏之荆州記曰朐䏰縣有巴子城地多巴豆廣志曰揵為􅈎道縣出巴豆慱物志曰䑕食巴豆三年重三十斤本草經曰巴豆一名巴菽味辛温生川谷主治温瘧傷寒熱破瘕結堅通六府去惡肉除鬼毒邪注殺蟲生巴蜀郡范子計然曰巴菽出巴郡呉氏本草經曰巴豆一名菽神農岐伯桐君辛有毒黄帝甘有毒李氏主温熱寒葉如大豆八月採鬼臼呉氏本草經曰一名九臼一名天臼一名雀屏一名馬目公一名解毒生九真山谷及宛句二八月採根莾草范子計然曰莾草出三輔青色者善淮南萬畢術曰莾草浮魚取莾草葉并陳粟米合𢷬之以內水魚皆死本草經曰莾草味辛温生山谷治風頭癰乳疝瘕結氣疥瘙疽瘡生還谷呉氏本草經曰莽草一名芒草神農辛雷公桐君苦有毒生上谷山中或宛句五月採治風忍冬本草經曰忍冬味甘乆服輕身滛}
