  - {type: variant, offset: 2218, length: 711, content: 輔吳氏本草曰紫威一名武威一名瞿夌一名陵居腹一名鬼目一名芙華神農雷公酸歧伯辛扁鵲苦鹹黃帝甘無毒如夌根黑正月八月採或生真定大戟爾雅曰蕎邛鉅郭璞注曰今藥草大戟也本草經曰大戟一名邛鉅栝樓毛詩東山曰我來自東零雨其濛果臝之實亦施于宇果臝栝樓也又唐蟋蟀葛生曰蘞蔓于野詩義䟽曰蘞栝樓爾雅曰果臝之實栝樓今齊人呼之為天瓜本草經曰栝樓一名地樓味苦寒生川谷吳氏本草曰栝樓一名澤巨一名澤冶蕤核本草經曰蕤核味甘溫生川谷主治心腹邪結氣明目赤痛傷淚出目腫眥爛久服益氣輕身生函谷晉宮閣記曰華林園蕤三株吳氏本草曰蕤核一名𦳚神農雷公甘無毒平生池澤八月採補中強志明耳目久服不飢地膚本草經曰地膚一名地華一名地脈一名地蔡貝母毛詩鄘柏舟載馳曰陟陂阿丘言採其䖟䖟貝母也爾雅曰莔音䖟貝母也郭璞曰根如小貝負而白華葉似韭說文曰莔貝母也海藻爾雅曰𧂇海藻也藥草也一名海羅如亂髮生海中𧂇音覃本草經曰海藻著頸下破散結廣雅曰海羅海藻豕首爾雅曰茢音列薽音真豕首郭璞注曰本草經曰彘盧一名蠩蘭今江東呼稀首本草經曰豕首一名劇草一名蠡實吳氏本草曰一名澤藍一名豕首神農黃帝甘辛無毒生冤句五月採當陸爾雅曰遂音逐薚音陽馬尾也郭璞注曰江東謂之當陸關西為薚本草經曰商陸一名夜乎敗醬范子計然曰敗醬出三輔本草經曰敗醬似桔梗其臭如敗豆醬綸布本草經曰綸布一名昆布味酸寒無毒主十二種水腫癭瘤藂結氣瘻瘡生東瘡石龍芮范子計然曰石龍芮出三輔吳氏本草經曰龍芮一名水薑苔虵床吳氏本草經曰虵床一名虵珠博物志曰虵床亂蘪蕪雲實本草經曰雲實味辛溫生川谷治泄利脹癖殺蟲蠱毒去邪惡多食令人狂走久服輕身通神明生河間范子計然曰雲實生三輔吳氏本草經曰雲實一名員實一名天豆神農辛小溫黃帝鹹雷公苦葉如麻兩兩相值高四五尺大莖空中六月花八月九月實十月採, WYG: ''}
