  - {type: variant, offset: 3453, length: 2, content: 壃奇, SBCK: 人皆冠象鷄也和訶條支僧載外國事曰和訶條國在大海中地方二萬里大山名三漫屈有石井井中生千葉白蓮花數種井邊石上有四佛足迹毎月六齋日弥勒菩薩常以諸天神禮佛迹畢便飛去國王長者常作金樹銀花銀樹金花以供奉佛播􅀺曰支僧載外國事曰播􅀺曰國者昔是小國耳今是外國之大都流沙之外悉稱臣妾􅃕衛支僧載外國事曰舎衛國今無復王盡屬播􅀺曰國王遣小兒注國人不奉佛法維耶離支僧載外國事曰維耶離國去合衛五十由旬者晉言三十里維摩詰家在城内國人不復奉佛悉事}
  - {type: page-break, offset: 3453, content: '', id: KR3k0012_SBCK_797-9b}
  - {type: variant, offset: 3453, length: 2, content: 壃奇, WYG: 雞城其人首冠象雞也和訶條支僧戴外國事曰和訶條國在大海中地方二萬里有十大山名三漫屈有石井井中生千葉白蓮花數朶井邊石上有四佛足跡每月六七日彌勒菩薩常以諸天神禮佛迹畢便飛去國王長者常作金樹銀花銀樹金花以供奉佛播黎曰支僧戴外國事曰播黎曰國者昔是小國耳今是外國之大都流沙之外悉稱臣妾舎衛支僧戴外國事曰舎衛國今無王盡屬播黎曰國王遣小兒住國人不奉佛法維耶離支僧戴外國事曰維耶離國去舎衛五十里國人不復奉佛迦維羅越支僧戴外國事曰迦維羅越國今無復王土也國人亦屬播黎曰國昔太子生時有二龍一吐}
