  - {type: variant, offset: 857, length: 641, content: 差獠魏書曰獠之初也出自梁益之間種類甚多散居山谷略無氏族之別依樹積水以居其上名曰干蘭干蘭大小隨其家之口數往往推一長者為王父死則子繼若中國之黨族也僚王各有鼓角一雙使其子弟自吹擊之好相殺害多仇怨不敢遠行性同禽獸至於忿怒父子不相避唯手有兵刃者先殺之若殺其父走避於外求得一狗以謝其母然後敢歸母得狗謝不復嫌恨若報怨相攻擊必殺而食之平常劫掠責取豬狗而已親戚比鄰指授相賣亡兒女哭止便不復追思唯執楯持矛不識弓矢用竹為簧群聚鼓之以為音節能為細布色鮮淨大狗一頭買一生口其俗畏鬼神尤尚淫祀所殺之人美髯髯者剝其面皮籠之於竹及燥號曰鬼鼓舞祀之以求福也北史曰獠者蓋南蠻之別種自漢中達于卭笮川洞之間所在皆有種類甚多所生男女無名字唯以長幼次第呼之其丈夫稱阿謨阿叚婦人阿夷阿等之類皆語之次第稱謂也鑄銅為器大口寬腹名曰銅爨既薄且輕易於熟食建國中李勢在蜀諸獠始出巴西渠川廣漢陽安資中攻破郡縣為益州大患自桓溫破蜀之後蜀人東流山險之地多空獠遂挾山傍谷與夏人參居者頗輸租賦在深山者不為編戶梁益二州歲伐獠以裨潤公私頗藉為利正始中夏侯道遷舉漢中內附宣武遣尚書邢蠻為梁益二州刺史以鎮之近夏人者安堵樂業在山谷者不敢為寇其後朝廷以梁益二州控攝嶮遠方乃立巴州以統諸獠後以巴酋嚴始欣為刺史又立隆城鎮所綰獠二十萬戶及周文平梁益令在所撫慰然天性暴亂旋致擾動每歲命隨近州鎮出兵討之獲其生口以充賤隸謂之為壓獠焉永昌郡傳曰獠民喜食人以為至珍美不自食其種類也怨仇乃相害食耳能水中潛行行數十里能水底持刀刺捕取魚其人以口嚼食並以鼻飲水死人有棺其葬豎棺埋之丁令, SBCK: 五菓伽倍}
