  - {type: variant, offset: 1201, length: 297, content: 且輕易於熟食建國中李勢在蜀諸獠始出巴西渠川廣漢陽安資中攻破郡縣為益州大患自桓溫破蜀之後蜀人東流山險之地多空獠遂挾山傍谷與夏人參居者頗輸租賦在深山者不為編戶梁益二州歲伐獠以裨潤公私頗藉為利正始中夏侯道遷舉漢中內附宣武遣尚書邢蠻為梁益二州刺史以鎮之近夏人者安堵樂業在山谷者不敢為寇其後朝廷以梁益二州控攝嶮遠方乃立巴州以統諸獠後以巴酋嚴始欣為刺史又立隆城鎮所綰獠二十萬戶及周文平梁益令在所撫慰然天性暴亂旋致擾動每歲命隨近州鎮出兵討之獲其生口以充賤隸謂之為壓獠焉永昌郡傳曰獠民喜食人以為至珍美不自食其種類也怨仇乃相害食耳能水中潛行行數十里能水底持刀刺捕取魚其人以口嚼食並以鼻飲水死人有棺其葬豎棺埋之丁令, krp: 知}
