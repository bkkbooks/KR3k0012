  - {type: variant, offset: 12, length: 2, content: 莎車, SBCK: 天山西䟽榆谷去長安八千三百六十餘里後漢書曰蒲􅀋國王居天山西䟽榆谷廬帳而居逐水草頗知田作有牛馬駱駞羊畜能作弓矢國出名馬蒲􅀋本大國也前西域屬匈奴時蒲􅀋王得罪單于單于怒徙蒲國人民六千餘口内之匈奴右部阿惡地号曰阿惡國􅀄徙居時甚貧羸不能者逃亡在山谷間故得留爲蒲􅀋國云小宛漢書曰小宛國王治扞零城去長安七千二百一十里東與婼􅆧接精絶漢書曰精絶城國王治精絶城去長安八千八百二十里地阨狹西通扞弥四百六十里渠勒漢書曰渠勒國王治鞬都}
