  - {type: variant, offset: 3440, length: 0, content: '', WYG: 千五百六十里居山谷之間弗敵沙後魏書曰弗敵沙國古肸頓翕侯所治薄茅城也在鉗敦西去代一萬三千六百里居山谷間臨兒魏略曰臨兒國浮屠經云其國王生浮屠太子也父曰屑頭耶母曰莫耶浮屠身服黄色髮青浮有青毛冬亦始莫耶夢白象而孕及生從母右脅出地能行七八歩漢哀帝元壽元年博王景庸從月氐王使伊存口授浮屠經其所載扵老子經相出入盖以老子西出關教胡爲浮屠也貲虜魏略曰貲虜本匈奴之奴也匈奴名奴婢為貲姑建武時匈奴衰分其奴婢亡匿在金城武威酒泉北卑水東畜牧逐水草抄盗凉州不與東部鮮卑同也其衆非一有大胡丁令羗雜處並本亡奴婢也盤越魏書曰盤越國一名漢越王在天竺東南數千里與益部相近其人小大與中國人同監長山海經曰西海中有監長國其人鳥首亦名鳥氏竒恒括地圖曰竒恒民善為機巧設百禽為飛車從風逺行湯時西風多竒恒車至扵豫州湯破其車十年西風到乃令復作車遣歸去玊門四萬里石尖𤣥中記曰土門之西南羗之東有一國五六百户無他事役國中有山山上有祠廟國人每嵗出石尖數千枚輸扵廟中名霹靂尖以給霹靂所用從春雷出而尖日減至秋尖盡扶伏𤣥中記曰扶伏民者黄帝軒轅之臣曰茄豐有罪刑而放之扶伏而去是後爲扶伏民去玊門關二萬五千里可蘭沙州記曰大白蘭西北千二百里有可蘭國風俗卑陋從開闢來口不知榖味目不識五色耳不聞六律五聲是西夷中不臧者土無所出直大養羣畜而已户落萬餘其人頑弱見異人舉國便走鵠國神異經曰四海之中有鵠國男女皆長七寸爲人自然有禮好談論跪拜其人嵗夀三百行如飛日行千里有百物不敢犯之惟畏海鵠鵠遇吞之亦夀三百嵗人在鵠腹中不死而鵠一舉千里無不逹神異經曰西南大荒中有人焉長一丈腹圍九尺龜蛇戴朱鳥左手慿青龍右手憑白虎知河海升斛識山石多少知鳥獸言語知百榖可食識草木甘苦名曰聖一名哲一名無不逹凡人見拜者令人神知無繼民外國圖曰無繼民宂居食土無夫婦死則埋之心不朽百年復生去玊門四萬六千里録民外國圖曰録民宂居食土無夫婦死則埋之其肺不朽百年復生去玊門}
