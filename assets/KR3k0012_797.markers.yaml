  - {type: variant, offset: 2805, length: 610, content: 溫宿北去代一萬六百五十里滑國通典曰滑國車師之別種後漢順帝永建初八滑從班勇擊北虜有功漢以八滑為後部親漢侯自魏晉以來不通中國至梁武帝普通初其王厭帶夷粟陁始遣使獻黃師子白貂裘波斯錦物等後魏之居桑乾也滑猶小國屬蠕蠕後稍強大征其傍國波斯渴槃罽賓龜茲踈勒姑墨于闐等國焉其獸有師子兩腳駞人皆善騎射著小袖長身袍用金王為帶女人被裘頭上刻木為角長咫尺以金銀飾之兄弟共妻無城以氈屋為居東向開戶其王金床隨太歲轉無文字以木為契與旁國通用胡書羊皮為紙無職官事天神火神每日出祀神而後食其跪一拜而止死以木為槨父母死其子截一耳葬訖即吉其言語待譯然後通至後魏時謂之濅噠國或云高車之別種或云大月氐之種其源出於塞北自金山至後魏文帝時已八九十年矣在于闐之西東去長安萬一千里衣服類胡加以纓絡頭皆剪髮其語與蠕蠕高車及諸諸胡不同部眾可十萬依隨水草其國無車輿多駞馬用刑嚴急盜無多少皆腰斬盜一責十死者富家累石為藏貧事者掘地而埋隨身諸物皆置塚內又兄弟共聚一妻無兄弟者其妻戴一角帽若有兄弟者依其多少之數更加帽角焉西城康居于闐沙勒安息及諸小國三十許皆役屬之號為大國每遣使朝貢孝明帝熙明中遣使伏子統宋雲使西域所經諸國不能知其本末及山川里數今舉其略云至隋時又謂挹怛國都烏滸水南二百餘里大月氐之種類也勝兵五六萬人俗善戰先時國亂突厥遣通設字誥強領其國俗同吐火羅南去漕國千五百里東去瓜州六千五百里大業中遣使來貢按劉璠梁典滑國姓濅達後裔以姓為國號轉訛又謂之悒怚焉姑默北史曰姑默國居南城在龜茲, SBCK: 伽倍}
