  - {type: variant, offset: 1694, length: 302, content: 熙平中宋雲等使終不能達澤散通典曰澤散國魏時聞焉屬大秦其治在海中央最與安息城谷相近西南詣大秦不知里數女國北史曰女國在葱嶺南其國世以女為王姓蘇毗字末羯在位二十年女王夫號曰金聚不知政事國內丈夫唯以征伐為務山上為城方五六里人有萬家王居九層之樓侍女數百人五日一聽朝復有小女王共知國政其俗婦人輕丈夫而性不妬忌男女皆以彩色塗面一日中或數度變改之皆披髮以皮為鞋課稅無常氣候多寒以射獵為業出鍮石朱砂麝香犛牛驄馬蜀馬猶多鹽恒將鹽向天笁興販其利數倍亦數與天笁党項戰爭其女王死國中厚歛金錢求死者族之中賢女二人一為女王次為小王貴人死剝皮以金屑和骨內置瓶中埋之經一年又以其皮內鐵器埋之俗事阿修羅神又有樹神歲初以人祭或用獼猴祭呼得通典, krp: 書}
