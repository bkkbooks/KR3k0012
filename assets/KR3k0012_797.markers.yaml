  - {type: variant, offset: 491, length: 240, content: 辛頭河北西北去賖彌國千餘里東北至瓜州五千四百里其婆羅門種類戶數萬餘有弓矢刀矟皮甲國法不數人重罪流輕者杖國無課稅其俗事佛王及庶人剪髮衣錦袍不開縫貧者自疊婦人為髻衣裙衫帔長巾俗清潔氣候溫多稻有羊馬牛鍮石訶梨勒石蜜鹿皮細疊等波路北史曰波路國在阿鉤羗西北去代一萬三千九百里其地濕熱有蜀馬土平物產國俗與阿鉤羗同三童通典曰三童國在軒渠國西南千里人皆眼有三精珠或有四舌者能為一種聲亦能俱語常貨多用犀象作金幣率効國王之面亦効王后之面若丈夫交易則用國王之面者王死則更鑄蒲山北史曰蒲山國故皮山國也居皮, WYG: 伽色}
