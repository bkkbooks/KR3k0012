  - {type: variant, offset: 3445, length: 0, content: '', SBCK: 圖曰無首民乃與帝爭神帝斬其首勑之此野以乳爲目臍爲口去玉門三萬里納民外國圖曰納民陛居食土無夫婦死埋之其肝不朽八年復生去玉門五萬里拘夷釋道安西域志曰拘夷國北去城數百里山上有石駱駞溺水滴下以金銅鐡及木器手掌承之皆漏唯瓢瓠不漏服之令人身臭毛皮盡脫得止其國掌有婆羅門守視波羅秦斯釋道安西域志曰波羅秦斯國佛轉法輪調逹入地獄土䧟處皆在其國䑕王釋道安西域志曰于闐道}
