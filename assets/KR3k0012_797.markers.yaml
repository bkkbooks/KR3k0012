  - {type: variant, offset: 2, length: 3, content: 五莎車, SBCK: 六蒲􅀋小宛精絶渠勒依耐無雷難兠􅀌胡山國烏貪卑陸郁立師却國烏弋山離拘弥德􅀂髙附東離移支者舌拔豆烏利者至抜朱居權烏摩伽色尼薄知牟知阿弗太汗呼似宻諾色波羅畢伽至伽不單伽倍折薛莫孫鉗敦弗敵沙臨兒貲虜盤越鹽長竒恒石尖扶伏可蘭鵠國無不逹無継民録民無首民納民拘夷波羅秦斯䑕王摩訶頼波麗越雞城和訶條播􅀺曰舎衛維耶離迦維羅越郍訶維碓國拘郍含波羅柰拘宋婆􅄢宻拘私郍竭摩竭提蒲􅀋}
