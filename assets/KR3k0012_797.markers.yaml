  - {type: variant, offset: 1600, length: 1127, content: 五百七十里本役屬車師陁羅伊羅通典曰陁羅伊羅國隋時聞焉在烏蔡國北大雪山坡上緣梯登山接七百梯方到其國賖彌北史曰賖彌國在波知之南山居不信佛法專事諸神亦附濅噠東有鉢盧勒國路嶮緣鐵鏁而度下不見底後魏熙平中宋雲等使終不能達澤散通典曰澤散國魏時聞焉屬大秦其治在海中央最與安息城谷相近西南詣大秦不知里數女國北史曰女國在葱嶺南其國世以女為王姓蘇毗字末羯在位二十年女王夫號曰金聚不知政事國內丈夫唯以征伐為務山上為城方五六里人有萬家王居九層之樓侍女數百人五日一聽朝復有小女王共知國政其俗婦人輕丈夫而性不妬忌男女皆以彩色塗面一日中或數度變改之皆披髮以皮為鞋課稅無常氣候多寒以射獵為業出鍮石朱砂麝香犛牛驄馬蜀馬猶多鹽恒將鹽向天笁興販其利數倍亦數與天笁党項戰爭其女王死國中厚歛金錢求死者族之中賢女二人一為女王次為小王貴人死剝皮以金屑和骨內置瓶中埋之經一年又以其皮內鐵器埋之俗事阿修羅神又有樹神歲初以人祭或用獼猴祭呼得通典曰呼得魏時聞焉在葱嶺北烏孫西北康居東北勝兵萬餘人隨畜牧出名馬多貂鼠曹國北史曰曹國都郍蜜水南數里舊是康居之地也國無主康國王令子烏建領之都城方三里勝兵千餘人國中有得悉神自西海以東諸國並事之其神有金人馬金波羅闊丈有五尺高下相稱每月以駞五頭馬十疋羊一百口祭之南去康國百里大業中遣使貢方物漕國北史曰漕國在葱嶺之北漢時罽賓國也其王姓昭武字順達康國王之宗族也都城方四里勝兵萬餘人國法嚴峻俗重淫祠葱嶺山順天神者儀制極華以金為屋以銀為地祠者曰有千餘人祠前有一魚骨其孔中通馬出入國王戴金牛頭冠坐金烏座土多稻粟豆麥饒象馬封牛金銀鑌鐵氍㲣朱砂青黛安息青木等香黑鹽阿魏東去劫國七百里大業中遣使貢方物何國隋書曰何國都郍密水南數里舊是康居地也其王姓昭武亦康國王之族類都城方二里勝兵千人其王坐金羊床東去曹國百五十里西去安國三百里大業中遣使貢方物短人通典曰短人魏時聞焉在康居西北男女皆長三尺人眾甚多去奄蔡諸國甚遠康居長老傳聞嘗有遣商旅行北方迷惑失道而到此國國中甚多真珠夜光明月珠其國去康居可萬餘遣裏突厥本末記云自突厥北行一月有短人國長者不踰三尺亦有二尺者頭少毛髮若羊胞之狀突厥呼為羊胞頭其傍無它種類相侵俗無寇盜但有大鳥高七八尺恒祠短人啄而食之短人皆持弓矢以為之備按此亦在西北即魏略之短人國也小人通典曰小人在秦之南軀纔三尺其耕稼之時懼鵠所食大秦之南每衛助之小人竭其珍貨以酬報軒渠通典曰軒渠國多九色鳥青口綠頸紫翼紅膺紺頂丹足碧身緗背玄尾亦名九尾鳥亦名錦鳳其青多紅少謂之繡鸞恒從弱水西來或云是西王母之禽也其國幣貨同三童國溫宿北史曰溫宿國居溫宿城在姑默西北去代一萬五百五十里朱俱波通典曰朱俱國後魏時通焉亦名朱居槃國漢子合國也今并有西夜蒲犁依耐德若四國之地在於闐國西千餘里其西至葱嶺二百里其王渴槃國南至女國, SBCK: ''}
