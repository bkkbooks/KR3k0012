  - {type: variant, offset: 3450, length: 0, content: '', SBCK: 在耨逹山東南角竹園精舎在城西佛六年􅀂行貝多樹去城五十里波麗越釋道安西域志曰羅衛國東西四百里至波麗越國波麗越國即佛外祖國也鷄城釋道安西域志曰胡國北有鷄}
