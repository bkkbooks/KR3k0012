  - {type: variant, offset: 3440, length: 0, content: '', SBCK: 千五百六十里居山谷之間弗敵沙後魏書曰弗敵沙國古盻頓翎侯所治薄芳城也在鉗敦西去代一萬三千六百里居山谷間臨兒魏略曰臨兒國浮屠經云其國王生浮屠太子也父曰屑頭耶母曰莫耶浮屠身服黄色髮青乳有青毛冬青始莫耶夢白象而孕及生從母右脅出墮地能行七歩漢哀帝元壽元年慱士景庸從月氐王使伊存口授浮屠經其所載與老子經相出入蓋以老子西出􅀜教胡爲浮屠也貲虜魏略曰貲虜本匈奴之奴也匈奴名奴婢爲貲始建武時匈奴衰分其奴婢亡匿在金城武威酒泉此黒水東畜牧逐水草抄盗凉州不與東部鮮卑同也其種非一有大胡丁零羗雜處並本亡奴婢也盤越魏書曰盤越國一名漢越王在天竺東南數千里與益部相近其人小大與中國人同鹽長山海經曰西海中有鹽長國其人烏首亦名鳥民竒􅁪括地圖曰竒􅁪民善爲機巧設百禽爲車飛從風逺行湯時西風多竒􅁪車至於豫州湯破其車十年西風倒乃令復作車遣歸去玉門四萬里石尖􅀇中記曰玉門之西南羗之東有一國五六百户無他事役國中有山山上有祠廟國人每歳出石尖數千枚輸于廟中名霹靂尖以給霹靂所用從春雷出而尖日减至秋尖盡扶伏􅀇中記曰扶伏民者黄帝軒轅之臣曰茄豊有罪刑而放之扶伏而去後是爲扶伏民去玉門􅀜二萬五千里可蘭沙州記曰大白蘭西北千二百里有可蘭虜風俗卑陋從開闢後口不知􅂖味目不識五色耳不聞六律五聲是四夷中不臧者土無所出直大飬群畜而巳戸落萬餘然其人頑弱不􅃲戰忽見異人舉國便走鵠國神異經曰西海之中有鵠國男女皆長七寸爲人自然有禮好經論跪拜其人歳壽三百行如飛日行千里百物不敢犯之唯畏海鵠鵠遇吞之亦壽三百歳人在鵠腹中不死而鵠一舉千里無不達神異經曰西南大荒中有人烏長一丈腹圍九尺􅀛虵戴朱烏左手慿青龍右手慿白虎知河海􅂛斛識山石多少知鳥獸言語知百􅂖可食識草木鹹苦名曰聖一名哲一名仙一名通一名無不逹凢人見拜者令人神知無継民外國圖曰無継民穴居食土無夫婦死則埋之心不朽百年復生去玉門四萬六千里録民外國圖曰録民穴居食土無夫婦死則埋之肺不朽百二十年復生去玉門}
