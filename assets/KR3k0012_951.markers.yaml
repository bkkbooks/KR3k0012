  - {type: variant, offset: 487, length: 1622, content: 魚或曰蒲以其子母各等置甕中埋東行陰垣下三日後開之即相從以母血塗八十一錢亦以子血塗八十一錢以其錢更互市置子用母置母用子錢皆自還蜂爾雅曰土蜂今江東呼大蜂在土中作房中為土蜂啖其子即馬蜂也今荊楚間呼為蟺音蟬木蜂似土蜂而小在樹上作房方言曰蜂燕趙之間謂之蠓螉蒙翁二音或謂之蚴蛻音幽悅其大有蜜謂之壺蜂即今黑蜂穿竹木作孔亦有蜜者山海經曰平逢山有神如人二首名曰嬌蟲是盤蟲實推蜜之廬郭璞注曰嬌為盤蟲之長群蜂所舍集蜜亦蜂名也又曰大蜂其狀如螽洪範五行傳曰秦昭王三十八年上郡大飢山木盡死人無所食蜂食田苗左傳僖中曰邾人以須句故出師公卑邾不設備而禦之臧文仲曰國無以小不可易也無備雖眾不可恃也君其無謂邾小蜂蠆有毒而況國乎孝經援神契曰蜂蠆垂芒蜂蠆毒在後故言垂芒謝承後漢書曰豫章嚴豐字孟侯為郡主簿太守賈萌舉兵欲誅王莽有飛蜂附萌車衡豐諫以為不祥之徵萌不從果見殺王隱晉書曰太尉陶侃表倉曹參軍袁謙為高涼太守未至百餘里浦中有蜜蜂蔽日而下謙舩上謙不覺甚惡會得留郡文書賊欲乘虛攻郡謙欲速赴明早進西南卒遇大風飛沙天地晦合不復得還浦遂沒海中晉書曰鄒湛對武帝曰猛獸在田荷戈而出凡人能之蜂蠆作於懷袖勇夫為之驚駭出於意外故也淮南子曰蜂房不容鵠卵房巢也小形不足以苞大體也抱朴子曰軍行卒逢群飛蜂及䖟蟲若密蜂尤多者必大戰驚於藏伏之賊也列女傳曰尹吉甫子伯奇至孝事後母母取蜂去毒繫於衣上伯奇前欲去之母便大呼曰伯奇牽我吉甫見疑之伯奇自死葛仙公列傳曰仙公與客對食客曰當請先生作一奇戲食未竟仙公即吐口中飯盡成飛蜂滿屋或集客身莫不震肅但皆不螫人良久仙公乃張口見蜂飛還入口中成飯永嘉地記曰七八月中常有蜜蜂群過有一蜂先飛覔止泊處人知輒內木桶中以蜜塗桶中飛者聞蜜氣或停不過三四來便舉群悉至博物志曰細腰無雌蜂類也無雌取桑蠶或阜螽子所見抱而成己子詩云螟蛉有子蜾蠃負之又曰遠方諸山出蜜蠟處其處人家有養蜂者其法以木為器或十斛五斛開小孔令纔容蜂出入以蜜蠟塗器內外令遍安著簷前或庭下春月此蜂將作窠生育時來過人家圍垣者捕取得三兩頭便內著器中數宿出蜂飛去尋將伴來還或多或少經日漸溢不可復數遂停住往來器中所滋長甚眾至夏開器取蜜蠟所得多少隨歲中所宜豐儉盧氏曰春至秋末始有蜜晚者至冬余所見今云夏未詳其故又曰諸遠方山郡僻處出蜜蠟蜜蠟所著皆絕巖石壁非攀緣所及唯於山頂以檻舉自懸挂下遂乃得取採蜂遂去不還餘窠及蠟著石不盡者有鳥形小於雀群飛千數來啄之至春都盡其處皆如磨洗至春蜂皆還洗處結窠如故年年如此物無錯亂者人亦各各占其平處謂之蠟塞鳥謂之靈雀捕搏終不可得也宣驗記曰元嘉元年建安郡山賊百餘人掩破郡治抄掠百姓資產子女遂入佛圖搜掠財寶先是諸供養具別封置一室賊破戶忽有蜜蜂數萬頭從衣簏出同時噬螫群賊身首腫痛兩眼盲合先諸所掠皆棄而走蜂飛邀逐噬擊彌路賊遂惶懼從便道而去時是臈日所縛子女各還其家廣五行記曰秦昭王委政于太后弟穰侯穰侯用事山木盡死蜂食人苗稼時大飢人相食穰侯罷免歸第嶺表錄異曰唐劉恂魯遊宣歙間見彼中人好食蜂兒狀如蠶蛹而瑩白大蜂結房於山林間其大如巨鍾其中不知幾百層村人採時須以草衣蔽身以捍毒螫復以煙火逼散蜂母然後攀緣崖樹斷其根一房有蜂兒五斗或一石者三分中一翅足具矣即入鹽酪炒之曝乾以小紙囊貯之寄入京洛以為方物楚辭曰玄蜂如壺蝝左傳宣下曰十五年冬蝝生爾雅曰蝝蝮音覆蜪音陶也郭璞注曰蝗子未有翅者外傳曰蟲含蚳蝝蝗禮記月令曰仲冬行春令則蟲蝗為敗陸機毛詩䟽義曰阜螽蝗也今人謂之螽子兗州人謂之螣晉書載記曰石勒時河朔大蝗初穿地而生二旬則化狀如蠶七八月而臥四日蛻而飛彌亙百里唯不食三豆及麻并冀尤甚唐書曰貞觀中終南等數縣蝗太宗至苑中見蝗掇數枚而呪之曰民以穀為命而汝食之是害于百姓也百姓有過在予一人爾其有靈但當食我無害百姓將吞之侍臣恐致疾遽來諫止太宗曰所冀移災朕躬何疾之避遂吞之自是蝗不為災漢實錄曰乾祐初開封府言陽武雍丘襄邑蝗府尹侯益遣人以酒殽致祭三縣蝗為鸜鵒藂食勑禁羅弋鸜鵒以其有吞噬之異也蠋毛詩豳七月曰蜎蜎者蠋烝在桑野桑蟲爾雅曰蚅烏蠋音蜀也郭璞注曰蟲大如指似蠶孫炎注曰蚅一名烏蠋也, SBCK: 慕光}
