  - {type: variant, offset: 825, length: 796, content: 王莽有飛蜂附萌車衡豐諫以為不祥之徵萌不從果見殺王隱晉書曰太尉陶侃表倉曹參軍袁謙為高涼太守未至百餘里浦中有蜜蜂蔽日而下謙舩上謙不覺甚惡會得留郡文書賊欲乘虛攻郡謙欲速赴明早進西南卒遇大風飛沙天地晦合不復得還浦遂沒海中晉書曰鄒湛對武帝曰猛獸在田荷戈而出凡人能之蜂蠆作於懷袖勇夫為之驚駭出於意外故也淮南子曰蜂房不容鵠卵房巢也小形不足以苞大體也抱朴子曰軍行卒逢群飛蜂及䖟蟲若密蜂尤多者必大戰驚於藏伏之賊也列女傳曰尹吉甫子伯奇至孝事後母母取蜂去毒繫於衣上伯奇前欲去之母便大呼曰伯奇牽我吉甫見疑之伯奇自死葛仙公列傳曰仙公與客對食客曰當請先生作一奇戲食未竟仙公即吐口中飯盡成飛蜂滿屋或集客身莫不震肅但皆不螫人良久仙公乃張口見蜂飛還入口中成飯永嘉地記曰七八月中常有蜜蜂群過有一蜂先飛覔止泊處人知輒內木桶中以蜜塗桶中飛者聞蜜氣或停不過三四來便舉群悉至博物志曰細腰無雌蜂類也無雌取桑蠶或阜螽子所見抱而成己子詩云螟蛉有子蜾蠃負之又曰遠方諸山出蜜蠟處其處人家有養蜂者其法以木為器或十斛五斛開小孔令纔容蜂出入以蜜蠟塗器內外令遍安著簷前或庭下春月此蜂將作窠生育時來過人家圍垣者捕取得三兩頭便內著器中數宿出蜂飛去尋將伴來還或多或少經日漸溢不可復數遂停住往來器中所滋長甚眾至夏開器取蜜蠟所得多少隨歲中所宜豐儉盧氏曰春至秋末始有蜜晚者至冬余所見今云夏未詳其故又曰諸遠方山郡僻處出蜜蠟蜜蠟所著皆絕巖石壁非攀緣所及唯於山頂以檻舉自懸挂下遂乃得取採蜂遂去不還餘窠及蠟著石不盡者有鳥形小於雀群飛千數來啄之至春都盡其處皆如磨洗至春蜂皆還洗處結窠如故年年如此物無錯亂者人亦各各占其平處謂之蠟塞鳥謂之靈雀捕搏終不可得也宣驗記曰元嘉元年建安郡山賊百餘人掩破郡治抄掠百姓資產子女遂入佛圖搜掠財寶先是諸供養具別封置一室賊破戶忽有蜜蜂數萬頭從衣簏出同時噬螫群賊身首腫痛兩眼盲合先諸所掠皆棄而走蜂飛邀逐噬擊彌路賊遂惶懼從便道而去時是臈日所縛子女各還其家, WYG: ''}
