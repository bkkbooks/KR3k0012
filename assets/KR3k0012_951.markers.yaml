  - {type: variant, offset: 36, length: 2, content: 蜻蛉, krp: 虱齧人蟲也蟣虱子也漢書曰項羽謂宋義曰疾引兵渡河破秦必矣義曰不然夫搏牛之䖟不可以破虱䖟諭秦虱諭章邯等言大小不同勢又曰王莽校尉韓威進曰以新室之威而吞胡虜無異口中蚤虱東觀漢記曰馬援擊㝷陽山賊上書曰除其竹木譬如嬰兒頭多蟣虱而剃之蕩蕩然蟣虱無所復依書奏上大恱因出小黄門頭有虱者皆剃之續晉陽秋曰咸陽王猛被緼𫀆而詣桓温}
  - {type: punctuation, offset: 38, content: ，, id: KR3k0012_CHANT_951-bkkpn16}
  - {type: 'tls:seg', offset: 38, content: '', id: KR3k0012_CHANT_951-1a.10}
  - {type: variant, offset: 39, length: 0, content: '', SBCK: 靦談當時之事猛摸虱而言傍􅀂無人温察而竒之晉書曰阮籍著大人先生傳曰少稱郷黨長聞鄰國上欲圖三公下不失州牧獨不見羣虱之處禈中逃乎深缝匿乎壞絮自以爲􅁻宅行不敢離縫匿乎禈襠自以爲得䋲墨也然炎丘火流焦邑滅都羣虱處於禈中而不能出也君子之處域内何異夫虱之處禈中乎齊書曰江泌性行仁義衣弊虱多綿裏置壁上恐虱飢死乃置衣中數日中終身無復虱又曰卞彬爲南康郡丞彬頗飲酒擯棄形體仕旣不遂乃著蚤虱􅘿蟲蝦蟇等賦皆大有指斥三國典略曰梁劉殻常有飛書謗殻梁主怒曰劉殻似衣中虱少湏搯之音恰北史司馬子如爲大行臺及文襄輔政見之哀其憔悴以膝承其首親爲擇虱賜酒百缾羊五百口粳米五百石子如曰無事尚􅀍囚幾死􅀂受此豈有生路􅁘列子曰紀昌學射於飛衛使學視小如大紀昌以氂懸虱於牗南面而望之二年之後如車輪焉以覩餘物皆丘山也乃以燕角之弧􅀌蓬之簳射之貫虱之心而懸不絶以告飛衛飛衛曰汝得之矣莊子曰濡需者豕虱是也擇䟽鬛自以爲廣宫大囿奎蹄曲限乳間股脚自爲安室利處不知屠者一旦布燥烟火而與豕俱燋韓子曰天下無道攻擊不巳甲胄生蟣虱燕雀處帷幄而兵不歸故曰戎馬生於郊淮南子亦云又曰應侯謂􅁗王曰王得宛臨陳陽夏断河内臨東陽邯鄲猶口中虱也又曰三虱食彘相與訟一虱遇之曰奚訟三虱曰爭肥饒者一虱曰􅀂爾不患臘之􅀅至而烹之也躁目􅀂有奚患於是乃相與聚其目而食之彘痩人乃不殺淮南子曰牛馬之氣蒸不能生蟣虱蟣虱之風蒸不能生牛馬故化生於外非生於内也又曰湯沐具而蟣虱相吊大厦成而鷰雀相賀抱朴子曰夫虱生於我我非虱之父母虱非我之子孫也又曰眼能察天衢而不能周項領之間耳能聞雷霆而不能周蟣虱之音也又曰今頭虱著身皆稍變而白身虱著頭皆漸化而黒則􅀇素果無定質移易在乎所漸也符子曰齊魯爭汶陽之田魯侯有憂色魯隱者周豊往觀曰臣甞晝􅃦愀然聞羣虱之􅃲乎衣中甘臣膏􅃾之肌珎臣項膂之膚相與樹黨爭之日夜不息相殺者太半虱父止之曰我與汝廬不過縫所飡食不過容口奚用竊乎交戰爲哉羣虱止今君以七百里地爲君之城亦以足矣而以汝汶陽數歩之田感君之心曽不如一虱之知􅀼爲君羞之魯侯曰善語林曰顧和始爲楊州從事月且當朝未入停車州門外湏􅁷周侯巳醉著白恰慿兩人來詣丞相歴和車邊和先在車中覔虱夷然不動周始見遥過去行數歩覆反還指顧心曰此中何所顧擇虱不輟徐徐應曰此中最是難測量地風俗通曰河南趙仲讓爲梁兾從事郞中冬月坐庭中向日觧壞裘捕虱襄成君使推問之兾􅀏曰此我從事絶清髙士也楊偉時務論曰夫吞八荒者不咀蟣虱也神異經曰西荒之中有人焉長短如人着百結敗衣手足虎爪}
