  - {type: variant, offset: 1965, length: 129, content: 人爾其有靈但當食我無害百姓將吞之侍臣恐致疾遽來諫止太宗曰所冀移災朕躬何疾之避遂吞之自是蝗不為災漢實錄曰乾祐初開封府言陽武雍丘襄邑蝗府尹侯益遣人以酒殽致祭三縣蝗為鸜鵒藂食勑禁羅弋鸜鵒以其有吞噬之異也蠋毛詩豳七月曰蜎蜎者蠋烝在桑野桑蟲爾雅曰蚅烏蠋音蜀也郭璞注曰蟲, WYG: 塊肉}
