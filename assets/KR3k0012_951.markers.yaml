  - {type: variant, offset: 33, length: 1, content: 說, SBCK: 高誘曰窮幽兾謂之蜟蚳入耳之蟲蜟音育又曰釋大道任小枝無異使蟾諸捕蚤論衡曰人在天地之間猶蚤虱之在衣裳螻蟻之在穴􅂩也趙壹解擯賦曰丹鴻可殺蚤虱抱朴子曰蚤虱羣攻卧不􅀗安曹植論曰孟春之旦從陽徑生貴放鳥雀者加其禄也得者莫不馴而放之爲利人也得蚤者莫不摩之齒牙爲害身也虞翻與弟書曰其餘幾何老更衣希爲蚤虱所咋故一二相告省書一過悉以付火齊卞士蚤虱賦序曰余居貧布衣十年不製一􅂁之緼有生所託資其寒暑無與易之爲之多病起居甚踈縈寝敗絮不能自釋兼攝性懈惰􅈸事皮膚澡刷不謹澣沐失時四體㲰㲰乃耕切加以臭穢故葦席蓬纓之間蚤虱猥流探揣􅀗撮日不替手虱蟣􅀃}
  - {type: page-break, offset: 33, content: '', id: KR3k0012_SBCK_951-2a}
  - {type: variant, offset: 33, length: 1, content: 說, WYG: 又曰釋大道任小技無異使蟾蜍捕蚤論衡曰人在天地之間猶蚤虱之在衣裳螻蟻之在穴隙也趙壹解擯賦曰丹鴻可殺蚤也抱朴子曰蚤虱羣攻卧不獲安曹植論曰孟春之旦從太陽方貴放鳥雀者加其禄也得者莫不馴而放之為利人也得蚤者莫不摩之齒牙為害身也齊卞士蔚虱序曰余居貧布衣十年不製一袍之緼有生所託資其寒暑莫與易之身既多病起居甚踈縈寝敗絮不能自釋兼復懈惰嬾事皮膚澡刷不謹澣沐失時四體㲰㲰乃耕切加以臭穢故葦蓆蓬纓之間蚤虱獧流探揣獲撮日不替手虱蟣説}
  - {type: page-break, offset: 33, content: '', id: KR3k0012_WYG_951-2b, image: WYG0901/WYG0901-0412d.png}
  - {type: page-break, offset: 33, content: '', id: KR3k0012_WYG_951-3a, image: WYG0901/WYG0901-0413a.png}
  - {type: variant, offset: 33, length: 0, content: '', krp: 高誘曰窮幽兾謂之蜟蚳入耳之蟲蜟音育又曰釋大道任小枝無異使蟾諸捕蚤論衡曰人在天地之間猶蚤虱之在衣裳螻蟻之在穴隙也趙壹解擯賦曰丹鴻可殺蚤虱抱朴子曰蚤虱羣攻卧不獲安曹植論曰孟春之旦從陽徑生貴放鳥雀者加其禄也得者莫不馴而放之爲利人也得蚤者莫不摩之齒牙爲害身也虞翻與弟書曰其餘幾何老更衣希爲蚤虱所咋故一二相告省書一過悉以付火齊卞士蚤虱賦序曰余居貧布衣十年不製一𫀆之緼有生所託資其寒暑無與易之爲之多病起居甚踈縈寝敗絮不能自釋兼攝性懈惰嬾事皮膚澡刷不謹澣沐失時四體㲰㲰乃耕切加以臭穢故葦席蓬纓之間蚤虱猥流探揣獲撮日不替手虱蟣}
