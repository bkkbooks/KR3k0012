  - {type: variant, offset: 39, length: 0, content: '', WYG: 旦布操烟火與豕俱焦韓子曰天下無道攻擊不已甲胄生蟣虱燕雀處帷幄而兵不歸故曰戎馬生郊又曰應侯謂秦王曰王得宛林東陽下㫁河内臨東陽邯鄲猶口中虱也又曰三虱食彘相與訟一虱遇之曰奚訟三虱曰争肥饒也一虱曰若爾不患臘之将至而烹之也躁自若有奚患於是乃相與聚其身而食之彘痩人乃不殺淮南子曰牛馬之氣蒸不能生虱虱之氣蒸不能生牛馬故化生於外非生於内也又曰湯沐具而蟣虱相弔大厦成而鷰雀相賀抱朴子曰夫虱生于我我非虱之父母虱非我之子孫也又曰眼能察天衢而不能周項領之間耳能聞雷霆而不能周蟣虱之音也又曰今頭虱着身皆稍變而白身虱着頭皆漸化而黑則𤣥素果無定質移易在乎所漸也苻子曰齊魯争汶陽之田魯侯有憂色魯有隠者周豐往見曰臣嘗晝寢愀然有羣虱之鬭乎衣中甘臣膏腴之肌珍臣項膂之膚相與樹黨争之日夜不息相殺者大半虱父止之曰我與爾所慮不過容口奚用竊争交戰為哉羣虱止今君以七百里地為君臣謂亦已足矣而以汶陽數歩之田惑君之心曾不如一虱之知竊為君羞之魯侯曰善語林曰顧和為揚州從事月旦當朝未入停車州門外須臾周侯已醉着白袷慿兩人來詣丞相歴和車邉和先在車中覔虱夷然不動周始見遥過去行數歩復又還指顧心問曰此中何所有顧擇虱不輟徐徐應曰此中最是難測地風俗通畧曰河南趙仲讓為梁冀從事郎中冬月坐庭中向日解壊裘捕虱襄城君使推問之冀笑曰此我從事絶髙士也楊偉時務論曰夫清八荒者不咀蟣虱也神異經曰西荒之中有人焉長短如人著百結敗衣手足虎爪}
