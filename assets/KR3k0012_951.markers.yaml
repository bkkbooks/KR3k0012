  - {type: punctuation, offset: 36, content: 「, id: KR3k0012_CHANT_951-bkkpn15}
  - {type: variant, offset: 36, length: 2, content: 蜻蛉, SBCK: 虱齧人蟲也蟣虱子也漢書曰項羽謂宋義曰疾引兵渡河破􅁗必矣義曰不然夫􅅮牛之䖟不可以破虱䖟諭􅁗虱諭章邯等言大小不同􅀔又曰王莽校尉韓威進曰以新室之威而吞胡虜無異口中蚤虱東觀漢記曰馬援擊㝷陽山賊上書曰除其竹木譬如嬰兒頭多蟣虱而剃之蕩蕩然蟣虱無所復依書奏上大恱因出小黄門頭有虱者皆剃之續晉陽秋曰咸陽王猛被緼􅂁而詣桓温}
  - {type: page-break, offset: 36, content: '', id: KR3k0012_SBCK_951-2b}
  - {type: variant, offset: 36, length: 2, content: 蜻蛉, WYG: 虱齧人䖝也蟣虱子也漢書曰項羽謂宋義曰疾引兵渡河破秦必矣義曰不然夫摶牛之䖟不可以破蟣虱又曰王莽校尉韓威進曰以新室之威而吞胡虜無異口中蚤虱東觀漢記曰馬援擊㝷陽山賊上書曰除其竹木譬如嬰兒頭多蟣虱而剃之蕩蕩然蟣虱無所復依書奏上大悦因出小黄門頭有虱者皆剃之續晉陽秋曰咸陽王猛被緼袍而詣桓温面談當時之事猛捫虱而言旁若無人温察而竒之齊書曰江泌性仁義衣弊虱多綿裹置壁上恐虱飢死乃置衣中數日終身無復虱又曰卞彬為南康郡丞彬頗飲酒擯棄形骸仕既不遂乃著蚤蟣䖝蝦蟇等賦大有指斥三國典畧曰梁劉慤常有飛書謗毁梁主怒曰劉慤似衣中虱必須搯音恰之北史曰司馬子如以賄在獄勅岀後神武見之哀其憔悴以袂承其首親擇虱賜酒百瓶羊五百口糧米五百石子如曰無事尚被囚幾死若受此豈有生路也列子曰紀昌學射於飛衛使學視小如大紀昌乃懸虱於牖南面而望之二年之後如車輪焉以覩餘物皆丘山也乃以燕角之弧孤蓬之簳射之貫虱之心而懸不絶以吿飛衛飛衛曰汝得之矣荘子曰孺需者豕虱是也擇處疏鬛自以為廣宫大囿奎蹄曲限乳間股脚自為安室利處不知屠者}
