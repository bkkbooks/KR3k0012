  - {type: variant, offset: 39, length: 0, content: '', krp: 靦談當時之事猛摸虱而言傍若無人温察而竒之晉書曰阮籍著大人先生傳曰少稱郷黨長聞鄰國上欲圖三公下不失州牧獨不見羣虱之處禈中逃乎深缝匿乎壞絮自以爲吉宅行不敢離縫匿乎禈襠自以爲得䋲墨也然炎丘火流焦邑滅都羣虱處於禈中而不能出也君子之處域内何異夫虱之處禈中乎齊書曰江泌性行仁義衣弊虱多綿裏置壁上恐虱飢死乃置衣中數日中終身無復虱又曰卞彬爲南康郡丞彬頗飲酒擯棄形體仕旣不遂乃著蚤虱􅘿蟲蝦蟇等賦皆大有指斥三國典略曰梁劉殻常有飛書謗殻梁主怒曰劉殻似衣中虱少湏搯之音恰北史司馬子如爲大行臺及文襄輔政見之哀其憔悴以膝承其首親爲擇虱賜酒百缾羊五百口粳米五百石子如曰無事尚𬒳囚幾死若受此豈有生路耶列子曰紀昌學射於飛衛使學視小如大紀昌以氂懸虱於牗南面而望之二年之後如車輪焉以覩餘物皆丘山也乃以燕角之弧孤蓬之簳射之貫虱之心而懸不絶以告飛衛飛衛曰汝得之矣莊子曰濡需者豕虱是也擇䟽鬛自以爲廣宫大囿奎蹄曲限乳間股脚自爲安室利處不知屠者一旦布燥烟火而與豕俱燋韓子曰天下無道攻擊不巳甲胄生蟣虱燕雀處帷幄而兵不歸故曰戎馬生於郊淮南子亦云又曰應侯謂秦王曰王得宛臨陳陽夏断河内臨東陽邯鄲猶口中虱也又曰三虱食彘相與訟一虱遇之曰奚訟三虱曰爭肥饒者一虱曰若爾不患臘之将至而烹之也躁目若有奚患於是乃相與聚其目而食之彘痩人乃不殺淮南子曰牛馬之氣蒸不能生蟣虱蟣虱之風蒸不能生牛馬故化生於外非生於内也又曰湯沐具而蟣虱相吊大厦成而鷰雀相賀抱朴子曰夫虱生於我我非虱之父母虱非我之子孫也又曰眼能察天衢而不能周項領之間耳能聞雷霆而不能周蟣虱之音也又曰今頭虱著身皆稍變而白身虱著頭皆漸化而黒則玄素果無定質移易在乎所漸也符子曰齊魯爭汶陽之田魯侯有憂色魯隱者周豊往觀曰臣甞晝寢愀然聞羣虱之鬪乎衣中甘臣膏腴之肌珎臣項膂之膚相與樹黨爭之日夜不息相殺者太半虱父止之曰我與汝廬不過縫所飡食不過容口奚用竊乎交戰爲哉羣虱止今君以七百里地爲君之城亦以足矣而以汝汶陽數歩之田感君之心曽不如一虱之知竊爲君羞之魯侯曰善語林曰顧和始爲楊州從事月且當朝未入停車州門外湏臾周侯巳醉著白恰慿兩人來詣丞相歴和車邊和先在車中覔虱夷然不動周始見遥過去行數歩覆反還指顧心曰此中何所顧擇虱不輟徐徐應曰此中最是難測量地風俗通曰河南趙仲讓爲梁兾從事郞中冬月坐庭中向日觧壞裘捕虱襄成君使推問之兾笑曰此我從事絶清髙士也楊偉時務論曰夫吞八荒者不咀蟣虱也神異經曰西荒之中有人焉長短如人着百結敗衣手足虎爪}
  - {type: variant, offset: 40, length: 2, content: 桑根, SBCK: 獏㺔張茂先曰俗曰貌僞音撝伺人眠輙徃就人欲食人腦先使捕虱得卧而舌出盤地丈餘聞其聲常燒大石伺其得卧舌出以石投舌上於是低頭絶氣而死異苑曰太孫廣頭上不得有虱虱大者便遭朞䘮大功小則小功殤服劉義慶宣驗記曰晉義熈中京師長年寺道人惠祥與法向連堂夜四更中惠遥喚向暫來徃視祥仰眠交手胷上足脡欶鼎切直云可解我手足繩曰上並無繩也祥因得轉動云向有人衆以我手足鞭箠交下問何故齧虱語祥􅀂更不止當入兩間􅔫之音盍祥後徴戒於虱餘無精進相牛經曰治牛虱用苦梗生魚汁清坎底土􅀂酒和塗之夢書曰夢梳箆爲憂解也其髮滑澤心喜也蟣虱盡去百病愈也蟣虱爲憂齧人身也夢見蟣虱有憂至也揚雄長楊賦曰鞮鍪生蟣虱介胄􅀍霑汗趙壹作非草書曰俯而擇虱不睱見地仰而觀鍼不睱見天天地至大而不見者銳精於鍼虱也魏文帝與王朗書曰蚤虱雖細虐於安寢鼷䑕至微猶毁郊牛􅄞康養生論曰夫虱處頭而黒麝食􅁊而香又與山濤書曰危坐一時痺不得揺性復多虱把搔無巳而當襲以章服揖拜上官三不可堪也螕邊奚切字林曰螕齧牛蟲也蟭􅑺晏子春秋曰景公問晏子曰天下有極細乎對曰東海有蟲生於蚊睫再乳而飛蚊不爲驚臣嬰不知其名東海者者命曰蟭􅑺列子曰江浦之間生麽細麽也蟲其名曰焦􅑺羣飛而集於睫不相觸也捷􅀫去來蚊不覺也離朱子羽方晝栻皆楊眉而望之弗見其􅄱離未黄帝時明目人子羽未聞也抱朴子曰焦螟也蚊眉之中而􅀏彌天之大鵬寸鮒遊牛迹之水不貴横海之巨鱣也蛕音囿􅀃文曰蛕蝮中長蟲也叩頭異苑曰有小蟲形色如大豆呪令叩頭又使吐血皆從所教如似請放稽顙輙七十而有聲故俗呼爲叩頭也傅咸叩頭蟲賦叙曰叩頭蟲蟲之微細者然觸之輙叩頭人以其叩頭殺之不祥故莫之害也食屍裴氏廣州記曰林任縣有甲蟲嗜臭肉人死食屍都盡紛紛满屋非可驅殺􅀶物志曰景􅀄中蒼梧刺史京師云廣州西南數郡人病􅀅死便有飛蟲狀如麥集舎人死便食不可斷截惟殘骨在便去以梓板爲器則不集蟯音饒􅀃文曰蟯蝮中短蟲也史記曰臨菑汜里女子薄吾病甚衆醫皆爲寒􅀬篤當死不治淳于意􅐷其脉曰蟯瘕蟯瘕爲腹大上膚黄麤修之戚戚然意飲以元華一撮即出蟯可數升病巳三十日如故淮南子曰天下物莫不資於水澤及音􅄮蟯而不求報高誘曰蟯微蟲也蛻廣雅曰復育蛻也論衡曰蟬生於復育開背而岀蛾詩曰螓首蛾眉}
