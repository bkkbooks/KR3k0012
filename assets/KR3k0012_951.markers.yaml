  - {type: variant, offset: 2640, length: 991, content: 名射影如龜二足江淮水皆有人在岸影見水中投人影則殺人故曰射影也南京人欲入水以瓦石投水中令濁乃入也或又含沙射人入肌其瘡如疥魯莊公十八年秋經書有蜮傳稱不為災也穀梁傳莊公曰秋有棫一有一亡曰有言不常有蜮射人者也今短狐射人為疾是也左傳同廣雅曰射工棫短狐也書紀年曰晉獻公二年春周惠王居于鄭鄭人入王府多取玉焉玉化為蜮射人齊書曰屠氏女晝採樵夜漬以供養父母父母俱卒親營殯葬負土成墳忽空中有聲云汝至性可重山神欲相驅使汝可為人療病必得大富女謂是鬼魅弗敢從遂得病積時鄰舍人有溪蜮毒者女識毒試療之自覺病便差遂以巫道為人療疾無不愈者家產日益抱朴子曰短狐一名蜮一名射工一名射影其實水蟲也狀似鳴蜩而如合杯有翼能飛無目利耳口中有橫物如聞人聲緣口中物如角弩以氣為矢激水而射人中身者即發瘡不曉治之者殺人其病似大傷寒不日皆死又曰射工蟲冬天蟄於谷間大雪時索之此蟲所在其雪不積留氣起如灼蒸當掘之不過入地一尺則得也陰乾末帶之夏天自辟射工也玄中記曰水狐者視其形蟲也見其氣乃鬼也長三四寸其色黑廣寸許背上有甲厚三分許其口有物向前如角狀見人則氣射人去二三步即射人中十人六七人死地理書曰車茂安與夏書云外生石季甫忽為鄭令此縣既有短狐之疾又沙虱害人聞此消息倍益愁慮博物志曰江南山溪水中有射工蟲甲蟲之類也長一二寸口中有弩形以氣射人影隨所著處發瘡不治則殺人沙虱廣雅曰沙虱蜁也音旋廣志曰沙虱色赤大不過蟣在水中入人皮中殺人唐書曰南中山川有鴆鳥之地必有犀牛有沙虱水弩必生可療之草又曰南平獠部落土氣多瘴癘山有毒草及沙虱蝮虵淮南萬畢術曰沙虱一名蓬活一名地脾抱朴子內篇曰沙虱雨後及晨暮踐沙必著人如毛髮端初著人便入皮裏可以針挑取之正赤如丹著人上動行若不挑即此蟲便入人身中殺人行此蟲之地每還輒當以火自炙令遍則蟲隨火去也水陸皆有之博物志曰深山窮谷多毒虐之物氣則有瘴癘人則有工蟲獸則有虎鳥則有鴆虵則有蝮蟲則有射工沙虱草則有鉤吻野葛其餘則蛟蟒之屬生焉本草經曰沙虱一名石蠶葛洪方曰辟沙虱用麝香大蒜合羊脂擣著小筒中帶之良十二時蟲博物志曰交州南有蟲長或一寸大小如指有廉槾亡旦切形似白石英不知其名視之無定色在陰地色多緗綠出日光中變易或青或綠或丹或黃或紅或赤女人取以為首飾宗岱每深以為物無定色引雲霞以為喻故託此以助成其說今孔雀毛亦隨光色變易或黃或赤但不能如此蟲耳嶺南異物志曰容州有蟲如守宮身圓而頸長頭有冠幘一日中隨時變色青黃赤白黑未嘗定土人不能名呼為十二時蟲囓人不可療又曰南方有蟲, SBCK: 塊肉}
