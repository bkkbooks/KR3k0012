  - {type: variant, offset: 11, length: 2, content: 蜻蛉, krp: 亂頭多憂蚤虱生愁膳夫仲年使我無聊說文曰蚤齧人跳蟲也韓子曰子韋見孔子於啇太宰曰吾見孔子則視子猶蚤虱之細者也今吾見之於君子韋恐孔子貴於君也因}
  - {type: variant, offset: 14, length: 0, content: '', SBCK: 太宰曰且君巳見孔子亦􅀅視子猶蚤虱太宰弗復見也又曰韓昭侯搔而佯亡一蚤求}
  - {type: variant, offset: 14, length: 0, content: '', WYG: 太宰曰且君}
  - {type: variant, offset: 14, length: 0, content: '', krp: 太宰曰且君巳見孔子亦将視子猶蚤虱太宰弗復見也又曰韓昭侯搔而佯亡一蚤求}
  - {type: variant, offset: 15, length: 11, content: 蝍蛉郭璞注曰六足四翼蟲, SBCK: 甚急左右因取其蚤虱而殺之昭侯以此察左右不誠}
  - {type: variant, offset: 15, length: 5, content: 蝍蛉郭璞注, WYG: 己見孔子亦將視子猶蚤虱太宰弗復見也又}
