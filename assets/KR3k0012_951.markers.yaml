  - {type: variant, offset: 40, length: 2, content: 桑根, krp: 獏㺔張茂先曰俗曰貌僞音撝伺人眠輙徃就人欲食人腦先使捕虱得卧而舌出盤地丈餘聞其聲常燒大石伺其得卧舌出以石投舌上於是低頭絶氣而死異苑曰太孫廣頭上不得有虱虱大者便遭朞䘮大功小則小功殤服劉義慶宣驗記曰晉義熈中京師長年寺道人惠祥與法向連堂夜四更中惠遥喚向暫來徃視祥仰眠交手胷上足脡欶鼎切直云可解我手足繩曰上並無繩也祥因得轉動云向有人衆以我手足鞭箠交下問何故齧虱語祥若更不止當入兩間礚之音盍祥後徴戒於虱餘無精進相牛經曰治牛虱用苦梗生魚汁清坎底土若酒和塗之夢書曰夢梳箆爲憂解也其髮滑澤心喜也蟣虱盡去百病愈也蟣虱爲憂齧人身也夢見蟣虱有憂至也揚雄長楊賦曰鞮鍪生蟣虱介胄𬒳霑汗趙壹作非草書曰俯而擇虱不睱見地仰而觀鍼不睱見天天地至大而不見者銳精於鍼虱也魏文帝與王朗書曰蚤虱雖細虐於安寢鼷䑕至微猶毁郊牛嵇康養生論曰夫虱處頭而黒麝食桓而香又與山濤書曰危坐一時痺不得揺性復多虱把搔無巳而當襲以章服揖拜上官三不可堪也螕邊奚切字林曰螕齧牛蟲也蟭螟晏子春秋曰景公問晏子曰天下有極細乎對曰東海有蟲生於蚊睫再乳而飛蚊不爲驚臣嬰不知其名東海者者命曰蟭螟列子曰江浦之間生麽細麽也蟲其名曰焦螟羣飛而集於睫不相觸也捷宿去來蚊不覺也離朱子羽方晝栻皆楊眉而望之弗見其形離未黄帝時明目人子羽未聞也抱朴子曰焦螟也蚊眉之中而笑彌天之大鵬寸鮒遊牛迹之水不貴横海之巨鱣也蛕音囿說文曰蛕蝮中長蟲也叩頭異苑曰有小蟲形色如大豆呪令叩頭又使吐血皆從所教如似請放稽顙輙七十而有聲故俗呼爲叩頭也傅咸叩頭蟲賦叙曰叩頭蟲蟲之微細者然觸之輙叩頭人以其叩頭殺之不祥故莫之害也食屍裴氏廣州記曰林任縣有甲蟲嗜臭肉人死食屍都盡紛紛满屋非可驅殺博物志曰景𥘉中蒼梧刺史京師云廣州西南數郡人病将死便有飛蟲狀如麥集舎人死便食不可斷截惟殘骨在便去以梓板爲器則不集蟯音饒說文曰蟯蝮中短蟲也史記曰臨菑汜里女子薄吾病甚衆醫皆爲寒熱篤當死不治淳于意侯其脉曰蟯瘕蟯瘕爲腹大上膚黄麤修之戚戚然意飲以元華一撮即出蟯可數升病巳三十日如故淮南子曰天下物莫不資於水澤及音𡵨蟯而不求報高誘曰蟯微蟲也蛻廣雅曰復育蛻也論衡曰蟬生於復育開背而岀蛾詩曰螓首蛾眉}
