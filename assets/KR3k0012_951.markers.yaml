  - {type: variant, offset: 2341, length: 198, content: 齊書曰蕭季敞為廣州刺史為都護周世雄所襲軍敗奔山中為蛭所嚙肉盡而死常璩華陽國志曰南廣郡土地無稻田蠶桑多虵蛭虎狼賈誼書曰楚惠王食寒葅而得蛭固遂吞之腹有疾而不能食令尹入問疾王曰吾食葅而得蛭不行其罪是法廢而威不立譴而誅恐監食皆死遂吞之令尹曰天道無親惟德是輔王有仁德病不為傷王果病愈王充論衡曰蛭食血之蟲惠王殆有積血之疾故食積血之蟲而病愈也不然則賢者操行豈若吞蛭除病賢者常無病也張茂先博物志曰水蛭三斷而成三物, SBCK: 班猫}
