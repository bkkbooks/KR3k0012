  - {type: variant, offset: 2585, length: 1, content: 蚑, SBCK: 元青一名青蛙一眞者岀梁州狀如大馬蟻有小翼子僞者即是班猫所化狀如大豆大都治躰略同必不能得眞此亦可用蛤蚧嶺表録異曰蛤蚧首如蝦蟇背有細鱗如蠶子土黄色身短尾長多巢於樹中端州子墻内有巢於㕔署城樓間者旦暮則鳴自呼蛤蚧或云鳴一聲是一年者里人採之鬻於市爲藥能治肺疾醫人云藥力在尾尾不具者無功龐降嶺表録異曰龐降}
