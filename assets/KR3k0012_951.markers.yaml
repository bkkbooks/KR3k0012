  - {type: variant, offset: 11, length: 2, content: 蜻蛉, SBCK: 亂頭多憂蚤虱生愁膳夫仲年使我無聊􅀃文曰蚤齧人跳蟲也韓子曰子韋見孔子於啇太宰曰吾見孔子則視子猶蚤虱之細者也今吾見之於君子韋恐孔子貴於君也因}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_SBCK_951-1b}
  - {type: variant, offset: 11, length: 2, content: 蜻蛉, WYG: 亂頭多憂蚤虱生悲臈夫仲我使我無聊説文曰蚤齧人跳䖝也韓子曰子韋見孔子於商太宰曰吾見孔子則視子猶蚤虱之細者也今吾見之於君子韋恐孔子貴於君因}
