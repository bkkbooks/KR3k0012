  - {type: variant, offset: 2105, length: 1628, content: 名烏蠋也廣志曰藿蠋有五色者槐香蠋五采有角甚臭白澤曰蠋有角五采文長尾者龍也殺之兵死韓子曰鱓似虵而蠶似蠋人見虵則驚駭見蠋則毛起漁者持鱓婦人拾蠶利之所在皆為賁育水馬南州異物志曰交趾海中有蟲狀如馬形因名曰水馬婦人難產者手握持此蟲或燒作屑服之則更易如羊之產也凡物之中羊產最易抱朴子曰以赤斑蜘蛛及水馬合馮夷水仙丸服之可以居水中徐衷南方草物狀曰海中有魚狀似馬或黃或黑海中民人名作水馬捕魚得之不可啖食暴乾熇之婦人產難使握持之亦可燒飲水蛭爾雅曰蛭蟣郭璞注曰今江東呼水中蛭蟲入人肉者為蟣音祈也齊書曰蕭季敞為廣州刺史為都護周世雄所襲軍敗奔山中為蛭所嚙肉盡而死常璩華陽國志曰南廣郡土地無稻田蠶桑多虵蛭虎狼賈誼書曰楚惠王食寒葅而得蛭固遂吞之腹有疾而不能食令尹入問疾王曰吾食葅而得蛭不行其罪是法廢而威不立譴而誅恐監食皆死遂吞之令尹曰天道無親惟德是輔王有仁德病不為傷王果病愈王充論衡曰蛭食血之蟲惠王殆有積血之疾故食積血之蟲而病愈也不然則賢者操行豈若吞蛭除病賢者常無病也張茂先博物志曰水蛭三斷而成三物本草經曰水蛭一名至掌味鹹治惡血瘀結水閉破凝積利水道陶洪景集注本草經曰水蛭味鹹苦平微寒有毒一名蚑生雷澤池澤蚑音蜞短狐毛詩何人斯曰為鬼為蜮則不可得蜮短狐也韓詩外傳曰短狐水神也陸機毛詩䟽義曰為鬼為蜮蜮短狐也一名射影如龜二足江淮水皆有人在岸影見水中投人影則殺人故曰射影也南京人欲入水以瓦石投水中令濁乃入也或又含沙射人入肌其瘡如疥魯莊公十八年秋經書有蜮傳稱不為災也穀梁傳莊公曰秋有棫一有一亡曰有言不常有蜮射人者也今短狐射人為疾是也左傳同廣雅曰射工棫短狐也書紀年曰晉獻公二年春周惠王居于鄭鄭人入王府多取玉焉玉化為蜮射人齊書曰屠氏女晝採樵夜漬以供養父母父母俱卒親營殯葬負土成墳忽空中有聲云汝至性可重山神欲相驅使汝可為人療病必得大富女謂是鬼魅弗敢從遂得病積時鄰舍人有溪蜮毒者女識毒試療之自覺病便差遂以巫道為人療疾無不愈者家產日益抱朴子曰短狐一名蜮一名射工一名射影其實水蟲也狀似鳴蜩而如合杯有翼能飛無目利耳口中有橫物如聞人聲緣口中物如角弩以氣為矢激水而射人中身者即發瘡不曉治之者殺人其病似大傷寒不日皆死又曰射工蟲冬天蟄於谷間大雪時索之此蟲所在其雪不積留氣起如灼蒸當掘之不過入地一尺則得也陰乾末帶之夏天自辟射工也玄中記曰水狐者視其形蟲也見其氣乃鬼也長三四寸其色黑廣寸許背上有甲厚三分許其口有物向前如角狀見人則氣射人去二三步即射人中十人六七人死地理書曰車茂安與夏書云外生石季甫忽為鄭令此縣既有短狐之疾又沙虱害人聞此消息倍益愁慮博物志曰江南山溪水中有射工蟲甲蟲之類也長一二寸口中有弩形以氣射人影隨所著處發瘡不治則殺人沙虱廣雅曰沙虱蜁也音旋廣志曰沙虱色赤大不過蟣在水中入人皮中殺人唐書曰南中山川有鴆鳥之地必有犀牛有沙虱水弩必生可療之草又曰南平獠部落土氣多瘴癘山有毒草及沙虱蝮虵淮南萬畢術曰沙虱一名蓬活一名地脾抱朴子內篇曰沙虱雨後及晨暮踐沙必著人如毛髮端初著人便入皮裏可以針挑取之正赤如丹著人上動行若不挑即此蟲便入人身中殺人行此蟲之地每還輒當以火自炙令遍則蟲隨火去也水陸皆有之博物志曰深山窮谷多毒虐之物氣則有瘴癘人則有工蟲獸則有虎鳥則有鴆虵則有蝮蟲則有射工沙虱草則有鉤吻野葛其餘則蛟蟒之屬生焉本草經曰沙虱一名石蠶葛洪方曰辟沙虱用麝香大蒜合羊脂擣著小筒中帶之良十二時蟲博物志曰交州南有蟲長或一寸大小如指有廉槾亡旦切形似白石英不知其名視之無定色在陰地色多緗綠出日光中變易或青或綠或丹或黃或紅或赤女人取以為首飾宗岱每深以為物無定色引雲霞以為喻故託此以助成其說今孔雀毛亦隨光色變易或黃或赤但不能如此蟲耳嶺南異物志曰容州有蟲如守宮身圓而頸長頭有冠幘一日中隨時變色青黃赤白黑未嘗定土人不能名呼為十二時蟲囓人不可療又曰南方有蟲大如守宮足長身青肉鬣赤色其首隨十二時變子時鼠丑時牛亥時豬性不傷人名曰避役見者有喜慶嶺表錄異曰十二時蟲則虵師蜥蜴之類也土色者身尾長尺餘腦上連背有鬐鬣草樹上行極迅速亦多在人家籬落間俗傳云一日隨十二時變色因名之, WYG: ''}
