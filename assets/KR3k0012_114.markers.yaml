  - {type: variant, offset: 2991, length: 10, content: 宣遺詔皇太子宜於柩前, SBCK: 受􅁽御丹鳯樓大赦天下八月上謂宰臣曰天下事重不可一日曠廢􅀂遇連假不坐有事即詣延英請對崔羣以殘暑方甚目同列將退上止之曰數日一見卿等時雖暑􅀬朕不爲勞九月上謂宰相曰朕讀玄宗實録見開元􅀄銳意求理至十六年巳後稍似懈倦開元末又不及中年何也崔羣對曰玄宗少歴民間身經迍難故}
  - {type: page-break, offset: 2991, content: '', id: KR3k0012_SBCK_114-5b}
  - {type: variant, offset: 2991, length: 10, content: 宣遺詔皇太子宜於柩前, WYG: 受册御丹鳯樓大赦天下八月上謂宰臣曰天下事重不可一日曠廢若遇連假不坐有事即詣延英請對崔羣以殘暑方甚目同列將退上止之曰數日不見卿等時雖暑熱朕不為勞九月上謂宰相曰朕讀𤣥宗實録見開元初鋭意求理至十六年以後稍似懈倦開元末又不及中年何也崔羣對曰𤣥宗少厯民間身經迍難故}
