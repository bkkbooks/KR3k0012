  - {type: variant, offset: 2977, length: 0, content: '', SBCK: 禮畢御丹鳯樓大赦天下七月詔削奪淄青節度使李師道官爵仍令宣武魏􅀶義成等五鎮之師分路進討十二月上謂宰臣曰人臣事君但力行善事自致公望何乃好樹朋黨朕甚惡之裴度對曰君子小人未有無徒者君子之徒則同心同德小人之徒是朋是黨上曰他人之言亦與卿等相似豈易辯之哉度曰君子小人觀其所行當自區別矣上曰凢好事口􅀃則易躬行則難卿等旣言之湏行之勿空言􅀃度等謝曰陛下處分可謂至矣臣等敢不激厲然天下之人從陛下所行不從陛下所言臣等亦願陛下每言之則行之上頗忻納十四年春正月以東師􅀫野不受朝賀三月上謂宰臣曰聽受之間大是難事推誠選任所謂委􅀉必合盡心及至所行臨事不無偏黨朕臨御已來歳月斯乆雖不明不敏然漸見物情每於行爲務欲詳審比令學士集前代昧政之事爲辯謗略每欲披閱以爲鑒戒耳崔羣對曰無情曲直辯之至易稍懷欺詐審之實難故孔子有衆好衆惡之論浸潤膚受之􅀃蓋以曖昧難辯故也􅀂擇賢而任之待之以誠糾之以法則人自歸公孰敢行僞陛下詳觀載籍以廣聦明實天下幸甚七月羣臣上尊號曰元和聖文神武法天應道皇帝}
  - {type: page-break, offset: 2977, content: '', id: KR3k0012_SBCK_114-5a}
  - {type: variant, offset: 2977, length: 0, content: '', WYG: 禮畢御丹鳯樓大赦天下七月詔削奪淄青節度使李師道官爵仍令宣武魏博義成等五鎮之師分路進討十二月上謂宰相曰臣事君但力行善事自致公望何乃好樹朋黨朕甚惡之裴度對曰君子小人未有無徒者君子之徒同心同德小人之徒是朋是黨上曰他人之言亦與卿等相似豈易辨之哉度曰君子小人觀其所行當自區别矣上曰凡好事口説則易躬行則難卿等既言之須行之勿空口説度等謝曰陛下處分可謂至矣臣等敢不激勵然天下之人從陛下所行不從陛下所言臣等亦願陛下每言之則行之上頗忻納十四年春正月以東師宿野不受朝賀三月上謂宰臣曰聽受之間大是難事推誠選任所謂委寄必合盡心及至所行臨事不無偏黨朕臨御以來嵗月斯久雖不明不敏然漸見物情每於行為務欲詳審比令學士集前代昧政之事為辨謗略每欲披閲以為鑒戒耳崔羣對曰無情曲直辨之至易稍懐欺詐審之實難故孔子有衆好衆惡之論浸潤膚受之説葢以曖昧難辨故也若擇賢而任之待之以誠糾之以法則人自歸公孰敢行偽陛下詳觀載籍以廣聰明實天下幸甚七月羣臣上尊號曰元和聖文神武法天應道皇帝}
