  - {type: variant, offset: 5915, length: 0, content: '', SBCK: 壬子召侍講學士韋處厚路隨於太液亭講毛詩􅀜睢尚書洪範等篇旣罷並賜緋九月辛丑大合樂於魚藻宫觀競渡又召李光愬李光顔入朝欲於重陽日宴群臣拾遺李班等上䟽諫云元朔未改園陵尚新雖易月之期俯從人欲而三年之制猶服心䘮夫遏宻施禁蓋爲齊人合樂内庭事將未可不聽十月鎮州王承元以所部四命請命以魏􅀶節度等使田􅀪正爲鎮州節度使以承元爲滑州節度使長慶元年正月巳亥朔上親薦獻太清宫太廟是日法駕赴南郊日抱珥宰臣賀於前辛丑祀昊天上帝於圎丘即日還宫御丹鳯樓大赦天下改元長慶内外文武及致仕官三品巳上賜爵一級二月景子上觀雜􅇊樂於麟德殿歡甚謂給事中丁公著曰比聞外間公卿士庻時爲歡宴蓋時和民安甚慰予心公著對曰誠有此事然臣之愚見風俗如此亦不足嘉百司庻務漸恐勞煩聖慮上曰何至於是對曰夫賔宴之禮務逹誠敬不繼以滛故詩人美樂且有儀璘異屢舞前代名士良辰宴聚或清談賦詩投壷雅歌雖以盃酌獻酬不至於亂國家自天寳已後風俗奢靡宴席以諠譁沉􅊺爲樂而居重位秉大權者優雜倨肆於公吏之間曽無愧恥公私相効漸以成俗由是物務多廢獨聖心求理安得不勞宸慮乎陛下冝頒訓令禁其過差則天下幸甚時上荒于酒樂公著因對諷之頗深嘉納三月幽州劉緫請分割地土入朝公卿皆疑獨上推誠納之以宣武節度使張􅀪靖爲幽州節度使以緫爲鄆州節度使秋七月壬子羣臣上尊號曰文武孝德皇帝上受􅁽於宣政殿禮畢御丹鳯樓大赦天下甲寅幽州􅁥軍使奏軍亂囚節度使張􅀪靖於别館害判官韋雍張宗元崔仲卿鄭塤軍人取朱滔子洄爲留後洄自以年老令軍人立其子克融爲留後八月己巳鎮州􅁥軍宋惟澄奏軍亂節度使田􅀪正并家屬將佐三百餘口並遇害軍人推衙將王庭湊爲留後二年二月甲子詔雪王庭湊仍授鎮州大都督府長史充成德軍節度等使三軍將士待之如􅀄仍令韓愈往彼宣諭十月詔江淮諸州旱損田苗頗多所在米價不免踴貴眷言疲瘵湏議優矜冝委淮南浙東浙西宣歙江西福建等道觀察使各於當道有水旱處取常平義倉斛斗據時估减半價出糶以惠貧民十一月庚午命景王率禁軍五百􅀐侍從皇太后幸華清宫又幸石甕寺}
