  - {type: variant, offset: 6154, length: 0, content: '', WYG: 同平章事上始御延英對宰臣二月辛丑御丹鳯樓大赦天下壬寅勅舉賢良方正直言極諫科目人宜令中書門下尚書省四品以上於尚書省同試三月壬子召侍講學士韋處厚路隨於太液亭講毛詩關雎尚書洪範等篇既罷並賜緋九月辛丑大合樂於魚藻宫觀競渡又召李愬李光顔入朝欲以重陽日宴羣臣拾遺李班上疏諫云元朔未改園陵尚新雖易月之期俯從人欲而三年之制猶服心喪夫遏密施禁葢為濟人合樂内庭事將未可不聽十月鎮州王承元以所部四州請命以魏博節度等使田𢎞正為鎮州節度使以承元改滑州節度使長慶元年正月己亥朔上親薦獻太清宫太廟是日法駕赴南郊日抱珥宰臣賀於前辛丑祀昊天上帝於圜丘即日還宫御丹鳯樓大赦天下改元長慶内外文武及致仕官三品以上賜爵一級三月庚子上觀伎樂於麟德殿歡甚謂給事中丁公著曰比聞外間公卿士庶時有歡宴葢時和民安甚慰予心公著對曰誠有此事然臣之偶見風俗如此亦不足嘉百司庶務漸恐勞煩聖慮上曰何至於是對曰夫賓宴之禮務達誠敬不繼以淫故詩人美樂且有儀而戒屢舞前代名士良辰宴聚或清談賦詩投壺雅歌雖以杯酌獻酧不至於亂國家自天寳以後風俗奢靡宴席以諠譁沉湎為樂而居重位秉大權者優雜倨肆於公吏之間曾無愧恥公私相効漸以成俗由是物務多廢獨聖心求理安得不勞宸慮乎陛下宜頒訓令禁其過差則天下幸甚時上荒於酒樂公著因對諷之頗深嘉納三月幽州劉總請分割地土入朝公卿皆疑獨上推誠納之以宣武節度使張𢎞靖為幽州節度使以總為鄆州節度使秋七月壬子羣臣上尊號曰文武孝德皇帝上受冊於宣政殿禮畢御丹鳯樓大赦天下甲寅幽州監軍使奏軍亂囚節度使張𢎞靖於别館害判官韋雍張宗元崔仲卿鄭塤軍人取朱滔子洄為留後洄自以年老令軍人立其子克融為留後八月乙巳鎮州監軍宋惟澄奏軍亂節度使田𢎞正并家屬將佐三百餘口並遇害軍人推衙將王庭凑為留後二年三月甲子詔雪王庭凑仍授鎮州大都督長史充成德軍節度等使三軍將士待之如初仍令韓愈往彼宣諭十月詔江淮諸州旱損田苖頗多所在米價不免踴貴眷言疲瘵須議優矜宜委淮南浙東浙西宣歙江西福建等道觀察使各於當道有水旱處取常平義倉斛斗據時估減半價糶以恵貧民十一月庚午命景王率禁軍百騎侍從皇太后幸華清宫又幸石甕寺癸酉上幸華清宫迎皇太后巡狩於驪山下即日馳還皇太后翌日方還庚辰上與内官擊鞠禁中有内官歘然墜馬如物所撃上恐罷鞠升殿遽足不能履地風眩就牀自是外不聞上起居者三日十二月丁亥詔五坊鷹隼解放獵具並毁之庚寅宰臣李逢吉率百寮至延英門請見上不許裴度與諸大臣三上疏請立皇太子辛卯上於紫宸殿見百寮李逢吉奏景王成長請立為皇太子左僕射裴度又極言之癸巳詔立景王為皇太子丙午上御宣政殿冊立皇太子受册畢百寮謁太子於東宫三年正月丁巳上以疾苦不受朝賀是日大風昏翳竟日四年正月辛亥上御正殿受朝如常儀上餌金石之藥處士張皋上疏切諫上悅召之求皋不獲辛未上大漸詔皇太子監國事壬申上崩於寢殿時年三十謚曰聖文惠孝皇帝廟號穆宗葬於光陵敬宗昭愍皇帝唐書曰敬宗昭愍皇帝諱湛穆宗長子母曰恭僖太后王氏元和四年六月七日生於東宫之别殿長慶元年封景王二年立為皇太子四年正月穆宗崩皇太子即位時年十六二月辛巳朔上衰服見羣臣於紫宸門外癸未貶户部侍郎李紳為端州司馬辛卯勅没掖庭宫人先配内園宫人並宜放出任其所適己亥冊大行皇帝皇太后為太皇太后三月上御丹鳯樓大赦天下天下常貢之外不得進獻六宅十宅諸王女宜令每年於選人中選擇降嫁甲寅始於延英對宰臣甲子故山南東道節度使牛元翼家屬悉為王庭湊所害上惜其横死傷悼久之仍歎宰執非才縱奸臣䟦扈翰林學士韋處厚奏曰理亂之本非有他術順人則理違人則亂陛下當食歎惜恨無蕭曹今有一裴度尚不能用此馮唐所以感悟漢文雖有頗牧不能用也戊辰羣臣入閣日髙猶未坐有不任立而踣者諫議大夫李渤出次請御殿俄而始坐班退左拾遺劉栖楚極諫叩頭龍墀血流上為之動容丙申賊張韶等百餘人至右銀臺門殺奄者揮兵大呼進至清思殿登御榻而食弓箭庫左神䇿軍兵馬使康藝全率兵入宫討平之是日上聞變急幸左軍丁酉上還宫羣臣稱慶諫議大夫李渤以上輕易致盜言甚激切五月制以吏部侍郎李程户部侍郎竇易直}
