  - {type: variant, offset: 2915, length: 4, content: 吐蕃贊普, krp: 癸巳羣臣上尊號曰睿聖文武皇帝御宣政殿受冊禮畢御丹鳯樓大赦天下庚子涇原叚祐請修臨涇城在涇州北九十里扼犬戎之衝要詔從之四年秋七月御製前代君臣事迹十四篇書於六扇屏風是月出書屏以示宰臣丁未渭南暴水壞廬舎二百餘户口溺死六百人命府司賑給八月安南都護張舟奏破壞王國三萬餘人獲戰象兵械并王子五十九人十月冊鄧王寧爲皇太子癸巳以冊儲肆赦繋囚死罪降從流巳下遞减等工部侍郎歸登給事中吕元膺爲皇太子諸王侍讀五年八月乙亥上謂宰臣曰神仙之事信乎李藩對曰神仙之說出於道家道家所宗老子五千文爲本老子指歸與六經無異前代好恠之流假託老子爲神仙之說故秦始皇}
  - {type: variant, offset: 2920, length: 4, content: 使修好塞, SBCK: 方士載童女入海求仙藥漢武帝嫁女與方士求不死藥二主受惑卒無所得文皇帝服胡僧長生藥遂致􅁀疾不救古詩云服食求神仙多爲藥所悮誠哉是言也君人者但務求理四海樂推社稷延永自然長年也上深然之六年十一月乙丑制以户部侍郎李綘爲中書侍郎同平章事十二月辛夘皇太子寧薨謚曰惠昭七年五月上謂宰臣曰卿言吴越去年水旱昨有御史自江淮廻言不至爲灾人非甚困李綘對曰臣得兩浙淮南狀繼言歉旱方隅授任皆朝廷信重之臣御史非良或容希媚此正當姦侫之目况推誠之道君人大本任大臣以事不可以小臣言間之伏望明示御史姓名正之典刑上曰卿言是也朝廷大體以恤人爲本一方不稔即冝賑救濟其飢寒况可疑之耶向者不思而有此問朕言過矣八年三月辛未}
  - {type: page-break, offset: 2920, content: '', id: KR3k0012_SBCK_114-4a}
  - {type: variant, offset: 2920, length: 4, content: 使修好塞, WYG: 方士載童男女入海求仙藥漢武帝嫁女與方士求不死藥二主受惑卒無所得文皇帝服胡僧長生藥遂致暴疾不救古詩曰服食求神仙多為藥所誤誠哉言也君人者但務求理四海樂推社稷延永自然長年也上深然之六年十一月乙丑制以户部侍郎李絳為中書侍郎同平章事十二月辛卯皇太子寧薨諡曰恵昭七年五月上謂宰臣曰卿言呉越去年水旱昨有御史自江淮回言不至為灾人不甚困李絳對曰臣得兩浙淮南狀相繼言歉旱方隅授任皆朝廷信重之臣御史非良或容希媚此當出姦佞之口况推誠之道君人大本任大臣以事不可以小臣言間之伏望明示御史姓名正之典刑上曰卿言是也朝廷大體以恤人為本一方不稔即宜賑救濟其饑寒况可疑之耶向者不思而有此問朕言過矣八年三月辛未}
