  - {type: variant, offset: 198, length: 280, content: 吐蕃合南蠻之眾號二十萬三道寇茂州扶文黎雅等州連陷郡邑發禁兵四千助蜀大破之十二月乙卯立宣王誦為皇太子建中元年春正月丁卯朔御含元殿改元建中群臣上尊號曰聖神文武皇帝己巳朝太清宮庚午謁太廟辛未有事於郊丘還宮御丹鳳門大赦天下自艱難以來徵賦名目頗多今後除兩稅外輒率一錢以枉法論二年三月築汴州城初大曆中李正己有淄青齊海登萊沂密德棣曹濮兗鄆十五州之地李寶臣有恒定易趙深冀滄七州之地田承嗣有魏愽相衛洺貝澶七州之地梁崇義有襄鄧均房復郢六州之地各聚兵數萬始因叛亂得立雖朝廷寵待加恩心猶疑貳皆連衡盤結以自固先是汴州以城隘不容眾請廣之至是築城五月景寅以軍興十一而稅冬十一月尚書左僕射楊炎, SBCK: 壬申}
