  - {type: variant, offset: 3005, length: 0, content: '', SBCK: 乆安於逸樂漸逺端士而近小人宇文融以聚歛媚上心李林甫以姦邪惑上意加之以國忠故及於亂願陛下以開元􅀄爲法以天寳末爲戒即社稷無疆之福也時皇甫鏄以謟刻欺蔽在相位故羣因奏以諷之上服方士栁泌金丹藥起居舎人裴隣上表切諌以金石含酷烈之性加燒錬則火毒難制􅀂金丹巳成且令方士自服一年觀其効用則進御可也上怒貶隣爲江陵令十五年春正月甲戍朔上以餌金丹小不豫罷元㑹庚子夕上}
