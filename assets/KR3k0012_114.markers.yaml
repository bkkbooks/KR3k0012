  - {type: variant, offset: 479, length: 2190, content: 崖州司馬尋賜死三年四月封朱滔為通義郡王朱滔王武俊與田悅合從而叛十一月朱滔田悅王武俊於魏縣軍壘各相推獎僣稱王號署官名如國初親王行臺之制丁丑李希烈自稱天下都元帥太尉建興王與朱滔等四盜膠固為逆四年春正月鳳翔節度使張鎰與吐蕃宰相尚結贊同盟于清水庚寅李希烈陷汝州執州將李元吉而去東都震駭甲午遣顏真卿宣慰李希烈軍八月丁未李希烈率眾三萬攻哥舒曜於襄城東都危急冬十月詔涇原節度使姚令言率涇原之師救哥舒曜丁未涇原軍出京城至滻水倒戈謀叛姚令言不能禁止上令載繒綵二車遣普王往慰諭之亂兵已陣于丹鳳闕下促神策軍拒之無一人至者上與太子諸王妃主百餘人出苑北門右龍武軍使令狐建方教射於軍中聞難聚射士得四百人扈從其夕至咸陽飯數匕而過戊申至奉天己酉元帥都虞候渾瑊以子弟家屬至乃以瑊為行在都虞候亂兵既剽京城屯於白華乃於晉昌里迎朱泚為帥稱太尉居含元殿上以奉天隘欲幸鳳翔壬子鳳翔軍亂殺節度使張鎰乃止癸丑李希烈陷襄城哥舒曜走洛陽丁巳邠寧節度韓遊環與論惟明率兵三千至纔入奉天賊軍亦至乃出拒之王師不利賊攻城愈急矢石雨下死傷者眾人心危蹙上與渾瑊對泣朱泚據乾陵作樂下瞰城中辭多侮慢戊子朔方節度使李懷光遣兵馬使張韶奉表言大軍將至乃令舁韶巡城叫呼歡聲動地賊不之測疑懼緩攻癸巳懷光軍次醴泉是夜賊解圍而去神策將李晟自定州率師赴難軍於渭橋興元元年春正月上在奉天詔曰克致興化必在推誠忘已濟人不恡改過朕嗣服丕搆君臨萬邦失守宗祧越在草莽不念率德誠莫追於既往永言思咎期有復於將來明徵其義以示天下予小子懼德不嗣罔敢怠荒然以長於深宮之中暗於經國之務積習易溺居安忘危不知稼穡之艱難不卹征戍之勞苦澤靡下究情不上通事既擁隔人懷疑阻猶昧省已遂用興戎徵師四方轉餉千里賦車藉馬遠近騷然行齎居送眾庶勞止力役不息田萊多荒暴令峻於誅求疲民空於杼軸轉死溝壑離去鄉閭邑里丘墟人煙斷絕天譴於上而朕不寤人怨於下而朕不知馴致亂階變起都邑賊臣乘釁肆逆滔天曾莫愧畏敢行凌偪萬品失序九廟震驚上累于祖宗下負于蒸庶痛心靦面罪實在予永言愧悼若墜泉谷賴天地降祐人祗叶謀將相竭誠爪牙宣力群盜斯屏皇維載張將弘永圖必布新令朕晨興夕惕惟省前非乃者公卿百寮用加虛美以聖神文武之號被蒙暗寡昧之躬固辭不獲俯遂群議昨因內省良所瞿然自今己後中外書奏不得言聖神文武之號今上元統曆獻歲發祥宜革紀年之號式敷在宥之澤可大赦天下改建中五年為興元元年李希烈田悅王武俊李納咸以勳舊繼守藩條朕撫馭乖方洗其疑懼皆由上失其道而下罹其災一切並與洗滌復其爵位待之如初仍即遣使宣諭朱滔以泚連坐路遠必不同謀永念舊勳務存弘貸如能效順亦與惟新朱泚反易天常盜竊名器暴犯陵寢所不忍言獲罪祖宗朕不敢赦除泚外並從原宥二月甲子加連城郡王李懷光太尉仍賜鐵券赦三死罪懷光怒曰凡人臣反逆乃賜鐵券恕以不死今懷光是反定矣因投之於地上聞懷光將叛令翰林學士陸贄往慰諭之其詞禮益倨悖尋李晟自咸陽移兵東渭橋避懷光也晟以懷光反狀已明請上幸蜀丁卯車駕幸梁州留戴休顏守奉天三月懷光燒營走歸河中庚寅車駕次城固壬辰至梁州四月辛丑朔時將士未給春衣上猶夾服漢中早熱左右請御暑服上曰將士未易冬服獨御春衫可乎俄而貢物繼至先給諸軍而始御之五月李晟自渭北移軍於光泰門外賊來薄我軍士奮擊大敗之斬馘千計戊戍晟列陣於光泰門外遣騎將史萬頃往神麚村開苑墻二百餘步賊樹柵當之我軍爭拔柵與賊血戰賊黨大敗追擊至白華朱泚姚令言率眾萬餘遁去晟收復京城是日渾瑊與戴休顏亦破賊三千於咸陽韓遊瓌追朱泚於涇州六月李晟上收城露布上覽之涕下霑襟涇州田希鑒斬姚令言幽州軍士韓旻於彭原斬朱泚並傅首至行在乙巳遣吏部侍郎班宏入京宣慰六月戊午車駕發興元秋七月景子次鳳翔府壬午至自興元辛卯御丹鳳樓大赦天下九月丁亥上顧謂宰臣曰今大盜雖除時猶多難宜廣延納以達下情近日諫官都無論奏自今每正衙及延英坐日常令朝臣三兩人面奏時政得失庶有弘益也貞元元年正月丁酉朔御含元殿受朝賀禮畢宣制大赦天下改元時關東大飢賦調不入國用益窘關中飢民蒸蝗虫而食之五月分命朝臣禱群神以祈雨蝗自海而至群飛蔽天每下則草木及畜毛無復子遺穀價騰踊九月朔方大將牛名俊斬李懷光傳首闕下馬燧收復河中十月上御正殿策賢良方正能直言極諫等三科舉人十一月癸卯上親祀昊天上帝於圓丘禮畢御丹鳳樓大赦天下二年四月景寅淮西李希烈為其牙將陳仙奇所酖并誅其妻子仙奇以淮西歸順九月乙巳吐蕃寇好畤京師戒嚴李晟部將王佖擊吐蕃於汧陽城敗其中軍辛亥寇鳳翔李晟出師禦之一夕而退冬十月李晟柭吐蕃摧沙堡十一月冊淑妃王氏為皇后丁酉右崩謚曰昭德辛丑吐蕃陷鹽州三年三月河東馬燧來朝時吐蕃相結贊使大將論頰熱辭厚意告焉燧請兩國同盟上疑其不誠不允故燧自將論頰熱入朝盛言蕃相請盟可以保信上從之五月辛未侍中渾瑊與吐蕃宰相尚結贊同盟于平涼為蕃兵所劫瑊遁而獲免崔漢衡已下將吏陷沒者六十餘人四年春正月上御丹鳳樓大赦天下京師地震辛亥又震壬子又震甲寅地震宴群臣於麟德殿己朱地震丁卯有司條奏省官其左右常侍太子賓客請依前置四員從之壬戍加置諫議大夫八員分中書四員為右門下四員為左是月吐蕃寇涇邠寧鄜慶等州焚彭原縣邊將閉城自固賊驅人畜三萬計凡二旬而退五年春正月乙卯詔自今宜以二月一日為中和節以代正月晦日備三令節數內外官司休假一日二月庚子以大理卿董晉為門下侍郎同平章事以御史中丞竇參為中書侍郎平章事兼轉運使六年春正月大雪二月戊辰朔百寮會宴於曲江亭上賦中和節群臣賜宴詩七韻是日百僚進兆人本業三卷八年四月乙未貶中書侍郎平章事竇參為郴州別駕以尚書左丞趙憬兵部侍郎陸贄並為, SBCK: ''}
