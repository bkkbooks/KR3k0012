  - {type: variant, offset: 6140, length: 0, content: '', SBCK: 李紳爲端州司馬辛夘勑没掖庭宫人先配内園宫人並冝放出任其所適巳亥􅁽大行皇帝皇太后爲太皇太后三月上御丹鳯樓大赦天下天下常貢之外不得進獻六宅十宅諸王女冝令每年於選人中選擇降嫁甲寅始於延英對宰臣甲子故山南東道節度使牛元翼家屬悉爲王庭湊所害上惜其􅁈横傷悼乆之仍歎宰執非才縱姦臣跋扈翰林學士韋處厚奏曰理亂之本非有他術順人則理違人則亂陛下當食歎息恨無蕭曹今有一裴度尚不能用此馮唐所以感悟漢文雖有頗牧不能用也戊辰羣臣入閤日髙猶未坐有不任立而踣者諌議大夫李渤出次白宰相俄而始坐班退}
