  - {type: variant, offset: 2915, length: 4, content: 吐蕃贊普, SBCK: 癸巳羣臣上尊號曰睿聖文武皇帝御宣政殿受􅁽禮畢御丹鳯樓大赦天下庚子涇原叚祐請修臨涇城在涇州北九十里扼犬戎之衝要詔從之四年秋七月御製前代君臣事迹十四篇書於六扇屏風是月出書屏以示宰臣丁未渭南􅁀水壞廬舎二百餘户口溺死六百人命府司賑給八月安南都護張舟奏破壞王國三萬餘人獲戰象兵械并王子五十九人十月􅁽鄧王寧爲皇太子癸巳以􅁽儲肆赦繋囚死罪降從流巳下遞减等工部侍郎歸登給事中吕元膺爲皇太子諸王侍讀五年八月乙亥上謂宰臣曰神仙之事信乎李藩對曰神仙之􅀃出於道家道家所宗老子五千文爲本老子指歸與六經無異前代好恠之流假託老子爲神仙之􅀃故秦始皇}
  - {type: page-break, offset: 2915, content: '', id: KR3k0012_SBCK_114-3b}
  - {type: variant, offset: 2915, length: 4, content: 吐蕃贊普, WYG: 癸巳羣臣上尊號曰睿聖文武皇帝御宣政殿受冊禮畢御丹鳯樓大赦天下庚子涇原段祐請脩臨涇城在涼州北九十里拒犬戎之衝要詔從之四年秋七月御製前代君臣事迹十四篇書於六扇屏風是月出書屏以示宰臣丁未渭南暴水壊廬舎二百餘户口溺死六百人命府司賑給八月安南都䕶張丹奏破瓌王國三萬餘人獲戰象兵械并王子五十九人十月冊鄧王寧為皇太子癸巳以冊儲肆赦繫囚死罪降徒流以下逓降一等工部侍郎歸登給事中吕元膺為皇太諸王侍讀五年八月乙亥上謂宰臣曰神仙之事信乎李藩對曰神仙之説出於道家道家所宗老子五千文為本老子指歸與六經無異前代好怪之流假托老子為神仙之説故秦始皇}
