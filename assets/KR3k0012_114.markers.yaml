  - {type: variant, offset: 3689, length: 1978, content: 喜阻兵為亂加泚四鎮北庭行軍涇原節度使與諸軍討伐涇州平加泚中書令還鎮鳳翔而以舒王謨遙領涇原節度二年又加泚太尉朱滔將反叛陰使人與泚計議以帛書內蠟丸中置髮髻間河東節度馬燧搜獲之以聞并送帛書及所遣使泚惶懼頓首乞歸罪有司上勉之曰千里不同謀非卿之過三年四月以張鎰代泚為鳳翔隴右節度留後留泚京師加實封至一千戶與一子正員官其幽州盧龍節度太尉中書令並如故四年十月涇原兵叛鑾駕幸鳳天叛卒等以泚嘗統涇州知其失權廢居怏怏思亂群寇無帥幸泚政寬乃相與謀曰朱太尉久囚空宅若迎而為主事必濟矣姚令言乃率百餘騎迎泚於進昌里第泚乘馬擁從北向燭炬星羅觀者萬計入居含元殿明日移處白華但稱太尉朝官有謁泚者悉勸奉迎鑾駕既不合泚意皆逡巡而退源休至遂屏人移時言多悖逆又盛陳成敗稱述符命勸其僣偽泚甚悅之又李忠臣張光晟繼至咸以官閑積憤樂於禍亂鳳翔涇原大將張庭芝叚誠諫以潰卒三千餘自襄城而至賊泚自謂眾望所集僣竊之心自此而定乃以源休為京兆尹判度支李忠臣為皇城使叚秀實久失兵柄故推心委之遂發銳師三千言奉迎乘輿實陰有逆謀秀實與劉海賓謀誅於泚且慮叛卒之震驚法駕乃潛為賊符追所發兵至六日兵乃駱驛而廻因與海賓同入見泚為陳逆順之理而海賓於靴中取匕首為其所覺遂不得前秀實知不可以義動遽奪源休象笏挺而擊泚仍大呼曰反虜當斬泚舉臂衛首秀實格拉之恟恟然李忠臣馳助泚泚素多力纔破其面逆徒譟集秀實海賓遂併見害明日聲言以親王權主社稷士庶競往觀之八日源休姚令言李忠臣張光晟等八人導泚自白華入宣政僣即偽位自稱大秦皇帝號應天元年愚智莫不憤怒侍衛皆卒伍寮吏行列不過十餘人下偽詔曰幽囚之中神器自至豈朕薄德所能經營彭偃之詞也偽署姚令言為侍中李忠臣為司空兼侍中源休為中書侍郎平章事判度支蔣鎮為吏部侍郎樊系為禮部侍郎儀禮使許季常為京兆尹洪經綸為太常少卿彭偃為中書舍人裴揆崔幼真為給事中崔宣為御史中丞張光晟仇敬忠敬釭張寶何望之叚誠諫張芝杜如江為節度使仍以其兄子遂為太子遙封弟滔為冀王太尉尚書令尋又號皇太弟十月泚自領兵侵逼奉天竊威儀輦輅闐隘道途蟻聚之眾軍勢頗盛以姚令言為元帥張光晟為副以李忠臣為京兆皇城留守居中書省尋以蔣鎮為門下侍郎李子平為諫議大夫並平章事泚軍合於城下渾瑊韓遊瓌禦之泚眾大敗死者萬計泚收軍於奉天東三里下營大修攻具明日泚又分兵營於乾陵下瞰城內大震十一月三日杜布全與泚眾戰於莫谷官軍不利自是賊眾驕怠王師乘城而戰人百其勇賊多敗衂或出野戰官軍又獲利焉泚乃大驅百姓填壍夜攻城城中設奇以應之賊乃退縮西明寺僧法堅有巧思為泚造雲梯十五日辰時梯臨城東北隅城內震駭渾瑊侯仲莊設火坑為地道陷之又縱火焚其梯東風起吹我軍眾頗危俄而風廻吹賊軍瑊益薪潑油鼓齊震風火俱熾須臾雲梯與兇黨同為灰燼城中三門悉出兵王師又捷其夜兵復出攻泚眾敗績李懷光以五萬人來援自河北至泚眾惶駭因而潰長圍遂解眾以為懷光三日不至城則危矣二十日夜泚走至京城時姚令言於城造戰格拋樓每坊團練人心大擾泚自奉天廻乃悉令去之曰攻戰吾自有計前此每三五日即使人偽自城外來周走號令曰奉天已破百姓聞之莫不飲泣道路闃寂時有入臺省吏人不過十數輩郎官六七人而亦令依常年舉選初有數十人陳狀旬日亦皆屏退泚自號其宅曰潛龍宮悉移內庫珍寶以實之識者曰易稱潛龍勿用此敗徵也無幾百姓剽奪其珍寶泚不能禁止明年正月一日泚改偽國號曰漢稱天皇元年二月李懷光既圖叛逆遣使與泚通和鑾駕幸梁洋自此衣冠之潛匿者出授偽官十七八焉懷光初與泚往復通好甚密以錢縠金帛互相饋遺泚與書事之如兄約云削平關中當割據山河永為鄰國及懷光決計背叛逼乘輿遷幸泚乃下偽詔書待懷光以臣禮仍徵兵馬懷光既為所賣慚怒憤恥遂領眾遁歸河中三月李晟駱元光尚可孤之眾悉於城東累敗泚眾四月泚使韓旻宋歸朝張庭芝等寇武功渾瑊以眾及吐蕃論莽羅大敗旻歸朝殺逆黨萬餘人於武亭川五月泚又使仇敬忠寇藍田尚可孤擊之大破泚眾擒敬忠斬之李晟駱元光尚可孤悉還師齊進晟屯光泰門逆徒拒官軍王師累捷二十八日官軍入苑收京師逆黨大潰泚與姚令言張庭芝源休李子平朱遂以數千人西走其餘黨或奔竄或來降泚眾緣路潰散乃奔涇州纔百餘騎而已田希鑒閉門登陴泚令謂希鑒曰我與爾節度何故背恩希鑒乃使人自城上擲泚所送旌節於外續又投火焚之泚遂過數里息於逆旅泚將梁庭芬入涇州說田希鑒曰我公比日殺馮河清背叛今雖歸順國家必不能久容公他日不免受禍何如開門納朱公與共成事希鑒以為然庭芬乃追及朱泚言之泚大悅使庭芬卻往涇州庭芬請授已尚書平章事泚不從庭芬既求宰相不得不復往涇州從泚至寧州彭原縣西城屯與泚心腹朱惟孝共射泚泚走墜故窖中泚左右韓旻薛綸高幽巖武震朱進卿董希芝共斬泚使宋應傳首以獻泚死時年四十三姚令言投涇州源休李子平走鳳翔尋並斬獲宋歸朝之敗武功降於李懷光送興元斬之唯不獲朱遂傳為野人所殺或云與泚子壻為金吾將軍馬悅潛走黨項部落數月得達幽州泚之僣逆官豎朱重曜頗親密用事泚每呼之為兄時賊中以臘月大雨偽星官謂泚曰當以宗中年長者禳其災變泚乃毒殺重曜以王禮葬焉及京師平出其尸而斬之順宗安, SBCK: 惠}
