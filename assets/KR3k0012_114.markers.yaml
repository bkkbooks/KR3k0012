  - {type: variant, offset: 3220, length: 468, content: 姓甚委信之希彩為政苛酷人不堪命大曆七年秋竟為孔目官李懷瑗所殺倉卒之際未有所從泚營在城北弟滔主衙內兵亦得眾心滔變詐多端潛使百餘人於眾中大言曰節度使非城北朱副使莫可眾既無從因共推泚泚遂權知留後遣使奉表京師十月拜檢校左散騎常侍兼御史中丞幽州盧龍節度等使八年三月遷幽州盧龍節度等使幽州長史兼御史大夫其年泚上表令弟滔率兵二千五百人赴京西防秋代宗嘉之手詔褒美九年就加檢校戶部尚書賜實封百戶幽州及河北諸鎮自天寶末便為逆亂之地李懷仙朱希彩與連境三節度名雖向順未嘗朝謁至是泚率先上表請自領部騎三千人入觀覲詔修甲第以待之九月泚至京師代宗御內殿引見賜御馬兩疋戰馬十疋金銀錦綵甚厚又以器物十床馬四十疋絹二萬疋衣一千七百襲賜其將士宴犒之盛近時未有泚又上表請留京師從之因授其弟滔兼御史大夫幽州節度留後仍以河陽永平軍防秋兵郭子儀統之決勝軍楊猷兵李抱玉統之淮西鳳翔兵馬璘統之汴宋淄青兵俾泚統焉十一年八月加拜同平章事尋令出鎮奉天行營復賜金銀繒綵并內庫弓箭以寵之十二年加檢校司空代李抱玉為隴右節度使權知河西澤潞行營兵馬事德宗嗣位加太子太師鳳翔尹實封至三百戶建中元年涇州將劉, SBCK: ''}
