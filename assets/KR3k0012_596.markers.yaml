  - {type: variant, offset: 2424, length: 10, content: 崔寔奏記於公府則崇讓, SBCK: 及廢帝即位下莊于獄曰卿作此誄時知有東宫否列女傳曰栁下惠死門下將誄之妻曰將述夫子德耶二三子不􅀂妾之知之乃爲誄曰夫子之信誠與人無害兮嗚呼哀哉魂神泄兮夫子之謚冝爲惠兮門人從之丗􅀃曰孫長樂作王長史誄云余與夫子交非勢利心猶淡水同此玄昧孝伯見云才士不遜亡祖何至與此人周旋又曰謝太傅問主簿陸退張慿何以作母誄陸荅曰故當是丈夫}
