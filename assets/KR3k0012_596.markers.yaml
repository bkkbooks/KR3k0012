  - {type: variant, offset: 1852, length: 557, content: 本則秦女楚珠復存於茲矣李充翰林論曰在朝辯政而議奏出宜以遠大為本陸機議晉斷亦各其美矣三國典略曰王粲才既高辯鍾繇王朗等雖各為魏卿相於朝廷奏議皆閣筆不敢措手又曰齊主命立三恪朝士議之太子少傅魏收為議眾皆同之吏部侍郎崔瞻以父與收有隙乃別立議收讀瞻議畢笑而不荅瞻曰瞻議若是須贊所長瞻議若非須詰所短何容讀國士議文直如此冷笑收但慚而竟無言又曰齊魏收嘗在議曹與諸博士引據漢書論宗廟事博士笑之收便忿取韋玄成傳抵之而起博士夜共披尋遲明乃來謝曰不謂玄成如此學也南史曰馬褧梁天監初詔通儒定五禮有司舉褧脩嘉禮除尚書祠部郎時創定禮樂褧所建議多見施行兼中書通事舍人每吉凶禮當時名儒明山賓賀瑒等疑不能斷者皆取決也唐書曰天寶中崔昌上封推五行之運以國家合承周漢其周隨不合為二王後請廢詔下尚書省集公卿議昌獨見之明群議不屈會集賢院學士衛包抗表陳論議之夜四星聚於尾宿天意昭然上心遂定求殷周漢後為三恪廢韓介酅等公以昌為左贊善大夫又曰張平叔判度支平叔欲以征利中上意以希大任請加監榷貴集州郡時宰不能奪因下其議韋處厚奏議發十難以詰之上然後深知害人乃止平叔繇是始踈獨斷曰有疑事公卿百官會議若臺閣有正處而獨執異意者曰駮議曰某官某甲議以為如是下言臣愚戇議異其非駮議不得言議異金樓子曰余後為江州副君賜報曰京師有語云論議當如湘東王仕官當如王克克時始為僕射領選也牋說文曰箋表識書, SBCK: 旨}
  - {type: variant, offset: 1852, length: 75, content: 本則秦女楚珠復存於茲矣李充翰林論曰在朝辯政而議奏出宜以遠大為本陸機議晉斷亦各其美矣三國典略曰王粲才既高辯鍾繇王朗等雖各為魏卿相於朝廷奏議皆閣筆不敢措手, WYG: 㫖也}
