  - {type: variant, offset: 2420, length: 1, content: 表, WYG: 束晢弔衛巨山曰元康元年楚王瑋矯詔舉兵害太保衛公及公四子三孫公世子黄門郎巨山與晢有交好時自本郡來赴}
  - {type: variant, offset: 2422, length: 1, content: 情, SBCK: 􅃖乎南史宋謝莊作宣貴妃誄曰賛堯門方之漢釣弋}
  - {type: variant, offset: 2422, length: 1, content: 情, WYG: 喪作弔文一篇以告其柩曰同志舊友陽平束晢頃聞飛虎肆暴竊矯皇制禍集於子宗嗣㡬㓕越自異方來赴來别遥望子弟銘旌藂立既闚子庭其殯盈十徘徊感慟載拜載泣歛袂升階子不我揖引袂授祛子不我執哀哉魂兮於焉栖集李充弔􅄞中散曰先生挺邈世之風負髙明之質神蕭蕭以宏遠志落落以遐逸忘尊榮於華堂括卑静於蓬室寧漆園之逍遥安柱下之得一寄欣孤松取樂竹林尚想榮莊聊與抽簮味孫觴之濁醪鳴七絃之清琴慕義人之𤣥㫖詠千載之徽音凌晨風而長嘯託歸流而詠吟乃自足於丘壑孰有慍乎陸沉馬樂原而跂足龜悅塗而曵尾疇廟堂而足榮豈和鈴之足視乆先生之所期羗𤣥逹於遐㫖尚遺大以出生何殉小而入死嗟乎先生逢時命之不丁冀後凋於嵗寒遭繁霜於夏零㓕皎皎之玊質絶琅琅之金聲援明珠以彈雀捐所重而為輕諒鄙心之不爽非大雅之所營袁宏友李氏弔嵇中散曰宣尼有言曰惟仁者能好人能惡人自非賢智之流不可以褒貶明徳擬議英哲矣故彼嵇中散之為人可謂命世之傑矣觀其徳行竒偉風韻劭邈有似明月之映幽夜清風之過松林也若夫吕安者嵇子之良友也鍾㑹者天下之惡人也良友不可以不明明之而理全惡人不可以不拒拒之而道顯夜光匪與魚目比映三秀難與朝華争榮故布鼓自嫌於雷門礫石有忌於琳琅矣嗟乎道之喪也雖智周萬物不能違顛沛之難故存其心者不以一𤯝累懐撿乎跡者必以纎芥為事慨逹人之獲譏悼髙範之莫全凌清風以三嘆撫絲桐而悵焉聞先覺之髙唱理極滯其必宣候千載之大聖期五百之明賢聊寄憤於斯章思慷慨而泫然哀辭文章流别論曰哀辭者誄之流}
