  - {type: variant, offset: 2419, length: 2, content: 識表, SBCK: 而武帝誄云尊靈永蟄明帝頌云聖體浮輕輕浮有似於蝴蝶永蟄頗擬於昆蟲施之尊極不}
  - {type: variant, offset: 2419, length: 0, content: '', WYG: 詩云神之弔矣言神至也君子令終定謚事極理哀故賔之慰主亦以至到為言也壓溺乖道所以不弔矣又宋水鄭火行人奉辭國災人亡故同弔也及晋築虒􅄗齊襲燕城史趙蘇秦翻賀為弔害民搆怨亦亡之道凢斯之例弔之所設也或驕貴以殞身或狷忿以乖道或有志而無時或美才而兼累追而慰之並名為弔自賈誼浮湘發憤弔屈體周而事覈辭清而理哀盖首出之作也又相如之弔二世全為賦體桓譚以為其言惻愴讀者嘆息及卒章要切斷而能悲也揚雄弔屈思積功寡意深文畧故辭韻沉膇班彪蔡邕並敏於致語然影附賈氏難為並驅耳胡阮之弔夷齊褒而無文仲宣所製譏呵實工然則胡阮嘉其清王子傷其隘各其志也彌衡之弔平子縟麗而輕清陸機之弔魏武詞巧而文繁降斯已下未有可稱者矣夫弔雖古義而華詞未造華過韻緩則化而為賦固宜正義以䋲理昭徳而塞違割析襃貶哀而有正則無奪倫矣左傳莊十一年曰秋宋大水公使弔焉曰天作滛雨害於粢盛若之何不弔對曰孤實不敬天降之災又以為君憂拜命之辱臧文仲曰宋其興乎禹湯罪已其興也勃焉桀紂罪人其亡也忽焉且列國有㓙稱孤禮也言懼而名禮其庶乎史記曰相如從上至長楊還過宜春宫奏賦以哀二世行失也其辭曰東馳土山兮北碣石瀬彌節容與兮歴弔二世持身不謹兮亡國失勢信䜛不寤兮宗廟㓕絶墳墓蕪穢而不脩兮魂無歸而不食漢書曰揚雄怪屈原文過相如至不容作離騷自投江而死悲其文未嘗不流涕也以為君子遇不遇命也何必沉身哉廼作書徃徃摭離騷文而反之自岷山投諸江流以弔屈原名曰反騷禰衡别傳曰南陽㓂松栢託劉景昇景昇嘗待遇景昇當蹔小出屬守長胡政令給視之松栢父子宿與政不佳景昇不在松柏子在後羅入盗迹胡政無狀便爾殺之景昇還慙悼無已即治殺胡政為作三牲醊焉正平為作板書弔之時當行在馬上即駐馬授筆倚柱而作之彌衡弔張衡其辭曰南岳有精君誕其姿清和有理君逹其機故能下筆繡辭揚手文飛昔伊尹值湯吕尚遇旦嗟矣君生而獨值漢蒼蝇争飛鳳凰已散元龜可覊河龍可絆石堅而朽星華而㓕惟道興隆悠永靡絶君音永浮河水有竭君聲永流旦光沒發余生雖後身亦存遊士貴知己君其勿􅁨糜元弔比干曰余既詰紂之後又感比干亢辭進諫不顧其身而受刳屠之戮殺身之後紂不悔寤失身快㓙君之心而無益於世故復責而弔之糜元弔夷齊曰少承洪烈闕於王側聞先生餓於首陽敢不敬弔寄之山崗嗚呼哀哉夫五徳更運天秩靡常如有絶代之主必有受命之王故堯終於虞舜禹殄於成湯且夏后氏之末祀殷氏之所亡若周武為有失則帝乙亦有傷子不棄殷而餓死我獨背周而深藏所在誰路而子經之首陽誰山而子匿之彼􅅔誰菜而子食之行周之道藏周之林讀周之書彈周之琴飲周之水食周之芹而謗周之主謂周之滛是誦聖之文聼聖之音居聖之世而異聖之心束晢弔蕭孟恩文曰東海蕭惠孟恩者父昔為御史與晢先君同僚孟恩及晢旦夕同逰分義早著孟恩夫婦皆亡門無血𦙍時有伯母從兄之憂未獲自徃致文一篇以弔其魂并修薄奠其文曰舊友人陽平束晢謹請同業生李察奉脯脩一束麥糒一器以致詞於處士蕭生之墓曰嗚呼哀哉精爽遐登形骸幽匿有耶亡耶莫之能測敬薦薄饋魂兮来食孟恩孟恩豈猶我}
