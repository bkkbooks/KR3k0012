  - {type: variant, offset: 2926, length: 8, content: 盛啟用兼表奏陳政, SBCK: 赴其䘮作弔文一篇以告其柩曰同志舊友陽平束晢頃聞飛虎肆􅁀竊矯皇制禍集于子宗祊幾滅越自兾方來赴來􅀕遥望子弟銘旌藂立旣闚子庭其殯盈十徘􅆦感慟載號載泣歛􅃑升階子不我楫引􅃑授祛子不我執魂兮魂兮於焉栖集李充弔嵇中散曰先生挺邈世之風資髙明之質神蕭蕭以宏逺志落落以遐逸忘尊榮於華堂括卑静於蓬室寜􅃮園之逍遥安柱下之得一􅀉欣孤松取樂竹林尚想榮莊聊與抽簮味孫觴之濁醪鳴七􅁌之清琴慕義人於􅀇旨詠千載之徽音凌晨風而長嘯託歸流而永吟乃自足於丘壑孰有愠乎陸沉馬樂厚而翹足􅀛恱塗而曵尾疇廟堂之是榮豈和鈴之足視乆先生之所期差玄逹於遐旨尚遺大以岀生何殉小而入死嗟乎先生逢時命之不丁兾後凋於􅀊寒遭繁霜而夏零滅皎皎之玉質絶琅琅之金聲投明珠以彈雀􅂢所重而爲輕諒心不爽非大雅之所營􅀽宏友李氏弔嵇中散曰宣尼有言曰唯仁者能好人能惡人自非賢智之流不可以褒貶明德擬議英哲矣故彼􅄞中散之爲人可謂命丗之傑矣觀其德竒偉風韻劭邈有似明月之暎幽夜清風之過松林也􅀂夫吕安者􅄞子之良友也鍾㑹者天下之惡人也良友不可以不明明之而理全惡人不可以不拒拒之而道顯然夜光匪與魚目比暎三秀難與朝華争榮故布皷自嫌於雷門礫石有忌於琳琅矣嗟乎道之䘮也雖智周萬物不能遣絶糧之困識逹去留不能違顚沛之艱故存其心者不以一􅌌累懷檢乎跡者必以纎芥爲}
