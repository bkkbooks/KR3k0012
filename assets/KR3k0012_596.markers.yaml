  - {type: variant, offset: 4228, length: 1220, content: 部從事也沈約宋書曰劉穆之朱齡石並便尺牘嘗於高祖坐與齡石共荅書自旦至日中穆之得百函齡石得八十函而穆之應對無廢又曰徐湛之善於尺牘音詞流暢南齊書曰周顒字彥倫善尺牘沈攸之送絕交書太祖口授令顒裁荅齊春秋曰吳都張融字思光臨終及葬徵士何點使汝南風周英為書與融謝𤅢見歎曰此書雖漂宕不倫亦有破的後周書曰梁臺性果敢有志操不過識百字口占書詞意可觀又曰柳慶時父僧習為潁川郡地接都畿民多豪右將選官皆依倚貴勢競來請託選用未定僧習謂子曰權貴請託吾並不用其使欲還皆須有荅汝等各以意為吾作書也慶乃具書草云下官受委大邦選吏之日有能者進不肖者退此乃朝廷恒典僧習讀書歎曰此兒有意氣丈夫理當如是即依慶所草以報後唐書曰李襲吉掌太祖書記襲吉博學多通尤諳悉國朝近事為文精意練實動拘典故無所放縱羽檄軍書辭理尤健自太祖上源之難與朱溫不叶乾寧末劉仁恭負恩其間論列是非交相聘荅者數百篇警策之句播在人口文士稱之天復中太祖與朱溫脩好遣張特致書初敘相失之由毒手尊拳之句溫怡然大笑謂幕史敬翔曰李公斗絕一隅削弱如此襲吉一函抵二十萬兵勢所謂彼有人可當也如吾之智筭得襲吉之筆才虎傅翼矣翔赧然而退魯連子曰燕伐齊取七十餘城唯莒與即墨不下齊田單以即墨破燕軍殺將軍騎劫復齊城唯聊城不下燕將守城數月魯仲連乃為書著之於矢以射城中遺燕將書燕將得書泣三日乃自殺韓子曰鄭人有遺燕相國書者夜火不明因謂持燭者曰舉燭而誤於書中云舉燭非書意也燕相國受書而悅之曰舉燭高明者舉賢而任之因以之治也皇甫謚高士傳曰光武徵嚴光至司徒侯霸使西之曹屬侯子道奉書光不起於床上箕踞發書讀訖問子道曰君房素癡今為三公寧小差否子道曰位居台鼎足不癡也光曰遣卿來何言子道曰公聞先生至區區欲即詣迫於典司是以不獲願因日暮自屈語言光曰卿言不癡是非癡語天子徵我三辭乃來人主尚不見當見人臣乎子道求報光曰我手不得書乃口授之曰君房足下位至鼎司甚善懷仁輔義天下悅阿諛順旨腰領絕無它言使者嫌少可更足光曰買菜乎求益耶魯國先賢志曰孔翊為洛陽令置器水於前庭得私書皆投其中一無所發彈治貴戚無所迴避典略曰太祖嘗使阮瑀作書與韓遂於馬上其具草書成呈之太祖攬筆欲有所定而竟不能增損語林曰殷洪喬作豫章郡臨去郡人因寄百餘函書至石頭悉擲水中因視祝之曰沉者自沉浮者自浮殷洪喬不能作達書郵魏文帝與吳質書曰元瑜書記翩翩致足樂也魏文帝集曰上平定漢中族父都尉還書與余盛稱彼上地形勢觀其詞知陳琳所為李充起居誡曰床頭書䟽亦不足視或是他私密事不欲令人見見之縱不能宣誰與明之若有泄露則傷之者至矣嵇康與山濤書曰素不便書不喜作書而人間事堆案盈几不相酬荅則犯教傷義欲自勉強則不能久堪延篤荅張奐書曰離別三年夢想言念何日有違伯英來惠之書盈四紙讀之及覆喜不可言張奐與陰氏書曰篤念既密文章粲爛奉讀周旋紙獘墨渝不離於手金樓子曰劉睦能屬文作春秋旨義終始論及賦頌數十又善史書當世以為揩則及寢病帝驛馬令作草書尺牘十首古詩曰客從遠方來遺我一書札置之懷袖中三歲字不滅又曰客從遠方來遺我雙鯉魚呼兒烹鯉魚中有尺素書長跪讀素書書中意何如上言加飡食下言長相憶, SBCK: 六}
  - {type: variant, offset: 4228, length: 1220, content: 部從事也沈約宋書曰劉穆之朱齡石並便尺牘嘗於高祖坐與齡石共荅書自旦至日中穆之得百函齡石得八十函而穆之應對無廢又曰徐湛之善於尺牘音詞流暢南齊書曰周顒字彥倫善尺牘沈攸之送絕交書太祖口授令顒裁荅齊春秋曰吳都張融字思光臨終及葬徵士何點使汝南風周英為書與融謝𤅢見歎曰此書雖漂宕不倫亦有破的後周書曰梁臺性果敢有志操不過識百字口占書詞意可觀又曰柳慶時父僧習為潁川郡地接都畿民多豪右將選官皆依倚貴勢競來請託選用未定僧習謂子曰權貴請託吾並不用其使欲還皆須有荅汝等各以意為吾作書也慶乃具書草云下官受委大邦選吏之日有能者進不肖者退此乃朝廷恒典僧習讀書歎曰此兒有意氣丈夫理當如是即依慶所草以報後唐書曰李襲吉掌太祖書記襲吉博學多通尤諳悉國朝近事為文精意練實動拘典故無所放縱羽檄軍書辭理尤健自太祖上源之難與朱溫不叶乾寧末劉仁恭負恩其間論列是非交相聘荅者數百篇警策之句播在人口文士稱之天復中太祖與朱溫脩好遣張特致書初敘相失之由毒手尊拳之句溫怡然大笑謂幕史敬翔曰李公斗絕一隅削弱如此襲吉一函抵二十萬兵勢所謂彼有人可當也如吾之智筭得襲吉之筆才虎傅翼矣翔赧然而退魯連子曰燕伐齊取七十餘城唯莒與即墨不下齊田單以即墨破燕軍殺將軍騎劫復齊城唯聊城不下燕將守城數月魯仲連乃為書著之於矢以射城中遺燕將書燕將得書泣三日乃自殺韓子曰鄭人有遺燕相國書者夜火不明因謂持燭者曰舉燭而誤於書中云舉燭非書意也燕相國受書而悅之曰舉燭高明者舉賢而任之因以之治也皇甫謚高士傳曰光武徵嚴光至司徒侯霸使西之曹屬侯子道奉書光不起於床上箕踞發書讀訖問子道曰君房素癡今為三公寧小差否子道曰位居台鼎足不癡也光曰遣卿來何言子道曰公聞先生至區區欲即詣迫於典司是以不獲願因日暮自屈語言光曰卿言不癡是非癡語天子徵我三辭乃來人主尚不見當見人臣乎子道求報光曰我手不得書乃口授之曰君房足下位至鼎司甚善懷仁輔義天下悅阿諛順旨腰領絕無它言使者嫌少可更足光曰買菜乎求益耶魯國先賢志曰孔翊為洛陽令置器水於前庭得私書皆投其中一無所發彈治貴戚無所迴避典略曰太祖嘗使阮瑀作書與韓遂於馬上其具草書成呈之太祖攬筆欲有所定而竟不能增損語林曰殷洪喬作豫章郡臨去郡人因寄百餘函書至石頭悉擲水中因視祝之曰沉者自沉浮者自浮殷洪喬不能作達書郵魏文帝與吳質書曰元瑜書記翩翩致足樂也魏文帝集曰上平定漢中族父都尉還書與余盛稱彼上地形勢觀其詞知陳琳所為李充起居誡曰床頭書䟽亦不足視或是他私密事不欲令人見見之縱不能宣誰與明之若有泄露則傷之者至矣嵇康與山濤書曰素不便書不喜作書而人間事堆案盈几不相酬荅則犯教傷義欲自勉強則不能久堪延篤荅張奐書曰離別三年夢想言念何日有違伯英來惠之書盈四紙讀之及覆喜不可言張奐與陰氏書曰篤念既密文章粲爛奉讀周旋紙獘墨渝不離於手金樓子曰劉睦能屬文作春秋旨義終始論及賦頌數十又善史書當世以為揩則及寢病帝驛馬令作草書尺牘十首古詩曰客從遠方來遺我一書札置之懷袖中三歲字不滅又曰客從遠方來遺我雙鯉魚呼兒烹鯉魚中有尺素書長跪讀素書書中意何如上言加飡食下言長相憶, WYG: 六}
