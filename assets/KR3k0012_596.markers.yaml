  - {type: variant, offset: 2915, length: 2, content: 奏事, krp: 先生餓於首陽敢不敬弔寄之山岡嗚呼哀哉夫五德更運天秩靡常如有絶代之主必有受命之王故堯終于虞舜禹殄於成湯且夏后氏}
  - {type: variant, offset: 2917, length: 38, content: 之末或云謹啟自晉來盛啟用兼表奏陳政事言既奏之異條讓爵謝恩亦表之別幹必辯要輕清, WYG: 愜觀}
