  - {type: variant, offset: 3387, length: 325, content: 郡將奉牋也漢書曰蘇武與常惠使匈奴被留昭帝即位數使至匈奴常惠請其守者與俱得夜見漢使具自陳道教使者謂單于言天子射上林中得鴈足有係帛書言武等在某澤中使者大喜如惠語單于單于視左右而敬謝漢使曰武等實在於是遣還漢又曰陳遵容皃奇偉略涉傳記贍於文辭善書與人尺牘皆以為榮為河南太守既至官遣吏西上召善書吏十人於前治私書謝京師故人遵馮机口占目省官事數百封親踈各有意又曰谷永字子雲便於筆札故時人云谷子雲之筆札婁君卿之脣舌後漢書曰鄧奉反於南陽趙熹素與奉善數遺書切責之而讒者因言熹與奉合謀帝以為疑及奉敗帝得熹書乃驚曰趙熹真長者也即徵熹引見賜鞍馬待詔公車又曰竇章遼伯向好學有文與馬融崔瑗同好更相推薦融與竇書曰孟陵奴來賜書見手跡歡喜何量次於面也書雖一紙八行行七字吳錄曰王宏為冀州剌史, SBCK: ''}
