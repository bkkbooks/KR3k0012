  - {type: variant, offset: 2915, length: 2, content: 奏事, SBCK: 先生餓於首陽敢不敬弔􅀉之山岡嗚呼哀哉夫五德更運天秩靡常如有絶代之主必有受命之王故堯終于虞舜禹殄於成湯且夏后氏}
