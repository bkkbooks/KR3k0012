  - {type: variant, offset: 652, length: 508, content: 非所長遂著楊劉優劣論又曰董養字仲道陳留俊儀人也太始初到洛下不干榮祿及楊后廢養因遊太升堂歎曰建斯堂也將何為乎每見國家赦書謀反逆者赦至於祖父母不赦以為王法所不容也柰何公卿處議文飾禮典以至此乎天人之理既滅大亂作矣因著元化論以非之又曰魯褒字元道元康之後綱紀大壞褒傷時貪鄙乃隱姓名著錢神論其略曰市井便易不患耗折親之如兄字曰孔方失之則貧弱得之則富強無翼而飛無足而走解嚴毅之顏開難發之口錢多者處前錢少者居後京邑衣冠疲勞講肆厭聞清談對之睡寐見我家兄莫不驚視又成公綏亦著錢神論梁書曰范縝字子真南陽舞陰人也齊竟陵王子良盛招賓客縝豫焉子良精信釋教而縝不信因果看神滅論以明之子良集僧難之而不能屈王筠難縝曰嗚呼范子曾不知其先祖神靈所在縝荅曰嗚呼王子知其先祖神靈所在而不能殺身以從之又曰劉峻見任昉諸子西華等兄弟流離不能自振平生舊交莫有收恤西華冬月葛帔練衣路逢峻峻泫然矜之乃廣朱公叔絕交論到溉見其書抵凡於地終身為恨後周書曰柳虬時人論文體者時有今古非文有今古乃為文質論隋書曰開皇之末國家殷盛朝野皆以遼東為意劉炫以為遼東不可伐作撫夷論以諷焉當時莫有悟者及大業之年三征不克炫言方驗典論曰余觀賈誼過秦發周秦之得失通古今之滯義洽以三代之風潤以聖人之化斯可謂, SBCK: ''}
