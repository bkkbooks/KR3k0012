  - {type: variant, offset: 396, length: 1, content: 班, SBCK: 景帝中二年春二月令諸侯王薨列侯􅀄封及之國大鴻臚奏謚䇿應劭曰諸侯王皆屬大鴻臚故薨奏其行亦賜與謚及哀䇿誄文也列侯薨及諸侯太傅􅀄除之官大行謚奏誄䇿師古曰大鴻臚本名典容行大令即典客之屬其行也官後政曰大行令如淳曰三公薨以䇿書誄其行東觀漢記曰杜篤字季雅客居羙陽與羙陽令遊數從之請託不諧頗相恨令怒收篤送京師㑹大司馬呉漢薨丗祖詔諸儒誄之篤於獄中爲誄辭最髙帝羙之賜帛免刑魏志明帝詔曹植曰吾旣薄才至於賦誄特不閑從兒陵上還哀懷未散作兒誄爲田家公語耳荅曰奉詔并見聖思所作故平原公主誄文義相扶章章殊興句句感切哀動聖明痛貫天地楚王臣}
  - {type: page-break, offset: 396, content: '', id: KR3k0012_SBCK_596-2a}
  - {type: variant, offset: 396, length: 1, content: 班, WYG: 景帝中元二年春三月令諸侯王薨列侯初封及之國大鴻臚奏謚誄䇿應邵曰諸侯王皆属大鴻臚故薨奏其行亦賜與謚及哀䇿誄文也列侯薨及諸侯太傅初除之官大行奏謚誄䇿師古曰大鴻臚本名典客大行令即典客之属官也後改曰大行令如淳曰三公薨以䇿書誄其行東觀漢記曰杜篤字季雅客居美陽與美陽令遊數從請託不諧頗相恨令奴收篤送京師㑹大司馬吳漢薨世祖詔諸儒誄之篤於獄中為誄辭最高世祖美之賜帛免死魏志明帝詔曹植曰吾既薄才至於賦誄特不閑從兒陵上還哀懐未散作兒誄為田家公語耳答曰奉詔并見聖思所作故平原公主誄文義相扶章章殊興句句感切哀動聖明痛貫天地楚王臣}
