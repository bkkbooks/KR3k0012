  - {type: variant, offset: 3177, length: 159, content: 子雲之荅劉歆志氣盤桓各含珠采並杼軸乎尺素抑揚乎寸心逮後漢書記則崔瑗尤善魏之元瑜號稱翩翩文舉屬音半簡必錄休璉好事留意翰辭抑其次也嵇康絕交實志高而文偉矣趙壹贈離乃少年之激昂也至如陳遵占辭百封各意禰衡代書親踈得宜斯皆尺牘之文也詳諸書體本在盡言所以散鬱陶詠風采固宜滌蕩以任氣優游以懌懷文明從容亦心聲之獻酬也若夫尊貴差序則肅以節, SBCK: 哀䇿}
