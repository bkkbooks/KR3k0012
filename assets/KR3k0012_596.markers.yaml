  - {type: variant, offset: 2884, length: 5, content: 高宗云啟乃, WYG: 悲實依}
  - {type: variant, offset: 2884, length: 1, content: 高, krp: 詩云神之吊矣言神至也君子令終定謚事極理哀故賔之慰主亦以至到爲言也壓溺乖道所以不弔矣又宋水鄭火行人奉辭國災人亡故同弔也及晉築虎臺齊襲燕城史趙蘇秦翻賀爲弔害民構怨亦亡之道凢斯之例弔之所設也或驕貴以殞身或狷介以乖道或有志而無時或行羙而兼累追而慰之並名爲弔自賈誼浮湘發憤而弔屈體周而事覈辭清而理哀盖首出之作也及相如之弔二世全爲賦體桓譚以爲其言惻愴讀者歎息及卒章意要切斷而能悲也楊雄序屈思積功寡意深文略故辭韻沉膇班彪蔡邕並敏於致詰然影附賈氏難爲並驅耳故胡阮之弔夷齊褒䘮而無文仲宣所製譏呵實工然則胡阮嘉其清王子傷其隘各其志也祢衡之弔平子縟麗而輕清陸機之弔魏武詞巧而文繁降斯巳下未有可稱者矣夫弔雖古義而華辭未造華過韻緩則化而爲賦固冝正義以繩理昭德而塞違析割褒貶哀而有正則無奪倫矣左傳莊十一年曰秋宋大水公使弔焉曰天作淫雨害於粢盛若之何不弔對曰孤實不敬天降之災又以爲君憂拜命之辱臧文仲曰宋其興乎禹湯罪巳其興也㪍焉桀紂罪人其亡也忽焉且列國有凶稱孤禮也言懼而名禮其庶乎史記曰相如從上至長楊還過冝春宫奏賦以哀二世行失也其辭曰東馳工山兮北揭石瀬弭節容與兮歴弔二世持身不謹兮亡國失勢信䜛不寤兮}
  - {type: variant, offset: 2886, length: 3, content: 云啟乃, SBCK: 廟滅絶墳墓蕪穢而不修䰟無歸而不食漢書曰楊雄怪屈原文過相如至不容作離騷自投江而死悲其文未嘗不流涕也君子遇不遇命也何必沉身哉迺作書徃徃撫離騷文而反之自岷山投諸江流以弔屈原名曰反騷祢衡别傳曰南陽㓂栢松記劉景􅂛當蹔小岀屬守長胡政令給視之栢松父子􅀫與政不佳景􅂛不在栢松子在後羅人盗迹胡政無狀便尔殺之景升還慙悼無巳即治殺胡政爲作三牲醊焉正平爲作板書弔之時當行在焉上駐馬授筆􅀝柱而作之祢衡弔張衡其辭曰南岳有精君誕其姿清和有理君逹其機故能下筆繡亂揚手文飛昔伊尹值湯吕尚遇旦嗟矣君生而獨植漢倉蠅爭飛鳯凰巳散元􅀛可羈河龍可絆石堅而朽星華而滅唯道與隆悠悠永絶靡滯君音與浮河水有竭君聲永流周旦先没發夣孔丘余生雖後身亦存遊士貴知巳君其勿憂糜元弔比干曰余旣詰紂之後又感比干亢辭進諌不顧其身而受刳屠之戮殺身之後紂不悔寤􅃴足快凶君之}
