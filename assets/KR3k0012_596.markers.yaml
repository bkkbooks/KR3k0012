  - {type: variant, offset: 2997, length: 0, content: '', SBCK: 哀者依也悲實依心故曰哀也以辭遣哀盖下流之悼故不在黃髮必施夭昬昔三良殉􅁗百夫莫贖事均夭枉黃鳥賦哀抑亦詩人之哀辭乎漢武封禪而霍嬗暴亡哀傷而作詩亦哀辭之􅀋也降及後漢汝陽主亡崔瑗哀辭始變前式然腹穾􅀑門恠而不辭駕龍乗雲僊而不哀又卒章五言頗似歌謡亦髣髴乎漢武也至於顯順張􅂛並述哀文雖發其華而未極心實建安哀辭唯偉長差善行女篇時有惻怛及潘岳繼作實鍾其羙觀其慮瞻辭變情洞悲苦叙事如􅀓結言摹詩促節四言鮮有緩句故能義直而文婉體舊而趣新金鹿澤蘭莫之或繼也原夫哀辭}
  - {type: page-break, offset: 2997, content: '', id: KR3k0012_SBCK_596-7b}
  - {type: variant, offset: 2997, length: 0, content: '', krp: 哀者依也悲實依心故曰哀也以辭遣哀盖下流之悼故不在黃髮必施夭昬昔三良殉秦百夫莫贖事均夭枉黃鳥賦哀抑亦詩人之哀辭乎漢武封禪而霍嬗暴亡哀傷而作詩亦哀辭之類也降及後漢汝陽主亡崔瑗哀辭始變前式然腹穾鬼門恠而不辭駕龍乗雲僊而不哀又卒章五言頗似歌謡亦髣髴乎漢武也至於顯順張升並述哀文雖發其華而未極心實建安哀辭唯偉長差善行女篇時有惻怛及潘岳繼作實鍾其羙觀其慮瞻辭變情洞悲苦叙事如傳結言摹詩促節四言鮮有緩句故能義直而文婉體舊而趣新金鹿澤蘭莫之或繼也原夫哀辭}
  - {type: variant, offset: 2998, length: 6, content: 舜云書用識哉, SBCK: 體情主於痛傷而辭窮乎愛惜㓜未成性故興言止於察惠弱不勝務故悼惜加乎容色隱心而結文則事愜觀文而屬心則體奢體奢爲辭則雖麗不哀必使情徃㑹悲文來引泣乃其貴耳班固馬仲都哀辭曰車騎將軍順文侯馬仲都明帝舅也從車駕於洛水浮橋馬驚入水溺死帝謂侍御史班固爲馬上三十歩哀辭南史曰劉孝綽三妹一適東海徐悱文尤清壯}
