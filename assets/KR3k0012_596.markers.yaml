  - {type: variant, offset: 2919, length: 2, content: 或云, SBCK: 祀亦殷氏之所亡􅀂周武爲有失則帝乙亦有傷子不棄殷而餓死何獨背周而深藏所行誰路而子渉之首陽誰山而子匿之彼薇誰菜而子食之行周之道藏周之林讀周之書彈周之琴飲周之水食周之茶而謗周之主謂周之淫是誦聖之文聽聖之音居聖之世而異聖之心束晢弔蕭孟恩文曰東海蕭惠孟恩者父昔爲御史與晢先君同僚孟恩及晢旦夕同遊分義早著孟恩夫婦皆亡門無立胤時有伯母從兄之憂未􅀗自徃致文一篇以弔其魂并修薄奠其文曰舊友人陽平束晢}
  - {type: variant, offset: 2919, length: 2, content: 或云, krp: 祀亦殷氏之所亡若周武爲有失則帝乙亦有傷子不棄殷而餓死何獨背周而深藏所行誰路而子渉之首陽誰山而子匿之彼薇誰菜而子食之行周之道藏周之林讀周之書彈周之琴飲周之水食周之茶而謗周之主謂周之淫是誦聖之文聽聖之音居聖之世而異聖之心束晢弔蕭孟恩文曰東海蕭惠孟恩者父昔爲御史與晢先君同僚孟恩及晢旦夕同遊分義早著孟恩夫婦皆亡門無立胤時有伯母從兄之憂未獲自徃致文一篇以弔其魂并修薄奠其文曰舊友人陽平束晢}
  - {type: variant, offset: 2922, length: 1, content: 啟, SBCK: 請同業生李察奉腵脩一束麥糒一器以致詞于處士蕭生之墓曰嗚呼哀哉精爽遐登形骸幽匿有耶亡耶莫之能測敬薦薄饋魂兮來食孟恩孟恩豈猶我識束晢弔衛巨山曰元康元年楚王瑋矯詔舉兵害太保衛公及公四子三孫公丗子黃門郎巨山與晢有交好時}
