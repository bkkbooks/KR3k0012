  - {type: variant, offset: 2884, length: 1, content: 高, SBCK: 詩云神之吊矣言神至也君子令終定謚事極理哀故賔之慰主亦以至到爲言也壓溺乖道所以不弔矣又宋水鄭火行人奉辭國災人亡故同弔也及􅀳築虎臺齊襲燕城史趙􅂫􅁗翻賀爲弔害民構怨亦亡之道凢斯之例弔之所設也或驕貴以殞身或狷介以乖道或有志而無時或行羙而兼累追而慰之並名爲弔自賈􅁩浮湘發憤而弔屈體周而事覈辭清而理哀盖首出之作也及相如之弔二世全爲賦體桓譚以爲其言惻愴讀者歎息及卒章意要切斷而能悲也楊雄序屈思積功寡意深文略故辭韻沉膇班彪蔡邕並敏於致詰然影附賈氏難爲並驅耳故胡阮之弔夷齊褒䘮而無文仲宣所製譏呵實工然則胡阮嘉其清王子傷其隘各其志也祢衡之弔平子縟麗而輕清陸機之弔魏武詞巧而文繁降斯巳下未有可稱者矣夫弔雖古義而華辭未造華過韻緩則化而爲賦固冝正義以繩理昭德而塞違析割褒貶哀而有正則無奪倫矣左傳莊十一年曰秋宋大水公使弔焉曰天作􅁋雨害於粢盛􅀂之何不弔對曰􅀌實不敬天降之災又以爲君憂拜命之辱臧文仲曰宋其興乎禹湯罪巳其興也㪍焉桀紂罪人其亡也忽焉且列國有凶稱􅀌禮也言懼而名禮其庶乎史記曰相如從上至長楊還過冝春宫奏賦以哀二世行失也其辭曰東馳工山兮北揭石瀬弭節容與兮歴弔二世持身不謹兮亡國失勢信䜛不寤兮}
