  - {type: variant, offset: 3713, length: 315, content: 發私書不交豪族號曰王獨坐蜀志曰先主辟馬良遂為椽後遣使吳良請亮曰今銜國命恊穆二家幸為良介於孫將軍亮曰君試自為文良即為草曰寡君遣椽馬良通聘繼好以紹昆吾豕韋之勳其人吉士荊楚之令鮮於造次之華而有克終之美願降心存納以慰將命權大待之又曰王平字子均生長戎旅手不能書所識不過十字而占授作書皆有意使人讀史漢諸傳聽之略知其義往往論說不失其指晉書曰何曾為三公人以小紙為書者勑記室勿報又曰何綏字伯蔚曾之孫也位至侍中尚書因以繼世名賢奢侈過度性既輕物翰札甚簡城陽王尼見綏書䟽謂人曰伯蔚居世而務豪乃爾豈其免乎劉與潘滔譖之於東海王越越遂誅綏又曰荀勗傳云勗與裴秀羊祜共管機密時將發使聘吳並遣當時文士作書與孫皓帝用勗所作皓既報命和親帝謂勗曰君前作書使吳思順勝十萬之眾, SBCK: 􅁴}
