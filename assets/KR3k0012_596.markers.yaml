  - {type: variant, offset: 2500, length: 375, content: 善者也原牋記之為式既上窺乎表亦下睨乎書使敬而不懾簡而無傲清靡以惠其才彪蔚以文其響蓋箋記之分也晉書曰劉卞字叔龍東平須昌人也本兵家子質直少言為縣小吏功曹夜醉如廁使卞執燭不從功曹銜之以它事補亭子有祖秀才者於亭中作與剌史箋久不成卞教之數言卓犖有大致秀才謂縣令曰卞公府椽之精者卿云何以為亭子令即召為門下吏異苑曰河內荀儒字君林乘冰省舅氏陷河而死兄倫為文求尸積日不得設祭水側又投牋與河伯經一宿岸側冰開尸手執牋浮出倫又牋謝之博物志曰鄭玄注毛詩曰箋不解此意或云毛公嘗為北海玄是此郡人故以為敬世說曰郗司空在北府桓宣武惡其居兵權於事素暗遣牋詣桓方欲共獎王室修復園陵世子嘉賓出行道上聞信至急遣取牋視之竟寸寸毀裂便迴車解衣帳中臥更作牋自陳老病不復堪人間欲乞閑地自養宣武大喜即發詔轉為督王部守會稽啟說文曰啟傅信也服虔通俗文曰官信曰啟張璠漢紀曰董卓呼三臺尚書以下自詣卓啟事然後得行, WYG: 辭}
