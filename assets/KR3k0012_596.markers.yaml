  - {type: variant, offset: 1166, length: 157, content: 曰洪造穹天論云天形穹隆如笠冒地若謂天北方遠者視北方星宜細於三方矣語林曰宋岱為青州剌史著無鬼論甚精莫能屈後有書生詣岱談論次及無鬼論書生乃拂衣而去曰君絕我輩血食二十餘年以君有青牛髯奴所以未得相困今奴已死今得相制矣言終而失明日岱亡又幽明錄曰阮瞻亦著無鬼論俄而鬼見而瞻死議說文曰議語也又曰論難也周易節卦曰君子以制度數議德行, SBCK: 誄}
