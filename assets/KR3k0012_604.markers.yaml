  - {type: variant, offset: 1494, length: 195, content: 無及壽者循之曰昔在蜀中聞長老言壽曾為諸葛門下書佐得撻百下故其論武侯云應變將略非其所長浩乃與論曰夫亮之相劉備當九州鼎沸之會英雄奮發之時君臣相得魚水為喻而不能與曹氏爭天下委棄荊州退入巴蜀誘奪劉璋偽連孫氏守窮崎嶇之地僣號邊夷之間此策之下者可與趙它為偶而以為蕭曹亞匹不亦過乎謂壽貶亮非為失實三國典略曰齊主以魏收之卒也命中書監陽休之裁正其所撰魏書休之以收敘其家事稍美且寡才學淹延歲時竟不措手唯削去嫡庶, WYG: ''}
