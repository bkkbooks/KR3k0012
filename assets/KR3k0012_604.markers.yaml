  - {type: variant, offset: 2954, length: 0, content: '', WYG: 取信上遂止周書曰賈緯乾祐中受詔與王伸竇儼修晉髙祖少帝漢髙祖三朝實録緯以筆削為己任然而褒貶任情記注不實晉宰相桑維翰執政嘗薄緯之為人不甚見禮深銜之及叙維翰傳稱維翰身没之後有白金八千挺他物稱是翰林學士徐台符緯邑人也與緯相善謂緯曰聞吾友書桑魏公白金之數不亦多乎乃改為白金數十挺太}
