  - {type: variant, offset: 8, length: 3, content: 心雕龍, SBCK: 者又非游夏遷雄之列務於華而忘其實溺於文而棄其理故爲文則失六經之古風紀事則非史遷之實録臣今請作行狀者但指事􅀃實直載事功假如作魏徴傳伹記其諌諍之詞足以爲正直叚秀實伹記其倒用司農印以追逆兵以象笏擊朱泚足以爲忠烈􅀂考功視行狀不依此者不得受依此則考功下太常牒史館然後定謚伏乞以臣此奏下考功從之又}
