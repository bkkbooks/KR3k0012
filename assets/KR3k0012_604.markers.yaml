  - {type: variant, offset: 354, length: 0, content: '', SBCK: 理冝歸實疋夫美惡尚不可誣人君得失無容虚載聖旨以前件實録記貞元末數事稍非摭實盖出傳聞審知差舛更令刋正頃因坐日屢形聖言通計前後至于數日臣等伏以貞觀巳來累朝實録有輕重撰不敢固辭但欲粗刪深悞亦固盡存諸􅀃宗閔僧孺相與啇量縁此書成於韓愈今史官李漢蔣係皆愈之子壻􅀂遣叅撰或致私嫌縱臣獲脩成必懼終爲時累且韓愈所書亦非巳出元和之後巳是相循伏望條示舊記最錯悞者宣付史官委之脩定詔}
