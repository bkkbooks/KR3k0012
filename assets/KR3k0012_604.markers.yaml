  - {type: punctuation, offset: 7, content: 《, id: KR3k0012_CHANT_604-bkkpn1}
  - {type: variant, offset: 7, length: 0, content: '', SBCK: 問曰近日起居注所記何事憬奏曰古左史記事右史記言人君動止有事言隨即記録今起居之職也國朝自永徽巳後起居唯得對仗承旨仗下後謀議皆不得聞其事注記但出於巳行制勑内採録更無它事所以長壽中姚璹知政事以爲親承德音謨訓􅀂不宣自宰相史官無由得書遂請仗下後所言軍國政要宰相專知撰録號爲時政記毎月送史館無何此事又廢上曰君舉必書義存勸誡旣有時政記宰臣冝依故事爲之又曰李翺以史官記事不實奏􅃺曰臣謬得秉筆史館以記注爲職夫勸善懲惡正言直筆紀聖朝功德述忠賢事業載姦臣醜行以傳無窮者史官之任也凢人事迹非大善大惡則衆人無由得知舊例皆訪於人又取行狀謚議以爲一據今之作行􅃺者多是其門生故吏莫不虚加仁義禮智妄言忠肅惠和此不唯處其心不實苟欲虚羙於受恩之地耳盖爲}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_SBCK_604-1b}
  - {type: variant, offset: 7, length: 0, content: '', WYG: 問曰近日起居注所記何事憬奏曰左史記事右史記言人君動止有事言隨即記録今起居之職也國朝自永徽以後起居唯得對仗承㫖仗下後謀議皆不得聞其事注記但出於己行制勑内採録更無他事所以長夀中姚璹知政事以為親承徳音謨訓若不宣自宰相史官無由得書遂請仗下後所言軍國政要宰相專知撰録號為時政記每月送史舘無何此事又廢上曰君舉必書義存勸誡既有時政記宰臣宜依故事為之又曰李翺以史官記事不實奏狀曰臣謬得秉筆史舘以記注為職夫勸善懲惡正言直筆紀聖朝功德述忠賢事業載姦臣醜行以傳無窮者史官之任也凢人事迹非大善大惡則衆人無由得知舊例皆訪於人又取行狀謚議以為依據今之作行狀者多是其門生故吏莫不虛加仁義禮智妄言忠肅惠和不惟其處心不實茍欲虛美於受恩之地耳葢為}
