  - {type: variant, offset: 1881, length: 186, content: 武誅史官於是廣徵百官傳惣斟酌既成上之凡十二袟一百三十卷尚書陸操謂楊愔曰魏收可謂博物宏才有大功於魏室愔曰此不刊之書傳之萬古但恨論及諸家枝葉過為繁碎時論收為爾朱榮作傳以榮比韓彭伊霍者蓋由得其子文賂黃金故也邢劭父兄書事皆優劭唯笑曰列女傳悉是史官祖母尚書左丞盧斐臨漳令李庶度支郎中王松年中書舍人盧潛等言曰魏收誣罔一代其罪合誅盧思道曰東觀筆殊不直斐庶等與收面相毀辱無所不至齊主大怒乃, WYG: 宗皇帝欲}
