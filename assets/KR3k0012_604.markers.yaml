  - {type: variant, offset: 6, length: 0, content: '', SBCK: 下唐書曰于休烈脩國史肅宗自鳯翔還京勵精聽受嘗謂休烈曰君舉必書良史也朕有過失卿書之否對曰禹湯罪巳其興也勃焉有德之君不忘規過臣不勝大慶又曰貞元十二年賈躭盧邁皆假故趙憬獨對於延英}
