  - {type: variant, offset: 3219, length: 0, content: '', SBCK: 創爲傳體傳者轉也轉授經旨以授於後實聖文之羽翮記籍之冠冕也及至縱横之丗史職猶存􅁗并七王而戰國有䇿盖録而不序故即簡爲名也漢滅嬴項武功積年陸賈稽古作楚漢春秋爰及史談丗惟執簡子長經志甄序帝續比堯稱典則位雜中賢法孔題經則文非元聖故取式吕覽通號曰紀紀綱之號亦宏稱也故本紀以述皇王列傳以揔侯伯八書以鋪政體十表以譜年爵雖殊古式而得事序焉尓其實録無隱之旨􅀶雅弘辯之才愛竒反經之尤條例踳落之失叔皮論之詳矣及班固述漢因循前業觀史遷之辭思實過半其十志該富讃序弘麗儒雅彬彬信有遺味至於宗經規聖之典端緒豊瞻之功遺親攘善之罪徴賄鬻筆之􅄽公理辦之究矣至于後漢紀傳發源東觀􅀽張所制偏駮不倫薛謝之作踈謬少信􅀂司馬彪之祥實華嶠之准當則其冠也及魏代三雄記傳並出陽秋魏畧之屬江表呉録之􅀋或激抗難徴或踈闊寡要惟陳壽三志文質辨洽荀張比之於遷固非妄譽也至於晉代之書繁乎著作陸機肇始而未備王韶續末而不終于寳述紀以審正明序孫}
  - {type: page-break, offset: 3219, content: '', id: KR3k0012_SBCK_604-6b}
  - {type: variant, offset: 3219, length: 0, content: '', WYG: 創為傳體傳者轉也轉受經㫖以授於後實聖文之羽融記籍之冠冕也及至縱横之世史職猶存秦并七王而戰國有策葢録而不序故即簡為名也漢滅嬴項武功積年陸賈稽古作楚漢春秋爰及史談世惟執簡子長繼志甄序帝績比堯稱典則位雜中賢法孔題經則文非元聖故取式吕覽通號曰紀紀綱之號亦宏稱也故本紀以述皇王列傳以總侯伯八書以鋪政體十表以譜年爵雖殊古式而得事序焉爾其實録無隱之㫖博雅宏辨之才愛奇反經之尤條例踳落之失叔皮論之詳矣及班固述漢因循前業觀史遷之辭思實過半其十志該富讃序宏麗儒雅彬彬信有遺味至於宗經規聖之典端緒豐贍之功遺親攘美之罪徵賄鬻筆之愆公理辨之究矣至於後漢紀傳發東觀袁張所制偏駁不倫薛謝之作疎謬少信若司馬彪之詳實華嶠之准當則其冠也及魏代三雄記傳並出陽秋魏略之屬江表吳録之類或激抗難徴或疎闊寡要惟陳夀三志文質辨洽荀張比之於遷固非妄譽也至於晉代之書繁乎著作陸機肇始而未備王韶續末而不終干寳述紀以審正明序孫}
