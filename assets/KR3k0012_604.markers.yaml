  - {type: variant, offset: 3155, length: 3, content: 賜皇太, SBCK: 而巳不復用其}
  - {type: variant, offset: 3155, length: 2, content: 賜皇, WYG: 而已不復用其子孫班固典引曰永平十七年詔曰司馬遷著書成一家揚名後世至以身陷刑之故反微文諷刺貶損當代非誼士也又魏志曰明帝問王肅司馬遷以受刑之故内懐隐切著史記非貶孝武令人切齒又晉張輔嘗著論論班固司馬遷云遷之著述辭約而事舉叙三千年事唯五十萬言班固叙二百年事乃八十萬言煩省不同不如遷一也良史述事善足以奬勸惡足以鑒誡人道之常中流小事亦无取焉而班皆書之不如二也毁貶晁錯傷忠臣之道不如三也遷既造創固又因循難易益不同矣又遷為蘇秦張儀范雎蔡澤作傳逞辭流離亦足以明其大才故述辨事則辭藻華靡叙實録則隐核名檢此所以遷稱良史也文心雕龍曰昔者夫子閔王道之缺傷斯文之墜静居以歎鳯臨衢而泣麟於是就}
