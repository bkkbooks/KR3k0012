  - {type: variant, offset: 751, length: 485, content: 班固私改作史記詔下京兆收繫固弟超詣闕上書具陳固不敢妄作但續父所記述漢事晉書曰王沉仕魏正元中遷散騎常侍侍中與荀顗阮籍共撰魏書多為時諱未若陳壽之實錄也又曰華嶠常沉醉所撰書十典未成而終祕書監何劭奏嶠中子徹為佐著作郎使踵成之未竟而卒後監繆徽又奏嶠少子暢為佐著作郎剋成十典并草魏晉紀傳與著作郎張載等俱在史官又曰陳壽撰魏吳蜀三國志凡六十五篇時人稱其善敘事有良史之才夏侯湛時著魏書見壽所作便壞己書而罷張華善之謂壽曰當以晉書相付耳其為時重如此宋書曰王韶之琅耶臨沂人也私撰晉陽秋成時人謂之宜居史職即除著作郎使續後事訖義熙九年善敘事辭論可觀為後世佳史又曰裴松之字世期注陳壽三國志松之鳩集傳記廣增異聞既成奏之上覽之曰裴世期為不朽矣又曰范曄獄中與諸生姪書曰既造後漢轉得統緒詳觀古今著述及評論殆少可意者班氏最有高名既任情無例唯志所推耳博贍不可及之整理未必媿也吾雖傳論皆有精意深旨至於循吏已下及六夷諸序論筆勢縱放實天下之奇作中合者往往不減過秦篇當共比班氏所作俱不愧之而已欲遍作諸志前漢所有者悉令備雖事不必多且使見文得盡此書行故應有嘗意者自古體大而思精未有此也梁書曰吳均欲撰齊書求借齊起居注及群臣行狀, WYG: ''}
