  - {type: variant, offset: 3159, length: 4, content: 及新羅使, SBCK: 孫班固典引曰永平十七年詔曰司馬遷著書成一家􅀭名後丗至以身陷刑之故反微文諷刺貶損當代非誼士也又魏志曰明帝問王肅司馬遷以受刑之故内懷隱切著史記非貶孝武令人切齒又晉張輔嘗著論論班固司馬遷之著述辭約而事舉叙三千年事唯五十万言班固叙二百年事乃八十萬言煩省不同不如遷一也良史述事善足以奬勸惡足以鑒誡人道之常中流小事亦無取焉而班皆書之不如二也毀貶朝錯傷忠臣之道不如三也遷旣造創固又因循難易益不同矣又遷爲􅂫􅁗張儀范睢蔡澤作傳逞辭流離亦足以明其大才故述辯士則藻辭華靡叙實録則隱核名撿此所以遷稱良史也文心雕龍曰昔}
