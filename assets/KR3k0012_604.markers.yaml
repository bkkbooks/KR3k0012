  - {type: variant, offset: 1046, length: 1163, content: 之曰裴世期為不朽矣又曰范曄獄中與諸生姪書曰既造後漢轉得統緒詳觀古今著述及評論殆少可意者班氏最有高名既任情無例唯志所推耳博贍不可及之整理未必媿也吾雖傳論皆有精意深旨至於循吏已下及六夷諸序論筆勢縱放實天下之奇作中合者往往不減過秦篇當共比班氏所作俱不愧之而已欲遍作諸志前漢所有者悉令備雖事不必多且使見文得盡此書行故應有嘗意者自古體大而思精未有此也梁書曰吳均欲撰齊書求借齊起居注及群臣行狀武帝不許遂私撰奏之稱帝為齊明帝佐命帝惡其書不實錄以其書不實使中書舍人劉之遴詰問數十條竟支離無對勑付省焚之坐免職又曰裴子野曾祖松之宋元嘉中受詔續脩何承天宋史未成而卒子野常欲繼成先業及齊永明末沈約所撰宋書稱松之已後無聞焉子野更撰為宋略二十卷其敘事評論多善而去戮淮南太守沈璞以其不從義師故也約懼徒跣謝之請兩釋焉歎其述作曰吾弗逮也蘭陵蕭琛言其評論可與過秦王命分路楊鑣後魏書曰毛循之位次崔浩之下浩以其中國舊門雖學不博洽而猶涉獵書傳每期重之與論說言次遂及陳壽三國志有古良史之風其所著述文義典正皆楊于王庭之言微而顯婉而成章班史以來無及壽者循之曰昔在蜀中聞長老言壽曾為諸葛門下書佐得撻百下故其論武侯云應變將略非其所長浩乃與論曰夫亮之相劉備當九州鼎沸之會英雄奮發之時君臣相得魚水為喻而不能與曹氏爭天下委棄荊州退入巴蜀誘奪劉璋偽連孫氏守窮崎嶇之地僣號邊夷之間此策之下者可與趙它為偶而以為蕭曹亞匹不亦過乎謂壽貶亮非為失實三國典略曰齊主以魏收之卒也命中書監陽休之裁正其所撰魏書休之以收敘其家事稍美且寡才學淹延歲時竟不措手唯削去嫡庶一百餘字又曰周蕭大圜為滕王逌友逌問於大圜曰吾聞湘東王作梁史有之乎餘傳乃可抑揚帝紀奚若隱則非實記則攘羊對曰言之者妄也如使有亦不足怪昔漢明為世祖紀章帝為顯宗紀殷鑒不遠足為成例且君子之過如日月之蝕彰於四海安得隱之如有亦安得而不隱蓋子為父隱直在其中諱國之惡抑又禮也逌乃大笑又曰齊主命魏收撰魏史至是未成常令群臣各言其志收曰臣願得直筆東觀早出魏書齊主乃令收專在史閣不知郡事謂收曰當直筆我終不學魏太武誅史官於是廣徵百官傳惣斟酌既成上之凡十二袟一百三十卷尚書陸操謂楊愔曰魏收可謂博物宏才有大功於魏室愔曰此不刊之書傳之萬古但恨論及諸家枝葉過為繁碎時論收為爾朱榮作傳以榮比韓彭伊霍者蓋由得其子文賂黃金故也邢劭父兄書事皆優劭唯笑曰列女傳悉是史官祖母尚書左丞盧斐臨漳令李庶度支郎中王松年中書舍人盧潛等言曰魏收誣罔一代其罪合誅盧思道曰東觀筆殊不直斐庶等與收面相毀辱無所不至齊主大怒乃親自詰問斐曰臣父位至儀同收附於族祖中書郎玄傳之下收之外親博陵崔綽位止功曹乃為傳首齊主問收曰崔綽有何事跡卿為之立傳收曰雖無爵位而道義可嘉魏司空高允曾為其贊稱有道德臣所以知之齊主曰司空才士為人作贊理合稱楊亦如卿為人作文章道其好者豈能皆實收不能對以其才名不欲加罪高德正其家傳甚美乃言於齊主曰, SBCK: ''}
