  - {type: variant, offset: 1805, length: 211, content: 時大旱告誠引罪紫雲沓起漢武帝內傳曰帝登尋真之臺齊戒到七月七日夜忽見天西南如白雲起直來趣宮須臾聞雲中簫鼓之聲復半食頃西王母至乘紫雲之輦臨發雲氣勃鬱盡為香氣漢武故事曰上幸梁父祠地主其日山上有白雲又曰呼萬歲聲封禪之上肅然白雲為蓋東方朔十洲記曰天漢三年月氏音支國獻神香使者曰國有常占東風入律百旬不休青雲干呂連月不散意中國將有好道君故搜奇蘊而貢神香也西京雜記曰瑞雲曰慶雲曰景雲雲五色曰慶或曰卿雲雲外赤內青謂之矞雲雲二色曰矞亦瑞雲也矞, SBCK: 豐持雞酒}
