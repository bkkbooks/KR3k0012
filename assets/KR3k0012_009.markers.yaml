  - {type: variant, offset: 3849, length: 109, content: 若王喬之乘雲載赤雲而陵青霄揚雄甘泉賦曰騰青霄而軼浮景孫楚鶴賦曰假使此鳥生自崑崙長於丹穴遊遨玄圃縹霄之際左思蜀都賦曰干青霄而透出舒丹氣而為霞郭璞遊仙詩曰尋仙萬餘日今乃見子喬振髮戴翠霞解褐披絳霄漢詩曰倬彼雲漢昭回于天倬明也, SBCK: 光風轉蕙泛崇蘭}
