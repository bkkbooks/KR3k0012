  - {type: variant, offset: 2578, length: 0, content: '', SBCK: 何謂八風東北曰焱風一日融風東方曰滔風一日庶風東南曰薫風一日清明淮南子作景風南方曰巨風一日凱風西南曰淒風淮南子作凉風西方曰颼風一日閶闔西北方曰厲風一曰不周風風俗通曰風或清明來乆長不揺樹木枝葉離地三二丈者此有龍德在其下風或清明不及二三尺者此君子之風也又曰猛風曰颲列音凉風曰瀏劉音微風曰飉遼音小風曰颼搜音小風從孔來曰䫼呼穴反周書時訓曰小暑之日温風至立秋之日凉風至又曰小暑之日温風不至國無寛教淮南萬畢術曰欲致疾風焚雞羽帝王世紀曰堯時厨中自生肉脯薄如翣摇則生風使食物寒而不臭名曰翣脯又曰舜彈五􅃶琴歌南風曰南風之薫兮可以解吾人之愠兮括地圖曰鍾}
