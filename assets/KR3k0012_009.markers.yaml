  - {type: variant, offset: 1641, length: 0, content: '', WYG: 明帝猜慮肥體憎風夏月常著小皮衣拜左右二人為司風令史風起方面輙先啓聞又宗慤字元幹徴士炳兄子也少時問慤所志答曰願乗長風破萬里浪前秦録曰術士蓋欽符堅召至長安因讌㑹以其惑衆将誅之酒酣将執欽欽化為旋風飛去前涼録曰永嘉五年抱罕令嚴羗妾産一龍一鷲鷲尋飛去龍十五日雷雨迎之}
