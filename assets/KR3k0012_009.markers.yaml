  - {type: variant, offset: 3832, length: 1, content: 霄, SBCK: 武王伐紂大風折蓋太公因折蓋之形而製曲蓋養性經曰治身之道春避青風夏避赤風秋避白風冬避黒風鹽鐵論曰太平之時風不鳴條雨不破塊又曰林中多疾風冨貴多䛕言樂動聲儀曰風氣者禮樂之使萬物之首也物靡不以風成熟也風順則􅀊羙風暴則􅀊惡國語曰海鳥曰爰居止於魯國東門之外臧文仲使國人􅀕之展禽曰今兹海島有灾乎夫廣川鳥獸􅁪知避}
