  - {type: variant, offset: 95, length: 0, content: '', WYG: 又風行地上曰觀尚書金縢曰周公居東二年則罪人斯得于後公乃為詩以遺王名之曰䲭鴞王亦未敢誚公秋大熟未穫天大雷電以風禾盡偃大木斯㧞邦人大恐王與大夫盡弁以啓金縢之書乃得周公所自以為功代武王之說王執書以泣曰其勿穆􅁲昔公勤勞王家惟予冲人弗及知今天動威以彰周公之徳惟朕小子其新迎我國家禮亦宜之王出郊天乃雨反風禾則盡起又舜典曰納于大麓烈風雷雨弗迷又洪範休徴曰}
