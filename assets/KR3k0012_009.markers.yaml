  - {type: variant, offset: 2903, length: 510, content: 雨書曰四方有濯魚雲疾者立雨濯魚雲遟者雨少難至江漢雲疾者即日雨洛書曰蒼帝起青雲扶日赤帝起赤雲扶日黃帝起黃雲扶日白帝起白雲扶日軍國占候曰若王子曰有黑雲似一疋布者其國兵起天文要集曰河有黑雲狀似船若一疋布維河不出十日大雨又曰北斗者不欲雲覆之有黑雲覆之天大雨地圖曰望石氣如浮雲其珠玉之精也京房風角要訣曰候雨法有黑雲如一疋帛日中即一日大雨二疋為二日雨三疋為三日雨黃帝岐伯經曰岐伯乘絳雲之車駕十二白鹿遊於蓬萊之上徐幹中論曰文王遇姜公於渭陽灼然如披雲見白日孫氏瑞應圖曰景雲者太平之應也一曰非氣非煙五色氛氳謂之慶雲瑞應圖曰矞雲瑞雲也有狀外赤內黃歸藏曰有白雲自蒼梧入大梁論衡曰龍無雲雨不能參天吳範占候風氣祕訣曰有青雲如雉兔臨城營軍敗走山海經曰符陽之山怪雲所出陸賈新語曰邪臣之蔽賢猶浮雲之障日月也宋玉高唐賦敘曰楚襄王與宋玉遊雲夢之臺高唐之觀上有雲氣須臾之間變化無窮問曰此何氣也玉曰朝雲也昔者先王嘗遊高唐殆而晝寢夢見婦人曰妾巫山之女也為高唐之客聞君遊高唐願薦枕席王因幸之去而辭曰妾在巫山之陽高丘之岨旦為朝雲暮為行雨朝朝暮暮陽臺之下旦朝視之如言故為立廟號曰朝雲孫卿雲賦曰圓者中規方者中矩又曰託地而游宇反風而下雨楚詞曰青雲衣兮白電裳又曰冠青雲之崔巍, SBCK: ''}
