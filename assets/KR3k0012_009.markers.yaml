  - {type: variant, offset: 191, length: 0, content: '', WYG: 夫氷以風壯而以風出其藏之也周其用之也徧則冬無愆陽夏無伏隂春無凄風秋無苦雨今藏川池之氷棄而不用則風不越而殺爾雅曰祭風曰磔今俗當道中磔狗以止風此其象也又南風謂之凱風詩曰凱風自南東風謂之谷風詩曰習習谷風北風謂之凉風詩曰北風其凉西風謂之大風詩曰大風有隧焚輪謂之頽暴風從}
