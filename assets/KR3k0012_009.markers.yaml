  - {type: variant, offset: 1300, length: 223, content: 安得猛士兮守四方又曰范曾云高祖之上有雲為龍虎之形此天子氣也又曰黃帝與蚩尤戰於涿鹿之野常有五色雲氣金枝玉葉止於帝上有花葩疋加辰之象因作華蓋漢書郊祀志曰武帝封泰山夜有光晝有白雲起於封中又曰封泰山後雲氣成宮闕漢書曰相如作大人賦帝覽之飄飄有凌雲之氣又曰武帝迎汾陰鼎至甘泉宮黃雲蓋其上又曰宣帝祠甘泉有頃紫雲從西北來散於殿前范曄後漢書曰樊英隱於壺山之陽曾有暴風從西方起英謂學者曰成都市火甚盛因含水西向漱之時客有從蜀郡來者云是日大火有黑雲卒從東方起須吏大雨火滅, WYG: ''}
  - {type: variant, offset: 1306, length: 1, content: 四, SBCK: 時大旱輅言樹上巳有少女徴風樹間又有隂鳥和鳴其雨應至矣果如其言􅀳書曰永和元年大風拔栁樹百餘枚􅀂風從八}
