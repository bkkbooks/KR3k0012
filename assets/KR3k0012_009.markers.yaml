  - {type: variant, offset: 1116, length: 2, content: 雲水, SBCK: 陽以施惠之恩德迎衆物而生之四十五日清明風至精芒挫収立夏之候也挫猶止也時薺麥之屬秀出巳備故挫止其鋒芒収之使成實四十五日景風至景風強也強以成之夏至之候也強言萬物強盛也四十五日凉風至凉風者寒以􅐬也立秋之候也閇収也言隂寒収成萬物也四十五日閶闔風至閶闔者當寒天収也秋分之候也閶闔盛也時盛収物蓋藏之閶或爲當四十五日不周風至不周者不交也隂陽未合化也立冬候也未合化言消息純坤無陽也月令日天地不通而閇塞成冬也四十五日廣莫風至廣莫者精大滿也冬至之候也言冬物無見者風精大滿羙無偏風之爲言萌也其立字虫動於几中者爲風虫動於几言陽}
