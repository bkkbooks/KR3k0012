  - {type: variant, offset: 4160, length: 497, content: 養年十七未婚後感天漢中白水素女潛為其炊以備飲食端後怪而潛候之得見言曰天哀忍孤貧恭順使我相為守舍今既見便去留不可愽物志曰舊說天河與海通近世有居海者年年八月有人浮查來甚大往反不失期此人乃多齎糧乘查去忽忽不覺晝夜奄至一處有城郭居舍望室中多見織婦見一丈夫牽牛渚次飲之驚問此人何由至此此人即問為何處荅曰君可詣蜀嚴君平此人還問君平君平曰某年某月有客星犯斗牛即此人到天河也抱朴子曰天河從北極分為兩頭至于南極其一經南中過其一經東井中過河者天之水也隨天而轉入地下過張衡靈憲曰水精為天漢河圖括地象曰河精上為天漢三輔黃圖曰始皇都咸陽端門四達以則紫宮渭水貫都以象天河橫橋南渡以法牽牛物理論曰星者元氣之英水之精也氣發而升精華上浮宛轉隨流名之曰天河一曰雲漢眾星出焉集林曰昔有一人尋河源見婦人浣紗以問之曰此天河也乃與一石而歸問嚴君平云此織女支機石也古詩曰河漢清且淺相去詎幾許盈盈一水間脈脈不得語傅玄擬天問曰七月七日牽牛織女時會天河唐宋之間明河篇曰明河可望不可親願得乘槎一問津更將織女支機石還訪成都賣卜人霞漢武內傳曰上元夫人謂西王母曰阿瓊有六甲之術用之可以遊景雲之宮登流霞之堂十洲記曰崑崙山之上有瓊之室紫翠丹房景雲燭日朱霞九光, SBCK: 作}
