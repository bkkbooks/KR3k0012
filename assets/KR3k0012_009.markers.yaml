  - {type: variant, offset: 1276, length: 1, content: 高, SBCK: 􅃖尤民能徴風召雨黄帝爭強滅之中兾又曰庶女者齊之寡婦養姑姑女利母財而殺母以告寡婦婦不能自解以􅁈告呉而大風襲於齊殿又曰荆軻入秦燕太子丹送别易水上歌曰風蕭蕭兮易水寒壯土一去兮不復還漢書曰燕王都薊大風拔宫中樹七圍巳上十六枚壞城樓後王誅又曰髙}
  - {type: variant, offset: 1276, length: 1, content: 高, WYG: 蚩尤氏能徴風召雨與黃帝争強帝滅之于冀又庶女者齊之寡婦飬姑姑女利母財而殺母以告寡婦婦不能自觧以寃告天而大風襲於齊殿又荆軻入秦燕太子丹送别易水上歌曰風蕭蕭兮易水寒壯士一去兮不復還漢書曰燕王都薊大風㧞宫中樹七圍已上十六株壊城樓後王誅又髙}
