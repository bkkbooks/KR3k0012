  - {type: variant, offset: 3840, length: 2, content: 霄摩, SBCK: 飄風之末不能舉鴻毛又曰火見而清風戒寒清風至而脩城郭物理論曰風者隂陽亂氣激發而起者也猶人之内氣因怒喜哀樂激越而發也故春氣温其風温以和喜風也夏氣盛其風熛以怒怒風也秋氣勁其風清以貞清風也冬氣石其風􅃤以烈固風也此四正之風也又有四維之風東北明庶庶物出幽入明也東南融風其道以長也西南清和百物備成也西北不周方潜藏也此八風者方土異氣徐疾不同和平則愼違逆則凶非有使之者也氣積自然怒則飛沙楊礫發屋拔樹喜則不揺枝動草順物布氣}
  - {type: page-break, offset: 3840, content: '', id: KR3k0012_SBCK_009-9b}
  - {type: variant, offset: 3840, length: 2, content: 霄摩, WYG: 風者隂陽亂氣激發而起者也猶人之内氣因喜怒哀樂激越而𤼵也故春氣温其風温以和喜風也夏氣盛其風熛以怒怒風也秋氣勁其風清以凄清風也冬氣石其風慘以烈固風也此四正之風也又有四維之風東北明庶庶物出幽入明也東南融風其道以長也西南清涼百物備成也西北不周方潜藏也此八風方土異氣徐疾不同和平則慎違逆則凶非有使之者也氣積自然怒則飛沙揚礫𤼵屋㧞樹喜則不揺枝動草順物布氣}
  - {type: page-break, offset: 3840, content: '', id: KR3k0012_WYG_009-17a, image: WYG0893/WYG0893-0110c.png}
  - {type: variant, offset: 3840, length: 2, content: 霄摩, krp: 飄風之末不能舉鴻毛又曰火見而清風戒寒清風至而脩城郭物理論曰風者隂陽亂氣激發而起者也猶人之内氣因怒喜哀樂激越而發也故春氣温其風温以和喜風也夏氣盛其風熛以怒怒風也秋氣勁其風清以貞清風也冬氣石其風慘以烈固風也此四正之風也又有四維之風東北明庶庶物出幽入明也東南融風其道以長也西南清和百物備成也西北不周方潜藏也此八風者方土異氣徐疾不同和平則愼違逆則凶非有使之者也氣積自然怒則飛沙楊礫發屋拔樹喜則不揺枝動草順物布氣}
  - {type: punctuation, offset: 3841, content: ，, id: KR3k0012_CHANT_009-bkkpn1378}
  - {type: 'tls:seg', offset: 3841, content: '', id: KR3k0012_CHANT_009-68a.4}
  - {type: variant, offset: 3843, length: 2, content: 赤氣, SBCK: 地之性自然之體也楚宋玉風賦曰楚襄王遊於蘭臺之宫宋玉景差侍有風颯然而王乃披􅁭而當之曰快哉此風寡人所與庶人共者耶宋玉對曰此獨大王之風耳庶人安得共之夫風生於地起於青蘋之末浸滛谿谷盛怒於土囊之口縁於太山之阿舞於松栢之下故其清凉雄風則飄忽升降乗凌髙城入于􅀷宫徘徊於桂椒之間翺翔於激水之上獵蕙草離秦衡槩新夷披稊楊徜徉中庭北上玉堂躋于羅帷經于洞房故其風也清清泠泠愈病析酲發明耳目寜體便人此謂大王之雄風也夫庶人之風塕然起於窮巷之間堀堁􅀭塵勃欎煩動沙塸吹死􅁅此謂庶人之雌風}
  - {type: page-break, offset: 3843, content: '', id: KR3k0012_SBCK_009-10a}
  - {type: variant, offset: 3843, length: 2, content: 赤氣, WYG: 地之性自然之體也楚宋玉風賦曰楚襄王逰於蘭臺之宫宋玉景差侍有風颯然而至王乃披襟而當之曰快哉此風寡人所與庶人共者耶宋玉對曰此獨大王之風耳庶人安得而共之夫風生於地起於青蘋之末侵滛谿谷盛怒於土囊之口緣於太山之阿舞於松栢之下故其清涼雄風則飄忽升降乘凌髙城入於深宫徘徊於桂椒之間翺翔於激水之上獵蕙草離秦衡槩新夷被荑楊徜徉中庭北上玉堂躋於羅帷經於洞房故其風也清清泠泠愈病析酲𤼵明耳目寧體便人此所謂大王之雄風也夫庻人之風塕然起於窮巷之間動沙塸吹死灰此所謂庶人之雌風}
