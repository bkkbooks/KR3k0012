  - {type: variant, offset: 3240, length: 0, content: '', WYG: 鄰縣母命元方接對恪見群犬互噪戯元方曰郎子姓孟近犬必猛為余叱之元方曰尊客之前不叱狗恪曰小兒解書語元方曰鄧老樹村中来真田舍則不知書恪大慙後至父来謂之曰為孺子所辱賴無人見元方應曰子見父知其無人乎年十八明經擢第父母相次而卒元方五十日未甞有笑容唯以讀書為業頌詩至蓼莪篇必哀咽號咷情慕不已則必徑往塜所抱樹而哭或日暮則止栖栢庭亦無恐懼之色㑹昌末有盜發其塜而元方在}
  - {type: page-break, offset: 3240, content: '', id: KR3k0012_WYG_414-9a, image: WYG0896/WYG0896-0631a.png}
  - {type: variant, offset: 3241, length: 2, content: 內汲, WYG: 内夜夢告之往到鉅野修奉畢捕其盜手殺以祭而鄉里以為元方殺人鉅野令收捕之搒音彭又甫孟反掠無一辭盜塜家愈稱寃移獄及郡將按致其罪㑹賊家鬻物於市為他塜家所識又擒其弟焉太守然後知元方無罪赦之而責其令或問元方何不時自明元方曰手殺人何故自明後終于家又曰毛標字表元宣城溧水}
