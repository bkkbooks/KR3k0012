  - {type: variant, offset: 3399, length: 2, content: 通章, SBCK: 自拘請入蕃以贖其父詔許之次子歧州司兵易從徃蕃中省侍比至而審禮巳卒易從晝夜泣血吐蕃哀其志性還其父屍易從跣足萬里護櫬㱕葬於彭城故塋朝廷嘉之贈兵部尚書謚曰僖審禮刑部尚書德威之子也少喪母爲祖母所養祖母元氏有疾審禮親甞藥膳及事繼母亦以孝聞與再從兄弟同居家無異㸑闔門二百餘口人無間言易從後爲彭州長史爲周興所䧟將刑百姓荷其仁恩􅔡解衣投于地曰爲長史祈福有司平準直千餘萬易從一門仁孝而撗遇􅁈酷海内痛之子昇年十餘歳配流嶺表後六道使誅流人昇以言行忠信爲首領所保持僅而􅀗免又曰長孫從直趙公無忌之􅀇孫年二十餘父元適爲延州膚施令從直隨之官膚施近邊多蕃部落徃徃刼掠城邑前後}
  - {type: page-break, offset: 3399, content: '', id: KR3k0012_SBCK_414-3b}
  - {type: variant, offset: 3399, length: 2, content: 通章, krp: 自拘請入蕃以贖其父詔許之次子歧州司兵易從徃蕃中省侍比至而審禮巳卒易從晝夜泣血吐蕃哀其志性還其父屍易從跣足萬里護櫬㱕葬於彭城故塋朝廷嘉之贈兵部尚書謚曰僖審禮刑部尚書德威之子也少喪母爲祖母所養祖母元氏有疾審禮親甞藥膳及事繼母亦以孝聞與再從兄弟同居家無異㸑闔門二百餘口人無間言易從後爲彭州長史爲周興所䧟將刑百姓荷其仁恩􅔡解衣投于地曰爲長史祈福有司平準直千餘萬易從一門仁孝而撗遇冤酷海内痛之子昇年十餘歳配流嶺表後六道使誅流人昇以言行忠信爲首領所保持僅而獲免又曰長孫從直趙公無忌之玄孫年二十餘父元適爲延州膚施令從直隨之官膚施近邊多蕃部落徃徃刼掠城邑前後}
  - {type: variant, offset: 3402, length: 0, content: '', SBCK: 能制元適􅀄至果遇蕃􅀐數十刼掠縣下元適所從人吏二百人追之及於近郊賊皆歇鞍解甲元適攻之而所將人吏無甲反爲所敗從者皆走還元適猶與戰遂爲所執􅅞之於樹將加屠戮從直聞之遂跣至父所不懼鋒刃以身蔽父群賊集矢射之身如蝟毛又中數十刃體無完處從直死之而州兵大至父乃免國史􅀘曰杜羔有至性其父爲河北一尉而卒母非嫡經亂不知所之羔常抱終身之戚㑹兄爲澤潞判官常鞫獄於私第有老婦辨對見羔時出入竊謂人曰此少年狀􅀋吾夫語問之乃羔母也自此迎侍而㱕又徃求先人之墓邑中故老已盡不知所詢館於佛寺日夜悲泣忽視屋柱煙煤之下見字數行拂而視之乃其父遺迹言我子孫􅀂求吾墓當於某村某家問之羔號泣而徃果有老父八十餘指其丘壠因得㱕葬羔官至工部尚書致仕朝野僉載曰􅂫頲爲中書舎人父右僕射瓌卒頲哀毀過禮有􅃙起復頲表固辭不起上使黄門侍郎李日知就宅喻旨終坐無言乃奏曰臣見瘠病嬴瘦殆不勝哀臣不忍言恐其殞絶上惻然不之逼也故時人語曰蘇瓌有子李嶠無兒語録曰韋温文宗朝欲以爲翰林學士韋以先父遺命懇辭上後謂次對官日韋温朕每欲用之皆辭訴又安用韋温聲色俱厲户部侍郎崔蠡進曰韋温禀其父遺命耳上曰温父不令其子在翰林是亂命也豈謂之理乎崔曰凢人子能遵理命已是至孝况能禀亂命而不改者此則尢可嘉之陛下不可怪也上曰然乃止又曰路隋年在齠齓䘮其父至十許歳其母問曰識爾父否隋嗚咽無言不識也母曰只爾一面隋後殞絶以至成人終身不􅄃鏡加以至行純古士大夫推之朱崖慕其德以愛女適隋之子李太尉家有路郞隋之子也官至當州守生資唯有琴十張史係曰盧昭美字子明范陽人五歳念孝經論語與童輩爲師事之禮至於父母字坐則起而言母劉因徃兄之家飲酒㱕夜連吐昭美憂形于色取其吐甞之或詰其故昭美對曰母自外食寕不知其毒邪行超撫而歎曰盧氏之家有曽子矣時同里大稱河東裴安特異之比昭美於蔡順過之母卒父蚤亡家貧無以葬殯訖乃傭爲無極酒家保得月資學女弟令備奠􅀕酒家怪其衣服藍縷得直不以時價古鬻字責之昭美且以情對言發涕泗從撗酒嫗爲之咄嗟輟食謂其四子曰我爲乃家婦生不貧矣又幸不以􅀂父鎡錤上音兹下音其鋤也方成衣食而日日意錢顧乃家財充若費乎我卒若必不如此月傭摧辱爲母也四子俯伏母盡以縁身衣􅀍􅁫釧與昭美令葬其母赦其傭免之昭美歸悉以營奉母祔焉又計其祥禫所費市之餘金復齎還酒嫗其妻欲止之奚不留爲給家財盡復爲傭兒乎昭美恕欲出其妻其兄深勸止之然雖同室終不面焉妻亦悔過發憤而卒又曰孟元方字弘規東平鉅野人八歳聦悟過人父友南陽鄧恪來}
