  - {type: variant, offset: 3575, length: 0, content: '', SBCK: 不遷甫有老母年九十有餘乃上書自乞减品爲四百石長庶得其俸以養母詔聽除􅀘南陽新蔡長遂以甫爲准率减交趾茂才皆爲四品也晉書羅企生字宗伯多才藝􅀄拜左著作郎以家貧親老􅀘臨汝令丗􅀃曰李弘度甞歎不􅀍遇殷楊州知其家貧問君能屈志爲百里不李荅曰北門之歎乆巳嘗聞窮猨豈睱擇木遂作剡縣太平御覧卷第四百一}
  - {type: page-break, offset: 3575, content: '', id: KR3k0012_SBCK_414-10a}
  - {type: variant, offset: 3575, length: 0, content: '', krp: 不遷甫有老母年九十有餘乃上書自乞减品爲四百石長庶得其俸以養母詔聽除𥙷南陽新蔡長遂以甫爲准率减交趾茂才皆爲四品也晉書羅企生字宗伯多才藝𥘉拜左著作郎以家貧親老𥙷臨汝令丗說曰李弘度甞歎不𬒳遇殷楊州知其家貧問君能屈志爲百里不李荅曰北門之歎乆巳嘗聞窮猨豈睱擇木遂作剡縣太平御覧卷第四百一}
  - {type: variant, offset: 3577, length: 387, content: 喪父事後母勤身供養婦生男夫婦共議養此兒所廢者大乃瘞之母亡服竟追思未嘗釋衣又曰桑虞字子綱魏郡黎陽人晉黃郎沖之子喪父虞年十四毀瘠過禮日食百粒以糝藜藿又曰何子平廬江灊人事母至孝為楊州從事月俸得白米輒貨市粟麥人或問之荅曰尊老不辦常得生米何容得食白粲有贈鮭音圭者不可寄家則不肯受母喪年將六十有孺子之慕宋大明末飢荒八年不得營葬晝夜號叫居屋不蔽雨日兄子伯與為葺治子平曰我情事未申天地一罪人屋何宜覆孟宗別傳曰宗事母至孝母亦能訓之以禮宗初為雷池監奉魚於母母還其所寄遂絕不復食魚後宗典知糧穀乃表陳曰臣昔為雷池監母三年不食魚臣若典糧榖臣母不可以三年不食米臣是以死守之世說曰晉王祥事繼母朱氏甚謹家有柰樹結子殊好常使守之時大風雨至祥猶抱樹而住母常夜持刀往祥所暗斫之值祥私起刃及被而已祥知母怪意不已因跪前請死朱氏於是感悟愛之如己子搜神記曰吳猛蜀人小兒時在父母傍時臥夏月多蚊而終不搖扇懼蚊虻之去我及父母也, SBCK: ''}
