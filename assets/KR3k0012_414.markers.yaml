  - {type: variant, offset: 3395, length: 6, content: 髡頭詣闕通章, WYG: 禄養韓詩外傳曰曾子曰吾甞仕為吏禄}
  - {type: variant, offset: 3395, length: 2, content: 髡頭, krp: 其母姜氏有疾侍省晝夜數十日母一食表亦一食母不食表亦不食見母將絶至性感咽而至於殯俄頃母父亦沒一日二䘮在殯葬於四望岡太守王府君樹雙土闕以表其墓唐新語曰劉審禮儀鳯中爲工部尚書時吐蕃入宼命審禮率兵十八萬與吐蕃將論欽陵戰于青海王師敗績審禮沒焉諸子}
