  - {type: variant, offset: 3444, length: 6, content: 叔齊琅邪東武, SBCK: 儀玉譙郡人三歳而􅀌養於丗母崔氏九歳孝謹過人同祖兄弟皆虧失於崔崔撫珮歎息而泣曰若三歳䘮母而我養汝若孝於我過於我生諸曹百歳後􅀂善爲我殯焉珮涕泣不勝方知㓜失父母因日夜涕泣問母封樹崔引至其城珮慟􅂘而絶崔遽救之抱而歸再慟猶謂在􅊘畔年十九歳崔亡若喪其母崔氏之數子皆不終喪制飲酒食肉而珮最􅀌㓜群兄咸惡之或夜相聚携持珮釂以酒㗖以肉珮入而復吐數四群兄􅀏以爲樂珮涕泣不自勝皆曰僧兒強而復吐猶爲悲珮曰誠感鞠育之恩得遂庶幾終天之報所以不覺沾􅁭因大哭群兄忍}
  - {type: variant, offset: 3444, length: 6, content: 叔齊琅邪東武, krp: 儀玉譙郡人三歳而孤養於丗母崔氏九歳孝謹過人同祖兄弟皆虧失於崔崔撫珮歎息而泣曰若三歳䘮母而我養汝若孝於我過於我生諸曹百歳後若善爲我殯焉珮涕泣不勝方知㓜失父母因日夜涕泣問母封樹崔引至其城珮慟哭而絶崔遽救之抱而歸再慟猶謂在塚畔年十九歳崔亡若喪其母崔氏之數子皆不終喪制飲酒食肉而珮最孤㓜群兄咸惡之或夜相聚携持珮釂以酒㗖以肉珮入而復吐數四群兄笑以爲樂珮涕泣不自勝皆曰僧兒強而復吐猶爲悲珮曰誠感鞠育之恩得遂庶幾終天之報所以不覺沾襟因大哭群兄忍}
