  - {type: variant, offset: 3264, length: 128, content: 以身遮之又曰宿倉舒陳留尉氏人也年七歲遭荒父母飢苦倉舒求自賣與潁川王氏得大夌九斛後王氏免之累官除上黨太守後尋覔父母經太原南郭忽見母遂還舊居母卒悲號而死又曰王驚廬陵石陽人父喪未葬假瘞宅後野火熛燎驚力不能救投火而死又曰媯皓字元起吳郡餘杭人父昆南郡太守被劾入重罪皓, SBCK: ''}
