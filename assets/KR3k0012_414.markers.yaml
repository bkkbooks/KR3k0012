  - {type: variant, offset: 1159, length: 286, content: 後遂於墓側晝夜哭負土成墳蓬髮不櫛沐菜食飲水而已然可家舊塋城極大榛蕪至家十餘里而可獨宿其中與禽獸雜處遠近邑里稱之大統中可鄉人以可孝行之至足以勸勵風俗乃言焉太祖令州縣表異之及服終之後猶若居喪大冢宰晉公護聞可孝特引見與言論時有會於護護亦至孝其母閻氏沒於敵境不測存亡每見可自傷久乖𣍿下而重可至性及卒之後護猶思其純孝收可妻子於京城常給其衣食北齊書曰李元忠母老多病患乃專心醫藥研習積年遂善方伎性仁恕見有疾者不問貴賤皆為救療矣又曰李密平棘人元忠族弟性方直有行撿因母病積年得名醫治療不愈乃精究經方洞曉針藥母病乃除唐書曰高祖嘗宴侍臣果有蒲挑侍中陳叔達執而不食問其故對曰臣母患口乾求之不得高祖, WYG: ''}
