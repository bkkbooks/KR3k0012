  - {type: variant, offset: 3239, length: 0, content: '', WYG: 子少盡色養之道赤眉之際將母到吳郡海塩賃為半路亭卒每取月直以供養督郵馮敷知其賢與飲食論道餉錢並不受王烈之安成記曰縣有孝子符表以孝聞天下年十六其母姜氏有疾侍省晝夜數十日母一食表亦一食母不食表亦不食見母將絶至性感咽而至於殯俄頃父亦沒一日二䘮在殯塟於四望岡太守王府君樹雙土間以表其墓唐新語曰劉審禮儀鳯中為工部尚書時吐蕃入㓂命審禮率兵十八萬與吐蕃將論欽陵戰于青海王師敗績審禮沒焉諸子詣闕自拘請入蕃以購其父詔許乞次子岐州司兵易從往蕃中省父比至而審禮已卒易從晝夜泣血吐蕃哀其至性還其父屍易從跣足萬里䕶襯歸𦵏於彭城故塋朝廷嘉之贈兵部尚書謚曰僖審禮刑部尚書徳威之子也少䘮母為祖母所養祖母元氏有疾審禮親甞藥膳及事繼母亦以孝聞與再從兄弟同居家無異爨闔門二百餘口人無間言易從後為彭州長史為周興所陷將刑百姓荷其仁恩競觧衣投于地曰為長史祈福有司平准直十餘萬易從一門仁孝而横遇寃酷海内痛之子升年十餘歳配流嶺表後六道使誅流人升以言行忠信為首領所保持僅而獲免又曰長孫從直趙公無忌之𤣥孫年二十餘父元適為延州膚政令從直隨之官膚施近邉多蕃部落往往刼掠城邑前後不能制元適適至果遇蕃騎數十刼掠縣下適至從人吏二百人追之及於近郊賊皆歇鞍解甲元適攻之而所將人吏無甲胄反為所敗從者皆走還元適猶與戰遂為所執縳之於樹將加屠戮從直聞之遂跣至父所不懼鋒刃以身蔽父群集矢射之身如蝟毛又中數十刃體無完處從直死之而州兵大至王父乃免國史補曰杜羔有至性其父為河北一尉而卒母非嫡經亂不知所之羔常抱終身之戚㑹兄為澤潞判官常鞫獄於私第有老婦辯對見羔時出入竊謂人曰此少年狀類吾夫詰問之乃羔母也自此迎侍而歸又往求先人之墓邑中故老已盡不知所詢館於佛寺日夜悲泣忽視屋柱煙煤之下見字數行拂而視之乃其父遺跡言我子孫若求吾墓當於某村某家問之羔號泣而往果有老父八十餘指其邱壠因得歸𦵏羔官至工部尚書致仕朝野僉載曰蘇頲為中書舍人父右僕射􅅛卒頲哀毁過禮有勅起復頲表固辭不起上使黄門侍郎李日知就宅喻㫖終坐無言乃奏曰臣見瘠病羸痩殆不勝哀臣不忍言恐其損絶上惻然不之逼也故時人語曰蘇瓌有子李嶠無兒語録曰韋温文宗朝欲以為翰林學士韋以先父遺命懇辭上後謂次對官曰韋温朕每欲用之皆辭訴又安用韋温聲色俱厲戸部侍郎崔蠡進曰韋温稟其父遺命耳上曰温父不令其子在翰林是亂命也豈謂之理乎崔曰凡人子能遵理命已是至孝況能稟亂命而不改者此則尤可嘉之陛下不可恠也上曰然乃止又曰路隋年在齠齡䘮其父至十許歳其母問曰識爾父否隋嗚咽而言不識也母曰只是一面隋復殞絶以至成人終身不覽鏡加以至行純古士大夫推之朱崖慕其徳以愛女適隋之子李太尉家有路郎隋之子也官至常州守生資唯有琴十張史係曰盧昭美字子明范陽人五歳念孝經論語與童軰為師或乏禮至於父母字坐則起而言母劉因往兄之家飲酒歸夜連吐昭憂形于色取其吐甞之或詰其故昭美對曰母自外食寧不知其毒邪行超撫而歎曰盧氏之家有曾子矣時同里大稱河東裴安特異之比昭美於蔡順過之母卒父蚤亡家貧無以𦵏殯訖乃傭為無極酒家保得月資與女弟令備奠祭酒家怪其衣服藍縷得直不以時價古鬻字責之昭美具以情對言發涕泗從横酒嫗為之咄嗟輟食謂其四子曰我為乃家婦生不貧矣又幸不以若火鎡錤上音茲下音其鋤也方成衣食而日日意錢顧乃家財充若費乎我卒若必不如此月傭摧辱為母也四子俯伏母盡以縁身衣被釵釧與昭美令𦵏其母赦其傭免之昭美歸悉以營𦵏泰母祔焉又計其祥禫所貴市之餘金復齎還酒嫗其妻欲止之奚不留為給家財盡復為傭兒乎昭美怒欲出其妻其兄深勸止之然雖同室終不面焉妻亦悔過發憤而卒又曰孟元方字宏規東平鉅野人八歳聦悟過人父友南陽鄧恪来省㑹其父出}
