  - {type: variant, offset: 3418, length: 134, content: 時輒出石置地叩頭流血覆面莫不傷懷遂奏理昆罪又曰伏恭字叔齊琅邪東武人也伯父大司徒湛孝謹敦睦世號伏不鬭恭事後母著孝建武初累遷太僕上臨辟雍於萬人中拜司空眾以恭孝行故光之又曰朱百年會稽山陰人家貧母以冬月亡無絮自此不依緜帛與同縣孔凱善時寒月就孔宿飲酒醉眠孔以臥具覆之百年覺引去謂, WYG: 見}
