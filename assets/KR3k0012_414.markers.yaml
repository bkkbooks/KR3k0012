  - {type: variant, offset: 556, length: 567, content: 杖擊便即致死真為縣囚執處以重坐盧列辭尚書乞盧身代父老命使嬰稚眾孤得蒙存立書奏云盧於父為孝子於弟為仁兄尋情究狀特可矜感高祖詔特恕其父死罪以從遠流又曰辛少雍字季冲隴西狄道人也少聰潁有孝行尤為祖父紹先所愛紹先性嗜羊肝嘗呼少雍共食及紹先卒少雍終身不食羊肝又曰張彝字慶賓清河東武城人太和中為給事黃門侍郎後從駕南征母憂解任彝居喪過禮送葬自平城達家千里徒步不乘車馬顏皃毀瘠當世稱之又曰寇治字祖禮上谷人也世宗時為荊州刺史治兄弟並孝友敦睦白首同居父亡雖久而猶於平生所處堂宇備設幃帳几杖以時節開堂列拜垂涕陳薦若宗廟然吉凶之事必先啟告遠出行返亦如之又曰孝文帝以文明太后再周忌日哭於陵左絕膳二日哭不輟聲又曰元順字子和任城文宣王之子遭父憂哭泣歐血身自負土時年二十五便有白髮免喪抽去不復更生除吏部尚書兼右僕射上省登階見榻甚故問都令史徐仵對曰此榻曾經先王所唑順即哽塞涕泣交流久不能言遂令換之又曰楊弘三歲喪父為母所養母年九十三終弘年七十五哀毀過禮三年服終恨不識父追服斬喪誓終身命經十三年哀慕不改為郡縣鄉閭三百餘人上狀稱美有司奏宜旌賞復其一門旌其純孝後周書曰樂運少好學涉獵經史而不持章句年十五而江陵滅運隨例遷長安其親屬等多被籍沒運積年為人傭保皆贖免之又事母及寡嫂甚謹由是以孝義聞梁故都官郎中琅邪王澄美之為次其行事為孝義傳又曰荊可河東猗氏人也性質朴容止有異於人能苦身勤力, WYG: ''}
