  - {type: variant, offset: 3279, length: 0, content: '', WYG: 蚤失其母及長不記容狀哀慕之心不拘月制至忌辰終日涕泣未甞寢食忽夢見其狀謂之曰我乃母也若孝通神明故我得見此處師貞夢中大哭既覺哀號逾甚乃作偶人象以事之朝夕起居反告如常每薦新然後食時人語曰孝於何通幽明漢有丁蘭唐有師貞父福}
  - {type: variant, offset: 3280, length: 81, content: 七歲遭荒父母飢苦倉舒求自賣與潁川王氏得大夌九斛後王氏免之累官除上黨太守後尋覔父母經太原南郭忽見母遂還舊居母卒悲號而死又曰王驚廬陵石陽人父喪未葬假瘞宅後野火熛燎驚力, WYG: 老患目師貞朝夕膳食非手則福}
