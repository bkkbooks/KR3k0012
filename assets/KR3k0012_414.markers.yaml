  - {type: variant, offset: 3270, length: 5, content: 宿倉舒陳留, WYG: 盧操字安節河東人㓜勤學九歳通孝經論語隨義解釋黌音横中父老謂之聦明兒事繼母張氏以孝聞張有三子而操同産二人張氏厚於三子命操常執勤主炊為三子設席操弟多以疾辭卧舍不出而操服勤不以勞倦張誨其子讀書咸以驕志三子每出張令操随驢以催之操執鞭引繩如僮僕三子復謂曰随驢何如我讀書操曰不讀書所以逐驢後三子嗜酒佚蕩不敢抵忤於人或至及門詬詈詞及母氏而操為涕泣拜而觧之惡少年咸曰不謂三賊有令弟某無故及長者門羅拜操而去繼母終其二子已亡而操訓養踰於未亡日哀毁過禮廬於墓側每夕有狐貍羅列散於廬左右逥旋不去者三年時人以操在野禽獸為之衛侍非孝感通於神明其孰能逮於此服闋明經擢第歸上塚盡以報揚名之義里巷榮之調為臨渙縣}
