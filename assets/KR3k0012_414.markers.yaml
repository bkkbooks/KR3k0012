  - {type: variant, offset: 1008, length: 266, content: 一門旌其純孝後周書曰樂運少好學涉獵經史而不持章句年十五而江陵滅運隨例遷長安其親屬等多被籍沒運積年為人傭保皆贖免之又事母及寡嫂甚謹由是以孝義聞梁故都官郎中琅邪王澄美之為次其行事為孝義傳又曰荊可河東猗氏人也性質朴容止有異於人能苦身勤力供養其母隨時甘旨終無匱乏及母喪水漿不入口三日悲號擗踴絕而後蘇者數四葬母之後遂於墓側晝夜哭負土成墳蓬髮不櫛沐菜食飲水而已然可家舊塋城極大榛蕪至家十餘里而可獨宿其中與禽獸雜處遠近邑里稱之大統中可鄉人以可孝行之至足以勸勵風俗乃言焉太祖令州縣表異之及服終之後猶若居喪大冢宰晉公護聞可孝特引見與言論時有會於護護亦, SBCK: ''}
