  - {type: variant, offset: 3395, length: 2, content: 髡頭, SBCK: 其母姜氏有疾侍省晝夜數十日母一食表亦一食母不食表亦不食見母將絶至性感咽而至於殯俄頃母父亦􅃿一日二䘮在殯葬於四望岡太守王府君樹􅀟土闕以表其墓唐新語曰劉審禮儀鳯中爲工部尚書時吐蕃入宼命審禮率兵十八萬與吐蕃將論欽陵戰于青海王師敗績審禮􅃿焉諸子}
