  - {type: variant, offset: 3245, length: 3, content: 失父與, SBCK: 盡色養之道赤眉之際將}
  - {type: variant, offset: 3245, length: 0, content: '', WYG: 八歳頴悟異於衆子日誦五百言母鍾氏連年病疾標日夜祗奉諸兄悉寢唯標在母床側隨呻吟之聲至於枕前衣不解帶蓬頭垢面蟣虱盈身曾不搔視親戚大嗟異迎名醫嚴顒與母診脉才言不濟標號哭頓地顒佯言可救郎子善祗奉顒退而言曰嗟乎此子孝徳若是而親疾不可救天道奚處嗟歎良久翌日母終標伏母床號泣不食三日家人倉卒之際遺燭致焚舉家出辟火唯標抱其柩涕泣火為之飛去鄰舍柩得免莫不異之將𦵏標羸瘠杖不能起扶持方行猶蹈雪跣歩四十里太守命縣宰就視致粟帛給遺及標病革誡其子貞曰吾以家門修飾遂及於此吾生無益於人死固不害於人唯宜薄𦵏止於周身貞奉其教行之鄉里稱焉又曰夏侯佩字儀王譙郡人三歳而孤養於世母崔氏九歳孝謹過人同祖兄弟皆虧失於崔崔撫佩歎息而泣曰若三歳䘮母而我養汝若孝於我過於我生諸曹百嵗後若善為我殯焉佩涕泣不勝方知幼}
