  - {type: variant, offset: 3249, length: 0, content: '', WYG: 因日夜涕泣問母封樹崔引至其城佩慟哭而絶崔遽救之抱而歸再慟猶謂在塜畔年十九歳崔亡若䘮其母崔氏數子皆不終䘮制飲酒食肉而佩最}
  - {type: variant, offset: 3249, length: 4, content: 孤貧傭作, krp: 到吴郡海塩賃爲半路亭毎取卒月直以}
  - {type: variant, offset: 3250, length: 5, content: 貧傭作供養, WYG: 㓜羣兄咸惡之或夜相聚拘持佩釂以酒㗖以肉佩入而復吐數四羣兄笑以為樂佩涕泣不自勝皆曰僧兒强而復吐猶為悲佩曰誠感鞠育之恩得遂庶㡬終天之報所以不覺沾襟因大哭羣兄忍人也皆為之流涕每蒸甞之禮於世母神坐别致敬焉年二十有五卒于家里人謂其封為}
