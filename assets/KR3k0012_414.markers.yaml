  - {type: variant, offset: 1462, length: 1539, content: 市甘珍又曰歐陽通為中書舍人調露中起服每入朝必徒跣至城門然後著靴直宿則席地藉蒿非公事不言未常啟齒歸必哀號無時國朝奪情唯通得禮又曰聊城人王少玄者父隋末於郡西為亂兵所害少玄遺腹生年十餘歲問父所在其母告之因哀泣便欲求屍以葬時白骨蔽野無由可辨或曰以子血沾父骨即滲焉少玄乃剡其體以試之凡經旬曰竟獲父體以葬盡體病創歷年方瘉音庾貞觀中本州聞薦拜徐王府參軍又曰陳集愿瀧州開陽人也代為嶺表酋長父龍樹欽州刺史集愿幼有孝行父纔有疾即終日不食永徽中喪父嘔血數升枕服苫廬悲感行路資財田宅及僮僕三千餘人並以讓兄弟則天時官至左豹韜衛將軍又曰元讓雍州武功人也弱冠明經擢第以母疾遂不求仕躬親藥膳蒸蒸致養不出閭里者數十年及母終廬於墓側蓬髮不櫛沐菜食飲水而已咸亨中孝敬監國下令表其門閭永淳元年巡察使奏讓孝悌殊異擢拜太子左內率府長史後以歲滿還鄉里鄉人有所爭訟不詣州縣皆就讓決焉聖曆中中宗居春宮詔拜太子司議郎及謁見則天謂曰卿既能孝於家必能忠於國今授此職須知朕意宜以孝道輔弼我兒尋卒又曰張志寬河東人隋末喪父哀毀骨立為州里所稱寇賊聞其名不犯其閭後為里尹在縣忽稱母疾取給縣令問其故志寬對曰母嘗有所苦志寬亦有所苦向患心痛是以知母有疾令初怒曰妖妄之詞繫於獄外遣馳驗之果如斯言令異之以聞高祖旌表門閭就拜門外散騎侍郎又曰裴敬彝綘州聞喜人也曾祖子通隋開皇中太中大夫母終廬於墓側哭泣無節目遂喪明俄有白鳥巢於墳樹子通兄弟八人皆友悌著名詔旌表其門鄉人至今稱為義門裴氏敬彝少聰敏七歲解屬文性又端謹宗族咸重之號為甘露頃年十四侍御史唐臨為河北巡察使敬彝父智周時為內黃令為部人所訟敬彝詣臨論其冤臨大奇之因命作詞賦智周事竟釋特表薦敬彝補陳王府典籤智周在官忽暴卒敬彝時在長安忽泣涕不食謂所親曰大人每有痛處吾即輒然不安今日心痛手足皆廢事在不惻得無戚乎遂請急倍道言歸果聞父喪嬴毀逾禮事母復以孝聞乾封初累轉監察御史時母病有醫人許仁則足疾不能乘馬敬彝每自背負母卒特詔贈以縑帛仍官造靈舉服闋拜著作郎兼修國史儀鳳中自中書舍人歷吏部侍郎左庶子則天臨朝為酷吏所陷配流嶺南尋卒又曰給事中李日知事母至孝時母年老常疾病日知輒急數日而鬢髮變白尋加朝散大夫其母未受命婦邑而卒將葬發引吏人齋告身而至日知於路上即時慟絕久之乃酥左右皆哀慟莫能仰視巡察使衛州司馬路敬潛聞其孝悌之跡使求其狀日知辭讓不報服闋累遷黃門侍郎莊子曰夫事其親者不擇地而安之孝之至也尸子曰孝子一夕五起看其親衣之厚薄枕之高卑淮南子曰公西華之養親也若與朋友處曾參之養親也若事烈君嚴主又曰孔子立孝不過勝母之閭說苑曰曾子芸而誤斷其根曾晢怒援大杖擊之曾子仆有頃乃蘇蹶然而起進曰曩者參得罪大人用力杖參得無疾乎退屏鼓琴而歌欲令晢知其平也孔子聞之告門人曰參來勿內也曾子自以無罪使謝孔子孔子曰汝不聞瞽瞍有子名舜舜事瞽瞍求之未嘗不在側索而殺之未嘗可得小箠則待大箠則走今子委身以待暴怒殺身以陷父不義不孝孰是之大乎說苑曰韓伯逾有過其母笞之泣曰他日未嘗泣今日何泣也對曰逾他日得笞常痛今母力衰不能使痛是以泣也家語曰子路問於孔子曰有人於此夙興夜寐耕芸樹藝手足胼胝以養其親然而名不稱孝何也子曰意者身不敬與辭不慎與色不悅與有一於此破其孝名古之人有言曰人與不女欺言人與事實相通不欺也今盡養親之道而無三者之闕何為無孝之名乎孔子謂子路曰舉其身非力之少勢不可也夫內行不修身之罪也修身而身不彰友之罪也故君子入則篤行出則交賢何為無孝名也呂氏春秋曰樂正子春下堂傷足瘳而數月不出猶有憂色門人問之荅曰吾聞曾子曰父母全而生之子當全而歸之吾忘孝道是以憂也又曰凡理國家者必先務本務本莫過於孝夫孝三皇五帝之本務而萬事之紀也執一術而百善至盧盤估孝子傳曰華光字榮祖彭城人父亡六日年四歲問父所在母辛送光至父冢光再拜伏哭欲留冢下母抱歸悲咽三日不食至年七歲欲見父像雇畫師畫其父像朝夕拜謁如父, WYG: 成徳}
