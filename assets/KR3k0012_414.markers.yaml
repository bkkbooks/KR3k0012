  - {type: variant, offset: 3566, length: 8, content: 郭世道會稽永興人, SBCK: 賢者固不可測徃者之喜乃爲親屈也斯盖所謂家貧親老不擇禄而仕也謝承後漢書曰周盤自堅伯居貧養母儉薄不充誦詩至汝墳之卒章􅁣然而歎乃解韋帶就孝㢘之舉黄㳟廣記曰南吴甫舉茂才累}
  - {type: variant, offset: 3566, length: 88, content: 郭世道會稽永興人年十四喪父事後母勤身供養婦生男夫婦共議養此兒所廢者大乃瘞之母亡服竟追思未嘗釋衣又曰桑虞字子綱魏郡黎陽人晉黃郎沖之子喪父虞年十四毀瘠過禮日食百粒以糝藜藿又曰何子平, WYG: ''}
  - {type: variant, offset: 3566, length: 8, content: 郭世道會稽永興人, krp: 賢者固不可測徃者之喜乃爲親屈也斯盖所謂家貧親老不擇禄而仕也謝承後漢書曰周盤自堅伯居貧養母儉薄不充誦詩至汝墳之卒章慨然而歎乃解韋帶就孝㢘之舉黄㳟廣記曰南吴甫舉茂才累}
