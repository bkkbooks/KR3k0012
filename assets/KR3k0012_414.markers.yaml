  - {type: variant, offset: 1282, length: 359, content: 敵境不測存亡每見可自傷久乖𣍿下而重可至性及卒之後護猶思其純孝收可妻子於京城常給其衣食北齊書曰李元忠母老多病患乃專心醫藥研習積年遂善方伎性仁恕見有疾者不問貴賤皆為救療矣又曰李密平棘人元忠族弟性方直有行撿因母病積年得名醫治療不愈乃精究經方洞曉針藥母病乃除唐書曰高祖嘗宴侍臣果有蒲挑侍中陳叔達執而不食問其故對曰臣母患口乾求之不得高祖曰卿有母遺乎遂嗚咽流涕因賜帛百疋以市甘珍又曰歐陽通為中書舍人調露中起服每入朝必徒跣至城門然後著靴直宿則席地藉蒿非公事不言未常啟齒歸必哀號無時國朝奪情唯通得禮又曰聊城人王少玄者父隋末於郡西為亂兵所害少玄遺腹生年十餘歲問父所在其母告之因哀泣便欲求屍以葬時白骨蔽野無由可辨或曰以子血沾父骨即滲焉少玄乃剡其體以試之凡經旬曰竟獲父體以葬盡體病創歷年方瘉音庾貞觀中本州聞薦拜徐王府參軍又曰陳集愿瀧州開陽人, SBCK: 雲臺}
