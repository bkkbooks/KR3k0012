  - {type: variant, offset: 3402, length: 2, content: 省皓, WYG: 過鍾釜猶欣欣而喜者非為多也樂其養親也親沒之後吾甞南遊於楚得尊官焉堂髙九仞榱題三尺車轂百乗然猶北向而涕泣者非為賤也悲}
