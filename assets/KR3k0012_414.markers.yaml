  - {type: variant, offset: 3276, length: 1, content: 氏, WYG: 毗佐以寛仁吏民至今稱焉操以官舍都屋尊老所處不敢寧居唯西廡而已都屋設几席神座祀之出必告反必面過其庭鞠躬如也入門恭謹其家居常若奉尊者若無大噱咄責之音同僚服之操毎旦具冠帶縉紳讀孝經一篇然後視事忌日則增其數讀至䘮親章號咽不勝哀感之心操子昭有文名於世次子雲恭謹有父風髙尚好賢又曰劉師貞字文通彭城}
