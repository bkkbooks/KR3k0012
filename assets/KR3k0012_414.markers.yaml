  - {type: variant, offset: 3501, length: 1, content: 朱, SBCK: 盧操字安節河東人㓜勤學九歳通孝經論語隨義解釋黌音撗中父老謂之聦明兒事繼母張氏以孝聞張有三子而操同産二人張氏厚於三子命操常執勤主炊爲三子設席操弟多以疾辭卧舎不出而操服勤不以勞倦張誨其子讀書咸以驕志三人毎出張命操隨驢以摧之操執鞭引繩如僮僕三子復謂曰隨驢何如我讀書操曰不讀書所以逐驢後三子嗜酒佚蕩不敢抵忤於人或至及門詬詈詞及母氏而操爲涕泣拜而解之惡少年咸曰不謂三賊有令弟某無故及長者門羅拜操而去繼母終其二子已亡而操訓飬踰於未亡日哀毀過禮廬於墓側毎夕有狐狸羅列散於廬左右欲且而去者三年時人以操在野野獸爲之衛侍非孝感通於神明其孰能逮於此服闋明經擢第歸上􅊘盡以報􅀭名之義里巷榮之調爲臨渙縣尉毗佐以寛仁吏民至今稱焉操以官舎都屋尊老所處不敢寧居唯西廡而已都屋設几筵神座祀之出必告反必面過其庭鞫躬如也入門㳟謹其家居常􅀂奉尊者無大噱咄責之音同寮服之操每旦具冠帶搢紳讀孝經一篇然後視事忌日則増其數讀至喪親章號咽不勝哀追感之心如新丁故操子昭有文名於丗次子雲恭謹有父風髙尚好學又曰劉師貞字文通彭城人也蚤失其母及長不記容狀哀慕之心不拘月制至忌辰終日涕泣未甞寢食忽夢見其􅃺謂之曰我乃母也􅀂孝通神明故我得建乃處師貞夢中大哭多覺哀號逾甚乃作偶人象以事之朝夕起居反告如常毎薦親新然後食時人語曰孝於何通幽明漢有丁蘭唐有師貞父福年老患目師貞朝夕膳食非手則福自去始飲鴆志在必死岑然覺毒㳂五内至支節其痛愈於鑚灼摩頂旋踵不可名狀天隂則又甚焉􅪊其䏶及足脛色皆如墨有傍攻出六膿液紫瘀臭敗逆搶人􅈹逹數十歩外唯食啖無减始知何遜之好不誣矣自降除壽春竟終天年七十有六禄養韓詩外傳曰曽子曰吾甞仕爲吏禄不過鍾釡猶欣欣而喜者非爲多也樂其養親也親没之後吾甞南遊於楚得尊官焉堂髙九仞榱題三尺數轂}
