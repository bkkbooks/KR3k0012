  - {type: variant, offset: 3386, length: 6, content: 被劾入重罪皓, WYG: 每話所經之事自云始飲酖志在必死岑然覺毒㳂五内至支節其痛愈於鑚灼摩頂旋踵不可名狀天隂則又甚焉􅪊其陛及足脛色皆如墨有傍攻出六濃液紫瘀臭敗逆搶人鼻達數十歩外唯食啖無減始知何遜之好不誣矣自降除嘉春竟終天}
