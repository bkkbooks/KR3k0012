  - {type: variant, offset: 3403, length: 1, content: 皓, SBCK: 㑹其父出遊鄰縣母命元方接對恪見群犬互噪􅃧元方曰郞子姓孟近犬心猛爲余叱之元方曰尊客之前}
  - {type: variant, offset: 3403, length: 1, content: 皓, krp: 㑹其父出遊鄰縣母命元方接對恪見群犬互噪戲元方曰郞子姓孟近犬心猛爲余叱之元方曰尊客之前}
  - {type: variant, offset: 3405, length: 1, content: 飲, SBCK: 叱狗悟曰小兒解書語元方曰鄧老樹村中來真田舎則不知書恪大慙後至父來謂之曰爲孺子所辱頼無人見元方應曰子見父知豈無人乎年十八明經擢第父母相次而卒元方五十日未甞有􅀏容唯以讀書爲業頌詩至􅖋莪篇必哀咽號咷情慕不已則必徑徃冢所抱樹而哭或日暮則止拪栢庭亦無恐懼之色㑹昌末有盗發其􅊘而元方在河内夜夢告之徃到鉅野修奉畢捕其盗手殺以􅀕而郷里以爲元方殺人鉅野令收捕之搒音彭又甫孟切掠無一辭盗塜家愈稱􅁈移獄及郡將按致其罪㑹賊家鬻物於市爲他塜家所識又擒其弟焉太守然後知元方無罪赦之而責其令或問元方曰何不自明元方曰手殺之何故自明後終于家又曰毛摽字表玄宣城漂水人少八歳潁悟異於衆子日誦五百言母鍾氏連年病疾摽日夜祗奉諸兄悉寢唯摽在母床側隨呻吟之聲至于枕前衣不解帶蓬頭垢面畿虱盈身曽不搔視親戚大嗟異迎名醫嚴顒與母􅐷脉才言不濟摽號哭頓地顒佯言可救郞中善祗奉顒退而告曰嗟乎此子孝德若是而親疾不可救天道奚處嗟歎良乆翌日母終摽伏母手號哭不}
