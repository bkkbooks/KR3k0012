  - {type: variant, offset: 3402, length: 0, content: '', krp: 能制元適𥘉至果遇蕃騎數十刼掠縣下元適所從人吏二百人追之及於近郊賊皆歇鞍解甲元適攻之而所將人吏無甲反爲所敗從者皆走還元適猶與戰遂爲所執縛之於樹將加屠戮從直聞之遂跣至父所不懼鋒刃以身蔽父群賊集矢射之身如蝟毛又中數十刃體無完處從直死之而州兵大至父乃免國史𥙷曰杜羔有至性其父爲河北一尉而卒母非嫡經亂不知所之羔常抱終身之戚㑹兄爲澤潞判官常鞫獄於私第有老婦辨對見羔時出入竊謂人曰此少年狀類吾夫語問之乃羔母也自此迎侍而㱕又徃求先人之墓邑中故老已盡不知所詢館於佛寺日夜悲泣忽視屋柱煙煤之下見字數行拂而視之乃其父遺迹言我子孫若求吾墓當於某村某家問之羔號泣而徃果有老父八十餘指其丘壠因得㱕葬羔官至工部尚書致仕朝野僉載曰蘇頲爲中書舎人父右僕射瓌卒頲哀毀過禮有敕起復頲表固辭不起上使黄門侍郎李日知就宅喻旨終坐無言乃奏曰臣見瘠病嬴瘦殆不勝哀臣不忍言恐其殞絶上惻然不之逼也故時人語曰蘇瓌有子李嶠無兒語録曰韋温文宗朝欲以爲翰林學士韋以先父遺命懇辭上後謂次對官日韋温朕每欲用之皆辭訴又安用韋温聲色俱厲户部侍郎崔蠡進曰韋温禀其父遺命耳上曰温父不令其子在翰林是亂命也豈謂之理乎崔曰凢人子能遵理命已是至孝况能禀亂命而不改者此則尢可嘉之陛下不可怪也上曰然乃止又曰路隋年在齠齓䘮其父至十許歳其母問曰識爾父否隋嗚咽無言不識也母曰只爾一面隋後殞絶以至成人終身不攬鏡加以至行純古士大夫推之朱崖慕其德以愛女適隋之子李太尉家有路郞隋之子也官至當州守生資唯有琴十張史係曰盧昭美字子明范陽人五歳念孝經論語與童輩爲師事之禮至於父母字坐則起而言母劉因徃兄之家飲酒㱕夜連吐昭美憂形于色取其吐甞之或詰其故昭美對曰母自外食寕不知其毒邪行超撫而歎曰盧氏之家有曽子矣時同里大稱河東裴安特異之比昭美於蔡順過之母卒父蚤亡家貧無以葬殯訖乃傭爲無極酒家保得月資學女弟令備奠祭酒家怪其衣服藍縷得直不以時價古鬻字責之昭美且以情對言發涕泗從撗酒嫗爲之咄嗟輟食謂其四子曰我爲乃家婦生不貧矣又幸不以若父鎡錤上音兹下音其鋤也方成衣食而日日意錢顧乃家財充若費乎我卒若必不如此月傭摧辱爲母也四子俯伏母盡以縁身衣𬒳釵釧與昭美令葬其母赦其傭免之昭美歸悉以營奉母祔焉又計其祥禫所費市之餘金復齎還酒嫗其妻欲止之奚不留爲給家財盡復爲傭兒乎昭美恕欲出其妻其兄深勸止之然雖同室終不面焉妻亦悔過發憤而卒又曰孟元方字弘規東平鉅野人八歳聦悟過人父友南陽鄧恪來}
