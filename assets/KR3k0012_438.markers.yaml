  - {type: variant, offset: 1483, length: 2158, content: 里在者徒用先王故乎史記鄒陽上書曰白起長平之謀太白食昂荊軻慕燕丹之義白虹貫日又曰林既衣韋衣而朝齊景公景公曰此君子之服耶小人之服耶林既作色曰夫服事何足以揣士行乎昔荊為長劍危冠令尹子西出焉齊桓短衣而遂溝之冠管仲隰朋出焉越文身翦髮范蠡大夫種亦出焉西戎左衽而組結由餘亦出焉如君言衣大裘者當大號衣羊裘者當羊鳴今君衣狐裘而朝得無為變乎景公曰子自以為勇悍乎曰登高臨危而目不眴而足不凌者此工匠之勇悍也入深泉取蛟龍拘黿而出者此漁夫之勇悍也入深山刺虎豹抱熊而出者此獵夫之勇悍也夫不難斷頭裂腹暴骨流血中野者此武士之勇悍也今臣居廣廷作色而辯以犯主君之怒前雖有乘軒之賞未為之動也後雖有斧鑕之威未為之恐也此既之所以為勇悍也劉敬升異苑曰荊州上明江浦常有蛟浴汲者死不脫歲升平史陳郡鄧遐字應延素勇健憤而入水覔蛟得便與拳即曳著岸欲斫殺母語云蛟是神物寧忽殺之今可呪令勿復為害遐呪而放焉自茲迄今絕無此患盛弘之荊州記云揮劍截蛟血流丹水餘同太公六韜曰大勇不勇又曰以死取人謂之勇又曰文王問太公曰守士柰何公曰危之而不恐者勇也又曰武王問太公曰陳士之道柰何太公曰軍中有大勇暴強者藂為一卒名曰陷陳之士有枝格強良多力能潰破金鼓絕滅旌旗者藂為一卒名曰勇力之士老子曰勇於敢則殺勇於不敢則活莊子曰孔子遊於宋匡人圍數匝而弦歌不輟子路入見問曰圍者數重弦歌不輟何也子曰由來吾語爾夫水行不避蛟龍者漁父之勇也陸行不避兕虎者獵夫之勇也白刃交於前視死若生者烈士之勇也知窮之有命知勇之有時臨大難而不懼聖人之勇也由處矣吾命有所制矣無幾何持甲者進辭曰以為陽虎故圍之今非請辭而退又曰田光荅太子曰竊觀太子客無可用者夏扶血勇之人怒而面赤宋臆脈勇之人怒而面青武陽骨勇之人怒而面白光所知荊軻神勇之人怒而色不變又曰闔廬試其民於五湖劍皆加於肩地流血幾不可止又曰大勇不鬭大兵不寇又曰齊之好勇者其一人居東郭其一人居西郭卒然相遇於塗曰姑相與飲乎觴數行曰姑求肉乎一人曰子肉也我肉也尚胡求肉於是酒而已因抽刀而相啗至死而止勇若此不若無勇又曰齊莊公時有士曰賓卑藂夢有壯士白縞之冠束布之衣素屨墨劍從叱之唾其面愓然而寤徒夢也明召其支而告之曰吾少好勇年六十而無所挫辱今夜辱吾將索之得之則可不得將死之每朝立乎衢三日不得退而自殺又曰兵天下之凶器也勇天下之凶德也舉凶器行凶德由不得已也呂氏春秋曰荊有佽飛者得寶劍於江干遂還反涉江至於中流有兩蛟夾繞其舩佽飛曰子嘗見兩蛟繞舩而活者乎舩人曰未之嘗見也佽飛攘臂袪衣拔寶劍曰此江中之腐肉朽骨也持劍赴江刺蛟殺之而復上舩舟中之人皆得活荊王聞之仕以執圭抱朴子曰赴白刃而忘生格兕虎於谷者勇人也韓子曰越勾踐欲民輕死出見怒鼃乃為之軾曰為其有氣故也明年民以頭獻十餘人由此觀之譽足殺人矣孟子曰晉有馮婦者善搏虎野有眾搏虎虎負隅莫敢攖馮婦趍而迎之攘臂而下車眾皆悅之趙歧曰馮姓婦名也又曰梁惠王曰寡人有疾寡人好勇孟子對曰王請無好小勇撫劍疾視曰彼惡敢當我哉此匹夫之勇敵一人者也詩云王赫斯怒爰整其旅以遏徂莒以篤周祜以對于天下此文王之勇也一人衡行於天下武王恥之此武王之勇也武王一怒而安天下之民今王亦一怒而安天下之民民唯恐王之不好勇也揚雄法言曰或問勇曰軻也曰何軻也曰軻也者謂孟軻若荊軻君子盜諸或問孟軻之勇曰勇於義而果於德不以貧富貴賤死生動其心於勇也其庶乎孫卿子曰有三勇上不脩亂世之君下不脩亂世之民無貧窮富貴天下知之則欲與天下共樂不知之則塊然獨立天地之間而不畏是上勇也禮恭意儉輕貨惟賢有不肖者敢授而廢之是中勇也輕身重貨以斯勝人為意是下勇也尸子曰孟賁曰生乎勇乎曰勇貴乎勇乎曰勇富乎勇乎曰勇三者人之所難而皆不足以易勇此其所能懾三軍服猛獸者也又曰田成子問勇顏歜藂之荅也不敬田子之僕填劍曰更言則生不更則死歜藂曰以死為有智今吾生是也是吾所以懼汝而反以懼我又曰聖人畜仁而不主仁畜智而不主智畜勇而不主勇昔者齊桓公脅於魯君而獻地百里勾踐脅於會稽而身宦之三年襄子脅於智而伯而以顏為愧其卒桓公臣魯君勾踐滅吳襄子以智伯為戮此謂勇而能怯者也慎子曰有勇不以怒反與怯均也胡非子曰夫曹劌匹夫徒步之士布衣柔履之人也唯無怒一怒而劫萬乘之師存千乘之國此謂君子之勇勇之貴者也又曰屈將子好勇見胡非而問曰聞先生非鬭有說則可無說則死胡非曰吾聞勇有五等夫負長劍赴蓁薄折兕豹搏熊羆獵徒之勇也負長劍赴深泉折蛟龍搏黿鼉漁人之勇也登高危之上鶴立四望顏色不變陶匠之勇也若迕視必殺立刑之勇也昔齊桓公伐魯曹劌聞之觸齊軍見桓公曰臣聞君辱臣死君退師則可不退則臣以血濺君矣桓公懼管仲曰許與之盟而退夫曹劌疋夫一怒而卻齊侯之師此君子之勇晏嬰疋夫一怒而沮崔子之亂亦君子之勇也五勇不同公子將何處屈將悅稱善乃解長劍釋危冠而請為弟子焉淮南子曰桀之力申鉤索鐵揉金椎移大犧水殺黿鼉陸搏熊羆然湯革車三百乘困之鳴條禽之焦門由此觀之則勇不足以為天下矣智不足以恃勇不足為強張華博物志曰賁育之勇劉義慶徐州先賢讚曰徐盛字文響琅琊莒人也遭亂客居吳以敦直勇氣聞魏王出濡須孫權每選出戰者盛常在前魏嘗大出橫江盛與諸將俱赴討時乘艦遇風落岸下諸將恐懼未有出者盛獨將上斫賊賊三披走所傷殺甚眾風止得還權大壯之應琚與許子俊書曰足下以方剛之盛年應不羈之勁勇將發虓虎之威致霜雪之誅擒吳梟蜀定功萬里而劉備不下山孫權不出水武力不奮猛氣畜勇其毒如何蔡謨書曰祖士稚昔葬雍丘城內祖約在壽春時賊據雍丘約遣路永將數百人夜緣入雍丘城戰并開墓擔喪踰城出徑還壽春永之勇如此, SBCK: 八}
