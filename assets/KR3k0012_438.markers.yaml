  - {type: variant, offset: 203, length: 0, content: '', krp: 袁尚使審配守鄴曹操攻之操出行圍配伏弩射之幾中及城䧟生獲配操謂曰吾近行圍弩何多也配曰猶恨其少操曰即忠於袁氐不得不爾志欲活之配意氣壯烈終無撓辭遂斬之魏志曰龐㳙字子異酒泉人𥘉以凉州從事守破羌長㑹武威太守張猛反殺刺史邯鄲啇猛令敢有臨啇䘮死不赦㳙聞之弃官晝夜奔走號哭喪所訖詣猛猛知其義士遣不殺由是以忠烈聞又曰夏侯惇字元讓沛國譙人夏侯嬰之後年十四就師學人有辱其師者惇殺之由是以烈氣聞又曰大將軍司馬文王斬諸葛誕傳首夷三族誕麾下數百人坐不降見斬皆曰爲諸葛}
  - {type: variant, offset: 204, length: 0, content: '', SBCK: 死不恨其得人心如此又曰賈逵􅀄爲郡吏守絳邑長郭援之攻河東所經城邑皆下逵堅守援攻之不拔及召單于井軍急攻之城將潰絳父老與援要不害逵絳人旣潰援聞逵名欲使爲將以兵刼之逵不動左右引逵使叩頭逵叱之曰安有國家長吏爲賊叩頭援將斬之絳吏民聞將殺逵皆乗城呼曰􅀒要殺我賢君寧俱死耳左右義逵多爲請遂得免韋昭呉書曰頴熈使魏辭意不屈魏留之熈懼見迫乃引刀自刺中乳房上聞嘉之賜鹽米復其國蜀志曰義陽􅀓彤先主與呉戰退軍􅊮斷後距戰兵人死盡呉將語彤令降罵曰呉㺃何有漢將軍降者遂戰死晉書曰太守陳楚迫韋忠爲功曹㑹山􅆧攻郡楚携子走出賊射之中三創忠冒刄伏楚以身捍之泣曰韋忠願以身代君乞諸王哀之亦遭五矢賊相謂曰義士也舎之忠於是􅀒楚以歸又曰辛勉累遷侍中及洛陽䧟隨帝至平陽劉聦遣其黄門侍郎喬度賫藥酒逼之勉曰大丈夫豈以數年之命而虧髙節事二姓下見武皇帝哉引藥將飲度遽止之曰主上相試耳君貞士也歎息而去習鑿齒􅀳春秋曰後主將從譙周筞北地王諶怒曰􅀂數窮力屈禍敗必及便當父子君臣背城一戰同死社稷以見先帝可也後主不納遂送璽綬是日諶􅂘於昭烈之廟先殺妻子然後自殺沈約宋書曰薛安都反􅀓靈越奔逃爲沈慶之軍人所擒厲聲曰我􅀓靈越也汝得賊何不即殺生送詣何勔勔躬自慰詰其叛逆對曰九州唱義豈獨在我勔又問四方阻逆無戰不擒主上皆加曠蕩即其才用卿何不早歸天闕乃逃命草間乎靈越荅薛公舉兵淮北威震天下不能專任智勇委付子姪敗之由實在於此然事之始末備皆叅豫人生歸於一死實無面求活勔壯其意送還京師太宗欲加原宥靈越辭對如一終不回改乃殺之隋書曰張季珣大業末爲鷹擊郎將其府據箕山爲固與洛口連接及李宻翟讓攻䧟倉城遣人呼之李珣罵宻極口宻怒遣兵攻之三年粮用盡士卒羸病不能拒戰遂爲所䧟季珣曰吾雖爲敗軍之將猶是天子爪牙之臣何容拜賊也宻壯而釋之翟讓從之求金不得遂殺之時年二十八又曰許善心母范氐梁太子中舎人孝才之女也少寡養􅀌􅀶學有髙節髙祖知之勑尚食每獻時新常遣分賜嘗詔范入内侍皇后詣讀封永樂郡君及善心遇禍范年九十有二臨喪不哭撫柩曰能死國難我有兒矣因卧不食後十餘日亦終唐書曰屈突通聞京師平家屬盡没乃留顯和鎮潼􅀜率兵東下將如洛陽通適進路而顯和降於劉文静遣副將竇琮叚志玄等率精􅀐與顯和追之及於稠桑通結陣以自固竇琮縱通子壽令徃諭之通大呼曰昔與汝爲父子今與汝爲仇讎命左右射之顯和呼其衆曰京師䧟矣汝並命􅀜西人欲何所去衆皆釋仗通知不免乃下馬東南向再拜號哭曰臣力屈兵敗不􅀒陛下天地神祇實所鑒察遂擒通送干長安髙祖謂曰何相見晚耶通泣對曰通不能盡人臣之節力屈而至爲夲朝之辱髙祖曰隋室忠臣也命釋之授兵部尚書封蔣國公又曰劉世讓字元欽雍州醴泉人也爲定安道行軍惣管率兵以拒薛舉戰敗世讓及弟寳俱爲舉軍所獲舉將至城下令紿􅀃城中曰大將軍五道巳趣長安冝開門早降世讓僞許之因告城中曰賊兵多少極於此矣冝益自固以圖安全舉重其執節終不之害又曰新興王良}
