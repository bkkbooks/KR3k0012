  - {type: variant, offset: 70, length: 3, content: 東越閩, SBCK: 温序字次房爲隗􅅝别將苟宇所刼宇謂序曰子􅀂與我并威同力天下可圖也序素有氣力大怒叱宇等曰虜何敢迫脅漢將因以節撾殺數人賊衆爭欲殺之宇止曰此義士也可賜以劔序受劔銜􅂡顧左右曰賊所迫殺無令􅂡汙土遂伏劔而死又曰馬援曰方今匈奴烏桓尚擾北邊欲自請擊之男兒要當死於邊野以馬革褁尸還墓耳何能卧床上在兒女子手}
  - {type: page-break, offset: 70, content: '', id: KR3k0012_SBCK_438-3b}
  - {type: variant, offset: 70, length: 3, content: 東越閩, WYG: 温序字次房為隗􅅝别将苟宇所刼宇謂序曰子若與我并威同力天下可圗也序素有氣力大怒叱宇等曰虜何敢廹脅漢将因以節撾殺數人賊衆争欲殺之宇止曰此義士也可賜以劔序受劔銜鬚顧左右曰賊所廹殺無令鬚汙土遂伏劔而死又曰馬援曰方今匈奴烏桓尚擾北邉欲自請擊之男兒要當死於邉野以馬革裹尸還𦵏耳何能臥床上在兒女子手}
