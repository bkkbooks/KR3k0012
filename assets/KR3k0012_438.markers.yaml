  - {type: variant, offset: 312, length: 3, content: 闔閭惡, SBCK: 徐晦由進士第登直言科爲櫟陽尉皆自楊慿所薦及慿得罪貶官臨賀縣尉親交無敢祖送獨晦至藍田與慿言别時故相權德輿與慿交分㝡深知晦之行因謂晦曰今日送臨賀誠爲厚矣無乃反爲累乎晦曰晦自布衣沐楊公之知今日不一送他日相公爲姧邪所讃烏可不送相公乎德輿大慙因稱之於人不數日御史中丞李夷簡請爲􅁥察晦至之日白夷簡曰晦不由公門公何所取信而見奬拔於千萬人中哉荅曰君送楊臨賀寧肯􅀒國乎由是名益振吕氐春秋曰要離旣殺}
