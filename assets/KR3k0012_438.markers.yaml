  - {type: variant, offset: 203, length: 0, content: '', SBCK: 􅀽尚使審配守鄴曹操攻之操出行圍配伏弩射之幾中及城䧟生獲配操謂曰吾近行圍弩何多也配曰猶恨其少操曰即忠於􅀽氐不得不爾志欲活之配意氣壯烈終無撓辭遂斬之魏志曰龐㳙字子異酒泉人􅀄以凉州從事守破􅆧長㑹武威太守張猛反殺刺史邯鄲啇猛令敢有臨啇䘮死不赦㳙聞之弃官晝夜奔走號哭喪所訖詣猛猛知其義士遣不殺由是以忠烈聞又曰夏侯惇字元讓沛國譙人夏侯嬰之後年十四就師學人有辱其師者惇殺之由是以烈氣聞又曰大將軍司馬文王斬諸葛誕傳首夷三族誕麾下數百人坐不降見斬皆曰爲諸葛}
