  - {type: variant, offset: 333, length: 274, content: 其人細小也日要離臣嘗見其辱壯士菑丘訢東海上人也為齊王使於吳過淮津欲飲馬水神出取菑丘訢大怒偏袒操劍入水與戰殺兩蛟一龍連日乃出眇其左目遂之吳會於友人之座訢恃其與神戰之勇輕士大夫要離與之對座即謂之曰吾聞勇士之戰也與日戰者不移表與鬼戰者不旋踵與人戰者不達聲生往死還不受其辱今子與神戰於泉水之中亡馬失御又受眇目之病形殘名辱勇士所恥自驕於友人之旁何其忍負也於是菑丘訢卒於結恨勢怒未及有言座眾分解菑丘訢宿怒遣恨宣往攻要離要離戒其妻曰曩日吾辱壯士菑丘訢於大眾之座彼勇士有受不還報荅之怒餘恨忿志冥必來矣慎毋閉門菑丘訢果往入門不閉登堂不關入室不守放髮僵臥訢乃手拔劍而捽, SBCK: ''}
