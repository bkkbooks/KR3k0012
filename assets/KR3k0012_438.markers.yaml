  - {type: variant, offset: 204, length: 0, content: '', WYG: 死不恨其得人心如此又曰賈逵初為郡吏守綘邑長郭援之攻河東所經城邑皆下逵堅守援攻之不抜乃召單于并軍急攻之城将潰絳父老與援要不害逵絳人既潰援聞逵名欲使為将以兵刼之逵不動左右引逵使叩頭逵叱之曰安有國家長吏為賊叩頭援将殺之絳吏民聞将殺逵皆乘城呼曰負要殺我賢君寧俱死耳左右義逵多為請遂得免韋昭吳書曰穎熈使魏辭意不屈魏留之熈懼見廹乃引刀自刺中乳房上聞嘉之賜鹽米復其國蜀志曰義陽𫝊彤先主與吳戰退軍彤斷後距戰兵人死盡吳将語彤令降罵曰吳狗何有漢将軍降者遂戰死晉書曰太守陳楚辟韋忠為功曹㑹山羗攻郡楚擕子走出賊射之中三創忠冐刄伏楚以身捍之泣曰韋忠願以身代君乞諸君哀之亦遭五矢賊相謂曰義士也舎之忠於是負楚以歸又曰辛勉累遷侍中及洛陽䧟隨帝至平陽劉聰遣其黄門侍郎喬度賫藥酒逼之勉曰大夫豈以數年之命而虧髙節事二姓下見武皇帝哉引藥将飲度遽止之曰主上相試耳君烈士也歎息而去習鑿齒晉春秋曰後主将從譙周䇿北地王諶怒曰若數窮力屈禍敗必及便當父子君臣背城一戰同死社稷以見先帝可也後主不納遂送璽綬是日諶哭於昭烈之廟先殺妻子然後自殺沈約宋書曰薛安都反𫝊靈越奔逃為沈慶之軍人所擒厲聲曰我傅靈越也汝得賊何不即殺生送詣何勔勔躬自慰詰其叛逆對曰九州唱義豈獨在我勔又問四方阻逆无戰不擒主上皆加曠蕩即其才用卿何不早歸天闕乃逃命草間乎靈越答薛公舉兵淮北威震天下不能專任智勇委付子姪敗之由實在於此然事之始末備皆參豫人生歸於一死實無面求活勔壯其意送還京師太宗欲加原宥靈越辭對如一終不囬改乃殺之隋書曰張季珣大業末為鷹擊郎将其府㨿箕山為固與洛口連接及李宻翟讓攻䧟倉城遣人呼之季珣罵宻極口宻怒遣兵攻之三年粮用盡士卒羸病不能拒戰遂為所陷季珣曰吾雖為敗軍之将猶是天子爪牙之臣何容拜賊也宻壯而釋之翟讓從之求金不得遂殺之時年二十八又曰許善心母范氏梁太子中舎人孝本之女也少寡養孤博學有節髙祖知之勑尚食每獻時新常遣分賜嘗詔范入内侍皇后誦讀封永樂郡君及善心遇禍范年九十有二臨喪不哭撫柩曰能死國難我有兒矣因臥不食後十餘日亦終唐書曰屈突通聞京師平家屬盡沒乃留顯和鎮潼關率兵東下将如洛陽通適進路而顯和降於劉文静遣副将竇宗叚志𤣥等率精騎與顯和追之及于稠桑通結陣以自固竇宗縱通子夀令徃諭之通大呼曰昔與汝為父子今與汝為仇讐命左右射之顯和呼其衆曰京師陷矣汝並命關西人欲何所去衆皆釋仗通知不免乃下馬東南向再拜號哭曰臣力屈兵敗不負陛下天地神祗實所鑒察遂擒通送于長安髙祖謂曰何相見晩耶通泣對曰通不能盡人臣之節力屈而至為本廟之辱髙祖曰隋室忠臣也命釋之授兵部尚書封蒋國公又曰劉世讓字元欽雍州醴泉人也為定安道行軍總管率兵以拒薛舉戰敗世讓及弟寳俱為舉軍所獲舉将至城下令紿説城中曰大将軍五道已趣長安宜開門早降世讓為許之因告城中曰賊兵多少極於此矣宜益自固以圗安全舉重其執節終不之害又曰新興王良}
