  - {type: variant, offset: 25, length: 1, content: 蛟, SBCK: 篡弑之名何靣目復事上哉乃仰絶吭而死又曰丞相王嘉數上言不冝封董賢上怒詔嘉詣廷尉詔獄使者至府􅁺吏涕泣和藥進嘉嘉引藥杯擲地謂官屬曰丞相宰得備位三公奉職􅀒國當伏刑都市以示萬衆豈兒女子耶何謂呾藥而死嘉遂乗吏小車去盖不冠隨使者詣廷尉二十餘日不食歐血而死又曰田延}
