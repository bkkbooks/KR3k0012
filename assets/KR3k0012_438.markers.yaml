  - {type: variant, offset: 787, length: 233, content: 吾之上此天下壯士也劉彥明敦煌實錄曰索苞有文武材舉孝廉除郎中每征伐剋敵勇冠三軍時人比之關羽宋澄於金城為步羗三千人所圍窮守孤塠垂當破沒苞以完騎五千奮劍突陣徑入與澄對坐搥頭柎掌大笑羌皆佩楯擢刀四面直前苞謂澄曰君但安心觀我擊之乃除彄弓接矢繞搥射之莫不應弦而倒皆陷楯通中立殺三十餘人創夷者百計羗即散走稱神嚴尤三將論曰王翦為秦將滅燕燕王喜奔逃東夷秦王曰齊楚何先李信曰楚地廣齊地狹楚人勇齊人怯請先從事於昜袁准正論曰兵有三勇主愛其民者勇有威刑者勇賞信於民者勇故仁愛加於下則有必死之民, SBCK: 賵贈}
