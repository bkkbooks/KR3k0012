  - {type: variant, offset: 15, length: 1, content: 襄, krp: 戰于郎郎魯邑也公叔禺人遇負杖入保者息曰使之雖病也任之雖重也君子不能爲謀也士弗能死也不可我則旣言矣與其鄰重汪踦徃皆死焉重當爲童姓汪名踦魯人欲勿殤重汪踦問於仲尼仲尼曰能執干戈以衛社稷雖欲勿殤不亦可乎又曰齊大饑黔敖爲食於路以待餓者而食之有餘者蒙𬒮輯屨貿貿然來黔敖左奉食右執飲曰嗟來食揚其囙而視之曰予唯不食嗟來之食以至於斯也從而謝焉終不食而死曽子聞之曰微與其嗟也可去其謝也可食又曰魯莊公及宋人戰于乗丘縣賁父御馬驚敗績公隊賁父曰他日不敗績而今敗績是無勇也遂死之圉人浴馬有流矢在白肉公曰非其罪也遂誅之史記曰齊人或毀孟嘗君於涽王曰將爲亂及田甲刼涽王王意之孟嘗乃奔魏前有獲粟於孟嘗之賢者聞之乃上言言孟嘗不作亂請以身爲盟遂自剄以明孟嘗涽王乃知孟嘗君果無謀又曰漢髙帝旣立以田撗兄弟夲定齊齊人賢者多附焉今在海中不收後爲亂乃使赦罪召之撗乃與其客二人乗傳詣雒}
  - {type: variant, offset: 17, length: 1, content: 城, SBCK: 至尸郷尸郷在偃師廐置置馬以傳驛也撗謝使者曰人臣見天子當洗沐因止留謂其客曰撗始與漢王俱南靣稱􅀌今漢王爲天子而撗爲亡虜}
  - {type: variant, offset: 17, length: 1, content: 城, WYG: 至尸鄉應劭曰尸鄉在偃師縣廐置臣瓚曰廐置置馬以傳驛也横謝使者曰人臣見天子當洗沐因止留謂其客曰横始與漢王俱南面稱孤今漢王為天子而横為亡虜}
  - {type: variant, offset: 17, length: 1, content: 城, krp: 至尸郷尸郷在偃師廐置置馬以傳驛也撗謝使者曰人臣見天子當洗沐因止留謂其客曰撗始與漢王俱南靣稱孤今漢王爲天子而撗爲亡虜}
