  - {type: 'tls:seg', offset: 19, content: '', id: KR3k0012_CHANT_438-1a.5}
  - {type: variant, offset: 19, length: 5, content: 河水極深先, SBCK: 靣事之其耻甚矣且吾烹人之兄與其弟比肩而事主縱彼畏天子詔不敢動我獨不愧於心乎且陛下欲見我者不過欲見吾靣貌耳今陛下在雒陽斬吾頭馳三十里間形容未敗猶可觀也遂自剄二客亦自殺從之髙帝聞大驚以田撗客皆賢聞其餘五百人在海中使召之至聞撗死又皆自殺是知田撗兄弟皆得士也又曰楚下滎陽生得周苛項王謂苛爾從我我以公爲上將軍封三萬戸苛罵曰􅀂不趣降漢漢今虜􅀂若非漢敵也項王怒烹苛又曰李廣從衛青伐匈奴失道後至大將軍使長史急責廣之幕府對簿廣曰校尉無罪乃我自失道謂其麾下曰廣結髪與匈奴大小七十餘戰今幸從大將軍出接單于兵而大將軍又徙廣部行回逺而又迷失道豈非天哉且廣年六十餘矣終不能復對刀筆之吏遂引刀自刎軍士大夫皆哭漢書曰髙祖時告趙王張敖反者貫髙對曰獨吾屬爲之王不知也吏按笞數千刺􅅡身無完者終不復言廷尉以貫髙辭聞上曰壯士誰知者以私問之中大夫􅂥公曰臣素知此趙國立名義不侵爲然諾者也上使洩公持節問之髙曰人情豈不各愛其父母妻子哉今吾三族皆巳論死豈以王昜吾親哉顧爲王實不反獨吾等爲之具道夲指所以不知狀於是􅂥公具以報上上乃赦趙王上賢髙能自立然諾使􅂥公赦之告曰張王巳出上多足下故赦足下髙曰所以不死者白張王不及耳今王巳出吾責塞矣且人臣}
  - {type: page-break, offset: 19, content: '', id: KR3k0012_SBCK_438-2a}
  - {type: page-break, offset: 19, content: '', id: KR3k0012_SBCK_438-2b}
  - {type: variant, offset: 19, length: 5, content: 河水極深先, WYG: 面事之其恥已甚矣且吾烹人之兄與其弟比肩而事主縱彼畏天子詔不敢動我獨不愧於心乎且陛下欲見者不過見吾面貌耳今陛下在雒陽斬吾頭馳三十里間形容未敗可觀也遂自剄二客自殺從之髙帝聞大驚以田横客皆賢聞其餘五百人在海中使召之至聞横死又皆自殺是知田横兄弟皆得士也又曰楚下滎陽生得周苛項王謂苛爾從我我以公為上将軍封三萬户苛罵曰若不趣降漢今虜若非漢敵也項王怒烹苛又曰李廣從衛青伐匈奴失道後至大将軍使長史急責廣之幕府簿廣曰校尉無罪乃我自失道謂其麾下曰廣結髮與匈奴大小七十餘戰今幸從大将軍出接單于兵而大将軍又徙廣部行囬逺而又迷失道豈非天哉且廣年六十餘矣終不能復對刀筆之吏遂引刀自刎軍士皆大哭漢書曰髙祖時告趙王張敖反者貫髙對曰獨吾屬為之王不知也吏按笞數千刺爇身無完者終不復言廷尉以貫髙辭聞上曰壯士誰知者以問之中大夫洩公曰臣素知此趙國立名義不輕為然諾者上使洩公持節問之髙曰人情豈不各愛其父母妻子哉今吾三族皆已論死豈以王易吾親哉願為王實不反獨吾等為之具道本指所以不知狀於是洩公具以報上上乃赦趙王上賢髙能自立然諾使洩公赦之告曰張王已出上多足下故赦足下髙曰所以不死者白張王不反耳今王已出吾責塞矣且人臣}
