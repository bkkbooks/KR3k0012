  - {type: variant, offset: 70, length: 3, content: 東越閩, krp: 温序字次房爲隗囂别將苟宇所刼宇謂序曰子若與我并威同力天下可圖也序素有氣力大怒叱宇等曰虜何敢迫脅漢將因以節撾殺數人賊衆爭欲殺之宇止曰此義士也可賜以劔序受劔銜鬚顧左右曰賊所迫殺無令鬚汙土遂伏劔而死又曰馬援曰方今匈奴烏桓尚擾北邊欲自請擊之男兒要當死於邊野以馬革褁尸還墓耳何能卧床上在兒女子手}
  - {type: variant, offset: 74, length: 5, content: 有虛領高數, SBCK: 耶故人孟兾曰諒爲烈士當如此矣又曰永和八年匈奴遣使求和親上遣鄭衆持節使匈奴衆素剛烈至北庭虜欲令拜衆不爲屈單于大怒圍守閉之不與水火欲脅服衆衆拔刄自誓單于恐而止又曰漢圍隗􅅝􅅝窮困其大將王捷登城呼漢軍曰爲隗王城守者皆必死無二心願諸軍亟罷請自殺以明之遂刎頸而死謝承後漢書曰濟隂戎良字子恭年}
