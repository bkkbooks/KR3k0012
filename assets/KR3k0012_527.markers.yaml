  - {type: variant, offset: 19, length: 0, content: '', SBCK: 武帝太始元年十二月太常諸􅁑緒上言知士􅀕酒劉喜等議帝王各尊其祖所自出大晉禮天郊當以宣皇帝配地郊宣皇后配明堂以景皇帝文皇帝配􅀶士孔晁議禮王者郊天以其祖配周公以后稷配天於南郊以文王配五精上帝於明堂經典無配地文魏以先妃配不合禮制周配􅀕不及武王禮制有斷今晉郊天冝以宣皇帝配明堂冝以文皇帝配有司奏大晉􅀄建庶事未定且如魏詔郊}
