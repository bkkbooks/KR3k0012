  - {type: variant, offset: 6, length: 0, content: '', krp: 矣此禘大祭也天神主北神靈鼔靈鼗孤竹之管空桑之琴瑟咸池之舞夏至日于澤中之方丘奏之若樂八變則地祇皆出可得而禮矣地祇主崑崙禮記禮運曰孔子曰魯之郊禘非禮也周公其衰矣𣏌之郊也禹也宋之郊也契也是天子之事守也先祖法度子孫所當守故天子祭天地諸侯祭社稷祝嘏莫敢易其常古是謂大嘏嘏亦大也不敢改其常古之法度是謂之大也又禮運曰祭帝於郊所以定天位也祀社於國所以列地利也又郊特牲曰郊之祭也迎長日之至大報天而主日也兆於南郊就陽位也掃地而祭於其質也器用陶匏以象天地之性也於郊故謂之郊牲用騂尚赤也用犢貴誠也尚赤者周也郊之用辛也自周之始郊日以至言日以至周郊天之月而日至陽氣新用事順之而用辛曰三王之郊一用夏正魯以無冬至祭天圎丘之是事以建子月郊天是先有事也用辛日者凡爲配食也此禘謂祭昊天於圎丘又祭義曰郊之祭大報天而主日配以月夏后氏祭其闇殷人祭其陽周人祭日以朝及闇祭日於壇祭月於坎以别幽明以制上}
