  - {type: variant, offset: 18, length: 0, content: '', SBCK: 分天下有二伐崇龕􅀺祖伊奔告天旣弃殷乃眷西頗太伯三讓以有天下文王爲王於義何疑然則匡衡之奏有所未盡案世宗立甘泉汾陽之祠皆岀方士之言非據經典者也方士以甘泉汾陽黄帝􅀕天地之處故孝武因之遂立二畤漢治長安而甘泉在北謂就乾位而衡云武帝居甘泉􅀕於宫南此旣誤矣􅀕地汾陽在水之間呼爲澤中而衡云東之少陽失其夲意矣晉起居注}
  - {type: page-break, offset: 18, content: '', id: KR3k0012_SBCK_527-7b}
  - {type: variant, offset: 18, length: 0, content: '', WYG: 分天下有二伐崇勘黎祖伊奔告天既棄殷乃眷西顧太伯三讓以有天下文王為王于義何疑然則匡衡之奏有所未盡案世宗立甘泉汾隂之祠皆出方士之言非經無據者也方士以甘泉汾隂黄帝祭天地之處故教武帝因之遂立二畤漢治長安而甘泉在此謂就乾位而衡云武帝居甘泉祭于其宫南北既誤矣祭地汾隂在水之間呼為澤中而衡云東之沙陽失其本意矣晉起居注}
