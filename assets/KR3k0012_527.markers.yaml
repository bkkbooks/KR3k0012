  - {type: variant, offset: 921, length: 2477, content: 年祭地三年祭五帝於五畤三歲一辯皇帝自行他祠不出祭天紫壇幄帷高帝配天居室下西嚮紺幄席又曰宗廟三年一大祫祭之子孫諸帝以昭穆坐於高廟神皆合食設左右坐高祖南面繡幄帳堂上西北隅曲凡黃金釦器每太牢中分之右辯上帝左辯上后俎餘委積於前殿千斤名曰堆俎子為昭孫為穆昭西曲屏風穆東面昔曲凡如高祖饌陳其右各配其左坐如祖妣之座法又曰原廟一歲十二祠有閏加皆用太牢又曰唯八月飲酎駕夕牲牛以繡衣之皇帝暮視牲以鑑燧取水於月以陽燧取火於日為明水火左祖以水沃牛右肩手執鸞刀以切牛毛血薦之而即更衣又曰五儀元年儒術奏施行董仲舒請兩事始令丞相以下求雨雪曝城南舞童女禱天神五帝五年始令諸官止雨朱繩縈社擊鼓攻之又曰祭五嶽祠用三正色牲十月涸凍二月解凍皆祭祝乘傳車稱使者祭四瀆用三正色牲況珪有馬祭人先於隴西西縣人先山皆有土人山下有畦埒如種菜畦畦中各王封祭參辰星辰於池陽谷曰夾道左右為壇營覆地各周三十六里又曰祭西王母於石室皆在所二千石令長奉祠漢五年脩復周室舊祀祀后稷於東南常以八月祭一太牢舞者七十二人冠者五六三十人童于六七四十二人為民祈農報功又曰凡聖王之法追祭天地日月星辰山川萬神皆古之人也能紀天地五行氣奉其功以成人者也故其祭祀皆以人事之禮食之所食也非祭食天與土地金木水火石也又祭三皇五帝九皇六十四民皆古帝王凡八十一姓漢末英雄記曰公孫瓚上計吏郡太守劉其以事犯法檻車徵伯珪褠衣平幘御車到洛陽其當徙日南伯珪具豚米於墓上祭先舉觴醊祝曰昔為人子今為人臣當詣日南日南多瘴氣恐或不還與先人辭於此再拜慷慨而起其時州里人在京師者送行見之及觀者莫不歔欷魏志曰管寧恒著布襦袴布裙隨時單複出入閨庭能自柱杖不須扶侍四時祠祭輒自力強改加衣服著絮巾故在遼東所有白布單衣親薦饌跪拜成禮寧少喪母不識形像常特觸如法泫然流涕又曰穢南國常用十月祭氏晝夜飲酒歌儛名之為舞天又祭虎以為神吳志曰赤烏年有兩烏銜鵲墮東館丞相朱據燎鵲以祭幹寶晉紀曰帝配饗魏太祖廟有奏諸功臣從饗者更以官為次在荀郭之上後魏書曰胡處少孤言及父母則若孺子之號燉煌汜潛家善釀酒每節常送一壺以給祭事也沈約宋書曰羊玄保自少至老謹於祭奠四時珍新未得祠薦者口不妄嘗齊書曰張冲衝永明八年為假節監青冀二州行剌史事冲父初卒遺命曰祭我必以鄉土所產無用牲物冲在鎮西時還吳國取果菜每至蒸嘗輒流涕薦焉家語曰魯公索氏將祭而亡其下牲孔子聞之曰公索氏不及二年必亡矣後一年而亡孔叢于曰元和二年春帝東巡狩還過魯幸闕里以太牢祠孔子及七十二子作六代之樂大會孔氏男子二十已上者六十三人命儒者講論尸子曰先王之祠禮也天子祭四極諸侯祭山川大夫祭五祀士祭其親也白虎通曰王者祭宗廟親自取禽者尊重先祖必欲自射加功力又曰王制曰春薦韭夏薦麥秋薦黍冬薦稻韭以卵麥以魚黍以豚稻以鴈春曰祠者物微故祠名之夏曰礿者麥熟進之秋曰嘗者新穀熟冬曰蒸蒸者為眾冬之時物成者眾益都耆舊傳曰蜀郡張寬字叔文漢武帝時為侍中從祀甘泉至渭橋有女子浴於渭水乳長七尺上怪其異遣問之女曰帝後第七車知我所來時寬在第七車對曰天星主祭祀者齋戒不嚴則女人星見汝南先賢傳曰薛苞歸先人冢側坊中種稻以祭祀芋以充飢躭詩悅禮玄虛無為舉孝廉賢良方正皆不就王歆之神境記曰九疑山既出林過溪望見舜廟在郡山之下而插搆水際杳若靈居矣余親負勁策致祠靈堂乃躬就齋潔奉奠其宵水月如鏡焉澗微響乃聞廟裏若有絃歌者聲調如近察復緬邈此其五絃之音南風之響乎解道虎齊記曰臨淄城南十五里天齊淵五泉並出有異於常故廟屋以同瓦有天齊字在齊八祠祠天於此故名云越絕書曰越王既得平吳春祭三江秋祭五湖因以其時為之立祠垂之來世傳之萬載鄰邦樂德皆來取之吳越春秋曰夫差帥諸群臣出國東祠子胥江水濱諸臣並在夫差乃言曰寡人蒙先王之遺恩為千乘之主昔不聽相國之言乃用讒佞之辭至令相國遠沒江海自亡已來濛濛惑惑如霧蔽日莫誰與言泣下沾衿哀不自勝左右群僚莫不悲傷十二州記曰昔禹治洪水既畢乃乘橋車到鍾山祠上帝於北河歸大功於九河也襄陽記曰諸葛亮初亡所在各求為立廟朝議以不合百姓遂因時節私祭之於道陌也摯虞雜祀議曰故事祀皋陶於廷尉寺祭先聖於大學也桓子新論曰昔楚靈王驕逸輕下簡賢務鬼信巫祝之道齋戒潔鮮以祀上帝禮群神躬執羽紱起舞壇前吳人來攻其國人告急而靈王鼓舞自若顧應之曰寡人方祭上帝樂明神當蒙福祐焉不敢赴救而吳兵遂至俘獲其太子及后姬以下甚可傷論衡曰魯文公逆祀去者三人定公順祀叛者五人貫於俗者謂則禮為非曉禮者寡則知是者稀又曰凡祭祀之義有二一曰報功二曰循先報功以勉力循先以崇恩也黃帝問玄女兵法曰六甲將及夫人姓名服色曰其將皆著赤幘小冠帶白綬絞夫人足皆各象其禽獸足凡欲治致神當於帛上書諸神名如法祭蔭齊事六曰見形六十日一祭合諸神祭之祭法脯長一九廣三寸白茅為籍編以青絲籍長二尺四寸廣六寸餅棗栗并脯置藉上柸皆黑中以丹沙九兩盛米囊九枚置北斗座上中為九星六甲坐外四面十二座座前一柸受道者壇東北祭南向再拜祝軍令曰金鼓幢麾隆衡皆以立秋日祠先時一曰主者請祠其主者奉祠若出征有所剋獲還亦祠向敵祠血于鍾鼓秋祠及有所剋獲還但祠不血鍾鼓祝文某官使主者某敢告隆衡金鼓幢麾夫軍武之器者所以正不義為民除害也謹以立秋之日潔牲黍稷旨酒而敬薦之又曰常以己丑日祠牛馬先祝文曰某月己丑某申敢告馬牛先馬者兵之道牛者軍農之用謹潔牲黍稷旨酒敬而薦之又曰軍行濟河主者常先白沈壁文曰某王使者某甲敢告于河賤臣某甲作亂天子使某帥眾濟河征討醜類故以壁沉唯爾有神裁之曹植求祭先王表臣雖比拜表自計違遠已來以踰旬日垂竟夏節方到臣悲感有念先王公以夏至日終是以家俗不以夏日祭至於先王自可以令辰告祠臣雖卑鄙實稟體於先王自臣雖貧窶蒙陛下厚賜足供太牢之具臣欲祭先王於北河之上羊豬牛臣自能辦否者臣縣自有先王喜鰒臣前以表得徐州臧霸二鰒百枚足自供事請水瓜五枚計先王崩來未能半歲臣實欲告敬且欲復盡哀博士鹿優韓蓋等以為禮公子不得禰先君公子之子不得祖諸侯謂不得立其廟而祭之也禮又曰庶子不得祭宗詔曰得月二十八日表知侯推情欲祭先王於河上覽省上下悲傷感切將欲遣禮以紓侯敬恭之意會博士鹿優等奏禮如此故寫以下開國承家顧迫禮制惟侯存心與吾同之殷允祭徐孺子文曰惟太元六年龍集荒洛冬十月哉生魄試守豫章太守殷君謹遣左右某甲奉清酌薌合一簋單羞再拜奠故聘士豫章徐先生周祗祭梁鴻文曰晉隆和四, SBCK: ''}
