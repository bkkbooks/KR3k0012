  - {type: variant, offset: 7, length: 0, content: '', krp: 祭日於東祭月於西以别内外以端其位日出於東月生於西隂陽長短終始相廵以致天下之和天下之禮致反始也致鬼神也致和用也致義也致讓也禮含文嘉曰五祀南郊北郊西郊東郊中郊兆正謀東郊去都城八里南郊九里北郊六里中郊西南去城五里兆者作封畔兆域也謀者方欲迎氣齋戒自端正謀慮其事也五者天子公侯伯子男卿大夫士所以承天也禮記外傳曰王者冬至之日祭昊天上帝於圎丘冬至一陽生非人力所爲謂之丘自然髙大也天體圎諸侯不祭天魯無圎丘之祭及二王之後各祭其感生帝於南郊王肅云天雄一帝鄭玄以天有六帝據周禮祀昊天又旅五帝是六星辰之位列于壇下正祭之時天尸在壇上也掃地而祭以下爲貴燔牲玉於壇上又曰夏至日祭皇地祇於方澤配以后土地禮方也謂祭崑崙山之神也地之正祭歳有二此一祭也立冬之日祭神州地祇於北郊配以后稷此周制也神州即王者所居在崑崙東南五千里封域之内士地之神州此即吉士可以享帝於郊也左傳襄上曰三卜郊不從乃免牲孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事郊𣏌后稷以配天后稷周始祖能播植是故啓蟄而郊郊而後耕今旣耕而後卜郊冝其不從也榖梁傳宣公曰郊牛之口傷之口綬辭也䑕齧郊牛角不言之危辭也角者兵之象故給養不謹敬鬼神不享故緩也傷自牛作也改卜牛死乃不郊春秋繁露曰王者歳一祭天於郊天者百神之君王者所最尊也又曰春秋之義國有大喪者止宗廟之祭而不止郊祭不止郊祭者不敢以父母之喪廢事天之禮也孝經曰昔者周公郊礼后稷以配天宗祀文王於明堂以配上帝也五經異義曰春秋公羊說禮郊及日皆不卜常以正月上丁也魯與天子並事變禮今成王命魯使卜從乃郊不從即已下天子也魯以上辛郊不敢與天子同也又曰今尚書夏侯歐陽說類祭天名也以事類祭之柰何天位在南方就南郊祭之是也五經通義曰王者所以祭天地何王者父事天母事地故以子道事之也祭日以丁與辛何丁者反覆自丁寕辛者當自剋辛也爾雅曰祭天曰燔柴祭地曰瘞埋廣雅曰圎丘太壇祭天也方澤太折祭地也漢書曰髙祖入關問故㤗畤上帝祀何帝對曰四帝有白黄青赤之祀髙祖曰吾聞天有五帝而四何也莫知其說於是髙祖曰吾知之矣待我而具五也乃立黒帝之祠名曰黒畤又郊祀志曰遂郊雍至隴西登崆峒幸甘泉令祠官寛舒等具太一祠壇祠壇放亳忌太一壇壇三垓五帝壇環居其下各如其方黄帝西南除八通鬼道太一所用如雍五畤物而加醴棗脯之屬殺一狸牛以爲爼豆牢具又郊祀志曰三年一郊秦以十月爲歳首故常以十月上宿郊見通權火張晏曰權火烽火也狀若井桔槹矣其法類稱故謂之權欲令光明逺照通於祀所也漢祀五畤於雍五里一烽火如淳曰權舉也拜於咸陽之旁而衣上白其用如經祠云服虎曰經常又郊祀志曰武帝立后土祠於汾隂立太一祠於甘泉祭日以牛祝宰衣赤祭月以羊祝宰衣白宣帝於聖成山祠日於芥山祭月又郊祀志曰成帝𥘉即位丞相衡御史大夫譚奏言祭天於南郊就陽之義也瘞地於北郊即隂之象也因其所都而各饗焉昔者周公文武郊於鄷鎬成王郊于雒邑由此觀之天隨王者所居而饗之可見也甘泉㤗畤河東后土之祠冝可徙置長安續漢書祭祀志曰建武元年光武帝即位于鄗爲壇營于鄗之陽祭告天地採用元始中郊祭事二年正月𥘉制郊兆於雒陽城南七里依鄗採元始中故事爲圎壇八陛中又爲皇壇天地位其上皆南嚮又祭祀志曰北郊在雒陽城北四里爲方壇四堦二年𥘉别祠地祗位南面西上髙皇后配西面北上皆在壇上地理羣神從食皆在壇下東觀漢記曰上都雒陽制兆於城南七里北郊四里行夏之時時以平且服色犧牲尚黒明火徳之運常服徽熾尚赤四時隨色季夏黄色議者曰昔周公郊祀后稷以配天宗祀文王以配上帝圖䜟著伊堯赤帝之子俱與后稷並受命而爲王漢劉祖令冝郊祀帝堯以配天宗祀髙祖以配上帝有司奏議曰追跡先代無郊其五運之祖者故禹不郊白帝周不郊帝嚳漢雖唐之苗堯以歷數命舜髙祖自感赤龍火徳承運而起當以髙祖配堯之後還復於漢冝脩奉濟陽成陽縣堯冢雲臺致敬祭祀禮亦冝之又曰光武中元年起明堂璧雍靈臺及北郊謝承後漢書曰丹陽方儲聦明善天文爲洛陽令章帝欲岀南郊儲上言當有疾雨暴風乗興不可以出上疑其妄儲飲酖而死果有大風暴雨洛中晝暝後漢書曰光武甞問鄭興郊祀事曰吾欲以䜟斷之何如興對曰臣不爲䜟帝怒曰卿之不爲䜟非之邪興惶恐曰臣於書有所未學而無所非也帝意乃解漢舊儀曰漢制天地以下羣臣所祭凡千五百四十新益爲萬五千四十漢法三歳一祭天於雲陽宫甘泉壇以冬至日祭天天神下三歳一祭地於河東汾隂后土宫以夏至日祭地地神岀五帝祭於雍五畤又曰祭天用六綵綺席六重長一丈中一幅四周縁之玉飾器凡器七千三百物備具養牛五歳至三千斤又曰皇帝祭天居雲陽宫齋百日上甘泉通天臺髙三十丈以候天神之下見如流火舞女童三百皆年八歳天神下壇所舉烽火皇帝就竹宫中不至壇所甘泉臺去長安三百里望見長安城黄帝以來所祭天之圎丘也又曰祭地河東汾隂后土宮宫曲入河古之祭地澤中方丘也禮儀如祭天名曰汾葵一曰葵丘也宋書禮志曰魏文帝黄𥘉二年正月郊祀天地明堂是時魏都洛京而神祇兆域明堂靈臺皆因漢舊事四年帝將東廵以大軍當出使太常以一特牛告祠南郊自後以爲常又禮志曰太和元年正月郊