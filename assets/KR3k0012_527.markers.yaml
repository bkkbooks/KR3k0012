  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書太平御覽卷五百二十七宋李昉等撰}
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_527-1a, image: WYG0897/WYG0897-0677a.png}
  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第五百二十七}
  body:
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 六郊丘尚書召誥曰翼日乙夘周公朝至于洛則逹觀於新邑營越三日丁巳用牲于郊牛周書作雒曰乃設兆于南郊祀以上帝配以后稷農星先王皆與食毛詩清廟昊天有成命曰昊天有成命郊祀天地也昊天有成命二后受之成王不敢康夙夜基命宥密昊天昊大號也有成命者言周自后稷之生而巳有王命也文王武王受其業施行道徳成此王功周禮春官上大宗伯曰以禋祀祀昊天上帝禋之言煙煙者周人尚臰煙氣之臰聞也昊天上帝冬至祀于圎丘天皇大帝也以實柴祀日月星辰}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 六郊丘尚書召誥曰若翼日乙卯周公朝至于洛則逹觀于新邑營越三日丁巳用牲于郊牛二周書作雒曰乃設兆于南郊祀以上帝配以后稷農星先王皆與食毛詩昊天有成命曰昊天有成命郊祀天地也昊天有成命二后受之成王不敢康夙夜基命宥密昊大也昊天有成命者言周自后稷之生而已有成命也文王武王受其業施行道徳成此王功周禮春官大宗伯之職曰以禋祀昊天上帝禋之言烟也烟者周人尚臭烟氣之臭聞昊天上帝冬至日祀于圜丘天皇大帝也以實柴祀日月星辰星經星緯星也辰日月所㑹十二次也以槱燎祀司中司命風師雨師槱積也司中文昌宫中星也鄭云司中司命文昌第四第}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_WYG_527-1b, image: WYG0897/WYG0897-0677b.png}
  - {type: variant, offset: 3, length: 0, content: '', krp: 六郊丘尚書召誥曰翼日乙夘周公朝至于洛則逹觀於新邑營越三日丁巳用牲于郊牛周書作雒曰乃設兆于南郊祀以上帝配以后稷農星先王皆與食毛詩清廟昊天有成命曰昊天有成命郊祀天地也昊天有成命二后受之成王不敢康夙夜基命宥密昊天昊大號也有成命者言周自后稷之生而巳有王命也文王武王受其業施行道徳成此王功周禮春官上大宗伯曰以禋祀祀昊天上帝禋之言煙煙者周人尚臰煙氣之臰聞也昊天上帝冬至祀于圎丘天皇大帝也以實柴祀日月星辰}
  - {type: xml-element, offset: 4, content: '', id: KR3k0012_CHANT_527-bkkxmlele1}
  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_527-1a.1}
  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_527-1a.2}
  - {type: variant, offset: 4, length: 1, content: 祭, SBCK: 星緯也辰日月所㑹十二次以槱燎祀司中司命風師雨師槱積也司中文昌宫中星也風師箕星也雨師畢星也鄭云司中司命文昌第四第五星也又春官上大宗伯曰蒼璧}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_527-1b}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 星也風師箕星也雨師畢星也又春官上宗伯曰蒼璧禮天鄭𤣥曰禮天以冬至日謂天皇大帝在北極者凡禮神必以其類璧圓以象天黄琮禮地禮地以夏至日謂神在崑崙者琮方以象地又春官上典瑞曰四圭有邸以祀天以旅上帝鄭衆注曰於中央為璧圭著四面一玉俱成也故曰四圭有邸圭末四出也或說四圭有邸圭四角也上帝𤣥天也鄭𤣥注云禮天夏正郊天也上帝五帝也所郊以五帝殊言天者尊異之至兩圭有邸以祀地以旅四望兩圭者象地數二也謂所祀於北郊神州之神又春官下大司樂曰大司樂奏黄鐘歌大呂舞雲門以祀天神天神謂五帝及日月星辰也王者各以夏正月祀其受命之帝於南郊奏太簇歌應鐘舞咸池以}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_WYG_527-2a, image: WYG0897/WYG0897-0677c.png}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_WYG_527-2b, image: WYG0897/WYG0897-0677d.png}
  - {type: variant, offset: 4, length: 0, content: '', krp: 星緯也辰日月所㑹十二次以槱燎祀司中司命風師雨師槱積也司中文昌宫中星也風師箕星也雨師畢星也鄭云司中司命文昌第四第五星也又春官上大宗伯曰蒼璧禮天禮天以冬至謂天皇大帝在北極者禮神必以其類璧圎象天黄琮禮地禮地以夏至謂神在崑崙方象地也又春官上典瑞曰四珪有邸以祀天旅上帝鄭衆云於中央爲璧珪著其四面一玉俱成故曰四邸珪未四出或說四珪有邸有四角也上帝玄天也鄭玄曰祀天夏正郊上天也上帝五帝所郊亦猶五帝殊言天者尊異兩珪有邸以祀地旅四望兩珪者象地數二也謂所祀於北郊神州之神又春官下大司樂曰大司樂乃奏黄鍾歌大吕舞雲門以祀天神天神謂五帝及日月星辰也王者各以夏正月祀其受命之帝於南郊尊也奏太蔟歌應鍾舞咸池以}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 地祇地祇祭於北郊謂神州之神及社稷靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬至日於地上之圜丘奏之若樂六變則天神皆降可得而}
  - {type: variant, offset: 5, length: 0, content: '', krp: 地祇地祇祭於北郊謂神州之神及社稷也靁鼔靁鼗孤竹之管雲和之琴瑟雲門之舞冬至日於地上之圎丘奏之若樂六變則天神皆降可得}
  - {type: variant, offset: 6, length: 0, content: '', SBCK: 天禮天以冬至謂天皇大帝在北極者禮神必以其􅀋璧圎象天黄琮禮地禮地以夏至謂神在崑崙方象地也又春官上典瑞曰四珪有邸以祀天旅上帝鄭衆云於中央爲璧珪著其四面一玉俱成故曰四邸珪未四出或􅀃四珪有邸有四角也上帝玄天也鄭玄曰祀天夏正郊上天也上帝五帝所郊亦猶五帝殊言天者尊異兩珪有邸以祀地旅四望兩珪者象地數二也謂所祀於北郊神州之神又春官}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 矣天神主百神靈鼔靈鼗孤竹之管空桑之琴瑟咸池之舞夏至日於澤中之方丘奏之若樂八變而地祇皆出可得而禮矣地祇主崑崙禮記禮運曰孔子曰魯之郊禘非禮也周公其衰矣杞之郊也禹也宋之郊也契也是天子之事守也先祖法度子孫所常守也故天子祭天地諸侯祭社稷祝嘏莫敢易其常古是謂大假又禮運曰祭帝于郊所以定天位也祀社于國所以列地利也又郊特牲曰郊之祭也迎長日之至也大報天而主日也兆於南郊就陽位也掃地而祭於其質也器用陶匏以象天地之性也於郊故謂之郊用騂尚赤也用犢貴誠也尚赤者周也郊之用辛也自周之始郊日以至言日以至周郊天之月而日至陽氣新用事順之卜郊受命于祖廟作龜于禰宮尊祖親考之義也郊所以明天道也萬物本乎天人本乎祖此所以配上帝也郊之祭也大報本反始也又明堂位曰成王封周公于魯命魯公世世祀周公以天子之禮樂是以魯君孟春乘大輅載孤韣斾十有二旒日月之章祀帝于郊配以后稷天子之禮也又大傳曰禮不王不禘王者禘其祖之所自出以其祖配之又祭法曰有虞氏禘黄帝而郊嚳祖顓頊而宗堯夏后氏亦禘黄帝而郊鯀祖顓頊而宗禹殷人禘嚳而郊冥祖契而宗湯周人禘嚳而郊契祖文王而宗武王鄭𤣥注曰禘郊祖宗謂祭祀以配食此禘謂祭昊天于圓丘又祭義曰郊之祭大報天而主日配以月夏后氏祭其闇殷人祭其陽周人祭日以朝及闇祭日於壇祭月於坎以别幽明以制上}
