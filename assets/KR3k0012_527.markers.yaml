  - {type: variant, offset: 3402, length: 4, content: 陳郡周穎, SBCK: 有司又議古者丘郊不異冝并圎丘方丘於南北郊更脩治壇兆其二至之祀合於二郊帝又從之一如宣帝所用王肅議也是月庚寅冬至帝親祀圎丘於南郊自是後圎丘方澤不別立又曰孫權始都武昌及建業不立郊兆至未年太元元年十一月􅀕南郊其地今秣陵縣南十餘里郊中是也晉氏南遷立南郊於已地非禮所謂陽位之義也宋武大明三年尚書右丞徐爰議郊祀之位逺古薎聞禮記燔柴於太一􅀕天也兆於南郊就陽位也漢􅀄甘泉河東禋埋易位終亦徙於長安南北光武紹祚定二郊洛陽南北晉氏過江悉在北及郊兆之議紛然不一又南出道狹未議開闡遂於東南巳地創立丘壇皇宋受命因而弗改且居民之中非邑外之謂今聖圖重造舊章畢新南驛開塗陽路脩逺謂冝郊正午以定天位博士司馬興之傳郁太常丞陸澄並同爰議乃移郊兆於秣陵牛頭山西正在宫之午地也􅀓玄正都賦曰建乎禋祀祈福上帝天子乃反古服襲大裘綖細五采平冕垂旒質}
  - {type: page-break, offset: 3402, content: '', id: KR3k0012_SBCK_527-9a}
  - {type: variant, offset: 3402, length: 4, content: 陳郡周穎, WYG: 有司又議古者邱郊不異宜併圜丘方丘于南北郊更修治壇兆其二至之祀合于二郊帝又從之一如宣帝所用王肅議也是月庚寅冬至帝親祀圜丘于南自後圜丘方澤不别立又曰孫權始都武昌及建業不從郊祀至末太元元年十一月祭南郊其地今秣陵縣南十餘里郊中是也晉氏南遷立南郊于已地非禮所謂陽位之義也宋武大明三年尚書右丞徐爰謂郊祀之位逺古肇開禮記燔柴于泰壇祭天也兆于南郊就陽位也漢初甘泉河東禋埋易位終亦徙于長安南北光武紹作定二郊洛陽南北晉氏過江悉在北及郊兆之議紛然不一又南郊道狹未議開闢遂于東南已地創立丘壇皇宋受命因而弗改且居民之中非邑外之謂今聖圖重造舊典畢新南驛開塗陽路修逺謂以郊正午以定天位博士司馬興之傅郁太常丞陸澄並同爰議乃移郊兆于秣陵牛頭山西正在宮之午位也傅𤣥正都賦曰建乎禋祀祈福上帝天子乃反古服襲大裘綖紐五綵平冕垂旒質}
