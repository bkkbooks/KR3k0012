  - {type: variant, offset: 7, length: 0, content: '', WYG: 祭日於東祭月於西以别外内以端其位日出於東日生於西隂陽長短終始相廵以致天下之和天下之禮致反始也致鬼神也致和用也致義也致讓也禮含文嘉曰五祀南郊北郊西郊東郊中兆正謀五者天子公侯伯子男卿大夫士所以承天也禮記外傳曰王者冬至之日祭昊天上帝於圜丘冬至一陽生非人力為之丘自然髙大也諸侯不祭天王肅云天惟一帝鄭𤣥以天有六帝周禮云祀昊天又旅五帝是六星辰之位列于壇下燔牲玉于壇上又曰夏至日祭皇祇地于方澤配以后土立冬之日祭神州地祇于北郊配以后稷此周制也左傳襄上曰三卜郊不從乃免牲孟獻子曰吾今而後知有卜筮夫郊祀后稷以祈農事是故啓蟄後郊郊而後耕今既耕而後卜郊宜其不從也榖梁傳曰宣公郊牛之口傷之曰緩辭也傷自牛作也改卜牛死乃不郊春秋繁露曰王者嵗一祭天于郊天者百神之君王者所最尊也又曰春秋之義國有大䘮者止宗廟之祭而不止郊祭不止郊祭者不敢以父母之䘮廢事天之禮也孝經曰昔者周公郊祀社稷以配天宗祀文王于明堂以配上帝也五經異義曰春秋公羊説禮郊及日皆不卜常以正日上下也魯于天子並事變禮今成王命魯使卜從乃郊不從即已下天子也魯以上辛郊不敢與天子同也又曰今尚書夏侯歐陽説類祭天名也以事類祭之奈何天位在南方就南郊祭之是也五經通義曰王者所以祭天地何王者父事天母事地故以子道事之祭日以丁與辛何丁者反覆自丁寧辛者當自克新也爾雅曰祭天曰燔柴祭地曰瘞埋廣雅曰圜丘太壇祭天也方澤太圻祭地也漢書曰髙祖入闗問故秦時祀上帝何如對曰四帝有白黄青赤之祀髙祖曰我知之矣待我而具五色乃立黑帝之祠名曰黑祀又郊祀志曰遂郊雍西隴登崆峒幸甘泉令祠祀官寛舒等具太乙祠壇祠壇倣亳忌太一壇壇三垓五帝壇環居其下各如其方黄帝西南除八通鬼道太乙所用如雍五畤物而加醴棗脯之屬殺一犛牛以為俎豆牢具又郊祀志曰三年一郊秦以十月為嵗首故常以十月上宿郊見通權火權火烽也狀若桔橰以火令其光明祀所拜於咸陽之旁而衣尚白其用如經祠云又郊祀志曰武帝立后土祠于汾陽立太乙祠于甘泉祭日以牛祝宰衣赤祭月以羊祝宰衣白宣帝于成山祠日菜山祠月又郊祀志曰成帝初即位丞相衡御史大夫譚奏言祭天于南郊就陽之義也瘞地于北郊即隂之象也因其所都而各饗焉昔者文武周公郊于豐鎬成王郊于洛邑由此觀天之随王者所居而享之可見也甘泉泰畤河東后土之祠宜可徙置長安續漢書祭祀志曰建武元年光武即帝位于鎬為壇營于鄗之陽祭告天地採用元始中郊祭祀二年正月初制郊兆于洛陽城南七里依鄗採元始中故事為圜壇入陛中又為皇壇天地位其上皆南向又祭祀志曰地郊在洛陽城北四里為方壇四階二年初别祀地祇位南面西上髙皇后配西面北上皆在壇上地理羣臣從食皆在壇下東觀漢記曰上都洛陽制兆于城南七里北郊四里行夏之時時以平旦服色犧牲尚黑明火德之運常服徽熾尚赤四時隨色季夏黄色議者曰昔周公郊祀后稷以配天宗祀文王以配上帝圗䜟著伊堯赤帝之子俱與后稷並受命而為王漢劉祖令宜郊祀帝堯以配天宗祀髙祖以配上帝有司奏議曰追跡先代無郊其五運之祖者故禹不郊白帝周不郊帝嚳漢雖唐之苗裔堯以歴數命舜髙祖赤龍火德承運而起當以髙祖配堯之後元復于漢宜以修奉濟陽城陽縣堯帝之冡雲臺致敬祭祀之禮宜亦如之又曰光武中元元年起明堂辟雍靈臺及北郊謝承後漢書丹陽方儲聰明善天文為洛陽令章帝欲出南郊儲上言當有疾風暴雨乘輿不可以出疑其妄儲飲酖而死果如儲言洛陽晝暝後漢書曰光武嘗問鄭興郊祀事曰吾欲以䜟斷之興對曰臣不為䜟帝怒曰卿之不為䜟非之耶興惶恐曰臣于書有所未學而無所非也帝意乃解漢儀曰漢制天地以下羣臣所祭凡一千五百四十新益為萬五千四十漢法三嵗一祭天于雲陽宫甘泉壇以冬至日祭天神下三嵗一祭地于河陽汾隂后土天宫以夏至日祭地地神出五帝祭于雍五畤又曰祭天用六采綺席六重長一丈中有幅四周縁之玉飾器凡器七千三百物具備飬牛五嵗至三千斤又曰皇帝祭天居雲陽宫齋百日上甘泉通天臺髙三十丈以候天神之下見如流火舞女童三百人皆年八嵗天神下壇舉烽火皇帝就行宮中不至壇所甘泉臺去長安三百里望見長安城黄帝以來所祭天之圜丘也又曰祭地河東汾隂后土宫宫曲入河古之祭地澤中方丘也禮儀如祭天名汾葵一名葵丘也宋書禮志曰魏文帝黄初二年正月郊祀天地明堂是時魏都洛京而神祇兆域明堂靈臺皆因漢舊事四年帝將東廵以大軍當出使太常一以特牛告祠南郊自後以為常又禮志曰太和元年正月郊祠武皇帝以配天宗祠文皇帝于明堂以配上帝是時二漢郊禋之制具存魏所損益可知也又禮志曰魏景初元年始營洛陽南委粟山為圜丘詔曰昔漢氏之初承秦滅學之後採摭殘缺以備郊祀自甘泉后土雍宫五祠神祇兆位多不輕見並以興廢無常以彼至此四百餘年廢無禘禮古代之所更立者遂有缺焉曹氏世系出自有虞氏今祭圜丘以始祖帝舜配地以武妃伊氏配天郊所祀曰皇天之神以太祖武皇帝配地郊所祭曰皇地之祇以武宣皇后配宗祀皇考髙祖文皇帝于明堂以配上帝江表傳曰羣臣以孫權未郊祀奏議曰頃者嘉瑞屢臻逺國慕義宜備郊祀以承天意權曰郊祀當于中土今非其所于何施此從臣復奏曰普天之下莫非王土王者以天下為家周文武郊酆鎬非必中土權曰武王伐紂即非鎬京而郊其所也文王未為天子立郊于酆見何經典復奏曰伏見}
