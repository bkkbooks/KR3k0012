  - {type: variant, offset: 336, length: 584, content: 幸雍郊見五畤祠衣皆上赤趙人新垣平以望氣見上言長安東北有神氣成五采若人冠冕焉或曰東北神明之舍西方神明之墓也張晏曰神明日也日出東北舍謂陽谷日沒於西也故曰墓天瑞下宜立祠上帝以合符應於是作渭陽五帝廟同宇韋昭曰宇謂上同下異禮所謂複廟同屋也帝一殿面五門各如其帝色祠所用及儀亦如雍五畤明年夏四月文帝親拜霸渭之會以郊見渭陽五帝五帝廟臨渭其北穿蒲地溝水爟火舉而祠若光輝然屬天焉於是貴平至上大之賜累千金而使博士諸生刪六經中作王制謀議巡狩封禪事文帝出長門若見五人於道北遂因其直立五帝壇孟康曰直植也值其立處以位壇祠以五牢東觀漢記曰建武三年上幸舂陵祠園廟大置酒與舂陵父老故人為樂又曰桓譚字君山沛人章帝元和中行巡狩至沛令使者祠譚冢鄉里裏以為榮又曰李通上大司空印綬以特進奉朝請及有司奏請封諸皇子帝感通首創大謀即日封通少子雄為邵陵侯每幸南陽常遣使者以牢祀通父冢又曰顯宗拜馬嚴持兵長史將北軍五校士羽林兵三千人屯西河美稷衛護南單于聽置司馬從事牧守謁敬同之將軍勑嚴過武庫祭蚩尤帝親御阿閣觀其士眾時人榮之又曰永平中詔京兆右扶風以中牢祠蕭何霍光出郡錢穀給蕭何子孫在三百里內悉令侍祠又曰桓帝初立黃老祠北宮濯龍中以文罽為壇飾淳金釦器采色眩曜祠用三牲太官設珍饌作倡樂以求福祥漢皇德傳云章帝詔使者奉太牢致祠唐堯於成陽雲臺袁山松後漢書曰韓卓字子助陳留人臘日奴竊食祭其母卓義其心即日免之漢舊儀曰宗廟八月飲酎用九大牢元年祭天, SBCK: ''}
