  - {type: variant, offset: 13, length: 4, content: 洪範八政, SBCK: 文王德性謙讓處諸侯之位明未郊也經傳無明文匡衡俗儒臆􅀃非典籍正義不可用志林曰吴主糾駮郊祀之奏追貶匡衡謂之俗儒凡在見者莫不􅁣然以爲妙盡物理逹於事冝至於稽之典籍乃更不通毛氏之􅀃云堯見天因以邰而生后稷故國之於邰命使事天故詩曰后稷肇祀庶無罪悔以迄于今言自后稷以來皆得􅀕天猶魯人郊祀也是以棫樸之作有積燎之薪文王郊酆經有文匡衡豈俗而柱之哉文王雖未爲天子然}
