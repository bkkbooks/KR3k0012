  - {type: variant, offset: 3801, length: 1, content: 王, SBCK: 濯濯之麟遊彼靈畤孟冬十月君徂郊祀馳我君車帝以享祉郭璞上䟽曰臣歳首粗有所占得解之旣濟案解卦繇云君子以赦過宥罪旣濟云思患而預防之郊祀者以通天人之誠感因農祥而祈事上乃致敬於皇靈下以播惠於萌􅀺者也臣愚以爲於卦之}
