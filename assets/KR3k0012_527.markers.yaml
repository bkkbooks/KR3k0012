  - {type: variant, offset: 3803, length: 3, content: 方初為, SBCK: 旣郊之後冝發哀矜之詔引在予之責蕩除瑕釁賛陽布惠使幽弊之民應養生以恱育否滯之氣隨谷風而舒散此亦􅀉時事以制用藉開塞而曲成者也}
  - {type: variant, offset: 3803, length: 3, content: 方初為, WYG: 既郊之後宜發哀矜之詔引在予之責務除瑕釁贊揚布惠使幽弊之民應養生以恱育否滯之氣隨谷風而舒散此亦寄時事以制用藉開塞而曲成者也}
