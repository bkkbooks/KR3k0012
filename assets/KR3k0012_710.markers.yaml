  - {type: variant, offset: 1407, length: 137, content: 敬不忍與惡人同席又曰汝南薛惇字子禮為北海長史家貧坐無完席妻曰君無俸祿給子孫復無完席耶惇以善與妻自坐敗者又衛良字叔賢拜尚書令病罷官還家家無完席賓客省之者坐桑下談論飲水去典略曰袁尚袁熙奔遼東公孫康先置精勇於廄中請熙尚熙尚入乃縛之坐於凍地尚寒求席熙曰頭顱方行萬里何席之為蜀志曰先主, SBCK: 孝武皇帝登}
