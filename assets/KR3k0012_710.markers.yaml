  - {type: variant, offset: 702, length: 0, content: '', krp: 右􅃮几凢䘮事右素几吉事變几凶事仍几禮記曰謀於長者必操几杖以從之又曰獻几杖者拂又曰大夫七十而致仕若不得謝謝去君貪其徳而留之也則必賜之以几杖又曰乗車必以几又曰龜筴几杖不入公門龜筴問家之吉凶几杖嫌自長老又月令曰八月之節養衰老授几杖又内則曰父母舅姑坐御者舉几歛席又曰始死綴足用燕几傳語曰諸侯之師乆於偪陽荀偃士正請於荀罃曰水潦將降懼不能歸班師班還也智伯怒智伯荀罃投之以几出於其間出偃正之間也又曰蔿啓疆曰聖王務行禮不求恥人}
  - {type: variant, offset: 703, length: 4, content: 熊席凡喪, SBCK: 几而不􅀝爵盈而不飲禮之至也國語楚語曰左史􅀝相曰倚几有訓誦之戒訓誦上師所誦之諌書之於几漢書曰呉王稱疾不朝驗問不實及後使人爲秋請律春曰朝秋曰請如古諸侯朝聘也上復責問呉使使者曰察見淵中魚不祥張宴曰喻人君不當見臣下之私也於是天子賜呉王几杖又曰朱博遷琅瑘太守齊郡舒緩養名博奮髯抵几曰觀齊兒欲以爲俗耶皆斥罷諸病吏續漢書曰魏文帝賜楊彪几杖以彰舊德東觀漢記曰黄香爲尚書郎以香父尚左賜卧几靈壽杖又曰上􅀄即位先訪求賢茂詔曰前宻令卓茂名冠天下當受天下重賞今以茂爲太􅀓封裒德侯賜几杖魏志曰太祖爲司空丞相毛玠爲東曹椽太祖平栁城頒所獲物特以素屏風素馮几以賜玠曰君有古人之風故賜古人之物又曰吕布遣陳登因陳布勇而無謀冝早謀之太祖恱始因登求徐州牧不􅀗及登還布拔㦸斫几責之晉書曰劉毅仲雄以太康六年卒帝撫几驚曰失吾名臣不得生作三公即贈儀同三司又曰魏舒以年老稱疾遜位詔賜几杖不朝及錢百万牀帳簟褥又曰王羲之字逸少嘗徃門生家見棐几滑浄因書之眞草相半後其父誤刮去之門生驚懊累日宋書曰沈麟士字雲禎隱居以篤學爲務恒馮素几鼓素琴呉均齊春秋曰孔靈産爲光禄大夫覽止足之分不肯仕太祖以白麾毛扇素几遺之曰以君有古人風故賜卿古人之物也陳書曰王冲爲太子少􅀓武帝以冲前代舊臣特申長㓜之敬文帝即位益加尊大嘗從幸司空徐度宅宴筵之上賜之以几後魏書曰咸陽王僖謀逆誅其宫人爲之歌曰可憐咸陽王柰何作}
