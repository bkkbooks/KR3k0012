  - {type: variant, offset: 708, length: 0, content: '', krp: 誤金床玉几不能眠夜蹋霜與露莊子曰南郭子綦隱几而坐仰天而嘘嗒焉似䘮其偶孟子曰孟子去齊宿於晝有欲爲王留行者坐而言不應隱几而卧客不恱曰弟子齊宿而後敢言夫子卧而不聽請勿復敢見矣晝齊邑也齊人欲爲君留孟子行孟子不以倚几而卧也山海經曰西王母梯几而戴勝梯謂馮也漢舊儀曰天子用玉几拾遺録曰瀛州南有金巒之觀中蔵寳几覆以雲紈之素漢武帝内傳曰帝受西王母五岳眞形經盛以黄金之几西京雜記曰漢制天子玉几冬則加綈錦其上謂之綈几公侯皆以木爲几冬則以細罽爲囊慿之不得加綈錦之飾於几案㑹稽典録曰葛仙公慿白桐几學數十年白日登仙几化爲白虎三脚兩頭往徃人見之魏武上雜物䟽曰御物三十種有上車􅃮畫重几大小各一枚語林曰任元褒爲光禄勲孫慿翊徃詣之見門吏慿几視之孫入語任曰吏几對客爲不禮任便推之吏荅云得罰體痛以横木枎持非慿几也孫曰直木横施植其兩足便爲慿几何必孤蹯鵠膝曲木抱腰姚信士語曰馬援几而見梁竇子弟文舉坐榻而受徐文高拜戴勝竹林七賢論曰魏朝封文王固譲公卿皆當喻旨司空鄭冲等馳使從阮籍求其文立待之籍時在袁孝尼家宿枎而起書几板爲文無所治定乃冩付信鄴中記曰石虎御座几悉􅃮雕盡皆爲五色花也南岳記曰衡山有石室内有石牀石几異苑曰曆陽石秀之欻有一人着平巾袴褶語秀云聞君巧侔班爾刻几尤妙太山府君相召秀之自陳云劉政能造數旬而殞石氏猶存劉作几有名遂以致斃幽明録曰海中有金臺水出百丈臺其内有金几雕文備制上有百味之食李尤几銘叙曰昔帝軒轅仁智恐事之有闕作几之法張華倚几銘曰倚几之}
  - {type: variant, offset: 709, length: 2, content: 葦席, SBCK: 設而􅀝作器此成於彼也案􅀃文曰檈似縁切圎案也方言曰陳楚宋魏謂案爲冩楚漢春秋曰項王使武渉􅀃淮隂侯淮隂侯曰臣故事項王位不過中郎官不過執㦸及去項歸漢漢王賜臣玉案食臣具之劒臣背之内愧於心史記曰髙祖過趙趙王張敖自持案進食甚恭上箕踞罵之漢書曰萬石君石奮子孫有過失不誚譲爲便坐對案不食又曰貢禹奏曰見賜杯案􅀞文金銀飾非當所以食臣下也又曰朱博爲人廉儉自微賤至冨貴不食重味案上不過三杯酒又曰許后五日一朝皇太后於長樂宫親奉案上食東觀漢記曰更始韓夫人嗜酒毎侍飲見常侍奏事輙怒曰帝方對我飲正用此時持事來乎起抵破書案又曰魏覇延平元年仕爲光禄大夫妻死長兄伯爲娶妻送至官舎覇曰年老兒子備具何用空養他家老嫗爲即自入拜其妻手奉案前肉跪曰不敢相屈而妻慙求去又曰尹敏字㓜季與班彪相友每相與談論輙屏案不食又曰梁鴻常賃舂每歸妻爲具舉案齊眉又曰蔡彤素清在遼東三十年衣無儲副賜錢百萬下至杯案食物大小重沓南史曰江秉之爲新安太守在郡作書案一枚去官留以付庫梁書曰郭祖深清儉素木案食不過一肉漢舊儀曰丈二旋案以陳三十六肉九􅂖飲食東宫舊事曰皇太子犯􅀄拜有􅃮金渡足奏案一枚魏武上雜物䟽曰御物有純銀叅鏤帶􅃮􅀞案一枚江表傳曰曹公平荆州欲伐呉張昭等皆勸迎曹公唯周瑜魯肅陳距北之計孫權拔刀斫前奏案曰諸將復有言迎北軍與此同也西京雜記曰武帝爲七寳牀雜寳案於桂宫中漢武故事曰武帝時東郡獻短人長五寸上疑是山精常令在案行東方朔問曰巨靈汝何以叛阿母徤否廣陵傳曰呉戒字貴齊性剛直同業生陳􅂛爲賊戒見之升爲設食戒曰汝巳爲賊柰何爲設食因舉按投江中令其趣降神仙傳曰呉興人沈羲爲仙人所迎上見老君玉女以金案玉杯藥賜羲曰此神仙丹不死之藥鄴中記曰石虎以宫人爲女官門下通事以玉案行文書燕丹子曰太子常與荆軻同案而食塩鐵論曰文杯􅀞案婢妾衣䊵履􅁝所以亂治也潜夫論曰前羗始叛器械未備虜或以銅鏡以蒙兵或􅀒板案以􅀋楯誠易戰耳異苑曰百丈山上有石房内有案置石書二卷夢書曰夢見杯案賔客到也多客大案少客小案也陸雲與兄機書曰按行曹公器物有奏按五枚又作欹枕以卧視書張衡四愁詩曰羙人贈我錦繡叚何以報之青玉案李尤書案銘曰居則致樂承顔接賔承卷奏記通逹謁刺尊上荅下道合仁義梁簡文帝書案銘曰刻香鏤采纎銀卷足􅃮花曜紫􅀞製舒録怪廣知平人雕非曲厠質錦帳承芳綺褥披古道今察姦糾俗杖說文曰杖持也}
