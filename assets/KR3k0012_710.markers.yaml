  - {type: variant, offset: 1545, length: 256, content: 孤母販履織席為業晉書曰王渾為將軍鎮壽陽虛懷撫士坐無空席王隱晉書曰陶侃字士衡親人過侃宿時大雪無草侃母湛撤床雜蔣手剉給客牛馬晉陽春秋云蔣薦也晉中興書曰王敦死裹以席塗以蠟埋齋中晉建武起居注曰立敬后廟薦席不用綠緣晉前燕書曰高祖廆年十五出避難追者急走避民家入其屋以席自障追者入屋發視無所見遂免宋書曰林邑王陽邁初在孕其母夢生兒有人以金席籍之其色光麗夷人謂金之精者為陽邁中國云紫磨者因以為名宋起居注曰元嘉中劉禎為御史中丞奏風聞廣州剌史韋朗於州部作白蒐席三百二十領請以事追免朗官吳均齊春秋曰劉璡字子璥耿介好禮嘗與故人共車於津陽內, SBCK: 室}
