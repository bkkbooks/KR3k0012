  - {type: punctuation, offset: 69, content: 「, id: KR3k0012_CHANT_710-bkkpn39}
  - {type: variant, offset: 69, length: 241, content: 牖間南嚮敷重篾蓆黼純華王仍几篾桃枝竹白黑雜繒緣之華彩色華玉以飾憑几因因也因生時几不改作西序東嚮敷重底席綴純文貝仍几東西廂謂之序底蒻革綴雜絲有文之具飾矣東序西嚮敷重豐蓆畫純雕玉仍几豐莞彩色為畫雕刻鏤此養國老饗群臣之坐西序南嚮敷重荀蓆玄紛純漆仍几荀蒻竹玄紛黑綬此親屬私宴之坐詩邶柏舟曰我心匪席不可卷也席雖平尚可卷禮曲禮上曰群居五人則長者必異席席以四人為節為人子者坐不中席又曰有憂者側席而坐側猶持也有喪者專席而坐專猶單也侍坐於所尊敬無餘席必盡其近者尊之端為其後來也又曰姑姊妹女子子已嫁而反, SBCK: 戚戚}
  - {type: variant, offset: 69, length: 11, content: 牖間南嚮敷重篾蓆黼純華, WYG: ''}
