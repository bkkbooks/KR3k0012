  - {type: variant, offset: 1201, length: 180, content: 詔禹與三公絕席又曰宣秉建武元年拜御史中丞上特詔御史中丞與司隸校尉尚書令會同並專席而坐故京師號曰三獨謝承後漢書曰戴憑徵博士詔公卿大會群臣皆就席憑獨立世祖問其意憑對曰博士說經皆不如臣而坐居臣上是以不得就席令與諸儒難說善之後正旦朝賀令群臣說經更相難詰義有不通輒奪其席以益通者憑重五十席京師議曰解經不窮戴侍中又曰殷亮為博士講學大夫諸儒論勝者賜席亮重八九席帝曰學不當如是, SBCK: 青龍}
