  - {type: variant, offset: 2349, length: 328, content: 何以履之且夫美而耗上方義之道也又曰衛嗣公時縣有人於令左右縣令發褥而席弊嗣公令人遣席曰吾聞汝發褥而席弊其賜汝席縣令大驚以君為神又曰孟獻伯相魯不坐重席又曰禹為蔣席頗緣此彌侈矣而國不服者三十三殷作茵席彫文彌侈矣國之不服者五十三又曰文公至河令席袵捐之咎犯聞之曰席蓐所臥也而君棄之臣不勝其哀說苑曰孔子困於陳蔡之間居環堵之內席三經之席鹽鐵論曰古者庶人蒲席以草經及後踐蒲蒻複筵方薦帛緣者也又曰古者大夫複薦草緣蒲平單莞今富者繡茵崔豹古今注曰草名虎鬢者江東織以為席曰西王母席也東宮舊事曰太子有獨坐龍鬢席赤皮花經席一領山海經曰鵲山至箕尾山其神皆鳥身龍首祠之用白管為席西京雜記曰昭陽殿設緣熊席毛皆長一尺餘眠而雍毛自弊望之者不能見也坐則沒膝其中雜薰諸香一坐此席餘香百日不歇也又曰趙, SBCK: 杖去湏􅁷光彩滿堂俄尓}
