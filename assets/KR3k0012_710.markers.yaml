  - {type: 'tls:seg', offset: 708, content: '', id: KR3k0012_CHANT_710-9a.32}
  - {type: variant, offset: 708, length: 0, content: '', SBCK: 誤金床玉几不能眠夜蹋霜與露莊子曰南郭子綦隱几而坐仰天而嘘嗒焉似䘮其偶孟子曰孟子去齊􅀫於晝有欲爲王留行者坐而言不應隱几而卧客不恱曰弟子齊􅀫而後敢言夫子卧而不聽請勿復敢見矣晝齊邑也齊人欲爲君留孟子行孟子不以􅀝几而卧也山海經曰西王母梯几而戴勝梯謂馮也漢舊儀曰天子用玉几拾遺録曰瀛州南有金巒之觀中蔵寳几覆以雲紈之素漢武帝内傳曰帝受西王母五岳眞形經盛以黄金之几西京雜記曰漢制天子玉几冬則加綈錦其上謂之綈几公侯皆以木爲几冬則以細􅄢爲囊慿之不得加綈錦之飾於几案㑹稽典録曰􅁑仙公慿白桐几學數十年白日登仙几化爲白虎三脚兩頭往徃人見之魏武上􅄂物䟽曰御物三十種有上車􅃮􅀞重几大小各一枚語林曰任元褒爲光禄勲孫慿翊徃詣之見門吏慿几視之孫入語任曰吏几對客爲不禮任便推之吏荅云得罰體痛以横木枎持非慿几也孫曰直木横施植其兩足便爲慿几何必􅀌蹯鵠膝曲木抱􅆎姚信士語曰馬援几而見梁竇子弟文舉坐榻而受徐文高拜戴勝竹林七賢論曰魏朝封文王固譲公卿皆當喻旨司空鄭冲等馳使從阮籍求其文立待之籍時在􅀽孝尼家􅀫枎而起書几板爲文無所治定乃冩付信鄴中記曰石虎御座几悉􅃮雕盡皆爲五色花也南岳記曰衡山有石室内有石牀石几異苑曰曆陽石秀之欻有一人着平巾袴褶語秀云聞君巧侔班爾刻几尤妙太山府君相召秀之自陳云劉政能造數旬而殞石氏猶存劉作几有名遂以致斃幽明録曰海中有金臺水出百丈臺其内有金几雕文備制上有百味之食李尤几銘叙曰昔帝軒轅仁智恐事之有闕作几之法張華􅀝几銘曰􅀝几之}
