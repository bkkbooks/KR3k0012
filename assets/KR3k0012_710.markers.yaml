  - {type: variant, offset: 709, length: 2, content: 葦席, WYG: 設而不倚作器於此成禮於彼案説文曰檈似縁切圓案也方言曰陳楚宋魏謂案為􅀈楚漢春秋曰項王使武渉説淮隂侯淮隂侯曰臣故事項王位不過中郎官不過執㦸及去項歸漢漢王賜臣玉案之食巨闕之劒臣背之内愧於心史記曰髙祖過趙趙王張敖自持案進食甚恭上箕踞罵之漢書曰萬石君石奮子孫有過不誚讓為便坐對案不食又曰賈禹奏曰見賜杯案文畫金銀餙非當所以食臣下也又曰朱博為廉儉自㣲賤至富貴不食重味案上不過三杯酒又曰許后五日一朝皇太后於長樂宫親奉案上食東觀漢記曰更始韓夫人嗜酒每侍飲見常侍奉事輙怒曰帝方對我飲正用此時持事來乎起扺破書案又曰魏覇延平元年仕為光禄大夫妻死長兄伯為娶妻送至官舍覇曰年老兒子備具何用空飬他家老嫗為即自入拜其妻手奉案前跪霸曰不敢相屈而妻慙求去又曰尹敏字幼季與班彪相友每相與談論輙屏案不食又曰梁鴻常賃舂每歸妻為具食舉案齊眉又曰蔡彤素清在遼東三十年衣無儲副賜錢百萬下至杯案食物大小重㳫南史曰江秉之為新安大守在郡作書案一枚去官留以付庫梁書曰郭祖清儉素木案食不過一肉漢舊儀曰丈二旋案以陳三十肉九榖飲食東宫舊事曰皇太子妃初拜有漆金度足奏案一枚魏武上雜物䟽曰御物有純銀參鏤帶漆畫案一枚江表傳曰曹公平荆州欲伐吳張昭等皆勸迎曹公唯周瑜魯肅陳距北之計孫權㧞刀斫前奏案曰諸將復有言迎北軍與此同也西京雜記曰武帝為七寶牀雜寶案於桂宫中漢武故事曰武帝時東郡獻短人長五寸上疑是山精常令案上行東方朔問曰巨靈汝何以叛阿母健否廣陵傳曰吳戒字季齊姓剛直同業生陳叔為賊戒見之叔為設食戒曰汝已為賊奈何為設食因舉案投江中令其撒饌神仙傳曰吳興人沈羲為仙人所迎上見老君玉女以金案玉案藥賜羲曰此神仙丹不死之藥鄴中記曰石虎以宫人為女官門下通事以玉案行文書燕丹子曰太子常與荆軻同案而食鹽鐵論曰文杯畫案婢妾衣紈履絲所謂以亂治亂也潛夫論曰前𦍑始叛器械未備虜或持銅鏡以䝉兵或負板案以類楯誠易戰耳異􅁐曰百丈山上有石房内有案置石書二卷夢書曰夢見杯案賔客到也多客大案少客小案陸雲與兄機書曰案行曹公器物有奏案五枚又作欹枕以卧視書張衡四愁詩曰美人贈我錦繡段何以報之青玉案李尤書案銘曰居則致樂承顔接賔承奉奏記通達詔刺尊上答下道合仁義梁簡文帝案銘曰刻香鏤采纎銀卷足漆花曜紫畫製舒緑性廣知平文雕非曲厠質錦帳承芳綺褥披古道今察姦紏俗杖説文曰杖持也}
