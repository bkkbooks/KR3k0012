  - {type: variant, offset: 3145, length: 279, content: 施揖讓而坐君子攸宜皇甫謐高士傳曰嚴君平成都市賣卜詔徵不起蜀有富人羅仲與君平善問何以不往曰無車糧中即為具車焉糧米平君曰吾病身非不足也我有餘而子不足也我有餘而子不足柰何以不足奉有餘也仲曰吾一席直萬金子無檐石乃云有餘謬矣又曰老萊子親沒隱蒙山之陽枝木為床薦艾為蓆益部耆舊傳曰張充為州治中從事刺史每自坐高床為從事設單蓆於地鍾良吏傳曰吳隱之字處默鄄城人也轉廣州剌史返舟之日唯身而已宅有茅茨六間坐無完蓆以蓬為屏風會稽先賢讚曰董昆字文通為太農帑丞坐無完蓆盧毓冀州論常山為林大陸曰澤兼葭蒲葦雲母御蓆地產不為無珍也汝南先賢傳曰鄭敬以茅葭為蓆常隨杞柳之陰會稽典錄曰隆脩字奉遷為豫章, SBCK: ''}
