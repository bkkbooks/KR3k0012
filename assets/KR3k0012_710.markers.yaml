  - {type: variant, offset: 705, length: 2, content: 凡喪, WYG: 而卧也山海經曰西王母梯几而戴勝梯謂慿也漢舊儀曰天子用玉几拾遺記曰瀛洲南有金巒之觀中藏寶几覆以雲紈之素漢武帝内傳曰帝受西王母五岳真形盛以黄金之几西京雜記曰漢制天子玉几冬則加綈錦其上謂之綈几公侯皆以木為几冬則以細􅄢為囊慿之不得加綈錦之餙於几案㑹稽典録曰葛仙公慿白桐几學數十年白日登仙几化為白虎三脚兩頭徃徃人見之魏武上雜物䟽曰御物三十種有上車漆畫重几大小各一枚語林曰任元褒為光禄勲孫翊徃詣之見門吏慿几視之入語任曰吏慿几對客為不禮任便推之吏答云得罰體痛以横木扶持非慿几也孫曰直木橫施值其兩足便為慿几何必孤鵠蟠膝曲木抱腰姚信士語曰馬援慿几而見梁竇子弟文舉坐榻而受徐文髙拜戴勝竹林七賢論曰魏封晉文王固讓公卿皆當喻㫖司空鄭冲等馳使從阮籍求其文立待之籍時在袁孝尼家宿扶醉而起書几板為文無所治定乃寫符信鄴中記曰石虎御坐几悉漆彫畫皆為五色花南岳記曰衡山有石室内有石床石几異􅁐曰厯陽石秀之歘有一人著平巾袴褶語秀云聞君巧侔班匠刻几尤妙太山府君相召秀之自陳云劉政能造數旬而殞石氏猶存劉作几有名遂以致斃幽明録曰海中有金臺水出百丈臺之内有金几彫文備制上有百味之食李尤几銘叙曰昔帝軒轅仁智恐}
