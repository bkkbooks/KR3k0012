  - {type: variant, offset: 3426, length: 5, content: 廳事薦編絕, SBCK: 自建業赴職聞宫亭廟驗言靈驗過乞在任安稳當上銀杖一枚年限旣滿作杖擬以還廟撫捶䥫以爲幹以銀塗之尋徴爲散􅀐常侍往宫亭送杖於廟中乞即進路日晚降神巠宣教曰陳敏許我銀杖今以塗杖見與便投杖水中當送以還之欺篾之罪}
