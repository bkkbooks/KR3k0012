  - {type: variant, offset: 702, length: 0, content: '', SBCK: 右􅃮几凢䘮事右素几􅁻事變几凶事仍几禮記曰謀於長者必操几杖以從之又曰獻几杖者拂又曰大夫七十而致仕若不得謝謝去君貪其徳而留之也則必賜之以几杖又曰乗車必以几又曰􅀛筴几杖不入公門􅀛筴問家之􅁻凶几杖嫌自長老又月令曰八月之節養衰老授几杖又内則曰父母舅姑坐御者舉几歛席又曰始死綴足用燕几􅀓語曰諸侯之師乆於偪陽荀偃士正請於荀罃曰水潦將降懼不能歸班師班還也智伯怒智伯荀罃投之以几出於其間出偃正之間也又曰蔿啓疆曰聖王務行禮不求恥人}
