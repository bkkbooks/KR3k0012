  - {type: variant, offset: 2073, length: 275, content: 不知行與不行譬以方為輪也不知宜與不宜譬以錦緣薦也列子曰陽朱南之沛之梁而過老子老子曰睢睢盱盱而誰與居夫太白若辱盛德如不足楊朱曰聞命矣其往也舍者避席其來也煬者與之爭竈席晏子曰景公獵休坐地而食晏子後至戍葭而席公不悅曰子猶席何也對曰臣聞介冑坐陳不席獄尸不席二者皆憂也臣故不敢以憂侍坐公曰善令大夫皆席又曰景公飲酒移於晏子晏子曰夫鋪薦陳簠有人臣不敢與焉又移於司馬穰苴曰鋪薦席陳簠簋者有人臣不敢與焉范子計然曰六尺蘭席出河東上價七十蒲席出三輔上價百子思子曰舜不降席而天下治桀紂不降席而天下亂韓子曰趙簡子謂左右曰車席泰美夫冠雖惡頭必戴之履雖善足必履之金車如此其太美也吾, SBCK: 因}
