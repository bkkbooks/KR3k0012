  - {type: variant, offset: 703, length: 1, content: 熊, WYG: 而不倚爵盈而不飲禮之至也國語楚語曰左史倚相曰倚几有訓誦之諫訓誦工師所誦之諫書之於几漢書曰吳王稱疾不朝驗問不實及後使人為秋請律春曰朝秋曰請如古諸侯朝聘也上復責問吳使使者曰察見淵中魚不祥張宴曰喻人君不當見臣下之私也於是天子賜吳王几杖又曰朱博遷瑯琊太守齊部舒緩飬名博奮髯抵几曰觀齊兒欲以為俗耶皆斥罷諸病吏續漢書曰魏文帝賜楊彪几杖以彰舊徳東觀漢記曰黃香為尚書郎以香父尚在賜卧几靈壽杖又曰上初即位先訪求賢茂詔曰前宻令卓茂名冠天下嘗受天下重賞今以茂為太傅封裒徳侯賜几杖魏志曰太祖為司空丞相毛玠為東曹掾太祖平聊城頒所獲物特以素屏風素慿几以賜玠曰君有古人之風故賜古人之物又曰吕布遣陳登至太祖求徐州牧登因陳布勇而無謀宜早誅之太祖悦及登還布㧞㦸斫几責之晉書曰劉毅仲雄以太康六年卒帝撫几驚曰失吾名臣不得生作三公即贈儀同三司又曰魏舒以年老稱疾遜位詔賜几杖不朝及錢百萬牀帳簟褥又曰王羲之字逸少嘗徃門生家見棐几滑淨因書之真草相半後其父誤刮去之門生驚懊累日宋書曰沈麟士字雲禎隱居以篤學為務恒慿素几鼔素琴吳均齊春秋曰孔靈產為光禄大夫覽止足之分不肯仕太祖以白麾毛扇素几遺之曰以君有古人風故賜卿古人之物也陳書曰王冲為太子少傅武帝以冲前代舊臣特申長幼之敬文帝即位益加尊重嘗從幸司空徐度宅宴筵之上賜之以几後魏書曰咸陽王僖謀逆誅其宫人為之歌曰可憐咸陽王奈何作事誤金牀玉几不能眠夜蹋霜與露莊子曰南郭子綦隱几而坐仰天而噓嗒焉似䘮其偶孟子曰孟子去齊宿於晝有欲為王留行者坐而言不應隱几而卧客不悅曰弟子齋宿而後敢言夫子卧而不聽請勿復敢見矣晝齊邑也齊人欲為君留孟子行孟子不聽倚}
