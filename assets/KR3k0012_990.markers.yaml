  - {type: variant, offset: 291, length: 0, content: '', WYG: 辛生山谷治辟百毒殺百精殃鬼辟瘟疾瘴邪毒蠱久服不夭生益州華陽國志曰收麻縣出好升麻吳氏本草曰升麻神農甘芍藥山海經曰條谷之草多芍藥洞庭之上多芍藥毛詩溱洧曰唯士與女伊其相謔贈之以芍藥芍藥香草也詩經疏曰今芍藥草無香氣非是也未審今何草司馬相如賦云勺藥之和酣揚雄賦云酸酣之和芍藥之美藥七十食也廣雅曰攣夷芍藥晉宮閣名曰暉章殿前芍藥華六畦范子計然曰芍藥出三輔建康記曰建康出芍藥極精好本草經曰芍藥味苦辛生川谷主治邪氣腹痛除血痺破堅積寒熱瘕止痛吳氏本草曰一名甘積一名梨食一名鋋一名餘容一名白术神農苦桐君甘無毒岐伯鹹李氏小寒雷公酸二月三月生澤蘭廣雅曰虎蘭澤蘭也建康記曰建康出澤蘭本草經曰澤蘭一名虎蘭一名龍􅀥味㣲温無毒生地澤治乳婦衂血生汝南又生大澤旁吳氏本草曰澤蘭一名水香神農黄帝岐伯桐君酸無毒李氏温生下地水旁葉如蘭二月生香赤節四葉相值支節間三月三日採萆薢博物志曰菝蒲八切揳與萆薢相亂一名狗脊吳氏本草曰萆薢一名百枝狗脊廣雅曰菝挈狗脊也本草經曰狗脊一名百丈味苦}
