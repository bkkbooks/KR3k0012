  - {type: variant, offset: 29, length: 1, content: 海, WYG: 上葉如韭一曰蝭母􅙛徒南切莐音沈范子計然曰提母出三輔黄白者善吳氏本草白知母一名提母神農桐君無毒補不足益氣五味爾雅曰菋荎藸五味也蔓生子叢在莖頭菋音味荎直其切藸音除聖賢佳墓記曰孔子墓上五味樹抱朴子曰羨門子服五味十六年始降玉女能入水火本草}
