  - {type: variant, offset: 34, length: 0, content: '', WYG: 吳氏本草曰雷丸一名雷實神農苦黄帝岐伯桐君甘有毒扁鵲甘無毒李氏大寒或生漢中八月採藜蘆廣雅曰藜藘葸䔜也本草經曰藜蘆一名慈蔥味辛寒生大山谷主治蠱生太山范子計然曰藜蘆出河東黄者善吳氏本草曰藜蘆一名䓗葵一名山䓗一名豐蘆一名憨䓗一名䓗苒神農雷公辛有毒黄帝有毒岐伯鹹有毒李氏大毒大寒扁鵲苦毒大寒葉根小相連二月採根虎掌本草經曰虎掌味苦温生山谷治心痛寒熱吳氏本草曰虎掌神農雷公無毒岐伯桐君辛有毒或生太山或宛句立秋九月採貫衆爾雅曰濼貫衆孫炎曰一名貫渠郭璞注曰葉員鋭莖毛黒布地生冬不死也廣雅曰貫節貫衆也本草經曰貫衆一名百頭一名貫渠一名虎卷一名萹苻味苦寒生山谷治腹中邪氣諸毒殺三蟲生𤣥山亦生宛句吳氏本草曰貫衆一名貫節一名貫中一名貫渠一名貫仲一名伯萍一名藥藻一名扁符一名狗脊神農岐伯苦有毒桐君扁鵲苦一經甘有毒黄帝鹹酸一苦無毒葉經黄兩兩相對莖黒毛聚生冬夏不老四月花八月實黒聚相連卷旁行生三月八月採根五月採葉冶葛周易參同契曰冶葛巴豆一兩入喉雖周文兆蓍孔子占卦扁鵲操鍼巫咸叩鼓安能蘇}
