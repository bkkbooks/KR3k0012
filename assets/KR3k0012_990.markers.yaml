  - {type: variant, offset: 2321, length: 235, content: 華葉說而黃其上謂之小草蕀菟音棘冤抱朴子內篇曰陵陽仲服遠志二十年有子三十七人坐在立亡世說曰謝太傅始有東山之志後命屬不獲已始就桓公司馬于時人有致桓公藥草者中有遠志公取以問謝此藥又名小草何以物有二稱謝未即荅爾時郝隆在坐謝因曰郝參軍多知識試復通看郝應聲曰荅此甚易解處則為遠志出則為小草於是謝公殊有愧色桓目謝而笑曰郝參軍此通乃不惡亦甚有會本草經曰遠志一名棘宛一名要繞久服輕身不忘葉名小草生太山及宛句細辛山海經曰浮戲之山東有虵谷上多少辛管子曰五沃之土群藥生少辛范子計然曰細辛出華陰色, SBCK: 根}
