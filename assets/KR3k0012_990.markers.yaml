  - {type: variant, offset: 4, length: 0, content: '', SBCK: 雄烏頭提母五味雷丸䔧蘆虎掌貫衆冶葛芎藭澤㵼升麻芍藥澤蘭萆薢狗脊壯蒙白頭翁狗􅂎白及附子廣雅曰前進切奚附子也一歳爲萴子二歳爲烏喙三歳爲附子四歳爲烏頭五歳爲天雄春秋後語曰􅂫􅁗如齊見王拜而慶仰面吊齊王曰是何慶吊相隨而速速也􅂫􅁗曰臣聞飢人之所以不食烏喙者以爲蜼偷充腹而與死人同患也烏喙毒藥與烏頭附子同夲也飢人食之雖充腹而死也喙音許穢切今燕雖弱小􅁗王之女婿大王利其十城而長與強秦爲仇今使弱燕爲鴈行而強秦繼推其後是食烏喙之􅀋也漢書曰宣帝許皇后産霍顯使醫擣附子入與后后崩淮南子曰夫天下之物莫凶於奚毒奚毒附子然而良醫橐而藏之有所用也抱朴子曰療聾或以狼毒冶葛或以附子葱涕合内耳或蒸鯉魚腦灌之皆愈范子計然曰附子出蜀武都中白色者善楚國先賢傳曰孔休傷頰有王莾曰玉屑白附子香消乃以劒彘音滯并香與之荆州記曰冝都郡}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_990-1b}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 雄烏頭提母五味雷丸䔧蘆虎掌貫衆冶葛伏蒙白頭翁枸把白芨芎藭澤㵼升麻芍藥澤蘭萆薢狗脊附子廣雅曰爑奚毒附子也一嵗為萴子二嵗為烏喙三嵗為附子四嵗為烏頭五嵗為天雄春秋後語曰蘇秦如齊見王拜而慶仰而弔齊王曰是何慶弔相隨而速速也蘇秦曰臣聞飢人之所以不食烏喙者以為雖偷充腹而與死人同患也烏喙毒藥與烏頭附子同本也飢人食之雖充腹而死也喙音許嵗切今燕雖弱小秦王之女婿大王利其十城而常與强秦為仇今使弱燕為雁行而强秦繼推其後是食烏喙之類也漢書曰宣帝許皇后産霍顯使醫𢷬附子入與后后崩淮南子曰天下之物莫凶於奚毒奚毒附子然而良醫槖而藏之有所用者抱朴子曰療聾或以狼毒冶葛或以附子葱涕合内耳或蒸鯉魚腦灌之皆愈范子計然曰附子出蜀武郡中白色者善楚國先賢傳曰孔休傷頰有瘢王莽曰玉屑白附子香消瘢乃以劍璏音滯并香與之荆州記曰宜都郡}
