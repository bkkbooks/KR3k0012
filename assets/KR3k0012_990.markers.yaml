  - {type: variant, offset: 26, length: 71, content: 滿冬山海經曰虋谷之山草多虋冬列仙傳曰赤須子豐人好食天門冬齒落更生神仙傳曰甘始者太原人服天門冬在人間三百餘年博物志曰天門冬莖間有剌而葉滑者曰郄休, SBCK: 烏喙}
  - {type: variant, offset: 26, length: 2, content: 滿冬, WYG: 烏喙一名奚毒一名萴味辛温生川谷主治風中惡洗出汗除寒熱生朗陵吳氏本草曰烏頭一名莨一名千秋一名毒公一名果負一名耿子神農雷公桐君黄帝甘有毒正月始生葉厚莖方中空葉四面相當與蒿相似又曰烏喙神農雷公桐君黄帝有毒李氏小寒十月採形如烏頭有兩枝相合如烏之喙名曰烏喙也所畏惡使與烏頭同一名萴子一名莨神農岐伯有大毒李氏大寒八月採陰乾是附子角之大者畏惡與附子同提毋爾雅曰􅙛莐藩生}
