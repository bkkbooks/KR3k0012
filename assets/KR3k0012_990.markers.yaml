  - {type: variant, offset: 160, length: 3, content: 又內篇, SBCK: 􅀒其家債不時還者子弟便取冶葛一名鉤肳數寸許到債家門食鉤肳而死其家稱怨誣債家殺之債家慙懼以財物辭謝多數十倍死家便収尸去不以爲恨述異記曰晉義熈中有劉遁者居江陵忽有􅀑来遁宅上遁貧無竈以升鎗煑飯飯欲熟輙失之㝷覔於籬下草中但得餘空遁宻市冶􅁑煑以作麋鬼復􅀼之於屋北得鎗仍聞吐聲從此寂絶桓譚新論曰余與劉子駿言飬性無益其兄子伯玉}
  - {type: page-break, offset: 160, content: '', id: KR3k0012_SBCK_990-5a}
  - {type: variant, offset: 160, length: 3, content: 又內篇, krp: 負其家債不時還者子弟便取冶葛一名鉤肳數寸許到債家門食鉤肳而死其家稱怨誣債家殺之債家慙懼以財物辭謝多數十倍死家便収尸去不以爲恨述異記曰晉義熈中有劉遁者居江陵忽有鬼来遁宅上遁貧無竈以升鎗煑飯飯欲熟輙失之㝷覔於籬下草中但得餘空遁宻市冶葛煑以作麋鬼復竊之於屋北得鎗仍聞吐聲從此寂絶桓譚新論曰余與劉子駿言飬性無益其兄子伯玉}
