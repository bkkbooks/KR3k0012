  - {type: variant, offset: 387, length: 773, content: 甘平黃帝桐君雷公甘無毒季氏甘小溫扁鵲無毒生山谷肥地葉如韭肥澤叢生採無時實青黃朮爾雅曰朮山薊本草云朮一名山薊今朮似薊而生山中山海經曰女几之山其草多朮列仙傳曰涓子好餌朮接食其精三百年神仙傳曰陳子皇得餌朮要方服之得仙去霍山其妻姜氏疲病念其婿採朮之法服之病自愈至三百七十歲登山取朮重檐而歸不息不極顏色氣力如二十時抱朴子內篇曰南陽文氏其先祖漢末大亂飢困欲死遇人教之食朮云遂不飢數十年乃來還鄉里顏色更少氣力勝故朮一名山精神藥經曰必欲長生當服山精茯苓廣雅曰茯神茯苓也史記龜策傳曰茯苓在兔絲之下之似飛鳥之形新雨已天清靜無風以夜燒兔絲去之即篝燭此地徐廣曰籍籠也蓋然火而籠罩其去土也篝音溝火滅即記其處明即掘取入地四尺至七尺得矣伏苓者千歲松脂食之不死齊書曰陶弘景永明中上表辭祿許之賜以束帛勑所在月給伏苓五斤白蜜二升以供服餌淮南子曰下有茯苓上有兔絲茯苓千歲松脂也兔終生其上而無根一名女羅也抱朴子內篇曰任子季服茯苓十八年仙人玉女往從之面體如玉澤范子計然曰茯苓出嵩高三輔神異經記曰西北荒有人飲甘露食茯苓典論曰頴川郄儉能辟穀餌茯苓初儉至市茯苓價暴貴數倍典術曰茯苓者松脂入地千歲為茯苓望松樹赤者下有之神仙傳曰秀眉公餌茯苓得仙又曰皇初起以弟初平得道乃棄妻子留就初平共服松柏茯苓至五萬日能坐在立亡行日中無影有童子之色及俱還鄉里親戚死亡略盡乃復俱去臨去以方教南伯遂易姓為赤初起字魯班初平字為松子其後服此藥得仙者數十人列仙傳曰犢子者鄴人也少在黑山上採松子茯苓餌而服之且數百年時牡時老時好時醜時人乃知仙人也廣志曰茯神松汁所作勝茯苓或曰松根茯苓貫著之生朱提濮陽縣博物志曰仙傳云松柏入地中千年化為茯苓茯苓千年化為虎魄一名江珠今太山出茯苓而無虎魄江珠益州永昌郡出虎魄而無茯苓或云蜂燒窠所作未詳二說嵩高山記曰取松柏茯苓二斤醇酒漬之和以白蜜日三服乃通靈名山略記曰鬱州山出茯苓吳氏本草曰茯苓通神桐君甘, SBCK: ''}
