  - {type: variant, offset: 2660, length: 268, content: 採根續斷范子計然曰續斷出三輔廣州記曰鄣平縣出續斷本草經曰續斷一名龍豆味苦微溫生山谷治傷寒補不足金瘡癱傷折跌續筋骨婦人乳難崩中漏血久服益力生常山吳氏本草曰龍芻一名龍多一名龍鬢一名續斷一名龍木一名草毒一名龍華一名懸莬神農季氏小寒雷公黃帝苦無毒扁鵲辛無毒生梁州七月七日採范注萬曰續斷即是馬䔓與水䔓菜相似但大於水䔓耳葉似旁翁菜葉但小厚兩邊有剌剌人其華紫色肉蓯蓉本草經曰肉蓯蓉味甘微溫生山谷治五勞七傷補中除莖中寒熱養五藏強陰益精氣多子婦人癥瘕久服輕身生河西吳氏本草曰肉蓯蓉一名肉蓯蓉神農黃帝鹹雷公酸李氏小溫生河東山陰地長三四寸藂生或代郡鴈門二月八, SBCK: 九}
