  - {type: variant, offset: 6, length: 0, content: '', SBCK: 采之各異大業拾遺記曰汾陽宫所甚出名藥數十種附子天雄並精好堪用本草經曰附子味辛温出山谷治風寒欬逆邪氣寒濕痺癖拘緩不起疼痛温中金瘡生牛犍爲百藥之長吴氏本草曰附子名莨神農辛歧伯雷公甘有毒季氏苦有毒大温或生廣漢八月採皮黒肌白天雄本草曰天雄味辛甘温大温有大毒主大風破積聚邪氣強筋骨輕身徤行長隂氣強志令人武勇力作不倦一名白幕生少室山谷淮南子曰天雄雄雞志氣益取天雄三枚內雄雞腹中搗生食之令人勇烏頭􅀃文曰萴阻力切烏頭也}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_SBCK_990-2b}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 采之各異大業拾遺記曰汾陽宮所出名藥數十種附子天雄並精好堪用本草經曰附子味辛温出山谷治風寒欬逆邪氣寒熱痺癖拘攣不起疼痛温中金瘡生平殆為百藥之長吳氏本草曰附子名莨神農辛岐伯雷公甘有毒李氏苦有毒大温或生廣漢八月採皮黒肌白天雄本草曰天雄味辛甘温有大毒主大風破積聚邪氣强筋骨輕身健行長陰氣强志令人武勇力作不倦一名白幕生少室山谷淮南子曰天雄雄雞志氣益天雄二枚納雄雞腹中搗生食之令人勇烏頭説文曰萴阻力切烏頭也}
