  - {type: variant, offset: 3041, length: 261, content: 山谷治傷中虛羸補中益氣力長肌肉除邪氣寒熱久服輕身耳目聰明不飢延年山嵩高吳氏本草曰署豫一名諸署秦楚名王延齊越名山羊鄭趙名山羊一名玉延一名脩脆一名兒草神農甘小溫桐君雷公甘無毒或生臨朐踵山始生赤莖細蔓五月華白七月實青黃八月熟落根中白皮黃類芋二月三月八月採根惡甘遂曹毗杜蘭香傳曰蘭香降張碩與三署預實曰食此可以辟霧露碩食二懷一欲以歸香曰可自食不得持去異苑曰署預一名山羊根既入藥又復可食若掘取默默則獲唱名者不可得地黃爾雅曰芐音戶地黃郭璞注曰一名地髓江東呼芐也抱朴子曰楚文子服地黃八年視有光手上車弩本草經曰地黃一名地髓治傷中長肌肉生咸陽, SBCK: 宛句太平御覽卷第九百九十}
