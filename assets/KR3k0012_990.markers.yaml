  - {type: variant, offset: 158, length: 1, content: 百, SBCK: 蠱生􅀇山亦生宛句吴氏本草曰貫衆一名貫來一名貫中一名渠母一名貫鍾一名伯芹一名藥藻一名扁符一名黄鍾神農歧伯苦有毒桐君扁鵲苦一經甘有毒黄帝鹹酸一苦無毒葉青黄兩兩相對莖黒毛聚生冬夏不死四月華白七月實黒聚相連卷旁行生三月八月採根五月採葉冶葛周易叅同契曰冶葛巴豆一兩入喉雖周文兆著孔丘占相扁鵲操鍼巫咸叩鼓安能􅂫之唐書曰􅀽恕巳與敬暉等累􅀍貶黜流于環州尋周利用左右逼令飲野葛汁數升不死因擊殺之恕巳素服黄金故毒藥不發愽物志曰魏武習啖冶葛至一尺亦多飲酖近丗事相傳云又曰鉤吻草與堇菜相似南州異物志曰廣州俚賊􅀂郷}
