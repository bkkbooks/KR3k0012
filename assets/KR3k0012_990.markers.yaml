  - {type: variant, offset: 1538, length: 1764, content: 斛乾之則可得五六升服之十年乃可得益列仙傳曰脩羊公魏人也止華陰山石室中中有懸石塌臥其上塌盡穿陷略不食時取黃精服之神仙傳曰王烈字長能邯鄲人也常服黃精又曰白莬公服黃精而得仙永嘉記曰黃精出松陽永寧縣遊名山志曰名室藥多黃精博物志曰黃帝問天姥曰天地所生豈有食之令人不死者乎姥曰太陽草名黃精餌食之可以長生胡麻廣雅曰狗蝨鉅勝藤苰胡麻也孝經援神契曰鉅勝延年宋均注曰世以鉅勝為狗杞子晉書安帝紀曰殷仲堪在荊州以胡麻為廩廣志曰胡麻一名方莖服之不老風濕其葉名青襄也淮南子曰汾水濛濁而宜胡麻列仙傳曰關令尹喜與老子俱之流沙西服鉅勝實莫知所終魯女生別傳曰女生長樂人也少好道初服餌胡麻及朮絕穀八十餘年更少壯色如桃華一日能行三百里走及麞鹿抱朴子曰胡麻好者一石蒸之如炊須暴乾復蒸丸和細篩白蜜丸如雞子日二枚一年面色美身體滑二年白髮黑三年齒落更生四年入水不濡五年入火不燋六年走及奔馬或蜜水和作餅如糖狀炙食一餅抱朴子內篇曰胡麻服餌不老耐風濕吳氏本草曰胡麻一名方金一名狗蝨神農雷公甘平無毒立秋採青襄一名蔓神農苦雷公甘本草經曰胡麻一名巨勝味甘平生川澤治傷中虛羸補五藏益氣久服輕身不老生上黨崔寔四民月令曰二月可種胡麻謂之上時也當歸爾雅曰薜山靳廣雅曰山芹當歸今似芹而麤大靳音巨申切吳志曰曹公聞太史慈名遺書以篋封之發看無所道但貯當歸魏氏春秋同異曰姜維得母書并當歸維曰良田百頃不在一畝但有遠志不見當歸其皆親殉利如此范子計然曰當歸出隴西無枯者善秦州記曰隴西襄武縣有牛山是出當歸建康記曰建康出當歸不堪用廣州記曰鄣平縣出當歸博物志曰神農經曰下藥治病謂大黃除實當歸止痛崔豹古今注曰牛亨問將離別相贈以芍藥何也荅曰芍藥一名何離故將別贈以芍藥猶相招則贈以䕷蕪䕷蕪一名當歸也本草經曰當歸一名干歸味甘溫生川谷主治逆止氣溫瘧寒熱生隴西吳氏本草曰當歸神農黃帝桐君扁鵲甘無毒歧伯雷公辛無毒季氏小溫或生羗胡地遠志爾雅云葽鳥了切繞蕀莬今遠志也似麻黃赤華葉說而黃其上謂之小草蕀菟音棘冤抱朴子內篇曰陵陽仲服遠志二十年有子三十七人坐在立亡世說曰謝太傅始有東山之志後命屬不獲已始就桓公司馬于時人有致桓公藥草者中有遠志公取以問謝此藥又名小草何以物有二稱謝未即荅爾時郝隆在坐謝因曰郝參軍多知識試復通看郝應聲曰荅此甚易解處則為遠志出則為小草於是謝公殊有愧色桓目謝而笑曰郝參軍此通乃不惡亦甚有會本草經曰遠志一名棘宛一名要繞久服輕身不忘葉名小草生太山及宛句細辛山海經曰浮戲之山東有虵谷上多少辛管子曰五沃之土群藥生少辛范子計然曰細辛出華陰色白者善名山志曰松陽諸山草多細辛永嘉記曰細辛出松陽本草經曰細辛一名少辛味溫生山谷治欬逆明目通利九竅久服輕身生華陰吳氏本草曰細辛一名小辛一名細辛神農黃帝雷公相君辛小溫歧伯無毒季氏小寒如葵葉赤色一根一葉相連二月八月採根續斷范子計然曰續斷出三輔廣州記曰鄣平縣出續斷本草經曰續斷一名龍豆味苦微溫生山谷治傷寒補不足金瘡癱傷折跌續筋骨婦人乳難崩中漏血久服益力生常山吳氏本草曰龍芻一名龍多一名龍鬢一名續斷一名龍木一名草毒一名龍華一名懸莬神農季氏小寒雷公黃帝苦無毒扁鵲辛無毒生梁州七月七日採范注萬曰續斷即是馬䔓與水䔓菜相似但大於水䔓耳葉似旁翁菜葉但小厚兩邊有剌剌人其華紫色肉蓯蓉本草經曰肉蓯蓉味甘微溫生山谷治五勞七傷補中除莖中寒熱養五藏強陰益精氣多子婦人癥瘕久服輕身生河西吳氏本草曰肉蓯蓉一名肉蓯蓉神農黃帝鹹雷公酸李氏小溫生河東山陰地長三四寸藂生或代郡鴈門二月八月採陰乾用之藷藇山海經曰升山草多藷藇上藷署二音下余預二音湘中記曰永和初有採藥衡山者道迷糧盡過巖下見一老公與四五年少對坐執書告以飢與之食物如署豫指教所去五六月至家而不腹飢范子計然曰儲餘本出三輔白色者善本草經曰署豫一名山芋味甘溫生山谷治傷中虛羸補中益氣力長肌肉除邪氣寒熱久服輕身耳目聰明不飢延年山嵩高吳氏本草曰署豫一名諸署秦楚名王延齊越名山羊鄭趙名山羊一名玉延一名脩脆一名兒草神農甘小溫桐君雷公甘無毒或生臨朐踵山始生赤莖細蔓五月華白七月實青黃八月熟落根中白皮黃類芋二月三月八月採根惡甘遂曹毗杜蘭香傳曰蘭香降張碩與三署預實曰食此可以辟霧露碩食二懷一欲以歸香曰可自食不得持去異苑曰署預一名山羊根既入藥又復可食若掘取默默則獲唱名者不可得地黃爾雅曰芐音戶地黃郭璞注曰一名地髓江東呼芐也抱朴子曰楚文子服地黃八年視有光手上車弩本草經曰地黃一名地髓治傷中長肌肉生咸陽, WYG: ''}
