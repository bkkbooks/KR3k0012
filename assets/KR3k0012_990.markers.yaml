  - {type: variant, offset: 21, length: 3, content: 門冬也, SBCK: 呼爲堇梁兾傳曰兾迫殺大家母宣頭服丸而死後魏書曰匈奴秋収烏頭爲毒藥以射禽獸范子計然曰烏頭出三輔中白者善崔寔四民月令曰三月可採烏頭本草經曰烏頭}
  - {type: variant, offset: 21, length: 3, content: 門冬也, WYG: 呼為蓳漢書曰梁冀廹殺大家服烏頭丸而死後魏書曰匈奴秋收烏頭為毒藥以射禽獸范子計然曰烏頭出三輔中白者善崔寔四民月令曰三月可採烏頭本草經曰烏頭}
