  - {type: variant, offset: 291, length: 0, content: '', SBCK: 無毒歧伯鹹李氏小雷公酸二月三月生澤蘭廣雅曰虎蘭澤蘭也建康記曰建康岀澤蘭本草經曰澤蘭一名虎蘭一名龍來味微温無毒生池澤治乳婦衂血生汝南又生大澤旁吴氏本草曰澤蘭一名水香神農黄帝歧伯桐君酸無毒季氏温生下地水旁葉如蘭二月生香赤節四葉相值支節間三月三日採萆薢􅀶物志曰菝蒲八切與萆薢相亂名狗脊吴氏本草曰萆薢一名百枝狗脊廣雅曰薜挈枸脊也本草經曰狗脊一名百丈味苦}
