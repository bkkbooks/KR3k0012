  - {type: variant, offset: 1833, length: 314, content: 百里走及麞鹿抱朴子曰胡麻好者一石蒸之如炊須暴乾復蒸丸和細篩白蜜丸如雞子日二枚一年面色美身體滑二年白髮黑三年齒落更生四年入水不濡五年入火不燋六年走及奔馬或蜜水和作餅如糖狀炙食一餅抱朴子內篇曰胡麻服餌不老耐風濕吳氏本草曰胡麻一名方金一名狗蝨神農雷公甘平無毒立秋採青襄一名蔓神農苦雷公甘本草經曰胡麻一名巨勝味甘平生川澤治傷中虛羸補五藏益氣久服輕身不老生上黨崔寔四民月令曰二月可種胡麻謂之上時也當歸爾雅曰薜山靳廣雅曰山芹當歸今似芹而麤大靳音巨申切吳志曰曹公聞太史慈名遺書以篋封之發看無所道但貯當歸魏氏春秋同異曰姜維得母書并當歸維曰良田百頃不在一畝但有遠志不見當歸其皆親殉利如此范子計然曰當歸出隴西無枯者善秦州記曰隴西襄武縣有牛山是出當歸, SBCK: 株}
