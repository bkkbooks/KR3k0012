  - {type: variant, offset: 32, length: 1, content: 虋, WYG: 五味一名會及吳氏本草曰五味一名𤣥及典術曰五味者五行之精其子有五味淮南公羨門子服五味十六年入水不濡入火不燋日行萬里雷丸范子計然曰雷丸出漢中色白者善本草經曰雷公丸一名雷矢味苦寒生山}
