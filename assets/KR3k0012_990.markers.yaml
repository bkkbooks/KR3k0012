  - {type: variant, offset: 164, length: 3, content: 天門冬, WYG: 鉤吻一名野葛味辛温生山谷主治金瘡中惡風欬逆生氣外腫殺毒蠱疰吳氏本草曰秦鉤吻一名毒根一名野葛神農辛雷公有毒殺人生南越山}
  - {type: variant, offset: 165, length: 2, content: 門冬, SBCK: 生殺人藥必有生人藥也余曰鉤吻不與人相冝故食則死非爲殺人生也譬􅀂巴豆毒魚礜石賊䑕桂害􅆩杏核殺狗天非故爲作也論衡曰萬物含太陽者有毒在草爲巴豆冶􅁑抱朴子曰中經曰鉤吻狼毒太隂之精氣主殺故入口令人死葛洪方曰鉤吻與食芹相似而生處無他草其莖有毛誤食之殺人本草經曰鉤吻一名野葛味辛温生山谷主治金瘡中惡風欬逆上氣水腫殺蠱毒􅀑注吴氏本草曰􅁗鉤吻一名毒根一名野􅁑神農辛雷公有毒殺人生南越山}
