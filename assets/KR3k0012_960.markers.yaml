  - {type: variant, offset: 3037, length: 1, content: 山, WYG: 綿出葉耳子内有綿甚白蠶成熟則南人以為緼絮絡葵博物志曰人食絡葵為狗囓則瘡不或致死蔊字林曰蔊辛菜也荶字林曰荶菜似蒜生水}
