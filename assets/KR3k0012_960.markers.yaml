  - {type: variant, offset: 3027, length: 0, content: '', SBCK: 廣州有木名古度不華而實裴淵廣州記曰古度葉如栗無華枝柯皮中生子子似櫨而酢煑以爲粽數日不煑化作飛蟻吴都賦曰松梓古度柜爾雅曰援柜柳郭璞曰拒似柳皮可煑作飲也貝多唐書曰貞觀中隋婆登國遣使朝献其國在林邑南海行二月東與訶陵西與迷􅀺車接北鄰大海風俗與訶陵同種稻毎月一熟亦有文字書之貝多葉杜寳大業拾遺録曰洛陽翊津橋通翻經道􅂣東街其道場有婆羅門僧及身毒僧十餘人新翻諸經其所翻經本從外國來用貝多樹葉書書即今胡書體貝多葉長一尺五六寸闊五寸許葉形似琵琶而厚大横作行書隨經多少縫綴其一邊怗怗然顧徽廣州記曰貝多似枇杷而有光澤耀日枝柯去地四五丈作懸根生地便大如夲株形一樹亦可有數十根如本形花白子不中食種於精舎浮圖前嵩髙山記曰嵩髙寺中有思惟樹即貝多也如來坐貝多下思惟因以爲名焉魏王花木志曰思惟樹漢時有道人自西域持貝多子植於嵩之西峯下後極髙大有四樹樹一年三花射干孫卿子曰西方有木名射干莖長四寸生於髙山之崖臨百仞之淵木非長也所立髙也君子居必擇郷遊必就士楚辭曰掘荃蕙與射干􅀆芸藜藿與蘘荷時好孫綽子曰北阜有木焉名曰時好摩厨異物志曰木有摩厨生于斯調摩厨木名也生於斯調州厥汁肥潤其澤如膏馨香馥郁可以煎熬如脂膏可以煎熬食物也彼州之民仰爲嘉肴花木志曰煎熬食物香美如華夏之人用油榕異物志曰榕樹栖栖長與少殊少時縁木後乃成樹故爲殊也髙出林表廣䕃原丘孰知􅀄生葛虆之儔魏王花木志曰榕木􅀄生少時縁縛他樹如外方扶芳藤形不能自立根本縁繞他木傍作連結有如羅網相絡然後木理連合欎茂扶踈髙六七丈嶺表録異曰榕樹桂廣容南府郭之内多栽此樹葉如冬青秋冬不凋枝條旣繁葉又蒙細而根􅂡繚繞枝榦屈盤上生嫰條如藤垂下漸漸及地藤梢入土便生根節或一大榕樹三五處有根者又横枝着鄰樹則連理南人以爲常不爲之瑞木夫漏徐􅂨南方記曰夫漏樹野生三月華五六月成子如术有煑着猪肉雞鴨羮中好可食亦中􅐭藏都桶徐􅂨南方記曰都桶樹二月花仍連實七月熟如􅆑魏王花木志曰南方草物狀都桶樹野生二月花色仍連着實八九月熟子如鴨􅆑民取食之其皮核滋味酢出九眞交趾都咸徐􅂨南方記曰都咸樹子大如指取子及樹皮曝乾作飲芳香千歳􅀽山松冝都山川記曰佷山有異木人無見其朽者其名曰千歳葉似􅀥色似桑冬夏青貞強少節目慎火南越志曰廣州有大樹可以御火山北謂之慎火或謂戎火多種屋上以防火勝火伏琛齊地記曰東}
