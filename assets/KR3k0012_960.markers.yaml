  - {type: variant, offset: 877, length: 0, content: '', SBCK: 部中水出即活辛夷本草經曰辛夷一名辛引一名侯桃一名房木神農夲草曰辛夷生漢中魏興凉州川谷中其樹似杜仲樹髙一丈餘子似冬桃而小楚辭曰飲菌􅀂之朝露􅀆構桂木而爲室所飲食㓗清所處芬香雜橘柚以爲囿􅀆列辛夷與椒楨又曰乗赤豹􅀆從文貍辛夷車􅀆結桂旗茱茰洞林曰郭璞避難至新息}
