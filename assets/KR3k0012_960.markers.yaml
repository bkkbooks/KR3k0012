  - {type: variant, offset: 2136, length: 1, content: 見, krp: 中賜臣帛乃覆樹上寄生朔曰寠藪也舎人曰朔果不中朔曰生肉爲膾乾肉爲脯着樹爲寄生盆下爲寠藪上令榜舎人合歡古今注曰欲蠲人以憂則贈以丹棘丹棘一名忘憂欲蠲人之忿則贈以青裳青裳一名合歡能忘忿枝葉繁弱牙相交結毎一風來輙自相解不相牽綴嵇康種之舎前本草經曰合歡味甜平生川谷安五臟和心氣令人歡樂無憂乆服輕身明目生益州仲長統昌言曰漢安帝時有異物生長樂宫東廡柏樹永巷南閨合歡樹議}
