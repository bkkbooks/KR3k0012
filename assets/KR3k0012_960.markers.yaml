  - {type: variant, offset: 165, length: 181, content: 之野靈壽實華樗爾雅曰栲山樗栲似樗色小白生山中亦類漆滲樹毛詩我行其野曰我行其野蔽芾其樗惡木也陸機毛詩䟽義曰蔽芾其樗樗樹及皮皆似漆青色其葉臭莊子曰惠子曰吾有大樹人謂之樗其本擁腫不中繩墨小枝拳曲不中規矩立之途匠者不顧今子之言大而無用眾所同去莊子曰何不樹於無何有之鄉廣莫之野逍遙乎寢臥其下風俗通曰嘉平中有兩樗一宿長丈餘作人狀頭目宛然河洛記曰洛陽北山謂之邙山其上無大樹大業, SBCK: 桶}
