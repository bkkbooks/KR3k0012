  - {type: variant, offset: 2614, length: 1, content: 支, SBCK: 章􅚴皆爲三四五圍鄧德明南康記曰南康縣瞢音忘鄧切永極源去郡並九百地多章􅚴樹桄榔蜀志曰興古南漢縣有桄榔樹峯頭生葉有麵大者収麵乃至百斛華陽國志同吴録曰交趾南海縣出桄榔中有米屑爲麵臨海異物志曰桄榔木外皮有毛似栟櫚而散生作䋏音昨綆漬之不腐其木剛作鈠釤鋤利如鐵中石更利唯中焦榔致敗耳皮中有似擣稻米又似麥麵中作麵餌廣志曰桄榔樹大四五圍長五六丈洪直旁無枝條其㒹生葉似㨑葉斫其木肥堅難傷入數寸得麵愽物志曰蜀中有樹名桄榔皮裏出屑如麵用作餅食之謂之桄榔麵魏王花木志曰桄榔出興古國者樹髙七八丈其大者一樹出麵百斛交趾又有樹其皮有光屑取之乾擣以水淋之如麵可作餅餌嶺表録異曰桄榔樹枝葉並蕃茂與􅀥㯽榔等樹小異然葉下有􅂡如麄馬尾廣人採之以織巾}
  - {type: page-break, offset: 2614, content: '', id: KR3k0012_SBCK_960-5a}
  - {type: variant, offset: 2614, length: 6, content: 支子也本草經, WYG: 章􅚴皆為三四五圍鄧徳明南康記}
  - {type: variant, offset: 2614, length: 1, content: 支, krp: 章枕皆爲三四五圍鄧德明南康記曰南康縣瞢音忘鄧切永極源去郡並九百地多章枕樹桄榔蜀志曰興古南漢縣有桄榔樹峯頭生葉有麵大者収麵乃至百斛華陽國志同吴録曰交趾南海縣出桄榔中有米屑爲麵臨海異物志曰桄榔木外皮有毛似栟櫚而散生作䋏音昨綆漬之不腐其木剛作鈠釤鋤利如鐵中石更利唯中焦榔致敗耳皮中有似擣稻米又似麥麵中作麵餌廣志曰桄榔樹大四五圍長五六丈洪直旁無枝條其㒹生葉似㨑葉斫其木肥堅難傷入數寸得麵愽物志曰蜀中有樹名桄榔皮裏出屑如麵用作餅食之謂之桄榔麵魏王花木志曰桄榔出興古國者樹髙七八丈其大者一樹出麵百斛交趾又有樹其皮有光屑取之乾擣以水淋之如麵可作餅餌嶺表録異曰桄榔樹枝葉並蕃茂與棗㯽榔等樹小異然葉下有鬚如麄馬尾廣人採之以織巾}
  - {type: variant, offset: 2616, length: 3, content: 也本草, SBCK: 其鬢尤冝鹹水浸漬即麄脹而肕故人以此縛舶不用釘線木性如竹紫黒色有文理而堅工人解之以制愽弈局此樹皮中有屑如麵可爲餅食之水}
  - {type: page-break, offset: 2616, content: '', id: KR3k0012_SBCK_960-5b}
