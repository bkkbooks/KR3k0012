  - {type: variant, offset: 2626, length: 78, content: 丹葉兩頭尖如樗蒲形剝其子如蠒而黃赤葛洪治霍亂轉筋方曰燒支子二枚末服之立愈無患纂文曰無患木名也一名曰糅女枚反婁實可去垢崔豹古今注曰程雅問櫨木名曰無患何也荅曰昔, WYG: 外皮}
