  - {type: variant, offset: 2, length: 103, content: 八楛尚書禹貢曰荊州厥貢惟菌簵楛注曰楛中矢幹皆出雲夢之澤也毛詩旱麓曰瞻彼旱麓山足也榛楛濟濟陸機毛詩䟽義曰榛楛似荊而赤葉似著上黨人篾以為牛筥箱器又屈以為釵故上黨調問婦人欲買赭不曰鼃中自有黃土買釵不曰山中自有楛又, SBCK: 九皂莢辛夷茱茰榖蔦合歡白銀枕音桄榔欀莎木木綿杬魄樕樸檴杔欒}
