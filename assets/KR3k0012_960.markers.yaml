  - {type: variant, offset: 3036, length: 2, content: 生山, SBCK: 方俗音曰挺子其木經野火燒炭不滅故東方朔謂爲不灰之木左思齊都賦曰勝火之木衝水之草播栘音泥林邑記曰播栘樹柯節發根下垂虚}
  - {type: variant, offset: 3036, length: 0, content: '', WYG: 綿呉録地理志曰交阯定安縣有木緜樹高大實如酒杯中有綿如絲之綿又可作布名曰緤一名毛布廣州記曰枝似桐枝葉似胡桃而稍大出交廣二州羅浮山記曰木綿正月則花大如芙蓉花落結子方}
