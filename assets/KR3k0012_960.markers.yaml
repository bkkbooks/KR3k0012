  - {type: variant, offset: 2136, length: 1, content: 見, SBCK: 中賜臣帛乃覆樹上􅀉生朔曰寠藪也舎人曰朔果不中朔曰生肉爲膾乾肉爲脯着樹爲􅀉生盆下爲寠藪上令榜舎人合歡古今注曰欲蠲人以憂則贈以丹􅁄丹􅁄一名忘憂欲蠲人之忿則贈以青裳青裳一名合歡能忘忿枝葉繁弱牙相交結毎一風來輙自相解不相牽綴嵇康種之舎前本草經曰合歡味甜平生川谷安五臟和心氣令人歡樂無憂乆服輕身明目生益州仲長統昌言曰漢安帝時有異物生長樂宫東廡柏樹永巷南閨合歡樹議}
  - {type: page-break, offset: 2136, content: '', id: KR3k0012_SBCK_960-4a}
  - {type: variant, offset: 2136, length: 1, content: 見, WYG: 中賜臣帛乃覆樹上寄生朔曰蔞藪也舍人曰朔果不中朔曰生肉為膾乾肉為脯着肉為寄生盆下為蔞藪上令榜舍人合歡古今注曰欲蠲人之憂則贈以丹棘丹棘一名忘憂欲蠲人之忿則贈以青棠青棠一名合歡能忘忿枝葉繁弱枝相交結每一風來輙自相解不相牽綴嵇康種之舍前本草經曰合歡味甘平生川谷安五臟和心氣令人歡樂無憂又曰服之輕身明目出益州仲長統昌言曰漢安帝時有異物生長樂宫東廡栢樹永巷南閨合歡樹議}
