  - {type: variant, offset: 2621, length: 2, content: 支子, SBCK: 漢興縣溪中多生卬竹桄榔樹樹出緜而夷人資以自給欀音湘吴録地理志曰交趾望縣有欀木其皮中有如白米屑者乾之水淋之似麵可作餅郡内皆有之左思吴都賦曰文欀貞橿莎木蜀志曰莎樹大四五圍長五六丈峯頭生葉出麵一樹出一石正白而味似桄榔南中八郡志曰莎樹大四五圍長十餘丈樹皮能出麵大者百斛色黃鳩民部落而就食之廣志曰莎樹多枝葉葉兩邊行列􅀂飛鳥翼其麵色白樹収麵不過一斛擣篩乃如麵不則如磨屑爲飯滑軟木緜吴録地理志曰交趾定安緜有木緜樹髙大實如酒杯中有緜如蚕之緜又可作布名曰緤}
  - {type: page-break, offset: 2621, content: '', id: KR3k0012_SBCK_960-6a}
  - {type: variant, offset: 2621, length: 4, content: 支子一名, WYG: 南康縣瞢忘鄧切水極源去郡並九百地多章􅚴樹桄榔蜀志曰興吉南漢縣桄榔樹峰頭生葉有麺大者收麺乃至百斛華陽國志同呉録曰交趾南海縣出桄榔中有米屑為麺臨海異物志曰桄榔}
