  - {type: variant, offset: 3032, length: 0, content: '', WYG: 有欀樹其皮中有如白米屑者乾𢷬水淋之似麵可作餅郡内皆有之左思呉都賦曰文欀貞橿莎木蜀志曰莎木大四五圍長六七丈樹顛生葉出麵一樹出一石正白而味似桄榔南中八郡志曰莎樹大四五圍長十餘丈樹皮能出麵大者百斛色黄鳩民部落而就食之廣志曰莎樹}
