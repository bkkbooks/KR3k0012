  - {type: variant, offset: 1037, length: 786, content: 業拾遺錄曰五年南方置北景林邑海陰三郡北景在林邑南大海中與海陰接境其地東西一千餘里南北三百餘里海水四絕北去大岸三百餘里或云馬援鑄柱尚存地暑熱多大林木高者數百尋有金荊生於高山峻阜大者十圍盤屈瘤蹙文如美錦色艷於真金中夏時有於海際得之工人數用甚精妙貴於沉檀棘毛詩湛露曰湛湛露斯在彼杞棘又黃鳥曰交交黃鳥止于棘又墓門曰墓門有棘斧以斯之周書曰太姒夢見商之庭產棘周禮秋官上曰朝士掌建邦外朝之法左九棘孤卿大夫位焉右九棘公侯伯子男位焉鄭玄曰樹棘以為位者取其赤心而外刺象以赤心三剌也左傳昭公曰豎牛奔齊孟仲之子殺之投其首於寧風之棘上春秋元命苞曰樹棘聽訟其下者棘赤心有剌言治人者原心不失其赤實也後漢書曰馮異朝京師引見帝謂公卿曰是我起兵時主簿也為吾披荊棘定關中又曰仇覽字季智一名香陳留考城人也時考城令河內王渙政尚嚴猛聞覽以德化人署為主簿後渙謝遣曰枳棘非鸞鳳所棲百里豈人賢之路今日太學曳長裾飛名譽皆主簿後耳以一月俸為資勉卒景行晉書曰劉琨至并州荊棘成林豺狼滿道琨剪除荊棘收葬枯骸造府朝建市獄寇盜時來掩襲嘗以城門為戰場百姓負楯以耕屬鞬而耨琨撫循勞來甚得物情又曰祖逖在河南公私豐贍士馬日滋方當推鋒越河掃清冀朔會朝廷將遣戴若思為都督逖以若思是吳人雖有才望無弘致遠識且已剪荊棘收河南地而若思雍容一旦來統之意甚怏怏又曰石季龍大饗群臣於太武殿佛圖澄曰殿乎殿乎棘子成林將壞人衣龍殿石有棘生冉閔小字棘奴時龍養為己子又曰崔洪靖厲骨鯁為尚書左丞時人為之語曰叢生棘剌來自博陵在南為鷂在北為鷹又曰顧愷之畫鄰女象以棘針釘之又曰姚萇符登師於渥源盡俘其眾乃掘符堅屍鞭撻薦之以棘坎土而埋之宋書曰袁淑上太祖書曰所謂棲鳥於烈火之上養魚於叢棘之中北齊書曰世祖為後主擇師傅趙彥深進馬敬德入為侍講其妻夢猛獸將來向之敬德走超叢棘妻伏地不敢動敬德占之曰吾當得大官超棘過九卿也爾伏地夫人也隋書曰流求國居海島之中土人所居曰波羅檀洞壍柵三重環以流水樹棘為藩, SBCK: ''}
