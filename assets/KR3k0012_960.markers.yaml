  - {type: variant, offset: 1860, length: 270, content: 主無十日不燕今王不能久齊故以三月為期也棘剌至小安可削乎王必察之王囚而問之果無有乃殺之冶人謂王曰士有虛名多棘剌之說也呂氏春秋曰棗棘之有也裘狐之有也食棘之棗裘狐之皮先王固用非其有而已有之湯武一日而盡有夏商之地秦子曰踰枳棘之籬則有絓枉之患登椒桂之圃則有榮華之芳陳留耆舊傳曰魏尚被繫詔獄有雀集獄棘上尚占曰夫棘樹者中心赤外有剌象我言有剌而赤心之至誠李嘗藥錄曰棘實是棗針世人用門冬苗代之非其真也廣五行記曰隋文帝開皇末年代州人姓王仕為驃騎將軍性好畋獵所殺無數有五男無女後有一女子端正若畫見者皆奇之父母特加鍾愛鄉里爭為作好衣而與之女年七歲一旦失之初疑鄰里戲, SBCK: 鹽}
