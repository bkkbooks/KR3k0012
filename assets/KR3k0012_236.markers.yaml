  - {type: variant, offset: 1798, length: 2, content: 太史, SBCK: 公儀休者魯􅀶士也爲魯相無所變更百官自正使食禄者不得與下民爭利論衡曰王莽之時省五經章句博士弟子郭略夜定舊說死於燭下少府􅁥六典曰少府􅁥之職掌百工􅇊巧之政}
  - {type: variant, offset: 1798, length: 7, content: 太史令取善紀述, WYG: 公儀休}
