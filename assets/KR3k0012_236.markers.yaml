  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書太平御覽卷二百三十六宋李昉等撰}
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_236-1a, image: WYG0895/WYG0895-0167c.png}
  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第二百三十六}
  body:
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 四國子􅀕酒司業􅀶士少府監將作監􅀦子􅀕酒六典曰國子􅀕酒司業之職掌􅀖􅀦儒學訓導政令有六焉一曰國子二曰大學}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 四國子祭酒司業博士少府監将作監國子祭酒六典曰國子祭酒司業之職掌邦國儒學訓導政令有六焉一曰國子二曰太學}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_236-1b, image: WYG0895/WYG0895-0167d.png}
  - {type: variant, offset: 5, length: 0, content: '', krp: 四國子祭酒司業博士少府監將作監國子祭酒六典曰國子祭酒司業之職掌邦國儒學訓導政令有六焉一曰國子二曰大學}
  - {type: xml-element, offset: 6, content: '', id: KR3k0012_CHANT_236-bkkxmlele1}
  - {type: 'tls:seg', offset: 6, content: '', id: KR3k0012_CHANT_236-1a.1}
  - {type: 'tls:seg', offset: 6, content: '', id: KR3k0012_CHANT_236-1a.2}
  - {type: variant, offset: 6, length: 0, content: '', SBCK: 曰四門四曰律學五曰書學六曰筭學韋昭辯釋名曰􅀕酒者謂􅀕六神以酒醊之也辨云凢㑹同饗讌必尊長先用酒以􅀕先故曰􅀕酒漢時呉王年長以爲劉氏􅀕酒是也徐廣釋􅀕酒云古主人具饌則賔中長者一人舉酒􅀕地是則長者爲􅀕酒也漢書自呉王賜號爲劉氏􅀕酒應劭曰禮飲酒必􅀕示有先也故稱􅀕酒飲時唯尊長者以酒沃酹也又曰張安丗薦蘇武明習故事奉使不辱君命宣帝以武壯節老臣令朝朔望號稱􅀕酒甚優寵之續漢書百官表曰建武􅀄置五經􅀶士}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_SBCK_236-1b}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 曰四門四曰律學五曰書學六曰算學韋昭辯釋名曰祭酒者謂祭六神以酒醊之也辯云凡會同饗讌必尊長先用先用必以酒祭先故曰祭酒漢時吳王年長以為劉氏祭酒是也徐廣釋祭酒云古主人具饌則賔中長者一人舉酒祭地是則長者為祭酒也漢書曰吳王賜號為劉氏祭酒應劭曰禮飲酒必祭示有先也故稱祭酒飲時唯尊長者以酒沃酹也又曰張安世薦蘇武明習故事奉使不辱命宣帝以武壯節老臣令朝朔朢號稱祭酒甚優寵之續漢書百官表曰建武初置五經博士}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_WYG_236-2a, image: WYG0895/WYG0895-0168a.png}
  - {type: variant, offset: 6, length: 0, content: '', krp: 曰四門四曰律學五曰書學六曰筭學韋昭辯釋名曰祭酒者謂祭六神以酒醊之也辨云凢㑹同饗讌必尊長先用酒以祭先故曰祭酒漢時呉王年長以爲劉氏祭酒是也徐廣釋祭酒云古主人具饌則賔中長者一人舉酒祭地是則長者爲祭酒也漢書自呉王賜號爲劉氏祭酒應劭曰禮飲酒必祭示有先也故稱祭酒飲時唯尊長者以酒沃酹也又曰張安丗薦蘇武明習故事奉使不辱君命宣帝以武壯節老臣令朝朔望號稱祭酒甚優寵之續漢書百官表曰建武𥘉置五經博士}
  - {type: variant, offset: 7, length: 1, content: 史, SBCK: 常差次有聦明威重者一人爲􅀕酒揔領綱紀漢書百官表注􅀶士􅀕酒一人掌􅀦子學毎朝服進賢兩梁冠佩水蒼玉蜀志曰先主旣定益州廣漢太守夏纂請秦宓爲師友􅀕酒晉書曰􅀽瓌字山甫爲􅀦子􅀕酒時屬經喪亂禮教陵遲瓌上䟽求立學徒帝從之國學之興自瓌始也又曰裴頠爲􅀕酒奏立太學講堂築門闕刻石冩五經晉中興書曰杜夷字行齊以儒學稱中宗以夷爲丞相􅀕酒中興􅀄皇太子凢三至夷舎執經問義沈約宋書曰􅀶士秦官也掌通古今貟多至數十人有僕射光武増爲十五人盖一經有數家之學故也皆教弟子光武改僕射曰􅀕酒􅀕酒者一位之元長也齊書曰張緒竟陵王子良領國子􅀕酒武帝勑王晏曰吾欲}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_SBCK_236-2a}
  - {type: variant, offset: 7, length: 1, content: 史, WYG: 常差次有聰明威重者一人為祭酒總領綱紀漢書百官表注曰博士祭酒一人掌國子學早朝服進賢兩梁冠佩水蒼玉蜀志曰先主既定益州廣漢太守夏侯纂請秦宓為師友祭酒晉書曰袁瓌字山甫為國子祭酒時屬經喪亂禮教陵遲瓌上䟽求立學徒帝從之國學之興自瓌始也又曰裴頠為祭酒奏立太學講堂築門闕刻石寫五經晉中興書曰杜夷字行齊以儒學稱中宗以夷為丞相祭酒中興初皇太子凡三至夷舍執經問義沈約宋書曰博士秦官也掌通古今員多至數十人有僕射光武增為十五人並益一經有數家之學故也皆教弟子光武改僕射曰祭酒祭酒者一位之元長也齊書曰張緒竟陵王子良領國子祭酒武帝勑王晏曰吾欲}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_WYG_236-2b, image: WYG0895/WYG0895-0168b.png}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_WYG_236-3a, image: WYG0895/WYG0895-0168c.png}
  - {type: variant, offset: 7, length: 1, content: 史, krp: 常差次有聦明威重者一人爲祭酒揔領綱紀漢書百官表注博士祭酒一人掌國子學毎朝服進賢兩梁冠佩水蒼玉蜀志曰先主旣定益州廣漢太守夏纂請秦宓爲師友祭酒晉書曰袁瓌字山甫爲國子祭酒時屬經喪亂禮教陵遲瓌上䟽求立學徒帝從之國學之興自瓌始也又曰裴頠爲祭酒奏立太學講堂築門闕刻石冩五經晉中興書曰杜夷字行齊以儒學稱中宗以夷爲丞相祭酒中興𥘉皇太子凢三至夷舎執經問義沈約宋書曰博士秦官也掌通古今貟多至數十人有僕射光武増爲十五人盖一經有數家之學故也皆教弟子光武改僕射曰祭酒祭酒者一位之元長也齊書曰張緒竟陵王子良領國子祭酒武帝勑王晏曰吾欲}
