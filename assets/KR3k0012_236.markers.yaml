  - {type: punctuation, offset: 9, content: 《, id: KR3k0012_CHANT_236-bkkpn1}
  - {type: variant, offset: 9, length: 0, content: '', SBCK: 司徒辭􅀕酒以授張緒物議以爲云何子良竟不拜以緒領國子􅀕酒齊職儀曰晉令􅀶士􅀕酒掌􅀦子學而國子生師事􅀕酒執經􅁑巾單衣終身致敬梁書令曰王丞字安期爲國子􅀕酒丞祖儉父􅌔並居此職三代爲國師前代未有當時以爲榮􅌔音簡崔鴻十六國}
  - {type: variant, offset: 9, length: 0, content: '', WYG: 司徒辭祭酒以授張緒物議以為云何子良竟不拜以緒領國子祭酒齊職儀曰晉令博士祭酒掌國學而國子生師事祭酒執經葛巾單衣終身致敬梁書令曰王承字安期為國子祭酒承祖儉父暕並居此職三代為國師前代未有當時以為榮暕音簡崔鴻十六國}
  - {type: page-break, offset: 9, content: '', id: KR3k0012_WYG_236-3b, image: WYG0895/WYG0895-0168d.png}
  - {type: variant, offset: 9, length: 0, content: '', krp: 司徒辭祭酒以授張緒物議以爲云何子良竟不拜以緒領國子祭酒齊職儀曰晉令博士祭酒掌國子學而國子生師事祭酒執經葛巾單衣終身致敬梁書令曰王丞字安期爲國子祭酒丞祖儉父􅌔並居此職三代爲國師前代未有當時以爲榮􅌔音簡崔鴻十六國}
  - {type: variant, offset: 11, length: 0, content: '', SBCK: 前秦録曰建}
  - {type: variant, offset: 11, length: 0, content: '', WYG: 前秦錄曰建}
  - {type: variant, offset: 11, length: 0, content: '', krp: 前秦録曰建}
  - {type: variant, offset: 12, length: 9, content: 命苞云屈中挾一而起, SBCK: 七年髙平蘇通長樂劉祥並以碩學􅂄儒尢精二禮堅以通爲禮記􅀕酒居于東庠祥爲儀禮􅀕酒處于西序堅毎月朔旦率百僚親臨講論後魏書曰韓子熈累遷國子􅀕酒子熈儉素安貧常好退静遷鄴之始百司並給兵力時以􅀕酒閑豫止給二人或有令其陳謁}
  - {type: page-break, offset: 12, content: '', id: KR3k0012_SBCK_236-2b}
  - {type: variant, offset: 12, length: 9, content: 命苞云屈中挾一而起, WYG: 七年髙平蘇通長樂劉祥並以碩學耆儒尤精二禮堅以通為禮記祭酒居于東庠祥為儀禮祭酒處于西亭堅毎月朔旦率百寮親臨講論後魏書曰韓子熙累遷國子祭酒子熈儉素安貧常好退静遷鄴之始百司並給兵刀時以祭酒閒豫止給二人或有令其陳謁}
