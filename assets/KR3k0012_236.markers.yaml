  - {type: variant, offset: 1557, length: 8, content: 韋曜字弘嗣孫亮即, SBCK: 文帝黃􅀄五年太學制五經課試之法置春秋榖梁􅀶士又曰明帝太和二年詔曰尊儒貴學王教之夲也自頃儒官或非其人將何以宣明聖道其髙選􅀶士才任中常侍者呉志詔曰古者建國教學爲先所以道丗治性爲時養噐也自建興巳來時事多故吏民頗以目前趍務去夲就末不循古道夫所尚不淳則傷化敗俗其案古置學官立五經􅀶士核取應選加其寵禄科見吏之中及將吏子弟有志好者各令就業一歳課試差其品第加以}
