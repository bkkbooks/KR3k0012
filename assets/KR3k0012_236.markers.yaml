  - {type: variant, offset: 2044, length: 0, content: '', WYG: 嘉焉賜錢百萬後漢書曰東平王蒼為驃騎正月朔朝蒼當入賀故事少府給璧時隂就為少府貴傲不奉法漏將盡求璧不得蒼掾朱暉遥見少府主簿持璧乃徃紿曰試請觀之既得而馳奉之就復以他璧朝張璠漢紀曰太常种拂與李儒戰而死子劭徵為少府鴻臚皆不受曰我父盡忠於朝而為時所妬父以身徇國為賊臣所害為臣子不能除賊何面目復覲明主三輔聞之為之感動應劭漢官儀曰少府掌山澤陂池之稅名曰禁錢以給私養自别為藏少者小也故稱少府魏志曰王觀徙少府大將軍曹爽使材官張達斫屋材及諸私用之物觀聞之皆錄奪以没官少府統三尚方御府藏珍玩之寶爽等奢放多有干求憚觀守法乃徙為太僕又曰楊阜字義山為少府卿侃然以天下為己任三國志吳主遣少府徐祥至魏魏太祖謂祥曰孤比者右越横江之津與孫將軍遊姑蘇之臺獵長洲之苑吾志足矣祥對曰大王欲奉至尊以合諸侯若越横江而遊姑蘇是踵亡秦而蹈夫差天下事去矣太祖曰徐生得無逆詐耶臧榮緒晉書曰陳眕字國鎮過江為少府卿時大旱經乆大興四年四月始雨有司奏應報賽宗廟山川中宗詔曰祈廟云報賽非奉尊上辭也吾意有疑眕以為舊山川有許報故雨應賽非大事不應告廟子無要君親之道讀祭稱賽於義有違從之唐書官品志曰少府卿位視尚書左丞置材官將軍左中尚方甄官平水中署南塘邸稅庫東西冶平准細作炭庫紙官染署等令丞將作監六典曰將作大匠之職掌供邦國修建土木工匠之政總四署三監百工之官屬以}
