  - {type: variant, offset: 140, length: 5, content: 動則左史書, SBCK: 􅀶士掌教文武官三品巳上及國公子孫應劭漢官儀曰􅀶士秦官也􅀶者通􅀶古今士者辯於然否孝武帝建元五年􅀄置五經􅀶士秩六百石太常差次有聦明威重者一人爲􅀕酒揔領綱紀漢舊儀曰武帝􅀄置􅀶士取學通行脩􅀶識多藝䁱古文爾雅能屬文章者爲}
