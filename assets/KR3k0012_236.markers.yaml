  - {type: variant, offset: 343, length: 290, content: 春秋傳曰天子有日官諸侯有日卿大戴禮曰太子既冠成人免於保傅則有司過之史春秋文耀鉤曰楚立唐氏以為史官蒼雲如蜺圍軫七蟠中有荷斧之人嚮軫而蹲蟠猶周也蹲踞也楚驚唐史曰君慢命又簡宗廟命天命也軫於天文楚之分也向之而踞是慢命踞簡宗廟於是晝遺炎煙耀于蒼雲精消無文軫火精雲水氣圍軫水也晝日陽也炎火亦陽也遺之者象蟠所也水難勝火三陽併氣且火炎上宜消滅也文則蜺也唐史之冊上滅蒼雲告神以史功也韓詩外傳曰據法守職而不敢為非者太史也毛詩序曰國史明乎得失之迹傷人倫之廢哀刑政之苛吟詠情性以諷其上達於事變而懷其舊俗者也春秋後語曰晉太史屠黍見晉之亂以其國法歸周國語曰鄭桓公為司徒問於史伯曰王室多故史伯周太史也余懼及之焉, SBCK: ''}
