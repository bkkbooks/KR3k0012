  - {type: variant, offset: 2520, length: 0, content: '', SBCK: 崩典作順陵時盛冬地凍中使督促數罰􅁺吏以厲覇覇撫循而巳􅀄不切責而反勞之曰今諸卿􅀍辱大匠過也吏皆懷恩力作功倍續漢書曰曹裒字叔通遷將作大匠時有疾疫廵行病徒自省醫藥糜粥死者减少又百官志曰將作秩二千石掌作宗廟路寢宫室丞一人六百石左右校令左右工徒掌木工之功并樹桐梓之􅀋列于道側又曰李固字子堅遷大匠常推賢士孔融以將作大匠遷少府也華嶠後漢書曰應順字仲華爲將作大匠發擿衆姦皆極其刑豪猾之吏累迹視事五年省費以億万應劭漢官儀曰丗祖中興以謁者領其官章帝建}
