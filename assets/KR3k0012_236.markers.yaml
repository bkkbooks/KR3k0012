  - {type: variant, offset: 69, length: 0, content: '', SBCK: 第勑晉王以下皆拜之於帝前因賜名曰誕又以誕儒宗學府爲當世所推乃拜國子􅀕酒隋書曰楊汪字元度拜國子􅀕酒帝令百寮就學與汪講論天下通儒碩學多萃焉論難鋒起皆不能屈帝令御史書其問荅奏之省而大恱賜良馬一匹又曰元善遷國子􅀕酒上嘗親臨釋奠命善講孝經於是敷陳義理兼之以諷諌上大恱曰聞江陽之說更起朕心賚絹百匹衣一襲唐書曰許後胤嘗侍太宗講後爲睦州刺史因入朝乞骸骨太宗召問曰朕與卿刺史資以自養何謂即求致仕後胤對曰年老筯力不逮望得私第時見闕庭太宗曰卿氣力猶強欲何官也後胤陳謝不敢太宗曰朕昔從卿讀書卿今日從朕求官但言所欲不相違也時國子􅀕酒缺後胤奏言之因授國子􅀕酒風俗通曰孫卿有秀才善爲詩禮易春秋至齊襄王時而孫卿最老師三爲􅀕酒齊王融爲王儉讓國子􅀕酒表曰竊以成均義重振古所崇資師道尊有來攸尚匪由蘭芷疇變入室之情不自朱藍何遷素􅁝之質司業唐書曰韋叔夏遷成均司業乆視年特下制曰吉㓙禮儀國家所重司禮􅀶士未甚詳明成均司業韋叔夏太子率更令祝欽明等􅀶渉禮經多所該練委以叅掌兾􅀪典式自今司禮所脩儀注並委叔夏等刋定訖然後進奏又曰歸崇敬上言司業者義}
