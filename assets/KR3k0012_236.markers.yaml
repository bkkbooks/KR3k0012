  - {type: variant, offset: 1833, length: 1, content: 知, SBCK: 能除賊何靣目復覲明主三輔聞之爲之感動應劭漢官儀曰少府掌山澤陂池之稅名曰禁錢以給私養自别爲藏少者小也故稱少府魏志曰王觀徙少府大將軍曹爽使材官張逹斫屋材及諸私用之物觀聞之皆録奪以没官少府統三尚方御府内藏珎玩之寳爽等奢放多有干求憚觀守法乃徙爲太僕又曰楊阜字義山爲少府卿然以天下爲巳任呉志曰}
