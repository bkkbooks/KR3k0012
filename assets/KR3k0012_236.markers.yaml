  - {type: variant, offset: 1835, length: 0, content: '', SBCK: 主遣少府徐詳至魏魏太祖謂詳曰孤比者若越橫江之津與孫將軍遊姑􅂫之臺獵長洲之菀吾志足矣詳對曰大}
