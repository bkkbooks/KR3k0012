  - {type: variant, offset: 1487, length: 2, content: 吳範, WYG: 古者建國教學為先所以道世治性為時養器也自建興已來時事多故吏民頗以目前趍務去本務末不循古道夫所尚不淳則傷化敗俗其案古置學官立五經博士核取應選加其寵祿科見吏之中及將吏子弟有志學者各令就業一嵗課試差其品第加以位賞使見之者樂其榮聞之者羡其譽以敦王化以隆風俗晉令曰博士皆取履行清淳通明典義若散騎常侍中書侍郎太子中庶子以上乃得召試諸生有法度者及白衣試在髙等拜郎中晉書載記曰姚泓受經于博士淳于岐岐病親詣省病拜于牀下自是公侯見師傅皆拜焉後魏書曰崔逸}
