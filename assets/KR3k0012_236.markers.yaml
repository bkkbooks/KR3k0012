  - {type: variant, offset: 1623, length: 1, content: 乾, SBCK: 盧辯字景宣爲太學􅀶士以大戴禮未有解詁辯乃注之其兄景􅁉爲當時碩儒謂辯曰昔侍中注小戴今爾注大戴庶纂前脩矣隋書曰馬光開皇􅀄髙祖徴山東義學之士光與張仲讓孔籠竇士榮張黒奴劉祖仁等俱至並授太學􅀶士時人號爲六儒又曰馬光爲太學􅀶士嘗因釋奠髙祖親幸國子學王公以下畢集光􅂛座講禮啓發章門巳而諸儒生以次論難者十餘人皆當時碩學光剖析疑滯雖辭非俊辯而理義􅀪贍論者莫測其淺深咸共推服上嘉而勞焉又曰王頗授著作佐郎㝷令於國子講授㑹髙祖親臨釋奠國子􅀕酒}
