  - {type: variant, offset: 1789, length: 0, content: '', SBCK: 封襄城縣伯又曰房暉逺爲國子􅀶士㑹上令國子生通一經者並悉薦舉將擢用之旣䇿問訖􅀶士不能時定臧否􅀕酒元善恠問之暉逺曰江南河北義例不同􅀶士不能遍渉學生皆持其所短稱巳所長􅀶士各各自疑所以乆而不决也􅀕酒因令暉逺考定之暉逺覽筆便下􅀄無疑滯或有不服者暉逺問其所傳義䟽輙爲始末誦之然後出其所短自是無敢飾非者所試四五百人數日便决諸儒莫不推其通􅀶魯國先賢傳曰漢文帝時聞申公爲詩最精以爲􅀶士申公爲詩傳號曰魯詩李郃別傳曰郈上書太后數陳忠言其辭雖不能盡施用輙有䇿詔襃賛焉􅀶士著兩梁冠朝㑹冝隨士大夫例時賤經學􅀶士乃在市長下公奏以爲非所以敬儒徳明􅀦體也上善公言正月大朝引􅀶士公府長史前殷氏世傳曰殷亮建武中徴拜􅀶士}
  - {type: page-break, offset: 1789, content: '', id: KR3k0012_SBCK_236-7a}
  - {type: variant, offset: 1789, length: 0, content: '', WYG: 封襄城縣伯又曰房暉逺為國子博士會上令國子生通一經者並悉薦舉將擢用之既䇿問訖博士不能時定臧否祭酒元善恠問之暉逺曰江南河北義例不同博士不能遍涉學生皆持其所短稱已所長博士各各自疑所以乆而不决也祭酒因令暉逺考定之暉逺覽筆便下初無疑滯或有不服者暉逺問其所傳義疏輒為始末誦之然後出其所短自是無敢飾非者所試四百人數日便决諸儒莫不推其通博魯國先賢傳曰漢文帝時聞申公為詩最精以為博士申公為詩𫝊號曰魯詩李郃别傳曰郃上書太后數陳忠言其辭雖不盡施行輙有䇿詔褒贊焉博士著兩梁冠朝會宜随士大夫例時賤經學博士乃在市長下公奏以為非所以敬儒德明國體也上善公言正月大朝引博士公府長史前殷氏世傳曰殷亮建武中徵拜博士}
