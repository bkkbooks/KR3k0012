  - {type: variant, offset: 1830, length: 0, content: '', SBCK: 旣得而馳奉之就復以他璧朝張璠漢紀曰太常种拂與李儒戰而死子劭徴爲少府鴻臚皆不受曰我父盡忠於朝而爲}
  - {type: variant, offset: 1831, length: 1, content: 節, SBCK: 所妬父以身殉國爲賊臣所害爲臣子}
  - {type: variant, offset: 1831, length: 107, content: 節不知先王之諱與國之忌不知風雨雷電之𤯝凡此屬太史之任也揚雄太史令箴曰昔在太古爰初肇記天地之紀重離是司降及唐虞乃命羲和欽若昊天百政攸亘夏帝不慎羲和不令湎時亂日帝旅爰征庶寮至殷唯天為難夏氏黷德而明神不蠲荀悅申鑒曰古者天, WYG: 省五經章句博士弟}
