  - {type: variant, offset: 1801, length: 4, content: 取善紀述, SBCK: 惣中書尚左尚右尚職治掌治五署之官屬正其工徒謹其繕作少監爲之貳漢官宰尹下曰少府言别爲小藏故曰少府漢書曰少府秦官掌山海地澤之稅以給供養又曰歐陽地餘字長賔爲少府誡其子曰我死官屬送汝財物愼無受汝九卿儒}
