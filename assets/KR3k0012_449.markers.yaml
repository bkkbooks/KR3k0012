  - {type: variant, offset: 94, length: 1, content: 爾, SBCK: 􅀽尚攻兄譚於平原留別駕審配守鄴爲曹公所圍尚聞鄴急弃而救之求人入城計㑹事主簿李孚請行時圍甚急尚曰何辦孚曰多人不可三􅀐足矣尚遣之孚選温信者得三人各給駿馬不示其謀令釋戎器着平常冠秉問事杖投暮直抵鄴城下自稱曹公巡歷圍壘所過失候者輙捶之自東西正出曹公營當城門復怒守圍者収􅅞之因直入城下配以縋引之孚與配相見旣事了外圍益急孚因謂配曰城中榖少無用老弱不如驅出省榖也配乃夜簡得一千人皆令持白幡秉脂燭從三門而出請降孚將所來􅀐隨降人而出時守圍吏聞城中悉降火光照耀但共觀降不復視圍孚從北門突圍而歸報命於􅀽尚明旦曹公聞孚巳出拊掌大􅀏鄴郡竟爲曹公所取􅀽尚奔于遼東又曰郭嘉字奉孝潁川人詣太祖太祖與論天下事曰使􅀌成大業必此人也太祖用其計先撃吕布擒之太祖與􅀽紹相持於官渡孫䇿北襲楚衆並懼嘉料曰䇿輕而無備雖}
  - {type: page-break, offset: 94, content: '', id: KR3k0012_SBCK_449-3a}
  - {type: variant, offset: 94, length: 1, content: 爾, WYG: 袁尚攻兄譚於平原留别駕審配守鄴爲曹公所圍尚聞鄴急棄而救之求人入城計㑹事主簿李孚請行時圍甚急尚曰何辦孚曰多人不可三騎足矣尚遣之孚選温信者得三人各給駿馬不示其謀令釋戎器着平常冠秉問事枤投暮直抵鄴城下自稱曹公廵厯圍壘所過失候者輙捶之自東西正出曹公營當城門復怒守圍者收縛之因入至城下配以縋引之孚與配相見既事了外圍益急孚因謂配曰城中榖少無用老弱不如驅出省榖也配乃夜簡得一千人皆令持白幡秉脂燭從三門而出請降孚將所來騎從降人而出時守圍吏聞城中悉降火光照曜但共觀降不復視圍孚從北門突圍而歸報命於袁尚明旦曹公聞孚已出拊掌大笑鄴郡竟爲曹公所取袁尚奔於遼東又曰郭嘉字奉孝潁川人詣太祖太祖與論天下事曰使孤成大業必此人也太祖用其事計先擊吕布擒之太祖與袁紹相持於官渡孫䇿北襲楚衆並懼嘉料曰策輕而無備雖}
