  - {type: variant, offset: 96, length: 1, content: 嘉, WYG: 百萬之衆無異獨行於中原也以吾觀之必死於匹夫之手策臨欲濟東江果爲許貢客所殺後太祖又用其計宻襲盧龍塞大破單于又曰鄧艾字士載襄陽人少孤貧每見髙山大澤輙指畫軍營處所時人笑焉因計吏上見司馬宣王宣王竒之辟爲掾景元四年秋詔諸軍征蜀艾授大將軍節度鍾㑹攻劒閣不下艾自隂平行無人之地七百餘里鑿山通道艾以氊自裹推轉而下進至油江遂入成都降劉禪蜀志曰龎統字士元襄陽人守耒陽令在縣不治免官吳魯肅與先主書曰士元非百里之才使處治中别駕始展驥足耳先主以爲治中從事親侍亞亮爲軍師中郎將亮留鎮荆州統隨入蜀璋與先主㑹統曰因此㑹執之則無用兵之勞先主曰初入地恩信未著不可也統復上三計先主用中計向成都所過輙克進圍雒率衆攻城爲流矢中卒又曰法正字孝直扶風人建安初天下亂入蜀依劉璋别駕張松與正書度璋不足成事因勸璋結先主乃遣正徃及還謂松曰雄畧宻}
