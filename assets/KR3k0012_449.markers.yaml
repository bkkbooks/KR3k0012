  - {type: variant, offset: 3658, length: 241, content: 帝入關將自征之寇恂時從上議遣使降之帝乃謂恂曰卿前止吾此舉今為行也若峻不即降引耿弇等五營擊之恂奉璽書至高平峻遣軍師皇甫文謁辭禮不屈恂怒將誅文諫曰高峻精兵萬人卒多強弩西遮隴道連年不下今欲降之反戮其使無乃不可乎恂不應遂斬之遣其副歸告峻曰軍師無禮已戮之矣欲降急降不欲固守峻惶恐即日開城降諸將皆賀因曰敢問戮其使而降城何也恂曰皇甫文峻之腹心其所計事者也今來不屈無心降耳諸將皆曰非所及也又曰朱勃上書理馬援謀如涌泉勢如轉圜謝承後漢書曰靈帝時楊琁為零陵太守時蒼梧桂陽猾賊攻琁力弱吏民憂恐琁乃特製馬車數, WYG: 御覽卷四百四}
