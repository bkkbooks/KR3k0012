  - {type: variant, offset: 41, length: 0, content: '', SBCK: 將誅不義而力不敵如何彧曰古之成敗者誠有其才雖弱必強苟非其人其強易弱劉項存亡足以觀之太祖卒破紹於官渡如彧所䇿又曰荀攸字公逹彧從子也太祖遺攸書曰方今天下大亂智者勞心之時也遂徴入爲尚書操謂鍾繇曰公逹非常人也吾得之與計事天下何憂哉以爲軍帥征吕布至下邳攻之不抜太祖欲還攸曰布勇而無謀不可解遂生擒布太祖又與􅀽紹相拒於官渡攸勸擊紹將淳于瓊運粮遂破紹魏國􅀄建爲尚書令太祖謂文帝曰公逹人之師表}
