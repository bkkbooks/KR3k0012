  - {type: variant, offset: 2365, length: 161, content: 爨師不宿飽今井陘之道車不得方軌騎不得成列行數百里糧食必在後願足下假臣奇兵三萬人從間路絕其輜重足下深溝高壘勿與戰彼前不得鬭退不得還吾奇兵絕其後野無所掠不至十日兩將之頭可致麾下成安君常稱義兵不用詐謀奇計韓信既破趙令軍有生得廣武君購千金須臾有縛至者信解其縛而師事之曰僕欲北攻燕東伐齊何如廣武君辭曰臣聞亡國之大夫不足以圖存敗軍之將, SBCK: ''}
