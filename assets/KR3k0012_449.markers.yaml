  body:
  - {type: variant, offset: 3, length: 1, content: 八, SBCK: 九十權謀中續漢書曰銅馬所過虜掠王俊言於上曰冝捨輕兵出賊前使百姓各堅壁以絶其食可不戰而殄也上然之遣俊將輕􅀐馳出賊前視民保壁者勑令固守散在野者因掠取之賊至無所得遂散敗及軍還上謂俊曰困此虜者將軍䇿也又曰廉范爲雲中太守㑹匈奴大入塞范自率士卒拒之虜衆盛不敵令軍士各交􅅞兩炬三頭燃火虜見火多謂漢兵救至待旦將退范乃命軍中蓐食晨徃赴之斬首數千級虜自此不敢復向雲中又曰朝歌賊寗季等數千人攻殺長吏乃使虞詡爲朝歌長故舊皆弔詡曰得朝歌何衰詡􅀏曰志不求易事不避難臣之職也不遇盤根錯節何以別利器乎始到謁河内太守馬稜稜勉之曰儒者謀謨廟堂反在朝歌耶詡曰􅀄除之日大夫皆弔及到官設令三科以募求壯士自􅁺吏以下各舉所知其攻刼者爲上而不事家業者爲下収得百餘人詡爲之饗㑹悉貸其罪使入賊中誘令刼掠乃伏兵以待之遂殺賊百人又潛遣貧民得縫者傭作賊衣以采綖縫其裙爲識有出市買者吏輙禽之由是駭散咸稱神明遷武都太守及還羌率數千􅃒詡於陳倉詡即停軍不進而上書請兵湏到當發羌聞之乃分鈔傍縣詡因其兵散日夜進行百餘里令吏士各作兩竈日増倍之羌不敢逼或問曰孫臏減竈而君増之兵法曰日行不可過三十里而今日行二百何也詡曰虜衆多吾兵少徐則易爲所及速則彼不測虜見竈増必謂郡兵來迎行速必憚追我孫臏見弱吾今示彊􅀔有不同故也魏志曰荀彧字文􅀂頴川人淑之孫也舉孝廉遷亢父令以董卓之亂弃官歸太祖太祖恱曰吾子房也以爲司馬時年二}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_449-1b}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_449-2a}
  - {type: variant, offset: 3, length: 1, content: 八, WYG: 九十權謀中續漢書曰銅馬所過虜掠王俊言於上曰宜捨輕兵出賊前使百姓各堅壁以絶其食可不戰而殄也上然之遣俊將輕騎馳出賊前視民保壁者勅令固守散在野者因掠取之賊至無所得遂散敗及軍還上謂俊曰困此虜者將軍䇿也又曰亷范爲雲中太守㑹匈奴大入塞范自率士卒拒之虜衆盛不敵令軍士各交縛兩炬三頭燃火虜謂漢兵大至待旦將退范乃命軍中蓐食晨往赴之斬首數千級虜自此不敢復向雲中又曰朝歌賊寗季等數千人攻殺長吏乃使虞詡爲朝歌長故舊皆弔詡曰得朝歌何衰詡笑曰志不求易事不避難臣之職也不遇盤根錯節何以别利器乎始到謁河内太守馬陵陵勉之曰儒者謀謨廟堂反在朝歌耶詡曰初除之日大夫皆弔及到官設令三科以募求壯士自掾吏以下各舉所知其攻刼者爲上而不事家業者爲下收得百餘人詡爲之享㑹悉貸其罪使入賊中誘令刼掠乃伏兵以待之遂殺賊百人又潜遣貧民得縫者傭作賊衣以采綖縫其裙爲識有出市賣者吏輙禽之由是駭散咸稱神明遷武都太守及還羗率數千遮詡於陳倉詡即停軍不進而上書請兵須到當發羗聞之乃分鈔傍縣詡因其兵散日夜進行二百里令吏士各作兩竈日增倍之羗不敢逼或問曰孫臏減竈而君増竈兵法曰日行不可過三十里而今日行二百何也詡曰虜衆多吾兵少徐則易爲所及速則彼不測虜見竈増必謂郡兵來迎行速必憚追我孫臏見弱吾今示彊勢有不同故也魏志曰荀彧字文若潁川人淑之孫也舉孝亷遷亢父令以董卓之亂棄官歸太祖太祖悦曰吾子房也以爲司馬時年二}
