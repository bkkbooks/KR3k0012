  - {type: variant, offset: 2631, length: 154, content: 傾耳以待命者然眾勞兵罷其實難用也今足下與倦弊之兵頓堅城之下臣愚竊以為過矣韓信曰然則何由廣武君對曰當今之計不如偃甲休兵百里之內牛酒日至以饗士大夫北首燕路然後發一乘之使持咫尺之書以使燕燕必不敢不聽從燕而東臨齊雖有智者不能為齊計矣知如此則天下事可圖也兵固有先聲後實者此之謂也信曰敬奉教於是用廣武君策發使燕燕隨風而靡, SBCK: 歎服}
