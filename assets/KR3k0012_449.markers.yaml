  - {type: variant, offset: 1092, length: 875, content: 廟安不勝則天下危能用臣言乎晉夫下車禮而問之涉曰吳王素富懷輯死士久矣此知將軍且行必置間人於崤澠阨狹之間且兵事尚神密將軍何不從此右去趨藍田出武關抵洛陽間不過二三日直至武庫擊鳴鼓諸侯聞之以謂將軍從天而下也如其謀至洛陽使人索崤澠間果得伏甲以涉為護軍竟滅吳楚又曰周勃等既誅諸呂使迎代王郎中令張武等議皆曰不可信願稱疾無行以觀其變中尉宋昌進曰群臣之議皆非也夫以呂太后之嚴立諸呂為三王擅權專利然而太尉以一節入北軍一呼士皆左袒為劉氏叛諸呂卒以滅之此乃天授非人力也內有朱虛東牟之親外畏吳楚淮南琅耶齊代之強方今高帝子獨淮南王與代王代王又長賢聖仁孝聞於天下故大臣因天下之心而欲迎立大王大王勿疑也又曰上擊韓王信從晉陽連戰乘勝逐北至樓煩會大寒士卒墮指者十二三遂至平城為匈奴所圍七日用陳平祕計得出應劭曰平畫圖美人形遺閼氏恐漢女美奪己寵因謂單于曰漢天子亦有神靈得其士地非能有也於是匈奴開其一角得突出以計鄙祕不傳也又曰七國反條侯將乘六乘傳會兵滎陽至洛陽問故父絳侯客鄧都尉曰策安出客曰吳兵銳難與爭鋒楚兵輕不久方今為將軍計莫若引兵東北壁昌邑以梁委吳吳必盡銳攻之將軍深溝高壘使兵絕淮泗口塞吳饟道而糧食竭乃以全制其弊破吳必矣條侯曰善乃從其策又曰陳平將終曰我多陰謀道家所禁吾即廢亦已矣終不能復起以吾多陰禍也又曰諸呂擅權丞相陳平患之平常燕居深念不見陸賈賈曰何念深也陳平曰生揣我何念賈曰足下位為上相食三萬戶侯可謂極富貴無欲矣然有憂念不過患諸呂少主耳陳平曰然為之奈何賈曰天下安注意相天下危注意將君何不交於太尉深相結友陳平用其計迺以百金為絳侯壽厚具樂飲太尉亦報如之兩人深相結友呂氏謀益壞陳平又以奴婢百人車馬五十乘錢五百萬遺賈為食飲之費賈以此時遊漢庭公卿間名聲籍甚及誅呂氏立孝文賈頗有力又曰高祖既誅黥布聞朱建諫不聽賜建號平原君為人剛直行不茍合義不取容辟陽侯行不正得幸呂太后欲知建建不肯見建母死貧未有發喪陸賈素與善乃賀辟陽侯曰平原君母死何乃賀我陸生曰前君侯欲知平原君義不知君以母故今其母死君誠厚送喪則彼為君死辟陽侯迺奉百金裞韋劭曰衣服曰稅稅當為裞也列侯貴人以辟陽侯故往賻凡五百金或人毀辟陽侯惠帝大怒下吏欲誅, SBCK: 率衆拒}
