  - {type: variant, offset: 6, length: 2, content: 權謀, SBCK: 後太祖破黄巾漢獻帝自河東還洛陽彧􅂆太祖曰晉文納周襄王而諸侯願從漢髙爲義帝縞素天下歸心自天子蒙塵將軍首唱義兵雖禦難于外心無不在王室今鸞駕旋􅎮東京搸蕪義士有存夲之思兆人懷感舊之哀誠因此時奉主}
