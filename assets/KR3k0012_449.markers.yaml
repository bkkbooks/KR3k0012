  - {type: variant, offset: 98, length: 3, content: 嘉猷則, SBCK: 可共戴奉之璋復使正迎先主先主定蜀以正爲蜀郡守外統都畿内爲謀主正􅀃曰曹公留夏侯淵張郃屯漢中淵等才略不勝國之帥今舉衆討必克先主乃率諸將兵討漢中淵將兵來爭其地正曰可擊矣先主命黄忠乗髙攻之淵等授首曹公聞正䇿曰吾故知􅀇德不辦此必爲人敎以正爲尚書令呉志曰太史慈字子義東萊人避亂至遼東北海相孔融聞而竒之數遣餉饋其母融以黄巾宼􅁀出屯都昌爲賊管彦所圍慈歸其母曰汝與孔北海未嘗相識汝去後贍䘏過於故舊今􅀍圍汝冝赴之慈單歩至都昌夜因伺開間得}
