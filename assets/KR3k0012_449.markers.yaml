  - {type: variant, offset: 541, length: 0, content: '', SBCK: 杜預陳兵江陵遣周旨伍巢等率竒兵八百汎舟夜渡以襲樂郷多張旗幟起大巴山出於要害之地以奪賊心呉都督孫歆震恐與伍延書曰北來諸軍乃飛渡江也後周書曰武帝保定元年汾晉之北離石之南悉是羌胡而地居齊境抄掠我東鄙朝廷患之韋孝寛乃於要害欲置大城以扼其吭興役十萬甲士百人遣姚岳監之岳有難色謂孝寛曰國家每於境外築城未甞不動大衆今􅀷入胡境密迩齊師以兵百􅀐何以禦役孝寛曰事有万途兵非一勢}
