  - {type: variant, offset: 444, length: 0, content: '', WYG: 杜預以太康元年正月陳兵江陵遣參軍樊顯尹林鄧圭㐮陽太守周竒等率衆循江西上授以節度旬日之間累尅城邑皆如預策焉又曰杜預陳兵江陵遣周㫖伍巢等率竒兵八百汎舟夜渡以襲樂鄉多張旗幟起火巴山出于要害之地以奪賊心吳都督孫歆震恐與伍延書曰北來諸軍乃飛渡江也後周書曰武帝保定元年汾}
