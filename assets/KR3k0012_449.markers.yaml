  - {type: variant, offset: 3316, length: 549, content: 與赤眉戰不利異乃令各更衣色伏於道傍戰移時伏兵卒起衣服相亂眾驚大敗降赤眉男女八萬餘眾初為世祖主簿王郎起河北世祖自薊南馳至饒陽蕪蔞亭時天寒烈眾皆飢疲異上豆粥明旦世祖謂諸將曰昨得公孫豆粥飢寒俱解至南宮遇大風雨世祖引車入道傍空舍異復進麥飯兔肩從破王郎封應侯異為人謙退不伐行能諸將論功異常獨坐屏樹下軍中號曰大樹將軍世祖即位封夏節侯東觀漢記曰光武發邯鄲晨夜馳騖傳聞王郎軍在後吏士惶恐至下曲陽呼沱河導吏還河水流澌無船不可渡官屬益懼上不然也遣王霸往視之實然王霸恐驚眾即還曰冰堅可渡士眾大喜上笑曰果妄也比至河河流澌已合上令霸護渡以沙土汾冰上遂得渡渡未畢軍冰解上謂霸曰安吾眾能濟者卿力也謂官屬曰王霸從我勞苦前連水變權時以安吏士是天瑞也為善不費賞無以勸後即日以霸為軍正賜爵關內侯又曰隗囂死其將高峻擁兵據高平帝入關將自征之寇恂時從上議遣使降之帝乃謂恂曰卿前止吾此舉今為行也若峻不即降引耿弇等五營擊之恂奉璽書至高平峻遣軍師皇甫文謁辭禮不屈恂怒將誅文諫曰高峻精兵萬人卒多強弩西遮隴道連年不下今欲降之反戮其使無乃不可乎恂不應遂斬之遣其副歸告峻曰軍師無禮已戮之矣欲降急降不欲固守峻惶恐即日開城降諸將皆賀因曰敢問戮其使而降城何也恂曰皇甫文峻之腹心其所計事者也今來不屈無心降耳諸將皆曰非所及也又曰朱勃上書理馬援謀如涌泉勢如轉圜謝承後漢, SBCK: 周}
  - {type: variant, offset: 3316, length: 0, content: '', WYG: 蜀志龎統説先主曰荆州荒殘人物殫盡東有吳孫北有曹氏鼎足之勢難以得志益州國富民强户口百萬兵馬所出畢具寶貨無求於外今可權借以定大事先主曰今}
  - {type: variant, offset: 3316, length: 549, content: 與赤眉戰不利異乃令各更衣色伏於道傍戰移時伏兵卒起衣服相亂眾驚大敗降赤眉男女八萬餘眾初為世祖主簿王郎起河北世祖自薊南馳至饒陽蕪蔞亭時天寒烈眾皆飢疲異上豆粥明旦世祖謂諸將曰昨得公孫豆粥飢寒俱解至南宮遇大風雨世祖引車入道傍空舍異復進麥飯兔肩從破王郎封應侯異為人謙退不伐行能諸將論功異常獨坐屏樹下軍中號曰大樹將軍世祖即位封夏節侯東觀漢記曰光武發邯鄲晨夜馳騖傳聞王郎軍在後吏士惶恐至下曲陽呼沱河導吏還河水流澌無船不可渡官屬益懼上不然也遣王霸往視之實然王霸恐驚眾即還曰冰堅可渡士眾大喜上笑曰果妄也比至河河流澌已合上令霸護渡以沙土汾冰上遂得渡渡未畢軍冰解上謂霸曰安吾眾能濟者卿力也謂官屬曰王霸從我勞苦前連水變權時以安吏士是天瑞也為善不費賞無以勸後即日以霸為軍正賜爵關內侯又曰隗囂死其將高峻擁兵據高平帝入關將自征之寇恂時從上議遣使降之帝乃謂恂曰卿前止吾此舉今為行也若峻不即降引耿弇等五營擊之恂奉璽書至高平峻遣軍師皇甫文謁辭禮不屈恂怒將誅文諫曰高峻精兵萬人卒多強弩西遮隴道連年不下今欲降之反戮其使無乃不可乎恂不應遂斬之遣其副歸告峻曰軍師無禮已戮之矣欲降急降不欲固守峻惶恐即日開城降諸將皆賀因曰敢問戮其使而降城何也恂曰皇甫文峻之腹心其所計事者也今來不屈無心降耳諸將皆曰非所及也又曰朱勃上書理馬援謀如涌泉勢如轉圜謝承後漢, krp: 周}
  - {type: variant, offset: 3317, length: 3, content: 赤眉戰, WYG: 吾為水火者曹操也操以急吾以寛必如是乃可成耳今以小國而失信義於天下吾所}
