  - {type: variant, offset: 445, length: 3, content: 悼公歸, WYG: 之北離石之南悉是生胡而地居齊境抄掠我東鄙朝廷患之韋孝寛乃於要害欲置大城以扼其吭興役十萬甲士百人遣姚岳監之岳有難色謂孝寛曰國家每於境外築城未嘗不動大衆今深入胡境宻邇齊師以兵百騎何以禦役孝寛曰事有萬途兵非一勢君但受成規無所憂也計築城十日即畢今齊君徵兵三日方集}
