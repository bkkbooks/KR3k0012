  - {type: variant, offset: 3867, length: 2, content: 靈帝, SBCK: 容容熈熈皆爲利謀熈熈攘攘皆爲利徃九州春秋曰龐士元􅀃劉備曰荆州荒殘人物殫盡東有呉孫北有曹氏鼎足之勢難以得志益州國冨民強户口有四郡兵馬所出畢具寳貨無永於外今可權借以定大事備曰今指與吾爲水火者曹操也操以急吾以寛與反事乃可成耳今以小國而失信義於天下吾所不足取也士元曰權變之}
