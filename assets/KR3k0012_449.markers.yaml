  - {type: variant, offset: 2017, length: 325, content: 君所以得幸帝天下莫不聞今辟陽侯幸太后而下吏道路皆言君讒欲殺之今日辟陽侯誅旦日太后怒亦誅君君何不肉袒為辟陽侯言帝帝聽君出辟陽侯太后大忻兩主俱幸君君富貴益倍矣於是閎藉孺大恐從其言帝果出之辟陽侯之囚也欲見建建不見辟陽侯以為背之大怒及其成功出之乃大驚又曰韓信已拜大將軍漢王曰丞相數言將軍將軍何以教寡人計策信再拜曰臣嘗事項王請言項王為人不能任屬賢將此特匹夫之勇又背約而逐義帝所過無不殘滅雖為霸實失天下心大王之入武關秋毫無害除秦苛法與民約法三章秦民無不欲大王王秦者今王舉兵而東三秦可傳檄而定也於是漢王大喜自以為得信晚遂聽信計部署將舉兵東出陳倉定三秦又曰韓信張耳以兵數萬欲東下井陘擊趙趙王及成安君陳餘聞漢且襲之藂兵井陘口號稱二十萬廣武君李左車說成安君曰聞漢將韓信乘, SBCK: 羣賊乗}
