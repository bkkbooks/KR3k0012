  - {type: variant, offset: 1391, length: 956, content: 逐北至樓煩會大寒士卒墮指者十二三遂至平城為匈奴所圍七日用陳平祕計得出應劭曰平畫圖美人形遺閼氏恐漢女美奪己寵因謂單于曰漢天子亦有神靈得其士地非能有也於是匈奴開其一角得突出以計鄙祕不傳也又曰七國反條侯將乘六乘傳會兵滎陽至洛陽問故父絳侯客鄧都尉曰策安出客曰吳兵銳難與爭鋒楚兵輕不久方今為將軍計莫若引兵東北壁昌邑以梁委吳吳必盡銳攻之將軍深溝高壘使兵絕淮泗口塞吳饟道而糧食竭乃以全制其弊破吳必矣條侯曰善乃從其策又曰陳平將終曰我多陰謀道家所禁吾即廢亦已矣終不能復起以吾多陰禍也又曰諸呂擅權丞相陳平患之平常燕居深念不見陸賈賈曰何念深也陳平曰生揣我何念賈曰足下位為上相食三萬戶侯可謂極富貴無欲矣然有憂念不過患諸呂少主耳陳平曰然為之奈何賈曰天下安注意相天下危注意將君何不交於太尉深相結友陳平用其計迺以百金為絳侯壽厚具樂飲太尉亦報如之兩人深相結友呂氏謀益壞陳平又以奴婢百人車馬五十乘錢五百萬遺賈為食飲之費賈以此時遊漢庭公卿間名聲籍甚及誅呂氏立孝文賈頗有力又曰高祖既誅黥布聞朱建諫不聽賜建號平原君為人剛直行不茍合義不取容辟陽侯行不正得幸呂太后欲知建建不肯見建母死貧未有發喪陸賈素與善乃賀辟陽侯曰平原君母死何乃賀我陸生曰前君侯欲知平原君義不知君以母故今其母死君誠厚送喪則彼為君死辟陽侯迺奉百金裞韋劭曰衣服曰稅稅當為裞也列侯貴人以辟陽侯故往賻凡五百金或人毀辟陽侯惠帝大怒下吏欲誅之太后慚不可言大臣多害辟陽侯行欲遂誅之辟陽侯急使人欲見建建辭曰獄急不敢見君建迺求見孝惠幸臣閎藉孺說曰君所以得幸帝天下莫不聞今辟陽侯幸太后而下吏道路皆言君讒欲殺之今日辟陽侯誅旦日太后怒亦誅君君何不肉袒為辟陽侯言帝帝聽君出辟陽侯太后大忻兩主俱幸君君富貴益倍矣於是閎藉孺大恐從其言帝果出之辟陽侯之囚也欲見建建不見辟陽侯以為背之大怒及其成功出之乃大驚又曰韓信已拜大將軍漢王曰丞相數言將軍將軍何以教寡人計策信再拜曰臣嘗事項王請言項王為人不能任屬賢將此特匹夫之勇又背約而逐義帝所過無不殘滅雖為霸實失天下心大王之入武關秋毫無害除秦苛法與民約法三章秦民無不欲大王王秦者今王舉兵而東三秦可傳檄而定也於是漢王大喜自以為得信晚遂聽信計部署將舉兵東出陳倉定三秦又曰韓信張耳以兵數萬欲東下井陘擊趙趙王及成安君陳餘聞漢且襲之藂兵井陘口號稱二十萬廣武君李左車說成安君曰聞漢將韓信乘勝去國遠鬭, WYG: ''}
