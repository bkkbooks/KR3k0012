  - {type: variant, offset: 930, length: 459, content: 從陛下入蜀漢破強楚定海內轉鬭數千里瘡痍遍體而功賞未行今四人何功而遽封千戶上曰非爾所知也今陳豨反趙代地皆豨之有也吾以羽檄徵天下兵未有至者今唯獨邯鄲中兵耳吾何愛四千戶不以慰趙子弟乎左右曰善又聞豨將皆商賈人高祖曰吾知其易與之矣商人尚利乃以金購豨將多降者又曰景帝三年吳楚七國反太尉周亞夫將東擊師次灞上趙涉遮說亞夫曰將軍東擊吳楚勝則宗廟安不勝則天下危能用臣言乎晉夫下車禮而問之涉曰吳王素富懷輯死士久矣此知將軍且行必置間人於崤澠阨狹之間且兵事尚神密將軍何不從此右去趨藍田出武關抵洛陽間不過二三日直至武庫擊鳴鼓諸侯聞之以謂將軍從天而下也如其謀至洛陽使人索崤澠間果得伏甲以涉為護軍竟滅吳楚又曰周勃等既誅諸呂使迎代王郎中令張武等議皆曰不可信願稱疾無行以觀其變中尉宋昌進曰群臣之議皆非也夫以呂太后之嚴立諸呂為三王擅權專利然而太尉以一節入北軍一呼士皆左袒為劉氏叛諸呂卒以滅之此乃天授非人力也內有朱虛東牟之親外畏吳楚淮南琅耶齊代之強方今高帝子獨淮南王與代王代王又長賢聖仁孝聞於天下故大臣因天下之心而欲迎立大王大王勿疑也又曰上擊韓王信從晉陽連戰, WYG: 羣賊}
