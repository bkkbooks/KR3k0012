  - {type: variant, offset: 681, length: 187, content: 里而走利者蹶上將魏文帝曰蹶猶挫也軍半至使齊軍入魏地為十萬竈明日為五萬竈明日為二萬竈龐涓行三日大喜曰我固知齊卒怯入吾地三日士卒亡者過半矣乃棄其步兵與其輕輓亡辨反倍日并行逐之孫子度其行暮當至馬陵馬陵道狹而傍多阻險可伏兵乃大斫樹白而書之曰龐涓死此下於是令齊軍善射者萬弩夾道而暮見火舉而俱發涓夜至斫木下見白書乃鑽火燭之讀未畢齊軍萬弩共發軍大亂相失涓自知計窮兵敗遂自剄曰遂成豎子之名漢, SBCK: 疋唐}
