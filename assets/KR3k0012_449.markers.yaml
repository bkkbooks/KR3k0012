  - {type: variant, offset: 94, length: 1, content: 爾, krp: 袁尚攻兄譚於平原留別駕審配守鄴爲曹公所圍尚聞鄴急弃而救之求人入城計㑹事主簿李孚請行時圍甚急尚曰何辦孚曰多人不可三騎足矣尚遣之孚選温信者得三人各給駿馬不示其謀令釋戎器着平常冠秉問事杖投暮直抵鄴城下自稱曹公巡歷圍壘所過失候者輙捶之自東西正出曹公營當城門復怒守圍者収縛之因直入城下配以縋引之孚與配相見旣事了外圍益急孚因謂配曰城中榖少無用老弱不如驅出省榖也配乃夜簡得一千人皆令持白幡秉脂燭從三門而出請降孚將所來騎隨降人而出時守圍吏聞城中悉降火光照耀但共觀降不復視圍孚從北門突圍而歸報命於袁尚明旦曹公聞孚巳出拊掌大笑鄴郡竟爲曹公所取袁尚奔于遼東又曰郭嘉字奉孝潁川人詣太祖太祖與論天下事曰使孤成大業必此人也太祖用其計先撃吕布擒之太祖與袁紹相持於官渡孫䇿北襲楚衆並懼嘉料曰䇿輕而無備雖}
  - {type: variant, offset: 96, length: 1, content: 嘉, SBCK: 百万之衆無異獨行於中原也以吾觀之必死於匹夫之手䇿臨欲濟江果爲許貢客所殺後太祖又用其計密襲盧龍塞大破單于又曰鄧艾字士載義陽人少􅀌貧毎見髙山大澤輙指畫軍營處所時人􅀏焉因計吏上見司馬宣王宣王竒之辟爲􅁺景元四年秋詔諸軍征蜀艾授大將軍節度鍾㑹攻劔閣不下艾自隂平行無人之地七百餘里鑿山通道文以氊自褁推轉而下進至江曲遂入成都降劉禪蜀志曰龐統字士元襄陽人守耒陽令在縣不治免官呉魯肅遺先主書曰士元非百里之才使處治中别駕始展􅂹足耳先主以爲治中從事親待亞亮爲軍帥中郎將亮留鎭荆州統隨入蜀劉璋與先主㑹統曰因此㑹執之則無用兵之勞先主曰初入地恩信未着不可也統復說以三計先主用中計向成都所過輙克進圍雒率衆攻城爲流矢中卒又曰法正字孝直扶風人建安􅀄天下亂入蜀依劉璋別駕張松與正書度璋不足成事因勸璋結先主乃遣正徃及還謂松曰雄略密}
