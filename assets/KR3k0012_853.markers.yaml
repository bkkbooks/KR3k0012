  - {type: variant, offset: 375, length: 0, content: '', SBCK: 七月七日作麹麩蒼頡解詁曰麺細麸也􅀃文曰麸小麥皮屑也史記曰陳平爲人長大美色或謂陳平貧何食而肥若是其嫂疾平之不視家産曰亦食糠覈孟康曰麦糠中之不破者晉灼曰京師謂慶屑爲紇頭呉書曰􅀽術旣爲雷薄等所距留住三日士衆絶粮乃還至江亭去壽春八}
