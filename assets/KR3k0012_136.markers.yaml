  - {type: variant, offset: 3106, length: 1, content: 嬌, SBCK: 娠􅀊中生文帝髙帝幸􅁎戚夫人之屬吕后怒皆幽之不得出宫而薄􅁎以希見故出從子之代代王爲帝尊爲皇太后東觀漢記曰中元元年告祠髙廟曰髙皇吕后不宜配食薄太􅁎慈仁孝文皇帝賢明子孫賴福延至于今宜配食地祇髙廟今上薄太后尊號爲髙皇后遷吕太后于園孝惠張皇后漢書曰孝惠張皇后宣平侯敖女也敖尚帝姉魯元公主有女惠帝即位吕太后欲爲重親以公主女配帝爲皇后欲其生子萬方終無子廼使陽爲有身取後宫羙人子名之殺其母立所名子爲太子惠帝崩太子立爲帝吕后崩大臣正之以非孝惠子誅之孝惠后廢處北宫孝文竇皇后漢書曰孝文竇皇后景帝母也吕太后時以良家子選入宫㑹太后出宫人以賜諸王各五人竇􅁎家在清河乃求其主者願歸清河而主者誤寘於代籍中竇􅁎泣涕而行及至代代王獨幸竇􅁎生子文帝立數月公卿請立太子而竇􅁎爲皇后景帝立爲皇太后好黃帝老子言景帝及諸竇不得不讀老子以尊其術孝景薄皇后漢書曰孝景薄皇后孝文薄太后家女也景帝立立薄妃爲皇后無子無寵立六年薄太后崩皇后廢孝景王皇后漢書曰孝景王皇后武帝母也父仲槐里人􅀄嫁爲金王孫婦生一女矣而母臧兒卜筮曰兩女當貴欲􅀝兩女奪于金}
