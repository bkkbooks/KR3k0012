  - {type: variant, offset: 661, length: 124, content: 自古受命帝王及繼體守文之君非獨內德茂也蓋亦有外戚之助焉夏興也以塗山而桀放也用妹喜殷之興也以有娀及有㜪而紂之滅也嬖妲己周之興也以姜嫄及大任大姒而幽王之擒也淫褎姒故易基乾坤詩首關睢書美釐降春秋譏不親迎夫婦之際人道之大倫也漢書曰漢興因秦之稱號帝母稱皇太后, SBCK: 髙}
