  - {type: variant, offset: 7, length: 5, content: 妃尚書大傳, SBCK: 髙祖吕皇后髙祖薄皇后孝惠張皇后孝文竇皇后孝景薄皇后孝景王皇后孝武陳皇后孝武衛皇后孝武李皇后孝昭趙太后孝昭上官皇后衛太子史戾后史皇孫王悼后孝宣許皇后孝宣霍皇后孝宣王皇后孝元王皇后孝元傅皇后信都馮太后孝成許皇后孝成帝趙皇后孝哀丁太后孝哀􅀓皇后孝平母衛􅁎孝平王皇后漢太上昭靈后詩含神霧}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_SBCK_136-1b}
  - {type: variant, offset: 7, length: 8, content: 妃尚書大傳曰古者, WYG: 高祖吕皇}
