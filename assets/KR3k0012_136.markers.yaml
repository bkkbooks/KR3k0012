  - {type: variant, offset: 6172, length: 0, content: '', SBCK: 昭帝始立年八歳帝姊鄂邑長公主居禁中共養后父安因主親近丁外人聞之長公主召入爲婕妤月餘爲皇后年甫六􅀊安以后父封侯後桀謀反發覺后以少不預謀亦以霍光外孫不廢宣帝即位合葬平陵衛太子史戾后漢書曰衛太子史良娣宣帝祖母也太子有妃有良娣有孺子妻妾凡三等子皆稱皇孫史良娣生男進號史皇孫武帝末巫蠱事起衛太子及良娣史皇孫皆遭害史皇孫王悼后漢書曰史皇孫王夫人宣帝母也名公碩太始中得幸於史皇孫皇孫妻妾無號位皆稱家人子征和二年生宣帝帝生數月衛太子皇孫敗家人子皆㘴誅莫有収葬者唯宣帝得全即尊位後追尊母夫人謚曰悼后祖母史良娣曰戾后皆改葬孝宣許皇后漢書曰孝宣許皇后元帝母也父廣漢昌邑人爲暴室嗇夫廣漢有女平君十四五當爲内者令歐侯氏子婦臨當入門歐侯子死其母將行卜相言當大貴母獨喜張賀聞許嗇夫有女乃置酒請之酒酣爲言曽孫可妻也廣漢許諾明日嫗聞之怒廣漢重令爲媒介遂與曽孫及立爲帝平君爲婕妤是時霍將軍有小女與皇太后有親漢書宣帝即位公卿議更立皇后皆心議霍將軍女亦未有言上乃詔求微時故劒大臣知旨白立許婕妤爲皇后孝宣霍皇后漢書曰孝宣霍皇后光女也母顯旣使女醫陰殺許后顯因爲女成君衣􅀘治入宫漢書曰孝宣許后起微賤登至尊從官車服甚節儉五日一朝皇太后於長樂宫親奉案上食以婦道供養及霍后立亦循許后故事而皇太后親霍后之姊子故常竦體敬而禮之皇后輿駕侍從甚盛賞賜官屬以千萬計與許后時懸絶矣孝宣王皇后漢書曰孝宣王皇后父奉光少時好􅃲雞宣帝在人間數與奉光㑹相識奉光有女年十餘每欲適人所當適者輒死故乆不行及宣帝即位召入後宫稱爲婕妤霍皇后廢後上憐太子蚤失母幾爲霍氏所害於是乃選後宫素謹朴而無子者遂立王婕妤爲皇后令母養太子元帝即位爲皇太后成帝即位爲太皇太后時成帝母亦姓王氏故號太皇太后爲卭城太后年七十餘崩以后父奉光封卭城侯故號之孝元王皇后漢書曰孝元王皇后王莾之姑也王賀字翁孺爲武帝繡衣御史逮捕魏郡盗皆縱不誅以奉使不稱免歎曰吾聞活千人者有封吾所活者萬餘人後世其興乎翁孺旣免而與東平陵終氏爲怨廼徙魏郡元城委粟里爲三老魏郡人德之元城建公曰元城縣建公姓名也昔春秋沙麓崩􅀳史卜之曰隂爲陽雄土火相乗此􅀛繇文隂元后陽漢也王氏舜後土也漢火故曰土火相乗隂盛而沙麓崩故有沙麓崩後六百四十五年冝有聖女興其齊田乎今王翁孺徙正值其地日月當之元城郭東有五麓之墟即沙麓地也後八十年有貴女興天下云翁孺生禁字雅君禁生女政君即元后也􅀄母李親妊政君在身夢月入其懷及壯大婉順得婦人道常許嫁未行所許者死後東平王娉政君爲􅁎未入王薨禁獨怪之使􅁲數者相政君當大貴不可言禁心以爲然乃教書學鼓琴五鳯中獻政君年十八矣入掖庭爲家人子皇后擇後宫可以娯侍太子者政君與在其中及太子朝皇后迺見政君等五人微令旁長御問知太子所欲太子殊無意於五人者不得已於皇后強應曰此中一人可是時政君坐近太子又獨衣絳縁遂送政君於太子宫見内殿得御幸有娠甘露三年生成帝於甲館畫堂爲丗嫡皇孫宣帝崩太子即位是爲孝元皇帝立太孫爲太子以母王妃爲皇后哀帝即位爲太皇太后哀帝崩無子以莽爲大司馬共徴立中山王奉哀帝後是爲平帝平帝年九歳常􅀍病太皇太后臨朝漢傳國璽以孺子未立璽藏長樂宫及莽即位請璽太后不肯以授莽莽使安陽侯舜諭旨舜素謹飭太后雅愛信之舜旣見太后知其爲莽求璽怒罵之曰而屬父子宗族蒙漢家力富貴累代旣無以報受人􅀉託乗便利時奪取其國不復顧恩義爲人如此者狗猪不食其餘天下豈有而兄弟耶且􅀂自以金匱符命爲新皇帝變更正朔服制亦當自更作璽傳之萬世何以用此亡國不祥璽爲欲求之我漢家老寡婦旦暮且死欲與此璽俱葬終不可得太后因泣涕莽欲脅之廼出璽投之地莽改號太后爲新室文母絶之於漢太后年八十四建國五年二月癸丑崩三月乙酉合葬渭陵孝元傅皇后漢書曰孝元􅀓昭儀哀帝祖母也父河内温人昭儀少爲上官太后才人自元帝爲太子得進漢書曰孝元􅀓皇后帝即位爲婕妤甚有寵爲人有才下至宫人左右飲酒酹地皆祝延之信都馮太后漢書曰孝元馮昭儀平帝祖母也元帝即位二年以選入後宫就館生男拜爲婕妤父奉世婕妤内寵與傅昭儀等建始中上漢書曰元帝建始中幸虎圈􅃲獸後宫皆㘴熊佚出圈攀檻欲上殿}
