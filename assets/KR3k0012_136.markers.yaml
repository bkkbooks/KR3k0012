  - {type: variant, offset: 6121, length: 0, content: '', krp: 知也徃古國家所以亂也由主少母壯女王獨居驕蹇淫亂自恣莫能禁也汝不聞吕后邪故諸爲武帝生子者無男女其母莫不譴死豈可謂非賢聖哉漢書曰孝武鉤弋趙婕妤家在河間武帝廵狩過河間望氣者言此室有竒女天子氣使使召之旣至兩手皆拳上自披之手即時伸由是得}
  - {type: variant, offset: 6122, length: 1, content: 姬, SBCK: 號曰拳夫人進爲婕妤居鉤弋宫大}
  - {type: variant, offset: 6122, length: 0, content: '', WYG: 號曰拳夫人進為婕妤居鉤弋宫大有寵元始三年生昭帝號鉤弋子妊身十四月乃生上曰聞昔堯十四月而生今鉤弋亦然乃命其所生門曰堯母門昭帝即位追尊為皇太后漢武故事曰拳夫人進為婕妤居鉤弋宫解黄帝素女之術從上至甘泉因幸告上曰妾相運正應為陛下生一男男七歳妾當死今年必死宫中多蠱氣必傷聖體言終而卧遂卒既殯香聞十餘里因葬雲陵上哀悼又疑非常人發冢空棺無尸唯衣履存焉起通靈臺於甘泉常有一青鳥集臺上往來至宣帝時乃止列仙傳曰鉤弋夫人姓趙氏好學沈靜病卧六年右手拳飲食少望氣者云東方有貴人氣推而得之召到姿色甚偉帝披其手得一鉤而手尋展既生昭帝武帝害之殯尸不冷而香數月昭帝即位更葬之棺空但有衣履故名其宫曰鉤翼後避諱改為弋孝昭上官皇后漢書曰孝昭上官皇后隴西上邽人祖父桀因材力親近為侍中昭帝始立年八歳帝姊鄂邑長公主居禁中共養帝時上官安有女因丁外人聞之長公主召入為婕妤月餘為皇后年甫六歳安以后父封侯桀謀反發覺后以少不預謀亦以霍光外孫不廢宣帝即位為太皇太后建昭二年崩合葬平陵衞太子史戾后漢書曰衞太子史良姊宣帝祖母也太子有妃有良娣有孺子妻妾凡三等子皆稱皇孫史良娣生男進號史皇孫武帝末巫蠱事起衞太子及良娣史皇孫皆遭害史皇孫王悼后漢書曰史皇孫王夫人宣帝母也名翁須太始中得幸於史皇孫皇孫妻妾無號位皆稱家人子政和二年生宣帝帝生數月衞太子皇孫敗家人子皆坐誅莫有收葬者唯宣帝得全即尊位後追尊母夫人諡曰悼后祖母史良娣曰戾后皆改葬孝宣許皇后漢書曰孝宣許皇后元帝母也父廣漢昌邑人為暴室嗇夫廣漢有女平君十四五當為内者令歐侯氏子婦臨當入歐侯子死其母將行卜相言當大貴母獨喜張賀聞許嗇夫有女乃置酒請之酒酣為言曾孫可妻也廣漢許諾明日嫗聞之怒廣漢重令為介遂與曾孫及立為帝平君為婕妤是時霍將軍有小女與皇太后有親公卿議更立皇后皆心儀霍將軍女亦未有言上乃詔求㣲時故劍大臣知指白立許偼伃為皇后明年許皇后當娠病女醫淳于衍受霍氏指取附子以飲皇后遂崩諡曰恭哀皇后孝宣霍皇后漢書曰孝宣霍皇后光女也母顯既使女醫隂殺許后顯因為女成君衣補治入宫具師古曰謂縫作嫁時衣被也勸光内之立為皇后初許后起微賤登至尊從官車服甚節儉五日一朝皇太后於長樂宫親奉案上食以婦道供養及霍后立亦循許后故事而皇太后親霍后之姊子故常竦體敬而禮之皇后輿駕侍從甚盛賞賜官屬以千萬計與許后時懸絶矣後殺許后事泄后廢處昭臺宫孝宣王皇后漢書曰孝宣王皇后父奉光少時好鬬雞宣帝在民間數與奉光㑹相識奉光有女年十餘歳每欲適人所當適者輒死故久不行及宣帝即位召入後宫稱為婕妤霍皇后廢後上憐太子蚤失母幾為霍氏所害於是乃選後宫素謹慎而無子者遂立王婕妤為皇后令母養太子元帝即位為皇太后成帝即位為太皇太后時成帝母亦姓王氏故號太皇太后為邛成太后年七十餘崩以后父奉光封邛成侯故號之孝元王皇后漢書曰孝元王皇后王莽之姑也王賀字翁孺為武帝繡衣御史逮捕魏郡盜皆縱不誅以奉使不稱免歎曰吾聞活千人者有封子孫吾所活者萬餘人後世其興乎翁孺既免而與東平陵終氏為怨乃徙魏郡元城委粟里為三老魏郡人徳之元城建公曰元城縣建公姓名也昔春秋沙麓崩晉史卜之曰隂為陽雄土火相乗此龜繇文隂元后也陽漢也王氏舜後土也漢火也故曰土火相乗隂盛而沙麓崩故有沙麓崩後六百四十五年宜有聖女興其齊田乎今王翁孺徙正直其地日月當之元城郭東有五鹿之虛即沙麓地也後八十年當有貴女興天下云翁孺生禁字稚君禁生女政君即元后也初母李親妊政君在身夢月入其懐及壯婉順得婦人道常許嫁未行所許者死後東平王聘政君為}
