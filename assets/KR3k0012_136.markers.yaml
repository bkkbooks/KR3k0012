  - {type: variant, offset: 6146, length: 2, content: 不謹, WYG: 漢書曰孝元馮昭儀平帝祖母也元帝即位二年以選入後宫後五年就館生男拜為婕妤父奉世為右將軍光禄勲奉世長男野王為左馮翊議者以為器能當其位而婕妤内寵與傅昭儀等建始中上}
