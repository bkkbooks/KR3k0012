  - {type: variant, offset: 3639, length: 38, content: 飢天帝以氣食年二十寄伊長孺家無夫出觀三河之首常若有神隨之有赤龍負圖至署曰赤帝, SBCK: ''}
  - {type: variant, offset: 3639, length: 428, content: 飢天帝以氣食年二十寄伊長孺家無夫出觀三河之首常若有神隨之有赤龍負圖至署曰赤帝起成天寶即慶都之翼之野奄然陰風雨龍與慶都合有身龍消不見乳堯漢書云堯母十四月生堯帝王世紀搜神記同史記曰嚳娶陳豐生放勳又曰后稷棄母有邰氏女曰姜嫄為帝嚳元妃出野見巨人跡心欣然說欲踐之身重如孕者居期而生子以為不祥棄之隘巷以為神收養之初欲棄之因名棄毛詩生民曰厥初生民時維姜嫄生民本后稷也姜姓也后稷之母配高辛氏帝焉史記曰殷契母曰簡狄有娀氏女為帝嚳次妃三人行浴見玄鳥遺其卵簡狄取而吞之因孕生契世本曰帝嚳卜其四妃四妃之子而皆有天下元妃有邰國之女曰姜嫄是產后稷次妃有娀氏之女簡狄是產契次妃曰陳豐是生帝堯次妃曰娵訾產帝摯帝王世紀曰娵訾班在四人下生摯最長故登帝位堯妃世本曰堯娶散宜氏子謂之女皇宋忠曰是生丹朱帝系漢書同帝王世紀曰女瑩生丹朱漢書亦云女瑩舜母河圖著命曰女登見大虹意感生舜於姚墟史記曰舜母早死瞽瞍更娶後妻生象傲舜二妃尚書曰師錫帝曰有鰥在下曰虞舜岳曰瞽子父頑母嚚象傲克諧以孝烝烝乂不格姦帝曰我其試, WYG: 快}
