  - {type: variant, offset: 6195, length: 1, content: 假, SBCK: 園王莽秉政乃奏貶傅太后號曰定陶恭王母丁太后號曰丁􅁎元始五年莽復奏恭王母及丁􅁎葬渭陵􅃁髙與元帝山齊禮有改葬謂發王母及丁􅁎􅃁徙歸定陶太后以爲旣巳之事不湏發莽固爭之太后詔曰因故棺爲致槨作􅃁祠以太牢旣發􅀓太后􅃁崩壓殺數百人開丁􅁎椁戸火出炎四五丈吏卒以水沃滅乃得入燒燔椁中器物莽復奏言前恭王母生僭居桂宫皇天震怒災其正殿丁􅁎死莽踰制度今火焚其椁此天見變以告當改如媵妾也共王母及丁􅁎椁棺皆名梓宫珠玉之衣非藩妾服請更以木椁代去珠玉葬丁􅁎媵妾之禮奏可旣開􅀓太后棺臭聞數里掘平恭王母丁􅁎故􅃁二旬間皆平莽又周􅁄其處以爲時戒云時有羣鷰數千衘土投􅃁中孝哀􅀓皇后漢書曰孝哀􅀓皇后定陶􅀓太后弟子也哀帝爲定陶王時􅀓太后欲重親取以配王帝崩王莽白太后令孝哀皇后退就桂宫後月餘復與孝成趙皇后俱廢爲庶人就其園自殺孝平母衛􅁎漢書曰中山衛􅁎平帝母也}
