  - {type: variant, offset: 3456, length: 182, content: 世紀曰昌意生妃謂之女樞金天氏末生顓頊於弱水搜神記同顓頊妃世本曰顓頊娶于勝墳氏宋忠注曰國名之子謂女祿是生老童帝系云勝奔氏餘同帝嚳四妃河圖曰慶都與赤龍合生帝於伊堯世記云從母姓毛詩曰天命玄鳥降而生商宅殷土茫茫春秋元命苞曰周本姜嫄遊閉宮其地扶桑履大跡生后稷春秋合誠圖曰堯母慶都有名於世蓋太常之女生於斗維之野常在三河之東南天大雷電有血流潤大石之中生慶都長大常有黃雲覆蓋之夢食, WYG: 及兄弟豈}
