  - {type: variant, offset: 6123, length: 0, content: '', WYG: 未入王薨禁獨怪之使卜數者相政君當大貴不可言禁心以為然乃教書學鼓琴五鳳中獻政君年十八矣入掖庭為家人子皇后擇後宫可以娛侍太子者政君與在其中及太子朝皇后乃見政君等五人微令旁長御問知太子所欲太子殊無意於五人者不得已於皇后強應曰此中一人可是時政君坐近太子又獨衣綘縁諸于長御即以為皇后使送政君於太子宫見丙殿得御幸}
