  - {type: variant, offset: 4980, length: 719, content: 仲尚為妾及立為后乃生紂紂妃史記曰紂伐有蘇有蘇人以妲己女焉紂愛妲己妲己之言是從武王殺之斬以玄戈懸之小白旗世本又載列女傳曰妲已者殷紂之妃也紂伐有蘇有蘇女以妲已美而辯用心邪僻夸比於體戚施於貌紂好酒淫樂不離妲己所譽者貴之所憎者誅之周大王妃毛詩曰古公亶父來朝走馬率西水滸至于岐下爰及姜女聿來胥宇又曰摯仲氏任自彼殷商來嫁于周曰嬪于京乃及王季維德之行摯國任姓史記曰古公太姜生少子季歷季歷娶大妊皆賢婦人生子曰昌列女傳曰太姜者太王之妃有台之女曰賢而有色生太伯仲雍王季化導三子皆成賢德太王有事必諮謀焉王季妃河圖著命曰太妊夢長人感己生文王毛詩曰思齊太妊文王之母思媚周姜京室之婦列女傳曰太妊者王季之妃摯任之女也端懿誠莊維德之行及其有娠也目不視惡色耳不聽淫聲口不放言溲于豕牢而生文王文王生而明聖太妊教以一而知其百卒為周宗君子謂太妊為能胎教文王妃毛詩曰天監在下有命既集文王初載天作之合在洽之陽在渭之涘纘女維莘長子維行纘繼也莘大莘國也長子長女篤生武王箋云大姒厚生聖子武王又曰大姒嗣徽音則百斯男論語泰伯曰武王曰子有亂臣十人馬融曰亂理也十人謂周公旦召公奭公太公望畢公榮虢叔閎天散宜生太顛南宮括其一人謂文母也孔子曰才難不其然乎唐虞之際於斯為盛有婦人焉九人而已列女傳曰大姒者文王之妃莘姒之女也號曰文母武王妃左傳曰子產曰當武王邑姜方娠太叔杜預曰邑姜武王后齊太公之女也懷胎為娠太叔成王之弟叔虞者夢帝謂己余命而子曰虞帝天也虞唐君之名將與之唐屬諸參而蕃育其子孫及生有文在手曰虞遂以命之帝王世紀曰武王納太公之女曰邑姜脩教于內生太子誦宣王后璅語曰元妃獻后生子不恒其月而生后弗敢舉王召群吏問將棄之仲山甫曰天將以是棄周棄之何益且卜筮言何必從乃弗棄列女傳曰周宣姜后者齊侯之女也宣王嘗夜臥而晏起后, SBCK: ''}
