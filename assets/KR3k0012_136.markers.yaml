  - {type: variant, offset: 6117, length: 1, content: 呂, SBCK: 鉤弋夫人姓趙氏河間人也得幸武帝生子一人即昭帝也武帝年七十乃生昭帝昭帝立時年五歳衛太子廢上居甘泉宫召􅀞工圖􅀞周公􅀒成王於是左右羣臣知武帝意欲立少子後數日帝譴責鉤弋夫人脫簪珥叩頭帝曰引將去送掖庭獄夫人還顧帝曰趨行女}
  - {type: variant, offset: 6117, length: 1, content: 呂, WYG: 鉤弋夫人姓趙氏河間人也得幸武帝生子一人昭帝是也武帝年七十乃生昭帝昭帝立時年五歳衞太子廢上居甘泉宫召畫工圖周公負成王於是左右羣臣知武帝意欲立少子也後數日帝譴責鉤弋夫人夫人脫簪珥叩頭帝曰引持去送掖庭獄夫人還顧帝曰趣行女}
  - {type: page-break, offset: 6117, content: '', id: KR3k0012_WYG_136-9b, image: WYG0894/WYG0894-0260d.png}
  - {type: variant, offset: 6117, length: 1, content: 呂, krp: 鉤弋夫人姓趙氏河間人也得幸武帝生子一人即昭帝也武帝年七十乃生昭帝昭帝立時年五歳衛太子廢上居甘泉宫召畫工圖畫周公負成王於是左右羣臣知武帝意欲立少子後數日帝譴責鉤弋夫人脫簪珥叩頭帝曰引將去送掖庭獄夫人還顧帝曰趨行女}
  - {type: variant, offset: 6119, length: 1, content: 韋, SBCK: 得活夫人死雲陽宫時暴風楊塵百姓感傷使者夜持棺徃葬之封識其處其後帝間居云問左右曰人言何云左右對曰人言以爲且立其子何爲去其母乎帝曰然是非兒曹愚人}
  - {type: page-break, offset: 6119, content: '', id: KR3k0012_SBCK_136-6a}
  - {type: variant, offset: 6119, length: 1, content: 韋, WYG: 得活夫人死雲陽宫時暴風揚塵百姓感傷使者夜持棺往葬之封識其處其後帝閒居問左右曰人言云何左右對曰人言且立其子何為去其母乎帝曰然是非兒曹愚人}
  - {type: variant, offset: 6119, length: 1, content: 韋, krp: 得活夫人死雲陽宫時暴風楊塵百姓感傷使者夜持棺徃葬之封識其處其後帝間居云問左右曰人言何云左右對曰人言以爲且立其子何爲去其母乎帝曰然是非兒曹愚人}
  - {type: variant, offset: 6121, length: 0, content: '', SBCK: 知也徃古國家所以亂也由主少母壯女王獨居驕蹇􅁋亂自恣莫能禁也汝不聞吕后邪故諸爲武帝生子者無男女其母莫不譴死豈可謂非賢聖哉漢書曰孝武鉤弋趙婕妤家在河間武帝廵狩過河間望氣者言此室有竒女天子氣使使召之旣至兩手皆拳上自披之手即時伸由是得}
  - {type: variant, offset: 6121, length: 0, content: '', WYG: 知也往古國家所以亂也由主少母壯女主獨居驕蹇淫亂自恣莫能禁也汝不聞吕后耶故諸為武帝生子者無男女其母莫不譴死豈可謂非賢聖哉漢書曰孝武鉤弋趙婕妤家在河間武帝巡狩過河間望氣者言此有竒女天子亟使使召之既至兩手皆拳上自披之手即時伸由是得}
