  - {type: variant, offset: 6125, length: 0, content: '', WYG: 甘露三年生成帝於甲館畫堂為世適皇孫宣帝崩太子即位是為孝元皇帝立太孫為太子以母王妃為皇后哀帝即位為太皇太后哀帝崩無子以莽為大司馬共徴立中山王奉哀帝後是為平帝平帝年九歳常被疾太皇太后臨朝平帝崩無子莽立孺子踐祚居攝太后不以為可力不能禁於是莽遂為攝皇帝其後莽遂以符命自立為真皇帝漢傳國璽以孺子未立璽藏長樂宫及莽即位請璽太后不肯以授莽莽使安陽侯舜諭㫖舜素謹飭太后雅愛信之舜既見太后知其為莽求璽怒罵之曰汝屬父子宗族蒙漢家力富貴累世既無以報受人寄託乗便利時奪取其國不復顧恩義為人如此者猪狗不食其餘天下豈有}
  - {type: page-break, offset: 6125, content: '', id: KR3k0012_WYG_136-15b, image: WYG0894/WYG0894-0263d.png}
  - {type: variant, offset: 6126, length: 4, content: 進之于楚, SBCK: ''}
  - {type: variant, offset: 6126, length: 0, content: '', WYG: 兄弟耶且若自以金匱符命為新皇帝變更正朔服制亦當自更作璽傳之萬世何用此亡國不祥璽而欲求之我漢家老寡婦旦暮且死欲與此璽俱葬終不可得太后因涕泣恐莽欲脅之乃出璽投之地莽改號太后為新室文母絶之於漢太后年八十四建國五年二月癸丑崩三月乙酉合葬渭陵孝元傅皇后漢書曰孝元傅昭儀哀帝祖母也父河内温人昭儀少為上官太后才人自元帝為太子得}
