  - {type: variant, offset: 3097, length: 1, content: 炎, SBCK: 太上皇名執嘉妃曰媪爲昭靈后陳留風俗傳曰沛公起兵野戰喪皇妣于黃郷天下平定乃使使者以梓宫招魂於幽野於是有丹蛇在水自洒濯入于梓宫其浴處有遺髪故謚曰昭靈后黃郷今小黃縣也髙祖吕皇后漢書曰髙祖后吕皇后父吕公單父人也好相人髙祖微時吕公見而異之乃以女妻髙祖生惠}
  - {type: page-break, offset: 3097, content: '', id: KR3k0012_SBCK_136-2a}
  - {type: variant, offset: 3097, length: 1, content: 炎, WYG: 太上皇名執嘉妃曰女媪是為昭靈后陳留風俗傳曰沛公起兵野戰喪皇妣於黄鄉天下平定乃使使者以梓宫招魂於幽野於是有丹蛇在水自洒濯入於梓宫其浴處有遺髪故諡曰昭靈后黄鄉今小黄縣也高祖吕皇后漢書曰高祖后吕皇后父吕公單父人也好相人高祖微時吕公見而異之乃以女妻高祖生惠}
  - {type: variant, offset: 3097, length: 1, content: 炎, krp: 太上皇名執嘉妃曰媪爲昭靈后陳留風俗傳曰沛公起兵野戰喪皇妣于黃郷天下平定乃使使者以梓宫招魂於幽野於是有丹蛇在水自洒濯入于梓宫其浴處有遺髪故謚曰昭靈后黃郷今小黃縣也髙祖吕皇后漢書曰髙祖后吕皇后父吕公單父人也好相人髙祖微時吕公見而異之乃以女妻髙祖生惠}
  - {type: variant, offset: 3099, length: 2, content: 神農, SBCK: 魯元公主後漢王得定陶戚夫人愛幸生趙王如意吕后爲人剛毅佐髙帝定天下髙祖崩惠帝立吕后爲太后乃令永巷囚戚夫人髠鉗衣赭衣令春戚夫人舂且歌曰子爲王}
  - {type: variant, offset: 3099, length: 2, content: 神農, WYG: 魯元公主後高祖得定陶戚夫人愛幸生趙王如意吕后為人剛毅佐高祖定天下高祖崩惠帝立吕后為皇太后乃令永巷囚戚夫人髠鉗衣赭衣令舂戚夫人舂且歌曰子為王}
  - {type: page-break, offset: 3099, content: '', id: KR3k0012_WYG_136-3a, image: WYG0894/WYG0894-0257c.png}
  - {type: variant, offset: 3099, length: 2, content: 神農, krp: 魯元公主後漢王得定陶戚夫人愛幸生趙王如意吕后爲人剛毅佐髙帝定天下髙祖崩惠帝立吕后爲太后乃令永巷囚戚夫人髠鉗衣赭衣令春戚夫人舂且歌曰子爲王}
  - {type: variant, offset: 3102, length: 0, content: '', SBCK: 爲虜終日舂薄暮常與死爲伍相離三千里當誰使告汝太后聞之大怒}
  - {type: variant, offset: 3102, length: 0, content: '', WYG: 為虜終日舂薄暮常與死為伍相離三千里當誰使告汝太后聞之大怒}
  - {type: variant, offset: 3102, length: 0, content: '', krp: 爲虜終日舂薄暮常與死爲伍相離三千里當誰使告汝太后聞之大怒}
  - {type: variant, offset: 3103, length: 2, content: 佳姒, SBCK: 乃欲􅀝汝子邪乃召趙王欲誅之使者三反趙相周昌不遣太后召趙相相至長安使人復召趙王王來惠帝慈仁知太后怒自迎趙王灞上入挾趙王與起居飲食數月帝晨出射趙王不能早起太后伺其獨居使持鴆飲之迨帝還趙王死太后遂斷戚夫人手足去眼燻耳飲瘖藥使居鞠域中名曰人􅇾居數月召惠帝視人􅇾帝視而問知其戚夫人廼大哭因病歳餘不能起使人請太后曰此非人所爲臣爲太后子終不能復治天下以此日飲爲滛樂不聽政七年而崩立孝惠後宫子爲帝太后臨朝稱制后治天下八年病大禍而崩髙祖薄皇后漢書曰髙祖薄􅁎文帝母也父呉人􅁗時與故魏王宗女魏媪通生薄􅁎魏豹立爲王而魏媪内其女於魏宫許􅀒相薄􅁎當生天子曹參等虜魏王薄􅁎輸織室詔内後宫􅀊餘不得幸始􅁎少時與管夫人趙子兒相愛約曰先貴無相忘巳而管趙先幸漢王四年㘴河南城靈臺此兩羙人侍相與􅀏薄􅁎􅀄時約漢王問其故兩人俱以實告漢王心悽然憐薄􅁎是日召欲幸之對曰昨暮夢龍據妾胷上曰是貴徴也吾爲汝成之遂幸}
  - {type: page-break, offset: 3103, content: '', id: KR3k0012_SBCK_136-2b}
  - {type: variant, offset: 3103, length: 2, content: 佳姒, WYG: 乃欲倚汝子耶乃召趙王誅之使者三反趙相周昌不遣太后召趙相相徴長安使人復召趙王王來惠帝慈仁知太后怒自迎趙王霸上入宫挾與起居飲食數月帝晨出射趙王不能早起太后伺其獨居使人持鴆飲之遲帝還趙王死太后遂斷戚夫人手足去眼熏耳飲瘖藥使居鞠域中名曰人彘居數月召惠帝視人彘帝視而問知其戚夫人乃大哭因病歳餘不能起使人請太后曰此非人所為臣為太后子終不能復治天下以此日飲為淫樂不聽政七年而崩立孝惠後宫子為帝太后臨朝稱制后持天下八年病犬禍而崩高祖薄皇后漢書曰高祖薄姬文帝母也父吳人秦時與故魏王宗女魏媪通生薄姬魏豹立為王而魏媪内其女於魏宫許負相薄姬當生天子曹參等虜魏王薄姬輸織室詔内後宫歳餘不得幸始姬少時與管夫人趙子兒相愛約曰先貴無相忘已而管趙先幸漢王四年坐河南成臯靈臺此兩美人侍相與笑薄姬初時約漢王問其故兩人俱以實告漢王心悽然憐薄姬是日召欲幸之對曰昨暮夢龍據妾胸上曰是貴徴也吾為汝成之遂幸}
