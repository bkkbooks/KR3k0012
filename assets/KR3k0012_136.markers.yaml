  - {type: variant, offset: 121, length: 537, content: 以風天下而正夫婦也關關睢鳩在河之洲窈窕淑女君子好俅又曰葛覃后妃之本也后妃在父母家則志在於女功之事躬儉節用服澣濯之衣尊敬師傅則可以歸安父母化天下以成婦道也又曰卷耳后妃之志也又當輔佐君子求賢審官知臣下之勤勞內有進賢之志而無險詖私謁之心朝夕思念至於憂勤也采采卷耳不盈頃筐嗟我懷人寘彼周行又曰樛木后妃逮下也言能逮下而無嫉妬之心焉南有樛木葛藟虆之樂只君子福履綏之又曰螽斯后妃子孫眾多也言若螽斯不妬忌則子孫眾多也螽斯羽詵詵兮宜爾子孫振振兮又曰桃夭后妃之所致也不妬忌則男女以正婚姻以時國無鰥民也桃之夭夭灼灼其華之子于歸宜其室家又曰兔罝后妃之化也關睢之化行則莫不好德賢人眾多也肅肅兔罝㭬之丁丁赳赳武夫公侯干城又曰芣苢后妃之美也天下和平則婦人樂有子矣采采芣苢薄言采之又曰雞鳴思賢妃也哀公荒淫怠慢故陳賢妃貞女夙夜警戒相成之道焉禮記曰天子之妃曰后鄭玄注曰后之言後也又婚義曰古者天子后立六宮三夫人九嬪二十七世婦八十一御妻以德天下之內治以明章天下之婦順故內和而家理天子立六官三公九卿二十七大夫八十一元士以聽天下之外治以明章天下之男教故外和而國治故曰天子聽男教后聽女順天子理陽道后治陰德天子聽外治后聽內職教順成俗外內和順國家治理此之謂盛德白虎通曰天子之妃謂之后何后者君也天子妃至尊故謂君也明海內之小君也, SBCK: 賔客}
