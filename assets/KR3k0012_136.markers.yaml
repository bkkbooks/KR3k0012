  - {type: variant, offset: 6176, length: 0, content: '', SBCK: 􅀓昭儀等皆驚走馮婕妤直前當熊而立左右格殺熊上問人情驚懼何故前當熊婕妤對曰妾聞猛獸得人而止妾恐熊至御坐故以身當之元帝嗟嘆以此倍敬重焉孝成許皇后漢書曰孝成許皇后平恩侯嘉女元帝悼傷母恭哀后居位日淺而遭霍氏之􅇳故選嘉女以配皇太子侍送者還白太子忻􅀃狀元帝喜謂左右酌酒賀我左右皆稱萬歳乆之及成帝即位立許妃爲皇后后聦慧善史書自爲妃至即帝位后常寵於上後宫稀得進見乆之皇后寵亦益衰而後宫多新愛姉平安侯夫人謁等爲媚道祝詛後宫有娠者太后大怒下吏考問謁等誅死許后㘴廢處昭臺宫孝成帝趙皇后漢書曰孝成趙皇后夲長安宫人初屬陽阿主家學歌舞號曰飛鷰成帝甞微行出過陽阿主作樂上見飛鷰而說之召入宫大幸有女弟復召入}
  - {type: page-break, offset: 6176, content: '', id: KR3k0012_SBCK_136-10b}
  - {type: variant, offset: 6176, length: 0, content: '', WYG: 𫝊昭儀等皆驚走馮婕妤直前當熊而立左右格殺熊上問人情驚懼何故前當熊婕妤對曰妾聞猛獸得人而止妾恐熊至御坐故以身當之元帝嗟嘆以此倍敬重焉孝成許皇后漢書曰孝成許皇后平恩侯嘉女也元帝悼傷母恭哀后居位日淺而遭霍氏之辜故選嘉女以配皇太子侍送者還白太子懽悦狀元帝喜謂左右酌酒賀我左右皆稱萬歳久之及成帝即位立許妃為皇后后聰慧善史書自為妃至帝即位常寵於上後宫稀得進見久之皇后寵亦益衰而後宫多新愛姊平安剛侯夫人謁等為媚道祝詛後宫有娠者太后大怒下吏考問謁等誅死許后坐廢處昭臺宫孝成趙皇后漢書曰孝成趙皇后本長安宫人初屬陽阿主家學歌舞號曰飛燕成帝嘗微行出過陽阿主作樂上見飛燕而說之召入宫大幸有女弟復召入}
