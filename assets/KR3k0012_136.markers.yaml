  - {type: variant, offset: 5877, length: 235, content: 曰龍吐沫龍之精氣也龍亡而漦在櫝而藏之三代莫敢發至厲王之末發而觀之漦流于庭不可除王使婦人倮而譟之釐化為玄龜入王後宮童妾既齓而遭之既笄而孕無夫而生子懼而棄之宣王之時童謠曰厭孤箕服實亡周國有夫婦賣是器者見後宮童妾所棄妖子聞其啼哀而收之夫婦亡奔襃襃人有罪請入所棄女是為襃姒幽王愛之生伯服廢申后而以襃姒為后襃姒不好笑幽王欲其笑萬方不笑烽火大鼓譟諸侯悉至至而無寇襃姒乃大笑幽王數為舉烽申侯怒與西夷犬戎攻殺王虜襃姒史記列女傳世紀並同也列女傳曰幽王出入與襃姒同乘弋獵不時以適襃姒意秦始皇, SBCK: 趙}
