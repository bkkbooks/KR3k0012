  - {type: variant, offset: 1474, length: 1618, content: 帷薄不脩孝文衽席無辯然而選納尚簡飾玩少華自武元之後世增淫費至乃掖庭三千增級十四妖倖毀政之符外姻亂邦之跡前史載之詳矣及光武明德中興斫琱為璞六宮稱號唯皇后貴人貴人金印紫綬俸不過粟數十斛又置美人宮人采女三等並無爵秩歲時賞賜充給而巳漢法常因八月筭人遣中大夫與掖庭丞及相工於洛陽鄉中閱視良家童女年十三巳上二十巳下姿色端麗合法相者載還後宮擇視可否乃用登御所以明慎娉納詳求淑哲明帝聿遵先旨宮教頗修登建後必先令德內無出閫之言權無私溺之授可謂矯其獘矣向使因設外戚之禁編著甲令改正后妃之制貽厥方來豈不休哉雖御已有度而防閑未篤故孝章以下漸用色授恩隆好合遂志淄蠹自古雖主幼時艱王家多舋必委成冢宰簡求忠賢未有專任婦人斷割重器唯秦芊太后始攝政事故穰侯權重於昭王家富於嬴國漢仍其謬知患莫改東京皇統屢絕權歸女主外立者四帝臨朝者六后莫不定策帷帟委事父兄貪孩童以久其政抑明賢以專其威任重道悠利深禍速身犯霧露於靈臺之上家嬰縲絏於圄犴之下湮滅連踵傾輈繼路而赴蹈不息燋爛為期終於陵夷大運淪亡神寶詩書所歎略同一揆魏志曰魏因漢法母后之號皆如舊制自夫人以下世有增損太祖建國始命王后其下五等有夫人有昭儀有婕妤有華容有美人文帝增貴嬪淑媛脩容順成良人明帝增淑妃昭華脩儀除順成官太和中始復命夫人登其位於淑妃之上自夫人以下爵凡十二等又曰黃初三年詔曰婦人與政亂之本也自今已後群臣不得奏事太后后族之家不得當輔政之任又不得橫授茅土之爵以此詔傳後世若有背違天下共誅之殷融議后父不應拜后曰天性之至父子之道人倫之序君臣之義性至因親故情禮無二義序緣敬故尊嚴無上易曰有父子然後有君臣有君臣然後禮義生焉故資父事君教之至也君不以貴而臣其所尊故子爵不加於父也夫以帝王之尊猶無臣妾父母之義況后從尊於帝而令母執臣妾邪而鄭玄復云公朝典歸寧別有二制尊卑迭用拜謁更牙亦未詳斯議為何所據晉張華女史箴曰茫茫造化二儀始分散氣流形既陶既甄在帝庖犧肇經天人爰始夫婦以及君臣家道以正而王猷有倫婦德尚柔含章貞吉嬺婉淑慎正位居室施衿結褵虔恭中饋肅慎爾儀式瞻清懿樊姬感莊不食鮮禽衛女矯桓耳忘知音志厲義高而二主易心玄熊攀檻馮媛趨進夫豈無畏知死不恡班妾有辟割歡同輦夫豈不懷防微慮遠道罔隆而不殺物無盛而不衰日中則昊月滿則微崇猶塵積替若駭機人咸知飾其容而莫知飾其性性之不飾或愆禮正斧之藻之克念作聖出其言善千里應之茍違斯義則同衾以疑夫出言如微而榮辱由茲勿謂幽昧靈鑒無象勿謂玄漠神聽無響無矜爾榮天道惡盈無恃爾貴隆隆者墜鑒于小星戒彼攸遂比心螽斯則繁爾類歡不可以黷寵不可以專專實生慢愛極則遷致盈必損理有固然美者自美翩以取尤冶容求好君子所讎結恩而絕職此之由故曰翼翼矜矜福所以興靖恭自思榮顯所期女史司箴敢告庶姬後魏書曰魏氏王業之兆雖始於神元至於昭成世崇儉質妃嬙嬪御率多闕焉唯以次第為稱而章平思昭穆惠煬列八帝妃后無聞道武追尊祖妣皆從帝謚為皇后始立中宮餘妾或稱夫人多少無限然皆品次太武始增左右昭儀及貴人椒房後魏書曰後魏故事將立皇后必令手鑄金人以成者為吉不成則不得立也又太武文成保母劬勞之恩並極尊崇之義雖事乖典禮而觀過知仁北史曰周氏率由姬制內職有序文帝創基修衽席以儉約武皇嗣歷節情慾於矯枉宮闈有貫魚之美戚里無私溺之尤可謂得君人之體也宣皇外行其志內逞其欲溪壑難滿採擇無厭恩之所加莫限廝皁榮之所及無隔險詖於是升蘭殿以正位踐椒庭而齊體者非一人焉階房帷而拖青紫緣恩倖而擁玉帛非一族焉雖辛癸之荒淫趙李之傾城曾未足比其髣髴也人厭苛政其事實多文帝之祀忽諸特由於此隋文思革前獘大矯其違唯皇后當室旁無私寵婦官位號未詳備焉開皇二年著內官之式略依周禮省減其數煬帝時后妃嬪御無釐婦職唯端容麗飾陪從醼遊而已帝又參詳典故自製嘉名著之於令人皇后春秋命曆序洛書擿亡辟曰人皇兄弟九人別長九州離艮地精女出為之后離艮卦所推也包犧母河圖曰燧人之世大跡出雷澤華胥履之生伏羲帝系譜曰伏羲十月四日人定生母華胥孝經河圖云伏羲在亥得人定之時神農母春秋元命苞曰女登生神子人面龍顏始為天子孝經鉤命決曰姒感龍生帝嵬魁嵬魁神農名, SBCK: ''}
