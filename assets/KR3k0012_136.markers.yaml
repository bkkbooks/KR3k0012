  - {type: variant, offset: 5741, length: 135, content: 而晏朝以見君王之樂色而志德也王曰寡人不德實自生過非夫人之罪也幽王襃后毛詩曰白華周人刺幽后也幽王取申女以為后又得襃姒而黜申后故下國化之以妾為妻以孽代宗幽后褒姒也又曰正月刺幽王也燎之方陽寧或滅之赫赫宗周襃姒威之國語曰夏之衰也二龍止於夏庭而曰余襃之二君夏帝卜請其漦而藏之乃吉韋, SBCK: 葬焉孝}
