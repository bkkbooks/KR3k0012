  - {type: variant, offset: 1153, length: 320, content: 則以金環退之當御者以銀環進者著于左手既御著于右手左者陽也以當就男故著左手右手陰也既御而復故此女史之職也後漢書曰夏殷以上后妃之制其文略矣周禮王者立后三夫人九嬪二十七世婦八十一御女以備內職焉后正位宮闈同體天王夫人坐論婦禮九嬪掌教四德世婦主喪祭賓客女御序于王之燕寢頒官分務各有典司女史彤管記功書過居有保阿之訓動有環珮之響進賢才以輔佐君子哀窈窕而不淫其色所以能述宣陰化脩成內則閨房肅雍險謁不行也故康王晚朝關睢作諷宣王晏起姜氏請愆及周室東遷禮序凋缺諸侯僣縱軌制無章齊桓有如夫人者六人晉獻升戎女為元妃終於五子作亂家嗣遘屯爰逮戰國風憲偷薄適情任欲顛倒衣裳以至破國亡身不可勝數斯固輕禮弛防先色後德者也秦并天下多自驕大官備七國爵列八品漢興因循其號而婦制莫釐高, SBCK: 遂産髙}
