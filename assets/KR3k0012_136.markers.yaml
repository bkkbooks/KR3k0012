  - {type: variant, offset: 4388, length: 324, content: 娶于塗山辛壬癸甲辛日娶妻至于甲日復往治水啟呱呱而泣予弗子塗山女史記同山海經曰太室嵩高成陽西啟母化為石在焉帝王世紀曰禹始納塗山氏女曰女媧合婚於臺桑有白狐九尾之瑞至是為攸女故連山易曰禹娶塗山之子名曰攸女生余是也列女傳曰啟母塗山者夏禹之妃塗山之女也禹娶四日而去治水啟既生呱呱而泣禹三過其門不入呂氏春秋曰禹行功見塗山之女禹未之遇南音南土遇以禮成之塗山之女乃令其妾往候禹于塗山之陽女作歌曰候人實始作南音也帝相后左傳曰伍員曰昔有過澆滅夏后相后緍方娠逃出自竇后緡相妻歸于有仍緡有仍氏女也生少康焉澆求之逃奔有虞虞思妻之以二姚楚辭曰迨少康之未家留有虞之二姚桀妃洛書錄運法孔子曰逢氏抱小女末喜觀帝孔甲悅之以為太子履癸妃國語曰桀伐蒙山而得末嬉紀年曰后桀伐岷山岷山女于桀二, WYG: 兄弟尊官夫}
