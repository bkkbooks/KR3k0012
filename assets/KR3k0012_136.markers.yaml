  - {type: variant, offset: 13, length: 1, content: 古, SBCK: 含始吞赤珠刻曰玉英生皇刻刻漏有玉英文也後赤龍感女媪劉季興春秋握成圖曰執嘉妻含始游雒池赤珠出刻曰玉英吞此}
  - {type: variant, offset: 13, length: 1, content: 古, krp: 含始吞赤珠刻曰玉英生皇刻刻漏有玉英文也後赤龍感女媪劉季興春秋握成圖曰執嘉妻含始游雒池赤珠出刻曰玉英吞此}
  - {type: variant, offset: 15, length: 105, content: 后夫人將侍君前息燭後舉燭至于房中釋朝服襲燕服然后入御史奏雞鳴于階下奏猶白階陛也然後夫人鳴佩玉于房中告去也然後應門擊柝告闢也應門朝門也辟啟也然後少師奏質明于陛下質正然後夫人入庭立君出朝毛詩曰關睢后妃之德也風之始也, SBCK: 爲王客以其年生劉季爲漢皇爲王客者爲王者}
  - {type: variant, offset: 15, length: 105, content: 后夫人將侍君前息燭後舉燭至于房中釋朝服襲燕服然后入御史奏雞鳴于階下奏猶白階陛也然後夫人鳴佩玉于房中告去也然後應門擊柝告闢也應門朝門也辟啟也然後少師奏質明于陛下質正然後夫人入庭立君出朝毛詩曰關睢后妃之德也風之始也, krp: 爲王客以其年生劉季爲漢皇爲王客者爲王者}
