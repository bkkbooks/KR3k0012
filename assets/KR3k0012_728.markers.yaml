  - {type: variant, offset: 5650, length: 234, content: 餘萬於是家業用展病者亦愈按神記同又曰韓友字光景廬江舒人也善卜占行京費厭勝之術龍舒長鄧子林婦病積年垂死醫巫皆息友為筮之使畫作野豬象著臥處屏風上一宿覺佳於是遂差舒縣廷椽王睦病卒已復魄友為卜之令以丹畫板作日月置床頭及臥虎皮馬鄣泥登時大愈劉世則女病鬼魅積年巫為祈禱伐空冢故城閒得鼉數十猶不差友筮之令作布囊女發時張囊著䆫牖閒友閉戶作氣若有所驅逐斯須之閒囊大脹如吹葱葉因便敗女仍大發友乃便作皮囊二枚沓張之施如前囊復脹滿因急縛囊口懸著樹閒二十許日漸消下開視有一二斤毛狀如狐毛女遂大差, WYG: 八}
