  - {type: variant, offset: 9, length: 3, content: 木筭易, WYG: 郭璞既過江宣城太守殷祐引為參軍時有物大如水牛灰色卑脚類象胷前尾上皆白大力而遲鈍來到城下衆咸異焉祐使人伏而取之令璞作}
  - {type: variant, offset: 10, length: 5, content: 筭易卦用蓍, SBCK: 粉碎碎時元帝初鎮建鄴導令璞筮之遇咸之井璞日東北郡縣有武名者當岀鐸以著受命之符西南郡縣有陽名者井當沸其後晉陵武進縣人於田中得銅鐸五枚厯陽縣中井沸經日乃止及帝爲晉王又使璞筮遇豫之睽璞日㑹稽當出鍾以告成功上有勒銘應在人家井沸泥中得之繇辭所謂先王以作樂崇德殷薦之上帝者}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_SBCK_728-2a}
  - {type: variant, offset: 10, length: 5, content: 筭易卦用蓍, krp: 粉碎碎時元帝初鎮建鄴導令璞筮之遇咸之井璞日東北郡縣有武名者當岀鐸以著受命之符西南郡縣有陽名者井當沸其後晉陵武進縣人於田中得銅鐸五枚厯陽縣中井沸經日乃止及帝爲晉王又使璞筮遇豫之睽璞日㑹稽當出鍾以告成功上有勒銘應在人家井沸泥中得之繇辭所謂先王以作樂崇德殷薦之上帝者}
