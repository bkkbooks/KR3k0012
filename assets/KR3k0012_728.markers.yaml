  - {type: variant, offset: 50, length: 1, content: 九, krp: 坎爲馬爲離三爻同變而成離離爲中女坎爲中男兩日二夫之象坎爲執法吏吏詰其夫婦人被流血而死坎二陰一陽離三陽一陰相承易位離下坎上旣濟文王遇之囚美里有禮而生無禮而死馬左而濕水也左永右馬馮字也兩日昌字也其馮昌殺之乎於是推驗獲昌詰之具首服日本與妻謀殺董豐期以沐新枕爲驗是以誤中婦人宋書日劉休善筮因尚書令吳喜事明帝遂見親賞長直殿内後宫孕者帝使筮其男女無不如占齊書日賀瑒伯祖導飬工卜筮經遇工歌女人病死爲}
  - {type: variant, offset: 53, length: 1, content: 名, SBCK: 日此非死也天帝召之歌耳乃以土塊加其心上俄頃而蘇南史日梁大同中同泰寺災帝召太史令虞履筮之遇坤之履日無害其繇日西南得朋東北喪朋安貞吉文言日東北喪朋乃終有慶帝日斯魔也酉應見卯金來剋木卯爲陰賊􅀑而帶賊非魔孰爲致之酉爲口舌當就􅀃言乎兊故知善言乎冝前爲法事於是人人賛善莫不從風梁書曰鄧元起初爲益州刺史及巴東聞蜀亂使蔣光濟筮之遇蹇喟然歎曰吾豈鄧艾而及此乎後果如筮又阮孝緖傳曰孝緒見善筮者張有道曰見子隱迹而心難明自非考之􅀛蓍無以驗也及布卦旣揲五爻曰此將爲應感之法非嘉遁之兆孝緖日安知後爻不爲上九果成遁卦有道歎日此所謂肥遁無不利象實應德心迹并也孝緒曰雖獲遁卦而上九爻不發升遐之道便當髙謝又日阮孝緒自筮卦日吾壽與劉著作同年及劉著卒孝緒曰劉侯逝矣吾其幾何其年十月卒後魏書曰任城王澄髙祖外示南討意在謀遷齋於明堂左个詔太常􅀸王諶親令􅀛易筮南伐之事其兆遇革髙祖曰此是湯武革順之卦也羣臣莫敢言澄曰革者更也將欲應天順人革君臣之命湯武得之爲吉陛下帝有天下重光累葉今日卜征乃可伐叛不得云革命此非君人卦未可爲吉也高祖厲聲曰此象云大人虎變何云不吉也澄曰陛下龍興旣乆不冝方同虎變高祖勃然作色日社稷我社稷任城而欲沮衆也澄曰社稷誠知陛下之社稷然臣是社稷之臣也務參顧問敢盡愚衷髙祖乆之乃解曰各言其志亦復何傷車駕還宫便召澄未及昇陛遥謂曰向者之革今更欲論之明堂之忿懼衆人竟言沮我計故厲色怖文武耳想解朕意也又曰鄧淵博覽經書長於易筮太祖定中原擢爲吏部郎又曰許彦少􅀌貧好讀書後從沙門法叡受易世祖􅀍徵以卜筮頻驗遂在左右參與謀議北史曰後魏樂平王丕坐事以憂薨及日者董道秀之死也髙允遂箸筮論曰昔明元未起白臺其高二十餘丈樂平王嘗夢登其上四望無所見王以問日者董道秀筮之曰大吉王默而有熹色後事發王遂憂死而道秀棄市道秀善推六爻以對王曰易稱亢龍有悔窮髙曰亢髙而無人不爲善也夫如是則可上寧於王下保於己福禄方至豈有禍哉今舎於本而從其末咎釁之至不亦冝乎三國典略曰西魏孝武帝字孝則孝文皇帝之孫也性沉厚少言體有鱗文初封汝陽公夢人謂己日汝當大貴得二十五年將卽位使吳遵世筮之遇明夷之賁曰初登于天後入于地帝曰何謂也遵日初登于天當作天子也後入于地不得乆也又日淸河王岳神武從父弟也初家于洛邑神武奉使入洛常止岳舎母山氏嘗夜起見神武室中有光窺而無火移於東屋其光復存以爲恠也詣卜者筮之遇乾之大有占日吉易􅁛飛龍在天大人造也飛龍九五大人之卦當大貴主人蒙其福神武起兵於信都山氏聞之大喜謂岳日赤光之瑞今當驗矣可聞從之共圖大計岳至信都神武以爲散騎常侍封山氏爲郡君授女侍中入侍皇后又日齊趙輔和明易善筮後宫誕男女時日筮無不中有人父疾輔和筮之遇乾之晉吿之以吉退而謂人日乾爲天天變爲䰟而昇於天能無死乎果如其言又曰齊許遵髙陽新城人也明易善筮兼曉天文齊神武引爲館客自言禄命不富貴終必横死是以任情踈誕多所犯忤時齊主無道旣甚遵語人日多折筭來吾筮此狂夫何時當死於是布筭满床大言日不出首冬我乃不見又後周書日梁孝元凡諸伎術無所不該南平嗣王恪嘗以銅合盛金玉虎珀指環請孝元射覆卦遇姤之履林日上旣爲天其體則圎指環之象金玉在焉寅爻帶牛寅則爲虎琥珀生光在合中央合中之物凡有三種案卦而談或輕或重恪於是神服又以壬申日寅時筮南軍何時有信遇剥之艮孝元日使還已在門外遣人往看果如所􅀃賔客驚其妙而問之孝元日艮爲門時在寅與日辰幷故知之耳凡所占決萬不失}
