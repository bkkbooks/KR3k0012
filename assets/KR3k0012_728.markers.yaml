  - {type: variant, offset: 2186, length: 6, content: 卜楚丘楚丘卜, SBCK: 同寮郎郭璞曰頥貞吉正以養身雷動山下氣性唯新變而之益延壽永年乘龍銜風乃升于天此仙}
  - {type: variant, offset: 2186, length: 0, content: '', WYG: 同寮即郭璞曰頥貞吉正以養身雷動山下氣性惟心變而之益延壽永年龍乘御風乃升于天此仙人之卦也搜神記曰橋𤣥字公祖梁國人也初為司徒長史五月未夜卧見東壁正白如門呼左右左右莫見因起自往手捫摸之壁如故還牀又見心大恐其友應劭往候之元吿劭曰鄉人有童彦興者許季山外孫也其探􅄨索隱窮神知化然天性褊狹羞於}
