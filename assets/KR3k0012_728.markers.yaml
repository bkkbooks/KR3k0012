  - {type: variant, offset: 1255, length: 790, content: 故曰無相相助也震之離亦離之震為雷為火為嬴敗姬車說其輹火焚其旗不利行師敗于宗丘歸妹睽孤寇之張弧姪其從姑六年其逋逃歸其國而棄其家明年其死於高梁之虛及惠公之在秦曰先君若從史蘇之占吾不及此矣韓𥳑侍曰龜象也筮數也物生而後有象象而後有滋滋而後有數先君之敗德其可數乎史蘇是占勿從何益又僖中曰狐偃言於晉侯曰求諸侯莫如勤王諸侯信之且大義也繼文之業而信宣於諸侯今為可矣使卜偃卜之曰吉遇黃帝戰于阪泉之兆公曰吾不堪也對曰周禮未改今之王古之帝也公曰筮之遇大有之睽曰吉遇公用享于天子之卦戰克而王饗吉孰大焉且是卦也天為澤以當日天子降心以逆公不亦可乎大有去睽而復亦其所也又成下曰晉楚將戰苗賁皇言於晉侯曰楚之良在其中軍王族而已請分良以擊其左右而三軍萃於王卒必大敗之公曰筮之史曰吉其卦遇復曰南國蹙射其元王中厥目復陽長之卦陽氣起子南行推陰故曰南國蹙也南國蹙勢則離受其咎離為諸侯又為日陽氣激南飛失之象故曰射其元國蹙王傷不敗何待公從之又襄元曰穆姜薨于東宮太子宮也穆姜嬌淫僑如欲廢成公徙從居東宮事在成十六年始往而筮之遇艮之八艮下艮上艮周禮大卜掌三易然則雜用連山歸藏周易也二易皆亡以八為占故言遇艮之八也史曰是謂艮之隨震下兌上隨史疑占易遇八為不利故更以周易占變爻得隨卦而論之隨其出也史謂隨非閑固之卦君必速出姜曰亡亡無也是於周易有曰隨元亨利貞無咎元善之長也亨嘉之會也利義之和也貞事之幹也體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事然故不可誣也是以雖隨旡咎今我婦人而與於亂固在下位婦人卑於丈夫而有不仁不可謂元不靖國家不可謂亨作而害身不可謂利棄位而姣姣淫之別名不可謂貞有四德者雖隨而無咎我皆無之豈隨也哉我則取惡能無咎乎必死於此弗得出矣又襄四曰齊棠公之妻東郭偃之姊也棠公齊棠邑大夫可也偃臣崔武子棠公死偃御武子以弔焉見棠姜而美之使偃娶之為已娶也偃曰男女辨姓今君出自丁成出自桓不可武子筮之遇困之太過史皆曰吉示陳文子曰夫從風坎為中男故曰夫, WYG: ''}
