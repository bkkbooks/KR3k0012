  - {type: variant, offset: 486, length: 1, content: 風, WYG: 鄧淵博覽經書長於易筮太祖定中原擢為吏部郎又曰許彦少孤貧好讀書後從沙門法叡受易世祖被徵以卜筮頻驗遂在左右參與謀議又後周書曰梁孝元凡諸伎術無所不該南平嗣王恪嘗以銅合盛金玉琥珀指還請孝元射覆卦遇姤之履卦曰上既}
