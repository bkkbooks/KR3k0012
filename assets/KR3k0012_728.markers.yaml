  - {type: variant, offset: 1675, length: 486, content: 徙從居東宮事在成十六年始往而筮之遇艮之八艮下艮上艮周禮大卜掌三易然則雜用連山歸藏周易也二易皆亡以八為占故言遇艮之八也史曰是謂艮之隨震下兌上隨史疑占易遇八為不利故更以周易占變爻得隨卦而論之隨其出也史謂隨非閑固之卦君必速出姜曰亡亡無也是於周易有曰隨元亨利貞無咎元善之長也亨嘉之會也利義之和也貞事之幹也體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事然故不可誣也是以雖隨旡咎今我婦人而與於亂固在下位婦人卑於丈夫而有不仁不可謂元不靖國家不可謂亨作而害身不可謂利棄位而姣姣淫之別名不可謂貞有四德者雖隨而無咎我皆無之豈隨也哉我則取惡能無咎乎必死於此弗得出矣又襄四曰齊棠公之妻東郭偃之姊也棠公齊棠邑大夫可也偃臣崔武子棠公死偃御武子以弔焉見棠姜而美之使偃娶之為已娶也偃曰男女辨姓今君出自丁成出自桓不可武子筮之遇困之太過史皆曰吉示陳文子曰夫從風坎為中男故曰夫也變而為巽故曰從風也風隕妻不可娶也風能隕落變隕落故不可也且其繇曰困于石據于蒺䔧入于其宮不見其妻凶用六三爻辭也困于石往不濟也據于䔧蒺所恃傷也入于其宮不見其妻凶無所歸也崔子曰嫠也何害先夫當之矣寡婦曰嫠言棠公己當此凶也遂取之又昭二曰初穆子, SBCK: ''}
