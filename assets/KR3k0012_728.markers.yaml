  - {type: variant, offset: 2222, length: 130, content: 牛卒以餒死明夷日也曰之數十故有十時亦當十位自王已下其二為公其三為卿曰上其中食日為二旦日為三明夷之謙明而未融其當旦乎故曰為子祀曰之謙當鳥故曰明夷于飛明而未融故曰垂其翼象日之動故曰君子于行當三在旦故曰三日不食離火也艮山也離為火火焚山山敗於人為言敗言為讒故曰有攸往主, SBCK: 鄕}
