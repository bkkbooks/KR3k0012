  - {type: variant, offset: 97, length: 0, content: '', WYG: 元吉嶠等退相謂曰璞對不了是不敢言或天奪敦魄今吾等與國共舉大事而璞云元吉是為舉事必有成也於是勸帝討敦初璞每言殺我者山宗至是果有姓崇者搆璞於敦將舉兵又使璞筮璞曰無成敦因疑璞之勸嶠亮又聞卦凶乃問璞曰卿更筮吾夀幾何荅曰思向卦明公起事必禍不久若往武昌壽不可測敦大怒曰卿壽幾何曰命盡今日中敦怒收璞詣南崗而斬之璞臨出謂行刑者欲何之曰南崗頭璞曰必在雙栢樹下既至果然復云}
