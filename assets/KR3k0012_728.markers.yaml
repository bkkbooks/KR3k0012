  - {type: variant, offset: 2186, length: 6, content: 卜楚丘楚丘卜, krp: 同寮郎郭璞曰頥貞吉正以養身雷動山下氣性唯新變而之益延壽永年乘龍銜風乃升于天此仙}
  - {type: variant, offset: 2187, length: 5, content: 楚丘楚丘卜, WYG: 筮者元聞往請之公祖虛禮盛饌下席行觴彦行辭公祖讓再三爾乃應之曰府君恠見曰光如門明者然不為害也六月上旬鷄鳴時聞南家哭即吉到秋節遷北行郡以金為名位至將軍三公到六月九日太尉楊秉夢七月拜鉅鹿太守鉅邊有金焉復為度遼將軍遂登三事續搜神記曰郭璞每自為卦知其凶終嘗行建康柵塘逢一趨走少年便牽住脫絲布袍與之此}
