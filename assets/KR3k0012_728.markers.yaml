  - {type: 'tls:seg', offset: 32, content: '', id: KR3k0012_CHANT_728-1a.11}
  - {type: variant, offset: 37, length: 0, content: '', SBCK: 璞對不決嶠亮復令占己之吉凶璞日元吉嶠等退相謂日璞對不了是不敢言或天奪敦魄令吾等與國家共舉大事而璞云元吉是爲舉事必有成也於是勸帝討敦初璞每言殺我者山宗至是果有姓崇者構璞於敦敦將舉兵又使璞筮璞日無成敦因疑璞之勸嶠亮又聞卦凶乃問璞日􅀸更筮吾壽幾何荅日思向卦明公起事必禍不乆若往武昌壽不可測敦大怒日􅀸壽幾何日命盡今日中敦怒收璞詣南崗而斬之璞臨出謂行刑者欲何之日南崗頭璞日必在雙柏樹下旣至果然復云此樹應有大鵲巢衆索云不見璞更令尋覓果於枝閒得一大巢密葉蔽之又日􅁃翼幼時嘗令璞筮公家及身卦成日立始之末丘山傾辰順之初子凋零及康帝卽位將改元爲建元或謂庾冰日子忘郭生之言邪立始建元也丘山上}
  - {type: page-break, offset: 37, content: '', id: KR3k0012_SBCK_728-2b}
  - {type: variant, offset: 37, length: 15, content: 名一曰連山二曰歸藏三曰周易九筮, WYG: 璞對不決嶠亮復令占已}
  - {type: variant, offset: 37, length: 0, content: '', krp: 璞對不決嶠亮復令占己之吉凶璞日元吉嶠等退相謂日璞對不了是不敢言或天奪敦魄令吾等與國家共舉大事而璞云元吉是爲舉事必有成也於是勸帝討敦初璞每言殺我者山宗至是果有姓崇者構璞於敦敦將舉兵又使璞筮璞日無成敦因疑璞之勸嶠亮又聞卦凶乃問璞日卿更筮吾壽幾何荅日思向卦明公起事必禍不乆若往武昌壽不可測敦大怒日卿壽幾何日命盡今日中敦怒收璞詣南崗而斬之璞臨出謂行刑者欲何之日南崗頭璞日必在雙柏樹下旣至果然復云此樹應有大鵲巢衆索云不見璞更令尋覓果於枝閒得一大巢密葉蔽之又日庾翼幼時嘗令璞筮公家及身卦成日立始之末丘山傾辰順之初子凋零及康帝卽位將改元爲建元或謂庾冰日子忘郭生之言邪立始建元也丘山上}
