  - {type: variant, offset: 47, length: 1, content: 曰, SBCK: 年而返過宿妻家是夜妻爲賊所殺兄疑豐殺之送豐有司不堪楚掠誣引殺妻融察而疑之問日汝行徃還頗有恠異及卜筮以不豐日初將發夜夢乘馬南渡水返而北渡復自北而南馬停水中鞭策不去俯而視之見兩日在于水下左白而濕右黑而燥寤而心悸以爲不祥還之夕復夢如初問筮者筮者云憂獄訟遠三枕避三沐旣至妻爲具沐夜授豐枕豐記筮者之言皆不從之乃自沐枕枕而寢融日吾知之矣}
