  - {type: variant, offset: 50, length: 1, content: 九, SBCK: 坎爲馬爲離三爻同變而成離離爲中女坎爲中男兩日二夫之象坎爲執法吏吏詰其夫婦人被流血而死坎二陰一陽離三陽一陰相承易位離下坎上旣濟文王遇之囚美里有禮而生無禮而死馬左而濕水也左永右馬馮字也兩日昌字也其馮昌殺之乎於是推驗獲昌詰之具首服日本與妻謀殺董豐期以沐新枕爲驗是以誤中婦人宋書日劉休善筮因尚書令吳喜事明帝遂見親賞長直殿内後宫孕者帝使筮其男女無不如占齊書日賀瑒伯祖導飬工卜筮經遇工歌女人病死爲}
