  - {type: variant, offset: 785, length: 241, content: 其必蕃昌震為土車從馬足居之兄長之母覆之眾歸之六體不可易合而能固安而能殺此公侯之封也公侯之子孫必復其始又閔公曰成季之將生也桓公使卜楚丘之父卜之曰男也其名曰友在公之右在右言用事閒于兩社為公室輔兩社同社毫社也兩社之閒朝廷執政所在季氏亡則魯不昌又筮之遇大有之乾曰同復于父敬如君所及生有文在其手曰友遂以命之又僖上曰秦伯伐晉卜徙父筮之吉涉河侯車敗詰之秦伯涉河則晉侯車敗則秦伯不解謂敗在己故詰之對曰乃大吉也三敗必獲晉君其卦遇蠱曰千乘三去三去之餘獲其雄狐夫蠱必其君也於周易卦利涉大川往有事也亦秦勝晉, SBCK: 是二者得國}
  - {type: variant, offset: 785, length: 241, content: 其必蕃昌震為土車從馬足居之兄長之母覆之眾歸之六體不可易合而能固安而能殺此公侯之封也公侯之子孫必復其始又閔公曰成季之將生也桓公使卜楚丘之父卜之曰男也其名曰友在公之右在右言用事閒于兩社為公室輔兩社同社毫社也兩社之閒朝廷執政所在季氏亡則魯不昌又筮之遇大有之乾曰同復于父敬如君所及生有文在其手曰友遂以命之又僖上曰秦伯伐晉卜徙父筮之吉涉河侯車敗詰之秦伯涉河則晉侯車敗則秦伯不解謂敗在己故詰之對曰乃大吉也三敗必獲晉君其卦遇蠱曰千乘三去三去之餘獲其雄狐夫蠱必其君也於周易卦利涉大川往有事也亦秦勝晉, krp: 是二者得國}
