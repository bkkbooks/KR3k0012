  - {type: variant, offset: 3883, length: 0, content: '', SBCK: 十里上宫姓家索其先養雄雉籠而絆之置東簷下却後九日辰加午必當有野雌雉飛來與交合旣畢􅀟飛去若如此不出二十日病都除又是休應年將八十位極人臣若但雌逝雄留者病一周方差年半八十名位亦失超依其言索雉果得至期日超卧南軒下觀之至日晏果有雌雉飛入籠與雄交而去雄雉不動超歎息日雖管郭之奇何以尙此超病弥年乃起至四十卒於中書郞録異傳日隗炤者汝隂鴻壽亭人也善於易臨死書板授其妻日吾亡後當大荒窮雖尔愼莫賣宅也却後五年春當有詔使來頓此亭姓龔此人􅀒吾金􅀸以此板往責之勿違吾言言訖而卒後果大困乏欲賣宅憶夫言輒止期日有龔使者至亭妻遂賫板往使者執板惘然不知所以乃言日我生不踐此何縁尓耶妻日夫臨亡手書板見命如此不敢妄也使者沉吟良乆而寤謂日賢夫何善妻日亡夫善於易而未曾為人卜也使者日噫可知矣乃命取蓍筮之卦成撫掌而歎日妙哉隗生含明隱迹可謂鏡窮達而洞吉凶者也於是告炤妻日吾不可相􅀒金也賢夫自有金耳知亡後蹔窮故藏金以待泰平所以不告婦兒者恐金盡而困無巳也知吾善易故書板以寄意耳金有五百斤盛以靑甖覆以銅柈埋在堂屋東頭去壁一丈入地九尺妻還掘之皆如其言金樓子自敘云初至荊州卜雨聊附見首末孟秋之月亢陽日乆月旦雖雨俄尒便晴有人云諺日雨月額}
