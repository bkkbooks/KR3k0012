  - {type: variant, offset: 463, length: 318, content: 坤土也巽風也乾天也風為天於土上山也巽髮為乾故曰風為天自二至四有艮象艮為山也有山之材而照之以天光於是乎居土上故曰觀國之光利用賓于王庭實旅百奉之以玉帛天地之美具焉故曰利用賓于王艮為門庭乾為金玉坤為布帛諸侯朝王陳贄幣之象也旅陳也百言物備也已矣猶有觀焉故曰其在後乎因觀文以博占故言猶有觀非在已之言故知在子孫也風行而著於土故曰其在異國乎若在異國必姜姓也姜太嶽之後也山嶽則配天物莫能兩大陳衰此其昌乎變而象艮故知當興於太嶽之後也得太嶽之權則有配天之大功故知陳必衰也又閔公曰晉獻公以魏賜畢萬卜偃曰畢萬之後必大卜偃晉掌卜大夫也萬盈數也魏大名也以是始賞天啟之矣天子曰兆民諸侯曰萬民今名之大以從盈數其必有眾初畢萬筮仕於晉遇屯之比辛廖占之吉辛廖晉大夫也屯固比入, SBCK: ''}
