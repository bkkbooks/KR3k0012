  - {type: variant, offset: 91, length: 1, content: 辨, SBCK: 爲非及也伯醜亦開肆賣卜有人嘗失子就伯醜筮者卦成伯醜日汝子在懷遠坊南門道東北壁上有靑裙女子抱之可往取也如言果得或有金數兩夫妻共藏之於後失金其夫意妻有異志將逐之其妻稱􅁈以詣伯醜伯醜爲筮之日金在矣悉呼其家人指一人日可取金來其人赧然應聲而取之道士韋知常詣伯醜問}
