  - {type: variant, offset: 498, length: 0, content: '', WYG: 門時在寅與日辰并故知之耳凡所占決萬不失一及我軍之伐授蓍為卦取龜式驗之因抵於地曰吾若死此卜豈非命乎隋書曰楊伯醜馮翊武鄉人也好讀易隠于華}
