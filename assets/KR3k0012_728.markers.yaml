  - {type: variant, offset: 521, length: 0, content: '', WYG: 道士韋知常詣伯醜問吉凶伯醜曰汝勿東北行必不得已當早還不然楊素斬汝頭未幾上令知常事漢王諒俄而上崩諒舉兵反知常逃歸京師知常先與楊素有隙及素平并州先訪知常將斬之賴此獲免有失馬來詣伯醜卜者時伯醜為太子所召在途遇之立為作卦卦成曰我不遑為卿占之卿且向西市東壁門南第三店為我買魚作膾當得馬矣其人如此言須臾有一人牽所失馬而至遂擒之崖州嘗獻徑寸珠其使者陰易之上疑焉召伯醜筮曰有物出自水中質圓而色}
