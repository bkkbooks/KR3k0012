  - {type: variant, offset: 4729, length: 276, content: 中曰謙雷在天上曰壯謙則裒多益寡壯則非禮不履未有損己而不光大行非而不傷敗願君侯上追文王六爻之旨下思尼父彖象之義然後三公可決青蠅可驅也又管輅過魏郡太守鍾毓共論易議輅因言卜可知君生死之日毓使筮其生日月如言無蹉跌毓大愕曰君可畏人也命以付天不以付君遂不復問又曰平原太守劉邠取印囊及山雞毛著器中使筮輅曰內方外圓五色成文含寶守信出則有章此印囊也高岳巖巖有鳥朱身羽翼玄黃鳴不失晨此山雞毛也又曰清河令徐季龍使人行獵令管輅筮其所得輅曰當獲其小獸復非食禽雖有爪牙微而不疆雖有文章蔚而不明非虎非雉其名曰狸獵人暮歸果如輅言又曰鄧艾當伐蜀夢坐山上而有流水以問殄虜護軍袁紹紹曰易卦山, SBCK: ''}
