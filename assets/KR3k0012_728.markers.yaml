  - {type: variant, offset: 38, length: 0, content: '', SBCK: 此號不冝用冰撫心歎恨帝崩何充政元爲永和庾翼歎日天道精微乃當如是長順者永和也吾庸得免乎其年翼卒冰又令筮其後嗣卦成日􅀸諸子並當貴盛然有白龍者凶徵至矣若墓碑生金庾氏之大忌也後冰子藴爲廣州刺史妾房内忽有}
  - {type: variant, offset: 38, length: 0, content: '', krp: 此號不冝用冰撫心歎恨帝崩何充政元爲永和庾翼歎日天道精微乃當如是長順者永和也吾庸得免乎其年翼卒冰又令筮其後嗣卦成日卿諸子並當貴盛然有白龍者凶徵至矣若墓碑生金庾氏之大忌也後冰子藴爲廣州刺史妾房内忽有}
  - {type: variant, offset: 39, length: 7, content: 曰連山二曰歸藏, SBCK: 新生白狗子莫知所由來其妾祕愛之不令藴知狗轉長大藴入見狗眉眼分明又身至長又弱異於常狗藴甚怪之將岀共視在衆人前忽失所在藴􅁣然日殆白龍乎􅁃氏之禍至矣又墓碑生金俄而爲􅁊温所滅終如其言璞之占驗皆此􅀋也撰前後筮驗六十餘事名爲洞林又抄京費諸家要最更撰新林十篇卜韻十篇載記日秦苻融爲司􅀠校尉京兆人董豐遊}
