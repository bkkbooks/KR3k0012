  - {type: variant, offset: 533, length: 0, content: '', WYG: 果得本珠上竒之賜帛二十疋唐書曰太宗皇后長孫氏隋大業中歸寧於永興里后舅髙士亷有嫗張氏於后所宿舍側見一大馬二丈餘鞍勒悉具士亷筮之遇坤彖曰至哉坤元萬物資生乃順承天坤厚載物德合無彊象曰牝馬地類行地無彊地之泰彖曰内陽而外陰内健而外順則是天地交而萬物通也象曰后}
