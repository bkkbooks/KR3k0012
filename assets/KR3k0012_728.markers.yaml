  - {type: variant, offset: 2164, length: 2, content: 莊叔, SBCK: 其母夢神規其臋以黑曰使有晉國規畫臋凥三世而卑驩之孫故名之曰黒臋於今再矣襄公曰驩此其孫也此周子者晉襄公之孫也而令德孝恭非此其誰且其夢曰必驩之孫實有晉國其卦曰必三取君於周其德又可以君國三襲焉襲合也三合德夢卦也吾聞之泰誓曰朕夢恊于朕卜襲于休祥戎商必尅以三合襲晉仍無道而鮮胄其將失之矣早善晉子其當之晉子周子頃公許諾及厲公之亂召周子而立之是爲悼公亂謂殺之智瓊傳曰􅁌超爲神女所降論者以爲神仙或以爲􅀑魅不可得正也著作郎干寶}
