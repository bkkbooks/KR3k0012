  - {type: punctuation, offset: 2412, content: 「, id: KR3k0012_CHANT_728-bkkpn742}
  - {type: variant, offset: 2412, length: 745, content: 衛襄公嬖人媚姶上音周下音闔生子名之曰元孔成子以周易筮之曰元尚享衛國主其社稷遇屯又曰余尚立縶尚克嘉之遇屯之比以示史朝史朝曰元亨又何疑焉成子曰非長之謂乎對曰康叔名之可謂長矣孟非人也將不列於宗不可謂長且其繇曰利建侯嗣吉何建建非嗣也二卦皆云子其建之康叔命之二卦告之筮襲於夢武王所用也弗從何為又昭三日南蒯之將叛也枚筮之遇坤之比曰黃裳元吉以為大吉也示子服惠伯曰即欲有事何如惠伯曰吾嘗學此矣忠信之事則可不然必敗外疆內溫忠也和以卒貞信也故曰黃裳元吉黃中之色也裳下之飾也元善之長也中不忠不得其色下不共不得其飾事不善不得其極外內倡和為忠率事以信為共供養三德為善非此三者弗當且夫易不可以占險將何事也且可飾乎中美能黃上美為元下美則裳參成可筮猶有闕也筮雖吉未也又哀下曰衛侯夢于北宮見人登昆吾之觀被髮北面而譟曰登此昆吾之虛緜緜生之爪余為渾良夫叫天無辜公親筮之胥彌赦占之曰不害與之邑寘之而逃奔宋衛侯貞卜其繇曰如魚竀音赬尾衡流而方羊裔焉大國滅之將亡闔門塞竇乃自後踰又曰巴人伐楚圍鄾初右司馬子國之卜也觀瞻曰如志故命之及巴師至將卜帥王曰寧如志何卜焉使帥師而行敗巴師于鄾故封子國於析君子曰惠王知志夏書曰官占惟先蔽志昆命于元龜其是之謂乎志曰聖人不煩卜筮惠王其有焉又曰晉荀瑤伐齊將戰長武子請卜知伯曰君告于天子而卜之以守龜於宗祧吉矣吾又何卜焉且齊人取我英丘君命瑤非敢燿武也治英丘也以辭伐罪足矣何必卜周易上繫辭曰大衍之數五十其用四十有九王弼曰演天地之數所賴者五十也其用四十有九則其一不用而用以之通非數而數以之成斯易之大極也四十有九數之極也夫無不可以無明必因於有故常於有物之極而必明其所由之宗也分而為二以象兩掛一以象三揲之以四以象四時歸奇於扐以象閏五歲再閏故再扐而後掛奇凡四揲之餘不足復揲者也分而為二既揲之餘合掛於一故曰再扐而後掛几閏十九, SBCK: 郄超}
