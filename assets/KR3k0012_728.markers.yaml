  - {type: variant, offset: 2049, length: 1, content: 巽, WYG: 泰天地交也繇陽於歸妹婦人兆也案王弼云婦人謂婦女處尊位履中居順也此女當大貴也其可盡言乎士亷志之而心獨喜親戚知咸敬異焉又曰衞大經篤學善易日無二言則天降詔徵之辭疾不起嘗預筮死日先鑿墓自為誌文如筮而終又曰𤣥宗之為潞州别駕將入朝有軍人韓凝禮自謂通卜宗以食箸試之既布卦一箸無故自起凢三偃起觀者以為大吉徵既而誅韋氏定天保因此行也凝禮起家五品家語曰孔子嘗自筮而卦得賁愀然有不樂之狀子張進曰師聞卜者得賁是吉卦也而夫子之色不平何也孔子曰以其雜也在周易山下有火謂之賁非正色之卦也夫質也白冝正白黑冝正黑今而以賁非吉兆也吾聞舟不漆又曰玉不雕何者質之有餘質有餘者不受飾故也說苑同古史考曰庖羲作卦始有筮衝波傳曰孔子使子貢往外而未來謂弟子占之遇鼎皆言無一足不來顔子掩口而笑曰無足者乗舟而來賜至矣清朝也子貢果朝至國語曰晉公子在秦筮之曰尚有晉國得貞屯悔豫皆八也内曰貞外曰悔震下坤上屯坤下震上豫得此兩卦震在屯為貞在豫為悔八謂震兩陰爻貞悔皆不動}
