  - {type: variant, offset: 3883, length: 0, content: '', WYG: 十里上官姓家索其先養雄雉籠而絆之置東簷下却後九日辰加午必當有野䳄雉飛來與交合既畢雙飛去若如此不出二十日病都除又是休應年將八十位極人臣若但雌逝雄留者病一周方差年半八十名位亦失超依其言索雄果得至期日超卧南軒下觀之至日晏果有雌雄飛入籠與雄交而去雄雉不動超曰雖管郭之竒何以尚此超病逾年乃起至四十卒於中書郎録異傳曰隗炤者汝陰鴻壽亭人也善於易臨死書板授其妻曰吾亡後當大荒窮雖爾慎莫賣宅也却後五年春當有詔使來頓此亭姓龔此人負吾金卿以此板往責之勿違吾言言乞而卒後果大困乏欲賣宅憶夫言輒止期日有龔使者至亭妻遂賫板往使者執板惘然不知所以乃言曰我生不識此何縁耳炤妻曰夫臨亡手書板見命如此不敢違也使者沉吟良久而寤謂曰賢夫何善妻曰亡夫善於易而未曾為人卜也使者曰噫可知矣乃命取蓍筮之卦成撫掌而嘆曰妙哉隗生含明隱迹可謂鏡窮達而洞吉凶者也於是告炤妻曰吾未嘗相負金也賢夫自有金耳知亡後蹔窮故藏金以待泰平所以不告婦兒者恐金盡而困無已也知吾善易故書板以寄意耳金有百斤盛以青甖覆以銅鉢埋在堂屋東頭去壁一丈入地九尺妻還掘之皆如其言金樓子自述云初至荆州遇雨聊附見首末孟秋之月亢陽日久月旦雖雨俄爾便晴有人云諺曰兩月額}
