  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_728-1a.2}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 下晉書日嚴􅀸會稽人也善卜筮鄉人魏序欲蹔東行荒年多抄盜令􅀸筮之􅀸筮日君慎不可東行必遭暴害之氣而非劫也序之不信卿日旣必不信冝有以禳之可索西郭外獨母家白雄狗繫着舩前求索正得駮狗無白􅀸日駮者亦足然猶恨其色不純當餘小毒正及六畜輩耳無所復憂序行半路狗忽作聲甚急有如人打之者比視已死吐黑血斗餘其夕序墅}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 下晉書曰嚴卿㑹稽人也善卜筮鄉人魏序欲暫東行荒年多抄盜令卿筮之卿筮曰君慎不可東行必遭暴害之氣而非刼也序不信卿曰既必不停冝有以禳之可索西郭外獨母家白雄狗繫著船前求索止得駮狗無白卿曰駮者亦足然猶恨其色不純當餘小毒止及六畜輩耳無所復憂序行半路狗忽作聲甚急有如人打之者比視已死吐黑血斗餘未久序墅}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_728-1b, image: WYG0899/WYG0899-0427b.png}
  - {type: variant, offset: 5, length: 0, content: '', krp: 下晉書日嚴卿會稽人也善卜筮鄉人魏序欲蹔東行荒年多抄盜令卿筮之卿筮日君慎不可東行必遭暴害之氣而非劫也序之不信卿日旣必不信冝有以禳之可索西郭外獨母家白雄狗繫着舩前求索正得駮狗無白卿日駮者亦足然猶恨其色不純當餘小毒正及六畜輩耳無所復憂序行半路狗忽作聲甚急有如人打之者比視已死吐黑血斗餘其夕序墅}
  - {type: xml-element, offset: 6, content: '', id: KR3k0012_CHANT_728-bkkxmlele2}
