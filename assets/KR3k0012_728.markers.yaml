  - {type: variant, offset: 3198, length: 574, content: 合天數二十有五地數三十五耦合為三十凡天地之數五十有五此所以成變化而行鬼神也變化以此成鬼神以此行乾之策二百一十有六陽爻六一爻三十六策六爻二百一十六策坤之策百四十有四陰爻六一爻二十四策六爻百四十四策凡三百有六十當期之日二篇之策萬有一千五百二十當萬物之數也二篇三百八十四爻陰陽各半合萬一千五百二十策是故四營而成易分而為二以象兩一營也卦一以象三二營也揲之以四三營也歸奇於扐四營也十有八變而成卦八卦而小成引而伸之伸之六十四卦觸類而長之天下之能事畢矣顯道顯明也神德行由神以成其用是故可與酬酢可與祐神矣可以應對萬物之求助成神化之助也酬酢應對也又曰耆之德圓而神卦之德方以知神以知來知以藏往探賾索隱鉤深致遠以定天下之吉凶成天下之亹亹者莫大乎蓍龜歸藏曰蓍末大於本為上吉蒿末大於本次吉荊末大於本次吉箭末大於本次吉竹未大於本次吉蓍一五神蒿二四神荊三三神箭四二神竹五一神筮五犯皆臧五筮之神明皆聚焉洪範五行傳曰若煩數溷瀆或不精嚴神不告也或觀卦察兆占不得也或龜不神蓍不靈此其所以過差聖人不得專用也龜筮共違于人神靈不祐也漢書曰宣帝八月飲酎行祠孝昭廟先驅旄頭劍挺墮首拂泥中刃向乘輿車馬驚於是召梁丘賀筮之有兵謀不吉上還使有司行祠是時霍氏外孫代郡太守任宣坐謀反誅宣子章為公車丞亡在渭城中夜玄服入廟居郎閒執戟立廟門待上至欲為逆事發伏誅後漢書曰許曼者汝南平輿人也祖父峻字季山善卜占之術多有顯, SBCK: ''}
