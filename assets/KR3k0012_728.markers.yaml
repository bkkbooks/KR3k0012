  - {type: variant, offset: 74, length: 16, content: 六曰巫比七曰巫祠八曰巫參九曰巫𡑡, SBCK: 隱於華山開皇初被徵入朝見公􅀸不爲禮無貴賤皆汝之人不能測也高祖召與語竟無所荅上賜之衣服至朝堂捨之而去於是被髪陽狂遊行市里形體垢穢未嘗櫛沐時有張永樂者賣卜京師伯醜毎從之遊永樂爲卦有不能決者伯醜輒爲分折爻象尋幽人微永樂嗟服自}
