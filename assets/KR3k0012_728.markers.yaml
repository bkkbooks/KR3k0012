  - {type: variant, offset: 476, length: 1, content: 土, WYG: 天能無死也果如其言又曰齊許遵髙陽新城人也明易善筮兼曉天文齊神武引為館客自言禄命不富貴終必横死是以任情疎誕多所犯忤時齊王無道許遵語人曰多折筭來吾筮此狂夫何時當死於是布筭滿床大言曰不出首冬我乃不見滿為陰賊鬼而帶賊非魔孰為致之酉為口舌當就言乎兌故知善言乎冝前為法事於是人人贊善莫不從風梁書曰鄧元起初為益州刺史及巴東聞蜀亂使蔣光濟筮之遇蹇喟然歎曰吾豈鄧艾而及此乎後果如筮又阮孝緒傳曰孝緒見善筮者張有道曰見子隱迹而心難明自非考之龜蓍無以驗也及布卦既揲五爻曰此將為咸應感之法非嘉遯之兆孝緒曰安知後爻不為}
