  - {type: variant, offset: 13, length: 2, content: 用蓍, WYG: 遇遯之蠱其繇曰艮體連乾其物壯巨山潛之畜匪兕匪虎身與鬼并精見二午法當為禽兩翼不許遂被一創還其本墅按卦定之是為驢鼠卜適了伏者以戰刺之深尺餘遂去不復見巫云廟神不悅曰此是䢼亭驢山君鼠使詣荆山暫來過我不須觸之其精妙如此又曰王導深重郭璞引參已軍事導令作卦璞言公有震厄可命駕西出數十里得一栢樹截斷如身長置常寢處災當可消矣導從其言數日果震栢樹粉碎時元帝初鎮建鄴導令璞巫之遇咸之井璞曰東北郡縣有武名者當出鐸以著受命之符西南郡縣有陽名者井當沸其後晉陵武進縣人於田中得銅鐸五枚厯陽縣井沸經日乃止及帝為晉王又使璞筮遇豫之暌璞曰㑹稽當出鍾以告成功上有勒銘應在人家井泥中得之繇辭所謂先王以作樂崇德殷薦之上帝者}
