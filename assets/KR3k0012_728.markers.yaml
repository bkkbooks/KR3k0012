  - {type: variant, offset: 480, length: 2, content: 巽髮, WYG: 孝緒曰雖獲遯卦而上九爻不發升遐之道便當髙謝又曰阮孝緒自筮卦曰吾壽與劉著作同年及劉著作卒孝緒曰劉侯逝矣吾其幾何其年十月卒後魏書曰任城王澄髙祖外示南討意在謀遷齊於明堂左个詔太常卿王諶親令龜卜易筮南伐之事其兆遇革髙祖曰此是湯武革命之卦也羣臣不敢言澄曰革者更也將欲應天順人革羣臣之命湯武得之}
  - {type: page-break, offset: 480, content: '', id: KR3k0012_WYG_728-9a, image: WYG0899/WYG0899-0431a.png}
  - {type: variant, offset: 483, length: 1, content: 乾, WYG: 吉陛下帝有天下重光累葉今日卜征乃可伐叛不得云革命此非君人卦未可為吉也髙祖厲聲曰此象云大人虎變何云不吉也澄曰陛下龍興既久不冝方同虎變髙祖勃然作色曰社稷我社稷任城而欲沮衆也澄曰社稷誠陛下之社稷然臣是社稷之臣也務參顧問敢盡愚衷髙祖久之乃解曰各言其志亦復何傷車駕還宫便詔澄未及升階遥謂曰向者之革今便欲論之明堂之忿懼衆人競言沮我大計}
