  - {type: variant, offset: 795, length: 458, content: 足居之兄長之母覆之眾歸之六體不可易合而能固安而能殺此公侯之封也公侯之子孫必復其始又閔公曰成季之將生也桓公使卜楚丘之父卜之曰男也其名曰友在公之右在右言用事閒于兩社為公室輔兩社同社毫社也兩社之閒朝廷執政所在季氏亡則魯不昌又筮之遇大有之乾曰同復于父敬如君所及生有文在其手曰友遂以命之又僖上曰秦伯伐晉卜徙父筮之吉涉河侯車敗詰之秦伯涉河則晉侯車敗則秦伯不解謂敗在己故詰之對曰乃大吉也三敗必獲晉君其卦遇蠱曰千乘三去三去之餘獲其雄狐夫蠱必其君也於周易卦利涉大川往有事也亦秦勝晉之卦也今此所言蓋卜筮書雜辭以狐蟲為君其義欲以喻晉惠公其象未聞蠱之貞風也其悔山也內卦為貞外卦為悔歲云秋矣我落具實而取其材所以克也今歲已秋風吹落山木之實則為人所取實落材亡不敗何待三敗及韓晉侯車三壞也又日初晉獻公筮嫁伯姬於秦遇歸妹之睽史蘇占之曰不吉其繇曰士卦羊亦無血也女承筐亦無貺也周易歸妹上六爻辭也衁血也貺賜也刲羊士之功承筐筐女之力也離為中女震為長男故稱上女也西鄰責言不可償也將嫁女於西而遇不吉之卦故知有責讓之言不可報償也歸妹之睽猶無相也歸妹女嫁之卦也睽乖離, WYG: 坤}
