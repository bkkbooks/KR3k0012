  - {type: punctuation, offset: 6, content: 《, id: KR3k0012_CHANT_728-bkkpn1}
  - {type: variant, offset: 6, length: 3, content: 說文曰, SBCK: 白鵝數頭無故自死而序家無恙又日郭璞旣過江宣城太守殷祐引爲參軍時有物大如水牛􅁅色卑腳腳􅀋象胷前尾上皆白大力而遲鈍來到城下衆咸異焉祐使人伏而取之令璞作卦遇遯之蠱其卦日艮體連乾其物壯巨山潛之畜匪兕匪虎身與鬼幷精見二午法當爲禽兩靈不許遂􅀍一創還其本墅按卦是爲驢鼠卜適了伏者以戟刺之深尺餘遂去不復見巫云廟神不恱日此是䢼亭驢山君鼠使詣刑山暫來過我不須觸之其精妙如此又日王導深重郭璞引參已軍事導令作掛璞言公有震厄可命駕西出數十里得一柏樹截斷如身長置常寢處災當可消矣導從其言數日果震柏}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_SBCK_728-1b}
  - {type: variant, offset: 6, length: 2, content: 說文, WYG: 白鵝數頭無故自死而序家無恙又}
  - {type: variant, offset: 6, length: 3, content: 說文曰, krp: 白鵝數頭無故自死而序家無恙又日郭璞旣過江宣城太守殷祐引爲參軍時有物大如水牛灰色卑腳腳類象胷前尾上皆白大力而遲鈍來到城下衆咸異焉祐使人伏而取之令璞作卦遇遯之蠱其卦日艮體連乾其物壯巨山潛之畜匪兕匪虎身與鬼幷精見二午法當爲禽兩靈不許遂𬒳一創還其本墅按卦是爲驢鼠卜適了伏者以戟刺之深尺餘遂去不復見巫云廟神不恱日此是䢼亭驢山君鼠使詣刑山暫來過我不須觸之其精妙如此又日王導深重郭璞引參已軍事導令作掛璞言公有震厄可命駕西出數十里得一柏樹截斷如身長置常寢處災當可消矣導從其言數日果震柏}
