  - {type: variant, offset: 2410, length: 4, content: 為鷹擊郎, SBCK: 倫爲渭源令屬薛舉之亂縣城爲賊所䧟倫遇害栁時年四十有二女及兒婦三人皆有美色栁氏謂之曰我輩逢禍亂汝父巳死我自念不能全汝我門風有素義不受辱於群賊我}
