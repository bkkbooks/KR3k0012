  - {type: variant, offset: 1858, length: 370, content: 使為將以兵劫之逵不動左右引逵使叩頭逵叱之曰安有國家長吏為賊叩頭援將斬之絳吏民聞將殺逵皆乘城呼曰負要殺我賢君寧俱死耳左右義逵多為請遂得免韋昭吳書曰頴熙使魏辭意不屈魏留之熙懼見迫乃引刀自刺中乳房上聞嘉之賜鹽米復其國蜀志曰義陽傅彤先主與吳戰退軍彤斷後距戰兵人死盡吳將語彤令降罵曰吳狗何有漢將軍降者遂戰死晉書曰太守陳楚迫韋忠為功曹會山羌攻郡楚攜子走出賊射之中三創忠冒刃伏楚以身捍之泣曰韋忠願以身代君乞諸王哀之亦遭五矢賊相謂曰義士也舍之忠於是負楚以歸又曰辛勉累遷侍中及洛陽陷隨帝至平陽劉聰遣其黃門侍郎喬度齎藥酒逼之勉曰大丈夫豈以數年之命而虧高節事二姓下見武皇帝哉引藥將飲度遽止之曰主上相試耳君貞士也歎息而去習鑿齒晉春秋曰後主將從譙周榮北地王諶怒曰若數窮力屈禍敗必及便當父子君臣背城一戰同死社稷以見先帝可也後主不納遂送璽綬是日諶哭於昭烈之廟先殺妻子然後, SBCK: ''}
