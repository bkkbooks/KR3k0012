  - {type: variant, offset: 2416, length: 8, content: 府據箕山為固與洛, SBCK: 女等皆垂泣曰唯母所命栁氏自􅄬于井其女及婦相繼而下皆重死於井中又曰趙元揩妻者清河崔氏之女也父儦在文學􅀓家有素範子女皆遵禮度元揩父爲僕射家冨於財重其門望厚禮以娉之元揩甚敬崔氏雖在宴􅀻不妄言􅀏進止容服動合禮儀化及之反也元揩隨至河北將歸長安至􅇭}
