  - {type: variant, offset: 1738, length: 1, content: 有, SBCK: 誓不毀節今逼如此豈非命也昇門樓自投於地二脛俱折口誦佛經俄而卒又曰吕超殺纂纂后楊氏及侍婢數人殯纂于城西超問楊氏玉璽何在楊氏怒曰盡懷之矣楊氏國色也超將妻之謂父桓曰后􅀂自殺禍及卿宗桓以言吿楊氏楊氏曰大人本賣女與氐以圖冨貴一之以甚可復使女}
  - {type: variant, offset: 1738, length: 1, content: 有, WYG: 誓不毁節今逼如此豈非命也昇門樓自投扵地二脛俱折口誦佛經俄而卒又曰吕紹殺纂后楊氏及侍婢数人殯纂于城西紹問楊氏玉璽何在楊氏怒曰盡壊之矣楊氏國色也紹将妻之謂父桓曰后若自殺禍及卿宗桓以言告楊氏楊氏曰大人本賣女與氐以圖富貴一之已甚可復使女}
