  - {type: variant, offset: 2404, length: 3, content: 張季珣, SBCK: 楊慶王世充以兄女妻之署滎州刺史及世充將敗慶欲將其妻同歸長安其妻乃告之曰國家以妾奉箕箒於公者欲以申厚意結公心耳今叔父窮迫家國將危而公不顧婚姻􅀌􅀒付嘱爲全家之計非妾所能責公也妾􅀂至長安則公家一婢耳何用妾爲願得送還君之惠也慶不許其妻遂沐浴靚粧飲藥而死慶遂歸大唐爲冝州刺史又曰元務光母者范陽盧氏女也少好讀書造次以禮盛年寡居諸子㓜弱家貧不能就學盧氏毎親自教授朂以義方丗以此稱之仁壽末漢王諒舉兵反遣將綦良徃山東略地良以務光爲記室及良敗慈州刺史上官政薄務光之家見盧氏恱而逼之盧氐以死自誓政爲人凶悍怒甚以燭燒其身盧氏執志彌固竟不屈節又曰孝女王舜者趙郡王子春之女也子春與從兄長忻不恊屬齊滅之際長忻與其妻同謀殺子春舜時年七歳有妹桀年五歳璠年二歳並􅀌苦􅀉食親戚舜撫育二妹恩義甚篤而舜隂有復讎之心長忻殊不爲備姊妹俱長親戚欲嫁之􅂺拒不從乃宻謂其二妹曰我無兄弟致使父讎不復吾輩雖是女子何用生爲我欲共汝報復汝意如何妹皆垂泣曰唯姊所命是夜姊妹各持刀踰􅘘而入手殺長忻夫妻以告父墓因詣縣請罪姊妹爭爲謀首州縣不能决髙祖聞而嘉歎特原其罪又曰韓覬妻者洛陽于氏女也字茂德父寔周大左于氐年十四適于覬雖生長膏􅃾家門鼎盛而動遵禮度躬自儉約宗黨敬之年十八覬從軍戰没于氏哀毀骨立慟感行路毎至朝夕奠􅀕皆手自持及免喪其父以其㓜少無子將嫁之誓無異志復令家人敦喻于氏晝夜涕泣截髮自誓其父喟然傷感遂不奪其志因飬夫之弟子丗隆爲嗣身自撫育愛同巳生訓導有方卒能成立自孀居巳後唯時或歸寜至親族之家絶不來徃有尊卑就省謁者送迎皆不出户庭􅂼食布衣不聽聲樂以此終身又曰裴倫妻者河東栁氏女也少有風訓}
