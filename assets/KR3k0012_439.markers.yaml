  - {type: variant, offset: 2954, length: 172, content: 公主伏誅初晉之就誅寮吏皆奔散唯司功李撝徒步不失在官之禮仍哭其屍姚崇聞之曰欒布之儔也擢為尚書郎又曰徐晦由進士第登直言科為櫟陽尉皆自楊憑所薦及憑得罪貶官臨賀縣尉親交無敢祖送獨晦至藍田與憑言別時故相權德輿與憑交分㝡深知晦之行因謂晦曰今日送臨賀誠為厚矣無乃反為累乎晦曰晦自布衣沐楊公之知今日不一送他日相公為奸邪所讚烏可不送相公乎德輿大慚因稱之於人不數日, WYG: ''}
