  - {type: variant, offset: 3008, length: 518, content: 登直言科為櫟陽尉皆自楊憑所薦及憑得罪貶官臨賀縣尉親交無敢祖送獨晦至藍田與憑言別時故相權德輿與憑交分㝡深知晦之行因謂晦曰今日送臨賀誠為厚矣無乃反為累乎晦曰晦自布衣沐楊公之知今日不一送他日相公為奸邪所讚烏可不送相公乎德輿大慚因稱之於人不數日御史中丞李夷簡請為監察晦至之日白夷簡曰晦不由公門公何所取信而見獎拔於千萬人中哉荅曰君送楊臨賀寧肯負國乎由是名益振呂氏春秋曰要離既殺王子慶忌吳王大悅請分國要離曰不可殺妻子焚而揚其灰為不仁為故主殺新主為不義不可以生伏劍而死韓詩外傳曰楚昭王有士曰石奢公正而好直王使為理於是有殺人者石奢追之則其父也還反於庭曰殺人者父也以父成政非孝也不行君法不忠也遂伏鈇鑕曰命在君君曰追而不及庸有罪乎子其治事石奢曰不然死罪而生不廉也君赦之上之惠臣不失法下之義遂不去鈇鑕而死乎庭中會稽典錄曰魏朗字少英會稽人靈帝即位竇武陳蕃等欲誅宦官謀泄反為所害朗以黨被徵乃慷慨曰丈夫與陳仲舉李元禮俱死得非乘龍上天乎於丹陽牛渚自殺海內列名八俊張鄢文士傳曰陸機為大都督請孫承為司馬成都王既害機兄弟收承付刺奸獄考掠千餘兩踝骨見終不自誣獄吏知承烈士諫承曰二陸之痛誰不知枉君何不惜身乎承乃仰而歎曰吾亡不能濟死而相誣非吾徒也獄吏作承服辭謀反狀成都乃下令夷承, SBCK: 四百}
