  - {type: variant, offset: 3527, length: 691, content: 族劉世叔異苑曰潯陽周虓字孟威寧康中鎮于巴西為符堅所獲守節不屈堅使使清道虓躬治達陌謂使者云煩君語氐賊符堅何至取國士如此堅聞之曰貉子正欲覔死殺之適足成其名耳及苦加栲楚不食而卒堅怒猶未歇剖棺臨視虓欻運眸齗何斤反齒鬚鬢張列精暗明亮廻盼矚堅乃厚加賵贈劉向新序曰崔杼弒莊公申蒯漁於海而後至將入死其御止之曰君之無道聞於天下不可死也申蒯曰告我晚子不早告我吾食亂君之食而死治君之事乎子勉之子無死其御曰子有亂主猶死之我有治長奈何勿死至於門曰申蒯聞君死請入守門者以告崔子曰勿內申蒯曰汝疑我乎吾與汝臂乃斷其臂以予其門者門者以示崔子崔子陳八列曰令入申蒯拔劍呼天三踊乃鬭殺七列未及崔子一列而死其御亦死之門外君子聞之曰蒯可謂守節死義矣又曰白公勝欲殺楚惠王出亡令尹司馬皆死勝拔劍而屬之矜屈盧曰子與我舍子不與我將殺子屈盧曰詩有之曰莫莫葛藟肄于條枚愷悌君子求福不回今子殺子父而求福於盧也可乎且吾聞之知命之士見利不動臨死不恐為人臣者時生則生時死則死是謂人臣之禮故上知臣道其有可劫乎胡不推之白公勝乃入其劍又曰白公勝既殺令尹司馬欲立王子閭以為王王子閭不肯劫以刃王子閭曰王孫輔相楚國扶正王室后自庇焉閭之不願也今子假威以暴王室殺伐以亂國家吾雖死不子從也白公強之不可遂殺之常琚華陽國志曰張飛攻破巴郡獲將軍嚴顏謂曰大軍至何以不降敢逆戰乎顏對曰卿等無狀侵奪我州但有斷頭將軍無降將軍也飛怒曰牽去斫頭顏正色曰斫頭便斫何為怒也飛義之引為賓客又曰章明字公儒繁人王皓字子離江夏人也明為太中大夫莽篡位歎曰不以一身事二主遂自殺皓為美陽令去莽歸蜀公孫述僣號高之使聘之皓乃自刎以頭付使者述慚怒誅其妻子又曰李業字巨遊梓潼人少執志清白太守到咸慕其名辟為功曹, SBCK: ''}
