  - {type: variant, offset: 1740, length: 4, content: 其師者惇, SBCK: 于二氐乎桓不能強乃自殺後魏書曰經州貞女仙氏許嫁彭老生爲妻幣娉旣畢未成禮率行貞淑君貧常自汲以養父母老生輙徃逼之女曰與君禮命雖畢二門多故未相見何由不禀父母擅見陵辱􅀂茍行非禮正可身死耳遂不肯從老生怒而刺}
