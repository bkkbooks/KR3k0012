  - {type: variant, offset: 1529, length: 0, content: '', krp: 内外莫不懷之𥘉僧辨}
  - {type: variant, offset: 1530, length: 6, content: 吏良儀容偉麗, SBCK: 獄夫人流淚徒行將謝罪丗祖不與相見時貞惠世子有寵於世祖軍國大事多問焉夫人徃詣閤自陳無訓涕泗嗚咽衆並憐之及僧辨免出夫人深相責勵辭色俱嚴云人之事君唯湏忠烈非但保祐當世亦乃慶流子孫及僧辨剋復舊京功盖天下夫人恒自謙損不以冨貴驕物朝野咸共稱之謂爲明哲婦人也崔鴻前秦録曰符登妻毛氏毛與之女也善􅀐射營壘旣䧟猶彎弓跨馬率壯士數百與姚萇交戰殺賊七百餘人衆寡不敵爲萇所執毛有姿色萇將納之毛罵曰天子皇后安可爲賊􅆧所辱萇殺之崔鴻前趙録曰陜有婦人十九􅄔居事叔姑甚謹其家欲奪而嫁之此婦毀靣自誓崔鴻後凉録曰建中將軍遼東}
  - {type: page-break, offset: 1530, content: '', id: KR3k0012_SBCK_439-3b}
  - {type: variant, offset: 1530, length: 6, content: 吏良儀容偉麗, WYG: 獄夫人流淚徒行将謝罪世祖不與相見時貞惠世子有寵扵世祖軍國大事多問焉夫人往詣閤自陳無訓涕泗嗚咽衆並憐之及僧辯免出夫人深見責勵辭色俱嚴云人之事君唯湏忠烈非但保祐當世亦乃慶流子孫及僧辯克復舊京功盖天下夫人恒自謙損不以富貴驕物朝野咸共稱之謂為明哲夫人也崔鴻前秦録曰苻登妻毛氏毛與之女也善騎射營壘既䧟猶彎弓跨馬率壮士数百與姚萇交戰殺賊七百餘人衆寡不敵為萇所執毛有姿色萇将納之毛罵曰天子皇后安可為賊羗所辱萇殺之崔鴻前趙録曰陜有婦人十九婺居事叔姑甚謹其家欲奪而嫁之此婦毁靣自誓崔鴻後凉録曰建中将軍遼東}
