  - {type: variant, offset: 2425, length: 2, content: 連接, SBCK: 遇盗攻掠元揩僅以身免崔氏爲賊所拘賊請以爲妻崔氏謂賊曰我士大夫女爲僕射子妻今日破亡自可即死遣爲賊婦終必不能羣賊毀裂其衣形體悉露􅅞於簀􅇃之上將凌辱詐之曰人力巳屈當聽處分不敢相違請解􅅞賊遽釋之妻因着衣取賊佩刀􅀝樹而立曰欲殺我任加刀鋸􅀂欲覔死任來相逼賊大怒亂射殺元揩後得殺妻者支解之以􅀕崔氏之柩又曰鍾士雄母者臨賀蔣氏女也士雄仕陳爲伏波將軍陳主以士雄嶺南酋帥慮其反覆毎質蔣氏於都下}
