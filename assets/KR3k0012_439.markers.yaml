  - {type: variant, offset: 2475, length: 382, content: 敗軍之將猶是天子爪牙之臣何容拜賊也密壯而釋之翟讓從之求金不得遂殺之時年二十八又曰許善心母范氏梁太子中舍人孝才之女也少寡養孤博學有高節高祖知之勑尚食每獻時新常遣分賜嘗詔范入內侍皇后詣讀封永樂郡君及善心遇禍范年九十有二臨喪不哭撫柩曰能死國難我有兒矣因臥不食後十餘日亦終唐書曰屈突通聞京師平家屬盡沒乃留顯和鎮潼關率兵東下將如洛陽通適進路而顯和降於劉文靜遣副將竇琮段志玄等率精騎與顯和追之及於稠桑通結陣以自固竇琮縱通子壽令往諭之通大呼曰昔與汝為父子今與汝為仇讎命左右射之顯和呼其眾曰京師陷矣汝並命關西人欲何所去眾皆釋仗通知不免乃下馬東南向再拜號哭曰臣力屈兵敗不負陛下天地神祇實所鑒察遂擒通送干長安高祖謂曰何相見晚耶通泣對曰通不能盡人臣之節力屈而至為本朝之辱高祖曰隋室忠臣也命釋之授兵部尚書封蔣國公又曰劉世讓字元欽雍州醴泉人也為定安道行軍總管率兵以拒薛舉戰敗世讓及弟寶俱為舉, WYG: 官}
  - {type: punctuation, offset: 2479, content: ，, id: KR3k0012_CHANT_439-bkkpn689}
