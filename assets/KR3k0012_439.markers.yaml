  - {type: variant, offset: 309, length: 554, content: 身為盟遂自剄以明孟嘗涽王乃知孟嘗君果無謀又曰漢高帝既立以田橫兄弟本定齊齊人賢者多附焉今在海中不收後為亂乃使赦罪召之橫乃與其客二人乘傳詣雒陽至尸鄉尸鄉在偃師廄置置馬以傳驛也橫謝使者曰人臣見天子當洗沐因止留謂其客曰橫始與漢王俱南面稱孤今漢王為天子而橫為亡虜北面事之其恥甚矣且吾烹人之兄與其弟比肩而事主縱彼畏天子詔不敢動我獨不愧於心乎且陛下欲見我者不過欲見吾面貌耳今陛下在雒陽斬吾頭馳三十里間形容未敗猶呆觀也遂自剄二客亦自殺從之高帝聞大驚以田橫客皆賢聞其餘五百人在海中使召之至聞橫死又皆自殺是知田橫兄弟皆得士也又曰楚下滎陽生得周苛項王謂苛爾從我我以公為上將軍封三萬戶苛罵曰若不趣降漢漢今虜若若非漢敵也項王怒烹苛又曰李廣從衛青伐匈奴失道後至大將軍使長史急責廣之幕府對簿廣曰校尉無罪乃我自失道謂其麾下曰廣結髮與匈奴大小七十餘戰今幸從大將軍出接單于兵而大將軍又徙廣部行回遠而又迷失道豈非天哉且廣年六十餘矣終不能復對刀筆之吏遂引刀自刎軍士大夫皆哭漢書曰高祖時告趙王張敖反者貫高對曰獨吾屬為之王不知也吏按笞數千刺爇身無完者終不復言廷尉以貫高辭聞上曰壯士誰知者以私問之中大夫泄公曰臣素知此趙國立名義不侵為然諾者也上使泄公持節問之高曰人情豈不各愛其父母妻子哉今吾三族皆巳論死豈以王易吾親哉顧為王實不反獨吾等為之具道本指所以不知狀, SBCK: 爲冝加爵號}
