  - {type: variant, offset: 2404, length: 3, content: 張季珣, WYG: 楊慶王世充以兄女妻之署榮州刺史及世充将敗慶欲将其妻同歸長安其妻乃告之曰國家以妾奉箕箒扵公者欲以申厚意給公今叔父窮廹家國将危而公不顧婚姻孤負付属為全家之計非妾所能貴公也妾若至長安則公家一婢耳何用妾為願得送還君之惠也慶不許其妻遂沐浴新粧飲藥而死慶遂歸大唐為宜州刺史又曰元務光母者范陽盧氏女也少好讀書造次以禮盛年寡居諸子㓜弱家貧不能就學盧氏每親自教授朂以義方世以此稱之仁夀末漢王諒舉兵反遣将綦良往山東略地良以務光為記室及良敗慈州刺史上官政簿務光之家見盧氏恱而逼之盧氏以死自誓政為人凶悍怒甚以燭燒其身盧氏執志彌固竟不屈節又曰孝女王舜者趙郡王子春之女也子春與從兄長忻不恊属齊滅之及長忻與妻子同謀殺子春舜時年七嵗有妹粲年五嵗璠年二嵗並孤苦寄食親戚舜撫育二妹恩義甚篤而舜隂有復讎之心長忻殊不為備姊妹俱長親戚欲嫁之輙拒不從乃宻謂其二妹曰我無兄弟致使父讎不復吾輩雖是女子何用生為我欲共汝報復汝意如何妺皆垂泣曰唯姊所命是夜姊妹各持刀踰墻而入手殺長忻夫妻以告親戚詣縣請罪姊妹争為謀首州縣不能决髙祖聞而嘉之免其罪又曰韓覬妻者洛陽于氏女也字茂徳父寔周太左輔于氏年十四適于覬雖生長膏腴家門鼎盛而動遵禮度躬自儉約宗黨敬之年十八覬從軍戰没于氏哀毁骨立慟感行路每至朝夕奠祭皆手自持及免䘮其父以其㓜少無子将嫁之誓無異志復令家人敦喻于氏晝夜涕泣截髪自誓其父喟然傷感遂不奪其志因養夫之弟子世隆為嗣身自撫育愛同已生訓導有方卒能成立自孀居已後唯時或歸寧至親族之家絶不來往有尊卑就省謁者送迎皆不出户庭蔬食布衣不聴聲樂以此終身又曰裴倫妻者河東栁氏女也少有風采}
