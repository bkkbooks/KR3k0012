  - {type: variant, offset: 876, length: 634, content: 上賢高能自立然諾使泄公赦之告曰張王已出上多足下故赦足下高曰所以不死者白張王不反耳今王已出吾責塞矣且人臣有篡弒之名何面目復事上哉乃仰絕吭而死又曰丞相王嘉數上言不宜封董賢上怒詔嘉詣廷尉詔獄使者至府掾吏涕泣和藥進嘉嘉引藥杯擲地謂官屬曰丞相宰得備位三公奉職負國當伏刑都市以示萬眾豈兒女子耶何謂咀藥而死嘉遂乘吏小車去蓋不冠隨使者詣廷尉二十餘日不食歐血而死又曰田延年有罪霍光使往就獄延年曰幸縣官寬我耳何面目入牢獄使眾人指笑我卒徒唾吾背乎即閉閣獨居持刀東西步聞鼓聲及自刎死范曄後漢書曰趙苞遷遼西太守明年遣使迎母及妻子為鮮卑鈔掠苞率步騎與賊對陣賊出母示苞苞悲號謂母曰為子無狀欲祿奉養朝夕不圖為母作禍母遙謂苞曰人各有命何得相顧以虧忠義昔王陵母向漢使伏劍以固其志爾其勉之苞即時進戰賊悉摧破其母妻皆遇害苞殯歛母畢白上歸葬帝遣策弔慰葬訖苞歐血而死東觀漢記曰溫序字次房為隗囂別將茍宇所劫宇謂序曰子若與我并威同力天下可圖也序素有氣力大怒叱宇等曰虜何敢迫脅漢將因以節撾殺數人賊眾爭欲殺之宇止曰此義士也可賜以劍序受劍銜鬚顧左右曰賊所迫殺無令鬚汙土遂伏劍而死又曰馬援曰方今匈奴烏桓尚擾北邊欲自請擊之男兒要當死於邊野以馬革褁尸還墓耳何能臥床上在兒女子手中耶故人孟冀曰諒為烈士當如此矣又曰永和八年匈奴遣使求和親上遣鄭眾持節使匈奴眾素剛烈至北庭虜欲令拜眾不為屈單于大怒圍守閉之不與水火欲脅服眾眾拔刃自誓單于恐而止又曰漢圍隗囂囂窮困其大將王捷登城呼漢軍曰為隗王城守者皆必死無二心願諸軍亟罷請自殺以明之遂刎頸而死, SBCK: 妃}
