  - {type: variant, offset: 358, length: 881, content: 為亂乃使赦罪召之橫乃與其客二人乘傳詣雒陽至尸鄉尸鄉在偃師廄置置馬以傳驛也橫謝使者曰人臣見天子當洗沐因止留謂其客曰橫始與漢王俱南面稱孤今漢王為天子而橫為亡虜北面事之其恥甚矣且吾烹人之兄與其弟比肩而事主縱彼畏天子詔不敢動我獨不愧於心乎且陛下欲見我者不過欲見吾面貌耳今陛下在雒陽斬吾頭馳三十里間形容未敗猶呆觀也遂自剄二客亦自殺從之高帝聞大驚以田橫客皆賢聞其餘五百人在海中使召之至聞橫死又皆自殺是知田橫兄弟皆得士也又曰楚下滎陽生得周苛項王謂苛爾從我我以公為上將軍封三萬戶苛罵曰若不趣降漢漢今虜若若非漢敵也項王怒烹苛又曰李廣從衛青伐匈奴失道後至大將軍使長史急責廣之幕府對簿廣曰校尉無罪乃我自失道謂其麾下曰廣結髮與匈奴大小七十餘戰今幸從大將軍出接單于兵而大將軍又徙廣部行回遠而又迷失道豈非天哉且廣年六十餘矣終不能復對刀筆之吏遂引刀自刎軍士大夫皆哭漢書曰高祖時告趙王張敖反者貫高對曰獨吾屬為之王不知也吏按笞數千刺爇身無完者終不復言廷尉以貫高辭聞上曰壯士誰知者以私問之中大夫泄公曰臣素知此趙國立名義不侵為然諾者也上使泄公持節問之高曰人情豈不各愛其父母妻子哉今吾三族皆巳論死豈以王易吾親哉顧為王實不反獨吾等為之具道本指所以不知狀於是泄公具以報上上乃赦趙王上賢高能自立然諾使泄公赦之告曰張王已出上多足下故赦足下高曰所以不死者白張王不反耳今王已出吾責塞矣且人臣有篡弒之名何面目復事上哉乃仰絕吭而死又曰丞相王嘉數上言不宜封董賢上怒詔嘉詣廷尉詔獄使者至府掾吏涕泣和藥進嘉嘉引藥杯擲地謂官屬曰丞相宰得備位三公奉職負國當伏刑都市以示萬眾豈兒女子耶何謂咀藥而死嘉遂乘吏小車去蓋不冠隨使者詣廷尉二十餘日不食歐血而死又曰田延年有罪霍光使往就獄延年曰幸縣官寬我耳何面目入牢獄使眾人指笑我卒徒唾吾背乎即閉閣獨居持刀東西步聞鼓聲及自刎死范曄後漢書曰趙苞遷遼西太守明年遣使迎母及妻子為鮮卑鈔掠苞率步騎與賊對陣賊出母示苞苞悲號謂母曰為子無狀欲祿奉養朝夕不圖為母作禍母遙謂苞曰人各有命何得相顧以虧忠義昔王陵母向漢使伏劍以固其志爾其勉之苞即時進戰賊悉摧破其母妻皆遇害苞殯歛母畢白上歸葬帝遣策弔慰葬訖苞歐血而死東觀, WYG: ''}
