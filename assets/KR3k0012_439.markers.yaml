  - {type: variant, offset: 5, length: 3, content: 九烈士, SBCK: 貞女上毛詩曰漢廣德廣所及也文王之道􅀍于南國美化行平江漢之域無思犯禮求而不可得南有喬木不可休息漢有游女不可求思漢之廣矣不可泳思江之永矣不可方思又曰行露召伯聽訟也衰亂之俗微貞信之教興強􅁀之男不能侵陵貞女也誰謂雀無角何以穿我屋誰謂女無家何以速我獄雖速我獄室家不足又曰栢舟共姜自誓也衛丗子共伯蚤死其妻守義父母欲奪而嫁之誓而弗許故作是詩以絶之也汛彼栢舟在彼中河髧彼兩髦實唯我儀之死矢靡它母也天只不諒人只}
