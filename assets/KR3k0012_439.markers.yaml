  - {type: variant, offset: 1525, length: 3, content: 八為郡, SBCK: 餘歳爲􅀖邑所宗旣歸鄭氏爲九族可重休前妻女少􅀌父希臨終庶子沉生是時漢未大亂希命棄之曰奈何使舅愛之至不存活乎寧割肌膚之恩以存顧援之命飬沉乃前女力不兼舉九年之中三不舉子梁書曰王僧辨母貞敬太夫人夫人姓魏氏僧辨父神念以天􅁥􅀄董率徒衆據東􅀜退保合肥漅胡西因娶以爲室生僧辨性甚安和善於綏接家}
  - {type: variant, offset: 1525, length: 1, content: 八, WYG: 餘嵗}
  - {type: variant, offset: 1525, length: 3, content: 八為郡, krp: 餘歳爲邦邑所宗旣歸鄭氏爲九族可重休前妻女少孤父希臨終庶子沉生是時漢未大亂希命棄之曰奈何使舅愛之至不存活乎寧割肌膚之恩以存顧援之命飬沉乃前女力不兼舉九年之中三不舉子梁書曰王僧辨母貞敬太夫人夫人姓魏氏僧辨父神念以天監𥘉董率徒衆據東關退保合肥漅胡西因娶以爲室生僧辨性甚安和善於綏接家}
  - {type: variant, offset: 1527, length: 1, content: 郡, WYG: 邦邑所宗既歸鄭氏為九族所重休前妻女少孤父希臨終庶子沉生是時漢末大亂希命棄之曰柰何使舊愛之至不存活乎寧割肌膚之恩以存顧援之命飬沉及前女力不兼舉九年之中三不舉子梁書曰王僧辯母貞敬太夫人夫人姓魏氏僧辯父神念以天監初董率徒衆據東關退保合肥漅湖西因娶以為室生僧辯性甚安和善于緩接家}
