  - {type: variant, offset: 1522, length: 1, content: 恭, SBCK: 弱不能報毓母載車出與仇家相逢於府門外乃拔刀下車手斫殺之州郡義其女人能如此縱而不問及毓長大節行又如此故令酒泉􅀞其母子儀像於㕔壁而銘賛之謝靈運晉書曰劉曜王彌入于京都焚燒宫廟六宫幽辱􅉖懷太子妃拔刄距賊曰吾皇太子妃義不爲逆胡所汙遂見害何法盛晉中興書曰張茂􅀄起義討賊陳武一郡用全中宗􅀄鎮召爲􅁺屬中興累遷至太子右衛率出爲呉國内史爲沈充所殺茂妻陸氏散家財合義軍助國討充詣闕上書理茂忠節詔書褒歎追贈太僕卿鄧粲晉紀曰前始興太守尹虞起兵於巴陵日號􅁥軍以討杜弢連戰稍勝遂進長沙爲弢所没􅀄敗略虞二女皆國色也將妻之女不肯曰我父二千石終不爲賊作婦有死而巳及虞攻賊賊殺之又曰散􅀐常侍梁緯妻辛氏隴西人也劉曜欲妻之使人扶取因據地哭從者亦哭曜並殺之又曰廣平太守崔諒表政榖孰長崔希子休妻石氏}
  - {type: page-break, offset: 1522, content: '', id: KR3k0012_SBCK_439-2b}
  - {type: page-break, offset: 1522, content: '', id: KR3k0012_SBCK_439-3a}
  - {type: variant, offset: 1522, length: 1, content: 恭, WYG: 弱不能執毓母載車出與仇家相逢扵府門外乃㧞刀下車手格殺之州郡義其女人能如此縦而不問及毓長大節行又如此故令酒泉畫其母子儀像于壁而銘賛之謝靈運晉書曰劉曜王彌入于京都焚燒宫廟六宫幽辱愍懐太子妃㧞刀距賊曰吾皇太子妃義不為逆胡所汚遂見害何法盛晉中興書曰張茂祖起義討賊陳武一部用全中宗初鎮召為掾属中興累遷至太子左衛率出為吳國内史為沈充所殺茂妻陸氏散家財合義軍助國討充詣闕上書理茂忠節詔書褒歎追贈太僕卿鄧橜紀曰前始興太守尹虞起兵扵巴陵曰號監軍以討杜弢連戰稍勝遂進長沙為弢所没初敗略虞二女皆國色也将妻之女不肯曰我父二千石終不為賊作婦有死而已及虞攻賊賊殺之又曰散騎常侍梁緯妻辛氏隴西人也劉曜欲妻之使人扶取因據地哭從者亦哭曜並殺之又曰廣平太守崔諒表政糓執長崔希子休妻石氏}
