  body:
  - {type: variant, offset: 3, length: 4, content: 五盌方言, SBCK: 六觥觚巵􅓢􅊦斝鍾瓉鐏彛滑稽榼壷洗觥三禮圗}
  - {type: variant, offset: 3, length: 373, content: 五盌方言曰盌謂之盂或謂之銚銳或謂之櫂椀謂之䀉木謂之涓抉蠲玦兩音說文曰盌小盂也吳志曰曹公出濡須甘寧為前部督受勑斫敵前營孫權特賜米酒眾肴寧乃以銀椀酌自飲兩椀乃酌與其都督都督伏不肯時持寧引劍自削置𣍿上呵之曰卿見知於至尊孰與甘寧寧尚不惜死卿何以獨惜死乎都督即起拜持酒通次酌兵各一銀椀至更時衘枚出斫敵敵驚動遂退寧益貴重晉陽秋曰王敦許周訪荊州又授梁州訪怒敦書喻之遺以玉盌訪投盌於地又曰武帝時魏府丞蕭譚承徐脩儀䟽作漆畫銀帶粉盌詔殺之盤門中亦云晉咸康起居注曰詔賜遼東叚遼等瑠璃盌義熙起居注曰林邑王范明達獻金盌一副蓋一副東宮舊事曰漆盌子一百枚抱朴子曰外國作水精椀實是合百灰以作之交廣間多有得其法而鑄作之者今以語俗人俗人殊不肯信乃云水精本是自然之物崔豹古今注曰魏帝以車渠石為酒盌文士傳曰潘𡰥音夷與同僚飲主人有瑠璃椀使客賦之𡰥於座立成於手尋陽記曰龍窟有深潭有人於此水邊, WYG: 六觥觚巵􅓢􅊦斚鍾瓉罇滑稽榼壺}
