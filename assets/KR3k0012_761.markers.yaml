  - {type: variant, offset: 3427, length: 2, content: 圃蓋, SBCK: 間折衝千里也莊子曰市上之人有善戴尊者酒尊也累十尊而行人有與之更者行道未半而以其尊顛又曰百年之木破爲犧樽青黄而文之其一斷在溝中比犧樽於溝之斷則美惡有間矣其於失徃一也桀跖與魯史行義有間矣然其失性均也又曰純朴不殘孰爲犧樽白王不毀孰爲珪璋道徳不廢安取仁義淮南子曰百圍之木斬而爲犧樽龍虵虎豹曲成文章髙誘曰折爲蟠龍伏虎之狀也又曰夫聖人之道猶中衢而設樽􅁘過者斟酌多少不同各得其所冝又曰夫奉一爵酒不知於邑言其輕也挈石之樽則白汗交流言其重也又况羸天下之憂而任海内之事者乎重於樽亦逺矣風俗通曰坐不移樽俗􅀃几宴飲者移轉樽酒令人訟諍志林曰先代不識犧樽但云沙􅀞之飾以翠羽至魏明帝時魯郡於地中得齊大夫子尾送女噐有犧樽作犧牛形自尓乃知其定形呉越春秋曰闔閭女自殺以銀樽送之鄴中記曰石虎正㑹殿前有白龍樽作金龍於東箱西向龍口金樽受五十斛涼州記曰胡安據等發張駿陵得白玉樽受三升戴延之西征記曰太極殿中有銅龍長三丈銅樽容三十斛正旦大㑹龍從土中受酒口吐之於樽中傅􅀇朝㑹賦曰跱鳯虎之二樽清酤皆以淵停蔡邕論銘曰漢獲齊侯寳樽于槐里也孫綽陽燧樽銘曰詳}
