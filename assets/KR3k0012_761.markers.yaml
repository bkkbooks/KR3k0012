  - {type: variant, offset: 377, length: 549, content: 銅盌忽浪起水長便失盌此人後見此盌置城裏井邊交州雜記曰太康四年刺史陶璜表送林邑王范熊所獻青白石盌一口白水精盌二口陶侃故事曰侃上成帝水精盌一枚世說曰王大將軍尚主如廁即還婢擎金盤盛水琉璃盛澡豆秦嘉婦與嘉書曰今奉金錯盌一枚可以盛書水瑠璃盌一枚可以服藥酒諸葛恢集詔荅恢曰今致瑠璃盌一枚表曰天恩賜廣州白盌釰滔母與從祖虞光祿書曰賜瑠璃盌盂說文曰盂飲器也方言曰宋楚趙魏之間或謂之㯸子忍箋矜二切一曰盤也河濟之間謂之䀂音安𥂫音殘亦謂之銚銳漢書曰東方朔上嘗使數家射覆置守宮於盂下使射之盂若盤而大盤與鉢字同墨子曰若夫兼相愛交相利此自先聖六王者親行之何以知先聖六王之親行之吾以其所書於竹帛鏤於金石琢於盤盂傳遺後世子孫者知之晉四王起事曰惠帝還洛陽黃門以瓦盂盛茶上至尊韓子曰為人君者猶盂也人猶水也盂圓水圓盂方水方涼州異物志曰琥珀作盂瓶東方朔荅客難曰安於覆盂蘇鉝林邑記曰林邑王范明達獻琉璃蘇鉝二口安哉李尤安哉銘曰安哉令名甘旨是盛埏埴之巧甄陶所成食彼美珍思此鹿鳴匕方言曰匕謂之匙說文曰柶音四匕也所以取飯易曰震驚百里不喪匕鬯詩曰有饛簋飧有捄棘匕箋云匕所以載鼎實也周禮曰大喪共角柶角柶角匕也禮喪大記曰揳齒用角柶也儀禮曰主人執匕禮曰杜蕢苦怪切謂晉平公曰蕢也宰夫也非切是供又曰匕以桑長三尺或曰五尺刊其柄與末匕所以載牲字者此謂喪祭也吉祭匕用棘, WYG: 觥}
