  - {type: variant, offset: 3415, length: 2, content: 其口, SBCK: 尊也斝讀爲嫁彛􅀞禾稼也黄彞黄目尊也著尊者著地無足壷尊者以壷爲尊禮曰五獻之尊門外􅇲門内壷君樽瓦甒音武此以小爲貴也壷大一石瓦甒􅇲大小未聞也易日樽酒貳用􅇲也犧樽䟽布􅇈音覔樿之善切勺此以素爲貴}
