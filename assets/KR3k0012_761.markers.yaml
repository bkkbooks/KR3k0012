  - {type: variant, offset: 3058, length: 0, content: '', WYG: 父母舅姑之敦音堆牟巵匜非餕莫敢用史記曰髙祖奉玉巵起為太上皇壽也漢書曰沛公與項羽㑹鴻門樊噲居营外聞事危急乃持楯直入帳下羽問為誰張良曰沛公驂乗羽曰壯士哉賜巵酒彘肩噲飲酒㧞劒切肉食之羽曰復能飲乎曰死且不避巵酒安足辭韓子曰棠谿空見韓昭侯曰今有白玉巵而無當有瓦巵而有當君渴將何以飲君曰以瓦巵棠谿空曰玉巵至貴君不以飲者以其無當耶君曰然空曰為人君漏泄羣臣之語猶玉巵無當也空每見而出昭侯必獨卧惟恐夢言泄於妻妾戰國䇿曰昭陽為楚伐魏覆軍殺將得入城移師而攻齊陳軫為齊王使見昭陽冄拜賀戰勝起而言曰臣竊譬之楚有祠者賜其舎人酒一巵舎人相謂曰數人飲不足一人飲有餘請畫地為虵虵先成者飲酒一人虵先成引酒且飲之乃左手持巵右手畫虵曰吾能為之足足未成一人蛇成奪其巵曰虵固無足子安能為之足遂飲酒今子伐齊為虵畫足也淮南子曰霤水足以溢壺榼而江河不能實漏巵鹽鐡論曰川源不能實漏巵魏文帝荅楊修書曰重惠琉璃巵昭厚意晉𫝊咸汙巵賦曰人有遺余琉璃巵者小兒竊弄墮之不潔意旣惜之又感寶物之汙辱乃喪其所以為寶况君子行身而可以有玷乎􅓢音移說文曰􅓢似􅅅魁柄中有道可以注水纂文曰􅓢水器也儀禮曰嫡入室媵御奉􅓢沃盥左𫝊曰晉公子過秦秦伯納女五人懷嬴與焉奉􅓢沃盥而揮之國語曰勾踐命諸稽郢行成於呉曰勾踐願請盟一介適女}
