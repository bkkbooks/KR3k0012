  - {type: variant, offset: 3420, length: 0, content: '', SBCK: 夫禮之􅀄始諸飲食其燔黍椑音伯豚汙音􅀲切尊而抔薄侯切飲鄭􅀇云汙樽鑿地爲撙也抔飲以手掬之也又曰黄目􅊊氣之上尊也黄者中目者氣之清明者也言酌於中而清明於外也黄目黄彛也又曰魯季夏六月以禘禮祀周公於太廟尊用犧象山罍􅊊尊用黄目犧尊以沙明爲􅀞象骨飾之􅊊􅊊鬯之噐黄目黄彛又曰泰有虞氏之尊也山罍夏后氏之尊也著殷之尊也犧象周之尊也㤗用瓦着地無足傳曰犧象不出門喜樂不野合漢書曰梁孝王有罍尊上刻雲雷象也直千金戒後代善寳之王任后聞而欲得之王讓大母李太后曰先王有命無得以樽予音與人他物雖百鉅萬猶自恣任后絶欲得之王讓直使人開府取樽賜任后天子下吏驗問公卿治奏以爲不孝讓誅也東觀漢記曰王覇擊賊作倡樂賊射營中覇前酒樽覇坐不動又曰章帝時美陽得銅酒樽采色青黄有古文後漢書曰章帝􅀄元七年槐里歧山得銅樽一枚晉起居注曰穆帝升平二年尚書左丞劉兖元㑹曰彭城計佐虞興發白虎樽而羣觀輻湊中蘭臺令史張􅀇不禁免􅀇令史沈約宋書曰正旦元㑹設白虎樽於殿庭樽盖上施白虎有能獻直言者則發此樽飲酒蓋杜舉之遺式也蓋爲白虎疑是後人所加欲令猛如虎無所忌憚也晏子春秋曰晉欲攻齊使范昭觀焉景公觴之范昭曰請君幸樽酌晏子命撤樽革具范昭歸曰齊不可伐也吾欲慙其君晏子知之}
