  - {type: variant, offset: 3420, length: 0, content: '', WYG: 夫禮之初始諸飲食其燔黍捭豚汙尊而杯飲又曰黄目鬰氣之上尊也黄者中目者氣之清明者也言酌於中而清明於外也又曰魯季夏六月以禘禮祀周公於太廟尊用犧象山罍欝尊用黄目又曰泰有虞氏之尊也山罍夏后氏之尊也著殷之尊也犧象周之尊也傳曰犧象不出門嘉樂不野合漢書曰梁孝王有罍尊上刻雲雷象也直千金戒後代善寶之任后聞而欲得之王襄大母李太后曰先王有命無得以樽予人他物雖百鉅萬猶自恣任后絶欲得之王襄直使人開府取樽賜任后天子下吏驗問公卿治奏以為不孝襄誅東觀漢記曰王覇擊賊作倡樂賊射营中覇前酒樽覇坐不動又曰章帝時羙陽得銅酒樽朱色青黄有古文後漢書曰章帝初元七年槐里岐山得銅罇一枚晉起居注曰穆帝升平二年尚書左丞相劉兖元㑹日彭城計佐虞興發白虎樽而羣觀輻凑中蘭臺令史張𤣥不禁免𤣥令史沈約宋書曰正旦元㑹設白虎樽於殿庭樽蓋上施白虎有能獻直言者則發此樽飲酒蓋杜舉之遺式也蓋為白虎疑是後人所加欲令猛如虎無所忌憚也晏子春秋曰晉欲攻齊使范昭觀焉景公觴之范昭曰請君幸樽酌晏子命撤樽革具范昭歸曰齊不可伐也吾欲慙其君晏子知之}
