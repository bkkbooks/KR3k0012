  - {type: variant, offset: 1253, length: 1748, content: 無菜者不用挾鄭玄曰挾猶箸也今人或謂箸為挾提也史記曰漢王與酈食其謀撓楚權張良從外來曰陛下事去矣臣請借前箸為大王籌張晏曰求借所食之箸用指畫或曰前湯武箸明之事以籌度今時之不若也又曰景帝居禁中召條侯周亞夫賜食獨置大胾不置箸條侯心不平顧謂尚席取箸景帝視而笑曰此豈不足君所乎條侯免冠謝謝承後漢書曰莽時有奇士巨母霸臥則枕鼓以鐵箸食吳志曰趙達善治九宮一筭之術嘗遇知故知故曰倉卒之間無酒食以敘意達以箸一隻再三蹤橫之乃言卿東壁下有酒一斗鹿肉三斤何以言無主人慚曰知卿善射欲相試耳典略曰曹汝隨大軍破張魯命陳琳作書報太祖曰且夫墨子之守縈帶為垣高不可登析箸為械堅不可入晉書曰何曾字頴考日食萬錢猶言無下箸之處東宮舊事曰漆箸一百雙荀卿子曰從山望木者十仞之木如箸而求箸不上析高蔽其長也韓子曰紂為象箸而箕子怖以為象箸必不加於土鉶必將犀玉之杯象箸玉杯必不美菽藿則必薦豹胎薦豹胎必不衣短褐而食於茅茨之下則必錦衣九重廣室高臺吾畏其終故怖其始故箕子見象箸以知天下之禍淮南子曰糟丘生乎象箸論衡曰以箸撞鍾以筭擊鼓鍾鼓不能鳴者用橦之者小也神仙傳曰葛玄嘗與客食玄以口中飯盡化為蜂數百集於客身客皆投匕箸驚懼玄乃張口其蜂悉入葛洪治噎方曰與對食之人當以手捉箸問噎人曰此何等物噎人當荅曰箸即復曰咽下去即愈語林曰王藍田食鷄子以箸刺之不得便大怒王述也投于地相書曰人三指用箸者自如四指用箸貴五指用箸大富貴也机方言曰俎机也西南蜀漢之郊曰杫音賜史記曰項王為高俎置太公其上如淳曰高俎机上也後漢書曰樂崧者河內人天性朴忠家貧為郎常獨直臺上無被止食糟糠帝每夜入臺輒見崧問其故甚嘉之自此詔太官賜尚書以下朝夕飡給帷被皂袍及侍史二人畢三禮圖曰畢似天畢以載牲醴又葉愽三寸長八寸柄長二尺四寸丹漆兩頭詩曰有捄天畢載施之行箋云畢所以助載鼎寶儀禮曰宗人執畢鄭玄曰畢狀如文也禮曰畢用桑長三尺刊其柄與末畢所以助主人者刊猶削也飯帚說文曰陳留以飯帚為筲筲巢切亦盛箸籠又作筲也炙函東宮舊事曰漆炙大函一具飯函列異傳曰景初中城陽縣吏王巨嘗作倦枕机臥聞竈下呼曰文納何以在人頭下應曰我見枕不得動汝來就我至乃飯函也淅箕廣雅曰淅䉴音箱匴音旋䉛音郁纂文曰䉛淅箕也一曰𧀮魯人謂之淅䉴方言曰箕陳魏宋楚之間謂之籮炊䉛謂之縮漉米䉛也或謂之匴江東呼淅籤也筐方言曰箄必弭切簍音縷籅音餘䈱音叨筐𥱿也𥱿音筥江沔之間謂之籅趙代之間謂之䈱淇衛之間謂之牛筐𥱿其通語也𥱿小者南楚謂之筐關而西秦晉之郊謂之箄今江東亦名小籠為箄說文曰筐飯筐也𥱿飴牛筐也方曰筐圓曰𥱿三禮圖曰大筐以竹受五斛大夫以盛米致饋於聘賓小筐以竹受五升以盛米又曰筐以盛熬穀四種八筐大夫三種六筐士二種四筐易曰女篚筐無實書曰厥篚織文篚筐屬也又曰厥篚檿絲厥篚玄纖縞厥篚織具厥篚玄纁璣組厥篚纖纊又曰惟其士女篚厥玄黃紹我周王詩曰采采卷耳不盈頃筐又曰于以采蘋南澗之賓於以盛之維筐及筥方曰筐員曰筥又曰標有梅頃筐塈之又曰女執懿筐遵彼微行爰求柔桑懿筐深筐也禮曰蚕則績而蟹有筐左傳曰筐筥錡釜之器潢汙行潦之水可薦於鬼神可羞於王公又曰晉侯筮嫁伯姬於秦遇歸妹之睽其繇曰士刲羊亦無忘也女承筐亦無貺也西京雜記曰元后在家日鷰衘白石大如指墮績筐中后取之石自剖為二其中文曰母天地遂復還合後為皇后常致璽中莊子曰愛馬者以筐盛屎呂氏春秋曰有娀氏二佚女為九成之臺帝令鷰往遺二卵爭搏之覆以玉筐北飛遂不反吞之生契𥰠方言曰𥰠盛飯筥也南楚謂之筲今建平人呼曰筲趙魏之郊謂之去音袪𥰠今通語也說文曰𥰠飯筥也受五升秦謂之筲廣雅曰蹊音溪映𥰠音旅也纂文曰穭映大筥也趙代以筥為䈱論語曰斗筲之人何足算也筲竹器受二斗東宮舊事曰漆注綺織𥰠二十枚陶侃故事曰侃上成帝漆複𥰠五十枚簞說文曰簞飯器也禮曰凡以苞苴簞笥問人者操以授命儀禮曰小祝盤匜與簞巾于西階東左傳曰趙宣子田于首山見靈輒餓為之簞食與肉又曰越圍吳趙孟使楚隆往吳王拜稽首曰寡人不佞不能事越與之一簞珠使問趙孟簞小笥也問遺也論語曰賢哉回也一簞食一瓢飲在陋巷人不堪其憂孟子曰孟子謂齊宣王曰今燕虐其民王往而征之民以為將拯己於水火之中也簞食壺漿以迎王師若殺其父兄係累其子弟如之何其可又曰非其道則一簞食不可受於人如其道則舜受堯之天下不以為泰又曰商之君子實玄黃于篚以迎其君子其小人簞食壺漿以迎其小人黃石公三略曰良將用兵有饋一簞醪者使投之於河令士卒迎流而飲之爵說文曰爵禮器也象爵之形觶音枝受四升詩曰赫如渥赭公言錫爵, SBCK: 尾}
