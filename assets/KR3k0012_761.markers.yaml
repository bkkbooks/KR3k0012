  - {type: variant, offset: 1039, length: 299, content: 知沈約宋書曰太子妃上世祖金縷匕箸上以賜沈慶之抱朴子曰道士李根煎鈆錫以藥如大豆者投中以鐵匕攪之冷即成鉏又有古強者自云四千歲嵇使君以玉匕與強後忽語嵇云昔安期先生以與之東宮舊事曰漆匕五十枚續齊諧記曰趙文詔為東宮扶侍廨在青溪中橋夜與神女讌寢脫金簪與扶侍亦贈以銀椀及流離匕箸方言曰箸筩盛匕箸者也筩音揔捅陳楚宋魏之間謂之筲或謂之羸音盈自關而西謂之桶揔今俗亦通呼小籠桶揔桶音籠揔蘇孔切通俗文曰以箸取物曰欹音羈禮曰飯黍無以箸羹之有菜者用挾音莢其無菜者不用挾鄭玄曰挾猶箸也今人或謂箸為挾提也史記曰漢王與酈食其謀撓楚權張良從外來曰陛下事去矣臣請借前箸為大王籌張晏曰求借所食之箸用指畫或曰前湯武箸明之事以籌度今時之不若也, WYG: 永傷}
