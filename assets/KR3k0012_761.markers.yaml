  - {type: variant, offset: 3056, length: 0, content: '', SBCK: 語曰子曰觚不觚觚哉觚哉孔子曰削觚而志有所念觥不時成或曰觚哉觚哉觚小器耳心不專一尚不時成况於大事也周地圖記曰秦使蒙恬北築長城又於原上築城以觚尊酒而􅀕有鶉飛止觚上因名鶉觚縣劉伶酒德頌曰止則操巵執觚巵􅀃文曰巵圜器也小巵也圜音圎音伹}
  - {type: variant, offset: 3056, length: 0, content: '', WYG: 論語曰子曰觚不觚觚哉觚哉周地圖記曰秦使䝉恬北築長城又於原上築城以觚尊酒而祭鶉飛止觚上因名鶉觚縣劉伶酒德頌曰止則操巵執觥巵說文曰巵圓器也觛小巵也}
