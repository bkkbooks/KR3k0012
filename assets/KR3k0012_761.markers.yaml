  - {type: variant, offset: 3058, length: 0, content: '', SBCK: 父母舅姑之敦音推牟巵􅓢非餕莫敢用史記曰髙祖奉玉巵起爲太上皇壽也漢書曰沛公與項羽㑹鴻門樊噲居營外聞事急乃持楯直入帳下羽問爲誰張良曰沛公􅆖乗羽曰壯士哉賜巵酒彘肩噲飲酒拔劒切􅁏食之羽曰復能飲乎曰死且不辭豈憚巵酒韓子曰棠谿空見韓昭侯曰今有白玉巵而無當有瓦巵而有當君渇將何以飲君曰以瓦巵棠谿空曰白玉巵至貴君不以飲者以其無當耶君曰然空曰爲人君漏泄群臣之語猶玉巵無當也空毎見而出昭侯必獨卧惟恐夢言泄於妻妾戰國䇿曰昭陽爲楚伐魏覆軍殺將得八城移師而攻齊陳軫爲齊王使見昭陽再拜謝賀戰勝起而曰臣竊譬楚有詞者賜其舎人酒一巵舎人相謂曰數人飲不足一人飲有餘請􅀞地爲虵虵先成者飲酒一人虵先成引酒且飲之乃左手持巵右手􅀞虵曰吾能爲之足足未成一人虵成奪其巵曰虵固無足子安得爲之足遂飲酒今子伐齊爲虵􅀞足也淮南子曰霤水足以溢壷榼而江河不能實漏巵塩鐵論曰川源不能實漏巵魏文帝荅楊脩書曰重惠流離巵昭厚意晉􅀓咸汙巵賦曰人有遺余琉璃巵者小兒竊弄墮之不㓗意旣惜之又感寳物之汙辱乃喪其所以爲寳况君子行身而可以有玷乎􅓢音移􅀃文曰􅓢似羹魁柄中有道可以注水纂文曰􅓢水器也儀禮曰嫡入室媵御奉􅓢沃盥左傳曰晉公子過秦秦伯納女五人懷羸與焉奉􅓢沃盥旣而揮之􅓢沷盥噐揮湔也怒曰秦晉匹也何以卑我國語曰勾踐命諸稽郢行成於呉曰勾踐願請盟一介適女}
