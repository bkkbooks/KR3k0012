  - {type: variant, offset: 3620, length: 0, content: '', SBCK: 臣聞追亡人也蹶而趣之唯恐不及王曰諾遂伐呉神仙傳曰壷公賣藥常懸一壷於坐上日入之後公輙跳入壷中捜神記曰呉王夫差女王恱童子韓重結氣死形見將重入􅃁取崑崙玉壷與之琴操曰伍貟奔呉過漂陽瀬溪見一女擊漂於水中旁有壷漿乃就乞飲飲畢謂女子曰掩夫人壷口女子知其意自投瀬溪而死洗三禮圖曰洗髙三尺口徑尺五寸足徑三尺士鐵大夫以上銅爲之}
