  - {type: variant, offset: 869, length: 107, content: 載禮曰傅傅之德義也天子無恩於父母不惠於庶人無禮於大臣不中於折獄不哀於喪不敬於祭不信於諸侯不議於戎事不厚於德不強於行不從太師之言凡是之屬太傅之任也漢書曰王莽權日盛孔光憂懼不知所出上書乞骸骨莽白太后帝幼小宜師傅領宿衛明, WYG: 司馬建武二十七}
