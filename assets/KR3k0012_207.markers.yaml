  - {type: variant, offset: 2034, length: 2, content: 伊尹, WYG: 宰臣不記故事無能詰責寝而不行汝南先賢𫝊曰陳蕃拜太尉讓曰齊七政訓五兵臣不如議郎王暢天文録曰三公星在北斗杓南主宣徳化和隂陽若今太尉司空之象也摯虞冊隴王太尉文曰朕惟君行}
