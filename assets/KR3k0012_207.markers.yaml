  - {type: variant, offset: 18, length: 3, content: 蓋天子, SBCK: 掌武事又曰髙祖言周勃重厚而少文然安劉氏者必勃也可爲太尉東觀漢記曰劉彪字智伯爲太尉在位清白廉讓以率下又曰張輔字孟侯爲太尉父尚在輔每遷轉乃一到雒父來適會正臘公卿罷朝俱賀歳奉酒上輔父壽極欣醼莫不嘉其榮也後漢書曰楊震字伯起嘗客於湖外不荅州郡禮命數十年衆人謂之晩暮而震勵志踰篤後有鸛雀衘三鱣魚飛集講堂前都講取魚進曰凡鱣者卿大夫之服象也數三者法三台也先生自此昇矣後果位至太尉又曰劉寛爲太尉靈帝頗好學藝每引見寛令講經寛嘗於坐􅀍酒睡伏􅀍加也爲酒}
