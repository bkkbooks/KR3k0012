  - {type: variant, offset: 2417, length: 0, content: '', SBCK: 中傷至今朱浮爲大司空坐賣弄國㤙免又爲陵轢同列帝銜之借其功不忍加罪死生吉㐫未可知豈不惜哉人臣放逐受誅雖復追加賞賜􅉠􅀕不足以償不訾之身訾量也言無量可比之貴重之極也訾與資同忠臣孝子覽照前代以爲鑑誡能盡忠於國事君無二則爵賞光乎當代功名列於不朽可不勉哉勤愈恭約盡忠號稱任職又曰宣秉字巨公拜大}
  - {type: page-break, offset: 2417, content: '', id: KR3k0012_SBCK_207-7b}
  - {type: variant, offset: 2417, length: 0, content: '', WYG: 中傷朱浮為大司空坐賣㺯國恩免又為陵轢同列帝銜之惜其功不忍加罪至今死生吉凶未可知豈不惜哉人臣放逐受誅雖復追嘉賞賜賻祭不足以償不訾之身訾量也言無量可比之價重之極也訾與資同忠臣孝子覽照前代以為鑑誡能盡忠於國事君無二則爵賞光乎當代功名列於不朽可不勉哉勤愈恭約盡忠號為任職又曰宣秉字巨公拜大}
