  - {type: variant, offset: 1993, length: 0, content: '', WYG: 太尉掌兵漢仍修之或置或省是故}
  - {type: variant, offset: 1994, length: 378, content: 所得議也其寢光奏晉起居注曰太保衛瓘明允篤誠有匪躬之志其給千兵騎百人齊職儀殷太甲時伊尹為太保周成王時召公為太保崔鴻十六國春秋蜀李雄錄曰雄異母兄始字伯敬為太保善撫士眾多歸之時人為之語曰欲養老屬太保呂氏春秋曰荊文王得如黃之狗宛路之矰以田於雲夢三月不反得丹陽之姬朞年不聽朝保申曰先王卜以臣為保吉今王朞年不聽朝王之罪當笞王伏臣將笞王王曰不穀免於襁褓而齒於諸侯矣願請變更而無笞保申曰臣承先王之令不敢廢也王不受笞是廢先王之令也臣寧抵罪於先王王曰敬諾引席王伏保申束細箭五十跪而加之于背如此者再謂曰王起王乃變更召保申殺如黃之狗折宛路之矰放丹陽之姬兼國三十九保申之力也太宰周禮天官上曰太宰之職掌建邦之六典佐王治邦國又曰太宰以九兩繫邦國之民兩耦合之言繫者以維持其情性使不離散也尚書伊訓曰百官總巳以聽冢宰伊尹乃明言烈祖之成德以訓于王湯有功烈之祖故稱焉王即太甲也又曰冢宰統百官均四海, SBCK: 徒}
  - {type: variant, offset: 1994, length: 24, content: 所得議也其寢光奏晉起居注曰太保衛瓘明允篤誠有匪躬, WYG: 馬}
