  - {type: variant, offset: 2999, length: 460, content: 黨王穆讓太宰表曰臣聞榮蹇長途終慚一日之致懸縷層臺難任千鈞之重固知才弱不可自強力微難以企及智小謀大恐貽折足之憂才輕任重懼有絕臏之悔既慮鑠金固陳匪石揔敘三公六典曰三公論道之官也蓋以佐天子理陰陽平邦國無所不統故不以一職名其官尚書曰惟茲三公論道經邦燮理陰陽周禮曰三槐三公位焉公羊曰三公者何天子之相春秋漢含孳曰三公在天為三台九卿為北斗三公象五嶽九卿法河海二十七大夫法山陵八十一元士法谷阜合為帝佐以匡綱紀史記曰公孫弘以春秋白衣為天子三公漢初因秦置丞相而弘為之則丞相為三公矣漢書曰六符孟康曰秦階三台也凡六星也六符星之符驗也晉書曰文帝為晉王何曾與高柔鄭冲俱為三公將入見曾獨致拜盡敬二人猶揖而巳晉官品令曰三公綠綟綬也綟音戾宋志曰三公黃閤前史無其義按禮記士韠與天子同公侯大夫則異鄭玄注云士賤與君同不嫌也夫朱門洞啟當陽之正色也三公之與天子禮秩相亞故黃其閤以示謙不敢斥天子宜是漢來制也韠音畢通典曰隋置太尉司徒司空以為三公參議國之大事依北齊置府寮無其人則闕祭祀則太尉亞獻司徒奉俎司空行掃除其位多曠行事則攝天文錄曰三台星一名三能一名天柱三公之位也在, WYG: 謂}
