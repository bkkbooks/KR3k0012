  - {type: variant, offset: 887, length: 328, content: 於庶人無禮於大臣不中於折獄不哀於喪不敬於祭不信於諸侯不議於戎事不厚於德不強於行不從太師之言凡是之屬太傅之任也漢書曰王莽權日盛孔光憂懼不知所出上書乞骸骨莽白太后帝幼小宜師傅領宿衛明年徙為太師莽為太傅光常稱疾不敢與莽并漢書音義曰傅覆也東觀漢記曰詔云行太尉事趙喜三葉在位為國元老其以喜為太傅又曰胡廣為太傅總錄尚書事時年八十而心力克壯繼母在堂朝夕贍省傍無几杖言不稱老達練事體明解朝章雖無謇直之風屢有補闕之益又曰卓茂字子康世祖即位求茂謁見年七十餘拜太傅封宣德侯賜几杖又曰鄧禹字仲華以元功拜太傅進見東向甚見尊寵後漢書曰張禹遷為太傅鄧太后以殤帝初育育生也欲令重臣居禁內乃詔禹舍宮中給帷帳床褥太官朝夕進食五日一歸府每朝見特贊與三公絕席續漢書曰太傅掌以善道無常職每帝即位輒置, SBCK: 予}
