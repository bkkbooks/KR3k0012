  - {type: variant, offset: 141, length: 3, content: 司徒大, SBCK: 喪告謚南郊又曰王龔爲太尉在位恭愼自非公事不通州郡書記其所辟命皆海内長者謝承後漢書曰鄭􅀪爲臨淮太守行春有二白鹿隨車夾轂而行􅀪怪問主簿黃國鹿爲吉凶賀曰聞三公車轓􅀞作鹿明府當爲宰相􅀪後果爲太尉又曰陳蕃拜太尉臨朝歎曰黃憲若在不敢先佩印綬又曰鄭􅀪字巨君爲太尉舉將第五倫爲}
