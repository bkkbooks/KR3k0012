  - {type: variant, offset: 1445, length: 1, content: 傅, SBCK: 尉賈詡詔天地灾害責在朕躬勿貶三公遂爲永制五代史後唐書莊宗御文明殿􅁽齊王張全義爲守太尉如常儀禮畢全義於尚書都省領事宰臣羣官在列左諌議竇專不降階爲御史所劾專援引舊典以對時宰臣不記故事無能詰責寢而不行汝南先賢傳曰陳蕃拜太尉讓曰齊七政訓五兵臣不如議郎王暢天文録曰三公星在北斗杓南主宣徳化和隂陽若今之太尉司空之象也摯虞􅁽隴王太尉文曰朕惟君行爲時表親則宗臣論道經􅀖保乂皇家是用進登上台司徒上尚書舜典帝曰契百姓不親五}
