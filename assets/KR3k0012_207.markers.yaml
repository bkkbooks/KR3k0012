  - {type: variant, offset: 153, length: 184, content: 位在三公上後漢因之師傅尊號曰上公置府僚魏晉江左皆然後魏太師太傅太保尊號曰三師後周又為三公隋氏又為三師太師毛詩曰尹氏太師維周之氐秉國之均四方是維天子是毗俾民不迷箋云毗輔也言尹氏居太師之官持國政之平維制四方又曰維師尚父時惟鷹揚諒彼武王肆伐大啇大載禮曰天子不論於先聖王之德不知君國畜民之道不見禮義之正不察應事之理不愽古之典傳不閑威儀之數禮樂無經學業不法凡是其屬太師之任也逸禮, WYG: 表}
