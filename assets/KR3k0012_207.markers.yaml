  - {type: variant, offset: 2039, length: 0, content: '', WYG: 乂皇家是用進登上台司徒上尚書舜典帝曰契百姓不親五品不遜五品五常遜順也汝作司徒敬敷五教在寛五常之教務在寛也禮記王制曰司徒脩六禮以節民性明七教以興民徳齊八政以防淫一道徳以同俗養耆老以致孝恤孤獨以逮不足上賢以崇徳簡不肖以黜惡司徒地官卿掌邦教也又月令曰孟夏之月司徒行縣鄙蔡邕月令章句曰司徒教官也又曰契為司徒而民成謂知五教之禮也毛詩緇衣曰緇衣美武公也父子並為}
