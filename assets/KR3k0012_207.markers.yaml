  - {type: variant, offset: 2660, length: 253, content: 天官夏襄稷後不窋失官由是廢稷殷以其官為冢宰周公在酆為太宰邵公又居之秦漢魏無其職晉武以從祖安平王孚為太宰安平薨省咸寧四年又置或謂本太師之職避景皇諱改為太宰或謂太宰周之卿位晉武依周置職以尊安平非避諱也元興中恭帝為太宰桓玄都督中外愽士徐豁議太宰非武官不應都督遂從豁議後周書曰文帝依周禮建六官遂置天官大冢宰卿一人掌邦理以建邦之六典佐皇帝理邦國通典曰太宰於殷為六太於周為六卿亦曰冢宰周武王時周公始居之掌建邦之理秦漢魏並不置晉初依周禮備三公三公之職太師居首景帝名師故置太宰以代之而以安平獻王孚居焉仲長統昌言曰冢宰堯官也, WYG: ''}
