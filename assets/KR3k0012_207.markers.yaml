  - {type: variant, offset: 1012, length: 304, content: 事趙喜三葉在位為國元老其以喜為太傅又曰胡廣為太傅總錄尚書事時年八十而心力克壯繼母在堂朝夕贍省傍無几杖言不稱老達練事體明解朝章雖無謇直之風屢有補闕之益又曰卓茂字子康世祖即位求茂謁見年七十餘拜太傅封宣德侯賜几杖又曰鄧禹字仲華以元功拜太傅進見東向甚見尊寵後漢書曰張禹遷為太傅鄧太后以殤帝初育育生也欲令重臣居禁內乃詔禹舍宮中給帷帳床褥太官朝夕進食五日一歸府每朝見特贊與三公絕席續漢書曰太傅掌以善道無常職每帝即位輒置一人錄尚書事薨輒省之華嶠後漢書曰鄧彪字智伯為太傅賜爵關內侯百官揔巳以聽於彪恩寵之異莫與為比焉應劭漢官曰太傅古官也周成王時康叔為之高后元年初用王陵金印紫綬又曰和帝冊故太尉鄧彪曰元功之族三讓彌高今以彪為太傅, WYG: ''}
