  - {type: variant, offset: 1798, length: 0, content: '', SBCK: 乃立地官司徒使帥其屬而掌􅀖教以佐王安擾􅀖國擾亦安也又曰大司徒之職掌建􅀖之土地之圖與其人民之數以佐三安擾􅀖國以天下土地之圖周知九州之域廣輪之數辨其山林川澤丘陵墳衍原隰之名物又曰地官曰大司徒之職凡建􅀖國以土圭土其地而制其域土其地猶言度其地也又曰大司徒之職以五禮防万民之僞而教之中禮所以節止民之侈僞使其行得中以六樂防万民之情而教之和樂所以蕩正民之情思使其心應和也又地官曰大司徒之職以}
  - {type: page-break, offset: 1798, content: '', id: KR3k0012_SBCK_207-6a}
  - {type: variant, offset: 1798, length: 0, content: '', krp: 乃立地官司徒使帥其屬而掌邦教以佐王安擾邦國擾亦安也又曰大司徒之職掌建邦之土地之圖與其人民之數以佐三安擾邦國以天下土地之圖周知九州之域廣輪之數辨其山林川澤丘陵墳衍原隰之名物又曰地官曰大司徒之職凡建邦國以土圭土其地而制其域土其地猶言度其地也又曰大司徒之職以五禮防万民之僞而教之中禮所以節止民之侈僞使其行得中以六樂防万民之情而教之和樂所以蕩正民之情思使其心應和也又地官曰大司徒之職以}
