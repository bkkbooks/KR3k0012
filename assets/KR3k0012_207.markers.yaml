  - {type: variant, offset: 2591, length: 219, content: 卿禮秩曰安平王孚朗陵公何曾汝南王亮皆為太宰齊職儀曰太宰品第一金章紫綬佩山玄玉堯命羲和使主陰陽之職羲伯司天即天官也后稷伏事虞夏敬授民時尊稷為天官夏襄稷後不窋失官由是廢稷殷以其官為冢宰周公在酆為太宰邵公又居之秦漢魏無其職晉武以從祖安平王孚為太宰安平薨省咸寧四年又置或謂本太師之職避景皇諱改為太宰或謂太宰周之卿位晉武依周置職以尊安平非避諱也元興中恭帝為太宰桓玄都督中外愽士徐豁議太宰非武官不應都督遂從豁議後周書曰文帝依周禮建六官遂置天官大冢宰卿, SBCK: ''}
