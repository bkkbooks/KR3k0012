  - {type: variant, offset: 2856, length: 373, content: 建邦之理秦漢魏並不置晉初依周禮備三公三公之職太師居首景帝名師故置太宰以代之而以安平獻王孚居焉仲長統昌言曰冢宰堯官也尚書曰冢宰一曰掌邦治官府以紀萬民二曰教典以安邦國以教官府以擾萬民三曰禮典以統百官以和邦國以諧萬民四曰政典以平邦國以正百官以均萬民五曰刑典以詰邦國以任百官以生萬民魏溫子昇為上黨王穆讓太宰表曰臣聞榮蹇長途終慚一日之致懸縷層臺難任千鈞之重固知才弱不可自強力微難以企及智小謀大恐貽折足之憂才輕任重懼有絕臏之悔既慮鑠金固陳匪石揔敘三公六典曰三公論道之官也蓋以佐天子理陰陽平邦國無所不統故不以一職名其官尚書曰惟茲三公論道經邦燮理陰陽周禮曰三槐三公位焉公羊曰三公者何天子之相春秋漢含孳曰三公在天為三台九卿為北斗三公象五嶽九卿法河海二十七大夫法山陵八十一元士法谷阜合為帝佐以匡綱紀史記曰公孫弘以春秋白衣為天子三公漢初因秦置丞相而弘為之則丞相為三公矣, SBCK: 牲視濯謝承後}
