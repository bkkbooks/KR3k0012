  - {type: variant, offset: 2405, length: 0, content: '', SBCK: 祝良字仲子東海人爲大司徒鮑恢爲長史以事至東海過其家見良妻布衣徒跣曵柴從田中歸恢告曰我司徒史也故來授書欲見夫人妻曰妾是也若􅁺耶恢下拜之歎息而歸東觀漢記曰鄧禹爲司徒討赤眉不以時進光}
  - {type: page-break, offset: 2405, content: '', id: KR3k0012_SBCK_207-6b}
  - {type: variant, offset: 2405, length: 0, content: '', WYG: 祝良字仲子東海人為大司徒鮑恢為長史以事至東海過其家見良妻布衣徒跣曳柴從田中歸恢告曰我司徒史也故来授書欲見夫人妻曰妾是也若掾耶恢下拜之歎息而歸東觀漢記曰鄧禹為司徒討赤眉不以時進光}
  - {type: variant, offset: 2405, length: 0, content: '', krp: 祝良字仲子東海人爲大司徒鮑恢爲長史以事至東海過其家見良妻布衣徒跣曵柴從田中歸恢告曰我司徒史也故來授書欲見夫人妻曰妾是也若掾耶恢下拜之歎息而歸東觀漢記曰鄧禹爲司徒討赤眉不以時進光}
  - {type: variant, offset: 2406, length: 0, content: '', SBCK: 與書日司徒堯也赤眉桀也今長安飢民孰不延望又曰􅀽安爲司徒每朝會憂念王室未嘗不流涕又曰郭丹爲司徒在朝名清廉公正後漢書曰蔡茂字子禮代戴渉爲司徒在職清儉匪懈茂初在廣漢夢在大殿之極上有三穗禾茂跳取之得其中穗輙復失之主簿郭賀離席慶曰大殿者官府之形像也極而有禾人臣之上禄也取其中穗中台之位也於字禾失爲秩雖曰失之乃以得禄秩也衮職有闕君其􅀘之旬月而茂徴焉辟賀爲􅁺又曰光武即位髙邑使使者持節拜鄧禹爲大司徒䇿曰前將軍禹􅀷執忠孝與朕謀謨帷幄決勝千里孔子曰自吾有回門人日親斬將破軍平定山西功效尤著百姓不親五品不訓汝作司徒敬敷五敎五教在寛今遣奉車􅀐都尉授印綬封爲鄼侯邑万户其敬之哉禹時年二十四又曰范遷爲司徒有宅數畒田不過一復推與兄子其妻常謂曰君有四子而無立錐之地又曰張湛稱疾不朝後大司徒戴渉􅀍誅渉字叔平兾州清河人也坐所舉人盗金下獄}
  - {type: page-break, offset: 2406, content: '', id: KR3k0012_SBCK_207-7a}
  - {type: variant, offset: 2406, length: 0, content: '', WYG: 貽書曰司徒堯也赤眉桀也今長安飢民孰不延望耶又曰袁安為司徒每朝㑹憂念王室未嘗不流涕又曰郭丹為司徒在朝名清亷公正後漢書曰蔡茂字子禮代戴渉為司徒在職清儉匪懈茂初在廣漢夢在大殿之極上有三穗禾茂跳取之得其中穗輙復失之主簿郭賀離席慶曰大殿者官府之形象也極而有禾人臣之上禄也取其中穗中台之位也於字禾失為秩雖曰失之乃以得禄秩也衮職有闕君其補之旬月而茂徴焉辟賀為掾又曰光武即位髙邑使使者持節拜鄧禹為大司徒䇿曰前將軍禹深執忠孝與朕謀謨帷幄決勝千里孔子曰自吾有回門人日親斬將破軍平定山西功効尤著百姓不親五品不遜汝作司徒敬敷五教在寛今遣奉車都尉徃授印綬封為鄼侯邑萬户其敬之哉禹時年二十四矣又曰范遷為司徒有宅數畝田不過一頃復推與兄子其妻常謂曰君有四子而無立錐之地又曰張湛稱疾不朝後大司徒戴涉被誅涉字叔平冀州清河人也坐所屬人盗金下獄}
