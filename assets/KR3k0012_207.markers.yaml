  - {type: variant, offset: 1434, length: 489, content: 領兵非准例也齊職儀曰太傅品秩冠服同太宰成王即位周公為太傅遷太師秦無其職漢惠帝崩呂后以丞相王陵為少帝太傅位在三公上後魏書淮陽王欣大統中為太傅文帝謂欣曰王三為太傅再為太師自古人臣未聞此例欣遜謝而巳北齊書曰高歸彥作亂冀州詔叚韶與東安王婁叡率眾討乎之遷太傅賜女樂十人并歸彥果園一千畝後周書曰王盟為太傅盟姿度弘雅仁而汎愛雖位居師傅禮冠群后而謙恭自處未嘗以勢位驕人魏文帝甚尊重之賈誼新書曰昔周文王使太公望傅太子發嗜鮀大何反魚而公弗予文王曰發嗜鮀魚何為弗予太公曰禮鮀魚不登乎俎豆豈有非禮而可以養太子哉語林曰太傅府有三才裴邈清才潘陽仲大才劉慶孫長才曹植輔臣論曰蓋精微聽察理析毫分規矩可則阿保不傾群言系于口而研覈是非典誥揔乎心而唯所用之者鍾太傅也王廙之保傅箴曰保傅之賢明宗國用寧輔弼之不忠禍及于躬無曰父子無間昔有潘崇無曰至親無二或容江充太保周禮曰保氏掌諫王惡諫者以禮義正之也大載禮曰天子處位不端受業不敬言語不序聲音不中律進退升降不以禮俯仰周旋無節凡此之屬太保之任也尚書大傳曰成王在豐欲宅洛邑使召公先相宅六日乙未主朝步自周則至于豐惟太保先周公相宅太保召公先周公視洛邑也應劭漢官曰太保古官也保養也晉書, WYG: ''}
