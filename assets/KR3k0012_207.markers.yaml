  - {type: variant, offset: 1555, length: 240, content: 遷太傅賜女樂十人并歸彥果園一千畝後周書曰王盟為太傅盟姿度弘雅仁而汎愛雖位居師傅禮冠群后而謙恭自處未嘗以勢位驕人魏文帝甚尊重之賈誼新書曰昔周文王使太公望傅太子發嗜鮀大何反魚而公弗予文王曰發嗜鮀魚何為弗予太公曰禮鮀魚不登乎俎豆豈有非禮而可以養太子哉語林曰太傅府有三才裴邈清才潘陽仲大才劉慶孫長才曹植輔臣論曰蓋精微聽察理析毫分規矩可則阿保不傾群言系于口而研覈是非典誥揔乎心而唯所用之者鍾太傅也王廙之保傅箴曰保傅之賢明宗國用寧輔弼之不忠禍及于躬無曰父子無間昔有潘崇無曰至親無二或容江充太保, SBCK: 功焉}
