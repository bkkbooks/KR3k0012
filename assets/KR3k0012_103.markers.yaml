  - {type: variant, offset: 4776, length: 1, content: 終, SBCK: 牧守妄立碑頌輙興寺塔第宅豐侈店肆商販詔中尉端衡肅厲威風以見事糺劾七品六品禄足代耕亦不聽錮店占肆争利城市也四年春二月蠕蠕主阿􅄼􅅛帥衆犯塞遣尚書左丞元孚兼尚書爲北道行臺持節喻之四月阿􅄼瓌執元孚驅掠畜牧北遁詔驃􅀐大將軍尚書令李崇中軍將軍兼尚書右僕射元纂帥􅀐十萬討蠕蠕岀塞三千餘里不及而還五年秦州城人莫折大提據城反自稱秦王殺刺史李彦詔雍州刺史元志討之南秦州城人孫獠張絞切長命韓祖香據城反殺刺史崔遊以應大提遣城人卜胡襲尅髙平殺鎮將赫連略行臺髙元榮大提㝷死子念生代立僣稱天子年號天建置立百官孝昌元年春正月徐州刺史元法僧據城反害行臺髙諒自稱宋王年號天啓遣}
