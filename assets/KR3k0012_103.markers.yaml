  - {type: variant, offset: 4679, length: 0, content: '', WYG: 十餘卷以班九服郡縣備冩布下鄉邑使知救患之術延昌元年三月京師穀貴出倉粟八十萬石以賑貧者夏四月詔曰泗州地震陷裂死傷甚多言念毁没有酸懐抱亡者不可復追生病之徒宜加療救可遣太醫折傷醫并給所須之藥就治之大赦改元二年夏四月庚子以絹十五萬疋賑恤河南郡飢民三年春二月詔曰泗州秀容郡敷城縣鴈門郡原平縣並自去年四月以來山鳴地震于今不已告譴彰咎朕甚懼焉祇畏兢兢若臨淵谷可恤瘼寛刑以答災譴四年正月甲寅帝不豫丁巳崩于式乾殿時年三十三諡曰宣武皇帝廟號世宗葬景陵帝幼有大度喜怒不形于色雅性儉素初高祖欲觀諸子志尚乃大陳寶物任其所取京兆王愉等皆競取珍玩帝惟取骨如意而已高祖大竒之庶人恂失德高祖謂彭城王勰音協曰吾固疑此兒有非常志相今果然矣雅愛經史尤長釋氏之義每至講論連夜忘疲善風儀容貌臨朝淵嘿端嚴若神有人君之量矣肅宗孝明皇帝後魏書曰肅宗孝明皇帝諱詡世宗宣武皇帝之第二子母曰胡充華永平三年三月帝生于宣光殿之東北有光照于庭中延昌元年十月立為皇太子四年春正月丁巳夜即皇帝位大赦天下詔太保高陽王雍入居西北堂決庶政又詔任城王澄為尚書令百官總已以聽於二王二月尊皇后高氏為皇太后三月皇太后出俗為尼徙御金墉城八月尊太妃為皇太后帝朝皇太后於宣光殿大赦天下羣臣奏請皇太后臨朝稱制九月皇太后親覽萬幾熙平元年春正月大赦改元二月八日宴太祖以來宗室年十五以上於顯陽殿申家人之禮九月詔曰察訟理寃實惟政首躬親聽覽民信所由自今月朢當暫出城闉親決滯枉主者可宣諸近逺咸使聞知神龜元年二月詔以神龜表瑞大赦改元七月開恒州銀山之禁與人共之二年九月皇太后幸崧高山正光元年秋七月侍中元义中常侍劉騰奉帝前殿矯皇太后詔曰世宗宣武皇帝以睿明承業廓寧區夏而鴻功未半早年登遐乃車書弗同勍冦尚熾幼主稚弱夙纂寶厯曾是宗祏莫克祗奉朕所以敬愼羣請臨朝總政黽勉從事以迄于兹自比春來先疾屢發夏首及今數加重劇恐不堪日釐萬務巨細兼省帝齒周星紀識學逾躋日就月將人君道茂足以撫綏萬邦諧決百揆朕當率前志敬遜别宫乃幽皇太后於北宫殺太傅領太尉清河王懌諸人總勒禁旅決事殿中帝加元服大赦改元九月蠕蠕主阿那環來奔戊戌以太師高陽王雍為丞相十月詔曰蠕蠕世雄朔方專制漠裔隣通上國百有餘載宜優以賓禮期之立功疏爵胙土大啓河岳可封朔郡公蠕蠕王食邑一千户錫以衮冕之禮蓋禄秩儀衛同於戚藩二年三月駕幸國子學講孝經祀孔子以顔淵配十有二月詔司徒崔光安豐王延明等議定服章三年春正月辛亥帝耕籍田十有一月車駕有事圜丘詔曰治厯明時前王茂軌孝成正律奕}
