  - {type: variant, offset: 4730, length: 3, content: 制戰陣, WYG: 以牧守妄立碑頌輒興寺㙮第宅奢侈店肆商販詔中尉端衡肅厲威風以見事糾劾七品六品禄足代耕亦不聽錮店占肆爭利城市也四年春二月蠕蠕主阿那環帥衆犯塞遣尚書左丞元孚為北道行臺持節喻之四月阿那環執孚驅畜牧北遁詔驃騎大將軍尚書令李崇中軍將軍兼尚書右僕射元纂帥騎十萬討蠕蠕出塞三十餘里不及而還五年泰州城人莫折太提據城反自稱秦王殺刺史李彦詔雍州刺史元志討之南秦州城人孫掩張長命韓祖香據城反殺刺史崔遊以應太提遣城人卜朝襲克高平殺鎭將赫連畧行臺高元榮太提尋死子念生代立僭稱天子年號天建置立百官孝昌元年春正月徐州刺史元法僧據城反害行臺高諒自稱宋王年號天啓遣其子景仲歸於蕭衍遣其將朝龍牙成景攜元畧等帥衆赴彭城詔秘書監安樂王鑒囘師以討之鑒於彭城南擊元畧大破之盡俘其衆既而不備為元法僧所敗衍遣子豫章王綜入守彭城法僧擁其寮屬守令兵武及郭邑士女萬餘口南入夏四月辛卯皇太后復臨朝攝政引羣臣面陳得失詔曰神龜之末權臣擅命元义劉騰陰相影響遂使皇太后幽隔後宫無君之心積習稍久不臣之迹縁事彌彰蔽耳目之明專生殺之柄天下為之不康四郊由兹多壘此而可忍孰不可忍騰身既死可追削爵入之罪狀誠合徽纒但以宗支舅戚特全貸}
