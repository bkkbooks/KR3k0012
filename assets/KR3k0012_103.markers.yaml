  - {type: variant, offset: 3707, length: 1, content: 四, SBCK: 三十三祕諱至魯陽發喪還京師上謚曰孝文皇帝廟曰髙祖葬長陵帝幼有至性寡􅁒寛慈毎垂矜捨進食者曽以􅀬羹傷帝手曽又於食中得蟲穢之物􅀏而恕之宦者譛帝於太后太后大怒杖帝數十帝黙而不自明太后崩後亦不以介意聽覽政事從善如流哀矜百姓􅁪思所以濟益天地五郊宗廟二分之禮常必躬親不以寒暑爲倦雅好讀書手不釋卷五經之義覽之便講學不師授探其精奥史傳百家無不該渉善談莊老尤明釋義才藻冨贍好爲文章詩賦銘頌有興而作有大文筆馬上口授及其成也不改一字自㤗和十年巳後詔􅁽皆常之文也自餘文章百有餘篇愛竒好士情如飢渴待納朝賢隨才輕重常􅀉以布素之意悠然􅀇邁不以丗務嬰心又少而善射有膂力年十餘􅀊能以指彈碎羊膊骨及射禽獸莫不隨志而斃之至年}
