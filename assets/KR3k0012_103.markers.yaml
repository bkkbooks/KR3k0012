  - {type: variant, offset: 3066, length: 0, content: '', SBCK: 有事於圓丘於是􅀄備大駕七月幸靈泉池與羣臣御龍舟賦詩而罷立孔子廟於京師十有四年八月詔議國之行次九月皇太后馮氏崩冬十月葬文明太后於永固陵車駕謁永固陵羣臣固請公除帝不許帝居廬引見羣寮於大和殿東陽王丕等據權制固請帝引古禮徃復羣臣乃止十五年春正月帝始聽政於皇信東室􅀄分置左右史官夏四月帝始進􅂼食自正月不雨至于六月有司奏祈詔百神曰昔成湯遇旱齊景逢災並不由祈山川而致雨皆至誠發中澍潤千里萬方有罪在予一人今普天喪恃幽顯同哀神􅀂有靈猶應未息安饗何冝四氣未周便行祀事當考躬責巳以待天譴五月議改律令上於東明觀析疑獄八月議養老又議肆􅀋上帝禋于六宗之禮帝親臨决詔郡國有時物可以薦宗廟者貢之移道壇於桑乾之隂改曰崇靈寺詔諸州舉秀才先盡才學定親祫禘之禮議律令十有一月詔二千石考在上者假四品將軍賜乗黄馬一疋上中者五品將軍上下者賜衣一襲十有二月帝爲髙麗王璉舉哀於城東行宫車駕迎春於東郊十有六年春正月饗群臣於太華殿帝始爲王公興懸而不樂宗祀顯祖獻文皇帝於明堂以配上帝遂昇靈臺以觀雲物詔定行次以水承金制諸逺屬非太祖子孫及異姓爲王者皆降爲公公爲侯侯爲伯伯爲子子爲男二月詔祀唐尭於平陽祀虞舜於廣㝤夏禹於安邑周文王於洛陽改謚宣尼曰文聖尼父謚孔廟夏四月頒新律令大赦天下八月司徒尉元以老遜位以尉元爲三老㳺明根爲五更又飬國老庶老詔曰夫文武之道自古並行威福之施必也相籍故三五至仁尚有征伐之事夏殷明叡未捨兵甲之行今則訓文有典教然於習武之方猶未盡將於馬射之前先行講武之式可勑有司豫脩場埒其列陣之儀五戎之數別俟後勑冬十月太極殿成大饗羣臣十有七年夏四月立皇后馮氏六月帝將南伐詔造河橋立皇子恂爲皇太子秋七月以皇大子立詔賜民爲父後者爵一級是月蕭頥死孫昭業僣立八月車駕發京師南伐歩騎三十餘萬太尉丕奏請以宫人從詔曰臨戎不語内事宜停車駕至肆州幸并州親見髙年問疾苦車駕所經傷民秋稼􅅿給榖五斛戊辰濟河語洛懷并肆所過四州賜髙年爵百年以上假縣令九十以上賜爵三級八十以上賜爵二級七十以上賜爵一級鰥寡􅀌獨不能自存者人粟五斛帛二疋幸洛陽周廵故宫基趾帝頋謂侍臣曰晉德不脩早傾宗祀荒毁至此用傷朕懷遂詠􅁰離之詩爲之流涕觀河橋幸太學觀石經詔六軍發軫帝戎服執鞭御馬而出羣臣稽顙於馬前請停南伐帝乃止仍定遷都之計冬十月幸金墉城詔徵司空穆亮與尚書李冲將作大匠董爵經始洛陽帝幸河南城幸豫州解嚴設壇於滑臺城東告行廟以遷都之意大赦天下還幸鄴十有八年春朝羣臣於鄴宫車駕南廵幸洛陽西宫二月}
