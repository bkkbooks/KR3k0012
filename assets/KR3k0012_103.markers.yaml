  - {type: variant, offset: 2727, length: 228, content: 世自經營天下剪暴除亂掃清不順二十年矣夫陰陽有往復四時有代謝授子任賢所以休息優隆功臣式固長久蓋古今不易之令典也其令皇太子副理萬機楤統百揆諸朕功臣勤勞日久皆當以爵歸第隨時朝請饗宴朕前論道陳謨而已不宜復煩劇職更舉賢俊以備百官主者明為科制以稱朕心五年春正月皇太子始總百揆諸上書者皆稱臣詔曰愚民無識信惑妖邪私養師巫挾藏讖記陰陽圖緯方伎之書又沙門之假西戎虛誕生致妖孽非所以一齊政化布淳德于天下也自王公已下至於庶人有養沙門師巫及金銀工巧之人在其家者皆遣詣曹不得容匿限今年, WYG: 國}
