  - {type: variant, offset: 4762, length: 1, content: 賜, SBCK: 詔曰肆州秀容郡敷城縣鴈門郡原平縣並自去年四月以来山鳴地震于今不已告譴彰咎朕甚懼馬祗畏兢兢􅀂臨深谷可恤瘼寛刑以荅災譴四年正月帝不豫丁巳崩于式乾殿時年三十三謚曰宣武皇帝廟號丗宗葬景陵帝㓜有大度喜怒不形於色雅性儉素􅀄髙祖欲觀諸子志尚乃大陳寳物任其所取}
