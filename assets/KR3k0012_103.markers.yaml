  - {type: variant, offset: 3135, length: 0, content: '', SBCK: 八公山路中雨甚詔去蓋見軍士病者親恤之車駕至鍾離軍士擒鸞三卒帝曰在君爲君其民何罪於是免歸之車駕發鍾離遣使臨江數蕭鸞罪惡幸小沛遣使以太牢􅀕漢髙祖廟行幸瑕丘以太牢祠岱岳詔選諸孔宗子一人封崇聖侯邑百户以奉孔子之祀又詔兖州爲孔子起圉栢脩飾墳壠更建碑銘褒楊聖德行幸滑臺次于石濟車駕至自南伐六月詔始爲漢語不得以北俗之語言於朝廷若有違者免所居官詔求天下遺書祕閣所無有禆時用者加以優償詔遷洛之民死葬河南不得還北於是代人南遷者悉爲河南洛陽人詔改長尺大升依周制度班之天下八月詔選天下武勇之士十五萬人爲羽林虎賁以充􅀫衛九月六宫及文武盡遷洛陽十有二月引見羣臣於光極堂宣示品令第大選之始二十年春正月詔改姓爲元氏二月詔介山之邑聽爲寒食自餘禁斷帝以旱咸秩羣臣自癸未不食至于乙酉是夜澍􅀨大洽十有二月開鹽池之禁與民共之置常平倉二十有一年春正月立皇子恪爲皇太子夏四月行幸}
