  - {type: variant, offset: 4768, length: 0, content: '', SBCK: 月開􅁪州銀山之禁與人共之二年九月皇太后幸崧髙山正光元年秋七月侍中元又劉騰奉帝幸前殿矯皇太后詔曰丗祖宣武皇帝以叡明承業廓寜區夏而鴻功未半早年登遐乃車書弗同勍宼尚熾幼主稚弱夙纂寳暦曽定宗祏莫尅祗奉朕所以敬慎羣請臨朝惣政僶俛從事以迄于兹自此春來先􅐄屢發夏首及今數加動劇恐不堪日􅁵萬務巨細兼省帝齒周星紀識學逾躋日就月將人君道茂足以撫緝萬􅀖諧決百揆朕當率前志敬遜別宫乃幽皇太后於北宫殺太􅀓領太尉清河王懌乂等㹅勒禁旅决事殿中帝加元服大赦改年九月蠕蠕而蠢切主阿那瓌來奔以太師髙陽王雍爲丞相}
  - {type: page-break, offset: 4768, content: '', id: KR3k0012_SBCK_103-11a}
  - {type: variant, offset: 4768, length: 0, content: '', krp: 月開恒州銀山之禁與人共之二年九月皇太后幸崧髙山正光元年秋七月侍中元又劉騰奉帝幸前殿矯皇太后詔曰丗祖宣武皇帝以叡明承業廓寜區夏而鴻功未半早年登遐乃車書弗同勍宼尚熾幼主稚弱夙纂寳暦曽定宗祏莫尅祗奉朕所以敬慎羣請臨朝惣政僶俛從事以迄于兹自此春來先疹屢發夏首及今數加動劇恐不堪日釐萬務巨細兼省帝齒周星紀識學逾躋日就月將人君道茂足以撫緝萬邦諧決百揆朕當率前志敬遜別宫乃幽皇太后於北宫殺太傳領太尉清河王懌乂等㹅勒禁旅决事殿中帝加元服大赦改年九月蠕蠕而蠢切主阿那瓌來奔以太師髙陽王雍爲丞相}
  - {type: variant, offset: 4769, length: 1, content: 已, SBCK: 月詔曰蠕蠕丗雄朔方擅制漠表隣通}
  - {type: variant, offset: 4769, length: 1, content: 已, WYG: 九皇太子即位大赦天下皇太后詔曰皇家握厯受圖年將二百祖宗累聖社稷載安朕以寡昧親臨萬國識謝塗山德慙文母屬妖逆迭興四郊多故實望穹靈降佑麟趾衆繁自潘充華有孕椒宫冀誕儲貳而熊羆無兆維虺遂彰于時以國步未康假稱統𦙍欲以底定物情係仰宸極何圖一旦弓歛莫追國道中㣲大行絶祀皇曾孫故臨洮王寶暉世子釗體自高祖天表作異大行平日養愛特深義齊若子事符當璧及翌日弗愈大漸彌畱乃延入清蒲受命玉几暨陳衣在庭登䇿靡及允膺大寶即日踐祚朕是用惶懼忸怩心焉靡訴今喪君有君宗社惟固宜崇賞卿士爰及百辟凡厥在位並加陟叙幼主即位儀同三司大都督爾朱榮抗表請奔喪乃勒兵而入三月}
