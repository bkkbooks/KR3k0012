  - {type: variant, offset: 4737, length: 3, content: 餘條因, WYG: 直言正諫之士敢決徇義之夫二十五日悉集華林東門人别引見共論得失班告内外咸使聞知八月賊帥元洪業斬鮮于修禮請降為賊黨葛榮所殺都督爾朱榮於泗州執刺史尉慶賓令其從叔羽生統州事九月葛榮敗都督廣陽王淵章武王融於博野白牛邏去聲融殁於陣榮自稱天子國號曰齊稱廣平冬十一月杜洛周攻陷幽州執刺史王延及行臺常景丙午税京師田租毎畆五升借貸公田者一斗閏月税市人出入者各一錢店舍為五等三年春正月葛榮陷殷州刺史崔楷固節死之三月詔金紫光禄}
