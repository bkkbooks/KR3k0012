  - {type: variant, offset: 1736, length: 536, content: 以天下守令多行非法精選忠良悉代之二月改元是歲皇子晃生三年春正月行幸廣甯臨溫泉作溫泉之歌三月帝聞劉義隆將寇邊乃詔冀定相三州造船三千艘簡幽州已南戍兵集于河上以備之秋七月詔諸征鎮將軍王公仗節邊遠者聽開府辟召其次增置吏員詔大鴻臚卿杜超假節都督冀定相三州諸軍事行征南大將軍太宰進爵為王鎮鄴為諸軍節度九月立密皇太后廟于鄴甲辰行幸統萬遂往平涼十一月車駕至平涼先是赫連定將數萬人東御於鄜城留其弟上谷公杜于廣陽公度洛孤城守帝至于涼登北原使赫連昌招喻之杜于不降遂掘壍圍守之十二月定弟杜于度洛孤面縛出降涼平收其珍寶定長安臨晉武功守將皆奔走關中平車駕東還留巴東公延等鎮安定四年九月加太尉長孫嵩柱國大將軍特進左光祿大夫崔浩為司徒征西大將軍長孫道生為司空詔曰頃逆命縱逸方夏未寧戎軍屢駕不遑休息今二寇摧殄士馬無為方將偃武修文遵太平之化昧旦思求想遇師輔訪諸有司咸稱范陽盧玄愽陵崔綽趙郡李靈河間邢潁滄水高允廣平游雅太原張偉等皆賢儁之胄冠冕州邦羽儀之用庶得其人任之政事共臻邕熙之美易曰我有好爵吾與爾靡之如玄之比隱跡衡門不曜名譽者盡勑州郡以禮發遣遂徵玄等及州郡所遣至者數百人皆差次敘用冬十月詔司徒崔浩改定律令延和元年春正月尊保太后為皇太后立皇后赫連氏立皇子晃為皇太子謁於太廟太赦改年大延元年出太祖太宗宮人令得嫁, SBCK: ''}
