  - {type: variant, offset: 497, length: 312, content: 蜯臺遂射白熊于頹牛山獲之幸赤城親見長老問民之疾苦復租一年南次石亭幸上谷問百年訪賢俊復田租之半壬申幸涿鹿登橋山觀溫泉使以太牢祠黃帝唐堯廟幸廣甯事如上谷登廣甯之曆山以太牢祠虞舜廟帝親加禮焉泰常元年六月帝自鹿陂西行大獵于牛川發金山臨殷繁水而南觀于九十九泉三年春正月帝自長川詔護高車郎將薛繁率高車十零十二部大人眾二萬北至弱水招懷伐叛降者二千餘落獲牛馬二萬餘頭是年赫連勃勃僣稱皇帝四年夏四月車駕有事於東廟遠蕃助祭者數百國五月詔曰宣武皇帝體得一之玄遠應自然之冲妙配純化而御世演大道以宣風大行大名未盡盛羨其政宣曰道更上尊謚曰道武皇帝是年劉裕廢殺其主司馬德文僣稱皇帝自號為宋七年夏四月封皇子壽為太平王拜相國初帝服寒食散頻年動發不堪萬機五月詔, SBCK: 爲}
