  - {type: variant, offset: 4764, length: 1, content: 師, SBCK: 兆王愉等皆競取珎玩帝唯取骨如意而巳髙祖大竒之及庶人恂失徳髙祀謂彭城王勰音恊曰吾固疑此兒有非常志相今果然矣雅愛經史尤長釋氏之義毎至講論連夜忘疲善風儀美容貌臨朝淵嘿端嚴􅀂神有君人之量矣肅宗孝明皇帝後魏書曰肅宗孝朋皇帝諱翊丗宗宣武皇帝之第二子母曰胡充華永平三年三月帝生於宣光殿之東北有光照于庭中延昌元年十月立爲皇太子四年春正月丁巳夜即皇帝位大赦天下詔太保髙陽王雍入居西栢堂决庶政又詔任城王澄爲尚書令百官惣巳以聽於二王二月尊皇后髙氏爲皇太后三月皇太后出俗爲尼徙御金墉城八月尊皇太妃爲皇太后帝朝皇太后於宣光殿大赦天下羣臣奏請皇太后臨朝稱制九月皇太后親覽萬機熙平元年春正月大赦改年二年八月宴太祖巳來宗室年十五巳上於顯陽殿申家人之禮九月詔曰察訟理􅁈實惟政首躬親聽覽}
