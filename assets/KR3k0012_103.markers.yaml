  - {type: variant, offset: 2502, length: 0, content: '', SBCK: 四年三月詔宣告天下民有病者所在官司遣醫就家􅐷視所湏藥物任醫所湏量給之八月帝欲禪位於叔父京兆王子推羣臣固請帝乃止後下詔曰朕承洪業運属太平淮岱率從四海清晏是以希心􅀇古志存淡泊躬覽萬務則損頤神之和一日或曠政有滯淹之失且子有天下歸尊於父父有天下傳之於子今稽叶靈運考㑹羣心爰命儲宫踐曻大位朕方優逰恭巳栖心浩然社禝乂安克廣其業不亦善乎百官有司其祗}
  - {type: variant, offset: 2502, length: 0, content: '', WYG: 四年三月詔宣告天下民有病者所在官司遣醫就家診視所用藥物任醫量給之五年八月帝欲禪位於叔父京兆王子推羣臣固請帝乃止丁未下詔曰朕承洪業運屬太平淮岱率從四海清宴是以希心元古志存淡泊躬覽萬務則損頤神之和一月或曠政有淹滯之失且子有天下歸尊於父父有天下傳之於子今稽協靈運考㑹羣心爰命儲宫踐昇大位朕優游恭已栖心浩然社稷乂安克廣其業不亦善乎百官有司其祗}
  - {type: page-break, offset: 2502, content: '', id: KR3k0012_WYG_103-2b, image: WYG0893/WYG0893-0836d.png}
  - {type: variant, offset: 2502, length: 0, content: '', krp: 四年三月詔宣告天下民有病者所在官司遣醫就家侯視所湏藥物任醫所湏量給之八月帝欲禪位於叔父京兆王子推羣臣固請帝乃止後下詔曰朕承洪業運属太平淮岱率從四海清晏是以希心玄古志存淡泊躬覽萬務則損頤神之和一日或曠政有滯淹之失且子有天下歸尊於父父有天下傳之於子今稽叶靈運考㑹羣心爰命儲宫踐曻大位朕方優逰恭巳栖心浩然社禝乂安克廣其業不亦善乎百官有司其祗}
  - {type: variant, offset: 2503, length: 2, content: 汗血, SBCK: 元子以荅天休宣布㝢内咸使聞悉於是羣公奏曰三皇之丗􅌿泊無爲故稱皇是以漢髙旣稱皇帝尊其父爲太上皇明不統天下今皇明㓜冲萬機大政猶冝陛下惣之謹上尊號太上皇帝乃從之太上皇徙御崇光宫採椽不斵土堦而巳國之大事咸以聞承明元年二十三崩于永安殿在位六年謚曰獻文皇帝廟號顯祖葬雲中金陵髙祖孝文皇帝後魏書曰髙祖孝文皇帝諱宏顯祖獻文皇帝之長子母曰李夫人皇興元年八月生平城紫宫神光照室天地氤氲和氣充塞帝生而㓗白有異姿襁褓歧嶷長而淵􅁉仁孝卓然有君人之表顯祖尤愛異之三年夏六月立爲皇大子五年秋八月即皇帝位於太華前殿大赦改元延興元年冬十月沃野統萬二鎮叛詔太尉隴西王元賀追擊至枹音符罕㓕之斬首三萬餘級徙其遺逆於兾定相三州爲營户十二月詔訪舜後獲東萊郡民嬀茍之復其家畢丗以彰盛德之不杇二年春二月詔曰尼父禀逹聖之姿體生知之量窮理盡性道光四海頃者淮徐未賔廟隔非所致令祠典寢頓禮章殄㓕遂使女巫妖覡淫進非禮殺生鼓舞倡優媟音狎豈所以尊明神敬聖道者也自今巳後有􅀕孔子廟制用酒脯而巳不聽婦女雜合以祈非望之福犯者以違制論夏四月詔工啇􅄂􅀋盡聽赴農詔沙門不得去寺浮遊民間是月劉彧死子昱僣立秋七月詔州郡縣各遣二人才堪專對者赴九月講武當親問風俗詔縣令能静一縣刼盗者兼治二縣即食其禄能静二縣者兼治三縣三年遷爲郡守二千石能静二郡上至三郡亦如之三年遷爲刺史三月詔諸倉屯榖夌充積者出賜貧民夏四月詔以孔子二十八丗孫魯郡孔乗爲崇聖大夫給以十户供洒掃四年九月以留昱内相攻戰詔將軍元蘭將三萬􅀐及假東陽王丕爲後繼伐蜀漢承明元年六月太上皇帝崩大赦改年尊皇太后爲太皇太后臨朝稱制秋七月追尊皇妣李貴人爲思皇太后太和元年七月劉昱死弟准僣立二年夏四月京師旱祈天文於北苑親自禮焉减膳避正殿澍雨大洽曲赦京師九月􅀛兹國遣使獻龍}
