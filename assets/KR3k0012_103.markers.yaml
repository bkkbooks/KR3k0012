  - {type: variant, offset: 3290, length: 9, content: 行幸洛陽所過郡國皆, SBCK: 拔新野三月大破蕭鸞平北將軍崔惠景黄門郎蕭衍軍於鄧城斬獲首虜二萬有餘秋七月詔曰朕以寡徳属兹䘮亂實頼群英凱清南夏宜約躬賞効以勸茂績后之私府便可損半六宫嬪御五服男女􅁪恤􅁪供亦令减半在我之}
  - {type: page-break, offset: 3290, content: '', id: KR3k0012_SBCK_103-7a}
  - {type: variant, offset: 3290, length: 0, content: '', WYG: 詔定樂章非雅者除之十有一月詔罷尚方錦繡綾羅之工四民欲造任之無禁其御府衣服金銀珠玉綾羅錦繡太官雜器太僕乗具内庫弓矢出其大半班賚百官及京師士庶下至工商皂𨽻逮於六鎭戍士各有差十二月詔秘書丞李彪著作郎崔光改析國記依紀傳之體十有二年春正月初建五斗旌旗五月詔六鎭雲中河西及關内六郡各修水田通渠灌溉增置彛器於太廟九月起宣文堂經武殿十三年春正月車駕有事於圜丘於是初備大駕七月幸靈泉池與羣臣御龍舟賦詩而罷立孔子廟於京師十有四年八月詔議國之}
  - {type: page-break, offset: 3290, content: '', id: KR3k0012_WYG_103-6a, image: WYG0893/WYG0893-0838c.png}
  - {type: variant, offset: 3290, length: 9, content: 行幸洛陽所過郡國皆, krp: 拔新野三月大破蕭鸞平北將軍崔惠景黄門郎蕭衍軍於鄧城斬獲首虜二萬有餘秋七月詔曰朕以寡徳属兹䘮亂實頼群英凱清南夏宜約躬賞効以勸茂績后之私府便可損半六宫嬪御五服男女恒恤恒供亦令减半在我之}
  - {type: variant, offset: 3291, length: 0, content: '', WYG: 次九月太皇太后馮氏崩冬十月𦵏文明太皇太后於永固陵車駕謁永固陵羣臣固請公除帝不許帝居廬引見羣寮於太和殿太尉東陽王丕等據權制固請帝引古禮往復羣臣乃止十五年春正月帝始進蔬食自正月不雨至於癸酉有司奏祈百神詔曰昔成湯遇旱齊境逢災並不由祈山川而致雨皆至誠發中澍潤千里萬方有罪在于一人今普天喪恃幽顯同哀神若有靈猶應未忍安饗何宜四氣未周便行祀事唯當考躬責己以待天譴五月議改律令於東明觀析疑獄八月議養老又議肆類上帝禋于六宗之禮帝親臨決詔郡國有時物可以薦宗廟者貢之移道壇於桑乾之陰改曰崇虛寺詔諸州秀才先盡才學乙巳親定祫禘之禮十有一月詔二千石考在上者假四品將軍賜乗黃馬一疋上中者五品將軍上下者賜衣一襲十有二月帝為高麗王璉舉哀於城東行宫車駕迎春於東郊十有六年春正月饗羣臣於太華殿帝始為王公興懸而不樂宗祀顯祖獻文皇帝於明堂以配上帝遂昇靈臺以觀雲物詔定行次以水承金制諸逺屬非太祖子孫及異姓為王者皆降為公公為侯侯為伯子男仍舊皆除將軍之號二月詔祀唐堯於平陽祀虞舜於廣甯禹於安邑周文於洛陽改諡宣尼曰文聖尼父告諡孔廟夏四月頒新律令大赦天下八月丙午司徒尉元以老遜位以尉元為三老游明根為五更又養國老庶老詔曰文武之道自古並行威福之施必也相籍故三王至仁尚有征伐之事夏殷明睿未捨兵甲之行國家雖崇文以懷九服修武以寧八荒然於習武之方猶為未盡將於馬射之前先行講武之式可勅有司豫修場埒其列陣之儀五戎之數别俟後勅冬十月太極殿成大饗羣臣十有七年夏四月立皇后馮氏六月帝將南伐詔造河橋立皇子恂為皇太子秋七月以皇太子立詔賜民為父後者爵一級是月蕭頤死孫昭業僭立八月車駕發京師南伐步騎百餘萬太尉丕奏請以宫人從詔曰臨戎不語内事宜停車駕至泗州幸并州親高年問所疾苦車駕所經傷民秋稼者畆給穀五斛戊辰詔洛懷并泗所過四州賜高年爵百年以上假縣令九十已上賜爵三級八十已上賜爵二級七十已上賜爵一級鰥寡孤獨不能自存者人粟五斛帛二疋}
