  - {type: variant, offset: 4082, length: 253, content: 風格異常每有大政常參決可否正乎二年二月中常侍宗愛弒逆立南安王余十月又賊余於殿中尚書長孫渴侯與尚書陸麗奉迎皇孫即帝位於永安前殿改元興安元年十二月初復佛法二年二月發京師五千人穿天淵池是月劉義隆子劭殺其父而自立夏五月行幸崞音郭山是月劉邵弟駿殺劭而自立閏月太后赫連氏崩八月詔曰朕以眇身纂承大業即位以來百姓宴安風雨順序邊方無事眾瑞兼呈不可稱數又於內苑獲方寸玉印其文曰子孫長壽群公卿士咸曰休哉豈朕一人剋臻斯應實由天地祖宗降祐之所致也思與兆庶共茲嘉慶其令民大酺三日諸殊苑已下各降罪一等興光元年二月帝至道壇受圖七月皇子弘生, SBCK: 陵}
