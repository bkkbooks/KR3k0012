  - {type: variant, offset: 844, length: 451, content: 萬餘人十有一月皇太子親統六軍出鎮塞上八年二月築長城於長川之南起自赤城西至五原延袤二千餘里備置戍衛三月田於鄴南韓陵山幸汲郡至于坊頭濟自靈昌津幸陳留東郡濟河而北西之河內造浮橋於治坂津夏四月幸成皋觀虎牢而城內乏水懸綆汲河帝令連艦上施轒轀絕其汲路轒符分切轀於云切兵車也又穿地道以奪其井丁丑幸洛陽觀石經蠻王梅安率渠帥數千人來朝閏月還幸河內北登太行幸高都晉陽賜百官王公已下至於廝賤無不霑洽五月還次鴈門皇太子率留臺王公迎于句注之北庚寅車駕至自南巡冬十月廣西宮起外牆周廻二十里是歲民飢詔所在開倉賑給十有一月帝崩於西宮在位十五年時年三十二遣詔以司空奚斤所獲軍實賜大臣自司徒長孫嵩已下至于士卒各有差十二月上謚曰明元皇帝葬于雲中金陵廟稱太宗帝禮愛儒生好覽史傳以劉向所撰說苑新序於經典正義多有所闕乃撰新集三十篇採摭經史該洽古義兼資文武焉世祖太武皇帝後魏書曰世祖太武皇帝諱壽太宗明元皇帝長子也母曰杜貴嬪天賜五年生於東宮體貌瓌異太祖奇而悅之曰成吾業者此子也泰常七年四月封太平王五月為監國太宗有疾命帝總攝百揆聰明大度意豁如也八年十一, SBCK: ''}
