  - {type: variant, offset: 4803, length: 2, content: 每歲, SBCK: 威徳不能遐􅀍經略無以及逺俾是蒼生罹此荼炭何以茍安黄屋無愧黔􅀺今便避居正殿􅂼飡素服當親自招慕收集忠勇有直言正諌之士敢决徇義之夫二十五日悉集華林東門人別引見共論得失班告内外咸使聞知八月賊元洪業斬鮮于脩禮請降爲賊黨葛榮所殺都督尓未榮於肆州執刺史尉慶賔令其從叔羽生統州事九月葛榮敗都廣陽王淵章武王融於􅀶野白牛邏去聲融殁於陣榮自稱天子號曰齊國年稱廣安冬十一月杜洛周攻䧟幽州執刺史王延年及行臺常景丙午稅京師田租􅅿五升借賃公田者􅅿一升}
