  - {type: variant, offset: 3068, length: 1, content: 定, SBCK: 河陽䂓建方澤之所車駕北廵至平城宫臨朝堂部分遷留三月罷西郊􅀕天帝臨太極殿喻在代羣臣以遷移之略秋七月以宋玉劉昶爲大將軍是月㠀夷蕭鸞殺其主蕭昭業立業弟昭文冬十月親告太廟奉遷神主車駕發平城宫次於中山之唐湖是月蕭鸞廢殺其主蕭昭文而僣立車駕幸鄴經比干墓傷其忠而獲戾親爲吊文樹碑而刋之車駕至洛陽蕭鸞雍}
