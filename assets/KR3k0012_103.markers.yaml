  - {type: variant, offset: 78, length: 170, content: 六年封曰齊王加車騎大將軍拜相國初帝母既賜死太祖乃召帝告曰昔漢武帝將立其子而殺其母不令婦人預國政使外家為亂汝當繼統故吾遠同漢武為長久之計帝素純孝哀泣不能自勝太祖怒之帝還宮哀不自止日夜號泣太祖知又召之帝欲入左右諫曰孝子事父小杖則受大杖則避之今陛下怒盛入或不測陷帝於不義不如且出待和解而進不晚也帝從之乃遊行於外天賜六年冬十月即皇帝位大赦改元為永興, SBCK: 光}
