  - {type: variant, offset: 2503, length: 2, content: 汗血, WYG: 太子以答天休宣布宇内咸使聞悉於是羣公奏曰三皇之澹泊無為故稱皇是以漢高祖既稱皇帝尊其父為太上皇明不統天下今皇帝幼冲萬機大政猶陛下統之謹上尊號太上皇帝乃從之太上皇帝徙御崇光宫採椽不斵土堦而已國之大事咸以聞承明元年年二十三崩于永安殿在位六年諡曰獻文皇帝廟號顯祖𦵏雲中金陵高祖孝文皇帝後魏書曰高祖孝文皇帝諱宏顯祖獻文皇帝之長子也母曰李夫人皇興元年八月生平城紫宫神光照室天地氤氲和氣充塞帝生而潔白有異姿襁褓岐嶷長而淵裕仁孝綽然有君人之表顯祖尤愛異之三年夏六月立為皇太子五年秋八月即皇帝位於太華前殿大赦改元延興元年冬十月沃野統萬二鎮叛詔太尉隴西王元賀追擊至枹音符罕滅之斬首三萬餘級徙其餘逆於冀定相三州為營户十二月詔訪舜後獲東萊郡民媯茍之復其家畢世以彰盛德之不朽二年春二月詔曰尼父稟達聖之資體生知之量窮理盡性道光四海頃者淮徐未賓廟隔非所至令祠典寢頓禮章殄滅遂使女巫妖覡淫進非禮殺生皷舞倡優媟音泄狎豈所以尊明神敬聖道者也自今已後有祭孔子廟制用酒酺而已不聽婦女合雜以祈非望之福犯者以違制論夏四月詔工商雜類盡聽赴農詔沙門不得去寺浮遊民間是日劉彧死子昱立秋七月詔州郡縣各遣二人才堪專對者赴九月講武當親問風俗三年二月詔縣令能靜一縣刼盜者兼治二縣即食其禄能靜二縣者兼治三縣二遷為郡守二千石能靜二郡上至三郡亦如之三年遷為刺史三月詔諸倉屯穀麥充積者出賜貧民夏四月詔以孔子二十八世孫魯郡孔乗為崇聖大夫給以十户供灑掃四年九月以劉昱内相攻戰詔將軍元蘭將三萬騎及假東陽王丕為後繼代蜀漢承明元年六月太上皇帝崩大赦改元皇太后為太皇太后臨朝稱制秋七月追尊皇妣李貴人為思皇太后太和元年七月劉昱死弟凖僭立二年夏四月京師旱祈天災於北苑親自禮焉減膳避正殿澍雨大洽大赦九月龜兹國遣使獻駝}
