  - {type: variant, offset: 1391, length: 340, content: 安樂二殿臨望觀九華堂初造新字千餘詔曰昔帝軒刱制造物乃命倉頡因鳥獸之跡以立文字繼歷久遠傳習多失其真今制定文字世所用者頒下遠近永為揩拭是年赫連屈丐死子昌僣立三年春二月起太學於城東祠孔子以顏淵配十有一月帝率輕騎二萬襲赫連昌至其城下徙萬餘家而還十有二月武都氐王楊玄及沮渠蒙遜等皆遣使內附四年春正月赫連昌遣其弟平原公定率眾二萬向長安帝聞之乃遣就陰山伐木大造攻具二月車駕還宮三月遣高源王禮鎮長安詔執金吾桓貸造橋於君子津五月車駕西討赫連昌濟君子津至于黑水帝親祈天告祖宗之靈而誓眾焉六月昌引眾出城大破之車駕入城虜昌群弟及其諸母姊妹妻妾宮人萬數府庫珍寶車旗器物不可勝計八月車駕至自征飲至策勳告於宗廟班軍實以賜留臺百寮各有差冬十一月以氐王楊玄為都督荊梁益寧四州諸軍事假征南大將軍梁州刺史南秦王神麚音加, WYG: ''}
