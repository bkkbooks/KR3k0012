  - {type: variant, offset: 4790, length: 336, content: 頭五月行幸陰山秋七月詔曰朕每歲閏月命群臣講武平壤所幸之處必立宮壇縻費之功損勞非一宜仍舊貫何必改作也八月遂由於河西詔曰朕順時田獵而從官殺獲過度既殫禽獸乖不圍之義其勑從官及典圍者將校自今已後不聽濫殺其田獲皮肉別目頒賴十二月詔曰名位不同禮亦異數所以殊等級示軌儀今喪葬嫁娶之禮未備貴勢豪富越度奢靡非所謂式昭典憲者也有司可為之條格使貴賤有章上下咸序著之于令詔曰夫婚姻者人道之始尊卑高下宜令區別然中古以來貴族之門多不率法或貪利財賄或因緣私好在於茍合無所擇選今貴賤不分巨細同貫塵穢清化虧損人倫將何以宣示典謨垂于來裔今制皇族肺腑王公侯伯及士民之家不得與百工伎巧卑姓為婚犯者加罪六年四月破洛郍國獻汗血馬普嵐國獻寶劍五月帝崩於太華殿在位十四年時年二十六六月上尊謚曰文成皇帝廟號高宗葬雲中之金陵, WYG: ''}
