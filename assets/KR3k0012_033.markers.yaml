  - {type: variant, offset: 1087, length: 1, content: 高, WYG: 髙祖十年春有司請令縣常以春二月及臘祠稷以羊彘又曰嚴延年為河南太守初延年母從東海來欲從延年臘到洛陽適見報囚報行决也母大驚便止都亭不肯入府延年出至都亭謁母母閉閣不見延年免冠頓首閣下良久母乃見之因數責延年曰幸得備郡守専治千里不聞仁愛多刑殺人欲以立威豈為民父母意哉延年服罪重頓首謝自為母御歸府舍母畢正臘謂延年曰天道神明人不可獨殺我不意當老見壯子被刑戮也行矣去汝東歸掃除墓地耳遂去歸郡後嵗餘延年果敗司馬彪續漢書曰季冬之月星迴嵗終隂陽已交勞農夫享臘以送故焉又舊儀曰臘者報諸鬼神古聖賢有功于民者皆享之又禮儀志先臘一日大儺謂之逐疫袁山松後漢書韓卓字子助陳留人臘日奴竊食祭其母卓儀其心即日免之免從良也謝承後漢書曰第五倫母老不能之官至臘日常悲戀垂淚又曰沛國陳咸為廷尉監王莽簒位還家杜門不出莽改易漢法令及臘日咸常言我先祖何知王氏之臘乎又東夷列傳曰三韓俗以臘日家家祭祀云臘鼓鳴春草生也東觀漢記曰甄宇字長文北海人建武中自青州從事徴拜博士每臘詔書賜博士羊人一頭羊有大小肥痩時博士祭酒議欲殺羊稱分其肉宇曰不可又欲投鉤宇復恥之因先自取其冣痩者髙堂隆魏臺訪議曰詔問何以用未祖丑臘臣隆對曰按月令孟冬十月臘先祖五祀謂薦田獵所得禽獸謂之臘左傳曰虞不臘矣唯見此二者而皆不書日聞先師說曰王者各以其行之盛}
