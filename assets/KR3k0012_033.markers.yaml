  - {type: variant, offset: 1202, length: 0, content: '', SBCK: 農􅂩是也後世臘有新故交接之義遂移於夏正月十二月晉博士張亮説蜡聚饗臘者􅀕廟􅀄云蜡則黄服蜡臘不同惣非也臘冝在新故交接二祭月同而名異􅀕但而服殊今推諸經傳無正說蜡臘之文月令云蜡臘此則同日􅀕但牙名耳據田臘取獸之名爲臘因索饗百神號之曰折其曰上􅀕先祖旁饗百神下息萬民無别􅀕也即鄭玄云旣蜡臘先祖五祀於是勞農者也近日蜡臈兼設蜡在十月臘在歳終隋開皇四年始停建元之蜡直爲建丑之臘依五行火衰於戍而用戍日故也晉書范喬字伯孫喬邑人臘夕盗斫其樹有告者喬佯不聞邑人愧而還喬曰節日取柴欲與父母相歡耳何以愧乎遂不取又曰陳􅎮問方士戴洋曰江南有貴人頋彦先周宣珮是否洋曰顧不及臘周不及明年八月其年十二月十}
  - {type: page-break, offset: 1202, content: '', id: KR3k0012_SBCK_033-4a}
  - {type: variant, offset: 1202, length: 0, content: '', WYG: 農隙是也後世臘有新故交接之義遂移於夏正月十二月晉博士張亮說蜡聚享臘者祭廟初云蜡則黄服蜡臘不同物必非也臘宜在新故交接二祭月同而名異祭俱而服殊今推諸經傳無正說蜡臘之文目今云蜡臘此則同日祭但殊名耳據田獵取獸之名為臘因索享百神號之曰蜡其日上祭先祖旁享百神下息萬民無别祭也即鄭𤣥云既蜡臘先祖五祀於夏是勞農者也近日蜡臘兼設蜡在十月臘在嵗終隋開皇四年始停建元之蜡直為建丑之臘依五行水衰於戌而用戌日故也晉書范喬字伯孫喬邑人臘夕盜斫其樹有告者喬佯不聞邑人愧而還喬曰節日取此欲與父母相歡娛耳何以愧乎遂與之又曰陳軫問方士戴洋曰江南有富人顧彦先周宣佩是否洋曰顧不及臘周不及明年八月其年十二月廿}
