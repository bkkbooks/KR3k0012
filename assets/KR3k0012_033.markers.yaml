  - {type: variant, offset: 1187, length: 1, content: 九, krp: 令孟冬十月臘先祖五祀謂薦田臘所得禽獸謂之臘左傳曰虞不臘矣唯見此二者而皆不書曰聞先師說曰王者各以其行之盛祖以其終臘水始生於申盛於子終於辰故水行之君以子祖辰臘火始生於寅盛於午終於戍故火行之君以午祖戍臘木始生於亥盛於夘終於未故木行之君以夘祖未臘金始生於巳盛於酉終於丑故金行之君以酉祖丑臘土始生於未盛於戍終於辰故土行之君以戍祖辰臘今魏據土德冝以戍祖辰臘也又曰華歆常以臘}
