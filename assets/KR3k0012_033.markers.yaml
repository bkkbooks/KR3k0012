  - {type: variant, offset: 1152, length: 6, content: 宋武帝為宋公, SBCK: 郊特牲天子大蜡八伊􅂄氏始爲蜡伊􅂄氏古天子號也蜡也者索也謂永索也歳十二月合聚萬物而索饗之也歳十二月周之正􅁆謂建亥之月饗者􅀕其神也萬物有功民者神使爲之也􅀕之以報焉蜡之􅀕也主先嗇也先嗇苦神農者司嗇后稷神也又曰昔者仲尼與於蜡賔蜡者索也歳十二月索合聚萬物而索饗之亦祭宗廟孔子仕魯}
  - {type: page-break, offset: 1152, content: '', id: KR3k0012_SBCK_033-1b}
  - {type: variant, offset: 1152, length: 6, content: 宋武帝為宋公, krp: 郊特牲天子大蜡八伊耆氏始爲蜡伊耆氏古天子號也蜡也者索也謂永索也歳十二月合聚萬物而索饗之也歳十二月周之正數謂建亥之月饗者祭其神也萬物有功民者神使爲之也祭之以報焉蜡之祭也主先嗇也先嗇苦神農者司嗇后稷神也又曰昔者仲尼與於蜡賔蜡者索也歳十二月索合聚萬物而索饗之亦祭宗廟孔子仕魯}
  - {type: punctuation, offset: 1158, content: ，, id: KR3k0012_CHANT_033-bkkpn258}
  - {type: 'tls:seg', offset: 1158, content: '', id: KR3k0012_CHANT_033-10a.4}
  - {type: variant, offset: 1159, length: 2, content: 彭城, SBCK: 助祭之中事畢出遊於觀之上喟然而嘆觀闕也子見魯君於祭禮有不備於此文覩象魏舊章之處感而嘆之仲尼之歎盖歎魯也又曰子貢觀於蜡蜡索也歳十二月索群神而祀之臘也孔子曰賜也樂乎對曰一國之人皆􅀂狂賜未知其爲樂也孔子曰百日之勞一日之澤非爾所知言民皆勤豫穡百日之勞喻乆也今一日使之飲酒宴樂是君之恩澤也周禮曰國􅀕蜡則吹􅃎頌擊土鼓以息老鄭玄曰十二月礼謂建亥之月也索萬物而􅀕之者萬物天成歳事至此爲其老而勞其禮而息之也豳頌七月又有穫稻作酒觥觴萬壽無疆之事是亦歌其􅀋也謂之頌也以其言歳終又功成也周以今之十一月爲正月以今十月爲臘月也傳曰晉侯復假道於虞以伐虢宫之竒諌弗聽以其族行曰虞不臘矣獵祭名也日月㑹於龍尾百物備合國於是祭群神也史記曰􅁗惠文王十二年􅀄臘始皇三十一年十二月更名臘曰嘉平太原眞人茅君内記曰始皇三十一年}
  - {type: page-break, offset: 1159, content: '', id: KR3k0012_SBCK_033-2a}
