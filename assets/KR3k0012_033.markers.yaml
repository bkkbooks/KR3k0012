  - {type: variant, offset: 1170, length: 1, content: 臺, SBCK: 彪續漢書曰季冬之月星逥歳終隂陽已交勞農夫享臘已送故焉又禮儀志先臘一日大儺謂之逐疫又舊儀曰臘者報諸􅀑即古聖賢有功於民者皆享之􅀽山松後漢書韓卓字子助陳留人臘日奴竊食􅀕其母卓義其心即日免之免從良也謝承後漢書曰弟五倫母老不能之官}
