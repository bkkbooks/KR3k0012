  - {type: variant, offset: 1293, length: 1, content: 九, SBCK: 爲臘月案史記陳勝傳有臘月之言是謂此也諺云臘鼓鳴春草生村人並擊細􅆎鼓戴明頭及作金剛力士以逐大疫華陽國志曰王長文字徳雋元康􅀄守江源令縣收得盗馬賊及發冢賊長文引見誘慰時適臘晦皆遣歸家獄先有擊囚亦遣之謂曰教化不厚使汝等如此長吏之過也蜡節慶祚肆汝就上下善相歡樂過節來還當爲汝思他理群吏惶怖争請不許㝷有赦無不感恩三十國春秋曰江州刺史胤自武昌以一疾􅀍徴爲右將軍而王舒未至猶在盆口後將軍郭黙旋而過胤胤不禮之臘}
  - {type: page-break, offset: 1293, content: '', id: KR3k0012_SBCK_033-5b}
  - {type: variant, offset: 1293, length: 1, content: 九, krp: 爲臘月案史記陳勝傳有臘月之言是謂此也諺云臘鼓鳴春草生村人並擊細腰鼓戴明頭及作金剛力士以逐大疫華陽國志曰王長文字徳雋元康𥘉守江源令縣收得盗馬賊及發冢賊長文引見誘慰時適臘晦皆遣歸家獄先有擊囚亦遣之謂曰教化不厚使汝等如此長吏之過也蜡節慶祚肆汝就上下善相歡樂過節來還當爲汝思他理群吏惶怖争請不許㝷有赦無不感恩三十國春秋曰江州刺史胤自武昌以一疾𬒳徴爲右將軍而王舒未至猶在盆口後將軍郭黙旋而過胤胤不禮之臘}
  - {type: variant, offset: 1295, length: 3, content: 佩茱萸, SBCK: 遺黙酒五􅂛一頭黙大怒􅄬之於江遂與故將張丑宋侯孟純等矯詔入城門莫有禦者胤獨與其妾寢黙至斬于床下及其司馬張滿叅荀揩李纂慠黙故也王肅議禮曰季冬大儺旁磔鷄出土牛以送寒氣節令之臘除逐疫磔鷄葦絞桃梗之屬風俗通曰夏曰清祀殷曰嘉平周曰大蜡漢曰臘臘者臘也因獵取獸以􅀕先祖或曰臘接也新故交接狎臘大􅀕以報功也漢火行衰於戍故以戍爲臘也又曰兎􅩋俗􅀃臘正旦}
