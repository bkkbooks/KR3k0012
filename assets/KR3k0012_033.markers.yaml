  - {type: variant, offset: 2049, length: 2, content: 重陽, SBCK: 十月上辛命典饋清麹釀冬酒以供臘祀又曰臘明日謂小歳進酒尊長修刺賀君師又曰十二月臘時祠祝炙蓬樹􅀲田四角去甘䖝􅀲中䖝謂之甘䖝蔡邕王喬録曰漢永和元年十二月腋夜王喬墓上哭聲王伯聞但徃視之天大雪見大鳥跡并􅀕祀處採薪者尹秃見人冠衣曰我王喬也汝莫取吾墓樹忽不見徐爰家儀曰蜡夲施􅀕故不賀其明日爲小歳賀稱􅀄歳福始罄無不冝正旦賀稱元正首慶百物惟新小歳之賀旣非大慶禮止門内西域諸國志曰天笁國以十二月十六日爲臘臘則麥熟盧公家範曰九臘日上澡豆帒及頭膏靣脂口脂淮南萬畢術曰歳暮臘埋圎石於宅隅雜以桃弧七枚則無􅀑疫養生要術云臘夜持椒卧井旁勿與人言投于井中除温疫盛翁子藏鈎賦叙曰以臘之後因􅀕祀餘胙要命中外以行鈎爲戯嵆含蜡賦序曰大蜡之夕雖天地同有至携金蘭以齊聲利得意以遺榮􅀔孰尚我裴秀大蜡詩曰有􅁏如丘有酒如淵有肴如林有貨如山小歳􅀃文曰膢楚十二月􅀕飲食也一日嘗新馨食新日貙膢貙勑俱切漢書曰武帝太􅀄二年令天下酺五日膢五日祠門户北臘如淳曰折者折漢儀注立社貙膢許慎日俗以十二月祭飲食兾州北部或以八月朝作飲爲膢其俗語曰膢臘社伏蔡邕曰􅓔獸常以立秋日還食其母猛䖝摶鷙時王者亦以此臘還以祭廟膢劉劉殺也言擊殺之時者也續漢書禮儀志曰立秋}
