  - {type: variant, offset: 1208, length: 1, content: 起, SBCK: 感鄭玄列傳曰玄年十二隨母還家正臘讌㑹同列十餘人皆美服盛飾語言閑適君獨漠然如不及母私督數乃曰此非我志不在此願列女傳曰魯之母師者魯九子之寡母也臘日休家作悉召諸子謂曰婦人之義非有大故不出夫家然吾父母家􅀄歳時祀不理吾從汝謁謁告諸子欲徃徃監之慎房户之守吾夕而反}
  - {type: variant, offset: 1208, length: 1, content: 起, WYG: 感鄭𤣥列傳曰𤣥方十二年隨母還家正臘讌㑹列十餘人皆美服盛飾語言閒道𤣥獨黙然如不及母私督數乃曰此非吾志不在所願列女傳曰魯之母師者魯九子之寡母也臘日休家作者召諸子謂曰婦人之義非有大故不出夫家然吾母家多㓜稚嵗時祀不理吾從汝謁謁告諸子欲往往監之慎房中之守吾夕而返于是天隂還太早至閭外而止待夕而入魯大夫從臺上見而恠之使問對曰妾朝出與諸婦孺子期夕而反妾恐其酺醵醉飽人情所有也妾反早故止閭外期盡而入大夫美之言}
