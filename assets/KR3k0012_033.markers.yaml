  - {type: variant, offset: 1386, length: 1, content: 歲, WYG: 國春秋曰江州刺史李徹自武昌移疾被徴為右將軍而王舒未至猶在湓口後將軍郭黙旋而過徹不禮之臘日遺黙酒五觔豚一頭黙大怒投之於江遂與故將張丑宋侯孟純等矯詔入城門莫有禦者徹獨與其妾寝黙至斬于牀下及其司馬張滿㕘軍荀楷李慕傲黙故也王肅曰禮云季冬大儺旁磔出土牛以送寒氣乃即今之臘除逐疫磔雞草絞桃梗之屬風俗通曰夏曰清祀殷曰嘉平周曰大蜡}
