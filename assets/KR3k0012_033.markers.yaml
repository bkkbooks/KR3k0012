  - {type: variant, offset: 1365, length: 113, content: 然也案南陽酈縣有菊水民居其側者壽並百二三十歲漢時劉寬袁隗嘗臨此郡月致三十斛水以自供續搜神記曰有一書生居吳自稱胡愽士以經傳教授假借諸書經傳年載忽不復見後九日人相與登山遊觀但聞講誦聲尋覔有一空塚入數步群狸羅坐見人迸走唯有一狸獨不能, SBCK: 是形骸之外}
