  - {type: variant, offset: 1090, length: 34, content: 九月九日登高飆館在孫陵寺崗世呼為九日臺在縣北三里一百步當孫陵崗曲街也, WYG: 其終臘水始生於申盛於子終於辰故水行之君以子祖辰臘火始生於寅盛扵午終於戌故火行之君以午祖戌臘木始生於亥盛於夘終於未故木行之君以夘祖未臘金始生於巳盛扵酉終於丑故金行之君以酉祖丑臘土始生於未盛於戌終於辰故土行之君以戌祖辰臘今魏據土徳宜以戌祖辰臘}
