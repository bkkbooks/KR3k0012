  - {type: variant, offset: 1055, length: 30, content: 嘗講孝經謝安侍坐陸納并卞躭執讀謝石袁宏並執經車狷王溫摘句南齊, WYG: 升入太清時下𤣥洲戲赤城繼世而徃在我盈帝若學之臘嘉平始皇聞謡歌而問其故父老具對此仙人之謡勸帝求長生之術于是始皇欣然乃有尋仙之志因改臘月為嘉平也漢}
