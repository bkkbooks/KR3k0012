  - {type: variant, offset: 1350, length: 7, content: 郡北龍沙九月九, SBCK: 上古之時有神荼與鬱壘昆弟二人性能伏􅀑度朔山桃樹下簡閱百􅀑􅀑無道理妄爲人禍者神荼與鬱壘縳以葦索執以食虎於是縣官常以臘除文飾桃人垂葦終絞􅀞於門皆追効前事兾以禦凶也㑹稽典錄曰陳脩字奉遷烏陽人家貧爲吏常歩擔上下􅁪食乾糒音備乾飵也每至正臘僵卧不起同僚以飲食請不往其志操如此丗􅀃曰王朗中年以識度推伏華歆歆蜡}
  - {type: page-break, offset: 1350, content: '', id: KR3k0012_SBCK_033-6b}
  - {type: variant, offset: 1350, length: 0, content: '', WYG: 孔子所為預以培賓一嵗之中盛于此節又曰俗又以此月為臘月按史記陳勝傳有臘日之言是謂此也諺云臘鼓鳴春草生村人並繫細腰鼓戴胡頭及作金剛力士以逐大疫華陽國志曰王長文字徳雋元康初守江源令縣收得盜馬賊及發塜賊長文引見誘慰時適臘晦皆遣歸家獄先有繫囚亦遣之謂曰教化不厚使汝等如此長吏之過也蜡節慶祚肆汝歸于家善相歡樂過節來還當為汝思他理}
  - {type: page-break, offset: 1350, content: '', id: KR3k0012_WYG_033-8b, image: WYG0893/WYG0893-0285b.png}
  - {type: variant, offset: 1350, length: 7, content: 郡北龍沙九月九, krp: 上古之時有神荼與鬱壘昆弟二人性能伏鬼度朔山桃樹下簡閱百鬼鬼無道理妄爲人禍者神荼與鬱壘縳以葦索執以食虎於是縣官常以臘除文飾桃人垂葦終絞畫於門皆追効前事兾以禦凶也㑹稽典錄曰陳脩字奉遷烏陽人家貧爲吏常歩擔上下恒食乾糒音備乾飵也每至正臘僵卧不起同僚以飲食請不往其志操如此丗說曰王朗中年以識度推伏華歆歆蜡}
  - {type: variant, offset: 1351, length: 21, content: 北龍沙九月九日所遊宴處其俗皆然也案南陽酈縣, WYG: 吏惶怖争請不許尋}
