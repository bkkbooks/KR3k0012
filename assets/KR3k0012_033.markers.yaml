  - {type: variant, offset: 1479, length: 172, content: 是常假書者集異記曰明皇天寶十三年重陽日獵於沙苑雲間有孤鶴佪翔焉上親御弧矢一發而中其鶴則帶箭徐墜將及地丈許歘然矯翰西南而遊萬眾極目良久乃滅益州城距郭十五里有明月觀焉依山臨水松桂深寂道流非修習精愨者莫得而居觀之東廊第一院尤為幽絕每有自稱青城道士徐佐卿者風局清古一歲率三四而至觀之耆舊因虛其院之正堂以俟其來而佐卿至則栖焉或三五日或旬朔言歸青城甚為道流, SBCK: ''}
