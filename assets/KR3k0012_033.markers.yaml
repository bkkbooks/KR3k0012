  - {type: variant, offset: 108, length: 941, content: 人柰何當須十方眾僧威神之力至七月十五日當為七代父母危難中者具百味五果以著盆中供養十方大德佛勑眾僧皆為施主呪願七代父母行禪定意然後受食是時目連白佛未來世佛弟子行孝順者亦應奉盂蘭盆供養佛言大善故後代人因此廣為華飾乃至刻木割竹飴蠟綵鏤繒摸花葉之形極工妙之巧道經七月十五日中元之節地官校閱搜選眾人分別善惡諸天聖眾普詣宮中簡定劫數人鬼簿錄餓鬼囚徒一時俱集以其日作玄都大齋獻於玉京及採諸花果世間所有奇異之物玩弄服飾幡幢寶蓋莊嚴供養之具清膳飲食百味芬芳獻諸眾聖及與道士於其日夜講誦是經十方大聖高詠靈篇囚徒餓鬼當時解脫一俱飽滿免於眾苦得還人中若非如斯難可拔贖唐書曰代宗七月望日於內道場造盂蘭盆飾以金翠所費百萬又設高祖已下七聖神座備幡節龍傘衣裳之制各書尊號于幡上以識之舁出內庭陳於寺觀是日排儀仗百寮序立於光順門以俟之幡花鼓舞迎呼道路歲以為常而識者嗤其不典唐楊盈川盂蘭盆賦曰渾元告秋羲和奏曉太陰望兮圓魄皎閶闔開兮涼風嫋四海澄兮百川皛陰陽肅兮天地窅掃離宮清重閣設一皇邸張翠幕鸞飛鳳翔睒暘倏爍雲舒霞布翕赫曶霍陳法供飾盂蘭壯神功之妙物何造化之多端青蓮吐而非夏頳果搖而不寒銅鐵鈆錫璆琳瑯玕映以甘泉之玉樹冠以承露之金盤憲章三極儀形萬類上寥廓法天下安貞兮象地殫怪力窮神異少君王子掣曳兮若來玉女瑤姬翩僊兮不至鳴鷫鸘與鸑鷟舞鶤雞與翡翠毒龍怒兮赫然狂象奔兮沉醉怖魍魎潛魑魅离婁明目不足見其精微匠石洗心不足微其奧祕繽繽紛紛氛氛氳氳五色成文若榮光休氣發彩於重雲蒨蒨粲粲煥煥爛爛三觀壯麗若合璧連珠耿曜於長漢夫其遠也天台嵥起繞之以赤霞夫其近也削城孤峙覆之以蓮晃兮瑤臺之帝室赩兮金闕之仙家其高也上諸天於大梵其廣也遍法界於常沙上可以薦元符於七廟下可以納群動於三車九月九日續齊諧記曰汝南桓景隨費長房遊學累年長房謂之曰九月九日汝家當有災厄宜急去令家人各作絳囊盛茱萸以繫臂登高飲菊花酒此禍消景如言舉家登山夕還見雞牛羊一時暴死長房聞之曰此可以代矣今世人每至九月九日登高飲酒婦人帶茱萸囊因此也晉書曰孟嘉為桓溫參軍既和而正溫甚重之九月九日溫遊龍山僚屬畢集風吹嘉帽落不覺如廁孫盛時在坐溫授紙筆命嘲之著嘉坐處嘉歸見之笑而請紙即荅了不容思言速成續晉陽秋曰陶潛九月九日無酒宅邊東籬下菊叢中擿盈把坐其側未幾望見白衣人至乃王弘送酒也即便就醉而後歸又曰寧康三, WYG: ''}
