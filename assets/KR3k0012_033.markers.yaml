  - {type: variant, offset: 1207, length: 0, content: '', SBCK: 祖以丑臘爲得盛終之節不可以戍祖辰臘梁書曰何鳯爲建安太守物不敢忤伏臘毎放囚還家依期而返唐㑹要曰貞元九年十一月上比日來京兆府毎年及臘日府縣捕養狐兎以充進獻自今巳後冝停又曰貞元十一年十二月臘日畋於苑中止多殺行三驅之禮軍士無不}
