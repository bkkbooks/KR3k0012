  - {type: variant, offset: 4, length: 2, content: 七七, SBCK: 八臘小歳膢臘許慎􅀃文曰臘冬至後壬戌臘􅀕百神也禮記}
  - {type: variant, offset: 4, length: 1, content: 七, WYG: 八臘膢附臘許慎說文曰臘冬至後三戌臘祭百神也禮記月令曰孟冬是月也天子乃祈來年于天宗大割祠于公社及門閭臘先祖五祀此周禮所謂蜡祭也天宗日月星辰也割祠割牲以祭也臘謂以畋獵所得禽祭之五祀門户中霤井竈也或曰祈年或曰大祠或曰臘互文也勞農以休息之黨正屬民飲酒正齒位也天子乃命將帥講武習射御角力講武角力校武士材力所以備畋獵之禮又郊特牲曰天子大蜡八伊耆氏始為蜡伊耆氏古天子號也蜡也者索也謂求索也嵗十二月合聚萬物而索饗之也嵗十二月周之正月謂建亥之月饗者祭其神也萬物育功于民者神使為之也祭之以報焉又曰昔者仲尼與于蜡賓蜡者索也嵗十二月合聚萬物而索饗之亦祭宗廟孔子嘗仕魯在助祭之中事畢出逰于觀之上喟然而嘆觀闕也孔子見魯君于祭有不備于此又覩象魏舊章之處感而嘆之仲尼之嘆蓋嘆魯也又曰子貢觀于蜡蜡索也嵗十二月索群神之祀而臘也孔子曰賜也樂乎對曰一國之人皆若狂賜未知其為樂也孔子曰百日之勞一日之澤非爾所知也周禮曰國祭蜡則吹豳頌擊土鼓以息老物鄭𤣥曰十二月謂建亥之月也索萬物而祭之者萬物天成嵗事至此為其老而勞其禮以息之也豳風}
