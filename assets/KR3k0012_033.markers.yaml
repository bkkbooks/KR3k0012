  - {type: variant, offset: 1163, length: 1, content: 九, SBCK: 庚子君魯祖父濛乃於華山之中乗雲駕龍白}
  - {type: variant, offset: 1163, length: 1, content: 九, krp: 庚子君魯祖父濛乃於華山之中乗雲駕龍白}
  - {type: variant, offset: 1165, length: 0, content: '', SBCK: 昇天先是其邑歌謡曰神仙得者茅􅀄成駕龍上昇八太清時下􅀇虚戲山赤城繼世而徃在我羸帝􅀂學之臘嘉平始皇聞謡歌而間其故父老具對此仙人之謡􅂆帝求長生之志也於是始皇欣然乃有尋仙之志因改臘日嘉平也又曰張良見老父}
  - {type: variant, offset: 1165, length: 0, content: '', krp: 昇天先是其邑歌謡曰神仙得者茅𥘉成駕龍上昇八太清時下玄虚戲山赤城繼世而徃在我羸帝若學之臘嘉平始皇聞謡歌而間其故父老具對此仙人之謡勸帝求長生之志也於是始皇欣然乃有尋仙之志因改臘日嘉平也又曰張良見老父}
  - {type: variant, offset: 1166, length: 3, content: 項羽戲, SBCK: 一編書曰讀是書爲王者師後十三年濟北城山下黄石即我也良後得黄石取寳而祠之及死葬黄石每上塚伏臘祠黄石焉漢書曰髙祖十年春有司奏令縣道常以春二月及臘祠社稷以羊􅇾又曰嚴延年爲河南太守􅀄延年母從東海來從延年臘到洛陽適見報囚報行决也母大驚便止都亭不肯入府延年出至都亭謁母母閉閤不見延年免冠頓首閤下良乆乃見之因數責延年曰幸得備郡守專治千里不聞人愛多刑殺人欲以立威豈爲民父母意哉延年重謝自爲母御歸府舎母畢正臘巳謂延年曰天道神明人不可獨殺我不自意當老見壯子􅀍刑戮也行矣汝南東歸掃除墓地耳後延年遂敗司}
