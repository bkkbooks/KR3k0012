  - {type: variant, offset: 1202, length: 0, content: '', krp: 農隙是也後世臘有新故交接之義遂移於夏正月十二月晉博士張亮説蜡聚饗臘者祭廟𥘉云蜡則黄服蜡臘不同惣非也臘冝在新故交接二祭月同而名異祭但而服殊今推諸經傳無正說蜡臘之文月令云蜡臘此則同日祭但牙名耳據田臘取獸之名爲臘因索饗百神號之曰折其曰上祭先祖旁饗百神下息萬民無别祭也即鄭玄云旣蜡臘先祖五祀於是勞農者也近日蜡臈兼設蜡在十月臘在歳終隋開皇四年始停建元之蜡直爲建丑之臘依五行火衰於戍而用戍日故也晉書范喬字伯孫喬邑人臘夕盗斫其樹有告者喬佯不聞邑人愧而還喬曰節日取柴欲與父母相歡耳何以愧乎遂不取又曰陳􅎮問方士戴洋曰江南有貴人頋彦先周宣珮是否洋曰顧不及臘周不及明年八月其年十二月十}
  - {type: variant, offset: 1204, length: 2, content: 宴會, SBCK: 頋卒明日臘宣珮以明年七月晦亡又晉起居注曰安帝安隆四年十二月辛丑臘祠作樂又博士張亮議曰臘接也登冝在新故交接也俗謂之臘之明日爲􅀄歳秦漢以來有賀此古之遺語晉宋舊事曰魏帝遜位祖以酉日臘以丑日魏名臣奏曰大司農董遇議曰土行之君故冝以}
