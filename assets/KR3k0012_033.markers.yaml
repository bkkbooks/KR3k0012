  - {type: variant, offset: 2049, length: 2, content: 重陽, WYG: 十月上辛命典饋清麴釀冬酒以供臘祀又曰臘明日為小嵗進酒尊長修刺賀君師禮曰天子大蜡八蔡邕王喬録曰漢永和元年十二月臘夜王喬墓有哭聲王伯聞而徃視之天大雪見大鳥跡并祭祀處採薪者尹秀見人衣冠曰我王喬也汝莫取吾墓樹忽不見徐爰家儀曰蜡本施祭故不賀其明日為小嵗賀稱初嵗福始慶無不宜正旦賀稱元旦首慶百物惟新小嵗之賀既非大慶禮止門内西域諸國志曰天竺國以十二月十六日為臘臘則麥熟盧公家範曰凡臘日上澡豆袋及頭膏面脂口脂淮南萬畢術曰嵗暮臘埋圓石于宅隅雜以桃核七枚則無鬼疫養生要術云臘夜持㪷卧井傍勿與人言投于井中除瘟疫盛翁子藏鉤賦叙曰以臘之後因祭祀餘胙要命中外以行鉤為戲嵇含蜡賦序曰大蜡之夕雖天下同有至攜金蘭以齊馨利得貴意以遺榮勢孰我尚哉裴秀大蜡詩曰有肉如丘有酒如淵有殽如林有貨如山膢說文曰膢楚俗十二月祭飲食之神也又曰祈榖食新曰離膢漢書曰武帝太初二年令天下酺五日膢五日祠門户比臘續漢書禮儀志曰立秋}
