  - {type: variant, offset: 1732, length: 233, content: 玄宗避狄幸蜀暇日命駕行遊偶至斯觀樂其佳境因遍幸道室既入此堂忽覩挂箭則命侍臣取而翫之蓋御箭也上深異之因詢觀之道士皆以實對即是佐卿所題乃前歲沙苑縱畋之日也佐卿蓋中箭孤鶴耳究其題處沙苑飜飛日集于斯歟上大奇之因收其箭而寶焉自後蜀人亦無有逢佐卿者襄陽記曰望楚山有三名一名馬鞍山一名災山宋元嘉中武陵王駿為刺史屢登之鄙其舊名望郢山因改為望楚山後遂龍飛是孝武所望之處時人號為鳳嶺高處有三登即劉弘山簡九日宴賞之所也姑熟記曰縣南十里有九井山殷仲文九日從桓公九井賦詩即此山是也臨海記曰郡北, SBCK: 崔寔}
