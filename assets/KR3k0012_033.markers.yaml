  - {type: variant, offset: 2229, length: 385, content: 悲冉冉之將老思餐秋菊之落英輔體延年莫斯之貴謹奉一束以助彭祖之術宋謝瞻九月從宋公戲馬臺詩曰風至授寒服霜降休百工巢幕無留鷰遵渚有歸鴻輕霞冠秋日迅適薄清穹聖心眷嘉節鳴鑾戾行宮四延霑芳體中堂起絲桐扶光迫西汜餘歡宴有窮又謝靈運九日從宋公戲馬臺送孔令詩曰季秋邊朔苦旅鴈違霜雪淒淒陽卉腓皎皎寒潭潔良辰感聖心雲旗興暮節鳴笳戾朱宮蘭巵獻時哲歸客遂海隅脫冠謝朝列東流有急瀾浮驂無緩轍梁庾肩吾九日侍宴詩曰轍跡光周頌巡遊盛夏功鉤陳萬騎轉閭闔九門通秋暉逐行漏朔氣遶相風獻壽重陽節廻鑾上苑中䟽山開輦道間樹出離宮玉醴吹花菊銀床落井桐飲羽山西射浮雲冀北聰塵非金垺滿葉破柳條空又劉苞九日侍宴樂遊苑詩曰上郡良家子幽并遊俠兒立乘爭飲羽側騎競紛馳明珂飾華眊金袍映玉羈膳羞殫海陸和齊眡秋宜雲飛雅琴奏風起洞簫吹曲終高宴罷景落樹陰移微薄承嘉惠飲德良不貲取效績無紀感恩心自知後周王褒九日從駕詩曰黃山獵地廣青門官路長律改, SBCK: 御覽卷第}
