  - {type: variant, offset: 16, length: 1, content: 七, krp: 孟冬是}
  - {type: variant, offset: 18, length: 724, content: 十五日僧尼道俗悉營盆供諸寺按盂蘭盆經云有七葉功德並幡花歌鼓果食送之蓋由此也又盂蘭盆經曰目連見其亡母生餓鬼中即缽盛飯往餉其母食未入口化成火炭遂不得食目連大叫馳還白佛佛言汝母罪重非汝一人柰何當須十方眾僧威神之力至七月十五日當為七代父母危難中者具百味五果以著盆中供養十方大德佛勑眾僧皆為施主呪願七代父母行禪定意然後受食是時目連白佛未來世佛弟子行孝順者亦應奉盂蘭盆供養佛言大善故後代人因此廣為華飾乃至刻木割竹飴蠟綵鏤繒摸花葉之形極工妙之巧道經七月十五日中元之節地官校閱搜選眾人分別善惡諸天聖眾普詣宮中簡定劫數人鬼簿錄餓鬼囚徒一時俱集以其日作玄都大齋獻於玉京及採諸花果世間所有奇異之物玩弄服飾幡幢寶蓋莊嚴供養之具清膳飲食百味芬芳獻諸眾聖及與道士於其日夜講誦是經十方大聖高詠靈篇囚徒餓鬼當時解脫一俱飽滿免於眾苦得還人中若非如斯難可拔贖唐書曰代宗七月望日於內道場造盂蘭盆飾以金翠所費百萬又設高祖已下七聖神座備幡節龍傘衣裳之制各書尊號于幡上以識之舁出內庭陳於寺觀是日排儀仗百寮序立於光順門以俟之幡花鼓舞迎呼道路歲以為常而識者嗤其不典唐楊盈川盂蘭盆賦曰渾元告秋羲和奏曉太陰望兮圓魄皎閶闔開兮涼風嫋四海澄兮百川皛陰陽肅兮天地窅掃離宮清重閣設一皇邸張翠幕鸞飛鳳翔睒暘倏爍雲舒霞布翕赫曶霍陳法供飾盂蘭壯神功之妙物何造化之多端青蓮吐而非夏頳果搖而不寒銅鐵鈆錫璆琳瑯玕映以甘泉之玉樹冠以承露之金盤憲章三極儀形萬類上寥廓法天下安貞兮象地殫怪力窮神異少君王子掣曳兮若來玉女瑤姬翩僊兮不至鳴鷫鸘與鸑鷟舞鶤雞與翡翠毒龍怒兮赫然狂象奔兮沉醉怖魍魎潛魑魅离婁明目不足見其精微匠石洗心不足微其奧祕繽繽紛紛氛氛氳氳五色成文若榮光休氣發彩於重雲蒨蒨粲粲煥煥爛爛三觀壯麗若合璧連珠耿曜於長漢夫其遠, SBCK: ''}
  - {type: variant, offset: 18, length: 0, content: '', WYG: 更名臘曰嘉平太原真人茅盈内紀曰始皇三}
