  - {type: variant, offset: 3740, length: 5, content: 廳事前後七, SBCK: 國志曰石室山一名石橋山一名空石山晉中朝時有王質者嘗入山伐木至石室有童子數四彈琴而歌質因放斧柯而聽之童子以一物與質狀如􅀥梅含之不復飢遂復小停亦謂俄頃童子語曰汝來巳乆何不速去質應聲而起柯巳爛盡天階山建安記曰天階山在將樂縣南二十里山下有寳華洞即赤松子採藥之所洞中有石鷰石蝙蝠石室石柱并石臼石井俗云其井南通沙縣溪復有乳泉自上而滴}
