  - {type: variant, offset: 22, length: 0, content: '', krp: 嶀浦浦口有廟廟甚靈驗行人及樵伐者皆先}
  - {type: variant, offset: 23, length: 0, content: '', SBCK: 焉􅀂相盗竊必爲蛇虎所傷北則嶀山與􅌘山接二山雖曰異縣而峯嶺相連其間傾澗懹烟泉溪引霧吹陸風馨觸岫延賞是以王元琳謂之神明境事備謝康樂山居記宋書曰張稷子􅌘字四山稷􅀄爲剡令至􅌘亭生之因名􅌘字四山塗山郡囯志曰塗山禹㑹萬囯之所有石舡長一丈云禹所乗者宋元嘉中有人於舡側掘得鐵履一􅀟又㑹稽記云東海聖姑從海中乗舟張石㠶至二物見在廟中又有周時樂器名錞于銅爲之􅄱似鍾有頸映水用芒莖刜則鳴宋武修廟得古珪梁武初修之又得青玉印重山孔曄㑹稽記曰重山大夫種墓語訛成重漢江夏太守宋輔於山南立斈教授今白樓亭處是也羅山孔曄㑹稽記曰諸曁縣北界有羅山越時西施鄭旦所居所在有方石是西施矖紗處今名紵羅山王羲之墓在山足有石碑孫興公爲文王子敬所書也鶴山孔靈符㑹稽記曰射的山西南水中有鶴山此鶴常爲仙人取箭曽刮壤㝷索遂成此山漢太尉鄭􅀪少貧賤以採薪爲業嘗於山中得一遺箭羽鏃異常心甚怪之頃之有一人覔箭􅀪以還之又曰射的山半嶺有石室仙人射堂東髙巖臨潭有石的岫形甚圎明視之如鏡矣陳音山孔曄㑹稽記曰陳音山昔有善射者陳音越王使簡士習射於郊外死因葬焉冢今開冢壁悉􅀞作􅀐射之象因以名山孔曄㑹稽記曰銅牛山舊傳常有一黃牛出山巖食草採伐人始見猶謂是人所養或有共驅蹙之垂及輙失然後知爲神異土城山孔曄㑹稽記曰勾踐索美女以獻呉王得諸曁羅山賣薪女西施鄭旦先教習於土城山山邊有石云是西施澣紗石}
