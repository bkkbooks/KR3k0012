  - {type: variant, offset: 3729, length: 1, content: 項, krp: 夫人祠山北湖隂又有消御史廟孤石聳出似婦人艶粧而坐白鶴山郡國志曰白鶴山者昔有白鶴飛入㑹稽雷門鼓中擊之聲震洛陽臨海記曰郡西有白鶴山山上有池泉水懸溜逺望如倒掛白鶴因名掛鶴泉又郡國志云漢末有徐公於白鶴山成道控鶴騰虚而去又有鶴掛嶺猶有翶翔之勢仙石山臨海記曰仙石山有館土人謂之黃公客堂兩邊有石歩廊觸石雲起崇朝必兩有四竿䈥竹風吹自垂空微拂石皆浄即王方平遊處也石新婦山臨海記曰新婦山亦名似人山土石悉紺色列石參差似人形逺望如鳥之俯仰宋文帝遣畫工模冩山狀時一國盛圖於白團扇焉靈石山臨海記曰靈石山者山有寺當孫恩作叛毀材木以爲舩舸山石即於空中自然而落賊每有所傷故曰靈山石臨海山臨海記曰臨海山山有二水合成溪曰臨海一水是始豊溪一水是東女溪至州北兩溪相合即名臨海溪山因溪名崛門山郡國志曰崛門山在海中腹有孔上達于頂有聲即大風不風即水涌岀必見大兵吴將平孔内有聲逺聞千里石公山東陽記曰石公山孤石望如石人坐其傍又有石如人狀似新婦着花履焉或名新婦巖石城山呉録曰永康有石城山海内南經云三天子都在閩西海北郭璞注云在新安歙縣東又引張氏土地記云東陽永康縣南四里有石城山上有小石城云黃帝曽遊此山即三天子都也金勝山郡國志曰金勝山昔有人於此拾得金勝因以名之山有趙炳祠炳善方術廟至今無蚊䖝異苑曰孫權時永康人入山還得大龜烹之不爛即此山也長山郡國志曰長山相連逕三百里一名金華山即皇初平初起遇道士教以仙方處吴録地理志曰常山仙人採藥處謂之長山山南有春草巖折竹巖巖間不生蔓草盡岀龍鬚云赤松}
