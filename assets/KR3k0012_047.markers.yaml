  - {type: variant, offset: 3683, length: 1, content: 足, WYG: 陽記曰石公山孤石望如石人坐其傍又有如石人狀似新婦著花履焉或名新婦巖石城山吳録曰永康有石城山海内南經曰三天子都在閩西海北郭璞注云在新安歙縣東又引張氏土地記云東陽縣南四里有石城山上有小石城云黄帝曾逰此山即三天子都也金勝山郡國志曰金勝山昔有人於此拾得金勝因以名之山有趙炳祠炳善方術廟至今無蚊蟲異苑曰孫權時建康人入山還得大龜烹之不爛即此山也長山郡國志曰長山相連逕三百里一名金華山即王方平初起遇道士教以仙方處吳録地理志曰常山仙人採藥處謂之長山山南有春草巖折竹岩岩間不生蔓草盡出龍鬚云赤松羽化之處有似龍鬚而麄大者名為虎鬚不中為席但以其心為燈炷又抱朴子云左元放言金華山可以合神丹免五兵洪水之患又按輿地志云金華山連亘三百餘里畢嶺輿地志曰東陽畢嶺之下有錢嶺往往人於嶺下獲大錢今俗謂之錢嶺銅山東陽記曰銅山下有泉色鮮白號為銅泉又按異苑曰吳時有軍士五百人破洞得一銅釜將欲破之水從中暴發遂成湖被溺人皆死於此崑山東陽記曰崑山頂上}
