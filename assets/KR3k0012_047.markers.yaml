  - {type: variant, offset: 3686, length: 2, content: 簣高, WYG: 孤石髙可三十丈其形如甑人謂之石甑騎石山郡國志曰騎石山如人騎馬而無頭昔有神巫以印指馬馬頭即落則此山也江郎山郡國志曰江郎山有三峰峰上各有一巨石髙}
