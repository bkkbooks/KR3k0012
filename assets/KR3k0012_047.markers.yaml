  - {type: variant, offset: 3721, length: 0, content: '', WYG: 險千人不得上即此山也梨嶺泉山記曰棃嶺因棃以名之記云南嶺下道東有種棃古亭跡存焉武夷山蕭子開建安記曰武夷山髙五百仞巖石悉紅紫二色望之若朝霞有石壁峭㧞數百仞於煙嵐之中其石間有水碓礱簸箕籮竹箸等物靡不有之顧野王謂之地仙之宅半巖有懸棺數千傳云昔有神人武夷君居之故因名之又坤元録云建陽縣上百餘里有仙人𦵏山亦神仙所居之地䦨干山建安記曰䦨干山南與武夷山相對半岩有石室可容千人岩口有水闌干飛閣棧道逺望石室中隐隐然有牀帳几案之屬岩石間悉生古柏懸棺仙葬多類武夷雞巖建安記曰雞岩隔澗西與武夷相對半岩有雞窠四枚石峭上不可登履時有羣雞數百飛翔䧺者類鷓鴣魏王秦坤元録云武夷山澗東一巖上有雞栖即此是也烏嶺烏嶺山記曰烏嶺峻極不通牛馬因其烏居山連接因以為名魏王秦坤元録云邵武北有庸嶺一名烏嶺北隰中有大蛇為將樂令李誕所殺者金泉山建安記曰金泉山南枕溪有細泉出沙彼人以夏中水小披沙淘之得金山西有金泉祠演仙山建安記曰演仙山故老相傳云演氏鍊丹於此山竈之餘基僅存焉此山東面亦略通人逕山中出橘其味甘人有食者則可攜之出山即迷道有演仙水出此山當}
