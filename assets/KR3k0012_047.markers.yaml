  - {type: variant, offset: 15, length: 1, content: 川, SBCK: 烏帶山龍頭山壇讌山白石山小白山縉雲山桃都山椒山覆釡山石簣山括蒼山天姥山消山白鶴山仙石石新婦山靈石山臨海山崛門山石公山石城山金勝山長山畢嶺銅山崑山􅀐石山江郎山石室山天階山太湖山􅀌山泉山梨嶺武夷山闌干山雞巖烏嶺山金泉山演仙山稷山越絶書曰稷山者勾踐齋戒臺也麻山越絶書曰麻山者勾踐欲伐吴種麻以爲弓弦雞豕山越絶書曰雞豕山者越將伐吴養雞豕於此山以食死士獨女山吴越春秋曰獨女山者諸寡婦女􅁋佚犯過皆輸此山上越王將伐呉其士有憂思者令遊山上以喜其意􅀛山呉越春秋曰怪山者琅邪東武海中山也一夕自來百姓怪之故曰怪山形似􅀛體故謂􅀛山孔曄㑹稽}
