  - {type: 'tls:seg', offset: 3681, content: '', id: KR3k0012_CHANT_047-59a.6}
  - {type: variant, offset: 3681, length: 0, content: '', WYG: 也石新婦山臨海記曰石新婦山亦名似人山土石悉紺色列石參差似人形逺望如鳥之俯仰宋文帝遣畫工模寫山狀時一國盛圗於白團扇焉靈石山臨海記曰靈石山者山有寺當孫恩作叛毁材木以為船舸山石即於空中自然而落賊毎有所傷故曰靈石山臨海山臨海記曰臨海山山有二水合成溪曰臨海一水是始豐溪一水是東女溪至州北兩溪相合即名臨海溪山因溪名崛門山郡國志曰崛門山在海中腹有孔上達於頂有聲即大風不風即水涌出必見大兵吳將平孔内有聲逺聞千里石公}
  - {type: page-break, offset: 3681, content: '', id: KR3k0012_WYG_047-13a, image: WYG0893/WYG0893-0406c.png}
  - {type: page-break, offset: 3681, content: '', id: KR3k0012_WYG_047-13b, image: WYG0893/WYG0893-0406d.png}
