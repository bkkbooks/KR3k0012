  - {type: variant, offset: 3708, length: 4, content: 封又宋書, WYG: 以良久乃覺是家園中也石室山郡國志曰石室山一名石橋山一名空石山晉中朝時有王質者嘗入山伐木至石室有童子數四彈琴而歌質因放斧柯而聽之童子以一物與質狀如􅀥枚含之不復飢遂復小停童子語曰汝來已久何不速去質應聲而起柯已爛盡天階山建安記曰天階山在將樂縣南二十里山下有寶華洞即赤松子採藥之所洞中有石燕石蝙蝠石室石柱并石臼石井俗}
