  - {type: variant, offset: 3689, length: 4, content: 尺晉太康, WYG: 十丈嵗漸長成昔有江家在山下居兄弟三人神化於此故有三石峰在焉有湛滿者亦居山下其子仕晋遭永嘉之亂不得歸滿乃使祝宋言於三石之靈能致其子靡愛斯牲旬日}
