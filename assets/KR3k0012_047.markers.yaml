  - {type: variant, offset: 1760, length: 664, content: 以為吳之石城猶楚之九疑也多生箭竹又有桑樹山上有城因以名焉攝山江乘地記曰扈村有攝山山多藥草可以攝生因名之方四面各起重嶺遊者名繖山形似繖也山頂舊有周江乘廟傳云吳時人未詳名字黃鶴山京口記曰有黃鶴山在縣界晉王恭為刺史改創西南樓名萬歲西北名芙蓉樓至今存焉又輿地志云俗傳此樓飛向江外以鐵鎖縻之方已覆舡山梁武輿駕東行記曰有覆舡山酒罌山南次高驪山傳云昔高驪國女來東海神乘舡致酒禮娉之女不肯海神撥舡覆酒流入曲阿故曲阿酒美也北固山南徐州記曰城西北有別嶺入江三面臨水號云北固劉楨京口記云廻嶺入江懸水峻壁舊北固作固字梁高祖云作鎮作固誠有其語然北望海口實為壯觀以理而推宜改為顧望之顧輿地志云天景清明登之望見廣陵城如在青霄中虎丘山顧凱之虎丘山序曰吳城西北有虎丘山越絕書曰闔閭冢名虎丘銅槨三重女山山謙之南徐州記曰丹徒縣西九里臨江有女山山東許貢客刺孫策所也秦履山山謙之南徐州記曰暨陽縣西南可三十五里有秦履山傳云秦皇登之以望江海馬鞍山山謙之南州記曰暨陽縣北九里馬鞍山東有黃山郭璞葬所中州山山謙之南徐州記曰南沙縣北百里有中州山昔在海中去岸七十里義熙以來沙漲遂與岸連三白山山謙之南徐州記曰剡縣有三白出鐵常供戎器山東頭南面有石穴高丈餘容十數人恒津液流潤天將雨輒有雲群行從南來暎山山亦出雲應之與同比就虞山即大雨矣馬蹄山劉損京口記曰石峴東連馬蹄山山上石有馬蹄跡因以為名算山劉損京口記曰算山無峰嶺臨江魏文帝南望致歎會骸山吳郡緣海四縣記曰帶海有會骸山傳云山有金牛昔有兄弟三人共鑿求之坎崩同死因以為名石姥山劉道真錢唐記曰石姥山有一石甑厥狀殊似居絕嶺之顛大數十圍下有三石足支之大辟, SBCK: 桃都}
