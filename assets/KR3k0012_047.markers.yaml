  - {type: variant, offset: 1425, length: 1, content: 歙, WYG: 塗山禹㑹萬國之所有石船長一丈云禹所乗者宋元嘉中有人於船側掘得鐵屐一雙又㑹稽記曰東海聖姑從海中乗舟張石帆至二物見在廟中又有周時樂器名錞于銅為之形似鐘有頸映水用芒莖刜則鳴宋武修廟得古珪梁武初修之又得青玉印重山孔曄㑹稽記曰重山大夫種墓語訛成重漢江夏太守宋輔於山南立學教授今白樓亭處是也羅山孔􅁮㑹稽記曰諸曁縣北界有羅山越時西施鄭旦所居所在有方石是西施曬紗處今名苧羅山王羲之墓在山足有石碑孫興公為文王子敬所書也鶴山孔靈符㑹稽記曰射的山西南水中有鶴山此鶴常為仙人取箭曾刮壤尋索遂成此山漢太尉鄭宏少貧賤以採薪為業嘗於山中得一遺箭羽鏃異常心甚怪之頃之有一人覔箭宏以還之又射的山半嶺有石室仙人射堂東有高巖臨潭有石的形甚圎眀視之如鏡矣陳音山孔􅁮㑹稽記曰陳音山昔有善射者陳音越王使簡士習射射於郊外死因葬為冢今開冢壁悉畫作騎射之象因以名山銅牛山孔􅁮㑹稽記曰銅牛山舊傳常有一黄牛出山巖食草採伐人始見猶謂是人所養或有共驅蹙之箠及輙失然後知為神異土城山孔􅁮㑹稽記曰勾踐索美女以獻吳王得諸暨苧羅山賣薪女西施鄭旦先教習於土城山山邊有石云是西施澣紗石亭山孔􅁮㑹稽記曰晉司空何無忌臨郡起亭山椒極望巖阜基址猶存因號亭山洛思山孔􅁮㑹稽記曰永興縣東五十里有洛思山漢太尉朱偉為光禄大夫時遭母哀欲卜墓此土將歸洛下冢師相地因謂云去鄉既逺歸思常深忽極目千里北望亰洛遂縈咽而死𦵏山頂故以為名烏帶山孔靈符㑹稽記曰諸暨縣西北有烏帶山其山上多紫石世人莫知之居士謝敷少時經厯諸山徃來遷昜功費千計生業將盡後逰此境夜夢山神語之曰當以五十萬相助覺甚怪之旦見主人牀下有異色甚眀試取拭視乃紫石因問所從來云出此山遂往掘果得其利不貲龍頭山孔靈符㑹稽記曰上虞}
