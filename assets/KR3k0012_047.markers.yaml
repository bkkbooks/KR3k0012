  - {type: variant, offset: 3547, length: 122, content: 山極高峻上多美石泉木名茶雜道書曰天目山左高於地七千五百丈右高於地七千丈從廣三千里上有淵中有魚可食無毒虫水經注曰吳興郡於潛縣北有天目山山極高峻崖嶺竦疊西臨後澗山上有霜木皆是數百年樹謂之翔鳳林東面有瀑布下注數畝深沼名曰蛟龍池水南流經縣西為縣之西溪卞, SBCK: 消}
