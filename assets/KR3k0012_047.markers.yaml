  - {type: variant, offset: 18, length: 2, content: 宛陵, SBCK: 城西門外百餘歩有怪山越時起靈臺於山上又作三層樓以望雲㑹稽志曰􅀛山之下有東武里即琅邪東武縣山一夕移於此東武人因徙此故里不動秦望山水經注曰㑹稽秦望山在州城正南爲衆峯之傑渉境便見史記云秦始皇登之以望南海自平地取山頂七里懸嶝􅀌危峭路險絶記云攀蘿捫􅁑然後能昇山上無甚髙木當由地逈多風所致山南有嶕峴中有大城越王無餘之舊都也故呉越春秋云勾踐語范蠡曰先君無餘國在南山之陽社稷宗廟在湖之南又有會稽之山古防山也亦謂之茅山也又曰揀山越絶云揀猶鎭也蓋周禮所謂楊州之鎭山矣山形四方多金玉下多玞石山海經曰夕水出焉南流注于湖呉越春秋稱山覆盎釡之中有金簡玉字之書黃帝之遺䜟也山下有禹廟廟有聖姑像禮樂緯云禹治水天賜神女聖姑即其像也山上有禹冢昔大禹即位十年東巡狩崩于會稽因而葬之言鳥爲之耘春銜抜草根秋啄其穢是以縣官禁民不得妄害此鳥犯則有刑無赦山東有陘去廟七里深不見厎謂之禹井云東游者多探其穴也秦始皇登稽山刻石紀功尚存山側孫暢之述書云承相李斯所􅂐也又有石山上有金簡玉字之書言夏禹發之得百川之理也又有射的山逺望山的狀􅀂射侯故謂射的射的之西有石室之爲射堂年登否常占射的以爲貴賤之准的明則米賤的闇則米貴故喭云射的白斛米百射的􅀇斛米千􅌘山水經注曰剡縣􅌘山山下有亭亭帶山臨江松嶺森蔚沙渚平淨浦陽江之東北經始寧縣嶀山之嶠嶠壁立臨江欹路峻狹不得併行行者牽木稍進不敢俯視嶠西有􅀌峯特上飛禽罕至嘗有採藥者㳂山見涌蹊㝷上於山頂樹下有十二方石地甚方㓗還復更㝷遂迷前路言諸仙之所集讌故以壇讌名山嶠}
