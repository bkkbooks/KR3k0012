  - {type: variant, offset: 554, length: 492, content: 宣城圖經曰慈母山在當塗縣北臨江丹陽記云山生簫管竹王褒洞簫賦云原夫簫管之所生于江南之丘墟即此處也其竹圓緻異於眾處自伶倫採竹嶰谷已後唯此簳見珍歷代常給樂府而俗呼為鼓吹山山有慈母祠也蕪湖山宣城圖經曰蕪湖山在縣西南山因湖以名之漢末於湖側置蕪湖縣以其地卑畜水非深而生蕪藻故因以名縣焉晉為重鎮謝尚王敦皆鎮於此陳平縣廢以其地入當塗縣望夫山宣城圖經曰望夫山昔人往楚累歲不還其妻登此山望夫乃化為石其山臨江周廻五十里高一百丈博望山宣城圖經曰博望山有二山夾大江東曰博望西曰天門按郡國志云天門山亦曰峨嵋山楚獲吳艅艎於此按其山相對時人呼為東梁西梁山據縣圖為天門山輿地志云博望梁山東西隔江相對如門相去數里謂之天門宋孝武詔曰梁山天表象魏以旌國形仍以二山為立闕故曰天門陵陽山宣城圖經曰陵陽山在涇縣西南一百三十里列仙傳云陵陽子明釣得白龍放之後五年龍來迎子明上丹陽陵陽山一百餘年乃得仙山高一千餘丈又有子安仙人也來就子明二十年一旦忽死因葬山下常有黃鵠栖其處樹上鳴云子安子安也白紵山宣城圖經曰宣州白紵山在縣東五里本名楚山桓溫領妓遊此山奏樂好為白紵歌因改為白紵山中山宣城圖經曰宣州中山又名獨山有溧水縣東南一十里不與群山連接古老, SBCK: ''}
