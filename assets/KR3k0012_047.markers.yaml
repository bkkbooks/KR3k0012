  - {type: variant, offset: 3736, length: 2, content: 羽多, SBCK: 金華山連亘三百餘里畢嶺輿地志曰東陽畢嶺之下有錢嶺往往人於嶺下獲大錢今俗謂之錢嶺銅山東陽記曰銅山下有泉水色鮮白號爲銅泉又按異苑曰吴時有軍士五百人破洞得一銅釡將欲破之水從中暴發遂成湖以溺人皆死於此崑山東陽記曰崑山頂上有一孤石髙可三十丈其形如甑人謂之石甑􅀐石山郡國志曰􅀐石山如人􅀐馬而無頭昔有神巫以印指馬馬頭即落則此山也江郎山郡國志曰江郎山有三峯峯上各有一巨石髙數十丈歳漸長昔有江家在山下}
