  - {type: variant, offset: 2732, length: 105, content: 娛群臣今吳縣有館娃鄉香山董監吳地記曰香山吳王遣美人採香於山因以為名故有採香徑華山華山精舍記曰老子枕中記云吳西界有華山可以度難父老云山頂北有池上生千葉蓮花服之羽化因曰華山長林森大荒楚蔽日輿地志云山上有石鼓晉隆安中, SBCK: ''}
