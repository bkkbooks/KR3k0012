  - {type: variant, offset: 3745, length: 61, content: 人太守不敢上廳惠明謂綱紀曰孔季恭曾為此郡未聞有災𨔵盛設筵榻接賓數日未幾惠明忽見一人長丈餘張弓挾矢向之既而不見因發背旬日而殞, WYG: ''}
  - {type: variant, offset: 3746, length: 8, content: 太守不敢上廳惠明, SBCK: 以服之登山頂者􅀂昇碧霄故有天階之號大湖山建安記曰大湖山在浦城縣西南一百里一名聖湖山湖在山頂昔有採藥者止此湖畔見滿湖芙蓉渉水採之乃石也亦有禽鳥逺望如飛近視則石􅀌山建安記曰􅀌山在環璋之間其地坦平悉是溝塍阡陌以以此山挺然孤立因以名之梁江淹爲吴興令云此地有碧水丹山珎木靈草昔爲淹之勝境泉山泉山記曰山頂有泉分爲兩沠一入處州一入建溪即漢書朱買臣所}
