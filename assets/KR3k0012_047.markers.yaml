  - {type: variant, offset: 22, length: 2, content: 敬亭, WYG: 怪山越時起靈臺於山上又作三層樓以望雲㑹稽志曰龜山之下有東武里即琅琊東武縣山一夕移於此秦望山水經注云㑹稽秦望山在州城正南為衆峰之傑渉境便見史記曰秦始皇登之以望南海自平地至山頂七里懸磴孤危峭路險絶記云攀蘿捫葛然後能昇山上無甚高木當由地逈多風所致山南有嶕嶢中有大城越無餘之舊都也故吳越春秋云勾踐語范蠡曰先君無餘國在南山之陽社稷宗廟在湖之南又有㑹稽之山古防山也亦謂之茅山也又曰㨂山越絶云㨂猶鎮也蓋周禮所謂揚州之鎮山矣山形四方多金玉下多玞石山海經曰夕水出焉南流注於湖吳越春秋稱山覆釜之中有金簡玉字之書黄帝之遺識也山下有禹廟廟有故聖像禮樂緯云禹治水天賜神女聖姑即其像也山上有禹冢昔大禹即位十年東廵狩崩於㑹稽因而𦵏之言鳥為之耕春銜㧞草根秋啄其穢是以縣官令民不得妄害此鳥犯則有刑無赦山東有陘去廟七里深不見底謂之禹井云東逰者多探其穴也秦始皇登稽山刻石紀功尚存山側孫暢之述書云丞相李斯所篆也又有石山上有金簡玉字之書言夏禹發之得百川之理也又有射的山逺望山的狀若射侯故謂射的射的之西有石室為射堂年登否常占射的以為貴賤之凖的眀則米賤的闇則米貴故諺云射的白斛米百射的𤣥斛米千嵊山水經注曰剡縣嵊}
