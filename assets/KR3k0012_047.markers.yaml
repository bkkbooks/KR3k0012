  - {type: 'tls:seg', offset: 2735, content: '', id: KR3k0012_CHANT_047-43a.8}
  - {type: variant, offset: 2735, length: 306, content: 今吳縣有館娃鄉香山董監吳地記曰香山吳王遣美人採香於山因以為名故有採香徑華山華山精舍記曰老子枕中記云吳西界有華山可以度難父老云山頂北有池上生千葉蓮花服之羽化因曰華山長林森大荒楚蔽日輿地志云山上有石鼓晉隆安中鳴乃有孫恩之亂山在縣西六十三里包山吳地記曰包山在縣西一百三十里中有洞庭深遠世莫能測吳王使靈威丈人入洞穴十七日不能盡因得玉葉上刻靈寶經二卷使示孔子云禹之書也又郡國志云洞庭山有宮五門東通林屋西達峨嵋南接羅浮北達岱岳又按玄中記云吳國西有具區澤中包山有洞庭寶室入地下潛行通琅耶東武淮南子云斷脩虵於洞庭左傳云哀公元年夫羗敗越於夫椒今太湖中別有夫椒山下有大洞天宮潛涌五岳包山上舊無三班謂虵虎雉侯景亂後乃有虎虵為人之害石鼓, WYG: 攀龍髯所墜者桃都}
