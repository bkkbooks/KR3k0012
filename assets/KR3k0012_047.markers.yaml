  - {type: variant, offset: 3713, length: 3, content: 蕭惠明, WYG: 其井南通沙縣溪復有乳泉自上而滴人以服之登山頂者若昇碧霄故有天階之號太湖山建安記曰太湖山在浦城縣西南一百里一名聖湖山湖在山頂昔有採藥者止此湖畔見滿湖芙蓉涉水採之乃石也亦有禽鳥逺望如飛近視則石孤山建安記曰孤山在環嶂之間其地坦平悉是溝渠阡陌以此山挺然孤立因以名之梁江淹}
