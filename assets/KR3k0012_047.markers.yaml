  - {type: variant, offset: 26, length: 0, content: '', WYG: 下}
  - {type: variant, offset: 27, length: 717, content: 神祠即謝朓賽雨賦詩之所其神云梓華府君頗有靈驗蓋山紀義宣城記曰登蓋山一百許步有泉俗傳云昔有舒氏女未適人其父析薪於此女忽坐泉處牽挽不動父遽告家比來唯見清泉湛然其女性好音樂乃作絃歌即泉涌浪廻復有赤鯉一雙躍出今作樂嬉遊泉猶故沸涌九華山九華山錄曰此山奇秀高出雲表峰巒異狀其數有九故號九子山焉李白因遊江漢覩其山秀異遂更號曰九華又曰山之上有池塘數畝水田千石其池有魚長者半尋頒首頳尾朱鬐丹腹人欲觀之叩木魚即以可食之物散於池中食訖而藏焉其水流洩為龍池溢為瀑泉入龍潭溪有白墡窟其土如麵不墋歉歲人多食之顧野王輿地記曰九華山山高一千丈劉禹錫序曰余嘗愛終南太華以為此外無奇愛女几荊門以為此外無秀及見九華始悼前言之容易也幘山宣城圖經曰幘山北面迤邐連九華山其山層峰嵯峨遐睇狀如冠幘因號為幘山牛渚山宣城圖經曰牛渚山突出江中謂為牛渚圻古津渡處也江表傳云司馬徽論運命曆數云黃旗紫蓋見於東南終有天下者荊楊君子又壽春童謠言天子當西上孫皓大喜即載妻子及後宮數千從牛渚陸道西上云青蓋入洛陽適還大雪寒凍殆死輿地志云牛渚山首有人潛行云此處連洞庭傍達無底見有金牛狀異乃驚怪而出牛渚山北謂之採石按今對採石渡口上有謝將軍祠又按江源記云啇侶於此取石至都輸造石渚因名採石吳初以周瑜屯牛渚鎮西將軍謝尚亦鎮此城慈母山宣城圖經曰慈母山在當塗縣北臨江丹陽記云山生簫管竹王褒洞簫賦云原夫簫管之所生于江南之丘墟即此處也其竹圓緻異於眾處自伶倫採竹嶰谷已後唯此簳見珍歷代常給樂府而俗呼為鼓吹山山有慈母祠也蕪湖山宣城圖經曰蕪湖山在縣西南山因湖以名之漢末於湖側置蕪湖縣以其地卑畜水非深而生蕪藻故因以名縣焉晉為重鎮謝尚王敦皆鎮於此陳平縣廢以其地入當塗縣望夫山宣城圖經曰望夫山昔人往楚累歲不還其妻登此山望夫乃化為石其, WYG: 亭亭帶}
