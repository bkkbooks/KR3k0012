  - {type: variant, offset: 3676, length: 4, content: 卞和採玉, WYG: 下有夫人祠山北湖隂又有消御史廟孤石聳出似婦人豔粧而坐白鶴山郡國志曰白鶴山者昔有白鶴飛入㑹稽雷門鼓中擊之聲震洛陽臨海記曰郡西有白鶴山山上有池泉水懸溜逺望如倒挂白鶴因名挂鶴泉又郡國志曰漢末有徐公於白鶴山成道控鶴騰虗而去又有鶴掛嶺猶有翺翔之勢仙石山臨海記曰仙石山上有舘土人謂之黄公客堂兩邊有石步廊觸石雲起崇朝必雨有四竿修竹風吹自垂空際拂石皆浄即王方平逰}
