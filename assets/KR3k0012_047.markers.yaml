  - {type: variant, offset: 1603, length: 630, content: 山謙之丹陽記曰江寧縣北十二里濱江有三山相接即名三山舊時津濟道也橫山山謙之丹陽記曰丹陽縣東十八里有橫山連亙數十里或云楚子重至于橫山是也鐵峴山山謙之丹陽記曰永世記云縣南百餘里鐵峴山廣輪二百許里山出鐵楊州今鼓鑄之九井山姑熟記曰縣南十里有九井山即殷仲文九日從桓公遊九井賦詩處也石城山江乘地記曰石城山嶺鄣千里相重似若一遊歷者以為吳之石城猶楚之九疑也多生箭竹又有桑樹山上有城因以名焉攝山江乘地記曰扈村有攝山山多藥草可以攝生因名之方四面各起重嶺遊者名繖山形似繖也山頂舊有周江乘廟傳云吳時人未詳名字黃鶴山京口記曰有黃鶴山在縣界晉王恭為刺史改創西南樓名萬歲西北名芙蓉樓至今存焉又輿地志云俗傳此樓飛向江外以鐵鎖縻之方已覆舡山梁武輿駕東行記曰有覆舡山酒罌山南次高驪山傳云昔高驪國女來東海神乘舡致酒禮娉之女不肯海神撥舡覆酒流入曲阿故曲阿酒美也北固山南徐州記曰城西北有別嶺入江三面臨水號云北固劉楨京口記云廻嶺入江懸水峻壁舊北固作固字梁高祖云作鎮作固誠有其語然北望海口實為壯觀以理而推宜改為顧望之顧輿地志云天景清明登之望見廣陵城如在青霄中虎丘山顧凱之虎丘山序曰吳城西北有虎丘山越絕書曰闔閭冢名虎丘銅槨三重女山山謙之南徐州記曰丹徒縣西九里臨江有女山山東許貢客刺孫策所也秦履山山謙之南徐州記曰暨陽縣西南可三十五里有秦履山傳云秦皇登之以望江海馬鞍山山謙之南州記曰暨陽縣北九里馬鞍山東有黃山郭璞葬所中州山山謙之南徐州記曰南沙縣北百里有中州山昔在海中去岸七十里義熙以來沙漲遂與岸連三白山山謙之南徐州, WYG: 孔􅁮㑹稽}
