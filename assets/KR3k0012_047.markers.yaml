  - {type: variant, offset: 1122, length: 298, content: 於此山求仙後道成化為三白鶴於此冲天黟山歙縣圖經曰北黟山在縣西北一百六十八里高一千一百七十丈豊樂水出焉舊名黃山天寶六年勑改焉案江南諸山之大者有天台天目而天目近連浙江天台俯瞰滄海江海者實以地下為百川所歸然歙州則江之上游而海上濫觴也今計歙川之平地已合與二山齊矣況其山又有摩天戛日之高此則浙江東西宣歙池饒江等州山並是此山之支脈明矣其諸峰悉是積石有如削成煙嵐無際雷雨在下其霞城洞室符竇瀑泉則無峰不有若林澗之下巖巒之上奇蹝異狀不可摸寫信靈仙之窟宅也山中峰有溪丘公仙壇彩霞靈禽捿止其上是浮丘公與容成子遊之處所昔有人到壇所忽見樓臺煥然樓前有蓮池左右有塩積米積遂歸引村人上取了不知其處所山下人往往聞峰上有仙樂之聲靈, SBCK: 縉雲}
