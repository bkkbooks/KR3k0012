  - {type: variant, offset: 2, length: 0, content: '', WYG: 四十溝瀆渠甽澮汎灣浦溝釋名曰田間之水曰溝溝者搆也從横相交搆也爾雅曰谿注谷曰溝周禮曰匠人為溝洫九夫為井間廣四尺深四尺謂之溝方十里為城城間廣八尺深八尺謂之洫傳曰梁伯好土功乃溝公宫又曰魯將與齊戰師不踰溝樊遲曰請三刻而踰之衆從之又哀元年吳城䢴溝通江淮杜預曰於䢴江築城穿溝東北通射陽湖西北至禾口入淮通糧道也今廣陵䢴江是又史記云䢴溝即吳王夫差所開漕運以通上國者國語曰吳王夫差殺申胥不稔於嵗稔謂嵗熟也乃起師北征開為深溝通於商魯之間開掘地商宋也北屬之沂西屬之濟以會晉定公于黄池論語曰禹盡力於溝洫史記曰漢王四年王軍廣武關中兵益出當此時彭越起兵居梁地往來略楚兵絶其糧道齊王信又進擊楚項羽恐乃與漢王約中分天下割鴻溝而西者為漢鴻溝而東者為楚項羽歸漢王父母妻子軍皆呼萬嵗羽解而東漢王欲引而西用張良陳平計乃進兵追項羽博物志曰徐偃王治其國仁義著聞欲周行上國乃通溝陳蔡之間得朱弓朱矢酈道元水經注曰高唐縣有甘棗溝水側多􅀥故俗取名溝焉又曰酒泉延夀縣南有山石水出于莒地為溝殷氏世傳曰殷褒為滎陽令先多霪雨百姓饑饉褒乃穿渠入河四十餘里疏導原隰用致豐年民頼其利號曰殷溝而頌之莊子曰尋常之溝洫巨魚無所還其體而鯢鰌為之制孟子曰思天下之民匹夫匹婦有不被堯舜之澤者若已推而内之溝中楊子圖經曰六合縣東}
