  - {type: variant, offset: 1236, length: 1362, content: 遠恐泥是以君子不為小道令諸子書泥滯陷不通也漢書溝洫志曰涇水一石其泥數斗且溉且番長我禾黍又曰禹泥行乘橇東觀漢記曰隗囂將王元說囂將背漢曰請以一丸泥為大王東封函谷關此萬世一時也又曰鄧訓將黎陽宮兵屯漁陽遷護烏丸校尉黎陽宮故吏皆戀慕知訓好以青泥封書從黎陽步推鹿車載青泥至上谷遺訓其得人心如此隴石記曰武都紫水有泥其色亦紫而粘貢之用封璽書故詔誥有紫泥之美帝王世紀曰周穆王征犬戎得鍊剛赤刀用之割玉如割泥焉神仙傳曰董奉居廬山嘗大旱縣令于士彥詣奉說大旱之意奉因仰視其屋曰貧家屋皆見天不可以得雨如何令解其意身率將吏為起屋屋成當泥壁作人已掘土欲取江水沃泥奉曰不須日暮當雨也其夜果大雨聚壤成泥顧微廣州記曰鬱林郡山東南有池有石牛在池下民常祀之歲旱百姓殺牛祀之以牛血和泥泥石牛背祠畢天雨洪注洗背泥盡而後晴曾子曰白沙在泥與之皆黑淮南子曰琬琰之玉在汙泥之中雖廉者不釋也世說曰石崇以椒為泥泥屋王君夫以赤石脂泥壁雜五行書曰二月上壬取土泥屋四角宜蠶吉礫釋名曰小石曰礫礫析也小石相支其間析析然抱朴子曰軍術曰地生瓦礫不去有大禍蔡伯喈青衣賦曰金生沙礫珠出蚌泥盧子雲相風賦曰楚石雜結綠沙礫廁隋珠沙龍魚河圖曰蚩尤兄弟八十一人並銅頭鐵額食沙石韓詩外傳曰孔子南遊適楚至於阿谷之隧有女子佩瑱而浣者孔子曰彼婦人其可與言乎執觴以授子貢曰善為之辭婦人其曰阿谷之隧隱曲之汜欲飲則飲何問於婢子授子貢觴跪坐置之沙上曰禮不親授禮曰自西河至於流沙千里而遙雍州是也家語曰得其人如聚沙而雨之非其人如會聾而鼓之史記曰張良以鐵椎擊秦始皇於博浪沙中其副車又曰上在雒陽南宮從複道望見諸將往往相與坐沙中語又曰武帝元封元年旱於是天子乃禱萬里沙應劭注曰万里沙祠戰國策曰齊襄王立田單相之過淄水有老人涉水而寒不能行坐沙中田單見其寒也解裘而衣之襄王曰弗早圖恐後悔之疑單有異心也漢書曰韓信擊龍且夾睢水夜令人為萬餘囊盛沙以壅水上流東觀漢記曰朱鮪等共會洧水上沙中設壇立聖公為天子愽物志曰石蕃衛臣也背能負千二百石沙廣志曰流沙在玉門關外南北二千東西數百里有三斷名曰三隴列子曰牛缺者上地之大儒也之邯鄲遇盜於耦沙魯連子曰朝露之蒲工女不能治淄澠之沙計兒不能數韓子曰孫叔敖請漢間之地沙石之處曾子曰白沙在泥與之皆黑淮南子曰河水欲清沙瀼穢之又曰寒凝水熱焦沙抱朴子曰穆王南征一軍盡化小人為虫沙說苑曰湯之時大旱七年焦沙爛石葛洪肘後方曰治溺死方熬沙以覆死人使上下有沙但出口鼻古今注曰宣帝地節元年上都沙中夜風有火如粟曹瞞傳曰操征馬超隔渭水婁子伯說曰今天寒可起沙為城以水灌之可一夜而成劉根別傳曰潁川太守高府君到官民人疫郡中掾吏死者過半夫人郎君悉得病從根求消除病氣之術根曰於廳事之亥上穿地取沙三斛著中以淳酒三升沃其上府君從之病者悉得愈疫氣絕搜神記曰有物處于江水其名曰蜮一曰短狐能含沙射人以術方抑之則得沙石於肉中叚國沙州記曰澆河西有黃沙沙南北一百二十里東西七里西極大楊川望黃沙猶人委乾糒地不生草木黃沙蕩然沙州取號焉豫章記曰龍沙在郡北帶江沙甚潔白高峻而峙陂陁有龍形舊俗九月九日登高上處也新安記曰錦沙村傍山依壑素波澄膜錦石舒文冠軍吳喜聞之而造焉鼓柂遊泛彌旬忘返歎曰名山美石故不虛賞使人喪朱門之志王孚記曰袁州有水春交則上白沙如米於兩岸九十餘里呼為米沙若一岸徧米其方豐熟湘中記曰白沙如霜雪赤岸似朝霞遁甲開山圖曰沙土之福雲陽之墟可以長生可以隱居沙土即長沙也雲陽古仙人, SBCK: ''}
