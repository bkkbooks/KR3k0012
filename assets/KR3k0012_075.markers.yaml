  - {type: variant, offset: 126, length: 2, content: 防海, SBCK: 蠡湖西灣夏秋水渺漲商徒縈紆牽舟循繞人力疲勞號爲西疲灣亦云西灣又有白溝灣亦在湖西汎漲驚波似雪汹涌溝澮因是名焉又有落星灣灣内有落星石周廻百歩許又有神林下有廟祈福而􅀗前進由是名焉又有女兒廟禱祈亦有靈應即不許所置永嘉郡記曰樂城縣三原亭去郡百二十里溪水清如鏡曩昔有得一死鮎者鬐}
  - {type: page-break, offset: 126, content: '', id: KR3k0012_SBCK_075-6a}
  - {type: variant, offset: 126, length: 1, content: 防, WYG: 洛陽城外四面有陽渠水周公所制也建春門外二橋最大縱一横一續述征記曰案河渠書溝洫志引河為洪溝一說秦至魏鑿渠引河灌大渠名曰洪溝焉崔寔政論曰戰國}
  - {type: page-break, offset: 126, content: '', id: KR3k0012_WYG_075-7b, image: WYG0893/WYG0893-0601b.png}
  - {type: variant, offset: 126, length: 2, content: 防海, krp: 蠡湖西灣夏秋水渺漲商徒縈紆牽舟循繞人力疲勞號爲西疲灣亦云西灣又有白溝灣亦在湖西汎漲驚波似雪汹涌溝澮因是名焉又有落星灣灣内有落星石周廻百歩許又有神林下有廟祈福而獲前進由是名焉又有女兒廟禱祈亦有靈應即不許所置永嘉郡記曰樂城縣三原亭去郡百二十里溪水清如鏡曩昔有得一死鮎者鬐}
  - {type: variant, offset: 128, length: 0, content: '', WYG: 内十二分魏州有史起引漳水灌鄴民以興歌蜀郡李冰鑿離堆通二江益郡至今頼之秦開鄭國漢作白溝而關中號為陸海郡國志瀛州平舒縣古五渠水魏延興初文安縣人孫願等捕魚此水先祭忽有羣魚從西而來有一人異甚謂願曰若得}
  - {type: variant, offset: 129, length: 1, content: 塘, SBCK: 五六圍一輙得數十斛鮓此灣無所不容有大能食者常自譬腹如三原灣無所不容水經注曰渭水東南與神澗水合開山圖所謂靈泉池也俗名之爲萬石灣泉􅀷不測實爲靈異先後慢遊者多罹其斃鄱陽記曰清灣}
  - {type: variant, offset: 129, length: 1, content: 塘, WYG: 魚勿殺及下網果得大魚乃殺之腹中得尺素祭而食之羣魚並飛遂不復得因名此處為飛魚口鄴城故事曰西門豹為令造十二渠決障水以溉民田因是户口豐饒今渠一名安澤陂是南康圖經曰前漢兒寛遷内黄令吏民大信表開六輔渠以大溉灌獲利因名曰兒公渠甽說文曰甽水流也周禮曰倍洫曰甽􅄞康養生論曰或益之以甽澮澮說文曰澮水流澮澮也廣二尋深二仞書曰予決九川距四海濬畎澮距川爾雅曰谷注溝曰澮釋文曰澮會也小溝之所會也汎續述征記曰齊人謂湖為汎汎中有九十九臺皆生葦蒲焉風俗通曰汎莽也言其平望汎莽無崖際也灣酈善長注水經曰沇水又東厯臨縣西為明月池白璧灣灣狀半月清潭鏡澈上則風籟空傳下則泉響不斷行者莫不擁檝嬉游徘徊愛翫江夏記曰敗舶灣在縣西北七里按吳志云孫權與羣臣泛觴於大船江中西上逢惡風權遣舵工張頡取􅚒洲谷利抜劒擬舵工急取樊口未及至口灣中船破因名敗舶灣權至岸謂谷利曰何怯於水也谷利曰大王萬乘之主欲涉不測之淵一旦傾危社稷何寄因登陸路而歸潯陽記曰蠡湖西灣夏秋水渺漲商徒縈紆牽舟循繞人力疲勞號為西疲灣亦云西灣又有白漕灣亦在湖西汎漲驚波似雪洶湧漕灣因是名焉又有落星灣灣内有落星石週圍百步許又有神林下有廟祈福而獲前進由是名焉又有女兒廟禱祈亦有靈應即不許所值亦無害永嘉郡記曰樂城縣三原亭去郡百二十里溪水清如鏡曩昔有得一死鮎者鬐大五六圍一鬐輒得數十斛鮓此灣無所不容有人能食者常自譬腹如三原灣無所不容水經注曰渭水東南與神澗水合開山圖所謂靈泉池也俗名之為萬石灣泉深不測實稱靈異先後漫遊者多罹其害鄱陽記曰清灣}
