  - {type: variant, offset: 82, length: 1, content: 既, SBCK: 堅以􅀜中水旱不時議依鄭白故事發王侯以下及豪強冨民僮􅀠三萬人開涇水上源鑿山起堤通渠引瀆以漑田民頼其利伏滔北征記曰姑熟西北有甘寜墓孫皓時占者云墓有王氣皓鑿其後十許里曰直瀆越絶書曰銅沽瀆長一百五十歩去縣二十里渠史記河渠書曰禹以爲河所從來者髙難以行平地數敗乃釃二渠漢書音義曰釃分也以引其河載之髙地過降水至于大陸播爲九河也鄭國間􅀃􅁗令鑿涇自中山南西交瓠口爲渠漑斥鹵之地四萬餘頃收皆􅅿一鐘於是􅀜中爲沃野無凶年􅁗以爲冨強卒併諸侯因命曰鄭國渠漢書曰禹作二渠以引河武帝時穿渠水岸􅀂崩乃鑿井􅀷四十丈井下相通井渠自此始得龍骨名龍首渠起谷口入櫟陽注渭中因名渠民得其饒歌曰田於何所池陽谷口鄭國在前白公起後舉鍤爲雲决渠爲􅀨又曰張掖郡有千金渠范曄後漢書曰樊宻所起廬舎皆有􅀷堂髙閣陂渠灌注又池魚牧畜有求必給魏志曰遼西單于蹋頓尤強公將征之鑿渠自滹沲入􅂀水名平虜渠又從泃河口鑿入潞河名泉州渠以通海又曰建安十八年九月鑿渠引漳水入白溝以通河又曰賈逵爲䂊州刺史通運渠二百餘里所謂賈侯渠北史曰郭衍爲開漕渠大監部率水工鑿渠引渭水經大與城北東至于潼􅀜漕運四百餘里􅀜中頼之名曰冨人渠隋書薛胄爲兖州刺史先是兖州城東沂泗二水合而南流汎濫大澤中胄遂積石堰之使决令西注陂澤盡爲良田又通轉運利盡淮海百姓頼之號爲薛公豐兖渠唐書曰温造爲㓪州刺史在任開後郷渠九十七里漑田二千頃郡人獲利乃名爲右史造自起居舎人出郡水經注曰漢司空漁陽王梁之爲河南也將引􅂖水以漑京師渠成而水不流故以坐免後張純堰洛以通漕洛中公􅀻懷贍是以渠今引􅂖水盖純之創也又曰漢明帝之世司徒伏恭薦王景善能治水顯宗詔與謁者王吴始作浚儀渠吴用景法水乃不害此即景作所脩故瀆也渠流東注浚儀故復謂之浚儀渠也明帝十五年東廵狩至無塩帝嘉景功拜河隄謁者又曰魏武帝又堰漳水廽流東注世號天井堰二十里中作十二墱墱相去三百歩令互相灌注一原分爲十二流皆懸水門自城西東入逕銅爵臺下伏流入城東流謂之長明渠戴延之西流記曰洛陽城外四面有陽渠水周公所制池建春門外二橋最大一從一横續述征記曰案河渠書溝洫志引河爲洪溝一􅀃􅁗至魏鑿渠引河灌大梁名曰洪溝焉崔寔政論曰戰國海内十二分魏州有史起引漳水灌鄴民以興歌蜀郡李氷鑿離堆通二江益部至今頼之秦開鄭國漢作白渠而􅀜中號爲陸海郡國志􅌡州平舒縣古五渠水魏延興􅀄文安縣人孫願等捕魚此水先􅀕忽有群魚從西而來有一人謂願曰􅀂得大魚勿}
