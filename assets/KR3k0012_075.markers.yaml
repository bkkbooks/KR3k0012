  - {type: variant, offset: 4, length: 27, content: 九塘錄異傳曰文翁者廬江人為兒童時乃有神異及長當起歷下陂, SBCK: 里從岱石湖入四里至溝中心與陵分界案後漢書張綱爲廣陵太守濟惠於百姓勸課農桑於東陵村東開此溝引湖水灌田}
