  - {type: variant, offset: 969, length: 266, content: 滸岸爾雅曰重涯曰岸詩曰高岸為谷又曰淇則有岸晉書曰殷仲堪於江濱見流棺而葬焉旬日之間門溝忽起為岸其夕有人自稱感君之恩堪因問岸何祥也荅曰水中有岸曰洲君將牧州言終而沒至是果得荊州也水經注曰船官浦東即黃鵠山林澗甚美譙郡戴仲若野服居之山下謂之黃鵠岸又曰昆明池有金堤石岸益州有金堤左思曰西踰金堤東曰玉津孫卿子曰泉生珠而岸不枯泥說文曰泥黑土在水中者也易曰井泥不食舊井無禽在井之下故稱泥井而泥則不可食書曰淮海惟楊州厥土惟塗泥詩含舍神霧曰夫齊之地處孟春之位海岱之間土地汙泥流之所歸利之所聚傳曰晉楚將戰呂錡夢射之中之退入於泥論語曰子夏云雖小道必有可觀者焉, SBCK: 極}
