  - {type: variant, offset: 74, length: 5, content: 名陌城夫羗, SBCK: 曰植髙楊於其上故謂之楊溝古詩曰今日斗酒別明日溝水頭蹀􅞃御溝上溝水東西流瀆禮記月令曰季春之月道逹溝瀆開通道路爾雅曰溝注澮曰瀆水流不絶曰瀆漢舊儀曰􅀕四瀆用牲崔鴻十六國春秋前􅁗録曰建元}
