  - {type: variant, offset: 89, length: 0, content: '', SBCK: 腹中盡得其􅀕食群魚並飛遂不復得因名此處爲飛魚口鄴城故事曰西門豹爲令造十二渠决漳水以漑民田因是户口豐饒今渠一名安澤陂是也内黃圗經曰前漢倪寛遷内黃令吏民大信表開六輔渠以大漑灌民極獲利因曰倪公渠甽􅀃文曰甽水流也周禮曰倍洫曰甽稽康養生論曰或益之以甽澮澮􅀃文曰澮水流澮澮也廣二㝷􅀷二仞書曰予决九川岠四海濬畎澮爾雅曰谷注溝曰澮釋名曰澮㑹也小溝之所㑹也汎續述征記曰齊人謂湖爲汎汎中有九十九臺皆生結蒲因此蒲生自結風俗通曰汎莾也言其平望汎莽無崖際也灣酈善長注水經曰沅水又東歷臨沅縣西爲明月池白壁灣灣狀半月清潭鏡澈上則風􅄜空傳下則泉響不斷行者莫不擁檝嬉游徘徊愛翫江夏記曰敗舶灣在縣西北七里案吴志云孫權}
