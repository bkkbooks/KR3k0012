  - {type: variant, offset: 749, length: 138, content: 漢安帝永初七年今謁者太山于岑於石門東積石八所皆如小山以捍衝波謂之八激堤島釋名曰海中可居曰島到也人所奔到漢書曰田橫懼誅入居海島中孟康海中山曰島魏志曰王傾討句驪入沃沮人云嘗乘船捕魚風吹十日東得一島上有人常以七月取童女沉海齊地記曰嶗山東北五里入海有管彥島是黃巾賊帥管承後也又曰東牟城, SBCK: 桐廬縣}
