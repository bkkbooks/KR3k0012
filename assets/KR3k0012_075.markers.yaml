  body:
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 四十溝瀆渠甽澮汎灣浦溝釋名曰田間之水曰溝溝者構也從横相交構也爾雅曰谿注谷曰溝周禮曰匠人爲溝洫九夫爲井間廣四尺􅀷四尺謂之溝方十里爲城城間廣八尺􅀷八尺謂之洫風俗通又載也傳曰梁伯好土功乃溝公宫又曰魯將與齊戰師不踰溝樊遲曰請三刻而踰之衆從之如樊遲約乃踰溝又哀元年吴城邘溝通江淮杜預曰於邘江築城穿溝東北通謝陽湖西北至末口入淮通糧道也今廣陵邘江是國語曰吴王夫差旣殺申胥不稔於歳稔熟􅁛歳也乃起師北征開爲􅀷溝通於商魯之間開掘地商宋也北属之沂西属之濟以㑹晉定公于黃池論語曰禹盡力於溝洫史記曰漢王四年王軍廣武􅀜中兵益出當此時彭越將兵居梁地徃來弱楚兵絶其糧道齊王信又進擊楚項羽恐乃與漢王約中分天下割鴻溝而西者爲漢鴻溝而東者爲楚項羽歸漢王父母妻子軍皆呼萬歳羽􅄙而東漢王欲引而西用張良陳平計乃進兵追項羽􅀶物志曰徐偃王治其國仁義著聞欲周行上國乃通溝陳蔡之間得朱弓朱矢又曰酒泉延壽縣南有山石水出處如莒地爲溝酈善長水經注曰髙唐縣有甘􅀥溝水側多􅀥故俗取名溝焉殷氏世傳曰殷襃爲榮陽令先多􅁋􅀨百姓饑饉君乃穿渠入河四十餘里䟽導原隰用致豐年民頼其利號曰殷溝而頌之莊子曰㝷常之溝洫巨魚無所還其體而鯢鰌爲之制孟子曰思天下之民匹夫匹婦有不􅀍堯舜之澤􅀂巳推内之溝中楊子圗經曰六合縣東}
