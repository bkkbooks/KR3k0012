  - {type: variant, offset: 185, length: 0, content: '', SBCK: 讀􅈋爲茅或曰􅈋水草杜子春讀􅈋爲夘􅀇謂菁蔓菁也􅈋鳬葵也饋食之豆其實葵菹加豆之實芹菹深蒲菭菹筍菹芹楚葵也鄭司農云深蒲弱入水深故曰􅀷蒲或曰深蒲桒耳菭水中魚衣也􅀇謂􅀷蒲蒲始生水中子也菭箭葫荀竹萌王舉則共七􅉁韭菁􅈋葵芹菭筍菹凢醯醢所和細切爲韲今物􅀂䐑爲菹韲菹之稱菜􅁏通稱矣記曰麋鹿爲菹野豕爲軒皆而不切􅍪爲辟雞菟爲宛脾皆而切之切葱􅀂薤實之醯以柔之此軒辟雞宛脾皆菹􅀋也其作之狀以醯與薫菜淹之殺􅁏及醒氣也又曰水草之菹陸産之醯小物備矣三牲之爼八簋之實美物備矣昆蟲之異草木之實隂陽之物備矣水草之菹芹􅈋属陸産之醯蚳蝝之属天子之􅀕八簋昆蟲謂温生寒死之蟲也内則可食之物有蜩}
