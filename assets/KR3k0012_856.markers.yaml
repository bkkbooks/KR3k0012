  - {type: variant, offset: 59, length: 1, content: 南, WYG: 姑臧長時居縣者不盈數月輙致豐積奮在職四年財産無所増事母孝謹雖自儉約而奉養極求珎膳躬率妻子同甘菜茹沈約宋書曰文帝為王𤣥謨作四時茹古詩云堇茹供春膳粟飱充夏飡傅𤣥詩曰厨人進藿茹有酒不盈杯枚乗七發曰白露之茹菹周禮曰朝事之豆其寔韭菹昌本菁菹茒菹饋食之豆其寔葵菹加豆之實芹菹深蒲菭菹筍菹王舉則共七菹記曰麋鹿為菹野豕為軒皆聶而不切麕為辟雞􅊵為宛脾皆聶而切之切葱若薤實之醯以柔之又曰水草之菹陸産之醯小物備矣三牲之爼八簋之實美物備矣昆蟲之異草木之實隂}
