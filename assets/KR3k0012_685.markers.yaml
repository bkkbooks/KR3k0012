  - {type: variant, offset: 42, length: 115, content: 上古穴居野處衣毛而冐皮未有制度後世聖人易之以絲麻觀翬翟之文榮華之色乃染帛以効之始作五綵成為五緌又曰術氏冠有五彩衣青玄裳前員其制差池四重趙氏靈王好服之今不施用也白虎通曰人所以有冠者𢃩也所以𢃩持髮也人懷五德莫不貴德示成禮有脩飾文章故制, SBCK: 委貌}
