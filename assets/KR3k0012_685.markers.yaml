  - {type: variant, offset: 2232, length: 1, content: 成, SBCK: 侍御史朱放請復置朱衣豸冠於内廓有犯者御史服以彈後御史張著服之以彈京兆尹嚴郢武弁三禮圖曰武弁大冠也士服之或曰千歲涸澤之神名慶忌冠大冠乗小車馬好疾馳齊人服之董巴漢輿服志曰武冠一曰武弁大冠武官冠之侍中常侍加黄金璫附蟬爲飾謂之趙惠文冠蔡邕獨斷曰武冠或曰繁冠今謂之大冠魏志曰陳思}
