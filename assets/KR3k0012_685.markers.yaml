  - {type: variant, offset: 1159, length: 189, content: 帳中黯前奏事上不冠望見黯避帳中敬禮如此漢書曰高祖為亭長以竹皮為冠及貴所謂劉氏冠也後令爵非公乘以上母得冠劉氏冠也應劭注曰竹皮今之鵲尾冠是也又曰沛公略地陳留麾下騎士酈食其里中子也食其見之曰沛公吾所欲從騎士曰沛公不喜儒諸客冠來者沛公輒解其冠溺其中未可以儒生說也又曰杜欽字子夏家富而目偏盲茂陵杜業亦字子夏時人號欽為盲杜子夏以相別欽惡以疾詆迺為小冠廣裁一寸由是京師更謂欽為小冠杜子夏而業為, SBCK: 弁}
