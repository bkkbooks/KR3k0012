  - {type: variant, offset: 11, length: 1, content: 絭, SBCK: 髙九寸黒介幘金博山徐爰釋問曰通天冠金博山蟬謂之金顔進賢冠三禮圖曰進賢冠前髙七寸長八寸後髙三寸一梁下大夫一命所服兩梁再命大夫二千石所服三梁三命上大夫公侯之服董巴漢輿服志曰進賢冠古緇布冠文儒者之服}
