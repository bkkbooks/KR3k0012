  - {type: variant, offset: 472, length: 520, content: 象季秋草木黃落又玉藻曰始冠緇布冠自諸侯下達冠而敝之可也本大古耳非時王之法服也玄冠朱組纓天子之冠也緇布冠繢緌諸侯之冠也皆始冠之冠也玄冠委皃委諸侯緇布冠有緌尊者飾也繢或作繒緌或作蕤玄冠丹組纓諸侯之齋冠也玄冠綦組纓士之齋冠也言齋時所服也四命已上齋祭異冠也縞冠玄武子姓之冠也謂父有喪服子為之不純吉也武冠卷也古者冠卷也縞冠素紕既祥之冠也紕緣邊也紕讀如埤益之埤既祥之冠也已祥祭而服之也垂緌五寸惰游之士也惰游罷民也亦縞冠素紕凶服之象也垂長緌明非既祥玄冠縞武不齒之服也所放下帥教者居冠屬武謂燕居冠也著冠於武少威儀自天子下達有事然後緌燕無事者去飾又曰玄冠紫緌自魯桓公始也蓋僣宋王者之後服也緌當用繢又冠義曰冠者禮之始也古者冠禮筮曰筮賓所以敬冠事敬冠事所以重禮重禮所以為國本也傳曰狄人滅衛齊桓公封衛于楚丘衛國忘亡忘其滅亡之困衛文公大布之衣大帛之冠用諸侯諒闇之服又曰鄭子華之弟子臧奔宋好聚鷸冠鶔鳥名聚鶔羽為冠言非法之服鄭伯聞而惡之使盜誘之八月盜殺之陳宋之間君子曰服之不衷身之災也又曰衛獻公戒孫文子甯惠子食皆服而朝日旰不召而射鴻於囿二子從之不釋皮冠而與之言又曰齊侯田于沛招虞人以弓不進使人執而問之辭曰昔我先君之田也旌以招大夫弓以招士皮冠以招虞人臣不見皮冠故不敢進乃舍, SBCK: ''}
