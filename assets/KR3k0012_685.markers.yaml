  - {type: variant, offset: 2544, length: 689, content: 韜曰冠雖弊禮加之於首履雖新法踐之於地莊子曰宋鈃尹文為華山之冠以自表又曰盜跖責孔子曰爾詐言造語妄稱文武冠拔木之冠帶死牛之脅搖唇鼓舌擅生是非以迷天下之主尉繚子曰天子玄冠玄纓諸侯素冠素纓大夫已下練冠練纓墨子曰昔齊桓公高冠博帶以治其國楚莊王鮮冠組纓絳衣博抱以治其國孟子曰陳相道許子之行言於孟子孟子曰許子必種粟而後食乎曰然許子冠乎曰冠曰奚冠曰冠素曰自織之與曰以粟易之曰許子奚為不自織曰害於耕韓子曰齊桓公飲酒遺其冠恥之三日不朝管仲曰此有國者之恥公胡不雪之以政公曰善因發囷倉賜貧窮論囹圄出薄罪處三日而民謌之曰公胡不復遺其冠乎晏子春秋曰景公為巨冠長衣以聽朝淮南子曰莊王誅史里孫叔敖制冠澣衣史里佞臣也惡人死自知當見用故作冠澣衣又曰楚莊王好觟胡瓦切冠楚國効之也許慎注曰今力士冠又曰冠之於人也寒不能煖風弗能鄣暴不能敵然而戴冠履屨者其所自託者然又曰魯人身善制冠妾善織履往徙於越而大困以有用遊於不用之鄉也瑣語曰范獻子卜獵命人占之得其繇也曰君子得黿小人遺冠范獻子獵而無得遺其豹冠語林曰丞相拜司空諸葛道明在坐王指冠冕曰君當復著此乎古今注曰曾參鋤瓜三足烏來萃其冠漢武內傳曰上元夫人戴九星靈芝夜光之冠西王母戴太真晨嬰之冠神仙服食經曰漢武帝閑居未央殿有人乘白雲車駕白鹿冠芙蓉冠曰我中山衛叔卿也楚辭曰余幼好此奇服年既老而不衰帶長鋏之陸離冠青雲之崔嵬又曰高余冠之岌岌長余珮之陸離又曰握申椒與杜若冠浮雲之峨峨摯虞遊思賦曰戴朗月之高冠綴大珠之明璫傅玄冠銘曰居高無忘危在上無忘敬懼則安敬則正曹植與陳琳書曰夫披翟雲以為衣戴北斗以為冠帶虹蜺以為紳連日月以為珮此服非不美也然而帝王不服者望殊於天志絕於心矣張衡七辯曰微霧之冠飛翮之纓, SBCK: 百八十五}
