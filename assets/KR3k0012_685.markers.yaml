  - {type: variant, offset: 14, length: 0, content: '', SBCK: 服徐廣輿服雜注曰天子雜服逺逰冠太子及諸王逺遊冠制似通天也天子五梁太子三梁董巴漢輿服志曰逺遊冠制如通天有展䇶横之于前無山張鏡宋東宮儀記曰皇太子逺遊冠翠緌魏文帝與于禁詔曰昔漢髙脫衣}
  - {type: variant, offset: 14, length: 0, content: '', WYG: 服徐廣輿服雜注曰天子雜服遠遊冠太子及諸王遠遊冠制似通天冠天子五梁太子三梁董巴漢輿服制曰遠遊冠制如通天有展筩横之于前無山述諸王所服也魏文帝與于禁詔曰昔漢髙脱衣}
