  - {type: variant, offset: 14, length: 0, content: '', krp: 服徐廣輿服雜注曰天子雜服逺逰冠太子及諸王逺遊冠制似通天也天子五梁太子三梁董巴漢輿服志曰逺遊冠制如通天有展䇶横之于前無山張鏡宋東宮儀記曰皇太子逺遊冠翠緌魏文帝與于禁詔曰昔漢髙脫衣}
  - {type: variant, offset: 15, length: 8, content: 絭髮弁冕之總名也, SBCK: 衣韓信光武解綬以帶李忠誠皆人主當時貴敬功勞今以逺遊冠與將軍梁書曰天􅁥十四年正月朔旦帝臨軒冠太子于太極殿舊制太子着逺遊冠金蟬翠緌纓至是詔加金博山淮􅀯子曰楚莊王通梁組纓髙誘曰通梁逺遊冠羅浮山記曰王方平着逺遊冠五色綬章甫}
  - {type: variant, offset: 15, length: 8, content: 絭髮弁冕之總名也, WYG: 衣韓信光武觧綬以帶李忠誠皆人主當時貴敬功勞今以逺遊冠與將軍宋東宫儀曰皇太子逺遊冠翠緌梁書曰天監十四年正月朔旦帝臨軒冠太子于太極殿舊制太子着遠遊冠金貂蟬翠緌纓至是詔加金博山淮南子曰楚莊王通梁組纓髙誘曰通梁遠逰冠羅浮山記曰王方平着遠遊五色綬章甫}
