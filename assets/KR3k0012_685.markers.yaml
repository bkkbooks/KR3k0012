  - {type: variant, offset: 1364, length: 732, content: 大冠帶長劍躬按行士卒之室又曰江充召見衣紗縠禪衣冠蟬纚步搖冠上見之曰燕趙固多奇士又曰王陽與貢禹為友陽為益州剌史禹聞之彈其冠以待陽薦陽薦禹於成帝召為大夫東觀漢記曰莽居攝子宇諫莽而莽殺之逢萌謂其友人曰三綱絕矣不去禍將及人即解冠掛東門而去又曰段頴滅羗詔賜頴赤幘大冠一具又曰馬援與公孫述有舊援入蜀述見之甚喜冠之交內之冠立舊友之位後漢書曰劉虞為公孫瓚所誅初虞以儉素為操冠獘不改乃就補其穿及遇害瓚兵搜其內而妻妾服羅紈盛綺飾時人以此疑之續漢書曰梁冀改輿服別制卑幘狹冠晉書曰劉暾字長升轉侍御史武庫火尚書郭彰率百人自衛而不救火暾正色詰之彰怒曰我能截君角也暾勃然謂彰曰君何敢恃寵作威作福天子法冠而欲截角乎求紙筆奏之彰伏不敢言眾人解釋乃止崔鴻十六國春秋前燕錄曰慕容廆曾祖父慕容跋見燕代少年多冠步搖冠好之乃歛髮襲冠諸部因呼之為步搖其後音訛而為慕容遂以慕容為氏又曰慕容儁下書曰周禮冠冕體制君臣略同中世已來亦旡常體今特制燕平上冠悉賜廷尉已下使瞻冠思事刑斷詳平諸公冠悉顏裹屈竹錦纏作公字以代梁處施之金瑱令僕尚書置瑱而已祕監令別施珠瑱庶能敬慎威儀示民軌則齊書曰武帝幸劉悛第帝著鹿皮冠劉悛設兔毛衾於牖中宴樂以冠賜悛至夜乃去梁書曰陳伯之濟陰睢陵人也年十三四好著獺皮冠又曰張欣泰為直閣步兵校尉領羽林監欣泰通涉雅好交結多是名素正直輒著鹿皮冠挾素琴有以啟武帝曰將家兒何敢作此舉止又曰婆利國以瓔絡繞身頭著金長冠高尺餘形如弁綴以七寶之飾後魏書曰崔休兼給事黃門侍郎參定禮儀帝常閱故府得舊冠題曰南部尚書崔逞制顧謂休曰此卿家舊事也唐書曰貞觀中太宗初服翼善冠賜貴臣進德冠因謂侍臣曰幞頭起自周武帝蓋以便於軍容今四海無虞息武事此冠頗採古樣兼類幞頭乃宜常服可與袴褶通用又曰肅宗時司天韓頴奏五官正其官配五方臣請冠上加一星衣從方色, SBCK: ''}
