  - {type: variant, offset: 34, length: 0, content: '', SBCK: 文身無所用之孔藂子曰先君相魯三月政化旣行頌曰褒衣章甫實獲我所章甫襃衣惠我無私列仙傳曰稷丘君㤗山下道士漢武帝東廵君乃冠章甫擁琴而見之牟追釋名曰牟追牟冐也言其刑冐髪追追然也周禮春官曰追帥掌王后之首服爲副編次追衡笄鄭司農云追冠名也禮曰牟追夏后氏之道也副者婦人之首服衡維持冠者儀禮士冠禮曰母追夏后氏之道也白虎通曰夏正十三月其飾最大故爲無追無追者言其追大也制冠法天天色玄不失其質夏之冠色純玄収釋名曰収夏后氏冠名也言収歛髮也白虎通曰夏収而􅀕謂之収者十三月陽氣収本舉生萬物而逹出之故謂之収禮王制曰夏后氏収而􅀕燕衣而養老又郊特牲曰周弁殷􅒐夏収五經通義曰王冠夏曰収以入宗廟長尺六寸廣八寸前起史記曰堯黄衣純冠􅒐詩曰殷士膚敏祼將于京厥作祼將常服黼􅒐黼白與黑也􅒐殷冠也白虎通曰殷􅒐而􅀕謂之􅒐者十二月施氣受化􅒐張而後得牙禮王制曰殷人􅒐而􅀕縞衣而養老委貌冠釋名曰委貌其形委曲之貌上小下大儀禮士冠禮曰委貌周道鄭玄曰委猶安也言以安正容貌也三禮圖曰玄冠一曰委貌今之進賢則其遺象也夏曰母追殷曰章甫周曰委貌後丗轉以巧意改易其名耳國語曰周襄王賜晉文公命晉侯端委而入孔朝曰玄端之衣委貌之冠也白虎通曰委貌者何周朝廷理正事行道徳之冠名所謂委貌者周統十一月爲正萬物始萌冠飾最小故爲委貌言委曲有貌}
