  - {type: variant, offset: 29, length: 0, content: '', SBCK: 殷以之表章大夫也白虎通曰殷統十二月爲正其飾微大故爲章甫儀禮士冠禮曰章甫殷道也鄭玄曰章明也殷質言以表明大夫也甫或爲斧}
  - {type: variant, offset: 29, length: 0, content: '', WYG: 殷以之表章丈夫也白虎通曰殷統十二月為正其飾微大故為章甫儀禮士冠禮曰章甫殷道也鄭𤣥曰章明也殷質言以表明大夫也甫或為斧}
  - {type: variant, offset: 29, length: 0, content: '', krp: 殷以之表章大夫也白虎通曰殷統十二月爲正其飾微大故爲章甫儀禮士冠禮曰章甫殷道也鄭玄曰章明也殷質言以表明大夫也甫或爲斧}
  - {type: variant, offset: 31, length: 2, content: 貫韜, SBCK: 服行道也禮記儒行曰孔子曰丘長居宋冠章甫之冠論語先進曰赤爾何如對曰宗廟之事如㑹同端章甫願爲小相焉莊子曰宋人有資章甫而適於越越人斷}
  - {type: variant, offset: 31, length: 3, content: 貫韜髮, WYG: 服行道也禮記儒行曰孔子曰丘長居宋冠章甫之冠論語先進曰赤爾何如對曰宗廟之事如㑹同端章甫願為小相焉莊子曰宋人有資章甫而適於越越人斷髪文身無所用之孔藂子曰先君相魯三月政化既行頌曰衮衣章甫實獲我所章甫衮衣惠我無私列仙傳曰稷丘君泰山下道士漢武帝東巡君乃冠章甫擁琴而見之牟追釋名曰牟追牟冒也言其形冒髪追追然也周禮春官曰追師掌王后之首服為次追衡笄鄭司農云追冠名也禮曰牟追夏后氏之道也副者婦人之首服衡維持冠者儀禮士冠禮曰毋追夏后氏之道也白虎通曰夏正十三月其飾最大故為無追無追者言其追大也制冠法天天色𤣥不失其質夏之冠色純𤣥收釋名曰收夏后氏冠名也言收斂髪也白虎通曰夏收而祭謂之收者十二月陽氣收本舉生萬物而達出之故謂之收禮王制曰夏后氏收而祭燕衣而養老又郊特牲曰周弁殷冔夏收五經通義曰王冠夏曰收以入宗廟長尺六寸廣八寸前起史記曰堯黄衣純収冔詩曰殷士膚敏祼將于京厥作祼將常服黼冔黼白與黑雜也冔殷冠也白虎通曰殷冔而祭謂之冔者十二月施氣受化冔張而後得牙禮王制曰殷人冔而祭縞衣而養老委貌釋名曰委貌冠形有儀禮士冠禮曰委貌周道鄭𤣥曰委猶安也言已安正容貌也三禮圖曰𤣥冠一曰委貌今之進賢則其遺象也夏曰毋追殷曰章甫周曰委貌後世轉以巧意改易其名耳國語曰周襄王賜晉文公命晉侯端委而入孔朝曰𤣥端之衣委貌之冠也白虎通曰委貌者何用朝廷禮正事行道徳之冠名所謂委貌者周綂十一月為正萬物始萌冠飾最小故為委貌言委曲有貌}
