  - {type: variant, offset: 13, length: 0, content: '', SBCK: 前髙七寸後三寸長八寸公侯三梁中二千石巳下至愽士兩梁千石巳下至小史私學弟子皆一梁宗室劉氏亦兩梁蔡邕獨斷曰進賢冠文官服之漢制尚書兩梁禮無文徐廣輿服志􅄂注曰天子雜服介幘五梁進賢冠太子諸王三梁進賢冠北齊書曰文襄嗣業以前司徒侯景進賢冠賜李繪曰卿但直心事􅀌當用卿爲三公勿學侯景叛也逺遊冠三禮圖曰逺遊冠諸王}
  - {type: page-break, offset: 13, content: '', id: KR3k0012_SBCK_685-2a}
