  - {type: variant, offset: 2894, length: 289, content: 冠履屨者其所自託者然又曰魯人身善制冠妾善織履往徙於越而大困以有用遊於不用之鄉也瑣語曰范獻子卜獵命人占之得其繇也曰君子得黿小人遺冠范獻子獵而無得遺其豹冠語林曰丞相拜司空諸葛道明在坐王指冠冕曰君當復著此乎古今注曰曾參鋤瓜三足烏來萃其冠漢武內傳曰上元夫人戴九星靈芝夜光之冠西王母戴太真晨嬰之冠神仙服食經曰漢武帝閑居未央殿有人乘白雲車駕白鹿冠芙蓉冠曰我中山衛叔卿也楚辭曰余幼好此奇服年既老而不衰帶長鋏之陸離冠青雲之崔嵬又曰高余冠之岌岌長余珮之陸離又曰握申椒與杜若冠浮雲之峨峨摯虞遊思賦曰戴朗月之高冠綴大珠之明璫傅玄冠銘曰居高無忘危在上無忘敬懼則安敬則正曹植與陳琳書曰夫披翟雲以為衣戴北斗, WYG: ''}
