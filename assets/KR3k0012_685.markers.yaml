  - {type: variant, offset: 2464, length: 3, content: 大王制, SBCK: 樊噲}
  - {type: variant, offset: 2464, length: 394, content: 大王制冠不使親近而必求良工者非為其敗縱而冠不成與今治國不善則社稷不安宗廟不血食大王不求良士而任使其私愛此非輕國於二尺縱之制耶王無以應又曰宋康王為無頭之冠以示勇六韜曰冠雖弊禮加之於首履雖新法踐之於地莊子曰宋鈃尹文為華山之冠以自表又曰盜跖責孔子曰爾詐言造語妄稱文武冠拔木之冠帶死牛之脅搖唇鼓舌擅生是非以迷天下之主尉繚子曰天子玄冠玄纓諸侯素冠素纓大夫已下練冠練纓墨子曰昔齊桓公高冠博帶以治其國楚莊王鮮冠組纓絳衣博抱以治其國孟子曰陳相道許子之行言於孟子孟子曰許子必種粟而後食乎曰然許子冠乎曰冠曰奚冠曰冠素曰自織之與曰以粟易之曰許子奚為不自織曰害於耕韓子曰齊桓公飲酒遺其冠恥之三日不朝管仲曰此有國者之恥公胡不雪之以政公曰善因發囷倉賜貧窮論囹圄出薄罪處三日而民謌之曰公胡不復遺其冠乎晏子春秋曰景公為巨冠長衣以聽朝淮南子曰莊王誅史里孫叔敖制冠澣衣史里佞臣也惡人死自知當見用故作冠澣衣又曰楚莊王好觟胡瓦切, WYG: 樊噲}
  - {type: variant, offset: 2464, length: 3, content: 大王制, krp: 樊噲}
