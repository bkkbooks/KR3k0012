  - {type: variant, offset: 5767, length: 5, content: 昆吾斬刈黎, SBCK: 伊尹請且乏貢職以觀夏動桀怒起九夷之師伊尹曰未可彼尚能起九夷之師是罪在我也湯乃謝服入貢職明年又乏貢職桀起九夷之師九夷之師不起伊尹曰可矣湯乃興師越絶書曰湯行仁義敬􅀑神天下皆一心歸之孟子曰湯居亳與􅁑伯爲隣葛伯不祀湯使人問曰何爲不祀曰無以供犠牲湯遺之牛羊􅁑伯得而食之又不祀湯又問之曰無以供粢盛湯使亳民爲之耕老弱饋食􅁑伯率衆要其酒肉􅁰稻者遮而奪之不授則殺之有童子以􅁰肉餉殺而奪之書曰􅁑伯仇餉此之謂也爲其殺是童子湯乃興師伐􅁑四海之内皆曰非冨天下也爲疋夫疋婦復讎言湯不今見天下冨爲一夫報仇也又曰湯始征自􅁑始十一征而無敵於天下東征而西夷怨南征而北夷怨曰奚爲後我民望之􅀂大旱之望􅀨也歸市者不止耕者不變誅其君吊其}
