  - {type: variant, offset: 3351, length: 1105, content: 建一名余德教施于四海貴爵而上齒養國老於東序養庶老於西序在位九年年八十餘而崩矣越絕書曰禹崩啟立曉知王事達君臣義呂氏春秋曰夏后伯即啟也與有扈戰於甘澤而不勝六卿請復之夏后伯曰不可吾地不淺吾民不寡我而不勝是吾德薄而教不善也於是乎處不重席食不貳味琴瑟不張鍾鼓不脩子女不飾親親長長尊賢使能朞年而有扈氏服故欲勝人者必先自勝矣帝太康書曰太康尸位以逸豫滅厥德黎民咸貳乃盤遊無度畋于有洛之表十旬不反有窮后羿距于河厥弟五人御其母以從徯于洛之汭五子咸怨述大禹之戒以作歌其一曰皇祖有訓民可近弗可下皇君也君祖禹有訓戒也近謂親之下謂失之者也民惟拜本本固邦寧言人君當國民以安國也予視天下愚夫愚婦一能勝予言能敬畏小民所以得眾心一人三失怨豈在明不見是圖三失過非一也不見是謀備其微予臨兆民懔乎若朽索之馭六馬十萬曰億十億曰兆言多也懔色貌朽腐也朽腐之索御六馬言危懼甚為人上者奈何不敬能訓則不驕在上下則高而不危其二曰訓有之內作色荒外作禽荒作為也迷亂曰荒色女色禽鳥獸甘酒嗜音峻宇彫墻甘嗜無厭足也峻高大彫飾盡有一于此未或不亡此六者棄德之君有其一必亡況兼有乎其三曰惟彼陶唐有此冀方陶唐帝堯氏都冀州統天下四方今失厥道亂其紀綱乃厎滅亡言失堯之道亂其法制自致滅亡其四曰明明我祖萬邦之君有典有則貽厥予孫典謂經籍則法貽遺也言仁及後世關石和鈞王府則有荒墜厥緒覆宗絕祀金鐵銀石供民器用通之使和平則官民足言古制有而太康失其業以取亡其五曰嗚呼曷歸予懷之悲曷何也言思而悲萬姓仇予予將疇依鬱陶乎予心顏厚有忸怩弗慎厥德雖悔可追言人君行己不慎其德以連滅敗欲改悔其可追及乎言無益也帝王世紀曰太康無道在位二十九年失政而崩帝仲康書曰惟仲康肇位四海胤侯命掌六師羲和廢厥職酒荒于厥邑胤后承王命徂征羲和廢其職官還其私邑以酒迷亂仲康命胤侯掌六師往就其邑討之帝相紀年曰帝相即位處啇丘元年征淮夷二年征風夷及黃夷帝王世紀曰帝相一名相安自太康已來夏政凌遟為羿所逼乃徙啇丘依同姓諸侯斟灌斟尋氏羿遂襲帝號是為羿帝有窮后羿帝王世紀曰羿有窮氏未聞其姓其先帝嚳以世掌射故於是加賜以弓矢封之於鉏為帝司射歷唐及虞夏至羿學射於吉甫其辭佐長故亦以善射聞與吳賀北遊使羿射雀左目羿引弓射之誤中左目羿俯首而愧終身不忘故羿善射至今稱之及有夏之衰羿自鉏遷于窮石因夏民之不附以代夏政逼篡帝位故號窮氏傳曰昔有夏之方衰也后羿自鉏遷于窮石因夏民以代夏政恃其射也不脩民事而淫于原獸棄武羅伯囚熊髡龍圉四子皆羿之賢臣而用寒浞土捉反寒浞伯明氏之讒子弟也伯明后寒棄之夷羿收之信而使之以為己相浞行媚于內而施賂于外愚弄其民而娛羿于田樹之詐匿以取其國家內外咸服羿猶不悛將歸自田家眾殺而烹之以食其子食羿子其子不忍食諸死于窮門殺之於國門靡奔有鬲氏靡夏遺臣事羿者有鬲, WYG: 商}
