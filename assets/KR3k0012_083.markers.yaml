  - {type: variant, offset: 2005, length: 177, content: 輔之司祿益食而民不飢司金益富而國家寶司命益年而民不夭四方歸之莊子曰昔者禹堙洪水親自操橐耜而滌天下之川服無跋脛無毛沐甚雨櫛疾風置萬國禹大聖也而形勞天下如此使後世之墨者多以裘褐為衣以屐屩憍為服日夜不依以自為極曰不如能此非禹道也不足謂墨孟子曰書曰洚水警余洚水者洪水也書尚書逸篇也水逆行降洞無涯故曰洚水洪大也使禹治之禹掘地而注之海驅蛇龍而放之菹水由地中行江淮河漢, SBCK: 生商}
