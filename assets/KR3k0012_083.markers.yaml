  - {type: punctuation, offset: 92, content: 『, id: KR3k0012_CHANT_083-bkkpn21}
  - {type: variant, offset: 93, length: 267, content: 能成美堯之事者使居官皆曰伯禹為司空可成美堯之功舜命禹汝平水土維是勉之禹拜稽首讓於契后稷皋陶舜曰女其往視爾事矣禹為人敏給克勤其德不違其仁可親其言可信禹遂與益后稷奉帝命命諸侯百姓興人徒以敷土行山表木定高山大川禹傷先人之功不成受誅乃勞身焦思居外十三年過家門不敢入陸行乘車水行乘船泥行乘橇孟曰橇刑如箕橋行泥上如淳曰橇音茅蕝謂以板置泥上以通行路也山行乘檋徐廣曰檋音丘遙反如淳曰檋車謂以鐵如鏙長半寸施之履下以上山不蹉跌也開九州通九道陂九澤度九山舜崩三年喪畢禹避舜之子啇均於陽城天下諸侯皆去啇均而朝禹禹於是遂即天子位南面朝天下國號曰夏后姓姒氏娶塗山, SBCK: 娀}
