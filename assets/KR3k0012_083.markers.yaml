  - {type: variant, offset: 5944, length: 1, content: 桀, WYG: 祖乙以乙日生故謂之帝乙孔子所謂五世之外天之錫命䟽可同名者也是以祖乙不為諱蓋殷禮也帝祖辛史記曰帝祖辛在位十六年崩弟沃甲立帝沃甲史記曰帝沃甲在位二十五年崩立祖辛之子祖丁紀年曰帝開甲踰即位居庇帝祖丁史記曰帝祖丁在位三十二年崩立沃甲之子是為南庚紀年曰祖丁即位居庇帝南庚史記曰帝南庚在位二十九年崩立祖丁之子陽甲紀年曰南庚自庇遷于奄帝陽甲史記曰帝陽甲之時殷衰自仲丁以來廢嫡而更立諸弟子弟子或爭相代立比九世亂諸侯莫朝帝陽甲在位七年崩弟盤庚立紀年曰陽甲即位居亳帝盤庚書曰盤庚五遷將治亳殷自湯至盤庚凡五遷都治亳殷也民咨胥怨胥相也民不欲徙乃咨嗟憂愁相與怨其上也史記曰帝盤庚之時殷已都河北盤庚渡河南復居成湯之故居乃五遷無定處殷民咨胥皆怨不欲徙遂涉河南治亳行湯之政然後百姓由寧殷道復興諸侯來朝以其遵成湯之德也在位二十八年崩弟小辛立紀年曰盤庚旬自亳遷于北蒙曰殷帝王世紀曰帝盤庚徙都殷始改商曰殷又曰亳殷今偃師是也然則殷有三亳二亳在梁國一亳在河南榖熟為南亳即今都也蒙為北亳即景亳湯所盟地偃師為西亳即盤庚所徙者帝小辛史記曰帝小辛立殷道復衰百姓思盤庚乃作盤庚三篇小辛在位二十一年崩弟小乙立紀年曰小辛頌位居殷帝小乙史記曰帝小乙在位二十八年崩子武丁立紀年曰小乙斂居殷帝武丁書叙傳曰髙宗夢得說盤庚弟小乙子也名武丁夢得賢相其名說使百工營求諸野得諸傅巖書大傳曰桑榖俱生于朝一日而大拱兩手檢之曰拱武丁召其相而問焉其相曰吾雖知之吾不能言也問諸祖己曰桑榖理草也此木也而云草未聞劉氏以為屬草妖野草生于朝亡乎武丁側身修行思昔先王之政興滅國繼絶世舉逸民明養老之禮諸侯重譯來朝者六國九州之外曰國武丁祭成湯有飛雉升鼎耳而雊問祖己祖己曰野鳥不當升鼎欲為用也則逺方有來朝乎三年編髮重譯來朝者六國孔子曰吾於髙宗肜日見德有報之疾肜日尚書篇名史記曰帝武丁即位思復興殷而未得其佐三年不言政事事决定於冢宰以觀國風武丁夜夢得聖人名曰說以夢所見視羣臣百姓皆非也於是使百工營求之野得說於傅巖中是時說為胥靡築於傅巖見於武丁武丁曰是也得而與之語果聖人舉以為相殷國大治武丁祭成湯明日有飛雉登鼎耳而雊武丁懼祖己曰王勿憂先修政事祖己乃訓王武丁崩祖己嘉其德立其廟為髙宗帝王世紀曰武丁即位諒闇居凶廬百官總已聽於冢宰三年不言既免哀猶不言羣臣諫武丁於是思建良輔夢天賜賢人姓傅名說乃使百工冩其像求諸天下見築者胥靡衣褐帶索役于虞虢之間傅巖之野名說登以為相享國五十九年年百嵗初髙宗有賢子孝己其母早死髙宗惑後妻言放而死天下哀之帝祖庚史記曰帝祖庚在位七年崩弟祖甲立紀年曰祖庚躍居殷帝祖甲史記曰帝祖甲}
