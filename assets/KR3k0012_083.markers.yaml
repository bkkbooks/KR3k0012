  - {type: variant, offset: 6005, length: 1, content: 聲, WYG: 樂厚賦稅以實鹿臺之錢而盈鉅橋之粟鹿臺臺名鉅橋倉名以西伯昌九侯鄂侯為三公九侯有好女入之紂九侯女不憙淫紂怒殺之而醢九侯鄂侯争之彊辨之疾并脯鄂侯西伯昌聞之竊歎崇侯虎知之以告紂紂囚西伯羑里及武王伐紂紂兵敗績走入登鹿臺衣其寶玉赴火而死紀年曰帝辛受居殷帝王世紀曰帝紂能倒曳九牛撫梁易柱有蘇氏叛紂因伐蘇蘇人以美女妲己奉紂紂大悅赦蘇而納妲己為妃常與沉醉于酒所譽者貴所憎者誅淫縱愈甚始作象箸箕子為父師歎曰爲象箸必不羮於土匭必為犀玉之杯食熊蹯豹胎必不衣短褐處茅屋之下必將衣文繡之衣遊於九層之臺居於廣室之中矣居五年紂果造傾宫作瓊室瑶臺飾以美玉七年乃成其大三里其髙千丈其大宫百其小宫七十三處宫中九市車行酒馬行炙以百二十日為一夜六月發民獵於西山居期年天下大風雨飄牛馬壞屋樹天火燒其宫兩日並出或鬼哭或山鳴紂不懼愈慢神誅諫士為長夜之飲七日七夜失忘厯數不知甲乙問於左右莫知使問箕子箕子謂人曰為天下主而一國皆失日天下危矣一國不知而我其危矣宰人以醢熊蹯不熟紂怒殺宰人斮朝涉之脛而視其髓刳孕婦之腹而觀其胎又殺人以食虎諸侯或叛妲己以罰輕欲紂重刑乃先為大熨斗以火爇之使人舉輙爛手不能勝紂怒乃更為銅柱以膏塗之加于爇炭之上使有罪者縁焉足滑墮跌火中紂與妲己笑為樂名曰炮烙之刑武王乃率諸侯來伐紂紂有億兆夷人起師自容閭至浦水與同惡諸侯五十國凡七十萬人拒周于商郊之牧野紂師皆倒戈而戰紂即位三十二年正月甲子敗績赴宫登鹿臺蒙寶衣玉自投于火而死周武王封其子武庚為殷後六韜曰武王伐殷得二大夫而問之曰殷國將亡亦有妖乎一人曰殷國常雨血雨灰石小者如雞子大者如箕常六月而雨雪深尺餘武王曰大哉妖也殷人對曰非殷國之大妖也殷國大妖三十六章殷君喜射人喜以人食餧虎喜剖人心喜殺孕婦以信者為不信以誣者為真以忠者為不忠忠諫者死阿諛者賞以君子為下以小人為上以佞辯為相以女子為政急令暴取萬民愁苦喜田獵走狗試馬出入不時不避大風甚雨不避寒暑喜修治池臺}
