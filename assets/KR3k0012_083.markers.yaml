  - {type: variant, offset: 5938, length: 0, content: '', WYG: 紀年曰仲丁即位元年自亳遷于囂帝王世紀曰仲丁陟囂或曰敖今河南之敖倉是也帝外壬史記曰帝外壬在位一十五年崩弟河亶甲立紀年曰外壬居囂帝河亶甲書叙傳曰河亶甲居相孔安國曰相地在河北史記曰帝河亶甲時殷復衰河亶甲在位九年崩子帝祖乙立紀年曰河亶甲整即位自囂遷于相征藍夷再征班方帝祖乙書叙傳曰祖乙圮于耿圮毁也圮于耿遷于耿也河水所毁日圮帝王世紀曰今河東皮氏有耿鄉史記曰帝祖乙立殷復興巫賢任職祖乙在位十九年紀年曰祖乙勝即位是為中宗居庇}
