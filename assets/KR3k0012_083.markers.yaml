  - {type: variant, offset: 576, length: 1, content: 始, SBCK: 七征而德施於諸侯焉及夏桀無道湯使人哭之桀囚湯於夏臺而後釋之諸侯由是咸叛桀附湯同日貢職者五百國三年而天下悉服湯自伐桀後大旱七年洛川竭使人持三足鼎祝於山川曰慾不節耶使民疾耶苞苴行耶䜛夫昌耶宫室營耶女謁行耶何不雨之極也殷史卜曰當以人禱湯曰吾所爲請雨者民也􅀂必以人禱吾請自當遂齋戒剪髪斷爪以巳爲牲禱於桑林之社曰唯予小子履敢}
