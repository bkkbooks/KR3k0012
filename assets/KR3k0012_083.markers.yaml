  - {type: variant, offset: 1620, length: 91, content: 君言佐舜勞矣鑿山川通河漢首無髮股無毛故舜也以勞報子我生而逸不能為君之勞矣越絕書曰禹始憂民救水到大越於茅山大會計爵有功更名茅山謂之會稽及其王矣巡狩大越吳越春秋曰禹案黃帝中經見聖人所記曰, SBCK: 天乙}
