  - {type: variant, offset: 5946, length: 1, content: 虐, WYG: 亂殷復衰在位十六年崩弟廪辛立紀年曰帝祖甲載居殷帝王世紀曰春秋外傳所謂𤣥王勤商十}
  - {type: variant, offset: 5948, length: 10, content: 才力能伸鉤索鐵手搏熊, WYG: 四世帝祖甲亂之七世而隕是也帝廪辛史記曰帝廪辛在位六年崩弟庚丁立紀年曰廪辛先居殷帝庚丁史記曰帝庚丁在位三十一年崩子武乙立殷復去亳徙河北紀年曰庚丁居殷帝武乙史記曰帝武乙無道為偶人謂之天神與之博令人為行天神不勝乃戮辱之為革囊盛血仰而射之命曰射天武乙獵於河渭之間暴雷震死子太丁立紀年曰武乙即位居殷三十四年周王季厯來朝武乙賜地三十里玉十㲄馬八匹帝王世紀曰帝武乙復濟河北徙朝歌帝太丁史記曰帝太丁在位三年崩子帝乙立紀年曰太丁三年洹水一日三絶帝王世紀曰帝文丁一曰太丁帝乙史記曰帝乙立殷益衰帝乙長子曰微子啓母賤不得嗣少子辛辛母正后辛為嗣帝乙崩子辛立天下謂之紂紀年曰帝乙處殷二年周人伐商帝王世紀曰帝乙有二妃正妃生三子長子微子啓中曰微仲行小曰受庶妃生箕子年次啓皆賢初啓母之生啓及仲也尚為妾及立為后乃生辛帝乙以啓賢且長欲以啓為太子太史據法爭之帝乙乃立辛為太子帝乙即位三十七年帝紂書曰武王戎車三百兩}
