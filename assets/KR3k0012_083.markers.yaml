  - {type: variant, offset: 1195, length: 700, content: 年百姓以仁遂焉大戴禮曰宰我曰請問禹孔子曰高陽之孫鯀之子曰文命敏給克濟其德不回其仁可親其言可信聲為律身為度左準繩右規矩履四時據四海平九州戴九天明耳目治天下禮含文嘉曰禹卑宮室垂意於溝洫百穀用成神龍至靈龜服玉女敬養天賜妾傳曰禹會諸侯於塗山執玉帛者萬國春秋孔演圖曰天命之見候期門靈龜穴庭玄龍衘雲靈龜虛虎也穴庭者星入太微門玄龍水精也衘雲者蓋此召氣也春秋元命苞曰禹之時民大樂其駢三聖相繼故樂名大夏也孝經鉤命決曰命星貫昴脩紀夢接生禹命使之星謂流行之星也遁甲開山圖曰禹游於東海得玉碧色長一尺二寸光如日月自昭達幽冥揚雄蜀王本紀曰禹本沒山廣柔縣人生於石細其地名痢兒畔禹母吞珠孕禹坼堛而生於縣塗山娶妻生子啟紀年曰禹立四十五年論語曰子曰禹吾無間然矣孔子惟禹功德之盛也言不能復間廁其間也菲飲食而致孝乎鬼神馬融曰菲薄也致孝鬼神祭祀豊潔也惡衣服而致美乎黻冕孔安國曰損其常服以盛祭祀卑宮室而盡力乎溝洫包曰方里為井井間有溝溝廣四尺十里為城城中有洫洫深廣八尺也符子曰禹讓天下於奇子奇子曰君言佐舜勞矣鑿山川通河漢首無髮股無毛故舜也以勞報子我生而逸不能為君之勞矣越絕書曰禹始憂民救水到大越於茅山大會計爵有功更名茅山謂之會稽及其王矣巡狩大越吳越春秋曰禹案黃帝中經見聖人所記曰在九疑山東南天柱號曰宛委承以文玉覆以盤石其書簡青玉為字編以白銀禹乃東巡狩登衡山求之臥見赤繡衣男子自稱玄夷倉水使者來候禹令禹齋三月更求之禹乃齋三月登宛委山取得書通水經遂周行天下使益疏記之名曰山海經又曰舜崩禹服喪三年朝夕號泣形體枯槁面目黎黑十州記曰禹治洪水畢乃乘蹻車到鍾山祠上帝於北阿歸大功于九天禹經諸侯五岳使工刻石識其里數高下其字科斗書非漢人所了諸名山亦然鬻子曰禹之治天, krp: 分沉璧降}
