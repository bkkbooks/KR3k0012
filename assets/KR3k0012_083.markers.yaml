  - {type: punctuation, offset: 722, content: 「, id: KR3k0012_CHANT_083-bkkpn190}
  - {type: variant, offset: 722, length: 611, content: 禹別九州分其所界隨山濬川刊其木水深其流任土作貢任其土地所其貢賦又曰正月朔旦受命于神宗受舜終事之命神宗反祖之宗廟言神尊也率百官若帝之初舜初攝帝故事尚書帝命驗曰禹白帝精以星感星金精也脩紀山行見流星意感栗然生姒戎文禹栗然感貌姒禹氏禹生戎地一名政命尚書旋璣鈐曰禹開龍門導積石決岷山治九貢龍門積石山名貢功也治九州之功又曰禹開龍門導積石出玄珪上刻曰延喜玉受德天鍚佩禹切既成天出玄珪天錫之者以德佩禹有治水功者必佩以玄玉尚書中候曰伯禹在庶伯官稱禹號也因為德謚庶庶人也四嶽師舉薦之帝堯四嶽四方諸侯也師眾也薦進也握括命不試爵授司空禹握括地象天已命之故不復試以眾官司空於周為冬卿掌制國之五溝行導水之事伯禹稽首讓于益歸稽首拜頭至手益歸賢者堯臣歸讀曰夔也帝曰何斯若真何不聽讓之辭斯此也若汝也此汝真其人出爾命圖示乃天爾汝也禹方讓隱之故言出汝所天命也圖括地象示讀曰祇祇是也乃天使汝治水非我也伯禹曰臣觀河百面長人魚身出曰吾河精也觀河觀於河水也授臣河圖帶足入淵河圖謂括地象帶足去也音帶伯禹拜辭禹將行故拜去詩含神霧曰禹之興黑風會紀黑力黑也風風后也並黃帝臣復神伯禹當斯而至也禮曰禹立三年百姓以仁遂焉大戴禮曰宰我曰請問禹孔子曰高陽之孫鯀之子曰文命敏給克濟其德不回其仁可親其言可信聲為律身為度左準繩右規矩履四時據四海平九州戴九天明耳目治天下禮含文嘉曰禹卑宮室垂意於溝洫百穀用成神龍至靈龜服玉女敬養天賜妾傳曰禹會諸侯於塗山執玉帛者萬國春秋孔演圖曰天命之見候期門靈龜穴, SBCK: 七尺連珠}
