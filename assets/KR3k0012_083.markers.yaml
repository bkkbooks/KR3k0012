  - {type: variant, offset: 2184, length: 3441, content: 險阻既遠鳥獸之害人者消然後人得平土而居之堯使禹治洪水通九州故曰掘地而注之海也沮澤生草者也今青州為澤有草者為菹水流行於地而去也民下高就平士故曰險阻遠也水去故鳥獸害人者消盡也尸子曰禹長頸鳥啄面貌亦惡天下從而賢之好學也又曰古者龍門未闢呂梁未鑿禹於是䟽河決江十年不闚其家生偏枯之病步不相過人曰禹步墨子曰禹葬衣衾三領桐棺三寸葛以繃補庚切之下不及泉上不通臭既葬收餘壤為壟若參耕之畝韓子曰禹之王天下也身執木畚以為民先股無完胈體無生雖臣虜之勞不若於此矣呂氏春秋曰禹年三十未娶行塗山恐時暮失制乃娶塗山女又曰禹南濟乎江黃龍負舟舟中之人恐懼禹仰而笑曰受命於天竭力以濟生人受命天也奈何憂於龍焉龍弭耳低尾而逃又曰昔者禹一沐而三握髮一食而三起禮有道之士通乎己之不足通乎己之不足則不與物爭矣又曰禹之決江水也民聚瓦礫及其事已成功已立為萬世利禹之所見者遠也而民莫之知賈誼書曰禹常晝不暇食而夜不暇寢方是時憂務民也淮南子曰昔者鯀作三仞之城諸侯倍之禹知天下叛之乃壞城平地散財物禁甲兵施之以德海外賓服四夷納職又曰禹沐淫雨櫛疾風決江䟽河鑿龍門闢伊闕修彭蠡之防乘四載隨山刊木平治水土定千八百國夙興夜寐以致聰明輕賦薄歛以寬民力布德施惠以振困窮吊死問疾以養孤霜百姓親附政令流行又曰禹為水以身解於陽旰之河解禱也陽旰河在秦又曰堯之時天下大水禹身執畚鍾以為民先䟽河而導九攴攴分鑿江而通九路辟五湖而定東海又曰禹之趨時冠挂而不顧履遺而不取冠有所挂著去不暇顧視非爭其先也爭得其時也說苑曰禹見罪人下車問而泣之左右曰夫罪人不順道故然焉君王何為痛之至於此也禹曰堯舜之民皆以堯舜之心為心今吾為君百姓皆以其心為心是以痛之抱朴子曰禹乘二龍郭攴為馭黃帝玄女兵法曰禹問於風后曰吾聞黃帝有負勝之圖六甲陰陽之道今安在乎風后對曰黃帝藏會稽之山下其坎深千丈廣千尺鎮以盤石致難得也禹北見六子問海口所出禹乃決江口鳴角會稽龍神為見玉匱浮禹乃開而視之中有天下經十二卷禹未及持之其四卷飛上天禹不能得也其四卷復下陂池禹不能極也禹得中四卷開而視之又魏陳王曹植夏禹贊曰于嗟夫子拯世濟民克卑宮室致孝鬼神蔬食薄服紱冕乃新厥德不回其誠可親亹亹其德溫溫其仁尼稱無間何德之純又禹治水贊曰嗟夫夏禹寔勞水功西鑿龍門䟽河導江梁歧既闢九州以同天賜玄圭奄有萬邦又禹渡河贊曰禹濟于河黃龍乘船舟人並懼禹歎仰天予受天運勤功恤民死亡命也龍聞弭身庚信禹渡江贊曰二江初鑿九谷新成風飛蠲涌水起龍驚樂天知命無待憂生危舟遂靜亂楫還平帝啟歸藏曰昔夏后啟筮享神於大陵而上釣臺枚占皋陶曰不吉史記曰昔夏后啟筮乘龍以登于夫枚占于皋陶皋陶曰吉而必同與神交通以身為帝以王四卿又曰啟禹之子其母塗山氏之女也扈氏不服啟伐之大戰於甘誓遂減有扈氏天下咸歸山海經曰大樂之野夏后啟於此舞九代馬乘兩龍雲蓋三層左手操翳右手操瓌珮玉橫在大運山北一曰大道之野帝王世紀曰啟升后十年舞九韶三十五年征河西又曰帝啟一名建一名余德教施于四海貴爵而上齒養國老於東序養庶老於西序在位九年年八十餘而崩矣越絕書曰禹崩啟立曉知王事達君臣義呂氏春秋曰夏后伯即啟也與有扈戰於甘澤而不勝六卿請復之夏后伯曰不可吾地不淺吾民不寡我而不勝是吾德薄而教不善也於是乎處不重席食不貳味琴瑟不張鍾鼓不脩子女不飾親親長長尊賢使能朞年而有扈氏服故欲勝人者必先自勝矣帝太康書曰太康尸位以逸豫滅厥德黎民咸貳乃盤遊無度畋于有洛之表十旬不反有窮后羿距于河厥弟五人御其母以從徯于洛之汭五子咸怨述大禹之戒以作歌其一曰皇祖有訓民可近弗可下皇君也君祖禹有訓戒也近謂親之下謂失之者也民惟拜本本固邦寧言人君當國民以安國也予視天下愚夫愚婦一能勝予言能敬畏小民所以得眾心一人三失怨豈在明不見是圖三失過非一也不見是謀備其微予臨兆民懔乎若朽索之馭六馬十萬曰億十億曰兆言多也懔色貌朽腐也朽腐之索御六馬言危懼甚為人上者奈何不敬能訓則不驕在上下則高而不危其二曰訓有之內作色荒外作禽荒作為也迷亂曰荒色女色禽鳥獸甘酒嗜音峻宇彫墻甘嗜無厭足也峻高大彫飾盡有一于此未或不亡此六者棄德之君有其一必亡況兼有乎其三曰惟彼陶唐有此冀方陶唐帝堯氏都冀州統天下四方今失厥道亂其紀綱乃厎滅亡言失堯之道亂其法制自致滅亡其四曰明明我祖萬邦之君有典有則貽厥予孫典謂經籍則法貽遺也言仁及後世關石和鈞王府則有荒墜厥緒覆宗絕祀金鐵銀石供民器用通之使和平則官民足言古制有而太康失其業以取亡其五曰嗚呼曷歸予懷之悲曷何也言思而悲萬姓仇予予將疇依鬱陶乎予心顏厚有忸怩弗慎厥德雖悔可追言人君行己不慎其德以連滅敗欲改悔其可追及乎言無益也帝王世紀曰太康無道在位二十九年失政而崩帝仲康書曰惟仲康肇位四海胤侯命掌六師羲和廢厥職酒荒于厥邑胤后承王命徂征羲和廢其職官還其私邑以酒迷亂仲康命胤侯掌六師往就其邑討之帝相紀年曰帝相即位處啇丘元年征淮夷二年征風夷及黃夷帝王世紀曰帝相一名相安自太康已來夏政凌遟為羿所逼乃徙啇丘依同姓諸侯斟灌斟尋氏羿遂襲帝號是為羿帝有窮后羿帝王世紀曰羿有窮氏未聞其姓其先帝嚳以世掌射故於是加賜以弓矢封之於鉏為帝司射歷唐及虞夏至羿學射於吉甫其辭佐長故亦以善射聞與吳賀北遊使羿射雀左目羿引弓射之誤中左目羿俯首而愧終身不忘故羿善射至今稱之及有夏之衰羿自鉏遷于窮石因夏民之不附以代夏政逼篡帝位故號窮氏傳曰昔有夏之方衰也后羿自鉏遷于窮石因夏民以代夏政恃其射也不脩民事而淫于原獸棄武羅伯囚熊髡龍圉四子皆羿之賢臣而用寒浞土捉反寒浞伯明氏之讒子弟也伯明后寒棄之夷羿收之信而使之以為己相浞行媚于內而施賂于外愚弄其民而娛羿于田樹之詐匿以取其國家內外咸服羿猶不悛將歸自田家眾殺而烹之以食其子食羿子其子不忍食諸死于窮門殺之於國門靡奔有鬲氏靡夏遺臣事羿者有鬲國名浞因羿室生澆五叫反及豷音處恃其讒匿詐偽而不德于民使澆用師滅斟灌及斟尋氏二國夏同姓諸侯仲康之子后相所依處澆于過處豷于戈過戈二國名靡自有鬲氏收二國之燼以滅浞而立少康少康滅澆于過后杼豷于戈后杼少康子有窮由是遂亡寒浞帝王世紀曰寒浞有窮氏既篡羿位復襲有窮之號浞因羿之室生澆及豷多力能陸地盪舟浞使奡率師滅斟灌斟尋氏殺夏帝相於過滅豷於戈恃其詐力不卹民事初夏之殺帝相也妃有仍氏女曰后緍方娠逃出自竇歸于有仍生少康焉初夏之遺臣曰靡事羿羿死逃奔有鬲氏收斟尋二國餘燼殺寒浞而立少康帝少康傳曰昔有過澆殺斟灌以伐斟鄩澆寒浞子封於過滅夏后相后緍方娠逃出自竇后緍相妻也娠懷身也歸于有仍生少康焉為仍牧正收官之長澆使椒求之逃奔有虞為之庖正虞思於是妻之以二姚思有虞君也自以二女妻少康姚姓也而邑諸綸綸虞邑也有田一成有眾一旅方十里為成五百人為旅能布其德而逃其謀兆始也以收夏眾撫其官職遂滅過戈復禹之績祀夏配天不失舊物魏高貴鄉公少康漢高論曰少康生於滅亡之後降為諸侯之隸崎嶇逃難僅以身免能布其德而兆其謀卒滅戈克復禹績非至德弘仁豈濟斯勳漢祖因土崩之勢專任智力以成功業為子則數危其親為君則囚繫賢相身沒之後社稷幾傾若與少康易時而處或未能復大禹之績矣又論曰三代之世任德濟勳如彼之難秦項之際任力成功如此之易且太上立德其次立功就令漢祖功高未若少康盛德之茂也帝宁紀年曰帝宁居原自遷于老王帝王世紀曰帝宁一號后予或曰公孫曼能率禹之功夏人報祭之在位十七年帝槐紀年曰后芬立四十四年帝王世紀曰帝芬一名帝槐或曰祖武在位二十六年帝芒紀年曰后芒即位元年以玄珪賓于河東狩于海獲大魚后芒陟位五十八年帝王世紀曰帝芒一名和或曰帝芒帝泄帝王世紀曰帝泄一名帝世或曰泄宗在位十六年帝不降紀年曰不降即位六年伐九苑立十九年其弟立是為帝局帝王世紀曰帝不降一名帝降或曰北成北字或作江字帝局帝王世紀曰帝局一名帝禺或曰高陽在位二十一年帝廑紀年曰帝廑一名胤甲即位居西河天有祅孽十日並出帝王世紀曰帝廑一名頊或曰董江在位二十年帝孔甲傳曰昭二十九年秋龍見于絳郊皆魏獻子問於蔡墨曰古者國有豢龍氏有御龍氏及有夏孔甲擾于有帝擾順也其德能順於天帝賜之乘龍河漢各二四頭為乘各二乘十六頭各有雌雄史記曰帝孔甲立好方術鬼神事淫亂夏后氏德衰諸侯叛之天降龍二有雌雄孔甲弗能食未得豢龍氏陶唐既衰其後有劉累學擾龍于豢龍氏以事孔甲孔甲賜之姓曰御龍氏漢書曰孔甲作盤盂銘三十六篇列仙傳曰師門為夏孔甲龍師孔甲不能修其心意殺而埋之外野一旦風雨迎之記則山木皆焚孔甲祠而禱之未還而道死呂氏春秋曰夏后孔甲掌東陽薲音頻山天大風晦孔甲迷入民室主人方乳乳產也咸言后來是良日子誰敢殃之長成人幕動折撩斧破斬足遂為守者以其無足為守門之官乃作破斧之歌帝皋紀年曰后昊立三年帝皋也帝王世紀曰帝皋一名皋茍帝發紀年曰后發一名后敬或曰發惠其子立為桀帝桀歸藏曰昔桀伐唐而枚占於營營或曰不吉不利出征唯利安處彼貍為鼠, SBCK: ''}
