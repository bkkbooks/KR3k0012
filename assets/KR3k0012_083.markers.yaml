  - {type: variant, offset: 5784, length: 0, content: '', SBCK: 人置四面未必得鳥湯去三面以網四十國非徒網鳥也又曰成湯之時有榖生於庭夜而生比旦而大拱史請卜其故湯曰吾聞祥者福之先也見祥而爲不善則福不至妖者禍之先也見妖而爲善則禍不至於是早朝晏退問疾吊䘮鎮撫百姓三日而榖亡又曰湯誅桀功名大成乃命伊尹作爲大護歌晨露脩九韶六列以見其善淮南子曰湯夙興夜寐以致聦明輕賦薄歛以寛民泯布德施惠以賑困窮吊死問疾以養􅀌霜百姓親附政令流行帝外丙}
