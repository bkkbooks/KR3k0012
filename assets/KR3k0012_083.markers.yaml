  - {type: variant, offset: 5927, length: 7, content: 興無王用歲四百, SBCK: 曰大哉妖也一人對曰非殷國之大妖也殷國大妖三十}
  - {type: variant, offset: 5927, length: 0, content: '', WYG: 太戊湯之𤣥孫也嗟嗟烈祖有秩斯祜秩常也嗟嗟嘆美之深也史記曰帝太戊立亳有祥桑榖共生於朝一暮大拱帝太戊懼問伊陟伊陟曰臣聞妖不勝德帝之政其有闕歟帝其修德太戊從之而祥桑枯死而去殷復}
