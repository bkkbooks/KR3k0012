  - {type: variant, offset: 5908, length: 10, content: 門湯遂滅夏桀逃南巢氏, SBCK: 七年乃成其大三里其髙千丈其大宫百其小宫七十三處宫中九市車行酒馬行炙以百二十日爲一夜六月發民獵於西山居朞年天下大風􅀨飄牛馬壊屋樹天火燒其宫兩日並或􅀑哭或山鳴紂不懼愈慢神誅諌士爲長夜之飲七日七夜失忘曆數不知甲乙問於左右莫知使問箕子謂其私人曰爲天下主而一國皆失日天下危矣一國不知而我其危矣亦亂以醉熊蹯不熟紂怒殺􅈗人斮朝渉之脛而視其髓刳孕婦之腹而觀其胎又殺人以食虎諸侯或叛妲己以罰輕紂欲重刑乃先爲大熨斗以火􅅡之使人舉輒爛手不能勝紂怒乃更爲銅柱以膏塗之加于􅅡炭之上使有罪者縁焉足滑跌墮火中紂與姐巳􅀏爲樂名曰炮烙之刑武王乃率諸侯來伐紂紂有億兆夷人起師}
