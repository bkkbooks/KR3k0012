  - {type: variant, offset: 5827, length: 0, content: '', krp: 咸歸殷百姓以寜伊尹嘉之乃作太甲三篇襃帝太甲稱太宗尚書曰太甲旣立不明伊尹放諸桐三年復歸于亳思庸念帝道也帝王丗紀曰太甲反位又不怨故更尊伊尹曰保衡即春秋傳所謂伊尹放太甲卒爲明王是也太田脩政殷道中興號曰太宗孔藂所謂憂思三年追悔前愆起而即政謂之明王者也一名祖甲享國三十三年帝王紀曰桐宫蓋殷之墓地有離宫可居在鄴西南杜預春秋後序曰紀年稱殷仲壬即位居亳其卿士伊尹仲壬崩伊尹放太甲于桐乃自立也伊尹即位於太甲十年太甲潜岀自桐殺伊尹帝沃丁史記曰帝沃丁之時伊尹卒旣葬伊尹於亳咎單遂訓伊尹事作沃丁紀年曰沃丁絢即位居亳帝王世紀曰伊尹卒大霧三日沃丁塟以天子禮資之三年以報大德帝太庚史記曰帝太庚在位二十五年崩子帝小甲立紀年曰小庚辯即位居亳即大庚也帝小甲史記曰帝小甲在位十七年崩弟雍己立紀年曰小甲髙即位居亳帝雍巳史記曰帝雍巳在位十二年崩弟太戊立紀年曰雍巳伷即位居亳帝太戊書叙傳曰伊陟相太戊伊陟伊尹子也亳有祥桑榖共生于朝祥妖恠也二木合生七曰供不恭之罰詩序曰烈祖祀中宗也祀中宗殷王太戊湯之玄孫也嗟嗟烈祖有秩斯祜秩常也嗟嗟歎美之深也史記曰帝太戊立亳有祥桑穀共生於朝一暮大拱帝太戊懼問伊陟伊陟曰臣聞妖不勝德帝之政其有闕歟帝其脩德太戊從之而祥桑枯死殷復興諸侯歸之故稱中宗中宗在位七十五年帝仲丁史記曰帝仲丁遷于敖河亶甲居相值祖乙遷于刑帝仲丁在位十一年紀年曰仲丁即位元年自亳遷于嚚帝王丗紀曰仲丁徙嚚或曰敖今河南之敖倉是也帝外壬史記曰帝外壬在位五年崩弟河亶甲立紀年曰外壬居嚚帝河亶甲書叙傳曰河亶甲居相孔安國曰相地在河北史記曰帝河亶甲時殷復衰河亶甲在位九年崩子帝乙立紀年曰河亶甲整即位自嚚遷于相征藍夷再征班方帝祖乙書叙傳曰祖乙圯于耿曰圯於祖遷于耿也河水所毁曰圯也帝王丗紀曰今河東皮氏有耿郷史記曰帝祖乙立殷復興巫賢任職祖乙在位十九年紀年曰祖乙勝即位是爲中宗帝王丗紀曰帝祖乙以乙日生故謂之帝乙孔子所謂五丗之外天之錫命䟽可同名者也是以祖乙不爲諱蓋殷禮也帝祖辛史記曰帝祖辛在位十六年崩弟沃甲立帝沃甲史記曰帝沃甲在位二十五年崩立祖辛之子祖丁紀年曰帝開甲踰即位居庇帝祖丁史記曰帝祖丁在位三十二年崩立沃甲之子是爲南庚紀年曰祖丁即位居庇帝南庚史記曰帝南庚在位二十九年崩立祖丁之子陽甲紀年曰南庚更自庇遷于奄帝陽甲史記曰帝陽甲之時殷衰自仲丁以來廢嫡而更立諸弟子弟子或爭相代立比九丗亂諸侯莫朝帝陽甲在位十七年紀年曰陽甲即位居奄帝盤庚書曰盤庚五遷將治亳殷自湯至盤庚凡五遷都治亳殷也民咨胥怨胥怨也民不欲徙乃咨嗟憂愁相與怨其上也史記曰帝盤庚之時殷巳都河北盤庚渡河南復居成湯之故國乃五遷無定處殷民咨胥眥怨不欲徙遂渉河南治亳行湯之政然後百姓由寜殷道復興諸侯來朝以其遵成湯之徳也在位十八年紀年曰盤庚旬自奄遷于北蒙曰殷帝王丗紀曰帝盤庚徙都殷始改商曰殷又曰亳殷今偃師是也然則殷有三亳二亳在梁國一亳在河南糓熟爲南亳即今都也蒙爲北亳即景亳湯所盟地偃師爲西亳即盤庚所徙者帝小辛史記曰帝小辛殷道復衰百姓思盤庚乃作盤庚三篇小辛在位二十一年紀年曰小辛頌位居殷帝小乙史記曰帝小乙在位二十年崩子武丁立紀年曰小乙歛居殷帝武丁書叙傳曰髙宗夢得說盤庚弟小乙子也名武丁夢得賢相其名說使百工營求諸野得諸傳巖書大傳曰桑糓俱生于朝一日而大拱兩手撿之曰拱武丁召其相而問焉其相曰吾雖知之吾不能言也問諸祖乙曰桑榖野草也此木也而云草未聞劉民以爲屬草妖野草生于朝亡乎武丁側身修行思昔先王之政興滅國繼絶世舉逸民明養老之禮諸侯重譯來朝者六國九州之外國武丁祭成湯有飛雉升鼎耳而雊武丁問祖乙祖乙曰野鳥不當升鼎欲爲用也則逺方將有來朝者乎三年編髮重譯來朝者六國孔子曰吾於髙宗肜日見德有報之疾肜日尚書篇名史記曰帝武丁即位思復興殷而未得其佐三年不言政事事决定於冡宰以觀國風武丁夜夢得聖人名曰說以夢所見視群臣百吏皆非也於是使百工營求之野得說於傅巖中是時說爲胥靡築於傅巖見於武丁武丁曰是也得而與之語果聖人舉以爲相殷國大治武丁祭成湯明日有飛雉登鼎耳而雊武丁懼祖巳曰王勿憂先修政事祖巳乃訓王武丁崩祖巳嘉其德立其廟爲髙宗帝王世紀曰武丁即位諒闇居凶廬百官揔巳聽於冡宰三年不言旣免䘮猶不言群臣諌武丁於是思建良輔夢天賜賢人姓傅名說乃使百工冩其像求諸天下見築者胥靡衣褐帶索執役于虞􅉑之間傅巖之野名說登以爲相享國五十有九年年百歳𥘉髙宗有賢子孝巳其母早死髙宗惑後妻之言放而死天下哀之帝祖庚史記曰帝祖庚在位七年崩弟祖甲立紀年曰祖庚躍居殷帝祖甲史記曰帝祖甲滛亂殷復衰在位十六年崩子廪辛紀年曰帝甲載居殷帝王世紀曰春秋外傳所謂玄王勤商十有四世帝甲亂之七世而隕是也帝廪辛史記曰帝廩辛在位六年崩弟庚丁立紀年曰馮辛先君殷帝庚丁史記曰帝庚丁在位三十一年崩子武乙立殷復去亳徙河北紀年曰庚丁居殷帝武乙史記曰帝武乙無道爲偶人謂之天神與之博令人爲行天神不勝乃戮辱之爲革囊盛血仰而射之命曰射天武乙獵於河渭之間暴雷震死子太丁立紀年曰武乙即位居殷三十四年周王季歴來朝武乙賜地三十里玉十㲄馬八疋帝王丗紀曰帝武乙復濟河北徙朝歌帝太丁史記曰帝太丁在位三年崩子帝乙立紀年曰太丁三年洹水一日三絶帝王丗紀曰帝文丁一日大丁帝乙史記曰帝乙立殷益衰帝乙長子曰微子啓母賤不得嗣少于辛辛母正后辛爲嗣帝乙崩子辛立天下謂之紂紀年曰帝乙處殷二年周人伐商帝王丗紀曰帝乙有二妃正妃生三子長曰微子啓中曰微仲行小曰受庶妃生箕子年次啓皆賢𥘉啓母之生啓及行也尚爲妾及立爲后乃生辛帝乙以啓賢且長欲以啓爲太子史據法爭之帝乙乃立辛爲太子帝乙即位三十七年帝紂書曰武王戎車三百兩虎賁三百人與受戰于牧野周書曰商王紂取天智王琰五班環身以自焚天智王之上羙者班環身以自原之春秋文耀鈎曰牧野之戰鬼哭牧地鬼先哭喻纣將死語曰子貢曰紂之不善不如是之甚也是以君子惡居下流天下之惡}
