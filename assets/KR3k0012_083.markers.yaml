凌遟為羿所逼乃徙啇丘依同姓諸侯斟灌斟尋氏羿遂襲帝號是為羿帝有窮后羿帝王世紀曰羿有窮氏未聞其姓其先帝嚳以世掌射故於是加賜以弓矢封之於鉏為帝司射歷唐及虞夏至羿學射於吉甫其辭佐長故亦以善射聞與吳賀北遊使羿射雀左目羿引弓射之誤中左目羿俯首而愧終身不忘故羿善射至今稱之及有夏之衰羿自鉏遷于窮石因夏民之不附以代夏政逼篡帝位故號窮氏傳曰昔有夏之方衰也后羿自鉏遷于窮石因夏民以代夏政恃其射也不脩民事而淫于原獸棄武羅伯囚熊髡龍圉四子皆羿之賢臣而用寒浞土捉反寒浞伯明氏之讒子弟也伯明后寒棄之夷羿收之信而使之以為己相浞行媚于內而施賂于外愚弄其民而娛羿于田樹之詐匿以取其國家內外咸服羿猶不悛將歸自田家眾殺而烹之以食其子食羿子其子不忍食諸死于窮門殺之於國門靡奔有鬲氏靡夏遺臣事羿者有鬲國名浞因羿室生澆五叫反及豷音處恃其讒匿詐偽而不德于民使澆用師滅斟灌及斟尋氏二國夏同姓諸侯仲康之子后相所依處澆于過處豷于戈過戈二國名靡自有鬲氏收二國之燼以滅浞而立少康少康滅澆于過后杼豷于戈后杼少康子有窮由是遂亡寒浞帝王世紀曰寒浞有窮氏既篡羿位復襲有窮之號浞因羿之室生澆及豷多力能陸地盪舟浞使奡率師滅斟灌斟尋氏殺夏帝相於過滅豷於戈恃其詐力不卹民事初夏之殺帝相也妃有仍氏女曰后緍方娠逃出自竇歸于有仍生少康焉初夏之遺臣曰靡事羿羿死逃奔有鬲氏收斟尋二國餘燼殺寒浞而立少康帝少康傳曰昔有過澆殺斟灌以伐斟鄩澆寒浞子封於過滅夏后相后緍方娠逃出自竇后緍相妻也娠懷身也歸于有仍生少康焉為仍牧正收官之長澆使椒求之逃奔有虞為之庖正虞思於是妻之以二姚思有虞君也自以二女妻少康姚姓也而邑諸綸綸虞邑也有田一成有眾一旅方十里為成五百人為旅能布其德而逃其謀兆始也以收夏眾撫其官職遂滅過戈復禹之績祀夏配天不失舊物魏高貴鄉公少康漢高論曰少康生於滅亡之後降為諸侯之隸崎嶇逃難僅以身免能布其德而兆其謀卒滅戈克復禹績非至德弘仁豈濟斯勳漢祖因土崩之勢專任智力以成功業為子則數危其親為君則囚繫賢相身沒之後社稷幾傾若與少康易時而處或未能復大禹之績矣又論曰三代之世任德濟勳如彼之難秦項之際任力成功如此之易且太上立德其次立功就令漢祖功高未若少康盛德之茂也帝宁紀年曰帝宁居原自遷于老王帝王世紀曰帝宁一號后予或曰公孫曼能率禹之功夏人報祭之在位十七年帝槐紀年曰后芬立四十四年帝王世紀曰帝芬一名帝槐或曰祖武在位二十六年帝芒紀年曰后芒即位元年以玄珪賓于河東狩于海獲大魚后芒陟位五十八年帝王世紀曰帝芒一名和或曰帝芒帝泄帝王世紀曰帝泄一名帝世或曰泄宗在位十六年帝不降紀年曰不降即位六年伐九苑立十九年其弟立是為帝局帝王世紀曰帝不降一名帝降或曰北成北字或作江字帝局帝王世紀曰帝局一名帝禺或曰高陽在位二十一年帝廑紀年曰帝廑一名胤甲即位居西河天有祅孽十日並出帝王世紀曰帝廑一名頊或曰董江在位二十年帝孔甲傳曰昭二十九年秋龍見于絳郊皆魏獻子問於蔡墨曰古者國有豢龍氏有御龍氏及有夏孔甲擾于有帝擾順也其德能順於天帝賜之乘龍河漢各二四頭為乘各二乘十六頭各有雌雄史記曰帝孔甲立好方術鬼神事淫亂夏后氏德衰諸侯叛之天降龍二有雌雄孔甲弗能食未得豢龍氏陶唐既衰其後有劉累學擾龍于豢龍氏以事孔甲孔甲賜之姓曰御龍氏漢書曰孔甲作盤盂銘三十六篇列仙傳曰師門為夏孔甲龍師孔甲不能修其心意殺而埋之外野一旦風雨迎之記則山木皆焚孔甲祠而禱之未還而道死呂氏春秋曰夏后孔甲掌東陽薲音頻山天大風晦孔甲迷入民室主人方乳乳產也咸言后來是良日子誰敢殃之長成人幕動折撩斧破斬足遂為守者以其無足為守門之官乃作破斧之歌帝皋紀年曰后昊立三年帝皋也帝王世紀曰帝皋一名皋茍帝發紀年曰后發一名后敬或曰發惠其子立為桀帝桀歸藏曰昔桀伐唐而枚占於營營或曰不吉不利出征唯利安處彼貍為鼠, krp: ''}
