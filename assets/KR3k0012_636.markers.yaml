  - {type: variant, offset: 2828, length: 232, content: 禹之屬修定法令又曰古之知法者能省刑本也今之知法者不失有罪上下相臨以刻為明深者獲功名平者多後患諺曰鬻棺者欲歲之疫非憎人欲殺之利在於人死又曰貢禹上言孝文皇帝時貴廉潔賤貪污賈人贅壻及吏坐贓者皆禁錮不得為吏無贖罪之法欲令行禁止海內大化武帝始臨天下尊賢用士開地廣境自見功大遂縱嗜欲迺一時之變使犯法者贖罪入穀者補吏是以官亂民貧盜賊并起又曰文帝制人有已論其父母妻子同產坐之及收孥律令宜除之孥子也秦法一有罪并收其家也罪疑者與人從輕斷之于是刑罰大省斷獄四百又曰秦始皇專仕刑罰躬操文墨, SBCK: 政}
