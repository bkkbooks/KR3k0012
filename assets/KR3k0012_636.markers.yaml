  body:
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 二叙刑下􅀳書曰羊亮爲太傅楊駿叅軍時京邑多盗􅀼駿欲更重其法盗百錢加大辟請官屬會議亮曰昔楚江乙母失布以爲盗由令尹公􅀂欲無盗將自止何重法爲駿慙而止後魏書曰韓騏驎爲齊州刺史寛刑罰從事劉普慶說曰明公杖節分憂無所斬戮何以示威荅曰人不犯何以戮乎􅀂湏立威當以卿始慶慙懼而退梁書曰武帝敦睦九族優借朝士有犯罪者皆諷臣下屈法申之百姓有罪即按以法其縁坐老㓜不免}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 二叙刑下晉書曰楊亮為太傅楊駿參軍時京邑多竊盗駿更欲重其法盗百錢加大辟請官屬㑹議亮曰昔楚江乙母失布以為盗由令尹公若無欲盗將自止何重法為駿慙而止後魏書曰韓麒麟為齊州刺史寛刑罰從事劉普慶説曰明公杖節分憂無所斬戮何以示威答曰人不犯何以戮乎若須立威當以卿始慶慙懼而退梁書曰武帝敦睦九族優惜朝士有犯罪者皆諷臣下屈法申之百姓有罪即按以法其縁坐老㓜不免}
