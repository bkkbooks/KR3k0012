  - {type: variant, offset: 3265, length: 2, content: 折民, SBCK: 録曰闞澤字德潤山隂人也􅀄吕壹姦罪發聞有司窮治奏以大辟或以爲冝加焚烈用彰其惡吴王以問澤澤曰盛明之丗不冝有此刑遂從之徐幹中論曰政之大綱有二二者何賞罰之謂也君明于賞罰之道則治不難矣賞罰者不在乎必重而在於必行必行則雖不重而人肅不行則雖重而人怠故先王務賞罰之必行書曰尔無不信朕不食言汝不從誓言予則孥戮汝桓範丗要論曰德多刑少者五帝也刑德相半者三王也刑多德少者五覇也純用刑而亡者􅁗也又曰夫刑辟之作所從來尚矣聖人以治亂人以亡是以古屬帝王莫不詳愼之者以爲人命至重一死不生一斷不屬故堯舜之明猶}
