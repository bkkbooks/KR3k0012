  - {type: variant, offset: 62, length: 559, content: 清而民服又噬嗑卦曰噬嗑亨利用獄噬齧也嗑合也凡物之不親由有間也物之不齊由有過也有間與過齧而合之所以通也刑克以通獄之利也象曰雷電噬嗑先王以明罰勑法又豐卦象曰雷電皆至豐君子以折獄致刑文明以動不失情理也尚書舜典曰象以典刑象法也法用常刑用不越法流宥五刑宥寬也以流放之法寬五刑鞭作官刑以鞭為治官事之刑朴則教刑朴夏楚也不勤道業則撻之金作贖刑金黃金誤而入刑出金以贖罪眚災肆赦怙終賊刑眚過也災害也肆緩也賊殺也過而有害當緩赦之怙姦自終當刑殺之欽哉欽哉惟刑之恤哉舜陳典刑之義勑天下使敬之憂欲得中又舜典曰帝曰皋陶蠻夷猾夏寇賊姦宄猾亂也夏華夏群行攻劫曰寇殺人曰賊在外曰姦在內曰宄言無教之致汝作士五刑有服士治獄官也五刑墨劓剕宮大辟服從也言刑得輕重中正之法也五服三就既從五刑謂服罪也行刑當就三處大罪於原野大夫於朝士於市五流有宅五宅三居謂不忍加刑則流放之若四凶則有五刑之流各有所居五居之差有三等之居大罪四裔次九州之外次千里之外也惟明克允言皋陶能明信五刑施之遠近蠻夷猾夏使咸信服無敢犯之者又大禹謨曰帝曰皋陶惟茲臣庶罔或干予正無有干我正言順耳汝作士明于五刑以弼五教期于予治弼輔也期當也歎其能以刑輔教當於治體刑期于無刑民恊于中時乃功懋哉雖或行刑以殺正殺終無犯者刑期於無所刑民皆合於大中之道是汝之功勉之皋陶曰帝德罔愆臨下以簡御眾以寬罰弗及嗣賞延于世宥過無大刑, SBCK: 枉濫}
