  - {type: variant, offset: 11, length: 1, content: 初, SBCK: 大象元年詔罷髙祖所約法􅀄髙祖作刑書要制用法嚴重及帝即位以海内􅀄平恐物情未附乃除之隋書曰後周大象元年詔髙祖所立刑書用法深重其一切除之然帝數行肆赦爲姦者皆輕犯刑法政令不一下無適從於是又廣刑書要制而更峻其法謂之刑經聖制􅀫衛之官一日不直罪至削除逃亡者皆死而家口籍没上書自誤者科其罪鞭杖皆百二十爲度名曰天杖其後人加至二百四十又作礔礰車以威婦人其决人罪云與杖者即一百二十多打者即二百四十又曰開皇十}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_SBCK_636-2a}
  - {type: variant, offset: 11, length: 0, content: '', WYG: 大象元年詔罷髙祖所約法}
  - {type: variant, offset: 11, length: 1, content: 初, krp: 大象元年詔罷髙祖所約法𥘉髙祖作刑書要制用法嚴重及帝即位以海内𥘉平恐物情未附乃除之隋書曰後周大象元年詔髙祖所立刑書用法深重其一切除之然帝數行肆赦爲姦者皆輕犯刑法政令不一下無適從於是又廣刑書要制而更峻其法謂之刑經聖制宿衛之官一日不直罪至削除逃亡者皆死而家口籍没上書自誤者科其罪鞭杖皆百二十爲度名曰天杖其後人加至二百四十又作礔礰車以威婦人其决人罪云與杖者即一百二十多打者即二百四十又曰開皇十}
  - {type: variant, offset: 12, length: 0, content: '', WYG: 髙祖作刑書要制用法嚴重及帝即位以海内初平恐物情未附乃除之隋書曰後周大象元年詔髙祖所立刑書用法深重其一切除之然帝數行肆赦為奸者皆輕犯刑法政令不一下無適從於是又廣刑書要制而更峻其法謂之刑經聖制宿衞之官一日不直罪至削除逃亡者皆死而家口籍没上書字誤者科其罪鞭朴杖皆一百二十為度名曰天杖其後又加至二百四十又作礔礰車以威婦人其決罪人云與杖者即一百二十多打者即二百四十又曰開皇十}
