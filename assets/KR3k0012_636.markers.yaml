  - {type: variant, offset: 13, length: 3, content: 發蒙利, SBCK: 年八月景戍詔决死罪者三奏而後行刑唐書曰貞觀五年詔京師諸司比來奏决死囚雖立五覆一日即了未暇審思五奏何益縱有追悔又無所及自今後冝二日中五覆奏下諸州三覆奏又手勑曰比來斷獄多據律文雖情有可矜而不敢違法守文定罪或恐有􅁈今後門下省覆奏有據法合死而情可矜者冝録狀以聞又曰太宗甞録囚徒憫其將死爲之動容頋謂侍臣曰刑典仍用蓋風化未洽之咎愚人何罪而肆重刑乎更彰朕之不德也}
