  - {type: variant, offset: 622, length: 1053, content: 無小罪疑惟輕功疑惟重刑疑附輕賞疑從重忠厚之至與其殺不辜寧失不經好生之德洽于民心茲用不犯于有司辜罪也經常也司主也皋陶因帝勉己遂稱帝之德所以明民不犯上也寧失不常之罪不枉不辜之善仁愛之道又皋陶謨曰天討有罪五刑五用哉言天以五刑罰有罪用五刑宜必當又呂刑曰穆王訓夏贖刑呂侯以穆王命作書訓暢夏禹贖刑之法更從輕矣布告天下作呂刑呂刑後為甫侯故或稱甫刑惟呂命王享國百年耄荒言呂侯見命為卿時穆王以享國百年耄亂荒忽穆王即位過四十矣言百年大期雖老而能用賢以揚名度作刑以詰四方度時世所宜訓作贖刑以治天下四方之民尚書大傳曰子張曰堯舜之王一人刑而天下治何則教誠而愛深也今一夫而被此五刑子龍子曰末可謂能為書二人俱罪呂侯之說刑也被此五刑喻犯數罪也孔子曰不然也五刑有此教教然耳犯數罪猶以上一罪刑之又曰子夏曰昔者三王愨然欲錯刑遂罰錯處也遂行也平心而應之和然後行之然且曰吾意者以不平慮之乎吾意者以不和平之乎如此者三然后行之此之謂慎罰又曰孔子曰古之刑者省之今之刑者繁之其教古者有禮然後有刑是以刑省也今也反是無禮而齊之以刑是以繁也書曰伯夷降典禮折民惟刑謂有禮然後有刑也又曰茲殷罰有倫今也反是諸侯不同聽每君異法聽議獄也聽無有倫是故知法難也又曰有過赦小罪勿增大罪勿纍延罪無辜曰纍老弱不受刑有過不受罰故老而受刑謂之悖弱者受之不克不赦有過講之賊詩小雅曰菀柳刺幽王也暴虐無親而刑罰不中也詩含神霧曰燁燁震電不寧不令此應刑政之大暴故震雷驚人使天下不安周禮地官上大司徒曰以鄉八刑糾萬民一曰不孝之刑二曰不睦之刑三曰不婣之刑四曰不悌之刑五曰不任之刑六曰不恤之刑七曰造言之刑八曰亂民之刑糾猶割祭也不弟不敬況師長也造言訛言惑眾亂民亂名改作執左道以亂政也任謂朋友相任也恤謂相憂又地官下司市曰市刑小刑憲罰中刑徇眾大刑朴罰其附于刑者歸于士徇舉以示其地之眾也朴撻也國君過市則刑人赦大人過市罰一幕世子過市罰一弈命夫過市罰一蓋命婦過市罰一帷謂諸侯及夫人世子過其國之市大夫內子過其都之市也市者人所交利而行刑之處君子無故不遊觀焉若遊觀則拖惠以為說又曰秋官上曰大司寇掌建邦之三典以佐王刑邦國詰四方典法也詰謹也書曰穆王耄荒度作詳刑以詰四方也一曰刑新國用輕典新國新辟地立君之國也用輕法者為其民之未習于教二曰刑平國用中典平國承平守成之國用中典者常行之法三曰刑亂國用重典亂國篡弒叛逆之國用重典者以其化惡伐滅之也以五刑糾萬民一曰野刑上功糾力功農功力勤力也三曰軍刑上命糾守命將命也守不失部伍也三曰卿刑上德糾孝德六德也善父母為孝也四曰官刑上能糾職能能其事也職職事脩理也五曰國刑上願糾暴願愨慎也暴當為恭字文誤也, SBCK: ''}
