  - {type: variant, offset: 1724, length: 7, content: 故君子盡心焉傳, SBCK: 末代斷獄之吏皆以苛刻爲明是以􅁗氏網宻秋荼而􅀗罪者衆今天下無事四海乂安欲與公等共行寛政今日刑罰得無枉濫乎太尉無忌對}
  - {type: variant, offset: 1724, length: 1, content: 故, WYG: 末代斷獄之吏皆以苛刻為明是以秦氏網宻秋荼而獲罪者衆今天下無事四海乂安欲與公等共行寛政今日刑罰得無枉濫乎太尉無忌對曰陛下欲致刑網寛平臣下猶不識聖意此法弊已久非止今日若稍存體國即共號癡人意在深文便為能吏所以罪雖合杖必致遣徙理有可生務入於死非憎其人䧟於死刑務取名耳陛下矜而令放法司亦宜固請但陛下喜怒不妄加於人刑罰自然適中髙宗曰卿言之是矣又曰聖歴初天后謂侍臣曰近者朝臣多被周興来俊臣推勘逓相牽引咸自承服國家有法朕豈能違中間疑有枉濫更使近臣就獄親問皆有承引不虛朕不以為疑即可其奏自周興俊臣死後更無聞有反逆者然則已前就􅓍者不有寃濫耶姚元崇對曰自垂拱已後被告身死破家者皆由枉酷自誣而死告者特以為功天下號為羅織甚於漢之黨錮陛下令近臣就獄問者近臣亦不保何敢輒有動揺被問者若翻言懼遭其毒手頼上天降靈聖情發寤誅鋤兇䜿朝廷乂安今日已後臣以㣲軀及一門百口保見在内外官更無反逆者若後徵騐反逆有實臣請受知而不告之罪上大說曰前宰相皆順成其事陷朕為淫刑之主聞卿所說甚合朕心又曰陸象先為益州刺史在官務以寛仁為政司馬韋抱貞言望明公稍行杖罰以立威名不然恐下怠惰無所懼也象先曰為政者理則可矣何必嚴刑樹威損人益己恐非仁恕之道又曰開元三十五年刑部斷獄天下死罪惟有五十八人大理少卿徐㠐上言大理獄院中相傳殺氣太盛鳥雀不棲至是鵲巢具樹於是百僚上表賀以為幾至刑措又曰代宗性仁恕言事者諫曰陛下為政傷於太寛朝典由是不肅上笑而答曰今時運艱難凡人臣事朕者窺少禄利耳今府庫空竭無俸入俾之優足但峻刑科是}
