  - {type: variant, offset: 1727, length: 1, content: 盡, WYG: 曰夫争强之國先争刑令國之輕重者刑也文子曰道狹然後任智徳薄然後任刑明淺然後任察任智者}
  - {type: variant, offset: 1729, length: 2, content: 焉傳, WYG: 亂任刑者上下恐任察者下求善以事其上荘子曰賞罰利害五刑之辟教之末也禮法數度刑名之詳治之末也又曰民為外刑者金與木也為内刑者動與過也宵人之離外刑也金木訊之離内刑也隂陽食之免内外之刑者唯真人能之司馬法}
