  - {type: variant, offset: 3473, length: 270, content: 姓罷弊豪傑犯禁姦吏弄法故重首匿之科著知縱之律宣帝履道要以御海內臣下奉憲不失繩墨天下稱安孝元孝哀即位日淺承相王嘉等猥以數年之間虧除先帝舊約穿令斷律九百餘事臣取其尤妨政者條奏伏謂擇其善而從之以定不易之典時延尉議以為崇刑峻法非明王急務遂罷之又曰梁統對尚書問議刑曰聖帝明王制立刑罰故雖堯舜之盛猶誅四凶經曰天討有罪五刑五用哉又曰爰制百姓于刑之衷孔子曰刑罰不中則民無所措手足措置也衷之為言不輕不重之謂也春秋之誅不避親戚所以防患救亂全安眾庶豈無仁愛之恩貴絕殘賊之路也又曰郎顗上書言今立春之後火卦事用所當溫而寒違反時節由功賞不至而刑罰必加也宜須立秋順氣行罰, SBCK: 三十六}
