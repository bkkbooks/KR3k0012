  - {type: variant, offset: 1733, length: 2, content: 君周, WYG: 王之治從天之道設地之宜乃作五刑以禁民僻乃興甲兵以討不義制瑞節以通使巡狩省方以㑹諸侯考不同正禮月正時歴考不同者正法度齊於天子法度也正禮者上下之禮也月正時歴者月正朔名也時歴時氣正月相應也名文章車服名者爵也文章車服所以顯有徳異尊卑使不踰制度也天子法度不從命為亂常法也比徳逆天之時比敗徳不行也不順時生殺之叙也凡徵師於諸師征之不㑹朝廷聘則劉劉殺也諸侯皆叛不㑹朝廷聘則殺之廢貢職擅稱兵相侵削廢天子之命則黜不從王者法度則征其罪而黜之也改歴史衣服文章易禮變刑則放不奉王法則放之逺方娶同姓以妾為妻變太子専罪大夫擅立關絶降交則幽幽繫慢神省哀奪民之時重稅粟畜貨重則罰暴虐自佚宫室過度官婦過數則削地損爵尹子曰秦穆}
