  - {type: variant, offset: 3227, length: 1, content: 楊, SBCK: 荆州之域春秋及戰國時爲黔中地之南境晉懷帝永嘉元年分荆州置湘州隋平陳改湘州爲潭州史記天官書曰翼􅎮爲楚分傍一小星爲長沙星漢書曰髙帝封畨君吴芮爲長沙王又曰長沙定王發景帝二年立以母微無寵故王卑濕貧國應劭注曰景帝後二年諸王來朝有詔更前稱壽歌儛定王但張䄂小舉手左右􅀏其拙怪問之對曰臣國小地狹不足廽旋帝乃以武陵零陵桂陽屬焉郡國志曰炎帝神農氏葬於長沙長沙之尾東至江夏謂之沙羡是其地十三州志曰西自湘江至東萊萬里故曰長沙湘州記曰始皇二十五年併天下分黔中以南之沙郷爲長沙郡以統湘川蓋取星以名焉遁甲經曰長沙之地雲陽之墟可以長生可以避丗湘中記曰其地有舜之遺風人多純朴今故老猶彈五絃琴好爲漁父吟湖南風土記曰長沙下濕丈夫多夭折俗信􅀑好􅁋祀第蘆爲室頗雜越風岳州十道志曰岳州巴陵郡禹貢荆州之域古三苗國地春秋及戰國時屬楚􅁗屬長沙郡晉分長沙之巴陵置建昌郡在巴陵齊武封子倫爲巴陵王梁封齊明帝子寳義爲巴陵王奉齊後以備三恪隋平陳改爲岳州㝷江記曰羿屠巴虵於洞庭其骨􅀂陵故曰巴陵淮南子曰斬脩蛇于洞庭十道志曰巴陵縣本漢下雋縣之巴丘地漢書地理志曰下雋縣屬長沙郡十道志曰華容縣本漢孱陵縣衡州十道志曰衡州衡陽郡春秋時屬楚􅁗屬長沙郡漢爲􅌕縣地屬長沙國吴分長沙之東部立爲湘東郡隋平陳罷郡爲衡州因衡山以取名尚書禹貢曰荆及衡陽惟荆州甄烈湘州記曰宋大明中望氣者云湘東有天子氣遣日者巡視斬崗以厭之㝷乃湘東王爲天子即明帝也圖經曰荼陵縣者所謂陵谷生茶茗焉永州十道志曰永州零陵縣禹貢荆州之域春秋及戰國時楚之南境􅁗屬長沙郡漢屬長沙國晉以零陵屬湘州隋平陳置永州因永水爲名梁書曰孫謙字長遜爲零陵太守有善績吏人安之先是部多猛獸謙至絶迹及去官之夜猛獸即害居人甄烈湘州記曰石鷰山石形似鷰大小如一山明淨即頡頑飛翔羅含湘中記曰石鷰在泉陵縣雷風則群飛然其土人稀有見者按十道志曰零陵縣本漢泉陵縣道州十道志曰道州江華郡禹貢荆州之域春秋及戰國時屬楚漢屬長沙國唐貞觀八年爲道州圖經曰昔舜封象有鼻國即其地郴州十道志曰郴州桂陵郡禹貢荆州之域春秋及戰國時屬楚􅁗屬長沙郡漢髙祖二年分長沙南境立桂陽郡屬荆州部居郴梁元帝爲盧陽郡屬衡州隋平陳改爲郴州史記曰項羽徙義帝於長沙都郴連州十道志曰連州連山郡春秋時楚地􅁗爲長沙郡之南境二漢爲桂陽郡之桂陽縣吴屬始興郡晉因之宋於此立宋安郡後省齊如之梁爲陽山郡唐武德四年改爲連州以郡南黄連嶺爲名邵州十道志曰邵州邵陽郡禹貢荆}
