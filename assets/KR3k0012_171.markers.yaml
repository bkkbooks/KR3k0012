  - {type: variant, offset: 2449, length: 0, content: '', SBCK: 㑹稽南靣連山萬重北帶滄海千里輿地志曰順帝時陽羡人周嘉上書請分淅江以西爲吴郡東爲㑹稽郡宋略曰㑹稽山隂編户三萬號爲天下繁劇王羲之云毎行山隂道上如鏡中遊王獻之望鏡湖澄澈清流㵼注乃云山川之羙使人應接不暇郡國志曰越王北面以事吴後終滅吴漢志曰㑹稽郡􅁗置髙帝六年爲荆國十二年更名吴景帝四年屬江都領曲阿等縣三十六吴越春秋曰禹巡行天下歸還}
  - {type: variant, offset: 2449, length: 19, content: 大帝以後漢建安十三年使威武中郎將賀齊討, WYG: 歙都尉治屬}
  - {type: variant, offset: 2449, length: 47, content: 大帝以後漢建安十三年使威武中郎將賀齊討丹陽黝歙山賊平定之分歙始新新定黎陽休陽四縣并黝歙六縣圖經, krp: 回浦東部都尉理屬㑹稽郡揚雄解嘲}
  - {type: variant, offset: 2450, length: 1, content: 帝, SBCK: 越㑹計脩國之道}
  - {type: variant, offset: 2452, length: 1, content: 後, SBCK: 㑹計名山仍爲地號也}
  - {type: variant, offset: 2454, length: 18, content: 建安十三年使威武中郎將賀齊討丹陽黝歙, SBCK: 志曰剡縣屬㑹稽莽曰盡忠南史曰張稷爲剡令至􅌘亭生子因名􅌘字四}
