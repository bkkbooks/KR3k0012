  - {type: variant, offset: 347, length: 538, content: 宣城郡禹貢楊州之域春秋時屬吳後屬越越為楚所併戰國時又屬楚秦為鄣郡地漢為丹陽郡地理志曰武帝元狩元年改鄣郡為丹陽郡屬楊州理宛城即今郡是也吳書曰孫皓以牛渚為督以何植為使而禦晉軍當塗有牛渚山桓玄傳曰玄居南州大築齋第以郡在國南故曰南州齊州郡志曰梁承聖元年置南豫州十道志曰隋開皇中改南豫州為宣州漢志曰涇縣屬丹陽郡韋昭曰涇水出蕪湖圖經曰南陵縣有赭圻屯在縣西北晉書曰哀帝以桓溫入參朝政自荊州還至赭坼詔止之遂城赭圻鎮十道志曰南陵有鵲洲春秋左氏傳曰昭五年楚以諸侯伐吳吳敗之於鵲岸吳地也廬江舒縣有鵲尾渚是漢志曰漂陽縣屬丹陽郡漂水所出也又曰當塗侯國屬九江郡莽曰山聚應劭曰禹娶塗山有禹墟焉春秋左氏傳曰禹會諸侯於塗山晉書州郡志曰西晉愍懷之亂琅耶王出鎮楊州因渡江南卜金陵建大業衣冠禮樂州郡邑名並隨渡江從北地當塗來江南自東晉始也金陵記曰姑熟之南淮曲之陽置南豫州六代英雄迭居於此以斯地為上游焉池州圖經曰池州池陽郡禹貢楊州之域春秋及秦漢為鄣郡之地吳為石城縣隋為秋浦縣唐武德中置池州三國志曰吳黃武二年封韓當為石城侯輿地志曰梁昭明太子以其水出魚美故名其水為貴池又曰梁大同二年置石埭因貴池源有兩小石埭堰溪水遂以為名潤州十道志曰潤州丹陽郡禹貢楊州之域春秋時吳國地謂之朱方吳為越所併地屬越戰國時越為楚所滅復屬楚秦併天下為會, SBCK: 㑹}
  - {type: variant, offset: 347, length: 2, content: 宣城, krp: 㑹稽郡禹貢楊州之域春秋時越國春秋元命苞曰牽牛流爲楊州分爲越國史記曰越王勾踐其先禹之苗裔夏后少康之庶子也封於㑹稽以奉守禹之祀文身断髮披草萊而邑焉吴志曰㑹稽南靣連山萬重北帶滄海千里輿地志曰順帝時陽羡人周嘉上書請分淅江以西爲吴郡東爲㑹稽郡宋略曰㑹稽山隂編户三萬號爲天下繁劇王羲之云毎行山隂道上如鏡中遊王獻之望鏡湖澄澈清流㵼注乃云山川之羙使人應接不暇郡國志曰越王北面以事吴後終滅吴漢志曰㑹稽郡秦置髙帝六年爲荆國十二年更名吴景帝四年屬江都領曲阿等縣三十六吴越春秋曰禹巡行天下歸還大越㑹計脩國之道以㑹計名山仍爲地號也漢志曰剡縣屬㑹稽莽曰盡忠南史曰張稷爲剡令至􅌘亭生子因名􅌘字四山漢志曰諸曁縣屬㑹稽郡莽曰䟽虜十道志曰縣有曁浦諸山因以爲名㑹稽志曰龜山之下有東武里即琅耶東武縣山一夕移於此東武人皆從此故里不動歙州十道志曰歙州新安}
