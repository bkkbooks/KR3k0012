  - {type: variant, offset: 352, length: 2076, content: 楊州之域春秋時屬吳後屬越越為楚所併戰國時又屬楚秦為鄣郡地漢為丹陽郡地理志曰武帝元狩元年改鄣郡為丹陽郡屬楊州理宛城即今郡是也吳書曰孫皓以牛渚為督以何植為使而禦晉軍當塗有牛渚山桓玄傳曰玄居南州大築齋第以郡在國南故曰南州齊州郡志曰梁承聖元年置南豫州十道志曰隋開皇中改南豫州為宣州漢志曰涇縣屬丹陽郡韋昭曰涇水出蕪湖圖經曰南陵縣有赭圻屯在縣西北晉書曰哀帝以桓溫入參朝政自荊州還至赭坼詔止之遂城赭圻鎮十道志曰南陵有鵲洲春秋左氏傳曰昭五年楚以諸侯伐吳吳敗之於鵲岸吳地也廬江舒縣有鵲尾渚是漢志曰漂陽縣屬丹陽郡漂水所出也又曰當塗侯國屬九江郡莽曰山聚應劭曰禹娶塗山有禹墟焉春秋左氏傳曰禹會諸侯於塗山晉書州郡志曰西晉愍懷之亂琅耶王出鎮楊州因渡江南卜金陵建大業衣冠禮樂州郡邑名並隨渡江從北地當塗來江南自東晉始也金陵記曰姑熟之南淮曲之陽置南豫州六代英雄迭居於此以斯地為上游焉池州圖經曰池州池陽郡禹貢楊州之域春秋及秦漢為鄣郡之地吳為石城縣隋為秋浦縣唐武德中置池州三國志曰吳黃武二年封韓當為石城侯輿地志曰梁昭明太子以其水出魚美故名其水為貴池又曰梁大同二年置石埭因貴池源有兩小石埭堰溪水遂以為名潤州十道志曰潤州丹陽郡禹貢楊州之域春秋時吳國地謂之朱方吳為越所併地屬越戰國時越為楚所滅復屬楚秦併天下為會稽鄣二郡之地漢初為荊國故荊王劉賈所都之地吳王濞誅以其地併入江都國武帝又分屬丹陽會稽二郡之地左氏傳曰襄王二十八年齊慶封奔吳吳句餘予之朱方後漢書曰建安中吳大帝自吳徙都於京十六年遷都秣陵復於京口置京督以鎮焉吳志曰京督所統蕃衛尤要是以吳為重鎮圖經曰其城因山為壘緣江為境爾雅曰丘絕高曰京因謂之京口吳錄地理曰秦時望氣者云其地有天子氣始皇使赭衣徒三千人鑿坑敗其勢改云丹徒圖經曰丹陽本漢曲阿縣也漢志曰曲阿故雲陽莽曰風美屬會稽郡史記曰秦始皇改雲陽為曲阿輿地志曰曲阿縣屬朱方南徐之境秦有史官奏東南有王氣在雲陽故鑿北岡截直道使曲以猒其氣故曰曲阿又曰丹徒界內土堅緊如蠟諺云生東吳死丹徒言吳多產出可以攝生自奉養丹徒地可以葬吳志曰岑昏鑿丹徒至雲陽而杜野小辛間皆斬絕陵襲功力艱辛杜野屬丹徒小辛屬曲阿圖經曰唐垂拱四年立金山縣後改名金壇取邑界句曲之山金壇之陵以為號真誥曰地胏似洛中北邙山土水似長安丹鳳門外並泉之味河圖曰乃有地胏土良水清句曲之山金壇之陵常州十道志曰常州毗陵郡禹貢楊州之域春秋時屬吳後屬越戰國屬楚秦漢為毗陵縣屬會稽郡輿地志曰晉陵縣春秋時吳之延陵邑也季札讓位耕於此因以封之漢改為毗陵漢志曰毗陵縣屬會稽郡季札所居舊為延陵漢改之也莽曰毗壇輿地志曰東海王越世子名毗中宗為越所表遣渡江故改此為晉陵又曰吳越之間謂荊為楚秦以子楚秦以子楚改為陽羨其地本名小震居在荊溪之北故云陽羨周處風土記曰陽羨本無荊溪吳郡郡境震澤之會也其地理則三江之雄潤五湖之𦚤表吳越春秋曰周改為陽羨漢志曰無錫屬會稽郡莽曰有錫周處風土記曰周武王追封周章於吳又封章小子斌於無錫也圖經曰昔有讖述其地云無錫寧天下平有錫兵天下爭故名之蘇州十道志曰蘇州吳郡禹貢楊州之域周為吳國至闔閭強盛始都於此後為越所滅秦併天下為會稽郡釋名曰吳虞也太伯封於此以虞志也郡國志曰俗好用劍輕死蓋湛盧鏤干將要離之遺風焉東北有海鹽縣復有章山之銅擅三江五湖之利亦江東一都會也越絕書曰闔閭起姑蘇臺三年聚材五年乃成高見三百里漢志曰吳屬會稽郡周太伯所邑也具區澤在其西王莽曰秦位十道志曰嘉興縣本秦由拳縣也漢志曰由拳屬會稽郡應劭曰古之檇里檇子遂反吳錄地里志曰吳王時此地本名長水秦改曰由拳續漢志曰屬吳郡吳黃龍五年嘉禾生於由拳改縣曰禾興後以太子名和改曰嘉興圖經曰華亭縣本嘉興縣地天寶十年置因華亭谷為名晉書曰陸機被誅臨刑歎曰華亭唳鶴不可得聞輿地志曰吳大帝以陸遜為華亭侯以其所居為封也華亭谷出佳魚蒓菜故陸機云千里蓴羹未下鹽豉湖州十道志曰湖州吳興郡禹貢楊州之域防風氏之國也春秋時為吳地後屬越越為楚所滅後屬楚秦漢屬會稽郡國語魯語曰吳伐越隳會稽獲骨節專車骨節長專檀一車也吳子使來好聘且問於仲尼曰骨何為大仲尼曰禹戮防風氏其骨節專車客曰防風何守也仲尼曰汪芸氏之君也守封禺之山汪芸長翟國名封嵎山在吳郡永安縣郡國志曰五湖之表州以為名也漢志曰烏程屬會稽郡有歐陽亭郡國志曰古有烏氏程氏居此能醞酒故以名縣地理志曰武康縣本烏程之餘下鄉地漢末童謠曰天子當興東南三餘之間吳乃改會稽之餘暨為永興分餘不為永安以協謠言吳興記曰長城縣吳王闔閭使弟夫概居此築城狹而長晉武帝置縣因長城以名縣杭州十道志曰杭州餘杭郡禹貢楊州之域春秋時吳越地秦漢屬會稽郡史記曰楚威王伐越殺王無疆盡取故吳地至浙江又曰始皇三十七年東遊丹陽至錢塘漢志曰錢塘屬會稽郡西部都尉治王莽曰泉亭劉道真錢塘記曰昔縣境逼近江流縣在靈山下至今基趾猶存郡議曹華信乃立塘以防海水募有能致土石者即與錢及成縣境蒙利乃遷此地於是為錢塘縣漢志曰於朁屬丹陽郡朁音潛吳錄地里志云縣西朁山蓋因山以立名舊朁字無水至隋加水漢志曰餘杭屬會稽郡莽曰進睦吳興記曰秦始皇三十七年將上會稽塗出此因立為縣郡國志曰夏禹東去捨杭登陸於此仍以為名十道志曰鹽官本漢海由拳二縣境漢志曰海鹽屬會稽郡故武原鄉有鹽官睦州十道志曰睦州新定郡禹貢楊, WYG: 揚}
