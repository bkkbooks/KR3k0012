  - {type: variant, offset: 3826, length: 3, content: 會稽吳, krp: 南郡巫縣今䕫州巫山縣是也吴晉及周爲沙渠之地隋於此置清江縣播州十道志曰播州播川郡秦夜郎縣之西南隅惠王十四年欲得楚黔中地以武關之外易之今隷黔府即惣謂黔中地漢武元鼎六年平西南夷置牂牁郡其地屬焉以且蘭有掾舡牂牁因此立郡以名焉貞觀九年於北界置郎州後省十三年又於其地置播州以其地有播川因名焉漢書曰唐蒙上書說武帝曰聞夜郎國有精兵可十餘萬浮舟䍧牁岀其不意以制越此一竒也珎州十道志曰珎州夜郎郡古山獠夜郎國之地晉永嘉五年}
