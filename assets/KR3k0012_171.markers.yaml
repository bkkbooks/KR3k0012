  - {type: variant, offset: 27, length: 3, content: 滅吳為, SBCK: 歙明台處温婺衢潭岳衡永道郴連邵黔思費辰錦溪叙施播珎夷葉溱}
  - {type: variant, offset: 27, length: 313, content: 滅吳為越地後楚滅越其地又屬楚初置金陵邑秦併天下改金陵為秣陵屬鄣郡漢元封二年改鄣郡為丹陽郡漢志曰故鄣屬丹陽郡王莽曰侯望金陵圖云昔楚威王見此有王氣因埋金以鎮之故曰金陵秦併天下望氣者言江東有天子氣鑿地斷連岡因改金陵為秣陵吳志曰孫權欲興都未定長史張紘勸都之後劉備宿於秣陵亦勸權都之遂定議都秣陵建康圖曰西晉亂元帝自廣陵渡江此城荒落以府第居縣北幕府之名自此而立尋以江寧為琅耶國蓋襲帝始封之名也歷宋齊梁陳六代皆都之輿地志曰金陵有東府城晉安帝時築其城西本簡文為會稽弟其東則丞相會稽王道子府謝安石薨以道子代領楊州州在弟故時人號為東府西州圖經曰金陵有古冶城本吳鑄冶之地也晉書曰元帝太興初以王導疾久方士戴洋曰君本命在甲申地有冶金火相爍遂移冶於石城宣, WYG: ''}
