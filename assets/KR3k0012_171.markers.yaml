  - {type: variant, offset: 3852, length: 261, content: 因建溪為名方輿志曰浦城縣本漢東候官之北鄉也吳永安三年改為吳興縣圖經曰晉尚書陸邁梁尚書郎江淹皆為吳興令按淹自序云吳興地在東南嶠外閩越之舊境是也福州福州圖經曰勾踐六代孫為楚所併其後有無諸以其境南泉山之地因而都之稱閩越王至孫繇又以東海隅之地稱越王俱是會稽之域遂有三越之稱圖經曰梁承聖二年封蕭基為長樂侯於此十道志曰福州長樂郡亦閩越地秦為閩中郡漢高帝立無諸為閩越王都於此晉置晉安郡陳置閩州唐開元十三年為福州開元錄曰閩州越地即古東甌今建州亦其地皆蛇種有五姓謂林黃等是其裔郡國志曰漢武元鼎六年立都尉居候官以禦兩越所謂東北一尉西南一候也泉, SBCK: 葉}
