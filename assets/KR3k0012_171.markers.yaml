  - {type: punctuation, offset: 2671, content: 、, id: KR3k0012_CHANT_171-bkkpn989}
  - {type: variant, offset: 2671, length: 0, content: '', SBCK: 水出焉成帝鴻嘉二年爲廣德國王莽曰愬虜師古曰􅉳音伊字與黟同晉書曰孔愉字敬康㑹稽人永嘉之亂避地入新安山谷中以稼穡讀書爲業信著郷里後奄忽而去人皆以爲神爲之立廟孔靈村梁書曰任昉爲新安太守調楓香二石始入三兩便止不欲遺之後人及下任唯有桃花米二十石圖經曰續溪縣以界内乳溪與徽溪相去一里廻轉屈曲並流離而復合謂之續溪縣因名焉圖經曰任昉爲新安太守因行春至此愛其雲溪縁源㝷幽累日不返百姓因名其溪爲昉溪村名昉村又曰新安貢柿心墨木􅉳之字縣職此之由又曰祈門縣本名閶門著於􅁗}
