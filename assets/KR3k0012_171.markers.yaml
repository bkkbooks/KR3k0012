  - {type: variant, offset: 3313, length: 1, content: 臨, SBCK: 黔中郡禹貢荆州之域戰國爲楚黔中地􅁗昭王伐楚置黔中郡其地又屬焉漢武陵郡之酉陽縣地武陵五溪蠻之西界也周武帝保定四年蠻帥田思鶴以地内附置奉州建德三年改爲黔州吴録曰黔陽屬武陵郡黔陽今辰州三亭縣西故城是也思州十道志曰思州寜夷郡禹貢荆州之域春秋楚地隋開皇十八年始置務川縣屬庸州唐武徳元年以務川當䍧牁要路置務州貞觀八年改爲思州因思卭水爲名費州十道志曰費州涪}
