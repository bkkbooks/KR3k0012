  - {type: variant, offset: 2842, length: 1, content: 鄱, SBCK: 餘姚郡古舜爲餘姚之墟史記曰越王勾踐平呉徙夫差於甬東漢志曰餘姚屬㑹稽郡本鄮縣之地風土記曰舜支庶所封故曰餘姚輿地志曰邑人以其海中物産於山下鄮易因名鄮縣圖經曰鄮縣有角東及句章故城台州十道志曰台州古越州㑹稽郡之地禹貢楊州之域春秋時越國􅁗屬閩中郡後越王無疆七代孫閩君揺率越人佐漢伐􅁗惠帝録其功封姚爲東越王都於甌山海經曰甌在海中郭璞注云今臨海永寜縣即東甌故地也􅀂在南海中鬱林郡爲西甌吴地記曰漢書閩越圍東甌東甌告急於天子天子遣太中大夫嚴助發兵徃救未至閩越止兵東甌乃舉國徙中國處之江淮間而後遺人徃徃漸岀乃以東甌地爲回浦縣漢志曰回浦東部都尉理屬㑹稽郡􅀭雄解嘲曰東南一尉西北一候十道志曰唐武徳四年討平李子通於臨海縣置海州五年改海州爲台州處州圖經曰處州縉雲郡古縉雲之墟也􅁗爲㑹稽郡地漢􅀄爲東甌地後以爲回浦縣光武更名章安晉分爲永嘉郡輿地志曰永嘉郡本㑹稽東郡地晉明帝太寜元年分臨海等五永嘉郡圖經曰麗水縣有惡道惡道有突星瀬謝靈運與弟書曰聞惡道溪中九十九里有五十九灘永嘉記曰王右軍遊惡道歎其竒絶遂書突星瀬於石輿地志曰松陽縣本章安南郷漢末立爲縣吴地記曰縣東南臨大溪有松陽樹大八十一圍腹中空可容三十人坐故取此爲名王右軍嘗徃看之永嘉記曰青田縣有草葉似竹可染碧名爲竹青此地所豐故名青田浮丘公相鶴經曰青田之鶴温州十道志曰温州永嘉郡㑹稽之東境也漢永建四年置永寜縣郡國志曰永嘉爲東甌鬱林爲西越斯地蠶一年八熟圖經曰永嘉縣漢冶縣之地後漢改爲章安縣漢志曰冶本閩越地屬㑹稽郡㜈州十道志曰㜈州東}
