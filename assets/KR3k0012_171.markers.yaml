  - {type: variant, offset: 2718, length: 117, content: 夏口亦名魯口沙陽夏汭鄂渚新興釣渚皆其地名武昌記曰大帝築城於江夏以程普為太守遂欲都鄂州改為武昌郡其民謠曰寧飲建業水不食武昌魚寧歸建業死不向武昌居繇是徙都建業齊書曰劉懷珍言於高帝夏口兵衝要地宜得其人遂令柳世隆鎮焉十道志曰江夏縣本漢沙羨縣饒, SBCK: 之明}
