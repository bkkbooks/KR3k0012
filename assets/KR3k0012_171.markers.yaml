  - {type: variant, offset: 2436, length: 11, content: 秦屬丹陽郡漢為歙縣地吳, SBCK: 春秋元命苞曰牽牛流爲楊州分爲越國史記曰越王勾踐其先禹之苗裔夏后少康之庶子也封於㑹稽以奉守禹之祀文身断髮披草萊而邑焉吴}
  - {type: page-break, offset: 2436, content: '', id: KR3k0012_SBCK_171-1b}
  - {type: variant, offset: 2436, length: 0, content: '', WYG: 春秋元命苞曰牽牛流為揚州分為越國史記曰越王勾踐其先禹之苗裔而夏后帝少康之庶子也封於㑹稽以奉守禹之祀文身斷髮披草萊而邑焉吳志曰㑹稽南面山萬重北帶滄海千里輿地志曰順帝時陽羡人周嘉上書請分浙江已西為吳郡東為㑹稽郡宋略曰㑹稽山隂編戸三萬號為天下繁劇王羲之云每行山隂道上如鏡中遊王獻之望鏡湖澄澈清流㵼注乃云山川之美使人應接不暇郡國志曰越城無北面以示伐吳後終滅吳漢志曰㑹稽郡秦置髙帝六年為荆國十二年更名吳景帝四年屬江都領曲阿縣三十六吳越春秋曰禹廵行天下歸還於越㑹計脩國之道以㑹稽名山漢志曰剡縣屬㑹稽南史曰張稷為剡令至嵊亭生子因名嵊字四山漢志曰諸暨縣屬㑹稽郡莽曰疏虜十道志曰縣有暨浦諸山因以為名㑹稽志曰龜山之下有東武里即琅琊東武縣山一夕移於此東武人皆徙此故立不動歙州十道志曰歙州新安郡禹貢揚州之域春秋時屬越}
  - {type: page-break, offset: 2436, content: '', id: KR3k0012_WYG_171-2b, image: WYG0894/WYG0894-0540d.png}
