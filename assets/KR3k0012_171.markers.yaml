  - {type: variant, offset: 2446, length: 1, content: 吳, krp: 也若在南海中鬱林郡爲西甌吴地記曰漢書閩越圍東甌東甌告急於天子天子遣太中大夫嚴助發兵徃救未至閩越止兵東甌乃舉國徙中國處之江淮間而後遺人徃徃漸岀乃以東甌地爲回浦縣漢}
