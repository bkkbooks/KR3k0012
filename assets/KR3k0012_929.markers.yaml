  - {type: variant, offset: 112, length: 2, content: 荷葉, SBCK: 光曰龍者獸之君大人利見之象易曰見龍在田德施普也斯誠明將軍道合靈和德符幽契願將軍勉之以成大慶光有喜色又曰馮跋弟素弗與從兄萬泥及諸少年遊于水濵有一金龍浮水而下素弗謂萬泥曰頗有見不萬泥等皆曰無所見也乃取龍而示之咸以爲非常之瑞又曰雷奐子華度襄水劒躍入水化爲龍又曰􅀄桓温南州起齋悉􅀞龍於其}
