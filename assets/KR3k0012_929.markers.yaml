  - {type: variant, offset: 227, length: 241, content: 譟鳥晝伏夜翔或時晝出則群鳥譟之山海經曰有五采之鳥有冠名曰狂鳥孔融周歲論曰儀鳳屯集狂鳥穢之爾雅曰鶨䳢老郭璞注曰鴒鶨也俗謂之癡鳥鶨音丑眷切說文曰欺老鶨也左思蜀都賦曰鷩鴺山栖綦母遂注曰鷩鴺鳥名如今山鷄其色班其鶵色異出江東莊子曰周周衘羽以濟河司馬彪注周周河士鳥也頭重尾輕是以衘他鳥羽如飛過何人之不可求益於物以補其所短也笁法真登羅山䟽曰越王鳥狀似鳶口句末可受二升許南人以為酒器珍於文螺不踐地不飲江湖不唼百草木餌蟲魚唯噉木葉糞似董陸香山人遇之既以為香又治雜瘡南方草物志曰有鳥或名越王鳥大如孔雀喙, SBCK: 中見黒龍}
