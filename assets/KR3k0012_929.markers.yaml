  - {type: variant, offset: 1577, length: 457, content: 渠之山有鳥名曰囂食之已腹痛可以止衕治衕下也又曰陽山有鳥自為牝牡名曰象虵又曰廆山有鳥名曰鴒鶢鈴要兩音其鳴自呼服之不眯又曰丑陽山有鳥名曰䳅鵌可以衛火又曰翼望山有鳥狀如烏三首六尾其名曰鵸䳜倚餘兩音服之使人不眯又以禦凶又曰青要山有鳥名曰鴢音窈窀之窈也狀如烏青身而朱目赤尾食之宜子又曰攻離山有鳥名曰嬰勺其狀如鵲赤喙白身其尾若勺似勺形其鳴自呼又曰鳥名青耕可以禦疫又曰天帝山有鳥其狀如鶉黑文而赤翁翁領下毛名曰櫟食之已痔又曰翏山有鳥名鸓音畾其狀如鵠而兩首四足又曰北囂山有鳥狀如人面名曰𪄀𪂇夜飛而晝伏又曰太行山有鳥焉其狀如鵲白身赤尾六足其名䴅䴅音奔又曰馬城山有鳥狀如烏白首而身黃足其名曰鶌居食之不飢又曰號山有鳥名寓狀如鼠又曰夢聯之山有鳥群居而多飛其毛如雌雉名曰鵁鳥音交或作獨又曰畢張山有鳥狀如雉而文首白翼黃足名曰白䲽食之已嗌又曰小侯山有鳥其狀如烏而白文名曰鴣𪄶姑習兩音又曰北號山有鳥其狀如鷄而白首鼠足虎爪名曰魁雀食人又曰羭次山有鳥狀如梟人面而一足名曰橐𩇯音肥冬夏蟄服之不畏雷看其毛羽令人不畏雷鳥卵左傳哀公下曰子西曰勝如卵余翼而張之漢, SBCK: ''}
