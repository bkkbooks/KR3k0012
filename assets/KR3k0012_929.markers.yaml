  - {type: variant, offset: 5, length: 4, content: 眾鳥異物, SBCK: 年黃龍見成紀下詔召臣爲愽士東觀漢記曰公孫述有龍出其府殿中夜有光耀述以爲符瑞因稱尊號改元曰龍興後漢書曰哀牢夷其先有婦人捕魚水中觸沉木有孕生男子十人沉木化爲龍出水上九男驚走一兒不去背龍因䑛之後諸兒推爲哀牢主魏}
