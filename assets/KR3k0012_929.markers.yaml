  - {type: variant, offset: 2038, length: 1, content: 時, SBCK: 郄后素妬忌及終化爲龍入于後宫井通夢於帝或見形光彩照灼帝體將不安龍輙激水騰涌於是井上爲殿衣服委積南史曰梁江陵城壕中有龍騰出煥爛五色竦躍入雲六七小龍相隨飛去羣魚騰躍墜死於道龍出處爲窟􅀂數百斛圌音遄三國典略曰陸法和拒任約至安南入赤亭湖法和乗輕舟不介胄㳂流而下去約軍一里乃還謂將士曰彼龍睡不動吾軍之龍其能踊躍􅀂待明日攻之當不損客而自破賊陳書曰隨師濟江荆州吕肅敗後別師廖世寵領}
