  - {type: variant, offset: 2665, length: 241, content: 經以清才聞羅含傳云吞飛鳥卵吳氏本草曰丹鷄卵可作虎珀張衡南都賦曰春卵夏笋張孟陽洛禊賦曰浮素卵以蔽水洒玄醪於中河鳥巢尚書大傳曰古人鳳皇巢其樹好生惡殺說文曰鳥在木上曰巢在穴曰窠魯子曰鷹鸇以太山為下而增巢其上孫卿子曰古之王者烏鵲之巢可俯莊子曰古者禽獸多而人民少於是民皆巢居以避之晝拾象粟暮栖木上故命之曰有巢氏之民又曰鵲上高城之墉而巢於高枝之顛城壞陵風而起又曰至德之君烏鵲之巢可攀援而窺淮南子曰鵲巢知風之所起言鵲作巢而知風一說背風也陸賈新語堯以仁義為巢舜以稷禼為杖秦以刑罰為巢故有覆巢破卵之患, SBCK: ''}
