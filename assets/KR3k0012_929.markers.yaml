  - {type: variant, offset: 1119, length: 457, content: 莖契一度即解米百錢再度二百未契仍五十隨契多少以占知之爾雅曰鸄唐屠郭璞注曰以鳥蒼白色臨海異物志曰𪋞爝鳴聲哀俗云繼母欲嫁因使人守之母遂不還兒因呼母言𪋞鴆也又曰遊鳥如鵝大其色黑以青絲頭繫竹竿呼之即來入手俗言是東海神所養不可食也臨海異物志曰獨𡛿鳥如隼其色黑其鳴如人呼鷄聲爾雅曰鷚天籥也南方草物狀曰金吉鳥其大如小母鷄臨海異物志曰有鳥耀儀名曰苦姑又曰除溪鳥小如鴝鵒甚黑天欲陰雨即鳴音言溪瀆又曰祖端端小鳥天欲雨即鳴抱朴子曰千秋鳥人面壽如其名魯連子曰南方鳥名曰邽生而食其翼南方草物狀曰羽鳥毛羽青黑色小於鳩俞益期與韓豫章牋曰林邑有鳥名歸飛臨海異物志曰賓師形大如鴝鵒毛正黑色廣雅曰車攝鷦禮也山海經曰基山有鳥焉名𪁺鵃食之無臥又曰北海虵山有五采鳥飛蔽一鄉名曰翳鳥又曰青丘有鳥其狀如鳩名曰灌灌又曰禱過之山有鳥二足三面名瞿如又曰松果山有鳥名䳋渠又曰上申山鳥名當扈狀如雉食之不眴目又曰符遇之山其鳥名鴖可以衛火又曰英山有鳥狀如鶉食之已癘名曰肥遺又曰宰塗山有鳥名曰數斯食之已癭又曰崑崙丘有鳥名曰欽原蠹獸則死蠹木則枯又曰灌題山有鳥見人則躍名曰竦斯又曰, SBCK: 夢竟驗}
