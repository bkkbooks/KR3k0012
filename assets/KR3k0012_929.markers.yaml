  - {type: variant, offset: 2450, length: 0, content: '', SBCK: 山中辰日稱雨師者龍也又曰西域方士能神祝者臨淵禹歩吹氣龍即出浮其􅀄出乃長十數丈於是方士更吹之一吹則龍輙一縮至長數寸方士乃掇取著壷中或有四五龍以少水飬之以踈物塞壷口於是方士聞有旱處便賫龍徃賣之一龍直數十斤金舉國㑹歛以雇之直畢乃發壷出一龍着淵潭之中因復禹歩吹之輙一吹一出長數十丈湏叟雲雨四集又曰有自然之龍有虵蠋化成之龍又曰夏時龍生於太廟之中說苑曰呉王欲從民飲酒伍子胥諌曰不可昔白龍下清冷之淵化爲魚漁且豫且射中其目白龍上訴天帝曰當是之時􅀂安置而形白龍對曰我下清冷之淵化爲魚天帝曰魚固人之所射也􅀂罪豫且何罪夫白龍天帝貴畜也豫且宋國之賤臣也白龍不化豫且不射今棄萬乗之位而從布衣之士飲酒臣恐其有豫且之患矣王乃止吕氏春秋曰禹南濟江黃龍􅀒舟人懼五色無主禹􅀏曰吾受命於天竭力以飬人奈何憂於龍龍弭耳而逃又曰晉文返國介子推不肯受賞自爲詩賦曰有龍于飛周徧天下五虵從之爲之承輔龍反其郷得其處所四虵從之得其露雨一虵着之死於中野懸書公門而伏山下文公聞之曰嘻此必介子推家語曰鱗蟲三百六十而龍爲長水之怪龍罔象夏食而冬蟄皇甫謐帝王丗紀曰太昊包犧氏風姓有景龍之瑞故以龍紀官又曰黃帝采首山銅鑄鼎荆山下有龍垂胡髯而下迎黃帝羣臣欲從持龍髯髯㧞遂墮說文曰龍鱗蟲之長能幽能明能小能大能短能長春分而登天秋分而入淵山海經曰}
  - {type: page-break, offset: 2450, content: '', id: KR3k0012_SBCK_929-8a}
  - {type: page-break, offset: 2450, content: '', id: KR3k0012_SBCK_929-8b}
  - {type: variant, offset: 2450, length: 0, content: '', WYG: 山中辰日稱雨師者龍也又曰西域方士能神咒者臨淵禹步吹氣龍即出浮其初出乃長十數丈於是方士更吹之一吹則龍輒一縮至長數寸方士乃掇取著壺中或有四五龍以少水養之以疎物塞壺口於是方士聞有旱處便齎龍往賣之一龍直數十斤金舉國㑹斂以顧之直畢乃發壺出一龍着淵潭之中因復禹步吹之輒一吹一出長數十丈須臾雲雨四集又曰有自然之龍有虵蠋化成之龍又曰夏時龍生于太廟之中說苑曰吳王欲從民飲酒伍子胥諫曰不可昔白龍下清泠之淵化為魚漁者豫且射中其目白龍上訴天帝曰當是之時若安置而形白龍對曰我下清泠之淵化為魚天帝曰魚固人之所射也若罪豫且何罪夫白龍天帝貴畜也豫且宋國之賤臣也白龍不化豫且不射今棄萬乗之位而從布衣之士飲酒臣恐其有豫且之患矣王乃止吕氏春秋曰禹南濟江黄龍負舟人懼五色無主禹笑曰吾受命于天竭力以養人奈何憂於龍龍俯而去又曰晉文返國介子推不肯受賞自為詩賦曰有龍于飛周遍天下五虵從之為之承輔龍反其鄉得其處所四蛇從之得其雨露一蛇羞之槁死中野懸書於門而伏山下文公聞之曰嘻此必介子推也家語曰鱗蟲三百六十而龍為長水之恠龍岡象夏食而冬蟄皇甫謐帝王世紀曰太昊包犧氏風姓有景龍之瑞故以龍紀官又曰黄帝采首山銅鑄鼎荆山下有龍垂胡髯而下迎黄帝羣臣欲從持龍髯髯㧞遂墮說文曰龍鱗蟲之長能幽能明能小能大能短能長春分而登天秋分而入淵山海經曰}
