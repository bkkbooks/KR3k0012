  - {type: variant, offset: 3, length: 0, content: '', WYG: 一龍上河圖曰舜以太尉即位與三公臨觀黄龍五采負圖出置舜前以黄玉為押白玉檢黄金繩黄芝為泥章曰黄帝符璽春秋運斗樞又曰黄金千歳生黄龍青金千歳生青龍赤金千歳生赤龍白金千歳生白龍元金千歳生元龍又曰黄龍從雒水出詣虞舜鱗甲成字舜令寫之寫竟去星經曰東方七宿為蒼龍歸藏明夷曰昔夏后啟夢乗飛龍以登於天睪陶占之曰吉周易乾卦曰雲行雨施品物流形時乗六龍又曰坤卦龍戰于野其血元黄又文言曰雲從龍又說卦曰震為龍易通卦騐曰立夏清風至而龍升天尚書中候曰黄龍負卷舒圖又曰青龍銜元圖大戴禮冠曰鱗蟲三百六十而龍為之長禮記禮運曰龜龍在宫沼龍以為蓄故魚鮪不淰淰潛藏也龍含文嘉曰龍馬金玉帝王之瑞也左傳昭五曰鄭大水龍鬭于時門之外洧淵國人請為禜焉子産不許曰我鬪龍不我覿也龍鬭我獨何覿焉禳之則彼其室也吾無求於龍龍亦無求於我乃止又昭七曰秋龍見於絳郊魏獻子問于蔡墨曰吾聞之蟲莫智於龍以其不生得也謂之智信乎對曰人實不智非龍實智言人實不智而謂之智非龍智也乃不智也古者畜龍故國有豢龍氏有御龍氏豢養也昔有飂叔安飂古國也安其君名也有裔子曰董父裔逺也元孫之後為裔也實甚好龍能求其嗜欲以飲食之龍多歸之乃擾畜龍以服事帝舜帝賜之姓曰董氏曰豢龍故帝舜氏世有畜龍氏及有夏孔甲擾于有帝帝賜之乗龍河漢各二各有雌雄孔甲不能食而未獲豢龍氏有陶唐氏既衰其后有劉累學擾龍于豢龍氏以事孔甲能飲食之夏后嘉之賜氏曰御龍以更豕韋之後龍一雌死潛􅊽以食夏后嘉之既而使求之懼而遷于魯縣龍水物也水官棄矣故龍不生得春秋元命苞曰龍之言萌也隂中之陽故言龍舉而雲興史記曰昔夏后氏之衰有神龍二止於夏帝庭而言曰余褒之二君也夏帝殺之卜徙去之與止之莫吉卜請其漦而藏之吉又曰黄帝得土徳黄龍見夏得木徳青龍止於郊漢書曰惠帝二年正月兩龍見蘭陵人家井中又曰文帝時公孫臣以為漢土徳黄龍見張蒼以為水徳至}
