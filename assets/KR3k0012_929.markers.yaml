  body:
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 一龍上河圖曰舜以太尉即位與三公臨觀黃龍五采􅀒圖出置舜前以黃玉爲押白玉檢黃金繩黃芝爲泥章曰黃帝符璽春秋運斗樞同又曰黃金千歳生黃龍青金千歳生青龍赤金千歳生赤龍白金千歳生白龍玄金千歳生玄龍又曰黃龍從雒水出詣虞舜鱗甲成字舜令冩之冩竟去星經曰東方七􅀫爲蒼龍凢有鱗之􅀋皆屬於木故龍爲鱗蟲之長歸藏明夷曰昔夏后啓土乗龍飛以登于天睪臯陶占之曰吉周易乾卦曰雲行雨施品物流形時乗六龍又曰坤卦龍戰于野其血玄黃又文言曰雲從龍又說卦曰震爲龍易通卦驗曰立夏清風至而龍昇天尚書中候曰黃龍􅀒卷舒圖又曰青龍衘玄圖大戴禮冠曰鱗蟲三百六十而龍爲之長禮記禮運曰􅀛龍在宫沼龍以爲畜故魚鮪不淰淰潛藏也禮含文嘉曰龍馬金玉帝王之瑞也左傳昭五曰鄭大水龍􅋐于時門之外洧淵國人請爲榮焉子産不許曰我􅋐龍不我覿也龍􅋐我獨何覿焉穰之則彼其室也吾無求於龍龍亦無求於我乃止又昭七曰秋龍見於綘郊魏獻子問於蔡墨曰吾聞之蟲莫智於龍以其不生得也謂之智信乎對曰人實不智非龍實智言人實不智而謂之智非龍智也乃不智也古者畜龍故國有豢龍氏有御龍氏豢養也昔有飂叔安飂古國也安其君名也有裔子曰董父矞逺也玄孫之後爲裔也實甚好龍能求其􅄝欲以飲食之龍多歸之乃擾畜龍以服事帝舜帝賜之姓曰董氏曰豢龍故帝舜氏丗有畜龍氏及有夏孔甲擾于有帝帝賜之乗龍河漢各二各有雌雄孔甲不能食而未獲豢龍氏有陶唐氏旣衰其後有劉累學擾龍于豢龍氏以事孔甲能飲食之夏后嘉之賜氏曰御龍以更豕韋之後龍一雌死潜醢以食夏后嘉之旣而使求之懼而遷于魯縣龍水物也水官弃矣故龍不生得春秋元命苞曰龍之言萌也隂中之陽故言龍舉而雲興史記曰昔夏后氏之衰有神龍二止於夏帝庭而言曰余襃之二君也夏帝卜殺之徙去之與止之莫􅁻卜請其漦而藏之吉又曰黃帝得土德黃龍見夏得木德青龍止於郊漢書曰惠帝二年正月兩龍見蘭陵人家井中又曰文帝時公孫臣以爲漢土德黃龍見張蒼以爲水德至}
