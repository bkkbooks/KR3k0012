  - {type: page-break, offset: 4257, content: '', id: KR3k0012_SBCK_500-8b}
  - {type: variant, offset: 4257, length: 0, content: '', krp: 大母乃不敢復使之又曰石崇厠有十餘婢侍列莫不畢備又與新衣出客多羞不能如厠王敦大將軍往脫故衣着新衣意慠然群婢謂曰此客必能作賊又曰宗岱爲青州刺史禁淫祀著無鬼論甚精莫能屈後有書生詣岱岱與談論書生乃振衣而去曰絶我輩血食二十餘年君有青牛髯奴所以未得相困耳奴已叛牛巳死今日得相制矣言絶而失明日而岱亡搜神記曰諸葛恪已𬒳殺其妻在室問婢曰汝何故血臭婢蹷然起躍至于棟攘臂切齒而言曰諸葛恪公乃爲孫峻所殺又曰晉杜丗嘏家葬而婢誤不得出十餘年開墓而婢尚生云其始如眠有頃漸覺自謂一再宿𥘉婢之埋年十五六及開冢更生猶十五六也嫁之有子續搜神記曰勾章張然滯役在都有少婦}
