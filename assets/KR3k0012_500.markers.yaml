  - {type: variant, offset: 808, length: 231, content: 有光耀者只使墮亦不能中傷其人曰奈地壞何對曰地積塊耳充塞四虛何憂其壞其人大喜荀卿子曰宋之愚人得燕石於梧臺之東歸而藏之以為大寶周客觀之掩口而笑曰此燕石也其與瓦甓不差主人大怒曰商賈之言醫匠之口藏之愈固守之彌謹莊子曰人有畏影惡跡而去之走者舉足愈數而跡愈多走疾而影不離自以為尚遲疾走不休絕力而死韓子曰燕李季好遠出其妻有士李季至士在內中妻患之乃令士裸而解髮直出門曰吾屬陽不見也於是士從其計疾走出門季曰是何人也家室皆曰無有季曰吾見鬼也季婦曰為之奈何然取五牲之矢浴之季曰諾乃浴矢, SBCK: ''}
