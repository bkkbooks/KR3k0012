  - {type: variant, offset: 2389, length: 969, content: 杜之善曰聞事君者內其祿而外其身今所養母者君之祿也請往死之比至朝三廢車中其僕曰子懼何不返也杜之善曰懼吾私也死君公也吾聞君子不以私害公遂往死也家語曰或問孔子曰顏淵何人曰仁人也丘弗如也子貢何人曰辯人也丘弗如也子路何人曰勇人也丘弗如也客曰三子者皆賢於夫子而服役何也孔子曰丘能仁且忍辯且訥勇且怯以三子之能易丘之道弗如也史記曰管仲曰吾嘗三戰三走鮑叔不以我為怯知我有老母也又曰淮陰屠中少年有侮韓信者曰若雖長大好帶劍中情怯耳眾辱之曰能死剌我不能出我跨下信視之俛出跨下匍匐一市人皆笑信怯也尸子曰聖人畜仁而不主仁畜智而不主智畜勇而不主勇昔齊桓公脅於魯君而獻地勾踐脅於會稽而身宮之趙襄子脅於智伯而以顏為愧其卒桓公臣魯君勾踐滅吳襄子以智伯為戮此謂勇而能怯者也盜竊易繫辭曰慢藏誨盜冶容誨淫又曰負且乘致寇至盜之招也禮記月令曰季秋行冬令則國多盜賊左傳僖中曰介之推曰竊人之財猶謂之盜況貪天之功以為己力乎又昭五年曰鄭子產有疾謂子太叔曰我死子必為政唯有德者能以寬服民其次莫如猛太叔為政不忍猛而寬鄭國多盜取人於雚蒲之澤太叔悔之曰吾早從夫子之言不及於此興徒兵以攻雚蒲之盜盡殺之盜少止論語顏淵曰季康子患盜問於孔子孔子對曰茍子之不欲雖賞之不竊家語曰子貢為信陽宰將行辭於孔子孔子曰勤之慎之奉天之時無奪無伐無暴無盜子貢曰賜也少事君子豈以盜為累哉孔子曰爾未之詳夫以賢代不賢是之謂奪以不肖代賢是之謂伐緩令急誅是之謂暴取善自與是之謂盜非竊財之謂也史記曰秦昭王囚孟嘗君謀欲殺之孟嘗使人抵昭王幸姬求解姬曰妾願得君狐白裘此孟嘗有一狐白裘直千金天下無雙入獻昭王無他裘孟嘗患之偏問客莫能對最下座為狗盜者曰臣能得乃夜為狗以入秦宮藏中取所獻狐白裘至以獻秦幸姬幸姬為言昭王釋孟嘗君又曰有盜高廟座前玉環捕得文帝怒下廷尉治之張釋之案律盜宗廟服御物者奏當棄市耳漢書曰彭越字仲昌邑人常漁鉅野澤中為盜又曰龔遂字少卿山陽人恭帝時渤海左郡歲飢盜賊並起二千石不能擒制上選能治者御史舉遂可用上以為渤海太守問曰渤海廢亂君欲何以息盜賊對曰海濱遐遠不沾聖化其民困於飢寒而吏不恤故使弄陛下之兵於潢池中耳今欲使臣勝之耶將安之也臣聞理亂民如理亂繩唯緩之而後可吳志曰孫堅與父之錢塘會海賊胡王等取賈人財物岸上分之堅追斬一級晉書曰蔡裔有勇氣嘗二盜入裔不知拊床一呼二盜俱殞又曰王獻之夜臥齋中而有偷入其室盜物獻之徐曰偷兒青氈我家舊物可特置之群偷驚走, SBCK: ''}
