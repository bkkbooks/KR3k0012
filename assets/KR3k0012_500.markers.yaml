  - {type: variant, offset: 4340, length: 0, content: '', WYG: 之具以告主人殺其妻將納婢以為妻婢辭欲自殺主父乃厚幣嫁之列女後傳曰㑹稽翟素者翟氏之女受聘未及配適遭賊欲犯之臨以刃曰不從者今即死矣素曰我可得而殺不可得而辱素婢名青青乞代素賊遂殺素復欲犯青青曰向欲代素者恐被恥獲害耳今素已死我豈有欲哉賊復殺之漢王褒僮約曰蜀郡王褒以事止寡婦楊惠舍有一奴名便倩行酤酒便曰大夫買便時但要守家不約為他家男子酤酒也褒大怒曰寧欲賣耶奴復曰欲使便皆當上券不上券便不能為也褒乃為券曰奴百役不得有二言晨起早掃飲食洗滌居當守舊縳帚裁盂鑿斗出入不得騎馬載車蹎坐大呶下牀振頭垂釣刈蒭織履作麤黏雀張鳥結網捕魚繳雁彈鳬登山射鹿入水捕龜緩園縱魚雁鶩百餘驅逐鴟鳥持稍牧猪種薑養羊長育豚駒糞除堂廡飲食馬牛鼓四起坐夜半益蒭舍中有客提壺行酤汲水作餔滌杯整壺奴但當飯豆飲水不得嗜酒欲飲美酒唯得染唇口不得傾盂覆斗不得晨出夜入交闗伴偶多取蒲茅益作繩索雨墮無所為當編蔣織植種桃李梨柿柘桑三丈一樹八尺為行果類相從縱横相當果熟收斂不得吮嘗犬吠當起驚告鄰里槍門柱户上樓繫柝持楯曳矛還落三周勤心疾作不得遨遊奴老力索種莞織席事訖欲休當舂一石夜半無事浣衣當白若有錢私主給賔客奴不得有奸私事當聞白奴不聽敎當笞一百讀券文訖辭窮咋索仡仡}
