  - {type: punctuation, offset: 4355, content: 「, id: KR3k0012_CHANT_500-bkkpn1409}
  - {type: variant, offset: 4355, length: 0, content: '', SBCK: 梁兾愛􅁥奴秦宫官至太倉令得出入妻所每見輙屏御者託以言事因通焉内外兼寵刺史二千石皆謁拜之扶風人士孫奮居冨兾從貸錢五千萬奮以三千萬與之兾大怒乃告郡縣認奮母爲守臧婢云盗白珠十斛紫磨金千斤以叛遂牧考奮兄弟死於獄中悉没貨財顧譚別傳曰譚爲太常録尚書事從交州家無私積奴婢不滿十人杜蘭香傳曰晉太康中蘭香降張碩爲詩贈碩云縱轡代摩奴湏􅁷就尹喜摩奴是香御車奴曽忤其旨是以自御碩􅀃如此異録傳曰廬陵歐明啇行經彭澤湖每以物投湖中爲禮後見湖中}
  - {type: page-break, offset: 4355, content: '', id: KR3k0012_SBCK_500-9a}
  - {type: variant, offset: 4355, length: 0, content: '', krp: 梁兾愛監奴秦宫官至太倉令得出入妻所每見輙屏御者託以言事因通焉内外兼寵刺史二千石皆謁拜之扶風人士孫奮居冨兾從貸錢五千萬奮以三千萬與之兾大怒乃告郡縣認奮母爲守臧婢云盗白珠十斛紫磨金千斤以叛遂牧考奮兄弟死於獄中悉没貨財顧譚別傳曰譚爲太常録尚書事從交州家無私積奴婢不滿十人杜蘭香傳曰晉太康中蘭香降張碩爲詩贈碩云縱轡代摩奴湏臾就尹喜摩奴是香御車奴曽忤其旨是以自御碩說如此異録傳曰廬陵歐明啇行經彭澤湖每以物投湖中爲禮後見湖中}
  - {type: variant, offset: 4356, length: 1, content: 盜, SBCK: 吏着單衣乗馬云青洪君使要明過至一府舎吏曰青洪感君以禮必有重送者皆勿取但求如願明從之青洪君不得巳呼如願送明去如願者神婢也所願輙得數年大冨列女傳曰周室大夫仕於周妻媱於隣人恐主父還􅁴之爲毒藥使媵婢進之婢恐進之則殺主父言之則殺主母因僵仆覆酒主父怒而笞之妻恐婢言之因他過欲殺婢婢就杖將死而不言主父之弟聞之具以告主人殺其妻將納婢以爲妻婢辝欲自殺主父乃厚幣嫁之列女後傳曰㑹稽翟素者翟氏之女受娉未及配適遭賊欲犯之臨以刄曰不從者今即死矣素曰我可得而殺不可得而辱素婢名青青乞代素賊遂殺素復欲犯青青曰向欲代素者恐彼耻獲害耳今素巳死我豈有欲哉賊復殺之漢王褒僮約曰蜀郡王褒以事止寡婦楊惠舎有一奴名便倩行酤酒便曰大夫買便時但要守家不約爲他家男子酤酒也褒大怒曰寧欲賣耶奴復曰欲使便皆當上劵不上劵便不能爲也褒乃爲劵曰奴百役不得有二言晨起早掃飲食洗滌居當穿臼縛帚裁盂鑿斗出入不得􅀐馬載車踑坐大呶下床振頭垂鈎刈蒭織履作麤黏雀張鳥結網捕魚繳鴈彈鳬登山射鹿入水捕􅀛後園縱魚鴈鶩百餘驅逐䲻烏持梢牧猪種薑養羊長育豚駒糞除堂廡飲馬食牛鼓四起坐夜半益芻舎中有客提壷行酤汲水作餔滌杯整按奴但當飯豆飲水不得􅄝酒欲飲美酒唯得染脣口不得傾盂覆斗不得晨出}
