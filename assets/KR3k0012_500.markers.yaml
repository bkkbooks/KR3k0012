  - {type: variant, offset: 349, length: 4, content: 為私蝦蟆, SBCK: 郎有戲之曰奴價倍婢納曰百里奚何必輕於五羖皮又曰劉惔性簡貴與王羲之雅相友善郄愔有傖奴善知文章羲之愛之每稱奴于惔惔問何如方回耶羲之曰小人耳何比郄公惔曰􅀂不如方回故常奴耳又曰桓温自以雄姿風氣是宣帝劉琨之儔有以比王敦者意甚不平及是征還於北方得一巧作老婢訪之乃琨妓女也一見温便澘然而泣温問其故荅曰公甚似劉司空温大恱出外整理衣冠又呼婢問之婢云脣甚似恨薄眼甚似恨小􅁂甚似恨赤形甚似恨短聲甚似恨雌温}
