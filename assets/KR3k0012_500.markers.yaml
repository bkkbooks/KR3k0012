  - {type: variant, offset: 405, length: 292, content: 達律令見律有梟首之罪乃生斷其手以水澆之然後斬決尋坐伏法時人哀兵之苦笑鴻貴之愚續晉陽秋曰顧愷之夜於月下長詠自云得先賢風製謝瞻遙稱讚之愷之得此彌自力忘倦瞻將眠語搥腳人令代焉愷之不覺其異遂幾旦而後止沈約宋書曰劉義綦封營道縣侯凡鄙無識知每為始興王濬兄弟所戲濬常謂義綦曰陸士衡詩曰營道無烈心其何意苦阿父如此義綦曰下官初不識士衡何忽見苦廣陵列士傳曰吳武字季濟篤學好師事陳仲考子升性頑愚考曰父子情重不忍戮之卿為吾教也趙書曰石肇前石之昆弟也前石既貴肇在軍中不能自達人送詣前石前石哀之拜建威將軍以肇無才力每高選參佐輔之為娉廣川劉典兄女肇甚懼之拜長樂太守治官每入門動稱阿劉教可爾不可爾時人以為嗤謠鬻子曰愚, SBCK: 怡}
