  - {type: variant, offset: 1094, length: 451, content: 又曰宋人有耕者田中有株兔走觸株折頸而死因釋耕而守株為宋國笑今欲以先王之政治當世民皆守株之心也呂氏春秋曰范氏之亡也百姓有得鍾者欲負之則鍾大不可負以搥毀之恐人聞而奪己也遽掩其耳惡人聞也又曰楚人有涉江者其劍自舟中墜於水遽刻其舟曰是吾劍之所從墜處舟止從其所刻入水求之淮南子曰楚人有東家母死其子哭而不悲西家子見之歸謂其母曰社何憂速死吾必悲哭社淮南間謂母為社又曰故聖人同死生愚人亦同死生聖人同死生通於分理也愚人之同死生不知利害之所在也符子曰鄭人有逃暑於孤林之下者日流影移而徙衽以從陰及至暮反席於樹下及月流影移復徙衽以從陰而患露之濡於身其陰逾去而其身逾濕是巧於用晝而拙於用夕奚不處曜而辭陰反林息露此亦愚之至也笑林曰漢司徒崔烈辟上黨鮑堅為掾將謁見自慮不過問先到者儀適有荅曰隨典儀口唱既謁讚曰可拜堅亦曰可拜讚者曰就位堅亦曰就位因復著履上座將離席不知履所在讚者曰履著腳堅亦曰履著腳也又曰平原陶丘氏取渤海墨台氏女女色甚美才甚令復相敬已生一男而歸母丁氏年老進見女婿女婿既歸而遣婦婦臨去請罪夫曰曩見夫人年德已衰非昔日比亦恐新婦老, SBCK: ''}
