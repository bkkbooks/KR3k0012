  - {type: variant, offset: 27, length: 5, content: 惟盤石千里, SBCK: 仙人李八伯者欲授唐公房仙術乃爲作傭客身作惡瘡膿潰臰惡使公房夫人䑛之瘡愈乃授以丹經一卷奴婢􅀃文曰奴婢皆古之罪人也方言曰荆淮海岱雜齊之間俗}
  - {type: variant, offset: 27, length: 5, content: 惟盤石千里, WYG: 仙人李八伯者欲授唐公房仙術乃為作傭客身作惡瘡膿澮臭惡使公房夫人䑛之瘡愈乃授丹經一卷奴婢説文曰奴婢皆古之罪人也方言曰荆淮海岱雜齊之間俗不純為雜罵奴曰臧罵婢曰獲齊之北鄙燕之北郊凡民男而婢聓謂之臧女而婦奴謂之獲亡奴謂之臧亡婢謂之獲皆異方罵奴婢之醜稱也周禮天官上酒人職曰女酒三十人奚三百人女酒女曉酒者凡徒男女入縣曰官奴其少財知者以為今之侍吏官奴是也又秋官上司厲職曰其奴男子入於罪𨽻女子入于舂槀鄭司農云謂為盜賊而為奴者輸于罪𨽻舂人槀人之官也由是觀之今之奴婢古之罪人也凡有爵者與七十者與未齔者皆}
