  - {type: variant, offset: 2033, length: 355, content: 室清謹見知齊高帝輔政彥節知運柞將遷密懷異圖及沈攸之舉兵齊高帝入屯朝堂袁粲鎮石頭潛與彥節及諸大將黃回等謀夜會石頭詰旦乃發彥節素怯騷擾不自安再晡後便自丹楊郡車載婦女盡室奔石頭臨去婦蕭氏強勸令食彥節歠羹寫胸中手振不自禁事敗被殺趙書曰石勒屯葛陂值天雨不息勒長史刁應勸勒降晉勒啾然而嘯張賓勸勒還北勒欣然曰賓計是也應宜斬明其性怯可退為將軍孫卿子曰夏首之南有人曰涓濁梁其為人愚善畏明月而霄行俯見其影以為伏鬼仰見其髮以為伏魅匍踣而走比至其家失氣而死慎子曰有勇不以怒反與怯均也呂氏春秋曰夫民無常怯有義則實實則勇無氣則虛虛則怯怯勇虛實其所由甚微不可不知淮南子曰怯者夜見立表以為鬼見寢石以為兕懼掩其氣也掩奪也抱朴子曰拙人得工輸之斤斧不能以成雲梯怯者得馮婦之刀戟不能以格兕虎也智怯韓詩外傳曰楚白公之難有杜之善者辭其母將死君其母曰死君可, SBCK: 勝逹}
