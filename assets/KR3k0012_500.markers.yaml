  - {type: variant, offset: 1546, length: 365, content: 必復如此是以遣實無他故崔駰與竇憲牋曰文淺而言深者愚也在賤而望貴者惑也如愚論語為政曰吾與回言終日不違如愚退而省其私亦足以發回也不愚又公治長曰甯武子邦有道則智邦無道則愚其智可及其愚不可及也華陽國志曰王長文字德俊天姿聰警察孝廉不就遂陽愚嘗著綘衣帽牽豬過市中乞人與語偽不聞常騎牛周遊說苑曰齊桓公獵逐鹿入谷中見一老公問是為何谷對曰為愚公之谷以臣名之臣故畜牸生子大賣之而買馬少年曰牛不能生馬遂持駒去家鄰以臣為愚故名愚公之谷愚怯釋名曰怯脅也見敵恐脅也崔贛易林曰任將力薄駑孱思怯如蝟見鵲不敢拒格韓詩外傳曰崔杼殺莊公陳不占東觀漁者聞君有難將往死之飡則失哺上車失軾僕曰敵在數百里外今食則失哺上車失軾雖往其有益乎陳不占曰死君義也無勇私也遂驅車比至門聞鍾鼓之音鬭戰之聲遂駭而死君子聞之曰陳不占可謂志士矣無勇而能行義天下鮮矣東觀漢記曰杜篤仕郡文學掾以目疾二, SBCK: ''}
