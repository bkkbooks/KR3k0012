  - {type: variant, offset: 338, length: 2, content: 官地, WYG: 所擇使者曰君侯服御麗矣然本受上命索緑珠不識孰是崇勃然曰緑珠吾所愛不可得也秀遂誅崇又曰郭璞愛主人奴無由而得乃取小豆三斗遶主人宅散之主人晨起見赤衣人數千圍其家就之則滅甚惡之請璞為卦璞曰居家不宜畜此奴可於東南二十里賣之慎勿爭價則此患可除也主人從之璞隂令人賤買此奴復為符投井}
