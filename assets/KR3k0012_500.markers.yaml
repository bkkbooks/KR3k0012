  - {type: variant, offset: 220, length: 1, content: 文, SBCK: 防兄廖廖子孫三家奴婢千人又曰鄧引字叔紀奴醉擊長壽亭長亭長將詣第白之引即見亭長賞錢五千異日奴復與宫中衛士忿爭衛士歐箠奴引問復賞五千又曰朱暉爲郡督郵太守阮况當嫁女欲買暉婢不與及况卒暉送金三斤人問其故暉曰前不與婢者恐以財貨汙府君耳今重送者以明巳心也又曰祝良爲洛陽令常侍樊豐妻殺侍婢置井中良收其妻殺之又曰韓卓臘日奴竊食􅀕其母卓義其心即日勉之魏志曰晉室踐阼下詔曰故司空}
