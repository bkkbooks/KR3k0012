  - {type: variant, offset: 3382, length: 0, content: '', SBCK: 死者左車輙下馬斬首率以爲常又曰德宗􅀄即位詔曰邕府歳貢奴婢使其離父母之郷絶骨􅁏之戀非仁也罷之又曰羅讓累遷至福建觀察使兼御史中丞甚著仁惠有以女奴遺讓者讓訪其所自曰夲某寺家人兄姉九人皆爲官所鬻其留者唯老母耳讓慘然焚其丹書以}
  - {type: page-break, offset: 3382, content: '', id: KR3k0012_SBCK_500-6b}
  - {type: variant, offset: 3382, length: 0, content: '', WYG: 死者左車輒下馬斬首率以為常又曰德宗初即位詔曰邕府歲貢奴婢使其離父母之鄉絶骨肉之戀非仁也罷之又曰羅讓累遷至福建觀察使兼御史中丞甚著仁惠有以女奴遺讓者讓訪其所自曰本某寺家人母姊九人皆為官所鬻其畱者唯老母耳讓慘然焚其丹書以}
  - {type: page-break, offset: 3382, content: '', id: KR3k0012_WYG_500-10b, image: WYG0897/WYG0897-0510d.png}
  - {type: variant, offset: 3382, length: 0, content: '', krp: 死者左車輙下馬斬首率以爲常又曰德宗𥘉即位詔曰邕府歳貢奴婢使其離父母之郷絶骨肉之戀非仁也罷之又曰羅讓累遷至福建觀察使兼御史中丞甚著仁惠有以女奴遺讓者讓訪其所自曰夲某寺家人兄姉九人皆爲官所鬻其留者唯老母耳讓慘然焚其丹書以}
  - {type: variant, offset: 3383, length: 0, content: '', SBCK: 其母又曰李􅀇道累遷給事中封姑臧縣男時王君廓爲幽州都督朝廷以其武將不習時事拜玄道幽州長史以維持府事廓在郡屢爲非法玄道數正議裁}
  - {type: variant, offset: 3383, length: 0, content: '', WYG: 其母又曰李元道累遷給事中封姑臧縣男時王君廓為幽州都督朝廷以其武將不習時事拜元道幽州長史以維持府事君廓在郡屢為非法元道數正議裁}
  - {type: page-break, offset: 3383, content: '', id: KR3k0012_WYG_500-11a, image: WYG0897/WYG0897-0511a.png}
  - {type: variant, offset: 3383, length: 0, content: '', krp: 其母又曰李玄道累遷給事中封姑臧縣男時王君廓爲幽州都督朝廷以其武將不習時事拜玄道幽州長史以維持府事廓在郡屢爲非法玄道數正議裁}
