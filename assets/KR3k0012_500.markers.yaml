  - {type: variant, offset: 3784, length: 282, content: 取隨會為政而君盜奔秦焉又曰牛缺者上地之大儒之邯鄲遇盜於耦沙之中盡取其衣車牛步而去視之欣然無憂怯之色盜追而問其故曰君子不以所養害其所以養盜曰嘻賢失矣往彼見趙君以我為事必困乃相與追而殺之又曰東方有人曰爰旌目將有所適而餓於道狐父之盜曰丘見而下壺飡以餔之爰旌目三餔而後能視曰子能何為者也曰我狐父之人丘也爰旌目曰嘻女非盜耶胡為而食我吾義不食子之食也兩手據地而歐之不出喀喀然而死淮南子曰楚將子發好求伎道之士有善為偷者往見曰聞君求伎道之士臣楚市偷也願以伎該一卒子發見而禮之無幾何齊興師伐楚子發將師以當之兵三卻於是市偷請曰臣有薄伎願君行之子發曰諾偷則夜出解齊將軍之綢帷而獻之子發使, SBCK: 免冠}
