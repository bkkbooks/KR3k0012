  - {type: variant, offset: 882, length: 663, content: 其與瓦甓不差主人大怒曰商賈之言醫匠之口藏之愈固守之彌謹莊子曰人有畏影惡跡而去之走者舉足愈數而跡愈多走疾而影不離自以為尚遲疾走不休絕力而死韓子曰燕李季好遠出其妻有士李季至士在內中妻患之乃令士裸而解髮直出門曰吾屬陽不見也於是士從其計疾走出門季曰是何人也家室皆曰無有季曰吾見鬼也季婦曰為之奈何然取五牲之矢浴之季曰諾乃浴矢又曰鄭有人身買履者先自度其足而買之及至市得履乃曰吾忘度乃歸取之頃返市罷遂不得履人曰何不試以足曰寧信度數無自信也又曰宋人有耕者田中有株兔走觸株折頸而死因釋耕而守株為宋國笑今欲以先王之政治當世民皆守株之心也呂氏春秋曰范氏之亡也百姓有得鍾者欲負之則鍾大不可負以搥毀之恐人聞而奪己也遽掩其耳惡人聞也又曰楚人有涉江者其劍自舟中墜於水遽刻其舟曰是吾劍之所從墜處舟止從其所刻入水求之淮南子曰楚人有東家母死其子哭而不悲西家子見之歸謂其母曰社何憂速死吾必悲哭社淮南間謂母為社又曰故聖人同死生愚人亦同死生聖人同死生通於分理也愚人之同死生不知利害之所在也符子曰鄭人有逃暑於孤林之下者日流影移而徙衽以從陰及至暮反席於樹下及月流影移復徙衽以從陰而患露之濡於身其陰逾去而其身逾濕是巧於用晝而拙於用夕奚不處曜而辭陰反林息露此亦愚之至也笑林曰漢司徒崔烈辟上黨鮑堅為掾將謁見自慮不過問先到者儀適有荅曰隨典儀口唱既謁讚曰可拜堅亦曰可拜讚者曰就位堅亦曰就位因復著履上座將離席不知履所在讚者曰履著腳堅亦曰履著腳也又曰平原陶丘氏取渤海墨台氏女女色甚美才甚令復相敬已生一男而歸母丁氏年老進見女婿女婿既歸而遣婦婦臨去請罪夫曰曩見夫人年德已衰非昔日比亦恐新婦老, WYG: ''}
