  - {type: variant, offset: 3384, length: 0, content: '', WYG: 嘗又遺元道一婢元道問婢所由云本良家子為君廓所掠元道因放遣之管子曰齊桓}
  - {type: variant, offset: 3384, length: 0, content: '', krp: 甞又遺玄道一婢玄道問婢所由云夲良家子爲君廓所掠玄道因放遣之管子曰齊桓}
