  - {type: variant, offset: 3369, length: 11, content: 徐龕勇果薄行舊為劫盜者, krp: 慕容冲進逼長安堅登城觀之歎曰此虜何從出也其强若斯大言責冲曰尔輩群奴正可牧牛羊何爲送死冲曰奴則奴矣旣猒奴苦復欲取尓見代唐書曰哥舒翰有家奴曰左車年十五六亦有膂力翰善使槍追賊及之以槍搭其肩而喝之賊驚顧翰從而刺其喉皆剔髙三丈而墮}
