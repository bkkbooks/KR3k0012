  - {type: variant, offset: 4178, length: 8, content: 王安期為東海太守, SBCK: 賈公問女恱韓壽問婢識不一婢云是其故主女内懷存想婢後往壽家􅀃如此壽乃令婢通巳意女大喜遂與通丗􅀃曰鄭玄家奴婢皆讀書􅀇甞使一婢不稱旨將撻之方自陳􅀃􅀇怒使人曵著􅅺中湏􅁷復一婢來問曰胡爲乎􅅺中荅曰薄言往訴逢彼之怒誥林曰裴秀年十八有令望母是婢而嫡母妬猶令秀母親役後大集客秀母下食衆賔見並起拜之荅曰微賤豈冝如此當爲}
  - {type: page-break, offset: 4178, content: '', id: KR3k0012_SBCK_500-8a}
  - {type: variant, offset: 4178, length: 0, content: '', WYG: 賈公閭女悦韓壽問婢識否一婢云是其故主女内懐存想婢後往壽家説如此壽乃令婢通己意女大喜遂與通世説曰鄭𤣥家奴婢皆讀書𤣥嘗使一婢不稱㫖將撻之方自陳説𤣥怒使人曳著泥中須臾復一婢來問曰胡為乎泥中答曰薄言往愬逢彼之怒語林曰裴秀年十八有令望母是婢而嫡母妬猶令秀母親役後大集客秀母下食衆賔見並起拜之答曰微賤豈宜如此當為小兒故耳於是大母不敢復使之又曰石崇厠有十餘婢侍列莫不畢備又與新衣出客多羞不能如厠}
