  - {type: variant, offset: 4178, length: 8, content: 王安期為東海太守, krp: 賈公問女恱韓壽問婢識不一婢云是其故主女内懷存想婢後往壽家說如此壽乃令婢通巳意女大喜遂與通丗說曰鄭玄家奴婢皆讀書玄甞使一婢不稱旨將撻之方自陳說玄怒使人曵著泥中湏臾復一婢來問曰胡爲乎泥中荅曰薄言往訴逢彼之怒誥林曰裴秀年十八有令望母是婢而嫡母妬猶令秀母親役後大集客秀母下食衆賔見並起拜之荅曰微賤豈冝如此當爲}
  - {type: variant, offset: 4179, length: 2, content: 安期, WYG: 敦大將軍往脱故衣着新衣意氣傲然羣婢謂曰此客必能作賊又曰宗岱}
  - {type: variant, offset: 4182, length: 13, content: 東海太守小吏盜池中魚綱紀推, WYG: 青州刺史禁淫祀著無鬼論甚精莫能屈後有書生詣岱與談論書生乃振衣而去曰絶我輩廟食二十餘年君有青牛髯奴所以未得相困耳奴已叛牛已死今日得相制矣言絶而失明日而岱亡搜神記曰諸葛恪已被殺其妻在室問婢曰汝何故血臭婢蹙然後躍至于棟攘臂切齒而言曰諸葛恪公乃為孫峻所殺又曰晉杜世嘏家葬而婢誤不得出十餘年開墓而婢尚生云其始如眠有頃漸覺自謂一再宿初婢}
