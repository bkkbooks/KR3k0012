  - {type: variant, offset: 2501, length: 80, content: 度安為十五為成帝侍郎善鼓琴趙后悅之白上得出入御內絕見愛幸常著輕絲履招風紫綈裘與后同居又曰成帝好蹙鞠群臣以勞體非尊者所宜帝曰可擇似而不勞者奏之劉向作彈碁以獻帝大悅, SBCK: 三公朔}
  - {type: variant, offset: 2501, length: 80, content: 度安為十五為成帝侍郎善鼓琴趙后悅之白上得出入御內絕見愛幸常著輕絲履招風紫綈裘與后同居又曰成帝好蹙鞠群臣以勞體非尊者所宜帝曰可擇似而不勞者奏之劉向作彈碁以獻帝大悅, krp: 三公朔}
  - {type: variant, offset: 2506, length: 798, content: 為成帝侍郎善鼓琴趙后悅之白上得出入御內絕見愛幸常著輕絲履招風紫綈裘與后同居又曰成帝好蹙鞠群臣以勞體非尊者所宜帝曰可擇似而不勞者奏之劉向作彈碁以獻帝大悅賜青羔裘紫絲履拾遺錄曰周昭王綴青鳳毛為二裘一名煩質一名暄風可以禦寒也至厲王流于彘人得而奇之以裂此裘遍彘罪人大辟者抽裘一毛以贖死價直萬金也五經要義曰古者著裘於內而以繒衣覆之乃加以朝服會之時祖其朝服見裘裒覆衣謂之禓之言露可見之辭所以示美呈好而為飾加以朝服謂之襲祖謂之禓大裘不覆反本以其質也又曰諸侯黼裘以誓田新羔狐為黼文也白虎通曰裘所以佐女工助溫也古者緇衣羔裘黃衣狐裘禽獸眾多獨以狐羔取其輕暖因狐死首丘明君子不忘本也羔取其跪乳遜順也帝王世紀曰夏禹時渠搜國來獻褐裘也春秋後語曰淳于髡見鄒忌曰狐裘雖獘不可補以黃犬之皮忌曰諾謹受教請擇君子無雜小人其間戰國策曰蘇秦說李兌兌送秦黑貂裘黃衣百鎰又曰蘇秦詣秦王上書十上而說不行黑貂之裘弊黃金百鎰盡形容枯槁及歸妻不為下機嫂不為炊又曰或謂孟嘗君曰太廟之椽非一木之枝也千鎰之裘非一狐之裘也吳越春秋曰延陵季子適齊見路有遺金當夏五月有披裘而薪者季子呼取金薪者曰吾五月披裘而薪資以金者哉外國圖曰毛民國出名裘去朔方七千里十洲記曰漢武帝天漢三年西國獻吉光裘色黃蓋神馬之類入水不沉入火不灼管寧別傳曰寧字幼安至孝每祭祀未嘗不伏地流涕恒著布裳貂裘會稽典略曰魏朗字少英為郡功曹佐正旦掾吏顧龕被裘以加朝服朗以裘非臣服龕不敬勃卒撤去龕恚而不聽朗右手鳴鼓左手撤裘以聞府君喜朗遂退龕以朗代之朗辭病不就語林曰謝萬就安乞裘云畏寒荅曰君妄語正欲以為豪具耳若畏寒無復勝綿者以三十斤綿與謝世說曰謝萬與安共詣簡文萬來無衣幘可前簡文曰俱但前不須衣幘即呼使入萬著白綸布鵠氅裘履板而前共談移日大器重之宋玉風賦曰主人之女被翠雲之裘崔寔四民月令曰囊蟲並興以灰藏氈裘魏武與楊彪書曰今贈足下錦裘二領魏文與孫權書曰今因趙咨致文馬一疋鼲子裘一領王昶家戒曰止寒莫若重裘止謗莫若自脩, WYG: ''}
