  - {type: variant, offset: 378, length: 396, content: 公衍羔裘使獻龍輔於齊侯龍輔玉名遂入羔裘齊嘉與之陽穀陽穀齊色又傳曰齊侯伐晉夷儀東郭書讓登犂彌從之齊侯賞犂彌辭曰有先登者臣從之晳幘而衣貍製晳白也幘齒上下相值製裘也公使視東郭書曰乃夫子也論語曰緇衣羔裘素衣麑裘黃衣狐裘褻裘長短右袂周禮曰司裘掌為大裘以供王祀天之服仲秋獻良裘季秋獻功裘良善也仲秋鳥獸毛毬因良時而用之功裘人功做麤謂孤青麛裘之屬也大裘廞裘飾皮車廞涇也鄭司農云涇裘陳裘也又曰宮伯掌王宮之士庶子庶子宿衛之言月終則均秩歲終則均敘以時頒其衣裘史記曰秦昭王囚孟嘗君欲殺之孟嘗使人抵昭王幸姬求解姬曰妾願得君狐白裘此時孟嘗君有一狐白裘直千金天下無雙入秦獻之昭王更無他裘孟嘗君患之客最下坐為狗盜者曰臣能得狐白裘乃夜為狗盜以入秦宮藏中取所獻裘奉姬姬為言於王王釋孟嘗君漢書曰賈誼上書諫文帝曰天下咸知陛下之義臥赤子天下之上而安植遺腹朝委裘服虔曰言天下安雖赤子遺腹在位猶不危也孟康曰委裘若容衣太子未坐朝事先帝衣裘也, SBCK: 董賢}
