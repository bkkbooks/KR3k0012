  - {type: variant, offset: 2629, length: 372, content: 裘遍彘罪人大辟者抽裘一毛以贖死價直萬金也五經要義曰古者著裘於內而以繒衣覆之乃加以朝服會之時祖其朝服見裘裒覆衣謂之禓之言露可見之辭所以示美呈好而為飾加以朝服謂之襲祖謂之禓大裘不覆反本以其質也又曰諸侯黼裘以誓田新羔狐為黼文也白虎通曰裘所以佐女工助溫也古者緇衣羔裘黃衣狐裘禽獸眾多獨以狐羔取其輕暖因狐死首丘明君子不忘本也羔取其跪乳遜順也帝王世紀曰夏禹時渠搜國來獻褐裘也春秋後語曰淳于髡見鄒忌曰狐裘雖獘不可補以黃犬之皮忌曰諾謹受教請擇君子無雜小人其間戰國策曰蘇秦說李兌兌送秦黑貂裘黃衣百鎰又曰蘇秦詣秦王上書十上而說不行黑貂之裘弊黃金百鎰盡形容枯槁及歸妻不為下機嫂不為炊又曰或謂孟嘗君曰太廟之椽非一木之枝也千鎰之裘非一狐之裘也吳越春秋曰延陵季子適齊見路有遺金當夏五月有披裘而薪者季子呼取金薪者曰吾五月披裘而薪資以金者哉外國圖曰毛民國出名裘去朔方七千里十洲, SBCK: 北疆}
