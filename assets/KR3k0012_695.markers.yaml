  - {type: variant, offset: 1302, length: 2, content: 唐邕, SBCK: 承相司馬任胄主簿李丗林都督鄭仲禮房子逺等潜謀害神武自魏氏舊俗以正月十五日夜爲打蔟戲能中者即時賞帛胄令仲禮藏刀於袴中因神武臨觀謀􅀼發後敗韓子曰鄭人卜子使妻爲袴曰冩吾故袴妻因鑿新袴爲孔效之又曰韓昭侯使人藏弊袴侍者曰君上不以賜左右而藏之昭侯曰吾聞明主之愛一嚬一􅀏有爲嚬而嚬有爲􅀏而􅀏今袴豈特嚬􅀏哉嚬􅀏不妄爲袴豈可無㓜而與之吾必侍有功者故藏之事具賞賜門塩鐵論曰古者鹿裘皮帽及其後大夫士狐狢庶人則毛袴髙士論曰孫略冬日見貧士脱袴遺之列士傳曰孟嘗君食客三千人上客食􅁏中客食魚下客食菜馮援經冬無袴面有飢色郭子曰孫興公道曹輔佐才云白地明光錦裁爲􅀒板袴非文綵然酷無裁製俗􅀃曰謝仁祖年少時喜着刺文袴出郊郭外其叔父誚責之仁祖於是自改遂爲名流董巴輿服志曰祀宗廟絳袴示赤心奉神也搜神記曰晉中興作袴者直幅爲口無殺不大夫裁也王敦之徴東宫舊事曰皇太子納妃有絳直文羅袴七綵杯文綺袴鄴中記曰石虎獵着金縷合歡袴廣州先賢傳曰申朔}
