  - {type: variant, offset: 1726, length: 742, content: 之水非一源千鎰之裘非一狐又曰晉文公好士之惡衣故文公之臣皆䍧裘列子曰林類年且百歲書傳旡聞蓋古之隱士底春而裘於畦底當也秦青子曰有千金之裘而無千金之布田休子曰渠搜之人服夏禹德獻其珍裘毛出五彩光曜五色又曰少昊氏都於曲阜鞬鞮毛人獻其羽裘韓子曰齊有盜狗子與胡跪子相誇盜狗子曰吾父之裘獨有尾胡跪子曰吾父冬夏獨有一足袴又曰堯之王天下也冬則鹿裘夏則葛絺又曰孫叔敖相楚衣羖羊裘又孔藂子曰田子方遺孔子思狐白裘也符子曰為千金之裘而與狐謀之其皮不可得呂氏春秋曰天下無粹白之狐而有粹白之裘粹純取之於眾白也又曰孔子始用於魯魯人謗之曰麛裘而𩏂投之無戾𩏂而麛裘投之無郵用三年男行乎途左女行乎途右物之遺者民莫之舉淮南子曰夫夏日之不披裘者非愛之也煖有餘於身也裘與蓑孰急見雨則裘不用上堂則蓑不御此代為帝者代更帝王貴也白狐之裘天子之被也而在朝堂然為狐計者不若走於澤披羊裘而賃固其事也狐裘而負籠甚可怪也抱朴子曰狐白不可以當暑說苑曰晉平公使叔嚮聘吳吳人飾舟以逆左右各五百人有繡衣而貂裘者說苑曰林既衣韋衣而朝齊景公曰此君子服耶既作色曰服何足以端士行如君言衣狗裘當犬號羊裘當羊鳴乎今君衣狐意得無變乎又曰千金之裘非一狐之皮也說苑曰晉平出朝有鳥環平公不去平公謂師曠曰吾聞之霸王之主鳳下之今者出朝有鳥環寡人終朝不去是其鳳鳥耶曠對曰東方有鳥名諫珂其為鳥也文身而赤足憎鳥而愛狐今者君必衣狐裘以朝乎平公曰然又曰趙簡子獘車瘦馬衣羖羊之裘其宰曰車新則安馬肥則疾狐裘則溫君宜改之簡子曰君子服善則益恭小人服善則益踞新序曰魏文侯出遊見反裘負芻者問之對曰愛毛者文侯曰爾不知皮盡而已無所附耶明年東陽上計其布十倍大夫賀之文侯曰民不憎而稅倍亦何異反裘負芻者厚取於下則上不安此自危之道也子何用賀乎新論曰振裘時領萬毛皆整潛夫論曰扶夫私計以論公政與狐議裘無時可得也西京雜, SBCK: ''}
