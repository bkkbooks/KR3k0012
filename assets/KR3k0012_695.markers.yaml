  - {type: variant, offset: 800, length: 3, content: 祭彤為, SBCK: 來歙詣雒見上上大喜解所􅀍䄡􅃭衣賜歙又曰第五倫性節儉爲二千石常衣布􅃭又曰梁鴻妻孟氏女布􅃭袴裙鴻曰此真梁鴻妻也魏志曰管寜常着皂帽布􅃭隨時單複晉令曰旄頭羽林着韋􅆎􅃭齊書曰武陵昭王曄過竟陵王子良宅冬月道逢乞人脫􅃭與之子良見曄衣單進􅃭於曄曄曰我與向人亦復何異梁書曰頋恊少清介有志操􅀄爲廷尉正冬服單薄寺卿蔡法度欲解􅃭與之憚其清嚴不敢發口謂人曰我願解身上􅃭與頋郎難衣食者竟不敢以遺之又曰郭祖深清儉常服故布􅃭又曰索君正爲豫章内史性不信巫邪有師丗榮稱道術爲一郡巫長君正在郡小疾主簿熊丘問巫師云須疾者衣爲信命君正以所着􅃭與之事竟取􅃭云神將送與北斗君君正使檢諸身於衣裹􅀗之以爲亂政即刑於市而焚神一郡無敢行巫後魏書曰髙祖復至鄴見公卿曰朕昨日入城見車上婦人冠帽而着小􅃭襖者尚書何爲不察任城王澄曰着者猶少帝曰任城意欲全着乎一言可以喪􅀖其斯之謂可命史官書之東宫舊事曰太子納妃有紫􅜄􅃭綘紗繡􅜄􅃭呉越春秋曰勾踐與妻入臣呉夫人衣無縁之裳左開之􅃭以飬馬又曰呉王闔閭葬女以珠􅃭之寳鍾離意别傳曰意爲司徒侯覇府議曹􅁺詔送三百人到河北遇隆冬到弘農意􅂺使屬縣令出錢與徒作􅃭袴光武謂侯霸曰君所使吏仁恕用心乎列仙傳曰細伯子者冬着單衣盛暑􅃭袴列異傳曰東海君以織成青􅃭遺陳節方述異記曰乾羅者慕容廆之十一丗祖也着金銀􅃭鎧乗白馬金銀鞍勒自天而墜鮮卑神之推爲君長西京雜記曰趙飛鷰爲皇后其弟在昭陽殿上遺織成上􅃭吕氏春秋曰子産治鄭鄧析務難之約民大獄一衣小獄􅃭袴鄭國大亂子産殺鄧析而民服桓譚新論曰待詔景子春素善占坐事繫其婦朱君至獄門通言遺􅃭袴子春驚曰朱君來言與朱爲珠袴而􅃭中絶者也我當誅斷也後遂腰斬丗􅀃曰司馬宣王從}
