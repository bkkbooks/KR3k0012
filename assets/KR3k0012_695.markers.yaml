  - {type: variant, offset: 803, length: 0, content: '', WYG: 二千石常衣布襦又曰梁鴻妻孟氏女布襦袴裙鴻曰此眞梁鴻妻也魏志曰管寕常着皂㡌布襦袴隨時單複晉令曰旄頭羽林着韋腰襦齊書曰武陵昭王曄過竟陵王子良宅冬月道逢乞人脫襦與之子良見曄衣單進襦於曄曄曰我與向人亦復何異梁書曰顧恊少清介有志操初為廷尉正冬服單薄寺卿蔡法度欲觧襦與之憚其清嚴不敢發口謂人曰我願觧身上襦與顧郎難衣食者竟不敢遺之又曰郭祖深清儉常服故布襦又曰索君正為豫章内史性不信巫邪有師世榮稱道術為一郡巫長君正在郡小疾主簿熊丘問巫師云須疾者衣為信命君正以所着襦與之事竟取襦去云神将送與北斗君君正使檢諸身於衣裏獲之以為亂政即刑於市而焚神一郡無敢行巫後魏書曰髙祖復至鄴見公卿曰朕昨日入城見車上婦人冠㡌而着小襦襖者尚書何為不察任城王澄曰着者猶少帝曰任城意欲全着乎一言可以喪邦其斯之謂可命史官書之東宫舊事曰太子納妃有紫縠襦綘紗繡縠襦吳越春秋曰勾踐與妻入臣吳夫人衣無緣之裳左開之􅃭莖以養馬又曰吳王闔閭𦵏女以珠襦之寳鍾離意别傳曰意為司徒侯覇府議掾詔送三百人到河北遇隆冬到𢎞農意輙使属縣令出錢與徒作襦袴光武謂侯覇曰君所使吏仁恕用心乎列仙傳曰組伯子者冬着單衣盛暑襦袴列異傳曰東海君以織成青襦遺陳節方述異記曰乾羅者慕容瘣之十一世祖着金銀襦鎧乘白馬金銀鞍勒自天而墜鮮卑神之推為君長西京雜記曰趙飛鷰為皇后其弟在昭陽殿上遺織成上襦呂氏春秋曰子産治鄭鄧析務難之約民大獄一衣小獄襦袴鄭國大亂子産殺鄧析而民服桓譚新論曰待詔景子春素善占坐事繫獄其婦朱君至獄門通言遺襦袴子春驚曰朱君来言與朱為誅袴而襦中絶者也我當誅斷也後遂腰斬世説曰司馬宣王從}
