  - {type: variant, offset: 812, length: 5, content: 疋貂裘二領, krp: 𥜗公乞之酒左右曰官不少𥜗可賜之公乞之酒曰𥜗官中物臣無私施語林曰謝鎮西着紫羅𥜗據胡牀彈琵琶作大道曲夢書曰上𥜗爲大夫婦人夢之得賢夫也束晢近遊賦曰繫明𥜗以御冬古詩曰羅敷好蠶桑採桑城南隅紺綺爲下裳紫綺爲上𥜗又曰妾有繡腰𥜗葳㽔金縷光陸機與長沙夫人書曰士璜亡恨一𥜗少便以機新𥜗衣與之袴說文曰袴脛衣也釋名曰袴跨也兩股各跨別也留冀州所名大禢下至膝者也留牢也幕絡在衣表方言曰齊魯之間袴謂之褰或謂之襱音襱関西謂之袴大袴謂之倒頓小袴謂之芙蓉衫楚通語也史記曰屠岸賈攻趙務朔等妻晉成公姊有遺腹公宫匿之生男屠岸賈索於宫中夫人置兒袴中祝曰趙宗若滅即號若不滅即無聲乃索兒竟無聲又後魏書云平文皇后王氏年十三因事入宫得幸於平文生昭成平文崩昭成在襁褓時國有内難將害帝子后匿帝於袴中呪曰若天祚未終者汝無聲遂良乆不啼得免於難又曰淮隂屠中少年有侮韓信者衆辱之曰信能死刺我不能出我袴徐廣曰袴服也袴亦作跨於是視之俛出袴下蒲伏一市皆笑信以爲怯又曰周仁爲人隂重不泄甞衣弊𥙷衣溺袴張晏曰隂重不泄下不潔故溺袴甚爲不㓗清以是得幸景帝漢書曰昌邑王賀衣短衣大袴又曰朱愽瑯瑘郡功曹官屬多褒衣大祒孟康曰祒音紹謂大袴也又曰昭帝上官后霍光外孫光欲后擅寵有子帝體不安左右及醫皆阿意言冝内宫人使令皆爲窮袴多其帶後宫無進者張晏曰窮袴前後有襠使不得交通東觀漢記曰更始所爵多群小𬒳服威儀不以衣冠或繡面衣錦袴}
