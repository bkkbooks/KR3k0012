  - {type: variant, offset: 1424, length: 4, content: 消費功用, WYG: 見桓公耶桓公䕶公為刺史靈越竟不肯着唐書曰𤣥宗時御史大夫李適之秦每大禮六品官並服朱衣自是以下許通着袴褶如有􅆭故不合着朱衣袴褶者聽不入自餘應着而不着者請奪俸以懲不恪西河記曰西河無蠶桑婦女以外國異色錦為袴褶魏百官名曰三公朝賜青林文綺長袖袴褶一方道盛北疆記曰虞主南郊着皂斑褶繡袴江表傳曰呂範願暫領督出釋褠着袴褶執鞭詣闕下啓事語林曰夏少明在東不知名聞裴逸民知人乃褁粮寄載入洛從之未至家少許見一人着黄皮袴褶乘馬將獵夏問曰裴逸民家近逺荅曰君何以問夏曰聞}
