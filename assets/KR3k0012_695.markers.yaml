  - {type: variant, offset: 1429, length: 181, content: 於殿前燒之勑內外有造異服詔罪之晉令曰山鹿白豽遊毛狐白貂蟬黃貂班白鼲子渠搜國裘皆禁服也瑞應圖曰王者奉五行教民種植以事則渠搜國來獻裘王者德藏不恥惡衣服則四夷乘白鹿來獻白裘黃帝出軍決曰黃帝伐蚩尤未克夢西王母遣道人披玄狐之裘以符授之管子曰武王為役靡令曰豹䄡豹裘方得入朝故豹皮百金功臣之家糴千鍾未得一豹皮晏子曰景公時雨雪三日公披狐白之裘曰怪哉雨雪三日不寒晏子曰古之賢者君飽, WYG: 明}
