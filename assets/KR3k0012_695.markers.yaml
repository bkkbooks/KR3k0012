  - {type: variant, offset: 1302, length: 2, content: 唐邕, WYG: 丞相司馬任胄主簿李世林都督鄭仲禮房子逺等潜謀害神武自魏氏舊俗以正月十五日夜為打簇戯能中者即時賞帛胄令仲禮藏刀於袴中因神武臨觀謀竊發後敗韓子曰鄭人卜子使妻為袴曰象吾故袴妻因鑿新袴為孔又曰昭侯使人藏弊袴侍者曰上不以賜左右而藏之乎昭侯曰吾聞時主之愛一嚬一笑有為嚬而嚬有為笑而笑今袴豈特嚬笑哉嚬笑不妄為袴豈可無功而與之吾必待有功者故藏之事具賞賜門鹽鐡論曰古者鹿裘皮㡌及其後大夫士狐貉庻人則毛袴髙士論曰孫略冬日見貧士脱袴遺之列士傳曰孟嘗君食客三千人上客食肉中客食魚下客食菜馮煖經冬無袴靣有飢色郭子曰孫興公云曹輔佐才如白地明光錦裁為負板袴非無文彩然酷無財製俗説曰謝仁祖年少時喜著刺文袴出郊郭外其叔父請責之仁祖於是自改遂為名流董巴漢輿服志曰祀宗廟綘袴示赤心奉神也捜神記曰晉中興作袴者直幅為口無殺大夫裁之士敦之東宫舊事曰皇太子納妃有綘直文羅袴七彩杯文綺袴鄴中記曰石虎獵着金縷合歡袴廣州先賢傳曰申朔}
