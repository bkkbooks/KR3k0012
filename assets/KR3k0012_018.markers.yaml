  - {type: variant, offset: 3597, length: 541, content: 二歲而一荒蔬不熟為荒也淮南子曰見一叶之落知歲之將暮呂氏春秋曰天行不信莫能成歲師曠占曰黃帝問師曠曰吾欲知歲苦樂善惡可知否師曠對曰歲欲豐甘草先生薺也歲欲饑苦草先生葶藶也歲欲惡惡草先生水藻也歲欲旱旱草先生蒺蔾也歲欲溜溜草先生蓬也歲欲病病草先生艾也廣志曰青龍天一太陰太歲也袁子正書語曰歲在申酉乞漿得酒歲在辰巳嫁妻賣子夫盛衰更代豐荒相半天之常道也楚辭曰獻歲發春兮獻進也又曰開春發歲兮承陽施惠養百姓也歲除呂氏春秋注曰前歲一日擊鼓驅疫癘之鬼謂之逐除亦曰儺論語曰鄉人儺孔子朝服立於阼階張衡東京賦曰卒歲大儺荊楚記曰歲暮家家具肴蔌謂宿歲之儲以迎新年相聚酣飲又曰歲前又為藏鉤之戲辛氏三秦記曰昭帝母鉤弋夫人手拳而國色帝披之得鉤人人學藏鉤亦法此鉤亦作彄又曰留宿歲飯至新年十二月則棄之街衢以為去故納新也唐太宗文皇帝守歲詩曰暮景斜芳殿年華麗綺宮寒辭去冬雪暖帶入春風階馥舒梅素盤花卷燭紅共歡新故歲迎送一霄中又曰歲陰窮暮紀獻節啟新芳冬盡今霄促年開明曰長冰消出鏡水梅散入風香對此歡經宴傾壺待曙光又於太原召侍臣賜宴守歲詩曰四時運灰琯一夕變冬春送寒餘雪盡迎歲早梅新梁庾肩吾歲盡應令詩曰歲序已云殫春心不自安聊開葉酒試奠五辛盤金薄圖神鷰朱泥印鬼丸梅花應可折惜為雪中看隋薛道衡歲窮應教詩曰故年隨夜盡初春逐晚生方驗從軍樂飲至入西京, SBCK: 八}
