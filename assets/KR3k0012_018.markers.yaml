  - {type: variant, offset: 1724, length: 474, content: 時司空也司空主也各主一方物之生死京房易妖占曰海鷰自來眾鷰隨之穀不登君失春政則蒼鷰見於邑民多流亡失夏政則赤鷰見於邑失秋政則白鷰見於邑失冬政則黑鷰見於邑皆如春占管子曰歲有四秋而分四時故曰農事既成農夫賦其耜鐵此之謂春之秋大夏且至絲纊之所作此之謂夏之秋秋成五㯏之所會此謂秋之秋營室中女事紡績緝縷之所作也此之謂冬之秋㯏穀同音又曰東方曰歲星其時曰春其氣曰風風生木南方曰日其時曰夏其氣曰陽陽生火西方曰辰其時曰秋其氣曰陰陰生金北方曰月其時曰冬其氣曰寒寒生水淮南子時則曰六合孟春與孟秋為合仲春與仲秋為合季春與季秋為合孟夏與孟秋為合仲夏與仲冬為合季夏與季冬為合孟春始盈孟秋始縮盈長也縮短也仲春始出仲秋始內出二月播植也內八月取歛也季春大出季秋大內孟夏始緩孟冬始急緩四月陽炎也急十月寒肅也仲夏德畢季冬刑畢德畢陽施窮也刑畢陰殺盡也又曰陰陽之專精為四海四時之散精為萬物四時者天之吏也又曰以天為蓋以地為輿四時為馬又曰日廻而月周時不與人游徐整三五曆記曰北斗當崑崙崑崙氣連注天下春夏為露秋冬為霜晉張華詩曰四氣鱗次寒暑環周晉陸機詩曰年往迅勁矢時來諒急絃閏說文曰餘分之月歲再閏也告朔之禮, SBCK: ''}
