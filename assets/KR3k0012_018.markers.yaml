  - {type: variant, offset: 1440, length: 9, content: 乃命羲和敬授民時禮, SBCK: 東方春龍房位其規仁好生不賊五靈東方曰蒼龍五均東曰規五姓曰仁也其帝青表聖明行趨德表德也春好生故曰德尚書考靈耀曰春佩蒼璧蒼佩玉以象德也乗蒼馬以出遊發令於外春行仁政順天之常以安國也又曰鳥星爲春􅀱詩含神霧曰齊地處孟春之位海岱之間土地汙泥流之所歸利之所聚律中太蔟音中宮角陳地處季春之位土地平夷無有山谷律中沽洗音中宫徴韓詩外傳簡主曰夫春樹桃李夏得䕃其下秋得食其實春樹蒺藜夏不可采其葉秋得其刺焉由此觀之在所樹也今子所樹非其人也故君子擇而後種又}
  - {type: variant, offset: 1440, length: 9, content: 乃命羲和敬授民時禮, WYG: 萬物非天不生非地不載非春不動非夏不長非秋不收非冬不藏故書禋于六宗此之謂也又曰東方者何也動方也物之動也何以謂之春春出也物之出也故春謂之東方也尚書說曰東方春龍房位其規仁好生不賊其帝青表聖明行趨德尚書考靈曜曰春佩蒼璧乗蒼馬以出遊𤼵令于外春行仁政順天之常以安國也又曰鳥星為春候詩含神霧曰齊地處孟春之位海岱之間土地汙泥流之所歸利之所聚律中太蔟音中宫角陳地處季春之位土地平夷無有山谷律中姑洗音中宫徴韓詩外傳簡子曰夫春樹桃李夏得䕃其下秋得食其實春樹蒺藜夏不可采其葉秋得其刺焉由此觀之在所樹也今子所樹非其人也故君子擇而後種又}
