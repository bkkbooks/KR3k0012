  - {type: variant, offset: 1435, length: 2, content: 失期, SBCK: 足求隱士則萬物應節而生隨氣而長所謂春取榆柳之火尚書大傳曰萬物非天不生非地不載非春不動非夏不長非秋不収非冬不藏故書禋于六宗此之謂}
