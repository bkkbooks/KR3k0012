  - {type: variant, offset: 260, length: 1, content: 取, SBCK: 命有司􅀕風師立春之後􅐫日􅀕風師於國城東地正月中氣日在危􅀨水爲正月中氣凡中氣前後去節十五日春秋傳曰舉正於中此之謂也昏畢中曉尾中斗建寅位之中􅀨水之日􅆩􅀕魚後五日鴻鴈來後五日草}
