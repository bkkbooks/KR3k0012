  - {type: variant, offset: 1427, length: 0, content: '', krp: 疆有闔而不通有煩而不治則民不樂生不利衣食凡民之藏貯以及山川之神明加于民者發圖功謀齊戒必敬㑹時必節日暦巫祝執伎以守官俟命而作祈王年禱民命及畜榖蜚征庶虞草}
  - {type: variant, offset: 1428, length: 0, content: '', SBCK: 春三月緩施生育動作百物於時有事享于皇祖皇考朝􅀌子八人以成春事又曰二月􅀕鮪鮪者魚之先至也又曰三月參則伏不見又曰古者天子孟春論吏之德行能法者爲有行能理得法者爲有能盛法德者爲有功故論吏而法行事治而功成季冬正法孟春論吏治國之要也春論班賞冬考量刑則莫不懲勸也又曰諸侯相見治卿爲介以其教士畢行使仁者守㑹朝于天子天子以嵗二月爲壇于東郊建五色設五兵具五味陳六律品奏五聲聽明教置離抗大長侯規鵠竪物九卿佐三公三公佐天子天子踐位諸侯}
