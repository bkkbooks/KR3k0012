  - {type: variant, offset: 2733, length: 635, content: 年一閏以起紀宋均注曰紀法也三年加以一閏以會成歲也史記曰黃帝起消息正閏餘漢書音義曰歲之餘為閏文士傳曰陸績字公紀作渾天說曰閏月無中氣斗斜指二辰之間荊楚歲時記曰周禮云王出居寢門故為字門中從王也是月也不舉百事以非中氣也歲釋名曰歲越也越故限也年進也進而前也祀已也新氣生故氣已也載載生物也白虎通曰年者仍也年以紀事據月言年數者載成萬物終始也五帝言載三王言年世本曰后益作占歲易曰寒往則暑來暑往則寒來寒暑相推而歲成焉洪范曰叶用五紀一曰歲孔安國曰所以紀四時也禮曰日窮於次月窮于紀星回于天數將幾終歲且更始歲者四時一終日一周天之名也言前至孟春之月日復在營室月復建寅昏復參中旦復尾中故曰更始也矣爾雅曰太歲在甲曰閼逢在乙曰旃蒙在丙曰柔兆在丁曰強圉在戊曰著雍著孫炎音豬略切郭璞音義曰著者或作祝黎是也在已曰屠維在庚曰上章在辛曰重光在壬曰玄黓郭璞音翼在癸曰昭陽太歲在寅曰攝提格在卯曰單閼在辰曰執徐在巳曰大荒落在午曰敦䍧郭璞音子郎友在未曰協洽在申曰涒灘郭璞曰涒音湯昆反灘音湯干反在酉曰作噩孫炎音愕在戍曰閹茂在亥曰大淵獻在子曰困敦在丑曰赤奮若又曰夏曰歲商曰祀周曰年唐虞曰載郭璞注曰歲取星行一次祀取四時一終也年取禾一熟也載取物終歲更始者也史記天官書臈之明日人眾卒歲一會飲酒發陽氣故曰初歲魏略曰董遇好學讀書常以三餘冬歲之餘夜與陰雨日之餘晉書曰博士張亮議曰俗謂臈之明日為初歲秦漢以來有賀此皆古之遺語也易乾鏧度曰孔子曰歲三百六十日而天氣周八卦用事各四十五日而備歲事尚書大傳曰凡六沴之作歲之朝月之朝日之朝后王受之歲之中, SBCK: ''}
