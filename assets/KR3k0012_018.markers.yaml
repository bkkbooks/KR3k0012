  - {type: variant, offset: 1426, length: 0, content: '', SBCK: 之田皆爲宗廟之事也春曰田取獸於田夏曰苗因爲苗除害故曰苗秋曰蒐蒐擇之舎小取大冬曰狩狩圍狩也冬物畢成􅀗則取之無所擇語曰莫春者春服旣成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸爾雅曰春爲青陽一曰發生又曰春獵爲蒐搜索取也又曰春􅀕曰祀薦尚韭柳禮䟽曰祀者思也思嚮所以設之日祀也大戴禮曰三代之禮天子春朝朝日秋暮夕月􅀕日東壇􅀕月西壇故以別外内以端其政位所以明有敬也教天下之臣也又曰司徒典春以教民之不時不􅀂不全成長㓜老疾􅀌寡以時通于}
