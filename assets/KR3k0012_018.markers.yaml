  - {type: variant, offset: 651, length: 641, content: 其神謂之五帝五帝五行之神佐天理物者也而說皆為之名字亦為妖怪而妄也古之王者易代改號取法五行更王終始相生亦象其義也法五行更王終始相生以木德王天下其次所生之行轉相承故其生為明王者死配五行是以太皞配木炎帝配火少皞配金顓頊配水黃帝配土康子曰太皞氏其始之木何也孔子曰五行用事先起於木木東方也萬物之初皆出焉是故王者作而首以木德王天下則以所生之行轉相承也康子曰吾聞勾芒為木正祝融為火正蓐收為金正玄冥為水正后土為土正此則五行之主也而不稱何孔子曰凡五正者五行之官名也言但主五行之官名安得同名為帝五行佐成上帝而稱五帝太皞之屬配焉亦云帝從其號音昔少皞氏之子有四叔曰重曰該曰脩曰熙實能理金木水火土使重為勾芒該為蓐收脩及熙為玄冥顓頊氏之子曰黎為祝融共工氏子曰勾龍為后土此五者各所以能業其官職生為上公死為貴神別稱五祀不得同帝也五祀上公之神耳故不得稱帝五正不及五帝五帝不及天地也遁甲開山圖榮氏解曰五龍受爰皇後君也兄弟四人皆人面龍身長曰角龍木仙也次曰羽龍水仙也父曰宮龍土仙也父子同得仙治在五方今五行之神也白虎通曰五行者何謂也謂金木水火土言行者欲言為天行氣之義也地之承天猶婦之事夫臣之事君也其位卑卑者親視事故自同於一行尊於天也尚書一曰水二曰火三曰木四曰金五曰土水位在北方者陰氣在黃泉之下任養萬物水之為言准也陰化沾濡任生木木在東方者陽氣始動萬物始生木之為言觸也陽氣動躍火在南方陽在上萬物垂枝火之為言委隨也萬物布施火之為言化也陽氣用事萬物變化也金在西方者陰始起萬物禁止金之為言禁也土在中央中央者土土主吐萬物土之為言吐也樂記, SBCK: 又}
