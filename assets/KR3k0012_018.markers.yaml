  - {type: variant, offset: 1434, length: 0, content: '', SBCK: 開元禮曰仲春上丁釋奠于太學孔宣父爲先聖顔子爲先師上戊釋奠于齊太公以張良配易通統圖曰日春行東方青道曰東陸易說曰春有白鶴雲京房易占曰春當退貪殘進柔良䘏㓜􅀌賑}
  - {type: variant, offset: 1434, length: 0, content: '', WYG: 開元禮曰仲春上丁釋奠于大學祀孔宣父為先聖顔子為先師上戊釋奠于齊太公以張良配易通統圗曰日春行東方青道曰東陸易說曰春有白鶴雲京房易占曰春當退貪殘進柔良䘏孤㓜賑}
