  - {type: variant, offset: 1438, length: 0, content: '', SBCK: 禋􅀕也字當爲禋馬氏以爲六宗謂日月星辰㤗山河海也經曰折􅀋于上帝禋于六宗望秩于山川徧于羣神月令孟冬天子祈來年于天宗如此則六宗近謂天神也以周禮差之則爲星辰司人司命風師􅀨師也又曰東方者何也動方也物之動也何以謂之春春出也物之出也故謂東方春也尚}
  - {type: page-break, offset: 1438, content: '', id: KR3k0012_SBCK_018-5b}
  - {type: variant, offset: 1438, length: 0, content: '', WYG: 尚}
  - {type: variant, offset: 1438, length: 0, content: '', krp: 禋祭也字當爲禋馬氏以爲六宗謂日月星辰㤗山河海也經曰折類于上帝禋于六宗望秩于山川徧于羣神月令孟冬天子祈來年于天宗如此則六宗近謂天神也以周禮差之則爲星辰司人司命風師雨師也又曰東方者何也動方也物之動也何以謂之春春出也物之出也故謂東方春也尚}
