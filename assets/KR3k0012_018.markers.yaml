  - {type: variant, offset: 2200, length: 405, content: 居宗廟門中故其字從王在門中也白虎通曰月有閏何周天三百六十五度四分度之一十二月日不匝十二度故三年一閏五歲再閏也明陰不足陽有餘閏者陽之餘也書堯典曰帝曰咨汝羲暨和朞三百有六旬有六日以閏月定四時成歲咨嗟暨與也匝四時曰朞一歲十二月月三十日正三百六十日除小月六為六日是為一歲有十二日未盈三歲足得一月則置閏焉以定四時之氣節成一歲之曆象傳曰閏月不告朔非禮也先王之正時也履端於始舉正於中歸餘於終杜預注曰步曆之始以為術之端首也日月之行有遲有速必分十二月舉中氣以正月也餘日則歸於終積為閏也履端於始序則不愆舉正於中人則不惑歸餘於終事則不悖又曰閏月戊寅濟于陰阪注以為門五日蓋悞以門字與五字合為閏月也公羊傳曰閏月不告朔曷為不告朔天無是月也閏月矣何以謂之天無是月月非常月也所在無常故無正也穀梁傳曰閏月者附月之餘日也一歲三百六十日餘六日又有小月積五歲得六十日而再閏故曰附月之餘日者也積分而成於月者也天子不以告朔而喪事不數也禮玉藻曰朔於南門之外, SBCK: ''}
