  - {type: variant, offset: 186, length: 0, content: '', SBCK: 履端於始謂節也舉正於中謂氣也歸餘於終謂閏也旣有閏則立春進退不􅁪在正月朔日故不定爲孟春之月但得立春則是正月之節可以行春令矣昏昂中暁心中凡記昏昂曉心中爲人君南靣而聽天下觀時候以授人事也日入後二刻半爲昏日未出二刻半爲曉也斗建寅位之􅀄地有十二辰斗柄杓常左旋指地位故立春正月之節則斗建寅位之􅀄書云璿璣王衡七政此之謂矣其日甲乙春}
