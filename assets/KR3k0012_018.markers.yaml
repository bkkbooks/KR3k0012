  - {type: variant, offset: 315, length: 510, content: 曰后土獻子曰社稷五祀誰氏之官也對曰少皞氏有四叔曰重曰該曰脩曰熙實能理金木及水使重為勾芒該為蓐收脩及熙為玄冥二子相代為水王也世不失職遂濟窮桑此三祀也窮桑少昊之號四子能治其官顓頊氏有子號曰犂為祝融共工氏有子號曰勾龍為后土此其二祀也后土為社稷田正也掌播殖也有烈山氏之子曰柱為稷自夏已上祀之周棄亦為稷棄周之始祖能播百穀湯既勝夏廢柱而以棄代之也自啇以來祀之漢書曰五行者五常之形氣也又律曆志曰天以一生水地以二生火天以三生木地以四生金天以五生土魏略曰詔以漢火行火忌水故去洛水而加隹魏於行次為土水得土而流土得水而軟故除隹加水變雒為洛家語曰季康子問於孔子曰舊聞五帝之名而不知其實請問何謂孔子曰昔丘也聞諸老聃天有五行木金水火土分時化育以成萬物一歲三百六十日五行行至七十三日化生長育萬物莫不成也其神謂之五帝五帝五行之神佐天理物者也而說皆為之名字亦為妖怪而妄也古之王者易代改號取法五行更王終始相生亦象其義也法五行更王終始相生以木德王天下其次所生之行轉相承故其生為明王者死配五行是以太皞配木炎帝配火少皞配金顓頊配水黃帝配土康子曰太皞氏其始之木何也孔子曰五行用事先起於木木東方也萬物之初皆出焉是故王者作而首以木德王天下則以所生之行轉相承也康子曰吾聞, WYG: ''}
