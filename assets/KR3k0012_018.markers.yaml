  - {type: variant, offset: 835, length: 2, content: 蓐收, WYG: 月中氣凡中氣前後去節十五日以明天時舉正于中此之謂也昏畢中曉尾中斗建寅位之中雨水之日獺祭魚後五日候鴈北後五日草木萌動天子乃以元日祈榖于上帝元吉也謂上親祈榖如祀昊天上帝于圜丘以髙祖神堯皇帝配坐以五方帝從祀于壇春秋傳曰啟蟄而郊郊而後耕此之謂也命樂正習舞春秋尚舞故命習之禁止伐木無麛無卵無傷萌㓜之類掩骼埋胔}
