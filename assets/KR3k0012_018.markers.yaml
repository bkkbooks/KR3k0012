  - {type: variant, offset: 1426, length: 0, content: '', krp: 之田皆爲宗廟之事也春曰田取獸於田夏曰苗因爲苗除害故曰苗秋曰蒐蒐擇之舎小取大冬曰狩狩圍狩也冬物畢成獲則取之無所擇語曰莫春者春服旣成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸爾雅曰春爲青陽一曰發生又曰春獵爲蒐搜索取也又曰春祭曰祀薦尚韭柳禮䟽曰祀者思也思嚮所以設之日祀也大戴禮曰三代之禮天子春朝朝日秋暮夕月祭日東壇祭月西壇故以別外内以端其政位所以明有敬也教天下之臣也又曰司徒典春以教民之不時不若不全成長㓜老疾孤寡以時通于}
  - {type: variant, offset: 1427, length: 0, content: '', SBCK: 疆有闔而不通有煩而不治則民不樂生不利衣食凡民之藏貯以及山川之神明加于民者發圖功謀齊戒必敬㑹時必節日暦巫祝執􅇊以守官俟命而作祈王年禱民命及畜榖蜚征庶虞草}
