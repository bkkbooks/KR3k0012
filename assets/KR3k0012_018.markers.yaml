  - {type: variant, offset: 1328, length: 0, content: '', SBCK: 天子五年一巡狩天子以海内爲家時一巡狩省之五年者虞夏之制也周則十二歳一巡狩也嵗二月東巡守至于岱宗柴而望祀山川柴􅀕天告至也覲諸侯覲見也問百年者就見之就見老人命大師陳詩以觀民風陳詩謂采其詩而視之命市納賈以觀民之所好惡志􅁋好辟市典者賈謂知物貴賤厚薄也質則用物貴民則侈物貴民之志淫邪則其所好者不正周禮曰媒氏掌}
  - {type: page-break, offset: 1328, content: '', id: KR3k0012_SBCK_018-3b}
  - {type: variant, offset: 1328, length: 0, content: '', WYG: 天子五年一廵狩二月東廵狩至于岱宗柴望祀山川柴祭名望祭山川也覲諸侯問百年者就見之命大師陳詩以觀民風命市納賈以觀民之所好惡志淫好辟周禮曰媒氏掌}
  - {type: variant, offset: 1328, length: 0, content: '', krp: 天子五年一巡狩天子以海内爲家時一巡狩省之五年者虞夏之制也周則十二歳一巡狩也嵗二月東巡守至于岱宗柴而望祀山川柴祭天告至也覲諸侯覲見也問百年者就見之就見老人命大師陳詩以觀民風陳詩謂采其詩而視之命市納賈以觀民之所好惡志淫好辟市典者賈謂知物貴賤厚薄也質則用物貴民則侈物貴民之志淫邪則其所好者不正周禮曰媒氏掌}
  - {type: variant, offset: 1329, length: 5, content: 物懹任交易, SBCK: 民之判判半也合成夫婦也仲春月㑹男女成春禮是時奔者不禁無故而不用令者罰之又曰仲春詔后率内外命婦始蚕于北郊帥六宫之夫人主穜稑之種而獻之于王又曰羅氏仲春獻鳩以養國老鄭􅀇注曰春鷹化而爲鳩}
