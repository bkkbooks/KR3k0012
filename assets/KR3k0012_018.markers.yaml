  - {type: variant, offset: 260, length: 1, content: 取, krp: 命有司祭風師立春之後丑日祭風師於國城東地正月中氣日在危雨水爲正月中氣凡中氣前後去節十五日春秋傳曰舉正於中此之謂也昏畢中曉尾中斗建寅位之中雨水之日獺祭魚後五日鴻鴈來後五日草}
  - {type: variant, offset: 262, length: 0, content: '', SBCK: 萌動天子乃以元日祈榖于上帝元吉也謂上辛祈榖郊祀昊天上帝於圎丘以髙祖神尭皇帝配坐以五方帝從祀於壇春秋傳曰啓蟄而郊祁而後耕此之謂矣命樂正習舞春夏尚舞故命習之禁止伐木爲盛德所在無麛無卵無傷萌勾之􅀋掩骼埋胔爲死氣逆}
  - {type: variant, offset: 262, length: 0, content: '', krp: 萌動天子乃以元日祈榖于上帝元吉也謂上辛祈榖郊祀昊天上帝於圎丘以髙祖神尭皇帝配坐以五方帝從祀於壇春秋傳曰啓蟄而郊祁而後耕此之謂矣命樂正習舞春夏尚舞故命習之禁止伐木爲盛德所在無麛無卵無傷萌勾之類掩骼埋胔爲死氣逆}
  - {type: variant, offset: 263, length: 2, content: 勾曲, SBCK: 氣枯骨曰骼􅁏腐曰胔釋名曰二月之夾鍾何夾者孚也言萬物孚甲種􅀋分也禮曰二月之節日在營室驚蟄爲二月之節昏東井中暁箕中斗建卯位之初律中夾鍾二月氣至則夾鍾之律應夾鍾者夷則之所生三分益一管長七尺四分其曰其音其數並同孟春驚蟄之日桃始華後五日倉庚鳴後五日鷹化爲鳩省囹圄去桎梏省滅也囹圄所以禁守繫者則今之獄矣木在手日梏在足日桎上丁釋奠於國學釋謂置也置牲幣之莫於文宣王上戊釋奠於太廟廟亦用牲幣之奠又曰二月中氣日在奎春分爲二月中氣昏東井中暁南斗中斗建卯位之中春分之日􅀇鳥至雷乃發聲祀朝日於東郊春分日􅀕之獻羔開氷謂立春藏氷在春分方温故献羔以􅀕司寒}
