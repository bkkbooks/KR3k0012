  - {type: variant, offset: 2138, length: 2854, content: 中都尉劉蜀蘇馬等具宣朕意公茂德昵屬宣隆東夏恢融六合非公而誰但洛都陵廟不可空曠公宜鎮撫以綏山東右丞相當入輔弼追蹤周邵以隆中興也二年秋七月劉曜趙舟等又逼京都領軍將軍麴允討破之四年七月劉曜攻北地麴允帥步騎三萬救之王師不戰而潰北地大守麴昌奔于京師曜進至涇陽渭北諸城悉潰建威將軍曾充散騎常侍梁緯少府皇甫陽等皆死之八月劉曜逼京師內外斷絕鎮西將軍焦嵩平東將軍宋哲始平太守笁恢等同赴國難麴允與公卿守長安小城以自固散騎常侍華輯監京兆馮翊弘農上洛四部兵東屯霸上鎮軍將軍胡崧帥城西諸郡兵屯遮馬橋並不敢進冬十月京師飢甚米斗金二兩人相食死者太半太倉有麴數十餅麴允屑為粥以供帝至是復盡帝泣渭允曰今窘厄如此外無救援死於社稷是朕事也然念將士暴離斯酷今欲聞城未陷為羞死之事庶令黎元免屠爛之苦行矣遣書朕意決矣十一月乙未使侍中宋敞送牋於曜帝乘羊車肉袒銜壁輿櫬出降群臣號泣攀車執帝之手帝亦悲不自勝御史中丞吉朗自殺曜焚櫬受壁使宋敞奉帝還宮初有童謠曰天子何在豆田中時王浚在幽州以豆有藿殺隱士霍原以應之及帝如曜營營實在城東豆田壁辛丑帝蒙塵於平陽麴允及群官並從劉聰假帝光祿大夫懷安侯壬寅聰臨殿帝稽首于前麴允伏地慟哭因自殺五年春正月帝在平陽庚子虹霓彌天三日並照平東將軍宋哲奔江左十一月劉聰出獵令帝行車騎將軍戎服執戟為導百姓聚而觀之故老或歔欷流涕聰後因大會使帝行酒洗爵反而更衣又使帝執蓋晉臣在座多失聲而泣尚書郎辛賓抱帝慟哭為聰所害十二月戊戍帝遇弒崩于平陽在位五年時年十八帝之繼皇統也屬永嘉之亂天下崩離長安城中戶不盈百墻宇頹毀蒿棘成林朝廷無車馬章服唯桑板署號而已眾唯一旅公私有車四乘器械多闕運饋不繼巨猾滔天帝京危急諸侯無釋位之志征鎮闕勤王之譽故君臣窘迫以至殺辱東晉元皇帝晉書曰元皇帝諱睿字景文宣帝曾孫琅耶恭王覿之子也咸寧二年生於洛陽有神光之異一室盡明所藉藁如始刈及長白毫生於日角之左隆準龍顏目有精曜顧眄煒如也年十五嗣位琅耶王幼有令問惠皇之際王室多故每恭儉退讓以免于禍沉敏有度量不顯灼然之跡故時人未之識焉唯侍中嵇紹異之謂人曰琅耶王毛骨非常殆非人臣之相元康二年拜員外散騎常侍累遷左將軍從討成都王穎蕩陰之敗叔父東安王繇為頴所害帝懼禍及將出奔其夜月正明而禁衛嚴警無由得去甚窘迫有頃雲霧晦冥雷雨暴至徼者皆弛因得潛出頴先令諸關無得出貴人帝既至河陽為津吏所止從者宋典後來以策鞭帝馬而笑曰舍長官禁貴人汝亦被拘耶吏乃聽過至洛陽迎太妃歸國東海王越之收兵下邳也假帝輔國將軍尋加平東將軍都督楊州諸軍事越西迎大駕留帝居守永嘉初用王導計始鎮建業以顧榮為軍司馬賀循為參佐王敦王導周顗音擬刀協等為腹心股肱賓禮名賢存問風俗江東歸心焉及懷帝蒙塵于平陽司空荀藩等移檄天下推帝為盟主愍帝即位加左丞相歲餘進位丞相大都督中外諸軍事建武元年春二月辛已平東將軍宋哲至宣愍帝詔曰時遭屯否皇綱不振朕以寡德奉承洪緒不能祈天永命紹隆中興至使凶胡敢帥犬羊逼迫京輦朕今幽塞窮城憂慮萬端恐一旦崩潰卿指詣丞相具宣朕意使攝萬機時據舊都脩復陵廟以雪大恥三月帝素服出次舉哀三日西陽王義及群僚參佐州郡牧守等上尊號帝不許義等以死固請至于再三帝慨然流涕曰孤罪人也唯有蹈節死義以雪天下之恥庶贖鈇鉞之誅吾本琅耶王諸賢見逼不已乃呼私奴命駕將反國群臣乃不敢迫請依魏晉故事為晉王許之辛卯即王位大赦改元太興元年春正月戊申朔臨朝懸而不樂三月癸丑愍帝崩問至帝斬縗居廬景辰百寮上尊號即皇帝位詔曰昔我高祖宣皇帝誕膺期運廓開王基景文皇帝奕世重光緝熙諸夏爰暨世祖應天順時受茲明命功格天地仁濟宇宙昊天不融降此鞠凶懷帝短世越去王都天禍荐臻大行皇帝崩殂社稷無奉肆群后三司六事之人疇諮庶尹至于華戎致輯大命于朕躬予一人畏天之威罔弗敢違遂登壇南面受終文祖燔柴頒瑞告類上帝惟朕寡德纘戎洪緒若涉大川罔知攸濟惟恭股肱爪牙之佐文武熊羆之臣用能弼寧晉室輔予一人思與萬國共茲休慶於是大赦改元庚午立太子紹為皇太子永昌元年春正月乙卯大赦改元戊辰大將軍王敦舉兵於武昌以誅劉隗為名龍驤將軍沈充帥眾應之三月徵征西將軍戴若思鎮北將軍劉隗還衛京都劉隗軍于金城右將軍周札守石頭帝被甲徇六師於郊外遣平南將軍陶侃領江州安南將軍甘卓領荊州各帥所統以躡敦後夏四月敦前鋒攻石頭周札開城應賊奮威將軍侯禮死之敦據石頭戴若思劉隗帥眾攻之王導周顗郭逸虞潭等三道出戰六軍敗績尚書令刀協奔于江垂為賊所害鎮北將軍劉隗奔于石勒帝遣使謂敦曰公若不忘本朝於此息兵則天下尚可安也如其不然朕當歸于琅耶以避賢路辛未大赦敦自為丞相都督中外諸軍錄尚書事封武昌郡公邑萬戶十一月已丑帝崩于內殿在位六年時年四十七葬平陵廟號中宗孫盛晉陽秋曰昔秦始皇東遊望氣者云五百年後東南金陵之地有天子氣於是始皇改曰秼陵吳人以為孫權帝之表也盛案始皇遊歲至權僣號四百三十七年考之年數既不合校之基守又非倫豈應帝王之符而見兆於上代乎有晉金行奄君四海金陵之祥其在斯乎且秦政東遊至是五百二十六年所謂五百年之後當有王者也又孫皓將亡吳郡臨無湖一夜草木自除于湖邊得石函中有小石青白色長四尺廣二寸餘上有白帝字時人莫察其祥意者豈中宗興五湖之徵歟太康三年建業有寇餘姚人任振以周易筮之曰寇已滅矣後三十八年楊州當有天子又太安中童謠曰五馬浮渡江一馬化為龍永嘉大亂王室淪覆唯琅耶西陽汝南南頓彭城五王獲濟至是中宗登祚先是歲鎮鎮辰太白四星聚於牛斗之間五鐸又見于晉陵寘數玄感若合符契焉又初玄石圖有牛繼馬後故宣帝深忌牛氏遂為二榼共一口以貯酒帝先飲佳者以毒者酖其將牛金而恭王妃夏氏通小吏牛欽而生元帝亦有符云世說曰元帝始過江謂顧驃騎曰寄人國事志常懷慚策跪荅曰臣聞王者天下為家是以耿毫無定處九鼎後洛邑願陛下無以遷都為念又曰元帝正會引丞相王導登御床王公既固辭中宗引之彌苦文獻曰使太陽與萬物同暉臣下何以仰瞻明皇帝晉書曰明皇帝諱紹字道畿元皇帝長子也幼而聰哲為元帝所寵異年數歲嘗坐置𣍿前屬長安使來因問帝曰汝謂日與長安孰遠對曰長安近不聞人從日邊居然可知也元帝異之明日宴群寮又問之對曰日近元帝失色曰何乃異間者之言對曰舉目則見日不見長安由是益奇之建興初拜東中郎將鎮廣陵元帝為晉王及即帝位為皇太子性至孝有文武才略永昌元年閏月已丑元帝崩庚寅太子即皇帝位大赦尊所生荀氏為皇太后大寧元年三月戊寅朔改元臨軒停饗宴之禮懸而不樂二年夏五月王敦矯詔拜其子應為武衛將軍兄含為驃騎大將軍帝所親信常從督公乘雄冉曾並為敦所害六月敦將舉兵內向帝密知之乃乘巴滇駿馬微行至于湖陰察敦營壘而出軍士疑帝非常人又敦晝寢夢日環其城驚起曰此必黃鬚鮮卑奴來也帝母荀氏燕代人帝狀類外氏鬚黃敦故為帝云於是使五騎物色追帝帝亦馳去僅以獲免秋七月壬申朔敦遣其兄含及錢鳳周撫鄧岳等水陸五萬至于南岸南溫嶠移屯水北燒朱爵桁以挫其鋒帝躬帥六軍出次南堂至癸酉夜募壯士遣將軍叚秀中軍司馬曹渾左衛參軍陳嵩鍾寅等甲卒千人渡水掩其未備平旦戰於越城大破之斬其前鋒將何康王敦憤惋而死三年春二月戊戍復三族刑唯不及婦人三月戊辰立皇太子衍為皇太子大赦增文武位二等大酺三日賜鰥寡孤獨帛閏八月壬午帝不豫召太宰西陽王義司徒王導尚書令卞壺車騎將軍郄鑒護軍將軍庾亮領軍將軍陸曄丹陽尹溫嶠並受遺詔輔太子戊子帝崩于東堂, WYG: ''}
