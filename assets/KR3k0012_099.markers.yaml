  - {type: variant, offset: 1373, length: 1357, content: 自領尚書令且置官屬保梁國之蒙縣百姓飢米斛萬餘價八月劉聰使子粲攻陷長安太尉征西將軍南陽王模遇害長安遺人四千餘家奔漢中九月癸亥石勒襲陽夏至于蒙縣大將軍荀晞豫章王端並沒于賊六年春正月帝在平陽九月辛已前雍州刺史賈疋討劉粲於三輔走之關中小定乃與衛將軍梁芬京兆太守梁綜共奉秦王業為皇太子於長安七年春正月劉聰大會使帝著青衣行酒侍中庾珉號哭聰惡之丁未帝遇弒崩于平陽在位七年時年三十晉陽秋曰懷帝天姿清劭少有聲名若遭承平之世足為守文佳主而繼惠帝擾亂之後東海專政祿去王室無幽厲之釁而有犬戎之禍悲夫愍皇帝晉書曰愍皇帝諱鄴字彥旗武帝孫吳孝王晏之子也出繼伯父秦獻王東襲封秦王永嘉二年拜散騎常侍撫軍將軍及洛陽傾覆避難於滎陽密縣與舅荀藩荀組相遇自密南趣許穎豫州刺史閻鼎與前撫軍長史王毗司徒長史劉疇中書郎李昕及藩組等同謀奉帝歸于長安而疇等中塗復叛鼎追殺之藩組僅而獲免鼎遂扶帝乘牛車自宛趣武關歸於長安頻遇山賊士卒亡散次于藍田鼎告雍州刺史賈疋疋遽遣州兵迎衛達于長安又使輔國將軍梁綜助守時有玉龜出霸水神馬鳴城南元年九月辛巳奉秦王為皇太子登壇告類建宗廟社稷大赦加疋征西將軍以秦州刺史南陽王保為大司馬賈疋討賊張連遇害眾推始平太守麴允領雍州刺史為盟主承制選置建興元年夏四月景午奉懷帝崩問舉哀成禮壬申即皇帝位大赦改元以衛將軍梁芬為司徒雍州刺史麴允為使持節領軍將軍錄尚書事京兆太守索綝為尚書右僕射五月詔琅琊王曰朕以冲昧纂承洪緒未能梟夷凶逆奉迎梓宮枕戈煩冤肝心抽裂前得魏浚表知公帥先三軍已據壽春傳檄諸侯協齊威勢想今漸進已達洛陽涼州刺史張軌乃心王室連旗萬里已到汧隴梁州刺史張光亦遣巴漢之卒屯在駱谷秦川驍勇其會如林間遣使適還具知平陽定問云幽并隆盛餘胡衰破然猶恃險當須大舉未知公今所到是以息兵秣馬未便進軍今為已至何許當須來旨使乘輿自出會除中原也公宜思引謨猷勖濟遠略使山陵旋反四海有賴故遣殿中都尉劉蜀蘇馬等具宣朕意公茂德昵屬宣隆東夏恢融六合非公而誰但洛都陵廟不可空曠公宜鎮撫以綏山東右丞相當入輔弼追蹤周邵以隆中興也二年秋七月劉曜趙舟等又逼京都領軍將軍麴允討破之四年七月劉曜攻北地麴允帥步騎三萬救之王師不戰而潰北地大守麴昌奔于京師曜進至涇陽渭北諸城悉潰建威將軍曾充散騎常侍梁緯少府皇甫陽等皆死之八月劉曜逼京師內外斷絕鎮西將軍焦嵩平東將軍宋哲始平太守笁恢等同赴國難麴允與公卿守長安小城以自固散騎常侍華輯監京兆馮翊弘農上洛四部兵東屯霸上鎮軍將軍胡崧帥城西諸郡兵屯遮馬橋並不敢進冬十月京師飢甚米斗金二兩人相食死者太半太倉有麴數十餅麴允屑為粥以供帝至是復盡帝泣渭允曰今窘厄如此外無救援死於社稷是朕事也然念將士暴離斯酷今欲聞城未陷為羞死之事庶令黎元免屠爛之苦行矣遣書朕意決矣十一月乙未使侍中宋敞送牋於曜帝乘羊車肉袒銜壁輿櫬出降群臣號泣攀車執帝之手帝亦悲不自勝御史中丞吉朗自殺曜焚櫬受壁使宋敞奉帝還宮初有童謠曰天子何在豆田中時王浚在幽州以豆有藿殺隱士霍原以應之及帝如曜營營實在城東豆田壁辛丑帝蒙塵於平陽麴允及群官並從劉聰假帝光祿大夫懷安侯壬寅聰臨殿帝稽首于前麴允伏地慟哭因自殺五年春正月帝在平陽庚子虹霓彌天三日並照平東將軍宋哲奔江左十一月劉聰出獵令帝行車騎將軍戎服執戟為導百姓聚而觀之故老或歔欷流涕聰後因大會使帝行酒洗爵反而更衣又使帝執蓋晉臣在座多失聲而泣尚書郎辛賓抱帝慟哭為聰所害十二月, SBCK: ''}
