  - {type: variant, offset: 3965, length: 1027, content: 在位六年時年四十七葬平陵廟號中宗孫盛晉陽秋曰昔秦始皇東遊望氣者云五百年後東南金陵之地有天子氣於是始皇改曰秼陵吳人以為孫權帝之表也盛案始皇遊歲至權僣號四百三十七年考之年數既不合校之基守又非倫豈應帝王之符而見兆於上代乎有晉金行奄君四海金陵之祥其在斯乎且秦政東遊至是五百二十六年所謂五百年之後當有王者也又孫皓將亡吳郡臨無湖一夜草木自除于湖邊得石函中有小石青白色長四尺廣二寸餘上有白帝字時人莫察其祥意者豈中宗興五湖之徵歟太康三年建業有寇餘姚人任振以周易筮之曰寇已滅矣後三十八年楊州當有天子又太安中童謠曰五馬浮渡江一馬化為龍永嘉大亂王室淪覆唯琅耶西陽汝南南頓彭城五王獲濟至是中宗登祚先是歲鎮鎮辰太白四星聚於牛斗之間五鐸又見于晉陵寘數玄感若合符契焉又初玄石圖有牛繼馬後故宣帝深忌牛氏遂為二榼共一口以貯酒帝先飲佳者以毒者酖其將牛金而恭王妃夏氏通小吏牛欽而生元帝亦有符云世說曰元帝始過江謂顧驃騎曰寄人國事志常懷慚策跪荅曰臣聞王者天下為家是以耿毫無定處九鼎後洛邑願陛下無以遷都為念又曰元帝正會引丞相王導登御床王公既固辭中宗引之彌苦文獻曰使太陽與萬物同暉臣下何以仰瞻明皇帝晉書曰明皇帝諱紹字道畿元皇帝長子也幼而聰哲為元帝所寵異年數歲嘗坐置𣍿前屬長安使來因問帝曰汝謂日與長安孰遠對曰長安近不聞人從日邊居然可知也元帝異之明日宴群寮又問之對曰日近元帝失色曰何乃異間者之言對曰舉目則見日不見長安由是益奇之建興初拜東中郎將鎮廣陵元帝為晉王及即帝位為皇太子性至孝有文武才略永昌元年閏月已丑元帝崩庚寅太子即皇帝位大赦尊所生荀氏為皇太后大寧元年三月戊寅朔改元臨軒停饗宴之禮懸而不樂二年夏五月王敦矯詔拜其子應為武衛將軍兄含為驃騎大將軍帝所親信常從督公乘雄冉曾並為敦所害六月敦將舉兵內向帝密知之乃乘巴滇駿馬微行至于湖陰察敦營壘而出軍士疑帝非常人又敦晝寢夢日環其城驚起曰此必黃鬚鮮卑奴來也帝母荀氏燕代人帝狀類外氏鬚黃敦故為帝云於是使五騎物色追帝帝亦馳去僅以獲免秋七月壬申朔敦遣其兄含及錢鳳周撫鄧岳等水陸五萬至于南岸南溫嶠移屯水北燒朱爵桁以挫其鋒帝躬帥六軍出次南堂至癸酉夜募壯士遣將軍叚秀中軍司馬曹渾左衛參軍陳嵩鍾寅等甲卒千人渡水掩其未備平旦戰於越城大破之斬其前鋒將何康王敦憤惋而死三年春二月戊戍復三族刑唯不及婦人三月戊辰立皇太子衍為皇太子大赦增文武位二等大酺三日賜鰥寡孤獨帛閏八月壬午帝不豫召太宰西陽王義司徒王導尚書令卞壺車騎將軍郄鑒護軍將軍庾亮領軍將軍陸曄丹陽尹溫嶠並受遺詔輔太子戊子帝崩于東堂, SBCK: ''}
