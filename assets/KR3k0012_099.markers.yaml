  - {type: variant, offset: 5981, length: 0, content: '', WYG: 慕泣血乞得服重朝議哀之故從封㑹稽王康獻皇后臨朝建位撫軍大將軍録尚書六條事二年驃騎將軍何充薨皇太后詔上内總萬幾海西公即位七月以琅琊王封絶復徙上為琅琊王封王子昌明為㑹稽王固讓不受太和元年十月詔以為丞相尚書入朝不趨讚拜不名劒履上殿給羽葆鼓吹班劒六十人固讓不受海西公廢於是大司馬溫率百官進太極前殿具乗輿法駕奉迎於朝堂變服著平巾幘單衣東向拜受璽流涕即位改太和六年為咸安元年乙夘廢太宰武陵王為庶人二年七月上不豫己未立㑹稽王昌明為皇太子封王子道子為琅琊王領㑹稽内史是日帝崩于東堂在位一年時年五十二續晉陽秋曰桓溫始以雄武入輔繼以廢立帝雖登祚内不自安初熒惑入太微尋廢海西公至是熒惑猶在太微帝惡之因謂郄超曰命之修短本欲不計故當無復徃日事耶超云大司馬臣溫方内固社稷外布經畧非常之事臣以百口保之超還東帝謂之曰致意尊公家國之事遂至於此由吾不能以道自衞思患預防愧歎之深言何能喻又誦庾闡詩云志士痛朝危忠臣哀主辱因泣下及不豫詔溫曰吾遂委頓足下便不冀得相見又詔曰不謂疾患遂至於此今者惙然勢不復久旦雖有詔豈復相及慨恨兼深如何可言天下艱難而昌明幼沖眇然非阿衡輔道之計當何以寧濟社稷國事家計一託之於公又曰帝以太興三年生弱而慧異中宗深器焉及長美丰姿好清言舉止端詳器服簡素與劉恢王蒙等為布衣之友由登庸厯位散騎常侍右將軍撫軍將軍以懿親民望任登宰輔値穆帝幼沖母后臨朝桓溫有平蜀洛之勲擅强西陵帝於家國之計具瞻所歸而自斷之弱無以抗之陳郡人殷浩素有盛名時論比之管葛又琅琊王洽丞相道子既是名公子少有聲望乃以浩為湘州刺史洽為長史徐州刺史葛美亦以清貴名藩同心憂國溫見此樹置知在抗已溫既以雄武專朝任兼將相悉衆北討以成樂推之勢及枋頭奔敗知民望之去乃屠豫州刺史袁眞于壽陽城既而郄超曰足下何以雪枋頭之恥乎超因説溫以廢立之事溫既宿有此謀深納超言既廢昏立明民人悦服然恭已南面政自溫出帝性韻深沈雅有局鎭嘗與太宰武陵王晞桓溫同乗至板橋溫宻勅令無因而鳴角鼔譟部伍並皆驚馳溫佯為駭異而晞大震驚急求下車帝舉止自若顔色不變溫毎以此稱其德量故論者服憚之深若假帝修年則溫簒逆之圖絶矣世説曰桓公既廢太宰武陵王晞父子仍上表云應割近情以存逺計欲除太宰父子可無後憂簡文手答表云所不忍言况過于言桓公得此答又重有表辭轉苦切為家國之計必應行事簡文復手答云若使晉室靈長明公便應奉詔書若大運去矣請避賢路桓公讀詔手戰汗流而止逺徙新安而已孝武皇帝晉書曰孝武皇帝諱曜字昌明簡文帝第三子也興寧二年七月甲申封㑹稽王咸安二年秋七月己未立為皇太子是日簡文帝崩太子即皇帝位詔曰朕以不造奄丁憫凶號天扣地靡知所訴藐然幼沖𦕈若綴旒深惟社稷之重大懼不克負荷仰慿祖宗之靈積德之祀先帝淳風𤣥德遺咏在民宰輔英賢勲隆德盛顧命之託實賴匡訓羣后率職百僚勤政冀孤弱之躬有寄皇極之基不墜先恩遺惠播於四海思𢎞餘潤以康黎庶其大赦天下與民更始九月甲寅追尊皇妣㑹稽王妃曰順皇后冬十一月甲午妖賊盧悚晨入殿庭遊擊將軍毛安之討擒之是歲三呉大旱人多餓死詔所在賑給寧康元年春正月乙丑改元二月大司馬桓溫來朝秋七月己亥使持節侍中都督中外諸軍事丞相録尚書大司馬揚州牧平北將軍徐兖二州刺史南郡公桓溫薨三年九月帝講孝經冬十月癸酉日有食之十二月甲申神獸門災癸未皇太后詔曰頃者日食告變水旱適遭雖克己思救未盡其方賜百姓窮者米各五斛癸巳帝釋奠于中室祀孔子以顔囘配泰元元年春正月帝加元服見于太廟皇太后歸政甲辰大赦改元庚午帝始臨朝六年春正月帝初奉佛法立精舍于殿内引諸沙門以居之八年八月苻堅率衆渡淮遣征討都督謝石冠軍將軍謝𤣥輔國將軍謝琰中郎將桓伊等拒之九月詔司徒琅琊王道子録尚書六條事冬十月苻堅弟苻雄陷壽春乙亥諸將及苻堅戰于淝水大破之俘斬數萬計獲堅輿輦及雲母車十二年六月癸夘束帛聘處士戴逵龔𤣥之秋八月辛巳立皇子德宗為皇太子大赦二十一年九月庚申帝崩于清暑殿在位二十四年時年三十五𦵏平陵帝幼稱聰悟簡文之崩也時年十歲至晡不臨左右進諫答曰哀至則哭何常之有謝安嘗嘆以為精理不減先帝既威權已出雅有人主之量既而溺於酒色殆為長夜之飲末年長星見帝心甚惡之夜於華林園舉酒祝之曰長星勸汝一杯酒自古何有萬歲天子耶太白連年晝見地震水旱為變者相屬醒日既少而傍無正人竟不能改焉時張貴人有寵年三十帝戱之曰汝以年當廢矣貴人潛怒向夕帝醉遂暴崩時道子昏惑元}
