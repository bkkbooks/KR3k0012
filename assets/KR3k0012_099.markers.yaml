  - {type: variant, offset: 5576, length: 384, content: 司徒王導奔于白石庚午陶侃使督護楊謙攻峻于石頭溫嶠庾亮陣于白石竟陵太守李陽拒賊南偏峻輕騎出戰墜馬斬之眾遂大潰賊黨後立峻弟逸為帥四年二月大雨霖丙戍諸軍攻石頭李陽與蘇逸戰于柤浦陽軍大敗建威長史滕含以銳卒擊之逸等大敗含奉帝御于溫嶠舟群臣頓首號泣請罪丁亥大赦時大兵之後宮闕灰燼以建平園為宮甲午蘇逸以萬餘人自延陵湖將入吳興乙未將軍王允之及逸戰于漂陽獲之咸康元年春正月庚午朔帝加元服大赦改元增文武位一等大酺三日賜鰥寡孤獨不能自存者米人五斛二月楊州諸郡饑遣使賑給八年夏六月庚申帝不豫詔曰朕以眇年獲嗣洪緒託于群公之上於茲十有八年未能闡融政道翦除逋祲夙夜戰兢匪遑寧處今遘疾殆不興是用震悼子厥心年齡眇眇未堪艱難司徒琅耶王岳親則母弟體則仁長君人之風允塞時望肆爾群公卿士其輔之以袛奉祖宗明祀協和內外允執其中嗚呼敬之哉旡墜祖宗之顯命壬辰引武陵王晞會稽王昱中書監庾水中書令何充尚書令諸葛恢受顧命癸已, SBCK: ''}
