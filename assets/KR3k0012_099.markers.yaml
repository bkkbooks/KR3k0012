  - {type: variant, offset: 5574, length: 52, content: 戊申司徒王導奔于白石庚午陶侃使督護楊謙攻峻于石頭溫嶠庾亮陣于白石竟陵太守李陽拒賊南偏峻輕騎出戰墜馬斬之眾, WYG: 辛酉桓温以糧盡}
