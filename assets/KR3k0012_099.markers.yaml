  - {type: variant, offset: 2731, length: 1229, content: 戍帝遇弒崩于平陽在位五年時年十八帝之繼皇統也屬永嘉之亂天下崩離長安城中戶不盈百墻宇頹毀蒿棘成林朝廷無車馬章服唯桑板署號而已眾唯一旅公私有車四乘器械多闕運饋不繼巨猾滔天帝京危急諸侯無釋位之志征鎮闕勤王之譽故君臣窘迫以至殺辱東晉元皇帝晉書曰元皇帝諱睿字景文宣帝曾孫琅耶恭王覿之子也咸寧二年生於洛陽有神光之異一室盡明所藉藁如始刈及長白毫生於日角之左隆準龍顏目有精曜顧眄煒如也年十五嗣位琅耶王幼有令問惠皇之際王室多故每恭儉退讓以免于禍沉敏有度量不顯灼然之跡故時人未之識焉唯侍中嵇紹異之謂人曰琅耶王毛骨非常殆非人臣之相元康二年拜員外散騎常侍累遷左將軍從討成都王穎蕩陰之敗叔父東安王繇為頴所害帝懼禍及將出奔其夜月正明而禁衛嚴警無由得去甚窘迫有頃雲霧晦冥雷雨暴至徼者皆弛因得潛出頴先令諸關無得出貴人帝既至河陽為津吏所止從者宋典後來以策鞭帝馬而笑曰舍長官禁貴人汝亦被拘耶吏乃聽過至洛陽迎太妃歸國東海王越之收兵下邳也假帝輔國將軍尋加平東將軍都督楊州諸軍事越西迎大駕留帝居守永嘉初用王導計始鎮建業以顧榮為軍司馬賀循為參佐王敦王導周顗音擬刀協等為腹心股肱賓禮名賢存問風俗江東歸心焉及懷帝蒙塵于平陽司空荀藩等移檄天下推帝為盟主愍帝即位加左丞相歲餘進位丞相大都督中外諸軍事建武元年春二月辛已平東將軍宋哲至宣愍帝詔曰時遭屯否皇綱不振朕以寡德奉承洪緒不能祈天永命紹隆中興至使凶胡敢帥犬羊逼迫京輦朕今幽塞窮城憂慮萬端恐一旦崩潰卿指詣丞相具宣朕意使攝萬機時據舊都脩復陵廟以雪大恥三月帝素服出次舉哀三日西陽王義及群僚參佐州郡牧守等上尊號帝不許義等以死固請至于再三帝慨然流涕曰孤罪人也唯有蹈節死義以雪天下之恥庶贖鈇鉞之誅吾本琅耶王諸賢見逼不已乃呼私奴命駕將反國群臣乃不敢迫請依魏晉故事為晉王許之辛卯即王位大赦改元太興元年春正月戊申朔臨朝懸而不樂三月癸丑愍帝崩問至帝斬縗居廬景辰百寮上尊號即皇帝位詔曰昔我高祖宣皇帝誕膺期運廓開王基景文皇帝奕世重光緝熙諸夏爰暨世祖應天順時受茲明命功格天地仁濟宇宙昊天不融降此鞠凶懷帝短世越去王都天禍荐臻大行皇帝崩殂社稷無奉肆群后三司六事之人疇諮庶尹至于華戎致輯大命于朕躬予一人畏天之威罔弗敢違遂登壇南面受終文祖燔柴頒瑞告類上帝惟朕寡德纘戎洪緒若涉大川罔知攸濟惟恭股肱爪牙之佐文武熊羆之臣用能弼寧晉室輔予一人思與萬國共茲休慶於是大赦改元庚午立太子紹為皇太子永昌元年春正月乙卯大赦改元戊辰大將軍王敦舉兵於武昌以誅劉隗為名龍驤將軍沈充帥眾應之三月徵征西將軍戴若思鎮北將軍劉隗還衛京都劉隗軍于金城右將軍周札守石頭帝被甲徇六師於郊外遣平南將軍陶侃領江州安南將軍甘卓領荊州各帥所統以躡敦後夏四月敦前鋒攻石頭周札開城應賊奮威將軍侯禮死之敦據石頭戴若思劉隗帥眾攻之王導周顗郭逸虞潭等三道出戰六軍敗績尚書令刀協奔于江垂為賊所害鎮北將軍劉隗奔于石勒帝遣使謂敦曰公若不忘本朝於此息兵則天下尚可安也如其不然朕當歸于琅耶以避賢路辛未大赦敦自為丞相都督中外諸軍錄尚書事封武昌郡公邑萬戶十一月已丑, SBCK: 戌}
