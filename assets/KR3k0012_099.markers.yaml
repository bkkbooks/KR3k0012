  - {type: variant, offset: 5981, length: 0, content: '', krp: 守誠乞得服重朝議哀之故從封會稽王康獻皇后臨朝建位撫軍大將軍録尚書六條事二年驃騎將軍何充薨皇太后詔上内㹅萬機海西公即位七月以琅耶王封絶復徙上爲琅耶王封子昌明爲㑹稽王固讓不受太和元年十月詔以爲丞相尚書入朝不趍讃拜不名劒履上殿給羽葆鼓吹班劒六十人固讓不受海西公廢於是大司馬温及百官進太極前殿具乗輿法駕奉迎於朝堂變服著平巾幘單衣東向拜受璽流涕即位改太和六年爲咸安元年乙卯廢太宰武陵王爲庶人二年七月上不豫巳未立皇太子昌明爲皇太子封皇子道子爲琅耶王領㑹稽國是日帝崩于東堂在位一年時年五十二續晉陽秋曰桓温始以雄盛入輔係以廢立帝雖登祚内不自安𥘉熒惑入太微㝷廢海西公至是熒惑猶在太微帝惡之謂郗超曰命之脩短夲所不計故當無復近日事耶超云大司馬臣温方内固社稷外布經略非常之事臣以百口保之假還東帝謂之曰致意尊公家國事一至於此由吾不能以道自衛思患預防愧歎之深言何能喻又誦庾闡詩云士痛朝危臣哀主辱因泣下及不預詔温曰吾遂委頓足下便入兾得相見又詔曰不謂疾患遂至於此今者惙然勢不復乆且雖有詔豈復相及慨恨兼深如何可言天下艱難而昌明㓜冲眇然非阿衡輔導之計當何以寜濟社稷國事家計一託之於公又曰帝以太興三年生弱而慧異中宗深器焉及長羙風姿好清言舉止端詳器服陳素與劉恢王𪷟等爲布衣之友由登庸歴位散騎常侍右將軍撫軍將軍以懿親民望任登宰輔值穆帝㓜冲母后臨朝桓温有平蜀洛之勲檀強西陕帝於家國之寄具瞻所歸而自斷之弱無以抗之陳郡人殷浩素有盛名時論比之管葛又琅耶王洽承相導子旣是名公子少有聲望乃以浩爲湘州刺史屈洽爲長史徐州刺史葛羡亦以清貴居藩同心憂國温見此樹置知在抗巳温旣以雄武專朝任兼將相悉衆北討以成樂推之勢及枋頭奔敗知民望之去乃屠䂊州刺史袁真於壽陽城旣而問郄超曰足下以何雪枋頭之恥乎超因說温以廢立之事温旣宿有此謀深納超言旣廢昬立明民人恱服然恭巳南面政自温岀帝性韻深沉雅有局鎮常與太宰武陵王晞桓温同乗至板橋温宻勑令無因而鳴角鼔譟部伍並皆驚馳温佯爲駭異而晞大震驚急求下車帝舉止自若音顔不變温毎以此稱其德量故論者謂服憚之深若假帝脩年則温纂逆之圖絶矣丗說曰桓公旣廢太宰武陵王晞父子仍上表云應割近情以存逺計欲除太宰父子可無後憂簡文手荅表云所不忍言况過於言桓公得此荅又重有表亂轉苦切爲家國之計必應行事簡文復手荅云若使晉室靈長明公便應奉詔書若大運去矣請避賢路桓公讀詔手戰汗流而止逺徙新安而巳孝武帝晉書曰孝武皇帝韓曜字昌明簡文帝第三子也興寧三年七月甲申封㑹稽王咸安二年秋七月巳未立爲皇太子是日簡文帝崩太子即皇帝位詔曰朕以不造奄丁憫凶號天扣地靡知所訴藐然㓜冲眇若綴旒深爲社稷之重大懼不尅負荷仰慿祖宗之靈積德之祀先帝淳風玄德遺詠在民宰輔英賢勲隆徳盛頋命之託寔頼匡訓羣后率職百僚勤政兾孤弱之躬有寄皇極之基不墜先恩遺惠播于四海思弘餘潤以康黎庶其大赦天下與民更始九月甲寅追尊皇妣㑹稽王妃曰順皇后冬十一月甲午妖賊盧悚晨入殿庭游擊將軍毛安之討擒之是歲三呉大旱人多餓死詔所在賑給寕康元年春正月改元二月大司馬桓温來朝秋七月巳亥使持節侍中都督中外諸軍事丞相録尚書大司馬楊州牧平北將軍徐兖二州刺史南郡公桓温薨三年九月帝講孝經冬十月癸酉日有蝕之十二月甲申神獸門災癸未皇太右詔曰傾者日蝕告變水旱不適雖尅巳思救未盡其方賜百姓窮者米人五斛癸巳帝釋奠于中室祠孔子以顔回配泰元元年春正月帝加元服見于太廟皇太后歸政甲辰大赦改元景午帝始臨朝六年春正月帝𥘉奉佛法立精舎于殿内引諸沙門以居之八年八月符雲帥衆渡淮遣征討都督謝石冠軍將軍謝玄輔國將軍謝琰西中郎將桓伊等拒之九月詔司徒琅耶王道子録尚書六滌事冬十月符堅弟融䧟夀春乙亥諸將及苻堅戰於肥水大破之俘斬數萬計獲堅輿輦及雲母車十二年六月癸卬束帛聘處士戴逵龔玄之秋八月辛巳立皇子徳宗爲皇太子大赦二十一年九月庚申帝崩于清暑殿在位二十四年時年三十五葬平陵帝㓜稱聦悟簡文之崩也時年十歳至晡不臨左右進諌荅曰哀至則哭何常之有謝安甞歎以爲精理不減先帝旣威權巳岀雅有人主之量旣而溺於酒色殆爲長夜之飲末年長星見帝心甚惡之夜於華林園舉酒祝之曰長星勸汝一柸酒自古何有萬歳天子耶太白連年晝見地震水旱爲變者相屬醒日旣少而傍無正人竟不能改焉時張貴人有寵年三十帝戲之曰汝以年當廢矣貴人潜怒向夕帝醉遂暴崩時道子昏惑元}
  - {type: variant, offset: 5982, length: 1, content: 宗, SBCK: 專權竟不推其罪􅀄以簡文帝見䜟云􅀳祚盡昌明及帝之在孕也李太后夢神人謂之曰汝生男以昌明爲字及産東方始明因以名焉簡文帝後悟乃流涕及爲清暑殿識者以爲清暑反爲楚聲哀楚之徴也俄而帝崩晉祚自此傾矣續􅀳陽秋曰􅀄帝躭於色末年殆爲長夜之飲醒治旣少多居内殿留連於盤罇之間時張貴人寵冠後宫威行閫内年幾三十帝妙列􅇊樂陪侍嬪少乃􅀏而戯之云汝巳年廢矣吾巳屬諸妹少矣貴人潜怒上不覺上稍醉卧貴人遂令其婢蒙之以􅀍旣絶云以魘崩至丑時方遷登太極前殿異􅁐曰晉孝武太元末帝毎聞手巾箱中有鼓吹鼙角之饗於是請僧齋會夜見一臂長三丈許手長數尺來摸經案􅀳祚自此而衰太平御覽卷第九十九}
  - {type: page-break, offset: 5982, content: '', id: KR3k0012_SBCK_099-8a}
  - {type: page-break, offset: 5982, content: '', id: KR3k0012_SBCK_099-8b}
  - {type: variant, offset: 5982, length: 1, content: 宗, WYG: 專權竟不推其罪人初簡文帝見䜟云晉祚盡昌明及帝之在孕也李太后夢神人謂之曰汝生男以昌明為字及産東方始明因以名焉簡文帝後悟乃流涕及為清暑殿識者以為清暑反為楚聲哀楚之徵也俄而帝崩晉祚自此傾矣續晉陽秋曰初帝耽於色末年殆為長夜之飲醒日既少多居内殿畱連于聲色之間時張貴人寵冠後宫威行閫内年幾三十帝妙列伎樂陪侍嬪少乃笑而戯之云汝年當廢矣吾已屬諸姝少矣貴人潛怒上不覺上稍醉卧貴人遂令其婢蒙之以被既絶云以魘崩至丑時方遷登太極前殿異苑曰晉孝武太元末帝毎聞手巾箱中有鼔吹鼙角之音于是請僧齋㑹夜見一臂長三丈許手長數尺來摸經案晉祚自此而衰太平御覽卷九十九}
  - {type: page-break, offset: 5982, content: '', id: KR3k0012_WYG_099-13b, image: WYG0893/WYG0893-0804d.png}
  - {type: page-break, offset: 5982, content: '', id: KR3k0012_WYG_099-14a, image: WYG0893/WYG0893-0805a.png}
