  - {type: variant, offset: 5979, length: 0, content: '', krp: 廢帝海西公晉書曰廢帝諱弈字延齡哀帝母弟也咸康八年封爲東海王永和八年拜散騎常侍㝷加鎮軍將軍升平四年拜車騎將軍五年改封琅耶王隆和𥘉轉侍中驃騎大將軍開府儀同三司興寜三年二月景申哀帝崩無嗣丁酉皇太后詔曰帝遂不救厥疾艱禍仍臻遺緒泯然哀慟切心琅耶王弈明徳茂親屬當儲副冝奉祖宗纂承大統便速正大禮以寜人神於是百官奉迎于琅耶第是日即皇帝位大赦太和四年大司馬桓温帥衆伐慕容暐秋七月辛夘暐將慕容垂帥衆拒温温擊敗之九月戊寅桓温禆將鄧遐朱序遇暐將傅末波於林渚又大破之戊子温至枋頭景申以粮運不繼焚舟而歸六年十一月癸夘桓温自廣陵屯于白石丁未詣闕因圖廢立誣帝在藩夙有痿疾嬖人相寵計好朱靈寳等叅侍内寢而二羙人田氏孟氏生三男長欲封樹時人惑之温因諷太后以伊霍之舉巳酉集百官于朝堂宣崇徳太后令曰王室艱難穆哀短祚國嗣不育儲宫靡立琅耶王弈親則母弟故以入纂大位不圖徳之不建乃至於斯昬濁潰亂動違禮度有此三孽莫知誰子人倫道䘮醜聲遐布旣不可以奉守社稷敬承宗}
  - {type: variant, offset: 5980, length: 0, content: '', SBCK: 且昏孽並大便欲建樹儲藩誣罔祖宗傾移皇基是而可忍孰不可懷今廢弈爲東海王以王還弟供衛之儀皆如漢朝昌邑故事􅀄桓温有不臣之志欲先立功河朔以收時望及枋頭之敗威名頓挫遂潜謀廢立以長威權然憚帝守道恐招時議以宫闈重閟牀第昜誣乃言帝爲閹遂行廢辱􅀄帝平生每以爲慮甞召術人扈謙筮之卦成荅曰晉室有盤石之固陛下有出宫之象竟如其言咸安二年正月降封帝爲海西縣公臧榮緒晉書曰太和元年桓温表率方伯北伐秋九月温以王師敗績于枋頭温自廣陵屯于白石集百官于朝堂稱崇徳太后詔廢帝爲東海王妖賊盧悚遣弟殿中監許龍晨到稱太后宻詔奉迎稱覆帝曰我得罪在此幸蒙寛宥豈敢妄動且太后有詔使應官屬來迎何得如此必狂亂因叱左右縛之龍懼逸走由是朝廷以帝安於屈辱無僥倖之望不復懷疑帝亦知天命不再而深慮人禍乃􅐬聦塞明無思無慮終日酣暢耽于内寵有子不養庶保天年呉民憐之爲作歌謡帝崩于呉宫年三十五因葬呉地續晉陽秋曰帝少同閹人之疾􅀄在東海琅耶因親近嬖人相寵計好朱靈寳等並侍卧内美人田氏遂生三男衆致疑惑然莫能審其虛實至是將建儲貳大司馬温因之以定廢立之計遂率百僚並還朝堂本省温平旦以衆入分兵屯宫門呈草於皇太后曰今廢弈爲東海王以還弟供衛之儀如漢朝昌邑故事丞相録尚書事會稽王昱體自中宗明徳劭令民望依係爲日已乆冝順天人以統皇極主者明依舊典以時施行但未亡人不幸罹此百憂感念存没心焉如割社稷大計議者不􅀗巳臨􅁓悲塞如何可言時太后在佛屋燒香内侍啓云外有急奏太后乃出堂􅀝户前視表數行乃曰我夲自疑比至半便止求筆題奏後云未亡人離此百憂感念存没心焉如割温奏未有此五十字即奏遂廻換内之簡文帝晉中興書曰太宗簡文帝諱昱字道成中宗少子也母曰鄭夫人永昌二年封琅耶王咸和元年鄭夫人薨上時年七􅀊哀}
  - {type: page-break, offset: 5980, content: '', id: KR3k0012_SBCK_099-4a}
  - {type: page-break, offset: 5980, content: '', id: KR3k0012_SBCK_099-4b}
  - {type: variant, offset: 5980, length: 0, content: '', WYG: 且昏孽並大便欲建樹儲藩誣罔祖宗傾移皇基是而可忍孰不可忍今廢奕為東海王以王還第供衞之儀皆如漢朝昌邑故事初桓溫有不臣之志欲先立功河朔以収時望及枋頭之敗威名頓挫遂潛謀廢立以長威權然憚帝守道恐招時議以宫闈重閟牀笫易誣乃言帝為閹遂行廢辱初帝平生毎以為慮嘗召術人扈謙筮之卦成答曰晉室有盤石之固陛下有出宫之象竟如其言咸安二年正月降封帝為海西縣公臧榮緒晉書曰太和元年桓溫表率方伯北伐秋九月溫以王師敗績于枋頭溫自廣陵屯于白石集百官于朝堂稱崇德太后詔廢帝為東海王妖賊盧悚遣弟子殿中監許龍晨到門稱太后宻詔奉迎興復帝曰我得罪到此幸蒙寛宥豈敢妄動且太后有詔便應官屬來迎何得如此必狂亂因叱左右縛之龍晨懼而走由是朝廷以帝安于屈辱無僥倖之望不得懐疑帝亦知天命不再而深慮人禍乃蔽聽塞明無思慮終日酣飲耽于内寵有子不養庶保天年呉民憐之為作歌謠帝崩于呉宫年四十五因葬呉地續晉陽秋曰帝少同閹人之疾而暱比左右初在東海琅琊因親近嬖人相龍計好朱靈寳等並侍卧内美人田氏遂生三男衆致疑惑然莫能審其虚實至是將建儲貳大司馬桓溫因之以定廢立之計遂率百僚並還朝堂本省溫平旦以衆入分兵屯宫門呈草于皇太后后曰今廢奕為東海王還第供衞之儀如漢朝昌邑故事丞相録尚書事㑹稽王昱體自中宗明德劭令民望依係為日已久宜應天人以統皇極主者明依舊典以時施行但未亡人不幸罹此百憂感念存殁心焉如割社稷大計義不獲已臨紙悲塞如何可言時太后在佛屋燒香内侍啓云外有急奏太后乃出堂倚户前視表數行乃曰我本自疑此至半便止求筆題奏後云未亡人罹此百憂感念存殁心焉如割溫奏未有此十五字遂即奏逥換内之簡文皇帝晉中興書曰太宗簡文帝諱昱字道成中宗少子也母曰鄭夫人永興二年封琅琊王咸和元年鄭夫人薨上時年七歲}
