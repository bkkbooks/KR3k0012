  - {type: variant, offset: 567, length: 1323, content: 寅并州人田蘭薄盛等斬汲桑于樂陵東海王越矯詔囚清河王覃于金墉城癸卯越自為丞相以撫軍荀晞為征東大將軍二年春正月丙子朔日有蝕之丁未大赦二月辛卯清河郡王覃為東海王越所害冬十月甲戍劉元海僣帝號於平陽仍稱漢三年三月丁巳東海王越歸京師乙丑勒兵入宮於帝側收近臣中書令繆播帝舅王延等十餘人並害之大旱江漢河洛皆竭可涉九月景寅劉聰寇浚儀遣平北將軍曹武討之丁丑王師敗績東海王越入保京城聰至西明門越禦之戰於宣陽門外大破之使車騎將軍王堪平北將軍曹武討劉聰王師敗績堪奔還京師劉聰攻洛陽西明門不剋冬十一月石勒陷長樂安北將軍王斌遇害因屠黎陽乞活師李惲薄盛等帥眾救京師聰退走惲等又破王彌于新汲四年十月壬子以驃騎將軍王浚為司空平北將軍劉琨為北平大將軍京師飢東海王越羽檄徵天下兵帝謂使者曰為我語諸征鎮若今日尚可救後則無逮矣時莫有至者十一月甲戍東海王越帥眾出許昌以行臺自隨宮無復守衛茺饉日甚殿內死人交橫府寺營署並掘壍自守盜賊公行桴鼓之音不絕越軍次項自領豫州牧鎮東將軍周馥表迎大駕遷都壽陽越使裴頠討馥為馥所敗走保東城請救於琅琊王睿五年春正月帝密詔荀晞討東海王越罪狀告方鎮討之以征東大將軍荀晞為大將軍景子東海王越薨五月進司空王浚為大司馬琅琊王睿為鎮東大將軍東海王越之出也使河南尹潘滔居守大將軍荀晞表遷都倉垣帝將從之諸大臣畏滔不敢奉詔且宮中及黃門戀貲財不欲出至是飢甚人相食百官流亡者十八九帝召群臣會議將行而警衛不備帝撫手歎之曰如何曾無車輿乃使司徒傅祇出詣河陰脩理舟楫為水行之備朝士數十人導從帝步出西掖門至銅駞街為盜所掠不得進而還六月癸未劉曜王彌石勒同寇洛川王師頻為賊所敗死者甚眾庚寅司空荀藩光祿大夫荀組奔轘轅太子左率溫夷夜開廣莫門奔小平津丁酉劉曜王彌入京師帝開華林園門出河陰藕池欲幸長安為曜等所追及曜等遂焚燒宮廟辱妃后吳王晏竟陵王楙音茂尚書左僕射和郁等皆遇害百官士庶死者三萬餘人帝蒙塵於平陽劉聰以帝為會稽公荀藩移檄州鎮以琅琊王為盟主豫章王端東奔荀晞晞立為皇太子自領尚書令且置官屬保梁國之蒙縣百姓飢米斛萬餘價八月劉聰使子粲攻陷長安太尉征西將軍南陽王模遇害長安遺人四千餘家奔漢中九月癸亥石勒襲陽夏至于蒙縣大將軍荀晞豫章王端並沒于賊六年春正月帝在平陽九月辛已前雍州刺史賈疋討劉粲於三輔走之關中小定乃與衛將軍梁芬京兆太守梁綜共奉秦王業為皇太子於長安七年春正月劉聰大會使帝著青衣行酒侍中庾珉號哭聰惡之丁未帝遇弒崩于平陽在位七年時年三十晉陽秋曰懷帝天姿清劭少有聲名若遭承平之世足為守文佳主而繼惠帝擾亂之後東海專政祿去王室無幽厲之釁而有犬戎之禍悲夫愍皇帝晉書曰愍皇帝諱鄴字彥旗武帝孫吳孝王晏之子也出繼伯父秦獻王東襲封秦王永嘉二年拜散騎常侍撫軍將軍及洛陽傾覆避難於滎陽密縣與舅荀藩荀組相遇自密南趣許穎豫州刺史閻鼎與前撫軍長史王毗司徒長史劉疇中書郎李昕及藩組等同謀奉帝歸于長安而疇等中塗復叛鼎追殺之藩組僅而獲免鼎遂扶帝乘牛車自宛趣武關歸於長安頻遇山賊士卒亡散次于藍田鼎告雍州刺史賈疋疋遽遣州兵迎衛達于長安又使輔國將軍梁綜助守時有玉龜出霸水神馬鳴城南元年九月辛巳奉秦王為皇太子登壇告類建宗廟社稷大赦加疋征西將軍以秦州刺史南陽王保為大司馬賈疋討賊張連遇害眾推始平太守麴允領雍州刺史為盟主承制選置建興元年夏四月景午奉懷, WYG: 戌}
