  - {type: variant, offset: 5202, length: 3, content: 世根明, krp: 彭子康帝子也建元二年九月景申立爲皇太子戊戍康帝崩巳亥即皇帝位時年二歳大赦尊皇后爲皇太后壬寅皇太后臨朝攝政永和元年春正月甲戍朔皇太后設白紗帷於太極殿抱帝臨軒改元二年十一月辛未安西將軍桓温師虜將軍周撫輔國將軍譙王元忌建武將軍袁喬伐蜀拜表輙行十二月枉矢自東南流于西北其長半天三年春三月桓温攻成都尅之李勢降益州平十年二月巳丑太尉征西將軍桓温帥師伐關中廢楊州刺史殷浩爲庶人六月符健將符雄悉衆及桓温戰于白鹿原王師敗績九月桓温以粮盡遂還升平元年春正月壬戍朔帝加元服告于太廟始親萬機大赦改元増文武位一等皇太后居崇徳宫五年五月丁巳帝崩顯陽殿在位十七年時年十九葬永平陵廟號孝宗哀皇帝晉書曰哀皇帝諱丕字千齡成}
