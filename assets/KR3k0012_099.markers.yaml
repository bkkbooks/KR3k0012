  - {type: variant, offset: 5979, length: 0, content: '', SBCK: 廢帝海西公􅀳書曰廢帝諱弈字延齡哀帝母弟也咸康八年封爲東海王永和八年拜散􅀐常侍㝷加鎮軍將軍升平四年拜車􅀐將軍五年改封琅耶王隆和􅀄轉侍中驃􅀐大將軍開府儀同三司興寜三年二月景申哀帝崩無嗣丁酉皇太后詔曰帝遂不救厥疾艱禍仍臻遺緒泯然哀慟切心琅耶王弈明徳茂親屬當儲副冝奉祖宗纂承大統便速正大禮以寜人神於是百官奉迎于琅耶第是日即皇帝位大赦太和四年大司馬桓温帥衆伐慕容暐秋七月辛夘暐將慕容垂帥衆拒温温擊敗之九月戊寅桓温禆將鄧遐朱序遇暐將傅末波於林渚又大破之戊子温至枋頭景申以粮運不繼焚舟而歸六年十一月癸夘桓温自廣陵屯于白石丁未詣闕因圖廢立誣帝在藩夙有痿疾嬖人相寵計好朱靈寳等叅侍内寢而二羙人田氏孟氏生三男長欲封樹時人惑之温因諷太后以伊霍之舉巳酉集百官于朝堂宣崇徳太后令曰王室艱難穆哀短祚國嗣不育儲宫靡立琅耶王弈親則母弟故以入纂大位不圖徳之不建乃至於斯昬濁潰亂動違禮度有此三孽莫知誰子人倫道䘮醜聲遐布旣不可以奉守社稷敬承宗}
  - {type: page-break, offset: 5979, content: '', id: KR3k0012_SBCK_099-3a}
  - {type: page-break, offset: 5979, content: '', id: KR3k0012_SBCK_099-3b}
  - {type: variant, offset: 5979, length: 0, content: '', WYG: 廢帝海西公晉書曰廢帝諱奕字延齡哀帝母弟也咸康八年封為東海王永和八年拜散騎常侍尋加鎭軍將軍升平四年拜車騎將軍五年改封琅琊王隆和初轉侍中驃騎大將軍開府儀同三司興寧三年二月庚申哀帝崩無嗣丁酉皇太后詔曰帝遂不救厥疾艱禍仍臻遺緒冺然哀慟切心琅琊王奕明德懋親屬當儲副宜奉祖宗纂承大統便速正大禮以寧人神于是百官奉迎于琅琊王第是日即皇帝位大赦太和四年夏四月庚戌大司馬桓温率衆伐慕容暐七月辛夘暐將慕容垂帥衆拒溫温敗之九月戊寅桓溫裨將鄧遐朱序遇暐將傅末波于林渚又大破之戊子桓温至枋頭丙申以粮運不繼焚舟而歸六年冬十一月癸夘桓溫自廣陵屯于白石丁未詣闕因圖廢立誣帝在藩夙有痿疾嬖人相龍計好朱靈寳等參侍内寢而二美人田氏孟氏生三男長欲封樹時人惑之溫因諷太后以伊霍之舉己酉集百官于朝堂宣崇德太后令曰王室艱難穆哀短祚國嗣不育儲宫靡立琅琊王奕親則母弟故以入纂大位不圖德之不建乃至于斯昏濁潰亂動違禮度有此三孽莫知誰子人倫道喪醜聲遐布既不可以奉守社稷敬承宗}
  - {type: page-break, offset: 5979, content: '', id: KR3k0012_WYG_099-5a, image: WYG0893/WYG0893-0800c.png}
