  - {type: variant, offset: 1892, length: 245, content: 問舉哀成禮壬申即皇帝位大赦改元以衛將軍梁芬為司徒雍州刺史麴允為使持節領軍將軍錄尚書事京兆太守索綝為尚書右僕射五月詔琅琊王曰朕以冲昧纂承洪緒未能梟夷凶逆奉迎梓宮枕戈煩冤肝心抽裂前得魏浚表知公帥先三軍已據壽春傳檄諸侯協齊威勢想今漸進已達洛陽涼州刺史張軌乃心王室連旗萬里已到汧隴梁州刺史張光亦遣巴漢之卒屯在駱谷秦川驍勇其會如林間遣使適還具知平陽定問云幽并隆盛餘胡衰破然猶恃險當須大舉未知公今所到是以息兵秣馬未便進軍今為已至何許當須來旨使乘輿自出會除中原也公宜思引謨猷勖濟遠略使山陵旋反四海有賴故遣, WYG: 於式乾}
