  - {type: variant, offset: 5980, length: 0, content: '', krp: 且昏孽並大便欲建樹儲藩誣罔祖宗傾移皇基是而可忍孰不可懷今廢弈爲東海王以王還弟供衛之儀皆如漢朝昌邑故事𥘉桓温有不臣之志欲先立功河朔以收時望及枋頭之敗威名頓挫遂潜謀廢立以長威權然憚帝守道恐招時議以宫闈重閟牀第昜誣乃言帝爲閹遂行廢辱𥘉帝平生每以爲慮甞召術人扈謙筮之卦成荅曰晉室有盤石之固陛下有出宫之象竟如其言咸安二年正月降封帝爲海西縣公臧榮緒晉書曰太和元年桓温表率方伯北伐秋九月温以王師敗績于枋頭温自廣陵屯于白石集百官于朝堂稱崇徳太后詔廢帝爲東海王妖賊盧悚遣弟殿中監許龍晨到稱太后宻詔奉迎稱覆帝曰我得罪在此幸蒙寛宥豈敢妄動且太后有詔使應官屬來迎何得如此必狂亂因叱左右縛之龍懼逸走由是朝廷以帝安於屈辱無僥倖之望不復懷疑帝亦知天命不再而深慮人禍乃閉聦塞明無思無慮終日酣暢耽于内寵有子不養庶保天年呉民憐之爲作歌謡帝崩于呉宫年三十五因葬呉地續晉陽秋曰帝少同閹人之疾𥘉在東海琅耶因親近嬖人相寵計好朱靈寳等並侍卧内美人田氏遂生三男衆致疑惑然莫能審其虛實至是將建儲貳大司馬温因之以定廢立之計遂率百僚並還朝堂本省温平旦以衆入分兵屯宫門呈草於皇太后曰今廢弈爲東海王以還弟供衛之儀如漢朝昌邑故事丞相録尚書事會稽王昱體自中宗明徳劭令民望依係爲日已乆冝順天人以統皇極主者明依舊典以時施行但未亡人不幸罹此百憂感念存没心焉如割社稷大計議者不獲巳臨𥿄悲塞如何可言時太后在佛屋燒香内侍啓云外有急奏太后乃出堂倚户前視表數行乃曰我夲自疑比至半便止求筆題奏後云未亡人離此百憂感念存没心焉如割温奏未有此五十字即奏遂廻換内之簡文帝晉中興書曰太宗簡文帝諱昱字道成中宗少子也母曰鄭夫人永昌二年封琅耶王咸和元年鄭夫人薨上時年七歲哀}
  - {type: variant, offset: 5981, length: 0, content: '', SBCK: 守誠乞得服重朝議哀之故從封會稽王康獻皇后臨朝建位撫軍大將軍録尚書六條事二年驃􅀐將軍何充薨皇太后詔上内㹅萬機海西公即位七月以琅耶王封絶復徙上爲琅耶王封子昌明爲㑹稽王固讓不受太和元年十月詔以爲丞相尚書入朝不趍讃拜不名劒履上殿給羽葆鼓吹班劒六十人固讓不受海西公廢於是大司馬温及百官進太極前殿具乗輿法駕奉迎於朝堂變服著平巾幘單衣東向拜受璽流涕即位改太和六年爲咸安元年乙卯廢太宰武陵王爲庶人二年七月上不豫巳未立皇太子昌明爲皇太子封皇子道子爲琅耶王領㑹稽國是日帝崩于東堂在位一年時年五十二續􅀳陽秋曰桓温始以雄盛入輔係以廢立帝雖登祚内不自安􅀄熒惑入太微㝷廢海西公至是熒惑猶在太微帝惡之謂郗超曰命之脩短夲所不計故當無復近日事耶超云大司馬臣温方内固社稷外布經略非常之事臣以百口保之假還東帝謂之曰致意尊公家國事一至於此由吾不能以道自衛思患預防愧歎之深言何能喻又誦􅁃闡詩云士痛朝危臣哀主辱因泣下及不預詔温曰吾遂委頓足下便入兾得相見又詔曰不謂疾患遂至於此今者惙然勢不復乆且雖有詔豈復相及􅁣恨兼深如何可言天下艱難而昌明㓜冲眇然非阿衡輔導之計當何以寜濟社稷國事家計一託之於公又曰帝以太興三年生弱而慧異中宗深器焉及長羙風姿好清言舉止端詳器服陳素與劉恢王􅄥等爲布衣之友由登庸歴位散􅀐常侍右將軍撫軍將軍以懿親民望任登宰輔值穆帝㓜冲母后臨朝桓温有平蜀洛之勲檀強西陕帝於家國之􅀉具瞻所歸而自斷之弱無以抗之陳郡人殷浩素有盛名時論比之管􅁑又琅耶王洽承相導子旣是名公子少有聲望乃以浩爲湘州刺史屈洽爲長史徐州刺史􅁑羡亦以清貴居藩同心憂國温見此樹置知在抗巳温旣以雄武專朝任兼將相悉衆北討以成樂推之勢及枋頭奔敗知民望之去乃屠䂊州刺史袁真於壽陽城旣而問郄超曰足下以何雪枋頭之恥乎超因􅀃温以廢立之事温旣􅀫有此謀深納超言旣廢昬立明民人恱服然恭巳南面政自温岀帝性韻深沉雅有局鎮常與太宰武陵王晞桓温同乗至板橋温宻勑令無因而鳴角鼔譟部伍並皆驚馳温佯爲駭異而晞大震驚急求下車帝舉止自􅀂音顔不變温毎以此稱其德量故論者謂服憚之深􅀂假帝脩年則温纂逆之圖絶矣丗􅀃曰桓公旣廢太宰武陵王晞父子仍上表云應割近情以存逺計欲除太宰父子可無後憂簡文手荅表云所不忍言况過於言桓公得此荅又重有表亂轉苦切爲家國之計必應行事簡文復手荅云􅀂使􅀳室靈長明公便應奉詔書􅀂大運去矣請避賢路桓公讀詔手戰汗流而止逺徙新安而巳孝武帝􅀳書曰孝武皇帝韓曜字昌明簡文帝第三子也興寧三年七月甲申封㑹稽王咸安二年秋七月巳未立爲皇太子是日簡文帝崩太子即皇帝位詔曰朕以不造奄丁憫凶號天扣地靡知所訴藐然㓜冲眇􅀂綴旒深爲社稷之重大懼不尅􅀒荷仰慿祖宗之靈積德之祀先帝淳風􅀇德遺詠在民宰輔英賢勲隆徳盛頋命之託寔頼匡訓羣后率職百僚勤政兾􅀌弱之躬有􅀉皇極之基不墜先恩遺惠播于四海思􅀪餘􅃳以康􅀺庶其大赦天下與民更始九月甲寅追尊皇妣㑹稽王妃曰順皇后冬十一月甲午妖賊盧悚晨入殿庭游擊將軍毛安之討擒之是􅀊三呉大旱人多餓死詔所在賑給寕康元年春正月改元二月大司馬桓温來朝秋七月巳亥使持節侍中都督中外諸軍事丞相録尚書大司馬楊州牧平北將軍徐兖二州刺史南郡公桓温薨三年九月帝講孝經冬十月癸酉日有蝕之十二月甲申神獸門災癸未皇太右詔曰傾者日蝕告變水旱不適雖尅巳思救未盡其方賜百姓窮者米人五斛癸巳帝釋奠于中室祠孔子以顔回配泰元元年春正月帝加元服見于太廟皇太后歸政甲辰大赦改元景午帝始臨朝六年春正月帝􅀄奉佛法立精舎于殿内引諸沙門以居之八年八月符雲帥衆渡淮遣征討都督謝石冠軍將軍謝􅀇輔國將軍謝琰西中郎將桓伊等拒之九月詔司徒琅耶王道子録尚書六滌事冬十月符堅弟融䧟夀春乙亥諸將及苻堅戰於肥水大破之俘斬數萬計􅀗堅輿輦及雲母車十二年六月癸卬束帛聘處士戴逵龔􅀇之秋八月辛巳立皇子徳宗爲皇太子大赦二十一年九月庚申帝崩于清暑殿在位二十四年時年三十五葬平陵帝㓜稱聦悟簡文之崩也時年十歳至晡不臨左右進諌荅曰哀至則哭何常之有謝安甞歎以爲精理不減先帝旣威權巳岀雅有人主之量旣而溺於酒色殆爲長夜之飲末年長星見帝心甚惡之夜於華林園舉酒祝之曰長星勸汝一柸酒自古何有萬歳天子耶太白連年晝見地震水旱爲變者相屬醒日旣少而傍無正人竟不能改焉時張貴人有寵年三十帝戲之曰汝以年當廢矣貴人潜怒向夕帝醉遂暴崩時道子昏惑元}
