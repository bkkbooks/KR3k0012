  - {type: variant, offset: 5000, length: 0, content: '', SBCK: 三葬崇平陵􅀄成帝有疾中書令􅁃氷自以舅氏當朝權侔人主恐異丗之後戚屬將踈乃言國有強敵冝立長君遂以帝爲嗣制度年號再興中朝因改元曰建元或謂冰曰郭璞䜟云立始之際丘山傾立者建也始者元也丘山諱也冰瞿然旣而歎曰如有􅁻凶豈改昜所能救乎至是果驗云丗􅀃曰何次道􅁃季堅二人並爲元輔成帝􅀄崩于時嗣君未定何欲立子􅁃及朝議以外方強㓂嗣子㓜欲立康帝康帝旣登祚㑹羣臣謂何曰朕今所以承大統爲誰之議何曰陛下龍飛臣冰之功使于時用微臣今不覩聖明之丗上有慙色穆皇帝􅀳書曰穆皇帝諱聃字彭子康帝子也建元二年九月景申立爲皇太子戊戍康帝崩巳亥即皇帝位時年二歳大赦尊皇后爲皇太后壬寅皇太后臨朝攝政永和元年春正月甲戍朔皇太后設白紗帷於太極殿抱帝臨軒改元二年十一月辛未安西將軍桓温師虜將軍周撫輔國將軍譙王元忌建武將軍􅀽喬伐蜀拜表輙行十二月枉矢自東南流于西北其長半天三年春三月桓温攻成都尅之李勢降益州平十年二月巳丑太尉征西將軍桓温帥師伐關中廢楊州刺史殷浩爲庶人六月符健將符雄悉衆及桓温戰于白鹿原王師敗績九月桓温以粮盡遂還升平元年春正月壬戍朔帝加元服告于太廟始親萬機大赦改元増文武位一等皇太后居崇徳宫五年五月丁巳帝崩顯陽殿在位十}
