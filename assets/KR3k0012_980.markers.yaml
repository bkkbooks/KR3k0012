  - {type: variant, offset: 2512, length: 0, content: '', SBCK: 去矣采南山蕨飲三江水也爾雅曰蕨鱉􅀄生無葉可食江西謂之弊古詩曰山桃發紅蕚野蕨漸紫苞堇詩曰周原膴膴堇荼如飴堇菜也荼苦菜也周之原地肥美所生菜雖有性苦者皆甘如飴也禮曰堇苴枌榆􅇠薧音考滫髓以滑之謂用調和飲食也蓂堇􅀋也冬用堇夏用荁爾雅曰齧苦堇今堇葵也葉似栁予如米汋食之滑三十國春秋曰劉殷字長盛七歳喪其父哀毀踰禮曾祖母王氏盛冬思堇殷入澤中慟􅂘有堇生焉得斛餘廣語曰夏蓂秋堇滑如粉後魏書曰崔和爲平昌太守性鄙恡埋錢百斛其母季春思堇惜錢不買荇爾雅曰莕接余其葉苻藂生水中葉圎在莖端長短隨流水深淺江東人食之音杏也詩曰參差荇菜左右流之窈窕淑女窹􅄰求之荇接余也邪蒿北齊書曰刑峙字士俊以經授皇太子厨宰進太子食有菜曰邪蒿令去之曰此菜有不正之名非殿下所冝食顯宗聞而嘉之芸臺通俗文曰芸臺謂之胡菜韻集曰芸臺胡菜薫葇方言曰􅂫之小者謂之穰葇薫菜也鹿角南越志曰猴葵色赤生石上南越謂之鹿角葫荽石崇奴劵曰奴當種羅勒胡荽不親不踈優殿南方草物􅃺曰合浦有菜名優殿以豆醬汁茹食芳好可食胡䴵雍菜廣州}
