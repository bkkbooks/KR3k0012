  - {type: variant, offset: 1924, length: 563, content: 古歌辭曰採葵莫傷根傷根葵不生結交莫羞貧羞貧交不成蕪菁爾雅曰須葑蓯音總也須未聞江東呼蕪菁為菘菘須音相近故也須即蕪菁也尚書曰荊州厥貢苞匭菁茅菁似為葅也詩曰採葑採菲無以下體葑蕦也菲芴也下體根莖也箋云葑蔓菁與葍之類皆上下可食然其根有美時有惡時又曰爰采葑矣沫之東矣箋云葑蔓菁也又曰采苓好聽讒也采葑采葑首陽之東人之為言茍亦無從葑菜也陸機毛詩䟽義曰菜葑蕪菁也郭玄今菘菜也可食少味東觀漢記曰桓帝永興二年詔司隸蝗水為災五榖不登令所傷郡國皆種蕪菁以助民食吳曆曰劉備歸曹公曹公使親近覘視諸將有賓客酒食者輒因事害之備時閉門將人種蕪菁公使人窺門即去備謂張飛曰吾豈種菜者乎曹公必有疑意不可復留其夜輕馬而去吳錄曰陸遜諸葛瑾攻襄陽遜遣親人韓扁抄掠瑾聞之欲急去遜方催人種豆菘與諸將圍碁以示閑暇齊書曰武陵王曄性清簡尚書令王儉詣曄留儉設食盤中菘菜鮑魚而已儉重其真率為飽食盡歡而去又曰周顒清貧寡欲終日蔬食雖有妻子獨處山舍甚機辨文惠太子問顒菜食何味㝡勝顒曰春初早韭秋末晚菘梁書曰范元琰家貧唯以園蔬為業嘗出行見人盜其菘元琰遽退走母問其故乃以實荅問盜者為誰荅曰向所以退畏其愧恥今啟其名願不泄也於是母子祕之或有涉溝盜其筍者元琰因伐木為橋以渡之自是盜大慚一鄉無復草竊北史曰孟信為趙郡太守政尚寬和權豪無犯山中老人曾以㹠酒饋之信和顏接引殷勤勞問乃自出酒以鐵鐺溫之素木盤盛蕪菁葅而已, WYG: ''}
