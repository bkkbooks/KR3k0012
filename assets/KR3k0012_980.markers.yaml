  - {type: variant, offset: 1373, length: 370, content: 道畏而死由此觀之禍福相及也陸機毛詩䟽義曰荍音翹一名比不一名楚葵似蕪菁英華紫綠色可食微苦也左傳曰齊慶克通于聲孟子鮑牽見之告國武子武子召慶克謂之夫人訴之乃刖鮑牽仲尼曰鮑莊子之智不如葵猶能衛其足葵葉葉向日以蔽其根也史記曰公儀休為魯相食茹而美拔去園葵也晉書曰江統上太子書曰今西園賣葵菜藍子雞麵之屬虧敗國體貶損政令北齊書曰王攸字子深少孤獨種葵三畝數被人盜之王攸密令人書葵葉下明旦市中看之遂得偷者管子曰桓公北伐山戎出冬葵布之天下桓公憂北郭民貧管子請禁去市三百步者不得樹葵菜此則空有以相給淮南子曰聖人之於道猶葵之與日雖不能與終始其鄉之誠也鄉仰誠實也繆襲祭儀曰夏祀和羹芼以葵列仙傳曰丁次都不知何許人也為遼東丁氏作人丁氏嘗使買葵冬得生葵問冬何得有葵云從日南買來列女傳曰魯漆室有女過時未適人倚柱而嘆鄰婦謂曰何悲也欲嫁乎女曰吾憂魯君老而太子少也婦曰此魯大夫憂焉女, WYG: ''}
