  - {type: variant, offset: 1231, length: 3, content: 澤蓼葵, WYG: 祖勞蓴南越志曰石蓴似紫菜色青集異記曰丹陽張承先家有鬼常為取物㑹有客須蓴二斗鯉魚二十頭鬼将一小兒置驃騎令小兒睡及覺㸔籃中已有蓴鯉幽㝠録曰阿東常醜奴泛湖邉㧞蒲暮宿空舍時日暮見一女姿容極美乗舟載蓴至舍寄住變而為獺蘘荷説文曰蘘蘘荷也一名荷苴崔豹古今注曰蘘荷似葍苴而白葍苴色紫花生根中花未敗時可食乆置則削爛不為實矣葉似薑宜隂翳地常依蔭而生也搜神記曰余外婦姊夫蒋氏有傭客得疾下血醫以中蠱乃密以蘘荷根布席下不使知乃狂言曰蠱我者張小小也乃呼張小小已亡去今世攻蠱多用蘘荷根徃徃驗蘘荷成為嘉草葛洪方曰人得蠱取蘘荷葉着卧席下不使知立呼蠱姓名潘岳閒居賦曰蘘荷依隂時藿向陽紫菜集異記曰㑹稽照誕入海採紫菜於山上曝之夜忽見羣鬼張目切齒欲來繫誕誕奮刀砍之見鬼悉披靡乃就誕乞少許紫菜誕不為與吳郡縁海記曰郡海邉諸山悉生紫菜吳賦云綸組紫絳者也苦買晉書安帝記曰義熈二年有苦買菜生楊州營莖髙四尺六寸}
