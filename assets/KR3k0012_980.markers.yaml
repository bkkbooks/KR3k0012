  - {type: 'tls:seg', offset: 220, content: '', id: KR3k0012_CHANT_980-6a.9}
  - {type: variant, offset: 222, length: 301, content: 父母死將何恨乃歌曰幸哉遺黎免俘虜三辰既朗遇慈父玄酒忘勞甘瓠脯何以詠思歌且舞其得人心如此宋書曰徐文伯曾祖熙好黃老隱於秦望山有過求飲留一瓠瓢與之曰君子孫宜以道術救世當得二千石熙開之乃扁鵲醫經一卷齊書曰卞彬性好飲酒瓠壼瓢久坑皮為肴著帛冠十二年不改易以大瓠為籠什物多諸詭異自號卞田居後周書曰強練師不知何許人所至之處人皆敬而信之晉公護未誅之前曾手持一大瓠到護弟門外抵而破之乃大言曰瓠破子苦未幾而護誅諸子並伏法管子曰一年之計莫若樹榖十年之計莫若樹木終身之計莫若樹人瓜瓠葷菜不備國之貧也莊子曰惠子曰魏王貽我大瓠之種我樹之而成實五石以盛水漿其堅不能自舉剖之以為則廓落無所容非不大也吾為其無用剖之莊子曰夫子固拙於用大也國, SBCK: 蘿菔根唐新}
