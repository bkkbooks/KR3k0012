  - {type: variant, offset: 525, length: 166, content: 諸侯伐秦及涇莫濟叔向見叔孫穆子穆子曰豹之業乃匏有苦葉矣不知其他叔向退召舟虞與司馬曰夫苦瓠不材於人共濟而已是行魯人與莒人先濟新序曰魏文侯見萁李牆壞不治問其故曰不時也又進瓠羹文侯曰牆壞不築教我無奪民農功飴我瓠羹教我無多歛百姓王充論衡曰千將之刃未磨瓜瓠不能傷又曰婦人踈孕者子活乳數者子死譬若瓠華多實少也風俗通曰燒穰殺瓠俗說家人燒黍穰則使田, SBCK: 開元}
