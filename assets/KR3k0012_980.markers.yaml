  - {type: variant, offset: 2234, length: 254, content: 欲急去遜方催人種豆菘與諸將圍碁以示閑暇齊書曰武陵王曄性清簡尚書令王儉詣曄留儉設食盤中菘菜鮑魚而已儉重其真率為飽食盡歡而去又曰周顒清貧寡欲終日蔬食雖有妻子獨處山舍甚機辨文惠太子問顒菜食何味㝡勝顒曰春初早韭秋末晚菘梁書曰范元琰家貧唯以園蔬為業嘗出行見人盜其菘元琰遽退走母問其故乃以實荅問盜者為誰荅曰向所以退畏其愧恥今啟其名願不泄也於是母子祕之或有涉溝盜其筍者元琰因伐木為橋以渡之自是盜大慚一鄉無復草竊北史曰孟信為趙郡太守政尚寬和權豪無犯山中老人曾以㹠酒饋之信和顏接引殷勤勞問乃自出酒以鐵鐺溫之素木盤盛蕪菁葅而已呂, SBCK: 吕}
