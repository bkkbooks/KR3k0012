  - {type: variant, offset: 1646, length: 1, content: 家, SBCK: 道也􅀂而不收飬無仁心也是以収而飬之叔父感其言遂許焉未幾乃有狗母衘一死兎置元前而去三國典略曰齊髙緯以波斯狗爲赤虎儀同逍遥郡君常於馬上設蹬褥以抱之􅋐鷄亦号爲開府馬皆籍以氊􅄢􅀍以金玉号爲蛟龍儀同其將合牝壯則設青盧黼帳牢具過於諸王婚禮齊主常親視焉}
  - {type: variant, offset: 1646, length: 7, content: 家又有豶豕遂乳, WYG: 道也見而不收養無仁心也是以收而}
  - {type: page-break, offset: 1646, content: '', id: KR3k0012_WYG_904-8b, image: WYG0901/WYG0901-0075d.png}
  - {type: variant, offset: 1646, length: 1, content: 家, krp: 道也若而不收飬無仁心也是以収而飬之叔父感其言遂許焉未幾乃有狗母衘一死兎置元前而去三國典略曰齊髙緯以波斯狗爲赤虎儀同逍遥郡君常於馬上設蹬褥以抱之鬪鷄亦号爲開府馬皆籍以氊罽𬒳以金玉号爲蛟龍儀同其將合牝壯則設青盧黼帳牢具過於諸王婚禮齊主常親視焉}
  - {type: variant, offset: 1648, length: 0, content: '', SBCK: 曰齊廣寧王孝珩嘗畜一犬守外人不得趣近孝珩毎射令其取箭亦解呼召左右牽衣而進又曰徐之才嘗與朝士出遊望郡犬並走諸人令目之之才應聲曰爲是宋鵲爲是韓盧爲逐李斯東走爲負帝女南徂陳書曰張彪敗後與妻楊氏去唯常所飬一犬黄倉在彪前後未曽捨離乃還入􅀂邪山中沈㤗􅀃陳文帝遣章昭逹領千兵重購之并圗其妻彪眠未􅁴黄倉驚吠刼來便噬一人中喉即死及彪􅀍害黄倉嘷叫宛轉血中唐書曰貞觀中弥泥孰可汙李思摩部落濟河於故定襄城爲牙帳户三萬勝兵四萬馬九萬疋思摩之􅀄建也詔􅃬其土南至大河北}
