  - {type: variant, offset: 2191, length: 1, content: 貓, SBCK: 曰隂山有獸焉其狀如狸白首其名天狗又曰犬戎國黃帝之後弄明生白犬二頭自爲牝牡故爲此國也又曰金門之山有赤犬名曰天犬下則有兵又曰蜪音陶犬如犬而青食人從首始白澤圗曰黒狗白頭耳長卷尾龍也國語曰趙簡子田于螻晉君之囿史黯聞之以犬待於門晉太史史黯也簡子見之何爲曰有所得}
  - {type: page-break, offset: 2191, content: '', id: KR3k0012_SBCK_904-6b}
  - {type: variant, offset: 2191, length: 1, content: 貓, WYG: 曰隂山有獸焉其狀如貍白首其名天狗又曰犬戎國黄帝之後弄明生白犬二頭自為牝牡故為此國也又曰金門之山有赤犬名曰天犬下則有兵又曰蜪音陶犬如犬而青食人従首始白澤圖曰黑狗白頭耳長卷尾龍也國語曰趙簡子田于螻晉君之囿史黯聞之以犬待於門晉太史史黯也簡子見之問何爲曰有所得犬欲試之兹囿簡子曰何以不告對曰君行臣不従為不順譏簡子田獵君囿不從君而自行也主將適螻而麓弗聞麓主君苑囿之官臣敢煩當日當日謂直日者也簡子乃還覺所譏也戰國䇿曰齊欲伐魏淳于髠謂齊王曰韓子盧者天下之壯犬也東郭俊者海内之狡兎也韓子盧逐東郭俊環山者三騰山者五兎極於前犬疲於後犬兎俱疲各死其處田殳獲之無勞倦之苦而擅其功今齊魏乆相持以頓其兵敝其衆臣恐強秦}
  - {type: page-break, offset: 2191, content: '', id: KR3k0012_WYG_904-11a, image: WYG0901/WYG0901-0077a.png}
  - {type: variant, offset: 2191, length: 1, content: 貓, krp: 曰隂山有獸焉其狀如狸白首其名天狗又曰犬戎國黃帝之後弄明生白犬二頭自爲牝牡故爲此國也又曰金門之山有赤犬名曰天犬下則有兵又曰蜪音陶犬如犬而青食人從首始白澤圗曰黒狗白頭耳長卷尾龍也國語曰趙簡子田于螻晉君之囿史黯聞之以犬待於門晉太史史黯也簡子見之何爲曰有所得}
  - {type: variant, offset: 2193, length: 0, content: '', SBCK: 欲試之兹囿簡子曰何以不告對曰君行臣不從爲不順譏簡子曰獵君囿不從君而自行也主將適螻而麓弗聞麓主君苑囿之官傳曰山林之木衡麓守之臣敢煩當日當日謂直日}
