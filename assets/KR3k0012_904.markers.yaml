  - {type: variant, offset: 1655, length: 4, content: 諸豚賴之, SBCK: 㝡突厥咸競其利思摩}
  - {type: variant, offset: 1655, length: 0, content: '', WYG: 叔父感其言遂許之未幾乃有狗母銜一死兎至元前而去三國典略曰齊髙緯以波斯狗為赤虎儀同逍遥郡君常於馬上設蹬褥以抱之閗雞亦號為開府馬皆藉以氊􅄢被以金玉號為駮龍儀同其將合牝牡則設青盧黼帳牢具過於}
  - {type: variant, offset: 1655, length: 4, content: 諸豚賴之, krp: 㝡突厥咸競其利思摩}
  - {type: variant, offset: 1656, length: 2, content: 豚賴, WYG: 王婚禮齊王常親視焉又曰齊廣寧王孝珩嘗畜一犬守外人不得趨近孝珩每射令其取箭亦解呼召左右牽衣而進又曰徐}
  - {type: page-break, offset: 1656, content: '', id: KR3k0012_WYG_904-9a, image: WYG0901/WYG0901-0076a.png}
  - {type: variant, offset: 1659, length: 0, content: '', WYG: 才嘗與朝士出遊望羣犬並走諸人令目之之才應聲曰為是宋鵲為是韓盧為逐李斯東走為負帝女南徂陳書曰張彪敗後與妻楊氏去唯常所養一犬名曰黄倉在彪前後未曽刻有捨離乃還入若耶山中沈泰説陳文遣章昭逹領千餘兵重購之并圖其妻彪眠未覺黄倉驚吠刼來便噬一人中喉即死及彪被害黄倉嘷叫宛轉血中唐書曰貞觀中彌泥孰可汗李思摩部落濟河於故定襄城為牙帳戸三萬勝兵四萬馬九萬匹思摩之初建也詔錫其土南至大河北有白道川而白道牧田處龍荒之最突厥咸競其利思摩}
