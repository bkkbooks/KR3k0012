  - {type: variant, offset: 383, length: 0, content: '', SBCK: 曰馬効羊者右牽之効犬者左牽之又曲禮曰凢􅀕祀犬曰羮獻又内則曰狗赤股而躁臊又檀弓曰仲尼之畜狗死使子貢埋之曰吾聞之􅁦帷不弃爲埋馬也􅁦蓋不弃爲埋狗也丘也貧無蓋於其封也亦與之席無使其首䧟焉封當爲窆䧟謂没於圡尚書洪範曰西旅獻獒西戎逺國貢大犬太保作旅􅋙召公也左傳宣上曰晉侯飲趙盾酒伏甲將攻之其右提弥明知之趍登曰臣侍君宴過三爵非禮也遂扶以}
