  - {type: variant, offset: 579, length: 196, content: 公怒曰彭生敢見射之豕人立而啼公懼墜于車傷足喪屨反誅屨於徒人費弗得鞭之見血走出遇賊于門劫而束之費曰我奚御哉袒而示之背信之費請先入伏公而出鬭死于門中石之紛如死于階下遂入殺孟陽于床曰非君也不類見公之足于戶下遂殺之而立無知又昭七曰昔有仍氏生女樂正居夔取之生伯封實有豕心貪惏無饜謂之封豕又曰衛靈公夫人南子與宋朝通衛太子使齊過宋宋野人以婁豬㓨而歌之云既定爾婁豬盍歸吾艾猳史記曰子路性鄙好勇伉直冠雄雞佩豭豚, SBCK: 後}
