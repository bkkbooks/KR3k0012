  - {type: variant, offset: 393, length: 2, content: 腯肥, WYG: 狗赤股而躁臊又檀弓曰仲尼之畜狗死使子貢埋之曰吾聞之弊帷不棄為埋馬也弊盖不棄為埋狗也丘也貧無盖於其封也亦與之席無使其首䧟焉封當為窆䧟謂沒於土尚書洪範曰西旅獻獒西戎逺國貢大犬太保召公也作旅獒左傳曰晉侯飲趙盾酒伏甲將攻之其右提彌明知之趨登曰臣侍君宴過三爵非禮也遂扶以下公嗾夫獒焉明搏而殺之盾曰棄人用犬雖猛何為又襄公傳曰國人逐瘈狗瘈狗入於華臣氏國人従之華臣懼遂奔陳又昭公傳曰二十三年遂取邾師獲鉏弱地邾人愬于晉晉人来討叔孫婼如晉乃館諸箕吏人與叔孫居於箕者請其吠狗弗與及將歸殺而與之食公羊宣公曰靈公食趙盾公曰聞子劍利以示我盾將起進劍彌明曰何故㧞劍於公所盾知之躇而走超遽不暇以次公有周狗可與比周所指如意謂之獒而屬之獒亦躇階従彌明逆而踆之以足逆蹋之曰踆絶頷趙盾顧曰君之獒不若臣之獒也史記淮隂傳云髙祖詔齊捕蒯通通至上曰若教淮隂侯反乎對曰然臣固教之跖狗吠堯上非不仁固吠非其主當是時臣獨知韓信非知陛下也又徐偃王志云徐君宫人姙娠而産卵以為不祥棄於水邉孤獨老母有犬名鵠倉獵於水濵得所棄卵銜以來歸獨母以為異覆煖之弗乳而成人生時正偃故以為名徐君宫中聞之乃更録取收養長而仁智因襲徐國後鵠倉臨死更生角而九尾寔黄龍也偃王塟之徐梁界中今見有狗壟云}
