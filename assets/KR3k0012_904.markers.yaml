  - {type: variant, offset: 2418, length: 139, content: 錫文曰太亥十年九月乙亥朔十三日丁亥北燕伯使使者豪豨冊命大蘭王曰咨惟君稟太陰之沉精摽群形於玄質體肥腯而洪茂長無心以遊逸資豢養於人主雖無爵而有秩此君之純也君昔封國殷商號曰豕氏葉隆當時名垂于此此君之美也白蹢彰於周詩涉波應乎隆象歌詠垂於人口經千載而流響此君之德也君相與野遊唯君為雄顧群數, SBCK: ''}
