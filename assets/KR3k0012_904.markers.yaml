  - {type: variant, offset: 1065, length: 204, content: 受之袁山松漢紀曰吳祐放豬於長垣澤中誦經而行遇父故人謂之曰子二千石子掉鞭而誦經行吟於澤畔縱子無恥奈君父何祐守志如初與北海公沙穆遊大學資乏變服為傭祐賃使舂遂為死交於杵臼之間張璠漢紀曰莎車王殺于寘王于寘大人都末出城見野豕欲射之豕乃語曰無殺我我為汝殺莎車將軍都末異之即與先共殺莎車王謝承後漢書曰朱穆字文元嘗養豬豬有疾使人賣之於市語之曰如售當自告買者言病也賣豬者售不言病且直過多穆怪其故齎半直以還買豬者辭不取穆棄錢而去, SBCK: 冠}
