  - {type: variant, offset: 507, length: 2, content: 彼茁, SBCK: 昭六曰二十三年遂取邾師獲鉏弱地邾人愬干晉晉人來討叔孫婼如晉乃舘諸箕使人與叔孫居於箕}
  - {type: variant, offset: 507, length: 2, content: 彼茁, WYG: 范雎説秦昭王曰夫以秦而治諸侯譬若縦韓盧而摶蹇兎也閉闗十五年不敢窺兵於山東}
  - {type: variant, offset: 507, length: 2, content: 彼茁, krp: 昭六曰二十三年遂取邾師獲鉏弱地邾人愬干晉晉人來討叔孫婼如晉乃舘諸箕使人與叔孫居於箕}
  - {type: variant, offset: 510, length: 3, content: 蓬一發, SBCK: 請其吠狗弗與及將歸殺而與之食示下愛公羊宣公曰靈公食趙盾公曰聞子劒利以示我盾將起進劒彌明曰何故㧞劒於公所盾知之躇而淮躇猶超遽不暇以次公有周狗可與比周所指如意謂之􅋙而屬之獒亦躇階從弥明逆而踆之以足逆蹋之曰踆絶頷趙盾顧曰君之􅋙不􅀂臣之􅋙也史記淮隂傳云髙祖詔齊捕蒯通通至上曰􅀂教淮隂侯反乎對曰然臣固教之跖狗吠堯堯非不仁固吠非其主當是時臣獨知韓信非知陛下也又徐偃王志云徐君宫人任娠而産夘以爲不祥弃於水邊􅀌獨老母有犬名鵠倉獵於水濵得所弃夘衘以來歸獨母以爲異覆煖之遂􅭨蝍成小兒生時正偃故以爲名徐君宫中聞之乃更録取収飬長而仁知襲君徐國後鵠倉臨死更生角而九尾實黄龍也偃王葬之徐梁界中今見有狗壟云又曰范蠡之齊遺大夫種書蜚鳥盡良弓藏狡兎死走狗烹又曰范睢􅀃􅁗昭王曰夫以􅁗而治諸侯譬若縱韓盧而愽蹇兎也閉􅀜十}
  - {type: page-break, offset: 510, content: '', id: KR3k0012_SBCK_904-2b}
  - {type: variant, offset: 510, length: 3, content: 蓬一發, WYG: 是穰侯不忠而大王之計有所失也漢書}
