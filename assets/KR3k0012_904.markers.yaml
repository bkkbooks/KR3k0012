  - {type: variant, offset: 804, length: 200, content: 將為郎嘗從入上林賈姬在廁野彘入廁上目召都都不行上欲自持兵救賈姬都諫之乃止彘亦不傷賈姬又曰燕剌王旦將作亂廁中群豕出壞太官竈東觀漢記曰承宮字少子琅邪人少孤年八歲人令牧豕鄉里徐子盛明春秋經授諸生數百人宮過其廬下見諸生講誦好之因棄豬而聽經豬主怪不還行索見宮欲笞門下生共禁止因留精舍門下拾薪執苦數年遂通經又曰朱浮與彭寵書責之曰伯通自伐以功為高天下往時遼東有豕生子白頭異而獻之行至河東見群豕皆白懷慚而還若以子功論, SBCK: ''}
