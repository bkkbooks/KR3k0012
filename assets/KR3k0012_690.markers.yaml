  - {type: variant, offset: 2719, length: 293, content: 極西廂乃備朝衣車駕幸其第乃白服烏紗帽以侍宴焉至於衣服制度動皆陳啟事無專制又曰高帝即位後手詔賜張融衣曰見卿衣服麤故誠乃素懷有本交爾藍縷亦虧朝望今送一通故衣意謂雖故乃勝新也是吾所著已令裁減稱卿之體并履一量又曰陶弘景永明十年脫朝服挂神武門上表辭祿詔許之又曰王思遠立身簡潔諸客詣己者覘知衣服垢穢不前形儀新楚乃與促膝雖然及去之後猶令二人交帚拂其坐處又曰王琨性儉約景和中討義陽王昶六軍誡嚴應須紫服左右欲營辦琨曰元嘉初征謝晦有紫服在匣不須更製檢取果得焉梁書曰到溉性率儉不好聲色庭室單床傍無姬侍冠履十年一易朝服或至穿補又曰波斯國婚姻法一聘財訖女壻將數十人迎婦壻著金綖錦袴戴天冠婦亦如之又曰新羅呼其冠曰遺, SBCK: ''}
