  - {type: variant, offset: 5093, length: 493, content: 太始元年魏帝以陳留王之歲有頻斯國人來朝以五色玉為衣如今之鎧又曰天漢三渠搜國之西有折淪國其俗淳和人壽三百歲有大木一樹千尋若經此木下皆不死不病或有泛海繩山來會其國綴草毛為繩網其衣如今之羅紈也至元狩六年獻網衣一襲帝焚於九逵之道恐後人徵求此物故燒之煙如金石之氣又曰員嶠山南有池移國人長三尺壽萬歲茅為衣衣服皆長裾大袖因風以昇煙霞若鳥用羽毛也鍾會母傳曰夫人幼少衣不過青紺世說曰齊王冏為大司馬輔政嵇紹為侍中詣冏諮事冏召葛旟董艾等共論時宜旟等白冏曰嵇侍中善於絲竹公可能操之遂進樂器紹推卻不受冏曰今共為歡何為却耶紹曰公恊輔皇室令作事可法紹雖職卑忝備常伯豈可以先王之服為伶人之業今逼高命不敢有辭當釋冠冕襲私服此紹之心旟等不自得而退又曰桓車騎不好著新衣浴訖婦故送新衣車騎大怒催使將去婦便持還冲妻王恬女也傳語云衣不經新何由而故桓大笑而著之又阮宣子論鬼神有無或以人死有鬼阮子獨以為無曰今見者云著生時衣服若人死有鬼衣服亦有鬼乎孝子傳曰老萊子年七十父母猶在萊子常服班欄衣為嬰兒戲曹肇傳曰明帝寵愛肇與帝戲賭衣物有所獲輒入御帳服之遙出親狎如此襄陽耆舊記曰王昌字公伯為東平相散騎常侍早卒婦是任城王曹子大女昌弟式字公儀為渡遼, SBCK: ''}
  - {type: variant, offset: 5094, length: 62, content: 始元年魏帝以陳留王之歲有頻斯國人來朝以五色玉為衣如今之鎧又曰天漢三渠搜國之西有折淪國其俗淳和人壽三百歲有大木一樹千尋若經此木, WYG: 皇太后入廟服紺上皁下后謁廟服紺上皁}
