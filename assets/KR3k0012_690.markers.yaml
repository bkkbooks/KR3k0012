  - {type: variant, offset: 4400, length: 0, content: '', SBCK: 减其采章陳留風俗傳曰襄邑縣南有渙水有睢水傳曰雎渙之水出文章故有黼黻藻錦日月華蟲以奉天子宗廟御服焉鷩衣釋名曰鷩雉山雉也鷩憋并列切也性急憋不可生必自殺故􅀞其形於衣以象人執耿介之節也周禮春官上司服曰王之􅁻服享先公饗射鷩冕鄭玄曰先公謂后稷之後也饗射饗食及與諸侯射也鷩畫以雉也三禮圖曰鷩冕服者王􅀕先公及饗射之服也以朝天子􅂇􅀕玄衣纁裳以華蟲火宗彞三章畫以爲績裳藻粉米黼黻四章薾歩里切以爲繡凢七章毳衣釋名曰毳芮也􅀞藻文於衣象水草之毳芮温暖而潔也詩曰大車檻檻毳衣如菼毳}
  - {type: page-break, offset: 4400, content: '', id: KR3k0012_SBCK_690-3b}
  - {type: variant, offset: 4400, length: 0, content: '', WYG: 減其采章陳留風俗傳曰襄邑縣南有渙水有睢水傳曰睢渙之水出文章故有黼黻藻錦日月華蟲以奉天子宗廟御服焉鷩衣釋名曰鷩雉山雉也鷩憋并列切也性急憋不可生必自殺故畫其形於衣以象人執耿介之節也周禮春官上司服曰王之吉服享先公饗射鷩冕鄭𤣥曰先公謂后稷之後也饗射饗食賓客與侯射也鷩畫以雉也三禮圖曰鷩冕服者王祭先公及饗射之服也以朝天子助祭𤣥衣纁裳以華蟲火宗彛三章畫以為繢裳藻粉米黼黻四章繭陟里切以為繡凡七章毳衣釋名曰毳芮也畫藻文於衣象水草之毳芮温暖而絜也詩曰大車檻檻毳衣如菼毳}
