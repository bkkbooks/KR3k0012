  - {type: variant, offset: 5268, length: 225, content: 不過青紺世說曰齊王冏為大司馬輔政嵇紹為侍中詣冏諮事冏召葛旟董艾等共論時宜旟等白冏曰嵇侍中善於絲竹公可能操之遂進樂器紹推卻不受冏曰今共為歡何為却耶紹曰公恊輔皇室令作事可法紹雖職卑忝備常伯豈可以先王之服為伶人之業今逼高命不敢有辭當釋冠冕襲私服此紹之心旟等不自得而退又曰桓車騎不好著新衣浴訖婦故送新衣車騎大怒催使將去婦便持還冲妻王恬女也傳語云衣不經新何由而故桓大笑而著之又阮宣子論鬼神有無或以人死有鬼阮子獨以為無曰今見者云著生時衣服若人死有鬼衣服亦有鬼乎孝, WYG: 制穆天}
