  - {type: variant, offset: 1234, length: 678, content: 多作衣褒大祒音紹招聘也不中節度自令掾吏令去地三寸又曰帝賜南粵主他上禇五十衣中禇三十衣下禇二十衣以綿裝衣曰禇上中下者綿之多少厚薄差又曰江充初召見犬臺宮自請願以所常被服冠見上上許之充衣紗縠單衣曲裾後垂交輸如淳曰交輸割正幅使一頭狹狀若燕尾垂之兩旁見於後也冠禪纚步搖冠飛翮之纓服虔曰冠禪纚故行則搖以鳥羽作纓也步容貌甚壯帝望而異之謂左右曰燕趙固多奇士又曰雋不疑佩環玦襃衣博帶盛服至門下謁暴勝之又曰王吉字子陽好車馬衣服自奉養極為鮮明而遷徙所載不過囊衣天下服其廉而怪其奢世傳子陽能作黃金後漢書曰更始時授官爵皆群小賈豎膳夫庖人多著繡而衣錦袴䄡䄖諸于罵詈道中時智者見之以為服之不中身之災也漢書音義曰諸于大掖衣也如婦人之袿衣揚雄方言曰䄡䄖其短者自關之西謂之裗䘿郭璞注曰俗名䘿䘸據此即是諸于上加繡䘿如今之半臂也䘪音充䘿音屈又曰光武見來歙大歡即解衣以衣之又曰祭遵為人廉約家無私財常衣韋袴寢布被夫人裳不加緣又曰祭彤在遼東幾三十年衣無兼副顯宗美其清約賜之衣被什物無不悉備又曰耿恭自䟽勒廻衣屨穿決形容枯槁又曰東平憲王蒼侍肅宗饗衛士於南宮因從皇太后周行掖庭池閱陰太后舊時器服愴然動容乃命留五時衣各一襲五時衣謂春青夏朱季夏黃秋白冬黑也衣單複具曰襲及常所御衣合五十篋餘悉分布諸王公主及子孫在京師者各有差特賜蒼及琅邪王京書曰間饗衛士於南宮因閱視舊時衣物惟王有孝友之德今送光烈皇后假髻帛各一及衣一篋可時奉瞻以慰凱風寒泉之思又欲令後生子孫得見先后衣服之製又曰明德馬后身長七尺二寸方口美髮能誦易好讀春秋常衣大練裾不加緣大練大帛也杜預注左傳曰大帛厚繒也朔望諸姬主朝請望見后袍衣踈麤反以為綺縠就視乃笑后辭, SBCK: ''}
