  - {type: variant, offset: 4391, length: 1, content: 凡, SBCK: 黄帝堯舜垂衣裳蓋取諸乾坤有文故上衣􅀇而下裳黄秦以戰國則天子位滅去禮學郊祀之服皆以初􅀇漢承掌故至顯宗初服冕旒衣章以祀天地養三老五更於三雍三公九卿郊祀天地明堂皆冠冕垂旒衣裳􅀇上纁下乘輿備文日月辰星}
  - {type: variant, offset: 4391, length: 1, content: 凡, WYG: 黄帝堯舜之垂裳盖取諸乾坤乾坤有文故上衣𤣥而下裳黄秦以戰國即天子位滅去禮學郊祀之服皆以袀𤣥漢承秦故至顯示初服冕旒衣裳以祀天地養三老五更於三雍三公九卿郊祀天地明堂皆冠冕垂旒衣裳𤣥上纁下乗輿備文日月星辰}
