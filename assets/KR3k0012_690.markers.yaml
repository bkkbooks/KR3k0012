  - {type: variant, offset: 4817, length: 29, content: 忽服小人衣耶林既曰衣狗裘者不必羊鳴今君衣狐裘音能不狐乎又曰, SBCK: 平叔靣絶白}
  - {type: variant, offset: 4819, length: 273, content: 小人衣耶林既曰衣狗裘者不必羊鳴今君衣狐裘音能不狐乎又曰魏文侯封太子擊於中山三年使不往來舍人趙倉唐奉使文侯問子之君長大孰與寡人倉唐曰君賜之外府之衣則能勝之文侯遣倉唐賜太子衣一襲令倉唐雞鳴時至太子迎拜賜發篋衣盡顛倒太子趣具駕曰賜之衣非以為寒也欲召擊知無誰與謀故遣子以衣詩曰東方未明顛倒衣裳顛之倒之自公召之事具奉使門鹽鐵論曰古者庶人老耋而後衣絲其餘則麻枲而已拾遺錄曰宋景公之時懸四時衣春夏以珠玉為飾秋冬以翡翠為溫又曰禮敬國其俗人年三百歲而織芳茅以為衣蓋尚書云島夷卉服之類也又曰任未年十四好學觀書有合意處則題其衣裳及掌裏以記其事門徒悅其勤學更以靜衣易之又, WYG: 志}
