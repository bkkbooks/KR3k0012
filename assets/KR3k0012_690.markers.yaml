  - {type: variant, offset: 5547, length: 4, content: 襄陽耆舊, krp: 坦也坦然正白無文采也禒衣通貫反釋名曰禒衣禒然黒色也詩邶柏舟禒衣曰禒兮衣兮禒衣黄裏禒間色黄正色義云禒兮衣兮禒衣自有禮制也諸侯大夫祭服之下鞠衣爲上展衣次之衆妾亦有貴賤之等服鞠衣黄屒衣白禒衣黒皆以素紗爲裏非其制故以喻妾上僣焉禒兮衣兮禒衣黄裳義云婦人之服不殊衣裳同色今衣黒裳黄喻亂嫡妾之禮也周禮天官下内司服曰内司服掌王后六服禒衣素紗禒衣御於王者之服也亦似燕居君子之褖衣黒則是亦黒也袗衣三禮圗曰傅母㛰禮從者袗衣古者傅母選無夫與子而老賤曉習婦道者使之應對也朱衣應劭漢官儀曰虎賁中郎衣紗縠單衣續漢志同晉令絳紗縠東觀漢}
  - {type: variant, offset: 5548, length: 3, content: 陽耆舊, WYG: 非其制故以喻妾上僭焉緑兮衣兮緑衣黄裳義云婦人之服不殊取裳同色今衣黒裳黄喻亂嫡妾之禮也周禮天官下内司服曰内司服掌王后六服褖衣素紗褖衣御於王者之服也亦以燕居男子之褖衣黒則是亦黒也袗衣三禮圖曰傅母婚禮從者袗衣古者傅母選無夫與子而老賤曉習婦道者使之應對也朱衣應劭漢官儀曰虎賁中郎衣紗縠罩衣續漢志同又令絳紗􅂖東觀漢}
