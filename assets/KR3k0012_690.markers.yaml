  - {type: variant, offset: 5541, length: 4, content: 遙出親狎, krp: 未洋也授河宗璧䄖狄釋名曰摇翟畫雞雉之文於衣也江淮而南雉素質五采皆備成章周禮天官下内司服曰内司服掌王后之六服䄖狄鄭玄曰䄖狄闕狄畫羽飾也玄謂䄖狄青也三禮六服圖曰䄖翟王后從王祭先公之服也侯伯之夫人服以從君祭宗廟闕翟釋名曰闕翟翦闕繒爲翟雉形以綴衣也詩曰委委蛇蛇象服是冝義曰象服者謂䄖狄闕狄也周禮天官下内司服曰内司服掌王后之六服闕狄鄭司農曰褕狄闕狄畫羽飾也鄭玄曰闕狄刻而不畫者也此三者皆祭服玄謂今世有袿衣者盖三狄之遺象也以推次其色闕狄赤也三禮六服圖曰闕翟王后從祭群小祀服也亦子男夫人服以從君祭宗廟鞠衣釋名曰鞠衣}
