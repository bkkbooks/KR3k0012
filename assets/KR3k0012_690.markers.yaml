  - {type: variant, offset: 4405, length: 0, content: '', krp: 如璊璊頳也音門周禮春官上司服曰王之吉服祀四望山川則毳冕鄭玄曰毳其衣三章裳三章也三禮圖曰毳冕王祀四望山川服也子男服以朝天子絺衣周禮春官上司服曰王之吉服祭社稷五祀則絺冕鄭玄曰絺或作繡字之誤也繡刺粉采無畫也玄衣詩曰緇衣美武公之德父子並爲周司徒善於其職國人冝之緇衣之冝兮弊予又改爲兮緇衣黒色上卿聽朝之正服也周禮春官上司服曰王之吉服祭群小祀玄冕鄭玄曰群小祀林澤墳衍四方百物之屬也玄者衣無文裳刺黻}
  - {type: variant, offset: 4406, length: 5, content: 過魏王魏王, SBCK: 老賤曉習婦道者使之應對也朱衣應劭漢官儀}
  - {type: variant, offset: 4406, length: 1, content: 過, WYG: 已凡冕服𤣥衣纁衣也禮玊藻曰天子𤣥端而朝日於東門之外鄭𤣥曰端盖為冕字之誤朝日春分時也}
  - {type: variant, offset: 4406, length: 1, content: 過, krp: 已凡冕服玄衣纁衣也禮玉藻曰天子玄端而朝日於東門之外鄭玄曰端當爲冕字之誤朝日春分時也}
  - {type: variant, offset: 4408, length: 0, content: '', WYG: 臺訪議曰禮天子大夫𤣥冕而執鴈今秩中二千石六百石者可使𤣥冕而執鴈褘衣釋名曰}
