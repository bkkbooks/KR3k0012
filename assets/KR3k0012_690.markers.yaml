  - {type: variant, offset: 4395, length: 1, content: 莊, WYG: 三公諸侯用山龍九章九卿以下用華蟲七章皆五采衣裳乗輿刺史公候九卿已下皆織成陳留襄邑獻之續漢輿服志曰聖人處天子位服日月昇龍所以福其徳章其功也賢人佐聖封國愛民黼黻文繡降龍所以顯其仁光其能也環濟要畧曰天子龍冕諸侯黼大夫黻白與黒謂之黼黒與白謂之黻青與赤謂之文赤與白謂之章五色備謂之繡諸侯去日月星辰服山龍華蟲卿大夫去山龍華蟲服藻火服粉米摯虞决疑要注曰秦除衮冕之制唯為𤣥衣絳裳一具而已漢興亦如之中興後明帝永平中使諸儒案古文依圗書始復造衮冕之服至於今用之榖梁傳序曰一字之褒賞逾華衮片言之貶誅深斧鉞六韜曰昔帝堯王天下黼衣絓履不弊盡不更為也傅}
