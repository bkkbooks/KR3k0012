  - {type: variant, offset: 5558, length: 4, content: 為東平相, krp: 升之起諸家子弟皆曰伯升殺我及見上絳衣大冠乃驚曰謹厚者亦復爲之晉義熈起居注曰安帝自荆州至新亭詔曰諸侍官戎行之時不備朱服悉令袴褶從也宋元嘉起居注曰治書侍御史朱興啓彈朝請向騰之坐同僚㑹故貟外散騎侍郎楊珎之䘮侍兵唱變服然後唱衆官下陪位而騰之着單衣在朱衣上於禮有虧請免所居官詔可齊書曰吕安國爲右衛將軍加給事中後改封湘郷侯武帝即位累遷光禄大夫加}
  - {type: variant, offset: 5559, length: 3, content: 東平相, WYG: 之晉義熈起居注曰安帝自荆州至新亭詔曰諸侍官戎行之時不備朱服悉令袴褶從也宋元嘉起居注曰治書侍御史朱興啓彈朝請向騰之坐同僚㑹故員外散騎侍郎楊珍之䘮侍兵唱變服然後唱衆官下陪位而騰之着單衣在朱衣上於禮有虧請免所居官詔可齊書曰吕安國為右衛将軍給事中後改封湘鄉侯武帝即位累遷光禄大夫加}
