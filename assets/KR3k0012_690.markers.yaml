  - {type: variant, offset: 3046, length: 643, content: 子也稷初為剡令至嵊亭生之因名嵊字四山少敦孝行年三十餘猶班衣受稷杖動至數百收淚歡然又曰胡緭胡貴切隨陳伯之入魏時元會緭戲為詩曰帽上著籠冠袴上著朱衣不知是今是不知非昔非又曰何敬容為吏部尚書侍中領太子中庶子敬容身長八尺白晳美鬚眉性矜莊衣冠鮮麗武帝衣而左右衣必須潔嘗有侍臣衣帶卷摺帝怒曰卿衣帶如繩欲何所縛敬容希旨故益鮮明常以膠清刷鬚衣裳不整伏床熨之或暑月背為之燋又曰任昉有子東里西華南容北叟西華冬月著葛帔練裙事具交友部又曰任昉為義興太守友人彭城到溉弟洽從昉共為山澤遊及被代登舟止有絹七疋米五石至都無衣鎮軍將軍沈約遺裾衫迎之後魏書曰樂浪王萬壽孫忠明帝時位太常少卿孝武帝汎舟天泉池命宗室諸王陪宴忠愚而無智性好衣服著紅羅襦繡作領碧納袴錦為緣帝謂曰朝廷衣冠應有常式何為著百戲衣忠曰臣少來所愛情存綺羅歌衣儛服是臣所願帝曰人之無良乃至此乎又曰胡叟於高允館見中書侍郎李璨被服華靡叟貧老衣褐璨頗忽之叟謂曰老子今若相脫體上袴褶衣帽君欲作何許也譏其唯假盛服璨惕然失色又曰文宣囚元韶幽於京畿地牢絕食啗衣袖而死北齊書曰爾朱敞字乾羅彥伯之誅敞小隨母養於宮中年十二敞自竇走至大街見童兒群戲敞解所著綺羅金翠服易衣而遁追騎至不識敞便執綺衣兒比究問知非會日已暮由是免陳書曰徐陵為吏部尚書精簡人物搢紳之士皆嚮慕焉陳暄以玉帽簪插髻紅絲布裹頭袍拂踝靴至膝不陳爵里直上陵坐陵不知識命吏持下暄徐步而出舉止自若竟無怍容作書謗陵陵甚病之隋書曰齊後主於苑內作貧兒村親衣藍縷之服而行乞其間以為笑樂多令人服烏衣以相執縛後主果為周所敗被虜困至以賣燭為業, SBCK: 制}
