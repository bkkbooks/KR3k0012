  - {type: variant, offset: 4416, length: 3, content: 憊耶莊, SBCK: 起諸家子弟皆曰伯升殺我及見上絳衣大冠乃驚曰謹厚者亦復爲之晉義熈起居注曰安帝自荆州至新亭詔曰諸侍官戎行之時不備朱服悉令袴褶從也宋元嘉起居注曰治書侍御史朱興啓彈朝請向騰之坐同僚㑹故貟外散􅀐侍郎楊珎之䘮侍兵唱變服然後唱衆官下陪位而騰之着單衣在朱衣上於禮有虧請免所居官詔可齊書曰吕安國爲右衛將軍加給事中後改封湘郷侯武帝即位累遷光禄大夫加散􅀐常侍安國欣有文授謂其}
