  - {type: variant, offset: 4404, length: 0, content: '', krp: 服菼騅也蘆之𥘉生者也古者天子大夫服毳冕以廵行大車啍啍他昆切毳}
  - {type: variant, offset: 4405, length: 0, content: '', SBCK: 特進卿丗婦二千石命婦助蠶則青絹上下展衣周禮天官下内司服掌王后之六服展衣展衣白衣三禮六服圖曰展衣王后以禮見王及賔客之服也卿大夫之妻以從􅂇君􅀕釋名曰䄠展字或作此坦也坦然正白無文采也禒衣通貫反釋名曰禒衣禒然黒色也詩邶柏舟禒衣曰禒兮衣兮禒衣黄裏禒間色黄正色義云禒兮衣兮禒衣自有禮制也諸侯大夫祭服之下鞠衣爲上展衣次之衆妾亦有貴賤之等服鞠衣黄屒衣白禒衣黒皆以素紗爲裏非其制故以喻妾上僣焉禒兮衣兮禒衣黄裳義云婦人之服不殊衣裳同色今衣黒裳黄喻亂嫡妾之禮也周禮天官下内司服曰内司服掌王后六服禒衣素紗禒衣御於王者之服也亦似燕居君子之褖衣黒則是亦黒也袗衣三禮圗曰傅母㛰禮從者袗衣古者傅母選無夫與子}
  - {type: page-break, offset: 4405, content: '', id: KR3k0012_SBCK_690-6b}
  - {type: variant, offset: 4405, length: 0, content: '', WYG: 如璊璊顔也音門周禮春官上司服曰王之吉服祀四望山川則毳冕鄭𤣥曰毳其衣三章裳三章也三禮圖曰毳冕王祀四望山川服也子男服以朝天子絺衣周禮春官上司服曰王之吉服祭羣小五祀則絺冕鄭𤣥曰絺或作繡字之誤也繡刺粉米無畫也𤣥衣詩云緇衣美武公之徳父子並為周司徒善於其職國人宜之緇衣之宜兮敝予又改為兮緇衣黒色上卿聴朝之正服也周禮春官上司服曰王之吉服祭羣小祀𤣥冕鄭𤣥曰羣小祀林澤墳衍四方百物之屬也𤣥者衣無文裳刺黻}
