  - {type: variant, offset: 5531, length: 1, content: 物, WYG: 純青之衣特進卿世婦二千石命婦助蠶則青絹上下展衣周禮天官下内司服掌王后之六服展衣展衣白衣三禮六服圖曰展衣王后以禮見王賔客之服也卿大夫之妻以從助君祭釋名曰襢展字或作此坦也坦然正白無文采也褖衣釋名曰褖衣褖然黒色也詩􅆁栢舟曰緑兮衣兮緑衣黄裏緑兮色黄正色正義緑兮衣兮言其自}
