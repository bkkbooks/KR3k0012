  - {type: variant, offset: 29, length: 264, content: 者依也人所依以疵寒暑也爾雅曰衣裗音旒謂之䘽音霓衣褸也齊人謂之褗或曰袿衣之飾也黼領謂之襮繡剌黼文以褗領也襮音博之緣謂之純衣緣飾也袕謂之褮衣開孔也孔袕音穴褮音褮衣皆謂之襟交領衱居業切謂之裾衣後裾也𥘞謂之袸辭見切衣小帶也佩𥘞謂之禐佩玉之帶上屬執衽謂之結持衣上衽扱衽謂之擷音擷扱衣上衽於帶衣蔽前謂之䄡今黻膝也婦人之禕謂之縭緌也即今之香纓也禕邪交絡帶繫於體因名為禕緌繫也裳削幅謂之纀蒲木切削殺其幅深衣衣裳世本曰胡曹作衣宗裏注曰黃帝臣也易曰黃帝堯舜垂衣裳而天下治蓋取諸乾坤上衣下裳乾坤之象又曰訟卦上九或錫之鞶帶終朝三禠之象曰以訟受服亦不足敬, SBCK: ''}
