  - {type: variant, offset: 4409, length: 1, content: 魏, krp: 后之上服曰褘衣畫翬雉之文於衣也伊洛而西雉青質五色備曰翬也周禮天官下內司服曰內司服掌}
  - {type: variant, offset: 4411, length: 0, content: '', WYG: 后之六服褘衣王后之服刻繒為翬之形而采畫之綴於衣從王祭先王則服褘衣也禮明堂位}
