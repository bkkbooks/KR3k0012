  - {type: variant, offset: 4400, length: 0, content: '', krp: 减其采章陳留風俗傳曰襄邑縣南有渙水有睢水傳曰雎渙之水出文章故有黼黻藻錦日月華蟲以奉天子宗廟御服焉鷩衣釋名曰鷩雉山雉也鷩憋并列切也性急憋不可生必自殺故畫其形於衣以象人執耿介之節也周禮春官上司服曰王之吉服享先公饗射鷩冕鄭玄曰先公謂后稷之後也饗射饗食及與諸侯射也鷩畫以雉也三禮圖曰鷩冕服者王祭先公及饗射之服也以朝天子助祭玄衣纁裳以華蟲火宗彞三章畫以爲績裳藻粉米黼黻四章薾歩里切以爲繡凢七章毳衣釋名曰毳芮也畫藻文於衣象水草之毳芮温暖而潔也詩曰大車檻檻毳衣如菼毳}
  - {type: variant, offset: 4402, length: 1, content: 布, SBCK: 夫之服菼騅也蘆之􅀄生者也古者天子大夫服毳冕以廵行大車啍啍他昆切毳衣如璊璊頳也音門周禮春官上司服曰王之􅁻服祀四望山川則毳冕鄭玄曰毳其衣三章裳三章也三禮圖曰毳冕王祀四望山川服也子男服以朝天子絺衣周禮春官上司服曰王之吉服祭社稷五祀則絺冕鄭􅀇曰絺或作繡字之誤也繡刺粉采無畫也􅀇衣詩曰緇衣美武公之德父子並爲周司徒善於其職國人冝之緇衣之冝兮弊予又改爲兮緇衣黒色上卿聽朝之正服也周禮春官上司服曰王之吉服祭群小祀􅀇冕鄭􅀇曰群小祀林澤墳衍四方百物之屬也􅀇者衣無文裳刺黻而已凡冕服􅀇衣纁衣也禮玉藻曰天子􅀇端而朝日於東門之外鄭􅀇曰端當爲冕字之誤朝日春分時也魏臺訪議曰禮天子大夫􅀇冕而執鴈今秩中二千石六百石者可使􅀇冕而執鴈禕衣釋名曰王后之上服曰褘衣畫翬雉之文於衣也伊洛而西雉青質五色備曰翬也周禮天官下內司服曰內司服掌王后之六服禕衣王后之服刻繒爲翬之形而采畫之綴於衣從王祭先王則服褘衣也禮明堂位曰夫人副褘立于房中鄭􅀇曰副首飾也今之步摇是也周禮追師掌王后之首服爲副禕王后之上服也唯魯及王者之後夫人服之諸侯夫人自䄖翟而下也又曰祭義曰歲旣單世婦獻繭于夫人夫人副褘而受之董巴漢輿服志曰太皇太后入廟服紺上皂下后謁廟服白上皂下皆深衣製徐廣云深衣卽單衣公􅀸列侯中二千石夫人入廟佐祭者服皂絹上下皆深衣制穆天子傳曰吉日戊午天子大服冕禕冕冠禕衣王后之上服今帝服之未洋也授河宗璧䄖狄釋名曰摇翟􅀞雞雉之文於衣也江淮而南雉素質五采皆備成章周禮天官下内司服曰内司服掌王后之六服䄖狄鄭玄曰䄖狄闕狄􅀞羽飾也玄謂䄖狄青也三禮六服圖曰䄖翟王后從王􅀕先公之服也侯伯之夫人服以從君􅀕宗廟闕翟釋名曰闕翟翦闕繒爲翟雉形以綴衣也詩曰委委蛇蛇象服是冝義曰象服者謂䄖狄闕狄也周禮天官下内司服曰内司服掌王后之六服闕狄鄭司農曰褕狄闕狄畫羽飾也鄭玄曰闕狄刻而不􅀞者也此三者皆􅀕服玄謂今世有袿衣者盖三狄之遺象也以推次其色闕狄赤也三禮六服圖曰闕翟王后從􅀕群小祀服也亦子男夫人服以從君􅀕宗廟鞠衣釋名曰鞠衣如菊花色也周禮天官下内司服曰内司服掌王后六服鞠衣鄭司農曰鞠衣黄桑服也色如鞠座像桑葉始生三禮六服圖曰鞠衣王后桑之服也􅀌之妻服以從助君􅀕董巴漢輿服志曰太皇太后皇太后􅁞服青上縹下􅀷衣制貴人􅂇􅁞服純縹上下􅀷衣制公卿列侯中二千石夫人助􅁞服縹絹上下深衣制自二千石夫人巳上至皇后皆以􅁞衣爲朝服徐廣輿服􅄂注曰晉先蠶儀注皇后衣純青}
