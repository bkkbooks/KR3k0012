  - {type: variant, offset: 3302, length: 164, content: 二女夫人少而寡虞氏及夫人之宗哀夫人辛苦欲更為圖婚然重夫人宿操慮不可以非禮逼亦知夫人潛佩刀誓以必死故不敢生意夫人自以虞氏凶短繼世無子常獨處一室絕書學非祭祀墳墓不出紡績輒貨以供祭稱其多少不求豐厚干寶搜神記曰東越閩中有庸嶺高數十里其下北濕中有大虵長七八丈大十圍常病治都尉及屬城長吏多有死者祭以牛羊故不得福或與人夢或下喻巫祝欲得啖童女年, SBCK: 四百四}
