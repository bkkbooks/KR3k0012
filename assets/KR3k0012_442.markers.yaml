  body:
  - {type: variant, offset: 5, length: 2, content: 二貞, SBCK: 三知人上尚書咎繇曰都在知人在安民禹曰吁咸􅀂時惟帝其難之言堯亦以知人安民爲難故曰吁知人則哲能官人安民則惠􅀺民懷之禮記曰趙文子與叔譽觀乎九原文子曰死者如可作也吾誰與歸叔譽曰其陽處父乎處父字文公之傳也文子曰行并植音特於晉國不没其身其智不足稱也井專也謂剛而專爲狐射姑所殺其咎犯乎文子曰見利不顧其君其仁不足稱也我則隨武子平利其君不忘其身謀其身不遺其友晉人謂文子其中退然如不勝衣其言呐呐然如不出諸其口所舉於晉國管庫之士七十有餘家生不交利死不屬其子焉春秋僖五年曰鄭殺申侯初申侯申出也姊妹之子日出有寵於楚文王文王將死與之璧使行曰唯我知}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_442-1b}
  - {type: variant, offset: 5, length: 2, content: 二貞, WYG: 三知人上尚書臯陶曰都在知人在安民禹曰吁咸若時惟帝其難之言堯亦以知人安民為難故曰吁知人則哲能官人安民則惠黎民懐之禮記曰趙文子與叔譽觀乎九原文子曰死者如可作也吾誰與歸叔譽曰其陽處父乎處父字文公之傅也文子曰行并植音持於晉國不沒其身其智不足稱也并專也謂剛而專為狐射姑所殺其舅犯乎文子曰見利不顧其君其仁不足稱也我則随武子乎利其君不忘其身謀其身不遺其友晉人謂文子知人文子其中退然如不勝衣其言呐呐然如不出諸其口所舉於晉國管庫之士七十有餘家生不交利死不属其子焉春秋僖七年曰鄭殺申侯初申侯申出也姊妹之子曰出有寵於楚文王文王将死與之璧使行曰唯我知}
