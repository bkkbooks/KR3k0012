  - {type: variant, offset: 1762, length: 303, content: 梁王聞之使相娉焉高行曰妾之夫不幸先犬馬填溝壑妾宜以身薦其棺槨守養幼孤不得專意妾聞婦人之義壹往不改以全貞信之節今忘死而趨生是不信也見貴而忘賤是不貞也棄義而從利無以為人乃援鏡操刀以割其鼻曰妾已刑矣所以不死者不忍幼嗣之重孤也刑餘之人殆可釋矣王高其節乃復其身號曰梁高行皇甫謐列女傳曰天水姜敘母者同郡楊阜之姑也阜為州吏馬超殺刺史太守敘屯歷城阜往見之歔欷悲悵敘曰何為乃爾阜曰守城不能完君亡不能死何以視息於天下乎君擁兵專制而無討賊之心此趙盾所以書弒也敘母慨然勒敘從阜計遂起兵於鹵城超聞之襲歷城得敘母母罵之曰若背父之逆子殺君之桀賊天豈久容若何不早死敢以面目視人乎超即殺之超敗隴右平定魏武令曰姜敘之母明智乃爾雖楊敞之妻蓋不過, SBCK: 財}
  - {type: variant, offset: 1762, length: 303, content: 梁王聞之使相娉焉高行曰妾之夫不幸先犬馬填溝壑妾宜以身薦其棺槨守養幼孤不得專意妾聞婦人之義壹往不改以全貞信之節今忘死而趨生是不信也見貴而忘賤是不貞也棄義而從利無以為人乃援鏡操刀以割其鼻曰妾已刑矣所以不死者不忍幼嗣之重孤也刑餘之人殆可釋矣王高其節乃復其身號曰梁高行皇甫謐列女傳曰天水姜敘母者同郡楊阜之姑也阜為州吏馬超殺刺史太守敘屯歷城阜往見之歔欷悲悵敘曰何為乃爾阜曰守城不能完君亡不能死何以視息於天下乎君擁兵專制而無討賊之心此趙盾所以書弒也敘母慨然勒敘從阜計遂起兵於鹵城超聞之襲歷城得敘母母罵之曰若背父之逆子殺君之桀賊天豈久容若何不早死敢以面目視人乎超即殺之超敗隴右平定魏武令曰姜敘之母明智乃爾雖楊敞之妻蓋不過, WYG: 財}
