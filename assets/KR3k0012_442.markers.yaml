  - {type: variant, offset: 1400, length: 325, content: 異故再出又曰蔡人之妻者宋人女也既嫁於蔡夫有惡疾其母將改嫁之女曰夫之不幸乃妾之不幸也奈何去之適人之道壹與之醮終身不改夫不幸遇惡疾不改其意且夫采芣苢之草雖甚臭惡猶始於將采之終懷頡之浸以益親況於夫婦之道終不聽其母而作芣苢之詩又曰魯秋潔婦者魯秋胡子之妻也秋胡子既納之五日而去官於陳五年乃歸未至家見路傍有一美婦人方採桑秋胡子下車謂曰苦暴採桑吾行道遠願託桑陰下餐婦人採桑不輟秋胡子謂曰力田不如逢年力桑不如見郎今吾有金願與夫人曰嘻夫採桑力作紡績織以衣食奉二親飬夫子而已矣吾不願人之金也收子之資與子笥金秋胡還家奉金遺母母使人呼其婦婦至乃向採桑者婦曰君辭家遠仕五年方還當乍驅楊塵疾至今也乃悅道旁婦人是忘母不孝好色淫佚是汙行也妾不忍見不義不孝之人子改娶矣妾亦不嫁遂去東走, WYG: 大}
