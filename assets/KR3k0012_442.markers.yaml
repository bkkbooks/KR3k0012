  - {type: variant, offset: 2653, length: 351, content: 名禁字敬姬年十七適周氏二年而夫亡隕時禁懷妊數月後產子元餘喪事闋遂移居依託父母欲必守義育養孤弱父愍其年少子稚默以許同縣狐賓遣車馬衣服來欲迎禁父乃告禁勃然作色悽愴言曰依近父母本不圖此因流涕忼愾乃自投舍後流水於是舉家競赴救出而氣息已絕積二日一夜乃復蘇息二親由是知其至誠謝賓解婚禁欷歔長歎乃更將子還依夫第居止潔身執操非禮不動又曰廣漢新都便敬妻者同縣王氏女也名和年十七適敬敬亡和育養遺孤闔門守節不隨宗家宴樂嘉會居理甚脩蜀郡何玉因媒問和兄著取和遂相聽許著深曉其夫死子小宜有改圖加貧衰無以自立何氏公族必據福祚和自陳說斷計決分守全孤弱辭言未訖忼慨涕淚哀慟左右然著終受玉幣因欲迫脅和乃斷耳示著以信至見聽請以死謝舉宗敬重哀其大義又曰巴三貞者閬中馬眇新妻義西充國王元憤妻姬皆閬中人也閬中趙蔓君妻華西充國人也姬早失夫介然守操中, WYG: 太}
