  - {type: variant, offset: 2360, length: 4, content: 子死不哭, SBCK: 又曰王導少有風鑒識量清逺年十四陳留髙士張公見而竒之謂其從兄敦曰此兒容貌志氣將相之器也又石苞傳曰趙元儒有知人鑒見苞異之因與結交歎苞逺量當至公輔又曰陸雲㓜時呉尚書廣陵閔鴻見而竒之曰此兒􅀂非龍駒當是鳯鶵又曰劉􅁉爲布衣衆未之識也唯王謐獨竒貴之嘗謂􅁉曰卿當爲一代英雄晉書曰􅁃翼字稚恭風儀俊偉少有經綸大略京兆杜乂陳郡殷浩並才名冠丗而翼弗之重也毎語人曰此軰冝束之髙閣􅃸天下太平然後議所任耳見桓温緫角之中便期之以逺略因言於成帝曰桓温有英雄之才願陛下勿以常軰畜之冝委以方部之任}
