  - {type: variant, offset: 83, length: 1, content: 姑, krp: 人之壹也壹無二心孟明之臣也其不解也能懼思也子桑之忠也其知人也能舉善也子桑公孫枝舉孟明者詩曰于以采繁于沼于沚于以用之公侯之事秦穆有焉詩國風言沼沚之繁至薄猶采以共公侯以喻秦穆下遺小善夙夜匪懈以事一人孟明有焉詩大雅善仲山南也一人天子也詒厥孫謀以燕翼子子桑有焉詒遺也燕安也翼成也詩大雅羙武王能遺其子孫善謀以安成子孫言子桑有舉善之謀又曰晉陽處父聘于衛反過寗寗嬴從之及温而還其妻問之嬴曰以剛啇書曰沈潛剛克髙明柔克夫子壹之其不没乎陽子性絶剛天爲剛德猶不干時寒暑相順况在人乎且華而不實怨之所聚也言過其行犯而聚怨不可以定身剛則犯人余恐不獲其利而離其難是以去之爲六年晉殺處父又曰晉侯觀于軍府見鍾儀問之曰南冠而縶者誰也有司對曰鄭人所獻楚囚也使稅之稅解也召而弔之再拜稽首問其族對曰伶人也伶人樂官公曰能樂乎對曰先父之職官也敢有二事使與之琴操南音南音楚聲公曰君王何如對曰非小人之所得知也固問之對曰其爲太子也師保奉之以朝于嬰齊而夕于側也嬰齊令尹子重側司馬子反言其尊卿敬老不知其他公語范文子文子曰楚囚君子也言稱先職不背本也樂操土風不忘舊也稱太子抑無私也舍其近事而逺稱少子以示性所自然明至誠名其二卿尊君也尊晉君也不背本仁也不忘舊信也無私忠也尊君敏也仁以接事信以守之忠以成之敏以行之事雖大必濟}
