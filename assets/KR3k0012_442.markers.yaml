  - {type: variant, offset: 81, length: 1, content: 每, SBCK: 我死女必速行無適小國將不女容焉政狹法峻旣葬出奔鄭又有寵於厲公子文聞其死也曰古人有言曰知臣莫􅀂君弗可改也巳又曰晉文公及曹曹共公聞其駢脅欲觀其祼浴薄而觀之薄迫也骈脅合幹僖􅀒羈之妻曰吾觀晉公子之從者皆足以相國􅀂以相􅀂遂以爲傅相夫子必反其國反其國必得志於諸侯而誅無禮曹其首也子盍蚤自貳焉自貳自别異於曹乃饋盤飱寘璧焉臣無竟外之交故用盤藏璧飱中不欲令人見也公子受飱反璧又曰􅁗伯伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽户而還遂霸西戎用孟明也君子是以知􅁗穆之爲君也舉人之周也}
  - {type: page-break, offset: 81, content: '', id: KR3k0012_SBCK_442-2a}
  - {type: variant, offset: 81, length: 1, content: 每, WYG: 我死女必速行無適小國将不女容焉政狹法峻既葬出奔鄭又有寵於厲公子文聞其死也曰古人有言曰知臣莫若君弗可改也已又曰晉文公及曹曹共公聞其駢脅欲觀其裸浴薄而觀之薄廹也駢脅合幹僖負羈之妻曰吾觀晉公子之從者皆足以相國若以相若遂以為𫝊相夫子必反其國反其國必得志於諸侯而誅無禮曹其首也子盍蚤自貳焉自貳自别異於曹乃饋盤飱寘璧焉臣無境外之交故用盤藏寘飱中不欲令人見也公子受飱反璧又曰秦伯伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽尸而還遂霸西戎用孟眀也君子是以知秦穆之為君也舉人之周也}
  - {type: page-break, offset: 81, content: '', id: KR3k0012_WYG_442-2b, image: WYG0897/WYG0897-0076b.png}
  - {type: variant, offset: 81, length: 1, content: 每, krp: 我死女必速行無適小國將不女容焉政狹法峻旣葬出奔鄭又有寵於厲公子文聞其死也曰古人有言曰知臣莫若君弗可改也巳又曰晉文公及曹曹共公聞其駢脅欲觀其祼浴薄而觀之薄迫也骈脅合幹僖負羈之妻曰吾觀晉公子之從者皆足以相國若以相若遂以爲傅相夫子必反其國反其國必得志於諸侯而誅無禮曹其首也子盍蚤自貳焉自貳自别異於曹乃饋盤飱寘璧焉臣無竟外之交故用盤藏璧飱中不欲令人見也公子受飱反璧又曰秦伯伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽户而還遂霸西戎用孟明也君子是以知秦穆之爲君也舉人之周也}
  - {type: variant, offset: 83, length: 1, content: 姑, SBCK: 人之壹也壹無二心孟明之臣也其不解也能懼思也子桑之忠也其知人也能舉善也子桑公孫枝舉孟明者詩曰于以采繁于沼于沚于以用之公侯之事􅁗穆有焉詩國風言沼沚之繁至薄猶采以共公侯以喻秦穆下遺小善夙夜匪懈以事一人孟明有焉詩大雅善仲山南也一人天子也詒厥孫謀以燕翼子子桑有焉詒遺也燕安也翼成也詩大雅羙武王能遺其子孫善謀以安成子孫言子桑有舉善之謀又曰晉陽處父聘于衛反過寗寗嬴從之及温而還其妻問之嬴曰以剛啇書曰沈潛剛克髙明柔克夫子壹之其不没乎陽子性􅅸剛天爲剛德猶不干時寒暑相順况在人乎且華而不實怨之所聚也言過其行犯而聚怨不可以定身剛則犯人余恐不獲其利而離其難是以去之爲六年晉殺處父又曰晉侯觀于軍府見鍾儀問之曰南冠而縶者誰也有司對曰鄭人所獻楚囚也使稅之稅解也召而弔之再拜稽首問其族對曰伶人也伶人樂官公曰能樂乎對曰先父之職官也敢有二事使與之琴操南音南音楚聲公曰君王何如對曰非小人之所得知也固問之對曰其爲太子也師保奉之以朝于嬰齊而夕于側也嬰齊令尹子重側司馬子反言其尊卿敬老不知其他公語范文子文子曰楚囚君子也言稱先職不背本也樂操土風不忘舊也稱太子抑無私也舍其近事而逺稱少子以示性所自然明至誠名其二卿尊君也尊晉君也不背本仁也不忘舊信也無私忠也尊君敏也仁以接事信以守之忠以成之敏以行之事雖大必濟}
  - {type: page-break, offset: 83, content: '', id: KR3k0012_SBCK_442-2b}
  - {type: variant, offset: 83, length: 1, content: 姑, WYG: 人之壹也壹無二心孟明之臣也其不解也能懼思也子桑之忠也其知人也能舉善也子桑公孫枝舉孟明者詩曰于以采蘩于沼于沚于以用之公侯之事秦穆有焉詩國風言沼沚之蘩至薄有采以共公侯以喻秦穆不遺小善夙夜匪懈以事一人孟明有焉詩大雅善仲山甫也一人天子也詒厥孫謀以燕翼子子桑有焉詒遺也燕安也翼成也詩大雅美武王能遺其子孫善謀以安成子孫言子桑有舉善之謀又曰晋陽處父聘于衞反過寗寗嬴從之及温而還其妻問之嬴曰以剛商書曰沈潜剛克髙明柔克夫子壹之其不没乎陽子性純剛天為剛徳猶不干時寒暑相順况在人乎且華而不實怨之所聚也言過其有犯而聚怨不可以定身剛則犯人余恐不獲其利而離其難是以去之為六年晉殺處父又曰晋侯觀于軍府見鍾儀問之曰南冠而縶者誰也有司對曰鄭人所獻楚囚也使稅之税觧也召而弔之再拜稽首問其族對曰伶人也伶人樂官公曰能樂乎對曰先父之職官也敢有二事使與之琴操南音南音楚聲公曰君王何如對曰非小人之所得知也固問之對曰其為太子也師保奉之以朝於嬰齊而夕於側也嬰齊令尹子重側司馬子反言其尊卿敬老不知其他公語范文子文子曰楚囚君子也言稱先職不背本也樂操土風不忘舊也稱太子抑無私也舍其近事而逺稱少子以示性所自然明至誠名其二卿尊君也尊晋君也不背本仁也不忘舊信也無私忠也尊君敬也仁以接事信以守之忠以成之敬以行之事雖大必濟}
