  - {type: variant, offset: 2132, length: 217, content: 及客憐之更還救請既得活乃自割耳久之太守聞其夫在遂還其妻又曰下邳陳悝妻者同郡吳氏之女漢末喪亂流寓東城東城令戚奇欲北就呂布焚城疊虜人眾聞女有容色善史書能彈琴瑟遂殺悝住車令僕者接女上車女謂奇曰君隳壞都城虜略士女殺人之夫欲以人婦為妻何酷逆之甚願守志而死不願無行而生遂自刎奇猶有哀慚殯葬乃去又曰戎士陳南妻丹者戴氏之女美而早寡事舅姑恭篤同伍之人咸樂其賢色求者甚多守死不嫁後之娉者告其軍主軍主命之知不得已乃自經死韓詩外傳曰魯公甫文伯死其母不哭季孫聞, SBCK: 到鄴賣鐵于市長趙元儒異}
