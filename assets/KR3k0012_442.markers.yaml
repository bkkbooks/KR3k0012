  - {type: variant, offset: 705, length: 1, content: 出, SBCK: 粲字仲宣蔡邕見而竒之時邕才學顯著常車􅀐塡巷賔客盈座聞粲在門倒屣迎之粲年旣㓜弱容狀短小一座皆驚邕曰此王公孫也有異才媿吾不如也吾家書籍文章盡當與之又曰陳羣爲童兒時祖晏常異之曰此兒必興吾門羣爲司空而曹屬時薦樂安王摸下邳周逵者太祖辟之還敎以爲摸逵穢德終必敗太祖不聽後摸逵皆坐姧宄誅太祖以謝羣羣薦廣陵陳喬丹陽戴乾太祖皆用之後呉人叛乾忠義死難喬爲名臣又曰楊駿字季才司馬宣王年十六七與駿相遇駿曰此非常人也同邵王象少􅀌特爲人僕􅀠年十七八使牧羊而私讀書駿見羙其人質即贖着家中娉妻立屋然與別駿自少及長以人倫自任魏略曰趙歧逃難匿姓名賣餅北海市時安丘孫嵩字賔石}
