  - {type: variant, offset: 2072, length: 0, content: '', SBCK: 子免飢寒吾當助卿營之常借給舒受而不辭又曰武陔字元夏沛國竹邑人父同有顯名陔及二弟韶茂皆緫角見稱時同郡劉公榮名人嘗詣同過陔兄弟與觀其舉動便出語同曰君三子皆國士也元夏量最優出輔佐之風仕官可爲亞公叔夏季夏不減常伯納言陔後果開府徐廣晉書曰鄭齊純和有識􅀄荀攸見齊曰鄭公業爲不亡矣時相國􅁺魏諷有盛名同郡任覽謂齊曰諷姦雄必以禍終子冝絶之後諷果敗司空王朗辟􅁺委以求才齊舉髙陽許允扶風魯芝東萊王基並爲名臣又曰魏謁}
  - {type: page-break, offset: 2072, content: '', id: KR3k0012_SBCK_442-7a}
