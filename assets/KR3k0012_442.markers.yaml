  - {type: variant, offset: 1266, length: 6, content: 邵南申女者申, SBCK: 諸葛亮字孔明瑯瑘}
  - {type: variant, offset: 1266, length: 0, content: '', WYG: 諸葛亮字孔明瑯琊人耕壠畆好為梁父吟自比於管仲樂毅時人莫之許也唯博陵崔州平潁川徐庶與亮友善謂為信然先主屯新野庶見先主器之庶謂先主曰諸葛孔明卧龍也将軍豈願見之先主曰君與俱來庶曰此人可就見不可屈致也将軍宜枉駕過之由是先主詣亮又曰龎統字士元襄陽人少時樸鈍未有識者潁川司馬徽清雅有知人鑒統弱冠往見徽徽採桑樹上坐統桑下共語自晝逹夜徽甚異之稱當為南州士人冠冕由是漸􅂋吳志曰顧}
  - {type: page-break, offset: 1266, content: '', id: KR3k0012_WYG_442-9a, image: WYG0897/WYG0897-0079c.png}
  - {type: variant, offset: 1266, length: 6, content: 邵南申女者申, krp: 諸葛亮字孔明瑯瑘}
  - {type: variant, offset: 1267, length: 2, content: 南申, WYG: 字孝則雍長子也年三十七起家為豫章太守小吏姿質佳者奨令就學擇其先進擢置左右職舉善以教風化大行初錢塘丁謂出於役伍陽羡張康生乎民庻烏程吳粲雲陽殷禮起乎㣲賤邵皆㧞而友之謂至典軍中郎康至丹陽禮至零陵令粲至太子少𫝊又曰張温字惠恕少修操容貎瓌瑋權聞之以問公卿曰温當今與誰為比大司農劉基曰無可與為軰顧雍曰温當今無軰權曰如是張允不死也徴到延見文辭占對觀者傾悚權改容加禮又曰張昭字子布為人矜嚴忠謹能識人諸葛恪字元遜年少之時衆人竒其英才昭言終敗葛氏者元遜也吳書曰陶謙字􅚿祖年十四獨帛幡乘竹馬而戯邑中兒童皆随之蒼梧太守同縣甘公出遇之於塗見其容貎異住車與語甚恱之因許妻以}
