  - {type: variant, offset: 3468, length: 1182, content: 三者都尉令長並共患之然氣厲不息共請求人家生婢子有罪家女養之八月朝祭送虵輒夜出吞噬之累年如此前後已用九女爾時豫募齎未得將樂縣李誕有六女無男其小女寄應募欲行父母不聽寄曰父母無相生女六人雖有如無無有緹縈濟父之功不能供養消費衣食生無所益不如蚤亡賣寄之身可得少錢父母終不聽寄自潛發不可禁止寄乃行請好劍及咋虵犬先作數石米餈用蜜灌之以置穴口虵夜便出頭大如囷目如三尺鏡聞餈香氣先啖食之寄便放犬犬就噬咋寄從後斫得數創虵因踊出至庭而死寄入視其穴得九女觸髏悉舉出緩步而歸越王聞之娉寄為后拜其父為將樂令母及姊皆有賜自是東冶無復祅邪之物其歌謠至今存焉杜預女記曰二寡婦者淑也昺也淑喪夫守寡兄弟將嫁之誓而不許為書曰蓋聞君子導人以德矯俗以禮是以列士有不移之志貞女無廻二之行淑雖婦人竊慕殺身成義死而後已夙遘禍罰喪其所天男弱未冠女幼未笄是以僶俛求生將欲長育二子上奉祖宗之嗣下繼祖禰之禮然後覲于黃泉永無慚色仁兄德弟既不能厲高節於弱志發明德於闇昧許我他人逼我于上乃命官人訟云簡書夫智者不可惑以事仁者不可脅以死晏嬰不以白刃臨頸改正直之辭梁寡不以毀形之痛忘執節之義高山景行豈不思齊計兄弟備託學門不能匡我以道博我以文雖曰既學吾謂之未也祖冲之述異記曰晉元興末魏郡民陳氏女名琬家在查浦年十六飢疫之歲父母相係死沒唯有一兄傭賃自活女容色甚艷鄰中士庶見其貧弱竟以金帛招要之女立操貞概未嘗有許後值盧循之亂賊眾將加凌逼女厲然不廻遂以被害杜預女記曰大女緱玉者陳緱氏之女也夫之從母兄弟殺其父玉乃為父報讎其殺已至親縛玉付吏獄竟當行刑有名士申徒子龍者緱玉同縣人也嘉其義勇奏記於縣曰伏聞大女緱玉為父報讎獄已決不勝感悼之情敢陳所聞昔太原周黨感春秋義辭師復讎當時論者猶高其節況玉女弱耳無所聞心無所激內無同生之謀外無交遊之助直推父子之情奮發怒之心手刃刺讎僵尸流血當時聞之人無勇怯莫不強膽增氣輕身殉義攘袂高談稱羨今聞玉幽執牢檻罪名已定皆心低意沮悵恨長歎蟠雖愚豎以為玉之節義歷代未有定足以感無恥之孤激忍辱之子假玉不值明時尚望追旌閭墓顯異後嗣況事在清聽不加八議哀矜之貸誠為朝廷痛之申屠蟠字子龍又曰新野公主者光武皇帝姊也少有節行姿容嫁為新野人鄧晨妻生一男三女王莽地黃三年光武起兵攻破棘陽至小長安為莽兵所敗棄車走時天大霧還求室家道得小妹伯姬與共騎前行復見新野公主命使上馬主以手麾上曰行矣文叔努力早建大功追兵方至不能相救無為兩沒也上駐馬重呼之主曰不駃馳但志免我更當三人死也且急自脫我身何在會追兵至上遂驅馬而去主即遇害裴啟語林曰王經少處貧苦仕至二千石其母語之汝本寒家兒仕至二千石可止也經不能止後為尚書助魏不忠於晉被牧流涕辭母曰恨昔不從勑以致今日母無戚容謂曰汝為子則孝為臣則忠有可負哉虞預會稽典錄曰孟淑上虞人也父質中郎將淑年十七當出適聘禮既至為盜所劫淑祖父操刃對戰不敵見害淑思慕哀慟憔悴毀形以致盜由己乃喟爾歎曰微淑之身禍誠不生以身害祖茍活何顏於是遂自經而死, SBCK: ''}
  - {type: variant, offset: 3468, length: 1182, content: 三者都尉令長並共患之然氣厲不息共請求人家生婢子有罪家女養之八月朝祭送虵輒夜出吞噬之累年如此前後已用九女爾時豫募齎未得將樂縣李誕有六女無男其小女寄應募欲行父母不聽寄曰父母無相生女六人雖有如無無有緹縈濟父之功不能供養消費衣食生無所益不如蚤亡賣寄之身可得少錢父母終不聽寄自潛發不可禁止寄乃行請好劍及咋虵犬先作數石米餈用蜜灌之以置穴口虵夜便出頭大如囷目如三尺鏡聞餈香氣先啖食之寄便放犬犬就噬咋寄從後斫得數創虵因踊出至庭而死寄入視其穴得九女觸髏悉舉出緩步而歸越王聞之娉寄為后拜其父為將樂令母及姊皆有賜自是東冶無復祅邪之物其歌謠至今存焉杜預女記曰二寡婦者淑也昺也淑喪夫守寡兄弟將嫁之誓而不許為書曰蓋聞君子導人以德矯俗以禮是以列士有不移之志貞女無廻二之行淑雖婦人竊慕殺身成義死而後已夙遘禍罰喪其所天男弱未冠女幼未笄是以僶俛求生將欲長育二子上奉祖宗之嗣下繼祖禰之禮然後覲于黃泉永無慚色仁兄德弟既不能厲高節於弱志發明德於闇昧許我他人逼我于上乃命官人訟云簡書夫智者不可惑以事仁者不可脅以死晏嬰不以白刃臨頸改正直之辭梁寡不以毀形之痛忘執節之義高山景行豈不思齊計兄弟備託學門不能匡我以道博我以文雖曰既學吾謂之未也祖冲之述異記曰晉元興末魏郡民陳氏女名琬家在查浦年十六飢疫之歲父母相係死沒唯有一兄傭賃自活女容色甚艷鄰中士庶見其貧弱竟以金帛招要之女立操貞概未嘗有許後值盧循之亂賊眾將加凌逼女厲然不廻遂以被害杜預女記曰大女緱玉者陳緱氏之女也夫之從母兄弟殺其父玉乃為父報讎其殺已至親縛玉付吏獄竟當行刑有名士申徒子龍者緱玉同縣人也嘉其義勇奏記於縣曰伏聞大女緱玉為父報讎獄已決不勝感悼之情敢陳所聞昔太原周黨感春秋義辭師復讎當時論者猶高其節況玉女弱耳無所聞心無所激內無同生之謀外無交遊之助直推父子之情奮發怒之心手刃刺讎僵尸流血當時聞之人無勇怯莫不強膽增氣輕身殉義攘袂高談稱羨今聞玉幽執牢檻罪名已定皆心低意沮悵恨長歎蟠雖愚豎以為玉之節義歷代未有定足以感無恥之孤激忍辱之子假玉不值明時尚望追旌閭墓顯異後嗣況事在清聽不加八議哀矜之貸誠為朝廷痛之申屠蟠字子龍又曰新野公主者光武皇帝姊也少有節行姿容嫁為新野人鄧晨妻生一男三女王莽地黃三年光武起兵攻破棘陽至小長安為莽兵所敗棄車走時天大霧還求室家道得小妹伯姬與共騎前行復見新野公主命使上馬主以手麾上曰行矣文叔努力早建大功追兵方至不能相救無為兩沒也上駐馬重呼之主曰不駃馳但志免我更當三人死也且急自脫我身何在會追兵至上遂驅馬而去主即遇害裴啟語林曰王經少處貧苦仕至二千石其母語之汝本寒家兒仕至二千石可止也經不能止後為尚書助魏不忠於晉被牧流涕辭母曰恨昔不從勑以致今日母無戚容謂曰汝為子則孝為臣則忠有可負哉虞預會稽典錄曰孟淑上虞人也父質中郎將淑年十七當出適聘禮既至為盜所劫淑祖父操刃對戰不敵見害淑思慕哀慟憔悴毀形以致盜由己乃喟爾歎曰微淑之身禍誠不生以身害祖茍活何顏於是遂自經而死, WYG: ''}
