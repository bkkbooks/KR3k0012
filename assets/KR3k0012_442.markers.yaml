  - {type: variant, offset: 850, length: 413, content: 操金百鎰白壁一雙以娉焉因以輜軿三十乘迎之將以為夫人妻辭曰白公無恙之時妾幸得充後宮執箕帚衣裳履拂枕席為妃今白公不幸而死妾願守其墳墓奉其祠祀以終天年今王賜金璧之娉夫人之位非遇妾之所妾聞之忠臣不借人以力貞女不假人以色豈獨事生若此哉於死亦然妾既不位位猶仁也不能從死今又去而嫁不亦大甚乎遂辭娉而不行吳王賢其節而有義號曰楚白貞姬又曰魯陶寡嬰者魯陶門之女少寡養幼孤無強昆弟紡績為產魯人或聞其義將求焉嬰聞之恐不得免乃作歌明己之不二也其詩曰悲黃鵠之蚤寡兮十年不雙宛頸戢翼兮不與眾同時則非鳴兮獨行惸惸天命令然兮愧獨永傷感鳥慍己兮淚下成行鳴呼悲兮死者不可忘飛鳥尚然兮何況貞良雖有賢雄兮終不重行魯人聞之曰斯女不可得也遂不敢復求之嬰寡終身又曰衛寡夫人者齊侯之女也嫁於衛至城門而衛君死保母曰可以還矣女不聽遂入行三年之喪畢弟立謂曰衛小國也不容二庖請願同庖唯夫妻為同庖夫人不聽衛君乃使愬於齊兄弟皆欲與後君使人告女女終不聽乃作詩曰我心匪石不可轉也我心匪席不可卷, SBCK: ''}
