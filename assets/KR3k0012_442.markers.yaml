  - {type: variant, offset: 336, length: 302, content: 女字昭儀賢為郡督郵軍襲郡城城門閉賢兄弟謀踰城出事泄伏誅乃配嫁昭儀泣曰誅我夫而逼嫁我此寧夫婦平生之願乎乃竊刀割咽而死又曰巴趙娥者趙萬之妻郡縣遭亂萬得足疾不能行為賊所殺賊欲將娥娥守喪不去賊舉矛指娥欲以怖之娥知賊必欲劫略乃以身赴矛貫心達背而死又曰九江王孝謙妻者同郡袁氏之女字貴女與母俱流移共止孝謙好酒凶悖無子婿之禮貴女每涕泣諫喻不能匡改母怨孝謙之為貴女輒悲哀不食言於鄰人曰為子致母於辱非孝也事無道之人非義也昔秋胡之妻不忍見不義之人我何為於世間哉乃自殺又曰沛周明都妻者衛尉趙長平之女也名阿長平德行純粹海內知之阿少習儀訓長閑婦道而都驕淫暴躁不式上命都父衛謂阿曰新婦賢者女也當以禮法匡婿都之不改新婦之過也阿既拜命退謂, SBCK: 顧}
