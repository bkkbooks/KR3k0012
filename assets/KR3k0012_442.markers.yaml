  - {type: variant, offset: 3005, length: 296, content: 五年黃巾餘類延益州賊帥趙蕃據閬中城拘迫衣冠令人婦女為質義姬華等隨比入城後賊類爭勢攻破閬中時人或死或奔家室相失義姬華隨類出城走傳聞後賊或拘略婦女於是三人自度窮迫恐不免於據逼乃相與自沈水而死鄉黨聞之莫不感傷號曰三貞又曰蜀郡廣都公乘士會妻者同縣張氏女也會早卒年壯無嗣欲有問者親戚將以許之發憤忼愾斷髮割耳事姑盡禮肅恭供養養族子以承宗廟列女傳為熊氏女斷髮割耳同又曰廣漢廖伯妻者同縣殷氏女也名紀年十六適伯伯早卒紀性聰敏逵於詩書女傳進退閑暇又有美色見貪割面告誠以全其節曰求生害仁仁者不為紀生見禮義豈獨使古人擅名者哉因作詩三章以風父母而舉縣嘉其才麗媒介滋繁遂援刀斷指明情邵氏家傳曰虞建武都尉邵夫人字義姬鴻臚之, SBCK: 御覽卷}
  - {type: variant, offset: 3005, length: 461, content: 五年黃巾餘類延益州賊帥趙蕃據閬中城拘迫衣冠令人婦女為質義姬華等隨比入城後賊類爭勢攻破閬中時人或死或奔家室相失義姬華隨類出城走傳聞後賊或拘略婦女於是三人自度窮迫恐不免於據逼乃相與自沈水而死鄉黨聞之莫不感傷號曰三貞又曰蜀郡廣都公乘士會妻者同縣張氏女也會早卒年壯無嗣欲有問者親戚將以許之發憤忼愾斷髮割耳事姑盡禮肅恭供養養族子以承宗廟列女傳為熊氏女斷髮割耳同又曰廣漢廖伯妻者同縣殷氏女也名紀年十六適伯伯早卒紀性聰敏逵於詩書女傳進退閑暇又有美色見貪割面告誠以全其節曰求生害仁仁者不為紀生見禮義豈獨使古人擅名者哉因作詩三章以風父母而舉縣嘉其才麗媒介滋繁遂援刀斷指明情邵氏家傳曰虞建武都尉邵夫人字義姬鴻臚之第二女夫人少而寡虞氏及夫人之宗哀夫人辛苦欲更為圖婚然重夫人宿操慮不可以非禮逼亦知夫人潛佩刀誓以必死故不敢生意夫人自以虞氏凶短繼世無子常獨處一室絕書學非祭祀墳墓不出紡績輒貨以供祭稱其多少不求豐厚干寶搜神記曰東越閩中有庸嶺高數十里其下北濕中有大虵長七八丈大十圍常病治都尉及屬城長吏多有死者祭以牛羊故不得福或與人夢或下喻巫祝欲得啖童女年, WYG: 御覧卷四百四}
