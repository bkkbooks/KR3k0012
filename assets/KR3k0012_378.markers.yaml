  - {type: variant, offset: 2973, length: 149, content: 五丈六尺括地圖曰大人國孕三十六年而生生兒白首長丈外國圖曰大秦國人長一丈五尺猿臂長脅好騎駱駞辛氏三秦記曰燉煌西盡大秦隔海心無憂遇善風不經二十日得渡心憂數年不得渡該曰心無憂患不經二旬心若憂患遠離三春士人賢直男女皆長一丈端正國主風雨不和則讓賢而治之郭子橫洞冥記曰有支提國人長三丈二尺有三手一手當胸手足三指, SBCK: 八}
