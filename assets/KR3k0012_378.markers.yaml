  - {type: variant, offset: 1340, length: 0, content: '', SBCK: 繼子得食肥而不澤情不相徃來也適子懷於燕慈母喻於利情相徃來也呉質別傳曰詔特進以下㑹質間曹眞肥}
  - {type: variant, offset: 1340, length: 0, content: '', WYG: 繼子得食肥而不澤情不相往來也適子懐扵燕慈母喻扵荆情相往來也呉質别傳曰詔特進而下㑹質間曹真肥}
  - {type: variant, offset: 1340, length: 0, content: '', krp: 繼子得食肥而不澤情不相徃來也適子懷於燕慈母喻於利情相徃來也呉質別傳曰詔特進以下㑹質間曹眞肥}
  - {type: variant, offset: 1341, length: 1, content: 儒, SBCK: 鑠臞質召俳優使說肥臞眞曰卿欲部曲將遇我耶遂爭而罷諸葛恪別傳曰孫權常}
  - {type: page-break, offset: 1341, content: '', id: KR3k0012_SBCK_378-8a}
  - {type: variant, offset: 1341, length: 1, content: 儒, WYG: 鑠臞質召俳優使說肥臞真曰卿欲陪典將過我耶遂爭而罷諸葛恪别傳曰孫權常}
  - {type: variant, offset: 1341, length: 1, content: 儒, krp: 鑠臞質召俳優使說肥臞眞曰卿欲部曲將遇我耶遂爭而罷諸葛恪別傳曰孫權常}
  - {type: variant, offset: 1343, length: 2, content: 天高, SBCK: 恪何以自娯而更肥澤恪對曰臣聞冨潤屋徳潤身臣非敢自娯脩巳而巳異􅁐曰晉司􅀠校尉髙平滿奮字武秋豐肥膚肉潰裂每至暑夏輙膏汗流溢其有愛妾夜取以燃照炎灼發于屋表奮大惡之悉盛而埋之曁永嘉之亂爲胡賊所燒皎􅀂燭光㑹稽典録曰董孝治勾章人家貧採薪供養得甘果奔走以獻母母甚肥恱隣人家冨有子不孝母甚瘦不孝子疾孝治母肥常苦辱之孝治不報及母終負土成墳鳥獸助其悲號喪竟殺不孝子置冢前以􅀕詣獄自繫㑹赦得免方言曰益梁之間凡諱其肥盛謂之䑋如掌切肥貌也􅀶物志曰京邑有一人失名姓食噉兼十許人遂肥不能動其父曽作逺方長吏彼縣令故義共傳食之一二年中一郷爲儉張顯誓曰古諺云堯舜至聖身如脯腊桀紂無道肥膚三尺語林曰孟業爲幽州其人甚肥或以爲千斤武帝爲稱之難其大臣乃作一大秤挂壁業入見武帝曰朕欲自稱有幾斤業荅曰陛下欲稱臣耳無煩復勞聖躬}
  - {type: page-break, offset: 1343, content: '', id: KR3k0012_SBCK_378-8b}
  - {type: variant, offset: 1343, length: 3, content: 天高於, WYG: 恪何以自娯而更肥澤恪對曰臣聞富潤屋徳潤身臣非敢自娱}
  - {type: variant, offset: 1343, length: 2, content: 天高, krp: 恪何以自娯而更肥澤恪對曰臣聞冨潤屋徳潤身臣非敢自娯脩巳而巳異苑曰晉司隷校尉髙平滿奮字武秋豐肥膚肉潰裂每至暑夏輙膏汗流溢其有愛妾夜取以燃照炎灼發于屋表奮大惡之悉盛而埋之曁永嘉之亂爲胡賊所燒皎若燭光㑹稽典録曰董孝治勾章人家貧採薪供養得甘果奔走以獻母母甚肥恱隣人家冨有子不孝母甚瘦不孝子疾孝治母肥常苦辱之孝治不報及母終負土成墳鳥獸助其悲號喪竟殺不孝子置冢前以祭詣獄自繫㑹赦得免方言曰益梁之間凡諱其肥盛謂之䑋如掌切肥貌也博物志曰京邑有一人失名姓食噉兼十許人遂肥不能動其父曽作逺方長吏彼縣令故義共傳食之一二年中一郷爲儉張顯誓曰古諺云堯舜至聖身如脯腊桀紂無道肥膚三尺語林曰孟業爲幽州其人甚肥或以爲千斤武帝爲稱之難其大臣乃作一大秤挂壁業入見武帝曰朕欲自稱有幾斤業荅曰陛下欲稱臣耳無煩復勞聖躬}
  - {type: variant, offset: 1346, length: 2, content: 脩人, SBCK: 是稱業果得千斤丗語曰太祖父嵩在太山太祖令太山太守應劭送家詣兖州陶謙密遣數十􅀐掩捕嵩家嵩懼穿後垣先出其妾肥不得出逃于厠與妾俱􅀍害又曰􅁃公造周伯仁曰君何所欣恱而忽肥􅁃曰君復何所憂慘而忽瘠伯仁}
  - {type: variant, offset: 1346, length: 2, content: 脩人, krp: 是稱業果得千斤丗語曰太祖父嵩在太山太祖令太山太守應劭送家詣兖州陶謙密遣數十騎掩捕嵩家嵩懼穿後垣先出其妾肥不得出逃于厠與妾俱𬒳害又曰庾公造周伯仁曰君何所欣恱而忽肥庾曰君復何所憂慘而忽瘠伯仁}
  - {type: variant, offset: 1347, length: 0, content: '', WYG: 巳而已異苑曰晋司𨽻校尉髙平滿奮字武秋豐肥膚内潰裂每至暑夏輙膏汗流溢其有愛妾夜取以燃照炎灼發于屋表奮大惡之悉盛而埋之暨永嘉之亂為胡賊所燒皎若燭光㑹稽典畧録曰董孝治勾章}
