  - {type: variant, offset: 1670, length: 891, content: 其言甚怒好仰晏子曰若是則盤庚也夫盤庚之長九尺有餘大下小上白色而髯其言好仰而聲上公曰是也是怒君師不如違之遂不伐宋也世說曰滿寵寵子偉偉子奮皆長八尺長絕域人河圖玉板曰從崑崙以北九萬里得龍伯國人長三十丈生萬八千歲而死從崑崙以東得大秦國人長十丈從此以東十萬里得佻吐凋國人長三丈五尺從此以東千里得中秦人長一丈龍魚河圖曰天之東西南北極各有銅頭鐵額兵長三千萬丈三千億萬人天之東西南北極各有金剛敢死力士長三千萬丈三千億萬人天中有太平之都有都甲食鬼鐵面兵長三千萬丈三千億萬人尚書洪範五行傳曰長狄之人長蓋五丈餘也又曰秦始皇時有大人身長五丈足跡六尺夷狄服見於臨洮天戒秦曰勿大行夷狄之道將受其禍云左傳文下曰冬十月敗狄于鹹獲長狄僑如富父終甥摏其喉以戈殺之埋其首於子駒之北門以命宣伯得臣因名宣伯曰僑如以旌其功公羊傳文公曰長狄兄弟三人一者之齊王子城父殺之一者之魯叔孫得臣殺之則未知其之晉者也穀梁傳文公曰魯文公十一年叔孫得臣敗狄于鹹獲長狄也兄弟三人迭害中國得臣善射射中其目身橫九畝斷其首而載之眉見於軾春秋考異郵曰長狄兄弟三人各長百尺狄者陰氣時中國衰有夷狄萌家語曰吳伐越隳會稽獲巨骨一節專車載焉吳子使來聘魯以問孔子孔子曰丘聞昔禹致群臣於會稽之山防風氏後至禹戮之其骨節專車客曰防風何字也子曰汪罔之君守封嵎之山為漆姓在虞夏商為汪罔氏於周為長翟氏今曰大人客曰人之長極幾何子曰長者不過十丈數之極也魏略曰天竺國人皆長一丈八尺車鄰國男女皆長一丈八尺魏志曰咸熙二年襄武縣言有大人見長三丈餘跡長三尺六寸白髮著黃單衣戴黃巾呼人王始語云今當太平列子曰渤海之東有大壑焉中有五山一曰岱輿二曰員嶠三曰方壺四曰瀛洲五曰蓬萊群聖居之帝使巨鼇十五舉首而戴之迭為三番龍伯之國有大人一釣而運六鼇合負而歸於是岱輿員嶠二山沉於大海帝馮怒侵滅龍伯之國使小至伏義神農時其國人猶長數十丈淮南子曰東方之人長一丈孫綽子曰海人與山客辯其方物海人曰橫海有魚額若華山之頂一噏萬頃之波山客曰鄧林有木圍三萬尋直上千里傍蔭數國東極有大人斬木為策短不可杖釣魚為鮮不足充餔音逋山海經曰東海之外大荒之中有波谷山者有大人之國有大人之市名曰大人堂有一人蹲其上張其兩臂漢武故事曰公孫卿至東萊云, SBCK: 忽}
