  - {type: variant, offset: 1576, length: 93, content: 有長人見身長五丈語人張靖曰今當太平新平令以聞健以妖妄召靖繫之是月霖雨河渭泛溢蒲坂津監登於河中流得大屐一隻長七尺三寸足跡稱屐指長尺餘丈深七寸璅語曰齊景公伐宋至曲陵夢見大君子甚長而大大下而小, SBCK: 末崇在㕔事}
