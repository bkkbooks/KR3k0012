  - {type: variant, offset: 768, length: 0, content: '', SBCK: 王戒子萬有羙名少而大肥戎令食糠而肥愈甚年十九卒晉中興書曰兖州旣有八伯之號其後更置四伯大鴻臚陳留江淵以能食爲榖伯豫章太守陳留史疇以大肥爲大伯散􅀐侍郎髙平張嶷以狡妄爲猾伯廬陵太守}
  - {type: variant, offset: 768, length: 0, content: '', WYG: 王戎子萬有美名少而大肥戎令食糠而肥愈甚年十九卒晋中興書曰兖州既有八伯之號其後更置四伯大鴻臚陳留江淵以能食為榖伯豫章太守陳留史疇以大肥為太伯散騎侍郎髙二套嶷以佼妄為猾伯廬陵太守}
