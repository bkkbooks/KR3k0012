  - {type: variant, offset: 561, length: 0, content: '', SBCK: 亦出王充論衡古文璅語曰齊景公伐宋至曲陵夢見有短丈夫賔於前晏子曰君所夢何如哉公曰其賔者甚短大上小下其言甚怒好俛晏子曰則如是伊尹也伊尹甚大而短大上小下赤色而髯其言好俛而下聲公曰是矣晏子曰是怒君師不如違之遂不果伐宋方言曰鮆矲蒱揩反短也江湘之㑹謂之鮆胙啓反又曰桂林之中謂短矲東􅀭之間謂之俯今俗呼小爲矲也俯言俯視因名云汝南先賢傳曰周舉字宣光姿貌短陋有晏子之風陸胤廣州先賢傳曰徐徴字君外爲人短小果敢劉彦明燉煌實録曰㲹洊字丗震慱學善屬文爲人短小弱冠屢陳損益續捜神記曰司徒蔡謨親親有王蒙者單獨常爲蔡公所收養蒙長􅂊及三尺似爲無骨登牀輙令人抱上桓譚新論曰諺云朱儒見一節而長短可知短絶域人詩含神霧曰東北極有人長九寸家語曰孔子曰僬僥氏長三尺短之至也國語同魏略西域傳曰短人國在康居西男女皆長三尺衆甚多康居長老傳曰常有啇行迷惑失道而到此國國中甚多珠夜光明啇度此國去康居可萬餘里魏志曰倭南有朱儒國人其長三四尺去女王國四千餘里列子曰從中州以東三十萬里得僬僥國人長一尺六寸東北極有人名竫音靖人長九寸山海經曰周饒國爲人短小着冠帶一曰僬僥國郭璞曰其人長三尺漢武故事曰東郡送一短人長七寸衣冠具足疑其山精常令在案上行召東方朔問朔至呼短人曰巨靈汝何忽叛來阿母還未短人不對因指朔謂上曰王母種桃三千年一作子此兒不良巳三過偷之矣遂失王母意故􅀍讁來此上大驚始知朔非丗中人短人謂上曰王母使臣來告陛下求道之法唯有清淨不冝躁擾復五年與帝㑹言終不見神異經曰西北荒中有小人焉長一寸圍如長朱衣玄冠乗軺車導引有威儀人遇其乗車並食之其味辛楚終不爲虫豸所咋並識萬物名字殺腹中三虫又曰西海之中有鵠國男女皆長七寸自然有禮好經論跪拜壽三百歳人行如飛日千里百物不敢犯之唯畏鵠鵠遇吞之上壽三百歳在鵠腹不死而鵠一舉千里張華注曰此陳章對齊桓公云西海之外鵠國男女皆七寸也廣志曰東方有人長三尺君長出行導衛威儀有􅀂中國人又有小人如螻蛄手撮之滿手得二十枚外國圖曰僬僥國人長一尺六寸迎風則偃背風則伏眉目具足但野􅀫一曰僬僥長三尺其國草木夏死而冬生去九疑三萬里王子年拾遺記曰貟嶠山有陁移國人長三尺夀萬歳廣延之國人長二尺郭璞山海經圖賛曰僬僥極麽門可反竫人唯小四體具足眉目才了肥􅀃文曰肥多肉也􅃾腹下肥也禮記禮運曰安之以樂而不逹於順猶食而弗肥也四體旣正膚革充􅄹人之肥也左傳哀下曰魯哀公至自越郭重僕孟武伯惡重曰何肥也公曰是食言多矣能無肥乎公與大夫始有惡公羊傳宣公曰楚莊王圍宋子反乘堞而窺宋城見華元曰何如華元曰昜子而食析骸而炊子反曰吾聞圍國者鉗馬而秣之使肥者應客是何子之情也華元曰吾聞君子見人之惡則矜之小人見人之惡則幸之吾見君子是以情也家語曰弱土之人肥漢書曰陳平少時家貧好讀書有田三十􅅿獨與兄伯居伯常耕縱平遊學平爲人長羙色人或謂平貧何食而肥􅀂是其㛐疾平不親家産曰亦食糠覈耳音紇}
