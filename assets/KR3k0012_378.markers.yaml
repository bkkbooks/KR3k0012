  - {type: variant, offset: 877, length: 292, content: 食一進一斛餘德驚曰所噉如此非耕而能飽但才貌不凡堪為貴人可以一縣試之繇是拜逢陵長甚有治績崔鴻前秦錄曰鹿縕字處嘿西平人也身長八尺腰帶十圍清辯善論雄武便弓馬孝友貞亮聲高一時車頻秦書曰符堅時有申香長十尺以上為指蓋郎裴景仁秦書曰姚萇圍符堅遣僕射尹緯詣闕陳事堅見緯貌魁梧志氣秀傑腰帶十圍瑰偉異常驚而問曰卿於朕世何為所作偉荅曰尚書令史堅笑曰卿宰相才也宋書曰南郡王義宣為荊州刺史白晢美鬚眉身長七尺五寸腰帶十圍齊書曰王茂先身長八尺潔白美容儀齊武帝布衣時常見之歎曰王茂先年少堂堂如此必為公輔又曰劉善明平原人也長八尺九寸質素不好聲色北齊書曰肅宗孝昭皇帝諱演字延安聰敏有識度深沉能斷不可窺測身長八尺腰帶十圍儀, SBCK: ''}
