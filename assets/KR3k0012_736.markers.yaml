  - {type: variant, offset: 4037, length: 1, content: 交, SBCK: 吾半日之樂而委以吴王非其計楚王嘿然新序曰中行寅將軍召其大祝而欲加罪日子爲我祝辭令不精耶犧牲不肥澤也威儀不謹敬耶齋戒不潔淸也乃使吾國將亡何也祝簡對曰昔吾先君中行密子有車十乘不憂其薄憂其德義之不足也今之主君有車百乘不憂德義之薄唯患車之不足也且船車􅅚則賦斂厚賦斂厚則民怨而謗詛矣君苟以爲祝之有益於國則謗詛亦將爲亡矣一人祝之一國詛之一人祝不勝萬人詛國亡不亦冝乎祝其何罪中行子默然而慙風俗}
