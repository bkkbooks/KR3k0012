  - {type: variant, offset: 4026, length: 0, content: '', SBCK: 憐自云呪水飲人能差諸病病人就之者日有千數靈太后詔紿夜食事力使於西南療百姓北齊書日婁太后爲愽陵王納崔陵妹爲妃勑中使日好作法用勿使崔家􅀏人婚夕顯祖舉酒祝日新婦冝男孝順富貴陵奏日孝順出自臣門富貴}
  - {type: variant, offset: 4026, length: 0, content: '', krp: 憐自云呪水飲人能差諸病病人就之者日有千數靈太后詔紿夜食事力使於西南療百姓北齊書日婁太后爲愽陵王納崔陵妹爲妃勑中使日好作法用勿使崔家笑人婚夕顯祖舉酒祝日新婦冝男孝順富貴陵奏日孝順出自臣門富貴}
