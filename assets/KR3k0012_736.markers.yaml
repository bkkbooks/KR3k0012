  - {type: variant, offset: 4027, length: 1, content: 崛, SBCK: 由陛下尸子曰鮑叔爲􅁊公祝曰使公無忘在莒時管子無忘在魯時􅇞武子無忘車下時靈鬼志日石虎時有胡道人驅驢作估於外國深山中行有一絕㵎窈然無底行者恃山爲道魚貫相連忽有惡鬼牽之下入㵎中胡人急性便大嗔恚尋跡㵎中並祝誓呼諸􅀑神下遠忽然岀一平地城門外有一鬼大鏁項腳着大䥫桎鬼見道人便乞食日得食當與汝旣至門乃是鬼王所治前見王道人便自說驅驢載物爲鬼所奪尋跡至此須􅁷卽得其驢載物如故賈􅁩新書日湯見設網者四面張網而祝之日自天下者自四方至者皆羅我網湯日嘻盡之矣非桀其孰能如此合去三面教之日蛛蝥怍網今之人脩緒欲左者左欲右者右欲高者高欲下者下吾請受其犯命者民聞之日德及禽獸而況我乎於是下親其上􅀃苑日齊遣淳于髠到楚為人短小楚王甚薄之謂日齊無人耶而使子來子何長也對曰臣無長腰中七尺之劒欲斬無狀王日止吾但戲子耳卽與髠曰飮酒謂髠曰吾有仇在吴國子定能爲報之乎對曰來見道傍鄙民持一頭魚上田祝曰上得萬木下得千斛臣竊􅀏之以為禮薄而辭}
  - {type: page-break, offset: 4027, content: '', id: KR3k0012_SBCK_736-5a}
  - {type: page-break, offset: 4027, content: '', id: KR3k0012_SBCK_736-5b}
