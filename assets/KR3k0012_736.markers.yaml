  - {type: variant, offset: 3477, length: 4, content: 卑辭厚禮, WYG: 將為亡矣一人祝之一國詛之一人祝不勝萬人詛國亡亦宜乎祝其何罪中行子嘿然而慙風俗通論曰案明帝起居注東廵太山到榮陽有烏飛鳴乘車上虎賁王吉射之中而祝曰烏鳴啞啞引弓射洞右掖陛下壽萬嵗臣為二千石明帝賜錢二百萬世說曰劉伶嗜酒其婦止之伶祝曰天生劉伶一飲一斛五斛觧醒婦人之言慎不可聼蔡邕祖餞祝曰今嵗淑月日吉時良爽應孔加君當遷行神龜吉兆休氣煌煌著卦利貞天見三光鸞鳴雍雍四牡彭彭君既升輿道路開張風伯雨師洒道中央陽遂求福蚩尤群兵倉龍來轂白虎扶行朱雀道引𤣥武作侣勾陳居中厭伏四方君徃臨邦長樂無強符黄帝出軍訣曰昔者蚩尤揔政無道殘酷無已黄帝封之於涿鹿之野暴兵中原黄帝仰天歎息愀然而睡夣西王母遣人披𤣥狐之裘}
