  - {type: variant, offset: 1176, length: 174, content: 氣故見其兆徵徵應也告列子列子行泣報壺子列子鄭之隱士也壺子弟子報白者也壺子持以天壤言精神天之有也形骸地之有也死也自歸其本故曰持天壤矣名實不入機發於踵名爵號之名也實幣帛貨財之實不入者心不恤也機疾也謂命危殆不旋踵而至猶不怨懼者也壺子視之死生亦齊齊等也尸子曰齊有田果者命狗曰富命子為樂將欲祭也狗入室果呼之曰富出巫曰不祥也家果大禍長子死哭曰樂乎而不似悲也呂氏, SBCK: 吳越}
  - {type: variant, offset: 1176, length: 174, content: 氣故見其兆徵徵應也告列子列子行泣報壺子列子鄭之隱士也壺子弟子報白者也壺子持以天壤言精神天之有也形骸地之有也死也自歸其本故曰持天壤矣名實不入機發於踵名爵號之名也實幣帛貨財之實不入者心不恤也機疾也謂命危殆不旋踵而至猶不怨懼者也壺子視之死生亦齊齊等也尸子曰齊有田果者命狗曰富命子為樂將欲祭也狗入室果呼之曰富出巫曰不祥也家果大禍長子死哭曰樂乎而不似悲也呂氏, WYG: 吳越}
