  - {type: variant, offset: 3100, length: 154, content: 劭密使人害天而慶國謂往來唯有二人天興既死慮將見及乃以白上上驚惋即收鸚鵡家得劭濬手書皆呪詛巫蠱之言得所埋上形像於宮內道育叛亡捕之不得上誥責劭濬劭濬唯陳謝而已道育變服為尼逃匿東宮濬往京口又以自隨或出止親人張旿家後濬當鎮江陵復載道育還東宮欲將西上有告上云京口張旿家有一尼服食出入征止內似嚴道育上使掩得二婢云道育隨征, WYG: 中流}
  - {type: variant, offset: 3104, length: 853, content: 害天而慶國謂往來唯有二人天興既死慮將見及乃以白上上驚惋即收鸚鵡家得劭濬手書皆呪詛巫蠱之言得所埋上形像於宮內道育叛亡捕之不得上誥責劭濬劭濬唯陳謝而已道育變服為尼逃匿東宮濬往京口又以自隨或出止親人張旿家後濬當鎮江陵復載道育還東宮欲將西上有告上云京口張旿家有一尼服食出入征止內似嚴道育上使掩得二婢云道育隨征北還都上惆悵驚惋劭弒逆後李武平亂不見傳國璽問劭云在嚴道育處就取得之道育鸚鵡並都街鞭殺於石頭四望山焚其尸揚灰于江梁書曰蕭紀舉岷蜀之眾由外水而下湘東王命方士伯人於長州苑板上畫紀形像親下鐵符釘于支體以厭之陳書曰後主陰令人告長沙王叔堅厭魅刻木為偶人衣以道士衣施機開能拜跪晝夜於星月下醮之祝詛於上又令上書告其事案驗令實後主召叔堅囚于西省後赦之免所居官北齊書曰初立太子恒母弘德夫人穆氏為左皇后大赦國內初斛律后之廢也陸令萱欲以穆氏代之祖挺請立胡昭儀為后胡太后亦卑辭厚禮以求令萱以胡氏寵幸方隆不得己而白齊主立之然意在穆氏每私謂齊主云豈有男為太子而身為婢妾乃求左道行厭蠱之術旬朔之閒胡氏遂即精神恍惚言笑無恒齊主漸畏惡之於是立穆氏隋書曰獨孤陁性好左道其外祖母高氏先事貓鬼己殺其男郭沙羅因轉入其家上微聞而不信會獻皇后及楊素妻鄭氏俱有疾召醫視之皆曰此猫鬼疾上以陁后之異母弟陁妻楊素之異母妹由是意陁所為陰令其兄穆以情喻之上又避左右諷陁陁言無有上不悅左遷出怨言上令高熲蘇威大理正皇甫孝緒大理丞楊遠等推案之陁婢徐阿尼言本從陁母家來常事猫鬼每以子日夜祀之言子者鼠也其猫鬼每殺人者所死家財物潛移於蓄猫鬼家陁嘗從家中索酒其妻曰無錢可酤陁因謂阿尼曰可令猫鬼向越公家使我足錢阿尼便呪之居數日猫鬼向素家後上初從并州還陁於園中謂阿尼曰可令猫鬼向皇后所使多賜吾物阿尼復呪之遂入宮中楊遠乃於門下外省遣阿尼呼猫鬼阿尼於是夜中置香粥一盆以匙扣而呼曰猫女可來無住宮中久之阿尼色正青若被牽曳者云猫鬼己至上以事下公卿寄章公牛弘曰妖由人興殺其人可以絕矣上令以犢車載陁夫妻將賜死於其家陁弟整詣闕求哀於是免陁死除名以其妻楊氏為尼先是人訟其母為人猫鬼所殺者上以為妖妄怒而遣, SBCK: 捶}
