  - {type: variant, offset: 4200, length: 1, content: 大, SBCK: 四隣不復有屋舎籬障有妾死已乆亦見其形與語如平生念思方信道術又曰李阿者行道逢奔車阿兩脚中車腳卽折弟}
  - {type: variant, offset: 4200, length: 1, content: 大, krp: 四隣不復有屋舎籬障有妾死已乆亦見其形與語如平生念思方信道術又曰李阿者行道逢奔車阿兩脚中車腳卽折弟}
  - {type: variant, offset: 4202, length: 4, content: 勇廢秀甚, SBCK: 古弼見之驚怖阿須臾取斷腳相續如故也淮南萬畢術曰慈石提棊取雞磨針鐵以相和慈石棊頭置局上自相投也又日鵲腦令人相思取雌雄鵲各一燔之四通道丙寅日與人共飲酒置腦酒中則相思也又曰老槐生火膠撓水則淸弊箕止醎取箕以内醬中鹹着箕矣又日首澤浮針取頭中垢以塗針塞其孔置水卽浮又日燒􅊁入山則虎豹自遠惡其􅆨也又日赤布在戸婦人留連取婦人月事布七月七日燒爲􅁅置楣上卽}
  - {type: page-break, offset: 4202, content: '', id: KR3k0012_SBCK_736-8b}
  - {type: variant, offset: 4202, length: 4, content: 勇廢秀甚, krp: 古弼見之驚怖阿須臾取斷腳相續如故也淮南萬畢術曰慈石提棊取雞磨針鐵以相和慈石棊頭置局上自相投也又日鵲腦令人相思取雌雄鵲各一燔之四通道丙寅日與人共飲酒置腦酒中則相思也又曰老槐生火膠撓水則淸弊箕止醎取箕以内醬中鹹着箕矣又日首澤浮針取頭中垢以塗針塞其孔置水卽浮又日燒角入山則虎豹自遠惡其臭也又日赤布在戸婦人留連取婦人月事布七月七日燒爲灰置楣上卽}
