  - {type: variant, offset: 4039, length: 1, content: 嘗, SBCK: 論曰案明帝起居注東巡太山到滎陽有烏飛鳴乘車上虎賁王吉射之中而祝曰烏鳴啞啞引弓射洞右腋陛下壽萬歲臣爲二千石明帝賜錢二百萬世􅀃曰劉靈嗜酒其婦止之靈祝曰天生劉靈以酒爲名一飲一斛五㪷解酲婦人之言愼不可聽蔡邕祖餞祝曰}
