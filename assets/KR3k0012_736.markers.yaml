  - {type: variant, offset: 1144, length: 0, content: '', SBCK: 何神靈而行而止殺牲以賽神靈雨則不止鳴鼓攻之朱縁繩索而䝱之史記曰楚大發兵如齊齊王使淳于髠之趙請救兵遺金百斤車馬十駟淳子髠仰天大􅀏冠纓索絕王曰先生少之髠曰何敢王曰笑豈有􅀃乎髠曰今者臣從東方來見道傍有禳田者操一豚蹄酒一盂而祝曰甌窶满篝甌窶猶桮樓}
