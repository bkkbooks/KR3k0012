  - {type: variant, offset: 4044, length: 4, content: 為厭勝法, SBCK: 披􅀇狐之裘以符受之曰太一在前天一備後得兵契信戰則尅矣黄帝悟思其符立壇請而祈之祭以太牢用求神祐須􅁷􅀇􅀛巨鼇銜符出從水中置壇中而去黄帝再拜稽首親自受符視之乃所夢也於是黃帝佩之以攻卽日擒蚩尢龍魚河圖曰􅀇女岀兵符付黄帝制蚩尢葛仙公別傳曰仙公丹書符投江中順流而下次又投一符逆流而上次投一符不上不下停住水中而向二符皆還就之神仙傳曰漢章帝問劉馮殿下}
