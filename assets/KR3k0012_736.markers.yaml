  - {type: variant, offset: 1135, length: 2, content: 棄此, SBCK: 克敵是天益其疾也難將作矣愛我者唯祝我使我速死無及於難范氏之福也六月戊辰士爕卒又曰宋皇國父爲太宰爲平公築臺妨於農功子罕請俟農功之畢公弗許築者謳之曰澤門之晢實興我役邑中之黔實慰我心子罕聞之親執朴以行築者而抶其不勉者曰吾儕小人皆有闔廬以避燥濕寒暑今君爲一臺而不速成何以爲役謳者乃止或問其故子罕曰宋國區區而有詛有祝禍之本也又襄二十七年曰楚子木問於趙孟曰范武子之德何如對曰夫子之家事治言於晉國無隱情其祝史陳信於􅀑神無愧辭又曰齊侯疥遂痁期而不瘳諸侯之賔問疾者多在梁丘據與裔款言於公曰吾事􅀑神豐於先君有加矣今君疾病爲諸侯憂是祝史之罪也諸侯不知其謂我不敬君盍誅於祝固史嚚以辭賔公􅀃先告晏子曰日宋之盟屈建問范㑹之德於趙武趙武曰夫子家事治言於晉國竭情私其祝史祭祝陳信不媿其家事無猜其祝史不祈建以語康王曰神人無怨冝夫子之光輔五君以爲諸侯主也公曰據與款謂寡人能事􅀑神欲誅於祝史子稱是語何對曰若有德之君內外不廢上下無怨動無違事其祝史薦故信媿心矣是以􅀑神用饗國受其福禄祝史與焉}
  - {type: page-break, offset: 1135, content: '', id: KR3k0012_SBCK_736-1b}
