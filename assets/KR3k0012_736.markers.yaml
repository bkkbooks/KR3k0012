  - {type: variant, offset: 1904, length: 938, content: 禱求福利言從卓求布倉卒無布有手巾言曰可用耳取便書巾上如作兩口一口大一口小相累以舉謂卓曰慎此也卓後為呂布所殺後人則知況呂布也又曰大元年中臨海有巫李不知所由來能卜相作水符治病多愈亦禮佛讀經語人云明年天下當大疫此境尢劇又二紀之後此邦之西北大郡殭尸橫路時汝南周叔道罷臨海令權停家巫云周令今去不宜南行必當暴死便指北山曰後二十日此山應有異則其事彰也後十餘日大石夜頹落百丈碎磕若雷庾揩為臨海太守過詣周殷饌作伎至夜庾還舫中天曉庾自披屏風呼叔道何癡不起左右撫看氣絕久矣到明年縣內病死者數千又曰巴丘縣有巫師舒禮晉永昌元年病死土地神將送詣太山俗人謂巫師為道人也人過禮舍門前土地神問吏此是何等舍門吏曰道人舍土地神曰是人亦是道人便以相付禮入門見閒瓦皆縣竹簾自然床榻男女異處有誦經者唱偈者然飲食快樂不可言禮文書名己至太山門而又身不到推入土地神云道見數千閒瓦屋即問吏言女道人即以付之於是遣神即錄取禮觀未遍見有一人八手四眼捉金杵遂欲撞之便怖走還出門神己在門迎捉送太山太山府君問禮卿在世閒昔何所為禮曰事一萬六千神為人解除祠祀或殺牛犢豬羊鷄鴨府君曰汝罪應上熱熬便牽著熬所見一物牛頭人身捉鐵義義禮著熬上宛轉身體燋爛求死不死一宿二日府君問主者禮壽命應盡為頓奪其命校錄籍餘筭八年乃命將錄來牛頭復以鐵義義著熬邊府君曰今遣卿歸終畢餘笇勿後殺生淫祠禮乃還活不復為巫師江氏家傳曰江統為太子洗馬諫愍懷太子曰臣聞土者民之主用播殖築室營都建邑皆有明制著在經典而無禁忌犯害之文唯末俗小巫乃有此言巫書乃禁入地三尺有四時方面不皆禁也竊見禁土令不得繕治壇垣動移屋瓦臣等以為此違典義不可為永制兩京記曰宣政門內日宣政殿初成每見數十騎馳突出沒高宗使巫祝劉門奴問其所以鬼云我漢楚王戊太子死葬於此門奴曰按漢書戊與七國反誅死無後焉得葬此鬼曰我當時入朝以路遠不隨後坐病死天子於此葬我漢書自遺誤耳門奴因宜詔欲為改葬鬼曰出入誠不安改葬幸甚天子歛我玉魚一雙幸勿奪之及發掘玉魚宛然棺柩略盡又曰尚書省左司郎廳事後有古冢高宗武后閒郎中屢有暴死者聖曆中有巫者見尚書郎鄭默冢發之得銘誌符驗棺柩尚在并有瓦木雜器鄭氏子孫相率改葬厭蠱史記曰江充見上年老恐晏駕後為太子所誅因奏上言曰疾祟在巫蠱以充為使者治巫蠱充將胡巫掘地求木偶至遂掘得蠱於太子宮得桐木人太子懼不能自明收充自臨斬之, SBCK: ''}
