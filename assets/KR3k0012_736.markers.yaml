  - {type: variant, offset: 1140, length: 0, content: '', SBCK: 蕃祉老壽者爲信君使也其言於􅀑神其適遇淫君內外傾邪上下怨疾動作辟違從欲厭私髙臺深池撞鍾舞女斬刈民力輸掠其聚以成其違不恤後人暴虐淫縱肆行非度無所還忌不思謗言不憚􅀑神神怒民痛無悛於心其祝史薦信是言罪也其蓋失數美是矯誣也進退無辭則虛以求媚是以􅀑神下饗其國以禍之祝史與焉所以夭昏􅀌疾者爲暴君使也其言􅆫嫚於􅀑神公曰然則若之何對日不可爲也言非誅祝史所能治山林之木衡鹿守之澤之萑蒲舟鮫守之藪之薪蒸虞候守之海之鹽蜃祈望守之縣鄙之人入從其政福介之􅀜暴征其私丞嗣大夫强易其賄布常無藝徵歛無度宫室日更淫樂下違內寵之妾肆奪於市外寵之臣僣令於鄙私欲養求不給則應人民苦病夫婦皆詛祝有益也詛亦有損聊攝以東姑尢以西其爲人也多矣雖其善祝豈能勝億兆人之詛君若誅於祝史脩德而後可公􅀃使有司寛政毀關去禁薄歛責己又曰衛太子禱日曾孫蒯聵敢昭告皇祖文王烈祖康叔文祖襄公鄭勝亂從晉午在難不能治亂使鞅討之蒯聵不敢自佚備持矛焉敢告無絶筋無折骨無面傷以集大事無作三祖羞大命不敢請佩玉不敢愛韓詩外傳日齊􅁊公至海丘見封人日尒何爲者也對日臣海丘封人也􅁊公日叟年幾何日臣八十有三矣􅁊公日美哉壽也叟盍爲寡人壽也對日野臣不知爲君王之壽􅁊公日盍以叟之壽祝寡人封人奉觴再拜日使吾君罔壽金玉之賤人民是寶􅁊公日善哉祝乎叟盍復祝乎封人日使吾君好學而不惡問賢者在側諫有得入􅁊公日善哉祝乎封人日無使羣臣百姓得罪於吾君亦無使吾君得罪於羣臣百姓􅁊公不恱曰此言非夫前二言之善也叟其革之封人瀾然涕下日願與吾君}
  - {type: page-break, offset: 1140, content: '', id: KR3k0012_SBCK_736-2b}
  - {type: page-break, offset: 1140, content: '', id: KR3k0012_SBCK_736-3a}
  - {type: variant, offset: 1140, length: 0, content: '', WYG: 蕃祉壽考者為信君使也其言忠信於鬼神其適遇滛君外内頗邪上下怨疾動作避違從欲厭私髙臺深池撞鐘舞女斬刈民力輸掠其聚以成其違不恤後人暴虐滛從肆行非度無所還忌不思謗讟不憚鬼神神怨民痛無悛於心其祝史薦信是言罪也其蓋失數羙是矯誣也進退無辭則虛以求媚是以鬼神不饗其國以禍之祝史與焉所以夭昏孤疾者為暴君使也其言僣嫚於鬼神公曰然則若之何對曰不可為也言非誅祝史所能治山林之木衡鹿守之澤之萑蒲舟鮫守之藪之薪蒸虞候守之海之塩蜃祈望守之縣鄙之人入從其政偪介之關暴征其私承嗣大夫強易其賄布常無藝徵歛無度宫室日更滛樂不違内寵之妾肆奪於市外寵之臣僣令於鄙私欲養求不給則應人民苦病夫婦皆詛祝有益也詛亦有損聊攝以東姑尤以西其為人也多矣雖其善祝豈能勝億兆人之詛君若欲誅於祝史脩德而後可公說使有司寛政毁關去禁薄歛已責又曰衞太子禱曰曾孫蒯聵敢昭告皇祖文王烈祖康叔文祖襄公鄭勝從亂晉午在難不能治亂使鞅討之蒯聵不敢自佚備持矛焉敢告無絶筋無折骨無面傷以集大事無作三祖羞大命不敢請佩玉不敢愛韓詩外𫝊曰齊桓公至海丘見封人曰爾何為者也對曰臣海丘封人也桓公曰叟年幾何曰臣八十有三矣桓公曰羙哉壽也叟盍為寡人壽也對曰野臣不知為君王之壽桓公曰盍以叟之壽祝寡人封人奉觴再拜曰使吾君固壽金玉之賤人民是寶桓公曰善哉祝乎叟盍復祝乎封人曰使吾君好學而不怠賢者在側諫者得入曰善哉祝乎封人曰無使羣臣百姓得罪於吾君亦無使吾君得罪於羣臣百姓桓公不悅曰此言非夫前二言之善也叟其革之封人瀾然涕下曰願與吾}
