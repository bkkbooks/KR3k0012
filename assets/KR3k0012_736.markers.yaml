  - {type: variant, offset: 1384, length: 381, content: 死生子痾猶疑耶仲曰死生命也病是天也君不守其本而恃巫彼將以此無不為也及公病常之巫曰公以某日薨易牙等作亂公嘆曰死若有知何面目以見仲父蒙面而死山海經曰大荒中有靈山巫咸巫即巫朌巫彭巫姑巫真巫禮巫搥巫謝巫羅十人從此升降百樂爰在國語曰古者民神之不能雜擇民之精爽不攜貳者而又能齊肅忠正其智能上下比義其聖能光遠宣朗其明能光照之其聰能聽達之如是則神明降之在女曰巫在男曰覡又曰厲王虐國人謗王厲王恭王之曾孫夷王之子邵公告曰民不堪命矣邵公邵康公之後穆公虎也為王卿士言人不堪暴虐之政命也王怒得衛巫使監謗者衛巫衛國之巫監察之也巫有神靈有謗必知也以告則殺之巫言謗王王則殺之國人莫敢言道路以目王喜告邵公曰吾能弭謗矣乃不敢言弭止離騷曰欲從靈氛之吉占兮心猶豫而狐疑巫咸將夕降兮懷椒糈私呂反而要之椒者香物也所以降精神來所以享神東方朔傳曰武帝時有神雀下丞相御史中丞二千石諫議臣博士皆上壽東方朔獨不賀帝曰, SBCK: 吴}
  - {type: variant, offset: 1384, length: 382, content: 死生子痾猶疑耶仲曰死生命也病是天也君不守其本而恃巫彼將以此無不為也及公病常之巫曰公以某日薨易牙等作亂公嘆曰死若有知何面目以見仲父蒙面而死山海經曰大荒中有靈山巫咸巫即巫朌巫彭巫姑巫真巫禮巫搥巫謝巫羅十人從此升降百樂爰在國語曰古者民神之不能雜擇民之精爽不攜貳者而又能齊肅忠正其智能上下比義其聖能光遠宣朗其明能光照之其聰能聽達之如是則神明降之在女曰巫在男曰覡又曰厲王虐國人謗王厲王恭王之曾孫夷王之子邵公告曰民不堪命矣邵公邵康公之後穆公虎也為王卿士言人不堪暴虐之政命也王怒得衛巫使監謗者衛巫衛國之巫監察之也巫有神靈有謗必知也以告則殺之巫言謗王王則殺之國人莫敢言道路以目王喜告邵公曰吾能弭謗矣乃不敢言弭止離騷曰欲從靈氛之吉占兮心猶豫而狐疑巫咸將夕降兮懷椒糈私呂反而要之椒者香物也所以降精神來所以享神東方朔傳曰武帝時有神雀下丞相御史中丞二千石諫議臣博士皆上壽東方朔獨不賀帝曰群, WYG: 吳羣}
