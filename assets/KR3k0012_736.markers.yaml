  - {type: variant, offset: 4043, length: 0, content: '', SBCK: 光鸞鳴噰噰四牡彭彭君旣升輿道路開張風伯雨師灑道中央陽遂求福蚩尢辟兵倉龍夾轂白虎扶行朱雀道引􅀇武作侣勾陳居中厭伏四方君往臨􅀖長樂無彊符黄帝岀軍訣日昔者蚩尢揔政無道殘酷無己黄帝討之於涿鹿之野暴兵中原黃帝仰天歎息愀然而睡夢西王母遣}
