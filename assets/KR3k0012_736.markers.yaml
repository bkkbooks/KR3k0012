  - {type: variant, offset: 228, length: 762, content: 之事或命巫媼乘駟行郡縣為厭勝之術有祅人王璵遂以左道為相代宗亦篤信之凡所脩築動牽禁忌而奸人黎幹得以左道尹京又內集眾工編剌珠繡為御衣既成而焚之為穰除法且無虛月又曰永太中迴紇首領羅達干等率其眾詣涇陽請降郭子儀許之因去甲冑與之相見既而子儀先執杯合胡祿都督請呪子儀呪曰大唐天子萬萬歲迴紇可汗亦萬萬歲兩國將相亦萬萬歲若起負心違背盟約者身死陣前家口屠戮合胡祿都督等失色及杯至即譯日如令公盟約皆喜曰初發本部來日將巫師兩人來云此行大安穩然不與唐家兵馬鬥見一大人即歸今日領兵見令公令公不為疑脫去衣甲單騎相見誰有此心膽是不戰鬥見一大人巫師有徵矣歡躍久之子儀撫其背首領等分纏頭綵以賞巫師又曰朔方先鋒兵馬使南陽郡王白元光與迴紇合兵於涇州靈臺縣西共破吐蕃等十萬餘眾初白元光等到靈臺縣西探知賊勢為月明思少陰晦迴紇使巫師便致風雪及遲明戰吐蕃盡寒凍弓矢皆廢披氈徐進元光與迴紇隨而殺之又曰大曆九年七月久旱是日澍雨豐霈初京兆尹黎幹以旱故祈雨於朱雀街造土龍悉召城中巫覡更舞觀者駭笑又曰房孺復故太尉琯之孽子年二十淮南陳少由辟為從事多招陰陽巫覡令楊言已身過三十必為宰相又曰貞元中昭義節度使李抱真以久疾為巫祝所惑請降官爵以穰之章奏凡七上詞甚切至上難違之故自司空而授僕射又曰田仁會為右金吾將軍所得祿俸估外有餘輒以納官時人譏其邀名仁會強力病惡晝夜巡警絲毫越法無不立發躬自閱罰略無寬者京城貴賤咸畏憚之時有女巫蔡娘子以鬼道惑眾自云能令死者復生市里以為神明仁會驗其假妄奏請徙邊上曰若死者不活便是妖妄若死者得生更是罪過不可容也竟依仁會所奏又曰李德裕為浙西觀察使德裕壯年得位銳於報政凡舊俗之害民者悉革其弊江嶺之閒信巫祝惑鬼怪有父母兄弟厲疾者舉室棄之而去德裕欲變其風擇鄉人之有識者諭之以言繩之以法數年之閒弊風頓革屬郡祠廟按方志前代名臣賢后則祠之四郡之內除淫祠一二千所又罷私邑山房一千四百, SBCK: 示作}
