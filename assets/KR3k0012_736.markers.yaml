  - {type: variant, offset: 3609, length: 543, content: 疾召醫視之皆曰此猫鬼疾上以陁后之異母弟陁妻楊素之異母妹由是意陁所為陰令其兄穆以情喻之上又避左右諷陁陁言無有上不悅左遷出怨言上令高熲蘇威大理正皇甫孝緒大理丞楊遠等推案之陁婢徐阿尼言本從陁母家來常事猫鬼每以子日夜祀之言子者鼠也其猫鬼每殺人者所死家財物潛移於蓄猫鬼家陁嘗從家中索酒其妻曰無錢可酤陁因謂阿尼曰可令猫鬼向越公家使我足錢阿尼便呪之居數日猫鬼向素家後上初從并州還陁於園中謂阿尼曰可令猫鬼向皇后所使多賜吾物阿尼復呪之遂入宮中楊遠乃於門下外省遣阿尼呼猫鬼阿尼於是夜中置香粥一盆以匙扣而呼曰猫女可來無住宮中久之阿尼色正青若被牽曳者云猫鬼己至上以事下公卿寄章公牛弘曰妖由人興殺其人可以絕矣上令以犢車載陁夫妻將賜死於其家陁弟整詣闕求哀於是免陁死除名以其妻楊氏為尼先是人訟其母為人猫鬼所殺者上以為妖妄怒而遣之及此詔誅行猫鬼家陁未幾而卒又曰滕王瓚子綸當文帝世子不自安煬帝即位尢被猜忌綸憂懼呼術者王姿問之姿荅曰王相祿不凡滕即騰也此字足為善應有沙門惠恩崛多等頗善占候綸每與交通嘗令此三人為厭勝法有人告綸怨望呪詛帝令黃門侍郎牛弘窮驗之又曰秦王俊好內妃崔氏性妒甚不平之遂於瓜中進毒俊由是遇疾篤含銀銀色異為遇蠱未能白遣使奉表陳謝帝責以失德薨帝哭之數聲而已曰晉王前送一鹿我令作脯擬賜秦王王亡可置靈坐之前心己許之, WYG: 厨供}
