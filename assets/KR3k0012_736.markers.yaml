  - {type: variant, offset: 4487, length: 1, content: 愈, WYG: 令記其日時客後有從蜀都來云是日大火有黑雲卒從東起湏臾大雨火遂得㓕於是天下稱其術藝邵氏家𫝊曰邵信臣為少府南陽遭火燒數萬人信臣時在丞相匡衡坐心動含酒東向潄之遭火處見雲西北來冥晦大雨以㓕火雨中酒香桂陽列仙𫝊曰成武丁正旦大㑹以酒沃廷中有司問其故對曰臨武縣失火以酒救之遣騐果然神仙傳曰欒巴為尚書正旦㑹得酒西南潄云成都失火作雨救之後使至果如其言抱朴子曰外國方士能祝龍臨淵禹歩龍浮出長數十丈方士吹之則縮短數寸掇取著壺中輙四五寸以水養之餘國少雨屢旱者輙賫一龍徃賣之一龍千金取頭著淵中即興雲雨也又曰廬江太守華念思就道士學㣲視術未滿百日夜見天文及四鄰不復有屋舎籬障有妾死已久亦見其形與語如平生念思方信道術又曰季阿者行道逢奔車阿}
