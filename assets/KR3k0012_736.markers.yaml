  - {type: variant, offset: 4154, length: 1, content: 虧, SBCK: 發此函眞行果有一少年御一車牛給眞并送酒食即到舅家以凾著衣箱中眞弟不知發函函有紙畫車牛一人御之因失車牛所在列仙傳曰㳙子釣於河澤得符於鯉魚腸中續捜神記曰吳猛字世雲有道術狂風暴起猛擲符上便有一飛鳥接符去須􅁷風靜人問之荅云南湖有遭此風者兩舫人是道士呼天求救故符以止風抱朴子曰劉安君用藥及符能令人含􅀏則爲婦人蹙面則爲老夫踞地則爲小兒葛洪神仙傳曰葛􅀇見賣大魚者謂曰暫煩此魚往河伯處魚主日魚已死􅀇日無苦乃丹書􅁓內魚口中投水有頃魚化禁而飛術後漢書曰郭憲字子横建武七年伐張堪爲光禄勳從駕南郊憲在位忽乃向東北含酒三噀埤蒼日噀也音執法奏爲不敬詔問其故憲對曰齊國失火故以厭之比後齊果有火災與郊同日又曰樊英字季齊善風角筭河洛七緯常有暴風從西方來起英謂學者日成都市火甚盛因含水西向漱之乃令記其日時客後有從蜀都來云是日大火有黑雲卒從東起須臾大雨火遂得滅於是天下稱其術藝邵氏家傳日邵}
  - {type: page-break, offset: 4154, content: '', id: KR3k0012_SBCK_736-7b}
  - {type: variant, offset: 4154, length: 79, content: 虧信帝及后往視見大蜘蛛大蛷螻上音求下音搜從柩頭出之不見窮之知妃所為也又曰蜀王秀漸奢侈違法度及大子勇廢秀甚不平皇太子終恐為後患陰令楊素求其罪狀而譖之又令楊素蘇威, WYG: 發此凾真行果有一少年御一車}
