  - {type: variant, offset: 4156, length: 3, content: 帝及后, SBCK: 臣爲少府南陽遭火燒數萬人信臣時在丞相匡衡坐心動含酒東向漱之遭火處見雲西北來冥晦大雨以滅火雨中酒香桂陽列仙傳曰成武丁正且大㑹以酒沃廷中有司問其故對曰臨武縣失火以酒救之遣騎果然神仙傳曰欒巴爲尙書正旦㑹得酒西南漱云成都失火作雨救之後使至果如其言抱朴子曰外國方士能祝龍臨淵禹步龍浮岀長數十丈方士吹之則縮短數寸掇取著壼中輒四五寸以水餋之餘國少雨屢旱者輒賫一龍}
