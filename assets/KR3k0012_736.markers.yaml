  - {type: variant, offset: 3476, length: 0, content: '', WYG: 為愽陵王納崔㥄妺為妃勅中使曰好作法用勿使崔家笑人婚夕顯祖舉酒祝曰新婦宜男孝順富貴㥄奏曰孝順出自臣門富貴恩由陛下尸子曰鮑叔為桓公祝曰使臣無忘在莒時管子無忘在魯時寗武子無忘車下時靈鬼志曰石虎時有胡道人驅驢作估于外國深山中行有一絶澗窈然無底行者恃山為道魚貫相連忽有惡鬼牽之下入澗中道人急性便大嗔惡尋跡澗中惡鬼祝誓呼諸鬼神下遠忽然出一平地城門外有一鬼大鏁項脚著大桎鬼見道人便乞食曰得食當與汝既至門乃是鬼王所治前見王道人便自說驅驢載物為鬼所奪尋跡至此湏臾即得其驢載物如故賈誼新書曰湯見設􅃠者四面張􅃠而祝之曰自天下者自四方至者皆羅我網湯曰嘻盡之矣非桀其孰能如此令去三面教之曰蛛蝥作網今之人脩緒欲左者左欲右者右欲髙者髙欲下者下吾請受其犯命者民聞之曰德及禽獸而况我乎於是下親其上說苑曰齊遣淳于髠到楚為人短小楚人甚薄之謂曰齊無人耶而使子來子何長也對曰臣無長腰中七尺之劔欲斬無狀王曰止吾但戯子耳即與髠共飲酒謂髠曰吾有􅄷在吳國子定能為報之乎對曰來見道旁郢民持一頭魚上田祝曰上得萬木下得千斛臣竊笑之以為禮薄而辭多祭輕而望重王今與吾半日之樂而委以吳王非其計楚王嘿然新序曰寅中行將軍召其大祝而欲加罪曰子為我祝辭令不精也犧牲不肥澤也威儀不謹敬耶齊戒不潔清耶乃使吾國將亡何也祝簡對曰昔吾先君中行宻子有車十乘不憂其薄憂其德義之不足也今之主君有車百乘不憂德義之薄惟患車之不足也且舩車飭則賦歛厚賦歛厚則民怨而謗詛矣君苟以為祝之有益於國則謗詛}
