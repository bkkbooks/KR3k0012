  - {type: variant, offset: 1141, length: 2, content: 身弗, SBCK: 言之此言乃失前二言之上也臣聞子得罪於父母可因姑姊妹而謝也父乃赦之臣得罪於君可因便僻之左右而謝也君乃赦之昔桀得罪於湯紂得罪於武王此君得罪於臣也至今未有爲謝者公日善扶而載之自御以歸禮外篇成王冠周公使祝雍日辭達而已勿多也祝雍日近於民遠於佞近於義嗇於時惠於財任賢使能陛下摛顯先帝之光耀以承皇天之嘉禄欽順仲春之吉日遵並大道􅀖域康阜萬福之休靈始加昭明之元服推遠邪佞之忠􅀪積文武之龍德肅勤高祖之淸廟六合之内靡不蒙德永永與天無極又日大夫成群立社祝日今某月日君爲某立社社祭上而主陰氣也五穀用成萬民以生敢用肥豚嘉􅂼淸酒敬致大神自今日已來祈請止雨惟靈是聽子孫眉壽萬神含靈止雨祝曰天生五穀以餋人民今天雨不止用傷五穀}
  - {type: page-break, offset: 1141, content: '', id: KR3k0012_SBCK_736-3b}
  - {type: variant, offset: 1141, length: 2, content: 身弗, WYG: 言之此言乃夫前二言之上也臣聞臣得罪於君可恩便僻之左右而謝也君乃赦之昔桀得罪於湯紂得罪於武王此君得罪於臣也至今未有為謝者公曰善扶而載之自御以歸禮外篇成王冠周公使祝雍曰辭達而已勿多也祝雍曰近於民遠於佞近於義嗇於時惠於財任賢使能丕顯先帝之光耀以承皇天之嘉禄欽順仲春之吉日遵並大道邦域康阜萬福之休靈始加昭明之元服推遠邪佞之志𢎞積文武之龍德肅勤髙祖之清廟六合之内靡不䝉德永永與天無極又曰百姓成羣立社祝曰今某月日君為某立社社祭土而主隂氣也五穀用成萬民以生敢用肥豚嘉蔬清酒敬致大神自今日以來福請雨止惟靈是聼子孫眉壽萬神含靈止雨祝曰天生五穀以養生民今天雨不止傷五穀}
