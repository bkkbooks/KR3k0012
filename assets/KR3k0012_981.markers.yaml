  - {type: variant, offset: 9, length: 23, content: 葵蘆萉萉宜為菔蘆菔蕪菁屬紫華大根俗呼雹葵菔字或, SBCK: 麝父麋足郭璞注日脚似􅍪臍有香許慎􅀃文曰麝如小麋臍有香從鹿射聲黒色也義熈起居注曰倭國獻貂皮人參等詔賜細笙麝香齊書曰東昏侯鑿金蓮花帖地令潘妃行其上曰此歩歩蓮花也塗地皆以麝香唐書曰波斯國人皆以麝香如􅂫塗􅂡􅀧額及於耳鼻用以爲敬抱朴子曰辟虵法入山以麝香丸著足爪中皆有効又麝香及野猪皆啖蛇故以壓之也又}
  - {type: variant, offset: 9, length: 4, content: 葵蘆萉萉, WYG: 麝父麕足許愼説文曰麝如小麋臍有香從鹿射聲黒色麞也義熈起居注曰倭國獻貂皮人參等詔賜細笙麝香齊書曰東昏侯鑿金蓮花貼地令潘妃行其上曰此歩歩蓮花也塗地皆以麝香唐書曰波斯國人皆以麝香和蘇塗鬚㸃額及於耳鼻用以為敬抱朴子曰辟蛇法入山以麝香丸著足爪中皆有効又麝香及野猪皆啖蛇故以壓之也又作筆墨法曰作墨用雞子白眞珠麝香合以和墨}
