  - {type: variant, offset: 3, length: 3, content: 五蘆服, WYG: 一香麝葳香欝金雞舌龍腦雀頭香書曰至治馨香感于神明左傳曰黍稷非馨馨者香之遠聞也説文曰香芳也吳志曰士爕兄弟並為列郡雄長一州車騎滿道胡人夾轂焚香者常有數千世説曰桓車騎時有陳莊者入武當山學道所居恒有白烟香氣間出續晉安帝紀曰王鎮惡亡經日魏興太守郭宣之晝坐忽見東莊來因叙舊事相對悲泣勸營功德去後郡内悉聞香狀如芳烟流散晉書杜太后傳曰海西公之世太后復臨朝稱制桓温之廢海西公也太后方在佛屋燒香内侍啓云外有急奏太后出尚倚户前視奏宋書曰范􅁮撰和香方其序曰麝本多忌過分必害沉實易和盈斤無傷零藿虛燥詹唐黏濕甘松蘇合安息欝金􅎄和羅之屬並被珍於外國無取於中土又􅀥膏昏鈍甲煎淺俗非唯無􅂇於馨烈尤當彌增於有疾也所言悉以比類朝士麝本多忌比庾仲文零藿虗燥比何尚之詹唐黏濕比沈演之􅀥膏昏鈍比羊𤣥保甲煎淺俗比徐湛之甘松蘇合比惠琳道人沉實易和以自比也南史曰韓懐明上黨人也客居荆州十嵗母患尸疰毎發輙危殆懐明夜于星下稽顙祈禱時寒甚切忽聞香氣空中有人曰童子母須臾永差無勞自苦未曉而母平復梁書曰庾詵元尊釋教宅内立道場環繞禮懴六時不息誦法華經毎日一遍後夜中忽有一道人自稱願公容止甚異呼詵為上行先生授香而去又曰梁武帝祀南郊先是一日景夜南郊令解除之等到郊所履行忽聞異香隨風而至及将行事奏樂迎神有異光圍滿壇上朱紫黄白雜沓食頃而㓕又曰王琛本無令問為太子中舍人謟事何敬容為其階前種植香草脱履躡其草根敬容意以為善晉書曰賈充以韓壽為掾毎㑹聞壽有異香氣是外國所貢一着衣經月不歇充計武帝所賜惟已及陳騫他家無此香嫌壽與已女通考問左右婢具以實對充以女妻壽壽時未婚金樓子曰齊東昏以錦石為殿内開千門萬戸又有和香香氣紛馥聞之使人歡悦生諸雅態兼令睡眠又曰昔玉池國有民面醜婦國色鼻齆婿乃求媚此婦終不肯迎願遂往西市售無價名香而燻之還入其室婦既齆豈分香臭哉呂氏春秋曰懐腐而欲香入水而惡濡漢武故事曰上作栢梁臺悉以香栢香聞數十里也漢官典職曰尚書郎懐香握蘭神仙傳曰淮南王為八公張錦綺之帳燔百和之香佛圖澄傳曰澄以鉢盛水燒香呪之須臾生青蓮花林邑記曰朱吾以南有文狼野人居無室宅依樹止宿食生肉採香為業與人居市若上皇之民矣鄴中記曰石虎作沉蘇帳頂安金蓮花花中懸金薄織綩囊裹受三升以盛香注帳之四面上十二香囊采色亦同竺法眞登羅山䟽曰越王擣薰陸香扶南傳曰頓遜國人恒以香花事天神香有多種區撥逆花途致各逐花摩夷花冬夏不衰日載數千車於市賣之燥乃益香亦可為粉以傅身體述征記曰北芒有張母墓舊説是王氏妻葬有年載後開墓而香火猶燃十洲記曰漢武時長安大疫人死日以百數帝乃試取月氐國神香燒之于城内死未滿三月者活芳氣經三月不歇帝始信神物也乃秘録餘香郭子横洞㝠記曰漢武帝於招仙閣燒荃靡之香屑如粟一粒香氣三月不絶又曰䟦塗闍者北人也剪髮裸形不食穀飲清水食都夷香如棗核食一斤則歴月不飢以一粒如粟大投清水中俄而滿大盂也博物志曰西域使獻香漢制獻香不滿斤不得受西使臨去又發香器如大豆者試著宮門香氣聞長安四面數十里中經日乃歇捜神記曰渤海史良姊一女子許嫁而未果良怒殺之後夢見曰還君物覺而得昔所與香纓金釵之屬又曰初鈎弋夫人有罪以譴死殯屍不臰而香又曰合肥有一大船覆在水中漁人夜宿其旁聞筝笛之音又香氣非常相傳云曹公載妓船覆於此任昉述異記曰魏武帝陵中有泉謂之香水古詩云安得香水泉濯郎衣上塵一説香水在并州香山其水香潔浴之去病吳故宮有香溪俗云西施浴處又呼為脂粉塘吳王宮人濯於此溪上源至今馨香又曰南海出千歩香佩之聞於千歩也今海隅有千歩草是其種也葉似杜若而紅碧間雜貢籍云日南郡貢千歩香漢雍仲子進南海香物拜為涪陽尉時人謂之香尉日南郡有香市商人交易諸香處南海郡有香戸日南郡有千畆香林名香出其中香洲在朱崖郡洲中出諸異香往往不知名千年松香聞十里亦謂之十里香也夢書曰夢得香物婦女歸也曹植洛神賦曰踐椒塗之郁烈歩蘅薄而流芳魏武令曰昔天下初定吾便禁家内不得薰香後諸女配國家因此得香燒吾不好燒香恨不遂初禁令復禁不得燒香其以香藏衣著身亦不得秦嘉答婦徐淑書曰缺注好香四種各一斤可以去穢淑答書曰未得侍帳帷則芬芳不設陸機弔魏武文曰余為著作郎遊秘閣見魏武今曰餘香可分與諸舍中無所為學作履組賣也弔曰紆家人于履組塵清慮于餘香麝}
