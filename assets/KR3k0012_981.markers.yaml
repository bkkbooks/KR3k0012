  - {type: variant, offset: 526, length: 532, content: 丹陽張承先家有鬼長為取它物會有客須蓴二斗鱧魚二十頭鬼將一小兒置驃騎令小兒睡眼覺看籃中已有蓴鱧幽明錄曰阿東常醜奴泛湖邊拔蒲暮宿空舍時日暮見一女姿容極美乘舡載蓴至舍寄住變而為獺蘘荷說文曰蘘蘘荷也一名菏苴廣雅同崔豹古今注曰蘘荷似蓄苴而白蓄苴色紫花生根中花未敗時可食久置則削爛不為實矣葉似薑宜蔭翳地常依蔭而生也搜神記曰余外婦姊夫蔣士有傭客得疾下血醫以中蠱乃密以蘘荷根布席下不使知乃狂言曰食我蠱者乃張小人也乃呼小小亡去今世攻蠱多用蘘荷根往往驗蘘荷或謂嘉草葛洪方曰人得蠱取蘘荷葉著臥席下不使知立呼蠱姓名潘岳閑居賦曰蘘菏依陰時藿向陽紫菜集異記曰會稽照誕入海採菜於山上曝之夜忽見群鬼張目切齒欲來擊誕誕奮刀斫之見鬼悉披靡乃就誕乞少許紫菜誕不為與吳郡緣海記曰郡海邊諸山悉生紫菜吳賦云綸組紫絳者也苦買晉書安帝紀曰義熙二年有苦買菜生楊州營莖高四尺六寸廣二尺二寸是後歲多征伐人民積苦故苦買者買苦也芹爾雅曰芹楚葵今水中芹也詩曰觱沸濫泉言采其芹芹菜也又曰泮水思樂泮水薄采其芹芹水菜也列子曰宋國有人其妻告之曰昔有人甘茙菽與芹子鄉豪嘗之哲於其口哲於其腸眾哂之呂氏春秋伊尹說曰菜之美者雲夢之芹也范汪祠制曰孟春祭有芹葅字林曰䔇音豈美菜生雲夢薺爾雅曰菥思歷切大薺似薺細葉俗呼老薺又曰蒫才何切薺實廣雅曰菥蓂, SBCK: 五}
