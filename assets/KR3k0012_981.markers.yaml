  - {type: variant, offset: 1208, length: 62, content: 名折目一名策冥一名馬駒雷公神農扁鵲辛季氏小溫四月採乾二十日生道傍細辛乾薑苦參薺實神農甘毒生野田五月五日採陰乾治腹脹蕨詩曰陟彼, SBCK: 木木花爲鷄舌香}
  - {type: variant, offset: 1208, length: 633, content: 名折目一名策冥一名馬駒雷公神農扁鵲辛季氏小溫四月採乾二十日生道傍細辛乾薑苦參薺實神農甘毒生野田五月五日採陰乾治腹脹蕨詩曰陟彼南山言採其蕨蕨鼈菜也又曰山有蕨薇隰有杞桋晉書曰齊王秉權張翰謂郡人顧榮曰天下紛紛未已吾本山林間人無望於時去矣采南山蕨飲三江水也爾雅曰蕨鱉初生無葉可食江西謂之弊古詩曰山桃發紅萼野蕨漸紫苞堇詩曰周原膴膴堇荼如飴堇菜也荼苦菜也周之原地肥美所生菜雖有性苦者皆甘如飴也禮曰堇苴枌榆免薧音考滫髓以滑之謂用調和飲食也蓂堇類也冬用堇夏用荁爾雅曰齧苦堇今堇葵也葉似柳子如米汋食之滑三十國春秋曰劉殷字長盛七歲喪其父哀毀踰禮曾祖母王氏盛冬思堇殷入澤中慟哭有堇生焉得斛餘廣語曰夏蓂秋堇滑如粉後魏書曰崔和為平昌太守性鄙恡埋錢百斛其母季春思堇惜錢不買荇爾雅曰莕接余其葉苻藂生水中葉圓在莖端長短隨流水深淺江東人食之音杏也詩曰參差荇菜左右流之窈窕淑女寤寐求之荇接余也邪蒿北齊書曰刑峙字士俊以經授皇太子廚宰進太子食有菜曰邪蒿令去之曰此菜有不正之名非殿下所宜食顯宗聞而嘉之芸臺通俗文曰芸臺謂之胡菜韻集曰芸臺胡菜薰葇方言曰蘇之小者謂之穰葇薰菜也鹿角南越志曰猴葵色赤生石上南越謂之鹿角葫荽石崇奴券曰奴當種羅勒胡荽不親不踈優殿南方草物狀曰合浦有菜名優殿以豆醬汁茹食芳好可食胡餅雍菜廣州記曰雍菜生水以為葅冬風廣州記曰冬風菜陸生宜肥肉作羹二者微味人甚重之絡葵博物志曰人食絡葵為狗齧則瘡不差或致死蔊字林曰蔊辛菜也荶字林曰荶菜似蒜生水中波稜唐書曰太宗時婆羅獻波稜菜葉類紅藍實如蒺藜大熟之能益食味, WYG: ''}
