  - {type: variant, offset: 3, length: 4, content: 五蘆服爾, krp: 一香麝葳香欝金鷄舌龍腦雀頭香書曰至治馨香感于神明左傳曰黍稷非馨馨者香之逺聞明德惟馨說文曰香芳也吴志曰士爕兄弟並爲列郡雄長一州車騎滿道胡人夾轂焚香者常有數千丗說曰桓車騎時有陳莊者入武當山學道所居恒有白烟香氣聞徹續晉安帝紀曰王鎮惡亡經曰魏興太守郭宣之晝坐忽見陳莊來因叙舊事相對悲泣勸營功德去後郡内悉聞香狀如芳烟流散晉書曰杜太后傳曰海西公之丗太后復臨朝稱制桓温之廢海西公也太后方在佛屋燒香内侍啓云外有急奏太后乃出尚倚户前視奏宋書曰范曄撰和香方其序之曰麝夲多忌過分必害沉實易和盈斤無傷零藿虚慘詹唐黏濕甘松蘇合安息欝金奈多和羅之属並𬒳珎於外國無取於中道又棗膏昏鈍甲煎淺俗非唯無助於馨烈乃當弥増於尢疾也所言悉以比類朝士麝夲多忌比庾仲丈零藿虚慘比何尚之詹唐黏濕比沈演之棗膏昏鈍比羊玄保甲煎淺俗比徐湛之甘松蘇合比慧琳道人沉實易和以自比也齊書曰韓懷明上黨人也客居荆州十歳母患尸疰毎發輙危殆懷明夜於星下稽顙祈禱時寒甚切忽聞香氣空中有人曰童子母須臾永差無勞自苦未曉而母平復梁書曰庾詵尢遵釋教宅内立道埸環繞禮懴六時不息誦法華經毎日一遍後夜中忽有一道人自稱願公容止甚異呼詵爲上行先生授香而去又曰梁武帝祀南郊先是一日景夜南郊令解除之等到郊所履行忽聞異香隨風而至及將行事奏樂迎神有異光圎滿壇上朱紫黄白雜食頃乃滅又曰王琛夲無令問爲太子中舎人謟事何敬容爲其階前種植香草脫履躡其草根敬容意以爲善郭子曰陳騫以韓壽爲椽毎㑹聞壽有異香氣是外國所貢一着衣歷日不歇騫計武帝唯賜巳及賈充他家理無此香嫌壽與巳女通考問左右婢具以實對騫以女妻壽壽時未婚晉書云賈充女切香與韓壽金樓子曰齊東婚以錦石爲殿内開千門万户又有和香香氣紛馥聞之使人歡恱生諸雅態兼令睡眠又曰昔玉池國有民軰面十二醜婦國色鼻齆壻乃求媚此婦終不肯廻頋遂徃西市無價名香而燻之還入其室婦旣齆矣豈分香臭哉吕氏春秋曰懷腐而欲香入水而惡濡漢武故事曰上作栢梁䑓悉以香栢香聞數十里也漢官典職曰尚書郎懷香握蘭神仙傳曰淮南王爲八公張錦綺之帳燔百和之香佛圗澄傳曰澄以鉢盛水燒香呪之須臾生青蓮花林邑記曰朱吾以南有文狼野人居無室宅依樹止宿食生肉採香爲業與人交市若上皇之民矣鄴中記曰石虎作流蘇帳頂安金蓮花花中懸金簿織成綩音苑囊囊受三升以盛香注帳之四面上十二香囊采色亦同竺法登真羅山䟽曰越王擣薫陸香扶南傳曰頓遜國人恒以香花事天神香有多種區撥葉逆花途致各遂花摩夷花冬夏不衰日載數十車於市賣之燥乃益香亦可爲粉以傳身體𫐠征記曰北芒有張母墓舊說是王氏妻塟有年載後開墓而香火猶十洲記曰漢武時長安大疫人死日以百數帝乃試取月氏國神香燒之於城内死未滿三日者活芳氣經三月不歇帝始信神物也乃祕録餘香郭子横洞冥記曰漢武帝於招仙閣燒靡離之香屑如粟一粒香氣三月不歇又曰跋塗闍者胡人也剪髮祼形不食糓唯飲清水食都夷香如棗核食一斤則歴月不飢以一粒如粟大投清水中俄而滿大孟也博物志曰西域使獻香漢制献香不蒲斤不得受西使臨去又發香器如大豆者試着宫門香氣聞長安四面數十里中經月乃歇捜神記曰渤海史良好一女子許嫁而未果良怒殺之後夣見曰還君物覺而得昔所與香纓金釵之属又曰𥘉鈎弋夫人有罪以譴死殯尸不臰而香又曰合淝有一大白舡覆在水中漁人夜宿其傍聞箏笛之音又香氣非常相傳云曹公載妓舡覆於此任昉𫐠異記曰魏武帝陵中有泉謂之香水古詩云安得香水泉濯郎衣上泉塵一說香水在并州香山其氷㓗香浴之去病吴故宫有香水溪俗云西施浴處又呼爲脂粉塘吴王宫人濯莊於此溪上源至今馨香又曰南海出百歩香佩之聞於千歩也今海隅有千歩香是其種也葉似杜若而紅碧間雜貢藉云日南郡貢千歩香漢雍仲子進南海香物拜爲涪陽尉時人謂之香尉日南郡有香市啇人交易諸香處南海郡有香户日南郡有千畝香林名香出其中香洲在朱崖郡洲中出諸異香徃徃不知其名千年松香聞十里亦謂之十里香也夣書曰夣得香物婦女歸也曹植洛神賦曰踐椒塗之郁烈歩蘅音衡薄而流芳魏武令曰昔天下𥘉定吾便禁家内不得香薫後諸女配國家爲其香因此得燒香吾不好燒香恨不遂所禁今復禁不得燒香其以香藏衣着身亦不得秦嘉荅婦徐淑書曰令種好香四種各一斤可以去穢淑荅書曰未得侍帷帳則芬芬不設陸機吊魏武文曰余爲著作郎遊祕閣見魏武令曰餘香可分與諸夫人諸舎中無所爲學作履組賣也吊曰紆家人於履組塵清慮於餘香麝尓}
