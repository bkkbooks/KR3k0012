  - {type: variant, offset: 150, length: 0, content: '', SBCK: 麝食柏而香葳香孫氏瑞應圗曰葳者禮備至則生一曰王者愛人命則生一名葳香也欝香􅀃文曰欝芳草也十葉爲貫築以煑之爲鬯一合而釀之以降神也周禮春官上曰鬱人掌祼器祼噐謂彛及舟與瓉凡􅀕祀賔客之祼事和鬱鬯以實彛而陳之築鬱金煑之以和鬯酒鄭司農云鬱金草名七葉爲貫百二十賈爲築以煑之鑊中停於􅀕前鬱爲草􅀂蘭後周書曰􅁗國出鬱金後周書曰波斯國大月氏之別種也地出毹翟俞二音􅀇麞皮及薫陸欝金􅂫合青木香等胡椒畢撥石􅁡千年􅀥香附于訶􅀺勒無食子塩緑雌黄等物唐書曰天竺國卑濕暑􅀬稻歳四熟有金剛似紫石英百錬不銷可以切玉又有旃檀欝金諸香通於大􅁗又曰太宗時伽毗國獻欝金香似麦門冬九月花開􅃺似芙蓉其色紫碧香聞數十歩花而不實欲種者取根文士傳曰朱穆字公叔作欝金賦曰英熠爍以焜煌似九日之普照逺而望之粲􅀂星羅出雲嶠近而觀之曄􅀂丹桂耀湘涯應劭地}
  - {type: page-break, offset: 150, content: '', id: KR3k0012_SBCK_981-6a}
  - {type: page-break, offset: 150, content: '', id: KR3k0012_SBCK_981-6b}
  - {type: variant, offset: 150, length: 0, content: '', WYG: 麝食栢而香葳香孫氏瑞應圖曰葳㽔王者禮備至則生一曰王者愛人命則生一名葳香也欝金説文曰欝芳草也十葉為貫百卄貫築以煮之為鬱合秬而釀之以降神也周禮春官上曰欝人掌祼器凢祭祀賔客之祼事和欝鬯以實彛而陳之魏畧曰大秦國出鬰金後周書曰波斯國大月氐之别種也地出氍毹𤣥麞皮及薰陸欝金蘇合青木等香胡椒蓽撥石蜜千牛棗香附子訶黎勒無食子鹽緑雌黄等物唐書曰天竺國卑濕暑熱稻嵗四熟有金剛似紫石英百鍊不銷可以切玉又有旃檀欝金諸香通大秦又曰太宗時伽毗國獻欝金香似麥門冬九月花開狀似芙蓉其色紫碧香聞數十歩花而不實欲種者取根文士傳曰朱穆字公叔作鬰金賦曰莫熠爍以焜煌似九日之普照遠而望之粲若星羅出雲嶠近而觀之􅁮若丹桂耀湘涯應劭地}
