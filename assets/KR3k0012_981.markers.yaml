  - {type: variant, offset: 150, length: 0, content: '', krp: 麝食柏而香葳香孫氏瑞應圗曰葳者禮備至則生一曰王者愛人命則生一名葳香也欝香說文曰欝芳草也十葉爲貫築以煑之爲鬯一合而釀之以降神也周禮春官上曰鬱人掌祼器祼噐謂彛及舟與瓉凡祭祀賔客之祼事和鬱鬯以實彛而陳之築鬱金煑之以和鬯酒鄭司農云鬱金草名七葉爲貫百二十賈爲築以煑之鑊中停於祭前鬱爲草若蘭後周書曰秦國出鬱金後周書曰波斯國大月氏之別種也地出毹翟俞二音玄麞皮及薫陸欝金蘇合青木香等胡椒畢撥石蜜千年棗香附于訶黎勒無食子塩緑雌黄等物唐書曰天竺國卑濕暑熱稻歳四熟有金剛似紫石英百錬不銷可以切玉又有旃檀欝金諸香通於大秦又曰太宗時伽毗國獻欝金香似麦門冬九月花開狀似芙蓉其色紫碧香聞數十歩花而不實欲種者取根文士傳曰朱穆字公叔作欝金賦曰英熠爍以焜煌似九日之普照逺而望之粲若星羅出雲嶠近而觀之曄若丹桂耀湘涯應劭地}
  - {type: variant, offset: 151, length: 116, content: 世不真賢猶治病無真藥當用人參反得蘿菔根唐新語曰開元中中書令蕭嵩以文選是先代舊業欲注釋之奏請左補闕王智明金吾衛佐李玄成進士陳居等注文選先是東宮衛佐馮光進入院校文選兼復注釋解鴟蹲云今之芋子即是著毛蘿蔔院中學士向外說之蕭嵩聞之附掌大笑雲南, SBCK: 風俗}
