  - {type: variant, offset: 1780, length: 34, content: 食絡葵為狗齧則瘡不差或致死蔊字林曰蔊辛菜也荶字林曰荶菜似蒜生水中波稜, SBCK: 年少未昏至田舎見一女云我是何叅軍女年十四而夭爲西王母飬使與下土人交廣與之􅆞綿其日於席上得手巾褁鷄舌香其母取巾燒之乃是火浣布龍腦}
