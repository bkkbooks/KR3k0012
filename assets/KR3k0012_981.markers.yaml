  - {type: variant, offset: 1059, length: 104, content: 辛也說文曰薺草可食詩曰誰謂荼苦其甘如薺荼苦菜也而君子於己之苦又甚於荼北方之荼則如甘薺禮曰孟夏之月靡草死薺葶藶之屬春秋繁露曰薺以美冬水氣也薺甘味也乘於水氣故美者甘勝寒也薺之言濟所以濟大水也淮南子曰薺麥冬生而夏死, SBCK: 洲出鷄舌香}
