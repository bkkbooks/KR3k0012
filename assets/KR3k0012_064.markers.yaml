  - {type: variant, offset: 3031, length: 404, content: 五丈言是昔人居山之處薪爨煙黔猶存谷中林木緻密行人尠有能至矣又有少許山田引灌之蹤尚存出谷有平丘面山傍水土人悉以種麥云此丘不宜殖稷黍而宜麥齊人相承以殖之詩曰汶水湯湯行人彭彭周禮考工記曰狢踰汶則死地氣然也論語雍也曰季氏使閔子鶱為費宰子鶱曰善為我辭焉如有復我者則吾必在汶上矣傳曰齊人歸我汶陽之田沐水水經云沐水出琅邪東莞縣西北山東南經東海厚丘縣梁天監二年三月土人張高等五百餘人相率開鑿此溪引水溉田二百餘頃俗名為紅花水東流入泗州漣水界淄水水經曰淄水出泰山萊蕪縣原山注云世謂之原泉淮南子曰淄澠之水合易牙嘗而知之淄澠齊二水也新序曰齊有田巴先生者行脩於內智明於外齊君聞其賢聘而問政焉田巴對曰政在正身正身之本在於群臣大王召臣臣改制前飾將造公門問於臣妾曰奚若妾愛臣將出門問從者從者畏臣據臨淄水而觀影然後自知醜惡也今齊之臣妾諫王者非特二人王如臨淄水見己之惡過而能改斯齊國治矣澠水水經注曰澠水出營丘城東世謂之漢湊水入于時水傳曰有酒如澠, SBCK: ''}
