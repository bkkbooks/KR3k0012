  - {type: variant, offset: 2321, length: 271, content: 俱導泉穴各徑尺餘水源南側有一廟栝柏成林時人謂之原泉祠非所究也又曰漢景帝三年有白頸烏與黑烏群斗於呂縣白頸烏不勝墮泗水中死者數千洙水水經曰洙水出泰山蓋縣臨樂山西南至卞縣入于泗注云洙水西南流盜泉水注云泉出卞城東北卞山之陰論語考讖曰水名盜泉仲尼不漱又注曰夫子教於洙泗之間今於城北二水之中即夫子領徒之所也從征記曰洙泗二水交於魯城東北十七里闕里有洙泗墻南北一百二十步東西六十步四門各有石閫北門去洙水百餘步沂水說文曰沂水出東海費東入泗一曰出泰山蓋青州浸也水經曰沂水出泰山蓋縣艾山注曰鄭玄云出沂山或云臨山水有二源南源所導世謂之祚泉北水所發俗謂之魚窮泉俱東南流, SBCK: ''}
