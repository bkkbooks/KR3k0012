  - {type: variant, offset: 693, length: 553, content: 大孟山愽物志云出燕泉山並異名也東觀漢記曰傅俊從上迎擊王莽二公於陽關漢兵反走還到汝水上於水岸以手飲水澡頰塵垢謂俊等曰今日罷倦甚諸卿寧憊耶潁水說文曰潁水出潁川陽城乾山東入淮豫州浸也水經注曰潁有三源右水出陽乾山之潁谷中水出導源少室左水出少室南谿漢書曰灌夫潁川人宗族豪橫潁水謠曰潁川清灌氏寧潁水濁灌氏族韓子曰鄭人有卜子妻市買鼈歸過潁川以鼈當渴飲之遂失鼈呂氏春秋曰湯讓天下於下隨卞隨自投於潁水丹水漢書曰高祖入關王陵起兵丹水以歸漢水經曰丹水出京兆上洛縣冢嶺山至丹水縣入于汋呂氏春秋曰堯有丹水之戰以服南蠻注曰水出丹魚先夏至十日夜伺之魚浮水側赤光上照如火網而取之割其血以塗足可以步行水上長居淵中尚書逸篇曰堯子不肖舜使居丹淵為諸侯故號曰丹朱六韜曰堯伐有扈戰於丹水之浦白水水經曰白水出朝陽縣西東流過其縣南至新野縣東入于涓東觀漢記曰光武皇考封南陽之白水鄉莊子曰兩神女於白水之上禹過之而趍曰治天下奈何女曰股無肢脛不生毛手足胼胝何足以至司馬彪注言憂天下太甚灌水水經注曰灌水經蓼縣禇先生所謂神龜出於江灌之間是也潧水說文曰潧水出鄭國水經注曰潧水出鄶城西北雞絡塢下東南流入洧潧字今作溱詩曰子惠思我褰裳涉溱子不我思豈無他人又曰溱與洧方渙渙兮士與女方秉簡兮溱洧鄭兩水名蘭簡孟子曰子產聽鄭國之政以其乘輿濟人於溱洧洧水說文曰洧出潁川陽城山東南入潁, SBCK: 丘}
