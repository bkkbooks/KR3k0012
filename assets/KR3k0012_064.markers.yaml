  - {type: variant, offset: 1343, length: 825, content: 京縣西南嵩渚山與關水同源分流即古旃然水也左傳謂楚伐鄭次旃然即此水名史記曰漢王敗於彭城韓信擊破楚兵於京索間以故項羽不能西濮水說文曰濮水出東郡濮陽南入鉅野水經曰瓠子河東北過稟丘縣為濮水史記曰晉平公令師涓鼓琴未終師曠止之曰亡國之音也平公曰是何道出荅曰此師延所作也與紂為靡靡之樂武王伐紂師延東走自投濮水之中故聞此聲必於濮水之上先聞此聲者國削問果於濮上得之莊子曰釣於濮水楚王使大夫二人先焉曰願以境內為累莊子持竿不顧也隕石水水經注曰睢陽有隕石水一名漆溝左傳云隕石於宋五隕星也故老云此水有時竭涸五石存焉故名隕水石墜處為澤呂梁水述征記曰彭城呂縣有呂梁水則莊子所稱丈夫也列子曰孔子觀呂梁懸水三十仞流沫三十里黿鼉魚鼈不能游之數百步而出被髮行歌莊子亦載豪水水經注曰豪水出陰陵縣之陽亭北小屈石穴北注于淮莊子曰莊子與惠子遊於壕梁水上汳水水經曰汳水出陰溝至浚儀縣北入睢水注云陰溝即浪蕩渠也亦言汳受旃然水字今作汴又云丹沁亂流於武德絕河南入陽合故汳兼丹水之稱河泲水斷汳承旃然而東目王賁灌大梁水出縣南而不逕其北夏水洪泛則是瀆津通故渠即陰溝也於大梁北又曰浚水矣故陳留風俗傳云浚水逕其北者也睢水漢書曰項羽與漢王戰于靈壁東漢軍大敗睢水為之不流又地理志曰睢水首受陳留縣浪蕩渠水經曰睢水東逕睢陽縣又東過相縣南流當蕭縣南入淮又曰睢水又東經睢陽縣故城南積而為蓬洪澤也又九州要記云睢陽水在宋城西又云渙水經新城南又東南合明溝水又曰傳云睢渙之間出文章天子郊廟御服出焉尚書所謂厥篚織文者也泗水說文曰泗受濟水東入淮禮曰曾子謂子夏曰吾與爾事夫子於洙泗之間退而老於西河之上漢書地理志曰洙泗之水其民涉度幼者扶老及魯道衰洙泗之間斷斷如也論衡曰儒書言孔子葬泗水泗水為之卻流此虛也泗水無知天神使之卻流孔子生時何不使之尊敬乎水經注曰地理志曰泗出濟陰乘氏縣又云出卞縣地經言北山皆為非矣山海經泗水出魯東北余昔因公事沿歷徐沇路經洙泗因令尋其源流水出卞縣故城東南桃墟西北春秋昭公七年謝息納季孫之言以孟氏成邑與晉而遷于桃杜預曰魯國卞, SBCK: 龍岡}
