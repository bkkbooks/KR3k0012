  - {type: variant, offset: 142, length: 405, content: 亦名襄水荊楚之地水駕山而上者皆呼為襄上也今土人呼為涑水上流亦呼為襄名即無定故陸澄地理記曰襄陽無襄水也又按襄沔記云中廬有涑水注于沔此水中有物如三四歲小兒膝頭如虎掌爪常沒水中出膝頭示人小兒不知者欲弄之輒便啖人或人有生得者摘其鼻可小小使之名曰水虎菊花源荊州記曰菊花源傍悉生芳菊被徑浸潭流其滋液水極芳馨谷中有三十餘家不穿井仰飲此水上壽二三百中壽百餘其七八十者猶不為壽夫菊能輕身益氣令人久壽於此有徵矣又後漢胡廣字伯始為侍中久患風羸南歸飲此水遂瘳焉滍水傳曰晉陽處父侵蔡楚子上救之與晉夾滍而軍水經曰滍水出南陽魯陽縣西之堯山張衡南都賦曰其川瀆則滍澧𤄶濜發源巖穴布濩漫汗漭漾洋溢總激急趣箭馳風疾又曰滍水又東南逕昆陽縣故城昔漢光武與王尋王邑戰于昆陽敗之走者相騰踐奔殪百餘里會大雨如注滍川盛溢虎豹皆股戰士卒爭赴溺死者以萬數水為不流王邑嚴尤陳茂輕騎皆乘尸而渡澧水說文曰澧水南陽雉衡山東入汝山海經曰葛山澧水出馬音禮東流于余澤其中多六足魚, WYG: ''}
