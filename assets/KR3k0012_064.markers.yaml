  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第六十四地部二十九河北諸水淇水黄花水洹水清水滏水漳水易水汾水文水澮水晉水嬀水沁水鴦漿水石臼河滹沱衡水白溝水屯氏河鳴犢河滭發水窮魚水漏水桑乾河巨馬河五渠水金河淇水說文曰淇水出河内共北山東入海詩曰毖彼泉水亦流于淇又曰要我乎上宫送我乎淇之上矣又曰瞻彼淇澳菉竹猗猗又曰籊籊竹竿以釣于淇淇水悠悠檜檝松舟韓子曰昔紂爲甲卒百萬左飲馬於淇右飲馬於洹洹水竭淇水不流武王甲卒三千破之隋圖經曰清淇西自魏郡朝歌縣界入分爲二派一在郡東一在郡西俱南流入河案酈道元注水經云淇水南與清水合而入白溝石㑹宿胥皆瀆之名淇又一名王莽河王莽時所穿也兾州圖經云河水西從河内郡界入至黎陽而東北至臨河西至王莽河出焉又東經澶淵東入武陽}
  body:
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 即東郡界是水經曰淇水出河内隆慮縣西大號山山海經曰淇水出沮如山水出其側頽波漰住衝激横山山上合下開可減六七十歩巨石磥砢交積隍澗傾瀾漭盪勢同雷轉激水散氣曖􅀂霧合又曰詩云瞻彼淇澳菉竹猗猗毛云菉王芻也竹􅄶竹也漢武帝塞決河斬淇園之竹木以爲用寇恂爲河内伐竹淇川冶夫百餘萬以輸軍資今通望淇川無復此物唯生芻編草不異黄花水隋圖經曰黄花水出隆慮縣西北崖上髙十七里去地七里懸水東南注壑巖下狀􅀂雞翅俗謂之雞翅蓋天台赤城之流也至谷潜入地下十里復出名曰柳水者是黄花水重源發也其谷號爲黄花谷内有仙母塜谷西有洞穴謂之聖人窟洹水隋圖經曰洹水出隆慮縣西北俗謂安陽河即聲伯夢渉之所源出林慮山東平地清水水經曰清水出河内脩武縣之北黒山黒山在縣北白鹿山東清水所出也上承諸陂散泉以成川南流西南屈曲瀑布垂巖懸河注壑二十餘丈聲震山谷左右石壁層深獸跡不交隍中散水霧合視不見底其水歷澗流飛清泠洞觀謂之清水矣􅇭水水經注曰􅇭水發源出石皷山南巖下泉奮湧􅀂􅇭水之湯矣其水冬温夏冷崖上有魏丗所立銘水上有祠能興雲􅀨􅇭水又東流注于漳又謂之合河浮圖澄別傳曰石虎時自正月不雨澄詣􅇭口祠稽首曝露即日二白龍降於祠下於是雨遍千里也山海經曰神國之山􅇭水出焉東流注于歐水郭璞注曰金􅇭水在臨水縣西釡口山經鄴西北至列人縣入于漳其水􅀬漳水􅀃文曰濁漳水出上黨長子鹿谷山東入清漳清漳出沾山大要谷北入河吕氏春秋曰史起引漳水灌鄴田民􅀄大怨後轉獲利相與歌曰鄴有聖令曰史公決漳水灌鄴旁終古斥鹵生稻梁風􅁟記云南易水夲名漳水源出三門山案趙地記云六國時此水名易水埤蒼及水經云洺水之目不知誰改俗謂山之下地名洺水因經之故曰洺水案燕趙記云其分有三易漳爲南易水鄴縣圖經曰濁漳水在縣西水東北津有永樂浦浦西五里俗謂爲紫陌河北處即俗巫爲河伯娶婦處也水經注曰清漳水東經沙縣故有沙河之稱又曰濁漳水出上黨長子縣西發搗山又云漳水出麓谷山與發鳩連麓而在南淮南子曰謂之發苞山故異名㸦見也左則陽泉水注之右則散蓋水入焉三源同出一山但以南北爲別耳又曰尚書所謂覃懷厎績至于衡漳也孔安國曰衡横也言漳水横流也易水水經曰易水出溕郡故安縣閻郷西山燕太子丹曰荆軻入􅁗不擇日發太子送之於易水之上荆軻起爲壽歌曰風蕭蕭􅀆易水寒壯士一去􅀆不復還故安圖經曰易水又名安國河亦名北易水汾水􅀃文云汾水出太原􅀳陽山西南入河山海經曰管涔之山其山無木而下多草其下多玉汾水出焉而流注于河十三州志曰出武周燕之燕京山亦管涔之異名也其山重阜脩層有草木無泉源導於南麓之下􅀃文曰汾水出太原􅀳陽山西南入河莊子曰堯治天下之民平海内之政徃見四子於姑射之山汾水之陽窅然䘮其天下焉􅀃苑曰智伯圍趙襄子於􅀳陽決􅀳水以灌之􅀳陽之城不没者三版智伯曰吾始知水之可以亡人國汾水可以灌安邑絳水可以灌平陽淮南子曰汾水濛濁而冝麻水經曰汾水南過冠爵津汾名也在介休縣之西南俗謂之雀䑕谷數十里間道隘水左右悉結編梁閣道累石就路縈帶巗側或去水一丈或髙五六丈上戴山阜下臨絶澗􅁉謂之爲魯股橋盖通古之津隘又亦在今之地嶮文水水經曰文水出大陵縣西山文谷東北入于汾注云縣西南山下武氏穿井給養井至幽深後一朝水溢平流東南注文水又曰文水又南逕縣右㑹隠泉水口水出謁泉山之上頂俗陽雨愆時謁是禱故山得其名非所詳也其山石岸絶險壁立崖半有一石室去地可五十餘丈爰有層松飾巖列栢綺望唯西側一處得歴級􅂛陟頂上平地一十許頃沙門釋僧光表建二刹泉發於兩寺之門東流􅄋石㳂注上下又東津渠隱没而不􅁪流故有隱泉之名矣􅀨澤豐澍則通入文水又南經兹氏縣故城東爲文湖東西一十五里南北三十里丗謂之西河在縣直東一十里湖之西側臨湖澮水水經曰澮水出河東絳縣東澮交東髙山注云一名詳髙山亦曰河南山西南逕翼城北合}
