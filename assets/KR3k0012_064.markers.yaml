  - {type: variant, offset: 4, length: 1, content: 孝, WYG: 謂之澮交左傳晋悼公謀去故絳欲居郇瑕魏獻子曰不如新田有汾澮以流其惡遂居新田又謂之絳蓋在絳澮之陽又西南過虒祁宫南入于汾晋水水經注曰山海經曰懸甕之山晋水出焉今在縣之西南昔智伯之遏晉水以灌晉陽濬其上源後人踵其遺迹畜以為沼沼西際山枕水有唐虞叔祠水側有涼臺結飛梁於水上左右雜樹交陰希見曦景晋川之中最為勝處媯水地記曰河東郡首山之東北山中有二泉水南流者曰媯水北流曰汭水二水西經厯山下異流同歸渾流而注入于河水經注曰尚書所謂釐降二女于媯汭孔安國曰舜居媯水之汭王肅曰媯汭虞地名皇甫謐曰納二女于媯水之汭馬季長曰水所入曰汭然則汭似非水名今則見有二水異源同歸渾流西注而入于河沁水水經曰沁水出上黨湼縣謁戾山注云沁即洎水也又曰沁水南廵石門石門是晋安平獻王司馬孚之為魏野王典農中郎將之所造也按其表云孚言臣被明詔典河内水利臣既到冀行沁水源出銅鞮山屈曲周廻水道九百里自太行以西王屋以東層巗高峻天時霖雨衆谷走水小石漂迸水門朽敗稻田汎濫嵗功不成臣輙按行去堰五里以外方石可得數萬餘枚臣以為累方石為門若天旱増堰進水若天霖雨陂澤充溢則閉防斷水竟其功足以成河雲雨由人經國之謀暫勞永逸聖王所願許可也陛下特出臣表勅大司農府給人工勿使稽延詔書聽許於是夾岸累石結以為門用而代木門矣鴦漿}
