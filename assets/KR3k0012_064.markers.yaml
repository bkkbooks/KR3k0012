  - {type: variant, offset: 1599, length: 1163, content: 述征記曰彭城呂縣有呂梁水則莊子所稱丈夫也列子曰孔子觀呂梁懸水三十仞流沫三十里黿鼉魚鼈不能游之數百步而出被髮行歌莊子亦載豪水水經注曰豪水出陰陵縣之陽亭北小屈石穴北注于淮莊子曰莊子與惠子遊於壕梁水上汳水水經曰汳水出陰溝至浚儀縣北入睢水注云陰溝即浪蕩渠也亦言汳受旃然水字今作汴又云丹沁亂流於武德絕河南入陽合故汳兼丹水之稱河泲水斷汳承旃然而東目王賁灌大梁水出縣南而不逕其北夏水洪泛則是瀆津通故渠即陰溝也於大梁北又曰浚水矣故陳留風俗傳云浚水逕其北者也睢水漢書曰項羽與漢王戰于靈壁東漢軍大敗睢水為之不流又地理志曰睢水首受陳留縣浪蕩渠水經曰睢水東逕睢陽縣又東過相縣南流當蕭縣南入淮又曰睢水又東經睢陽縣故城南積而為蓬洪澤也又九州要記云睢陽水在宋城西又云渙水經新城南又東南合明溝水又曰傳云睢渙之間出文章天子郊廟御服出焉尚書所謂厥篚織文者也泗水說文曰泗受濟水東入淮禮曰曾子謂子夏曰吾與爾事夫子於洙泗之間退而老於西河之上漢書地理志曰洙泗之水其民涉度幼者扶老及魯道衰洙泗之間斷斷如也論衡曰儒書言孔子葬泗水泗水為之卻流此虛也泗水無知天神使之卻流孔子生時何不使之尊敬乎水經注曰地理志曰泗出濟陰乘氏縣又云出卞縣地經言北山皆為非矣山海經泗水出魯東北余昔因公事沿歷徐沇路經洙泗因令尋其源流水出卞縣故城東南桃墟西北春秋昭公七年謝息納季孫之言以孟氏成邑與晉而遷于桃杜預曰魯國卞縣東南有桃墟世謂之曰陶墟舜所處也井曰舜井皆為非也墟有漏澤方一十五里澤西際阜俗謂之媯亭山蓋有陶墟舜井之言因復有媯亭之名矣阜側有三石穴廣圓三四尺穴有通否水有盈漏漏則數夕之中傾陂竭澤矣左右居民識其將漏豫以木彰穴口魚鼈暴鱗不可勝載矣自此連岡通阜西北四十許里岡之西際便得泗水之源也愽物志曰泗水陪尾蓋斯阜矣石穴吐水五泉俱導泉穴各徑尺餘水源南側有一廟栝柏成林時人謂之原泉祠非所究也又曰漢景帝三年有白頸烏與黑烏群斗於呂縣白頸烏不勝墮泗水中死者數千洙水水經曰洙水出泰山蓋縣臨樂山西南至卞縣入于泗注云洙水西南流盜泉水注云泉出卞城東北卞山之陰論語考讖曰水名盜泉仲尼不漱又注曰夫子教於洙泗之間今於城北二水之中即夫子領徒之所也從征記曰洙泗二水交於魯城東北十七里闕里有洙泗墻南北一百二十步東西六十步四門各有石閫北門去洙水百餘步沂水說文曰沂水出東海費東入泗一曰出泰山蓋青州浸也水經曰沂水出泰山蓋縣艾山注曰鄭玄云出沂山或云臨山水有二源南源所導世謂之祚泉北水所發俗謂之魚窮泉俱東南流合成一川論語曰暮春之月春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸西京雜記曰魯人秋胡娶妻三日而遊官三年休還其婦採桑于郊胡至不識而悅之乃遺金一鎰妻曰妾夫遊官未返于茲三年未有衱辱如今日也不顧胡慚而退至家問妻何在母曰採桑于郊乃是向來挑者也夫妻俱慚遂赴沂水而死尸子曰韓雉見申羊於魯有龍飲於沂韓雉曰吾聞之出見虎搏之見龍射之今弗射是不行吾聞也遂射之, WYG: ''}
