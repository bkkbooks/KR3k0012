  - {type: variant, offset: 0, length: 0, content: '', SBCK: 太平御覽卷第六十四地部二十九河北諸水淇水黄花水洹水清水􅇭水漳水易水汾水文水澮水晉水嬀水沁水鴦漿水石臼河滹沱衡水白溝水屯氏河鳴犢河滭發水窮魚水漏水桑乾河巨馬河五渠水金河淇水􅀃文曰淇水出河内共北山東入海詩曰毖彼泉水亦流于淇又曰要我乎上宫送我乎淇之上矣又曰瞻彼淇澳菉竹猗猗又曰籊籊竹竿以釣于淇淇水悠悠檜檝松舟韓子曰昔紂爲甲卒百萬左飲馬於淇右飲馬於洹洹水竭淇水不流武王甲卒三千破之隋圖經曰清淇西自魏郡朝歌縣界入分爲二􅂀一在郡東一在郡西俱南流入河案酈道元注水經云淇水南與清水合而入白溝石㑹􅀫胥皆瀆之名淇又一名王莽河王莽時所穿也兾州圖經云河水西從河内郡界入至􅀺陽而東北至臨河西至王莽河出焉又東經澶淵東入武陽}
