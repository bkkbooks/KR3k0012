  - {type: variant, offset: 4, length: 1, content: 孝, SBCK: 謂之澮交左傳􅀳悼公謀去故絳欲居郇瑕魏獻子曰不如新田有汾澮以流其惡遂居新田又謂之絳盖在絳澮之陽又西南過虒祁宫南入于汾􅀳水水經注曰山海經曰懸甕之山􅀳水出焉今在縣之西南昔智伯之遏􅀳水以灌􅀳陽其川上源後人踵其遺跡畜以爲沼沼西際山枕水有唐叔虞祠水側有凉堂結飛梁於水上左右雜樹交隂希見曦景􅀳川之中最爲勝處嬀水地記曰河東郡首山之東北山中有二泉水南流者曰嬀水北流曰汭水二水西經歴山下異流同歸渾流而注入于河水經注曰尚書所謂􅁵降二女于嬀汭孔安國曰舜居嬀水之汭王肅曰嬀汭虞地名皇甫謐曰納二女於嬀水之汭馬季長曰水所入曰汭然則汭似非水名則今見有二水異源同歸渾流西注而入于河沁水水經曰沁水出上黨􅄺縣謁戾山注云沁即洎水也水經注曰沁水南廵石門石門是􅀳安平獻王司馬孚之爲魏野王典農中郎將之所造也案其表云臣孚言臣被明詔興河内水利臣旣到檢行沁水源出銅堤山屈曲周廻水道九百自太行以西王屋以東層巖髙峻天時霖雨衆谷走水小石漂迸木門杇敗稻田汎濫􅀊功不成臣輙案行去堰五里以外方石可得數萬餘枚臣以爲累方石爲門􅀂天旱増堰進水􅀂天霖雨陂澤充隘則閉方斷水空渠衍澇足以成河雲􅀨田人經國之謀暫勞永逸聖王所許願陛下特出臣表􅃙大司農府給人工勿使稽延詔書聽許於是狹岸累石結以爲門用代木門矣鴦漿}
