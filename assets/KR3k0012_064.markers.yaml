  - {type: variant, offset: 2602, length: 7, content: 月春服既成冠者, SBCK: 衣連汭在静樂縣北百四十里注水經云桑乾河水潜承燕京之池池在山東之上周廻里餘其水澄停鏡淨潭而不流􅀂安定朝郍之湫池也池内曽無片草及其風籜有淪輙有小鳥翠色投池衘水岀㑹稽之耘鳥矣巨馬河注水經曰巨馬河即􅃮水也東北經郎山西望衆崖競舉􅀂鳥翼立石嶄巖似劒㦸之狀又南流經刀山層巖直上于霄望崖側􅀂積刀環}
