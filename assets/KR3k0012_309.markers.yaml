  - {type: variant, offset: 3189, length: 2, content: 今予, WYG: 大功可立如其不然敗必無餘成敗}
  - {type: variant, offset: 3192, length: 5, content: 生地皆走寧, WYG: 機在此舉也于是饗士秣馬閉營三日不出乃多掛幡旗使煙火不絶夜銜枚引兵與}
