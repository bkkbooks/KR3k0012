  - {type: variant, offset: 3486, length: 0, content: '', WYG: 又曰將軍王敦反兵至石頭欲攻晉將劉隗其將杜𢎞曰劉隗死士衆多未易可尅不如據石頭其守將周禮少恩兵不為之用必敗禮敗隗自走敦從之禮果開城門納𢎞諸將與敦戰晉師大敗又曰前秦苻堅率兵來伐晉將軍謝石謝𤣥拒之堅遣其尚書朱序說石等以衆盛欲脅}
  - {type: variant, offset: 3487, length: 2, content: 漢王, WYG: 降之序謂石曰若秦百萬之衆皆至則莫可以敵也及其衆未集宜在速戰若挫其前鋒可以}
  - {type: page-break, offset: 3487, content: '', id: KR3k0012_WYG_309-7a, image: WYG0895/WYG0895-0671a.png}
  - {type: variant, offset: 3490, length: 0, content: '', WYG: 志晉將使請戰許之堅師列陣逼肥水晉師不得渡晉將使謂堅將苻融曰君懸軍深入置陣逼水此持乆之計豈欲戰者乎若小退師合將士周旋僕}
  - {type: variant, offset: 3491, length: 2, content: 數十, WYG: 君公緩轡而觀之不亦美乎堅衆皆曰宜阻水莫令得上我衆彼寡勢必萬全堅曰但却軍令得過我以鐵騎向水逼而殺之不然因其濟水而覆之於是麾軍却陣軍遂奔退制之不可止𤣥以八千精卒渡肥逼之融馳騎略陣馬倒被殺軍遂大敗晉師乘勝追擊死者相枕堅為流矢所中單}
