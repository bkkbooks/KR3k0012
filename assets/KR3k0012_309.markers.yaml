  - {type: variant, offset: 3198, length: 1, content: 可, WYG: 合軍豐等不覺明日分兵拒江北自將攻江南漢悉兵迎戰自晨至晡遂大破之斬謝豐袁􅁻獲甲首五千餘級于是引兵還廣都留劉尚拒述具以状上帝報曰公還廣都甚}
  - {type: variant, offset: 3200, length: 0, content: '', WYG: 其宜述必不敢畧尚}
  - {type: variant, offset: 3201, length: 1, content: 用, WYG: 擊公也若先攻尚公從廣都五十里悉歩騎赴}
  - {type: variant, offset: 3201, length: 41, content: 用之乎又曰項王至東城乃有二十八騎漢騎追者數千人項王自度不得脫謂其騎曰吾起兵至今八年, krp: 應若合符契妙}
  - {type: variant, offset: 3203, length: 1, content: 乎, WYG: 適當置其疲困破之必矣自是漢與述戰於廣都之間八戰八克}
