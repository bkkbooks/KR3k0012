  - {type: variant, offset: 3176, length: 0, content: '', krp: 兵擊貪墮之卒}
  - {type: variant, offset: 3178, length: 2, content: 非置, krp: 必勝勝而後守則必固是以魏武雜選武力叅以周同異爲}
  - {type: variant, offset: 3181, length: 19, content: 死地使人人自為戰今予之生地皆走寧尚可得, krp: 宻教宣其用事至是}
