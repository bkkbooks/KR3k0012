  - {type: variant, offset: 260, length: 261, content: 利也又曰孟懿子陽虎伐鄆鄆人將戰又曰宋多責賂於鄭鄭人不堪故以絕魯及齊與宋衛燕戰不書所戰後也又曰冬宋人以諸侯伐鄭報宋之戰也又曰齊人侵魯疆疆吏來告曰疆場之事慎守其一而備其不虞姑盡所備焉事至而戰又何謁焉又曰狄人伐衛衛懿公好鶴鶴有乘軒者將戰國人受甲者皆曰使鶴鶴實有祿位余焉能戰又曰里克諫曰故君之嗣適不可以帥師君失其官帥師不威將焉用之且臣聞皋落氏將戰君其舍之又曰楚人伐宋以救鄭宋公將戰大司馬固諫曰天之棄啇久矣君將興之弗可赦也已又曰子魚曰君未知戰勍敵之人阨而未成列天贊我也又曰公曰君子不重傷不禽二毛子魚曰且今之勍者皆吾敵也雖及胡耇獲則取, SBCK: 欲擊}
