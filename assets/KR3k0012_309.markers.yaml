  - {type: variant, offset: 2539, length: 272, content: 却敵合於義既戰季孫問冉有曰子於戰學之乎性達之乎對曰學之季孫曰從事孔子茲于學冉有曰即學於孔子也孔子者大聖兼該文武並用也適聞其戰法猶未之詳也季孫樊遲以告孔子子曰季孫於是乎可謂悅人之有能矣又曰孔子曰黃帝服牛乘馬擾馴猛獸以與炎帝戰于阪泉之野又曰子貢言志曰願得齊楚合戰於漭蕩之野埃塵連接挺刃交兵國語曰申包胥曰夫戰智為始仁次之勇次之不智則不知人之極不仁則不共三軍饑勞之殃不勇則不能斷疑以發大計戰國策曰魏太子自將過宋水黃徐子曰臣有百戰之術今太子自將攻齊大勝不過有魏而貴不益為王若不勝即墨世無魏矣此臣百勝之術也太子曰請從公言而還太子上車請還其御曰將出而還與敗北, WYG: ''}
