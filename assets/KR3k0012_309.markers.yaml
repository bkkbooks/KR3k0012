  - {type: variant, offset: 992, length: 449, content: 以一戰戰則請從公與之乘戰于長勺公將鼓之翽曰未可齊人三鼓曰可矣遂逐齊師既克公問其故對曰夫戰勇氣也一鼓作氣再而衰三而竭我盈彼竭故克之夫大國難測也懼有伏焉吾視其轍亂望其旗靡故逐之又曰丙戍復戰大敗吳師獲太子友王孫彌庸又曰欲獻子曰二憾往矣弗備必敗彘子曰鄭人勸戰弗敢從也楚人求成弗能好也又曰夫禮樂慈愛戰所蓄也又曰楚子與若敖氏戰于睪滸睪滸楚地伯棼射王汰輈及鼓跗著於丁寧伯棼子越椒也輈車轅汰過也箭過車轅上也丁寧鉦也又射汰輈以貫笠轂兵車尊者則邊人執笠依轂下以禦寒暑師懼退王使巡師曰吾先君文王克息獲三矢焉伯棼竊其二盡於是矣鼓而進之遂滅若敖氏又曰晉楚交戰叔山冉搏人以投中車折軾晉師乃止又曰晉侯使張骼輔躒致楚師求御于鄭欲得鄭人自御知其地利者也鄭人卜宛射犬吉射犬鄭公孫也將及楚師而後從之乘皆踞轉而鼓琴轉衣裝也近不告而馳之皆取冑於橐而冑入壘皆下搏人以投收禽挾囚禽獲也弗待而出又曰子蒲曰吾未知吳道使楚人先與吳人戰又曰吳師居麋子期將焚之子西曰父兄親暴骨焉不能收而又焚之不可子期曰國亡矣豈憚焚之焚之而又戰又曰吳伐楚師及清發清發水名將, SBCK: ''}
