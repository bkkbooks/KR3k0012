  - {type: variant, offset: 3156, length: 0, content: '', krp: 棄我乎遼復還突圍拔出餘衆權人馬皆披靡披疋靡反無敢當者自朝戰至日中呉人奪氣還脩守備衆心乃安諸將咸服權攻合肥十餘日城不可拔乃引退遼率諸軍追擊之幾復獲權孫盛曰夫}
