  - {type: variant, offset: 1453, length: 1561, content: 乎若知不免而致死必敗我若使先濟者知免後者慕之蔑有鬥心矣半濟而後可擊也從之又敗之楚人為食吳人及之奔食而又從之敗諸雍澨五戰及郢奔食食者走不陣故不在戰數數也澨時制切又曰晉侯逆秦師使大夫韓簡視師復曰師少於我鬥士倍我公曰何故對曰出因其資謂奔梁求秦也入用其寵為秦所納也飢食其粟三施而無報是以來也今又擊之我怠秦奮倍猶未也戰于韓原晉戎馬還濘而止濘泥也還便旋也小駟不調故還泥中濘乃定切秦伯獲晉侯以歸晉曲而怠秦直而怒所以勝也又曰楚子伐隋軍於漢淮之間隋將季梁謂隋侯曰請下之弗許而後戰下之請服所以怒我而怠寇也隋少師曰必速戰不然將失楚師戰于速杞隋師敗績若用季梁之謀必勝矣又曰吳楚二師陣于柏舉吳子闔閭之弟夫概王晨請於闔閭曰楚相囊瓦不仁其臣莫有死志先伐其卒必奔而後大師繼之必克以其屬五千先擊囊瓦之卒楚師亂吳師大敗之又曰晉師伐楚苗賁皇言於晉侯曰楚之良在其中軍王族而已請分良以擊其左右而三軍萃於卒萃集必大敗之及戰晉將呂錡射楚恭王中目錡魚綺切楚師霄遁晉師入楚三日館穀又曰求曰若不可則君無出一子帥師背城而戰不屬者非魯人也當子之身齊人伐魯而不能戰子之恥也又曰彭城之役晉楚遇於靡角之谷晉侯將遁矣雍子發命於軍曰恤老幼反孤疾二人役歸一人簡兵蒐乘秣馬蓐食師陣焚次明日將戰行歸者而逸楚囚楚師霄潰又曰入我河曲伐我涑川俘我王官翦我羈馬我是以有河曲之戰又曰欒武子欲報楚韓獻子曰無庸使重其罪民將叛之無民孰戰又曰晉楚遇於鄢陵范文子不欲戰郄至曰韓之戰惠公不振旅又曰潘尪之子黨與養由基蹲甲而射之以示王曰君有二臣如此何憂於戰又曰苗賁皇徇曰蒐乘補卒秣馬利兵脩陣固列蓐食申禱明日復戰乃逸楚囚又曰智武子曰大勞未艾君子勞心小人勞力先王之制諸侯皆不欲戰乃許鄭成又曰晉陽處父侵蔡楚子上救之與晉師夾江而軍陽子患之使謂子上曰吾聞之文不犯順武不違敵子若欲戰則吾退舍子濟而陣遲速唯命又曰宣子曰秦獲穿也獲一卿矣秦以勝歸我何以報乃皆出戰交綏公羊傳曰已巳晉侯及楚戰城濮楚師敗績此大戰也又曰詐戰不日此何以日詐卒也齊人語也又曰晉人及秦伯戰于殽秦敗或曰襄公稱人何貶也君在殯而用師詐戰又曰狐壤之戰隱公獲焉然則何以不言戰諱獲也又曰齊侯衛侯鄭伯來戰于郎此偏戰也何以不言師敗績內不言戰乃敗績又曰及鄭師伐宋丁未戰于宋戰不言伐何避嫌也惡乎嫌嫌與鄭人戰也此偏戰也何以不言師敗績內不言戰言戰乃敗績與鄭人戰於宋地故舉伐以明之也家語曰齊國書伐魯書齊卿也季康子使冉求帥左師衛之樊遲為右季氏曰須也弱須遲名弱幼也有子曰能用命矣及齊師戰于郊未踰溝前有溝眾不肯踰也樊遲曰非不能也不信子也言季孫德不素著不為民所信也請三交而踰之與眾要信三交而踰溝也如之眾從之師入齊齊軍遁冉有用戈故能入焉子聞之曰義也在軍能却敵合於義既戰季孫問冉有曰子於戰學之乎性達之乎對曰學之季孫曰從事孔子茲于學冉有曰即學於孔子也孔子者大聖兼該文武並用也適聞其戰法猶未之詳也季孫樊遲以告孔子子曰季孫於是乎可謂悅人之有能矣又曰孔子曰黃帝服牛乘馬擾馴猛獸以與炎帝戰于阪泉之野又曰子貢言志曰願得齊楚合戰於漭蕩之野埃塵連接挺刃交兵國語曰申包胥曰夫戰智為始仁次之勇次之不智則不知人之極不仁則不共三軍饑勞之殃不勇則不能斷疑以發大計戰國策曰魏太子自將過宋水黃徐子曰臣有百戰之術今太子自將攻齊大勝不過有魏而貴不益為王若不勝即墨世無魏矣此臣百勝之術也太子曰請從公言而還太子上車請還其御曰將出而還與敗北同不如遂行乃與齊戰而死史記曰黃帝教熊羆貙虎以與炎帝戰于阪泉之野服虔曰阪泉地名皇甫謚曰在上谷三戰然後得行其志𧈪尤作亂不用帝命黃帝乃徵師諸侯與𧈪尤戰於𣵠鹿之野服虔曰𣵠鹿山名在𣵠郡張晏曰𣵠鹿在上谷遂擒𧈪尤皇覽曰𧈪尤冢在東平郡壽張縣關鄉城中高七尺民常十月初祀之有赤氣出如疋絳帛名為𧈪尤旗又曰卿子冠軍威振楚國名聞諸侯乃遣當陽君蒲將軍將卒張晏曰率黥布二萬人渡河救鉅鹿戰小利陳餘復請兵羽悉引兵渡河已渡皆沉船破金甑燒廬舍持, SBCK: 齎}
