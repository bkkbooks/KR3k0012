  - {type: variant, offset: 3452, length: 455, content: 多殺士卒睢水為之不流圍漢王三匝大風從西北起折木發屋揚沙石晝晦楚軍大亂而漢王得與數十騎遁去過沛使求室家而室家亦已亡不相得漢王道逢孝惠魯元公主載行楚騎追急漢王推墮二子滕公下收載遂得脫又張騫傳曰身毒國在大夏東南可數千里其俗土著與大夏同而卑濕暑熱其民乘象以戰又敘傳曰述趙充國辛慶忌云兵家之策惟在不戰又曰西南夷傳曰姑繒葉瑜復反遣水衡都尉呂辟胡將郡兵擊之辟音壁辟胡不進蠻夷遂殺益州太守乘勝與辟胡戰戰士乃溺水死者四千餘人復攻武威張掖酒泉燒民廬舍六年隴西太守孫羗擊破之又曰蕭何功最盛封酇侯所食邑最多功臣皆曰臣等被堅執銳多者百餘戰少者數十合攻城略地大小各有差今何未嘗有汗馬之勞顧居臣上何也又曰高帝末黥布反渡淮擊楚楚發兵與戰徐潼間楚三軍欲以相救為奇兵或說楚將曰布善用兵人素畏之且兵法自戰其地為散地今別為三軍彼敗吾一軍餘皆走安能相救楚將不聽布果破其一軍二軍散走遂西與上兵遇蘄西大戰布軍敗走又曰趙充國討先零羌久屯聚解弛覩見大軍棄輜重欲度湟水道阨狹充國徐行驅之或曰逐利行遲充國曰此窮寇不可迫也緩之則走不顧急之則還致死諸將校皆曰善虜果赴水, SBCK: ''}
