  body:
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 四十戰中後漢書曰呉漢討公孫􅄒乃進軍攻廣都拔之光武戒漢曰成都十餘萬衆不可輕也但堅據廣都待其來攻勿與爭鋒􅀂不敢來公轉營迫之須其力疲乃可擊也漢乗利遂自將歩􅀐二萬餘進逼成都去城十餘里阻江北爲營作浮橋使副將劉尚將萬餘人屯於江南相去二十餘里帝聞大驚使讓漢曰公旣輕敵深入又與尚別營事有緩急不復相及賊􅀂出兵綴公而大衆攻尚尚破公即破矣急引兵還廣都詔書未到􅄒果使其將謝豐􅀽􅁻攻漢使別將攻尚漢敗入壁豐圍之漢乃召諸將勵之曰今與劉尚二處受圍􅀔旣不接其禍難量欲潜師就尚於江南并兵禦之􅀂能同心一力人自爲戰大功可立如其不然敗必無餘成敗之機在此舉也於是饗士秣馬閇營三日不出乃多掛幡旗使煙火不絶夜衘枚引兵與尚合軍豐等不􅁴明日分兵拒水北自將攻江南漢悉兵迎戰自晨至晡遂大破之斬謝豐􅀽吉􅀗甲首五千餘級於是引還廣都尚拒􅄒帝報曰公還廣都甚得其冝述必不敢畧尚而擊公也畧猶過也􅀂先攻尚公從廣都五十里悉歩􅀐赴之適當值其疲困破之必矣自是漢與述戰於廣都之間八戰八克又曰涼州賊王國圍陳倉不拔而去皇甫嵩進兵擊之董卓曰不可兵法窮宼勿迫歸衆勿追今我追國是迫歸衆追窮㓂也困獸猶闘蜂蠆有毒況大衆乎嵩曰不然前吾不擊避其銳也今而擊之待其衰也所擊疲師非歸衆也國衆且走莫有闘志以整擊亂非窮宼也遂獨進擊之使卓爲後拒連戰大破斬首萬餘級國走而死又曰曹操擊陶謙還過拔取睢陵夏丘皆屠之殺男女數十萬人雞犬無餘泗水爲之不流又曰廉范遷雲中太守㑹匈奴大入塞烽火曰通故事虜入過五千人移書傍郡吏欲傳檄求救范不聽自率士卒摧之范兵不敵乃令軍中蓐食晨往赴之斬首數百級續漢書曰耿弇字伯照扶風人少學詩禮見郡督尉試􅀐士建旗鼓肆馳騁由是心善將率後上聞弇爲張步所攻欲自往陳俊曰歩兵盛可且􅐬營待上至弇曰上且到臣子當擊牛釃酒以待百官反欲以賊虜遺君父耶遂合戰破之蜀志曰夏侯淵敗曹公爭漢中地運米北山下數千萬囊黄忠以爲可取趙雲遣兵隨忠取米雲將數十人輕行出圍行視忠等值曹公揚兵大出雲􅀔逼且􅋐且却入營更大開門偃旗鼓公軍至疑有伏兵雲雷鼓於後射公公軍驚駭自相蹂踐墮漢水死者甚多先主明旦自來至雲營圍視昨戰處曰子龍一身都爲膽子龍趙雲字也作樂飲宴至暝􅀳中興書曰􅁊温歩􅀐四萬自江陵向關中伐僞立荆州刺史郭敬進擊青泥皆破之至于灞上戎首多降居民皆壷漿路側耆老或泣曰不圗今日復見官軍兵師符徤以五千人守長安小城時運道艱難而􅀜中大飢温率衆還詔遣侍中黄門慰勞於襄陽犒軍十一年温進征討大都督司兾諸軍事委以專征之任温乃合衆治兵七月率衆伐羌十月温次伊水羌師姚襄來逆軍屯于北遣使詣温奉身歸命願勑前鋒小却當拜伏路左温荅曰我自脩復中原展敬山陵無豫君事欲來相迫何復求却於是方􅁤齊進襄率驍勇萬餘人距水前戰温命小弟沖及諸將奮擊襄大敗奔北自相殺害死者數千越北芒而奔走温屯故太極殿前賊周成率衆降温徙入金墉謁先帝諸陵􅀍侵毁者皆繕復之選陵令守護又曰謝􅀇進號冠軍將軍加領徐州刺史還于廣陵以功封東興縣侯八年􅀇至符堅傾國大岀衆號百萬先遣符融慕容煒張蚝符方四師至潁口梁成王先等守洛澗詔加衛將軍安爲征討大都督􅀇爲前鋒都督徐兖青三州楊州之晉陵幽州之燕國諸軍事與叔父征虜將軍石從弟輔國將軍琰西中郎將􅁊伊龍驤將軍玄等拒之衆凡八萬􅀇先遣廣陵劉牢之五千人直指洛澗邸斬梁成及成苐雲歩􅀐崩潰争赴淮水斬首萬級生擒五千餘人十月符融進屯壽陽􅀇與琰等選精銳八千人決戰肥水南臨陣斬符融俘獲萬計得僞輦及雲母車其餘寳器山積錦􅄢數萬端牛馬驢騾駱駞十萬疋又曰符堅率衆五十萬向壽春謂融曰晉人􅀂知朕來便一時還南固守長江雖百萬之衆無所用之今祕吾來令彼不知彼顧江東在此必當戰􅀂其潰敗求守長江不復可得則吾事濟矣乃秘不言堅自來於是以小將旗列屯肥北􅀳征虜將軍謝石冠軍將軍謝玄輔國將軍謝琰西中郎將􅁊伊等並阻水南一時渉渡肥水融曰及呉未成列擊之必克也堅曰不然我長於歩彼便於水今捨歩入水是以所短擊其所長非良䇿矣可須彼過水一時擊之彼旣背水進退無術乃可盡殺然後船舫渡江直指㑹稽觀禹朝萬國之處不亦樂乎列陣以待晉軍晉軍旣濟戰于肥北堅􅀍重瘡三軍潰亂堅馳還長安晉書曰劉毅泝江追􅁊􅀇戰於崢嶸洲于時官軍數千玄兵甚盛而玄懼有敗衂常􅃞輕舸於舫側故其衆莫有闘心官軍乗風縱火盡銳爭先玄衆大潰又曰將軍王敦反兵至石頭欲攻晉將劉隗五罪切其將杜􅀪曰劉隗死士衆多未易可剋不如石頭其守將周禮少恩兵不爲之用必敗禮敗隗自走敦從之禮果開城門納弘諸將與敦戰晉師大敗又曰前􅁗符堅率兵來伐晉將軍謝石謝􅀇拒之堅遣其尚書朱序􅀃石等以衆盛欲脅而降之序謂石曰􅀂秦百萬之衆皆至則莫可以敵也及其衆未集冝在速戰􅀂挫其前鋒可以得志晉將遣使請戰許之堅師列陣逼肥水晉師不得度晉將使謂堅將符融曰君懸軍深入置陣逼水此持乆之計豈欲戰者乎􅀂小退師令將士周旋僕與君公緩轡而觀之不亦羙也堅衆皆曰冝阻水莫令得上我衆彼寡勢必萬全堅曰但却軍令得過我以鐵􅀐向水逼而殺之不然因其濟水而覆之於是麾軍却陣軍遂奔退制之不可止玄以八千精卒度肥逼之融馳􅀐略陣馬倒􅀍殺軍遂大敗晉師乗勝追擊死者相枕堅爲流矢所中單􅀐遁走又慕容超載記曰於是賀頼盧公孫五樓爲地道出戰王師不利崔鴻十六國春秋曰前秦符堅遣將吕光領兵伐􅀛兹光軍其城南五里爲營深溝髙壘廣設疑兵以木爲人􅀍之以甲羅之壘上􅀛兹王帛純嬰城自守乃傾國財寳請諸國來救温􅀫尉頭等國王合七十餘萬衆以救之胡便弓馬善矛矟鎧如連鏁射不可入衆甚憚之諸將咸欲毎營結陣按兵以拒之光曰彼衆我寡衆營又相逺􅀔分力散非良䇿也於是遷營相接陣爲勾鏁之法精􅀐爲遊軍彌縫其闕戰于城西大敗之純遁走王侯降者}
