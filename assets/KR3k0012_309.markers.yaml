  - {type: variant, offset: 3208, length: 4, content: 至東城乃, WYG: 國圍陳倉不拔而遂去皇甫嵩進兵擊之董卓曰不可兵法窮冦勿廹歸衆勿追今我追國是廹歸衆追窮冦也困獸猶鬬蜂蠆}
