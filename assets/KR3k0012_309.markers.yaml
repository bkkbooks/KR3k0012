  - {type: variant, offset: 3509, length: 0, content: '', WYG: 利崔鴻十六國春秋曰前秦苻堅遣將吕光領兵伐龜兹光軍其城南五里為營深溝髙壘廣設疑兵以木為人被之以甲羅之壘上龜兹王帛純嬰城自守乃傾國財寳請諸國來救温宿尉頭等國王合七十餘萬衆以救之胡便弓馬善矛矟如連鏁射不可入衆甚憚之諸將咸欲每營結陣按兵以拒之光曰彼衆我寡衆營又}
