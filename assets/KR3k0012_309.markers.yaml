  - {type: variant, offset: 113, length: 1, content: 陰, SBCK: 西魏末東魏遣將侯景髙敖曹等圍西魏將獨􅀌信於洛陽東魏大將齊神武繼後西魏大將周文帝率軍救信進軍􅈆東景等夜解圍去及晨周文率輕􅀐追之至於河上景等北據河橋南屬邙山爲陣與諸軍合戰周文馬中流矢驚逸遂失之因此軍中擾亂都督李穆下馬授周文帝以復振於是大捷斬髙敖曹虜其甲士万五千赴河死者以萬數是日置陣旣大首尾懸逺從辰至未戰數十合氛霧四塞莫能相知獨􅀌信李逺居右趙貴恰峯居左戰並不利又不知周文所在皆棄其卒先歸開府唐公等爲後軍遇信等退即與俱還由是乃班師洛陽亦失守大軍至弘農守將皆巳棄城西走又曰後魏末賊莫折後熾所在宼掠州人李賢率郷兵與涇州刺史史寧討之後熾列陣以待賢謂寧曰賊聚結歳乆徒衆甚多數州之人皆爲其用我􅀂揔爲一陣併力擊之彼旣同惡相濟理必揔萃於我􅀔旣不分衆寡莫敵我便救首尾無以制之今􅀂令諸軍分爲數陣多設旗鼓犄角而前以脅諸柵以別統精兵直指後熾按甲而待莫與交鋒後熾欲前則懼我}
