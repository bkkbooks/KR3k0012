  - {type: variant, offset: 3462, length: 0, content: '', WYG: 又曰廉范遷雲中太守㑹匈奴大入塞烽火日逼故事虜入過五千人移書傍郡吏欲傳檄求救范不聽自率士摧之范兵不敵乃令軍中蓐食晨往赴之斬首數百級續漢書曰耿弇字伯昭扶風人少學詩禮見郡督尉試騎士建旗鼓肆馳騁由是心善將率後上聞弇為張步所攻欲自往陳俊曰步兵盛可且閉營待上至弇曰上且到臣子當擊牛釃酒以待百官反欲以賊虜遺君父耶遂合戰破之蜀志曰夏侯淵敗曹公争漢中地運米北山下數千萬􅇸黄忠以為可取趙雲遣兵隨忠取米雲將數十人輕行出}
  - {type: page-break, offset: 3462, content: '', id: KR3k0012_WYG_309-3b, image: WYG0895/WYG0895-0669b.png}
  - {type: variant, offset: 3463, length: 0, content: '', WYG: 行視忠等值曹公揚兵大出雲勢逼且鬭且却入營更大閉門偃軍鼓公軍至疑有伏兵雲擂鼓於後射公公軍驚駭自相蹂踐墮}
  - {type: variant, offset: 3464, length: 0, content: '', WYG: 水死者甚多先主明旦自來至雲營圍視昨戰䖏曰子龍一身都是膽子龍趙雲字也作樂飲宴至暝晉中興書曰桓温步騎四萬自江陵向關中伐偽立荆州刺史郭敬進擊青泥皆破之至于灞上戎首多降居民皆壺漿路側耆老或泣曰不圗今日復見官軍兵帥苻健以五千人守長安小城時運道艱難而關中大飢温率衆還詔遣侍中黄門慰勞於襄陽犒軍十一年温進征討大都督司冀州諸軍事委以専征之任温乃合衆治兵七月率衆伐羗十月温次伊水羗帥姚襄來逆軍屯于北遣使詣温奉身歸命願勅前鋒小却當拜伏路左温答曰我自修復中原展敬山陵無豫君事欲來相迫何復求却於是方軌齊進襄率驍勇萬餘人距水前戰温命小弟冲及諸將奮擊襄大敗奔北自相殺害死者數千越北芒而奔走温屯故太極殿前賊周成率衆降温徙入金墉謁先帝諸陵被侵毁者皆修復之選陵令守護又曰謝𤣥進號冠軍將軍加領徐州刺史還于廣陵以功封東興縣侯八年秦主苻堅傾國大出衆號百萬先遣苻融慕容煒張蚝苻方四師至穎口梁成}
