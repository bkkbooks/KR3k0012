  - {type: variant, offset: 177, length: 227, content: 二年晉荀林父與楚子戰于邲晉師敗績又曰吳伐楚王使執燧象以奔吳師又曰齊伯郭啟伐莒子將戰宛羊牧諫之曰齊師賤其求不多不如下之又曰諸侯之戍謀曰若華氏知困而致死楚恥無功而疾戰非吾利也又曰孟懿子陽虎伐鄆鄆人將戰又曰宋多責賂於鄭鄭人不堪故以絕魯及齊與宋衛燕戰不書所戰後也又曰冬宋人以諸侯伐鄭報宋之戰也又曰齊人侵魯疆疆吏來告曰疆場之事慎守其一而備其不虞姑盡所備焉事至而戰又何謁焉又曰狄人伐衛衛懿公好鶴鶴有乘軒者將戰國人受甲者皆曰使鶴鶴實有祿位余焉能戰又曰里克諫曰故君之嗣適, WYG: 餘萬衆}
