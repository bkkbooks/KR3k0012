  - {type: variant, offset: 3600, length: 0, content: '', WYG: 魏末東魏遣將侯景髙敖曹等圍西魏將獨孤信於洛陽東魏大將齊神武繼後西魏大將周文等率軍救信進軍瀍東景等夜解圍去及晨周文率輕騎追之至於河上景等北據河橋}
  - {type: page-break, offset: 3600, content: '', id: KR3k0012_WYG_309-8b, image: WYG0895/WYG0895-0671d.png}
  - {type: variant, offset: 3601, length: 2, content: 夷傳, WYG: 屬邙山為陣與諸軍合戰周文馬中流矢驚逸遂失之因此軍中擾亂都督李穆以馬授周文兵復振于是大捷斬髙敖曹虜其甲士萬五千赴河死者以萬數是日置陣既大首尾懸逺從辰至未戰數十合氛霧四塞莫能相知獨孤信李逺居右趙貴怡峯居左戰並不利又知周文所在皆棄其率先歸開府唐公等為後軍遇信等退即與俱還由是乃班師洛陽亦失守大軍至𢎞農守將皆已棄城西走又}
  - {type: page-break, offset: 3601, content: '', id: KR3k0012_WYG_309-9a, image: WYG0895/WYG0895-0672a.png}
