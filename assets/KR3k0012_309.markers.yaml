  - {type: variant, offset: 3465, length: 0, content: '', WYG: 先等守洛澗詔加衛將軍安為征討大都督𤣥為前鋒都督徐兖青}
  - {type: variant, offset: 3466, length: 2, content: 匝大, WYG: 州揚州之晉陵幽州之燕國諸軍事與叔父征虜將軍石從弟輔國將軍琰西中郎將桓伊龍驤將軍𤣥等抵之衆八萬𤣥先遣廣陵劉牢之五千人直指洛澗邸斬梁成及成弟雲步騎奔潰争赴淮水斬首一萬級生擒五千餘人十月苻融進屯夀陽𤣥與琰等選精銳八千人決戰肥水南臨陣斬苻融俘獲萬計得偽輦及雲母車其餘寳噐山積錦罽數萬端牛馬驢騾駱駝十萬疋又曰苻堅率衆五十萬向夀春謂融曰晉人若知朕來便一時還南固守長江雖百萬之衆無所用之今秘吾來令彼不知彼顧江東在此必當戰若其亂敗求守長江不復可得則吾事濟矣乃秘不言堅自來於是以小將旗列屯淝北晉征虜將軍謝石冠軍將軍謝𤣥輔國將軍謝琰西中郎將桓伊等並阻水南一時涉渡淝水融曰及其未成列擊之必克也堅曰不然我長於歩彼便於水今捨歩入水是以所短撃其所長非良策矣可須彼過水一時擊之彼既背水進退無術乃可盡殺然後船舫渡江直指㑹稽觀禹朝萬國之處不亦樂乎列陳以待晉軍既濟戰于淝北堅被重創三軍潰亂堅馳還長安晉書曰劉毅泝江追桓𤣥戰於峥嶸州于時官軍數千𤣥兵甚盛而𤣥懼有敗衂常漾輕舸扵舫側故其衆莫有鬭心官軍乘}
