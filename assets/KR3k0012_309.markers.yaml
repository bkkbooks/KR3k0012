  - {type: variant, offset: 3260, length: 127, content: 霸有天下今卒困於此天之亡我非戰之罪也今日固決死願為諸君決戰又啇君傳曰鞅今行之十年秦民道不拾遺山無盜賊民勇於公戰怯於私鬥又藺相如傳曰廉頗曰我為趙將有攻城野戰之功而藺相如徒以口舌為勞而位居我上又曰秦人開關延敵九國之師遯逃追亡逐北伏尸百萬流血漂鹵徐廣曰鹵盾也漢, SBCK: 齊}
