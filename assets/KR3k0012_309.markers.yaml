  - {type: variant, offset: 3254, length: 0, content: '', WYG: 疲師非歸衆也國衆且走莫有鬬志以整擊亂非窮冦也遂獨進擊之使卓為後拒連戰大破斬首萬餘級國走而死人曰曹操擊陶謙袁過拔取睢陵夏丘}
