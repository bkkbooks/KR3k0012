  - {type: variant, offset: 1508, length: 160, content: 雍澨五戰及郢奔食食者走不陣故不在戰數數也澨時制切又曰晉侯逆秦師使大夫韓簡視師復曰師少於我鬥士倍我公曰何故對曰出因其資謂奔梁求秦也入用其寵為秦所納也飢食其粟三施而無報是以來也今又擊之我怠秦奮倍猶未也戰于韓原晉戎馬還濘而止濘泥也還便旋也小駟不調故還泥中濘乃定切秦伯獲晉侯以歸晉曲而怠秦直而怒所以勝也又曰楚子伐隋軍於漢淮之間隋, WYG: ''}
