  - {type: variant, offset: 3173, length: 38, content: 而戰之其勢非置之死地使人人自為戰今予之生地皆走寧尚可得而用之乎又曰項王至東城, SBCK: 奪氣還脩守備衆心}
  - {type: variant, offset: 3175, length: 0, content: '', krp: 生患專任怯者則懼心難保且彼衆我寡心必懷貪堕以致命}
