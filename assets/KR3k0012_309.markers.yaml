  - {type: variant, offset: 13, length: 126, content: 者憚也驚之也說文曰戰鬭也開元文字曰仲秋大閱戒眾庶脩戰法陰疑於陽必戰是也凡師皆陣曰戰謂堅而有備各得其所成敗決於志力也易曰上六龍戰于野其血玄黃陰之為道卑順不盈乃全其美盛而不已固陽之地陽所不堪故戰于野也又曰陰疑於陽必戰為其嫌於無陽也故稱龍焉為其嫌於非陽而戰也, WYG: 中後漢}
