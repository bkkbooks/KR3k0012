  - {type: variant, offset: 3630, length: 2, content: 蠻夷, WYG: 軍姚襄齊人嬰城固守以為汾州之援齊平原王段孝先蘭陵王髙長恭引兵大至憲命将士陣而待之大將軍韓歡為齊人所乘}
  - {type: page-break, offset: 3630, content: '', id: KR3k0012_WYG_309-10b, image: WYG0895/WYG0895-0672d.png}
  - {type: variant, offset: 3633, length: 2, content: 殺益, WYG: 以奔退憲身自督戰齊衆稍却㑹日暮乃各收軍又曰齊神武遂渡河逼華}
  - {type: variant, offset: 3636, length: 0, content: '', WYG: 刺史王羆嚴守知不可攻渉洛軍於許原西}
  - {type: variant, offset: 3637, length: 1, content: 守, WYG: 祖據渭南徴諸州兵皆㑹乃召諸將謂之曰髙歡越山渡河逺來至此天亡之時也吾欲擊之何如諸將咸以衆寡不敵請待歡更西以見其勢太祖曰歡若得至咸陽人情轉騷擾今及其新至便可擊之即造浮橋於渭令軍人齎三日糧輕騎渡渭輜重自渭南夾渭而西冬十月壬辰至沙苑距齊神武軍六十餘里齊神武聞太祖至引軍來㑹癸巳旦侯騎告齊神武軍且至望太祖軍少竟馳而進不為行列總萃於左軍兵將交太祖鳴鼔士皆奮起于謹等六軍與之合戰李弼等率鐵騎横擊之絶其軍為二遂大破斬六千餘級臨陣降者二萬餘人通典曰後周末隋文帝作相輔少主相州總管尉遲逈舉兵不從隋文遣將韋孝寛討之逈男惇率衆十萬入武徳軍於沁東拒之與孝寛隔水相持乃布兵二十餘里麾軍小却欲待孝寛軍半度而擊之孝寛因其却乃鳴鼔齊進惇遂大敗又曰後周末隋文帝遣將韋孝寛率兵討尉遲逈於相州軍進至州逈悉出其卒十三萬陣扵城南逈舊習軍旅雖老猶被甲臨陣其麾下三千兵皆關中人為之力戰寛等軍失利而却鄴中士女觀者如堵髙熲與李詢乃整陣先犯觀者因其擾而}
