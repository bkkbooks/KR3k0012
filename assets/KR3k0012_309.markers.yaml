  - {type: variant, offset: 1487, length: 1, content: 從, WYG: 漢乗利遂自將歩騎二萬餘進逼成都而去城十餘里阻江北為營作浮橋使副將劉尚將萬餘人屯於江南相去二十餘里帝聞大驚使讓漢曰公既輕敵深入又與尚别營事有緩急不復相及賊若出兵綴公而大衆攻尚尚破公即敗矣急引兵還廣都詔書未到述果使其將謝豐袁吉攻漢使别將攻尚漢敗入壁豐圍}
