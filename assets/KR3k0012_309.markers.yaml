  - {type: variant, offset: 3629, length: 0, content: '', WYG: 能救之乃北攻姚襄城陷之時汾州又見圍日乆糧援路絶遣柱國宇文盛運粟以饋之憲自入兩乳谷襲克齊栢栢城}
