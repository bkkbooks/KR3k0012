  - {type: variant, offset: 3604, length: 16, content: 姑繒葉瑜復反遣水衡都尉呂辟胡將郡, WYG: 後魏末賊莫折後熾所在冦掠州人李賢率鄊}
  - {type: punctuation, offset: 3610, content: ，, id: KR3k0012_CHANT_309-bkkpn1192}
  - {type: 'tls:seg', offset: 3610, content: '', id: KR3k0012_CHANT_309-47a.5}
  - {type: variant, offset: 3621, length: 0, content: '', WYG: 與涇州刺史史寧討之後熾列陣以待賢謂寧曰賊聚結嵗乆徒衆甚多數州之人皆為其用我若總為一陣併力}
  - {type: punctuation, offset: 3623, content: 。, id: KR3k0012_CHANT_309-bkkpn1193}
  - {type: 'tls:seg', offset: 3623, content: '', id: KR3k0012_CHANT_309-47a.6}
  - {type: variant, offset: 3623, length: 0, content: '', WYG: 彼既同惡相濟理必總萃於我勢既不分衆寡莫敵我便救首尾無以制之今若令諸軍分為數陣多設旗鼓犄角而前以脅諸柵以别將統精兵直指後熾按甲而待莫與交鋒後熾欲前則懼我疑兵令其進不得戰退不得走以俟其懈攻之必破後熾一敗則衆柵不攻自拔矣寜不從戰屢敗北賢乃率數百騎徑入後熾營收其妻子僮𨽻五百餘人并輜重等屬後熾與寧戰勝方欲追奔忽與賢遇乃棄寧與賢接戰賊遂大敗後熾單騎遁走北史曰後魏孝文南伐齊將陳顯達率衆拒戰元嵩身修三丈免胄直前勇冠三軍將士從之顯達奔潰帝大恱曰任城康王大有徳福文武頓出其門以功賜爵髙平縣侯後周書曰天和六年宇文憲帥衆二萬出自龍門齊將新蔡王康徳以憲兵至潛軍宵遁憲乃西歸仍掘移汾水水南堡復入於齊謂略不及逺遂弛邊備憲乃渡河攻其伏龍等四城二日盡拔又進攻張}
  - {type: page-break, offset: 3623, content: '', id: KR3k0012_WYG_309-9b, image: WYG0895/WYG0895-0672b.png}
