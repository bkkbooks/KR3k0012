  - {type: variant, offset: 1669, length: 863, content: 季梁謂隋侯曰請下之弗許而後戰下之請服所以怒我而怠寇也隋少師曰必速戰不然將失楚師戰于速杞隋師敗績若用季梁之謀必勝矣又曰吳楚二師陣于柏舉吳子闔閭之弟夫概王晨請於闔閭曰楚相囊瓦不仁其臣莫有死志先伐其卒必奔而後大師繼之必克以其屬五千先擊囊瓦之卒楚師亂吳師大敗之又曰晉師伐楚苗賁皇言於晉侯曰楚之良在其中軍王族而已請分良以擊其左右而三軍萃於卒萃集必大敗之及戰晉將呂錡射楚恭王中目錡魚綺切楚師霄遁晉師入楚三日館穀又曰求曰若不可則君無出一子帥師背城而戰不屬者非魯人也當子之身齊人伐魯而不能戰子之恥也又曰彭城之役晉楚遇於靡角之谷晉侯將遁矣雍子發命於軍曰恤老幼反孤疾二人役歸一人簡兵蒐乘秣馬蓐食師陣焚次明日將戰行歸者而逸楚囚楚師霄潰又曰入我河曲伐我涑川俘我王官翦我羈馬我是以有河曲之戰又曰欒武子欲報楚韓獻子曰無庸使重其罪民將叛之無民孰戰又曰晉楚遇於鄢陵范文子不欲戰郄至曰韓之戰惠公不振旅又曰潘尪之子黨與養由基蹲甲而射之以示王曰君有二臣如此何憂於戰又曰苗賁皇徇曰蒐乘補卒秣馬利兵脩陣固列蓐食申禱明日復戰乃逸楚囚又曰智武子曰大勞未艾君子勞心小人勞力先王之制諸侯皆不欲戰乃許鄭成又曰晉陽處父侵蔡楚子上救之與晉師夾江而軍陽子患之使謂子上曰吾聞之文不犯順武不違敵子若欲戰則吾退舍子濟而陣遲速唯命又曰宣子曰秦獲穿也獲一卿矣秦以勝歸我何以報乃皆出戰交綏公羊傳曰已巳晉侯及楚戰城濮楚師敗績此大戰也又曰詐戰不日此何以日詐卒也齊人語也又曰晉人及秦伯戰于殽秦敗或曰襄公稱人何貶也君在殯而用師詐戰又曰狐壤之戰隱公獲焉然則何以不言戰諱獲也又曰齊侯衛侯鄭伯來戰于郎此偏戰也何以不言師敗績內不言戰乃敗績又曰及鄭師伐宋丁未戰于宋戰不言伐何避嫌也惡乎嫌嫌與鄭人戰也此偏戰也何以不言師敗績內不言戰言戰乃敗績與鄭人戰於宋地故舉伐以明之也家語曰齊國書伐魯書齊卿也季康子使冉求帥左師衛之樊遲為右季氏曰須也弱須遲名弱幼也有子曰能用命矣及齊師戰于郊未踰溝前有溝眾不肯踰也樊遲曰非不能也不信子也言季孫德不素著不為民所信也請三交而踰之與眾要信三交而踰溝也如之眾從之師入齊齊軍遁冉有用戈故能入焉子聞, WYG: 勵}
