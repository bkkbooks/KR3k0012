  - {type: variant, offset: 3197, length: 2, content: 傳論, SBCK: 軍大擊匈奴李廣數自請行上以老不許良乆乃許之大將軍隂受上旨以爲數竒不偶也無令當單于恐不得所欲時公孫敖亡道從廣廣或失道大將軍使長史持醪遺廣因問失道狀長史急責廣之莫府上簿廣曰諸校尉無罪乃我自失道謂其麾下曰廣結髮與匈奴大小七十餘戰今幸從大將軍出接單于兵而大將軍從廣部行廻逺又迷失道豈非天哉終不能復對刀筆吏遂引刀自剄而百姓聞之知與不知皆爲垂泣東觀漢記曰馬援字文淵建武二十四年威武將軍劉向擊武陵五溪蠻夷深入軍没援因復請行時年六十二帝􅉖其老未許之援自請曰臣尚能􅀍甲上馬帝令試之援據鞌顧眄以示可用帝􅀏曰矍鑠哉是翁也遂遣援宋書曰沈慶之討竟陵王誕慶之至城下誕登樓謂曰沈公君白首之年何爲來慶之曰朝廷以君狂愚不足勞少壯故使僕來耳梁書曰王神念少善􅀐射及老不衰甞於武帝前手執二刀楯左右交度馳馬往來冠絶群伍後魏書}
  - {type: page-break, offset: 3197, content: '', id: KR3k0012_SBCK_274-5b}
