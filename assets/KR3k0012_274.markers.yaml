  - {type: variant, offset: 3144, length: 2, content: 賞茂, SBCK: 昔漢光命將坐知千里魏武置法案以從事陳孔璋檄吴將校部曲文曰朝爲仇虜夕爲上將馮衍與田邑書曰今以一節之任建三軍之威豈特寵其八尺之竹􅈊牛之尾也易將史記曰秦師伐趙王使廉頗禦之頗固壁不戰趙王惑秦之間以趙奢之子代頗趙師大敗後漢書曰光武遣馮異代鄧禹車駕送之河南賜以乗輿七尺具劒具謂以寳玉裝飾之東觀記作玉具劒晉書曰石苞爲淮北􅁥軍王琛所奏與吴人交}
  - {type: page-break, offset: 3144, content: '', id: KR3k0012_SBCK_274-3a}
  - {type: variant, offset: 3144, length: 2, content: 賞茂, WYG: 昔漢光武命將坐知千里魏武置法按以從事陳孔璋檄呉將校部曲文曰朝爲仇虜夕爲上將馮衍與田邑書曰今以一莭之任建三軍之威豈特寵其八尺之竹氂牛之尾也易將史記曰秦王伐趙王使亷頗禦之頗固壁不戰趙王惑秦之間以趙奢之子代頗趙師大敗後漢書曰光武遣馮異代鄧禹車駕送之河南賜以乘輿七尺具劍具謂以寳玉装飾之東觀記作玉具劍晉書曰石苞爲淮北監軍王琛所奏與呉人交}
