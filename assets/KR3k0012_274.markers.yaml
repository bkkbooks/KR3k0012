  - {type: variant, offset: 3196, length: 0, content: '', SBCK: 九十矣善爲兵今欲一􅃲而死可得耶又曰元狩四年大}
  - {type: variant, offset: 3196, length: 0, content: '', WYG: 九十矣善爲兵今欲一闘而死可得耶又曰元狩四年大}
