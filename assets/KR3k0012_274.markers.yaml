  - {type: variant, offset: 3144, length: 2, content: 賞茂, krp: 昔漢光命將坐知千里魏武置法案以從事陳孔璋檄吴將校部曲文曰朝爲仇虜夕爲上將馮衍與田邑書曰今以一節之任建三軍之威豈特寵其八尺之竹氂牛之尾也易將史記曰秦師伐趙王使廉頗禦之頗固壁不戰趙王惑秦之間以趙奢之子代頗趙師大敗後漢書曰光武遣馮異代鄧禹車駕送之河南賜以乗輿七尺具劒具謂以寳玉裝飾之東觀記作玉具劒晉書曰石苞爲淮北監軍王琛所奏與吴人交}
  - {type: variant, offset: 3147, length: 4, content: 侯榮高列, SBCK: 先時望氣者云東南有大兵起及琛表至帝甚疑之㑹荆州刺史胡烈表吴人欲大出爲冦苞亦聞吴師}
  - {type: variant, offset: 3147, length: 2, content: 侯榮, WYG: 先時望氣者云東南有大兵起及琛表至帝甚疑之㑹荆州刺史胡烈表呉人欲大出爲宼苞亦聞呉師將入至乃築壘遏之以自固帝聞之謂羊祜曰呉人每來常東西相應豈石苞果有不順乎祜深明之而帝猶疑焉苞子喬爲尚書郎上召之經日不至帝謂爲必叛欲討而隱其事遂下詔以苞不料賊勢築壘遏水勞擾百姓䇿免其官遣太尉義陽王望率其大軍徴之以備非常又勅鎭東將軍琅邪王伷自下邳㑹壽春苞用掾孫鑠計放兵歩出住都亭待罪帝聞之意解及苞詣闕以公還第自耻受任無効而無怨色又曰鎭南將軍杜元凱都督荆州諸軍事襲呉西陵督張政西陵今夷陵郡大破之政呉之名將據要害之地耻無備取敗不以實聞於孫皓元凱欲間呉邊將乃請還其所獲之衆於皓皓果召政遣武昌監劉憲代之故晉軍將至使將帥移易成傾蕩之勢竟殄㓕焉北史曰後周末隋文帝作相尉遲逈據相州舉兵隋文遣鄖公韋孝寛鄖音云爲東道元帥師次沁水水漲兵未得渡吏李詢上宻啟云大將梁士房宇文欣崔宏度等並受尉遲逈餉金軍中騷騷人情大異文帝以爲憂欲代此三人李德林獨進計云公與諸將共是國家貴臣未相伏馭今以挾令之威得使之耳安知後所遣者能盡腹心前遣之人獨致乖異又取金事虛實難明即令换易彼將懼罪恐逃逸便須禁固然則鄖公以下必有驚疑之意且臨敵代將自古所難樂毅所以思燕趙奢之子以之敗趙如愚所見但遣公一腹心明於智畧爲諸將舊來所信伏者速至軍所觀其情僞縱有異意必不敢動文帝大悟即令}
