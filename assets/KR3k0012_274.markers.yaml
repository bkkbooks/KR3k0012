  - {type: variant, offset: 11, length: 189, content: 管子言於桓公曰墾田大邑辟土生粟盡地之利臣不若甯邀邀乃戚也請置以為大田登降辭讓進退閑習臣不若隰朋請置以為大行蚤入晏出犯顏進諫以忠不避死亡不重貴富臣不若東郭牙請置以為大諫平原廣城車不結轍士不旋踵鼓之而三軍之士視死如歸臣不若王子城父請置以為大司馬決獄折中不殺不辜不誣無罪臣不若弦章章賓胥無請置以為大理君若欲理國彊兵則五子者足矣君若欲霸王則夷吾在此桓公善令五子皆任其事以受於管子十年九合, SBCK: ''}
