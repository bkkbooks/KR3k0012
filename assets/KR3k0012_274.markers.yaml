  - {type: variant, offset: 3201, length: 2, content: 興二, SBCK: 山王英之征義陽傅永爲寜朔將軍統軍當長圍遏其南門蕭衍將馬仙琕連營稍進䂓解城圍永謂英曰凶堅豕突意在决戰雅山形要冝早據之英沉吟未决永曰機者如神難遇易失今日不去明朝必爲賊有雖悔無及分英兵夜築城於山上遣統軍張懷等列陣於山下以防之至曉仙琕果至懷等戰敗築城者悉皆奔退仙琕乗勝直趣長圍義陽城人復出挑戰永乃分兵付長史賈思祖令守營壘自將馬歩千人南逆仙琕轘甲揮戈單􅀐先入唯有軍主蔡三虎副之餘人無有及者突陣横過賊射永洞其左股永拔箭復入遂大破之斬仙琕子仙琕燒營席卷而遁英於陣謂永曰公傷矣且還營永曰昔漢祖捫足不欲人知下官雖微國家一帥柰何使虜有傷將之名遂與諸軍追之極夜而返時年七}
