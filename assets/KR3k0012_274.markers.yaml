  - {type: variant, offset: 3154, length: 4, content: 仁西征賦, SBCK: 知後所遣者能盡腹心前遣之人獨致乖異又取金之事虚實難明即令換易彼將懼罪恐逃逸便湏禁固然則鄖公以下必有驚疑之意且臨敵代將自古所難樂毅所以辭燕趙奢之子以之敗趙如愚所見但遣公一腹心明於智略爲諸將舊來所信伏者速至軍所觀其情僞縱有異意必不敢動文帝大悟即令髙頴馳驛往軍所爲諸將節度竟成大功戰國䇿}
