  - {type: variant, offset: 2546, length: 224, content: 禁上貪則下盜也將內顧則士卒淫內顧思妻妾也將有一則眾不服有二則軍無試試法也有三則軍乖背有四則禍及國又曰軍誌曰將謀欲密士眾欲一將眾如一體也攻敵欲疾將謀密則姦心閉士眾一則群心結結如一也攻敵疾則詐不及設軍有此三者則計不奪將謀泄則軍無勢以外窺內則禍不制窺見也謀泄則外見己情虛實其禍不可制也財入營則眾姦會凡為軍使外人以財貨入營內則姦謀奄集其中也將有此三者軍必敗也又曰將無慮則謀士去將無防慮不能從謀故去之將無勇則吏士恐將怯則下無所恃故恐也將遷怒則軍士懼慮也謀也將, SBCK: 勝期年兵}
