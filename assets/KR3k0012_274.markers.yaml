  - {type: variant, offset: 435, length: 347, content: 來各以其勝應之是故扶義而動推理而行掩節斷割掩覆也覆其節制斷割之也因資而成功使彼知吾所出而不知吾所入知吾所舉而不知吾所集始如狐狸彼故輕來合如兕虎敵故奔走也又曰將者必有三隧四義五行一守所謂三隧者上知天道下習地形中察人情凡此三事者乂所從偃隧所謂四義者便國不負兵為主不顧身見難不畏死決疑不辟罪所謂五行者柔而不可卷也剛而不可折也仁而不可犯也信而不可欺也勇而不可枝也所謂一守者神清而不可濁也謀遠而不可慕也操固而不可遷也知明而不可蔽也不貪於貨不淫於物不嚂於辯不推於名不可喜也不可怒也是謂至於窈窈冥冥孰知其情發必中證言必合數動必順時解必中揍揍理通動靜之機明開塞之節審舉錯之利害若合符節疾如彍弩勢如發矢一龍一虵動無常體莫見其所中莫知其所窮攻則不可守守則不可攻也抱朴子曰良將去如收電可見不可追留如丘山可瞻不可動又曰, SBCK: 爲}
