  - {type: variant, offset: 1783, length: 240, content: 將者勇智仁信又曰三軍之眾百萬之師張設輕重在於一人謂之氣機道峽路險名山大塞十人所守千人不過是謂地機善行間諜分散其眾使君臣相怨是謂事機車堅舟利士馬閑習是謂力機此所謂四機者也又曰夫將可樂而不可憂謀可深而不可疑將憂則內疑將有憂色則內外相疑不相信也謀疑則敵國奮多疑則計亂亂則令敵國奮也以此征伐則可致亂故將能清淨應財曰清不擾曰靜能平能整能受諫能聽訟能納人受賢於群英之中若吳納范蠡齊納甯戚之類也能採善言能知國俗能圖山川能裁阨難險難阨皆悉明也能制軍權危者安之懼者懽之叛者還之將有不合去者慰諭還之若, WYG: ''}
