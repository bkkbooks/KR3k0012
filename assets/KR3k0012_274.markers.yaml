  - {type: variant, offset: 512, length: 611, content: 曰將者必有三隧四義五行一守所謂三隧者上知天道下習地形中察人情凡此三事者乂所從偃隧所謂四義者便國不負兵為主不顧身見難不畏死決疑不辟罪所謂五行者柔而不可卷也剛而不可折也仁而不可犯也信而不可欺也勇而不可枝也所謂一守者神清而不可濁也謀遠而不可慕也操固而不可遷也知明而不可蔽也不貪於貨不淫於物不嚂於辯不推於名不可喜也不可怒也是謂至於窈窈冥冥孰知其情發必中證言必合數動必順時解必中揍揍理通動靜之機明開塞之節審舉錯之利害若合符節疾如彍弩勢如發矢一龍一虵動無常體莫見其所中莫知其所窮攻則不可守守則不可攻也抱朴子曰良將去如收電可見不可追留如丘山可瞻不可動又曰大將民之司命社禝存亡於是乎在六韜曰武王問太公曰王者帥師必有股肱羽翼以成威神為之柰何公曰凡舉兵帥師以將為命在其通達不在一術也又曰武王問太公曰論將之道柰何太公曰將有五才十過五才者勇智仁信必也勇則不可犯智則不可亂仁則愛於人信則不欺人必則無二心所謂十過者將有勇而輕死者有急而心速者有貪而喜利者有仁而不忍於人者有智而心怯者有信而喜信人者有廉而不愛人者有智而心緩者有剛毅而自用者有懦而喜用人者是故兵者國之大器存亡之所由也又曰太公曰夜臥早起雖劇不悔妻子之將也長實希言賦物平均十人之將也數行刑戮不避親戚百人之將也訟辯好勝欲正一眾千人之將也知人飢飽念人劇易萬人之將也戰戰慄慄日慎一日十萬人之將也見賢進之行法不枉百萬人之將也知天文悉地理四海如妻子此天師之主也又曰為將冬日不衣裘夏日不操扇天雨不張蓋又曰武, WYG: 淮隂侯傳}
