  - {type: variant, offset: 3152, length: 1, content: 潘, SBCK: 入至乃築壘遏水以自固帝聞之謂羊祜曰吴人毎來常東西相應豈石苞果有不順乎祜深明之而帝猶疑焉命苞子喬爲尚書郎上召之經日不至帝謂爲必叛欲封而隱其事遂下詔以苞不料賊勢築壘遏水勞擾百姓䇿免其官遣太尉義陽王望率其大軍徴之以備非常又勑鎮東將軍琅邪王伷自下邳㑹壽春苞用􅁺孫鑠計放兵歩出住都亭待罪帝聞之意解及苞詣闕以公還第苞自耻受任無効而無怨色又曰鎮南將軍杜元凱都督荆州諸軍事襲吴西陵督張政西陵今夷陵郡大破之政吴之名將據要害之地耻無備取敗不以實聞于孫皓元凱欲間吴邊將乃請還其所獲之衆於皓皓果召政遣武昌􅁥劉憲代之故晉軍將至使將帥移易成傾蕩之勢竟殄滅焉北史曰後周末隋文帝作相尉遲逈據相州舉兵隋文遣鄖公韋孝寛鄖音云爲東道元帥師次沁水水漲兵未得渡吏李詢上密啓云大將梁士彦宇文欣崔􅀪度等並受尉遲逈饟金軍中慅慅人情大異文帝以爲憂欲代此三人李德林獨進計云公與諸將並是國家貴臣未相伏馭今以挾令之威使得之耳}
