  - {type: variant, offset: 1162, length: 560, content: 太公曰出隘塞犯泥塗將必先下步士卒皆定將乃就舍軍未舉火將亦不食三略曰軍井未達將不言渴軍竈未炊將不言飢軍幕未辦時不言倦冬不服裘夏不操扇是謂禮也諸葛亮兵要曰人之忠也猶魚之有淵魚失水則死人失忠則凶故良將守之志立而揚名又曰不愛尺璧而愛寸陰者時難遭而易失也故良將之趍時也衣不解帶履不遺躡又曰貴之而不驕委之而不專扶之而不隱免之而不懼故良將之動也猶璧之不污又曰良將之為政也使人擇之不自舉使法量功不自度故能者不可敝不能者不可飭妄譽者不能進也桓範要集曰夫事之安危實在於將故曰將不知兵以其主與敵主不擇將以其國與敵也然擇將者不務求其策而反先索其勇不取之於威嚴而用之於軟緩此所謂棄本而要其末也又曰昔霸王之戰策貴廟勝故曰上兵伐謀而戰勝也吳起臨陣推劍不持項羽初學劍後貴兵略此勇難獨用况無勇乎又曰太公誓師後至斬故云執桴鼓立軍門有不可犯之色也嚴故能行其法威故能著其恩也又曰今之擇將宜參准往古古數詭於常時之法得其狀而責任之所謂坐車上而御騏驥不勞而致千里者也又曰古之論將者言長於計策而課以料敵言善於治軍則考以事政勇於奮擊則責以戰鬥若無此三者則不委之以境外之任付之以安危之事蔣子萬機論曰知兵之將國之行主民之司命古者重之後世無逮焉呂望雖知孫武雖曉樂毅雖賢白起雖武夫齊之杇骨吳之縻骸燕之消骼秦之腐肉豈可餔其糟粕復得生而使之哉固當出我民之最擇其知勇之長者用其術略也又, WYG: ''}
