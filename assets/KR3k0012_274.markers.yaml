  - {type: variant, offset: 805, length: 1218, content: 王者帥師必有股肱羽翼以成威神為之柰何公曰凡舉兵帥師以將為命在其通達不在一術也又曰武王問太公曰論將之道柰何太公曰將有五才十過五才者勇智仁信必也勇則不可犯智則不可亂仁則愛於人信則不欺人必則無二心所謂十過者將有勇而輕死者有急而心速者有貪而喜利者有仁而不忍於人者有智而心怯者有信而喜信人者有廉而不愛人者有智而心緩者有剛毅而自用者有懦而喜用人者是故兵者國之大器存亡之所由也又曰太公曰夜臥早起雖劇不悔妻子之將也長實希言賦物平均十人之將也數行刑戮不避親戚百人之將也訟辯好勝欲正一眾千人之將也知人飢飽念人劇易萬人之將也戰戰慄慄日慎一日十萬人之將也見賢進之行法不枉百萬人之將也知天文悉地理四海如妻子此天師之主也又曰為將冬日不衣裘夏日不操扇天雨不張蓋又曰武王曰吾欲令三軍親其將如父母攻城則爭先登野戰則爭先赴聞金聲則怒聞鼓聲則喜為之柰何太公曰出隘塞犯泥塗將必先下步士卒皆定將乃就舍軍未舉火將亦不食三略曰軍井未達將不言渴軍竈未炊將不言飢軍幕未辦時不言倦冬不服裘夏不操扇是謂禮也諸葛亮兵要曰人之忠也猶魚之有淵魚失水則死人失忠則凶故良將守之志立而揚名又曰不愛尺璧而愛寸陰者時難遭而易失也故良將之趍時也衣不解帶履不遺躡又曰貴之而不驕委之而不專扶之而不隱免之而不懼故良將之動也猶璧之不污又曰良將之為政也使人擇之不自舉使法量功不自度故能者不可敝不能者不可飭妄譽者不能進也桓範要集曰夫事之安危實在於將故曰將不知兵以其主與敵主不擇將以其國與敵也然擇將者不務求其策而反先索其勇不取之於威嚴而用之於軟緩此所謂棄本而要其末也又曰昔霸王之戰策貴廟勝故曰上兵伐謀而戰勝也吳起臨陣推劍不持項羽初學劍後貴兵略此勇難獨用况無勇乎又曰太公誓師後至斬故云執桴鼓立軍門有不可犯之色也嚴故能行其法威故能著其恩也又曰今之擇將宜參准往古古數詭於常時之法得其狀而責任之所謂坐車上而御騏驥不勞而致千里者也又曰古之論將者言長於計策而課以料敵言善於治軍則考以事政勇於奮擊則責以戰鬥若無此三者則不委之以境外之任付之以安危之事蔣子萬機論曰知兵之將國之行主民之司命古者重之後世無逮焉呂望雖知孫武雖曉樂毅雖賢白起雖武夫齊之杇骨吳之縻骸燕之消骼秦之腐肉豈可餔其糟粕復得生而使之哉固當出我民之最擇其知勇之長者用其術略也又曰雖有百萬之師臨時吞敵在將也吳子曰凡人之論將恒觀之於勇勇之於將乃萬分之一耳故六韜曰將不仁則三軍不親將不勇則三軍不為動孫子曰將者勇智仁信又曰三軍之眾百萬之師張設輕重在於一人謂之氣機道峽路險名山大塞十人所守千人不過是謂地機善行間諜分散其眾使君臣相怨是謂事機車堅舟利士馬閑習是謂力機此所謂四機者也又曰夫將可樂而不可憂謀可深而不可疑將憂則內疑將有憂色則內外相疑不相信也謀疑則敵國奮多疑則計亂亂則令敵國奮也以此征伐則可致亂故將能清淨應財曰清不擾曰靜能平能整能受諫能聽訟能納人受賢於群英之中若吳納范蠡齊納甯戚之類也能採善言能知國俗能圖山川能裁阨難險難阨皆悉明也能制軍權危者安之懼者懽之叛者還之將有不合去者慰諭還之若, SBCK: ''}
