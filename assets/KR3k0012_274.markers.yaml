  - {type: variant, offset: 3195, length: 0, content: '', SBCK: 萬人始皇問王翦翦曰非六十萬人不可始皇曰王將軍老矣何怯也李將軍果斷壯勇其言是也王翦因謝疾歸老於潁陽李信攻鄢郢破之於是引兵而西與蒙恬㑹城父荆人因隨之三日三夜不得頓舎大破李信軍始皇聞之大怒自馳如潁陽謝翦曰不用將軍計李信果辱􅁗將軍獨忍棄寡人乎翦謝曰老臣罷病悖亂唯大王更擇賢將始皇謝曰巳矣將軍勿復言王翦曰大王必不得已用臣非六十萬人不可始皇曰聽將軍計耳於是五翦將六十萬人始皇自送灞上王翦行請美田宅園池甚衆始皇曰將軍行矣何憂貧乎翦曰爲大王將有功不得封侯故及大王之向臣臣亦及時以請園池爲子孫業耳始皇大􅀏或曰將軍乞貸亦巳甚矣翦曰今空􅁗國甲士專委我我不多請田宅爲子孫業以自堅固令􅁗王坐而疑我耶翦東代信擊荆大破荆軍虜荆王􅀒芻竟平荆地爲郡縣漢書曰西羗反時趙充國年七十餘上老之使御史大夫丙􅁻問誰可將者充國對曰無踰於老臣耳上遣焉問曰將軍度羗虜何如當用幾人充國曰百聞不如一見兵難踰度踰遥也三輔言也臣願馳至金城圖上方略然羗戎小夷逆天背叛㓕亡不乆願陛下以屬臣勿以爲憂上􅀏曰諾充國曰饗軍士皆欲爲用虜數挑戰充國堅守捕生口言羗豪相責曰汝無反今天子遣趙將軍來年}
  - {type: page-break, offset: 3195, content: '', id: KR3k0012_SBCK_274-4b}
  - {type: page-break, offset: 3195, content: '', id: KR3k0012_SBCK_274-5a}
  - {type: variant, offset: 3195, length: 0, content: '', WYG: 萬人始皇問王翦翦曰非六十萬人不可始皇曰王將軍老矣何怯也李將軍果㫁壮勇其言是也王翦謝罪歸老於潁陽李信攻鄢郢破之於是引兵而西與蒙恬㑹城父荆人因隨之三日三夜不得頓舍大破李信軍始皇聞之大怒自馳如潁陽謝翦曰不用將軍計李信果辱秦將軍獨忍棄寡人乎翦謝曰老臣罷病悖亂唯大王更擇賢將始皇謝曰已矣將軍勿復言王翦曰大王必不得已用臣非六十萬人不可始皇曰聴將軍計耳於是王翦將六十萬人始皇自送㶚上王翦行請美田宅園池甚衆始皇曰將軍行矣何憂貧乎翦曰爲大王將有功不得封侯故及大王之向臣臣亦及時以請園池爲子孫業耳始皇大笑或曰將軍乞貸亦已甚矣翦曰今空秦國甲士專委我我不多請田宅爲子孫業以自堅固令秦王坐而疑我耶翦更代信擊荆大破荆軍虜荆王負芻竟平荆地爲郡縣漢書曰西羗反時趙充國年七十餘上老之使御史大夫丙吉問誰可將者充國對曰無踰老臣耳上遣焉問曰將軍度羗虜何如當用幾人充國曰百聞不如一見兵難隃度隃遥也三輔言臣願馳至金城圖上方畧然羗戎小夷逆天背叛滅亡不久願陛下以屬臣勿以爲憂上笑曰諾充國日饗軍士皆欲爲用虜數挑戰充國堅守捕得生口言羗豪相責曰語汝無反今天子遣趙將軍來年}
