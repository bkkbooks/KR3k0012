  - {type: variant, offset: 401, length: 248, content: 鏘鏘又曰北門篇名刺士不得其志也言衛之忠臣不得其志耳出自北門憂心殷殷又曰高門有閌又曰衡門篇名誘僖公也愿而無立志故作是詩以誘掖其君也衡門之下可以棲遟詩義問曰橫一木作門而上無屋謂之衡門易曰重門擊柝以待暴客又曰出門同人無咎又曰不出戶庭無咎禮記曰凡與客入者每門讓於客客至於寢門則主人請入為席然後出迎客主人入門而右客入門而左又曰生男懸弧於門左又曰立不中門行不履閾又曰婦人送迎不出門見兄弟不踰閾又曰兩君相見揖讓而入門入門而懸興作樂又曰大夫士出入公門由闑右不踐閾又曰入門而問諱又曰孔子負手曳杖逍遙於門又曰天子諸侯, WYG: 章}
