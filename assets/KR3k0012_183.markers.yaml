  - {type: variant, offset: 2252, length: 160, content: 京鑄作銅馬法獻之有詔立馬於魯班門外更名魯班門為金馬門又曰赤眉入長安更始單騎走從廚城門出三輔黃圖曰洛城門王莽故曰建于門其內有長安廚官俗名之為廚城門今長安故城北面之中門是也諸婦女從後連呼曰陛下當下謝城更始即下拜復上馬去又郭祚傳曰祚遷尚書右僕射故事令僕中丞騶唱而入宮門至於馬道及祚為僕射以為非盡敬之宜言於世宗帝納之詔御在太極唱, SBCK: ''}
