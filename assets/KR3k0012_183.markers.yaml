  - {type: variant, offset: 28, length: 0, content: '', SBCK: 者吴王闔閭所作也名爲閶闔門髙樓閣道後由此伐楚改曰破楚門丗說曰楊脩爲魏武主簿作相國門始構榱桶魏武自看使人題門作活字便去楊脩見即命壞之曰門中活闊字王嫌門大也魯連子曰先生見孟甞君於杏唐之門說􅁐韓昭侯造髙門屈冝咎曰昭侯者非時日也人固有利不利昭侯甞利矣不作髙門往年􅁗拔冝陽明年大旱民饑不以此時恤民之急而反益以奢此謂福不重至禍必重來者也髙門成昭侯卒竟不出此門矣常璩華陽國志曰􅁗孝文王以李冰爲蜀守冰作石犀五頭以壓水精在市橋門今所謂石牛門呉越春秋曰吴王闔閭爲太子騁齊女齊女思於齊日夜號泣因而爲疾闔閭乃爲起北門名曰望齊門作樓令女徃登遊其上又曰子胥爲吴造大城陸門八象天之八風水門八法地之八聽立閶門者象}
  - {type: page-break, offset: 28, content: '', id: KR3k0012_SBCK_183-2a}
  - {type: variant, offset: 28, length: 0, content: '', WYG: 門髙樓閣道後由此伐楚改破楚門世説曰楊修為魏武主簿作相國門始構榱桷魏武自看使人題門作活字便去楊修見命壊之曰門中活闊字王嫌大也魯連子曰先生嘗見孟嘗君於杏唐之門説苑韓昭侯造髙門屈宜咎曰昭侯作非時日也人固有利不利昭侯嘗利矣不作髙門往年秦拔宜陽明年大旱民饑不以此時恤民之急而反益以奢此謂福不重至禍必重來者也髙門成昭侯卒竟不出此門矣常璩華陽國志曰秦孝文王以李冰為蜀守作石犀五頭以壓水精在市橋門今所謂石牛門吳越春秋曰吳王闔閭為太子聘齊女齊女少思齊日夜號泣因而為疾闔閭乃為起北門名曰望齊門令女往遊其上又曰子胥為吳築大城陸門八象天八風水門八法地八聰築小城陵門三不開東靣明絶越也立閶門象}
