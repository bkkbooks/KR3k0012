  - {type: variant, offset: 3572, length: 0, content: '', SBCK: 東曰龍門離騷云過夏首而西浮頋龍門而不見夏首即夏口也又曰洞庭山有宫五門東通林屋西逹峨眉南接羅浮北連岱岳東有石樓樓下兩石鼔扣之即清越所謂神鉦也又曰兖州乘丘左傳子偃曰宋師不整可敗也自雩門突出蒙臯比而先犯之大敗宋師于乗丘即此也又曰長安縣漢髙祖五年置故城在京西北二里漢惠帝築南爲南斗形北爲北斗形入街九陌東面有青綺門東陵侯邵平􅁗破爲布衣種􅀲此門外西北面有􅁄門漢文屯兵之所又曰魯城伯禽邑也西五門東一曰鹿門即臧孫紇斬鹿門關以出奔邾}
  - {type: page-break, offset: 3572, content: '', id: KR3k0012_SBCK_183-4b}
