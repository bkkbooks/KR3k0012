  - {type: variant, offset: 16, length: 10, content: 所捫摸也從二戶象形也, SBCK: 物而任其􅀻智竊弄君威反戾天地欺誣神明居累􅆑之危而圖泰山之安爲朝露之行而思傳代之功豈不惑哉吴地記曰}
