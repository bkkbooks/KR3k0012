  - {type: variant, offset: 10, length: 1, content: 捫, SBCK: 四出何所以通四方故禮三朝記曰天子之宫四通太公金匱門之書曰敬遇賔客貴賤無二蔡邕明堂月令論曰禮古大明堂之禮曰膳夫氏相禮日中出南闈見九侯及門日昊出西闈親五闈之事曰闇出北闈視帝績帝猷明堂之西北門稱闈墨子曰夫城守之法爲懸門沉機}
  - {type: variant, offset: 10, length: 1, content: 捫, WYG: 四出何以通方蔡邕明堂月令論曰禮記古大明堂之禮曰膳夫是相禮日中出南闈見九侯及門子日昃出西闈親五國之事日闇出北闈視帝節猶明堂之西北門稱闈墨子曰夫守城之法為懸門沉機}
