  - {type: variant, offset: 3320, length: 0, content: '', WYG: 神獸門東對雲龍門衡栿之上皆刻雲龍風虎之狀又曰穀水東流建春門石橋下即上東門也一曰上昇門又曰閶闔門漢之西上門又曰陶水東南經髙門南葢層阜墮􅆙故有髙門之稱矣又經司馬子長墓北入于河亦謂之龍門太史公自叙云遷生於龍門是也在馮翊夏陽縣郡國志賀州封陽有隄陂内水深百尋大魚自擲登此門化為龍不過者曝腮㸃額也又曰銅州龍門城帶龍門山大魚㸃額曝腮半死謂此也司馬彪注莊子云吕梁即龍門也又郢城南有三門東曰龍門離騷云過夏首而西浮顧龍門而不見夏首即夏口也又曰洞庭山有宫五門東通林屋西逹峨眉南接羅浮北連岱嶽東有石樓樓下兩石皷扣之即清越所謂神鉦也又曰兖州乗丘左傳子偃曰宋師不整可敗也自雩門突出蒙臯比而先犯之大敗宋師于乗丘即此也又曰}
