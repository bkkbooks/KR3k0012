  - {type: variant, offset: 651, length: 1559, content: 此以高為貴者又月令曰孟秋其祀門祭先肺陰氣出祀之於門外順陰也又曰孟冬戒門閭修鍵閉左傳啟塞從時門戶橋道謂之啟城郭墻塹為之塞皆啟閉之急不可一日而闕也又襄二年王叔之宰曰蓽門圭竇之人而皆陵其上難為上矣蓽門柴門閨竇小戶穿壁上銳下方狀如圭又曰新作南門書不時也注本名稷門公吏高之改高門也又曰鄭大水龍鬭于時門之外洧淵又曰公及邾師戰敗績邾人獲公胄懸諸魚門社預曰魚門邾城門又曰楚子囊圍宋門于桐門又曰楚子為陳夏氏亂遂入陳殺夏徵舒轘諸栗門轘車裂也栗門陳城門也論語憲問曰子擊磬於衛有荷蕢而過孔氏之門者曰有心哉擊磬乎又曰邦君樹塞門管氏亦樹塞門又鄉黨曰入公門鞠躬如也史記曰金馬門者官者署門也門旁有銅馬故謂之曰金馬門又曰太史公曰余過大梁求所謂夷門者大梁城東門也又曰夫以汲鄭之賢有勢則賓客十倍無勢則否況眾人乎下邽翟公有言始翟公為廷尉賓客闐門及廢也門外可設爵羅翟公復為廷尉客欲往翟公乃大署門曰一死一生乃知交情一貧一富乃知交態一貴一賤交情乃見又曰萬石君子慶為內史慶歸入門不下車萬石君聞之不食慶恐肉袒請罪不許舉宗及兄建肉袒萬石君讓曰內史貴人入閭里里中長老皆走匿而內史坐車中自如固當乃謝罷慶慶及諸子入里門趨至家又曰呂不韋說子楚曰吾能大子之門子楚笑曰盍自大子之門顧乃大吾門不韋曰吾門待子門而大耳漢書曰太液池有壁門又曰陳平家貧負郭窮巷以席為門然門外多長者車轍又曰魏勃家貧欲見齊相曹參無以自達常早起掃其門人問故勃曰欲見相君無因故為子掃門乃見參參用為舍人又曰梅福居家常以讀書養性為事至元始中王莽顓政師古曰顓與專同福一朝棄妻子去九江至今傳以為仙其後人有見福於會稽者變名姓為吳市門卒云又曰于定國父于公其閭門壞父老方共治之于公謂曰少高大閭門令容駟馬高蓋車我治獄多陰德未曾有冤子孫必有興者至定國為丞相永為御史大夫封侯世傳云又曰張釋之為公車令頃之太子與梁王共車入朝不下司馬門如淳曰官衛令諸出入殿門公車司門者皆下不如令罰金四兩於是釋之追止太子梁王母入殿門遂劾不下公門不敬奏之薄太后聞之文帝免冠謝曰教兒不謹薄太后使丞詔赦太子梁王然後得入文帝繇是奇釋之拜為中大夫又曰鄭崇為尚書上謂曰君門如市何以欲禁切主上師古曰言請求者多交通賓客者也崇對曰臣門如市臣心如水又曰鄒陽諫吳王曰今臣盡智畢義易精極慮則無國不可奸飾固陋之資則何王之門不可曳長裾乎又曰王尊為東平相是時東平王以至親驕不奉法度傅相連坐師古曰前任傅相者頞坐王得罪及尊視事奉璽書至庭中王未及出受詔尊持璽書歸舍食已及還致詔尊持後謁者王傅在前說相鼠之詩師古曰鼠鄘風篇名刺無禮之詩也其辭曰相鼠有皮人而無儀人而無儀不死何為相視也言視鼠有皮雖處高顯之地偷食茍得不知廉恥人無禮儀亦與鼠同不如速死也尊曰母持布鼓過雷門師古曰雷門會稽城門也有大鼓越擊此鼓聲聞洛陽故尊引之也布鼓謂以布為鼓故無聲王怒起入後宮尊亦直趨出就舍又曰蓋寬饒字次公為諫議大夫行郎中戶將軍師古曰百官公卿表郎中令屬官有郎中事戶騎三將各以所主為名也將者主戶衛也劾奏衛將軍張安世子侍中陽都侯彭祖不下殿門師古曰過殿門不下車也并連及安世居位無補彭祖時實下門寬饒坐舉奏大臣非是左遷為衛司馬又曰蕭望之署小苑東門候時王仲翁出入從倉頭盧兒顧謂望之不肯錄錄反抱關為師古曰錄錄謂循常也言望之不能隨例搜索以建忤執政不得大官而守門望之曰各從其志又曰鉤弋夫人大有寵有娠十四月乃產是為昭帝武帝曰昔堯十四月而生今鉤弋亦然乃命其門曰堯母門范曄後漢書曰孔融云鄭君里門四方所由觀禮其廣令容高車結駟名為通德之門又曰郅惲字君章為上東門候帝常獵夜還惲拒門不開帝乃廻從中東門入賜惲布貶中東門候又曰李膺傳曰是時朝廷日亂綱紀頹弛膺獨持風裁以聲名自高士有被其容接者名為登龍門以魚為喻龍門河水所下之口在今絳州龍門縣辛氏三秦記曰河津一名龍門水陸不通魚鱉之屬莫能上江海大魚薄集龍門下數千不得上上則為龍袁宏漢紀曰建初二年有司依舊典奏封諸舅太后詔曰前過, SBCK: ''}
