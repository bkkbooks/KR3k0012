  - {type: variant, offset: 3574, length: 0, content: '', WYG: 十五丈上六層及宇向陽下開二門又安大銅鳯於其顚舉頭一丈六尺門牕户朱柱白壁未到鄴城七八里遥望此門述征記曰青門外有魏車騎將軍郭淮碑小城最東一門名落索門門裏有司馬京兆碑郡民所立豫章記曰郡城灌嬰築有六門其南一曰松陽門其一以郡為名西二門其一曰昌門其一曰臯門東及北一門即以東北為名晉大元中太守順陽范君更開門之北為東陽門以對臯門開北門以對松陽門今八門相望通路}
