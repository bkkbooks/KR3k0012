  - {type: variant, offset: 3573, length: 0, content: '', SBCK: 三曰稷門即圉人犖能投蓋于稷門之所又曰蜀望帝以褒斜爲前門熊耳靈􅀜爲後户又曰鄜州仙宫門即漢武帝所逰相思川也伏陸縣有相思郷又曰洛陽南面最東曰開陽門􅀄未有名夜有一柱飛在樓上乃是琅邪開陽縣南門一柱飛去遂記其年月日以爲名又曰鴻門在新豐縣西八里沛公見項羽處又曰蒯城慕容儁鑄銅馬於門側謂曰銅馬門今大㕔前有石函長}
  - {type: variant, offset: 3573, length: 0, content: '', krp: 三曰稷門即圉人犖能投蓋于稷門之所又曰蜀望帝以褒斜爲前門熊耳靈關爲後户又曰鄜州仙宫門即漢武帝所逰相思川也伏陸縣有相思郷又曰洛陽南面最東曰開陽門𥘉未有名夜有一柱飛在樓上乃是琅邪開陽縣南門一柱飛去遂記其年月日以爲名又曰鴻門在新豐縣西八里沛公見項羽處又曰蒯城慕容儁鑄銅馬於門側謂曰銅馬門今大㕔前有石函長}
  - {type: variant, offset: 3574, length: 1, content: 直, SBCK: 尺髙一尺代不敢開銘云􅁗建元十年造銅虎馬又曰汴州陳留郡縣夲春秋衛地魏惠王自安邑徙都亦稱梁惠王焉土多髦俊儒藝則以遊俠夷}
