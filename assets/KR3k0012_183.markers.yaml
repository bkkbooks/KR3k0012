  - {type: variant, offset: 2424, length: 320, content: 騶唱不入宮自此始也又曰張湛建武初為左馮翊在郡修典禮設條教政化大行後告歸平陵望寺門而步告請也告歸謂請假歸寺門即平陵縣門也主簿進曰明府位尊德重不宜自輕湛曰禮下公門軾輅馬輅大也君所居曰寢車馬曰輅馬軾車前橫來也乘車曰必正之有所敬則撫軾為小俛也禮記曰大夫士下公門式輅馬孔子於鄉黨恂恂如也父母之國所宜盡禮何謂輕哉又曰虞延為陳留督郵勑延一人從駕到魯還經封丘城門門下小不容羽蓋帝怒使撻侍御史延因下見引咎以為罪在督郵言辭激揚有感上意乃制詔曰以陳留督郵虞延故侍御史罪宜放魏書曰文帝初在東宮集諸儒於肅城門內講論大義侃侃無倦吳志曰張昭諫孫權不從稱疾不朝權自出過其門呼昭辭疾篤權使燒其門欲恐之昭更閉戶權使滅火住門良久昭諸子共扶昭起權載以還宮又曰初平中謠曰黃金車班蘭耳, SBCK: ''}
