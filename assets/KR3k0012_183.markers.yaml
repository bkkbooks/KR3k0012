  - {type: variant, offset: 3700, length: 2, content: 世亭, SBCK: 城門銘曰廣陽位孟厥月在申凉風時至白露已紛李􅀹上東門銘曰上東少陽厥位在寅條風動物月在孟春李􅀹中東門銘曰東處仲月厥位當卯倉庚有聲鷹隼匿瓜除去桎梏獄訟勿考李􅀹旄城門銘曰旄門值季位月在辰順陽布惠貧乏是振李􅀹門銘曰門之設張爲宅表會納善閉惡擊邪防害李􅀹西上門銘曰上西在季位月惟戍菊黄豹􅀕號令嚴悉李􅀹夏門銘曰夏門值孟位月在亥不周用事玄􅁳幽晦隂陽不通螮蝀匿彩迎冬北壇順隂所在李􅀹榖城門銘曰榖門北中位當于丑太隂主刑殺伐爲首班固西都賦曰披三條之廣路立十二之通門左思吴都賦曰通門二八水道陸衢西京賦曰重門襲故陽曜隂藏潘岳懷縣作詩曰緑槐夾門植魏文帝賦序曰王粲直賢門也故纂之古詩曰黄金爲君門白玉爲君堂太平御覽卷第}
