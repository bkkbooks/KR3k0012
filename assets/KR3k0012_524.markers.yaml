  - {type: variant, offset: 468, length: 234, content: 享有體薦享則半解其體而薦之所示以共儉宴有折俎體解節折升之於俎物皆可食所以示慈惠也公當享卿當宴王室之禮也公謂諸侯武子歸而講求典禮以脩晉國之法又昭二年曰晉侯使韓宣子來聘公即位故且告為政而來見禮也代趙武為政雖盟主而脩好同盟故曰禮觀書於太史氏見易象與魯春秋曰周禮盡在魯矣易象上下經之象辭魯春秋史記之策書春秋遵周公之典以序事故曰周禮盡在魯也吾乃今知周公之德與周之所以王也易象春秋文王周公之制當此情儒道廢諸國多門唯魯備故宣子適魯而說之也又昭二曰楚靈王使問禮於左師與子產左師曰小國習, WYG: ''}
