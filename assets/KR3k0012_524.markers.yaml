  - {type: variant, offset: 96, length: 1, content: 皇, WYG: 箋云公謂后稷也君曰卜爾萬夀無疆卜猶期也又小雅吉日曰吉日維戊旣伯旣禱又小雅大田曰來方禋祀以其騂黒與其黍稷以享以祀以介景福又小雅楚茨曰濟濟蹌蹌潔爾牛羊以往烝嘗或剥或烹或肆或將祝祭于祊祀事孔明又小雅信南山曰祭以清酒從以騂牡享于祖考執其鸞刀以啓其毛取其血膋鸞刀刀有鈴者言割中節也箋云毛以告殺膋以升臭合之黍稷實之於蕭合馨香也是烝是享苾苾芬芬祀事孔明又生民曰生民尊祖也后稷生於姜嫄文武之功起於后稷故推以配天厥初生民時維姜嫄生民如何克禋克祀以弗無子克能也弗之言祓也履}
