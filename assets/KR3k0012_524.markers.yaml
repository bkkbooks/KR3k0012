  - {type: variant, offset: 164, length: 2, content: 代父, WYG: 喻杞宋之君有潔白之徳來助祭周之廟也又潛曰潛季冬薦魚春獻鮪也猗與漆沮潛有多魚有鱣有鮪鰷鱨鰋鯉以享以祀以介景福介助也景大也尚書舜典曰望于山川徧于羣神又孔安國傳曰望者逺也望而祭之也羣神丘陵墳衍之屬又說命曰黷于祭祀時謂弗欽又孔安國曰祭不欲數數則黷黷則不敬也又洛誥曰祀于新邑咸秩無文又孔安國曰以祀典禮以祀新邑皆次秩不在禮文者而禮之又多士曰罔不明德恤祀又孔安國曰自帝乙以上無不顯用有憂徳念齊敬奉祭祀言能保宗廟社稷也尚書大傳曰祭之為言察也察者至也人事也人事至然後祭祭者薦也薦之為言在也在者在其道也又云五行傳曰簡宗廟不禱祠廢祭祀逆天時則水不潤下又五行傳曰六瀰之禮散齋七日致齋三日新器潔以祀用又赤黍三日之朝於中庭祀四方從東方自南至西卒於北方禮曰格祀篇云今亡曰某也方祀曰播國卒相行事其祝也曰若爾神靈洪範六瀰是合神靈位木精靈威仰火精赤熛怒土精含䌔紐金精白招拒水精汁光紀及木帝太皥炎帝火帝土帝黄帝官金帝少昊水帝顓項木官勾芒火官祝融土官后土金蓐收水官𤣥𠖇皆是也又云無差無傾無有不正若民有不敬事神則㑹批之于六瀰言民廣及天下有過者也事六事也㑹合也批推也言天下之有過神靈亦合推内于外天子以為下任者也六事之機以縣示我我民人不敢不敬事上下王祀周禮天官冡宰曰以八則治都鄙一曰祭祀以馭其神祀其先君社稷五祀以九式均節財用一曰祭祀之式又天官上内饔曰凡宗廟之祭祀掌割烹}
