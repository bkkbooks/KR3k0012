  - {type: variant, offset: 104, length: 160, content: 賓禮者貢獻朝聘之事是也軍禮者始黃帝與蚩尤戰於涿鹿之野嘉禮者好會之事起自伏羲以儷皮為幣始制嫁娶亨通者嘉會之事也其後有冠冠者代父之事者婚有繼世之道物有代謝之期悲發於裏乃非純吉故為喜尉之事也鄉飲酒鄉射食耆老王燕族人之事是也四者亦嘉會也伹前代象天其禮質而略後代法地其事煩而文唐虞之際五禮明備周公所制文物極矣左傳文下曰齊侯侵我西鄙, SBCK: ''}
