  - {type: variant, offset: 265, length: 1612, content: 伐曹入其郛討其來朝也季文子曰齊侯其不免乎己則無禮執王使而伐其罪而討於有禮者曰女何故行禮禮以順天天之道也己則反天而又以討人難以免矣又文公曰先大夫臧文仲教行父事君之禮行父奉以周旋弗敢失隊曰見有禮於其君者事之如孝子之養父母也見無禮於其君者誅之如鷹鸇之逐鳥雀也又宣十六年晉侯使士會平王室定王享之原襄公相禮原襄公周大夫相佐也殽烝烝升也升殽於俎武子私問其故享當體薦而殽烝怪故問之士會謚季其字王聞之召武子曰季氏而弗聞乎王享有體薦享則半解其體而薦之所示以共儉宴有折俎體解節折升之於俎物皆可食所以示慈惠也公當享卿當宴王室之禮也公謂諸侯武子歸而講求典禮以脩晉國之法又昭二年曰晉侯使韓宣子來聘公即位故且告為政而來見禮也代趙武為政雖盟主而脩好同盟故曰禮觀書於太史氏見易象與魯春秋曰周禮盡在魯矣易象上下經之象辭魯春秋史記之策書春秋遵周公之典以序事故曰周禮盡在魯也吾乃今知周公之德與周之所以王也易象春秋文王周公之制當此情儒道廢諸國多門唯魯備故宣子適魯而說之也又昭二曰楚靈王使問禮於左師與子產左師曰小國習之大國用之敢不薦聞言所聞謙示所未行獻公合諸侯之禮六其禮六儀也宋爵公故獻公禮子產曰小國共職敢不薦守獻伯子男會公之禮六鄭伯爵故獻伯子男會公之禮又昭二曰公如晉自郊勞至于贈賄往有郊勞去有贈賄無失禮揖讓之禮晉侯謂女叔齊曰魯侯不亦善於禮乎對曰魯侯焉知禮公曰何為自郊勞至於贈賄禮無違者何故不知對曰是儀也不可謂禮禮所以守其國行其政令無失其民者也又昭二曰孟僖子病不能相禮不能相儀荅郊勞以此為己疾乃講學之講習也茍能禮者從之及其將死也二十四年孟僖子卒傳終言之召其大夫曰禮人之幹也無禮無以立吾聞將有達者曰孔丘僖子卒時孔丘年三十五聖人之後也我若獲沒得以壽終必屬說與何忌於夫子使事之說南宮敬叔何忌孟懿子皆僖子之子也而學禮焉以定其位知禮則位安又昭六曰鄭子大叔見趙簡子簡子問揖讓周旋之禮焉對曰是儀也非禮也簡子曰敢問何謂禮對曰吉也聞諸先大夫子產曰夫禮天之經也經者道之常地之義也義者利之宜也民之行也行者人所履天地之經而民實則之簡子曰甚哉禮之大也對曰禮上下之紀天地之經緯也緯絰錯居以相成者民之所以生也是以先王尚之又昭六曰齊景公曰善哉吾今而後知禮之可以為國也對曰禮之可以為國也久矣與天地並有天地則禮義興君令臣共父慈子孝兄愛弟敬夫和妻柔姑慈婦聽禮也君令而不違臣共而不貳父慈而教子孝而箴箴諫也兄愛而友弟敬而順夫和而義妻柔而正姑慈而從從不自專婦聽而婉婉順也禮之善物也又定下曰公會齊侯于祝其實夾谷夾谷即祝其地孔丘相相會儀也犂彌言於齊侯曰孔丘知禮而無勇若使萊人以兵劫魯侯必得志焉又定下曰邾隱公來朝邾子益也子貢觀焉邾子執王高其容仰公受玉卑其容俯王朝者之贄子貢曰以禮觀之二君者皆有死亡焉夫禮死生存亡之禮也將左右周旋進退俯仰於是乎觀之今正月相朝而皆不度不合法度心已亡矣又哀上曰太宰嚭召季康子嚭吳大夫康子使子貢辭太宰嚭曰國君道長大言君長於道路而大夫不出門此何禮也對曰豈以為禮畏大國也畏大國不敢虛國盡行大國不以禮命於諸侯茍不以禮豈可量也寡君既共命焉其老豈敢棄其國太伯端委以治周禮仲雍嗣之斷髮文身祼以為飾豈禮也哉春秋說題辭曰禮者所以設容明天地之體也論語曰有子曰禮之用和為貴先王之道斯為美小大由之有所不行知和而和不以禮節之亦不可行也又曰子曰導之以政齊之以刑民免而無恥導之以德齊之以禮有恥且格又曰子曰夏禮吾能言之𣏌不足徵也殷禮吾能言之宋不足徵也徵成也𣏌宋二國夏殷之後夏殷之禮吾能說之𣏌宋之君不足以成也又曰子張問十世可知也世謂易姓之世也問其制度變易如何子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也所損益可知也者據時篇目皆在可校數其或繼周者雖百世可知也自周之後以為變易損益之極極於三王亦不是過也又曰顏淵問仁子曰克己復禮為仁一日克己復禮天下歸仁焉為仁由己而由人乎哉顏淵曰請問其目子曰非禮勿視非禮勿聽非禮勿言非禮勿動顏淵曰回雖不敏請事斯語矣又曰子曰禮云禮云玉帛云乎哉言禮非但崇此玉帛而已所貴者乃貴其安上治民漢書曰漢王已并, SBCK: 率}
