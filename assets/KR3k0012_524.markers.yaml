  body:
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 三􅀕禮上毛詩召南曰采蘋大夫妻能循法度也能循法度則可以承先祖供􅀕祀也于以采蘋南澗之濵于以采藻于彼行潦蘋大萍也澗崖也藻聚藻也行潦流潦也又小雅天保曰􅁻蠲爲饎是用孝享􅁻善蠲絜也饎酒食也享獻也箋云謂將􅀕祀也禴祠烝甞于公先王春曰祠夏曰禴秋曰甞冬曰烝公事也箋云公謂后稷也君曰卜爾萬壽無疆君先君也尸所以象神卜子也箋云君曰卜爾者尸嘏主人傳神辭也又小雅􅁻日曰􅁻日維戊旣伯旣禱維戊順􅀋乗壯也伯馬祖也重物慎微將用馬力必先爲之禱其祖禱獲也箋云戊剛日也故乗壯爲順􅀋也又小雅大田曰來方禋祀以其騂黒與其􅁰稷以享以祀以介景福騂牛也黒羊豕也箋云成王之來則又禋祀四方之神祈報焉陽祀用騂牲隂祀用牲又小雅楚茨曰濟濟蹌蹌絜爾牛羊以往烝甞或剥或亨或肆或將濟濟蹌蹌言有容也亨餁之也肆陳將齊也或陳于皮或齊其肉箋云有容言威儀敬慎也冬􅀕曰烝秋􅀕曰甞祀之禮各有其事有解剥其皮者有煑熟之者有肆其骨體於爼者或奉持而進之者祝􅀕于祊祀事孔明祊門内也箋云孔甚也明狄備也契也孝子不知神之所在故使祝􅀶求之平生門内之旁待賔客之處祀禮於是甚明又小雅信南山曰􅀕以清酒從以騂壯享于祖考咸尚赤曰騂箋云清謂玄酒也酒􅊊鬯五齊三酒也􅀕之禮先以欎鬯降神然後迎生享于祖考納考時執其鸞刀以啓其毛取其血膋鸞刀乃有鸞者言割中節也箋云毛以告純人膋脂膏也血以告殺膋以升􅆨合之􅁰稷實之於蕭合馨香也是烝是享苾苾芬芬祀事孔明又生民曰生民尊祖也后稷生於姜嫄文武之功起於后稷故推以配天焉厥􅀄生民時維姜嫄生民如何克禋克祀以拂無子克能也弗之言祓也姜嫄之生后稷如何乎乃禋祀上帝於郊禖以祓除其無子之疾而得其福也履帝武敏歆攸介攸止載震載肅載生載育祀郊之時有大神之迹姜嫄履其拇指生子而飬之長名曰弃也又清廟曰清廟祀文王也周公旣成雒邑朝諸侯率以祀文王焉清廟者􅀕有清明之起德者之宫也謂􅀕文王又清廟烈文曰烈文成王即政諸侯助􅀕也新王即政必以朝享之禮􅀕於祖考告嗣位也烈文辟公錫兹祉福惠我無疆子孫保之烈光也文王錫之也又臣工曰振鷺}
