  - {type: variant, offset: 7, length: 0, content: '', krp: 水也潜撡也以享以祀以介景福介助也景大也尚書舜典曰望于山川徧于羣神孔安國傳曰謂在逺者望祭之也羣神丘陵墳衍之屬又說命曰黷于祭祀時謂弗欽孔安國傳曰祭不欲數數則黷黷則不敬也又洛誥曰祀于新邑咸秩無文孔安國傳曰以祀典祀于新邑皆次秩不在禮文者而禮之又多士曰罔弗明徳䘏祀孔安國傳曰自帝乙以上無不顯用有徳憂念齊敬奉其祭祀言能保宗廟社稷也尚書大傳周傳曰祭之爲言察也察者至也至者人事也人事至然後祭祭者薦也薦之爲言在也在也者在其道也禮志曰君子生則敬養死則敬饗也又五行傳曰簡宗廟不禱祠廢祭祀逆天時則水不潤下君行此四者爲逆天此宫之政北爲水故源流竭絶是水不潤下也亦如之又天官上獸人曰凡祭祀喪紀賔客共其死獸生獸共其㒵者凡獸入于腊人當乾之也皮毛䈥角入于玉府給作器物又天官上亨人曰祭祀共大羹鉶羮賔客亦如之大羹肉湆也鄭司農云大羹不致五味也鉶羹加塩菜也又地官上牧人曰牧人宰牧六牲而阜蕃其物以供祭祀之牲牷六牲謂牛馬羊豕犬雞凡陽祀用騂牲毛之隂祀用黝牲毛之望祀各以其方之色牲毛之毛純也陰祀祭六郊地及社禝也鄭司農云陽祀春夏也黝讀爲幽幽黒也凡時祀必用牷物時祀四時所常祀謂山川以下至四方百物也凡外祭毀事用尨可也尨謂雜色不純毀謂疈辜毀除殃咎之属也凡祭祀共其犧牲以授充人繫之犧牲毛羽折具也授充人者當殊養之凡牲不繫者共奉之謂非時而祭祀者又地官上曰牛人掌養國之公牛以待國之政令凡祭祀供其享牛求牛以授職人而蒭之鄭司農云享牛前祭一日之牛求牛禱於鬼神祈福之牛也玄謂献神之牛謂所以登者凡祭祀供其牛牲之牙與其盆簝以待事牙謂福衡之屬盆簝皆器名又地官下閭師曰凡庶民不畜者祭無牲不耕者祭無盛矣又春官上太宗伯曰太宗伯之職掌建邦之天神人鬼地祇之禮以佐王建保邦國建立也立天神人鬼地祇之禮者謂祀之祭之享之之禮吉禮是也自吉禮於上汝以立安邦國者牙以相成明尊鬼神重人事以禋祀祀昊天上帝以實柴祀日月星辰以楢燎祀司中司命風師雨師禋之言煙也周人尚臭煙氣之臭聞者也楢積也詩曰芃芃棫樸薪之楢之三祀皆積柴實牲體焉或有玉帛燔柴而升煙所以報陽也以血祭祭社稷五祀五嶽以理沉祭山林川澤以疈辜祭四方百物不言祭地此皆地祇祭地可知也隂祀自血起貴氣臭也社稷土穀之神也有徳者配食凡祭祀大神享大鬼享祭大祇帥執事而卜日宿視滌濯涖玉鬯省牲鑊奉玉齊詔大號治其大禮詔相王之大禮執事諸有事於祭者也宿申式也滌濯漑祭器也若王不與祭祀則攝位王有故代行其祭事凡大祭祠王后不與則攝而薦豆籩徹薦徹豆籩后之事國有大故則旅上帝及四望王大封則先告后土乃頒祀于邦國都家郷邑頒讀爲班班其所當祀及其禮也都家郷邑謂王子弟及公卿大夫所食采地也又春官下太祝曰太祝掌六祝之辭太師冝于社造于祖馬融傳曰爾雅曰起大事動大衆必先有事於社也設軍社類上帝社者社主也類者以事類告祀上啼國將有事於四望將行也四望日月星辰也及軍歸獻于社則前祝献於社主又春官曰家宗人掌家祭祀之禮凡祭祀致福大夫采地之所祀與都同若先王之子孫亦有祖廟}
  - {type: variant, offset: 9, length: 0, content: '', SBCK: 月令曰孟春之月其祖户􅀕先脾春陽氣出祀之於户内陽也祀之先􅀕脾者爲春陽中於藏直脾爲尊也仲春之月天子獻羔開冰先薦寢廟獻羔謂献司寒也􅀕司寒而出冰薦於宗廟乃後賦之上丁命樂正習舞釋菜將舞必釋菜於先師以禮之天子乃率三公九卿諸侯大夫親徃視之順時逹物中丁又命樂正入學習樂是月也祠不用犧牲用珪璧更皮幣又月令曰孟夏之月共祀竈􅀕先肺夏陽氣盛􅀬於}
  - {type: page-break, offset: 9, content: '', id: KR3k0012_SBCK_524-5b}
  - {type: variant, offset: 9, length: 0, content: '', krp: 月令曰孟春之月其祖户祭先脾春陽氣出祀之於户内陽也祀之先祭脾者爲春陽中於藏直脾爲尊也仲春之月天子獻羔開冰先薦寢廟獻羔謂献司寒也祭司寒而出冰薦於宗廟乃後賦之上丁命樂正習舞釋菜將舞必釋菜於先師以禮之天子乃率三公九卿諸侯大夫親徃視之順時逹物中丁又命樂正入學習樂是月也祠不用犧牲用珪璧更皮幣又月令曰孟夏之月共祀竈祭先肺夏陽氣盛熱於}
  - {type: variant, offset: 10, length: 0, content: '', SBCK: 祀之於竈從熱􅀋也祀之先肺者陽位在上肺亦在上肺爲尊也又月令仲夏曰祀皇地祇於方丘夏至之日祀皇地祇於方丘以髙祖神堯皇帝配坐以岳瀆等神從祀又月令仲夏曰命有司􅀕先牧謂仲夏􅀕先牧於大澤用剛日又月令季夏曰其祀中霤􅀕先心中霤猶中室也􅀕中霤之禮爲俎先進心是月也祀黄帝於南郊謂季夏土德王日則祀黄帝合樞紐於南郊以軒轅配坐以后土鎮星從祀也又月令曰孟秋其祀門􅀕先肝秋隂氣出祀之於門外隂也􅀕先肝者秋爲隂中於藏值肝凡祀門爲爼先進肝也又月令曰孟冬其祀行􅀕先腎冬隂氣盛寒於外祀之於行從辟除之􅀋行謂道也􅀕先腎者隂位在下賢亦在下凡祀行爲爼先進腎又月令孟冬日祀神州地祇於北郊謂立冬日􅀕神州地祇於北郊太宗文武聖皇帝配坐是月也命有司􅀕司寒謂孟冬􅀕司寒於北郊是月也命有司􅀕司中司命司人司禄謂立冬後亥日祀司禄等於國域西北又月令仲冬日命有司祈祀四海大川名源淵澤井泉順其盛徳之時􅀕也又曲禮上曰臨􅀕不惰􅀕服弊則焚之􅀕器弊則埋之又曲禮下曰無田禄者不設􅀕器有田禄者先爲􅀕服君子雖貧不鬻􅀕器雖寒不衣􅀕服去國􅀕器不踰境大夫寓􅀕器於大夫士寓􅀕器於士又曲禮下曰天子􅀕天地􅀕四方􅀕山川􅀕五祀歳徧諸侯方祀􅀕山川􅀕五祀歳徧大夫􅀕五祀歳徧士􅀕其先􅀕四方謂􅀕五官之神於四郊也勾芒在東祝融在南蓐收在西玄􅁳在北詩云來方禋祀者各􅀕其方之官而巳矣五祀謂竈中霤門行厲也此蓋殷時制也􅀕法天子立七祀諸侯立五祀大夫立三祀士立二祀謂周也凡􅀕有其廢之莫敢舉也有其舉之莫敢廢也爲其瀆神也廢舉謂􅀂殷廢農祀弃後不服廢弃祀農也非所􅀕而􅀕之名曰􅁋祀􅁋祀無福支子不􅀕􅀕必告於宗子不敢自專凢􅀕宗廟之禮牛曰一元大武豕曰剛鬛豚曰肥腯羊曰柔毛雞曰翰音犬曰羮獻雉曰䟽趾兎曰明視脯曰尹􅀕槀魚曰啇􅀕鮮魚曰脡􅀕水曰清滌酒曰清酌􅁰曰薌合梁曰薌萁稷曰明粢稻曰嘉􅂼韭曰豐夲鹽曰醎醝玉曰嘉玉弊曰量弊號牲物者兾於人用也元頭也武迹也腯肥也春秋}
