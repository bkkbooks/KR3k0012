  - {type: variant, offset: 783, length: 305, content: 贈賄往有郊勞去有贈賄無失禮揖讓之禮晉侯謂女叔齊曰魯侯不亦善於禮乎對曰魯侯焉知禮公曰何為自郊勞至於贈賄禮無違者何故不知對曰是儀也不可謂禮禮所以守其國行其政令無失其民者也又昭二曰孟僖子病不能相禮不能相儀荅郊勞以此為己疾乃講學之講習也茍能禮者從之及其將死也二十四年孟僖子卒傳終言之召其大夫曰禮人之幹也無禮無以立吾聞將有達者曰孔丘僖子卒時孔丘年三十五聖人之後也我若獲沒得以壽終必屬說與何忌於夫子使事之說南宮敬叔何忌孟懿子皆僖子之子也而學禮焉以定其位知禮則位安又昭六曰鄭子大叔見趙簡子簡子問揖讓周旋之禮焉對曰是儀也非禮也簡子曰敢問何謂禮對曰吉也聞諸先大夫子產曰夫禮天之經也經者道之常地之義也義者利之宜也民之行也行者人所履, WYG: 上帝祈于社設奠于牧室柴尊告}
