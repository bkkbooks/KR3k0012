  - {type: variant, offset: 2346, length: 829, content: 二篇勑襃曰此制散略多不合經今宜依禮條正使可施行於南宮東觀盡心集作典略曰孔子過宋與弟子集禮於大樹下宋司馬桓魋使拔其樹去適鄭六韜曰太公對文王曰禮者治之粉澤也管子曰禮者因人之情緣義之理為之節文者也孟子曰惻隱之心仁之端也辭讓之心禮之端也孫卿子曰禮者人主以為群臣尺寸尋文檢式也禮有三本天地生之本先祖類之本君師治之本國之本在禮也又曰人生有欲欲則求求則爭爭則亂亂則窮先王惡其亂也故制禮義以養之禮者養也稻梁五味所以養口也椒蘭芬馨所以養鼻也雕琢刻鏤黼黻文章所以養自也椒房越席沐浴机筵所以養體也莊子曰三王五帝之禮儀法度不矜於同而矜於治故譬三王五帝之禮儀法度其猶柤梨橘柚菓瓜之屬耶其味反而皆可於口文子曰老子云為禮者雕琢人性矯拂其情目雖欲之禁以法心雖樂之節以禮趍翔周旋屈節異儀肉凝而弗食酒敗而不飲外束其形中愁其意汨陰陽之和而迫生命之情慎子曰禮從俗政上國有貴賤之禮無賢不肖之禮有長幼之禮無勇怯之禮有親踈之禮無愛惡之禮也淮南子曰禮者體情而制文者也又曰夫水積則生相食之蟲言大魚食小魚士積則生食肉之獸禮飾則生偽慝之儒偽詐慝姦夫吹灰而欲無眯涉水而欲無濡不可得也說苑曰齊景公登酎晏子脩食禮以待公曰禮寡人饜之矣吾欲得天下勇士與之圖國晏子對曰君子無禮是庶人也庶人無禮是禽獸也禮而治國所以御民也轡者所以馭馬也無禮而治國家者嬰未嘗聞也景公曰善乃飾酎更席以為上客尸子曰秋為禮西方為秋秋肅也萬物莫不肅敬禮之至也韓詩外傳曰晏子聘魯下堂則趍授立則跪子貢怪之問孔子孔子問晏子晏子對曰夫上堂之禮君行一臣行二也今君之受幣也畢臣敢不跪乎孔子曰善禮中又有禮董生書曰禮者天所為也文者人所為謂之禮者因人情以為節文以救其亂也夫隄者水之防也禮者人之防也刑防其末禮防其本也白虎通曰夫禮者陰陽之際也百事之會也所以尊天地賓鬼神序上下之道也袁淮書曰禮者緣人情而為之節度者也嚴父愛親之情也尊親敬長之義耳物理論云禮者履也律也義同而名異孫卿禮賦曰爰有大物非絲非帛文理成章非日非月為天下明生者以壽死者以葬城郭以固三軍以強粹而王駮而霸無一焉而亡也, SBCK: 四}
