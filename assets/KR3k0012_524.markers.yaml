  - {type: variant, offset: 7, length: 0, content: '', SBCK: 水也潜撡也以享以祀以介景福介助也景大也尚書舜典曰望于山川徧于羣神孔安國傳曰謂在逺者望􅀕之也羣神丘陵墳衍之屬又􅀃命曰黷于􅀕祀時謂弗欽孔安國傳曰􅀕不欲數數則黷黷則不敬也又洛誥曰祀于新邑咸秩無文孔安國傳曰以祀典祀于新邑皆次秩不在禮文者而禮之又多士曰罔弗明徳䘏祀孔安國傳曰自帝乙以上無不顯用有徳憂念齊敬奉其􅀕祀言能保宗廟社稷也尚書大傳周傳曰􅀕之爲言察也察者至也至者人事也人事至然後􅀕􅀕者薦也薦之爲言在也在也者在其道也禮志曰君子生則敬養死則敬饗也又五行傳曰簡宗廟不禱祠廢􅀕祀逆天時則水不潤下君行此四者爲逆天此宫之政北爲水故源流竭絶是水不潤下也亦如之又天官上獸人曰凡􅀕祀喪紀賔客共其死獸生獸共其㒵者凡獸入于腊人當乾之也皮毛䈥角入于玉府給作器物又天官上亨人曰􅀕祀共大羹鉶羮賔客亦如之大羹􅁏湆也鄭司農云大羹不致五味也鉶羹加塩菜也又地官上牧人曰牧人宰牧六牲而阜蕃其物以供􅀕祀之牲牷六牲謂牛馬羊豕犬雞凡陽祀用騂牲毛之隂祀用黝牲毛之望祀各以其方之色牲毛之毛純也陰祀􅀕六郊地及社禝也鄭司農云陽祀春夏也黝讀爲幽幽黒也凡時祀必用牷物時祀四時所常祀謂山川以下至四方百物也凡外􅀕毀事用尨可也尨謂􅄂色不純毀謂疈辜毀除殃咎之属也凡􅀕祀共其犧牲以授充人繫之犧牲毛羽折具也授充人者當殊養之凡牲不繫者共奉之謂非時而􅀕祀者又地官上曰牛人掌養國之公牛以待國之政令凡􅀕祀供其享牛求牛以授職人而蒭之鄭司農云享牛前􅀕一日之牛求牛禱於􅀑神祈福之牛也玄謂献神之牛謂所以登者凡􅀕祀供其牛牲之牙與其盆簝以待事牙謂福衡之屬盆簝皆器名又地官下閭師曰凡庶民不畜者􅀕無牲不耕者􅀕無盛矣又春官上太宗伯曰太宗伯之職掌建􅀖之天神人􅀑地祇之禮以佐王建保􅀖國建立也立天神人􅀑地祇之禮者謂祀之􅀕之享之之禮􅁻禮是也自􅁻禮於上汝以立安􅀖國者牙以相成明尊􅀑神重人事以禋祀祀昊天上帝以實柴祀日月星辰以楢燎祀司中司命風師雨師禋之言煙也周人尚􅆨煙氣之􅆨聞者也楢積也詩曰芃芃棫樸薪之楢之三祀皆積柴實牲體焉或有玉帛燔柴而􅂛煙所以報陽也以血􅀕􅀕社稷五祀五嶽以理沉􅀕山林川澤以疈辜􅀕四方百物不言􅀕地此皆地祇􅀕地可知也隂祀自血起貴氣􅆨也社稷土穀之神也有徳者配食凡􅀕祀大神享大􅀑享􅀕大祇帥執事而卜日􅀫視滌濯涖玉鬯省牲鑊奉玉齊詔大號治其大禮詔相王之大禮執事諸有事於􅀕者也􅀫申式也滌濯漑􅀕器也􅀂王不與􅀕祀則攝位王有故代行其􅀕事凡大􅀕祠王后不與則攝而薦豆籩徹薦徹豆籩后之事國有大故則旅上帝及四望王大封則先告后土乃頒祀于􅀖國都家郷邑頒讀爲班班其所當祀及其禮也都家郷邑謂王子弟及公卿大夫所食采地也又春官下太祝曰太祝掌六祝之辭太師冝于社造于祖馬融傳曰爾雅曰起大事動大衆必先有事於社也設軍社􅀋上帝社者社主也􅀋者以事􅀋告祀上啼國將有事於四望將行也四望日月星辰也及軍歸獻于社則前祝献於社主又春官曰家宗人掌家􅀕祀之禮凡􅀕祀致福大夫采地之所祀與都同􅀂先王之子孫亦有祖廟}
