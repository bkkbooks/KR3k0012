  - {type: variant, offset: 1106, length: 771, content: 對曰禮上下之紀天地之經緯也緯絰錯居以相成者民之所以生也是以先王尚之又昭六曰齊景公曰善哉吾今而後知禮之可以為國也對曰禮之可以為國也久矣與天地並有天地則禮義興君令臣共父慈子孝兄愛弟敬夫和妻柔姑慈婦聽禮也君令而不違臣共而不貳父慈而教子孝而箴箴諫也兄愛而友弟敬而順夫和而義妻柔而正姑慈而從從不自專婦聽而婉婉順也禮之善物也又定下曰公會齊侯于祝其實夾谷夾谷即祝其地孔丘相相會儀也犂彌言於齊侯曰孔丘知禮而無勇若使萊人以兵劫魯侯必得志焉又定下曰邾隱公來朝邾子益也子貢觀焉邾子執王高其容仰公受玉卑其容俯王朝者之贄子貢曰以禮觀之二君者皆有死亡焉夫禮死生存亡之禮也將左右周旋進退俯仰於是乎觀之今正月相朝而皆不度不合法度心已亡矣又哀上曰太宰嚭召季康子嚭吳大夫康子使子貢辭太宰嚭曰國君道長大言君長於道路而大夫不出門此何禮也對曰豈以為禮畏大國也畏大國不敢虛國盡行大國不以禮命於諸侯茍不以禮豈可量也寡君既共命焉其老豈敢棄其國太伯端委以治周禮仲雍嗣之斷髮文身祼以為飾豈禮也哉春秋說題辭曰禮者所以設容明天地之體也論語曰有子曰禮之用和為貴先王之道斯為美小大由之有所不行知和而和不以禮節之亦不可行也又曰子曰導之以政齊之以刑民免而無恥導之以德齊之以禮有恥且格又曰子曰夏禮吾能言之𣏌不足徵也殷禮吾能言之宋不足徵也徵成也𣏌宋二國夏殷之後夏殷之禮吾能說之𣏌宋之君不足以成也又曰子張問十世可知也世謂易姓之世也問其制度變易如何子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也所損益可知也者據時篇目皆在可校數其或繼周者雖百世可知也自周之後以為變易損益之極極於三王亦不是過也又曰顏淵問仁子曰克己復禮為仁一日克己復禮天下歸仁焉為仁由己而由人乎哉顏淵曰請問其目子曰非禮勿視非禮勿聽非禮勿言非禮勿動顏淵曰回雖不敏請事斯語矣又曰子曰禮云禮云玉帛云乎哉言禮非但崇此玉帛而已所貴者乃貴其安上治民漢書曰漢王已并, WYG: 遂率}
