  - {type: variant, offset: 10, length: 0, content: '', krp: 祀之於竈從熱類也祀之先肺者陽位在上肺亦在上肺爲尊也又月令仲夏曰祀皇地祇於方丘夏至之日祀皇地祇於方丘以髙祖神堯皇帝配坐以岳瀆等神從祀又月令仲夏曰命有司祭先牧謂仲夏祭先牧於大澤用剛日又月令季夏曰其祀中霤祭先心中霤猶中室也祭中霤之禮爲俎先進心是月也祀黄帝於南郊謂季夏土德王日則祀黄帝合樞紐於南郊以軒轅配坐以后土鎮星從祀也又月令曰孟秋其祀門祭先肝秋隂氣出祀之於門外隂也祭先肝者秋爲隂中於藏值肝凡祀門爲爼先進肝也又月令曰孟冬其祀行祭先腎冬隂氣盛寒於外祀之於行從辟除之類行謂道也祭先腎者隂位在下賢亦在下凡祀行爲爼先進腎又月令孟冬日祀神州地祇於北郊謂立冬日祭神州地祇於北郊太宗文武聖皇帝配坐是月也命有司祭司寒謂孟冬祭司寒於北郊是月也命有司祭司中司命司人司禄謂立冬後亥日祀司禄等於國域西北又月令仲冬日命有司祈祀四海大川名源淵澤井泉順其盛徳之時祭也又曲禮上曰臨祭不惰祭服弊則焚之祭器弊則埋之又曲禮下曰無田禄者不設祭器有田禄者先爲祭服君子雖貧不鬻祭器雖寒不衣祭服去國祭器不踰境大夫寓祭器於大夫士寓祭器於士又曲禮下曰天子祭天地祭四方祭山川祭五祀歳徧諸侯方祀祭山川祭五祀歳徧大夫祭五祀歳徧士祭其先祭四方謂祭五官之神於四郊也勾芒在東祝融在南蓐收在西玄冥在北詩云來方禋祀者各祭其方之官而巳矣五祀謂竈中霤門行厲也此蓋殷時制也祭法天子立七祀諸侯立五祀大夫立三祀士立二祀謂周也凡祭有其廢之莫敢舉也有其舉之莫敢廢也爲其瀆神也廢舉謂若殷廢農祀弃後不服廢弃祀農也非所祭而祭之名曰淫祀淫祀無福支子不祭祭必告於宗子不敢自專凢祭宗廟之禮牛曰一元大武豕曰剛鬛豚曰肥腯羊曰柔毛雞曰翰音犬曰羮獻雉曰䟽趾兎曰明視脯曰尹祭槀魚曰啇祭鮮魚曰脡祭水曰清滌酒曰清酌黍曰薌合梁曰薌萁稷曰明粢稻曰嘉𬞞韭曰豐夲鹽曰醎醝玉曰嘉玉弊曰量弊號牲物者兾於人用也元頭也武迹也腯肥也春秋}
