  - {type: variant, offset: 169, length: 1, content: 婚, WYG: 凡獸入于腊人皮毛筋角入于玉府給作器用又天官上亨人曰祭祀共大羮鉶羮賔客亦如之大羮肉湆也鄭司農云大羮不致五味也又地官上牧人曰牧人掌牧六牲而阜蕃其物以供祭祀之牲牷六牲謂牛馬羊豕犬鷄凡陽祀用騂牲毛之隂祀用黝牲毛之望祀各以其方之色牲毛之色純也隂祀祭北郊地陽祀春夏也黝讀為幽幽黑色也凡時祀必用牷物凡外祭毁事用尨可也又云凡祭祀共其犧牲以受充人繋之凡生不繫者共奉之謂非時而祭祀者又地官上曰牛人掌飬國之公牛以待國之政令凡祭祀供其享牛求牛以授職人而芻之又云凡祭祀供其牛牲之牙與其盆簝以待人牙謂福衡之属盆簝皆器名又地官下閭師曰凡庶民不畜者祭無牲不耕者祭無盛矣又春官上大宗伯曰大宗伯之職掌建邦之天人神鬼地祇之禮以佐王建保邦國又云以禋祀祀昊天上帝以實柴祀日月星辰以槱燎祀司中司命風師雨師以血祭祭社稷五祀五嶽以貍沉祭山林川澤以疈辜祭四方百物又曰凡祀大神亨大鬼祭大祇帥執事而卜日宿視滌濯涖玉鬯省牲鑊奉玉齍詔大號治其大禮詔相王之大禮若王不與祭則攝位王}
