  - {type: variant, offset: 213, length: 0, content: '', WYG: 望日月星辰也及軍歸獻于社則前祝獻于社主又春官曰家宗人掌家祭祀之禮凡祭祀致福大夫采地之祀與都同若先王之子孫亦有宗廟禮記月令曰孟春之月其祀戸祭先脾仲春之月天子獻羔開冰先薦寢廟上丁命樂正習舞釋菜天子乃帥三公九卿諸侯大夫親往視之順時逹物也仲丁又命樂正入學習樂是月也祀不用犧牲用圭璧更皮幣又月令曰孟夏之月其祀竈祭先肺陽氣盛熱于外祀于竈從熱類也祀之先肺}
  - {type: page-break, offset: 213, content: '', id: KR3k0012_WYG_524-7a, image: WYG0897/WYG0897-0659c.png}
  - {type: variant, offset: 214, length: 0, content: '', WYG: 陽位在上肺為尊也又月令仲夏祀皇地祇於方丘夏至之日祀皇地祇于方丘以髙祖神堯皇帝配坐以岳瀆等神從祀又月令曰仲夏月命有司祭先牧又月令季夏月其祀中霤祭先心中霤中室也祭中霤是為爼先進心是月也祀黄帝于南郊謂季夏土德王日則祀黄帝也含䌔紐于南郊以軒轅配坐以后土鎮星從祀也又月令曰孟秋其祀門祭先肝秋隂氣出祀之于門外陽也祭先肝者秋為隂中于藏值肝祀門是為爼先進肝也又月令曰孟冬其祀行祭先腎冬隂氣盛寒于外祀之于行從辟除之類行謂道也祭先腎者隂位在下腎}
  - {type: page-break, offset: 214, content: '', id: KR3k0012_WYG_524-7b, image: WYG0897/WYG0897-0659d.png}
