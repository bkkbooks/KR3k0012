  - {type: variant, offset: 218, length: 5, content: 伹前代象天, WYG: 命有司祭司寒孟冬祭司寒于北郊是月也命有司祭司中司命司人司祿冬後𤣥日祀司寒等于國城西北又月令曰仲冬月命有司祈祀四海大川名源淵澤井泉順}
