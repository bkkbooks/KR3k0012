  - {type: variant, offset: 4, length: 1, content: 敘, SBCK: 王之後來助􅀕也二王殷夏也其後祀也宋也振鷺于飛于彼西雍我客戾止亦有斯容箋云白馬於西雍之澤言所集得其處也興者喻祀宋之君有㓗白之徳來助􅀕周之廟得}
  - {type: variant, offset: 4, length: 1, content: 敘, WYG: 祭}
  - {type: variant, offset: 4, length: 1, content: 敘, krp: 王之後來助祭也二王殷夏也其後祀也宋也振鷺于飛于彼西雍我客戾止亦有斯容箋云白馬於西雍之澤言所集得其處也興者喻祀宋之君有㓗白之徳來助祭周之廟得}
  - {type: variant, offset: 6, length: 0, content: '', SBCK: 之冝又臣工潜曰潜季冬薦魚春獻鮪也猗與􅃮沮潜有多魚有鱣有鮪鰷鱨鰋鯉猗與欽美之言􅃮沮歧周}
  - {type: variant, offset: 6, length: 5, content: 二禮記外傳, WYG: 上毛詩召南曰采蘋大夫妻能循法度也能循法度則可以承先祖供祭祀也于以采蘋南澗之濵于以采藻于彼行潦又小雅天保}
