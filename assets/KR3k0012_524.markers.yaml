  - {type: variant, offset: 336, length: 0, content: '', WYG: 寓祭器於大夫士寓祭器於士又曲禮下曰天子祭天地祭四方祭山川祭五祀嵗徧諸侯方祀祭山川祭五祀嵗徧大夫祭五祀嵗徧士祭其先又曰凡祭有其廢之莫敢舉也有其舉之莫敢廢也非其所祭而祭之名曰淫祀淫祀無福支子不祭祭必告于宗子不敢自専又祭宗廟之禮牛曰一元大武豕曰剛鬛豚曰腯肥羊曰柔毛鷄曰翰音犬曰羮獻雉曰疏趾兎曰明視脯曰尹祭膏魚曰商祭鮮魚曰脡祭水曰清滌酒曰清酌黍曰薌合粱曰薌萁稷曰明粢稻曰嘉蔬韭曰豐本鹽曰鹹鹺玉曰嘉玉幣曰量幣號牲物者異于人用也元頭武迹也腯肥也春秋傳曰博碩肥腯光貌也尹正也商猶量也脡直也嘉善也稻𤓰蔬之屬豐茂也鹹曰鹺今河東云幣帛也又曲禮下曰大饗不問卜祭五帝于明堂奠卜也不饒富富之言備也備而已勿過禮也又檀弓下曰仲遂卒於垂壬午猶繹萬入去籥仲尼曰非禮也卿卒不繹又王制曰祭豐年不奢凶年不儉又王制曰天子祭天地諸侯祭社稷大夫祭五祀五祀謂司命中霤門行属也天子祭天下名山大川五嶽視三公四凟視諸侯視其牲器之類又諸侯祭名山大川之在其地者天子諸侯祭因國之在其地而無主後者又禮器曰晏平仲祀其先人豚肩不揜豆澣衣濯冠以朝君子以為隘矣隘猶狹也}
