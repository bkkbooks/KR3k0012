  - {type: variant, offset: 100, length: 2, content: 九數, SBCK: 傳摸移冩自古􅀞人罕能兼知試論曰古之􅀞者或有遺其形似而尚其骨氣以形似之外求其􅀞此難可與俗人道也今之􅀞縱得形似而氣韻不生以氣韻求其􅀞則形似自在其間矣上古之􅀞迹簡而意澹澹而雅正顧陸之流是也中古之􅀞細宻而精緻以臻麗展}
  - {type: page-break, offset: 100, content: '', id: KR3k0012_SBCK_751-2a}
  - {type: variant, offset: 100, length: 2, content: 九數, krp: 傳摸移冩自古畫人罕能兼知試論曰古之畫者或有遺其形似而尚其骨氣以形似之外求其畫此難可與俗人道也今之畫縱得形似而氣韻不生以氣韻求其畫則形似自在其間矣上古之畫迹簡而意澹澹而雅正顧陸之流是也中古之畫細宻而精緻以臻麗展}
