  - {type: variant, offset: 2351, length: 7, content: 為有蒼生已來未, SBCK: 書􅀞稱一時}
  - {type: variant, offset: 2353, length: 262, content: 蒼生已來未之有也愷之每畫人成數年不點目睛人問其故荅曰四禮妍𧈪本無關於妙處傳神寫照正在阿堵物中嘗悅一鄰女挑之弗從迺圖其形於壁以棘針釘其心女遂患心痛愷之因致其情女從之遂密每重嵇康四言詩因為之圖常云手揮五弦易目送歸鴻難每寫人形妙絕於時嘗圖裴楷像頰上加三毛觀者覺神明殊勝又為謝鯤像在石巖裏云此子宜著丘壑中欲圖殷仲堪堪有目疾固辭愷之曰明府正為眼耳若明點瞳子飛白拂上使如輕雲之蔽月豈不美乎顧愷之嘗以一廚畫糊題其前寄桓玄所皆其深所珍者玄乃發其廚後竊取畫而緘閉如舊以還之紿云未開愷之見封題如初但失其畫直云妙畫通靈變化而去亦猶人之登仙了無怪色, krp: 姿態}
  - {type: variant, offset: 2356, length: 8, content: 來未之有也愷之每, WYG: 後}
