  - {type: punctuation, offset: 912, content: 「, id: KR3k0012_CHANT_751-bkkpn263}
  - {type: variant, offset: 916, length: 253, content: 筭術成帝時人也常從友人陳廣漢廣漢曰吾有二囷米忘其石數子為吾筭之元理以食筋十餘轉曰東囷七百四十九石六斗七合西囷六百九十七石八升遂署囷門後出米西囷六百九十七石九升中有一鼠大可一升東囷無差元禮後歲復過廣漢以米數告之元理以手擊床曰遂不知鼠之殊米不如剝面皮矣廣漢為之取酒脯數斤元理復筭曰千牛產二百犢萬雞將產五百鶵羊豕鵝鴨皆道其數菓蓏盧果切肴蔌悉知其所乃曰如此貲業之廣何供具之薄廣漢慚曰有倉卒賓無倉卒主人元理曰俎上蒸㹠一頭廚中荔枝一盤皆可以為設廣漢再拜謝罪入取之盡日為歡其術後傳南季南季傳項滔滔傳子陸皆得其分數而失其玄, SBCK: 賦彩謂非}
