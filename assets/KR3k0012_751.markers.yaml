  - {type: variant, offset: 2218, length: 137, content: 名臣列將於雲臺以椒房故謂馬后獨不及馬援東平王蒼觀圖言於帝曰何故不畫伏波像帝笑而不言又曰陳紀字元方父憂殆將滅性豫州刺史嘉其至行上書畫像百城以厲俗魏書曰曹休祖父嘗為吳郡太守休見壁上祖父畫下榻拜而涕泣魏氏春秋曰徐邈善畫作走水獺摽於水濱群獺集焉晉書曰顧愷之尤善丹青謝安深重之為有蒼生, WYG: 興}
