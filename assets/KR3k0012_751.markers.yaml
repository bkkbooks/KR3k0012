  - {type: variant, offset: 3336, length: 2, content: 咸稱, SBCK: 爲之王墨多游江湖善􅀞山水松柏􅄂樹等性踈野好酒每圖障興酣之後以墨潑之脚蹙手抹或拂或幹隨其形象爲山爲竹爲樹􅀿心隨意倐􅀂造化圗成雲霞澹澹風雨蕭蕭不見汚之路也又曰唐李靈雀落魄不拘檢毎圗一障非其所欲不可强也以酒生思傲然自得王公之尊寒暑之􅀂山水竹樹一􅀧一抹成於自然或即峯際雲􅀌或即島嶼極海非常制也又曰唐張志和字子同號煙波子常釣魚洞庭􅀄顔魯公在吴興知其髙節以漁歌五首贈之乃圗傳爲卷軸隨句賦象人魚鳥獸風雨雲月皆依字成形雅叶}
