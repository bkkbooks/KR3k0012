  - {type: variant, offset: 3190, length: 0, content: '', WYG: 髙宗甚重之畫稱一時之妙其畫山水樹石筆格遒勁湍瀬潺迴雲霞縹緲時覩神仙之事窅然嶺壑之幽時人謂之大李將軍也又曰唐韓幹尤工畫鞍馬有人詣門稱鬼使請馬一疋韓君畫馬焚之他日鬼使乘馬來謝其感神若此弟子孔榮為之上足又曰唐張璪字文通尤工樹石山水初畢宏擅名矜伐一見驚歎異之璪用秃筆或}
