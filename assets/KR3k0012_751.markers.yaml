  - {type: variant, offset: 2306, length: 1, content: 祖, SBCK: 􅀞蒼膺觀者疑其眞鳩雀不敢近又􅀞朝士圗當時妙絶又曰隋楊契丹官至上儀同僧悰云六法備詠甚有骨氣山東體制允屬伊人在閻立夲下契丹之迹非不雄冨此董展則乏精微李云田楊聲侔董展昔田楊與鄭法士同於京師光明寺􅀞小塔鄭圗東壁北壁田圗西壁南壁楊􅀞外邊四面是稱三絶揚以簟蔽􅀞處鄭􅀼觀之謂楊曰卿􅀞終不可學何勞鄣蔽􅀭託以㛰􅊚有對門之好又求楊􅀞夲楊引鄭至朝堂指宫闕衣冠車馬曰此是吾􅀞夲也由是鄭深歎伏又唐張孝師爲驃騎尉尢善􅀞地獄氣􅀱幽黙孝師曽死復蘇具見􅁳中事故備得之呉道􅀇見其􅀞因效之爲地獄變又曰唐王陁子善山水幽致峯巒極佳也上言山水者稱陁子頭道子脚又曰唐呉道子陽翟人也好酒使氣毎欲揮毫必湏酣飲學書於張長史旭賀􅁥知章學書不成因攻􅀞曽事逍遥公韋嗣立爲小吏因冩蜀道山水之體自爲一家其書迹似薛少保亦甚便利􅀄任兖州瑕丘縣尉􅀇宗召入禁中改名道􅀇因授内教博士非有詔不得􅀞張懷瓘毎云呉生之􅀞下筆有神是張僧繇後身也可謂知言矣官至寧王友開元中將軍裴旻善舞劒道􅀇觀旻舞畢揮毫益進時又有公孫大娘亦善舞西河劔氣渾脫張旭見之因爲之草書杜甫歌行􅄒其事是知書􅀞之藝皆湏意氣而成亦非懦夫所能作也又曰唐盧稜伽吴生弟子也􅀞迹似吴生但才力有限頗能細􅀞咫尺間山水廖廓物像精備經變佛像是其所長呉生甞於京師􅀞揔持寺三門大獲泉貨稜伽乃􅀼􅀞莊嚴寺三門銳思開張頗臻其妙一日呉生忽見之驚歎曰此子筆力當時不及我今乃􅀋我精爽盡矣居一月稜伽果卒又曰唐馮紹政尤善􅀞膺鶻鷄雉盡其形態觜眼脚爪毛彩俱妙曽於禁中􅀞五龍亦稱其善有降雲蓄雨之感又曰唐李思訓宗室也即林甫之伯}
