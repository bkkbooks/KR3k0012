  - {type: variant, offset: 3334, length: 0, content: '', SBCK: 又曰唐楊光􅀞松石山水岀於人表􅀄稱處士謁盧黄門懷愼也館之甚厚知其丹青之能意欲求之而未敢言楊懇辭去復苦留之知其家在洛中衣食乏少心所不安乃令人濳將數百千至洛中供擬取其家書示楊公感之未知所報盧因從容乃言欲求一蹤以子孫寳之意尚難之遂月餘圗一松石雲物移動造化人莫能覩也又曰唐陳閎㑹稽人也以能冩眞夲道薦之開元中召入供奉毎令冩眞御容妙絶當時􅀇宗射猪鹿兎鴈等并按舞圗􅄀容皆受詔冩貌又太清宫肅宗眞容匪唯龍鳯姿日角天宇之狀而筆力遒潤神彩英逸實天假其能也閻令之後一人而巳又曰唐張萱京兆人也當􅀞貴公子鞍馬屏幄宫苑子女等名冠於時善起草􅀧蔟置亭䑓竹樹花鳥僕􅀠皆極精研又曰唐王墨不知何許人也名冷善潑墨}
  - {type: page-break, offset: 3334, content: '', id: KR3k0012_SBCK_751-9b}
  - {type: variant, offset: 3334, length: 1, content: 時, WYG: 又曰唐李靈省落魄不拘檢每圖一障非其所欲不可强也以酒生思傲然自得不知王公之尊寒暑之夕若山水竹樹一㸃一抹成於自然或即峰際孤雲或即島嶼極海非常制也又曰唐張志和字子同號煙波子常釣魚洞庭初顔魯公在呉興知其髙節以漁歌五首贈之乃圖為卷軸隨句賦象}
