  - {type: variant, offset: 84, length: 1, content: 禮, SBCK: 爲下古則姚曇謝赫劉瑱毛惠逺已上四人齊元帝袁􅄧張僧繇江僧寳巳上四人梁楊子華田僧亮劉殺􅀑曹仲逹巳上四人北齊蔣少遊楊乞德已上二人後魏顧野王陳馮提伽之流是也後周隋及唐爲近代之價則董伯仁展子䖍孫尚子鄭法士楊契丹陳善見已上六人隋張孝師范長壽尉遟乞僧王知愼閻立德之流是也巳上六人唐又}
