  - {type: variant, offset: 3214, length: 5, content: 筆蹤措思參, WYG: 又畫殿内五龍鱗甲飛動每欲大雨即生煙霧呉生常持金剛經自當天寳中有楊庭光與之齊名潛畫呉生真雜講席衆人之中呉生觀之一見便驚語庭光云老夫貌醜何用圖之又曰唐周昉字景𤣥郭子儀婿趙維常令韓幹寫真衆皆稱善後又請昉寫真二人皆有名公常列二畫}
  - {type: page-break, offset: 3214, content: '', id: KR3k0012_WYG_751-13a, image: WYG0899/WYG0899-0600a.png}
  - {type: variant, offset: 3214, length: 5, content: 筆蹤措思參, krp: 又畫殿内五龍鱗甲飛動毎欲大雨即生煙霧呉生常持金剛經自識本身當天寳中有楊庭光與之齊名濳畫吴生眞}
