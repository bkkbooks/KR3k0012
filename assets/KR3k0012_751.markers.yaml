  - {type: variant, offset: 2990, length: 8, content: 魏收字伯起鉅鹿曲, WYG: 隋楊契丹官至上儀同僧悰云六法備詠甚有骨氣山東體制允屬伊人在閻立本下契丹之徒非不雄富比董展則乏精㣲李云田楊聲侔董展昔田楊與鄭法士同於京師光明寺畫小塔鄭圖東北壁田圖西壁南壁楊畫外邉四面是稱三絶鄭以簟蔽楊託以婚姻有對門之好又求楊畫本楊引鄭至朝堂指宫闕衣冠車馬曰此是吾畫本也由是鄭深歎服又曰唐張孝師為驃騎尉尤善畫地獄氣候幽黯孝師曽死復蘇具見㝠中事備得之吳道𤣥見其畫因號為地獄變又曰唐王陁子善山水幽致峰巒極佳世人言山水者稱陁子頭道子脚又曰唐呉道子}
  - {type: page-break, offset: 2990, content: '', id: KR3k0012_WYG_751-10a, image: WYG0899/WYG0899-0598c.png}
  - {type: variant, offset: 2990, length: 8, content: 魏收字伯起鉅鹿曲, krp: 隋楊契丹官至上儀同僧悰云六法備詠甚有骨氣山東體制允屬伊人在閻立夲下契丹之迹非不雄冨此董展則乏精微李云田楊聲侔董展昔田楊與鄭法士同於京師光明寺畫小塔鄭圗東壁北壁田圗西壁南壁楊畫外邊四面是稱三絶揚以簟蔽畫處鄭竊觀之謂楊曰卿畫終不可學何勞鄣蔽揚託以㛰􅊚有對門之好又求楊畫夲楊引鄭至朝堂指宫闕衣冠車馬曰此是吾畫夲也由是鄭深歎伏又唐張孝師爲驃騎尉尢善畫地獄氣候幽黙孝師曽死復蘇具見冥中事故備得之呉道玄見其畫因效之爲地獄變又曰唐王陁子善山水幽致峯巒極佳也上言山水者稱陁子頭道子脚又曰唐呉道子}
