  - {type: variant, offset: 3327, length: 4, content: 圖並立本, SBCK: 等實亦輝暎前古又曰唐韋無忝京兆人也􅀇宗朝以􅀞名馬異獸擅名時稱韋四足無不妙也曽見貌外國所獻師子酷似其眞後師子放歸夲國唯􅀞者在圗時因觀覽百獸見}
  - {type: variant, offset: 3327, length: 0, content: '', WYG: 等實亦輝暎古今又曰唐韋無忝京兆人也𤣥宗朝以畫名馬異獸擅名時稱韋四足無不妙也曾見畫外國所獻獅子酷似其真後獅子放歸本國唯畫者在}
  - {type: variant, offset: 3327, length: 4, content: 圖並立本, krp: 等實亦輝暎前古又曰唐韋無忝京兆人也玄宗朝以畫名馬異獸擅名時稱韋四足無不妙也曽見貌外國所獻師子酷似其眞後師子放歸夲國唯畫者在圗時因觀覽百獸見}
