  - {type: variant, offset: 1170, length: 956, content: 焉老子曰善計者不用籌策尹文子曰凡數十百千萬億億萬千百十皆起於一推至億億無差矣山海經曰帝令豎亥步自東極至於西極五億千選選萬也九千八百八十步豎亥右手把筭左手指青丘曰五億十萬九於八百天地東西二億三萬三千里南北二億一千五百里天地相去一億五萬里也愽物志曰南郡宜城王子山到泰山從鮑子真學筭異苑曰晉安有越王餘筭策長尺許白者似骨黑者似角云越王行海作筭有餘棄之於水生焉風俗通曰十十謂之百十百謂之千十千謂之萬十萬謂之億十億謂之兆十兆謂之經十經謂之垓十垓謂之補十補謂之選十選謂之載十載謂之極有物者有事者紀於此矣過此往者則其數可紀其名未之或聞也夫數一為特侯奇隻二為再兩偶雙三為參四為乘賈誼書曰數度之道以六為法數度之始始於微細有形之物莫細於毫是故立一毫以為度十毫為髮十髮為釐十釐為分十分為寸十寸為尺備於六故先王以為天下用也周髀曰周公問於殷高曰寡人聞子大夫善數數筭也語林曰鄭玄馬融門下三年不得見令高足弟子傳授而已融筭嘗渾天合召玄令筭一轉便決眾咸駭服謝察微筭經曰易稱太極是生兩儀蓋數之先也自隸首作術容成造曆顯筭斯興故也一位筭法曰萬萬穰為載數之極矣或問之曰何以數之為載按孫子筭經云古者積錢上至於天天不能容下至於地地不能載天不能蓋地不能載故名曰載又曰按司馬遷史記云自秦孝公時商鞅獻三術內一開道阡陌以五尺為步二百四十步為畝又曰按千乘之圖周之制度司馬法六尺為步步百為畝是古之制也發象筭經曰問云度之起起於何荅曰度之起起於忽忽是神蟲口中吐絲名也十忽為一絲十絲為一毫筭經曰量之起起於何荅曰量之起起粟粟是陰陽而生從六甲而出故六粟為一圭十圭為一抄筭經曰秤之起起於何荅曰秤之起起於黍黍是三稜草子也一絫為一絫十絫為一銖畫釋名曰畫挂也以五色挂物上也周禮曰畫繢之事雜五色東方謂之青南方謂之赤西方謂之白北方謂之黑天謂之玄地謂之黃青與白相次也赤與黑相次也玄與黃相次也此言畫繢六色所象及布彩之彩第凡畫繢之事後素功素白綵也後布之為其功易以潰沔之也論語曰繪事後素史記曰武帝衛太子廢後上居甘泉宮召畫周公負成王圖於是左右群臣知上意欲立少子也少子即昭帝也又曰甘露三年單于始入朝宣帝思服肱之美圖畫其人於騏麟閣法其狀貌署官爵姓名又曰李夫人早卒帝圖畫其形於甘泉宮又曰金日磾母教誨兩子甚有法度武帝聞而嘉之病死詔圖於甘泉宮曰休屠王閼氏日磾每見畫常拜向之涕泣東觀漢記曰馬援還誡兄子曰畫虎不成反類狗, SBCK: ''}
