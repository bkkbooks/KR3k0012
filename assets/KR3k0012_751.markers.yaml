  - {type: variant, offset: 79, length: 1, content: 行, krp: 然今分爲三古以定貴賤以漢魏三國爲上古則趙歧劉襃蔡邕張衡已上四人後漢曹旄楊循桓範徐邈已上四人魏曹不興呉諸葛亮蜀之流是也以晉宋爲中古則明帝荀朂衛恊王廙顧愷之謝稚嵆康戴逵已上八人晉陸探微顧寳先表倩顧景秀之流是也已上四人宋以齊梁北齊後魏陳後周爲下古則姚曇謝赫劉瑱毛惠逺已上四人齊元帝袁昴張僧繇江僧寳巳上四人梁楊子華田僧亮劉殺}
