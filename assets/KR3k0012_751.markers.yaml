  - {type: variant, offset: 86, length: 10, content: 保氏養國子以道乃教之, krp: 若言有書籍豈可無九經三史顧陸張吴爲正經楊鄭董展爲三史其餘畫迹爲百家呉雖近可爲正經又曰昔謝赫云畫有}
