  - {type: variant, offset: 287, length: 2, content: 河南, SBCK: 善筭嚴武善碁宋壽善上夢皇象善書曹不興善􅀞赤烏中不興之清溪見赤龍出水上冩獻孫皓皓送秘府至宋朝陸探微見􅀞歎其妙因至清溪復見其龍宋時累月亢旱祈禱無應乃取不興龍置水上應時蓄水成霧累月􅗈霈謝赫云不興之迹代不復見秘閣内一龍頭而巳觀其風骨擅名不虚在第一品矣又曰晉顧愷之字長康甞於瓦官寺北殿􅀞維摩詰􅀞訖光耀月餘日京師寺記云興寜中瓦官寺􅀄置僧衆設㑹請朝賢鳴刹注錢其時士大夫莫有過十萬者旣至長康長康直打刹注百萬長康素貧衆以爲大言後寺衆請勾䟽長康曰冝備一壁遂閉戸徃來一月餘日所􅀞維摩詰一軀工畢將欲􅀧眸子乃謂寺僧曰第一日見請施十萬第二日可五萬第三日可任例責施及開戸光照一寺施者填咽俄而得百萬錢愷之甞言􅀞}
  - {type: page-break, offset: 287, content: '', id: KR3k0012_SBCK_751-3b}
  - {type: variant, offset: 287, length: 2, content: 河南, WYG: 善筭嚴武善碁宋壽善占夢皇象善書曹不興善畫赤烏中不興之青溪見赤龍出水上寫獻孫皓送秘府至宋朝陸探㣲見畫歎其妙因至清溪復見其龍迨時累月亢旱祈禱無應乃取不興龍置水上應時蓄水成霧累月霶霈謝赫云不興之迹代不復見秘閣内一龍頭而已觀其風骨擅名不虛在第一品矣又曰晉顧愷之字長康嘗於瓦官寺北殿畫維摩詰畫訖光輝月餘日京師寺記云興寧中瓦官寺初置僧衆設㑹請朝賢鳴刹注錢其時士大夫莫有過十萬者長康既至直打刹注百萬長康素貧衆以為大言後寺衆請勾䟽長康曰宜備一壁遂閉户往來一月餘日所畫維摩詰一軀工畢將欲㸃眸子乃謂寺僧曰第一日見請施十萬第二日可五萬第三日可任例責施及開户光照一寺施者填咽俄而得百萬錢愷之嘗云畫}
