  - {type: variant, offset: 79, length: 3, content: 行鬼神, SBCK: 然今分爲三古以定貴賤以漢魏三國爲上古則趙歧劉襃蔡邕張衡已上四人後漢曹旄楊循桓範徐邈已上四人魏曹不興呉諸􅁑亮蜀之流是}
  - {type: variant, offset: 79, length: 1, content: 行, WYG: 然今分為三古以定貴賤以漢魏三國為上古則趙岐劉裒蔡邕張衡曹髦楊脩桓範徐邈曹不興諸葛亮之流是也以晉宋為中古則明帝荀朂衛協王廙顧愷之謝稚嵇康戴逵陸探㣲顧寳先袁倩顧景秀之流是也以齊梁北齊後魏陳後周為下古則姚曇謝赫劉瑱七惠遠元帝袁昂張僧繇江僧寳楊子華田僧亮劉殺}
