  - {type: variant, offset: 3190, length: 0, content: '', krp: 髙宗甚重之書畫稱一時之妙其畫山水樹石筆格遒勁湍瀬潺湲雲霞縹緲時覩神仙之事窅然巖嶺之幽時人謂之大李將軍也又曰唐韓幹尤工鞍馬忽有人詣門稱鬼使請馬一疋韓君畫馬焚之他日鬼使乗馬來謝其感神若此弟子孔榮爲之上足又曰唐張璪字文通尤工樹石山水𥘉畢宏擅名當代一見驚歎異之璪唯用秃筆成}
  - {type: variant, offset: 3191, length: 7, content: 繪事非急務自晦, WYG: 手摸絹素因問璪所授璪曰外師造化中得心源畢宏於是閣筆又曰唐李漸善畫蕃馬騎射鵰放牧川原之妙筆迹氣調今古無儔李仲和能繼}
