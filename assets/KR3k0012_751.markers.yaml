  - {type: variant, offset: 96, length: 65, content: 六藝六曰九數鄭司農曰九數方田粟米差分少廣商工均輸方呈羸不足旁要今有重差夕桀句服也漢書律歷志曰數者一十百千萬也所以筭數事物慎性命之理, WYG: 流是}
  - {type: variant, offset: 97, length: 1, content: 藝, SBCK: 法一曰氣韻生動二曰骨法用筆三曰應物象形四曰隨􅀋賦綵五曰經營位置}
