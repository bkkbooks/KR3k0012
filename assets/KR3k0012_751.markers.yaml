  - {type: variant, offset: 2276, length: 1, content: 嘉, SBCK: 又曰梁元帝名繹字丗誠善􅀞曽􅀞聖僧武帝親爲賛之任荆州刺史日􅀞蕃客入朝圗帝極稱善又􅀞職貢圗并序蓋外國來獻之事長子方智字實相尤能冩眞坐上賔客隨容􅀧染即成數人問童兒皆識之又曰梁蕭賁字文奐蘭陵人也多詞學工書􅀞曾於扇上􅀞山水咫尺之内見萬里可知姚最云雅性精宻後來難比含毫命素動必依眞學不爲人自娯而巳人間罕見}
  - {type: variant, offset: 2278, length: 2, content: 至行, SBCK: 跡又曰陶􅀪景字通明丹陽秣陵人㓜有異操年十歳讀書葛洪神仙傳便有隱逸之志居茅山號華陽隱居好著述明衆藝武帝甞欲徴用隱居􅀞二牛一以金籠頭牽之一則迤邐就水草武帝知其意不以官爵逼之又曰梁張僧繇吴人也天􅁥中爲武陵王國侍郎直秘書閣知􅀞事武帝崇飾佛寺多僧繇􅀞之時諸王在外武帝思之遣僧繇乗傳冩貌對之如面江陵天皇寺明帝置也内有柏堂僧繇􅀞盧舎那佛及仲尼十哲帝怪問釋門内如何􅀞孔聖僧繇曰後當頼此耳及後代滅佛法焚天下寺塔獨以殿有宣尼像乃不令毀拆又金陵安樂寺􅀞四龍不􅀧眼睛即恐飛去人以爲妄誕固請􅀧之遂􅀧二龍湏􅁷雷電破壁兩龍乗雲驣而}
  - {type: page-break, offset: 2278, content: '', id: KR3k0012_SBCK_751-5b}
