  - {type: variant, offset: 2848, length: 11, content: 昭明太子好士愛文劉孝綽, SBCK: 唐朝吴道􅀇古今獨歩前不見顧陸後無來者授筆法於張旭此又知書􅀞用筆同矣張旣號書顚呉冝爲􅀞聖神假天造英靈不窮唐􅀞斷曰唐呉道􅀇窮丹青之妙大約宗師張僧繇􅀇宗天寳中忽思蜀中嘉陵江水遂假呉生驛逓令徃貌之及迴帝問其狀奏云臣無粉夲並記在心遣於大同殿圗嘉陵江三百里山水一日而畢時有李將軍山水擅名亦􅀞大同殿數月方畢􅀇宗云李思順數月之功呉道􅀇一日之迹皆極其妙又􅀞殿内五龍鱗甲飛動毎欲大雨即生煙霧呉生常持金剛經自識本身當天寳中有楊庭光}
  - {type: page-break, offset: 2848, content: '', id: KR3k0012_SBCK_751-8a}
  - {type: variant, offset: 2848, length: 1, content: 昭, WYG: 梁蕭賁字文奐蘭陵人也多詞學工書畫曾於扇上畫山水咫尺之内見萬里可知姚最云雅性精宻後來難比含毫命素動必依真學不為人自娯而已人間罕見其匹又曰陶𢎞景字通}
  - {type: variant, offset: 2848, length: 1, content: 昭, krp: 梁蕭賁字文奐蘭陵人也多詞學工書畫曾於扇上畫山水咫尺之内見萬里可知姚最云雅性精宻後來難比含毫命素動必依眞學不爲人自娯而巳人間罕見其跡又曰陶弘景字通}
  - {type: variant, offset: 2850, length: 2, content: 太子, WYG: 丹陽秣陵人幼有異操年十歲讀書見葛洪神仙傳便有隱逸之志居茅山號華陽隱君}
  - {type: variant, offset: 2850, length: 2, content: 太子, krp: 丹陽秣陵人㓜有異操年十歳讀書葛洪神仙傳便有隱逸之志居茅山號華陽隱居}
  - {type: variant, offset: 2853, length: 3, content: 士愛文, WYG: 著述明衆藝武帝嘗欲徵用隱君畫二牛以金籠頭牽之一則麗迤就水草武帝知其意不以官爵逼之又曰梁武帝時張僧繇呉人也天監中為武陵王國侍郎直秘書閤知畫事武帝崇餙佛寺多僧繇畫之時諸王在外武帝思之遣僧繇乗傳寫貌對之如面江陵天皇寺明帝置也内有栢堂僧繇畫廬舎那佛及仲尼十哲帝怪問釋内如何畫孔聖僧繇曰後當頼此耳及後代滅佛法焚天下寺塔獨以殿有宣尼像乃不令毁拆又金陵安樂寺畫四龍不㸃眼睛即恐飛去人以為妄誕固請㸃之遂㸃二龍須臾雷電破壁兩龍騰乗雲上天二龍未㸃眼睛者見在又畫天竺二胡僧侯景亂散折焉一僧為唐右常侍陸堅所寳堅疾篤夢一胡僧告云我有同友離柝多時今在洛陽李家若求合得之當以法力助君陸以錢帛果於其處購得之其疾乃愈}
