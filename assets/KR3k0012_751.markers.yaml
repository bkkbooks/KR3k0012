  - {type: variant, offset: 492, length: 384, content: 此欲圖為帝王師至仕來三世不過太史郎誠不欲復傳之且此術微妙頭乘尾除一筭之法父子不相語初孫權行師征伐每令達有所推步皆如其言問其法終不言由此見非達常笑謂諸星氣風術者曰當廻筭帷幕不出戶牖以知天道而反晝夜暴露以望氛祥不亦難乎無間引筭自投乃歎曰吾筭盡某年月日其終矣達妻數見達效聞而哭泣達欲弭妻意乃更筭言向者謬誤耳尚未也後如期死權聞達有書求之不得錄問其女乃發達棺一無所得法遂絕焉王隱晉書曰王戎為司徒好治生公嫗二人常以象牙籌晝夜筭計家財唐書曰僧一行姓張氏公謹之孫也初求訪師資以窮大衍至天台山國清寺見一院古松十數門有流水一行立於門屏間聞院僧於庭布筭聲而謂其徒曰今日當有弟子自遠求吾筭法已合到門豈無人導達也即除一筭又謂曰門前水當卻西流弟子亦至一行承其言而趨入稽首請法盡授其術焉而門前水果卻西流西京雜記曰安定嵩真明筭術成帝時人也真常以筭自剋其壽七十三真曰綏和元年正月二十五日晡時死矣書壁以誌, SBCK: ''}
