  - {type: variant, offset: 285, length: 0, content: '', krp: 曹不興吴興人也孫權使畫屏風誤落筆點素因就成蠅狀權疑其眞以手彈之時稱吴八絶張㝅呉録云八絶者孤城鄭嫗善相劉惇善星象呉範善候風氣}
