  - {type: variant, offset: 3210, length: 2, content: 特臻, WYG: 聖神假天造英靈不窮唐畫斷曰唐呉道𤣥窮丹青之妙大約宗師張僧繇𤣥宗天寳中忽思蜀中嘉陵江水遂假呉生驛逓令往圖之及廻帝問其狀奏曰臣無粉本並記在身心上遣于大同殿圖嘉陵江三百里山水一日而畢時有李將軍山水擅名亦畫大同殿數月方畢𤣥宗云李思訓數月之功呉道𤣥一日之迹皆極}
  - {type: page-break, offset: 3210, content: '', id: KR3k0012_WYG_751-12b, image: WYG0899/WYG0899-0599d.png}
  - {type: variant, offset: 3210, length: 2, content: 特臻, krp: 用筆同矣張旣號書顚呉冝爲畫聖神假天造英靈不窮唐畫斷曰唐呉道玄窮丹青之妙大約宗師張僧繇玄宗天寳中忽思蜀中嘉陵江水遂假呉生驛逓令徃貌之及迴帝問其狀奏云臣無粉夲並記在心遣於大同殿圗嘉陵江三百里山水一日而畢時有李將軍山水擅名亦畫大同殿數月方畢玄宗云李思順數月之功呉道玄一日之迹皆極}
  - {type: variant, offset: 3213, length: 33, content: 妙筆蹤措思參於造化而創意經圖即有所缺如山水平遠雲峰石色絕跡天機非繪, SBCK: 優劣因趙夫人歸省公公子儀也問云此􅀞何人對曰趙郎曰何}
