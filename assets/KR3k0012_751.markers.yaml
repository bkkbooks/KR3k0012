  - {type: variant, offset: 2190, length: 0, content: '', SBCK: 南齊宗測宇敬微炳之孫也善􅀞傳其祖業志欲遊名山乃冩祖炳所􅀞尚子平圗於壁隱廬山居炳舊宅􅀞阮籍遇孫登於行障上坐卧對之又􅀞永業寺佛景臺皆稱妙絶又曰南齊謝赫姚㝡云􅀧刷精研意存切似冩貌人物不俟對㸔所湏一覽便歸操筆目想毫髮皆無遺失麗服靚粧隨時變改直眉曲􅁂與丗爭新別體細微多從赫始遂使委巷逐末皆􅀋效嚬至於氣韻精靈未躬生動之致筆路纎弱不副雅致之懷然中興巳後􅀞人馬貴在沈摽下毛惠逺上又曰南齊劉瑱字士温彭城人少聦惠多才藝攻書􅀞嬪墻當代第一謝云用意綿宻􅀞體簡細筆力困弱制置單省婦人最佳但纎削過差飜爲失眞然玩之詳熟甚有姿態又曰南齊毛惠逺滎陽陽武人也善􅀞馬時劉瑱善􅀞婦人並當代第一市青碧一千二百斤供御􅀞用錢六十五萬有言惠逺納利者勑尚書評價貴二十八萬後家徒壁立甚悔痛之惠逺弟惠秀永}
