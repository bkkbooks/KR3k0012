  - {type: variant, offset: 2853, length: 3, content: 士愛文, krp: 著述明衆藝武帝甞欲徴用隱居畫二牛一以金籠頭牽之一則迤邐就水草武帝知其意不以官爵逼之又曰梁張僧繇吴人也天監中爲武陵王國侍郎直秘書閣知畫事武帝崇飾佛寺多僧繇畫之時諸王在外武帝思之遣僧繇乗傳冩貌對之如面江陵天皇寺明帝置也内有柏堂僧繇畫盧舎那佛及仲尼十哲帝怪問釋門内如何畫孔聖僧繇曰後當頼此耳及後代滅佛法焚天下寺塔獨以殿有宣尼像乃不令毀拆又金陵安樂寺畫四龍不點眼睛即恐飛去人以爲妄誕固請點之遂點二龍湏臾雷電破壁兩龍乗雲驣而上天二龍未點眼睛者見在又畫天竺二胡僧侯景亂散坼爲二後一僧爲唐右常侍陸堅所寳堅疾篤夢一胡僧告云我有同友離拆多時今在洛陽李家若求合得之當以法力助君陸以錢帛果於其處購得之其疾乃愈}
