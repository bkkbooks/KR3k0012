  - {type: variant, offset: 224, length: 2, content: 張蒼, SBCK: 魏曹植言觀􅀞者見三皇五帝莫不仰戴見三季􅁀主莫不悲惋見􅆲臣賊嗣莫不切齒見髙節妙士莫不忘食見忠節死難莫不抗首見放臣斥子莫不歎息見􅁋夫妬婦莫不側目見令妃順后莫不嘉貴是知存乎鑒者􅀞也又曰蜀諸葛亮字孔}
  - {type: page-break, offset: 224, content: '', id: KR3k0012_SBCK_751-3a}
  - {type: variant, offset: 224, length: 0, content: '', WYG: 漢}
  - {type: variant, offset: 224, length: 2, content: 張蒼, krp: 魏曹植言觀畫者見三皇五帝莫不仰戴見三季暴主莫不悲惋見篡臣賊嗣莫不切齒見髙節妙士莫不忘食見忠節死難莫不抗首見放臣斥子莫不歎息見淫夫妬婦莫不側目見令妃順后莫不嘉貴是知存乎鑒者畫也又曰蜀諸葛亮字孔}
  - {type: variant, offset: 225, length: 1, content: 蒼, WYG: 衡字平子昔建州浦城縣山有獸名駭神豕身人首狀貌惡百鬼畏之好出水邉石上平子往寫之獸入潭中不出或云此獸畏畫故不出可去紙筆即去之獸果出平子拱手不動潛以足指畫獸今號畫獸潭又曰昔張芝學崔瑗杜度草書之法因而變之以成今草字之體勢一筆成氣脉通連隔行不斷唯王子敬}
  - {type: page-break, offset: 225, content: '', id: KR3k0012_WYG_751-3b, image: WYG0899/WYG0899-0595b.png}
  - {type: variant, offset: 227, length: 1, content: 習, SBCK: 華陽國志云南夷其俗徴巫􅀑好盟詛要之諸葛亮乃爲夷作圗先􅀞}
  - {type: variant, offset: 227, length: 1, content: 習, WYG: 其深㫖故後首之字往往繼其前行世謂之一筆書其後陸探㣲亦作一筆畫綿連不斷故知書畫用筆同法陸探㣲精利潤媚新竒絶妙名髙宋代時無等倫又曰魏曹植言觀畫者見三皇五帝莫不仰戴見三季暴主莫不悲惋見簒臣賊嗣莫不切齒見髙節妙士莫不忘食見忠節死難莫不抗首見忠臣孝子莫不歎息見淫夫妬婦莫不側目見令妃順后莫不嘉貴是知存乎鑒者畫也又曰蜀諸葛亮字孔明華陽國志云南夷其俗徵巫鬼好盟詛要質諸葛亮乃為夷作圖先畫}
