  - {type: variant, offset: 285, length: 0, content: '', SBCK: 曹不興吴興人也孫權使􅀞屏風誤落筆􅀧素因就成蠅狀權疑其眞以手彈之時稱吴八絶張㝅呉録云八絶者􅀌城鄭嫗善相劉惇善星象呉範善􅃸風􅂔}
