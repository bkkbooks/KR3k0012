  - {type: variant, offset: 3155, length: 2, content: 薛稷, WYG: 唐盧稜伽呉生弟子也畫迹似呉生但才力有限頗能細畫咫尺間山水寥廓物象精備經變佛像是其所長呉生常於京師畫揔持寺三門大獲泉貨稜伽乃窮畫莊嚴寺三門銳思開張頗臻其妙一日呉生忽見之驚歎曰此子筆力當時不及我今乃􅁼我精爽盡矣居一月稜伽果卒又曰唐馮紹政尤}
