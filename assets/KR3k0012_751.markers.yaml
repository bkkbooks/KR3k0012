  - {type: variant, offset: 3328, length: 2, content: 並立, WYG: 時因觀覽百獸見之皆懼又𤣥宗射獵一箭中兩野猪詔於𤣥武北門傳寫貌在人間乃妙之極也又曰唐楊炎畫松石山水出於人表初稱處士謁盧黄門舘之甚厚知其丹青之妙意欲求之而未敢言楊遽辭去復苦畱之知其家在洛中潛令供其衣食取家書示楊楊感之未知所報盧因從容乃言欲求一蹤以為子孫家寶意尚難之遂月餘圖一幛松石雲物移動造化人莫能覩之也又曰唐陳閎會稽人也以能畫真}
  - {type: page-break, offset: 3328, content: '', id: KR3k0012_WYG_751-14a, image: WYG0899/WYG0899-0600c.png}
  - {type: variant, offset: 3331, length: 0, content: '', WYG: 道薦之開元中召入供奉每令寫真御容冠絶當代𤣥宗射猪鹿兎鷹等并按舞圖真容皆承詔寫貌又太清宫肅宗真容匪唯龍顔鳯姿日角月輪之狀而筆力遒潤神彩英竒實天假其能也閻令公之後一人而已又曰唐張萱京兆人嘗畫貴公子鞍馬屏幄宫苑士女等名冠於時善起草㸃簇置亭臺竹樹花鳥僕𨽻皆極精姸又曰唐王墨不知何許人也名冷善潑墨時人謂之王墨多游江湖善畫山水栢松雜樹等性疎野好酒每圖障興酣之後以墨潑之脚拖手抹或枝或幹隨其形象為山為竹為樹應心隨意倐若造化圖成雲霞澹澹風雨蕭蕭不見墨汚}
  - {type: page-break, offset: 3331, content: '', id: KR3k0012_WYG_751-14b, image: WYG0899/WYG0899-0600d.png}
  - {type: page-break, offset: 3331, content: '', id: KR3k0012_WYG_751-15a, image: WYG0899/WYG0899-0601a.png}
