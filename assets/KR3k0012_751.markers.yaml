  - {type: variant, offset: 2281, length: 0, content: '', SBCK: 天二龍未􅀧眼睛者見在又􅀞天竺二胡僧侯景亂散坼爲二後一僧爲唐右常侍陸堅所寳堅疾篤夢一胡僧告云我有同友離拆多時今在洛陽李家􅀂求合得之當以法力助君陸以錢帛果於其處購得之其疾乃愈劉長卿爲記述其事張􅀞所有靈感不可具記又曰北齊髙孝珩丗宗第二子也封廣寧郡王尚}
