  - {type: variant, offset: 3481, length: 1340, content: 鵰令群鳥噪之遂獻焉唐李寶臣為成德軍節度使寶臣為朱滔使曰吾聞朱公貌如神得而識之願因繪事而觀可乎滔乃圖其形以示之寶臣懸於射堂命諸將熟視之曰朱公信神人也鍾岏良吏傳曰鄭純字長伯廣漢人也為永昌太守清廉獨絕及卒列畫東觀三齊記略曰秦始皇求與海神相見神云我形醜約莫圖我形當與帝會始皇入海三十里與神相見左右有巧者潛以腳畫神形神怒帝負約乃令帝速去始皇即馬前腳猶立後腳隨陷僅得登岸畫者溺死續齊諧記曰魏明帝遊洛水水中有白獺靡淨可憐見之輒去帝顧玩之終不可得侍中徐景山曰臣聞獺嗜鯔魚乃不避死可以此候之乃自畫板作兩生鯔音淄魚懸岸於是群獺競赴遂一時執得帝嘉之謂曰不聞卿知畫何其妙也荅曰臣亦未嘗執筆人之所作者自可庶幾耳帝曰是善用所長者也西京雜記曰元帝後宮既多不得常見乃使畫工圖其形按狀幸之諸宮人皆賂畫工多者十萬王嬙不肯遂不得見後匈奴求美女帝按圖以昭君行及召見貌為第一帝悔之而名籍已去乃按其事畫工棄市籍貲畫工有桂陵毛延壽寫人好醜老少必得其真安陵陳敝新豐劉白龔寬並工牛馬人形杜楊望亦善畫尤善布色樊育亦善布色同日棄市京師畫工於是差稀拾遺記曰周靈王時有韓房者自渠胥國來獻王駞房長一文垂髮至膝周人見之如神明矣以丹砂畫左右手為日月盈缺之勢不異真焉可照百餘步又噴水為雲蔽虧其側靈王視之忽不知所在或云昇天又曰秦始皇二年謇涓國獻善畫者名烈商口含丹黑噴壁即成龍雲之像以指歷地若繩分矣轉手若規方寸之內四瀆五岳列國莫不悉備畫為鳳鸞皆軒軒若行也韓子曰客有為齊王畫者王問曰畫孰最難對曰狗馬最難孰曰最易對曰鬼魅最易夫狗馬人之所知也旦暮覩於前不可類之故難也鬼魅無形無形者不可覩故易也淮南子曰畫西施之面者美而可悅規孟賁之目者大而可畏又曰宋畫吳冶宋人工畫吳人工治其為微妙堯舜之聖不能及也抱朴子曰衛恊張黑有畫聖之名華陽國志曰漢嘉郡以禦雜夷宜炫曜之迺雕飾城墻華畫府寺及諸門作山神海靈窮奇鑒齒夷人初出入恐騾馬或憚之趑趄說苑曰齊起九重之臺國中有能畫者則賜之錢狂卒敬君居常飢寒其妻端正敬君工畫貪賜畫臺去家日久思念其婦遂畫其像向之喜笑旁人見以白王王以錢百萬請妻敬君惶怖許聽世說曰戴安道為范宣畫南都賦圖范宣看而咨嗟焉俗說曰顧虎頭為人畫扇作阮籍嵇康都不點眼精送還扇主曰點眼精便欲能語論衡曰人好觀圖畫上所畫古之死人也見死人之面孰與視其言行古賢之遺文竹帛之所載粲然豈徒墻壁之畫哉出本曰史皇作圖史皇黃帝臣也謂畫物像也新序曰葉公子高好龍門亭軒牖皆畫龍形一旦真龍垂頭䆫棹尾於戶葉公驚走失措焉風俗通曰按百家書云公輸般之水上見蠡謂蠡曰開汝匣見汝形蠡適出頭般以足畫圖之古今名畫錄曰晉有史道碩畫田家十月圖為世所珍孫暢之述畫曰漢靈帝詔蔡邕圖赤泉侯楊喜五世將相形像於省中又詔邕為讚仍令自書之邕文畫書于時獨擅可謂備三美矣又曰劉裒漢靈帝時作雲漢圖人見之自然覺熱更畫北風圖熱者還覺涼魏陳思王畫讚序曰蓋畫者鳥書之流也昔明德馬后美於色厚於德帝用喜之嘗從觀畫過虞舜之像見俄皇女英帝指之戲后曰恨不得如此人為妃又前見陶唐之像后指堯曰嗟乎群臣百僚恨不戴君如是帝顧而咨嗟焉晉傅咸畫像賦序曰先有畫卞和之像者以為臧文仲知柳下惠之賢而不與立卞子自刖以有證相去遠矣戲畫其像於卞子之旁特赤其面以示猶有慚色宋炳山畫敘曰豎畫三寸寔當千仞之高橫墨數尺實體百里之逈晉王彪之詩序曰余自求致仕詔累不聽因扇上有二踈畫作詩一首以述其美, SBCK: ''}
