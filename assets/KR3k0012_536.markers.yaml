  - {type: variant, offset: 1239, length: 399, content: 立廟鍾離意別傳曰意為魯相脩孔子廟孔子教授堂下床首有懸甕意召守廟孔訢問曰此何等甕訢曰夫子甕背有丹書自夫子亡後無敢發者意乃發索得書焉宋書禮志曰晉清河人李遼表曰亡父先臣回綏集邦邑歸誠本朝以太元十年遣臣奉表路經闕里過覲孔廟庭宇傾頹軌式頹圯萬世宗匠忽焉淪廢仰瞻俯慨不覺涕流既逵京輦表求興復聖祀脩建講學至十四年奉被明詔採臣鄙議勑兗州魯郡准舊營飾北齊書曰天保元年詔封崇聖侯邑一百戶以奉孔子之祀并下魯郡以時脩治廟宇務盡襃崇之至唐書曰武德中制祠典釋奠於太學以周公為先聖孔丘配饗房玄齡及朱子奢議云公旦尼父俱是聖人庠序置奠本緣夫子故魯宋至於梁陳爰及隋大業故事皆以孔丘為先聖顏回為先師歷代所行古今通允請停祭周公升夫子為先聖以顏回配饗又曰上元中制曰定禍亂者必先於武德極生靈者諒在於師貞周武創業克寧區夏惟師尚父實佐興王況德有可師義當禁暴稽諸古昔爰崇典禮太公望可追封為武成王有司依文宣王置廟擇古今名將置亞聖及十哲享祭之典一同文宣, SBCK: 日重輪}
