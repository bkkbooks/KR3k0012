  - {type: variant, offset: 1645, length: 18, content: 始於兩京置齊太公廟以張良配上元初特加, SBCK: 登}
  - {type: variant, offset: 1645, length: 0, content: '', WYG: 登封泰山上因問玊牒之文前代帝王何故秘之賀知章曰玉牒本是通於神明之意前代帝王祈求各異或禱年算或思神仙其事㣲宻故外人莫知之上曰朕今此行皆為蒼生祈福更無秘請宜将玊牒出示百僚其詞曰有唐天子臣某敢昭告於昊天上帝天啟李氏運興土徳髙祖太宗受命立極髙宗升中六合殷盛中宗紹復繼體不定上帝眷佑錫臣忠武底綏内難推戴聖父恭承大寳十有三年祗若天意四海晏然封祀岱岳謝成於天子孫百祿蒼生受福風俗通曰封禪必於岱宗者萬物之長如隂陽交代觸石而出膚寸而合不崇朝而遍雨天下惟泰山乎封禪之制石髙二丈刻之曰事天以禮立身以義事父以孝成民以仁四夷八蠻咸貢其職白虎通曰封禪王者易姓而起必升封泰山何教告之義也}
  - {type: page-break, offset: 1645, content: '', id: KR3k0012_WYG_536-17a, image: WYG0898/WYG0898-0028a.png}
  - {type: variant, offset: 1645, length: 18, content: 始於兩京置齊太公廟以張良配上元初特加, krp: 登}
  - {type: variant, offset: 1646, length: 0, content: '', WYG: 受命之日改制應天天下太平功成封禪以吿太平也所以必}
  - {type: variant, offset: 1647, length: 4, content: 兩京置齊, WYG: ''}
  - {type: variant, offset: 1652, length: 2, content: 公廟, WYG: 山何萬物之所交代之處必於其上何因高告高順其類也故升封者增高也下禅梁父之山基廣厚也刻石記號者著已上之迹也天}
  - {type: page-break, offset: 1652, content: '', id: KR3k0012_WYG_536-17b, image: WYG0898/WYG0898-0028b.png}
