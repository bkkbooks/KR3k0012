  - {type: variant, offset: 4, length: 3, content: 四庠序, SBCK: 五封禪河圖眞紀鈎曰王者封太山禪梁父易姓奉度繼興崇功者七十二君尚書中候曰維歳二月􅀱在東舘鄭玄注曰維辭也侯齊桓公舘舎嘆曰於戲仲父寡人聞古霸王封太山刻石紀號立顯象今寡人名爲何君管子曰衛困于狄案兵湏㓕乃存之仁不純名爲霸君昔古聖王功成道洽符出乃封太山今比目之魚不至鳯凰不臻麒麟遯未可以封}
