  - {type: variant, offset: 173, length: 6, content: 鄉序庠置孝經, WYG: 公孫𢎞議欲放古廵狩封禪之事諸臣對者五十餘人未能有所定先是司馬相如病死有遺書頌功徳符瑞足以封泰山上竒其書以問倪寛對曰陛下躬發聖徳綂攝群臣宗祀天地薦禮百神精誠所嚮徴兆必報天地并應符瑞帝王之盛莭也宜順承天慶垂萬世之基上然之乃自制儀采儒術以文焉又郊祀志曰初上欲治明堂奉髙帝未曉其制度濟南人公玊帶上黄帝時明堂圖於是上令奉髙作明堂汶上如帶圖及是嵗修封則祠太一五帝於明堂上坐令髙皇帝祠坐對之又曰黄帝時雖封泰山然風后封鮌岐伯令黄帝封東泰山韋昭曰别有小泰山在隂一名介山臣瓉按鄭志朱虛介中有小泰山是也汾隂子推所焚故名介山也不以介為大也禪凡山合符然後不死天子既令設祠其至東泰山泰山卑小不稱其聲乃令祠官禮之而不封焉其後令帶奉祠候神物復還泰山脩五帝之禮如前而加禪祠石閭石閭者在泰山下趾南方方士言仙人閭也故上親禪焉其後五年復泰山脩封過祭恒山自封泰山後十二嵗而周徧五嶽四瀆矣後五年復至泰山脩封武帝五脩封又曰太初元年十二月禪蒿里服䖍日山名在泰山下太初三年春正月東廵海上夏四月還脩封泰山禪石閭天漢三年受計還幸北地祠常山瘞𤣥玉鄧展曰瘞理也又曰太始四年春三月甲申脩封丙戌禪石閭夏四月幸不其如淳曰其音基不其山名因以為縣祠神人於交門宫應劭曰神人蓬莱仙人之属也晉灼曰瑯琊縣有交門宫武帝所造若有嚮坐拜者作交門之歌}
