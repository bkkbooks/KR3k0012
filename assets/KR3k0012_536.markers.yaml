  - {type: variant, offset: 108, length: 0, content: '', SBCK: 易姓而王太平必封太山禪梁父何天命巳爲王使理羣生也或曰封以黄金爲泥以銀爲繩經無明文以義􅀃之所以正封岱太山者五嶽之長羣神之主故獨封於太山告太平於天報羣神之功也禪梁父者太山之支屬能配太山之德也史記封禪書曰齊桓公旣霸會諸侯於葵丘而欲封禪管仲曰古者封太山禪梁父者七十二家而夷吾所記者十有二焉昔無懷氏封太山禪云云宓羲封太山禪云云神農封太山禪云云炎帝封太山禪云云黄帝封太山禪亭亭顓頊封太山禪云云帝嚳封太山禪云云堯封太山禪云云舜封太山禪云云禹封太山禪㑹稽湯封太山禪云云周成王封太山禪社首應劭曰山名在􅀶縣晉灼曰在鉅平南卜}
  - {type: page-break, offset: 108, content: '', id: KR3k0012_SBCK_536-2a}
  - {type: variant, offset: 108, length: 0, content: '', WYG: 易姓而王太平必封泰山禪梁父何天命已為王使理羣生也或曰封以黄金為泥以銀為繩經無明文以義説之所以止封岱泰山者五嶽之長羣神之主故獨封於泰山告太平于天報羣神之功也禪梁父者泰山之攴屬能配泰山之德也史記封禪書曰齊桓公既霸㑹諸侯於葵丘而欲封禪管仲曰古者封泰山禪梁父者七十二家而夷吾所記者十有二焉昔無懷氏封泰山禪云云虙羲封泰山禪云云神農封泰山禪云云炎帝封泰山禪云云黄帝封泰山禪亭亭顓頊封泰山禪云云帝嚳封泰山禪云云堯封泰山禪云云舜封泰山禪云云禹封泰山禪㑹稽湯封泰山禪云云周成王封泰山禪社首應劭曰山名在博縣晉灼曰在鉅平南十}
