  - {type: variant, offset: 9, length: 0, content: '', SBCK: 禮噐曰是故因天事天天髙因髙者以事也因地事地地下因下者以事也因名山升中于天名猶大也升上也中猶成也謂巡守至於方嶽燔柴􅀕天告以諸侯之成功也孝経􅀃曰封乎㤗山考績燔燎禪乎梁甫刻石紀號也升中于天而鳯皇降􅀛龍假功成而太平隂陽氣和而致象物禮記逸禮曰三皇禪云云盛意也五帝禪云云特立於身也三}
