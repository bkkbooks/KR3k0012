  - {type: variant, offset: 1089, length: 149, content: 年元康五年二行饗禮皆於辟雍不在太學是則釋奠於太學行饗於辟雍有晉已行之准也中朝有辟雍猶在太學況無辟雍唯有太學更當不在太學乎宰相從太常所荅晉范堅書問馮懷曰漢氏以來釋奠先師唯仲尼不及公且何也馮荅曰若如來談亦當憲章堯舜文武豈唯周旦乎摯虞釋奠頌曰如彼泉流不盈不運講業既終禮師釋奠升觴折俎上下惟善邕邕其來肅肅其, SBCK: 色雲}
