  - {type: variant, offset: 1665, length: 0, content: '', WYG: 山禪梁父說岱宗上有金箧玊策能知人年夀脩短武帝探得十八倒讀曰八十其後果用考長桓譚新論曰太山之上有刻石凡千八百餘處而可識者知七十有二袁准正論曰封禪之言惟周官有王大封之文齊桓}
