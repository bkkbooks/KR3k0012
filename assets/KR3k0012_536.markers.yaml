  - {type: variant, offset: 749, length: 1, content: 七, SBCK: 封故事封太山於圜臺上四面皆立石闕並髙五丈有方石再累藏玉牒書石撿十枚於四邊括之東西各三南北各二外設石封髙九尺上加石盖周設石距十八枚如碑之狀去壇三步其下石跗入地數尺今按封禪者本以成功告於上帝天道崇質義取醇素故藉用藁秸罇以瓦甒近代此法不在經誥又乖淳朴之道定議除之按梁甫是謂梁隂近代設壇於山下乃乘處隂之義今定禪禮改壇位於山北又曰貞觀六年文武百官以􅀄平突厥盛德􅀍於海内又年榖累登表封太山太宗謂侍臣曰朕毎見衆議以封禪爲盛事勸朕行之如朕本心但使天下太平家給人足雖闕封禪之禮亦可以比徳於堯舜昔始皇爲合天心自稱皇帝登封岱宗奢侈自矜漢文竟不登封而躬行儉約刑措不用今皆稱始皇爲􅁀虐之主漢文爲有德之君以此而言無假封禪又曰髙宗麟德二}
  - {type: page-break, offset: 749, content: '', id: KR3k0012_SBCK_536-8b}
  - {type: variant, offset: 749, length: 1, content: 七, WYG: 封故事封太山於圜䑓上四面皆立石闕並髙五丈有方石再累藏牒書石檢十枚於四邊栝之東西各三南北各二外設石封髙九丈上加石盖周設石距十八枚如碑石状去壇三歩其下石跗入地數尺今按封禪者本以成工吿於上帝天道崇質義取醇素故藉用藁秸罇以瓦甒近代此法不在經誥又乖淳朴之道矣定議除之按梁甫湜謂梁隂近代設壇於山下乃乖處隂之義今定禪禮改壇立於山北又曰貞觀六年文武百官以初平突厥盛徳被於海内又年榖累登表封太山太宗謂侍臣曰朕每見衆議以封禪為盛事勸朕行之如朕本心但使天下太平家給人足雖闕封禪之禮亦可以比徳於堯舜昔始皇為合天心自稱皇帝登封岱宗奢侈自矜漢文竟不登封而躬行籍田刑措不用今皆稱始皇暴虐之主漢文為有徳之君以此言之無假封禪又曰髙宗麟徳二}
