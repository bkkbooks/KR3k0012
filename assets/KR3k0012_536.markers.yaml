  - {type: variant, offset: 190, length: 0, content: '', krp: 編録三月上幸魯過太山太山守以上過故承詔祭太山及梁父時虎賁中郎將梁松議封禪事上許松等奏乃求元封時封禪故事議封禪所施用有司奏當用方石再累置壇中皆方五尺一枚厚一尺用玉牒書藏方石牒厚五寸長尺三寸廣五寸有玉牒十枚列於方石旁東西南北各三皆長三尺廣一尺厚七寸檢中刻三處深四寸方五寸有盖檢用金鏤五周以水銀和金爲泥刻玉璽一枚方寸一分一枚方五寸石四角有距石皆再累一枚長一丈厚一尺廣二尺皆在壇上其下用距十八枚皆髙三尺厚一尺廣二尺如小碑環壇立之去三歩距石下皆有石跗入地四尺又用石碑髙九尺廣三尺五寸厚尺二寸立壇丙地去壇三尺以刻書上以用石功難又欲及二月封故詔松因故封石空檢更加封而巳松上䟽爭之以爲登封之禮今告功皇天垂後無窮以爲萬民也丞天之敬章圗書之瑞尤冝顯著今因舊封竄寄故石下恐非重命之義受命中興冝當特異以明天意遂使太山郡及魯趣石工直取完青石無五色時以印工不能刻玉牒欲用丹􅃮書之㑹求得刻玉者遂刻書書秘刻方石中令容玉牒二月上至奉髙遣御史與蘭臺令史將工先上山刻石碑文二十二日辛夘晨燎祭天於太山下南方群臣皆從用樂皆如南郊諸王王者二公孔子後襃成君皆助祭在位畢將升封或曰太山雖已從食於柴祭今親升告功冝有禮祭於是使謁者以一特牲於常祠太山處告祠太山如親耕􅓔劉先農虞故事至食時上御輦升山日後到山上即位於壇南北面羣臣以次陳後西上畢帝升壇尚書令奉玉牒檢皇帝以寸二分璽親封之訖太常命人發壇上石尚書令奉藏玉牒巳復石覆訖尚書令以五寸印封石檢事畢皇帝拜群臣稱萬歳令人立所刻石碑乃復}
