  - {type: variant, offset: 1938, length: 200, content: 熙平中天子引袁逢為三老賜玉杖應劭漢書曰天子父事三老兄事五更天子親割三公設几九卿正履魏志高貴鄉公詔曰夫養老興教三代所以樹風化垂不朽也必有三老五更以崇至敬乞言納誨著在惇史然後六合承流下觀而化宜妙簡德行以充其選關內侯王祥履仁秉義雅志淳固關內侯鄭小同溫恭孝友師禮不忒其以祥為三老小同為五更車駕親率群司躬行古禮焉王隱晉書曰王祥字休徵魏帝高貴鄉公入學命祥為三老祥南面几杖以師道自居帝北面乞言祥於是陳明王聖帝之軌君, SBCK: ''}
