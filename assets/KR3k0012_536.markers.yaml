  - {type: variant, offset: 108, length: 0, content: '', krp: 易姓而王太平必封太山禪梁父何天命巳爲王使理羣生也或曰封以黄金爲泥以銀爲繩經無明文以義說之所以正封岱太山者五嶽之長羣神之主故獨封於太山告太平於天報羣神之功也禪梁父者太山之支屬能配太山之德也史記封禪書曰齊桓公旣霸會諸侯於葵丘而欲封禪管仲曰古者封太山禪梁父者七十二家而夷吾所記者十有二焉昔無懷氏封太山禪云云宓羲封太山禪云云神農封太山禪云云炎帝封太山禪云云黄帝封太山禪亭亭顓頊封太山禪云云帝嚳封太山禪云云堯封太山禪云云舜封太山禪云云禹封太山禪㑹稽湯封太山禪云云周成王封太山禪社首應劭曰山名在博縣晉灼曰在鉅平南卜}
  - {type: variant, offset: 109, length: 0, content: '', SBCK: 里也皆受命然後得封禪桓公曰寡人北伐山戎過􅀌竹西伐大夏渉流沙束馬懸車上卑耳之山南伐至邵陵登熊耳山以望江漢兵車之㑹三而乗車之㑹六九合諸侯一匡天下諸侯莫違我者三代受命亦何以異乎於是管仲相桓公不可窮以辭因設之以事曰古之封禪鄗上之􅁰北里之禾應邵曰鄗上山也鄗音曤蘇林曰鄗上北里皆地名所以爲盛江淮之間一茅三脊所以爲藉也東海致比目之魚西海致比翼之鳥然後物有不召而自至者十有五焉今鳯皇麒麟不來嘉榖不生而蓬蒿藜秀茂䲻梟數至而欲封禪無乃不可乎桓公乃止又曰始皇旣并天下即位三年東巡狩郡縣祠邹嶧山頌􅁗功業於是徴齊魯之儒生􅀶士七十人至於太山下或議曰古者封禪爲蒲車惡傷山之土石草木掃地而􅀕席用􅉁稭言其易遵也始皇聞此議各乖異難施用由此絀儒生而遂除車道上自太山陽至巔立石頌􅁗始皇帝德明其得封也從隂道下禪於梁父其禮頗採太祝之祀雍上帝所用而封藏皆祕之丗不得而記也始皇之上太山中阪遇風雨􅁀至休於大樹下因封其樹爲五大夫又曰今天子即位尤敬鬼神之祀元年漢興以六十餘歳矣天下乂安搢紳之屬皆望天子封禪改正度也而上郷儒術招賢良趙綰}
