  - {type: variant, offset: 1663, length: 0, content: '', WYG: 髙厚者加厚矣或曰封者金泥銀繩或曰石泥金䋲封以印璽故孔子曰升太山觀易姓之王可得而數者七十餘君風俗通曰}
