  - {type: variant, offset: 2278, length: 328, content: 孝閔踐祚于謹以年老乞骸骨詔報不許有司宜斷表啟遂詔謹為三老有司具禮擇日又賜延年杖高祖幸太學以食之三老入門皇帝迎拜門屏之間三老荅拜有司設三老席於中楹南向太師晉公護升階設几於席三老升席南面憑几而坐以師道自居大司寇楚公寧升階正舄皇帝升立於斧扆之前西面有可進饌皇帝跪設醬豆親祖割三老食訖皇帝又親跪受爵以酳有司徹訖皇帝北面立訪道三老乃起立於席後皇帝曰猥當天下重任自惟不才不知政治之要公其誨之三老荅曰木受繩則正后從諫則聖自古明王聖主皆虛心納諫以知得失天下乃安惟陛下念之又曰為國之本在守忠信是以古人云去食去兵信不可失國家興廢莫不由之願陛下守而勿失又曰治國之道必須有法法者國之綱紀綱紀不可不正在於賞罰若有功必賞有罪必罰則為善者日益為惡者日止若有功不賞有罪不罰則天下善惡不分人, WYG: 臣}
