  - {type: variant, offset: 447, length: 1, content: 昔, SBCK: 魏明帝黄初中護軍蔣濟表曰夫帝王大禮巡狩爲先昭祖楊禰封禪爲首是以自古革命受符未有不蹈梁父登太山刋無竟之名紀天人之際者也冝下公卿廣撰其禮卜年考時昭告上帝以副天下之望帝詔曰聞蔣濟斯言使吾汗出流足自開闢以來封禪者七十餘君耳故太史公曰雖有受命之君而功有不洽是以中間其逺者千有餘年近者數百載其儀􅏱不可得記吾何德之脩敢庶兹乎濟豈謂丗無管仲以吾有桓公登太山之志乎吾不敢欺天也濟之所言華則榮矣非助我者也公卿侍中尚書侍省之而巳勿有所議天子雖拒濟議而實使髙堂隆草封禪之儀以天下未一不欲便行大禮㑹隆卒不復行之魏志曰帝聞隆没歎曰天不欲成吾事堂生捨我亡也又曰}
  - {type: page-break, offset: 447, content: '', id: KR3k0012_SBCK_536-7a}
  - {type: variant, offset: 447, length: 1, content: 昔, WYG: 魏明帝黄初中護軍􅃽濟表曰夫帝王大禮廵狩為先昭揚祖禰封禪為首是以自古革命受符未有不蹈梁父登泰山刋無竟之名紀天人之祭者也宜下公卿廣選其禮卜年考時昭吿上帝以副天下之望帝曰聞􅃽濟斯言使吾汗流自開闢以来封禪者七十餘君耳故太史公曰雖有受命之君而功有不洽是以中間其逺者千有餘年近者數百載其儀不可得記吾何徳之脩敢庶幾乎茲豈謂世無管仲以吾有桓公登泰山之志乎吾不敢欺天也濟之所言華則華矣非助我者也公卿侍中尚書待省之而已勿有所議天子雖拒濟議而實使髙堂隆草封禪之儀以天下未一不欲便行大禮㑹隆卒不復行之魏志曰文帝聞隆没嘆曰天不欲吾成事堂生捨我亡也又曰}
