  - {type: variant, offset: 110, length: 1, content: 教, SBCK: 臧等以文學爲公卿欲議古立明堂城南以朝諸侯革巡狩封禪改暦服色事未就㑹竇太后治黄老言不好儒術諸所興爲皆廢是時李少君亦以祠竈榖道却老方見上上尊之少君言上曰祠竈則致物致物而丹砂可}
