  - {type: variant, offset: 173, length: 6, content: 鄉序庠置孝經, SBCK: 公孫􅀪議欲倣古巡狩封禪之事諸儒對者五十餘人未能有所定先是司馬相如病死有遺書頌功徳言符瑞足以封太山上竒其書以問倪寛對曰陛下躬發聖德統揖群臣宗祀天地薦禮百神精誠所嚮徴兆必報天地並應符瑞帝王之盛節也冝順承天慶垂萬丗之基上然之乃自制儀采儒術以文焉又郊祀志曰􅀄上欲治明堂奉髙旁未曉其制度濟南人公玉帶上黄帝時明堂圗於是上令奉髙作明堂汶上如帶圖及是歳脩封則祠太一五帝於明堂上坐令髙皇帝祠坐對之公玉帶又曰黄帝時雖封太山然風后封鮌歧伯令黄帝封東太山韋昭曰别有小太山在陰一名介山臣瓉安鄭志朱虚界中有小太山是也汾隂子推所焚故名介山也不以介爲大也禪凡山合符然後不死天子旣令設祠具至東太山太山卑小不稱其聲乃令祠官禮之而不封焉其後令帶奉祠􅃸神物復還太山脩五年之禮如前而加禪祠石閭石閭者在太山下趾南方方士言僊人閭也故上親禪焉其後五年復至太山脩封還過祭恒山自封太山後十二歳而周遍於五嶽四瀆矣後五年復至太山脩封武帝五脩封又曰太􅀄元年十二月禪蒿里服䖍曰山名在太山下太􅀄三年春正月東巡海上夏四月還脩封太山禪石閭天漢三年受計還幸北地祠常山瘞􅀇玉鄧展曰瘞埋也又曰太始四年春三月甲申脩封丙戍禪石閭夏四月幸不其如淳曰其音基不其山名因以爲縣祠神人于交門宫應劭曰神人蓬萊仙人之屬也晉灼曰瑯瑘縣有交門宫武帝所造􅀂有嚮坐拜者作交門之歌}
