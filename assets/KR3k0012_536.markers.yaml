  - {type: variant, offset: 113, length: 10, content: 宮揔名為學夏為學校校, SBCK: 以封禪則不死黄帝是也上與公郷諸生議封禪封禪用希曠絶莫知其儀禮而群儒采封禪尚書周官王制}
  - {type: variant, offset: 113, length: 3, content: 宮揔名, WYG: 以封禪則不死黄帝是也上與公卿諸生議封禪封禪用希曠絶莫知其儀禮而羣儒采封禪尚書周官王制之望祀射牛事上於是乃令諸儒習射牛草封禪儀羣儒既不能辯明封禪事又牽拘於詩書古文而不能騁於是上盡罷諸儒遂東幸􅚆氏禮登中嶽太室從官在山下聞若有言萬嵗云於是以三百尸封太室奉祠遂東廵海上四月還至奉髙上令諸儒及方士言封禪人人殊不經難施行天子至梁父禮祠地主乙邜令侍郎中儒者皮弁縉紳射牛行事封太山下東方如郊祀太一之禮封廣丈二尺髙九尺其下則有玊牒書書秘禮畢天子獨與侍中奉車子侯上泰山亦有封其事皆禁明日下隂道丙辰禪泰山下趾東北肅然山如祭后土禮天子皆親拜見衣上黄而盡用樂焉江淮間一茅三􅆃}
