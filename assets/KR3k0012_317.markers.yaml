  - {type: variant, offset: 8, length: 1, content: 晉, SBCK: 大敗趙師自以餘兵圍邯鄲之城趙以十敗之餘収破軍之弊􅁗罷於邯鄲之下趙守而不可抜者攻難而守易也今非有十克之威而燕非有長平之禍也今一敗之禍未復而欲以罷趙攻強燕強􅁗以兵承趙之弊此乃強吴所以亡而弱越所以霸也故臣未見燕之可攻也平原曰善又曰樂羊爲魏將而攻中山其子在中山中山之君烹其子而遺羮樂羊坐於幕下啜之盡一杯文侯曰樂羊以我故食其子之羮賞其功而疑其心又曰􅁗攻趙蘇子􅀃􅁗王曰臣聞王之於民也多聽而時用之是故事無敗也臣聞懷重寳者不夜行任大功者不輕敵是以賢者任重而行恭智者功大而辭順故民不惡其尊丗不妬其業􅁗乃解兵諸侯休天下安不相攻二十九年史記曰􅁗末沛公破南陽守齮走保城守宛齮魚綺切張良曰沛公雖欲急入􅀜􅁗兵尚衆距險今不下宛宛從後擊彊􅁗在前此危道也於是沛公乃夜引軍從他道還更張旗幟􅀺明圍宛城三匝黎未也未明之貌頃巳圍之事畢方明又言黎黒色亦未明也南陽守欲自剄其舎人陳恢曰死未晚也乃踰城見沛公曰臣聞足下約先入咸陽者王之今足下留守宛宛大郡之都也連城數十人庶衆積蓄多吏人自以爲降必死故皆堅守乗城今足下盡日止攻士死傷者必多引兵去宛宛必隨足下後足下前則失咸陽之約後又有彊宛之患爲足下計莫􅀂約降封其守因使止守引其甲卒與之西諸城未下者聞聲爭開門而待足下通行無所累矣沛公曰善乃以宛守爲殷侯封陳恢千户引兵而無有不下者又曰武安君白起攻韓㧞九城斬首五萬又周夲紀曰古公積德行義國人皆戴之獯育戎狄攻之欲得財物與之巳復攻欲得地與民民皆怒欲戰古公曰今戎翟所爲攻戰以吾地與民民之在我與其在彼何異民欲以我故戰殺人父子而君之予不忍爲漢書李陵傳曰單于急攻陵陵居谷中虜在山上四面射之矢下如雨又曰李廣利及郡國惡年少數萬人至貳師取善馬故號貳師將軍當道小國各堅守不肯給食攻郁城殺傷甚衆引而還天子聞之大怒使使遮玉􅀜軍有敢入輙斬之貳師恐益發惡少年及邊􅀐六萬人伐宛宛城外流水於是遣水工徙其城攻之三十餘日宛貴人相與謀遣人到貳師軍約漢無攻我我盡出善馬貳師許之取善馬中馬以三千疋餘後漢}
