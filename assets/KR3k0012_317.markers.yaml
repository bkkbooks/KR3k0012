  - {type: variant, offset: 25, length: 2, content: 疑勒, WYG: 得已修櫓橨輼具噐械三月而後城距闉又三月而後已修治也櫓大楯也橨輼車也其下四輪從中權之噐械者機關攻守總名雲梯之屬距闉勇士積而前以附其城也將不勝心忿而蟻附之則殺士三分之一而城不㧞者攻之灾也將忿不得攻噐而使卒縁城上如蟻縁城殺士也善用兵者屈人之兵而非戰㧞人之城而非攻毁人之國而非久必以全争}
