  - {type: variant, offset: 2593, length: 474, content: 良將多有死傷王世充在東都乘其弊而擊之率步騎二萬營於洛南李密軍於偃師北世充潛遣二百騎夜伏於邙山自統其眾遲明渡水人奔馬馳以襲密營遽出兵以拒之陳未成列兩軍已合伏兵於北山中乘高而下馳入密營燒其廬舍密見營中火發因而遁走又曰煬帝末年群盜起遣將張須陁擊盧明月於下邳賊連營十餘萬須陁絻萬人力勢不敵去賊六七里立柵相持經十餘日糧盡欲退謂將士曰賊見兵却必輕來追我其眾若出營內即虛欲以千人襲營可有大利此乘危險誰能去者人皆莫對唯秦叔寶與羅士信皆曰願行於是須陁委柵而遁使二人分領千兵潛伏於草莽既而明月悉兵追之叔寶士信馳至其柵柵門閉不得入二人超昇其樓拔賊幟各殺數人營中大亂叔寶斬關而納外兵因散縱火焚其三十餘柵煙焰漲天明月奔還須陁却逐之大破賊眾明月以數百騎遁去餘皆虜之又曰李密起兵于雍丘是時河南山東大水死者將半密將李勣言於密曰今人多阻飢若據得黎陽倉大事濟矣密乃遣勣領麾下五千人自原武濟河掩襲即日剋之開倉恣食一旬之間勝兵二十餘萬人唐書曰高宗遣將薛仁貴郭待封等伐吐蕃大非川將赴烏海仁貴謂待封曰烏海險遠車行艱澀若引輜重將失事機又破賊即廻不煩轉運彼多瘴癘無宜久留大非川嶺上寬平足堪置柵可留, SBCK: ''}
