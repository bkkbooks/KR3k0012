  - {type: variant, offset: 1644, length: 242, content: 寬潛軍往襲可一舉而擒乃出頓城西聲云將還簡精騎一千夜發詰朝造靈助壘戰於城北遂破被擒之又曰宕昌羌獠甘作亂逐其王彌定魏遣將史寧討破之甘將百騎走投生羌鞏廉王彌定遂得復位寧以未獲獠甘密欲圖之乃揚聲欲還獠甘聞之復招引叛羌依山起柵欲攻彌定寧謂諸將曰此羌人入吾術中當進兵擒之耳諸將思歸咸曰羌之聚散無常依據山谷今若追討恐引日無成且彌定還得守藩將軍功已立矣獠甘勢弱定能制之此還軍策之上者寧曰一日縱敵數世之患豈可捨垂滅之寇更煩再舉人臣之禮知無不為此觀諸軍不足與計事也如更沮眾寧豈不能斬諸將遂進軍獠甘眾亦至與, SBCK: 􅅮}
