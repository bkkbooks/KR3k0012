  - {type: variant, offset: 1240, length: 0, content: '', WYG: 曰臣聞足下約先入咸陽者王之今足下留守宛宛大郡之都也連城數十人民衆積蓄多吏人自以為降}
  - {type: variant, offset: 1241, length: 0, content: '', WYG: 死故皆堅守乗城今足下盡日止攻士死傷者必多引兵去宛宛必隨足下後足下前則失咸陽之約後又有强宛之患為足下計莫若約降封其守因使上守引其甲卒與之西諸城未下者聞聲争開門而待足下通行}
