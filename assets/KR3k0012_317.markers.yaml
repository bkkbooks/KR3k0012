  - {type: variant, offset: 1237, length: 0, content: '', WYG: 此衆戰誰能禦之以此攻城何城不克又曰楚子圍鄭旬有七日鄭卜行成不吉卜臨于大宫臨哭也大宫鄭之祖廟且巷出車吉國人大臨守陴者皆哭陴者城上睥睨皆哭所以告楚窮也楚子退師鄭人修城進復圍之三月克之哀其窮故為退師尚不服故復圍九十日入自皇門至于逵路方九軌曰逵鄭伯肉袒牽羊以逆肉􅃝牽羊示為臣僕曰孤不天不為天所祐不能事君使君懐怒以及敝邑孤之罪也敢不唯命是聽其俘諸江南以實海濵亦唯命其翦以賜諸侯使臣妾之亦唯命若惠顧前好世有盟誓使改事君夷於九縣楚滅九國以為縣也君之惠也孤之願也非所敢望也敢布腹心君實圖之又曰齊侯伐我北鄙圍龍魯邑頃公之嬖人盧蒲就魁門焉攻龍門也龍人囚之齊人曰弗殺吾與而盟弗聽殺而膊諸城上齊侯怒親鼔士臨城三日取龍國語曰晉獻公見翟相之氛歸寢不寐翟相國名也言有亡國之氣也或曰敵國有災氛則國凶惡也郗叔虎朝公語之遂伐翟相叔虎乗城被羽先登克之戰國策曰平原君謂馮忌曰寡人欲出兵攻燕何如對曰不可夫昔以秦將武安君公孫起乗十勝之威與馬服子戰於長平之下大敗趙師自以餘兵圍邯鄲之城趙以十敗之餘收破軍之弊秦罷於邯鄲之下趙守而不可㧞者攻難而守易也今非有十剋之威而燕非有長平之禍也今一敗之禍未復而欲以罷趙攻强燕秦以兵承趙之弊此乃强吳所以亡而弱越所以霸也故臣未見燕之所攻也平原曰善又曰樂羊為魏將攻中山其子在中山中山之君烹其子而遺羮樂羊坐於幕下啜之盡一杯文侯曰樂羊以我故食其子因賞其功而疑其心又曰秦攻趙蘓子説秦王曰臣聞王之于民也多聽而時用之是故事無敗也臣聞懐重寳者不夜行任大功者不輕敵是以賢者任重而行恭智者功大而辭順故民不惡其尊世不妬其業秦乃解兵諸侯休天下安不相伐者二十九年史記曰秦末沛公破南陽南陽守齮走保城守宛沛公引兵過宛西張良諫曰沛公雖欲急入關秦兵尚衆距險今不下宛宛從後擊强秦在前此危道也於是沛公乃夜引軍從他道還更張旗幟黎明圍宛城三匝黎未也未明之貎頃已圍之事必方明又言黎黑色亦未明也南陽守欲自剄其舍人陳恢曰}
