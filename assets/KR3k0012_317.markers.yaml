  - {type: variant, offset: 4182, length: 174, content: 年廻鶻大掠雲朔北邊牙於五原沔以太原之師屯于雲州沔謂雄曰點虜離散不足驅除國家以公主之故不欲急攻今觀其所為氣凌我輩若稟朝旨或恐依違我輩捍邊但能除患專之可也公乃選驍健乘其不意徑趍虜帳彼以疾雷之勢不睱枝梧必棄公主亡竄事茍不捷吾自繼進亦無患也雄受教自選勁騎得沙陁李國昌三部落兼契苾拓拔雜虜三千騎月暗夜發馬邑徑趍烏介之牙時虜帳逼振武雄既入城登堞視其眾寡見氈車從, WYG: 百}
