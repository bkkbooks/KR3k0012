  - {type: variant, offset: 332, length: 752, content: 百姓皆言劉蕃實上晏然不疑未至城五六里逢毅親將朱顯之將千餘騎從者數十欲出江津問是何人答曰劉兗州至顯之騎前問蕃在所答云在後顯之既至後不見蕃而見軍人擔鼓排戰具又遙見江津船艦已被焚燒煙焰張天而鼓嚴之聲甚盛知其非蕃上便躍馬馳去告毅外有大軍似從下上垂已至城江津船悉被火燒矣行命閉諸城門鎮惡亦馳進軍人緣城得入門猶未及下關因得開大城東門入城內毅凡有八隊餘已得戒嚴蒯思入東門便北廻擊射堂前軍攻金城東門鎮惡入東門便直西擊金城西門軍分攻金城南門毅金城內東從舊將士猶有六隊千餘人食時就關中晡西入退散及歸降略盡鎮惡入城便因風放火燒大城南門及東門又遣人以詔及文并高祖手書凡三篋示毅皆燒不視金城內亦未信𥙿自來鎮惡至軍門人與毅東來將士或有是父兄子弟中表親者鎮惡命因鬥且共語眾並知劉𥙿自來人情離懈一更許聽事前陣散潰毅左右兵猶閉東西閣拒戰鎮惡恐慮夜暗自相傷犯乃引軍出繞金城開其南面以退毅慮南有伏兵三更中率左右三百許人開北門突出城於佛寺自縊梁書曰侯景反陷建業高州刺史李遷仕據大皋圖逆召高梁太守馮寶寶欲往其妻沈氏止之曰刺史無故不合召太守此詐君欲為反耳頃者京師危逼羽檄徵兵遍于郡縣刺史稱疾不赴繕甲治兵今已備矣而更召君往必見留追君兵眾此意可知矣魚不可脫於泉願且勿行遣使譎之曰身病篤謹遣妻傳意并送土物以省之彼聞喜必無防為君取之如反掌矣寶從之於是沈氏自將千人皆藏短兵步擔雜物唱言賝貨賝音琛先書報遷仕曰太守馮寶疾篤謹令妻沈氏傳啟并奉土貢以資軍費遷仕大悅出迎沈氏因釋擔出刃大破之遷仕脫身而遁沈氏入據其城盡收其眾後魏書曰晉王伏羅督高平源州諸軍討吐谷渾慕利延軍至樂都謂諸將曰若從大道恐軍聲先振必當遠遁若潛軍出其非意此鄧艾擒蜀之計也諸將咸難之伏羅曰夫將軍制勝萬里擇利專之可也遂間道行至大母橋利延眾驚奔白蘭慕利延兄子拾寅走河曲降其一萬餘落又曰陸俟代人也長安盧永劉超, SBCK: 呉漢}
