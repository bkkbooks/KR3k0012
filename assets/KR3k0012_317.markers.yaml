  - {type: variant, offset: 11, length: 13, content: 石勒偽推奉晉幽州刺史王浚浚, SBCK: 河南賊董憲招誘五校餘賊歩􅀐數千人屯建陽去昌慮三十里光武親征至番音波去憲百餘里諸將請進帝}
  - {type: variant, offset: 11, length: 10, content: 石勒偽推奉晉幽州刺史, krp: 河南賊董憲招誘五校餘賊歩騎數千人屯建陽去昌慮三十里光武親征至番音波去憲百餘里諸將請進帝不聽知五校乏食當退勑各各堅壁以待其弊頃之五校糧盡果引去帝乃親臨四面攻憲三日大破之又曰}
  - {type: variant, offset: 22, length: 7, content: 浚浚不疑勒於是, krp: 郎起兵光武自薊至信都使鄧禹發奔命得數千人令自將之别攻㧞樂陽又曰龐萌董憲反與蘇茂挍音効彊合兵三萬急圍桃城光武時在蒙聞之乃留輜重自將}
