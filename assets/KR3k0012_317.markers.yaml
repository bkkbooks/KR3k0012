  - {type: variant, offset: 585, length: 292, content: 城南門及東門又遣人以詔及文并高祖手書凡三篋示毅皆燒不視金城內亦未信𥙿自來鎮惡至軍門人與毅東來將士或有是父兄子弟中表親者鎮惡命因鬥且共語眾並知劉𥙿自來人情離懈一更許聽事前陣散潰毅左右兵猶閉東西閣拒戰鎮惡恐慮夜暗自相傷犯乃引軍出繞金城開其南面以退毅慮南有伏兵三更中率左右三百許人開北門突出城於佛寺自縊梁書曰侯景反陷建業高州刺史李遷仕據大皋圖逆召高梁太守馮寶寶欲往其妻沈氏止之曰刺史無故不合召太守此詐君欲為反耳頃者京師危逼羽檄徵兵遍于郡縣刺史稱疾不赴繕甲治兵今已備矣而更召君往必見留追君兵眾此意可知矣魚不可脫於泉願且勿行遣使譎之曰身病篤謹遣妻傳意并送土物以省之彼聞喜必無防為君取之如反掌矣寶, WYG: 夫也公}
