  - {type: variant, offset: 887, length: 232, content: 皆藏短兵步擔雜物唱言賝貨賝音琛先書報遷仕曰太守馮寶疾篤謹令妻沈氏傳啟并奉土貢以資軍費遷仕大悅出迎沈氏因釋擔出刃大破之遷仕脫身而遁沈氏入據其城盡收其眾後魏書曰晉王伏羅督高平源州諸軍討吐谷渾慕利延軍至樂都謂諸將曰若從大道恐軍聲先振必當遠遁若潛軍出其非意此鄧艾擒蜀之計也諸將咸難之伏羅曰夫將軍制勝萬里擇利專之可也遂間道行至大母橋利延眾驚奔白蘭慕利延兄子拾寅走河曲降其一萬餘落又曰陸俟代人也長安盧永劉超等聚黨以叛世祖詔俟以本官鎮長安使以方略定之於是俟單馬之鎮超聞之欣然以為, WYG: 今老矣}
