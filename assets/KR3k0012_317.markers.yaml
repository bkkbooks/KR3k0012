  - {type: variant, offset: 4357, length: 331, content: 從者皆衣朱碧類華人服飾雄令諜者訊之此何大人虜曰此公主帳也雄喻其人曰國家兵馬欲取可汗公主至此國家也須謀歸路俟其兵合時不得動帳幕雄乃大率城內牛馬雜畜及大鼓夜穴城為十餘門遲明城上立旗張炬火乃於諸門縱其牛畜鼓譟從之直犯烏介牙帳炬火燭天鼓譟動地可汗惶駭莫測率騎而奔雄率勁騎追之至殺胡山急擊之斬首萬級生擒五千羊馬車帳皆委之而去遂迎公主還又曰黃巢既陷長安時鄭畋帳下小校竇玖者驍敢無敵每夜率敢死之士百人直入京師放火燔諸門斬級而還賊人悚駭呂氏春秋曰齊令章子將攻荊荊令唐篾將拒之與荊人夾泚水而軍章子令人視水可絕者荊人射之水不可得近有芻水旁者告齊侯者曰水淺深甚易知荊人所盛守盡其淺者也所簡守皆其深者也使載芻者與見章子因夜奄荊人所盛守果殺唐篾也太公陰謀書武王伐殷兵至牧野晨舉脂燭推掩不備, SBCK: 七}
