  - {type: variant, offset: 5, length: 2, content: 掩襲, krp: 月丙子齊師入紀傳言怨不在大又曰晉侯秦伯圍鄭晉軍凾陵秦軍汎南佚之孤言於鄭伯曰國危矣若使燭之武見秦師必退之孤燭之武皆鄭大夫也公從之辭曰臣之壯也猶不如人今老矣無能爲也公曰雖然鄭亡子亦有不利焉許之夜縋而出見秦伯又曰齊侯曰以此衆戰誰能禦之以此攻城何城不克又曰楚子圍鄭旬有七日鄭卜行成不吉卜臨于太宫臨哭也太宫鄭太祖廟且巷出車吉示將見遷國人大臨守陴者皆哭陴者城上辟兒也皆哭者告楚窮也楚子退師鄭人脩城進復圍之三月克之哀其窮故爲退師尚不服故獲圍之九十日入自皇門至于逵路方九軌曰逵鄭伯肉袒牽羊以逆示服爲目僕也曰孤實不天不爲天所祐不能事君使君懷怒以及弊邑孤之罪也敢不唯命是聽其俘諸江南以實海濵亦唯命其剪以賜諸侯使臣妾之亦唯命若惠顧前好丗有盟誓使改事君夷於九縣楚滅九國以爲縣也君之惠也孤之願也非所敢望也敢布腹心君實圗之又曰齊侯伐我北鄙圍龍魯邑頃公之嬖人盧蒲就魁門焉攻龍門也龍人囚之齊人曰弗殺吾與而盟弗聽殺而膊諸城上膊也齊侯怒親鼓士陵城三日取龍國語曰晉獻公見翟相之氛歸寢不寐翟相國名也言有云國之氣也一曰敵國有善祥巳國凶惡也郄叔虎朝公語之遂伐翟相叔虎乗城𬒳羽先登剋之羽羽衣登并其城也戰國䇿曰平原君謂馮忌曰寡人欲出兵攻燕何如對曰不可夫以秦將伐武安君公孫起乗十勝之威與馬服子戰於長平之}
