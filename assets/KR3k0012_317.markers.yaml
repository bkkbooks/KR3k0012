  - {type: variant, offset: 432, length: 2, content: 非蕃, WYG: 所攻情不洩也微乎微乎故能隠於常形神乎神乎故能為敵司命進不可禦者衝其虛也退而不可追者逹而不可及也卒往攻其虛解退又疾也故我欲戰雖髙壘深溝不得不與我戰者攻其所必救也絶粮道守歸路攻君王也我不欲戰畫地而守之軍不煩也敵不得與我戰者乖其所之乖戾也戾其道示以利害使敵疑之左傳曰晉荀吳帥師伐鮮虞圍鼓鼔白狄之種也鉅鹿郡曲陽縣有鼔聚鼔人或請以城叛穆子弗許曰或以吾城叛吾所惡也人以城來吾獨何好焉使敵殺叛人而繕守備圍鼓三月鼓人請降使其民見曰猶有食色姑修而城軍吏曰獲城而弗取何以事君穆子曰吾以事君也獲一邑而教民怠將焉用邑人能事其君我亦能事吾君卒義不爽爽差好惡不愆城可獲而民知義所有死命而無二心不亦可乎鼓人告食竭力盡而取之克鼓不戮一人以鼔子䳒鞮歸又曰齊髙發帥師伐莒初莒有婦人莒子殺其夫已為嫠婦及老託於紀鄣紀鄣莒邑紡焉以度而去之以所紡纑度城藏其纑待外攻以報讐也及師至則投諸外投繩城外或獻諸子占子占使師夜縋而登縁繩登城登者六十人縋絶師鼓譟城}
