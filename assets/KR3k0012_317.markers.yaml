  - {type: variant, offset: 4, length: 0, content: '', SBCK: 八攻圍上孫子曰下攻攻城攻城之法爲不得巳脩櫓橨輼具器械三月而後成距闉又三月而後巳脩治也櫓大楯也橨輼車也轒狀其下四輪從中推之至城器械者機関攻守揔名蜚臨雲梯之屬距闉勇士積而前以附其城也將不勝其忿而蟻附之則殺士三分之一分而城不㧞者攻之災也將忿不得攻器而使卒縁城上如蟻縁墻殺士也善用兵者屈人之兵而非戰㧞人之城而非攻毀人之國而非乆必以全爭於天下故兵不頓而利可全此謀攻之法也不以敵戰而必全得之意勝於天下不頓兵血刃也又曰不可勝則守可勝則攻敵攻巳可勝也守則不足攻則有餘吾所守者力不足也所以攻者力有餘也所以善守者藏於九地之下因其山水丘陵之固善攻者動於九天之上因天時力利之變􅀂動於九天之上也故能自保而全勝也又曰攻而必取者攻其所不守也守而必固者守其所必攻也謂敵之惜者也故善攻者敵不知其所守善守者敵不知其所攻清不􅂥也微乎微乎故能隱於常形神乎神乎故能爲敵司命進不可禦者衝其虚也退而不可追也速而不可及也卒往攻其虚解退又疾也故我欲戰雖髙壘深溝不得不與我戰者攻其所必救之絶粮道守歸路攻君王也我不欲戰畫地而守之軍不煩也敵不得與我戰者乖其所之乖捩也捩其道示以利害使疑之我末脩壘塹敵人不敢敵我者以形勢之長攻就能加之於敵也左傳曰晉荀呉帥師伐鮮虞圍鼓鼓伯狄之别種也巨鹿下曲陽縣有鼓聚鼓人或請以城叛穆子弗許曰或以吾城叛吾所惡也人以城來吾獨何好焉使敵殺叛人而繕守備圍鼓三月鼓人請降使其民見曰猶有食色姑脩而城軍吏曰獲城而弗取何以事君穆子曰吾以事君也獲一邑而教民怠將焉用邑人能事其君我亦能事吾君卒義不爽爽差好惡不愆城可獲而民知義所知義所在有死命而無二心不亦可乎鼔人告食竭力盡而取之克鼓不戮一人以鼓子䳒鞮歸鼔君名又曰齊髙發帥師伐莒􅀄莒有婦人莒子殺其夫巳爲􅁵婦及老託於紀鄣紀彰苔邑紡焉以度而去之因紡纑連所以度城藏欲待外攻以報也及師至則投諸外投繩城外或獻諸子占子占使師夜縋而登縁繩登城登者六十人縋絶師鼓譟城上之人亦譟莒共公懼啓西門而出}
