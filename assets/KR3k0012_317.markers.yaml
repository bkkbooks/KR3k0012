  - {type: variant, offset: 1151, length: 195, content: 其帳下往見超觀其舉措超使人逆曰三百人以外適當以弓馬相待三百以內當以酒食相供乃將三百騎詣超超設備甚嚴俟遂縱酒以盡醉而返後謂將士曰超可取乃密選精兵五百人激厲之言至懇切士卒荅曰以死從公必無二也遂偽獵詣超與士卒約曰今會發機以當醉為限俟於是詐醉上馬大呼手斬超將士皆應聲縱擊遂平之世祖大悅徵還轉外都大官又曰魏使蕭寶寅伐梁堰淮水濫溢將為楊徐之患寅於堰上流鑿新渠引注淮澤乃遣將士千餘夜渡淮燒其營聚破賊斬其將, SBCK: 衆}
