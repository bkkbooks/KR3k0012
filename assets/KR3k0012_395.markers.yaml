  - {type: variant, offset: 2716, length: 1, content: 大, SBCK: 丈夫游之以爲有苦而欲死者也使弟子並流而拯之數百歩而出􅀍髮行歌而遊於塘下孔子從而問焉曰蹈水有道乎曰吾無道吾始乎故長乎性成乎命與齊俱入與汨偕出從水之道而不爲私焉此吾所以蹈水也吕氏春秋曰有道江上者見}
