  - {type: variant, offset: 2238, length: 0, content: '', SBCK: 湯沐具而蟣虱相吊大厦成而鷰雀相賀六韜曰文王聞殺崇侯虎歸至鄷令具湯沐論衡曰子日沐令人愛夘日沐令人白頭案人之愛憎頭之白黒在乎自然但使嫫母子日沐能令人愛耶使十五童子夘日沐能令髮白耶丗夲曰􅁗穆公作沐異苑曰北海任詡字彦期從軍十年乃歸臨還握粟出卜師云非屋莫􅀫非食時莫沐詡結伴數十暮遇雷相庇於巖下􅀼憶非屋莫􅀫之戒遂負檐櫛沐巖崩壓停者悉死至家妻先與外人通情謀共殺之請以濕髮爲識婦宵則勸詡令沐復憶非食時莫沐之忌􅀵髮而止婦慙愧􅀒怍乃自沐焉散髮同寢通者夜來不知婦也斬首而去楚辭曰浴蘭湯􅀆沐芳華采衣􅀆􅀂英又}
  - {type: page-break, offset: 2238, content: '', id: KR3k0012_SBCK_395-3b}
  - {type: variant, offset: 2238, length: 0, content: '', WYG: 湯沐具而蟣虱相吊大厦成而鷰雀相賀六韜曰文王聞殺崇侯虎歸至酆令具湯沐世語曰子日沐令人愛卯日沐令人白頭按人之愛憎頭之白黒在乎自然但使嫫母子日沐能令人愛耶使十五童子卯日沐能令髪白耶世本曰秦穆公作沐異苑曰北海任詡字彦期従軍十年乃歸臨還握粟出卜師云非屋莫宿非時莫沐詡結伴數十暮遇雷相庇於巖下竊憶非屋莫宿之戒遂負擔櫛沐巖崩壓停者悉死至家妻先與人通情謀共殺之請以濕髮為識婦宵則勸詡令沐復憶非時莫沐之忌收髮而止婦慚愧負怍乃自沐焉散髮同寝通者夜来不知婦人也斬首而去楚辭曰浴蘭湯兮沐芳華采衣兮若英又}
