  - {type: variant, offset: 1639, length: 280, content: 丹沛郡人本姓秦養曹氏或云其伯父南宿與太祖善共平袁術部黨與太祖相攻劫太祖出為寇所追走入秦氏伯南開門受之寇問所在荅云我是寇遂害之由此太祖思其功遂變其姓江表傳曰陸遜破劉備於夷陵備捨舡步走燒皮鎧以斷道使挽車走入白帝晉書曰陳安字虎侯驍壯果毅武幹過人多力善射持七尺刀貫甲奔及馳馬又曰唐彬字儒宗魯國鄒人也少便弓馬好遊獵身長八尺走及奔鹿強力絕人後魏書曰伊馛扶拂切代人也少而勇健走及奔馬善射多力曳牛卻行趙書曰劉靈陽平人也年二十餘常廝役於縣走及馳馬前秦錄曰符堅大敗為流矢所中遁走甚飢民有進壺飧豚髀者堅食之大悅隋書曰麥鐵杖始興人也驍勇有膐力日行五百里走及奔馬每以漁獵為事不治產業吳越, SBCK: ''}
