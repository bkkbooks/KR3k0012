  - {type: variant, offset: 1963, length: 12, content: 莘氏女子採桑得嬰兒於空桑, SBCK: 道}
  - {type: variant, offset: 1963, length: 265, content: 莘氏女子採桑得嬰兒於空桑之中獻之其君令養之察其所以然曰其母居伊水之上孕夢神告曰臼出水而東走千里邑盡為水身化為空桑故命之曰伊尹戰國策曰昔曾參處費魯人有與曾參同姓名者殺人人告其母曰曾參殺人曾參母投杼踰墻而走楚漢春秋曰淮陰武王反上自擊之張良居守上體不安臥轀車中行三四里留侯走東追上簪墮被髮及轀車排戶曰陛下即棄天下欲以王葬乎以布衣葬乎上罵曰若翁天子也何故以王及布衣葬乎良曰淮南反於東淮陰害於西恐陛下倚溝壑而終也莊子曰藏舟於壑藏山於澤謂之固矣然則夜半有力者負之走而昧者不知荀卿子曰伯禽將歸國周公謂之曰君子力如牛不與牛爭力走如馬不與馬爭走智如, WYG: 道}
  - {type: variant, offset: 1963, length: 12, content: 莘氏女子採桑得嬰兒於空桑, krp: 道}
