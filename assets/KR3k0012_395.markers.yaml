  - {type: variant, offset: 2353, length: 348, content: 有難不敢相示因出戶遙擲面便走俗說曰桓公豹奴善騎乘亦有極快馬時有一諸葛郎自云能走與馬等桓車騎以百疋布置埒頭令豹奴乘與諸葛竟走先至者得布便俱走諸葛常與馬齊欲至埒頭去布三丈許諸葛一跳坐布上遂得之魯女生別傳曰魯女生長樂人也少好學道初服餌胡麻乃求絕穀八十餘年日更少壯面如桃花日行三百里走及獐鹿跳釋名曰跳條也如草木枝條務上行也左傳僖下曰魏犨束胸見使者曰以君之靈不有寧也距躍三百曲踊三百距躍超越也曲踊跳踊也崔鴻十六國春秋前趙錄曰劉翌驍幹過人能一手舉殿柱跳過平陽門出神仙傳曰壺公者不知何許人也從遠方來賣藥得錢與飢凍者常懸一壺於坐上日入後跳入壺市掾費長房於樓上見之知非常人身為掃除并進餅餌公令房共跳入壺中但見樓觀重門侍者數十人蹲王隱晉書曰王長文字德叡州辟別駕不就追求之乃於成都賣熟市見長文蹲地齧胡餅州知不屈乃送還家, SBCK: 首}
