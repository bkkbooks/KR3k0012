  body:
  - {type: variant, offset: 5, length: 730, content: 五行易困卦曰臀無膚其行趑趄毛詩谷風曰行道遲遲中心有違遲遲舒行皃又黍離曰彼黍離離彼稷之苗行邁靡靡中心搖搖又載驅曰汶水湯湯行人彭彭又我行其野曰我行其野蔽芾其樗昏姻之故言就爾居又蟋蟀枤杜曰獨行蝺蝺禮記仲尼燕居曰行則有隨行而無隨則亂於塗也又王藻曰君與尸行接武尊者尚徐蹈半跡大夫繼武跡相及也士中武跡間容跡端行頤霤如矢弁行剡剡起屨凡行容惕惕直疾皃也凡行謂道路也左傳襄五曰衛獻公使與甯喜言甯喜告蘧伯玉伯玉曰瑗不得聞君之出敢聞其入遂行從近關出論述而曰子曰三人行必有我師焉史記曰伍子胥曰為我謝申包胥吾日暮途遠吾故倒行而逆施之譬如人行前塗尚遠日勢已暮救在顛倒疾行何得責吾順行禮漢書曰袁盎使吳見守從史適在守盎校為司馬司馬曰君第去臣亦且亡辟吾親君何患迺以刀決帳盎解節旄履步行七十里著屐步行而逃亡吳書曰孫策討山越斬其渠帥悉令左右分行逐賊獨騎與虞翻相得山中翻曰危事也令策下馬此草深卒有警急馬不及人翻善用矛請在前行得平地勸策乘馬策曰卿無馬奈何荅曰飜能步行日可三百里明府試鞭馬翻能䟽步屬之東方朔別傳曰武帝問朔曰公孫丞相倪大夫等先生自視何與此哉朔曰臣觀其臿齒牙樹頰胲音改吐脣吻擢項頤結股肱連脽音誰居逶虵其跡行步偊旅臣朔雖不肖尚兼此數子神仙傳曰黃盧子者姓葛名越年二百八十歲行及走馬王真者上黨人也年十七八乃學道服食胎息之術行及走馬力兼數人河上公者莫知其姓名也又能行及走馬頭上常有五色氣高丈餘孔安者魯人也行氣服鈆舟有陳和者樂安人也重之求事安遂受其方合藥服之二百餘年頭色轉黑氣力百倍行及走馬也列仙傳曰沈建者丹陽人也世為長史建獨好導引服食之術一日行五百里能舉千斤葛仙公別傳曰孫堅欲害仙公馳馬往遂見仙公徐行逐之不及步釋名曰徐行曰步步捕也如有所司捕務安詳也爾雅曰堂下謂之步禮記王制曰古者以周尺八尺為步今以周尺, SBCK: ''}
