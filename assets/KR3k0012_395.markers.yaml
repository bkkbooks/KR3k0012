  - {type: variant, offset: 736, length: 363, content: 尺四寸為步又祭義曰故君子跬步而弗敢忘孝也漢書曰息夫躬曰匈奴飲馬於渭水邊境雷動四野風起京師雖有武螽音鋒精兵末有能窺左足而先應者也窺音跬半步曰跬步也言一舉足也又曰蔡義河內溫人也以明經為給事大將軍幕府家貧常步行禮不逮眾門下好事者相合為義置犢車令乘之又曰蓋寬饒為人剛直高節家貧俸祿數千半以給吏人為耳目為司隸常步行續漢書曰李固少有俊才雅志好學為三公子常躬步行驅驢負書從師范曄後漢書曰楊震轉涿郡太守子孫常蔬食步行魏志曰崔林字德儒清河東武城人也除鄢陵長家貧無單車疋馬步行之官莊子曰壽陵餘子學步於邯鄲未得其能失其故步匍匐而歸以此效彼兩失之白虎通曰人踐三尺法天地人也再舉足為步備陰陽也郭子曰王丞相拜司空廷尉作兩角髻葛裙柱杖臨路邊窺之歎曰人言阿龍超導小名赤龍阿龍故自超不覺步至臺門方言曰半步為跬世說曰阮宣子常步行以百錢桂杖頭至酒店上便獨酌酣暢趨說, SBCK: 沐浴盥游沐􅀃}
