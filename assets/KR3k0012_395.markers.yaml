  - {type: variant, offset: 2244, length: 2, content: 走山, SBCK: 必振衣安能以身之察察受物之汶汶乎浴􅀃文曰浴洒身也禮記内則曰五日則燂湯請浴外内不共湢音逼浴湢浴室也禮記儒行曰儒有澡身而浴德常自清潔於身沐浴於徳也左􅀓僖中曰晉公子重耳及曹曹共公聞其駢脅欲觀其祼浴薄而觀之又文下曰齊懿公之爲太子也與邴歜之父争田不勝及即位乃掘而刖之而使歜僕僕御納閻職之妻而使職叅乗五月公游于申池二人浴于池歜以朴柣職朴箠柣擊職怒歜曰人奪汝妻而不怒一柣汝庸何傷職曰與刖其父而弗能病者何如乃謀殺懿公國語曰莊公將殺管仲齊使者請之而來以與使者比至三舋三浴之香堇也論語先進曰子路曽晢冉有公西華侍坐子曰􅀧爾何如鼓瑟希鏗爾捨瑟而作對曰暮春者春服旣成􅃣者五六人童子六七人浴乎沂風乎舞雩詠而歸夫子喟然歎曰吾與􅀧也續漢書曰耿恭在䟽勒得岀至王門唯餘十三人衣履穿决形容枯槁郎將鄭衆爲恭以下沐浴易衣冠}
