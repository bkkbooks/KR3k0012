  - {type: variant, offset: 2710, length: 0, content: '', SBCK: 黄水婦人入浴出則乳矣去九嶷二萬四千里丘淵之征齊道理記曰朱靈城東有管寧舊宅宅前有水是寧常所澡浴處石虎鄴中記曰石虎金華殿後有虎皇后浴室三間徘􅆦及宇櫨檘隱起􅊮采刻鏤彫文粲麗四月八日九龍衘水浴太子之像又太武殿前溝水注浴時溝中先安銅籠䟽其次用葛其次用紗相去六七歩斷水又安玉盤受十斛又安銅􅀛飲􅁾水出後脚入諸公主第溝亦出建春門東又顯陽殿後有皇后浴池上作石室引外溝水注之室中臨池上有石牀丗􅀃曰桓車􅀐不好着新衣浴訖婦固送新衣桓冲也車􅀐}
  - {type: page-break, offset: 2710, content: '', id: KR3k0012_SBCK_395-5b}
  - {type: variant, offset: 2710, length: 0, content: '', WYG: 黄水婦人入浴出則乳矣去九嶷二萬四千里丘淵之征齊道里記曰朱靈城東有管寧舊宅前有水是寧嘗所澡浴處石虎鄴中記曰石虎金華殿後有虎皇后浴室三間徘徊反宇櫨檘隠起彤采刻鏤雕文粲麗四月八日九龍銜水浴太子之像又太武殿前溝水注浴時溝中先安銅籠疏其次用葛其次用紗相去六七歩斷水又安玉盤受十斛又安銅龜飲穢水出後却入諸公主第溝亦出建春門東又顯陽殿後皇后浴池上作石室引外溝水注之室中臨池上有石床世說曰桓車騎不好着新衣浴訖婦固送新衣桓冲也車騎}
  - {type: page-break, offset: 2710, content: '', id: KR3k0012_WYG_395-8b, image: WYG0896/WYG0896-0493d.png}
  - {type: variant, offset: 2710, length: 0, content: '', krp: 黄水婦人入浴出則乳矣去九嶷二萬四千里丘淵之征齊道理記曰朱靈城東有管寧舊宅宅前有水是寧常所澡浴處石虎鄴中記曰石虎金華殿後有虎皇后浴室三間徘徊及宇櫨檘隱起􅊮采刻鏤彫文粲麗四月八日九龍衘水浴太子之像又太武殿前溝水注浴時溝中先安銅籠䟽其次用葛其次用紗相去六七歩斷水又安玉盤受十斛又安銅龜飲穢水出後脚入諸公主第溝亦出建春門東又顯陽殿後有皇后浴池上作石室引外溝水注之室中臨池上有石牀丗說曰桓車騎不好着新衣浴訖婦固送新衣桓冲也車騎}
  - {type: variant, offset: 2711, length: 0, content: '', SBCK: 怒催使將去婦便持還傳語云衣不經新何由而故桓大􅀏而着之幽明録曰桓温内懷無君之心時比丘尼從逺來夏五月尼在別室浴温竊窺之見尼祼身先以刀自破腹出五藏次斷兩足及斬頭手有頃浴竟温問向窺見尼何得自殘毀如此尼云公作天子亦當如是温惆悵不恱盥􅀃文曰盥洒靣也澡洒手也先洒足也尚書顧命曰盥以異同秉璋以酢太保以盥手洗異同實酒禮記内則曰子事父母雞􅀄鳴咸盥漱又曰進盥少者奉槃長者奉水請沃盥盥卒授巾槃盛盥水者左傳僖中曰懷羸奉迤沃盥旣而揮之懷羸怒曰􅁗晉疋也何以卑我後漢書曰劉寛簡略􅄝酒不好盥浴澡手日盥京師以爲諺唐書曰虞丗南受學於吴郡顧野王經十餘年精思不倦或累旬不盥櫛莊子曰陽子居遇老子老子中道仰天歎曰始以汝爲可教也今不可也陽子居不荅至舎進盥漱巾櫛脫履户外􅂰行而前曰向者弟子欲請問夫子夫子行不問今間矣請問其過管子曰冬日不盥非愛水也夏日不煬非愛火也爲不適於身風俗通曰案里語厚哉鮑管探膓按腹不清然尚不盥何共財而生喜怒也游毛詩鄁栢舟谷風曰就其深矣泳之游之左傳莊公曰楚武王遷權於郍處使閻敖尹之及文王即位巴人叛楚而伐郍處取之遂于門楚閻敖游涌而逸敖旣不能守城又游涌水而走莊子曰顔淵問於仲尼曰吾甞遊乎觸深之淵津人操舟􅀂神吾問焉曰操舟可學耶曰吾善游者數若乃夫没人則未甞見舟而便操之者也吾問焉而不吾告敢問何謂也仲尼曰善游者之數能忘水也􅀂乃夫没}
  - {type: page-break, offset: 2711, content: '', id: KR3k0012_SBCK_395-6a}
  - {type: page-break, offset: 2711, content: '', id: KR3k0012_SBCK_395-6b}
  - {type: variant, offset: 2711, length: 0, content: '', WYG: 怒催使持去婦便持還傳語云衣不經新何由而故桓大笑而著之幽明録曰桓温内懐無君之心時比丘尼従逺来夏五月尼在别室浴温竊窺之見尼裸身先以刀自破腹出五臓次斷兩足及斬頭首有頃浴竟温問向窺見尼何得自殘毁如此尼云公作天子亦當如是温惆悵不恱盥說文曰盥洗靣也澡洒手也洗洒足也尚書頋命曰盥以異同秉璋以酢太保以盥手洗異同實酒禮記内則曰子事父母雞初鳴咸盥潄又曰進盥少者奉槃長者奉水請沃盥卒授巾左傳僖中曰懐嬴奉匜沃盥既而揮之懐嬴怒曰秦晉匹也何以卑我後漢書曰劉寛簡畧嗜酒不好盥浴手澡曰盥京師以為諺唐書曰虞世南受學扵吴郡顧野王經十餘年精思不倦或累旬不盥櫛荘子曰陽居遇老子老子中道仰天嘆曰始以汝為可敎也今不可也陽子居不答至舍進盥潄巾櫛脫屨户外膝行而前曰向者弟子欲請問夫子夫子行不間今間矣請問其故管子曰冬日不盥非愛水也夏日不煬非愛火也為不適扵身風俗通曰按里語厚哉鮑管探腸按腹不清然尚不盥何共財而生喜怒也㳺毛詩􅆁栢舟谷風曰就其深矣泳之㳺之左傳荘公曰楚武王遷權於郍處使閻敖尹之及文王即位巴人叛楚而伐郍處取之遂門于楚閻敖㳺涌而逸敖既不能守城又㳺涌水而走荘子曰顔淵問於仲尼曰吾嘗濟乎觴深之淵津人操舟若神吾問焉曰操舟可學耶曰可善㳺者數能若乃夫没人則未嘗見舟而便操之者也吾問焉而不吾告敢問何謂也仲尼曰善㳺者之數能㤀水也若乃夫没}
