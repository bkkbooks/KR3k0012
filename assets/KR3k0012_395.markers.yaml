  - {type: variant, offset: 2708, length: 0, content: '', SBCK: 中有淵正方四隅皆通言淵四海皆旁通北屬黒水南屬大荒北旁名曰少和之淵南旁名曰縱淵音烏懸反舜之所浴也言常在中澡洗莊子曰仲尼問於太史􅋶曰衛靈公爲靈何也太史弢曰是固靈也靈公妻有三人同浴男女同浴此無禮也又曰鵠不日浴而白韓子曰燕人李季好逺遊其妻私通他人季忽歸私通者在内其妻令􅀍髮直出門季曰何人耶妻曰無人季曰吾見􅀑耶妻曰宣五牲屎浴季曰諾乃浴以狗屎􅀃苑曰􅁗繆公見百里奚牛肥公曰牛何以肥對曰臣飲食之以時使之不􅁀有嶮先後之以身是以牛肥公知其君子令有司具沐浴爲衣冠坐與語公大恱}
