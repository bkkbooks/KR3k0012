  - {type: variant, offset: 1570, length: 1, content: 雀, WYG: 瑞應圖曰夫鹿者能壽之獸五色光暉王者孝道則至又曰王者承先聖法度無所遺失則白鹿来禮斗威儀曰君乗水而王其政和平北海輸白鹿衝波傳曰鹿生三年其角自墮崔豹古今注曰鹿者魚不能觸袁山松栢鹿詩序曰荆門山臨江皆絶壁峭峙五百餘丈亘帶激流禽獸所不能履北岸有一白鹿泅過江人見之競逐之謂至山下必得鹿忽然若}
