  - {type: variant, offset: 1565, length: 1, content: 犬, WYG: 李母碑曰老子乗白鹿以見於李母韓詩外傳曰齊景公逐白鹿於野封人曰使吾君夀金玉是賤人民是寳公曰善孫柔之瑞應圖曰黄帝時西王母使使乗白鹿獻白環之休符以有今方也春秋命厯序曰皇神駕六飛鹿化三百歳淮南子曰四九三十六六主緯緯主鹿鹿故六月而生春秋運斗樞曰瑶光散而為鹿江淮不祠}
  - {type: variant, offset: 1567, length: 2, content: 青鸇, WYG: 瑶光不明彘生鹿抱朴子玉䇿篇曰鹿壽千歳滿五百歲則其色}
