  - {type: variant, offset: 1527, length: 23, content: 天狗來其下凡有賊天狗吠而護之一堡無患涼州異物志, SBCK: 金方也春秋歴命序}
  - {type: variant, offset: 1527, length: 2, content: 天狗, WYG: 所懸也抱朴子曰昔張盖蹹音㳫及偶高成二人並精思於蜀雲臺山石室中忽有一人着黄練單衣葛巾到其前曰勞乎道士辛苦幽隠於是二人顧視於鏡中乃見是鹿也因問曰汝是草中老鹿何敢詐為人形言未絶}
