  - {type: variant, offset: 2307, length: 2, content: 列子, SBCK: 􅂫躭與衆兒俱戯獵常􅀐鹿形雖如常鹿遇險絶之地能超越衆兒問曰何得此鹿異常鹿耶荅曰龍也􅄒異記曰漢成帝末年宮中雨一蒼鹿殺而食之味甚羙又曰鹿一千年爲蒼鹿又百年化爲白鹿又五百年化爲玄鹿漢成帝時山中人得玄鹿烹而視其骨皆黒色仙}
  - {type: variant, offset: 2307, length: 489, content: 列子者自稱蜀人好放犬犬走入山穴列子隨十餘宿行度數百里出山頭上有殿屋官府松樹仙人吏使甚嚴見其故妻主江魚與列子一函藥發函魚子也著池中養之一年皆為龍列後送函上山犬色更赤有長翰常隨列往來百餘年遂留山上時時下護其宗族蜀人立祠於穴孔常有鼓似傳呼聲搜神記曰山陽王瑚字孟璉為東海蘭陵令夜半時輒有黑幘白單衣吏詣縣扣閣近之則忽然不見如此數年後令伺之見一老狗黑頭白軀至閣便為人以白孟璉殺之乃絕又曰鄱陽趙壽有犬蠱有陳岑家有黃犬六七群出吠岑後令伯婦與壽婦食吐血幾死屑桔梗飲之乃愈又曰東越門中有墉下北隰中有大虵長七八丈大十餘圍嘗八月送童女至虵穴輒吞之噉九女時樂縣李誕有小女名奇應募而行乃請好劍咋虵犬詣之至則放犬咋虵以劍擊之越王奇之娉以為后續搜神記曰林慮山下有亭有過宿者或病或死常云有十餘人男女各雜衣或黑或白轉來為害有劉伯夷者過宿明燭而坐誦經至中夜其怪復集伯夷密以鏡照之乃一群狗也因陽以燭誤灼其衣作燃毛氣乃以刀剌之遂死餘犬悉走去又曰晉穆哀之世領軍司馬濟陽蔡詠家犬夜群相吠伺之見一狗著黃衣戴帢為眾犬所吠打殺乃是詠家老黃犬又曰晉太和中廣陵人楊生養狗甚憐愛之行止與俱後生飲酒醉行經大澤草中眠不能動時冬月有野火起風又, WYG: 虎熊雄}
  - {type: variant, offset: 2307, length: 2, content: 列子, krp: 蘇躭與衆兒俱戯獵常騎鹿形雖如常鹿遇險絶之地能超越衆兒問曰何得此鹿異常鹿耶荅曰龍也𫐠異記曰漢成帝末年宮中雨一蒼鹿殺而食之味甚羙又曰鹿一千年爲蒼鹿又百年化爲白鹿又五百年化爲玄鹿漢成帝時山中人得玄鹿烹而視其骨皆黒色仙}
