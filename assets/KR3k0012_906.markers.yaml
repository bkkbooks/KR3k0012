  - {type: variant, offset: 2129, length: 10, content: 仲甫者能隱形初隱百日, WYG: 嬰弟縚音韜二人善于用弩常得大麈解其四脚懸着樹間以蔵為炙於火上方欲共食山下一人長三丈許鼓歩而来手持大嚢既至取麈頭角皮并火上新肉悉内嚢中遥還山去兄弟後亦無恙麑音倪淮南子曰孟孫獵而得麑使秦西巴歸之麑母隨而啼西巴不忍縦而與之孟孫歸求麑安在西巴以寔對孟孫怒逐居}
