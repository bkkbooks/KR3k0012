  - {type: variant, offset: 1813, length: 311, content: 湯不救恨殺此狗其弟法度從此終身不食狗肉又曰陸機少時頗好遊獵在吳豪盛客獻快犬名曰黃耳機往仕洛常將自隨此犬黠惠能解人語又常借人三百里外犬識路自還一日至家機羈官京師久無家問機戲語犬曰我家絕無書信汝能齎書馳還取消息不犬喜搖尾作聲應之機試為書盛以竹筒繫之犬頸犬出驛路疾走向吳飢入草噬肉取飽每經大水輒依渡者弭耳掉尾向之其人憐愛因呼上舡載近岸犬即騰上速去如飛逕至機家口銜竹筒作聲示人機家開筒取書看畢犬又向人作聲如有所求其家作荅內竹筒中復繫犬頸犬既得荅仍馳還洛計人程五旬而犬往還裁半後犬死殯之遣送還家葬機村南去機家二百步築土為墳村人呼為黃耳冢異苑曰東海何澹之隆安初屢入關中後還得一犬壯大非常何每行來輒已知處澹之後抱疾犬亦疾及其亡犬一嗥而斃, SBCK: 浮過也}
