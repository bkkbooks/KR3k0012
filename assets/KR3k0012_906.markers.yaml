  body:
  - {type: variant, offset: 3, length: 2, content: 七狗, SBCK: 八鹿麋麂麈麑鹿􅀃文曰麚音加牝鹿也夏至解角麟大牝鹿也􅣩音儒鹿也音速鹿迹也麛音述鹿子也音肩鹿之絶有力也麠舉郷切大鹿也爾雅曰鹿壯麚牝音優其子麛其迹速絶有力麉音堅又音磬周易卦曰六三即鹿無虞惟入于林中詩韓弈曰魴鱮音序甫甫麀鹿􅢕􅢕虞矩切又靈臺曰麀鹿濯濯白鳥翯翯又吉日曰獸之所同麀鹿麌麌虞矩切又野有死􅍪曰林有撲樕野有死鹿白茅純束有女如玉又曰鹿鳴宴群臣嘉賔也􅊯􅊯鹿鳴食野之苹又蕩桑柔曰瞻彼中林甥甥其鹿左傳文}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_906-1b}
  - {type: variant, offset: 3, length: 4, content: 七狗下列, WYG: 八鹿麋麂麈麑鹿説文曰麚音加牡鹿也夏至解角麟大牝鹿也􅂒音儒鹿麛也􅂒音束鹿迹也麛音迷鹿子也麉音肩鹿之絶有力者􅕱居履切大麋爾雅曰鹿牡麚牝麀音優其子麛其迹速絶有力􅂒音堅又音磬周易卦曰六三即鹿旡虞惟入于林中詩韓奕曰魴鱮音序甫甫麀鹿噳噳又靈臺曰麀鹿濯濯白鳥翯翯又吉日曰獸之所同麀鹿麌麌又野有死麕曰林有樸􅈪野有死鹿白茅純束有女如玉又曰鹿鳴宴羣臣嘉賔也呦呦鹿鳴食野之苹又蕩桑柔曰瞻彼中林甡甡其鹿左傳曰晉侯不見鄭伯以為貳於楚鄭子家使執訊而告趙宣}
