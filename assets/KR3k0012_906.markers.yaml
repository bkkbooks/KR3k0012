  - {type: variant, offset: 1834, length: 2, content: 陸機, WYG: 唐頌字徳雅畨禺人遭䘮六年廬於墓側白鹿捨食塜邉習鑿齒襄陽記曰習郁従光武幸黎丘與光武通夢見蘇頷神帝嘉之使立祠祀之有二石鹿夾道口百姓乃謂之鹿門麋爾雅釋獸曰麋牡麔牝麎其子䴠其跡躔絶有力狄麔音咎麎音辰䴠於兆切説文曰麋鹿屬也冬至解角春秋運斗樞曰揺光星散為麋春秋命厯序曰有人黄頭大腹出天齊號曰皇次駕六飛麋上下天地與神合謀周禮天官獸人曰獸人夏獻麋左傳宣王曰晋楚戰楚致晋師晉人逐之左右角之樂伯左射馬而右射人角不能進矢一而已麋興于前射麋麗龜晋鮑癸當其後使攝叔奉麋獻焉又曰魯莊公十七年多麋害稼又哀十四年傳曰宋桓魋之寵害于公將討之召左師同迹人来吿曰逢澤有界麋焉離騷曰麋何食兮庭中蛟何為兮水裔莊子曰鰌與魚遊麋與鹿交淮南子曰孕婦見兎其子缺脣見麋而子四目又曰逐麋者不顧雉兎新序曰晉文公逐麋而失之問農父古老古老以足指曰如是往公譲之古老曰虎豹厭閒而近人故得魚鱉厭深而之淺故得諸侯厭衆而亡其國文公懼歸有忻色欒武子問焉公曰今日逐麋失之而得善言故忻也魏略曰文帝將受禪有白麋見戴延之西征記曰徽音殿西南姚興起波若䑓有逍遥園西去三百歩有鹿子苑羌王養麋鹿數百頭麂爾雅曰麂音几大麕九均切旄毛狗足山海經曰女几之山有獸多麕郭璞曰麕似麞而大孫氏瑞應圖曰晉中興書元帝時有二白麂見於南昌郡臨海記曰郡西北侯官山有三足麂其聲嘶嗄二千石官長將有代謝則嗄麂鳴矣麈説文曰麈鹿屬也大而一角捜神記曰馮乗虞蕩夜獵見一大麈射之麈便云虞蕩汝射殺我耶明晨得一麈而入}
