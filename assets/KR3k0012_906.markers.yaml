  - {type: variant, offset: 1517, length: 1, content: 原, SBCK: 太公六韜曰取天下􅀂逐野鹿得其鹿天下共食肉莊子曰至德之丗不尚賢不使能民如野鹿韓子曰夫馬似鹿者而題千金}
  - {type: variant, offset: 1517, length: 1, content: 原, WYG: 太公六韜曰取天下若逐鹿得其鹿天下共其肉莊子曰至徳之世不尚賢不使能民如野鹿韓子曰夫馬似鹿者而題千金乃}
  - {type: variant, offset: 1517, length: 1, content: 原, krp: 太公六韜曰取天下若逐野鹿得其鹿天下共食肉莊子曰至德之丗不尚賢不使能民如野鹿韓子曰夫馬似鹿者而題千金}
  - {type: variant, offset: 1519, length: 5, content: 狗枷堡秦襄, SBCK: 百金之馬而無一金之鹿者馬爲人用而鹿不爲人用列子曰鄭人有薪於野者遇駭鹿却而擊之斃恐人見之遽而藏諸隍中覆之以䕌不勝其喜俄而遺其所藏之處遂以爲夢焉從塗而詠其事傍人有聞者用其言而取之旣歸告其室人曰向薪者夢得鹿而不知其處吾今得之管子曰桓}
  - {type: page-break, offset: 1519, content: '', id: KR3k0012_SBCK_906-5a}
  - {type: variant, offset: 1519, length: 5, content: 狗枷堡秦襄, WYG: 百金之馬而無一金之鹿者馬為人用而鹿不為人用列子曰鄭人有薪於野者遇駭鹿却而擊之斃恐人見之遽而藏諸隍中覆之以蕉不勝其喜俄而遺其所藏之處遂以為夢焉従塗而詠其事傍人有聞者用其言而取之既歸告其室人曰向薪者夢得鹿而不知其處吾今已得之矣管子曰桓}
  - {type: page-break, offset: 1519, content: '', id: KR3k0012_WYG_906-8a, image: WYG0901/WYG0901-0087c.png}
  - {type: variant, offset: 1519, length: 5, content: 狗枷堡秦襄, krp: 百金之馬而無一金之鹿者馬爲人用而鹿不爲人用列子曰鄭人有薪於野者遇駭鹿却而擊之斃恐人見之遽而藏諸隍中覆之以䕌不勝其喜俄而遺其所藏之處遂以爲夢焉從塗而詠其事傍人有聞者用其言而取之旣歸告其室人曰向薪者夢得鹿而不知其處吾今得之管子曰桓}
  - {type: punctuation, offset: 1522, content: ，, id: KR3k0012_CHANT_906-bkkpn484}
  - {type: 'tls:seg', offset: 1522, content: '', id: KR3k0012_CHANT_906-22a.7}
  - {type: variant, offset: 1525, length: 0, content: '', SBCK: 問管子楚之強國舉兵伐之恐力不能過奈何對曰公貴買其鹿公即爲百里之城使人載錢二千萬求生鹿於楚人楚人釋其耕農而田鹿管子告楚人賈曰爲我致生鹿賜子金百斤什至金千斤尸子曰鹿走而無頋六馬不能望其塵謂不反頋也吕氏春秋曰晏子遭崔杼之患其僕將馳晏子安之曰疾必不生徐必不死鹿生於山命懸於厨今嬰有所懸也抱朴子曰昔張盍蹹音沓及儒寗成二人並精思於蜀雲臺山石室中忽有一人着黄練單衣􅁑巾到其前曰勞乎道士乃辛苦幽深於是二人頋視於鏡中乃見是鹿也因問曰汝是草中老鹿何敢詐爲人形也言絶即還成鹿而走去瀨郷記李母碑曰老子乗白鹿下託於李母韓詩外傳曰齊景公逐白鹿畒丘見封人曰使吾君壽金玉是賤人民是寳公曰善孫柔之瑞應圗曰黃帝}
  - {type: page-break, offset: 1525, content: '', id: KR3k0012_SBCK_906-5b}
  - {type: variant, offset: 1525, length: 1, content: 時, WYG: 問管子楚之强國舉兵伐之恐力不能過奈何對曰公貴買其鹿公即為百里之城使人載錢二千萬求生鹿於楚人楚人釋其耕農而逐鹿管子告楚人賈曰為我致生鹿賜子金百斤什至金千斤尸子曰鹿走而無顧六馬不能望其塵謂不反顧也吕氏春秋曰晏子遭崔杼之患其僕將馳晏子安之曰疾必不生徐必不死鹿生於山命懸於厨今嬰}
