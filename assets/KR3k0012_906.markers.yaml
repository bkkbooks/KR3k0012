  - {type: variant, offset: 1572, length: 40, content: 龍虎子馴良捷警難狎易使述異記曰濟陽山有麻姑仙處俗說山上千年則金鷄鳴玉狗吠漢末皆云, SBCK: 鹿化三百􅀊}
  - {type: variant, offset: 1572, length: 0, content: '', WYG: 超岡而去于今此壁謂之白鹿山泅音囚言浮過也神仙傳曰魯女生者長樂人服胡麻餌术絶榖八十餘年甚少世傳見之二百餘年入華山中有故人與女生相别五十年復入華山廟逄女生乃乗白鹿車従者玊女數十人列仙傳曰蘇躭與衆兒戯獵常騎鹿形雖如常鹿遇險絶之地能超越衆兒問曰何得此鹿異常鹿耶荅曰非鹿是}
