  - {type: variant, offset: 2797, length: 443, content: 狗周章號喚生醉不覺前有一坑水狗便走往眠水中還以身壓生左右草沾濕著地火尋過去生方醒他日又闇行墮空井中犬呻吟徹曉須臾有人逕過怪犬向井號往視見生生曰君可出我當厚報君人問以何物見與生云唯君耳人曰以狗見與便相出生曰此狗曾活我於已死不得相與他物任君人曰若爾便不能相出狗因下頭目井生知其意乃語路人以狗相與乃出之繫狗而去卻後五日狗夜走還又曰會稽人張然滯役經年不歸婦遂與奴私通然養一狗名曰烏龍後歸奴與婦欲謀殺然狗注精舐脣視奴然烏龍與手應聲湯奴奴失刀仗然取刀殺奴幽明錄曰晉太興二年吳民華隆生獵養一快犬號曰的尾常將自隨隆後至江邊伐荻犬暫出渚次隆為大虵所圍繞周身犬還便咋虵虵死隆僵仆無所知犬彷徨涕泣走還舡復反草中伴怪所以隨往見隆悶絕將歸家二日犬為不食隆復蘇乃始進飯隆愈愛惜同於親戚後忽失之二年尋求見在顯山嶺表錄異曰嘗有人自青社泛海歸閩為惡風所飄五日夜不知其幾千里也經一處同舡有新羅人云是狗國逡巡果如人躶形抱狗而出見舡驚走楚辤九辨曰豈不鬱陶而思君兮君之門以九重猛犬唁唁而迎吠兮關梁閉而不通魏賈岱宗大狗賦曰其頭顱也, SBCK: ''}
