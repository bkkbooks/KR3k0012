  - {type: variant, offset: 133, length: 1, content: 善, SBCK: 仲夏鹿角解又禮器曰居澤者不以鹿豕爲禮史記曰趙髙欲爲亂恐群臣不聽乃先驗持鹿於二丗曰馬也二丗􅀏曰丞相誤耶謂鹿爲馬問左右左右或言馬以阿趙髙或言鹿髙因隂中言鹿者以法又曰邑中人民俱出獵任安常爲人分麋鹿雉兎部署大小劇易衆人皆喜鹿無傷也任少卿分別平又曰古者皮幣諸侯以聘享漢武帝乃以白鹿皮方尺縁以藻繢爲幣直四十萬王侯朝覲享聘必以爲薦璧然後得行漢書曰蒯通教}
  - {type: page-break, offset: 133, content: '', id: KR3k0012_SBCK_906-2a}
  - {type: variant, offset: 133, length: 1, content: 善, WYG: 仲夏鹿角觧又禮器曰居澤者不以鹿豕為禮史記曰趙髙欲為亂恐羣臣不聽乃先驗持鹿於二世曰馬二世笑曰丞相誤耳謂鹿為馬問左右左右或言馬以阿趙髙或言鹿髙因隂中言鹿者以法又曰邑中人民俱出獵任安常為人分麋鹿雉兎部署老小當壯劇易處衆人皆喜曰無傷也任少卿分别平又曰古者皮幣諸侯以聘享漢武帝乃以白鹿皮方尺緣以藻繢為幣直四十萬王侯朝覲享聘必以為幣薦璧然後得行漢書曰蒯通教}
