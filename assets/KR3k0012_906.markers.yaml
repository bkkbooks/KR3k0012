  - {type: variant, offset: 176, length: 1, content: 孺, WYG: 東方朔別傳曰武帝時有殺上林鹿者下有司收殺之朔時在旁曰是故當死者三使陛下以鹿殺人一當死天下聞陛下重鹿賤人二當死匈奴有急須鹿觸之三當死帝黙然赦之范􅁮後漢書曰雲南縣有神鹿兩頭食毒草又華陽國志曰熊倉山有神鹿食毒謝承後漢書曰鄭𢎞為臨淮太守行春兩白鹿車後夾轂而行𢎞怪問主簿黄國鹿為凶吉國拜賀曰聞三公車畵作鹿明府當為宰相後𢎞果為太尉魏志曰蘇則從文帝獵失鹿帝大怒踞胡床㧞刀悉收督吏將斬之則諫之乃止晉書曰許孜字季義東陽吳寧人也二親沒棄妻宿墓所列植松栢亘五六里時有鹿犯其松栽孜嘆曰鹿獨不念我乎明日忽見鹿為猛獸所殺置於所犯栽下孜悵惋不已乃作塜埋於隧側猛獸即孜前自投而死孜益歎息復亦埋之又曰謝鯤在豫章嘗行經空亭中夜宿此亭舊每殺人將晩有黄衣人呼鯤字爾開户鯤淡然無懼色便於忩中度手牽之膊斷視之鹿也尋血獲焉爾後此亭無復妖怪殺人也晉中興書曰陶淡字處淨太尉侃之孫一身孑然無有同産髫齔之時雅好𨗳養謂仙道可祈至年十五六便服食絶穀不婚娶居長沙臨湘縣下去家十里於山中立小草屋裁足容身時還家設小床常獨坐不與人共於野得白鹿}
