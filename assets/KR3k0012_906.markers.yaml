  - {type: variant, offset: 1829, length: 3, content: 食狗肉, WYG: 復弋獵至孫復習其事後忽射一白鹿乃於兩角間得道家七星符并有其祖姓名及鄉居年月在焉乃斷獵伏候古今注曰漢明帝永平九年三角鹿出江孝和帝永元十二年豫章徐子得白鹿髙丈九尺楚辭曰青莎雜樹薠音煩草靃靡白鹿麕麚或騰或倚樂府歌詩曰白鹿在上林苑中射工尚得脯腊之黄鶴摩天極高飛後宫尚得烹煑之金樓子曰夏禹之時神鹿行於河水搜神後記曰淮南陳氏於田中種豆忽見有二女子姿甚美着紫纈襦青裙天雨而衣不濡其壁先掛一銅鏡鏡中見二鹿遂以刀斫獲之以為脯宣驗記曰吳唐廬陵人也少好驅媒獵射發無不中家以致富後春月與子出獵正值鹿母引麑覺有人氣呼麑漸去麑不知所畏逕前就媒唐射麑即中鹿母驚走悲鳴唐乃自藏草中出麑致净地鹿母直来地俯仰頓伏絶而復起唐又射鹿母應弦而倒至前塲復逄一鹿上弩將欲急發箭反激還中其子唐擲弩抱兒撫膺而哭聞空中忽曰吳唐鹿之愛子與汝同唐驚聽不知所在髙堂隆集曰近日有司宣令有殺禁地鹿者身死財産沒官有能先覺白者厚賞賜之此為重禽獸而賤人過於齊宣矣杜祭酒别傳曰郡弟子三人隨道士邢邁入宣城涇縣白水山去縣七十里餌术黄精經歴年所有鹿走依舍邉伏眠邁等怪之乃為虎所逼邁乃咒虎退其鹿經日乃去南中八郡志曰麋冷縣深山中有大蛇長數丈圍三尺於樹上野鹿過便低頭繞之鹿於是有頃而死先含水濡之令濕乃合頭角併吞之訖便不能動至數日鹿乃消盡蛇自繞樹鹿角骨悉鑽皮出養瘡得一月乃愈又永初山川記曰髯蛇吞鹿至角乃止交州記曰合浦口有麚角當額上載科藤一株三四條長可一尋射師従禽每見而不敢射蕭廣濟孝子傳曰伍襲字世公丁父憂廬墓側有一鹿每襲哭輙踞墳而悲廣州先賢傳曰丁茂字仲慮交阯人至孝母終負土治塜列樹松栢白鹿逰乎左右}
