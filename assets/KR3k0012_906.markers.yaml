  - {type: variant, offset: 112, length: 1, content: 景, SBCK: 鹿死不擇音小國之事大國也德則其人也不德則其鹿也挺而走險急何能擇又襄十四年傳曰范宣子執戎子駒支數之曰今諸侯之事我寡君不如昔者盖言語漏洩則職汝之由戎子駒支曰昔文}
