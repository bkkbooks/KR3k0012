  - {type: variant, offset: 1148, length: 226, content: 犬抱白鶴山神大喜芝草及寶玉等自出又曰王思微性好淨潔左右提衣悉令白紙褁手指在宅有犬汙柱思微令門生洗之意猶不已更令刮削復言未足遂令易柱洞林曰楊州從事慎曜伯婦病困經日發作有時如聞物往來者其兄周彥武令人作卦得蹇身在戊戍與坎鬼井卦中當有從東北田家市黑狗畜之以代人任患死當有無幾時狗便死復更養如前凡三遇養輒皆吐血而死婦病亦差雜五行書曰白犬虎文南斗君畜之可致萬石也黑犬白耳大王犬也畜之令富貴黑犬白前兩足宜子孫白犬黃頭家大吉黃犬白尾代有衣冠黃犬白前兩足利人玄中記曰昔高, SBCK: 鹿}
