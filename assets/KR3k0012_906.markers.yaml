  - {type: variant, offset: 2568, length: 1, content: 噉, SBCK: 訖便不能動至數日鹿乃消盡虵自繞樹鹿角骨悉鑚皮岀飬瘡得一月乃愈又永􅀄山川記曰髯虵吞鹿至角乃止交州記曰合浦口有䴥角當額上載科藤一株三四條長可一尋射師從禽毎見而不敢射蕭廣濟孝子傳曰伍襲字丗公丁父憂廬墓側有一鹿毎襲哭輒踞墳而悲鳴廣州先賢傳曰丁茂字仲慮交阯人至孝母終􅀒土治冢列樹松栢白鹿遊乎左右又曰唐頌字德雅番禺人遭䘮六年廬於墓次白鹿拾食􅃁邊習鑿齒襄陽記曰習郁從光武幸􅀺丘與光武通夢見蘇頷神帝嘉之使立祠二石鹿夾道口百姓謂之鹿門麋爾雅釋獸曰麋牝麎其子其跡􅄤絶有力狄麋音眉麔平表切麎音臣於道切􅀃文曰麋鹿屬也冬至解角春秋運斗樞曰摇光星散爲麋春秋命歴序曰有人黃頭大腹岀天齊號曰皇次駕六飛靡上下天地與神合謀周禮天官獸人曰獸人夏獻麋左傳宣下曰晉楚戰楚致晉師晉人逐之左右角之樂伯左射馬而右射人角不能進矢一而巳麋興於前射麋麗􅀛晉鮑癸當其後使攝叔奉麋獻焉又曰魯莊公十七年多麋害稼又哀十四年傳曰宋桓魋之寵害於公將討之召左師曰迹人來告曰逢澤有介麋焉離騷曰麋何食􅀆庭中蛟何爲􅀆水裔莊子曰鰌與魚遊麋與鹿淮南子曰孕婦見兎其子缺脣見麋而子四日又曰逐麋者不頋雉兎新序曰晉文公逐麋而失之問農夫古老古老以足指如是徃公問其故對曰虎豹厭閑而近人故得魚鱉厭深而之淺故得諸侯厭衆而亡其國文公懼歸有恱色欒貞子問焉公曰今日逐麋失之而得善言故忻也魏略曰文帝將受禪有白麋見戴延之西征記曰徽音殿西南姚興起波􅀂臺有逍遥園西去三百歩有鹿子􅁐羗王飬麋鹿數百頭麂爾雅曰麂音几大􅍪}
