  - {type: variant, offset: 2428, length: 0, content: '', SBCK: 淮南陳氏於江西種豆忽見二女子姿色甚美着紫纈􅃭青裙天雨而衣不濡其壁先挂一銅鏡中見二鹿以刀斫獲之以爲脯宣驗記曰呉唐廬陵人也少好驅媒獵射發無不中家以致富後春月將兒岀射正值麋鹿將麑母覺有人氣呼麑漸出麑不知所猥逕前就媒唐射麑即死鹿母驚還悲鳴唐乃自藏於草中出麑致浄地鹿母直來地俯仰頓伏絶而復起唐又射鹿母應弦而倒至前􅂣復逢一鹿上弩將放忽發箭反激還中其子唐擲弩抱兒撫膺而哭聞空中呼曰呉唐鹿之愛子與汝何異唐驚聽不知所在髙堂隆集曰近日有司宣令有殺禁地鹿者身死財産没官有能先􅁴白者賞賜之此爲重禽獸而賤人過於齊宣矣杜􅀕酒別傳曰君弟子三人隨道士邢邁入宣城涇縣白水}
