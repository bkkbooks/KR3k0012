  - {type: variant, offset: 710, length: 664, content: 犬則毛黑說苑曰梁相死惠子之梁渡河而遽墮舡舡人救之問欲何之曰欲相梁舡人曰子居舟楫之間而溺無我則死又安能相梁乎惠子曰居廣艘長楫之間我不如子至於安國家全社稷子不比我吾視子蒙蒙若未視之狗子耳論衡曰亡獵犬於山林大呼犬名其犬則鳴號而應其主人犬異類聞呼而應者識其主也潛夫論曰一犬吠形百犬吠聲桓譚新論曰占仲子婢死有兒年四歲葬後數來撫循之亦能為兒沐頭甚令人惡之以告方士曰有狗效之婢遂不復來又曰楊仲文家嫗死已歛未葬忽起坐棺前床上飲酒醉而狗形見殺之風俗通曰殺狗磔邑四門俗云狗別賓善守衛著以辟惡又曰太史公記云秦始皇殺狗磔四門以禦凶災今人殺白犬以血題門戶曰正月白犬血辟除不祥又曰殺犬磔攘犬者金畜攘者卻也抑金使不害也又曰桂陽太守汝南李叔堅少時為從事在家狗如人立行家人言當殺犬叔堅云犬馬喻君子狗見人行效之何傷叔堅見縣令還解冠榻上狗戴持走家大驚堅復云雲誤觸冠冠纓挂著之耳狗於竈前畜火家益怪堅復云兒婢皆在田中狗助畜火狗何能作怪遂不肯殺後數日狗自暴死卒無纖芥之異叔堅辟太尉掾固陵長原武令終享大位金樓子曰入名山牽白犬抱白鶴山神大喜芝草及寶玉等自出又曰王思微性好淨潔左右提衣悉令白紙褁手指在宅有犬汙柱思微令門生洗之意猶不已更令刮削復言未足遂令易柱洞林曰楊州從事慎曜伯婦病困經日發作有時如聞物往來者其兄周彥武令人作卦得蹇身在戊戍與坎鬼井卦中當有從東北田家市黑狗畜之以代人任患死當有無幾時狗便死復更養如前凡三遇養輒皆吐血而死婦病亦差雜五行書曰白犬虎文南斗君畜之可致萬石也黑犬白耳大王犬也畜之令富貴黑犬白前兩足宜子孫白犬黃頭家大吉黃犬白尾代有衣冠黃犬白前兩足利人玄中記曰昔高, WYG: 鹿}
