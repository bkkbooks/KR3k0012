  - {type: variant, offset: 2142, length: 164, content: 見形後遂長隱但聞其聲與人對接飲酒食如常有諸張欲從學甫云卿性急未中教張守之至費用五十疋了無所得張大怒乃懷上手而往先與仲甫語畢因依聲左右斫之甫已在他床笑云天下乃當有汝曹愚人學道未得而殺人也我寧可得殺我真得殺汝但頑癡不足問耳使主人呼一犬來著諸生前看能殺之否俄爾犬頭在地犬腹已破叱諸生云卿言我能使卿如犬形否諸生下地叩頭乃止遂不教之列仙傳, WYG: 以西巴為傅秦子}
