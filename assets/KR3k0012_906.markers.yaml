  - {type: variant, offset: 178, length: 0, content: '', WYG: 馴而養之至七八歳時恒與之俱徃還遂乃不復還家又曰殷仲堪上白鹿表曰巴陵縣青水山得白鹿一頭白者正色鹿者景福嘉義晉書載記曰石勒嘗傭於武安臨水為遊軍所囚㑹有羣鹿旁過軍人競逐之勒乃獲免俄而又見一父老謂勒曰向羣鹿者我也君應為中州主故相救耳勒乃拜而受其賜蕭子顯齊書曰始興盧度隠居西昌三顧山鳥獸隨之夜有鹿觸其壁度曰汝勿壞我壁鹿應聲去史記四夷傳曰扶南有鹿車國人養鹿如中國畜牛以乳為酪隋書曰開皇十七年羣鹿入殿門馴擾侍衛之内後周書曰文帝獵於邙山圍不齊獸多越逸帝怒諸將股慄俄有一鹿亦突圍而走賀若敦躍馬逐之鹿上東原棄馬歩逐山半便及掣之而下帝大悦諸將免罪唐書曰太宗幸}
