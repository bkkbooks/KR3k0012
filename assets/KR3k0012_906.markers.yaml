  - {type: variant, offset: 899, length: 0, content: '', krp: 堪上白鹿表曰巴陵縣青水山得白鹿一頭白者正色鹿者景福嘉義晉書載記曰石勒甞傭於武安臨水爲遊軍所囚㑹有群鹿傍過軍人競逐之勒乃獲免俄而又見一父老謂勒曰向群鹿者我也君應爲中州主故相救耳勒拜而受命蕭子顯齊書曰始興盧度隱居西昌三頋山鳥獸隨之夜有鹿觸其壁度曰汝勿壞我壁鹿應聲去南史四夷傳曰扶南有鹿車國人養鹿如中國畜牛以乳爲酪隋書曰開皇十七年群鹿入殿門馴擾侍衛之内後周書曰}
  - {type: variant, offset: 900, length: 2, content: 家嫗, SBCK: 帝獵於邙山圍不齊獸多越逸帝怒諸將股慄俄有一鹿亦突圍而走賀􅀂敦躍馬逐之鹿上東原弃馬歩逐山半便及掣之而下帝大恱諸將免罪唐書曰太宗幸懷州乙未狩於濟源之陵上親御狐矢太宗曰古者先駈以供宗廟今所獲鹿冝令有司造脯􅊽以充薦享又曰禇無量丁母憂解職廬於墓側其所植松栢時有鹿犯之無量泣而言曰山中衆草不少何忍犯吾先塋樹栽因通夕守護俄有群鹿馴狎不復侵害魏名臣奏曰時殺禁地鹿者}
