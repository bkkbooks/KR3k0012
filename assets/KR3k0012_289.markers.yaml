  - {type: page-break, offset: 3278, content: '', id: KR3k0012_WYG_289-13a, image: WYG0895/WYG0895-0530c.png}
  - {type: variant, offset: 3278, length: 0, content: '', krp: 焉地旣險隘賊多􅗋􅗋鋋也筭也騎戰稍難太宗親自射之莫不應弦而倒起辰及午賊衆始退因乗之迫于城塹俘斬七千人自是不敢復岀又曰髙宗遣將軍裴行儉計突厥於黒山至朔川謂其下曰兵法尚詐者以權謀制敵也若御其下則非誠信不可行遣副將蕭嗣業運糧𬒳掠兵多餧死所以敗也狡㓂狃忲不可以不備乃詐爲糧車三百乗毎車伏壯士五人各賫陌刀勁弩以羸兵數百人援之兼伏精兵居險以待之賊果大下羸兵弃車散走賊驅馬就泉井解鞍牧馬方擬取糧車中壯士齊發伏兵亦至殺獲殆盡賊衆奔潰自是續遣糧運無敢近之者又曰馬燧爲魏博招討使田恱求救於淄青恒州李納遣大將衛俊將兵僅萬人以救恱李惟岳亦遣三千餘人救恱收合散兵二萬餘壁於洹水淄青軍其東恒州軍其西首尾相應燧帥諸軍進屯於鄴奏請益河陽兵詔遣河陽節度使李芁將兵㑹之軍次於漳恱遣將王光進以兵守長橋築月城以爲固軍不得渡燧乃於下流以兵車數百乗維鐵鎻絶中流實以土囊以遏水水稍淺諸軍畢渡是時軍粮少恱深壁不戰欲老燧軍燧令諸軍持十}
  - {type: variant, offset: 3279, length: 0, content: '', SBCK: 粮以前進次倉口與恱等夾洹水而軍李抱眞等問曰粮少深入何也燧曰粮少利速戰兵法善於致人而不致於人今田恱與淄青􅁪州三軍爲首尾計以老我師􅀂分軍擊其左右兵少未可必破恱且來救是前後受敵也兵法所謂攻其必救固當戰也燧爲諸公合而破之燧乃造三橋逾洹水日挑戰恱不敢出􅁪州兵自以軍少懼爲燧所并引軍合於田恱燧又令於軍中曰恱死傷之餘安敢岀戰所恃者淄青軍尓吾當先破納軍則田恱坐受降也淄青軍聞懼亦引軍合於田恱謂燧明日復挑戰乃伏兵萬人欲邀之燧乃令諸軍半夜皆食先鷄鳴時擊鼔鳴潛師旁洹水西徑趨魏州令曰聞賊至即止爲陣又令百􅀐鳴鼔角留於後仍抱薪持火待軍止鼔角匿其旁伺恱軍渡焚其橋軍}
  - {type: page-break, offset: 3279, content: '', id: KR3k0012_SBCK_289-8b}
  - {type: variant, offset: 3279, length: 0, content: '', WYG: 粮以進前次倉口與悦等夾洹水而軍李抱真等問曰粮少深入何也燧曰粮少利速戰兵法善於致人而不致於人今田悦與淄青恒州三軍為首尾計以老我師若分軍擊其左右兵少未必可破悦且來救是前後受敵也兵法所謂攻其必救固當戰也燧為諸公合而破之燧乃造三橋逾洹水日挑戰悦不敢出洹水兵自以軍少懼為燧所并引軍合於田悦燧令於軍中曰悦死傷之餘安敢出戰所恃者淄青軍爾吾當先破納軍則田悦坐受降也淄青軍聞懼亦引軍合於田悦燧明日復挑戰乃伏兵萬人欲邀之燧乃令諸軍半夜皆食先雞鳴時擊鼓潛率師傍洹水西徑趨魏州令曰聞賊至即為陣又令百騎鳴鼓角留於後乃抱薪持火待軍止鼓角匿其旁伺悦軍渡焚其橋軍}
