  - {type: variant, offset: 3295, length: 3, content: 而主上, SBCK: 恱大敗時神䇿昭義河陽軍小却河東軍勝諸軍還􅃲合擊又大破迫切洹水恱軍走橋橋巳焚矣恱軍亂赴水斬首二萬殺賊大將孫晉卿安墨啜生獲三千餘人溺水死者不可勝數淄青軍殆盡死者相枕藉三十里恱收兵得千餘人走夜至魏州又曰元和十二年唐鄧節度使李愬奏}
