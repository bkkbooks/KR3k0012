  - {type: variant, offset: 2436, length: 496, content: 所圍東魏召人赴救慕容儼應募赴之時東魏北淯太守宋帶劍謀叛淯音育儼乃輕騎出其不意直至城語云大軍已到太守何不出迎帶劍造次惶恐不知所為便出迎儼即執之一郡遂定又曰東魏初齊神武破爾朱兆兆奔保秀容分兵守險出入鈔掠神武每揚聲云欲討之師出復止如此者數四神武揣兆歲首必應會飲使將竇泰率精騎先一日一夜行三百里兆軍人因宴休墯忽見泰軍莫不奪氣因而剋之又曰東魏將齊神武率兵伐西魏大軍濟河集諸將議進趣之計斛律羌舉曰宇文黑獺雖聚凶黨強弱可知若固守無糧援可恃今揣其情以同困獸若不然其戰而逕趣長安空虛可不戰而剋拔其根本彼無所歸則黑獺之首懸於軍門矣諸將議有同遂戰於渭曲大敗而歸齊神武違之故敗也又曰東魏末齊神武薨子澄立侯景叛歸梁而圍彭城澄遣慕容紹宗討之將戰紹宗以梁人剽悍恐其眾之撓也一一引將卒而誑之曰我當佯退誘梁人使前汝可擊之皆申明誡之景又命梁人逐北勿過二里會戰紹宗實敗走梁人不用景言乘敗深入魏人以紹宗言為信爭共掩擊遂大破之又曰東魏遣將斛律金寇西魏洛陽師至于河北周文帝患其度河乃於上流縱火舩而下以燒河橋金先備小艇半盛以水鐵鎖連之亘絕中流火舡至而不前須臾火滅而橋獲存遂進軍洛陽又曰東魏將齊神武伐西魏軍至許原西周文帝至渭南徵諸州兵皆來會, WYG: ''}
