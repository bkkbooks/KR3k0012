  - {type: variant, offset: 3275, length: 2, content: 高歡, krp: 賊勢迫矣悉衆而出利在一戰今日破之其後不能出矣乃令屈突通率歩卒五千度水布陣以當之因戒通曰待兵交即放煙吾當率馬軍南下兵纔接太宗以騎衝之挺身先進表裹合勢賊衆殊死戰散而復合者}
  - {type: variant, offset: 3276, length: 1, content: 歡, WYG: 宗遣將裴行儉討突厥於黑山至朔州謂其下曰兵法尚詐者以權謀制敵也若御其下則非誠信不可行遣副將蕭嗣業運粮被掠兵多餒死所以敗也狡寇忸􅏸不可以不備乃詐為粮軍三百乘每車伏壯士五人各齎陌刀勁弩以羸兵}
  - {type: variant, offset: 3278, length: 0, content: '', SBCK: 焉地旣險隘賊多􅗋􅗋鋋也筭也􅀐戰稍難太宗親自射之莫不應􅁌而倒起辰及午賊衆始退因乗之迫于城塹俘斬七千人自是不敢復岀又曰髙宗遣將軍裴行儉計突厥於黒山至朔川謂其下曰兵法尚詐者以權謀制敵也􅀂御其下則非誠信不可行遣副將蕭嗣業運糧􅀍掠兵多餧死所以敗也狡㓂狃忲不可以不備乃詐爲糧車三百乗毎車伏壯士五人各賫陌刀勁弩以羸兵數百人援之兼伏精兵居險以待之賊果大下羸兵弃車散走賊驅馬就泉井解鞍牧馬方擬取糧車中壯士齊發伏兵亦至殺獲殆盡賊衆奔潰自是續遣糧運無敢近之者又曰馬燧爲魏􅀶招討使田恱求救於淄青􅁪州李納遣大將衛俊將兵僅萬人以救恱李惟岳亦遣三千餘人救恱收合散兵二萬餘壁於洹水淄青軍其東􅁪州軍其西首尾相應燧帥諸軍進屯於鄴奏請益河陽兵詔遣河陽節度使李芁將兵㑹之軍次於漳恱遣將王光進以兵守長橋築月城以爲固軍不得渡燧乃於下流以兵車數百乗維鐵鎻絶中流實以土囊以遏水水稍淺諸軍畢渡是時軍粮少恱深壁不戰欲老燧軍燧令諸軍持十}
  - {type: page-break, offset: 3278, content: '', id: KR3k0012_SBCK_289-7b}
  - {type: page-break, offset: 3278, content: '', id: KR3k0012_SBCK_289-8a}
  - {type: variant, offset: 3278, length: 0, content: '', WYG: 百人援之兼伏精兵居險以待之賊果大下羸兵棄車散走賊驅馬就泉井解鞍牧馬方擬取粮車中壯士齊發伏兵亦至殺獲殆盡賊衆奔潰自是續遣粮運無近之者又曰馬燧為魏博招討使田悦求救於淄青恒州李納遣大將衛俊將兵僅萬人以救悦李惟岳亦遣二千餘人救悦收合散兵二萬餘壁於洹水淄青軍其東恒州軍其西首尾相應燧帥諸軍進屯於鄴奏請益河陽兵詔遣河陽節度使李芃將兵㑹之軍次於漳悦遣將王光進以兵守長橋築月城以為固軍不得度燧乃於下流以兵車數百乘維鐵鎖絶中流實以土囊以遏水水稍淺諸軍畢渡是時軍粮少悦深壁不戰欲老燧軍燧令諸將持十}
