  - {type: variant, offset: 233, length: 3, content: 稍集合, SBCK: 麾旌相繼而至充營内見密兵來逼急連舉六烽充乃捨月城之圍收兵西退自洛北逹於黒石中間四十餘里奔赴顛狽大喪師徒密之行也東北之圍不救而自解西南之㓂不戰而成功充伏其權竒不復輕岀又曰隋漢王諒據并州及隋將楊素率衆數萬討諒時晉絳吕三州並爲諒城守素各以二千人縻之而去諒遣將趙子開擁衆十餘萬柟絶徑路屯據髙壁嶺布陣五十里素令諸將以兵臨之自引兵入霍山縁崖谷而進直指其營一}
