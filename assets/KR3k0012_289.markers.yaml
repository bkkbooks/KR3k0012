  - {type: variant, offset: 1289, length: 343, content: 知其怠選精騎襲之一日便至遂拔成武逈將席毗羅眾十萬屯於沛縣將攻徐州其妻子住金鄉仲文遣人詐為毗羅使者謂金鄉城主徐善凈曰檀讓明日午到金鄉將宣蜀公令即尉遲逈賞賜將士金鄉人謂為信然皆喜仲文簡精兵偽建逈旗幟倍道而進善淨遙見仲文軍且至以為檀讓乃出迎謁仲文執之遂取金鄉諸將多勸屠之仲文曰此城是毗羅起兵之所當寬其妻子其兵可自歸如即屠之彼意絕矣眾皆稱善於是毗羅恃眾來薄官軍仲文背城結陣出軍數里設伏於麻田中兩陣纔合伏兵發俱曳柴鼓噪塵埃蔽天毗羅軍大潰仲文乘之賊皆投漆水而死水為之不流獲檀檻送京師河南悉平又曰後周末隋文作相遣將于仲文先以兵定關東破尉遲逈將檀讓初仲文在蓼隄諸將皆曰軍自遠來士馬疲弊不可決勝仲文令三軍趣食列陣大戰既而破賊諸將皆請曰前兵疲不可交戰竟而剋勝其計安在仲文笑曰吾所部皆山東人果於進不宜持久乘勢, SBCK: 廻}
