  - {type: variant, offset: 1152, length: 710, content: 戰數合偽退登岸投古村猛捨舟逐之法尚又疾走行數里與村北軍合復前擊猛猛走退赴舡既而浦中伏舡取其舟楫建周旗幟猛於是大敗僅以身免又曰後周末隋文帝輔政周大將尉遲逈在河北拒命河南州縣多從逈遣將檀讓屯成武別將高士儒屯永昌隋將于仲文詐移書州縣曰大軍將至可移積粟讓謂仲文未能卒至方搥牛享士仲文知其怠選精騎襲之一日便至遂拔成武逈將席毗羅眾十萬屯於沛縣將攻徐州其妻子住金鄉仲文遣人詐為毗羅使者謂金鄉城主徐善凈曰檀讓明日午到金鄉將宣蜀公令即尉遲逈賞賜將士金鄉人謂為信然皆喜仲文簡精兵偽建逈旗幟倍道而進善淨遙見仲文軍且至以為檀讓乃出迎謁仲文執之遂取金鄉諸將多勸屠之仲文曰此城是毗羅起兵之所當寬其妻子其兵可自歸如即屠之彼意絕矣眾皆稱善於是毗羅恃眾來薄官軍仲文背城結陣出軍數里設伏於麻田中兩陣纔合伏兵發俱曳柴鼓噪塵埃蔽天毗羅軍大潰仲文乘之賊皆投漆水而死水為之不流獲檀檻送京師河南悉平又曰後周末隋文作相遣將于仲文先以兵定關東破尉遲逈將檀讓初仲文在蓼隄諸將皆曰軍自遠來士馬疲弊不可決勝仲文令三軍趣食列陣大戰既而破賊諸將皆請曰前兵疲不可交戰竟而剋勝其計安在仲文笑曰吾所部皆山東人果於進不宜持久乘勢擊之所以制勝諸將皆以為非所及又曰後周將達奚長儒圍陳將吴明徹於呂梁陳遣驍將劉景率勁勇七千來為聲援長儒於是取車輸數百繫以大石沉之清水連轂相次以待景軍景至舡盤礙輪不得進長儒乃縱奇兵水陸俱發大破因檎明徹又曰後周遣將率突厥之眾逼齊晉陽齊將叚韶禦之時大雪之後周人以步卒為前鋒從西山而下去城二里諸將咸欲逆擊之韶曰步人氣力勢自有限今積雪既厚逆戰非便不如陣以待之彼勞我逸破之必矣既而交戰大破之敵前鋒盡殪無復孑遺自餘通宵奔遁又曰後周遣將計高圍洛齊將叚韶禦之韶登邙坂聊欲觀周軍形勢至, WYG: 雨甚}
