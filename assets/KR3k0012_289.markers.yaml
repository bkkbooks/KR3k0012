  - {type: variant, offset: 1863, length: 572, content: 和谷便值周軍即遣馳告諸營與諸將結陣以待之周軍以步人在前上逆戰韶以彼徒我騎且却且引待其力弊乃遣下馬擊之短兵始交周人大潰洛城之圍並即奔遁又曰西魏末岷州羗據州城反魏將獨孤信討之勒兵向萬年頓三交谷口賊併力拒守信因詭道趨綢松嶺綢直由切賊不虞信兵之至觀風奔潰乘勝逐北徑至城下賊出降又曰西魏末涼州刺史宇文仲和據州不受代魏將獨孤信率兵討之仲和嬰城固守信夜令諸將以衝梯攻其東北信親帥壯士襲其西南遲明克之遲直吏切未明也天未明之時須已襲之事畢然後天明明遲於事耳又曰西魏末蠕蠕侵魏魏大將元纂禦之蠕蠕遂逃出塞纂令將于謹率二千騎追之至郁郅原前後十七戰盡降其眾率輕騎出塞覘賊屬鐵勒數千騎奄至謹以眾寡不敵退必不免乃散其眾騎使匿叢薄間又遣人升山指麾若分部軍眾者賊遙見雖疑有伏兵既恃其眾不以為慮乃進軍逼謹謹常乘駿馬一紫一騧賊先所識乃使二人各乘一馬突陣而出賊以為謹也皆爭逐之謹乃率餘軍擊其追騎賊遂奔走因得入寨又曰西魏末遣將史寧與突厥木汗可汗同伐吐谷渾俱會於青海寧謂木汗曰樹敦賀真二城是吐谷渾巢穴今若拔其本根餘種自然離散此上策也木汗從之即分為兩軍木汗從北道向賀真寧趣樹敦吐谷渾婆周王率眾逆寧寧擊斬之踰山履險遂至樹敦即吐谷渾之舊都多諸珍藏而其主先已奔賀真留其征南王及數千人固守寧進兵攻之偽退果開門逐之因廻兵奮擊門未及闔寧兵遂得入生獲其征南王俘虜男女財寶盡歸諸突厥又曰東魏西荊州為梁將曹義, WYG: ''}
