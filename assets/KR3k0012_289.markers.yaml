  - {type: variant, offset: 536, length: 0, content: '', WYG: 余公理自太行下河内隋將史祥討之軍於河陰久不得濟祥謂軍吏曰余公理輕而無謀才用素不足稱又新得志謂其衆可恃恃衆必驕且河北人先不習兵所謂擁市人而戰不足圖也乃令軍中修攻具攻河陽公理使諜知之果屯兵於陽内城以備祥祥於是艤船河南公理聚甲兵以當之祥乃簡精鋭於下流潛度公理率衆拒之祥至溴水湨古闃反兩軍相對公理未成列祥縱擊大破之又曰隋末李宻破宇文化及還其勁兵良馬多死隋將王充守東都欲乘其弊練精勇得二萬餘人馬千餘疋於洛水南宻軍偃師北山上時宻新得志於化及有輕充之心不設壁壘充夜遣三百餘騎潛入北山伏谿谷之中令軍士秣馬蓐食既而宵濟人奔馬馳遲明而薄宻出兵應之陣未成列而兩軍合戰其伏兵蔽山而上潛登北原乘高而下馳壓宻營營中大亂無能拒之者即入縱火宻軍大驚而潰唐書曰太宗屯虎牢}
