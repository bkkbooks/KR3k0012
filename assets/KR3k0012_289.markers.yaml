  - {type: variant, offset: 465, length: 739, content: 今者之還必莫能追躡我矣由是益懈不為營壘襃己先勒精銳伏北山中分據險阻邀其歸路乘其眾怠縱伏擊之盡獲其眾又曰東魏寇龍門屯軍蒲坂造三道浮橋渡河又遣其將竇泰趣潼關高敖曹圍洛州太祖出軍廣陽召諸將曰賊今椅吾三面又造橋於河示欲必渡是欲綴吾軍使竇泰得西入耳久與相持其計得行非良策也且歡起兵以來泰每為先驅其下多銳卒屢勝而驕今出其不意襲之必克克泰則歡不戰而自走矣諸將咸曰賊在近捨而遠襲事若差跌悔無及也太祖曰歡前襲關吾軍不過霸上今者大來兵未出郊賊顧謂吾但自守耳無遠鬭意又忸於得志有輕我之心乘此擊之何往不克賊雖造橋未能徑度比五日中吾取竇泰必矣公等勿疑庚戍太祖率騎六千還長安聲言欲保隴右辛亥謁渧而潛出軍癸丑旦至小關竇泰卒聞軍至惶懼依山為陣未及成列太祖縱兵擊破之盡俘其眾萬餘人斬泰傳首長安高敖曹適陷洛州執刺史泉企聞泰之歿焚輜重棄城走齊神武亦撤橋而退通典曰後周末隋文帝為丞相益州揔管王謙舉兵拒命隋文遣將梁睿討之進至龍門謙將趙儼秦會擁眾十萬據嶮為營周亘三十里睿令將士銜枚出間道四面奮擊破之王謙又令高阿郍壞達奚惎惎渠記切等以盛兵攻利州聞梁睿將至惎分兵據開遠睿顧謂將士曰此虜要欲遏吾兵勢吾當出其不意破之必矣遣一將趨劍閣一將指巴西一將水軍入嘉陵睿遣將分道攻惎自午及申破之惎奔歸于謙睿進逼成都謙令達奚惎城守親率精兵五萬背城結陣睿擊之謙不利將入城惎以城降謙將麾下三十騎遁走斬之又曰後周將法尚初自陳來歸陳將樊猛濟江討之法尚遣部曲督韓朗詐為背己奔于陳偽告猛曰法尚部兵不願降北人皆竊議盡欲叛還若得軍來必無鬭者自當於陣倒戈耳猛以為然引師急進法尚乃佯為畏懼自保於江曲猛陣兵挑戰法尚先伏輕舡於浦中又伏精銑於古村之北自張旗幟逆流拒之戰數合偽退登岸投古村猛捨舟逐之法尚又疾走行數里與村北軍合復前擊猛猛走退赴舡既而浦中伏舡取其舟楫建周旗幟猛, SBCK: ''}
