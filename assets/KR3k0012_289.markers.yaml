  - {type: variant, offset: 2847, length: 0, content: '', SBCK: 人先不習兵所謂擁市人而戰不足圖也乃令軍中修攻具攻河陽公理使諜知之果屯兵於陽内城以備祥祥於是􅋈舩河南公理聚甲以當之祥乃簡精銳於下流潛度公理率衆拒之祥至浿水浿古間切兩軍相對公理未成列祥縱擊大破之又曰隋末李密破宇文化及還其勁兵良馬多死隋將王充守東都欲乗其􅁦練精勇得二萬餘人馬千餘疋於洛水南密軍偃師北山上時密新得志於化及有輕充之心不設壁壘充夜遣二百餘􅀐潛入北山伏溪谷中令軍士秣馬蓐食旣而霄濟人奔馬馳遲明而薄密出兵應之陣未成列而兩軍合戰其伏兵蔽山而上潛登北原乗髙而下馳壓密營營中亂無能拒之者即入縱火密軍大驚而潰唐書曰太宗屯武牢竇建德悉衆而南陳兵於汜水王充將郭士衡陣於南}
  - {type: page-break, offset: 2847, content: '', id: KR3k0012_SBCK_289-3b}
  - {type: variant, offset: 2847, length: 0, content: '', krp: 人先不習兵所謂擁市人而戰不足圖也乃令軍中修攻具攻河陽公理使諜知之果屯兵於陽内城以備祥祥於是􅋈舩河南公理聚甲以當之祥乃簡精銳於下流潛度公理率衆拒之祥至浿水浿古間切兩軍相對公理未成列祥縱擊大破之又曰隋末李密破宇文化及還其勁兵良馬多死隋將王充守東都欲乗其弊練精勇得二萬餘人馬千餘疋於洛水南密軍偃師北山上時密新得志於化及有輕充之心不設壁壘充夜遣二百餘騎潛入北山伏溪谷中令軍士秣馬蓐食旣而霄濟人奔馬馳遲明而薄密出兵應之陣未成列而兩軍合戰其伏兵蔽山而上潛登北原乗髙而下馳壓密營營中亂無能拒之者即入縱火密軍大驚而潰唐書曰太宗屯武牢竇建德悉衆而南陳兵於汜水王充將郭士衡陣於南}
  - {type: variant, offset: 2848, length: 0, content: '', SBCK: 亘數里鼓譟請戰諸將大懼太宗數􅀐升髙丘安坐以望之謂諸將曰賊起山東未見大敵今度險而囂是無正令逼城而陣有輕我心我按兵不出彼廼氣衰陣乆卒飢􅀔將自退追而擊之何徃不尅吾與公等爲約必以午後破之如或不然寡人爲無謀矣建德乃遣兵渉汜水太宗令揔管王君廓以少擊之待河北馬渡方欲與戰建德列陣自辰至午士卒飢倦人皆坐列又爭飲水太宗乃令宇}
  - {type: page-break, offset: 2848, content: '', id: KR3k0012_SBCK_289-4a}
  - {type: variant, offset: 2848, length: 0, content: '', krp: 亘數里鼓譟請戰諸將大懼太宗數騎升髙丘安坐以望之謂諸將曰賊起山東未見大敵今度險而囂是無正令逼城而陣有輕我心我按兵不出彼廼氣衰陣乆卒飢勢將自退追而擊之何徃不尅吾與公等爲約必以午後破之如或不然寡人爲無謀矣建德乃遣兵渉汜水太宗令揔管王君廓以少擊之待河北馬渡方欲與戰建德列陣自辰至午士卒飢倦人皆坐列又爭飲水太宗乃令宇}
  - {type: variant, offset: 2849, length: 2, content: 帝患, SBCK: 士及將三百􅀐經賊陣之西馳而南上誡之曰賊􅀂不動汝冝引歸如覺動冝岀東面士及􅂊過賊衆果動逡廵欲退太宗曰可以擊也親率輕􅀐追而誘之衆軍継至建德廻師陣未及整列太宗先登以擊之所向皆靡俄而衆軍合戰囂塵四起太宗率史大奈程䶧金􅁗叔寳宇文歆等􅆞幡而入出}
  - {type: variant, offset: 2849, length: 2, content: 帝患, krp: 士及將三百騎經賊陣之西馳而南上誡之曰賊若不動汝冝引歸如覺動冝岀東面士及纔過賊衆果動逡廵欲退太宗曰可以擊也親率輕騎追而誘之衆軍継至建德廻師陣未及整列太宗先登以擊之所向皆靡俄而衆軍合戰囂塵四起太宗率史大奈程䶧金秦叔寳宇文歆等纏幡而入出}
