  - {type: variant, offset: 2939, length: 3, content: 高歡越, SBCK: 虜控􅁌鳴鏑弓馬是慿今雨弥時弧矢俱弊突厥人衆如鳥矢所介切羽我屋宿火食搶槊犀利料我之逸揣敵所勞此而不乗夫復何待今欲先令勁兵亂其陣乃率突􅀐驅其後虜俗進不相讓退不相救自以北澗谷深長時有一道魚貫以度因而迫之彼十萬􅀐坑穽中物耳追至黄河縱不盡擒必當十獲八九此曉兵者所以解諸君勿疑於是潛師夜出冒雨而進醜徒震駭因縱反間於突利恱而歸心二可汗内離頡利欲戰不可因請和而去又曰貞觀中􅂫定方率兵討突厥賀魯大雪平地二尺軍中咸請停兵􅃸晴定方曰虜恃雪深謂我不能前進必當憇息追之可及􅀂緩以縱之則漸逺難追省日兼功在此㪯也於是勒兵陵雪晝夜兼進所經收其人衆遂至􅀟河去賀魯所居二百餘里布陣長驅徑至金牙}
  - {type: page-break, offset: 2939, content: '', id: KR3k0012_SBCK_289-5a}
  - {type: variant, offset: 2939, length: 3, content: 高歡越, WYG: 虜控弦鳴鏑弓馬是憑今雨彌時弧矢俱弊突厥人衆如鳥鎩所介切羽我屋宿火食槍槊犀利料我之逸揣敵所勞此而不乘夫復何待今欲先令勁兵亂其陣乃率突騎驅其後虜俗進不相讓退不相救自此以北澗谷深長特有一道魚貫以度因而迫之彼十萬騎坑穽中物耳追至黄河縱不盡擒必當十獲八九此曉兵者所共解諸君勿疑於是潛師夜出冐雨而進醜徒震駭因縱反閒於突利悦而歸心二可汗内離頡利欲戰不可因請和而去又曰貞觀中蘇定方率兵討突厥賀魯大雪平地二尺軍中咸請停兵候晴定方曰虜恃雪深謂我不能前進必當憇息追之可及若緩以縱之則漸逺難追省日兼功在此舉也於是勒兵凌雪晝夜兼進所經收其人衆遂至雙河去賀魯所居二百餘里布陣長驅徑至金牙}
  - {type: page-break, offset: 2939, content: '', id: KR3k0012_WYG_289-8a, image: WYG0895/WYG0895-0528a.png}
  - {type: variant, offset: 2939, length: 3, content: 高歡越, krp: 虜控弦鳴鏑弓馬是慿今雨弥時弧矢俱弊突厥人衆如鳥矢所介切羽我屋宿火食搶槊犀利料我之逸揣敵所勞此而不乗夫復何待今欲先令勁兵亂其陣乃率突騎驅其後虜俗進不相讓退不相救自以北澗谷深長時有一道魚貫以度因而迫之彼十萬騎坑穽中物耳追至黄河縱不盡擒必當十獲八九此曉兵者所以解諸君勿疑於是潛師夜出冒雨而進醜徒震駭因縱反間於突利恱而歸心二可汗内離頡利欲戰不可因請和而去又曰貞觀中蘇定方率兵討突厥賀魯大雪平地二尺軍中咸請停兵候晴定方曰虜恃雪深謂我不能前進必當憇息追之可及若緩以縱之則漸逺難追省日兼功在此㪯也於是勒兵陵雪晝夜兼進所經收其人衆遂至雙河去賀魯所居二百餘里布陣長驅徑至金牙}
  - {type: variant, offset: 2943, length: 0, content: '', SBCK: 賀魯牙帳時賀魯集衆欲獵定方縱兵擊之盡破其牙帳生擒數萬人賀魯脫走投石國定方於是悉命諸部歸其所居埋瘞骸骨存問疾苦復其産業賀魯所虜掠者悉撿責還之於是西域諸國安堵如故令副將蕭嗣業徃石國以追賀魯遂擒歸于京師又曰貞觀中突厥諸部離叛朝庭將圖進取以李靖爲代州道行軍揔管率驍􅀐三千自馬邑出其不意直趨惡陽嶺以逼之突利可汗不虞於靖見官軍掩至相謂曰唐兵􅀂不傾國而來靖豈􅀌軍而至一日數驚四年靖進擊定襄城破之突厥諸部落並走磧北突利可汗來奔又曰貞觀中吐谷渾㓂邊以李靖爲西海道行軍大揔管統兵部尚書侯君集刑部尚書任城王道宗等五揔管征之軍次伏埃城吐谷渾燒去野草以餧我師退保大非川諸將咸言春草未生馬巳羸疲不可赴敵唯靖決計而進深入敵境遂踰積石山前後戰數十合殺傷甚衆大破其國又曰武德中突厥突利頡利二可汗到原州太宗率兵拒之兩陣將交太宗以數􅀐岀謂之曰不念昔者香火之言乃來相侵知二可汗外同内異故以此言疑之頡利見太宗輕岀又聞香火之言乃隂猜突利因遣使曰王不須慮我無惡意更欲與王自斷當耳於是歛軍引却又曰貞觀中北狄鐡勒薛延陀發同羅㒒骨廻紇等衆合二十萬}
