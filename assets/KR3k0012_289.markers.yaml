  - {type: variant, offset: 3275, length: 0, content: '', WYG: 賊勢迫矣悉衆而出利在一戰今日破之其後不能出矣乃令屈突通率歩卒五千度水布陣以當之因戒通曰待兵交即放煙吾當率馬軍南下兵纔接太宗以騎衝之挺身先進表􅂻賊勢衆殊死戰散而復合者數焉地既險隘賊多􅀈䂎䂎鋋也􅀈算也騎戰稍難太宗親自射之莫不應弦而倒辰起及午賊衆始退因乗之迫於城塹俘斬七千人自是不敢復出又曰}
