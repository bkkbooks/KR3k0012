  - {type: variant, offset: 1633, length: 1192, content: 之所以制勝諸將皆以為非所及又曰後周將達奚長儒圍陳將吴明徹於呂梁陳遣驍將劉景率勁勇七千來為聲援長儒於是取車輸數百繫以大石沉之清水連轂相次以待景軍景至舡盤礙輪不得進長儒乃縱奇兵水陸俱發大破因檎明徹又曰後周遣將率突厥之眾逼齊晉陽齊將叚韶禦之時大雪之後周人以步卒為前鋒從西山而下去城二里諸將咸欲逆擊之韶曰步人氣力勢自有限今積雪既厚逆戰非便不如陣以待之彼勞我逸破之必矣既而交戰大破之敵前鋒盡殪無復孑遺自餘通宵奔遁又曰後周遣將計高圍洛齊將叚韶禦之韶登邙坂聊欲觀周軍形勢至太和谷便值周軍即遣馳告諸營與諸將結陣以待之周軍以步人在前上逆戰韶以彼徒我騎且却且引待其力弊乃遣下馬擊之短兵始交周人大潰洛城之圍並即奔遁又曰西魏末岷州羗據州城反魏將獨孤信討之勒兵向萬年頓三交谷口賊併力拒守信因詭道趨綢松嶺綢直由切賊不虞信兵之至觀風奔潰乘勝逐北徑至城下賊出降又曰西魏末涼州刺史宇文仲和據州不受代魏將獨孤信率兵討之仲和嬰城固守信夜令諸將以衝梯攻其東北信親帥壯士襲其西南遲明克之遲直吏切未明也天未明之時須已襲之事畢然後天明明遲於事耳又曰西魏末蠕蠕侵魏魏大將元纂禦之蠕蠕遂逃出塞纂令將于謹率二千騎追之至郁郅原前後十七戰盡降其眾率輕騎出塞覘賊屬鐵勒數千騎奄至謹以眾寡不敵退必不免乃散其眾騎使匿叢薄間又遣人升山指麾若分部軍眾者賊遙見雖疑有伏兵既恃其眾不以為慮乃進軍逼謹謹常乘駿馬一紫一騧賊先所識乃使二人各乘一馬突陣而出賊以為謹也皆爭逐之謹乃率餘軍擊其追騎賊遂奔走因得入寨又曰西魏末遣將史寧與突厥木汗可汗同伐吐谷渾俱會於青海寧謂木汗曰樹敦賀真二城是吐谷渾巢穴今若拔其本根餘種自然離散此上策也木汗從之即分為兩軍木汗從北道向賀真寧趣樹敦吐谷渾婆周王率眾逆寧寧擊斬之踰山履險遂至樹敦即吐谷渾之舊都多諸珍藏而其主先已奔賀真留其征南王及數千人固守寧進兵攻之偽退果開門逐之因廻兵奮擊門未及闔寧兵遂得入生獲其征南王俘虜男女財寶盡歸諸突厥又曰東魏西荊州為梁將曹義宗所圍東魏召人赴救慕容儼應募赴之時東魏北淯太守宋帶劍謀叛淯音育儼乃輕騎出其不意直至城語云大軍已到太守何不出迎帶劍造次惶恐不知所為便出迎儼即執之一郡遂定又曰東魏初齊神武破爾朱兆兆奔保秀容分兵守險出入鈔掠神武每揚聲云欲討之師出復止如此者數四神武揣兆歲首必應會飲使將竇泰率精騎先一日一夜行三百里兆軍人因宴休墯忽見泰軍莫不奪氣因而剋之又曰東魏將齊神武率兵伐西魏大軍濟河集諸將議進趣之計斛律羌舉曰宇文黑獺雖聚凶黨強弱可知若固守無糧援可恃今揣其情以同困獸若不然其戰而逕趣長安空虛可不戰而剋拔其根本彼無所歸則黑獺之首懸於軍門矣諸將議有同遂戰於渭曲大敗而歸齊神武違之故敗也又曰東魏末齊神武薨子澄立侯景叛歸梁而圍彭城澄遣慕容紹宗討之將戰紹宗以梁人剽悍恐其眾之撓也一一引將卒而誑之曰我當佯退誘梁人使前汝可擊之皆申明誡之景又命梁人逐北勿過二里會戰紹宗實敗走梁人不用景言乘敗深入魏人以紹宗言為信爭共掩擊遂, SBCK: ''}
