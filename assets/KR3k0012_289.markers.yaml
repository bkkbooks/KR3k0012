  - {type: variant, offset: 152, length: 2, content: 加侍, SBCK: 又曰長孫晟討突厥逹頭晟進䇿曰突厥飲泉易可行毒因取諸藥毒水上流逹頭人畜飲之多死於是大驚曰天雨惡水其亡我乎因夜遁晟追之斬首千餘級又曰髙熲獻取陳之䇿曰江北地寒田收差晚江南土􅀬水田早熟量彼收穫之際徴集士馬聲言掩襲必屯兵禦守足得廢其農時彼旣聚兵我便解甲再三􅀂此賊以爲常後雖集兵彼必不信持疑之頃我乃濟師登陸而戰兵氣益壯文帝行其䇿陳人益􅁦又曰賀􅀂弼鎭淮南先是弼請縁江防人毎交代之際必集歷陽於是大列旗幟營幕􅀍野陳人以爲大兵至悉發國}
