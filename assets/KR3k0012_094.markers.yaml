  - {type: variant, offset: 3699, length: 255, content: 文皇帝諱丕字子桓武帝太子太祖崩嗣位為丞相魏王延康元年十月升壇即祚改延康為黃初以荊楊江表八郡為荊州孫權領牧故也荊州江北諸郡為郢州權破劉備於夷陵初帝聞備兵東下與權交戰樹柵連營七百餘里謂群臣曰備不曉兵豈有七百里營可以拒敵者乎孫權叛帝自許昌南征諸軍兵並進權臨江拒守幸廣陵故城臨江觀兵戎卒十餘萬旌旗數百里是歲大寒冰舟不得入江乃引還七年春將幸許昌許昌城南門無故自崩帝心惡之還洛陽宮五月帝崩于嘉福殿時年四十帝好文學以著述為務自所勒成垂百篇又使諸儒撰集經傳隨類相從凡千餘篇號曰皇覽魏書曰帝生時有雲氣青色而圓如車蓋當其上終日望氣, WYG: 古}
