  - {type: variant, offset: 721, length: 7, content: 拜公司空行車騎, WYG: 嘗從文帝獵見鹿子母文帝射殺鹿母詔明帝射鹿子明帝曰陛下已殺其母臣不忍殺其子因涕泣文帝即放弓箭以此深竒之而建樹之意定矣廢帝齊王芳魏志曰齊王諱芳字蘭卿明帝無子養王及秦王詢宫省事祕莫有知其所由來者魏氏春秋曰或云任城王楷子也青龍三年立為齊王景初三年正月明帝病甚乃立為皇太子是日即皇帝位二月西域重譯獻火浣布詔大}
