  - {type: variant, offset: 730, length: 4, content: 公圍張繡, WYG: 太尉臨試以示百僚帝加元服賜羣臣各有差大將軍司馬景王將謀廢帝以聞皇太后太后今曰皇帝芳春秋已長不親萬幾耽淫内寵沈漫女德日延倡優縱其醜謔日迎六宫家人畱止内房毁人倫之叙亂男女之節恭孝日虧悖傲滋甚不可以承天叙奉宗廟遣芳歸藩}
