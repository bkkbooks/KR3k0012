  - {type: variant, offset: 720, length: 0, content: '', WYG: 姿秀出立髮委地口吃少言而沈毅好斷初諸公受遺輔導帝皆以方位處之政自已出而優禮大臣開容善直雖犯顔極諫無摧戮也其君人之量如此之偉然不思建德垂風不固維城之基至使大權偏據社稷無衛悲夫魏畧曰明帝欲平北邙令登臺見孟津辛毗諫曰若九河溢涌洪水為害丘陵皆夷何以禦之帝乃止魏末傳曰初帝為平原王母甄后妬文帝殺之故不立為太}
