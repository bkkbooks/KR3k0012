  - {type: punctuation, offset: 2761, content: ，, id: KR3k0012_CHANT_094-bkkpn643}
  - {type: 'tls:seg', offset: 2761, content: '', id: KR3k0012_CHANT_094-5a.4}
  - {type: variant, offset: 2761, length: 4, content: 追尊號謚, WYG: 崩諡}
  - {type: variant, offset: 2766, length: 928, content: 武皇帝廟號曰太祖曹瞞傳曰操少好飛鷹走狗遊蕩無度其叔父數言之於嵩操患之後逢叔父於路及陽敗面喎口叔父怪問其故太祖曰卒中惡風叔父以告嵩嵩驚愕呼操而口貌如故嵩問曰叔父言汝中風已差乎操曰初不中風但失愛於叔父故見罔耳嵩乃疑焉自後叔父有所告嵩終不復信操於是益得肆意及為洛陽北部尉初入尉廨繕治四門造五色棒懸門左右各十餘枚有犯禁者不問豪強皆棒殺後數月靈帝愛幸小黃門蹇碩叔父夜行即殺之京師歛跡莫敢犯者近習寵臣咸疾之然不能傷於是共稱薦操故遷為頓丘令操為人輕易無威重好音樂倡優在側但以日達夕被服輕綃身自佩小盤囊以盛手巾細物時或冠袷帽以見賓客每與人談論戲弄言辭盡無所隱及恍大笑至以頭投杯案中餚膳皆沾污巾幘其輕易如此然持法峻刻諸將計畫勝出己者隨以法誅之及故人舊惡亦皆無餘其所刑殺輒對之垂涕嗟痛之終無所活嘗出軍行經麥中令士卒無敗麥犯者死騎士皆下馬指麥以相付時操馬騰入麥中勑主簿議罪主簿對以春秋之義罰不加尊操曰制法而自犯之何以帥下然孤為軍帥不可殺請自刑因拔刀割髮以置地世語曰魏武將見匈奴自以形陋不足雄遠國使崔季珪代帝自捉刀立床頭既畢令間諜謂曰魏王何如匈奴使荅曰王雅望非常然床頭捉刀人此乃英雄也魏王聞之馳遣殺此使愽物志曰漢世安平崔瑗瑗子寔弘農張芝芝弟昶並善草書而太祖亞焉桓譚蔡邕善音樂馮翊山子道王九真郭凱等善圍碁太祖皆與埒能又好養性法亦解方藥招引方術之士廬江左慈譙郡華他甘陵甘始陽城郄儉無不畢至又習噉野葛至一尺亦得少少飲鴆酒世說曰魏武帝嘗過曹娥碑不解楊脩讀碑背上題云黃絹幼婦外孫虀曰魏武謂脩曰卿解未可言待我思之行三十里魏武曰吾已得令脩別記所知修曰黃絹色絲也於字為絕幼婦少女也於字為妙外孫女子也於字為好虀曰受辛也於字為辭所謂絕妙好辭武帝亦記之與脩言同帝歎曰我才不如卿乃較三十里唐太宗皇帝祭魏武帝文曰夫大德曰生資二儀以成化大寶曰位應五運而昌貴賤廢興莫非天命故龍顏日角顯帝王之符電影虹光表乾坤之瑞不可以智競不可以力爭昔漢室三分群雄並立夫民離政亂安之者哲人德喪時危定之者賢輔伊尹之匡殷室王道昏而復明霍光之佐漢朝皇綱否而還泰立忠履節爰在於斯帝以雄武之姿常艱難之運棟梁之任同乎曩時匡正之功異乎往代觀沉溺而不拯視顛覆而不持乖徇國之情有無君之跡既而三分肇慶黃星之應久彰五十啟期真人之運斯屬其天意也豈人事乎文, WYG: 元}
