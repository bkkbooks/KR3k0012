  - {type: variant, offset: 2435, length: 317, content: 變化如神自作兵書十餘萬言諸將征伐皆以新書從事臨時又手為節度從令者剋捷違教者負敗與虜對陣意思安閑如不欲戰然及至決機乘勝氣勢盈溢故每戰必克知人善察難眩以偽拔于禁樂進於行陣之間取張郃徐晃於亡虜之中皆佐命立功列於名將其餘拔出細微登為牧守者不可勝數是以創造大業文武並施御軍三十餘年手不捨書晝則講軍策夜則思經傳登高必賦乃造新詩被之管絃皆成樂章才力絕人手射飛鳥躬擒猛獸嘗於南皮一日射雉獲六十三頭及造作宮室繕治器械無不為之法則皆盡其意雅性節儉不好華麗後宮不衣錦繡侍御履不二綵帷帳屏風壞則補納茵蓐取溫無有緣飾攻城拔邑得靡麗之物則悉以賜有功勳勞宜賞不恡千金無功望施分毫不與四方獻御與群下共之常以禮送終之制襲稱之數繁而無益俗又過之故豫自為制終云衣服四篋而已, WYG: ''}
