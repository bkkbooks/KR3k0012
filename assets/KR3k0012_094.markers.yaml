  - {type: variant, offset: 3936, length: 0, content: '', SBCK: 數歳而有􅄮嶷之姿武皇帝異之曰我基於爾三世矣每朝讌㑹同與待中近臣並列帷幄好學多識特留心於法理容止可觀望之儼恪即位之後容受直言聽受吏民士卒上書一月之中至數十百封雖文辭鄙陋猶覽省究意無厭倦又曰青龍三年起太極諸殿築㹅章觀髙十餘丈建翔鳯於其上又於芳林園中起陂池檝櫂越歌又於列殿之北立八坊諸才人以次弟序處其中貴人夫人巳上轉南附焉其秩名擬百官之數帝常遊宴在内乃選女子知書可附信者六人以爲女尚書使典省外奏事處分當畫可自貴人巳下至尚保及給掖庭洒掃習伎歌者各有千數通引榖水過九龍前玉井綺蘭蟾蠩含受神龍吐出使􅀶士馬均作司南車水轉百戯歳首建巨獸魚龍曼延弄馬倒􅀐備如漢西京之制築閶闔諸門外罘音浮罳音思太子舎人張茂以吴蜀數動諸將出征而帝盛興宫室留意於玩飾賜與无度帑藏空竭乃上書諌之魏氏春秋曰魏明帝天姿秀出立髮委地口吃少言而沉毅好斷􅀄諸公受遺輔導帝皆以方位處之政自己出而優禮大臣開容善直雖犯顔極諌無摧戮也其君人之量如此之偉然不思建徳垂風固維城之基至使大權偏據社稷無衛悲夫魏略曰明帝欲平北邙令登臺見孟津辛毗諌曰􅀂九河溢涌洪水爲害丘陵皆夷何以禦之帝乃止魏末􅀓曰􅀄帝爲平原王母甄后妬文帝殺之故不立爲太子甞從帝獵見鹿子母帝射殺鹿母詔明帝射鹿子明帝曰陛下巳殺其母臣不忍殺其子因涕泣文帝即放弓箭以此􅀷竒之而建樹之意定矣廢帝齊王芳魏志曰齊王諱芳字蘭卿明帝無子養王及􅁗王詢宫省事祕莫有知其所由夾者魏氏春秋曰或云任城王楷子也青龍三年立爲齊王景􅀄三年正月明帝病甚乃立爲皇太子是月即皇帝位二月西域重譯獻火浣布詔大將軍太尉臨試以示百僚帝加元服賜羣臣各有差大將軍司馬景王將謀廢帝以聞皇太后太后令曰皇帝芳春秋巳長不親萬機躭􅁋内寵沉漫女德曰延倡優縱其醜謔延六宫家人留止内房毁人倫之叙亂男女之節恭孝日虧悖傲滋甚不可以承天叙奉宗廟遣芳歸藩于齊以避皇位是日遷居别宫時年二十三使者持節送衛營齊王宫於河内之重門制度皆如藩國之禮魏略曰景王將廢帝遣郭芝入白太后后與帝對坐芝謂帝曰大將軍欲廢陛下立彭城王據帝乃起去太后不恱芝曰太后有子不能教令太將軍章巳成又勒兵在外以備非常但當從旨將復何言太后曰我欲見大將軍口有所說芝曰何可見耶但當速取璽綬太后意折乃遣傍御取璽綬着坐側芝出報景王景王甚懽又遣使者授齊王印綬當出就西宫帝受命遂載王車與太后別垂涕始從太極殿南出群臣送者數千人太尉司馬孚悲不自勝餘多流涕王出後景王又使使者請璽綬太后曰彭城王我之季也今未立我當何之且明帝當􅅸嗣乎吾以爲髙貴郷公睿文皇帝之長孫明皇帝之弟子於禮小宗有後太宗之義其詳議之景王乃更召羣臣以皇太后令示之乃定迎髙貴郷公是時太常以發二日待璽綬於温事定又請璽綬太后令曰我見髙貴郷公小時識之明日我自欲以璽綬手授之魏丗譜曰晉受禪封齊王爲邵陵公年四十三太始十年薨謚曰厲公廢帝髙貴郷公魏志曰髙貴郷公諱髦字彦士文帝孫東海定王彬子也正始五年封郯縣髙貴郷公少好學夙成齊王廢公卿議立公十月公至于􅀇武館羣臣奏請舎前殿公以先帝舊處避止西廂羣臣又請以法駕迎公不聽丙寅公入于洛陽羣臣迎拜西掖門南公下與將荅拜儐者請曰儀不拜公曰吾人臣也遂荅拜至止車門下輿左右曰舊乗輿入公曰吾􅀍皇太后徴未知所爲遂歩至太極東堂見于太后是日即皇帝位百僚陪位者欣欣焉甘露元年夏四月幸太學問諸儒曰聖人幽賛神明仰觀俯察始作八卦後聖重之爲六十四立爻以極數凡斯大義罔有不備而夏有連山殷有歸藏周曰周昜昜之書其故何也昜愽士淳于俊對曰庖犧因燧皇之圖而制八卦神農演之爲六十四黄帝堯舜通其變三代隨時質文各繇其事故昜者變昜也名曰連山似山出納雲氣連天地也歸藏者萬事莫不歸藏於其中也帝又曰􅀂使庖犧因燧皇而作昜孔子何以不云燧人氏没庖犧氏作乎俊不能荅講昜畢復命講尚書帝問曰鄭玄云稽古同天言堯同於天也王肅云堯順考古道而行之二義不同何者爲是􅀶士􅁃峻對曰先儒所執各有乖異臣不足以定之然洪範稱三人占從二人之言賈馬及肅皆以爲順考古道以洪範言之肅義爲正帝曰仲尼言唯天爲大唯堯則之堯之大羙在乎則天順考古道非其至也今發篇義以明聖徳而舎其大更稱其細豈作者之意耶峻對曰臣奉遵師說未喻大義至於文質折中裁之聖思復命講禮記帝問曰太上立徳其次務施報爲治何由而教化各異皆脩何政而能致於立徳施而不報乎􅀶士馬照對曰太上立徳謂三皇五帝之丗以徳化民其次施報謂三王之丗以禮爲治也帝曰二者教化薄厚不同將主有優劣耶時使之然乎照對曰誠由}
