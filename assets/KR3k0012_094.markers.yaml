  - {type: variant, offset: 2103, length: 0, content: '', WYG: 優帝曰自古帝王功德言行互有高下未必創業者皆優紹繼者咸劣也湯武高祖雖俱受命賢聖之分所覺懸殊少康殷宗中興之美夏啓周成守文之盛論德校實方諸漢祖吾見其優未聞其劣顧所遇之時殊故所名之功異爾少康生於滅亡之後降為諸侯之𨽻﨑嶇逃難僅以身免能布其德而兆其謀卒滅過戈克復禹績祀夏配天下不失舊物非至德宏仁豈濟斯勲漢祖因土崩之山勢仗一時之權專任智力以成功業行事動靜多違聖檢為人子則數危其親為人君則囚繫賢相為人父則不能衞子身没之後社稷幾傾若與少康易時而處或未能復大禹之績也推此言之宜高夏康而下漢祖矣漢晉陽秋曰帝見威權日去不勝其忿乃召侍中王沈尚書王經散騎常侍王業謂曰司馬昭之心路人所知也吾不能坐受廢辱今日當與卿自出討之王經曰昔魯昭公不忍季氏敗走失國為天下笑今權在其門久矣朝廷四方皆為之致死不顧逆順之理非一日也且宿衞空闕兵甲寡弱陛下何所資用而一旦如此無乃欲疾除而更深之耶禍殊不測宜見重詳帝乃出懷中板令投地曰行之決矣正使死何所恨况不必死耶於是入白太后沈業奔走告文王文王為之備帝遂帥僮僕數百鼓譟而出文王弟屯騎校尉伷音胄入遇帝於東止車門左右呵之伷衆奔走中護}
