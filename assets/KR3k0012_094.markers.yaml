  - {type: variant, offset: 365, length: 302, content: 誅暴亂大眾已合諸君何疑向使卓聞山東兵起倚王室之重據二周之險東向以臨天下雖以無道行之猶足為患今焚燒宮室劫遷天子海內震動不知所歸此天亡之時也一戰而天下定矣不可失也遂引兵西據成皋到滎陽汴水遇卓將徐榮與戰不利士卒死傷甚多太祖為流矢所中乘馬被瘡從弟洪以馬與太祖得去太祖兵少乃與夏侯惇等詣楊州募兵司徒王允與呂布共殺卓青州黃巾眾百餘萬人兗州劉岱欲擊之鮑信諫岱不從遂與戰果為賊所殺信乃迎太祖領兗州牧遂進兵擊黃巾追至濟北乞降各受降卒三十餘萬男女百餘萬口收其精銳者號青州兵天子拜太祖兗州牧是歲長安亂天子東遷敗於曹陽渡河幸安邑太祖軍臨武迎天子假太祖節鉞錄尚書事獻帝記曰又領司隸校尉洛陽殘破董昭等勸太祖都許車駕出轘轅而東以太祖為, SBCK: 爲}
