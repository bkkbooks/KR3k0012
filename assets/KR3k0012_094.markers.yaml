  - {type: variant, offset: 58, length: 178, content: 常侍大長秋封費亭侯養子嵩嗣官至太尉莫能審其生出本末曹瞞傳及郭頒世語並云嵩夏侯氏子夏侯惇之叔父太祖於惇為從父兄弟也嵩生太祖太祖少機警有權數而任俠放蕩不治行業故世人未之奇也唯梁國橋玄南陽何顒異焉玄謂太祖曰天下將亂非命世之才不能濟也能安之者其在君乎年二十舉孝廉為郎除洛陽北部尉遷頓丘令徵拜議郎光和末黃巾起拜騎都尉討潁川賊遷為濟南相國有十餘縣長吏多阿附貴戚贓污狼籍, SBCK: 幸陂觀龍}
