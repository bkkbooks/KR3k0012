  - {type: variant, offset: 3948, length: 0, content: '', krp: 云何充曰今日之事無所問也濟即前刺帝刃出於背文王聞大驚自投於地曰天下}
  - {type: variant, offset: 3949, length: 1, content: 上, SBCK: 謂我何太傅孚奔徃枕帝股而哭哀甚殺陛下者臣之罪也葬髙貴郷公于洛陽西北三十里屈澗之濵下車數乗不設旌旐百姓相聚而觀之曰是前日所殺天子也或掩面而泣悲不自勝帝王世紀曰髙貴卿公爲太子舎人成濟所害年二十以公禮葬之陳留王魏志曰陳留王諱奐字景明武帝孫燕王宇之子也甘露三年封安次縣常道郷公髙貴郷公卒公卿議迎立公六月入于洛陽即皇帝位於太極前殿大赦改元景元四年詔伐蜀命征西將軍鄧艾督帥諸軍趣甘松沓中雍州刺史諸􅁑緒督諸軍趨武都髙樓首尾踧討􅀂擒姜維便當東西並進掃滅巴蜀也又命鎭西將軍鍾㑹由駱谷伐蜀所至輙克十一月蜀主劉禪降巴蜀皆平咸熈二年命􅀳王冕十有二旒建天子旌旗進王妃爲王后丗子爲太子八月相國晉王薨太子炎紹封襲位㹅攝百揆十二月禪位于晉改次于金墉城而}
