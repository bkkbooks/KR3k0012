  - {type: variant, offset: 1017, length: 391, content: 事遟必不動也遂破備備奔紹紹遣郭圓淳于瓊顏良等攻劉延於白馬紹引兵至黎陽公於是救延荀攸說公曰今兵少不敵分其勢乃可公從之遂擊破斬良紹騎將文醜與劉備將五六千騎前後至公縱奇兵擊大破之斬醜良酸良皆紹名將再戰悉擒紹軍大震八月紹連營稍前進臨官渡起土山地道公亦於內作之以相應紹射營中矢如雨下行者皆蒙楯眾大懼時公糧少與荀或書議欲還許或以為紹悉眾臨官渡欲與公決勝敗公以至弱當至強若不能制必為所乘是天之大機也公與紹相距連月雖比戰斬將然眾少糧盡士卒疲乏公謂運者曰十五日為汝破紹不復勞汝矣冬十月紹遣車運穀使淳于瓊等五人將兵萬餘人逆之宿紹軍營北四十里紹謀臣許攸貪財紹不能足來奔因說公擊瓊等左右疑之荀攸賈詡勸公公乃留曹洪守自將步騎五千人夜往會明至瓊等望見公兵少出陣門外公急擊之瓊退保營遂攻之紹遣騎救瓊左右或言賊稍近請分兵距之公怒曰賊在背後乃白士卒皆殊死戰大破瓊等皆斬之紹初聞公擊瓊謂長子譚曰就彼破瓊等吾攻拔其營彼固, SBCK: 君}
