  - {type: variant, offset: 717, length: 8, content: 讓紹天子拜公司空, SBCK: 必制之吾無憂矣遂進軍幸夀春録諸將功封賞各有差八月大曜兵饗六軍遣使者持節犒勞合肥夀春諸軍}
  - {type: variant, offset: 717, length: 2, content: 讓紹, WYG: 必制之吾無憂矣遂進軍幸壽春録諸將功封賞各有差八月大耀兵饗六軍遣使者持節犒勞合肥壽春諸軍辛巳行還許昌宫司馬宣王與亮相持連圍積日亮數挑戰宣王堅壘不應㑹亮卒其軍退還景初元年泰山茌縣言黃龍見茌仕俚反於是有司奏以為魏得地統宜以建丑之月為正月定厯改元為孟夏四月服色尚黃犧牲用白戎車乗黑首白馬建大赤之旗朝㑹建太白之旗改太和厯為景初厯其春夏秋冬孟仲季月雖與正歲不同至於郊祀迎氣礿祠蒸嘗巡狩蒐田分至啓閉班宣時令中氣早晩敬授民事皆以正歲斗建為厯數之序二年十二月帝寢疾不豫太尉宣王還至河内帝驛馬召到引入卧内執其手謂曰吾疾甚以後事屬吾君君其與爽輔少子吾得見君無所恨矣宣王頓首流涕即日帝崩於嘉福殿年三十六葬高平陵魏書曰帝生數歲而有岐嶷之姿武皇帝異之曰我基於爾三世矣毎朝讌㑹同與侍中近臣並列帷幄好學多識特畱心於法理容止可觀望之儼恪即位之後容受直言聽受吏民士卒上書一月之中至數十百封雖文辭鄙陋猶覽省究意無厭倦又曰青龍三年起太極諸殿築總章觀高十餘丈建鳳翔於其上又於上林囿中起陂池楫櫂越歌又於列殿之北立八坊諸才人以次第序處其中貴人夫人已上轉南附焉其秩名擬百官之數帝常遊宴在内乃選女子知書可附信者六人以為女尚書使典省外奏事處分當畫可自貴人已下至尚保及給掖庭洒掃習伎歌者各有千數通引縠水過九龍前為玉井綺欄蟾蜍含受神龍吐出使博士馬均作司南車水轉百戲歲首建巨獸魚龍曼延弄馬倒騎備如漢西京之制築閶闔諸門闕外罘音浮罳音思太子舍人張茂以吳蜀數動將出征而帝盛興宫室畱意於玩飾賜與無度帑藏空竭乃上書諫之魏氏春秋曰魏明帝}
