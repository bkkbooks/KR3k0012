  - {type: variant, offset: 1366, length: 357, content: 賊在背後乃白士卒皆殊死戰大破瓊等皆斬之紹初聞公擊瓊謂長子譚曰就彼破瓊等吾攻拔其營彼固無所歸矣乃使張郃高覽攻曹洪郃等聞瓊破遂來降紹眾大潰紹及譚棄軍走渡河追之不及盡收其輜重圖書珍寶盧其眾公收紹書中得許下及軍中人書皆焚之紹自軍破後發病歐血死小子尚代譚自號車騎將軍屯黎陽秋公征之連戰譚尚數敗退固守攻其郭乃出戰擊大破之譚尚夜遁譚尚爭冀州譚為尚所敗走保平原尚攻之急譚遣辛毗乞降請救諸將皆疑荀攸勸公許之公乃引軍到黎陽為子整與譚結婚尚聞公北乃釋平原還鄴公進軍攻鄴尚懼乞降公不許為圍益急尚夜遁眾大潰尚走中山盡獲其輜重得尚印綬節鉞鄴定公臨祠紹墓哭之流涕慰勞紹妻還其家人寶物賜之雜繒絮廩食之天子以公領冀州牧公讓還兗州公之圍鄴也譚略取甘陵安平渤海河間尚敗還中山譚攻之尚奔固安遂并其眾公遺譚書責以負約與之絕婚女還然後進軍譚懼拔平原走保南皮公, WYG: 舊乗輿}
