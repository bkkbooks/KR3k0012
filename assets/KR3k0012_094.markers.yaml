  - {type: variant, offset: 4252, length: 244, content: 歲乘馬得脫夫文武之道各隨時而用生乎中平之季長於戎旅之間是以少好弓馬于今不衰逐禽輒十里馳射常百步日夕體倦心每不厭建安十年始定冀州穢貊獻良弓燕岱獻名馬時歲之暮春勾芒司節和風扇物弓燥手柔草淺獸肥與族兄弟同獵於鄴西終日獲麞塵鹿九雉兔二十後軍南征次曲蠡尚書令荀彧奉使犒軍見余談論之末或言聞君善左右射此實難能余言執事未覩夫項發口縱俯馬蹄而仰月支也彧喜笑曰乃爾余曰射有常徑的有常所雖每發輒中非至妙也若夫馳平原赴豊草要狡獸截輕禽使弓不虛彎所中必洞胸斯則妙矣時軍祭酒張京在坐顧彧俱拊手曰善余又好擊劍閱師多矣, SBCK: ''}
