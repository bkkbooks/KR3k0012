  - {type: variant, offset: 2108, length: 1777, content: 會戰先輕兵挑之戰良久乃縱虎騎夾擊大破之斬成宜李堪等超走涼州楊秋奔安定關中平天子命公贊拜不名入朝不趨劍履上殿加蕭何故事使御史大夫郗慮持節策命公為魏公始建魏社稷宗廟天子娉公三女為貴人又命公置旄頭宮殿設鍾簴又命公承制封拜諸侯守相冬十月始置名號侯至五大夫與舊列侯關內侯凡六等以賞軍功又進公爵為王設天子旌旗出入稱警蹕王崩于洛陽時年六十六謚曰武葬高陵又曰漢桓帝時有黃星見於楚宋之分遼東商馗善天文言後五十歲當有真人起於梁沛之間其鋒不可當至破袁紹之歲凡五十年天下莫敵矣魏書曰漢末太祖拒董卓命歸鄉里過故人成皋呂伯奢伯奢不在其子八人備賓主之禮太祖自以背卓聞其食器聲以為圖己夜殺八人而去既而歎曰寧我負人無人負我又曰太祖自御海內芟夷群醜其行軍用師大較依孫吳之法而因事設奇量敵制勝變化如神自作兵書十餘萬言諸將征伐皆以新書從事臨時又手為節度從令者剋捷違教者負敗與虜對陣意思安閑如不欲戰然及至決機乘勝氣勢盈溢故每戰必克知人善察難眩以偽拔于禁樂進於行陣之間取張郃徐晃於亡虜之中皆佐命立功列於名將其餘拔出細微登為牧守者不可勝數是以創造大業文武並施御軍三十餘年手不捨書晝則講軍策夜則思經傳登高必賦乃造新詩被之管絃皆成樂章才力絕人手射飛鳥躬擒猛獸嘗於南皮一日射雉獲六十三頭及造作宮室繕治器械無不為之法則皆盡其意雅性節儉不好華麗後宮不衣錦繡侍御履不二綵帷帳屏風壞則補納茵蓐取溫無有緣飾攻城拔邑得靡麗之物則悉以賜有功勳勞宜賞不恡千金無功望施分毫不與四方獻御與群下共之常以禮送終之制襲稱之數繁而無益俗又過之故豫自為制終云衣服四篋而已帝王世紀曰黃初元年追尊號謚曰武皇帝廟號曰太祖曹瞞傳曰操少好飛鷹走狗遊蕩無度其叔父數言之於嵩操患之後逢叔父於路及陽敗面喎口叔父怪問其故太祖曰卒中惡風叔父以告嵩嵩驚愕呼操而口貌如故嵩問曰叔父言汝中風已差乎操曰初不中風但失愛於叔父故見罔耳嵩乃疑焉自後叔父有所告嵩終不復信操於是益得肆意及為洛陽北部尉初入尉廨繕治四門造五色棒懸門左右各十餘枚有犯禁者不問豪強皆棒殺後數月靈帝愛幸小黃門蹇碩叔父夜行即殺之京師歛跡莫敢犯者近習寵臣咸疾之然不能傷於是共稱薦操故遷為頓丘令操為人輕易無威重好音樂倡優在側但以日達夕被服輕綃身自佩小盤囊以盛手巾細物時或冠袷帽以見賓客每與人談論戲弄言辭盡無所隱及恍大笑至以頭投杯案中餚膳皆沾污巾幘其輕易如此然持法峻刻諸將計畫勝出己者隨以法誅之及故人舊惡亦皆無餘其所刑殺輒對之垂涕嗟痛之終無所活嘗出軍行經麥中令士卒無敗麥犯者死騎士皆下馬指麥以相付時操馬騰入麥中勑主簿議罪主簿對以春秋之義罰不加尊操曰制法而自犯之何以帥下然孤為軍帥不可殺請自刑因拔刀割髮以置地世語曰魏武將見匈奴自以形陋不足雄遠國使崔季珪代帝自捉刀立床頭既畢令間諜謂曰魏王何如匈奴使荅曰王雅望非常然床頭捉刀人此乃英雄也魏王聞之馳遣殺此使愽物志曰漢世安平崔瑗瑗子寔弘農張芝芝弟昶並善草書而太祖亞焉桓譚蔡邕善音樂馮翊山子道王九真郭凱等善圍碁太祖皆與埒能又好養性法亦解方藥招引方術之士廬江左慈譙郡華他甘陵甘始陽城郄儉無不畢至又習噉野葛至一尺亦得少少飲鴆酒世說曰魏武帝嘗過曹娥碑不解楊脩讀碑背上題云黃絹幼婦外孫虀曰魏武謂脩曰卿解未可言待我思之行三十里魏武曰吾已得令脩別記所知修曰黃絹色絲也於字為絕幼婦少女也於字為妙外孫女子也於字為好虀曰受辛也於字為辭所謂絕妙好辭武帝亦記之與脩言同帝歎曰我才不如卿乃較三十里唐太宗皇帝祭魏武帝文曰夫大德曰生資二儀以成化大寶曰位應五運而昌貴賤廢興莫非天命故龍顏日角顯帝王之符電影虹光表乾坤之瑞不可以智競不可以力爭昔漢室三分群雄並立夫民離政亂安之者哲人德喪時危定之者賢輔伊尹之匡殷室王道昏而復明霍光之佐漢朝皇綱否而還泰立忠履節爰在於斯帝以雄武之姿常艱難之運棟梁之任同乎曩時匡正之功異乎往代觀沉溺而不拯視顛覆而不持乖徇國之情有無君之跡既而三分肇慶黃星之應久彰五十啟期真人之運斯屬其天意也豈人事乎文皇帝魏志曰文皇帝諱丕字子桓武帝太子太祖崩嗣位為丞相魏王延康元年十月升壇即祚改延康為黃初以荊楊江表八郡為荊州孫權領牧故也荊州江北諸郡為郢州權破劉備於夷陵初帝聞備兵東下與權交戰樹柵連營七百餘里謂群臣曰備不曉兵豈有七百里營可以拒敵者乎孫權叛帝自許昌南征諸軍兵並進權臨江拒守幸廣陵故城臨江觀兵戎卒十餘萬旌旗數百里是歲大寒冰舟不得入江乃引還七年春將幸許昌許昌城南門無故自崩帝心惡之還洛陽宮五月, SBCK: ''}
