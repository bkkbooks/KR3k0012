  - {type: variant, offset: 3945, length: 0, content: '', SBCK: 主也鍾㑹對曰才同陳思武􅀋太祖景王曰􅀂如卿言社稷之福也甘露元年二月帝讌群臣於太極東堂與侍中荀顗尚書崔賛袁亮鍾毓中書令虞松等並講述禮典遂言帝王優劣之差帝慕顗有立因問顗等曰有夏旣衰后相殆滅少康収集夏衆復禹之績漢髙祖拔起壠􅅿驅帥豪雋芟夷􅁗項包舉宇内斯二主可謂殊才異略命世大賢者也考其功徳誰冝爲優顗等對曰夫天下重器王者天授徳應期運然後能受命創業至於階縁前緒興復舊績造之與復固難易不同少康功德雖羙猶爲中興之君與漢世祖同流可也至如髙祖臣等以爲優帝曰自古帝王功徳言行互有髙下未必創業者皆優紹繼者咸劣也湯武髙祖雖俱受命賢聖之分所覺懸殊少康殷宗中興之羙夏啓周成守文之盛論徳校實方諸漢祖吾見其優未聞其劣頋所遇之時殊故所名之功異爾少康生於滅亡之後降爲諸侯之􅀠﨑嶇逃難僅以身免能布其徳而兆其謀卒滅過戈克復禹績祀夏配天不失舊物非至徳􅀪仁豈濟斯勲漢祖因土崩之勢仗一時之權專任智力以成功業行事動静多違聖撿爲人子則數危其親爲人君則囚繫賢相爲人父則不能衛子身没之後社稷幾傾􅀂與少康易時而處或未能復大禹之績也推此言之冝髙夏康而下漢祖矣漢􅀳陽秋曰帝見威權日去不勝其忿乃召侍中王沉尚書王經散騎常侍王業謂曰司馬昭之心路人所知也吾不能坐受廢辱今日當與卿自出討之王經曰昔魯昭公不忍季氏敗走失國爲天下􅀏今權在其門乆矣朝廷四方皆爲之致死不顧逆順之理非一日也旦宿衛空闕兵甲寡弱陛下何所資用而一旦如此無乃欲除疾而更􅀷之耶禍殆不測冝見重詳帝乃出懷中板投地曰行决矣正使死何所恨况不死耶於是入白太后沉業奔走告文王爲之備帝遂帥僮僕數百鼔譟而出文王弟屯􅀐校尉伷音胄入遇帝於東止}
