  - {type: variant, offset: 1632, length: 390, content: 慰勞紹妻還其家人寶物賜之雜繒絮廩食之天子以公領冀州牧公讓還兗州公之圍鄴也譚略取甘陵安平渤海河間尚敗還中山譚攻之尚奔固安遂并其眾公遺譚書責以負約與之絕婚女還然後進軍譚懼拔平原走保南皮公入平原略定諸縣攻譚破之斬誅其妻子冀州平袁熙大將焦觸張南等叛攻熙尚熙尚奔三郡烏丸觸等舉其縣降封為列侯三郡烏丸承亂破幽州略有漢民合十餘萬戶初袁紹皆立其酋豪西單于蹹頓尤強為紹所厚故尚兄弟歸之數入塞為害公將征之鑿渠自呼陁入孤水名平虜渠引軍出盧龍塞外道絕不通乃壍山堙谷五百餘里經白擅歷平剛涉鮮卑庭東指柳城未至二百里虜乃知之尚熙與蹹頓遼西單于樓班右北平單于能臣抵之等將數萬騎逆軍登白狼山卒與虜遇眾甚盛公車重在後被甲者少左右皆懼公登高望虜陣不整乃縱兵擊之使張遼為先鋒虜眾大崩斬蹹頓及名王以下胡漢降者二十餘萬口初遼東太守公孫康恃遠不服及公破烏丸或說公遂征之尚兄弟可擒也公曰吾方使康斬送尚熙首不煩兵矣公引軍自柳城還康, SBCK: ''}
