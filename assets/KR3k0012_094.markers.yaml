  - {type: variant, offset: 2152, length: 219, content: 名入朝不趨劍履上殿加蕭何故事使御史大夫郗慮持節策命公為魏公始建魏社稷宗廟天子娉公三女為貴人又命公置旄頭宮殿設鍾簴又命公承制封拜諸侯守相冬十月始置名號侯至五大夫與舊列侯關內侯凡六等以賞軍功又進公爵為王設天子旌旗出入稱警蹕王崩于洛陽時年六十六謚曰武葬高陵又曰漢桓帝時有黃星見於楚宋之分遼東商馗善天文言後五十歲當有真人起於梁沛之間其鋒不可當至破袁紹之歲凡五十年天下莫敵矣魏書曰漢末太祖拒董卓命歸鄉里過故人成皋呂伯奢伯奢不在其子八人備賓主之禮太祖, WYG: ''}
