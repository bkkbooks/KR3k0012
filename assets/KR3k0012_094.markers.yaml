  - {type: variant, offset: 2048, length: 0, content: '', WYG: 易博士淳于俊對曰庖犧因燧之圖而制八卦神農演之為六十四黃帝堯舜通其變三代隨時質文各繇其事故易者變易也名曰連山似山出納雲氣連天地也歸藏者萬事莫不歸藏於其中也帝又曰若使庖犧因燧皇而作易孔子何以不云燧人氏没庖犧氏作乎俊不能答講易畢復命講尚書帝問曰鄭𤣥云稽古同天言堯同於天也王肅云堯順考古道而行之二義不同何者為是博士庾峻對曰先儒所執各有乖異臣不足以定之然洪範稱三人占從二人之言賈馬及肅皆以為順考古道以洪範言之肅義為正帝曰仲尼言唯天為大唯堯則之堯之大美在乎則天順考古道非其至也今發篇義以明聖德而舍其大更稱其細豈作者之意耶峻對曰臣奉遵師説未喻大義至於文質折中裁之聖思復命講禮記帝問曰太上立德其次務施報為治何由而教化各異皆修何政而能致於立德施而不報乎博士馬照對曰太上立德謂三皇五帝之世以德化民其次施報謂三王之世以禮為治也帝曰二者教化厚薄不同將主有優劣耶時使之然乎照對曰誠由時有樸文故化有薄厚辛未帝幸辟雍㑹命羣臣賦詩侍中和逌音由尚書陳賽等作詩賦稽畱有司奏免官詔曰吾以闇昧愛好文雅廣延詩賦以知得失而乃爾紛紜良用反側其原逌等主者宣勅自爾已後羣臣皆當翫習古義修明經典稱朕意焉魏氏春秋曰}
