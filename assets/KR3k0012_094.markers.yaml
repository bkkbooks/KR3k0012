  - {type: variant, offset: 2757, length: 2, content: 黃初, WYG: 高貴鄉公為太子舍人成濟所害年二十以公禮葬之陳畱王魏志曰陳畱王諱奐字景明武帝孫燕王字之子也甘露三年封安次縣常道鄉公高貴鄉公卒公卿議迎立公六月入於洛陽即皇帝位於太極前殿大赦改元景元四年詔伐蜀命征西將軍鄧艾督帥諸軍趨甘松沓中雍州刺史諸葛緒督諸軍趨武都高樓首尾踧討若擒姜維便當東西並進掃滅巴蜀又命鎭西將軍鍾㑹由駱谷伐蜀所至輒克十一月蜀主劉禪降巴蜀皆平咸熙二年命晉王冕十有二旒建天子旌旗進王妃為王后世子為太子八月相國晉王薨太子炎紹封襲位總攝百揆十二月禪位於晉改次於金墉城而終館於鄴時年二十在位六年帝王世紀曰陳畱王即位禪晉封陳畱王就國治鄴奉魏宗祀魏世譜曰晉封帝為陳畱王年二十八太安}
  - {type: page-break, offset: 2757, content: '', id: KR3k0012_WYG_094-12a, image: WYG0893/WYG0893-0764a.png}
