  - {type: variant, offset: 1447, length: 418, content: 矣處中以領四方地鏡曰入名山必齋五十日牽白犬抱白雞以白塩一升山神大喜芝草異藥寶玉為出未到山百步呼曰林兵此山王主者名知之卻百邪關令尹喜內傳曰五百歲天下名山一開開時金玉之精涌出晏子春秋曰齊大旱景公召群臣問曰天下不雨矣民且有飢色吾卜旅在高山廣澤寡人欲祠靈山可乎晏子曰夫靈山以石為身以草木為毛髮天不雨髮毛將焦身將熱獨不欲雨乎祠之何益山海經曰周穆王周歷四荒名山大川靡不登躋東昇天夫之堂西宴王母之廬列子傳曰共工與顓頊爭天下怒而觸不周山魏志曰明帝起景陽山於芳林園晉書顧凱之好遊會稽人問山川之美對曰千巖競秀萬壑爭流宋書曰謝靈運好登山常著木屐上山則去前齒下山則去後齒漢書曰李廣利刺山而泉涌楚詞曰山中兮不可以久留古詩曰上山採蘼蕪下山逢故夫崑崙山爾雅曰西北之美者有崑崙之璆琳瑯玕焉史記曰禹本紀言河出崑崙其上有澧泉華池漢書曰張安世房中歌詩云天馬來兮開遠門竦余身兮遊崑崙愽物志曰崑崙從廣萬一千里神物集也出五色雲氣五色流水其白水東南流入中國名為河也河圖括地象曰崑崙之, WYG: ''}
