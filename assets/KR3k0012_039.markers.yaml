  - {type: variant, offset: 1801, length: 183, content: 歌詩云天馬來兮開遠門竦余身兮遊崑崙愽物志曰崑崙從廣萬一千里神物集也出五色雲氣五色流水其白水東南流入中國名為河也河圖括地象曰崑崙之山為地首上為握契滿為四瀆橫為地軸上為天鎮立為八柱河圖始闔圖曰崑崙之墟有五城十二樓河水出四維多玉龍魚河圖曰崑崙山天中柱也紀年曰周穆王十七年西征至崑崙丘見西王母穆天子傳曰天子昇於崑崙之丘以觀黃帝之宮增封於崑崙山上又曰天子遂宿于崑崙之阿赤水之陽, SBCK: 律吕}
