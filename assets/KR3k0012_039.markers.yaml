  - {type: variant, offset: 81, length: 4, content: 垓古來切, SBCK: 少室山顚有白玉膏服之仙山有周昭王陵又戴延之西征記曰少室山中多神藥漢武帝築登仙臺在其峯郡國志云少室山一名􅁰室山􅀒􅁰城在南故因山以名城也又云少室有金像人徃視則有白露起迷人雜道書曰少室之陽髙于平地八百六十丈方十里可避兵水之災華山禮記曰地之廣厚戴華岳而不重范曄後漢書曰張揩字公超隱居弘農山學者隨之所居成市能爲五里霧後華山南遂有公超霧市唐書曰李適之代牛仙客爲右相累封清和縣公與李林甫争權不叶適之性踈爲其隂中林甫常謂適之曰華山有金鑛採之可以富國上未知適之心善其言他日從容奏之􅀇宗大恱顧問林甫對曰臣知之乆矣然華山陛下夲命王氣所在不可穿鑿臣不敢上言帝以爲愛巳薄適之言踈之白虎通曰西方爲華山者何少隂用事萬物生華故曰華山武帝傳曰魯女長樂人􅀄餌麻及水絶􅂖八十餘年日更少壯色如桃花一旦與故人别云入華山去後五十年先相識者逢女華山廟前乗白鹿從玉女三十人并謝其郷里親戚故人崔鴻十六國春秋前燕録曰}
