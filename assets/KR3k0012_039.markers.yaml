  - {type: variant, offset: 32, length: 1, content: 今, SBCK: 祝融降于崇山韋昭注曰崇嵩字古通用夏都陽城嵩山在焉白虎通曰中央之嶽獨加嵩髙字者何中央居四方之中髙故曰嵩髙山續漢書曰武帝禮􅀕中嶽聞有呼萬歲聲三於是以三百户封奉祠命曰崇髙爲嵩髙也孫嚴宋書曰髙祖表曰沙門釋法義於嵩髙廟所石壇下得玉壁三十二枚黄金一缾符彩潤㓗河南太守毛脩之以靈岳降瑞送諸神府列仙傳曰王喬周靈王太子晉也好吹笙作鳯鳴遊伊洛之間浮丘公接以上嵩髙山三十餘年後於山上見桓良曰告我家七月七日待我緱氏山頭果乗白鶴駐山巓望之不得到舉手謝時人數日而去漢武内傳曰漢武帝夜夢與少君俱上嵩髙山半道有繡衣使者乗龍持節從雲中下言太一請少君覺告近臣曰如朕夢少君將捨朕去矣劉義慶丗說曰嵩髙山北有大穴晉時有人誤墮穴中見二人圍碁下有一杯白飲與墮者飲氣力十倍碁者曰汝欲停此否墮者曰不願停碁者曰從此西行有大井其中蛟龍伹投身入井自當出􅀂餓取井中物食之墮者如言可半年乃出蜀中因入洛問張華華曰此仙館也所飲者玉􅄴耳所食者龍肉石髓崔鴻十六國春秋前秦録曰王猛至深山見一老父據胡牀鬚􅁂皓然猛進拜老父曰王公何因拜也遣人送猛出山顧視乃嵩髙山也山海經曰太室之山即}
  - {type: page-break, offset: 32, content: '', id: KR3k0012_SBCK_039-1b}
