  - {type: variant, offset: 1385, length: 1, content: 於, SBCK: 之處也史記曰漢武帝封泰山白雲起封中漢書曰武帝封泰山禪石閭應劭注曰石閭在泰山下南方土人言仙人閭應劭漢官儀曰泰山東南名日觀者鷄一鳴時見日始欲岀長三丈所觀者望見長安其髙如視浮雲其峻如無道徑望人如盂升或以爲小白石或以爲氷雪視巖石松樹欝欝蒼蒼如雲中晉書曰張忠隱于泰山教授弟子教以形不以言符堅徴之及至堅賜以衣冠辭曰年杇髮落不堪衣冠請以野服入覲從之後乞還堅以安車送之行逹華山歎曰我東岳道士殁于西岳命也及􅀜而死道書福地記曰泰山多芝草五石下有洞天周廽三千里􅀑神之府􅀽山松後漢書曰光武封泰山雲氣成宫闕風俗通曰古封泰山禪梁甫舊說岱宗上有金篋王䇿能知人年壽脩短漢武帝探䇿得十八因倒讀曰八十其後果壽長八十博物志曰泰山一曰天孫言爲天帝孫也主召人魂}
  - {type: page-break, offset: 1385, content: '', id: KR3k0012_SBCK_039-5b}
  - {type: variant, offset: 1385, length: 1, content: 於, krp: 之處也史記曰漢武帝封泰山白雲起封中漢書曰武帝封泰山禪石閭應劭注曰石閭在泰山下南方土人言仙人閭應劭漢官儀曰泰山東南名日觀者鷄一鳴時見日始欲岀長三丈所觀者望見長安其髙如視浮雲其峻如無道徑望人如盂升或以爲小白石或以爲氷雪視巖石松樹欝欝蒼蒼如雲中晉書曰張忠隱于泰山教授弟子教以形不以言符堅徴之及至堅賜以衣冠辭曰年杇髮落不堪衣冠請以野服入覲從之後乞還堅以安車送之行逹華山歎曰我東岳道士殁于西岳命也及關而死道書福地記曰泰山多芝草五石下有洞天周廽三千里鬼神之府袁山松後漢書曰光武封泰山雲氣成宫闕風俗通曰古封泰山禪梁甫舊說岱宗上有金篋王䇿能知人年壽脩短漢武帝探䇿得十八因倒讀曰八十其後果壽長八十博物志曰泰山一曰天孫言爲天帝孫也主召人魂}
