  - {type: variant, offset: 1404, length: 130, content: 西華山華者獲也萬物熟成乃有獲也北恒山恒常也言萬物伏藏於北方有常度也中嵩山嵩者高也言峻大矣處中以領四方地鏡曰入名山必齋五十日牽白犬抱白雞以白塩一升山神大喜芝草異藥寶玉為出未到山百步呼曰林兵此山王主者名知之卻百邪關令尹喜內傳曰五百歲天下名山一開開時金玉之精涌出晏子, SBCK: 吴越}
