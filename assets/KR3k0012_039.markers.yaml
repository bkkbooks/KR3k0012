  - {type: variant, offset: 1367, length: 1, content: 視, WYG: 無螫蟲猛獸孟子曰孔子登東山而小魯登泰山而小天下尸子曰泰山之中有神房阿閣帝王籙淮南子曰清之為明杯水而見眸子濁之為暗河水不見泰山孟子曰挾泰山以超北海恒山亦名常山史記曰趙簡子謂諸子曰吾藏寳符于常山往得者立焉諸子競往無所得無恤曰常山臨代代可取也簡子曰是知符矣遂立之白虎通曰北方為常山者何隂終陽始其道常乆故曰常山後魏書曰道武立廟於上置侍祀九十九人嵗時祈禱水旱至成帝東廵親祀其神焉春秋元命苞曰昴畢散為冀州分為趙國立為常山崔鴻前燕録曰慕容雋夀光}
  - {type: page-break, offset: 1367, content: '', id: KR3k0012_WYG_039-12b, image: WYG0893/WYG0893-0334d.png}
  - {type: page-break, offset: 1367, content: '', id: KR3k0012_WYG_039-13a, image: WYG0893/WYG0893-0335a.png}
  - {type: variant, offset: 1369, length: 0, content: '', WYG: 年常山寺大樹根下得璧七十二圭七十光色精竒有異常玉孫子兵法曰常山之蛇名曰率然一身而兩頭擊其一頭則一頭至擊其中則首尾俱至神農本草曰常山有名草神農置之門上每夜叱人常山圖經曰北岳恒山在縣西北一百四十里尚書禹貢曰太行恒山至于碣石有恒水出焉其下有祠又恒山記曰髙三千九百丈上方三十里週迴三千里上有太𤣥之泉神草十九種道者服之成仙又太史}
  - {type: page-break, offset: 1369, content: '', id: KR3k0012_WYG_039-13b, image: WYG0893/WYG0893-0335b.png}
  - {type: variant, offset: 1370, length: 0, content: '', WYG: 云北岳者有五名一名蘭台府二名列女宫三名華陽臺四名紫㣲宫五名太乙宫或云太茂山山北四百餘里號飛狐之口有率然蛇孫吳喻兵勢管子曰其山北臨代南俯趙東接河海之間早生而晩殺五糓之所蕃熟四種五穫焉陽固北都賦曰茂丘茂山也蓋恒岳之别名泒水從西來甚大至茂山之西沉伏于地過山而復出其大如初世言避恒岳之靈衡山周官曰荆州其山鎮曰衡山徐靈期南岳記曰衡山者五岳之南岳也其來尚矣至於軒轅乃以灊音潜霍之山為副焉故爾雅云霍山為南嶽蓋因其副焉或云衡山一名霍山至漢武南廵又以衡山遼逺道隔江漢於是乃徙南岳之祭于廬灊江山亦承軒轅副義也晋書曰劉驎之嘗採藥至衡山深入忘返見有一澗水末有二石囷一開一閉水深廣不得過欲還失道遇伐木人問道僅得還家或説囷中皆仙方靈藥驎之欲更尋終不復知其處羅含湘中記曰衡山九嶷皆有舜廟太守至常遣户曹致祀則如絃歌之聲也呉越春秋曰禹傷父功不成登衡山血白馬以祭之忽然卧夢赤繡文男子稱𤣥夷蒼水使者謂禹曰欲得我山神書者齋于黄帝之宫禹乃退齋三日登宛委發石得金簡玉字之書得治水之要也盛𢎞之荆州記曰衡山有三峯其一名紫蓋每見有雙白鶴囬翔其上一峯名石菌下有石室㝷山徑聞室中有諷誦聲一曰芙蓉上有泉水飛流如舒一幅白練山海經曰衡山一名岣嶁山其上多青雘鳥多鸚鵒岣音矩嶁音縷湘中記曰衡山九嶷皆有舜廟遥望衡山如陣雲沿湘千里九向九背乃不復見有玉牒劉敬叔異苑曰湘東姚祖太元中為郡吏經衡山望巖下數少年並執筆作書祖謂行旅休息乃過之未至百步少年相與飛颺遺一紙書其字皆鳥跡郡國志云衡山南岳也南岳記云當翼軫度璣衡謂之衡山山有錦石斐然成文霍山白虎通曰南方為霍山者何太陽用事護養萬物故為霍山爾雅曰大山宫小山曰霍郭璞注曰宫謂圍繞也禮記曰君為廬宫是也漢書曰武帝以衡山􅗥逺䜟記皆以霍山為南岳故祭其神於此宋書曰霍山數年來常有鐘聲潜發重壤山崩間有六鐘自出制度合古式聲中律呂山海經曰霍山有獸焉其狀如狸白尾方鬛名曰朏朏可以忘憂黄庭内景經曰霍山下有洞臺方二百里司命君之府}
