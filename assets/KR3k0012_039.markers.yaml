  - {type: variant, offset: 2030, length: 1913, content: 圃南望崑崙其光熊熊有木焉其狀如棠而黃華赤實其味如李而無核名曰沙棠食之令人不溺草之美者沙裳之實又曰崑崙之墟方八百里高萬仞上有木木長五尋大五圍面有井以玉為檻檻欄面有五門門有開明獸守之百神所在又曰崑崙之丘有神人面虎身文尾其下有弱水泉徐整長曆曰北斗當崑崙上真人關尹內傳曰萬億萬歲有一大水崑崙飛浮是時飛仙迎取天王及善民安之山上也葛仙公傳曰崑崙山一日玄圃臺一曰積石瑤房一曰閬風臺一曰華蓋一曰天柱皆仙人所居列仙傳赤松子者神農時雨師也服水石以教神農能入火不燒至崑崙山止常上西王母石室中隨風雨上下炎帝少女追之亦得仙俱去至高辛時復為雨師今之雨師是也又曰西王母者神人也人面蓬頭髮虎爪豹尾善肅空居名西王母在崑崙山下神仙傳曰東郭延者山陽人也服雲飛散能夜書有數十人乘虎豹來迎比鄰盡見之與親友辭別而去云詣崑崙山神異經曰崑崙有銅柱焉其高入天所謂天柱也圍三千里員周如削銅柱下有屋壁方百丈搜神記曰崑崙之山是惟帝之下都環以炎火山十洲記曰昆陵崑崙山也上有金臺玉闕亦元氣之所合天帝君治處玄元記曰崑崙西南山周廻三萬里巨虵繞之得三周虵長九萬里尸子曰赤縣州者寔為崑崙之墟玉紅之草生焉食其一實而醉臥三百歲而後寤呂氏春秋曰菜之美者有崑崙之蘋也淮南子曰崑崙山上有層城九重上有木禾其條五尋珠樹玉璇樹不死樹在其西沙棠瑯玕在其東絳樹在其南瑤樹在其北又曰崑崙之玉瑱而塵垢不能污也抱朴子曰蔡誕者自云被謫至崑崙初誕還人問云崑崙似何荅曰天不問其高幾里要於仰視之去天過十數里也崔鴻十六國春秋前趙錄曰東平王劉約癸亥卒一指猶暖遂不殯殮至於甲戍乃蘇言見劉淵於不周山經五日遂復從至崑崙山三日而復返於不周見諸王公卿將死者悉在焉又曰酒泉太守馬岌上言酒泉南山既崑崙之體也周穆王見西王母樂而忘歸既在此山山有石室王母堂珠璣鏤飾煥若神宮鍾山穆天子傳曰自密山以至鍾山四百六十里其閒盡澤多怪獸奇魚又曰天子北昇于舂山之上望四野郭璞注曰舂音鍾也曰是惟天下之高山山海經曰黃帝取密山之玉策投之鍾山之陰以為玉鍾又曰鍾山其子曰鼓此亦神名名之為鍾山之子耳其類皆見歸藏啟筮也其狀人面而龍身帝乃戮之鍾山之東也又曰鍾山之神名曰燭陰燭龍也是燭九陰也視為晝瞑為夜吹為冬呼為夏魯女生列傳曰鍾山之棗其大如缾十洲記曰北海外有鍾山自生千芝及神草此洲受太玄生符錄仙家數十萬耕田種芝草課計頃畝種稻玄中記曰北方有鍾山焉山上有石首如人首左目為日右目為月開左目為晝開右目為夜開口為春夏閉口為秋冬淮南子曰鍾山之玉灼之以鑪炭三日三夜其色不變論衡曰鍾山之上以玉抵鵲彭蠡之濱以魚食犬玉山穆天子傳曰天子西征來還乃循黑水至于群玉之山天子於是取玉板玉器服物載玉萬候雙玉為玨羊壁為候見左傳山海經曰玉山是西王母所居此山多玉石因以為名帝王世紀曰崑崙之北玉山之神人身虎首豹尾蓬頭外國圖曰西王母國前弱水中有玉山白兔闞駰十洲記曰赤水西有白玉山山有西王母堂室蓬萊山漢書王莽傳曰有奇士大十圍自言巨無霸出於蓬萊山軺車不能載三馬不能勝又武記曰太初元年十二月祀后土東臨渤海望祀蓬萊十洲記曰蓬萊山外別負海謂之溟海無風而洪波百丈有九氣丈人九天真君宮玄中記曰東南之大者有巨鼇焉以背負蓬萊山列子曰渤海之東有大海其中有山一曰岱輿二曰員嶠三曰方壺四曰瀛州五曰蓬萊其上臺觀皆金玉禽獸皆純縞珠玕之樹皆聚生實皆有滋味食之不老不死人皆仙聖一日一夕飛翔來往山海經曰蓬萊山海中之神山非有道者不至列仙傳曰安期生瑯琊阜鄉人時人皆言千歲秦始皇與語賜金壁數千萬出阜鄉亭皆置去留以赤玉舄一量為報曰後千歲求我蓬萊山下又曰負局先生語似燕岱間人吳市中摩鏡一錢因摩之輒問主人得無有疾苦輒出紫赤藥與之莫不時愈後上吳山懸藥下與萬姓欲去時語下人曰吾欲還蓬萊山神仙傳麻姑謂王方平曰自接侍已來三見海水變為桑田蓬萊之清淺也方丈山漢書曰太液池有方丈瀛洲象海中神山焉仙傳曰服閭者不知何許人常止莒往來海邊諸祠中有三仙人於祠中愽賭瓜使服閭檐黃瓜十枚令瞑目乃止方丈山在蓬萊山南時往莒取珍寶賣之瀛洲山史記封禪書曰齊宣王燕昭王使人求蓬萊方丈瀛洲此三神山傳在海中去人不遠望之如雲中及至則三山返在水下欲至則風引舡而去莫能至者仙人不死藥皆在焉黃金白銀為宮𨵗終南山書曰終南惇物至於鳥鼠謂終南惇物二山西出至于鳥鼠山詩曰終南何有有條有枚漢書曰太一山又為終南山五經要義太一山在扶風武功縣則終南太一不得為一山明矣蓋終南南山之惣名太一山之別號唐書曰盧藏用初隱終南山後出仕道士司馬子微歸天台山群公祖道藏用指終南山曰此中甚有佳處何必天台子微曰以吾觀之此乃仕官之捷徑爾藏用有慚色又曰文宗開成二年詔曰每聞京師舊說以為終南山興雲祈必有雨若晴霽雖密雲至他竟不霑濡況茲山北面闕庭日當息觀脩其望祀寵數宜及今聞都無祠宇終南山未備禮秩命有司即時建立關中記曰終南山一名中南言在天中居都之南也又曰終南太一左右, WYG: 御覽卷}
