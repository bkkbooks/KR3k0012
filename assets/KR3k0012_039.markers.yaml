  - {type: variant, offset: 40, length: 0, content: '', SBCK: 山見三學仙女遂以爲名又一石室有自然經書飲食室前石柱似承露盤有石暗滴下食之一合與天地相畢中頂南下二百歩}
  - {type: variant, offset: 40, length: 0, content: '', WYG: 否墜者曰不願停棋者曰從此西行有天井其中蛟龍但投身入井自當去若餓取井中物食之墜者可半年乃出蜀中因入洛問張華華曰此仙舘也所飲者玉漿所食者龍肉石髓耳崔鴻十六國春秋前秦録曰王猛至深山見一老父據胡牀鬚鬢皓然猛進拜老父曰王公何因拜也遣人送猛出出顧視乃嵩髙山也山海經曰大室之山即中嵩山今在陽城縣西也其上有木焉其狀如梨赤理服者不妬有草焉其狀如禾服者不昧上多美石次玉者也嵩髙山記曰漢有道士從外國將貝多子來于嵩岳西脚下種之并立浮圗今有四樹與衆木有異一年三花花白色其香如桂嵩山最是栖神靈藪也東出一里有自然五榖神芝仙藥東脚下有衆果樹云是漢果園後有小山名牛山多香樹昔有婦女姙身三十月生子五嵗便入嵩髙學道通神明為母立祠號開母祠又有三臺山漢武東廵過此山見三學仙女遂以為名又一石室有自然經書飲食至前石柱似承露盤有水暗滴下食之一合與天地相畢中頂南下二百步}
