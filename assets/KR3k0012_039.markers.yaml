  - {type: substitution, offset: 34, original: 岳, replacement: 嶽, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-4348}}
  - {type: variant, offset: 37, length: 2, content: 蓋依, SBCK: 今在陽城縣西也其上有木焉葉􅃺如梨赤理服者不垢有草焉其􅃺如禾服者不昧上多美石次玉者也嵩髙山記曰漢有道士從外國將貝多子來於嵩岳西脚下種之并立浮圗今有四樹與衆木有異一年三花花白色其香甚佳嵩山最是栖神靈藪也東出一里有自然五􅂖神芝仙藥東脚下有衆果樹云是漢果園後有小山名牛山多香樹昔有婦女姙身三十月生子五歲便入嵩髙學道通神明爲母立祠號開母祠又有三臺山漢武東廵過}
  - {type: page-break, offset: 37, content: '', id: KR3k0012_SBCK_039-2b}
  - {type: variant, offset: 37, length: 2, content: 蓋依, WYG: 在焉白虎通曰中央之嵩獨加嵩髙字者何中央居四方之中而髙故曰嵩髙山續漢書曰武帝禮祭中嶽聞有呼萬嵗聲三於是以三百户封奉祠命曰嵩髙為嵩呼也孫嚴宋書曰髙祖表曰沙門釋法義于嵩髙廟所食壇下得玉璧三十二枚黄金一餅符彩潤潔河南太守毛修之以靈岳䧏瑞送諸神府列仙傳王子喬周靈王太子晋也好吹笙作鳯鳴遊伊洛之間浮丘公接以上嵩髙山三十餘年後于山上見桓良曰告我家七月七日待我緱氏山頭至日果乗白鶴駐山巔望之不得到舉手謝時人數日而去漢武内傳曰漢武帝夜夢與少君俱上嵩髙山半道有繡衣使者乗龍持節從雲中下言太一請少君覺告廷臣曰如朕夢少君將捨朕去矣劉義慶世説曰嵩髙山北有大穴晋時有人誤墜穴中見二人圍棋下有一杯白飲與墜者飲氣力十倍棋者曰汝欲停}
  - {type: page-break, offset: 37, content: '', id: KR3k0012_WYG_039-2a, image: WYG0893/WYG0893-0329c.png}
  - {type: page-break, offset: 37, content: '', id: KR3k0012_WYG_039-2b, image: WYG0893/WYG0893-0329d.png}
  - {type: variant, offset: 37, length: 2, content: 蓋依, krp: 今在陽城縣西也其上有木焉葉狀如梨赤理服者不垢有草焉其狀如禾服者不昧上多美石次玉者也嵩髙山記曰漢有道士從外國將貝多子來於嵩岳西脚下種之并立浮圗今有四樹與衆木有異一年三花花白色其香甚佳嵩山最是栖神靈藪也東出一里有自然五糓神芝仙藥東脚下有衆果樹云是漢果園後有小山名牛山多香樹昔有婦女姙身三十月生子五歲便入嵩髙學道通神明爲母立祠號開母祠又有三臺山漢武東廵過}
