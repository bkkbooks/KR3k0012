  - {type: variant, offset: 1401, length: 0, content: '', SBCK: 􅀕之也晉書曰劉驎之嘗採藥至衡山深入忘返見有一澗水南有二石囷一開一閉水深廣不得過欲還失道遇伐弓人問遥僅得還家或說囷中皆仙靈方藥驎之欲更㝷終不復知處羅含湘中記}
  - {type: variant, offset: 1401, length: 0, content: '', krp: 祭之也晉書曰劉驎之嘗採藥至衡山深入忘返見有一澗水南有二石囷一開一閉水深廣不得過欲還失道遇伐弓人問遥僅得還家或說囷中皆仙靈方藥驎之欲更㝷終不復知處羅含湘中記}
