  - {type: variant, offset: 103, length: 0, content: '', SBCK: 削成而四方其髙千仞其廣千里郭璞注曰山上明星玉女主持玉漿得服之即神仙之道嶮無不通也有虵曰肥遺六足四翼見則天下旱列仙傳曰馬明生從安期先生受金液神丹方乃入華隂山中合金神丹昇天也又曰脩羊公者蜀人也止華隂山石室中中有懸石榻卧其上石盡穿䧟又曰毛女者在華隂山中獦師丗丗見之體生毛自言秦始皇宫人也又曰呼子先者漢中闕下卜師也壽百餘歲臨去呼酒家嫗曰急裝當與嫗共應中陵王今夜有仙人持二茅狗來先持一與酒家嫗得俱􅀐乃龍上華隂山也周禮曰豫州其鎭山曰華山華山記云山頂有池生千葉蓮花服之羽化因曰華山又曰山有三峯謂蓮花毛女松檜也辛氏三秦記曰華山在長安}
