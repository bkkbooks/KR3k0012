  - {type: variant, offset: 680, length: 667, content: 數又曰天不愛其道地不愛其寶人不愛其情故山出器車又曰居山不以魚鱉為禮爾雅曰土高有石曰山釋名云山產也言產萬物說文曰山宣也宣氣散生萬物有石而高春秋元命苞曰山者氣之苞所以含精藏雲故觸石而出春秋說題辭曰山之為言宣也含澤布氣調五神也韓詩外傳曰夫山萬人之所觀仰材用生焉寶藏植焉飛禽萃焉走獸伏焉育物群而不倦有似夫仁人志士是仁者所以樂山也尚書大傳曰孔子曰夫山者嵬嵬然草木生焉鳥獸蕃焉財用殖焉四方皆無私與焉出雲雨以通乎天地之間陰陽和合雨露之澤萬物以成百姓以饗此仁者之樂于山也國語曰禹封九山山者土之聚也河圖曰嶓冢山上為狼星武開山為地門上為天高星主囹圄荊山為地雌上為軒轅星大別為地理以天合地以通三危山在鳥獸之西南上為天范星歧山在崑崙東南為地乳上為天麋星汶山之地為井絡帝以會昌神以建福上為天井桐柏山為地穴鳥鼠同穴山之幹也上為掩畢星熊耳山地門也精上為畢附耳星莊子曰函車之獸分而離山不免網罟之患又曰山積卑而成高管子曰凡天下名山五千三百七十出鐵之山三千六百有九上有丹砂者下有黃金上有磁石者下有銅金上有綠石者下有鈆錫上有赭下有鐵淮南子曰牛蹄之涔無徑尺之鯉魅父之山無文林營宇狹小而不能容巨大也孫卿子曰不登高山不知天之高不臨深谿不知地之厚不聞先王之道不知學問之大呂氏春秋曰何謂九山會稽泰山會稽今會稽也泰山今泰山郡是為東岳也王屋首山泰華岐山太行羊腸孟門岐山在右扶風美陽縣西北周家所邑也太行在河內野王縣北羊腸其山盤紆如羊腸狀在太行晉陽北孟門太行是說苑曰土積成山則豫章生焉又曰五嶽者何謂也泰山東嶽也霍山南嶽也華山西嶽也恒山北嶽也嵩高山中嶽也五嶽何以視三公能大布雲雨焉能大歛雲雨焉, SBCK: ''}
