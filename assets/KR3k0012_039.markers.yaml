  - {type: variant, offset: 1362, length: 8, content: 施得愽大故視三公, krp: 者唯泰山乎語曰季氏旅於泰山子謂冉有曰汝不能救歟旅祭名也禮諸侯祭山川在其封内者今陪臣祭泰山非禮也冉有孔子時仕季氏救猶止也對曰不能子曰嗚呼曽謂泰山不如林放乎孔子意云泰山之神知禮過於林放之賢逺}
  - {type: variant, offset: 1364, length: 0, content: '', WYG: 十八因倒讀曰八十其後果夀長八十}
  - {type: substitution, offset: 1364, original: 愽, replacement: 博, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-1192}}
  - {type: variant, offset: 1365, length: 0, content: '', WYG: 物志曰泰山一曰天孫言為天帝孫也主召人魂魄東方萬物始成故知人生命之長短五經通義云一曰岱宗言王者受命易姓報功告成必于岱宗也東方萬物始交代之處宗長也言為羣嶽之長白虎通曰王者受命必封禪封者廣厚也禪除也為壇字本為墠以其祭神故從示皆刻石紀號著己之功績以自効也天以髙為尊地以厚為徳故增泰山之髙以報天禪梁甫之阯以報地也史記曰無懐氏封泰山禪云云伏羲封泰山禪云云神農封泰山禪云云炎帝封泰山禪云云黄帝封泰山禪亭亭顓頊封泰山禪云云帝嚳封泰山禪云云堯封泰山禪云云禹封泰山禪㑹稽湯封泰山禪云云周成王封泰山禪社首後漢書曰光武封泰山禪梁甫凡云云亭亭肅然嵩里社首梁甫皆泰山下小山也石閭在西巖下漢官儀及泰山記曰泰山盤道屈曲而上凡五十餘盤經小天門}
  - {type: page-break, offset: 1365, content: '', id: KR3k0012_WYG_039-9b, image: WYG0893/WYG0893-0333b.png}
  - {type: page-break, offset: 1365, content: '', id: KR3k0012_WYG_039-10a, image: WYG0893/WYG0893-0333c.png}
  - {type: punctuation, offset: 1366, content: ，, id: KR3k0012_CHANT_039-bkkpn426}
  - {type: 'tls:seg', offset: 1366, content: '', id: KR3k0012_CHANT_039-15a.25}
  - {type: variant, offset: 1366, length: 0, content: '', WYG: 天門仰視天門如從穴中視天牕矣自下至古封禪處凡四十里山頂西巖為仙人石閭東巖為介丘東南巖名日觀日觀者雞一鳴時見日始欲出長三丈許又東南名秦觀秦觀者望見長安吳觀者望見㑹稽周觀者望見齊黄河去泰山二百餘里於祠所瞻黄河如帶若在山阯山南有廟悉種栢千株大者十五六圍相傳云漢武所種小天門秦時五大夫松見在茅君内傳云仙家凡有三十六洞天岱宗之洞週迴三千里名曰三宫空㓊之天列仙傳曰稷丘君者泰山道士也武帝時以道術受賜後上東廵泰山稷丘君乃冠章甫衣黄衣擁琴來拜武帝曰陛下勿上也必傷足上必欲上及上數里左右足指果折乃止列仙真人傳曰馬明者齊國臨淄人也本姓何字君賢為縣吏捕賊為所傷當時殆死良乆忽於道間見一女以肘後管中一丸藥大如小豆與明服之于是即愈血絶瘡合隨神女還岱宗石室中上下懸絶重巖深隱去地千餘丈其中金牀玉枕乃人跡所不能至神仙傳曰劉馮者沛人學道于穆王子服石桂英及中岳石硫黄年三百餘嵗而有少容後入泰山中又泰山下老父者失其姓名漢孝武皇帝廵狩見老父鋤于道間頭上白光髙數丈因問之父對曰臣年八十五時衰老垂死頭白齒落有道者教臣絶榖但飲水并作神枕枕中有三十二物其二十四物以當二十四氣其八物當八風臣行之轉少日行三百里今年九十矣帝受其方賜縑帛去父入岱宗山十年五年時還鄉里三百餘年乃不復還也上黨記曰太子坂東頭即泰山也避世者區種而食或射熊于巖間泰山記曰泰山廟在山南悉種栢樹千株大者十五六圍父老傳云漢武所種廟及東西房三十餘間并髙樓三處春秋饗祀泰山君嘗在此壇周易是謀類曰泰山失金雞鄭𤣥注曰金雞泰山之精丘淵之齊記曰泰山東岳也嬴博二縣共界漢武封禪割此縣以供祀泰山伍輯之從征記曰泰山于所經諸山為最髙見岑崿軒舉凌跨衆阜霞雲草木靄然靈異苑囿神竒}
