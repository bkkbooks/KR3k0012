  - {type: variant, offset: 1378, length: 68, content: 岱者言萬物相代於東方南衡山者上承景宿銓德均物故曰衡也西華山華者獲也萬物熟成乃有獲也北恒山恒常也言萬物伏藏於北方有常度也中嵩山嵩者高也言峻, WYG: 繞}
