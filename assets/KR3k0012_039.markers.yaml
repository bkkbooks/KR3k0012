  - {type: variant, offset: 1362, length: 8, content: 施得愽大故視三公, SBCK: 者唯泰山乎語曰季氏旅於泰山子謂冉有曰汝不能救歟旅􅀕名也禮諸侯􅀕山川在其封内者今陪臣􅀕泰山非禮也冉有孔子時仕季氏救猶止也對曰不能子曰嗚呼曽謂泰山不如林放乎孔子意云泰山之神知禮過於林放之賢逺}
  - {type: variant, offset: 1362, length: 1, content: 施, WYG: 者唯泰山雲爾語曰季氏旅于泰山子謂冉有曰女弗能救與對曰不能子曰嗚呼曽謂泰山不如林放乎白虎通曰王者功成封禪必于泰山者何萬物之始交代之處也史記曰漢武帝封泰山白雲起封中漢書曰武帝封泰山禪石閭應劭注曰石閭在泰山下南方土人言仙人閭應劭漢官儀曰泰山東南名日觀者雞一鳴時見日始欲出長三丈所觀者望見長安其髙如視浮雲其峻如無道徑望人如盂升或以為小白石或以為氷雪視巖石松鬰鬰蒼蒼如雲中晋書曰張忠隠于泰山教授弟子敎以形不以言符堅徴之及至堅賜以衣冠辭曰年朽髮落不堪衣冠請以野服入覲從之後乞還堅以安車送之行達華山嘆曰我東岳道士歿于西岳命也及關而死道書福地記曰泰山多芝草玉石下有洞天周迴三千里鬼神之府袁山松後漢書曰光武封泰山雲氣成宫闕風俗通曰古封泰山禪梁甫舊説岱宗上有金篋玉䇿能知人年夀修短漢武帝探策}
