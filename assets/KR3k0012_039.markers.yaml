  - {type: 'tls:seg', offset: 1388, content: '', id: KR3k0012_CHANT_039-16a.6}
  - {type: variant, offset: 1388, length: 0, content: '', SBCK: 萬物始成故知人生命之長短五經通義云一曰岱宗言王者受命易姓報功告成必於岱宗也東方萬物始交代之處宗長也言於群嶽之長白虎通曰王者受命必封禪封者廣厚也禪除也爲壇字夲爲單以其􅀕神故從示皆刻石紀號著巳之功績以自効也天以髙爲尊地以厚爲德故増泰山之髙以報天禪梁甫之阯以報地也史記曰無懷氏封泰山禪云云伏犧封泰山禪云云神農封泰山禪云云炎帝封泰山禪云云黄帝封泰山禪云云顓頊封泰山禪云云帝嚳封泰山禪云云堯封泰山禪云云禹封泰山禪㑹稽周成王禪梁甫肅然及蒿里石閭後又凡五脩封泰山後漢書曰光武封泰山禪梁甫凢云云亭亭肅然蒿里社首梁甫皆泰山下小山也石閭在西巖下漢官儀及泰山記曰泰山盤道屈曲而上凢五十餘盤經小天門大天門仰視天門如從穴中視天䆫矣自下至古封禪處凢四十里山頂西巖爲仙人石閭東巖爲介丘東}
  - {type: page-break, offset: 1388, content: '', id: KR3k0012_SBCK_039-6a}
  - {type: page-break, offset: 1388, content: '', id: KR3k0012_SBCK_039-6b}
  - {type: variant, offset: 1388, length: 0, content: '', krp: 萬物始成故知人生命之長短五經通義云一曰岱宗言王者受命易姓報功告成必於岱宗也東方萬物始交代之處宗長也言於群嶽之長白虎通曰王者受命必封禪封者廣厚也禪除也爲壇字夲爲單以其祭神故從示皆刻石紀號著巳之功績以自効也天以髙爲尊地以厚爲德故増泰山之髙以報天禪梁甫之阯以報地也史記曰無懷氏封泰山禪云云伏犧封泰山禪云云神農封泰山禪云云炎帝封泰山禪云云黄帝封泰山禪云云顓頊封泰山禪云云帝嚳封泰山禪云云堯封泰山禪云云禹封泰山禪㑹稽周成王禪梁甫肅然及蒿里石閭後又凡五脩封泰山後漢書曰光武封泰山禪梁甫凢云云亭亭肅然蒿里社首梁甫皆泰山下小山也石閭在西巖下漢官儀及泰山記曰泰山盤道屈曲而上凢五十餘盤經小天門大天門仰視天門如從穴中視天䆫矣自下至古封禪處凢四十里山頂西巖爲仙人石閭東巖爲介丘東}
  - {type: variant, offset: 1389, length: 0, content: '', SBCK: 巖名日觀日觀者鷄一鳴時見日始欲出長三丈許又東南名􅁗觀秦觀者望見長安吴觀者望見㑹稽周觀者望見齊黄河去泰山二百餘里於祠所瞻黄河如帶􅀂在山阯山南有廟悉種栢千株大者十五六圍相傳云漢武所種小天門有秦時五大夫松見在茅君内傳云仙家凢有三十六洞天岱宗之洞周廽三千里名曰三宫空洞之天列仙傳曰稷丘君者泰山道士也武帝時以道術受賜後上東巡泰山稷丘君乃冠章甫衣黄衣擁琴來拜武帝曰陛下勿上也必傷足上必欲上及上數里左右足指果折乃止列仙眞人傳曰馬明靈者齊國臨淄人也夲姓和字君賢爲縣吏捕賊爲所傷當時殆死良乆忽於道間見一女以时後管中一丸藥大如小豆與明服之於是即愈血絶瘡合隨神女還岱宗石室中上下懸絶重巖深隱去地千餘丈其中金牀玉机乃人跡所不能至神仙傳曰劉馮者沛人學道於穆王子服石桂英及中岳石流黄年三百餘歲而有少容後入泰山中又曰􅁗山下老父者失其姓名漢孝武皇帝廵狩見老父鋤於道間頭上白光髙數丈將問之父對曰臣年八十五時衰老垂死頭白齒落有道者教臣絶榖但服飲水并作神枕枕中有三十二物其二十四物以當二十四氣其八物當八風臣行之轉少日行三百里今年九十矣帝受其方賜縑帛去父入岱宗山十年五年時還郷里三百餘年乃不復還也上黨記曰太行坂東頭即泰山也避丗者區種而食或射熊於巖間泰山記曰泰山廟在山南悉種栢樹千株大者十五十六圍長老傳云漢武所種廟及東西房三十餘間并髙樓三處春秋饗祀泰山君常在此壇周易是謀􅀋曰泰山失金鷄鄭􅀇注曰金鷄泰山之精丘淵之齊記曰泰山東岳也瀛􅀶二縣共界漢武封禪割此縣以供祀泰山故曰奉髙三十里有延陵兒􅊘伍輯之從征記曰泰山於所經諸山非最髙而岑崿軒舉凌跨衆阜雲霞草木藹然靈異苑囿神竒故無螫虫猛獸孟子曰孔子登東山而小魯登泰山而小天下尸子曰泰山之中有神房阿閣帝王録淮南子曰清之爲明杯水而見眸子濁之爲闇河水不見泰山新序曰挾泰山以超北海􅁪山亦名常山史記曰趙簡子謂諸子曰吾藏寳符於常山往得者立焉諸子竟往無所得無恤曰常山臨岱可取也簡子曰是知符矣遂立之白虎通曰北方爲常山者何隂終陽始其道常乆故曰常後魏書曰道武立廟於上置侍祀九十九人歲時禱水旱至文成帝東廵親禮其神焉春秋元命苞曰昂畢散爲兾州分爲趙國立爲常山崔鴻前燕録曰慕容儁壽光三年常山寺大樹根下得壁七十二圭七十光色精竒有異常玉孫子兵法曰常山之虵名曰率然一身而兩頭擊其一頭則一頭至擊其中則兩頭俱至神農本草曰常山有草名神農置之門上每夜叱人常山圖經曰北嶽􅁪山在縣西北一百四十里尚書禹貢太行􅁪山至于碣石有􅁪水出焉其下有祠晏天王按山記曰髙三千九百丈上方三十里周廽三千里上有泰􅀇之泉神草十九種道者服之成仙又太史公云北岳者有五名一名蘭臺府二名列女宫三名華陽臺四名紫微宫五名太一宫或云太茂山山北四百餘里號飛狐之口有率然虵孫吴諭兵􅀔管子曰其山北臨代南俯趙東接河海之間早生而晩殺五􅂖之所蕃熟四種五穫焉陽固北都賦曰茂丘茂山也盖􅁪岳之別名沠水從西來甚大至茂山之西沉伏于地過山而復出其大如􅀄世言避􅁪岳之靈衡山周官曰荆州其山鎭曰衡山徐靈期南岳記曰}
