  - {type: variant, offset: 1392, length: 1, content: 上, SBCK: 五嶽之南嶽也其來尚矣至于軒轅乃以灊音潜霍之山爲副焉故爾雅云霍山爲南嶽盖因其副焉或云衡山一名霍山至漢武南廵又以衡山遼逺道隔江漢於是乃徙南嶽之􅀕于廬江灊山亦}
  - {type: variant, offset: 1392, length: 1, content: 上, krp: 五嶽之南嶽也其來尚矣至于軒轅乃以灊音潜霍之山爲副焉故爾雅云霍山爲南嶽盖因其副焉或云衡山一名霍山至漢武南廵又以衡山遼逺道隔江漢於是乃徙南嶽之祭于廬江灊山亦}
  - {type: variant, offset: 1394, length: 6, content: 景宿銓德均物, SBCK: 軒轅副義也于寳搜神記曰漢武徙南嶽之􅀕著廬江潜縣之霍山郭璞爾雅注云霍山在廬江郡潜縣別名天柱山漢武以衡山遼逺讖緯以霍山為岳}
