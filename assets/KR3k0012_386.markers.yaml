  - {type: variant, offset: 594, length: 2, content: 服千, SBCK: 至乗車非兵車也駕}
  - {type: variant, offset: 594, length: 2, content: 服千, WYG: 至乗車非兵車也駕人曰輦宋去陳二百六十里言萬之多力宋人請南宫長萬於陳陳人使婦人飲之酒而以犀革褁之比及宋手足皆見又曰初雩講于梁氏女公子觀之圉人犖自墻外與之戲子般怒使鞭之公曰不如殺之是不可鞭犖有力焉能投盖于稷門盖覆也稷門魯南城門走而自投扳其屋之桷反覆門上又宣公下曰晉魏顆見老人結草以抗杜囘杜囘秦之力人也又成公上曰髙固入晉師磔石以投人禽之而乗其車繫桑木焉以狥齊壘又成公下曰晉楚交戰叔山冉摶人以投中車折軾晉師乃止又襄公二曰晋荀偃士匄請伐偪陽偪陽人啓門諸侯之士門焉見門開故攻之懸門發鄹人紇抉之以出門者紇鄹邑大夫仲尼父叔梁紇也狄虒彌建大車之輪而蒙之以甲以為櫓狄虒彌魯人䝉覆也櫓大盾也左執之右㧞㦸以成一隊孟獻子曰詩所謂有力如虎者也主人縣布堇父登之及堞而絶之墜則又懸之蘇而復上者三主人辭焉乃退又哀公下曰楚白公作亂刼恵王子西以袂掩面而死子期曰昔者吾以力事君不可以弗終抉豫章以殺人而後死以効其多力豫章大木史記曰秦王有力好戲事任鄙烏獲孟説皆至大官王與説舉龍文赤鼎絶臏而死又曰范睢説秦昭王曰烏獲任鄙之力成荆孟賁慶忌夏育之勇又曰張良常學淮陽東見滄海君得力士為鐵椎重百二十斤秦皇東遊良與客俱擊秦皇慱浪沙中悞中副車秦皇大怒大索天下求賊甚急張良乃更姓名亡匿於下邳漢書曰項羽在鴻門沛公與張良在坐樊噲聞事急乃持盾入初入營營衛止噲噲直撞入立帳下羽目之問為誰良曰沛公參乗樊噲也羽曰壯士賜之巵酒彘肩噲既飲酒㧞劒切肉食之羽曰能復飲乎曰臣死且不辭豈特巵酒也又曰甘延夀字君况北地郁郅人少以良家子善騎射為羽林投石㧞距絶於等倫常超踰羽林亭樓由是遷為郎又曰淮南王長力能扛鼎廣陵王肯空手摶熊羆又曰上官桀從武帝上甘泉天大風車不得行解盖授桀桀奉盖雖風常屬車兩下盖御上竒其才力遷未央廐令又曰彭城王翌身長七尺七寸驍幹過人能手舉殿梁超過平陽楚漢春秋曰項梁隂養士最髙者多力㧞樹以擊地東觀漢記曰盖延字巨卿身長八尺彎弓三百斤以氣勢聞又曰隂興字君陵為期門僕射從上出入常操小盖疾風暴雨屏翳左右泥塗隘狭自投車下脱袴解履渉淖至膝又曰祭彤字次孫力貫弓三百斤入為大僕從至魯帝指子路室曰此太僕室也范曄後漢書曰虞延字子太陳留人延生時有物如疋練直昇天長八尺六寸力能扛鼎又曰董卓膂力過人雙帶兩鞬左右馳射為羗胡所畏魏志曰許禇字仲康長八尺餘大十圍容貌䧺毅勇力絶人漢末聚宗族䜿壁以禦寇賊賊攻壁禇令男女聚石如盖者禇飛石擲之所值皆碎以牛與賊易食牛奔還禇一手逆曳牛尾行百歩賊遂不敢取牛禇後事太祖以力如虎而癡號曰癡虎又曰典韋陳留人形貌魁梧膂力過人又曰吕布字奉先五原人也以驍武給并州刺史丁原為騎都尉便弓馬膂力過人號為飛將英雄記曰袁紹父成字文開名壯健貴戚權豪自大將軍梁兾以下皆與交結恩好言無不從故京師諺曰事不諧詣文開江表傳曰太祖與馬超單馬㑹語超負其多力常置六斛米囊東西走馬輙掣米囊以量太祖輕重許禇瞋目瞪盼超曰聞君有健將虎侯那在太祖指禇超乃止太祖尋知之歎息良久曰㡬為狡虜所欺王隠晉書曰吳彦字士則吳郡}
