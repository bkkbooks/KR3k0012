  - {type: variant, offset: 1617, length: 314, content: 比鄰兒共戲土壤中輒書地作天及日月星辰每荅言說事語皆不常宿學耆人不能折之時年十五來在官舍始讀論語及易便開源布華辤義斐然于時黌上諸生四百餘人皆伏其才琅琊太守單子春雅有才度聞輅一黌之俊欲見之父遣輅造之大會賓客百餘人輅既年少懼失精神請先飲三升清酒然後與言子春大喜便酌酒獨使飲之子春曰吾自欲與輅旗鼓相當於是唱大語之端遂經乎陰陽子春及眾士卒共攻劫請難風起而輅荅對言皆有餘至日向暮酒食不得子春語眾人曰此年少盛有才器聽其言語正似司馬子遊獵之賦何其磥硌雄壯英神秀茂必能明天文地理變化之數於是徐州號之神童傅宣別傳曰宣字世和北地泥陽人年十三而著河橋賦有文義傅嘏別傳曰嘏字昭先年八歲喪母號泣不絕聲自然之哀同於成人年十四始學疑不再問三年中誦五經皆究其義群, SBCK: 交結恩好}
