  - {type: variant, offset: 940, length: 242, content: 姚進先有道徵不就養志于家長彥季彥常受教焉既除喪有先人遺書兄弟相勉諷誦不倦于時蒲坂令許君然造其宅勸使歸魯奉以車二乘辤曰載柩而反則違父遺命舍墓而去則心所不忍君然曰以孫就祖於禮為得願子無疑荅曰若以死有知也祖猶鄰宗族焉父獨留此不已劇乎吾其定矣遂還其居於是甘貧研精墳典十餘年間會徒數百故時人為之語曰魯孔氏好讀經兄弟講誦可不聽學士來者有聲名不過孔氏郍得成郭子曰梁國楊氏子年九歲甚聰慧孔君平詣其父父不在乃呼兒為設菓有楊梅孔指以示兒此實君家菓兒應聲荅曰未聞孔雀是夫子家禽周書曰晉平公使叔譽于周見太子晉, SBCK: 犖自墻外}
