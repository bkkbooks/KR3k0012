  - {type: variant, offset: 2760, length: 5, content: 杜育童孺奇, krp: 元淑字買仁有膂力彎弓三百斤善騎射又曰陳留王䖍姿氣魁傑膂力絶人毎以常矛短乃大作之猶患其輕後綴銅鈴於刃下其弓力倍如常人以其殊異於丗䖍常臨陣以矟刺人遂貫胷髙舉以示於衆又嘗以一手頓矟於地騎馬僞退敵人争取引不能出䖍引弓射之一箭殺其二人揺矟之徒亡魄奔散徐乃命人取矟而反毎從征伐乃率偏將先登䧟陣勇冠當時又曰衛王儀長七尺五寸容皃甚偉羙鬢髯有笇略少能舞劒騎射膂力過人弓將十石陳留公䖍矟大見称異時人云衛王弓桓王矟也又曰韓茂字元輿嘗從太宗征丁零時大風旍旗皆偃仆茂於馬上持幢𥘉不傾倒太宗訝其膂力又曰伊馥代人也善射多力曵牛却行三國典略曰周賀若敦嘗從太祖校獵於甘泉宫圍人不齊獸多越逸太祖大怒圍内唯有一鹿俄亦突圍而走敦躍馬馳之鹿上東山敦弃馬歩逐山半掣之而下太祖大恱周書曰韓雄河東垣人也少敢勇魁岸膂力絶人工騎射有將帥}
  - {type: punctuation, offset: 2764, content: ，, id: KR3k0012_CHANT_386-bkkpn856}
  - {type: 'tls:seg', offset: 2764, content: '', id: KR3k0012_CHANT_386-28a.11}
  - {type: variant, offset: 2766, length: 2, content: 博學, krp: 略又曰竇熾字光成性寛明有偉略羙鬢髯身長八尺二寸善騎射膂力過人隋書曰魚俱羅馮翊下邽人也身長八尺膂氣雄壯言聞數百歩墨子曰紂有勇力之人生捕兕虎指畫殺人晏子曰昔夏之衰也有推侈大戯殷之衰也有費仲惡來足走千里手制兕虎子思子曰中行穆伯手捕虎列子曰公儀伯以力聞諸侯周宣王備禮聘之公儀伯至觀形懦夫也宣王心惑曰汝之力何以對曰臣之力}
  - {type: punctuation, offset: 2768, content: ，, id: KR3k0012_CHANT_386-bkkpn857}
  - {type: 'tls:seg', offset: 2768, content: '', id: KR3k0012_CHANT_386-28a.12}
  - {type: variant, offset: 2769, length: 2, content: 著文, krp: 折春螽之服勝秋蟬之翼王作色曰吾之力者能分犀兕之革曵九牛之尾猶憾其弱公儀伯曰臣之師有南丘子者力無敵於天下而六親弗知未嘗用其力故也又曰魏黒夘殺丘邴}
  - {type: punctuation, offset: 2772, content: ，, id: KR3k0012_CHANT_386-bkkpn858}
  - {type: 'tls:seg', offset: 2772, content: '', id: KR3k0012_CHANT_386-28a.13}
  - {type: variant, offset: 2772, length: 4, content: 心解性達, krp: 邴章之子來丹謀復仇丹氣甚猛形甚露計粒而食從風而趨誓手劒以屠黒夘黒夘悍志絶衆力抗百夫筋骨皮肉非人類也延頸承刃披胸受矢鋩鍔摧屈而體}
  - {type: punctuation, offset: 2776, content: ，, id: KR3k0012_CHANT_386-bkkpn859}
  - {type: 'tls:seg', offset: 2776, content: '', id: KR3k0012_CHANT_386-28a.14}
  - {type: variant, offset: 2777, length: 8, content: 所不綜一時稱為舞, krp: 痕負其才力視來丹猶鶵鷇也孟子曰有馮婦善搏虎尸子曰中黄伯余左執太行之獶音猱右搏雕虎唯象未與吾試願爲牛與象鬪以自試又曰飛廉惡來力角犀兕勇搏熊虎也孔叢子曰孔鮒謂陳王曰梁人有}
  - {type: punctuation, offset: 2780, content: ，, id: KR3k0012_CHANT_386-bkkpn860}
  - {type: 'tls:seg', offset: 2780, content: '', id: KR3k0012_CHANT_386-28a.15}
  - {type: variant, offset: 2786, length: 1, content: 杜, krp: 由者其力扛鼎伎巧過人骨騰肉飛淮南子曰}
