  - {type: variant, offset: 2794, length: 0, content: '', krp: 紂之卒握炭流湯者十八人崇侯虎等舉五百石重沙二十四人山海經曰中曲之山有懷木食之多力穆天子傳曰有虎在於葭中七萃之士曰髙奔戎生捕以獻天子乃命爲㭱而畜之東虞是曰虎牢吕氏春秋曰孔子之勁能招國門之關招舉也淮南子同也又曰趙氏中山之多力者曰吾兵衣鐵甲操䥫杖以戰所擊無不碎所衝無不䧟以車投車以人投人春秋外傳曰少室爲簡子右聞牛談有力請與之戲不勝致右焉簡子許之使少室爲宰曰知賢而讓可以訓矣蜀王夲紀曰秦王知蜀王好色乃獻女五人蜀王遣五丁迎女還梓潼見大虵入山穴一丁引其尾不出五丁共引虵山乃崩說苑曰勇士孟賁氷行不避蛟龍陸行不避虎狼發怒吐氣聲響動於天王充論衡曰語稱紂力能索鐵伸鈎撫梁易柱言其多力也風俗通曰頴川}
  - {type: variant, offset: 2795, length: 1, content: 既, krp: 欽字孟孝呉楚反與亞夫常爲前鋒䧟陣潰圍傍人觀曰壯哉此君欽聞自矜遂死軍方言曰蹶膂力也東齊曰䠇宋魯曰膂膂力也郭璞曰律多力皃通俗大曰強徤曰馶音翅曹肇別傳曰肇之弟繤}
  - {type: variant, offset: 2798, length: 11, content: 容為兒童郡功曹游殷察異, krp: 思力舉千鈞明帝寵}
