  - {type: variant, offset: 2044, length: 0, content: '', SBCK: 息良乆曰幾爲狡虜所欺王隱晉書曰呉彦字士則呉郡人有文武材幹長八尺餘膂力如虎晉中興書曰􅁃闡父東以勇力聞丗祖時西域遣一使胡趫䟁音巢勇果自謂無敵晉人不敢與校丗祖募求勇敢之士唯東應選遂懪殺胡勇聞殊俗晉令曰選三部司馬皆限力舉千二百斤以上前驅司馬取便大㦸由基司馬取能挽一石七㪷以上弓沈約宋書曰丁旿驍勇有氣力時人爲之語曰勿䟦扈付丁旿蕭子顯齊書曰張敬兒爲持節督雍梁二州刺史部仵泊􅃆口敬児舴艋過江詣晉熈王爕中江遇舡覆左右丁壯者各走餘二小吏没䑳下呼叫張敬児兩掖挾之隨舡覆仰常得在水上如此飜覆行數十里方得迎接又曰東昏侯有膂力能檐白虎幢自製雜色錦􅇊衣綴以金花玉鏡衆寳逞諸意態崔鴻十六國春秋􅁗録曰姚興將軍王奚仲驍悍有膂力去其弓矟持短兵出堡與赫連勃勃力戰衆多傷勃勃乃羈縻圍之斷其水路堡民執奚仲出降勃謂奚仲曰卿忠臣也朕方與卿共平天下奚曰􅀂蒙大恩速死爲惠乃與所親數十人自刎而死又前趙録曰郭黙字􅀇雄河内懷人丗以屠沽爲業黙壯勇拳捷能貫甲跳三丈壍時人咸異之}
