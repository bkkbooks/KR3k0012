  - {type: variant, offset: 659, length: 239, content: 曰今楚軍南陽趙伐高堂燕人在遼國亡在旦暮先生將奈何田巴曰無奈何魯連曰危不能為安亡不能為存無貴學士矣今先生之言有似梟鳴出聲人皆惡之願先生勿復談也田巴曰謹受教明日見徐劫曰先生之駒乃飛兔騕䮍也豈特千里哉孔叢子曰孟子居尚幼請見子思子思見之甚悅其志命子上侍唑焉禮敬子居甚崇子上不願也客退子上請曰白聞士無介不見女無媒不嫁孟孺子無介而見大人說敬之白也未喻敢問子思曰然吾昔從夫子於郯遇程子於途傾蓋而語終日而別命子路將束帛贈焉以其道同於君子也今孟子居孺子也言稱堯舜性樂仁義世所希有也事之猶可況加敬乎, SBCK: ''}
