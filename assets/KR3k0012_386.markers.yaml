  - {type: variant, offset: 3081, length: 1, content: 疑, SBCK: 入正是張弥勒􅀏曰降児能尓正自竒徤乃赦之趙書曰汲桑清河貝丘人年二十餘力扛百鈞呼聞數里時人服之又曰劉靈陽平人年二十餘常期役於縣力制奔牛走及馳馬後魏書曰孝文帝有膂力年十餘􅀊能以指彈碎羊髀骨又曰元淑字買仁有膂力彎弓三百斤善􅀐射又曰陳留王䖍姿氣魁傑膂力絶人毎以常矛短乃大作之猶患其輕後綴銅鈴於刃下其弓力倍如常人以其殊異於丗䖍常臨陣以矟刺人遂貫胷髙舉以示於衆又嘗以一手頓矟於地􅀐馬僞退敵人争取引}
  - {type: page-break, offset: 3081, content: '', id: KR3k0012_SBCK_386-5a}
  - {type: variant, offset: 3081, length: 1, content: 疑, WYG: 入正是張彌勒笑曰降兒能爾正是竒健乃赦之趙書曰汲桑清河貝邱人年二十餘力扛百鈞呼聞數里時人服之又曰劉靈陽平人年二十餘常期役於縣力制奔牛走及馳馬後魏書曰孝文帝有膂力年十餘嵗能以指彈碎羊髀骨又曰元淑字買仁有膂力彎弓三百斤善騎射又曰陳留王䖍姿氣魁傑膂力絶人毎以常矛短乃大作之猶患其輕後綴銅鈴於刃下其弓十倍如嘗人以其殊異於世䖍嘗臨陣以矟刺人遂貫胷髙舉以示於衆又嘗以一手頓矟於地騎馬偽退敵人争取引}
  - {type: page-break, offset: 3081, content: '', id: KR3k0012_WYG_386-8a, image: WYG0896/WYG0896-0428c.png}
  - {type: page-break, offset: 3081, content: '', id: KR3k0012_WYG_386-8b, image: WYG0896/WYG0896-0428d.png}
  - {type: variant, offset: 3083, length: 0, content: '', SBCK: 能出䖍引弓射之一箭殺其二人揺矟之徒亡魄奔散徐乃命人取矟而反毎從征伐乃率偏將先登䧟陣勇冠當時又曰衛王儀長七尺五寸容皃甚偉羙􅁂髯有笇略少能舞劒􅀐射膂力過人弓將十石陳留公䖍矟大見称異時人云衛王弓桓王矟也又曰韓茂字元輿嘗從太宗征丁零時大風旍旗皆偃仆茂於馬上持幢􅀄不傾倒太宗訝其膂力又曰伊馥代人也善射多力曵牛却行三國典略曰周賀􅀂敦嘗從太祖校獵於甘泉宫圍人不齊獸多越􅇣太祖大怒圍内唯有一鹿俄亦突圍而走敦躍馬馳之鹿上東山敦弃馬歩逐山半掣之而下太祖大恱周書曰韓雄河東垣人也少敢勇魁岸膂力絶人工騎射有將帥才略又曰竇熾字光成性寛明有偉略羙􅁂髯身長八尺二寸善􅀐射膂力過人隋書曰魚俱羅馮翊下邽人也身長八尺膂氣雄壯言聞數百歩墨子曰紂有勇力之人生捕兕虎指畫殺人晏子曰昔夏之衰也有推侈大戯殷之衰也有費仲惡來足走千里手制兕虎子思子曰中行穆伯手捕虎列子曰公儀伯以力聞諸侯周宣王備禮聘之公儀伯至觀形懦夫也宣王心惑曰汝之力何以對曰臣之力能折春螽之服勝秋蟬之翼王作色曰吾之力者能分犀兕之革曵九牛之尾猶憾其弱公儀伯曰臣之師有南丘子者力無敵於天下而六親弗知未嘗用其力故也又曰魏黒夘殺丘邴章邴章之子來丹謀復仇丹氣甚猛形甚露計粒而食從風而趨誓手劒以屠黒夘黒夘悍志絶衆力抗百夫筋骨皮肉非人􅀋也延頸承刃披􅅐}
