  - {type: 'tls:seg', offset: 1948, content: '', id: KR3k0012_CHANT_386-17a.6}
  - {type: variant, offset: 1949, length: 2, content: 文奇, krp: 玄雄河内懷人丗以屠沽爲業黙壯勇拳捷能貫甲跳三丈壍時人咸異之曰此児必興郭氏河内陸允丗之豪民望見以女妻之又曰陳安字虎侯家丗農民安少慷慨曰大丈夫當乗軒杖節安能乆執犁鋤乎遂東遊京師頗學書笇讀魏書見許禇而慕之乃自字虎侯遇晉室喪亂遂慿結司馬賔驍壯果毅武幹過人多力善射持七尺刀貫甲奔及馳馬又前秦録曰張蚝音刺夲姓弓上黨泫氏人也泫玄字膂力過人能却曵牛走張平愛而子之媱於平妾知而責之蚝慙割隂以自誓遂爲閹人堅甚寵之常侍左右終爲名將所在}
