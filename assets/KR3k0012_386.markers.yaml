  - {type: variant, offset: 1829, length: 223, content: 賦何其磥硌雄壯英神秀茂必能明天文地理變化之數於是徐州號之神童傅宣別傳曰宣字世和北地泥陽人年十三而著河橋賦有文義傅嘏別傳曰嘏字昭先年八歲喪母號泣不絕聲自然之哀同於成人年十四始學疑不再問三年中誦五經皆究其義群言無不綜覽何禎別傳曰禎廬江潛人父他字文奇有俊才早卒禎在孕而孤生遇荒亂歸依舅氏齠齓乃追行喪哀泣合禮鄉邑稱焉十餘歲耽志博覽研精群藉名馳淮泗杜祭酒別傳曰君在孩抱之中異於凡童舉宗奇之年六七歲在縣北郭與小兒輩為竹馬戲有車行老公停車視之歎曰此有奇相吾恨不, WYG: 豪民望}
