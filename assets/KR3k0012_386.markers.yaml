  - {type: variant, offset: 35, length: 556, content: 趙氏故以百藥為之名七歲解屬文父友齊中書舍人陸乂馬元熙嘗造德林讌集有讀徐陵文者云既取成周之禾將刈琅耶之稻並不知其事百藥時侍立進曰傳稱鄅人藉稻杜預注云鄅國在瑯瑯開陽乂等大驚異之又曰禇亮字希明幼聰敏好學善屬文博覽無所不至經目必記於心喜遊名賢尤善談論年十八詣陳僕射徐陵與商搉文章深異之陳後主聞而召見使賦詩江總及諸詞人在坐莫不推善又曰陳叔達陳宣帝子年十餘歲侍宴賦詩十韻援筆便就僕射徐陵甚奇之又曰劉仁軌尉氏人也幼少恭謹好學遇隋末喪亂不遑專習每行坐所在輒書空畫地由是博涉文史又曰權德輿生四歲能屬詩七歲居父喪以孝聞十五日文數百篇編為童蒙集集十卷名聲日大又曰蔣乂字德源史官吳兢外孫以外舍富墳史幼便記覽不倦七歲時誦庾信哀江南賦數遍而成誦在口以聰悟強力聞於親黨間又曰高郢子定幼聰警絕倫七歲時讀尚書湯誓閭郢曰奈何以臣伐君郢曰應天順人不為非道又問曰用命賞于祖不用命戮于社是順人乎父不能對列子曰孔子東遊見兩小兒辯日問其故一小兒曰我以為日始出去人近而日中時遠一小兒曰我以為日出時遠而日中近一兒曰初出大如車蓋及中才如盤蓋此不為遠者小而近者大乎一兒曰日初出蒼蒼涼涼及其中如探湯此不為近者熱而遠者涼乎孔子不能決兩小兒笑曰孰為汝多知乎尸子曰蒲衣生八年舜讓以天下周王太子晉生八年而服師曠魯連子曰齊之辯士田巴辯於狙丘議於稷下毀五帝罪三王訾五伯離堅白合同異, SBCK: ''}
