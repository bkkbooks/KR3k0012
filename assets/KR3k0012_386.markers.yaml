  - {type: variant, offset: 1384, length: 2, content: 陳煒, SBCK: 仲尼父叔梁紇也狄虒弥建大車之輪而蒙之以甲以爲櫓狄虒弥魯人蒙覆也櫓大楯也左執之右拔㦸以成一隊百人曰隊孟獻子曰詩所謂有力如虎者也主人縣布堇父登之及堞而絶之墜則又縣之􅂫而復上者三主人辭焉乃退又哀公下曰楚白公作亂劫惠王子西以􅃑掩靣而死子期曰昔者吾以力事君不可以弗終抉豫章以殺人而}
