  - {type: variant, offset: 3157, length: 3, content: 淳于長, SBCK: 少室爲簡子右聞牛談有力請與之戲不勝致右焉簡子許之使少室爲宰曰知賢而讓可以訓矣蜀王夲紀曰􅁗王知蜀王好色乃獻女五人蜀王遣五丁迎女還梓潼見大虵入山穴一丁引其尾不出五丁共引虵山乃崩說􅁐曰勇士孟賁氷行不避蛟龍陸行不避虎狼發怒吐氣聲響動於天王充論衡曰語稱紂力能索鐵伸鈎撫梁易柱言其多力也風俗}
  - {type: variant, offset: 3157, length: 3, content: 淳于長, WYG: 少室為簡子右聞牛談有力請與之戲不勝致右焉簡子許之使少室為宰曰知賢而讓可以訓矣蜀王本紀曰秦王知蜀王好色乃獻女五人蜀王遣五丁迎女還梓潼見大虵入山穴一丁引其尾不出五丁共引蛇山乃崩説苑曰勇士孟賁水行不避蛟龍陸行不避虎狼發怒吐氣聲響動於天王充論衡曰語稱紂力能索鐵伸鈎撫梁易柱言其多力也風俗}
