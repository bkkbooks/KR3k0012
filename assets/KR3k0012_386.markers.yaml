  - {type: variant, offset: 2009, length: 643, content: 中異於凡童舉宗奇之年六七歲在縣北郭與小兒輩為竹馬戲有車行老公停車視之歎曰此有奇相吾恨不見徐邈別傳曰君諱邈字仙民東莞人歧薿朗慧聰悟七歲涉學詩賦成章趙至別傳曰至字景真代郡人流客緱氏令新之官至年十三與母共道傍觀母曰汝先世本非微賤家也世亂流離遂為士仵耳後能至此不至荅曰可耳便求就師讀書早起聞父耕叱牛聲釋書而泣師問其故荅曰自傷不能致榮使老父不免勤苦師大異之稱其當為奇器傅暢自敘曰暢字洪迎年四歲散騎常侍扶風曾叔虎以德量喜與余戲常解衣褶被脫余金環與侍者謂余當恡惜之而經數日不索遂於此見名言論甚重孝子傳曰華光字榮祖彭城人年七歲欲見父像求畫其父形像朝夕拜謁母有病輒呼天禱祠母即瘳愈每得珍甘置父像前劉向別傳曰楊信字子烏雄第二子幼而明慧雄筆玄經不會子烏令作九數而得之雄又疑易羝羊觸藩彌日不就子烏曰大人何不云荷戟入榛列子傳曰孔融被誅初女七歲男九歲以其幼弱得寄他舍主人有遺肉汁男渴而飲之女曰今日之渴豈得久活何賴知肉味乎兄號泣而止或言於曹操遂盡殺之及收至女謂兄曰若死者有知得見父豈非至願延頸就刑顏色不變文士傳曰張惇字子純與張儼及朱異俱童少往見驃騎將軍朱據聞三人才名欲試之曰為吾賦一物然後坐儼賦犬曰守則有威出則有獲韓盧宋鵲書名竹帛純賦席曰席為冬設簟為夏施揖讓而唑君子攸宜異賦弩曰南嶽之幹鍾山之銅應機命中獲隼高墉據大欣悅又曰桓驎字元鳳沛國龍亢人伯父焉知名官至太尉驎精敏年十三四在焉唑有宿客為詩曰甘羅十二楊烏九齡昔有二子今則桓生參差等蹤異世齊名驎即應聲荅曰邈矣甘羅超等絕倫卓彼楊烏命世稱賢嗟予蠢弱殊才侔年仰慚二子俯媿過言, krp: ''}
