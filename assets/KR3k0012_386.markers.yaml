  - {type: variant, offset: 1389, length: 0, content: '', SBCK: 范雎說􅁗昭王曰烏獲任鄙之力成荆孟賁慶忌夏育之勇又曰張良常學淮陽東見滄海君得力士爲鐵椎重百二十斤􅁗皇東遊良與客俱擊􅁗皇􅀶浪沙中悞中副車􅁗皇大怒大索天下求賊甚急張良乃更姓名亡匿於下邳漢書曰項羽在鴻門沛公與張良在坐樊噲聞事急乃抜楯入􅀄入營營衛止噲噲直橦入立帳下羽見之問爲誰良曰沛公叅乗樊噲也羽曰壯士賜之巵酒􅇾肩噲旣飲酒抜劒切肉食之羽曰能復飲乎曰臣死且不辭豈特巵酒也又曰甘延夀字君况北地郁郅}
  - {type: variant, offset: 1389, length: 0, content: '', krp: 范雎說秦昭王曰烏獲任鄙之力成荆孟賁慶忌夏育之勇又曰張良常學淮陽東見滄海君得力士爲鐵椎重百二十斤秦皇東遊良與客俱擊秦皇博浪沙中悞中副車秦皇大怒大索天下求賊甚急張良乃更姓名亡匿於下邳漢書曰項羽在鴻門沛公與張良在坐樊噲聞事急乃抜楯入𥘉入營營衛止噲噲直橦入立帳下羽見之問爲誰良曰沛公叅乗樊噲也羽曰壯士賜之巵酒彘肩噲旣飲酒抜劒切肉食之羽曰能復飲乎曰臣死且不辭豈特巵酒也又曰甘延夀字君况北地郁郅}
  - {type: variant, offset: 1390, length: 0, content: '', SBCK: 少以良家子善􅀐射爲羽林投石拔距絶於等倫常超踰羽林亭樓由是遷爲郎又曰淮南王長力能扛鼎廣陵王􅇧空手􅅮熊羆又曰上官桀從武帝上甘泉天大風車不得行解盍授桀桀奉蓋雖風常屬車兩下蓋御上竒其才力遷未央廐令又曰彭城王翌身長八尺七寸驍幹過人能手舉殿梁超過平陽楚漢春秋曰項梁甞隂養士最髙者多力拔樹以擊地東觀漢記曰蓋延字巨卿身長八尺彎弓三百斤以氣􅀔聞又曰隂興字君陵爲期門僕射從上出入常操}
