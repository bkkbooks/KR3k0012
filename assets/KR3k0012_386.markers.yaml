  - {type: variant, offset: 1468, length: 341, content: 魏武帝讀兵書有所未解試以問晏晏分散所疑無不冰釋邴原別傳曰原字根矩十一喪父家貧早孤鄰有書舍原過其傍而泣師問曰童子何罪原曰一則願其不孤二則羨其得學師亦哀原之言而為之曰童子茍有志我徒相教不求費也於是遂就書一歲之間誦孝經論語管輅別傳曰輅年八九歲便喜仰視星辰得人輒問其名夜不肯寐自言家雞野鵠猶尚知時況於人乎與比鄰兒共戲土壤中輒書地作天及日月星辰每荅言說事語皆不常宿學耆人不能折之時年十五來在官舍始讀論語及易便開源布華辤義斐然于時黌上諸生四百餘人皆伏其才琅琊太守單子春雅有才度聞輅一黌之俊欲見之父遣輅造之大會賓客百餘人輅既年少懼失精神請先飲三升清酒然後與言子春大喜便酌酒獨使飲之子春曰吾自欲與輅旗鼓相當於是唱大語之端遂經乎陰陽子春及眾士卒共攻劫請難風起而輅荅對言皆有餘至日向暮酒食不得子春語眾人, WYG: ''}
