  - {type: variant, offset: 2968, length: 193, content: 叔度世貧賤父為牛醫頴川荀淑嘗至頴陽遇憲於逆旅時年十四淑竦然異之揖與語移日不能去謂曰子吾之師表也既而前至袁閬所曰子國有顏子寧識之乎閬曰君見叔度耶零陵先賢傳曰周不疑字文直長安人始嬰孩時已有奇異至年十三曹公聞之欲拜識既見即以女妻之不疑不受時有白雀瑞儒林並已作頌不疑見操授紙筆立令復作操異而奇之廣州先賢傳曰董正字伯和南海人少有令姿貧寒不戚耽意術籍志在規俗年十五通毛詩三禮春秋會稽先賢傳曰淳于長通, krp: 季龍勒從弟}
