  - {type: variant, offset: 3080, length: 0, content: '', SBCK: 又曰陳安字虎侯家丗農民安少慷􅁣曰大丈夫當乗軒杖節安能乆執犁鋤乎遂東遊京師頗學書笇讀魏書見許禇而慕之乃自字虎侯遇晉室喪亂遂慿結司馬賔驍壯果毅武幹過人多力善射持七尺刀貫甲奔及馳馬又前􅁗録曰張蚝音刺夲姓弓上黨泫氏人也泫􅀇字膂力過人能却曵牛走張平愛而子之媱於平妾知而責之蚝慙割隂以自誓遂爲閹人堅甚寵之常侍左右終爲名將所在有殊功稱鄧羗張蚝萬人敵也又後趙録曰張珎字巨􅁗汲郡人晉永嘉中與梁臣戍武德城石勒攻之城潰弥隨例當坑大呼曰官當活徤児何以殺也曰有何捷事而求活也弥曰武德西城上大聲督時警備嚴設使賊}
  - {type: variant, offset: 3080, length: 0, content: '', WYG: 又曰陳安字虎侯家世農民安少慷慨曰大丈夫當乗軒杖節安能久執犁鋤乎遂東遊京師頗學書筭讀魏書見許禇而慕之乃自字虎侯遇晉室䘮亂遂憑結司馬賔驍壯果毅武幹過人多力善射持七尺刀貫甲奔及馳馬又前秦録曰張蚝本姓弓上黨法氏人也膂力過人能却曳牛走張平愛而子之媱於平妾知而責之蚝慙割隂以自誓遂為閹人堅甚寵之常侍左右終為名將所在有殊功稱鄧羗張蚝萬人敵也又後趙録曰張彌字巨秦汲郡人晉永嘉中與梁臣戍武徳城石勒攻之城潰彌隨例當坑大呼曰官當活健兒何以殺也曰有何健事而求活也彌曰武徳西城上大聲督時警備嚴設使賊}
