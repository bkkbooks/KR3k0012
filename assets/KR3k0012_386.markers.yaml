  - {type: variant, offset: 713, length: 365, content: 似梟鳴出聲人皆惡之願先生勿復談也田巴曰謹受教明日見徐劫曰先生之駒乃飛兔騕䮍也豈特千里哉孔叢子曰孟子居尚幼請見子思子思見之甚悅其志命子上侍唑焉禮敬子居甚崇子上不願也客退子上請曰白聞士無介不見女無媒不嫁孟孺子無介而見大人說敬之白也未喻敢問子思曰然吾昔從夫子於郯遇程子於途傾蓋而語終日而別命子路將束帛贈焉以其道同於君子也今孟子居孺子也言稱堯舜性樂仁義世所希有也事之猶可況加敬乎又曰子和為臨晉令寢疾不瘳乃命其二子留葬焉二子長曰長彥年十有二次曰季彥年十歲父友西洛人姚進先有道徵不就養志于家長彥季彥常受教焉既除喪有先人遺書兄弟相勉諷誦不倦于時蒲坂令許君然造其宅勸使歸魯奉以車二乘辤曰載柩而反則違父遺命舍墓而去則心所不忍君然曰以孫就祖於禮為得願子無疑荅曰若以死有知也祖猶鄰宗族焉父獨留此不已劇乎吾其定矣遂還其居於是甘貧研精墳典十餘年間會徒數百故, WYG: 氣力}
