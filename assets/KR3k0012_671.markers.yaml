  - {type: punctuation, offset: 60, content: 「, id: KR3k0012_CHANT_671-bkkpn19}
  - {type: variant, offset: 60, length: 0, content: '', SBCK: 裴君受支子元服食茯苓之法焦山蔣山人所􅀓能長生乆視修合之際湏謹宻齊戒裴君又受支子元胡麻之法蔣先生惟服此二方位爲仙眞此二方書與世少異裴君所祕用者驗而有實凢服伏苓胡麻之方甚衆此法旣眞人所經用眞人手所書記必當最神勝於諸法􅀂能常服仙道可期但患人服未覺甚益便不服之故少有尅終之効􅀂體先不虚損及年少之時當服伏苓􅀂年三十歳當服胡麻蔣先生日此二方是大有之要法長生神仙之祕寳也大有者謂委羽山洞天大有宫中之書法彼人當有服之者寳玄經云伏苓治少胡麻治老合以齊戒服以朝早卉醴華􅃾宻也百卉之花以成腴醴五公謂爲卉醴華英火精水寳火精伏苓也性􅀬而合火伏苓則其精矣水寳胡麻也性冷色黒而含津澤故謂之水寳和以爲一還精歸寳此之謂也裴君以年少時所用故服伏苓也清虚眞人年十二便受此方于時未必虧損所以云服伏苓夜視有光也二方同耳皆長年之竒方也􅀂合二物倍用宻共煎搗爲丸乃隹按青精方伏苓禁食酸此專用伏苓不必禁酸味又曰清虚王眞人授南岳魏夫人􅂖仙甘草丸方魏夫人少多病疾王君於脩武縣中􅁻夫人曰學道者當去病先令五藏充盈耳目聦}
  - {type: page-break, offset: 60, content: '', id: KR3k0012_SBCK_671-3b}
  - {type: variant, offset: 60, length: 1, content: 明, WYG: 雲芝英不擇日而脩合治三尸伏疾服食一劑則榖蟲死二劑則三尸枯若道士固食榖者乃冝服也榖蟲既㓕使人食榖而無病過飽而不傷去尸蟲之藥甚多莫出於此昔修羊公稷丘子東方朔崔文子商丘子但服此藥以協榖而皆得仙也漢景帝及武帝求索東方朔修羊公秘方終不𫝊又曰北海公涓子名姓不顯青童君弟子蘇林之師也少餌术黄精授守一𤣥丹之道在世三千八百年𤣥洲上卿蘇林字子𤣥涓子弟子也固紫陽之師濮陽曲水人年二十餘辭家學道後授三元真一逰遍人間又曰太清正一真人張道陵沛國人本}
  - {type: page-break, offset: 60, content: '', id: KR3k0012_WYG_671-7b, image: WYG0899/WYG0899-0046d.png}
