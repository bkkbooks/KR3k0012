  - {type: variant, offset: 64, length: 2, content: 仙卿, WYG: 滓終嵗不飲而容色更鮮又云吸引之易感無貴於七曜修行之早成不過於九道保守之堅固莫踰於鎮生衛用之急防無超於渾神藥石之速効豈勝於青精祈拜之感孰賢於朝謝也又曰}
