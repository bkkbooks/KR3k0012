  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_671-1a.2}
  - {type: variant, offset: 6, length: 0, content: '', SBCK: 下登眞隱訣曰太極眞人昔以神方一首傳長里先生先生姓薛自號長里周武王時人也先生以傳西域揔眞王君即金闕聖君之上宰也按䭀飯方受西梁眞人所傳時在大宛北谷今長里傳九轉乃周􅀄間是爲受服䭀飯三四百年後乃合此丹蓋司命劒經序也惣眞王君傳太元眞人即東卿司命茅大君也以漢武帝天漢三年受之時年四十八後又以付二弟并各賜成丹一劑司命旣傳二弟而不載於此當以王君命使付非正次傳授也自二君以後惟定籙與楊君使示許長史并􅁺乃至于今故漢晉之世諸學道人各六合服金液昇仙無言九轉則此眞人方下授以來未有營之者受經皆登壇盟誓割帛跪金爲敢宣之約敢不敢也前盟則金龍玉魚後代止布帛而巳違􅉀􅀒信三祖􅀗考於水官謂妄傳非人也傳授湏齋盟用金玉偃鐶以代剪髮㰱血之誓也欲合九轉先作神釡當用滎陽長沙豫章土釡謂瓦釡也昔黄帝火九鼎於荆山太清}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_SBCK_671-1b}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 下登真隠訣曰太極真人昔以神方一首傳長里先生先生姓薛自號長里周武王時人也先生以傳西域緫真王君即金闕聖君之上宰也按􅏇飯方受西梁真人所傳時在大宛北谷今長里傳九轉乃周初間是為受服飢飯三四百年後乃合此丹盖司命劒經序也總真王君傳太元真人即東卿司命茅大君也以漢武帝天漢三年受之時年四十八後又以付二弟并各賜成丹一劑司命既傳二弟而不載於此當以王君命使付非正次傳授也自王君以後惟定録與楊君使示許長史并掾乃至于今故漢晉之世諸學道人各合服金液昇仙無言九轉則此真人方下授以來未有營之者受皆登壇盟誓割帛跪金為敢宣之約敢不敢也前盟則金龍玊魚後代止布帛而已違盟負信三祖獲考於水官謂妄傳非人也傳授湏齋盟用金玉偃鐶以代剪髮㰱血之誓也欲合九轉先作神釡當用榮陽長沙豫章土釡謂瓦釡也昔黄帝火鼎於荆山太清}
