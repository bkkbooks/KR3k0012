  - {type: variant, offset: 61, length: 0, content: '', SBCK: 乃可存思服御耳按王君􅀄降眞之時是晉元康九年冬於汲郡脩武縣廨内夫人時應年四十八也夫人按而服之及隱影去世之時年八十三歳也此晉成帝咸和八年甲午歳則夫人從服藥巳來三十五年矣其間或不必常相續也了無復他患先􅐄都愈髪不白齒不落耳目聦明常月中書道家章符夫人旣爲女官􅀕酒故猶以章符示迹耳存思入室動百日數十日了不覺勞旣在俗世家事相亂欲脩齋研誦便託以入室也食飲通快四體充盈即甘草丸之驗也謂之􅂖仙方脾胃旣和則能食而不害膚充而精察起居調節無澁利之患矣食􅂖而得仙故謂之􅂖仙也此夲九宫右眞公郭少金撰集此方諸宫乆巳有之至郭氏更撰集次第序說所治耳猶如青精乃太素之法而今謂太極眞人也學仙道者冝先服之昔少金以此方授介象又授劉根張陵等數十人亦稱此丸爲少金丸冝齋戒修合並無毒無所禁食一年}
