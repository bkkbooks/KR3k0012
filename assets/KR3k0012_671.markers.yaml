  - {type: variant, offset: 61, length: 0, content: '', krp: 乃可存思服御耳按王君𥘉降眞之時是晉元康九年冬於汲郡脩武縣廨内夫人時應年四十八也夫人按而服之及隱影去世之時年八十三歳也此晉成帝咸和八年甲午歳則夫人從服藥巳來三十五年矣其間或不必常相續也了無復他患先疹都愈髪不白齒不落耳目聦明常月中書道家章符夫人旣爲女官祭酒故猶以章符示迹耳存思入室動百日數十日了不覺勞旣在俗世家事相亂欲脩齋研誦便託以入室也食飲通快四體充盈即甘草丸之驗也謂之糓仙方脾胃旣和則能食而不害膚充而精察起居調節無澁利之患矣食糓而得仙故謂之糓仙也此夲九宫右眞公郭少金撰集此方諸宫乆巳有之至郭氏更撰集次第序說所治耳猶如青精乃太素之法而今謂太極眞人也學仙道者冝先服之昔少金以此方授介象又授劉根張陵等數十人亦稱此丸爲少金丸冝齋戒修合並無毒無所禁食一年}
  - {type: variant, offset: 62, length: 2, content: 洞為, SBCK: 益無責旦夕之効也俗人亦皆可服之又曰雲芝英不擇日而修合治三尸伏疾服食一劑則􅂖虫死則三尸枯􅀂道士固食􅂖者乃冝服也􅂖虫旣滅使人食􅂖而無病過飽而不傷去尸虫之藥甚多莫出於此昔修羊公稷丘子東方朔崔文子啇丘子但服此藥以恊􅂖而皆得}
  - {type: variant, offset: 62, length: 1, content: 洞, WYG: 儒漢延光四年始學道也漢末於鳴鵠山仙官來降授以正一盟威之教施化領民法號天師即真誥云奉張道陵正一平氣者是也天師靈寳五符序及太清金液丹序並佳筆别有傳已行於世又曰服五石者能一日九食百闗流淳亦能終嵗不饑逺老還嬰遇食則食亦平真上仙之妙方斷榖之竒靈也陶隠君注云雖一日九食而吸饗流變不}
