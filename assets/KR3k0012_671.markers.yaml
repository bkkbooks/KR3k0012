  - {type: variant, offset: 66, length: 0, content: '', SBCK: 􅂫林字子􅀇㳙子弟子也同紫陽之師濮陽曲水人年二十餘辭家學道後授三元眞一遊變人間又曰太清正一眞人張道陵沛國人夲大儒漢延光四年始學道至漢未於鳥鵠山仙官來降授以正一盟威之教施化領民之法號天師即眞誥云奉張道陵正一平氣者是也天師靈寳伍符序及太清金液丹序並佳筆別有傳巳行於世又曰}
