  - {type: variant, offset: 1544, length: 1376, content: 所服而仙者也又曰長生制在大藥非祠醮之所定也秦漢二代大興祈禱所祭太一五帝陳寶八神之屬動費億萬絕無所益況疋夫無德欲以三牲妄祝以祈延年惑亦甚矣又曰合金丹之大藥鍊八石之氣英者尤忌凡俗聞見則仙物不成或云上士得道於軍旅中士得道於都市下士得道於山林此謂仙藥已成未欲輕舉雖三軍兵刃不能傷都市凶禍不能加下士未及於此故上山林耳古之道士飛鍊神藥必入名山又按入山經可以精思修餌其藥有太華恒霍嵩少太白終南女凡地肺王屋抱犢安丘衡灊青城峨嵋雲臺羅浮陽駕黃金大小天咸蓋竹括蒼四望山皆是正神在其中其上皆生芝草可以避大兵大水不但中以合藥也若有道者登之則此山之神必助之為福其藥必成若不登此諸山者海中大島嶼亦可合藥又曰余師鄭君年出八十先鬚髮班白數年間復黑又顏色豐澤能引強弩日行數百里飲酒二斗不醉上山又體力輕便年少追之不及飲食與凡人無異又不見其絕穀余問先生隨之弟子黃章言鄭君常從豫章還於浦中連值大風遇盜君推糧以給諸人己不復食五十日亦不飢又不見其所施為不知以何事也燈下細書過少年性解音律閑夜鼓琴侍坐數人口荅咨聞其言不輟響而耳益料聽左右操弦者數譴長短無毫氂得逃余晚為鄭君門人請見方書告余曰要道不過尺素上足以度世又曰君所知者雖多而未精又意存於外學不能專一未可以經深涉遠耳自當以佳書相示也久許漸得見短書縑素所寫者積年之中合集所見當出二百許卷經不可頓得了也又曰語余曰新書卷卷有佳事但當校其精麤擇所施行若金丹一成此書等一切不用也亦或當有所教授宜得本末先從淺始以勸進學者無所希准階由也鄭君亦不肯悉令人寫其書皆當訣其意雖久借之然莫有敢盜寫一字者也鄭君本大儒晚而好道由以禮記尚書教授不絕其體望高亮風格方整接見者肅然每咨問恒待其溫顏不敢輕脫也門人五十餘人惟余見受金丹之經及三皇內文枕中五行記其餘人不得一觀此書首題者集仙錄曰夫茂實者翹春之明珠也巨勝者玄秋之沉靈也丹棗者盛陽之雲芝也伏苓者絳神之伏胎也五華含煙三氣陶精調安六氣養魄護神又曰太玄玉女者帝少昊時人也居蜀之長松山修長生之道遇山中人授以八天隱文使之修佩謂曰修道之要以無為為本八天之書真無為也而道自成然而琅玕曲晨之液八瓊九華之丹使鍊而餌之即太極所祕可以入侍帝宸下覽萬化授九華方於江上鍊丹江畔有金砂泉是其遺跡又曰高辛時有仙人展上公常說昔在華陽下食白李異美憶之未久而忽已三千年矣又曰李脫居蜀金堂山龍橋峰下修道蜀人歷代見之約其來往八百餘年因號曰李八百初以周穆王時來居廣漢栖玄山合九華丹成去遊五岳十二洞二百餘年於海上遇紫陽君授水玉之道又來龍橋峰作金鼎鍊九丹丹成三於此山學道故世號此山為三學山亦號為栖賢山又曰南陽文氏說其先祖漢末大亂逃壺山中飢困殆絕有一人教食朮遂不飢十年來歸鄉里顏色更少身輕欲飛履險不倦行冰雪內了不知寒朮一名山葪一名山精又曰薛女真者不知何許人也晉室亂離人多栖寓林藪服餌避世因居衡山尋真臺外出行常有黃鳥白猿白豹隨之不知所修何道又曰玉姜者毛女也居華山自言秦人始學食松葉朮飢寒止巖中其行如飛今號其處為毛女峰又曰涓子齊人子餌朮著三才經淮南王劉安得其文不解其旨又著琴書三篇甚有條理又曰張微子漢昭帝時將作大匠張慶女也微子好道常服霧氣自云務是山澤水火之精金石之盈氣久服之則能散形入空與雲氣合體微子自言受此法於東海東華玉妃淳文期青童君妹也微子亦以此霧法教諸學者九真華妃曰日者霞之實霞者日之精人惟聞服日實之法未見其知霞之精也夫飡霞之經甚祕致霞之道甚易此謂體生玉光霞映上清之法也, SBCK: ''}
