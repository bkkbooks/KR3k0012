  - {type: variant, offset: 13, length: 0, content: '', SBCK: 二月中旬間發火曲晨以}
  - {type: variant, offset: 13, length: 0, content: '', WYG: 二月中旬間發火曲晨以}
  - {type: variant, offset: 13, length: 0, content: '', krp: 二月中旬間發火曲晨以}
  - {type: variant, offset: 14, length: 0, content: '', SBCK: 月中起火太清九丹起火雖無定月而云作六一五月七月九月爲佳自齋以始便斷絶人事令待丹成也合丹可將同志及有心者四五人耳皆當同齋戒齋起}
  - {type: variant, offset: 14, length: 0, content: '', WYG: 月中起火太清九丹起火雖無定月而云作六一五月七月九月為佳自齋以始便斷絶人事合待丹成也合丹可將同志及有心者四五人耳皆當同齋戒齋起}
  - {type: variant, offset: 14, length: 0, content: '', krp: 月中起火太清九丹起火雖無定月而云作六一五月七月九月爲佳自齋以始便斷絶人事令待丹成也合丹可將同志及有心者四五人耳皆當同齋戒齋起}
  - {type: variant, offset: 15, length: 1, content: 夜, SBCK: 先投􅀇酒五斛於所止之流水中􅀂地無流水當作好井亦投酒於井中以鎭地氣令齋者皆飲食此水也合丹法又令以青石凾盛好龍骨十斤沉于東流水中名曰青龍液飲食之以通水靈也取東海左頋牡蠣具郡白石脂雲母屑蚯蚓􅁟滑石礬凢六物等分太極眞人以太上天帝君鎭生五藏上經刻于太極紫微􅀇琳殿東殿墉上此乃上}
  - {type: page-break, offset: 15, content: '', id: KR3k0012_SBCK_671-2a}
  - {type: variant, offset: 15, length: 1, content: 夜, WYG: 先投𤣥水五斗斛於所止之流水中若地無流水當作好井亦投酒於井中以鎮地氣令齋者皆飲食此水也合丹法又令以青石函盛好龍骨十斤沉于東流水中名曰青龍液飲食之以通水靈也取東海左顧牡礪呉郡白石脂雲母屑蚯蚓土滑石礬凡六物等分太極真人以太上天帝君鎮生五藏上經刻于太極紫㣲𤣥琳殿東殿墉上此乃上清八龍大書非世之學者可得悟了也南岳赤松子受而服之求其注釋於太極真人又青童君云五公之腴鎮生五藏錬白易軀可以少顔也湏齋戒泥竈修錬也雲腴之味香甘味美强血補骨守氣凝液鎮生五藏長養魂魄真上藥也真人云此愈於錬八石餌雲母也真人錬形於太陽易貎於三官此之謂也又曰太極真人青精飢飯方按彭祖傳云大宛有青精先生能一日九食亦能終歳不饑即是此矣真上仙之妙方斷糓之竒靈也}
  - {type: page-break, offset: 15, content: '', id: KR3k0012_WYG_671-3a, image: WYG0899/WYG0899-0044c.png}
  - {type: page-break, offset: 15, content: '', id: KR3k0012_WYG_671-3b, image: WYG0899/WYG0899-0044d.png}
  - {type: variant, offset: 15, length: 1, content: 夜, krp: 先投玄酒五斛於所止之流水中若地無流水當作好井亦投酒於井中以鎭地氣令齋者皆飲食此水也合丹法又令以青石凾盛好龍骨十斤沉于東流水中名曰青龍液飲食之以通水靈也取東海左頋牡蠣具郡白石脂雲母屑蚯蚓土滑石礬凢六物等分太極眞人以太上天帝君鎭生五藏上經刻于太極紫微玄琳殿東殿墉上此乃上}
  - {type: punctuation, offset: 16, content: ，, id: KR3k0012_CHANT_671-bkkpn5}
  - {type: 'tls:seg', offset: 16, content: '', id: KR3k0012_CHANT_671-1a.5}
  - {type: variant, offset: 17, length: 2, content: 虛真, SBCK: 八龍大書非世之學者可得悟了也南岳赤松子受而服之求其注釋於太極眞}
  - {type: variant, offset: 17, length: 2, content: 虛真, krp: 八龍大書非世之學者可得悟了也南岳赤松子受而服之求其注釋於太極眞}
  - {type: variant, offset: 20, length: 6, content: 與許玉斧言曰, SBCK: 又青童君云}
  - {type: variant, offset: 20, length: 0, content: '', WYG: 說霍山中有學道者鄧伯元王𤣥甫受服青精石飯吞日景之法能夜中書又仙人龍伯髙受青飢方醉忘憂處方臺又定録君命告掾云次服􅏇飯兼榖勿違益髓除患肌膚充肥又掾書告長史覔采藥來山染作飯恐草燥又長史}
  - {type: variant, offset: 20, length: 6, content: 與許玉斧言曰, krp: 又青童君云}
  - {type: variant, offset: 21, length: 4, content: 許玉斧言, WYG: 大掾書令餉小掾白米是染作飯凡此六事有書者也太極真人青精十石飢飯上仙靈方王君注觧其後大書者太素是本經及西梁口訣墨注者是清虛王君所釋南岳魏夫人敷撰而使司命楊君書之五真共成一法足稱靈妙矣上元寳經}
  - {type: page-break, offset: 21, content: '', id: KR3k0012_WYG_671-4a, image: WYG0899/WYG0899-0045a.png}
  - {type: punctuation, offset: 26, content: ：, id: KR3k0012_CHANT_671-bkkpn6}
  - {type: 'tls:seg', offset: 26, content: '', id: KR3k0012_CHANT_671-1a.6}
  - {type: punctuation, offset: 26, content: 『, id: KR3k0012_CHANT_671-bkkpn7}
  - {type: variant, offset: 26, length: 0, content: '', WYG: 子食草木之王氣與神通子食青燭之津此之謂也此太素所傳太極所撰上真靈仙之至要不同餘術也服􅏇飯百害不能傷疾疫不能干去諸思念絶㓕三尸耳目聰明行歩輕㨗能隠化遁變長服益壽茅司命大君語二弟云冝服四扇散昔黄帝授風后却老還少之道也我昔受之於髙邱先生今以相付耳又語小弟保命君曰卿冝服王母四靈散此反嬰之秘道也體中少損冝服此方以補腦耳按小茅君服時一百二十嵗也夫此二方皆妙法也當齋戒脩制又曰裴君受支子元服食茯苓之法焦山蔣山人所傳能長生久視修合之際湏密齋戒裴君又受支子元胡麻之法􅃽先生惟服此二方位為仙真此二方書與世少異裴君所秘用者騐而有實凡服茯苓胡麻之方甚衆此法既真人所經用真人手所書記必當最神勝於諸法若能常服仙道可期但患人服未覺甚益便不服之故少有克終之効若體先不虛損其年少之時當服茯苓若年三十嵗當服胡麻􅃽先生曰此二方是大有之要法長生神仙之秘寳也大有者謂委羽山洞大有宫中之書法彼人當有服之者寳𤣥經云茯苓治少胡麻治老合以齋戒服以朝早卉醴華腴蜜也百卉之花成腴醴}
  - {type: page-break, offset: 26, content: '', id: KR3k0012_WYG_671-4b, image: WYG0899/WYG0899-0045b.png}
  - {type: page-break, offset: 26, content: '', id: KR3k0012_WYG_671-5a, image: WYG0899/WYG0899-0045c.png}
  - {type: page-break, offset: 26, content: '', id: KR3k0012_WYG_671-5b, image: WYG0899/WYG0899-0045d.png}
  - {type: variant, offset: 28, length: 9, content: 石腴彼體所便急宜服, SBCK: ''}
  - {type: variant, offset: 28, length: 4, content: 石腴彼體, WYG: 謂為醴華英火精水寳火精茯苓也性熱而火茯苓則其精矣水寳胡麻也性冷色黒而精含澤故謂之水寳和以為一還精歸寳此之謂也裴君以年少時}
  - {type: variant, offset: 28, length: 1, content: 石, krp: 之}
  - {type: punctuation, offset: 30, content: ，, id: KR3k0012_CHANT_671-bkkpn8}
  - {type: 'tls:seg', offset: 30, content: '', id: KR3k0012_CHANT_671-1a.7}
  - {type: variant, offset: 30, length: 1, content: 彼, krp: 鎭}
  - {type: variant, offset: 31, length: 1, content: 體, krp: 生}
  - {type: variant, offset: 32, length: 1, content: 所, krp: 五}
  - {type: variant, offset: 33, length: 0, content: '', WYG: 用故服茯苓也清虛真人年十二}
  - {type: variant, offset: 33, length: 1, content: 便, krp: 藏}
  - {type: punctuation, offset: 34, content: ，, id: KR3k0012_CHANT_671-bkkpn9}
  - {type: 'tls:seg', offset: 34, content: '', id: KR3k0012_CHANT_671-1a.8}
  - {type: variant, offset: 34, length: 2, content: 急宜, WYG: 受此方於時未必虧損所以云服茯苓夜視有光也二方同耳皆長年之竒方也若合二物倍用蜜共煎搗為丸乃佳按青精方茯苓禁食酸此專用茯苓不必禁酸味又曰清虛王真人授南岳魏夫人榖仙甘草丸方魏夫人少多病疾王君脩武縣中告夫人曰學道者當去病先令五藏充盈耳目聰明乃可存思服御耳按王君初降真之時是晉元康九年冬於汲郡脩武縣廨内夫人時應年四十八也夫人按而}
