  - {type: variant, offset: 7, length: 3, content: 真誥曰, SBCK: 經亦有九鼎丹法即是丹釡從來咸呼爲鼎用􅂖糠燒之當在名山深僻處臨水上作䆴屋屋長四丈廣二丈開南東西三户先齋戒百日乃泥作神釜釡成搗藥令計至九月九日平旦發火按合諸丹無用年歳好惡惟日月中有期限及􅁻㓙琅玕以四月}
  - {type: variant, offset: 7, length: 3, content: 真誥曰, WYG: 經亦有九鼎丹法即是丹釡從來咸呼為鼎用榖糠燒之當在名山深僻處臨水上作竈屋屋長四丈廣二丈開南東西三户先齋百日乃泥作神釡釡成搗藥令計至九月九日平旦發火按合諸丹無論年歳好惡惟日月中有期限及吉㓙琅玕以四月}
