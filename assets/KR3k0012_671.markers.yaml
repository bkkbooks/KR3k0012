  - {type: variant, offset: 2880, length: 0, content: '', WYG: 不能於鏡中易其真形耳是以古之入山道士皆明鏡徑九寸以上懸於背後則老魅不敢近人或有來試人者則當顧視鏡中其是仙人及山中好神者鏡中故如人形若是鳥獸邪魅則其形貎皆見鏡中矣昔人有於蜀雲臺山石室中忽有一人著黄練单衣葛巾至其前於是人顧鏡中乃鹿也因叱而成鹿徑去又林慮山下有亭每宿者或死或病常夜有十數人衣色或黄或白或黒或男或女後郅伯夷遇之宿明燭而坐夜半果見密以鏡照之乃羣犬也伯夷乃執燭起佯誤以燭燼􅅡其衣}
