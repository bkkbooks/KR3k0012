  - {type: variant, offset: 746, length: 1995, content: 胡麻得道今在洞中又曰傅禮和漢桓帝外孫傅建安也常服五星氣得道為含真臺主抱朴子曰余祖鴻臚少時嘗為臨沆令云此縣有民家皆壽考後徙去子孫轉多夭折他人居其故宅又累世眉壽疑其井水殊赤乃試掘井左右得古人埋丹砂數十斛況餌丹砂者乎又曰上黨趙瞿者病癩歷年眾治之不愈垂死其家興載棄之齎糧送置山谷中瞿自怨不幸晝夜悲歎涕泣彌月有仙人行過穴口見而哀之具問訊瞿知異人乃叩頭自陳乞哀於是仙人以囊藥賜之教其服法瞿服以病愈顏色豐悅肌膚玉澤仙人又過視之瞿謝之乞其方仙人告曰此松脂耳此山中多汝鍊之可以長生瞿乃歸家家甚駭問得愈狀瞿年百七十歲齒髮豪健在人間二百餘年入抱犢山去又曰要於長生去留各從所好耳服還丹金液之後若且欲世間者但服其半若求仙去當盡服之昔安期先生龍眉甯公修羊公陰長生皆服金丹半劑者也其止人間或近千年然後去耳又曰按玉鈐經中篇云立功為上除過次之為道者以救人危為上功也欲求仙者要當以忠孝和順仁信為本若德行不修而但務方術終不得長生也行惡事大者奪紀小過奪筭積善未滿雖服仙藥亦無益也余覽養生之書莫不以還丹金液為大要蓋仙道之極也昔左慈字元放於天柱山中精思積久乃神人授以金丹仙經會漢末大亂不遑修鍊而避地來渡江東志欲投名山以修斯道從祖仙公又從元放受之凡授太清丹經三卷及九鼎丹經一卷金液經一卷予師鄭君者仙公之弟子也又於從祖受之而家貧無用買藥予親事之酒掃積久乃於馬跡山中立壇盟受之并具諸口訣之不書者江東先無此書出於左慈慈授從祖仙公仙公授鄭君鄭君授予故它道士了無知者此益假求於外物以自堅固復有太清神丹其法出於元君元君者老子師也太清觀天經有十篇云其上七篇不可以教授其下三篇世無足傳當沉之三泉也下三篇者正是丹經其經曰上士得道昇為天官中士得道栖集崑崙下士得道長生世間近後漢末新野陰君合此太清丹其人有才氣著詩及丹經讚序言初學道隨師本末列己所知識之得道者四十餘人甚分明也又有九光丹與九轉異法又有岷山丹法道士張盍蹹精思於岷山石室中得此方也至於諸丹法各別也金液者太一所服而仙者也又曰長生制在大藥非祠醮之所定也秦漢二代大興祈禱所祭太一五帝陳寶八神之屬動費億萬絕無所益況疋夫無德欲以三牲妄祝以祈延年惑亦甚矣又曰合金丹之大藥鍊八石之氣英者尤忌凡俗聞見則仙物不成或云上士得道於軍旅中士得道於都市下士得道於山林此謂仙藥已成未欲輕舉雖三軍兵刃不能傷都市凶禍不能加下士未及於此故上山林耳古之道士飛鍊神藥必入名山又按入山經可以精思修餌其藥有太華恒霍嵩少太白終南女凡地肺王屋抱犢安丘衡灊青城峨嵋雲臺羅浮陽駕黃金大小天咸蓋竹括蒼四望山皆是正神在其中其上皆生芝草可以避大兵大水不但中以合藥也若有道者登之則此山之神必助之為福其藥必成若不登此諸山者海中大島嶼亦可合藥又曰余師鄭君年出八十先鬚髮班白數年間復黑又顏色豐澤能引強弩日行數百里飲酒二斗不醉上山又體力輕便年少追之不及飲食與凡人無異又不見其絕穀余問先生隨之弟子黃章言鄭君常從豫章還於浦中連值大風遇盜君推糧以給諸人己不復食五十日亦不飢又不見其所施為不知以何事也燈下細書過少年性解音律閑夜鼓琴侍坐數人口荅咨聞其言不輟響而耳益料聽左右操弦者數譴長短無毫氂得逃余晚為鄭君門人請見方書告余曰要道不過尺素上足以度世又曰君所知者雖多而未精又意存於外學不能專一未可以經深涉遠耳自當以佳書相示也久許漸得見短書縑素所寫者積年之中合集所見當出二百許卷經不可頓得了也又曰語余曰新書卷卷有佳事但當校其精麤擇所施行若金丹一成此書等一切不用也亦或當有所教授宜得本末先從淺始以勸進學者無所希准階由也鄭君亦不肯悉令人寫其書皆當訣其意雖久借之然莫有敢盜寫一字者也鄭君本大儒晚而好道由以禮記尚書教授不絕其體望高亮風格方整接見者肅然每咨問恒待其溫顏不敢輕脫也門人五十餘人惟余見受金丹之經及三皇內文枕中五行記其餘人不得一觀此書首題者集仙錄曰夫茂實者翹春之明珠也巨勝者玄秋之沉靈也丹棗者盛陽之雲芝也伏苓者絳神之伏胎也五華含煙三氣陶精調安六氣養魄護神又曰太玄玉女者帝少昊時人也居蜀之長松山修長生之道遇山中人授以八天隱文使之修佩謂曰修道之要以無為為本八天之書真無為也而道自成然而琅玕曲晨之液八瓊九華之丹使鍊而餌之即太極所祕可以入侍帝宸下覽萬化授九華方於江上鍊丹江畔有金砂泉是其遺跡又曰高辛時有仙人展上公常說昔在華陽下食白李異美憶之未久而忽已三千年矣又曰李脫居蜀金堂山龍橋峰下修道蜀人歷代見之約其來往八百餘年因號曰李八百初以周穆王時來居廣漢栖玄山合九華丹成去遊五岳十二洞二百餘年於海上遇紫陽君授水玉之道又來龍橋峰作金鼎鍊九丹丹成三於此山學道故世號此山為三學山亦號為栖賢山又曰南陽文氏說其先祖漢末大亂逃壺山中飢困殆絕有一人教食朮遂不飢十年來歸鄉里顏色更少身輕欲飛履險不倦行冰雪內了不知寒朮一名山葪一名山精又曰薛女真者不知何許人也晉室亂離人多栖寓林藪服餌避世因居衡山尋真臺外出行常有黃鳥白猿白豹隨之不知所修何道又曰玉姜者毛女也居華山自言秦人始學食松葉朮飢寒止巖中其行如飛今號其處為毛女峰, WYG: 蒲韭根}
