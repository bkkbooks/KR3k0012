  - {type: variant, offset: 38, length: 0, content: '', WYG: 及隠景去世之時年八十三嵗也此晉成帝咸和八年甲午嵗則夫人從服藥已來三十五年矣其間或不必長相續也了無復他患沈疴都愈髮不白齒不落耳目聦明常月中書道家章符夫人既為女官祭酒食猶以章符示迹耳存思入室動百日數十日了不覺勞既在俗世家事相亂欲脩齋研誦便託以入室也食飲通快四體充盈即甘草丸之騐也謂之榖仙方脾胃既和則能食而不害膚充而精察起居調節無澁利之患矣食榖而得仙故謂仙榖也此本九宫右真公郭少金撰此方諸宫久已有之至郭氏更撰集次第序說所治耳猶如青精及太素之法而今謂太極真人也學仙道者宜先服之昔少金以此方授介象又授劉根張陵等數十人亦稱此丸為少金丸宜齋戒脩合並無毒無所禁食一年大益無責旦夕之效也俗人亦皆}
