  - {type: variant, offset: 62, length: 2, content: 洞為, krp: 益無責旦夕之効也俗人亦皆可服之又曰雲芝英不擇日而修合治三尸伏疾服食一劑則糓虫死則三尸枯若道士固食糓者乃冝服也糓虫旣滅使人食糓而無病過飽而不傷去尸虫之藥甚多莫出於此昔修羊公稷丘子東方朔崔文子啇丘子但服此藥以恊糓而皆得}
