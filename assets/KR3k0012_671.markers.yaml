  - {type: variant, offset: 58, length: 0, content: '', SBCK: 益髓除患肌膚充肥又􅁺書告長史覔米藥來山染作飯􅂲草燥又長史與大􅁺書令餉小􅁺白米是染作飯凡此六事有書者也太極眞人青精十石䭀飯上仙靈方王君注解其後大書者是太素本經及西梁口訣墨注者是清虚王君所釋南岳魏夫人敷撰而使司命楊君書之五眞共成一法足稱靈妙矣上元寳經曰子食草木之王氣與神通子食青燭之津此之謂也此太素所傳太極所撰上眞靈仙之至要不同餘術也服䭀飯百害不能傷疾疫不能干去諸思念絶滅三尸耳目聦明行歩輕捷能隱化遁變長服益壽茅司命大君語二弟云冝服四扇散昔黄帝授風后却老還少之道也我昔授之於髙丘先生今以相付耳又語小弟保命君曰卿冝服王母四童散此反嬰之祕道也體中少損冝服此方以􅀘腦耳按小茅君服時巳一百二十歳也夫此二方皆妙法也當齋戒修制}
  - {type: page-break, offset: 58, content: '', id: KR3k0012_SBCK_671-3a}
  - {type: variant, offset: 58, length: 0, content: '', krp: 益髓除患肌膚充肥又掾書告長史覔米藥來山染作飯恐草燥又長史與大掾書令餉小掾白米是染作飯凡此六事有書者也太極眞人青精十石䭀飯上仙靈方王君注解其後大書者是太素本經及西梁口訣墨注者是清虚王君所釋南岳魏夫人敷撰而使司命楊君書之五眞共成一法足稱靈妙矣上元寳經曰子食草木之王氣與神通子食青燭之津此之謂也此太素所傳太極所撰上眞靈仙之至要不同餘術也服䭀飯百害不能傷疾疫不能干去諸思念絶滅三尸耳目聦明行歩輕捷能隱化遁變長服益壽茅司命大君語二弟云冝服四扇散昔黄帝授風后却老還少之道也我昔授之於髙丘先生今以相付耳又語小弟保命君曰卿冝服王母四童散此反嬰之祕道也體中少損冝服此方以𥙷腦耳按小茅君服時巳一百二十歳也夫此二方皆妙法也當齋戒修制}
