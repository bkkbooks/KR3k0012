  - {type: variant, offset: 65, length: 0, content: '', SBCK: 也漢景帝及武帝求索東方朔脩羊公祕方終不傳又曰北海公㳙子名姓不顯青童君弟子􅂫林之師也少餌木黄精授守一􅀇丹之道在世二千八百年􅀇洲上}
