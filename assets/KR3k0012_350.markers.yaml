  - {type: punctuation, offset: 1132, content: 「, id: KR3k0012_CHANT_350-bkkpn441}
  - {type: variant, offset: 1132, length: 0, content: '', SBCK: 非子之永而蒲之愛蒲楊柳可以爲箭也董澤之蒲可勝旣平董澤名在東聞喜縣集異記曰丹陽張承先家有一􅀑爲張偷得一箭筒云愼勿至新亭射此三井陶家物張以借他􅀑罵欲燒屋張馳取還乃止􅄂詩曰象弧雕服竹譜曰射筒竹簿肌而長中着箭因以爲名歩义义音釵一作靫音與上同釋名曰歩义人所帶以箭义其中馬上曰鞬鞬建也弓矢並建立其中也通俗文曰箭箙謂之歩靫趙書曰石虎等破劉曜於上邽獲馬二百疋赤􅄢金銀歩义弓鞬三十具櫜鞬左傳曰晉楚治兵遇于中原左執鞭弭右執櫜鞬以與君周旋櫜受箭也後漢書曰董卓膂力過人􅀟帶兩鞬左右馳射方言曰所以藏箭謂之箙藏弓謂之鞬左氏傳云右属櫜鞬魏百官名曰三公拜賜魚皮歩义一貛皮鞬一􅅣菆金校歩义一金挍豹皮鞬一射捍音汗字與折同射以皮臂也􅀃文曰韝射臂㭼也三禮弓矢圗曰者臂捍以朱韋爲之謂之者所以遂弦也括地圗曰羿年五歳父母與入山其母處之大樹下侍蟬鳴還欲取之羣蟬俱鳴遂􅂢去羿爲山問所飬羿年二十能習弓矢仰天歎曰我將射逺方矢至吾門止因捍即射矢摩地截草經至羿門隨矢去管}
