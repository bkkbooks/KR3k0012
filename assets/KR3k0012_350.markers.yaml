  - {type: variant, offset: 23, length: 0, content: '', SBCK: 如斗引弩射之應弦而中便聞從流奔驚波浪砰􅔫苦盍切不知所向經年與伴共至一處名爲竹落崗盍先所二十許里有骨可長三丈餘見昔射箭貫在其中因語伴云此是我徃年所射物乃死於斯拔矢而歸其夕夢見一長人責誚之曰我在洲渚之間無􅀜人事而横見殺害怨苦莫申連時覓汝今始相得眠寤仍患腹疾而殞又曰永陽李増行經大溪見二蛟在水引弓射之中一即死増歸因復出市有女子素服衘涕捉所射箭增恠而問焉女荅曰何用問爲􅀂是君許便以相還授矢而滅増惡而驟反未逹家􅁀死於路孟子曰矢人豈不仁於凾人哉矢人惟恐不傷人凾人惟恐傷人列子曰逢蒙之弟子曰鴻超怒其妻而怖之引烏號之弓綦衛之箭射其目矢未注眸子瞬不睫矢墜地而塵不揚又曰飛衛學射於甘蠅諸法並善唯法不教衛宻將矢以射蝇蝇嚙得鏃矢射衛衛遶樹而走矢亦遶樹而射魯連子曰燕伐齊取七十餘城唯莒與即墨不下齊田單以即墨破燕軍殺燕將軍􅀐刼復齊城唯聊城不下燕將城守數月魯仲連乃爲書着之於矢以射城中遺燕將燕將得書泣三日乃自殺尉繚子曰夫殺人百歩之外者誰也曰矢也韓子曰矢來無向則爲鐵室以備之又曰智伯將伐趙趙襄子召張孟談問之曰奈無箭何孟談曰董安于之治晉陽也公宫之垣皆以萩音秋蒿楛楚廧音牆之其髙至于文君發而用之有餘箭矣於是發而試之堅則菌幹之勁不能過也君曰吾箭已足矣奈無金何孟談曰董子之治晉陽公宫令舎之堂皆以錬銅爲柱質君發而用之有餘金矣􅀾國䇿曰公宫之垣皆以萩蒿其堅則箘簬之勁不能過其餘何也簬音路又曰水激則悍矢激則逺又曰楚人有白猨王自射之則􅅮矢而熈熈戯也使飬由基射之始調弓矯矢未發而猨擁樹號矣由基楚共王之臣飬叔也調調張也矯直也擁抱也諸􅁑子曰􅀂能力兼三人}
