  - {type: variant, offset: 2592, length: 2, content: 親射, SBCK: 猛虎行曰雙桐生空井枝葉自相加通泉浸其根玄雲潤其柯上有􅀟棲鳥交頸鳴相和何意行路者秉丸彈是窼桓玄南林彈詩曰散帶躡駟揮彈出長林歸翮赴舊栖木末轉翔禽落羽尋絶響屢中輙應心後漢李尤彈銘曰昔之造彈起意弦木以丸爲}
