  - {type: variant, offset: 23, length: 0, content: '', WYG: 如斗引弩射之應弦而中便聞從流奔驚波浪砰磕不知所向經年與伴共至一處名為竹落崗去先所二十許里有骨可長三丈餘見昔射箭貫在其中因語伴云此是我往年所射物乃死於斯㧞矢而歸其夕夢見一長人責誚之曰我在洲渚之間無關人事而横見殺害怨苦莫伸連時覓汝今始相得眠寤仍患腹疾而殞又曰永陽李增行經大溪見二蛟在水引弓射之中一即死增歸因復出市有女子素服啣涕提所射箭增怪而問焉女荅曰何用問為若是君許便以相還授矢而滅增惡而驟反未達家暴死於路孟子曰矢人豈不仁於函人哉矢人惟恐不傷人函人惟恐傷人列子曰逢䝉之弟子曰鴻超怒其妻而怖之引烏號之弓綦衛之箭射其目矢未注眸子睚不建矢墜地而塵不揚又曰飛衛學射於甘蠅諸法並善唯囓法不教衛宻將矢以射蠅蠅嚙得鏃矢射衛衛繞樹而走矢亦繞樹而射魯連子曰燕伐齊取七十餘城唯莒與即墨不下齊田單以即墨破燕軍殺燕將軍騎刼復齊城唯聊城不下燕將守城數月魯仲連乃為書約之於矢以射城中遺燕將軍書泣三日乃自殺尉繚子曰夫殺人百歩之外者誰也曰矢也韓子曰矢來無向則為鐵室以備之又曰智伯將伐趙趙襄子召張孟談問之曰柰無箭何孟談曰董安于之治晉陽也公宫之垣皆荻蒿枯楚廧之其髙至于丈君發而用之有餘箭矣於是發而試之堅則􅌲幹之勁不能過也君曰吾箭以足矣柰无金何孟談曰董之治晉陽宫公令舎之堂皆以錬銅為柱質君發而用之有餘金矣戰國策曰公宫之垣皆以荻稿其堅則􅌲簬之勁不能過也簬音路又曰水激則悍矢激則逺又曰楚王有白猿王自射之則摶矢而嬉嬉戲也使養由基射之始調弓矯矢未發而猿擁樹號矣由基楚共王之臣養叔也調調張也矯直也擁抱也諸葛子曰若能力兼三人}
