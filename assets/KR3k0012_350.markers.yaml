  - {type: variant, offset: 2091, length: 290, content: 弟謂曰汝等各奉吾一只箭將玩之地下俄而命母弟慕延曰取汝一隻箭折之延折之又曰汝取十九隻箭折之延不能折柴曰汝曹知單者易折眾則難摧戮力一心然後社稷可固言終而卒又後燕錄曰慕容盛行至西樂遇盜陜中盛曰我六尺之軀入水不溺在火不焦汝欲當鋒乎試豎爾手中箭百步我若中之宜慎爾命如其不中當束身相授盜行豎箭盛一發中之盜曰相試耳資而遣之宋書朱齡石弟超石傳曰阿簿千步騎十萬屯河北岸超石以軟弓小箭射虜又曰謝靈運山居賦云其竹則二箭殊葉四苦齊味注云三箭一者苦箭大葉一者竿箭細葉又曰朱修之傳曰魯秀擊襄陽修之發連弩射秀秀亦發連弩應之修之使軍人緣水拾箭又曰謝莊傳云時河南獻舞馬詔群臣為賦莊所上其辭曰迎調露於飛鍾赴承雲於驚箭, SBCK: 顯}
