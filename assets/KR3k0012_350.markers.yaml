  - {type: variant, offset: 824, length: 265, content: 又曰祝聃射王中肩王亦能軍又曰楚子與莫敖氏戰于睪滸睪滸楚也伯棼射王汰輈及鼓跗著於丁寧伯棼越椒也輈車轅汰過也箭過車轅上也丁寧鉦也又射汰輈以貫笠轂師懼退王使巡師曰吾先君文王克息獲三矢焉伯棼竊其二盡於是矣鼓而進之遂滅若敖氏又曰呂錡射恭王中目王召養由基與之兩矢使射呂錡中項伏弢而死以一矢復命弢音韜又曰郄克傷流血及屨未絕鼓音曰余病矣張侯曰自始合而矢貫予手及肘余折以御左輪朱殷豈敢言病吾子忍之又曰齊師遁晉州綽及之射殖綽中肩兩矢夾脰脛頸又曰楚君以鄭故親集矢於目鄢陵戰晉射中楚王目也又曰齊子淵捷從泄聲子射之中楯凡繇朐音劬汰輈匕入者三寸又曰孟之側後入, WYG: 愛蒲楊邵可}
