  - {type: variant, offset: 2627, length: 672, content: 餘步臣等伏惟陛下聖武自天神藝夙茂巧會騶虞之節妙盡矍居約切圃之儀威稜攸疊甝胡甘切兕懾氣才猛所振勍憝弭心足以肅截九區赫服八宇矣盛事奇迹必宜表述勒銘射宮永彰聖藝後周書曰王傑魏恭帝元年從于謹圍江陵時柵內有人善用長矟戰士將登者多為所斃謹令傑射之應弦而倒登者乃得入餘眾繼進遂柭之謹喜曰濟我大事者在此箭也又曰賀拔嶽既遇害于河曲太祖乃率輕騎馳赴平涼時齊神武遣長史侯景招引嶽眾太祖至安定遇之謂景曰賀拔公雖死宇文泰尚存卿何為也景失色對曰我猶箭也隨人所射安能自裁景於此即還又曰庾信傳云信常有鄉關之思作哀江南賦以致其意云兩觀當戟千門受箭白虹貫日蒼鷹擊殿又曰長孫晟傳云晟與汝南公獵見二鵰飛而爭肉因以兩箭與晟曰射取之晟彎弓馳往遇雕相躍一發雙貫焉唐書曰太宗討劉黑闥闥常於肥鄉列陣太宗親率左右擊之有一突將勇壯絕人直衝太宗刃將接太宗以天策上將大箭射之中心洞背應弦而斃遂傳此箭於北蕃突厥見而驚歎又常輕騎近出遇三騎皆賊中驍勇有名者舉槍而進左右請避之太宗不從待其將至連發三矢相次皆斃敵人懾氣焉又曰貞元十四年貢武舉并應百隻箭及三十隻箭等今年權停時諫議大夫田敦因蒙召對奏言兵部武舉等每年常數百千人持挾弓矢出入皇城間恐非所宜上聞而瞿然故命停之其實武舉者每歲不過十數人時議惡敦貴欲非短舊事奏議不實自是訖于貞元更不復置太公六韜曰陷堅陣強敵大黃參連弩飛鳧電景失自副注云飛鳧電景矢名飛鳧尺莖白羽以為首電景青莖尺羽以鋼為首鋼一作鐵太公金匱曰武王伐殷丁侯不朝尚父乃畫丁侯三旬射之丁侯病遣使請臣尚父乃以甲乙日拔其頭箭丙丁日拔其目箭戊巳日拔其腹箭庚辛日拔其股箭癸亥日拔其足箭丁侯病乃愈四夷聞皆懼越常氏獻白雉, SBCK: ''}
