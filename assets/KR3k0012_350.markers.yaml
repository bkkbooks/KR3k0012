  - {type: variant, offset: 61, length: 0, content: '', WYG: 夫勾越之幹以精金為鏃以隼翎羽之打撃則同於稿科無擇猶無異也及夫盪㓂爭䖍覿武决勝加之彊弩之上則三百歩之外不立敵矣楚辭曰舉長矢兮射天狼陳琳武軍賦曰矢則申息肅眘箘簵空流燋銅毒簳飛鏃嗚鍭子虛賦曰曵明月之珠旗建干將之雄㦸左烏號之雕弓右夏服之勁}
