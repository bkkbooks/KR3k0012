  - {type: variant, offset: 2581, length: 10, content: 世宗幸鄴還於河內懷界, SBCK: 夢持彈者得朋友趙壹窮鳥賦曰有一窮鳥戢翼原野罼音必網加上機穽在下前見蒼隼後見驅者矰繳張右羿弓彀左飛丸繳矢交集于我思飛不得欲鳴不可舉頭畏觸摇足恐墮内獨怖急乍水乍火夏侯孝􅀂繳彈賦曰張弱弓理繁繳望大羣以送丸審遣放而必獲古樂府歌曰烏生八九子􅁗氏桂樹間􅁗氏家有遊蕩子立用睢陽強彈丸魏明}
