  - {type: variant, offset: 2510, length: 7, content: 郎基字世業遷海, SBCK: 長孫晟善彈有鳶群飛上曰公爲我取之晟十發俱中並應丸而落賜賚極多韓詩外傳曰楚莊王將興師伐􅀳告大夫曰有敢諌者罪至死無赦孫叔敖進諌曰臣之園中有榆其上有蟬蟬方奮翼悲鳴欲飲清露不知螳蜋在後曲其頸欲擢而食之也螳蜋方欲食蟬而不知黃雀在後舉頭而欲音卓食之黄雀方欲食螳蜋不知童子挾彈丸在榆下仰而欲彈之童子方欲彈黄雀不知前有深坑後有掘株也此皆貪前之利不顧後害者也非獨昆虫衆庶􅀂此人主亦然楚國不殆而晉國以寜孫叔敖之力也}
  - {type: page-break, offset: 2510, content: '', id: KR3k0012_SBCK_350-7a}
  - {type: variant, offset: 2510, length: 3, content: 郎基字, WYG: 長孫晟善彈有鳶羣飛上曰公為我取之晟十發俱中並應而落賜賚極多韓詩外傳曰楚莊王將興師伐晋告大夫曰有敢諫者罪至死無赦孫叔敖進諫曰臣之園中有榆其上有蟬蟬方奮翼悲鳴欲飲清露不知螳螂在後曲其頸欲攫而食之也螳螂方欲食蟬而不知黄雀在後舉頭而啄音卓食之黄雀方欲食螳螂不知童子挾彈丸在榆下仰而欲彈之童子方欲彈黄雀不知前有深坑後有掘株也此皆貪前之利不顧後害者也非獨昆虫衆庶若此人主亦然楚國不殆而晉國以寜孫叔敖之力也西京雜記曰韓嫣好彈以金為丸所失日有十餘人皆逐之長安為之語曰若飢寒逐金丸異苑曰青溪小姑廟云是蔣侯第三妹廟中有大榖樹扶踈䕃瀆鳥常産肓其上太原中陳郡謝慶執彈乗馬激殺數頭至夜夢一女子衣裳楚楚怒云此鳥是我養何故見侵經年而謝慶卒名渙靈運父也幽明録曰元嘉初散騎劉雋家在丹陽郡後常閑居而天大驟雨見門前有三小兒皆可六七歳相牽狡獪而並不沾濡雋疑非人俄見共爭一瓠壺子雋引彈彈之正中壺霍然不見雋出人問前得一壺而泣曰此是小兒物不知何由在此雋具説之東方朔記曰東方朔對驃騎難曰以珠彈不如埿丸各有所用也莊子曰莊周遊乎雕陵之樊覩一異鵲自南方來何鳥哉執彈而留之覩一蟬方得美䕃而忘其身螳螂執翳而摶之見得而忘其形異鵲從而利之見利而忘其真莊周怵然曰物固相累二貌相招也指彈而射之虞人逐而訊之以周為盗粟又曰化予之左臂以為鷄予因以求時夜浸假而化右臂以為彈余因以求鴞炙又曰以隋侯之珠彈千仞之雀以所用者重所要者輕太𤣥經曰明珠彈於飛寅甘不復潜夫論曰丁夫不傳犁鋤懐挾彈或取好土作彈賣之其彈外不可禦盗内不足禁鼷䑕志彈鳥雀百發不得反一中無用而有害也}
