  - {type: variant, offset: 126, length: 507, content: 言其所指向迅疾也又謂之箭箭進也其本曰足矢形似木木以下為本以根為足又謂之鏑鏑敵也可以禦敵也齊人謂之鏃言其所中皆族滅也關西曰釭釭鉸音校也言有鉸刃也其體曰簳言挺簳也其旁曰羽如鳥羽也鳥須羽而飛矢須羽而前也齊人曰衛所以導衛矢也其末曰括括會也與弦會也括帝曰義形如義也方言曰箭自關而東謂之矢江淮之間謂之鍭音侯關西曰箭郭璞注云箭者竹名因以為號也揚雄方言曰凡箭鏃三者謂之羊頭其廣薄而長薄謂之錍音卑爾雅曰東南之美者會稽竹箭焉注云會稽山名今在山陰縣南竹箭條也又曰金鏃剪羽謂之鏃骨鏃不剪羽謂之志郭璞注曰金鏃今錍箭也骨鏃金骨骲不剪謂以鳥羽自然淺狡不復剪也鏃音雹孫卿子曰浮游作矢世本曰夷牟作矢黃帝二臣太公兵法曰箭之神名續長趙氏兵書曰矢一名信往易曰得金矢利艱貞吉又曰射雉一矢亡終以譽命書曰周成王崩垂之竹矢在東房垂舜共工所為也詩曰周道如砥其直如矢又曰弓矢既同又曰舍矢如破又曰既張我弓既挾我矢發彼小豝殪此大兕又曰束矢其搜搜眾意勁急也五十矢為束禮記曰故男子生桑弧蓬矢六以射天地四方天地四方者男子之所有事也故必先有志於其所有事又曰月令仲冬云是月也伐木取竹箭注云此時堅成可伐取也又曰后妃執弓挾矢于高禖之前又曰乘丘之役圉人浴馬有流矢在白肉公曰非其罪也遂誄之, WYG: ''}
