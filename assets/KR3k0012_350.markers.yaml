  - {type: variant, offset: 1711, length: 282, content: 屬縣講兵肄射伐淇園之竹治矢百餘萬又曰匈奴破離後王安得攻金滿城耿恭以毒藥傅矢傳語匈奴曰漢家箭神中其瘡者必有異因發強弩射之虜中矢者視瘡皆沸並大驚相謂曰漢兵神真可畏也遂解去魏志曰挹婁在失館東北千餘里弓長四尺如弩楛長八寸青石為鏃又曰陳琳曰矢在弦上不可不發魏略曰孫權乘大船出濡須口來觀魏軍曹公使弓弩亂發射之矢著其船船乃偏重箭墜將傾權因廻船復以一面受矢矢均船平乃放船而走蜀志曰關羽為流矢所中貫其左臂醫者曰矢鏃有毒當須破臂刮骨也晉書石季龍載記曰石韜起堂于太尉府號曰宣光殿梁長九丈石宣視而大怒斬匠載梁而去韜怒增之十丈宣聞之恚甚使楊杯牟皮牟成趙生等緣獼猴梯而入殺韜置其刀箭而去又毛寶, SBCK: ''}
