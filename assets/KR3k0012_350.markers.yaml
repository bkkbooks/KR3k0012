  - {type: variant, offset: 1175, length: 356, content: 以學豈可及乎子路曰南山有竹不扶自直斬而用射達於犀革以此言之何學為孔子曰括而羽之鏃而礪之其入不益深乎子路再拜國語曰吳晉會于黃池吳王擐甲陳卒赤旗赤羽之矰望之如火賈逵注曰矢羽為矰又曰仲尼在陳有隼于陳侯之庭而死楛矢貫之石砮矢長尺有咫陳惠公使人以隼如仲尼之館問之仲尼曰隼之來也遠矣此肅慎氏之矢也昔武王剋商通道于九夷八蠻注說苑云百蠻使各以其方賂來貢使無忘職業於是肅慎氏貢楛矢石砮其長尺有咫先王欲其令德之致遠以示後人使永鑑焉故銘其括儁書功名也括箭羽之間曰肅慎氏之貢矢以分大姬配虞胡公而封諸陳古者分同姓以珍玉展親也分異姓以遠方之職貢使無忘服也故分陳以肅慎之矢君若使有司求諸故府其可得也使求得之金櫝如言櫝櫃也惠公使有司求之故府得肅慎氏矢於金櫃之中如仲尼之所言也史記曰魏公子無忌進兵擊秦秦軍解去遂救邯鄲趙王及平原君自迎公子平原君負韊, SBCK: 彈}
