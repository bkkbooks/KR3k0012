  - {type: variant, offset: 5, length: 2, content: 上字, SBCK: 下箭筒歩义橐鞬射捍彈箭下魏百官名曰三公拜賜鶉尾鶻尾髇許交切箭十二枚三齊略記曰冨平城孝明帝時改爲厭次此城東南五十里有蒲臺髙丈八􅁗始皇所頓處時在臺下縈蒲繫馬夾道數百歩到今蒲生猶縈馬蒲似水楊而勁堪爲箭􅀶物志曰交州山夷名曰俚子弓長數尺箭長尺餘以燋銅爲鏑塗毒藥於鏑鋒中人即死不時歛藏則胼脹沸爛湏叟燋煎都盡唯骨在耳其俗誓不以此藥法語人治之飲婦人月水及糞汁時有差者唯射猪犬者無它以其食糞故也燋銅者有聲以物打之徐聽其聲得燋毒者偏鑿取以爲箭鏑焦貢易}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_350-1b}
  - {type: variant, offset: 5, length: 2, content: 上字, WYG: 下箭筒歩义櫜鞬射捍彈箭下書曰惟箘簵􅀢詩曰舍矢如破禮曰若竹箭之有筠也魏百官名曰三公拜賜鶉尾鶻尾䯞箭十二枝三箭畧記曰富平城孝明帝時改為厭次此城東南五十里有蒲臺髙丈八秦始皇所頓處時在臺下縈蒲繋馬夾道數百歩到今蒲生猶縈馬蒲似水楊而勁堪為箭博物志曰交州山夷名曰俚子弓長數尺箭長尺餘以燋銅為鏑塗毒藥於鏑鋒中人即死不時歛藏則鋒脹沸爛須臾燋􅋩都盡惟骨在耳其俗誓不以此藥法語人治之飲婦人月水及糞汁時有差者唯射豬犬者無他以其食糞故也燋銅者有聲以物打之徐聽其聲得燋毒者偏鑿取以為箭鏑焦贛易}
