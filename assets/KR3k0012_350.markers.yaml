  - {type: variant, offset: 1499, length: 6, content: 魏公子無忌進, WYG: 丹陽張承先家有一鬼為張偷得一箭筒云慎勿至新亭射此三井陶家物張以借他鬼罵欲燒屋張馳取還乃止雜詩曰象弧雕服竹譜曰射筒竹簿肌而長中着箭因以為名歩义又音釵與前同釋名曰歩义人所帶以箭义其中馬上曰鞬鞬建也弓矢並建立其中也通俗文曰箭箙謂之歩义趙書曰石虎等破劉曜之後獲馬二百疋赤剡金銀歩义弓鞬三十具櫜鞬左傳曰晋楚治}
