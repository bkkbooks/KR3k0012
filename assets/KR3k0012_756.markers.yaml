  - {type: variant, offset: 262, length: 243, content: 所喜唯彈棊略盡其功乃為之賦昔京師先工有馬合鄉侯東方世安張公子常恨不得與彼數子者對藝經曰彈棊二人對局黑白棊各六枚先列棊相當下呼上擊之彈棊經序曰彈棊者仙家之戲也昔漢武帝平西域得胡人善蹴鞠者蓋衒其便平聲捷跳躍帝好而為之群臣不能諫侍臣東方朔因以此藝進之帝就捨蹴鞠而上彈棊焉習之者多在宮禁中故時人莫得而傳至王莽末赤眉凌亂西京傾覆此藝因宮人所傳故散落人間及章帝御宇好諸伎藝此戲乃盛於當時彈棊經後序曰自後漢冲質已後此藝中絕至獻帝建安中曹公執政禁闌幽密至於博弈之具皆不得妄寘宮中宮人因以金釵玉梳戲於粧奩, SBCK: 海}
