  - {type: variant, offset: 5, length: 2, content: 彈碁, SBCK: 物皆有爼牢鼎九陪鼎三禮曰故衛孔悝乏鼎銘曰六月丁亥公假于太廟公曰叔舅乃祖莊叔左右成公成公乃命莊叔隨難于漢陽即宫于宗周奔走無射啓右獻公獻公乃命成叔纂乃祖服乃考文叔興舊嗜欲作率慶士躬恤衛國其勤公家夙夜不解民咸曰休哉公曰叔舅子女銘􅀂纂乃服悝拜稽首曰對揚以辟之勤大命施于烝彛鼎施猶著也言我將行君之命又刻著於烝􅀕之彛鼎也又曰崇鼎貫鼎夫子之器崇貫皆國名左傳曰宋華父督殺殤公召莊公于鄭而立之以郜大鼎賂公郜國所造器也四月取郜大鼎于宋納于太廟非禮也臧哀伯諫曰武王克啇遷九鼎于洛邑義士猶或非之而况將昭違亂之賂器於太廟其􅀂之何公弗聽又曰楚子伐陸渾之戎遂至于雒定王使王孫滿勞楚子楚子使問鼎之大小輕重焉對曰在鼎不在鼎昔夏之方有德也逺方圖物貢金九牧鑄鼎象物桀有昏德鼎遷于啇啇紂􅁀虐鼎遷于周德之休明雖小重也其姦固昏亂雖大輕也天祚明德有所底止成王定鼎干郟鄏卜丗三十卜年七百天所命也周德雖衰天命未改鼎之輕重未可問也又曰魯襄公享晉六卿賄荀偃束錦加壁乗馬先呉壽夢之鼎壽夢呉子也獻鼎於魯因以爲名又曰晉叔向謂晏子曰然雖吾公室今亦季丗也君日不悛以樂慆憂公室之卑其何日之有䜛鼎之銘曰昧旦丕顯後丗猶怠讒鼎鼎銘也况日不悛其能乆乎又曰楚薳啓彊曰是以聖王朝聘有珪享覜他弔切有璋宴有好貨飱有陪鼎飱饔飱也熟食爲飱陪加也加鼎所以厚殷勤之又曰鄭人鑄刑書鑄刑書於鼎以爲國之常法又曰宋正考父佐戴武宣三命兹益恭故其鼎銘云鼎正考父之廟鼎也一命而僂再命而傴三命而俯循墻而走亦莫余敢侮饘於是粥於是以餬余口又曰鄭子産聘于晉晉侯有疾韓宣子逆客私焉曰寡君寢疾於今三日矣並走羣望有加而無瘳今夢黄熊入於寢門其何厲􅀑也對曰昔堯殛鯀于羽山其神化爲黄熊以入羽淵實爲夏郊三代祀之晉爲盟主其或未之祀也乎韓子祀夏郊晉侯有間賜子産莒之二方鼎方鼎莒所貢又曰楚子次於乾谿僕析父從右尹子革夕王語曰昔我先王熊繹與吕仍王孫牟爕父禽父並事康王四國皆有分器我獨無有今吾使人於周求鼎以爲分器王其與我乎對曰與君王哉今周與四國服事君王將唯命是聽豈其愛鼎又曰齊侯伐徐徐人行成賂以甲父之鼎甲父古國名也又曰晉趙鞅荀寅率師城汝濵遂賦晉國一鼔䥫以鑄刑鼎刑書之鼎著范宣子所爲刑書焉穀梁傳曰桓公二年夏四月取郜大鼎于宋戊申納于太廟郜鼎者郜之所爲也孔子曰器從邑名從主人故曰郜大鼎史記曰黄帝採首山銅鑄鼎於荆山下鼎旣成有龍垂胡髯下迎黄帝又曰伊尹欲干湯而無由乃爲有莘氏媵臣􅀒鼎俎以滋味􅀃湯致於王道又曰周末有九鼎徙秦氏曰太丘社亡而鼎没予泗水彭城下其後百一十五年而秦兼天下始皇二十八年過彭城齋戒禱祀欲岀周鼎使千人没水求之不得又曰秦武王與孟􅀃舉龍文之鼎絶臏而死又曰孝文帝時新垣平言周鼎亡在泗水中今河溢通泗臣望東北汾隂直有金寳氣意周鼎其岀乎兆見不迎則不至於是上使使治廟汾隂南臨河欲祠出周鼎漢書曰項羽身長八尺二寸目重瞳力能扛鼎又曰漢得汾隂寳鼎武帝嘉之藏於甘泉羣臣上壽賀陛下得周鼎廬丘壽王曰非周鼎上怒對曰周德始乎后稷成於文武上天報應鼎爲周出名曰周鼎今漢自髙祖繼周至陛下功德愈盛天瑞並是至昔􅁗始皇欲出鼎於彭城而不得天祚有德而寳鼎自出此天之所以與漢是漢鼎非周鼎也上曰善又曰主父偃曰丈夫生不五鼎食死則五鼎烹又曰宣帝時美陽得鼎獻之京兆尹張敞上議曰案鼎有刻書曰王命尸臣官此㧦邑賜尓旂鸞黼黻琱弋李竒曰琱鏤也尸臣拜稽首曰敢對揚天子丕顯休命此鼎殆周之所以襃賜子孫刻銘其先功藏之于宫廟也又曰質氏以洒削而鼎食}
