  - {type: variant, offset: 1, length: 2, content: 藝部, krp: 欲善其事必先利其器史記曰舜陶於河濵器不苦窳以主切舜作什器於壽丘又曰通邑大都木器髹者千伏徐廣折曰髹音休􅃮也漢書日木器千伏銅器千鈞素木鐵器千石此亦千乗之家也又曰武帝有故銅器李少君曰此器齊桓公}
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 年陳於柏寢案其刻果然漢書曰賈􅁩言夫天下大器也今人之置器置諸安處則安置諸危處則危天下之情與器無以異在天子之所置之又曰里諺曰欲投䑕而忌器此善諭也䑕近於器尚憚不投恐傷其器况於臣之近主乎又曰􅄢賔國以金銀銅錫爲器續漢書曰桓帝祠老子於濯龍用淳金釭器魏氏春秋曰武王過故人吕伯奢家聞其動食器之聲疑其圖巳是夜手劒殺八人後魏書曰獠鑄銅爲器大口寛腹名曰銅㸑旣薄且輕易於熟食晉令曰欲作􅃮器物賣者各先移主吏者名乃得作皆當淳􅃮著布器器成以朱題年月姓名車頻秦書曰符堅建元十八年新平縣民耕地獲玉器􅀄有金彫者頗知圖記王猛以爲左道勸堅誅之彫臨死表堅曰新平地古顓頊墟其故有白鷄閭記言此里應出古帝王寳至是果得之家語曰孔子觀於魯桓公之廟有欹器焉孔子問於守廟者曰此爲何器曰此蓋宥坐之器孔子曰吾聞宥坐之器者虚則欹中則正滿則覆顧謂弟子曰試注水焉即挹水而注之中而正滿而覆虚而欹孔子喟然而歎曰嗚呼物焉有滿而不覆者乎老子曰埏埴以爲器當其無有器之用韓子曰堯有天下飯於土軌飲於􅁟鉶舜作食器斬山木而材之削踞脩其迹流􅃮墨其上諸侯以爲益侈國之下伏者十三禹作爲􅀕器黒􅃮其外朱􅀞其内觴酌有采而樽俎有飾殷人食器彫􅅣觴酌刻鏤淮南子曰崐崘旁有九井玉横横或作彭器名也受不死藥丗􅀃曰晉武帝嘗際王武子供饌悉用琉璃器涼州異物志曰方外殊珎車渠馬碯器無常形爲時之寳隨其大小以作孟枕杯褩也視之目眩希丗之巧羅刹所作非人所造羅利􅀑逺外國巧成器物與人交帝非人能所造地鏡圖曰銅器之屬見其狀如望馬煇煇然齊器之見爲牛楚器之見爲馬越器之見爲蝦蟇宋器之見爲白狗秦器之見爲豚燕器之見爲豕揚雄蜀都賦曰彫鐫釦器百􅇊千工魏武内誡令曰􅀌有逆氣病常儲水卧頭以銅器盛臭惡前以銀作小方器人不解謂􅀌喜銀物令以木作鼎爾雅曰鼎絶大謂之鼐圎弇上謂之鼎附耳外謂之才鼎􅀃文曰鼎三足兩耳和五味之寳器也昔禹貢九牧之金鑄鼎荆山之下民入山林川澤魑魅蝄蜽莫能逢之易曰鼎元吉亨􅂏曰鼎象也九四鼎折足覆公餗六五鼎黄耳金鉉利貞上九鼎玉鉉大吉無不利詩曰鼐鼎及鼒大鼎謂之鼐小鼎謂之鼒周禮曰王一日三舉鼎十有}
