  - {type: variant, offset: 5, length: 2, content: 彈碁, WYG: 物皆有俎禮曰故衛孔悝之鼎銘曰六月丁亥公假於太廟公曰叔舅乃祖莊叔左右成公成公乃命莊叔隨難於漢陽即宫於宗周奔走無射啓右獻公獻公乃命成叔纂乃祖服乃考文叔興舊嗜欲作率慶士躬恤衛國其勤公家夙夜不解民咸曰休哉公曰叔舅予女銘若纂乃服悝拜稽首曰對揚以辟之勤大命施於烝彛鼎又曰崇鼎實鼎天子之器也左𫝊曰宋華父督殺殤公召莊公於鄭而立之以郜大鼎賂公郜國所造器也四月取郜大鼎於宋納於太廟非禮也臧哀伯諫曰武王克商遷九鼎於洛邑義士猶或非之而况將昭違亂之賂器於太廟其若之何公弗聴又曰楚子伐陸渾之戎遂至於雒定王使王孫滿勞楚子楚子使問鼎之大小輕重焉對曰在徳不在鼎夏之方有徳也逺方圖物貢金九牧鑄鼎象物桀有昏徳鼎遷於商商紂暴虐鼎遷於周徳之休明雖小重也其姦回昏亂雖大輕也天祚明徳有所底止成王定鼎於郟鄏卜世三十卜年七百天所命也周徳雖衰天命未改鼎之輕重未可問也又曰魯襄公享晉六卿賂荀偃以乗馬束錦加璧先吳壽夢之鼎夀夢吴子也獻鼎於魯因以為名又曰晉叔向謂晏子曰雖吾公室亦季世也君日不悛以樂慆憂公室之卑其何日之有讒鼎之銘曰昩旦丕顯後世猶怠况日不悛其能久乎又曰楚薳唘疆曰是以聖王廟祀有珪享頫有章晏有好貨飡有陪鼎又曰鄭人鑄刑書又曰宋正考父佐戴武宣三命茲益恭故其鼎銘云一命而僂再命而傴三命而俯循墻而走亦莫余敢侮饘於是粥於是以糊余口又曰鄭子産聘於晉晉侯有疾韓宣子逆客私焉曰寡君寢疾於今三月矣並走羣望有加而無瘳夢黄熊入於寢門其何厲鬼也對曰昔堯殛鯀於羽山其神化為黄熊以入於羽淵實為夏郊三代祀之晉為盟主其或未祀也乎韓子祀夏郊晉侯有間錫子産莒之二方鼎又曰楚子次於乾谿僕析父從右尹子革夕王語曰昔我先王熊繹與吕伋王孫牟爕父禽父並事康王四國皆有分器我獨無有今吾使人於周求鼎以為分器王其與我乎對曰與君王哉今周與四國服事君王皆唯命是聽豈其愛鼎又曰齊侯伐徐徐人行成賂甲父之鼎又曰晉趙鞅荀寅率師城汝濱遂賦晉國一古鐵以鑄刑鼎著范宣子所為刑書焉榖梁傳曰桓公二年夏四月取郜大鼎於宋戊申内於太廟郜鼎者郜之所為也孔子曰器從邑名從主人故曰郜大鼎史記曰黄帝採首山銅鑄鼎荆山下鼎既成有龍垂胡髯下迎黄帝又曰伊尹欲干湯而無由乃為有莘氏媵臣負鼎俎以滋味說湯致於王道又曰周末有九鼎徙於太丘社亡而鼎沒於泗水彭城下其後百一十五年而兼天下始皇二十八年過彭城齋戒禱祀欲出周鼎使千人没水求之不得又曰秦武王與孟說舉龍文之鼎絶臏而死又曰孝文帝時新垣平言周鼎亡在泗水中今河溢通泗臣望東北汾隂直有金寳氣意周鼎其出乎兆見不迎則不至於是上使使治廟汾隂南臨河欲祠出周鼎漢書曰項羽身長八尺二寸目重瞳力能扛鼎又曰漢得汾隂寳鼎武帝嘉之藏於甘泉羣臣上夀賀曰陛下得周鼎吾丘壽王曰非周鼎上怒對曰周徳始乎后稷成於文武上天報應鼎為周出名曰周鼎今漢自髙祖繼周至陛下功徳愈盛天瑞並至昔秦始皇欲出鼎禱於彭城而不得今天祚有徳而寳鼎自出此天所以興漢是漢鼎非周鼎也上曰善又曰主父偃曰丈夫生不五鼎食死當五鼎烹耳又曰宣帝時漢陽得鼎獻之京兆尹張敞上議曰案鼎有刻書曰王命尸臣官此栒邑賜爾旂鸞黻黼琱戈尸臣拜手稽首曰敢對揚天子丕顯休命此鼎殆周之所以褒賜子孫刻銘其先功藏之於宫廟也}
