  - {type: variant, offset: 570, length: 708, content: 白梟橛梟橛並樗蒲彩之數不游乎紛競詆欺之間淡薄自如固趨名近利之人多不尚焉蓋道家所為欲習其偃亞導引之法擊博騰擲之妙自暢耳又曰唐順宗在春宮日甚好之時有吉達高釴崔同揚同愿之徒悉為名手後有竇深崔長孺甄顒獨孤遼亦為亞焉至于長慶之末好事之家猶見有局尚多解者後漢蔡邕彈棊賦曰夫張局陳棊取法式備因嬉戲以肄業託懽宴以講事設茲矢石其夷如砥采若錦繢平若停水肌理光澤滑不可履乘色行巧據險用智魏文帝彈棊賦曰局則荊山妙璞滑如柔荑碁則玄木北幹桑樹西枝象籌列植下據雙螭王粲彈碁賦曰文石為局金碧齊精隆中夷外理緻肌平晉傅玄彈碁賦序曰漢武帝好蹴鞠劉向以為蹴鞠勞人體竭人力非至尊所宜乃因其體而作彈碁以解之儒碁後魏書曰侍中游肇性謙廉不競曾撰儒碁以表其志焉肇述儒碁曰儒碁者蓋博弈之流所以遊思於文亦猶投壺之習武也故聖人因物設教有實有權情禮稱宜有張有弛孔子云不有愽弈者乎為之猶賢乎己若夫井公之對周穆叔卿之接許由此或示存恐非有待然則君子之處世也豈遂躭於所適徒費時日者哉至於几杖盤鑑猶裁銘戒矧乃諧神之器而不加勸也但古之為玩者莫不競進其功塞殺與樂殊途異勢並傳於時未有以謙退為勝通生為樂者故因暇隟聊復措意此即儒碁之一名蓋遊義之所統本諸謙淨銓名撰德略依儒行起捨遵道軌法中庸時然後玩人不厭其遊讓而後勝人逾愜其負矜勇所以知殘冲遜以之彌隆豈唯崇謙止競而已諒亦階善全德之所因矣積名會理其殆庶幾致泥之戒寧不愧乎儒碁曰投二方二分六彩也智一禮二仁三義四信五各法生數所以記彩而行於道豈唯名義而已籍物以為差也謙行數無准名顯義耳進退之異唯在梟伏棊十生成之數亦不是過白黑半各用五分方五分長寸分寸所以記法善六敬七德八忠九順十各據成數所以記筭而兼名義名義雖異亦符五德陰陽配合數盡也方局尺五周道四十其用三, SBCK: ''}
