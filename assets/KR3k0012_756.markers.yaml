markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', SBCK: 太平御覽卷第七百五十六器物部一器皿鼎器皿􅀃文曰皿飲食之用器也盛􅁰稷在器中也齊􅁰稷之器以祀者盧飯器也鐈巨招反似鼎而長足鏖一刀切温器也方言曰器破而不殊其音謂之音西聲也器破而未離謂之璺音問南楚之間謂之􆀅文正比刀凡以器盛而滿謂之涌與恐切言涌出也通俗文曰金銀鏤飾器謂之錯鏤竹器謂之笭箵笭郎鼎切箵桑鼎切竹器邊縁曰先管切書曰遟任有言曰人惟求舊器非求舊惟新言人貴舊器貴新又曰武王旣勝殷􅀖諸侯班宗彛作分器賦宗廟彛器酒罇賜諸侯禮曰孟春之月其器䟽以逹孟夏之月其器髙以粗孟秋之月其器廉以深孟冬之月其器閎以掩又曰侍食於君君賜餘器之漑者不冩陶淬之器其餘皆冩雚行之器又曰作竒巧之器以疑衆殺宗廟之器不鬻於市錦文珠玉成器不鬻於市又曰玉不琢不成器人不學不知道論語曰}
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_756-1a}
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_756-1b}
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書太平御覽卷七百五十六宋李昉等撰器物部一器皿鼎器皿說文曰皿飲食之用器也盛黍稷在器中也齊黍稷之器以祀者盧飯器也矯似鼎長足鏖温器也方言曰器破而不殊其音謂之斯元器破而未離謂之璺南楚之間謂之凡以器盛而滿謂之涌通俗文曰金銀鏤飾器謂之錯鏤竹器謂之笭箵竹器邊縁曰匿書曰遲任有言曰人惟求舊器非求舊惟新又曰武王既勝殷諸侯班宗彛作分器禮曰仲春之月其器疏以達仲夏之月其器髙以粗仲秋之月其器亷以深仲冬之月其器閎以奄又曰侍食於君君賜飯器之溉者不冩其餘皆寫又曰作竒技竒器以疑衆殺宗廟之器不鬻於市錦文珠玉成器不鬻於市又曰玉不琢不成器人不學不知道論語曰}
