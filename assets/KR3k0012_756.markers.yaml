  - {type: variant, offset: 4, length: 0, content: '', WYG: 年陳於柏寢案其刻果然前漢書賈誼曰夫天下大器也今人之器置諸安處則安置諸危處則危天下之情與器無異惟天子之所置之又曰里諺曰欲投䑕而忌器此善喻也䑕近於器尚憚不投恐傷其器况於貴臣之近主乎又曰􅄢賓國以金銀銅錫為器續漢書曰桓帝祠老子於濯龍用淳金缸器魏氏春秋曰武王入吕伯奢家聞其動食器之聲疑其圖已是夜手劒殺八人後魏書曰獠鑄銅為器大口寛腹名曰銅爨既薄且輕易於熟食晉令曰欲作漆器物賣者各先移主吏者名乃得作皆當淳漆者布骨器成以硃題年月姓名車頻秦書曰苻堅建元年中新平縣民耕地獲玉器初有金彫者頗知圖記王猛以為左道勸堅誅之彫臨死表堅曰新平地古顓頊墟應出古帝王寶至是果得之家語曰孔子觀於魯桓公之廟有欹器焉孔子問於守廟者曰此為何器也曰此盖宥坐之器孔子曰吾聞宥坐之器者虛則欹中則正滿則覆顧謂弟子曰試注水焉即操水而注之中而正滿而覆虛而欹孔子喟然歎曰嗚呼物焉有滿而不覆者乎老子曰埏埴以為器當其無有器之用韓子曰堯有天下飯於土簋飲於土鉶舜作食器斬山林而材之削修具迹漆墨其上諸侯以為益後國之不伏者十三禹作為祭器墨漆其外朱畫其内觴酌有米而樽俎布殷人食器彫琢觴酌刻鏤淮南子曰崑崙旁有九井玉横受不死藥世說曰晉武帝幸王武子家供饌悉用琉璃器凉州異物志曰方外珍珠車渠瑪瑙器無常形為時之寶隨其大小以作盂椀㮎槃也視之目眩希世之巧羅刹所作非人所造地鏡圖曰銅器之屬見其狀如望馬煇煇然齊器之象為牛楚器之象為馬越器之象為蝦蟇宋器之象為白狗秦器之象為豚燕器之象為豕楊雄蜀都賦曰􅀈鏤之器百披千工魏武内誡令曰孤有逆氣病常儲水卧頭以銅器盛臭惡前以銀作小方器人不解謂孤喜銀物令以木作鼎爾雅曰鼎絶大謂之鼐圓弇上謂之鼒附耳外謂之釴說文曰鼎三足兩耳和五味之寳器也昔禹貢九牧之金鑄鼎荆山之下民入山林川澤魑魅蝄蜽莫能逢之易曰鼎元吉亨彖曰鼎象也九四鼎折足覆公餗六五鼎黄耳金鉉利貞上九鼎玉鉉大吉無不利詩曰鼐鼎及鼒周禮曰王一日三舉鼎十有}
