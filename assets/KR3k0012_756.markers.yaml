  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第七百五十六器物部一器皿鼎器皿說文曰皿飲食之用器也盛黍稷在器中也齊黍稷之器以祀者盧飯器也鐈巨招反似鼎而長足鏖一刀切温器也方言曰器破而不殊其音謂之音西聲也器破而未離謂之璺音問南楚之間謂之􆀅文正比刀凡以器盛而滿謂之涌與恐切言涌出也通俗文曰金銀鏤飾器謂之錯鏤竹器謂之笭箵笭郎鼎切箵桑鼎切竹器邊縁曰先管切書曰遟任有言曰人惟求舊器非求舊惟新言人貴舊器貴新又曰武王旣勝殷邦諸侯班宗彛作分器賦宗廟彛器酒罇賜諸侯禮曰孟春之月其器䟽以逹孟夏之月其器髙以粗孟秋之月其器廉以深孟冬之月其器閎以掩又曰侍食於君君賜餘器之漑者不冩陶淬之器其餘皆冩雚行之器又曰作竒巧之器以疑衆殺宗廟之器不鬻於市錦文珠玉成器不鬻於市又曰玉不琢不成器人不學不知道論語曰}
  body:
  - {type: variant, offset: 1, length: 2, content: 藝部, SBCK: 欲善其事必先利其器史記曰舜陶於河濵器不苦窳以主切舜作什器於壽丘又曰通邑大都木器髹者千伏徐廣折曰髹音休􅃮也漢書日木器千伏銅器千鈞素木鐵器千石此亦千乗之家也又曰武帝有故銅器李少君曰此器齊桓公}
  - {type: variant, offset: 1, length: 2, content: 藝部, WYG: 欲善其事必先利其器史記曰舜陶於河濵器不苦窳舜作什器於夀丘又曰通邑大都木器髹者千枚銅器千鈞素水鐵器千石此亦千乗之家也又曰武帝有故銅器李少君曰此器齊桓公}
