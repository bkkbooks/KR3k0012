  - {type: variant, offset: 1280, length: 2374, content: 取捨途異四維之道通數而碁處惡其雅也謙退為尚故高彩者先投恥為道也彼此二位謂之淨淨者謂仁義也左右二道謂之中中者謂禮智之道也其淨中四道彼此左右互有二不得相干干則鬭也行碁之法始附淨起轉互相順終因淨出初不淨出必曲之者避相涉也通生為務不存塞殺志仁恕也彩越淨中者休則立梟梟者不伏彩不會也會淨中者梟折為伏伏者不梟行不越也若彩雖會而于彼擬以過之有碁則不得擬非干彼者則自居矣居擬不同以于彼也行伏碁者得異彩依數而行兩彩同者唯行一常柔齊也一謙者停兩謙退一等貴重損也行梟碁者得異彩亦依數而行兩彩同者盡行其數鄙勇均也一謙行一道兩謙者停梟致異也行伏不得行梟行梟不得行伏殊謙競也折梟伏者皆從後定重行終也因綵而閱者屈而申之謂初得謙信也緣行致累者越而通足皆不限道數進退皆爾梟伏兩閱者但行於梟先梟者進恥之義道尤多故也行碁之體不相凌觸所蹈皆靈行務靈淨唯焚觸鬭孤明自在不以強弱生而懼也絕於跪巧而順消息審理中也悉遇中道勝負乃分先梟後伏驗之於凈謙勇之辨實標先後處凈不安方顯其竟道梟若促不盡二彩者則全行伏先後用永防其為也自貽全進邊之義成也梟伏兩少者行於梟示不盡彩理無兼也彼既出盡此有不出者即許以為勝者之筭以後退為勝也若全未出則為之虛投損己益人謙者所崇次局負仍先梟勇故也得十筭立一爵三爵立則成勝矣既尚冲凈豈假務於多筭但謙並見跡故假以勝為名也擊壤釋名曰擊壤野老之戲也玄晏皇甫謐號玄晏先生曰十七年與從姑子果柳等擊壤于路逸士傳曰堯時有壤父五十人擊壤於康衢或有觀者曰大哉堯之為君壤父作色曰吾日出而作日入而息鑿井而飲耕田而食帝何力於我哉風土記曰擊壤者以森作之前廣後銳長可尺三四寸其形如履臘節僮少以為戲分部如擿博也藝經曰擊壤古戲也又曰壤以木為之前廣後銳長尺四闊三寸其形如履將戲先側一壤於地遙於三四十步以手中壤敲之中者為上吳盛彥翁子擊壤賦曰論眾戲之為樂獨擊壤之可娛因風託勢罪一殺兩角抵左傳曰晉侯夢與楚子搏搏手相搏楚子伏己而盬其腦是以懼漢書曰武帝元封三年春作角觝戲應劭曰戰國之時稍增講之以為戲樂用相誇亦至秦更名角抵者也武帝大復增廣之至元帝元初五年罷三百里內皆觀王隱晉書曰潁川襄城二郡班宣相會累欲作樂襄城太守責功曹劉子篤曰卿郡人不如潁川人相撲篤曰相撲下伎不足以別兩國優劣請使二郡更對論經國大理人物得失唐書曰裴矩帝幸東都矩以蠻夷朝貢者多諷帝大徵四方奇技作魚龍曼延角抵於洛邑以誇諸戎秋月而罷西京雜記曰三輔人俗用以赤刀為戲漢朝亦取以為角抵之戲焉漢武故事曰未央庭中設角抵戲角者六國所造也秦并天下兼而增廣之漢興雖罷然猶不都絕至上復採用之并四夷之樂雜以奇幻有若鬼神角抵者使角力相抵觸也彈廣雅曰彈行丸也左傳曰晉靈公臺上彈人觀其避丸者魏書曰齊王芳為帝常喜以彈彈人齊書曰桓榮祖善彈登西樓見翔鵠謂左右曰當生取之乃彈其兩翅毛脫盡墮地無傷飬之毛生後飛去其妙如此隋書曰長孫晟洛陽人也有鳶群飛上謂晟曰公善彈為我取之十發俱中並應丸而落吳越春秋曰陳音百對越王曰弩生於弓弓生於彈彈生於古之孝子古者人死投之中野孝子不忍父母為禽獸所食則作彈以守之故古人歌之曰斷竹屬木飛土逐肉西京雜記曰韓嫣好彈常以金為丸一日所失者十餘長安為之語曰苦飢寒逐金丸京師兒童每聞嫣出彈輒隨之望丸之所落而輒拾取莊子曰以隋侯珠彈千仞之雀必笑所用至重所取至輕又曰見卵而求時夜見彈而思鴞炙世說曰潘岳少時挾彈洛陽道婦人見之無不連手縈之談藪曰齊蕭遙欣為童子時見一小兒左右彈飛禽未有不應弦而落者遙欣謂之曰凡戲多端何急彈此鳥自雲中高翔何關人事小兒感之終身不捉時少年士庶競為此戲欣之一說此戲遂廢之又曰梁王謂惠子曰先生直言無得引喻惠子曰今有人不識彈問彈狀如何荅曰彈狀如彈則能了否王曰不了又曰彈狀如弓以竹為弦可知之乎王曰知矣惠子曰夫說者欲人知之無諭則不知也王曰善顧子義訓曰人有善於射而高於顧子顧子曰子之射雖百中猶不若我之一彈或曰何以為然顧子曰子之所射老狸之皮耳我之所彈彈狐之心潛夫論曰懷丸挾彈攜手遨遊外不足防寇盜內不足禁鼷鼠四維晉李秀四維賦序曰四維戲者衛尉贄侯所造也畫紙為局截木為棊取無一分而為二准陰陽之位擬剛柔之棊而變動無為生乎其中象戲周武帝造象戲王襃為象經序曰一曰天文以觀其象天日月星辰是也二曰地理以法其形地水火木金土是也三曰陰陽以順其本陽數為先本於天陰數為先本於地是也四曰時以政其序東方之色青其餘三色例亦如之是也五曰筭數以通其變俯仰則為天地日月星變通則為水火金木土是也六曰律呂以宣其氣在子取未在午取丑是也七曰八卦以定其位至震取兌至离取坎是也八曰忠孝以惇其教出則盡忠入則盡孝是也九曰君臣以事其禮不可以貴凌賤直而為曲不可以卑畏尊隱而無犯是也十曰文武以率其務武修七德文表四教是也十一曰禮像以制其居上不驕為下盡敬進退有度可法是也十二曰以考其行定而後求求而後取時然後言樂然後笑是也或升遷以報言義存遷善或黜退以貶過事在懲惡或以沈審為貴正其瞻視或以