  - {type: variant, offset: 1966, length: 5, content: 封敖為翰林, SBCK: 太宗征遼岑文本卒于行驛召許敬宗令草駐􅵖山破賊詔書敬宗立於馬前俄項而就詞甚典麗深見嗟賞唐賀知章晚年尤加縱誕無復規撿自號四明狂客遨遊里巷醉後屬詞動成卷軸文不加􅀧咸有可觀又曰王勮其御切長壽中累除太子典膳丞知鳯閣舎人事時壽春王成器衡陽王成義五王􅀄出閣同日受􅁽有司撰儀注不載􅁽文及百寮在列方知闕禮宰臣相頋失色勮立召小吏五人各執筆口授分授冩一時俱畢詞理典贍時人歎服之㝷除鳯閣舎人兼􅀪文館}
