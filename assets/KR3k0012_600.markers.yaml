  - {type: variant, offset: 2827, length: 303, content: 推此生宋書曰王誕字茂世有才藻晉孝武帝崩從叔尚書令珣為哀策出本示誕曰猶少敘節物一句誕便攬筆益之接其秋冬代變云霜繁廣除風回高殿詢歎美因而用之齊書曰張融作海賦文詞詭激獨與眾異後以示鎮軍將軍徐覬之覬之曰卿此賦實超玄虛但恨不道鹽耳融即求筆注曰漉沙構白熬波出素積雪中春飛霜暑路齊書劉繪傳曰魚復侯子響誅豫章王嶷欲求葬之召繪為表須臾便成嶷歎曰禰衡何以過此唯足八字文提攜鞠養俯見成人後魏書高祖嘗宴侍臣於清徽堂遂令黃門郎崔光讀暮春群臣應詔詩至彭城王勰詩高祖仍為改一字曰昔祁奚舉子天下謂之至公今見勰詩始知中府之舉非私也勰曰臣露此掘才見本朝之私賴蒙神筆賜刊得有令譽高祖曰雖雕琢一字猶是王之本體勰曰臣聞詩一言可蔽今陛下刊以一字足以價, SBCK: 原逌}
