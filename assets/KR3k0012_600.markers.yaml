  - {type: variant, offset: 317, length: 448, content: 士楊盈川華州華陰人少與絳州王勃范陽盧照鄰東陽駱賓王皆以文詞知名海內稱為王楊盧駱亦號為四傑炯聞之謂人曰吾愧在盧前恥居王後當時議者亦以為然其後崔融李嶠張說皆為一時宗匠崔李嘗曰王勃文章宏逸有絕塵之跡固非常流所及炯與照鄰則可企而致盈川之言不信矣張說謂人曰楊盈川之文如懸河注水酌之不竭既優於盧亦不減王恥居王後則信然愧在盧前為誤矣李華善屬文與蘭陵蕭潁士友善華舉進士時著含元殿賦萬餘言潁士見而賞之曰景福之上靈光之下華文體溫麗少宏傑之氣潁士詞鋒俊發華自以所業過之乃為祭古戰場文燻污之如故置於佛書之閣華與潁士因閱佛書得之華謂之曰此文何如潁士曰可矣華曰當代秉筆者誰及於此潁士曰君稍加精思便可及此華愕然又曰元和詞人元稹論杜子美之詩蓋所謂上薄風騷下該沈宋古奪蘇李氣吞曹劉掩顏謝之孤高雜徐庾之流麗盡得古今之體勢而兼人之所獨專矣則詩人已來未有如子美者是時山東人李白亦以文奇取稱時人謂之李杜予觀其壯浪縱恣擺去拘束模寫物象及樂府歌詩誠亦羗肩於子美矣至若鋪陳終始排比聲韻大或千言次猶數百詞氣豪邁而風調清深屬對律切而脫棄凡近則李尚不, WYG: ''}
