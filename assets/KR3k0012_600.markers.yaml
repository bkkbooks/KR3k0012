  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書太平御覧卷六百宋李昉等撰}
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_600-1a, image: WYG0898/WYG0898-0453c.png}
  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第六百}
  body:
  - {type: variant, offset: 3, length: 40, content: 五品量文章後周書薛寘傳曰前中書監盧柔學業優深文藻華贍而寘與之方駕故世號曰盧薛焉梁, SBCK: 六思疾思遟思疾漢}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 六思疾思遲思疾漢書曰枚臯年十七上書自陳枚乘之子上得大喜武帝春秋二十九乃得皇太子臯與東方朔作皇太子生賦臯為文疾受詔輒成司馬相如善為文而遲故所作少又曰淮南王安作内篇新出上愛秘之使作離騷傳旦受詔食時即上魏志曰陳思王植年十餘歲讀誦詩書論及辭賦數萬言善屬文太祖嘗視其文謂植曰汝倩人耳植跪曰出言為論下筆成章願當面試奈何倩人時銅雀臺新成太祖悉將諸子登臺使各為賦植援筆立成太祖異之文帝嘗欲害植以其無罪令植七步為詩若不成如軍法植即應聲曰煮豆燃豆箕豆在釡中泣本是同根生相煎何太急文帝善之又曰王粲善屬文舉筆便成無所改定人嘗以為宿搆齊書曰蕭文琰蘭陵人丘令楷吳興人江珙音拱濟陽人竟陵王子良嘗夜集學士刻燭為詩四韻者刻一寸以此為率文琰曰燒一寸燭成四韻詩何難之有乃與丘令楷江珙等共擊銅鉢音韻響滅則詩成皆可觀覧又曰高祖目裴子野曰其形雖弱其文甚壯俄又勑為書喻魏相元義其夜受㫖子野謂可待旦方奏未之為也及}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_WYG_600-1b, image: WYG0898/WYG0898-0453d.png}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_WYG_600-2a, image: WYG0898/WYG0898-0454a.png}
