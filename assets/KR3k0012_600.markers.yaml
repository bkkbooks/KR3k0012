  - {type: variant, offset: 2027, length: 1, content: 𥙿, SBCK: 林爲内史令與楊素共執朝政素功臣豪侈後房婦女錦衣玉食千人德林子百藥夜入其室則其寵妾所召也素拘執於庭將斬之百藥年未二十儀神儁秀素意惜之曰聞汝善爲文所作詩自叙稱吾意者當􅇠汝死解縳授以􅁓筆立就素覽之欣然以妾與之并資從數千萬楊德祖荅臨淄侯牋曰又嘗親見執事握牘持筆有所造作􅀂成誦}
