  - {type: variant, offset: 1365, length: 179, content: 痛也融等已逝唯幹著論成一家之言傅子曰或問劉歆劉向孰賢傅子曰向才學俗而志中歆才學通而行邪詩之雅育書之典謨文質足以相副玩之若近尋之益遠陳之若肆研之若隱浩浩乎其文章之淵府也李充翰林論曰潘安仁為文也猶翔禽之羽毛衣被之綃縠抱朴子曰世謂王充一代英偉所著文時有小疵猶鄧林枯枝滄海流芥未易貶者又曰歐陽生曰張茂先潘正叔潘安仁文遠過二陸又曰張潘與二陸為比不徒驟步之間也歐陽曰二陸, SBCK: 事詔命軍國}
