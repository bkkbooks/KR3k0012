  - {type: variant, offset: 3131, length: 442, content: 連城唐書文苑傳曰李商隱能為古文不喜偶對從令狐楚幕楚能章奏遂以其道授商隱自是始為今體章奏三國典略曰齊王在東山飲酒投柸怒赫召魏收於前立為書曰朕歷數在射志清四海蕞爾秦隴久阻風化混一之事期在今日必當訓旅誓眾天動雲臨朕已下木汾流成舡晉地便當躬先將士入王璧徑掩長安梟彼凶首朕與梁國舊敦好睦聞其姦計乃欲規謀宜令上黨王渙揔勒熊熊星流風卷王者之言明如日月宜宣內外咸使聞知書成齊主覽之於凶首下足九言曰雖藏山沒水終不縱赦於是遣渙南侵曹植與楊脩書曰世人之著述不能無病僕常好譏彈其文有不善者應時改定昔丁敬禮常作小文使僕潤飾之僕自以才不過若人辭不為也敬禮謂僕卿何所疑難文佳麗吾自得之後世誰相知定吾文者耶常歎此言達以為美譚世說曰司馬景王令中書虞松作表再呈輒不可意令松更定松思竭不能改心存之形於顏色鍾會察其憂問松松悅以實荅曾取為定五字悅服之以呈景王景王曰不當爾耶誰所當也曰鍾會向亦欲啟之會公見問不敢饕其能王曰如此可大用令來日平旦入見王獨撫手歎息曰此真王佐才也詆訶曹植與楊脩書曰劉季緒才不能逮於作者而好詆訶文章椅摭利病, SBCK: ''}
