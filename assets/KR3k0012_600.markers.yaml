  - {type: variant, offset: 766, length: 1150, content: 歷其藩翰況堂奧乎魏文帝典論曰文人相輕自古而然傅毅之於班固伯仲之間耳而固小之與弟超書曰武仲以能屬文為蘭臺令史下筆不能自休夫人善於此自見而文非一體鮮能備善是以各以所長相輕所短矣里諺曰家有弊帚享之千金斯不自見之患也今之文人魯國孔融文舉廣陵陳琳孔璋山陽王粲仲宣北海徐翰偉長陳留阮瑀元瑜汝南應瑒德璉東平劉楨公幹斯七子者於學無所遺於辭無所假咸自以騁騄驥於千里仰齊足而並馳以此相服亦良難矣蓋君子審己以度人故能免於斯累而作論文王粲長於辭賦徐翰時有逸氣然粲之匹也如粲之初征登樓槐賦翰之玄猿漏巵員扇橘賦雖張蔡不足過也然於它文未能稱是琳瑀之章表書記今之俊也應瑒和而不壯劉楨壯而不密孔融體氣高妙有過人者然不能持論理不勝辭至于雜以嘲戲及其時有所善楊班之儔也常人貴遠賤近向聲背實又患闇於自見謂己為賢夫文本同而未異蓋奏議宜雅書論宜理銘誄尚實詩賦欲麗此四科不同故能之者偏也唯通才能備其體文以氣為主氣之清濁有體不可力強而致譬諸音樂曲度雖均節奏同撿至於引氣不齊巧拙有素雖在父兄不能以移子弟蓋文章經國之大業不朽之盛事年壽有時而盡榮樂止乎其身二者必至之常期未若文章之無窮是以古之作者寄身於翰墨見意於篇籍不假良史之辭不託飛馳之勢而聲名自傳於後故西伯幽而演易周旦顯而制禮不以隱約而不務不以康樂而加思夫然則古人賤尺璧而重寸陰懼乎時之過已而人多不強力貧賤則懼於饑寒富貴則流于逸樂遂營目前之務而遺千載之功日月逝于上體貌襄於下忽然與萬物遷化斯亦志士大痛也融等已逝唯幹著論成一家之言傅子曰或問劉歆劉向孰賢傅子曰向才學俗而志中歆才學通而行邪詩之雅育書之典謨文質足以相副玩之若近尋之益遠陳之若肆研之若隱浩浩乎其文章之淵府也李充翰林論曰潘安仁為文也猶翔禽之羽毛衣被之綃縠抱朴子曰世謂王充一代英偉所著文時有小疵猶鄧林枯枝滄海流芥未易貶者又曰歐陽生曰張茂先潘正叔潘安仁文遠過二陸又曰張潘與二陸為比不徒驟步之間也歐陽曰二陸文詞源流不出俗撿又曰秦時不覺無鼻之醜陽翟憎無癭之人陸君深疾文士放蕩流遁遂往不為虛誕之言非不能也陸君之文猶玄圃之積玉無非夜光也吾生之不別陸文猶侏儒測海非所長也歎賞晉書曰張載為濛汜賦司隸校尉傅玄見而嗟歎以車迎之言譚盡日為之延譽遂知名又曰張華字茂先阮籍見華鷦鷯賦許以王佐之才中書郎成公綏亦推華文義勝己陸機弟雲嘗與機書云君苗見兄文輒欲燒其筆硯後葛洪著書稱機文猶玄圃之積玉無非夜光焉五河之吐流源如一焉其𢎪麗妍贍英銳源逸亦一代之絕乎南史曰王筠字元禮善屬文沈約每見其文常咨嗟謂曰昔蔡伯喈見王仲宣曰吾家書籍悉當相與僕雖不敏請附斯言筠嘗以詩呈約報書歎詠以為後進擅美約又嘗謂筠叔志曰賢弟子文章之美可謂後來獨秀又曰謝眺好獎人才會稽孔闓粗有文筆才未為時人所知孔稚珪嘗令草讓表以示眺眺嗟吟良久手自折簡寫之謂珪曰士子聲名未立應共獎成無惜齒牙餘論其好善如此吳均齊春秋曰丘靈鞠, WYG: 鼓琴}
