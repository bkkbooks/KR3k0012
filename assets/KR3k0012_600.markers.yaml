  - {type: variant, offset: 2728, length: 569, content: 父之慟哭似實慟而非假豈一性之足傷乃致傷於天下至此便改韻珣云此賦必傳千載無容率爾今於天下之後便移韻結事然於寫送之致似未為盡桓溫曰卿思益之宏應聲曰感不絕於予心愬流風而獨寫珣諷味久之謂滔曰當今文章之美當共推此生宋書曰王誕字茂世有才藻晉孝武帝崩從叔尚書令珣為哀策出本示誕曰猶少敘節物一句誕便攬筆益之接其秋冬代變云霜繁廣除風回高殿詢歎美因而用之齊書曰張融作海賦文詞詭激獨與眾異後以示鎮軍將軍徐覬之覬之曰卿此賦實超玄虛但恨不道鹽耳融即求筆注曰漉沙構白熬波出素積雪中春飛霜暑路齊書劉繪傳曰魚復侯子響誅豫章王嶷欲求葬之召繪為表須臾便成嶷歎曰禰衡何以過此唯足八字文提攜鞠養俯見成人後魏書高祖嘗宴侍臣於清徽堂遂令黃門郎崔光讀暮春群臣應詔詩至彭城王勰詩高祖仍為改一字曰昔祁奚舉子天下謂之至公今見勰詩始知中府之舉非私也勰曰臣露此掘才見本朝之私賴蒙神筆賜刊得有令譽高祖曰雖雕琢一字猶是王之本體勰曰臣聞詩一言可蔽今陛下刊以一字足以價等連城唐書文苑傳曰李商隱能為古文不喜偶對從令狐楚幕楚能章奏遂以其道授商隱自是始為今體章奏三國典略曰齊王在東山飲酒投柸怒赫召魏收於前立為書曰朕歷數在射志清四海蕞爾秦隴久阻風化混一之事期在今日必當訓旅誓眾天動雲臨朕已下木汾流成舡晉地便當躬先將士入王璧徑掩長安梟彼凶首朕與梁國舊敦好睦聞其姦計乃欲規謀宜令上黨王渙揔勒熊熊星流風卷王者之言明如, WYG: ''}
