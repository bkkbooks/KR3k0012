  - {type: variant, offset: 8, length: 0, content: '', WYG: 見知曽奉詔為封禪文收對曰封者帝之盛事昔司馬長卿尚絶筆於此以臣下材何敢輙擬臣雖愚淺敢不竭作乃於御前下筆便就不立藁草文將千言黄門侍郎賈思同侍立深奇之白帝曰雖七步之才無以過此自武定二年以}
