  - {type: variant, offset: 2136, length: 485, content: 不迨意如卿此語秉筆者不易措言坐中解其所賜玉帶以遺敖深禮重之又曰馮定為太常少卿文宗每臨樂鄙鄭衛詔奉常習開元中霓裳羽衣舞以雲韶樂和之定統樂立於庭文宗以其端凝若植問其姓氏翰林學士李玨奏定之名文宗喜問曰豈非能為古章句者耶遂召昇階文宗自吟送客西江詩吟罷益喜因鍚以禁中瑞錦仍令大錄所著古體詩以獻世說曰孫興公作天台賦成以示范榮期曰卿試擲置地要作金石之聲范曰恐子之金石非宮商中聲然每至佳句輒云應是我輩語又曰左思字太冲作三都賦時人互有譏訾思意不甚愜後示張華曰此二京可三然君文未重於世宜以示高名之士思乃請序於皇甫謐謐見之唴嘆遂為作序於是先相訾者莫不歛袵讚述焉又曰庾仲初作楊都賦成呈庾亮以親族之懷大為其名價云可三二京四三都於是人人競寫都下紙為之貴顏氏家訓劉孝綽當時既有重名無所與讓唯服謝詠置几案動輒諷吟味其文改易語曰為命禆諶草創之世叔討論之行人子羽脩飾之東里子產潤色之漢書曰倪寬善屬文張湯為廷尉廷尉府盡用文史法律之吏而寬以傳生在其間見謂不習事不署曹除為從吏之北地租畜數年還至府上畜薄會廷尉時疑奏已再卻矣掾吏莫知所為寬言其意掾吏因使寬為奏奏成讀之皆服以白廷尉張湯湯大驚召寬與語乃部其材以為掾上寬, WYG: ''}
