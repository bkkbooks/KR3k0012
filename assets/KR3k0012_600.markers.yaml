  - {type: variant, offset: 45, length: 126, content: 何遜文章與劉孝綽並見重時謂之何劉梁元帝著論云詩多而能者沈約文少而能者謝眺何遜三國典略曰劉逖字子長少好弋獵騎射後發憤讀書頗工詩詠行臺尚書席毗嘗嘲之曰君輩詞藻譬若春榮須臾之翫非宏材也豈比吾徒千丈松樹常有風霜不可雕倅逖報之曰既有寒木又發春榮何如也毗笑曰可矣唐, SBCK: 枚臯年十七上}
