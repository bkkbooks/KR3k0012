  - {type: variant, offset: 1973, length: 4, content: 拜中書舍, krp: 又曰韋承慶遷鳯閣舎}
  - {type: variant, offset: 1974, length: 0, content: '', WYG: 官㑹十子曰詩先成者賞時端先獻警句云薫香荀令偏憐小傅粉何郎不解愁主即以百縑賞之錢起曰李校書誠有才此篇宿搆也願賦一韻正之請以起姓為韻端即襞牋而獻曰方塘似鏡草芊芊初月如鈎未上弦新開金埒教調馬舊賜銅山許鑄錢曖曰此愈工也又曰令狐楚為太原從事自掌書記至節度判官厯仗下侍御史楚才思俊麗德宗好文每太原奏至能辨楚之所為頗稱之鄭儋都含切在鎮暴卒不及處分後事軍中喧譁將有急變中夜忽十數騎持刄廹楚至軍門諸將環之令草遺表楚在白刄之中搦管即成讀示三軍無不感泣軍情乃安自是聲名益重又曰}
