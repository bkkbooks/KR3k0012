  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_600-1a.2}
  - {type: variant, offset: 4, length: 2, content: 品量, WYG: 鼔勑促令速上子野徐起操筆昧爽便就既奏高祖深嘉焉自是凡文檄皆令具草南史曰朱异音怡又音異遷散騎常侍异容貌魁梧能舉止雖出自諸生甚閑軍國故實自周捨卒後异代掌機密其軍旅謀謨方鎮改換朝儀國典詔誥勑書並典掌之四方表疏當局簿領諮詳請斷填委於前异屬辭落紙覧事下議縱横敏贍不暫停筆頃刻之間諸事便了又曰蔡景厯陳武帝鎮朱方素聞其名以書要之景厯對使人答書筆不停綴文無改易帝得書甚加欽賞即日授征北府中記室㕘軍崔鴻十六國春秋南凉錄曰禿髪傉内沃切檀子歸年十三命為高昌殿賦援筆即成影不移漏傉檀覧而異之擬於曹子建北齊書曰魏收鉅鹿人以}
