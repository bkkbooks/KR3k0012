  - {type: variant, offset: 1973, length: 0, content: '', WYG: 又曰韋承慶遷鳯閣舍人兼掌天官選事承慶属文敏捷雖軍國大事下筆輙成未嘗起草又曰孫逖㓜而英俊文思敏速始年十五謁雍州長史崔日用日用小之令為土火爐賦握翰即成辭理俱贍日用覧之駭然遂為㤀年之交以是聲譽益重又曰𤣥宗度曲欲造樂府新詞亟召李白白嗜酒已卧於肆矣召入以水灑面即令秉筆頃之遂成十餘章帝頗嘉之又曰韋温綬之子也以書判㧞萃調補祕書省校書郎時綬致仕田園聞温登科愕然曰判入高等在羣士之上得非結交權倖而致耶令設席於庭自出判目試兩節温命筆即成綬喜曰此無愧也又曰李端登進士第工詩大厯中與韓翃錢起盧綸等文詠唱和馳名都下號大厯中十才子時郭尚父少子曖尚代宗昇平公主賢明有才思尤喜詩人而端等十人多在曖之門下每晏集賦詩公主坐視簾中詩之羙者賞曖因}
