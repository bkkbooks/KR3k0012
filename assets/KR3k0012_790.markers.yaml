  - {type: variant, offset: 913, length: 4, content: 十國役屬, SBCK: 月爲歳首菜則葱韮䔉菁菓則桃梅李柰有絲麻女工􅅙織之事出絶絹絲布廣七寸以下早蚕以正月生二月熟畜有馬牛猪羊雞犬飯用竹筲摶之而取羹用象柸􅀂鷄彛有舩無車男女氈皮爲帔女子絶布爲裙於仍披氈皮之帔頭髻一盤而成形如髽阻􅀲切男女皆跣至於死喪哭泣棺椁襲劒無不畢備三年之内穿地爲坎殯於舎側上作小屋三年之外岀而葬之蠡封􅑕棺今其耐濕父母死皆斬衰布衣逺}
  - {type: variant, offset: 913, length: 4, content: 十國役屬, krp: 月爲歳首菜則葱韮䔉菁菓則桃梅李柰有絲麻女工蠶織之事出絶絹絲布廣七寸以下早蚕以正月生二月熟畜有馬牛猪羊雞犬飯用竹筲摶之而取羹用象柸若鷄彛有舩無車男女氈皮爲帔女子絶布爲裙於仍披氈皮之帔頭髻一盤而成形如髽阻瓜切男女皆跣至於死喪哭泣棺椁襲劒無不畢備三年之内穿地爲坎殯於舎側上作小屋三年之外岀而葬之蠡封􅑕棺今其耐濕父母死皆斬衰布衣逺}
