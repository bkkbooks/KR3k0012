  - {type: variant, offset: 2, length: 0, content: '', WYG: 六結胷國羽民國讙兜國厭火國三苗國臷國臷徒結切交脛國不死國支舌國三首國焦僥國長臂國三身國一臂國竒肱國丈夫國巫咸國女子國軒轅國白民國長目國無䏿國一目國和利國深目國大人國君子國跂踵國無腸國聶耳國青邱國黑齒國𤣥股國毛民國勞民國氐人國姑射國蜮國沃國反風國林郍國無論國句稚國歌營國加陳國師漢國扈利國姑奴國察牢國類人雕題國狼臙國瓮人黄頭人儋耳國穿胷國西屠國金隣國波遼國屠都乾國波延國究原國奴後國炎人國黄孫落頭民鮫人松外諸蠻結胷國山海經曰結胷國其人結胷郭璞注曰臆前胅出如人結喉也羽民國山海經曰羽民國其人長頭身生羽一曰其人長頰外國圖曰羽民能飛不能逺其人卵産去九疑四萬里讙兜國山海經曰讙兜國其人人面有翼鳥啄讙兜堯臣有罪自投南海而死帝矜之使其子居南海而祠之也一曰讙朱國神異經曰南方荒中有人人手鳥足杖翼而行但食海中魚雖有翼不足以飛倚為徑行勢也一名讙兜為人狼惡姦疎不畏風雨不忌禽獸有所觸犯死乃休耳厭火國山海經曰厭火國其人獸身黑色火出其口中似獮猴黑色也三苗國書曰堯竄三苗于三危山海經曰三苗國在赤水東神異經曰西北荒中忙食有人焉皆人形而腋下有翼不能飛名曰苗民為人饕餮滛逸無禮外國圖曰昔唐以天下授虞有苗之君非之苗之民浮黑水入南海是為三苗氏去九疑三萬三千里臷國山海經曰臷國其為人黄能操弓射蛇一曰盛國在三毛東括地圖曰禹誅防風氏夏德二龍降之禹使范氏御之以行經南方防風國見禹使怒射之有迅雨二龍升去臣俱以刃自貫其心死禹哀之療以不死草皆生是名穿胷去會稽萬}
