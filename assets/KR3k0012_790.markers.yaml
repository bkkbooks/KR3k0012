  - {type: variant, offset: 53, length: 290, content: 先渠帥有六自號六詔兵力相埒各有君長無統帥蜀時為諸葛亮所征皆臣服之又曰南詔蠻國初時有蒙舍尨生迦獨迦獨生細奴邏高宗時來朝細奴邏生邏盛武后時來朝其妻方娠邏盛次姚州間妻生子曰吾且有子死於唐地足矣子名盛邏皮邏盛至京師賜錦袍金帶師國開元初邏盛死盛邏皮立盛邏皮死子皮邏閤立又曰南詔蠻皮邏閤嗣立二十六年詔授特進封越國公賜名曰歸義其後破洱阿蠻洱音而志切以功茦授雲南王歸義漸強盛餘五詔浸弱先是劍南節度王昱受歸義賂奏六詔合為一詔歸義既併五詔服群蠻破吐蕃之眾兵日以驕大遂徙居大和城天寶四載歸義遣孫鳳迦異來朝授鴻臚卿歸國恩賜甚厚又曰閤羅鳳襲封王無何鮮于仲通為劍南節度使張虔陁為雲南太守仲通褊急寡謀虔陁矯詐遇, WYG: ''}
