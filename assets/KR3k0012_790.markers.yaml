  - {type: variant, offset: 3, length: 0, content: '', SBCK: 榖衣服一曰盛國括地圗曰禹誅防風民夏德二龍降之禹使范氏御之以行經}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 千里交脛國山海經曰交脛國在貫胷東其人交脛外國圖曰交脛民長四尺不死國山海經曰不死國在交脛東其人黑色壽不死有員邱山上有不死樹支舌國山海經曰支舌國在不死東三首國山海經曰三首國一身三首焦僥國後漢書曰安帝永初中永昌徼外焦僥種夷陸類等三千餘口舉種内附獻象牙封牛其人長三尺穴居善游鳥獸懼焉列子曰中州以東三十萬里得焦僥國人長一尺五寸山海經曰周饒國為人短小冠帶一曰焦僥國在三首東也家語曰吳之客問孔子曰人之長極幾何對曰焦僥民長三尺短之極也長者不過十是數之極也外國圖曰焦僥民善没游善捕鷙鳥其草木夏死而冬生去九疑三萬里又曰從啖水}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_WYG_790-5b, image: WYG0900/WYG0900-0025d.png}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_WYG_790-6a, image: WYG0900/WYG0900-0026a.png}
  - {type: variant, offset: 3, length: 0, content: '', krp: 榖衣服一曰盛國括地圗曰禹誅防風民夏德二龍降之禹使范氏御之以行經}
  - {type: variant, offset: 4, length: 1, content: 詔, SBCK: 方防風神見禹怒使射之有迅􅀨二龍升去臣懼以刃自貫其心死禹哀之療以不死草皆生是名穿匈民去㑹稽萬五千里交脛國山海經曰交脛國在貫匈東其人交脛言脚脛曲失相交所謂雕題交趾者外國圖曰交脛民長四尺不死國山海經曰不死國在交脛東其人黒色壽考有員丘山不死樹食之不死有赤泉飲之不老支舌國山海經曰支舌國在不死東其人舌皆歧或云支舌也三首國山海經曰三首國一身三首僬僥國後漢書曰安帝永􅀄中永昌徼外僬僥種夷陸􅀋等三千餘口舉種内附獻象牙牛封牛其人長三尺穴居善㳺鳥獸懼焉列子曰中洲以東三十萬里得僬僥國人長一尺五寸山海經曰周饒國爲人短小冠帶其人長三尺穴居能爲機巧有五榖一曰僬國在三首東家語曰吴之客問孔子曰人之長極幾何對曰僬僥民長三尺短之極也長者不過十之數之極也長者十短者三皆數之極也外國圖曰僬僥民善没游善捕鷙鳥其草木夏死而冬生去九疑三萬里又曰從啖水南曰僬僥其人長尺六寸一曰迎風則偃背風則伏不衣而野􅀫長臂國山海經曰長臂國人長一尺五捕魚水中兩手各操一魚云其人手折乗至地海東有人嘗在海中得布淂習衣如中國衣兩䄂長三丈即此長臂民衣三身國山海經曰三身國一首而三身一臂國山海經曰一臂國在三身北一臂一目一鼻孔竒肱國山海經曰竒肱國其人一臂丈夫國括地圖曰殷帝大戊使王孟採藥於西王母至此絶粮食木實衣木皮終身無妻而生二子從背間出是爲丈夫民去玉門二萬里巫咸國山海經曰巫咸國在女刃北右手操青蛇左手操赤虵在登葆山羣巫所所從上下也操藥徃來外國圖曰昔殷帝大戊使巫咸禱於山河巫咸居於此是爲巫咸民去南海萬千里女子國山海經曰女子國在巫咸北兩女子居水外周之有黄池婦人入洛出即人孕矣生男三歳死周猶遶也軒轅國山海經曰軒轅國在窮山之際其不言壽者八伯歳其國在山南邊也荒中日山之南也南女子北人面虵身尾交首上不敢西䠶畏軒轅之丘言敬畏黄帝威靈故不敢向之射也白民國山海經曰白民之國在龍魚北白身􅀍髪其人體洞白也又曰白民之國室後帝鴟生白民􅀶物志曰日南有野女羣行不見夫其體皛明子切白祼􅃝無衣長股國山海經曰長股之國在雄常北􅀍髮國在赤水東長臂人身如人臂長三丈以􅀋推之則此脚過三丈矣黄帝時至或曰長脚人常􅀒長脚入海中捕魚無啓音唘國山海經曰海水自東北陬至無啓國在長股東爲人無晵䀾肥膓也其人穴居食土無男女死即理之其心不朽死百二十歳乃復更生也一目國山海經曰一目國一目中其面也和利國山海經曰和利國在一目東爲人一手足反膝曲足居上反巷曲也一曰留利之國人手反折􅀷目國山海經曰􅀷目國爲舉一手無膓國山海經曰無膓之國在􅀷目東爲人長而無膓聶耳國山海經曰聶耳國在無膓國東爲人兩手聶其耳言耳長行則以手攝持之縣居海水中縣居邑也􅉥踵國山海經曰􅉥踵國在拘纓東其人兩足皆大其人行折䟽不着地也一曰踵國大人國山海經曰大人國爲人獸身人面犬耳珥兩青虵以虵貫耳也君子國山海經曰君子國人冠衣帶劒其人好不爭也青丘國山海經曰青丘國其人食五榖衣絲帛其􅀌九尾黒齒國山海經曰黒齒國東夷傳曰俀國東四千餘里有祼國東有黒齒國舡行一年始可至也異物志云西屠染齒亦以放些也玄服國山海經曰玄服之國髀皆似􅀞青黑其人衣魚以魚爲皮爲衣食鷗鷗水鴞也毛民國山海經曰毛民國爲人身生毛今去臨海郡東二千餘里毛人在大海中州島上爲人短小面躰有毛如猪熊云居亦衣服晉永嘉四年呉都郡司塩都尉戴建猪熊云在海邊得一舩上有男女四人狀皆如此言語不通送詣承相府未至道路死有一人在上賜婦生人女子出入市井漸曉人語自說其所是此毛民神異經曰八荒之中有毛人焉長七八尺皆人形身鷗頭上皆毛毛如猕猴毛長尺人則臭􅀂鵙切目開口􅄍舌上唇覆靣下唇覆匈臨海水􅁟物志曰毛人之洲乃在漲嶼身無衣服鑿地穴處雖云象人不知言語齊長五尺毛如熊豕衆軰相隨逐捕鳥䑕无五榖唯捕鳥䑕魚肉以爲粮耳勞民國山海經曰勞民國爲人黒食菓草實也有一鳥兩頭也手足盡黒氐人國山海經曰氐人國者觸抵之抵在建木西人靣而魚身無足自胷以上人以下魚也姑射國山海經曰姑射國在海中蜮國山海經曰域有山者域有民之國食桑射蜮是食虵短狐也似鱉含沙射人中則病死則山岀之也沃國山海經曰有沃之國言其土饒沃也沃民是處鳯凰鳥之􅆑是食甘露是飲故其欲其味皆存也反風國道書曰反風之國香逆風聞千里也林郍國竹芝扶南記曰林郍國蠻其延國未多曰􅀺與毗騫同大洲放二萬里法俗是同無論國南州異物志曰無論有大道左右種桃枇杷及諸花果白曰行其下隂凉蔽熱十餘里一亭皆有井水食夌飯飲蒲桃酒如膠􅀂欲飲以水和之其味甘羙句稚國南州異物志曰句稚去典遊八百里有江口西南向東北行極大﨑頭出漲海中淺而多礠石歌營國南州異物志曰歌營在句稚南可一月行到其南文灣中有洲名蒲􅀋上有居人皆黒如􅃮齒正白眼赤男女皆祼形康㤗扶南土俗大載而折去常望海過則遮舡將雞猪山菓昜鐵器加陳國南州異物志曰加陳在歌營西南師漢國南州異物志曰師漢國在句稚西從稚去行可十四五日乃到其國亦稱王上有神人及明月珠但仁善不忍殺生土地平􅀶民有萬餘家扈利國南州異物志曰扈利國在奴調洲西南邊海姑奴國南州異物志曰姑奴去歌營可八千里民人萬餘尸皆乗四轅車駕二馬或四馬四㑹所集也舶舩常有百餘艘市㑹萬餘人晝夜作市舩皆鳴皷吹角人民衣被中國察牢國南州異物志曰察牢在安息中間大國也去天竺五千里人民勇徤舉國人皆稱王種國無常王國人常選耆老有德者立爲王三歳一更舉土地所與天竺同慕其土地不出國逺行􅀋人南州異物志曰扶南海隅有人如獸此人扶南之東縁海邊畧如禽獸人无道也身黒􅀂􅃮齒白如素扶南以外民皆􅃮齒使黑而此人身體雖獨不􅃮齒故正白也隨時流移居無常處水此民不知安立屋宅乃隨寒暑素遂飲身躰雖小夏則入水捕魚冬則登山射麋鹿也食唯魚肉不識禾稼寒無衣服以沙自覆此人無衣服􅀂小過寒凉輙自覆惟以岀面目耳時或屯聚猪犬雞糅此人无衣服􅀂遇寒凉以沙自覆惟以出靣目耳時或此人或時權有可得停猶知立一小屋以自藉家中男女大小并止猪犬共息其中无復分别也雖忝人形無踰六畜雕題國異物志曰雕題國􅀞其靣及身刻其肥而青之或􅀂錦衣或􅀂魚鱗狼臙國異物志曰狼臙國男無衣服女撗布惟出與漢人交昜不以晝市暮夜㑹俱以鼻齅金則知好惡瓮人異物志曰瓮人齒及目甚鱗白靣體異黒􅀂􅃮皆光澤爲奴婢強勤力黃頭人異物志曰黃頭人羣相隨行無常居處其􅀋與禽獸同或依大樹以草􅀍其枝上而庇隂其下髮正黃如掃箒見漢人散入草終不可得近儋耳國異物志曰儋耳夷生則鏤其頭皮尾相連并鏤其耳匡爲數行與頰相連狀如鷄腹下垂肩上食藷時諸切紡績爲業穿􅅐國異物志曰穿胷人其衣則縫布二幅合兩頭開中央以頭貫穿胷身不穾穿西屠國異物志曰西屠國在海水以草􅃮齒用白作黒一染則歴年不復變一号黒齒交州以南外國傳曰有銅柱表爲漢之南極界左右十餘小國悉属西屠有夷民所在二千餘家金隣國異物志曰金隣一名金陳去扶南可二千餘里地出銀人民多好獵大象生得乗􅀐死則取其牙齒外國傳曰從扶南西去金陳二千餘里到金陳波遼國外國傳曰從西圖南去百餘里到波遼十餘國皆在海邊屈都乹國外國傳曰從波遼國南去乗舩可三千里到屈都乹國土地有人民可二千餘家皆曰朱吾縣民叛居其中波延洲外國傳曰從屈都乾國東去舡行可千餘里到波延洲有民人二百餘家專採金賣與屈都乹國究原國民外國傳曰究原有獠民岀錫䥫雞舌香及赤白五色鸚鵡鳥究原逹永昌一歳奴後國外國傳曰從林陽西去二千里奴後國可二萬餘戸與永昌接界炎人國慱物志曰楚之南炎人之國其親戚死刳肉死弃之然後埋其骨乃成孝子黄孫􅀶物志曰黄孫天毒君之孫也名貴􅀒躁而好自飲汁父母􅀏之愧而去居此黄孫國去九嶷二萬一千里落頭民􅀶物志曰南方有落頭民其頭能飛其種人常有所􅀕号曰蟲落故因取名焉以其頭飛因眼便去以耳爲翼將曉還復着體吴時徃徃得之鮫人􅀶物志曰南海水有鮫人水居如魚不廢織績其眼能泣珠松外諸}
