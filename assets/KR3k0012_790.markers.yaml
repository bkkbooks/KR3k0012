  - {type: variant, offset: 19, length: 0, content: '', WYG: 其土有稻麥粟豆種穫亦與中夏同而以十二月為嵗首菜則葱韮蒜䔉菁菓則桃梅李柰有絲麻女工蠶織之事出紽絹絲布廣七寸以下早蠶以正月生二月熟畜有馬牛猪羊雞犬飯用竹筲搏之而取羮用象杯若鷄彛有船無車男子以氊皮為帔女子絁布為裙衫仍披氊皮之帔頭髻一盤而成形如髽阻𤓰切男女皆跣至於死喪哭泣棺槨襲歛無不畢備三年之内穿地為坎殯於舍側上作小屋三年之外出而𦵏之蠡蚌封棺取其耐濕父母死皆斬衰布衣逺者至四五年近者二三年然後即吉其被人殺者䘮主以麻結髪而黑其面衣裳不准緝服内不廢㛰妻不避同}
