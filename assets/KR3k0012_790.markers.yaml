  - {type: variant, offset: 549, length: 214, content: 瀘縣令嶲州陷為所虜閤羅鳳以回有儒學更名曰蠻利甚愛重之命教鳳迦異及異牟尋立以回為清平官事皆咨之回嘗言於牟尋曰自昔南詔嘗款附中國中國尚禮義以惠養為務無所求取今棄蕃歸唐無遠戍之勞利莫大焉牟尋善其言謀內附者十餘年矣會劍南西川節度使韋皋招撫諸蠻苴烏烏星虜望等歸化聞牟尋之意因諸蠻寓書於牟尋且招懷之牟尋乃斬吐蕃使去其所立帝號以歸我仍請復南詔舊名初吐蕃因爭北庭與廻鶻大戰死傷頗眾乃徵兵於牟尋須萬人牟尋欲因以襲之及示寡弱謂吐蕃曰蠻軍素少僅可發三, SBCK: ''}
