  body:
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 六結􅅐國羽民國讙兠國厭火國三苗國臷國臷徒結切交脛國不死國支舌國三首國焦僥國長臂國三身國一臂國竒肱國丈夫國巫咸國女子國軒轅國白民國長目國無啓國一目國和利國􅀷目國無腸國聶耳國跂踵國大人國君子國青丘國黒齒國玄服國毛民國勞民國氐人國姑射國蜮國沃國反風國林郍國無論國句稚國歌營國加陳國師漢國邑利國姑奴國察牢國􅀋人雕題國狼曣國曣音燕瓮人黃頭人儋耳國穿胷國西屠國金隣國波遼國屋都乾國波延洲究原國奴後國炎人國黃孫落頭民鮫人松外諸蠻結􅅐國山海經曰結胷國其人結匈郭璞曰曰臆前出如人結喉也羽民國山海經曰羽民國其人長頭身生羽一曰其人長頰外國圗曰羽民羽飛不能逺其人􅆑産去九疑四萬里讙兠國山海經曰讙兠國其人人靣有翼鳥啄讙兠堯臣有罪自放南海而死帝矜之使其子居南而祠也一曰讙朱國神異經曰南方荒中有人人手鳥足杖翼而行但食海中魚雖有翼不足以飛􅀝爲徑行勢也一名讙兠爲人佷惡姦踈不畏風􅀨不忌禽獸有所觸犯死乃休耳厭火國山海經曰厭火國其獸身黒色火出其口中似弥候黑色也三苗國書曰堯竄三苗于三危山海經曰三苗國在赤水東神異經曰西北荒中有人焉皆人形而腋下有翼不能飛名曰苗民爲人饕餮􅁋逸無禮外國圖曰昔唐以天下授虞有苗之君非之苗之民浮黒水入南海是爲三苗民去九疑三萬三千里臷國山海經曰臷國其操弓射蛇大荒經曰此國國皆然有}
