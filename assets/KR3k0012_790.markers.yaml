  - {type: variant, offset: 933, length: 0, content: '', SBCK: 年然後即吉其􅀍人殺者䘮主以麻結髪而黒其靣衣裳不緝唯服内不廢婚妻不避同姓其俗有盗竊殺人􅁋穢之事酋長節立一長木爲擊皷警衆共㑹其下強盗者衆共殺之􅀂賊家冨強但燒其屋宅奪其田業而巳太平御覽卷第七}
  - {type: page-break, offset: 933, content: '', id: KR3k0012_SBCK_790-11b}
  - {type: variant, offset: 933, length: 0, content: '', krp: 年然後即吉其𬒳人殺者䘮主以麻結髪而黒其靣衣裳不緝唯服内不廢婚妻不避同姓其俗有盗竊殺人淫穢之事酋長節立一長木爲擊皷警衆共㑹其下強盗者衆共殺之若賊家冨強但燒其屋宅奪其田業而巳太平御覽卷第七}
  - {type: variant, offset: 936, length: 2377, content: 八部落其王姓困沒長名摩羅惹其國相名摩訶思郍其王近適則輿以金繩床遠適則乘象嬪妃甚眾常數百人其羅城構以塼甃周一百六十里壕岸亦構塼相傳本是舍利佛城城內有居人數萬家佛寺百餘區其堂宇皆錯以金銀塗以丹彩地以紫鑛覆以錦罽其俗好生惡殺其土宜菽粟稻粱無麻麥其理無刑名桎梏之具犯罪者以竹五十本束之復犯者撻其背數止五輕者止三殺人者戮之男女十歲則落髮止寺舍依桑門至二十不悟佛理乃復髮為居人其衣服悉以白㲲為朝霞繞腰而已不衣繒帛云出於蠶為其傷生故也君臣父子長幼有序華言謂之驃自謂突羅成闍婆人謂之徒里拙古未嘗通中國貞元中其王聞南詔異牟尋歸附心慕之八年乃遣其弟悉利移因南詔重譯來朝又獻其國樂凡十曲與樂工三十五人俱樂曲皆演釋氏經論之詞意以悉利移為試大僕卿南夷志曰驃國在永昌南七十五日程閤羅鳳所通也其國用銀錢以青塼為圓城周行一日程百姓盡在城內有十二所堂當國王所居門前有大象露坐高百餘尺白如霜雪俗尚廉恥人壯和善少言重佛法城中並無宰殺又多推步天文若有訴訟者王即令焚香向大象思惟是非便各引退或有災疫王亦焚香對象悔過自責男子多衣白疊婦人當頂為高髻以金銀真珠為飾餘著青婆裙又披羅叚行必持扇貴家婦女皆三人五人在傍共扇與波斯及婆羅門接界西去舍利城六十日程疑此是東天竺也暴蠻等部落南夷志曰竹子嶺東有暴蠻部落嶺西有盧鹿蠻部落又有生蠻磨彌殿部落此等部落皆東烏蠻也男則髻女則散髮見人無禮節拜跪三譯乃與華通大部落則有大鬼主百家二百家小部落亦有小鬼主一切信使鬼巫用相服制土多牛馬無布帛男女悉被牛羊皮勿鄧南夷志曰勿鄧部落大鬼主夢衝地方千里功部一姓白蠻五姓烏蠻烏蠻婦人以白黑繒為衣白蠻婦人以白繒為衣下不過膝大賧南夷志曰大賧周迴百餘里悉是野蠻無君長地有瘴毒河賧人至中瘴者十死八九閤羅鳳嘗遣使築城於彼管制野蠻不逾歲死者過半歲遂罷棄其土肥沃種瓠長丈餘冬瓜亦然皆三尺圍又多薏苡無農桑收此充糧三面皆是雪山其高造天南瀘南夷志曰瀘水蜀諸葛亮伐南蠻五月渡瀘處大如臂川中氣候常熱雖方冬行過者皆祖衣流汗量水川南夷志曰量水川在滇池南兩日行漢舊黎州地川中有天地其水東南流出一石竇中水流甚廣石竇甚狹蠻云此竇忽室空則百姓憂溺彌諾國彌臣國南夷志曰彌諾國彌臣國皆邊海國也呼其君長為壽彌諾面赤而長彌臣面黑而短性恭謹每與人語向前一步一拜國無城郭彌諾王所居屋之中有一大柱雕刻為文飾以金銀彌臣王以木柵為居海際水中以石師子為屋四足仍以板蓋悉用香木王出即乘象百姓皆樓居披婆羅籠男少女多俗好音樂樓兩頭置鼓飲酒即擊鼓男女攜手樓中踏舞為樂在永昌城西南六十日程崑崙國南夷志曰崑崙國王北去西洱河八十一程出象及青木香旃檀檳榔琉璃水精犀牙等物蠻寇嘗攻之為其決水淹浸進退無計餓死萬餘不死者去其右腕後放廻小婆羅門國南夷志曰小婆羅門國在永昌北七十四日程俗不食牛肉預知身後事出貝齒白蠟越諾共大耳國來往蠻夷善之信通其國夜半國南夷志曰夜半國在蒼望城東北隔麗水城川原其婦人唯與鬼通能知吉凶禍福本土君長崇信之蠻夷往往以金購之要知善惡女王國南夷志曰女王國去驩州十月程往往與驩州人交易蠻嘗伐之中其藥箭百不存獨錦蠻南夷志曰獨錦蠻者烏蠻之苗裔也在秦臧川去安寧兩日程其族多姓李異牟尋母即獨錦蠻女也有季負藍貞元中為大將軍在勃弄揀川為城使等弄揀蠻南夷志曰弄揀蠻則白蠻苗裔也本姚州弄揀縣部落其地舊為褒州嘗有首領誤殺司戶懼罪率眾北奔在摩磨些江側貞元中異牟尋破吐蕃城邑獲弄揀城遷於永昌之地清蛉蠻南夷志曰清蛉蠻亦白蠻苗裔也本清蛉縣部落天寶中嶲州初陷有首領尹氏父子相率南奔河賧閣羅鳳厚待之貞元中南詔清平官尹輔酋皆其人也衣服言語與蒙舍略同長禈蠻南夷志曰長禈蠻本烏蠻之後部落在劍川屬浪詔其俗皆衣長禈曳地更無衣服唯披牛羊皮施蠻南夷志曰施蠻本烏蠻種族也鐵橋西北大施賧小施賧劍尋賧皆其所居之地男以繒布為縵襠袴婦人從頂橫分其髮當額及頂後各為髻男女終身跣足披牛羊皮磨些蠻南夷志曰磨些蠻鳥種也鐵橋上下及大婆小婆三婆採覽昆池等川皆其所居之地土多牛羊一家即有羊群終身不洗手面男女皆披羊皮俗好飲酒歌舞撲子蠻南夷志曰撲子蠻勇悍趫捷以青婆羅叚為通身袴善用泊箕竹弓深林間射飛鼠發無不中部落首領謂之酋在上無食器以芭蕉葉藉之尋傳蠻南夷志曰尋傳蠻俗無絲綿布帛披婆羅籠跣足可以踐履捺棘持弓挾矢射豪豬生食其肉取其兩牙雙插頂傍為飾又條其皮以擊腰每戰鬭即以籠子籠頭如兜鍪狀裸形蠻南夷志曰裸形蠻在尋傳城西三百里為巢穴謂之野蠻閤羅鳳既定尋傳而野蠻散居山谷集戰即召之亦無君長女多男少無田農衣服唯有木皮以蔽形或十妻五妻共養一丈夫盡日持弓下楬欄有外來侵害者則射之𦬹望子蠻南夷志曰𦬹望子蠻在蘭蒼江以西其人勇捷善於馬上用槍所乘馬不用鞍跣足衣短甲纔蔽胸腹而已望蠻南夷志曰望蠻外喻部落在永昌北其人長大負排持槊前無強敵又能用木弓短箭傅毒藥中人立斃婦人跣足以青布為衣聯珂貝巴齒真珠斜絡其身有夫豎分髮為兩髻無夫者頂後為