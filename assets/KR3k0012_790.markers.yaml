  - {type: punctuation, offset: 9, content: 「, id: KR3k0012_CHANT_790-bkkpn4}
  - {type: variant, offset: 9, length: 504, content: 南詔蠻本烏蠻之別種也姓蒙氏蠻謂王為詔自言哀牢之後代居蒙舍州為渠帥在漢永昌故郡東姚州之西其先渠帥有六自號六詔兵力相埒各有君長無統帥蜀時為諸葛亮所征皆臣服之又曰南詔蠻國初時有蒙舍尨生迦獨迦獨生細奴邏高宗時來朝細奴邏生邏盛武后時來朝其妻方娠邏盛次姚州間妻生子曰吾且有子死於唐地足矣子名盛邏皮邏盛至京師賜錦袍金帶師國開元初邏盛死盛邏皮立盛邏皮死子皮邏閤立又曰南詔蠻皮邏閤嗣立二十六年詔授特進封越國公賜名曰歸義其後破洱阿蠻洱音而志切以功茦授雲南王歸義漸強盛餘五詔浸弱先是劍南節度王昱受歸義賂奏六詔合為一詔歸義既併五詔服群蠻破吐蕃之眾兵日以驕大遂徙居大和城天寶四載歸義遣孫鳳迦異來朝授鴻臚卿歸國恩賜甚厚又曰閤羅鳳襲封王無何鮮于仲通為劍南節度使張虔陁為雲南太守仲通褊急寡謀虔陁矯詐遇下不以禮舊事南詔嘗與其妻子謁見都督虔陁皆私之又有所徵求閤羅鳳多不應虔陁遣人罵辱之仍密奏其罪惡閤羅鳳忿怨因發兵反圍虔陁殺之後遣使謝罪仍與雲南錄事參軍姜如芝俱來請還其所虜掠且言吐蕃大兵壓境若不許當歸命吐蕃雲南之地非唐有也仲通不許因其使進軍逼大和城為南詔所敗自是閤羅鳳北臣吐蕃又曰閤羅鳳死其孫異牟尋為王牟尋頗知書有才智善撫其眾吐蕃役賦南蠻重數又奪, SBCK: 松外}
