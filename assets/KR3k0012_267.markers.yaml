  - {type: variant, offset: 2305, length: 0, content: '', SBCK: 無事唯以著作爲務􅀽崧後漢書曰范丹爲萊蕪長去官常便賣卜以自給歩行無車􅀍囊自隨漢官儀曰明帝臨觀見洛陽令車􅀐意河南尹定至而非尤其太盛勑去軒綏時偃師長治有能名以事詣臺因取賜之下縣遂以爲故事魏志曰鄭渾}
  - {type: variant, offset: 2305, length: 8, content: 字義封嘗與孫權同, WYG: 無事唯以著作為事袁松山後漢}
  - {type: variant, offset: 2305, length: 0, content: '', krp: 無事唯以著作爲務袁崧後漢書曰范丹爲萊蕪長去官常便賣卜以自給歩行無車𬒳囊自隨漢官儀曰明帝臨觀見洛陽令車騎意河南尹定至而非尤其太盛勑去軒綏時偃師長治有能名以事詣臺因取賜之下縣遂以爲故事魏志曰鄭渾}
  - {type: variant, offset: 2306, length: 0, content: '', SBCK: 文公避難淮南太祖聞其篤行召爲邵陵令天下未定民皆不念産殖其生子無以相活率皆不舉渾所在奪其漁獵之具課使耕種又兼開稻田重去子之法民􅀄畏罪後稍豊給無不舉育所育男女多以鄭爲名又曰胡質字文德楚國壽春人也爲頓丘令縣民郭政通於從妹殺其夫程他郡吏馮諒繫獄爲證政與妹皆耐掠隱􅔰諒不勝痛自誣當反其罪質至官察其情色更詳其事撿驗具服又曰王脩字叔治守髙宻令髙宻孫氏素豪俠人客數犯法民有相刼者賊入孫氏吏不能得脩將吏民畏憚不敢近脩令吏民敢有不攻者與同罪孫氏懼乃出賊由是豪強懾服又曰趙儼字思伯爲朗陵長縣多豪猾無所畏忌儼取其尤甚者收縛案驗皆得死罪儼旣囚之乃表府解放自是威恩並著又曰張曁字德容馮掖髙陵人也舉茂才爲新豊令治爲三輔第一又曰司馬㓪字伯逹河内温人也爲堂陽長其治務寛惠不行鞭杖而民不犯禁又曰􅁻茂字叔暢馮翊池陽人也世爲著姓好書不耻惡衣惡食而耻一物之不知建安􅀄􅀜中始平茂與扶風􅂫則共入武功南山隱處精思數歳州舉茂才除臨汾令居官清静吏民不忍欺又曰太祖平􅀽氏以髙柔爲菅長縣中素聞其名姦吏數人皆引去柔教曰昔邴􅁻臨政吏甞有非猶尚容之况此諸吏於吾未有失乎其召復之咸還皆礪誠佳吏蜀志曰董和字㓜宰南郡人也益州牧劉璋以爲成都令蜀土冨實時俗奢侈貨殖之家侯服玉食㛰姻葬送傾家竭産和躬率以儉惡衣􅂼食防遏踰僣爲之􅁤制所在皆移風變善畏而不犯又曰吕}
