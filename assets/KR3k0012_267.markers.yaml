  - {type: variant, offset: 2328, length: 3, content: 年十九, WYG: 俗奢侈貨殖之家侯服玉食婚姻𦵏送傾家竭産和躬率以儉惡衣蔬食防遏踰僣為之軌制所在皆移風變善畏而不犯又曰吕乂字季陽遷新都綿竹令乃心隐恤百姓稱之為一州諸城之首吳録曰張舉字子清為句章令有婦殺夫者因焚屋言燒死其弟疑而訟之舉按尸開口視無灰令人取猪二頭殺一生一而俱焚之開視其口所殺者無灰生者有灰乃明夫先死婦遂首服焉政化流行民歌遺澤}
