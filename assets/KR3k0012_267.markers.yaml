  - {type: variant, offset: 2976, length: 314, content: 幹用陳主曰善乃以為令縣人張次的王休達等與諸猾吏賄賂通姦全丁大戶多有隱沒玠乃鏁次的具狀啟臺陳主手勑慰勞并遣使助玠搜括所出軍人八百餘戶時曹義達為陳主所寵縣人陳信家富於財謟事義達信父顯文恃勢橫暴玠乃遣使執顯文鞭之一百於是吏人股慄莫敢犯者義達於是譖之玠在任守祿俸而已去官之後不堪自致因留縣境種蔬菜以自給或嗤玠以非百里之才玠荅曰吾委輸課最不後列城除殘去暴姦吏跼蹐若謂不能自潤脂膏則如來命以為不達從政吾未服也韓子曰晉平公問趙武曰中牟吾國之股肱邯鄲之肩髀也寡人欲其良令也令其空誰使而可趙武曰刑伯子可公曰伯子非子之讎對曰私讎不入公門又問中府之令空誰使而可趙武曰臣子可故曰外舉不避仇讎內舉不避子弟又曰宓子賤為單父令見有若有若曰子何瘦焉宓子曰憂官政, SBCK: ''}
