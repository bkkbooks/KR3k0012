  - {type: variant, offset: 1311, length: 192, content: 刀畫地數主之失者三叱奴下車格殺之主即馳車入宮上大怒召宣令欲死乎宣叩頭曰臣奉法之吏不敢縱法不欲死也上曰捶之宣曰願一言死無恨上曰何言宣曰陛下聖德中興而縱奴殺良民以奴殺臣臣死之後陛下何以治天下捶殺臣不如臣自殺即以頭撐楹流血被面上令小黃門持之曰癡令令叩頭謝主宣不從上曰頓癡令頭兩手據地不肯低頭上勑強項令出太官賜食又曰虞詡為朝歌長故舊皆弔曰得此何衰詡曰難者不避易者不從不遇盤根錯節何以別其利器乎, SBCK: 賈爲名}
