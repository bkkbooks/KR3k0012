  - {type: variant, offset: 2785, length: 4, content: 中書侍郎, WYG: 永寧令永嘉太守牓郡門曰諸縣有疑滯可就永寜令審之又曰丘仲孚遷山隂令居職甚有聲稱百姓為之謡曰二傅沈劉不如一丘又曰丘仲孚為山隂令仲孚長於撥煩善適權變吏民敬服號稱神明治為天下第一又曰何逺字義方自武昌太守除名後起為武康令正身勵㢘節除滛祀髙祖聞其能擢為宣城太守自縣令為邦畿大郡近代未之有也又曰孫謙為錢塘令治繁以簡獄無繫囚及去官百姓以謙}
