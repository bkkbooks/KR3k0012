  - {type: variant, offset: 2781, length: 16, content: 蕭眕素為中書侍郎在位少時永為諸暨, SBCK: 傅岐除始新}
  - {type: variant, offset: 2781, length: 0, content: '', WYG: 傅岐除始新令縣民有因鬬相毆而死者死家訴郡郡録其仇人考掠備至終不引咎郡乃移獄於縣岐即命脱械以和言問之便即自服法當償死㑹冬節至岐乃放其還家使過節一日復獄曹掾固争曰古者乃有此於今不可行岐曰其若負信縣令當坐主者勿憂竟如期而反太守深相歎異遽以状聞岐後去縣民無老小皆出境拜送啼號之聲聞於數十里又曰}
