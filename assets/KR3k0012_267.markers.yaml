  - {type: variant, offset: 1264, length: 4, content: 董宣為雒, SBCK: 鄭􅀪字巨君爲鄒令勤行德化部人王逢等得路遺寳物懸於道衢永主還之魯國當春大旱五􅂖不豊鄒獨致兩偏熟永平十五年蝗起㤗山流􅀍郡國過鄒界不集郡國以狀聞詔書以爲不然遣使案行如言也又曰方儲字聖明曉風角占候爲句章長時人田還置餘粟一石及刀鋤於田陌明日求亡去疑其旁家儲曰此人非偷自呼縣功曹謂曰君何取人粟置家後積茭中功曹􅅃服後爲洛}
