  - {type: variant, offset: 1019, length: 1, content: 欲, SBCK: 韓稜字伯師潁川人也爲下邳令視事未朞吏民愛慕時隣縣皆雹傷稼唯下邳界獨無又曰王阜字世公爲重泉令吏民向化鸞鳥集止學宫阜使校官􅁺長渉疊爲張雅樂擊磬鳥舉足垂翼應聲而舞翾翔復上縣庭屋十餘日乃去又曰孔􅁬字君魚右扶風茂陵人守姑臧長七年詔書以爲奮在姑臧治有絶迹賜爵􅀜内侯奮素孝供養至謹在姑臧唯老母極膳妻子飯食葱芥時人􅀏之或嘲奮曰置脂膏中不能}
