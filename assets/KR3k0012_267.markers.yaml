  - {type: variant, offset: 1000, length: 2, content: 張歆, SBCK: 卓茂字子康南陽人遷宻令視民如子口無惡言吏民親愛而不忍欺之民甞有言部亭長受其米􅁏遺者茂問之曰亭長從汝求乎爲汝有事屬之而受乎將平居以恩意遺之乎民曰往遺之耳茂曰遺之而受何故言耶民曰􅀼聞賢明之君使民不畏吏吏不取民今我畏吏是以遺之茂曰凢人所以貴於禽獸者以有仁愛知相敬事也今隣里尚致饋此乃相親况吏民乎凢人之生羣居雜處故有經紀禮義以相交接汝獨不欲修之寧能髙飛逺去不在人間耶民曰茍如此律何故禁之茂􅀏曰律設大法禮從人情今我以禮教汝必無怨惡以律治汝何所措其手足乎時天下大蝗河南二十餘縣皆􅀍其災獨不入宻界督郵言之太}
