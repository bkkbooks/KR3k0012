  - {type: variant, offset: 2307, length: 24, content: 封嘗與孫權同書學結恩愛至權統事以為餘姚長時年十九, SBCK: 字季陽遷新都綿竹令乃心隱恤百姓稱之爲一州諸城之首吴録曰張舉字子清爲句章令有婦殺夫者因焚屋言燒死其弟疑而訟之舉按屍開口視無􅁅令人取猪二頭殺一生一而俱焚之開視其口所殺者無􅁅生者有􅁅乃明夫先死婦遂首服焉政化流行民歌遺澤}
