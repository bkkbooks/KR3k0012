  - {type: variant, offset: 1754, length: 482, content: 下逵堅守援攻之不拔乃召單于併軍急攻之城將潰綘父老與援要不害逵綘潰援聞逵名欲使將以兵劫之逵不動左右引逵使叩頭逵叱之曰安有國家長吏為賊叩頭援怒將斬之綘吏民聞將殺逵皆乘城呼曰負要殺我賢君寧俱死左右義逵多為請遂得免又曰滿寵字伯寧守高平令縣人張苞為郡督郵貪穢受取干亂吏政寵因其來在傳舍率吏卒出收之詰其所犯即日考竟遂棄官而歸又曰崔林字德儒除鄔令貧無車馬單步之官蜀志曰鄧芝字伯苗先主定益州芝為郫邸閭督先主出至郫與語大奇之擢為郫令又曰蔣琬字公琰零陵湘鄉人也弱冠與外弟泉陵劉敏俱知名琬以州書佐隨先主入蜀除廣都長先主嘗因遊觀奄至廣都琬眾事不理時又耽酒先主大怒將加罪戮軍師將軍諸葛亮請曰蔣琬社稷器非百里之才也其為政以安民為本不以修飭為先願主公重加察之先主雅敬亮乃不加罪倉卒免官而已吳志曰賀齊字公苗會稽山陰人也少為郡吏守剡長縣吏期從輕俠為姦齊欲治之主簿諫曰從縣大族山越所附今日治之明日寇至齊聞大怒便立斬從族黨相糾合眾千餘人舉兵攻縣齊率吏民開城門突擊大破之威震山越又曰陶謙除舒令郡太守張盤同郡先輩與謙父友謙恥為之屈嘗舞屬謙謙不為起固強之乃舞舞又不輕盤曰不當轉耶曰不可轉轉則勝人又曰孟仁字恭武, SBCK: 渡}
