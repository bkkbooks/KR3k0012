  - {type: variant, offset: 1216, length: 3, content: 震慄京, krp: 咨嗟男女老壯皆相與賦歛致奠醊以千數醊音張芮反說文曰祭酹也渙喪西歸道經弘農人庻皆設槃案於路吏問其故咸言平常持米到洛爲卒司所鈔恒亡其半自王君在事不見侵枉故來報恩其政化懷物如此人思其徳爲立祠於安陽亭西毎食輙絃歌而薦又曰虞延爲細陽令毎至歳時伏臘輙休遣徒繫各使歸家並感其恩德應期而還有囚於家𬒳病自載詣獄旣至而死延率掾吏殯于門外百姓感恱之又曰虞延遷洛陽令是時隂氏有客馬成者常爲姦盗延收考之隂氏屢請獲一書輙加篣二百篣捶也音彭信陽侯隂就乃訴帝譛延多所冤枉帝乃臨御道之舘親録囚徒延陳其獄狀可論者在東無理者居西成乃廽欲趍東延前執之謂曰尓人之巨蠧乆依城社不畏熏燒今考實未竟冝當盡法成大呼稱枉陛㦸郎以㦸刺延叱使置之帝知延不私謂成曰汝犯王法身自取之呵使速去後數日伏誅於是外戚歛手莫敢干法又曰法雄除平氏長善政事好發擿姦伏盗賊希發吏人畏愛之南陽太守鮑得上其理狀遷苑陵令續漢書曰魯恭爲中牟令導民以孝推誠而治建𥘉中郡國螟傷稼犬牙縁界不入中牟河南尹袁安疑其不實遣仁恕掾肥親往察廉之恭隨行阡陌俱坐桑下有雉過止其傍傍有童兒親曰何不擊之兒言雉方將雛親瞿然而起與恭訣曰所以來者欲察治之善惡耳今虫不犯境此一異也化及鳥獸此二異也竪子有仁心此三異也乆留徒擾賢者耳還府以狀白安安美其治以勵屬縣又曰祭彤除偃}
