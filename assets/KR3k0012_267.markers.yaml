  - {type: variant, offset: 2327, length: 0, content: '', WYG: 縣多豪猾無所畏忌儼取其尤甚者收縳案驗皆得死罪儼既囚之乃表府解放自是威恩並著又曰張既字徳容馮翊髙陵人也舉茂才為新豐令治為三輔第一又曰司馬朗字伯逹河内温人也為堂陽長其治務寛惠不行鞭杖而民不犯禁又曰吉茂字叔暢馮翊池陽人也世為著姓好書不恥惡衣惡食而恥一物之不知建安初闗中始平茂與扶風蘇則共入武功南山隐處精思數嵗州舉茂才除臨汾令居官清静吏民不忍欺又曰太祖平袁氏以髙柔為管長縣中素聞其名姦吏皆引去柔教曰昔邴吉臨政吏嘗有非猶尚容之况此諸吏於吾未有失乎其召復之咸還皆自礪成為佳吏蜀志曰董和字㓜宰南郡人也益州牧劉璋以為成都令蜀土富實}
