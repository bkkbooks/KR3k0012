  - {type: variant, offset: 2800, length: 6, content: 十餘日掛衣冠, SBCK: 民有因闘相歐而死者死家訴郡郡録其仇人考掠備至終不引咎郡乃移獄}
  - {type: variant, offset: 2800, length: 0, content: '', WYG: 不行鞭罰民有争者示之以理太平御覽卷二百六}
  - {type: variant, offset: 2800, length: 6, content: 十餘日掛衣冠, krp: 民有因闘相歐而死者死家訴郡郡録其仇人考掠備至終不引咎郡乃移獄}
  - {type: variant, offset: 2801, length: 707, content: 餘日掛衣冠於縣門而去後魏書曰高祖以北平府長史裴聿中書侍郎崔亮並清貧欲以俸祿優之乃以亮帶野王令聿帶溫縣令時人榮之北史曰齊因魏宰縣多用廟監至於士流恥居百里元文遙以縣令為字人之切用之猶恐其披訴揔召集神武門令趙郡王叡宣旨唱名厚加慰諭士人為縣自此始也三國典略曰陳褚玠為中書侍郎陳主以山陰縣多豪猾謂舍人蔡景歷曰稽陰大邑久無良宰卿文士之內試思其人景歷進曰褚玠清廉有幹用陳主曰善乃以為令縣人張次的王休達等與諸猾吏賄賂通姦全丁大戶多有隱沒玠乃鏁次的具狀啟臺陳主手勑慰勞并遣使助玠搜括所出軍人八百餘戶時曹義達為陳主所寵縣人陳信家富於財謟事義達信父顯文恃勢橫暴玠乃遣使執顯文鞭之一百於是吏人股慄莫敢犯者義達於是譖之玠在任守祿俸而已去官之後不堪自致因留縣境種蔬菜以自給或嗤玠以非百里之才玠荅曰吾委輸課最不後列城除殘去暴姦吏跼蹐若謂不能自潤脂膏則如來命以為不達從政吾未服也韓子曰晉平公問趙武曰中牟吾國之股肱邯鄲之肩髀也寡人欲其良令也令其空誰使而可趙武曰刑伯子可公曰伯子非子之讎對曰私讎不入公門又問中府之令空誰使而可趙武曰臣子可故曰外舉不避仇讎內舉不避子弟又曰宓子賤為單父令見有若有若曰子何瘦焉宓子曰憂官政也又曰晉文公出亡趙衰挈壺飱而從與文公相失飢而道寢餓而不敢食及文公反國舉兵攻原克而拔之文公曰夫輕忍餓餧之患而必全壺飡者是且不以原叛乃舉為原令慎子曰立國君以為國非立國以為君也夫以立官長以為官也非立官以為長也風俗通曰俗說孝明帝時尚書郎河東主喬遷為葉令喬有神每月朔常詣臺朝明帝怪其來數而無車騎密令太史候望言臨至時常有雙鳧從東南來因伏伺見鳧舉羅但得一隻舄使尚方識視四年中所賜尚書官屬履也通典曰縣邑之長曰宰曰尹曰公曰大夫晉謂之大夫魯衛謂之宰楚謂之公, WYG: 七}
