  - {type: variant, offset: 950, length: 669, content: 今日從事文俗吏聞此必恐而謀洩死無所名非壯士也眾曰善於夜遂將吏士往奔虜營會天大風超令十人持鼓藏虜舍後約曰見火然皆當鳴鼓大呼餘人悉將兵弩夾門而伏超乃順風縱火前後鼓噪虜眾驚亂超手格殺三人兵吏斬其使及從士三十餘級餘眾百許人悉燒死東觀記曰斬得匈奴節使屋賴帶副使北離支首及節也明日乃還告郭恂恂大驚既而色動超知其意舉手曰掾雖不行班超何必獨擅之乎恂乃說又曰楊琁字機平為零陵太守是時蒼梧桂陽猾賊相聚攻郡縣賊眾多而琁力弱吏民憂恐琁乃特制馬車數十乘以排囊盛石灰於車上排囊即令排袋也排蒲拜切繫布索於馬尾又為兵車專彀弓弩剋共會戰乃令馬車居前順風鼓灰賊不得視因以火燒布然馬驚奔突賊陣因使後車弓弩亂發鉦鼓鳴震群盜波駭破散追逐傷斬無數梟其渠師郡境以清又曰皇甫嵩討黃巾賊張角嵩保長社賊來圍城嵩兵少軍中皆恐乃召軍吏謂曰兵有奇變不在眾今賊依草結營易為風火若因夜縱火必大驚亂吾出兵擊之其功可成其夕遂大風嵩乃約勒軍士皆束炬乘城使銳士間出圍外縱火大呼城上舉燎應之嵩因鼓而奔其陣賊驚亂奔走嵩進兵討之與角弟梁戰於廣宗梁眾精勇嵩不能剋明日乃閉營休士以觀其變知賊意稍懈乃潛夜勒兵雞鳴馳赴其陣至脯時大破之又曰劉表死曹公剋荊州得劉琮水軍沿流東下吳主孫權遣周瑜領兵逆曹公遇於赤壁初一交戰曹公軍披退引次江北瑜等在南岸瑜部將黃蓋曰今寇眾我寡難與持久然觀軍方連舡艦首尾相接可燒而走乃取蒙衝鬥艦數十艘實以薪草膏灌其中裹以帷幕上建牙旗先書報曹公欺以欲降又先備走舸各繫大舡後因風相次俱進曹公軍吏士皆延頸遙觀指言蓋降諸舡同時發火時風盛猛悉延燒岸上營落頃之熛焰張天熛音標火飛也人馬燒溺死者甚眾遂敗退耳魏志諸葛誕傳, SBCK: 凉王}
