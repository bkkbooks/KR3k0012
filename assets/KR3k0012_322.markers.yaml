  - {type: variant, offset: 129, length: 164, content: 先具燒燧之屬發火有時起火有日時者天之燥也日者宿在戍箕東壁翼軫也戊翼參日宿此宿之日風起凡此四宿者風起之日蕭世誠云春景丁夏戊巳秋壬癸冬甲乙此日有疾風猛雨也吾勘太乙中有飛鳥十精知風雨期五子元運式也各候其時可用火也凡火攻必因五火之變而應之火發於內則軍應之於外以兵應之使姦人縱火於敵營內當速進以攻攻其外火發而兵靜者待而勿攻極其火力可從而從, SBCK: 啇周}
