  - {type: variant, offset: 1751, length: 746, content: 以筏先行筏遇鐵錐輒著筏去又作火拒長十餘丈大數十圍灌以麻油在舡前遇鏁燃炬燒之須臾融液斷絕於是舡無所礙晉中興書曰殷浩北伐江逌為長史及丁零反叛浩軍震懼姚襄去軍十里結草為營方欲擊浩浩甚懷憂令逌代之逌曰今兵非不精而眾少於羗且壍柵甚固難與校力乃取數百雞以長繩連之腳皆繫火一時驅放以兵遏後群雞駭散一時飛過壍並集羗營皆燃因其驚亂縱兵擊之襄遂摧退宋書王玄謨圍滑臺城內多茅屋眾皆曰宜以火箭燒之又殷琰傳曰琰與劉勔相持勔用茅苞土擲以塞壍擲者如雲城內乃以火箭射之又曰良吏杜慧度傳曰慧度為交州刺史盧脩龍破合浦徑向交州慧度自登高艦合戰放火箭雉尾炬修眾俱然一時潰散齊書宗室脩安王遙光反詔太子右衛率左興盛屯東府東離門眾軍圍東城臺軍射火箭燒東北角樓至夜城潰陳書曰武帝時江東梁將王琳率兵東下陳遣大將侯瑱等拒之瑱以琳軍威方盛乃引軍入蕪湖避之是時西南風至急琳謂得天時將取楊州侯瑱等徐出蕪湖以躡其後北及兵放火西南風翻為瑱用琳兵放火燧以擲瑱舡者返燒其舡琳兵潰亂透水死者十二三其餘皆棄舡上岸為陳軍所殺殆盡北史曰李詢仕周遷司衛上士武帝幸雲陽宮委以留府事衛王直作亂焚肅章門詢於內益火故賊不得入武帝善之後周書曰遣將伐高齊齊將叚韶與太尉蘭陵王長恭同往扞禦至西境有柏谷城者乃絕險古城千仞諸將莫肯攻圍韶曰分北河東勢為國家之有若不去柏谷事同痼疾計彼援兵會在南道今斷其要路救不能來且城勢雖高其中甚狹火弩射之一朝可盡諸將稱善遂鳴鼓而攻之城潰獲儀同薛敬禮大斬獲首虜仍城華谷置戍而還隋書曰文帝時高頴獻取陳之策曰江南土薄舍多竹茅所有儲積皆非地窖古孝切密遣行人因風縱火待彼修立復更燒之不出數年自可財力俱盡帝行其策由是陳人益弊通典曰火兵以驍騎夜銜枚縛馬口人負束薪麻蘊懷火直抵敵營一時舉火營中驚亂急而乘之靜而勿攻凡火攻皆因天時燥旱營舍茅竹積穗糧軍營於秸草宿莽之中因風而焚, SBCK: ''}
