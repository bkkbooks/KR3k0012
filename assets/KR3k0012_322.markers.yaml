  - {type: variant, offset: 4083, length: 367, content: 出兵攻其步軍寶應大潰遂剋定閩中又曰歐陽紇據嶺南反遣將章昭達督眾軍討之紇乃出柵涯口涯音崖多聚沙石盛以竹籠置于木柵之外用遏舟艦昭達居其上流裝艦造舟以臨賊柵又令軍人衘刀潛行水中斫竹籠篾皆解因縱大艦隨流突之賊眾大敗因擒紇三國典略曰東魏慕容紹宗高岳等堰洧水以灌頴川時有怪獸每衝壞其堰岳等悉眾苦攻分休迭進王思政身當矢石與士卒同其勞苦屬以大雪岳眾多死岳等乃作鐵龍雜獸用厭水神後周書曰太祖遣大將軍趙貴帥軍至穰兼督諸州兵以授王思政高岳起堰引洧水以灌城自頴川以北皆為陂澤救兵不得至唐書曰武德中劉黑闥據河北反太宗率兵討之先遣堰治水上流淺令黑闥得渡及戰遽令決堰水至深丈餘賊徒既敗爭渡水溺死者數千人咸以為神黑闥與二百餘騎奔于突厥悉虜其兵眾河北復平又曰武德中李靖隨河間王孝恭討蕭銑屬江水泛長諸將皆請停兵以待水退靖謂孝恭曰以速為神機者時不可失今若乘水漲之勢倏忽至其, krp: 一朝而兩}
