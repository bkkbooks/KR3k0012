  - {type: variant, offset: 1985, length: 375, content: 盧脩龍破合浦徑向交州慧度自登高艦合戰放火箭雉尾炬修眾俱然一時潰散齊書宗室脩安王遙光反詔太子右衛率左興盛屯東府東離門眾軍圍東城臺軍射火箭燒東北角樓至夜城潰陳書曰武帝時江東梁將王琳率兵東下陳遣大將侯瑱等拒之瑱以琳軍威方盛乃引軍入蕪湖避之是時西南風至急琳謂得天時將取楊州侯瑱等徐出蕪湖以躡其後北及兵放火西南風翻為瑱用琳兵放火燧以擲瑱舡者返燒其舡琳兵潰亂透水死者十二三其餘皆棄舡上岸為陳軍所殺殆盡北史曰李詢仕周遷司衛上士武帝幸雲陽宮委以留府事衛王直作亂焚肅章門詢於內益火故賊不得入武帝善之後周書曰遣將伐高齊齊將叚韶與太尉蘭陵王長恭同往扞禦至西境有柏谷城者乃絕險古城千仞諸將莫肯攻圍韶曰分北河東勢為國家之有若不去柏谷事同痼疾計彼援兵會在南道今斷其要路救不能來且城勢雖高其中甚狹火弩射之一朝可盡諸將稱善遂鳴鼓而攻之城潰獲儀同薛敬禮大斬獲首虜仍城華谷置戍而還隋書曰, WYG: ''}
