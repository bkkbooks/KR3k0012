  - {type: variant, offset: 1683, length: 8, content: 吳人於江險磧要害, WYG: 濬兵不血刃攻無堅城夏口武昌無相支抗蔡謨傳曰將軍庾亮以石勒新死欲移鎮石城為滅賊}
  - {type: variant, offset: 1686, length: 64, content: 江險磧要害之處普以鐵鏁橫截之又作鐵錐長丈餘暗置江中以逆拒舡先是羊祐獲吳間諜具知情狀濬乃作大筏數十亦方百餘步縛草為人被甲持杖令善水, SBCK: 西夏所推平索嗣兵不血刃取酒泉有易俯拾爲殿下開創崇規貽厥孫謀}
