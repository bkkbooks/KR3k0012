  - {type: variant, offset: 73, length: 2, content: 火墮, SBCK: 我有法度之師擊彼無法度之兵故春秋傳曰不備不虞不可以出師將能而君不御者勝司馬法曰進退唯時無曰寡人將旣精能曉練兵勢君能專任事不從中御也此五者知勝之道故曰知已知彼百戰不殆審知彼強弱之􅀔雖不至百戰實無危殆也不知彼知巳一勝一􅀒雖不知}
  - {type: variant, offset: 73, length: 2, content: 火墮, WYG: 我有法度之師擊彼無法度之兵故春秋傳曰不備不虞不可以出師也將能而君不御者勝司馬法曰進退唯時無曰寡人將既精能曉練兵勢君能專任事不從中御也此五者知勝之道故曰知彼知己百戰不殆審知彼強弱之勢雖不至百戰百勝然已無殆不知彼而知己一勝一負雖不知}
