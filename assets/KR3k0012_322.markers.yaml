  - {type: variant, offset: 2805, length: 289, content: 高密項羽使龍且將二十萬救齊田廣龍且并軍且子余切與信戰未合人或說龍且曰漢兵遠鬥窮寇力戰其鋒不可當齊楚自居其地戰兵易敗散不如深壁令齊王使臣招所亡城亡城聞其王在楚來救必反漢漢兵二千里客居齊齊城皆反之其勢無所得食可無戰而降也龍且曰吾救齊不戰而降之吾何功今戰而勝之齊之半可得何為止遂戰與信夾濰水陣維音唯韓信乃夜令人為萬餘囊盛沙壅水上流引軍半度擊龍且佯不勝還走龍且果喜曰固知信怯也遂追信度水信使人決壅囊水大至龍且軍太半不得度即急擊殺龍且水東軍遂敗走後漢書曰董卓將兵三萬討先零羗為羗胡所圍糧食乏絕進退逼急乃於所度水中偽立𨻳以捕魚𨻳音偃而潛從𨻳下過軍比賊追之決水深不得度時眾軍敗退唯董早全師而還, WYG: ''}
