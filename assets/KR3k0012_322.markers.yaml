  - {type: variant, offset: 3301, length: 682, content: 大制耶及魏軍由西道集堰南分軍東路內薄攻小城崇祖著白紗帽肩輿上城手自轉式日晡時決小埭水勢奔下魏攻城之眾溺死千數大眾退走梁書曰魏降人王足陳計求堰淮水以灌壽陽足引北方童謠曰荊山為上格浮山為下格潼江為激溝併灌鉅野澤帝以為然使水工陳承伯材官將軍祖𣈶視地形咸謂淮內沙土漂輕不堅實其功不可就帝弗納發徐楊人卒二十戶取五以築之假康絢節督淮上諸軍事并堰作役人及戰士有眾二十萬於鍾離南起浮山北抵巉石依岸築土合脊於中流十四年四月堰將合淮水漂沒復決潰眾患之或謂江淮多蛟能乘風雨決壞岸崖其性惡鐵因是引東西二冶鐵器大則釜鬲小則钁鋤數千萬沉於堰所猶不能合乃伐樹為幹以巨石加土其上緣淮百里內崗陵木石無巨細盡負擔者肩穿夏日疾疫死者相枕蠅蠱晝夜聲合武帝愍之遣尚書右僕射袁昂侍中謝舉假節慰勞并加蠲復是冬寒甚淮泗盡凍士卒死者十有七八帝遣賜以衣袴十二月魏遣將楊大眼聲決堰絢命諸軍撤營露次以待之遣其子悅挑戰斬魏咸陽王府司馬徐方興軍小却十五年四月堰成其長九里下闊一百四十丈上廣三十五尺高二十丈深十九丈五尺夾之以堤并樹杞柳軍人安堵列居其水清潔俯視居人墳墓了然皆在其下或謂絢曰四瀆天所以節宣其氣不可久塞若鑿湫東注則游波寬緩堰得不壞絢然之開湫東注人縱反間於魏曰梁所懼開湫魏人信之果鑿山深五丈開湫北注水日夜分流湫猶不減其月魏軍竟潰而歸水之所及夾淮方數百里地魏壽陽城戍稍徙頓八公山北南居人散就崗壟初起徐州界刺史張豹子謂己必尸其事既而絢以他官來監作豹子甚慚由是譖絢與魏交邇帝雖不納猶以軍事徵絢尋除司州刺史領安陸太守絢還後豹子不脩堰至其秋淮水暴長堰壞奔流于海殺數萬人其聲若雷聞三百里水中怪物隨流而下或人頭魚身或龍形馬首殊類詭狀, SBCK: ''}
