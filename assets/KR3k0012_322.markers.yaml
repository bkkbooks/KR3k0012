  - {type: variant, offset: 2536, length: 0, content: '', SBCK: 德仰恊時來俯從民望屬姦豪鼎峙之際群㐫岳立之秋故運籌命將舉無遺䇿親御六戎即有征無戰五稔之間而治風弘闡矣春秋齊後語曰騶忌與田忌不相善公孫閱謂騶忌曰何不令人操十金卜於市曰我田忌之人也吾三戰三勝聲威天下欲爲大事亦吉乎卜者出因令人捕之驗其辭於王之所騶忌從之田忌懼無以自白遂以其徒襲攻臨淄欲殺騶忌不勝而}
