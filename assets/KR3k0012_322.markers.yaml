  - {type: page-break, offset: 1710, content: '', id: KR3k0012_WYG_322-7a, image: WYG0895/WYG0895-0767a.png}
  - {type: variant, offset: 1711, length: 135, content: 以逆拒舡先是羊祐獲吳間諜具知情狀濬乃作大筏數十亦方百餘步縛草為人被甲持杖令善水者以筏先行筏遇鐵錐輒著筏去又作火拒長十餘丈大數十圍灌以麻油在舡前遇鏁燃炬燒之須臾融液斷絕於是舡無所礙晉中興書曰殷浩北伐江逌為長史及丁零反叛浩軍震懼姚襄去軍十里結草為營方欲擊浩浩甚懷憂令逌代之逌, WYG: 秦準謂}
