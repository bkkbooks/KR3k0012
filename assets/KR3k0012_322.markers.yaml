  - {type: variant, offset: 14, length: 1, content: 一, SBCK: 知可戰與不可以戰者勝能料知敵情審其虚實者勝知衆寡之用者勝言兵之形有衆而不可擊寡或可以弱制強而能変之者勝也春秋􅀓}
  - {type: variant, offset: 14, length: 0, content: '', WYG: 知可以與戰不可以與戰者勝能料知敵情審其虛實者勝知衆寡之用者勝言兵之形有衆而不可擊寡或可以弱制强而能變之者勝也春秋傳曰師}
  - {type: variant, offset: 14, length: 1, content: 一, krp: 知可戰與不可以戰者勝能料知敵情審其虚實者勝知衆寡之用者勝言兵之形有衆而不可擊寡或可以弱制強而能変之者勝也春秋傳}
  - {type: variant, offset: 15, length: 0, content: '', WYG: 弱制下在和不在衆上下同欲者勝言君臣和同勇而欲戰者勝也故孟子}
  - {type: variant, offset: 16, length: 1, content: 火, SBCK: 師克在和不在衆上下同者勝言君臣和同勇而欲戰者勝也故孟子曰天時不如地利地利不如}
