  - {type: punctuation, offset: 10, content: 「, id: KR3k0012_CHANT_322-bkkpn4}
  - {type: variant, offset: 10, length: 1, content: 火, SBCK: 夫未戰而廟勝者得筭多也未戰而廟不勝者得筭少也多筭勝少筭而況無筭乎吾以此觀之勝勢見也吾以此道觀之是兵無成勢無常形臨時變化不可預傳故曰料敵在心察機在目也又曰昔之善戰者先爲不可勝以待敵之可勝不可勝在己守備之可勝在敵自循理以備敵之虚解故戰者能爲不可勝不能使敵必可勝也又曰見勝不過衆人之所知非善之善也戰勝而天下曰軍善非善之善也交争勝也太公曰争勝白刃之中非良將也故舉秋毫不爲多力見日月不爲明目聞雷霆不爲聦耳見易聞也古人所謂善戰者勝勝易勝者也原微易勝}
  - {type: variant, offset: 10, length: 1, content: 火, WYG: 夫未戰而廟算勝者得算多也未戰而廟算不勝者得算少也多算勝少算不勝况無算乎于此觀之勝負見矣又曰昔之善戰者先為不可勝以待敵之可勝不可勝在已守備之固可勝在敵自循理以俟敵之懈怠故戰者能為不可勝不能使敵必可勝也又曰見勝不過衆人之所知非善之善也戰勝而天下曰善非善之善者也勝爭勝也太公曰爭勝於白刃之中非良將也故舉秋毫不為多力見日月不為明目聞雷霆不為聰耳尋常所能古之所謂善戰者勝于易勝者也謀于未形}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_WYG_322-1b, image: WYG0895/WYG0895-0764b.png}
  - {type: variant, offset: 10, length: 1, content: 火, krp: 夫未戰而廟勝者得筭多也未戰而廟不勝者得筭少也多筭勝少筭而況無筭乎吾以此觀之勝勢見也吾以此道觀之是兵無成勢無常形臨時變化不可預傳故曰料敵在心察機在目也又曰昔之善戰者先爲不可勝以待敵之可勝不可勝在己守備之可勝在敵自循理以備敵之虚解故戰者能爲不可勝不能使敵必可勝也又曰見勝不過衆人之所知非善之善也戰勝而天下曰軍善非善之善也交争勝也太公曰争勝白刃之中非良將也故舉秋毫不爲多力見日月不爲明目聞雷霆不爲聦耳見易聞也古人所謂善戰者勝勝易勝者也原微易勝}
  - {type: variant, offset: 12, length: 0, content: '', SBCK: 其可勝不攻其不可勝也故善戰者之所勝也無勇攻敵兵形未成服之無赫赫之功也又曰善戰者立於不敢敗之地而不失敵之敗勝者也故勝兵先勝而後求戰敗兵先戰而後求勝善用兵者脩道而保法故能爲勝攻之政善用兵者先自脩理不可勝之道保法度不失敵之乱敗也又曰勝可知而不可爲也敵雖衆可使無􅋐故䇿之而知得失之計􅀱之而知動静之理形之而知死生之地角之而知有餘不足之處角量之也故兵形之極至於無形無形則􅀷淵不能闚也而智者不能謀也因形而作勝於衆衆不能知也因地形而立勝人皆知我所以勝之形而莫知吾所以制勝之形也人皆知吾所以勝莫知吾因敵形制此勝也故兵戰勝不復不量重復而應形無窮動而應也又曰知勝}
  - {type: page-break, offset: 12, content: '', id: KR3k0012_SBCK_322-1b}
  - {type: variant, offset: 12, length: 0, content: '', WYG: 其可勝不攻不可勝也故善戰者之勝也無智名無勇功又曰故善戰者立於不敗之地而不失敵之敗者也故勝兵先勝而後求戰敗兵先戰而後求勝善用兵者脩道而保法故能為勝敗之攻善勝兵者先自脩理不可勝之道保法度不失以俟敵之敗亂也又曰勝可知而不可為也敵雖衆可使無鬭故策之而知得失之計候之而知動靜之理形之而知死生之地角之而知有餘不足之處角量之也故兵形之極至於無形則深淵不能窺也而智者不能謀也因形而作勝於衆衆不能知也因地形而立勝人皆知我所以勝之形而莫知吾所以制勝之形也人皆知吾所以勝莫知吾因敵形制此勝也故兵戰勝不復不量重復而應形無窮動而應也又曰故知勝}
