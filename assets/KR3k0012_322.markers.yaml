  - {type: variant, offset: 666, length: 78, content: 為能遣與從事郭恂俱使西域超到鄯善鄯本西域樓蘭國也昭帝元鳳四年改為鄯善去陽關一千六百里去長安六千一百里鄯善王廣奉超禮敬甚備後忽更踈懈超謂其宮屬曰覺廣禮意薄乎此, SBCK: 正伐邪理}
  - {type: variant, offset: 666, length: 78, content: 為能遣與從事郭恂俱使西域超到鄯善鄯本西域樓蘭國也昭帝元鳳四年改為鄯善去陽關一千六百里去長安六千一百里鄯善王廣奉超禮敬甚備後忽更踈懈超謂其宮屬曰覺廣禮意薄乎此, krp: 正伐邪理}
  - {type: variant, offset: 667, length: 451, content: 能遣與從事郭恂俱使西域超到鄯善鄯本西域樓蘭國也昭帝元鳳四年改為鄯善去陽關一千六百里去長安六千一百里鄯善王廣奉超禮敬甚備後忽更踈懈超謂其宮屬曰覺廣禮意薄乎此必有北虜使來狐疑未知所從故也明者睹未萌况己著邪乃召侍胡詐之曰匈奴使來數日今安在乎侍胡惶恐具服其狀超乃閉侍胡悉會其吏士三十六人與共飲酒酣因激怒之曰卿曹與我俱在絕域曹輩欲立大功以求富貴今虜使到裁數日而王廣禮敬即廢如今鄯善收吾屬送匈奴骸骨長為豺狼食矣為之奈何官屬皆曰令在危亡之地死生從司馬超曰不入虎穴不得虎子當今之計獨有因夜以火攻虜使彼不知我多少必大震怖可殄盡矣滅此虜則鄯善破膽功成事立矣眾曰當與從事議之超怒曰吉凶決於今日從事文俗吏聞此必恐而謀洩死無所名非壯士也眾曰善於夜遂將吏士往奔虜營會天大風超令十人持鼓藏虜舍後約曰見火然皆當鳴鼓大呼餘人悉將兵弩夾門而伏超乃順風縱火前後鼓噪虜眾驚亂超手格殺三人兵吏斬其使及從士三十餘級餘眾百許人悉燒死東觀記曰斬得匈奴節使屋賴帶副使北離支首及節也明日乃還告郭恂恂大驚既而色動超知其意舉手曰掾雖不行班超何必獨擅之乎恂乃說, WYG: 戲卓謝雋}
