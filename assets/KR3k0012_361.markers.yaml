  - {type: variant, offset: 21, length: 2, content: 氤氳, WYG: 四方左傳隠公元年曰初鄭武公娶于申曰武姜生莊公及共叔叚莊公窹生驚姜氏故名窹生又襄五年曰初宋芮司徒生女子赤而毛棄諸堤下共姬之妾取以入名之曰棄長而羙又昭七年曰叔向娶生申巫臣氏生伯石伯石始生子容之母走謁諸姑子容母叔向嫂伯華妻也曰長叔姒生男姑視之及堂聞其聲而還曰是豺狼之聲也狼子野心非是莫䘮羊舌氏矣遂弗視又昭七年曰公衍公為之生也其母階出出之王日産舍公衍先生公為之母曰相與偕出請相與偕告晉公衍母使待已共白公三日公為生其母先以吾公為為兄公私喜於陽糓而思於魯曰務人為此禍務人公為也始與公若謀逐季氏且後生而為兄其誣也乆矣乃黜之而以公衍為太子家語曰子夏問曰商聞易之生人及}
