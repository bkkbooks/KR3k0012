  - {type: variant, offset: 3730, length: 190, content: 孕三十六年而生兒生兒長大能乘雲蓋龍類去會稽四萬六千里外國圖曰方丘之上暑濕生男子三年而死其潢水婦人入浴出則乳矣是去九疑二萬四千里列女傳曰簡狄者帝嚳之次妃也妃有娀氏之女與姊妹浴於玄丘水之上有玄鳥銜卵而墜五色甚好相與競取之簡狄得而吞之有孕遂生契先結切又曰大任者文王之母性專一及其有身目不視惡色耳不聽惡聲口不出惡言以胎教也會稽先賢傳曰吳侍中闞澤字德潤在母胞八月叱聲震外蜀郡記曰諸山夷獠子任, WYG: 皆}
