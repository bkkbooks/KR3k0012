  - {type: variant, offset: 1721, length: 3, content: 藏乃形, SBCK: 十四四主時時主豕故豕四月而生五九四十五五爲音音主猿故猿五月而生四九三十六六主律律主鹿故鹿六月而生三九二十七七主星星主虎故虎七月而生二九一十八八主風風主蟲故蟲八月而化其餘各從其􅀋矣鳥魚生於隂而屬於陽故皆􅆑生齕吞者八竅而􅆑生齟嚼者九竅而胎生晝生者􅀋父夜生者􅀋母敢問其皆然乎孔子曰然吾聞諸老聃亦如子之言也史記楚丗家曰呉回生陸終陸終生六子坼疈而生焉}
  - {type: variant, offset: 1721, length: 3, content: 藏乃形, WYG: 十四四主時時主豕故豕四月而生五九四十五五為音音主猿故猿五月而生四九三十六六主律律主鹿故鹿六月而生三九二十七七主星星主虎故虎七月而生二九一十八八主風風主蟲故蟲八月而化其餘各從其類矣鳥魚生於隂而屬陽故皆卵生齕吞者八竅而卯生齟嚼者九竅而胎生日生者類父夜生者類母敢問其皆然乎孔子曰然吾聞諸老􅅨亦如子之言也史記楚世家曰吴囬生陸終陸終生六子圻疈而生焉}
