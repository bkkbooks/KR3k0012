  - {type: variant, offset: 21, length: 2, content: 氤氳, SBCK: 四方左傳隱公元年曰􅀄鄭武公娶于申曰武姜生莊公及共叔叚莊公寤生驚姜氏故名寤生又襄五年曰􅀄宋芮司徒生女子赤而毛棄諸堤下共􅁎之妾取以入名之曰棄長而美又昭七年曰叔向娶申公巫臣氏生伯石伯石始生子容之母走謁諸姑子容母叔向嫂伯華妻也曰長叔姒生男姑視之及堂聞其聲而還曰是豺狼之聲也狼子野心非是莫喪羊舌氏矣遂弗視又昭七年曰公􅄛公爲之生也其母偕出出之三日産舎公􅄛先生公爲之母曰相與偕出請相與偕告留公􅄛母使待巳共白公三日公爲生其母先以告公爲爲兄公私喜於陽榖而思於魯曰務人爲此禍也務人公爲也始與公􅀂謀逐季氏且後生而爲兄其誣也乆矣乃黜之而以公衍爲太子家語曰子夏問曰商聞易之生人及}
