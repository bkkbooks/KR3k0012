  - {type: variant, offset: 2121, length: 449, content: 象天足之方也象地有四時五行九解九解者八方中央也三百六十六日人亦有四肢五藏九竅三百六十骨節天有風雨寒暑人亦有取與喜怒故膽為云脾為風腎為雨肝為雷以與天地相參也而心為之主是故耳目者日月也公孫尼子曰人有三百六十節當天之數也形體有骨肉當地之厚也有九竅脈理當川谷也血氣者風雨也白虎通曰男女者何謂男男任也任功業也女者如也如從人也風俗通曰天地初開未有人女媧擣黃土為人力不暇乃引絙於泥中以為人富貴黃土人也貧賤凡庸絙人也人物志曰夫精欲深微質欲懿重志欲弘大心欲謙小精微所以入神妙也麤則失神懿重所以崇德宇也躁則失身志大所以堪任物也小則不勝小心所以慎咎悔也大則驕陵由此論之小心而志大者豪傑之俊也心大而志小者傲蕩之類也心小而志大者拘懦之人也任子曰木氣人勇金氣人剛火氣人強而躁土氣人智而寬水氣人急而賊傅子曰人之性如水焉置之圓則圓置之方則方澄之則淳而清動之則流而濁孕易漸卦曰鴻漸于陸夫征不復婦孕不育凶王弼注曰夫婦邪醜則非夫而孕故不育尚書泰誓曰啇王受焚炙忠良刳剔孕婦左傳僖中曰晉惠公之在梁也梁伯妻之梁嬴孕過期卜招父與其子卜之其子曰將, WYG: ''}
