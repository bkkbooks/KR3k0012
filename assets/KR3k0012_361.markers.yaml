  - {type: variant, offset: 4613, length: 0, content: '', krp: 亦以夜半時適生有人從門呼其父名父出應之不見人見一木杖植其門側好善異於衆其父杖入門以示人占曰吉文伯位至廣漢太守以杖當得子之力矣譙周法訓曰一産二子者當以後生者爲兄言其先胎也荅曰此野人之鑿語耳君子不測暗安知胎之先後也傳子曰昔燕趙之間有三男子共娶一女生四子後争訟廷尉延壽奏云禽獸生子逐母冝以四子還母尸三男子於市丗說曰胡廣本姓黄五月生父母惡之乃置之甕投於江湖翁見甕流下聞有小兒啼聲徃取因長養之以爲子登三司流中庸之號廣後不治其本親服云我於本親巳爲死人也丗以此爲深譏焉搜神記曰陳仲舉微時甞宿黄申家}
  - {type: variant, offset: 4614, length: 0, content: '', SBCK: 申婦方産有扣申門者家人咸不知乆乆方聞屋裏有言賔堂下有人不可進扣門者相告曰今當從後門往其一人便徃有頃還留者問之是何等名爲何當與幾歳徃者曰男也名爲奴當與十五歳後應以何死荅曰應以兵死仲舉告其家曰吾能相此兒當以兵死父母驚之寸刄不使得執也至年十五有置鑿於梁上者其末出奴以爲木也自下鈎之鑿從梁落䧟腦而死後仲舉爲豫章太守故遣吏往餉之申家并問奴所在其家以此具告仲舉仲舉歎此謂命矣幽明録同異苑曰魏郡徐逮字君及婦平昌孟氏生兒頭有一角一脚頭正仰向通身盡赤落地無聲乗虚而去又曰丹陽縣駱慶婦生一男一虎一貍貍虎毛色斑黒牙􅀲皆備即殺之兒經六日而死母不異又曰沛國武搮之妻林氏元嘉中懷身得病而死俗忌含胎入柩中要湏割出妻乳母傷痛之乃撫尸而呪曰􅀂天道有靈無令死􅀍擘裂湏􅁷尸面赩然上色於是呼婢共扶之俄頃兒墮而尸倒也嵩髙山記曰昔陽翟有婦人姙身三十月乃生子從母背上出五歳便入北山學道}
  - {type: page-break, offset: 4614, content: '', id: KR3k0012_SBCK_361-9b}
  - {type: variant, offset: 4614, length: 0, content: '', WYG: 申婦方産有叩申門者家人咸不知乆乆方聞屋裏有言賔堂下有人不可進叩門者相告曰今當從後門往其一人便往有頃還留者問之是何等名為何當與幾嵗往者曰男也名為奴當與十五嵗後應以何死答曰應以兵死仲舉告其家曰吾能相此兒當以兵死父母驚之寸刃不使得執也至年十五有置鑿于梁上者其末出奴以為木也自下鈎之鑿從梁下䧟腦而死後仲舉為豫章太守故遣吏往餉之申家并問奴所在其家以此具告仲舉仲舉歎曰此命也異苑曰魏郡徐逮字君及婦平昌孟氏生兒頭有一角一脚頭正仰向通身盡赤落地無聲乘空而去又曰丹陽縣駱慶婦生一男一虎一貍貍虎毛色斑黒牙爪皆備即殺之兒經六日而死母不異又曰沛國武漂之妻林氏元嘉中懐身得病而死俗忌含胎入柩中要須割出妻乳母傷痛之乃撫尸而祝曰若天道有靈無令死被擘裂須臾尸面赩然上色於是呼婢共扶之俄頃兒墮而尸倒也嵩髙山記曰昔陽翟有婦人姙身三十月乃生子從母背上出五歳便入此山學道}
