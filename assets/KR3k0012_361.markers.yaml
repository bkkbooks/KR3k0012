  - {type: variant, offset: 2328, length: 237, content: 深微質欲懿重志欲弘大心欲謙小精微所以入神妙也麤則失神懿重所以崇德宇也躁則失身志大所以堪任物也小則不勝小心所以慎咎悔也大則驕陵由此論之小心而志大者豪傑之俊也心大而志小者傲蕩之類也心小而志大者拘懦之人也任子曰木氣人勇金氣人剛火氣人強而躁土氣人智而寬水氣人急而賊傅子曰人之性如水焉置之圓則圓置之方則方澄之則淳而清動之則流而濁孕易漸卦曰鴻漸于陸夫征不復婦孕不育凶王弼注曰夫婦邪醜則非夫而孕故不育尚書泰誓曰啇王受焚炙忠良刳剔孕婦左傳僖中曰晉惠公之在梁也梁伯妻之梁嬴孕過期卜招父與其子卜, SBCK: 棄}
