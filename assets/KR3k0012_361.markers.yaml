  - {type: variant, offset: 2892, length: 348, content: 妻言會行聞雷震仰天視而雹入口因吞遂任身十月而產子又曰靈帝王美人任娠畏何后乃服藥欲除之而胎安堅終自不動又夢見負日而行四年乃生皇子協后遂酖殺美人帝大怒欲廢后諸窅官固請得止董太后自養協號董侯東觀漢記曰張奐為武威太守其妻懷孕夢見帶奐印綬登樓而歌乃訊之於占者曰必生男復臨茲邦命終此樓既而生猛以建安中為武威太守殺刺史邯鄲商州兵圍之急猛恥見擒乃登樓自焚而死魏略曰昔北方有高離國者其王侍婢有身王欲殺之婢云有氣如雞子來下我故有身後生子王捐之於溷中豬以喙噓之徙於馬闌中馬以氣噓之王疑以為天生乃令其母收畜之名之曰東明帝令牧馬東明善射王恐奪其國欲殺之東明走至淹水以弓擊水魚鱉浮為橋東明因得渡魚鼈散追兵不得渡東明因都王夫餘之地也又曰黃牛羗種孕身六月生吴錄曰武烈皇帝姓孫名堅字文臺母有身夢腸繞吳閶門又曰長沙桓王名策字伯符武烈, SBCK: ''}
