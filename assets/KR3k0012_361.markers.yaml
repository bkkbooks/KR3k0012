  - {type: variant, offset: 975, length: 737, content: 氣也氣以定萬物通於四時者也爾雅曰太平之人仁東至日所出為太平丹穴之人智距齊州以南戴日為太穴太蒙之人信西至日所入為太蒙崆峒之人武孝經曰天地之性人為貴人之行莫大於孝家語曰魯哀公問於孔子曰人之命與性何謂也孔子對曰分於道謂之命始得為人也故下句曰命者性之始也形於一謂之性人各受陰陽剛柔之性故形於一化於陰陽象形而發謂之生化窮數盡謂之死故命者性之始也死者生之終也有始則必有終矣人始生而不具者有五焉目無見不能食不能行不能言不能化及生三月而微煦煦晴轉也然後有見八月生齒然後能食朞而生臏然後能行三年顋合然後能言十有六而精通然後能化陰窮反陽故陰以陽變陽窮反陰故陽以陰化是以男子八月生齒八歲而齔十有六而化女子七月生齒七歲而齔十有四而化一陰一陽奇偶相配陽數奇陰數偶然後道合化成性命之端形於此也又曰堅土之人剛弱土之人柔墟土之人大沙土之人細息土之人美耗土之人醜耗耗字也息土細緻耗土麤䟽者也倮蟲三百六十而人為之長又曰孔子遊太山見營啟期鹿裘帶索鼓琴而歌孔子問曰先生所以為樂者何也對曰吾樂甚多天生萬物唯人為貴而吾得為人是以一樂男尊女卑吾得為男是二樂人生有不見日月不免繈緥者吾已行年九十是三樂也貧者士之常死者人之終處常得終當何憂哉又曰人有五儀有庸人有士人有君子有賢人有聖人審此五者則理道畢矣漢書曰司馬遷曰凡人所以生者神也所託者形也神大用則竭形大勞則弊神離則死死者不可復生離者不可復返故聖人重之鬻子曰天地闢萬物生人為正焉人化而為善禽獸化而為惡人而不善者謂之禽獸老子曰人法地地法天天法道道法自然文子曰人之情欲平嗜慾亂之精氣為人人受天地變化而生一月而膏初形骸如膏脂二月而脈漸生筋脈三月而肧肧胞也三月如水龍狀也四月而胎如水中蝦蟆之胎五月而䈥氣積而成䈥六月成骨血化肉肉化脂脂化骨七月成形四肢九竅成八月而動動作九月而躁動數如前, SBCK: ''}
