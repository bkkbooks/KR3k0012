  - {type: variant, offset: 1842, length: 0, content: '', krp: 口分錢至}
  - {type: variant, offset: 1843, length: 1, content: 萬, SBCK: 生子輙殺元帝議令民産子七歳乃出口分錢東觀漢記曰敬隱宋后以王莽末年生遭丗倉卒其母不舉棄之南山下時天寒冬十一月再宿不死外家岀過於道南聞有兒啼聲怜之因徃就視有飛鳥紆翼覆之沙石滿其口鼻能喘心恠偉之以有神靈遂取而持歸養長至年十三歳乃以歸宋氏後漢書曰竇武母産武并産一虵又曰虞延􅀄生上有物􅀂一疋練遂上升天占者以爲吉魏志曰黄􅀄六年三月魏郡太守孔羡表􅀺陽令程放書言􅁺汝南屈雍妻王以去年十月十二日在草生男兒從右腋生水腹下而出其母自􅀂無他異痛今瘡已愈母子安全無災無害也王隱晉書曰齊王囧輔政太安元年有婦}
  - {type: page-break, offset: 1843, content: '', id: KR3k0012_SBCK_361-3a}
  - {type: variant, offset: 1843, length: 1, content: 萬, WYG: 生子輙殺元帝議令民産子七嵗及出口分東觀漢記曰敬隠宋后以王莾末年生遭世倉卒其母不舉棄之南山下時天寒冬十一月再宿不死外家出過於道南聞有兒啼聲怜之因往就視有飛鳥紆翼覆之沙石滿其口鼻能喘心怪違之以有神靈遂取而持歸養長至年十三歳乃以歸宋氏後漢書曰竇武母産武并産一虵又曰虞延初生上有物若一疋練遂上升天占者以為吉魏志曰黄初六年三月魏郡太守孔羡表黎陽令程放書言掾汝南屈雍妻王以去年十月十二日在草生男兒從右腋生水腹下而出其母自若無他異痛今瘡已愈母子安全無災無害也王隠晉書曰齊王冏輔政太安元年有婦}
