  - {type: variant, offset: 3600, length: 129, content: 孕婦見兔其子缺脣見麋而子必四目帝王世紀曰庖犧氏風姓也母曰華胥燧人之代有大跡出雷澤胥履之生庖犧又曰帝堯陶唐氏祁姓也母曰慶都孕十四月而生堯於丹陵名曰放勛遁甲開山圖榮氏解曰女狄暮汲於石紐山下大祠前水中得月精如雞子愛而含之不覺而吞遂有身十四月而生夏禹括地圖曰大人國其, WYG: 獠}
