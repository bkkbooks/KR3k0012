  - {type: variant, offset: 4613, length: 0, content: '', SBCK: 亦以夜半時適生有人從門呼其父名父出應之不見人見一木杖植其門側好善異於衆其父杖入門以示人占曰吉文伯位至廣漢太守以杖當得子之力矣譙周法訓曰一産二子者當以後生者爲兄言其先胎也荅曰此野人之鑿語耳君子不測暗安知胎之先後也􅀓子曰昔燕趙之間有三男子共娶一女生四子後争訟廷尉延壽奏云禽獸生子逐母冝以四子還母尸三男子於市丗􅀃曰胡廣本姓黄五月生父母惡之乃置之甕投於江湖翁見甕流下聞有小兒啼聲徃取因長養之以爲子登三司流中庸之號廣後不治其本親服云我於本親巳爲死人也丗以此爲深譏焉搜神記曰陳仲舉微時甞􅀫黄申家}
  - {type: page-break, offset: 4613, content: '', id: KR3k0012_SBCK_361-9a}
  - {type: variant, offset: 4613, length: 0, content: '', WYG: 亦以夜半時適生有人從門呼其父名父出應之不見人見一木杖植其門側好善異為衆其父杖入門以示人占曰吉文伯位至廣漢太守以杖當得子之力矣譙周法訓曰一産二子者當以後生者為兄言其先胎也答曰此野人之鑿語耳君子不測暗安知胎之先後也傅子曰昔燕趙之間有三男子共娶一女生四子後爭訟廷尉延壽奏云禽獸生子逐母宜以四子還母尸三男子于市世說曰胡廣本姓黄五日生父母惡之乃置之甕投于江胡翁見甕流下聞有小兒啼聲往取因長養之以為子登三司流有中庸之號廣後不治其本親服云我本親巳為死人也世以此為深譏焉捜神記曰陳仲舉微時嘗宿黄申家}
  - {type: page-break, offset: 4613, content: '', id: KR3k0012_WYG_361-14a, image: WYG0896/WYG0896-0228a.png}
