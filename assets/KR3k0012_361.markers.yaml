  - {type: variant, offset: 652, length: 227, content: 陽氣相乘之極有隨命隨命者隨行為命也援神契曰隨者逆天道常善之行則隨其暴虐行以教之有遭命遭命者行正不誤逢世殘賊君上逆亂辜咎下流災譴並發陰陽散忤暴氣雷至滅曰動地夭絕人命紗鹿襲邑是也忤錯也襲猶淪也河水淪沙鹿之邑溺殺人也春秋孔演圖曰正氣為帝間氣為臣宮商為姓秀氣為人正氣謂若木人則得蒼龍之形靈威仰之氣火人得朱鳥之形赤嫖怒之氣以生之比也間氣則不苞一行各受一星以生若蕭何感昴精樊噲感狼精周勃感冗精者也又繁露曰唯人獨偶天地人有三百六十節偶天之數形體骨肉偶地之厚上有耳目聰明, SBCK: 主}
