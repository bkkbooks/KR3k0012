  - {type: variant, offset: 2605, length: 184, content: 戴禮曰周后任成王於身立而不跂坐而不差獨處不倨雖怒不詈胎教之謂也書之玉版藏之金匱置之宗廟為後世戒史記曰后稷名弃母有邰氏女曰姜嫄為帝嚳元妃出野見巨人跡心說顧之乃踐之身動如孕者居期而生后稷又曰秦之先顓頊之苗孫曰女修玄鳥隕卵脩取吞之有孕生子大業又曰昔夏氏之將衰也有二龍止於夏庭龍亡漦在櫝而藏之至周厲王發而觀之漦化為玄龜入王後宮宮妾未齔而遭之既笄而孕無夫而生子懼而弃之即褒姒也漢, SBCK: 軍唐}
