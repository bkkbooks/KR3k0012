  - {type: variant, offset: 4005, length: 102, content: 田氏寡居夢太白星臨其上因有娠田氏歎曰無夫而娠人將棄我乃移向代都東方里為居五月旦生朔因以所居里為氏朔為名博物志徐君宮人有娠而生卵以為不祥棄於水濱獨狐母有犬名鵠倉獵於水濱得所棄卵衘以來歸獨母以為異乃覆燸之遂成, SBCK: 王助産甞探}
