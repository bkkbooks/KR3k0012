  - {type: variant, offset: 45, length: 440, content: 然後萬物有萬物然後有男女有男女然後有夫婦又說卦曰立人之道曰仁與義尚書泰誓曰惟天地萬物父母惟人萬物之靈禮記禮運曰何謂人情喜怒哀懼愛惡欲七者弗學而能何謂人義父慈子孝兄良弟悌夫義婦聽長惠幼順君仁臣忠十者謂之仁義講信修睦謂之人利爭奪相殺謂之人患故聖人所以治人七情修十義講信修睦尚辭讓去爭奪舍禮何以治之又曰飲食男女人之大欲存焉死亡貧苦人之大惡存焉故欲惡者心之大端也人藏其心不可測度也美惡皆在其心不見其色也欲一以窮之舍禮何以哉故人者其天地之德陰陽之交鬼神之會五行之秀氣也故人者天地之心也五行之端也食味別聲被色而生者也此言兼氣性之效也又樂記曰人生而靜天之性也感於物而動性之欲也物至知知然後好惡形焉左傳昭二年鄭子產曰人生始化曰魄魄形也既生魄陽曰魂陽神氣也用物精多則魂魄彊物權勢是以有精爽至于神明爽明也春秋元命苞曰五氣之精交藂相加以迎陽道人致和五氣五行之氣又曰陰陽之性以一起人副天道故生一子又曰天人同度正法相授天垂文象人行其事謂之教教之為言效也上為下效道之始也又曰仁者情志好生愛人故其為仁以人其立字, SBCK: ''}
