  - {type: variant, offset: 3923, length: 0, content: '', SBCK: 帝系曰陸終娶􅀑方國君之妹謂之女嬇生六子孕而不育三年啓其母左脅三人出右脅三人出風俗通曰生三子不舉俗􅀃生子至於三子似六畜言其妨父母故不舉之也謹按春秋國語越王勾踐令民生三子者與之乳母生二子者與之餼三子力不能獨養故與乳母所以人民繁息卒滅強呉雪㑹稽之恥行霸於中國者也古陸終氏娶于􅀑方謂之女嬇是生六子皆爲諸侯今人多生三子子悉成長父母完安豈有天所孕育而害其父母兄弟者哉又曰不舉寤生子俗􅀃兒墮地未能開目視者謂之寤生舉寤生子妨父母謹按春秋左氏傳鄭武公娶于申曰武姜生莊公及共叔叚莊公寤生驚姜氏因名寤生武公老終天年姜氏亦然安有妨其父母乎又曰汝南周霸字翁仲爲太尉􅁺婦於乳舎生女自毒無男時屠婦比卧得男因相與私貨易禆錢數萬後翁仲爲北海相吏周光能見􅀑署光爲主簿使還致敬於郡縣因告光曰事訖臈日與小兒俱上家去家經十三年不躬蒸甞主簿微察知相先君寧息㑹同飲食忻娱不巳徃到於家上郎君沃酹主簿俯伏在後但見屠者弊衣蠡結倨神坐持刀割肉有五時衣帶青黒綬數人彷徨隂堂東西廂不敢來前光恠其故還至引見問之乞屏左右起造於􅂰前白事狀如此翁仲曰主簿出勿言因持劒上堂謂嫗汝何故殺吾子嫗大怒曰卿常言兒聲氣喜學似我老公欲死欲作狂語翁仲曰祠􅀕如不具服子母立截嫗辭窮情竭泣涕具陳其故時子巳年十八呼與辭決曰凡有子者欲以承先祖先祖不享血食無可奈何自以衣裘僮㒒車馬送迎取其女女嫁爲賣䴵子婦後適西平李文思文思官至南陽太守翁仲更養從弟子熈爲髙邑令又曰潁川有冨室兄弟同居兩婦數月皆懷姙長婦胎傷因閉匿之産期至同到乳母舎弟婦生男夜因盗取之争訟三年州郡不能決丞相黄霸出坐殿前令卒抱兒取兩婦各十歩叱婦曰自徃取之長婦抱持甚急兒大啼呌弟婦恐傷害之因乃放與而止甚愴愴長婦甚喜霸曰此弟子也責問乃伏又曰不舉父同月子俗云妨父也按左傳桓公之子與父同月生因名子同漢明帝亦與光武同月生神仙傳曰老子母懷之七十歳乃}
