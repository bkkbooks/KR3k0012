  - {type: variant, offset: 3073, length: 705, content: 遷至曹人墓也兇兇恐懼聲也音吁勇切為其所得者棺而出因其兇也而攻之遂入曹也史記曰漢王遣將韓信破陳餘後信購致廣武君李左車師事之韓信曰僕欲北伐燕東攻齊何若而有功對曰今將軍涉西河虜魏王擒夏說閼與一舉而下井陘不終朝破趙二十萬眾誅成安君名聞海內威振天下此將軍之所長也然而眾勞卒罷其實難用今將軍欲舉倦弊之兵頓之燕堅城之下欲戰恐力不能拔情見勢屈曠日糧竭而弱燕不服齊必距境以自強也燕齊相持而不下劉項之權未有所分也若此者將軍所短也故善用兵者不以短擊長而以長擊短為將軍計莫如案甲休兵鎮趙撫其孤弱百里之內牛酒日至以饗士大夫醳兵魏都賦曰醳者順時劉逵曰醳酒也北首燕路而後遣辨士奉咫尺之書暴其所長於燕燕必不敢不聽從燕以東告齊齊必從風而服雖有智者亦不知為齊計矣如是則天下事可圖也兵固有先聲而後實者此之謂也韓信並從之燕齊從風而靡後漢書曰王莽兵攻昆陽光武自將步騎千餘前去大軍四五里而陣尋邑亦遣人數千合戰光武奔之斬首十級秦法斬首一賜爵一級故因謂斬首為級諸部喜曰劉將軍平生見小敵怯今見大敵勇甚可怪也且復居前請助將軍光武復進尋邑兵却諸部共乘之斬首數百千級連勝遂前時伯升拔宛已三日而光武尚未知乃偽使持書報城中云宛下兵到而陽墮其書尋邑得之不喜喜音許記切諸將既經累捷膽氣益壯無不一當百光武乃與敢死者三千人從城西水上衝其中堅敢死謂敢而死者凡軍事中軍最尊居以堅銳自輔故曰中堅也尋邑陳亂乘銳崩之遂殺尋邑城中亦鼓噪而出中外合勢震動天地莽兵大敗走者相騰踐奔殪百餘里間殪仆也會大雷風屋瓦皆飛雨下如注滍川盛溢水經曰滍水出南陽魯陽縣西堯山南經崑陽城北東入汝滍音直理也虎豹皆股戰士卒爭赴溺死者以萬數水為不流數過於萬故以萬為數王邑嚴尤陳茂輕騎乘死人渡逃去盡獲其輜重車甲珍寶不可勝筭, SBCK: ''}
