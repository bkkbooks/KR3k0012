  - {type: variant, offset: 2002, length: 276, content: 遂解臨洮圍晉書曰王遜為寧州刺史越嶲李驤寇寧州遜使將軍姚崇爨琛拒之戰于堂狼犬破驤等崇追至瀘水透水死者千餘人崇以道遠不敢渡水遜以崇不窮追也怒囚于郡執崇鞭之怒甚髮上衝冠冠為之裂夜中遂卒又載記曰慕容寶與魏戰謀還中山乃引歸魏軍追擊之寶棄大軍率騎二萬奔還時大風雪凍死者相枕於道寶恐為魏軍所及命去袍仗戎器寸刃無返崔鴻十六國春秋曰前秦符堅自征晉於壽春敗還長安慕容泓起兵于華澤堅將符叡竇衝姚萇討之叡以苪切符叡勇果輕敵不恤士眾泓聞其至也懼率眾將奔關東叡馳兵邀之姚萇諫曰鮮卑有思歸之心宜馳令出關不可遏也叡弗從戰于華澤叡敗績被殺又曰夏赫連㪍㪍伐南涼禿髮傉檀大敗之驅掠二萬七千口, SBCK: 皆取鼻}
