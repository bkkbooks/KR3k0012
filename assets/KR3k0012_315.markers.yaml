  - {type: variant, offset: 69, length: 21, content: 灌夫父張孟嘗為頴陰侯灌嬰舍人蒙灌氏姓為灌孟, SBCK: 陳敏作亂陶􅋲時鎮江夏以朱伺能水戰曉作舟艦乃遣作大艦署爲右甄據江口摧破敏前鋒又曰何無忌傳曰盧循遣别將徐道覆順流而下舟艦皆重樓無忌將率衆拒之長史鄧潜之諌曰今以神武之}
  - {type: variant, offset: 69, length: 6, content: 灌夫父張孟嘗, WYG: 陳敏作亂陶侃時鎮江夏以朱伺能水戰曉作舟艦乃遣作大艦暑}
  - {type: variant, offset: 69, length: 21, content: 灌夫父張孟嘗為頴陰侯灌嬰舍人蒙灌氏姓為灌孟, krp: 陳敏作亂陶侃時鎮江夏以朱伺能水戰曉作舟艦乃遣作大艦署爲右甄據江口摧破敏前鋒又曰何無忌傳曰盧循遣别將徐道覆順流而下舟艦皆重樓無忌將率衆拒之長史鄧潜之諌曰今以神武之}
