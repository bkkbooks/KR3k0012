  - {type: variant, offset: 88, length: 2, content: 灌孟, WYG: 譬然國家之計在此一舉聞其舟艦大盛勢居上流蜂蠆之毒邾魯成鑒宜决破南塘守二城俟其疲老然後擊之若棄萬全之長䇿而决成敗于一戰如其失利悔無及矣無忌不從遂以舟}
  - {type: punctuation, offset: 90, content: 。, id: KR3k0012_CHANT_315-bkkpn18}
