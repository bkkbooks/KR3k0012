  - {type: variant, offset: 3785, length: 3, content: 定漢中, SBCK: 至陽平張魯使弟衛據陽平􅀜撗山築城十餘里攻之不拔乃引軍還賊見大軍退其守備懈公乃宻遣􅀐將等乗險夜襲大破之又曰廬江太守劉勲理明城今同安郡恃兵強士勇横於江淮之間無出其右者孫䇿惡之時巳有江左自領㑹稽太守使人卑辭厚幣而􅀃之曰海昬上繚宗人數欺下國患之有年矣擊之路由不便幸因將軍之神武而臨之且上繚國冨廪實吴姓越􅁎充於後庭明珠大貝􅀍於帑藏帑他剆切取之可以資軍雖蜀郡成都金碧之府未能過也䇿願舉弊邑士卒以爲外援勲然之}
  - {type: variant, offset: 3785, length: 3, content: 定漢中, WYG: 至陽平張魯使弟衞據陽平關横山築城十餘里攻之不㧞乃引軍還賊見大軍退其守備懈公乃宻遣騎將等乗險夜襲大破之又曰廬江太守劉勲在皖城今同安郡恃兵强士勇横于江淮之間無出其右者孫䇿惡之時以江左自領㑹稽太守使人卑辭厚幣而説之曰海昏上繚宗人數欺下國患之有年矣擊之路由不便幸因將軍之神武而臨之且上繚國富廩實吴娃越姬充于後庭明珠大貝被于帑藏取之可以資軍雖蜀郡成都金碧之府未能過也策願舉敝邑士卒以為外援勲然之}
