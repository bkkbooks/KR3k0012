  - {type: variant, offset: 76, length: 11, content: 頴陰侯灌嬰舍人蒙灌氏姓, WYG: 右甄據江口摧破敏前鋒又曰盧循遣别將徐道覆順流而下舟艦皆重樓何無忌率衆拒之長史鄧芝曰以神武之師抗彼逆衆廻山壓卵未足}
