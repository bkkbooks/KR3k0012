  - {type: variant, offset: 2322, length: 750, content: 人自為戰難與爭鋒不如從溫圍北趣萬解惟阻水結營制其咽喉百戰百勝之術也傉檀不從勃勃聞而大喜乃於楊武下峽鑿凌埋車以塞路勃勃乃勒眾逆擊大敗之殺傷萬計又曰後涼呂弘攻叚業於張掖不勝將東走業議欲擊之其將沮渠蒙遜諫曰歸師勿遏窮寇弗追此兵家之戒也不如縱之以為後圖業曰一日縱敵悔將無及遂率眾追之為弘所敗業歎曰不能用子房之言以至於此後周書曰晉公護東伐高齊遣將尉遲逈圍洛陽為敵所敗周將達奚武與齊王憲於邙山禦之至夜收軍憲欲待明更戰武欲還固爭未決武曰洛陽軍散人情駭動若不因夜速還明日欲歸不得武在軍旅久矣備見形勢大王少年未經軍事豈可將數營士眾一旦棄之乎憲從之遂全軍而返隋書曰張金初既敗將數百人遁逃後歸漳南招集餘黨楊善會追捕斬之傳首行在所帝賜以尚方甲矟弓劍進拜清河通守唐書曰武德初劉武周入寇僕射裴寂拒戰于度索原寂軍敗周進過河東太宗出兵拒之江夏王道宗年十七從征太宗登玉壁城望賊謂道宗曰賊恃其眾來邀我戰汝謂如何對曰賊乘勝而來其鋒不可當易以計屈難與力競但深溝高壘以挫其鋒烏合之徒安得持久糧餉既竭自當離潰可不戰而擒也太宗曰汝意暗與我合武周食盡夜遁追及會州一戰滅之又曰德操領延州道行軍揔管鎮北境梁師都與突厥之眾數千騎來寇延安營於野豬嶺德操以眾寡不敵按甲以挫其銳後伺賊稍怠遣副總管梁禮率眾擊之德操以輕騎出其不意賊與禮酣戰久之德操多張旗幟掩至其後賊大潰逐北二百餘里剋其魏州虜男女二千餘口經數月師都又以步騎五千來寇德操擊之俘斬略盡師都與百餘騎而遁以功拜上柱國封平原郡公邑一千戶賜以貂裘金帶布帛千疋衛公兵法曰諸戰鋒等隊打賊敗其駐隊隊別量抽驍健二十人逐北其輜重隊遙叫作聲不得輒動跳盪隊奇兵隊趁賊退不得過百步如審知賊徒敗散仍須取機追逐乘勢左傳曰晉侯圍曹門焉多死攻曹城門曹人尸諸城上磔晉死人於城上也晉侯患之聽輿人之誦稱舍於墓輿眾也舍墓為將發冢也師遷焉曹人兇, SBCK: 皆惶}
