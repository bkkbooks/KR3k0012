  - {type: variant, offset: 242, length: 348, content: 攻鄴城尚聞鄴急棄平原而求入城以計事者主簿李孚請行尚曰當何所辦李曰今鄴圍甚急多人則不可孚乃自選溫信者三人不示其謀各給駿馬令釋戎器著平上冠持問事杖投暮直抵鄴下自稱曹公都督巡歷圍壘所過呵責失候者輒捶之自東歷西徑出曹公營當城門復怒守闈者收縛之因開圍馳入城下配以縋引之孚得入城中鼓噪皆呼萬歲守圍者以狀聞公笑曰此非徒入方且復出孚計事訖欲還而外圍益急謂配曰城中穀少無用老弱為不如驅出之省穀配乃夜簡得一千人皆令秉白幡持脂燭從三門而出請降孚所將來騎隨降人而出時守圍吏聞城中悉降火光照曜但共觀火不復視圍孚出北門突圍而歸尚明日曹公聞孚以得去曰果如吾言又曰公孫瓚除遼東屬國長史常從數十騎出行塞下卒逢鮮卑數百騎瓚乃退入空亭納其從者曰今不奔之則死盡矣乃自持兩刃矛馳出衝賊殺傷數十人瓚左右亦亡其半遂得免又曰賈復從征伐未嘗喪敗數, SBCK: ''}
