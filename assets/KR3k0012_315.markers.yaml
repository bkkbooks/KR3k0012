  - {type: variant, offset: 4537, length: 127, content: 出輕利鬥艦躬提憣鼓命眾軍齊力擊之又上步騎於西岸右軍參軍庾樂生乘艦不進斬而徇之於是眾軍並騰踊爭先軍中多萬鈞神弩所至莫不摧陷裕自於中流蹙之因風水勢艦悉泊西岸上軍先備火具乃投火焚之烟焰翳天賊眾大敗追奔至夜乃歸循等還尋陽初分遣步兵莫不疑怪及燒賊艦眾乃悅服又曰周訪, SBCK: 㑹督護董贍入共}
