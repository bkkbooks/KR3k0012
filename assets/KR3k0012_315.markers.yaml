  - {type: variant, offset: 4722, length: 640, content: 六國春秋蜀李特攻晉將張徽敗徽軍特議欲釋徽還涪音浮諸將進曰微軍連戰士卒傷減智勇俱竭宜因其弊遂擒之若舍而寬之徽養病收亡餘眾更合圖之未易也特從之復進攻徽潰圍走特遣將水陸追之遂害徽生擒徽子存以徽喪還之也唐書曰太宗進逼西河宋金剛果遁走太宗追之身先士卒奮擊大破之乘勝逐北一日一夜行二百餘里轉戰數十合士卒疲弊至高壁嶺揔管劉弘基執馬而諫曰大王功効於此足矣亦宜思自安之計方今草創敵可盡乎且喉糧已竭士卒疲頓更欲何之願且停營待兵糧咸集而後決戰太宗曰功者難成易敗機者難得易失金剛走到汾州眾心已沮我及其未定當乘勢擊之此破竹之義也如更遲留必為賊計此失機之道吾國家之事當竭忠盡力豈顧身之安危乎遂策馬去諸軍乃進莫敢以飢乏為辭夜宿於雀鼠谷之西原太宗不食二日不解甲三日矣軍中若飢此夕惟有一羊太宗撫將士與之同食三軍感悅皆飽而思奮激明日趍汾州金剛列陣南北七里以抗官軍太宗遣揔管李勣程咬金秦叔寶當其北翟長孫秦武通當其南親御中軍以臨之諸軍戰小却為賊所乘太宗率精騎三千直趣金剛賊眾大潰斬首三千餘級追奔數十里至張難堡有浩州行軍揔管樊伯通張德政先據此堡望見太宗輕騎而來初未識之太宗免冑曰我也堡人讙譟既而涕泣曰不圖今日生謁大王死無所恨左右以太宗不食告之乃奉濁酒脫粟飯太宗曰今日飢渴並解雖公孫豆粥何以加之又曰武德初太宗征薛仁果大破之乘勝遂逼折撫城竇抗等苦諫曰賊主猶據堅城雖破其將宗羅侯未可即逼請按兵以候其變太宗曰筭之久矣破竹之勢不可失也賊大軍以敗餘眾何足為虞兇魁之計盡於此矣遂率眾而進至夜半軍臨賊城守陴者皆亂爭自投而下仁果窮蹙開門請降, SBCK: 五}
