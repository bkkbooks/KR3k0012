  - {type: variant, offset: 4485, length: 1, content: 退, SBCK: 身􅀍五瘡宗族昆季死者七人吴志曰蜀將􅀜羽遣麋芳守南郡羽領兵圍樊吴主遣將吕蒙屯陸口外倍脩恩厚與􅀜羽結好羽多留兵備南郡恐蒙有變蒙上䟽曰羽計樊而多留備兵必恐蒙圗其後故也蒙常有病乞分衆還建業以理病爲名羽聞之必徹備徐以大軍泝江馳上襲其空虚則南郡可不戰而羽易擒耳吴主然之蒙遂稱病而還建業羽果稍徹備而悉衆赴樊城蒙遂發兵逆流而上伏甲於舟使更衣爲啇人以理征棹逹􅍼兼行過羽所置屯戍輒􅅞之羽遂失驚師次于南郡襲奪其城羽吏士攻樊城未下聞城以䧟而家屬}
  - {type: page-break, offset: 4485, content: '', id: KR3k0012_SBCK_315-6a}
  - {type: variant, offset: 4485, length: 1, content: 退, WYG: 身被五創宗族昆季死者七人吳志曰蜀關雲長遣糜芳守南郡自領兵圍樊吳主遣將吕蒙屯陸口外倍修恩厚與雲長結好雲長多留兵備公安南郡蒙上疏曰雲長多留備兵必恐蒙圖其後故也䝉常有病乞分衆還建業以理病為名彼聞之必徹備徐以大軍泝江馳上襲其空虛則南郡可下而雲長可擒也吳主然之蒙遂稱病還建業雲長果稍徹備而悉衆赴樊城蒙遂發兵逆流而上伏甲於舟使更衣為商人以理征棹逹曙兼行至其所置屯戍輒縛之遂絶斥堠師次于南郡襲奪其城雲長將士攻樊城未知聞城已陷而家屬}
