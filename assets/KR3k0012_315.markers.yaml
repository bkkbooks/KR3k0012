  - {type: variant, offset: 637, length: 186, content: 所圍獨出麾下從者千餘人潰圍刺之已出復入復出權眾破走由是威震江東又曰曹仁字子孝太祖從弟也行征南將軍留屯江陵拒吳將周瑜瑜未渡前鋒數千人始至仁募得三百人遣部曲將軍牛金逆與挑戰遂為所圍長史陳矯在城上望見金等垂沒左右皆失色仁氣奮怒遂被甲上馬將其麾下壯士數十騎出城徑前衝入陣金等乃解餘眾未盡出仁復直還突之拔出金兵賊眾乃退矯等初見仁出皆懼及見仁還乃歎曰將軍真天人也三軍服其勇太祖益壯之晉, SBCK: ''}
