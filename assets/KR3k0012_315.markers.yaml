  - {type: variant, offset: 4488, length: 1, content: 資, SBCK: 擒荆州遂平又曰建安二十四年􅀜羽圍曹仁於襄陽曹公遣左將軍于禁救之㑹漢水􅁀起羽以舟兵盡生虜禁等歩􅀐三萬送江陵唯城未㧞權内憚羽外欲以爲巳功淺與曹公乞討羽自効權征羽先遣吕蒙襲公安獲將軍士仁蒙到南郡太守糜芳以城降蒙據江陵撫其老弱釋于禁之囚晉書曰王如京兆人也􅀄爲州武吏遇亂流移至宛時諸流人有詔並遣還郷如等以􅀜中荒殘不願歸征南將軍山簡南中郎將杜㽔各遣兵送之而促期令發如遂潜結無頼少年夜襲二軍大破之又䧟攻襄城於是流人諸郡各率其黨攻諸城鎮多殺令長以應之未幾衆四五萬號大將軍後如連年種榖皆化爲莠軍中大飢又曰石勒遣其將石良率精兵五千襲李矩矩逆擊不利郭誦弟元復爲賊所執遣元以書􅀃矩曰去東平曹嶷西平猗廬矩如牛角何不歸命矩以示誦誦曰昔王陵父母在賊猶不改意弟當何論勒復遺誦塵尾馬鞭以示殷勤誦不荅又曰張駿爲涼州牧咸和􅀄駿遣武威太守竇濤金城太守張閬武興太守辛巖􅀭烈將軍宋輯等率衆來㑹韓璞攻討􅁗州諸郡劉曜遣其將劉胤來拒屯于狄道城韓璞進渡沃干嶺辛巖曰我握衆數萬籍氐羌之銳冝速戰以滅之不可以乆乆則變生璞曰自夏末以來太白犯月辰逆行白虹貫日皆變之大者不可以輕動輕動而不捷爲禍更深吾將乆而斃之且躍與石勒相攻胤亦不能乆也積十七日軍糧竭遣辛巖督於金城胤聞之大恱謂其將士曰韓璞之衆十倍於吾羌胡皆叛不爲之用吾糧􅅒將懸難以持乆今虜分兵運糧可謂天授吾也􅀂敗辛巖璞等自潰彼衆我寡冝以死戰戰而不捷當無疋馬得還冝厲爾戈矛竭汝智力衆咸􅁬於是率􅀐二千襲巖于沃干嶺敗之璞軍遂潰死者}
