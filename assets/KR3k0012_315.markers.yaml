  - {type: variant, offset: 4488, length: 1, content: 資, WYG: 擒荆州遂平又曰建安二十四年雲長圍曹仁於襄陽曹公遣左將軍于禁救之㑹漢水暴起雲長以舟兵生虜禁等步騎三萬送江陵唯城未㧞權内憚雲長外欲為己功與曹公牋乞討賊自効權正月先遣吕䝉襲公安獲將軍士仁蒙到南郡太守糜芳以城降蒙據江陵撫其老弱釋于禁之囚晉書曰王如京兆人也初為州武吏遇亂流移至宛時諸流人有詔並遣還鄉如等以關中荒殘不願歸征南將軍山簡南中郎將杜􅅋各遣兵送之而促期令發如遂􅅗結無賴少年夜襲二軍大破之又䧟攻襄城於是諸郡流人各率其黨攻諸城鎮多殺令長以應之未㡬衆四五萬號大將軍如後連年種榖皆化為莠軍中大饑又曰石勒遣其將石良率精兵五千襲李矩逆擊不利郭誦弟元復為賊所執遣元以書説矩曰去年東平曹嶷西賔猗盧矩如牛角何不歸命以示誦誦曰昔王陵之母在賊猶不改意弟當何論勒復遺誦麈尾馬鞭以示殷勤誦不答又曰張駿為凉州牧咸和初駿遣武威太守竇濤金城太守張閬武興太守辛巗揚烈將軍宋輯等率衆東㑹韓璞攻討秦州諸郡劉曜遣劉𦙍來拒屯于狄道城韓璞進渡沃干嶺辛巗曰我握衆數萬藉氐羗之鋭宜速戰以滅之不可以久久則變生璞曰自夏末以來太白犯月辰星逆行白虹貫日皆變之大者不可以輕動輕動而不捷為禍更深吾將久而斃之且曜與石勒相攻𦙍亦不能久也積至七十日軍糧竭遣辛巗督運于金城𦙍聞之大悦謂其將士曰韓璞之衆十倍於吾羗胡皆叛不為之用吾糧廪將懸難以持久今虜分兵運糧可謂天授吾也若敗辛巗璞等自潰彼衆我寡宜以死戰戰而不捷當無疋馬得還宜厲爾戈矛竭汝智力衆咸奮志於是率騎三千襲巗于沃干嶺敗之璞軍遂潰死者}
