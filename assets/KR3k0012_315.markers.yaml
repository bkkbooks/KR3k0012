  - {type: variant, offset: 3995, length: 320, content: 軍劉道規俱受劉毅節度留其龍驤將軍何澹之前將軍郭鈐江州刺史郭昶之守盆口無忌等次桑落洲澹之等率軍來戰澹之常所乘舫旌旗甚盛無忌曰賊帥必不居此欲詐我耳宜亟攻之眾咸曰澹之不在其中徒得無益無忌謂道規曰今眾寡不敵戰不全勝澹之雖不居此舫取則易獲因縱兵勝之可一鼓而敗之也道規從之遂獲賊舫因傳呼曰已得何澹之矣賊中驚擾無忌之眾亦為喟然道規乘勝逕進無忌又鼓噪赴之澹之遂潰又曰鎮南將軍都督荊州杜元凱襲吳樂鄉在今江陵郡松滋縣東六十里虜都督孫歆沆湖以南至于交廣覩風送款時眾會議或曰百年之寇未可盡剋今將暑熱水潦方降疾疫將起宜俟來冬大舉凱曰昔燕樂毅籍濟西一戰以并強齊今王師兵威已震譬如破竹數節之後皆迎刃而解也遂指授群帥直指抹陵所過城邑莫不束手遂平吳國先議者慚而謝焉又曰朱齡石, SBCK: 鐘㑹鄧艾}
