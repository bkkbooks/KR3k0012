  - {type: variant, offset: 91, length: 1, content: 古, SBCK: 抗彼逆衆逥山壓􅆑未足爲譬然國家之計在此一舉聞其舟艦大盛􅀔居上流蜂蠆之毒邾魯成鑒冝決破南塘守二城以待之其必不敢捨我逺下蓄力俟其疲老然後擊之􅀂棄萬全之長䇿而決成敗於一戰如其失利悔無及矣無忌不從遂以舟師拒之旣及賊令強弩數百登西岸小山以邀射之而薄于山側俄而西風大起無忌所乗小艦􅀍飄于東岸賊乗風以大艦逼之衆遂奔敗無忌尚厲聲}
