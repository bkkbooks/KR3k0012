  - {type: punctuation, offset: 6, content: 《, id: KR3k0012_CHANT_812-bkkpn1}
  - {type: variant, offset: 6, length: 0, content: '', SBCK: 前欲壞酒鎗恐冝移在此器也帝甚慙南史曰梁季直丹陽和陵人也祖愍祖宋廣州刺史父景仁中散大夫季直早慧愍祖甚愛異之甞以四凾銀列置於前令諸孫各取其一季直時年四歳獨不取曰􅀂有賜當先父伯不應度及諸孫故不取􅉖祖益竒之陳書曰周文育從南海出至大􅁃嶺遇卜者卜之曰君北下不過作令長南入則爲公侯又當􅁀得銀二千兩􅀂不見信以此爲驗其夕􅀫於逆旅有賈人求與文育􅀶文育勝之得銀二千兩旦遂却入嶺南崔鴻十六}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_SBCK_812-2b}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 前欲壊酒鎗恐宜移在此器也帝甚慙南史曰梁陶季直丹陽和陵人也祖愍祖宋廣州刺吏父京仁中散大夫季直早慧愍祖甚愛異之嘗以西凾銀列署於前令諸孫各取一季直時年四嵗獨不取曰若有賜當先父伯不應度及諸孫故不取愍祖益竒之陳書曰周文育從南海出至大庾嶺遇卜者卜之曰君北下不遇作令長南入則為公侯又當暴得銀二千兩若不見信以此為驗其夕宿於逆旋有賈人求與文育博文育勝之得銀二千兩且遂却入嶺南崔鴻十六}
