  - {type: variant, offset: 702, length: 124, content: 蜀王本紀曰秦王以金一笥遺蜀王蜀以禮物荅而盡化為土秦王怒群臣拜賀曰土者地也秦當得蜀矣說苑曰申鳴者孝聞於楚王授之相辭不受其父曰使汝有祿於國立義於庭吾無憂矣申鳴從父命為楚相及白公亂申鳴曰今不得為孝子矣遂援鼓殺白公其父亦死王賜金百斤申鳴曰何面目見天下遂自殺, WYG: 宫桓譚}
