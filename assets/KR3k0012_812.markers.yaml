  - {type: variant, offset: 1706, length: 317, content: 鷄石昔有人耕此山側望見鷄出遊戲有一長人操彈彈之鷄遙見便飛入穴彈丸正著穴上丸徑六尺許下垂蔽穴猶有門隙不復容人又有人乘船從下流還縣未至此崖數里一人通身黃衣檐兩籠黃紙求寄載因載之黃衣人乞食船主與之食訖船適至崖下船主乞瓜此人不與仍唾盤上徑下崖直入石中船主初甚忿之見其入石始知神異取食器視之見盤上唾悉是黃金又曰先儒說禹時天下兩金三日古詩曰安得天雨金使金賤如土周成王時咸陽雨金今咸陽有雨金原秦二世元年宮中雨金既而化為石漢惠帝二年宮中雨黃金黑錫又翁仲孺家貧力作居渭川一旦天雨金十斛於其家由是與王侯爭富今秦中有雨金翁世世富錄異傳曰隗炤者汝南陰鴻壽亭民善於易臨終書板授其妻曰吾死當大荒窮雖爾慎莫賣宅後到五年春當有詔使頓來此亭姓龔此人負吾金卿以此板往責之, WYG: 按摩奄忽}
