  - {type: variant, offset: 1217, length: 0, content: '', krp: 殯歛其銀以枕之素書着腹上哭之謂曰若子䰟靈有知當令子家知子在此今奉使命不獲乆留遂辭而去呉越春秋曰禹登委山得五}
