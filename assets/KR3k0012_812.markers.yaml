  - {type: variant, offset: 9, length: 5, content: 范蠡乘輕舟, krp: 卿爲豫章王時贈朕柘弓銀研卿頗憶不曰臣安敢忘之但恨爾日不得早識龍顔又後趙録曰太武殿室皆銀楹金柱後魏書曰銀出始興陽山縣又出桂陽陽安縣驪山有銀礦二石得銀七兩白登山亦有銀礦八石得銀七兩宣武帝詔並置銀宫每令探鑄又曰孝明皇帝開恒州銀山之禁與人共之又曰太武皇帝和平二年詔中尚坊作黄金合盤鏤}
