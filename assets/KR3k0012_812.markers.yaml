  - {type: variant, offset: 3155, length: 399, content: 羊子得遺金一餅以與妻貞義曰君子不以利污行羊子慚而去之又曰廣漢汝婦者汝敦妻也敦以所受田地奴婢三百餘萬悉讓與兄裁留園地數十畝起舍耕作土中得金一器敦以示妻妻曰本言讓先祖所有此獨非其有耶敦曰固吾意也俱擔金送與兄嫂郡國誌曰蘇秦宅在洛陽利仁里後魏高顯業每夜見赤光於光處掘得金百斤銘曰蘇家金業為之造寺秦州記曰金城郡應劭云初築城得金城臨海記曰白石山去縣邑三十里望之如雪上有淵相傳云金鵝之所集鄭緝之東陳記曰金㹠山之康縣南三里故老傳云有人得金㹠於此故名山劉欣期交州記曰趙嫗者九真人乳長數尺入山聚盜遂攻郡常著金擒提屐又曰金有華出珠崖謂金華采者也雪山在新昌南人曾於山中得金塊如升迷失道還置本處乃得出錢塘記曰縣東南有峴山長老相傳採金於此羅浮山記曰州南十里有牛潭漁人見金牛自水出義熙中縣民張安躡得金鏁大如指遂數十尋尋尋不已俄有物從水引之掘不能禁以刀斷得數尺安遂致富其後義興周雲甫掩此牛掣斷其鏁得二丈遂以財雄林邑記曰從林邑往金山, SBCK: ''}
