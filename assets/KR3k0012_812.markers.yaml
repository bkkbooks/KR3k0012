  - {type: variant, offset: 1326, length: 282, content: 有一人丈餘高冠赤幘呼曰細腰應諾何以有人氣荅曰無文問曰高冠者誰荅曰金也在西屋壁下文掘得金三百斤又曰漢文微服懷金過魯少年少年柱金杖出應門王子年拾遺記曰少昊時金鳴於山銀涌於地或如龜虵之類乍似人鬼之形又曰方丈山有池泥色金而味辛以泥為器可作丹矣百鍊可為金矣金色青照鬼魅猶如照面不得藏形也異苑曰汝南殷陶市同縣張南宅掘地得錢百萬金二斤即以還南南曰君至德感寶為君出終不肯受陶送付縣令河南張摽表上尚書又曰新野黃舒義熙中耕田得一船金卜者云三年勿用長守富也舒不能從遂成土壤又曰永康王曠井上有一洗浣石時見赤氣後有胡人寄宿忽求買之曠怪所以求及度錢子婦孫氏覩二黃鳥鬭於浣石上疾往掩取變成黃金胡, WYG: ''}
