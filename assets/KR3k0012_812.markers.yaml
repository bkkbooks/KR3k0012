  - {type: variant, offset: 2548, length: 403, content: 又曰管寧華歆共園中鋤菜見地有斤金管揮鋤與瓦石不異華捉而擲去曹操別傳曰操引兵入峴發梁孝王冡破棺收金寶數萬斤天子聞之立泣益部耆舊傳曰王忳字少林詣京師於客舍見諸生病甚因謂忳曰腰下有金十斤願以相與乞收藏骸骨未問姓名因絕忳賣金一斤以給絮棺九斤置生腰下魯國先賢志曰叔孫通草創朝儀拜通為奉常賜金五百斤通悉以金賜諸生諸生乃喜曰叔孫生聖人也知當世務廬江七賢傳曰陳翼字子初到覽鄉見馬旁有一人病呼曰我長安魏少公聞卿廬江樂來遊今病不能前翼迎歸養之有金十餅素二十疋既死翼賣素買棺衣衾以金置棺下騎馬出入後其兄長公見馬告之吏捕翼翼具言棺下得金長公叩頭謝以金十餅投其門翼送長安還之邴原別傳曰邴原字根矩以喪亂方熾遂往遼東時同郡劉舉亦在遼太守公孫度掩捕其家而舉得免窘逼歸原東萊太守太史子義素有義原以舉付之舉臨去以其手所杖劍金三餅與原原受金辭劍還謂度曰將軍平日與舉無郄而欲殺之者但恐其為蜂蠆耳令舉以去若以拘閉其家毒螫必滋甚矣度即出舉家原以金還之, SBCK: ''}
