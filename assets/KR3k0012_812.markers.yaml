  - {type: variant, offset: 1221, length: 0, content: '', SBCK: 兩王韶之始興記曰冷君西北有小首山宋元嘉元年夏霖雨山崩自顛及麓崩處有光耀有􅀂星辰焉居人徃觀皆是銀鑠鑄得銀也又曰秋水源山盤石上羅列十甕皆蓋以青盆其中悉是銀餅人有遇之者但得開觀之不可取取輙送悶􅀳太元􅀄林駈家㒒􅀼三餅有大虵傷而死其夜林駈夢神語曰君奴不良盗銀三餅已受顯戮願以銀相備駈覺奴死銀在其傍有徐道者自謂能致乃集􅀕酒盛奏章書擊皷吹入山湏􅁷雷震雨石倒樹折木道遂懼走湘州記曰曲江縣有銀山山多素霧廣州記曰廣州市司用銀易米遂成縣任山又有有銀砂桂陽記曰臨賀山有黒銀黄銀禮斗威儀曰君乗金而王則黄銀見隋書曰辛公義爲牟州刺史時山東霖雨自陳汝至于滄海皆苦水災境内犬牙獨無所損山出黄銀獲之以獻詔水部郎婁崱就公義禱乃聞空中有金石絲竹之響唐書曰太宗甞賜房玄齡黄銀帶顧謂曰昔如晦與公同心輔朕今}
