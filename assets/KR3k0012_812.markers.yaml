  - {type: variant, offset: 194, length: 441, content: 所貴於天下之士者為人排患釋難解紛而無取也即有取者乃商賈之人仲連不忍為也遂辭平原君而去終身不復見也又曰邯鄲之北有蘇人侯蘇秦往說之蘇人侯送以黃金百溢其家丞諫曰君侯之與客無故舊而送之百金其說可得聞耶蘇人侯曰客天下辯士立談之間再奪我地而復歸之吾地雖小豈其百金韓詩外傳曰田子為相三年歸休以金百鎰奉其母母曰不義之物不入於館為人臣不忠是為人子不孝子其去曰子慚愧走出自歸於王還金請退就獄王赦田子罪以金賜其母又曰楚襄王遣使者持金千斤白璧百雙聘莊子欲以為相莊子固辭又曰延陵季子遊於齊見遺金於路呼牧者取之牧者曰何子居之高而視之下也類君子而言野也有君不臣有友不友當暑衣裘吾豈取金者乎延陵季子知其賢者請問姓字牧者曰子乃皮相之士也何足語姓字哉遂去周易參同契曰黃土金之父流水珠之母英雄記曰董卓塢有金二三萬斤漢武故事曰帝年數歲長公主遍指侍者與作婦好否皆不用後指陳后帝曰若得阿嬌作婦當以金屋貯之漢武內傳曰帝受西王母真形經盛以黃金之几又曰西王母有丸丹金液金漿漢東園祕記曰亡人以黃金塞九竅則尸終不朽陸賈新語曰舜藏金於嶄巖, SBCK: 杻陽}
