  - {type: variant, offset: 2256, length: 2, content: 巴丘, WYG: 秋水源山盤石上羅列十甕皆葢以青盆其中悉是銀餅人有遇之者但得開觀之不可取取輙迷悶晉太元初林駈家僕竊三餅有虵傷而死其夜林駈夣神語曰君奴不良盗銀三餅已受顯戮願以銀相備駈覺奴死銀在其傍有徐道者自謂能致乃集祭酒盛奏章書撃鼓吹入山須臾雷霆雨石倒樹折木道遂懼走湘州記曰曲江}
