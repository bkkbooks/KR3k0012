  - {type: variant, offset: 15, length: 1, content: 浮, SBCK: 白銀鈿以玟珚唐書曰武德中方術人師市奴合金銀並成上異之以示侍臣封德彛進曰漢代方士及劉安等眥學術唯苦黄白不成金銀爲食器可得不死又曰貞觀中治書侍御史權萬紀上言宣饒二州諸山大有銀坈採之極是利益每歳可得錢百萬貫上謂曰朕貴爲天子是事無所少乏唯須嘉言善事有益}
  - {type: variant, offset: 15, length: 1, content: 浮, WYG: 白銀劒以玫珚唐書曰武徳中方何人師市奴合金銀并成上異之以示侍臣封徳彛進曰漢代方士盈劉安等皆觧學術唯云黄白不成金銀為食器可得不老又曰貞觀中治書侍御史權萬紀上言宣弼二出諸山大有銀坑採之極是利益每嵗可得錢百萬貫上謂曰朕貴為天子是事無所少之惟須嘉言善事有益}
  - {type: variant, offset: 15, length: 1, content: 浮, krp: 白銀鈿以玟珚唐書曰武德中方術人師市奴合金銀並成上異之以示侍臣封德彛進曰漢代方士及劉安等眥學術唯苦黄白不成金銀爲食器可得不死又曰貞觀中治書侍御史權萬紀上言宣饒二州諸山大有銀坈採之極是利益每歳可得錢百萬貫上謂曰朕貴爲天子是事無所少乏唯須嘉言善事有益}
  - {type: variant, offset: 17, length: 2, content: 五湖, SBCK: 百姓者且國家䞉得數百萬貫錢何如得一有才行人不見卿推賢進善之事又不能按舉不法震肅權豪唯只言稅鬻銀坑以利多爲美昔堯抵璧於山投珠於谷由是崇名美号見稱千載後漢桓靈二帝好利賤士爲近代庸暗之主卿遂欲將我比桓靈耶是日放令還第又曰太宗引杜淹爲天䇿府兵曹叅軍文學館學士常侍宴賦詩時有八人同作淹爲稱首賜以銀鍾又曰貞觀中鴻臚奏髙麗}
  - {type: page-break, offset: 17, content: '', id: KR3k0012_SBCK_812-3b}
  - {type: variant, offset: 17, length: 2, content: 五湖, WYG: 百姓買且國家賸得數百萬錢何如得一有才行人不見卿推賢進善之事又不能按舉不法震肅權豪惟只言稅鬻銀坑以利為多美昔堯抵壁於山投珠於谷由是崇名美號見稱千載後漢桓靈二帝好利賤士為近代庸暗之主卿遂欲將我比桓靈耶是日放令還第又曰太宗引杜淹為天䇿朝兵曹叅其文學舘學士常侍宴賦詩時有八人同作淹為稱賞賜以銀鍾又曰貞觀中鴻臚奏髙麗}
