  - {type: variant, offset: 1223, length: 7, content: 失者十餘長安為, SBCK: 賜唯獨見公因泫然流涕又曰如聞黄銀多爲􅀑神所畏命取黄金帶遣玄齡親送于靈所也水銀史記曰􅁗始皇葬以水銀爲百川江河大海機轉相輪終而復始皇覽曰􅀜東賊發始皇墓中有水銀廣雅曰水銀謂}
