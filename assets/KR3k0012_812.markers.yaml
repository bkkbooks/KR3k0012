  - {type: variant, offset: 3539, length: 484, content: 丈遂以財雄林邑記曰從林邑往金山三十日至遠望金山嵯峨如赤城照耀似天光澗壑谷中亦有生金形如䖝豸細者似蒼蠅大者若蜂蟬夜行燿熠光如瑩火地鏡圖曰黃金之氣赤黃千萬斤以上光大如鏡盤白澤圖曰黃金之精石名瑭狀如豚居人家使人不宜妻白鼠以昏時見於丘陵之間視所出入中有金關令內傳曰老子與尹喜登崑崙上金臺玉樓七寶宮殿晝夜光明乃天帝四王之所遊處有珠玉七寶之床宗躬孝子傳曰郭巨河內溫人也妻生男謀曰養子則不得營業妨於供養當殺而埋焉鍤入地有黃金一釜上有鐵券曰黃金一釜賜孝子郭巨揚雄集曰單于上書願朝哀帝以問公卿公卿虛費府帑可且勿許單于使辭去未發雄上書諫天子召還匈奴使者更報單于書而許之賜雄黃金十斤孔融聖人優劣論曰金之優者名曰紫磨猶人之有聖也陳思王辯道論曰甘陵始其語余曰本師姓韓字世雄始常與師於南流作金前後數四投數萬斤金於海嶺表異錄曰五嶺內富州賓州澄州江溪間皆產金側近居人以木箕陶金為業自且多暮有不獲一星者鄭玘傷淘者詩云披沙辛苦見傷懷往往分毫望亦乖力盡半年深水裏難全為一鳳凰釵就中澄州者最為良金余頃年使于上國親友不欲書其姓字附澄州金二十兩與當時權臣余訝其單鮮友人曰金雖少貴其夜明有異於常金耳遂留宿驗之信然也, WYG: ''}
