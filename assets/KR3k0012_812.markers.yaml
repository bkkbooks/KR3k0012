  - {type: variant, offset: 1520, length: 709, content: 野黃舒義熙中耕田得一船金卜者云三年勿用長守富也舒不能從遂成土壤又曰永康王曠井上有一洗浣石時見赤氣後有胡人寄宿忽求買之曠怪所以求及度錢子婦孫氏覩二黃鳥鬭於浣石上疾往掩取變成黃金胡人不知索市逾急既得撞破石內正有二鳥處又曰即墨有古冡發之有金牛塞埏門不動犯之則大坰述異記曰南康雩都縣沿江西出去縣三里名夢口穴狀如石室舊傳常有神鷄色如好金出此穴中奮翼迴翔長鳴響徹見人輒飛入穴因號此石為鷄石昔有人耕此山側望見鷄出遊戲有一長人操彈彈之鷄遙見便飛入穴彈丸正著穴上丸徑六尺許下垂蔽穴猶有門隙不復容人又有人乘船從下流還縣未至此崖數里一人通身黃衣檐兩籠黃紙求寄載因載之黃衣人乞食船主與之食訖船適至崖下船主乞瓜此人不與仍唾盤上徑下崖直入石中船主初甚忿之見其入石始知神異取食器視之見盤上唾悉是黃金又曰先儒說禹時天下兩金三日古詩曰安得天雨金使金賤如土周成王時咸陽雨金今咸陽有雨金原秦二世元年宮中雨金既而化為石漢惠帝二年宮中雨黃金黑錫又翁仲孺家貧力作居渭川一旦天雨金十斛於其家由是與王侯爭富今秦中有雨金翁世世富錄異傳曰隗炤者汝南陰鴻壽亭民善於易臨終書板授其妻曰吾死當大荒窮雖爾慎莫賣宅後到五年春當有詔使頓來此亭姓龔此人負吾金卿以此板往責之亡後果大困欲賣宅者數矣憶夫言輒止到期日有龔使者果至亭妻遂齎板往責使者使者執板不知所言曰我生平不踐此處何緣爾也沈吟良久謂曰賢夫何能妻曰夫善易而未曾為人卜使者曰可矣乃顧命侍者取蓍而筮之卦成謂炤妻曰吾不相負金賢夫自有金乃知亡後暫窮故藏金以待太平所以不告婦兒者恐金盡而困無已也知吾善易故書板以寄意耳金有五百斤盛以青缾覆以銅拌埋在堂屋東頭去壁一丈入在九尺妻還掘之皆如卜焉異物志曰狼㬻民與漢人交關嘗夜市以鼻嗅金知其好惡幽明錄, SBCK: 論}
