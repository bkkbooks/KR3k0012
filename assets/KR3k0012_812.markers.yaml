  - {type: variant, offset: 9, length: 5, content: 范蠡乘輕舟, SBCK: 卿爲豫章王時贈朕柘弓銀研卿頗憶不曰臣安敢忘之但恨爾日不得早識龍顔又後趙録曰太武殿室皆銀楹金柱後魏書曰銀出始興陽山縣又出桂陽陽安縣驪山有銀礦二石得銀七兩白登山亦有銀礦八石得銀七兩宣武帝詔並置銀宫每令探鑄又曰孝明皇帝開􅁪州銀山之禁與人共之又曰太武皇帝和平二年詔中尚坊作黄金合盤鏤}
  - {type: page-break, offset: 9, content: '', id: KR3k0012_SBCK_812-3a}
  - {type: variant, offset: 9, length: 5, content: 范蠡乘輕舟, WYG: 卿為豫章王時贈朕柘弓銀研卿頗憶不曰臣安敢忘之但恨爾時不得早識龍顔後趙録曰大武殿室皆錫楹金柱後魏書曰銀出始興陽山縣又出桂陽陽安縣驪山有銀礦二石得銀七兩白登山亦有銀礦百石得銀七兩宣武帝詔並置銀官每令探鑄又曰孝明皇帝開柏州銀山之禁與人共之又曰太武皇帝和平二年詔中尚坊作黄金合盤鏤}
