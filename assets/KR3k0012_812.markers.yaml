  - {type: variant, offset: 2263, length: 166, content: 上二十里名黃金潭上有瀨亦名黃金瀨古有釣於此潭獲一金鏁引之遂滿一船而有金牛出聲貌奔壯釣人波駭牛因奮躍還潭又云晉南頓王平新營一宅始移夢見一人云平輿令黃欲以一器金賂暴勝之為暴所戮埋金在吾上見鎮迮甚若君復築室無復入金明旦即鑿壁下入五尺果得金又曰譙縣城東因城為臺方二十丈高八尺一曰古之冡也魏武帝即築以為臺東面墻崩金玉流出取者多死因築復之又曰海, WYG: 獻詔水部郎婁前就公義禱乃聞空}
