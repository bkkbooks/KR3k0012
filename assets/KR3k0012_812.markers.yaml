  - {type: variant, offset: 2436, length: 0, content: '', WYG: 水銀廣雅曰水銀為之澒吳越春秋曰閶闔葬墓中澒地廣六丈神仙𫝊曰封君逹隴西人服錬水銀年百餘嵗常騎青牛鉛尚書禹貢曰海岱惟青州岱畎絲枲鉛松怪石宋記曰髙漸離秦始皇曤其目使撃筑漸離乃以鉛置筑中舉筑扑秦始皇帝漢書曰江都王建官人八子有通者輙令以鉛杵㫪不中程輙掠廣洲王去數召姬榮愛與飲后昭信譛之銷鉛灌其口中漢書曰或盗靡錢質而取鉛如淳曰或曰民盗靡漫而其鉛以更鑄作錢東觀漢記曰曹褒􅃦則抗鉛范子計然曰黒鉛之錯化成黄丹丹再化之成水粉淮南子曰鉛不可為刀又曰鉛之與丹異類殊色而可以為丹者誠得數也抱朴子曰愚民不信黄丹及葫粉是化鉛所作桓子新論曰淮南王之子聘迎道人作}
