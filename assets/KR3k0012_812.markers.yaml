  - {type: variant, offset: 5, length: 0, content: '', SBCK: 謂之銀其美者謂之鐐郭璞曰遼音也孝經援神契曰神靈滋液有銀甕不汲自滿史記封禪書曰殷得金德銀山溢蘇林注曰溢出又曰蓬萊方丈􅌡州此三神山黄金白銀爲宫闕又大宛傳曰安息國以銀爲錢錢如其王面王死輙更錢放王面焉又曰舜爲父母淘井將銀錢安鑵中與父母漢書曰王莽時珠堤銀重八兩一流直千五百八十張晏曰珠堤縣名屬揵爲出銀池銀一流直千是爲銀貨又西域傳曰無雷國出銀司馬彪續漢書曰大􅁗國以金錢爲錢十銀錢當一金錢魏志曰郭脩手刃蜀大將軍費禕追加襃寵謚曰威侯子龍加爵拜奉車都尉賜銀千餅魏武上雜物䟽曰御物中宫貴人公主皇子純銀􅃮帶鏡一枚西貴人純銀叅帶五皇子銀匣壹皇子􅄂用物十六種純金叅帶方嚴四具又曰御物及貴人公主皇子有純銀香爐也魏志曰穢國男女繫銀廣數寸以爲飾蜀志曰先主平蜀賜諸葛亮等銀千斤呉志曰孫皓時言掘地得銀長一寸廣一分刻上有年月於是改年爲天䇿又曰婁圭爲劉表所圍圭飮食徤兒數百人人賜銀一斤使擊表晉故事曰成帝咸康元年有司奏上元給賜衆官銀檢金部見銀一萬五千兩充給宋起居注曰廣州刺史韋朗鏤銀銘二枚齊書曰明帝每存儉約欲鑄壊太官元日上壽銀酒鎗尚書令王晏等咸稱盛德蕭頴胄曰朝廷盛禮莫過三元此一器旣是舊物不足侈帝不恱後預曲宴銀器滿席頴胄曰陛}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_812-1b}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_812-2a}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 謂之銀其美者謂之鐐郭璞曰遼音也孝經援神契曰神靈滋液有銀甕不汲自滿史記封禪書曰殷得金徳銀山溢蘇林注曰溢出又曰蓬萊方丈瀛洲此三神山黄金白銀為宫闕太史傳曰安息國以銀為銀錢如其王面王死輙更錢效王面焉又曰舜為父母淘井將銀錢安罐中與父母漢書曰王莾時珠提銀重八兩一流直千五百八十張晏日珠提縣名萬揵為出銀池銀一流直千是為銀貨西域傳曰無雷國出銀司馬彪續漢書曰大秦國以金錢為錢十銀錢當一金錢魏志曰郭修手刅蜀大將軍費禕追加褒寵謚曰威侯子龍加封拜奉軍都尉賜銀千餅魏武上雜物疏曰御物中宫貴人公主皇子純銀漆帶鏡一枚西貴人純銀叅帶五皇子銀匣一皇子雜用物十六種純金叅帶方嚴四具又曰御物及貴人公子皇子有純銀香爐也魏志曰穢國男女繫銀廣數寸以為餙蜀志曰先主平蜀賜諸葛亮等銀千斤吳志曰孫皓時言掘地得銀長一寸廣一分刻上有年月於是改年為天䇿又曰婁圭為劉表所圍圭飲食健兒數百人人賜銀一斤使繋表晉故事曰成帝咸康元年有司奏上元給賜衆官銀檢金部見銀一萬五千兩充給宋起居注曰廣州刺史韋􅍢銀鉿二板齊書曰明帝每有儉約欲鑄壊大官元日上夀銀酒鎗尚書令王宴等咸稱盛徳蕭頴胄曰朝廷盛禮莫過三元此一品既是舊物不足侈帝不恱後預曲宴銀器滿席頴胄曰陛}
