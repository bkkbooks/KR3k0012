  - {type: variant, offset: 2739, length: 242, content: 魏少公聞卿廬江樂來遊今病不能前翼迎歸養之有金十餅素二十疋既死翼賣素買棺衣衾以金置棺下騎馬出入後其兄長公見馬告之吏捕翼翼具言棺下得金長公叩頭謝以金十餅投其門翼送長安還之邴原別傳曰邴原字根矩以喪亂方熾遂往遼東時同郡劉舉亦在遼太守公孫度掩捕其家而舉得免窘逼歸原東萊太守太史子義素有義原以舉付之舉臨去以其手所杖劍金三餅與原原受金辭劍還謂度曰將軍平日與舉無郄而欲殺之者但恐其為蜂蠆耳令舉以去若以拘閉其家毒螫必滋甚矣度即出舉家原以金還之茅君內傳曰漢帝及王莽獻金鍾之屬今埋在小茅山上又曰取鈆十斤著鐵, WYG: 鐡}
