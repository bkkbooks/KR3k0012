  - {type: variant, offset: 4, length: 0, content: '', WYG: 銀黄銀水銀鉛錫銀周禮夏官下曰正南曰荆州其利丹銀爾雅曰白}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_WYG_812-1b, image: WYG0900/WYG0900-0197d.png}
