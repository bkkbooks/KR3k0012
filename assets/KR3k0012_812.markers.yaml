  - {type: variant, offset: 2432, length: 3, content: 臺臺內, WYG: 石絲竹之響唐書曰太宗嘗賜房𤣥齡黄銀帶顧謂曰昔如晦與公同心輔朕今日所賜惟獨見公因泫然流涕又曰如聞黄銀多為鬼神所命取黄金帶遣𤣥齡親送于靈所也水銀史記曰秦始王葬以水銀為百川江河大海機轉相輸終而復始皇覧曰關東賊發始皇墓中}
