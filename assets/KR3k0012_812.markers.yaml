  - {type: variant, offset: 809, length: 373, content: 王賜金百斤申鳴曰何面目見天下遂自殺新序曰齊桓公見麥丘邑人問之曰年幾何對曰八十矣曰以子之壽祝寡人乎曰使主君甚壽金玉是賤以人為寶又曰公孫敖問伯象先生曰今先生收天下之術愽觀四方之久矣未能裨世主之治明君臣之義是則未有異於府庫之藏金玉筐之囊間有書又曰郭隗語燕昭王曰古之人君有以千金求千里馬已死買骨五百金不能朞年千里馬至者二論衡曰盧江民小男曰陳爵陳挺相與浴於湖崖有酒樽色正黃沒水中爵以為銅涉水取之重不能舉挺往助之樽更為沉盤動入深淵中挺爵留顧見如錢等正黃數百千枚即共棳樚各得滿手歸示其家乃黃金也論衡曰眾口鑠金者五行二曰火五事二曰言言與火宜故云鑠金風俗通曰眾口鑠金俗說有美金此眾人咸共詆庛言其不純賣金者欲其售因取鍜燒以見真此為眾口鑠金又曰漢書說王陽好車馬衣服及遷徙所載不過囊衣俗傳王陽能作黃金語曰金不可作世不可度王陽居食祿雖為潔白車馬衣服亦能幾何何足推之乃傳俗語, SBCK: ''}
