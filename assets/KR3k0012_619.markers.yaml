  - {type: variant, offset: 1558, length: 0, content: '', SBCK: 耳目猶聦明乃}
  - {type: variant, offset: 1558, length: 0, content: '', WYG: 耳目猶聰明乃}
  - {type: variant, offset: 1559, length: 0, content: '', SBCK: 冩細書復成三二年卷滿數十篋後魏書曰穆子容少好學無所不覽求天下書逢即冩録所得萬餘卷三國典略曰郎基字丗業中山新市人魯郡太守智之孫也泛涉墳籍清愼無所營求甞語人云任官之所木枕亦不湏作况重於此乎唯頗令人冩書樊子蓋曽遺之書曰在官冩書亦是風流罪過基荅曰觀過知仁斯亦可矣梁書曰􅀽峻字孝髙早􅀌志篤好學家貧無書從假借必皆抄冩}
  - {type: variant, offset: 1559, length: 0, content: '', WYG: 寫細書復成三二千卷滿數十箱後魏書曰穆子容少好學無所不覽求天下書逢即寫録所得萬餘卷三國典略曰郎基字世業中山新市人魯郡太守智之孫也泛渉墳籍清慎無所營求嘗語人曰任官之所木枕亦不須作况重於此乎唯頗令人寫書樊子葢曽遺之書曰在官寫書亦是風流罪過基答曰觀過知仁斯亦可矣梁書曰袁峻字孝髙早孤篤志好學家貧無書從人假借必皆抄寫}
