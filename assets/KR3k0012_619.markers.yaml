  - {type: variant, offset: 1570, length: 5, content: 鄭默字思元, SBCK: 張華無餘財唯文史溢几篋徙居載書三十車也焚書史記曰秦始皇二十二年令天下敢有藏詩書百家語者悉詣守尉燒之下三十日不燒黥爲城旦所不禁醫藥卜筮種樹之書耳風俗通曰董卓盪覆王室天子西移所載書七十車遇􅀨道難分半投弃即於處燒燔麋爲􅁅穢淮南子曰王壽􅀒書而行見徐慿曰事者應變而動書者言之所出智不籍書王壽乃焚其書而舞也三國典略曰􅀄侯景來旣送東宫妓女尚有數百人景乃分給軍士夜於宫中置酒奏樂忽聞火}
