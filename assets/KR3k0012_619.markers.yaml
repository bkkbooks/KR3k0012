  - {type: variant, offset: 799, length: 84, content: 劉德治淮南王獄得枕中鴻寶祕書及其子向咸共奇之信黃白之術可成謂神仙之道可致卒亦無驗乃以罹罪又曰太古書今見存者有神農山海經山海經或云禹所作素問黃帝作連山歸藏夏所之書周時曰易, krp: ''}
  - {type: variant, offset: 800, length: 4, content: 德治淮南, WYG: 顯時稱學府毎共奐討論深相歎服乃執奐手曰昔伯喈墳素悉與仲宣吾當希彼蔡君足下無愧}
  - {type: variant, offset: 805, length: 1, content: 獄, WYG: 氏所保書籍尋以相付後魏書曰崔亮家貧傭書自業時隴西李冲當朝任事亮從兄光徃依之謂亮曰安能乆事筆硯而不徃托李氏也彼家饒書因可}
