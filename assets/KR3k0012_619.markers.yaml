  - {type: variant, offset: 329, length: 2, content: 簡脫, SBCK: 奏廣訪郡邑大加繕冩由是圖籍莫不審正又曰李暠署劉昞爲儒林􅀕酒從事中郎暠好尚文籍典史穿落者親自􅀘治昞時侍側前代暠暠曰躬自􅀘者欲人重此典籍隋書曰劉􅋑除殿内將軍時牛引奏請購求天下遺逸之書􅋑遂僞造書百卷題爲連山易魯史記等録上送官取賞而去後有人訟之經赦免死北史曰隋裴矩伐陳之役領元帥記室旣破丹陽晉王廣令矩與髙潁收陳圖籍又曰隋牛引上表請開獻書之路曰昔周德旣衰舊經紊弃孔子以大聖之才開素王之業憲章祖述制}
