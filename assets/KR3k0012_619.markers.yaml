  - {type: variant, offset: 359, length: 1, content: 諸, SBCK: 王莽之末並從焚燼此則書之二厄也光武嗣興尤重經誥未及下車先求文雅至肅宗親臨講肆和帝數幸書林其蘭臺石室鴻都東觀祕牒填委更倍於前及孝獻移都吏人擾亂圖書縑帛皆取爲帷囊所収而西裁七十餘乗屬西京大亂一時燔蕩此則書之三厄也魏文代漢更集經典祕書郎鄭黙刪定舊文時之論者美其朱紫有別晉氏承之文籍尤廣晉祕書監荀朂定魏内經更著新簿屬劉石慿陵從而失墜此則書之四厄也永嘉之後㓂竊競興其建國立家雖傳名号憲章禮樂寂滅無聞劉􅁉平姚􅇦收其圖籍五經}
  - {type: variant, offset: 359, length: 1, content: 諸, WYG: 王莽之末並從焚燼此則書之二厄也光武嗣興尤重經誥未及下車先求文雅肅宗親臨講肄和帝數幸書林其蘭臺石室鴻都東觀秘牒墳典更倍於前及孝獻移都吏民擾亂圖書縑帛皆取為帷嚢所收而西裁七十餘乗屬西京大亂一時燔蕩此則書之三厄也魏文代漢更集經典秘書郎鄭黙刪定舊文時之論者美其朱紫有别晉氏承之文籍尤廣晉秘書監荀朂定魏内經更著新簿屬劉石慿陵從而失墜此則書之四厄也永嘉之後冦竊競興其建國立家雖傳名號憲章禮樂寂滅無聞劉裕平姚泓收其圖籍五經}
