  - {type: variant, offset: 1540, length: 2, content: 詣東, SBCK: 同志逓剪髮以相活或傭力冩書行遇聖人之文無題記則以墨􅀞於掌内及股裏夜還更折竹冩之抱朴子自叙曰􅁑洪字稚川丹陽句容人也生爲二親所驕饒累遭火典籍蕩盡伐薪賣之給筆夜以冩書家貧乏紙所冩皆反覆有字人少能讀者桓譚新論曰余同時佐郎官有梁子􅀄􅀭子林好學所冩萬卷至於白首甞有所不曉百許􅀉余余}
