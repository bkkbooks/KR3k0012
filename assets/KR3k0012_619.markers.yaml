  - {type: variant, offset: 821, length: 3, content: 信黃白, WYG: 遂博覽羣書學無不綜北齊書曰劉晝少負笈從師服膺無勌恨下里少墳籍便䇿杖入都知太府少卿宋世良多書乃造焉世良納}
