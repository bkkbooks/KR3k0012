  - {type: punctuation, offset: 43, content: 、, id: KR3k0012_CHANT_619-bkkpn13}
  - {type: variant, offset: 45, length: 272, content: 之書謂之三墳言大道也少昊顓頊高辛唐虞之書謂之五典言常道也至于夏商周之書雖設教不倫雅誥奧義其歸一揆是故歷代寶之以為大訓八卦之說謂之八索求其義也九州之志謂之九丘丘聚也言九州所有土地所生風氣所宜皆聚此書也春秋左氏傳曰楚左史倚相能讀三墳五典八索九丘即謂上世帝王遺書也左氏傳曰晉荀躒如周籍談為介謂籍談曰昔高祖孫伯黶司晉之籍以為大政故曰籍氏汝司典之後何忘之漢書蓺文志曰昔仲尼沒而微言絕七十子終而大義乖故春秋分為五韋昭曰謂左氏羊穀梁鄒氏夾氏也詩分為四韋昭謂毛氏齊魯韓也易有數家之傳戰國從衡真偽分爭諸子之言紛然殽亂至秦患之乃燔滅文章以愚黔首漢興改秦之敗大收篇籍, SBCK: ''}
