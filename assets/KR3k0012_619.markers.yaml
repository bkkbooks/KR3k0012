  - {type: punctuation, offset: 595, content: 「, id: KR3k0012_CHANT_619-bkkpn211}
  - {type: variant, offset: 595, length: 2, content: 向朗, SBCK: 李權從秦宓借戰國䇿宓曰成湯大聖覩野漁而有獵逐之失定公賢者受女樂而弃朝事道家法曰不見可欲使心不亂是故君子先以懿文德也􅀶物志曰蔡邕有書萬卷漢末年載數車與王粲亡後相國􅁺魏諷謀及粲子預焉旣􅀍誅邕所與粲書悉入粲族子業王隱晉書曰齊王攸好學不倦借人書皆治護時以還之又曰皇甫謐表從武帝借書上送一車與之謐羸病手不釋卷歴觀古今無不皆綜先賢傳曰延篤從唐溪李度受左氏欲冩傳本無紙乃借夲誦及篤辭歸李度曰卿欲冩本何故辭歸荅曰巳誦之矣齊張率傳曰時陸少􅀇家有父澄書萬餘卷率與少􅀇善遂通書籍盡讀其書陳書曰孔奐}
  - {type: page-break, offset: 595, content: '', id: KR3k0012_SBCK_619-4a}
  - {type: variant, offset: 595, length: 6, content: 向朗字巨達潛, WYG: 李權從秦宓借戰國䇿宓曰成湯大聖覩野漁而有獵逐之失定公賢者受女樂而棄朝事道家法曰不見可欲使}
  - {type: variant, offset: 595, length: 6, content: 向朗字巨達潛, krp: 李權從秦宓借戰國䇿宓曰成湯大聖覩野漁而有獵逐之失定公賢者受女樂而弃朝事道家法曰不見可欲使}
  - {type: variant, offset: 598, length: 5, content: 巨達潛心典, SBCK: 休文山隂人好學經史百家莫不通渉沛國劉顯時稱學府每共奐討論深相歎乃執奐手曰昔伯喈墳素悉與仲宣吾當希彼蔡君足下無愧王氏所保書}
  - {type: punctuation, offset: 600, content: 。, id: KR3k0012_CHANT_619-bkkpn212}
  - {type: 'tls:seg', offset: 600, content: '', id: KR3k0012_CHANT_619-6a.9}
  - {type: variant, offset: 602, length: 22, content: 典籍積聚篇卷於時最多也後唐書曰李谿者博學多通, WYG: 不亂是以君子先以懿}
  - {type: variant, offset: 602, length: 22, content: 典籍積聚篇卷於時最多也後唐書曰李谿者博學多通, krp: 不亂是故君子先以懿}
  - {type: punctuation, offset: 604, content: ，, id: KR3k0012_CHANT_619-bkkpn213}
  - {type: 'tls:seg', offset: 604, content: '', id: KR3k0012_CHANT_619-6a.10}
  - {type: variant, offset: 604, length: 4, content: 積聚篇卷, SBCK: 㝷以相付後魏書曰崔亮家貧傭書自業時隴西李冲當朝任事亮從兄光往依之謂亮曰安能乆事筆硯而不往託李氏也彼家饒書因可得學亮曰弟妹飢寒豈可獨飽自可觀書}
  - {type: punctuation, offset: 608, content: ，, id: KR3k0012_CHANT_619-bkkpn214}
  - {type: 'tls:seg', offset: 608, content: '', id: KR3k0012_CHANT_619-6a.11}
  - {type: variant, offset: 609, length: 2, content: 時最, SBCK: 市安能看人眉睫乎後周書曰梁蔡文寳字敬仁甞以書干僕射徐勉大爲勉所賞異乃令與其子遊處所有墳籍盡以給之遂􅀶覽群書學無不綜北齊書曰劉晝少􅀒笈從師伏膺無勌恨下里少墳籍便杖䇿入都知太府少卿宗正丗良}
  - {type: page-break, offset: 609, content: '', id: KR3k0012_SBCK_619-4b}
  - {type: variant, offset: 612, length: 2, content: 也後, SBCK: 書乃造焉丗良納之恣意披覽晝夜不倦隋書曰盧思道字子行聦爽俊辯就魏收借異書數年之間才學兼著}
