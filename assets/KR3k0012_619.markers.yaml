  - {type: variant, offset: 625, length: 4, content: 章秀絕家, SBCK: 生累年在館唯閉户讀書舘司將加薦舉固辭左僕射房􅀇齡問其故對曰遭隋季亂離私門書籍蕩盡兾在舘披閱}
  - {type: variant, offset: 625, length: 169, content: 章秀絕家有奇書時號李書樓呂氏春秋曰先識覽桀將亡太史令終古執其圖書而奔于商紂將亡內史向摯載其圖法出奔周穆天子傳曰癸巳至于群玉之山容成氏之所守山阿平無隘四徹中繩言皆平直先王謂之策府言往古帝王以為藏策之府所謂藏之山者莊子曰孔子西藏書於周室藏其所著書於周者子路謀曰由聞周之徵藏史有老聃者徵藏藏名也免而歸居夫子欲藏書則當試焉孔子至老聃之門而老聃不許, WYG: 徳}
