  - {type: variant, offset: 1861, length: 0, content: '', krp: 官書讀之晝夜不出房經六年乃無所不通賜書後漢書曰東平王蒼傳明帝賜蒼以祕書列圖道術祕方又曰王景永平二年}
  - {type: variant, offset: 1862, length: 1, content: 非, krp: 修汴渠乃引見問景以理水景陳其利害應對敏捷帝善}
  - {type: punctuation, offset: 1864, content: 。, id: KR3k0012_CHANT_619-bkkpn652}
  - {type: 'tls:seg', offset: 1864, content: '', id: KR3k0012_CHANT_619-24a.14}
  - {type: variant, offset: 1864, length: 0, content: '', krp: 乃賜景山海經河渠書禹貢圖又曰章帝賜黃香淮南孟子各一本又曰班彪字叔皮㓜與從兄嗣共遊太學家有賜書内足}
  - {type: variant, offset: 1865, length: 6, content: 是異端鋒起師, krp: 財好}
  - {type: punctuation, offset: 1870, content: ，, id: KR3k0012_CHANT_619-bkkpn653}
  - {type: 'tls:seg', offset: 1870, content: '', id: KR3k0012_CHANT_619-24a.15}
  - {type: variant, offset: 1872, length: 0, content: '', krp: 之士自逺方來齊春秋曰蕭晉字元卿蘭陵人家有賜書志學不倦也陳書曰江揔字揔持㓜篤學有詞采家傳賜書數千卷緫㝷讀未甞釋手也唐書曰垂拱三年新羅王金政明遣使請禮記}
  - {type: variant, offset: 1873, length: 0, content: '', krp: 部并新文章令所司冩吉凶禮禮并於文舘詞林掎其詞渉規誡者勒成五十卷賜之又曰開元十九年命有司冩毛詩禮記左傳文選各}
  - {type: variant, offset: 1874, length: 7, content: 辯荅取晉宋古本, krp: 部以賜金城公主從其請也冩書王子年拾遺記曰張儀蘇秦二人同志逓剪髮}
  - {type: punctuation, offset: 1876, content: ，, id: KR3k0012_CHANT_619-bkkpn654}
  - {type: 'tls:seg', offset: 1876, content: '', id: KR3k0012_CHANT_619-24a.16}
  - {type: variant, offset: 1883, length: 1, content: 發, krp: 活或傭力冩書行遇聖人之文無題記則以墨畫於掌内及股裏夜還更折竹冩之抱朴子自叙曰葛洪字稚川丹陽句容人也生爲二親所驕饒累遭火典籍蕩盡伐薪賣之給筆夜以冩書家貧乏紙所冩皆反覆有字人少能讀者桓譚新論曰余同時佐郎官有梁子𥘉揚子林好學所冩萬卷至於白首甞有所不曉百許寄余余觀其事皆略可見蕭子顯齊書曰隱士沈驎士火燒書數千卷驎士年過八十耳目猶聦}
  - {type: punctuation, offset: 1885, content: ，, id: KR3k0012_CHANT_619-bkkpn655}
  - {type: 'tls:seg', offset: 1885, content: '', id: KR3k0012_CHANT_619-24a.17}
  - {type: variant, offset: 1885, length: 0, content: '', krp: 乃手冩細書復成三二年卷滿數十篋後魏書曰穆子容少好學無}
  - {type: variant, offset: 1886, length: 5, content: 立授明據或, krp: 不覽求天下書逢即冩録所得萬餘卷三國典略曰郎基字丗業中山新市人魯郡太守智之孫也泛涉墳籍清愼無所營求甞語人云任官之所木枕亦不湏作况重於此乎唯頗令人冩書樊子蓋曽遺之書曰在官冩書亦是風流罪過基荅曰觀過知仁斯亦可矣梁書曰袁峻字孝髙早孤志篤好學家貧無書從假借必皆抄冩自課日五十紙紙數不登則不止後周書曰裴漢借人異書必躬自録本至於疾疹弥年亦未甞釋卷載書負書附史記曰蘇秦說秦王書十上而說不行去秦而歸負書擔橐形容枯槁續漢書曰李固爲三公子躬歩以驢負書從師墨子曰墨子南使衛載書甚多強唐子見而恠之對曰昔周公曰朝讀書夕見七十二士相天下猶如此吾安敢廢此也晉書曰張華無餘財唯文史溢几篋徙居載書三十車也焚書史記曰秦始皇二十二年令天下敢有藏詩書百家語者悉詣守尉燒之下三十日不燒黥爲城旦所不禁醫藥卜筮種樹之書耳風俗通曰董卓盪覆王室天子西移所載書七十車遇雨道難分半投弃即於處燒燔麋爲灰穢淮南子曰王壽負書而行見徐慿曰事者應變而動書者言之所}
