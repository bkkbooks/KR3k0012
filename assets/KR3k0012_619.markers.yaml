  - {type: variant, offset: 361, length: 2, content: 傳說, SBCK: 史􅂊四千卷}
  - {type: variant, offset: 361, length: 1, content: 傳, WYG: 史纔四千卷皆赤軸青紙文字古拙並歸江左宋祕書丞王儉依劉氏七略撰為七志梁人阮孝緒亦為七録縂其書數三萬餘卷及侯景渡江壊破梁室秘省經籍雖從兵火其文徳殿内書史及公私典籍重本尚有七萬餘卷悉送荆州及周師入郢繹悉焚之於外城所収十纔一二此則書之五厄也後魏爰自幽方遷宅伊洛日不暇給經籍闕如周氏創基關右戎車未息保定之始書止八千後加收集方盈萬卷髙氏據有山東初亦採訪驗其本目殘闕猶多及東夏初平獲其經史四部重雜三萬餘卷所益舊書五千而已今御書單本一萬五千餘卷部帙之間仍有殘缺比梁之舊目止有其半至於隂陽河洛之篇醫方圖譜之}
