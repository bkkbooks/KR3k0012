  - {type: variant, offset: 1562, length: 4, content: 刊定謬誤, SBCK: 曰裴漢借人異書必躬自録本至於疾疹弥年亦未甞釋卷載書負書附史記曰􅂫秦􅀃秦王書十上而􅀃不行去秦而歸􅀒書擔橐形容枯槁續漢書曰李固爲三公子躬歩以驢􅀒書從師墨子曰墨子南使衛載書甚多強唐子見而恠之對曰昔周公曰朝讀書夕見七十二士相天下猶如此吾安敢廢此}
  - {type: variant, offset: 1562, length: 4, content: 刊定謬誤, WYG: 曰裴漢借人異書必躬自録本至於疾彌年亦未嘗釋卷載書負書附史記曰蘇秦說秦王書十上而說不行去秦而歸負書擔槖形容枯槁續漢書曰李固為公子躬步以驢負書從師墨子曰墨子南使衛載書甚多強唐子建而怪之對曰昔周公曰朝讀書夕見七十二士相天下猶如此吾安敢廢此}
