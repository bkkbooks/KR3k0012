  - {type: variant, offset: 1621, length: 1, content: 刊, krp: 不釋卷歴觀古今無不皆綜先賢傳曰延篤從唐溪李度受左氏欲冩傳本無紙乃借夲誦及篤辭歸李度曰卿欲冩本何故辭歸荅曰巳誦之矣齊張率傳曰時陸少玄家有父澄書萬餘卷率與少玄善遂通書籍盡讀}
  - {type: variant, offset: 1623, length: 2, content: 繆然, krp: 書陳書曰孔奐字休文山隂人好學經史百家莫不通渉沛國劉顯時稱學府每共奐討論深相歎乃執奐手曰昔伯喈墳素悉與仲宣吾當希彼蔡君足下無愧王氏所保書籍㝷以相付}
