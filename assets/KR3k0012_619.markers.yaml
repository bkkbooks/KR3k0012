  - {type: variant, offset: 799, length: 0, content: '', WYG: 蔡邕有書萬卷漢末年載數車與王粲粲亡後相國掾魏諷謀反粲子預焉既被誅邕所與粲書悉入粲族子葉王隠晉書曰齊王攸好學不倦借人書必手刋其謬然後還之又曰皇甫謐表從武帝借書上送一車與之謐羸病手不釋卷歴觀古今無不皆綜先賢傳曰延篤從唐季度受左氏欲寫傳本無紙乃借本誦及之辭歸季度曰卿言寫本何故辭歸荅曰已誦之矣齊張率傳曰時陸少𤣥家有父澄書萬餘卷率與少𤣥善遂通書籍盡讀其書陳書曰孔奐字休文山隂人好學經史百家莫不通渉沛國}
  - {type: page-break, offset: 799, content: '', id: KR3k0012_WYG_619-6a, image: WYG0898/WYG0898-0578c.png}
