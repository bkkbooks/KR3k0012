  - {type: variant, offset: 1842, length: 0, content: '', krp: 問其故對曰遭隋季亂離私門書籍蕩盡兾在舘披閱有所成耳又曰中書令李敬玄亳州譙人也博覽群書特善三禮𥘉上在東宫馬周啓薦之召入崇賢舘兼預侍讀仍借御書令讀之又曰陽城字元宗北平人也代爲官族家貧不能得書乃求爲}
  - {type: variant, offset: 1843, length: 17, content: 諸儒討論得失時諸儒習師說舛謬已久皆, krp: 賢冩書吏}
