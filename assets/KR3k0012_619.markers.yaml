  - {type: variant, offset: 1049, length: 432, content: 極精細又曰吾今年四十六歲聚書來四十年得書八萬卷也河間之侔漢室頗謂過之也此金樓子自稱也正謬誤劉向別傳曰讎校者一人持本一人讀析若怨家相對故曰讎也左傳曰晉師閏月濟于陰板杜預注云長曆推之此年無閏月疑為門五日五字上與門合也呂氏春秋曰有讀史者晉師三家涉河子夏曰非也是已亥也夫已之與三相近豕之與亥相似至問而問之則曰晉師已亥涉河也漢書蓺文志曰成帝詔光祿大夫劉向言經傳諸子詩賦步兵校尉任宏校兵書太史令尹咸校術數侍醫李柱國校方技每一書已師古曰已畢也向輒條其篇目撮其指意錄而奏之會向卒哀帝復使向子奉車都尉歆卒父業歆於是總群書而奏其七略故有輯略師古曰輯與集同謂諸書之總要有六蓺略師古曰六蓺六經有諸子略有詩賦略有兵書略有術數略有方技略抱朴子曰書三寫以魯為胄以帝為虎劉向七略曰古文或誤以見為典以陶為陰如此類多穎容春秋例曰漢興愽物洽聞者述之士前有司馬遷揚雄劉歆後有鄭眾賈逵班固近即馬融鄭玄其所著作違義正者遷尤多闕略舉一兩事以言之史記不識畢公文王之子而言與周同姓揚雄著法言不識六十四卦云所從來尚矣, SBCK: ''}
