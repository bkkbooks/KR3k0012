  - {type: variant, offset: 14, length: 3, content: 源泉行, SBCK: 亦招致士厚遇之至食客三千人是時諸侯多辯士如荀卿之徒著書布天下不韋乃使其客人人著其聞集論曰吕氏春秋又曰單父人吕公善沛令避仇從之客因家沛焉沛中豪傑吏聞令有客皆徃賀蕭何爲主吏孟康曰主吏功曹也主進文潁曰主歛禮進諸大夫曰不滿千錢坐之堂下髙祖爲亭長素易諸吏乃紿爲謁曰賀錢萬實不持一錢又曰司馬相如字長卿素與臨卭令王􅁻善􅁻曰長卿乆客旅遊不遂可來過我舎於是相如後往臨卭中富人卓王孫程鄭相謂曰令有貴客爲具召之戰國䇿曰汙明見春申君􅀱間三月而後得見談卒春申君大􅀃之汙明欲復談春申君曰僕己知先生悉矣汙明􅁣然曰臣請爲􅀃之君之賢實不如堯臣之能不及舜夫以賢舜事聖堯三年而後乃相知也今君一旦而知臣是君聖於堯而臣賢於舜也春申君曰善乃召門吏爲先生著客籍五日一見漢書曰蒯通見曹相國曰婦人有夫死三日而嫁者有幽居守寡不嫁者足下即欲求婦何取曰取不嫁者通曰然則求臣亦猶是也彼東郭先生梁石君齊之俊士也隱居不嫁未甞卑節下意以求仕也願足下使人禮之曹相國曰敬受命以爲上客又曰公孫弘徒歩數年至宰相封侯於是起客館開東閣以延賢人與叅謀議弘身食一肉脫粟之飯故人賔客仰衣食奉禄皆以給之家無所餘其後李蔡與石慶爲丞相府客館丘墟而己又曰􅂫建甞責大將軍至尊重天下之賢士大夫無稱焉願將軍觀古名將所招選者勉之哉青謝曰自魏其武安之厚賔客天子常切齒彼親待士大夫招黜賢不肖者人主之柄也人臣奉法遵職而己何與招士又曰大將軍旣益尊姉爲皇后然汲黯與抗禮或􅀃黯自天子欲群臣下大將軍大將軍尊貴誠重君不}
