  - {type: variant, offset: 467, length: 5, content: 於五服五服, SBCK: 時始與汲黯列爲九卿中廢賔客益少當時死家亡餘財先是下邳翟公爲廷尉賔客亦填門及廢門外可設雀羅後復爲廷尉賔客欲往翟公大署其門曰一死一一生乃知交情一貧一冨乃知交態一貴一賤交情廼見又曰陳遵􅄝酒毎大飲賔客滿堂輙関門取客車轄投井中雖有急終}
