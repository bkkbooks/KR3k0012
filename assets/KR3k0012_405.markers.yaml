  - {type: variant, offset: 474, length: 580, content: 不親又文王世子曰師也者教之以事而喻諸德者也左傳襄六曰鄭人游于鄉校鄭人之學校以論執政論政得失然明謂子產毀鄉校如何患人於中謗議國政子產曰其所善者吾則行之其所惡者吾則改之是吾師也若何毀之穀梁傳昭公曰子既生不免乎水火母之罪也成童不就師傅父之罪也就師學問無方心老不通師之罪也論語為政曰溫故而知新可以為師矣又述而曰三人行必有我師焉孔叢子曰子思居魯穆公師而尊之春秋後語曰甘羅請張唐相燕呂不韋叱曰我自請不行汝安能行之甘羅曰夫項橐七歲為孔子師今臣十二歲矣曰君其試臣何遽叱乎史記曰孔子既沒弟子思慕有若狀似孔子弟子相與立為師師之如夫子時又曰曹參為齊相乃避正堂舍蓋公而師之齊果大治又曰鄒子如燕昭王擁篲先驅請列弟子之座而受業築碣石宮身往親師之又曰文王為西伯鬻熊者為文王師有功於文王及武王滅殷未之封也成王學勤事之後封其曾孫熊繹為楚子漢書曰初梁相禇大通五經為博士時倪寬為弟子及御史大夫缺徵禇大夫自以為得御史大夫至雒陽聞倪寬為之禇大笑乃至與寬議封禪於上前大不能及退而服曰上誠知人也又曰龔勝既歸鄉里二千石長吏初到官皆至其家如師弟子之禮又曰嚴彭祖字公子東海下邳人與顏安樂俱事眭孟弟子百餘人唯彭祖安樂為明質問疑誼各持所見孟曰春秋之意在二子矣孟死彭祖安樂各顓門教授又曰竇皇后兄弟長君少君絳侯灌將軍等曰吾屬命乃懸兩人此兩人所出微不可不為擇師傳於是乃選長者之有行者與居長君少君由此為退讓君子不敢以富貴驕人, SBCK: 去}
