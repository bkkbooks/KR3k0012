  - {type: variant, offset: 3321, length: 153, content: 雍丘人也少受春秋於少府丁子然以節操稱建武二十八年趙孝王聞其名遣大夫齎玉帛聘望為師不受邴原別傳曰原舊能飲酒自行後八九年間酒不向口單行負笈苦身持力至陳留則師韓子助潁川宗陳仲躬涿郡則盧子幹臨歸師友以原不飲酒會米肉送原原曰本能飲酒但以荒思廢業故斷之耳今當遠別因見況餞可以一飲讌於是每坐飲終日不醉太史公素王妙論曰計然, WYG: ''}
