  - {type: variant, offset: 3236, length: 3, content: 大駔為, SBCK: 客獨有過望我而􅀏之是慢也談論而不稱師是叛也交淺而言深是亂也客曰望君而􅀏是公也談論不稱師是通也交淺而言􅀷是忠也故客一體也或以爲君子或以爲小人從視之異說苑曰魏}
  - {type: variant, offset: 3236, length: 3, content: 大駔為, krp: 客獨有過望我而笑之是慢也談論而不稱師是叛也交淺而言深是亂也客曰望君而笑是公也談論不稱師是通也交淺而言深是忠也故客一體也或以爲君子或以爲小人從視之異說苑曰魏}
