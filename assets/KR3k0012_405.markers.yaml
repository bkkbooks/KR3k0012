  - {type: variant, offset: 133, length: 319, content: 號不能傳乎後世尚書曰德無常師主善為師周禮地官下曰師氏掌以媺詔王告王以善道也文王世子曰師也者教之以事而喻諸德者也以三德教國子居虎門之左則司王朝掌國中得失之事以教國子弟凡國之貴遊子弟學焉大戴禮曰帝入太學承師問道禮記檀弓上曰事師無犯而無隱左右就養無方服勤至死心喪三年心喪戚容如父而無服也又學記曰君子知至學之難易而知其美惡然後能博喻能博喻然後能為師能為師然後能為長能為長然後能為君故師也者所以學為君也是故擇師不可不慎也記曰三王四代唯其師其此之謂乎凡學之嚴道師為難師嚴然後道尊道尊然後民知敬學是故君之所不臣於其臣者二當其為尸則弗臣也當其為師則弗臣也尸主也為祭主太學之禮雖詔於天子無北面所以尊師也善學者師逸而功倍又從而庸之不善學者師勤而功半又從而怨之, SBCK: 士}
