  - {type: variant, offset: 3797, length: 0, content: '', WYG: 之客獨}
  - {type: variant, offset: 3798, length: 0, content: '', WYG: 過望我而笑之是慢也談論而不稱}
  - {type: variant, offset: 3799, length: 0, content: '', WYG: 是叛也交淺而言深是亂也客曰望君而笑是公也談論不稱師是通也交淺而言深是忠也故客一體也或以爲君子或以爲小人從視之異説苑曰魏文侯與大夫飲酒使公乘不仁爲觴政曰飲不釂子曜切者浮以大白文侯飲不釂公乘不仁舉白浮君君視而不應侍者曰不仁退君已醉矣公乘不仁曰前車覆後車誡葢言其危爲人臣者不易爲君亦不易今君已設令令可不行}
  - {type: page-break, offset: 3799, content: '', id: KR3k0012_WYG_405-11a, image: WYG0896/WYG0896-0570c.png}
