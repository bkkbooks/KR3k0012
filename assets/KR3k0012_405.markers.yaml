  - {type: variant, offset: 2264, length: 963, content: 稍厚之裴景仁前秦記曰符堅幸太學問博士經典博士盧壺對曰周官禮注未有其師韋逞母宋傳其父業得周官音義自非此母無可授後堅於是就宋立講室書堂生徒百二十人隔綘紗幔而授業焉拜宋爵號宣文君賜侍婢十人崔鴻後秦錄曰初姚泓之為太子受經於太學博士淳于歧歧病在家泓以師者人之表範傳先聖之訓加在三之義不可以不重親詣省疾拜於床下又前燕錄曰劉讚字彥真乎原人也經學博通為世純儒真清非禮不動慕容廆重其德學使太子晃師事之又後趙錄曰張躍清河武城人也學敏才達雅善清談勤偉其儀辯拜世子衛軍長吏勑世子曰張長史人之表範汝其師之案世說或曰王趙鄧王參軍人倫師表爾其師之謂王安期鄧伯道趙禮之也唐書曰賀德仁越州山陰人少與從兄德基俱事國子祭酒周弘正咸以詞學見稱時人語曰學行可師賀德基文質彬彬賀德仁德仁仕陳至吳興王友入隋授豫章王府記室參軍王以師資禮之恩遇甚厚又曰員半千本名餘慶與彥先同師事學士王義方甚嘉重之嘗謂曰五百年生一賢足下當之矣因改名半千及義方卒半千與彥先皆制師服喪畢而去六韜曰文王卜田史扁布卜曰田于渭之陽將得焉非熊非罷非虎非狼天遺汝師以之佐昌文王乃齎戒三日田于渭陽卒見呂尚坐茅以漁文王再拜乃與之歸老子曰善人者不善人之師孫卿子曰干將莫耶鉅闕辟閭此皆古之良劍也然而不加砥礪則不能利不得人力則不能斷驊騮騏驥纖離綠耳此皆古之良馬也然而必前有衘轡之制後有鞭策之戚加之造父之御然後一日而致千里夫人雖有性質美而心辯智必將求賢師而事之擇良友而友之又曰國將興必尊師重傅尊師重傅則法度存師術有四傳習不與焉尊嚴而憚可以為師耆艾而信可以為師誦說不懈可以為師知微而論可以為師又曰夫達師之教也弟子安焉樂焉休焉遊焉肅焉嚴焉此六者得於學則邪僻之道塞焉此六者不得於學則君不能令於臣父不能令於子師不能令於徒鶡冠子曰伊尹酒保太公屠牛管子作革百里官奴海內荒辭立為世師莊子曰堯之師曰許由許由之師曰齧缺齧缺之師曰王倪王倪之師曰被衣又曰善卷堯聞其得道之士乃北面而師事之蒲衣八歲而舜之師又曰申屠嘉兀者也與鄭子產同師伯昏無人列子曰列子既師壺丘子林友伯昏瞀人反居南郭從之處者百數呂氏春秋魏文侯師子夏又曰神農師悉諸黃帝師大撓帝顓頊師伯夷父帝嚳師昭帝堯師子州支父帝舜師許由禹師大成摯湯師小臣文王武王師呂望周公旦齊桓公師管夷吾晉文公師咎犯隨會秦穆公師伯里奚公孫枝楚莊王師孫叔敖沈申吳王師伍子胥文之儀越王勾踐師范蠡此十聖六賢未見不尊師者也, SBCK: 復往}
