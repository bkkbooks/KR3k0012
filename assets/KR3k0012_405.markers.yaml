  - {type: variant, offset: 3475, length: 319, content: 蔡丘濮上人其先晉國公子也姓辛氏字文當南游越范蠡師事之楊子法言曰務學不如務求師師者人之模範也又曰一閧之市必立之平一卷之書必立之師又曰李仲元一世之師也見其貌者肅如也觀其行穆如也桓譚新論曰該言三歲學不如三歲擇師又曰昔殷之伊尹周之太公秦之百里奚雖咸有天才然皆年七十餘乃昇為王霸師論衡曰通書千篇以上萬卷已下敷暢壅閉審定文議而以教授為人師者通人也潛夫論曰天地之所貴者聖人聖人之所尚者德義德義之所成者智也智之所求者學問也雖有至聖不生而知雖有至智不生而能故志曰黃帝師風后顓頊師老彭帝嚳師融堯師務成舜師紀后禹師黑始湯師伊尹文武師姜尚周公師庶季孔子師老聃若此言之而信則人不可以不就師矣夫此十一君者皆上聖也猶待學問其智乃博其德乃碩而況於凡人乎符子曰玄冥子謂由有, WYG: 客出孚}
