  - {type: variant, offset: 3804, length: 0, content: '', WYG: 遠人不服修文徳以來之今論者不務道徳之術而唯當用武績雖童䝉竊所未安世說曰孫長樂兄弟就謝公宿言至厖雜大夫在壁後聽之具聞其論謝公明還問劉昨客何似劉荅曰亡兄未有如此賔客謝深有愧色郭子曰桓大司馬病篤桓温字元子也謝公省病謝安字安石也從東門入桓遥矚而歎曰}
