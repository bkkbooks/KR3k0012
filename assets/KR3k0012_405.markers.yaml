  - {type: variant, offset: 14, length: 3, content: 源泉行, WYG: 鄭鄭伯兼享之及享具五獻􅇼豆於幕下趙孟辭私於子産曰武請於冡宰矣乃用一獻趙孟為客禮終乃宴又昭六曰㑹于黄父謀王室也王室有子朝亂謀定之趙簡子令輸王粟具戍人明年將納王納王於王城也宋樂大心曰我不輸粟我於周為客二王後為賔客若之何使客史記曰孟嘗君名文姓田氏父曰靖郭君田嬰使主家待賔客賔客日進名聲聞於諸侯嬰卒文代立是為孟嘗君孟嘗君在薛招致賔客以故傾天下之士食客數千人無貴賤一與文等孟嘗君待客坐語而屏風後嘗有侍史主記君所與客語問親戚居處客去孟嘗君已使使存問獻遺其親戚孟嘗君曾侍客夜食有一人蔽火光客怒以飯不等輟食辭去孟嘗君起自持其飯比之客慙自刎士以此多歸孟嘗君客無所擇皆善遇之人人各自以爲孟嘗君親已又曰平原君趙勝者趙之諸公子也諸子中勝最賢喜賔客賔客盍至者數千人又曰魏公子無忌者魏昭王少子安釐王異母弟也公子爲人仁而下士士無賢不肖皆謙而禮交之士以此方數千里爭徃歸之致食客三千人當是時諸侯以公子賢多客不敢加兵謀魏十餘年又曰春申君者楚人也名歇姓黄氏考烈王元年以黄歇爲相是時齊有孟嘗趙有平原魏有信陵方爭下士招至賔客以相傾奪輔國權是時楚復疆趙平原君使人於春申君春申君舍之於上舍趙使欲誇楚爲瑇瑁簮刀劒室以珠玉餙之請命春申君客春申君客三千餘人其上客皆攝珠履以見趙使趙使大慚又曰呂不韋陽翟大賈人也秦太子政立爲王尊不韋爲相國是時魏有信陵君楚有春申君趙有平原君齊有孟嘗君皆下士喜賔客以相傾不韋以秦之强羞不如亦招致士厚遇之至食客三千人是時諸侯多辨士如荀卿之徒著書布天下不韋乃使其客人人著所聞集論曰吕氏春秋又曰單父人吕公善沛令避仇從之客因家沛焉沛中豪傑吏聞令有客皆徃賀蕭何爲主吏孟康曰主吏功曹也主進文頴曰主斂禮進諸大夫曰不滿千金坐之堂下髙祖爲亭長素易諸吏乃紿爲謁曰賀錢萬貫不持一錢又曰司馬相如字長卿素與臨卭令王吉善吉曰長卿久客旅遊不遂可来過我舍於是相如後徃臨卭中富人卓王孫程鄭相謂曰令有賔客爲具召之戰國䇿曰汗明見春申君候問三月而後得見談卒春申君大説之汗明欲復談春申君曰僕已知先生息矣汗明慨然曰臣請爲説之君之賢實不如堯臣之能不及舜夫以賢舜事聖堯三年而後乃相知也今君一旦而知臣是君聖於堯而臣賢於舜也春申君曰善乃召門吏爲先生著客籍五日一見漢書曰蒯通見曹相國曰婦人有夫死三日而嫁者有幽居守寡不嫁者足下即欲求婦何取曰取不嫁者通曰然則求臣亦猶是也彼東郭先生曰梁石君齊之俊士也隠居不嫁嘗卑節下意以求仕也願足下使人禮之曹相國曰敬受命以爲上客又曰公孫𢎞徒歩數年至宰相封侯於是起客館開東閣以延賢人與叅謀議𢎞身食一肉脫粟之飯故人賔客仰衣食奉禄皆以給之家無所餘其後李蔡與石慶爲丞相相府客館邱墟而已又曰蘇建嘗責大將軍至尊重天下之賢士大夫無稱焉願將軍觀古名將所招選者勉之哉青謝曰自魏其武安之厚賔客天子常切齒彼親附士大夫招賢黜不肖者人主之柄也人臣奉法尊職而已何與招士又曰大將軍既益尊姊爲皇后然汲黯與抗禮或説黯自天子欲群臣下大將軍大將軍尊貴誠重君不}
