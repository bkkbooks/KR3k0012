  - {type: variant, offset: 12, length: 1, content: 智, SBCK: 舜爲賔客禹爲主人于時卿雲聚俊乂集百工相和而歌卿雲尚書洪範曰三八政七曰賔禮賔客無不敬周禮天官上曰太宰之職以八統詔王八曰禮賔小宰以官府之六聮合􅀖治二曰賔客之聮事凡朝覲㑹同賔客以牢禮之法掌其牢禮委積又曰膳夫凢王􅀕祀賔客食則徹王之胙爼又春官大宗伯職曰以饗燕之禮親四方之賔客賔客朝聘者也禮記曲禮上曰凢與客入者毎門讓於客客至於寢門則主人請入爲席然後岀迎客客固辭主人肅客而入粛進也進謂導也主人入門而右客入門而左禮記王制曰天子諸侯無事則歳三田一爲乾豆二爲賔客左傳曰襄四曰季武子無適子公彌長而愛悼子欲立之誘於臧紇曰飲我酒吾爲子立之季氏飲大夫酒臧紇爲客爲上賔旣獻臧孫命北面重席新樽絜之召悼子降逆之又昭元曰趙孟叔孫豹曹大夫入于鄭鄭伯兼享之及享具五獻籩豆於幕下趙孟辭私於子産曰武請於􅃁宰矣乃用一獻趙孟爲客禮終乃宴又昭六曰㑹于黄父謀王室也王室有子朝亂謀定之趙簡子令輸王粟具戍人明年將納王納王於王城也宋樂大心曰我不輸粟我於周爲客二王後後爲賔客􅀂之何使客史記曰孟甞君名文姓田氏父曰靖郭君田嬰使主家待賔客賔客日進名聲聞於諸侯嬰卒文代立是爲孟甞君孟嘗君在薛招致賔客以故傾天下之士食客數千人無貴賤一與文等孟甞君待客坐語而屏風後甞有侍史主記君所與客語問親戚居處客去孟嘗君己使使存問獻遺其親戚孟甞君曽待客夜食有一人蔽火光客怒以飯不等輟食辭去孟甞君起自持其飯比之客慙自刎士以此多歸孟甞君客無所擇皆善遇之人人各自以爲孟甞君親己又曰平原君趙勝者趙之諸公子也諸子中勝最賢喜賔客賔客蓋至者數千人又曰魏公子母忌者魏昭王少子安􅁵王異母弟也公子爲人仁而下士士無賢不肖皆謙而禮交之士以此方數千里爭往歸之致食客三千人當是時諸侯以公子賢多客不敢加兵謀魏十餘年又曰春申君者楚人也名歇姓黄氏考烈王元年以黄歇爲相是時齊有孟甞趙有平原魏有信陵方爭下士招致賔客以相傾奪輔國權是時楚復彊趙平原君使人於春申君春申君舎之於上舎趙使欲夸楚爲瑇瑁簮刀劒室以珠玉飾之請命春申君客春申君客三千餘人其上客皆躡珠履以見趙使趙使大慙又曰吕不韋陽翟大賈人也􅁗太子政立爲王尊不韋爲相國是時魏有信陵君楚有春申君趙有平原君齊有孟甞君皆下士喜賔客以相傾不韋以􅁗之強羞不}
