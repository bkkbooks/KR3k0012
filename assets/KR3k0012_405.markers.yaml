  - {type: variant, offset: 3231, length: 4, content: 段干木晉, SBCK: 客有見人於孚子者客出孚子曰子}
  - {type: variant, offset: 3231, length: 89, content: 段干木晉之大駔為文侯師海內先賢傳曰仇覽字季智郭太齎剌從之曰暮求留宿明旦太下床朝之曰君非太友乃太師也荀氏家傳曰爽字慈明幼而歧嶷大學儒林咸歎服之年十二太尉杜喬師焉江微陳留志曰樓望字次, WYG: 客有見人於孚}
