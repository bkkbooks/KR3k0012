  - {type: variant, offset: 3621, length: 205, content: 已下敷暢壅閉審定文議而以教授為人師者通人也潛夫論曰天地之所貴者聖人聖人之所尚者德義德義之所成者智也智之所求者學問也雖有至聖不生而知雖有至智不生而能故志曰黃帝師風后顓頊師老彭帝嚳師融堯師務成舜師紀后禹師黑始湯師伊尹文武師姜尚周公師庶季孔子師老聃若此言之而信則人不可以不就師矣夫此十一君者皆上聖也猶待學問其智乃博其德乃碩而況於凡人乎符子曰玄冥子謂由有子曰子有師乎由有子曰吾將以萬物為師矣韋昭辯名曰古者稱師曰先生應璩, SBCK: 第四}
