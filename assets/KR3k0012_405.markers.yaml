  - {type: variant, offset: 3241, length: 0, content: '', SBCK: 與大夫飲酒使公乗不仁爲觴政曰飲不釂子曜切者浮以大白文侯飲而釂公乗不仁舉白浮君君視而不應侍者曰不仁退君己醉矣公乗不仁曰前車覆後車誡蓋言其危爲人臣者不易爲君亦不易今君己設令令可不行乎君曰善白而飲之以公乗不仁爲上客又曰燕昭王問於郭隗曰寡人地狹民寡齊人削取八城匈奴駈馳樓煩之下以􅀌之不肖得承宗廟恐亡社禝存之有道乎隗曰帝者之臣其名臣也其實友也覇者之臣其名臣也其實僕也危國之臣其名臣也其實虜也今王將東面目指氣使以求臣則厮役之臣至矣南面聽朝不失揖讓之禮求臣則人臣之臣至矣北面等禮相亢下之以色不乗􅀔以求臣則朋友之臣至矣西面拘指逡廵而退以求臣則}
