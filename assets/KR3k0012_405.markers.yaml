  - {type: variant, offset: 3800, length: 1, content: 由, WYG: 君曰善白而飲之以公乘不仁爲上客又曰燕昭王問於郭隗曰寡人地狹民寡齊人削取八城匈奴駈馳樓煩之下以孤之不肖得承宗廟恐亡社稷存之}
  - {type: page-break, offset: 3800, content: '', id: KR3k0012_WYG_405-11b, image: WYG0896/WYG0896-0570d.png}
  - {type: variant, offset: 3802, length: 0, content: '', WYG: 道乎隗曰帝者之臣其名臣也其實友也覇者之臣其名臣也其實僕也危國之臣其名臣也其實虜也今王将東面目指氣使以求臣則厮役之臣至矣南面聴朝不失揖讓之禮求臣則人臣之臣至矣北面等禮相亢下之以色不乘勢以求臣則朋友之臣至矣西面拘指逡廵而退以求臣則師傅之才至矣王誠欲興道隗請爲天下之士開路於是燕王常置郭隗爲上客三輔決録曰頻陽游殷字季齊初爲郡功曹有童子張旣者時未知名爲郡書佐殷察異之敕旣過家具設賔饌及旣至妻笑曰君甚悖乎張德容童昏小兒何異客哉殷曰卿勿怪乃方伯之器也殷遂與論霸王之事饗訖以子楚託之列士傳曰孟嘗君食客三千人厨有三列上客食肉中客食魚下客食菜齊市中有乞食人馮煖經冬無袴面有饑色願得上厨傳曰漢中楊子拒妻字大英子仲珎有髙名常請客母盛爲供具從忩中窺客罷讓之曰吾視汝所交皆不及已此自損之道也後嵗餘復請賔客皆耆德秀士母觀之喜曰無憂矣華陽國志曰任熈字伯遠開門待賔客朝無少長必有供膳陸績别傳曰孫䇿在吳張紘爲上客共論四海未安當用武治而平之績年少末座遥大聲言曰昔管仲相齊桓公九合諸侯一匡天下不用兵車孔}
