  - {type: variant, offset: 1638, length: 378, content: 體章帝即位出拜東郡元和二年東巡狩幸東郡引酺及門生并郡椽吏並會庭中帝先備弟子之儀使酺講尚書一篇然後修君臣之禮賞賜殊特續漢書曰李膺性簡亢無所交接唯以同郡荀淑陳寔為師友又曰楊政從代郡范升學升嘗為出婦所告坐繫獄政乃肉袒以箭貫耳抱升子潛伏道傍候車駕過泣涕辭請有感帝心詔曰乞楊生師即為放出升范曄後漢書曰歐陽歙字王思樂安千乘人為大司徒坐汝南贓罪千餘萬發覺下獄平原孔震年十七聞獄當斷馳之京師行到河內獲嘉縣自繫上書求代歙死曰伏見臣師大司徒歐陽歙為儒宗八世博士乞殺臣以代歙命書奏而歙已死獄中又曰鄭玄字康成北海高密人也事扶風馬融融門徒四百餘人升堂進者五十餘生融素驕貴玄在門下三年不得見乃使高業弟子傳授於玄日夜尋誦未嘗怠倦會融集諸生考論圖說聞玄善筭乃召見於樓上玄因從質諸疑義問畢辭歸融喟然謂諸門人曰鄭生今去吾道東矣又曰鍾皓字季明潁川長社人以篤行稱為士大夫所慕李膺常歎曰鍾君至德可師, SBCK: ''}
