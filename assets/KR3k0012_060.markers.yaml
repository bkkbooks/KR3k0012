  - {type: variant, offset: 6, length: 2, content: 下晏, SBCK: 黒而晦也廣雅同􅀃文曰海天池也書曰江漢朝宗于海禮記曰三王之祭川也皆先河而後海又曰洗之在阼其水在洗東祖天地之左海也禮斗威儀曰君乗土而王則海夷宋均注曰海夷不楊波論語曰}
  - {type: variant, offset: 6, length: 2, content: 下晏, WYG: 黑而晦也說文曰海天池也書曰江漢朝宗于海禮記曰三王之祭川也皆先河而後海又曰洗之在阼其水在洗東祖天地之左海也禮斗威儀曰君乗土而王則海夷海夷水不揚波也論語}
