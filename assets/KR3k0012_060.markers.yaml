  - {type: variant, offset: 587, length: 158, content: 合名曰不周有寒暑之水又曰譙明之山譙水出焉而西流注于河其中多河羅之魚一首而十身又曰少陽山酸水出焉東而流注于汾水其中多美赭管子曰上有赭下有鐵水經注曰鬱水即夜郎豚水也漢武帝時有竹王興於豚水有一女子浣於水濱有三節大竹流入女子間足推之不去聞有聲持破之得一男兒遂雄夷濮氏竹為姓所損破竹於野成林王祠竹林是也王嘗從人止大石上命作羹從, SBCK: 巳沃焦}
