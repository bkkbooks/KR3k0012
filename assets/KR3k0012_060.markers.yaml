  - {type: variant, offset: 1576, length: 806, content: 漢末零陵太守有女悅門下書佐使婢取盥手水飲之而有娠而生子至能行太守抱兒使求其父兒直上書佐膝書佐推之兒仆地為水三齊略記曰康浪水在齊城西南十五里康衢則甯戚扣牛角歌於此也述征記曰臨淄牛山下有女水齊人諺曰世治則女水流世亂則女水竭慕容超時乾涸彌載及宋武北征而激洪流續述征記曰梁鄒城西有籠水云齊孝婦誠感神明湧泉發於室內潛以績籠覆之由是無瓮汲之勞家人疑之時其出而搜其室試發此籠而泉遂涌流漂居宇故名曰籠水始興記曰林水源中有石室室前磬石上行羅千瓮中悉是餅銀採伐遇之不得取取必迷悶名山略記曰僧權道人居晉安霍山晨出澗忽見白水異常飲之甘如體水過甚迅器取得少許以餉陶晉安不復中飲權壽百三十歲不知其終盛弘之荊州記曰桂陽郡有圓水水一邊冷一邊暖冷處清且綠暖處白且濁隴右記曰武都紫水有泥其色亦紫而粘貢之用封璽書故詔誥有紫泥之美方輿記韶州曲江縣修仁水西南注連水北有三楓亭五渡水齊范雲為始興太守至修仁水酌而飲之賦詩曰三楓何習習五渡何悠悠且飲修仁水不挹偕邪流吳錄地理志曰天門零陵縣有溪水山獸從數十里往飲之越他水則不飲廣志曰弱水夫餘北其水不勝毛羽世無見者博物志曰水有濁有清河淮濁江濟清南陽有清冷之水丹水泉水汝南有黃水華山南有黑水天下之水皆類五色今載其名也泞水不流郡國志曰隆州析五縣置果州閬中有陰水其民銳氣而善舞也又曰湓水昔有人此處洗銅盆水暴漲失盆乃投水取盆見一龍銜盆奪之而去故曰湓水又曰庭州灞水滴滴若以金銀銅鐵器盛之皆漏唯瓠葉則不漏人掌中亦漏服之少臭毛落得仙論衡曰燧之取火於日方諸取露於月天地之間巧曆所不能與其數乎然以掌握之中引類於太極之上而水火可立致者陰陽固相動也異苑曰孫權赤烏八年遣校尉陳勳漕句容中道鑿破堽掘得一黑物無有首尾形如數百斛舡長數十丈蠢蠢而動有頃悉融液成汁時人莫能識得此之後獲泉源咸謂是水脈每至大旱餘瀆皆竭唯此巨流通焉水災書曰上天降災下昏民蟄又曰湯湯洪水方割湯湯流貌洪大割害也蕩蕩懷山襄陵浩浩滔天傳曰凡平原出水為大水史記曰秦武王三年渭水赤三日, SBCK: 楚}
