  - {type: variant, offset: 2465, length: 137, content: 續漢書五行志曰桓帝永興三年彭城泗水逆流永壽元年洛水溢至津城門漂流人物是時梁冀爭政嫉害忠直後遂誅滅獻帝建安二年漢水溢害人物是時天下大亂古今注曰安帝延平六年河東水化為血元初二年潁川襄城臨水化為血不流京房易曰君湎於酒淫於色賢人潛國家危厥異流水赤救水災史記曰堯命鯀治水九載績續用不成, SBCK: 遽食之甚美}
