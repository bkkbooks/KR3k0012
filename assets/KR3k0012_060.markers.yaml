  - {type: variant, offset: 746, length: 413, content: 白無水王以劍擊石出水今竹王水是也又曰趙人有琴高者以善鼓琴為康王舍人行彭涓之術遊浮碭郡間二百餘年後入碭水取龍子與弟子期期日皆潔齊待於水傍果乘赤鯉出入碭中有萬人觀之留月餘復入水也又曰姜水按世本炎帝姜姓帝王世紀曰炎帝神農氏姜母曰姒遊華陽感神而生炎帝長於姜水又曰昔沬水自蒙山至南安而溷崖水脈漂疾破害舟舡歷代為患蜀郡太守李冰發卒鑿平溷崖河神贔怒冰乃操刀入水與神鬥遂平溷崖通水路開處即水所穿也又曰黃水出零陽縣西北連巫山溪出雄黃頗有神異採之常以冬月祭祀鑿石深數丈方得佳黃故溪水取名焉又曰沁水南歷猗氏開又南與驫驫水合水出東北巨峻山乘高瀉浪觸石流響世人因聲以稱之又曰巴郡魚復縣夷水即佷山清江也水色清照十丈蜀人見其澄清因名清池也又曰溱水出浮石嶺北青衣山亦謂之青衣水也又曰廬山之北有石門水水出嶺端有雙石高竦其狀若門因有石門之目焉水導雙石之中懸流飛澍近三百許步下散漫十許步上望之連天若曳飛練於霄中矣又曰永昌郡有蘭倉水出西南博南縣漢明帝永平十二年置博南, SBCK: ''}
