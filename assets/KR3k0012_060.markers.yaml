  - {type: variant, offset: 2744, length: 2, content: 防救, WYG: 涉非唯下流大耶今汝衣服既盛顔色充盈天下且孰肯諫汝乎三十國春秋曰劉裕次山陽聞何無忌敗績卷甲兼行將濟江而風急衆咸難之裕曰若有天命風當自息如其天不助舟覆溺何足怪即命登舟移時風止董覽吳地記曰夫差時子胥以忠諌見怒遂賜死浮尸于江夫差悔焉與羣臣設祭于江列仙傳曰江妃二女遊于江濵逢鄭交甫遂解珮與之交甫受珮而去數十步懐中無珮女亦不見列女傳曰楚昭王貞姜者昭王夫人齊女也昭王出遊留夫人漸臺江水大至遣使者迎夫人忘持符夫人曰王與宫人約召必以符今使者不持符妾不敢行于是使者返取符未還臺已壊沈水而流又曰廣漢姜詩妻事姑至孝姑好飲江水水去家七里妻常鷄鳴泝流而汲值風雪不能得水詩責遣之妻寄食隣家紡績以市珍珠使隣母遺姑詩聞追還舍側忽有涌泉出味如江水華陽國志又載論衡曰儒書言伍子胥恨吳王驅水為濤而溺殺今㑹稽錢塘丹徒江皆立子胥祠欲止其濤也袁山松}
