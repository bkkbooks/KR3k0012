  - {type: variant, offset: 2744, length: 3, content: 防救宜, SBCK: 渉非唯下流大􅁘今汝衣服旣盛顔色充盈天下且孰肯諌汝乎三十國春秋曰劉􅁉次山陽聞何無忌敗績卷甲兼行將濟江而風急衆咸難之􅁉曰􅀂有天命風當自息如其天不助舟覆溺何足可怪即命登舟舟移而風止董覽呉地記曰夫差立子胥以忠諌見亡遂賜死浮尸于江夫差悔焉與群臣於江設􅀕列仙傳曰江妃二女遊於江濵逢鄭交甫遂解佩與交甫受珮而去去數十歩懷中無佩女亦不見列女傳曰楚昭王貞姜者昭王夫人齊女也昭王出遊留夫人漸臺江水大至遣使者迎夫人忘持符夫人曰王與宫人約召必以符今使者不持符妾不敢行於是使者返取符未還臺巳壞沉水而死又曰廣漢姜詩妻事姑至孝姑好飲江水水去家七里妻常鷄鳴泝流而汲值風雪不時得水詩責遣之妻􅀉隣家紡績以市珎味使隣母遺姑詩聞追還舎側忽有涌泉岀味如江水華陽國志又載論衡曰儒書言伍子胥恨吴王驅水爲濤而溺殺今㑹稽錢塘丹徒江皆立子胥祠欲止其濤也􅀽山松冝都記曰對西陵南岸有山其峯􅀌秀人自山南上至頂俯臨大江如縈帶視舟舡如鳬鴈又曰大江清濁分流其水十丈見底視魚游如乗空淺處多五色石新序曰禹南濟于江黄龍􅀒舟舟中之人失色禹仰視天而歎曰吾受命於天死生命也龍弭耳而逃呉録曰歩騭表言北降人􅀃北多作而囊欲以盛沙塞大江呉主曰此曹必不敢来􅀂不如􅀌言當以牛千頭爲君作主人後見吕岱􅀃騭言北欲以囊塞江輙失􅀏曰此江自開闢以來寜可以囊塞乎水經注曰昔呉郡太守張公直自九江守徴還道由廬山子女􅀚祠女戯廟像其妻夜夢神人致娉􅁴言於夫至明恐怖遽發舡引中流而不行妻曰愛一女而合門受禍也公直不忍遂}
