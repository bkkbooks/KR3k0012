  - {type: variant, offset: 2747, length: 0, content: '', WYG: 都記曰對西陵南岸有山其峯孤秀人自山南上至頂俯臨大江如縈帶視舟船如鳬鴈又曰大江清濁分流其水十丈見底視魚遊如乗空淺處多五色石新序曰禹南濟于江黄龍負舟舟中之人皆失色禹仰天而嘆曰吾受命于天死生命也龍俯首而逝吳紀曰步隲表言北降人說北人多作布囊欲盛沙塞大江吳王曰此曹必不敢來若不如孤言當以牛千頭為君作闕後見吕岱說隲言北欲以囊塞江輒笑曰此江自開闢以來寜可以囊塞乎水經註曰昔吳郡太守張公直自九江守徵還道由廬山子女觀祠女戲廟像其妻夜夢神人致聘覺言于夫至明恐怖遽𤼵船引中流而不行妻曰愛一女而闔門受禍也公直不忍遂}
