  - {type: variant, offset: 10, length: 0, content: '', WYG: 道不行乗桴浮於海公羊傳曰河海潤千里河海出雲及千里春秋感神符曰后妃恣則澤為海春秋考異郵曰黄星騁海水躍宋均曰黄星土精土主安静躍則失常史記曰天不足西北星辰西北移地不足東南以海為池也漢書曰霍去病擊匈奴封狼居胥山登臨瀚海如淳注日北海也謝承後漢書曰汝南陳茂嘗為交阯别駕舊刺史行部不渡漲海刺史周敞渉海遇風船欲覆沒茂抜劍訶罵水神風即止息晉書曰鮑靚為南海守嘗行部入海遇風飢甚聚白石煮食之以濟又曰李涓遼東人祖敏海溪河内太守去還鄉遼東太守公孫度欲强用之敏乘輕舟浮海莫知所終王隠晉書曰慕容皝上言曰臣躬征平郭逺假陛下天地之威將士竭命精誠感靈海為結氷凌行海中三百餘里臣自立國及問諸故老初無海水氷凍之嵗韓詩成王時越裳氏重三譯而朝天下不逆風不疾雨海之不波溢三年矣中國必有聖人老子曰江海所以能為百谷王者以其善下也列子曰渤海之東不知幾萬億里有大壑無底之谷名曰歸墟張堪註曰莊子云尾閭也莊子曰東海之鼈謂坎井之鼃曰夫海千里之逺不足以舉其大千仞之髙不足以極其深禹之時十年九潦而水弗加益湯之時八年七旱而涯不加損夫不為傾覆推移不以多少進退者此蓋東海之樂也又曰南海之帝為儵北海之帝為忽中央之帝為渾沌儵與忽時相與遇渾沌之帝渾沌待之甚厚儵與忽謀報渾沌之徳曰人皆有七竅以視聽食息此獨無有嘗試鑿之一日鑿一竅七日而渾沌死又曰接輿曰其于治天下也猶渉海鑿河而使蚊負山也又海水三嵗一周流波相薄故地動又曰周顧視車轍有鮒魚焉曰我東海之波臣也君豈有斗升之水活我哉又曰北㝠有魚其名為鯤化而為鳥其名曰鵬將徙于南溟水擊三千里又曰秋水時至百川灌河渚涯之間不辨牛馬河伯欣然自喜以天下之美為盡在已順流東行至于北海東面而視不見水端向若而歎北海若曰井蛙不可以語于海者拘于􅇕也夏蟲不可以語于氷者篤于時也曲士不可以語于道者束于教也天下之水莫大於海萬川歸之不知何時止而不盈尾閭泄之不知何時已而不虛春秋不變水旱不知此其過江河之流不可為量數司馬彪曰尾閭水之從海泄出者也文子曰古之善為君者法海以象其大注下以成其廣淮南子曰賁星墜而渤海決又曰海不讓水積水以成其大又曰庶女告天庶女少寡无子養姑者也姑無男有女女利母財而殺母以誣告寡婦不能自解故告天也雷霆下擊}
