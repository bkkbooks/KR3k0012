  - {type: variant, offset: 10, length: 0, content: '', SBCK: 道不行乗桴浮于海公羊傳曰河海潤千里河海出雲及千里春秋感神符曰后妃恣則澤爲海春秋考異郵曰黃星騁海水躍宋均曰黃星土精土安靜躍則失常史記曰天不足西北星辰西北移地不足東南以海爲池漢書曰霍去病擊匈奴封狼居胥山登臨瀚海如淳注曰北海也謝承後漢書曰汝南陳茂嘗爲交阯別駕舊刺史行部不渡漲海刺史周敞渉海遇風舡欲覆􅃿茂抜劒訶罵水神風即止息晉書鮑靚爲南海守嘗行部入海遇風飢甚聚白石煑食之以濟又曰李㳙遼東人祖敏漢河内太守去還郷遼東太守公孫度欲強用之敏乗輕舟浮海莫知所終王隱晉書曰慕容晃上言曰臣躬征平郭逺假陛下天地之威將士竭命精誠感靈海爲結氷凌行海中三百餘里臣自立國及諸故老初無海水氷凍之歳韓詩成王時越裳氏重三譯而朝曰天下不逆風疾􅀨海之不波溢三年矣中國必有聖人老子曰江海所以能爲百谷王者以其善下也列子曰渤海之東不知幾萬億里有大壑無底之谷名曰歸塘張堪注日莊子云尾閭也莊子曰東海之鼈謂坎井之鼁曰夫海千里之逺不足以舉其大千仞之髙不足以極其深禹之時九年十潦而水弗加益湯之時八年七旱而涯不加損夫不爲頃乆推移不以多少進退者此亦東海之樂也又曰南海之帝爲儵北海之帝爲忽中央之帝爲渾沌儵與忽時相與遇於渾沌之地渾沌待之甚厚儵與忽謀報渾沌之德曰人皆存七竅以視聽食息此獨無有嘗試鑿之一日鑿一竅七日而渾沌死又曰肩吾曰其於治天下也猶渉海鑿河使蛟􅀒山也又海水三歳一周流波相薄故地動又曰周顧視車轍有鮒魚焉曰我東海之波神也君豈有斗升之水活我哉又曰北溟有魚其名曰鯤化爲鳥其名曰鵬將徙於南溟撃水三千里又曰秋水時至百川灌河諸涯之間不辦牛馬河伯欣然自喜以天下之美爲盡在已順流東行至於北海東靣而視不見水端向􅀂而歎北海􅀂曰井蛙不可以語於海者拘於墟也夏虫不可以語於冰者篤於時也曲士不可以語於道者束於教也天下之水莫大於海萬川歸之不知何時止而不盈尾閭泄之不知何時巳而不虚春秋不變水旱不加此過江河之流不可爲量數司馬彪曰尾閭水之從海外岀者也丈子曰古之善爲君者法海以象其大注下以成其廣淮南子曰彗星墜而渤海決又曰海不讓水積小以成其大又曰庶女告天庶女少寡無子養姑者也姑無男有女女利母財而殺母以誣告寡婦婦不能自解故告天也雷霆下擊}
