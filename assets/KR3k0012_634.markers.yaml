  - {type: variant, offset: 6628, length: 0, content: '', SBCK: 濟北李登爲從事吏病得假歸家復移刺延斯後􅀍召登自嫌不甚羸瘦謂􅀟生弟寧曰我兄弟相似人不能別汝􅀋病者代我至府寧曰府君大嚴得無不可登曰我新吏耳無能覺者我自行見􅐷必死寧便詣府醫藥集􅐷有驗後爲人所言事發覺遂殺登丗􅀃曰車武子爲侍中與王東亭諸人期共遊集車早請急出過詣王子敬子敬于時宅在建陽門内道北車求去王問卿何以怱怱車荅云與東亭諸人期共行王曰卿何以乃作此不急行車遂不敢去盡急還臺又曰頋長康作殷州請假還東尔時例不給苦求之乃得又曰張敷爲宋臺祕書郎自彭城請假還東于時相國府有一叅軍督護亦請假武帝遣傳令語敷云可載之荅曰臣性不􅄂遂不載}
  - {type: page-break, offset: 6628, content: '', id: KR3k0012_SBCK_634-4b}
  - {type: variant, offset: 6628, length: 1, content: 俗, WYG: 濟北李登為從事史病得假歸家復移刺延斯後被召登自嫌不甚羸瘦謂雙生弟寕曰我兄弟相似人不能别汝類病者代我至府寕曰府君大嚴得無不可登曰我新吏耳無能覺者我自行見訴必死寕便詣府醫藥遂許之後為人所言事發覺遂殺登世}
  - {type: variant, offset: 6628, length: 0, content: '', krp: 濟北李登爲從事吏病得假歸家復移刺延斯後𬒳召登自嫌不甚羸瘦謂雙生弟寧曰我兄弟相似人不能別汝類病者代我至府寧曰府君大嚴得無不可登曰我新吏耳無能覺者我自行見侯必死寧便詣府醫藥集侯有驗後爲人所言事發覺遂殺登丗說曰車武子爲侍中與王東亭諸人期共遊集車早請急出過詣王子敬子敬于時宅在建陽門内道北車求去王問卿何以怱怱車荅云與東亭諸人期共行王曰卿何以乃作此不急行車遂不敢去盡急還臺又曰頋長康作殷州請假還東尔時例不給苦求之乃得又曰張敷爲宋臺祕書郎自彭城請假還東于時相國府有一叅軍督護亦請假武帝遣傳令語敷云可載之荅曰臣性不雜遂不載}
  - {type: substitution, offset: 6629, original: 說, replacement: 説, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19811}}
  - {type: variant, offset: 6630, length: 0, content: '', SBCK: 曰張邀在鼓城請假當歸東傳亮時爲宋臺侍中下舫中與張別張不起授兩手指着舫户外傳遂不執其手熟視張面云摣是梨中之不臧者便去陸機思歸賦序曰余牽役京室去家四載以元康六年冬取急歸而羌虜作亂王師外征機興憤而成篇范寗啓國子生假故事曰國學開建弥歷年載講誦之音靡聞考課之績不著良由導逹之訓未弘鑚仰之心弗至陵替文源冝見整正謂應断假精加督勵嚴其師訓舉善黜違啓断衆官受假故事曰伏見内外衆官陳假紛紜煩黷無巳舊}
