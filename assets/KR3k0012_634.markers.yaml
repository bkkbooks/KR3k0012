  - {type: variant, offset: 739, length: 1162, content: 曰用命賞于祖弗用命戮于社又曰罰弗及嗣賞延于世又曰功多有厚賞弗迪有顯戮史記曰紂囚西伯羑里西伯之臣閎夭之徒求美女奇物以獻紂紂乃赦西伯而賜弓矢斧鉞使得征伐又曰武王滅紂乃罷兵西歸封諸侯班賜宗彝作分殷之器物鄭玄曰宗彝宗廟彝樽也作分器著王之命及物也已於是封功臣謀士而師尚父為首封封尚父於營丘曰齊封弟周公旦於曲阜曰魯封召公奭於燕封弟叔鮮於管封叔度於蔡餘各以次受封又曰禹平水土已成帝錫玄珪禹受曰非予能成亦大費為輔帝舜曰咨爾費贊禹功其錫爾皂游音流爾後嗣將大出遂妻之姚姓之玉女皇甫謐曰賜之玄玉妻姚姓之女史記曰晉人請公賞從己者臣壺叔曰君三行賞賞不及臣敢請罪文公報曰夫導我以仁義防我以德惠此受上賞輔我以行事卒我以成立此受次賞矢石之難汗馬之勞此復次賞若以力事我而輔吾缺者此復受次賞三賞之後故及子晉人聞之皆說音悅又曰晉楚戰于城濮晉侯渡河北歸國行賞狐偃為首或曰城濮之事先軫之謀文公曰城濮之事偃說我毋失信先軫曰軍事勝為右吾用之以勝然此一時之說偃言萬世之功奈何以一時之利而加萬世之功乎是以先之又曰三國攻晉陽引汾水灌其城城不沒者三版城中懸釜而炊易子而食群臣皆有外心禮益慢唯高共一作赫不敢廢禮襄子懼乃夜使張孟同私於韓魏韓魏與合謀三月丙戍三國反滅智氏共分其地於是襄子行賞高共為上張孟同曰晉陽之難共無功襄子曰方晉陽急群臣皆懈唯共不敢失臣禮是以先之又曰漢五年已殺項羽定天下即皇帝位論功行封以蕭何功最盛封為酇侯列侯軍已受封奏位次皆曰平陽曹參身被七十創攻城略地功最多宜第一上已撓功臣多封蕭何至位次未有以復難之然心欲何第一關內侯鄂君進曰群臣議皆誤夫曹參雖有野戰略地之功此特一時之利耳夫上與楚相拒五歲嘗失軍亡眾逃身遁者數矣然蕭何常從關中遣軍補其處非上所詔令召而數萬眾會上之乏絕者數矣夫漢與楚相守滎陽數年軍無見糧蕭何轉漕關中給食不乏陛下雖亡山東蕭何尚全關中以待陛下此萬世之功也今雖亡曹參等百數何缺於漢漢得之不必待以全奈何欲以一旦之功而加萬世之功哉蕭何第一曹參次之高祖曰善於是乃令蕭何第一賜帶劍履上殿入朝不趍上曰吾聞進賢受上賞蕭何功雖高得鄂君乃益明於是因鄂君故食關內侯邑封為安平侯又曰項藉死天下定上置酒上折隋何之功謂何腐儒為天下安用腐儒隋何跪曰夫陛下引兵攻彭城楚王未去齊也陛下發步兵卒五萬人騎五千能以取淮南乎上曰不能隋何曰陛下使何與二十人使淮南至如陛下之意是何之功賢於步卒五萬騎五千也然而陛下謂何腐儒為天下安用腐儒何也上曰吾方圖子之功乃以隋何為護軍中尉又曰漢文帝初即位赦天下賜民爵一級女子百戶牛酒蘇林曰男子賜爵女子賜牛酒也皇帝曰呂產自置為相國呂祿為上將軍擅矯遣灌將軍嬰將兵擊齊欲伐劉氏嬰留滎陽弗擊與諸侯合謀以誅呂氏呂產欲為不善丞相陳平與太尉周勃謀奪呂產等將軍朱虛侯劉章首先捕呂產等太尉身率襄平侯通持節承詔入北典客劉揭身奪趙王呂祿益封太尉勃萬戶賜金五千斤丞相陳平灌將軍嬰邑各三千戶金, WYG: ''}
