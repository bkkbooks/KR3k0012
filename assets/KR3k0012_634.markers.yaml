  - {type: variant, offset: 3777, length: 77, content: 也與諸將士大夫共從戎事幸賴賢人不愛其謀群士不遺其力是以夷險平亂而吾得竊大賞戶邑三萬追思趙竇散金之義今分所受租與諸侯掾屬及故戍於陳蔡者庶以酬荅眾勞不擅大惠也, WYG: 刻薄如此}
