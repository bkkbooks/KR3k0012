  - {type: variant, offset: 6630, length: 2, content: 有功, WYG: 曰車武子為侍中與王東亭諸人期共逰集車早請急出過詣王子敬于時宅在建陽門内道北車求去王問卿何以怱怱車答曰與東亭諸人期共行王曰卿何以乃作此不急行車遂不敢去盡急還臺又曰顧長康作殷州請假還東爾時例不給苦求之乃}
