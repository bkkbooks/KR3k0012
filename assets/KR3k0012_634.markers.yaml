  - {type: variant, offset: 2624, length: 170, content: 果失火鄰里共救之幸而得息於是殺牛置酒謝其鄰人灼爛者在於上行餘各以功次不錄言曲突者人謂主人曰鄉使聽客之言不費牛酒終亡失火之患今論功而請賓曲突徙薪亡恩澤燋頭爛額為上客即主人乃寤而請之今茂陵徐福上書言霍氏且有變宜防絕之鄉使福說得行則國亡裂土出爵之費臣亡逆亂誅滅之敗往事既已而福不蒙其功唯陛下察之貴徙薪曲突之策使居焦髮灼爛之右上乃賜福帛千疋後以為郎, SBCK: 名昭逺近}
