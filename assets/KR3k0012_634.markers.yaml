  - {type: variant, offset: 4593, length: 264, content: 交友益親得季孫千鍾之賜以施於眾故交友日益親也自南宮敬叔之乘我車也而道加行孔子欲見老聃西觀周室敬叔言於魯君紿孔子車馬問禮於老子孔子歷郊廟自周而還弟子四方來集也故道雖貴必有時而後動德雖高必有勢而後行微夫二子之賜則丘之道殆於廢矣太公金匱曰賞一人而千人喜者賞之賞二人而萬人喜者賞之賞三人而三軍勸者賞之管子曰明賞不費明刑不暴賞罰明德之至也司馬法曰殷戮於市周賞於朝勸君子懼小人也鶡冠子曰進賢者受上賞則下不蔽善為政賞人不多而民喜罰人不多而民畏言賞罰中尹文子曰祿薄者不可以經亂賞輕者不可以入難此處上者所宜慎者也慎子曰孔子云有虞氏不賞不罰夏后氏賞, SBCK: 渡舡漏}
