  - {type: variant, offset: 2405, length: 156, content: 助貧窮獄無重囚而吏民鄉于教化可謂賢人君子矣書不云乎股肱良哉其賜霸爵關內侯黃金百斤秩中二千石而頴川孝悌有行義民三考力田皆以差賜爵及帛又曰初霍氏奢侈茂陵徐生曰霍氏必亡夫奢則不遜不遜必侮上侮上者逆道也在人之石眾必害之霍氏秉權日久眾欲害之而又行以逆道不士何待乃上䟽言霍氏太盛陛下即愛厚之宜此時抑制無使至亡書三上輒不報間其, SBCK: 病畢拜覲郷里􅂄老先進然}
