  - {type: variant, offset: 6493, length: 131, content: 將行賞襄曰君將賞其本乎賞其末乎賞其末則驕乘者存賞其本則臣聞之卻虎公召虎曰襄言所以勝鄴鄴既勝將賞之曰蓋聞之於子請賞子虎曰言之易行之難臣言之者也公曰子毋音無辭虎乃受凡行賞其博也則多助今虎非親言者也賞猶及此䟽遠者所以盡能竭智者也晉文亡久矣歸而因大亂之餘猶能以霸其用此歟, SBCK: 南旣造江渚欣然自得}
