  - {type: variant, offset: 2810, length: 599, content: 拜為議郎賜錢十萬使授太子每朝會輒令榮於公卿前敷奏經書帝稱善曰得生幾晚特加賞賜後榮入會廷中詔賜奇菓授者皆懷之榮獨手捧以拜帝笑之曰此真儒生也以是愈見敬厚常令上宿太子宮後拜太子少傅賜輜車乘馬榮大會諸生陳其車馬印綬曰今日所蒙稽古之力也可不勉乎又曰明帝初即位賜天下男子爵人二級漢書音義曰男子者謂戶內之長也商鞅為秦制爵二十級又賜爵者罪得贖貧者得賣與人乎三老孝悌力田人三級過公乘得移與子若同子產漢制賜爵自公士也不得上公乘故過者得移授也同產同母兄弟出及流人無名數欲自占者人一級無名數謂文薄也占謂自歸首又曰管陶公主為子求郎不許而賜錢千萬謂群臣曰郎官上應列宿出宰百里有非其人則人受其殃是以難之又曰永平中顯宗幸宛詔諸李隨安眾宗室會見並受賀賜恩寵篤焉又曰郭伋為并州牧過京師謝恩帝並召皇太子諸王讌語終日賞賜車馬衣服什物又曰肅宗納梁竦女為貴人生和帝竇皇后養以為子諸竇遂譖殺貴人而陷竦等死獄中家屬徙九具和帝立後貴人姊南陽樊調妻嫟於計切上書自訟曰妾同產女弟貴人前充後宮蒙先帝厚恩得見寵幸誕生聖明為竇憲兄弟所見譖訴使妾父竦冤死老母孤弟遠徙萬里今值陛下神聖之運親統萬機群物得所憲兄弟姦惡既伏辜誅妾乃敢昧死自陳所丐帝覽章感悟乃下掖庭令驗問之嫟辭證明審遂得引見具陳其狀乃留嫟止宮中連月乃出賞賜衣被錢帛第宅旬月之間累貲千萬嫟素有操行帝益愛之乃號梁夫人楚漢春秋曰高帝初封侯者皆賜丹書鐵券曰使黃河如帶太山如礪漢有宗廟爾無絕世漢魏春秋曰天子以曹公, SBCK: ''}
