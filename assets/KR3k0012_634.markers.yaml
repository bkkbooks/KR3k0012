  - {type: variant, offset: 3817, length: 432, content: 萬追思趙竇散金之義今分所受租與諸侯掾屬及故戍於陳蔡者庶以酬荅眾勞不擅大惠也又曰鎮東將軍母丘儉上言昔諸葛恪圍合肥新城中遣士劉整出圍傳消息為賊所得考問所傳整曰欲殺我者便速殺之終無它辭又遣士鄭像出城傳消息恪遣騎尋跡索得縛將繞城勑像大呼言大軍已還洛不如早降像不從其言更大呼城中曰大軍近在圍外壯士努力賊以刀築其口使不得語整像為兵能守義執節子弟宜有差異詔曰夫顯爵所以褒元功重賞所以寵列士整像占募通使越蹈重圍冒突白刃輕身守信不幸見獲抗節彌厲楊六軍之大勢安城守之懼心臨難不顧畢志傳命今追賜整像爵關中侯各除士名使子襲爵如部曲將死事科又曰夏侯惇從征孫權還使都督軍留居巢賜伎樂名倡令曰魏絳以和戎之功猶受金石之樂況將軍乎又曰太祖平柳城班所獲器物特以素屏風素机賜毛玠曰君有古人之風故賜君古人之服玠居顯位撫育孤兄子甚篤賞賜以施貧族家無所餘又曰文帝在東宮賜鍾繇五熟金為之銘曰於赫有魏作漢藩屏厥相惟鍾寔幹心膂靖恭夙夜匪皇般耳百寮師師楷茲矩度又曰薛夔黃初中為秘書丞帝與之推論書傳未嘗不終日帝視其衣薄, SBCK: 月}
