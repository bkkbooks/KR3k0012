  - {type: variant, offset: 6161, length: 275, content: 請車裂臣屍於市詢之曰蘇秦為燕欲亂齊今日其死寡人甚喜故裂之若得其殺王重封賞之如此剌臣者必出矣齊王從其言裂屍而詢之剌秦者果出求賞新序曰晉文公獵於澤有漁父諫曰夫鴻鵠厭江海而移入小澤則有矰繳之患今君棄宮殿遊至於此何往之矣文公納諫而還請賞之漁父辭曰君能尊天事地敬神固國愛人薄賦徭役以時則臣亦富矣君若不能雖有重賞亦不能保也呂氏春秋曰昔晉文公與楚人戰於城濮召咎犯而問焉楚眾我寡奈何咎犯曰臣聞繁禮之君不足於交繁戰之君不足於詐君亦詐之而已文公又問雍季雍季曰以詐導民亦一時之利也用咎犯之言而敗楚人於城濮反而為賞雍季在上左右諫曰城濮之功咎犯之謀也君用其言而賞後其身或者不可, SBCK: 亡况侈競}
