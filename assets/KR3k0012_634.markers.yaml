  - {type: variant, offset: 4959, length: 1062, content: 居朞年知死生之命制於子罕故一國歸焉又曰襄子圍於晉陽中出圍賞有功者四人高赫為賞首張孟談曰晉陽之事赫無大功今為賞首何也襄子曰晉陽之事國危社稷殆矣群臣無不有驕侮之意者唯赫不失君臣之禮是以先之仲尼聞之曰善賞哉襄子賞一人而天下為人臣者莫能失禮也又曰韓昭侯使人藏蔽𥘞侍者曰君亦不仁矣蔽𥘞不以賜左右而藏之昭侯曰非子之所知也吾聞明君之愛一嚬有為嚬一笑有為笑今夫𥘞豈特嚬笑哉𥘞之與嚬笑相去遠矣吾必待之有功故藏之末有與也言不謬賞尹子曰范獻子遊於河顧問樂氏之子舟人捨楫對曰君不修政舟中之人皆欒氏之子君能反是欒氏之子其如君何獻子稱善乃賜舟人田百畝以田易言也淮南子曰忠臣之事君也計功而受貴不為茍得量力而受官不貪爵祿其所能者受之勿辭也宋玉等並造集小言賦云楚王既登雲陽之臺乃命諸侯大夫景差唐勒宋玉等並造大言賦卒而宋玉受賞王曰復能為小言賦者與之雲夢之田玉又為賦王曰善遂賜雲夢之田說苑曰晉文公亡時陶淑狐從文公反國行三賞而不及陶淑狐見咎犯曰吾從而亡十有三年顏色黎黑手足眡胼今吾君反國三賞而不及我也意者君亡我歟我有大故歟子試為我言之於君咎犯言之文公文公曰嘻我豈忘是子哉夫高明至賢德行全成躭我以道說我以仁暴顯我行昭明我名使我為成人者吾以為上賞防我以禮諫我以義蕃授我不得為非數引我而請於賢人之門吾以為次賞夫勇壯強禦難在前則居前難在後則居後免我於患難之中者吾又以為之次且子獨不聞乎死人者不如存人之身亡人者不如存人之國三行賞之後而勞苦之士次之夫勞苦之士子固為首矣吾豈敢忘子哉周內史叔興聞之曰文公其霸乎昔先王先德而後力文公其當之矣詩云率禮不越此之謂也又曰衛君問於田讓曰寡人封侯盡千里之地賞賜盡御府綿帛而士不至何也田讓乃對曰君之賞賜不可以功及也君之誅伐不可以理避也言不賞功不辨理也猶舉杖而呪狗張弓而呪雞矣雖有香餌而不能致害之必也又曰齊宣王遊於社山有閭丘先生長老十三人於路拜謁宣王王賜之田不租無徭役諸老皆拜閭丘先生獨不拜王曰何也對曰來見大王所望者三願賜臣壽願賜臣富願賜臣貴王曰夫生殺有時命有長短非寡人之所制無以壽先王倉粟豐盈備災而畜無以富先王大官無缺小官卑賤無以貴先王閭丘先生曰此非謂也臣所望者願王選吏平法度政無苛如此臣少得壽焉春夏秋冬使之以時役無煩擾臣少得富焉願王出令使少者敬長長者敬老如此則臣得貴矣今王賜臣田不租則倉廩虛無徭役則官無所使非臣所望也王曰願屈先生為相可乎先生曰臣願足矣焉用相乎又曰趙襄子問王離曰國之所以亡者何也對曰君恡而能忍是以亡爾襄子曰何以為然也曰恡則不能賞賢忍則不能罰罪賢者不賞罪者不罰不亡何也又曰佛盻於中牟叛置鑊於庭召大夫而盟曰從我者賞之不從我者罰之田英, SBCK: ''}
