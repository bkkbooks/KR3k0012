  - {type: variant, offset: 3410, length: 227, content: 任守外臨時之賞或宜速乎乃命公得承制拜諸侯守相曰夫軍之大事在茲賞罰勸善懲惡宜不旋時故司馬法曰賞不踰月者欲民速覩為善之利也昔在中興鄧禹關承制拜君祭酒李文為河東太守來歙又承制拜高峻為通路將軍察其本傳皆非先請明臨時刻印也斯則世祖神明權達蓋所用速示威懷而克成洪勳者也且春秋之義大夫出疆專命之事荀可以利社稷安國家而已況君秉任二伯師尹九有實征夷夏軍行蕃甸之外得失在於斯須之間停賞後許以滯時務固非朕之所圖也自今已後臨事所甄當加寵號者其便刻印章假校咸使忠義得共獎勵勿有疑焉, SBCK: ''}
