  - {type: variant, offset: 2062, length: 180, content: 大夫代桃侯舍為丞相然自初官以至相終無可言上以為敦厚可相少主尊寵之賞賜甚多又曰伏日詔賜從官肉太官承日晏不來東方朔獨拔劍割肉謂其同官曰伏日當蚤歸請受賜即懷肉去太官奏之朔後入上曰昨賜肉不待詔以劍割肉而去之何也朔免冠謝上曰先生起自責也朔來受賜不待詔何無禮也拔劍割肉一何壯也割之不多一何廉也歸遺細君又何仁也上笑曰使先生自責乃反自譽復賜酒一石肉百斤歸遺細君又曰王成不知何郡, WYG: 雲陳留}
