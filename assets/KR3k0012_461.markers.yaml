  - {type: variant, offset: 1075, length: 326, content: 戰王曰何也對曰南方火也西方金也金之不勝火亦必矣秦王不聽其戰不勝今午又請秦王必與楚戰南方火西方金也楚正夏中年而免其柱國此所謂內自滅也楚懼復置淖齒又曰齊欲伐魏魏使人請淳於髡曰齊欲伐魏能解患唯先生也淳於髡曰諾遂入說齊王曰楚齊之仇敵也魏齊之與國也夫伐與國使仇敵制其餘弊名醜而實危為王不取也齊王曰善乃不伐魏也又曰趙魏攻華陽韓謁急於秦冠蓋相望秦不救韓相國謂由余曰事急顧公雖病為一宿之行由余見穰侯穰侯曰急乎由余對曰未急也彼韓急則將變矣穰侯請發兵救韓大敗趙魏於華陽之下又曰昭陽為楚伐魏覆軍殺將得八城移師而攻齊陳軫為齊王使見昭陽再拜賀戰勝起而請問楚之法覆軍煞將其官爵何也昭陽曰官為上柱國爵為上執珪陳軫曰今小貴矣又移師攻齊而不知止者身且死爵且偃昭陽車而歸之又曰范睢謂秦王曰, SBCK: 接境壤}
