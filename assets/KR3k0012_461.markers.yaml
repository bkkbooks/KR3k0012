  - {type: variant, offset: 3915, length: 0, content: '', SBCK: 將軍資三不如之勢乆處其上􅀽氏一時之傑必不爲將軍下也且公孫提征伐之卒其鋒不可當夫兾州天下之重資􅀂兩軍並力兵交城下危亡可立而待也夫􅀽氏將軍之舊且同盟當今之計莫􅀂舉兾州以讓􅀽氏厚徳將軍公孫瓉不能復與之争矣是將軍有讓賢之名而身安於太山也願勿有疑馥性怯因然其計又曰沮授􅀃􅀽紹曰將軍累葉台輔丗濟忠義今朝廷播越宗廟殘毀觀諸州郡雖外託義兵内實相圖未有匡正社稷䘏民之意且今州城粗定兵強士附西迎大駕即宫鄴都挾天子令諸侯畜士馬以討不庭誰能禦之又曰曹操與􅀽紹相持於官渡紹遣人求助劉表許之而不至亦不助曹操且欲觀天下之變從事中郎南陽韓嵩別駕劉先說􅀽曰今豪桀並争兩雄相持天下之重在於將軍將軍􅀂欲有起乗弊可也如其不然因將軍所冝從豈可擁甲十萬坐觀成敗求援如不能助見賢而不肯歸此兩怨必集於將軍恐不得復中立矣又曰曹操軍至新野蒯越韓嵩􅀓選等說劉琮曰逆順有大體強弱有大勢以人臣拒人主逆道也以新造之楚御中國必危以劉備敵曹公不當也三者皆短欲以抗王師之鋒必亡之道也將軍自料何與劉備琮曰不􅀂也選曰誠以劉備不足禦曹公則雖保全楚不能以自存也誠以劉備足禦曹公則備不爲將軍下也願將軍勿疑琮乃請降又曰閻忠􅀃皇甫嵩曰將軍指揮足以展風雲叱咤可以興雷電東觀漢記曰隗􅅝將王元􅀃􅅝曰昔更始四方響應天下喁喁謂之太平一旦壞敗今南有子陽北有文伯江湖海岱王公十數而欲牽儒生之􅀃棄千乗之基計之不可者也今天水完冨士馬最強北取西河東收三輔案􅁗舊迹表裏山河元請以一丸泥爲大王東封函谷關此萬丗一時也􅀂計不及此且畜養士馬據隘自守曠日持乆以待四方之變圖王不成其弊猶足以覇􅅝然其計又曰更始大司馬朱鮪守洛陽呉漢諸將圍守數月不下世祖以岑彭甞爲鮪校尉令彭􅀃鮪曰赤眉巳得長安今公誰爲守乎蕭王受命平定}
  - {type: page-break, offset: 3915, content: '', id: KR3k0012_SBCK_461-7b}
