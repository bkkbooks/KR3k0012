  - {type: variant, offset: 2818, length: 5, content: 富東周也今, SBCK: 爲計無便於此者楚從}
  - {type: variant, offset: 2818, length: 540, content: 富東周也今其人皆種禾君若欲東周之乏不若一下水以病其所種下水東周必復種稻種稻而復奪之若是則東周之人可令一仰西周而受命於君矣西周君曰善遂下水蘇子亦得兩全矣又曰司馬錯與張儀爭論於秦惠王前錯欲伐蜀儀曰不如伐韓王問其說曰臣聞欲富者務廣其地欲強者務富其人欲王者務崇其德三資者備而至道興矣王曰善起兵伐蜀又曰司馬錯與張儀爭論於秦惠王前錯欲伐蜀儀曰不如伐韓王問其說對曰親魏善楚下兵三川誅周王之罪侵楚魏之地周自知不救九鼎寶器必出據九鼎案圖籍挾天子以令天下天下莫敢不聽此王業也又曰蘇秦發書陳篋為揣摩曰安有說人主不能出金玉錦繡取相之尊者乎又曰司馬錯與張儀爭論於秦惠王前錯欲伐蜀儀曰不如伐韓王問其說對曰臣聞爭名於朝爭利於市今三川周室天下之市朝也而不爭焉顧爭於戎狄又曰秦將急攻韓韓王安使公子韓非西入秦上書說秦王曰脣亡齒寒故曰兵者凶器陛下試聽臣之計則從者困而趙孤天下可蠶食也又曰以秦卒之勇車騎之多以當諸侯譬若放韓盧而逐駑兔也又曰司馬錯與張儀爭論於秦惠王前錯欲伐蜀儀曰不如伐韓王問其說對曰案圖籍挾天子以令天下錯曰不然蜀戎翟之長也以秦政之譬如使豺逐群羊王曰善起伐蜀又曰蔡澤對應侯曰君之祿位貴盛而身不退竊為君危之物盛則衰天下之常數也又曰張登謂趙魏曰齊欲伐河東何以知之齊之羞與中山之為王甚矣今召山中與之遇而許之王是欲用, WYG: ''}
