  - {type: variant, offset: 4340, length: 0, content: '', krp: 又曰沮授說袁紹曰將軍累葉台輔丗濟忠義今朝廷播越宗廟殘毀觀諸州郡雖外託義兵内實相圖未有匡正社稷䘏民之意且今州城粗定兵強士附西迎大駕即宫鄴都挾天子令諸侯畜士馬以討不庭誰能禦之又曰曹操與袁紹相持於官渡紹遣人求助劉表許之而不至亦不助曹操且欲觀天下之變從事中郎南陽韓嵩別駕劉先說袁曰今豪桀並争兩雄相持天下之重在於將軍將軍若欲有起乗弊可也如其不然因將軍所冝從豈可擁甲十萬坐觀成敗求援如不能助見賢而不肯歸此兩怨必集於將軍恐不得復中立矣又曰曹操軍至新野蒯越韓嵩傳選等說劉琮曰逆順有大體強弱有大勢以人臣拒人主逆道也以新造之楚御中國必危以劉備敵曹公不當也三者皆短欲以抗王師之鋒必亡之道也將軍自料何與劉備琮曰不若也選曰誠以劉備不足禦曹公則雖保全楚不能以自存也誠以劉備足禦曹公則備不爲將軍下也願將軍勿疑琮乃請降又曰閻忠說皇甫嵩曰將軍指揮足以展風雲叱咤可以興雷電東觀漢記曰隗囂將王元說囂曰昔更始四方響應天下喁喁謂之太平一旦壞敗今南有子陽北有文伯江湖海岱王公十數而欲牽儒生之說棄千乗之基計之不可者也今天水完冨士馬最強北取西河東收三輔案秦舊迹表裏山河元請以一丸泥爲大王東封函谷關此萬丗一時也若計不及此且畜養士馬據隘自守曠日持乆以待四方之變圖王不成其弊猶足以覇囂然其計又曰更始大司馬朱鮪守洛陽呉漢諸將圍守數月不下世祖以岑彭甞爲鮪校尉令彭說鮪曰赤眉巳得長安今公誰爲守乎蕭王受命平定燕趙百姓安土歸心賢俊四面雲集今北方清浄大兵來攻洛保一城欲何望乎不如亟降鮪曰大司徒公𬒳害時鮪與其謀又諌更始無遣上北伐自知罪深故不敢降耳彭還詣河陽白上上謂彭復徃曉之夫建大事者不忌小怨今降官爵可保况誅罰乎上指水曰河水在此吾不食言彭奉上旨復至城下說鮪因曰彭徃者得執鞭待從蒙薦舉抜擢深受厚恩思以報義不敢負公鮪從城上下索曰當如此來彭趨索欲上鮪見其不疑即曰旦蚤與我㑹上東門外彭如期徃與鮪交馬語鮪輕騎詣彭降彭爲殺羊具食鮪身爲降虜未見呉公諸將不敢食彭即令鮪自縛與俱見呉公將詣行在所河津亭上即時解鮪縛復令彭夜送歸洛陽又曰更始使侍御史黄黨即封世祖爲蕭王罷兵耿弇音甘曰今使者來欲罷兵不可聽也兵一罷不可復㑹也上曰國家巳都長安天下大定何用兵爲弇曰青徐之賊銅馬赤眉之屬數十軰軰數十萬衆皆東至海所嚮無前聖公不能辯也敗必不乆帝起坐曰卿失言我擊卿弇曰大王哀厚弇如父子故披赤心爲大王陳事上曰我戲卿耳何以言之弇曰百姓患苦王莽苛刻日乆聞劉氏復興莫不欣喜望風從化而去虎口就慈母倒㦸横矢不足以喻明公首事南破昆陽敗百萬師今復定河北以義征伐表善懲惡躬自克薄以待士民發號嚮應望風而至天下至重公可自取無令他姓得之上曰卿若東得無爲人道之弇曰此重事不敢爲人道也又曰馮異因間進說曰天下同苦王氏思漢乆矣更始諸將縱横暴虐所至虜掠百姓失望今專命方面施行恩德夫有桀紂之亂乃見湯武之功民人飢渴易爲充飽冝急分遣官屬狥行郡縣理冤結布惠澤上納之又曰隗囂旣立便聘平陵方望爲軍帥望至說囂曰足下欲丞天順民輔漢而今起立者乃在南陽王莽尚據長安雖欲以漢爲名其實無所受命將何以見信於衆冝急立髙廟稱臣奉祠所謂神道設教求助民神者也且禮有損益質文無常削地開兆茅茨土堦陛下以致其肅敬雖未備物神明其舎諸嚚從其言又曰蜀郡功曹李熊說公孫𫐠曰方今四海波蕩疋夫撗議將軍割據千里地方十城若奮發盛德以投天隙覇王之業成矣冝改名號以鎮百姓述曰吾亦慮之公言起我意於是自立爲蜀王熊復說述曰今山東飢饉人民相食兵所屬㓕城邑丘墟蜀地沃野千里土壤膏腴果實所生無榖而飽女工之業覆衣天下名材竹幹不可勝用又有魚塩銀銅之利浮水轉漕之便北據漢中杜褒斜之塗東守巴郡拒扞關之口地方數千里戰士不下百萬見利出兵而略地無利則堅守而力農東下漢水以窺秦地南順江流以震荆楊所謂用天因地成功之資也君有爲之聲聞於天下而名號未定志士狐疑冝即大位使逺人有所依歸述遂自立爲天子又曰荆邯東方漸平兵且西向說公孫述日兵者帝王之大器古今所有不能廢也昔秦失其守豪桀並起漢祖無前人之迹立錐之地於戰陣之中躬自奮擊兵破身困數矣然軍敗復合創愈復戰何則死而功成踰於却就於㓕亡臣之愚計以爲冝及天下之望未絶豪傑尚可招誘急以此時發國内精兵令田戎據江南之㑹倚巫山之固築壘堅守傳檄呉楚長沙巳南必隨風而靡今延岑岀漢中定三輔天水隴西拱手自服如此海内震揺兾有大利又曰鄧禹聞上安集河北即杖䇿比渡追及於鄴上欣其至禹進說曰更始雖都關西今山東未安赤眉青犢之屬動以萬數三輔假號徃徃群聚更始旣未有所挫而自聽斷諸將皆庸人屈起志在財弊争用威力朝夕自快非有忠良明智深慮逺圖欲尊主安民者明公雖蕃輔之功猶恐無所於今之計莫如覽延英雖務恱民心立髙祖之業救萬民之命以公而慮天下不足定也上大恱因令左右號禹曰鄧將軍常宿止於中與定計議又曰光武以冦恂爲河内太守行大將軍事恂同門生董崇說恂曰上新即位四方未定而君以此時據大郡此䜛人所側目怨禍之府也冝思功遂身退之計恂然其言因病不視事太平御覽卷第四百六十一}
