  - {type: variant, offset: 3177, length: 396, content: 則從者困而趙孤天下可蠶食也又曰以秦卒之勇車騎之多以當諸侯譬若放韓盧而逐駑兔也又曰司馬錯與張儀爭論於秦惠王前錯欲伐蜀儀曰不如伐韓王問其說對曰案圖籍挾天子以令天下錯曰不然蜀戎翟之長也以秦政之譬如使豺逐群羊王曰善起伐蜀又曰蔡澤對應侯曰君之祿位貴盛而身不退竊為君危之物盛則衰天下之常數也又曰張登謂趙魏曰齊欲伐河東何以知之齊之羞與中山之為王甚矣今召山中與之遇而許之王是欲用其兵也豈若令大國先與之王以止其遇哉趙魏許諾果與中山之王而親之中山東絕齊而從趙魏又曰蘇秦為燕說齊王歸燕之十城人有毀蘇秦於燕王左右賣國反臣也將作亂蘇秦恐得罪歸而燕王不復官也蘇秦見燕王曰臣東周之鄙人也無尺寸功而王親拜之於廟朝而禮之於廷今臣為主卻齊之兵而攻得十城宜以益親今者而王不官臣人必有不信傷臣於王者臣之不信王之福也史記曰初沛公引兵過陳留酈生上謁沛公拔弔曰延客入酈生入揖謂沛公曰今足下甚若暴衣露冠將兵助楚討不義足下何不自喜也臣願以事見, SBCK: ''}
