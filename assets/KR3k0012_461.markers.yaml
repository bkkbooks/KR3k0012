  - {type: variant, offset: 8, length: 1, content: 上, SBCK: 中}
  - {type: variant, offset: 8, length: 700, content: 上釋名曰說者述也宣述人意也左傳曰晉人將尋盟齊人不可叔向告於齊曰明王之制使諸侯歲聘以志業間朝以講禮再朝而會以示威再會而盟以顯昭明自古以來未之或失齊人懼又曰晉郤缺言於趙宣子曰衛不睦故取其地今已睦矣可以歸之叛而不討何以示威服而不柔何以示懷非威非懷何以示德趙宣子悅歸衛匡戚之田又曰吳人執衛侯子服景伯謂子貢曰子盍聞見太宰乃請束錦以行語及衛故子貢曰衛君之來也必謀於其眾其眾或欲或否是以緩來其欲來者子之黨也其不欲來者子之讎也若執衛君是墮黨而崇讎也夫墮子者得其志矣且合諸侯而執衛君誰敢不懼墮黨崇讎而懼諸侯或者難以霸乎太宰嚭說乃舍衛侯又曰晉楚會於虢季武子伐莒取鄆莒人告於國會楚告於晉曰請戮其使趙孟請諸楚曰魯雖有罪其執事不避難疆場之邑一彼一此何常之有去煩宥善莫不競勸固請諸楚楚人許之乃免叔孫又曰楚五舉奔鄭將遂奔晉聲子將如晉遇之於鄭郊聲子曰吾必復子還如楚令尹子木與之語聲子曰椒舉今在晉矣晉人將與之縣以叔向彼若謀害楚國豈不為患子木懼言諸王益其祿爵而復之聲子使椒鳴逆之又曰晉侯秦伯圍鄭佚之狐言於鄭伯曰國危矣若使燭之武見秦君師必退燭之武夜縋而出出見秦伯曰秦晉圍鄭鄭既知亡鄭而有益於君敢以煩執事越國以鄙遠君知其難也焉用亡鄭以陪鄰夫晉何厭之有既東封鄭又欲肆其西封不闕音下同秦焉取之闕秦以利晉唯君圖之秦伯悅傳曰吳伐楚入郢申包胥如秦乞師曰吳為封豕長虵薦食上國虐始於楚寡君失守社稷越在草莽使下臣告急曰夷德無厭若鄰於君疆場之患也逮吳之未定也君其取分焉若以君靈撫之世以事秦立依於庭牆而哭日夜不絕聲勺飲不入口七日秦師乃出又曰楚子饗魯昭公於新臺好以大屈既而悔之薳啟強聞之見公公語之拜賀公曰何對曰齊與晉越欲此久矣寡君無適與也敢不賀乎公懼乃反之戰國策, WYG: 中史記}
