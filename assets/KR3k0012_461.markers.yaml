  - {type: punctuation, offset: 4194, content: 『, id: KR3k0012_CHANT_461-bkkpn1251}
  - {type: variant, offset: 4194, length: 3, content: 所說實, WYG: 曹操軍至新野蒯越韓嵩傅巽等説劉琮曰逆順有大體强弱有定勢以人臣拒人主逆道也以新造之楚禦中國必危也以𤣥徳敵曹公不當也三者皆短欲以抗王師之鋒必亡之道也將軍自料何如𤣥徳琮曰不若也巽曰誠以𤣥徳不足禦曹公則雖保全楚不能以自存也誠以𤣥徳足禦曹公則彼不}
  - {type: page-break, offset: 4194, content: '', id: KR3k0012_WYG_461-12b, image: WYG0897/WYG0897-0225d.png}
  - {type: variant, offset: 4194, length: 0, content: '', krp: 彭越強刼外黄恐故降以待大王大王至又皆坑之百姓豈有}
  - {type: variant, offset: 4195, length: 15, content: 說實為厚利而顯為名高者也而說之, krp: 歸心哉從此}
  - {type: variant, offset: 4198, length: 2, content: 厚利, WYG: 將軍下也願將軍勿疑琮乃請降又曰閻忠説皇甫嵩曰將軍指揮足以展風雲叱咤足以興雷電東觀漢記曰隗囂將王元説囂曰昔更始四方響應天下喁喁謂之太平一旦壊敗今南有子陽北有文伯江湖海岱王公十數}
  - {type: page-break, offset: 4198, content: '', id: KR3k0012_WYG_461-13a, image: WYG0897/WYG0897-0226a.png}
  - {type: variant, offset: 4201, length: 4, content: 顯為名高, WYG: 欲牽儒生之説棄千乗之基計之不可}
  - {type: punctuation, offset: 4207, content: ，, id: KR3k0012_CHANT_461-bkkpn1252}
  - {type: 'tls:seg', offset: 4207, content: '', id: KR3k0012_CHANT_461-48a.6}
  - {type: variant, offset: 4207, length: 3, content: 而說之, WYG: 今天水完富士馬最强北取西河東收三輔案秦舊迹表裏山河元請}
  - {type: variant, offset: 4211, length: 67, content: 名高則陽收其身而實數䟽之說以厚利則陰用其言而顯棄其身又曰漢王使隨何說淮南王隨何曰項王伐齊大王宜悉淮南之眾為楚軍前鋒今乃提空名以向楚臣竊, WYG: 一丸泥}
  - {type: variant, offset: 4211, length: 19, content: 名高則陽收其身而實數䟽之說以厚利則陰用, krp: 東梁地十餘城皆恐莫肯下矣羽然}
