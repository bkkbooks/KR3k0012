  - {type: variant, offset: 4146, length: 10, content: 異於驅群羊而攻猛獸獸, krp: 來周室卑微諸侯相兼關東爲六國秦}
  - {type: variant, offset: 4148, length: 8, content: 驅群羊而攻猛獸獸, WYG: 此漢一偏将将十萬衆臨越則殺王降漢如反覆手耳漢書曰張耳陳餘北略地燕界趙王為燕軍所獲燕因留之欲與分地趙有厮養卒乃走燕壁問曰知臣何欲燕將曰若欲得王耳曰君知張耳陳餘何如人也燕將曰賢人也曰其志何欲燕將曰欲得其王耳趙卒笑曰君未知兩人所欲也夫武臣張耳陳餘杖馬箠下趙數十城亦各欲南面王夫臣}
