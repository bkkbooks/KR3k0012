  - {type: punctuation, offset: 4183, content: 「, id: KR3k0012_CHANT_461-bkkpn1246}
  - {type: variant, offset: 4183, length: 0, content: '', WYG: 沮授説袁紹曰將軍累葉台輔世濟忠義今朝廷播越宗廟殘毁觀諸州郡雖外託義兵内實相圖未有憂存社稷恤民之意且今州城粗定兵强士附西迎大駕即宫鄴都挾天子而令諸侯畜士馬以討不庭誰能禦之又曰曹操與袁紹相持於官渡紹遣人求助劉表表許來而不至亦不援曹操且欲觀天下之變従事中郎南陽}
  - {type: page-break, offset: 4183, content: '', id: KR3k0012_WYG_461-12a, image: WYG0897/WYG0897-0225c.png}
  - {type: variant, offset: 4183, length: 0, content: '', krp: 李左車說成安君陳餘曰臣聞}
  - {type: variant, offset: 4184, length: 3, content: 非知說, WYG: 嵩别駕劉先説表曰今豪傑並争兩雄相持天下}
  - {type: variant, offset: 4184, length: 1, content: 非, krp: 信渉西河虜魏王擒夏恱新喋血閼與今乃輔以張耳議欲以下趙此乗勝而逺闘其鋒不可當臣聞千里餽粮士有飢色今井陘之道車不得方軌騎不得成列其勢粮食必在其後願足下假臣竒兵三萬人從間道絶其輜重彼前不得闘退不得還吾竒兵絶其後野無所掠不至十日兩將之頭可致麾下又曰酈食其說齊王曰}
  - {type: variant, offset: 4186, length: 0, content: '', krp: 天下所歸乎齊王曰天下何歸曰歸漢何以言之日漢王與項王戮力西面擊秦約先入咸陽者王之項王負約不與而王之漢中又還殺義帝漢王聞之起蜀漢之兵責義帝之罪降城即以侯其將得財即以分其士蜀漢之粟方舡而下項羽有背約之名殺義帝之負於人之罪無所忘天下之士歸於漢王可坐而觀今以據敖倉之粟塞成臯之險守白馬之津杜太行之陵距飛狐之口天下後服者先亡王疾下漢王齊國社稷可得而保不下漢王危亡可立而待乃聽酈生又曰髙祖使陸生賜尉他印爲南越王陸生進說它曰足下中國人親戚昆弟墳墓在真定今反天姓棄冠帶欲以區區之越與天子抗衡禍且及身乃欲以新造未集之越屈強於此漢一偏將將十方衆臨越則殺王降漢如反覆手耳漢書曰張耳陳餘北略地燕界趙王爲燕軍所獲燕因留之欲與分地趙有厮養卒乃走燕壁問曰知臣何欲燕将曰若欲得王耳曰君知張耳陳餘何人也燕將曰賢人也曰其志何欲燕將曰欲得其王耳趙卒嘆曰君未知兩人所欲也夫武臣張耳陳餘杖馬箠下趙數十城亦各欲南面王夫臣之與主豈可同日道哉兩人亦欲分趙而王時未可耳今兩人名爲求王實欲燕殺之此兩人分趙而王夫以一趙尚易燕况以兩王右提左挈而責義殺王㓕燕易矣燕以爲然迺歸趙王養卒爲御而歸又曰陸賈說尉他他賜賈橐中裝直千金張晏注曰珠玉之寳裝裏也又曰魏豹叛漢王漢王謂酈生曰緩頰往}
  - {type: variant, offset: 4188, length: 1, content: 難, WYG: 重在於將軍將軍若欲有}
  - {type: variant, offset: 4188, length: 0, content: '', krp: 又曰蒯通知天下權在於韓信欲說令背漢日臣願𬒳心腹隨介肝膽效愚忠恐足下不能用也曰夫功者}
  - {type: punctuation, offset: 4189, content: ，, id: KR3k0012_CHANT_461-bkkpn1247}
  - {type: 'tls:seg', offset: 4189, content: '', id: KR3k0012_CHANT_461-48a.4}
  - {type: variant, offset: 4189, length: 1, content: 為, krp: 成而易敗時者難值而易失時不再來願足下無疑臣之計信猶豫不忍背漢遂謝通通乃陽狂爲巫又曰漢三年與項羽相距京索間上數使使勞苦丞相鮑生謂蕭何曰數勞苦君者有疑君今爲君計遣君于孫昆弟能勝兵者悉詣軍所上益信君於是何從其計漢王大恱又曰項羽擊陳留外黄不下數日降羽悉令男子年十五以上詣城東欲坑之外黄令舎人兒年十三往}
  - {type: punctuation, offset: 4190, content: 《, id: KR3k0012_CHANT_461-bkkpn1248}
  - {type: variant, offset: 4190, length: 3, content: 說難書, WYG: 起乗其弊可也如其不然固將擇所宜従豈可擁甲十萬坐觀成敗求援而不能助見賢而不肯歸此兩怨必集於將軍恐不得復中立矣又}
  - {type: variant, offset: 4191, length: 2, content: 難書, krp: 羽}
  - {type: punctuation, offset: 4192, content: 》, id: KR3k0012_CHANT_461-bkkpn1249}
  - {type: punctuation, offset: 4194, content: ：, id: KR3k0012_CHANT_461-bkkpn1250}
