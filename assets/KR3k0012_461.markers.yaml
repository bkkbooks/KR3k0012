  - {type: variant, offset: 4177, length: 1, content: 王, WYG: 事非常人所及袁紹不識大體恐懼出奔非有他志今急購之勢必為變袁氏樹恩四世門生故吏遍於天下若收豪傑以聚徒衆英雄因之而起則山東非公之有也不如赦之拜一郡守紹喜於免罪必無患矣卓以為然乃遣授紹渤海太守又曰袁紹以書要公孫瓚以襲冀州牧韓馥紹乃使外甥陳留髙幹及潁川荀諶等説馥曰公孫瓚乗勝來南而諸郡應之袁車騎引軍東向意未可量也竊為將軍危之馥懼曰然則為之奈何諶曰君自料寛仁容衆為天下所附孰與袁氏馥曰不如也臨危吐决智勇邁於人又孰與袁氏馥曰不如也世布恩徳天下之人蒙其惠又孰與袁氏馥曰不如也諶曰今將軍資三不如之勢久處其上袁氏一時之傑必不為將軍下也且公孫提燕代之卒其鋒不可當夫冀州天下之重資若兩軍并力兵交城下危亡可立而待也夫袁氏將軍之舊且為同盟當今}
  - {type: page-break, offset: 4177, content: '', id: KR3k0012_WYG_461-11a, image: WYG0897/WYG0897-0225a.png}
  - {type: page-break, offset: 4177, content: '', id: KR3k0012_WYG_461-11b, image: WYG0897/WYG0897-0225b.png}
  - {type: variant, offset: 4179, length: 0, content: '', krp: 賢如老嫗竈上掃除足以滅諸侯成帝業今怠而弗急諸侯復強相聚約從雖有黄帝之資弗能并也秦王聽其}
  - {type: variant, offset: 4180, length: 1, content: 過, WYG: 莫若舉冀州以讓袁氏袁氏厚徳將軍公孫瓚不能復與之争矣是將軍有讓賢之名而身安於太山也願勿有疑馥性怯因然其計}
