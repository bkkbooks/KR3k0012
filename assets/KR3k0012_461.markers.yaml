  - {type: variant, offset: 4325, length: 0, content: '', WYG: 令左右號禹曰鄧將軍嘗宿止於中與定計議又曰光武}
  - {type: variant, offset: 4325, length: 13, content: 以得說秦王秦王乃拜為長史聽, krp: 然}
  - {type: variant, offset: 4326, length: 1, content: 得, WYG: 冦恂為河内太守行大將軍事恂同門生董崇}
  - {type: variant, offset: 4328, length: 10, content: 秦王秦王乃拜為長史聽, WYG: 恂上新即位四方未定而君以此時據大郡此讒人所側目怨禍之府也宜思功遂身退之計恂然}
