  - {type: variant, offset: 3767, length: 213, content: 絃濁以春者君也小絃廉折以清者相也擢之深而令人愉者政令也鈞以鳴大小相蓋因推而不害者四時也故曰琴音調而天下正也又曰秦圍邯鄲急且降平原君甚患之邯鄲傳舍吏子李同說平原君曰誠能令家之所有盡散以饗士士方其危苦之時易得耳於是平原從之得敢死之士三千李同遂與三千人赴秦軍秦軍為之卻三十里又曰漢王數困滎陽城皋酈生曰今燕趙已定唯齊未下臣請得奉明詔說齊王使為漢稱東藩上曰善又曰范增說項梁曰君江東楚將皆爭附君者以君代楚將為能復立楚之後也於是項梁然其言也, krp: 事難矣}
