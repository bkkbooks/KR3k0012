  - {type: variant, offset: 3992, length: 1, content: 竊, WYG: 今諸侯叛秦矣武信君兵且至而君堅守范陽少年殺君下武信君君急遣臣見武信君可轉禍為福在今矣又曰田肯說髙祖曰秦形勝之國也得百二焉地勢便利彼其下兵於諸侯譬猶居髙屋之上建瓴水也又曰漢王數困滎陽成臯計欲捐成臯以東屯鞏洛以距楚酈生因曰臣}
