  - {type: variant, offset: 4164, length: 10, content: 王不與獸而與群羊臣竊, krp: 諸侯服秦譬若郡縣夫}
  - {type: variant, offset: 4166, length: 2, content: 與獸, WYG: 絶傷痍者未起}
  - {type: variant, offset: 4169, length: 3, content: 與群羊, WYG: 欲比隆成康之時}
