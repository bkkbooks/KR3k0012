  - {type: variant, offset: 3922, length: 9, content: 下臣請得奉明詔說齊, SBCK: 見呉公諸將不敢食彭即令鮪自􅅞與俱見呉公將詣行在所河津亭上即時解鮪􅅞復令彭夜送歸洛陽又曰更始使侍御史黄黨即封世祖爲蕭}
