  - {type: 'tls:seg', offset: 3941, content: '', id: KR3k0012_CHANT_461-45a.2}
  - {type: variant, offset: 3941, length: 0, content: '', SBCK: 懲惡躬自克薄以待士民發號嚮應望風而至天下至重公可自取無令他姓得之上曰卿􅀂東得無爲人道之弇曰此重事不敢爲人道也}
  - {type: punctuation, offset: 3943, content: ：, id: KR3k0012_CHANT_461-bkkpn1170}
