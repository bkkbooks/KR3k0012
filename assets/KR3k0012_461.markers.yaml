  - {type: variant, offset: 3361, length: 1, content: 豈, WYG: 晉}
  - {type: variant, offset: 3361, length: 248, content: 豈若令大國先與之王以止其遇哉趙魏許諾果與中山之王而親之中山東絕齊而從趙魏又曰蘇秦為燕說齊王歸燕之十城人有毀蘇秦於燕王左右賣國反臣也將作亂蘇秦恐得罪歸而燕王不復官也蘇秦見燕王曰臣東周之鄙人也無尺寸功而王親拜之於廟朝而禮之於廷今臣為主卻齊之兵而攻得十城宜以益親今者而王不官臣人必有不信傷臣於王者臣之不信王之福也史記曰初沛公引兵過陳留酈生上謁沛公拔弔曰延客入酈生入揖謂沛公曰今足下甚若暴衣露冠將兵助楚討不義足下何不自喜也臣願以事見又曰李斯說秦王曰夫以秦之強大王之賢足以滅諸侯成帝業秦王乃拜斯為長史聽其計, krp: ''}
  - {type: variant, offset: 3362, length: 1, content: 若, WYG: 晉}
  - {type: variant, offset: 3363, length: 1, content: 令, WYG: 君}
