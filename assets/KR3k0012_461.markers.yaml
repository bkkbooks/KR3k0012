  - {type: punctuation, offset: 4295, content: 「, id: KR3k0012_CHANT_461-bkkpn1273}
  - {type: variant, offset: 4295, length: 0, content: '', WYG: 更始大司馬朱鮪守洛陽吳漢諸將圍守數月不下世祖以岑彭嘗為鮪校尉令彭説鮪曰赤眉已得長安今公誰為守乎蕭王受命平定燕趙百姓安土豪俊歸心四面雲集今北方清浄大兵來攻洛保一城欲何望乎不如亟降鮪曰大司徒公被害時鮪與其謀又諫更始無遣上北伐自知罪深故不敢降耳彭還詣河陽白上上謂彭復徃曉之夫建大事者不忌小怨今降官爵可保况誅罰乎上指水曰河水在此吾不食言彭奉上㫖復至城下説鮪因曰彭往者得執鞭侍從蒙薦舉㧞擢深受厚恩思以執義不敢負公鮪従城上下索曰當如此来彭趨索欲上鮪見其不疑即曰旦蚤與我㑹上東門外彭如期往與鮪交馬語鮪輕騎詣彭降彭為殺羊具食鮪身為降虜未見吳公諸將不敢食彭即令鮪自縛與俱往吳公將詣行在所河津亭上即時解鮪縛復令彭夜送歸洛陽又曰更始使侍御史黄黨即封世祖為蕭王罷兵耿弇曰今使者來欲罷兵不可聴也兵一罷不可復㑹也上曰國家已都長安天下大定何用兵為弇曰青徐大賊銅馬赤眉之屬數十輩輩數十萬衆皆東至海所嚮無前聖公不能辦也敗必不久帝起坐曰卿失言我擊卿弇曰大王哀厚弇如父子故披赤心為大王陳事上曰我戲卿耳何以言之弇曰百姓患苦王莽苛刻日久聞劉氏復興莫不欣喜望風従化如去虎口就慈母倒㦸横矢不足以喻明公首事南破昆陽敗百萬師今復定河北以義征伐表善懲惡躬自克薄以待士民發號嚮應望風而至天下至重公可自取無令他姓得之上曰卿若東得無為人道之弇曰此重事不敢為人道也又曰馮異因間進説曰天下同苦王氏思漢久矣更始諸將縦横暴虐所至虜掠百姓失望今専命方面施行恩徳夫有桀紂之亂乃見湯武之功民人饑渇易為充飽宜急分遣官屬徇行郡縣理寃結布恵澤上納之又曰隗囂既立便聘平陵方望為軍師望至說囂曰足下欲承天順民輔漢而起今立者乃在南陽王莽尚據長安雖欲以漢為名其實無所受命將何以見信於衆宜急立髙廟稱臣奉祠所謂神道設教求助民神者也且禮有損益質文無常削地開兆茅茨土階陛下以致其肅敬雖未備物神明其舎諸囂従其言又曰蜀郡功曹}
