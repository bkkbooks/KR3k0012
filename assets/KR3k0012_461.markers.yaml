  - {type: variant, offset: 4175, length: 1, content: 為, krp: 秦之強}
  - {type: variant, offset: 4176, length: 0, content: '', WYG: 不侔矣且夫秦地被山帶河四塞以為固卒然有急百萬之衆可具夫與人鬭不搤其亢張晏曰亢喉嚨拊其背未能全勝今陛下入闗而都按秦之故此亦搤天下之肮而拊其背也高帝即日西都闗中又曰陳豨反上自將至邯鄲而韓信謀反闗中吕后用蕭何計誅信上已聞信誅便拜何相國益封五千户令卒五百人一都尉為相國衛諸君皆賀召平獨弔謂何曰禍自此始矣上暴露於外而君守内非被矢石之難而益君封置衛者以今者淮隂新反於中有疑君心夫置衛衛君非以寵君也讓封勿受悉以家私財佐軍何従其計上喜悦又曰齊悼惠王時曹參為相禮下賢人請蒯通為客初齊王田榮怨項羽謀舉兵叛之齊處士東郭先生梁石君在劫中强從及田榮敗二人醜之相與入深山隐居客謂通曰先生之於曹相國拾遺舉過顯賢進能齊國蔑若先生者先生知梁石君東郭先生世俗所不及何不進於相國乎通曰諾臣之里婦與里諸母相善也里婦夜亡肉姑以為盗怒而逐之婦晨去過所善諸母語以事而謝之里母曰汝安行我今令而家追汝矣即束縕請火於亡肉家曰昨暮夜犬得肉爭鬭相殺請火治之亡肉家遽追呼其婦故里母非談說之士也束緼請火非還婦之道也然物有相感事有適可臣請乞火於曹相國迺見相國曰婦人有夫死三日而嫁者有幽居守寡不出門者足下即求婦何取曰取不嫁者通曰然則求臣亦猶是也彼東郭先生梁石君齊之俊士隠居不嫁未嘗卑節下意以求仕也願足下使人禮之曹相國曰敬受命皆以為上賓又曰袁盎逢丞相申屠嘉下車拜謁丞相従車上謝盎還媿其吏迺之丞相舎上謁求見丞相曰且陛下従代來每朝郎官者上書疏未嘗不止輦受其言言不可用置之言可採未嘗不稱善何也欲以致天下賢士日聞所不聞以益聖今君自閉箝天下之口而日益愚以聖主責愚相君受禍不久矣丞相迺再拜曰嘉鄙人迺不知將軍幸教引與之坐為上客范煜後漢書曰更始尚書令謝躬留魏郡太守陳康守鄴自率諸將擊萊賊世祖因躬在外乃使吳漢襲其城漢先令辯士説陳康曰盖聞之上智不處危以僥倖中智能因危以為功下愚安於危以自亡危亡之至在人所由不可不察今京師敗亂四方雲擾公所聞也蕭王兵强士附河北歸命公所見也謝躬内背蕭王外失衆心公所知也公今據孤危之城待滅亡之禍義無所立節無所成不若開門内軍轉禍為福免下愚之敗收中智之功此計之至者也康然之於是開門内漢又曰袁紹奔冀州董卓購募求紹時侍中周秘城門校尉伍瓊等隂為紹説卓曰夫廢立}
