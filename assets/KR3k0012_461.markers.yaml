  - {type: punctuation, offset: 3916, content: 、, id: KR3k0012_CHANT_461-bkkpn1159}
  - {type: variant, offset: 3917, length: 4, content: 已定唯齊, SBCK: 百姓安土歸心賢俊四面雲集今北方清浄大兵來攻洛保一城欲何望乎不如亟降鮪曰大司徒公􅀍害時鮪與其謀又諌更始無遣上北伐自知罪􅀷故不敢降耳彭還詣河陽白上上謂彭復徃曉之夫建大事者不忌小怨今降官爵可保况誅罰乎上指水曰河水在此吾不食言彭奉上旨復至城下􅀃鮪因曰彭徃者得執鞭待從蒙薦舉抜擢􅀷受厚恩思以報義不敢負公鮪從城上下索曰當如此來彭趨索欲上鮪見其不疑即曰旦蚤與我㑹上東門外彭如期徃與鮪交馬語鮪輕􅀐詣彭降彭爲殺羊具食鮪身爲降虜}
