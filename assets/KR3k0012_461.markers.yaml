  - {type: variant, offset: 885, length: 294, content: 李兌抵掌而談兌送秦以明月之珠和氏之璧戰國策曰齊宣王因燕喪攻取十城蘇秦為燕說齊王再拜而賀因仰而吊齊王案戈曰何慶吊相隨之速也對曰人之饑所以不食烏喙者以為雖愈饑充腹而與死同患齊乃歸燕城戰國策曰應侯使人召蔡澤蔡澤入曰夫四時之序功成者去君何不歸相印讓賢者授之必有伯夷之廉長為應侯而有喬松之壽孰以禍終此哉應侯曰善乃延入坐為上客又曰楚免淖齒於柱國遊騰為楚王曰秦有上群午者重兵之戰請秦王曰必無與楚戰王曰何也對曰南方火也西方金也金之不勝火亦必矣秦王不聽其戰不勝今午又請秦王必與楚戰南方火西方金也楚正夏中年而免其柱國此所謂內自滅也楚懼復置淖齒又曰齊欲伐魏魏使人請淳於髡曰齊欲伐魏能解患唯先生也淳於髡曰諾遂入說, WYG: ''}
