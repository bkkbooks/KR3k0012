  - {type: variant, offset: 4160, length: 1, content: 格, WYG: 能用也夫功者難成而易敗時者難值而易失時不再來願足下無疑臣之計信猶豫不忍背漢遂謝通通乃陽狂為巫又曰漢三年與項羽相距京索間上數使使勞苦丞相鮑生謂蕭何曰數勞苦君者有疑君心為君計遣君子孫昆弟能勝兵者悉詣軍所上益信君於是何従其計漢王大説又曰項羽擊陳留外黄不下數日降羽悉令男子年十五以上詣城東欲坑之外黄令舎人兒年十三往説羽曰彭越刼外黄外黄恐故降待大王大王至又皆阬之百姓豈有所歸心哉従此以東梁地十餘城皆恐莫肯下矣羽然其言迺赦外黄當坑者而東至睢陽聞之皆爭下又曰漢王至雒陽新城三老董公遮説漢王曰臣聞順徳者昌逆徳者亡兵出無名事故不成故曰}
  - {type: page-break, offset: 4160, content: '', id: KR3k0012_WYG_461-6b, image: WYG0897/WYG0897-0222d.png}
  - {type: variant, offset: 4162, length: 0, content: '', WYG: 其為賊敵乃可服項王為無道放殺其主天下之賊也夫仁不以勇義不以力三軍之衆為之素服以告諸侯為此東伐四海之内莫不仰徳此三王之舉也漢王曰善非夫子無所聞於是漢王為義帝發喪哀臨三日發使告諸侯又曰婁敬齊人也漢五年戍隴西過雒陽帝在焉敬脫輓輅見齊人虞將軍曰臣願見上言便宜虞將軍入言上召見賜食敬説曰陛下都洛陽豈欲與周室比隆哉上曰然敬曰陛下取天下與周異周積徳累善十有餘世武王伐紂成王即位周公之屬𫝊相焉迺營成周都雒陽以為天下中諸侯四方納貢職道里均}
