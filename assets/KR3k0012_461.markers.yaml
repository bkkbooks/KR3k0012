  - {type: punctuation, offset: 4239, content: 「, id: KR3k0012_CHANT_461-bkkpn1260}
  - {type: variant, offset: 4241, length: 0, content: '', krp: 至雒陽新成三老董公遮說漢王曰臣聞順德者昌逆德者亡兵出無名事故不成故曰明其爲賊敵乃可服項王爲無道放殺其主天下之賊也夫仁不以勇義不以力三軍之衆爲之素服以告諸侯爲此東伐四海之内莫不仰德此三王之舉也漢王曰善非夫子無所聞於是漢王爲義帝發䘮哀臨三日發}
  - {type: variant, offset: 4242, length: 1, content: 隨, krp: 告諸侯又曰婁敬齊人也漢五年戍隴西過雒陽帝在焉敬脫輓輅見齊人虞將軍曰臣願見上言便冝虞將軍入言上召見賜食敬說曰陛下都洛陽豈欲周室比隆哉上曰然敬曰陛下取天下與周異周之先積德累善十有餘丗武王伐紂成王即位周公之屬傳相焉乃營成周都雒陽以爲天下中諸侯四方納貢職道里均矣有德則易以王無德則易以亡今陛下與項籍戰滎陽大戰七十小戰四十使天下之民肝䐉塗地哭泣之聲不絶傷疾者未起而欲比隆成康之時臣竊以爲不侔矣且夫秦地𬒳山帶河四塞以爲固卒然有急百萬之衆可具夫與人闘不搤其肮張晏曰亢喉嚨拊其背未能全勝今陛下入関而都按秦之故此亦搤天下之肮而拊其背也高帝即日西都關中又曰陳狶反上自將至邯鄲而韓信謀反關中吕后用蕭}
  - {type: variant, offset: 4244, length: 5, content: 說淮南王隨, krp: 計誅信上巳聞信誅便拜何相國益封五千户令卒五百人一都尉爲相國衛諸君皆賀邵平獨弔謂}
  - {type: punctuation, offset: 4248, content: ，, id: KR3k0012_CHANT_461-bkkpn1261}
  - {type: 'tls:seg', offset: 4248, content: '', id: KR3k0012_CHANT_461-48a.12}
  - {type: punctuation, offset: 4251, content: ：, id: KR3k0012_CHANT_461-bkkpn1262}
  - {type: 'tls:seg', offset: 4251, content: '', id: KR3k0012_CHANT_461-48a.13}
  - {type: punctuation, offset: 4251, content: 『, id: KR3k0012_CHANT_461-bkkpn1263}
  - {type: variant, offset: 4251, length: 0, content: '', krp: 禍自此始矣上暴露於外而君守内非𬒳矢石之難而益君封置衛者以今者淮隂新反於中有疑君心夫置衛君非以寵君也讓封勿受悉以家私財佐軍何從其計上喜恱又曰齊悼惠王時曹叅爲相禮下賢人請蒯通爲客𥘉齊王田榮怨}
  - {type: variant, offset: 4252, length: 2, content: 王伐, krp: 羽謀舉兵叛之}
  - {type: punctuation, offset: 4255, content: ，, id: KR3k0012_CHANT_461-bkkpn1264}
  - {type: 'tls:seg', offset: 4255, content: '', id: KR3k0012_CHANT_461-48a.14}
  - {type: variant, offset: 4255, length: 6, content: 大王宜悉淮南, krp: 處士東郭先生梁石君在刼中強從及田榮敗二人醜}
  - {type: variant, offset: 4262, length: 6, content: 眾為楚軍前鋒, krp: 相與入山深隠居客謂通曰先生之於曹相國拾遺舉過顯賢進能齊國蔑若先生者先生知梁石君東郭先生士俗所不及何不進於相國乎通曰諾臣之里婦與里諸母相善也里婦夜亡肉姑以爲盗怒而逐之婦晨去過所善諸母語以事而謝之里母曰汝安行我}
  - {type: substitution, offset: 4262, original: 眾, replacement: 衆, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-3370}}
