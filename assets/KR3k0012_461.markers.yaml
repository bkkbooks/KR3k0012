  - {type: variant, offset: 3905, length: 2, content: 數困, SBCK: 至雒陽新成三老董公遮􅀃漢王曰臣聞順德者昌逆德者亡兵出無名事故不成故曰明其爲賊敵乃可服項王爲無道放殺其主天下之賊也夫仁不以勇義不以力三軍之衆爲之素服以告諸侯爲此東伐四海之内莫不仰德此三王之舉也漢王曰善非夫子無所聞於是漢王爲義帝發䘮哀臨三日發使告諸侯又曰婁敬齊人也漢五年戍隴西過雒陽帝在焉敬脫輓輅見齊人虞將軍曰臣願見上言便冝虞將軍入言上召見賜食敬􅀃曰陛下都洛陽豈欲周室比隆哉上曰然敬曰陛下取天下與周異周之先積德累善十有餘丗武王伐紂成王即位周公之屬傳相焉乃營成周都雒陽以爲天下中諸侯四方納貢職道里均矣有德則易以王無德則易以亡今陛下與項籍戰}
  - {type: punctuation, offset: 3909, content: 、, id: KR3k0012_CHANT_461-bkkpn1155}
  - {type: variant, offset: 3909, length: 0, content: '', SBCK: 大戰七十小戰四十使天下之民肝䐉塗地哭泣之聲不絶傷疾者未起而欲比隆成康之時臣􅀼以爲不侔矣且夫􅁗地􅀍山帶河四塞以爲固卒然有急百萬之衆可具夫與人闘不搤其肮張晏曰亢喉嚨拊其背未能全勝今陛下入関而都按􅁗之故此亦搤天下之肮而拊其背也高帝即日西都􅀜中又曰陳狶反上自將至邯鄲而韓信謀反關中吕后用蕭何計誅信上巳聞信誅便拜何相國益封五千户令卒五百人一都尉爲相國衛諸君皆賀邵平獨弔謂何曰禍自此始矣上􅁀露於外而君守内非􅀍矢石之難而益君封置衛者以今者淮隂新反於中有疑君心夫置衛君非以寵君也讓封勿受悉以家私財佐軍何從其計上喜恱又曰齊悼惠王時曹叅爲相禮下賢人請蒯通爲客􅀄齊王田榮怨項羽謀舉兵叛之齊處士東郭先生梁石君在刼中強從及田榮敗二人醜之相與入山􅀷隠居客謂通曰先生之於曹相國拾遺舉過顯賢進能齊國蔑􅀂先生者先生知梁石君東郭先生士俗所不及何不進於相國乎通曰諾臣之里婦與里諸母相善也里婦夜亡􅁏姑以爲盗怒而逐之婦晨去過所善諸母語以事而謝之里母曰汝安行我今令而家追汝矣即束藴請火於亡􅁏家曰昨暮犬夜得􅁏争闘相殺請火治之亡􅁏家遽追呼其婦故里女非談􅀃之士也束藴乞火非還婦之道也然物有相感事有適可臣請乞火於曹相國曰婦人有夫死三日而嫁者有幽居守寡不岀門者足下即求婦何取曰不取嫁者通曰然則求臣亦猶是也彼東郭先生梁石君齊之俊士隠居不嫁未甞卑節下意以求仕也願足下使人禮之曹相國曰敬受命皆以爲上賔又曰􅀽盎逢丞相申屠嘉下車拜謁丞相從車上謝盎還媿其吏廼之丞相舎上謁求見丞相曰且陛下從代來毎朝郎官者上書䟽未甞不正輦受其言言不可用置之言可採未甞不稱善何也欲以致天下賢士日聞所不聞以益聖今君自閉鉗天下之口而日益愚夫以聖主責愚相君受禍不乆矣丞相乃再拜曰嘉鄙人迺不知將軍幸教引與之坐爲上客范曄後漢書曰更始尚書令謝躬留魏郡太守陳康守鄴自率諸將擊五萊賊丗祖因躬在外乃使呉漢襲其}
  - {type: page-break, offset: 3909, content: '', id: KR3k0012_SBCK_461-5a}
  - {type: page-break, offset: 3909, content: '', id: KR3k0012_SBCK_461-5b}
  - {type: page-break, offset: 3909, content: '', id: KR3k0012_SBCK_461-6a}
  - {type: variant, offset: 3910, length: 2, content: 皋酈, SBCK: 漢先令辯士說陳康曰蓋聞之上智不處危以僥倖中智能因危以爲功下愚安於危以自亡之智在人所由不可不察今京師敗亂四方雲擾公所聞也蕭王兵強士附河北歸命公所見也謝躬内背蕭王外失衆心公所知也公今據􅀌危之城待㓕亡之禍義無所立節無所成不􅀂開門内軍轉禍爲福免下愚之敗収中智之功此計之至者也康然之於是開門内漢又曰􅀽紹奔兾州董卓購募求紹時侍中周秘城門校尉伍瓊等隂爲紹說卓曰夫廢立大事非常人所及􅀽紹不識大體恐懼岀奔非有它志今急購之勢必爲變􅀽氏樹恩四丗門}
  - {type: page-break, offset: 3910, content: '', id: KR3k0012_SBCK_461-6b}
  - {type: punctuation, offset: 3911, content: ，, id: KR3k0012_CHANT_461-bkkpn1156}
  - {type: 'tls:seg', offset: 3911, content: '', id: KR3k0012_CHANT_461-44a.4}
  - {type: variant, offset: 3913, length: 0, content: '', SBCK: 故吏遍於天下􅀂収豪傑以聚徒衆英雄因之而起則山東非公之有也不如赦之拜一郡守紹喜於免罪必無患矣卓以爲然乃遣授紹渤海太守又曰􅀽紹以書要公孫瓉以襲兾州収韓馥紹乃使外甥陳留啇幹及頴川荀堪等􅀃馥曰公孫瓉乗勝來南而諸郡應之􅀽車􅀐意未可量也竊爲將軍危之馥懼曰然則爲之柰何堪曰君自料寛仁容衆爲天下所附熟與􅀽氏馥曰不如也臨危叱决智勇邁於人又孰與􅀽氏馥曰不如也世布恩徳天下之蒙其恵又孰與􅀽氏馥曰不如也諶}
