  - {type: punctuation, offset: 3940, content: 『, id: KR3k0012_CHANT_461-bkkpn1166}
  - {type: variant, offset: 3940, length: 0, content: '', SBCK: 國家巳都長安天下大定何用兵爲弇曰青徐之賊銅馬赤眉之屬數十軰軰數十萬衆皆東至海所嚮無前聖公不能辯也敗必不乆帝起坐曰卿失言我擊卿弇曰大王哀厚弇如父子故披赤心爲大王陳事上曰我戲卿耳何以言之弇曰百姓患苦王莽苛刻日乆聞劉氏復興莫不欣喜望風從化而去虎口就慈母倒㦸横矢不足以喻明公首事南破昆陽敗百萬師今復定河北以義征伐表}
