  - {type: variant, offset: 4140, length: 0, content: '', WYG: 今秦與楚境接壤大王誠能聴臣臣請使秦以秦女為大王箕箒之妾長為昆弟之國臣以為計無便於此者楚従其計又曰李斯説秦王曰自孝公以來周室卑微諸侯相兼闗東為六國秦之乗勝於諸侯盖六世矣今諸侯服秦譬若郡縣}
  - {type: page-break, offset: 4140, content: '', id: KR3k0012_WYG_461-3b, image: WYG0897/WYG0897-0221b.png}
  - {type: variant, offset: 4140, length: 2, content: 夫為, krp: 今秦與楚接境壤大王誠能聽臣臣請使秦以秦女爲大王箕箒之妾長爲昆弟之國臣以爲計無便於此者楚}
  - {type: variant, offset: 4141, length: 0, content: '', WYG: 以秦之强大王之賢如老嫗竈上掃除足以滅諸侯成帝業今怠而弗急諸侯復强相聚約従雖有黄帝之資弗能并也秦王聴其計又曰李左車説成安君陳餘曰臣聞韓信涉西河虜魏王擒夏説新喋血閼與今乃輔以張耳議欲下趙以此乗勝而逺鬭其鋒不可當臣聞千里餽糧士有饑色今井陘之道車不得方軌騎不得成列其勢糧食必在其後願足下假臣竒兵三萬人従間道絶其輜重彼前不得鬭退不得還吾竒兵絶其後野無所掠不至十日兩将之頭可致麾下又曰酈食其説齊王曰知天下所歸乎齊王曰天下何歸曰歸漢何以言之曰漢王與項王戮力西面擊秦約先入咸陽者王之項王負約不與而王之漢中又還殺義帝漢王聞之起蜀漢之兵責義帝之罪降城即以侯其将得財即以分其士蜀漢之粟方船而下項王有倍約之名殺義帝之負於人之罪無所忘天下之士歸於漢王可坐而觀今已據敖倉之粟塞成皋之險守白馬之津杜太行之阪距飛狐之口天下後服者先亡王疾下漢王齊國社稷可得而保不下漢王危亡可立而待乃聴酈生又曰髙祖使陸生賜尉佗印}
  - {type: page-break, offset: 4141, content: '', id: KR3k0012_WYG_461-4a, image: WYG0897/WYG0897-0221c.png}
