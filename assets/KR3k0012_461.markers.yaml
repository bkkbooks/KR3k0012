  - {type: page-break, offset: 4295, content: '', id: KR3k0012_WYG_461-15b, image: WYG0897/WYG0897-0227b.png}
  - {type: variant, offset: 4295, length: 8, content: 李斯詣秦會莊襄王, krp: 袁紹奔兾州董卓購募求紹時侍中周秘城門校尉伍瓊等隂爲紹說卓曰夫廢立大事非常人所及袁紹不識大體恐懼岀奔非有它志今急購之勢必爲變袁氏樹恩四丗門生故吏遍於天下若収豪傑以聚徒衆英雄因之而起則山東非公之有也不如赦之拜一郡守紹喜於免罪必無患矣卓以爲然乃遣授紹渤海太守又曰袁紹以書要公孫瓉以襲兾州収韓馥紹乃使外甥陳留啇幹及頴川荀堪等說馥曰公孫瓉乗勝來南而諸郡應之袁車騎意未可量也竊爲將軍危之馥懼曰然則爲之柰何堪曰君自料寛仁容衆爲天下所附熟與袁氏馥曰不如也臨危叱决智勇邁於人又孰與袁氏馥曰不如也世布恩徳天下之蒙其恵又孰與袁氏馥曰不如也諶曰今將軍資三不如之勢乆處其上袁氏一時之傑必不爲將軍下也且公孫提征伐之}
  - {type: variant, offset: 4296, length: 2, content: 斯詣, WYG: 熊說公孫述曰方今四海波蕩匹夫横議將軍割據千里地方十城若奮發盛徳以投天隙霸王之業成矣宜改名號以鎮百姓述曰吾亦慮之公言起我意於是自立為蜀王熊復説述曰今山東饑饉人民相食兵所蔑滅城邑丘墟蜀地沃野千里土壤膏腴果實所生無穀而飽女工之業覆衣天下名材竹幹不可勝用又有魚鹽銀銅之利浮水轉漕之便北據漢中杜褒斜之塗東守巴郡拒扞闗之口地方數千餘里戰士不下百萬見利則出兵而略地無利則堅守而力農東下漢水以窺}
  - {type: page-break, offset: 4296, content: '', id: KR3k0012_WYG_461-16a, image: WYG0897/WYG0897-0227c.png}
  - {type: punctuation, offset: 4299, content: ，, id: KR3k0012_CHANT_461-bkkpn1274}
  - {type: 'tls:seg', offset: 4299, content: '', id: KR3k0012_CHANT_461-49a.4}
  - {type: variant, offset: 4299, length: 3, content: 會莊襄, WYG: 地南順江流以震荆揚所謂用天因地成功之資也君有為之聲聞於天下而名號未定志士狐疑宜即大位使逺人有所依歸述遂自立為天子又曰荆邯見東方漸平兵且西向說公孫述曰兵者帝}
  - {type: page-break, offset: 4299, content: '', id: KR3k0012_WYG_461-16b, image: WYG0897/WYG0897-0227d.png}
  - {type: variant, offset: 4303, length: 4, content: 卒乃求為, WYG: 之大器古今所不能廢也昔}
  - {type: punctuation, offset: 4304, content: ，, id: KR3k0012_CHANT_461-bkkpn1275}
  - {type: 'tls:seg', offset: 4304, content: '', id: KR3k0012_CHANT_461-49a.5}
  - {type: variant, offset: 4304, length: 6, content: 乃求為秦相呂, krp: 其鋒}
  - {type: variant, offset: 4308, length: 5, content: 相呂不韋舍, WYG: 失其守豪傑並起漢祖無有前}
  - {type: variant, offset: 4311, length: 3, content: 韋舍人, krp: 可當夫兾州天下之重資若兩軍並力兵交城下危亡可立而待也夫袁氏將軍之舊且同盟當今之計莫若舉兾州以讓袁氏厚徳將軍公孫瓉}
  - {type: punctuation, offset: 4314, content: 。, id: KR3k0012_CHANT_461-bkkpn1276}
  - {type: 'tls:seg', offset: 4314, content: '', id: KR3k0012_CHANT_461-49a.6}
  - {type: variant, offset: 4314, length: 3, content: 不韋賢, WYG: ''}
  - {type: variant, offset: 4315, length: 1, content: 韋, krp: 能復與之争矣是將軍有讓}
  - {type: punctuation, offset: 4318, content: ，, id: KR3k0012_CHANT_461-bkkpn1277}
  - {type: 'tls:seg', offset: 4318, content: '', id: KR3k0012_CHANT_461-49a.7}
  - {type: variant, offset: 4318, length: 1, content: 任, WYG: 迹立錐之地於戰陣之中躬自奮擊兵破身困數矣然軍敗復合創愈復戰何則死而功成愈於坐而滅亡臣之愚計}
  - {type: variant, offset: 4318, length: 6, content: 任以為郎李斯, krp: 名而身安於太山也願勿有疑馥性怯}
  - {type: variant, offset: 4321, length: 3, content: 郎李斯, WYG: 宜及天下之望未絶豪傑尚可招誘急以此時發國内精兵令田戎據江南之㑹倚巫山之固築壘堅守𫝊檄吳楚長沙已南必隨風而靡今延岑出漢中定三輔天水隴西拱手自服如此海内震揺冀有大利又曰鄧禹聞上安集河北即杖策北渡追及於鄴上欣其至禹進說曰更始雖都闗西今山東未安赤眉青犢之屬動以萬數三輔假號往往羣聚更始既未有所挫而自聴㫁諸將皆庸人崛起志在財幣争用威力朝夕自快非有忠良明智深慮逺圖尊主安民者明公雖藩輔之功猶恐無所於今之計莫如延攬英雄務恱民心立髙祖之業救萬民之命以公而慮天下不足定也上大恱}
  - {type: page-break, offset: 4321, content: '', id: KR3k0012_WYG_461-17a, image: WYG0897/WYG0897-0228a.png}
  - {type: page-break, offset: 4321, content: '', id: KR3k0012_WYG_461-17b, image: WYG0897/WYG0897-0228b.png}
