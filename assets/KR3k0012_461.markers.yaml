  - {type: variant, offset: 848, length: 118, content: 為秦連橫說韓王曰夫違禍而求福計莫如事秦今王西面事秦以攻楚秦王必喜又曰蘇秦說李兌抵掌而談兌送秦以明月之珠和氏之璧戰國策曰齊宣王因燕喪攻取十城蘇秦為燕說齊王再拜而賀因仰而吊齊王案戈曰何慶吊相隨之速也對曰人之饑所以不食烏喙者以為雖愈饑充腹而與, SBCK: 聞􅂫􅁗}
