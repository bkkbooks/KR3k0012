  - {type: variant, offset: 3979, length: 64, content: 也又曰范陽人蒯通說范陽令曰竊聞公之將死故弔然賀得通而生又曰韓非說難曰計利害以難其攻直指是非以飾其身以此相持說之氏也戰國策曰蘇秦說, SBCK: 因病不視事太平御覽卷第四百}
