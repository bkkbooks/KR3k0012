  - {type: punctuation, offset: 3949, content: 『, id: KR3k0012_CHANT_461-bkkpn1173}
  - {type: variant, offset: 3949, length: 0, content: '', SBCK: 天下同苦王氏思漢乆矣更始諸將縱横暴虐所至虜掠百姓失望今專命方面施行恩德夫有桀紂之亂乃見湯武之功民人飢渴易爲充飽冝急分遣官屬狥行郡縣理􅁈結布惠澤上納之又曰隗囂旣立便聘平陵方望爲軍帥望至􅀃􅅝曰足下欲丞天順民輔漢而今起立者乃在南陽王莽尚據長安雖欲以漢爲名其實無所受命將何以見信於衆冝急立髙廟稱臣奉祠所謂神道設教求助民神者也且禮有損益質文無常削地開兆茅茨土堦陛下以致其肅敬雖未備物神明其舎諸嚚從其言又曰蜀郡功曹李熊􅀃公孫􅄒曰方今四海波蕩疋夫撗議將軍割據千里地方十城􅀂奮發盛德以投天隙覇王之業成矣冝改名號以鎮百姓述曰吾亦慮之公言起我意於是自立爲蜀王熊復􅀃述曰今山東飢饉人民相食兵所屬㓕城邑丘墟蜀地沃野千里土壤膏􅃾果實所生無榖而飽女工之業覆衣天下名材竹幹不可勝用又有魚塩銀銅之利浮水轉漕之便北據漢中杜褒斜之塗東守巴郡拒扞關之口地方數千里戰士不下百萬見利出兵而略地無利則堅守而力農東下漢水以窺􅁗地南順江流以震荆楊所謂用天因地成功之資也}
  - {type: page-break, offset: 3949, content: '', id: KR3k0012_SBCK_461-9b}
  - {type: page-break, offset: 3949, content: '', id: KR3k0012_SBCK_461-10a}
  - {type: variant, offset: 3950, length: 0, content: '', SBCK: 有爲之聲聞於天下而名號未定志士狐疑冝即大位使逺人有所依歸述遂自立爲天子又曰荆邯東方漸平兵且西向􅀃公孫述日兵者帝王之大器古今所有不能廢也昔􅁗失其守豪桀並起漢祖無前人之迹立錐之地於戰陣之中躬自奮擊兵破身困數矣然軍敗復合創愈復戰何則死而功成踰於却就於㓕亡臣之愚計以爲冝及天下之望未絶豪傑尚可招誘急以此時發國内精兵令田戎據}
  - {type: variant, offset: 3951, length: 0, content: '', SBCK: 南之㑹􅀝巫山之固築壘堅守傳檄呉楚長沙巳南必隨風而靡今延岑岀漢中定三輔天水隴西拱手自服如此海内震揺兾有大利又曰鄧禹聞上安集河北即杖䇿比渡追及於鄴上欣其至禹進􅀃曰更始雖都關西今山}
  - {type: page-break, offset: 3951, content: '', id: KR3k0012_SBCK_461-10b}
  - {type: variant, offset: 3952, length: 1, content: 楚, SBCK: 未安赤眉青犢之屬動以萬數三輔假號徃徃群聚更始旣未有所挫而自聽斷諸}
  - {type: punctuation, offset: 3954, content: ，, id: KR3k0012_CHANT_461-bkkpn1174}
  - {type: 'tls:seg', offset: 3954, content: '', id: KR3k0012_CHANT_461-45a.5}
  - {type: variant, offset: 3955, length: 2, content: 爭附, SBCK: 庸人屈起志在財弊争用威力朝夕自快非有忠良明智􅀷慮逺圖欲尊主安民者明公雖蕃輔之功猶恐無所於今之計莫如覽延英雖務恱民心立髙祖之業救萬民之命以公而慮天下不足定也上大恱因令左右號禹曰鄧將軍常􅀫止於中與定計議又曰光武以冦恂爲河内太守行大將軍事恂同門生董崇􅀃恂曰上新即位四方未定而}
