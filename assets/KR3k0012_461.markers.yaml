  - {type: variant, offset: 1392, length: 1048, content: 之又曰范睢謂秦王曰大王國之北有甘泉谷口南帶涇渭右隴蜀左關阪戰車千乘奮卒數百萬以秦卒之勇車騎之多以當諸侯譬若放韓盧而逐狡兔也霸王之業可致今反閉關而不敢窺兵於山東者是穰侯為秦謀不忠大王之計又曰秦王謂趙使諒毅曰豹平原君數欺弄寡人趙能煞此兩人則可若不能煞請率諸侯受命邯鄲城下諒毅曰趙豹平原君親寡君之母弟也猶大王之有葉陽涇陽君夫以孝悌聞於天下衣服之便於體膳啗之兼於口未嘗不分與焉衣裘無非大王之服今受大王之嚴令以報敝邑之君不敢弗行無乃傷君之心乎戰國策曰趙且伐燕蘇代為燕謂趙惠王曰今者來過川蚌方出曝而鷸啄其肉蚌掩鷸啄鷸曰今日不雨明日不雨蚌將為脯蚌亦謂鷸曰今日不出明日不出必見死鷸兩者不相捨漁者得而併擒之今趙且伐燕燕趙久相持臣恐強秦之為漁父也故願王熟計之惠王曰善乃止戰國策曰昭陽為楚伐魏移兵而攻齊陳軫為齊王使見昭陽曰今子既貴矣王非置兩令尹也臣竊為公譬之可乎楚有祠錫其舍人酒一巵舍人相謂曰數人飲之不足一人飲之有餘請畫虵先成者飲酒一人虵先成乃左手持巵右手畫虵曰吾能為足為足未成一人虵成奪其巵曰虵故無足子安能為足遂飲其酒畫虵足者終亡其酒公攻魏殺將得八城又移師亦攻齊齊畏公甚公以是名足矣冠之非可重也戰無不勝而不知止者身且死爵且偃猶為虵足也昭陽以為然解軍而歸又曰衛客事魏王三年不得見乃見梧丘先生許之以百金先生曰諾乃見魏王曰吾聞秦出兵未知所之願王專事秦無他計王曰諾客趨出至郭門而返曰臣恐王事秦之晚也夫人於事己者過急於事人者過緩今王於事己緩安能急於事人衛客事王五年不得見臣以是知王緩也魏王趨見衛安曰蘇秦為楚合從說韓王曰夫以韓卒之勇被堅甲帶利劍一人當百不足云也夫以韓卒之勁與王之賢乃欲事秦為天下笑無過此者大王事秦秦必求宜陽成皋今茲效之明年又求之予之則無地以給不予則棄前功而受後禍大王之地有盡而秦之求無厭以有盡之地而應無已之求鄙語曰寧為鷄口不為牛後今西南交臂而事秦何異牛後乎又曰秦王與中期爭論而不勝秦王大怒中期徐行去人為說秦王曰此悍人也中期適遇明君故也遇桀紂必煞之矣王因弗罪又曰秦令樗里疾以車百乘入周周君迎之甚敬楚王怒讓周以其重秦客也游騰為周君謂楚王曰秦者虎狼之國也有獨吞之意周君懼焉楚王乃說也又曰司馬錯與張儀爭論於秦惠王前錯欲伐蜀儀曰不如伐韓王問其說對曰親魏善楚下兵三川塞轘轅緱氏之口當屯留之道此王業也又曰惠施為韓魏交令太子鳴質於齊王欲見朱倉謂王曰何不稱病臣請說晏子曰魏王之年長矣今有病公不如歸太子以德之不然公子高在楚將內而立之是齊抱空質而行不義也王從之太子得還又曰范睢謂秦王曰秦韓之地形相錯如繡秦之有韓若木之蠹為秦害者莫大於韓, WYG: 漢}
