  - {type: 'tls:seg', offset: 4268, content: '', id: KR3k0012_CHANT_461-48a.15}
  - {type: variant, offset: 4269, length: 7, content: 乃提空名以向楚, krp: 令而家追汝矣即束藴請火於亡肉家曰昨暮犬夜得肉争闘相殺請火治之亡肉家遽追呼其婦故里女非談說之士也束藴乞火非還婦之道也然物有相感事有適可}
  - {type: punctuation, offset: 4276, content: ，, id: KR3k0012_CHANT_461-bkkpn1266}
  - {type: 'tls:seg', offset: 4276, content: '', id: KR3k0012_CHANT_461-48a.16}
  - {type: variant, offset: 4277, length: 4, content: 竊為大王, krp: 請乞火於曹相國曰婦人有夫死三日而嫁者有幽居守寡不岀門者足下即求婦何取曰}
  - {type: variant, offset: 4281, length: 0, content: '', WYG: 東封函谷闗此萬世一時也若計}
  - {type: variant, offset: 4282, length: 4, content: 取也淮南, WYG: 及此且畜養士馬據隘自守曠日持久以待四方之變圖}
  - {type: variant, offset: 4283, length: 0, content: '', krp: 嫁者通曰然則求臣亦猶是}
  - {type: punctuation, offset: 4284, content: 。, id: KR3k0012_CHANT_461-bkkpn1267}
  - {type: punctuation, offset: 4284, content: 』, id: KR3k0012_CHANT_461-bkkpn1268}
  - {type: 'tls:seg', offset: 4284, content: '', id: KR3k0012_CHANT_461-48a.17}
  - {type: variant, offset: 4284, length: 2, content: 淮南, krp: 彼東郭先生梁石君齊之俊士隠居不嫁未甞卑節下意以求仕也願足下使人禮之曹相國曰敬受命皆以爲上賔又曰袁盎逢丞相申屠嘉下車拜謁丞相從車上謝盎還媿其吏廼之丞相舎上謁求見丞相曰且陛下從代來毎朝郎官者上書䟽未甞不正輦受其言言不可用置之言可採未甞不稱善何也欲以致天下賢士日聞所不聞以益聖今君自閉鉗天下之口而日益愚夫以聖主責愚相君受禍不乆矣丞相乃再拜曰嘉鄙人迺不知將軍幸教引與之坐爲上客范曄後漢書曰更始尚書令謝躬留魏郡太守陳康守鄴自率諸將擊五萊賊丗祖因躬在外乃使呉漢襲其城漢先令辯士說陳康曰蓋聞之上智不處危以僥倖中智能因危以爲功下愚安於危以自亡之智在人所由不可不察今京師敗亂四方雲擾公所聞也蕭}
  - {type: variant, offset: 4287, length: 6, content: 陰許畔楚與漢, WYG: 不成其弊猶足以霸囂然其計}
  - {type: variant, offset: 4287, length: 5, content: 陰許畔楚與, krp: 兵強士附河北歸命公所見也謝躬内背蕭王外失衆心公所知也公今據孤危之城待㓕亡之禍義無所立節無所成不若開門内軍轉禍爲福免下愚之敗収中智之功此計之至者也康然之於是開門内}
