  - {type: variant, offset: 4158, length: 1, content: 羊, WYG: 主豈可同日道哉兩人亦欲分趙而王時未可耳今兩人名為求王實欲燕殺之此兩人分趙而王夫以一趙尚易燕况以兩賢王左提右挈而責殺王滅燕易矣燕以為然迺歸王養卒為御而歸又曰陸賈説尉他他賜賈橐中裝直千金張晏注曰珠玉之寳也裝裹也又曰魏豹叛漢王漢王謂酈生曰緩頰往説之又曰蒯通知天下權在於韓信欲説令背漢曰臣願披心腹肝膽效愚忠恐足下}
