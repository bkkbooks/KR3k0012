  - {type: variant, offset: 782, length: 94, content: 曹公厚遇之以為豫州牧曹公助先主圍布於下邳生擒布先主復得妻子從曹公還許表先主為左將軍禮之逾重出則同輿入則同席袞術欲經徐州北就袁紹曹公遣先主督朱靈路招要等術未至術病死曹公從容謂先主曰天下英雄唯, WYG: 報}
