  - {type: variant, offset: 1055, length: 779, content: 郊迎以上賓待之先主在荊州數年嘗於表坐起至廁見髀裏肉生慨然䟽悌還坐表怪問備曰平常身不離鞍髀肉皆消今不復騎髀裏肉生日月若馳老將至矣而功業不建是以悲耳一日徐庶謂先主曰諸葛孔明臥龍也將軍豈不欲見乎先主曰可以俱來庶曰此人可就見不可屈致也宜枉駕顧之由是先主遂詣亮廬凡三見之因屏人曰漢室傾頹奸臣竊命孤不度德量力欲仗大義於天下而智術淺短遂用猖蹶然志由未巳君為計將安出亮曰自董卓已來豪傑並起跨州連郡者不可勝計曹操比於袁紹則名微而眾寡操遂能克紹以弱為強非唯天時抑亦人事今操已擁百萬之眾挾天子而令諸侯此誠不可與爭鋒也孫權據有江東已歷三代國險而民附賢能為之用此可與為援而不可圖也荊州北據漢江利盡南海東連吳會西通巴蜀此用武之國也而其主不能守殆天所以資將軍也益州隘塞沃野千里天府之土高祖因之以成帝業劉璋暗弱張魯在北人殷國富而不知恤智能之士思得明君將軍既帝室之冑信義著於四海總攬英雄思賢如渴若跨有荊益保其巖阻西和諸戎南撫夷越結好孫權內修政事天下有變則命上將將荊州之軍以向宛洛將軍身率益州之眾出於秦川百姓孰不簞食壺漿以迎將軍者乎誠如是則霸業可成漢室可興矣先主曰善於是與亮情好日密關羽張飛不悅先主解之曰孤之有孔明如魚之有水也願諸君勿復言十二年曹公北征烏丸先主說表襲許表不能用及曹公南征會表死子琮代立遣使請降先主屯樊城遂將其眾去過襄陽諸葛亮說攻琮荊州可有先主曰荊州臨亡訟我以孤背信自濟死何面目見劉荊州乎吾不忍也琮左右及荊州人多歸先主比到當陽眾且十萬輜重數千雨日行十餘里或謂先主曰宜速行保江陵今雖擁大眾被甲者少若曹公兵至何以拒之先主曰夫濟大事者以人為本今人歸吾何忍棄去是時曹公又以江陵有軍實恐先主據之乃釋輜重輕軍到襄陽聞先主已過曹公將精騎五千急追之一日一夜行三百餘里及於當陽之長坂先主棄妻子與諸葛亮張飛趙云等數十騎走遣諸葛亮自結於孫權權遣周瑜等助之與曹公戰於赤壁大破之焚其舟舩群下推先主為荊州牧治, SBCK: ''}
