  - {type: variant, offset: 2401, length: 2, content: 無情, WYG: 英傑故能自擅江表成鼎峙之業然性多嫌忌果於殺戮暨臻末年彌以滋甚至于讒說殄行𦙍嗣廢斃豈所謂貽厥孫謀以燕翼子者哉後中葉陵遲遂致覆國未必不由此也吳志曰權自陸口遂征合肥未下徹軍還兵皆就路權與凌統甘寧等在津北為魏將張遼所襲統等以死得權權乗駿馬越津渠得去獻帝春秋曰張遼問吳降人向有紫髯將軍長上短下便馬善射是誰降人荅曰是孫㑹稽也張遼及樂進相遇言不早知之急追即獲舉軍嘆恨吳厯曰曹公出濡湏權數挑戰公堅守不出權}
