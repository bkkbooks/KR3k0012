  - {type: variant, offset: 2305, length: 2, content: 諸圍, WYG: 持節領荆州牧封南昌侯權自公安都鄂改名武昌魏文帝踐祚加權九錫封為吳王初權外託事魏而誠心不欵魏欲遣侍中辛毗尚書桓階往與盟誓并徴任子權辭譲不受遂改元為黄武元年臨江拒}
