  - {type: variant, offset: 2676, length: 5, content: 始備以諸葛, WYG: 和子母心不自安因倚權意欲豫自結數稱述全尚女勸權為亮納為妃赤烏十三年和廢權遂立}
  - {type: variant, offset: 2685, length: 0, content: '', WYG: 以全氏為妃權薨太子即尊位大赦改元建興元年冬十月}
  - {type: punctuation, offset: 2687, content: ，, id: KR3k0012_CHANT_118-bkkpn596}
  - {type: 'tls:seg', offset: 2687, content: '', id: KR3k0012_CHANT_118-4a.34}
  - {type: variant, offset: 2687, length: 0, content: '', WYG: 諸葛恪率軍過巢湖城東興十二月魏使將軍諸葛誕等出騎七萬圍東興恪以大兵赴敵大破魏軍太平元年以從弟偏將軍綝為侍中武衛將軍領中外諸軍事二年四月亮臨正殿大赦始親政事又料兵子弟十八已下十五已上得三千餘人選大將子弟年少有勇力者為之將帥亮曰吾立此軍欲與之俱長日於苑中習焉三年亮以綝専恣與太常全尚將軍劉承謀誅綝九月綝以兵取尚遣弟恩攻殺承於蒼龍門外召大臣㑹宫門黜亮為㑹稽王時年十六呉厯曰亮出西苑食生梅使黄門至中藏取蜜蜜中有鼠屎召問藏吏吏叩頭亮問吏曰黄門從汝求蜜耶吏曰向求實不敢與黄門不服侍中刁𤣥張邠啟黄門藏吏辭語不同請付獄推亮曰此易知耳令破鼠屎屎裡燥亮大笑謂𤣥邠曰若久在蜜中中外當俱濕今裡燥必黄門所為黄門首服左右莫不驚悚孫休呉志曰孫休字子烈權第六子也年十三時從中書郎謝慈郎中盛冲受學太元二年正月封琅琊王居虎林四月權薨休弟亮承統諸葛恪秉政不欲諸王在濵江兵馬之處徙休于丹陽郡太守李衡數以事侵休休上書求徙他郡詔徙㑹稽居數嵗夢乘龍上天顧不見尾覺而異之孫亮廢孫綝使宗正孫楷與中書郎董朝迎休休初聞意甚疑楷朝共述所以奉迎本意留一日二夜遂發行至曲阿有老公干休叩頭曰事久變生天下喁喁願陛下速行休善之是日進}
