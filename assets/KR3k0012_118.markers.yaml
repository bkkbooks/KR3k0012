  - {type: variant, offset: 1557, length: 471, content: 二年曹公北征烏丸先主說表襲許表不能用及曹公南征會表死子琮代立遣使請降先主屯樊城遂將其眾去過襄陽諸葛亮說攻琮荊州可有先主曰荊州臨亡訟我以孤背信自濟死何面目見劉荊州乎吾不忍也琮左右及荊州人多歸先主比到當陽眾且十萬輜重數千雨日行十餘里或謂先主曰宜速行保江陵今雖擁大眾被甲者少若曹公兵至何以拒之先主曰夫濟大事者以人為本今人歸吾何忍棄去是時曹公又以江陵有軍實恐先主據之乃釋輜重輕軍到襄陽聞先主已過曹公將精騎五千急追之一日一夜行三百餘里及於當陽之長坂先主棄妻子與諸葛亮張飛趙云等數十騎走遣諸葛亮自結於孫權權遣周瑜等助之與曹公戰於赤壁大破之焚其舟舩群下推先主為荊州牧治公安益州牧劉璋內懷恐懼遣法正迎先主先主留諸葛亮關羽等據荊州將步卒數万人入益州璋推先主行大司馬領司隸校尉先主推璋行鎮西大將軍益州牧璋勑關戍諸將文書勿復關通先主先主大怒進圍成都數十日璋出降蜀中殷盛豐樂先主置酒大饗士卒蜀城中金銀分與將士還其穀帛先主復領益州牧群下尊先主為漢中王還治成都魏文帝稱尊號傳聞漢帝見害先主乃發喪制服追謚曰孝愍皇帝是後建立禮儀上尊號即皇帝位於成都章武元年夏四月大赦改年永安, WYG: ''}
