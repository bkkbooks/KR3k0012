  - {type: variant, offset: 575, length: 0, content: '', krp: 遂治兵於魯陽城進軍討卓卓惮堅猛壯乃遣將軍李􅔸音覺等求和親堅曰卓逆天無道蕩覆王室今不夷汝三族懸示四海則吾死不瞑目豈與汝和耶復進軍大谷距雒九十里卓㝷徙都入關焚雒邑堅至雒修諸陵平塞卓所發掘訖引軍住魯陽𥘉平三年術使堅征荆州擊劉表表遣黄祖逆於樊鄧之間堅破之追渡漢水圍襄陽單馬行峴山爲祖軍士所射殺追謚武烈皇帝兄子賁帥將士衆還就術術復表賁爲豫州刺史堅四子䇿權翊匡孫䇿呉志曰䇿字伯符堅初興義兵䇿將母徙居舒與周瑜相友江淮間人成向之堅薨還葬曲阿巳乃渡居江都䇿舅吴景時爲丹陽太守䇿乃載母徙曲阿興平元年從袁術術甚竒之以堅故部曲還䇿太傳馬日磾音低仗節安集關東辟䇿表拜懷義校尉術常歎曰使術有子如孫郎死復何恨先是劉繇爲楊州刺史楊州舊治壽春壽春術巳據之繇乃渡江治曲阿時吴景尚在丹陽䇿從兄賁又爲丹陽都尉繇至皆迫逐之景賁退舎歴陽繇遣樊能等}
  - {type: variant, offset: 576, length: 0, content: '', SBCK: 江津張英屯當利以距術術以景爲督軍中郎將與賁共將兵擊英等連年不克䇿乃說術乞助景等平定江東術表䇿爲折衝校尉行殄宼將軍兵纔千餘􅀐數十疋賔客願從者數百人比至歴陽衆五千䇿又徙母阜陵渡江轉􅃲所向皆破莫敢當其鋒而軍令整肅百姓懷之䇿爲人羙姿顔好􅀏語性闊逹聽受善於用人是以士民樂爲致死劉繇弃軍遁逃諸郡守皆􅂢城奔走呉人嚴白虎等衆各萬餘人處處屯聚䇿引兵渡浙江據㑹稽乃攻破虎等更置長吏䇿自領㑹稽太守彭城張昭廣陵張紘秦松等爲謀主時􅀽術僣號䇿以書責而絶之曹公表䇿爲討逆將軍封爲吴侯後術死長史楊弘大將張勲等將其衆欲就䇿廬江太守劉勲要擊悉虜之䇿輕軍襲拔廬江勲衆盡降勲與數百人自歸曹公是時􅀽紹方強而䇿并江東曹公乃以弟女配䇿}
  - {type: page-break, offset: 576, content: '', id: KR3k0012_SBCK_118-3a}
  - {type: variant, offset: 576, length: 13, content: 小沛謙病謂別駕縻笁曰非劉備, WYG: 江津張英屯當利以拒術術以景為督軍中郎將與賁共將兵擊英等連年}
