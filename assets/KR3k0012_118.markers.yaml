  - {type: variant, offset: 2691, length: 1, content: 亮, WYG: 乗輿法駕迎於永昌亭綝以兵千人迎於半野拜於道側休下車答拜即日御正殿大赦改元永安元年冬綝一門五侯皆典禁兵權傾人主休聞綝逆謀隂與張布圖計十二月戊辰百寮朝賀公卿升殿詔令武士縛綝即日伏誅五年以衞將軍濮陽興}
  - {type: punctuation, offset: 2695, content: ，, id: KR3k0012_CHANT_118-bkkpn598}
  - {type: 'tls:seg', offset: 2695, content: '', id: KR3k0012_CHANT_118-4a.36}
  - {type: variant, offset: 2695, length: 0, content: '', WYG: 休以丞相興及左將軍張布有舊恩}
  - {type: variant, offset: 2696, length: 0, content: '', WYG: 之}
  - {type: variant, offset: 2697, length: 1, content: 諸, WYG: 事布典宫省興關軍國休鋭意於典籍欲畢覽百家之言又好射雉春夏之間常晨出夜還唯此時舎書休欲與博士祭酒韋曜博士盛冲講論道藝曜冲素皆切直布恐入侍發其隂失令已不得専國因妄飾説以拒遏之休答曰孤之涉學羣書略徧所見不少也其明君暗主奸臣賊子古今賢愚成敗之事無不見也今曜等入但欲與講論書耳不}
  - {type: page-break, offset: 2697, content: '', id: KR3k0012_WYG_118-10b, image: WYG0894/WYG0894-0118b.png}
  - {type: punctuation, offset: 2699, content: ，, id: KR3k0012_CHANT_118-bkkpn599}
  - {type: 'tls:seg', offset: 2699, content: '', id: KR3k0012_CHANT_118-4a.37}
  - {type: variant, offset: 2699, length: 0, content: '', WYG: 從曜等始更受學也縱復如此亦何所損君特當以曜等恐道臣下奸變之事以此不欲令入耳如此之事孤己自備之不須曜等然後乃解也此都無所損君意特有所忌故耳布得詔陳謝重自序述又言懼妨政事休答曰書籍之事患人不好好之無傷也此無所為非而君以為不宜是以孤有所及耳王務學業其流各異不相妨也不圗君今日在事更待此於孤也良所不敢布拜表叩頭休答曰聊相開悟耳何至叩頭乎如君之忠誠逺近所知往者所以相感今日之嵬嵬也詩云靡不有初鮮克有終終之實難君其終之初休為王時布為左右将督素見信愛及至踐祚厚加寵待専擅國勢多行無禮自嫌瑕短懼曜冲言之故尤患忌休雖解此㫖心不能恱更恐其疑懼竟如布意廢其講業不復使冲等入七年七月休薨時年三十謚曰景皇帝江表傳曰休寢疾日不能言乃手書呼丞相濮陽興入令子􅓣出拜之休把興臂指􅓣以托之也襄陽記曰李衡為丹陽太守時休在郡治衡數以法繩之妻習氏每諫衡不從㑹休立衡懼謂妻曰不用卿言以至於此遂欲奔魏妻曰琅琊王素好善慕名方欲自顯於天下終不以私嫌殺君明矣可自囚詣獄如此乃當逆見優饒非但直活而已衡從之果得無患又加威逺將軍授以啟㦸呉志曰休詔曰丹陽太守李衡以往事之嫌自拘有司夫射鉤斬袪在君為君遣衡還郡勿令自疑孫皓呉志曰孫皓字元宗權孫和之子也一名彭祖字皓宗孫休立封皓為烏程侯遣就國西湖民景養相皓當大貴皓隱而不敢泄休薨是時蜀初亡而交趾㩦叛國内震懼貪得長君左典軍萬或者為烏程令與皓相善稱皓才識明斷是長沙桓王之儔也又加之好學奉尊法度屢言之於丞相濮陽興左將軍張布布興說休妃太后朱欲以皓為嗣朱曰我寡婦人安知社稷之慮茍吳國無隕宗廟有賴可矣於是遂迎立皓時年二十三改元大赦皓既得志麄暴驕盈多忌諱好酒色大小失望興布竊悔之或以語皓十一月誅興布天紀三年冬晉命鎮東將軍司馬伷安東將軍王渾揚州刺史周浚太尉賈充為大都督量宜處要進軍以討之初皓每宴㑹羣臣無不咸令沉醉置黄門郎十人特不與酒侍立終日為司過之吏宴罷之後各奏其闕失罔有不舉大者即加威刑小者輒以為罪後宫千數而采擇未已又激水入宫宫人有不合意者輒殺流之或剥人之面或鑿人之目岑昏險謏貴幸致位九列好興功役衆患所苦是以上下離心莫為皓盡力盖積惡已極不復堪命故也晉軍所至則土崩瓦解而王濬順流將至司馬伷王渾皆臨近境皓用光禄勲薛瑩中書令胡冲等計分遣使奉書於濬濬最先到於是受皓之降解縳焚櫬延}
