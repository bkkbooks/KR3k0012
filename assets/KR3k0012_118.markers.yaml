  - {type: variant, offset: 2364, length: 205, content: 人後司馬文王與後主宴為之作樂故蜀妓傍人皆為感愴而後主喜笑自若王謂賈充曰人之無情乃至於是雖使諸葛亮在亦不能輔之況姜維邪充曰不如是殿下何由并之他日王問禪曰頗思蜀否禪曰此間樂不思蜀也蜀故秘書令郄正聞之求見語禪曰王復問可言先人墳墓遠在隴蜀乃心西悲無日不思因閉其目會王復問禪以此荅王曰何乃似郄正之語也禪驚曰此實如尊命左右皆大笑後薨於洛陽魏略曰始備在小沛不意曹公卒至迫遽棄家屬奔荊州禪時年數歲匿竄隨人西入漢中為人所賣及建安, SBCK: 一}
