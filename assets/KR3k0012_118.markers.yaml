  - {type: variant, offset: 2234, length: 1, content: 七, SBCK: 六吴暦曰亮出西􅁐方食生梅使黄門至中藏取􅁡漬梅􅁡中有䑕屎召問藏吏吏叩頭亮問吏曰黄門從汝求蜜耶吏曰向求實不敢與黄問不服侍中刁玄張邠啓黄門藏吏辤語不同請付獄推亮曰此易知耳令破䑕屎屎裏燥亮大􅀏謂􅀇邠曰􅀂乆在􅁡中中外當俱濕今裏燥必黄門所爲黄門首服左右莫不驚悚孫休吴志曰孫休字子烈權弟六子也年十三從中書郎謝慈郎中盛冲受學太元二年正月封琅耶王居虎林四月權薨休弟亮承統諸􅁑恪秉政不欲諸王在濵江兵馬之處徙休於丹陽郡太守李衡數以事侵休休上書乞徙他郡詔徙㑹稽居數歳夢乗龍上天頋不見尾覺而異之孫亮廢孫綝使宗正孫楷與中書郎董朝迎休休􅀄聞問意疑楷朝具述所奉迎本意留一日一夜發行至曲阿有老公于休叩頭曰事乆變生天下顒顒願陛下速行休善之}
