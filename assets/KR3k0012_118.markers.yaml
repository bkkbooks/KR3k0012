  - {type: variant, offset: 2258, length: 2, content: 鄧艾, SBCK: 孫恩行丞相事率百僚以乗輿法駕迎於永昌亭綝以兵千人迎拜於道側休下車荅拜即日御正殿大赦改元永安元年冬綝一門五侯皆典禁兵權傾人主休聞綝逆謀隂與張布圖計十二月戊辰臘辰百僚朝賀公卿升殿詔令武士􅅞綝即日伏誅五年以衛將軍濮陽興爲丞相休以丞相興及左將軍張布有舊恩委之以事布典宫省興􅀜軍國休銳意於典籍欲畢覽百家之言又好射雉春夏之間常晨出夜還唯此時舎書休欲與博士􅀕酒韋矅博士盛冲講論藝矅冲素皆切真布恐入侍發其隂失令巳不得專因妄飾說以拒遏之休荅曰􅀌之渉學群書略偏所見不少也其明君闇主姧臣賊子古今賢愚成敗之事無不覽也今矅等入但欲與講論書耳不爲從矅等始更受學也縱復如此亦何所損君特當以矅等恐道臣下姧變之事以此不欲令入耳如此事􅀌己自備之不湏矅等然後乃解也此都無所損君意特有所忌故耳布得詔陳謝重自序述又言懼妨政事休荅曰書藉之事患人不好好之無傷也此無所爲非而君以爲不宜是以􅀌有所及聖王務學業其流各異不相妨也不圖君今日在事更行此於􅀌也良甚不敢布拜表叩頭休荅曰聊相開悟耳何至叩頭乎如君之忠誠逺近所知往者所以相感今日之巍巍也詩云靡不有初鮮克有終終之實難君其終之初休爲王時布爲左右將督素見信愛及至踐祚厚加寵待專擅國勢多行無禮自嫌瑕短懼曜冲言之故尤患忌休雖解此旨心不能恱更恐其疑懼竟如布意廢其講業不復使冲等入七年七月休薨時年三十謚曰景皇帝江表傳曰休寢疾日不能言乃手書呼丞相濮陽興入令子􅓣音湾岀拜之休把興手而指􅓣以託之也襄陽記曰李衡爲丹陽太守時休在郡衡}
