  - {type: variant, offset: 792, length: 234, content: 曹公助先主圍布於下邳生擒布先主復得妻子從曹公還許表先主為左將軍禮之逾重出則同輿入則同席袞術欲經徐州北就袁紹曹公遣先主督朱靈路招要等術未至術病死曹公從容謂先主曰天下英雄唯使君與操耳本初之徒不足數也先主方食失匕箸先主據下邳乃殺操徐州刺史曹冑留關羽守下邳身還小沛曹公東征先主敗績曹公盡收其眾虜先主妻子并擒關羽以歸先主走青州青州刺史袁譚先主故茂才也將步騎迎先主先主隨譚到平原譚馳使白紹紹遣將道路奉迎身去鄴二百里與先主相見關羽亡歸先主曹公遣曹仁將騎擊先主先主還紹軍陰欲離紹乃說紹, SBCK: 封}
