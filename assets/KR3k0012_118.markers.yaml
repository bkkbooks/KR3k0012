  - {type: variant, offset: 2710, length: 2, content: 亮亦, WYG: 好作爾汝歌頗能不時方飲酒因舉觴勸帝而言曰昔與汝隣國今為汝作臣上汝一杯酒令汝壽長春帝悔之呉志曰皓之淫刑所濫殞斃流黜者盖不可勝數是}
