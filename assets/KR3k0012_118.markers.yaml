  - {type: variant, offset: 2261, length: 3, content: 道並攻, SBCK: 以法繩之妻習氏毎諫衡衡不從㑹休立衡懼謂妻曰不用卿言以至於此遂欲奔魏妻曰琅邪王素好善慕名方欲自顯於天下終不以􅀻嫌殺君明矣可自囚詣獄如此乃當逆見優饒非但直活而巳衡從之果得無恙又加威逺將軍授以棨㦸吴志曰休詔曰丹陽太守李衡以往事之嫌自拘有司夫射鈎斬祛在君爲君遣衡還郡勿令自疑孫皓吴志曰孫皓字元宗權孫和之子也一名彭祖字皓宗孫休立封皓爲烏程侯遣就國西湖民景養相皓當大貴皓隂喜而不敢泄休薨是時蜀􅀄亡而交阯携叛國内震懼貪得長君左典軍萬彧昔爲烏程令與皓相善稱皓才識明断是長沙桓王之儔又加之好學奉遵法度屢言之於丞相濮陽興左將軍張布布興􅀃休妃太后朱欲以皓爲嗣朱曰我寡婦人安和社稷之慮苟吴國無隕宗廟有頼可矣於是遂迎立皓時年二十三改元大赦皓旣得志麄暴驕盈多忌諱好酒色大小失望興布竊悔之或以語皓十一月誅與布天紀三年冬晉命鎭東將軍司馬伷音宙安東將軍王渾楊州刺史周浚太尉賈充爲大都督量宜處要􅀔之中􅀄皓毎宴㑹羣臣無不咸令沉醉置黄門郎十人特不與酒侍立終日爲司過之史宴罷之後各奏其闕失罔有不舉大者即加威刑小者咸以爲罪後宫千數而采擇無巳激水入宫宮人有不合意者輒殺流之或剥人靣或鑿人眼岑昏險䛕貴幸致位九列好興功役衆所患苦是以上下離心莫爲皓盡力蓋積惡巳熟不復堪命故也晉軍所至則土崩瓦解而王濬順流司馬伷王渾皆臨近境皓}
