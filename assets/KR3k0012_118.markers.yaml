  - {type: variant, offset: 991, length: 565, content: 百里與先主相見關羽亡歸先主曹公遣曹仁將騎擊先主先主還紹軍陰欲離紹乃說紹南連荊州收劉表紹遣先主將本兵至汝南遣麋笁孫乾與劉表相聞表自郊迎以上賓待之先主在荊州數年嘗於表坐起至廁見髀裏肉生慨然䟽悌還坐表怪問備曰平常身不離鞍髀肉皆消今不復騎髀裏肉生日月若馳老將至矣而功業不建是以悲耳一日徐庶謂先主曰諸葛孔明臥龍也將軍豈不欲見乎先主曰可以俱來庶曰此人可就見不可屈致也宜枉駕顧之由是先主遂詣亮廬凡三見之因屏人曰漢室傾頹奸臣竊命孤不度德量力欲仗大義於天下而智術淺短遂用猖蹶然志由未巳君為計將安出亮曰自董卓已來豪傑並起跨州連郡者不可勝計曹操比於袁紹則名微而眾寡操遂能克紹以弱為強非唯天時抑亦人事今操已擁百萬之眾挾天子而令諸侯此誠不可與爭鋒也孫權據有江東已歷三代國險而民附賢能為之用此可與為援而不可圖也荊州北據漢江利盡南海東連吳會西通巴蜀此用武之國也而其主不能守殆天所以資將軍也益州隘塞沃野千里天府之土高祖因之以成帝業劉璋暗弱張魯在北人殷國富而不知恤智能之士思得明君將軍既帝室之冑信義著於四海總攬英雄思賢如渴若跨有荊益保其巖阻西和諸戎南撫夷越結好孫權內修政事天下有變則命上將將荊州之軍以向宛洛將軍身率益州之眾出於秦川百姓孰不簞食壺漿以迎將軍者乎誠如是則霸業可成漢室可興矣先主曰善於是與亮情好日密關羽張飛不悅先主解之曰孤之有孔明如魚之有水也願諸君勿復言, WYG: ''}
