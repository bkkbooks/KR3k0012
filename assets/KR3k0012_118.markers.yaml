  - {type: variant, offset: 2311, length: 2, content: 主勑, WYG: 年乃絶七年二月公卿百司皆勸上尊號夏四月夏口武昌並言黄龍鳯凰見丙申祭南郊即皇帝位是日大赦改元黄龍元年追尊父破虜將軍堅為武烈皇帝母貝氏為武烈皇后兄討逆將軍策為長沙桓王六月與蜀為盟九月遷都建業嘉禾四年魏使以馬求易珠璣翡翠玳瑁權曰此皆孤所不用而可得馬何苦而不聽其交易赤烏七年步隲朱}
