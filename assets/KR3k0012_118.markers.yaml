  - {type: variant, offset: 575, length: 0, content: '', SBCK: 遂治兵於魯陽城進軍討卓卓惮堅猛壯乃遣將軍李􅔸音覺等求和親堅曰卓逆天無道蕩覆王室今不夷汝三族懸示四海則吾死不瞑目豈與汝和耶復進軍大谷距雒九十里卓㝷徙都入􅀜焚雒邑堅至雒修諸陵平塞卓所發掘訖引軍住魯陽􅀄平三年術使堅征荆州擊劉表表遣黄祖逆於樊鄧之間堅破之追渡漢水圍襄陽單馬行峴山爲祖軍士所射殺追謚武烈皇帝兄子賁帥將士衆還就術術復表賁爲豫州刺史堅四子䇿權翊匡孫䇿呉志曰䇿字伯符堅初興義兵䇿將母徙居舒與周瑜相友江淮間人成向之堅薨還葬曲阿巳乃渡居江都䇿舅吴景時爲丹陽太守䇿乃載母徙曲阿興平元年從􅀽術術甚竒之以堅故部曲還䇿太􅀓馬日磾音低仗節安集􅀜東辟䇿表拜懷義校尉術常歎曰使術有子如孫郎死復何恨先是劉繇爲楊州刺史楊州舊治壽春壽春術巳據之繇乃渡江治曲阿時吴景尚在丹陽䇿從兄賁又爲丹陽都尉繇至皆迫逐之景賁退舎歴陽繇遣樊能等}
  - {type: page-break, offset: 575, content: '', id: KR3k0012_SBCK_118-2a}
  - {type: page-break, offset: 575, content: '', id: KR3k0012_SBCK_118-2b}
  - {type: variant, offset: 575, length: 0, content: '', WYG: 堅四子䇿權翊匡孫䇿呉志曰策字伯符堅初興義兵策母徙居舒與周瑜相友江淮間人咸向之堅薨還葬曲阿已乃渡江居江都策舅呉景時為丹陽太守䇿乃載母從曲阿興平元年謁袁術術甚奇之以堅部曲還策太傅馬日磾持節安集關東以禮辟策表拜懐義校尉術嘗嘆曰使術有子如孫郎死復何恨先是劉繇為揚州刺史揚州舊治壽春壽春術已據之繇乃渡江治曲阿時吳景尚在丹陽䇿從兄賁又為丹陽都尉繇至皆迫逐之景賁退舎溧陽繇遣樊能等}
