  - {type: variant, offset: 2860, length: 0, content: '', SBCK: 夲國留其身而忘其親愛其色而傷其心我不取也並還之又曰乹封元年髙麗遣其子入朝陪位於太山之下其年蓋􅂫文死其子男生代爲莫離支與弟建不睦爲其所逐走據國内城使其子獻城詣闕求哀十一月命英國公李勣率郭侍封等以征之二年二月勣至新城謂諸將曰新城是髙麗西境鎮城最爲要害􅀂不先圗餘未易可下遂引兵於城西南據山築柵且攻且守城中窘急數有降者自此所向克捷髙藏及男建將}
