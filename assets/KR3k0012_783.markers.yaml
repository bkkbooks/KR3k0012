  - {type: variant, offset: 1460, length: 231, content: 梁武帝時並來朝貢北史曰隋開皇二十年倭王姓何每宇多利思比孤號河輩雞彌遣使詣闕上令所司訪其風俗使者言倭王以天為兄以日為弟天明時出聽政跏趺坐日坐便理務云委我弟文帝曰此大無義理於是訓令改之王妻姓雞彌沒官有女六七百人名太子為利歌彌多弗利又曰倭國內官有十二等一曰大德次小德次大仁次小仁次大義次小義次大禮次小禮次大智次小智次大信次小信員無定數有軍尼一百二十人猶中國牧宰八十戶置一伊尼翼如今里長也十伊尼翼屬一軍尼又曰倭國男子服飾衣裙襦其袖微小履如屨形漆其上繫之腳人庶多跣足不得用, WYG: ''}
