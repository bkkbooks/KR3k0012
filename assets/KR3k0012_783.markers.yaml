  - {type: variant, offset: 10, length: 1, content: 韓, SBCK: 遼東之東千里其王都於九都之下地方二千里户三萬多山林無源澤其國貧儉土着爲宫室宗廟祠靈星社稷其俗􅁻凶喜㓂抄其國置官有相如軍盧沛者古鄒加尊卑各有等夲􅂢奴部爲王稍微弱今桂婁部代之大家不田作下户給賦稅如奴客好歌舞其人自喜跪拜申一脚與夫餘異行歩皆走又以十月㑹􅀕天名曰東盟有軍事亦􅀕天殺牛觀蹄以占吉凶加着幘如幘無後其小加着折風形如弁無牢獄有罪者即㑹加評議便殺之沒入妻子為奴婢盗一責十二婚姻之法女家作小屋於大屋之後名爲壻屋壻暮至女家户外自名跪拜乞得就女􅀫女家聽之至生子乃將婦歸其俗淫多相奔誘其死葬有槨無棺停喪百日好厚葬積石爲封列種松栢兄死亦報㛐俗有氣力便弓矢刀矛有鎧習戰又有小水㹮俗出好弓其馬小便登山夫餘不能臣也沃沮東􅁾皆屬之其國都依大水而居王莽時發句驪以伐胡不欲行亡出塞爲㓂害奔更名爲下句驪後魏書曰髙句驪者出於夫餘自言光祖朱蒙母河伯母夫餘王􅐬於室中爲日所照引身避之日影又逐旣而有孕生一􅆑大如五􅂛夫餘王弃之與豕豕不食弃之於路牛馬避之又弃之野衆鳥以毛茹之夫餘王剖之不能破遂還其母其母以物裏之置於暖處有一男破殻而出及其長也字之曰朱蒙其俗言朱蒙者善射也夫餘國人以朱蒙非人所生將有異志請除之王不聽命之飬馬朱蒙每私試知其善惡駿者減食令瘦駑者善養令肥夫餘王以肥者自乗以痩者給朱蒙後狩于田以朱蒙善射射給以一矢朱蒙雖一矢殪獸甚多夫餘之臣又謀殺之朱蒙母隂知以告朱蒙朱蒙與烏餘二人弃夫餘}
