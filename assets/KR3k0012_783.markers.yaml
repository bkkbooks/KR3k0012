  - {type: variant, offset: 14, length: 6, content: 海中依山島為, SBCK: 水欲濟無梁夫餘人追之甚急朱蒙告水曰我是日子河伯外孫今日逃走追兵垂及如何得濟於是魚鱉並浮爲之成橋朱蒙得度魚鱉乃解追􅀐不得度朱蒙至普􅄒水遇見三人其一人衣着麻一人着納衣一人着水藻衣與朱蒙至紇􅂛骨城遂}
