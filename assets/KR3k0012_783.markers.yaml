  - {type: variant, offset: 30, length: 2, content: 使驛, SBCK: 置玄莵郡以高句驪爲孫以屬之漢時賜之衣幘朝服皷吹常從玄莵郡受之後稍驕不復詣郡但於東界築小城受之遂名此城爲憤溝婁者句麗城名也又曰公孫度之雄海東也高句麗伯固與之}
