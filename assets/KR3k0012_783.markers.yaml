  - {type: variant, offset: 10, length: 1, content: 韓, WYG: 遼東之東千里其王都於丸都之下方二千里户三萬多山林無源澤其國貧儉土着為宫室宗廟祠靈星社稷其俗吉凶喜冦抄其國置官有相加對盧沛者古雛加尊卑各有等級本涓奴部為王稍微弱今桂婁部代之大家不田作下户給賦稅如奴俗好歌舞其人自喜跪拜申一脚與夫餘異行步皆走十月㑹祭天名曰東盟有軍事亦祭天殺牛觀蹄以占吉凶大加着幘如幘而無後其小加着折風形如弁無牢獄有罪即㑹加評議便殺之没入妻子為奴婢盗一責十二婚姻之法女家作小屋於大屋後名為婿屋婿暮至女家户外自名跪拜乞得就女宿女家聽之至生子乃將婦歸其俗淫汚相奔誘其死葬有槨無棺停喪百日好厚葬積石為封列種松栢兄死亦殺嫂俗有氣力便弓矢刀矛有鎧習戰人有小貊俗出好弓其馬小便登山夫餘不能臣也沃沮濊皆屬之其國都依大水而居王莽時發句驪以伐胡不欲行亡出塞為冦害莽更名為下句驪後魏書曰髙句驪者出於夫餘自言先祖朱蒙母河伯女夫餘王閉於室中為日所照引身避之日影又逐既而有孕生一卵大如五升夫餘王棄之與豕豕不食棄之於路牛馬避之又棄之野衆鳥翼之夫餘王剖之不能破遂還其母其母以物裹之置於煖處有一男破殻而出及其長也字之曰朱䝉其俗言朱䝉者善射也夫餘國人以朱䝉非人所生將有異志請除之王不聽命之養馬朱䝉每私試知其善惡駿者減食令瘦駑者善養令肥夫餘王以肥者自乘瘦者給朱蒙後狩于田以朱蒙善射則給之一矢朱䝉雖一矢殪獸甚多夫餘之臣又謀殺之朱蒙母隂知以告朱蒙與烏引烏違二人棄夫餘}
