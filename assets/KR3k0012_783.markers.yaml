  - {type: variant, offset: 730, length: 1, content: 次, WYG: 云本朱蒙所乘馬種即果下也風俗尚淫不以為愧俗多逰女夫無常人夜則男女羣聚而戲無有貴賤之節有婚姻嫁娶男女相悅即為之男家送猪酒而已無財聘之禮或有受財者人共恥之以為賣婢死者殯在屋内三年擇吉日而葬居父母及夫喪皆三年兄弟三月初終哭泣葬則鼔舞作樂以送之埋訖取死者生時翫好車馬置墓側㑹葬者爭取而去又}
  - {type: page-break, offset: 730, content: '', id: KR3k0012_WYG_783-7a, image: WYG0899/WYG0899-0815a.png}
  - {type: variant, offset: 732, length: 4, content: 彌馬叔次, WYG: 隋開皇中髙麗王元率靺鞈萬餘騎冦遼東西營州總管􅅊世冲擊走之帝大怒命漢王諒為元帥總水陸討之下詔黜其爵位元亦惶懼遣使謝罪上表稱遼東糞土臣元云云上於是罷兵待之如初元亦歲遣朝貢焬帝嗣位天下全盛髙昌王突厥啟人可汗並親詣闕貢獻於是徵元入朝元懼藩禮頗闕大業七年帝將討元罪車駕度遼水止營於遼東又勑諸將髙麗若降即宣撫納不得縱兵入城城將陷賊輒言降諸將奉㫖不敢赴機每先馳奏比報賊守禦亦備復出拒戰如此者三帝不悟由是食盡師老轉輸不繼諸軍多敗績於是班師又}
