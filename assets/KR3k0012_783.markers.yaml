  - {type: variant, offset: 1282, length: 11, content: 自此朝貢不絕至順帝昇明, WYG: 貴者則青羅為冠次以緋羅挿}
  - {type: variant, offset: 1287, length: 1008, content: 絕至順帝昇明二年倭王武遣使上表言自昔祖禰躬擐甲胄跋涉山川不遑寧處東征毛人五十五國西服眾夷六十六國陵平海北九十五國王道融泰廓土遐畿累葉朝宗不愆于歲道過百濟裝飾舩舫而句麗無道圖欲見吞臣亡考濟方欲大舉奄喪父兄使垂成之功不獲一簣今欲練兵甲父凡之志竊自假開府儀同三司其餘咸各假授以勸忠節詔除武使持節督倭新羅任郍加羅秦韓六國諸軍事安東大將軍倭國王至齊建元中及梁武帝時並來朝貢北史曰隋開皇二十年倭王姓何每宇多利思比孤號河輩雞彌遣使詣闕上令所司訪其風俗使者言倭王以天為兄以日為弟天明時出聽政跏趺坐日坐便理務云委我弟文帝曰此大無義理於是訓令改之王妻姓雞彌沒官有女六七百人名太子為利歌彌多弗利又曰倭國內官有十二等一曰大德次小德次大仁次小仁次大義次小義次大禮次小禮次大智次小智次大信次小信員無定數有軍尼一百二十人猶中國牧宰八十戶置一伊尼翼如今里長也十伊尼翼屬一軍尼又曰倭國男子服飾衣裙襦其袖微小履如屨形漆其上繫之腳人庶多跣足不得用金銀為飾故時衣橫幅結束相連而無縫頭亦無冠但垂髮於兩耳上至隋時王始制冠以錦綵為之以金銀鏤花為飾婦人束髮於後亦衣裙襦裳皆有襈纖竹聚以為編草為薦雜皮為表緣以雜文皮文曰倭國兵有弓矢䂎斧漆皮為甲骨為矢鏑雖有兵無征戰其王朝會必陳設儀仗其國樂戶戶可十萬俗殺人強盜及姦皆死盜者計贓酬物無財者沒身為奴自餘輕重或流或杖每訊冤獄不承引者以木壓膝或置小石於沸湯中令所竟者探之云理曲者即手爛或置虵甕中令取之云曲者即螫手人頗恬靜罕爭訟少盜賊樂有五弦琴笛男女多黥面文身沒水捕魚無文字唯刻木結繩後於百濟求得佛經始有文字知卜筮尤信巫覡每至正月一日必射戲飲酒其餘節略與華同好棊博握槊樗蒲之戲氣候溫煖草木冬青土地膏腴水多陸少以水環挂鸕鶿項令入水捕魚日得百餘頭俗無盤俎藉以槲葉性質直有雅風女多男少婚嫁不取同姓男女相悅者即為婚婦入夫家必先跨火乃與夫相見婦人不淫妬死者歛以棺槨親賓就屍歌舞妻子兄弟以白布製服貴人三年殯庶人卜日而瘞及葬置屍舩上陸地牽之或以小輿又曰倭國有阿蘇山其石無故大起接天者俗以為異因行禱祭有如意寶珠其色青大如雞卵夜則有光新羅百濟皆以倭為大國多珍物並仰之恒通使往來又曰隋大業三年倭國王多利思比孤遣朝貢使者曰聞海西菩薩天子重興佛法國書曰日出處天子致書日沒處天子無恙云云帝覽不悅謂鴻臚卿曰夷書有無禮者勿復以聞明年上遣文林郎裴世清使倭國王遣小德何輩台從數百人設儀仗鳴鼓角來迎後十日又遣大禮歌多毗從三百餘騎郊勞既至彼都其王與世清來貢方物此後遂絕, SBCK: 絶}
