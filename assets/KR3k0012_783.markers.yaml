  - {type: variant, offset: 2573, length: 171, content: 因請儒士授經詔四門助教趙玄默就鴻臚寺教之乃遺玄默闊幅布以為束脩之禮題云白龜元年調布人亦疑其偽為此題所得錫賚盡市文籍泛海而還其偏使朝臣仲滿慕中國之風因留不去改姓名為朝衡仕歷左補闕儀王友衡留京師五十年好書籍放歸鄉逗留不去又曰貞元二十一年日本國遣使來朝留學生橘免勢學問僧空海元和元年朝貢使判官高階真人上言前件學生藝業稍成願歸本國便請與臣同歸從之開成, SBCK: ''}
