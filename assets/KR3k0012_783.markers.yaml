  - {type: variant, offset: 780, length: 386, content: 屬女王也自帶方至女國萬二千餘里其俗男子無大小皆黥面文身聞其舊語自謂太伯之後又云自上古以來其使詣中國草傳辭說事或蹲或跪兩手據地謂之恭敬其呼應聲曰噫噫如然諾矣又曰倭國本以男子為王漢靈帝光和中倭國亂相攻伐無定乃立一女子為王名卑彌呼事鬼道能惑眾自謂年已長大無夫壻有男弟佐治國以婢千人自侍唯有男子一人給飲食傳辭出入其居處宮室樓觀城柵守衛嚴峻景初三年公孫淵死倭女王遣大夫難升米等言帶方郡求詣天子朝見太守劉夏送詣京師難升米致所獻男生口四人女生口六人班布二疋詔書賜以雜錦采七種五尺刀二口銅鏡百枚真珠鈆丹之屬付使還又封下倭王印綬女王死大作冢殉葬者百餘人更立男王國中不伏更相殺數千人於是復更立卑彌呼宗女臺舉年十三為王國中遂定其倭國之東渡海千里復有國皆倭種也又有朱儒國在其南人長三四尺去倭國四千餘里又有躶國墨齒國復在其南舩行可一年至南史曰倭國風俗不淫男女皆露髻富貴者以錦綉鄉雜來為帽似中國胡公頭, WYG: 置對盧焉}
