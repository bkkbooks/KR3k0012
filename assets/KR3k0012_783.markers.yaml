  - {type: variant, offset: 2752, length: 0, content: '', SBCK: 云將校閱諸大臣皆來臨視蘇文勒兵盡殺之因馳入王宫殺建武立其弟大陽子臧爲王自立爲莫離支猶中國兵部尚書兼中書令之職也自是專國政蘇文姓泉氏鬚靣甚偉形體魁傑身佩五刀左右莫敢仰視恒令其屬官俯伏於地踐之上馬下亦如之出必先布隊仗導者長呼以辟行人百姓畏避皆自􅄬坈谷太宗聞之遂出師弔伐十九年命刑部尚書張亮為平壤道行軍大揔管領將常何等率江淮嶺硤勁卒四萬戰舩五百艘自菜州汎}
  - {type: variant, offset: 2752, length: 14, content: 海經曰南倭北倭屬倭國在帶方東, WYG: 城云將校閱諸}
  - {type: variant, offset: 2752, length: 0, content: '', krp: 云將校閱諸大臣皆來臨視蘇文勒兵盡殺之因馳入王宫殺建武立其弟大陽子臧爲王自立爲莫離支猶中國兵部尚書兼中書令之職也自是專國政蘇文姓泉氏鬚靣甚偉形體魁傑身佩五刀左右莫敢仰視恒令其屬官俯伏於地踐之上馬下亦如之出必先布隊仗導者長呼以辟行人百姓畏避皆自投坈谷太宗聞之遂出師弔伐十九年命刑部尚書張亮為平壤道行軍大揔管領將常何等率江淮嶺硤勁卒四萬戰舩五百艘自菜州汎}
  - {type: variant, offset: 2753, length: 1, content: 經, SBCK: 趨平壤又以英國公李勣爲遼東道行軍大揔管江夏王道宗爲副率歩􅀐六萬趨遼東兩軍合􅀔太宗親御六軍以㑹之夏四月李勣軍渡遼進攻盖牟城拔之以其城置盖州五月渡遼水詔徹橋梁以堅士卒志帝旣至遼東城下見七卒􅀒檐以填壍者帝分其尤重者於馬上載之從官悚動爭賷以送城下髙麗聞我有抛車飛三百斤石於一里之外者甚懼之乃於城上積木爲戰樓以拒飛石勣列車發石以擊其城所遇盡潰又推撞車撞其樓閣無不傾倒抜其城爲遼州􅀄帝自定州命每十里置一烽屬于遼城與太子約剋遼東當舉烽是日帝命舉烽師次白崖城右衛太將軍李思摩中弩矢帝親爲吮血將士聞之莫不感勵城主孫戊音遂乞降以其城置巖州授伐音爲刺史我軍之渡遼也莫離支遣加户城七百人戍盖牟城李勣盡虜之其人並請隨軍自効太宗謂}
  - {type: page-break, offset: 2753, content: '', id: KR3k0012_SBCK_783-7a}
