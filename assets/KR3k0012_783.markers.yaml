  - {type: variant, offset: 737, length: 5, content: 彌馬獲支次, WYG: 隋大業九年焬帝復親征髙麗勅諸軍以便宜從事諸將分道攻城賊勢日蹙㑹楊𤣥感作亂帝大懼即日六軍並還十年發天下兵㑹賊盜蜂起所在阻絶軍多失期至遼水髙麗亦困弊遣使乞降帝許之頓懷逺鎮受其降仍以俘囚軍實歸至京師南史記}
