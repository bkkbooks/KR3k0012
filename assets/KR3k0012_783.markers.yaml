  - {type: variant, offset: 2365, length: 204, content: 又附新羅奉表以通起居日本國唐書曰日本國者倭國之別種也以其國在日邊故以日本為名或云倭國自惡其名不雅改為日本或云日本舊小國併倭國之地其人入朝者多自矜大不以實對故中國疑焉又云其國界東西南北皆數千里西界南界咸至大海東界北界有大山為限山外即毛人之國長安三年其大臣朝臣真人來貢方物朝臣真人者猶中國戶部尚書冠進德冠其頂為花分而四散身服紫袍以帛為腰帶真人好讀經史解屬文容止溫雅則天宴之於麟德殿授司膳卿放還本國又曰開元初日本國, SBCK: 髙麗王建武}
