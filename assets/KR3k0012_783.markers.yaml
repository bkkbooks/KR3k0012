  - {type: variant, offset: 859, length: 3, content: 倭國本, SBCK: 隋開皇中髙麗王元率靺鞨萬餘􅀐㓂遼東西營州揔管韋丗冲擊走之帝大怒命漢王諒爲元帥揔水陸討之下詔黜其爵位元亦惶懼遣使謝罪上表稱遼東糞土臣元云云上於是罷兵待之如􅀄元亦􅀊遣朝貢煬帝嗣位天下全盛髙昌王突厥啓人可汗並親詣闕貢獻於是徴元入朝元懼蕃禮頗闕大業七年帝將討元罪車駕度遼水止營於遼東又勑諸將髙麗􅀂降即冝撫納不得縱兵入城䧟賊輒言降諸將奉旨不敢赴機毎先馳奏比報賊守禦亦備復出拒戰如此者三帝不悟由是食盡師老轉輸不繼諸軍多敗績於是班師又曰隋大業九年煬帝復親征髙麗勑諸軍}
