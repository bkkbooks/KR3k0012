  - {type: variant, offset: 727, length: 22, content: 伊支馬次曰彌馬叔次曰彌馬獲支次曰奴佳鞮其屬小, SBCK: 􅂫骨多用紫羅爲之飾以金銀服大䄂衫大口袴素皮帶黄革履婦人裙􅃭加􅙦書有五經三史三}
  - {type: variant, offset: 727, length: 2, content: 伊支, WYG: 蘇骨多用紫羅為之飾以金銀服大袖衫大口袴素皮帶黄革履婦人裙襦加襈書有五經三史三國志晉陽秋兵器與中國畧同及春秋校獵王親臨之稅布五疋穀五石逰人則三年一稅十人共細布一疋其刑法峻罕有犯者樂有五絃琴箏篳篥横吹簫鼔之屬吹蘆以和曲每年初聚戲浿水上王乗􅆎轝列羽儀觀之事畢王以衣入水分為左右二部以水石相濺擲喧呼馳逐再三而止性多詭伏言辭鄙穢不簡親疎父子同浴共室寢好歌舞常以十月祭天其公㑹衣服皆以錦繡金銀為飾好蹲踞食用爼豆出三尺}
