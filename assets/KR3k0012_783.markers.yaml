  - {type: variant, offset: 457, length: 4, content: 對馬國戶, SBCK: 柵城南至小海北至舊夫餘人户三倍於前魏時後貢使相尋􅀊致黃金二百斤白銀四百斤又曰後魏文明太后以獻文六宫未備勑璉令薦其女璉奉表云女己以岀求以弟女應􅈲朝廷許焉㑹獻文崩乃止又曰後魏太和十五年璉死其孫雲立復賜以衣冠服物車旗之飾自比􅀊常貢獻至大統十年其王成遣使至西魏朝貢及齊受東魏之禪又朝于齊文宣加成使持節侍中驃􅀐大將軍髙麗王如故又曰北齊天保三年文宣至營州使􅀶陵崔栁使于髙麗求魏末流人勑栁曰􅀂不從者以便冝從事及至不見許栁張目叱之拳擊成墜於牀下成左右雀息不敢動乃謝服柳以五千户反命又曰髙句麗東至新羅西度遼二千里南接百濟北隣靺鞨一}
