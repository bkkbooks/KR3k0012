  - {type: variant, offset: 2751, length: 0, content: '', SBCK: 髙祖感隋末戰士多䧟其地五年賜建書云在此所有髙麗人等己令追括尋即遣送彼處有此國人者立可放還務盡綏育之方共弘仁恕之道於是建武悉搜括華人以禮賔送前後至者萬數髙祖大喜七年遣使徃􅁽建武爲上柱國遼東郡王髙麗王仍將天尊像及道士彼爲之講老子其王及道俗等觀聽者數千人貞觀二年破突厥頡利可汗建武遣使奉賀并上封域圗五年詔遣廣州都督府司馬長孫師往収瘞隋時戰亡骸骨毀髙麗所立京觀又曰貞觀十六年髙麗西部大人盖蘇文有罪其王建武議欲誅之􅂫文乃召部兵於城}
  - {type: page-break, offset: 2751, content: '', id: KR3k0012_SBCK_783-6b}
  - {type: variant, offset: 2751, length: 0, content: '', WYG: 髙祖感隋末戰士多陷其地五年賜建武書云在此所有髙麗人等已令追括尋即遣送彼處有此國人者王可放還務盡綏育之方共𢎞仁恕之道於是建武悉捜括華人以禮賔送前後至者萬數髙祖大喜七年遣使徃冊建武為上柱國遼東郡王髙麗王仍將天尊像及道士徃彼為之講老子其王及道俗等觀聽者數千人貞觀二年破突厥頡利可汗建武遣使奉賀並上封域圖五年詔遣廣州都督司馬長孫師往收瘞隋時戰亡骸骨毁髙麗所立京觀又曰貞觀十六年髙麗西部大人葢蘇文有罪其王建武議欲誅之蘇文乃召部兵於}
