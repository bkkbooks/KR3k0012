  - {type: variant, offset: 3728, length: 224, content: 好生惡殺故麒麟遊其郊野牟子曰昔人不識麟問人荅曰麟如麟問者惡之曾見者曰麟麕身牛尾鹿蹄馬背問者霍然而解何法盛徵祥記曰麒麟者毛蟲之長仁獸也牡曰騏牝曰麟牡鳴曰遊聖牝鳴曰歸和夏鳴曰扶幼秋鳴曰養綏說苑曰麒麟麕身牛尾圓頂一角含仁懷義音中律呂行步中規折旋中矩擇土而後踐位平然後處不群居不旅行紛兮其質文也幽間則循循如也西京雜記曰五柞宮前有梧桐樓樓下皆有石騏驎二枚刊其為文字是秦始皇驪山墓上物也頭高一丈三尺東邊者前腳折折處赤如血父老謂其神皆含血屬䈥焉抱朴子曰麒麟壽千歲, SBCK: ''}
