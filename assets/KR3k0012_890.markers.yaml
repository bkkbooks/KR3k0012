  - {type: punctuation, offset: 15, content: 「, id: KR3k0012_CHANT_890-bkkpn10}
  - {type: variant, offset: 15, length: 431, content: 四足而毛謂之獸說文曰獸守備者也獸足謂之番毳獸細毛也翰獸豪也薦獸所食草也周禮天官上曰獸人掌罟田獸辨其名物罟網也以網搏所當田之獸冬獻狼夏獻麋春秋獻獸物狼膏聚麋膏散聚則溫散則涼以救時之苦也獸物凡獸皆可獻也及狐狸時田則守罟備獸觸攫及弊田令禽注于虞中鄭司農云弊田謂春火弊夏車弊秋羅弊冬徒弊虞中謂虞人釐所田之野及弊田植虞旗於其中致禽而珥焉獸人主令曰眾得禽者置虞人所立虞旗之中當以給四時社廟之祭珥焉者取左耳以致攻若斬首折馘凡祭祀喪紀賓客共其死獸生獸共其完者凡獸入于臘人當乾之皮毛䈥角入于玉府給作器物凡田獸者掌其政令又天官下曰獸醫掌療獸病療獸瘍畜獸之疾病及瘍療同醫凡療獸病灌而行之以節之以動其氣觀其所發而養之療畜獸必灌行之者為其病狀難知灌以緩之且強其氣也節趨聚之節也氣謂脈氣既行之乃以脈視之以知所病凡療獸瘍灌而劀之以發其惡然後藥之養之食之亦先攻之而後養之凡獸之有病者有瘍者使療之死則計其數以進退之又天官上曰內饔辨腥臊羶香之不可食者牛夜鳴則庮羊泠毛而毳羶犬赤股而躁臊鳥皫色而沙鳴貍, SBCK: 犀似}
