  - {type: variant, offset: 3503, length: 2, content: 馬足, SBCK: 重三千斤􅀃文曰兕如野牛青毛其皮堅厚可爲鎧嶓􅃁之上其獸多兕詩曰我姑酌彼兕觥維以不永傷又曰匪兕匪虎率彼曠野又曰旣張我弓旣挾我矢殪彼大兕春秋傳曰犀兕尚多棄甲則郍論語曰虎兕岀於匣檻}
  - {type: page-break, offset: 3503, content: '', id: KR3k0012_SBCK_890-4a}
  - {type: variant, offset: 3503, length: 2, content: 馬足, krp: 重三千斤說文曰兕如野牛青毛其皮堅厚可爲鎧嶓冡之上其獸多兕詩曰我姑酌彼兕觥維以不永傷又曰匪兕匪虎率彼曠野又曰旣張我弓旣挾我矢殪彼大兕春秋傳曰犀兕尚多棄甲則郍論語曰虎兕岀於匣檻}
