  - {type: variant, offset: 447, length: 1275, content: 盲眡而交睫腥馬黑脊而般臂螻腥臊羶香可食者是別其不可食者則所謂者皆臭味也泠毛毛長總結也皫失色不澤美也沙斯也交睫腥腥當為星聲之誤也肉有如米者似星般臂臂毛有文鄭司農云庮朽木臭也螻螻蛄臭也杜子春云盲眡當為望視又夏宮上曰服不氏掌養猛獸而教擾之猛獸虎豹熊羆之屬擾馴也教習使之馴服王者之教無不服凡祭祀共猛獸謂中膳羞者獸人冬獻狼春秋傳曰熊蹯不熟又秋官下曰穴氏掌攻蟄獸各以其物火之蟄獸熊羆之屬冬藏者也將攻之必先燒其所食之物於穴以誘出之乃可得之者也以時獻其珍異皮革又曰囿人掌囿游之獸囿游囿之離宮小苑觀處也牧百獸備養眾物也今掖庭有鳥獸自熊虎孔雀至於狐狸鳧鶴備祭祀喪紀賓客共其生獸死獸之物又司馬職曰中軍以鼙令鼓鼓人皆三鼓群司馬振鐸車徒皆作遂鼓行徒衘枚而進大獸公之小獸私之大獸公之輸於公也小獸私之以自卑也又曰東北曰幽州畜宜四擾四擾馬牛羊豕西北曰并州畜宜五擾五擾馬牛羊犬豕也孟子曰當堯之時天下猶未平洪水橫流汎濫於天下草木暢茂禽獸繁殖五穀不登禽獸偪人獸蹄鳥跡之道交於中國列子曰東方有國人數解六畜語蓋偏智之所得呂氏春秋曰堯以天下讓舜鯀為諸侯怒於堯曰得天之道者為帝得地之道者為三公我得地之道而不以我為三公乃使猛獸欲以為亂比獸之角能以為城舉其尾能以為旌召之不來彷徉於野以患帝舜於是殛之於羽山又曰故享獸不足以盡獸嗜其脯則幾矣幾近然則王者有嗜乎理義也又曰季秋之月菊有黃華豺祭獸戮禽戮殺也淮南子曰猛獸不群鷙鳥不雙又曰毛犢生應龍應龍生建馬建馬生騏驎騏驎生庶獸凡毛者生於庶獸食草者善走而愚食肉者勇敢而悍又曰鳥排虛而飛獸蹠實而走也抱朴子曰稱虞吏者虎也稱當路君者狼也稱令長者老狸稱丈人者兔也稱東王父者麋也稱西王母者鹿也稱三公者馬也稱主人者羊也稱吏者麞也稱人君者猴也稱九卿者猿也稱將軍者老馬也稱姓字者犬也稱陽城公者狐也齊卞彬禽獸決錄曰羊性淫而很豬性卑而率狗性險而出皆指斥當時貴勢羊淫很謂呂文顯豬卑率謂朱隆之狗險出謂呂文庶也異苑曰永康舒壽夫與同里獵於遠山群犬吠深茂異而看之見樹下有一老公長可三尺頭鬚蒙然面縐齒落通身黃衣裁能動搖因問為是何人而來在此直云我有三女姿容美兼多伎藝彈琴賦詩閑究五典舒夫等共縛束令出女公曰我女仍居深房洞庭之中非自往喚不可得也請解我繩當呼女也獵人猶不置俄而變成一獸黃色四足其形似皋又復如狐頸長三尺頭生一角耳高於頂面故類人舒夫等大懼狼狽放解倏忽失處又曰東陽西寺七佛屋太元中龕下有一物出頭如鹿有法獻道人迫而觀之於是吐沫噴洒氣若雲霧至元嘉十四年四月七日此頭復出尋覔其處亦無孔穴年年有聲殷若小雷猛獸十洲記曰漢武帝時月支國獻猛獸一頭形如犬子似狸而色黃帝怪其羸細禿悴問使者何謂猛獸使者對曰猛獸生崑崙食氣飲露帝使使者令猛發聲忽叫如天雷霹靂之聲諸牛羊馬豕犬之屬皆驚駭以付上林苑徑上虎頭溺虎口去十許步虎輒閉目明日失使者及猛獸所在愽物志曰魏武伐蹹頓經白狼山逢師子使格之殺傷甚眾忽見一物從林中出如狸上帝車軛上師子將至便跳上其頭師子伏不敢起遂殺之得師子兒還未至四十里鷄犬皆無鳴吠也後周書曰楊忠嘗從太祖狩於龍門忠獨當一猛獸左挾其腰右拔其舌太祖壯之北臺謂猛獸為揜于因以字之師子說文曰虓師子也爾雅曰狻猊如虥貓食虎豹, SBCK: ''}
