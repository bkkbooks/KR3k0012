  - {type: variant, offset: 3947, length: 3, content: 麒麟壽, WYG: 通天犀角有白理如綎音線者盛米置羣雞中雞啄米至輙驚却故南人名為駭雞也得真角一尺以上刻為魚而衘以入水水常為開方三尺可得息氣水中以其角為义導者得毒藥以此擾之皆生白沫無復毒物則無沫起通天犀所以能殺毒也犀為物食百草之毒及衆木棘角嵗一解藏扵山中人以木如其角代之犀不覺後年輙復解山海經曰琴古之山多白犀蜀王本紀江水為害蜀守李氷作石犀五枚二枚在府中一在市橋下二在水中厭水精因曰石犀里也林邑經紀曰犀行過叢林不通便開口露齒前向直指棘林自開南州異物志曰髙州平縣巨海有大犀其出入有光水為之開劉攸期曰交州有犀角通天向水輙開南州異物志曰犀有特神者角有光耀白日視之如角夜暗之中理皆焠然光由中出望如火炬欲以知此角神異置之草野飛鳥走獸過皆驚昔行野中見一死人鳶鳥欲往啄之毎至其頭輒驚飛去怪而視之其頭中有犀簪近此角也晉郭璞犀贊曰犀之為狀形兼牛豕力無不傾呴無不靡以賄嬰災困乎角掎𫝊咸犀鉤銘曰世稱駭雞之犀有以此鉤見遺者為之銘獸曰元犀處自林麓食惟棘刺體兼五肉或有神異表露以角含精吐英望如華燭置之荒野禽獸莫觸南州異物志曰犀出九徳縣其毛如豕蹄有三甲頭如馬有三角鼻上角長額上角短兕爾雅曰兕似牛說文曰兕如野牛而青其皮堅厚可為鎧嶓冡之上其獸多兕詩曰我姑酌彼兕觥維以不永傷又曰匪兕匪虎率彼曠野又曰既張我弓既挾我矢殪此大兕春秋傳曰犀兕尚多棄田則那論語曰虎兕出扵柙是誰之過與國語曰平公射鴳不死使豎襄摶之失鴳公怒将殺之叔向聞之夕至扵朝君告之叔向曰君必殺之昔吾先君唐叔射兕扵徒林以為大甲以封於晉今君嗣吾先君唐叔射鴳不死搏之不得是揚吾君之恥也君其必速殺之勿令逺聞君忸怩顔厚乃趣舎之戰國策曰楚王遊扵雲夢結駟}
