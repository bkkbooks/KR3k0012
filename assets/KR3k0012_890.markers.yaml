  - {type: punctuation, offset: 3506, content: 《, id: KR3k0012_CHANT_890-bkkpn1081}
  - {type: variant, offset: 3506, length: 3, content: 晉書載, SBCK: 是誰之過與典守者過也國語曰平公射鴳音安不死鴳扈小鳥使堅襄摶之失公怒將殺之叔向聞之夕夕至於朝君告之叔向曰君必殺之昔吾先君唐叔射兕于徒林殪以爲大甲以封于􅀳今君嗣吾先君唐叔射鴳不死􅅮之不得是楊吾君之耻也君其必速殺之勿令逺聞君忸怩顔厚乃趣赦之戰國䇿曰楚王遊於雲夢結駟千乗旌旗蔽日野火之起􅀂雲霓兕虎之聲􅀂雷霆有狂兕王彎弓而射發而殪􅀏曰樂矣今日之遊千秋萬歳之後誰與樂此楚辭曰君王親發兮發射憚青兕憚驚也言懷王是時親自射以言甞從君田獵今狩驚有兕牛而不能制也吕氏春秋曰楚莊王時獵雲夢欲射殺隨兕者申公子培刦音劫王奪而射之王怒曰何其􅁀而不敬也欲誅之左右諫乃止不出三日子培病亡楚與􅀳戰於兩棠之地大勝賞有功者子培之弟請曰人有功於軍旅臣之兄有功於車下臣兄常讀故}
  - {type: page-break, offset: 3506, content: '', id: KR3k0012_SBCK_890-4b}
  - {type: variant, offset: 3506, length: 0, content: '', krp: 是誰之過與典守者過也國語曰平公射鴳音安不死鴳扈小鳥使堅襄摶之失公怒將殺之叔向聞之夕夕至於朝君告之叔向曰君必殺之昔吾先君唐叔射兕于徒林殪以爲大甲以封于}
  - {type: variant, offset: 3507, length: 2, content: 書載, krp: 今君嗣吾先君唐叔射鴳不死搏之不得是楊吾君之耻也君其必速殺之勿令逺聞君忸怩顔厚乃趣赦之戰國䇿曰楚王遊於雲夢結駟千乗旌旗蔽日野火之起若雲霓兕虎之聲若雷霆有狂兕王彎弓而射發而殪笑曰樂矣今日之遊千秋萬歳之後誰與樂此楚辭曰君王親發兮發射憚青兕憚驚也言懷王是時親自射以言甞從君田獵今狩驚有兕牛而不能制也吕氏春秋曰楚莊王時獵雲夢欲射殺隨兕者申公子培刦音劫王奪而射之王怒曰何其暴而不敬也欲誅之左右諫乃止不出三日子培病亡楚與晉戰於兩棠之地大勝賞有功者子培之弟請曰人有功於軍旅臣之兄有功於車下臣兄常讀故}
