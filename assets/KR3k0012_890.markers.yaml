  - {type: variant, offset: 1798, length: 211, content: 如斗司馬彪續漢書曰章和元年安息國遣使獻師子符枝形似麟而無角魏略曰大秦國無盜賊但有師子為害行道不群則不得過也宋書曰宗愨討林邑王范陽邁傾國來逆以具裝被象前後無際愨以為外國有師子威服百獸乃製其形與象相禦象果驚奔眾因此潰亂遂剋林邑蕭子顯齊書曰王敬則晉陵南沙人也母為巫生敬則而胞紫色謂人曰此兒有鼓角相敬則年長兩腋下生乳各長數寸夢騎五色師子後位至太尉尋陽公唐書曰隋大業中有波斯胡人牧駞於俱紛摩地郍之山忽有師子從地踊出人語謂之曰此山西今, SBCK: 腹卑脚}
