  - {type: variant, offset: 3511, length: 1, content: 石, SBCK: 殺隨兕者不岀三日故臣兄刦而殺之果有病死王乃撿故記果有之遂賞子培弟也淮南子曰小國不􅋐於大國之間畏見嫌也兩}
  - {type: variant, offset: 3511, length: 1, content: 石, krp: 殺隨兕者不岀三日故臣兄刦而殺之果有病死王乃撿故記果有之遂賞子培弟也淮南子曰小國不鬪於大國之間畏見嫌也兩}
  - {type: variant, offset: 3513, length: 0, content: '', SBCK: 不􅋐於伏兕之旁畏見食也論衡曰尚父伐紂渡孟津杖􅃏呼曰蒼兕蒼兕按蒼兕水獸也善覆舟因令急渡蒼兕害汝河中有此獸}
  - {type: variant, offset: 3513, length: 0, content: '', krp: 不鬪於伏兕之旁畏見食也論衡曰尚父伐紂渡孟津杖鉞呼曰蒼兕蒼兕按蒼兕水獸也善覆舟因令急渡蒼兕害汝河中有此獸}
