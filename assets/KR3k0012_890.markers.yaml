  - {type: variant, offset: 2174, length: 1266, content: 生以敷至德凡在翾飛蠢動莫不感荷仁恩豈容自菲薄於身而厚資給於獸求之至理必不然矣䟽奏遽停此使十洲記曰聚窟洲在西海中申未地面各方三千里北接崑崙二十六里有師子辟邪鑿齒天鹿長牙銅頭鐵額之獸宋炳師子擊象圖序曰梁伯玉說沙門釋僧吉云嘗從天笁欲向大秦其間忽聞數十里外哮噉之聲驚天怖地頃之但見百獸率走蹌地至絕而四巨象虓焉而至以鼻卷泥自厚塗數尺數噴鼻偶立俄有師子三頭見於山下直搏四象崩血若濫泉巨樹草偃法顯記曰阿育王精舍後立石柱作師子柱內四邊有佛像內外映徹淨若琉璃有外道論師子與沙門爭此住處時沙門理屈於是共誓此處若是沙門住處者當有靈驗作是言已柱頭師子乃大鳴吼見證外道懼怖心服而還國史補曰開元末西域獻師子至安西道中繫於驛樹近井師子哮吼若不自安俄頃風雷大至有龍出井而去虞世南師子賦曰有絕域之神獸因重譯而來擾其為狀也筋骨糺纏殊姿異制闊臆脩尾勁毫柔毳鉤瓜踞牙藏鋒畜銳弭耳宛足伺間借勢暨乎奮鬣舐唇倏來忽往瞋目電曜發聲雷響拉虎吞貔裂犀分象碎隨兕於齦齶齙屈巴虵於指掌踐籍則林麓摧殘哮呼見江河振蕩服猜心與猛氣遂感德以依仁麒麟說文曰麒麟仁獸也馬身牛尾肉角春秋運斗樞曰機星得則麟生春秋保乾圖曰歲星散為麟爾雅曰麟麕身牛尾一角麕居筠切禮記禮運曰天不愛其道地不愛其寶人不愛其情故麒麟在郊藪詩國風麟之趾曰麟之趾振振公子于嗟麟兮左傳曰魯哀公十四年春西狩於大野叔孫氏之車子鉏商獲麟以為不祥以賜虞人仲尼觀之曰麟也然後取之時所未嘗見故怪之為不祥麟仁獸聖王嘉瑞時無明王出而遇獲仲尼悲周道之不興感嘉瑞無應故因魯春秋而修中興之教絕筆於獲麟一句所感而作故所以為終家語曰叔孫氏之車士曰子鉏商車士將車者也子姓也鉏商名也採薪於大野春秋經哀公十四年西狩獲麟愽曰西狩於大野今此日採薪於大野時實自狩鉏商非狩者採薪也而獲麟瑞物時見狩獲故經書西狩獲麟焉折前左足載以歸叔孫以為不祥棄之于郭外傳曰以賜虞人棄之郭外將以賜虞人使人告孔子曰有麇而角者何也孔子往而觀之曰麟也孰為來哉孰為來哉反袂拭面涕泗沾衿叔孫聞之然後取之子貢問曰夫子何泣矣孔子曰麟之至也為明王也出非其時而見害是以傷焉孔叢子曰叔孫氏子鉏商獲麟以為不祥棄之冉有告夫子夫子將觀之泣曰予之於人猶麟之於獸出而死其道窮矣乃歌曰唐虞世兮麟鳳遊今非其時來何求麟兮麟兮我心憂因此幽憤作春秋焉孝經右契曰孔子夜夢豐沛邦有赤煙氣起顏回子夏侶往觀之驅車到楚西北范氏之廟見芻兒捶麟傷其前左足束薪而覆之孔子曰兒汝來姓為誰兒曰吾姓為赤松子孔子曰汝豈有所見乎吾所見一禽如麇羊頭頭上有角其末有肉方以是西走孔子發薪下麟視孔子而蒙其耳吐三卷書孔子精而讀之春秋演孔圖曰蒼之滅也麟不榮也麟木精也麒麟鬥日無光宋均注曰麟木精木生於水故曰陰木氣好土土黃木青故麟色青黃不榮謂見絏也麟龍少陽精鬥作於地則日月亦將爭於上也尚書中候曰黃帝時麒麟在囿毛詩義䟽白麟馬足黃色圓蹄角端有肉音中黃鍾王者至仁則出大戴禮曰毛蟲三百六十而麟為之長禮記曰麟鳳龜龍謂之四靈麟以為畜則獸不狘呼厥反漢書曰終軍從上幸雍獲白麟一角五蹄又得木枝旁出輒復合上異之終軍對曰野獸并角明同本也眾支內附示無外也若此之應殆將有解編髮削左袵襲冠帶要衣裳而蒙至化者焉, SBCK: 食棘}
