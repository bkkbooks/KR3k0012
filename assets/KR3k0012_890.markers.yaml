  - {type: variant, offset: 3951, length: 1, content: 歲, WYG: 乗旌旗蔽日野火之起若電兕虎之聲若雷霆有猛兕王彎弓而射發而殪笑曰樂矣今日之遊千秋萬嵗之後誰與樂此楚辭曰君王親發兮憚青兕吕氏春秋曰荆莊哀王獵於雲夢射隨兕中之申公子培刼王奪而殺之王怒曰何其暴而不敬也欲誅之左右諫乃止不出三月子培病亡楚與晉戰扵兩棠之地大勝賞有功者子培之弟請曰人有功扵軍旅臣之兄有功扵車下臣兄常讀故記曰殺隨兕者不出三月故臣兄懼而爭之果有病死王乃檢故記果有之遂賞子培弟也淮南子曰小國不鬭扵大國之間兩虎不鬭扵伏兕之旁}
