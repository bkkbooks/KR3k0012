  - {type: variant, offset: 3672, length: 0, content: '', SBCK: 髙宗時周澄國遣使上表云訶伽國有白象首垂四牙身運五足象之所在其土必豐旣有威靈又弭災患力兼十象強制百人以水洗牙飲之愈疾請發兵迎取以獻之上謂侍臣曰夫作法於儉其弊猶奢誰能制止故聖人越席以昭儉茅茨以誡奢書云珎禽竒獸不育於國方知無益之源不可不遏朕安用竒象令其逺獻乃勞其使而遣之山海經曰巴蛇食象三歲而岀其骨帝}
  - {type: variant, offset: 3672, length: 0, content: '', krp: 髙宗時周澄國遣使上表云訶伽國有白象首垂四牙身運五足象之所在其土必豐旣有威靈又弭災患力兼十象強制百人以水洗牙飲之愈疾請發兵迎取以獻之上謂侍臣曰夫作法於儉其弊猶奢誰能制止故聖人越席以昭儉茅茨以誡奢書云珎禽竒獸不育於國方知無益之源不可不遏朕安用竒象令其逺獻乃勞其使而遣之山海經曰巴蛇食象三歲而岀其骨帝}
  - {type: variant, offset: 3673, length: 0, content: '', SBCK: 丗紀曰舜葬蒼梧下有群象常爲之耕又云禹葬㑹稽祠下有群象耕田萬歳暦曰成帝咸康六年臨邑王獻象一知跪拜文子云見象之牙知大於牛吕氏青秋曰肉之羙}
