  - {type: punctuation, offset: 3465, content: 『, id: KR3k0012_CHANT_890-bkkpn1062}
  - {type: variant, offset: 3465, length: 26, content: 夫猛獸當塗麒麟恐懼況臣脆弱敢不悚慄何法盛晉中興徵祥說, SBCK: 兕似牛郭璞注}
  - {type: variant, offset: 3465, length: 478, content: 夫猛獸當塗麒麟恐懼況臣脆弱敢不悚慄何法盛晉中興徵祥說曰麟麇身牛尾狼頭一角黃色馬足也晉書載記曰石虎時郡國前後送蒼麟十六白鹿七季龍命司虞張昌往調之以駕芝蓋列乎充庭之乘又曰呂光入姑臧時麟見金澤縣百獸從之光以為己瑞以孝武太元十四年僣即三河王位三國典略曰徐陵東海郯人梁石右衛率摘之子母嘗夢五色雲化而為鳳集左肩上已而誕陵年數歲家人攜之以候寶誌寶誌摩其頂曰天上石麒麟也春秋感精符曰麟一角明海內共一主也王者不刳胎不破卵則出於郊又曰王者德化旁流四表則麒麟臻其囿蔡邕月令章句曰凡麟生於火遊於土故循其母致其子五行之精也視明禮脩則麟臻孫卿子曰古之王者好生惡殺故麒麟遊其郊野牟子曰昔人不識麟問人荅曰麟如麟問者惡之曾見者曰麟麕身牛尾鹿蹄馬背問者霍然而解何法盛徵祥記曰麒麟者毛蟲之長仁獸也牡曰騏牝曰麟牡鳴曰遊聖牝鳴曰歸和夏鳴曰扶幼秋鳴曰養綏說苑曰麒麟麕身牛尾圓頂一角含仁懷義音中律呂行步中規折旋中矩擇土而後踐位平然後處不群居不旅行紛兮其質文也幽間則循循如也西京雜記曰五柞宮前有梧桐樓樓下皆有石騏驎二枚刊其為文字是秦始皇驪山墓上物也頭高一丈三尺東邊者前腳折折處赤如血父老謂其神皆含血屬䈥焉, WYG: 犀駭狐}
