  - {type: variant, offset: 3, length: 1, content: 敘, SBCK: 角古者决訟命觸不直黃帝時有遺帝獬豸者帝問何食何處曰食薦春夏處水澤秋冬處竹箭松筠神異經曰東北荒中有}
  - {type: variant, offset: 3, length: 1, content: 敘, WYG: 角古者决訟命觸不直黄帝時有遺帝獬豸者帝問何食何處曰食薦春夏處水澤秋冬處竹箭松筠神異經曰東北荒中有}
