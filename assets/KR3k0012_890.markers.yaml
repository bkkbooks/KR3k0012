  - {type: variant, offset: 3955, length: 25, content: 蝗蟲飛至萬里麒麟須獻乃達闕而蝗為災麟為瑞麟四足不能, SBCK: 象耕鳥耘虚言也五帝三王皆有功德何獨爲舜禹也蒼梧多象之地㑹稽衆鳥所居象}
  - {type: variant, offset: 3955, length: 3, content: 蝗蟲飛, WYG: 尚父伐紂渡孟津杖鉞呼曰蒼兕蒼兕按蒼兕水獸也善覆舟因令急渡蒼兕害汝河中有此獸時浮出一身九首人見之必能覆舟也謂之蒼兕西都賦曰狂兕觸蹷江賦曰水兕雷咆乎陽侯曹洪與魏文帝書曰若奔兕之逐魯縞未足以喻其易晉郭璞山海經圖贊曰兕維壮獸似牛青黑力無不傾自焚以革皮充武備角助文徳象春秋運斗樞曰瑤光之星散而為象爾雅曰南方之美者有梁山之犀象焉説文曰象長鼻牙南越之大獸三嵗一乳左傳襄四曰象有齒以焚其身賄也又定四曰呉伐楚鍼尹固與王同舟王使執燧象以奔呉師燒火燧繫象尾漢書大宛曰身毒國其人乗象以戰又漢書曰武帝元始二年南越獻馴象能拜隨人意呉志外國傳曰扶南王盤况少而雄傑聞山林有大象輙生捕取之教習乗騎諸國聞而伏之又吳書曰賀齊為新都郡太守孫權出祖道作樂舞象權謂齊曰今定天下都中國使殊俗貢珍狡獸率舞非君而誰也三國典畧曰周軍逼江陵梁人率步騎開枇杷門出戰初嶺南獻二象扵梁}
  - {type: page-break, offset: 3955, content: '', id: KR3k0012_WYG_890-7b, image: WYG0900/WYG0900-0744d.png}
