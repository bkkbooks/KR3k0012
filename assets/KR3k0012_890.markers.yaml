  - {type: variant, offset: 3955, length: 25, content: 蝗蟲飛至萬里麒麟須獻乃達闕而蝗為災麟為瑞麟四足不能, krp: 象耕鳥耘虚言也五帝三王皆有功德何獨爲舜禹也蒼梧多象之地㑹稽衆鳥所居象}
  - {type: variant, offset: 3959, length: 0, content: '', WYG: 是梁王被之以甲束刃扵鼻令崑崙奴馭之以戰楊忠射之二象反走隋書曰劉方授驩州道行軍總管經畧林邑大業元年正月軍至海口林邑王梵志遣兵守險方擊金鼓懼而潰既渡江行三十里賊乗巨象四面而至以弩射象象中瘡却蹂其陣王師力戰賊奔於柵因攻破之俘馘}
  - {type: page-break, offset: 3959, content: '', id: KR3k0012_WYG_890-9a, image: WYG0900/WYG0900-0745c.png}
  - {type: variant, offset: 3960, length: 4, content: 里麒麟須, WYG: 計唐書曰自永徽以來文單國累獻馴象凡三十有二皆豢扵禁中頗有善舞者以備元㑹充庭之餙及徳宗即位曰王者不尚異物不貴難得之貨今官用費而物性不得非宜也放扵荆山之陽又曰高宗時周澄國遣使上表云訶伽國有白象首垂四牙身運五足象之所至其土必豐既有威靈又弭災患力兼十象强制百人以水洗牙飲之愈疾請發兵迎取以獻之上謂侍臣曰夫作法於儉其弊猶奢作法於奢誰能制止故聖人越席以昭儉茅茨以誡奢書云珍禽竒獸不畜扵國方知無益之源不可不遏朕安用象令其逺}
  - {type: page-break, offset: 3960, content: '', id: KR3k0012_WYG_890-9b, image: WYG0900/WYG0900-0745d.png}
  - {type: punctuation, offset: 3961, content: ，, id: KR3k0012_CHANT_890-bkkpn1228}
  - {type: 'tls:seg', offset: 3961, content: '', id: KR3k0012_CHANT_890-50a.6}
  - {type: variant, offset: 3966, length: 1, content: 達, WYG: 勞其使而遣之山海經曰巴蛇食象帝王世紀曰舜塟蒼梧下有羣象為之耕又云禹塟㑹稽祠下有象耕田萬嵗厯曰成帝咸康六年臨邑王獻象一知跪拜文子云見象之牙知大扵牛吕氏春秋曰肉之美者旄象之約高誘注曰旄肉之美者吳錄地理經曰九真郡龎縣多象象生山中郡内及日南饒之江表傳曰孫權遣使詣}
  - {type: page-break, offset: 3966, content: '', id: KR3k0012_WYG_890-10a, image: WYG0900/WYG0900-0746a.png}
  - {type: punctuation, offset: 3968, content: ，, id: KR3k0012_CHANT_890-bkkpn1229}
  - {type: 'tls:seg', offset: 3968, content: '', id: KR3k0012_CHANT_890-50a.7}
  - {type: variant, offset: 3968, length: 2, content: 而蝗, WYG: 獻馴象二頭魏太祖欲知其斤重咸莫能出其理時鄧王沖尚幼乃曰置象大船刻其水痕所至稱物以載之可知也太祖大恱即施行焉又曰魏文帝遣使扵吳求象牙羣以}
  - {type: page-break, offset: 3968, content: '', id: KR3k0012_WYG_890-10b, image: WYG0900/WYG0900-0746b.png}
  - {type: variant, offset: 3971, length: 2, content: 災麟, WYG: 非禮欲不與孫權勅付使者論衡曰象耕鳥耘虛言也五帝三皇皆有功徳何獨}
  - {type: punctuation, offset: 3972, content: ，, id: KR3k0012_CHANT_890-bkkpn1230}
