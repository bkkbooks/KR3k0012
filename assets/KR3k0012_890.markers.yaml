  - {type: variant, offset: 3456, length: 0, content: '', SBCK: 温嶠還武昌至牛渚磯云其水多恠物遂燬犀角而照之見竒形異􅃺或朱衣乗車馬嶠夢人曰與君幽明道別何苦相照書紀年曰夷}
  - {type: variant, offset: 3456, length: 0, content: '', WYG: 溫嶠還武昌至牛渚磯云其水多怪物遂燬犀角而照之見竒形異状或乗車馬著赤衣者嶠其夜夢人曰與君幽明道别何意相照竹書紀年曰夷}
  - {type: page-break, offset: 3456, content: '', id: KR3k0012_WYG_890-3b, image: WYG0900/WYG0900-0742d.png}
  - {type: variant, offset: 3456, length: 0, content: '', krp: 温嶠還武昌至牛渚磯云其水多恠物遂燬犀角而照之見竒形異狀或朱衣乗車馬嶠夢人曰與君幽明道別何苦相照書紀年曰夷}
  - {type: variant, offset: 3457, length: 1, content: 濬, SBCK: 獵于杜林得一犀牛韓詩外傳曰太史南官括至義渠得駭雞犀以獻紂戰國䇿曰張儀爲􅁗破從連橫􅀃楚王楚遣車百乗獻駭雞之犀夜光之璧於􅁗王離騷曰淹芳芷於腐􅆨淹潰腐臭棄駭雞於筐箓箓竹器也范子計然曰犀角岀南郡上價八千中三千下一千淮南萬畢術曰犀角駭狐犀角置狐穴狐去不敢復居也抱朴子曰通天犀角有曰理如綖音線者以盛米置群雞欲啄米至輙驚却故南人名為駭雞也得直角一尺以上刻以爲魚而衘以入水水常為開方三尺可得氣息水中以其角爲義導者得毒藥以此攪之皆生白沬無復毒勢則無沬起也通天犀所以能殺毒也爲物食百草之毒及衆木􅁄歳一解角藏於山中人以木如其角代之犀不􅁴後年輙復解山海經曰琴鼓之山多白犀蜀王夲紀曰江水爲害蜀守李氷作石犀五枚二枚在府中一在市南下二在淵中以厭水精因曰石犀里也林邑國記曰犀行過叢林不通便開口露齒前向直指􅁄林自開南州異物志曰犀如象大色黒頭似豪婦猪食草木也南越志曰髙州}
  - {type: page-break, offset: 3457, content: '', id: KR3k0012_SBCK_890-2b}
  - {type: page-break, offset: 3457, content: '', id: KR3k0012_SBCK_890-3a}
  - {type: variant, offset: 3457, length: 5, content: 濬平吳被謗, WYG: 獵於社林獲犀牛一以歸韓詩外傳曰太師南宫适至義渠得駭雞犀以獻紂戰國策曰張儀為秦破従連横説楚王楚遣百乗獻駭雞之犀夜光之璧扵秦王離騷曰淹芳芷扵腐臭棄駭雞扵筐箓范子計然曰犀角出南郡}
  - {type: variant, offset: 3457, length: 1, content: 濬, krp: 獵于杜林得一犀牛韓詩外傳曰太史南官括至義渠得駭雞犀以獻紂戰國䇿曰張儀爲秦破從連橫說楚王楚遣車百乗獻駭雞之犀夜光之璧於秦王離騷曰淹芳芷於腐臭淹潰腐臭棄駭雞於筐箓箓竹器也范子計然曰犀角岀南郡上價八千中三千下一千淮南萬畢術曰犀角駭狐犀角置狐穴狐去不敢復居也抱朴子曰通天犀角有曰理如綖音線者以盛米置群雞欲啄米至輙驚却故南人名為駭雞也得直角一尺以上刻以爲魚而衘以入水水常為開方三尺可得氣息水中以其角爲義導者得毒藥以此攪之皆生白沬無復毒勢則無沬起也通天犀所以能殺毒也爲物食百草之毒及衆木棘歳一解角藏於山中人以木如其角代之犀不覺後年輙復解山海經曰琴鼓之山多白犀蜀王夲紀曰江水爲害蜀守李氷作石犀五枚二枚在府中一在市南下二在淵中以厭水精因曰石犀里也林邑國記曰犀行過叢林不通便開口露齒前向直指棘林自開南州異物志曰犀如象大色黒頭似豪婦猪食草木也南越志曰髙州}
  - {type: variant, offset: 3459, length: 3, content: 吳被謗, SBCK: 之縣巨海有大犀其岀入有光水爲之開劉欣期交州記曰有犀角通天向水輙開萬震南州異物志曰犀有特神者角有光曜白日視之如角夜暗之中理皆燦然光由中出望如火炬欲知此角神異置之草野飛鳥走獸過皆驚昔行野中見一死人鳶烏欲徃啄之毎至其頭輙驚走飛去恠而視之其頭中有犀簮近此角也劉欣期交州記曰犀岀九德縣其毛如豕蹄有三甲頭如馬有三角鼻}
  - {type: page-break, offset: 3459, content: '', id: KR3k0012_SBCK_890-3b}
