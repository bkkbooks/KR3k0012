  - {type: variant, offset: 3463, length: 0, content: '', SBCK: 角長額上角短􅀳郭璞犀賛曰犀之爲狀形兼牛豕力無不傾呴無不靡以賄嬰災困乎角掎傳咸犀鈎銘曰丗稱雞駭之犀有以此鈎見遺者爲之銘南州異物志曰獸曰􅀇犀處自林麓食唯􅁄刺體兼五􅁏或有神異}
  - {type: variant, offset: 3463, length: 1, content: 表, WYG: 價八千中三千下一千淮南萬畢術}
  - {type: variant, offset: 3463, length: 0, content: '', krp: 角長額上角短晉郭璞犀賛曰犀之爲狀形兼牛豕力無不傾呴無不靡以賄嬰災困乎角掎傳咸犀鈎銘曰丗稱雞駭之犀有以此鈎見遺者爲之銘南州異物志曰獸曰玄犀處自林麓食唯棘刺體兼五肉或有神異}
  - {type: variant, offset: 3464, length: 0, content: '', SBCK: 露以角含精吐烈望如華燭置之荒野禽獸莫觸兕爾雅}
