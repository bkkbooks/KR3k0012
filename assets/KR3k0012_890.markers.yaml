  - {type: punctuation, offset: 8, content: 「, id: KR3k0012_CHANT_890-bkkpn4}
  - {type: variant, offset: 8, length: 0, content: '', SBCK: 騶虞鵲巢之應也鵲巢之化行則人倫旣正朝廷旣治天下純􅀍文王之化則庶􅀋蕃殖蒐田以時仁如騶虞則王道成也彼茁者葭一發五豝于嗟乎騶虞騶虞義}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 騶虞鵲巢之應也鵲巢化行則人倫既正朝廷既治天下純被文王之化則庶類蕃殖蒐田以時仁如騶虞則王道成也彼茁者葭一發五豝于嗟乎騶虞草木蟲魚疏曰騶虞}
  - {type: page-break, offset: 8, content: '', id: KR3k0012_WYG_890-2b, image: WYG0900/WYG0900-0742b.png}
  - {type: variant, offset: 8, length: 0, content: '', krp: 騶虞鵲巢之應也鵲巢之化行則人倫旣正朝廷旣治天下純𬒳文王之化則庶類蕃殖蒐田以時仁如騶虞則王道成也彼茁者葭一發五豝于嗟乎騶虞騶虞義}
  - {type: variant, offset: 9, length: 3, content: 三為群, SBCK: 也白虎異文不食生物有至德之信則應之又草木蟲魚䟽曰騶虞即白虎也文異尾長身不食生物不履生草君王有德則見也尚書大傳曰文王因囚羑里散冝生之於陵氏取恠獸尾倍其身名曰騶虞以獻紂山海經曰騶虞如虎五色貝一曰尾長於身出孟山亦出鳥䑕同穴圍林氏之國日行千里東京賦曰圍林氏之騶虞晉書曰隆安中新野騶虞見宋書曰元嘉二十六年琅邪有白騶虞見二赤虎從之犀}
  - {type: page-break, offset: 9, content: '', id: KR3k0012_SBCK_890-2a}
  - {type: variant, offset: 9, length: 3, content: 三為群, WYG: 白虎黑文尾長扵身不食生物不履生草君王有徳則見也尚書大傳曰文王因囚羑里散宜生詣林氏國取怪獸尾倍其身名曰騶虞以獻紂林氏國有珍獸大若虎五采畢具尾長於身名曰騶吾乗之日行千里晉書曰隆安中新野騶虞見宋書曰元嘉二十六年琅邪有白騶虞見二赤虎従之犀}
  - {type: page-break, offset: 9, content: '', id: KR3k0012_WYG_890-3a, image: WYG0900/WYG0900-0742c.png}
  - {type: variant, offset: 9, length: 3, content: 三為群, krp: 也白虎異文不食生物有至德之信則應之又草木蟲魚䟽曰騶虞即白虎也文異尾長身不食生物不履生草君王有德則見也尚書大傳曰文王因囚羑里散冝生之於陵氏取恠獸尾倍其身名曰騶虞以獻紂山海經曰騶虞如虎五色貝一曰尾長於身出孟山亦出鳥䑕同穴圍林氏之國日行千里東京賦曰圍林氏之騶虞晉書曰隆安中新野騶虞見宋書曰元嘉二十六年琅邪有白騶虞見二赤虎從之犀}
