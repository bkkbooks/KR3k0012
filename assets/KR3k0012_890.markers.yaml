  - {type: variant, offset: 4000, length: 1, content: 儒, krp: 夫十圍之牛爲牧竪所驅長仞之象爲越童所鈎無便故也蔣子萬機論曰莊周婦死而歌夫通性命}
  - {type: variant, offset: 4002, length: 4, content: 說麟為聖, SBCK: 以卑及尊死生不悼不可論也夫象見子皮無逺近必泣周何忍哉慱物志曰南海四象各有雌雄其一雌死百有餘日其雄泥土著身獨不飲酒食肉長吏問其所以輙流涕􅀂有哀狀晉諸公讃曰晉時南越致馴象於臯澤中養之爲作車黄門皷吹數十人令越人􅀐之每正朝大會皆入充庭帝行則以象車導引以試橋梁後象以鼻擊害人有司啓之而殺象象泣血流地不敢動自後朝議以象無益於事悉送還越萬震南洲曰南傳曰扶南}
  - {type: variant, offset: 4002, length: 2, content: 說麟, WYG: 以卑及尊死生不悼周不可論也夫象見子皮無逺近必泣周何忍哉博物志曰南海四象各有雌雄其一雌死有百餘日其雄塗土著身獨不飲食空草長史問其所以輙流淚若有哀狀晉諸公讚曰晉時南越致馴象扵臯澤中養之}
