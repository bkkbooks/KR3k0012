  - {type: variant, offset: 4036, length: 1, content: 羈, WYG: 不爾窮其土得乃已也異苑曰㑹稽張茂字偉康嘗夢大象以問萬推推曰當為大郡守}
  - {type: variant, offset: 4036, length: 1, content: 羈, krp: 不爾窮其主得乃巳也異苑曰會稽張茂字偉康嘗夢大象以問萬推推曰當爲太守}
  - {type: variant, offset: 4038, length: 2, content: 繫兮, SBCK: 不能善夫象者大獸取諸其音獸者守也象以齒焚其身後必爲人所殺茂永昌中爲吴興太守值王敦問鼎執正不移敦遣沈充滅之而取其郡萬震南州異物志曰象之爲獸形體特詭身倍數牛目不逾狶鼻爲口役望頭若尾馴良承教聽言則跪素牙玉㓗載籍所羙服重致逺行如丘徙王韶之始興記曰伊水口有長洲洲廣十里平林蔚然有群象野牛法顯記曰藍國王得佛一分舎利起塔塔傍有池池中有龍常守護有群象以鼻取水􅄂香花而來供養後魏書曰乾陁國好征戰有􅋐象七百頭十人乗一象皆執兵仗象鼻持刀嶺表録異曰廣之屬郡潮循州多野象潮循人或捕得象爭食其鼻云肥脆尤堪作炙或云象肉有十二種象膽不附肝隨月轉在諸肉楚越之間象皆青黒唯西方佛林大食多白象}
