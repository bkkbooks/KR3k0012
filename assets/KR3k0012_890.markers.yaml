  - {type: variant, offset: 3, length: 1, content: 敘, krp: 角古者决訟命觸不直黃帝時有遺帝獬豸者帝問何食何處曰食薦春夏處水澤秋冬處竹箭松筠神異經曰東北荒中有}
  - {type: xml-element, offset: 5, content: '', id: KR3k0012_CHANT_890-bkkxmlele2}
  - {type: xml-element, offset: 5, content: '', id: KR3k0012_CHANT_890-bkkxmlele3}
  - {type: 'tls:seg', offset: 5, content: '', id: KR3k0012_CHANT_890-1a.3}
  - {type: punctuation, offset: 5, content: 《, id: KR3k0012_CHANT_890-bkkpn1}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 如牛一角毛青四足似熊忠直見人􅋐則觸不直聞人論則咋不正名曰獬豸一名任法獸張華曰今御史法冠曰獬豸論衡曰獬豸者一角之羊性識有罪臯繇治獄有罪者令羊觸之臯繇敬羊跪坐事之田俅子曰堯時獲獬豸緝其毛以爲帝帳唐書曰開元二十年有一角神羊産子京兆之冨平縣􅁏角當頂白毛上捧識者以獬豸名之騶虞􅀃文曰白虎黒文尾長於身食自死之􅁏名曰騶虞有志信之德不食人詩}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_890-1b}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 如牛一角毛青四足似熊見人鬭則觸不直聞人論則咋不正名曰獬豸一名任法獸張華曰今御史法冠曰獬豸論衡曰獬豸者一角之羊性識有罪臯繇治獄有罪者令羊觸之臯繇敬羊跪坐事之田捄子曰堯時獲獬豸緝其尾以為帝帳酉陽雜爼曰開元二十一年京兆富平縣産一角神羊肉角當頂白毛上捧識者以獬豸名之騶虞說文曰白虎黑文尾長扵身食自死之肉名曰騶虞有忠信之徳不食人詩}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_890-2a, image: WYG0900/WYG0900-0742a.png}
  - {type: variant, offset: 5, length: 0, content: '', krp: 如牛一角毛青四足似熊忠直見人鬪則觸不直聞人論則咋不正名曰獬豸一名任法獸張華曰今御史法冠曰獬豸論衡曰獬豸者一角之羊性識有罪臯繇治獄有罪者令羊觸之臯繇敬羊跪坐事之田俅子曰堯時獲獬豸緝其毛以爲帝帳唐書曰開元二十年有一角神羊産子京兆之冨平縣肉角當頂白毛上捧識者以獬豸名之騶虞說文曰白虎黒文尾長於身食自死之肉名曰騶虞有志信之德不食人詩}
