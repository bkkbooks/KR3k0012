  - {type: variant, offset: 3514, length: 1, content: 郡, SBCK: 浮岀一身九首人惡畏之未必能覆舟也亦謂之蒼雉西都賦曰狂兕觸蹷江賦曰水兕雷咆乎陽侯曹洪與魏文帝書曰􅀂奔兕之觸魯縞未足以喻其易晉郭璞山海圗賛曰兕惟壯獸似牛青黒力無不傾自焚以革皮充武備角助文徳象春秋運斗樞曰揺光之星散而爲象爾雅曰南方之羙者有梁山之犀象焉􅀃文曰象長鼻牙􅀯越之大獸三歳一乳左傳襄四曰象有齒以焚其身賄也又定上曰吴伐楚鍼尹固與王同舟王使執燧象以奔吴師燒火燧繫象尾使赴吴師漢書大宛傳曰身毒}
