  - {type: variant, offset: 515, length: 0, content: '', WYG: 祭統曰君執圭瓉祼尸大宗執璋瓉亞祼及迎牲左𫝊昭四曰有星孛扵大辰西及漢鄭禆竈言扵子産曰宋衛陳鄭將同日火若我以瓘斚玉瓉鄭必不火子産不與漢書曰王莾加九命秬鬯圭瓉魏志曰天子命魏文踐祚錫命孫權秬鬯圭瓉北史曰于謹受華州刺史賜秬鬯一卣珪瓉副焉白虎通曰圭瓉宗廟之盛}
