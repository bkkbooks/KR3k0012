  - {type: variant, offset: 2373, length: 666, content: 良曰聞將軍有意督過已脫身去間至軍矣故使獻璧羽受之又曰文帝賜尉他書及依佗因使者獻白璧一雙又曰王夫人者趙人幸武帝生子閎夫子死而帝痛之使者拜之曰皇帝謹使使太中大夫明奉璧一賜夫人為齊王太后又曰王莽篡位冠軍張永獻符命銅璧言元后當為宣室丈母後漢書曰驃騎將軍東平王蒼聞朱暉有義行辟為掾正月旦蒼將朝當奉璧賀故事少府給璧是時陰就為少府卿貴驕傲吏不奉法蒼坐朝堂漏且盡而求璧不可得顧謂掾屬曰若之何暉望見就主簿持璧即往給之曰我數聞璧而未嘗見試借觀之主簿授暉暉顧召令使奉之奉之於蒼主簿遽白就就曰朱掾義士勿復求更取璧蒼罷朝謂暉曰掾自視孰與藺相如晉書載記曰燕常山大樹自拔根下得璧七十三光色精奇有異常玉慕容攜以為岳神之命遣其尚書郎叚勤以太牢祀之又石季龍起河橋於靈昌津採石為中濟石無大小下輒隨流用功五百餘万而不成季龍遣致祭沉璧于河俄而所沉璧浮于渚上晏子春秋曰和氏之璧井里之朴耳老子曰雖有拱璧以先駟馬不如坐進此道孫卿子曰聘人以珪問士以璧魯連子曰楚成章華之臺酌諸侯酒魯君先至王悅之與不琢之璧莊子曰孔子問子桑雩曰吾見逐於魯伐樹於宋親而益踈何也對曰子獨不聞假之亡與假國名也林回棄千金之璧負赤子而趍彼以利合者迫窮相棄也天屬者迫窮相收韓子曰楚人和氏得璞玉於荊山而獻之遂名和氏之璧又曰和氏之璧不飾以五采隨侯之珠不飾以黃金其質至美物不足以飾之文子曰聖人不貴赤璧而貴寸陰不布施以求得不高下以相假此古人之德也淮南子曰禹之趍時冠掛不顧故曰不貴尺璧而重寸陰又曰和氏之璧夏后之璜揖讓而進以合欣夜以投人則為恐時與不時又曰得和氏之璧不若以事之所適又曰璧瑗成器礛諸之功礛治玉石抱朴子曰安期先生者賣藥, SBCK: ''}
