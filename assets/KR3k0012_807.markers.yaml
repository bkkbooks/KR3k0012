  - {type: variant, offset: 653, length: 0, content: '', SBCK: 莽加九命秬鬯圭瓉魏志曰天}
  - {type: variant, offset: 654, length: 0, content: '', SBCK: 命魏文踐祚錫命孫權秬鬯圭瓉北史曰于謹受華州刺史賜秬鬯一卣珪瓉副焉白虎通曰圭瓉鬯宗廟之盛禮也瑁音昌尚書顧命曰乃受同瑁王受瑁爲主受同以􅀕周禮冬官下玉人曰天子執瑁四寸以}
  - {type: page-break, offset: 654, content: '', id: KR3k0012_SBCK_807-3b}
  - {type: punctuation, offset: 655, content: ，, id: KR3k0012_CHANT_807-bkkpn233}
  - {type: 'tls:seg', offset: 655, content: '', id: KR3k0012_CHANT_807-8a.11}
  - {type: variant, offset: 655, length: 0, content: '', SBCK: 諸侯玉以君之似梨冠也白虎通曰天子執瑁以朝諸侯瑁之爲言冒也上有所覆下有所冒也􅃢瑚􅀃文曰􅃢瑚色赤生於海中或生於山也孝經援神契曰􅃢瑚鈎瑞寳也神靈滋液百珎寳}
  - {type: variant, offset: 656, length: 2, content: 成周, SBCK: 則見廣雅曰􅃢瑚珠也晉書曰石崇王愷爭豪武帝每助愷甞以珊瑚樹賜之髙二尺許枝柯扶踈丗所罕比愷以示崇崇便以鐵如意撃之應手而碎愷旣惋惜又以爲疾已}
  - {type: variant, offset: 660, length: 4, content: 圭于河津, SBCK: 聲色方厲崇曰不足多恨今還卿乃令左右悉取􅃢瑚有三四尺者六七株條榦絶俗光彩曜日如愷比者甚衆愷怳然自失矣又四夷傳曰大􅁗國一名犁鞬在西海之西其地東西南北各數千里有城邑其地周廻百餘里屋宇以􅃢瑚爲挩而琉璃爲牆璧水精爲柱礎也宋書曰劉勔爲鬱林太守勔旣至隨冝剪定大致名馬并獻􅃢瑚宋紀曰大明六年鬰林郡獻􅃢瑚連理樹南史曰扶南國梁天監二年跋摩復遣使送􅃢瑚佛像并獻方物又曰波斯國有鹹池生􅃢瑚樹長一二尺亦有虎珀馬腦眞珠玟㻁等國内不以爲珎西京􅄂記曰積草池中有珊瑚樹高一丈二尺一夲云三柯上四百六十二條是南越國王趙他所獻號爲􅇏火樹至夜光景昭然漢武故事曰武帝起神堂前庭植玉樹葺􅃢瑚爲枝述異記曰鬰林郡有珊瑚市海客市􅃢瑚處也􅃢瑚碧色生海底一樹數十枝枝間無葉大者髙五六尺尤小者尺餘鮫}
  - {type: page-break, offset: 660, content: '', id: KR3k0012_SBCK_807-4a}
  - {type: page-break, offset: 660, content: '', id: KR3k0012_SBCK_807-4b}
  - {type: punctuation, offset: 663, content: ，, id: KR3k0012_CHANT_807-bkkpn234}
  - {type: 'tls:seg', offset: 663, content: '', id: KR3k0012_CHANT_807-8a.12}
  - {type: variant, offset: 665, length: 0, content: '', SBCK: 云海上有珊瑚宮漢元封二年鬰林郡獻瑞􅃢瑚婦人帝命植於殿前謂之女珊瑚忽一旦柯葉甚茂至靈帝時樹死咸以爲漢室將亡徴也海中經曰􅃢瑚生海中欲取之先作鐵網沉水厎􅃢瑚貫網而生􅀊髙二三尺有枝無葉形如小樹因絞網出之􅃢瑚皆摧折在網中孫氏瑞應圖曰􅃢瑚鈎者王者恭信則見一夲云不珎玩弄則出廣志曰􅃢瑚其長者爲御車柱出西海底玄中記曰􅃢瑚出大􅁗西海中生水中石上􅀄生白一年黄三年赤四年蟲食敗司馬相如上林賦曰玟㻁碧林􅃢瑚藂生班固兩都賦曰􅃢瑚之樹上栖碧雞傅玄紫華賦曰炳叅差以照燿兮何光麗之難形葩艶挺於碧枝兮煥􅀂􅃢瑚之翠英潘安仁石榴賦曰似長離之栖鄧林􅀂􅃢瑚之映緑水瑇瑁周書王㑹曰伊尹謂湯曰請以瑇瑁爲獻孝經援神契曰神明滋液則瑇瑁背宋均日背文也春秋考異郵曰承石取鐵瑇瑁吸􅀋相致也芥也音􅀂史記曰趙使使於春申君欲誇楚爲瑇瑁簮劒器悉飾以瑇瑁又曰江南出丹沙犀象瑇瑁珠璣漢書西域傳賛曰故能覩犀布瑇瑁則建珠崖七郡感蒟醬竹枝則開䍧牱越嶲續漢書輿服志曰貴人助蚕瑇瑁釵范曄後漢書曰賈琮傳云交趾􅁟多珎産明璣翠羽象犀瑇瑁異香美木之屬莫不自出前後刺史率多無清行有司舉琮爲交趾刺史又曰和熹鄧皇后臨朝上方珠玉犀象瑇瑁雕鏤之物皆絶又曰天笁國出象犀玳瑁也呉録曰嶺南盧賔縣漲海中玳瑁似􅀛而大呉録曰魏使以馬求易珠璣翡翠玳瑁孫權曰此皆􅀌所不用而}
  - {type: page-break, offset: 665, content: '', id: KR3k0012_SBCK_807-5a}
  - {type: page-break, offset: 665, content: '', id: KR3k0012_SBCK_807-5b}
  - {type: variant, offset: 666, length: 2, content: 諸河, SBCK: 馬􅀂何而不聽晉命曰士卒百工不得服犀玳瑁齊書曰少帝夜醉乗馬從西歩廊向北馳走如此兩三將倒臨汝侯坦之諫不從執馬椌帝運拳擊垣之着到地坦之與曹道剛扶抱還壽春殿瑇瑁牀}
