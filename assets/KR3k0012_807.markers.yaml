  - {type: variant, offset: 2044, length: 328, content: 五城請易璧遂遣藺相如奉璧西入秦相如見秦王無意償趙城乃前曰璧有瑕請指示王王授璧相如因持璧卻立倚柱怒髮上穿冠謂秦王曰趙王齋戒五日使臣奉璧今大王得璧傳之美人以戲弄臣觀王無意趙王城邑臣復取璧大王必欲急臣頭今與璧俱碎於柱矣王恐其破璧乃辭謝固請相如使從他道以璧還趙又曰張儀已學而游諸侯常從楚相飲已而楚相亡璧門下意儀掠笞數百不服釋之又曰虞卿躡履擔橙一見趙王賜白璧一雙黃金百溢又曰始皇三十年有使者從關東夜過華陰平舒道有人持璧遮使者曰為吾遺滈池君因言曰今年祖龍死使者問其故因忽不見使者奉璧具以聞始皇使御府視璧乃二十八年行渡江所沉璧也漢書曰迺以白鹿皮為弊王侯朝對必以皮弊薦璧又天文志曰日月如合璧五星如連珠又曰沛公從百餘騎見項羽鴻門沛公如廁間道走軍服虔口走音奏使張良謝羽問沛公安, SBCK: ''}
