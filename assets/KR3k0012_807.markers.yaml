  - {type: variant, offset: 1037, length: 3, content: 方為圭, WYG: 京賦曰翡翠不裂玳瑁不簇孫徳施南榴枕賦曰委}
  - {type: variant, offset: 1038, length: 921, content: 為圭之制上小下大狀如梨鋒太玄經曰破璧毀圭逢不幸楚辭曰三璋圭雜於甑窐兮璋圭玉石也窐首攜也楚辭曰三圭重侯三圭謂公侯伯璧說文曰璧瑞玉環也瑗太孔璧也璜半璧也爾雅曰肉倍好謂之璧好倍肉謂之瑗尚書金縢曰周公植璧秉珪乃告大王王季文王曰爾不許我我乃屏璧與珪又顧命曰弘璧琬琰在西序大璧琬琰之圭為二重也尚書中候曰堯沉璧於河白雲起也毛詩淇澳曰有斐君子如金如錫如珪如璧又雲漢曰靡神不舉靡愛斯牲珪璧既卒寧莫我聽周禮春官上大宗伯曰子執穀璧男執蒲璧以蒼璧禮天禮記曲禮下曰操幣圭璧則尚左手又禮器曰束帛加璧尊德也左傳桓公曰鄭伯以璧假許田為周公祊故也又曰疋夫無罪懷璧其罪又僖上曰晉荀息請以屈產之乘與垂棘之璧假道於虞以伐虢又曰楚子圍許許男面縛御璧又曰初申侯有寵於楚文王文王將死與之璧使行曰唯我知汝專利而無猒我死汝必速行又曰秦伯納重耳及河子犯以璧受公子曰臣負羈紲從君於天下臣之罪多矣臣猶知之而況君乎請由此亡公子曰所不與舅氏同心者有如白水投其璧於河又僖中曰晉公子重耳及曹僖負羈之妻饋盤飱寘璧焉公子受飱反璧又文下曰秦伯以璧祈戰于河又成公上曰丑父寢於轏車轏士車蛇出於其下以肱擊之傷而匿之故不能推車而及為韓厥所及欲為右故匿其傷韓厥執縶馬前縶馬絆也執之脩臣僕之職再拜稽首奉觴加璧以進進觴璧亦以示敬又襄三曰諸侯取邾田自漷水歸之於我晉侯先歸公享晉六卿于蒲圃賄荀偃束錦加璧又襄六曰公薨于楚宮叔仲帶竊其拱璧以與御人納諸其懷而從取之由是得罪又襄二十八曰齊人求崔杼之尸將戮之不得叔孫穆子曰必得之武王有亂臣十人崔杼其有乎不十人不足以葬葬必須十人崔氏不能令十人同必得既崔氏之臣曰與我其拱璧崔抒大璧吾獻其柩於是得之又昭四年曰楚子以諸侯滅賴賴子面縛銜璧士袒輿櫬從之造於中軍中軍王所將王問諸椒舉對曰成王克許在僖六年許僖公如是親釋其縛受其璧焚其櫬王從之從舉言遷賴於鄢鄢楚邑又曰楚共王無冢嫡有寵子五人無適立焉乃大有事於群望而祈曰請神擇於五人者使主社稷乃遍以璧見於群望曰當璧而拜者神所立也誰敢違之既乃與巴姬密埋璧於太室之庭使五人齋而長入拜康王跨之靈王肘加焉子干子晳皆遠之平王弱抱入再拜皆壓紐又哀下曰衛人出莊公入於戎州己氏初公自城上見己氏之妻髮美使髡之以為呂姜髢既入焉而視之璧曰活我吾與汝璧己氏曰殺汝璧將焉往遂殺之而取其璧史, SBCK: ''}
