  - {type: variant, offset: 670, length: 1, content: 襄, SBCK: 顧命曰大貝鼖鼓在西房孔安囯注曰大貝如車渠啇周傳寶之毛詩曰萋兮棐兮成是貝錦又義䟽曰具鼊之屬又有紫貝其白質如玉而紫􅀧爲文皆行列相當大者有徑一尺六寸今九眞交趾以爲杯盤寳物也爾雅曰貝居陸者在水者大者魫小者鰿音積今之細貝亦有紫色暏出南玄貝貽貝黑色貝也餘蚳黄白文音治黄質白文也餘泉白黄文以白爲質黄爲文􅀧今之紫貝以紫爲質黒爲文􅀧也蚆愽而者中央廣兩頭銳大而險險者謂汗簿􅜽小而橢即上小貝橢謂狹而長此皆說貝之形容也春秋運斗樞曰瑶光得江吐大貝尚書大傳曰文王囚於姜里散冝生之江淮之浦而得大貝如車渠以獻紂歸藏曰有人將來遺我貨貝以至則徹以求則得有喜則至漢書曰文帝賜南越王尉他書及衣他因使者獻貝五百又曰王莽時大貝四寸八分已上二枚爲一朋直二百一十六壯貝三寸六分已上一朋直百五十分貝二寸四分已上一朋直}
