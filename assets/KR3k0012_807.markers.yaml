  - {type: variant, offset: 2884, length: 213, content: 名和氏之璧又曰和氏之璧不飾以五采隨侯之珠不飾以黃金其質至美物不足以飾之文子曰聖人不貴赤璧而貴寸陰不布施以求得不高下以相假此古人之德也淮南子曰禹之趍時冠掛不顧故曰不貴尺璧而重寸陰又曰和氏之璧夏后之璜揖讓而進以合欣夜以投人則為恐時與不時又曰得和氏之璧不若以事之所適又曰璧瑗成器礛諸之功礛治玉石抱朴子曰安期先生者賣藥於海邊始皇賜之金璧可直數千萬又曰虞舜之承禪也損璧於谷中又曰景帝時戍將廣陵掘冡有人如生棺中有雲母厚丈許白璧三十枚以籍身, WYG: 大硬}
