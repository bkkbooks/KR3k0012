  - {type: variant, offset: 475, length: 0, content: '', krp: 璜以黼左傳文公曰周公相王室以尹天下於周爲睦分魯公以大路大旂夏后氏之璜杜預注曰璜美玉名又哀下曰宋向魋出奔衛公父文伯攻之求夏后氏之璜與之他玉而奔齊白虎通曰璜以徴召位在北方又曰何謂五玉玉謂}
  - {type: variant, offset: 476, length: 0, content: '', SBCK: 璧琮璜璋又曰孔子卒受魯君璜玉葬墎之北文子夏曰夏后之璜不能無纇淮南子曰夏后氏之璜不能無考考瑕又曰精神可寶非直夏后之璜楚辭曰璜臺十成誰可極焉璜石次玉傅玄歌詩曰有所思兮在天一方何用贈之玉佩珠璜瓉􅀃文曰瓉三玉一石也天子用全純玉也上公用駹四玉一石侯用瓉伯用將玉石半相將也尚書文侯命曰平王錫晉文侯秬鬯圭瓉作文侯之命毛詩文王旱麓曰瑟彼玉瓉黄流在中玉瓉圭瓉也黄金所}
  - {type: page-break, offset: 476, content: '', id: KR3k0012_SBCK_807-2b}
  - {type: variant, offset: 476, length: 0, content: '', WYG: 璧琮璜璋又曰孔子卒受魯君璜玉𦵏之北文子曰夏后之璜不能無纇淮南子曰夏后氏之璜不能無考又曰精神可寳非直夏后之璜楚辭曰璜臺十成誰可極焉傅𤣥歌詩有所思兮在天一方何用贈之玊珮珠璜瓉説文曰瓉三玊一石也天子用全純玊也上公用朧四玊一石侯用瓉伯用將玉石半相將也尚書文侯命曰平王錫晉文侯秬鬯圭瓉作文侯之命毛詩文王旱麓曰瑟彼玉瓉黃流在中毛詩大雅江漢曰釐爾圭瓉秬鬯一卣告于文人周禮春官小宗伯曰凡祭祀賔客}
