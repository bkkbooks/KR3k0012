  - {type: variant, offset: 538, length: 1, content: 贊, WYG: 積草池中有珊瑚樹髙一丈二尺一本生三柯上四百二十六條是南越國王趙佗所獻號爲絳火樹至夜光景昭然漢武故事曰武帝起神堂前庭植玊樹葺珊瑚為枝述異記曰鬰林郡有珊瑚市海客市珊瑚處也珊瑚碧色生海底一樹數十枝枝間無葉}
  - {type: variant, offset: 538, length: 1, content: 贊, krp: 積草池中有珊瑚樹高一丈二尺一夲云三柯上四百六十二條是南越國王趙他所獻號爲𤇺火樹至夜光景昭然漢武故事曰武帝起神堂前庭植玉樹葺珊瑚爲枝述異記曰鬰林郡有珊瑚市海客市珊瑚處也珊瑚碧色生海底一樹數十枝枝間無葉}
  - {type: variant, offset: 540, length: 12, content: 行曰圭公九寸侯伯七寸子男, WYG: 者髙}
  - {type: variant, offset: 540, length: 0, content: '', krp: 者髙五六尺尤小者尺餘鮫人云海上有珊瑚宮漢元封二年鬰林郡獻瑞珊瑚婦人帝命植於殿前謂之女珊瑚忽一旦柯葉甚茂至靈帝時樹死咸以爲漢室將亡徴也海中經曰珊瑚生海中欲取之先作鐵網沉水厎珊瑚貫網而生歲髙二三尺有枝無葉形如小樹因絞網出之珊瑚皆摧折在網中孫氏瑞應圖曰珊瑚鈎者王者恭信則見一夲云不珎玩弄則出廣志曰珊瑚其長者爲御車柱出西海底玄中記曰珊瑚出大秦西海中生水中石上𥘉生白一年黄三年赤四年蟲食敗司馬相如上林賦曰玟㻁碧林珊瑚藂生班固兩都賦曰珊瑚之樹上栖碧雞傅玄紫華賦曰炳叅差以照燿兮何光麗之難形葩艶挺於碧枝兮煥若珊瑚之翠英潘安仁石榴賦曰似長離之栖鄧林若珊瑚之映緑水瑇瑁周書王㑹曰伊尹謂湯曰請以瑇瑁爲獻孝經援神契曰神明滋液則瑇瑁背宋均日背文也春秋考異郵曰承石取鐵瑇瑁吸類相致也芥也音若史記曰趙使使於春申君欲誇楚爲瑇瑁簮劒器悉飾以瑇瑁又曰江南出丹沙犀象瑇瑁珠璣漢書西域傳賛曰故能覩犀布瑇瑁則建珠崖七郡感蒟醬竹枝則開䍧牱越嶲續漢書輿服志曰貴人助蚕瑇瑁釵范曄後漢書曰賈琮傳云交趾土多珎産明璣翠羽象犀瑇瑁異香美木之屬莫不自出前後刺史率多無清}
  - {type: punctuation, offset: 541, content: 》, id: KR3k0012_CHANT_807-bkkpn188}
  - {type: variant, offset: 541, length: 0, content: '', krp: 有司舉琮爲交趾刺史又}
