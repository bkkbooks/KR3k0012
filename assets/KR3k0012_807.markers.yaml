  - {type: variant, offset: 1036, length: 1, content: 東, SBCK: 貝凢有八紫貝㝡爲美者出交州大貝出巨延州與行賈􅐙易萬震南州異物志曰乃有大貝竒姿難儔大貝文貝也交趾以南海中皆有之素質紫飾文􅀂羅朱不磨不瑩彩輝光浮思雕莫加欲琢靡踰在昔􅁎伯用免其拘徐哀南}
  - {type: variant, offset: 1036, length: 0, content: '', WYG: 江南出丹沙犀象瑇瑁珠璣漢書西域傳賛曰故能覩犀布瑇瑁則建珠崖七郡感荺醬竹枝則開䍧牱越雋續漢書輿服志曰貴人助蠶瑇瑁釵范􅁮後漢書曰賈綜傳云交阯土多珎産明璣翠羽象犀瑇瑁異香美木之屬莫不自出前後刺史率多無清行有司舉琮為交阯刺史又曰和熹鄧皇后臨朝上方珠玉犀象瑇瑁雕鏤之物皆絶又曰天竺國出象犀玳瑁也呉録曰嶺南盧賔縣漲海中玳瑁似龜而大呉録曰魏使以馬求易珠璣翡翠玳瑁孫權曰此皆孤所不用而得馬若何而不聽晉命曰士卒百工不得服犀玳瑁齊書曰少帝夜醉乘馬從西歩廊向北馳走如此兩三將倒臨汝侯坦之諫不從執馬控帝運拳坦之着倒地坦之與曹道剛扶抱還夀春殿瑇瑁牀上卧齊書曰廬陵王子卿為荆州刺史在鎮營造服飾多違制度作瑇瑁乘具詔責之令速還都唐書曰憲宗朝訶陵國獻僧耆女二人瑇瑁榼生犀等西京雜記曰韓嫣以玳瑁爲牀南方異物志曰玳瑁如龜生南海大者如蘧篨背上有鱗大如扇發取鱗因見其文欲以作器則煑之刀截任意所爲冷乃以梟魚皮錯治之後以枯木條葉營之乃有光輝廣志曰玳瑁形似龜出南海巨延州司馬相如子虛賦曰網玳瑁釣紫貝張衡}
