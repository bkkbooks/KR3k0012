  - {type: variant, offset: 3147, length: 272, content: 意戰國策曰張儀為秦破從連橫說楚王楚王遣車百乘獻駭雞之犀夜光之璧於秦王又曰齊欲伐魏魏使謂淳于髡曰弊邑寶璧二雙天馬二駟請致之髡入說齊王曰魏齊之與國今伐之名醜而實危齊王乃不伐客謂齊王曰髡受魏璧馬王謂髡曰先生有之乎曰有之伐之事便魏雖刺髡於王何益若誠不便魏雖封臣於王何損百姓無被兵之患髡有璧馬之寶於主何傷又曰蘇秦說趙王於華屋之下抵掌而談趙君封為武安君受白璧百雙黃金萬溢河圖天靈曰趙王政以白璧沉河者有一黑公從河出謂政曰祖龍來天寶開中有二玉牘也呂氏春秋曰后成子為魯聘於晉過衛右宰穀臣觴之陳樂而不樂乃送以璧后成子曰觴我與我歡也陳樂而不樂告我憂也送我璧寄託之也衛, SBCK: 秘寳}
