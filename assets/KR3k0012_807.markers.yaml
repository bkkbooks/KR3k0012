  - {type: variant, offset: 669, length: 0, content: '', SBCK: 卧齊書曰廬陵王子卿爲荆州刺史在鎭營造服飾多違制度作瑇瑁乗具詔責之令速送都唐書曰憲宗朝訶陵國獻僧祗女二人瑇瑁榼生犀物等西京􅄂記曰韓嫣以玳瑁爲牀南方異物志曰玳瑁如龜生南海大者加籧篨背上有鱗大如扇發取鱗因見其文欲以作器則煑之刀截任意所爲冷乃以梟魚皮籍治之後以枯木條葉瑩之乃有光輝廣志曰玳瑁形似􅀛出南海巨延州司馬相如紫虚賦曰網瑇瑁釣紫貝張衡東京賦曰翡翠不裂玳瑁不簇孫德施南榴枕賦曰委之玳瑁席停之象牙床劉楨清慮賦曰後布玳瑁之席前設觜蠵之筵左思呉都賦曰蠵璧玳瑁金質黒章繁欽􅀉情詩曰何以表別離取後玳瑁釵班固與竇憲牋書曰明將軍賜固駮玳瑁簮髙文惠與婦書曰今致玳瑁梳一枚貝說文曰貝海介蟲也古者貨貝而寳􅀛至周而有泉到􅁗廢貝行泉尚書禹貢曰淮海惟楊州厥篚織貝}
  - {type: page-break, offset: 669, content: '', id: KR3k0012_SBCK_807-6b}
