  - {type: variant, offset: 475, length: 0, content: '', WYG: 璜以黼左𫝊文公曰周公相王室以君天下於周公為睦分魯公以大路大旂夏后氏之璜又哀下曰宋向魋出奔衛公父文伯攻之求夏后氏之璜與之他玉而奔齊白虎通曰璜以徴召位在北方又曰何謂五玉玉謂}
