  - {type: punctuation, offset: 542, content: 『, id: KR3k0012_CHANT_807-bkkpn190}
  - {type: variant, offset: 542, length: 2, content: 圭公, krp: 和熹鄧皇后臨朝上方珠玉犀象瑇瑁雕鏤之物皆絶又曰天笁國出象犀玳瑁也呉録曰嶺南盧賔縣漲海中玳瑁似龜而大呉録曰魏使以馬求易珠璣翡翠玳瑁孫權曰此皆孤所不用而得馬若何而不聽晉命曰士卒百工不得服犀玳瑁齊書曰少帝夜醉乗馬從西歩廊向北馳走如此兩三將倒臨汝侯坦之諫不從執馬椌帝運拳擊垣之着到地坦之與曹道剛扶抱還壽春殿瑇瑁牀上卧齊書曰廬陵王子卿爲荆州刺史在鎭營造服飾多違制度作瑇瑁乗具詔責之令速送都唐書曰憲宗朝訶陵國獻僧祗女二人瑇瑁榼生犀物等西京雜記曰韓嫣以玳瑁爲牀南方異物志曰玳瑁如龜生南海大者加籧篨背上有鱗大如扇發取鱗因見其文欲以作器則煑之刀截任意所爲冷乃以梟魚皮籍治之後以枯木條葉瑩之乃有光輝廣志曰玳瑁形似龜出南海巨延州司馬相如紫虚賦曰網瑇瑁釣紫貝張衡東京賦曰翡翠不裂玳瑁不簇孫德施南榴枕賦曰委之玳瑁席停之象牙床劉楨清慮賦曰後布玳瑁之席前設觜蠵之筵左思呉都賦曰蠵璧玳瑁金質黒章繁欽寄情詩曰何以表別離取後玳瑁釵班固與竇憲牋書曰明將軍賜固駮玳瑁簮髙文惠與婦書曰今致玳瑁梳一枚貝說文曰貝海介蟲也古者貨貝而寳龜至周而有泉到秦廢貝行泉尚書禹貢曰淮海惟楊州厥篚織貝又顧命曰大貝鼖鼓在西房孔安囯注曰大貝如車渠啇周傳寶之毛詩曰萋兮棐兮成是貝錦又義䟽曰具鼊之屬又有紫貝其白質如玉而紫點爲文皆行列相當大者有徑一尺六寸今}
  - {type: punctuation, offset: 543, content: ，, id: KR3k0012_CHANT_807-bkkpn191}
  - {type: 'tls:seg', offset: 543, content: '', id: KR3k0012_CHANT_807-7a.9}
  - {type: variant, offset: 545, length: 0, content: '', krp: 眞交趾以爲杯盤寳物也爾雅曰貝居陸者在水者大者魫小者鰿音積今之細貝亦有紫色暏出南玄貝貽貝黑色貝也餘蚳黄白文音治黄質白文也餘泉白黄文以白爲質黄爲文點今之紫貝以紫爲質黒爲文點也蚆愽而者中央廣兩頭銳大而險險者謂汗簿􅜽小而橢即上小貝橢謂狹而長此皆說貝之形容也春秋運斗樞曰瑶光得江吐大貝尚書大傳曰文王囚於姜里散冝生之江淮之浦而得大貝如車渠以獻紂歸藏曰有人將來遺我貨貝以至則徹以求則得有喜則至漢書曰文帝賜南越王尉他書及衣他因使者獻貝五百又曰王莽時大貝四}
