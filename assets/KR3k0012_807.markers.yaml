  - {type: variant, offset: 650, length: 1, content: 六, SBCK: 四曰有星孛于大辰西及漢鄭禆竈言於子産曰宋衛陳鄭將同日火􅀂我以瓘斚玉瓉鄭必不火瓘圭也斚玉斚瓉勺也欲穰火子産不與漢書}
