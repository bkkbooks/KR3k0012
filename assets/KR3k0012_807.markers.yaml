  - {type: variant, offset: 3667, length: 406, content: 枚懷藏其一以六白意意開甕中素書文曰後世修吾書董仲舒摸吾車拭吾履發吾笥會稽鍾離意璧有七張取一意召伯問璧有七何藏一耶伯叩頭出之物理論曰語曰士非玉璧談者為價晉中興徵祥說曰王者不隱過則玉璧見不斲自成光若月明石虎鄴中記曰石虎太武殿懸大綬於梁柱綴玉璧於綬范享燕書曰昭文帝時左部民得紫璧以獻戴延之西征記曰宋公諮議王智先停柏谷遣騎送道人惠義䟽曰有金璧之瑞公遣迎取軍次于崤東金璧至脩壇拜受之又云冀州愽陵郡王次寺道人法稱告弟子普巖曰嵩高皇帝語吾言江東有劉將軍是漢家苗裔當受天命吾以四十二璧金一餅與之璧數是劉氏卜世之數也惠義以義熙十三年入嵩高山即得璧金獻馬具嵩山門琴操曰楚昭王得和氏璧使大夫明光奉璧於趙郡中羊申甫知趙無反遺乃讒之於王明光常背楚同趙今使奉璧何能述楚功德及明光還王怒之明光乃作歌曰楚明光魏文帝蔡伯喈女賦序曰家公與蔡伯喈有管鮑之好乃命使者周近持玄玉璧於匈奴贖其女還以妻屯田郡都尉董祀張載擬四愁詩曰佳人遺我雲中翮何以贈之連城璧, SBCK: ''}
