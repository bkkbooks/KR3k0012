  - {type: variant, offset: 519, length: 0, content: '', WYG: 冬官下玉人曰天子執瑁四寸以朝諸侯白虎通曰天子執瑁以朝諸侯瑁之為言冐也上}
  - {type: variant, offset: 519, length: 0, content: '', krp: 冬官下玉人曰天子執瑁四寸以朝諸侯玉以君之似梨冠也白虎通曰天子執瑁以朝諸侯瑁之爲言冒也上}
  - {type: variant, offset: 520, length: 0, content: '', WYG: 所覆下有所冐也珊瑚説文曰珊瑚色赤生扵海中或生扵山也孝經援神契曰珊瑚鉤瑞寳也神靈滋液百珎寳用則見廣雅曰珊瑚珠也晉書曰石崇王愷争豪武帝每助愷嘗}
  - {type: page-break, offset: 520, content: '', id: KR3k0012_WYG_807-6a, image: WYG0900/WYG0900-0163c.png}
  - {type: variant, offset: 520, length: 0, content: '', krp: 所覆下有所冒也珊瑚說文曰珊瑚色赤生於海中或生於山也孝經援神契曰珊瑚鈎瑞寳也神靈滋液百珎寳用則見廣雅曰珊瑚珠也晉書曰石崇王愷爭豪武帝每助愷甞}
  - {type: variant, offset: 521, length: 1, content: 素, WYG: 珊瑚樹賜之高二尺許枝柯扶踈世所罕比愷以示崇崇便以鐡如意擊之應手而碎愷既惋惜又以爲疾己之寳聲色方厲崇曰不足多恨今還卿乃令左右悉取珊瑚有三四尺者六七株條榦絶俗光彩耀目如愷比者甚衆愷恍然自失矣又四夷傳曰大秦國一名犁鞬在西海之西其地東西南北各數千里有城邑其地周廻百餘里屋宇珊瑚爲棁而琉璃}
  - {type: page-break, offset: 521, content: '', id: KR3k0012_WYG_807-6b, image: WYG0900/WYG0900-0163d.png}
  - {type: variant, offset: 521, length: 3, content: 素為貴, krp: 珊瑚樹賜之髙二尺許枝柯扶踈丗所罕比愷以示崇崇便以鐵如意撃之應手而碎愷旣惋惜又以爲疾已之寶聲色方厲崇曰不足多恨今還卿乃令左右悉取珊瑚有三四尺}
  - {type: variant, offset: 523, length: 2, content: 貴者, WYG: 墻壁水精為柱礎也宋書曰劉勔為鬱林太守勔既至隨宜剪定}
  - {type: punctuation, offset: 525, content: ，, id: KR3k0012_CHANT_807-bkkpn179}
  - {type: 'tls:seg', offset: 525, content: '', id: KR3k0012_CHANT_807-7a.4}
  - {type: variant, offset: 525, length: 0, content: '', krp: 六七株條榦絶俗光彩曜日如愷比者甚衆愷怳然自失矣又四夷傳曰}
  - {type: variant, offset: 526, length: 102, content: 圭而使所以申信也又雜記曰贊大行曰圭公九寸侯伯七寸子男五寸愽三寸厚半寸剡上左右各寸半玉也藻三采六等贊大行者書說大行人之禮者名也藻薦玉者也三采六等以朱白蒼畫之再行也三禮射侯圖曰信圭七寸謂圭上琢為人頭身之形侯所, SBCK: 宗}
  - {type: variant, offset: 526, length: 2, content: 圭而, WYG: 致名馬并獻珊瑚宋記曰大明六年鬱林郡獻珊瑚連理樹南史曰秩南國梁天監二年跋摩復遣}
  - {type: variant, offset: 526, length: 1, content: 圭, krp: 秦國一名犁鞬在西海之西其地東西南北各數千里有城邑其地周廻百餘里屋宇以珊瑚爲挩}
  - {type: variant, offset: 528, length: 0, content: '', krp: 琉璃爲牆璧水精爲柱礎也宋書曰劉勔爲鬱林太守勔旣至隨冝剪定大致名馬并獻珊瑚宋紀曰大明六年鬰林郡獻珊瑚連理樹南史曰扶南國梁天監二年跋摩復遣}
