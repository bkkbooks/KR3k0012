  - {type: variant, offset: 1768, length: 0, content: '', SBCK: 龔遂爲渤海太守盗賊不寧上問遂曰君欲何以息其盗賊遂曰選用賢良固欲安之臣聞治亂國猶治亂繩不可急唯緩之然後可治東觀漢記曰吴漢等圍朱鮪岑彭􅀃鮪鮪從上下索曰必信可乗上彭趣索欲上鮪見其誠即許降後二日鮪將輕􅀐詣彭又曰許皇后父廣漢爲官者丞上官桀謀反時廣漢部索其殿中廬有索長數尺可以縛人者數千枚滿人篋緘封廣漢索不得他吏徃得之廣漢坐論爲􅀑薪輸掖庭後爲􅁀室嗇夫晉書曰劉寔字子真平原人少貧苦賣牛衣以自給然好學手繩口誦􅀶通古今清身㓗色州舉秀才皆不行後魏書曰楊大眼武都民}
  - {type: page-break, offset: 1768, content: '', id: KR3k0012_SBCK_766-8a}
  - {type: variant, offset: 1768, length: 10, content: 王莽攝政鑄作威斗威斗, WYG: 龔遂為渤海太守盜賊不寧上問遂曰君欲何以息其盜賊遂曰選用賢良固欲安之臣聞治亂國猶治亂繩不可急唯緩之然後可治東觀漢記曰呉漢等圍朱鮪岑彭說鮪鮪從上下索曰必信可乘上彭趣索欲上鮪見其誠即許除後二日鮪将輕騎詣彭又曰許皇后父廣漢為謁}
  - {type: page-break, offset: 1768, content: '', id: KR3k0012_WYG_766-13a, image: WYG0899/WYG0899-0706a.png}
