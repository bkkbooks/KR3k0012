  - {type: variant, offset: 1996, length: 1, content: 賜, SBCK: 歸幽明録曰曲阿有一人忘姓名從京還逼暮不得至家遇雨􅀫廣屋中雨止月朗遥見一女子來至屋簷下便有悲歎之音仍解􅆎中綣去逺切繩懸屋桷自絞又覺屋簷上如有人牽䋲此人宻以刀斷卷繩又斫屋上見一􅀑西走向曙女氣方蘇能語家在前持此人將歸向女父母􅀃其事或是天運使然因以女嫁與爲妻異記曰武康徐氏宋太元中病瘧連治不斷有人告之曰可作數團飯出道頭呼傷死人姓名云爲我斷瘧今以此團與汝擲之徑還勿反顧也病者如言乃呼晉故車􅀐將軍沈充湏􅁷有乗馬導從而至問汝爲何人而敢名官家因傳將去舉家㝷覔}
