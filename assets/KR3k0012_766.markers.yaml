  - {type: punctuation, offset: 2988, content: 《, id: KR3k0012_CHANT_766-bkkpn1008}
  - {type: variant, offset: 2990, length: 343, content: 國春秋後涼錄曰竇荀洛陽人也以壯勇知名從呂光攻龜茲登雲梯入地道或時墮落蘇而復上光深奇之孟子曰瞽瞍使舜完廩捐階搜神記曰和憙鄧后夢登梯以捫天體蕩蕩正青若鍾乳者后仰漱之石虎鄴中記曰石虎太子宣與母弟蔡公韜迭秉政事宣嫌終有代己之勢八月社日韜登東明觀遊暮還酣宴作女妓罷宣遣力士鉅鹿楊杯等十餘人夜緣梯入韜弟斫殺之鹽鐵論曰防塞利門而民猶為非況上之為利乎傳曰諸侯好利則大夫鄙大夫鄙則士貪士貪則庶人盜是開利室內民罪梯也世說曰韋仲將能書魏明帝起殿欲安牓使仲將登梯題之既下頭鬢皓然因是勑戒兒孫勿復學書嵇含雞賦曰余庭有栖雞而一雄㝡武常憑梯升栖守時告晨未常有殆郭璞遊仙詩曰靈溪可潛盤安事登雲梯杷朳方言曰杷無齒為朳宋魏之間謂之渠拏今江東名亦然或謂之渠䟽周生烈曰夫忠謇朝之杷朳正人國之掃篲也秉把執篲除兇掃穢國之福主之利也, SBCK: ''}
