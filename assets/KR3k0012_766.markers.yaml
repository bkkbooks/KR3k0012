  - {type: variant, offset: 1325, length: 0, content: '', WYG: 兖州刺史以清約率下席羊皮卧布被遷張掖太守有威重名文子曰木強即折革張即裂神異經曰北方有層氷萬里厚百丈有䑕在土中焉食氷下草木肉重萬斤可以作脯食之已熱隂熱病也其皮可以蒙鼓其聞千里有美尾可以來䑕此尾所在䑕自聚搜神記曰舊說太古時有人逺征家唯一女并馬一疋女思父乃戯馬曰汝能為我迎得父吾得嫁汝馬乃絶鞅而去至父所父疑家中有故乗之而還後馬見女輙怒而奮擊父怪之密問女女具以告父父乃射殺馬暴皮於庭女之皮所以足蹙之曰爾馬而欲我為婦自取屠剥何如言未竟皮蹶然忽起卷女而行父還於後大樹之間得女及皮盡化為蠶績於樹上其繭厚大異於常蠶隣女取食養之其收亦倍今世或謂蠶為女兒古之遺語也眞子曰廊廟之材盖非一木之支也狐白之裘盖非一狐之皮也韓子曰翟人獻豐狐𤣥豹之皮於晉文又曰西門豹性急佩􅅊以自緩董安于心緩佩絃以自急韋皮也揚子法言曰羊質虎皮見草而恱見豺而戰􅁯其皮之虎也筋角周禮曰凡相角秋閷音殺者厚春閷者薄穉牛之角直而澤老牛之角繆而昔昔讀為有錯之錯疢疾險中牛有久疾則角衰傷瘠牛之角無澤角欲青白而豐末角長二尺有五寸三色不失理謂之牛戴牛三色本白中青末豐也牛戴牛角直一牛也又曰凡相筋欲小􅂤而長大結而澤則其為獸必剽以為弓則豈異於其獸筋欲敝之敝禮曰祭天地之牛角繭粟宗廟之牛角握賔客之牛角尺左傳曰鼷鼠食郊牛角爾雅曰北方之美者幽都之筋角焉魏畧曰大秦國出䮄鷄犀角晉書曰王愷以帝舅奢豪有牛名八百里駿駮常瑩其蹄角後魏書曰桓帝英傑魁岸馬不能勝常乘安車駕大牛角容一石吕氏春秋曰寗戚飯牛扣角而歌淮南萬畢術曰燒角入山虎豹自逺東方朔占曰昔武帝亡劒不知所取者誰無主名請朔往入宫見人持兩刺手中復持一小牛角朔曰陛下宫中當有姓林名子魚者取之帝曰有之即收考子魚服出劔帝曰朔何其工乎且請說其占朔對曰入宫時見人持二刺手中復持小牛角因占之二木林字故知其姓角文似魚小魚當為子魚故知其名也齒書曰揚州厥貢齒革羽毛荆州厥貢羽毛齒革詩曰元龜象齒大賂南金周禮曰荆州其利齒革禮曰季春之月令百工審五庫之量筋角齒羽無或不良左傳曰晉韓宣子為政諸侯之幣重鄭子産謂宣子曰象有齒以焚其身賄也宣子恱乃輕幣西}
