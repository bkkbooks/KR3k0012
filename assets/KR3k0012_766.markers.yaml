  - {type: variant, offset: 1180, length: 137, content: 龠以子穀秬黍中者千有二百實其龠二龠為斛而五量嘉矣其法用銅方合十合為一升十升為斗十斗為斛而五量嘉矣其法用銅方尺而圍其外旁有庣音桃焉其上為斛下為斗左耳為升右耳為合為合龠之量也升者登合之量也斗者聚升之量也斛者角斗平多少之量也夫量者躍於龠合於合登於升聚於斗角於斛也職在太倉太司農掌之, SBCK: 家范曄}
