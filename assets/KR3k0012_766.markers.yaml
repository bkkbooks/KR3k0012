  - {type: variant, offset: 1328, length: 9, content: 簿倫平銓衡正斗斛市, SBCK: 名請朔徃入宫見人持兩刺手中復持小牛角朔曰陛下宫中當有親林名字魚者取之帝曰有之即収考子魚服岀劒帝曰朔何其工乎且􅀃其占朔對曰入宫時見人持二刺手中復持小牛角因占之二木林字故知名字魚者取之齒書曰揚州厥貢齒革羽毛荆州厥貢毛齒詩曰元􅀛象齒大賂南金周禮曰荆州其利齒革禮曰季春之月令百工審五庫之量筋角齒羽}
