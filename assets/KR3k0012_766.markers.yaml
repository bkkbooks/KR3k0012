  - {type: variant, offset: 1769, length: 10, content: 莽攝政鑄作威斗威斗者, SBCK: 難當之孫少驍捷髙祖征南李沖典選統校大眼徃求冲不許大眼曰下官岀一技便岀長繩三丈繫於髻走繩直如絃馬馳不及冲曰千載巳來未有􅀂此遂用爲軍主頋謂同僚曰吾之今日所謂蛟龍得水之秋不復與諸軍齊列矣武冠六軍淮泗之人}
  - {type: page-break, offset: 1769, content: '', id: KR3k0012_SBCK_766-8b}
  - {type: variant, offset: 1769, length: 10, content: 莽攝政鑄作威斗威斗者, krp: 難當之孫少驍捷髙祖征南李沖典選統校大眼徃求冲不許大眼曰下官岀一技便岀長繩三丈繫於髻走繩直如絃馬馳不及冲曰千載巳來未有若此遂用爲軍主頋謂同僚曰吾之今日所謂蛟龍得水之秋不復與諸軍齊列矣武冠六軍淮泗之人}
