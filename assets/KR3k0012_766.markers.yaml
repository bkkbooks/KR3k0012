  - {type: variant, offset: 1326, length: 17, content: 兆主簿倫平銓衡正斗斛市無阿枉百姓悅, WYG: 雜記曰漢制天子以象牙為火籠羽毛書白仲夏鳥獸希革仲秋鳥獸毛毨仲冬鳥獸氄毛又曰揚州荆州皆貢羽毛周禮曰凢析全羽為旒析羽為旌左傳曰范宣子假羽毛於齊而弗歸齊人始貳尚書大傳曰夏成五}
