  - {type: variant, offset: 638, length: 157, content: 異苑曰北海徐寔婢蘭義熙中忽患羸黃而自拂拭有異於常家共伺察見竹掃帚從壁角來趣婢取而焚之婢即平復雜五行書曰常以正月三日買箕四枚懸堂上四壁令人治生大得治田蠶萬倍錢財自入李尤箕銘曰神農殖穀以養蒸民箕主簸揚糠粃乃陳畚左傳曰晉靈公不君失君道宰夫臑音而熊蹯不熟殺之寘諸畚使婦人載以過朝又曰宋災樂喜為司城以為政陳畚梮具綆缶畚簣籠也, SBCK: 䗶}
