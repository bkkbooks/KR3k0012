  - {type: variant, offset: 1787, length: 8, content: 北斗長二尺五寸欲, WYG: 此遂用為軍主顧謂同僚曰吾之今日所謂蛟龍得水之秋不復與諸軍齊列矣武冠六軍淮泗之人稱其名}
