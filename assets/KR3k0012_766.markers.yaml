  - {type: variant, offset: 2135, length: 175, content: 雨至必求之令君既棲於會稽之上而求謀臣無乃後乎又曰吳夫差使王孫茍告勞于周曰齊人為不道不供承王事夫差不忍被甲帶劍簦笠相望於艾陵簦笠備雨器也天舍其裏齊師還言敗而還夫差豈敢自多又曰管仲曰今夫農群萃而州處察其四時時雨既至挾其槍刈耨鎛以旦暮從事於田野脫衣就功首戴茅蒲身衣襏襫音撥襫茅蒲簦笠也襏襫蓑也沾體塗足以從事於田野史記曰瞽瞍使舜上廩從下焚廩舜乃以雨笠自杆而下, SBCK: 􅊍絶安}
