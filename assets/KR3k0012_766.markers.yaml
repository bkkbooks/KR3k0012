  - {type: variant, offset: 391, length: 0, content: '', krp: 世紀曰昭王濟漢船人惡之以膠船進王中流膠舡解王没于水中洲記曰鳯麟州以鳯啄及麟角合煎作膠名曰集弦膠一名連金泥膠青色如碧玉漢武時西王母使}
  - {type: variant, offset: 392, length: 0, content: '', SBCK: 靈膠四兩帝不知其妙以付庫帝幸上林苑射虎而弩弦斷使從駕因取一分膠口濡以集弦射虎而帝使武士對挽終不脫勝未集時吕氏春秋曰桓公使人告魯曰管夷吾寡人}
