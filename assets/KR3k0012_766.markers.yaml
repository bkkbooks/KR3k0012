  - {type: variant, offset: 1779, length: 0, content: '', WYG: 丞上官桀謀反時廣漢部索其殿中廬有索長數尺可}
  - {type: variant, offset: 1780, length: 49, content: 五石銅為之形若北斗長二尺五寸欲以厭勝眾兵既成命有司負之莽出在前入則御旁說苑曰合升斗之微以滿倉廩王逸, SBCK: 名止小兒蹄卒荆州刺史老}
  - {type: variant, offset: 1780, length: 3, content: 五石銅, WYG: 縳人者數千枚入蒲箧緘封廣漢索不得他吏往得之廣漢坐論}
  - {type: variant, offset: 1780, length: 49, content: 五石銅為之形若北斗長二尺五寸欲以厭勝眾兵既成命有司負之莽出在前入則御旁說苑曰合升斗之微以滿倉廩王逸, krp: 名止小兒蹄卒荆州刺史老}
