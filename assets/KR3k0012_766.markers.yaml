  - {type: variant, offset: 391, length: 0, content: '', SBCK: 世紀曰昭王濟漢􅂳人惡之以膠􅂳進王中流膠舡解王没于水中洲記曰鳯麟州以鳯啄及麟角合煎作膠名曰集弦膠一名連金泥膠青色如碧玉漢武時西王母使}
  - {type: variant, offset: 391, length: 0, content: '', WYG: 世紀曰昭王濟漢楚人惡之以膠船進王中流膠船解王没于水中洲記曰以鳳喙及麟角合煎作膠名曰集絃膠一名連金泥膠青色如碧玉漢武時西王母使}
