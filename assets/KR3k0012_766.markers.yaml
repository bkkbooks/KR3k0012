  - {type: variant, offset: 2513, length: 382, content: 相逢下車揖盛弘之荊州記曰宜都有風穴樵人有冬過者置笠穴口風吹吸之經日還涉長陽溪而得其笠則知溪穴潛通矣馮敬通詣鄧禹牋曰今日裘與蓑孰急見雨則裘不用上堂則蓑不御此更為適者也今敬通逢堂蓑之不御也本草曰敗天公主鬼注精魅此竹笠之敗也曹植九詠曰越江兮刈蘭暮秋兮薄寒被蓑兮戴笠置露兮踐雚王褒撞約曰雨墮如注瓮板薜戴子公薜蓑衣也子公笠也桔槔通俗文曰機汲曰桔槔禮曰捧席如橋衡鄭玄曰井上桔槔衡在上低仰者也莊子曰子貢南遊楚漢陰見一丈人為圃畦鑿隧而入井抱甕而灌用力多而見功寡子貢曰鑿木為機後重前輕挈水若流其名桔槔圃者曰聞有機事必有機心吾非不知羞不為也又曰獨不見夫桔槔者乎引之則俯舍之則仰彼人之所引非引人者也故俯仰而不得罪於人汝南先賢傳曰蔡君仲井桔槔壞在母年命上憂不敢治而扶老生繞之扶老藤也生繞桔槔不須治孝之感也椸枷禮曰男女不同椸枷又曰不敢懸於夫之揮音揮揓竿卒謂之揓爾雅曰日竿謂之椸郭璞注曰衣架也, SBCK: 月}
