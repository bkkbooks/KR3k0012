  - {type: variant, offset: 2311, length: 201, content: 不死之又曰虞卿解其相印與魏齊間行走大梁欲因信陵君以走楚信陵君未肯見曰卿何人齊曰虞卿躡履檐簦一見趙王賜白璧一雙黃金百鎰再見拜為上卿聞君急士之窮而歸公子吳志曰呂蒙汝南人代鄧當為將定南郊約軍中不得于人家有所求取蒙麾下士是汝南人取民家一笠以覆官鎧蒙以為犯軍令不可以鄉里故廢法遂斬之晏子曰景公出遊曰嗚呼使古而無死何如晏子曰若使古而無死丁公太公將有齊國吾將戴笠衣褐以行畎畝之中也風土記曰越人結交約曰卿雖乘車我戴笠後, SBCK: 長繩繫}
