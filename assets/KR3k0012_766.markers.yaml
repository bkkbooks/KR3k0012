  - {type: variant, offset: 1321, length: 6, content: 第伍倫為京兆, SBCK: 李恂爲兖州刺史以清約率下席羊皮卧布􅀍遷張掖太守有威重名文子曰木強即折革強即裂神異經曰北方有曽氷萬里厚百文有䑕在土中焉食氷下草木􅁏重萬斤可以作脯食之巳􅀬除􅀬病也其皮可以蒙鼓其聞千里有羙尾可以來䑕此尾所在䑕即聚搜神記曰舊􅀃大古時有人逺征家唯有一女并馬一疋女思父乃戯馬曰爾能爲我迎得父吾將嫁汝馬乃絶軮而去至父所父疑家中有故乗之而還後馬見女輙怒而奪擊父恠之宻問女女具以告父父乃射殺馬曝皮於庭女之皮所以足蹙之曰爾馬而欲爲婦自取屠割何如言未竟皮蹶然忽起卷女而行父還失後大樹之間得女及皮盡化爲􅅙績於樹上其蠒厚大異於常􅅙隣女取食飬之其収亦倍今世或謂􅅙爲女兒古之遺語也真子曰廊廟之材蓋非一木之枝也狐白之裘蓋非一狐之皮也韓子曰翟人獻豊狐玄豹之皮於晉文又曰西門豹性急佩韋以緩巳董安于心緩佩弦以自急常皮也楊子法言曰羊質虎皮見草而恱見􅉘而戰忘其皮之虎也䈥角周禮曰凡相角秋閷音殺者厚春閷者簿稺牛之角直而澤老牛之角紾而昔紾徒展切昔讀爲交錯之錯疚疾險中牛有乆疾則角裏傷瘠牛之角無澤少潤氣也角欲青白而豐末豐大也角長二尺有五寸三色不失理謂之牛戴牛三色本白中青末豐也牛戴牛角一直牛也又曰凢相筋欲小簡而長大結而澤則其爲獸必剽以爲弓則豈異於其獸筋欲敝之敝嚼之當孰也禮曰􅀕天地之牛角蠒栗宗廟之牛角握賔客之牛角尺左傳曰鼷䑕食郊牛角爾雅曰北方之羙者幽都之筋角焉幽都山名謂野牛筋角也魏略曰大􅁗國岀駭雞犀角􅀳書曰王凱以帝舅奢豪有牛名八里百駿駭常瑩其蹄角後魏書曰桓帝英傑魁岸馬不能勝常乗安車駕大牛角容一石吕氏春秋曰寗戚飰牛扣角而歌淮南萬畢術曰燒角入山虎豹自逺東方朔占曰昔武帝亡劒不知取者誰無}
