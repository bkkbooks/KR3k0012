  - {type: variant, offset: 3139, length: 2, content: 地仙, SBCK: 金城臨海記曰白石山去縣邑三十里望之如雪上有淵相傳云金鵝之所集鄭緝之東陳記曰金㹠山之康縣南三里故老傳云有人得金㹠於此故名山劉欣期交州記曰趙嫗者九眞人乳長數尺入山聚盗遂攻郡常着金擒提􅄚}
  - {type: page-break, offset: 3139, content: '', id: KR3k0012_SBCK_811-8a}
  - {type: variant, offset: 3139, length: 0, content: '', WYG: 金長公叩頭謝以金十餅投其門翼送長安還之邴原别𫝊曰邴原字根矩以䘮亂方熾遂徃遼東時同郡劉舉亦在遼啚奪太守公孫度度掩捕其家而舉得免窘逼歸原東萊太守太史子義素有義原以舉付之舉臨去其手所仗劔金三餅與原原受金辭劔還謂度曰將軍平日與舉無讎而欲殺之者但恐其為蜂蠆耳今舉已去若更拘閑其家毒螫必滋甚矣度即出舉家原以金還之茅君内𫝊曰漢帝及王莾獻金鍾之属金埋在小茅山上又曰取鉛十斤着鐡器猛火燒之三沸投九轉之華一銖於中攪之須臾立成黄金九斤吳時外國𫝊曰斯調國作金牀扶南𫝊曰昆騫國食器皆以金為之金如此問之石路中山邊無有限量吳越春秋曰伍子胥伐楚還溧陽瀬水上欲報自殺婦人百金不知其家投金瀬水中而去須臾有一姥哭而來自言是女母取金而去蜀李書武帝諸將進金銀或以得官者楊褒諫曰陛下為天下主何得以官賣金耶帝謝之列女𫝊曰樂羊子出學其妻貞義截髪供其費後羊子得遺金一餅以與妻貞義曰君子不以利汚行羊子慚而去之又曰廣漢女婦者汝敦妻也敦以所受田}
