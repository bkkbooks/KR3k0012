  - {type: variant, offset: 2832, length: 0, content: '', WYG: 其家丞見曰君侯之與客無故舊而送之百金其說可得聞耶蘇人侯曰客天下辯士立談之間每奪我地而復歸之吾地雖小豈其百金韓詩外𫝊曰田子為相三年歸休以金百鎰奉其母母曰不義之物不入於舘為人臣不忠是為人子不孝子其去田子慚愧走出自歸於王還金請退就獄王赦田子罪以金賜其母又曰楚襄王遣使者持金千斤白璧百䨇聘莊子欲以為相莊子固辭又曰延陵季子遊於齊見}
