  - {type: variant, offset: 2451, length: 378, content: 瓦注者巧以黃金注者昏所要重則心矜又曰至仁無親至信辟金金玉小信之質耳至信則隆又曰金石有聲不考不鳴也韓子曰荊南麗水之中生金又曰魯丹三說中山之君而不受也因散五十金事其左右復見未語而君與之食魯丹出不及舍遂去中山其御曰交乃始善我何故去之魯丹曰夫以人言善我必以人言罪我未出境而公子惡之曰為趙來間中山君因索而罪之又曰張譴相韓病將死公乘無正懷三十金而問之其疾居一月公自問張譴曰君子死將誰使代子荅曰無正法而畏上雖然不如公子食我之得民也張譴死因相公乘無正又曰荊王弟在秦秦不出也中尉之士曰資臣百金臣能出之因載百金之晉見叔向曰荊王弟在秦秦不出也請以百金委之叔向受金而見平公曰可以城壺丘矣平公曰何以對曰荊王弟在秦秦不出是秦荊惡也必不敢禁我城壺丘若禁之我曰為我出荊王之弟吾不城也彼如出之可以得禁彼不出是卒惡也不敢禁我城壺丘矣曰善乃城壺丘謂秦公曰為出荊王之弟吾不城也秦因出之荊王大說以鍊, WYG: 黄}
