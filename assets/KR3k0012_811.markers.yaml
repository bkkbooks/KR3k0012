  - {type: variant, offset: 303, length: 924, content: 魏志曰繁昌縣授禪石碑中生金表送上群臣盡賀蜀志曰先主平蜀賜諸葛亮等金數百斤王隱晉書曰永嘉初陳國項縣賈逵石碑中生金人盜鑿取賣賣已復生此江東之瑞也又曰咸寧三年起居注載燉煌郡上釜銅生金中百陶不消可以切玉又曰鄱陽樂安出黃金鑿土十餘丈披沙之中所得者大如豆小者如粱米南郡象林南有四國皆稱漢人貢金供稅晉後略曰載賈后以鹿車詣金墉城飡金屑而死晉書曰清河王覃初為清河世子所佩金鈴歘生隱起如麻粟者祖母本陳大妃以為不祥毀而賣之占者以金是晉行大興之祥覃為皇胤是其瑞也毀而賣之象覃見廢不終之驗也晉永和起居注曰廬江太守路永表言於穀城北見水岸邊紫赤光得金一枚文如印齒宋書曰褚彥回為吏部尚書有人求官密袖中將一餅金因求清閑出金示之曰人無知者彥回曰卿自應得官無假此物若必見與不得不相啟此人大懼收金而去彥回敘其事而不言其名時人莫之知也南史曰南海扶南國王諸農死子陽邁立陽邁初在孕其母夢生兒有人以金蓆籍之其色光麗夷人謂金之精者為陽邁中國云紫磨者因以為名宋永初二年遣使貢獻以陽邁為林邑王宋書曰齊武帝常至劉悛宅晝臥覺悛自捧金澡灌受四升以沃盥因以與帝齊書曰金車王者至孝則出金人王者有盛德則游於後池林邑有金山金汁流於浦又曰梁武帝於襄陽起兵蕭穎胄以荊州應焉時長沙寺僧鑄黃金為龍數千兩埋土中歷相傳付稱為下方黃鐵穎胄因取此龍以充軍實梁書曰武陵王紀鎮蜀既東下黃金一斤為一餅百餅為簉至百簉銀五倍之其他錦罽稱是每戰則懸金以示將士終不賞賜又曰廬陵王續之子應不惠王薨至庫內閱珍物見金鋋問左右曰此可食不荅曰不可應曰既不可食並揔乞汝南史曰林邑國有山皆赤色其中生金金夜則出飛狀如螢火又曰甄法崇之孫彬有行業鄉黨稱善嘗以一束苧就州長沙寺庫質錢後贖苧還於苧束中得五兩金以手巾裏之彬得送還寺庫道人大驚云近有人以此金質錢時有事不得舉而失擅越乃能見還輒以金半仰酬往復十餘彬堅然不受詠曰五月披羊裘而負薪豈拾遺金者耶卒還金梁武帝布衣而聞之及踐祚以西昌侯藻為益州刺史乃以彬為府錄事參軍帶郫縣令將行同列五人帝誡以廉慎至彬獨曰卿昔有還金之美故不復以此言相屬由此名德益彰陳書曰歐陽頠在嶺南交州刺史袁曇綬密以金五百兩寄頠令以百兩還合浦太守龔為四百兩付兒智矩餘人弗之知頠尋為蕭㪍所破貲財並盡唯所寄金獨存曇緩亦尋卒至是頠並依信還之時人莫不歎伏之崔鴻十六國, WYG: ''}
