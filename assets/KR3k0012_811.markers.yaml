  - {type: variant, offset: 3147, length: 1, content: 亥, SBCK: 得金塊如􅂛迷失道還置夲處乃得出錢塘記曰縣東南有峴山長老相傳採金於此羅浮山記曰州南十里有牛潭漁人見金牛自水出義熈中縣民張安躡得金鏁大如指遂數十㝷㝷㝷不巳俄有物從水引之掘不能禁以刀斷得數尺安遂致冨其後義興周雲甫掩此牛掣斷其鏁得二丈遂以財雄林邑記曰從林邑徃金山三十}
