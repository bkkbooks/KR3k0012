  - {type: variant, offset: 3059, length: 3, content: 子拯溺, krp: 即墨有古冡發之有金牛塞埏門不動犯之則大垧述異記曰南康雩都縣㳂江西出去縣三里名夢口穴狀如石室舊傳常有神鷄色如好金出此穴中奮翼廻翔長鳴響徹見人輙飛入穴因號此石爲鷄石昔有人耕此山側望見鷄出遊戯有一長人操彈彈之鷄遥見便飛入穴彈丸正着穴上丸徑六尺許下垂蔽穴猶有門隙不復容人又有人乗船從下流還縣未至此崖數里一人通身黄衣檐兩籠黄𥿄求寄載因載之黄衣人乞食船主與之食訖船適至崖下船主乞瓜此人不與仍唾盤上徑下崖直入石中船主𥘉甚忿之見其入石始知神異取食器視之見盤上唾悉是黄金又曰先儒說禹時天下雨金三日古詩曰安得天雨金使金賤如土周成王時咸陽雨金今咸陽有雨金原秦二丗元年宫中雨金旣而化爲石漢惠帝二年宫中雨黄金黒錫又翁仲孺家貧力作居渭川一旦天雨金十斛於其家由是與王侯争冨今秦中有雨金翁丗丗冨録異傳曰隗炤}
  - {type: variant, offset: 3060, length: 3, content: 拯溺者, WYG: 矣遂援鼓殺白公其父亦死王賜金百斤申鳴曰何靣目見天下遂自殺新序曰齊桓公見麥丘邑人問之曰年幾何對曰八十矣曰以子之夀祝寡人乎曰使主君甚夀}
  - {type: variant, offset: 3063, length: 0, content: '', SBCK: 汝南隂鴻壽亭民善於易臨終書板授其妻曰吾死當大荒窮雖尔愼莫賣宅後到五年春當有詔使頓來此亭姓龔此人􅀒吾金卿以此板徃責之亡後果大困欲賣宅者數矣憶夫言輙止到期日有龔使者果至亭妻遂賫板徃責使者使者執板不知所言曰我生平不踐此處何縁尓也沈吟良乆謂曰賢夫何能妻曰夫善易而未曽爲人卜使者曰可矣乃顧命侍者取􅆱而筮之卦成謂炤妻曰吾不相􅀒金賢夫自有金乃知亡後暫窮故藏金以待太平所以不告婦兒者恐金盡而困無巳也知吾善易故書板以􅀉意耳金有五百斤盛以青缾覆以銅拌埋在堂屋東頭去壁一丈入在九尺妻還掘之皆如卜焉異物志曰狼㬻民與漢人交􅀜甞夜市以鼻齅金知其好惡幽明録曰淮牛渚津水深無可筭計人見一金牛形甚魁壯以金鏁絆也又曰巴丘縣百金崗以上二十里名黄金潭上有瀬亦名黄金瀬古有釣於此潭獲一金鏁引之遂滿一船而有金牛出聲貌奔壯釣人波駭牛因奮躍還潭又云􅀳南頓王平新營一宅始移夢見一人云平輿令黄欲以一器金賂􅁀勝之爲􅁀所戮埋金在吾上見鎭迮甚􅀂君復築室無復入金明旦即鑿壁下入五尺果得金又曰譙縣城東因城爲臺方二十丈髙八尺一曰古之冢也魏武帝即築以爲臺東面墻崩}
