  - {type: variant, offset: 3136, length: 0, content: '', SBCK: 餅以與妻貞義曰君子不以利汚行羊子慙而去之又曰廣漢汝婦者汝敦妻也敦以所受田地奴婢三百餘萬悉讓與兄裁留園地數十畒起舎耕作土中得金一器敦以示妻妻曰夲言讓先祖所有此獨非其有耶敦曰固吾意也俱擔金送與兄嫂郡國誌曰蘇􅁗宅在洛陽利仁里後魏髙顯業毎夜見赤光於光處掘得金百}
