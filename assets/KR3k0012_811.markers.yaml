  - {type: variant, offset: 3059, length: 3, content: 子拯溺, SBCK: 即墨有古冡發之有金牛塞埏門不動犯之則大垧述異記曰南康雩都縣㳂江西出去縣三里名夢口穴􅃺如石室舊傳常有神鷄色如好金出此穴中􅁬翼廻翔長鳴響徹見人輙飛入穴因號此石爲鷄石昔有人耕此山側望見鷄出遊戯有一長人操彈彈之鷄遥見便飛入穴彈丸正着穴上丸徑六尺許下垂蔽穴猶有門􅂩不復容人又有人乗船從下流還縣未至此崖數里一人通身黄衣檐兩籠黄􅁓求􅀉載因載之黄衣人乞食􅂳主與之食訖􅂳適至崖下􅂳主乞􅀲此人不與仍唾盤上徑下崖直入石中􅂳主􅀄甚忿之見其入石始知神異取食器視之見盤上唾悉是黄金又曰先儒說禹時天下雨金三日古詩曰安得天雨金使金賤如土周成王時咸陽雨金今咸陽有雨金原􅁗二丗元年宫中雨金旣而化爲石漢惠帝二年宫中雨黄金黒錫又翁仲孺家貧力作居渭川一旦天雨金十斛於其家由是與王侯争冨今􅁗中有雨金翁丗丗冨録異傳曰隗炤}
  - {type: page-break, offset: 3059, content: '', id: KR3k0012_SBCK_811-5a}
  - {type: variant, offset: 3059, length: 0, content: '', WYG: 西方白官之外有金山上有人長五丈餘名曰金犀守之蜀王本記曰秦王以金一笥遺蜀王蜀以禮物荅而盡化為土秦王怒群臣拜賀曰土者地也秦當得蜀矣說苑曰申鳴者以孝聞於是王授之相辭不受其父曰使汝有禄於國立義於庭吾無憂也申鳴從父命為楚相及白公亂申鳴曰今不得為孝}
