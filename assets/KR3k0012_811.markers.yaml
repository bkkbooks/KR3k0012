  - {type: variant, offset: 1328, length: 1041, content: 孫軌字元慶為諸軍司馬太武平赫連昌引諸帥入其府藏各令任意取金玉諸將取之盈懷軌獨不取帝把手親探金賜之謂之曰卿臨財廉朕所以增賜者欲顯廉於眾人又曰叚揮自慕容璝歸魏太武至長安人告暉欲南奔云置金於馬韉中帝密遣視之果如告者斬之於市又曰李安世為主客令每有江南使至多出藏內珍寶令都下富室好容服者貨之令使任情交易時齊劉纘至金玉肆問價纘曰北方金玉太賤當是山川所出安世曰聖朝不貴金玉所以同於瓦礫又皇上德通神明地不愛寶故川無金山無玉纘初將大市得安世言慚而罷又曰副貨國城周匝七十里國王有黃金殿殿下有駞七頭高三尺又曰拔豆國出金銀河鉤羗國出金珠北史齊李幼廉少寡欲為兒童時初不從家人所求請故嘗以金寶授之終不取強付輒擲之地後為南青州刺史主簿徐乾富而暴橫歷政不能禁幼廉初至因其有犯收繫之乾密通䟽奉黃金百挺奴婢二十人幼廉不受遂殺之北史隋獻皇后山陵後帝賜楊素金鉢一實以金銀鉢一實以珠隋書曰上賜王公已下射楊素箭為第一上手以外國所獻金精盤價直鉅萬以賜之唐書曰太宗謂侍臣曰水旱不調皆為人君失德朕德不修天當責朕百姓何罪而尚多窮困聞有鬻男女者朕甚愍焉於是遣御史大夫杜淹巡關內諸州出御府金寶贖還父母又曰開元中杜暹為監察御史往西覆屯蕃人齎金以遺暹因辭不受左右以不可失蕃人之情暹受而埋於幕下既出境乃移牒令收取之又曰德宗詔曰朕聞王者不貴遠物所寶惟賢故堯設茅茨禹卑宮室光武捨去寶劍順帝封還大珠朕仰企前王思齊太素邕州所奏金坑誠為潤國語人於利非朕素懷方以不貪為寶惟德其物豈尚茲難得之貨生其可欲之心耶其金坑任人採斸官不得占又曰貞元元年四月南詔王異牟尋與其酋長定計遣使趙莫羅眉由南安使凡三輩致書於韋皋各齎生金丹砂為贄三分前皋所與牟尋書各持其一為信歲中三至京師且曰牟尋請歸大國永為藩臣所獻生金以喻向化之意堅如金也丹沙示其赤心耳上嘉之乃賜牟尋詔書又曰韋執誼時為翰林學士受賕為人求科第夏卿不應執誼乃探懷中出金以內夏卿袖夏卿驚曰吾與若賴先人德致名位幸各己達豈可如此自毀壞擺袖而去執誼大慚又曰路隨為翰林學士乃兼金紫有以金帛謝除制者必比之曰吾以公事接私賄耶終無所納管子曰玉起於禺氏山金起於汝漢珠起於赤野此寶相去各七千里湯以杜山之金以贖民之賣子者禹以歷山之金贖賣子者江陽之珠天下一美上有丹砂下有黃金上有慈石下有銅金上有陵石下有鈆錫上有赭下有鐵葛盧山發而出金蚩尤取以為劍鎧雍狐山發而出金蚩尤取以為戟楚有汝漢之黃金晏子曰景公為履黃金之綦僅能舉之列子曰齊人有鬻金者清旦衣冠之市適鬻金者之所因攫其金而去吏捕得之問曰人皆在焉子攫人之金何故對曰取金之時不見人徒見金魯連子曰秦圍趙, WYG: ''}
