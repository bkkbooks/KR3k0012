  - {type: variant, offset: 3162, length: 2, content: 害又, WYG: 業自旦及暮有不獲一星者鄭玘傷陶者詩云披沙辛苦見傷懐往往分毛望亦乖力盡半年深水裏難全為一鳯凰釵就中澄州者最為良金余頃年使于上國親友不欲書其姓字附澄州金二十兩與宫灼權臣余訝其單鮮有人}
