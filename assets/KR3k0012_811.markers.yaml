  - {type: variant, offset: 3121, length: 0, content: '', SBCK: 舉得免窘逼歸原東萊太守太史子義素有義原以舉付之舉臨去以其手所杖劒金三餅與原原受金辭劒還謂度曰將軍平日與舉無郄而欲殺之者但恐其爲􅉕蠆耳令舉以去􅀂以拘􅐬其家毒螫必滋甚矣度即出舉家原以金還之茅君内傳曰漢帝及王莽獻金鍾之屬今埋在小茅山上又曰取鈆十斤着鐵器中猛火燒之三沸投九轉之華一銖於鈆中攬之湏􅁷立}
  - {type: variant, offset: 3121, length: 13, content: 成一劑可令八人仙也其次餌黃, WYG: 絶忳賣}
  - {type: variant, offset: 3121, length: 0, content: '', krp: 舉得免窘逼歸原東萊太守太史子義素有義原以舉付之舉臨去以其手所杖劒金三餅與原原受金辭劒還謂度曰將軍平日與舉無郄而欲殺之者但恐其爲蜂蠆耳令舉以去若以拘閉其家毒螫必滋甚矣度即出舉家原以金還之茅君内傳曰漢帝及王莽獻金鍾之屬今埋在小茅山上又曰取鈆十斤着鐵器中猛火燒之三沸投九轉之華一銖於鈆中攬之湏臾立}
  - {type: variant, offset: 3122, length: 0, content: '', SBCK: 黄金九斤呉時外國傳曰斯調國作金床扶南傳曰毗騫國食器皆以金爲之金如此間之石露出山邊無有限呉越春秋曰伍子胥伐楚還漂陽瀬水上欲報自殺婦人百金不知其家投金瀬水中而去湏􅁷有}
  - {type: variant, offset: 3122, length: 0, content: '', krp: 黄金九斤呉時外國傳曰斯調國作金床扶南傳曰毗騫國食器皆以金爲之金如此間之石露出山邊無有限呉越春秋曰伍子胥伐楚還漂陽瀬水上欲報自殺婦人百金不知其家投金瀬水中而去湏臾有}
  - {type: variant, offset: 3123, length: 7, content: 劑可令八人仙也, SBCK: 姥􅂘而來自言是女母取金而去蜀李書曰武帝諸將進金銀或以得官者楊襃諫曰陛下爲天下主何有以官買金耶帝謝之列女傳曰樂羊子出學}
