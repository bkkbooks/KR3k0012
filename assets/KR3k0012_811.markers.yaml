  - {type: variant, offset: 3149, length: 1, content: 稱, SBCK: 至逺望金山嵯峨如赤城照耀似天光澗壑谷中亦有生金形如䖝豸細者似蒼蠅大者􅀂􅉕蟬夜行燿熠光如瑩火地鏡圖曰黄金之氣赤黄千萬斤以上光大如鏡盤白澤圖曰黄金之精石名唐狀如豚居}
