  - {type: variant, offset: 3114, length: 4, content: 都合用四, SBCK: 以給絮棺九斤置生􅆎下魯國先賢志曰叔孫通草創朝儀拜通爲奉常賜金五百斤通悉以金賜諸生諸生乃喜曰叔孫生聖人也知當丗務廬江七賢傳曰陳翼字子􅀄到覽郷見馬旁有一人病呼曰我長安魏少公聞卿廬江樂來遊今病不能前翼迎歸養之有金}
  - {type: variant, offset: 3114, length: 0, content: '', WYG: 即以還南南曰君至徳感寳為君出終不肯受陶送付縣又曰新野黄舒義熈中耕田得一船金卜者云三年勿用長守富也舒不能從遂成土壤又曰永康王曠井上有一洗浣石時見赤氣後有胡人寄宿忽求買之曠恠所以未及度錢子婦孫氏覩二黄鳥鬬於浣石上疾往拖取變成黄金胡人不知索市逾急既得撞破石内止有二鳥處又曰即墨有古塜發之有金牛塞埏門不動犯之則大禍述異記曰南康雩}
  - {type: page-break, offset: 3114, content: '', id: KR3k0012_WYG_811-7a, image: WYG0900/WYG0900-0193a.png}
  - {type: variant, offset: 3114, length: 4, content: 都合用四, krp: 以給絮棺九斤置生腰下魯國先賢志曰叔孫通草創朝儀拜通爲奉常賜金五百斤通悉以金賜諸生諸生乃喜曰叔孫生聖人也知當丗務廬江七賢傳曰陳翼字子𥘉到覽郷見馬旁有一人病呼曰我長安魏少公聞卿廬江樂來遊今病不能前翼迎歸養之有金}
  - {type: variant, offset: 3115, length: 3, content: 合用四, WYG: 縣沿江出去縣三里名夢口穴狀如石室舊𫝊常有神雞色如好金出此穴中􅁬翼回翔長鳴響徹見人輙飛入穴因號此石為雞石昔有人耕此山則望見雞出遊戲有一長人操彈彈之雞遥見便飛入穴彈丸正着穴上丸徑六尺許下垂蔽穴猶有門隙不復容人又有人乘船從下流還縣未至此崖數里一人遍身黄衣擔兩籠黄紙求寄載因載之黄衣人乞食船主與之食訖船適至崖下船中乞𤓰此人不與仍唾盤上徑下崖直入石中船主初甚忿之見其入石始知神異取食器視之見盤上唾悉是黄金又曰先儒說禹時天下雨金三日古詩曰安得天雨金使金賤如土周王時咸陽雨金今咸陽有雨金原秦二世元年官中雨金既而化為石漢惠帝二年官中雨黄金里錫又翁仲儒家貧力作居渭川一旦天雨金}
  - {type: page-break, offset: 3115, content: '', id: KR3k0012_WYG_811-7b, image: WYG0900/WYG0900-0193b.png}
  - {type: page-break, offset: 3115, content: '', id: KR3k0012_WYG_811-8a, image: WYG0900/WYG0900-0193c.png}
  - {type: variant, offset: 3119, length: 1, content: 萬, SBCK: 餅素二十疋旣死翼賣素買棺衣衾以金置棺下􅀐馬出入後其兄長公見馬告之吏捕翼翼具言棺下得金長公叩頭謝以金十餅投其門翼送長安還之邴原別傳曰邴原字根矩以䘮亂方熾遂徃遼東時同郡劉舉亦在遼太守公孫度度掩捕其家}
  - {type: page-break, offset: 3119, content: '', id: KR3k0012_SBCK_811-7a}
  - {type: variant, offset: 3119, length: 0, content: '', WYG: 斛於其家由是與王侯爭富今秦中有兩翁世世富焉録異𫝊曰隗炤者汝南隂鴻夀亭民善於易臨終書板授其妻曰吾死當大荒窮雖爾慎莫賣宅到後五年春當有詔使頓來此亭姓龔此人負吾金卿以此板往責之亡後果大困欲賣宅者數矣憶夫言輙止到後期日有龔使者果至妻遂齎板往責使者使者執板不知所言曰我生平不踐此處何縁爾也沈吟良久謂曰賢夫何能妻曰夫善易而未曾為人卜使者曰可矣乃顧命侍者取蓍而筮之卦成謂炤妻曰吾不相負金賢夫自有金乃知亡後暫窮故藏金以待太平所以不告婦兒者恐金盡而困無已也知吾善易故書板以寄意耳金有五百斤盛以青缾覆以銅柈埋在堂屋東頭去壁一丈入地九尺妻還掘之皆如卜之言異物志曰狼䐠民與漢人交關嘗夜市以鼻齅金知其好惡幽明録曰淮牛渚津水深無可筭津人見一金牛形甚瑰壯以金繅絆也又曰巴丘縣百金崗以上二十里名黄金潭上有瀬亦名黄金瀬古有人釣於此潭獲一金鏁引之遂滿一船而有金牛出聲貌莾壯釣人被駭牛因奮躍還潭又云晉南頓王平新營一宅始移夣見一人云平與令黄欲以一器金賂暴勝之為暴所戮埋金在吾土見鎮迮甚若君復築室無復出入涯平明且即鑿壁下入五尺果得金又曰譙縣城東因城為臺方二十丈髙八尺一曰古之冢也魏武帝即築以為臺東面墻崩金玉流出取者多死因築復之又曰海中有金臺臺内有金丸𤣥中紀金之精為牛又曰長安有張氏者晝獨處室有鳩自入止于牀張惡之披懐祝曰鳩爾來為我禍耶止承塵為福耶入我懐鳩翻飛入懐以手探之不知所在而得一金帶鈎焉遂寳之自是之後子孫昌盛世說曰劉􅖙譛陳矯明帝以金五餅授矯曰君明朕心顧君妻子未知也又曰管寕華歆共園中鋤菜見地一金管揮鋤與瓦石不異華捉而擲去曹操别𫝊曰操引兵入峴發梁孝王塜破棺收金寳數}
