  - {type: variant, offset: 507, length: 163, content: 是晉行大興之祥覃為皇胤是其瑞也毀而賣之象覃見廢不終之驗也晉永和起居注曰廬江太守路永表言於穀城北見水岸邊紫赤光得金一枚文如印齒宋書曰褚彥回為吏部尚書有人求官密袖中將一餅金因求清閑出金示之曰人無知者彥回曰卿自應得官無假此物若必見與不得不相啟此人大懼收金而去彥回敘其事而不言其名時人莫之知也南史曰南海扶南國王諸農死子陽邁立陽邁初在孕, SBCK: 百鎰奉}
