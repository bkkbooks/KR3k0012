  - {type: variant, offset: 3050, length: 0, content: '', krp: 損珠玉於五湖之淵杜媱邪絶覬媚之情也東方朔神異經曰北荒中有二金闕髙百丈金銀盤圍五十丈又曰西方白宫之外有金山上有人長五丈餘名曰金犀守之蜀王夲紀曰秦王以金一笥遺蜀王蜀以禮物荅而盡化爲土秦王怒羣臣拜賀曰土者地也秦當得蜀矣說苑曰申鳴者孝聞於楚王授之相辝不受其父曰使汝有禄於國立義於庭吾無憂矣申鳴從父命爲楚相及白公亂申鳴曰今不得爲孝子矣遂援皷殺白公其父亦死王賜金百斤申鳴曰何靣目見天下遂自殺新序曰齊桓公見麥丘邑人問之曰年幾何對曰八十矣曰以子之壽祝寡人乎曰使主君甚壽金玉是賤以人爲寳又曰公孫敖問伯象先生曰今先生収天下之術愽觀四方之乆矣未能禆丗主之治明君臣之義是則未有異於府庫之藏金玉筐篋之囊間有書又曰郭隗語燕昭王曰古之人君有以千金求千里馬已死買骨五百金不能朞年千里馬至者二論衡曰盧江民小男曰陳爵陳挺相與浴於湖崖有酒樽色正黄没水中爵以爲銅渉水取之重不能舉挺徃助之樽更爲沉盤動入深淵中挺爵留顧見如錢等正黄數百千枚即共棳樚各得滿手㱕示其家乃黄金也論衡曰衆口鑠金者五行二曰火五事二曰言言與火冝故云鑠金風俗通曰衆口鑠金俗說有美金此衆人咸共詆訿言其不純賣金者欲其售因取鍜燒以見眞此爲衆口鑠金又曰漢書說王陽好車馬衣服及遷徙所載不過囊衣俗傳王陽能作黄金語曰金不可作丗不可度王陽居食禄雖爲潔白車馬衣服亦能幾何何足推之乃傳俗語白虎通曰金在西方西方者隂始起萬物禁止金之爲言禁也西京雜記曰韓嫣好彈常以金爲丸一日所失者十餘長安爲之語曰若飢寒逐金丸京師兒僮毎聞嫣出輙隨之望丸所落而拾之樂說稽熠嘉曰君臣之義生於金葛洪神仙傳曰容成公服三黄得仙所謂雄黄雌黄黄金搜神記曰魏郡張巨賣宅與程應應舉家疾賣何文文獨持大刀暮入北堂梁上一更中有一人丈餘髙冠赤幘呼曰細腰應諾何以有人氣荅曰無文問曰髙冠者誰荅曰金也在西屋壁下文掘得金三百斤又曰漢文微服懷金過魯少年少年柱金杖出應門王子年拾遺記曰少昊時金鳴於山銀涌於地或如龜虵之類乍似人鬼之形又曰方丈山有池泥色金而味辛以泥爲器可作丹矣百錬可爲金矣金色青照鬼魅猶如照面不得藏形也異苑曰汝南殷陶市同縣張南宅掘地得錢百萬金二斤即以還南南曰君至德感寳爲君出終不肯受陶送付縣令河南張摽表上尚書又曰新野黄舒義熈中耕田得一船金卜者云三年勿用長守冨也舒不能從遂成土壤又曰永康王曠井上有一洗浣石時見赤氣後有胡人寄宿忽求買之曠恠}
