  - {type: variant, offset: 1854, length: 0, content: '', SBCK: 牧者曰何子居之高而視之下也􅀋君子而言野也有君不臣有友不友當暑衣裘吾豈取金者乎延陵季子知其賢者請問姓字牧者曰子乃皮相之士也何足語姓字哉遂去周易參同契曰黄土金之父流水珠之母英雄記曰董卓塢有金二三萬斤漢武故事曰帝年數歳長公主遍指侍者與作婦好否皆不用後指陳后帝曰􅀂得阿嬌作婦當以金屋貯之漢武内傳曰帝受西王母眞形經盛以黄金之几}
