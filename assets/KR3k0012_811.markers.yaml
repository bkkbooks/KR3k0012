  - {type: variant, offset: 1913, length: 1126, content: 人於利非朕素懷方以不貪為寶惟德其物豈尚茲難得之貨生其可欲之心耶其金坑任人採斸官不得占又曰貞元元年四月南詔王異牟尋與其酋長定計遣使趙莫羅眉由南安使凡三輩致書於韋皋各齎生金丹砂為贄三分前皋所與牟尋書各持其一為信歲中三至京師且曰牟尋請歸大國永為藩臣所獻生金以喻向化之意堅如金也丹沙示其赤心耳上嘉之乃賜牟尋詔書又曰韋執誼時為翰林學士受賕為人求科第夏卿不應執誼乃探懷中出金以內夏卿袖夏卿驚曰吾與若賴先人德致名位幸各己達豈可如此自毀壞擺袖而去執誼大慚又曰路隨為翰林學士乃兼金紫有以金帛謝除制者必比之曰吾以公事接私賄耶終無所納管子曰玉起於禺氏山金起於汝漢珠起於赤野此寶相去各七千里湯以杜山之金以贖民之賣子者禹以歷山之金贖賣子者江陽之珠天下一美上有丹砂下有黃金上有慈石下有銅金上有陵石下有鈆錫上有赭下有鐵葛盧山發而出金蚩尤取以為劍鎧雍狐山發而出金蚩尤取以為戟楚有汝漢之黃金晏子曰景公為履黃金之綦僅能舉之列子曰齊人有鬻金者清旦衣冠之市適鬻金者之所因攫其金而去吏捕得之問曰人皆在焉子攫人之金何故對曰取金之時不見人徒見金魯連子曰秦圍趙邯鄲魏使將軍新垣衍入邯鄲令趙尊秦為帝魯連子說罷之秦軍退平原君以千金為先生壽笑曰若即有取商賈之事連不忍為也莊子曰今大冶鑄金金踊躍曰我且必為鏌鋣大冶必以為不祥之金又曰以瓦注者巧以黃金注者昏所要重則心矜又曰至仁無親至信辟金金玉小信之質耳至信則隆又曰金石有聲不考不鳴也韓子曰荊南麗水之中生金又曰魯丹三說中山之君而不受也因散五十金事其左右復見未語而君與之食魯丹出不及舍遂去中山其御曰交乃始善我何故去之魯丹曰夫以人言善我必以人言罪我未出境而公子惡之曰為趙來間中山君因索而罪之又曰張譴相韓病將死公乘無正懷三十金而問之其疾居一月公自問張譴曰君子死將誰使代子荅曰無正法而畏上雖然不如公子食我之得民也張譴死因相公乘無正又曰荊王弟在秦秦不出也中尉之士曰資臣百金臣能出之因載百金之晉見叔向曰荊王弟在秦秦不出也請以百金委之叔向受金而見平公曰可以城壺丘矣平公曰何以對曰荊王弟在秦秦不出是秦荊惡也必不敢禁我城壺丘若禁之我曰為我出荊王之弟吾不城也彼如出之可以得禁彼不出是卒惡也不敢禁我城壺丘矣曰善乃城壺丘謂秦公曰為出荊王之弟吾不城也秦因出之荊王大說以鍊金百鎰遺之墨子曰昔夏使飛廉折金於山鑄昆吾鼎成而方不炊自烹不舉自藏不遷自行以祭昆吾之墟其兆繇曰蓬蓬白雲一南一北一東一西九鼎使成遷三國夏失殷受殷失周受孟子曰齊王以兼金一百遺孟子兼金好金也列子曰夏華殷謂湯曰渤海之東不知幾億萬里有大壑中有山一曰岱輿二曰方壺三曰員嶠四曰瀛洲五曰蓬萊其上高觀皆金闕淮南子曰玦五百歲生黃澒五百歲生黃金黃金千歲為黃龍玦石也中夾數五故五百歲一化澒音胡貢反澒黃金水銀也秦以一鎰為一金而重一斤漢以一斤為一金又, SBCK: ''}
