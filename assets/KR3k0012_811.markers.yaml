  - {type: variant, offset: 173, length: 129, content: 事後漢書曰中興初有應嫗者生四子而寡見神光照社試探之乃得黃金自是諸子宦學並有才名至瑒七代通顯又曰益州金銀之所出魏略曰田豫為并州胡密懷金三十斤曰以此上公張袖受之荅其厚意胡去之後皆悉付外具狀聞於是詔褒之曰昔魏絳開懷以納戎今卿舉袖以受狄金朕甚嘉焉又曰大秦國出金織成帳, WYG: 精液}
