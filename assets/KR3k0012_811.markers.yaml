  - {type: variant, offset: 683, length: 1116, content: 色光麗夷人謂金之精者為陽邁中國云紫磨者因以為名宋永初二年遣使貢獻以陽邁為林邑王宋書曰齊武帝常至劉悛宅晝臥覺悛自捧金澡灌受四升以沃盥因以與帝齊書曰金車王者至孝則出金人王者有盛德則游於後池林邑有金山金汁流於浦又曰梁武帝於襄陽起兵蕭穎胄以荊州應焉時長沙寺僧鑄黃金為龍數千兩埋土中歷相傳付稱為下方黃鐵穎胄因取此龍以充軍實梁書曰武陵王紀鎮蜀既東下黃金一斤為一餅百餅為簉至百簉銀五倍之其他錦罽稱是每戰則懸金以示將士終不賞賜又曰廬陵王續之子應不惠王薨至庫內閱珍物見金鋋問左右曰此可食不荅曰不可應曰既不可食並揔乞汝南史曰林邑國有山皆赤色其中生金金夜則出飛狀如螢火又曰甄法崇之孫彬有行業鄉黨稱善嘗以一束苧就州長沙寺庫質錢後贖苧還於苧束中得五兩金以手巾裏之彬得送還寺庫道人大驚云近有人以此金質錢時有事不得舉而失擅越乃能見還輒以金半仰酬往復十餘彬堅然不受詠曰五月披羊裘而負薪豈拾遺金者耶卒還金梁武帝布衣而聞之及踐祚以西昌侯藻為益州刺史乃以彬為府錄事參軍帶郫縣令將行同列五人帝誡以廉慎至彬獨曰卿昔有還金之美故不復以此言相屬由此名德益彰陳書曰歐陽頠在嶺南交州刺史袁曇綬密以金五百兩寄頠令以百兩還合浦太守龔為四百兩付兒智矩餘人弗之知頠尋為蕭㪍所破貲財並盡唯所寄金獨存曇緩亦尋卒至是頠並依信還之時人莫不歎伏之崔鴻十六國春秋後趙錄曰建武元年十一月不雨雪至二年八月穀價湧貴金一斤直米二升又前燕錄曰汜昭字嗣先燉煌人辟州主簿志在理枉申滯人有於夜中報昭黃金者昭責而遣之後魏書曰趙柔字元順嘗在路得人所遺金珠一貫價直百縑柔呼主還之又曰孫軌字元慶為諸軍司馬太武平赫連昌引諸帥入其府藏各令任意取金玉諸將取之盈懷軌獨不取帝把手親探金賜之謂之曰卿臨財廉朕所以增賜者欲顯廉於眾人又曰叚揮自慕容璝歸魏太武至長安人告暉欲南奔云置金於馬韉中帝密遣視之果如告者斬之於市又曰李安世為主客令每有江南使至多出藏內珍寶令都下富室好容服者貨之令使任情交易時齊劉纘至金玉肆問價纘曰北方金玉太賤當是山川所出安世曰聖朝不貴金玉所以同於瓦礫又皇上德通神明地不愛寶故川無金山無玉纘初將大市得安世言慚而罷又曰副貨國城周匝七十里國王有黃金殿殿下有駞七頭高三尺又曰拔豆國出金銀河鉤羗國出金珠北史齊李幼廉少寡欲為兒童時初不從家人所求請故嘗以金寶授之終不取強付輒擲之地後為南青州刺史主簿徐乾富而暴橫歷政不能禁幼廉初至因其有犯收繫之乾密通䟽奉黃金百挺奴婢二十人幼廉不受遂殺之北史隋獻皇后山陵後帝賜楊素金鉢一實以金銀鉢一實以珠隋書曰上賜王公已下射楊素箭為第一上手以外國所獻金精盤價直鉅萬以賜之唐書曰太宗謂侍臣曰水旱不調皆為人君失德朕德不修天當責朕百姓何罪而尚多窮困聞有鬻男女者朕甚愍焉於是遣御史大夫杜淹巡關內諸州出御府金寶贖還父, SBCK: ''}
