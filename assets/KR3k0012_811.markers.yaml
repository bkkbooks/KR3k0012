  - {type: variant, offset: 3160, length: 1, content: 能, WYG: 得營業妨供養當殺而埋焉鍤入地有黄金一釡上有鐡劵曰黄金一釡賜孝子郭巨揚雄集曰單于上書願朝哀帝以問公卿公卿以虛費府帑可且勿許單于使辭去未發雄上書諫天子召還匈奴使者更報單于書而許之賜雄黄金十斤孔融聖人優劣論曰金之優者名曰紫磨猶人之有聖也陳思王辯道論曰甘陵始其語余曰本師姓韓字世雅始常與思南流作金前後數四投數萬斤金於海嶺表異録曰五嶺内富州濵州澄州江溪間皆産金側近居人以陶金}
