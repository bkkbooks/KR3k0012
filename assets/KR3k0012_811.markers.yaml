  - {type: variant, offset: 3140, length: 1, content: 仙, WYG: 奴婢三百餘萬悉譲與兄裁留菜園地數十畆起舍耕作土中得金一窔敦以示妻妻曰本言譲先祖所有此獨非其有耶敦曰固吾意也俱擔金送與兄嫂郡國誌曰蘇秦宅在洛陽利仁里後魏髙顯業每夜見赤光於光處掘得金百斤銘曰蘇家金業為之造寺秦州記曰金城郡應邵云初築城得金故曰金城臨海記曰白石山去縣邑三十里望之如雪上有湖相傳云金鵝之所集鄭緝之東陳記曰金鈍山之康縣南三里故老𫝊云有人得金鈍於此故名山劉欣期交州記曰趙嫗者九貞人乳長數尺入山聚盗遂攻郡常着金摛提屐}
