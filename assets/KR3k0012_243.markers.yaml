  - {type: variant, offset: 257, length: 252, content: 無忌讓屯騎校尉表曰屯騎之任職典禁旅禦衛事重必宜其人豈臣微弱所可克堪越騎校尉漢書百官表曰屯兵越騎校尉如淳曰越人內附以為騎也晉灼曰其才力超越後漢書曰越騎校尉鄧康以太后久臨朝政宗門盛滿數上書長樂宮諫爭宜崇公室自損私權言甚切至太后不從康心懷畏懼永寧元年遂謝病不朝又曰桓郁遷越騎校尉詔勑太子諸王各奉賀致禮郁數進忠言多見納錄又曰董卓傳越騎校尉汝南伍孚忿卓凶毒志手刃之乃朝服懷佩刀以見卓孚語畢辭去卓起送至閤以手撫其背孚因出刀刺之不中卓自奮得免急呼左右執殺孚而大詬曰虜欲反耶孚大言曰恨不得磔裂奸賊於都市以謝天地言未畢而斃, WYG: ''}
