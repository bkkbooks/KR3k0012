  - {type: variant, offset: 74, length: 6, content: 兼屯騎校尉時, SBCK: 書曰郗愔咸安元年拜都督浙江東}
  - {type: variant, offset: 74, length: 2, content: 兼屯, WYG: 書曰郗愔咸安元年拜都督浙江東五郡諸軍事進位鎮軍開府儀同三司又曰蔡謨免皇太后以謨為左光禄大夫開府儀同三司遣謁者孟洪就加册命謨上書陳謝遂以疾篤不朝賜几杖門施行馬齊書曰徐孝嗣加開府儀同三司孝嗣聞有詔歛容謂左右曰吾徳慙古人位登衮職将何以堪之明君可以理奪必當死請若不獲命正當角巾丘園待罪家巷耳固譲不受齊職儀曰開府儀同三司置舎人官}
  - {type: page-break, offset: 74, content: '', id: KR3k0012_WYG_243-3a, image: WYG0895/WYG0895-0223a.png}
  - {type: variant, offset: 74, length: 2, content: 兼屯, krp: 書曰郗愔咸安元年拜都督浙江東五都諸軍事進位鎮軍開府儀同三司辭不受又曰蔡謨免皇太后詔以謨爲左光禄大夫開府儀同三司遣謁者孟洪就加冊命謨上䟽陳謝遂以疾篤不朝賜机杖門施行馬齊書曰徐孝嗣加開府儀同三司孝嗣聞有詔歛容謂左右曰吾德慙古人位登衮職將何以堪之明君可以理奪必當死請若不獲命正當角巾丘園待罪家巷耳故讓不受齊職儀曰開府儀同三司置舎人官}
