  - {type: variant, offset: 515, length: 1, content: 曹, WYG: 趙典道懿尊為國師位特進七為列卿寝布被瓦器食也晉書百官表曰特進官品苐二漢制皇后之父率為此官傅咸奏曰公品苐一執珪坐侍臣之上特進品苐二執皮帛坐侍臣之下今啓特進宜執璧繼沈約宋書曰特進衛驃騎将軍劉放衛将軍孫資等遜位以侯就第位特進其諸官加特進者從本官供給特進但為班位而已不别有吏卒車服也齊職儀曰特進以功徳特進見之後魏書曰刁廱拜特進皇興中廱與隴西王源賀及中書監髙允等並以耆年特見優禮錫廱几杖劍履上殿日致珍羞焉北史曰穆紹加特進侍中元順與紹同官順嘗因醉入紹寝所紹擁被而起正色譲順曰老身二十年侍中與卿先君亟連職事縱卿後進何宜相排突也遂謝事還家詔諭乃起唐書官品志曰特進左右光禄金紫銀青等光禄大夫用人俱以舊徳就閒者居之總敘大夫白虎通曰大夫為言扶大進人也毛詩衛淇澳碩人曰大夫夙退無使君勞大夫未退君聽朝於路寝夫人聽内事於正寝大夫退然後罷也箋云荘姜始来時諸位大夫朝久者皆早退無使我君之勞倦以君夫人新為配偶宜親之也毛詩}
