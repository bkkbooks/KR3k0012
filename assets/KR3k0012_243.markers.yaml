  - {type: variant, offset: 587, length: 5, content: 莽時為郡文, SBCK: 隱晉書曰劉毅字仲雄年七十告老以光禄大夫致仕門施行馬賜錢百三十萬晉書曰王覽爲宗正卿致仕詔遣殿中醫療疾給藥後轉光禄大夫門施行馬又曰鄭襃魏景元􅀄疾病失明屢乞骸骨不許拜光禄大夫又曰華表字偉容歆子也太始中爲太中大夫禄賜與卿同門施行馬晉陽秋曰李喜乞老以爲光禄大夫門施行馬晉中興書曰王藴字仁修烈宗將納后訪于公卿僕射安曰王藴地望可與國㛰定后旣立徵拜金紫光禄大夫又曰祖納字士言少持操行能言名理遷右光禄大夫又曰荀組字太章頴川人也弱冠太尉王夷甫見而稱之爲光禄大夫又曰荀松字景猷組族子也弱冠大原王濟甚相器重拜右光禄大夫又曰賀循字彦士㑹稽人也節操髙厲童齓不群言行舉動必以禮讓行有餘力則精書}
  - {type: page-break, offset: 587, content: '', id: KR3k0012_SBCK_243-7a}
  - {type: variant, offset: 587, length: 1, content: 莽, WYG: 隠晉書曰劉毅字仲雄年七十告老以光禄大夫致仕門施行馬賜錢百三十萬晉書曰王覽為宗正卿致仕詔遣殿中醫療疾給藥後轉光禄大夫門施行馬又曰鄭褒景元初疾病失明屢乞骸骨不許遷光禄大夫又曰華表字偉容歆子太始中拜太子少傅轉光禄勲以老病乞骸骨詔以為大中大夫禄賜與卿同門施行馬晉陽秋曰李喜乞老以為光禄大夫門施行馬晉中興書曰王藴字叔仁烈宗将納后訪於公卿僕射安曰王藴地望可與國婚定后既立徵拜光禄大夫又曰祖納字士言少}
