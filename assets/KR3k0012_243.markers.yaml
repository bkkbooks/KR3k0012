  - {type: variant, offset: 552, length: 8, content: 殺破石淫暴無道多, WYG: 稱曰老夫於其國則稱名越國而問焉必告之以其制他國問其老者必以制度告也左傳成上曰衛侯使孫良夫來聘且尋盟公問諸臧宣叔曰中行伯之於晉也其位在三卿下孫子之於衛也位為上卿将誰先對曰次國之上卿當大國之中中當其下下當其上大夫小國之上卿當大國之下卿中當其上大夫下當其下大夫上下如是古之制也金紫光禄大夫晉書曰左右光禄大夫假金章紫綬光禄大夫加金章紫綬者品秩第二禄賜班位冠幘車服佩玉置吏卒羽林及卒諸所賜給皆與特進同其以為加官者唯假章綬禄賜班位而已不别給車服吏卒也又卒贈}
