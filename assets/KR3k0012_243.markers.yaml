  - {type: variant, offset: 81, length: 1, content: 校, SBCK: 都諸軍事進位鎮軍開府儀同三司辭不受又曰蔡謨免皇太后詔以謨爲左光禄大夫開府儀同三司遣謁者孟洪就加􅁽命謨上䟽陳謝遂以疾篤不朝賜机杖門施行馬齊書曰徐孝嗣加開府儀同三司孝嗣聞有詔歛容謂左右曰吾德慙古人位登衮職將何以堪之明君可以理奪必當死請􅀂不􅀗命正當角巾丘園待罪家巷耳故讓不受齊職儀曰開府儀同三司置舎人}
