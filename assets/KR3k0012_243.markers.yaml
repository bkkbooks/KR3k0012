  - {type: variant, offset: 584, length: 2, content: 崔篆, SBCK: 張堪字子孝爲光禄大夫數諌堪常乗白馬光武毎有異政輙曰白馬生且復諌矣又曰樊宏字靡卿爲光禄大夫爲人謙素畏慎每朝㑹迎期先到俯伏待事時至乃起帝聞之勑臨朝乃告勿令䂊到後漢書曰鄧太后從樊准議悉以公田賦與貧人即擢准與議郎吕倉並守光禄大夫准使兾州倉使兖州准到部開倉廩食􅅒給慰安生業流人咸得蘇息又曰魏文帝受禪欲以楊彪爲太尉先遣使示旨彪辝曰彪俻漢三公遭代傾亂不能有所􅀘益耄年􅀍病豈可賛惟新之朝遂固辭乃授光禄大夫賜几杖衣􅂁因朝㑹引見令彪着布單衣鹿皮冠而入待以賔客之禮華矯後漢書曰鄧彪遭後母憂毀瘠過禮因疾乞身以光禄大夫行服漢書解詁曰武帝以中大夫爲光禄大夫與博士俱以儒雅之選異官通職周官所謂官聮者也温故知新率由舊章皆能明古今辨章舊聞者也漢書百官表注曰光禄大夫古官也銀章青綬漢官儀曰光禄大夫秩比二千石不言属光禄大夫勲門外特施行馬以旌別之魏志曰常林字伯槐河内温人也時論林節操清峻欲致之公輔而林遂稱疾篤拜光禄大夫又曰黄􅀄四年詔給光禄大夫楊彪吏卒門施行馬吴志曰八月遣光禄大夫周弈石偉廵行風俗察將吏清濁民所疾苦爲黜陟之詔}
  - {type: page-break, offset: 584, content: '', id: KR3k0012_SBCK_243-6a}
  - {type: page-break, offset: 584, content: '', id: KR3k0012_SBCK_243-6b}
  - {type: variant, offset: 584, length: 2, content: 崔篆, WYG: 張湛字子孝為光禄大夫數諫湛乘白馬光武每有異政輒曰白馬生且復諫矣又曰樊宏字靡卿為光禄大夫為人謙素畏慎每朝㑹迎期先到俯伏待事時至乃起帝聞之勅臨朝乃告勿令預到後漢書曰鄧太后從樊准議悉以公田賦與貧人即擢准與議郎吕倉並守光禄大夫准使冀州倉使兖州准到部開倉廪賑濟慰安生業流人咸得蘓息又曰魏文帝受禪欲以楊彪為太尉先遣使示旨彪辭曰彪備漢三公遭代傾亂不能有所損益耄年被病豈可贊惟新之朝遂固辭乃授光禄大夫賜几杖衣袍因朝㑹引見令彪着布衣鹿皮冠而入待以賔客之禮華嶠後漢書曰鄧彪遭後母憂毁瘠過禮因疾乞身以光禄大夫行服漢書解詁曰武帝以中大夫為光禄大夫與博士俱以儒雅之選異官通職周官所謂官聨者也温故知新率由舊章皆能明古今辨章句習舊聞者也漢官儀曰光禄大夫秩比二千石掌議論屬光禄勲門外特施行馬以旌别之漢書百官表注曰光禄大夫古官也銀章青綬魏志曰常林字伯槐河内温人也時論節操清峻欲致之公輔而林遂稱疾篤拜光禄大夫又曰黄初四年詔給光禄大夫楊彪吏卒門施行馬吳志曰八月遣光禄大夫周奕石偉巡行風俗察将吏清濁民所疾苦為黜陟之詔}
