  - {type: variant, offset: 593, length: 0, content: '', SBCK: 由是愽覽群書尤明三禮爲江表儒宗拜右光禄大夫又曰頋和字君季榮族子也和二歳失父揔角便有清操弱冠知名族父榮雅器之曰此吾家千里駒也興吾宗者必此子矣康帝即位爲尚書僕射更拜銀青光禄大夫又遷左光禄大夫晉諸公賛衛尉􅀓祇}
