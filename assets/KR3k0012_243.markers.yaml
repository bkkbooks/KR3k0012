  - {type: variant, offset: 87, length: 4, content: 寺寬敞輿, krp: 此後甚衆將軍開府依大司馬朱}
  - {type: punctuation, offset: 90, content: ，, id: KR3k0012_CHANT_243-bkkpn28}
  - {type: 'tls:seg', offset: 90, content: '', id: KR3k0012_CHANT_243-2a.7}
  - {type: variant, offset: 93, length: 5, content: 麗伎巧畢給, SBCK: 禄大夫開府依司徒皂服北史曰裴文舉武成二年就加使持節驃􅀐大將軍儀同三司蜀土沃饒啇販百倍或有勸文舉規利文舉荅之曰利之爲貴莫􅀂安身身安道隆非貨之謂是以不爲非惡財也後周書曰李賢遷驃􅀐大將軍開府儀同三司太祖之奉魏太子西廵也至原州遂幸賢第讓齒而坐行郷飲酒禮焉其後太祖又至原州令賢乗輅俻儀服以諸侯㑹遇禮相見然後幸賢弟歡宴終日凡是親族頒賜有差陳書章昭逹以平留異功授鎮前將軍開府儀同三司􅀄文帝甞夢昭逹􅂛台鉉及旦以夢吿之至是侍宴酒酣頋昭逹曰卿憶夢不何以償夢昭逹對曰當效犬馬之用以盡臣節自餘無以奉償隋書曰何稠安集嶺南有欽州刺史寗猛力帥衆迎軍􅀄猛力掘山洞欲圖爲逆至是惶懼請身入朝稠以其疾篤因示無猜貳遂放還州與之約曰八九月間可詣京師相見稠還奏狀上意不懌其年十月猛力卒上謂稠曰汝前不將猛力來今竟死矣稠曰猛力共臣爲約假令身死當遣子入侍越人性直其子必來􅀄猛力臨終誡其子長真曰我與大使爲約不可失信於國士汝葬我訖即冝上路長真如言入朝上大恱曰何稠著信蠻夷乃至於此以勲授開府齊王儉拜儀同三司章曰臣聞日中則昊盈虚之定分器满必傾往覆之常理遂乃班同衮章爕和台曜外叅論道内揔百司物議惟塵自識非據梁􅁃肩吾爲武陵王拜儀同章曰臣宅慶紫霄聮休皇極地均西月旣無跡而成髙仕􅀂乗風}
