  - {type: variant, offset: 549, length: 0, content: '', WYG: 朂志朝暮省王也周禮秋官朝大夫之職掌都家之國治都家王子弟公卿及大夫之采地也凡都家之治於國者必因其朝大夫然後聽禮記曲禮上曰大夫七十而致仕若不得謝謝去也君念其德而留之則必賜之几杖}
