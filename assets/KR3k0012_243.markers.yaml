  - {type: variant, offset: 2225, length: 486, content: 良家子善騎射為羽林投石拔距絕於等倫超踰羽林亭樓由是遷為郎續漢書曰羽林左右監皆冠鶡冠應劭漢官儀曰羽林者言其為國羽翼如林盛也一名為嚴郎言其禦侮嚴厲其後簡取五營高才別為左右監監羽林左右騎父死子繼與虎賁同漢雜事曰竇固以羽林監為中郎將征西羗還中郎印綬復為羽林監漢名臣奏曰曹襃上䟽王者莫不制禮樂詔襃即先序禮樂以帝新制一篇冠首擢襃監羽林左騎魏略曰桓範字元則為羽林左監以才學與王象等典集皇覽魏志曰夏侯玄字太初弱冠為黃門侍郎嘗進見與皇后弟毛曾並坐玄恥之不悅形於色明帝恨左遷羽林監梁冀別傳曰冀妻孫壽從弟安以童幼拜黃門侍郎羽林監期門僕射漢書曰建元三年上微行始出北至池陽西至黃山南獵長楊東遊宜春微行常用飲酎八九月中與侍中常侍武騎及待詔隴西北地良家子能射者期諸殿門故有期門之號自此始也後漢書曰陰興守期門僕射典將武騎從征伐平定郡國興每從出入常操持小蓋障翳風雨躬履塗泥率先期門光武所幸之處輒先入清宮甚見親信冗從僕射續漢志曰冗從僕射秩比六百石武帝置期門郎有僕射常從游獵或以官者為之號冗從黃門僕射居則直門戶行則騎從桓帝永壽三年置冗從僕射續漢志曰先臘一日大儺逐疫鬼冗從僕射將之逐惡鬼于禁中魏中曰冗從僕射畢軌表, SBCK: 户部}
