  - {type: variant, offset: 93, length: 5, content: 麗伎巧畢給, WYG: 禄大夫開府依司徒皂服北史曰裴文舉武成二年就加使持節驃騎大将軍儀同三司蜀土沃饒商販百倍或有勸文舉規利文舉答之曰利之為貴莫若安身安道非貨之謂是以不為之非惡財也後周書曰李賢遷驃騎大将軍開府儀同三司太祖之奉魏太子西巡也至原州遂幸賢第譲齒而坐行鄉飲酒禮焉其後太祖又至原州令賢乘輅備儀服以諸侯㑹遇禮相見然後幸賢第歡宴終日凡是親族頒賜有差陳書曰張昭達以平晉異功授鎮前将軍開府儀同三司初文帝嘗夢昭達升台鉉及旦以夢告之至是侍宴酒酣顧昭達曰卿憶夢不何以償夢昭達曰當効犬馬之用以盡臣節自餘無以奉償隋書曰何稠安集嶺南有欽州刺史甯猛力師還迎軍初猛力掘山洞欲圗為逆至是惶懼請身入朝稠以其疾篤固示無猜貳遂放還州與之約曰八九月間可詣京師相見稠還奏状上意不懌其年十月猛力卒上謂稠曰汝前不将猛力来今竟死矣稠曰猛力共臣為約假令身死當遣子入侍越人性直其子必來初猛力臨終誡其子長真曰我與天使為約不可失信於國士汝葬我訖即宜上路長真如言入朝上大悦曰何稠著信蠻夷乃至於此以勲授開府齊王儉拜儀同三司章曰聞日中則昃盈虚之定分器滿則傾往復之常理遂乃班同衮章燮和台曜外參論道内總百司物議惟塵自識非據梁庾肩吾為武陵王拜儀同章曰臣宅慶紫霄聫休皇極地均西月既無跡而成髙仕若乘風}
