  - {type: variant, offset: 72, length: 1, content: 仲, SBCK: 昭伯延平元年拜爲車􅀐將軍儀同三司儀同三司始自騭也蜀志曰黄權降魏文帝善之景􅀄三年拜車􅀐將軍儀同三司王隱晉書曰太始七年以鄭袤爲司馬天子臨軒遣使就第拜授袤遣息稱疾上送印綬至于十數乆之見許其侯就第拜儀同三司置舎人官􅀐賜床帳簟褥錢五十萬又曰華廙爲太子少傅甚得輔導之義河南尹韓夀賈后之妹夫欲以女配廙不許由是有恨故不正三司疾篤乃拜儀同三司晉起居注曰太始八年詔曰衛將軍羊祜歷文武有佐命之勲其爲車􅀐將軍開府如三司之儀又曰元年詔曰中書監光禄大夫張華歷丗腹心情所慿頼故疇其勲績使儀同三司而虚冲挹損難違髙尚其以光禄大夫儀同三司夲職如故又給親信满百人又曰元康元年詔曰光禄大夫王戎光禄大夫裴楷開府辟召儀同三司晉中}
  - {type: page-break, offset: 72, content: '', id: KR3k0012_SBCK_243-1b}
  - {type: variant, offset: 72, length: 1, content: 仲, WYG: 昭伯延平元年拜為車騎将軍儀同三司儀同三司始自隲也蜀志曰黄權降魏文帝善之景初三年拜車騎将軍儀同三司王隠晉書曰泰始七年以鄭袤為司馬天子臨軒遣使就第拜授袤遣息稱疾上送印綬至于十數久之見許以疾就第拜儀同三司置舎人官騎賜牀帳簟褥錢五十萬又曰華廙為太子少傅甚得輔導之義河南尹韓夀賈后之妹夫欲以女配廙孫陶不許由是有恨故不正三司及疾篤拜儀同三司晉起居注曰泰始八年詔曰衛將軍羊祜厯文武有佐命之勲其為車騎将軍開府如三司之儀又曰元年詔曰中書監光禄大夫張華厯世腹心朕所憑賴故酬其勲績使儀同三司而虛冲挹損難違髙尚其以光禄大夫儀同三司本職如故又給親信滿百人又曰元康元年詔曰光禄大夫王戎光禄大夫裴楷開府辟召儀同三司晉中}
  - {type: page-break, offset: 72, content: '', id: KR3k0012_WYG_243-2a, image: WYG0895/WYG0895-0222c.png}
  - {type: page-break, offset: 72, content: '', id: KR3k0012_WYG_243-2b, image: WYG0895/WYG0895-0222d.png}
  - {type: variant, offset: 72, length: 1, content: 仲, krp: 昭伯延平元年拜爲車騎將軍儀同三司儀同三司始自騭也蜀志曰黄權降魏文帝善之景𥘉三年拜車騎將軍儀同三司王隱晉書曰太始七年以鄭袤爲司馬天子臨軒遣使就第拜授袤遣息稱疾上送印綬至于十數乆之見許其侯就第拜儀同三司置舎人官騎賜床帳簟褥錢五十萬又曰華廙爲太子少傅甚得輔導之義河南尹韓夀賈后之妹夫欲以女配廙不許由是有恨故不正三司疾篤乃拜儀同三司晉起居注曰太始八年詔曰衛將軍羊祜歷文武有佐命之勲其爲車騎將軍開府如三司之儀又曰元年詔曰中書監光禄大夫張華歷丗腹心情所慿頼故疇其勲績使儀同三司而虚冲挹損難違髙尚其以光禄大夫儀同三司夲職如故又給親信满百人又曰元康元年詔曰光禄大夫王戎光禄大夫裴楷開府辟召儀同三司晉中}
