  - {type: variant, offset: 702, length: 547, content: 胡輒報之兵連禍結三十餘年中國疲耗匈奴亦創艾創音初向反艾讀曰乂而天下稱武是為下策秦始皇不忍小恥而輕民力築長城之固延万里袤長也音茂轉輸之行起於負海疆墳既完中國內竭以喪社稷是為無策今天下比年飢饉發三十萬眾具三百日糧兵先至者聚居暴露勢不可用一難也邊既空虛內調郡國不相及屬此二難也計一人三百日食用糒十八斛非牛力不能勝胡也沙鹵多乏水草軍出未滿百日牛必物故此三難也胡地秋冬甚寒春夏甚風食糒飲水師有疾疫此四難也輜重自隨則輕銳者少幸而逢虜危殆不測此五難也莽不聽又曰夷狄之為患也故自漢興忠言嘉謀之臣曷嘗不運籌策相與爭於廟堂之上乎高祖時則劉敬呂后時樊噲季布孝文時賈誼朝錯孝武時有王恢韓安國朱買臣公孫弘董仲舒人持所見各有異同然揔其要歸兩科而已搢紳之儒則守和親介胄之士則言征伐皆偏見一時之利害也又曰文帝徙六郡良家材力之士六郡謂隴西天水安定北地上郡西河也其日定天水西河武帝所置耳史本其土地而追言之也聚天下精兵軍於廣武顧問馮唐與論將帥喟然歎息思古名臣此和親無益之明効也又曰董仲舒以匈奴可悅以厚利結之於天耳故與之厚利以沒其意與盟於天以堅其約質其愛子以累其心使邊城守境之民父兄緩帶稚子咽哺胡馬不窺於長城而羽檄不行於中國不亦便於天下乎又曰孝武時雖征伐克獲而士馬物故亦略相當雖開河南之野建朔方之郡亦棄造陽之北九百餘里匈奴人民每來降漢, SBCK: 進拜鮮卑}
