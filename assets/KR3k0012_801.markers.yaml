  - {type: variant, offset: 1765, length: 4, content: 并兵窮討, WYG: 髙車婦人以皮裹羊骸戴之首上縈屈髮髾而綴之髾所交切有似軒冕其死亡𦵏送掘地作坑坐尸扵中張臂引弓佩刀挾矟無異扵生而露坑不}
