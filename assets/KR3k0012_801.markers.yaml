  body:
  - {type: variant, offset: 2, length: 3, content: 二揔敘, SBCK: 三託跋氏稽胡慕容氏宇文莫槐髙車烏洛侯庫莫奚軻比能託䟦氏宋書曰託䟦氏其先漢將李陵之後也陵降匈奴單于妻之以女字託䟦其後因氏焉丗豪強分建種落也又曰索頭虜姓託䟦氏匈奴有數百千種各立名號索頭亦其一也晉􅀄索頭種有部落數萬家在雲中惠帝末并州刺史司馬騰於晉陽爲匈奴所圍索頭虜單于猗駞遣軍助騰懷帝永嘉三年駞弟盧率部落自雲中入鴈門就并州刺史劉琨求樓煩等五縣琨不能制且欲􅀝盧爲援乃上言盧兄駞有救騰之功冝請移五縣民於新興以其地處之􅉖帝進盧爲代王盧孫十翼鞬據隂山衆數十萬鞬死子開字渉圭即後魏道武皇帝又曰虜俗以四月祠火六月末率大衆至隂山謂之却霜隂山去平城六百里深逺饒樹木霜雪未甞釋盖欲以暖氣禦寒也後魏書曰黄帝子昌意少子受封}
