  - {type: variant, offset: 2487, length: 894, content: 言雖有微遠其志不疑仇讎之人其心不殆若此則信諭矣一表也臣又且以事勢諭陛下之愛令匈奴之自視也茍胡面而戎狀者其自以為見愛於天子也猶弱子之於慈母也若此則受諭矣一表也臣又且以事勢諭陛下之好令胡人之自視也茍其校之所長與其所工可以當天子之意若此則好諭矣一表也愛人之狀好人之役愛有實以諾可期十死一生彼必將至此謂三表匈奴好之來者家長以上必衣繡家少者乃衣文錦為銀車五乘大雕盡之駕四馬載綠蓋從數騎郈驂乘且雖單于之出入也不輕都此矣令匈奴降者時時得此而賜之一國聞之見之者希心而相告人人冀幸以為吾至可以得此將以懷其目一餌也匈奴之使至者若大降者也大眾之聚也上必有所召賜食焉飯物盛美胾炙醯醢方數尺於前令一人坐此胡人欲觀者固百數在旁得賜者之喜也且笑且飯味皆所嗜而所未當得也今來者時時得此而饗之一國聞之者見之者垂涎而相告人自以吾至亦將得此將此懷其口一餌也降者若使者至也必使人有所召客焉胡人之欲觀者勿禁令婦傅白黑綉衣而侍其堂者二三十人或薄或掩為其胡戲使樂府吹簫鼓鞀令使降者時得此而樂一國聞之者見之者人人唯恐其後至也以此懷其耳一餌也凡降者陛下必有所富令有高堂邃宇善廚大囷廄有編馬庫有陣車時時大具召胡客饗胡令其居處樂皆過其慮出其單于或時時賜此匈奴一國傾心而冀人人汲汲其時將以此懷其腹一餌也於來降者上必時時有所召幸拊循而後得入官於胡嬰兒貴人子好可愛有數十人為繡衣出則從出入則從入則更侍胡嬰兒得近侍胡貴人得佐酒上前使付酒錢出繡衣具帶服時以賜之令數人得此而居之一國聞者見者人人唯恐後至也以此懷其心一餌也晉中興書曰北狄其地南接燕趙北沙漠東漸九夷西界六戎世世自相君臣不稟中國正朔西域記曰諸胡俗婚姻相然許者先送同心指環崔豹古今注曰秦所築長城土色如紫漢塞亦然故稱紫塞焉李陵報蘇武書曰終日無覩但見異類韋㡚毳幕以禦風雨又曰出禮義之鄉入無知之俗又曰胡笳互動牧馬悲鳴吟嘯成群邊聲四起班固燕然山銘曰鑠王師兮征荒裔勦匈奴兮截海外封神丘兮建隆碣熙帝載兮振萬世古詩曰胡馬依北風越鳥巢南枝古胡無人行曰望胡地何嶮𡺢斷胡頭脯胡臆陸機樂府詩曰驅馬陟陰山山高馬不前借問燕山候勁虜在燕然古詩曰出自蘇北門遙望胡地桑陳琳樂府詩曰飲馬長城窟水寒傷馬骨蔡琰詩曰邊亭與華異胡風春夕起, WYG: ''}
