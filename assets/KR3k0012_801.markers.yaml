  - {type: variant, offset: 1781, length: 0, content: '', SBCK: 其地下濕多霧氣而寒國人尚勇不爲姧􅀼故慢藏野積而無㓂盗好射獵樂有箜篌木槽革面施九􅁌太武真君四年來朝稱其國西北有魏先帝舊虚石室南北九十歩東西四十歩髙七十尺室有神靈人多祈請太武遣中書侍郎敞吿􅀕刋祝文於石室之壁而還唐書曰烏羅渾國盖後魏之烏洛侯也今亦謂之烏羅護其國在京師東北六千三百里東與靺羯西與突厥南與契丹北與烏丸接風俗與靺羯同貞觀六年其君長遣使獻貂皮庫莫奚後魏書曰庫莫奚國之先東部字文別種也􅀄爲慕容元貞所}
