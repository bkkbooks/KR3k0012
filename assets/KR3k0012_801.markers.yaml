  - {type: variant, offset: 37, length: 0, content: '', SBCK: 之屬累代殘􅁀作害中州而始均之裔不交南夏是以載籍無聞焉積六七十丗裔孫即成皇帝諱毛也毛統國三十六大姓九十九威振北方莫不率服至力微立即成元皇帝也諸部大人悉服控􅁌之士二十餘萬遷於定襄之盛樂也}
