  - {type: variant, offset: 1765, length: 0, content: '', SBCK: 大連氏五曰窟賀氏六曰逹薄氏七曰阿崙氏八曰莫允氏九曰俟分氏十曰副伏羅氏十一曰乞􅀽氏十二曰右叔沛氏又曰髙車昩利不顧後患又曰髙車斛律部帥倍侯利爲蠕蠕掩襲遂奔魏賜爵孟都公倍侯利質直勇徤過人北方之人畏之嬰兒啼者語曰倍侯利來便止處女歌謡云求良夫當如倍侯利其衆服如此善用五十􅆱筮􅁻凶毎中故得親幸倍侯利卒道武悼惜葬以魏禮謚曰忠壯王又曰太和十四年阿伏至羅遣使至京以二箭奉貢云蠕蠕爲天子賊臣當爲天子討除孝文賜繡袴褶一具雜綵百疋又曰髙車部衆分散或來奔附或投蠕蠕詔遣宣威將軍羽林監孟威撫納降人又曰髙車遣使貢金方一銀方一金杖二馬七疋駞十頭又曰髙車與蠕蠕戰於蒲􅀋海北割蠕蠕之髮送於羽林􅁥孟威又曰髙車遣使獻龍馬五疋金銀貂皮及諸方物詔賜樂器一部樂工八十人赤紬十疋􅄂綵六十疋又曰髙車王伊匐遣使朝貢因乞朱畫歩挽一乗}
