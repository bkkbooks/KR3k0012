  - {type: variant, offset: 2402, length: 142, content: 湯祝網而漢陰受舞三苗而南蠻服今漢帝國也宜以厚德懷四夷孰敢不承帝意陛下為臣建三表設五餌以此與單于爭則下匈奴猶振槁也臣且以事勢諭天子之言使匈奴大眾信陛下也若日出之灼灼故聞君一言雖有微遠其志不疑仇讎之人其心不殆若此則信諭矣一表也臣又且以事勢諭陛下之愛令匈奴之自視也茍胡面而戎狀者其自以為見愛, SBCK: 校尉閻柔保我}
