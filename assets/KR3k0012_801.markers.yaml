  - {type: variant, offset: 39, length: 0, content: '', SBCK: 禄官立始祖子也分國爲三部一居上谷北濡源之西東接宇文部自統之一居代郡之叅合陂北兄子猗㐌統之一居定襄之盛樂故城使猗㐌弟猗盧統之稽胡後周書曰稽胡一百歩部稽盖匈奴別種劉元海五部之苗裔也或云山戎赤狄之後離石以西安定以東方七八百里居山谷間種落繁熾其俗婦人多貫蜃貝以爲耳頸飾孝昌中有劉蠡􅂛者居雲陽谷分遣部衆抄掠居汾晉之間略無寧歳神}
  - {type: variant, offset: 39, length: 0, content: '', WYG: 禄官立始祖子也分國爲三部一居上谷北濡源之西東接宇文部自統之一居代郡之叅谷陂北兄子猗駞統之一定襄之盛樂故城使猗駞弟猗盧統之稽胡後周書曰稽胡一曰歩部稽盖匈奴别種劉元海五部之苖裔也或云山戎赤狄之後離石以西安足以東方七八百里居山谷間種落繁熾其俗婦人多貫蜃具以爲耳頸餙孝昌中有劉蠡升者居雲陽谷分遣部衆抄掠居汾晉之間略無寜歳神}
