  - {type: variant, offset: 3607, length: 274, content: 仁壽宮丁匠死者太半雨沙隋書曰梁簡文時雨黃沙時侯景陵上其年人相食雨灰隋書曰梁武大同年雨灰色黃時帝惡人勝己又信佛法捨身為奴蔽賢絕道後有侯景之亂雨血戰國策曰齊湣王三十一年侵伐鄰國窮兵極武外怨於諸侯內失於百姓燕將樂毅連五國兵以伐之湣王出走楚使淖齒救齊淖齒謂王曰夫千乘愽昌間地方數百里雨血沾衣嬴愽之地坼及至泉有人當闕而哭求之不得去則又聞其聲王悉知之乎王曰不知淖齒曰天地人皆以告矣而王不知何得無誅遂殺湣王以與燕鬥而敗漢書曰惠帝時宜陽雨血一頃時諸呂用事殺三皇子建立非嗣退大臣王陵趙堯周昌后崩大臣共誅滅諸呂僵尸流血之應又曰哀帝時山陽雨血廣三尺長五尺大者如錢小者如麻, WYG: ''}
