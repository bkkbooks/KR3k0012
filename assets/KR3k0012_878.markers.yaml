  - {type: variant, offset: 329, length: 0, content: '', WYG: 不消春秋命厯序曰桀無道夏出霜師曠占曰春夏一日有霜者君父母酷政大嚴大殺天以示之何以言之霜滅殺萬草坐不殺也見變如此宜損威殺重人之命漢書五行志曰左傳僖公時八月霜不殺草謂襄仲専權殺嫡立庶公室遂弱至三十三年冬霜不殺草劉向以為君誅不行舒緩之應是時公子遂専政三桓繼為卿皆為亂也又曰定公元年八月霜殺菽劉向以為誅罰不由君出在臣下之象是時季氏逐昭公死于外又曰武帝時四月霜殺草木是時天下户口減耗又曰元帝時三月九月隕霜殺稼時宏恭石顯専政廹逐忠烈進用邪佞又曰王莽天鳯六年四月霜殺草木則専政所致至地皇四年秋霜闗東人相食馬適王匡等起兵羣盗大亂晉書曰武帝時八月霜害豆又五月隕霜傷穀時大舉征呉又五月霜殺桑麥時王濬大功被䧟無辜又曰惠帝時三月霜傷木五月雨雹時賈后廢愍懐太子隋書曰梁武帝時三月六月降霜殺草時發卒拒魏百姓勞苦唐書曰太宗貞觀初突厥頡利可汗部落五月霜降至四年為僕射李靖所滅晝霜隋書曰北齊武城時晝霜下其下日𫝊位於太子緯雹京房易飛候曰雹下盡樹木枝害五穀者禮記月令曰仲夏行冬令則雹凍傷穀左𫝊曰昭公四年正月大雨雹季武子問於申豐曰雹可禦乎對曰聖人在上無雹雖有不為災古者日在北陸而藏氷西陸朝覿而出之其出入也時今棄而不用雹之為災誰能禦之春秋考異郵曰僖公九年秋昭三年冬並大雨雹時僖公専樂齊女綺畫珠璣之好掩月光陰精凝為災異昭公事晉陰精用宻故災史記曰周孝王七年厲王生冬大雹牛馬死江漢俱動及孝王崩厲王立王室大亂漢書曰宣帝太始中山陽濟陽雨雹如鷄子深二尺五寸殺飛鳥牛馬皆死七月大司馬霍禹謀反伏誅八月霍皇后廢成帝時四月楚國雨雹大如斧飛鳥死時王氏専政又曰王莽時雨雹殺牛羊莽殺其少子咸時天下大亂百姓窮愁起為盗賊後漢書曰安帝初元四年六月郡國三雨雹大如鷄子殺六畜時鄧太后以陰專陽政又曰獻帝初}
