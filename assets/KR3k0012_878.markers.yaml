  - {type: variant, offset: 328, length: 0, content: '', SBCK: 郎顗上事曰入歳常有霜氣月不舒光日不宣耀陛下倦於萬機政有闕也抱朴子曰􅀂霜氣有圍城或入於城則外兵得入􅀂霜氣從内岀主人岀戰京房易傳曰興兵妄誅厥災夏霜殺五􅂖誅不原情兹謂不仁冬先􅀨乃隕霜有芒角賢聖遭害其霜附木不入地毛詩曰正月繁霜我心憂傷正月夏之四月也繁多也四月建巳純陽用事霜多急恒寒苦之異傷害萬物故心憂也春秋考異郵曰魯僖公即位隕霜不殺草李梅實梅李大樹比草爲貴是君不能伐也定公即位隕霜不殺菽菽者稼最強李氏之萌又曰穆公即位仲夏霜殺草日}
  - {type: variant, offset: 328, length: 0, content: '', WYG: 郎顗上事曰今嵗常有霜氣月不舒光日不宣耀陛下倦於萬機政有闕也抱朴子曰若霜氣有圍城或入於城則外兵得入若霜氣從内出主人出戰京房易傳曰興兵妄誅厥災夏霜殺五穀誅不原情兹謂不仁冬先雨乃隕霜有芒角賢聖遭害其霜附木不入地也毛詩曰正月繁霜我心憂傷正月夏之四月也繁多也四月建巳純陽用事霜多急恒寒若之異傷害萬物故心憂也春秋考異郵曰魯僖公即位隕霜不殺草李梅實梅李大樹比草為貴是君不能伐也定公即位隕霜不殺菽菽者稼最强季氏之萌又曰穆公即位仲夏霜殺草日}
  - {type: page-break, offset: 328, content: '', id: KR3k0012_WYG_878-5b, image: WYG0900/WYG0900-0663b.png}
  - {type: page-break, offset: 328, content: '', id: KR3k0012_WYG_878-6a, image: WYG0900/WYG0900-0663c.png}
  - {type: variant, offset: 328, length: 0, content: '', krp: 郎顗上事曰入歳常有霜氣月不舒光日不宣耀陛下倦於萬機政有闕也抱朴子曰若霜氣有圍城或入於城則外兵得入若霜氣從内岀主人岀戰京房易傳曰興兵妄誅厥災夏霜殺五糓誅不原情兹謂不仁冬先雨乃隕霜有芒角賢聖遭害其霜附木不入地毛詩曰正月繁霜我心憂傷正月夏之四月也繁多也四月建巳純陽用事霜多急恒寒苦之異傷害萬物故心憂也春秋考異郵曰魯僖公即位隕霜不殺草李梅實梅李大樹比草爲貴是君不能伐也定公即位隕霜不殺菽菽者稼最強李氏之萌又曰穆公即位仲夏霜殺草日}
  - {type: variant, offset: 329, length: 0, content: '', SBCK: 不消春秋命曆序曰桀無道夏出霜師曠占曰春夏一日有霜者君父母治政大嚴大殺天以示之何以言之霜威殺萬草坐大殺也見變如此冝損威殺重人之命漢書五行志曰左傳僖公時八月霜不殺草謂襄仲專權殺嫡立庻公室遂弱至三十三年冬霜不殺草劉向以爲君誅不行舒緩之應是時公子遂專政三桓繼爲卿皆爲亂矣又曰定公元年八月霜殺菽劉向以爲誅罰不由君出在臣下之象是時季氏逐昭公死于外又曰武帝時四月霜殺草木是時天下户口减耗又曰元帝時三月九月隕霜殺稼時弘恭石顯專政迫逐忠烈進用邪倿又曰王莽天鳯六年四月霜殺草木則專政巳亂至地皇四年秋霜􅀜東人相食馬適王匡等兵起羣盗大亂晉書曰武帝時八月霜害豆又五月隕雪傷榖時大舉征呉又五月霜殺桑麥時王濬大功􅀍䧟無辜又曰惠帝時三月霜傷木五月􅀨雹時賈后廢􅉖懷太子隋書曰梁武帝時三月六月降霜殺草時發卒拒魏百姓勞苦唐書曰太宗貞觀􅀄突厥頡利可汗部落五月霜降至四年爲僕射李靖所㓕晝霜隋書曰北齊武成時晝霜下其年傳位於太子緯雹京房易飛候曰雹下盡樹木枝害五􅂖者君賦歛尅民禮記月令曰仲夏行冬令則雹凍傷􅂖左傳曰昭公四年正月大􅀨雹季武子問於申豊曰雹可禦乎對曰聖人在上無雹雖有不爲災古者日在北陸而藏氷西陸朝覿而出之其出入也時今棄而不用雹之爲災誰能禦之春秋考異郵曰僖公九年秋昭三年冬並大􅀨雹時僖公專樂齊女綺􅀞珠璣之好掩月光隂精凝爲災異昭公事晉隂精用宻故災史記曰周孝王七年厲王生冬大雹牛馬死江漢俱動及孝王崩厲王立王室大亂漢書曰宣帝太始中山陽濟陽􅀨雹如鷄子深二尺五寸殺飛鳥牛馬皆死七月大司馬霍禹謀反皆㐲誅八月霍皇后廢成帝時四月楚國􅀨雹太如斧飛鳥死時王氏專政又曰王莽時􅀨雹殺牛羊莽殺其少子咸時天下大亂百姓窮愁起爲盗賊後漢書曰安帝􅀄元四年六月郡國三􅀨雹大如鷄子殺六畜時鄧太后以隂盛專於陽政又曰獻帝􅀄}
