  - {type: variant, offset: 4693, length: 12, content: 梁惠成王八年雨黍于齊京房, WYG: 鄒陽上書}
  - {type: variant, offset: 4698, length: 369, content: 年雨黍于齊京房曰雨五穀人相食又曰燕丹囚於秦天雨粟於燕後秦滅之後漢書曰光武末陳留雨粟形如稗實雨魚漢書曰成帝時雨魚長五寸已下時王氏專政崔鴻十六國春秋曰後蜀李期末年大雨魚於宮中其色黃其年為李壽廢殺之又曰夏赫連勃勃鳳翔元年五月雨魚于統萬時興役尤甚雨螽史記曰魯文公三年雨螽劉向以為宋殺大夫而無罪有暴虐賦歛之應雨錢廣五行記曰後魏宣武景明年海陵人黃尋家貧忽風雨錢飛至家後巨富錢數萬其後被誅雨水銀隋書曰文帝仁壽四年八月仁壽宮內再雨水銀又陝州雨水銀奏高祖高祖知非祥其年太子逆殺漢王諒舉兵天下將亂之應雨金史記曰晉惠公二年雨金至六年秦穆公涉河伐晉雨續宋書曰孝武大明七年會稽雨續委於山澤續如麻紵脆似地毛至八年大餓橫屍原野雨原宋書曰文帝元嘉十七年七月張仲舒晨夕輒見門側有赤氣赫然空中忽雨絳羅於庭中廣七八分長五六寸皆以箋紙繫之紙廣長與羅等紛紛甚駛舒惡而焚之舒經宿暴死, SBCK: ''}
