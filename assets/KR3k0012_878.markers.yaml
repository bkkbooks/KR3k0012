  - {type: variant, offset: 1203, length: 8, content: 班不悟為李期所殺, WYG: 逆帝返正頻年大霧時帝室衰㣲臣下權盛兵及土地畧非君有晉中興書徴祥説曰大寧元年十一月黃霧四塞王敦之應}
  - {type: variant, offset: 1205, length: 196, content: 悟為李期所殺宋書曰文帝元嘉二十六年十二月夜有白氣貫於北斗屬子地至明年魏太武至瓜步江陳書曰文帝天嘉五年六月夜有白氣兩道出于北斗東南屬子地後年四月帝崩太子伯宗立廢為臨海王又曰宣帝太建五年二月夜有白氣貫于北斗紫宮屬于地至明年北齊兵至于江隋書曰蕭吉煬帝嗣位拜太府少卿行經華陰見楊素家上有白氣屬天密言於帝帝問其故吉曰其後素家當兵禍絕滅之象改葬可免帝後謂玄感曰公家宜改葬玄感亦微知其故以為吉祥託以遼東未滅, SBCK: 徹日吾事}
