  - {type: variant, offset: 675, length: 343, content: 丈其間有白雲如魚鱗虎子韜曰當有刺客後果為太子宣所殺氣釋名曰祲祲也赤黑之氣相侵也周禮曰春官眂祲掌十煇之法以觀妖祥一曰祲鄭司農云祲陰陽氣相侵也左傳曰昭公十五年春將褅于武公戒百官梓慎曰禘之日其有咎乎吾見赤黑之祲非祭祥也喪氣也其在莅事乎二月祭貞禘叔弓蒞事籥入而卒春秋運斗樞曰赤人刺房赤人賊氣而刺房房在王之明堂火星也呂氏春秋曰亂國之王其氣有豊上歛下有若水之狀有若山之狀春黃夏黑秋蒼冬赤崔鴻十六國春秋北涼錄曰玄始十一年春正月饗群臣于謙光殿沮渠蒙遜曰南方有惡氣經天暴兵眾也不出一旬必有寇問命治兵東苑以備之西秦遣騎七千來襲至縣孫猴嶺聞有備而還三輔舊事曰漢作靈臺以四孟之月登臺而觀黃氣為疾病赤氣為兵黑氣為水也白氣漢書曰哀帝建平元年有白氣從地至天出參下貫太廟廣如疋布長十餘丈哀帝陰病候也續漢書曰孝和永元十六, WYG: ''}
