  - {type: variant, offset: 747, length: 439, content: 昭公十五年春將褅于武公戒百官梓慎曰禘之日其有咎乎吾見赤黑之祲非祭祥也喪氣也其在莅事乎二月祭貞禘叔弓蒞事籥入而卒春秋運斗樞曰赤人刺房赤人賊氣而刺房房在王之明堂火星也呂氏春秋曰亂國之王其氣有豊上歛下有若水之狀有若山之狀春黃夏黑秋蒼冬赤崔鴻十六國春秋北涼錄曰玄始十一年春正月饗群臣于謙光殿沮渠蒙遜曰南方有惡氣經天暴兵眾也不出一旬必有寇問命治兵東苑以備之西秦遣騎七千來襲至縣孫猴嶺聞有備而還三輔舊事曰漢作靈臺以四孟之月登臺而觀黃氣為疾病赤氣為兵黑氣為水也白氣漢書曰哀帝建平元年有白氣從地至天出參下貫太廟廣如疋布長十餘丈哀帝陰病候也續漢書曰孝和永元十六年四月丁未紫宮中生白氣如粉絮占為喪又曰孝靈嘉平二年八月辛未白氣如疋練衝北斗第四星占為大戰明年冬楊州刺史臧旻攻盜賊於建康斬首數千級蜀李書曰哀帝即位有白氣二道帶天望氣者言宮中有伏兵果為卭都公所害也晉書曰懷帝永嘉三年十二月有白氣如帶自地昇天南北各二至五年石勒劉曜王彌皆寇洛陽帝蒙塵于平陽劉聰封帝為會稽公又曰成帝咸和元年後蜀李雄玉衡二十四年雄死, SBCK: ''}
