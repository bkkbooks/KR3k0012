  - {type: variant, offset: 1275, length: 1544, content: 月帝崩太子伯宗立廢為臨海王又曰宣帝太建五年二月夜有白氣貫于北斗紫宮屬于地至明年北齊兵至于江隋書曰蕭吉煬帝嗣位拜太府少卿行經華陰見楊素家上有白氣屬天密言於帝帝問其故吉曰其後素家當兵禍絕滅之象改葬可免帝後謂玄感曰公家宜改葬玄感亦微知其故以為吉祥託以遼東未滅不遑私門之事未幾玄感以反族誅赤氣漢書曰成帝永始三年二月癸未夜東方有赤白色氣大三四圍長二三丈索索如樹南方有大樹四五圍下莖十五餘丈皆不至地讖占曰東客之變氣狀如樹木以此知四方欲動者明年十二月己卯尉氏男子楚並等謀反庚子山陽讖官亡徙蘇令等為大賊一日有兩氣同時起而並令等同月而俱發又曰王莽建國四年夏赤氣出東南竟天明年二月元帝王皇后崩後漢書曰獻帝興平末年夜有赤氣貫紫宮明年改元建安政歸曹氏晉書曰惠帝大安二年赤氣竟天又永興二年十一月夜有赤氣竟天其年十二月成都王頴攻洛陽又曰懷帝永嘉元年正月天氣晝赤氣有聲如雷明年劉元海僣位宋書曰文帝元嘉七年十一月西北有赤氣中黑如旌旗至八年滑臺為魏軍圍糧盡城中燻鼠而食之後魏書曰莊帝永安三年十一月己丑有赤氣如霧從顯陽殿階西南角斜屬廊高一丈連地如絳紗自未至戍不滅帝見而惡之隋書曰周靜帝大定元年有赤氣起西方東行遍天下七月隋公堅禪又曰隋大業末越王侗東都留守為王世充所幽世充自立為丞相百官惣已於尚書省受冊設樂文武陪位於廳西有赤氣如絳慢自辰至戌而滅旬日世充乃殺朝士元文都盧楚遂篡位黑氣史記曰周靈王二十年有五黑氣如日至景王五大夫爭權後漢書曰靈帝光和元年六月有黑氣墮所御溫德殿庭十月皇后宋氏廢至中平元年鉅鹿人張角稱黃巾帥部三十六萬同反叛宋書曰明帝太始二年二月夜有黑氣五東西經天南行隋書曰梁元帝承聖三年六月有黑氣如龍見殿內其年元帝為西魏所擒又曰陳廢帝臨海王時十月日入時有黑氣如雲入日中其年見廢雨史記曰夏桀末年大雨水俄為湯所放京房易妖占曰雨鳴瓦任威武大臣專檀霖雨壞道尚書洪範咎徵曰狂恒雨若君行妄則常雨左傳曰莊公十一年秋宋大水公使吊焉曰天作淫雨害於粢盛若之何不吊對曰孤實不敬天降之災又以為君憂拜命之辱春秋繁露曰木有變則春多雨此徭役眾賦歛重故也京氏別對災異曰人君擅私恩恣意縱情不與臣下同謀即致偏雨夜墮也不救致苦雨降萬民愁勞水絕道其救也興公道無私黨此災消矣漢書曰文帝後三年秋大雨晝夜不絕三十五日流殺民家新垣平謀反之徵又曰昭帝時秋大雨自七月至十月時帝幼霍光專政又曰成帝時秋大雨四十餘日時王氏舉宗在朝之應又曰哀帝時夏大雨雹又冬大風雨雹其年郡國四十一雨水明年京師及郡國又四十一雨水海賊張伯路與平原劉文光等攻厭次殺令長又曰王莽地皇中赤眉殺太師羲仲莽遣太師王匡討之莽兵出東都門外天大雨沾衣長安父老歎曰是為軍泣時百姓飢荒莽令煮草為酪不可食重於煩費又曰四年六月光武兵至昆陽莽使司徒王尋司空王邑將兵百萬圍之會天大風飛屋瓦雨下如注二公兵亂敗自相殘殺滍水為之不流後漢書曰靈帝時夏京師大雨水其秋中常侍曹節矯詔誅太傅陳蕃將軍竇武遷太后於北宮至後年京師又雨水暴出其年竇太后崩是苦雨之應也又曰獻帝初平初董卓逼帝入長安將入宮日大雨晝昏卓殺太傅袁隗太僕袁基及男女宗族五十餘人又曰獻帝時夏大雨水時曹操殺皇后伏氏又曰獻帝末司徒王允殺董卓卓將李𠐶郭汜攻陷長安殺戮甚眾乃收卓尸葬於郿葬日大風雨雨水從藏溢漂卓棺出於穴俄而𠐶汜皆被殺續漢書曰建光元年京都及郡國二十九淫雨傷稼是時羗反久未平百姓屯戍不解愁苦又曰桓帝延熹二年夏霖雨五十餘日是時大將軍梁冀秉政又曰靈帝建寧元年夏霖雨六十餘日是時大將軍竇武謀廢中官其年九月長樂五官史朱瑀等共中常侍曹節起兵闕下武敗追斬武兄弟死者數百人魏志曰明帝時大雨殺鳥雀時帝居喪不哀出入弋獵故有恒雨為罰之變晉書曰元帝時大雨四十餘日晝夜雷電時王敦興兵王師敗續又曰成帝時頻年大雨恒雷時蘇峻餘黨猶據石頭帝幼權在臣下也齊書曰明帝時王敬則為大司馬拜日大雨洪注文武失色敬則後竟被誅, WYG: 塞}
