  - {type: variant, offset: 1671, length: 939, content: 黑如旌旗至八年滑臺為魏軍圍糧盡城中燻鼠而食之後魏書曰莊帝永安三年十一月己丑有赤氣如霧從顯陽殿階西南角斜屬廊高一丈連地如絳紗自未至戍不滅帝見而惡之隋書曰周靜帝大定元年有赤氣起西方東行遍天下七月隋公堅禪又曰隋大業末越王侗東都留守為王世充所幽世充自立為丞相百官惣已於尚書省受冊設樂文武陪位於廳西有赤氣如絳慢自辰至戌而滅旬日世充乃殺朝士元文都盧楚遂篡位黑氣史記曰周靈王二十年有五黑氣如日至景王五大夫爭權後漢書曰靈帝光和元年六月有黑氣墮所御溫德殿庭十月皇后宋氏廢至中平元年鉅鹿人張角稱黃巾帥部三十六萬同反叛宋書曰明帝太始二年二月夜有黑氣五東西經天南行隋書曰梁元帝承聖三年六月有黑氣如龍見殿內其年元帝為西魏所擒又曰陳廢帝臨海王時十月日入時有黑氣如雲入日中其年見廢雨史記曰夏桀末年大雨水俄為湯所放京房易妖占曰雨鳴瓦任威武大臣專檀霖雨壞道尚書洪範咎徵曰狂恒雨若君行妄則常雨左傳曰莊公十一年秋宋大水公使吊焉曰天作淫雨害於粢盛若之何不吊對曰孤實不敬天降之災又以為君憂拜命之辱春秋繁露曰木有變則春多雨此徭役眾賦歛重故也京氏別對災異曰人君擅私恩恣意縱情不與臣下同謀即致偏雨夜墮也不救致苦雨降萬民愁勞水絕道其救也興公道無私黨此災消矣漢書曰文帝後三年秋大雨晝夜不絕三十五日流殺民家新垣平謀反之徵又曰昭帝時秋大雨自七月至十月時帝幼霍光專政又曰成帝時秋大雨四十餘日時王氏舉宗在朝之應又曰哀帝時夏大雨雹又冬大風雨雹其年郡國四十一雨水明年京師及郡國又四十一雨水海賊張伯路與平原劉文光等攻厭次殺令長又曰王莽地皇中赤眉殺太師羲仲莽遣太師王匡討之莽兵出東都門外天大雨沾衣長安父老歎曰是為軍泣時百姓飢荒莽令煮草為酪不可食重於煩費又曰四年六月光武兵至昆陽莽使司徒王尋司空王邑將兵百萬圍之會天大風飛屋瓦雨下如注二公兵亂敗自相殘殺滍水為之不流後漢書曰靈帝時夏京師大雨水其秋中常侍曹節矯詔誅太傅陳蕃將軍竇武遷太后於北宮至後年京師又雨水暴出其年竇太后崩是苦雨之應也又曰獻帝初平初董卓逼帝入長安將入宮日大雨晝昏卓殺太傅袁隗太僕袁基及男女宗族五十餘人又曰獻帝時夏大雨水時曹操殺皇后伏氏又曰獻帝末司徒王允殺董卓卓將李𠐶郭汜攻陷長安殺戮甚眾乃收卓尸葬於郿葬日大風雨雨水從藏溢漂卓棺出於穴俄而𠐶汜皆被殺續漢書曰建光元年京都及郡國二十九淫雨傷稼, SBCK: ''}
