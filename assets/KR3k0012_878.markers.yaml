  - {type: variant, offset: 2940, length: 1757, content: 餘日後元瑾荀濟劉思逸謀殺齊文宣不遂咸被誅又曰北齊武成清河年大雨晝夜不息數十日山東大水人多餓死是年匈奴來寇并州又曰後主大統三年積陰大雨時太后淫亂也隋書曰文帝仁壽元年夏驟雨震雷大風拔木宜君湫水移於始平明年獨孤后崩唐書曰則天長安四年九月霖雨兼雪凡陰一百五十餘日至神龍元年正月五王誅二張孝和反正方見晴霽又曰德宗貞元二十一年順宗風病王叔文用事連月陰雨不霽乃以憲宗為皇太子制出日即晴傳所謂皇之不極厥罰恒陰皆此類也無雲而雨春秋感精符曰失陽事則無雲而雨宋均注曰四月純陽用事失陽故無雲而雨也河圖祕徵曰主急妄怒失陽事則主無雲而雨京氏別對災異曰無雲暴雨何人君封拜無功進無德則致不雲而暴雨過惡暴楊誅反受罪密雲而不雨其救也誅疆卹弱信及兆民雲雨時也隋書曰梁武帝時雨自七月至十月是時頻年興師士卒疲弊又曰元帝承聖中湘州賊陸納推李洪雅為王羽儀器甲甚精徒黨勇銳時天日晴明初無雲霧軍發之際忽然風雨時人謂為軍泣百姓竊言知其敗也元帝命竟陵太守王僧辨討平之京房曰若出軍之日無雲而雨此天泣軍沒不還雨不沾衣名曰鬼泣其軍必敗抱朴子曰無雲而雨是為雨血將軍當揚兵講武以應之大雨軍中甚必無功雨土京房易傳曰內淫亂百姓勞苦則天雨土此小人將起是謂黃生目土失其性則雨塵土沙灰皆土之類尚書中候曰夏桀無道山亡土崩殷紂時十日雨土於毫紂竟國滅伏侯古今注曰漢武帝元朔四年雨土又曰昭帝始元二年雨土晝昏又曰元帝建昭四年雨土梁書曰武帝大同元年雨土二年又雨黃塵如雪攬之盈掬時帝溺於佛法興造尤甚後魏書曰世宗景明四年涼州雨土如霧時舅尚書令高肇專政俄而被殺隋書曰隋文帝開皇二年京師雨土四年關中亂飢諸王各謀為逆時內營都邑後起仁壽宮丁匠死者太半雨沙隋書曰梁簡文時雨黃沙時侯景陵上其年人相食雨灰隋書曰梁武大同年雨灰色黃時帝惡人勝己又信佛法捨身為奴蔽賢絕道後有侯景之亂雨血戰國策曰齊湣王三十一年侵伐鄰國窮兵極武外怨於諸侯內失於百姓燕將樂毅連五國兵以伐之湣王出走楚使淖齒救齊淖齒謂王曰夫千乘愽昌間地方數百里雨血沾衣嬴愽之地坼及至泉有人當闕而哭求之不得去則又聞其聲王悉知之乎王曰不知淖齒曰天地人皆以告矣而王不知何得無誅遂殺湣王以與燕鬥而敗漢書曰惠帝時宜陽雨血一頃時諸呂用事殺三皇子建立非嗣退大臣王陵趙堯周昌后崩大臣共誅滅諸呂僵尸流血之應又曰哀帝時山陽雨血廣三尺長五尺大者如錢小者如麻後二年王莽擅朝誅貴戚丁傅董賢用事晉書曰惠帝永康元年三月尉氏雨血明年正月趙王倫篡位遷帝於金墉城其後天下大兵禍流王室崔鴻十六國春秋曰前趙劉聰建元元年十二月雨血於左司隸寺覆地其月又雨血東宮延明殿徹瓦在地者深五寸二年四月雨血於東宮其年十二月又雨血於東宮廣袤頃餘麟嘉元年二月雨血東宮其月又雨血於光極殿來年雨血平陽廣袤十里其月聰死劉璨為靳淮所殺又曰後趙石遵時雨血周遍鄴城俄為石鑒冉閔所廢閔遂滅石氏誅胡人又曰南燕慕容超將敗東萊雨血俄而國亡又曰後蜀李勢末年天雨血俄降於桓溫也隋書曰文帝時突厥雍閭可汗境內雨血三日俄而為隋師所滅唐書曰高祖武德初突厥處羅可汗欲侵中夏會天雨血三日乃止而處羅疽發而死雨肉後漢書曰桓帝時廉縣雨肉似羊肺大如手時梁冀專政盜賊攻掠明年梁大后崩冀亦敗魏志曰公孫淵將亡襄平北市生肉長圍各數丈有頭目口喙無手足而動搖占曰有形不成有體無聲其國滅亡其年司馬宣王討平之晉書曰愍帝建興元年十二月河東雨肉劉石擁兵帝竟沒遇害崔鴻十六國春秋曰前趙劉聰時有流星起于牽牛入紫宮龍形委曲蛇行光照地落于平陽北十里視之則肉臭聞平陽長三十步旁常有哭聲墨子曰殷紂滅年天雨肉其年為周武王所滅雨毛京房曰邪進賢退前樂後憂金失其性則雨毛也漢書曰武帝時天雨白毛明年又雨之時征役繁興戶口凋散晉書曰武帝時蜀雨白毛益州刺史皇甫晏為牙門張弘謀害隋書曰文帝開皇六年京師雨毛如馬尾長者二尺餘六七寸其月梁士彥宇文忻劉昉以謀反誅明年發十萬人築長城又於楊州開山造瀆以通運眾役繁興雨毛之應雨冰漢書曰桓帝時京師雨冰其年皇后梁氏崩梁冀與妻自殺崔鴻十六國春秋曰涼張駿二年九月雨冰狀若絲纊皆著草雨花隋書曰文帝仁壽年在仁壽宮頻天雨花大者徑寸小者如榆莢又曰毛州天雨金銀花遍四十餘里雨草京房曰君恡祿信衰厥妖雨草火失其性則草妖漢書曰元帝時雨草而葉相摎結大如彈丸時帝外氏權盛京房曰國破亡若雨孽人主殃又曰平帝時雨草狀如元帝時王氏專政至於莽乃篡位政在私門之家宋書曰明帝太始四年雨草于宮明年魏侵青州殺太守雨穀史記曰梁惠成王, SBCK: ''}
