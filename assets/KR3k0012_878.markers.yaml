  - {type: variant, offset: 464, length: 0, content: '', SBCK: 時􅁀風大􅀨雹震建徳殿端門襄國市西門倒殺五行電起西河大如鷄子平地三尺洿下丈餘行人禽獸死者萬數歴千餘里樹禾催折禾稼蕩然勒問徐光光曰去年不禁寒食介推帝郷之神也歴代所尊故有此災又曰石遵時􅀨雹大如盂升立百餘日爲石鑒所殺鑒爲冉閔殺之隋書曰陳宣帝太建二年六月大􅀨雹十年四月又大􅀨雹始興王叔陵刺後主於䘮次據東府反俄而㐲誅霧禮記月令曰仲冬行夏令則氣霧􅁳􅁳霜霧之氣也散相亂也晉書曰成帝咸和元年大霧歩武不相見㑹稽王道子專政之應國志暦曰晉咸和元年三月霧殺桑果宋書曰晉安王子勛帝子業景和年中即僞位其日雲霧四合旬日􅀍殺齊書曰武帝時大霧竟天如煙入人眼鼻後二年皇太子死後魏書曰静帝武定年冬大霧六旬晝夜不解明年常侍荀濟華山王大器及元思僅等謀殺大將軍髙洋事洩荀濟等並戮於市隋書曰陳後主末年正月朔大㑹羣官大霧四塞人眼鼻卒酸明年降隋陸機別傳曰機􅀍誅日大風折木天地霧合抱朴子曰伊尹受戮大霧三日兵書曰霧四靣圍城必有兵到城下不出其月黄霧尚書中候曰桀爲無道地吐黄霧漢書曰成帝􅀄即位封舅王鳯王根等五人􅀜内侯其月黄霧四塞終日竟夜着地者如黄土塵奪日光王鳯等大懼又曰王莽天鳯元年六月黄霧四塞其年縁邊大飢人相食晉書曰惠帝時冬黄霧四塞六日乃止明年趙王倫簒位時朝昬兵亂帝屢􅂪塵又曰明帝􅀄潁有黄霧四塞時王敦害尚書刀恊僕射周顗又曰穆帝時凉州黄霧下如塵時張重華納譛後年重華死嗣子見殺又曰孝武帝時黄霧四塞時㑹稽王道子專政親近侫人又曰安帝時黄霧昬濁不􅀨時桓玄謀逆帝返正頻年大霧時帝室衰微臣下擁兵反土地非君之有晉中興書徵祥􅀃曰太寜元年黄霧四塞王敦之應宋書曰文帝元嘉二十九年十二月黄霧四塞崔鴻十六國春秋曰前凉張茂四年正月黄霧四塞其年茂死也又曰前趙劉聦元年十月聦將趙固與晉車􅀐將軍王申相拒於延津時黄霧晝夜人不相見固軍大敗又曰後趙石勒}
