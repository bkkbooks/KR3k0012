  - {type: variant, offset: 5049, length: 1, content: 持, SBCK: 至一官府人重門見一人憑机而坐形貎偉壯左右侍者三十余人謂祐日吾欲使汝知術數之法故令虎迎汝無懼也留十五日晝夜語諸要術盡敎道之方祐受法畢便遣令還而}
  - {type: variant, offset: 5049, length: 1, content: 持, krp: 至一官府人重門見一人憑机而坐形貎偉壯左右侍者三十余人謂祐日吾欲使汝知術數之法故令虎迎汝無懼也留十五日晝夜語諸要術盡敎道之方祐受法畢便遣令還而}
  - {type: variant, offset: 5051, length: 1, content: 盡, SBCK: 知道卽使人送出門仍見歸路旣得還家大知卜占無幽不驗經年乃卒又日北海任詡字彦期從軍遠征十年乃歸臨還握粟岀卜師云非屋莫宿非時莫沐詡結伴數十共行遇雷雨不可蒙冒相與庇於巖下想非屋莫宿之戒遂􅀒擔櫛沐於是巖崩壓伴死至家妻先與外人通謀共殺之請以濕髪為認婦宵則勸詡令沐復憶非時莫沐之忌收髪而止婦心慙􅀒詐乃自沐髲而同寢通者夜來不知婦也斬首而去述異記日宋車騎將軍南譙王劉義宣鎭荆州府吏蔡鑯音尖善卜能悉驗時有妙見精究如神公嘗在内齋見一白鼠縁屋命左右射之内置函中時侍者六人悉驅入齋後小小戸内别呼人召鑯鑯至使卜函中物謂日中則厚賞僻加重罰鑯卜兆成笑日知之矣公日何鑯日兊色之鼠背明向戸彎弧射之絶其左股孕五子三雄二雌若謂不信剖腹立知公使剖鼠腹皆如鑯言卽賜錢一萬蠡卜春秋後語日蘇秦事鬼谷子學終辭歸道乏困行以燕人蠡卜傳說自給燕人用蠡卜秦記此以取資自給傅會事以爲詞説各解臧獲之裘臧獲役人解其衣裘以賞其怪説之言也虎卜博物志虎知衝破又能畫地卜今人有畫物上下者推其奇偶謂虎卜雞卜史記日越巫立越祀而以雞卜鳥卜隋書日女國在葱嶺之南其國俗事何脩羅神及樹神歲初以人祭或用猕猴祭畢入山祝之有一鳥如雌雉來集掌上破其腹而視之有粟則年豐沙石則有災謂之鳥卜開皇六年遣使朝貢其後遂絕樗蒲卜博物志日老子入西戎造樗蒲樗蒲五木也或云胡人亦爲樗蒲卜後傳樓陰善其功十二棊卜異苑日十二棊􅁲岀自張文成受法於黄石公行師用兵萬不失一逮至東方朔密以占衆事自此以後祕而不傳晉寧康初襄城寺法味道人忽見一老公着黃皮衣竹筒盛此書以授法味無何失所在遂復流於世齊書日江謐岀爲鎮北長史東海太守未發憂甚乃以靈碁經占卦云有客南來金椀玉杯上使御史太夫沈沖奏謐前後罪收付廷尉賜死果以金甖盛藥鴆之竹卜荆楚歲時記日秋分以牲祠社其供帳盛於仲春之月社之餘胙悉貢饋鄉里周於族社餘之㑹其在兹乎此其㑹也擲教於社神以占來歲豐儉或折竹以卜楚詞日}
