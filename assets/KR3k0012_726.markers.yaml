  - {type: variant, offset: 2333, length: 2007, content: 子魚曰我得上流何故不吉且楚故司馬令龜我請改卜令曰魴也以其屬死之楚師繼之尚大克之吉戰於長岸子魚先死楚師繼之大敗吳師又昭六曰初臧昭伯如晉臧會竊其寶龜僂句僂句龜所出地名以卜為信與僣僣吉又定下曰晉車千乘在中牟衛侯將如五氏卜過之龜焦衛侯曰可也衛車當其半寡人當其半敵矣乃過中牟又哀上曰楚子在城父將救陳卜戰不吉卜退不吉王曰然則死也再敗楚師不如死棄盟逃讎亦不如死死一也其死讎乎命公子申為王不可則命公子結亦不可則命公子啟五辭而後許將戰王有疾庚寅昭王攻大冥卒于城父又曰楚昭王有疾卜曰河為祟王弗祭事具江部又曰晉趙鞅卜救鄭遇水適火水火之兆占諸史趙史墨史龜皆晉史也史龜曰是謂沈陽火陽得水故沈可以興兵兵陰類也故可以興兵利以伐姜不利子商姜齊姓也子商謂宋伐齊則可敵宋不吉史墨曰盈水名也子水位也名位敵不可于也炎帝為火師姜姓其後也水勝火伐姜則可史趙曰是謂如川之滿不可游也鄭方有罪不可救也救鄭則不吉不知其他陽虎以周易筮之遇泰之需曰宋方吉不可與也微子啟帝乙之元子也宋鄭甥舅也祉祿也若帝乙之元子歸妹而有吉祿我安得吉焉乃止毛詩曰升彼虛矣以望楚矣望楚與堂景山與京降觀于桑卜云其吉終然允臧龜曰卜違國必卜之又曰爾卜爾筮體無咎言又日君曰卜爾萬壽無疆又曰卜筮偕止會言近止征夫邇止卜之筮之會人占之箋云或卜或筮俱占之言於繇為近征夫如今近耳又曰我龜既厭不我告猷卜筮數而瀆龜龜靈厭之不復告其所圖之吉凶言雖不兆占繇不中又曰爰始爰謀爰契我龜又曰考卜維王宅是鎬京維龜正之武王成之又日哀哉填寡宜岸宜獄握粟出卜自何能榖哀我窮盡寡財之民仍有獄訟之事持粟行卜求其勝負從何能得生尚書大禹謨曰枚卜功臣惟吉之從帝曰禹官占惟先蔽志昆命于元龜朕志先定詢謀僉同鬼神其依龜筮恊從卜不習吉又洪範曰七稽疑擇建立卜筮人龜曰卜蓍曰筮乃命卜筮曰雨曰霽龜兆形也有似雨者又有似雨止曰蒙曰驛氣落驛不連屬曰克曰貞曰悔兆相交錯五者卜兆之常法內卦曰貞外卦曰悔凡七卜五占用二衍忒立時人作卜筮三人占則從二人之言汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮汝則從龜從龜從卿士從庶民從是之謂大同身其康彊子孫其逢吉汝則從龜從筮從卿土逆庶民逆吉卿士從龜從筮從汝則逆庶民逆吉庶民從龜從筮從汝則逆卿士逆吉汝則從筮從筮逆卿士逆庶民逆作內吉作外凶龜筮共違于人用靜吉用作凶又金縢曰既克商二年王有疾弗豫伐紂明年武王有疾不悅豫二公曰我其為王穆卜周公曰未可以戚我先生穆敬也戚近也召公大公言王疾當卜吉凶周公言未可以死近我先王相順之辭公乃為三壇同墠乃卜三龜一習吉習因也以三王之龜卜一相因而吉也又大誥曰寧王遺我大寶龜紹天明即命我有大事休朕卜并吉天休于寧王興我小邦周寧王惟卜用克綏受茲命又洛誥曰予惟乙卯朝至於洛師致政在冬本其春來至洛眾說始卜定都之意我卜河朔黎水我乃卜澗水東湹水西惟洛食我使人卜澗瀍之閒南近洛吉我又卜瀍水東亦惟洛食伻來以圖及獻卜史記曰宋元王二年江使神龜使於河至泉陽漁者豫且舉網得而囚之置籠中夜而見夢於元王曰我為江使於河豫且得我我不能去身在患中莫可告語王有德義故來告愬元王召愽士衛平問之平乃援式而起仰天視月之光觀斗所指定日處鄉規矩為輔副以權衡四維以定八卦相望視其吉凶介蟲先見乃對曰今昔斗壬子宿在牽牛河水大會神鬼相謀漢正南北江河固期南風新至江使先來白雲擁漢萬物盡留斗柄指日使者當囚玄服而乘輜車其名為龜使人問泉陽令取龜獻使者載行出於泉陽之門正晝無見風雨晦暝雲蓋其上五采青黃雷雨並起將入端門見於東箱身如流水潤澤有光望見元王延頸而前三步而止縮頭而卻復其故處元王見而怪之問衛平平對曰龜在患中而終夕囚王有德義使人活之今延頸而前以當謝也縮頸而却欲亟去也元王曰善哉趣駕送龜毋令失期平對曰龜者是天下之寶先得此龜者為天子且十言十當十戰十勝生於深淵長於黃土知天之道明於上古遊三千歲不出其域安平靜正動不用力壽蔽天地莫知其極與物變化四時變色居而自匿伏而不食春蒼夏黃秋白冬黑明於陰陽審於刑德先知利害察於禍福以言而當以戰而勝王能寶之諸侯盡服王勿遣也王大悅於是向日而謝再拜而受擇日齋戒甲乙最良乃刑白雉以血灌龜於壇中央以刀刳之身全不傷脯酒禮之橫其腹腸荊支卜之必制其瘡程達於理文相錯迎使工占之所言盡當又曰沛父老率子弟共殺沛令開城門迎劉季欲以為沛令父老皆曰平生所聞劉季奇怪當貴且卜筮莫如劉季於是乃立為沛公又曰陳平等遣人迎代王欲立為帝代王卜之龜卦兆得大橫占曰大橫庚庚余為天王夏啟以光曰寡人固已為王矣又何王卜人曰所謂天王迺天子也又曰常以月旦祓龜先以清水澡之以卵祓之乃持龜而遂之若常已卜不中皆祓之以卵東鄉立居取生荊枝及堅木堅木枝燒之斬取熱處以灼龜所卜處灼以荊若卵指之者三持龜以卵周環之祝曰今日吉謹以梁卵祓去玉靈之不祥玉靈必信以誠知萬事之情辯兆皆可占不信不誠則燒玉靈揚其灰以懲後龜又曰竇皇后弟廣國字少君年四五歲時家貧為人所略賣至宜陽為其主入山作炭寒臥岸岸崩獨得脫不死自卜數日當為侯又曰司馬季主楚人也卜於長安東市宋忠為中大夫賈誼為愽士俱出洗沐相從論議誦習先王聖人之道術究徧人情相視而歎賈誼曰吾聞古之賢, SBCK: ''}
