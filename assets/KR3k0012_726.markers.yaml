  - {type: variant, offset: 4525, length: 453, content: 今何居之卑何行之汙也司馬季主捧腹大笑曰觀大夫之貌類有道術者今何言之陋也何辭之野也今夫子所賢者誰也所高者何也公何以卑汙長者乎二君曰尊官厚祿之所高也賢材處之今所處非其地故謂之卑言不信行不驗取不當故謂之汙夫卜筮者世之所賤𥳑也世皆言曰夫卜者多言誇嚴以得人情虛高人祿命以說人志擅言禍災以傷人心矯言鬼神以盡人財厚求拜謝以私於己此吾之所恥故謂之卑汙也司馬季主曰公且安坐公見夫被髮童子乎日月照之則行不照則止然問日月疵瑕吉凶則弗能理也今夫卜者必法天地象四時順於仁義分策定卦旋式正棊然後別天地之利害事之成敗昔者先王定國必先龜策日月而後乃敢代也正時日乃後入家產子必先占吉凶後乃有之自伏犧作八卦周文王演三百八十四爻而天下治越王勾踐倣周文王八卦以破敵國霸天下由是觀之卜筮有何負哉且夫卜者掃設坐位正其冠帶然後乃言事此有禮也言鬼神或以饗忠臣以事其上孝子以養其親慈父以畜其子此有德者也而以義置數十百錢病者或以愈且死或以生患或以勉事或以成嫁子娶婦或以養生此之為德豈直數十百錢哉此老子所謂上德不德是以有德今夫卜筮者利大謝少老子之言豈異於是乎莊, SBCK: 孔}
