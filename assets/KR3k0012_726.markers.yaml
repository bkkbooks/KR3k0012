  - {type: variant, offset: 864, length: 1468, content: 也立以為易謂作易易抱龜易官名周禮曰大卜大卜主兆三易三夢之吉又曰表記曰南人有言日人而無恒不可以為卜筮古之遺言與龜筮猶不能知也而況於人乎又曰子言之昔三代明王皆事天地之神明無非卜筮之用不敢以其私褻事上帝言動任卜筮也神明謂群神也是故不犯日月不違卜筮日月謂冬夏至及四時也所不違者日與牲尸也卜筮不相襲也襲因也大事則卜小事則筮也大事有時日大事有事於大神有常時常日也小事無時日有筮外事用剛日內事用柔日不違龜筮左傳曰楚伐鄖莫敖曰盍請濟師於王鬥廉曰師克在和不在眾商周之不敵君之所聞也成軍以出又何濟焉莫敖曰卜之對曰卜以決疑不疑何卜遂敗鄖師於蒲騷又曰初懿氏卜妻敬仲其妻占之曰吉事具筮門又僖中曰初晉獻公欲以驪姬為夫人卜之不吉筮之吉公曰從筮卜人曰筮短龜長不如從長又僖中曰狐偃言於晉侯曰求諸侯莫如勤王諸侯信之且大義也繼文之業而信宣於諸侯今為可矣使卜偃卜之曰吉遇黃帝戰于阪泉之兆又曰晉惠公之在梁也梁伯妻之梁嬴孕過期卜招父與其子卜之杜預注曰卜招梁太卜也其子曰將生一男一女招曰然男為人臣女為人妾故名男曰圉女曰妾及子圉西質妾為宦女焉又曰夏四月卜郊不從乃免牲非禮也諸侯不得郊天魯以周公故得用天子禮樂故郊為魯常祀猶三望亦非禮也禮不卜常祀而卜其牲日牛卜日曰牲牲成而卜郊上怠慢也望郊之細也不郊亦無望可也又曰衛遷于帝丘卜曰三百年又文下曰邾文公卜遷于繹史曰利於民而不利於君邾子曰荀利於民孤之利也天生民而樹之君以利之也民既利矣孤必與焉左右曰命可長也君何弗為邾子曰命在養民死之長短時也民茍利矣遷也吉莫如之遂遷于繹五月邾文公卒君子曰知命也又曰春齊侯戒師期而有疾醫曰不及秋將死公聞之卜曰尚無及期惠伯令龜卜楚丘占之齊侯不及期非疾也君亦不聞令龜有咎二月丁丑公薨又宣上曰郊牛之口傷改卜牛牛死乃不郊又宣下曰楚子圍鄭旬有七日鄭人卜行成不吉卜臨于大宮且巷出車吉國人大臨守陴者皆哭楚子退師又成上日鼷鼠食郊牛角改卜牛又襄元曰夏四月三卜郊不從乃免牲孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也是故啟蟄而郊郊而後耕今既耕而後卜郊宜其不從也又襄二曰鄭皇耳帥師侵衛楚令也亦兼受楚之勑命也皇耳皇戍子孫文子卜追之獻兆於定姜姜氏問繇曰兆如山陵有夫出征而喪其雄姜氏曰征者喪雄禦寇之利也大夫圖之衛人追之孫蒯獲鄭皇耳于犬丘又曰晉侯還及著雍疾卜桑林見事具樂部又曰鄭石㚟言於子囊曰先王卜征五年先征五年而卜吉凶也征謂巡狩而歲習祥祥習則行不習則增脩德而改卜又襄五曰廬蒲癸王何卜攻慶氏示子之兆曰或卜攻讎敢獻其兆子之曰克見血慶封田于萊陳無宇從文子使召之請曰無宇之母疾病請歸慶季卜之示之兆曰死奉龜而泣乃使歸又昭二曰越大夫常壽過帥師會楚子於瑣瑣楚地也聞吳出師薳啟疆帥師從之從吳師也遽不設備吳人敗諸鵲岸廬江舒縣有鵲尾渚楚子以馹至於羅汭馹傳也羅水名吳子使其弟蹶由犒師犒勞楚人執之將以釁鼓王使問焉曰汝卜來吉乎對曰吉寡君聞君將治兵於弊邑卜之以守龜曰余亟使人犒師請行以觀王怒之疾徐而為之備尚克知之龜兆吉吉曰克可知也君若驩焉好逆使臣滋弊邑休怠休解而忘其死亡無日矣今君奮焉震電憑怒憑盛也虐執使臣將以釁鼓則吳知所備矣敞邑雖羸若早脩完其可以息師難易有備可謂吉矣且吳社稷是卜豈為一人使臣獲釁軍鼓而弊邑知備以禦不虞其為吉孰大焉國之守龜其何事不卜一臧一否其誰能常之城濮之兆其報在邲今此行也其庸有報志乃弗殺又昭三曰公卜使王黑以靈姑鉟音丕率吉請斷三尺焉而用之靈姑鉟公旗也斷三尺不敢與君同又昭四曰楚召觀從曰唯爾所欲對曰臣之先佐開卜乃使為卜尹佐卜人開龜兆又曰初靈王卜曰余尚得天下不吉投龜詬天而呼曰是區區者而不余卑余必自取之民患王之無厭也故從亂如歸又曰吳伐楚陽匄為令尹卜戰不吉司, SBCK: ''}
