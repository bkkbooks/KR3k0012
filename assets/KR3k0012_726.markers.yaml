  - {type: variant, offset: 5335, length: 367, content: 皆脩身自保非其服弗服非其食弗食成帝時元舅大將軍王鳳以禮聘子真子真遂不詘而終君平卜筮於成都市以為卜筮賤業以惠眾人有邪惡非正之問則依著龜為言利害與人子言依於孝與人臣言依於忠各因其勢道之以善又曰張禹字子文父徙家蓮勺上音輦下音酌禹為兒數隨家至市憙觀於卜相者前久頗曉其別蓍布卦意時從帝言卜者愛之又奇其面貌謂禹父是兒多知可令學經及禹至長安學從沛郡施讎受易謝承後漢書曰姜肱桓帝時再以玄纁聘不就即拜太中大夫詔書至門肱使家人對云久病就醫遂羸服閒行竄伏青州界中賣卜給衣召命得斷家亦不知其處歷年乃還又曰田戎擁眾夷陵聞秦豐被圍懼大兵方至欲降而妻兄辛臣諫戎曰今四方豪傑各據郡國洛陽地如掌耳不如按甲以觀其變戎不從乃留辛臣守夷陵自將兵沿江泝沔止黎丘刻日當降而辛臣於後盜戎珍寶從閒道先降於岑彭而以書招戎戎疑必賣己乃灼龜卜降兆不吉中折遂止不降又曰范丹字史雲朝議欲以為侍, SBCK: ''}
