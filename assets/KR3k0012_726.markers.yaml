  - {type: variant, offset: 4291, length: 346, content: 於長安東市宋忠為中大夫賈誼為愽士俱出洗沐相從論議誦習先王聖人之道術究徧人情相視而歎賈誼曰吾聞古之賢人不居朝必在卜醫之中今吾已見三公九卿朝士大夫皆可知矣試之卜數中觀采二人即同與之巿游於卜中天新雨道少人司馬季主閒坐弟子三四人侍方辯天地之道日月之運陰陽吉凶之本二大夫再拜謁司馬季主季主觀其狀貌類有道者即禮之使弟子延之坐坐定司馬季主復理前語分別天地之終始日月星辰之紀差次仁義之際列吉凶之符語數千言莫不順理宋忠賈誼瞿然而悟獵纓正衿危坐曰吾望先生之狀聽先生之辭小子竊觀於世未嘗見也今何居之卑何行之汙也司馬季主捧腹大笑曰觀大夫之貌類有道術者今何言之陋也何辭之野也今夫子所賢者誰也所高者何也公何以卑汙長者乎二君曰尊官厚祿之所高也賢材處之今所處非其地故謂之卑言不信行不驗取不當故謂之汙夫卜筮者世之所賤𥳑也世皆言, WYG: 晉書}
