  - {type: variant, offset: 404, length: 86, content: 占圻禮記曰正月命有司釁龜策占兆審卦吉凶周禮龜人上春釁龜謂建寅之月曲禮曰凡筮日旬之外曰遠某日旬之內曰近某日喪事先遠日吉事先近日曰假爾泰龜有常假爾泰筮有常命龜筮辭龜筮於吉凶有常, SBCK: 也吾三戰而三勝聲威天下欲爲}
