  - {type: variant, offset: 4943, length: 939, content: 百錢哉此老子所謂上德不德是以有德今夫卜筮者利大謝少老子之言豈異於是乎莊子曰君子內無飢寒之患外無劫奪之憂居上而敬居下而不為害君子之道也今夫卜筮者之為業也積之無聚委藏之不用府庫徙之不用車輜負裝之不重止而用之無盡索之時持不盡索之物游於毋窮之世雖莊氏之行未能增也子何故而云而可卜哉天不足西北星辰西北移地不足東南以海為池日中必移月滿必虧先王之道乍存乍亡公責卜者言必信不亦惑乎公見夫談士辯人乎慮事定計必是人也然不能一言說人主意故言必稱先王語必道上古慮事定計飾先王之成功語其敗害以恐憙人主之志以求其欲多言誇嚴徐廣曰一作險莫大於此矣然欲強國成功盡忠於上非此不立今夫卜者導惑教愚也夫愚惑之人豈能以一言知之哉言不厭多故騏驥不能與罷驢為駟鳳皇不與燕雀為群而賢者亦不與不肖者同列故君子處卑隱以避眾自匿以避倫微見德順以除眾害以明天性助上養下多其功利不求尊譽公等喁喁者也何知長者之道乎漢書曰谷口有鄭子真蜀有嚴君平皆脩身自保非其服弗服非其食弗食成帝時元舅大將軍王鳳以禮聘子真子真遂不詘而終君平卜筮於成都市以為卜筮賤業以惠眾人有邪惡非正之問則依著龜為言利害與人子言依於孝與人臣言依於忠各因其勢道之以善又曰張禹字子文父徙家蓮勺上音輦下音酌禹為兒數隨家至市憙觀於卜相者前久頗曉其別蓍布卦意時從帝言卜者愛之又奇其面貌謂禹父是兒多知可令學經及禹至長安學從沛郡施讎受易謝承後漢書曰姜肱桓帝時再以玄纁聘不就即拜太中大夫詔書至門肱使家人對云久病就醫遂羸服閒行竄伏青州界中賣卜給衣召命得斷家亦不知其處歷年乃還又曰田戎擁眾夷陵聞秦豐被圍懼大兵方至欲降而妻兄辛臣諫戎曰今四方豪傑各據郡國洛陽地如掌耳不如按甲以觀其變戎不從乃留辛臣守夷陵自將兵沿江泝沔止黎丘刻日當降而辛臣於後盜戎珍寶從閒道先降於岑彭而以書招戎戎疑必賣己乃灼龜卜降兆不吉中折遂止不降又曰范丹字史雲朝議欲以為侍御史因遁身逃命於梁沛之閒徒行弊服賣卜於巿魏志管公明傳曰洛中有一小人夫婢輅為卦教明旦東明城門中倒擔豚人牽與共鬥具如其言豚逸走即追之豚入入舍突破主人甕婢從甕中出輅在田舍時嘗候遠鄰主人患失火輅卜教使明日於陌上伺有一角巾書生駕黑牛故車必引留宿此能除之即從輅語得書生遂留宿意甚不安主人罷入生乃抱刀出門薪積歘有一小物直來如獸手中持火以口吹之生舉刀斫斷腰視之狐也自此無復火災, WYG: 六}
