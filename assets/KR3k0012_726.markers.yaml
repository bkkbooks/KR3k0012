  - {type: variant, offset: 60, length: 0, content: '', SBCK: 及有開府之授而太歲在亥果薨於光禄大夫又曰荀伯玉為晉安王子勛鎭軍行參軍泰始初還都賣卜自業齊書曰王敬則少時於草中射獵有蟲如烏豆集其身摘去乃脫其處皆流血敬則惡之詣道士卜道士曰此封侯瑞也敬則聞之喜故出都自効又曰柳世隆善卜別􅀛甲價至萬永明初世隆曰永明九年我亡後三年丘山崩齊亦於此季矣屏人命典籤李黨取筆及高齒屐題簾箔旌日永明}
  - {type: variant, offset: 60, length: 0, content: '', krp: 及有開府之授而太歲在亥果薨於光禄大夫又曰荀伯玉為晉安王子勛鎭軍行參軍泰始初還都賣卜自業齊書曰王敬則少時於草中射獵有蟲如烏豆集其身摘去乃脫其處皆流血敬則惡之詣道士卜道士曰此封侯瑞也敬則聞之喜故出都自効又曰柳世隆善卜別龜甲價至萬永明初世隆曰永明九年我亡後三年丘山崩齊亦於此季矣屏人命典籤李黨取筆及高齒屐題簾箔旌日永明}
