  - {type: variant, offset: 5060, length: 274, content: 世雖莊氏之行未能增也子何故而云而可卜哉天不足西北星辰西北移地不足東南以海為池日中必移月滿必虧先王之道乍存乍亡公責卜者言必信不亦惑乎公見夫談士辯人乎慮事定計必是人也然不能一言說人主意故言必稱先王語必道上古慮事定計飾先王之成功語其敗害以恐憙人主之志以求其欲多言誇嚴徐廣曰一作險莫大於此矣然欲強國成功盡忠於上非此不立今夫卜者導惑教愚也夫愚惑之人豈能以一言知之哉言不厭多故騏驥不能與罷驢為駟鳳皇不與燕雀為群而賢者亦不與不肖者同列故君子處卑隱以避眾自匿以避倫微見德順以除眾害以明天性助上養下多其功利不求尊譽公等喁喁者也何知長者之道乎漢書曰谷口有鄭子真蜀有嚴君, SBCK: 效太}
