  - {type: variant, offset: 402, length: 0, content: '', krp: 戎夏交捽兆有二畫外象戎内象諸夏夏謂晉也兆端會齒牙交有似捽捽交對也交捽是交勝也臣故云言晉勝戎戎復勝晉且懼有口齒牙銜骨皆在口也攜人國移心焉攜離公日何口之有口在寡人寡人弗受誰敢興之對日苟可以攜其入也必甘逞而不知故胡可壅也期何逞快壅防也甘言人耳心以爲快而不知其惡何可止也公不聽遂伐尅之克勝獲驪姬以歸有寵立爲夫人春秋後語曰二世夢白虎齧其左驂殺之心惡怪之}
