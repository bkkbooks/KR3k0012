  - {type: variant, offset: 402, length: 0, content: '', SBCK: 戎夏交捽兆有二畫外象戎内象諸夏夏謂晉也兆端會齒牙交有似捽捽交對也交捽是交勝也臣故云言晉勝戎戎復勝晉且懼有口齒牙銜骨皆在口也攜人國移心焉攜離公日何口之有口在寡人寡人弗受誰敢興之對日苟可以攜其入也必甘逞而不知故胡可壅也期何逞快壅防也甘言人耳心以爲快而不知其惡何可止也公不聽遂伐尅之克勝獲驪姬以歸有寵立爲夫人春秋後語曰二世夢白虎齧其左驂殺之心惡怪之􅁲云涇水爲祟鬼物爲災曰祟音思醉切又曰鄒忌與田忌不相善公孫閔謂鄒忌曰何不詐令人操千金}
  - {type: page-break, offset: 402, content: '', id: KR3k0012_SBCK_726-5a}
  - {type: variant, offset: 402, length: 0, content: '', WYG: 戎夏交捽兆有一畫外象戎内象諸夏夏謂晉也兆端㑹齒牙交有似捽交對待也交捽是交勝也臣故云言晉勝戎戎復勝晉且懼有口齒牙銜骨皆在口也擕民國移心焉擕離公曰何口之有口在寡人寡人弗受誰敢興之對曰苟可以擕其入也必甘受逞而不知胡可壅也胡可逞壅防也言入耳心以為快而不知其惡何可逞也公不聽遂伐尅之獲驪姬以歸有寵立為夫人春秋後語曰二世夢白虎齧其左驂殺之心惡恠之}
