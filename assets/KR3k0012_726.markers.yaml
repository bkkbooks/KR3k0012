  - {type: variant, offset: 3588, length: 288, content: 定八卦相望視其吉凶介蟲先見乃對曰今昔斗壬子宿在牽牛河水大會神鬼相謀漢正南北江河固期南風新至江使先來白雲擁漢萬物盡留斗柄指日使者當囚玄服而乘輜車其名為龜使人問泉陽令取龜獻使者載行出於泉陽之門正晝無見風雨晦暝雲蓋其上五采青黃雷雨並起將入端門見於東箱身如流水潤澤有光望見元王延頸而前三步而止縮頭而卻復其故處元王見而怪之問衛平平對曰龜在患中而終夕囚王有德義使人活之今延頸而前以當謝也縮頸而却欲亟去也元王曰善哉趣駕送龜毋令失期平對曰龜者是天下之寶先得此龜者為天子且十言十當十戰十勝生於深淵長於黃土知天之道明於上古遊三千歲不出其域安平靜正動不用力壽蔽天地莫知其極與物變化四時變色居而自匿伏, WYG: 後秘}
