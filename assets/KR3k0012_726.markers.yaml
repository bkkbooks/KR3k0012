  - {type: variant, offset: 1107, length: 2371, content: 之對曰卜以決疑不疑何卜遂敗鄖師於蒲騷又曰初懿氏卜妻敬仲其妻占之曰吉事具筮門又僖中曰初晉獻公欲以驪姬為夫人卜之不吉筮之吉公曰從筮卜人曰筮短龜長不如從長又僖中曰狐偃言於晉侯曰求諸侯莫如勤王諸侯信之且大義也繼文之業而信宣於諸侯今為可矣使卜偃卜之曰吉遇黃帝戰于阪泉之兆又曰晉惠公之在梁也梁伯妻之梁嬴孕過期卜招父與其子卜之杜預注曰卜招梁太卜也其子曰將生一男一女招曰然男為人臣女為人妾故名男曰圉女曰妾及子圉西質妾為宦女焉又曰夏四月卜郊不從乃免牲非禮也諸侯不得郊天魯以周公故得用天子禮樂故郊為魯常祀猶三望亦非禮也禮不卜常祀而卜其牲日牛卜日曰牲牲成而卜郊上怠慢也望郊之細也不郊亦無望可也又曰衛遷于帝丘卜曰三百年又文下曰邾文公卜遷于繹史曰利於民而不利於君邾子曰荀利於民孤之利也天生民而樹之君以利之也民既利矣孤必與焉左右曰命可長也君何弗為邾子曰命在養民死之長短時也民茍利矣遷也吉莫如之遂遷于繹五月邾文公卒君子曰知命也又曰春齊侯戒師期而有疾醫曰不及秋將死公聞之卜曰尚無及期惠伯令龜卜楚丘占之齊侯不及期非疾也君亦不聞令龜有咎二月丁丑公薨又宣上曰郊牛之口傷改卜牛牛死乃不郊又宣下曰楚子圍鄭旬有七日鄭人卜行成不吉卜臨于大宮且巷出車吉國人大臨守陴者皆哭楚子退師又成上日鼷鼠食郊牛角改卜牛又襄元曰夏四月三卜郊不從乃免牲孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也是故啟蟄而郊郊而後耕今既耕而後卜郊宜其不從也又襄二曰鄭皇耳帥師侵衛楚令也亦兼受楚之勑命也皇耳皇戍子孫文子卜追之獻兆於定姜姜氏問繇曰兆如山陵有夫出征而喪其雄姜氏曰征者喪雄禦寇之利也大夫圖之衛人追之孫蒯獲鄭皇耳于犬丘又曰晉侯還及著雍疾卜桑林見事具樂部又曰鄭石㚟言於子囊曰先王卜征五年先征五年而卜吉凶也征謂巡狩而歲習祥祥習則行不習則增脩德而改卜又襄五曰廬蒲癸王何卜攻慶氏示子之兆曰或卜攻讎敢獻其兆子之曰克見血慶封田于萊陳無宇從文子使召之請曰無宇之母疾病請歸慶季卜之示之兆曰死奉龜而泣乃使歸又昭二曰越大夫常壽過帥師會楚子於瑣瑣楚地也聞吳出師薳啟疆帥師從之從吳師也遽不設備吳人敗諸鵲岸廬江舒縣有鵲尾渚楚子以馹至於羅汭馹傳也羅水名吳子使其弟蹶由犒師犒勞楚人執之將以釁鼓王使問焉曰汝卜來吉乎對曰吉寡君聞君將治兵於弊邑卜之以守龜曰余亟使人犒師請行以觀王怒之疾徐而為之備尚克知之龜兆吉吉曰克可知也君若驩焉好逆使臣滋弊邑休怠休解而忘其死亡無日矣今君奮焉震電憑怒憑盛也虐執使臣將以釁鼓則吳知所備矣敞邑雖羸若早脩完其可以息師難易有備可謂吉矣且吳社稷是卜豈為一人使臣獲釁軍鼓而弊邑知備以禦不虞其為吉孰大焉國之守龜其何事不卜一臧一否其誰能常之城濮之兆其報在邲今此行也其庸有報志乃弗殺又昭三曰公卜使王黑以靈姑鉟音丕率吉請斷三尺焉而用之靈姑鉟公旗也斷三尺不敢與君同又昭四曰楚召觀從曰唯爾所欲對曰臣之先佐開卜乃使為卜尹佐卜人開龜兆又曰初靈王卜曰余尚得天下不吉投龜詬天而呼曰是區區者而不余卑余必自取之民患王之無厭也故從亂如歸又曰吳伐楚陽匄為令尹卜戰不吉司馬子魚曰我得上流何故不吉且楚故司馬令龜我請改卜令曰魴也以其屬死之楚師繼之尚大克之吉戰於長岸子魚先死楚師繼之大敗吳師又昭六曰初臧昭伯如晉臧會竊其寶龜僂句僂句龜所出地名以卜為信與僣僣吉又定下曰晉車千乘在中牟衛侯將如五氏卜過之龜焦衛侯曰可也衛車當其半寡人當其半敵矣乃過中牟又哀上曰楚子在城父將救陳卜戰不吉卜退不吉王曰然則死也再敗楚師不如死棄盟逃讎亦不如死死一也其死讎乎命公子申為王不可則命公子結亦不可則命公子啟五辭而後許將戰王有疾庚寅昭王攻大冥卒于城父又曰楚昭王有疾卜曰河為祟王弗祭事具江部又曰晉趙鞅卜救鄭遇水適火水火之兆占諸史趙史墨史龜皆晉史也史龜曰是謂沈陽火陽得水故沈可以興兵兵陰類也故可以興兵利以伐姜不利子商姜齊姓也子商謂宋伐齊則可敵宋不吉史墨曰盈水名也子水位也名位敵不可于也炎帝為火師姜姓其後也水勝火伐姜則可史趙曰是謂如川之滿不可游也鄭方有罪不可救也救鄭則不吉不知其他陽虎以周易筮之遇泰之需曰宋方吉不可與也微子啟帝乙之元子也宋鄭甥舅也祉祿也若帝乙之元子歸妹而有吉祿我安得吉焉乃止毛詩曰升彼虛矣以望楚矣望楚與堂景山與京降觀于桑卜云其吉終然允臧龜曰卜違國必卜之又曰爾卜爾筮體無咎言又日君曰卜爾萬壽無疆又曰卜筮偕止會言近止征夫邇止卜之筮之會人占之箋云或卜或筮俱占之言於繇為近征夫如今近耳又曰我龜既厭不我告猷卜筮數而瀆龜龜靈厭之不復告其所圖之吉凶言雖不兆占繇不中又曰爰始爰謀爰契我龜又曰考卜維王宅是鎬京維龜正之武王成之又日哀哉填寡宜岸宜獄握粟出卜自何能榖哀我窮盡寡財之民仍有獄訟之事持粟行卜求其勝負從何能得生尚書大禹謨曰枚卜功臣惟吉之從帝曰禹官占惟先蔽志昆命于元龜朕志先定詢謀僉同鬼神其依龜筮恊從卜不習吉又洪範曰七稽疑擇建立卜筮人龜曰卜蓍曰筮乃命卜筮曰雨曰霽龜兆形也有似雨者又有似雨止曰蒙曰驛氣落驛不連屬曰克曰貞曰悔兆相交錯五者卜兆之常法內卦曰貞外卦曰悔凡七卜五占用二衍忒立時人作卜筮三人占則從二人之言汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮汝則從龜從龜從卿士從庶民從是之謂大同身其康彊子孫其逢吉汝則從龜從筮從卿土逆庶民逆吉卿士從龜從筮從汝則逆庶民逆吉庶民從龜從筮從汝則逆卿士逆吉汝則從筮從筮逆卿士逆庶民逆作內吉作外凶龜筮共違于人用靜吉用作凶又金縢曰既克商二年王有疾弗豫伐紂明年武王有疾不悅豫二公曰我其為王穆卜周公曰未可以戚我先生穆敬也戚近也召公大公言王疾當卜吉凶周公言未可以死近我先王相順之辭公乃為三壇同墠乃卜三龜一習吉習因也以三王之龜卜一相因而吉也又大誥曰寧王遺我大寶龜紹天明即命我有大事休朕卜并吉天休于寧王興我小邦周寧王惟卜用克綏受茲命又洛誥曰予惟乙卯朝至於洛師致政在冬本其春來至洛眾說始卜定都之意我卜河朔黎水我乃卜澗水東湹水西惟洛食我使人卜澗瀍之閒南近洛吉我又卜瀍水東亦惟洛食伻來以圖及獻, WYG: 雞}
