  - {type: variant, offset: 59, length: 34, content: 也十日容散齊七日致齋三日執事宗伯太卜之屬也既卜又戒百官以始齋又春官嘗, WYG: 雨轖至軫行}
  - {type: variant, offset: 59, length: 0, content: '', krp: 七月晦日將有太鸜鳥來集廳事上冝勤伺取若獲者爲善不獲將成禍祐乃謹爲其備至日果有大鸜束尾九尺來集廳事上掩捕得祐仍遷石頭督護後爲吴郡太守友卜占神効甚多而消殃轉禍無不皆驗王隱晉書日歩熊字叔羆陽平人少好卜筮術數門徒甚盛熊學舎側有燒死人吏疑是熊諸生失火持諸生急熊日吾巳爲卜得其人矣使從道南行當有一人來問得火主來者便縛之吏如熊言果是耕人自言草惡難耕故燒之忽風起延燒實不知草中有人又鄰人兒遠行或告已死其父母號哭制服熊爲卜尅日當還如期果至宋書曰蔡興宗初爲郢府參軍彭城顔敬以式卜曰亥年當作某官有大字者不可受}
  - {type: punctuation, offset: 60, content: 。, id: KR3k0012_CHANT_726-bkkpn22}
