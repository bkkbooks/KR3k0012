  - {type: variant, offset: 5703, length: 179, content: 史因遁身逃命於梁沛之閒徒行弊服賣卜於巿魏志管公明傳曰洛中有一小人夫婢輅為卦教明旦東明城門中倒擔豚人牽與共鬥具如其言豚逸走即追之豚入入舍突破主人甕婢從甕中出輅在田舍時嘗候遠鄰主人患失火輅卜教使明日於陌上伺有一角巾書生駕黑牛故車必引留宿此能除之即從輅語得書生遂留宿意甚不安主人罷入生乃抱刀出門薪積歘有一小物直來如獸手中持火以口吹之生舉刀斫斷腰視之狐也自此無復火災, SBCK: 覽卷第七百二十六}
