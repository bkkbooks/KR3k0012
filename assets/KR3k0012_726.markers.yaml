  - {type: variant, offset: 61, length: 0, content: '', krp: 一年因流涕謂黨}
  - {type: variant, offset: 62, length: 2, content: 容散, SBCK: 汝當見吾不見也梁書曰吉士瞻年逾四十忽忽不得志乃就江陵卜者王先生計禄命王生日君擁旄仗節非一州後一年當得戎馬大郡三國典略曰梁武昌太守朱賈臣聞元帝議遷都入勸梁主云建鄴舊都塋陵攸在荊鎭邊􅆠非王者宅願陛下勿疑致後悔也臣家在荊州豈不願陛下但恐是臣富貴非陛下富貴耳乃召卜者杜景豪決去留遇兆不吉荅云未去景豪退而言曰此兆爲􅀑賊所留也事具京都部又曰周文育隨盧安興征俚獠有功除南海令監州王勵深委任之勵􅀍代文育與俱下至大􅁃嶺詣卜者卜者曰君北下不過作令辰南入則爲公侯文育日足錢便可誰望公侯之事卜人日君須􅁷當暴得銀至二千兩若不見信以此為驗其夕宿逆旅有賈人求與文育博文育勝之得銀二千兩旦辭勵勵問其故文育以吿勵乃遣之又曰東魏相}
