  - {type: variant, offset: 153, length: 242, content: 三兆之法一曰玉兆二曰瓦兆三曰原兆兆者灼龜發於火其形可占者原田也象似玉瓦原之璺罅是用名之焉其經兆之體皆百有二十其頌皆千有二百又卜師職曰卜師掌開龜之四兆一曰方兆二曰功兆三曰義兆四曰弓兆開開出其占書也纏兆百二十體言此四兆者分之為四部若易之二篇書金滕曰開籥見書是也又曰龜人掌六龜之屬各有名物天龜曰靈屬地龜曰繹屬東龜曰果屬西龜曰靁屬南龜曰獵屬北龜曰若屬各以其方之色與其體辨之上春釁龜祭祀先卜釁者殺牲以血之神之也鄭司農云祭卜其日與性也又曰占人掌占龜以八筮占八頌以八卦占筮之八故以眡吉凶凡卜筮君占體, SBCK: 􅀛}
