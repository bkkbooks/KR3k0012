  - {type: variant, offset: 65, length: 1, content: 七, krp: 王澄以舟師還次於小平津北岸古塚崩骨見銘曰今卜高原千秋之後化爲下泉當逢霸主必爲改遷王}
  - {type: variant, offset: 67, length: 0, content: '', SBCK: 古人之卜其何至也令更葬之又日齊害其廢主濟南王也長廣王湛懼高元海爲畫三策湛不能斷令鄭道謙吳導世等卜以決之道謙等曰不利舉事靜則吉又曰初鄴有賣卜者相趙隱當大貴及隱自黃門侍郎遷祕書監崔肇師呼卜者而問已焉卜者對曰公令望雖髙爵位難進肈師不恱終如其言隋書曰獻皇后崩上令蕭吉卜擇葬所吉厯筮山原至一處云卜年二千卜世二百具圗而奏之上曰吉凶由人不在於地髙緯父葬豈不卜乎國尋滅亡正如家墓田若不吉朕不當爲天子若云不凶我弟不當戰沒然竟從吉言唐書日王遠知事梁貞白先生陶􅀪景隱居茅山盡傳其符籙隋煬帝爲晉王出鎭揚州遣人迎}
