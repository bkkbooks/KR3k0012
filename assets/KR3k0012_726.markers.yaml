  - {type: variant, offset: 883, length: 0, content: '', WYG: 官各以牲祠龜策塗以血牲謂之釁者龜甲所以卜也蓍草所以筮也三禮圖曰龜以春灼後左夏灼前左秋灼前右冬灼後右楚焞他昆切以荆為然以灼龜正以荆者凡木心皆圜而荆心方是以用之抱朴子曰卜者小數飾福者謂知來之妙異苑曰㑹稽餘姚錢祐以元嘉四年五月三日夜出屋後為虎所取十八日乃自還說虎初取之時至一官府入重門見一人憑几而坐形貌偉壯左右侍者三十餘人謂曰吾欲使汝知術數之法故令虎迎汝無懼也留十五晝夜語諸要術盡教道之方祐受法畢便遣令還而不知道即使人送出門仍見歸路既得還家}
