  body:
  - {type: variant, offset: 3, length: 1, content: 六, SBCK: 七}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 七卜下諸雜卜附晉書曰郭公者客居河東精於卜筮郭璞從之受業以青囊中書九卷與之由是遂洞五行天文卜筮之術消殃轉禍通致無方雖京房管輅不能過也璞門人趙載受青囊書未及讀而為所焚又曰宣城邉洪以四月中就韓友卜家中安否友曰卿後有兵殃其禍甚重可伐七十束柴積於庚地至七月丁酉放火燒之咎可消也不爾其凶難言洪即聚柴至日大風不敢發火洪後為廣陽領校遭母䘮歸家友來投之時日已暮告從者速裝束吾當夜去從者曰今日已暝數十里何急復去友曰非汝所知也此間血覆地寧可復住洪苦留之不待食而去其夜洪歘發狂絞殺兩子并殺婦又斫父妾二人皆被創因出亡走明日其友往收殯亡者尋索洪數日於宅前林中得之已自經死宣城太守殷祐疾友為筮之曰七月晦日將有鸛鳥來集㕔事上宜勤伺取若獲者為善不獲將成禍祐乃謹為其備至日果有大鸛尾垂九尺來集㕔事上掩捕得祐仍遷石頭督䕶後為呉郡守友卜占神效甚多而消殃轉禍無不皆驗王隱晉書曰步熊字叔羆陽平人少好卜筮術數門生甚盛熊學舍側有燒死人吏疑是熊諸生失火持諸生急熊曰吾已為卜得其人矣使從道南行當有一人來問得火主來者便縛之吏如熊言果是耕人自言草惡難耕故燒之忽風起延燒實不知草中有人又隣人兒逺行或告已死其父母號哭制服熊為卜尅日當還如期果至宋書曰蔡興宗初為郢府叅軍彭城顔敬以式卜曰亥年當作好官有大字者不宜受也及有開府之授而太歲在亥果薨於光禄大夫又曰荀伯玉為晉安王子勛鎮軍行叅軍泰始初還都賣卜自業齊書曰王敬則少時於草中射獵有蟲如烏豆集其身擿去乃脫其處皆流血敬則惡之詣道士卜道士曰此封侯瑞也敬則聞之喜故出都自効又曰栁世隆善卜别龜甲價至萬永明初世隆曰永明九年我亡後三年丘山崩齊亦於此季矣屏人命典籖李黨取筆及髙齒屐題簾箔旌曰永明十一年因流涕謂黨曰汝當見吾不見也梁書曰吉士瞻年逾四十忽忽不得志乃就江陵卜者王先生計禄命王先生曰君擁旄㐲節非一州後一年當得戎馬大郡三國典畧曰梁武昌太守朱買臣聞元帝議遷都入勸梁主云建業舊都塋陵攸在荆鎮邉疆非王者宅願陛下勿疑致後悔也臣家在荆州豈不願陛下但恐是臣富貴非陛下富貴耳乃召卜者杜景豪决去留遇兆不吉答云未去景豪退而言曰此兆為鬼賊所留也事具京都部又曰周文育隨盧安興征俚僚有功除海南令監州王勵深委任之勵被代文育與俱下至大庾嶺詣卜者卜者曰君北下不過作令長南入則為公侯文育曰足錢便可誰望公侯之事卜人曰君須㬰當暴得銀至二千兩若不信以此為驗其夕宿逆旅有賈人與文育博文育勝得銀二千兩且辭勵勵問其故文育以告勵乃遣之又曰東魏相齊王澄以舟師還次於小平津北岸古􅊘崩骨見銘曰今卜髙原千秋之後化為下泉當逢覇主必為改遷王曰古人之卜何其至也令更葬之又曰齊害其廢主濟南王也長廣王湛懼髙元海為書䇿湛不能斷令鄭道謙吳道世等卜以决之道謙等曰不利舉事静則吉又曰初鄴有賣卜者相趙隱當大貴及隱自黄門侍郎遷秘書監崔肇師呼卜者而問已焉卜者對曰公令望雖髙爵位難進肇師不悅終如其言隋書曰獻皇后崩上令蕭吉卜擇葬所吉厯筮山原至一處云卜年二千卜世二百具圖而奏之上曰吉凶由人不在於地髙緯父葬豈不卜乎國尋滅亡正如家墓田若不吉不當為天子若云不凶我弟不當戰殁然竟從吉言唐書曰王逺知事梁貞白先生陶𢎞景隱居茅山盡傳其符籙隋煬帝為晉王出鎮揚州遣人迎至及即位於東都起玉清觀以處之太宗之為秦王也既平王世充與記室房𤣥齡往詣之立枚以問其吉凶逺知指秦王之枚曰此當上度天命下濟蒼生者又指𤣥齡之枚云聖之輔也及太宗踐祚恩禮甚厚又曰城陽公主初適杜如晦之子杜荷貞觀中為尚衣奉御坐承乾事伏誅公主改適饒州刺史薛昱之子瓘將成婚太宗使卜之卜人曰兩火俱食始則同榮末亦雙悴若晝日行合巹之禮則終吉太守將從之馬周諫曰臣聞朝謁以朝思相戒也講習以晝思相成也讌飲以昃思相樂也婚合以夜思相親也是以上下有威内外有規動息有時吉凶有儀先王之教不可黷也今陛下欲謀其始而辭其終不可為也夫卜筮者所以定猶豫决嫌疑若黷亂禮常先王所不用也太宗又從其言而止又曰憲宗嘗謂李綘曰卜筮之事習者罕精或中或否近日風俗尤更崇尚何也對曰臣聞古先哲王畏天命不敢專邦國有大事可疑者故謀於卿士庶人决於卜筮俱吉則行之末俗浮偽倖以徼福正行慮危邪謀覬安持疑昏惑謂小數能决之而愚夫愚婦假時日鬼神者欲利欺詐叅之見聞用以射利小近其事神而異之近者風尚卜筮此誠弊俗聖㫖所及實辨邪源但存而不論弊斯息矣}
