  - {type: variant, offset: 5053, length: 0, content: '', SBCK: 瓊茅以筳篿楚人折竹結草以卜謂爲籌也牛蹄卜晉書日夫餘國若有軍事殺牛祭天以其蹄占吉凶蹄解者為凶合者爲吉楊方五經鈎沉日東夷之人以牛骨占事呈吉示凶無往不中牛非智}
