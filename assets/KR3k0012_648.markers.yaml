  - {type: variant, offset: 1757, length: 0, content: '', WYG: 之意哉其除肉刑有以易之丞相張蒼御史大夫馮敬奏言肉刑所以禁姦所由來者久矣陛下下明詔憐萬民之一有過被刑者終身不息及罪人欲改行為善而道亡繇至於盛徳臣等所不及也謹議請定律曰諸當完者完為城旦舂文帝除肉刑皆有以易之故以完易髠當黥者髠鉗為城旦舂當劓者笞三百當斬左趾者笞五百當斬右趾及殺人先自告及吏坐受賕枉法守縣官財物而即盜之已論命復有笞罪者皆棄市罪人獄以决完為城旦舂罪也命者名也成其罪也當斬右足以其罪次重故從棄市也殺人先自告謂殺人而自首也三國典畧曰齊崔謙遷鉅鹿太守恩信大行改鞭用熟皮為之不忍見血示恥而已有貧弱未埋者皆曰我自造白鬚公不慮不决在郡七載獄無停囚齊春秋曰齊景真為晉平太守有惠政嘗懸一蒲鞭未嘗用之齊書曰薛安都從弟道生以軍功為大司馬參軍犯罪為秣陵令庾淑之所鞭安都大怒乃乗馬從數拾人令左右執矟欲往殺淑之行至朱雀航逢栁元景遥問曰薛公何之安都躍馬至車後曰小子庾淑之鞭我從弟今往刺殺之元景慮其不可駐紿之曰小子无適卿往與手甚快安都既廻馬元景復呼之令下馬入車因讓之曰卿從弟服章言論與寒細不異且人身犯罪理應加罰卿朝廷勲臣云何放恣輒於都邑殺人非唯科律所不容主上亦无辭相宥因載俱歸安都乃止南史曰禇玠為山隂令時舍人曹義達為明習律令與羣臣共議出本當右趾而入大辟者復行此刑書云皇帝清問下民鰥寡有辭於苗此言堯當除蚩尤有苗之刑先審問於下民之有辭者也若今蔽獄之時訊問三槐九棘羣吏萬民使如孝景之令其當棄市欲斬右趾者許之其黥劓左趾宮刑者自如孝文易以髠笞能為姦者率年二十至四五十雖斬其足猶任生育今天下人少於孝文之世下計所全嵗三千人張蒼除肉刑所殺嵗以萬計臣欲復用肉刑嵗生三千人疏奏詔曰太傅學廣才髙留心政事又於刑理深逺此大事公卿羣僚善共平議司徒王朗議以為繇欲輕減大辟之條增益刖刑之數此則起偃為豎化屍為人也然臣之愚猶有未合微異之意夫五刑之屬著在科律科律自有減死一等之法不死即為減死施行已久不待逺假斧鑿於彼肉刑然後罪次也前世仁者不忍肉刑之慘酷是以廢而不用已來厯年數百今復行之恐其所減之文未彰於萬民之目而肉刑之間已宣於冦讐之耳非所以來逺人也議者百餘人與朗同者多帝以吳蜀未平且寢王隠晉書曰曹彦議云嚴刑以殺犯之者寡刑輕易犯蹈惡者多臣謂玩常苟免犯法乃衆黥刖彰刑而民甚恥且創黥則見者知禁彰罪表惡亦足以畏所以易曰小懲大戒豈蹈惡者多耶假使多惡尚不至死无妨産育苟必行殺為惡縱寡殺而不已將至无人天无以神君无以尊矣古人寧失不經是以為上寧寛得衆若乃臯陶聴訟刑以止刑不可及已過此以往肉刑宜復肉刑於死為輕減死五百為重重不害生足以懲姦輕則知禁禁民為非所謂相濟經常之法議云不可或未知之也}
