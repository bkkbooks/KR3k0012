  - {type: variant, offset: 851, length: 3, content: 乃引劍, SBCK: 之無辜使明習律令與群臣共議出本當右趾而入大辟者復行此刑書云皇帝清問下民鰥寡有辭於苗此言堯當除􅃖尢有苗之刑先審問於下民之有辭者也􅀂今蔽獄之時訊問三槐九􅁄群吏萬民使如孝景之令其當弃市欲斬右趾者許之其黥劓左趾宫刑者如孝文易以髠笞能爲姦者率年二十至四五十雖斬其足猶任生育令天下人少於孝文之丗下計所金嵗三千人張蒼除肉刑所殺嵗以萬計臣欲復肉害刑嵗生三千人䟽奏詔曰太􅀓學廣才髙留心政事文於刑理深逺此大事公卿群僚善共平議司徒王朗議以爲繇欲輕減大辟之條増益刖刑之數此則起偃爲竪化屍爲人矣然臣之愚猶有未合微異之意夫五刑之屬著在科律科律}
