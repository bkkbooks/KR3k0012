  - {type: variant, offset: 1397, length: 666, content: 未可也天下皆曰殺之然後察之方寘於法今至聖之代殺一凡庶尚須合於典法況無辜殺一宰相乎臣為陛下惜天下法實不為申錫也文宗為之感悟玄亮由此名重於朝又曰興平縣人上官興因醉格殺人亡竄吏執其父下獄興自首請罪以出其父京兆尹杜悰以其首罪免父有光教義請減死配流王彥威曰殺人者死百王共守若許殺人不死是教殺人興雖免父不合減死山海經曰共工氏之臣曰相柳氏九首以食于九山頭各自食一山之物言貪暴難饜也相柳之所抵厥為溪澤抵觸也禹殺相柳其血脈不可以樹㯏乃以為眾帝之臺曹操別傳曰始袁忠為沛相薄待操沛國桓劭亦輕之及在兗州陳留邊讓頗笑操操殺讓族其家忠劭俱避難交州操遠使就太守士燮盡族劭劭得出首拜謝於中庭操謂曰跪可解死耶遂殺之孟子曰孟子謂齊宣王曰左右皆曰可殺勿聽諸大夫皆曰可殺勿聽國人皆曰可殺然後察之見可殺焉然後殺之故曰國人殺之也言當真行大辟之罪如此而後可以為民父母又曰或問勸齊伐燕有諸曰未也今有殺人者或問之曰人可殺與則將應之曰可彼如曰孰可以殺之則將應之曰為士師則可以殺之今以燕伐燕何為勸之哉燕有罪王者當誅之燕猶齊故不可搜神記曰漢宣帝之世燕代之間有三男共取一婦生四子及其將分妻子而不可均反致爭訟廷尉范延壽斷之曰此非人類當以禽獸處之禽獸從母不從父也請戮三男以兒還母帝嗟嘆曰何必古若此則可謂當於理而厭人情也延壽蓋見人事而知用刑矣太公金匱曰殺一人而千人恐者殺之殺二人而萬人動者殺之殺三人而君振者殺之三族刑尚書泰誓曰今商王受弗敬上天降災下民沉湎冒色敢行暴虐罪人以族官人以世一人有罪刑及父母兄弟妻子言淫濫也史記曰秦始皇平六國制天下以古非今者族吏見知不舉與同罪又曰陳狶反韓信欲謀發兵欲以襲呂, SBCK: 律髙}
