  - {type: variant, offset: 136, length: 1, content: 煞, SBCK: 刖斷足也周改臏作刖也刖者使守門家語曰季羔爲衛士師刖人之足俄而衛亂李羔逃刖者守門焉曰彼有缺季羔曰君子不踰曰彼有竇季羔曰君子不隊曰此有室季羔入焉旣而問其故刖者曰斷足固我罪也臨當刑君愀然不樂見於顔色此臣之所以脫君也史記曰孫臏與龐㳙學兵法龐㳙旣事魏得爲惠王將軍而自以爲能不及孫臏隂使召孫臏臏到龐恐其賢以刑法斷其兩足而黥之欲隱而勿見齊使者如梁孫臏以刑徒隂見說齊使以爲竒􅀼載與之齊列子曰魯施氏有二子其一好學其一好兵好學者以術干齊侯齊侯以爲公子􅀓好兵者以法干楚王楚王以爲軍政隣人孟氏有二子所業亦同問施氏之方施氏告之一子以術干􅁗王􅁗王曰今諸侯力争安得用仁義遂宫而放之一子以法干衛侯衛侯曰吾弱國豈可稱兵遂以刖之二人讓施氏曰子不得時也韓子曰楚人和氏得璞玉於楚山之中獻之武王武王使玉人相之曰石也王以和爲慢刖其左足及文王即位和又奉其璞王又使玉人相之又曰石也文王刖其右足文王薨成王即位和乃抱其璞而哭於荆山之下三日三夜泣盡而繼之血成王問其故曰天下刖者多矣子何哭之悲也和曰吾非悲刖也夫寳玉而題之以石直士命之以慢此吾之所以悲也王乃使玉人剖其璞而得寳焉遂名曰和氏之璧宫割尚書吕刑曰宫辟疑赦其罰六百鍰宫􅁋刑也男子割􅀔婦人幽閉次}
