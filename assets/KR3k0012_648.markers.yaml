  - {type: variant, offset: 2395, length: 410, content: 國春秋曰魏帝謁陵曹爽及弟義訓彥皆從高祖命授兵召公卿於廟堂奏皇太后廢爽丁酉斬爽義訓彥夷三族雜死刑韓子曰齊國好厚葬布帛盡於衣裘林木盡於棺槨桓公患之以告管仲曰布帛盡則無以為幣林木盡則無以為守備如民之厚葬不休奈何管仲對曰凡民之有為也非名之則利之於是乃下令曰棺過度者戮其尸罪當喪者夫戮尸無名罪當喪者無利無名無利民何故為之呂氏春秋曰趙簡子沉鸞繳於河曰吾嘗好聲色矣而鸞繳致之吾嘗好宮室臺榭矣而鸞繳來之今吾好士六年矣而鸞繳未嘗進一人也是長吾過而絀吾善也淮南子曰夏桀殷紂生燔人辜頡者為炮烙鑄金柱鑄金柱然火其下以人置上人火中而對笑之符子曰桀觀炮烙於瑤臺謂龍逢曰樂乎龍逢曰樂桀曰觀刑何無惻恒之心龍逢曰天下苦之而君以為樂臣君之股肱何不悅乎桀曰聽子諫諫得我改之諫不得我刑之龍逢曰臣觀君冠危石也臣觀君履春冰也未有冠石而不壓蹈春冰而不陷桀笑曰是曰亡則與俱亡子知我之亡而不自知乎亡子就炮烙之刑吾觀子龍逢歌趍造作勞我以生息我以炮烙故涉薪我樂人不知赴火而死, SBCK: 八}
