  - {type: variant, offset: 25, length: 7, content: 掌戮掌斬殺賊諜, SBCK: 刖罪五百鄭玄注曰周改臏作刖白虎通曰臏者脫其臏也取法金之刻木也風俗通曰俗􅀃臈正祖食得兎者名之曰幸幸者善祥令人􅁻利也或􅀃兎􅩋者令人面皃生􅩋露見醜惡今􅁴得之嘉不爲巳疾也謹案尚書夏禹始作肉刑則天象}
