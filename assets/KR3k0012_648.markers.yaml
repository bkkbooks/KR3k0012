  - {type: variant, offset: 1390, length: 363, content: 諸大夫皆曰殺之未可也天下皆曰殺之然後察之方寘於法今至聖之代殺一凡庶尚須合於典法況無辜殺一宰相乎臣為陛下惜天下法實不為申錫也文宗為之感悟玄亮由此名重於朝又曰興平縣人上官興因醉格殺人亡竄吏執其父下獄興自首請罪以出其父京兆尹杜悰以其首罪免父有光教義請減死配流王彥威曰殺人者死百王共守若許殺人不死是教殺人興雖免父不合減死山海經曰共工氏之臣曰相柳氏九首以食于九山頭各自食一山之物言貪暴難饜也相柳之所抵厥為溪澤抵觸也禹殺相柳其血脈不可以樹㯏乃以為眾帝之臺曹操別傳曰始袁忠為沛相薄待操沛國桓劭亦輕之及在兗州陳留邊讓頗笑操操殺讓族其家忠劭俱避難交州操遠使就太守士燮盡族劭劭得出首拜謝於中庭操謂曰跪可解死耶遂殺之孟子曰孟子謂齊宣王曰左右皆曰可殺勿聽諸大夫皆曰可殺勿聽國人皆曰可殺然後察之見可殺焉然後殺之故曰國人殺之也言當真行大辟之罪如此而後可以, WYG: 豈稱}
