  - {type: variant, offset: 1296, length: 0, content: '', SBCK: 天無以神君無以尊矣故人寧過不殺是以爲上寧寛得衆􅀂乃于張聽訟刑以止刑可不革舊過此以往肉刑冝復肉刑於死爲輕減死五百爲重重不害生足以懲姦輕則知禁禁民爲非所謂相濟經常之法議云不可或未知之也又曰尚書梅陶問光禄大夫祖納漢文帝故當爲英雄旣除肉刑而五六百􅀊無能復者納荅曰諸聖制肉刑而漢文擅除已來無勝漢文帝者故不能復非聖人者無法何足爲英雄於是陶不能對隱白征西大將軍曰夫政未可立則思制度全育民命冨國強兵叛盗之屬斷支而已是好生惡殺叛盗皆死是好殺惡生也斷支􅀂謂之酷截頭更不謂之虐何其乖哉刑罰不中則民無所措手足也蠻夷猾夏則臯陶作士此欲善其末則先制其本也自古多人猶惜民命得以御㓂况今千不遺一益冝存在以伐大賊今􅀂得改之則􅀊活數萬生數亦如之􅀂此十載生各數萬斷支之後隨刑使役不失民不乏用冨國強兵此之謂也又曰劉頌上書曰古者刑以止刑及今反於刑生刑以徒生徒諸重犯亡者髮過三寸輒重髠之此以刑生刑亡加作一􅀊此以徒生徒也亡者積多繫囚猥蓄議者因曰不可不赦復從而赦之此爲刑不制罪法不勝姦民知法之不勝相聚而謀爲不􅁤故自頃以來姦惡陵􅁀所在充斥漸以滋蔓日積不巳弊將所歸議者不深思此故而曰肉刑於名忤聽忤聽孰與盗賊不禁聖王之制肉刑逺有深重其事可得而言非徒懲其畏剥割之痛而不爲也乃去其爲惡之具使夫姦民無用不復肆其志止姦絶本理之盡也亡者刖其足無所用復亡盗者截其手無所用復盗􅁋者割其􅀔理亦如之除惡塞源莫善於此又非徒然也此等巳刑之後便各歸家父母妻}
