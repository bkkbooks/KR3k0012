  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第六百四十八}
  body:
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 四黥劓臏刖宫割造肉刑除肉刑論􅁏刑黥尚書吕刑曰墨辟疑赦其罰百鍰孔安國曰刻其顙而􅄺之曰墨刑疑則赦從罰六兩曰鍰鍰黄䥫也尚書刑德放曰􅃰鹿者竿人顙也黥者馬羇竿人面也鄭玄曰􅃰鹿黥皆先次刀笠傷人墨市其中故後世謂之墨土民也尚書大傳曰非事之事入不以道義而誦不祥之辭者其刑墨注曰非事而事之今所不當得爲也周禮秋官司刑職曰墨者使守門鄭玄曰墨黥也先刻面以墨窒之白虎通曰墨墨其額也取法火之勝金也得火亦變而墨也說文曰黥刑在靣也史記曰􅁗太子犯法衛鞅曰法之不行自上犯之將刑太子君嗣也不可施刑刑其􅀓公子䖍黥其師公孫賈明日􅁗民皆隨令行之十年􅁗民大恱道不拾遺山無盗賊民勇於公戰怯於私闘又曰黥布􅁗時爲布衣年少客相之當刑而王及壯坐黥布欣然􅀏曰人相我當刑而王幾是乎漢書曰文帝除􅁏刑當黥者髠爲城旦春律說曰男女論决髠鉗輸邊晝日防㓂虜夜暮築長城女子無軍警之事但舂食徒者也又曰黥劓之罪不及大夫故里諺曰欲投䑕而忌器器君也大夫近於君晉令曰収婢亡加銅青􅀂墨黥黥兩眼後再亡黥兩頰上}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_648-1b}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_648-2a}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 四黥劓臏刖宫刑造肉刑除肉刑黥尚書吕刑曰墨辟疑赦其罰百鍰孔安國曰刻其顙而湼之曰墨刑疑則赦從罰六兩曰鍰鍰黄鐵也尚書刑徳攷曰涿鹿者竿人顙也黥者馬羈竿人面也鄭𤣥曰涿鹿黥皆先用刀芒傷人墨布其中故後世謂之墨士民也尚書大傳曰非事之事入不以道義而誦不祥之辭者其刑墨周禮秋官掌戮職曰墨者使守門白虎通曰墨墨其額也取火之勝金也得火亦變臏而墨也説文曰黥刑在面也史記曰秦太子犯法衛鞅曰法之不行自上犯之将刑太子君嗣也不可施刑刑其傅公子䖍黥其師公孫賈明日秦人皆趨令行之十年秦民大悦道不拾遺山無盜賊民勇於公戰怯於私鬭又曰黥布秦時為布衣少年客相之當刑而王及壯坐黥布欣然笑曰人相我當刑而王幾是乎漢書曰文帝除肉刑當完者完為城旦舂律説曰男女論死髠鉗輸邊城曰防冦虜夜暮築長城女子无軍令之事但舂食徒米也又曰黥劓之罪不及大夫故里諺曰欲投䑕而忌器器君也大夫近於君晉令曰奴婢亡加銅青若墨黥黥兩眼后再亡黥兩頰上}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_WYG_648-1b, image: WYG0898/WYG0898-0764d.png}
