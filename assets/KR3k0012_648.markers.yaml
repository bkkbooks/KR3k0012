  - {type: variant, offset: 1768, length: 1, content: 未, WYG: 肉刑於名忤聴忤聴孰與盜賊不禁聖主之制肉刑逺有深理其事可得而言非徒懲其畏剥割之痛而不為也乃去其為惡之具使夫姦民无用不復肆其志止姦絶本理之盡也亡者刖其足无所用復亡不盜者截其手无所用獲盜淫者割其勢理亦如之除惡塞源莫善於此又非徒然也此等已刑之後便各歸家父母妻子共相養恤瘡愈可役上准古制隨宜業作雖已刑殘不為虐也生育繁阜之道自若}
