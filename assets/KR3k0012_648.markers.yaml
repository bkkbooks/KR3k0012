  - {type: variant, offset: 12, length: 1, content: 埋, SBCK: 孔安國曰劓截􅈹者也尚書大傳曰觸易君命革與服制度姦兇攘傷人者其刑劓鄭玄曰攘竊也周禮秋官司刑職曰劓罪五百鄭􅀇曰劓截鼻令今東夷或以墨劓爲俗古刑人亡逃者}
  - {type: variant, offset: 12, length: 1, content: 埋, WYG: 尚書大傳曰觸易君命革輿服制度姦兇攘竊傷人者其刑劓周禮秋官司刑職曰劓罪五百鄭𤣥曰劓截鼻今東西夷或以墨劓為俗古刑掌戮劓者使守闗禮統曰劓刑法木勝土决其皮革也白虎通曰劓劓其鼻也法木}
  - {type: page-break, offset: 12, content: '', id: KR3k0012_WYG_648-3a, image: WYG0898/WYG0898-0765c.png}
  - {type: variant, offset: 12, length: 1, content: 埋, krp: 孔安國曰劓截鼻者也尚書大傳曰觸易君命革與服制度姦兇攘傷人者其刑劓鄭玄曰攘竊也周禮秋官司刑職曰劓罪五百鄭玄曰劓截鼻令今東夷或以墨劓爲俗古刑人亡逃者}
  - {type: variant, offset: 14, length: 0, content: '', SBCK: 􅀋與劓者}
  - {type: variant, offset: 14, length: 0, content: '', WYG: 穿土也去鼻亦孔見漢書曰文帝除肉刑當劓者笞三百楚漢春秋曰正疆數言事而當上}
  - {type: variant, offset: 14, length: 0, content: '', krp: 類與劓者}
  - {type: variant, offset: 15, length: 2, content: 不復, SBCK: 守􅀜禮統曰劓刑法木勝土决其皮革也白虎通曰劓劓其􅈹也法木之穿土也去鼻亦孔}
  - {type: variant, offset: 15, length: 3, content: 不復見, WYG: 㕘乗解玉劍以佩之天下定以為守有告之者上曰天下方急汝何在曰亡上曰正疆沐浴霜露與我從軍而汝亡告之何也下廷尉劓臏尚書大傳曰决關梁踰城郭而略盜者其刑臏尚書刑徳攷曰臏者脱去人之臏也臏罰之屬五百象七精禮統曰臏刑法金勝木去其節目}
  - {type: page-break, offset: 15, content: '', id: KR3k0012_WYG_648-3b, image: WYG0898/WYG0898-0765d.png}
  - {type: variant, offset: 15, length: 2, content: 不復, krp: 守關禮統曰劓刑法木勝土决其皮革也白虎通曰劓劓其鼻也法木之穿土也去鼻亦孔}
  - {type: variant, offset: 18, length: 0, content: '', SBCK: 漢書曰文帝除􅁏刑當劓者笞三百楚漢春秋曰正疆數言事而當上使參乗解玉劒以佩之天下定岀以爲守有告之者上曰天下方急汝何在曰亡上曰正疆沐浴霜露與我從軍而汝亡告之何也下廷尉劓臏尚書大傳曰决􅀜梁踰城郭而略盗者其刑臏尚書刑德放曰臏者脫去人之臏也臏罰之屬五百象七精七宿昏中變易節氣之精也禮統曰臏刑法金勝木去其節目}
