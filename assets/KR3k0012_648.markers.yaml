  - {type: variant, offset: 1764, length: 1, content: 燕, WYG: 大賊今若得改之則嵗活數所朶數亦如之若此十載生各數萬斷肢之後隨刑使役不失民民不乏用富國彊兵此之謂也又曰劉頌上書曰古者刑以止刑及今反以刑生刑以徒生徒諸重犯亡者髪過三寸輒重髠之此以刑生刑加作一歲此以徒生徒也亡者積多繫囚猥蓄議者因曰不可不赦復從而赦之此謂刑不制罪法不勝姦民知法之不服相聚而謀為不軌故自頃以來姦惡陵暴所在充斥漸以滋蔓日積不已弊将}
