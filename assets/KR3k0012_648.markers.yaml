  - {type: variant, offset: 235, length: 7, content: 請舉事言周弱旦, SBCK: 今法有肉刑三孟康曰黥劓二左右趾合一凢三也而姦}
  - {type: variant, offset: 235, length: 633, content: 請舉事言周弱旦不和欲代之而復政也然後祿父三監叛周公以成王之命殺祿父禮曰邾婁定公時有殺其父者有司以告公瞿然失席曰是寡人之罪也寡人嘗學斷斯獄矣臣弒君凡在官者殺無赦子弒父凡在官者殺無赦言諸臣子孫無尊卑皆得殺之其罪無赦也殺其人壞其室洿其宮而瀦焉明其大逆不欲人復之也盍君踰月而後舉爵自貶損也又王制曰析言破律亂名改作執左道以亂政者殺折言破律巧賣法令也亂名改作謂變易官與物之名更作法度也左道若巫蠱及俗禁也作淫聲異服奇技奇器以疑眾殺淫聲鄭衛之聲異服若聚鷸冠瓊弁奇技奇器若公輸般請以機窆也行偽而堅言偽而辯學非而博順非而澤以疑眾殺皆謂虛華捷給無誠也假於鬼神時日卜筮以疑眾殺今時持喪葬梁蓋嫁娶卜數文書使民倍禮違制者也此四誅者不以聽左傳襄六年曰齊子尾害閭丘嬰欲殺之使帥師以伐陽州我問師故魯以師往問齊何故伐我子尾殺閭丘嬰以說于我師又昭四年曰楚子謂成虎若敖之餘也遂殺之書曰楚殺其大夫成虎懷寵也又昭四年曰楚子伏甲而饗蔡侯於申醉執而殺之刑其士七十人論語顏淵曰如殺無道以就有道何如子曰子為政焉用殺子欲善而民善矣史記曰二世使使殺公子將閭將閭曰朝廷之禮吾未嘗敢不從賓贊也廊廟之位吾未嘗敢失節也仰天而大呼天者三昆弟皆流涕自殺又曰二世又遣使者之陽周令蒙恬曰君之過多矣而卿弟毅有大罪法及內史蒙恬喟然太息曰我何罪於天無過而死良久徐曰恬罪固當死矣起臨洮壍萬餘里此其中不能無斷地脈此乃恬之罪也吞藥自殺又曰秦昭王賜白起劍令自殺武安君曰我固當死矣長平之戰趙卒降者數十萬人我詐而坑之是以死乃引劍自殺秦人憐之鄉邑皆祭祀華嶠後, WYG: ''}
