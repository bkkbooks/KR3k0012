  - {type: variant, offset: 1761, length: 2, content: 勸齊, WYG: 光禄大夫祖納漢文帝故當為英雄既除肉刑而五六百嵗无能復者納荅曰諸聖制肉刑而漢文擅除後來无勝漢文帝者故不能復非聖人者无法何足為英雄於是陶不能對納曰征西大将軍曰夫政未可立則思制度全育民命富國强兵叛盜之屬斷肢而已是好生惡殺叛盜皆死是好殺惡生也斷肢若謂之酷截頭更不謂之虐何其乖哉刑罰不中則民無所措手足也蠻夷猾夏則臯陶作士此欲善其末則先制其本也自古多人猶惜民命得以禦冦况今千不遺一益宜存在以}
