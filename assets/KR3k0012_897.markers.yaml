  - {type: variant, offset: 4542, length: 139, content: 人戰九人死此子獨以跛故子父相保地鏡圖曰銅器之精見為馬孔叢子曰衛公子友饋四乘馬於子思曰不以此求交於先生久降鄙土為賓至之餼耳又曰公孫龍以白馬為非馬或曰此辯而毀大道子高適趙謂龍曰願受業久不敢先者以白馬為非馬耳誠能去之則為弟子龍曰若使去之無以教矣涼州記曰呂光麟嘉五年踈勒王獻火浣布善舞馬, SBCK: 七}
