  - {type: variant, offset: 3260, length: 1, content: 唯, SBCK: 馬色云是巳亡父所乗對之流涕丗語曰劉備屯樊城劉表禮焉憚其爲人不甚信用曾諸宴會荆越蔡瑁欲因會取備備􅁴之僞如厠潛遁出行所乗馬名爲的顱􅀐的顱走墮襄陽城西檀溪水中溺不得岀備急曰的顱今日厄可不努力的顱乃一踴三丈遂得過異􅁐曰符堅爲慕容冲所襲堅馳馬墮澗追兵幾及計無由出馬即踟蹰臨澗垂控與堅堅不能及馬又跪而授焉堅攀之得登岸西走廬江七}
