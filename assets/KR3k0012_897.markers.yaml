  - {type: variant, offset: 2033, length: 1159, content: 為寡人用吾是以不相也又曰伯樂教其憎者相千里馬教其愛者相駑馬以千里馬世一有其利少駑馬多其利多也孫卿子曰伯樂不可欺以馬君子不可欺以人又曰驊騮騏驥纖離綠耳古之良馬也又曰君子善其言而類焉者應矣故馬嗚而馬應之非知也其勢然也又曰驥一日而千里駑馬十駕則亦及之矣伯樂相馬經曰馬生下墮地無毛行千里尿舉一腳行五百里闌䈥豎者千里馬膝如團麴千里三軍莫逐但知所發不知所宿也又曰江淮津督徐成字子長兄弟蒙寵於府君治馬方以報千金不傳號淮津方尋陽丞陽朱君方最良豫州從事沛國蕭跣方最良也又曰馬相歲上下齒二十四歲齒黃三十三歲齒白口中欲紅色如日月光者行千里汗溝欲深脊欲如伏龜兩邊有廻毛曰騰蛇殺主口邊有廻毛曰衘禍妨主口中有黑者烏銜馬短壽又曰素下去飛䖟四寸行千里驟而不起骨勞起而不振皮勞振而不噴氣勞耳欲小而促也食有三芻飲有三時也白額入口名曰榆寫一名的盧奴乘客死主乘棄市廻毛在目下名曰承淚不利人也又曰馬頭為王欲得方目為丞相欲得明脊為將軍欲得強腹為城郭欲得張一曰脅為城郭四下為令欲得長一曰膝下為令一曰四下眼欲得高巨一曰欲其端正眼睛欲如懸鈴紫艷光明下臥蠶懸鑿欲得成鼻孔欲得大鼻頭有王火字一曰鼻欲得橫筋鼻上文如王火欲得明口中欲得赤膝骨圓而張耳欲相近而堅小而厚雍一寸三百里三寸千里伏龍骨欲得成頸欲得長雙扶欲得大而突蹄欲得厚腹下欲得平有八字馬頭欲得高而成尾骨高而垂也凡相馬之法先觀三贏五駑乃相其餘大頭小頸一羸也弱脊大腹二羸也小脛大蹄三羸也謂五駑者大頭緩耳一駑也長頸不折二駑也短上長下三駑也大骼短脅四駑也淺寬薄脾五駑也馬援銅馬相法曰水火欲明水火在鼻兩孔間上唇欲急而方口中欲紅而有光此馬千里頷下欲深下唇欲緩牙欲去齒一寸則四百里牙劍鋒則千里目欲滿而澤腸欲充膁小肋欲長懸薄欲厚而緩懸薄服股也腹下欲平滿汗溝欲深長而膝本欲起肘腑欲開膝欲方蹄欲厚三寸堅如石鬃欲戴中骨高三寸鬃中骨也頰欲開而膺下欲廣一尺以上能久走鞅欲方頸前胸欲直而出脾骨前向鳧間欲開望視之如雙鳧楚辭曰卻騏驥而不乘兮策駑駘而取路當世無騏驥兮誠莫之能善御見執轡者非其人兮故駒跳而遠去符瑞圖曰王者貴人而賤馬則白馬朱鬣集又云車馬有節則見騰黃騰黃者神馬也其色黃一名乘黃亦曰飛黃或曰吉黃或曰翠黃一名紫黃其狀如狐背上有兩角出白氏之國乘之壽三千歲黃帝乘之孫氏瑞應圖曰玉馬者王者清明尊賢則至又曰乘黃王者輿服有度則出騕褭者神馬也與飛兔同以明君有德也又曰飛兔者日行三萬里禹治水土勤勞歷年救民之害天應其德則至駃蹄者后土之獸也自能言語王者仁孝於民則出禹治水有功而來又曰龍馬者仁馬河水之精也高八尺五寸長頸骼上有翼旁乘毛鳴聲九音有明王則見呂氏春秋曰秦繆公車敗失左驂自往求焉見野人殺將食之繆公笑曰食駿馬肉而不飲酒余恐其傷性也遍飲之而去又曰伯樂學相馬所見無非馬者又曰古相馬者有寒風能相口齒麻朝能相頰女厲能相口管青能相脣吻陳裴能相股腳秦牙能相前賁君能相後並知其, SBCK: ''}
  - {type: variant, offset: 2033, length: 1159, content: 為寡人用吾是以不相也又曰伯樂教其憎者相千里馬教其愛者相駑馬以千里馬世一有其利少駑馬多其利多也孫卿子曰伯樂不可欺以馬君子不可欺以人又曰驊騮騏驥纖離綠耳古之良馬也又曰君子善其言而類焉者應矣故馬嗚而馬應之非知也其勢然也又曰驥一日而千里駑馬十駕則亦及之矣伯樂相馬經曰馬生下墮地無毛行千里尿舉一腳行五百里闌䈥豎者千里馬膝如團麴千里三軍莫逐但知所發不知所宿也又曰江淮津督徐成字子長兄弟蒙寵於府君治馬方以報千金不傳號淮津方尋陽丞陽朱君方最良豫州從事沛國蕭跣方最良也又曰馬相歲上下齒二十四歲齒黃三十三歲齒白口中欲紅色如日月光者行千里汗溝欲深脊欲如伏龜兩邊有廻毛曰騰蛇殺主口邊有廻毛曰衘禍妨主口中有黑者烏銜馬短壽又曰素下去飛䖟四寸行千里驟而不起骨勞起而不振皮勞振而不噴氣勞耳欲小而促也食有三芻飲有三時也白額入口名曰榆寫一名的盧奴乘客死主乘棄市廻毛在目下名曰承淚不利人也又曰馬頭為王欲得方目為丞相欲得明脊為將軍欲得強腹為城郭欲得張一曰脅為城郭四下為令欲得長一曰膝下為令一曰四下眼欲得高巨一曰欲其端正眼睛欲如懸鈴紫艷光明下臥蠶懸鑿欲得成鼻孔欲得大鼻頭有王火字一曰鼻欲得橫筋鼻上文如王火欲得明口中欲得赤膝骨圓而張耳欲相近而堅小而厚雍一寸三百里三寸千里伏龍骨欲得成頸欲得長雙扶欲得大而突蹄欲得厚腹下欲得平有八字馬頭欲得高而成尾骨高而垂也凡相馬之法先觀三贏五駑乃相其餘大頭小頸一羸也弱脊大腹二羸也小脛大蹄三羸也謂五駑者大頭緩耳一駑也長頸不折二駑也短上長下三駑也大骼短脅四駑也淺寬薄脾五駑也馬援銅馬相法曰水火欲明水火在鼻兩孔間上唇欲急而方口中欲紅而有光此馬千里頷下欲深下唇欲緩牙欲去齒一寸則四百里牙劍鋒則千里目欲滿而澤腸欲充膁小肋欲長懸薄欲厚而緩懸薄服股也腹下欲平滿汗溝欲深長而膝本欲起肘腑欲開膝欲方蹄欲厚三寸堅如石鬃欲戴中骨高三寸鬃中骨也頰欲開而膺下欲廣一尺以上能久走鞅欲方頸前胸欲直而出脾骨前向鳧間欲開望視之如雙鳧楚辭曰卻騏驥而不乘兮策駑駘而取路當世無騏驥兮誠莫之能善御見執轡者非其人兮故駒跳而遠去符瑞圖曰王者貴人而賤馬則白馬朱鬣集又云車馬有節則見騰黃騰黃者神馬也其色黃一名乘黃亦曰飛黃或曰吉黃或曰翠黃一名紫黃其狀如狐背上有兩角出白氏之國乘之壽三千歲黃帝乘之孫氏瑞應圖曰玉馬者王者清明尊賢則至又曰乘黃王者輿服有度則出騕褭者神馬也與飛兔同以明君有德也又曰飛兔者日行三萬里禹治水土勤勞歷年救民之害天應其德則至駃蹄者后土之獸也自能言語王者仁孝於民則出禹治水有功而來又曰龍馬者仁馬河水之精也高八尺五寸長頸骼上有翼旁乘毛鳴聲九音有明王則見呂氏春秋曰秦繆公車敗失左驂自往求焉見野人殺將食之繆公笑曰食駿馬肉而不飲酒余恐其傷性也遍飲之而去又曰伯樂學相馬所見無非馬者又曰古相馬者有寒風能相口齒麻朝能相頰女厲能相口管青能相脣吻陳裴能相股腳秦牙能相前賁君能相後並知其, WYG: ''}
