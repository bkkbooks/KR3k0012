  - {type: variant, offset: 616, length: 334, content: 雖有儀臺路寢無所用之及至伯樂曰我善治馬燒之剔之刻之駱之連之以羈絆編之以皂棧馬之死者十二三矣飢之渴之馳之驟之整之齊之前有橛飭之患後有鞭策之威而馬之死者已過半矣又徐無鬼曰吾相馬直者中繩曲者中鉤方者中矩圓者中規是國馬也而未若天下馬也天下馬有成材若卹若泆若喪若一若是者超軼絕塵不知其所老子曰天下有道卻走馬以糞天下無道戎馬生於郊列子曰秦穆公謂伯樂曰子之年長矣子姓有可使求馬乎伯樂對曰良馬可以形容筋骨相也天下之馬者若滅若沒若亡若失臣之子皆下才也臣有所與九方皋其於馬非臣之比也穆公之見使行求馬三月而反報曰已得之在沙丘穆公曰何馬對曰馬牝而黃使人往取之牡而驪公不悅召伯樂曰敗矣子之所使求馬者色物牝牡弗能知又何馬之能知也伯樂曰若皋之所觀天機也得其精忘其麤在其內而忘其外馬至果天下之馬也淮南, SBCK: 傅}
