  - {type: variant, offset: 3794, length: 4, content: 皁與皂同, WYG: 論衡曰廣漢翁律能聴鳥獸之音乘蹇馬之野而田間有放馬者相去數里鳴聲相聞翁律謂其御曰彼放馬目眇其御曰何以知之曰罵此轅中馬蹇馬蹇馬亦罵之曰眇馬御者不信使徃視之目果眇鹽鐵論曰騏驥之輓鹽車垂頭於太行屠者持刀而睨之}
