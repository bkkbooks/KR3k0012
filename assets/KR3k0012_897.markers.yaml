  - {type: variant, offset: 92, length: 112, content: 馬也赤喙黑身穆天子傳曰天子命駕八駿之乘右服華騮而左綠耳右驂赤驥而左白義天子主車造父為御次車之乘右服渠黃而左踰輪右驂盜驪而左山子伯天子主車參百為御奔戎為右天子乃遂東南翔行馳驅千里至于巨蒐巨蒐之人用其牛馬之湩以洗天子之足湩乳音東, WYG: 鳬}
