  - {type: variant, offset: 3837, length: 153, content: 御也鉗旦大丙太一之御徐轡衘去韅鞅車莫動而自舉也馬莫使而自走也日行月動星耀而玄運電奔而鬼駭過歸鴈於碣石軼昆雞於姑餘姑餘在吳也非思慮之察手爪之巧也嗜欲形於胸中精神喻於六馬以此弗御之御者也又曰子驊騮騄耳一日千里搏兔不如狼契也又曰戎翟之馬皆可以馳驅或近或遠唯造父能盡其力三苗之民皆可使忠信或賢或不肖唯唐虞能齊其美又, krp: 食孔融論}
