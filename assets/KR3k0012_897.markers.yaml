  - {type: variant, offset: 3258, length: 0, content: '', SBCK: 死於蜀今元馬冢是也縣有元馬祠馬牧山下或産駿駒元馬子也長沙􅂄舊傳曰虞芝州命部南陽從事太守張忠連姻王室罪名入重芝依法執按刾史畏􅀔召芝芝曰年徃志盡譬如八百錢馬死生同價且欲立效於明時耳遂投傳去三輔决録曰安陵有項仲山飲馬渭水先投三錢襄陽記曰中盧山西去襄陽一百三里有一地道漢時甞有數疋白馬出其中遂名其地爲白馬穴陸遜攻襄陽又值此穴中數十疋馬岀戰還建鄴蜀使有五部兵家滇音顚池}
