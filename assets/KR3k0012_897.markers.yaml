  - {type: variant, offset: 3429, length: 1111, content: 人主之不肖有似於此不得其道而徒多其威威逾不用又曰飢馬盈廄嗼然未見芻也飢狗盈宮嗼然未見骨也見骨與芻動則不可禁動猶爭也亂世之民嗼然未見賢者也見賢人則往不可止又曰得十良馬不若得一伯樂得地千里不若得一聖人又曰小方大方之類也小馬大馬之類也小知非大知之類也又曰青龍之疋遺風之乘也高誘曰皆馬名疾若遺風也非先為天子不可得而具具備具也燕丹子曰太子有千里馬荊軻謂太子曰千里馬肝美太子即進肝又曰丹質於秦秦王遇之無禮欲求歸秦王曰烏頭白馬生角乃許爾歸丹仰天而歎烏即頭白馬即生角秦王乃放歸淮南子曰聖人之治猶造父之御也和輯乎銜轡之際而緩急於脣吻之和正度乎胸臆之中而執節於掌握之間內得於中心而外合於馬志故能取道致遠而氣力有餘誠得其術也是故執權者人主之車輿也大臣者人主之四馬也體離車輿之安而手失四馬之心而能無危者古今未之見也又曰天下有道飛黃服皁又曰黃帝時飛黃服皁也皁與皂同又曰王良造父之御也上車攝轡投足調均勞佚若一世皆以為工然而未甚貴也若夫鉗旦大丙之御也鉗旦大丙太一之御徐轡衘去韅鞅車莫動而自舉也馬莫使而自走也日行月動星耀而玄運電奔而鬼駭過歸鴈於碣石軼昆雞於姑餘姑餘在吳也非思慮之察手爪之巧也嗜欲形於胸中精神喻於六馬以此弗御之御者也又曰子驊騮騄耳一日千里搏兔不如狼契也又曰戎翟之馬皆可以馳驅或近或遠唯造父能盡其力三苗之民皆可使忠信或賢或不肖唯唐虞能齊其美又曰馬齒非牛蹄檀根非椅枝故見其一本而萬物知知猶別也又曰季秋之月乃殺於田獵以習五戎命僕及七騶咸駕載旗又曰易道良馬使人欲馳飲酒而樂使人欲歌是而行之固謂之斷非而行之必謂之亂斷猶治也又曰夫馬之為草駒之時跳躍揚蹄翹尾而走人不能制齕咋足以噆肌碎骨蹶蹄足以破盧陷匈噆罕也及至圉人擾之良御教之掩以衡扼連以轡銜則雖歷險超塹弗敢辭也故其馬之不可化其可駕御教之所為也馬聾蟲聾蟲無知也而可以通氣志猶待教而成又況人乎又曰夫待腰褭飛菟而駕之則世莫乘車矣腰褭飛菟皆行萬里其行若飛因曰飛菟也待西施落纂而為妃則終身不蒙矣又曰日之行也不見其移也騏驥背日而馳草木為靡懸峰未薄而日在其前矣懸峰馬蹄下雞舌也又曰馬免人於難者其死也葬之以帷牛有德於人者其死也葬之以大車之鹿牛馬有功猶不可忘又況人乎淮南萬畢術曰馬毛犬尾親友自絕取馬毛犬尾置朋友若夫婦衣中自相憎也說苑曰晉平公出田見乳虎乳虎伏而不動平公還謂師曠曰聞之霸王之君出獵猛獸伏而不敢起今者寡人出乳虎伏而不動此猛獸乎師曠對曰鵲食猬猬食鵕鸃鵕鸃食駮駮食虎夫駮之狀有似駮馬今者吾君必驂駮馬以出乎平公曰然又曰北塞上之人其馬亡入胡中人皆吊之其父曰此何誰知不為福居數月其馬將胡駿馬而歸人皆賀之其父曰此何誰知不為禍家富馬良其子好騎墮而折髀人皆吊之其父曰此何誰知不為福居一年胡夷大出丁壯者皆控弦而戰塞上之人死者十, SBCK: 覽卷第八百}
