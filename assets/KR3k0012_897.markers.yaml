  - {type: variant, offset: 3196, length: 0, content: '', SBCK: 魯人有善相馬者與余俱遊夜方寐聞馬有行者魯人驚曰七百里也吾恐此暗中耳符子曰齊景公好馬命􅀞工圗而訪之殫百乗之價朞年而不得像過實也}
  - {type: variant, offset: 3196, length: 1, content: 今, WYG: 魯人}
  - {type: variant, offset: 3196, length: 1, content: 今, krp: 魯人}
  - {type: variant, offset: 3197, length: 0, content: '', SBCK: 使愛賢之君考古籍以求其人雖期百年不可得也又曰吾與􅀇子觀東海釋駟而升乎􅵺山未中路而忘馬符子使人求之不獲使􅀑索之而獲符子曰六合不可忘故知良馬在其中矣請以六合之觀觀之也鄒子曰董仲舒三年不闚園圃乗馬不知牝牡諸􅁑教曰昔孫叔敖乗馬三年不知牝牡稱其賢也常璩華陽國志曰神馬四疋岀滇音顛池河中三國典略曰神馬者河之精也代馬隂之精也西京􅄂記曰文帝自代還}
  - {type: page-break, offset: 3197, content: '', id: KR3k0012_SBCK_897-2a}
  - {type: variant, offset: 3198, length: 0, content: '', SBCK: 良馬九疋皆天下駿足也名曰浮雲赤電絶羣逸驃紫鷰騮緑螭􅍡龍子驎駒絶塵號爲九逸又曰衛將軍生子或有獻騧馬者乃命其子爲騧字叔馬東方朔傳曰驃􅀐難諸愽士朔對曰騏驎緑耳蜚鴻華騮天下良馬也將以捕䑕於深宫之中曾不如跛猫神異經曰西南大宛有馬其大二丈髯至膝尾委地蹄如􅂛踠可握日行千里至日中而汗血乗者當以絮緾頭以避風病其國人不緾􅀭子法言曰或問治巳曰治巳以仲尼問治巳何用益以用孔子之道或曰治巳以仲尼奚寡矣言學孔子道多而成者何少也曰率馬以􅂹不亦可乎又曰希􅂹之馬亦􅂹之乗也希顔之人亦顔之徒也桓譚新諭曰顔淵所以命短者慕孔子所以傷其年也􅀂庸馬良馬相追至暮共列􅀫所良馬鳴食如故庸馬垂頭不復食何異顔淵與孔丘優劣又曰衛后園有送塟時乗輿馬十疋吏卒養視善飲不能乗而馬皆六十歲乃死又曰薛翁者長安善相馬者也於邊郡求得駿馬􅀐以入市去來人不見也後勞問之因請觀馬翁曰諸卿無目不足示也論衡曰儒書稱孔子與顔淵俱登魯東山望呉昌門謂曰氽何見曰見一疋練前有生藍孔子曰噫此白馬盧芻使人視之果然王子年拾遺記曰周穆王即位廵行天下馭八龍之駿名曰絶地翻羽奔霄越影踰暉超光騰霧挾翼又曰曹洪與魏武帝所乗之馬名曰白鶴時人諺曰慿空虚躍曹家白鸖洞􅁳記曰脩弥國有馬如龍騰虚逐日兩足􅀝行或藏形於空中唯聞聲耳時得天馬汗血是其􅀋也又曰畢勒國有小馬如駒日行千里毛垂至地東王公常􅀐此馬朝發湯泉夕飲虞淵一日一夕徃返七八度亦言馬毛長於空中自放則吹之或東或西也又曰東方朔遊吉雲之地越扶桑之東得䄂馬一疋髙九尺股裏有旋毛如日月之狀如月者夜光如日者晝光毛色隨四時之變漢朝之馬見之即垂頭振毛一國衆獸見皆避之帝問東方朔是何獸也朔曰昔西王母乗靈光之輦以􅃴東王公之舎稅此馬於芝田及食芝草王公怒弃馬於清津天岸臣至王公之壇因􅀐而返繞日三匝此馬入漢􅀜􅀜猶未掩臣於馬上睡眠不􅁴遂至帝曰其馬名云何朔曰因事爲名則歩景抱朴子曰韓子治甞以地黃甘草哺五十􅀊老馬以生三駒又百三十歲乃死又曰李南乗赤馬行道逢他人乗白馬者白馬先鳴而南赤馬鳴應之南謂從者曰彼馬言汝今當見一黃馬左目盲者是吾子可爲告使駛行相及從者不信行二里所果逢黃而左目盲南之馬先鳴而盲馬應之問其主果向白馬子也論衡曰廣漢翁偉能聽鳥獸之音乗蹇馬之野而田間有放馬者相去數里鳴聲相聞翁偉謂其衘曰彼放馬目眇其衘曰何以知之曰罵此轅中馬蹇馬蹇馬亦罵之曰眇馬御者不信使徃視之馬目果眇鹽䥫論曰騏􅂹􅀒鹽車垂頭於太行之坂屠者持刀睨之又曰古者諸侯不秣馬天子有命以車就牧庶人之乗馬者足以代勞而巳故行則服軛止則就犁一馬服櫪當中家六口之食孔融論曰馬之駿者名曰騏􅂹犬之駿者名曰韓盧犬之有韓盧馬之有騏􅂹人之聖也名號等設使騏􅂹與韓盧並走寧能頭尾相當八脚如一無有先後之􅁴矣英雄記曰公孫瓉每聞邊警輙厲色作氣如赴讎常乗白馬又白馬數十疋選􅀐射之士號爲白馬義從以爲左右翼胡甚畏之相告曰當避白馬長史曹暪傳曰吕布有駿馬名赤兎常􅀐乗之時人爲之語曰人中有吕布馬中有赤兎􅀽淮正書曰牛馬之爲人駕乗者非樂􅀒千鈞之重行}
