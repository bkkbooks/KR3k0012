  - {type: variant, offset: 1091, length: 916, content: 故而殺人百姓必怨叛諸侯輕伐吾國三當死也公喟然曰赦之家語曰孔子相魯齊人患其霸也欲敗其正名乃選女子八十人衣以文衣而舞容璣容璣舞曲及文馬四十駟以遺魯君陳女樂列文馬于魯城南高門外季桓子微服往觀之再三將受馬魯君為周道遊觀觀之終日殆於政事子路言於孔子孔子遂行又曰魯定公問於顏回曰子亦聞東野畢之善御乎對曰善則善矣雖然其馬將必佚定公色不悅顧謂左右曰君子故有誣人耶顏回退後三日校來報之曰東野畢之馬佚兩驂曳兩服入于廄公聞之越席而起促駕召顏回顏回至公曰前日寡人問吾子以東野畢之善御而子曰美矣其馬將佚不識吾子奚以知之對曰以政知之昔者帝舜巧於使民而造父又巧於使馬舜不窮其民而造父不窮其馬故舜無佚民而造父無佚馬今東野畢之御也升馬執轡衘體正矣馬宜為車步驟馳騁朝禮畢矣馬步驟馳騁盡朝禮之舞歷險致遠馬力盡矣然而其心猶乃求馬不已臣以此知之也公曰善哉誠若子之言也春秋後語曰蘇代欲見齊王齊王怨蘇秦欲困蘇代不肯見代代乃說淳于髡曰人有駿馬欲賣之比三旦立於市人莫知之往見伯樂曰臣有駿馬欲賣之比三旦立於市人莫與言願子還而視之如旋去而顧之臣請獻一朝之價伯樂乃如其言一旦而馬價十倍今臣欲以駿馬見於王莫為臣先後先後導引也足下有意為臣伯樂乎請獻白璧一雙黃金十溢以為馬食不斥言人欲云為馬之芻草淳于髡曰謹聞命矣入言之於王而見之王果善蘇代矣又曰初孫臏與龐涓俱學兵法涓既事魏惠王將自以為能不及孫臏乃陰使人召孫臏孫臏至以法刑之斷其兩足後齊使以為奇竊載與之歸田忌喜而客待之田忌數與齊諸公子馳逐重射馳馬爭先射重稱為勝也孫臏見其馬足不甚相遠有上中下輩於是臏謂田忌曰君弟重射弟但也亦阻也司馬長卿弟如臨卭是也我能令君勝田忌信然之與王及諸公子遂射千金臨質孫臏曰取君之下駟與彼上駟取君之上駟與彼中駟取君之中駟與彼下駟既三輩畢而田忌一不勝而再勝忌得千金於是田忌進孫臏威王王問兵法而師之韓子曰昔紂為甲百萬左飲馬於湛右飲馬於洹洹水竭湛水不流武王甲卒三千破而王之又曰鈆陵卓子乘蒼龍排父之乘鉤飾在前錯綴在後馬欲進則鉤飾禁之退則錯綴貫之造父見而泣曰猶人處急世而不知所由也或云乘瞿父之乘又曰桓公伐孤竹春往冬還迷惑失道管仲曰老馬之智可用乃放老馬而隨之遂得道又曰如耳說衛嗣君嗣君悅之左右曰公何為不相也公曰夫馬似鹿者而千金有千金之馬, SBCK: 走}
