  - {type: variant, offset: 4084, length: 0, content: '', WYG: 天馬子也長沙耆舊傳曰虞芝州命部南陽従事太守張惠連姻王室罪名入重芝依法執按刺史畏勢召芝芝曰年徃志盡譬如八百錢馬死生同價且欲立效於明時遂投傳去三輔決録曰安陵有項仲山飲馬渭水先投三錢襄陽記曰中盧山西去襄陽一百三里有一地道漢時嘗有數疋白馬出其中遂名其地為白馬穴陸遜攻襄陽又值此穴中數十疋馬出戰還建業蜀使有五部兵家滇音顛池者識其馬色云是已亡父所乘對}
