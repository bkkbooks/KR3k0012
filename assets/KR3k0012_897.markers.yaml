  - {type: variant, offset: 3260, length: 2, content: 唯賢, WYG: 國人不纒楊子法言曰或問治已曰治已仲尼問治已何用答以用孔子之道或曰治已以仲尼奚寡矣言學孔子道多而成}
  - {type: variant, offset: 3260, length: 2, content: 唯賢, krp: 國人不緾揚子法言曰或問治巳曰治巳以仲尼問治巳何用益以用孔子之道或曰治巳以仲尼奚寡矣言學孔子道多而成}
  - {type: variant, offset: 3262, length: 0, content: '', SBCK: 傳曰陳衆辟州從事楊州部有賊擊之多死衆請取之因單車乗白馬徃賊束身歸降遂生爲立祠號曰白馬從事竹林七賢論曰王戎簡脫不持儀形好乗巴􅗬馬雖爲三司率爾私行廵省園田不從一人以手巾揷腰戎故吏多至大官相逢戎輙下道避之搜神記曰昔􅁗人築城於武州塞内以備胡城將成而崩}
