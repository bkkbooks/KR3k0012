  - {type: variant, offset: 188, length: 297, content: 用其牛馬之湩以洗天子之足湩乳音東又曰祝沉牛馬豕羊河宗命乎皇天子加皇者尊之天子受命南面再拜柏發既致河典乃乘黃之乘為天子先所乘馬盡黃色為先驅也以極西土又曰天子北征舍于珠澤此澤出珠因名之也以釣于㳅水因獻食馬三百可以供廚膳者牛羊二千又曰辛丑天子渴于沙衍沙中無泉水求飲未至七萃之士曰高奔戎刺其左驂之頸取其清血以飲天子又曰天子東遊于黃澤宿于曲洛洛水文廻曲曰黃之池其馬歕沙歕音普問切皇人威儀黃之澤其馬歕王皇人壽穀郭璞注穆天子傳曰竹書曰北唐之君來見以一驪馬是生綠耳魏時西卑獻千里馬白色而兩耳黃名之為黃耳山海經曰滑水中多水馬如馬而文臂臂前腳牛尾其音如呼又曰天帝之山有草焉狀如菜臭如糜蕪名曰杜蘅可以走馬帶香草令便馬, SBCK: 相疋}
