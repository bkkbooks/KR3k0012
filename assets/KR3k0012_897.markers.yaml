  - {type: 'tls:seg', offset: 4613, content: '', id: KR3k0012_CHANT_897-53a.4}
  - {type: variant, offset: 4613, length: 0, content: '', krp: 𬒳鬛踶齧能使其成騏驥者習之故也愽物志曰穢貃國南與辰韓北與句麗沃沮接東窮大海海中岀班魚皮陸岀文豹又出果下馬髙三尺漢時獻之駕輦車正始六年樂浪太守劉茂帶方太守弓遵領東穢屬勾麗伐之舉邑降博物志曰唐公有驌驦項羽有騅馬華陽國志曰元馬日行千里死於蜀今元馬冢是也縣有元馬祠馬牧山下}
  - {type: variant, offset: 4614, length: 0, content: '', krp: 産駿駒元馬子也長沙耆舊傳曰虞芝州命部南陽從事太守張忠連姻王室罪名入重芝依法執按刾史畏勢召芝芝曰年徃志盡譬如八百錢馬死生同價且欲立效於明時耳遂投傳去三輔决録曰安陵有項仲山飲馬渭水先投三錢襄陽記曰中盧山西去襄陽一百三里有一地道漢時甞有數疋白馬出其中遂名其地爲白馬穴陸遜攻襄陽又值此穴中數十疋馬岀戰還建鄴蜀使有五部兵家滇音顚池者識其馬色云是巳亡父所乗對之流涕丗語曰劉備屯樊城劉表禮焉憚其爲人不甚信用曾諸宴會荆越蔡瑁欲因會取備備覺之僞如厠潛遁出行所乗馬名爲的顱騎的顱走墮襄陽城西檀溪水中溺不得岀備急曰的顱今日厄可不努力的顱乃一踴三丈遂得過異苑曰符堅爲慕容冲所襲堅馳馬墮澗追兵幾及計無由出馬即踟蹰臨澗垂控與堅堅不能及馬又跪而授焉堅攀之得登岸西走廬江七賢傳曰陳衆辟州從事楊州部有賊擊之多死衆請取之因單車乗白馬徃賊束身歸降遂生爲立祠號曰白馬從事竹林七賢論曰王戎簡脫不持儀形好乗巴􅗬馬雖爲三司率爾私行廵省園田不從一人以手巾揷腰戎故吏多至大官相逢戎輙下道避之搜神記曰昔秦人築城於武州塞内以備胡城將成而崩者數焉有馬馳走周旋反覆父老異之因依以築之爲城乃定遂名爲馬邑又曰呉先主殺武衛兵錢小小刑見大街頋借賃人呉永使永送書與桁南廟借木馬二疋以酒噀之皆成好馬鞍勒全耳志怪集曰孫弘常自云見鬼神與其言語委曲衆未之信鎭西將軍謝尚常所乗馬忽暴死會弘詣尚尚愛惜至甚弘謂尚曰我爲公活馬何如尚常不信弘荅曰卿若能令此馬更生者卿真實通神矣弘於是便下床去良乆還語尚曰廟神愛樂君馬故耳向我詣神請之𥘉殊不許後乃見聽馬即便活尚時甚不信怪其所言須臾其馬忽從門外走還衆咸見之莫不驚惋旣至馬屍應時能動有頃奮迅呼鳴尚於是歎息述異記曰東平畢衆寳家在彭城有一􅍡馬甚快常乗岀入至所愛惜宋大明六年衆寳夜夢見其亡兄衆慶曰吾有戎役方置艱危而無得快馬汝可以􅍡馬見與衆寳許諾旣覺呼同宿客說所夢始畢仍聞馬倒聲遣人視之裁餘氣息狀如中惡衆寳心知其故爲試治療向晨馬死衆寳還卧如欲眠聞衆慶語云向聊求馬汝治護備至將不惜之今以相還别更覔也至曉馬活食時復常續搜神記曰趙固常乗一疋赤馬以征戰甚所愛重常所繫㸔齋前忽腹脹少時死郭璞從北過因徃詣之門吏云將軍將馬今死甚愛惜今盛懊惋景純使語門吏云入通道吾能活此馬則必見我門吏聞驚喜即啓固固踊躍令門吏走迎之始交寒温便問卿能活我馬不璞曰馬可活耳固忻喜即問須何方術璞云得卿同心健兒二三十人皆令持長竹竿於此東行三十里當有丘陵林樹狀若社廟有此者便以竿攪擾打拍之當得一物便急持歸旣得此物馬便活矣於是命左右驍勇之士五十人使去果如璞言得大藂林有一物似猴而非走岀人共逐得便抱持歸入門此物遥見死馬便跳梁欲徃璞令放之此物便自走徃馬頭間嘘吸其鼻良乆馬即起噴鼻奮迅鳴喚便不復見此物固厚資給璞得過江靈鬼志曰陳安爲河間王顒給使甚壯健常樂一馬駿駃非常後馬死雙赤蛇岀其鼻列異記曰胡司隷校尉上黨鮑子都少時舉上計於道遇一書生卒得心痛子都下車爲按摩奄忽不知姓字有素書一卷銀十餅即賣一餅以資殯殮其餘以枕之素書着腹上埋之謂曰子若魂靈有知當令子家知子在此末至京師有􅍡馬隨之唯子都得近子都歸行失道遇一關内侯家住宿侯問曰君何以致此馬子都因說之侯乃驚愕}
