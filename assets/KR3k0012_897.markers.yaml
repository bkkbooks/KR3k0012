  - {type: variant, offset: 4610, length: 1, content: 為, krp: 又白馬數十疋選騎射之士號爲白馬義從以爲左右翼胡甚畏之相告曰當避白馬長史曹暪傳曰吕布有駿馬名赤兎常騎乗之時人爲之語曰人中有吕布馬中有赤兎袁淮正書曰牛馬之爲人駕乗者}
  - {type: variant, offset: 4612, length: 0, content: '', krp: 樂負千鈞之重行千里之險鞭䇿痛矣桓公丗論曰朝鮮之}
