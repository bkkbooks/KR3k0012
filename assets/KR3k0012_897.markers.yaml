  - {type: variant, offset: 4096, length: 0, content: '', WYG: 甚信用曽請宴會荆越蔡瑁欲因㑹取備備覺之偽如廁潜道出行所乘馬名為的顱騎的顱走襄陽城西檀溪水溺不得出備急曰的顱今日厄不可不努力的顱乃一踴三丈遂得過異苑曰符堅為慕容冲所襲堅馳馬墮澗追兵將及計無由出馬即踟蹰臨澗垂鞚與堅堅不}
