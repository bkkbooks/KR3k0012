  - {type: 'tls:seg', offset: 4615, content: '', id: KR3k0012_CHANT_897-53a.5}
  - {type: variant, offset: 4616, length: 1, content: 辯, krp: 吾兒也侯迎喪開棺視銀書如言侯乃舉送詣闕上薦子都辟公府侍御史䂊州牧司隷校尉至子永孫昱俱爲司隷其在公皆復乗􅍡馬故京師歌之曰鮑氏􅍡三入司隷再入公馬雖瘦行歩工傳玄乗輿馬賦曰徃日劉備之𥘉降也太祖賜之駿馬使自至廐選之歴名馬以百數莫可意者次至下厩有的顱馬委弃莫視瘦悴骨立劉備撫}
  - {type: substitution, offset: 4616, original: 辯, replacement: 辨, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-20391}}
  - {type: variant, offset: 4618, length: 1, content: 毀, krp: 取之衆莫不笑之馬超破蘇氏塢塢中有駿馬百餘疋自超巳下俱爭取肥好者而將軍龐恩獨取一騧馬形觀旣醜衆亦笑之其後劉備奔於荆州馬超戰於渭南逸足電發追不可逮衆乃服焉傳玄馳射馬賦曰耳小易使鼻}
  - {type: variant, offset: 4620, length: 6, content: 道子高適趙謂, krp: 勢怒來徃若鷹鷂超騰如逸虎劉琬馬賦曰吾有駿馬名曰騏雄}
