  - {type: variant, offset: 3275, length: 0, content: '', SBCK: 酒噀之皆成好馬鞍勒全耳志怪集曰孫弘常自云見􅀑神與其言語委曲衆未之信鎭西將軍謝尚常所乗馬忽􅁀死會弘詣尚尚愛惜至甚弘謂尚曰我爲公活馬何如尚常不信􅀪荅曰卿若能令此馬更生者卿真實通神矣􅀪於是便下床去良乆還語尚曰廟神愛樂君馬故耳向我詣神請之􅀄殊不許後乃見聽馬即便活尚時甚不信怪其所言須􅁷其馬忽從門外走還衆咸見之莫不驚惋旣至馬屍應時能動有頃奮迅呼鳴尚於是歎息述異記曰東平畢衆寳家在彭城有一􅍡馬甚快常乗岀入至所愛惜宋大明六年衆寳夜夢見其亡兄衆慶曰吾有戎役方置艱危而無得快馬汝可以􅍡馬見與衆寳許諾旣􅁴呼同􅀫客􅀃所夢始畢仍聞馬倒聲遣人視之裁餘氣息􅃺如中惡衆寳心}
