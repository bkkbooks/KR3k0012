  - {type: variant, offset: 3278, length: 2, content: 與驥, SBCK: 以相還别更覔也至曉馬活食時復常續搜神記曰趙固常乗一疋赤馬以征戰甚所愛重常所繫㸔齋前忽腹脹少時死郭璞從北過因徃詣之門吏云將軍將馬今死甚愛惜今盛懊惋景純使語門吏云入通道吾能活此馬則必見我門吏聞驚喜即啓固固踊躍令門吏走迎之始交寒温便問卿能活我馬不璞曰馬可活耳固忻喜即問須何方術璞云得卿同心健兒二三十人皆令持長竹竿於此東行三十里當有丘陵林樹􅃺若社廟有此者便以竿攪擾打拍之當得一物便急持歸旣得此物馬便活矣於是命左右驍勇之士五十人使去果如璞言得大藂林有一物似猴而非走岀人共逐得便抱持歸入門此物遥見死馬便跳梁欲徃璞令放之此物便自走徃馬頭間嘘吸其鼻良乆馬即起噴鼻奮迅鳴喚便不復見此物固厚資給璞得過江靈􅄦志曰陳安爲河間王顒給使甚壯健常樂一馬駿駃非常後馬死􅀟赤蛇岀其鼻列異記曰胡司􅀠校尉上黨鮑子都少時舉上計於道遇一書生卒得心痛子都下車爲按摩奄忽不知姓字有素書一卷銀十餅即賣一餅以資殯殮其餘以枕之素書着腹上埋之謂曰子若魂靈有知當令子家知子在此末至京師有􅍡馬隨之唯子都得近子都歸行失道遇一關内侯家住􅀫侯問曰君何以致此馬子都因􅀃之侯乃驚愕曰此吾兒也侯迎喪開棺視銀書如言侯乃舉送詣闕上薦子都辟公府侍御史䂊州牧司􅀠校尉至子永孫昱}
