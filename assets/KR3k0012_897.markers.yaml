  - {type: variant, offset: 3254, length: 1, content: 士, SBCK: 其成騏􅂹者習之故也愽物志曰穢貃國南與辰韓北與句麗沃沮接東窮大海海中岀班魚皮陸岀文豹又出果下馬髙三尺漢時獻之駕輦車正始六年樂浪太守劉茂帶方太守弓遵領東穢屬勾麗伐之舉邑降􅀶物志曰唐公有驌驦項羽有騅馬華陽國志曰元馬日}
