  - {type: variant, offset: 3776, length: 0, content: '', WYG: 東方朔遊吉雲之地越扶桑之東得神馬一疋髙九尺股裏有旋毛如日月之状如月者夜光如日者晝光毛隨四時之變漢朝之馬見之即垂頭振毛一國衆獸見皆避之帝問東方朔是何獸也朔曰昔西王母乘靈光之輦以適東王公之舎税此馬於芝田及食芝草王公怒棄馬於清津}
  - {type: page-break, offset: 3776, content: '', id: KR3k0012_WYG_897-5b, image: WYG0901/WYG0901-0030d.png}
  - {type: variant, offset: 3776, length: 0, content: '', krp: 東方朔遊吉雲之地越扶桑之東得䄂馬一疋髙九尺股裏有旋毛如日月之狀如月者夜光如日者晝光毛色隨四時之變漢朝之馬見之即垂頭振毛一國衆獸見皆避之帝問東方朔是何獸也朔曰昔西王母乗靈光之輦以適東王公之舎稅此馬於芝田及食芝草王公怒弃馬於清津}
  - {type: variant, offset: 3777, length: 7, content: 下有道飛黃服皁, WYG: 岸臣至王公之壇因騎而返繞日三匝此馬入漢闗闗猶未掩臣於馬上睡眠不覺遂至帝曰其為名云何朔曰因事為名曰步景抱朴子曰韓子治嘗以地黄甘草哺五十嵗老馬以生三駒又百三十嵗乃死}
  - {type: variant, offset: 3777, length: 4, content: 下有道飛, krp: 岸臣至王公之壇因騎而返繞日三匝此馬入漢關關猶未掩臣於馬上睡眠不覺遂至帝曰其馬名云何朔曰因事爲名則歩景抱朴子曰韓子治甞以地}
