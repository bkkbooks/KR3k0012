  - {type: variant, offset: 4081, length: 162, content: 為草駒之時跳躍揚蹄翹尾而走人不能制齕咋足以噆肌碎骨蹶蹄足以破盧陷匈噆罕也及至圉人擾之良御教之掩以衡扼連以轡銜則雖歷險超塹弗敢辭也故其馬之不可化其可駕御教之所為也馬聾蟲聾蟲無知也而可以通氣志猶待教而成又況人乎又曰夫待腰褭飛菟而駕之則世莫乘車矣腰褭飛菟皆行萬里其行若飛因曰飛菟也待西施落纂而為妃則終身不蒙矣又曰日之行也不見其移也, krp: 有}
  - {type: variant, offset: 4082, length: 1, content: 草, WYG: 人駕乘者非樂負千鈞之重行千里之險鞭策痛矣桓公世論曰朝鮮之馬被鬛踶齧能使其成騏驥者習之故也博物志曰穢貊國南與辰韓北與句麗沃沮接東窮大海海中出斑魚皮陸出文豹又出果下馬高三尺漢時獻之駕出輦車正始六年樂浪太守劉茂帶方太守龔遵領東穢屬句麗伐之舉邑降之博物志曰唐公有驌驦項羽有騅馬華陽國志曰天馬日行千里死於蜀今天馬冡是也縣有天馬祠馬牧山下或産駿}
