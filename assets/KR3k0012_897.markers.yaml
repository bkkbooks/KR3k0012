  - {type: variant, offset: 3786, length: 7, content: 黃帝時飛黃服皁, WYG: 李南乘赤馬行道逢他人乘白馬者白馬先鳴於南赤馬鳴應之南謂従者曰彼馬言汝今當見一黄馬左目盲者是吾子可為使駃行相及従者不信行二里逢所乘黄馬而左目盲南之馬先鳴而盲馬應之問其子果向白馬子}
  - {type: variant, offset: 3786, length: 0, content: '', krp: 李南乗赤馬行道逢他人乗白馬者白馬先鳴而南赤馬鳴應之南謂從者曰彼馬言汝今當見一}
  - {type: variant, offset: 3787, length: 3, content: 帝時飛, krp: 馬左目盲者是吾子可爲告使駛行相及從者不信行二里所果逢}
