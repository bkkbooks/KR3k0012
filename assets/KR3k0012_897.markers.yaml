  - {type: variant, offset: 3266, length: 2, content: 凡為, krp: 希驥之馬亦驥之乗也希顔之人亦顔之徒也桓譚新諭曰顔淵所以命短者慕孔子所以傷其年也若庸馬良馬相追至暮共列宿所良馬鳴食如故庸馬垂頭不復食何異顔淵與孔丘優劣又曰衛后園有送塟時乗輿馬十疋吏卒養視}
