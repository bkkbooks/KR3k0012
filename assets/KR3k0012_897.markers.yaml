  - {type: variant, offset: 4149, length: 0, content: '', WYG: 莫不驚惋既至馬屍應時能動有頃奮跳呼鳴尚於是歎息述異記曰東平畢衆寶家在彭城有一駿馬甚快常乘出入至所愛惜宋大明六年衆寶夜夣見其亡兄衆慶曰吾有戎役方置艱危而無得快馬汝可以驄馬見與衆寶許之既覺呼同宿客説所夣始畢忽聞馬倒聲遣人視之裁息狀如中惡衆寶心知其故為試治療向晨馬死衆寶還卧如欲眠聞衆慶語云向聊求馬汝治䕶至將必惜之今以相還别更覔也至曉馬活食時復常續捜神記曰趙固常乘一疋赤馬以征戰甚所愛重常繫於齋前忽腹脹少時死郭璞従北過因徃詣之門吏云將軍好馬甚愛惜今死極其懊惋景純便語門吏云入通道吾能活此馬則必見我門吏聞之驚喜即啟固固踴躍令門吏走迎之始交寒溫便問卿能活我馬乎璞曰馬可活固忻喜即問須何方術璞云得卿同心健兒二三十人皆令持長竿於此東行三十里當有丘陵林樹状若社廟有此者便以竹竿攪擾打拍之當得一物便急持歸既得此物馬便活矣於是左右驍勇之士五十人使去果如璞言得大藂林有一物似猴而非走出人共逐得便抱持歸入門此物遥見死馬便跳梁欲徃璞令放之此物便自走徃馬頭間嘘吸其鼻良久馬即起噴鼻奮迅鳴喚便不復見此物固厚資給璞得過江左靈異志曰陳安為河間王顒給使甚壮健常樂一馬駿駃非常後馬死雙赤蛇出其鼻列異記曰故司𨽻校尉上黨鮑子都少時舉上計於道路遇一書生卒得心痛子都下車為按摩奄忽而卒不知姓字有素書一卷銀十餅即賣一餅以資殯殮其餘以枕之素書著腹上埋之謂曰子若魂靈有知當令子家知子在此未至京師有駿馬隨之唯子都得近子都歸行失道遇一關内侯家住宿侯曰君何以致此馬子都因説之侯乃驚愕曰此吾兒也侯迎開棺視銀書如言侯乃舉送詣闕上薦子都辟公府侍御史豫州牧司𨽻校尉至子永孫昱俱為司𨽻其在公皆復乘驄馬故京師歌之曰鮑氏驄三入司𨽻再入公馬雖疲行步工傅𤣥乘輿馬賦曰徃日劉備之初降也太祖賜之驄馬使自至廐選之歴名馬以百數莫可意者次至下廐有的顱馬委棄莫視痩悴骨立劉備撫而取之衆莫不笑之馬超破蘇氏塢塢中有駿馬百餘疋自超已下俱争取肥好者而將軍龎思獨取一騧馬形觀既醜衆亦笑之其後劉備奔於荆州馬超戰於渭南逸足電發追}
