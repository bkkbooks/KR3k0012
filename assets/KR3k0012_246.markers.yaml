  - {type: variant, offset: 8, length: 2, content: 賓客, SBCK: 左右賛善大夫太子洗馬太子司議郎太子中舎人太子舎人太子通事舎人太子左右賛善大夫六典曰左賛善大夫掌翊賛太子以䂓諷也皇太子出入動静茍非其德義則必陳古以箴焉右賛善大夫掌如其左凡皇太子朝宫臣則列於右階之下唐書曰貞元十六年以山人崔􅇗爲右賛善大夫充太子侍直新名也太子洗馬六典曰洗馬掌四庫圖籍繕冩刋緝之事立正夲副夲以備供進凢天下之圖書上於東宫者皆受而藏之國語曰夫差爲勾踐洗馬續漢書百官志曰洗馬貟十六人秩六百石職如謁者太子出則當直一人在前導威儀盖洗馬之義也漢書曰司馬安少與汲黯爲太子洗馬安爲人􅀷巧善官四至九卿魏略曰顔斐字文林以才學爲太子洗馬晉書曰江統爲洗馬太子頗好遊宴或闕朝侍統以五事諌之又曰解系兄弟少連叔連各清身㓗巳仕皆爲洗馬梁書曰􅁃於陵拜太子洗馬舊東宫官屬通爲清選洗馬掌文翰尤其清者近丗用人皆取甲族有才望者時於陵與周捨並擢充職髙祖曰官以人而清豈限以甲族時論以爲美唐書曰李綱字文紀隋開皇末爲太子洗馬皇太子勇甞以歳首宴宫臣左庶子唐令則自請奏琵琶又歌武媚娘之曲綱白勇曰令則身任宫卿職當調護乃於宴座自此倡優進􅁋声穢親聽事􅀂上聞罪在不測豈不累於殿下臣請遽正其罪勇曰我欲爲樂耳君勿多事綱趨而出及勇廢黜文帝召東宫官屬切讓之無敢對者綱對曰今日之事乃陛下之過非太子罪也太子才非上品性是常人􅀂得賢明之士輔道之足堪継嗣皇業方今多士盈朝當擇賢居任奈何以絃歌鷹犬之才日在其側致令至此乃陛下誡道不足豈太子之罪耶辝氣凛然左右皆爲之失色文帝曰令汝在彼豈非擇人文士傳曰江統字應元召􅀘洗馬毎有疑滯大事章表奏議輙爲同官所推常爲之作草韓子曰勾踐入宦於吴執干戈爲吴王洗馬故能殺夫差於姑蘇傅咸申懷賦序曰余自無施謬爲衆論所許􅀘太子洗馬布不􅁛職意常黙然傅咸感別賦序曰有人魯庶叔雅量弘濟思心䆳逺余自少與之相長情相親愛有如同生其後遷太子洗馬俄而謬􅂪朝私猥忝斯職雖懼不􅁛而喜得與此子同班共事天下之遇未有􅀂此周旋三載魯生遷尚書郎雖別不逺而情甚悵恨退作兹賦云尓徐邈問玉珉曰漢法制洗馬冠髙山冠職如謁者中朝新制洗馬進賢冠出則在馬前清道故曰洗馬太子司議郎六典曰司議郎掌侍從䂓諌駮正啓奏凡皇太子出入朝謁從享及釋奠於先聖先師講學齒曺撫軍監國之命可傳於史􅁽者並録爲記注􅀂宫坊之内祥瑞災眚宫長除拜薨卒亦皆記之毎歳終則送史館唐書曰敬播以撰實録功遷太子司議郎時此官􅀄置極爲清望中書令馬周歎曰所恨資品望髙不獲歴居此職又曰貞觀中皇太子上表曰臣聞直筆記言諌司箴過盖絶代之通訓乃垂􅁉於當今臣以睱日遐覽前志竊惟古之養德咸有史官所以􅀘闕拾遺爲砥爲礪彰善癉惡如切如磋譬立准而端形猶琢玉而成器故大戴禮曰太子免於保􅀓之嚴則有同過之史漢書云太子旣冠成人乃有記過之史是知􅁎誦登兩肇建此官劉啓昇儲憲章斯義故能道温玉􅁉聲聞宸宫上有慰於皇情下無􅃜於物議臣地居問寢齒在横經越以㓜年夙􅂪天㢡趨紫宸以遵禮仰黄屋以承歡怙聖慈而益驕恃鍾心而取恣肅恭馳道恐或乖方晨昬視膳慮有違舛􅂪泉始道必俟後乗之䂓離光未融懼寢前星之耀是以夙興夜寐内省非憂延首讜言兾匡童昧而魏晉巳降不置此貟杜絶箴䂓何期甚謬伏惟陛下窮神稽古尚擇芻蕘之言玄覽文明猶開登石之路况臣冲藐未渉藝文出自深宫便親監撫之重罕從皷篋疇識絃誦之冝一德有􅄽貽憂睿念三朝登餕何以勝任所以冐敢陳聞請遵故實願開史職故司箴誡是使綿載墜典復在聖朝資此正人少匡不逮於是門下坊置太子司議郎四人妙選名行之士爲之正六品上掌侍從䂓諌駮正啓奏并録東宫記注分判坊事又曰元讓有孝行則天朝中宗居東宫復徴拜司議郎及謁見則天謂曰卿旣孝於家必能忠於國今授此職湏知朕意冝以孝道輔我兒也又曰王元感濮州鄄城人也長安三年上表其所撰尚書糺謬十卷春秋振滯二十卷禮記繩愆三十卷并所注孝經史記藁草請官給􅁓筆寫上秘閣詔曰王元感質性温敏􅀶聞強記手不釋卷老而弥篤掎前逹之失究先聖之旨是謂儒宗不可多得可太子司議郎兼崇賢館學士魏知古甞稱其所撰書曰信可謂五經之指南也太子中舎人晉書曰杜錫預之子也累遷太子中舎人性亮直忠烈屢諌􅉖懷太子言辭懇切太子患之後置針著錫常所坐處氊中刺足流血他日太子問錫向者何事錫對醉不知太子詰之曰君喜責人何自作過也晉中興書曰顧榮清操南土秀望累遷太子中舎人又曰顧榮字彦先時吴朝士人入洛者惟陸機陸雲及榮三人而機雲雖有才藻清望不及榮也選􅀘吴王郎中令累遷太子中舎人太子舎人}
