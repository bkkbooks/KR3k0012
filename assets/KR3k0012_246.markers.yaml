  - {type: variant, offset: 735, length: 1382, content: 立對仗彈之弁於金吾待罪數刻特釋放舊制太子詹事班次太常宗正卿之下貞元三年御史中丞竇參敘定班位移詹事在河南太原尹之下弁乃引舊班制立臺官詰之仍紿云已白宰相請依舊故為儒立彈之又曰龍朔二年改詹事為端尹詹事府為端尹府王珉荅徐邈書曰詹事彈一官如尚書左丞矣太子少詹事唐書曰張行成轉太子少詹事太宗東征皇太子於定州監國即行成本邑也太子謂行成曰今者送公衣錦還鄉於是令有司祀其先人墓太子中庶子漢書百官表曰太子中庶子職侍中漢書曰王啇字子威𣵠郡蠡吾人啇少為太子中庶子以肅敬見稱又曰歐陽地餘字長賓為中庶子授皇太子經又曰馮野王通詩以父任為太子中庶子魏志曰鮑勛字叔業清白有高節知名當世為中庶子在東宮正色不撓蜀志曰後主立太子璿以霍弋為中庶子璿好馳射出入無度弋援引古事盡言規諫甚得切磋之體吳志曰孫登為太子時太傅張溫言於權曰夫中庶子宮㝡親密切問近對宜用俊彥於是乃用陳表等為中庶子後又以庶子禮拘復令勑中侍坐又曰羊衜音道初為中庶子年二十時廷尉監隱蕃結交豪傑自衛將軍全琮等皆傾心敬待惟衜及宣詔郎楊迪拒絕不與通時人怪之而蕃後叛逆眾乃服之晉書曰安平王孚初為魏太子中庶子魏武帝崩太子號哭過甚孚諫曰大行晏駕天下恃殿下為命當上為宗廟下為萬國奈何効疋夫之孝太子良久乃止曰卿言是也時群臣初聞帝崩相聚號哭無復行列孚厲聲於朝曰今大行晏駕天下震動當早拜嗣君以鎮海內而但哭耶孚與尚書和洽奉太子以即位是為文帝又曰溫嶠為中庶子獻侍臣箴甚見補益又曰王恂啟以桓謙為中庶子曰東宮之選中庶子管揔門下尤不可不得其才也晉起居注曰武帝咸寧元年詔曰男子皇甫謐沉靜履素守學好古與流俗異趣其以謐為太子中庶子晉中興書曰殷仲堪少好學能清言善屬文人士咸欽愛之以孝行稱烈宗聞其名召為太子中庶子甚相知悅又曰溫嶠拜太子中庶子嶠在東宮特見嘉寵僚屬莫與為比嶠與阮放等共勸太子遊談老莊不教以經史太子甚愛之數規諫諷議又曰肅宗之在東宮孔演領太子中庶子于時中興肇構庶事草創演經學淵博該識舊典朝儀軌制多取正焉由是元明二帝並親愛之沈約宋書曰中庶子漢置古者世祿卿大夫之子即為副倅謂之國子天子諸侯世子必有庶子官以掌教之齊書曰袁粲言於帝曰臣觀張緒有正始遺風宜為宮職復轉中庶子陳書曰王瑒父冲嘗為瑒辭領中庶子世祖顧謂冲曰所以久留瑒於承華正欲使太子微有瑒風法耳唐書官品志曰中庶子四人功高者一人為祭酒行則負璽前後部護駕陶氏家傳曰侃遷太子中庶子君少而好學善談玄理尤明詩易以孝行聞于時儲選殊難其人特召君焉山公啟事曰中庶子鈌宜得俊茂者以濟陰太守留儼城陽太守石崇參選晉齊王攸與山濤書曰太子中庶子東宮顯職加侍接左右誠宜得篤粹有行撿之人必允眾望太子左右庶子六典曰左庶子之職掌侍從贊相駮正啟奏中允為之二凡皇太子從祀朝會則版奏外辦中嚴入則解嚴焉凡令書下左春坊則與中允司議郎等覆啟以畫諾右庶子之職掌侍從左右獻納啟奏中舍人為之二凡皇太子監國於宮內下令書太子親畫日至春坊則宣傳之禮記曰古者天子有庶子之官職諸侯卿大夫之庶子掌其戒令與其教理別其等正其位國有大事則帥國子而致於太子唯所用之若有甲兵事則授之車甲合其卒伍置于有司漢書曰成帝以傅喜有志行為太子庶子魏志曰鮑勛字叔業為庶子在東宮正色不撓魏氏春秋曰阮渾字長威籍之子也少知名為太子庶子吳志曰華融字德蕤廣陵江都人祖父避亂居山陰時皇象亦寓居山陰吳郡張溫來就象學欲得所舍或告溫曰有華德蕤者雖年少美有令志可舍也溫遂止融家朝夕談講俄而溫為選部尚書乃推擢融為太子庶子遂知名顯達晉書曰鄭默, SBCK: 術梁}
