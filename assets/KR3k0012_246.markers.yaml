  - {type: variant, offset: 8, length: 2, content: 賓客, WYG: 左右贊善大夫太子洗馬太子司議郎太子中舍人太子舍人太子通事舎人太子左右贊善大夫六典曰左贊善大夫掌翊贊太子以規諷也皇太子出入動静苟非其徳義則必陳古以箴焉右贊善大夫掌如其左凡皇太子朝宫臣則列於右階之下唐書曰貞元十六年以山人崔􅇗為右贊善大夫充太子侍直新名也太子洗馬六典曰洗馬掌四庫圗籍繕寫刋緝之事立正本副本以備供進凡天下之圗書上於東宫者皆受而藏之國語曰勾踐為夫差洗馬續漢書百官志曰洗馬員十六人秩六百石如謁者太子出當直一人在前導威儀葢洗馬之義也漢書曰司馬安少與汲黯為太子洗馬安深巧善辯四至九卿魏畧曰顔裴字文林以才學為太子洗馬晉書曰江統為洗馬太子頗好逰宴或闕朝侍統以五事諫之又曰解系兄弟少連叔連各清身潔已仕皆為洗馬梁書曰庾於陵拜太子洗馬舊東宫官屬通為清選洗馬掌文院尤其清者近世用人皆取甲族有才望者時於陵與周捨並擢充職髙祖曰官以人而清豈限以甲族時論以為美唐書曰李綱字文紀隋開皇末為太子洗馬皇太子勇嘗以嵗首宴宫臣左庶子唐令則自請奏琵琶又歌武媚娘之曲綱白勇曰令則身任公卿職當調䕶兹於宴坐自比倡優進淫聲穢視聽事若上聞罪在不測豈不累於殿下臣請遽正其罪勇曰我欲為樂耳君勿多事綱趨而出及勇廢黜文帝召東宫官屬切譲之無敢對者綱對曰今日之事乃陛下之過非太子罪也太子才非上品性是常人若得賢明之士輔導足堪繼嗣皇業方今多士盈朝當擇賢居任奈何以絃歌鷹犬之才日在其側致令至此乃陛下之過豈太子之罪耶辭氣凛然左右皆為之失色文帝曰令汝在彼豈非擇人文士𫝊曰江統字應元召補洗馬每有疑滯大事章表奏議輒為同官所推常為之作草韓子曰勾踐入官於吳執干戈為呉王洗馬故能殺夫差於姑蘇傅咸申懐賦序曰余自無具謬為衆論所許補太子洗馬才不稱職而意常黙然傅咸感别賦序曰友人魯庶叔雅量𢎞濟思心􅃉逺余自少與之相長情相親愛有如同生其後選太子洗馬俄而謬蒙朝私猥忝斯職雖懼不稱而喜得與此子同班共事天下之遇未有若此周旋三載魯生遷尚書郎雖别不遠而情甚悵恨退作兹賦云爾徐邈問王珉曰漢法制洗馬冠髙山冠職如謁者中朝新制洗馬進賢冠出則在馬前清道故曰洗馬太子司議郎六典曰司議郎掌侍從規諫駮正啓奏凡皇太子出入朝謁從享及釋奠於先聖先師講學齒胄撫軍監國之命可𫝊於史冊者並録為記注若宫坊之内祥瑞災眚宫長除拜薨卒亦皆記之每嵗終則送史館唐書曰敬播以撰實録功遷太子司議郎時此官初置極為清望中書令馬周歎曰所恨資品望髙不獲厯居此職又曰貞觀中皇太子上表曰臣聞直筆記言諫司箴過葢絶代之通訓乃垂裕於當今臣以暇日遐覽前志竊惟古之養徳咸有史官所以補闕拾遺為砥為礪彰善癉惡如切如磋譬立凖而端形猶琢玊而成器故大戴禮曰太子免於保傅之嚴則有司過之史漢書云太子既冠成人乃有記過之史是以姬誦登兩肇建此官劉啓昇儲憲章斯義故能道温玊裕聲聞宸宫上有慰於皇情下無􅉻於物議臣地居問寝齒在横經越以㓜年夙蒙天奨趨紫宸以遵禮仰黄屋以承歡怙聖慈而益驕恃鍾心而取恣肅恭馳道恐或乖方晨昏視膳慮有違舛蒙泉始達必俟後乗之規離光未融懼寝前星之曜是以夙興夜寐内省惟憂延首讜言冀匡童昧而魏晉已降不置此貟杜絶箴規何其甚謬伏惟陛下窮神稽古尚擇芻蕘之言𤣥覽文明猶開登石之路况臣冲藐未渉藝文出自深宫便親監撫之重罕從鼓箧疇識絃誦之宜一徳有慚貽憂睿念三朝登俊何以勝任所以冒敢陳聞請遵故實願開史職故司箴誡是使綿載墜典復在聖朝資此正人少建不逮於是門下坊置太子司議郎四人妙選名行之士為之正六品上掌侍從規諫駮正啓奏并録東宫記注分判坊事又曰元譲有孝行則天朝中宗居東宫復徵拜司議郎及謁見則天謂曰卿既孝於家必能忠於國今授此職須知朕意宜以孝道輔我兒也又曰王元感濮州鄄城人也長安三年上表其所撰尚書糾繆十卷春秋振滯二十卷禮記繩愆三十卷并所注孝經史記藁草請官給紙筆寫上秘閣詔曰王元感質性温敏博聞強記手不釋卷老而彌篤掎前達之失究先聖之㫖是謂儒宗不可多得可授太子司議郎兼崇賢舘學士魏知古嘗稱其所撰書曰信可謂五經之指南也太子中舍人晉書曰杜錫預之子也累遷太子中舍人性亮直忠烈屢諫愍懐太子言辭懇切太子患之後置針著錫常所坐處氊中刺足流血他日太子問錫曰向者何事錫對醉不知太子詰之曰君喜責人何自作過也晉中興書曰顧榮清操南士秀望累遷太子中舍人又曰顧榮字彦先時吳朝士人入洛者惟陸機陸雲及榮三人而機雲雖有才藻清望不及榮也選補呉王郎中令累遷太子中舍人太子舍人}
