  - {type: variant, offset: 2179, length: 854, content: 年詔尚書郎王琛每所陳論意在忠讜其以為太子庶子隋書曰劉行本為太子左庶子時左衛率長史夏侯福為太子所昵嘗於閤內與太子戲福大笑聲聞於外行本時在閤下聞之待其出行本數之曰殿下寬容賜汝顏色汝何物小人敢為褻慢付執法者治之數日太子為福致請乃釋之隋書曰劉行本為左庶子太子嘗得良馬令夏侯福乘而觀之太子甚悅因欲令行本乘行本不從正色而進曰至尊置臣於庶子之位者欲令輔導殿下以正道非為殿下作弄臣也太子慚而止又曰劉行本拜太子左庶子領治書如故皇太子虛襟敬憚時唐令則亦為左庶子太子昵狎之每令以絃歌教內人行本責之曰庶子當匡太子以正道何有嬖昵房帷之間哉令則甚慚而不能改又曰劉行本為左庶子卒後而太子勇廢文帝曰若使劉行本在勇當不及於此唐書官品志曰庶子四人掌侍從左右獻納得失高功者一人與舍人共掌其坊之禁令又曰貞觀中詔曰皇太子與百官書䟽未有制式近代已來例皆名白無以別貴賤今凡處分論事之書皇太子並畫令右庶宜已下署名宣奉行書案畫日其餘與諸子親及師傅等書不在此限又曰于志寧為太子右庶子撰諫苑二十卷以進於太子承乾也又曰杜正倫為太子左庶子太宗謂曰國之儲副自古所重必擇善人為之輔佐今太子年在幼冲志意未定朕若朝夕見之可得隨事誡約今既委以監國不在目前知卿志懷貞愨能執直道故輟卿於朕以匡太子宜知委任輕重也又曰太宗謂太子左庶子于志寧曰古者太子既生卜士負之即置輔弼昔成王幼小周邵為傅日聞正道習以成性今皇太子既幼卿當輔之正道無使邪僻開其心勉之無怠當稱所委官賞可不次而得也又曰李百藥授太子右庶子時太子頗留意典墳然閑讌之後嬉戲過度百藥作贊道賦以諷焉詞多不載太宗見而遣使謂百藥曰朕於皇太子處見卿所獻賦悉述古來儲二事以誡太子甚是典要朕選卿以輔弼太子正為此事大稱所委但須善始令終耳因賜綵物三百叚又曰李義琰為太子右庶子同中書門下三品義琰愽學多識典故上每有顧問言多切直章懷太子之廢也上慰勉官寮盡捨罪令復其位薛元超等皆舞蹈謝恩義琰獨引罪涕泣時論美之山濤啟事曰東宮官屬宜得高茂者庶子賈模𡙇宜補劉粹周蔚惟加所裁詔用粹環濟要略曰庶子主宮中并諸吏之適子及支庶在版籍者也行其秩序作其徒役授八次八舍之職以徼候, SBCK: 六}
  - {type: variant, offset: 2179, length: 854, content: 年詔尚書郎王琛每所陳論意在忠讜其以為太子庶子隋書曰劉行本為太子左庶子時左衛率長史夏侯福為太子所昵嘗於閤內與太子戲福大笑聲聞於外行本時在閤下聞之待其出行本數之曰殿下寬容賜汝顏色汝何物小人敢為褻慢付執法者治之數日太子為福致請乃釋之隋書曰劉行本為左庶子太子嘗得良馬令夏侯福乘而觀之太子甚悅因欲令行本乘行本不從正色而進曰至尊置臣於庶子之位者欲令輔導殿下以正道非為殿下作弄臣也太子慚而止又曰劉行本拜太子左庶子領治書如故皇太子虛襟敬憚時唐令則亦為左庶子太子昵狎之每令以絃歌教內人行本責之曰庶子當匡太子以正道何有嬖昵房帷之間哉令則甚慚而不能改又曰劉行本為左庶子卒後而太子勇廢文帝曰若使劉行本在勇當不及於此唐書官品志曰庶子四人掌侍從左右獻納得失高功者一人與舍人共掌其坊之禁令又曰貞觀中詔曰皇太子與百官書䟽未有制式近代已來例皆名白無以別貴賤今凡處分論事之書皇太子並畫令右庶宜已下署名宣奉行書案畫日其餘與諸子親及師傅等書不在此限又曰于志寧為太子右庶子撰諫苑二十卷以進於太子承乾也又曰杜正倫為太子左庶子太宗謂曰國之儲副自古所重必擇善人為之輔佐今太子年在幼冲志意未定朕若朝夕見之可得隨事誡約今既委以監國不在目前知卿志懷貞愨能執直道故輟卿於朕以匡太子宜知委任輕重也又曰太宗謂太子左庶子于志寧曰古者太子既生卜士負之即置輔弼昔成王幼小周邵為傅日聞正道習以成性今皇太子既幼卿當輔之正道無使邪僻開其心勉之無怠當稱所委官賞可不次而得也又曰李百藥授太子右庶子時太子頗留意典墳然閑讌之後嬉戲過度百藥作贊道賦以諷焉詞多不載太宗見而遣使謂百藥曰朕於皇太子處見卿所獻賦悉述古來儲二事以誡太子甚是典要朕選卿以輔弼太子正為此事大稱所委但須善始令終耳因賜綵物三百叚又曰李義琰為太子右庶子同中書門下三品義琰愽學多識典故上每有顧問言多切直章懷太子之廢也上慰勉官寮盡捨罪令復其位薛元超等皆舞蹈謝恩義琰獨引罪涕泣時論美之山濤啟事曰東宮官屬宜得高茂者庶子賈模𡙇宜補劉粹周蔚惟加所裁詔用粹環濟要略曰庶子主宮中并諸吏之適子及支庶在版籍者也行其秩序作其徒役授八次八舍之職以徼候, WYG: 六}
