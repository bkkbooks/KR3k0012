  - {type: variant, offset: 127, length: 490, content: 貳凡太子六官之典制皆視其事而承受焉俗說曰江夷為右僕射主上欲用其領詹事語王淮卿可覔比例淮對曰臣當出外尋訪淮後見主上問近所道事卿已得比例未淮曰唯謝琰右僕射領詹事琰即謝公之子恐夷非其例事遂不行應劭漢官儀曰詹事秦官詹省也給也秩比二千石漢書曰竇嬰字王孫孝景即位為詹事帝弟梁孝王母竇太后愛之孝王朝酒酣上從容曰千秋萬歲後傳王太后歡嬰引巵酒進上曰天下者高帝天下父子相傳漢之約也上何以得傳梁王太后由是憎嬰又曰孔光父霸字次孺宣帝時以授太子經為詹事又曰詹事掌皇后太子家有丞屬諸官皆屬焉成帝鴻嘉三年帝省詹事屬大長秋晉書曰卞壺為詹事世稱卞壺裁斷切直敦實忠於事上也晉起居注曰武帝以王恭丹陽尹領詹事恭讓表曰今皇儲始建四方是式總司之任崇替所由宜妙簡才賢盡一時之勝豈臣最庸所可叨忝晉公卿禮秩曰太始中立詹事掌宮事沈約宋書曰詹事一人初領官屬成帝時悉屬少傅魏氏置詹事揔眾職晉初又屬二傅咸寧復置詹事齊職儀曰詹事品第三茂陵書秩二千石銀章青綬局擬尚書令位視領護將軍陳書曰後主欲以江揔為太子詹事令管記陸瑜言之於孔奐奐謂瑜曰江有潘陸之華而無園綺之實輔弼儲宮竊有所難瑜具以白後主後深以為恨乃自言於高宗高宗將許之奐乃奏曰江揔文華之人今, SBCK: 􅀂}
