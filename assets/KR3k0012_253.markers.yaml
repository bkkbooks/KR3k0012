  - {type: variant, offset: 1012, length: 10, content: 南尹永初二年夏旱久禱, WYG: 内郡丞時裴叔則為河内郡知之為裴所伏後為侍御史隋書曰張湏陁為齊郡丞屬嵗饑榖米湧貴湏陁將開倉賑給官屬咸曰待詔勑不可擅與湏陁曰今帝在逺遣使徃來必淹嵗序百姓有倒懸之急如待報至當委之溝壑矣吾若以此獲罪死}
