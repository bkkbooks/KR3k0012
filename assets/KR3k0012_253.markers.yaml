  - {type: variant, offset: 1779, length: 2, content: 如曼, krp: 入門當路向堂朝拜府君益善}
  - {type: variant, offset: 1782, length: 844, content: 真率晉起居注曰武帝咸寧三年詔曰河南百郡之首其風教宜為遐邇所模以導齊之侍中奉車都尉王恂忠亮篤誠才兼外內明於治化其以恂為河南尹晉中興書云晉天興元年改丹陽內史為丹陽尹宋書劉秀之遷丹陽尹先是秀之從叔穆之為丹陽尹與子弟於廳事上飲宴秀之亦與焉廳事柱有一穿穆之謂子弟及秀之曰汝等試以栗遙擲此柱若能入穿後必得此郡穆之諸子並不能中唯秀之獨入焉唐書曰開元初改雍州長史為京兆尹揔理眾務又曰鄭珣瑜出為河南尹珣瑜既入境官吏以逼降延日珣瑜到即後於事乃送所獻馬齎印於路以例告珣瑜曰未上官不可遽有進獻及既上即過時矣遂不獻又曰郭英乂時嚴武卒元載薦英乂代之遂兼成都尹充劍南節度使英乂到成都肆行不軌無所忌憚玄宗舊宮置為道士觀內有玄宗鑄金真容及乘輿侍衛圖畫先是節度使每至皆先拜而後視事英乂以觀地有形勝乃入居之其真容及圖畫悉遭毀壞見者無不憤怒又曰英乂為成都尹頗恣狂蕩聚女人騎驢擊毬製鈿驢鞍及諸服用皆侈靡裝飾日費數萬以為笑樂未嘗問百姓間事人頗怨之又曰許孟容為京兆尹神策軍吏李昱假貸長安富人錢八千貫蒲三歲不償孟容遣吏收捕械繫剋日命還之曰不及其當死自興元已後禁軍有功又中貴之尤有渥恩者方得護軍故軍士日益橫府縣不能制孟容剛正不懼以法繩之一軍盡驚冤訴於上立命中使宣旨令送本軍孟容繫之不遣中使再至乃執奏曰臣誠知不奉詔當誅然臣職司輦轂合為陛下彈抑豪強錢未盡輸昱不可得上以其守正許之自此豪右歛迹威望大震又曰劉栖楚為京兆尹摧抑豪右不顧患難事無大小必設鉤鉅故時人重之或稱其機變往往有類於西漢時趙廣漢者又曰李傑為河南尹傑既勤於聽理每有訴列雖衢路當食無廢處斷由是官無留事人吏愛之先是河汴之間有梁公堰年久堰破江淮漕運不通傑奏調發汴鄭丁夫以濬之省功速就公私深以為利刻石水濱以紀其績又曰柳仲郢為河南尹以寬惠為政言事者以為不類京兆之政仲郢曰輦轂之下彈壓為先郡邑之治惠養為本何取類耶又曰蘇震為太常卿是歲東都耆老表乞行幸上重違其心選勤舊勳賢為之牧守遂以震為河南尹兼御史中丞仍充東都畿甸觀察使英雄記曰董卓廢少帝自公卿已下莫不卑下於卓唯京兆尹蓋勳長揖爭禮見者皆為失色李爕, krp: 鐘離意}
