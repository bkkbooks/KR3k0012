  - {type: variant, offset: 1428, length: 297, content: 時無赫赫之名使民久而後安者也又曰司馬芝子華為河南尹教群下曰蓋君設教不能使吏必不犯也吏能犯教而不能使君必不聞也夫設教而犯君之劣也犯教而聞吏之禍也君劣於上吏禍於下此政事所以不理也可不勉之哉於是下吏莫不自厲又曰劉馥字子靖出為河南尹散騎常侍應璩以書與子靖曰入作納言出臨京任富民之術日引月長王隱晉書曰樂廣字彥輔為河南尹故郡中前多怪後人皆於廊下郵傳中治事無敢在廳事者唯廣處之自若白戶自閉二子凱模等懾怖廣使掘牆孔得狸乃絕代者乃相承入止又曰庾純字謀甫太始六年詔曰河南大郡四方表則中書令庾純清粹忠正才紹治化其以純為河南尹又曰劉隗補丹陽尹雖在外而萬機秘密皆預聞之晉書曰羊曼為凡陽尹時朝士過江初拜官相飾供饌曼拜丹陽尹, krp: 徒跣行奉諸貴戚賔}
