  - {type: variant, offset: 1285, length: 142, content: 尹李勝毀常法以收一時之聲嘏立司馬之綱統裁劉氏之綱目以經緯之李氏所毀以漸補之郡有七百吏半非舊也河南俗黨五官椽功曹典選職皆授其本國人無用異邦人者嘏各舉其良而用之分官曹之職次考栲之其治以德教為本然持法有恒而不可犯見理識情獄訟不枉檟楚而得其實不為小惠有所薦達及大益於民事皆隱其端迹若不由己出故, krp: 督郵}
  - {type: variant, offset: 1295, length: 288, content: 之聲嘏立司馬之綱統裁劉氏之綱目以經緯之李氏所毀以漸補之郡有七百吏半非舊也河南俗黨五官椽功曹典選職皆授其本國人無用異邦人者嘏各舉其良而用之分官曹之職次考栲之其治以德教為本然持法有恒而不可犯見理識情獄訟不枉檟楚而得其實不為小惠有所薦達及大益於民事皆隱其端迹若不由己出故當時無赫赫之名使民久而後安者也又曰司馬芝子華為河南尹教群下曰蓋君設教不能使吏必不犯也吏能犯教而不能使君必不聞也夫設教而犯君之劣也犯教而聞吏之禍也君劣於上吏禍於下此政事所以不理也可不勉之哉於是下吏莫不自厲又曰劉馥字子靖出為河南尹散騎常侍應璩以書與子靖曰入作納言出臨京任富民之術日引月長王隱晉書曰樂廣字彥輔為河南尹故, SBCK: ''}
