  - {type: variant, offset: 5, length: 3, content: 尹春秋, SBCK: 一内史郡丞郡叅軍督郵内史史記曰汲黯字長孺公孫弘爲相乃上言曰右内史界部中多貴人宗室難治非素重臣不能任請徙黯爲内史數歳官事不廢漢書曰倪寛遷右内史寛旣治民勸農業表奏開六輔渠六輔謂京兆馮翊扶風河東河南河内也定水令以廣漑田收租稅時裁闊狹與民相假貸以故租多不入後有軍發右内史以負租課殿當免民聞皆恐失之大家牛車小家擔􅀒輸租襁屬不絶課更最上由此愈竒寛晉書曰孔季恭爲吴興内史吴興頻䘮太守言項羽神爲崇君居郡事竟無害也又曰王薈字敬文恬虚守靖不競榮利少歷清官除吏部郎侍中建威將軍呉國内史時年餞粟貴人多饑死薈以私米作饘粥以飴餓者所濟活甚衆梁書曰頋憲之爲衡陽内史先是郡境連歳疾疫者死者太半棺木尤貴悉裏以生席弃之路傍憲之下車分告屬縣求其親黨悉令殯葬其家人絶滅者憲之爲出公禄使綱紀營護之又土俗山民有病輙云先祖爲禍皆開冢剖棺水洗枯骨名爲除祟憲之曉諭爲陳生死之別事不相由風俗遂改時刺史王奐新至唯衡陽獨無訟者乃歎曰頋衡陽之化至矣又曰傅昭爲安成内史郡自宋巳來兵亂相接郡府舎稱凶毎昬旦聞人􅀑相觸在任者鮮以􅁻終及昭至有人夜見甲兵出曰傅公善人不可侵犯乃騰虚而去有頃風雨忽至飄郡㕔事入隍中自是郡遂無患咸以昭貞正所致又曰傅昭爲安成内史郡多猛獸爲害常乃命去檻穽猛獸竟不爲害又曰殷鈞字季和陳郡長平人也爲臨川内史鈞體多疾閉閤卧理而百姓化其德刼盗皆奔出境又曰伏暅爲永陽内史在郡清㓗政務安静郡人何貞秀等一百五十四人詣州言狀湘州刺史以聞詔勘有十五事爲吏人所懐帝善之隋書曰樊子蓋爲河南内史屢有治績文帝謂曰今爲公別造玉麟符以代銅獸也唐書曰王及善契丹作亂山東不安起授滑州刺史則天謂曰邊賊反叛卿雖疾閤可將妻子曰行三十里緩歩至彼與朕卧理此州以斷河路也因問朝廷得失及善備陳理亂之冝十餘道則天曰彼末事也此爲夲也卿不可行乃留拜内史郡丞漢書曰黄霸爲頴川郡守有郡丞老病聾督郵欲逐之覇曰許丞廉吏雖老尚能拜起送迎止頗重聽何傷其善􅂇之無失賢者意又曰黄覇爲河南太守丞霸爲人明察内敏又習文法爲丞處職當於法令太守甚任之吏民愛敬焉東觀漢記曰光武議靈臺所處上謂桓譚曰吾欲䜟决之何如譚黙然曰臣不讀䜟上問其故譚復言䜟非經上大怒曰桓譚非聖無法將下斬之譚叩頭流血良乆乃得解出爲六安郡丞意忽忽不樂病卒時年七十餘又曰趙典兄子温􅀄爲京兆郡丞歎曰大丈夫生當雄飛安能雌伏遂弃官而去後官至三公謝丞後漢書曰劉平爲濟陽郡丞太守劉育甚重之任以郡職漢名臣奏曰張禹奏曰案令丞相奏事司直持案長史將簿中二千石奏事皆與其丞合縁是以臣下各得盡心竭誠而事公明王隱晉書曰范晷字彦長南陽人僑居清河仕爲郡五官後爲河内郡丞時裴叔則爲河内郡知之爲裴所伏後爲侍御史隋書曰張湏陁爲齊郡丞屬歳饑􅂖米湧貴湏陁將開倉賑給官屬咸曰待詔勑不可擅與湏陁曰今帝在逺遣使徃來必掩歳序百姓有倒懸之急如待報至當委溝壑矣吾􅀂以此􅀗罪死無所恨先開倉而後上狀帝知之而不責也又曰王文同爲􅁪山郡丞有一人豪猾毎持長吏短前後守令咸憚之同下車聞其名召而數之因令左右剡木爲大撅埋於廷出尺餘四角各埋小撅令其露心於木撅上􅅞四支於小撅以捧毆其背應時潰爛郡中大駭吏人相視懾氣唐書官品志曰丹陽㑹稽吴郡吴興及萬户郡丞並六百石汝南先賢}
