  - {type: variant, offset: 3464, length: 0, content: '', WYG: 馬援為郡督郵送囚至司命府王莽置司命上公已下糺察囚有重罪援哀而縱之遂亡命北地遇赦因留牧畜又曰陳球為繁陽令時魏郡守諷縣求賄球不與太守怒撾督郵令逐球督郵不肯曰魏郡十五城獨繁陽有異政今逐之將致議於天下太守乃止司馬彪續漢書曰鍾離意仕郡為督郵縣亭長受民鷄酒府下記考之意封還記詣閤白見以春秋責重先内後外政化之本由近及逺宜先清府内且闊細微太守賢之謝承後漢書曰㑹稽謝夷吾字堯卿為西部督郵烏程長有罪太守第五倫使夷吾徃収之到縣入閤便大哭以三百錢為禮便歸倫問其故對曰三十日中當死故不収之至時果如其言又曰許慶字子伯家貧為督郵乘牛}
