  - {type: variant, offset: 392, length: 604, content: 卿皆服敞無威儀時罷朝會過走馬章臺街或曰在長安中安在章臺下街使御史驅自以便面拊馬又為婦畫眉長安中傳張京兆眉憮無大也孟康曰撫音詡北方人謂為妍有司以奏上問之對曰臣聞閨房之內夫婦之私有過於畫眉者上愛其能然不得大位為京兆尹九年與楊惲厚坐惲大逆誅又曰張敞冬為尹一日捕諸偷得數百人由是市無偷盜又曰王尊王章王駿並為京兆有名京師稱曰前有趙張後有三王後漢書曰袁安為河南尹政號嚴明然未曾以贓罪鞫人常稱曰凡學士者高則望宰相下則希牧守養人於聖世曰尹不忍為也聞之者感激自厲在職十年京師肅然名重於朝廷又曰張酺入為河南尹竇景家人復擊傷市卒吏捕得之景怒遣緹騎侯海等五百人毆傷市丞說文曰緹帛丹黃色也漢官儀曰執金吾有緹騎酺部吏楊章等窮究正海罪徙朔方景忿怒乃移書辟章等六人為執金吾吏欲固執之章等惶恐入白酺願自引贓罪以辭景命酺即上言其狀竇太后詔報自今執金吾辟吏皆勿遣又曰楊彪遷侍中京兆尹光和中黃門令甫使門生於郡界辜攉官財物七千餘萬華嶠書曰甫使門生翹辜攉解見靈帝紀彪發其姦言之司隸校尉陽球因此奏誅甫天下莫不愜心又曰延篤字叔固及邊鳳皆為京兆尹並有能名語曰前有張趙後有邊延張趙即趙廣漢及張敞也又曰梁冀為河南尹居職暴恣多非法父啇所親客洛陽令呂放頗與啇言及冀之短啇以讓冀冀即遣人於道刺殺放而恐啇知之乃推疑於放怨仇請以放弟禹為洛陽令安慰放家欲以滅口使捕之盡滅其宗親賓客百餘人又曰王梁為河南尹穿渠引穀水注洛陽城下東寫鞏川及渠成而水不流七年有司劾奏之梁慚懼上書乞骸骨, WYG: ''}
