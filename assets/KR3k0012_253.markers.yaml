  - {type: variant, offset: 11, length: 0, content: '', krp: 防字偉}
  - {type: variant, offset: 12, length: 1, content: 相, SBCK: 年十六任郡小吏丗祖廵狩汝南召椽史試經防尤能誦讀拜爲守丞防以未冠請去師事徐州刺史蓋豫明經舉孝廉拜郎中陸機集上表曰伏見司徒下諌議大夫張暢除當爲豫章内史丞暢才思清敏志節貞厲秉心立操早有名譽其年時舊比多歷郡守唯暢陵遟自首未齒而佐下藩遂􅌃碎濁於暢名實居之爲劇前後未始有此愚以爲冝解舉試以近縣詔暢旣爲是人所稱便差代郡叅軍晉書曰阮子避亂渡江元帝以爲安東叅軍蓬髮飲酒不以}
