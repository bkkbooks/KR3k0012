  - {type: variant, offset: 1154, length: 0, content: '', SBCK: 伯寜山陽昌邑人年十八爲郡督郵時郡内李朔等擁部曲害于平民太守使寵糺焉朔等請罪不復侵掠又曰髙堂隆字叔平平陽人魯髙堂生後也少爲諸生太守薛悌命爲督郵督軍與悌争名悌而呵之隆案劒叱督軍曰昔魯定見侮仲尼歴階趙彈􅁗筝相如進缶臨臣名君義之所討也督軍失色悌起止之列異傳曰汝南北部督郵西平劉伯夷有大才略案行到懼武亭夜􅀫或曰此亭不可􅀫伯夷乃獨徃􅀫去火誦詩書五經訖卧有頃轉東首以絮巾結兩足以幘冠之拔劒解帶夜時有異物稍稍轉近忽來覆伯夷伯夷屈起以􅃑掩之以帶繫魅呼火照之視得一老狸色赤無毛持火燒殺之明日發視樓屋間得魅所殺人髮結數百枚於是亭遂清静舊說狸髠千人得爲神也漢魏先賢行狀曰故宗正南陽劉伯字奉先少履清節忠亮正直研精}
