  - {type: variant, offset: 69, length: 4, content: 與京十億, SBCK: 杜門不通水火穿後牆爲小戸不敢犯法東觀漢記}
  - {type: variant, offset: 69, length: 0, content: '', WYG: 為衡陽内史先是郡境連嵗疾疫死者大半棺木尤貴悉裹以生席棄之路傍憲之下車分告屬縣求其親黨悉令殯𦵏其家人絶滅者憲之為出公禄使綱紀營䕶之又土俗山民有病輙云先亡為禍皆開冢剖棺水洗枯骨名為除祟憲之曉諭為陳生死之别事不相由風俗遂改時刺史王奐新至惟衡陽獨無訟者乃歎曰顧衡陽之化至矣又曰傅昭為安成内史郡自宋以來兵亂相接府舍稱㓙每昏旦聞人鬼相觸在任者鮮以吉終及昭至有人夜見甲兵出曰傅公善人不可侵犯乃騰虛而去有頃風雨忽至飄郡㕔事入隍中自是郡遂無患咸以昭貞正所致又曰傅昭為安成内史郡多猛獸為害昭乃命去檻穽猛獸竟不為害又曰殷鈞字季和陳郡長平人也為臨川内史鈞體多疾閉閣卧理而百姓化其徳刼盗皆奔出境又曰伏暅為永陽内史在郡清潔政務安靜郡人何貞秀等一百五十四人詣州言狀湘州刺史以聞詔勘有十五事為吏人懐帝善之隋書曰樊子盖為河南内史屢有治績文帝謂曰今為公别造玉麟符以代銅獸也唐書曰契丹作亂山東不安起及王善授滑州刺史則天謂曰邊賊反叛卿雖疾可將妻子日行三十里緩歩至彼}
