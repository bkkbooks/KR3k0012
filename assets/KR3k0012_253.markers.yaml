  - {type: variant, offset: 3613, length: 414, content: 州頹留守京師沙門法秀謀反頹率禁兵收掩畢獲內外晏然駕還飲至文明太后曰當爾之日卿若持疑不即收捕處分失所則事成不測矣今京畿不擾宗廟社稷安者實卿之功也隋書曰楊瓚平齊之役諸王咸從留瓚居守帝謂之曰六府事殷一以相付重朕將遂事東方無西顧之憂矣其見親信如此唐書曰儀鳳元年司農卿韋弘機為東都留守時有道士朱欽遂為中宮所使至都所使至都所為橫恣弘機執而囚之因奏曰道士假稱中宮驅使依倚形勢臣恐虧損皇明為禍患之漸高宗特發中使賜書慰諭仍云不須漏洩又曰武后垂拱中文昌右丞相蘇良嗣為京留守時尚方監裴匪躬檢校京苑將鬻苑中果菜以收其利良嗣駮之曰昔公儀休相魯猶能拔葵去織未聞萬乘之主鬻其果菜以與下人爭利也又曰柳公綽為北都留守充河東節度觀察使等是歲北虜遣梅祿將軍李暢以馬萬疋來市且曰朝貢所經過守帥每假禮分嚴其兵備留館則戒卒于外懼有襲奪太原故事亦出兵送之暢至界上公綽獨使牙門將祖孝恭單馬勞焉待以修好之意暢感義出涕徐驅道中不妄馳獵及至關牙門令譯引謁宴以常禮及市馬歸竟不敢有所犯, WYG: ''}
