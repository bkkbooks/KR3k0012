  - {type: variant, offset: 2210, length: 1817, content: 歲不償孟容遣吏收捕械繫剋日命還之曰不及其當死自興元已後禁軍有功又中貴之尤有渥恩者方得護軍故軍士日益橫府縣不能制孟容剛正不懼以法繩之一軍盡驚冤訴於上立命中使宣旨令送本軍孟容繫之不遣中使再至乃執奏曰臣誠知不奉詔當誅然臣職司輦轂合為陛下彈抑豪強錢未盡輸昱不可得上以其守正許之自此豪右歛迹威望大震又曰劉栖楚為京兆尹摧抑豪右不顧患難事無大小必設鉤鉅故時人重之或稱其機變往往有類於西漢時趙廣漢者又曰李傑為河南尹傑既勤於聽理每有訴列雖衢路當食無廢處斷由是官無留事人吏愛之先是河汴之間有梁公堰年久堰破江淮漕運不通傑奏調發汴鄭丁夫以濬之省功速就公私深以為利刻石水濱以紀其績又曰柳仲郢為河南尹以寬惠為政言事者以為不類京兆之政仲郢曰輦轂之下彈壓為先郡邑之治惠養為本何取類耶又曰蘇震為太常卿是歲東都耆老表乞行幸上重違其心選勤舊勳賢為之牧守遂以震為河南尹兼御史中丞仍充東都畿甸觀察使英雄記曰董卓廢少帝自公卿已下莫不卑下於卓唯京兆尹蓋勳長揖爭禮見者皆為失色李爕別傳曰爕字德公京兆人拜京兆尹吏民愛敬乃作歌曰我府君道教舉恩如春威如虎愛如母訓如父李郃別傳曰鄧騭弟豹為將作大匠河南尹缺豹欲得之上及騭兄弟亦欲用難便召拜下詔令公卿舉騭以旨遣人諷公卿悉舉豹李郃曰司隸河南尹當整頓京師檢御貴戚今反使親家為之必不可為後法公舉司隸羊浸不舉豹豹竟不得尹恨公卿不舉對士大夫曰李公寧能不舉我故我不得尹耶莊子曰孫叔敖能以爵祿為己害故三為令尹三去令尹而色不變語林曰蘇峻新平溫庾諸公以朝廷初復京尹宜得望實唯孔君平可以處之孔固辭二公逼諭甚苦孔敖然曰先帝大漸卿輩身侍御床口行詔令孔垣爾時正璅臣耳何與國家事不可今日喪亂而猥見逼迫吾俎豆上腐肉任人割截耶庾愧不能荅說苑曰楚令尹子文之族干法者廷理釋之子文責之曰吾豈為私意耶何廷理之駮於法也不寘刑地吾將死廷理懼遂刑其人國人聞之曰若令尹之公也吾黨何憂乃相與作歌曰子文之族犯國法程廷理釋之子文不聽通典曰凡帝王所都皆曰尹南朝曰丹陽尹後魏初曰代尹東魏曰魏尹北齊曰清都尹揚雄河南尹箴曰茫茫天區畫冀為京啇邑翼翼四方之經爰作卿士以尹王州風化攸興萬國承流梁邵陵王讓丹陽尹初表曰臣進非民譽退異宗英尸居戎號已紊彝典况京兆五守西漢難追河南二尹東京罕繼審己循涯自知莫可街談巷議尤見不勝梁庾肩吾為南康王讓丹陽尹表曰臣聞劍鏤七星非有司天之用縑圖五嶽寧識崇朝之雲是知策彼泥龍不能令其逐日乘斯流馬安可使其奔電方今振鷺盈庭白駒空谷惟帝念功惟明克允君子之國罕聞其讓石門之水獲免於貪少尹唐書曰李憕為東京少尹時蕭胤為尹依倚權貴蒞事多不法憕以公直正之人用繫賴又道士孫甑生以左道求進託以修功德往來嵩山求請無度憕必挫之五代史後唐書曰李承勳累遷至太原少尹劉守光之僣號也莊宗遣承勳往使伺其亹端承勳至幽州見守光如藩方交聘之禮謁者曰燕王為帝矣可行朝禮承勳曰吾大國使人太原亞尹是唐帝除授燕主自可臣其部人安可臣我哉守光聞之不悅拘留於獄數日出而訊之曰臣我乎承勳曰燕君能臣我王則我臣之吾有死而已安敢辱命會王師討守光承勳竟沒於燕中留守東觀漢記曰和帝南巡祠園廟張禹以太尉留守北宮太官朝夕送食後漢書曰車駕征張步留伏湛居守時蒸祭高廟冬祭曰蒸也而河南尹司隸校尉於廟中爭論湛不舉奏坐策免吳志曰孫權征新城使登居守揔知留事時年穀不豐頗有賊盜乃表定科令所以防禦甚得止奸之要晉書曰張方劫惠帝幸長安僕射荀藩等與其遺官在洛陽為留臺承制行事號為東西臺後魏書曰高祖南伐以太尉元丕廣陵王羽留守京師並加持節又曰荀頹大駕行幸三州頹留守京師沙門法秀謀反頹率禁兵收掩畢獲內外晏然駕還飲至文明太后曰當爾之日卿若持疑不即收捕處分失所則事成不測矣今京畿不擾宗廟社稷安者實卿之功也隋書曰楊瓚平齊之役諸王咸從留瓚居守帝謂之曰六府事殷一以相付重朕將遂事東方無西顧之憂矣其見親信如此唐書曰儀鳳元年司農卿韋弘機為東都留守時有道士朱欽遂為中宮所使至都所使至都所為橫恣弘機執而囚之因奏曰道士假稱中宮驅使依倚形勢臣恐虧損皇明為禍患之漸高宗特發中使賜書慰諭仍云不須漏洩又曰武后垂拱中文昌右丞相蘇良嗣為京留守時尚方監裴匪躬檢校京苑將鬻苑中果菜以收其利良嗣駮之曰昔公儀休相魯猶能拔葵去織未聞萬乘之主鬻其果菜以與下人爭利也又曰柳公綽為北都留守充河東節度觀察使等是歲北虜遣梅祿將軍李暢以馬萬疋來市且曰朝貢所經過守帥每假禮分嚴其兵備留館則戒卒于外懼有襲奪太原故事亦出兵送之暢至界上公綽獨使牙門將祖孝恭單馬勞焉待以修好之意暢感義出涕徐驅道中不妄馳獵及至關牙門令譯引謁宴以常禮及市馬歸竟不敢有所犯, SBCK: ''}
