  - {type: variant, offset: 1726, length: 30, content: 來早者得佳設日晏則漸罄不復及精隨客早晚而不問貴賤有羊固拜東海, krp: 耳}
  - {type: punctuation, offset: 1732, content: ，, id: KR3k0012_CHANT_253-bkkpn464}
  - {type: 'tls:seg', offset: 1732, content: '', id: KR3k0012_CHANT_253-20a.12}
  - {type: variant, offset: 1733, length: 235, content: 晏則漸罄不復及精隨客早晚而不問貴賤有羊固拜東海太守竟日皆美雖晚至者猶獲盛饌論者以固之豐腆乃不如曼之真率晉起居注曰武帝咸寧三年詔曰河南百郡之首其風教宜為遐邇所模以導齊之侍中奉車都尉王恂忠亮篤誠才兼外內明於治化其以恂為河南尹晉中興書云晉天興元年改丹陽內史為丹陽尹宋書劉秀之遷丹陽尹先是秀之從叔穆之為丹陽尹與子弟於廳事上飲宴秀之亦與焉廳事柱有一穿穆之謂子弟及秀之曰汝等試以栗遙擲此柱若能入穿後必得此郡穆之諸子並不能中唯秀之獨入焉唐書曰開元初改雍州長史為京兆尹揔理眾務又曰鄭珣瑜, SBCK: 府君}
