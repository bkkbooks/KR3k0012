  - {type: variant, offset: 106, length: 269, content: 都涿郡人也守京兆尹廣漢為人強力天性精於吏職見使吏民或夜不寢至旦尤善為鉤鉅以得事情蘇峻曰鉤得其情吏不得去鉅鉤者設如欲知馬價則先問狗次問羊又問牛然後及馬參伍其價以類相準則知馬之賤貴不失實矣銖兩之奸皆知之長安少年數人會窮里空會謀共劫人坐語未訖廣漢使捕治具服廉明威制豪強百姓追思歌之至今又曰元始五年有一男子乘黃犢車建黃旐衣黃襜褕逕來詣北闕自謂衛太子京兆雋不疑後到叱從吏使收縛之曰昔蒯聵違命出奔輒距而不納春秋是之衛太子得罪先帝亡不即死今來自詣此罪人也遂送詔獄由是名聲重於朝廷在位者皆自以不及廷尉驗治何人竟得奸詐本夏陽人姓成名方遂皃一似戾太子又曰張敞, WYG: 温初}
