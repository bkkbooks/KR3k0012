  - {type: variant, offset: 1468, length: 804, content: 也吏能犯教而不能使君必不聞也夫設教而犯君之劣也犯教而聞吏之禍也君劣於上吏禍於下此政事所以不理也可不勉之哉於是下吏莫不自厲又曰劉馥字子靖出為河南尹散騎常侍應璩以書與子靖曰入作納言出臨京任富民之術日引月長王隱晉書曰樂廣字彥輔為河南尹故郡中前多怪後人皆於廊下郵傳中治事無敢在廳事者唯廣處之自若白戶自閉二子凱模等懾怖廣使掘牆孔得狸乃絕代者乃相承入止又曰庾純字謀甫太始六年詔曰河南大郡四方表則中書令庾純清粹忠正才紹治化其以純為河南尹又曰劉隗補丹陽尹雖在外而萬機秘密皆預聞之晉書曰羊曼為凡陽尹時朝士過江初拜官相飾供饌曼拜丹陽尹客來早者得佳設日晏則漸罄不復及精隨客早晚而不問貴賤有羊固拜東海太守竟日皆美雖晚至者猶獲盛饌論者以固之豐腆乃不如曼之真率晉起居注曰武帝咸寧三年詔曰河南百郡之首其風教宜為遐邇所模以導齊之侍中奉車都尉王恂忠亮篤誠才兼外內明於治化其以恂為河南尹晉中興書云晉天興元年改丹陽內史為丹陽尹宋書劉秀之遷丹陽尹先是秀之從叔穆之為丹陽尹與子弟於廳事上飲宴秀之亦與焉廳事柱有一穿穆之謂子弟及秀之曰汝等試以栗遙擲此柱若能入穿後必得此郡穆之諸子並不能中唯秀之獨入焉唐書曰開元初改雍州長史為京兆尹揔理眾務又曰鄭珣瑜出為河南尹珣瑜既入境官吏以逼降延日珣瑜到即後於事乃送所獻馬齎印於路以例告珣瑜曰未上官不可遽有進獻及既上即過時矣遂不獻又曰郭英乂時嚴武卒元載薦英乂代之遂兼成都尹充劍南節度使英乂到成都肆行不軌無所忌憚玄宗舊宮置為道士觀內有玄宗鑄金真容及乘輿侍衛圖畫先是節度使每至皆先拜而後視事英乂以觀地有形勝乃入居之其真容及圖畫悉遭毀壞見者無不憤怒又曰英乂為成都尹頗恣狂蕩聚女人騎驢擊毬製鈿驢鞍及諸服用皆侈靡裝飾日費數萬以為笑樂未嘗問百姓間事人頗怨之又曰許孟容為京兆尹神策軍吏李昱假貸長安富人錢八千貫蒲三歲不償孟容遣吏收捕械繫剋日命還之曰不及其當死自興元已後禁軍有功又中貴之尤有渥恩者方得護軍故軍士日益橫府縣不能制孟容剛正不懼以, WYG: ''}
