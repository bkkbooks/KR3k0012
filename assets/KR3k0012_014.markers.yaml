  - {type: variant, offset: 3128, length: 373, content: 后乃援琴而歌歎作霹靂引正論曰里語云州縣符如霹靂得詔書但桂壁電釋名曰電殄也乍見則殄滅也說文曰電陰陽激耀也從雨申聲易曰離為電又曰雷電皆至豐君子以折獄致刑詩曰燁燁震電禮記月令曰春分之日玄鳥至後五日雷乃發聲後五日始電傳曰隱九年三月癸酋大雨震電易稽覽圖曰陰陽和合為電輝輝也其光長春秋元命包曰陰陽激為電史記天官書曰電者陰陽之動也帝王世紀曰黃帝有熊氏母曰附寶有蝺音喬氏之女也見大電光繞北斗樞星照郊野感附寶而孕漢書李尋傳曰尋說王根曰窮見往者盛冬雷電潛龍為孽晉書曰王戎幼而穎悟神彩秀徹視日不眩裴揩目之曰戎眼爛爛如巖下電神異傳曰東王公與玉女杸壺誤而不接天為之笑開口流光今電是也漢武內傳曰西王母曰東方朔為太山仙官太仙使至方丈助三天司命朔但務山水遊戲擅弄雷電激波揚風風雨失時西京雜記曰董仲舒曰太平之世電不眴許絹反目宣示光輝而已莊子曰陰氣伏於黃泉陽氣上通於天陰陽分爭故為電, SBCK: 地破走}
