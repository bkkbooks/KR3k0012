  - {type: variant, offset: 935, length: 310, content: 亡後每有雷震順輒環塚泣曰順在此韓詩外傳曰東海之上有勇士曰菑丘訢音忻以勇游於天下過神淵飲馬沉訢去朝服拔劍而入三日三夜殺二蛟一龍而出雷神隨而擊之十日十夜眇其左目王歆孝子傳曰笁彌字道綸父生時畏雷每至天陰輒馳至墓伏墳哭有白兔在其左右搜神記曰義興人周永和出行因日暮路旁小屋中有女子留宿一更後有喚阿香女應諾官喚汝推雷車女遂辭周云有官事須去俄而大雷既明周自異其處返尋唯見一新冢冢只有馬跡東方朔神異記曰八方之荒有石鼓其徑千里撞之其音即雷也天以此為喜怒之威盛弘之荊州記曰朝陽縣樊重母畏雷為母立石室以避之悉以文石為階砌至今猶存孟奧北征記曰凌雲臺南角一百步有白石室名避雷室又曰臨賀有石方二丈石有磨刀斧跡春夏常明凈其跡甚新秋冬則苔穢故為雷公磨石, WYG: 陳求退}
