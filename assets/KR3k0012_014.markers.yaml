  - {type: variant, offset: 2610, length: 891, content: 去荀乘船逐之至一坂有穴虵便入穴但聞號哭云人斫傷某甲或云當如何或云付雷公令霹靂殺奴須臾雲雨冥合震電傷荀荀於是跳梁大罵云天公我貧窮展力耕墾虵來偷食我飯罪在虵反來霹靂我是無知雷公若來今當以鉟斫汝腹破須臾雲雨輒開乃更霹靂向穴中諸蛇死者數十莊子曰陰陽錯行天地大駭於是有雷有霆劉義慶世說曰夏侯玄字太初嘗倚柱讀書時暴雨霹靂破所倚柱衣服焦然玄神色無變讀書如故異苑曰佛佛虜凶虐暴忍常自言國名佛佛則是佛中之佛尋被震而死既葬而後就冢中霹靂其柩引身出外題背四字表其凶逆之國也又曰滕放太元初夏枕文石枕臥忽暴雷雨震其枕枕四解傍人莫不怖懾而放微覺有聲不足為驚又曰元嘉十九年京口霹靂殺人赤字題臂世說曰王丞相見郭景純君可試為作一卦卦成郭意惡云公有震厄王問可有消伏理否郭曰公能命駕西出數里得一柏樹截短如公長置寢處災可消王悉依其語數日中果震柏樹碎門內子弟皆稱慶桓譚新論曰天下有鶴鳥郡國皆食之三輔俗獨不敢取之或雷霹靂起原夫天不獨左彼而右此殺鳥適與雷遇耳愽物志曰九真有貍牛出谿上或鬥岸上家牛皆怖或遮捕即霹靂號曰神牛山海經曰半石之山有草名曰嘉榮服之不畏霆不畏霹靂琴操曰楚高梁子出遊九皋之澤覽漸水之臺張罛置罟於荊山臨曲池而漁而疾風霣于敏反雹雷電奄冥天火四起霹靂下臻玄鶴翔其前白虎吟其后乃援琴而歌歎作霹靂引正論曰里語云州縣符如霹靂得詔書但桂壁電釋名曰電殄也乍見則殄滅也說文曰電陰陽激耀也從雨申聲易曰離為電又曰雷電皆至豐君子以折獄致刑詩曰燁燁震電禮記月令曰春分之日玄鳥至後五日雷乃發聲後五日始電傳曰隱九年三月癸酋大雨震電易稽覽圖曰陰陽和合為電輝輝也其光長春秋元命包曰陰陽激為電史記天官書曰電者陰陽之動也帝王世紀曰黃帝有熊氏母曰附寶有蝺音喬氏之女也見大電光繞北斗樞星照郊野感附寶而孕漢書李尋傳曰尋說王根曰窮見往者盛冬雷電潛龍為孽晉書曰王戎幼而穎悟神彩秀徹視日不眩裴揩目之曰戎眼爛爛如巖下電神異傳曰東王公與玉女杸壺誤而不接天為之笑開口流光今電是也漢武內傳曰西王母曰東方朔為太山仙官太仙使至方丈助三天司命朔但務山水遊戲擅弄雷電激波揚風風雨失時西京雜記曰董仲舒曰太平之世電不眴許絹反目宣示光輝而已莊子曰陰氣伏於黃泉陽氣上通於天陰陽分爭故為電, WYG: ''}
