  - {type: variant, offset: 1824, length: 118, content: 足數也先主方食失匕箸會雷大震先主曰聖人言迅雷風烈必變良有以也一震之威乃可致此公亦悔失言酈炎對事曰或曰雷震驚百里何以知之炎曰以其數知之夫陽動為九其數三十六陰靜為八其數三十二一陽動二陰故曰百里雷雜兵書曰雷電霹靂破軍中樹木屋舍者徙去吉也雷電風, WYG: 匝從虹}
