  - {type: variant, offset: 462, length: 0, content: '', SBCK: 徴動羽有雹霜陳陸瓊和張湖孰雹詩曰惟徴動羽惟隂脅陽雨氷作冷凝氣爲祥虹蜺釋名曰虹攻也純陽攻隂氣故也隂陽不和昬姻錯亂滛風流行男女㸦相奔隨則此氣盛霓齧也其體絶見於非時此災氣傷害物如有所食齧􅀃文曰霓屈虵青赤或白色隂氣者也河圖稽耀鈎曰鎮星散爲虹霓虹霓主内滛又霓者氣也起在日側其色青赤白黃周書曰清明後十日虹始見小雪日虹藏不見虹不収藏婦不專一詩曰螮蝀在東莫之敢指螮蝀虹也夫婦過禮則虹氣盛君子見戒而諱之莫之敢指禮曰小雪之日虹藏不見又曰玉氣如白虹}
