  - {type: variant, offset: 3568, length: 1, content: 凌, SBCK: 青雲衣􅀆白蜺裳楚辭天問曰白蜺嬰茀胡爲此堂王逸注曰蜺雲之有色似龍者茀白雲逶迤􅀂虵者言有此蜺茀氣氣逶迤相嬰何爲於此堂乎蓋屈原所見祠堂也安得失夫良藥不能固臧臧善也崔文子學仙於王子喬子喬化爲白虹而如嬰茀持藥與崔文子文子}
  - {type: variant, offset: 3568, length: 1, content: 凌, WYG: 青雲衣兮白霓裳楚辭天問曰白霓嬰茀胡為此堂王逸注曰蜺而雲有色似龍者茀白雲逶迤也蜺者言有此白霓茀氣逶迤相嬰何為于此堂乎蓋屈原祠堂所見也安得夫良藥不能固臧臧善也崔文子學仙於王子喬子喬化為白虹而加嬰茀持藥與崔文子}
