  - {type: variant, offset: 1801, length: 7, content: 曹公從容謂先主, SBCK: 諸葛恪圍新城不尅引軍出徃東興有虵見其􅂳還拜蔣陵白虹復繞其車呉録云恪}
  - {type: variant, offset: 1801, length: 2, content: 曹公, WYG: 李特生長子盪字仲平少子雄字仲雋特妻羅氏妊雄夢雙虹自地升天一虹中斷羅曰吾二兒有先亡者有貴者後雄王蜀黄帝占軍訣曰攻城有虹}
  - {type: variant, offset: 1801, length: 7, content: 曹公從容謂先主, krp: 諸葛恪圍新城不尅引軍出徃東興有虵見其船還拜蔣陵白虹復繞其車呉録云恪}
  - {type: variant, offset: 1804, length: 17, content: 容謂先主曰天下英雄唯使君與操爾本初, WYG: 南方入飲城中者從虹攻}
