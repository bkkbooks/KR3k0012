  - {type: variant, offset: 422, length: 0, content: '', SBCK: 人君妬賢疾善在下謀上則日蝕而雹殺走獸春秋感精符曰大臣擅法則􅀨雹又曰九月十月日色青則寒有雪雹春秋考異郵曰隂陽專精凝合成雹雹之言合也春秋漢含孳曰專一精并氣凝爲雹宋均注曰謂􅀂魯僖公脅於齊以妾爲妻尊重齊勝無迴曲之心感隂水氣乃使結而不解散史記曰景帝二年秋􅀨雹大者}
  - {type: page-break, offset: 422, content: '', id: KR3k0012_SBCK_014-4b}
  - {type: variant, offset: 422, length: 0, content: '', WYG: 人君妬賢疾善在下謀上則日蝕雨雹殺走獸春秋感精符曰大臣擅法雨雹又曰九月十月日色青則寒有雹雪春秋考異郵曰隂陽專精凝合成雹雹之言合也春秋漢含孳曰專一精并氣凝為雹宋均注曰謂若魯僖公脅於齊以妾為妻尊重齊媵無廻曲之心感隂水氣乃使結而不解㪚史記曰景帝二年秋雨雹大者}
  - {type: page-break, offset: 422, content: '', id: KR3k0012_WYG_014-7a, image: WYG0893/WYG0893-0147a.png}
  - {type: variant, offset: 422, length: 0, content: '', krp: 人君妬賢疾善在下謀上則日蝕而雹殺走獸春秋感精符曰大臣擅法則雨雹又曰九月十月日色青則寒有雪雹春秋考異郵曰隂陽專精凝合成雹雹之言合也春秋漢含孳曰專一精并氣凝爲雹宋均注曰謂若魯僖公脅於齊以妾爲妻尊重齊勝無迴曲之心感隂水氣乃使結而不解散史記曰景帝二年秋雨雹大者}
  - {type: variant, offset: 423, length: 4, content: 星占雷電, SBCK: 寸􅀷二尺又曰凡雹皆冬之愆陽夏之伏隂也漢書曰成帝河平二年四月楚國雨雹大如斧飛鳥皆死又曰宣帝地節四年五月山陽濟隂􅀨雹如雞子􅀷二尺五寸}
  - {type: variant, offset: 423, length: 4, content: 星占雷電, WYG: 寸深二尺又曰凢雹皆冬之愆陽夏之伏隂也漢書曰成帝河平二年甲午四月楚國雨雹大如斧飛鳥皆死又曰宣帝地節四年乙邜五月山陽濟隂雨雹如雞子深二尺五寸}
  - {type: variant, offset: 423, length: 4, content: 星占雷電, krp: 寸深二尺又曰凡雹皆冬之愆陽夏之伏隂也漢書曰成帝河平二年四月楚國雨雹大如斧飛鳥皆死又曰宣帝地節四年五月山陽濟隂雨雹如雞子深二尺五寸}
  - {type: variant, offset: 428, length: 0, content: '', SBCK: 二十}
  - {type: variant, offset: 428, length: 0, content: '', WYG: 二十}
  - {type: variant, offset: 428, length: 0, content: '', krp: 二十}
  - {type: variant, offset: 429, length: 0, content: '', SBCK: 蜚音飛與飛同鳥皆死又漢書五行志曰武帝元封三年雹大如馬頭范曄後漢書曰有青虵見於御坐軒前又大風雨雹霹靂拔樹張奐上䟽曰臣聞風爲號令動物通氣木生於火相須乃明虵能屈伸配龍騰蟄順至爲休徴逆來爲殃咎隂氣專用則精凝爲雹故大將軍竇武太傅陳蕃或志寕社稷或方直不回前以䜛勝並伏誅戮海内嘿嘿人懷震憤昔周公葬不如禮天乃動威今武蕃忠貞未􅀍明宥妖眚之來皆爲此也冝急爲改葬徙還家屬其從坐禁錮一切蠲除又皇太后雖居南宫而恩禮不接朝臣莫言逺近失望冝思大義頋復之報天子􅀷納奐言又曰時頻有地震隕雹蔡邕上封事曰臣聞天降災異縁象而至霹靂雹數發殆刑誅繁多之所生也又曰安帝延光元年夏京師及郡國三十雨雹又曰獻帝􅀄平二年五月雹如扇如斗東觀漢記曰和帝永元五年六月郡國大雨雹大如鴈子又曰韓稜字伯師除爲下邳令視事未朞吏民愛慕時隣縣皆雹傷稼稜縣界獨不雹晉書曰太元二十一年四月雨雹時道子專政姦佞競進烈宗不能禁終至大亂晉中興書曰太興二年海鹽雨雹大如鷄子崔鴻前趙録曰劉曜光􅀄三年夏四月長安雨雹大如雞子後魏書曰鮮卑兵投鹿侯從匈奴三年其妻在家有子恠欲殺之妻言常行仰天視而雹入口吞之而生子號擅石槐後遂爲鮮卑大人郭氏􅀇中記曰東方有柴都焉在齊國有山山有泉水如井狀􅀷不測至春夏時雹從井中出常敗五榖人常以柴塞之不柴塞則出也故號爲柴都陳留風俗記曰雍丘縣夏后公祠有神井能興霧雹伏琛齊地記曰安丘城南三十里有雹都淵其雹或出亦不爲災異西京雜記曰鮑敞問董仲舒曰雹}
