  - {type: variant, offset: 1841, length: 230, content: 聖人言迅雷風烈必變良有以也一震之威乃可致此公亦悔失言酈炎對事曰或曰雷震驚百里何以知之炎曰以其數知之夫陽動為九其數三十六陰靜為八其數三十二一陽動二陰故曰百里雷雜兵書曰雷電霹靂破軍中樹木屋舍者徙去吉也雷電風所從來不可逆而相代宜慎之也物理論曰積風成雷王充論衡曰子路感雷精而生尚剛好勇親涉衛難結纓而死孔子聞而覆醢每聞雷鳴乃中心惻怛亦復如之故後人忌焉以為常也又曰盛夏之時雷電疾擊殺人謂之有陰過飲食不潔則天怒殺之隆隆之聲天怒之音也此虛言也道士劉春楚王英使食不潔春死必遇雷也, SBCK: ''}
