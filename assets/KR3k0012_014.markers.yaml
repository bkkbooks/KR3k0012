  - {type: variant, offset: 190, length: 1, content: 雷, SBCK: 僖公即位隕霜不殺草臣威強也春秋感精符曰霜殺伐之表季秋霜始降鷹隼擊王者順天行誅}
  - {type: variant, offset: 190, length: 1, content: 雷, WYG: 僖公即位隕霜不殺草臣威強也春秋感精符曰霜殺伐之表季秋霜始䧏鷹隼擊王者順天行誅}
  - {type: variant, offset: 190, length: 1, content: 雷, krp: 僖公即位隕霜不殺草臣威強也春秋感精符曰霜殺伐之表季秋霜始降鷹隼擊王者順天行誅}
  - {type: variant, offset: 192, length: 1, content: 動, SBCK: 成肅殺之威孝經援神契曰霜以挫物五經通義曰寒氣凝以爲霜霜從地升也五經鈎沉曰天霜樹落葉而鴻鴈南飛家語曰霜降而婦功成嫁娶者行焉季秋霜降娶者始也詩曰將子無怒秋以爲期國語曰駟見而霣于敏反霜霣霜而冬裘具賈逵曰駟房星也漢武内傳曰西王母云仙之上藥􅀇霜絳雪王子年拾遺記曰廣延國有霜色紺碧又曰嵰丘儼反州霜甘又曰貟嶠之山名環丘有氷􅁞以霜雪覆之然後作璽其色五采織爲文錦入水不濡以投火經􅀫不燎唐堯之代海人獻以爲黼黻莊子曰馬蹄可以踐霜雪毛可以禦風寒曽子曰隂氣勝則凝爲霜淮南子曰芝蘭以芳未甞見霜先霜刈}
