  - {type: variant, offset: 873, length: 272, content: 雷輒還遶墓曰褒在此褒在此齊書曰永明八年六月十日晡時雷有黃光照地狀如金色占曰人君有德或謂之榮光周斐汝南先賢傳曰蔡順母平生畏雷自亡後每有雷震順輒環塚泣曰順在此韓詩外傳曰東海之上有勇士曰菑丘訢音忻以勇游於天下過神淵飲馬沉訢去朝服拔劍而入三日三夜殺二蛟一龍而出雷神隨而擊之十日十夜眇其左目王歆孝子傳曰笁彌字道綸父生時畏雷每至天陰輒馳至墓伏墳哭有白兔在其左右搜神記曰義興人周永和出行因日暮路旁小屋中有女子留宿一更後有喚阿香女應諾官喚汝推雷車女遂辭周云有官事須去俄而大雷既明周自異其處返尋唯見一新冢冢只有馬跡東方朔神異記曰八方之荒有石鼓其徑千里撞之其音即雷, SBCK: 所投虹者}
