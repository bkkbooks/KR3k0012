  - {type: variant, offset: 220, length: 2, content: 雷隨, SBCK: 寳山海經曰豐山有九鍾霜降其鍾即鳴命曆序曰桀無道夏隕霜師曠占曰春夏一日有霜雪者君治政大嚴刻太殺天以示之冝損威殺重人命崔豹古今注曰鷓鴣常向日而飛畏霜露夜棲則以樹葉覆其背上蔡邕月令章句曰露凝爲霜徐整長暦曰北斗當崑崙山氣運注天下秋冬爲霜雪唐}
