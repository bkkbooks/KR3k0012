  - {type: variant, offset: 1146, length: 653, content: 天以此為喜怒之威盛弘之荊州記曰朝陽縣樊重母畏雷為母立石室以避之悉以文石為階砌至今猶存孟奧北征記曰凌雲臺南角一百步有白石室名避雷室又曰臨賀有石方二丈石有磨刀斧跡春夏常明凈其跡甚新秋冬則苔穢故為雷公磨石莊子曰陰陽交爭為雷文子曰夫目察秋毫之末耳不聞雷霆之聲耳調金石之音目不見太山之形小有所志必大有所忘曾子曰陰陽之氣俱則雷淮南子曰陰陽相薄感而為雷又曰蔭不祥之木為雷霆所撲又曰庶女叫天雷電下擊景公臺殞支體傷折海水大出庶賤之女齊之少寡婦人也無子不嫁事姑謹敬姑無男有女女利母財令母嫁婦婦終不肯女殺母以誣寡婦婦不能自明冤結叫天天為作雷電下擊景公之台殞壞之也傷毀景公支體水為之溢又曰雷霆之聲可以鍾鼓寫也風雨之變可以音律和也抱朴子曰雷天之鼓也鶡冠子曰昔者有道之君取政非取於耳目也夫耳之生聰目之生明兩葉蔽目不見太山兩豆塞耳不聞雷霆孫子曰擊電無停光疾雷無餘聲河圖帝通紀曰雷天地之鼓河圖曰玉虎晨鳴雷聲也又曰黃帝以雷精超六韜曰武王伐紂雨甚雷疾武王之乘雷震而死周公曰天不祐周矣太公曰君秉德而受之不可如何也伏侯古今注曰成帝建始四年無雲而風天雷如擊連鼓音可四五刻隆隆如車聲山海經曰羭音榆次之山有鳧名橐𩇯服之不畏電𩇯音肥匪備三音又曰飛魚如豚赤文無羽食之辟兵不畏雷師曠占曰春雷初起其音恪恪霹靂者所謂雄雷旱氣也其鳴依依音者不大霹靂者謂之雌雷水氣也又曰春分有音如雷非雷音在地中其所住者兵起其主無雲而雷名曰天狗行不出三年其國亡又曰初雷從金門起上旬旱下田熟一曰歲中兵華起也風俗通曰雷不蓋醬俗說令人腹中雷鳴世說曰曹爽將誅夢二虎衘雷公若二升捥放著庭中華陽國, SBCK: 呉}
