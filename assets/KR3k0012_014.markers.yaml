  - {type: variant, offset: 1578, length: 0, content: '', WYG: 又曰廬陵巴丘民陳濟者作州吏其婦姓秦獨在家忽疾病恍惚發狂後漸差常有一丈夫長大儀貎端正著絳碧袍彩色炫燿來從之常相期於一山澗之旁寢處}
  - {type: variant, offset: 1579, length: 0, content: '', WYG: 覺有人道感接忽忽如眠耳如是積年春每往期㑹不復畏難比鄰人觀其所至輙有虹見秦云至水側丈夫金瓶引水共飲後遂有娠生兒如人多肉不覺有手足濟尋假還秦懼見之乃内兒著甕中因見此丈夫以金甕與之令覆兒濟時醉眠在牖下聞與秦語聲至愴濟亦不疑也又丈夫語秦云兒小未}
