  - {type: variant, offset: 537, length: 66, content: 秦二世元年天無雲而雷雷陽也雲陰也有雲然後有雷象君臣也故雲雷相託陰陽之合也今二世不恤人人臣叛之故無雲而雷也又曰凡大風雷雨為不敬也又曰春, SBCK: 清明}
  - {type: variant, offset: 537, length: 1, content: 秦, WYG: 安帝延光}
  - {type: variant, offset: 537, length: 66, content: 秦二世元年天無雲而雷雷陽也雲陰也有雲然後有雷象君臣也故雲雷相託陰陽之合也今二世不恤人人臣叛之故無雲而雷也又曰凡大風雷雨為不敬也又曰春, krp: 清明}
  - {type: variant, offset: 539, length: 1, content: 世, WYG: 年夏京師及郡國三日大雨雹又曰獻帝初平二年五月雹如扇如斗東觀漢記曰和帝永元五年六月郡國大雨雹大如鴈子又曰韓稜字伯師除為下邳令親事未期吏民愛慕時隣縣皆雹傷稼稜縣界獨不雹晋書曰太光二十一年四月雨雹時道子專政姦佞競進烈宗不能禁終至大亂晋中興書曰大興二年海鹽雨雹大如雞子崔鴻前趙録曰劉曜光初三年四月長安雨雹大如雞子後魏書曰鮮卑兵沒鹿俟從匈奴三年其妻在家有子怪欲殺之妻言常行仰天視而雹入口吞之而生子號檀石槐後遂為鮮卑大人郭子𤣥中記曰東方有柴都焉在齊國有山山有泉如水井狀深不測至春秋時雹從井中出常敗五榖人常以柴塞之不塞柴則出也故號為柴都陳留風俗記曰雍丘縣夏后公祠有神井能興雹霧伏琛記曰安丘城南三十里有電都淵其雹或出亦不為灾異西京雜記曰鮑敞問董仲舒曰雹何物也曰隂氣脅陽也凉州異物志曰有一大人生于北邊在丁令北千五百里偃卧於野其髙如山䪺脚成谷横身塞川長萬餘里䪺脚之間乃成大谷近之則有尖銅雹擊旃注曰旃之也所謂大人惟可遥看不可至下若至則有雷電流銅鐡之丸以擊人曾子曰陽之專氣為雹雹者氣之化也淮南子曰北方之極有九澤有積雪雹孔叢子曰永初二年夏河西縣大雨雹皆如杯棬大者或時殺牲畜雉兔折樹木於是天子責躬省過風俗通曰成帝問劉向曰俗説文帝時天下斷獄三人米一斗一錢有此事否對曰不然後}
