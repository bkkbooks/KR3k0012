  - {type: variant, offset: 2194, length: 415, content: 若攻戰也說文曰震霹靂振物也穀梁傳曰震雷也爾雅曰疾雷為霆蜺郭璞曰雷之急激者為霹靂春秋繁露曰王言下不從則金不從革而秋多霹靂霹靂者金氣其音啇故應霹靂五經通義曰震與霆皆霹靂也晉安帝紀曰義熙二年六月震太廟鴟尾徹壁柱若有文字晉朝雜事曰元康七年霹靂破城南高禖中宮求子象也賈后將誅之應曹嘉之晉紀曰諸葛誕以氣邁稱常倚柱讀書霹靂震其柱誕自若列女後傳曰河南李叔卿為功曹應舉孝廉同時應人害之使婢宣言叔卿淫其寡妹同舉人詣尹以骨肉相奸不合應孝廉叔卿杜門自絕女妹傷被淫之名遂到府門自殺叔卿亦自殺明己無愆也後三年霹靂害叔卿者以其死屍置叔卿冢前其家收而葬之秋又雷發其冢玄中記曰玉門之西有一國國中有山山上有人歲歲出石䃡子林反數千輸廟中名曰霹靂䃡給霹靂用從春雷出䃡日減至秋而盡搜神記曰扶風楊道和於田中霹靂擊之道和以鋤格折其左肱遂落地不得去色如丹目如鏡毛角長三尺狀如六畜似獮猴續搜神記曰吳興人章荀者五月中於田耕以飯籮置菰裏晚於菰中伺之見一大虵偷其食荀即以鉟步悲反叉之蛇便, WYG: ''}
