  - {type: variant, offset: 3010, length: 3, content: 陳訓私, SBCK: 頰血流婉轉弥苦及差而滅左頰有赤􅀧如誌迫而視之更益妍也諸嬖欲寵者皆以丹脂􅀧頰而後進幸唐子曰人多逺見百歩而不自知眉頰蔣齊萬機}
  - {type: variant, offset: 3010, length: 3, content: 陳訓私, krp: 頰血流婉轉弥苦及差而滅左頰有赤點如誌迫而視之更益妍也諸嬖欲寵者皆以丹脂點頰而後進幸唐子曰人多逺見百歩而不自知眉頰蔣齊萬機}
  - {type: variant, offset: 3014, length: 0, content: '', SBCK: 曰許子將褒貶不平以拔樊子昭而抑許文休劉曄曰子昭發自賈豎年至耳順退能守静進能不苟濟荅曰子昭誠自長㓜完㓗然觀其揺牙樹頰自非文休敵也丗􅀃曰郄公遭永嘉喪亂窮餒郷人共餉之公甞􅂝兄子外生周翼二小兒往食郷}
