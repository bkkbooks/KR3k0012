  - {type: variant, offset: 4678, length: 3, content: 南聞君, WYG: 交趾還書戒兄子曰龍伯髙敦厚周慎口無擇言謙約節儉廉公有威吾愛}
  - {type: variant, offset: 4682, length: 1, content: 名, WYG: 重之應劭漢官儀曰侍中刀存年老口臭帝賜以鷄舌香令含之江表傳曰孫堅為下邳丞時孫權生而方頥大口目有精光堅異之}
