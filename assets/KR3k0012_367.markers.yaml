  - {type: punctuation, offset: 4677, content: 『, id: KR3k0012_CHANT_367-bkkpn1683}
  - {type: variant, offset: 4677, length: 0, content: '', WYG: 柏直也漢王曰是口尚乳臭又曰髙祖欲廢太子周昌諌曰臣口不能言心知不可又曰良藥苦口利于病又曰張蒼免相後口無齒食乳女子為乳母又曰條候周亞夫相曰從理入口法餓死又曰揚雄口吃不能劇談又曰王莽為人哆口東觀漢記曰光武為人日角大口美鬚眉又曰明徳馬后身長七尺三寸青白色方口美髪後漢書曰馬援}
