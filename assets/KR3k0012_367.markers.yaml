  - {type: variant, offset: 4667, length: 5, content: 王肅初歸國, SBCK: 宋廢帝常入武帝廟指其􅀞像曰此渠大好色不擇尊卑顧}
  - {type: variant, offset: 4667, length: 0, content: '', WYG: 宋廢帝常入武帝廟指其畫像曰此渠不好色不擇尊卑顧謂左右渠大鼻如何不齇即令畫工齇又曰齊世祖之征也潁川有皇甫}
  - {type: variant, offset: 4667, length: 5, content: 王肅初歸國, krp: 宋廢帝常入武帝廟指其畫像曰此渠大好色不擇尊卑顧}
  - {type: variant, offset: 4668, length: 1, content: 肅, WYG: 淵者善相人見其容止竊議曰此不作大物㑹是垂涕洟者謂太原公洋也崔元瀨鄉記曰老子鼻雙柱養生經曰鼻者心之門頞説文曰頞鼻莖也釋名曰頞鞍也偃折如鞍也史記曰唐舉謂蔡澤曰先生魋顔蹙齃殆不相乎後漢書曰周爕字伯彦}
  - {type: page-break, offset: 4668, content: '', id: KR3k0012_WYG_367-8b, image: WYG0896/WYG0896-0271d.png}
  - {type: variant, offset: 4670, length: 1, content: 歸, WYG: 生顩頥折頞醜甚母欲棄之其父不聼曰吾聞賢聖多有異興我宗者乃此於是寶之吳書曰諸葛恪字元遜瑾長子少知名少鬚眉折頞廣顙荘子曰髑髏深頻蹙頞曰豈能捨南面王樂而為人生哉吕氏春秋曰文王好食昌葅孔子蹙頞而食之楊雄解嘲曰蔡澤山東匹夫也顩頥折頞涕唾流沫口説文曰口者人之所以言食釋名曰口空也禮曰曽子謂子思曰伋吾執親之䘮也水漿不入於口者七日又曰晋人謂趙文子知人文子其中退然如不勝衣中身也退和柔貌其言呐呐然如不出諸其口又玉藻曰口容止不妄動也又少儀曰燕侍食於君子數噍毋為口容口容弄口又祭義曰惡言不出於口又緇衣曰小人溺於水君子溺於口口費而煩易出難悔易以溺人言口多空言且煩數過言一出駟馬不能及不可得悔也口舌所覆亦如溺也傳曰鄭伯使許大夫百里奉許叔以居許東偏曰寡人有弟不能和恊而使餬其口於四方其况能乆有許乎又曰口不道忠信之言為嚚又曰子玉使伯棼請戰曰非敢必有功也願以間執讒慝之口又曰晏子曰君民者豈以陵民社稷是主臣君者豈為口實社稷是養言君不徒居民上臣不徒求禄皆為社稷又曰正考父佐戴武佐三命滋益恭故其鼎銘云一命而僂再命而傴三命而俯饘於是粥於是以餬余口又曰費無極言於楚子曰建與伍奢将以方城之外叛王執伍奢使城父司馬奮陽殺太子未至而使遣之知太子寃故遣令去太子建奔宋王召奮陽奮陽使城父人執己以至王曰言出於余口入於爾耳誰告建也詩正月曰好言自口莠言自口莠醜也又十月之交曰無罪無辜讒口囂囂書序曰濟南伏生年過九十失其本經口以傳授又曰大禹謨曰惟口出好興戎朕言不再好謂賞善戎謂伐惡言口榮辱之主又盤庚上曰相時憸民猶胥顧於箴言其發有逸口言憸利小人尚相顧於箴悔之言恐其言發動有逸口之患也又説命曰惟口起羞易説卦曰兑為口論語公冶長篇或曰雍也仁而不侫子曰禦人以口給屢憎於人又陽貨曰惡利口之覆邦家者公子翬謟于隠公謂隠公曰百姓安子諸侯説子盍終為君矣隠公曰否使脩菟裘吾将老焉公子翬恐若其言聞於桓於是謂桓公曰吾為子口隠矣孝經援神契曰舜大口又曰孔子海口言若含擇論語擇輔像曰子貢斗星繞口南容升又曰太公大夫鼻有伏藏史記曰周厲王得衛巫使監謗者以告則殺之其謗鮮矣王喜告召公吾能弭謗矣召公曰是障之也防民之口甚於防水水壅而潰傷人必多民亦如之民之有口也猶土之有山川也財用於是乎出猶其有原隰衍沃也衣食於是乎生口之宣言也善敗於是乎興行善而備敗所以産財用衣食者也夫民慮之於心宣之於口成而行之若壅其口其與能幾何王不聼於是}
