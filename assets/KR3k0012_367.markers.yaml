  - {type: variant, offset: 4748, length: 2, content: 彼各, WYG: 不讀謝詩三日覺口臭舌釋名曰舌洩也舒洩所當言也詩雨無正曰哀哉不能言匪舌是出維躬是瘁又曰瞻卬曰婦有長舌維厲之階又抑曰莫捫朕舌言不可逝矣論語顔淵曰子貢曰惜乎夫子之説君子也駟不及舌春秋元命苞曰舌之}
