  - {type: variant, offset: 517, length: 735, content: 戰國策曰蘇秦說李兌明日復來舍人謂兌曰臣竊觀蘇公說也其辨過於君君能聽乎兌曰不能曰君即不能願君豎塞而耳無聽其談明日復見終日談而去秦謂舍人曰昨日我談薄而君動今精而君不動何也舍人曰我為塞兩耳無聽談也漢書曰楊煇報孫會宗書曰家本秦也能為秦聲婦趙女也雅善鼓瑟奴婢歌者數人酒後耳熱仰天拊缶而呼烏烏英雄記曰曹公擒呂布布顧謂劉備曰玄德卿為座上客我為降虜繩縛我急獨不可一言邪操曰縛虎不得不急乃命緩布縛備曰不可公不見布事丁建陽董太師乎操領之布目備曰大耳兒最叵信叵普火切魏書曰荀攸年七八歲父衢曾醉誤傷攸耳而攸出入遊戲常避護不欲令衢見衢後聞之乃驚其宿智如此吳錄曰關羽走孫權使虞翻筮之曰必當斷頭傷其耳果如翻言蜀志曰先主長七尺五寸垂臂下膝顧自見其耳晉書曰王導多疾每自憂陳訓曰耳豎必壽亦大貴又曰殷仲堪父患耳聞床下蟻動謂是牛鬭王隱晉書曰張軌為涼州刺史燉音煌曹祛上言軌老病更請刺史軌治中率數十人皆割耳於盤流血訴枉得停蜀書曰武皇帝李雄美容貌相工相之曰此君口如方器耳如相望位必過三公不疑也唐書曰汴州節度李忠臣嘗因奏對德宗謂之曰卿耳甚大貴人也忠臣對曰臣聞驢耳甚大龍耳即小臣耳雖大乃驢耳也上悅之老子曰五音令人耳聾孟子曰伯夷耳不聽惡聲鶡冠子曰夫耳主聽兩豆塞之則上不聞雷霆淮南子曰禹耳三漏是謂大通興利除害決江䟽河抱朴子曰老子耳長七寸又曰耳能聞雷霆而不聞蟻虱之音呂氏春秋曰雷則掩耳電則掩目耳聞所惡不如無聞目見所惡不如無見又曰且天生人而使其耳可以聞不學其聞不若聾使其目可以見不學其見不若盲使其口可以言不學其言曲以爽使其心可以知不學其知暗以狂凡學非為能益也達天性也說苑曰昔費仲惡來膠革長鼻決耳從紂之心武王誅之博物志曰南方落頭民其頭能飛以耳為翼瀨鄉記曰老子耳有三門王子年拾遺錄曰沐胥國人左耳中出青龍右耳中出白虎龍虎初出之時如繩緣, SBCK: 輔}
  - {type: variant, offset: 517, length: 1622, content: 戰國策曰蘇秦說李兌明日復來舍人謂兌曰臣竊觀蘇公說也其辨過於君君能聽乎兌曰不能曰君即不能願君豎塞而耳無聽其談明日復見終日談而去秦謂舍人曰昨日我談薄而君動今精而君不動何也舍人曰我為塞兩耳無聽談也漢書曰楊煇報孫會宗書曰家本秦也能為秦聲婦趙女也雅善鼓瑟奴婢歌者數人酒後耳熱仰天拊缶而呼烏烏英雄記曰曹公擒呂布布顧謂劉備曰玄德卿為座上客我為降虜繩縛我急獨不可一言邪操曰縛虎不得不急乃命緩布縛備曰不可公不見布事丁建陽董太師乎操領之布目備曰大耳兒最叵信叵普火切魏書曰荀攸年七八歲父衢曾醉誤傷攸耳而攸出入遊戲常避護不欲令衢見衢後聞之乃驚其宿智如此吳錄曰關羽走孫權使虞翻筮之曰必當斷頭傷其耳果如翻言蜀志曰先主長七尺五寸垂臂下膝顧自見其耳晉書曰王導多疾每自憂陳訓曰耳豎必壽亦大貴又曰殷仲堪父患耳聞床下蟻動謂是牛鬭王隱晉書曰張軌為涼州刺史燉音煌曹祛上言軌老病更請刺史軌治中率數十人皆割耳於盤流血訴枉得停蜀書曰武皇帝李雄美容貌相工相之曰此君口如方器耳如相望位必過三公不疑也唐書曰汴州節度李忠臣嘗因奏對德宗謂之曰卿耳甚大貴人也忠臣對曰臣聞驢耳甚大龍耳即小臣耳雖大乃驢耳也上悅之老子曰五音令人耳聾孟子曰伯夷耳不聽惡聲鶡冠子曰夫耳主聽兩豆塞之則上不聞雷霆淮南子曰禹耳三漏是謂大通興利除害決江䟽河抱朴子曰老子耳長七寸又曰耳能聞雷霆而不聞蟻虱之音呂氏春秋曰雷則掩耳電則掩目耳聞所惡不如無聞目見所惡不如無見又曰且天生人而使其耳可以聞不學其聞不若聾使其目可以見不學其見不若盲使其口可以言不學其言曲以爽使其心可以知不學其知暗以狂凡學非為能益也達天性也說苑曰昔費仲惡來膠革長鼻決耳從紂之心武王誅之博物志曰南方落頭民其頭能飛以耳為翼瀨鄉記曰老子耳有三門王子年拾遺錄曰沐胥國人左耳中出青龍右耳中出白虎龍虎初出之時如繩緣頰手捋面而龍虎皆飛去地十餘丈而雲氣繞龍風來吹虎俄而以手一揮龍虎皆還入耳高士傳曰堯聘許由為九州牧由聞之洗耳於河列仙傳曰務光夏時人耳長七寸陽都女耳細而長眾皆言此天人也又曰甯先生毛身廣耳阮丘耳長六七寸列士傳曰燕丹師田光往候荊軻值軻醉唾其耳中軻覺曰此出口入耳之言必大事也即往見光列女後傳曰劉仲敬妻者沛國桓林之姊也仲敬早亡桓乃引刀割耳宗婦問之桓曰吾自五代以來世知名男以忠孝顯女以貞順稱家以我年少必相嫁故預自裁割以信我心又曰曹文叔妻譙國夏侯寧之女文叔早亡妻斷髮自誓其家欲嫁之又截兩耳司馬太傅美之乞為曹氏後又曰陽華穆妻者下邳劉方之女字桃樹生一男而穆早亡吳丁諿音緝求之諿知名之士家將許焉桃樹乃操刀割耳其子又亡桃樹乃安身守正動不諐禮愆音傜長沙耆舊傳曰太尉劉壽少遇相師相師曰耳為天柱今君耳城郭必典家邦樊氏相法曰耳門不容麥歲至百兼富目釋名曰目默也謂默而內識也眼限也童子限限而出也禮曰目者氣之清明者也又玉藻曰目容端不睇視也又曾子曰十目所視十手所指其嚴乎傳曰宋華父督見孔父之妻于路目逆而送之曰美而艷又曰富辰曰目不別五色之章為昧又曰子王使鬭勃請戰曰請與君之士戲君憑軾而觀之得臣與寓目焉又曰楚子將以啇臣為太子訪諸令尹子上子上曰楚國之舉恒在少者且是人也蜂目而豺聲忍人也不可立也又曰秦伯伐晉取羈馬乃出戰交綏古名退軍為交綏秦晉志未敢堅戰兵未致爭而兩軍退故曰交綏秦行人夜戒晉師曰兩軍之士皆未憖也明日請相見憖缺也庾駢曰使者目動而言肆懼我也將遁矣薄諸河必敗之又曰宋華元為植巡功植將主也城者謳曰睅其目皤其腹棄甲而復睅出目皤大腹棄甲謂師也于思于思棄甲復來于思多鬚之貌又曰潞子嬰兒之夫人晉景公之姊也酆舒為政而殺之又傷潞子之目又曰晉楚將戰晉侯筮之卜史曰吉卦遇復曰南國蹙射其元王中厥目及戰共王中目又曰叔孫豹會晉士丐于柯盟于督陽荀偃癉疽生瘍於頭癉疽惡瘡濟河及著雍病目出卒而視不可唅目開口禁也宣子盥而撫之曰事吳敢不如事主猶視大夫稱主欒懷子曰其為未卒事於齊故也懷子欒盈也乃復撫之曰茍終所不嗣事于齊者有如河乃瞑受唅嗣續也又曰宋公子地有白馬四公嬖向魋欲之向魋司馬植魋卜也公取而朱其尾鬣以與之與魋之地怒使其徒奪之魋懼將走公閉門而泣之目盡腫, WYG: ''}
