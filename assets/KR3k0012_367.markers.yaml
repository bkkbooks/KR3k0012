  - {type: variant, offset: 35, length: 354, content: 色不忘乎耳目不絕乎聲傳富辰諫曰耳不聽五聲之和為聾又曰晉襄公卒靈公少晉人以難故欲立長君使先蔑士會如秦逆公子雍秦康公送公子雍于晉曰文公之入也無衛故有呂郤之難乃多與之徒穆嬴日抱太子以啼于朝曰先君何罪其嗣亦何罪舍適嗣不立而外求君將焉寘此出朝則抱以適趙氏頓首於宣子曰先君奉此子也以屬諸子曰此子也才吾受子之賜不才吾唯子之怨今君雖終言猶在耳而棄之若何宣子與諸大夫皆患穆嬴且畏偪畏國人以大義來偪也乃背先蔑而立靈公以禦秦師又曰攝叔曰吾聞致師者右入壘折馘折馘斷耳執俘而還皆行其所聞而復又曰林雍羞為顏鳴右下羞為右改下車戰也苑何忌取其耳不欲殺雍但截其耳以辱之詩曰君子無易由言耳屬于垣又曰匪手雋之言示之事匪面命之言提其耳我非且以手攜挈之親視以其事之是非我非旦語之親提撕其耳此言教道易曰荷校滅耳聰不明也又曰巽而耳目聰明語曰六十而耳順穀梁, SBCK: ''}
