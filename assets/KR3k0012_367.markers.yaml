  - {type: variant, offset: 2471, length: 89, content: 欲刃相如相如張目叱之左右皆靡秦王不懌為一擊缶又曰越王無殭與中國爭強北伐齊齊威王使人說越王越王不納齊使者曰幸也越之不亡也吾不貴其用智如目之見毫毛而不自見睫也今王知晉之失計不知越之過, SBCK: 問禁}
  - {type: variant, offset: 2471, length: 0, content: '', WYG: 問禁是何等瘡禁叩頭服状博笑曰大丈夫固時有是因親信以為耳目江表傳曰孫策殺呉郡守許貢貢奴客潜民間}
