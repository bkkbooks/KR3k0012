  - {type: variant, offset: 4722, length: 0, content: '', SBCK: 齊世祖之征潁川也有皇角王淵者善相人見其容止竊議曰此不作大物㑹是垂涕洟者謂太原公洋也崔􅀇瀬郷記曰老子鼻􅀟柱養生經曰鼻者心之門頞􅀃文曰頞鼻莖也頞烏􅁑切釋名曰頞鞍也偃折如鞍也史記曰唐舉謂蔡澤曰先生魋顔蹙齃殆不相乎}
  - {type: page-break, offset: 4722, content: '', id: KR3k0012_SBCK_367-5b}
  - {type: variant, offset: 4722, length: 0, content: '', WYG: 杜黄裳性雅澹寛恕心雖從長口不忤物老子曰五味令人口爽管子曰桓公與管仲謀伐莒未發已聞於國東郭郵至公問之曰子言伐莒乎東郭曰君子善謀小人善意臣視二君在堂上口開不合言莒也荘子曰公孫龍口嗑而不合舌舉不下鬼谷子曰口者機開也所以開閉情意也又曰口可以食不可以言周生烈子曰口者言之門河圖曰秦始皇虎口日角陸賈新語曰衆口所毁浮石沉木羣邪相抑以曲為直説苑曰口者開也舌者機也出言不審駟馬不能追也吳越春秋曰越王勾踐入于呉呉王病大便太宰嚭奉溲惡以出勾踐嘗之}
  - {type: page-break, offset: 4722, content: '', id: KR3k0012_WYG_367-14b, image: WYG0896/WYG0896-0274d.png}
  - {type: page-break, offset: 4722, content: '', id: KR3k0012_WYG_367-15a, image: WYG0896/WYG0896-0275a.png}
  - {type: variant, offset: 4722, length: 0, content: '', krp: 齊世祖之征潁川也有皇角王淵者善相人見其容止竊議曰此不作大物㑹是垂涕洟者謂太原公洋也崔玄瀬郷記曰老子鼻雙柱養生經曰鼻者心之門頞說文曰頞鼻莖也頞烏葛切釋名曰頞鞍也偃折如鞍也史記曰唐舉謂蔡澤曰先生魋顔蹙齃殆不相乎}
  - {type: variant, offset: 4723, length: 0, content: '', SBCK: 漢書曰周爕字伯彦􅀄生顩頥折頞醜甚母欲弃之其父不聽曰吾聞賢聖多有異興我宗者乃此於是寳之顩玄拴切吴書曰諸􅁑恪字元遜瑾長子少知名少􅁂眉折頞廣顙莊子曰髑髏深嚬蹙頞曰豈能捨南面王樂而爲人生哉吕氏春秋曰文王好食昌葅孔子蹙頞而食之楊雄解嘲曰蔡澤山東匹夫也顩頥折頞涕唾流沬口􅀃文曰口者人之所以言食釋名曰口空也禮曰曽子謂子思曰伋吾執親之喪也水漿不入於口者七日又曰晉人謂趙文子知人文子其中退然如不勝衣中身也退知柔貌其言呐呐然如不出諸其口呐呐舒小貌音如恱切又玉藻曰口容止不安動也又少儀曰燕侍道於君子數噍母爲口容口容弄口噍才􅀏切又祭義曰惡言不出於口又緇衣曰小人溺於水君子溺於口口費而煩易出難悔易以溺人言口多空言且煩數也過言一出駟馬不能及不可得悔也口舌所覆亦如溺也傳曰鄭伯使許大夫百里奉許叔以居許東偏曰寡人有弟不能和恊而使糊其口於四方其况能乆有許乎又曰口不道忠信之言爲嚚又曰子玉使伯棼請戰曰非敢必有功也願以間執䜛慝之口又曰晏子曰君民者豈以陵民社稷是主臣君者豈爲口實社稷是養言君不徒居民上臣不徒求禄皆爲社稷又曰正考父佐戴武宣三命滋益恭故其鼎銘云一命而僂再命而傴三命而俯饘於是粥於是以糊余口又曰費無極言於楚子曰建與伍奢將以方城之外叛王執伍奢使城父司馬奮陽殺太子未至而使遣之知太子􅁈故遣令去太子建奔宋王召奮陽奮陽使城父人執巳以至王曰言出於余口入於爾耳誰告建也詩正月曰好言自口莠言自口莠醜也又十月之交曰無罪無辜讒口囂囂書序曰濟南伏生年過九十失其本經口以傳授又曰大禹謨曰惟口出好興戎朕言不再好謂賞善戎謂伐惡言口榮辱之主慮而言宣也成於一也又盤庚上曰相時憸民猶胥顧于箴言其發有逸口言憸利小人尚相顧於箴悔之言恐君其發動有過口之患也又􅀃命曰惟口起羞易􅀃卦曰兊爲口論語公冶長曰或曰雍也仁而不侫子曰禦人以口給屢憎於人又曰陽貨曰惡利口之覆􅀖家者公子翬謟于隱公謂隱公曰百姓安子諸侯􅀃子盍終爲君矣隱公曰否使脩菟裘吾將老焉公子翬恐􅀂其言聞于桓於是謂桓公曰吾爲子口隱矣孝經援神契曰舜大口又曰孔子海口言􅀂含澤論語擇輔像曰子貢斗星繞口南容升又曰太公大口鼻有伏藏史記曰周厲王得衛巫使􅁥謗者以告則殺之其謗鮮矣王喜告召公吾能弭謗矣召公曰是障之也防民之口甚於防水水壅而潰傷人必多民亦如之民之有口也猶土之有山川也財用於是乎出猶其有原隰衍沃也衣食於是乎生口之宣言也善敗於是乎興行善而備敗所以産則用衣食者也夫民慮之於心而宣之於口成而行之􅀂壅其口其與能幾何王不聽於是國人莫敢出言又曰季桓子受齊女樂三日不聽政又不致膰俎於大夫膰音煩孔子遂行而師已送曰夫子則非罪孔子曰吾歌可夫歌曰彼婦之口可以出走彼婦之謁可以死敗言婦人之口請謁是以憂使死人敗故可以出走也又曰鄧公曰吴王爲反數十年矣發怒於削地以誅晁錯爲名其意非在錯也且恐天下之士噤口不敢復言漢書曰漢王擊}
