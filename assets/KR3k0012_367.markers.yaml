  - {type: variant, offset: 1253, length: 886, content: 手捋面而龍虎皆飛去地十餘丈而雲氣繞龍風來吹虎俄而以手一揮龍虎皆還入耳高士傳曰堯聘許由為九州牧由聞之洗耳於河列仙傳曰務光夏時人耳長七寸陽都女耳細而長眾皆言此天人也又曰甯先生毛身廣耳阮丘耳長六七寸列士傳曰燕丹師田光往候荊軻值軻醉唾其耳中軻覺曰此出口入耳之言必大事也即往見光列女後傳曰劉仲敬妻者沛國桓林之姊也仲敬早亡桓乃引刀割耳宗婦問之桓曰吾自五代以來世知名男以忠孝顯女以貞順稱家以我年少必相嫁故預自裁割以信我心又曰曹文叔妻譙國夏侯寧之女文叔早亡妻斷髮自誓其家欲嫁之又截兩耳司馬太傅美之乞為曹氏後又曰陽華穆妻者下邳劉方之女字桃樹生一男而穆早亡吳丁諿音緝求之諿知名之士家將許焉桃樹乃操刀割耳其子又亡桃樹乃安身守正動不諐禮愆音傜長沙耆舊傳曰太尉劉壽少遇相師相師曰耳為天柱今君耳城郭必典家邦樊氏相法曰耳門不容麥歲至百兼富目釋名曰目默也謂默而內識也眼限也童子限限而出也禮曰目者氣之清明者也又玉藻曰目容端不睇視也又曾子曰十目所視十手所指其嚴乎傳曰宋華父督見孔父之妻于路目逆而送之曰美而艷又曰富辰曰目不別五色之章為昧又曰子王使鬭勃請戰曰請與君之士戲君憑軾而觀之得臣與寓目焉又曰楚子將以啇臣為太子訪諸令尹子上子上曰楚國之舉恒在少者且是人也蜂目而豺聲忍人也不可立也又曰秦伯伐晉取羈馬乃出戰交綏古名退軍為交綏秦晉志未敢堅戰兵未致爭而兩軍退故曰交綏秦行人夜戒晉師曰兩軍之士皆未憖也明日請相見憖缺也庾駢曰使者目動而言肆懼我也將遁矣薄諸河必敗之又曰宋華元為植巡功植將主也城者謳曰睅其目皤其腹棄甲而復睅出目皤大腹棄甲謂師也于思于思棄甲復來于思多鬚之貌又曰潞子嬰兒之夫人晉景公之姊也酆舒為政而殺之又傷潞子之目又曰晉楚將戰晉侯筮之卜史曰吉卦遇復曰南國蹙射其元王中厥目及戰共王中目又曰叔孫豹會晉士丐于柯盟于督陽荀偃癉疽生瘍於頭癉疽惡瘡濟河及著雍病目出卒而視不可唅目開口禁也宣子盥而撫之曰事吳敢不如事主猶視大夫稱主欒懷子曰其為未卒事於齊故也懷子欒盈也乃復撫之曰茍終所不嗣事于齊者有如河乃瞑受唅嗣續也又曰宋公子地有白馬四公嬖向魋欲之向魋司馬植魋卜也公取而朱其尾鬣以與之與魋之地怒使其徒奪之魋懼將走公閉門而泣之目盡腫, SBCK: 輔車牙車}
