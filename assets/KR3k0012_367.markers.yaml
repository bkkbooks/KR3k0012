  - {type: variant, offset: 4692, length: 0, content: '', WYG: 能制物鐵鑚為用亦噬嗑之意而從上下何也弼荅曰口之下動上使下也鐵鑚之用上斬下也烈祖稱善南史曰謝朏出為吳興郡守與弟瀹於虜諸送别朏指瀹口曰此中唯宜飲酒唐書曰郝處俊孫象賢垂拱中坐事伏法臨刑言多}
