  - {type: variant, offset: 4672, length: 0, content: '', WYG: 人莫敢出言又曰季桓子受齊女樂三日不聼政又不致膰俎於大夫孔子遂行而師已送曰夫則非罪孔子曰吾歌可矣歌曰彼婦之口可以出走彼婦之謁可以死敗言婦人之口請謁是以憂使人死敗故可以出走也又曰鄧公曰吳王為反數年矣發怒於削地以誅晁錯為名其意非在錯也且恐天下之士口禁不復敢言漢書曰漢王擊魏豹}
