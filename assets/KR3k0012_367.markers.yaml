  - {type: variant, offset: 4748, length: 7, content: 彼各為主何罪乃, krp: 不讀謝詩三日覺曰臰舌釋名曰舌洩也舒洩所當言也詩雨無正曰哀哉不能言匪舌是出維躬是悴又曰婦有長舌維厲之階又抑曰莫捫朕舌言不可逝矣論語顔淵曰子貢曰惜乎夫子之說君子也駟不及舌春秋元命苞曰舌之爲言逹也陽立於三故古在口中者長三寸象斗玉衡隂合有四故舌淪入溢音益内者長四寸宋均曰玉衡三星也魁四星也孝經鈎命決曰仲尼舌理七重陳機授度史記曰平原君旣巳定從而歸至於趙曰今毛生以三寸之舌強於百萬之師又曰留侯曰今以三寸之舌爲帝者師封萬户位列侯此布衣之極於良足也又曰張儀常從楚相飲巳而失璧門下意儀盗璧共執掠笞數百不服}
  - {type: variant, offset: 4751, length: 4, content: 主何罪乃, WYG: 言逹也陽立于三故舌在口中者長三寸象斗玉衡陰合有四故口論舌溢内者長四寸朱均曰玉衡三星也魁四星也孝經鉤命决曰仲尼舌理七重陳機授度史記曰平原君既已定從而歸至于趙曰今毛生以三寸之舌强于百萬之師又曰留侯曰今以三寸之舌為帝者師卦萬户位列侯此布衣之極于良足也又曰張儀常從楚相飲已而失璧門下意儀盗璧共執掠笞數百不服}
