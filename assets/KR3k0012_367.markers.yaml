  - {type: variant, offset: 4757, length: 0, content: '', SBCK: 其妻曰嘻子無讀書遊􅀃安此辱乎儀張口謂其妻曰視吾舌尚在否妻曰君舌在也儀曰足矣又曰郭解任俠有儒生侍使者坐客譽郭解生曰郭解專以姧犯法公何謂賢解客聞之殺此生斷其舌漢書曰蒯通謂韓信曰酈生一士伏軾掉三寸舌下齊七十城又曰東海公賔就斬王莽傳詣更始懸於宛市百姓共提擊之或切食其舌後漢書曰馬援與隗囂將楊廣書曰豈有知其無成而但萎腇咋舌义手從族乎萎腇軟弱也萎音於罪切腇音也罪切張璠漢記曰董卓於衆坐生斬人手足又鑿目截舌口百姓嗷嗷道路以目英雄記曰曹操與劉備密言備泄於􅀽紹紹知操有圖國之意操自咋其舌流血以失言誡後世魏末傳曰諸􅁑誕殺樂綝有典農都尉數䜛誕於是收而斬之罵曰卿坐舌先使人以竹攙其舌然後殺之攙音䜛又楚金切刾之也晉中興書曰温嶠密啓肅祖陳王敦作難敦聞曰果爲小物所欺乃募有能生得嶠者吾當手拔其舌晉書曰鳩摩羅什年七歳出家日誦千偈後死姚興依外國法焚屍薪滅形碎唯舌不爛沈約宋書曰南郡王義宣生而舌短言澁唐書曰波斯國俗法有罪者火燒鐵灼其舌瘡白者爲理瘡黒者爲有罪燕丹子曰荆軻見燕太子太子曰田先生今無恙乎軻曰光送軻之時言太子戒以國事恥以丈夫而不可向軻吞舌而死郭子曰殷仲堪云三日不讀道德論便􅁴舌本間強山海經曰反舌國其人反舌一曰交􅀃苑曰桓公飲管仲酒棄其半公問其故對曰臣聞酒入者舌出舌出者身棄臣謂棄身不如棄酒又曰韓子問叔向曰剛與柔孰堅叔向曰臣年八十齒再落而舌尚存是知剛不如柔也楊子法言曰五常者帝王之筆舌寧有書不由筆言不由舌也搜神記曰永嘉中有天竺胡人能斷舌先吐舌示賔客然後乃截血流覆地乃取置器中傳以示人取舌還合有頃如故桂陽先賢傳曰采陽陵字遂文果而好義郡長汲府君爲州所章陵􅀍掠考叅加五毒陵乃截舌以着盤中獻之廷尉羣公咸共議之事得清理又曰臨武程桓少有才藝爲九江主記􅁺府君爲人所章桓􅀍徴詣臺徐郎中委郎詣州乞就考於格上拔刃截舌}
