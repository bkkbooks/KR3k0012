  - {type: variant, offset: 4724, length: 2, content: 昭成, SBCK: 豹謂酈食其曰魏大將者其人爲誰曰柏直也漢王曰是口尚乳臰又曰髙祖欲廢太子周昌諌曰臣口不能言心知不可又曰良藥苦口利於病又曰張蒼免相後口無齒食乳女子爲乳母又曰條侯周亞夫相曰從理入口法餓死又曰揚雄口吃不能劇談又曰王莽爲人哆口哆唱者切東觀漢記曰光武爲人日角大口美湏眉又曰明徳馬后身長七尺三寸青白色方口美髮後漢書曰馬援在交阯還書戒兄子曰龍伯髙敦厚周愼口無擇言謙約節儉廉公有威吾愛之重之應劭漢官曰侍中乃存年老口􅆨}
