  - {type: variant, offset: 2997, length: 5, content: 甘卓為揚威, SBCK: 大駕北伐成都王潁統王師於蕩隂敗績上傷頰失六璽左右奔走三國典略曰梁謝荅仁聞侯景奔乃自東陽率衆候之至錢塘間趙伯超曰公得何消息而閉門見拒伯超曰汝頰邊頞有耳否侯王巳死逺近悉平君}
  - {type: variant, offset: 2997, length: 5, content: 甘卓為揚威, krp: 大駕北伐成都王潁統王師於蕩隂敗績上傷頰失六璽左右奔走三國典略曰梁謝荅仁聞侯景奔乃自東陽率衆候之至錢塘間趙伯超曰公得何消息而閉門見拒伯超曰汝頰邊頞有耳否侯王巳死逺近悉平君}
  - {type: variant, offset: 3003, length: 6, content: 軍歷陽內史郡, SBCK: 此兵欲向何處荅仁曰審如公言死無所恨淮南子曰厭音父在頰則好在顔則醜王子年拾遺録曰孫和月下舞水精如意悮傷鄧夫}
