  - {type: variant, offset: 2782, length: 210, content: 根詐死三日目中生蛆魏志曰太祖與韓遂馬超等軍馬會語左右皆不得從唯將許褚超負其力陰欲前突太祖素聞褚勇疑從騎是乃問公有虎侯者安在太祖顧指褚瞋目眄之超不敢動又曰張繡反襲太祖營典韋戰於門中韋乃雙挾兩賊擊殺之餘賊不敢進復前突殺數人瘡重瞋目大罵而死又曰夏侯燉音敦從征呂布為流矢所中傷左目時夏侯淵與燉俱為將軍軍中號燉為盲夏侯晉書曰王衍嘗因宴集為族人所怒舉擂音壘擲其面衍初無言引王導共載而去然心不能平在車中攬鏡自照謂爾看吾目光乃在牛背上矣, SBCK: ''}
