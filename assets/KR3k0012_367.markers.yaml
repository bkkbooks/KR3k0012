  - {type: variant, offset: 4742, length: 0, content: '', SBCK: 食苓草以亂其氣曹瞞别傳曰操遨逰無度其叔數語其父操後行逢叔於道陽敗面爲口云中􅁀風叔告其父父呼見之操面如故從此叔言不復入信操益得縱恣爲王也杜如體論曰束脩之業其上在於不言諺曰口如鼻至老不失􅀓子曰擬金人銘作口銘云神以感通心由口宣福生有兆禍來有端情莫多妄口莫多言蟻孔潰河溜穴傾山病從口入禍從口出存亡之機開闔之術口與心謀安危之源樞機之發榮辱存焉王子年拾遺録曰昔伯禹入穴乃至一室裏一人身如蛇鱗於石上口吐一王簡以受禹簡長十二寸以量度天地又曰始皇二年謇消國善􅀞工者名烈裔口含丹墨噴壁即成龍雲之隊又曰沐胥國人年九萬歳以口噴水爲􅀨紛漫數十里俄而口吹爲風而􅀨皆止瀬郷記李母碑曰老子方口養生經曰軍營之中有甘泉注云軍營口也甘泉唾也又曰口爲華池相書曰大容手赤如丹貴壽又曰}
