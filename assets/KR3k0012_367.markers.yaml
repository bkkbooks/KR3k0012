  - {type: variant, offset: 3018, length: 0, content: '', SBCK: 於是獨往食輙含飯著兩頰還吐與二小兒後並得存過江公亡翼時爲剡縣解職歸席苫於公靈床}
  - {type: variant, offset: 3018, length: 0, content: '', krp: 於是獨往食輙含飯著兩頰還吐與二小兒後並得存過江公亡翼時爲剡縣解職歸席苫於公靈床}
  - {type: variant, offset: 3019, length: 1, content: 低, SBCK: 心喪三年鼻釋名曰鼻嘒也出氣嘒嘒也公羊傳僖公曰邾婁人執鄫子用之社蓋叩其鼻以血社也孝經援神契曰伏羲山凖禹虎鼻史記范睢傳曰蔡澤遊學于諸侯小大甚衆而不遇從唐舉相舉熟}
  - {type: page-break, offset: 3019, content: '', id: KR3k0012_SBCK_367-3a}
  - {type: variant, offset: 3019, length: 1, content: 低, krp: 心喪三年鼻釋名曰鼻嘒也出氣嘒嘒也公羊傳僖公曰邾婁人執鄫子用之社蓋叩其鼻以血社也孝經援神契曰伏羲山凖禹虎鼻史記范睢傳曰蔡澤遊學于諸侯小大甚衆而不遇從唐舉相舉熟}
  - {type: variant, offset: 3021, length: 2, content: 仰目, SBCK: 而􅀏曰先生􅂚鼻巨肩魋顔戲齃膝攣吾聞聖人不相殆先生乎戰國䇿曰􅂫子南使齊謂齊王曰臣聞當世之主必誅􅁀正亂今宋王射天笞地鑄諸侯之像使侍屏匽展其臂彈其鼻此天下無道而王弗伐王名終不成矣魏志曰管輅舉秀才何晏請曰試爲我作一卦知位當至三公否又連夢青蠅數十來集鼻上驅之不去輅曰鼻者天}
  - {type: variant, offset: 3021, length: 2, content: 仰目, krp: 而笑曰先生曷鼻巨肩魋顔戲齃膝攣吾聞聖人不相殆先生乎戰國䇿曰蘇子南使齊謂齊王曰臣聞當世之主必誅暴正亂今宋王射天笞地鑄諸侯之像使侍屏匽展其臂彈其鼻此天下無道而王弗伐王名終不成矣魏志曰管輅舉秀才何晏請曰試爲我作一卦知位當至三公否又連夢青蠅數十來集鼻上驅之不去輅曰鼻者天}
