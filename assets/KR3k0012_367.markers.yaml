  - {type: variant, offset: 3840, length: 155, content: 顙是黃帝之形貌也郭子曰劉尹道桓溫鬚如反蝟毛眼如紫石稜自是孫仲謀一流人也抱朴子曰眼能察天衢而不能周項領之間蔣子語曰兩目不相為視昔吳有二人共評王者一人曰好一人曰醜久之不決二人各曰爾可來入吾目中則好醜分矣王有定形二人察之有得失非茍相反眼睛異耳袁準正書曰目以見小為明耳以聽大為聰顧子義訓曰假天下之目以視則四海毫末可見也, SBCK: 鼻}
