  - {type: variant, offset: 1343, length: 278, content: 白華菅兮白茅束兮又題綱曰白華野菅草也其性柔刃堪用取此白華而將白茅束之喻申后被褒姒所代惡人蒙善好人見棄也左傳成公九年曰雖有絲麻無棄菅蒯雖有姬姜無棄憔悴周書曰成王時會稽人獻以菅會或作禽亦東南蠻菅草堅刃山海經曰天帝之山其下多菅異物志曰香蓿似茅而葉長大於茅不生洿下之地生丘陵山崗凡所蒸享必得此菅苞裹助調五味益其芬菲茅爾雅曰藗音速壯茅也白茅屬易泰卦曰拔茅茹以其彙征吉王弼注曰茅之為物拔其根而相牽引也茹相牽引之貌也彙類也陽以其類引而升故為茹而征吉象曰拔茅征吉志在外也又大過卦曰藉用白茅慎之至也尚書禹貢曰荊州厥貢苞匭菁茅孔安國曰茅蓿酒也毛詩鵲巢野有死麕曰野有死麕白茅苞之, WYG: ''}
