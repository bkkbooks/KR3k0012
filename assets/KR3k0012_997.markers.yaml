  - {type: variant, offset: 2737, length: 1, content: 根, WYG: 又名愁婦草亦名孀草人呼為寡婦莎盖相思之流也蒺蔾爾雅曰茨蒺蔾也布地葛生細葉}
  - {type: variant, offset: 2737, length: 20, content: 根子可用染也千畦薑韭其人皆與千戶侯等山海, krp: ''}
  - {type: variant, offset: 2739, length: 0, content: '', WYG: 有三角刺人易困卦曰困于石據于蒺藜入于其宫不見其妻凶毛詩牆有茨衞人刺其上也曰牆有茨不}
  - {type: page-break, offset: 2739, content: '', id: KR3k0012_WYG_997-11a, image: WYG0901/WYG0901-0719a.png}
  - {type: variant, offset: 2740, length: 2, content: 用染, WYG: 掃}
  - {type: punctuation, offset: 2743, content: ，, id: KR3k0012_CHANT_997-bkkpn1085}
  - {type: 'tls:seg', offset: 2743, content: '', id: KR3k0012_CHANT_997-56a.9}
  - {type: variant, offset: 2743, length: 4, content: 千畦薑韭, WYG: 晉中興書徴祥説曰義熈中宫城上及御道左右皆生蒺藜亦草妖也說苑曰晉平公置酒虒祁之臺使郎中馬章布蒺藜於階上令召師曠師曠至履而上堂仰天歎曰夫肉生蟲還自食木生蠧還自刻人興妖還自賊五鼎之具不當生藜藿人主堂不當生蒺藜來月八日修百官立太子君將死矣至期果死又曰陽虎得罪于衛北見簡子曰自今以來不復樹人矣簡子曰何哉陽虎對曰夫堂上之人吾所樹者過半朝廷之吏邉境之士臣所立者亦過半矣今夫堂上之人親却臣於君朝廷之吏親危臣於法邉境之士親刼臣於外簡子曰唯賢者為能報恩不肖者不能夫樹桃李者夏得}
  - {type: page-break, offset: 2743, content: '', id: KR3k0012_WYG_997-11b, image: WYG0901/WYG0901-0719b.png}
  - {type: punctuation, offset: 2747, content: ，, id: KR3k0012_CHANT_997-bkkpn1086}
  - {type: 'tls:seg', offset: 2747, content: '', id: KR3k0012_CHANT_997-56a.10}
  - {type: variant, offset: 2748, length: 0, content: '', WYG: 休息秋得其食馬樹蒺藜者夏不得休息秋得其刺焉今子之所樹者蒺藜也非桃李也自今以來擇}
  - {type: page-break, offset: 2748, content: '', id: KR3k0012_WYG_997-12a, image: WYG0901/WYG0901-0719c.png}
  - {type: variant, offset: 2749, length: 1, content: 皆, WYG: 而樹毋己樹而擇也續搜神記曰沛國一士人姓周生三兒向應可語便啞有一人逕門過乞飲曰君有罪可還内自思我於外待君主人異其言乃知非常人便入内思諐􅄽同出謂客曰昔為小兒時鷰巢中有三子試以指内巢中鷰子亦出口承之乃取三蒺藜}
  - {type: variant, offset: 2751, length: 6, content: 千戶侯等山海, WYG: 其子其子吞之即死其母尋還不復見其子出徘徊悲鳴而去有此事今甚悔之客曰是矣便聞其兒言語周正客乃去不知所在也本草}
