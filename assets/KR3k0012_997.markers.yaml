  - {type: variant, offset: 1635, length: 0, content: '', WYG: 沙在泥與之皆黒晏子曰魯哀公失國走齊景公問焉曰子之年甚少矣道至于此乎哀公對曰吾少之時人多愛我}
  - {type: punctuation, offset: 1636, content: ，, id: KR3k0012_CHANT_997-bkkpn623}
  - {type: 'tls:seg', offset: 1636, content: '', id: KR3k0012_CHANT_997-31a.8}
  - {type: variant, offset: 1636, length: 6, content: 古用包褁禮物, WYG: 吾體不能親人多諫我者吾忌不能從}
