  - {type: variant, offset: 1531, length: 1125, content: 根而相牽引也茹相牽引之貌也彙類也陽以其類引而升故為茹而征吉象曰拔茅征吉志在外也又大過卦曰藉用白茅慎之至也尚書禹貢曰荊州厥貢苞匭菁茅孔安國曰茅蓿酒也毛詩鵲巢野有死麕曰野有死麕白茅苞之陸機毛詩䟽義曰白茅苞之茅之白者古用包褁禮物以充祭祀縮酒用之毛詩豳七月曰晝爾于茅宵爾索綯周禮天官上甸師曰祭祀供蕭茅左傳僖上曰齊侯伐楚謂楚曰爾貢苞茅不入王祭不供無以縮酒寡人是徵史記封禪書曰管仲說齊桓公古之封禪江淮之間一茅三脊所以為藉孟康曰所謂零茅也典略曰武王伐殷微子啟肉袒面縛牽羊把茅膝行而前吳書曰徐盛與曹休戰賊積茅草欲焚盛盛燒舩而去賊一無所得吳錄地理志曰桂楊郴縣有青茅可染青零陵泉陵有香茅古貢之縮酒吳志曰劉備連營挑戰陸遜曰吾已曉破之術乃勑各持一把茅以火攻拔之遜率諸軍同時俱攻破其四十餘營晉書地道志曰零陵縣有香茅氣甚芬香古貢之以縮酒沈約宋書曰江夏王義恭大明年有脊茅生后頭西岸又累表勸上封禪上甚悅之唐書曰開元十三年撫州三脊茅生石頭六韜曰文王畋于渭陽見呂尚坐茅以漁文王勞而問焉莊子曰小巫見大巫拔茅而棄此其所以終身弗如尹文子曰堯為天子衣不重帛食不兼味土階三尺茅茨不剪尹子曰湯禱旱素車白馬布衣身嬰白茅以身為牲說文曰茅菅也陸賈新語曰伊尹居負薪之野修道德於茅廬之下風俗通曰謹案詩曰手如柔荑者茅始熟中穰也既白且滑漢武故事曰帝拜欒大為天道將軍使著羽衣立白茅上授玉印大亦羽衣立白茅上授印示不臣也神仙傳曰介象受氣禁術能茅屋上燃火煮雞使茅不焦又曰曹公捕左慈數日不得便斷頭曹公大喜定視之是一束茅耳盛弘之荊州記曰零陵郡有香茅桓公所以責楚廣州記曰董奉與士爕同處數積載思欲還豫章爕情拘留不能免後乃託以病死變開棺看乃是茅人楚辭曰蘭芷變而不芳兮荃蕙化而為茅揚雄反騷曰費椒楫以要神兮又勤索彼瓊茅一莖三脊茅紫草爾雅曰藐芘草也郭璞曰可以染紫也一名芘䓞廣雅云廣雅曰紫艿紫草也艿音仍說文曰芘藐紫草山海經曰勞山多芘草一名紫英尋陽記曰石井山曾有行人見山上有採紫草者此人謂村人揭鍤而往見山上人便去聞有呼昌容者曰人來取爾草既至山頂寂寞無所見列仙傳曰昌容常山之道士也自稱殷王女二百餘年而顏色如少能致紫草與染家得錢以遺孤老淮南子曰紫草生於山不能生盤石之上枹朴子曰黃金成以為丸以紫草煮一丸咽其汁可百日不飢博物志曰平氏陽山紫草特好其他者色淺吳氏本草曰紫草節赤二月花本草曰紫草一名地血藍毛詩魚藻采綠曰終朝採藍不盈一襜襜衣蔽膝也禮記月令曰仲夏之月令民刈藍以染為陽長也此月藍始可刈謝承後漢書曰弘農楊震字伯起常種藍自業諸生恐震年大助其功傭震喻而罷之孫卿子曰青生於藍而青於藍秦子曰常聞仁人當如園圃之藍不異眾草染而後彰趙岐藍賦序曰余就毉偃師道經陳留此境人皆以種藍染紺為業藍田彌望黍稷不殖慨其遺本遂作賦一章蒨爾雅曰茹蘆音蒨茅蒐郭璞注曰令之蒨可以染絳, SBCK: 妻凶}
