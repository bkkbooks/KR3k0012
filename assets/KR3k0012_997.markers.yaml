  - {type: variant, offset: 1632, length: 1, content: 茅, WYG: 為言耆也百年一本生百莖此草木}
  - {type: variant, offset: 1634, length: 0, content: '', WYG: 夀知吉凶者也聖人以問鬼神焉說文曰蓍蒿屬也生千嵗三百莖易以為數天子蓍九尺諸候七尺大夫五尺士三尺史記傳曰天下和平王道得而蓍莖長文其叢生滿百莖今世取八十莖長八尺即難得矣六十莖長六尺即可用也淮南子曰上有叢蓍下有神龜論衡曰蓍生七十嵗生一莖七百嵗生十莖神靈之物故遲也蓬爾雅曰齧彫蓬薦黍蓬别蓬種類尚書大傳曰子夏於壤室編蓬戸彈琴瑟以歌先王之風可以發憤矣毛詩召南騶虞曰彼茁者蓬蓬萆名也又衞風伯兮曰自伯之東首如飛蓬禮記内則曰射人以桑弧蓬矢六射天地四方桑弧蓬矢本諸太古也天地四方男子所有事也禮記儒行篇曰蓬戸甕牖編蓬為户也魏畧曰鮑出值飢餓採蓬實得數斗為母作食三輔决録曰張仲蔚平陵人也與同郡魏景卿俱隠身不仕明天官愽物好屬詩賦所居蓬蒿没人管子曰無法程式飄揺而無所定謂之飛蓬之間明王聴此言曽子曰蓬生麻中不扶自直}
