  - {type: variant, offset: 53, length: 1, content: 寒, SBCK: 諸侯王盭音戾綬如淳曰盭緑出晉灼曰盭草名日出瑯瑘平昌縣似艾可染因以爲綬名蒿爾雅曰蘩皤蒿郭璞注曰蒿也蒿葭也郭璞注曰今人採青蒿香中炙㗖者爲葭也葭愆刀切蔚牡菣無子者又曰蘩之醜秋爲蒿醜􅀋也春時各有種名至秋老成皆通吁爲蒿大戴記曰周時德澤洽和蒿茂大以爲蒿柱名爲蒿宫此天子之}
  - {type: variant, offset: 53, length: 18, content: 寒露之日鴻鴈來賓又五日菊有黃華無華土, WYG: 苦菜也}
  - {type: variant, offset: 53, length: 1, content: 寒, krp: 諸侯王盭音戾綬如淳曰盭緑出晉灼曰盭草名日出瑯瑘平昌縣似艾可染因以爲綬名蒿爾雅曰蘩皤蒿郭璞注曰蒿也蒿葭也郭璞注曰今人採青蒿香中炙㗖者爲葭也葭愆刀切蔚牡菣無子者又曰蘩之醜秋爲蒿醜類也春時各有種名至秋老成皆通吁爲蒿大戴記曰周時德澤洽和蒿茂大以爲蒿柱名爲蒿宫此天子之}
  - {type: variant, offset: 55, length: 0, content: '', SBCK: 寢也􅀶物又載陸機毛詩䟽義曰采蘩爾雅曰皤蒿也凢艾色白爲皤今白蒿是也春生秋乃香美可生食蒸一名遊胡北海人謂}
