  - {type: variant, offset: 1743, length: 212, content: 典略曰武王伐殷微子啟肉袒面縛牽羊把茅膝行而前吳書曰徐盛與曹休戰賊積茅草欲焚盛盛燒舩而去賊一無所得吳錄地理志曰桂楊郴縣有青茅可染青零陵泉陵有香茅古貢之縮酒吳志曰劉備連營挑戰陸遜曰吾已曉破之術乃勑各持一把茅以火攻拔之遜率諸軍同時俱攻破其四十餘營晉書地道志曰零陵縣有香茅氣甚芬香古貢之以縮酒沈約宋書曰江夏王義恭大明年有脊茅生后頭西岸又累表勸上封禪上甚悅之唐書曰開元十三年撫州三脊茅生石頭六韜曰文王畋于渭陽見呂尚坐茅以漁文王勞而問焉, WYG: ''}
