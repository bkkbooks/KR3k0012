  - {type: variant, offset: 892, length: 3, content: 焉得諼, WYG: 蒿青蒿也爾雅疏陸機云凡艾色白為皤蒿今白蒿也春生秋乃香美可生食又可蒸一名游胡北海人謂之旁勃又曰匪莪伊蔚蔚牡蒿也似蒿三月始生七月花花似胡麻花而紫赤八月為角角似小豆角鋭而長一名馬新蒿毛詩鹿鳴曰呦呦鹿鳴食野之蒿毛云葭也青蒿詩䟽義曰蒿青蒿也荆豫汝隂皆謂之菣東觀漢記曰杜林寄隗囂地終不降志辱身至簮蒿蓆}
