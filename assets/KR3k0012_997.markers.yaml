  - {type: variant, offset: 1052, length: 253, content: 療愁嵇康養生論云萱草忘憂苜蓿史記曰大宛有苜蓿草漢使取其實來於是天子始種苜蓿離宮別觀旁盡種蒲陶苜蓿極望漢書西域傳曰罽賓國有苜蓿大宛馬嗜苜蓿武帝得其馬漢使採蒲桃苜蓿種歸天子益種離宮別館旁晉書曰華廣免官為庶人晉武帝登凌雲臺見廣苜蓿園阡陌甚整依然感舊太康初太赦乃得襲爵西京雜記曰樂遊苑中自生玫瑰樹下多苜蓿一名懷風時或謂光風在其間常肅肅然照其光彩故曰苜蓿懷風茂陵人謂為連枝草博物志曰張騫使西域所得蒲桃胡蔥苜蓿述異記曰張騫苜蓿園在今洛中苜蓿本胡中菜騫始於西國得之楊衒之洛陽伽藍記曰宣武場在大夏門東北今為光風園苜蓿出焉菅, SBCK: 流也蒺䔧}
