  - {type: variant, offset: 2661, length: 0, content: '', SBCK: 過乞飲曰君有罪可逺内自思我於外待君主人異其言乃知非常人便入内思諐􅄽同出謂客曰昔爲小兒時鷰巢中有三子試以指納巢中鷰子亦出口承}
