  - {type: variant, offset: 1643, length: 1, content: 充, WYG: 内無弼外無輔弼輔無一人謟諛者甚衆譬之猶秋蓬也孤其根本宻其枝葉也說苑不載莊子曰列子食於道見百嵗髑髏攓蓬而指之曰唯予與汝知末曽死未曽生也商君書曰今夫飛蓬遇飄風而行千里者乘風之勢也淮南子曰見飛蓬轉而知為車楚辭曰蓬艾親入御干第兮弟床簀也喻親宻曹植詩曰轉􅅫離本根飄䬙隨長風何意廻颷舉吹我入雲中高高上無極天路安可窮類此流宕子捐軀逺從戎司馬彪詩曰百草應節生含氣有淺染秋蓬獨何華飄䬙隨風轉王朗諌行役夜表曰司空臣朗言朗聞飛蓬隨風集于王梁之衡而駟馬為之奔乳虎為之走蓬非馬之策馬非蓬之敵所以或奔走者驚也蕭爾雅曰蕭荻即蒿音荻毛詩黍離採葛曰彼採蕭兮一日不見如三秋兮詩義疏曰蕭荻蒿也或謂牛尾莖可作燭有香氣故}
