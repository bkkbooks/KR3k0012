  - {type: variant, offset: 2731, length: 0, content: '', WYG: 豆盧寕嘗與梁人企定遇于平凉川相與肄射乃于百歩懸莎草以射之七發五中企定時以為能贈遺甚厚任昉述異記曰昔戰國時魏國苦秦之難有民從征戍秦不返其妻思之而卒既葬塜上生木枝葉皆向夫所在而傾因謂之相思木今秦趙間有相思草狀}
