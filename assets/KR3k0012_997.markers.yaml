  - {type: variant, offset: 77, length: 12, content: 羅含致仕還家階庭忽蘭菊藂, SBCK: 􅀄唐髙祖欲遣李密東征朝士諌曰李密性多輕狡好爲反叛願勿遣之帝曰蒿箭射蒿蘺耳吾豈不知耶三輔決録曰孫晨字元公冬月無􅀍以蒿一東暮卧旦收之神仙服食經曰十一月採彭㝅彭㪍白蒿也兎食之壽八百歳莪蒿爾雅曰莪蘿今莪蒿也亦曰􅅒蒿毛詩曰菁菁者莪樂育材也菁菁者莪在彼中阿又谷風􅖋莪曰􅖋􅖋者莪匪莪伊蒿詩義䟽曰莪蒿也}
  - {type: page-break, offset: 77, content: '', id: KR3k0012_SBCK_997-2b}
  - {type: variant, offset: 77, length: 12, content: 羅含致仕還家階庭忽蘭菊藂, krp: 𥘉唐髙祖欲遣李密東征朝士諌曰李密性多輕狡好爲反叛願勿遣之帝曰蒿箭射蒿蘺耳吾豈不知耶三輔決録曰孫晨字元公冬月無𬒳以蒿一東暮卧旦收之神仙服食經曰十一月採彭㝅彭㪍白蒿也兎食之壽八百歳莪蒿爾雅曰莪蘿今莪蒿也亦曰廩蒿毛詩曰菁菁者莪樂育材也菁菁者莪在彼中阿又谷風􅖋莪曰􅖋􅖋者莪匪莪伊蒿詩義䟽曰莪蒿也}
