  - {type: variant, offset: 317, length: 507, content: 異名或無效者以由不得真菊菊花與薏苡相似直以甘苦別之耳菊甘而薏苦今所在真菊但為少耳神仙傳曰康風子服甘菊花柏實散得仙博物志曰菊有二種苗花如一惟味小異苦者不宜服崔寔四民月令曰九月九日可採菊華王韶之神境記曰滎陽郡西有靈源山其澗生靈芝石茵巖有紫菊風土記曰日精者菭音苔蘠皆菊華莖之別名九月律中無射而數九俗向九日而用候時之草也盛弘之荊州記曰酈縣北八里有菊水其源悉芳菊被崖水甚甘馨太尉胡廣久患風羸恒汲飲水後疾遂瘳年及百歲非唯天壽亦菊所延也名山記曰道士朱孺子吳末入王笥山服菊花乘雲升天本草經曰菊有筋菊有白菊黃菊花一名節花一名傅公一名延年一名白花一名日精一名更生一名陰威一名朱羸一名女菊其菊有兩種一種紫莖氣香而味甘美葉可作羹為真菊一種青莖而大作蒿艾氣味苦不堪食名薏非真菊也吳氏本草經曰菊華一名女華一名女室淮南萬畢術曰以壯菊灰散池中蛙盡死楚辭曰朝飲木蘭之墜露兮夕飡秋菊之落英又曰春蘭兮秋菊長無絕兮終古鍾會菊賦曰縹幹綠葇青柯紅芒華實規圓芳頴四張故夫菊有五美焉圓華高懸准天極也純黃不雜后土色也早殖晚登君子德也冒霜吐頴象勁直也流中輕體神仙食也潘尼秋菊賦曰汎流英於青醴似浮萍之隨波嵇康菊花銘曰煌煌丹菊暮秋彌榮親尊是御永祚億齡若毛詩䟽曰若饒也幽州, WYG: ''}
