  - {type: variant, offset: 879, length: 8, content: 帛煮沐頭髮即黑萱, WYG: 留黄漢書曰諸侯王􅉦音䓞綬如淳曰􅉦綠出晉灼曰􅉦草名也出瑯琊平昌縣似艾可染黄因以為綬名蒿爾雅曰蘩皤蒿郭璞注白蒿也蒿菣也郭璞注曰今人採青蒿香中炙啗者為菣也愆刀切蔚牡菣無子者又曰蘩之醜秋為蒿醜類也春時各有種名至秋老成皆通呼為蒿大戴記曰周時徳澤和洽蒿茂大以為宫柱名為蒿宫此天子之路寢也陸機}
