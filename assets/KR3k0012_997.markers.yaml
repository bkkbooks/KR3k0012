  - {type: variant, offset: 62, length: 9, content: 五日菊有黃華無華土, SBCK: 曰匪莪伊蔚蔚牡蒿牡菣也似蒿三月始生七月花花似胡麻花而紫赤八月爲角角似小豆角銳而長一名馬新蒿毛詩鹿鳴曰􅊯􅊯鹿鳴食野之蒿毛云葭也青蒿詩䟽義曰蒿青蒿也荆䂊汝隂皆謂之葭東觀漢記曰杜林􅀉隗􅅝地終}
