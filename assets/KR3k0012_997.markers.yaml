  - {type: variant, offset: 2659, length: 1, content: 東, SBCK: 牆有茨衛人刺其上也牆有茨不可掃也晉中興書徴祥􅀃曰義熈中宫城上及御道左右皆生蒺䔧亦草妖也􅀃􅁐曰晉平公置酒椃祁之臺使郎中馬童布蒺䔧於階下令召師曠師曠至履而上堂仰天歎曰夫􅁏生蟲還自食木生蠹還自刻人出妖還自得九鼎之具不當生王堂廂不當生蒺䔧來八日脩百官立太子君將死矣至期果死又曰陽虎得罪於衛北見簡子曰自今以來不復樹人矣簡子曰何哉陽虎對曰夫堂上之人吾所樹者過半朝廷之吏邊境之士臣所立者亦過半矣今夫堂上之人親刼臣於君朝廷之吏親危於法邊境之士親刼臣於外簡子曰唯賢者爲能報愚不肖者不能夫樹桃李者夏得其休息秋得食焉樹蒺䔧者夏不得休息秋得其刺焉今子之所樹者蒺䔧也非桃李也自今以來擇人而樹之母以死樹而擇之續捜神記曰沛國一士人姓周生三兒向應可語便啞有一人逕}
