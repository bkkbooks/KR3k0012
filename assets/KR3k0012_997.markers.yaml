  - {type: variant, offset: 1981, length: 314, content: 天子衣不重帛食不兼味土階三尺茅茨不剪尹子曰湯禱旱素車白馬布衣身嬰白茅以身為牲說文曰茅菅也陸賈新語曰伊尹居負薪之野修道德於茅廬之下風俗通曰謹案詩曰手如柔荑者茅始熟中穰也既白且滑漢武故事曰帝拜欒大為天道將軍使著羽衣立白茅上授玉印大亦羽衣立白茅上授印示不臣也神仙傳曰介象受氣禁術能茅屋上燃火煮雞使茅不焦又曰曹公捕左慈數日不得便斷頭曹公大喜定視之是一束茅耳盛弘之荊州記曰零陵郡有香茅桓公所以責楚廣州記曰董奉與士爕同處數積載思欲還豫章爕情拘留不能免後乃託以病死變開棺看乃是茅人楚辭曰蘭芷變而不芳兮荃蕙化而為茅揚雄反騷曰費椒楫以要神兮又勤索彼瓊茅一莖三脊茅紫草爾雅曰藐芘草也郭璞曰可以染紫也一名芘䓞廣雅云廣雅曰紫艿紫草也艿音仍說文曰芘藐紫草, WYG: 箔}
