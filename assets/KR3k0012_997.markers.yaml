  - {type: variant, offset: 497, length: 532, content: 甘馨太尉胡廣久患風羸恒汲飲水後疾遂瘳年及百歲非唯天壽亦菊所延也名山記曰道士朱孺子吳末入王笥山服菊花乘雲升天本草經曰菊有筋菊有白菊黃菊花一名節花一名傅公一名延年一名白花一名日精一名更生一名陰威一名朱羸一名女菊其菊有兩種一種紫莖氣香而味甘美葉可作羹為真菊一種青莖而大作蒿艾氣味苦不堪食名薏非真菊也吳氏本草經曰菊華一名女華一名女室淮南萬畢術曰以壯菊灰散池中蛙盡死楚辭曰朝飲木蘭之墜露兮夕飡秋菊之落英又曰春蘭兮秋菊長無絕兮終古鍾會菊賦曰縹幹綠葇青柯紅芒華實規圓芳頴四張故夫菊有五美焉圓華高懸准天極也純黃不雜后土色也早殖晚登君子德也冒霜吐頴象勁直也流中輕體神仙食也潘尼秋菊賦曰汎流英於青醴似浮萍之隨波嵇康菊花銘曰煌煌丹菊暮秋彌榮親尊是御永祚億齡若毛詩䟽曰若饒也幽州謂之翹饒蔓生莖如勞豆而細葉似蒺藜而青其華細綠色可生食味如小豆藿本草經曰陵若生下濕水中七八月華華紫似金紫草可以染帛煮沐頭髮即黑萱毛詩伯兮曰焉得諼草言樹之背背北堂也願言思伯使我心痗說文曰萱忘憂草也崔豹古今注曰欲忘人之憂則贈以丹棘一名忘憂草也博物志曰神農經曰上藥養性謂合歡蠲忿萱草忘憂風土記曰花曰宜男妊婦佩之必生男又名萱草本草經云萱一名忘憂一名宜男一名歧女錄異記曰婦人帶宜男草生兒束晳發蒙記曰甘棗令人不惑萱草可以忘憂, SBCK: 厚}
