  - {type: variant, offset: 90, length: 0, content: '', SBCK: 澤田漸洳處葉似邪蒿細科二月中生莖葉可食又可蒸香美頗似蔞蒿􅀃文曰莪蒿也從草我聲廣志曰莪蒿䕲蒿錢塘記曰靈隠山􅂖樹樹下生莪鬱茂􅀂沃土所生蔞毛詩關雎漢廣曰言刈其蔞蔞蒿也陸機毛詩義䟽曰蔞葉似艾白長數寸髙尺餘好生水中脆羙可食王芻爾雅曰菉王芻也菉蓐也今呼鴟脚莎吴氏本草曰王芻一名黄草神農雷公生太山山谷治身熱邪氣小兒身􅀬氣􅆱洪範五行傳曰􅆱之爲言􅆱也百年一夲生百莖此草木之壽知􅁻凶者也聖}
  - {type: page-break, offset: 90, content: '', id: KR3k0012_SBCK_997-3a}
  - {type: variant, offset: 90, length: 0, content: '', krp: 澤田漸洳處葉似邪蒿細科二月中生莖葉可食又可蒸香美頗似蔞蒿說文曰莪蒿也從草我聲廣志曰莪蒿䕲蒿錢塘記曰靈隠山糓樹樹下生莪鬱茂若沃土所生蔞毛詩關雎漢廣曰言刈其蔞蔞蒿也陸機毛詩義䟽曰蔞葉似艾白長數寸髙尺餘好生水中脆羙可食王芻爾雅曰菉王芻也菉蓐也今呼鴟脚莎吴氏本草曰王芻一名黄草神農雷公生太山山谷治身熱邪氣小兒身熱氣蓍洪範五行傳曰蓍之爲言蓍也百年一夲生百莖此草木之壽知吉凶者也聖}
  - {type: variant, offset: 92, length: 2, content: 為德, SBCK: 問􅀑神焉􅀃文曰􅆱蒿屬也生千歳三百莖易以爲數天子􅆱九尺諸侯七尺大夫五尺士三尺史記曰天下和平王道得而其莖長大其叢生者百莖共根今丗取八十莖八尺即難得矣六十莖長六尺即可用也淮南子曰上有叢􅆱下有神􅀛論衡曰􅆱生七十歳生一莖七百歳生十莖神靈之物故遟也蓬爾雅曰齧彫蓬薦􅁰蓬别蓬種􅀋尚書大傳曰子夏於壤室編蓬户彈琴瑟以歌先生之風可以發憤矣毛詩鵲巢騶虞曰彼茁者蓬蓬草名也又伯兮曰自伯之東首如飛蓬禮記内則曰射人以桑弧蓬矢六射天地四方桑弧蓬矢矢夲太古也天地四方男子所有事也禮記儒}
  - {type: page-break, offset: 92, content: '', id: KR3k0012_SBCK_997-3b}
  - {type: variant, offset: 92, length: 2, content: 為德, krp: 問鬼神焉說文曰蓍蒿屬也生千歳三百莖易以爲數天子蓍九尺諸侯七尺大夫五尺士三尺史記曰天下和平王道得而其莖長大其叢生者百莖共根今丗取八十莖八尺即難得矣六十莖長六尺即可用也淮南子曰上有叢蓍下有神龜論衡曰蓍生七十歳生一莖七百歳生十莖神靈之物故遟也蓬爾雅曰齧彫蓬薦黍蓬别蓬種類尚書大傳曰子夏於壤室編蓬户彈琴瑟以歌先生之風可以發憤矣毛詩鵲巢騶虞曰彼茁者蓬蓬草名也又伯兮曰自伯之東首如飛蓬禮記内則曰射人以桑弧蓬矢六射天地四方桑弧蓬矢矢夲太古也天地四方男子所有事也禮記儒}
  - {type: variant, offset: 95, length: 0, content: '', SBCK: 篇曰蓬户甕牖編蓬爲户也魏略曰鮑出值飢餓採蓬實得數斗爲母作食三輔决録曰張仲蔚平陵人也與同郡魏景卿俱􅀮身不仕明天官􅀶物好屬詩賦所居蓬蒿没人管子曰無法程式飛捶而無所定謂}
  - {type: page-break, offset: 95, content: '', id: KR3k0012_SBCK_997-4a}
  - {type: variant, offset: 95, length: 0, content: '', krp: 篇曰蓬户甕牖編蓬爲户也魏略曰鮑出值飢餓採蓬實得數斗爲母作食三輔决録曰張仲蔚平陵人也與同郡魏景卿俱隱身不仕明天官博物好屬詩賦所居蓬蒿没人管子曰無法程式飛捶而無所定謂}
  - {type: variant, offset: 96, length: 4, content: 感續晉陽, SBCK: 飛蓬之間明王聽此言曽子曰蓬生麻中不扶自直白沙在泥與之皆黒晏子曰魯哀公失國走齊景公問焉曰子之年甚少矣道止于此乎哀公對曰吾少之時人多愛我者吾禮不能親人多諌我者吾忌不能從以内無弼外無輔弼輔無一人謟䛕者甚衆譬之猶}
