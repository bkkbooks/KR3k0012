  - {type: variant, offset: 102, length: 2, content: 陶淵, SBCK: 列子食於道見百歳髑髏攓蓬而指之曰唯予與汝知未曽死未曽生也啇君書曰今夫飛蓬遇飄風而行千里者乗風之􅀔也准􅀯子曰見飛蓬轉而知爲車楚辞曰蓬艾親入御于弟兮弟床簀也喻親宻曹植詩曰轉蓬離夲根飃䬙隨長風可意廻飈舉吹我入雲中髙上髙無極天路安可窮􅀋此流宕子􅂢軀逺從戎司馬彪詩曰百草應節生含氣有淺􅀷秋蓬獨何華飃䬙隨風轉王朗諌行役夜表曰司空臣朗言朗聞飛蓬隨風集于王梁之衡而駟馬爲之奔乳虎爲之走蓬非馬之䇿馬非蓬之敵所以或奔走者驚也蕭爾雅曰蕭荻即髙音狄毛詩􅁰離採􅁑曰彼採蕭兮一日不見如三秋兮詩義䟽曰蕭今荻蒿也或謂牛尾蒿莖可作燭有香氣故􅀕祀脂􅋹之爲香也許愼以爲艾蒿非也禮王度記曰士蕭庶人艾艾蕭不同}
