  - {type: variant, offset: 1629, length: 2, content: 茅苞, WYG: 長數寸髙丈餘好生水邉脆美可食王芻爾雅曰菉王芻也菉蓐也今呼鴟脚莎吴氏本草曰王芻一名黄草神農雷公經生太山山谷治身熱邪氣小児身熱蓍洪範五行傳曰蓍}
