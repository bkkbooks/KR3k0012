  - {type: variant, offset: 899, length: 4, content: 背背北堂, WYG: 帝曰蒿箭射蒿蘺耳吾豈不知三輔决録曰孫晨字元公冬月無被以蒿一束暮臥旦収之神仙食經曰十一月採彭㪍彭㪍白蒿}
