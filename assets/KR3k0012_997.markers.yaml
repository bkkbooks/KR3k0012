  - {type: variant, offset: 967, length: 228, content: 花曰宜男妊婦佩之必生男又名萱草本草經云萱一名忘憂一名宜男一名歧女錄異記曰婦人帶宜男草生兒束晳發蒙記曰甘棗令人不惑萱草可以忘憂任昉述異記曰萱草一名紫萱又名忘憂草吳中書生謂之療愁嵇康養生論云萱草忘憂苜蓿史記曰大宛有苜蓿草漢使取其實來於是天子始種苜蓿離宮別觀旁盡種蒲陶苜蓿極望漢書西域傳曰罽賓國有苜蓿大宛馬嗜苜蓿武帝得其馬漢使採蒲桃苜蓿種歸天子益種離宮別館旁晉書曰華廣免官為庶人晉武帝登凌雲臺見廣苜蓿園阡陌甚整依然感舊太康初太赦乃得襲爵西京雜記曰樂遊苑中自生玫瑰, WYG: 靈隠山榖樹}
