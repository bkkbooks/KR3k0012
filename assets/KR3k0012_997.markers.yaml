  - {type: variant, offset: 72, length: 240, content: 稼穡晉書曰羅含致仕還家階庭忽蘭菊藂生人以為德行之感續晉陽秋曰陶淵明嘗九月九日無酒出菊叢中摘盈把坐其側久之望見一白衣人至乃王弘送酒即便就酌山海經曰九九之山其草多菊廣志曰菊有白菊風俗通曰南陽酈縣有甘谷谷中水甘美云其山上大有菊菜水從山流下得其滋液谷中三十餘家不復穿井仰飲此水上壽百二三十其中百餘七十八十名之為夭司空王暢太尉劉寬太傅袁隗為南陽太守聞有此事令酈月送水三十斛用飲食澡浴終然無益抱樸子曰劉生丹法用白菊花汁蓮花汁地血汁樗汁和丹蒸之服一年得五百歲仙方所謂日精又曰日精更生周盈皆一菊也, WYG: 榮}
