  - {type: variant, offset: 882, length: 213, content: 也過於淄水之上見一土耦人方與木梗人語木梗謂土耦人曰子先土也持子以為耦人遇天大雨水潦並至子必沮壞應曰我沮乃反吾真耳今子東園之桃也刻子以為梗遇天大雨水潦並至必浮子泛泛乎不知所止今秦四塞之國也有虎狼之心恐其木梗之患於是孟嘗君逡巡而退而以應卒不敢西嚮秦晏子春秋曰公孫接田開強古冶子事景公勇而無禮晏子言於公公餽之二桃曰三子計功而食公孫接田開強先言功援桃而起古冶子又言其功令三子反桃二子慚而自殺古冶子曰恥人以言夸其聲不義也亦反其桃契領而死, SBCK: 請福}
