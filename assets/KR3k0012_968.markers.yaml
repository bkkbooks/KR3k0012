  - {type: variant, offset: 2023, length: 671, content: 能變化有趙升就陵受學陵以七事試者陵與諸弟子登雲臺山絕巖上有一桃樹大如臂旁生石壁下臨不測去上三四丈桃大有實陵謂諸弟子曰得此桃者當告以道要弟子皆流汗無敢視者升曰神人所護何險之有乃從上自擲正投桃樹取桃滿懷而石壁峻峭不得還乃擲桃上得二百枚陵分桃賜諸弟子餘二枚陵自食一留一以待升陵乃申手引升升忽見還以向一桃與升又曰高丘公服桃膠得仙鐘離意別傳曰周書言秦史趙覬以私恨告園民吳旦生盜食宗廟御桃旦生對曰民不敢食也王曰剖其腹出其桃史記惡而書之曰桃食之當有遺核王不知此而剖人腹以求桃非理也風俗通曰黃帝書稱上古之時兄弟二人曰荼與鬱律度朔山上桃樹下簡百鬼鬼妄榾音骨人則援以葦索執以食虎於是縣官以臘除夕飾桃人垂葦索交畫虎於門效前事也玄中記曰木子之大者有積石山之桃實焉大如十斛籠嵩高山記曰魏文帝時嵇叔夜胡昭在此學桃樹見在王子年拾遺記曰漢明帝時常獻巨核桃此桃霜下結花隆暑方熟常使植於霜林園俗謂相陵故聲之誤也又磅磄山去扶桑五萬里日所不及其地寒有桃樹千圍其花青黑色萬歲一實陶潛桃源記曰晉太元中武陵人捕魚從溪而行忘路遠近忽逢桃花林夾兩岸芳華鮮美落英繽紛林盡得山山有小口初極狹行四五步豁然開朗邑屋連接雞犬相聞男女衣著悉如外人見漁父驚為設酒食去先世避秦難率妻子家此遂與外隔問今是何代不知有漢不論魏晉既出白太守遣人隨往尋之迷不復得晉宮闕記曰華林園桃七百三十株白桃三株侯桃三株鄭緝之東陽記曰太末龍丘山有一巖前外如窗牖內有石童巖前一桃樹其實甚甘裴淵廣州記曰廬山頂上有山桃山桃大如檳榔形亦似之色黑而味甘人時登採拾只得於上飽啖不得持下下輒迷不能返石虎鄴中記曰石虎苑中有勾鼻桃重二斤南康記曰南康玉, SBCK: ''}
