  - {type: variant, offset: 9, length: 8, content: 驚蟄大壯初九候桃, SBCK: 麥也有杏李㮏味三果之熟也不同予焉得兼之倫􅀏而不言退告人曰士安之識過劉氏吾將來家實多故杏時將發故揉以杏汁李時將發又揉之李汁㮏時將發又揉以㮏汁故兼三味汜勝之書曰杏}
  - {type: variant, offset: 9, length: 8, content: 驚蟄大壯初九候桃, WYG: 麥也有杏李㮏味三果之熟也不同子焉得兼之倫笑而不言退告人曰士安之識過劉氏吾家果食多故於杏時将發故揉以杏汁李時将發又揉以李汁㮏時将發又揉以㮏汁故兼三味汜勝之書曰杏}
