  - {type: variant, offset: 2998, length: 171, content: 不畏耶荅曰桃東南枝長二尺八寸向日者憎之異苑曰太元中南郡江陵郡有棗樹一年忽生桃李棗三種花子幽冥錄曰剡縣劉晟音成阮肇共入天台山取穀皮迷不得返十三日糧食乏盡飢餧殆死望山上有一桃大有子實而絕巖邃澗求無登路扳音班緣藤葛然後得上各啖數桃而不飢下山一大溪邊有二女資質妙絕因要還家勑婢云劉阮二郎向雖得瓊實猶尚虛弊可速作食遂停半年懷土思歸女曰罪牽君如何便語大路, SBCK: 也}
