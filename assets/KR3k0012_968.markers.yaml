  - {type: variant, offset: 1116, length: 159, content: 多馬桃林今在弘農閿鄉南饒野馬鹽鐵論曰夫桃李實多者來年為之穰新序曰魏文侯見萁季從者食其園桃萁季禁之文侯曰萁季豈愛桃哉是教我下無犯上也典術曰桃者五木之精也故厭伏邪氣者也桃之精生在鬼門制百鬼故今作桃人梗著門以厭邪此仙木也夢書曰桃為守禦辟不祥夢見桃者守禦官神農經曰玉桃服之長生不死若不得早服之臨死日服之其尸畢天地不朽王肅喪服要, SBCK: ''}
