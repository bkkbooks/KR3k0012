  - {type: variant, offset: 19, length: 0, content: '', SBCK: 趣耕輕土杏華落趣耕䦨又曰杏花如何可耕白沙也盧毓冀州論曰魏郡好杏地産不爲無珎神仙傳曰董奉字君異居廬山爲人治病重病得愈者令種杏五株輕病得愈者爲栽一株數年之中杏有十數萬株鬰然成林杏子熟奉於林中所在作簞食一器宣語買杏者不復湏來報但自取之一器榖便得一器杏有人少榖徃而取杏多即有三四頭虎逐之奉悉以杏所得榖賑救貧窮㝷陽記曰杏在北嶺上有樹百株今猶稱董先生杏株南岳夫人傳曰仙人有三玄紫杏西京􅄂記曰上林有文杏林有文彩蓬萊杏東海都尉于台獻一株花雜五色六出云是仙人所食者廣志曰榮陽有白杏鄴中有赤杏有㮏杏嵩髙山記曰嵩髙山東北有牛山其山多杏至五月爛然黄茂自中國䘮亂百姓飢饉皆資此爲命人人充飽而杏不盡洛陽宫殿簿曰明光殿前杏一株顯陽殿前杏六株含章殿前杏四株晉宫閣名曰暉章殿前杏一株楊衒之洛陽伽藍記曰西方于闐王不信佛法有啇胡將一比丘毗盧旃在城南杏樹下白王伏罪今輙將異國沙門來在城南杏樹下王聞忿怒即徃看毗盧旃語王言如來遣我來令王造覆盆浮圖一軀使王祚永隆王言使我見佛我當從命毗盧旃鳴鍾告佛佛即遣羅㬋羅變爲佛形從空而見真容王五體投地即於杏樹下置立寺舎焉任昉􅄒異記曰杏園洲南海中多杏海上人云仙人種杏處漢時常有人舟行遇風泊此洲五六月曰食杏故免死云洲中有冬杏王充果賦云冬實之杏春熟之甘晉郭太機果賦云杏或冬而實又曰范蠡宅在湖中有海杏大如拳又曰頼郷老子祠有縹杏司馬相如長門賦曰飾文杏以爲梁王逸荔支賦曰魏土送西山之杏王廙洛都賦曰豹柌赤杏胡道安黄甘賦曰越魏都之赤杏朱超石與兄書曰光武墳邊杏甚美今奉送其核潘岳閑居賦曰梅杏郁棣之屬華實照爛言所不能極也李爾雅曰休無實李一名趙李座接慮李今之麥李也駮赤李子赤也}
