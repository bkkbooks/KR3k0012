  - {type: variant, offset: 3, length: 1, content: 桃, SBCK: 民月令曰三月杏花盛可播白沙輕土之田後周書曰張元芮城人性廉㓗南隣有杏二樹杏熟多落元園中諸小兒競取食之元所得者悉以還主唐史曰馬燧之子暢以第中大杏饋竇文塲文塲以進徳宗德宗未甞見頗怪暢令中使就封杏樹暢懼進宅廢爲奉誠園管子曰五沃之土其木冝杏莊子曰孔子遊緇帷之林休坐杏壇之上弟子讀書孔子絃歌鼓琴玄晏春秋曰衛倫過予言及於味稱魏故侍中劉子楊食餅知鹽生精味之至也予曰師曠識勞薪}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_968-1b}
  - {type: variant, offset: 3, length: 1, content: 桃, WYG: 民月令曰三月杏花盛可播白沙輕􅁟之田後周書曰張元芮城人性亷絜南隣有杏二樹杏熟多落元園中諸小兒競取食之元所得者悉以還主唐史曰馬燧之子暢以第中大杏饋竇文塲文塲以進徳宗徳宗未嘗見頗怪暢令中使就封杏樹暢懼進宅廢為奉誠園管子曰五沃之􅁟其木冝杏荘子曰孔子遊緇帷之林休坐杏壇之上弟子讀書孔子絃歌鼓琴𤣥晏春秋曰衞倫過予言及於味稱魏故侍中劉子陽食餅知塩生精味之至也予曰師曠識勞薪}
