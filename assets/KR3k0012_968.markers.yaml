  - {type: variant, offset: 19, length: 0, content: '', WYG: 趣耕輕土杏華落趣耕閒又曰杏花如何可耕白沙盧毓冀州論曰魏郡好杏地産不為無珎神仙傳曰董奉字君異居廬山為人治病重病得愈者令種杏五株輕病得愈者為栽一株數年之中杏有十數萬株鬰然成林杏子熟奉於林中所在作簞食一噐宣語買杏者不復須来報但有取之一噐榖便得一噐杏有人少榖徃而取杏多即有三四頭虎逐之奉悉以杏所得榖賑救貧家南嶽夫人傳曰仙人有三𤣥紫杏西京雜記曰上林有文杏材有文彩蓬萊杏東海都尉于吉獻一株花雜五色六出云是仙人所食者廣志曰荣陽有白杏鄴中有赤杏有㮏杏嵩髙山記曰嵩髙山東北有中山其山多杏至五月爛然黄熟自中國䘮亂百姓饑饉皆資此為命人人充飽而杏不盡洛陽宫殿簿曰眀光殿前杏一株顯陽殿前杏六株含章殿前杏五株晉宫閣名曰暉章殿前杏八株楊􅃷之洛陽伽藍記曰西方于闐王不信佛法有商胡将一比丘毗盧旃在城南杏樹下向王伏罪今輒将異國沙門來在城南杏樹下王聞忿怒即徃看毘盧旃語王曰如來遣我令王造覆盆浮圖一區使王祚永隆王言使我見佛我當從命毘盧旃鳴鐘告佛即遣羅㬋羅變為佛形從空而見真容王五體投地即於杏樹下置立寺舎焉任昉述異記曰杏園洲在南海中多杏海上人云仙人種杏䖏漢時有人舟行遇風泊此洲五六月日食杏故免死云洲中有冬杏又曰頼鄉老子祠有縹杏地里志曰范蠡宅在湖中有海杏大如拳王充果賦云冬熟之杏春熟之甘晉郭太機果賦云杏或冬而實司馬相如長門賦曰餙文杏以為梁王逸荔枝賦曰魏土送西山之杏王廙洛都賦曰豹祠赤杏胡安道黄丼賦曰越魏都之赤杏朱超石與兄書曰光武墳邊杏甚羙今送其核潘岳閒居賦曰梅杏郁棣之屬華實昭爛言所不能極也李爾雅曰休無實李一名趙李座接慮李今之麥李也駮赤李子赤也}
