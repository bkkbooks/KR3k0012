  - {type: variant, offset: 2, length: 0, content: '', SBCK: 五杏李杏典術曰杏木者東方歳星之精師曠占曰杏多實不蟲者來年秋善書紀年曰昭公六年十二月桃杏花幽王十年九月桃杏實山海經白靈山之下其木多杏盧諶􅀕法曰夏祠用杏崔寔}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 五杏李杏典術曰杏木者東方嵗星之精師曠占曰杏多實不蟲者来年秋善竹書紀年曰昭王六年十二月桃杏花幽王十年九月桃杏實山海經曰靈山之下其木多杏盧諶祭法曰夏祠用杏崔實}
