  - {type: variant, offset: 1308, length: 311, content: 女嫁楚乳母送新婦就夫家道聞夫死乳母欲將新婦還新婦曰女有三從今屬於人死當卒哀因駕素車白馬進到夫家治三桃湯以沐死者出東北隅禮三終使死者不恨吾父無所恨何用三桃湯焉漢舊儀曰山海經稱東海之中度朔山山上有大桃屈蟠三千里東北間百鬼所出入也上有二神人一曰神荼二曰鬱壘主領厲鬼惡害之鬼執以葦索以食虎黃帝乃立大桃人於門戶畫神荼鬱壘與虎葦索以禦鬼四王起事曰惠帝征成都王於安陽城北軍敗日已向中而太官未暇進食左右有齎秋桃十枚便以獻帝帝食三枚石超使人擘手奪三枚漢武故事曰東郡獻短人帝呼東方朔朔至短人指朔謂上曰王母種三千年桃結子此兒不良已三過偷之矣後西王母下出桃七枚母自啖二以五枚與帝帝留核著前王母問曰用此何為上曰此桃美欲種之母歎曰此桃三千年一著子非下, SBCK: 春李冬華春熟周處風}
