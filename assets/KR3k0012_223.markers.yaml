  - {type: variant, offset: 1342, length: 1, content: 禮, WYG: 時不合於道大則廷議小則上封若賢良之遺滯於下忠孝之不聞於上則條其事狀而薦言之唐書曰李邕少知名長安初内史李嶠及監察御史張廷珪並薦邕詞高行直堪爲諫爭之官由是召拜左拾遺又曰李邕爲左拾遺御史中丞宋璟奏侍臣張昌宗兄弟有不順之言請付發推斷則天初不應邕在陛下進曰臣觀宋璟之言事關社稷望陛下可其奏則天色稍解始允宋璟所請旣岀或謂邕曰吾子名位尚卑若不稱旨禍將不測何爲造次如是邕曰不顛不狂其名不彰若不如此後代何以稱也又曰李邕爲左拾遺及中宗即位以妖人鄭普思爲秘書監邕上書諫曰蓋人感一飱之惠殞七尺之身况臣爲陛下官受陛下禄而得目有所見口不言之是負恩矣自陛下親政日近復在九重所以未聞在外羣下竊議道路籍籍皆云普思多行詭惑妄説妖祥唯陛下不知尚見驅使此道若行必撓亂朝政臣至愚至賤不敢以胸臆對揚天庭請以古事明證孔子云詩三百一言以蔽之曰思}
