  - {type: variant, offset: 1344, length: 11, content: 嫌乃就職與蘇晉同掌制誥, WYG: 邪陛下今若以普思有竒術可致長生乆視之道則爽鳩氏乆應得之永有天下非陛下今日可得而求若以普思可致仙方則秦皇漢武乆應得之永有天下亦非陛下今日可得而求若以普思可致佛法則漢明梁武乆應得之永有天下亦非陛下今日可得而求若以普思可致鬼道則墨翟干寳各獻於至尊矣而二王得之永有天下亦非陛下今日可得而求此}
