  - {type: variant, offset: 1315, length: 1, content: 拜, WYG: 諫上然之又曰蕭鈞遷諫議大夫時有左武候引駕盧文操踰垣盗左藏庫物高宗以引駕職在糾繩身行盗竊命有司殺之鈞進諫曰文操所犯情實難原然恐天下聞之必謂陛下輕法律賤人命任喜怒貴財物臣之所職以諫爲名愚衷所懷不敢不奏帝謂曰卿職左司諫能盡忠規遂特免其死罪顧謂侍臣曰此乃眞諫議也又曰武后臨朝置匭四區共爲一室列於朝堂東方春色青有能告以養人及勸農可投書於青匭銘之曰延恩南方夏赤色有能正諫論時政之得失可投書於丹匭銘之曰招諫西方秋色白有能自陳抑屈可投書於素匭銘之曰申寃北方水色𤣥有謀智者可投書於𤣥匭銘之曰通𤣥宜令正諫大夫補闕拾遺等一人充使知匭事每日所有投書至暮即進天寳九載三月改匭爲獻納又曰李景伯遷諫議大夫中宗嘗宴侍臣及朝集使酒酣令各爲逥波詞衆皆爲謟佞之詞及自要榮位次至景伯曰逥波爾時酒巵㣲臣職在箴規侍宴旣過三爵諠譁竊恐非儀中宗不悦}
  - {type: page-break, offset: 1315, content: '', id: KR3k0012_WYG_223-7a, image: WYG0895/WYG0895-0076c.png}
  - {type: page-break, offset: 1315, content: '', id: KR3k0012_WYG_223-7b, image: WYG0895/WYG0895-0076d.png}
  - {type: variant, offset: 1318, length: 1, content: 舍, WYG: 令蕭至忠稱之曰此真諫官也又曰至德元年制諫議大夫論事自今已後不湏令宰相先知又曰乾元二年四月兩省諫官十日一上封事直論得失無假文説旣成殿最用存沮勸又曰陽城爲諫議大夫裴延齡讒􅉲陸䞇等坐貶黜德宗怒不解在朝無救者城聞而起曰吾諫官也不可天子殺無罪}
  - {type: page-break, offset: 1318, content: '', id: KR3k0012_WYG_223-8a, image: WYG0895/WYG0895-0077a.png}
  - {type: punctuation, offset: 1320, content: ，, id: KR3k0012_CHANT_223-bkkpn338}
  - {type: 'tls:seg', offset: 1320, content: '', id: KR3k0012_CHANT_223-17a.8}
  - {type: variant, offset: 1320, length: 0, content: '', WYG: 而信用姦臣即率拾遺王仲舒等數人守延英門上疏延齡姦佞贄等無罪状德宗大怒召宰相入語将加城等罪良乆乃解令宰相諭遣之於是金吾将軍張萬福聞諫官伏閣諫趍往至延英門大言賀曰朝廷有直臣天下必太平矣遂遍拜城及王仲舒等曰諸諫議能如此言事天下安得不太平已而連呼太平太平萬福武人時年八十餘自此名重天下}
  - {type: page-break, offset: 1320, content: '', id: KR3k0012_WYG_223-8b, image: WYG0895/WYG0895-0077b.png}
  - {type: variant, offset: 1321, length: 2, content: 固辭, WYG: 曰崔郾遷諫}
  - {type: punctuation, offset: 1323, content: 。, id: KR3k0012_CHANT_223-bkkpn339}
  - {type: 'tls:seg', offset: 1323, content: '', id: KR3k0012_CHANT_223-17a.9}
  - {type: variant, offset: 1324, length: 1, content: 者, WYG: 大夫穆宗即位荒於禽酒坐朝恒晚郾與同列鄭覃等延英切諫穆宗甚嘉之畋遊稍簡又曰文宗嘗於便殿召栁公權周墀對公權論事切直忤㫖周墀爲之惴慄公權詞氣益堅上徐謂公權曰朕知舎人不合却作諫議}
  - {type: variant, offset: 1326, length: 1, content: 為, WYG: 卿論事有爭臣之風今授卿諫議大夫又曰孔戣爲諫議上疏以事四條陳諷後有李渉投匭上言吐突承瓘公忠戣爲匭使覽副状大怒逐之因上疏苦諫遂貶渉倖臣聞之側目人皆爲危之戣髙步公卿間以方嚴見憚又曰馮定爲諫議大夫李訓事敗伏誅衣冠横罹其禍中外危疑及改元御殿中尉仇士良請用神策仗衞在殿門定抗疏論罷人情危之又請許左右史隨宰臣入延英記事又曰㑹昌元年}
  - {type: page-break, offset: 1326, content: '', id: KR3k0012_WYG_223-9a, image: WYG0895/WYG0895-0077c.png}
  - {type: variant, offset: 1329, length: 0, content: '', WYG: 門下奏據六典隋置諫議大夫七人從四品上大厯元年昇門下侍郎爲正三品兩省遂闕四品建官之道有所未周詩云袞職有闕仲山甫補之周漢大臣願入禁闥補過拾遺張衡爲侍中常居帷幄從容諷諫此皆大臣之任故其秩峻其任重則君敬其言而行其道况謇諤之地宜有老成之人秩未優崇則難用耆德其諫議大夫望依隋書舊制昇爲從四品分爲左右以備兩省四品之闕向後與丞郎出入迭用以重其選從之五代史周書曰顯德五年勅諫議大夫宜依舊正五品上仍班位在給事中之下按唐六典諫議大夫四員正五品上皆𨽻門下省班在給事中之下會昌二年十一月中書門下奏昇爲正四品下仍分爲左右以備兩省四品之闕故其班亦升在給事中之上近朝自諫議大夫拜給事中者官雖序遷位則降等至}
  - {type: page-break, offset: 1329, content: '', id: KR3k0012_WYG_223-9b, image: WYG0895/WYG0895-0077d.png}
  - {type: page-break, offset: 1329, content: '', id: KR3k0012_WYG_223-10a, image: WYG0895/WYG0895-0078a.png}
  - {type: variant, offset: 1330, length: 1, content: 曹, WYG: 以其遷次不倫故改正焉三輔决録曰第五頡字子陵爲諫議大夫洛陽無主人鄉里無田宅寄止靈臺中或十日不炊補闕六典曰補闕唐垂拱中創立四員左右各二天授年初左右各加三員通前爲十員其或才職相當不待闕而授言國家有過闕而補正之故以名官焉又曰左右補闕掌供奉諷諫扈從乗輿凡發令舉事有不便於時不合於道大則廷議小則上封若賢良之遺滯於下忠孝之不聞於上則條其事狀而薦言之唐書曰王源中字正蒙早以文學知名升進士第宏詞科累遷至左補闕時典禁軍者不循法度至有臺府人吏皆爲追擒源中上疏其略曰夫臺憲者紀綱之地府縣者責成之所設有罪犯宜歸}
