  - {type: variant, offset: 79, length: 2, content: 既行, SBCK: 諌議大夫冝依舊正五品上仍班位在給事中之下按唐六典諌議大夫四貟正五品上皆􅈻門下省班在給事中之下㑹昌二年十一月中書門下奏升爲正四品下仍分爲左右以備兩省四品之闕故其班亦升在給事中之上近朝自諌議大夫拜給事中者官雖序遷位則降等至是以其遷次不倫故改正焉三輔决録曰第五頡字子陵爲諌議大夫洛陽無主人郷里無田宅􅀉止靈臺中或十日不炊􅀘闕六典曰􅀘闕唐垂拱中創立四貟左右各二天授年初左右各加三貟通前爲十貟其或才職相當不待闕而授言國家}
