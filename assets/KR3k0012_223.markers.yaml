  - {type: variant, offset: 1307, length: 0, content: '', WYG: 靈帝世天下日危陶上疏言天下亂皆由於宦竪宦竪見事急共讒陶詔收黄門北寺獄陶自}
  - {type: variant, offset: 1308, length: 2, content: 制誥, WYG: 必死對使者曰讒邪相求考掠日深臣恨不列稷卨伊周之蹤而與比干龍逄爲儔事敗乃悔復何可及閉氣而死續漢書曰周舉字宣光梁商表爲從事中郎商疾甚帝問遺言對曰臣從事中郎周舉清慎高亮可任諫議大夫謝承後漢書曰傅翻字君成轉諫議大夫天性諒直數陳讜言武帝嘉之又曰虞承字叔明拜諫議大夫雅信忠謇在朝堂犯顔諫争終不曲撓散禄賑給諸生言德無比魏志曰賈逵字梁道河東襄陵人也自爲兒童戱常設部伍祖父習異之曰汝大必爲將帥口授兵法數萬言爲丞相主簿太祖善之拜諫議大夫與夏侯尚並掌軍計又曰賈逵字梁道太祖征𤣥徳先遣逵}
