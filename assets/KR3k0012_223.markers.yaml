  - {type: variant, offset: 1244, length: 7, content: 衡孫也為中書舍, SBCK: 則爽鳩氏乆應得之永有天下非陛下今日可得而求􅀂以普思可致仙方則􅁗皇漢武乆應得之永有天下亦非陛下今日可得而求􅀂以普思可致佛法則漢明梁武乆應得之永有天下亦非陛下今日可得而求􅀂以普思可致􅀑道則墨翟于寳各獻於至尊矣而二王得之永爲天下亦非陛下今日可得而求此皆事渉虚妄歷代無効臣愚不願陛下復行之於明時唯堯舜二帝自古稱聖臣觀所行故在}
