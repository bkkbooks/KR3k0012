  - {type: variant, offset: 1332, length: 0, content: '', WYG: 存安有北軍勢重於南衙輦下權傾於仗内乞還法司庶守職分憲宗可其請又曰裴垍在中書有獨孤郁李正辭嚴休復自拾遺轉補闕及㕘謝之際垍廷語之曰獨孤與李二補闕孜孜獻納今之遷轉可謂酬勞無愧矣嚴補闕官業或異於斯昨者進擬不無疑緩休復悚恧而退又曰文宗以魏謩爲補闕上嘗言於宰臣曰太宗皇帝得魏徴採拾闕失弼成聖政今我得魏謩於疑似之間必極匡諫雖不敢希及貞觀之政庶幾處於無過之地今授謩左補闕於内狀備述諫疏激切詔中書善爲之詞唐書曰貞元中韋渠牟爲右補闕内供奉僚列初輕之上在延英旣對宰相多使中貴人召渠牟於官次同輩始注目矣歲中遷左諫議大夫時延英對秉政財賦之臣晝漏率下二三刻爲常渠牟奏御率下五六刻上笑語欵洽往往外聞又曰韋温爲左補闕忠鯁救時宋申錫被誣温昌言曰宋公履行有素身居台輔不當有此是姦人䧟害也吾輩諫官豈避一時之雷電而致聖君賢相蒙蔽惑之咎耶因率同列伏閣切爭之由是知}
