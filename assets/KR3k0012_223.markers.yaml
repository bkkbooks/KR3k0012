  - {type: variant, offset: 1686, length: 498, content: 知制誥者約滿一周年即與正授從諫議大夫知者亦宜准此又曰封敖為學士拜中書舍人敖構思敏速語近而理勝不務奇澀武宗深重之嘗草賜陣傷邊將詔警句云傷居爾體痛在朕躬帝覽而善之賜之宮錦又曰崔郾轉中書舍人入思政殿謝恩郾奏曰陛下用臣為侍講卒歲有餘未嘗問臣經義今蒙轉改實慚尸素有愧厚恩帝曰俟朕機務稍閑即當請益高釴曰陛下意雖樂善既未延接儒生天下之人寧知重道帝深引咎錫之錦綵又曰中書舍人鄭居中少有時名楊歷清貫晚年尤薄名利以疾辭官恣遊名山一日搦管為詩纔書五字曰雲山遊巳徧紙猶在手筆忽墮地而終又曰晉初中書置舍人通事各一人東晉合為一職晉代入直閤內宣詔命而侍郎之任輕矣梁秩四百石品第八梁用人殊重簡以才能不限資地多以它官兼領其後除通事直曰中書舍人五代史後唐書曰明宗時劉贊為中書舍人與學士竇夢徵同年登第鄰居友善夢徵早卒贊與同年楊疑式緦麻為位而哭其家無嫡長與視喪卹其孀稚士人稱之五代史晉史曰陳乂長興中自舍人御命冊公主於大原公主即帝后也帝深待之但訝其高岸人或有獻可於乂宜陳一謳頌以稱帝之美可邀其異待耳乂曰人生貧富咸有定分未有持天子命違禮以求利既損國綱且虧士行乂今生所不為也聞者無不嘉之又曰天福五年九月詔曰六典云中書舍人掌侍奉進奏參議表章凡詔, SBCK: ''}
  - {type: variant, offset: 1686, length: 1225, content: 知制誥者約滿一周年即與正授從諫議大夫知者亦宜准此又曰封敖為學士拜中書舍人敖構思敏速語近而理勝不務奇澀武宗深重之嘗草賜陣傷邊將詔警句云傷居爾體痛在朕躬帝覽而善之賜之宮錦又曰崔郾轉中書舍人入思政殿謝恩郾奏曰陛下用臣為侍講卒歲有餘未嘗問臣經義今蒙轉改實慚尸素有愧厚恩帝曰俟朕機務稍閑即當請益高釴曰陛下意雖樂善既未延接儒生天下之人寧知重道帝深引咎錫之錦綵又曰中書舍人鄭居中少有時名楊歷清貫晚年尤薄名利以疾辭官恣遊名山一日搦管為詩纔書五字曰雲山遊巳徧紙猶在手筆忽墮地而終又曰晉初中書置舍人通事各一人東晉合為一職晉代入直閤內宣詔命而侍郎之任輕矣梁秩四百石品第八梁用人殊重簡以才能不限資地多以它官兼領其後除通事直曰中書舍人五代史後唐書曰明宗時劉贊為中書舍人與學士竇夢徵同年登第鄰居友善夢徵早卒贊與同年楊疑式緦麻為位而哭其家無嫡長與視喪卹其孀稚士人稱之五代史晉史曰陳乂長興中自舍人御命冊公主於大原公主即帝后也帝深待之但訝其高岸人或有獻可於乂宜陳一謳頌以稱帝之美可邀其異待耳乂曰人生貧富咸有定分未有持天子命違禮以求利既損國綱且虧士行乂今生所不為也聞者無不嘉之又曰天福五年九月詔曰六典云中書舍人掌侍奉進奏參議表章凡詔旨制勑璽書策命皆按故事起草進畫既下則署而行之其禁有四一曰漏洩二曰稽緩三曰違失四曰忘誤所以重王命也古昔巳來典實斯在爰從近代別創新名今運屬興王事從師古俾仍舊貫以輝前規其翰林學士院公事宜並歸中書舍人五代史漢史曰唐李昭以尚書郎出為蘇州刺史朞歲以中書舍人召還不拜謂宰輔曰省郎拜舍人以知制誥為次序便由刺史玷綸闈非敢聞命乃以兵部郎中知制誥翌歲拜舍人受之五代史周史曰王延為中書舍人權知貢舉有崔頎者恊之子也授偃師簿薄其卑屑棄去數年應進士延將入貢院見舊相吏部尚書盧文紀素與恊不睦謂延曰舍人以謹重聞于時所以老夫去冬與諸相首以長者聞奏然此一途取事者頗多面目說者云越人善泅生子方晬乳母浮之水上或駭然止之乳母曰其父善泅子必無溺今若以名下取士徵泅之類也舍人當求實才以副公望延退而嗤曰盧公之言為崔頎也縱與其父不悅致意何至此耶來春以頎登甲科其仁而徇公皆此類也百官志曰魏初中書置通事一人主呈奏晉初中書又置舍人一人至東晉合通事及舍人二職謂之通事舍人猶掌呈奏陶氏職官要錄曰中書舍人舊視給事中梁選簿云梁天監用人務簡英才不限資次又曰隋內史舍人八員專掌詔誥煬帝減四人後改為內史舍人荀勗集曰晉武帝時門下啟令史伊羨趙咸為中書舍人對掌文法勗奏以為不可起居郎六典曰起居郎掌記天子之法度以修記事之史凡記事之制以事繫日以日繫月以月繫時以時繫年必書其朔日甲乙以紀曆數典禮文物以考制度遷拜旌賞以勸善誅伐黜免以懲惡季冬則授之于國史焉唐書曰大和九年十二月左右省起居郎齎筆硯及紙於螭頭下記言記事又曰鄭朗開成中為起居郎初太和末風俗稍奢文宗恭勤節儉冀革其風宰臣等言曰陛下躬儉節用風俗巳移長裾大袂漸以減損若更令戚屬絕其侈靡不慮下不從教帝曰此事亦難戶曉但去其泰甚自以儉德化之朕聞前時內庫唯二錦袍飾以金鳥一袍玄宗幸溫湯時御之一與貴妃, WYG: 㫖}
