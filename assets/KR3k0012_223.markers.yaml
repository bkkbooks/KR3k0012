  - {type: variant, offset: 1372, length: 1, content: 轉, SBCK: 常州義興人後徙家洛陽少舉進士授夏陽尉神龍􅀄東都起聖善寺報慈閣景先詣闕獻大像閣賦詞甚美麗擢拜左拾遺又曰蕭昕爲左拾遺昕常與布衣張鎬爲友館而禮之表薦曰如鎬者用之爲王者師不用則幽谷一叟尔􅀇宗擢鎬拾遺不數年出入將相又曰元和中以左拾遺杜從郁爲祕書丞從郁司徒佑之子也􅀄自司議郎爲左􅀘闕崔群韋貫之左拾遺獨孤郁等上䟽以爲宰相之子不合爲諌諍之官於是降爲左拾遺群等又奏云拾遺與􅀘闕雖資品不同而皆是諌官父爲宰相而子爲諌官若政有得失不可使子論父於是改授之又曰元和中延英宰臣對訖左拾遺楊歸厚次請對時上坐乆宣令後坐日對來歸厚堅詞固請宰相諭之不退上乃召見歸厚首論中官許遂振次歷詆宰輔皆過激切然而自衒求試其詞甚繁逾刻而罷又曰元稹除左拾遺稹性鋒銳見事風生旣居諌垣不欲碌碌自滯事無不言即日上䟽論諌職又曰寳曆中左拾遺李漢右拾遺舒元褒薛廷老等五人於閤内諌曰臣伏見近日除授往往不由}
  - {type: page-break, offset: 1372, content: '', id: KR3k0012_SBCK_223-9a}
  - {type: page-break, offset: 1372, content: '', id: KR3k0012_SBCK_223-9b}
  - {type: variant, offset: 1372, length: 1, content: 轉, WYG: 常州義興人後徙家洛陽少舉進士授夏陽尉神龍初東都起聖善寺報慈閣景先詣闕獻大像閣賦詞甚美麗擢拜左拾遺又曰蕭昕爲左拾遺昕常與布衣張鎬爲友舘而禮之表薦曰如鎬者用之爲王者師不用則幽谷一叟爾𤣥宗擢鎬拾遺不數年岀入將相又曰元和中以左拾遺杜從郁爲秘書丞從郁司徒佑之子也初自司議郎爲左補闕崔羣􅅊貫之左拾遺獨孤郁等上疏以爲宰相之子不合爲諫爭之官於是降爲左拾遺羣等又奏云拾遺與補闕雖資品不同而皆是諫官父爲宰相而子爲諫官若政有得失不可使子論父於是改授之又曰元和中延英宰相臣對訖左拾遺楊歸厚次請對時上坐乆宣令後坐日對來歸厚堅詞固請宰相諭之不退上乃召見歸厚首論中官許遂振次厯詆宰輔皆過激切然而自階求試其詞甚繁逾刻而罷又曰元稹除左拾遺稹性鋒鋭見事風生旣居諫垣不欲碌碌自滯事無不言即日上疏論諫職又曰寳厯中左拾遺李漢右拾遺舒元褒薛廷老等五人於閣内諫曰臣伏見近日除授往往不由}
