  - {type: variant, offset: 1377, length: 0, content: '', WYG: 禁身一宿决􅆃杖十下者臣等謹案國朝故事供奉官街中除宰相外無所逥避今温造蔑朝廷典故凌陛下近臣恣行胸臆曾無畏忌伏以事有雖小而關分理者即不可失也分理一失亂由之生遺補官秩雖卑乃陛下侍臣也中丞雖高乃法吏也侍臣見凌是不廣敬法吏壞法何以持繩前時}
