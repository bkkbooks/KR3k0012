  - {type: variant, offset: 12, length: 0, content: '', SBCK: 諌議大夫掌侍從賛相規諌諷諭凢諌有五一曰風諌二曰順諌三曰規諌四曰致諌五曰直諌漢書曰韋玄成字少翁以父任爲郎少好修文業尤謙遜其接人貧賤者益加由是名譽曰廣以明經擢爲諌議大夫又曰劉輔以美才擢爲諌議大夫成帝欲立趙婕妤爲皇后輔上書曰陛下乃觸情縱欲以卑賤之女母天下乎里語曰腐木不可以爲柱卑人不可以爲主臣辱諌諍之官不敢不盡死言又曰貢禹字少翁元帝徴禺爲諌議大夫數虚巳問以政事是時年榖不登禹奏言宫室制度冝從儉省天子納其善言又曰夏侯勝字長公明洪範五行爲諌議大夫爲人簡易無威儀見時謂上爲君誤相字於上前上以此親信之又曰王褒字子淵蜀人也益州刺史王襄欲宣風化於衆庶聞褒有俊材請與相見使褒作中和樂職如淳曰言王政中和在官者樂其職也宣布詩如淳曰國語所謂宣布哲人之令徳也蘇林日歌之名也選好事者令依鹿鳴之聲習而歌之時何武爲童子選在歌中武歌於太學宣帝召見曰此盛徳之事吾何足以當之益州刺史因奏言襃有軼材上乃徴襃旣至詔襃爲聖主得賢臣頌擢爲諌議大夫又曰楊雄字子雲以􅂄老乆次轉爲諌議大夫疾免復召爲諌議大夫家至貧􅄝酒人稀至其門時有好事者載肴酒以從遊學又曰孔光字子夏經學尤明舉止方正爲諌議大夫東觀漢記曰郭丹字少卿從師長安買符入函谷􅀜乃􅁣然而歎曰丹不乗使者車不出此􅀜旣至京師嘗爲都講更始二年爲諌議大夫持節歸南陽自去家十三年果乗髙車出􅀜後漢書曰陳禪字紀山爲諌議大夫西南禪國王獻樂及幻人能吐火自支解易牛馬頭大㑹作之於庭禪離席舉手曰帝王之庭不冝作夷狄之樂又曰韋彪字孟逹上䟽曰諌議之職應用公直之士通才謇正有􅀘益於朝者今或從徴試軰爲大夫動舉州郡並冝清選其任責以言績其二千石視事雖乆而爲吏人所便安者冝增秩重賞勿妄遷徙惟留聖心又曰江革轉諌議大夫賜告歸天子思革篤行詔齊相曰諌議大夫江革前以病歸今起居何如夫孝者百行之冠衆善之始也縣以見􅂖千斛賜巨孝常以八月長吏存問致羊酒以終厥身又曰劉陶字子竒拜諌議大夫靈帝世天下日危陶上䟽言天下亂皆由於宦竪宦竪見事急共䜛陶詔収黄門北寺獄陶自知必死對使者曰䜛邪相求考掠日深臣恨不列稷卨伊周之蹤而與比干龍逢爲儔事敗乃悔復何可及閉氣而死續漢書曰周舉字宣光梁啇表爲從事中郎啇疾甚帝問遺言對曰臣從事中郎周舉清愼髙亮可任諌議大夫謝承後漢書曰􅀓翻字君成轉諌議大夫天性諒直數陳讜言武帝嘉之又曰虞承字叔明拜諌議大夫雅性忠謇在朝堂犯顔諌争終不曲撓散禄賑給諸生言徳無比魏志曰賈逵字梁道河東襄陵人也自爲兒童戯常設部伍祖父習異之曰汝大必爲將帥口授兵法數萬言爲丞相主簿太祖善之拜諌議大夫與夏侯尚並掌軍計又曰賈逵字梁道太祖征劉備先遣逵至斜谷觀形􅀔道逢水衡載囚數十逵以軍事急輙竟重者一人皆放其餘太祖善之拜諌議大夫蜀志曰尹黙字思潜以左氏傳教授後主踐阼拜諌議大夫晉書曰李尤字伯仁侍中賈逵薦尤有揚雄之才明帝召作東壁雍徳陽諸觀銘拜諌議大夫後魏書曰張普惠字洪賑常山九門人爲諌議大夫任城王澄謂普惠曰不喜得諌議唯喜諌議得君唐書曰髙祖嘗嘲􅂫世長曰名長意短口正心邪棄忠貞於鄭國忘信義於吾家世長對曰名長意短實如聖㫖口正心邪未敢奉詔昔竇融以河西降漢十世封侯臣以山南歸國唯􅂪屯􅁥於是拜爲諌議大夫又曰􅂫世長擢拜諌議大夫從幸涇陽校獵大􅀗禽獸於旌門髙祖入御營頋謂朝臣曰今日畋樂乎世長進曰陛下遊獵薄廢萬機不滿十旬未爲大樂髙祖色變旣而􅀏曰狂態發耶世長曰爲臣私計則狂爲陛下國計則忠矣又曰王珪爲諌議大夫嘗有論諌太宗稱善遂詔每宰相入内平章大計必使諌官隨入與聞政事又曰太宗問諌議大夫禇遂良曰舜造漆器禹雕其爼當時諌舜十有餘人食器之間苦諌何也遂良對曰雕􅅣害農事綦組傷女工首創奢滛危亡之漸漆器不已必金爲之金器不已必玉爲之所以諌臣必諌其漸及其滿盈無所復諌上然之又曰蕭鈞遷諌議大夫時有左武候引駕盧文操踰垣盗左藏庫物髙宗以引駕職在糺繩身行盗竊命有司殺之鈞進諌曰文操所犯情實難原然恐天下聞之必謂陛下輕法律賤人命任喜怒貴財物臣之所職以諌爲名愚􅂨所懷不敢不奏帝謂曰卿職在司諌能盡忠規遂特免其死罪頋謂侍臣曰此乃眞諌議也又曰武后臨朝置匭四區共爲一室列於朝堂東方春色青有能告以養人及勸農可投書於青匭銘之曰延恩南方夏色赤有能正諌論時政之得失可投書於丹匭銘之曰招諌西方秋色白有能自陳抑屈可投書於素匭銘之曰申􅁈北方水色􅀇有謀智者可投書於􅀇匭銘之曰通玄冝令正諌大夫􅀘闕拾遺等一人充使知匭事每日所有投書至暮即進天寳九載三月改匭爲獻納又曰李景伯遷諌議大夫中宗嘗宴侍臣及朝集使酒酣令各爲廻波詞衆皆爲謟佞之詞及自要榮位次至景伯曰廻波尓時酒巵微臣職在箴規侍宴旣過三爵諠譁竊恐非儀中宗不恱}
