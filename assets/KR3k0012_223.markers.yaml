  - {type: variant, offset: 1311, length: 3, content: 開元初, WYG: 斜谷觀形勢道逢水衡載囚數十逵以軍事急輙竟重者一人皆放其餘太祖善之拜諫議大夫蜀志曰尹黙字思潛以左氏傳教授後主踐祚拜諫議大夫晉書曰李尤字伯仁侍中賈逵薦尤有揚雄之才明帝召作東璧雍德陽諸觀銘拜諫議大夫後魏書曰張普惠字洪賑常山九門人爲諫議大夫任城王澄謂普惠曰不喜得諫議唯喜諫議得君唐書曰高祖嘗嘲蘇世長曰名長意短口正心邪棄忠良於鄭國忘信義於吾家世長對曰名長意短實如聖㫖口正心邪未敢奉詔昔竇融以河西降漢十世封侯臣以山南歸國唯蒙屯監於是拜爲諫議大夫又曰蘇世長擢拜諫議大夫從幸涇陽校獵大獲禽獸於旌門高祖入御營顧謂朝臣曰今日畋樂乎蘇世長進曰陛下遊獵薄廢萬機不滿十旬未爲大樂高祖色變旣而笑曰狂態發耶世長曰爲臣私計則狂爲陛下國計則忠矣又曰王珪爲諫議大夫嘗有論諫太宗稱善遂詔毎宰相入内平章大計必使諫官隨入與聞政事又曰太宗問諫議大夫禇遂良曰舜造漆器禹雕其俎當時諫舜十有餘人食器之間苦諫何也遂良對曰雕琢害農事纂組傷女工首創奢滛危亡之漸漆器不已必金爲之金器不已必玉爲之所以諫臣必諫其漸及其滿盈無所}
