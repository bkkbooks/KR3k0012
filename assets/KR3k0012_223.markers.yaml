  - {type: variant, offset: 3005, length: 161, content: 國史諫議大夫朱子奢云史官所述不隱善惡或主非上智飾非護失見之則致怨所以義不可觀又褚遂良曰今之起居郎古之左右史也記人君言行善惡必書庶幾不為非法不聞帝王躬自觀史帝曰適來所記無可否臧見亦何爽乃宣謂宰臣曰鄭朗引故事不欲朕見起居注夫人君之言善惡必書朕恐有平常閑話不關理體垂諸將來竊以為恥異日臨朝庶幾稍改何妨一見以誡醜言朗遂進之又曰開成, SBCK: 卷第}
