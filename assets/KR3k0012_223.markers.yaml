  - {type: variant, offset: 1375, length: 1, content: 舍, SBCK: 進擬或是宣出臣恐自此紀綱䆮壞姦邪恣行伏乞聖恩詳察上厲聲曰更有何事舒元褒進曰陛下近日修造亦太多上色變曰何處修造元褒俛首不能對薛廷老奏曰臣等是諌臣有所聞即合論奏亦豈知陛下修造之所但見般輦瓦木絶多即知修造不已伏乞稍留聖慮上曰所奏知然後各復位議者以爲不廢其職又曰大和三年左拾遺舒元褒等論中丞温造凌供奉官事今月四日左􅀘闕李虞與温造街中相逢造怒不廻避遂捉李虞祗承}
