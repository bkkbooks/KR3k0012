  - {type: variant, offset: 1377, length: 0, content: '', krp: 禁身一宿决春杖十下者臣等謹案國朝政故事供奉官街中除宰相外無所廻避今温造蔑朝廷典故凌陛下近臣恣行胷臆曾無畏忌伏以事有雖小而關分理者即不可失也分理一失亂由之生遺𥙷官秩雖卑乃陛下侍臣也中丞雖髙乃法吏也侍臣見凌是不廣敬法吏壞法何以持䋲前時}
  - {type: variant, offset: 1379, length: 0, content: '', SBCK: 舎人李虞仲與造相逢造乃曵去引馬知制誥崔咸與造相逢又捉其從人當時縁不上聞所以強􅁀益甚臣等又聞元和長慶中中丞行李不過半坊今乃逺至兩坊謂之籠街喝道但以尊崇自處不思僣擬之嫌陛下若不因此特有懲革伏恐從此供奉官軰便湏廻避中丞累朝制度失自陛下臣等官忝諌列實爲陛下惜之奉勑憲官之職在指佞觸邪不在行李自大侍臣之職在獻可替否不在道途相髙並列通班合知名分如聞喧競亦以再三旣招人言甚損朝體其臺官與供奉官同道聽先後而行道途任祗揖而過其叅從人則各隨夲官之後少相僻避勿信衝突又聞近日巳來應合有導從官手力多者街衢之中行李太過自今傳呼前後不過三百歩書書曰歸登爲右拾遺裴延齡以姦佞有恩欲爲相諌議大夫陽城上䟽切直徳宗赫怒右􅀘闕熊執易等亦以危言忤旨􅀄執易草䟽成示登登􅃤然曰願􅀉一名雷電之下安忍}
