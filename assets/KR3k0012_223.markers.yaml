  - {type: variant, offset: 909, length: 167, content: 顏師古遷中書舍人專掌機密于時軍國多務凡有制誥皆成其手師古達於政理冊奏之工時無及者又曰武后天授元年壽春郡王成器兄弟五人初出閤同日受冊有司撰儀注忘載冊文及百寮在列方知闕禮宰臣相顧失色中書舍人王劇立召小史五人各令執筆口授分寫同時須臾俱畢詞理典贍時人歎伏又曰景龍四年初定內難唯中書舍人蘇頲在太極殿後文詔填委動以萬計手操口對無毫氂差誤主書韓禮談, WYG: 劉陶字}
