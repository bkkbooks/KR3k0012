  - {type: variant, offset: 3169, length: 593, content: 二月閤門對左右史裴素等上自開成初復故事每入閤左右史執筆立于螭頭之下君臣論奏得以備書故開成政事最詳於代起居舍人六典曰起居舍人掌修記言之史錄天子之制詔德音如記事之制以紀時政之損益季冬則授之於國史唐書曰邢文偉滁州全椒人時右史官缺高宗謂侍臣曰邢文偉事我兒能減膳切諫此正直人也遂擢拜右史又曰李讓夷字達心為諫議大夫開成元年以本官兼知起居舍人事時起居舍人李襃有痼疾請罷官宰臣李石奏闕官上曰褚遂良為諫議大夫嘗兼此官卿可盡言今諫議大夫姓名石遂奏李讓夷馮定孫簡俶帝曰讓夷可也李固言欲用崔球張次宗鄭覃曰崔球遊宗閔之門赤墀下秉筆記注為千古法不可用朋黨如斐中孺李讓夷臣不敢有纖芥異論其為人主大臣知重如此又曰魏謨轉起居舍人紫宸中謝帝謂之曰以卿論事忠切有文貞之風故不循月限授卿此官又謂之曰卿家有何舊書詔對曰比多失墜唯簪笏見在上令進來鄭覃曰在人不在笏上曰鄭覃不會我意此即甘棠之義非在笏而巳又曰魏謨文宗時為起居舍人紫宸入閤遣中使取謨起居注欲視之謨執奏曰自古置史官書事以明鑒誡陛下但為善事勿畏臣不書如陛下所行錯忤臣縱不書天下人書之臣以陛下為文皇帝陛下比臣如褚遂良帝又曰我嘗取觀之謨曰由史官不守職分臣豈敢䧟陛下為非法陛下一覽之後自此書事須有廻避如此善惡不直非史也遺後代何以取信乃止又曰張次宗有文學稽古厲行開成中為起居舍人文宗復故事每入閤左右史執筆立于螭頭之下宰相奏事得以備錄宰臣既退上召左右史更質證所奏是非故開成政事詳於史氏, SBCK: 三}
