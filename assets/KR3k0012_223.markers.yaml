  - {type: variant, offset: 2185, length: 726, content: 制勑璽書策命皆按故事起草進畫既下則署而行之其禁有四一曰漏洩二曰稽緩三曰違失四曰忘誤所以重王命也古昔巳來典實斯在爰從近代別創新名今運屬興王事從師古俾仍舊貫以輝前規其翰林學士院公事宜並歸中書舍人五代史漢史曰唐李昭以尚書郎出為蘇州刺史朞歲以中書舍人召還不拜謂宰輔曰省郎拜舍人以知制誥為次序便由刺史玷綸闈非敢聞命乃以兵部郎中知制誥翌歲拜舍人受之五代史周史曰王延為中書舍人權知貢舉有崔頎者恊之子也授偃師簿薄其卑屑棄去數年應進士延將入貢院見舊相吏部尚書盧文紀素與恊不睦謂延曰舍人以謹重聞于時所以老夫去冬與諸相首以長者聞奏然此一途取事者頗多面目說者云越人善泅生子方晬乳母浮之水上或駭然止之乳母曰其父善泅子必無溺今若以名下取士徵泅之類也舍人當求實才以副公望延退而嗤曰盧公之言為崔頎也縱與其父不悅致意何至此耶來春以頎登甲科其仁而徇公皆此類也百官志曰魏初中書置通事一人主呈奏晉初中書又置舍人一人至東晉合通事及舍人二職謂之通事舍人猶掌呈奏陶氏職官要錄曰中書舍人舊視給事中梁選簿云梁天監用人務簡英才不限資次又曰隋內史舍人八員專掌詔誥煬帝減四人後改為內史舍人荀勗集曰晉武帝時門下啟令史伊羨趙咸為中書舍人對掌文法勗奏以為不可起居郎六典曰起居郎掌記天子之法度以修記事之史凡記事之制以事繫日以日繫月以月繫時以時繫年必書其朔日甲乙以紀曆數典禮文物以考制度遷拜旌賞以勸善誅伐黜免以懲惡季冬則授之于國史焉唐書曰大和九年十二月左右省起居郎齎筆硯及紙於螭頭下記言記事又曰鄭朗開成中為起居郎初太和末風俗稍奢文宗恭勤節儉冀革其風宰臣等言曰陛下躬儉節用風俗巳移長裾大袂漸以減損若更令戚屬絕其侈靡不慮下不從教帝曰此事亦難戶曉但去其泰甚自以儉德化之朕聞前時內庫唯二錦袍飾以金鳥一袍玄宗幸溫湯時御之一與貴妃, SBCK: ''}
