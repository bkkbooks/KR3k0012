  - {type: variant, offset: 16, length: 1, content: 掌, SBCK: 而信用姦臣即率拾遺王仲舒等數人守延英門上䟽論延齡姦佞贄等無罪􅃺徳宗大怒召宰相入語將加城等罪良乆乃解令宰相諭遣之於是金吾將軍張萬福聞諌官伏閤諌趍往至延英門大言賀曰朝廷有直臣天下必太平矣遂遍拜城及王仲舒等曰諸諌議能如此言事天下安得不太平巳而連呼太平太平萬福武人時年八十餘自此名重天下又曰崔郾遷諌議大夫穆宗即位荒於禽酒坐朝􅁪晚郾與同列鄭覃等延英切諌穆宗甚喜之畋遊稍簡又曰文宗嘗於便殿召柳公權周墀對公權論事切直忤旨周墀爲之惴慓公權詞氣益堅上徐謂公權曰朕知舎人不合却作諌議以卿論事有争臣之風今授卿諌議大夫又曰孔戣爲諌議上䟽以事四條陳諷後有李渉投匭上言吐突承璀公忠戣爲匭使覽副􅃺大怒逐之因上䟽苦諌遂貶渉倖臣聞之側目人皆爲危之髙歩公卿間以方嚴見憚又曰馮定爲諌議大夫李訓事敗伏誅衣冠撗罹其禍中外危疑及改元御殿中尉仇士良請用神䇿仗衛在殿門定抗䟽論罷人情危之又請許左右史隨宰臣入延英記事又曰㑹昌元年中書門下奏據六典隋置諌議大夫七人從四品上大曆二年昇門下}
