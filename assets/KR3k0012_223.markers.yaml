  - {type: variant, offset: 1377, length: 0, content: '', SBCK: 禁身一􅀫决春杖十下者臣等謹案國朝政故事供奉官街中除宰相外無所廻避今温造蔑朝廷典故凌陛下近臣恣行胷臆曾無畏忌伏以事有雖小而􅀜分理者即不可失也分理一失亂由之生遺􅀘官秩雖卑乃陛下侍臣也中丞雖髙乃法吏也侍臣見凌是不廣敬法吏壞法何以持䋲前時}
