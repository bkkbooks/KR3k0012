  - {type: variant, offset: 263, length: 1, content: 莊, SBCK: 堯因主人伊長孺爲姓謂之伊陳留風俗傳曰侯氏氏侯爵周微官失其守故以侯爵爲姓又曰􅁗之先曰伯翳佐舜擾馴鳥獸錫姓曰嬴氏其後分封以國爲姓有徐氏郯氏黄氏江氏文士傳曰束晳字廣微踈廣後也王莽末廣曽孫孟造自東海避難歸蕪城改姓去踈之足爲束氏丗􅀃曰諸􅁑令恢與王丞相共争姓族前後王曰何不言􅁑王而言王葛諸􅁑曰譬言驢馬不言馬驢驢寕勝馬耶論衡曰孔子推律自知殷之苗也名禮記曲禮上曰名子者不以國不以日月不以隱疾不以山川此在常語之中爲後難諱也春秋􅀓曰名終將諱之又曰二名不偏諱孔子之母名徴在言徴不稱在言在不稱徴也又曲禮下曰君子已􅀌不更名重本也又大傳曰名者人治之大也可無慎乎人治行以正人左傳桓}
