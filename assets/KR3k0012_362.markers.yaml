  - {type: variant, offset: 3352, length: 17, content: 木羽鉅鹿南祁鄉人貧母王助產嘗探兒兒, SBCK: 孟宗爲豫章太守民思其惠路有行歌故時之}
  - {type: variant, offset: 3352, length: 786, content: 木羽鉅鹿南祁鄉人貧母王助產嘗探兒兒生開眼視母大笑母乃驚怖仍夢見大冠赤幘者守見曰此司命君也當報汝使汝子木羽得仙後生兒字木羽所探兒年十五夜有車馬迎之過呼木羽木羽為我御來遂相隨去列異傳曰華子魚為諸生嘗宿人門外生人婦夜主有兩吏來詣其門便相向僻易欲退相謂曰公在此因踟躕良久一吏曰籍當定奈何得住乃前向子魚拜相脟入出共語曰當與幾歲一人曰當與三歲子魚後故往視之兒果年三歲已死乃自喜曰我固當公後果為太尉續搜神記同益部耆舊傳曰哀牢夷者其先有婦人名沙壹居于牢山嘗捕魚於水中觸沉木若有感因懷妊十月產子男十人後沉木化而為龍出水沙壹忽間龍語曰若生我子今悉何在九子見龍驚走獨小子不能走背龍而坐龍就而舐之其母鳥語謂背為九謂坐為隆因名小子曰九隆及後長大諸兄共推以為王博物志曰蜀郡諸山夷名曰獠子婦人妊身七月生時必須臨水兒生便置水中浮即養之沉便遂棄也至長皆拔去其上齒後狗牙各一以為身節論衡曰黃帝二十月而生又曰唐文伯河東蒲坂人也其生亦以夜半時適生有人從門呼其父名父出應之不見人見一木杖植其門側好善異於眾其父杖入門以示人占曰吉文伯位至廣漢太守以杖當得子之力矣譙周法訓曰一產二子者當以後生者為兄言其先胎也荅曰此野人之鑿語耳君子不測暗安知胎之先後也傅子曰昔燕趙之間有三男子共娶一女生四子後爭訟廷尉延壽奏云禽獸生子逐母宜以四子還母尸三男子於市世說曰胡廣本姓黃五月生父母惡之乃置之甕投於江湖翁見甕流下聞有小兒啼聲往取因長養之以為子登三司流中庸之號廣後不治其本親服云我於本親已為死人也世以此為深譏焉搜神記曰陳仲舉微時嘗宿黃申家而申婦方產有扣申門者家人咸不知久久方聞屋裏有言賓堂下有人不可進扣門者相告曰今當從後門往其一人便往有頃還留者問之是何等名為何當與幾歲往者曰男也名為奴當與十五歲後應以何死荅曰應以兵死仲舉告其家曰吾能相此兒當以兵死父母驚之寸刃不使得執也至年十五有置鑿於梁上者其末出奴以為木也自下鉤之鑿從梁落陷腦而死後仲舉, WYG: 孟宗}
