  - {type: variant, offset: 83, length: 1, content: 易, WYG: 利害願有以自效明年擢拜横海軍節度使賜姓李氏名全畧以崇寵之白虎通曰人所以有姓者何所以崇恩愛厚親親逺禽獸别婚姻}
  - {type: variant, offset: 84, length: 31, content: 也不坼不副無菑無害言易也凡人在母母則病生則坼副菑害其母橫逆人道, SBCK: 􅀋謀曰黄帝吹律}
  - {type: variant, offset: 84, length: 31, content: 也不坼不副無菑無害言易也凡人在母母則病生則坼副菑害其母橫逆人道, krp: 類謀曰黄帝吹律}
  - {type: punctuation, offset: 85, content: 。, id: KR3k0012_CHANT_362-bkkpn26}
  - {type: 'tls:seg', offset: 85, content: '', id: KR3k0012_CHANT_362-2a.11}
  - {type: variant, offset: 85, length: 0, content: '', WYG: 故紀世别類使生相愛死相哀同姓}
  - {type: variant, offset: 86, length: 1, content: 坼, WYG: 得相娶皆為重人倫也姓者生也人禀天氣所以生者也詩云天生蒸民尚書曰平章百姓姓所以有百者何以為古者聖人吹律定姓以記其族人合五常而生正聲有五宫商角徵羽轉而相雜五五二十五轉生四時異氣殊音悉備故姓有百也所以有氏者何所以貴功徳下伎力或氏其官或氏其事聞其氏即可知矣所以勉人為善也或氏王父字者何所以别諸侯之後為興滅國繼絶世也王者之子稱王子王者之孫稱王孫諸侯之子稱公子公子之子稱公孫公孫之子各以其王父字為氏故春秋有王子瑕論語有王孫賈又有衛公子荆公孫朝魯有仲氏孟氏叔氏季氏楚有昭屈景氏齊有髙國崔盧氏以知其子孫也王者之子亦稱王子兄弟立而皆封也或曰王者之孫亦稱王孫刑徳放曰堯知命表稷契賜姓于姬臯陶典刑}
  - {type: page-break, offset: 86, content: '', id: KR3k0012_WYG_362-5a, image: WYG0896/WYG0896-0231c.png}
  - {type: page-break, offset: 86, content: '', id: KR3k0012_WYG_362-5b, image: WYG0896/WYG0896-0231d.png}
  - {type: variant, offset: 88, length: 5, content: 副無菑無害, WYG: 表姓}
  - {type: punctuation, offset: 89, content: ，, id: KR3k0012_CHANT_362-bkkpn27}
