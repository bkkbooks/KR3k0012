  - {type: variant, offset: 2119, length: 326, content: 後為孟嘗君以占事推之非不祥遂舉之又曰霍將軍妻產二子疑所為兄弟或曰前生為兄後生為弟今雖俱日亦宜以先生者為兄或曰居上者宜為兄居下者宜為弟居下前生今宜以前生為弟時霍光聞之曰昔殷王祖甲一產二子曰囂曰良以卯生囂以巳生良則以囂為兄以良為弟若以在上為兄囂亦當為弟矣昔許釐公一產二女曰娥曰茂楚大夫唐勒生二子一男一女男曰貞夫女曰瓊華皆以先生者為長近代鄭昌時文長倩并一生二男滕公一生二女季黎一生一男一女并以前生者為長霍氏亦以前生為兄焉玄中記曰朱梧縣其民服役依海際居產子以沙石自擁不食米止資魚以為生氣又曰丈夫民殷帝大戊使王英採藥於西王母至此絕糧不能進乃食木實衣以木皮終身無妻產子二人從背脅間出其父則死是為丈夫民去玉門二萬里外國圖曰長人國妖六年乃生而白首兒則長大乘雲而不還龍類, SBCK: 名}
