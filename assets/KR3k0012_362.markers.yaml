  - {type: variant, offset: 3575, length: 260, content: 水中觸沉木若有感因懷妊十月產子男十人後沉木化而為龍出水沙壹忽間龍語曰若生我子今悉何在九子見龍驚走獨小子不能走背龍而坐龍就而舐之其母鳥語謂背為九謂坐為隆因名小子曰九隆及後長大諸兄共推以為王博物志曰蜀郡諸山夷名曰獠子婦人妊身七月生時必須臨水兒生便置水中浮即養之沉便遂棄也至長皆拔去其上齒後狗牙各一以為身節論衡曰黃帝二十月而生又曰唐文伯河東蒲坂人也其生亦以夜半時適生有人從門呼其父名父出應之不見人見一木杖植其門側好善異於眾其父杖入門以示人占曰吉文伯位至廣漢太守以杖當得子之力矣譙周法訓曰一產二子者當以後生者為兄言其先胎也荅曰此, SBCK: 丈夫}
