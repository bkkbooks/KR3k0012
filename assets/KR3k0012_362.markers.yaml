  - {type: variant, offset: 79, length: 1, content: 達, WYG: ''}
  - {type: variant, offset: 79, length: 1, content: 達, krp: 從}
  - {type: variant, offset: 80, length: 1, content: 之, SBCK: 女}
  - {type: variant, offset: 80, length: 1, content: 之, krp: 女}
  - {type: variant, offset: 81, length: 0, content: '', WYG: 公命以字為展氏無駭公子展之孫故為展氏也又襄四年曰穆叔如晉范宣子逆之問焉曰古人有言曰死而不朽何謂也穆叔未對宣子曰昔匄之祖自虞以上為陶唐氏在夏為御龍氏在商為豕韋氏在周為唐杜氏晉主夏盟為范氏其是之謂乎穆叔曰以豹所聞此之謂世禄非不朽也史記曰太公望吕尚者東海上人其先祖嘗為四嶽佐禹平水土甚有功虞夏之際封於吕本姓姜氏從其封姓故曰吕尚漢書曰夏侯嬰為滕令故號滕公及曾孫頗尚主主隨外家姓號孫公故滕公子孫更為孫氏又曰戍卒婁敬求見說上曰陛下取天下與周異而都雒陽不便不如入闗據秦之固上以問張良良因勸上是日車駕西都長安拜婁敬為奉春君賜姓劉氏又曰灌夫頴隂人也父張孟嘗為頴隂侯灌嬰舍人因得幸進之至二千石故蒙灌氏姓為灌孟師古曰蒙冒也又曰衛青字仲卿其父鄭季河平陽人也以縣吏給事東侯家平陽侯曹壽尚武帝姊陽信長公主李與主家僮衛嫗通}
  - {type: page-break, offset: 81, content: '', id: KR3k0012_WYG_362-2a, image: WYG0896/WYG0896-0230a.png}
  - {type: page-break, offset: 81, content: '', id: KR3k0012_WYG_362-2b, image: WYG0896/WYG0896-0230b.png}
  - {type: punctuation, offset: 82, content: ，, id: KR3k0012_CHANT_362-bkkpn25}
  - {type: 'tls:seg', offset: 82, content: '', id: KR3k0012_CHANT_362-2a.10}
  - {type: variant, offset: 82, length: 1, content: 言, SBCK: 生亦聲也}
  - {type: variant, offset: 82, length: 0, content: '', WYG: 青青有同産兄衛長君及子夫子夫自平陽公主家得幸武帝故青冒姓衛氏漢書曰京房字君明東郡頓丘人也房本姓李推律自定為京氏後漢書曰第五倫字伯魚京兆人也其先諸田人諸田徙園陵者多故以次第為氏崔鴻三十國春秋夏錄曰赫連勃勃下書曰朕之皇祖自北還幽朔姓改姒氏音殊中國故從母氏為劉子而從母之姓非禮也朕將以義易之帝王者係天為子是為徽實與天連今改姓曰赫連氏庻恊皇天之意其非正統皆以鐡伐為氏庻朕宗族子孫剛鋭如鐡皆堪伐人三國典畧曰周蔡祐字承先陳畱圉人齊安郡守襲之子也有膂力便騎射太祖以其戰功賜姓大利稽氏唐書曰康國即漢康居之國也其王姓温月氏先居張掖祁連山北昭武城為突厥所破南依葱嶺遂有其地枝庶皆以昭武為姓示不忘本也又曰則天朝􅀶州刺史琅琊王冲據􅀶州起兵冲父豫州刺史越王貞又舉兵於豫州與相應討平之改姓為虺氏又曰尚可孤東部鮮卑宇文之别種也代居松漠之間天寳末歸國𨽻安禄山後事史思明上元中歸順累授左右威衛二大將軍魚朝恩之統禁軍愛其勇力甚委遇之俾為養子奏改姓魚氏又曰李全畧者本姓王名簡為鎮州小將事王武俊元和中節度使王承宗殁軍情不安自㧞歸朝授代州刺史及長慶初鎮州軍亂害田𢎞正穆宗為之旰食以簡嘗為將召問其計簡遂極}
  - {type: page-break, offset: 82, content: '', id: KR3k0012_WYG_362-3a, image: WYG0896/WYG0896-0230c.png}
