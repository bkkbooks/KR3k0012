  - {type: variant, offset: 1781, length: 2, content: 鎮惡, WYG: 訪毛喜喜即條自古名賢杜叔英喜虞叔卿等二十餘人以啟之文帝稱善白虎通曰人必有姓名何以吐情自紀尊事人者也論語曰名不正則言不順三月名之何天道一時物有其變人生三月目煦亦能咳笑與人相答故因其始有知而名之故禮傳曰子生三月則父名之名之於祖廟者謂子之親廟也明當為宗祖子也一說名之於燕􅃦名者㓜小卑賤之稱也質畧故於燕􅃦殷以日名子何殷家質直故以生日名也尚書言太甲帝乙武丁也於名臣亦得以甲乙生日名子不使亦不止也以尚書道殷臣有巫敢有祖已也何以諸侯不象王者以生日名子也以大王名亶甫王季名歴此殷之諸侯也不以子丑}
