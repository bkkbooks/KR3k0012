  - {type: variant, offset: 1048, length: 118, content: 王莽末年生遭世倉卒其母不舉棄之南山下時天寒冬十一月再宿不死外家出過於道南聞有兒啼聲憐之因往就視有飛鳥紆翼覆之沙石滿其口鼻能喘心怪偉之以有神靈遂取而持歸養長至年十三歲乃以歸宋氏後漢書曰竇武母產武并產一虵又曰虞延初生上有物若一疋練遂上升天占, SBCK: 廉爲名}
