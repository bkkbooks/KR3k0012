  - {type: variant, offset: 310, length: 1, content: 棄, SBCK: 鯉取於父爲􅀋若子同生有與父同者也不以國國君之子不自以本國爲名也不以官不以山川不以隱疾不以畜牲不以器幣周人以諱事神名終將諱之君父之名固非臣子所斥禮旣卒器以木鐸狥曰舍故而諱新謂舎親盡之祖而諱新死者故以國則廢名以官則廢職以山川則廢主以畜牲則廢祀以器幣則廢禮晉以僖侯廢司徒僖侯名司徒廢爲中軍也宋以武公廢司空武公名司空廢爲司城也先君獻武廢二山二山具敖也魯獻公名具武公名敖是以大物不可以命公曰是其生也與吾同物命之曰同物􅀋也謂同日也又閔公曰成季之將生也桓公使卜楚丘之父卜之曰男也其名曰友及生有文在其手曰友遂以命之遂以爲名又文下曰鄋瞞侵齊鄋瞞狄國名遂伐我公卜使叔孫得臣追之吉冬十月敗狄于鹹獲}
