  - {type: variant, offset: 116, length: 129, content: 赫厥靈上帝不寧不康禋祀居然生子禮記內則曰妻將生子及月辰居側室側室謂夾之室次燕寢也夫使人日再問之至生子夫復使人日再問之子生男子設弧於門左女子設帨於門右弧者有事於武者也帨者婦人之佩巾三日始負子男射女否國君世子生告干君接以太牢三日卜士負之射之以桑弧蓬矢六射天地四方, SBCK: 定姓}
  - {type: variant, offset: 116, length: 5, content: 赫厥靈上帝, WYG: 侯爵為姓又曰秦之先曰伯翳佐舜擾馴鳥獸錫姓曰嬴氏其後分封以國為姓有徐氏郯氏黄氏江氏文士傳曰束晢字廣微䟽廣後也王莾末廣曾孫孟造自東海避難歸蕪城改姓去踈之足為束氏世說曰諸葛令恢與王丞相共爭姓族前後王曰何}
