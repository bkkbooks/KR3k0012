  - {type: variant, offset: 255, length: 0, content: '', SBCK: 帝姊陽信長公主季與主家僮衛嫗通生青青有同産兄衛長君及子夫子夫自平陽公主家得幸武帝故青冒姓衛氏漢書曰京房字君明東郡頓丘人也房夲姓李推律自定爲京氏後漢書曰第五倫字伯魚京兆人也其先齊諸田諸田徙園陵者多故以次第爲氏崔鴻三十國春秋夏録曰赫連勃勃下書朕之皇祖自北遷幽朔姓改姒氏音殊中國故從母氏爲劉子而從母之姓非禮也朕將以義易之帝王者係天爲子是爲徽實與天連今改姓曰赫連氏庶恊皇天之意其非正統皆以鐵伐爲氏庶朕宗族子孫剛銳如鐵皆堪伐人三國典略曰周蔡祐字承先陳留圉人齊安郡守襲之子也有膂力便􅀐射太祖以其戰功賜姓大利稽氏唐書曰康國即漢康居之國也其王姓温月氏先居張掖祁連山北昭武城爲突厥所破南依䓗嶺遂有其地枝庶皆以昭武爲姓示不忘本也又曰則天朝博州刺史琅邪王沖據博州起兵沖父豫州刺史越王貞又舉兵於豫州與相應討平之改姓爲虺氏又曰尚可􅀌東部鮮卑宇文之别種也代居松漠之間天寳末歸國􅈻安禄山後事史思明上元中歸順累授左右威衛二大將軍魚朝恩之統禁軍愛其勇力甚委遇之俾爲養子奏改姓魚氏又曰李全略者本姓王名簡爲鎭州小將事王武俊元和中節度使王承宗殁軍情不安自抜歸朝授代州刺史及長慶􅀄鎭州軍亂害田弘正穆宗爲之旰食以簡甞爲將召問其計簡遂極言利害願有以自效明年擢拜横海軍節度使賜姓李氏名全略以崇寵之白虎通曰人所以有姓者何所以崇恩愛厚親親逺禽獸别婚姻也故紀丗別􅀋使生相愛死相哀同姓不得相娶皆爲重人倫也姓者生也人禀天氣所以生者也詩云天生蒸民尚書曰平章百姓姓所以有百者何以爲古者聖人吹律定姓以記其族人含五常而生正聲有五宫商角徴羽轉而相雜五五二十五轉生四時異氣殊音悉備故姓有百也所以有氏者何所以貴功徳下􅇊力或氏其官或氏其事聞其氏即可知矣所以勉人爲善也或氏王父字者何所以別諸侯之後爲興滅國繼絶世也王者之子稱王子王者之孫稱王孫諸侯之子稱公子公子之子稱公孫公孫之子各以其王父字爲氏故春秋有王子瑕論語有王孫賈又有衛公子荆公孫朝魯有仲氏孟氏叔氏季氏楚有昭屈景氏齊有髙國崔盧氏以知其子孫也王者之子亦稱王子兄弟立而皆封也或曰王者之孫亦稱王孫刑徳放曰堯知命表稷契賜姓于􅁎臯陶典刑不表姓言天任徳逺刑禹姓姒祖昌意以薏苡生殷姓子氏祖以玄鳥子生也周姓􅁎氏祖以履大人跡生也風俗通曰萬􅀋之中唯人爲貴春秋左氏傳官有丗功即有官族邑亦如之公羊譏衛滅邢論語貶昭}
