  - {type: variant, offset: 2749, length: 554, content: 害其父母兄弟者哉又曰不舉寤生子俗說兒墮地未能開目視者謂之寤生舉寤生子妨父母謹按春秋左氏傳鄭武公娶于申曰武姜生莊公及共叔段莊公寤生驚姜氏因名寤生武公老終天年姜氏亦然安有妨其父母乎又曰汝南周霸字翁仲為太尉掾婦於乳舍生女自毒無男時屠婦比臥得男因相與私貨易裨錢數萬後翁仲為北海相吏周光能見鬼署光為主簿使還致敬於郡縣因告光曰事訖臈日與小兒俱上家去家經十三年不躬蒸嘗主簿微察知相先君寧息會同飲食忻娛不已往到於家上郎君沃酹主簿俯伏在後但見屠者弊衣蠡結倨神坐持刀割肉有五時衣帶青黑綬數人彷徨陰堂東西廂不敢來前光怪其故還至引見問之乞屏左右起造於膝前白事狀如此翁仲曰主簿出勿言因持劍上堂謂嫗汝何故殺吾子嫗大怒曰卿常言兒聲氣喜學似我老公欲死欲作狂語翁仲曰祠祭如不具服子母立截嫗辭窮情竭泣涕具陳其故時子已年十八呼與辭決曰凡有子者欲以承先祖先祖不享血食無可奈何自以衣裘僮僕車馬送迎取其女女嫁為賣䴵子婦後適西平李文思文思官至南陽太守翁仲更養從弟子熙為高邑令又曰潁川有富室兄弟同居兩婦數月皆懷妊長婦胎傷因閉匿之產期至同到乳母舍弟婦生男夜因盜取之爭訟三年州郡不能決丞相黃霸出坐殿前令卒抱兒取兩婦各十步叱婦曰自往取之長婦抱持甚急兒大啼叫弟婦恐傷害之因乃放與而止甚愴愴長婦甚喜霸曰此弟子也責問乃伏又曰不舉父同月子俗云妨父也按左傳桓公之子與父同月, SBCK: 賀始}
