  - {type: variant, offset: 1442, length: 0, content: '', SBCK: 游肇字伯始髙祖賜名尚書令髙肇丗宗之舅爲百寮懾憚以肇名與巳同欲令改易肇以髙祖所賜秉志不許髙肇甚銜之丗宗嘉其剛梗又曰}
  - {type: variant, offset: 1442, length: 0, content: '', WYG: 游肇字伯始髙祖賜名尚書令髙肇世宗之舅為百寮懾憚以肇名與已同飲令改易肇以髙祖所賜秉志不許髙肇甚衘之世宗嘉其剛梗又曰太和初宋弁為殿中郎中髙祖嘗因朝㑹之次歴訪治道弁年少官微自下而對聲姿清亮進止可觀髙祖稱善者乆之因是大被知遇賜名為弁意取弁和獻玉楚王不知寳也宋書曰廢帝諱昱字德融小字惠震明帝長子也大明七年正月辛丑生於衛尉府太宗諸子在孕皆以周易筮之即以所得之卦為小字故帝字惠震又曰王景文羙風姿好言𤣥理少與陳郡謝莊齊名}
  - {type: page-break, offset: 1442, content: '', id: KR3k0012_WYG_362-12a, image: WYG0896/WYG0896-0235a.png}
  - {type: variant, offset: 1442, length: 0, content: '', krp: 游肇字伯始髙祖賜名尚書令髙肇丗宗之舅爲百寮懾憚以肇名與巳同欲令改易肇以髙祖所賜秉志不許髙肇甚銜之丗宗嘉其剛梗又曰}
  - {type: variant, offset: 1443, length: 0, content: '', SBCK: 和􅀄宋弁爲殿中郎中髙}
  - {type: page-break, offset: 1443, content: '', id: KR3k0012_WYG_362-12b, image: WYG0896/WYG0896-0235b.png}
  - {type: variant, offset: 1443, length: 0, content: '', krp: 和𥘉宋弁爲殿中郎中髙}
  - {type: variant, offset: 1444, length: 0, content: '', SBCK: 甞因朝㑹之次歴訪風月景山水梁書曰張􅌘字四山􅀄􅌘父稷爲剡令至􅌘亭生之因名􅌘字四山少敦孝行年三十餘猶班衣受稷杖動至數百收淚歡然三國典略曰周陸逞字季明綏德郡公通之弟也􅀄名彦字丗雄魏文帝甞從容謂之曰爾旣温􅁉何乃字丗雄且爲丗之雄非所冝也於爾兄弟又復不􅀋遂改焉南史曰陳文帝甞謂宣帝曰我諸子皆以伯爲名汝諸子冝用叔爲稱宣帝因以訪毛喜喜即條自古名賢杜叔英虞叔卿等二十餘人以啓之文帝稱善白虎通曰人必有姓名何以吐情自紀尊事人者也論語曰名不正則言不順三月名之何天}
  - {type: page-break, offset: 1444, content: '', id: KR3k0012_SBCK_362-7b}
  - {type: variant, offset: 1444, length: 10, content: 道武皇帝諱珪獻明皇帝, WYG: 甚相欽重故為太宗娶景文妹而以景文名名太宗又曰顔峻為丹陽尹加散騎常侍先是峻末有子而大司馬江夏王義恭諸子為元㓙所殺至是並各産男上自為制名名義恭子為伯禽以比魯公伯禽周公旦}
  - {type: variant, offset: 1444, length: 0, content: '', krp: 甞因朝㑹之次歴訪風月景山水梁書曰張􅌘字四山𥘉􅌘父稷爲剡令至􅌘亭生之因名􅌘字四山少敦孝行年三十餘猶班衣受稷杖動至數百收淚歡然三國典略曰周陸逞字季明綏德郡公通之弟也𥘉名彦字丗雄魏文帝甞從容謂之曰爾旣温𥙿何乃字丗雄且爲丗之雄非所冝也於爾兄弟又復不類遂改焉南史曰陳文帝甞謂宣帝曰我諸子皆以伯爲名汝諸子冝用叔爲稱宣帝因以訪毛喜喜即條自古名賢杜叔英虞叔卿等二十餘人以啓之文帝稱善白虎通曰人必有姓名何以吐情自紀尊事人者也論語曰名不正則言不順三月名之何天}
  - {type: variant, offset: 1445, length: 0, content: '', SBCK: 一時物有其變人生三月目煦亦能咳􅀏與人相荅故因其始有知而名之故禮傳曰子生三月則父名之名之於祖廟者謂子之親廟也明當爲宗祖子也一􅀃名之於燕寢名者㓜小卑賤之稱也質略故於燕寢殷以日名子何殷家質直故以生日名也尚書言太甲帝乙}
  - {type: page-break, offset: 1445, content: '', id: KR3k0012_SBCK_362-8a}
