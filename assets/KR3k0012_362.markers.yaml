  - {type: variant, offset: 78, length: 1, content: 如, SBCK: 以}
  - {type: variant, offset: 78, length: 0, content: '', WYG: 以從女女生亦聲也易類謀曰黄帝吹律以定姓左傳隠八年曰無駭卒羽父請諡與族公問族於衆仲衆仲對曰天子建徳因生以賜姓因其所由生以賜姓謂若舜媯汭故謂陳為媯姓胙之土而命之氏諸侯以字諸侯位卑不得賜姓故其臣因氏其王父字為諡因以為族官有世功則有官族邑亦}
  - {type: page-break, offset: 78, content: '', id: KR3k0012_WYG_362-1b, image: WYG0896/WYG0896-0229d.png}
  - {type: variant, offset: 78, length: 1, content: 如, krp: 以}
