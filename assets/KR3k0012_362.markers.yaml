  - {type: variant, offset: 4332, length: 3, content: 昔陽翟, WYG: 後帝泓字元時東宫生邵𢎞言于父曰君之於臣先生之與其門人名之可也至於同官之於僚黨同姓之於昆弟同門之於朋友可以稱其字而不可斥其名故公羊傳曰名不如字者非謂其人之名不如其字尊乃謂為人所字則近乎見尊為人所名則近乎見卑也古之君子之名子也必以信義而擇淑令所以祥其名也不以官軄所以殊其名也不以畜弊所以重其名也不以隠疾所以顯其名也遍告内外所以昭其名也書而藏之所以寳其名也賤者避焉所以貴其名也冠而}
