  - {type: punctuation, offset: 252, content: 「, id: KR3k0012_CHANT_362-bkkpn73}
  - {type: variant, offset: 252, length: 1, content: 初, SBCK: 無駭卒羽父請謚與族公問族於衆仲衆仲對曰天子建德因生以賜姓因其所由生以賜姓謂􅀂舜由嬀汭故謂陳爲嬀姓胙之土而命之氏諸侯以字諸侯位卑不得賜姓故其臣因氏其王父字爲謚因以爲族官有丗功則有官族邑亦如之公命以字爲展氏無駭公子展之孫故爲展氏也又襄四年曰穆叔如晉范宣子逆之問焉曰古人有言曰死而不朽何謂也穆叔未對宣子曰昔匄之祖自虞以上爲陶唐氏在夏爲御龍氏在啇爲豕韋氏在周爲唐杜氏晉主夏盟爲范氏其是之謂乎穆叔曰以豹所聞此之謂丗禄非不朽也史記曰太公望吕尚者東海上人其先祖甞爲四嶽佐禹平水土甚有功虞夏之際封於吕本姓姜氏從其封姓故曰吕尚漢書曰夏侯嬰爲滕令故號滕公及曾孫頗尚主主隨外家姓號孫公故滕公子孫更爲孫氏又曰戍卒婁敬求見􅀃上曰陛下取天下與周異而都雒陽不便不如入關據􅁗之固上以問張良良因勸上是日車駕西都長安拜婁敬爲奉春君賜姓劉氏又曰灌夫潁隂人也父張孟甞爲潁隂侯灌嬰舎人因得幸進之至二千石故蒙灌氏姓爲灌孟師古曰蒙冒也又曰衛青字仲卿其父}
