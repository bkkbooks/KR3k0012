  - {type: variant, offset: 4340, length: 0, content: '', WYG: 以其賤不敢言也取薪而生頃公於野又不敢舉也貍乳鸇覆之人見而收之因名无野何稹𤣥壽賜名叙曰新婦荀氏所生女以歳在丁丑四月五日日始出時生此月斗建巳其日又巳其時加卯甲乙卯皆東南春夏天地動發萬物滋生令月吉之善時也又於易卦震位在卯㢲位在巳震為長男㢲為長女而此女孫正用兹日斯時始胆日月豈依先祖之靈寔臨祐之𤣥髪素顔婦人之上姿也壽考无疆生民之至願也故賜名曰𤣥壽焉太平御覽卷}
