  - {type: variant, offset: 1760, length: 0, content: '', SBCK: 因名爲棄旁}
  - {type: variant, offset: 1760, length: 0, content: '', krp: 因名爲棄旁}
  - {type: variant, offset: 1761, length: 311, content: 祖猛曰昔孟嘗君如是而相齊此兒必興吾族因以鎮惡為名又曰范曄字蔚宗母如廁產之額為塼所傷故以塼為小字北齊書曰武明妻皇后諱昭君性寬厚不妒忌高祖率眾將討西寇出師之夜后孿生患切雙生子也生一男一女左右以危急請追告高祖后弗聽曰王出統大兵何得以我故輕離大軍唐書曰幽州節度使劉濟怦之長子初母難產既產侍者初見是一大虵黑氣勃勃莫不驚走及長頗異常童所居室焚人皆驚救濟從容而出眾異之累歷牧宰及怦為節度濟為行軍司馬怦卒軍人習河朔舊事請濟代父為帥朝廷從之莊子曰厲之人夜半生其子也遽取火而視之汲汲然恐其似己也呂氏春秋曰夏后孔甲佃于東陽萯山大風晦迷入民室主人方乳或曰后來是良日也子必大吉或曰不勝必有殃咎乃取歸曰為余子誰敢殃之子成人幕動析橑音老斧破斬其足遂為守, SBCK: 形}
