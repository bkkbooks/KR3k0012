  - {type: variant, offset: 4336, length: 0, content: '', WYG: 字所以尊其名也名成乎禮字依乎名名字之本字名之末也為本故尊為末故卑尊故其禮詳卑故其事畧也且}
  - {type: page-break, offset: 4336, content: '', id: KR3k0012_WYG_362-16a, image: WYG0896/WYG0896-0237a.png}
