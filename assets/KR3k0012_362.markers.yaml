  - {type: variant, offset: 4338, length: 1, content: 妊, WYG: 无名故賤於丈夫野人无名故賤於學士名者己之所以事尊尊者之所以命己字則己之所以接卑卑者所以稱己未有用之于尊而為卑用之于卑而為尊者也捜神記曰齊惠之妾蕭桐子見御有}
