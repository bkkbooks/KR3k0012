  - {type: variant, offset: 367, length: 428, content: 還曰是豺狼之聲也狼子野心非是莫喪羊舌氏矣遂弗視又昭七年曰公衍公為之生也其母偕出出之三日產舍公衍先生公為之母曰相與偕出請相與偕告留公衍母使己共白公三日公為生其母先以告公為為兄公私喜於陽穀而思於魯曰務人為此禍也務人公為也始與公若謀逐季氏且後生而為兄其誣也久矣乃黜之而以公衍為太子家語曰子夏問曰商聞易之生人及萬物鳥獸昆蟲各有奇偶氣分不同而凡人莫知其情惟達道德者能原其本焉天一地二人三三三為九九九八十一一主日日數十故人十月而生八九七十二偶以承奇奇主辰辰為月月主馬故馬十二月而生七九六十三三主斗斗主狗故狗三月而生六九五十四四主時時主豖故豕四月而生五九四十五五為音音主猿故猿五月而生四九三十六六主律律主鹿故鹿六月而生三九二十七七主星星主虎故虎七月而生二九一十八八主風風主蟲故蟲八月而化其餘各從其類矣鳥魚生於陰而屬於陽故皆卵生齕吞者八竅而卵生齟嚼者九竅而胎生晝生者類父夜生者類母敢問其皆然乎孔子曰然吾聞諸老聃亦如子之言也史記楚世家曰吳回生陸終陸終生六子坼副而生焉又曰田嬰, SBCK: ''}
