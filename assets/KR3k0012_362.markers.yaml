  - {type: variant, offset: 94, length: 1, content: 易, WYG: 天任徳逺刑禹姓姒祖昌意以薏苡生殷姓子氏祖以𤣥鳥子生}
  - {type: punctuation, offset: 96, content: 。, id: KR3k0012_CHANT_362-bkkpn29}
  - {type: 'tls:seg', offset: 96, content: '', id: KR3k0012_CHANT_362-2a.14}
  - {type: variant, offset: 96, length: 1, content: 凡, WYG: 周姓姬氏祖以履大}
  - {type: variant, offset: 98, length: 1, content: 在, WYG: 跡生也風俗通曰萬類之中唯人為貴春秋左氏傳官有世功即有官族邑亦如之公羊譏衛滅邢論語貶昭公娶於吴誤同姓也盖姓有九或氏於號或氏於諡或氏於爵或氏於國或氏於官或氏於字或氏於居或氏於事或氏於職以號唐虞夏殷也以諡戴武宣穆也以爵王公侯伯也以國曹魯宋衛也以官司馬司徒司冦司空司城也以字伯仲叔季也以居城國園池也以事巫卜陶丘也以職三馬五鹿青牛馬也三輔舊事曰堯}
  - {type: page-break, offset: 98, content: '', id: KR3k0012_WYG_362-6a, image: WYG0896/WYG0896-0232a.png}
  - {type: variant, offset: 100, length: 3, content: 母則病, WYG: 字慶都配髙辛氏而}
