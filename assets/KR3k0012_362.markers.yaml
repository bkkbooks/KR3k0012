  - {type: variant, offset: 4097, length: 239, content: 寸刃不使得執也至年十五有置鑿於梁上者其末出奴以為木也自下鉤之鑿從梁落陷腦而死後仲舉為豫章太守故遣吏往餉之申家并問奴所在其家以此具告仲舉仲舉歎此謂命矣幽明錄同異苑曰魏郡徐逮字君及婦平昌孟氏生兒頭有一角一腳頭正仰向通身盡赤落地無聲乘虛而去又曰丹陽縣駱慶婦生一男一虎一貍貍虎毛色斑黑牙爪皆備即殺之兒經六日而死母不異又曰沛國武搮之妻林氏元嘉中懷身得病而死俗忌含胎入柩中要須割出妻乳母傷痛之乃撫尸而呪曰若天道有靈無令死被擘裂須臾尸面赩然上色於是呼婢共扶之俄頃兒墮而尸倒也嵩高山記曰昔陽翟有, SBCK: 玄髮素顔}
