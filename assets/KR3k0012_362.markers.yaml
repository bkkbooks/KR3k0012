  - {type: variant, offset: 3560, length: 1, content: 先, SBCK: 人之名不如其字尊乃謂爲人所字則近乎見尊爲人所名則近乎見卑也古之君子之名子也必以信義而擇淑令所以祥其名也不以官職所以殊其名也不以畜幣所以重其名也不以隱疾所以顯其名也遍告内外所以昭其名也書而藏之所以寳其名也賤者避焉所以貴其名也冠而}
