  body:
  - {type: variant, offset: 5, length: 1, content: 一, WYG: ''}
  - {type: variant, offset: 7, length: 0, content: '', SBCK: 七施恩上周易曰見龍在田德施普也雲行􅀨施天下治也周禮曰小司徒以歳時廵國野而賙萬人之艱阨以王命施惠左傳曰冬晉荐饑使乞糴于􅁗􅁗伯謂子桑曰與諸乎對曰重施而不報其民必携携而討焉無衆必敗謂百里曰與諸乎對曰天災流行國家代有救災恤憐道也行道有福是以輸粟于晉自雍及絳相繼命之曰汎舟之役傳曰晉侯逆􅁗師使韓簡視師復曰師少於我闘士倍我公曰何故對曰出因其資入用其寵飢食其粟三施無報是以來也傳曰宋公子鮑禮於國人宋飢竭其粟而貸之年七十以上無不饋詒也時加羞珎異無日不數於}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_SBCK_476-1b}
  - {type: variant, offset: 7, length: 5, content: 六待士毛詩, WYG: 七施惠上周易}
  - {type: variant, offset: 7, length: 0, content: '', krp: 七施恩上周易曰見龍在田德施普也雲行雨施天下治也周禮曰小司徒以歳時廵國野而賙萬人之艱阨以王命施惠左傳曰冬晉荐饑使乞糴于秦秦伯謂子桑曰與諸乎對曰重施而不報其民必携携而討焉無衆必敗謂百里曰與諸乎對曰天災流行國家代有救災恤憐道也行道有福是以輸粟于晉自雍及絳相繼命之曰汎舟之役傳曰晉侯逆秦師使韓簡視師復曰師少於我闘士倍我公曰何故對曰出因其資入用其寵飢食其粟三施無報是以來也傳曰宋公子鮑禮於國人宋飢竭其粟而貸之年七十以上無不饋詒也時加羞珎異無日不數於}
