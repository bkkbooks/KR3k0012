  - {type: variant, offset: 1070, length: 0, content: '', SBCK: 鄧弘収恤故舊無所失父所厚同郡郎中王臨年老貧乏弘常居業給足乞與衣裘輿馬施之終竟後列曰馬援少年處處田牧至有牛馬羊數千頭􅂖萬斛旣而歎曰凢殖貨財産貴其能施賑也否則守錢虜耳乃盡散以班昆弟故舊又曰崔駰學於太學而粮盡鄧衛尉欲餼焉而未果季彦九歳以其父命往見衛尉曰施不必豊期於救乏崔生臣父之執也不幸而貧公許賑之有日矣嘉貺未至或欲豊之然後乃致之乎荅曰家物少湏租入曰是猶古人欲決江海以救牛蹄之􅀋也鄧公曰諾又曰鄧琳字叔孫西羌反破郡縣上乃拜綝謁者屯田三輔琳臨發之日散千金之産分與兄弟甥舅親族各有差品又曰朱暉建􅀄四年南陽大飢米石千錢􅀄同縣張堪有名德每與相見常接以友道暉以堪􅀫望成名未敢安也堪至把暉臂曰欲妻子託朱生暉舉手不敢荅後堪仕至蜀郡漁陽太守物故暉自爲臨淮太守後遂絶不復相聞南陽飢時聞堪妻子貧窮暉乃自往候視困厄分所有以賑之又曰王丹字仲回京兆人王莽時連徴不至家累千金隱居養志好施周急巳具冨部後列曰宼恂經明行脩名重朝廷所得秩俸盡施朋友故人及所從吏士常曰吾因士大夫以致此其獨享之乎時人稱其長者後爲宰相又曰}
