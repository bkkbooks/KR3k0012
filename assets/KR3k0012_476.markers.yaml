  - {type: variant, offset: 951, length: 1, content: 博, WYG: 邑為人惇篤於故舊以愛和為行居處儉節禄賜以供九族鄉黨家無餘財後漢書曰趙典兄子温字子恭初為京兆郡丞歎曰丈夫當雄飛安能雌伏遂弃官去遭歳大饑散家糧以賑窮餓所活萬餘人後漢書劉詡字子相潁川人家世豐産常能周施而不有其惠嘗行於汝南界中有陳國張季禮逺赴師䘮遇寒水車毁頓滯道路詡見而下車與之不告姓名自策馬去季禮意其子相也後以故至潁川還所假乘詡閉門辭謝不與相見後黄巾賊起郡縣饑荒詡救給乏絶資糧者數百人又逢知故困餒於路不忍委去因殺所駕牛以救之衆人止之詡曰視没不救非志也遂俱餓死後漢書折豫字伯式廣漢雒人父國有資財二億家僮八百人豫㓜有仁心不殺昆蟲不折萌芽能通京氏易}
