  - {type: variant, offset: 1415, length: 0, content: '', WYG: 司馬彪續漢書曰郭伋字細侯并州牧徴為太中大夫宅一區及帷帳錢榖伋輙散與宗親九族無遺餘又曰張純字奮少好學節儉行義每分捐租奉貽䘏宗親雖至匱而施與不怠又曰伏湛字惠公更始元年拜為平原太守遭倉卒兵起莫不驚擾而湛獨安然教授謂妻子曰一榖不升國君徹膳今人皆饑奈何獨飽且食麄糲盡分俸禄以賑活鄉里來客者百餘家司馬彪續漢書曰獻帝初百姓饑荒張儉資計差温乃傾竭財産與邑里共之頼其存者以百數又曰肅宗崩廉范奔訃敬陵時廬江郡掾嚴麟奉章俱㑹於路麟乘小車塗深馬死不能自進范見而愍然㑹從騎下馬與之不告而去麟事畢不知馬所歸乃沿路訪之或謂麟曰故蜀郡太守廉叔度好周人窮今奔國䘮獨是耳麟亦素聞范名以為然即牽馬造門謝而歸之世服其義魏志曰楊俊字秀才以兵亂方起而河内處四逹之衢必為戰塲乃扶老弱去詣京雒間同行者百餘家俊賑濟貧乏通共有無宗族知故為人所畧作奴僕者凡六家俊皆傾財贖之魚豢魏畧曰趙熹字伯陽為平原太守百官大㑹光武問熹在郡何如咸稱熹政有跡時親家諸夫人皆㑹㑹罷諸夫人言熹篤義多恩從長安還䕶妾等衣食生活使得蒙今日之富貴非獨能臨人也呉志曰魯肅字子敬大散財貨標賣田地以賑窮弊結士為務甚得鄉邑歡心周瑜為居巢長將數百人故過候肅并求資糧肅家有兩囷米各三千斛肅乃指一囷與瑜瑜益知其竒也遂相親結定僑札之分又曰朱據字子範呉郡人有姿貌膂力絶人又能論難黄武初拜徴五官中郎權遷建業㨿尚在拜左將軍封雲陽侯謙虛接士輕財好施呉志曰駱公緖時年八嵗與親客歸㑹稽事嫡母甚謹時饑荒多有困乏公緒為之飲食衰少其姊仁愛有行寡居無子見甚哀之數問其故公緒曰士大夫糟糠不足我亦何必獨飽姊曰誠如是何不告我而自苦若此乃自以私粟與公緒又以告母亦賢之遂使分施由是顯名晉書曰郗鍳時所在饑荒州中之士素有感其恩義者相與資贍鑒復分所得以恤宗族鄉曲孤老頼而全濟者甚多又曰紀瞻少與陸機兄弟親善及機被誅瞻恤其家周至及嫁女資送同於所生}
