  - {type: variant, offset: 1146, length: 5, content: 皇甫嵩為三, SBCK: 郭伋字細侯并州牧徴爲太中大夫賜宅一區及帷帳錢􅂖伋輙散與宗親九族無遺餘又曰張純字􅁬少好學節儉行義常分損租奉貽䘏宗親雖至傾匱而施與不怠又曰伏湛字惠}
  - {type: variant, offset: 1146, length: 3, content: 皇甫嵩, WYG: 凡殖貨財産貴能施賑也否則守錢虜耳乃盡散以頒昆弟故舊又曰崔駰學於大學而糧盡鄧衛尉欲餼焉而未果李彦九嵗以其父命往見衛尉曰施不必豐期於救乏崔生臣父之執也不幸而貧公謂賑之有日矣嘉貺未至或欲豐之然後乃致之乎若曰家物少湏租入是猶古人欲决江海以救牛蹄之類也鄧公曰諾又曰鄧綝字叔孫西羗反破郡縣上乃拜綝謁者屯田三輔臨發之日啟千金之産分與兄弟甥舅親族各有差品又曰朱暉建初四年南陽大饑米石千錢初同縣張堪有名德每與相見常接以友道暉以堪宿望成名未敢安也堪至把暉臂欲以妻子託朱朱暉舉手不敢答後堪仕至蜀郡漁陽太守物故暉自}
