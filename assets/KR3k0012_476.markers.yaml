  - {type: variant, offset: 8, length: 1, content: 待, SBCK: 卿之門國之賢人無不事也親自桓以下無不䘏也公子鮑美而艶襄夫人欲通之鮑適祖母而不可乃助之施傳曰鄭子皮即位於是鄭飢而未及麥民病子皮以子展之命餼國人粟戸一鍾是以得鄭國之民故罕氏常掌國政以爲上卿傳曰楚子伐蕭申公巫臣曰師人多寒王廵三軍拊而勉之三軍之}
