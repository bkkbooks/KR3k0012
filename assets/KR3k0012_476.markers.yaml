  - {type: variant, offset: 1615, length: 340, content: 人號曰十善又簡取縣強明百餘人以為假子誘接慇懃賜以衣服令各歸為耳目於外於是發姦擿伏事無驗百姓以為神明又曰賈思伯性謙和傾身禮士雖在街途停車下馬接誘恂恂曾無倦色客有謂思伯曰公今貴重甯能不驕伯曰衰至便驕何常之有當時以為雅言唐書李勉禮賢下士終始盡心以名士季巡張參為判官卒於幕三歲之內每遇宴飲必設虛位於筵次陳膳執酹辭色悽惻論者美之又曰裴度以平賊報國為己任自德宗朝宰相歸私第百官不敢及門度以方討不庭宰臣宜日接多士冀有所得因奏請私家通賓客上方屬意遂許之四方布衣盡得以策畫干丞相至今宰臣私接士因度之請也又曰楊炎樂賢下士以汲引為己任天下士子趍嚮風從皇甫謐逸士傳曰公儀潛魯人也少而厲行樂道不事諸侯與子思友魯穆公聞其賢因子思而致命欲以為相謂子思曰公儀子必輔寡人寡將三分魯國而與之晉諸公讚曰張華博識多聞無物, SBCK: 五}
