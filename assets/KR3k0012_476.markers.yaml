  - {type: variant, offset: 882, length: 7, content: 司馬遷云愚以為, SBCK: 韓信釣於城下諸母漂漂水擊挐爲漂有一母見信飢飯信竟漂數十日信謂漂母曰吾必重報母怒曰大夫不能自食吾哀王孫而進食蘇林曰如言公子也豈望報乎前列曰呉楚反竇嬰爲大將軍賜金千斤嬰言􅀽盎欒布諸名賢士在家進之所賜金陳廊廡下軍吏過輙令財取爲用􅂫林曰自令裁取爲用金無入家者又曰}
  - {type: page-break, offset: 882, content: '', id: KR3k0012_SBCK_476-2b}
  - {type: variant, offset: 882, length: 5, content: 司馬遷云愚, WYG: 韓信釣於城下諸母漂漂水擊絮為漂有一母見信饑飯信竟漂數十日信謂漂母曰吾必重報母怒曰大丈夫不能自食吾哀王孫而進食蘇林曰猶言公子也豈望報乎又漢書呉楚反竇嬰為大將軍賜金千斤嬰言袁盎欒布諸名將賢士在家者進之所賜金陳廊廡下軍吏過輙令財取為用蘇林曰自令裁取為用金無入家者又曰李廣厯七郡太守前後四十年得賞賜輙分其麾下飲食與士卒共之家無餘財終不言生産事又漢曰樓䕶字君卿為諫議大夫使郡國䕶乃多持幣帛至齊上書求上先人冢因㑹宗族人親踈各與以束帛一日散百金之費使還奏事稱㫖擢天水太守又漢書韋𤣥成字少翁以父任為郎少好學脩父業尤謙遜下士出遇相識歩行輙下從者與載送}
