  - {type: variant, offset: 901, length: 2, content: 得士, SBCK: 雌伏遂弃官去遭歳大飢散家粮以賑窮餓所活萬餘人後列曰劉詡字子相頴川人家丗豊産常能周施而有不其惠嘗行於汝南界中有陳國張季禮逺赴師䘮遇寒冰車毀頓滯道路詡見而下車與之不告姓名自䇿馬去季禮意其子相也後故到頴隂還所假乗詡閇門辭行不與相見後黄巾賊起郡縣飢荒詡救給乏絶資粮者數百人又逢知故困餒於路不忍委去因殺所駕牛以救之衆人止之詡曰視没不救非志也遂俱餓後列曰折像字伯式廣漢雒人父國有資財二億家僮八伯人像㓜有仁心不殺昆虫不折萌牙能通京氏易好黄老言及國卒感多藏厚亡之義乃散金帛資産周施親踈自知亡日召賔客飲食辭訣忽然而終又曰廖扶逆知歳荒乃聚􅂖數千斛悉用周給宗族姻親又歛葬遭疫}
