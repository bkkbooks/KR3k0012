  - {type: variant, offset: 1971, length: 334, content: 子舍人病疽截手遂廢朝廷重之就以為國子博士高閭燕志曰李陵君長谷之東先主與高雲遊讌往來每憩其家陵與其妻王氏每夜自齎酒饌而至晏子春秋曰晏子之晉至中牟覩幣冠衣裘負芻息於途側晏子問曰何者對曰我越石父也不免飢凍為人臣僕晏子解左驂贖之載以俱歸崔鴻國春秋後秦錄曰太尉文成公姚顯字於章興之弟也清秀明發文武兼才為令錄十餘年無粃改機務之暇賓客如雲謙虛傳受待士以布衣之禮或昏夜靜處與賢士談論政事王孫子新書曰楚莊王攻宋廚有臭肉樽有敗酒將軍子重諫曰今君廚有肉臭而不可食樽有酒敗而不可飲三軍之士皆飢色欲以勝敵不亦難乎說苑曰趙簡子遊於西河而樂之歎曰安得賢士而與處焉舟人古桑對曰鴻鵠高飛遠翔其所恃六翮也背上有毛腹下有毳無尺寸之數去之滿把飛不能為之高不知門下左右客千人者亦有六翮之用乎將盡毛毳新序同而稱晉, SBCK: ''}
