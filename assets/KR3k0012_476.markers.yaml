  - {type: variant, offset: 896, length: 2, content: 絕甘, SBCK: 使郡國護貸多持幣帛至齊上書永上先人􅃁因會宗族人各以親踈與束帛一日散百金之費使還奏事事稱㫖擢夫水太守前列曰韋玄成字少翁以父任爲郎少好學脩父業尤謙遜下士出遇相識歩行輙下從者與載送之以爲常其接人貧賤者益加由是名譽日廣以明經擢爲諌議大夫遷大河都尉前列曰張臨安丗曾孫亦謙儉毎登閣殿常歎曰桑霍爲我戒豈不厚且死}
