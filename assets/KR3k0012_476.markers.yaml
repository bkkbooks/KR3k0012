  - {type: variant, offset: 2330, length: 1183, content: 一而天下之士皆至晏子所與同衣食者百人而天下之士亦至又曰周威王問於甯子曰取士有道乎對曰有窮者達之亡者存之疾者起之士則四方而至矣故士存則國存士亡則國亡子胥怒而亡之包胥怒而存之胡可不貴乎俗說曰謝萬詣簡文萬來無衣幘可前簡文曰但前不須衣幘即呼使入萬著白綸巾鵠氅裘履板而前既見共談移日大器之漢雜事曰于定國謙遜下士士雖貧徒步往過皆與均禮又曰公孫弘為丞相起客館開閣延賢人與參謀議身自食脫粟飯一器盡以俸祿與故人賓客又曰倪寬為人卑體下士務在得人心擇用仁孝推誠與下不求名譽英雄記曰袁紹有姿皃威容愛士養名既累世台司賓客所歸加以傾心折節莫不爭赴其庭士無貴賤與之抗禮環濟吳記曰孟仁少以敏達知名從南陽李恭學其母賢而有智為作大被或問其故母曰小兒無德以致客學者多貧故為大被庶可得氣類相接也黃石公記曰黃梁昔將用兵人有饋一簞醪者使投之於河令將士迎而飲之夫一簞醪不能味一河水三軍思為之死非滋味及之也劉向新序曰燕相得罪於君將出亡召門下諸大夫曰能從我出乎三問莫對燕相曰士之不足養也有進者曰飢年惡歲士糟糠不足而君之犬馬有餘穀隆冬冽寒士短褐不完而君之臺觀帷㡘錦繡自若財者君之所輕死者士之所重也君不能施君之所輕而求得士之所重難焉鬻子曰吾不恐四海之士留於道路也吾恐其留門庭是以四海之士皆至莊子曰子張見魯哀公不禮士也託僕夫而去曰臣聞君好士故不遠千里以見君君之禮士也有似葉公子高之好龍室彫文盡寫以龍於是天龍而下之窺頭於牖拖尾於堂葉公見之棄而還走失其魂魄五色無主是葉公非不好龍也好夫似龍而非龍也今君非不好士也好夫似士而非士者也新序同呂氏春秋曰張儀將西遊於秦過東周客有語之於昭文君者曰張儀壯士也將西遊於秦願君之禮貌之昭文君見謂之曰寡人國雖小請與客共之張儀還北面再拜淮南子曰楚時子發好求伎道之士士有術者無不養楚有善為偷者往見曰臣楚市偷也願以伎該一卒該備也一卒一人後無幾何齊興兵伐楚於是市偷進請曰臣有薄伎願為君行之子發曰諾不問其辭而遣之偷則夜出解齊將軍之帷而獻之子發因使人歸之曰卒有出採薪者得將軍之帷謹歸之於執事明夕復往取其枕子發又使歸之明夕復因取簪又使歸之於是齊師大駭將軍與軍吏謀之曰今夕不去楚軍恐取吾首即還師而去故伎無細薄在人君用之又曰淮南王安養士數千人其中高才八人蘇非李南左吳陳田伍被雷被毛被晉昌號為八公燕丹子曰荊軻之燕太子自御虛左荊軻援綏不讓後日與軻之東宮臨池而觀軻拾瓦投龜太子令人奉槃金軻用抵龜盡而復進軻曰非為太子愛金也臂痛耳後共乘千里馬軻曰聞千里馬肝美太子即殺馬進肝暨樊將軍得罪於秦秦求之急乃來歸太子為置酒陽華之臺酒中太子出美人能琴者軻曰好手太子即進之軻曰但愛其手太子即斷其手盛以玉盤奉之太子常與軻等案而食同床而寢呂氏春秋曰勾踐苦會稽之恥欲深得民心以致必死於吳有甘肥不足分弗敢食有酒流之江與民同之韓子曰吳起出遇故人而止之食故人曰諾故人至暮不來吳起至暮不食而待之孫子曰楚莊王攻宋有酒投之水有食饋之賢行軍中之有飢色者加賜之, SBCK: 六}
  - {type: variant, offset: 2330, length: 1183, content: 一而天下之士皆至晏子所與同衣食者百人而天下之士亦至又曰周威王問於甯子曰取士有道乎對曰有窮者達之亡者存之疾者起之士則四方而至矣故士存則國存士亡則國亡子胥怒而亡之包胥怒而存之胡可不貴乎俗說曰謝萬詣簡文萬來無衣幘可前簡文曰但前不須衣幘即呼使入萬著白綸巾鵠氅裘履板而前既見共談移日大器之漢雜事曰于定國謙遜下士士雖貧徒步往過皆與均禮又曰公孫弘為丞相起客館開閣延賢人與參謀議身自食脫粟飯一器盡以俸祿與故人賓客又曰倪寬為人卑體下士務在得人心擇用仁孝推誠與下不求名譽英雄記曰袁紹有姿皃威容愛士養名既累世台司賓客所歸加以傾心折節莫不爭赴其庭士無貴賤與之抗禮環濟吳記曰孟仁少以敏達知名從南陽李恭學其母賢而有智為作大被或問其故母曰小兒無德以致客學者多貧故為大被庶可得氣類相接也黃石公記曰黃梁昔將用兵人有饋一簞醪者使投之於河令將士迎而飲之夫一簞醪不能味一河水三軍思為之死非滋味及之也劉向新序曰燕相得罪於君將出亡召門下諸大夫曰能從我出乎三問莫對燕相曰士之不足養也有進者曰飢年惡歲士糟糠不足而君之犬馬有餘穀隆冬冽寒士短褐不完而君之臺觀帷㡘錦繡自若財者君之所輕死者士之所重也君不能施君之所輕而求得士之所重難焉鬻子曰吾不恐四海之士留於道路也吾恐其留門庭是以四海之士皆至莊子曰子張見魯哀公不禮士也託僕夫而去曰臣聞君好士故不遠千里以見君君之禮士也有似葉公子高之好龍室彫文盡寫以龍於是天龍而下之窺頭於牖拖尾於堂葉公見之棄而還走失其魂魄五色無主是葉公非不好龍也好夫似龍而非龍也今君非不好士也好夫似士而非士者也新序同呂氏春秋曰張儀將西遊於秦過東周客有語之於昭文君者曰張儀壯士也將西遊於秦願君之禮貌之昭文君見謂之曰寡人國雖小請與客共之張儀還北面再拜淮南子曰楚時子發好求伎道之士士有術者無不養楚有善為偷者往見曰臣楚市偷也願以伎該一卒該備也一卒一人後無幾何齊興兵伐楚於是市偷進請曰臣有薄伎願為君行之子發曰諾不問其辭而遣之偷則夜出解齊將軍之帷而獻之子發因使人歸之曰卒有出採薪者得將軍之帷謹歸之於執事明夕復往取其枕子發又使歸之明夕復因取簪又使歸之於是齊師大駭將軍與軍吏謀之曰今夕不去楚軍恐取吾首即還師而去故伎無細薄在人君用之又曰淮南王安養士數千人其中高才八人蘇非李南左吳陳田伍被雷被毛被晉昌號為八公燕丹子曰荊軻之燕太子自御虛左荊軻援綏不讓後日與軻之東宮臨池而觀軻拾瓦投龜太子令人奉槃金軻用抵龜盡而復進軻曰非為太子愛金也臂痛耳後共乘千里馬軻曰聞千里馬肝美太子即殺馬進肝暨樊將軍得罪於秦秦求之急乃來歸太子為置酒陽華之臺酒中太子出美人能琴者軻曰好手太子即進之軻曰但愛其手太子即斷其手盛以玉盤奉之太子常與軻等案而食同床而寢呂氏春秋曰勾踐苦會稽之恥欲深得民心以致必死於吳有甘肥不足分弗敢食有酒流之江與民同之韓子曰吳起出遇故人而止之食故人曰諾故人至暮不來吳起至暮不食而待之孫子曰楚莊王攻宋有酒投之水有食饋之賢行軍中之有飢色者加賜之, WYG: 六}
