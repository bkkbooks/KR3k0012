  - {type: variant, offset: 1457, length: 241, content: 為利乃若是哉乘輿嘗幸太常府令榮坐東西設几杖會百官驃騎將軍東平王蒼以下及榮門生數百人天子親自執業既罷悉以太官供具賜太常家其恩禮若此又曰桓榮及子郁皆為太常初榮受學章句減其煩辭後郁又刪之由是有桓君大小太常章句又曰靈帝欲以羊續為太尉時拜三公者皆輸東園禮錢千萬令中使督之名為左騶騶騎土也其所之往輒迎致禮敬厚加贈賂續乃坐使人於單席舉縕袍以示之曰臣之所資唯斯而巳左騶白之帝不悅以此故不登位而徵為太常又曰楊賜以病罷居無何拜太常詔賜御府衣一襲衣單服具曰襲所服冠幘綬玉壺革帶金錯鉤佩金錯以金間錯其文續後, SBCK: 節}
