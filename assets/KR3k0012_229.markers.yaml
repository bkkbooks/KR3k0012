  - {type: variant, offset: 3097, length: 7, content: 絳朝服佩水蒼玉, WYG: 秩千石丞四人郡孝亷年五十清修聰明者光禄上名廼召拜皆秩四百石三嵗為令以供養勞苦遷左丞有湯官丞掌諸甘肥有菓丞掌菓𤓰菜茹薪炭漢書儀曰太官主飲酒皆令丞治太官湯奴婢各三千人置酒皆緹褠音溝蔽膝緑幘又曰太官上食釦音口金飾器器中官私上食用白銀釦器如神廟器云謝承後漢書曰魯國陳政字叔方為太官令黄門郎與政有隙因進御食以髪貫炙帝見髪勅斬政政曰臣有當死者三黒山出炭増治吐炎燋膚爛肉而髪不消臣罪一也陜出刀砥礪五石虧肌截骨曽不能斷髪臣罪二也臣朗月書章奏側光讀經旦臨食與丞及庖人六目齊視不及黄門一人臣罪三也詔赦之魏略曰時苗為夀春令遷為太官令後魏書曰毛循之能為南人食手自煎調多所適意也世祖親待之進太官尚書賜爵南郡公加冠軍將軍常在太官主進御膳揚雄太官令箴曰時惟膳夫實司王饔祁祁庶羞口實是供羣物百品八珍清觴以御賓客以膳於王}
