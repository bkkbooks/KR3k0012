  - {type: variant, offset: 3077, length: 2, content: 常卿, SBCK: 官令兩梁官冠秩千石丞四人郡孝廉年五十清修聦明者光禄上名迺召拜皆秩四百石三歳爲令以供養勞苦迁左丞有湯官丞掌諸甘肥有菓丞掌菓􅀲菜茹薪炭漢舊儀曰太宫主飯肉湯官酒皆令丞治太官湯官奴婢各三千大置酒皆緹構音溝蔽膝縁幘又曰太官上食黄釦音口金飾器器中官私官上食用白銀釦器如祠廟器云謝承後漢書曰魯國陳政字叔方爲太官令黄門郎與政有􅂩因進御食以髪貫炙光武見髮勑斬政政曰臣有當死者三黒山出炭増治吐炎燋膚爛􅁏而髪不消臣罪一也陜出佩刀砥礪五石虧肌截骨曽不能断髪臣罪二也臣朗月書章奏側光讀經書旦臨食與丞及庖人六目齊視黄門}
