  - {type: variant, offset: 233, length: 323, content: 倡九牧阜成兆民六卿各帥其屬官大夫止治其所分之職倡遵九州牧伯為政大成兆民之性命漢官儀曰卿中秩二千石綬青地桃花三彩又曰衣裳公侯華蟲卿大夫藻火左傳曰齊侯使敬仲為卿辭曰羈旅之臣幸若獲宥宥赦及於寬政赦其不閑於教訓而免於罪戾弛於負擔君之惠也所獲多矣敢辱高位以速官謗請以死告以死為誓又曰卿非君命不越境又曰晉蒐于被盧命趙衰為卿讓於先軫杜預曰先軫晉下軍之佐原軫周禮曰朝士掌外朝之法左九棘孤卿大夫位焉樹棘以為位者取其赤心而外刺象赤心三刺春秋漢含孳曰故三公象五岳九卿法河海三公在天法三台九卿法北斗國語曰晉悼公使張老為卿辭曰臣不如魏綘之智能治大官其仁可以利公室若在卿位外內必平漢官曰司馬安巧宦四至九卿謝承後漢書曰李叔諫更始曰夫三公上應台宿九卿下括河內梁書曰武帝天監七年以, SBCK: 獻}
