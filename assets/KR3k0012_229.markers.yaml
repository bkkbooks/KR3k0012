  - {type: variant, offset: 2047, length: 2, content: 移家, SBCK: 一獲譴死矣其謹愼如此又曰周仁景帝時爲郎中令爲人隂重不􅂥服䖍曰質重不泄人之隂謀也師古曰隂宻也言爲性宻重不泄人言也以是得幸出入卧内於宫祕戯仁常在傍終無所言又曰張安世字孺子爲光禄勲郎有醉小便殿上主事白行法安世曰何以知其不覆水􅁘郎有􅁋官婢婢兄自言安世怒以奴􅁋汚衣冠告署撻奴其隱人過皆此􅀋也東觀漢記曰孫堪字子雅爲光禄勲以清廉稱與周澤相􅀋澤字雅都京師號之爲二雅又曰劉昆字桓公爲光禄勲授皇太子及諸王小侯五十人經昆老退位以二千石禄終其身又曰邵訓字伯春郷里號之曰徳行恂恂邵伯春章和中爲光禄勲後漢書曰杜林字伯山扶風人也林少沉審􅀶學多聞世稱通儒爲光禄勲内奉􅀫衛外㹅三署郎有好學者輙見引進朝夕滿堂又曰馬防字公平林風人也防貴寵最盛與九卿絶席拜光禄卿又曰張湛字子孝拜光禄勲光武臨朝或有惰容輙陳諌常乗白馬上後見湛輙曰白馬生且復諌矣又曰􅀽彭順帝􅀄爲光禄勲行至清爲吏麄􅂁糲食續漢書曰荀爽字慈明爲光禄勲視事三月䇿拜司空謝承後漢書曰楊賜字伯欽拜爲光禄勲嘉徳殿前有青赤氣詔特進遣中使問賜祥異禍福􅁻㐫所在以賜􅀶學頭儒故宻諮問其極陳其意嘗上䟽陳請案春秋䜟天投蜺海内亂今妄嬖閹尹共專國朝之所致也魏志曰鄭袤爲光禄勲}
