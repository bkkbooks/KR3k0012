  - {type: page-break, offset: 2047, content: '', id: KR3k0012_SBCK_229-7b}
  - {type: variant, offset: 2047, length: 10, content: 移家母鍾年高違離靡寧, WYG: 一獲譴死矣其謹慎如此又曰周仁景帝時為郎中令為人隂重不洩服䖍曰質重不泄人之隂謀也師古曰隂密也言為性密重不洩人言也以是得幸出入卧内於後宫秘戯仁常在傍終無所言又曰張安世字子孺為光禄勲郎有醉小便殿上主事白行法安世曰何以知其不覆水耶郎有淫官婢婢兄自言安世怒以奴淫汚衣冠告署撻奴其隐人過皆此類也東觀漢記曰孫堪字子雅為光禄勲以清亷稱與周澤相類澤字雅都京師號之為二雅又曰劉昆字桓公為光禄勲授皇太子及諸王小侯五十人經昆老退位以二千石禄終其身又曰邵訓字伯春鄉里號之曰德行恂恂邵伯春章和中為光禄勲後漢書曰杜林字伯山扶風人也林少沉審博學多聞世稱通儒為光禄勲内奉宿衛外總三署郎有好學者輙見引進朝夕滿堂又曰馬防字公平扶風人也防貴寵盛與九卿絶席拜光禄卿又曰張湛字子孝拜光禄勲光武臨朝或有惰容輙諫常乗白馬上後見湛輙曰白馬生且復諫矣又曰袁彭順帝初為光禄勲行至清為吏麄糲食續漢書曰荀爽字慈明為光禄勲視事三月策拜司空謝承後漢書曰楊賜字伯欽拜為光禄勲嘉德殿前有青赤氣詔特進遣中使問賜祥異禍福吉凶所在以賜博學碩儒故密諮問其極陳其意嘗上疏陳請案春秋䜟天投蜺海内亂今妾媵閹尹共專國政之所致也魏志曰鄭柔為光禄勲毌丘儉作亂帝自征之百官祖送柔疾不任㑹上謂王肅唯不見鄭光禄為恨柔聞自輿追上上笑曰知生必來遂與同載問以計謀帝甚重之又曰王肅字子雍為光禄勲時有魚長尺集武庫之屋有司以為吉祥肅辨之曰魚生於泉而見於屋鱗介之物失其所也邊將其殆有棄甲之變乎其後果有東闗之敗又曰袁渙字曜卿為郎中令時言蜀主死羣臣皆賀渙以嘗為其吏獨不賀卒官太祖為之流涕吳志曰石偉字公操南郡人少好學修節不怠為獨立有不可奪之志舉茂才賢良方正皆不就孫休即位特徵偉累遷至光禄勲及皓即位朝政昏亂偉乃辭老耄錮疾}
