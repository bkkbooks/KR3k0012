  - {type: variant, offset: 186, length: 1, content: 並, SBCK: 􅀽聿修廵省河南諸州兖州刺史刑部與聿修故舊嘗於省中盛呼聿修爲清郎至是遣送白紬爲信聿修不受與邵書郎曰􅀲田李下古人所愼多言可畏譬之防川願表此心不貽厚責邵亦忻然報書曰一日之贈率尓不思老夫忽忽意不及此敬丞來旨吾無間然弟昔爲清郎今作清卿矣唐書曰馮定爲}
