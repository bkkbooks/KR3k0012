  - {type: variant, offset: 1243, length: 0, content: '', SBCK: 不專於胥吏郭子曰張慿舉孝廉詣劉真長還舡湏􅁷真長至遣覔張孝廉舡同旅愕然旣同載俱詣撫軍劉前進謂撫軍曰今日爲公得一士太常􅀶士之選旣前撫軍與之言咨咾嗟稱善乃曰張慿勃倅爲理窟即用爲太常􅀶士太祝六典曰太祝掌出納神主于太廟之九室而奉享薦禘祫之儀周禮曰太祝掌六祝之辭以事􅀑神示祈福祥求永貞一曰順祝二曰年祝三曰􅁻祝四曰化祝五曰瑞祝六曰筴祝鄭司農曰順祝順農年也年祝求永貞也􅁻祝祈福祥也化祝弭災兵也瑞祝逆時􅀨寧風旱也筴祝逺罪疾也漢書百官表曰太常属官}
