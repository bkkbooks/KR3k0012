  - {type: variant, offset: 2860, length: 214, content: 曰北海周澤為太常恒齊其妻憐其年老瘦弱窺內問之澤大怒以為干齊掾吏扣頭爭之不聽遂收送詔獄并自劾論者非其激發諺曰居代不諧為太常妻一歲三百六十日三百五十九日齊一日不齊醉如泥既作事復低迷漢官典職曰惠帝改太常為奉常景帝復為太常蓋周官宗伯也漢官解詁曰太常社稷郊祀事重職尊故在九卿之首衛宏曰太常主導贊助祭皆平冕七旒玄上纁下華䖝七章漢陵屬三輔太常月一行漢書注顏師古曰太常者王之旌也晝日月焉王有大事則建以行禮官主奉持之故曰奉常後改曰太尊大之義也齊職, SBCK: ''}
