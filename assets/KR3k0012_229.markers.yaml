  - {type: variant, offset: 2291, length: 235, content: 武帝曰卿輩未富貴謂人不與既富貴復欲委去之瓌曰陛下御臣等若養馬無事就閑廄有事復牽來帝猶怒遂以為散騎常侍北齊書曰趙彥深五歲母傅氏謂之曰家貧兒小何以能濟彥深泣而言曰若天哀矜兒大當仰報傅感其意對之流涕及彥深拜太常卿還不脫朝服先入見母跪陳幼小孤露蒙訓得至於此母子相泣久之然後改服後周書曰長孫紹遠為太常廣召工人制樂器土木絲竹各得其宜唯黃鍾不調紹遠每以為意常因退朝經韓使君佛寺前過浮圖三層之上有鳴鐸焉忽聞其音雅合官調取而配奏方始克諧又曰斛斯徵遷太常卿自魏孝武西遷雅樂廢缺徵博採遺逸稽諸, SBCK: 古}
