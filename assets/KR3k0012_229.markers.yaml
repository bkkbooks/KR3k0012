  - {type: variant, offset: 2033, length: 0, content: '', WYG: 祀之牲牢各有名數昊天上帝以蒼地皇祗以黄神州以黝五帝之牲各以方色韋昭辨釋名曰釋云廩犧犧戯也廩養之也辨充六牲取其毛者别養之以奉祭祀純色者少故名犧犧希也周禮曰牧人下士掌牧六牲以供祭祀漢書百官表曰内史屬官有廩犧令丞尉後屬司農齊職儀曰周牧人之職也掌六牲陽祀用騂隂祀用黝取純毛者光武中興屬河南秩六百石光禄卿六典曰光禄卿之職掌邦國醪醴膳羞之屬總大官珍羞良醖掌醢四署之官屬修其儲備謹其出納少卿為之貳凡大祭祀則省牲鑊視濯溉漢官解詁曰士之權貴不過尚書其次諸吏諸吏光禄勲是也應邵漢官儀曰光明也禄爵也勲功也言光六典郎謁諸虎賁羽林舉不妄得賞不失勞故曰光禄勲唐書官品志曰光禄卿位視太子中庶子掌官尉門户統守黄門華林園暴室等令漢書曰郎中令秦官武帝太初元}
