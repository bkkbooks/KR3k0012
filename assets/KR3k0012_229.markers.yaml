  - {type: variant, offset: 1776, length: 3, content: 劉愷為, SBCK: 髙廟令一人六百石主守宗廟掌按行掃除無丞丞世祖廟令一人宋書太廟令一人主守宗廟案行洒掃衆事領齊郎二十四人齊職儀曰周有守祧之官掌先王廟令陵令六典曰陵令掌先帝山陵率户守衛之事丞爲之貳凢朔望元正冬至寒食皆修饗於諸陵若橋陵則曰獻羞焉凢功臣宻戚請陪陵葬者聽之以文武分爲左右而列􅀂父祖陵陪子孫從葬者亦如之周禮曰冢人下大夫二人中士四人掌公墓之地辨其兆域先王之葬居中以昭穆爲左右漢書曰}
