  - {type: variant, offset: 2030, length: 0, content: '', krp: 成帝咸和中詔太樂令載綏教官伎樂勤勞賜米百石布二十疋太醫令六典曰太醫令掌諸醫療之法丞爲之貳其屬有四曰醫師針師按摩師呪禁師皆有博士以教之考試登用如國子監之法漢書曰百官表曰少府屬官有太醫令丞無貟多至數十人續漢書曰太醫一人秩六百石有藥丞主藥方丞魏略曰脂習字元升除太醫令與孔融親善融𬒳誅習獨往哭之黄𥘉中以習有欒布之節賜拜中散大夫應劭漢官注曰太醫周官也兩梁冠秩千石典論曰中常侍張讓子奉爲太醫令與人飲酒輙掣引衣裳發露形體亂其舄履使小大無不傾倒崔寔太醫令箴曰動不肆勤静不宴逸有疾歸天醫無能恤晉平好内四時是一非鬼非食惑以自失雖有秦和焉所施術太上防疾其次萌牙腠理不蠲骨髓奈何廩犧令六典曰廪犧令掌薦犧牲及粢盛之事丞爲之貳凢三祀之牲牢各有名數昊天上帝以蒼地皇祗以黄神州以黝五帝之牲各以方色韋昭辨釋名曰釋云廩犧犧戯也廪養之也辨云六牲取其純毛者别養之以奉祭祀純色者少故名犧犧希也周禮曰牧人下士掌牧六牲以供祭祀漢書百官表曰内史屬官有廩犧令丞尉後屬司農齊職儀曰周牧人之職也掌六牲陽祀用騂隂祀用􅉳取純毛者光武中興属河南秩六百石光禄卿六典曰光禄卿之職掌邦國醪醴膳羞之事揔太官珍羞良醖掌醢四署之官屬修其儲備謹其出納少卿爲之貳有大祭祀則省牲鑊視濯漑漢官解詁曰士之權貴不過尚書其次諸吏諸吏光禄勲是也應劭漢官儀曰光明也禄爵也勲功也言光禄典郎謁諸虎賁羽林學不}
