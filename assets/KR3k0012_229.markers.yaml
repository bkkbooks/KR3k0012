  - {type: variant, offset: 3130, length: 182, content: 常雖身處上卿而布被瓦器梁陸陲為光祿讓太常表曰昔者楚德方盛叔敖濯衣漢道克昌王陽結綬故拜命無辭受爵不讓况宗卿清重歷選所難漢晉巳降莫非素範辭爵則桓郁張奮讓封則丁鴻劉愷潘尼音夷之文雅純深華表之從容退嘿自此迄茲風流繼軌以臣況之曾無等級陳沈炯為周弘正讓太常表曰臣聞玉舄雕楹不取材於蟠木丹朱繡黼豈襲冕於薜蘿何則適用各有其宜朝野不可一指叔孫之野外定禮資典實刁恊之躬為唱引豈易其儀儻, SBCK: 平御覽卷第二百二十}
