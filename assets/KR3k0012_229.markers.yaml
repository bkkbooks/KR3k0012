  - {type: variant, offset: 186, length: 1, content: 並, krp: 袁聿修廵省河南諸州兖州刺史刑部與聿修故舊嘗於省中盛呼聿修爲清郎至是遣送白紬爲信聿修不受與邵書郎曰瓜田李下古人所愼多言可畏譬之防川願表此心不貽厚責邵亦忻然報書曰一日之贈率尓不思老夫忽忽意不及此敬丞來旨吾無間然弟昔爲清郎今作清卿矣唐書曰馮定爲}
  - {type: variant, offset: 189, length: 0, content: '', SBCK: 少卿文宗每聽樂鄙鄭衛聲詔奉常習開元中霓裳羽衣舞以雲韶樂和之舞曲成定揔樂工閱於庭定立於其間文宗以其端凝􅀂植問其姓氏翰林學士李珏對曰此馮定也文宗喜問曰豈非能爲古章句者耶乃召升階文宗自吟定送客西江詩吟罷益嘉因錫禁中瑞錦仍令大録}
