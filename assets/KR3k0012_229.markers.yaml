  - {type: variant, offset: 991, length: 213, content: 掌天地神祇人鬼之禮史記曰高祖滅秦登尊號群臣飲爭功醉或怨妄呼拔劍擊柱上患之於是叔孫通進說遂為綿蕝子悅切野外習之月餘通曰可試觀上使行禮帝輦出房百官執職傳警引諸侯王以下次奉賀莫不震恐肅敬諸侍坐殿上皆伏抑首以尊卑起上壽觴九行謁者言罷御史執法與不儀者趣輒引去竟朝置酒無敢讙譁失禮者於是高祖曰吾今日乃知為皇帝之貴也拜通太常賜金五百斤通因進言曰諸弟子儒生隨臣久矣與共為儀願陛下官之高帝悉以為郎通出皆以五百斤金賜諸生諸生曰叔孫生聖人也知當世務, SBCK: ''}
