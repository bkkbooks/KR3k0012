  - {type: variant, offset: 653, length: 248, content: 及功曹主簿北齊書曰以太常光祿衛尉宗正太僕大理鴻臚司農太府是為九寺莊子曰楚昭王迎屠羊說以珪之位馬彪曰諸侯三卿皆執珪說苑曰秦繆公使賈人載塩於衛賈人買百里奚使將軍至秦繆公觀塩見百里奚牛肥公問之對曰臣牛食之以時使之不暴是以肥也公知其君子以為上卿又曰九卿者不失四時通於溝渠補隄防種樹木美五榖如是舉以為九卿之事常在於德又曰齊桓公使管仲治國對曰賤不能臨貴桓公以為上卿而國不治對曰貧不能使富桓公賜之齊市租一年而國不治桓公曰何故對曰踈不能成近桓公立以為仲父國大安孔子曰管仲之貴不得此權者亦不能使其君面南而伯矣太常卿, SBCK: ''}
