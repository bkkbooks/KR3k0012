  - {type: variant, offset: 1216, length: 0, content: '', SBCK: 爲太常丞凢宗廟疑義多所决定時人爲之語曰定禮决疑問陶覆之陶氏職官要録曰晉宋九卿丞皆進賢一梁冠介幘皂衣銅印黄綬齊梁墨綬太常􅀶士六}
  - {type: page-break, offset: 1216, content: '', id: KR3k0012_SBCK_229-2b}
  - {type: variant, offset: 1216, length: 0, content: '', WYG: 為太常丞凡宗廟疑義多所决定一時人為之語定禮决疑問陶覆之陶氏職官要録曰晉宋九卿丞皆進賢一梁冠介幘皂衣銅印黄綬齊梁黒綬太常博士六}
  - {type: variant, offset: 1216, length: 0, content: '', krp: 爲太常丞凢宗廟疑義多所决定時人爲之語曰定禮决疑問陶覆之陶氏職官要録曰晉宋九卿丞皆進賢一梁冠介幘皂衣銅印黄綬齊梁墨綬太常博士六}
  - {type: variant, offset: 1217, length: 0, content: '', SBCK: 曰太常􅀶士掌辨五禮之儀式本先王之法制適變隨時而損益焉凢大􅀕祀及有大禮則與卿導賛其儀凢王公巳下擬謚皆跡其功徳而爲之褒貶通典曰愽士魏官也魏文帝􅀄置晉因之事掌引道乗輿王公巳下應追謚者則􅀶士議定之晉中興書曰􅀶士之職端委佩玉朝之大典必於詢度當以正道克厭人望然後爲可唐書曰王彦威太原人世儒家少􅀌貧苦學尤通}
  - {type: variant, offset: 1217, length: 0, content: '', WYG: 曰太常博士辨五禮之儀式本先王之法制適變隨時而損益焉凡大祭祀及有大禮則與卿導贊其儀凡王公以下擬諡皆跡其功德而為之褒貶通典曰博士魏官也魏文帝初置晉因之事掌引道乗輿王公以下應追諡者則博士議定之晉中興書曰博士之職端委佩玉朝之大典必于詢度當以正道克厭人望然後為可唐書曰王彦威太原人世儒家少孤貧苦學尤通}
  - {type: page-break, offset: 1217, content: '', id: KR3k0012_WYG_229-4a, image: WYG0895/WYG0895-0121a.png}
  - {type: variant, offset: 1217, length: 0, content: '', krp: 曰太常博士掌辨五禮之儀式本先王之法制適變隨時而損益焉凢大祭祀及有大禮則與卿導賛其儀凢王公巳下擬謚皆跡其功徳而爲之褒貶通典曰愽士魏官也魏文帝𥘉置晉因之事掌引道乗輿王公巳下應追謚者則博士議定之晉中興書曰博士之職端委佩玉朝之大典必於詢度當以正道克厭人望然後爲可唐書曰王彦威太原人世儒家少孤貧苦學尤通}
