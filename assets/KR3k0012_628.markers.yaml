  - {type: variant, offset: 1150, length: 400, content: 為吏吏益多賈人矣商賈以幣之變多積貨逐利於是公卿言郡國頗被災害貧民無產業者募徙廣饒之地陛下損膳省用出禁錢以振元元寬貸而民不齊出南畝商賈滋象貧者畜積無有皆仰縣官異時筭軺車賈人之緡錢皆有差請筭如故率緡錢二千而筭一師古曰率計有二千錢者則出一筭諸作有租及鑄以手力所作而賣之者率緍錢四千筭一非吏比者三老北邊騎士軺車一筭師古曰比例也身非為吏之例非為三老非為北邊騎士而有軺車者皆令出一筭比音必寐反商賈人車二筭商賈人有軺車又使多出一筭重其職舡五丈以上一筭匿不自占占不悉戍邊一歲沒入緡錢悉猶盡也有能告者以其半畀之畀與也音必寐反賈人有市籍及家屬皆無得名田一人有市籍身及家內皆不得有田地以便農敢犯令沒入田貨又曰晁錯奏古者稅民不過什一其求易供使民不過三日其力易足至秦則不然用商鞅之法改帝王之制除井田民得賣買富者田連阡陌貧者亡立錐之地入顓川澤之利管山林之餘荒淫越制踰侈以相高邑有人君之尊里有公侯之富小民安得不困又曰自貢禹在位數言, SBCK: 爲甲次爲乙􅀂録政化}
