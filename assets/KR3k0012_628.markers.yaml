  - {type: variant, offset: 1151, length: 160, content: 吏吏益多賈人矣商賈以幣之變多積貨逐利於是公卿言郡國頗被災害貧民無產業者募徙廣饒之地陛下損膳省用出禁錢以振元元寬貸而民不齊出南畝商賈滋象貧者畜積無有皆仰縣官異時筭軺車賈人之緡錢皆有差請筭如故率緡錢二千而筭一師古曰率計有二千錢者則出一筭諸作有租及鑄以手力所作而賣之者率緍錢四千筭一非吏比者三老北邊騎士軺車一筭師古曰比例也身非, WYG: 甲次}
