  - {type: variant, offset: 2339, length: 1072, content: 鵠東西南北儵忽千里所恃者六翼也今仲父寡人之翼也管子對曰民勞而亡使之不時民飢而重歛焉雖黃鵠之有羽翼其若君何晏子春秋曰為君籍厚斂而託之為民進讒諛而託之用賢遠公正而託之不順君行此三者則危墨子曰聖王作舟車完固輕利可以任重致遠是以民樂而利之今則厚歛百姓飾車以文采飾舟以刻鏤是以其民飢寒並至而國亂矣又曰古之民未知飲食故聖人耕稼其為食也以增氣充虛今則厚歛百姓以為美蒸庖魚鼈前則方丈孤寡凍餧雖欲無亂不可得也孟子曰求也為季氏宰無能改於其德而賦粟倍於他日孔子曰求也非我徒也小子鳴鼓而攻之可也又曰耕者助而不稅則天下之農皆悅而欲耕於其野也孫卿子曰成侯嗣君聚歛計數之君也未及取民者也鄭子產取民者也未及為政者也管仲為政者也未及脩禮者也故脩禮者王為政者強取民者安聚歛者亡莊子曰北宮奢為衛靈公賦歛以鍾為壇于郭門之外三日而成上下之懸王子慶忌見而問焉曰子何術設之奢曰無敢設也奢聞之既琢復歸於朴還其用本性也伺乎其無識任其純朴而也儻兮其怠疑無所取也華兮其送往而迎來無所欣悅來者勿禁往者無止任彼耳也從其強梁從于眾也隨其典傅無所係也因其自窮用其不得不爾故朝夕賦歛而毫毛不挫故無損也而況有大塗者乎韓子曰趙簡主出稅吏請輕重簡主曰勿輕勿重則利入於上輕則利歸於民吏無有私利而正矣孔藂子曰子思言茍變於衛君曰其才可將五百乘衛君曰吾知其才可然變嘗為吏賦於民而食人二鷄子故弗用也子思曰夫聖人之官人如大匠之用木也取其所長棄其所短今君以二卵棄扞城之將不可使聞於鄰國也公曰謹受命淮南子曰或有罪而可賞或有功而可罪者始西門豹治鄴西門豹魏之侯之官食無積粟府無儲錢庫無兵甲官無計會人數言其過於文侯身往行其縣果若人言文侯曰翟璜任子治鄴鄴大亂子能變道則可不能將加誅於子西門豹曰王主富民霸主富武亡國富府庫今君欲為霸者也臣故蓄積於民君以為不然臣請先登鼓之鉀兵粟米可立具也乃登城而鼓之致鉀笴甲鎧笴操箭矢也兵弩而出再鼓服揵載粟而至服駕出也揵擔文侯曰罷之西門豹曰與民信非一日積也一舉而欺之其後不可復用也燕嘗侵魏八城請北擊之以復侵地遂舉兵擊燕復地而後反此有罪而可賞者也解篇為東封解篇魏臣治東封也上計而入三倍有司請賞之文侯曰吾土地非益廣也人民非益眾也何以三倍對以冬伐木而積之以春浮之河而鬻之文侯曰民寒以力耕暑以強耘秋以收歛冬間無事又伐林而積之負軛而浮之於河是用民不得休息也民以弊矣雖有三倍之入將焉用之此有功而可罪者也太公兵法曰武王問太公勝負何如太公對曰夫紂之行不由理精兵酒池賦歛甚數百姓苦之國語曰鬥旦廷見令尹子常子常令尹子囊之孫囊瓦子常與之語問畜貨聚馬歸以語其弟曰楚其亡乎不然令尹其不免乎吾見令尹問蓄聚積實若餓豺虎焉殆必亡者晁錯上書曰陰, SBCK: 烈隂}
