  - {type: variant, offset: 632, length: 189, content: 藏於天下諸侯藏於百姓農夫藏於囷庾商賈藏於筐簣今百姓困乏於外而賦歛無已昔桀紂殘賊為天下戮今皇天降災於藏臺是君之大福也漢書曰秦為亂政虐刑殘滅天下北為長城之役南有五嶺之戍外內騷動百姓罷敝頭會箕歛家家箕頭數出穀以箕歛之也以供軍費財匱力盡又曰入物者補官出貨者除罪選舉陵夷廉恥相冒武力進用法嚴令具興利之臣自此而始又曰衛青北擊胡賦稅既竭不足以奉戰士有司請令民得買爵及贖禁錮減罪置賞官名曰武功爵, SBCK: 罰}
