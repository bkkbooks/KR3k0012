  - {type: punctuation, offset: 145, content: 「, id: KR3k0012_CHANT_628-bkkpn48}
  - {type: variant, offset: 145, length: 0, content: '', SBCK: 命郷論秀士􅂛之司徒曰選士移名於司徒也秀士郷大夫所考有德行道蓺者司徒論選士之秀者而􅂛之學曰俊士可使習禮者學大學􅂛於司徒者不征於郷􅂛於學者不征於司徒曰造士不征不給其繇役造成也能習禮則爲成士大樂正論造士之秀者以告于王而􅂛諸司馬曰進士司馬夏官卿主􅀖政者進受爵禄者司馬辨論官材論進士之賢者以告於王而定其論各署其所長論定然後官之任官然後爵之命之位定然後禄之又曽子問曰凢語于郊者語謂論􅀃於郊學必取賢歛才焉或以德進或以事舉或以言楊大樂正論造士之秀者升諸司馬曰進士謂此矣又射義曰}
  - {type: page-break, offset: 145, content: '', id: KR3k0012_SBCK_628-1b}
  - {type: variant, offset: 145, length: 0, content: '', WYG: 命鄉論秀士升之司徒曰選士移名于司徒也秀士鄉大夫所考有徳行道藝者司徒論選士之秀者而升之學曰俊士可使習禮者學大學升於司徒者不征於鄉升於學者不征於司徒曰造士不征免其徭役造成也士升國學則才徳成就大樂正論造士之秀者以吿于王而升諸司馬曰進士司馬夏官卿主邦政者進受爵也司馬辨論官材論進士之賢者以吿于王而定其論各署其所長論定然後官之任官然後爵之命之位定然後禄之又文王世子曰凡語於郊者語謂論説於郊學必取賢歛才焉或以徳進或以事舉或以言揚大樂正論造士之秀者升諸司馬曰進士謂此矣又射義曰}
  - {type: page-break, offset: 145, content: '', id: KR3k0012_WYG_628-2a, image: WYG0898/WYG0898-0625a.png}
  - {type: variant, offset: 145, length: 0, content: '', krp: 命郷論秀士升之司徒曰選士移名於司徒也秀士郷大夫所考有德行道蓺者司徒論選士之秀者而升之學曰俊士可使習禮者學大學升於司徒者不征於郷升於學者不征於司徒曰造士不征不給其繇役造成也能習禮則爲成士大樂正論造士之秀者以告于王而升諸司馬曰進士司馬夏官卿主邦政者進受爵禄者司馬辨論官材論進士之賢者以告於王而定其論各署其所長論定然後官之任官然後爵之命之位定然後禄之又曽子問曰凢語于郊者語謂論說於郊學必取賢歛才焉或以德進或以事舉或以言楊大樂正論造士之秀者升諸司馬曰進士謂此矣又射義曰}
  - {type: variant, offset: 147, length: 3, content: 公田藉, SBCK: 天子之制諸侯歳獻貢士於天子天子試之於射宫其容體比於禮其節比於樂而中多者得與於􅀕其容體不比於禮其節不比於樂而中少者不得與於􅀕數與於􅀕而君有慶數不與於􅀕而君有讓天子將􅀕必先習射於澤澤者所以擇士也巳射於澤而后射於射宫射中者得與於􅀕不中者不得與於􅀕漢書曰髙帝十一年詔曰賢士大夫旣與我定有天下}
  - {type: page-break, offset: 147, content: '', id: KR3k0012_SBCK_628-2a}
  - {type: variant, offset: 147, length: 3, content: 公田藉, WYG: 天子之制諸侯嵗獻貢士於天子天子試之於射宫其容體比於禮其節比於樂而中多者得與于祭其容體不比於禮其節不比於樂而中少者不得與于祭數與于祭而君有慶數不與於祭而君有譲天子将祭必先習射于澤澤者所以擇士也已射于澤而后射于射宫射中者得與于祭不中者不得與於祭漢書曰髙帝十一年詔曰賢士大夫既與我定有天下}
  - {type: page-break, offset: 147, content: '', id: KR3k0012_WYG_628-2b, image: WYG0898/WYG0898-0625b.png}
  - {type: variant, offset: 147, length: 3, content: 公田藉, krp: 天子之制諸侯歳獻貢士於天子天子試之於射宫其容體比於禮其節比於樂而中多者得與於祭其容體不比於禮其節不比於樂而中少者不得與於祭數與於祭而君有慶數不與於祭而君有讓天子將祭必先習射於澤澤者所以擇士也巳射於澤而后射於射宫射中者得與於祭不中者不得與於祭漢書曰髙帝十一年詔曰賢士大夫旣與我定有天下}
  - {type: variant, offset: 152, length: 2, content: 稅藉, SBCK: 與吾共安利之可乎有肯從我遊者吾能尊顯之以布告天下御史中執法下郡守其有意稱明法者必身勸爲之駕詣丞相府署其行義年有其人而不言者免官又曰惠帝四年詔舉人孝弟力田者復其身髙后元年􅀄置孝弟官二千石者一人特置此官而尊其秩欲以勸免天下各令敦行務本又景帝後元二年詔曰廉士寡欲易足今訾筭十以上廼得官廉士筭不必衆有市籍不得官無訾又不得官朕甚􅉖之訾筭四得官有市籍謂賈人有財不得爲吏貲万錢筭百二十也十万時疾吏之貪以爲衣食足知榮辱故限貲十万乃得爲吏廉士無貲减至四筭乃得官又曰武帝建元􅀄始詔天下舉賢良方正直言極諌之士其理申啇韓非􅂫􅁗張儀}
  - {type: variant, offset: 152, length: 2, content: 稅藉, WYG: 與吾共安利之可乎有肯從我逰者吾能尊顕之以布告天下御史中執法下郡守其有意稱明徳者必身勸為之駕詣丞相府署其行義年有其人而不言者免官又曰惠帝四年詔舉民孝弟力田者復其身髙后元年初置孝弟力田二千石者一人又景帝後元二年詔曰亷士寡欲易足今訾筭十以上乃得官亷士算不必衆有市籍不得官無訾又不得官朕甚愍之訾算四得官有市籍謂賈人有財不得為吏貲萬錢算百二十七也十算十萬也時疾吏之貪以為衣食足知榮辱故限貲十萬乃得為吏亷士無貲减至四算得官又曰武帝建元初始詔天下舉賢良方正直言極諌之士其理申商韓非蘇秦張儀}
