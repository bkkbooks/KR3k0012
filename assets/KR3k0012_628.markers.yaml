  - {type: variant, offset: 1745, length: 0, content: '', SBCK: 建􅀄五年詔曰公卿巳下其舉直言極諌能指朕過失者各一人遣詣公車將親臨問焉其以巖穴爲先勿取浮華漢官儀曰建􅀄八年十二月巳未詔書辟士四科一曰德行髙妙志節清白二曰經明行脩能任博士三曰明曉法律足以决疑能案章覆問文任御史四曰剛毅多畧遭事不惑明足照姦勇足决斷才任三輔皆存孝悌清公之行自今已後審四科辟召及刺史二千石察舉茂才尤異者孝廉廉吏務實校試以職有非其人不習官事正舉者故舉不實爲法罪之後漢書和帝永元五年詔曰選舉賢良爲政之夲科別行能必由郷曲而郡國舉吏不加簡擇故先帝明勑在所}
  - {type: page-break, offset: 1745, content: '', id: KR3k0012_SBCK_628-5a}
  - {type: variant, offset: 1745, length: 0, content: '', WYG: 建初五年詔曰公卿以下其舉直言極諫能指朕過失者各一人遣詣公車将親覧問焉其以巖穴為先勿取浮華漢官儀曰建初八年十二月己未詔書辟士四科一曰徳行髙妙志節清白二曰經明行修能任愽士三曰明曉法律足以决疑能案章覆問文任御史四曰剛毅多畧遭事不惑明足照奸勇足以㫁可任三輔中有孝悌清公之行自今以後審四科辟多士刺史二千石嵗舉茂才尤異者孝亷亷吏務實校試以職有非其人不習官事正舉者故舉不實為法罪之後漢書和帝永光五年詔曰選舉賢良為政之本科别行能必由鄉曲而郡國舉吏不加簡擇故先帝明勅在所}
