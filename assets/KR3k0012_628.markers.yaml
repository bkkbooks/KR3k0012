  - {type: variant, offset: 2011, length: 282, content: 宰相弟兼有大勳遂居清顯而聚歛無厭取譏當世管子曰鮑叔曰必用夷吾之言公不聽乃令四封之內脩兵關市之征侈之侈謂過常也謂重其賦稅又曰桓公踐位十九年施關市之征征賦五十而取一取其貸賄五十之一上年什取三中年什取二下年什取一歲飢不稅歲飢謂時歲惣飢故不稅歲飢施而稅此歲飢謂有飢者有不飢者施故飢而稅不飢又曰地辟而國貧者舟輿飾臺榭廣也賞罰信而兵弱者輕用眾使民勞也舟車飾臺榭廣則賦歛厚矣輕用眾使民勞則民力竭矣賦歛厚則下怨上民力竭則令不行下怨上令不行而求敵之勿謀己不可得也又曰桓公問曰梁聚謂寡人曰古者輕賦稅而肥籍歛取下無順於此者矣梁聚之言何如管子對曰梁聚之言非也彼輕賦稅則倉廩虛肥籍歛則器械不, SBCK: 眇末承}
