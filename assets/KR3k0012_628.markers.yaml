  - {type: variant, offset: 140, length: 0, content: '', SBCK: 于其郷吏使各以教其所治以攷其德行察其道蓺以歳時登其夫家之衆寡辨其可任者以歳時入其書三年則大比攷其德行道蓺而興賢者能者郷老及郷大夫帥其吏與其衆寡以禮禮賔之賢者有德行者也能者有道蓺者也衆寡謂郷民之善者無多少也鄭司農云興賢者謂􅀂今之舉爲孝廉者興能者謂􅀂今之舉􅌗才也􅀇謂變舉言興者謂合衆而尊寵之厥明郷老及郷大夫群吏獻賢能之書于王王再拜受之登于天府内史貳之獻猶進也王拜受之重得賢也王上其書於天府天府掌祖廟之寳藏者内史副冩其書者當詔王爵禄之時也}
  - {type: variant, offset: 140, length: 0, content: '', WYG: 于其鄉吏使各以教其所治以攷其徳行察其道藝以歲時登其夫家之衆寡辨其可任者以歲時入其書三年則大比考其徳行道藝而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮禮賔之賢者有徳行者也能者有道藝者也衆寡鄉民之善者無問多少也鄭司農云興賢者謂若今之舉為孝亷也興能者謂若今之舉茂才也𤣥謂變舉言興者謂合衆而尊寵之厥明鄉老及鄉大夫羣吏獻賢能之書于王王再拜受之登于天府内史貳之王拜受之重得賢士也上其書于天府天府掌祖廟之寳藏者内史副寫其書者當詔王爵禄之時也}
  - {type: page-break, offset: 140, content: '', id: KR3k0012_WYG_628-1b, image: WYG0898/WYG0898-0624d.png}
  - {type: variant, offset: 140, length: 0, content: '', krp: 于其郷吏使各以教其所治以攷其德行察其道蓺以歳時登其夫家之衆寡辨其可任者以歳時入其書三年則大比攷其德行道蓺而興賢者能者郷老及郷大夫帥其吏與其衆寡以禮禮賔之賢者有德行者也能者有道蓺者也衆寡謂郷民之善者無多少也鄭司農云興賢者謂若今之舉爲孝廉者興能者謂若今之舉茂才也玄謂變舉言興者謂合衆而尊寵之厥明郷老及郷大夫群吏獻賢能之書于王王再拜受之登于天府内史貳之獻猶進也王拜受之重得賢也王上其書於天府天府掌祖廟之寳藏者内史副冩其書者當詔王爵禄之時也}
