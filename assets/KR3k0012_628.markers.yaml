  - {type: variant, offset: 3804, length: 2, content: 半餘, SBCK: 人雖三后之胄自墜於皂􅀠矣或云代無竒才不􅀂取士於門地此亦失矣豈可以丗無周邵便廢宰相而不置哉但當校其寸長銖重者即先叙之則賢才無遺矣北齊書曰課試之法中書䇿秀才集書䇿考貢士考功郎中䇿廉良天子常服乗輿出坐於朝堂中楹秀才各以班草對字有脫誤者呼起立席後書有濫劣者飲墨水一􅂛文理孟浪者奪席脫容刀後周書曰宣帝大成元年詔州舉髙才博學者爲秀才郡舉經明行脩者爲孝廉上州歳一人下州三歳一人隋書曰文帝開皇中制諸州貢士歳三人工啇不得入仕太平御覽卷第六百}
