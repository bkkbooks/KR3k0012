  - {type: variant, offset: 3798, length: 4, content: 萬萬吏俸, SBCK: 人上第賜位郎中次太子舎人下第者罷之詔曰孔子歎學之不講則所識日忘今􅂄儒年踰六十去離夲土營求粮資不得專業結童入學白首空歸長委農野永絶榮望朕甚愍焉其依科罷者聽爲太子舎人齊書左僕射王儉請解領選謂禇彦回曰選曹之始近自漢末今􅀂反古使州郡貢計三府辟士與衆共之猶賢一人之意古者選衆今則不然竒材絶智所以見遺於草澤也梁書天監中沈約上䟽曰當今士子繁多略以万計常患官少才多無地以處秀才自别是一種仕官非􅀂漢代取人之例也假使秀才對五問可稱孝廉荅一䇿能過此乃雕蟲小道何􅀜理功得失以此求才徒虚語爾後魏書孝文時韓麒麟子明宗上言曰前代取士必先正名故有賢良方正之稱今州郡貢察徒有秀孝之名無秀孝之實而朝廷但撿其有門地不復彈坐如此則可別貢門地以叙士人何假置秀孝之名也夫門地者是其父祖之貴烈亦何益於皇家茍有竒才雖屠釣奴虜之賤亦可}
  - {type: page-break, offset: 3798, content: '', id: KR3k0012_SBCK_628-8b}
