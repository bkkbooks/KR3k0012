  - {type: variant, offset: 3573, length: 1, content: 若, SBCK: 孝廉廉吏皆當典城牧人禁姦舉善興化之本常必由之詔書連下分明懇惻而在所翫習遂至怠慢選舉乖錯害及元元頃雖頗䋲正猶未懲改方今淮夷未殄軍師屢出百姓疲瘁困於徴發庻望羣吏惠我勞人蠲滌貪穢以祈休祥其令秩滿百石十歳以上有殊才異行乃得忝選贓吏子孫}
