  - {type: variant, offset: 3416, length: 2, content: 為災, SBCK: 違度濟河之域㓙饉流亡而未􅀗忠言至謀所以匡救之䇿寤寢永歎用思孔疚惟官人不得於上􅀺民不安於下有司不念寛和而競爲苛刻覆案不急以妨人事甚非所以上當天心以濟元元也思得忠良之士以輔朕之不逮其令三公中二千石二千石内郡守相舉賢良方正能直言極諌之士各}
