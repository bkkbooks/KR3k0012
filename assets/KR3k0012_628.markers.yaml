  - {type: variant, offset: 3799, length: 3, content: 萬吏俸, WYG: 計常患官少才多無地以處秀才自别是一種仕官非若漢代取人之例也假若秀才對五問可稱孝亷荅一策能通此乃雕蟲小道何闗理功得失以此求才徒虛語爾後魏書孝文時韓麒麟子明宗上言曰前代取士必先正名故有賢良方正之稱今州郡貢察徒有秀才之名無秀才之實而朝廷但檢其有門地不復弹坐如此則可别貢門地以叙士人何假置孝秀之名也夫門地者是其父祖之貴烈亦何益于皇家苟有竒才雖屠釣奴虜之賤亦可}
