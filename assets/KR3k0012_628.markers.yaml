  - {type: variant, offset: 350, length: 1, content: 比, SBCK: 官以使其材無以日月爲功實試用賢能爲上量材而授官録德而定位錄德存視之也則廉耻殊路賢不肖異處矣帝因是令郡國舉孝廉各一人又限以四科至五年詔徴吏人有明當代之務習先聖之術者縣次給食令與計偕計者上計簿使也郡國每歳遣詣京師上之偕者俱也令所徵之人與計者俱來而縣次給之也又元朔元年詔曰夫本仁祖義褒德録賢勸善刑􅁀本仁祖義謂以仁義爲本始也五帝}
