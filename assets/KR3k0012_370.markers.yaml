  - {type: variant, offset: 51, length: 0, content: '', SBCK: 長者與之提携則兩手捧長者之手又檀弓上曰孔子蚤作􅀒手曵杖逍遥於門又檀弓下曰原壤之母死夫子助之沭槨原壤登木歌曰貍首之班然執女手之卷然又玉藻曰手容恭髙且正也又表記曰后稷天下之爲烈也豈一手一足烈業也言后稷造稼穡天下世以爲業豈一手一足喻用之者多無數也傳曰宋武公生仲子仲子生而有文在其手曰爲魯人夫故仲子歸於我又閔公曰成季之生也有文在其手曰友又宣上曰晉靈公不}
  - {type: page-break, offset: 51, content: '', id: KR3k0012_SBCK_370-1b}
  - {type: variant, offset: 51, length: 0, content: '', WYG: 長者與之提携則兩手捧長者之手檀弓上曰孔子蚤作負手曵杖逍遥於門檀弓下曰原壤之母死夫子助之沐槨原壤登木歌曰貍首之斑然執女手之卷然又玉藻曰手容恭髙且正也又表記曰后稷天下之為烈也豈一手一足烈業也言后稷造稼穯天下後世以為業豈一手一足喻用之者多無數也傳曰宋武公生仲子仲子生而有文在其手曰為魯夫人故仲子歸於我又閔公曰成季之生也有文在其手曰友又宣上曰晉靈公不}
  - {type: page-break, offset: 51, content: '', id: KR3k0012_WYG_370-2a, image: WYG0896/WYG0896-0296a.png}
  - {type: page-break, offset: 51, content: '', id: KR3k0012_WYG_370-2b, image: WYG0896/WYG0896-0296b.png}
