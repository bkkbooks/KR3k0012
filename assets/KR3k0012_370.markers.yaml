  - {type: variant, offset: 2876, length: 447, content: 歲乃生剖母左腋而出肘釋名曰肘注也可隱注也傳曰師陣于鞌郄克傷於矢曰余病矣張侯曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病吾子忍之又曰欒盈之亂范鞅遇欒樂曰樂免之死將訟汝於天樂射之不中又注則乘槐本而覆或以戟鉤之斷肘而死春秋後語曰智伯率韓魏之兵以伐趙襄子於晉陽決晉水以灌晉陽之城不沒者三板智伯行水魏桓子御韓康參乘智伯曰吾不知水之可以亡人國乃今知之然汾水可以灌安邑綘水可以灌平陽魏桓子肘韓康子韓康子履桓子之足接於車上而智伯地分身死國亡為天下笑謝承後漢書曰羊續為南陽太守志在矯俗裳不下𣍿彈琴出肘段龜龍涼州記曰呂光左肘生肉印及征西域印內隱起文字曰巨霸也莊子曰子貢往見原憲憲杖策而應正衿肘見又曰支離叔與滑介叔觀於宜伯之丘崑崙之墟黃帝之所休俄而柳生於其左肘其意蹶蹶然惡之支離叔曰惡之乎滑介叔曰亡予何惡生者假借也假之而生生塵垢也生為晝夜且吾與子觀化化及我何惡哉呂氏春秋曰密子賤治單父恐魯君聽讒令己不得行術將行請迎史二人俱至單父使其書將書密子掣其肘書不善則怒史患之請歸報魯君太息曰密子以此諫寡人自今以去單父非寡人有, SBCK: ''}
