  - {type: variant, offset: 1216, length: 5, content: 僚貫胛達背, SBCK: 怒欲索國而誅之子胥諌乃止吕氏春秋曰倕巧人也不愛倕之指而愛巳之指搜神記曰曽子從仲尼在楚而心動辭歸問母曰思之齧指孔子聞之曰曽之至誠也精感萬里孝子傳曰樂正者曽參門人也來􅃸參參採薪在野母嚙右指旋頃走歸見正不語入跪問母何患母曰無參曰􅀒薪右}
