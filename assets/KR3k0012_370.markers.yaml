  - {type: variant, offset: 63, length: 0, content: '', krp: 手中有褒字也喻從勞苦起受褒飾致天祚漢書曰蕭何聞韓信亡不及}
  - {type: variant, offset: 64, length: 2, content: 青龍, SBCK: 聞自追之人有言上曰承相何亡上怒如失左右手又曰孝武帝鈎弋趙婕妤家在河間帝廵狩過河間望氣者言有竒女天子氣使使召之旣至女兩手皆拳上自披之手即時伸由是得幸號爲拳夫人生昭帝又曰鮑永辟鮑恢爲從事京師語曰貴戚歛手避二鮑後漢書曰劉寛欲朝婢飜羮汚朝衣手􅀵之寛曰徐徐羮爛汝手又曰郭玉者廣漢人也學方􅐷之􅇊和帝竒異之乃試令嬖臣美手腕者與女子雜處其中使玉各􅐷一手玉言左陽右隂脉有男女疾􅀂異人臣疑其故帝歎稱善東觀漢記曰公孫述自言手文有竒瑞數移書中國上賜述書曰瑞應手掌成文亦非吾所知張璠漢記曰董卓於衆座中生斬人手足百姓嗷嗷魏略曰鄧雄鳴詣太祖太祖執其手曰􅀌方入􅀜夢得神人即汝耶乃厚賜之王隱晉書曰􅀄武帝未爲太子文帝問裴秀曰人有相不秀曰中撫軍伸手過膝非人臣之相也又曰􅉖懷太子名遹字熈􅀄惠帝晚成世祖遣才人謝􅅼給惠帝生􅉖懷與諸王子共戲惠帝來朝謂諸王子也執其手世祖曰是汝兒也乃縮手又曰髙平劉柔卧䑕嚙其左手中指意甚惡之以問淳于智筮之曰䑕本欲殺君而不能當爲使之反死乃以朱書其手腕横文後三寸爲田字辟方一寸二分使夜露手以卧其明有一大䑕伏死手前又曰郭文字文舉入餘杭山􅂫峻未亂之前詣臨安山中臨安令萬寵迎着縣中養病及峻黨破餘杭山臨安如故人始異之自後不復語但舉手指麾以宣其意病甚寵問先生可復得幾日文三舉其手果以十五日終晉中興書曰范宣陳留人也年十歳能誦詩書甞以乃傷手捧手改容人問痛耶荅曰不足爲痛但受全之體而致毀傷不可處耳家人以其年㓜而異焉崔鴻前趙録曰劉翌驍幹過人能一手舉殿柱跳過平陽門三十六國春秋曰劉淵父豹母呼延氏淵生而左手有文曰淵遂以命之又曰彭神符生而有文在其手曰神符梁書曰武帝手文曰武三國典略曰梁劉之遴字思貞文範先生虬之子也􅀶綜文史尚書令沈休之深敬器之右手偏直不得屈伸每晝則以紙就筆唐書曰承乾數引侯君集入内問以自安之術君集以承乾劣弱意欲乗亹以圖之遂賛成不􅁤常舉手謂承乾曰此好手當爲殿下用之老子曰代大匠斵希有不傷其手莊子曰曽子居衛緼􅂁無表手足胼胘墨子曰今謂人曰與子冠履而斷子手足必不爲何則冠履不􅀂手足貴也争一言以相殺是義貴於身孟子曰㛐溺則援之以手乎曰㛐溺不援是豺狼㛐溺則援之以手權也反於經而善者曰權韓子曰名實相湏而成形體相應而生故一手獨抃雖疾無聲故曰左手􅀞圎右手􅀞方則不兩成吕氏春秋曰客有言伍貟於王子光惡其容貌以告伍貟曰願王子居重帷見衣􅀂手請因􅀃之王子光許之子胥􅀃之半舉惟􅅮其手而與之坐燕丹子曰太子與荆軻置酒美人鼔琴軻曰好手太子即断其手以玉盤奉之又王曰秦王断荆軻兩手軻踞而罵曰吾坐輕易爲竪子所欺太元經曰九體一爲手足山海經曰柔利國爲人一手野人國面目手足盡異一臂國爲人一手神仙傳曰金筒玉札内經皆云太上老子足踏二五手把十文鄭􅀇別傳曰􅀇唯有一子益恩有遺腹子􅀇以其手文似巳名曰小同李郃別傳曰公長七尺八寸多􅂡髯手握三公之字幽明録曰石勒問佛圖澄劉曜可擒兆可見不澄令童子齊七日取麻油掌中研之燎旃檀而呪有頃舉手向童子掌内粲然有異澄問有所見不曰唯見一軍人長大白哲以朱絲􅅞其肘澄曰此即曜也其年果生擒曜異苑曰陶􅋲左手有文直逹中指至上撗節便絶占者以爲此文􅀂過位在無極􅋲針挑令徹血流彈壁乃作公字又取紙裹公迹愈明搜神記曰周暢少孝獨與母居每出入母欲呼之常自齧其手暢即應手痛而至治中從事未之信候暢時在田母齧手而暢即歸班固幽通賦注曰齊桓公􅀝柱歎曰天下竒珎易得但未得食人肉耳易牙歸断其兒手以啖於君也掌釋名曰掌言可以排掌}
