  - {type: variant, offset: 222, length: 231, content: 主也昌仰曰陛下即桀紂主也又曰田蚡取燕王女為夫人太后詔列侯宗室皆往賀灌夫行酒至臨汝侯灌賢賢方與程不識耳語夫無所發怒迺罵賢坐迺起更衣稍稍去竇嬰去因戲音麾招麾之令出也夫出蚡遂怒曰此吾驕灌夫罪也迺令騎留夫夫不得出籍福起為謝按夫項令謝夫愈怒不肯順蚡迺戲騎戲亦音麾令縛夫置傳舍後漢書曰董宣既格殺胡陽公主家蒼頭帝使宣謝公主宣不伏上使人按其項於地宣不肯起因號為強項侯東觀漢記曰班超字仲升常行遇見相工工謂超曰燕頷虎頭飛而食肉此萬里封侯相魏書曰文帝既立為嗣喜因抱辛毗頸曰辛君知吾喜不, SBCK: 休兵積􅂖}
