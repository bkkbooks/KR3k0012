  - {type: variant, offset: 2044, length: 202, content: 得告術於人也莊子曰仲尼謂顏淵曰吾終身與汝交臂而失之可不哀與又曰浸假而化予之左臂以為雞予因以求時夜浸假而化予之右臂以為彈予因以求雞炙又曰韓魏相爭侵地子華子見昭僖侯昭僖有憂色子華子曰今使天下書銘於君之前曰左手攫之則右手廢右手攫之則左手廢然而攫之必有天下君攫之乎僖侯曰寡人不攫也子華子曰自是觀之兩臂重於天下也身又重兩臂韓之輕於天下遠矣燕丹子曰荊軻拾瓦投鼃音圭太子令人奏奉盤金軻用竭復進軻曰非為太子愛金也但臂痛耳, SBCK: 誠}
