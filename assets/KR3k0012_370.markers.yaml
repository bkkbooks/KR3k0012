  - {type: variant, offset: 46, length: 0, content: '', SBCK: 又魏􅁑屨曰撡撡女手可以縫裳又曰衛風曰執子之手與子偕老又邶栢舟北風曰北風其凉雨雪其䨦普康切惠而好我携手同行莫赤匪狐莫黒匪烏惠而好我携手同車又緇衣遵大路􅀆撡執子之手􅀆}
  - {type: variant, offset: 46, length: 0, content: '', WYG: 又魏葛屨曰摻摻女手可以縫裳又衛風曰執子之手與子偕老又邶北風之詩曰北風其凉雨雪其霶恵而好我携手同行莫赤匪狐莫黒匪烏恵而好我携手同車又鄭風曰遵大路兮摻執子之手兮曲}
  - {type: variant, offset: 46, length: 0, content: '', krp: 又魏葛屨曰撡撡女手可以縫裳又曰衛風曰執子之手與子偕老又邶栢舟北風曰北風其凉雨雪其䨦普康切惠而好我携手同行莫赤匪狐莫黒匪烏惠而好我携手同車又緇衣遵大路兮撡執子之手兮}
