  - {type: variant, offset: 1631, length: 195, content: 七尺美鬚髯猿臂善射蜀志曰先主長七尺五寸自顧見耳垂臂下𣍿又曰關羽為流矢所中貫在左臂陰兩常痛伸臂與醫刮骨去毒血流盤器而羽割炙引酒自若晉書曰都官從事濟南劉享奏何曾綺麗華飾瑩牛蹄角後曾辟郭為掾因小事杖享破臂晉中興書曰交州刺史王諒為州人梁碩所圍城陷碩逼奪諒節諒不與碩遂斷諒右臂諒正色曰死不畏臂斷何有哉崔鴻十六國春秋後趙錄曰石勒引李陽懽酣陽臂笑視之曰卿雖老臂中由有力頗復與人鬭不孤往日厭卿老拳卿亦飽孤毒, SBCK: 穿逹}
