  - {type: variant, offset: 1316, length: 200, content: 盟曰起不為卿相不復入衛門果如其言漢書曰李廣隴西人援臂善騎射又曰陳湯擊郅支時中寒病臂不屈伸湯入有詔無拜又王莽傳曰甄豐子尋作符命而誅尋手理有天子字莽解其臂入視曰此一太子也或曰一六子也明尋子父當戮死也又曰劉歆上議曰武帝立五廟國伐朝鮮起玄莬樂浪以斷匈奴左臂西伐大宛結烏孫以裂匈奴左臂續漢書曰單超河南人梁冀振動天下延熹二年皇后崩帝呼單超等入謀誅冀及更召徐璜具瑗等五人遂定其議帝嚙超臂出血以為盟冀及宗親黨與悉誅之, SBCK: 歸周公謝承}
