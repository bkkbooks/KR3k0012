  - {type: variant, offset: 2509, length: 365, content: 公叔子工騎乘及為襄陽縣督盤馬落地遂折臂論衡曰書傳稱曾子孝與母同氣曾子出薪於野客至而欲去曾子母以右手搤左臂曾子左臂立痛即馳至此虛也臂痛曾子臂亦痛母死曾子亦死乎搤於革切俗說曰釋道安生便左臂上一肉廣一寸許著臂如釧將可上下時人謂之印手菩薩楚辭曰九折臂而成醫腕釋名曰腕者言宛屈也左傳定下曰晉師將盟衛侯于鄟澤鄟音專趙簡子曰群臣誰敢盟衛君者涉佗成何曰我能盟之將歃涉佗捘衛侯之手及腕捘子對切捘擠也血至於腕衛侯怒腋釋名曰腋繹也言可張翕尋繹也說文曰胳略下也胠腋下也胳音各胠香劫反又去魚二切漢書五行志曰高后八年三月祓霸上還過軹道見物如蒼狗戟高后腋忽不見卜之趙王如意為祟遂病腋下而崩東觀漢記曰江革為五官中郎將將朝會詔使虎賁迎送扶腋寵遇甚厚孔融上書曰先帝褒厚老臣懼其殞越是故扶接助其氣力三公剌腋近為憂之非警戒也云備大臣非其類也神仙傳曰老子母感大流星而娠懷之, SBCK: 百}
