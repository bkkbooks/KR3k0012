  - {type: variant, offset: 1222, length: 0, content: '', SBCK: 痛薪墮地何謂無母曰向者客來無所使故嚙指呼汝耳參乃悲然列仙傳曰漢武帝廵太山禝丘君冠章甫擁琴來拜曰陛下勿上上必傷足及上數里右足指果折上諱之故但祠而還列女傳曰廣漢龐伯妻叚有美色早寡父母欲嫁之援刀割指以自誓陳留􅂄舊傳曰吴祐爲膠東相安丘男子母丘長共母到市遇醉客罵母長怒殺之爲吏所得繫獄祐問知無子令妻入遂有身臨刑齧指斷吞之謂妻曰􅀂生男名曰吴生云我臨死吞指爲誓屬子報吴君世􅀃曰范宣年八歳後園桃菜誤傷指大啼人問痛也荅曰非爲痛也但身體髮膚不敢毀傷是以啼耳班固幽通賦注曰管仲射小白中其鈎白陽僵鮑叔割指血塗之傾蓋以覆之􅂘曰吾君死矣魯攝兵爪}
  - {type: page-break, offset: 1222, content: '', id: KR3k0012_SBCK_370-8b}
  - {type: variant, offset: 1222, length: 0, content: '', WYG: 痛薪墜地何謂無母曰向者客来無所使故齧指呼汝耳參乃悲然列仙傳曰漢武帝廵太山稷邱君冠章甫擁琴来拜曰陛下勿上上必傷足及上數里右足指果折上諱之故但祠而還列仙傳曰廣漢龎伯妻叚有美色早寡父母欲嫁之援刀割指以自誓陳留耆舊傳曰吴祐為膠東相安邱男子母邱長共母到市遇醉客罵母長怒殺之為吏所得繫獄祐問知無子令妻入遂有身臨刑齧指斷吞之謂妻曰若生男名曰吴生云我臨死吞指為誓屬子報吴君班固幽通賦注曰管仲射小白中其鈎白陽僵鮑叔割指血塗之傾盖以覆之哭曰吾君死矣魯攝兵爪}
