  - {type: variant, offset: 1601, length: 140, content: 祖所乘名絕影流矢所中并中太祖右臂吳志曰太史慈字子義東來人也長七尺美鬚髯猿臂善射蜀志曰先主長七尺五寸自顧見耳垂臂下𣍿又曰關羽為流矢所中貫在左臂陰兩常痛伸臂與醫刮骨去毒血流盤器而羽割炙引酒自若晉書曰都官從事濟南劉享奏何曾綺麗華飾瑩牛蹄角後曾辟郭為掾因小事杖享破臂晉中興書曰交州刺史王諒, WYG: 守}
