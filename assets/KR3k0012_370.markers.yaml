  - {type: variant, offset: 56, length: 0, content: '', krp: 子圍寡君之貴介弟也下}
  - {type: variant, offset: 57, length: 1, content: 民, SBCK: 手曰此子爲穿封戍方城外之縣尹也上下手以遵囚意又曰邑姜方娠太叔夢帝謂己余命而子曰虞將與之唐屬諸叅而蕃育其子孫及生有文在其手曰虞遂以命之又曰齊魯戰于炊鼻舟堅射陳武子中手舟堅季氏臣也失弓而罵武子罵也以告平子曰有君子白晳黰􅂡眉甚口甚口多口平子曰必子彊也子彊武子又曰昔叔向適鄭􅞭篾惡欲觀叔向從使之收器者而往立於堂下一言而善叔向將飲酒而聞之曰必􅞭明也下執其手以上又曰衛侯爲靈臺於籍圃與諸大夫飲酒焉禇師聲子襪而登席右者見君解襪公怒辭曰臣有病異於人足存創疾􅀂見之君將歐敵嘔吐也許角切公愈怒禇師出公㦸其手曰必斷其足論語摘輔象曰仲弓鈎文在手是謂知始宰我手握户是謂守道子游手握文雅是謂敏士公冶}
  - {type: page-break, offset: 57, content: '', id: KR3k0012_SBCK_370-2a}
  - {type: variant, offset: 57, length: 1, content: 民, WYG: 手曰此子為穿封戍方城外之縣尹也上下以導囚意又曰邑姜方娠太叔夢帝謂已余命而子曰虞將與之唐屬諸參而蕃育其子孫及生有文在其手曰虞遂以命之又曰齊魯戰于炊鼻舟堅射陳武子中手舟堅季氏臣也失弓而罵武子罵也以告平子曰有君子白晢黰鬚眉甚口甚口多口平子曰必子彊也子彊武子又曰昔叔向適鄭鬷蔑惡欲觀叔向従使之收器者而徃立於堂下一言而善叔向將飲酒而聞之曰必鬷明也下執其手以上又曰衛侯為靈臺於籍圃與諸大夫飲酒焉禇師聲子襪而登席古者見君觧襪公怒辭曰臣有病異於人足有瘡疾若見之君將歐歐嘔吐也許角切公愈怒禇師出公㦸其手曰必斷其足論語摘輔象曰仲弓鈎文在手是謂知始宰我手握戸是謂守道子㳺手握文雅是謂敏士公冶}
