  - {type: variant, offset: 1708, length: 277, content: 其經三年之喪也先貧賤後富貴也凡此皆聖人所以慎男女之際重婚姻之始也又曰曾子妻以炊藜蒸不熟出之古樂府詩曰上山採蘼蕪下山逢故夫迴首問故夫新人復何如舅舅母釋名曰舅久也爾雅曰母之昆弟為舅毛詩秦風曰渭陽康公念母也康公之母晉獻公之女文公遭麗姬之難未反而秦姬卒穆公納文公康公時為太子贈送文公于渭之陽念母之不見也我見舅氏如母存焉及其即位思之而作是詩也我送舅氏曰至渭陽何以贈之路車乘黃我送舅氏悠悠我思何以贈之瓊瑰玉佩儀禮曰舅母之昆弟也傳曰何以服緦從服也言從母服也禮記檀弓曰從母之夫舅之妻二夫人相為服君子未之言也左傳僖中曰秦伯納晉公子重耳及河子犯以璧授公子曰臣負羈紲以從君巡於, SBCK: ''}
