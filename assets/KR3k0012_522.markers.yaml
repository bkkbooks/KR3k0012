  - {type: punctuation, offset: 751, content: 《, id: KR3k0012_CHANT_522-bkkpn200}
  - {type: variant, offset: 751, length: 1, content: 內, SBCK: 禮運曰禮者君之大柄也所以別嫌明微儐􅀑神考制度別仁義所以治政安君也疾今失禮如此爲言禮之大義也柄所操以治事又禮運曰是故夫禮必夲於太一分而爲天地轉而爲隂陽變而爲四時列而爲􅀑神又禮運曰故聖人之所以治人七情脩十義講信脩睦尚辭讓去争奪舎禮何以治之唯禮可耳飲食男女人之大欲存焉死亡貧苦人之大惡存焉故欲惡者心之大端也人藏其心不可測度也美惡皆在其心不見其色也欲一以窮之舎禮何以哉言人情之難知明禮之重又禮運曰故禮行於郊而百神受職焉禮行於社而百貨可極焉禮行於祖廟而孝慈服焉禮行於五祀而正法}
  - {type: page-break, offset: 751, content: '', id: KR3k0012_SBCK_522-3a}
  - {type: variant, offset: 751, length: 1, content: 內, WYG: 禮運曰是故夫禮必本於太一分而為天地轉而為隂陽變而為四時列而為鬼神又禮運曰故聖人之所以治人七情修十義講信修睦尚辭讓去爭奪舎禮何以治之唯禮可也飲食男女人之大欲存焉死亡貧苦人之大惡存焉故欲惡者心之大端也人藏其心不可測度也美惡皆在其心不見其色也欲一以窮之舎禮何以哉言人情之難明知禮之重又禮運曰故禮行於郊而百神受職焉禮行於社而百貨可極焉禮行於祖廟而孝慈服焉禮行於五祀而正法}
  - {type: page-break, offset: 751, content: '', id: KR3k0012_WYG_522-5a, image: WYG0897/WYG0897-0649a.png}
  - {type: variant, offset: 751, length: 1, content: 內, krp: 禮運曰禮者君之大柄也所以別嫌明微儐鬼神考制度別仁義所以治政安君也疾今失禮如此爲言禮之大義也柄所操以治事又禮運曰是故夫禮必夲於太一分而爲天地轉而爲隂陽變而爲四時列而爲鬼神又禮運曰故聖人之所以治人七情脩十義講信脩睦尚辭讓去争奪舎禮何以治之唯禮可耳飲食男女人之大欲存焉死亡貧苦人之大惡存焉故欲惡者心之大端也人藏其心不可測度也美惡皆在其心不見其色也欲一以窮之舎禮何以哉言人情之難知明禮之重又禮運曰故禮行於郊而百神受職焉禮行於社而百貨可極焉禮行於祖廟而孝慈服焉禮行於五祀而正法}
