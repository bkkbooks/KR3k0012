  - {type: variant, offset: 103, length: 2, content: 嗜欲, SBCK: 死無所害也相䑕有齒人而無止止所止息箋云止容止孝經曰容止可觀人而無止不死何俟俟待也相䑕有體體支體也人而無禮人而無禮胡不遄死遄速也毛詩國風曰蒹葭刺襄公也未能用周禮將無以固其國焉􅁗處周之舊􅁟其人􅀍周之德教曰乆矣今襄公親爲諸侯未習周之禮法故國人未服焉蒹葭蒼蒼白露爲霜興也蒹葭蘆也蒼蒼盛也白露疑戾爲霜然後歳事成國家待禮然後興箋云蒹葭在衆草之中也蒼然疆至白露凝戾爲霜則成而黄興}
