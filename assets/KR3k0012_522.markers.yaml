  - {type: variant, offset: 748, length: 1, content: 卜, SBCK: 此禮逹於下故聖人以禮示}
  - {type: variant, offset: 748, length: 1, content: 卜, WYG: 此禮逹於下故聖人以禮示之故天下國家可得而正也又禮運曰禮者君之大柄也所以别嫌明㣲儐鬼神考制度别人義所以治政安君也疾今夫禮如此為言禮之大義也柄所操以治}
