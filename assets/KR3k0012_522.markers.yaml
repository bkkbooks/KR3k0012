  - {type: variant, offset: 937, length: 429, content: 官對曰無之公怒曰女為宗司立夫人國之大禮也何故無之對曰周公及武公娶於薛孝惠娶於商自桓以下娶於齊此禮也則有若以妾為夫人則固無其禮也出婦禮記檀弓曰子上之母死而不喪子上孔子曾孫子思伋之子名白其母出門人問諸子思曰昔者子之先君子喪出母乎曰然禮為出母期父卒為文後者不服耳子之不使白也喪之何也子思曰昔者吾先君子無所失道道隆則從而隆道污則從而污污猶殺也有隆有殺進退如禮伋則安能自予不能及為伋也妻者是為白也母不為伋也妻者是不為白也母故孔氏之不喪出母自子思始也又內則曰子甚宜其妻父母不說出宜猶善也漢書曰王吉少時學問居長安其東家有大棗樹垂庭中吉婦取棗以啖吉吉後知之乃去婦東家聞而伐其樹鄰里共止之因固請吉令還婦里中為之語曰東家有樹王陽去婦東家棗完去婦復還又曰王禁生元后元后母魏郡李氏女也後以妒去更嫁為河內荀賓妻後漢書曰馮衍娶北地女任氏為妻悍忌不得畜媵妾兒女常自探井臼老竟逐之又曰黃允濟陰人也以雋才知名郭林宗見而謂曰卿有絕人之才足成偉器然恐守道不篤將失之矣後司徒袁隗欲為從女求姻見允而歎, SBCK: 稽命徴}
