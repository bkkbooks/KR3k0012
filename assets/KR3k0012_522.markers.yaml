  - {type: variant, offset: 2013, length: 544, content: 心者有如白水授其璧於河又曰庾懌嘗以毒酒餉江州剌史王允之允之覺其有毒飲犬犬斃乃密奏之帝曰大舅已亂天下小舅復欲爾邪懌聞飲酖而卒又曰劉璵字慶孫與弟琨字越石並為尚書郎郭弈之甥也名著當時京師為之語曰洛中弈弈慶孫越石又曰荀勗頴川人少孤貧依於舅氏幼而歧嶷早成十歲能屬文鍾繇曰此兒當及曾祖爽耳又曰殷浩坐徙東陽信安縣外甥韓康伯浩素賞愛之隨至徙所經歲還都浩送至渚側詠曹顏遠詩曰富貴他人合貧賤親戚離因而下泣又曰衛玠字叔寶驃騎將軍王濟玠之舅也雋爽風姿每見玠輒歎曰珠玉在旁覺我形穢又曰郤愔字方回與姊夫王羲之有邁世之風獻之兄弟愔子超未亡時獻之兄弟嘗躡履脩甥舅之禮及超死見愔怠慢履而候之命席便坐愔慨然曰嘉賓不死鼠子敢爾又曰武帝楊后諱豔字瓊芝弘農人母天水趙氏早卒依舅家舅母仁愛親乳之使他人乳己子世說曰衛展字道舒為江州有舊投之都不祗待唯餉王不留行一斤此人便命駕李弘範聞之曰家舅刻薄反役使卉木也又曰魏明帝為外祖築館既成謂左右曰當何名之侍中繆襲曰陛下聖思齊於哲王罔極過於曾閔此館之興情鍾舅氏宜以渭陽名焉上從之妬記曰謝太傅劉夫人不令太傅有別房寵公既深好聲色不能全節遂頗欲立妓妾兄子及外甥等微達其旨乃共諫劉夫人方便稱關睢螽斯有不妒忌之德夫人知諷己乃問誰撰詩荅曰周公夫人曰周公是男子乃相為耳若使周姥傳應無此語也蔡邕進表曰平丘程末年十, SBCK: 氣}
