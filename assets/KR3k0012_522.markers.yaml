  - {type: variant, offset: 106, length: 2, content: 保母, SBCK: 喻衆者不後襄公政令者得周禮以教之則服所謂伊人在水一方周禮天官曰太宰之職掌建􅀖之六典三曰禮典以和􅀖國以統百官以諧萬民周禮地官司徒曰司徒之職掌施十有二教焉一曰以祀禮教敬則民不茍二曰以陽禮教讓則民不爭三曰以隂禮教親則民不怨四曰以禮樂教和則民不乖五曰以儀辯等則民不越六曰以俗教}
