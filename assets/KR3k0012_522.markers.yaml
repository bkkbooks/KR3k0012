  - {type: variant, offset: 2572, length: 152, content: 贏劣嚼棗肉以哺之末見食歔欷不能吞咽外甥釋名曰姊妹之子曰甥出配他男而生也爾雅曰男子謂姊妹之子為出謂我舅者吾謂之甥也儀禮子夏傳曰甥何以緦報之也左傳莊公曰楚文王伐申過鄧鄧祁侯曰吾甥也止而享之騅甥聃甥養甥請殺楚子鄧侯不許三甥曰亡鄧國者必此人也若不早圖後君噬臍其及圖之乎史記曰汲黯字辰孺濮陽人司馬安是其姊子與黯同為, SBCK: 性命}
