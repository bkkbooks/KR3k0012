  - {type: variant, offset: 754, length: 1, content: 聘, krp: 故禮義也者人之大端也所以講信脩睦而固人之肌膚之㑹筋骸之束也所以養生送死事鬼神之大端也所以逹天道順人情之大竇也竇孔穴也故唯聖人爲知禮之不可以巳也故壞國䘮家亡人必先去其禮言愚者之反聖人也故禮之於人也猶酒之有蘖也君子以厚小人以薄皆得以爲美味性善者醇耳又禮器曰禮器是故大備大備盛德也禮器言禮使人成器如耒耜之爲用也人情以爲田脩禮以耕之此是也大備自耕至於食之而肥禮釋回増美質措}
  - {type: variant, offset: 756, length: 3, content: 為妻奔, SBCK: 正施}
  - {type: variant, offset: 756, length: 3, content: 為妻奔, WYG: 正施}
