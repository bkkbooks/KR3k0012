  - {type: variant, offset: 2768, length: 677, content: 家業虛貧衣食不贍舅龍鄉侯為作衣被不受晉書曰魏舒少為舅甯氏所養甯氏營宅相者云當出貴甥舒時尚幼自言曰當為外氏成此宅相又曰石崇字季倫其甥歐陽建與趙王倫有隙倫偽詔收崇及建建作臨終詩又曰謝重字景重子約字宣暎曾於公座戲嘲無禮於其舅袁湛湛謂曰汝父昔已輕舅今汝復來加我可謂兩世無渭陽之情約父重即王敬之外孫與舅有不恊之論湛故有此云又曰范汪少孤年六歲過江依外家庾氏荊州剌史王澄見之曰興范族者必此子也十三喪母居喪盡禮及長好學博識多通善談名理又曰韓康伯清和有思舅殷浩曰康伯能自摽置居然是出群器也又曰何無忌東海郯人少有大志鎮北將軍劉牢之即其舅也時鎮京口每有大事皆參議之桓玄之篡與劉裕劉毅共興義兵桓玄聞之甚懼其黨曰烏合之眾勢必無成玄曰劉裕勇冠三軍劉毅家無擔石之儲摴蒱一擲百萬何無忌劉牢之甥酷似其舅共舉大事何為無成又曰姚興太史令高魯遣其甥王蒙暉隨劉藻送玉璽一鈕并圖讖祕文於慕容德吳均齊春秋曰劉瓛字珪沛人五歲聞舅孔昭先讀管寧傳欣然請更讀因聽受曰可及此耳三輔決錄曰吉閎幼有美名九歲明尚書舅何邈死家貧子幼閎自造墳塋殯葬之衛玠別傳曰玠王武子甥也武子常與乘白羊車入市舉市曰誰家璧人曰武子甥也武子常與同遊語曰昨與外甥玠並出冏若明珠在側朗然來照人姨爾雅曰母之姊妹為從母儀禮曰從母丈夫婦人服從母母之姊妹傳曰何以小功也以名加也外親之服皆緦之外親異姓正服不過緦晉書曰何充字次道廬江人王導妻姊之子故少與王導善早為顯官嘗詣舍導以塵尾指床呼充共座曰此是君座也宋書初高祖產而皇妣殂孝皇貧薄議欲不舉高祖從母生懷敬未朞乃斷乳而養高祖以舊恩之故懷敬累至會稽太守三輔決錄曰周季貢班固姊之子也善屬文喪婦作問神其姨曹大家難之, SBCK: ''}
