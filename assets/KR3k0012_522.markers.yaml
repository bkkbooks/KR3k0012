  - {type: variant, offset: 1051, length: 0, content: '', WYG: 然則何如子曰郊社之義所以仁鬼神也嘗禘之}
  - {type: variant, offset: 1052, length: 9, content: 為出母期父卒為文後, WYG: 所以仁昭穆也饋奠之禮所以仁死䘮也射御之禮所以仁郷黨也食享之禮所以仁賔客也仁猶存也子曰明乎郊社之義嘗禘之禮治國其如指諸掌而已乎是故以之居處有禮故長㓜辨也以之閨門之内有禮故三族和也以之朝廷有禮故官爵序也以之田獵有禮故戎事閑也以之軍旅有禮故武功成也又仲尼燕居子曰禮}
