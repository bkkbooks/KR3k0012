  - {type: variant, offset: 744, length: 0, content: '', SBCK: 成教訓正俗非禮不備分争辯訟非禮不决君臣上下父子兄弟非禮不定官學事師非禮不親班朝治軍涖官行法非禮威嚴不行禱祠􅀕祀供給􅀑神非禮不誠不莊是以君子恭敬樽節退讓以明禮樽猶趍也曲禮曰人有禮則安無禮則危故曰禮者不可不學也夫禮者自卑而尊人雖􅀒販者必有尊也而况冨貴乎􅀒販者友輕恌志利冝者無禮然冨貴而}
  - {type: page-break, offset: 744, content: '', id: KR3k0012_SBCK_522-2b}
  - {type: variant, offset: 744, length: 0, content: '', WYG: 成教訓正俗非禮不備分爭辨訟非禮不決君臣上下父子兄弟非禮不定宦學事師非禮不親班朝治軍莅官行法非禮威嚴不行禱祠祭祀供給鬼神非禮不誠不莊是以君子恭敬撙節退讓以明禮撙猶趨也曲禮曰人有禮則安無禮則危故曰禮者不可不學也夫禮者自卑而尊人雖負販者必有尊也而況富貴乎負販者尤輕恌志利宜若無禮然富貴而}
  - {type: page-break, offset: 744, content: '', id: KR3k0012_WYG_522-3b, image: WYG0897/WYG0897-0648b.png}
  - {type: variant, offset: 744, length: 0, content: '', krp: 成教訓正俗非禮不備分争辯訟非禮不决君臣上下父子兄弟非禮不定官學事師非禮不親班朝治軍涖官行法非禮威嚴不行禱祠祭祀供給鬼神非禮不誠不莊是以君子恭敬樽節退讓以明禮樽猶趍也曲禮曰人有禮則安無禮則危故曰禮者不可不學也夫禮者自卑而尊人雖負販者必有尊也而况冨貴乎負販者友輕恌志利冝者無禮然冨貴而}
  - {type: variant, offset: 745, length: 0, content: '', SBCK: 好禮則不驕不􅁋貧賤而知好禮則志不懾懾猶也又曲禮下曰君子行禮不求變俗求猶務也又禮運曰孔子曰夫禮先王以承天之道以治人之情故失之者死得之者生詩曰相䑕有體人而無禮人而無禮胡不遄死相視也遄疾言䑕之有身體如人而無禮者矣人之無禮可憎賤如䑕不如疾死之愈是故夫禮必夲於天殽於地列於􅀑神聖人則大之明因地之利取法度於􅀑神以制禮下教令也旣又禮之盡}
  - {type: variant, offset: 745, length: 0, content: '', WYG: 好禮則不驕不淫貧賤而知好禮則志不懾懾猶怯也又曲禮下曰君子行禮不求變俗求猶務也又禮運曰孔子曰夫禮先王以承天之道以治人之情故失之者死得之者生詩曰相䑕有體人而無禮人而無禮胡不遄死相視也遄疾也言䑕之有身體如人而無禮者矣人之無禮可憎賤如䑕不如疾死之愈是故夫禮必本於天殽於地列於鬼神聖人則天之明因地之利取法度於鬼神以制禮下教令也既又祀之盡}
  - {type: page-break, offset: 745, content: '', id: KR3k0012_WYG_522-4a, image: WYG0897/WYG0897-0648c.png}
  - {type: variant, offset: 745, length: 0, content: '', krp: 好禮則不驕不淫貧賤而知好禮則志不懾懾猶也又曲禮下曰君子行禮不求變俗求猶務也又禮運曰孔子曰夫禮先王以承天之道以治人之情故失之者死得之者生詩曰相䑕有體人而無禮人而無禮胡不遄死相視也遄疾言䑕之有身體如人而無禮者矣人之無禮可憎賤如䑕不如疾死之愈是故夫禮必夲於天殽於地列於鬼神聖人則大之明因地之利取法度於鬼神以制禮下教令也旣又禮之盡}
  - {type: variant, offset: 746, length: 1, content: 姓, SBCK: 敬也教民嚴上也􅀑者精䰟所歸神者引物而出謂祖廟山川五祀之屬也逹於䘮祭射御冠昏朝聘民知嚴上}
