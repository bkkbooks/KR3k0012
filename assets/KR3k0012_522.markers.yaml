  - {type: punctuation, offset: 754, content: 「, id: KR3k0012_CHANT_522-bkkpn203}
  - {type: variant, offset: 754, length: 1, content: 聘, SBCK: 故禮義也者人之大端也所以講信脩睦而固人之肌膚之㑹筋骸之束也所以養生送死事􅀑神之大端也所以逹天道順人情之大竇也竇孔穴也故唯聖人爲知禮之不可以巳也故壞國䘮家亡人必先去其禮言愚者之反聖人也故禮之於人也猶酒之有蘖也君子以厚小人以薄皆得以爲美味性善者醇耳又禮器曰禮器是故大備大備盛德也禮器言禮使人成器如耒耜之爲用也人情以爲田脩禮以耕之此是也大備自耕至於食之而􅏂禮釋回増美質措}
  - {type: page-break, offset: 754, content: '', id: KR3k0012_SBCK_522-3b}
  - {type: variant, offset: 754, length: 1, content: 聘, WYG: 故禮義也者人之大端也所以講信修睦而固人之肌膚之㑹筯骸之束也所以養生送死事鬼神之大端也所以逹天地順人情之大竇也竇孔穴也故唯聖人為知禮之不可以已也故壊國䘮家亡人必先去其禮言愚者之反聖人也故禮之於人也猶酒之有糵也君子以厚小人以薄皆得以為美味性善者醇耳又禮器曰禮器是故大備大備盛徳也禮器言禮使人成器如耒耜之為用也人情以為田修理以耕之此是也大備自耕至於食之而死禮釋囘増美質措}
