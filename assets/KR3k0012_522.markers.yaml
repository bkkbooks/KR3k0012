  - {type: variant, offset: 1075, length: 356, content: 子思曰昔者吾先君子無所失道道隆則從而隆道污則從而污污猶殺也有隆有殺進退如禮伋則安能自予不能及為伋也妻者是為白也母不為伋也妻者是不為白也母故孔氏之不喪出母自子思始也又內則曰子甚宜其妻父母不說出宜猶善也漢書曰王吉少時學問居長安其東家有大棗樹垂庭中吉婦取棗以啖吉吉後知之乃去婦東家聞而伐其樹鄰里共止之因固請吉令還婦里中為之語曰東家有樹王陽去婦東家棗完去婦復還又曰王禁生元后元后母魏郡李氏女也後以妒去更嫁為河內荀賓妻後漢書曰馮衍娶北地女任氏為妻悍忌不得畜媵妾兒女常自探井臼老竟逐之又曰黃允濟陰人也以雋才知名郭林宗見而謂曰卿有絕人之才足成偉器然恐守道不篤將失之矣後司徒袁隗欲為從女求姻見允而歎曰得婿如是足矣允聞而黜遣其妻夏侯氏婦請姑曰今當見棄方與黃氏長辭乞一會宗屬以展離訣之情於是大集賓客二百餘人婦中坐攘袂數允隱慝穢惡十五, WYG: 即}
