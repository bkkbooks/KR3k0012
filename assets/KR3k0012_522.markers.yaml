  - {type: variant, offset: 839, length: 2, content: 左傳, SBCK: 言禮何其尊也孔子曰丘也小人不足以知禮謙不荅曰君曰否吾子言之也孔子曰丘聞之民之所由生禮爲大非禮無以節事天地之神也非禮無以辨君臣上下長㓜之位也非禮無以別男女父子兄弟之親昏姻䟽數之交也君子以此之爲尊敬然言君子以此故尊禮又曰仲尼燕居子張子貢言游侍縱言至於禮言㳺言偃子㳺也縱言汎􅀃事子曰居女三人者吾語女禮使女以禮周流無不偏也居女三人者女三人且坐也使之坐凡與尊者言更端則起也子貢越席而對曰敢問何如對􅀿也子曰敬而不中禮謂之野恭而不中禮謂之給勇而不中禮謂之逆言游進曰敢問禮也者領惡而全好者與子曰然領猶治也好善也然則何如子曰郊社之義所以仁􅀑神也甞禘之禮所以仁昭穆也饋奠之禮所以仁死䘮也射郷之禮所以仁郷黨也食享之禮所以仁賔客也仁猶存也凢存此者所以全善之道郊社甞禘饋奠存死之善者也射郷食享存生之善者也郊有后稷社有勾龍子曰明乎郊社之義甞禘之禮治國其如指諸掌而已乎是故以之居處有禮故長㓜辨也以之閨門之内有禮故三族和也以之朝廷有禮故官爵序也以之田獵有禮故戎事閑也以之軍旅有禮故武功}
