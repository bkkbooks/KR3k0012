  - {type: 'tls:seg', offset: 758, content: '', id: KR3k0012_CHANT_522-7a.7}
  - {type: variant, offset: 760, length: 3, content: 為妾妾, SBCK: 行釋猶去也回邪辟也質猶㧣也措置其在人也如竹箭之有筠也如松栢之有心也二者居天下之大端故貫四時而不改柯易葉君子有禮則外諧而内無怨故物無不懷仁􅀑神饗德先王之立禮也有夲有文忠信禮之夲也義理禮之文也無本不立無文不行言必外内具也又禮器曰禮也者猶體也􅀂人身體體不備君子謂之不成人設之不當猶不備也禮有大有小有顯有微大者不可損小者不可益顯者不可揜微者不可大也故經禮三百曲禮三千其致一也致}
  - {type: page-break, offset: 760, content: '', id: KR3k0012_SBCK_522-4a}
  - {type: variant, offset: 760, length: 3, content: 為妾妾, WYG: 行釋猶去也囘邪辟也質猶性也措置也其在人也如竹箭之有筠也如松栢之有心也二者居天下之大端矣故貫四時而不改柯易葉君子有禮則外諧而内無怨故物無不懐仁鬼神饗徳先王之立禮也有本有文忠信禮之本也義理禮之文也無本不立無文不行言必内外具也又禮器曰禮也者猶體也若人身體體不備君子謂之不成人設之不當猶不備也禮有大有小有顯有㣲大者不可損小者不可益顯者不可揜㣲者不可大也故經禮三百曲禮三千其致一也致}
