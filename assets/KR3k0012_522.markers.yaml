  - {type: variant, offset: 1432, length: 305, content: 言畢登車而去允以此廢於時又曰李充字大遜家貧兄弟六人同衣遞食妻竊謂充曰今貧居如此難以久安願思分異充偽許之曰當醞酒具會請呼鄉里內外充於坐中前跪白母曰此婦無狀而教充離間母兄罪合遣斥便呵叱其婦遂令出門婦銜涕而去齊書曰劉瓛母孔氏瓛娶王氏緣壁挂履土落孔氏床上孔氏不悅瓛即出其妻梁書曰孔謙從兄靈慶嘗病寄於謙謙出行還問起居靈慶曰向飲冷熱不調即時猶渴謙退遣其妻家語曰婦有七出三不去七出者不順父母無子淫僻嫉妒惡疾多口舌竊盜不順父母者為其逆德也無子者為其絕世也淫僻者為其亂族也嫉妒者為其亂家也惡疾者為其不可供粢盛也多口舌者為其離親也竊盜者為其反義也三不去者謂有所取無所歸也與其經三年之喪也先貧賤後富貴也凡此皆聖人所以慎男女之際重婚姻, WYG: ''}
