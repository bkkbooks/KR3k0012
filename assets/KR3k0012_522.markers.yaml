  - {type: variant, offset: 784, length: 4, content: 妾雖老年, SBCK: 故朝覲之禮所以明君臣之義也聘問之禮所以使諸侯相尊敬也䘮􅀕之禮所以明臣子之恩也郷飲酒之禮所以明長㓜之序也婚姻之禮所以明男女之別也夫禮禁亂之所由生猶坊止水之所自來也故以舊坊爲無所用而壊之者必有水敗以舊禮爲無所用而去之者必有亂患春見曰朝小聘曰問昏姻謂嫁娶也壻曰昏妻曰姻自以由也故昏姻之禮廢則夫婦之道苦而􅁋辟之罪多矣郷飲酒之禮廢則長㓜之序失而爭􅃲之獄䌓矣䘮􅀕之禮廢則臣子之恩薄而倍死忘生者衆矣聘覲之禮廢則君臣之位失諸侯之行惡而倍畔侵陵之欺起矣􅀂謂不至不荅之屬故禮之教化也微其止邪也於}
