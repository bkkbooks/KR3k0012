  - {type: variant, offset: 1907, length: 6, content: 仙都也左公封, SBCK: 上清隠書龍文經曰王母乗九蓋華輿衆眞侍衛紫文經曰方諸東玄東海青童大君齊戒於丹闕黄房之内三年乗碧雲輿太元眞人傳曰有班龍之輿金眞玉光經曰有玉輦又上清三天列紀有紫輦太洞玉經曰青童君乗雕玉之軿司禁眞伯乗日月之軿又曰太極元君乗陵羽之車太上經曰有白鸞之車茅君内傳曰東海青童君乗飈車葛玄傳曰鶴鳴山石室中設自然座有金華蓋又曰五帝眞人並乗八景玉輿二十四生圖經曰後聖李君遊西河歷觀八方值元始乗八景玉輿駕玄龍而來李君問天書玉字未究妙章元始俾極道眞於是吐洞玄内觀玉符}
