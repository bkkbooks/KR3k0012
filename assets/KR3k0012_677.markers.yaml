  - {type: variant, offset: 1846, length: 0, content: '', SBCK: 也上淸眞文王經朝文曰有流明大靈侍言玉案十二枚又始内傳曰諸天各奉蓮華座以寳蓋覆之神仙傳曰黄老遣仙官玉女持金案玉杯盛藥以賜沈羲又曰淮南王爲八公進金玉之几執門弟子之禮四極科曰凢寳經之具几案巾秩不可妄借於人太玄經曰老子傳授經戒籙儀注訣日以局脚小案置經綵巾覆上洞眞玄經曰}
  - {type: page-break, offset: 1846, content: '', id: KR3k0012_SBCK_677-2b}
  - {type: variant, offset: 1846, length: 0, content: '', WYG: 也上清真文玉經朝文曰有流明太靈侍言玉案十二枚又始内傳曰諸天各奉蓮華座以寳蓋覆之神仙傳曰黄老遣仙官玉女持金案玉杯盛藥以賜沈羲又曰淮南王爲八公進金玉之几執門弟子之禮四極科曰凢寳經之具几案巾秩不可妄借於人太𤣥經曰老子傳授經戒籙儀注訣曰以局脚小案置經綵巾覆上洞真𤣥經曰}
  - {type: page-break, offset: 1846, content: '', id: KR3k0012_WYG_677-4a, image: WYG0899/WYG0899-0089c.png}
