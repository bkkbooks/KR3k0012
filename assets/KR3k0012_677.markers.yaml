  - {type: variant, offset: 1906, length: 0, content: '', WYG: 䟽九天帝王七聖几下飛行羽經曰脩三一道法坐金牀玉几金爐玉七太真人詩曰太㣲啓玉案列仙傳曰太室山中有地仙邛䟽卧几案真誥曰鹿迹山中有絶洞洞中自有石牀石榻曲夾輿輦太上飛行羽書曰玉清則上清之髙真上清則太清之髙神太清則飛仙之髙靈凢行玉清之道出則諸天侍衞建七色之節駕紫雲軒十二玉輪六師啓路飛龍翼轅行上清之道出則五帝侍衞建紫毛之節駕飛雲丹車位准上清左右仙卿行太清之道出則五帝侍衞建五色之節駕龍輿白虬啓道太極恭軒又曰王總真爲茅盈召朱冠使者二人乗流景之輿蒼蛇把緑節仗瓊竿羽旄横曰朱雲翳景使者並繡衣芙蓉冠持紫素之書各百字以付茅盈二弟固􅇆是以固有地真上仙定籙神君之號衷有司三官保命仙君之位各依紫素之命封莅所任神宫上府亦隨事而資給二君焉漢平帝元壽二年八月己酉南岳真人西域王君龜山王母方諸青童君並乗緑景之輿駕神虎之軿同造茅盈於句曲之山金壇之隂又曰飛仙秘道招五辰之晨常能行之十五年則南極老人丹陵上真迎以緑雲之輦西極老人素靈子期迎以黄飈之車北極老人𤣥上仙皇迎以𤣥景之龍東極老人扶陽公子迎以青軿之輦中元老人上𤣥子迎以曲晨之盖五老㑹合俱昇紫虛此五老盖五星之真人也非如裴君星中五帝之公又異乎雲牙五方之老上學之法順之者飛仙也又曰八道秘言者道有八條其言髙妙閑心静室寥朗虛真亦將得見丹景之氣三素飛雲八輿朱輦紫霞瓊輪上清静眄廻轡三光髙皇秉節靈童攀轅太素擁盖南極臨軒於是溟光外映象燭太虛子能見之不煩凝霜濯華𤣥腴金丹也一道秘言曰以八節日清朝北望清朝小早於清旦也有紫緑白雲者是爲三元君三素飛雲也其時三元君乘八輿上詣天帝玉清君也君子猴見當再拜自陳乞侍輪轂二道秘言曰以八節日夜半東北望有𤣥青黄雲者是爲太極天帝君乘八景之輿上詣髙上玉皇三道秘言曰以甲子上旬戊辰己巳之日清旦西北望有紫青黄雲者是爲太極真君三素雲也其時太極真君及上真人乗𤣥景緑輿上詣紫㣲宫四道秘言曰以甲戌上旬戊寅己卯之日清旦東宫南望有赤白青雲者是爲扶桑太帝君三素雲也其時扶桑太帝君乗光明八道之輦上詣紫㣲宫五道秘言曰以甲申上旬戊子己丑之日清旦正西望見白赤紫雲者是爲太素上真白帝君三素雲也其時太素上真人素帝君乗脩條玉輦上詣玉天𤣥皇髙真也六道秘言曰甲午上旬戊戌己亥之日清旦正南望有青赤黄雲者是爲南極上真赤帝君其時乘絳琳碧輦上詣閬風臺七道秘言曰以甲辰上旬戊申己酉之日清旦西南望見緑紫青雲者是爲上清真人時乘𤣥景八光丹輦上詣髙上天帝八道秘言曰以甲寅上旬戊午己未之日清旦正東望有朱碧黄雲者是太虛上真人其時乗徘徊玉輿上詣太帝君八節日見三素雲者紫雲在上緑雲次之白雲在下共相杳也子謹視之移度經曰真皇恭駕黄霞周行四方飛盖緑軿上造金闕靈寳赤書曰詣天真人乘碧霞玉輿太洞真經曰太上乗一景之輿受九暉太晨隱}
