  - {type: variant, offset: 3037, length: 1, content: 發, SBCK: 玉京有七寳宫宮有七寳玄臺即太上治所又有天寳臺上清經曰有紫碧玄臺大洞眞經曰上清眞人惣仙大司馬長生法師登太常滄浪山洞臺中􅀟玉穴酣飲紫明芝液眞誥曰有玉華室有刻石眞人五勝文曰駕飛龍於西華之臺謁拜帝眞赤書玉訣經曰太玄上宫太素眞人常以春分之日㑹諸仙官於崑崙瑶臺校定靈寶眞經又曰陽臺眞人常以立冬之日㑹諸仙官玉女於靈寳陽臺之上校定學道簿籙夲行經曰有㝷眞玉臺衆篇經曰帝尊引衆眞人集太空金臺内音玉字經曰九層之臺處乎玉京之山煥乎玄都之上有太眞玉印又曰馥朗天中玉京玄臺之別號西靈眞人常誦無量洞章遊行其上大洞玉經曰}
  - {type: page-break, offset: 3037, content: '', id: KR3k0012_SBCK_677-9a}
  - {type: variant, offset: 3037, length: 1, content: 發, WYG: 玉京有七寳宫宫有七寳𤣥臺即太上治所又有天寳臺上清經曰有紫碧𤣥臺太洞真經曰上清真人惣仙太司馬長生法師登太常滄浪山洞臺金巾雙玉冗酣飲紫明芝液真誥曰有玉華室有刻石真人五勝文曰駕飛龍於西華之臺謁拜帝真赤書玉訣經曰太𤣥上宫太素真人常以春分之日㑹諸仙官於崑崙瑶臺校定靈寳真經又曰陽臺真人常以立冬之日㑹諸仙官玉女於靈寳陽臺之上校定學道簿籙本行經曰有尋真玉臺衆篇經曰帝尊引衆真人集太空金臺内音玉宇經曰九層之臺處乎玉京之山煥乎𤣥都之上有太真玉印又曰馥朗天中玉京𤣥臺之别號西靈真人常誦無量洞章逰行其上太洞玉經曰}
