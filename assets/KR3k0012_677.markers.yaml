  - {type: variant, offset: 3203, length: 0, content: '', SBCK: 金城九重玉樓十二神仙所治也􅀛山元籙曰􅀛山上有十二玉樓峩峩曜景太清有金華樓諸眞仙玉籙皆在金樓之中觀靈書經曰有洞靈之觀金字題觀四面又有九靈之觀紫陽之觀又紫微上宫有通陽之觀主得度之人功德輕重宫三元品戒經曰九氣始凝三光發明結青黄白之氣置上元三宫太洞王經曰太􅀄有華陽之宮㑹方之宫小有眞}
  - {type: variant, offset: 3203, length: 0, content: '', WYG: 金城九重玉樓十二神仙所治也龜山元籙曰龜山上有十二玉樓峨峨曜景太清有金華樓諸真神玉籙皆在金樓之中觀靈書經曰有洞靈之觀金字題觀四面又有九靈之觀紫陽之觀又素微上宫有通陽之觀主得度人之功德輕重宫三元品戒經曰九氣始凝三光發明結青黄白之氣置上元三宫太洞玉經曰太初有華陽之宫㑹方之宫小有中}
  - {type: page-break, offset: 3203, content: '', id: KR3k0012_WYG_677-17a, image: WYG0899/WYG0899-0096a.png}
  - {type: variant, offset: 3203, length: 0, content: '', krp: 金城九重玉樓十二神仙所治也龜山元籙曰龜山上有十二玉樓峩峩曜景太清有金華樓諸眞仙玉籙皆在金樓之中觀靈書經曰有洞靈之觀金字題觀四面又有九靈之觀紫陽之觀又紫微上宫有通陽之觀主得度之人功德輕重宫三元品戒經曰九氣始凝三光發明結青黄白之氣置上元三宫太洞王經曰太𥘉有華陽之宮㑹方之宫小有眞}
  - {type: variant, offset: 3204, length: 0, content: '', SBCK: 中有万華之宫玉君之治所玉晨宫中有玉映之宮又有元君六淵之宫黄老圎華之宫上清眞陽之宫太極上宫主衆仙誦詠室大洞玉經曰太霞之中有白雲之室太虚元君所處三皇經曰蜀郡西峩嵋山石室舊有三皇文此文不與天下衆文同百万人中未有}
