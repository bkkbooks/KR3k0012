  - {type: variant, offset: 3325, length: 271, content: 章三皇經曰三皇自然之文皆以金玉為用天皇所授玄玉為簡青玉為文地皇所授黃玉為簡白玉為文綴以金鉤聯以金鏁置以玉案覆以珠巾寶蓋珍床安之青宮閉之紫閣芬以五香侍以十華也神州七轉七變經曰流金鳳璽紫宸上皇先生所佩三皇序目曰九天印文以召九天校事也上清變化經曰高上虛皇君佩丹皇玉章又云三元大明上皇君帶神虎紫章又有皇上帝君佩金虎鳳文帶神虎玉章又曰九霄真王佩金鳳璽歷藏經曰天王侯帶紫綬金印五岳真圖曰太山君佩通陽大明之印衡山君佩夜光天真之印嵩山君佩神宗陽和之印華山君佩開天通真之印恒山君佩長津悟真之印青城丈人佩三庭之印後聖列紀曰紫微上真天帝玉清君遣八景瓊輿來迎聖君以登, SBCK: 門蘭室}
