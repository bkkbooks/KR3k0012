  - {type: variant, offset: 1893, length: 4, content: 筆結綸以, SBCK: 勝也他􅀃西母頭􅀋戴勝甚失之夲際經曰元始上尊在長樂舎寳飾髙座雖有座形不障於物人所徃來亦無隔礙復有小琉璃座行列兩邊悉髙五尺茅君内傳曰}
