  - {type: variant, offset: 1906, length: 0, content: '', SBCK: 䟽九天帝王七聖几下飛行羽經曰修存三一道法坐金牀王几金爐玉匕太眞人詩曰太微啓玉案列仙傳曰太室山中有地仙卭䟽卧牀几案眞誥曰鹿迹山中有絶洞洞中自有石牀石榻曲夾輿輦太上飛行羽書曰玉清則上清之髙眞上清則太清之髙神太清則飛仙之髙靈凢行玉清之道出則諸天侍衛建七色之節駕紫雲軒十二玉輪六師啓路飛龍翼轅行上清之道出則五帝侍衛建紫毛之節駕飛雲丹車位准上清左右仙卿行太清之道出則五帝侍衛建五色之節駕龍輿白虬啓道太極叅軒又曰王惣眞爲茅盈召朱冠使者二人乗流景之輿蒼虵把緑節仗瓊竿羽旄横曰朱雲翳景使者並繡衣芙蓉冠持紫素之書各百字以付茅盈二弟固􅂨是以固有地眞上仙定籙神君之號􅂨有司三官保命仙君之位各依紫素之命封莅所任神宫上府亦隨事而資給二君焉漢平帝元壽二年八月巳酉南岳眞人西城王君􅀛山王母方諸青童君並乗緑景之輿駕神虎之軿同造茅盈於句曲之山金璮之隂又曰飛仙祕道招五辰之晨常能行之十五年則南極老人丹陵上眞迎以緑雲之輦西極老人素靈子期迎以黄颷之車北極老人玄上仙皇迎以玄景之龍東極老人扶陽公子迎以青軿之輦中元老人上玄子迎以曲晨之蓋五老㑹合俱􅂛紫虚此五老蓋五星之眞人也非如裴君星中五帝之公又異乎雲牙五方之老上學之法順之者飛仙也又曰八道祕言者道有八條其言髙妙閑心静室寥㓪虗眞亦將得見丹景之􅂔三素飛雲八輿朱輦紫霞瓊輪上清静眄廻轡三元髙皇秉節靈童攀轅太素擁蓋南極臨軒於是溟光外映象燭太虚子能見之不煩凝霜濯華玄􅃾金丹也一道祕言曰以八節日清朝北望清朝小早於清且也有紫緑白雲者是爲三元君三素飛雲也其時三元君乗八輿上詣天帝玉清君也子􅃸見當再拜自陳乞侍輪轂二道祕言曰以八節日夜半東北望有玄青黄雲者是爲太極天帝君乗八景之輿上詣髙上玉皇三道祕言曰以甲子上旬戊辰巳巳之日清旦西北望有紫青黄雲者是爲太極眞君三素雲也其時太極眞君及上眞人乗玄景緑輿上詣紫微宫四道祕言曰以甲戍上旬戊寅巳夘之日清旦東南望有赤白青雲者是爲扶桑太帝君三素雲也其時扶桑太帝君乗光明八道之輦上詣紫微宮五道祕言曰以甲申上旬戊子巳丑之日清旦正西望見白赤紫雲者是爲太素上眞白帝君三素雲也其時太素上眞人白帝君乗脩條玉輦上詣玉天玄皇髙眞也六道祕言曰甲午上旬戊戍巳亥之日清旦正南望有青赤黄雲者是爲南極上眞赤帝君其時乗絳琳碧輦上詣閬風臺七道祕言曰以甲辰上旬戊申巳酉之日清旦西南望見緑紫青雲者是爲上清眞人時乗玄景八光丹輦上詣髙上天帝八道祕言曰以甲寅上旬戊午巳未之日清旦正東望有朱碧黄雲者是太虚上眞人其時乗徘􅆦玉輿上詣大帝君八節日見三素雲者紫雲在上緑雲次之白雲在下共相沓也子謹視之移度經曰眞皇叅駕黄霞周行四方飛盖緑軿上造金闕靈寳赤書曰詣天眞人乗碧霞玉輿太洞眞經曰太上乗一景之輿受九暉太晨隠}
