  - {type: variant, offset: 2700, length: 288, content: 靈寶赤書曰元始命太真按筆玉妃拂筵鑄金為簡刻書玉篇五老賞籙祕於九天靈都之宮廻天九霄經曰於是大一拂筵天妃持香玉華執巾丹書紫字刻於白金隱起靈顏結於玉篇題以青籙得道之名龍景九文紫鳳赤書經曰太上命太極真人授以玉簡金書寶洞飛霄絕玄之章玉帝玄記曰中皇元年九月七日七聖齋靈清長宮記其得道之篇刻以白銀之簡藏於雲錦之囊封以啟命之章付以五老仙都左公掌籙瓊宮又曰古空洞之中有廻天上文四司所保五帝所詮七聖定簡舉形合先大有經曰太上玉章刻玉為簡惣御萬真真經曰東方歲星青帝勾芒佩通明之印南方熒惑赤帝太昊佩太陽之印西方太白白帝少昊佩通陰之印北方辰星黑帝顓頊佩通神之印中央鎮星大帝文昌佩方神之印本際經曰有十二法印, SBCK: ''}
