  - {type: variant, offset: 80, length: 0, content: '', SBCK: 太微天帝君進拜於帝皇之几又曰上皇帝君乃推几偃詠虚眺太空吟玉淸之隱書歌元景之靈章􅀭音霞際清微玉桭太洞經日太微小童五符命籍捧持玉案帝君所臨主通諸神變化經曰}
  - {type: variant, offset: 80, length: 0, content: '', WYG: 太微天帝君進拜於帝皇之几又曰上皇帝君乃推几偃詠虛眺太空吟玉清之隠書歌元景之靈章揚音霞際清微玉振太洞經曰太微小童五符命籍捧持玉案帝君所臨玉通諸神變化經曰}
