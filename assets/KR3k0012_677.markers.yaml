  - {type: variant, offset: 80, length: 0, content: '', krp: 太微天帝君進拜於帝皇之几又曰上皇帝君乃推几偃詠虚眺太空吟玉淸之隱書歌元景之靈章揚音霞際清微玉桭太洞經日太微小童五符命籍捧持玉案帝君所臨主通諸神變化經曰}
  - {type: variant, offset: 81, length: 0, content: '', SBCK: 金光立空之案又曰元始拊几髙詠嘯㓪太空玉珮金璫上經曰九老仙都捧金精之案上請寳文以授衆眞也洞神經曰拂拭几案置經于前也像名經曰東方上尊凭七寳鳯文之曲几敷􅀃道要眞經法輪經曰三眞立空之案以七寳懸覆經上衆篇經曰元始上尊凝眞遐想撫几髙抗命召五帝論定隂陽推數刼㑹移校河源檢籙天度洞神經曰有局脚案以置經符也}
