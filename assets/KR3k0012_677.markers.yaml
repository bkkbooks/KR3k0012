  - {type: variant, offset: 3215, length: 3, content: 金鳳璽, SBCK: 雲九色之房仙公内傳曰崑崙山上有積石瑶房太上紫書籙曰白玉母入於􅀛山王闕處於青玉宫中朱紫之房靈寳赤書曰有九光華房外國放品經曰紫翠丹房舎道典曰道之清浄者吾舎也道因天清而清之因地静而静之因日月之光而明之因星辰之行而正之因萬物之性而消息之萬物中人爲貴能使形無事神無體以清浄致無爲之意即道爲舎也䆫諸天内音經曰天眞皇人開寒靈之䆫}
