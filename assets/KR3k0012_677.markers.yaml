  - {type: variant, offset: 791, length: 1029, content: 文也並以元始生於自然空洞之中靈皇玉帝受於九玄鑄金為簡刻玉結篇金鏤玉字以明寶文祕於九天之上洞神經曰有三都印三皇印九天印鉅天下又曰有三皇玉券一名金契又曰受三皇法須玉簡長一尺二寸廣一寸厚三分無者槿桐准也又曰通謁三皇之簡以青玉作之赤金為字金根經曰金簡玉札出自大上靈都之宮書以朱文編以朱繩又曰有神華玉門真人投金簡之處又曰領仙玉郎齎金簡紫籍來於東華青宮校定玉名又曰玉皇刻降丹精玉芝金璽鳳章也玉寶青宮之內有金章鳳璽又曰青宮北殿上有金章鳳璽真人得之又曰青宮之內北殿上有仙格金架也格上有學仙簿籙及玄名年月深淺金簡玉札有十萬篇領仙王郎之典也又曰青宮無金簡之籙玉格無玄編之名神經亦不可得披大洞玉經曰讀玄一洞經者神臺刊名於福連之簡太上金簡玉札名為福連之書也又曰真陽者上清之宮名福連之簡刊其內五符經曰真一食五牙天文西母刻以黃金之札封以丹芝光草印以太上中章茅君內傳曰茅盈在恒山內夢太玄玉女把玉札攜之又曰天上道君有玉輿鳳璽又曰太元真人有一人帶錄章囊又一人帶繡章囊一人帶錦囊書金真玉光經曰有昭靈之章保生玉章又曰此經高妙眾經之尊總御萬真匡御群仙玄符流映洞明紫晨祕於九天之宮鑄金為簡以撰靈文刻玉丹書八明其篇也又靈寶自然經曰太上諸仙真以黃金為簡丹玉書之又太真科以玉牒金書七寶為簡玉帝七聖玄紀曰刻以白銀之簡結以飛青之文又曰廣靈之堂迴天九霄白簡青籙刻其內太真科曰丹簡者以朱漆簡明火立陽也墨籙者以墨書文明水主陰人學長生故名丹簡墨籙祕不安傳又曰天皇執飛仙玉策人皇執上皇保命王策地皇執元皇定籙之策三華寶曜內真上經曰太帝靈都宮中有二十四萬上真仙人皆鑄金為簡白銀結編紫華書文誦詠此篇三天正法曰三天九微玄都大真靈籙者祕在太上靈都之宮刻以紫玉為簡黃金為文付五老上真仙都左公封以紫蘂玉芨盛以雲錦之囊南岳夫人內傳曰白簡素籙以白玉為簡以青玉為字故謂之白簡青籙皆記得道之人名姓道學傳曰金簡有王元規之筆跡太上素經曰凡受太上黃素經者傳盟用玉札一枚長一尺五分廣一寸四分又云有三元秀簡真誥曰清虛真人詣三元君受玉璽金真龜山元籙曰丹文紫章神虎玉章七元交光之章流金紫章太上命神之章夜光寶章九色離羅之章靈書紫文經曰靈書紫文上經刻以紫玉為簡青金為文黃籙簡文經曰投金龍一枚丹書玉札青絲纏之以關靈五帝昇度之信封於絕巖之中一依舊法又曰丹書玉札一枚金龍一以青絲繫石沉三河以關水帝昇度之信一依玉訣舊文太洞玉經曰太上經簡玉札名為福連之書又曰太上書以彤玉之札則玉映之堂可見四明之門可入也後聖道君列紀曰刻以紫玉為簡青金為文龜母按筆真童拂筵玉童結編名之曰靈書, SBCK: ''}
