  - {type: variant, offset: 3513, length: 367, content: 山君佩通陽大明之印衡山君佩夜光天真之印嵩山君佩神宗陽和之印華山君佩開天通真之印恒山君佩長津悟真之印青城丈人佩三庭之印後聖列紀曰紫微上真天帝玉清君遣八景瓊輿來迎聖君以登上清宮賜蘂剛丹玉鳳璽後聖九玄道君列紀曰太陰法有死生有黑籙白簿真青丹編簡受生先後之相次也後聖道君列紀曰玉清君賜道君玉鳳璽飛行三界經曰下有太一紫綬金印威喜天帝信璽修靈寶飛行三界之道真人所佩五稱符上經曰五星通靈之印印五星靈符道學傳曰吳王闔閭得真文不解封以黃金之檢印以玉皇之章以問魯大夫孔子又曰禹封五符以金英之函檢以玄都之印神仙傳曰衛叔卿語其子度世云可於室西北桂下取我仙方按而服之令人長生度世握得玉函封以飛仙之印取按之服五色靈母仙去北帝經曰酆都祕印用救世間攝制鬼神集仙籙曰杜蘭香女仙也於洞庭包山降張碩家碩蓋修道者也授以飛化之道留玉簡玉唾盂又齎黃麟羽帔此上仙之所服非洞天之所有也, WYG: 平御覽卷六百七十七}
