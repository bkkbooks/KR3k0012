  - {type: variant, offset: 3214, length: 0, content: '', SBCK: 瓊瑤之室外國放品經云有瓊華之室洞景金玄經曰八瓊之室又三華寳曜内眞上經曰玉室上清經有碧室房大洞玉經曰三華城者玉清之房名也在玉城之中陽安元君所處無上眞人内傳曰有}
  - {type: variant, offset: 3214, length: 0, content: '', WYG: 瓊瑶之室外國放品經云有瓊華之室洞景金𤣥經曰八瓊之室又三華寳曜内真上經曰玉室上清經有碧室房太洞玉經曰三華城者玉清之房名也在玉城之中陽安元君所處無上真人内傳曰有}
