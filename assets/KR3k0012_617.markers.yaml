  - {type: variant, offset: 276, length: 4, content: 詣東觀讀, WYG: 樂廣京州人也共談累日深歎其才謂京曰君天才過人恨不學耳若學必為一代談宗京感其言遂勤學不倦時武陵太守戴昌亦善談論與京共談京假借之昌以為不如己笑而遣之令過其子若思京方極其言論昌竊聽之乃歎服曰才不可假遂父子俱屈焉又曰郭象者字子𤣥少有才理好老荘能清言太尉王衍每云聽象語如懸河瀉水注而不竭又曰樂廣嘗與裴頠清言欲以理服之而頠辭論豐博廣笑而不言時人謂頠為言談林藪又曰朝賢嘗上巳禊洛或問王濟昨遊有何言談濟曰張華善說史說漢裴頠論前言往行衮衮可聽王戎談子房季札之間超然𤣥箸又曰王衍妙善𤣥言唯談老莊為事每捉玉柄麈尾與手同色義理有}
