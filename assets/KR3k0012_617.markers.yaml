  - {type: variant, offset: 3352, length: 1, content: 率, SBCK: 張退劉曰卿且前去我正尓往取卿共詣撫軍撫軍簡文張旣還舡同旅􅀏之曰卿何許􅀫還張􅀏而不荅湏􅁷真長至遣教覔張孝廉舡同旅惋愕旣同載俱詣撫軍至門劉謂撫軍曰下官今日爲公得一太常􅀶士妙選旣前撫軍與之語言咨嗟稱善數日乃止曰張慿勁粹爲理之窟即用爲太常􅀶士又曰范􅀇平注字􅀇平在簡文坐談欲屈引長史曰長史王仲祖卿助我王曰此非拔山之力所能助也異苑曰陸機􅀄入洛次河南偃師時乆結隂望道左人居因往投􅀫見一年少置易投壷與機談機心伏之而無}
