  - {type: variant, offset: 620, length: 144, content: 內朝歌人也隱居不仕讀易至損益卦喟然而歎曰吾以知富不如貧貴不如賤但未知死何如生魏武本紀曰吾讀介之推之避晉封申包胥之逃楚賞未嘗不廢書而歎魏略曰侍中董遇好學避難採樵負販常挾經書投閑習誦人從學者遇不肯教云當先讀百遍而義自見吳志曰闞澤字德潤好學居貧常為人賃書所寫既畢誦誦亦遍魏志曰賈逵最好春秋課日讀, SBCK: 南郭象談論}
