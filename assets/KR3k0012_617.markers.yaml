  - {type: variant, offset: 1834, length: 166, content: 引近臣及修文學士與之宴集嘗令各效伎蓺以為笑樂工部尚書張錫為談客娘舞將作大匠宗晉卿舞渾脫左衛將張洽舞黃麞左金吾衛將軍杜元琰誦婆羅門呪給事中李行言唱駕車西河中書舍人盧藏用效道士上章山惲獨奏曰臣無所解請誦古詩兩篇帝從之於是誦鹿鳴蟋蟀之詩奏未畢中書令李嶠以其詞有好樂無荒之語頗涉規諷恐為忤旨遽止之帝嘉山惲之意墨子曰周公朝讀書百篇夕見七十五士, SBCK: 千里來者}
