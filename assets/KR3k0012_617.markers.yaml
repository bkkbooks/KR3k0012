  - {type: variant, offset: 2604, length: 380, content: 歲乃就充石壁山中受尚書乃以口傳受伏子四代之事略無遺脫伏子因而誦之常以細繩十餘尋以縛腰誦一遍則結繩一結十尋之繩皆成結矣計誦尚書可數萬遍但食穀損人精意有遺失伏子今所傳百卷得其一二耳故堯舜二典闕漏尤多家語曰孔子讀史至於楚復陳陳夏徵舒殺其君楚莊王討之因取陳而有之申叔時諫莊王從之乃復陳國也喟然歎曰賢哉楚莊王也輕千乘之國而重一言之信非申叔之忠弗能進其義非莊王之賢弗能受其訓春秋後語曰蘇周歸周雖多畜亦何以為於是夜發書篋數十得周書陰符戰國策云得太公陰符之謀伏而讀之欲睡引錐剌其股血流至踝暮年以出揣摩曰此可以說當世之君矣幽明錄曰襄陽城南有秦民墓為性至孝親歿泣血三年人有為其詠蓼莪詩者民聞其義涕泗不自勝桓子新論曰劉子政子駿伯玉三人尤珍重左氏教子孫下至婦女無不讀誦俗說曰劉柳為僕射傅迪為左丞傅好讀書而不解其義劉唯讀莊老而已傅道劉云正讀十二卷何足本人劉道傅云讀書雖多而無所解可謂書簏, SBCK: 月舉爲秀才}
