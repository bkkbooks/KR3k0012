  - {type: page-break, offset: 888, content: '', id: KR3k0012_SBCK_617-3b}
  - {type: variant, offset: 888, length: 3, content: 劉敏元, WYG: 孫盛年十歲避難渡江及長博學善言名理於時殷浩擅名一時與抗論者唯盛嘗詣浩談論對食奮擲麈尾毛悉落飯中食冷而復煖者數四至日暮忘食理竟不定沈約宋書曰髙祖少事戎旅不經涉學及為宰相頗慕風流時或談論人皆依違不敢難也鄭鮮之難必切至未嘗假借要須髙祖辭窮理屈然後置之髙祖或時慙恧變色動容既而謂人曰我本無學術談義尤淺比時言論諸賢多見寛容唯鄭不爾獨能盡人之意甚以此感之時人謂之格佞南史曰謝靈運辨博辭義蜂起王惠嘗與之談時然後言時荀伯子在坐退而告人曰靈運固自蕭散直上王郎有如萬頃陂焉又曰謝瞻傳曰靈運好臧否人物琨患之欲加裁折未有其方謂瞻曰非汝莫能乃與晦瞻𢎞微等共遊戯使瞻與靈運共車靈運登車便商較人物瞻謂曰秘書早亡談者亦互有同異靈運黙然言論自此衰止南史張敷好讀𤣥言兼屬文論弱冠初父邵使與髙士南陽宗少文談繫象往復數番少文欲屈握麈尾歎曰吾道東矣於是名價日重後周書曰蘇綽屬太祖與公卿往昆明池觀漁行至城西漢故倉地顧問左右莫有知者或曰蘇綽博物多通請問之太祖乃召綽具以狀對太祖大恱因問天地造化之始歴代興亡之迹綽既有口辯應對如流太祖益喜乃與綽並馬徐行至池竟不設網罟而還遂留綽至夜問以治道太祖卧而聽之綽於是指陳帝王之道兼述申韓之要太祖乃起整衣危坐不覺膝之前席語遂達曙不厭詰朝謂周惠達曰蘇綽真竒士也又曰裴文舉}
