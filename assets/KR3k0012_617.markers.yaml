  - {type: variant, offset: 888, length: 3, content: 劉敏元, SBCK: 孫盛年十歳避難渡江及長􅀶學善理于時殷浩擅名一時與抗論者唯盛甞詣浩談論對食奮尾毛悉落飯中食冷而復暖者數四至暮忘食理竟不定沈約宋書曰髙祖少事戎旅不經渉學及爲宰相頗慕風流時或談論人皆依違不敢難也鄭解之難必切至未甞假借要湏髙祖辭窮理屈然後置之髙祖或時慙恧變色動容旣而謂人曰我本無術學談義尤淺比時言論諸賢多見寛容唯鄭不尔獨能盡人之意甚以此感之時人謂之格侫宋書曰謝靈運辯􅀶辭義鋒起王惠甞與之談時然後言時荀伯子在座退而告人曰靈運固自蕭散直上王郎有如萬頃陂焉又曰謝瞻傳曰靈運好臧否人物混患之欲加裁折未有其方謂瞻曰非汝莫能乃與晦曜引微等共遊戲便使瞻與靈運共車靈運登車便啇較人物瞻謂曰祕書早亡談者亦互有同異靈運黙然言論自此衰止又曰張敷好讀􅀇言兼屬文論弱冠􅀄父邵使與髙士南陽宗少文談繫象往復數畨少文欲屈握麈尾歎曰吾道東矣於是名價日重後周書曰􅂫綽屬太祖與公卿往昆明池觀漁行至城西漢故倉地顧問左右莫有知者或曰􅂫綽􅀶物多通請問之太祖乃召綽具以狀對太祖大恱因問天地造化之始歴代興亡之迹綽旣有口辯應對如流太祖益喜乃與綽並馬徐行至池竟不設網􅅈而還遂留綽至夜問以治道太祖卧而聽之綽於是指陳帝王之道兼述申韓之要太祖乃起整衣危坐不覺􅂰之前席語遂逹曙不厭詰朝謂周惠逹曰􅂫綽真竒士也又曰裴文舉}
