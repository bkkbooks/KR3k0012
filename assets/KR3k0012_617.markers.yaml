  - {type: variant, offset: 2387, length: 2, content: 否天, SBCK: 王充所作論衡北方都未有得之者蔡伯喈甞到東江見之歎其髙文度越諸子􅁪愛玩而獨祕之及還中國諸儒覺其談論更逺嫌得異書或捜求其隱處果得論衡捉取數卷將去伯喈曰唯我與尓共之勿廣也亦出著書門管輅别傳曰輅父爲琅邪長輅時年十五琅邪太守單子春雅有才度問輅一時之俊欲得相見輅父即遣輅造之大㑹賔客百餘人坐上有能言之士輅問子春府君多嘉客有雄貴之姿輅旣年少膽志未剛􅀂相觀懼失精神先飲三升清酒盡之然後而言子春大喜便酌三升酒獨使飲之酒盡之後問子春今欲與輅爲對者府君耶四坐之士耶子春曰吾自欲與卿旗鼓相當輅言始讀詩論易學問微淺未能上引聖人}
  - {type: variant, offset: 2387, length: 2, content: 否天, WYG: 王充所作論衡北方都未有得之者蔡伯喈嘗到江東見之歎為髙文度越諸子恒愛玩而獨秘之及還中國諸儒覺其談論更逺嫌得異書或捜求其隠處果得論衡捉數卷將去伯喈曰唯我與爾共之勿廣也亦出著書門管輅別傳曰輅父為瑯琊即丘長輅時年十五瑯琊太守單子春雅有才度聞輅一時之俊欲得相見輅父即遣輅造之大會賓客百餘人坐上有能言之士輅問子春府君多嘉賓有雄貴之姿輅既年少膽志未剛若欲相觀懼失精神先飲三升清酒盡之然後而言子春大喜便酌三升酒獨使飲之酒盡之後問子春今欲與輅為對者府君邪四坐之士邪子春曰吾自欲與卿旗鼔相當輅言始讀書論易本學問微淺未能上引聖人}
