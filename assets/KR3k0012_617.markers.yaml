  - {type: variant, offset: 276, length: 4, content: 詣東觀讀, SBCK: 樂廣京州人也共談累日深歎其才謂京曰君天才過人恨不學耳􅀂學必爲一代談宗京感其言遂勤學不倦時武陵太守戴昌亦善談論與京共談假借之昌以爲不如巳􅀏而遣之令過其子􅀂思京方極其言論昌竊聽之乃歎服曰才不可假遂父子俱辱焉又曰郭象者字子􅀇少有才理好老莊能清言太尉王衍每云聽象語如懸河㵼水注而不竭又曰樂廣甞與裴顧清言欲以理服之而顧辭論豐􅀶廣􅀏而不言時人謂顧爲言談林藪又曰朝賢甞上巳禊飲或問王濟昨遊有何言談濟曰張華善􅀃史漢裴頠論前言往行靡靡可聽王戎子房季扎之間超然􅀇著又曰王衍妙善􅀇言唯談老莊爲事每捉玉柄麈尾與手同色義理有}
