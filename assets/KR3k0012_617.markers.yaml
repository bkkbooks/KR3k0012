  - {type: variant, offset: 3324, length: 0, content: '', SBCK: 孝武將講孝經謝太傅與諸人私逆講師車武子謂􅀽彦伯曰不問則德音有遺多問則重勞二謝􅀽曰必無此嫌事曰何以知尓􅀽曰何甞見明鏡疲於屢照清流撓於惠風也郭子曰張慿舉孝廉出京􅀒其才氣謂必叅時彦欲詣劉真長郷里及同舉者咸共哂之張遂徑往詣劉旣前處之下坐通寒暑而巳真長方洗濯料事神意不接良乆張欲}
