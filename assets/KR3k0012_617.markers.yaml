  - {type: variant, offset: 1171, length: 287, content: 曰詩泰曰至渭陽未耶愔便號泣感咽子泰亦對之歔欷於是遂為罷酒北史曰後魏元暉業領中書監錄尚書事齊文襄嘗問之曰比何所披覽對曰數尋伊霍之傳不讀曹馬之書暉業以時運漸謝不復圖全唯事飲啗一日三羊三日一犢又嘗賦詩云昔居王道泰濟濟富群英今逢世路阻狐兔鬱縱橫梁書曰武帝每讀孝子傳未曾終軸輒輟書悲慟由是家門愛重探頤索隱窮理盡性究覽墳籍神悟知機讀書不待溫故一閱皆能誦憶又曰范雲傳初竟陵王子良為會稽太子雲為府主簿王未之知後剋日登秦望山乃命雲雲以山上有秦始皇刻石此丈三句一韻人多作兩句讀之並不得韻又皆大篆人多不識乃夜取史記讀之令上知明日登山子良命賓僚讀之皆茫然不識末問雲雲曰下官嘗讀史記見此刻石文進乃讀之, SBCK: ''}
