  - {type: variant, offset: 1767, length: 1309, content: 里南出孟門山此經禹鑿廣岸崇深傾崖及桿巨石臨危若墜復倚焉岐山易曰王用亨于歧山吉無咎詩曰古公亶父來朝走馬率西水滸至于岐下又曰居岐之陽在渭之將萬邦之方下民之王孟子曰大王居邠狄人侵之事之以皮幣不得免焉事之以珠玉不得免焉乃屬其耆老而告之曰狄人之所欲者吾土地也君子不以其所養人者害人二三子何患乎無君我將去之去邠踰梁邑於岐山而下居焉圖經曰岐山亦名天柱山禹貢曰導汧及岐河圖括地象云歧山在崑崙山東南為地乳上多白金周之興也鸑鷟鳴於歧山時人亦謂歧山為鳳皇堆酈元注水經云天柱山上有鳳皇祠或云其峰高峻逈出諸山狀若柱因為名焉梁山書曰壺口治梁及岐壺口在冀州梁在雍州循山治水在西詩曰弈弈梁山維禹甸之弈弈大貌甸治也禹治梁山除水災也傳曰梁山崩晉侯召伯宗伯宗辟重重人曰待我不如捷之速也問其所曰綘人也問綘事曰梁山崩將召伯宗謀之問將若之何曰山有杇壤而崩可若何國主山川山崩川竭國君為之不舉降服乘縵徹樂出次祝幣史辭以禮焉其如此而已雖伯宗若之何穀梁傳曰梁山崩壅河三日不流晉君召伯宗而問之伯宗來遇輦者輦者不避使車右下而鞭之輦者曰所以鞭我者其取道遠矣伯宗下車而問焉曰子有聞乎對曰梁山崩壅遏河三日不流伯宗曰君此召我也為之柰何崩之天有河天壅之雖召伯宗如之何爾雅曰梁山晉望也郭璞注曰晉國所望祭者也今在馮下陽西北臨河上也漢志注曰梁山有夏陽西北即尚書禹貢治梁及岐詩韓弈篇曰弈弈梁山晉國所望大梁別小梁之號俱在韓城縣界大梁山在今縣西又按三秦記梁山宮城又石名織錦城太白山辛氏三秦記曰太白山在武功縣南去長安三百里不知高幾許俗云武功太白去天三百尺山下軍行不得鳴鼓角鳴鼓角則疾風暴雨兼至也周地圖記曰太白山甚高上恒積雪無草木半山有橫雲如瀑布則澍雨人常以為候驗之如離畢焉故語曰南山瀑布非朝即暮魏略曰吉茂蘇則值亂隱於扶風南太白山中以經籍自娛娥眉山列仙傳曰陸通楚狂接輿也好養性在蜀峨眉山世世見之數百年華陽國志曰犍為南安縣南有娥眉山去縣八十里地圖云有仙藥漢武求不能得益州記曰峨眉山在南安縣界當縣南八十里兩山首相望如娥眉岷山易乾鑿度曰岷山上為井絡書曰岷山導江東別為沱江東南流沱東行也書琁璣鈐曰禹導積水決岷山流九貢九貢九州之貢家語曰江始出岷山其源可以濫觴及至于江津不方舟則不可以涉漢書曰成帝時岷山崩壅江水江水逆流山海經曰岷山江水出焉今在汶山郡廣陽縣西大江所出也其上多金玉其下多梅多棠其獸多犀象多夔牛嶓冢山書曰嶓冢導漾東流為漢華陽國志曰西岷嶓地稱天府河圖括地象曰嶓冢山上為狼星山上有異草花名骨容食之無子鳥鼠山河圖括地象曰鳥鼠同穴山地之幹也上為掩畢星渭水出其中漢武內傳曰封君達隴西人也初服黃蓮五十餘年入鳥鼠山於山中服水百餘年還鄉里年如三十常乘青牛號青牛道士也山海經曰鳥鼠同穴山今在隴西首陽縣西南山有鳥鼠同穴鳥名䳜鼠名鼵鼵如家鼠而短尾䳜如鵽而黃穿地入數尺鼠在內鳥在外而共處孔安國傳鳥鼠共為雌雄沙州記曰鳥鼠同穴山鳥如家雀色小白鼠小黃而無尾凡同穴地皆肥沷壤盡軟熟如人耕多生黃花紫草積石山書曰浮于積石至千龍門西河穆天子傳曰西濟于河用申八駿之乘以飲于枝詩之中積石之南河水岐成曰詩詩諸也山海經曰積石山其下有石門河水冐以西冐覆也積石在金地河關縣西南羗中河行塞外東入塞也是山也萬物無不有莊子曰鳳之所居也積石千里河水出下鳳鳥居止, SBCK: 一}
