  - {type: variant, offset: 343, length: 2, content: 小天, SBCK: 獸即擊之投於巖下蔣山輿地志曰蔣山舊名金陵山因此山立名金陵徐爰釋問曰諸葛亮以爲鍾山龍盤即蔣山也金陵圖曰後漢末蔣子文爲秣陵尉逐盗鍾山北爲賊傷額而死常謂青骨死當爲神至呉大帝下都子文乗白馬慘搔頭執白羽見形故令史白呉王爲立廟不尓當百姓大疫大帝猶未信又翊日見於路當令飛蟲入人耳後如其言帝乃立廟鍾山封子文爲蔣侯改爲蔣山即此是也沈約宋書云蕭思話領左衛常從太祖登鍾山北嶺石上彈琴因賜以銀鍾酒謂曰相賞有松石間意焉梁書曰武帝時旱甚詔於蔣山神求􅀨十旬不降帝怒命載荻焚廟并其神影白日開㓪將起火當神上忽有雲如繖蓋須􅁷驟􅀨臺中宫殿皆自震動帝詔使停山謙之丹陽記曰京師南北並有連嶺而蔣山獨崖崫峻異其形象龍實楊都之鎭也孫權葬山南因爲名}
  - {type: page-break, offset: 343, content: '', id: KR3k0012_SBCK_041-8a}
