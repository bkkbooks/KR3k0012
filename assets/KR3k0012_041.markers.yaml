  - {type: variant, offset: 231, length: 0, content: '', SBCK: 東南隱諸嶺不得駢曯自廬山人迹所曁逈望無後出此者毎雨其下成潦而上猶皎日逺法師遊山記曰自託此山二十二載凢再詣石門四遊南嶺東望香爐秀絶衆形北眺九流神覽視四巖之内猶觀之掌焉傳聞有石井方湖足所未踐張野廬山記曰廬山天將􅀨則有白雲或冠峯巖或亘中嶺俗謂之山帶不出三日必雨㝷陽記曰廬山頂上有一池水池中有三石鴈霜落則飛山北有五老峯於廬山最爲峻極横隱蒼穹積石巖巉逈􅎹彭蠡其形勢如}
