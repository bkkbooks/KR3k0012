  - {type: variant, offset: 3, length: 0, content: '', SBCK: 千保於㑹稽史記曰始皇本紀曰三十七年上㑹稽􅀕大禹望于南海而立石刻頌秦徳九土文括略曰禹禪此山有一石穴委曲黄帝藏書於此禹得之孔靈符㑹稽記曰㑹稽山在縣東南其上石􅃺似覆釡禹夢􅀇夷倉水使者却􅀝覆釡之上是也今禹廟在下秦始皇甞配食此廟又曰山有石室云是仙人射堂東髙巖有射的石逺望的的如射􅃸形圎視之如鏡土人常以占􅂖食貴賤射的明則米賤暗則米貴諺曰射的白斛一百射的􅀇斛一千夏侯曽先志曰此山有石㠶壁立臨川湧石亘山遙望芃芃有似張㠶也下有懸巖名爲射堂傳云仙人常射於此使白鶴取箭此是㑹稽東峯郡國志曰山上有草莖赤葉青人死覆之便活山海經曰㑹稽之山四方上多金玉下多碔砆上有禹冢及井天台山臨海記曰天台山超然秀出山有八重視之如一㠶髙一萬八千丈周廽八百里又有飛泉懸流千丈似布故登眞隱訣云此山有桐柏後四明東南三百里啓􅂪記注曰天台山去人不逺路經福溪溪水梁險清冷前有石橋路逕不盈尺長數十丈下臨絶􅄀之澗唯忘其身然後能濟濟者梯巖壁捫蘿􅁑之莖度得平路見天台山蔚然綺秀列􅀟嶺於青霄上有瓊樓玉閣天堂碧林醴泉仙物畢具晋隱士白道猷得過之獲醴泉紫芝靈藥神異經曰餘姚人虞洪入山採茗遇一道士牽三青羊引洪至天台瀑泉曰吾丹丘子也聞子善具飲常思見惠山中有大茗可以相給祈子他日有甌犧之餘不相遺也因立奠祀後常與家人往山獲大茗焉晉書曰許邁與}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_041-1b}
