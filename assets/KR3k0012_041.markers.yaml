  - {type: variant, offset: 1684, length: 0, content: '', krp: 九疑之南陸事寡而水事多王歆之神境記曰九疑是舜之葬處也有青澗中有黄色黄蓮花芳氣竟谷此山之表復有二峯望之乃似人形映出雲端如玉積髙於諸山頂有飛泉如帶舜廟在山之陽玉笥山福地記曰此山土地肥美冝糓辟兵又天監起居注云廬陵太守王希聃於此山}
  - {type: variant, offset: 1685, length: 0, content: '', SBCK: 淵􅀗劒二口大眞白􅀛山經曰夲名群玉山胚渾􅀄分此山積五色氣而成形覩􅀂群玉之􅃺皆虚無之貌浮焉至炰犧氏之時山乃堅實委地變爲五色遂號爲群玉山至夏殷之丗人多採其玉百靈慮損其山形遂化爲五色土石而生叢木今溪澗之中五色碧赤之石皆古玉變也玉笥山記曰漢武好仙察衆山之跡知此山爲靈感之司遂於山頂致降眞壇日夕祈禱天乃降白玉笥置壇上武帝遣使取至其壇側飄風大振卷玉笥而去因封爲玉笥山又漢武時邑民伐材於山爲廨館闕殿中梁一條邑民相謂曰欲精仙館在其梁棟未可以凢木爲之經數旬未獲忽一衣震雷風烈天降白玉梁一條光彩瑩目至今下有玉梁觀至魏武時遣人取之至其山}
  - {type: page-break, offset: 1685, content: '', id: KR3k0012_SBCK_041-10a}
  - {type: variant, offset: 1685, length: 0, content: '', WYG: 淵獲劍二口太真白龜山經曰本名羣玉山胚渾初分此山積五色氣而成形覩若羣玉之狀皆虚無之貌浮焉至庖犧氏之時山乃堅實委地變為五色遂號為群玉山至夏殷之世人多採其玉百靈慮損其山形遂化為五色土石而生之叢木今溪澗之中五色碧赤之石皆古變色玉笥山記曰漢武好仙察衆仙之迹知此山為靈感之司遂以山頂致降真壇日夕祈禱天乃降白玉笥置壇上武帝遣使取至其壇則飄風大振卷玉笥而去因封為玉笥山又漢武時邑民伐材於山為廨舘闕殿中梁一條邑民相謂曰欲精仙舘在其梁棟未可以凡木為之經數旬未獲忽一夜震雷風烈天降白玉梁一條光瑩耀目至今下有玉梁觀至魏武時遣人取之至其山}
