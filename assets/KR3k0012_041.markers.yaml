  - {type: variant, offset: 339, length: 2, content: 王屋, SBCK: 羅山諸仙人所遊之山也惡人不得妄上惡人上此}
  - {type: variant, offset: 339, length: 2, content: 王屋, WYG: 浮山從㑹稽來今浮山上猶有東方草木又曰鮑靚字子𤣥上黨人博究仙道為南海太守晝臨民政夜來羅浮山騰空往還裴淵廣州記曰羅山隠伏唯石樓一路時有閒逰者少得至山際大樹合抱極目視之如薺菜在地山之陽有一小嶺云蓬萊邊浮來者此因名號羅浮名山畧記曰羅浮}
