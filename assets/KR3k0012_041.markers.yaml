  - {type: variant, offset: 8, length: 0, content: '', SBCK: 􅀏而言賀汝壻來酒酣作樂劉阮忻怖交并至暮令各就一帳宿女往就之言聲清婉令人忘憂至十日後欲求還去女云君巳來是宿福所牽何復欲還耶遂留半年氣􅀱草木是春時百鳥鳴呼更懷土求歸甚苦女}
