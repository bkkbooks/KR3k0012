  - {type: variant, offset: 241, length: 1, content: 神, SBCK: 形故名之又曰上霄峯在山東南秦皇登之與霄漢相接因名之髙處有刻名之字大如掌背隱起焉僅百餘言又曰王敦誅術士吴猛附舡日行千里追者但見龍附其舡猛令舡人閇目人}
  - {type: variant, offset: 241, length: 1, content: 神, WYG: 内猶觀之掌焉傳有石井方湖足所未踐張野廬山記曰廬山天將雨則有白雲或冠峯巖或亘中嶺俗謂之山帶不出三日必雨潯陽記曰廬山頂上有一池水池中有三石鴈霜落則飛山北有五老峰於廬山最為峻極横隠蒼穹積石巖巉逈壓彭蠡其形勢逈如中虞鄉縣前五老之形故名之廬山記曰紫霄峯秦始皇曾登之與雲漢相接故名之髙處有禹刻大如掌背隱起焉又曰王敦誅術士吳猛附船日行千里追者但見龍附其船猛令船人閉目人}
