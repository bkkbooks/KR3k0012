  - {type: variant, offset: 1369, length: 0, content: '', SBCK: 舜所葬爲永陵在長沙零陵界秦始皇三十七年十一月行至雲夢望祀虞舜於九疑山漢書曰武帝元封五年南廵狩至於盛唐望祀虞舜於九疑山山海經曰南山蒼桐之丘蒼桐之淵其中有九淵焉舜之所葬在長沙零陵界湘中記曰九疑山在營道縣九山相似行者疑惑因名九疑盛弘之荆州記曰九疑山盤基數郡之界連峯接岫競逺争髙含霞卷霧分天隔日郡國志曰九疑山有九峯一曰丹朱峯二曰石城峯三曰樓溪峯形如樓四曰娥皇峯峯下有舜池池傍春月百鳥生􅆑人取之則迷路致本處可得還五曰舜源峯此峯最髙}
