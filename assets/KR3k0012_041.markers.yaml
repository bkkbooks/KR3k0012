  - {type: variant, offset: 1684, length: 0, content: '', SBCK: 九疑之南陸事寡而水事多王歆之神境記曰九疑是舜之葬處也有青澗中有黄色黄蓮花芳氣竟谷此山之表復有二峯望之乃似人形映出雲端如玉積髙於諸山頂有飛泉如帶舜廟在山之陽玉笥山福地記曰此山土地肥美冝􅂖辟兵又天監起居注云廬陵太守王希聃於此山}
  - {type: page-break, offset: 1684, content: '', id: KR3k0012_SBCK_041-9b}
  - {type: variant, offset: 1684, length: 0, content: '', WYG: 九疑之南陸事寡而水事多王歆之神境記曰九疑是舜之𦵏處也有青澗中有黄色黄蓮花芳氣盈谷此山之表復有一峯望之似人形暎出雲端如積玉髙扵諸山頂有飛泉如帶舜廟在山之陽玉笥山福地記曰此山地土肥美宜榖避兵又天監起居注云廬陵太守王希􅅨於此山之}
