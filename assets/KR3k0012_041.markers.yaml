  - {type: variant, offset: 204, length: 0, content: '', SBCK: 上有聚石又曰開成中髙修女眞侯仙姑絶􅂖六十餘年壽逾百歲常棲息此山入洞府獲覩徴祥又曰咸通中東海蓬萊觀龔道者􅀄入此山斷榖茹芝十餘年後因正月朔旦焚香洞門恍惚之間得入洞中經由一十三日備見洞府巖壁山川星辰日月靈異難詳又曰昔仙人捧一大石臨嶮峻是謂神設一人推之􅀂欲崩墜百人推之亦復如故眞誥曰中茅前一長嶺直抵大茅山後古多積金寳故因此著名貞白依東流水合神丹遺壇竈存疊玉峯大茅山東南三山積疊亦有洞穴俗多呼疊石石與玉猶爲同􅀋山作三角又呼三角山殊無影響今去􅁑仙翁壇相近廬山廬山記曰山髙二千三百六十丈周廻二千五十里東南三十二里張僧鑒㝷陽記云匡俗周武王時人屢逃徴聘結廬此山後登仙空廬尚在弟子等呼爲廬山又名匡山蓋稱其姓又接豫章匡俗字君孝父共鄱陽令吴芮佐漢定天下封俗鄱陽廬君兄弟七人皆好道術遂寓精爽於洞庭之山故丗謂廬山漢武帝南廵親見神靈封俗爲文明公一云匡俗漢人一云周武時人未知誰是逺法師廬山記曰山海經曰廬江天子都有匡俗先生者出自殷周之際隱遁避丗潜居其下或云俗受道於仙人而共遊其嶺遂記室懸岫即巖成館故時人謂其所止爲神仙之廬西南有石門似􅀟闕壁立千餘仞而瀑布流焉述異記曰廬山上有三石梁長數十丈廣不盈尺俯眄杳然無底咸康中江州刺史􅁃亮迎吴猛將弟子登山遊觀因過此梁見一老公坐桂樹下以玉杯承甘露與猛猛遍與弟}
