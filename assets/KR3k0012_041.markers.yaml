  - {type: variant, offset: 622, length: 509, content: 魚之難也太行牛之難也以德報怨人之難也水經注曰仲尼傷道不行欲北從趙鞅聞殺鳴犢遂旋車而反其後晉人思之於太行嶺南為之立廟蓋往時廻轅處也余案諸子書及史籍之文並言仲尼臨河而歎曰丘之不濟命也夫如是非太行廻轅之言也愽物志曰按太行山而北去亦不知山所限極處亦如東海不知所窮霍太山史記曰智伯攻趙襄子襄子懼乃奔保晉陽原過後至於王澤見三人自帶以上可見自帶以下不可見與原過竹二節莫通曰為我以是遺趙無恤原過既至以告襄子襄子齋三日親自剖竹有朱書曰趙無卹余霍太山徐廣曰在河東永安縣山陽侯天使也三月丙戍余將使汝反滅智氏亦立我百邑余將賜汝林胡之地滅智使原過主霍太山祠祀又曰飛廉先為紂作石槨徐廣曰作石椁於此方還無所報乃為壇於霍太山而報得石棺銘曰帝令處父不與殷亂賜汝石棺水經注曰霍太山上有飛廉冢山上有岳廟廟甚靈鳥雀不棲其林猛虎常守其庭此則禹貢嶽陽也唐書曰義旗初建高祖自太原起兵西赴闕中途經霍邑時隨將宋老生陳兵拒險義師不得進乃屯於賈胡堡會霖雨積旬餽運不給高祖患之忽有白衣老人詣軍門請見余霍山神也遣語大唐皇帝若向霍山東南傍山取路八日雨止我當助爾破之高祖初哂之遣人東南視果有微道高祖笑曰此神不欺趙襄子豈當負吾邪及八月己卯雨果霽高祖大悅以太牢祭其山首陽山詩曰采苓采苓, SBCK: ''}
