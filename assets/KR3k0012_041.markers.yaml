  - {type: variant, offset: 204, length: 0, content: '', WYG: 上有聚石又曰開城中髙修女真侯仙姑絶榖六十餘年夀逾百嵗帝嘗息此山洞入府獲覩徵祥又曰咸通中東海蓬萊觀龔道者初入此山㫁榖茹芝十餘年後因正月朔旦焚香洞門恍惚之間得入洞中經由一十三日備見洞府岩壁山川星辰日月靈異難詳又曰昔仙一人捧一大石臨險峻是謂神設一人推之若欲崩墜百人推之亦復如故真誥曰中茅前一長嶺直拄大茅山後古多積金寳故因此著名真白依東流水合神丹道壇竈存叠玉峰大茅山東南三山積叠亦有洞穴俗多呼叠石石與玉猶為同類山作三角又呼三角山殊無影響今去葛仙翁壇相近廬山廬山記曰山髙二千三百六十丈周迴二千五十里東南三十二里張僧鑿潯陽記云匡裕周武王時人屢逃徵聘結廬此山後登仙穹廬尚在弟子等呼為廬山又名匡山蓋稱其姓又按豫章匡裕字君孝共鄱陽令吳芮佐漢定天下封裕鄱陽廬君兄弟七人皆好道術遂寓精爽於洞之中故世謂廬山漢光武南廵時親見神靈封裕為文明公一云匡裕漢人一云周武時人未知誰是遠法師廬山記曰山海經曰廬江三天子都有匡裕先生者出自殷周之際隠遁避世潜居其下或云裕受道扵仙人而共逰其嶺遂記室懸岫即岩成舘故時人謂其所止為神仙之廬山南有石門似雙闕壁立千餘仞而瀑布流焉述異記曰廬山有三石梁長數千丈廣不盈尺俯盻杳然見底咸康中江州刺史庾亮迎吳猛擕弟子登山逰觀因過此梁見一老公坐住樹下以玉杯承甘露與猛猛遍與弟}
