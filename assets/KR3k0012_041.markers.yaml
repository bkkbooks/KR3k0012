  - {type: variant, offset: 1726, length: 3, content: 河水南, SBCK: 見宅基古塼瓦石皆異遂結庵居之長慶􅀄入都木坑偶見一宅重扉湏􅁷有一青衣童子招修通入見一人紫綬峩冠珮劒立堂之左一人碧綬素簡立堂之右童子曰左者蕭君右者梅君即梅福也通乃叩頭再拜求住修通好食小䔉二君子曰子乃葷腥之人安能住此賜修通嘉禾五穗松葉半斤令頓服之服之中半二君乃令歸精神似不足眼目睢盱門人相謂曰師修行不}
