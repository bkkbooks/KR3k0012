  - {type: variant, offset: 1397, length: 283, content: 于河其中多蒼王吉神泰逢司之是神好居於萯山之陽出入有光呂氏春秋曰夏后氏孔甲田于東陽萯山遇大風雨皇甫謐帝王世紀以為即東首陽山也蓋是山之殊目矣龍門山書禹貢曰浮于積至于龍門西河孔安國曰龍門在河東之西界也周禮曰大司樂以陰竹之管龍門之琴瑟陰竹生北於宗廟奏之九變則人鬼可得而禮孝經援神契曰禹鑿龍門闢伊闕決江開岷導四瀆鑿龍門以通河鑿岷山以開江導淮於桐柏導濟於王王屋故言導四瀆漢書地理志龍門山在馮翊夏陽縣北續漢書同辛氏三秦記曰河津一名龍門巨靈跡猶在去長安九百里江海大魚洎集門下數千不得上土則為龍故云曝鰓龍門尸子曰古者龍門未鑿呂梁未闢河出於孟門上慎子曰河之下龍門其流駛如竹箭駟馬追弗能及, SBCK: 廣南}
