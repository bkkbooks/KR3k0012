  - {type: variant, offset: 4, length: 0, content: '', SBCK: 羲之書云自山隂至臨海多有金庭玉堂仙人芝草異苑白㑹稽天台山遐逺自非忽生忘形不能躋也赤城阻其逕瀑布激其衢石有莓苔之嶮淵有不測之深幽明録曰漢明帝永平五年剡縣劉晨阮肇共入天台山取􅂖皮迷不得返經十餘日粮食之盡飢餒殆死遥望山上有一桃樹大有子實而絶巖􅃉澗了無登路攀􅁑乃得至噉數枚而飢止體充復下山持杯取水欲盥漱見蕪菁葉從山腹流岀甚鮮新復一杯流出有胡麻糝相謂曰此必去人徑不逺度山出一大溪溪邊有二女子姿質妙絶見二女人持盃岀便􅀏曰劉阮二郎捉向所失流杯來晨肇旣不識之二女便呼其姓如似有舊相見忻喜問來何晚􅁘因要還家家筒瓦}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_041-3a}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 羲之書云自山隂至臨海多有金庭玉堂仙人芝草異苑曰㑹稽天台山遐逺自非忽生忘形不能躋也赤城阻其逕瀑布激其衢石有莓苔之險淵有不測之深幽明録曰漢明帝永平五年剡縣劉晨阮肇共入天台山取榖皮迷不得返經十餘日糧盡飢餒殆死遥望山上有一桃樹大有子實而絶巖䆳澗了無登路攀葛捫蘿至上噉數枚而飢止體充復下山持杯取水飲步進漸見蕪菁葉從山腹流出甚鮮新復一杯流出有胡麻飯相謂曰此處去人徑不逺度山出一大溪溪邊有二女子資質妙絶見二女持杯出便笑曰劉阮二郎捉向所失流杯來晨肇既不識之二女便呼其姓如似有相見忻喜問來何晩耶遂同還家家皆瓦}
