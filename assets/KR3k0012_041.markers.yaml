  - {type: variant, offset: 9, length: 3, content: 太行王, SBCK: 當如何遂呼前來女子有三四十人集㑹奏樂共送劉阮指示還路旣出親舊零落邑屋全異無復相識問得七丗孫􅀓聞上丗入山迷不得歸孔靈符㑹稽記曰赤城山土色皆赤岩岫連沓狀似雲霞懸霤千仞謂之瀑布飛流灑散冬夏不竭山谷絶澗峥嶸無底長松蔓藟幽藹其上又曰赤城山内則有天台靈嶽玉室璿臺又曰天台山舊居五縣之餘地五縣者餘姚鄞句章剡始寜也孫綽天台山賦曰濟楢谿而直進落五界而迅征啓蒙記曰天台山石橋路徑不盈尺長數十歩至滑下臨絶溟之澗續捜神記曰㑹稽剡縣民􅀽栢桹碩二人獵經深山重嶺甚多見一群山羊六七頭遂經一石橋橋甚狹而峻羊玄桹等亦隨渡向絶崖崖正赤壁立名曰赤城上有水流下廣狹如疋布剡人謂之瀑布羊徑有山穴如門豁然而過旣入内甚平敞草木皆香有一小}
