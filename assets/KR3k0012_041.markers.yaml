  - {type: variant, offset: 330, length: 0, content: '', SBCK: 羅浮山記曰羅羅山也浮浮山也二山合體謂之羅浮在層城博羅二縣之境有羅水南流注于海舊說羅浮髙三千丈長八百里有七十二石室七十二長溪神湖神禽玉樹朱草相傳云浮山從㑹稽來今浮山上猶有東方草木又曰鮑静字子玄上黨人愽究仙道爲南海}
  - {type: variant, offset: 330, length: 7, content: 太素真人王君內, WYG: 羅浮山記曰羅羅山也浮浮山也二山合體謂之羅浮在層城博羅二縣之境有羅水南流流于海舊說羅浮髙三千丈長八百里有七十二石室七十二長溪神湖神禽玉樹朱草相}
  - {type: variant, offset: 330, length: 0, content: '', krp: 羅浮山記曰羅羅山也浮浮山也二山合體謂之羅浮在層城博羅二縣之境有羅水南流注于海舊說羅浮髙三千丈長八百里有七十二石室七十二長溪神湖神禽玉樹朱草相傳云浮山從㑹稽來今浮山上猶有東方草木又曰鮑静字子玄上黨人愽究仙道爲南海}
  - {type: variant, offset: 331, length: 3, content: 素真人, SBCK: 守晝臨民政夜來羅浮山騰空徃還裴淵廣州記曰羅山隱天唯石樓一路時有閑遊者少得至山際大樹合抱極目視之如薺菜在地山之陽有一小嶺云蓬萊邊山浮來著此因合號羅浮山名山略記曰羅浮山有阿育}
