  - {type: variant, offset: 14, length: 0, content: '', SBCK: 女子住中年皆十五六容色甚羙着青衣一名瑩珠見二人至忻然云早望汝來遂爲室家忽二女出行云復有得壻者往慶之曵􅄚於􅅸巖上行琅琅然二人思歸潜去歸路二女巳知追還乃謂曰自可去乃以一腕囊與桹語曰愼勿開也於是得歸後出行家人開其囊囊如蓮花一重去復一重至五盡中有小青鳥飛去桹還知此悵然而巳後桹於田中耕家依常餉之見在田中不動就視但有皮殻如蟬蛻也茅}
