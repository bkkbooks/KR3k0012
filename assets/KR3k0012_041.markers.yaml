  - {type: variant, offset: 3, length: 0, content: '', WYG: 千保於㑹稽史記曰始皇本紀曰三十七年上㑹稽祭大禹望于南海而立石刻頌秦徳九土文括畧曰禹禪此山一石穴委曲黄帝藏書於此禹得之孔靈之㑹稽志曰㑹稽山在縣東南其上石狀似覆釡禹夢𤣥夷㑹蒼水使却倚覆釡之上是也今禹廟在下秦始皇嘗配食此廟又曰山有石室云是仙人射堂東髙岩有射的石還望的的如射侯形圓視之如鏡士人常以占糓食貴賤射的明則米賤暗則米貴諺曰射的白斛一百射的𤣥斛一千夏侯曽先志曰此山有石帆壁立臨川湧石亘山遥望芃芃有似張帆也又有懸巖名為射堂傳云仙人常射於此使白鶴取箭此是㑹稽東峰郡國志曰山上有草莖赤葉青人死佩之便活山海經曰㑹稽之山四方上多金玉下多碔砆上有禹塜及井天台山臨海經曰天台山上超然出天山有八重視之如一帆髙一萬八千丈周迴八百里又有飛泉懸流千丈似布故登真隠訣云此山有桐栢繞四明東南三百里啓蒙記注曰天台山去人不逺路經福溪水險清泠前有石橋路逕不盈尺長數十丈下臨絶㝠之澗唯忘其身然後能躋躋者梯岩壁捫蘿葛之莖度得平路見天台山蔚然綺繡列雙嶺於青霄上有瓊樓玉閣天堂碧林醴泉仙物畢具晋隠士白道猷得過之獲醴泉紫芝靈藥神異經曰餘姚人虞洪入山採茗遇一道士牽三青羊引洪至天台瀑泉曰吾丹丘子也聞子善具飲常思見惠山中有大茗可以相給祈子他日有甌犧之餘不相遺也因立奠祀後常與家人往山獲大茗焉晋書曰許邁與}
