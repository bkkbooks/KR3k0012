  - {type: variant, offset: 3581, length: 617, content: 口六百萬以上舉種奉貢稱為臣僕輔上䟽曰臣聞詩云被狙者歧有夷之行傳曰歧道雖僻而人不遠詩人誦詠以為符驗今白狼王唐菆等慕化歸義作詩三章路經卭來山太零高坂峭危峻險百倍歧道繈負老幼若歸慈母遠夷之語辭意難正草木異種鳥獸殊類有犍為郡掾田恭與之習狎頗曉其言臣輒令訊其風俗譯其辭語今遣從事史李陵與恭護送詣闕并上其樂詩昔在聖帝舞四夷之樂今之所上庶備其一帝嘉之事下史官錄其歌焉東觀記載其歌并載夷人之本語並重譯訓詔為華言令范史所載者是也至和帝永元十二年旄牛徼外白狼樓薄蠻夷王唐繒等遂率種人十七萬口內屬樿國後漢書曰和帝永元九年樿國王雍由調遣使重譯奉國珍寶和帝賜金印紫綬安帝永寧初復遣使朝賀獻樂及幻人能變化吐火自支解易牛馬頭又善跳丸數乃至千自言我海西人海西即大秦也禪國西南通大秦明年元會安帝作樂於庭封雍由調為漢大都尉賜印綬金銀綵繒各有差牂柯後漢書曰初楚頃襄王時遣將莊豪從沆水伐夜郎軍至且蘭㭬舩於岸而步戰既滅夜郎因留王滇池以且蘭有㭬舩牂柯處乃改其名為牂柯異物志曰牂柯擊船戢也牂柯地多雨潦俗好巫鬼禁忌寡畜生又無蠶桑故其郡最貧句町縣有桄榔木可以為麵百姓資之又曰公孫述時牂柯大姓龍傳尹董氏與郡功曹謝暹保境為漢乃遣使從番禺江奉貢番禺江今南海郡光武嘉之並加褒賞桓帝時郡人尹珍自以生於荒裔不知禮義乃從汝南許慎應奉受經書學成還鄉里教授自是南域始有學焉永昌郡傳曰牂柯郡在建寧東北千二百里處所險峻率皆高山而少平地唐書曰牂柯蠻首領亦姓謝氏其地北去兗州一百五十里東至辰州二千四百里南至交州, WYG: ''}
  - {type: variant, offset: 3582, length: 2, content: 六百, SBCK: 勒石紀功而旋俘其王訶􅀺布失畢及郍利羯獵顚等献於社廟㝷以訶􅀺布失畢爲左武翊衛中郎將郍利以下授官各有差又曰先是太宗旣破􅀛兹移置安西都護府於其國城以郭孝恪爲都護兼統于闐踈勒碎葉謂之四鎮髙宗嗣位不欲廣地勞人復命有司弃􅀛兹等四鎮移安西依舊西州又曰長壽元年武威軍惣管王孝傑阿史郍忠節大破吐蕃克復􅀛兹于闐等四鎮自此復於􅀛兹置安西都護府用漢兵三}
