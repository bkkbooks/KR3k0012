  - {type: variant, offset: 2519, length: 742, content: 深百餘丈多大魚長一二丈頭持大遙視如載鐵釜狀李膺益州記曰卭都縣下有一老姥家貧孤獨每食輒有小虵頭上戴角在床間姥憐飴之後稍長大遂長丈餘令有駿馬虵遂吸殺之令因大忿恨令姥責出虵母云在床下令即掘地愈大而無所見令遷怒殺姥虵乃感人以靈言嗔令何殺我母當為母報讎此後每夜輒聞若風四十許日百姓相見咸驚語汝頭郍忽戴魚是夜方四十里與城一時俱陷為湖土人謂之為陷河唯姥宅無恙訖今猶存漁人採捕必依止宿每有浪輒居宅側恬靜無他風靜水清猶見城郭樓櫓畟然畟者測今水淺時土人沒水取得舊木堅貞光黑如漆好事者以為枕相贈焉莋漢書曰自嶲以東北君長以十數莋都最大其俗或土著或移徒後漢書曰莋都夷者武帝所開以為莋都縣其人被髮左袵言語多好譬類居處略與汶山夷同土出長年神藥仙人山圖所居焉元鼎六年以為沉黎郡至天漢四年并蜀為西部置兩部尉一居旄牛主徼外夷一居青衣主漢人嶲漢書曰桐師以東北至葉榆名為嶲昆明編髮隨畜遷徙無常處無君長地方可數千里永昌郡傳曰越嶲郡在建寧西北千七百里治江都縣自建寧高山相連至川中平地東西南北八千餘里郡特好桑蠶宜黍稷麻稻梁冉駹漢書曰自荏以東北君長以十數冉駹最大其俗或著土或移徙後漢書曰冉駹夷者武帝所開元鼎六年以為汶山郡今蜀郡西北通化郡地也至宣帝地節三年夷人以立郡賦重帝乃省并蜀郡為北部都尉其山有六夷七羗九氐各有部落其王侯頗知文書而法俗嚴重貴婦人黨母族死則燒其尸土氣多寒雖在盛夏水猶未釋皆依山居止累石為室高者至十餘丈為卭籠今彼土夷人呼為雕又土地剛鹵不生穀粟麻菽唯以夌為資而宜畜牧有旄牛無角一名犝牛肉重千斤毛可為毦犝徒冬切毦音貳出名馬有羚羊羚音靈可療毒又有食藥鹿鹿麑有胎者其腸中糞亦療毒疾又有五角羊麝香輕毛毼鷄猩猩其人能作旄氈班罽青頓毞毲羊羧之屬青頓毞毲並未詳字書無二字特多雜藥地有鹹土煮以為鹽麡羊牛馬食之皆肥麡音子兮切其西又有三河槃, SBCK: ''}
