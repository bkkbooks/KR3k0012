  - {type: variant, offset: 4608, length: 542, content: 珠璣瑇瑁象齒文犀翠羽箘鶴短狗為獻永昌郡傳曰雲南郡在建寧南四十五里治雲南縣亦多夷濮分布山野千五百人女大小蹲踞道側皆持數種器杖時寇鈔為郡邑之害尾濮永昌郡傳曰郡西南千五百里徼外有尾濮尾若龜形長三四寸欲坐輒先穿地空以安其尾若邂逅誤折尾便死男女長各隨宜野會無有嫁娶猶知識母不復別父俗云貸老相食則此濮也古人所說非目見也扶南土俗傳曰枸利東有蒲羅中人人皆有尾長五六寸其俗食人按其地並西南蒲羅蓋尾濮之地名梁祚魏國統曰西南有夷名曰尾濮其地出瑇瑁犀象珠璣金銀葛越桂木人皆蠻夷重譯乃通也木綿濮郭義恭廣志曰木綿濮土有木綿樹多葉又房甚繁房中綿如蚕所作其大如捲音拳文面濮廣志曰文面濮其俗劖面而以青畫之劖音讒折腰濮廣志曰折腰濮其俗生子皆折其腰赤口濮廣志曰赤口濮在永昌南其俗折其齒劖其脣使赤又露身無衣服墨𤏡濮廣志曰墨𤏡濮在永昌西南山居耐勤苦其衣服婦人以一幅布為裙或以貫頭丈夫以穀皮為衣其境出白蹄牛犀象武魄金銅華布朱提永昌郡傳曰朱提郡在犍為南千八百里治朱提縣川中縱廣五六十里有大泉池水須名千頃池又有龍池以灌溉種稻與道接時多援取鳴嘯於行人徑次聲聒人耳夷分布山谷間食肉衣皮雖有人形禽獸其心言語服飾不與華同有堂狼山山多毒草盛夏之月飛鳥過之不能得去又曰建寧郡朱提之東南六百里土氣和適盛夏之月熱不鬱述猛冬時寒慘慄又曰永昌郡在雲南西, SBCK: 攻玉太平御覽卷第}
