  - {type: variant, offset: 5413, length: 1031, content: 月遣使朝貢貞觀十九年四月右武侯將軍梁建方討蠻降其部落七十二戶力九千三百西唐書曰西方南寧之渠帥也自云本河東安邑人也七世祖仕晉為南寧太守屬中國亂遂王蠻夷梁元帝時南寧州刺史徐文盛徵詣荊州有瓚者遂據南寧之地延袤二千餘里俗多華民饒駿馬明珠犀象瓚死有二子震翫分統其眾隋開皇初遣使朝貢文帝遣韋世冲將兵鎮之折置恭州恊州昆州未幾復叛後遣史萬歲擊之所至皆破踰西洱河臨滇池而還翫懼而來朝文帝誅之諸子沒為官奴不收其地因與中國絕高祖受禪拜翫子弘達為昆州刺史令持其父屍歸葬本鄉益州叚綸又遣俞大施至南寧諭其部落悉來歸款自是朝貢不絕東女國唐書曰東女國西羗之別種以西海中復有女國故稱東女焉俗以女為王東與茂州黨項接東南與雅州接隔羅女蠻及白狼夷其境東西九日行南北二十日行有大小八十餘城王所居名康延川中有弱水南流用牛皮為舩以渡四萬眾勝兵万餘人散在山谷女王號為賓就有女官曰高霸平議國事在外官僚並男夫為之其王侍女數百人五日一聽政令王若死國中多歛金錢動至數万更於王族求令女二人而立之大者為王其次為小王若大王死即小王嗣立或姑死而婦繼無有篡奪其所居皆起重層屋王至九層國人至六層其王服青毛綾裙下領衫上披青袍其袖委地冬則羔裘飾以紋錦為小鬟飾之以金耳垂璫足履索𩍜俗重婦人而輕丈夫文字同於天竺以十一月為正又曰東女國其俗每至十月令巫者齎肴詣山中散糟夌於空大呪呼鳥俄而有鳥如雞飛入巫者之懷因剖腹而視之每有一穀來歲必登若有霜雪必多災異其俗信之名為鳥卜其居喪服飾不改為父母則三年不櫛沐貴人死者或剝其皮而藏之內骨於缾中楺以金屑而埋之國王將葬其大臣親屬殉死者數十人隋大業中蜀王秀遣使招之拒而不受武德中女王國歛臂鈴湯湯傍氏始遣使貢方物高祖厚資遣之又曰垂拱二年東女國王歛臂遣大臣湯劍石來朝仍請官號則天冊拜歛臂為左玉鈴衛將軍仍以瑞錦製蕃服以賜之天授三年其王俄琰兒來朝開元二十九年十二月其王趙曳夫遣子獻方物命有司宴于曲江令宰臣已下同宴又封曳夫為歸昌王賜其子帛放還復以男子為王貞元九年七月其王湯立悉與寄鄰國王董臥度白狗國王羅陁忽逋租國王弟鄧吉知南水國蘇唐磨咄霸國王董藐蓬各率其種落詣劍南西川內附其哥鄰等國皆散居山川弱水王即國初女國之弱水部落其悉董國在弱水西故亦謂之弱水西悉董王舊皆分隸邊郡祖父例授將軍中郎果毅等官自中原多故皆為吐番所役屬其部大者不過三二千戶各置縣令十數人理之土有絲絮歲輸於吐蕃至是悉與之同盟相率獻款兼齎天寶中國家所賜官告共三十九通以進西川節度使皋處其眾於維霸保等州給以種糧耕牛咸樂生業立悉等數國王自來朝召見於麟德殿授官賞各有差, SBCK: ''}
