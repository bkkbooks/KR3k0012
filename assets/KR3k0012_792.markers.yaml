  - {type: variant, offset: 198, length: 0, content: '', SBCK: 征和中貳師將軍李廣利以軍降匈奴帝旣悔於征伐而捜粟都尉桑弘羊與丞相御史奏言故輪臺以東捷枝渠梨皆故國也輪臺渠地名今在交河北庭界廣饒水草有漑田五千頃以上處温和田美可益通溝渠種五榖與中國同時熟田一歳有積榖募人壯徤有累重敢徙者詣田所累重謂妻子家属也就畜積爲本業墾漑田稍築列亭連城西以威西國帝􅀷陳旣徃之悔乃下詔曰前有司奏欲益人賦三十助邊用每口取錢三十是重困老弱􅀌獨也由是不復出軍而封丞相車千秋爲冨民侯以明休息思冨飬人也後漢書曰西羗之本出自三苗盖羗姓之別其國近南嶽及舜流四凶徙之三危河􅀜之西南羗地是也濵於賜支至於河首綿地千里賜支者禹貢所謂析支者也南接蜀漢所居無常依隨水草地少五榖以産牧爲業其俗人民氏族無定或以父名母姓爲種號三二丗後相與㛰姻父没則妻後母兄亡則納􅄔嫂寡嫂日􅄔故國無鰥寡種􅀋繁熾不立君臣無相長一強則分種爲角酋豪弱則爲附落更相抄暴以力爲雄殺人償死無他禁令其兵長在山谷短於平地不能持乆而果於觸突以戰死爲吉利病終爲不祥甚耐寒苦同之禽獸雖婦人産子亦不避風雪性堅固勇猛得西方金行之氣焉王政修則賔服德教失則㓂亂又曰昔夏后氏太康失國四夷背叛及后相即位乃征畎夷七年然後來賔又曰武乙􅁀虐犬戎㓂邊周古公踰梁山而遊于歧下及子季歷遂伐西落􅀑戎又曰文王爲西伯西有昆夷之患北有獫狁之難遂攘戎狄西戎之國莫不賔服又曰穆王時戎狄不貢王乃西征犬戎獲其五王又得四白鹿四白狼王遂遷戎于太原又曰平王之末自隴山以東及乎伊洛徃徃有戎於是渭有狄䝠䝠音邽兾之戎涇北有義渠之戎洛川有大荔之戎渭南有驪戎伊洛間有楊拒泉臯之戎潁川以西有蠻氏之戎又曰晉文公欲修霸業乃賂戎狄通道以扶王室􅁗穆公得戎人由余遂霸西戎開地千里又曰陸渾之戎叛晉晉令荀吴㓕之楚執蠻氏而盡囚其民又曰周貞王八年􅁗厲公㓕大荔取其地趙亦㓕代戎代戎即地戎也韓魏復共稍并伊洛隂戎滅之其遺脫者皆迯奔西踰汧隴自是中國無戎宼後漢書曰武帝時西域内屬有三十六國漢爲置使者校尉領護之宣帝改曰都護元帝又置戊巳校尉屯田於車師漢官儀曰戊巳中央鎮覆四方也哀平間自相分割爲五十五國又曰}
