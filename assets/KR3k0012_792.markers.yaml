  - {type: variant, offset: 3579, length: 1, content: 餘, krp: 里王姓白即後凉吕光所立白震之後其王頭繫綵帶垂之於後坐金師子床又曰出細氈饒銅䥫鈆麋皮氍毹沙塩緑雌黃胡粉安息香等又曰其國北大山中有如膏者流岀成川行數里入地狀如醍醐服之髪齒巳落者能令更生癘人服之皆愈唐書曰龜兹有城郭男女皆剪髪垂與項齊唯王不剪髪以錦蒙頂着錦𫀆金寳帶坐金師子床有良馬封牛饒蒲萄酒又曰貞觀四年遣使來獻馬太宗賜以璽書撫慰甚厚自此朝貢不絶又曰貞觀二十年太宗遣左驍衛大將軍阿史郍杜尓安西都護郭孝恪率五將軍發䥫勒十三部兵以伐龜兹禽其王及大將羯獵顚等并破其大城五所虜男女數}
