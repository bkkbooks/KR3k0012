  - {type: variant, offset: 4438, length: 0, content: '', krp: 太宗以其地逺禮之甚厚復遣衛尉丞李義表報使尸羅逸多遣大臣郊迎傾都邑以縱觀焚香夾道逸多率其臣下東面拜受勑書復遣使獻大珠及鬰金香菩提樹又曰貞觀十年沙門玄奘至其國將𣑽本經論六百餘部而歸先是遣右率府長史王玄䇿徃使天笁其四天笁王咸遣使朝貢㑹中天竺王尸羅逸多死國中大亂其弟阿羅郍順篡立乃盡發胡兵以拒玄䇿玄䇿戰}
  - {type: variant, offset: 4439, length: 3, content: 絕臨海, SBCK: 敵乃抜身宵遁走至吐蕃發精銳一千二百人并埿婆羅國七千餘􅀐以從玄䇿與副使蔣師仁率二國兵進至中天笁國城連戰三日大破之斬首三千餘級赴水溺死者且萬人阿羅郍順弃城而遁師仁進兵擒獲之虜男女萬二千人牛馬三萬餘頭疋於是天笁震懼俘阿羅郍順以歸二十二年至京師太宗大恱命有司告宗廟因謂群臣曰夫人耳目玩於聲色口鼻躭於臭味此乃敗德之源􅀂婆羅門不劫掠我使人豈爲俘虜邪昔中山以貪寳取弊蜀侯以金牛致㓕莫不由之拜玄䇿朝散大夫是時就其國得方士郍羅邇婆寐自言壽二百歳云有長生之術太宗􅀷加禮待館之於金颷門内造延年之藥令兵部尚書崔敦禮監主之發使天下採諸竒藥藥成竟服不效後放還本國又曰開元八年南天竺國遣使獻五色能言鸚鵡}
  - {type: page-break, offset: 4439, content: '', id: KR3k0012_SBCK_792-10b}
