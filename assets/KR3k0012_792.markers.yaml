  - {type: variant, offset: 3259, length: 321, content: 河槃于虜北有黃石北地盧水胡其表乃為徼外後靈帝時復分蜀郡北部為汶山郡白馬漢書曰蜀之西冉駹以東北君長以十數白馬最大皆氐類也後漢書曰白馬氐者武帝元鼎中分開廣漢西部合以為武都土地險阻有麻田出名馬牛羊漆密氐人勇戇抵冒貪貨死利居於河池一名仇池方百頃四面斗絕數為邊寇郡縣討之則依固自守元封三年氐人反叛遣兵破之昭帝元鳳中氐人復叛執金吾馬適建姓馬適名建等將三輔太常徙討破之建武初氐人悉附隴蜀反隗囂滅其酋豪乃背公孫述降漢馬援上復其王侯君長賜以印綬後囂族人隗茂反殺武都太守氐人大豪齊鍾留為種類所敬信威服諸豪與郡丞孔奮繫茂破斬之白狼夷後漢書曰永平中益州刺史梁國朱輔好立功名慷慨有大略在州數歲宣示漢德威懷遠夷自汶山以西前代所不至正朔所不加白狼槃木唐菆等百餘國戶百三十餘, WYG: ''}
