  - {type: variant, offset: 1912, length: 990, content: 夷置郡縣徙呂氏以充之因置不韋縣斬獲甚眾諸夷悉平又章帝元和中蜀郡王阜為太守政化尤異有神馬四疋出滇池中蜀志曰後主建興二年諸葛亮率眾南征所戰皆捷孟獲者為夷所服募生致之既得使觀於營陣之間問曰此軍何如獲曰不知虛實故敗定易勝耳亮縱之使更戰七擒而亮猶遣獲獲止不去曰公天威也南人不復反矣遂至滇池南中皆平卭漢書曰自滇以北君長以十數卭都最大皆椎髻耕田有邑聚後漢書曰卭都夷者武帝開以為卭都縣無幾而地陷為汙澤因名為卭池南人以為卭河其後復反叛元鼎六年漢兵自越嶲水伐平之以為越嶲郡其郡土地平原有稻田俗多遊蕩而喜謳歌略與牂柯相類豪帥放縱難得制御王莽時郡守枚根枚根太守姓名也調卭人長貴以為軍侯更始二年長貴攻殺根自立為卭穀王至光武因就封之授越嶲太守印綬後劉尚擊益州夷路由越嶲長貴聞之疑尚既定南邊威法必行己不得自放縱即聚兵招呼諸君長多釀毒酒欲先以勞軍因襲擊尚尚知其謀即分兵先據卭都遂掩長貴誅之徙其家屬於成都又曰安帝時永昌益州蜀郡夷並今雲南郡也皆叛眾十餘萬破壞二十餘縣益州刺史張喬乃遣從事楊竦將兵至楪榆破之渠帥三十六種皆來降附竦因奏長吏姦猾侵犯蠻夷者九十人皆減死論又曰永平中卭都太守巴郡張翕政化清平得夷人和在郡十七年卒夷人愛慕如喪父母蘇祁斯人叟二百餘人齎牛羊送喪至翕本縣起墳祭祀詔書嘉美為立祠堂後夷人反亂天子以翕有遺愛乃拜其子湍為太守夷人歡喜皆奉迎道路曰郎君儀貌類我府君後湍頗失其心有欲叛者諸夷耆老相曉語曰當為先府君故遂得以安南中八郡志曰卭河縱廣二十里深百餘丈多大魚長一二丈頭持大遙視如載鐵釜狀李膺益州記曰卭都縣下有一老姥家貧孤獨每食輒有小虵頭上戴角在床間姥憐飴之後稍長大遂長丈餘令有駿馬虵遂吸殺之令因大忿恨令姥責出虵母云在床下令即掘地愈大而無所見令遷怒殺姥虵乃感人以靈言嗔令何殺我母當為母報讎此後每夜輒聞若風四十許日百姓相見咸驚語汝頭郍忽戴魚是夜方四十里與城一時俱陷為湖土人謂之為陷河唯姥宅無恙訖今猶存漁人採捕必依止宿每有浪輒居宅側恬靜無他風靜水清猶見城郭樓櫓畟然畟者測今水淺時土人沒水取得舊木堅貞光黑如漆好事者以為枕相贈焉莋漢書曰自嶲以東北君長以十數莋都最大其俗或土著或移徒後漢書曰莋都夷者武帝所開以為莋都縣其人被髮左袵言語多好譬類居處略與汶山夷同土出長年神藥仙人山圖所居焉元鼎六年以為沉黎郡至天漢四年并蜀為西部置兩部尉一居旄牛主徼外夷一居青衣主漢人嶲漢書曰桐師以東北至葉榆名為嶲昆明編髮隨畜遷徙無常處無君長地方可, WYG: ''}
