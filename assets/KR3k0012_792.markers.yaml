  - {type: variant, offset: 5219, length: 192, content: 縣縱經千里皆有瘴氣蒜穀雞豚魚酒不可食皆食啖病害人郡北三百有盤江廣數百步深十餘丈此江有毒瘴九縣之人皆號曰鳩民言語嗜慾不與人同鳩民咸以三尺布角割作兩襜不復加鍼縷之功也廣頭著前狹頭覆後不蓋其形與裸身無異昆彌國唐書曰昆彌國一曰出昆明西南夷也在爨之西洱河為界即葉榆河其俗與突厥略同相傳云雲與匈奴本是兄弟國也漢武帝得其地入益州部其後復絕諸葛亮定南中亦所不至武德四年嶲州治中吉弘使南寧因至其國諭之至, SBCK: ''}
