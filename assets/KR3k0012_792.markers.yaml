  - {type: variant, offset: 198, length: 0, content: '', WYG: 征和中貳師將軍李廣利以軍降匈奴帝既悔逺征伐而捜粟都尉桑𢎞羊與丞相御史奏言故輪臺以東㨗枝渠犁皆故國地輪臺渠犂地名今在交河北庭界廣饒水草有溉田五千頃以上處溫和田美可益通溝渠種五糓與中國同時熟田一嵗有積糓募人壯徤有累重敢徙者詣田所累重謂妻子家屬也就畜積為本業墾溉田稍築列亭連城而西以威西國陳既往之悔帝乃下詔曰前有司欲益民賦三十助邊用每口取錢三十是重困老弱孤獨也由是不復出軍而封丞相田千秋為富人侯以明休息思富養人也後漢書曰西羗之本出自三苖盖姜姓之别其國近南嶽及舜流四凶徙之三危河關之西南荒地是也濵於賜支至於河首綿地千里賜支者禹貢所謂析支者也南接蜀漢所居无常依隨水草地少五榖以産牧為業其俗人民氏族无定或以父名母姓為種號十二世後相與婚姻父沒則妻後母兄亡則納嫠嫂寡嫂曰嫠故國旡鰥寡種類繁熾不立君臣旡相長一強則分種為酋豪弱則為人附落更相抄暴以力為雄殺人償死无他禁令其兵長在山谷短於平地不能持久而果於觸突以戰死為吉利病終為不祥甚耐寒苦同之禽獸雖婦人産子亦不避風雪性堅固勇猛得西方金行之氣焉王政修則賔服徳教失則㓂亂又曰昔夏后氏太康失國四夷皆叛及后相即位乃征畎夷七年然後來賔又曰武乙暴虐犬戎㓂邊周古公踰梁山而逰於岐下及子季歴遂伐西落鬼戎又曰文王為西伯西有昆夷之患北有獫狁之難遂攘戎狄西戎之國莫不賔服又曰穆王時戎狄不貢王乃西征犬戎獲其五王又得四白鹿四白狼王遂遷戎于太原又曰平王末自隴山以東及乎伊洛徃徃有戎於是渭首有狄豲邽冀之戎涇北有義渠之戎落川有大荔之戎渭驪戎伊間有楊拒原臯之戎西有蠻氏之戎又曰晉文公欲修覇業乃賂戎狄通道以扶王室秦穆公得戎人由余遂覇西戎開地千里又曰陸渾之戎叛晉令荀吳滅之楚執蠻氏而盡囚其民又曰周貞王八年秦厲公滅大荔取其地趙亦滅代戎代戎即北戎也韓魏復攻稍并伊洛隂戎滅之其遺脫者皆逃奔西踰汧隴自是中國無戎冦後漢書曰武帝時西域内屬有三十六國漢為置使者校尉領護之宣帝改曰護元帝又置戊巳校尉屯田於車師漢官儀曰戊巳中史鎮覆四方也哀平間自相分割為五十五國又曰}
