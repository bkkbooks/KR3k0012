  - {type: variant, offset: 3839, length: 2, content: 譯奉, krp: 白色有文字或善天文筭暦之術其人皆學悉曇章書於貝多葉樹之北史曰天竺}
  - {type: variant, offset: 3842, length: 335, content: 珍寶和帝賜金印紫綬安帝永寧初復遣使朝賀獻樂及幻人能變化吐火自支解易牛馬頭又善跳丸數乃至千自言我海西人海西即大秦也禪國西南通大秦明年元會安帝作樂於庭封雍由調為漢大都尉賜印綬金銀綵繒各有差牂柯後漢書曰初楚頃襄王時遣將莊豪從沆水伐夜郎軍至且蘭㭬舩於岸而步戰既滅夜郎因留王滇池以且蘭有㭬舩牂柯處乃改其名為牂柯異物志曰牂柯擊船戢也牂柯地多雨潦俗好巫鬼禁忌寡畜生又無蠶桑故其郡最貧句町縣有桄榔木可以為麵百姓資之又曰公孫述時牂柯大姓龍傳尹董氏與郡功曹謝暹保境為漢乃遣使從番禺江奉貢番禺江今南海郡光武嘉之並加褒賞桓帝時郡人尹珍自以生於荒裔不知禮義乃從汝南許慎應奉受經書學成還鄉里教授自是南域始有學焉永昌郡傳曰牂柯郡在建寧東北千二百里處所險峻率皆高山而少平地唐書曰牂柯蠻首領亦姓謝氏其地北, SBCK: ''}
