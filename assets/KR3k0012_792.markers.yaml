  - {type: variant, offset: 3838, length: 0, content: '', krp: 天竺問佛道法遂行於中國圖畫形象焉南史曰梁天監𥘉王來貢獻王有螺髻於頂餘剪之穿耳垂璫俗多徒跣衣}
