  - {type: variant, offset: 442, length: 206, content: 道指牂柯江蜀人司馬相如亦言西夷邛莋可置郡使相如以中郎將往諭皆如南夷為置一都尉十餘縣屬蜀後數歲道不通士罷餓餧離暑濕死者甚眾西南夷又數反發兵興擊耗費亡功上患之使公孫弘往視問焉還報言其不便上許之罷西夷獨置南夷兩縣一都尉稍令犍為自保就令自保守且脩成其鄉縣也夜郎侯始倚南粵南粵反已滅還誅反者夜郎遂入朝上以為夜郎王又曰昭帝始元中牂柯談指同並等二十四邑凡三萬餘人皆反並音伴談指同並後皆為縣屬漢牂柯郡遣水衡郡都尉發蜀郡犍為兵擊破, SBCK: 是}
