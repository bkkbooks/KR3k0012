  - {type: variant, offset: 1639, length: 7, content: 滇郡有池周回二, SBCK: 于闐國王治西域去長安九千六}
  - {type: variant, offset: 1639, length: 272, content: 滇郡有池周回二百餘里水源深而末更淺狹有似倒流故謂之滇池河土平敞多出鸚鵡孔雀有鹽池田漁之饒金銀畜產之富人俗豪俠居官者皆富及累代及王莽政亂益州郡夷棟蚕若豆等起兵殺郡守越嶲姑復夷人大牟亦皆叛莽遣寧始將軍廉丹發巴蜀吏人卒徒十萬擊之連年不剋而還以廣漢文齊為太守群夷始得其和及公孫述據益土齊固守拒險聞光武即位乃聞道遣使自聞蜀平徵為鎮遠將軍封成義侯於道卒詔為起祠堂郡人立廟祠之又曰建武十八年夷渠帥棟蚕與姑復弄揀揲榆連然滇池建怜昆明諸種反叛遣武威將軍劉尚發卒擊之尚軍渡瀘水入益州界群夷皆棄壘奔走尚進軍連戰皆破之追至不韋孫盛蜀譜曰初秦徙呂不韋子弟宗族於蜀漢武開西, WYG: 天竺國一名身毒在月底東}
  - {type: variant, offset: 1639, length: 7, content: 滇郡有池周回二, krp: 于闐國王治西域去長安九千六}
