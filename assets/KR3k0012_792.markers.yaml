  - {type: variant, offset: 3575, length: 1, content: 戶, SBCK: 中山出九色次玉石一曰青二曰赤三曰黃四曰白五曰黒六曰緑七曰紫八曰紅九曰紺多神􅀛朱鬣馬玄熊赤白黒黃青縁紺縹紅紫十種瑠璃通典曰國之西南漲海中可七八}
  - {type: variant, offset: 3575, length: 1, content: 戶, krp: 中山出九色次玉石一曰青二曰赤三曰黃四曰白五曰黒六曰緑七曰紫八曰紅九曰紺多神龜朱鬣馬玄熊赤白黒黃青縁紺縹紅紫十種瑠璃通典曰國之西南漲海中可七八}
  - {type: variant, offset: 3577, length: 0, content: '', SBCK: 里行到􅃢瑚淵水底有盤石􅃢瑚生其上大􅁗人常乗大舶載䥫網令工没先入視之可下綱乃下􅀄生白而漸漸似薗生茅中歷歳許出網目間變作黃色枝條交錯髙極}
  - {type: variant, offset: 3577, length: 0, content: '', krp: 里行到珊瑚淵水底有盤石珊瑚生其上大秦人常乗大舶載䥫網令工没先入視之可下綱乃下𥘉生白而漸漸似薗生茅中歷歳許出網目間變作黃色枝條交錯髙極}
  - {type: variant, offset: 3578, length: 0, content: '', SBCK: 四尺大者圍尺餘三年色乃赤好後没視之知可採便以䥫鈔發其根乃以索繫網使人於舶上絞車舉去還國理載恣意所作􅀂失時不舉便蠧敗􅀛兹􅀛音丘兹音茨北史曰􅀛兹國在尉犁西北白山之南一百七}
  - {type: variant, offset: 3578, length: 0, content: '', krp: 四尺大者圍尺餘三年色乃赤好後没視之知可採便以䥫鈔發其根乃以索繫網使人於舶上絞車舉去還國理載恣意所作若失時不舉便蠧敗龜兹龜音丘兹音茨北史曰龜兹國在尉犁西北白山之南一百七}
  - {type: variant, offset: 3579, length: 1, content: 餘, SBCK: 里王姓白即後凉吕光所立白震之後其王頭繫綵帶垂之於後坐金師子床又曰出細氈饒銅䥫鈆麋皮氍毹沙塩緑雌黃胡粉安息香等又曰其國北大山中有如膏者流岀成川行數里入地狀如醍醐服之髪齒巳落者能令更生癘人服之皆愈唐書曰􅀛兹有城郭男女皆剪髪垂與項齊唯王不剪髪以錦􅂪頂着錦􅂁金寳帶坐金師子床有良馬封牛饒蒲萄酒又曰貞觀四年遣使來獻馬太宗賜以璽書撫慰甚厚自此朝貢不絶又曰貞觀二十年太宗遣左驍衛大將軍阿史郍杜尓安西都護郭孝恪率五將軍發䥫勒十三部兵以伐􅀛兹禽其王及大將羯獵顚等并破其大城五所虜男女數}
