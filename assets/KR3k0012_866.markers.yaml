  - {type: variant, offset: 982, length: 992, content: 息毀不滅性故當不進肴羞耳如何絕鹽吾今亦不食矣慰祖不得已從之梁書曰侯景陷臺城宴集其黨又召僧通僧通取肉搵鹽以進景問曰好不景荅所恨大鹹僧通曰不鹹則爛及景死王僧辨截其二手送齊宣又傳首往江陵果以鹽五斛置腹中送于建康暴之于市百姓爭取屠膾羹食皆盡後魏書曰世祖南伐遺李伯賜劉義恭等鹽各九種并胡豉孝伯曰有後詔凡此諸鹽各有所宜白鹽食鹽主上自所食黑鹽治腹脹氣滿末之六銖以酒下胡鹽治目痛戎鹽治諸瘡赤鹽駮鹽臭鹽馬齒鹽四種並非食鹽又曰忽吉國水氣鹹凝鹽生樹上又曰沮渠蒙遜平酒泉於宋繇室得書數千卷鹽米數十斛而已蒙遜歎曰孤不喜剋李氏欣得宋繇耳北齊書曰房景伯母亡居喪不食鹽菜因此遂為水病積年不愈又曰崔暹奏請海沂煮鹽有利軍國文襄以問崔昂昂曰亦既官煮斷之竈官力雖多不及人廣諸淮開市薄為竈稅私館給彼此有宜朝廷從之唐書曰武德中長安古城鹽渠水生鹽色紅白味甘狀如方印又曰左右神策鹽州行營節度使胡堅昌皆表奏初城鹽州鹵中獲壤土又置烽堡水路廻遠即時有雨廢鹽并悉生鹽事扶聖德可謂天讚請宣付史館制可又曰代宗時河中府鹽池生瑞鹽韓滉奏曰土德之瑞又曰李晟薨後德宗以初城鹽州復鹽池上賜宰相新鹽惻然思之命置鹽於靈座又曰流鬼國去京師萬五千里邊於北海多沮澤有魚鹽之利又曰初搉鹽起於第五琦及劉晏代其任法術精密官無遺利初歲入錢六十萬貫季歲十倍而人無厭苦大曆末通計一歲征賦所入而鹽醝當天下太半之賦管子曰齊有渠之鹽燕有遼東之煮十口之家十人䑛鹽百口之家百人舐鹽凡食鹽之數一月丈夫五升少半婦人三升少半嬰兒二升少半鹽之重升加分耗而釜百升加什耗而釜千君伐沮薪煮浦水為鹽正而積之三萬鍾至陽春農事方作令民無得築垣牆毋得繕冢墓大夫無得治宮室臺榭北海之眾無得聚庸而煮鹽然鹽之價必四什倍君以四什之賈循河濟之流南輸梁趙宋衛濮陽惡食無鹽則腫守圉之本其用鹽獨重君伐菹薪煮沛水以籍於天下然則天下不減矣又曰桓公成鹽三萬六千鍾令吏糴之得成金萬一千餘斤尸子曰南海之輦北海之鹽魯連子曰連宿沙瞿子善煮鹽使煮潰沙雖十宿不能得也抱朴子曰作赤鹽法用寒鹽一斤雨泥一斤內鐵器中以為水燒皆消而赤也金樓子曰白鹽小小峰洞激如有水精及其映日光似琥珀胡人扣之以供國廚名為君王鹽亦名玉華鹽又曰有清池鹽正四方廣半寸其形挾踈似有人耕池旁地取池水波種之去勿廻顧即生此鹽國語曰桓公通齊國之魚鹽于東萊言通者先時禁人東萊齊之東萊夷也山海經曰景山南望鹽皈或無皈字敗之池北望少澤其草多藷藇秦菽其陰多頳其陽多玉郭景純云鹽敗澤即解縣鹽池也呂氏, SBCK: ''}
