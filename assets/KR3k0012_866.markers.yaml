  - {type: variant, offset: 2537, length: 627, content: 月望收之者使者具陳鹽奉王急命故非時爾因問紫鹽磬碧珀云中路遭北涼所奪不敢言之帝問杰曰公群物之異對曰南燒羊山鹽文理粗北燒羊山鹽文理密月望收之者明徹如水以氈橐煮之可驗交河之間平磧中掘深數尺有末鹽如紅如紫色鮮味甘食之止痛更深一丈下有碧珀黑逾純漆或大如車輪末而食之攻婦人小腹癥瘕諸疾彼國珍異必當致貢是以知之涼州異物志曰姜賴之墟今稱龍城恒溪無道以感天庭上帝赫怒溢海盪傾姜賴胡國名也恒溪其王字也矜貪無厭上帝化為沙門遊于觀其政遂從溪乞之以鹽與帝帝乃震怒使蒲昌溢以盪覆也剛鹵千里蒺藜之形其下有鹽累棊而生其地化為鹵而剛堅嶷如蒺藜撥發其底鹽方大如棊以次相累也坐以鹽乞天帝故使此地化生鹽也又曰鹽山二岳三色為質赤者如丹黑者如漆小大從意鏤之寫物赤與黑者皆小惟白大或如篋箱從大所為形也作獸辟惡佩之為吉或治為鳥獸以佩之戎鹽可以療疾四方皆用白者作散以除頭風以其出胡國故言戎鹽也涼州記曰有青鹽池出鹽正方半寸其形似石甚甜美益州記曰汶山越嶲煮鹽法名異汶山有鹹石先以水漬既而煎之越嶲先燒炭以鹽井水沃炭刮取鹽荊州記曰鹽水自凝生傘子鹽方寸中央隆起形如張傘本草經曰鹵鹽一名寒石味苦戎鹽主明目大鹽一名胡鹽呂氏春秋曰本草云戎鹽一名胡鹽崔駰博徒論曰江陽六鹽笑林曰姚彪至武昌遇風與沈浙江渚守風糧用盡遣人從彪貸鹽百斛彪得書不荅勑左右倒鹽百斛著江水中曰明吾不惜惜所與耳嶺表異錄曰野煎鹽廣南煮海其無限商人納攉計價極微數內有恩州場石橋場俯邇滄溟去府最遠商人於所司給一百石搉課止銷雜貨三二千及往本場鹽並無官者給遣商人但將, SBCK: ''}
