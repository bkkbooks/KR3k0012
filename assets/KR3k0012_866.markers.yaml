  - {type: variant, offset: 835, length: 146, content: 食肉區種菽麥採草葉木寶貿鹽以自供人或酬下價者亦即與之宋書曰豫章王大會賓僚張融食炙始畢行炙人使去融欲求鹽䔉口終不言方食捶指半日乃息又曰張融作海賦文辭詭激獨與眾異後以示鎮軍將軍顧顗之曰卿此賦實超玄虛但恨不道鹽耳融即求筆注曰漉沙搆白熬波出素積雪中春飛霜暑路齊書曰崔慰祖父喪不食鹽母曰汝既無兄弟又未有, SBCK: 城晏}
