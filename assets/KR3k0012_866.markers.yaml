  - {type: variant, offset: 2139, length: 266, content: 入口人食得大鹹亦吐之謹案東海昫人曉知鹽法者云攪鹽木多日每燋黑如炭非謂竈中火炭也吳時外國傳曰漲海州有灣灣中常出自然白鹽嶧嶧如細石子天笁國有新陶水水甘美下有石鹽白如水精南州異物志云鹽如石英晉令曰凡民不得私煮鹽犯者四歲刑主吏二歲刑蜀王本紀曰宣帝地節中始穿鹽井數十所世本曰宿沙作煮鹽宋志曰宿沙衛齊靈公臣齊潰海故衛為漁鹽之利晉太康地記曰梓潼縣出傘子鹽廣志曰鹽體因於水故或水且生于水故或與土雜產于地多側于海濱但未必千里相比耳煮鹽與海同河東有印成鹽西方有石子鹽皆生於水北海胡中有青鹽五原有紫鹽波斯國有白鹽如細石子玄晏春秋曰故侍中劉子楊食餅知鹽生精, SBCK: 調}
