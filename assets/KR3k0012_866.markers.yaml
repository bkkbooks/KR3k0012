  - {type: variant, offset: 493, length: 228, content: 海鹽縣是也續漢書曰虞翊為武都太守始到郡穀石千五百鹽石八千視事三歲穀石八千鹽百又曰天笁國出黑鹽東觀漢記曰賈復為縣掾迎鹽河東會盜賊起等輩放散其鹽復獨完還致縣中後漢書曰第五倫自以久為官不達遂將家屬客河東變名姓自稱王伯齊載鹽往來又太原上黨所過輒為糞除而去又王符論曰且攻玉以石洗金以鹽詩小雅曰他山之石可以攻玉今之金工發金色者皆淬之鹽水也魏志曰衛覬與荀彧書曰夫鹽國之大寶也自亂以來放散宜如舊置使者監賣以其直益市犁牛若有歸民以供給之又曰鄧艾平蜀後言於司馬文王留隴右兵二萬, SBCK: 俗}
