  - {type: variant, offset: 2843, length: 435, content: 寫物赤與黑者皆小惟白大或如篋箱從大所為形也作獸辟惡佩之為吉或治為鳥獸以佩之戎鹽可以療疾四方皆用白者作散以除頭風以其出胡國故言戎鹽也涼州記曰有青鹽池出鹽正方半寸其形似石甚甜美益州記曰汶山越嶲煮鹽法名異汶山有鹹石先以水漬既而煎之越嶲先燒炭以鹽井水沃炭刮取鹽荊州記曰鹽水自凝生傘子鹽方寸中央隆起形如張傘本草經曰鹵鹽一名寒石味苦戎鹽主明目大鹽一名胡鹽呂氏春秋曰本草云戎鹽一名胡鹽崔駰博徒論曰江陽六鹽笑林曰姚彪至武昌遇風與沈浙江渚守風糧用盡遣人從彪貸鹽百斛彪得書不荅勑左右倒鹽百斛著江水中曰明吾不惜惜所與耳嶺表異錄曰野煎鹽廣南煮海其無限商人納攉計價極微數內有恩州場石橋場俯邇滄溟去府最遠商人於所司給一百石搉課止銷雜貨三二千及往本場鹽並無官者給遣商人但將人力收聚鹹沙掘地為坑坑口稀布竹木鋪蓬簟於其上堆沙潮來投沙鹹鹵淋在坑內伺候潮退以火炬照之氣衝火滅則取鹵計用竹盤煎之頃剋而就竹盤者以篾細織竹鑊表裏以牡礪灰泥之自收海水煎鹽謂之野煎易得如此也江淮試鹵濃淡即置飯粒於鹵中粒浮者即是純鹵也醬, WYG: 矣遂命覆醢}
