  - {type: variant, offset: 3303, length: 370, content: 醬實蓼濡魚卵醬實蓼濡鼈醢醬實蓼魚膾芥醬麋腥醢醬論語曰不得其醬不食漢書曰劉歆謂揚雄云今學有祿利然尚不能明易又如玄何吾恐後人覆醬瓿也瓿音部甖名也風俗通曰醬成於鹽而鹹於鹽夫物之變有時而重又曰雷不作醬俗說令人腹內雷聲按子路感雷精而生尚剛好勇死衛人醢之孔子覆醢每聞雷心惻怛耳桓譚新論曰鄙人得鯅音羶醬而美與人共食少唾其中因棄之俱不得食論衡曰作豆醬惡聞雷此欲使人急作不欲積久世說曰陸機入洛欲為三都賦聞左司作之撫掌而笑與弟云書雲此間有傖父欲作三都賦須其成當以覆醬甕耳宋書曰孝武嘗為王玄謨作四時書云匏醬調秋菜白醝解冬寒又曰阮孝緒外兄王晏貴顯屢至其門孝緒度之必至顛覆聞其笳管穿籬逃匿不與相見曾會醬美問之云是王家所得便吐餐覆醬及晏誅親戚咸為之懼孝緒曰親而不黨唯坐之及竟獲免梁劉孝儀謝智安王賚蝦醬啟曰龍醬傳甘退成可陋蚿醢稱貴追覺失言上聖聞雷未之能覆嘉賓流歠差以無辭, SBCK: 太平御覽卷第八百六十六}
