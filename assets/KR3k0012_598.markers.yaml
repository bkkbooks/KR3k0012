  - {type: variant, offset: 2058, length: 0, content: '', SBCK: 其此人乎即令撫慰關中所至尅定擢授武衛將軍賜以鐵劵恕其十死又曰越王侗立以叚逹爲納言右翊衛大將軍攝禮部尚書王丗充亦納言左翊衛大將軍攝吏部尚書元文都内史令左驍衛大將軍盧楚亦内史令皇甫無逸兵部尚書右武衛大將軍郭文懿内史侍郎長文黄門侍郎委以機務爲金書鐡劵藏之宮掖于時洛陽稱叚逹等爲七貴唐書曰李懷光旣解奉天之圍不獲朝見因大怒德宗遣中使諭旨加太尉賜鐡劵懷光怒甚投劵於地曰人臣反則賜鐵劵今賜懷光是使反}
