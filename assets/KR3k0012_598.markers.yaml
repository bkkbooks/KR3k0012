  - {type: variant, offset: 2868, length: 402, content: 而効之其罪彌甚所以歛毫卷帛解上而已又曰彭城王勰從征齊軍帝令勰為露布露布者布於四海露之群臣以臣小才豈足大用帝曰汝亦才達但可為之及就尤類帝文人咸謂御筆帝曰非兄即弟誰能辨之勰對曰子夏被嗤於先聖臣又荷責於今來後魏書曰宇文神舉幽州人盧昌期祖英伯等聚眾據范陽反詔神舉率兵討擒之齊黃門侍郎盧思道亦在反中賊平見獲解衣將伏法神舉素欽其才名乃釋而禮之即令草露布其待士禮賢如此又曰呂思禮好學有文才雖務兼軍國而手不釋卷晝理政事夜則讀書令蒼頭執燭燭燼夜有數升沙苑之捷命為露布食頃便成周文歎其工而且速北齊書曰杜弼從高祖破西魏於卬山命為露布弼即書絹曾不起於草世說曰桓武北征時袁虎從被責免官會須露布文喚表倚馬前令作手不蹔輟俄頃得七紙殊可觀王東亭亦在側絕歎其才國史補曰李晟破朱泚德宗覽收城露布云臣已肅清宮禁祇謁寢園鍾簴不移廟皃如故上感涕失聲左右六宮皆嗚咽論者以國朝捷書露布無如此者于公異之詞也公異後為陸贄所忌誣以家行不至賜孝經一卷𡒄坎而終, SBCK: 十八}
