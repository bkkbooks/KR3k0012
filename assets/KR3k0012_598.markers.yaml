  - {type: variant, offset: 2047, length: 0, content: '', SBCK: 羊牛自教精慧不得癡愚持斧入山斷輮裁轅􅀂有餘殘當作俎几木履及彘槃焚薪作炭石礨薄岸治舎盖屋書削代牘日暮欲歸當送乾薪兩三束四月當披九月當穫十月拔豆掄夌窖芋南安拾栗採橘持車載輳多取蒲茅盖作繩索兩墮所無爲當編蔣織薄植種桃李梨柿柘桑三丈一樹八尺爲行果􅀋相從從横相當果熟収歛不得吮嘗犬吠當起驚告鄰里棖門柱户上樓擊鼔持楯曵矛還落三周勤心疾作不得遨遊奴老力索種莞織席事訖休息當春一石夜半無事浣衣當白􅀂私錢主給賔客奴不得有姧私事當關白奴不聽教當笞一百讀劵文適訖辭窮詐索仡仡叩頭兩手自縛目淚下落􅈹涕長一尺審如王大夫言不如早歸黄土陌丘蚓鑚額早知當􅈛王大夫酤酒真不敢作惡}
  - {type: page-break, offset: 2047, content: '', id: KR3k0012_SBCK_598-5a}
  - {type: variant, offset: 2047, length: 0, content: '', WYG: 牛羊自敎精慧不得痴愚持斧入山斷輮裁轅若有餘殘當作爼机木屐及彘盤焚薪作炭礨石薄岸治舍盖屋晝削筏代牘日暮欲歸當送乾薪兩三束四月當披九月當穫十月收豆掄夌窖芋南安拾栗採摘持車載輳多取蒲茅益作繩索雨墮所無為當編蔣織薄植種桃李梨柿柘桑三丈一樹八尺為行果類相從從横相當果熟收歛不得吮嘗犬吠當起驚告隣里棖門柱户上樓擊鼓持盾曵矛還落三周勤心疾作不得遨遊奴老力索種莞織席事訖休息當舂一石夜半無事洗衣當白若有私錢主給賔客奴不得有奸私事當關白奴不聼教當笞一百讀劵文適訖辭窮咋索仡仡叩頭兩手自縛目淚下落鼻涕長一尺審如王大夫言不如早歸黄土陌蚯蚓鑽額早知當爾王大夫酤酒真不敢作惡也輮車輞也礨石竹籠盛石以薄岸也豕盤猪槽也南安縣出摽掄麥種夌也十月民輸租載輳有利也漢時官不禁報怨民家皆髙樓以避有急即上樓擊鼔以告邑里令救援也石崇奴劵曰余元康之際至在榮陽東住聞主人公言聲太髙湏㬰出趣吾車曰公府吾怪吾家嘵嘵耶中買得一惡羝奴名宜勤身長九尺餘力舉五千觔挽五石力弓百歩射錢孔言讀書欲使便病日食三斗米不能柰何吾聞公賣不公喜便下絹百疋聞謂吾曰吾湖王子性讀書公府事一不上劵則不為公府作劵文曰取東海巨塩東齊羝羊朝歌浦薦八板㸠牀員之安邑梨栗之鄉常山細縑趙國之編許昌總沙房之綿作章當此髙平英榆之轂無尾髑髏之狀大良白槐之幅茱茰之輞河東亂櫛桑轅大山桑光長安䨇入白屋釘鏁巧手出於上方見好弓杯可斫千張山隂青􅀈鳥嘷柘桑張金好墨過數市蠡之井市豪筆備郎寫書嘷角憤道金案玊枕宜勤供筆更作多辭乃歛吾絹而歸邵氏家傳曰邵仲金好賑施年八十一臨卒取其貸錢物書劵自於目前焚之曰吾不能以徳教子孫不欲復以賄利累之及貸者還錢子孫不受曰不能光顯先人豈可傷其義乎鐡劵東觀漢記曰桓帝延熹八年妖賊蓋登稱大皇帝有璧二十珪五鐡劵十一後伏誅晉中興書曰初帝在關中與氐羗破鐡劵約不役使又曰應詹都督天門等郡天門武陵溪蠻並反詹誅其魁帥餘皆當降自元康以來政令不一谿蠻並反詹召蠻酋破鐡劵與盟由是懐化數郡無虞其後天下大亂唯詹保全一境三國典畧曰梁任果降周果字静蠻南安人也世為方隅豪族仕於江右志在立功太祖嘉其遠來待以優禮後除始州刺史封樂安公賜以鐡劵聼世傳襲又曰侯景圍臺城陳昕說范桃棒令率所領二千人襲殺王偉宋子仙𢃄甲歸降桃棒許之後昕夜入宫城宻啓梁主梁主大恱使命納之并鐫銀劵賜桃俸曰事定日當封汝為河南王即有景衆并給金帛女樂以報元功而太子恐其詭詐猶預不决隋書曰李穆累以軍功進爵為伯從太祖擊齊師於芒山太祖臨陣墜馬穆突圍而進以馬策擊而詈之授以從騎潰圍俱出賊見其輕侮謂太祖非貴人遂緩之以故得免既而與穆相對泣顧謂左右曰成我事者其此人乎即令撫慰關中所至剋定擢授武衞將軍賜以鐵劵恕其十死又曰越王侗立以叚逹為納言右翊衞大將軍攝禮部尚書王世充亦納言左馮翊大將軍攝吏部尚書元文都内史令左驍衞大將軍盧楚亦内史令皇甫無逸兵部尚書右武衞大將軍郭文懿内史侍郎趙長文黄門侍郎委以機務為金書鐡劵藏之宫掖於時洛陽稱叚達等為七貴唐書曰李懐光既解奉天之圍不獲朝見因大怒徳宗遣中使喻㫖加太慰賜鐡劵懷光怒甚投劵於地曰人臣反則賜鐵劵今賜懷光是使反也過所釋名曰過所至關津以示之或曰傳轉}
