  - {type: variant, offset: 2147, length: 2, content: 劉歆, WYG: 文帝十三年詔除關無用傳張晏注曰傳信也若今過所李竒曰傳棨也顔師古曰或用棨或用繒帛棨者刻木為合符魏畧曰倉慈為燉煌太守胡欲詣國家為討過所廷尉决事曰廷尉上廣平趙禮詣雒治病愽士弟子張䇿門人李臧賫過所詣洛還債禮冐名度津平裴諒議禮一歲半刑䇿半嵗刑晉令曰諸度關及乗船筏上下經津者皆有所寫一通付關吏零丁齊諧記曰國歩山有廟甚靈吕思與少婦投宿失婦思逐覔見大城㕔事一人紗㡌馮几左右競來擊之思以刀斫計當殺百餘人餘者便乃大走向人盡成死狸看向㕔乃是古始大冡上穿下甚明見一羣女子在冡裏見其婦如失性人因抱出冡口又入抱取在先女子有數十中有通身已生毛者有毛脚靣成狸者湏臾天曉將婦還亭亭吏問之具如此答前後有失兒女者零丁有數十吏便歛此零丁至冡口迎此羣女隨冡遠近而報之各迎取於此後一二年廟無復靈戴良}
