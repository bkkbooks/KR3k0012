  - {type: variant, offset: 2191, length: 153, content: 肯置對歆因移書太常博士後漢書曰韓馥見民情歸袁紹忌方得眾恐將圖己常遣從事守紹門不聽發兵橋瑁乃詐為三公移書傳驛州郡說董卓罪惡企望義兵以釋國難馥於是方聽紹舉兵齊書曰孔稚珪字德璋會稽人也周彥倫隱於北山後應詔出為鹽官令欲過北山乃假山靈之意移書於北山三國典略曰衛襄字叔遼河東人脩行至孝州郡嘉之時有白波賊眾數萬人官兵誅伐, SBCK: 相值此其庶形何能備請復重陳其靣目䲻頭鵠頸獦狗眼涙􅈹涕相追逐吻中含納無牙齒食}
