  - {type: variant, offset: 2499, length: 368, content: 鼓勑催令遣上子野徐起操筆撰之昧爽便就人奏武帝深嘉焉自是凡諸符檄皆令具草子野為文典而速不尚靡麗制多法之古與今文體異當時或有詆訶者及其末翕然重之或問其文速者子野荅言曰人皆成於手我獨成於心露布文心雕龍曰露布者蓋露板不封布諸視聽也後漢書曰鮑永為司隸校尉子昱復拜焉後詔昱詣尚書使封胡降檄光武遣小黃門問昱有所怪不對曰臣聞故事通官文書不著姓又當司徒露布怪使司隸下書而著姓也帝報曰吾故令天下知忠臣之子復為司隸也後漢書曰邢巒從征漢北巒後至高祖曰至此以來未擒滅城隍土崩想在不遠所以緩攻孝正待中書為露布耳又曰高祖每歎曰上馬能擊賊下馬作露板唯傳脩耳魏書曰高祖車駕南伐以韓顯宗統大軍破蕭鸞軍斬其將高法援等顯宗至新野高祖曰卿破賊斬師殊益軍勢朕方攻堅何為不作露布也顯宗曰臣頃聞王肅獲賊二三疋驢馬皆為露布臣布東親私每哂之近雖仰憑威靈得摧醜虜斬擒不多脫復高曳長縑虛張功捷, SBCK: 百}
