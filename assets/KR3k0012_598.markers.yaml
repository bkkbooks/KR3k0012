  - {type: variant, offset: 1185, length: 199, content: 難王室如燬安用生為今日即戮得作惡鬼乃所願也敦憚其辭正釋之眾人皆賀雄笑曰昨夜夢乘車掛肉其傍夫肉必有筋筋者斤也車傍有斤吾其戮乎尋而敦遣殺之當時見者無不傷惋又曰張軌為涼州剌史時晉昌張越涼州大族讖言張氏霸涼自以才力應之越初為梁州剌史而志在涼州遂託病歸河而陰謀伐軌乃遣兄鎮及曹祛麴佩移檄廢軌軌遣主簿奉表詣闕將歸老宜陽長史王融參軍孟暢蹋折鎮檄排閣入諫軌默然從之又曰元帝遣揚威將軍甘卓建威將軍敦逸攻周馥于壽春安豐, SBCK: 爲呉郡}
