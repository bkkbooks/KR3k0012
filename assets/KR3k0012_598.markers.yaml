  - {type: variant, offset: 2055, length: 0, content: '', SBCK: 歸邵氏家傳曰邵仲金好賑施年八十一臨卒取其貸錢物書劵自於目前焚之曰吾不能以德教子孫不欲復以賄利累之及貸者還錢子孫不受曰不能光顯先}
  - {type: variant, offset: 2055, length: 71, content: 人隨者也相如之難蜀尤文曉而喻博有檄移之骨焉詞剛而義辨文移之首也陸機之移百官言簡而事顯武移之要者也故檄移為用事兼文武其在金革則逆黨用檄順眾資移所, WYG: 成極刑自}
  - {type: variant, offset: 2055, length: 0, content: '', krp: 歸邵氏家傳曰邵仲金好賑施年八十一臨卒取其貸錢物書劵自於目前焚之曰吾不能以德教子孫不欲復以賄利累之及貸者還錢子孫不受曰不能光顯先}
  - {type: variant, offset: 2056, length: 1, content: 隨, SBCK: 豈可傷其義乎鐵劵東觀漢記曰桓帝延熹八年妖賊盖登稱太皇帝有壁二十珪五鐵劵十一後伏誅晉中興書曰􅀄閔帝在關中與氐羗破鐡劵約不役使又曰應詹督天門等郡天門武陵谿蠻並反詹誅其魁帥餘皆當降自元康巳來政令不洽谿蠻懷化數郡無憂其後州郡所有敗唯詹獨保之一境三國典畧曰梁任果降同果字静鸞南安人也丗爲方隅豪族仕於江左志在立功太祖嘉其逺來待以優禮後除始州刺史封樂安公賜以鐡劵聽丗傳襲又曰侯景圍臺城陳昕􅀃范桃捧令率所領二千人襲殺王偉宋子仙帶甲歸降挑捧許之使昕夜入官城宻啓梁主梁主大恱命使納之并鐫銀劵賜桃捧曰事定日當封汝爲河南王即有景衆并給金帛女樂以報元功而太子恐其詭許猶預不决隋書曰李穆累以軍功進爵爲伯從太祖擊齊師於郎山太祖臨陣墜馬穆突圍而進以馬䇿擊太祖而詈之授以從􅀝潰圍俱出賊見其輕侮謂太祖非貴人遂緩之以故得免旣而與穆相對泣顧謂左右曰成事我}
