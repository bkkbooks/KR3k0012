  - {type: variant, offset: 2053, length: 1, content: 往, SBCK: 救助也石崇奴劵曰余元康之際至在滎陽東住聞主人公言聲大髙湏􅁷出趣吾車曰公府當怪吾家嘵嘵邪中買得一惡羝奴名冝勤身長九尺餘力舉五千斤挽五石力弓百歩射錢孔言讀書欲使便病日食三斗米不能柰何吾聞公賣不公喜便下絹百疋聞請吾曰吾胡王子性好讀書公府事一不上劵則不爲公府作劵文曰取東海巨塩東齊羝羊朝歌浦薦八板㸠牀眞之安邑梨栗之郷常山細縑趙國之編許昌緫沙房之綿作車當取髙平英榆之轂無尾髑髏之狀太良白槐之輻茱茰之輞河東亂櫛桑轅太山桑光長安􅀟入白烏釘鏁巧手岀於上方見好弓朴可斫千張山隂青烏嘷柘桑張金好墨過市數之蠡开市豪筆備郎冩書皥角道金案玉椀冝勒供筆更作多辭乃歛吾絹}
