  - {type: variant, offset: 284, length: 326, content: 以尺二明白之文或稱露布夫兵以定亂莫敢自專天子親戎稱恭行天罰諸侯禦師則云肅將王誅故分閫推轂奉詞伐罪非唯致果為毅抑亦厲詞為武使聲如衝風所擊氣似攙搶所掃奮其武怒揔其罪人徵其惡稔之時顯其貫盈之數搖姦凶之膽訂信順之心使百尺之衝摧折於咫書萬雉之城顛墜於一檄者也觀隗囂之檄亡新布其三逆文不雕飭而意切事明隴右文士得檄之體也陳琳之檄壯於骨骾雖奸閹攜養章實太甚發丘摸金誣過其虐然抗詞書釁皦然曝露鍾會檄蜀徵驗甚明桓溫檄胡觀釁尤切並壯筆也凡檄之大體或述休明或敘否剝指天時審人事驗強弱角權勢摽耆龜於前驗懸鞶鑑於已然雖本國信實參兵詐譎詭以馳旨煒曄以騰說凡此眾作莫之或違者也故其植義颺詞務在剛健插羽以示迅不可使詞緩露板以宣眾不可使義隱必事昭而理辨氣盛而詞斷此其要也若曲趣密巧無所取才, SBCK: 翰}
