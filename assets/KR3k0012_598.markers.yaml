  - {type: variant, offset: 1196, length: 751, content: 即戮得作惡鬼乃所願也敦憚其辭正釋之眾人皆賀雄笑曰昨夜夢乘車掛肉其傍夫肉必有筋筋者斤也車傍有斤吾其戮乎尋而敦遣殺之當時見者無不傷惋又曰張軌為涼州剌史時晉昌張越涼州大族讖言張氏霸涼自以才力應之越初為梁州剌史而志在涼州遂託病歸河而陰謀伐軌乃遣兄鎮及曹祛麴佩移檄廢軌軌遣主簿奉表詣闕將歸老宜陽長史王融參軍孟暢蹋折鎮檄排閣入諫軌默然從之又曰元帝遣揚威將軍甘卓建威將軍敦逸攻周馥于壽春安豐太守孫惠卿眾應之使謝擒為檄擒馥之故將馥見檄流涕曰必謝擒之辭擒聞之遂毀草旬日馥眾潰續晉陽春秋曰何母忌母劉牢之姊也無忌與高祖謀夜於屏風裏製檄文母潛於屏風上窺之既知其謀大喜謂曰汝能如此吾讎恥雪矣嵇氏世家曰含字君道為中書郎書檄雲集含不起草北齊書曰高祖西討命中外府司馬李義深知相府城局李士略共作檄文二人皆辭請以孫搴自代高祖引搴入帳自為吹火催促之搴援筆立成其文甚美高祖大悅即署相府主簿專典文筆梁書曰元帝擒宋子仙及丁和送之江陵並下于獄子仙檄湘東曰既瞎且尰爾勇伊何即書記沈炯之文也有司焚毀湘東弗知僧辯購炯獲之酬錢十萬炯既不敢謁見遂謟事于僧辦自此軍書咸出於炯又曰偉玉洛陽人也學通周易嘗在准陽賦詩曰平明聽戰鼓薄暮敘存亡楚漢方龍鬥秦關陣未央既至江陵繫之於獄以詩贈湘東嬖人曰趙壹能為賦鄒陽解獻書何惜西江水不救轍中魚又上五十韻詩以希不死湘東愛其詞翰猶欲未誅左右嫉之乃曰偉前作檄文言詞不順湘東所視其檄云項羽重瞳尚有烏江之敗湘東一目寧為赤縣所歸湘東大怒釘其舌於柱剜其臍抽其腸出乃斬之陳書曰趙知禮涉獵文史善書翰武帝之討元景仲也或薦之引為記室知禮涉文贍速每召製書下筆便就率皆稱旨又曰顧野王博識洽聞侯景之寇郡將衣君正舉兵赴援文檄皆以委之口占便就未嘗立草國朝記傳曰元萬頃初為契苾何力征高麗管記作檄書云不知守鴨綠之險莫離支報云謹聞命矣遂移兵固守官軍不得入萬頃坐流嶺南, WYG: ''}
