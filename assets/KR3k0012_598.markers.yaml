  - {type: variant, offset: 2046, length: 0, content: '', SBCK: 結也上古純質結繩執契今羌胡徴數􅀒販其遺風也又曰劵者束也明白約束約束以備情僞自形半分故周稱判書古有鐵劵以堅信誓王褒髯奴則劵之諧也戰國䇿曰孟嘗君使馮驩収責於薛曰責畢市吾家所寡者馮驩召民畢集以責賜民因燒其劵還見孟嘗君曰君家所寡者義也臣竊矯命舎責以賜民此爲君市義也魏子曰仲尼無劵契於天下而德著於古今善惡明也王褒約僮曰蜀郡王子淵以事到湔上寡婦楊惠舎惠有夫時奴名便子淵倩奴行酤酒便拽大杖上家顛曰大夫買便時但要守􅃁不要爲它人男子酤酒子淵大怒曰奴寕欲賣邪惠曰奴父訝人人無欲者子淵即决買劵之奴復曰欲使皆上劵不上劵便不能爲也子淵曰諾劵文曰神爵三年正月十五日資中男子王子淵從成都安志里女子楊惠買亡夫時户下髯奴便决賈萬五千奴當從百役使不得有二言晨起早掃食了洗滌浚渠縛落鉏園研陌杜髀諀地刻犬枷屈竹作杷削治鹿盧居當穿臼􅅞帚栽芋鑿斗織履作鹿黏雀張烏結網捕魚種薑養羊長育豚駒二月春分披椶種􅀲作折瓠別茄披䓗焚槎發芋鷄鳴起春魚落三重調治馬臚滌柸整案園中柭䔉斵蘇切脯飲酒裁得染脣漬口不得傾盃覆斗用錢推紡堊敗㯶索綿席買席往來都洛當爲婦女求脂澤轉出旁蹉牽犬販鵝武都買茶楊氏池中掘荷入市不得夷蹲旁卧惡言醜罵㯶栟橺也皮可爲繩作也音鑿蜀土收芋皆窖藏之至春乃發馬户水門也蜀每落流水養魚欲食乃取之訪堊白墡地蹉市名武都縣岀名茶楊氏池岀好多作刀矛持入益州貨}
