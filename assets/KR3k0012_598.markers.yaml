  - {type: variant, offset: 2187, length: 3, content: 儒博士, SBCK: 渡關及乗舡筏上下經津者皆有所冩一通付關吏零丁齊諧記曰國歩山有廟又一亭吕思與少婦投􅀫失婦思逐覔見天城㕔事一人紗帽馮几左右競來擊之思以刀斫計當殺百餘人餘者便乃大走向人盡成死狸看向㕔事乃是古始大􅃁冢上穿下甚明見一群女子在􅃁裏見其婦如失性人因抱出冢口又入抱取於先女子有數十中有通身巳生毛者亦有毛脚靣成狸者湏􅁷天曉將婦還亭亭吏問之具如此荅前後有失兒女者零丁有數十吏便歛此零丁至冢口迎此群女隨家逺近而報之各迎取於此後一二年廟無復靈戴良字文讓失父零丁曰敬白諸君行路者敢吿重罪自爲積惡致災交天困我今月七日失阿爹念此酷毒可痛傷當以重幣繒用相賞請爲諸君􅀃事狀我父軀體與衆異脊背傴僂捲如胾脣吻參差}
