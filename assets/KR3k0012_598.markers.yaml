  - {type: page-break, offset: 2046, content: '', id: KR3k0012_SBCK_598-4b}
  - {type: variant, offset: 2046, length: 0, content: '', WYG: 結也上古純質結繩執契今羗胡徴數負販記緡其遺風也又曰劵者束也明白約束以備情偽字形半分故周稱判書古有鐡劵以堅信誓王褒髯奴則劵之楷也戰國䇿曰孟嘗君使馮驩收債於薛曰債畢市吾家所寡者馮驩召民畢集以債賜民因燒其劵還見孟嘗君曰君家所寡者義也臣竊矯命舍債以賜民此為君市義也魏子曰仲尼無劵於天下而徳著古今善惡明也王褒僮約曰蜀郡王子淵以事到湔上寡婦楊惠舍惠有夫時奴名便了子淵倩奴行酤酒便拽大杖夫冢顛曰大夫買便了時但要守冢不要為他家男子酤酒子淵大怒曰奴寕欲賣耶惠曰奴父訝人人無欲者子淵即决劵買之奴復曰欲使者皆上劵不上劵便了不能為也子淵曰諾劵文曰神爵三年正月十五日資中男子王子淵從成都安志里女子楊惠買亡夫時户下髯奴便了决賈萬五千奴當從百役使不得有二言晨起灑掃食了洗滌居當穿臼縛箒裁盂鑿井浚渠縛落鉏園斫陌杜埤音脾地刻大枷屈竹作杷削治鹿盧織履作麄黏雀張烏結網捕魚繳鴈彈鳬種薑養羊長育豚狗二月春分焚槎發芋鷄鳴起舂兼落三重調治馬户滌杯整案園中㧞蒜斵蘇切脯飲酒裁得染唇漬口不得傾盃覆斗用錢推訪堊敗㯶索綿亭買席徃來都洛當為婦女求脂澤販轉出旁蹉牽犬販鵞武都買茶楊氏池中擔荷入市不得夷蹲旁卧惡言醜罵㯶栟櫚也皮可為繩作絙也音鑿蜀土收芋皆窖藏之至春乃發馬戸水門也蜀每落水流養魚欲食乃取之堊白㵛也蹉市名武都縣名出茶楊氏池名出荷多作刀矛持入益州貨}
