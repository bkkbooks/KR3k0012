  - {type: variant, offset: 860, length: 1, content: 盧, WYG: 郭丹字少卿初之長安買符以入凾谷關嘆曰丹不乗使者車終不出關後果如本心又曰赤眉欲立宗室以木札書符曰上將軍與兩空札置笥中大集㑹三老從事令劉盆子等三人居中央一人奉符以年次探之盆子最㓜探得將軍三老等即皆稱臣隋書曰髙祖頒青龍符於東方總管刺史西方以騶虞南方以朱雀北方以𤣥武又頒木魚符於總管刺史雌一雄一又頒木魚符於外官五品以上又曰煬帝謂樊子盖曰朕遣越王留守東都示以皇枝盤石社稷大事終以委公特宜持重戈甲五百人而後出此亦勇夫重閉之義也無頼不軌者便請鋤之凡可以施行無勞形迹今為公别造玉麟符以代銅獸列女傳曰楚昭貞姜者齊侯之女楚昭王之夫人也昭王平王子昭王軫也昭王出遊留夫人漸臺之上而去漸臺水上之臺王聞}
