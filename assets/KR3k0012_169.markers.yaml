  - {type: variant, offset: 210, length: 2, content: 為內, SBCK: 爲九江郡漢爲淮南國伏滔正淮論曰爰自戰國至于晉之中興六百餘年保淮南者九姓稱兵有十一人皆亡不旋踵禍溢於丗保壽春者南引荆海之利東連三吴之富北接梁宋平途不過七百里西援陳許水陸不出千里外有江湖之阻内保淮淝之固龍泉之陂良田萬頃舒六之貢利盡蠻越金石皮革之具萃焉苞木管竹之族生焉其俗尚氣力而多勇悍其人習戰爭而貴詐僞所以屢多亡國也}
