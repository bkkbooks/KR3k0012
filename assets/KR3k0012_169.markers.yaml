  body:
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 楊楚濠壽滁和廬舒蘄申光安黄􅃆楊州元和郡縣圖志曰楊州廣陵郡禹貢九州楊州其一也春秋時屬吴七國屬楚秦滅楚爲廣陵後併天}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 揚州楚州濠州夀州滁州和州廬州舒州蘄州申州光州安州黄州沔州揚州元和郡縣圖志曰揚州廣陵郡禹貢九州揚州其一也春秋時屬吳七國屬楚秦滅楚為廣陵併天}
