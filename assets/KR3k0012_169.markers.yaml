  - {type: variant, offset: 2128, length: 438, content: 豫州之南境春秋以來楚地秦南郡之北界二難為南陽郡獻帝時魏武始置襄陽郡襄陽記曰襄陽本楚之下邑檀溪帶其西峴山亙其南亦楚國之北津也荊州圖副曰建安十三年魏武平荊州始置襄陽郡以地在襄山之陽為名楚地記曰蜀關羽攻沒于禁等七軍兵勢甚盛獨襄陽徐晃屯守不下曹公謂晃曰全襄陽者徐公之功也後吳大帝率兵向西時曹仁鎮之司馬宣王言於魏文曰襄陽水陸之衡禦寇要地不可失也南雍州記曰永嘉之亂三輔豪族流於樊沔僑於漢側立雍州因人所思以安百姓也宋文帝因之置南雍州焉晉書曰山簡字季倫嘗鎮襄陽郡中有高陽池每臨池未嘗不大醉而還人歌之曰山公何所詣往至高陽池日暮倒載歸酩酊無所知時時能騎馬倒著白接蘺舉鞭問葛強何如并州兒盛弘之荊州記曰襄陽郡峴首山南至宜城百餘里其間彫牆峻宇閭閻填列漢宣帝末其中有卿士刺史二千石數十家珠軒駢輝華蓋連延掩映於太山廟下荊州刺史行部見之雅歎其盛勑號太上廟道為冠蓋里漢志曰築陽屬南陽郡故穀國今穀城縣也莽曰宜禾應劭曰築水出漢中房陵東入沔築音逐圖經曰穀城縣有酇城漢志曰即蕭何出所封也音讚均州十道志曰均州武當郡禹貢豫, SBCK: 楊}
