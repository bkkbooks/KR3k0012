  - {type: variant, offset: 3, length: 0, content: '', krp: 楊楚濠壽滁和廬舒蘄申光安黄沔楊州元和郡縣圖志曰楊州廣陵郡禹貢九州楊州其一也春秋時屬吴七國屬楚秦滅楚爲廣陵後併天}
