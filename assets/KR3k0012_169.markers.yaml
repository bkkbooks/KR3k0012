  - {type: variant, offset: 1825, length: 7, content: 領宛犨等三十六, SBCK: 浚音峻遒音才由反舒州釋例曰舒有五名舒庸舒龍舒州舒鳩舒城其實一也左傳定二年曰呉子使舒鳩民誘楚人元和郡}
  - {type: variant, offset: 1825, length: 144, content: 領宛犨等三十六縣秦置莽曰荷墜屬荊州又曰鄧屬南陽故國都尉治應劭曰鄧侯國也史記蘇秦說韓惠王曰韓西有宜陽東有穰淯後漢書曰時天下墾田多不以實詔下郡國撿覆其事時諸郡各遣使奏事帝見陳留吏牘上有書視之云潁州弘農可問河南南陽不可問帝詰吏不肯服時顯宗為東海公言曰河南帝城多近臣南陽帝鄉多近親田宅踰制不可為準, WYG: ''}
