  - {type: punctuation, offset: 6, content: 《, id: KR3k0012_CHANT_169-bkkpn1}
  - {type: variant, offset: 6, length: 0, content: '', SBCK: 左氏哀九年曰吴城䢴溝通江淮也魏志曰黄􅀄六年征吴幸廣陵城臨江觀兵見江濤歎曰天所以限南北也隋書曰義寜元年詔修江都宫治龍舟鳯舸黄龍赤艦樓舡萬艘以幸江都爲錦㠶黼帳作泛龍舟春江花月夜等曲以幸之因而都焉宋書曰徐湛之爲楊州起風亭月吹觀臺琴室以爲遊宴焉又曰楊州刺史王謐薨髙帝次應入輔劉毅等不欲帝入謐議以中軍謝混爲州欲令帝於丹徒領州以二議諮帝劉穆之謂帝曰楊州根本所係不可假人前授王謐事出權道今􅀂復他授便應受制於人一失於權無由可得帝從之郡國志曰廣陵以城置在陵上爾雅云大阜曰陵連接西蜀一名阜崗一名崑崙崗鮑昭蕪城賦曰拖以漕渠軸以崑崙崗河圖括地象曰崑崗山横爲地軸此陵交帶崑崙故廣陵也漢志曰廣陵國髙帝六年置景帝四年更名江都王莽曰江平江都易王非廣陵厲王胥皆都此漢書曰廣陵厲王賜䇿曰烏呼小子胥受兹赤社建爾國家封于南􅁟古人有言曰大江之南五湖之間其人輕心楊州保強保恃也三代要服不及以正要服次荒服之内正政也要一遥反}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_SBCK_169-1b}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_SBCK_169-2a}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 左氏哀九年曰呉城䢴溝通江淮也魏志曰黄初六年征吳幸廣陵城臨江觀兵見江濤洶湧嘆曰天所以限南北也隋書曰大業元年詔修江都宫治龍舟鳯舸黄龍赤艦樓船萬艘以幸江都宋書曰徐湛之為揚州起風亭月觀吹臺琴室又曰揚州刺史王謐薨髙帝次應入輔劉毅等不欲帝入議以中領軍謝混為揚州欲令帝于丹徒領州以二議諮帝劉穆之謂帝曰揚州根本所係不可假人前授王謐事出權道今若復他授便應受制于人一失權柄無由可得帝從之郡國志曰廣陵以城置在陵上故曰廣陵此陵交帶崑崙連接西蜀一名蜀岡一名崑崙岡鮑昭蕪城賦曰拖以漕渠軸以崑岡河圖括地象曰崑岡之山横為地軸漢志曰廣陵國髙帝六年置景帝四年更名江都莽曰江平江都易王非廣陵厲王胥皆都此漢書曰廣陵厲王賜䇿曰嗚呼小子胥受兹赤社建爾國家封于南土古人有言曰大江之南五湖之間其人輕心揚州保强保恃也三代要服不及以正要服次荒服之内正政也要一遥反}
