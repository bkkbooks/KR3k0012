  - {type: variant, offset: 31, length: 4, content: 劉備初得, SBCK: 射陽縣屬臨淮郡莽曰􅁥淮亭在射水之陽故曰射陽又曰廣陵王胥有罪其相勝之奏奪王射陂張晏曰射水之陂在射陽縣晉書曰穆帝時中郎將荀羡北討云舊淮隂地形都要水陸交通易以觀釁沃野有開殖之利方舟運漕無他屯阻乃營立城池焉郡國志曰北對清泗臨淮守險有平陽石􅀛田稻豐饒吴越春秋曰吴將伐齊自廣陵掘溝通江淮即州地史記曰越滅吴而不能正江淮楚乃東侵廣地于泗上}
