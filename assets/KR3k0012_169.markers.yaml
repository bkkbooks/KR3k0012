  - {type: variant, offset: 1177, length: 417, content: 秦屬黔中郡漢改黔中為武陵郡屬荊州今州即武陵郡之零陽縣地吳分武陵西界立天門郡此即郡之境晉為南義陽郡隋平陳置松州尋改為灃州在灃水之北故取為名尚書禹貢曰岷山導江東別為沱又東至于灃豐水名輿地志曰晉末以義陽流人在南郡者立為南義陽郡寄在荊州十道志曰慈利縣即漢零陽縣地圖經曰界內有零溪水即以為名隋開皇十八年改零陽為慈利縣王仲宣贈士孫文始詩曰悠悠澹灃澹灃二水在灃陽縣巴州十道志曰巴州土地所屬與通州同漢為巴郡宕渠縣四夷縣道記曰李特孫壽時有群獠十餘萬從南越入蜀漢間散居山谷因斯流布在此地後遂為獠所據壁州十道志曰壁州始寧郡本漢宕渠縣地後漢分置宣漢縣梁分宣漢置始寧後魏分始寧置諾水縣蓬州十道志曰蓬州咸安郡本漢宕渠縣地周地圖記曰武帝天和四年割巴州之伏虞郡隆州之隆城郡於此置蓬州集州十道志曰集州符陽郡本漢宕渠縣地晉惠帝永寧中李特王蜀其地屬焉梁武改為東巴州後改為集州以東北有集水因以為名又云以萬山所集故也唐州十道志曰唐州淮安縣禹貢豫州之域春秋楚地戰國時屬晉後入韓秦, SBCK: 􅁗}
