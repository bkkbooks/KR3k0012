  - {type: variant, offset: 1833, length: 286, content: 秦置莽曰荷墜屬荊州又曰鄧屬南陽故國都尉治應劭曰鄧侯國也史記蘇秦說韓惠王曰韓西有宜陽東有穰淯後漢書曰時天下墾田多不以實詔下郡國撿覆其事時諸郡各遣使奏事帝見陳留吏牘上有書視之云潁州弘農可問河南南陽不可問帝詰吏不肯服時顯宗為東海公言曰河南帝城多近臣南陽帝鄉多近親田宅踰制不可為準史記曰秦滅韓徙天下不軓之人於南陽故其俗夸奢尚氣力好商賈漁獵藏匿難制宛西通武關東受淮海都會也圖經曰菊潭以界內菊潭水以名縣盛弘之荊州記曰菊水其源傍有芳菊浸潤流其滋液水極芳馨飲之者皆壽考後魏略曰孝文帝南巡至新野臨潭水而見菖蒲花乃歌曰兩菖蒲新野樂遂建兩菖蒲寺以美之楚地記曰漢江之北為南陽漢江之南為南郡襄州十道, SBCK: ''}
