  - {type: variant, offset: 662, length: 221, content: 以其居西達之路故以為名今為達州渠州十道志曰渠州潾山郡土地所屬與通州同漢志曰宕渠屬巴郡輿地志曰梁大通三年於此置渠州左思蜀都賦曰外負銅梁宕渠渝州十道志曰渝州南平郡古巴國也三巴記曰閬白二水東西流曲折三廻如巴字故謂之三巴山海經曰海內西南有巴國昔太皞生咸鳥咸鳥生乘釐乘釐生後昭是為巴人郭璞曰為巴始祖李膺益州記曰明月峽在巴縣東壁高四十丈有圓孔形如滿月因以為名又曰江津縣西有香草樓昔有仙人於此置樓居植香草於樓下一夕仙去後人指其地為香草樓涪州十道志曰涪州涪陵, SBCK: 歷陽}
