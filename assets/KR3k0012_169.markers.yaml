  - {type: variant, offset: 2646, length: 0, content: '', SBCK: 地漢志曰蘄春屬江夏郡史記曰始皇十六年滅楚虜王􅀒芻於蘄地名記曰蘄春以水隈多蘄菜因以爲名晉書曰武帝以宣太后諱春改爲蘄陽吴志曰魏使廬江謝􅀉爲蘄春郡典農吕蒙襲破之又賀齊傳曰􅀄晉宗爲浠口將以衆叛如魏還爲蘄春太守圖襲樂安取保質權以爲耻因軍􅀄罷六月盛夏出其不意詔齊督䴢芳鮮于丹等襲蘄春生虜宗吴復置蘄春郡申州十道志曰申州義陽郡禹貢荆州之域春秋時申}
