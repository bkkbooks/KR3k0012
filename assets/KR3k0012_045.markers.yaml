  - {type: variant, offset: 62, length: 0, content: '', WYG: 名又為菅子山前趙録云劉元海族子曜嘗隠避於菅涔之山夜忽有二童子入跪曰菅涔王使小臣奉謁趙皇帝獻劒一口置前再拜而去以燭視之劒長二尺光輝非常背有銘云神劒服御除衆毒曜遂服之隨時變為五色也又有生城堆故縣城於此置也又有汾陽宫隋大業四年置隋末廢也又有汾水出山陽山海經曰菅涔之山汾水出焉}
