  - {type: variant, offset: 51, length: 1, content: 語, WYG: 志曰靈石縣有静巖山在東北二十里即太岳也下有五龍泉即文公封介子推綿上之田是也風山水經注曰河水南經圵屈縣故城西十里有風山上有穴如輪風氣蕭瑟習常不止當其衝飄也三伏亦寒草木常不定衆風之門故也菅涔山水經注曰菅涔山汾水所出土人亦}
