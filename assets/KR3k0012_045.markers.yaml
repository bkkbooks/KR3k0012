  - {type: variant, offset: 124, length: 3, content: 注于汧, SBCK: 入滹沱河前燕慕容雋時房山王母祠前大樹自抜根下得玉圭壁八十三顆光色稍苛雋以爲岳神之命以太牢􅀕之每祀有一虎來往祠側性頗馴狎而不害於物韓信山隋圖經曰韓信山圎峻俗呼爲韓信臺又乎爲土門口西入井陘即向太原路是此也又有韓信城信破趙駐軍於此湯山山海經曰湯山湯水出焉此湯能愈疾爲天下最又按隋圖經云湯後側巖上有石室一户無塵穢俗號曰聖人室下經銅鳥廟有碑題云漳河神壇}
