  - {type: variant, offset: 8, length: 0, content: '', SBCK: 枉人山鮒鰅山天門山􅂫門山萬谷根山郡山嬰山牢山介山静巖山風山管涔山五臺山謁泉山懸罋山五指山紇眞山元􅁎山白登山火山三山稷山霍山平山發鳩山抱犢山房山韓信山湯山干山言山黒山雷公山鼔山隆慮山鮮卑山大碣石山白狼山鳴雞山歷山川喬山大翮山小翮山飛龍山無終山燕山龍山孔山大伾山隋圖經曰大伾山按書云至于大伾又名青檀山今名􅀺陽東山劉澄山川記云􅀺國也詩云􅀺侯寓于衛衛以中露􅅺中二邑處之以國名也又張揖云成臯山是大伾山即謬矣枉人山隋圖經曰枉人山俗名上陽三山或云紂殺比干於此山因得名古凢伯國之地也鮒鰅山山海經曰鮒鰅山顓頊葬其陽九嬪葬其隂四虵衛之鮒鰅山者盖今廣陽山之别名也郡國志曰顓頊所葬俗名青冢山焉天門山水經注曰天門注曰謂之百家巖下可容百家故以爲名山有石穴狀如門􅂊得通人自平地東南入便至天井􅂫門山十道志曰蘇門山一曰􅂫嶺俗又名五巖山魏氏春秋云即阮籍見孫登長嘯有鳯皇集登隱之處故號登爲􅂫門先生萬谷根山郡國志曰晉陽萬谷根山即羊腸坂也皇甫謐云羊腸塞在龍山西即晉陽西北古西河上郡􅀜於此隋焬帝大業四年經此幸汾陽改名深谷嶺十二州志云晉陽有羊腸蟠曲在其西北九十里也又隋國經曰失山去萬谷根山二十里頭上有石墟魏太武避暑之所羊腸坂在焉郡山後魏興國土地記曰太原郡山有石室方丈四尺四壁有􅂐字人莫之識嬰山隋圖經曰嬰山爲并州之主牢山又曰牢山在太原縣東北後魏書劉聦遣子粲襲據晉陽猗廬救之遂獵于受陽年山陽閱皮肉山爲之赤也介山并州記曰介山一名撗嶺左傳僖二十四年晉侯賞從亡者介之推不及禄遂與母階隱而死晉侯求不􅀗以綿上田封之以志吾過且旌人杜注曰西河介休縣南有地名綿上也静巖山郡國志曰靈石縣有静巖山在東北二十里即太岳也下有五龍泉即文公封推綿上之田是也風山水經注曰河水南經北屈縣故城西十里有風山上有穴如輪風氣蕭瑟習常不止當其衝飄也而略無生草盖常不定衆風之門故也管涔山水經注曰管涔山汾水所出土人亦云箕管山見多管草或以爲名又爲管字前趙録云劉元海族子曜嘗隱避於管涔之山夜忽有二童子入跪曰管涔王使小臣奉謁趙皇帝獻劒一口置前再拜而去以燭視之劒長二尺光輝非常背有名云神劒服御除衆毒矅遂服之隋時變爲五色也又有三城堆故縣城於此置也又有汾陽宫隋大業四年置隋末廢也又有汾水岀山陽山海經云管涔之山汾水岀焉西流至于河十二州記云汾水岀}
