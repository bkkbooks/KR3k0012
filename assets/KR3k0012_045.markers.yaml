  - {type: variant, offset: 1327, length: 226, content: 記曰青城山高三千六百丈周匝五千里有甘露芝草天池醴泉玉匱經云黃帝封為五岳丈人乃岳瀆之上司真仙之崇秩一月之內群岳再朝六時灑泉以代晷漏一名赤城一名青城都一名天谷山亦為第五大洞寶仙九室之天對郡之西北在岷山之南群峰掩映互相連接靈仙所宅祥異則多益州記云崗蠻崿連嶺千里上有仙都地理志云西徹之外江水所出天彭青城連峰不絕李膺記云入山七里至赤石城有羊馬臺三師壇上五里至瀑布水澗二百步有二石梯有一石笋高三丈過二石門絕崖數百丈下起常道觀高峰下有冰六時灑落東北有二石室名龍宮可容, SBCK: ''}
