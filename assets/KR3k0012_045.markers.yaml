  - {type: variant, offset: 1897, length: 1137, content: 里其山有石瑩皎潔照之莫不備見形體故謂之石鏡山山下又有銅窟隋初於此置監鼓鑄錢刀焉綏山列仙傳曰葛由者蜀之羗人周成王時刻木為羊賣之一旦乘木羊入蜀蜀中王侯賓之上綏山山在安固縣東三十里隨之人皆得仙術覆舡山十道錄曰覆舡山堯遭洪水維舟樹下舡因覆焉又益州記云覆舡山中十五里有七里坂一名羊腹坂屈曲有壁立難昇之路牛頭山九州記云牛頭山昔日葛仙翁多遊於此今立為寺與白獸山相連昔秦時有白獸為害夷人射因刻白石於此山今遺像尚存董政山十道記曰董政山隋開皇中縣令董叔封高雅之士去官之後民咸思其德因指此山為董政山彭亡山十道記曰彭亡山後漢將軍岑彭征公孫述於此山戰死故號曰彭亡山鼎鼻山十道記曰鼎鼻山周道衰微九鼎淪一於此山之下其水清澄今民猶或見其鼎耳靈臺山十道記曰靈臺山在縣北一名天柱山高四百丈即漢張道陵昇真之所郡國志曰靈臺山天柱崖下有一桃樹高五尺皮是桃心肉似柏張道陵與王良趙昇試法於此四百餘年桃迄今不朽小碑記之黃厥山郡國志曰黃厥山有鍾乳穴十九又西岸有自然石塞其下流水上有一懸石似磬驚之有聲可聽靈山郡國志曰靈山昔有神女於此擣衣因號擣衣山山南絕巖有方石明瑩謂之玉女擣練砧又有盤龍山以山形如盤龍也猿門山益州記云猿門山在涪縣之北二十五里上多猿其山二峰磔堅如門故曰猿門金山益州記曰金山在涪縣東五十步東臨澗水光照映川又李膺記云金山長七八里每夏潦雨有崩處即金粟散出是也五婦山蜀記云梓橦縣有五婦山一名五婦臺秦王遺蜀王美女五人蜀王遣五丁迎女至梓橦五丁蹋地大呼驚五女並化為石蜀王築臺登而望之因名為五婦臺焉玉女山梁州記云肥城東南有玉女山山有一石穴中若房宇有玉女入穴不出穴前有脩竹下有石壇風微動竹拂壇如箒祁山關山圖曰漢陽西南有祁山九州之名阻天下之奇峻蜀志云建興六年諸葛亮率師攻祁山不扳即謂此也又按九州志云祁山上有高樓武陟二神祠每歲郡邑祀之又周地圖地記云其城即漢時守將所築閬山閬山圖經曰閬山四合於郡故曰閬中按名山志云閬山多仙聖遊集焉盤龍山李膺益州記云閬中盤龍山南有一石長四十丈高五尺當中有戶及扇若人之掩閉古老以為玉女房銅梁山左太冲蜀都賦云外員銅梁宕渠張孟注云銅梁山名也按其山有桃枝竹西連亘二十餘里山嶺之上平整遠望諸山而此獨秀也山在州南九里高梁山江源記云南浦郡高梁山尾東跨江西首劍閣東西數千里山嶺長峻其峰崔嵬於蜀市望之若長雲垂天一日行之乃極其頂俯視眾山泯若平原劍閣銘謂岩梁山積石峨峨即述此也青石山益州記云昔巴蜀爭界久而不決漢高帝八年一朝密霧石為之裂今猶如之自上及下破處直若引繩焉於是州界始判山上有古神祠甚靈今名青石山雲南山九州要記云雲南郡山山有祠處石室稱黃石公祀之必用紙一百張筆一雙墨一丸室內有啟必知吉凶但不見其形禺同山九州要記曰禺同山有金馬碧雞之祠弔鳥山九州要記曰弔鳥山在葉檢縣葉檢則雲南郡廢邑也山上有鳥千百群飛啁啾一歲必一度大集即鳳皇死也, SBCK: ''}
