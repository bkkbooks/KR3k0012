  - {type: variant, offset: 862, length: 200, content: 上多有白草遙望青白如駮北人呼駮馬為賀蘭鮮卑等類多依山谷為氏族今賀蘭姓者皆因此山名太白山辛氏三秦記曰太白山南有陳倉山山有石與山雞不別趙高燒山雞飛去晨鳴山頭聲聞三十里或謂是王雞錄異傳云秦文公時雍南山有大梓樹文公伐之輒有大風雨樹生合不斷有一人病夜往山中間有鬼語樹神秦若使人被髮以朱絲繞伐樹汝得不憂否文公如其言伐樹樹斷中有一青牛出走入澧水中復出使騎擊之不勝騎墮地復上髮解牛乃畏之入水不出故置髦頭騎也五將山崔鴻, SBCK: ''}
