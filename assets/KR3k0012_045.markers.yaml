  - {type: punctuation, offset: 131, content: 《, id: KR3k0012_CHANT_045-bkkpn44}
  - {type: variant, offset: 131, length: 0, content: '', SBCK: 言山李公緒記曰栢仁縣有干山言山衛詩云出宿于干飲餞于言是此也黒山九州要記曰墨子昔居汲郡黒山採茯苓餌五百歳或老或少又魏志漢獻帝􅀄平二年黒山賊爲毒自統睦固等十万餘衆以掠魏郡也又云一名青山列仙傳曰犢子鄴人在黒山常牽一黃犢來過鄴城沽酒陽都女見恱之遂留相奉都女生死連眉即此者也土地十}
  - {type: page-break, offset: 131, content: '', id: KR3k0012_SBCK_045-8a}
  - {type: variant, offset: 131, length: 0, content: '', WYG: 山海經曰湯山湯水出焉此湯能愈疾為天下最隋圗經云湯後側巖有石室一户無塵穢俗號曰聖人室下經銅烏廟有碑題云漳河神壇是也干山言山李公緒記曰栢人縣有干山言山衞詩云出宿於干飲餞於言是也黑山九州要記曰黑子昔居汲郡黑山採茯苓餌五百嵗或老或少魏志漢獻帝初平二年黑山賊于毒白繞眭固等十萬餘衆以掠魏郡也又云一名青山列仙傳曰犢子鄴人在黑山常牽一黄犢來過鄴城沽酒陽都女見而悅之遂留相奉侍陽都女眉生而連者也土地十}
