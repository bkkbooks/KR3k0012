  - {type: variant, offset: 600, length: 2, content: 牛首, SBCK: 北本名磨笄山昔趙襄子殺代王其夫人曰代已亡矣吾將何歸遂磨笄於山而自殺代人憐之爲立祠焉因名其山爲磨笄山毎夜有野雞群鳴於祠屋上故亦謂爲鳴鷄山歷山後魏輿地圖風􅁟記曰潘城西北三里有歷山􅄱似覆釡故以名之其下有舜祠瞽􅅱祠存焉川喬}
