  - {type: variant, offset: 141, length: 3, content: 起陵高, SBCK: 􅂄老傳曰魏時黒山群盗張燕等不立君長直以名號爲稱多髯者謂之羝公大聲者謂之雷公時雷公賊保此山因以爲名鼓山隋圖經曰鼔山亦名塗山宋永􅀄古今山川記云鼔山如石鼔形二所南北相當二鼔相去十里兾州圖經云鄴城西有石鼔鼔自烏即有兵魏都賦云神誕召逓於髙巒是也髙齊末此鼔鳴未幾云鄴城有兵而齊滅隋文季年又鳴聞數百里也隆慮山隋圖經曰隆慮山一名林慮盖隋縣西二十里山有三峯南第一峯名仙人樓髙}
