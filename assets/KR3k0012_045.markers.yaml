  - {type: variant, offset: 44, length: 1, content: 吳, WYG: 晉陽有羊腸蟠曲在其西北九十里也隋圗經曰朱山去萬谷根山二十里頭上有石墟魏太武避暑之所羊腸坂在焉郡山後魏興國土地記曰太原郡山有石室方丈四尺四壁有篆字人莫之識嬰山隋圗經曰嬰為并州之主牢山又曰牢}
