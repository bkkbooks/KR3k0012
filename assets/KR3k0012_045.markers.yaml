  - {type: variant, offset: 47, length: 1, content: 汧, SBCK: 慈州太岳在晉州雷首在河東界此山有九名謂歷山首山薄山襄山甘􅀥山渠猪山獨頭山陑山等之名又湯伐桀升自陑之所稷山隋圖經曰稷山在綘郡后稷播百榖於此山亦左氏傳謂晉侯治兵於稷以略狄土是此也後魏曰髙凉山隋巳後又爲稷山霍山隋圖經曰霍山在洪洞}
