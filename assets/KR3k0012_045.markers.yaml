  - {type: variant, offset: 49, length: 17, content: 西國語謂之西吳秦都咸陽以為西岳酈元, SBCK: 東北霍水岀焉}
  - {type: variant, offset: 49, length: 0, content: '', WYG: 東北趙書曰劉聰遣子粲襲據晉陽猗廬救之遂獵于夀陽牢山檢閲皮肉山為之赤也介山并州記曰介山一名横嶺左傳僖二十四年晉侯賞從亡者介之推不言祿遂與母偕隠而死晋侯求之不獲以綿上為之田曰以志吾過且旌善人杜預註曰}
