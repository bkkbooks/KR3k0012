  - {type: variant, offset: 123, length: 0, content: '', SBCK: 有雀䑕谷中道險左右柱結成偏梁閣道累石成路俗謂之魯班橋也平山隋圖經曰平山在平陽一名壷口山尚書謂壷口治梁及歧即此地也今名姑射山在縣西平水岀其下又山海經云憲山之南三百里有姑射山兾州圖經云西入文成郡以山爲界又莊子云堯見姑射神人杳然䘮其天下即是此山也發鳩山山海經曰上黨發鳩山多柘木有鳥狀如烏而文首白喙赤足名曰精衛其鳴自相呼云炎帝女東遊溺海化鳥今猶銜石以塡之抱犢山道書福地記曰抱犢山在上黨東南髙七丈有石城髙十丈方一里東南角有草名玉照下枝冬生花髙五六尺味頗甘取其末服之方寸匕日三不飢冝五􅂖多食物無惡毒宼賊不至玉匱云抱犢山東北去􅁪山之南數百里云南有穴行三百里岀美陽縣西七十里名洞口又隋圗經日卑山卑音蔽今名抱犢山四面危絶山頂有二泉後魏􅁑榮亂百姓抱犢上山因以名之也房山隋圖經曰房山嶺上有王母祠甚靈俗號爲王母山後漢書曰章帝永和三年幸趙祠房山即謂此山也在縣西北十里濊水出焉亦謂石臼水又謂之鹿水出行唐東入博陵謂之木刀溝一謂袈裟水又從此過石童山南}
  - {type: page-break, offset: 123, content: '', id: KR3k0012_SBCK_045-6b}
  - {type: page-break, offset: 123, content: '', id: KR3k0012_SBCK_045-7a}
  - {type: variant, offset: 123, length: 0, content: '', WYG: 有雀鼠谷中道險左右柱結成偏梁閣道累石成路俗謂之魯般橋也平山隋圗經曰平山在平陽一名壺口山尚書既載壺口治梁及岐即此地也今名姑射山在縣西平水出其下山海經曰憲山之南三百里有姑射山冀州圗經云西入文成郡以山為界莊子云堯見姑射神人杳然喪其天下即是此山也發鳩山山海經曰上黨發鳩山多柘木有鳥狀如鳩而文首白啄赤足名曰精衛其鳴自相呼云炎帝女東遊溺海化鳥今猶啣石以填之抱犢山道書福地記曰抱犢山在上黨東南髙七丈有石城髙十丈方一里東南角有草名玉照下枝冬生花髙五六尺味頗甘取其末服之方寸七日不飢宜五穀多物無惡毒冦賊不至玉匱云抱犢山東去恒山之南數百里云南有穴行三百里出美陽縣西七十里名洞口隋圗經曰卑山卑音蔽今名抱犢山四面危絶山頂有二泉後魏葛榮亂百姓抱犢上山因以名之也房山隋圗經曰房山嶺上有王母祠甚靈俗號為王母山後漢書曰章帝永和三年幸趙祠房山即謂此山也在縣西北十里濊水出焉亦為石臼水又謂濁鹿水出行唐東入愽陵謂之木刀溝一謂袈裟水又從此過石童山南}
