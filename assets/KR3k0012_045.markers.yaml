  - {type: variant, offset: 16, length: 3, content: 吳嶽孫, krp: 五臺晉永嘉三年鴈門郡人五百餘家避乱入此山見山中人爲先驅因而不返遂寧巖野往還之士稀有望見其村居者至詣㝷訪莫知所在故俗人以爲仙者之都矣中臺之山山頂方三里西北陬有一泉水不流謂之太華泉盖五臺之層秀仙經云此山名爲紫府仙人居之其北臺之山冬夏常氷雪不可居即文殊師利常鎭毒龍之所今多佛寺四方僧徒善信之士多往禮焉謁泉山隋圖經曰西河謁泉山一名隱泉山有石室子夏退居之所水經注曰謁泉山俗云陽雨愆時謁禱是應故得其名懸罋山郡國志曰懸罋山一名龍山亦名結絀山多鮆魚食之不驕晉水岀焉又有象山前録云劉聦征劉琨不克略晉陽踰象山而歸也又汾水自陽曲縣界流入南過晉陽縣晉水從縣南流注之又有洞過水西入于汾晉水下口也又有晉祠水經注曰倨西山枕水有唐叔虞祠水側有凉堂晉川之中最爲勝處姚最序行記云髙洋天保年中大修樓觀五指山李穆叔趙記曰轑陽東北有五指山巖石孤聳上有一手一足之迹厥大如箕指數俱全又郡國志云北齊宣王遣人量之長七尺又十六國春秋云石勒當生之時此山上草木皆爲鐡騎之形紇眞山兾州圖經曰紇眞山在城東北登之望桑乾代郡數百里内宛然又郡國志云望之數百里内夏恒積雪故彼人語曰紇眞山頭凉死雀何不飛去生處樂又有神泉人歌曰紇眞山頭有神丹入地千尺絶骨冷是山北十里有白登山元姬山兾州圖經曰元姬山在馬邑後魏書云道武侍人姓李善謳歌死葬此山魏主思之樂府爲之曲其曲存焉白登山兾州圖經曰白登山在定襄縣東北漢髙所困之處上有臺因山爲名火山兾州圗經曰火山在定襄縣西五里水經注曰西溪水源出火山山有火井南北七十歩深不見底}
  - {type: punctuation, offset: 18, content: 。, id: KR3k0012_CHANT_045-bkkpn6}
  - {type: 'tls:seg', offset: 18, content: '', id: KR3k0012_CHANT_045-1a.6}
  - {type: variant, offset: 20, length: 0, content: '', SBCK: 􅀬上升常􅀂雷之發嚮以草㸑之則煙騰火發其山一名熒臺井東五六尺有陽井廣輪與火井相狀􅀬􅀔亦同東有火井祠歳時祀之井北百歩有東西谷廣十許歩南岸下有風穴厥大容人其深不測而穴中肅肅常有微風雖三伏亦凛列三山隋圗經}
  - {type: variant, offset: 20, length: 0, content: '', krp: 熱上升常若雷之發嚮以草㸑之則煙騰火發其山一名熒臺井東五六尺有陽井廣輪與火井相狀熱勢亦同東有火井祠歳時祀之井北百歩有東西谷廣十許歩南岸下有風穴厥大容人其深不測而穴中肅肅常有微風雖三伏亦凛列三山隋圗經}
