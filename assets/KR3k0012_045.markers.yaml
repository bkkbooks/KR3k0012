  - {type: variant, offset: 597, length: 1, content: 鄠, SBCK: 遼西之西北一百里與此異山而同號大碣石山地理志曰大碣石山在右北平驪城縣西南王莽改曰碣石也漢武帝亦常登之以望巨海而勒其石今於此枕海有石如埇道數十里當山頂有大石如柱形往往而見立於海之中潮水大至及潮波退不動不没不知深淺世名之天橋柱也狀􅀂人造亦非人力所就韋昭亦指此以爲碣石也白狼山郡國志曰白狼山一曰鹿首山魏武於此逢師子處事具獸部鳴鷄山隋圖經曰鳴鷄山在懷戎}
