  - {type: variant, offset: 2368, length: 400, content: 神速盡十二月郡無犬吠之盜其頗不得失之旁郡追求會春溫舒頓足歎曰嗟乎令冬月益展一月足吾事矣又曰嚴延年字次卿東海人為𣵠郡太守大姓西高氏東高氏自郡吏已下皆畏避之莫敢與牾咸曰寧負二千石無負豪太家賓客放為盜賊發輒入高氏吏不敢追延年至遣掾蠡吾趙繡案高氏得其死罪繡見延年為兩劾欲先白其輕者觀延年意延年已先知之趙掾至白其輕者延年索懷中得重劾即收送獄夜入晨殺吏分栲兩高窮竟其姦誅殺各數人郡中震恐道不拾遺三歲遷河內太守東觀漢記曰樊曄為天水郡其政嚴猛好申韓之術不假下以權道路不敢相盜啇人行旅以錢物於大道旁曰以付樊父後還其物如故道不拾遺涼州為之語曰遊子常苦貧力子天所富寧見乳虎穴不入冀城寺嗟我樊府君安可再遭值晉陽秋曰廬陵太守羊舟疑郡人簡良等為賊殺一百九十人徒讁百有餘人有司奏舟罪死以景獻皇后有屬八議帝曰此古人所無何八議之有乎未忍肆之市朝其賜命獄所琅邪王太妃山氏舟之甥也詣闕請命丞相以太妃為言於是減死罪既出有疾見簡良為崇旬日而卒, WYG: 恨}
