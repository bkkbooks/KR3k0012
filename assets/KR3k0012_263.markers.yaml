  - {type: variant, offset: 12, length: 87, content: 西魏裴俠除河北郡守俠躬履儉素愛人如子所食唯菽麥塩菜而已吏人莫不懷之此郡舊制有漁獵夫三十人以供郡守俠曰以口腹役人吾所不為也乃悉罷之又有丁三十人供郡守役俠亦不私並收庸直為市官馬歲, SBCK: 元帝}
