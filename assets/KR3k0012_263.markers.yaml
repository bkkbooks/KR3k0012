  - {type: variant, offset: 100, length: 1928, content: 既積馬遂成群去職之日一無所取人歌之曰肥鮮不食丁庸不取裴公貞惠為世規矩北史曰宋世良為清河太守才識閑明尤善政術在郡未幾聲問甚高陽平郡移治劫盜三十餘人世良訊其情狀惟送十二人餘皆放之陽平太守魏明朗大怒云輒放吾賊及推問送者皆實放皆非明朗大服郡東南有曲堤成公一姓阻而居之群盜多萃於此人為之語曰寧度東吳會稽不歷成公曲堤良施八條制盜奔他境人又謠曰曲堤雖險賊何益但有宋公自屏跡是冬醴泉出於界內及代至傾城祖道有老人丁金剛者泣而前謝曰老人年九十記三十五政府君非唯善政清亦徹底今失賢者人何以濟莫不攀援涕泣北齊書曰赫連子悅除林慮太守文襄往晉陽由郡境問不便悅云臨水武安去郡遙遠山嶺重疊車步艱難若東屬魏郡則地平路近文襄笑曰卿徒知便人不覺損幹悅荅曰所言者又所疾苦不敢以私潤負公心文襄善之乃勑依事施行自是人屬近便行路北齊書曰崔伯謙字士遜愽陵安平人也除濟北太守恩信大行又改鞭用熟皮為之示恥而已北齊書曰蘇瓊字珍芝長樂武強人也除南清河太守性清慎不發私書陳書曰孔奐字休文除晉陵太守晉陵自宋齊已來為大郡雖經寇擾猶為全實前後二千石多行侵暴奐清白自守妻子並不之官唯以單舡臨郡所得秩俸隨即分贍孤寡郡中號曰神君曲阿富人殷綺見奐居處儉素乃餉以衣氈一具奐曰太守身居美祿何為不能辦此但百姓未周不容獨享溫飽勞卿厚意幸勿為煩隋書曰于義遷安武太守專崇德教不尚威刑有郡民張善安王叔兒爭財相訟義曰太守德薄不勝任之所致非其罪也於是取財倍與二人諭而遣去善安等各懷恥愧移語他州於是風教大洽其以德化人皆此類也又曰于仲文遷安固太守有任杜兩家各失牛後得一牛兩家俱認州郡久不能決益州長史韓伯儁曰于安固少善聽察可令決之仲文曰此易解耳於是令二家各驅牛群至乃放所認者遂向任氏群中又陰使人微傷其牛任氏唴惋杜家自若仲文於是訶詰杜氏杜氏服罪而去又曰柳儉煬帝特授朝散大夫拜弘化太守賜物一百叚而遣之儉清節愈厲大業五年入朝郡國畢集帝謂納言蘇威吏部尚書牛弘曰其中清名天下第一者為誰威等以儉對又問其次威以𣵠郡丞郭絢潁川郡丞敬肅等二人對帝賜儉帛二百疋令天下朝集使送至郡邸以旌異焉又曰車駕西巡還謂武威太守樊子蓋曰人道公清定如此不子蓋謝曰臣安敢言清止是小心不敢納賄耳由此賜之口味百餘斛唐書曰顏真卿為平原太守安祿山逆節頗著真卿以霖雨為託修城浚濠陰科丁壯儲廩實乃陽會多士泛舟於池飲酒賦詩或讒於祿山亦密偵之以為書生不足虞也無幾祿山果反河朔盡陷獨平原城守具備乃使司兵參軍李平馳奏之玄宗初聞祿山之變歎曰河北二十四郡豈無一忠臣乎得平原大喜顧左右曰朕不識顏真卿形狀何如所為得如此五代史晉史曰郭延魯清泰中遷復州守延魯臨任忽驚歎曰先人曾為沁牧九年不移我得不遵其家法而使政有紕繆者乎由是正俸之外未嘗歛貸庶事致理一郡賴焉及秩滿百姓上章舉留將離境攀臥遮圍者不能去朝廷聞而嘉之華陽國志曰張翕字子陽巴郡人為陰平郡守布衣蔬食儉以化民自乘二馬之官久之一馬死一馬病翕曰吾將步行矣夷漢甚安其惠愛在官十九年卒百姓號慕送葬以千數天子嗟歎賜錢十萬為立祠堂後太守數煩擾夷人叛亂翕子端方察孝廉天子起家拜越巂太守迎者如雲又華陽國志曰孝順帝永建中太山吳資為巴郡太守民歌之曰習習晨風動澍雨潤乎苗群后恤時務我民以優饒及資遷去民人思資又歌曰望遠忽不見惆悵當徘徊恩澤實難忘悠悠心永懷益部耆舊傳曰張霸字伯饒為會稽太守舉賢士勸教講授一郡慕化但聞誦聲又野無遺寇民語曰城上烏嗚哺父母府中諸吏皆孝子鍾岏良吏傳曰王堂字敬伯廣漢郪人也為汝南太守屬城多闇弱堂簡選四部督郵奏免四十餘人以陳蕃為功曹應嗣為主簿教曰簡覈眾職委功曹拾遺補闕仰恃明俊古人有言勞於求賢逸於得士太守不敢妄有符教崔氏家傳曰崔寔除五原太守郡處邊陲不知耕桑之業民多飢寒之患於是乃勸人農種教其織絍以賑貧窮民用獲濟號曰神惠焉桓階別傳曰上已平荊州引為主簿每有深謀疑事嘗與君籌之或日吳忘食或夜坐徹旦擢為趙郡太守會郡寮送之上曰北邊未清以卿威能震敵德懷遠人故用相煩是亦寇恂河內之舉階在郡時俸盡食醬酻上聞之數戲之曰卿家醬頗得成不耶詔曰昔子文清儉朝不謀夕而有脯糧之秩宣子守約簞食魚飱而有加梁之賜豈况光光大魏富有四海棟宇大臣而有蔬食非吾所以禮賢之意也其賜射鹿師二人并給媒齊人謂麯孽為媒江祚別傳曰祚為安南太守民思其德生子多以江名子孟宗別傳曰宗為豫章太守人思其惠路有行歌故時人之生子以孟為名邵氏家傳曰邵訓字伯春為陳留太守以君性多弘怒追詔勉厲之曰陳留太守講授省中六年于茲經術明篤有匡生解頤之風賜錢三十萬及刀劍衣服居家之具宣城記曰涇縣洪短吳時為盧江太守清稱徵還舡輕皆載土時歲暮逐除者就乞所獲甚少洪乃語之逐除人見土而去秦子曰孔文舉為北海相有遭父喪哭泣墓側色無憔悴文舉殺之有母病差思食新夌家無乃盜鄰人熟夌而進之文舉聞特賞之盜而不罪者以為勤養於母也哭而見殺者以為哀而不實也世說曰周顗罷臨川郡還都未及上泊青溪渚王, SBCK: ''}
