  - {type: variant, offset: 10, length: 43, content: 史曰西魏裴俠除河北郡守俠躬履儉素愛人如子所食唯菽麥塩菜而已吏人莫不懷之此郡舊制有漁獵夫, krp: 案户籍可得}
