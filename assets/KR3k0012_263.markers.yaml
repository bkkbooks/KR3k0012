  - {type: variant, offset: 5, length: 6, content: 良太守下北史, SBCK: 一別駕治中長吏司馬別駕應劭漢官儀}
  - {type: variant, offset: 5, length: 1, content: 良, WYG: 一别駕治中長史司馬别駕應劭漢官儀曰元帝時丞相于定國條州大小為設吏員治中别駕諸部從事秩皆百石漢書曰黄霸為揚州刺史三嵗宣帝詔賜車葢特髙一尺别駕主簿車緹油屏泥於軾前以彰有德東觀漢記曰郭伋任并州行部童兒騎竹馬迎拜問使君何日當還伋語别駕計日告之後漢書曰袁紹領冀州以審配為别駕委以腹心并摠幕府紹又以田豐為别駕豐勸迎天子紹不納及敗曰吾慙田别駕謝承後漢書曰周景為豫州辟陳蕃為别駕不就景題别駕輿曰陳仲舉座也不復更辟蕃惶懼起視職又曰陳茂豫州刺史周敞辟為别駕從事與俱行部到潁川楊翟傳傳中有置美酒一押敞去勑御騶載酒以行茂見於外取押擊柱破之敞問茂刺史年老酒益氣别駕破押名亦何益茂答曰所過皆以明使君傳車騑驂載酒非宜也魏志曰崔琰字季珪}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_263-1b, image: WYG0895/WYG0895-0356d.png}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_263-2a, image: WYG0895/WYG0895-0357a.png}
  - {type: variant, offset: 5, length: 1, content: 良, krp: 一別駕治中長吏司馬別駕應劭漢官儀曰元帝時丞相于定國條州大小爲設吏貟治中別駕諸部從事秩皆百石漢書曰黄霸爲豫州刺史三歳宣帝詔賜車蓋特髙一尺別駕主簿車緹油屏星於軾前以彰有德東觀漢記曰郭伋在并州行部童兒騎竹馬迎拜問使君何白當還伋語別駕計日告之後漢書曰袁紹領兾州以審配爲別駕委以腹心并揔幕府紹又以田豐爲別駕豐勸迎天子紹不納及敗曰吾慙田別駕謝承後漢書曰周景爲豫州辟陳蕃爲別駕不就景題別駕輿曰陳仲舉座也不復更辟蕃惶懼起視職又曰陳茂豫州刺史周敞辟爲別駕從事與俱行部到潁川陽翟傳傳中有置羙酒一押敬去勑御騶載酒以行茂見於外取押擊柱破之敞問茂刺史年老酒益氣別駕破押名亦何益茂荅曰所過皆有以明使君傳車騑驂載酒非冝也魏志曰崔琰字季珪}
  - {type: variant, offset: 7, length: 4, content: 守下北史, WYG: 祖破袁氏領冀州牧辟琰為别駕語琰}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_WYG_263-2b, image: WYG0895/WYG0895-0357b.png}
  - {type: variant, offset: 7, length: 2, content: 守下, krp: 祖破袁氏領兾州牧辟琰爲別駕語琰曰}
  - {type: xml-element, offset: 9, content: '', id: KR3k0012_CHANT_263-bkkxmlele2}
