  - {type: variant, offset: 187, length: 17, content: 陽平太守魏明朗大怒云輒放吾賊及推問, krp: 慶曰頗與人同宿乎曰無與人同飲乎曰日者曽與一沙門再度酣宴醉而晝寢慶曰主人特以痛自誣非盗也彼沙門乃眞盗耳即遣吏逮捕沙門乃懷金逃匿後捕得盡獲所失之金隋書趙軌爲齊州別駕徴入朝父老相}
