  - {type: variant, offset: 2308, length: 0, content: '', WYG: 累月未之遣也璠因侍宴太祖曰我與古誰比對曰常以公命世英主湯武莫逮今日所見曾齊桓晉文之不若太祖曰我不得比湯武望與伊周為匹何桓文之不若乎對曰齊桓存三亡國晉文不失信於伐原語未終太祖撫掌曰我解爾意欲激我耳於是即命遣循還陳書曰蕭濟為揚州長史髙宗嘗勅取揚州曹事躬自省覽見濟條理詳悉又無滯畱乃顧謂左右曰我本期蕭長史長於經傳不意精練繁劇乃至於此隋書榮毗𫝊楊素薦毗為華州長史世號為能素之田宅多在華隂左右放縱毗以法繩之無所寛貸毗因朝集素謂之曰素之舉卿適以自罰也毗答曰奉法一心者但恐累公所舉素笑曰前者戲耳卿之奉法素之望也又曰髙祖時制刺史二佐毎嵗暮更入朝上考課唐書曰張惟一為荆州長史以防禦使陳希昂為司馬希昻衡州酋帥家兵千人在}
