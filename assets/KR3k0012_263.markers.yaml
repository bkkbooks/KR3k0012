  - {type: variant, offset: 2752, length: 4, content: 減死罪既, SBCK: 即命遣循陳書曰蕭濟爲楊州長史髙宗嘗勑取楊州曹事躬自省覽見濟條理詳悉文無滯留乃頋謂左右曰我夲期蕭長史長於經傳不意精練䌓劇乃至於此隋書曰榮毗楊素薦毗爲華州長史丗號爲能素之田宅多在華隂左右放縱毗以法繩之無所寛貸毗因朝集素謂之曰素之舉卿適以自罰也毗荅曰奉法一心者但恐累公所舉素􅀏曰前者戯耳卿之奉法素之望也又曰髙祖時制刺史二佐毎􅀊暮更入朝上考課唐書曰張惟一爲荆州長史以防禦使陳希昂爲司馬希昂衡州酋帥家兵千人在部下自爲藩衛有牟遂金仕至將軍爲惟一將希昂積憾持兵領衆入惟一衙索遂金頭金藏於惟一後院惟一懼截頭遂與之兵始退自此之後政歸希昻惟一􅀉坐而巳司馬北史曰魏蘇亮拜黄門侍郎文帝子冝都王武爲􅁗州刺史以亮爲司馬帝謂亮曰黄門郎豈河爲􅁗州司馬以朕愛子}
