  - {type: variant, offset: 456, length: 2, content: 也除, krp: 爲别駕車前後舊有屏星如刺史車曲翳儀式時刺史行部發失旦怒命去之恂曰明使君發自晏而飲撤去屏星毀國舊儀此不可行別駕可去屏星不可省即投傳而去曹操別傳曰武皇帝爲兖州以畢諶爲別駕兖州亂張孟卓劫諶母弟帝見諶曰孤綏撫失和聞卿母弟爲張邈所執人情不相逺卿可去孤自遣不爲相弃諶涕泣曰當以死自効帝亦垂涕荅之諶明日便走後破下邳得諶還以爲掾王允別傳曰允仕郡民有路拂者少無行而太守王珠召以𥙷吏允犯顔固爭珠怒収允欲殺之刺史鄧盛聞而馳傳辟爲別駕從事允由是知名路拂以之廢弃管輅別傳曰趙孔耀言輅於兾州刺史裴徽即撽召輅一相見清論終日不覺疲倦天時大熱移床在庭前樹下乃至雞鳴向晨然後出自尓引輅爲別駕江氏家傳曰統字應元太傳東海王領州牧請君爲別駕與君書曰昔子師作豫州末下車辟荀慈明下車辟孔文舉貴州人士有堪此求者不知君舉髙平郗道微爲賢良陳留阮宣子爲直言}
