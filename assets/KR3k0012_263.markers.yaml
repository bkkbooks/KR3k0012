  - {type: punctuation, offset: 2609, content: 『, id: KR3k0012_CHANT_263-bkkpn703}
  - {type: variant, offset: 2609, length: 0, content: '', SBCK: 顧球時爲楊州別駕顧榮謂球曰卿速歩公孝如是超卿矣和字公孝􅁃亮集荅郭遜書曰別駕舊與刺史别乗周流宣化於萬里者其任居刺史之半安可任非其人應享與州將牋曰誨命欲求佳別駕自頃諸府大開捜延路廣海無遺蚌山亡逸璞歸數日卧思始得一人陳國有􅀽琇字惠瑛者才識可}
  - {type: variant, offset: 2610, length: 2, content: 付樊, SBCK: 經於治亂棲跱可以勸礪後進享具所服聞而未甞接顔交言也又宗令文早有名軰相與通家門素所具抑亦其次治中通典曰治中從事史一人居中治事主衆曹文書漢制也謝承後漢書曰陳禪爲州治中從事刺史爲人所劾受納􅂍賂禪當傳栲乃至笞掠無笇五毒畢加神意自􅀂辭對無屈事遂釋應劭漢官儀曰司􅀠功曹從事即治中也魏志曰審配字正南魏郡人少忠烈慷􅁣有不可犯之節􅀽紹領兾州委配腹心之任以爲治中别駕又曰太祖令曰頻年巳來不聞嘉謀豈吾開延不勤之耶自今已後諸􅁺属治中別駕常以月旦各言其失吾將覽也又曰毛玠字孝先陳留平丘人也少爲縣吏以清公稱將避亂荆州未至聞劉表政令不明遂住魯陽太祖臨兖州辟爲治中從事蜀志曰龐統以從事守耒陽令不治免官魯肅遺先主書曰龐士元非百里之才使處治中別駕之任始當展其􅂹足耳乃以爲治中江表傳曰孫權尅荆州將吏悉皆歸附而潘濬獨稱疾不見權遣人以床就家轝致之濬伏面着床席涕泣交横權至慰勞與語使親近以手巾拭其面濬起下地拜謝即以爲治中王隱晉書曰唐彬檄爲治中別駕忠肅公亮匡救違闕盡規誨以納善不顯諌以彰主當朝正色焉又曰譙郡太守李詮稱散吏後竟爲治中檀道鸞晉紀曰習鑿齒少愽渉才情秀逸桓温竒之自州從事歳中三轉至治中梁書曰蕭洽爲南徐州治中旣近畿重鎮吏數千人前後居之者皆致巨富洽爲之清身率職饋遺一無所受妻子不免飢寒又曰陸襄字師卿爲楊州治中襄}
