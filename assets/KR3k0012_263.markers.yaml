  - {type: variant, offset: 2290, length: 276, content: 九月至郡令具私馬五十疋驛自河內至長安部吏如廣平時方略捕郡中豪滑相連坐千餘家上書請大者至族小者乃死家盡沒入贓奏行不過二日得可事論報至流血十餘里河內皆怪其奏以為神速盡十二月郡無犬吠之盜其頗不得失之旁郡追求會春溫舒頓足歎曰嗟乎令冬月益展一月足吾事矣又曰嚴延年字次卿東海人為𣵠郡太守大姓西高氏東高氏自郡吏已下皆畏避之莫敢與牾咸曰寧負二千石無負豪太家賓客放為盜賊發輒入高氏吏不敢追延年至遣掾蠡吾趙繡案高氏得其死罪繡見延年為兩劾欲先白其輕者觀延年意延年已先知之趙掾至白其輕者延年索懷中得重劾即收送獄夜入晨殺吏分栲兩高窮竟其姦誅殺各數人郡中震恐道不拾遺三歲遷河內太守, SBCK: 彰有德}
