  - {type: variant, offset: 55, length: 0, content: '', WYG: 萬衆故為大州也琰曰今天下分崩九州幅裂二袁兄弟親尋干戈冀方蒸庶暴骨原野未聞王師仁聲先路存問風俗救其塗炭而計校甲兵惟此為先斯豈彼州士女所望於明公哉太祖改容謝之于時賓客皆為失色又曰李膺自蜀使至郡武帝恱之謂曰今李膺何如昔對曰今勝昔問其故對曰昔事桓靈之主今逢堯舜之君帝嘉其對以如意擊席者久之乃以為益州别駕又曰王基字伯輿東萊}
  - {type: page-break, offset: 55, content: '', id: KR3k0012_WYG_263-3a, image: WYG0895/WYG0895-0357c.png}
  - {type: variant, offset: 55, length: 0, content: '', krp: 萬衆故爲大州也琰曰今天下分崩九州幅裂二袁兄弟親㝷干戈兾方蒸庻暴骨原野未聞王師仁聲先路存問風俗救其塗炭而計校甲兵唯此爲先斯豈彼州士女所望於明公哉太祖改容謝之于時賔客皆復失色又曰李膺自蜀使至都武帝恱之謂曰今李膺何如昔對曰今勝昔問其故對曰昔事桓靈之主今逢尭舜之君帝嘉其對以如意擊席者乆之乃以爲益州別駕又曰王基字伯輿東萊}
  - {type: variant, offset: 56, length: 0, content: '', WYG: 時青土初定刺史王凌表請基為别駕凌流稱青土葢亦由基協和之輔也吳書曰陸遜為右護軍鎭西將軍權嘉遜功德欲殊顯之雖為上將列侯猶欲令厯本州舉命乃使揚州牧吕範就辟别駕從事晉書曰王祥徐州刺史吕䖍檄為别駕祥乃應召䖍委}
  - {type: variant, offset: 56, length: 0, content: '', krp: 時青土𥘉定刺史王陵表請基爲別駕陵流稱青土盖亦由基恊和之輔也吴書曰陸遜爲右護軍鎮西將軍權嘉遜功德欲殊顯之雖爲上將列侯猶欲令歷本州舉命乃使楊州牧吕範就辟別駕從事晉書曰王祥徐州刺史吕䖍撽爲別駕祥乃應召虔委}
  - {type: variant, offset: 57, length: 18, content: 供郡守俠曰以口腹役人吾所不為也乃悉罷, WYG: 州事于時冦盜充斥祥率勵兵士頻討破}
