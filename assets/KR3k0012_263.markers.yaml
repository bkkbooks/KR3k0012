  - {type: punctuation, offset: 1466, content: 「, id: KR3k0012_CHANT_263-bkkpn391}
  - {type: variant, offset: 1466, length: 364, content: 王堂字敬伯廣漢郪人也為汝南太守屬城多闇弱堂簡選四部督郵奏免四十餘人以陳蕃為功曹應嗣為主簿教曰簡覈眾職委功曹拾遺補闕仰恃明俊古人有言勞於求賢逸於得士太守不敢妄有符教崔氏家傳曰崔寔除五原太守郡處邊陲不知耕桑之業民多飢寒之患於是乃勸人農種教其織絍以賑貧窮民用獲濟號曰神惠焉桓階別傳曰上已平荊州引為主簿每有深謀疑事嘗與君籌之或日吳忘食或夜坐徹旦擢為趙郡太守會郡寮送之上曰北邊未清以卿威能震敵德懷遠人故用相煩是亦寇恂河內之舉階在郡時俸盡食醬酻上聞之數戲之曰卿家醬頗得成不耶詔曰昔子文清儉朝不謀夕而有脯糧之秩宣子守約簞食魚飱而有加梁之賜豈况光光大魏富有四海棟宇大臣而有蔬食非吾所以禮賢之意也其賜射鹿師二人并給媒齊人謂麯孽為媒江祚別傳曰祚為安南太守民思其德生子多以江名子孟宗別傳曰宗為豫章太守人思其惠路有行歌故時人之生子以孟為名邵氏家傳曰邵訓, WYG: 張彦}
