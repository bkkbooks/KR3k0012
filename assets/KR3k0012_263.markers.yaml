  - {type: variant, offset: 2571, length: 3, content: 樊曄為, SBCK: 郭伋在并州行部童兒􅀐竹馬迎拜問使君何白當還伋語別駕計日告之後漢書曰􅀽紹領兾州以審配爲別駕委以腹心并揔幕府紹又以田豐爲別駕豐勸迎}
  - {type: variant, offset: 2575, length: 0, content: '', SBCK: 子紹不納及敗曰吾慙田別駕謝承後漢書曰周景爲豫州辟陳蕃爲別駕不就景題別駕輿曰陳仲舉座也不復更辟蕃惶懼起視職又曰陳茂豫州刺史周敞辟爲別駕從事與俱行部到潁川陽翟傳傳中有置羙酒一押敬去勑御騶載酒以行茂見於外取押擊柱破之敞問茂刺史年老酒益氣別駕破押名亦何益茂荅曰所過皆有以明使君傳車騑驂載酒非冝也魏志曰崔琰字季珪太祖破􅀽氏領兾州牧辟琰爲別駕語琰曰北案户籍可得三十萬衆故爲大州也琰曰今天下分崩九州幅裂二􅀽兄弟親㝷干戈兾方蒸庻􅁀骨原野未聞王師仁聲先路存問風俗救其塗炭而計校甲兵唯此爲先斯豈彼州士女所望於明公哉太祖改容謝之于時賔客皆復失色又曰李膺自蜀使至都武帝恱之謂曰今李膺何如昔對曰今勝昔問其故對曰昔事桓靈之主今逢尭舜之君帝嘉其對以如意擊席者乆之乃以爲益州別駕又曰王基字伯輿東萊人時青土􅀄定刺史王陵表請基爲別駕陵流稱青土盖亦由基恊和之輔也吴書曰陸遜爲右護軍鎮西將軍權嘉遜功德欲殊顯之雖爲上將列侯猶欲令歷本州舉命乃使楊州牧吕範就辟別駕從事晉書曰王祥徐州刺史吕䖍撽爲別駕祥乃應召虔委以州事于時寇盗充斥祥率勵兵士頻討破之州界清靖政化大行時人歌之曰海沂之康實頼王祥􅀖國不空別駕之功鄧粲晉紀曰王澄爲荆州宗厥以酒色禮澄澄叱左右捽之別駕郭舒厲色曰使君醉澄曰狂邪枉我醉因炙舒眉晉中興書曰􅀄魏徐州刺史任城吕虔有佩刀工相之以爲必三公可服此刀虔語別駕王祥曰茍非其人刀或爲害卿有公輔之量故以相與祥始辭之虔強與乃受祥死之日以刀授弟覽曰吾兒凢汝後必興足稱此刀故以相與又曰長沙鄧粲髙㓗著名桓冲召粲爲別駕粲起就職時南郡劉尚公亦治操不仕粲旣就職尚公語粲曰卿道廣學深衆所推懷忽然改節誠失所望粲􅀏荅曰足下可謂有志於隱而未知隱之爲道朝亦可隱市亦可隱􅀄在我不在於物尚公無以難之雖然粲名譽解半矣又曰鄧騫字長眞長沙人也譙王承爲魏乂所敗乂求騫甚急郷人爲懼騫􅀏曰欲用我耳乃往詣乂喜謂曰君可謂古之解楊也以爲別駕續晉安帝紀曰益州刺史李邈微時居漢川與別駕姜顯餞送刺史顯忽邈邈曰大丈夫何至守偏地爲姜顯所陵即不復還家仍附舡下自是十五年而鎮梁漢顯猶拪遟即撽爲别駕後周書曰栁慶爲雍州別駕有賈人持金二十斤詣京師交易􅀉人停止毎欲出行常自執管鑰無何緘閉不異而失之謂是主人所􅀼郡縣訊問主人遂自誣服慶聞而歎之乃問賈人曰卿鑰恒置何處對曰􅁪自帶之慶曰頗與人同􅀫乎曰無與人同飲乎曰日者曽與一沙門再度酣宴醉而晝寢慶曰主人特以痛自誣非盗也彼沙門乃眞盗耳即遣吏逮捕沙門乃懷金逃匿後捕得盡獲所失之金隋書趙􅁤爲齊州別駕徴入朝父老相送者各揮涕曰別駕在官}
