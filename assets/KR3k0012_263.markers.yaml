  - {type: variant, offset: 2595, length: 0, content: '', SBCK: 以壷酒}
  - {type: variant, offset: 2596, length: 2, content: 盜啇, SBCK: 送公清􅀂水請酌一杯水奉餞􅁤授而飲之唐書曰德宗命王䖍休幕客昭義軍節度掌書記盧頊爲洺州別駕知州事賜緋魚袋賞有功也時元􅁩據洺州頊白於虔休請入城􅀃下之頊見􅁩爲陳利害􅁩請隨頊歸朝故頊不次授官三輔决録曰蘇章爲兾州刺史召安平崔瑗爲別駕豫章列士傳曰孔恂字巨卿新淦}
  - {type: variant, offset: 2596, length: 5, content: 盜啇人行旅, krp: 委勿}
