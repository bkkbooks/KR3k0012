  - {type: variant, offset: 938, length: 411, content: 車駕西巡還謂武威太守樊子蓋曰人道公清定如此不子蓋謝曰臣安敢言清止是小心不敢納賄耳由此賜之口味百餘斛唐書曰顏真卿為平原太守安祿山逆節頗著真卿以霖雨為託修城浚濠陰科丁壯儲廩實乃陽會多士泛舟於池飲酒賦詩或讒於祿山亦密偵之以為書生不足虞也無幾祿山果反河朔盡陷獨平原城守具備乃使司兵參軍李平馳奏之玄宗初聞祿山之變歎曰河北二十四郡豈無一忠臣乎得平原大喜顧左右曰朕不識顏真卿形狀何如所為得如此五代史晉史曰郭延魯清泰中遷復州守延魯臨任忽驚歎曰先人曾為沁牧九年不移我得不遵其家法而使政有紕繆者乎由是正俸之外未嘗歛貸庶事致理一郡賴焉及秩滿百姓上章舉留將離境攀臥遮圍者不能去朝廷聞而嘉之華陽國志曰張翕字子陽巴郡人為陰平郡守布衣蔬食儉以化民自乘二馬之官久之一馬死一馬病翕曰吾將步行矣夷漢甚安其惠愛在官十九年卒百姓號慕送葬以千數天子嗟歎賜錢十萬為立祠堂後太守數煩擾夷人叛亂翕子端方察孝廉天子起家拜越巂太守迎者如雲又華陽國志曰孝順帝永建中太山吳資為巴, WYG: 譙}
