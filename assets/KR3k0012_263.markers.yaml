  - {type: variant, offset: 118, length: 1, content: 肥, WYG: 海沂之康實賴王祥邦國不空别駕之功鄧粲晉記曰王澄為荆州刺史士人宗廞以酒忤澄澄叱左右棒之别駕郭舒厲色曰使君醉澄曰狂邪誑言我醉因炙舒眉晉中興書曰初魏徐州刺史任城吕䖍有佩刀工相之以為必三公可服此刀䖍語别駕王祥曰苟非其人刀或為害卿有公輔之量故以相與祥始辭之䖍強與乃受祥死之日以刀授弟覽曰吾兒凡汝後必興足稱此刀故以相與又曰長沙鄧粲髙潔著名桓沖召粲為别駕粲起就職時南郡劉尚公亦治操不仕粲既就職尚公語粲曰卿道廣學深衆所推懷忽然改節誠失所望粲笑答曰足下可謂有志於隱而未知隱之為道朝亦可隱市亦可隱初在我不在於物尚公無以難之雖然粲名譽}
