  - {type: variant, offset: 145, length: 9, content: 才識閑明尤善政術在, krp: 偏地爲姜顯所陵即不復還家仍附舡下自是十五年而鎮梁漢顯猶拪遟即撽爲别駕後周書曰栁慶爲雍州別駕有賈人持金二十斤詣京師交易寄人停止毎欲出行常自執管鑰無何緘閉不異而失之謂是主人所竊}
