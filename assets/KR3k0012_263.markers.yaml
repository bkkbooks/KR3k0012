  - {type: variant, offset: 121, length: 3, content: 食丁庸, krp: 空別駕之功鄧粲晉紀曰王澄爲荆州宗厥以酒色禮澄澄叱左右捽之別駕郭舒厲色曰使君醉澄曰狂邪枉我醉因炙舒眉晉中興書曰𥘉魏徐州刺史任城吕虔有佩刀工相之以爲必三公可服此刀虔語別駕王祥曰茍非其人刀或爲害卿有公輔之量故以相與祥始辭之虔強與乃受祥死之日以刀授弟覽曰吾兒凢汝後必興足稱此刀故以相與又曰長沙鄧粲髙㓗著名桓冲召粲爲別駕粲起就職時南郡劉尚公亦治操}
