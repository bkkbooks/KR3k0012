  - {type: variant, offset: 733, length: 100, content: 牛後得一牛兩家俱認州郡久不能決益州長史韓伯儁曰于安固少善聽察可令決之仲文曰此易解耳於是令二家各驅牛群至乃放所認者遂向任氏群中又陰使人微傷其牛任氏唴惋杜家自若仲文於是訶詰杜氏杜氏服罪而去又曰柳儉煬帝特授, WYG: 當}
