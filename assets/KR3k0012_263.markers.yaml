  - {type: variant, offset: 2309, length: 12, content: 吏如廣平時方略捕郡中豪滑, WYG: 下自為藩衞有牟遂金仕至將軍為惟一將希昻積憾持兵領衆入惟一衙索遂金頭遂金藏於惟一後院惟一懼截遂金頭與之兵始退自此之後政歸希昻惟一寄坐而已司馬北史曰魏蘇亮拜黄門侍郎文帝子冝都王武為秦州刺史以亮為司馬帝謂亮曰黄門郎豈可為秦州司馬以朕愛子出藩故以心腹}
