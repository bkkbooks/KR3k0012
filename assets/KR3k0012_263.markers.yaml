  - {type: variant, offset: 2599, length: 0, content: '', SBCK: 爲别駕車前後舊有屏星如刺史車曲翳儀式時刺史}
  - {type: variant, offset: 2600, length: 1, content: 旅, SBCK: 部發失旦怒命去之恂曰明使君發自晏而飲撤去屏星毀國舊儀此不可行別駕可去屏星不可省即投傳而去曹操別傳曰武皇帝爲兖州}
  - {type: variant, offset: 2602, length: 2, content: 錢物, SBCK: 畢諶爲別駕兖州亂張孟卓劫諶母弟帝見諶曰􅀌綏撫失和聞卿母弟爲張邈所執人情不相逺卿可去􅀌自遣不爲相弃諶涕泣曰當以死自効帝亦垂涕荅之諶明日便走後破下邳得諶還以爲􅁺王允別傳曰允仕郡民有路拂者少無行而太守王珠召以􅀘吏允犯顔固爭珠怒収允欲殺之刺史鄧盛聞而馳傳辟爲別駕從事允由是知名路拂以之廢弃管輅別傳曰趙孔耀言輅}
  - {type: page-break, offset: 2602, content: '', id: KR3k0012_SBCK_263-4a}
  - {type: variant, offset: 2602, length: 166, content: 錢物於大道旁曰以付樊父後還其物如故道不拾遺涼州為之語曰遊子常苦貧力子天所富寧見乳虎穴不入冀城寺嗟我樊府君安可再遭值晉陽秋曰廬陵太守羊舟疑郡人簡良等為賊殺一百九十人徒讁百有餘人有司奏舟罪死以景獻皇后有屬八議帝曰此古人所無何八議之有乎未忍肆之市朝其賜命獄所琅邪王太妃山氏舟之甥也詣闕請命丞相以太妃為言於是減死罪既出有疾見簡良為崇旬日而卒, krp: 爲恨}
  - {type: variant, offset: 2605, length: 0, content: '', SBCK: 兾州刺史裴徽即撽召輅一相見清論終日不覺疲倦天時}
  - {type: variant, offset: 2606, length: 0, content: '', SBCK: 􅀬移床在庭前樹下乃至雞鳴向晨然後出自尓引輅爲別駕江氏家傳曰統字應元太傳東海王領州牧請君爲別駕與君書曰昔子師作豫州末下車辟荀慈明下車辟孔文舉貴州人士有堪此求者不知君舉髙平郗}
  - {type: variant, offset: 2607, length: 1, content: 旁, SBCK: 微爲賢良陳留阮宣子爲直言濟北程弘叔爲方正皆於時選爲允顧和別傳}
  - {type: page-break, offset: 2607, content: '', id: KR3k0012_SBCK_263-4b}
