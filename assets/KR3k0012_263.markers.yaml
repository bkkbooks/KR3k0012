  - {type: variant, offset: 128, length: 7, content: 貞惠為世規矩北, krp: 語粲曰卿道廣學深衆所推懷忽然改節誠失所望粲笑荅曰足下可謂有志於隱而未知隱之爲道朝亦可隱市亦可隱𥘉在我不在於物尚公無以難之雖然粲名譽解半矣又曰鄧騫字長眞長沙人也譙王承爲魏乂所敗乂求騫甚急郷人爲懼騫笑曰欲用我耳乃往詣乂喜謂曰君可謂古之解楊也以爲別駕續晉安帝紀曰益州刺}
