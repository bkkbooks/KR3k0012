  - {type: variant, offset: 1583, length: 0, content: '', WYG: 肅趨進曰未也衆人聞之無不愕然就坐徐舉鞭曰願至尊威加乎四海總括九州克成帝業更以安車蒲輪徴肅始當}
  - {type: variant, offset: 1584, length: 398, content: 其言馳使以問楊主簿德祖應聲荅與帝正同眾伏其辯悟異苑曰河南禇襃字季野將北伐軍士忽同時唱言可各持兩楯復相謂曰一人焉用兩為及敗悉負櫓而退國語曰桓公問曰齊國寡甲兵為之若何管子曰輕過而移諸甲兵賈逵曰輕過輕罪也移諸甲兵以甲兵贖罪也桓公曰為之若何管子對曰輕罪贖一楯一戟潛夫論曰虜或持銅鏡以象兵或負板案以類楯遑遽擾攘未能相一誠易制也淮南子曰夫栝淇衛箘簬音路高誘曰栝翦栝也淇衛箘簬箭所出也載以銀錫戴飾也飾翦以銀錫雖有薄縞之䄡腐荷之櫓荷蓮草也櫓大楯也然猶不能獨穿也若假之䈥角之力弓弩之勢則貫兕甲而經革楯矣經猶達也楊泉物理論曰古有阮師之刀蘇家之楯皆為良工利器時所寶貴也夫刀者身之寶也楯者身之衛也禦難之藩牆守之城池也夢書曰夢得鑲楯憂相負也漢書揚雄校獵賦曰賁育之倫蒙楯負羽杖鏌鋣而羅者以萬計吳都賦曰杭神龍之華殿施榮盾而捷獵勾踐將伐吳作榮盾嬰以白壁鏤以黃金狀若龍蛇以獻吳王吳王受之施於姑蘇臺捷獵例北皃也言今起神龍殿亦施此物也, WYG: 耳權拊掌欣笑}
