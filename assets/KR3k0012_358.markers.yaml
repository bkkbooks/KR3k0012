  - {type: variant, offset: 669, length: 8, content: 交阯朱鳶縣有檳榔, SBCK: 放鞚長騁神足奔越終節三驅每不虚發陳林武庫賦曰馬則飛雲絶景直鬐騧駠走駿驚飈歩象雲浮受銜斯遊歛鞚則止􅀓玄良馬賦曰奮舋沛艾虎據麟跱望雲睇景乗虚四起縱銜則徃攬鞚則止成公綏射兎賦曰収輔車之􅀟轡舎良馬之長鞚禽迅羽之輕焱截逸足之狡弄盈得獲於後乗充庖厨之所貢夏侯湛征邁辭曰上伊闕􅀆臨川柎駿馬􅀆授鞍中衢􅀆載歎歛鞚􅀆盤桓閔鴻與劉子雅書曰􅀂能控奔􅂹以接駑乗則力追者萬群傾脩翅以頋短翮則歸飛者如雲勒劉芳毛詩箋音義證曰轡是御者所執者也不得以轡爲勒且舊語云馬勒不云轡以勒爲轡者蓋是北人避石勒名也今南人皆云馬勒而以鞚爲轡反覆推之此爲明證又詩稱執轡如組又曰六轡在手以所執爲轡審矣今俗儒咸以轡爲勒而曽無寤者家語曰閔子問政於孔子孔子曰不能御民者弃其德法專用刑辟譬猶御馬弃其銜勒而專用箠䇿馬必傷車必敗無德法而用刑民必流國必亡漢書曰呼韓耶單于甘露三年}
