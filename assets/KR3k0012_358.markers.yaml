  - {type: variant, offset: 2849, length: 123, content: 帝使沈攸等伐之於是龍驤將軍卜天生推車塞壍率敢死數百人銜枚先登習鑿齒漢晉陽秋曰初魏軍始入蜀劉禪分二千人付羅獻留守吳聞蜀敗遂起兵遣盛憲謝詢等水陸並到說獻以合從之計獻謂諸將曰今處孤城百姓無主吳人因釁公敢西過宜一決戰以示眾心遂銜枚夜出擊破憲盧綝晉四王起事, SBCK: 館賦}
