  - {type: variant, offset: 588, length: 5, content: 才京兆新豐, SBCK: 防鏤鞍明珂景服華采鮮古樂府左延年從軍詩曰從軍何等樂一驅乗􅀟駮鞍馬照人目龍驤自動作謝惠連詩曰挂鞍長林側飲馬脩川湄劉琨扶風歌曰繫馬長松下發鞍髙岳頭魏曹植上銀鞍表曰於光武皇帝代効此銀鞍一具􅀄不敢乗謹奉上宋劉義恭謝金梁鞍啓曰賜臣供御金梁橋鞍制作精巧冝副龍駟聖慈下逮猥垂光賜後漢李尤鞍銘曰驅騖馳逐騰躍覆跩雖其捷習亦有顛沛井羸其瓶罔不斯敗跩丑丗切轡釋名曰轡佛也言牽引佛戾以制馬也詩曰我馬維駒六轡如濡又曰我馬維駱六轡沃􅀂又曰駟鐵孔阜六轡在手周禮曰挈壷氏挈轡以令舎懸轡於當所舎止之處又曰大馭掌馭玉路以祀及犯軷王自左馭馭下祝登受轡犯軷遂驅之家語曰古者天子以内史爲左右手以德法爲銜勒以百官爲轡善御馬者正銜勒齊轡䇿均馬力和馬心故口無聲而馬應轡䇿不舉而極千里善御人者一其徳法正其百官均齊人力和安人心故令不再而人順從刑不用而天下理矣又曰善御馬者正身以緫轡又曰閔子騫爲費宰問政於孔子孔子曰君者}
