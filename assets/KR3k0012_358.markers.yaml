  - {type: variant, offset: 3902, length: 0, content: '', WYG: 制長而見羈雖飾以金鑣饗以嘉肴愈思長林而志在豐草魯國先賢志曰黄伯仁龍馬頌曰揚鑣鸞兮揮紅沫之播飄鹽鐡論曰古}
  - {type: variant, offset: 3903, length: 1, content: 刑, WYG: 庻人賤騎繩控草提皮薦而已及其後革鞍攻成鐡鑣不飾又曰古者樵車無輪棧車無􅦫其後木鈴不衣長轂敗幅今富者銀黄華左搔以結緌錯鑣塗朱珥靳飛軨楚辭曰絶鑣銜以馳騖兮暮着次而敢止路蕩蕩其無人兮逺不御兮千里棗據詩曰貞偽各有分駑驥不齊鑣陶琬}
  - {type: page-break, offset: 3903, content: '', id: KR3k0012_WYG_358-13a, image: WYG0896/WYG0896-0201c.png}
