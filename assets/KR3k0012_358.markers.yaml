  - {type: variant, offset: 586, length: 1, content: 字, SBCK: 行令取家間髑髏著忠繫馬鞍以爲嬉􅀏吴志曰曹公破走魯肅先還權大請諸將肅將入閤拜權起禮之謂曰子敬􅀌持鞍下馬相迎足以顯卿未肅趨進曰未也衆人聞之無不愕然就坐徐舉鞭曰願至尊威加乎四海揔括九州克成帝業更以安車蒲輪徴肅始當顯耳權拊掌欣􅀏又曰孫權每田獵乗馬射虎甞突前攀持馬鞍張昭變色而前曰將軍何有當尔夫爲人君者謂能駕禦英雄驅使群臣豈謂馳逐於原野挍勇於猛獸者乎如有一旦之患奈天下􅀏何後魏書曰􅀓永有氣幹拳勇過人能手執鞍橋倒立馳騁江表傳曰孫䇿討祖郎生􅀗之䇿謂郎曰尔昔斫􅀌馬鞍今創軍立事除棄􅀫恨汝莫怨怖郎叩頭謝罪即破械賜衣署門下賊曹魏百官名曰紫茸題頭髙橋鞍一具三輔决録曰平陵士孫􅁬冨聞京師梁兾知􅁬儉恡以鏤衢鞍遺􅁬從貸五十萬西京雜記曰武帝時身毒國獻白光琉璃鞍在暗室光照十丈又曰武帝得貳師天馬造玟㻁石爲鞍異苑曰昔有人乗馬山行遥望岫裏有二老公相對樗蒲遂下􅀐造焉以䇿柱地而觀之自謂俄頃視其馬鞭漼然巳爛頋瞻其馬鞍體骸枯朽旣還至家無復親属一慟而絶六韜曰車􅀐之將軍馬不具鞍勒不備者誅陸景典語曰周丗以膏􅃾之沃壤豐鎬之寳地大啓封境以封􅁗釋鞍授鞚假􅂹他人欲無陵巳其可得乎􅀓玄馬射賦曰百馬齊興六􅂹孔閑金銜玉羈}
