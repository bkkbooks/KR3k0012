  - {type: variant, offset: 1761, length: 5, content: 淇衛箘簬箭, SBCK: 㢮舎也便習也􅀃苑曰田子方度西河造翟黄翟黄乗軒車載華蓋黄金之勒約鎭簟席如此者具駟八十乗子方望以爲人君翟黄至而子方曰子人臣也將何以至此對曰此皆君之賜也臣進五大夫禄爵倍以故至於此韓陽天文要集曰造父五星在傳舎南造父洗馬轡勒銜鑣􅀥據詩曰騏􅂹伏呉坂不與伯樂俱駑馬同銜勒豈得獨卓殊魏文帝馬腦勒賦曰馬腦玉属也出自西域文理交錯有似馬腦故其方人因以名之或以繫頸或以􅅚勒余有斯勒美而賦之命陳琳王粲並作詞曰天珎物􅀉鍾山之崇崗禀金德之靈施含白虎之華章扇朔方之玄氣喜南離之焱陽翕中區之黄采曜東夏之純蒼苞五色之明麗配皎日之流光内炤音照浮景外鮮文繁竒章異采的皪其間尔乃藉彼朱􅄢華勒用成駢居列跱煥􅀂羅星應瑒馳射賦曰群駿籠茸於衡首咸皆腰􅙂與飛免攏脩勒而容與並軒翥而厲怒陳琳馬腦勒賦曰五官將得馬腦以爲寳勒美其英綵之光艶也使琳賦之􅈛乃他山爲錯荆和爲理制爲寳勒以御君子王粲馬腦勒賦曰因姿象形匪彫匪刻厥容應規厥性順徳御丗嗣之駿服􅀆表騄􅂹之儀式王沉馬腦勒賦曰厥象伊何如規之盈鮫鱗紆鬰白黒殊形如水之㓗如玉之貞固乾坤之}
