  - {type: variant, offset: 2875, length: 237, content: 銜枚先登習鑿齒漢晉陽秋曰初魏軍始入蜀劉禪分二千人付羅獻留守吳聞蜀敗遂起兵遣盛憲謝詢等水陸並到說獻以合從之計獻謂諸將曰今處孤城百姓無主吳人因釁公敢西過宜一決戰以示眾心遂銜枚夜出擊破憲盧綝晉四王起事曰天子自鄴至洛右將軍張方逼帝幸長安河間王率參佐到羈水上迎人兵去路百餘步銜枚屯列崔鴻後秦錄曰永和二年遣武衛姚鸞營于大路晉將沈林子簡其軍中精銳朱遠等銜枚夜襲鸞營鸞死之又前涼錄曰張璩字元琰年十四拜奉車都尉從梁肅征隴右與王擢遇於邢崗相拒十日璩銜枚密擊大破之由是顯名又蜀錄曰李特使弟驤屯軍毗, WYG: 能手執鞍}
