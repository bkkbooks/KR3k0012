  - {type: variant, offset: 3868, length: 0, content: '', WYG: 呼韓耶單于甘露三年正月朝天子於甘泉宫賜以冠帶衣裳玉具劒安革勒一具馬十五疋王隠晉書曰愍懷太子好卑車小馬小牛令左右騎斷羈勒使墮地蕭方等三十國春秋曰凉州胡安據盗發張駿墓得珊瑚馬鞭馬腦鍾黄金勒鄴中記曰虎韓勒呼馬勒曰轡羅勒曰香菜永昌記曰哀牢王出入射獵騎馬金銀鞍勒如翠毛之飾}
  - {type: page-break, offset: 3868, content: '', id: KR3k0012_WYG_358-10a, image: WYG0896/WYG0896-0200a.png}
  - {type: variant, offset: 3870, length: 2, content: 厲王, WYG: 子曰鴈門之北狄不糓食賤}
  - {type: punctuation, offset: 3873, content: ，, id: KR3k0012_CHANT_358-bkkpn1149}
  - {type: 'tls:seg', offset: 3873, content: '', id: KR3k0012_CHANT_358-56a.4}
  - {type: variant, offset: 3873, length: 1, content: 高, WYG: 貴壯各上氣力人不弛弓馬不解勒便之也説苑曰田子方度西河造翟黄翟黄乘軒車載華蓋黄金之勒約鎮簟席如此者具駟十八乘子方望以為人君翟黄至而子方曰子人臣也將何以至此對曰此皆君之賜也臣進五大夫禄爵倍以故至如此韓陽天文要集曰造父五星在傳舎南造父洗馬轡勒銜鑣棗據詩曰騏驥伏吳坂不與伯樂俱駑馬同銜勒豈得獨卓殊魏文}
  - {type: page-break, offset: 3873, content: '', id: KR3k0012_WYG_358-10b, image: WYG0896/WYG0896-0200b.png}
  - {type: variant, offset: 3875, length: 2, content: 少子, WYG: 馬腦勒賦曰馬腦玉屬}
  - {type: punctuation, offset: 3878, content: 。, id: KR3k0012_CHANT_358-bkkpn1150}
  - {type: 'tls:seg', offset: 3878, content: '', id: KR3k0012_CHANT_358-56a.5}
  - {type: variant, offset: 3878, length: 0, content: '', WYG: 出自西域文理交錯}
  - {type: variant, offset: 3879, length: 13, content: 才力力扛鼎乃往請辟陽侯出見, WYG: 似馬腦故其方人因以名}
