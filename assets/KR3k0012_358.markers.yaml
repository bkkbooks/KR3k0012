  - {type: variant, offset: 2260, length: 588, content: 曰勿猶無也女制彼裳衣而來謂兵服也示初無行陳銜枚之事也禮記曰升正柩諸侯執綍五百人皆銜枚周禮曰銜枚氏下士二人徒八人鄭玄曰枚狀如箸橫銜之銜枚氏掌司囂察囂謹者為其聒亂國之大祭祀令禁毋囂軍旅田役令銜枚為其言語以相誤也國語曰吳正起師軍于江北越王軍于江南越王乃令左軍銜枚泝江五里以須亦令右軍銜枚踰江五里以須賈逵曰逆流而上曰泝徑渡曰踰須待也夜中乃令涉江鳴鼓中水以須越王以其中軍私率六千人銜以襲攻之吳師大北史記曰項梁率師攻秦秦使章邯距梁章邯夜銜枚擊楚殺項梁陸賈楚漢春秋曰高祖向咸陽南趣宛宛堅守不下乃匿其旌旗人銜枚馬束口龍舉而翼奮雞未鳴圍宛城三匝宛城降漢書曰秦將章邯圍魏王咎於臨濟田儋都甘切將兵救魏章邯夜銜枚擊大破齊軍煞儋於臨濟下又曰趙充國擊西羗至金城須兵滿萬騎欲渡河恐為虜所遮即夜遣三校銜枚先渡渡輒營陣會明畢東觀漢記曰吳漢伐蜀分營於水南水北北營戰不利乃銜枚引兵往合水南營大破公孫述梁祚國統曰孫權嘗賜甘寧酒米寧以米賜帳下乃以銀椀酌酒自飲次與其郡督次酌其次命銜枚出斫敵王隱晉書曰母丘儉文欽反遣鄧艾進屯樂嘉欽果夜銜枚襲艾等昧爽至于城下又曰王浚都督幽州諸軍事成都王使和演發兵殺浚單于以演謀告浚州府逼近銜枚密嚴夜與單于圍演演持白幡請降孫嚴宋書曰柳元景揔軍北討元景至弘農營於開方口眾軍並造陜下元景遣軍副柳元怙簡步騎二千一宿而至遂合戰元怙悉偃旗鼓士馬皆銜枚潛師伏甲而進既出賊不意虜眾大駭王智深宋書曰劉誕作亂孝, SBCK: ''}
