  - {type: 'tls:seg', offset: 3893, content: '', id: KR3k0012_CHANT_358-56a.8}
  - {type: variant, offset: 3893, length: 6, content: 即自袖金椎椎, WYG: 或以繫頸或以飾勒余有斯勒美而賦}
  - {type: punctuation, offset: 3900, content: ，, id: KR3k0012_CHANT_358-bkkpn1154}
  - {type: 'tls:seg', offset: 3900, content: '', id: KR3k0012_CHANT_358-56a.9}
  - {type: variant, offset: 3901, length: 0, content: '', WYG: 陳琳王粲並作詞曰夫珍物寄中山之崇崗稟金德之靈施含白虎之華章扇朔方之𤣥氣喜南離之焱陽歙中區之黄彩曜東夏之純蒼苞五色之明麗配皎日之流光内炤浮景外鮮文繁竒章異彩的爍其間爾乃藉彼朱􅄢華勒用成駢居列跱煥若羅星應瑒馳射賦曰群駿籠茸於衡首咸皆腰䮍與飛兔隴修勒而容與並軒翥而厲怒陳琳馬腦勒賦曰五官將得馬腦以為寳勒美其英綵之光艶也使琳賦之爾乃他山為錯荆和為理制為寶勒以御君子王粲馬腦勒賦曰因姿象形匪彫匪刻厥容應規厥性順御世嗣之駿服兮表騄驥之儀王沉馬腦勒賦曰厥象伊何如規之盈鮫鱗紆鬰白黒殊形如氷之㓗如玉之貞固乾坤之所育兮匪雕鏤而自成爾乃施飾龍首加服鸞鑣和鈴鏘鏘廻景逍遥鑣釋名曰鑣包也所以在傍苞鈒其口也說文曰鑣馬銜也銜馬勒口中也爾雅曰鑣謂之钀詩曰游於北園四馬既閑輶車鸞鑣載獫歇驕毛萇曰輶軒也獫歇驕田犬也鄭𤣥曰軒車驅逆之車也置月於鹿者異於乗車也釋智匠古今樂録曰明帝休成之樂歌曰玉鑣息節金輅懷音文士傳曰山巨源為吏部郎欲舉嵇康自代康聞與之書曰譬猶禽鹿少見馴育則服敎}
