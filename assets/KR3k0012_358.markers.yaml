  - {type: variant, offset: 3035, length: 327, content: 簡其軍中精銳朱遠等銜枚夜襲鸞營鸞死之又前涼錄曰張璩字元琰年十四拜奉車都尉從梁肅征隴右與王擢遇於邢崗相拒十日璩銜枚密擊大破之由是顯名又蜀錄曰李特使弟驤屯軍毗橋以備羅尚尚遣將張興偽降於驤以觀虛實興夜歸白尚尚遣精勇萬人銜枚隨興夜襲驤營驤及將士奔于流柵越絕書曰吳王闔閭問伍子胥軍法子胥曰王身將即疑舡旌麾兵戟與王舡等者七艘將軍疑舡兵戟與將軍舡等三舡皆居於大陣之左右有敵即出就陣吏卒皆銜枚敖歌擊鼓者斬曹瞞傳曰公將襲袁紹軍乃選精銳步騎皆銜枚縛馬口夜從問道出人抱束薪至紹圍屯大放火營中驚亂大破之太公六韜曰以少擊眾必以日之暮人操炬火合則滅之或鼓呼而行或銜枚而止吳孫子三十二壘經靈輔曰移車移旗以順其意銜枚而陳分師而伏後至先擊以戰則克魏文帝兵書要略曰銜枚毋讙譁唯令之從左思吳都, SBCK: ''}
