  - {type: variant, offset: 3571, length: 4, content: 方胥鐵棓, WYG: 車騎之將軍馬不具鞍勒不備者誅陸景曲記曰周世以膏腴之沃壤豐鎬之寳地大啓封境以封秦釋鞍授鞚假驥他人欲無陵已其可得乎傅𤣥馬射賦曰百馬齊興六驥孔閑金銜玉羈文防鏤鞍明珂景服華叢采鮮古樂府左延年從軍詩曰從軍何等樂鞍一驅乗雙駮馬照人目龍驤自動作謝惠連詩曰挂鞍長林側飲馬修川湄劉琨扶風歌曰撃馬長松下發鞍髙岳頭魏曹植上銀鞍表曰於先武皇帝代勅賜銀鞍一具初不敢乗謹奉上宋劉義恭謝金梁鞍啓曰賜臣供御金梁橋鞍制作精巧冝副龍駟聖慈下逮猥垂光賜後漢李尤鞍銘曰驅騖馳逐騰躍覆跩雖其㨗習亦有顛沛井羸其瓶罔不斯敗轡釋名曰轡紼也言牽引紼綟以制馬也詩曰我馬維駒六轡如濡又曰我馬維駱六轡沃若又曰駟驖孔阜六轡在手周禮曰挈壺氏挈轡以令舍又曰大馭掌馭王路以祀及犯軷王自左馭馭下祝登受轡犯軷遂驅之家語曰古者天子以内史為左右手以德法為銜勒以百官為轡善御馬者正衘勒齊轡䇿均馬力和馬心故口無聲而馬應轡䇿不舉而極千里善御人者一其德法正其百官均齊人力和安人心故令不再人順從刑不用而天下理矣又曰善御馬者正身以總轡又曰閔子騫為費宰問政於孔子孔子對曰君者人也吏者轡也刑者䇿也人君之政執其轡䇿而已矣又曰孔子適衛衛將軍文子問曰今齊之以刑而猶弗勝何禮之齊也孔子云禮譬之於御則轡也漢春秋曰大駕公卿奉引大僕執轡大將軍陪乗光武東京郊祀法駕則河南尹奉引奉車都尉執轡侍中叅乗孔叢子曰夫子云夫政令者人君之銜轡所以制下也管子曰凡赦者小利而大害也故乆而不勝其禍故赦者馬之委轡也無赦者痤疽之礦石也列子曰凡御者得之於衘應之轡得之手應於心淮南子曰權衡者人主之輿爵祿者人臣之衘轡矣又曰王良造父御也上車攝轡馬為齊整班固東廵頌曰乗輿動色羣后屏氣萬騎齊鑣千乗弭轡魏明帝善哉行曰百馬齊轡御由造父後漢李尤轡銘曰轡衘在手急緩必時賞罰在心中和是思馬知良御進取道里人知善政令行禁止鞚張揖埤蒼曰靮音的馬韁也鞚馬勒也􅀈音面䩭音覊勒靻也靻音祖柔皮也服䖍通俗文曰所以制馬口曰鞚環濟吳紀曰大皇帝征合肥未下因徹軍還兵吕䝉等共留津北魏將張遼奄至圍數}
