  - {type: page-break, offset: 1982, content: '', id: KR3k0012_SBCK_358-8a}
  - {type: variant, offset: 1983, length: 662, content: 曰于鹵殳鋋晹夷㪍盧之施又曰家有鶴𣍿戶有犀渠鶴𣍿矛也犀渠楯也一曰鎧犀革為之李允楯銘曰吳旂魯瞂戎兵特須也張奐與崔子真書曰僕以元年到任有見兵二百馬如牿古昝切羊矛如錐錟楯如榆葉錟徒甘切長牟也陶侃荅慕容瓌書曰當今楊淮銳勇飛廉超驥收屈盧必陷之𨥨集鮫犀不入之楯庾闡責伍員文曰自我來思踰歷中春淒風跨月芒雨積旬地藉濕蓐室無完幕負楯傳時伏櫓擊栟謝尚餉楊征南書曰五尺金斫頭刀一口碧綾車中楯一番又與張涼州書曰今致碧綾車中楯一彭棑釋名曰彭排旁也在旁排敵禦攻也晉安帝紀曰劉𥙿大破孫恩於䔉山思以彭排自載僅得還舩諸葛亮軍令曰帳下及右陣各持彭排銜枚詩曰我東曰歸我心西悲制彼裳衣勿士銜枚鄭玄曰勿猶無也女制彼裳衣而來謂兵服也示初無行陳銜枚之事也禮記曰升正柩諸侯執綍五百人皆銜枚周禮曰銜枚氏下士二人徒八人鄭玄曰枚狀如箸橫銜之銜枚氏掌司囂察囂謹者為其聒亂國之大祭祀令禁毋囂軍旅田役令銜枚為其言語以相誤也國語曰吳正起師軍于江北越王軍于江南越王乃令左軍銜枚泝江五里以須亦令右軍銜枚踰江五里以須賈逵曰逆流而上曰泝徑渡曰踰須待也夜中乃令涉江鳴鼓中水以須越王以其中軍私率六千人銜以襲攻之吳師大北史記曰項梁率師攻秦秦使章邯距梁章邯夜銜枚擊楚殺項梁陸賈楚漢春秋曰高祖向咸陽南趣宛宛堅守不下乃匿其旌旗人銜枚馬束口龍舉而翼奮雞未鳴圍宛城三匝宛城降漢書曰秦將章邯圍魏王咎於臨濟田儋都甘切將兵救魏章邯夜銜枚擊大破齊軍煞儋於臨濟下又曰趙充國擊西羗至金城須兵滿萬騎欲渡河恐為虜所遮即夜遣三校銜枚先渡渡輒營陣會明畢東觀漢記曰吳漢伐蜀分營於水南水北北營戰不利乃銜枚引兵往合水南營大破公孫述梁祚國統, WYG: ''}
