  - {type: variant, offset: 3472, length: 433, content: 避豪強輒棒殺之虞浦江表傳曰孫皓以張布女為美人皓先報布後問美人曰爾父何在荅曰賊已殺之皓大怒即捧殺美人沈約宋書曰後廢帝昱或有忤意者輒加以虐刑有白棒數十枚各有名號鍼鑿錐鋸之徒不離左右嘗以鐵錐椎人陰破六韜曰方胥鐵棓重十二斤柄長五尺千二百枚一名天棓許慎注曰大杖以桃為之擊殺羿是以鬼畏桃人也枹朴子吳遣賀將軍討山賊中有善禁者每交戰官軍刀劍皆不得拔將軍乃多作勁木白棓擊之禁不復行因而剋賊又曰余願世人改其無檢之行除其驕簡之失則趙勝之門無去客黃祖之棓無所用矣晉宣帝教曰當教諸圍上守土皆作棓人一枚輕重長短者各各可守皆當頭施紉挂臂賊破死在旦夕邂逅衝突圍當以棓棓之高堂隆陳災異表曰石氏星占曰天棓五五星天之杖也主撾棓亂兵客星彗茀干犯棓兵大起二年消復之宜罷省百役勿使士卒怨於勤苦而為亂足其廩食度可勞然後用之則士卒安而無亂兵矣椎史記曰張良為韓報讎得力士為鐵椎重一百二十斤擊始皇博浪沙中誤中副車又曰朱亥袖四十斤鐵椎椎晉鄙漢書曰淮南厲王長高帝少子也有才力力扛鼎乃往請辟陽侯出見之即自袖金椎椎之命從者刑之, SBCK: ''}
