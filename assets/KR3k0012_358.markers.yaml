  - {type: variant, offset: 3690, length: 175, content: 矣晉宣帝教曰當教諸圍上守土皆作棓人一枚輕重長短者各各可守皆當頭施紉挂臂賊破死在旦夕邂逅衝突圍當以棓棓之高堂隆陳災異表曰石氏星占曰天棓五五星天之杖也主撾棓亂兵客星彗茀干犯棓兵大起二年消復之宜罷省百役勿使士卒怨於勤苦而為亂足其廩食度可勞然後用之則士卒安而無亂兵矣椎史記曰張良為韓報讎得力士為鐵椎重一百二十斤擊始皇博浪沙中誤中副車又曰朱亥袖四十斤鐵椎椎晉鄙, WYG: 刑民必流國必亡}
