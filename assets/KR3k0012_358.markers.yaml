  - {type: variant, offset: 702, length: 180, content: 內涉江夏便鞍馬弓弩刀楯射獵干寶晉記曰吳軍師張悌帥眾三萬濟江與討吳護軍張翰楊州刺史周凌成陣相對沈瑩領丹陽銳卒刀楯五千號青巾兵屢陷堅陣沈休文宋書曰宗越南陽葉人也為隊主蠻有為寇盜者常使越討伐往輒有功家貧無以市馬刀楯步出單身挺戰眾莫能當每一捷郡將輒賞錢五千因此得買馬宋略曰寧朔將軍益州刺史劉豪少工刀楯勇冠三軍及在漢中忽脩長生之術使道士合金丹餌之咽而死及就殮屍如生宋元嘉, WYG: 入閣拜權}
