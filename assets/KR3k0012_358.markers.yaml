  - {type: page-break, offset: 3905, content: '', id: KR3k0012_SBCK_358-10a}
  - {type: variant, offset: 3905, length: 0, content: '', WYG: 詩曰我服既暉我駟既閑揚鑣警路哀籥清綿桓𤣥集載琬之為江州主簿宋文帝登景陽樓詩曰士女炫街里軒冕曜都城萬軫揚金鑣千舳樹蘭旌袁淑游新亭曲水詩序曰離榭修幕陵􅎬彌阜鑣容斾綵裛野麗雲鮑昭詩曰飛鑣出荆路騖服入秦州王沉踐行賦曰六龍齊鑣鸞聲振振景動波廻天行星陳張恊𤣥武館賦曰天子翺翔郊甸順時廵省龍駟騰鑣羽騎遊騁顧流光以鞍轡廻鸞旗而時幸李充穆天子賦曰其馬則赤驥盗驪驊騮騄耳揚和齊鑣一􅕿萬里董子曉乗輿駮馬賦曰軀觀若斯氣勢雲披銜金鑣着玉羈顏延之七繹曰梓工飾雕簟之輿涓人進龍圖之馬􅀈駕則眩奪鳳蓋振鑣則圏促凾夏故動軔馳光舉䇿流赭張委九愍曰映金箱之羽蓋鳴玉衡之鸞鑣望天路以振䇿指萬里於崇朝殷琰宣貴妃誄曰嚴位服於旗容尚徽謚於銘策節哀路於蕭鐘齊行鑣於輬翟應璩與劉文達書曰僕頃倦遊談之事欲修無為之術不能與足下齊鑣騁轡爭千里之表也桓温與慕容􅀈書曰自滄流以北幽朔以東將軍皆以羈落而緫率之矣首尾脣齒左右力用鳴鏑揚鑣動數十萬太平御覽卷三百五十八}
