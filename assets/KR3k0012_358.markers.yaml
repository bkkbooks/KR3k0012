  - {type: variant, offset: 861, length: 881, content: 術使道士合金丹餌之咽而死及就殮屍如生宋元嘉起居注曰御史中丞劉損奏風聞前廣州刺史韋朗蒞任虐法暴濁是彰於州所造牙楯三十幡朱畫青綾楯三十五幡請以見事追免朗前所居官南史王洪軌隨齊鎮新亭常以身捍矢高帝曰我自有楯卿可防荅曰天下無洪軌何防蒼生方亂豈可一日無公帝甚賞之齊書曰王宜興吳興人也形狀短小而果勁有膽力少年時為劫不須伴郡縣討逐圍繞數十重終莫能禽嘗舞刀楯使十餘人以水交灑不能著北史曰後魏蠕蠕而兗切犯塞以任城王雲為中軍大都督從獻文討之過大磧雲曰夷狄馬初不見虎頭楯若令舞楯在前破之必矣帝從之於是相率而歌方駕而前大破之獲其兇酋英雄記曰公孫伯圭追討叛胡丘力居等于管子城伯圭力戰兵乏食馬盡煮弩楯啖食之又曰袁紹討公孫瓚先令麴義領精兵八百強弩千張以為前登瓚輕其兵少縱騎騰之義兵伏楯下一時同發瓚軍大敗蔡邕月令章句曰洪範經云兵革並起兵謂金刃革謂甲楯又曰審五庫之量金鐵皮革注曰去毛曰革犀兕水牛之屬以為甲楯鼓鞞張敞晉東宮舊事曰東宮外崇福門門各羗楯十幡雞鳴戟十張陶公故事曰臣侃奉獻金華大羗楯五十幡青綾金華楯五十幡王琰冥祥記曰東海何敬叔少而奉佛至泰始中隨湘州刺史劉韞監營浦縣敬叔時遇有旃檀製以為像像將就而未有光材敬叔意願甚懃而營索無處憑几微睡見沙門語敬叔云縣後何家有一桐楯甚堪像光其人極惜之苦求可得也敬叔寤問縣後果有何家因求買楯何氏云實有此楯甚愛惜之明府何以得知敬叔具說所夢何氏驚奉以製先山海經曰羿與鑿齒戰于壽華之野羿射殺之羿持弓矢鑿齒持戟盾郭璞曰鑿齒人類齒如鑿長五六尺又曰開明北有鳳鳥鸞鳥背戴瞂瞂音伐盾也張華愽物志曰朝廷都許時上先人刀劍楯物及銅犬盆殿上四角鼎皆先侯所賜得也劉義慶世說曰魏武征袁本初治裝餘有數十斛竹片咸長數寸眾並謂不堪用正合燒除太祖意甚惜思所以用之謂可以為竹甲楯而未顯其言馳使以問楊主簿德祖應聲荅與帝正同眾伏其辯悟異苑曰河南禇襃字季野將北伐軍士忽同時唱言可各持兩楯復相謂曰一人焉用兩為及敗悉負櫓而退國語曰桓公問曰齊國寡甲兵為之若何管子曰輕過而移諸甲兵賈逵曰輕過輕罪也移諸甲兵以甲兵贖罪也桓公曰為之若何管子對曰輕罪贖一楯一戟潛夫論曰虜或持銅鏡以象兵或負板案以類楯遑遽擾攘未能相一誠易制也, SBCK: 飾}
