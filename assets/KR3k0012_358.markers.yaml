  - {type: variant, offset: 600, length: 3, content: 三輔亂, SBCK: 叅乗孔叢子曰夫子云夫政令者人君之銜轡所以制下也管子曰凡赦者小利而大害也故乆而不勝其禍故赦者馬之委轡也無赦者痤疽之礦石也痤作和切疽七余切列子曰凡御者得之於銜應之於轡得之手應於心淮南子曰權衡者人主之車輿爵禄者人臣之銜轡矣又曰王良造父御也上車攝轡馬爲齊整班固東廵頌曰乗輿動色群后屏氣萬􅀐齊鏕千乗弭轡魏明帝善哉行曰百馬齊轡御由造父後漢李尤轡銘曰轡銜在手急緩必時賞罰在心中和是思馬知良御進取道里人知善政令行禁止鞚張揖埤蒼曰靮音的馬韁也鞚馬勒也音緬䩭音羈勒靻也靻音浙柔皮也服䖍通俗文曰所以制馬口曰鞚環濟呉紀曰大皇帝征合肥未下因撤軍還兵吕蒙等共留津北魏將張遼奄至圍數重蒙等死戰旣破圍上馬}
