  - {type: punctuation, offset: 5, content: 《, id: KR3k0012_CHANT_915-bkkpn1}
  - {type: variant, offset: 5, length: 335, content: 周禮曰庖人供六禽辯其名物六禽鴈鶉鷃雉鳩鴿又曰中秋獻良裘王乃行羽物行羽物以飛鳥賜群吏中秋鳩化為鷹順其始殺大班羽物又曰射鳥氏掌射鳥祭祀以弓矢歐烏鳶凡賓客會同軍旅亦如之又曰羅氏掌羅烏鳥蜡則作羅襦天子大蜡謂十二月合取萬物而素饗之襦細密之羅又曰中春羅春鳥獻鳩以養國老行羽物春鳥蟄而始出是時鴈化為鳩春鳥變舊為新宜以養老生氣行謂賦物又曰掌畜掌養鳥而阜蕃教擾之鳥之可養盛大蕃息祭祀供卯鳥其卯丙薦之鳥四時貢鳥物鴞鴈之屬以四時來共膳獻之鳥雉及鶉駕之屬又曰翨氏翨音翼掌攻猛鳥各以其物為媒而掎之猛鳥鴈隼之屬置其所養之物於絹中鳥未下則掎其腳以時獻其羽翮又曰硩簇氏硩音摘又他歷切簇音蒼獨切掌覆夭鳥之巢覆毀也夭鳥惡鳴之鳥若鴞鵬以方書十日之號十有二辰之號十有二月之號十有二歲之號又曰庭氏掌射國中之夭鳥若, SBCK: ''}
