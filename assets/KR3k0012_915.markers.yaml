  - {type: variant, offset: 2202, length: 0, content: '', SBCK: 薛收從子元敬選部郎邁之子也亦有文學爲􅀵之亞􅀄大業末薛德音及收元敬俱有才名時人謂之河東三鳯又曰武德九年海州言鳯見于城上群鳥數百隨之東北飛向蒼梧山又曰}
  - {type: variant, offset: 2202, length: 0, content: '', WYG: 薛收從子元敬選部郎邁之子也亦有文學為收之亞初大業末薛徳音及收元敬俱有才名時人謂之河東三鳳又曰武徳九年海州言鳳見于城上羣鳥數百隨之東北飛向蒼梧山又曰}
