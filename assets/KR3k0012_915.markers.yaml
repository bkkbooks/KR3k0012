  - {type: variant, offset: 3338, length: 0, content: '', SBCK: 鳯皇禽之長上有明王太平乃來西京􅄂記曰楊雄讀書有語之曰無爲自若苦􅀇故難傳忽不見雄着太􅀇經夢吐白鳯皇集其項上而滅楊子法言曰鳯}
  - {type: variant, offset: 3338, length: 0, content: '', WYG: 鳳凰禽之長上有明王太平乃來西京雜記曰揚雄讀書有語之曰無為自苦苦𤣥故難倐忽不見雄看太𤣥經夣吐白鳳凰集其頂上而滅揚子法言曰鳳凰蹌蹌匪堯之庭或曰君子在位譬若鳳凰治則見亂則隠太𤣥經曰鸞鳳不迂於竹實騶虞不移於生物醜婦以明鏡為害無所逃其陋論衡瑞􅃌篇曰鳳凰麒麟為聖人來即是聖人之禽也按聖人逰於人間麟鳳亦應與衆}
  - {type: page-break, offset: 3338, content: '', id: KR3k0012_WYG_915-14a, image: WYG0901/WYG0901-0149c.png}
  - {type: variant, offset: 3338, length: 0, content: '', krp: 鳯皇禽之長上有明王太平乃來西京雜記曰楊雄讀書有語之曰無爲自若苦玄故難傳忽不見雄着太玄經夢吐白鳯皇集其項上而滅楊子法言曰鳯}
  - {type: variant, offset: 3339, length: 0, content: '', SBCK: 蹌蹌匪堯之庭或問君子在治曰􅀂鳯治則見亂則隱太元經曰鸞鳯不遷甘於竹實騶虞不移於生物醜婦以明鏡爲害無}
  - {type: variant, offset: 3339, length: 0, content: '', WYG: 同何故逺去中國處於邉外崔贛易林曰神鳥五色鳳凰為主張集於王谷使君得}
  - {type: page-break, offset: 3339, content: '', id: KR3k0012_WYG_915-14b, image: WYG0901/WYG0901-0149d.png}
  - {type: variant, offset: 3339, length: 0, content: '', krp: 蹌蹌匪堯之庭或問君子在治曰若鳯治則見亂則隱太元經曰鸞鳯不遷甘於竹實騶虞不移於生物醜婦以明鏡爲害無}
  - {type: variant, offset: 3340, length: 0, content: '', SBCK: 逃其陋論衡曰瑞指篇鳯皇麒麟爲聖人來即是聖人之禽也桉聖人遊於人間麟鳯亦應與衆鳥同何故逺去中國處於邊外崔贛易林曰神鳥五色鳯凰爲主集於王谷使君得所又曰鳯有十子同巢共母懽}
  - {type: page-break, offset: 3340, content: '', id: KR3k0012_SBCK_915-9a}
  - {type: variant, offset: 3340, length: 0, content: '', WYG: 又曰鳳有千子同巢其母懽}
