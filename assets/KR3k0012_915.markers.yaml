  - {type: variant, offset: 1991, length: 208, content: 曰鳥之畏威豈獨中軍之略也吾亦分其一耳此乃大善北史曰周豆盧勣為渭州刺史鳥鼠山絕壁千仞由來乏水諸羗苦之勣馬足所踐忽飛泉湧出有白鳥翔止廳前乳子而後去人為之謠曰我有丹陽山飛玉漿濟戎夷人神鳥來翔隋書曰煬帝征遼東帝舍臨頓見大鳥丈餘縞身朱足游泳自若上異之詔虞綽為銘帝覽而善之命有司勒於海上又曰大業十二年一月甲子夜有二大鳥似鵰飛入大業殿止于殿幄至明而去又曰王世充將欲篡位羅取雜鳥書帛繫其頸自言符命而散放之或有彈射得鳥而來獻者亦拜官爵, SBCK: ''}
