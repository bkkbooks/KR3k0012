  - {type: variant, offset: 1016, length: 1, content: 白, SBCK: 曰通天文者明於明天道也審地理者昌昌猶盛也盛於万物明者天之時也昌者地之財也明王治鳯皇下之尚書中􅀱曰黄帝時天氣伏通五行期化鳯皇巢阿閣讙樹注曰阿榮名宮中之御門曰閣鳯皇於榮屋徒而出讙鳴於朝廷之樹又曰堯即政七十年鳯皇止庭伯禹拜曰黃帝軒提象鳯皇巢阿閣又曰帝舜云朕惟不乂百獸鳯晨百獸率舞鳯皇司晨鳴也又曰周文王作豐一朝扶老至八十萬户草居陋然歌即曰鳯皇下豐也尚書帝命驗曰舜授終赤鳯來儀尚書大傳曰舜好生惡殺鳯皇巢其樹論語摘襄聖曰鳯有六像九苞一曰頭像天二曰目像日三曰背像月四曰翼像風五曰足像地六曰尾像緯九苞一曰頭符命二曰眼合度三曰耳聦逹四曰舌詘伸五曰色彩光六曰冠短周七曰距銳鈎八曰音激􅀭九曰腹文户行鳴曰歸嬉上鳴曰提扶夜鳴曰善哉晨鳴曰賀丗飛鳴曰即都知我者唯黄持竹實來故子欲居九夷從鳯嬉宋均注曰緯五緯也度天度數也周當作朱米色好也户所由出入隂陽出入亦閉户善哉應天下興平也賀丗慶賀於時也黄帝中通理者也鳯遇亂則潜居夷狄也孝經援神契曰王者德至}
