  - {type: variant, offset: 1454, length: 275, content: 高唐隆臨終上䟽諫明帝臣觀黃初之際天兆其戒異類之鳥育長鷰巢口爪俱赤此魏室之大異也晉書曰趙王倫篡位時於殿上得異鳥問皆不知名其日向夕宮西有素衣小兒言是服劉鳥倫使錄小兒并鳥閉置空室明旦開視戶如故並失人鳥所在倫目上有廇以為妖焉南史曰甄恬字彥約中山無極人也居江陵數歲喪父哀感有若成人家貧養母常得珍羞及居喪廬於墓側恒有鳥玄黃雜色集於廬樹恬哭則鳴哭止則止齊書曰曲江公蕭遙欣年七歲出齊時有一左右小兒善彈無飛鳥不應弦墜落欣曰凡戲多端何急彈此鳥自空中翔飛何關人事無趣殺此生左右感其言遂不復彈鳥梁書曰何胤退居吳武丘寺講經論常禁殺有異鳥如鶴紅色集講堂馴狎如家禽南史曰海中浮鵠山, SBCK: 鳯陽門五層樓}
