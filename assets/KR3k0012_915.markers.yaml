  - {type: variant, offset: 3603, length: 218, content: 丈許樹上取鳥未至鳥一丈鳥便欲飛虵張口歙之鳥不得去繽紛一食頃鳥轉欲困射師引弩射三矢虵隕而鳥得颺須臾雲晦雷發驚耳駭目而向鳥徘徊其上毛落紛紛雷息電滅鳥亦高飛十州記曰祖沷州有不死之草似菰苗秦始皇時死者橫道有鳥如烏狀衘此草以覆死人面皆登時起坐而遂活也異苑曰蘭陵昌慮縣華山有井鳥巢其中金喙黑色而圓翅此禽見則大水荊楚歲時記曰春分日民並種戒火草於屋上有鳥如烏先鷄而鳴架架格格民候此鳥則入田以為候人架犁格也又曰夏七月有鳥名穫穀其聲自呼農人候此鳥則犁把上岸, SBCK: ''}
