  - {type: punctuation, offset: 3373, content: 「, id: KR3k0012_CHANT_915-bkkpn1096}
  - {type: variant, offset: 3373, length: 0, content: '', SBCK: 南禺之山其鳥鵷鶵莊子曰惠子相梁莊子徃見之惠子恐代其相搜國中三日三夜莊子伏主人馬棧下徃見之曰南方有鳥名鵷鶵南海而飛之北海非梧桐不栖非竹實不食非醴泉不飲於是鴟得腐䑕鵷鶵過仰而視之曰嚇子欲以梁國嚇我耶鵕䴊倉頡解詁曰鵕䴊神鳥飛竟}
