  - {type: variant, offset: 2767, length: 567, content: 鶩魚於大淵之中此皆得清淨之道也又曰羽者嫗伏毛者孕育淮南萬畢術曰人面擊地飛鳥自下取蘗木為人形似鳥而血塗人面以擊地飛鳥自下抱朴子軍術曰眾鳥群飛徘徊軍上不過三日有暴兵至焉鳥藂軍中將當賞功增秩鳥集將軍之旗將軍增官鳥集軍中莫知其名軍敗也阮子曰高鳥相木而集智士擇士而翔晏子春秋曰景公射鳥野人駭之公令吏誅之晏子曰鳥獸故非人所養野人駭之不亦宜乎公曰善自爾已來一弛鳥獸之禁又曰景公好弋使顏涿主藂鳥而亡公召吏殺之晏子曰諸侯聞之以君重鳥輕士公曰勿殺春秋後語淳于髡曰夫鳥同翼者藂飛而獸同足者俱行各有儔也又曰魏有吏羸脈者與王處廩下仰見飛鳥引弓虛發而鳥墮下魏王怪而問曰何以得至此羸脈曰此孽生也生曰先生何以知之對曰其飛徐其鳴悲其飛徐者故瘡痛也其鳴悲者久失群也故瘡未息而驚心未去聞弦音烈而高飛故隕也孽餘也先被傷而餘瘡未差故聞弦聲而奮驚而隕也切創與瘡同又曰燕王使騎劫代將樂毅奔趙王卒離心田單乃令城中食者先祭先祖於庭中飛鳥悉飛舞其上或下啄其食燕人皆怪之穆天子傳曰曠原之野飛鳥之所解羽舂之山飛鳥之所栖舂山之澤清水溫泉飛鳥百獸之所飲食家語曰孔子在衛顏回侍側聞哭聲甚哀子曰回汝知此何哭對曰此哭非但為死又為生離回聞桓山之鳥生四子焉羽翼既成將分于四海其母悲鳴而送之哀聲有似於此謂其往而不返也回竊以音類而知之又曰蒼鳥群飛熟使萃之蒼鳥蒼鴈又曰稷帝投之水上鳥何燠投棄燠溫鳥以羽翼覆薦溫之, SBCK: 脯}
