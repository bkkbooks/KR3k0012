  - {type: variant, offset: 3344, length: 2, content: 者陽, SBCK: 身其先爲虞氏馴百禽夏后之未丗民始食􅆑孟􅃜去之鳯凰隨焉止于此山多竹長千仞鳯凰食竹實孟􅃜食木實去九疑萬八千里十洲記曰鳯麟洲在西海之中四靣有弱水繞之鴻毛不浮不越}
