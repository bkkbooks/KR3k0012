  - {type: variant, offset: 2709, length: 0, content: '', SBCK: 丹穴之山有鳥焉其狀如鶴五采而文名曰鳯鳥首文曰德翼文曰順背文曰義膺文曰仁腹文曰信是鳥也飲食自歌自舞見則天下大安楚辭曰鳬鴈皆唼夫梁藻􅀆鳯逾翶而髙舉衆鳥皆有所登棲􅀆鳯獨皇皇而無所集欲衘枚而亡言􅀆甞君之渥洽􅂹不驟進而求服􅀆鳯亦不貪餧而忘食又曰爲鳯皇作鶉籠雖歙翼而不容又曰獨不見鸞鳯之髙翔大皇之野循四極而周囬見盛德而後下宋玉對曰聞鳯鳥上九千里絶雲霓􅀒蒼天呼窈􅁳之中藩籬之鷃豈能與之料天地之髙哉􅀃文曰鳯神鳥也天老曰鳯像麟前鹿後虵頸魚尾龍文􅀛背燕頷鷄喙五色備舉出東方君子之國翶翔四海之外過崑崙砥柱濯}
  - {type: variant, offset: 2709, length: 0, content: '', krp: 丹穴之山有鳥焉其狀如鶴五采而文名曰鳯鳥首文曰德翼文曰順背文曰義膺文曰仁腹文曰信是鳥也飲食自歌自舞見則天下大安楚辭曰鳬鴈皆唼夫梁藻兮鳯逾翶而髙舉衆鳥皆有所登棲兮鳯獨皇皇而無所集欲衘枚而亡言兮甞君之渥洽驥不驟進而求服兮鳯亦不貪餧而忘食又曰爲鳯皇作鶉籠雖歙翼而不容又曰獨不見鸞鳯之髙翔大皇之野循四極而周囬見盛德而後下宋玉對曰聞鳯鳥上九千里絶雲霓負蒼天呼窈冥之中藩籬之鷃豈能與之料天地之髙哉說文曰鳯神鳥也天老曰鳯像麟前鹿後虵頸魚尾龍文龜背燕頷鷄喙五色備舉出東方君子之國翶翔四海之外過崑崙砥柱濯}
