  - {type: variant, offset: 899, length: 2, content: 治生, SBCK: 聽鳯皇之鳴以別十二律又曰鷰雀爲鴻鵠鳯皇慮則必弗得矣其所求者瓦孔之間隟屋之翳蔚也韓詩外傳曰黄帝即位施聖仁恩承天明命一道脩德唯仁是行字内和平未見鳯皇乃召天老而問之曰鳯皇何如天老對曰夫鳯象鴻前而麟後虵頸而魚尾龍文而􅀛身䴏􅟀而鷄喙首戴德頸揭義背􅀒仁心入信翼採義足履正尾繫武小音金大音鼓延頸奮翼}
