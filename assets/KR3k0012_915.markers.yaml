  - {type: variant, offset: 1247, length: 120, content: 弋道德五伯以弋戰國故秦魏燕趙者其鴈也齊魯韓衛者青首也青首小鳧有青者鄒費郯邳者羅鸗也外則其餘不足射也見鳥六雙以喻下文秦趙等十二國故曰六雙唯王何取王何不以聖人為弓勇士為繳時張而射之此六雙者可得而囊載也其樂非特朝夕之樂也其獲非特鳧鴈之實也漢武故事, SBCK: 騏驎賞鳯尾矣梁書}
