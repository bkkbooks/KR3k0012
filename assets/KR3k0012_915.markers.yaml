  - {type: variant, offset: 2482, length: 3, content: 鳥排空, WYG: 鳳凰之翔至徳必也過崑崙之疏圃欽砥柱之涔瀬遭迴濛汜之渚當此之時鴻鵠蒼鶴莫不彈驚伏􅇡注啄江芥又况燕雀之類乎昔者二皇鳳至于庭二皇伏羲神農三代鳳至於門三代堯舜禹周室鳳至於澤徳彌麤所至彌逺徳彌精所至彌近抱朴子曰夫木行為仁為青鳳頭上青故曰戴仁也金行為義為白鳳頸白故曰纓義也火行為禮為赤鳳背赤故曰負禮也水行為智為黒鳳胷黒故曰向智也土行為信為黄鳳足下黄故曰蹈信也古者太平之世鳳凰常居其國}
