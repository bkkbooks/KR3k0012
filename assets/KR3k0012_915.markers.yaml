  - {type: punctuation, offset: 3368, content: 《, id: KR3k0012_CHANT_915-bkkpn1093}
  - {type: variant, offset: 3368, length: 0, content: '', SBCK: 琴操曰周成王時天下大治鳯皇來舞於庭成王乃援琴而歌曰鳯皇翔􅀆於紫庭余何德􅀆以感靈列仙傳曰簫史教弄玉作鳯鳴居數十年吹簫作鳯聲鳯皇來至其屋爲作鳯臺夫婦止其上一日一夜皆隨鳯皇飛去王子年拾遺記曰周昭王以青鳯之毛爲二裘一曰燠質二曰暄肌常以禦寒至厲王末猶寳此物及厲王流于彘人得而珎之人罪有䧟大辟者以青鳯毛贖罪免死片毛則准千金異苑曰東莞劉穆之字道民素居京口晉隆安中鳯皇集其庭相人韋藪調之曰子必恊賛大猷李彤四部曰吊鳥山俗傳曰鳯死於上歳七}
  - {type: page-break, offset: 3368, content: '', id: KR3k0012_SBCK_915-9b}
  - {type: variant, offset: 3368, length: 0, content: '', WYG: 琴操曰周成王時天下大治鳳凰來舞於庭成王乃援琴而歌曰鳳凰翔兮於紫庭予何徳兮以感靈列仙傳曰蕭史教弄玉作鳳鳴居数十年吹簫作鳳聲鳳凰來至其屋為作鳳臺夫妻止其上一日一夜皆隨鳳凰飛去王子年拾遺記曰周昭王以青鳳之毛為二裘一曰煩質二曰暄肌常以禦寒至厲王未知寳此物流于彘人得而珍之罪有陷大辟者以青鳳毛贖罪免死片毛則准千金異苑曰東莞劉穆之字道民素居京口晉隆安中鳳凰集其庭相人韋藪謂之曰子必協贊大猷李彤四部曰弔鳥山俗傳曰鳳死於上歳七}
  - {type: page-break, offset: 3368, content: '', id: KR3k0012_WYG_915-15b, image: WYG0901/WYG0901-0150b.png}
  - {type: variant, offset: 3368, length: 0, content: '', krp: 琴操曰周成王時天下大治鳯皇來舞於庭成王乃援琴而歌曰鳯皇翔兮於紫庭余何德兮以感靈列仙傳曰簫史教弄玉作鳯鳴居數十年吹簫作鳯聲鳯皇來至其屋爲作鳯臺夫婦止其上一日一夜皆隨鳯皇飛去王子年拾遺記曰周昭王以青鳯之毛爲二裘一曰燠質二曰暄肌常以禦寒至厲王末猶寳此物及厲王流于彘人得而珎之人罪有䧟大辟者以青鳯毛贖罪免死片毛則准千金異苑曰東莞劉穆之字道民素居京口晉隆安中鳯皇集其庭相人韋藪調之曰子必恊賛大猷李彤四部曰吊鳥山俗傳曰鳯死於上歳七}
  - {type: variant, offset: 3369, length: 0, content: '', SBCK: 至九月群鳥常來集其上鸑鷟國語曰周之興鸑鷟鳴于歧山􅀃文曰鸑鷟鳯屬神鳥也三輔决録注曰太史}
  - {type: page-break, offset: 3369, content: '', id: KR3k0012_SBCK_915-10a}
  - {type: variant, offset: 3369, length: 0, content: '', WYG: 至九月羣鳥常來集其上鸑鷟國語曰周之興鸑鷟鳴於岐山說文曰鸑鷟鳳屬神鳥也三輔決録注曰太史}
  - {type: page-break, offset: 3369, content: '', id: KR3k0012_WYG_915-16a, image: WYG0901/WYG0901-0150c.png}
  - {type: variant, offset: 3369, length: 0, content: '', krp: 至九月群鳥常來集其上鸑鷟國語曰周之興鸑鷟鳴于歧山說文曰鸑鷟鳯屬神鳥也三輔决録注曰太史}
  - {type: variant, offset: 3370, length: 0, content: '', SBCK: 蔡衡云毛色多紫者爲鸑鷟後漢書曰永平中有神雀集宫殿官府冠羽有五采色帝異之以問臨邑侯劉復復不能對薦賈逵􅀶物多識帝乃召見逵問之對曰昔武王終父之業鸑鷟在歧鸑鷟鳯之別名也周大夫内史過對周宣王曰周之興也鸑鷟鳴歧山事見國語宣帝威懷戎狄神雀仍集此胡降之徵也唐書曰張鷟字文成聦警絶倫書無不覽爲兒童時夢紫色大鳥五色成文降于家庭其祖謂之曰五色赤文鳯也紫文鸑鷟也爲鳯之佐兒當以文}
  - {type: variant, offset: 3370, length: 0, content: '', WYG: 蔡衡云色多紫者為鸑鷟左思吳都賦曰鸑鷟食其實後漢書賈逵傳曰明帝永平中有神雀集宫殿官府冠羽有五采色帝異之以問臨邑侯劉復復不能對薦逵博物多識帝乃召見逵問之對曰昔武王終父之業鸑鷟在岐鸑鷟鳳之别族也周大夫内史過對周惠王曰周之興也鸑鷟鳴于岐山事見國語宣帝威懐戎狄神雀仍集此胡降之徵也唐書曰張鷟字文成聰警絶倫書無不覧為兒童時夣紫色大鳥五色成文降于家庭其祖謂之曰五色成文鳳也紫文鸑鷟也為王之佐兒當以文}
  - {type: page-break, offset: 3370, content: '', id: KR3k0012_WYG_915-16b, image: WYG0901/WYG0901-0150d.png}
  - {type: variant, offset: 3370, length: 0, content: '', krp: 蔡衡云毛色多紫者爲鸑鷟後漢書曰永平中有神雀集宫殿官府冠羽有五采色帝異之以問臨邑侯劉復復不能對薦賈逵博物多識帝乃召見逵問之對曰昔武王終父之業鸑鷟在歧鸑鷟鳯之別名也周大夫内史過對周宣王曰周之興也鸑鷟鳴歧山事見國語宣帝威懷戎狄神雀仍集此胡降之徵也唐書曰張鷟字文成聦警絶倫書無不覽爲兒童時夢紫色大鳥五色成文降于家庭其祖謂之曰五色赤文鳯也紫文鸑鷟也爲鳯之佐兒當以文}
