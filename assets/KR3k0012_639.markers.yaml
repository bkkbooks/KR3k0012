  - {type: variant, offset: 4, length: 1, content: 律, SBCK: 曰耳聽觀其聽聆不直則惑五曰目聽觀其眸子視不直則眊然又曰掌都家聽其獄訟之辭辨其死刑之罪而要之三月而上獄訟于國司㓂聽其成于朝羣士司刑皆在各麗其法以議獄訟成平也獄訟成士師受中書其刑殺之成與其傳曰王叔陳生與伯輿争政二子王卿士王右伯輿右助也王叔陳生怒而岀奔晉侯使士丐平王室王叔與伯輿訟焉争曲直王叔之宰與伯輿之大夫瑕禽坐獄於王庭士丐聽之范宣子曰天子所右寡君亦右之所左亦左之使王叔氏與伯輿合要王叔氏不能舉其契王叔奔晉論語曰子曰聽訟吾猶人也必也使無訟乎又曰片言可以折獄者其由也與片讀爲半片言謂單辭也折断也子路果取所知言必直故可}
