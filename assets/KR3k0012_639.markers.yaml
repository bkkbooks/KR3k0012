  - {type: variant, offset: 2154, length: 0, content: '', WYG: 嘗出錢與同營士焦子文求不得時子文適坐小事繫獄柔乃見子文問所坐言次曰頗曽舉人錢否乎子文曰自以單貧初不敢舉人物也柔察子文色動遂曰汝昔舉竇禮錢何言不耶子文恠知事露應對不次柔問曰汝已殺禮便宜早服子文於是叩頭具首殺禮本末埋葬處所柔便遣吏卒承子文辭徃掘得其屍詔書復盈母子為平人晉書曰陸雲為浚儀令雲到官肅然下不能欺市}
