  - {type: variant, offset: 520, length: 573, content: 舊律太重於是議絞刑之五十條斷其右趾焉應死者多蒙全活得罪者咸稱賴之又曰太宗問大理卿劉德威曰近來刑網稍密何也對曰誠在君上不由臣下主好寬則寬好急則急律文失入減三等失出減五等今則反是失入則無辜失出則獲大罪所以吏各自愛競執深文畏罪之所致耳太宗然其言又曰神龍元年趙冬曦上書曰臣聞夫今之律者乃有千餘條近有隋之姦臣將弄其法故著律曰犯罪而律無正條者應出罪則舉重以明輕應入罪即舉輕以明重立夫一言而廢其數百條自是迄今竟無刊革遂使死生罔由乎法律輕重必因乎愛憎受罰者不知其然舉事者不知其犯臣恐賈誼見之必為之慟哭矣又曰時所用舊律其文起自魏文侯師李悝悝撰攻諸國法著經以為王者之政莫急於盜賊盜賊須刻捕故著囚捕二篇其輕狡越城博戲借假不廉淫多踰制以為雜律一篇又以具其加減是故所著六篇而已然皆罪名之制也六韜曰文王問太公曰願聞治國之所貴太公曰貴法令必行法令必行則治道通治道通則民大利民大利則君德彰文王曰法令必行大利人民奈何太公曰法令必行則民俗利民俗利則利天下是法令必行大利人也又曰願聞為國之大失太公曰為國之大失者為上作事不法君不覺悟是大失也文王曰願聞不法公曰不法法則令不行則主威傷不法法則邪不正邪不正則禍亂起不法法則刑妄行刑妄行則賞無功不法法則國昏亂國昏亂則臣為變君不悟則兵革起兵革起則失天下文王曰誡哉管子曰法者所以興功懼暴律者所以定分止事又曰凡國無法則眾不知為無度則事無儀有法不正有度, WYG: ''}
