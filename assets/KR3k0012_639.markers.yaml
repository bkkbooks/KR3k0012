  - {type: variant, offset: 948, length: 561, content: 公曰為國之大失者為上作事不法君不覺悟是大失也文王曰願聞不法公曰不法法則令不行則主威傷不法法則邪不正邪不正則禍亂起不法法則刑妄行刑妄行則賞無功不法法則國昏亂國昏亂則臣為變君不悟則兵革起兵革起則失天下文王曰誡哉管子曰法者所以興功懼暴律者所以定分止事又曰凡國無法則眾不知為無度則事無儀有法不正有度不直則治僻治僻則國亂故曰正法直度罪殺不赦誅戮必信民畏而懼武威既明令不再行又曰凡君國之重器莫重乎令令重君尊君尊國安令輕君卑君卑國危故安國存乎尊君存乎行令行令存乎嚴罰嚴罰令行則百吏皆恐罰不嚴令不行則百吏皆喜故明君察於治人之本本莫要乎令故曰虧令者死益令者死增益令者殺無赦不行令者死又曰凡牧民者欲民之可御也欲民之可御則法不可不重也法者將立朝廷將立朝廷則爵服不可不貴也爵服不可不貴也爵服加於不義則人賤其爵服民賤其爵服則人主不尊人主不尊則令不行矣又曰法者法天地之位象四時之行所以治天下四時之行有寒有暑聖人法之故有文有武天地之位有前有後有左有右聖人法之以建經紀春生於左秋殺於右夏長於前冬藏於後生長之事文也收藏之事武也是故文事在左武事在右聖人法之以行法令又曰正月之朝百吏在朝君乃出令布憲于國五鄉之師五屬大夫皆受憲於上大夫安子曰君之以尊者令令不行是無君也故明君慎令文子曰文子問老子曰法安所生曰法生於義義生於眾適眾適合乎人心此治之要也法非從天生非從地出, SBCK: 守臨}
