  - {type: variant, offset: 1807, length: 839, content: 非以鉤策為均也使得榮者不知所以德得惡者不知所以怨乃以塞怨望也又曰堯為匹夫不能使鄰家至為主則令行禁止由此觀之賢未足以服不肖而勢位足以屈賢申子曰君必有明法正義若懸權衡以稱輕重所以一群臣也又曰堯之治也蓋明法察令而已聖君任法而不任智任數而不任說黃帝之治天下置法而不變使民安樂其法也又曰昔七十九代之君法制不一號令不同然而俱王天下何也必國富而粟多也韓子曰魯燒積澤天北風火南向恐燒國哀公自將眾趍救火人盡逐獸而火不救乃召仲尼仲尼下令曰不救火而逐獸者比入禁之罪令下未徧火遂救矣又曰治大國而數變法則民苦之是以有道之君貴虛靜重變法也又曰釋法術而為治堯不能正一國使中正守法術拙匠執規矩尺寸則萬不失一也又曰董安于為趙上地之守行石阜山中見深澗峭如墻深百仞因問其鄉左右曰人嘗有入此者乎對曰無有曰嬰兒癡聲狂亂人嘗有入此者乎對曰無有馬羊牛嘗有入此乎對曰無有安于喟然嘆曰吾能治矣使吾法之無赦猶入澗之必死也則民莫知犯何為不治也又曰荊莊王有弟門者立法群臣大夫諸侯公子入朝馬蹄踐霤者廷理斬其輈戮其御於是太子入朝馬蹄踐霤廷理依法太子怒入為王泣曰必為誅戮廷理王曰法者所以敬宗廟尊社稷故臣受命尊敬社稷者社稷之臣焉可誅也太子乃還走避舍露宿三曰北面再拜請罪又曰夫人臣之侵其主也如地形焉即漸以往使人主失端東西易面而不自知故先王立教司南以端朝夕明王使其群臣不遊意於法之外不為惠於法之內虎所以能服狗者爪牙也使虎釋其爪牙使狗用之則虎反服於狗矣人主者以形德制臣也今君釋其刑德而臣用之則臣反制於君矣又曰犇車之上無仲尼覆舟之下無伯夷故號令者國之舟車也安則智廉生危則鄙爭起又曰越王問於大夫種曰吾欲伐吳可乎對曰可以吾賞厚而信罰嚴而必君必欲知之何不試焚於是遂焚宮室民莫救火乃下令曰民之救火而死者比死敵者之賞勝火而死者比勝敵之賞不救火者比降北之罪民之塗其體被濡衣赴火者左三千人右三千人始知必勝之勢也又曰吳起為魏武侯西河之守秦有小亭臨境起欲攻之乃倚一車轅於北門之外而令曰有能徙北南門之外賜之上田上宅民莫之徙也及有徙之者遂賜之如令俄又置一石赤忝東門之外而令, SBCK: 劒帶勑}
