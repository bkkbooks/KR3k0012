  - {type: variant, offset: 1880, length: 253, content: 明法正義若懸權衡以稱輕重所以一群臣也又曰堯之治也蓋明法察令而已聖君任法而不任智任數而不任說黃帝之治天下置法而不變使民安樂其法也又曰昔七十九代之君法制不一號令不同然而俱王天下何也必國富而粟多也韓子曰魯燒積澤天北風火南向恐燒國哀公自將眾趍救火人盡逐獸而火不救乃召仲尼仲尼下令曰不救火而逐獸者比入禁之罪令下未徧火遂救矣又曰治大國而數變法則民苦之是以有道之君貴虛靜重變法也又曰釋法術而為治堯不能正一國使中正守法術拙匠執規矩尺寸則萬不失一也又曰董安于為趙上地之守行石阜山中見深澗峭如墻深百仞因問其鄉左右曰人嘗有入此者, WYG: 怨讎}
