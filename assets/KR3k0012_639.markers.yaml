  - {type: variant, offset: 19, length: 2, content: 杜律, krp: 堤爲刼又堤家得錢五千堤懼掠自誣言殺至州恱觀色疑其不實引見毛奴兄靈之謂曰殺人取錢當時狼狽應有所遺得何物靈之曰唯得一刀削恱取視之曰此非里巷所爲也乃召州内刀匠示之屬有郭門者前曰此刀削門手所作去嵗賣與郭人董及祖悅収及祖詰之及祖欵引靈之又於及祖身上得毛奴所着皂𥜗及祖伏法悅察獄多此類也後周書曰建德二年冬帝聽訟於正武殿自旦及夜繼之以燭又曰栁慶爲雍州別駕有賈人持金}
  - {type: variant, offset: 23, length: 6, content: 卷孔稚珪刪注, SBCK: 斤詣京師交易􅀉人停止每欲出行常自執管鑰無何緘閉不異而失之謂是主人所􅀼郡縣訊問主人遂自誣服慶聞而歎之乃召問賈人曰卿鑰􅁪置何處對曰􅁪自帶之慶曰頗與人同􅀫乎與同飲乎曰日者曽與一沙門再度酣宴醉而晝寢慶曰主人以痛自誣非盗也彼沙門乃真盗耳即遣吏逮捕沙門乃懷金逃匿後捕得盡獲所失之金又曰柳慶有胡家􅀍刼郡縣按察莫知賊所隣近被囚繫者甚多慶以賊徒旣衆似是烏合旣非舊交必相疑阻可以詐求之乃作匿名書多牓官門曰我等共刼胡家徒侣混􅄂終恐泄露今欲首懼不免誅􅀂聽先首免罪便欲來告慶乃復施免罪之牓居二日廣陽王欣家奴面縛自告牓下因此推窮盡􅀗黨與慶守正明察每歎曰昔于公斷獄無私闢髙門可以待封儻斯言有驗吾斯庻幾乎又曰􅂫綽爲六條詔書奏施行之其一先}
