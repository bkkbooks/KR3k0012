  - {type: punctuation, offset: 2156, content: 『, id: KR3k0012_CHANT_639-bkkpn577}
  - {type: variant, offset: 2156, length: 0, content: '', WYG: 見殺者主名不立雲録其妻而無所問十許日遣出宻令人隨後謂曰不出十里當有男子候之與語便縛来既而果然問之具服云與此妻通共殺其夫聞妻得出欲與語憚近縣故逺相邀候於是一縣稱為神明又曰鄧攸嘗詣鎮軍将軍賈混混以人訟事示攸使決之攸不視曰孔子稱聴訟吾猶人也必也使無訟乎混竒之以女妻之又曰苻融仕苻堅為司𨽻校尉京兆人董豐逰學三年而返宿妻家妻為賊所殺妻兄疑豐殺之送豐有司豐不堪楚掠自誣引殺妻融察而疑之問豐曰汝行徃還頗有恠異及卜筮否豐曰初将發夜嘗夢乗}
  - {type: page-break, offset: 2156, content: '', id: KR3k0012_WYG_639-6b, image: WYG0898/WYG0898-0705d.png}
  - {type: variant, offset: 2157, length: 3, content: 羊牛嘗, WYG: 南渡水返而北渡復自北而南馬停水中鞭䇿不去俯而視之見兩日在於水下馬左白而濕右黒而燥寤之心悸竊以為不祥問筮者筮者曰憂獄訟逺三枕避三沐既而妻為具沐夜授豐枕豐記筮者之言皆不從之妻乃自沐枕而寝融曰吾知之矣馬左白而濕濕水也左水右馬馮字兩日昌字也其馮昌殺之乃獲昌詰之昌到首服曰本與其妻謀殺董豐期以新沐枕為騐乃誤中婦人也宋書曰傅琰為山隂令}
  - {type: page-break, offset: 2157, content: '', id: KR3k0012_WYG_639-7a, image: WYG0898/WYG0898-0706a.png}
  - {type: variant, offset: 2161, length: 1, content: 入, WYG: 賣針賣糖嫗争絲各言己者詣琰琰掛而輕鞭之有鐵屑乃罰賣糖者又有二老争雞問何食一云食粟一云食豆剖之見粟罰言豆者人畏如神明也後魏書曰辛祥為并州平北府司馬㑹刺史喪朝廷以其公清遂越長史勅行州事祥初在司馬失白璧南兵樂道顯被誣為賊官屬推處咸以為然祥曰道顯面有悲色察獄以色其}
  - {type: page-break, offset: 2161, content: '', id: KR3k0012_WYG_639-7b, image: WYG0898/WYG0898-0706b.png}
