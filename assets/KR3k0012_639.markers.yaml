  - {type: variant, offset: 2164, length: 0, content: '', WYG: 苦執申之月餘别獲真賊又曰李崇為揚州刺史先是夀春縣人荀泰有子三嵗遇賊亡失數年不知所在後見在同縣人趙奉伯家泰以状告各言己子並有隣証郡縣不能斷崇曰此易知耳二父與兒各在别處經禁數旬然後遣人告之曰君兒偶患向已暴死有教觧禁可出奔哀也荀泰聞即號咷悲不自勝奉伯咨嗟而已殊無痛意察知之乃以兒還泰詰奉伯詐状奉伯乃欵引云先亡一子故妄認之又曰裴安祖弱冠州辟主簿民有兄弟争財詣州相訟安祖召其兄弟以禮義責譲之此人兄弟明日相率謝罪州内欽服又曰唐和為内都大官評斷獄訟不加捶楚獲實者甚多世以是稱之又曰司馬悦字慶宗歴任豫州刺史時有汝南上蔡董毛奴者賫錢五千死於道路郡縣疑民張堤為刼又於堤家得錢五千堤懼笞掠自誣言殺獄至州悅觀色疑其不實引見毛奴兄靈之謂曰殺人取錢當時狼狽應有所遺此賊竟遺何物靈之曰唯得一刀鞘悦取視之曰此非里巷所為也召居州内刀匠視之屬有郭門者前曰此刀鞘門手所作去嵗賣與郭民董及祖悅収及祖詰之及祖欵引靈之又於及祖身上得毛奴所著皂襦及祖伏法悦察獄多此類也後周書曰建徳二年冬帝聴訟於正武殿自旦及夜繼之以燭又曰栁慶為雍州别駕冇賈人持金二十斤詣京師交易寄人停止每欲出行常自執管鑰無何緘閉不異而失之謂是主人所竊郡縣訊問主人遂自誣服慶聞而歎之乃召問賈人曰卿鑰恒置何處}
