  - {type: variant, offset: 2219, length: 0, content: '', WYG: 甫之不能聴獄也答而反之公甫之聴獄也有罪者懼無罪者恥民近禮矣春秋元命苞曰樹棘槐聴訟於下棘赤心有刺言治人者原其心不失其實所以刺人情令各歸實槐之言歸也情見歸實也山海經曰夏后啓之臣曰孟涂是司神于巴人聴其訟獄為之神主訟于孟涂之所令㫁之也其衣有血者乃執之㑹稽典録曰郡署鍾離意北部督郵烏程男}
