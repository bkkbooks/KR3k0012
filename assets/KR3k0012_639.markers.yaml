  - {type: variant, offset: 15, length: 3, content: 用晉世, krp: 白而濕右黒而燥寤而心悸竊以爲不祥問筮者筮者曰憂獄訟逺三枕避三沐旣至妻爲具沐夜授豐枕豐記筮者之言皆不從之妻乃自沐枕枕而寢融曰吾知之矣馬左而濕濕水也左水右馬馮字兩日昌字也其馮昌殺之乃獲昌詰之具首服夲與其妻謀董豐期以新沐枕枕爲驗乃悞中婦人也宋書曰傅琰爲山隂令有賣針賣糖嫗争絲各言巳者詣琰琰掛而輕鞭之有鐡屑乃罰賣糖者又有二老争鷄問何食一云食粟一云食豆剖之見粟罰言豆者人畏如神明後魏書曰辛祥爲并州平北府司馬㑹刺史喪朝廷以其公清遂越長史勑行州事祥𥘉在司馬失白璧還兵藥道顯𬒳誣爲賊官屬推處咸以爲然祥曰道顯靣有悲色察獄以色其此之謂乎苦執申之月餘別獲真賊又曰李崇爲揚州刺史先是壽春縣人荀㤗有子三歳遇賊亡失數年不知所在後見在同縣人趙奉伯家㤗以狀告各言巳子並有隣證郡縣不能斷崇曰此易知耳二父與兒各在別處經禁數旬然後遣人告之曰君兒偶患向巳暴死有教解禁可出奔哀也荀㤗即號咷悲不自勝奉伯咨嗟而已殊無痛意察知之乃以兒還㤗詰奉伯詐狀奉伯乃欵引云先亡一子故妄認之又曰裴安祖弱冠州辟主簿民有兄弟争財詣州相訟安祖召其兄弟以禮義責讓之此人兄弟明日相率謝罪州内欽服之又曰唐和爲内都大官評决獄訟不加捶楚欵獲實者甚多丗以是稱之又曰司馬悅字慶宗歷位豫州刺史時有汝南上蔡董毛奴者賫錢五千死於道路郡縣疑人}
  - {type: variant, offset: 19, length: 2, content: 杜律, SBCK: 堤爲刼又堤家得錢五千堤懼掠自誣言殺至州恱觀色疑其不實引見毛奴兄靈之謂曰殺人取錢當時狼狽應有所遺得何物靈之曰唯得一刀削恱取視之曰此非里巷所爲也乃召州内刀匠示之屬有郭門者前曰此刀削門手所作去嵗賣與郭人董及祖悅収及祖詰之及祖欵引靈之又於及祖身上得毛奴所着皂􅃭及祖伏法悅察獄多此􅀋也後周書曰建德二年冬帝聽訟於正武殿自旦及夜繼之以燭又曰栁慶爲雍州別駕有賈人持金}
