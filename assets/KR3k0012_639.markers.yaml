  - {type: variant, offset: 2237, length: 0, content: '', WYG: 衆議無以奪意之理又曰謝夷吾字堯卿山隂人也為荆州刺史行部到南陽縣遇孝章皇帝巡狩駕幸魯陽上未嘗見刺史班秩有詔勅夷吾入傳録見囚徒誡長吏勿廢舊儀上臨西廂南面夷吾處東分帷隔其中夷吾省録囚徒有亭長姦部民者縣言和姦上意以為吏姦民何得言和觀刺史決當云何頃夷吾訶之曰亭長詔書朱幘之吏職在禁姦今為惡之端何得言和切譲三老孝弟兄長罪其所決正一縣三百餘事與上合章帝嘆曰使諸州刺史盡如此者朕不憂天下特遷鉅鹿}
