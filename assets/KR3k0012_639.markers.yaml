  - {type: variant, offset: 2195, length: 1, content: 犯, WYG: 賊所隣近被囚繫者甚多慶以賊徒既衆似是烏合既非舊交必相疑阻可以詐求之作匿名書多榜官門曰我等共刼胡家徒侣混雜終恐泄露今欲首懼不免誅聴先首免罪便欲来告慶乃復施免罪之牓居二日廣陽王欣家奴面縛自告牓下因此推窮盡獲黨與慶守正明察毎歎曰昔于公斷獄無私闢髙門可以待封儻斯言有騐吾庶幾乎又曰蘇綽為六條詔書奏施行之其一先治心其二敦教化其三盡地利其四擢賢良其五恤刑獄其六均賦役文帝甚重之常置之座右隋書曰韋鼎為光州刺史有人客逰通主人家之妾及其還去妾盗物於夜迯亡尋於草中為人所殺主家知與妾通因告客殺之縣司鞫問具得姦状因斷客辜獄成上於鼎覽之曰此客實姦而非殺也乃某寺僧誘妾盗物令奴殺之贓在某處即放此客遣捕僧并獲贓物自是部内肅然咸稱其神又曰辛公義為牟州刺史下馬先至獄中因露坐牢側親自騐問十數日間決斷咸盡方還大㕔受領新訟皆不立文案遣當直佐寮二人側坐詰問事若不盡應須禁者公義即宿㕔事終不還閤人或諫之曰此事有程使君}
