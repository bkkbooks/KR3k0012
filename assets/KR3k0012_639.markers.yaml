  - {type: variant, offset: 3274, length: 201, content: 二年詔曰車服制度恣極耳目田荒不耕游食者眾有司其中明科禁宜於今者宣下郡國魏志曰曹仁少時不脩行檢及長為將嚴邪正奉法令常置科於左右案以從事宋書曰顧深之子寶先大明中為尚書水部郎先深之為左承荀萬秋所劾及寶先為郎萬秋猶在職自陳不拜世祖詔曰憲司之職理有釐厘正而頃刻無輕重輒致私絕此風難長主者可嚴為其科劉邵律略曰刪舊科採漢律為魏律懸之象魏揚雄劇秦美新曰金科玉條科條謂所施法律金玉珍之也說文曰科程也程品也十發為程十程為寸, SBCK: 九}
