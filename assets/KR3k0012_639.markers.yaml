  - {type: variant, offset: 40, length: 2, content: 仲尼, SBCK: 此客實姦而非殺也乃某寺僧詃妾盗物令奴殺之􅂍在某處即放此客遣掩僧并􅀗􅂍物自是部内肅然咸稱其}
  - {type: variant, offset: 40, length: 2, content: 仲尼, krp: 此客實姦而非殺也乃某寺僧詃妾盗物令奴殺之贓在某處即放此客遣掩僧并獲贓物自是部内肅然咸稱其}
  - {type: variant, offset: 43, length: 1, content: 言, SBCK: 神又曰辛公義爲牟州刺史下車先至獄中因露坐牢側親自驗問十餘日間决斷咸盡方還大㕔受領詞訟皆不立文案遣當直佐寮一人側坐誶問事􅀂不盡應湏禁者公義即􅀫􅆹事終不還閤人或諌之曰此事有程使君何自苦也荅曰刺史無德可以導人尚令百姓係於囹圄豈有禁人在獄而心自安乎罪人聞之咸自欵服後有欲諍訟者其郷閭父老遽相曉曰此盖小事何忍勤勞使君訟者多兩讓而止尚書大傳曰聽獄之術大治有三治必寛寛之術歸於察察之術歸於義察猶審也是故聽而不寛是亂也寛而不察是慢也}
