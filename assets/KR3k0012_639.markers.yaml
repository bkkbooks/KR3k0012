  - {type: variant, offset: 1235, length: 0, content: '', WYG: 散久矣如得其情則哀矜而勿喜漢書曰于定國飲酒至數石不亂冬月治獄請讞飲酒益精明後漢書曰陳寵辟司徒鮑昱府是時三府掾屬専尚交㳺以不肯視事為髙寵常非之獨勤心物務數為昱陳當代便宜昱髙其能轉為辭曹掌天下獄訟續漢志曰三公掾属二十四人有辭曹主訟事也其所平決無不厭服衆心時司徒辭訟久}
