  - {type: variant, offset: 6, length: 4, content: 下科附齊, SBCK: 断獄也又曰孟氏使陽膚爲士師士師典獄之官問於曽子曽子曰上失其道民散乆矣如得其情則哀矜而勿喜漢}
  - {type: variant, offset: 6, length: 4, content: 下科附齊, krp: 断獄也又曰孟氏使陽膚爲士師士師典獄之官問於曽子曽子曰上失其道民散乆矣如得其情則哀矜而勿喜漢}
  - {type: variant, offset: 7, length: 3, content: 科附齊, WYG: 而聴㫁焉又曰行露召伯聴訟也周禮曰以兩造禁民訟入束矢於朝然後聴之訟謂以財貨相告者造至也使訟者兩至使入束矢乃治之也不至不入束矢則是自服不直者也必入矢取其直也詩曰其直如矢束矢其百箇與以兩劑禁民獄入鈞金三日乃致於朝然後聴之獄謂相告以罪名者劑今券}
