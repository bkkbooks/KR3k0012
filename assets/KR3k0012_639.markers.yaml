  - {type: variant, offset: 2294, length: 166, content: 乃還走避舍露宿三曰北面再拜請罪又曰夫人臣之侵其主也如地形焉即漸以往使人主失端東西易面而不自知故先王立教司南以端朝夕明王使其群臣不遊意於法之外不為惠於法之內虎所以能服狗者爪牙也使虎釋其爪牙使狗用之則虎反服於狗矣人主者以形德制臣也今君釋其刑德而臣用之則臣反制於君矣又曰犇車之上無仲尼覆舟之下無伯夷故號令者國之舟車也安則智廉生危則鄙爭起又, WYG: ''}
