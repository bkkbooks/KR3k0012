  - {type: variant, offset: 3269, length: 3, content: 明帝永, SBCK: 頴川有冨室兄弟同屋兩婦俱懷姙大婦數月胎傷因閉匿之産期至到乳舎弟婦生男夜因盗取争訟三年州縣不能决丞相黄覇出殿前使卒抱兒去兩婦各十餘歩叱婦自徃取之長婦把持甚急兒大啼弟婦恐傷害之因乃放與而心甚悽愴覇曰此弟婦子也責問婦乃伏也太}
  - {type: page-break, offset: 3269, content: '', id: KR3k0012_SBCK_639-10a}
  - {type: variant, offset: 3269, length: 3, content: 明帝永, WYG: 潁川有富室兄弟同屋兩婦俱懐孕大婦數月胎傷因閉匿不産期至到乳舍弟婦生男夜因盗取争訟三年州縣不能決丞相黄霸出殿前使卒抱兒去兩婦各十餘步叱婦自往取長婦抱持甚急兒大呌啼弟婦恐傷害之因乃放與而心甚自悽愴霸曰此弟婦子也責問大婦乃伏太}
