  - {type: variant, offset: 12, length: 2, content: 初江, SBCK: 于定國飲酒至數石不亂冬月治獄請讞飲酒益精明後漢書曰陳寵辟司徒鮑昱府是時三府􅁺屬專尚交遊以不肯視事爲髙寵常非之獨勤心物務數爲昱陳當代便冝昱髙其能轉爲辭曹掌天下獄訟續漢志曰三公􅁺屬三十四人有辭曹主辭訟事也其所平决無不厭服衆心時司徒辭訟乆者數十年事􅀋溷錯易爲輕重不良吏得生因縁因縁謂依附以生輕重也寵爲昱撰辭訟比七卷决事科二條皆以事􅀋相從昱奏上之其後公府奉以爲法又曰王渙爲洛陽令以平正居身得寛猛之冝不􅁈嫌乆訟歷政所不斷法理所難平者莫不曲盡情詐壓塞羣疑又能以譎數發擿姦服譎詐數術也京師稱歎以爲渙有神筭又曰法雄爲青州刺史界内肅清雄每行部録囚徒察顔色知情僞長吏不奉法即解印去之魏書曰廷尉髙柔時護軍營士竇禮近出不還營以爲亡表言逐捕役其妻盈及男女爲官奴婢盈連至州府稱􅁈自訟莫有省者乃辭詣廷尉柔問曰汝何以知夫不亡盈垂泣對曰夫少單特養一老嫗爲母事甚㳟謹又哀兒女撫視不離非是輕狡不頋室家者也柔重問曰汝夫不與人有怨讎乎對曰夫良善與人交錢財乎對曰甞岀錢與同營士焦子乆求不得時子適坐小事繫獄柔乃見子問所坐言次汝頗曽舉人錢不子曰自以單貧􅀄不敢舉人物也柔察子色動遂曰汝昔舉竇禮錢何言不耶子怪知事露應對不次柔曰汝巳殺禮便冝早服子於是叩頭具首殺禮夲末埋藏處所柔便遣吏卒承子辭徃掘得其屍詔書復盈母子爲平人晉書曰陸雲爲浚儀令雲到官肅然下不能欺市無二價人有見殺者主名不立雲録其妻而無所問十許日遣出宻令人隨後謂曰不出十里當有男子候之與語便縛來旣而果然問之具服云與此妻通共殺其夫聞妻得出欲與語憚近縣故逺相邀􅀱於是一縣稱爲神明又曰鄧攸甞詣鎮軍將軍賈混混以人訟事示攸使决之攸不視曰孔子稱聽訟吾猶人也必也使無訟乎混竒之以女妻之矣又曰符融仕符堅爲司􅀠校尉京兆人董豐遊學三年而返􅀫妻家妻爲賊所殺妻兄疑豐殺之送豐有司豐不堪楚掠自誣引殺妻融察而疑之問豐曰汝行徃還頗有怪異及卜筮否豐曰􅀄將發夜甞夢乗馬南渡水返而北渡水馬停水中鞭䇿不去俯而視之見兩日在於水下馬}
