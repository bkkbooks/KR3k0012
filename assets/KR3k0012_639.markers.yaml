  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第六百三十九}
  body:
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 五聽訟易訟卦曰天與水違行訟君子以作事媒始又豐卦曰雷電皆至豊君子以折獄致刑詩曰蔽芾甘棠勿剪勿伐召伯所苃箋云茇草舎也夫召伯聽男女之訟不重煩勞百姓止舎于棠之下而聽斷焉又曰行露召伯聽訟也周禮曰以兩造禁民訟入束矢於朝然後聽之訟謂以財貨相告者造至也使訟者兩至旣兩至使入束矢乃治之也不至不入束矢則是自服不直者也必入矢者取其直也詩云其直如矢束矢其百个與以兩劑禁民獄入鈎金三日乃致于朝然後聽之獄謂相􅁻以罪名者劑今劵書也使獄者各齎劵書旣爾劵書及使人鈎金又三日乃治之重刑也不劵書不入金則是自服不直者也夫入金者取其堅也以嘉石平罷民嘉石文石也樹之外朝門左平成也成使善也以肺石逹窮民肺石赤石也窮民天之窮而無告也凡逺近􅑏獨老㓜之欲有復於上而其長弗逹者立於肺石三日士聽其辭以告於上而罪其長又曰凢諸侯之獄訟以邦典定之􅀖典六典也凢卿大夫之獄訟以邦法斷之􅀖法八法也凢庶民之獄訟以邦成弊之􅀖成謂􅀂今時决事之比也又曰以五刑聽万民之獄訟附于刑用情訊之至于旬乃弊之讀書則用法附猶著也訊言也用情理言之兾有可以岀之者十日乃断之以五聲聽獄訟求民情一曰辭聽􅀚其出言不直則煩二曰色聽觀其顔色不直則赧然三曰氣聽觀其氣息不直則喘}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_639-1b}
  - {type: variant, offset: 3, length: 3, content: 四律令, WYG: 五聴訟易訟卦曰天與水違行訟君子以作事謀始又豐卦曰雷電皆至豐君子以折獄致刑詩曰蔽芾甘棠勿剪勿伐召伯所茇傳云茇草舎也召伯聴男女之訟不重煩勞百姓止舎甘棠之}
