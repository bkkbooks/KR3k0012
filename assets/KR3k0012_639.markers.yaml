  - {type: variant, offset: 1232, length: 0, content: '', WYG: 掌三刺三宥三赦之法以賛司冦聴獄訟一刺曰訊羣臣再刺曰訊羣吏三刺曰訊萬民訊言也一宥曰不識再宥曰過失三宥曰遺忘不識謂愚民無所識則宥之過失若今時律過失殺人不坐死康成謂識審也若今仇讎當報甲見乙誠以為甲而殺之者過失若舉刃欲斫伐而軼中人者遺忘若間帷薄忘有在焉而以兵矢投射也禮曰分争辯訟非禮不決又曰司冦正刑明辟以聴獄訟司冦秋官卿掌刑者辟罪也必三刺以求民情㫁明其獄訟之中一曰訊羣臣二曰訊羣吏三曰訊萬民有㫖無簡不聴簡誠也有其意無其誠不論以為罪附從輕附施刑也求出之使從􅁿赦從重雖是罪可重猶赦之}
  - {type: page-break, offset: 1232, content: '', id: KR3k0012_WYG_639-3a, image: WYG0898/WYG0898-0704a.png}
  - {type: variant, offset: 1233, length: 1, content: 牧, WYG: 聴五刑之訟必原父子之親立君臣之義以權之權平也意論輕重之序慎測淺深之量以别之意思念也淺深謂俱有罪本心有善惡悉其聰明致其忠愛以盡之盡其情也傳曰王叔陳生與伯輿争政二子王卿士王右伯輿右助也王叔陳生怒而出奔晉侯使士匄平王室王叔與伯輿訟焉争曲直王叔之宰與伯輿之大夫瑕禽坐獄於王庭士匄聴之范宣子曰天子所右寡君亦右之所左亦左之使王叔氏與伯輿合要王叔氏不能舉其契王叔奔晉論語曰子曰聴訟吾猶人也必也使無訟乎子曰片言可以折獄者其由也與片讀為卑片言為單辭折㫁也子路果敢所言必直故可令獄折辨又曰孟氏使陽膚為士師士師典獄之官問於曽子曽子曰上失其道}
