  - {type: variant, offset: 2197, length: 1, content: 為, WYG: 自苦也荅曰刺史無徳可以道人尚令百姓係於囹圄豈有禁人在獄而心自安乎罪人聞之咸自欵服後有欲争訟者其鄉閭父老遽相曉曰此蓋小事何忍勤勞使君訟者多兩譲而止尚書大傳曰聴訟之術大畧有三治必寛寛之術歸於察察之術歸於義察猶審也是故聴而}
  - {type: variant, offset: 2199, length: 1, content: 治, WYG: 寛是亂也寛而不察是慢也古之聴訟者言不越情情不越義是故聴民之術怒必畏畏思兼小罪勿兼怒責也責因之罪必思兼謂思其辭思其主思義重大罪可求以出之罪}
