  - {type: variant, offset: 1510, length: 296, content: 於人間反己自正商君書曰凡人主德行非出人也勇力非過人也然民雖有聖智弗敢謀有勇力弗敢殺雖眾弗勝其制民無億萬之數雖行重賞而民弗敢爭行重罰而民弗敢怨者法也又曰法令者民之則也為治之本也所以備民也知者不得過過者不得不及名分不定而欲天下之治也是猶欲無飢而去食欲無寒而去衣也欲至東而西行其不幾亦明矣一兔走而百人逐之非兔一可以分百也由名之未定也夫賣兔在市盜不敢取分之定也今法令不明其名不定天下之人得議之也慎子曰法之功莫大使私不行君之功莫大使民不爭今立法而行私是私與法爭其亂甚於無法立君而尊賢是與君爭其亂甚於無君故有道之國法立則私義不行君立則賢者不尊民一於君事斷於法是國之大道也又曰法雖不善猶愈於無投鉤分財投策分, SBCK: 陛見賜車}
