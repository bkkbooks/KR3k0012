  - {type: variant, offset: 2948, length: 5, content: 以象十二月, WYG: 三籌為一都異苑曰晉海西公時有貴人㑹因藏鉤歘有一手間在衆臂}
  - {type: variant, offset: 2948, length: 5, content: 以象十二月, krp: 五籌爲一賭異苑曰晉海西公時有貴人㑹因藏彄欻有一手間在衆臂}
