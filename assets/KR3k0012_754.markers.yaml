  - {type: variant, offset: 1587, length: 0, content: '', SBCK: 俱黒其一子轉躍未定􅁉厲聲喝之即成盧焉毅意殊不快然素黒其面如鐵色焉旣而乃和言曰亦知公不能以此見借又曰周顗之死也王敦坐有一叅軍樗蒱馬於博頭􅀍殺因謂敦曰周家弈丗令望而位不至公及伯仁將登而墜有似下官此馬伯仁顗之字也又曰慕容寳􅀄在長安與韓黄李拫等因讌樗蒱寳危坐整容誓之曰丗云樗蒱有神豈虚也哉􅀂富貴可期頻得三盧於是三擲三盧宋書曰何尚之時頗輕薄少好樗蒱旣長折節蹈道以操立見稱爲陳郡謝琨所知與之遊處齊書曰李安民擊鵲尾江城有功明帝大㑹新亭樓勞諸軍令樗蒱共賵安民五擲皆盧帝大驚目安民曰}
  - {type: page-break, offset: 1587, content: '', id: KR3k0012_SBCK_754-6a}
  - {type: variant, offset: 1587, length: 3, content: 卿馬綏, WYG: 交手共戲至是果驗後周書曰王思政雖被任委自以非相府之舊毎不自安太祖曽在同州與羣公宴集出錦􅄢及綾絹數千令諸將摴蒱取之物既盡太祖又解所服金帶令諸人遍擲曰先得盧者即與之羣公將遍莫有得者次至思政乃斂容跪坐而自誓曰王思政羇旅歸朝䝉宰相國士之遇方願盡心效命上報知已若此誠有實令宰相賜知者願擲即為盧若内懐不盡神靈亦當}
  - {type: page-break, offset: 1587, content: '', id: KR3k0012_WYG_754-9b, image: WYG0899/WYG0899-0617d.png}
  - {type: variant, offset: 1587, length: 0, content: '', krp: 俱黒其一子轉躍未定𥙿厲聲喝之即成盧焉毅意殊不快然素黒其面如鐵色焉旣而乃和言曰亦知公不能以此見借又曰周顗之死也王敦坐有一叅軍樗蒱馬於博頭𬒳殺因謂敦曰周家弈丗令望而位不至公及伯仁將登而墜有似下官此馬伯仁顗之字也又曰慕容寳𥘉在長安與韓黄李拫等因讌樗蒱寳危坐整容誓之曰丗云樗蒱有神豈虚也哉若富貴可期頻得三盧於是三擲三盧宋書曰何尚之時頗輕薄少好樗蒱旣長折節蹈道以操立見稱爲陳郡謝琨所知與之遊處齊書曰李安民擊鵲尾江城有功明帝大㑹新亭樓勞諸軍令樗蒱共賵安民五擲皆盧帝大驚目安民曰}
