  - {type: variant, offset: 1547, length: 6, content: 葛洪體鈍性駑, SBCK: 南陽文氏求食入山見髙岩上有數人對慱淮南子曰善愽者不欲牟慱以不傷爲牟牟大也進也不恐不勝平心定意投得其齊齊得其適行由其理雖不必勝得籌必多韓子曰薛公之相魏昭侯也有陽胡蕃者於王甚重而不爲薛公薛公患之於是乃與之􅀶與之百金令與昆弟􅀶戲俄又益之二百金又曰齊宣王問匡倩曰儒者愽乎對曰博也者貴梟勝者必殺梟是殺其}
