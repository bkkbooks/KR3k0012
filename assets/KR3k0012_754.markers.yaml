  - {type: variant, offset: 2106, length: 3, content: 清靈體, SBCK: 余離羣索居無講誦之事欲學無友欲農無耒欲弈無塞欲博無楮問可以代博弈者乎曰塞其次也書曰始作塞者其明哲乎故其用物也約其爲樂也大藏鈎古作彄辛氏三􅁗記曰昭帝母鈎弋夫人手拳而有國色先帝寵之世人藏鈎法此也法其拳乎西京􅄂記曰戚夫人以百錬金爲彄環照見指骨上惡之以賜侍兒荆楚歳時記曰爲藏彄之戯辛氏以爲鈎弋夫人所起周鈎成公綏並作彄字藝經􅁃闡則作鈎字其事同也俗去此戯令人生離有禁忌之家廢不修也風土記曰臈日飲􅀕之後嫂嫗兒童爲藏彄之戯分二曹以效勝􅀒􅀂人偶即敵對人竒居冝切奇獨也即使竒人爲遊附或属上曹或属下曹名爲飛烏以齊二曹人數一彄藏在數十手中曹人當射常益切知所在一藏爲籌五籌爲一賭異􅁐曰晉海西公時有貴人㑹因藏彄欻有一手間在衆臂之中脩骨巨指毛色麤黒舉坐咸驚尋爲桓大司馬所誅舊傳藏彄令人生離斯驗深矣晉􅁃闡藏彄賦曰歎延夜之藏彄賞一時之戯望以}
