  - {type: variant, offset: 2754, length: 108, content: 善投壺以竹為矢不用棘也古之投壺取中而不求還故實小豆惡其矢躍而出也郭舍人則激矢令還一矢百餘反語之為驍言如博之堅於輩中為驍傑每為武帝投壺輒賜金帛獻帝春秋曰袁紹聞魏郡兵反與黑山賊等數萬人共覆鄴城殺郡守坐中家在鄴者憂怖失色或, WYG: 所}
