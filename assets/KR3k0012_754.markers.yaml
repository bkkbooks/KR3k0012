  - {type: variant, offset: 928, length: 3, content: 帝好圍, SBCK: 使其子度丗往華山求之度丗望見父上有紫雲白玉爲床與數人博戲度出問父所與博者是誰曰洪崖先生許由巢父也􅁗記曰吕光破􅀛兹始獲鳩摩羅什光死子纉立戯弄羅什或共}
