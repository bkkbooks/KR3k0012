  - {type: variant, offset: 595, length: 295, content: 對者求止籍不肯留決勝焉晉中興書曰王恬字敬豫與濟陽江霖俱善弈碁為中興第一又曰陶侃在荊州見佐吏愽弈戲具投之於江曰圍碁者堯舜以教愚子博者商紂所造諸君並懷國器何以為此一本為牧猪奴戲晉起居注曰鎮東司馬顏延之坐圍碁免官沈約宋書曰羊玄保為黃門侍郎善弈碁碁品第三太祖亦好玄數蒙引見與太祖賭郡戲勝得補宣城太守又曰徐羨之沉密寡言不以憂喜見色頗工弈碁當世以此推之又曰謝弘微性無慍色末年與人圍碁西南有碁死勢有人曰南風急或覆舟人悟救之弘大怒投局於地識者知其莫年齊書曰能碁人琅耶王抗為第一品吳郡禇思莊會稽夏赤松第二品赤思速善於鬭碁宋文帝世羊玄保戲因製局圖還於帝前覆之太祖使思莊與王抗官賭自食時至日暮一局始竟上倦遣還省至, SBCK: 云格}
