  - {type: variant, offset: 3184, length: 0, content: '', WYG: 奏之劉向作弹碁以獻帝大悅賜青羔裘紫絲履以服朝覲焉又曰太上皇帝徙長安居深宫悽悵不樂高祖竊因左右問以生平所好皆屠販少年鬭雞蹴鞠以為忻今皆無此故不樂也劉向别録曰蹴鞠者𫝊言黄帝所作或曰起戰國時記黄帝蹴鞠兵勢也}
  - {type: variant, offset: 3184, length: 0, content: '', krp: 奏之家君作彈碁以獻帝大恱賜青羔裘紫絲履以服朝覲焉又曰太上皇徙長安居深宫悽悵不樂髙祖竊因左右問正以生平所好皆屠販少年鬪鷄蹴鞠以爲忻仐皆無此故不樂也劉向別録曰蹴鞠者傳言黄帝所作或曰起戰國時記黄帝蹴鞠兵勢也}
  - {type: variant, offset: 3186, length: 2, content: 矯懈, WYG: 練武士知有方也令軍士無事得使蹴鞠有書二十五篇㑹稽典録曰漢末三國鼎峙年興金革上以弓馬為務家以蹴鞠為學於是名儒洪筆絶}
  - {type: page-break, offset: 3186, content: '', id: KR3k0012_WYG_754-15a, image: WYG0899/WYG0899-0620c.png}
  - {type: variant, offset: 3186, length: 2, content: 矯懈, krp: 練武士知有才也今軍事無事得使蹴鞠有書二十五篇㑹稽典録曰唐庠字漢序三國鼎跱㸦興金革士以弓馬爲務家以蹴鞠爲學於是名儒洪筆絶}
  - {type: variant, offset: 3189, length: 26, content: 正心也晉李尤壺籌銘曰投壺籌禮揖敘先後通風月數分為王部, WYG: 不續太平御覽卷七百五十四}
