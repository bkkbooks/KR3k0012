  - {type: variant, offset: 2216, length: 354, content: 曰投壺之禮主人奉矢司射奉中使人執壺投壺射之類也主人請曰某有枉矢哨且礁切哨不正貌壺請樂賓賓曰子有旨酒嘉肴既受賜矣又重以樂敢辭主人曰枉矢哨壺不足辭也敢固以請賓曰某既賜矣又重以樂敢固辭主人曰枉矢哨壺不足辭也敢固以請賓曰某固辭不得命敢不敬從不得命不以命見許賓再拜受主人般還曰辟賓再拜受受矢也主人阼階上拜送賓般還曰辟拜送送矢也已拜受矢進即兩楹間退反位揖賓就筵司射進度壺間以二矢半反位設中東面執八筭興設中亦賓也八筭於中橫委其餘於中西執筭而立以請賓俟投請賓曰順投為入比投不釋勝飲不勝者正爵既行請為勝者立馬一馬從二馬三馬既立請慶多馬請主人亦如之請猶告也順投矢本入也比投不捨也勝飲不勝言以能養不能也禮記曰壺頸脩七寸腹脩五寸口徑二寸半容㪷五升壺中實小豆焉為其矢之躍而出也壺去席二矢半矢以柘若棘毋去其皮取其堅且重也或言去其皮節也左, SBCK: 􅂫􅁗}
