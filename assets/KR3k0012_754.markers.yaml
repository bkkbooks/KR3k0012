  - {type: variant, offset: 1811, length: 3, content: 羊玄保, SBCK: 殷伯弟爲何無忌叅軍在潯陽與何共樗蒱得何百萬便住何大怒罵殷丗說曰温嶠位未髙時屢與揚州淮中賈客樗蒱毎輙不競甞一過大輸物盡戯屈無因得反與太尉􅁃亮友善嶠於舫中大喚􅁃亮卿可贖我􅁃即送直然後得還異苑曰潁川陳寂元嘉中晝忽有一足􅀑長三尺許爲寂驅使欲與鄰人樗蒱而無五木􅀑乃取刀斫庭中楊枝於户間}
