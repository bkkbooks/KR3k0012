  - {type: variant, offset: 2748, length: 0, content: '', SBCK: 成帝好蹴鞠羣臣以蹴鞠勞體非至尊所冝帝曰朕好之可擇似不勞者奏之家君作彈碁以獻帝大恱賜青羔裘紫絲履以服朝覲焉又曰太上皇徙長安居深宫悽悵不樂髙祖竊因左右問正以生平所好皆屠販少年􅃲鷄蹴鞠以爲忻仐皆無此故不樂也劉向別録曰蹴鞠者傳言黄帝所作或曰起戰國時記黄帝蹴鞠兵􅀔也所以練}
