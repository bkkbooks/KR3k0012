  - {type: variant, offset: 1547, length: 0, content: '', WYG: 南陽文氏求食入山見高崕上有數人對愽淮南子曰善愽者不欲牟不恐不勝平心定意投得其齊行由其理雖不必勝得籌必多韓子曰薛公之相魏昭侯也有楊胡蕃者於王甚重而不為薛公薛公患之於是乃與之愽與之百金令與昆弟愽戲俄又益之二百金又曰齊宣王問莊賈曰儒者愽乎對曰愽也者貴梟勝者必殺梟是殺其所貴也儒者以為害義故不愽尹文子曰愽者盡關塞之宜得周通之路楊子法言曰或問侍君子􅀶乎曰侍坐則聽言有酒則觀禮焉事􅀶乎說苑曰秦始皇時嫪毐驕奢後與帝左右愽争行乃瞋目大呼又曰晉靈公驕奢造九層之臺謂左右曰敢諌者斬孫息聞之求見公曰子何能孫息曰臣能累十二愽碁加九雞子於其上公曰吾少學未甞見也子為寡人為之孫息即正顔色定志意以棊子置於下而加九雞子於上左右慴息靈公俯伏氣息不續公曰危哉孫息曰公為九層之臺三年不成危甚於此風俗通曰漢武帝與仙人共愽其投石中馬蹄處於今尚在典略曰荆軻與魯勾踐􅀶争道勾踐怒而叱之軻去而逃婁春秋舊事曰倪寛為漢司馬農卿與太子愽争局犯罪而還遁甲經曰天一逰亭六行亭亭天之一貴神也戰鬭􅀶戲漁獵但可背不可向也薛孝通譜曰烏曹作愽其所由来尚矣雙箭以象日月之照臨十二碁以象十二辰之躔次則天地之運動法隂陽之消息表人事之窮達窮變化之機微履謙謝則知沖謝以致福觀殺伐則知當路而速禍行其道則掎鹿有歸保其家乃瞻烏爰集隠顯藏用莫不合道龍潛雀起率皆趣良足以諧暢至娱治恊妙賞者也魏曹植古冶子等讃曰齊疆接子勇節徇名虎門之􅀶忽晏置釁矜而自伐輕死重分魏王粲彈碁賦序曰因行騁志通權達理六愽是也晉李尤愽銘曰夫無用心􅀶奕猶賢方平處下自不邪偏摴蒱晉書曰桓𤣥見人有好園宅悉欲取之勒以蒱摴而賭𤣥微聞義軍起憂懼弗能寢食或曰劉裕等狂惑事必無成𤣥曰裕為一世之雄加以果於用兵劉毅家無擔石之儲摴蒱一擲百萬何無忌劉牢之外甥酷似其舅共舉大事何為無成又曰}
