  - {type: variant, offset: 1874, length: 2, content: 王武, SBCK: 昔有人乗馬出行於岫裏見二老公相對樗蒱遂下馬以䇿拄地而觀之自謂俄頃望視其馬鞭漼然巳爛顧瞻其馬鞍亦枯朽旣還無復親識一慟而絶􅁃翼集曰頃聞諸君有樗蒱過差者􅀄爲是政事閑暇以娯意耳故未有言也今知大相聚集漸以成俗聞之能不憮然繁欽威儀箴曰其有退朝偃息閑居操橩瞿營切橩博}
  - {type: variant, offset: 1874, length: 0, content: '', WYG: 昔有人乗馬山行岫裏有二老翁相對摴蒱遂下馬以䇿拄地而觀之自謂俄頃望視其馬鞭漼然已爛顧瞻其馬鞍骸枯朽歸還無復親識一慟而絶庾翼集曰頃聞諸君有摴蒱過差者初為是政事閒暇以娱以甘故未有言也今知大相聚集漸以成俗聞之能不憮然繁欽威儀箴曰其有退朝偃息閒居營操弄碁文局摴蒱言不及義勝負是圖塞說文曰塞行碁相塞謂之塞齊書曰沈文季字仲達吴興武康人也尤善塞用五子穆天子𫝊曰天子北入邴與井公塞魏}
