  - {type: variant, offset: 3181, length: 2, content: 投壺, WYG: 余以臘後要命中外以行彄為戲心悅其事故賦之云蹴鞠風俗通曰丸毛謂之鞠郭璞二蒼解詁曰鞠毛丸耳蹋戲史記蘇秦𫝊曰臨淄民無不吹竽鼓瑟擊筑鬭雞走狗六􅀶蹴鞠漢書曰東方朔云董君貴寵天下莫不聞郡國走馬蹴鞠之客輻輳於董氏焉魏略曰孔桂字叔林性便妍好蹴鞠故太祖愛之每在左右唐書曰姜交𤣥宗即位召拜殿中少監數召之卧内侍宴私以后妃連榻間以擊毬常呼之為姜七梁冀别𫝊曰好鞠西京雜記曰成帝好蹴鞠羣臣以蹴鞠勞體非至尊所宜帝曰朕好之可擇似不勞}
