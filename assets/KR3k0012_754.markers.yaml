  - {type: variant, offset: 3181, length: 2, content: 投壺, krp: 余以臘後要命中外以行鈎爲戲心恱其事故賦之云蹴鞠風俗通曰九毛謂之鞠郭璞三蒼解詁曰鞠毛丸可蹋戯史記蘇秦傳曰臨淄民無不吹竽鼓瑟擊筑鬪鷄走狗六博蹴鞠漢書曰東方朔云董君董偃也貴寵天下莫不聞郡國走馬蹴鞠客輻湊於董氏焉魏略曰孔桂字叔林性便妍好蹴鞠故太祖愛之毎在左右唐書曰姜皎玄宗即位召拜殿中少監數召入卧内侍宴私以后妃連榻間以擊毬常呼之爲姜七梁兾別傳曰兾好蹴鞠西京雜記曰成帝好蹴鞠羣臣以蹴鞠勞體非至尊所冝帝曰朕好之可擇似不勞}
