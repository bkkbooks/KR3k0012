  - {type: variant, offset: 1579, length: 1, content: 世, SBCK: 牧豬奴戯耳又曰劉毅於東府聚樗蒱大擲一判應至數百萬餘人並黒犢以還唯劉􅁉及毅在後毅次擲得雉大喜褰衣繞床叫}
  - {type: variant, offset: 1579, length: 0, content: '', WYG: 牧猪奴戲耳又曰劉毅於東府聚樗蒱大擲一判應至數百萬餘人並黒犢以還唯劉裕及毅在後毅次擲得雉大喜褰衣繞牀呌謂同座曰非不能盧不事此耳裕惡之因挼五木久之曰老兄試為卿答既而四子俱黒其一子轉躍未定裕厲聲喝之即成盧焉毅意殊不快然素黒其面如鐵色焉既而和言曰亦知公不能以此見借又曰周顗之死也王敦坐其罪有一㕘軍摴蒱馬於􅀶頭被殺因謂敦曰周家奕}
  - {type: page-break, offset: 1579, content: '', id: KR3k0012_WYG_754-8b, image: WYG0899/WYG0899-0617b.png}
  - {type: variant, offset: 1579, length: 1, content: 世, krp: 牧豬奴戯耳又曰劉毅於東府聚樗蒱大擲一判應至數百萬餘人並黒犢以還唯劉𥙿及毅在後毅次擲得雉大喜褰衣繞床叫}
  - {type: variant, offset: 1580, length: 1, content: 謂, WYG: 令望而坐不至公及伯仁將登而墜有似下官此馬又曰慕容寳初攻長安與韓黄李根等因讌摴蒱危坐整容誓}
  - {type: variant, offset: 1581, length: 0, content: '', SBCK: 同座曰非不能盧不事此耳􅁉惡}
  - {type: variant, offset: 1581, length: 0, content: '', krp: 同座曰非不能盧不事此耳𥙿惡}
  - {type: variant, offset: 1582, length: 4, content: 碁聖故嚴, SBCK: 因挼五木乆之曰老兄試爲卿荅旣而四}
  - {type: variant, offset: 1582, length: 4, content: 碁聖故嚴, WYG: 曰世云摴蒱有神豈虛言哉若富貴可期頻得三盧於是三擲三盧宋書曰何尚之少時頗輕薄好摴蒱既長折節蹈道以操立見稱為陳郡謝琨所知與之遊處齊書曰李安民擊雀尾江城有功明帝大㑹新亭樓勞軍諸王樗蒱官賭安民五擲皆盧帝大驚目安民曰卿面方如田封侯相也安民少時貧窶有一人從門過相之曰君後當大富貴與天}
