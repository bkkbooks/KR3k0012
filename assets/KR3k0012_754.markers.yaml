  - {type: variant, offset: 932, length: 0, content: '', SBCK: 博及殺子云斫胡奴頭什曰不斫胡奴頭其胡奴斫人頭後纉弟越字胡奴果斬纉頭涼州記曰吕光太安二年􅀛兹國使至獻寳貨竒珍汗血馬光臨正殿設㑹文武愽戯西域胡曰諸愽戯取人牛馬財物者胡俗皆陪償述征記曰極西南端門外有石石色青而細修之作博}
  - {type: variant, offset: 933, length: 0, content: '', SBCK: 以遺江東}
  - {type: variant, offset: 934, length: 31, content: 拙去格七八道物議共欺為第三品與第一品王抗圍碁依品賭戲抗每饒借之, SBCK: 可珎玩西京􅄂記}
  - {type: variant, offset: 934, length: 342, content: 拙去格七八道物議共欺為第三品與第一品王抗圍碁依品賭戲抗每饒借之曰皇帝飛碁臣抗下能斷帝終不覺以為信然好之愈篤又曰武陵王曄少年時貧無碁局乃破荻為片縱橫以為碁局指點行勢遂至名品燕書曰羅騰字叔龍工圍碁究盡其妙獨步當時俄而右北平樂抄少攜出與齊焉後魏書曰甄琛舉秀才入都積歲頗以弈碁棄日至乃通夜不止有蒼頭者常令秉燭或時睡即大加其杖如此非一奴後不勝楚痛乃白琛曰郎君辭父母仕宦京師若為讀書執燭不敢暫非乃以圍碁日夜不息豈是向京之意而肆加杖罰不亦理乎琛惕然慚感遂從許赤虎假書研習聞見益優陳書曰梁武帝詔校定碁品到溉朱异已下並集陸瓊時年八歲於客覆局由是京師號曰神童唐書曰順宗朝罷翰林陰陽星卜醫相射覆碁弈諸待詔三十二人初王叔丈以碁待詔既用事惡其與己儕類相亂故罷之江表傳曰呂范討山越還白事於孫策從容獨與圍碁因論軍旅, WYG: 可珍玩}
