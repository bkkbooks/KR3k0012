  - {type: variant, offset: 2942, length: 4, content: 投壺法十, WYG: 臘日飲祭之後叟嫗兒童為藏鉤之戲分}
  - {type: variant, offset: 2942, length: 3, content: 投壺法, krp: 臈日飲祭之後嫂嫗兒童爲藏彄之戯分二曹以效勝負若人偶即敵對人竒居冝切奇獨也即使竒人爲遊附或属上曹或属下曹名爲飛烏以齊二曹人數一彄藏在數}
  - {type: punctuation, offset: 2945, content: ，, id: KR3k0012_CHANT_754-bkkpn920}
  - {type: 'tls:seg', offset: 2945, content: '', id: KR3k0012_CHANT_754-41a.4}
  - {type: variant, offset: 2946, length: 269, content: 二籌以象十二月之數投壺變曰謂之投壺者取名蓨他由切藪漸而轉易鑄金代焉逮之于後人事生矣壺底去一尺其下筍以龍玄玄月中蝦蟆隨其生死也橫日狗龍蛇之類運之以皫平表切蝦謂龍下皫螭也燕尾鷰識候而歸人來去有恒投而歸人自數之極也矢十二數之極也長二尺八寸法於嘗矣古用柘棘古者投壺擊鼓而節帶劍十二入襝頰二帶謂之帶劍倚十八倚並左右如狼尾狀狼壺二十令矢圓轉西於壺口劍驕七十入帶劍還如後也三百六十籌得一馬言三百六十歲功成也馬謂之近黨同得勝也三馬成都魏粲碁賦曰夫注心銳念自求諸身投壺是也晉傅玄投壺賦序曰投壺者所以矯懈而正心也晉李尤壺籌銘曰投壺籌禮揖敘先後通風月數分為王部, SBCK: 四}
  - {type: variant, offset: 2946, length: 1, content: 二, krp: 手中曹人當射常益切知所在一藏爲}
  - {type: variant, offset: 2947, length: 0, content: '', WYG: 曹以校勝負若人偶即敵對人竒即使竒人為逰附或屬上曹或屬下曹名為飛烏以齊二曹人數一鉤藏在數手中曹人當射知所在一藏為一}
