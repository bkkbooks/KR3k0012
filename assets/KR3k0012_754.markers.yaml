  - {type: variant, offset: 1811, length: 3, content: 羊玄保, WYG: 殷伯弟為何無忌恭軍在潯陽與何共摴蒱得百萬便住何大怒罵殷世說曰温嶠位未髙時屢與揚州淮中賈客摴蒱每輒不競甞一過大輸物盡戲屈無因得反與太尉庾亮友善嶠於舫中大唤庾亮卿可贖我庾即送值温得還異苑曰潁川宋寂元嘉中晝忽有一足鬼長三尺遂為寂驅使欲與隣人樗蒱而無五木鬼乃取刀斫庭中楊枝於户間}
