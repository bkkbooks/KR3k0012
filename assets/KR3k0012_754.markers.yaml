  - {type: variant, offset: 1575, length: 3, content: 善圍碁, SBCK: 王獻之年數歳嘗觀門生樗蒱曰南風不競門生曰此郎亦管中窺豹時見一班又曰武帝胡貴嬪帝嘗與之樗蒱爭道遂傷上指帝怒曰此固將種也對曰北伐公孫西拒諸葛非將種而何帝甚有慙色又曰謝鯤婿殷叡好樗蒱奪其妹裝物以還戯債劉湛謂謝弘微曰謝氏累代財産充殷君一朝戯債卿視而不言譬弃物江海以爲廉耳又曰陶偘字士衡見諸叅佐或以談戯廢事乃取其樗蒱博具悉以投于江乃曰樗蒱}
  - {type: page-break, offset: 1575, content: '', id: KR3k0012_SBCK_754-5b}
  - {type: variant, offset: 1575, length: 3, content: 善圍碁, WYG: 王獻之年數歳甞觀門生摴蒱曰南風不競門生曰此郎亦管中窺豹特見一斑又曰武帝喜胡貴嬪帝甞與之摴蒱争道遂傷上指帝怒曰此固將種也對曰北伐公孫西拒諸葛非將種而何帝甚有慚色又曰謝鯤婿殷叡好摴蒱奪其妺裝物以還戲債劉湛謂謝宏微曰謝氏累代財産充殷君一朝戲債卿視而不言譬棄物江海以為亷耳又曰陶侃字士衡見諸參佐或以談戲廢事因取其摴蒱愽具悉以投於江乃曰摴蒱}
