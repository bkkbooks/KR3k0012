  - {type: variant, offset: 14, length: 4, content: 令內史廖, SBCK: 立四年楚成王伐宋四年魯僖二十七年冬也宋背楚事􅀳故楚伐之公率齊􅁗伐曹衞}
  - {type: variant, offset: 14, length: 11, content: 令內史廖以女樂二八遺戎, WYG: 怒曰吳人焉敢攻吾邑舉兵反攻之老弱盡殺之吳}
  - {type: variant, offset: 14, length: 4, content: 令內史廖, krp: 怒曰呉人焉敢攻吾邑舉兵反攻之老弱盡殺之呉王夷昧聞之怒使人舉兵侵楚邊邑堯夷而復去之呉公子光又率師與楚人戰於雞父大敗之獲其師又曰荆莊王欲伐陳使人視之使者曰陳不可伐也莊公曰何故對曰城郭髙溝洫深畜積多也寜國曰陳可伐也寕囯楚臣夫陳小國也而畜積多賦斂重也則民怨上矣城郭髙溝洫深則民力罷矣興兵伐之陳可取也莊王聽之遂取陳又曰箴尹爲荆使於宋司城子罕觴之西家之潦經其庭而不禁箴尹問其故曰西家髙吾宫卑潦不經吾庭不得冩爲是吾不禁也箴尹歸適遇荆欲攻宋箴尹諌於王曰宋不可攻也其君賢相仁賢者得民仁者能用之攻之必無功也淮南子曰堯時十日並出焦禾稼殺草木民人無食羿窳九嬰大風封豕鑿齒脩虵皆爲害堯乃使羿誅鑿齒於疇華之澤南地也殺九嬰於水凶水火之怪在北狄之地繳大風於青立之野大風鷙鳥也射十日而下其九日殺羿窳狀如龍首食人在西方也斷脩虵於洞庭在南方擒封豕於桑林封豕大彘也桑林湯禱旱地又曰晉伐楚三舎不止大夫擊之莊王曰先君之時晉不伐楚及孤之身而晉伐楚是孤之過也若何其辱群大夫曰先臣之時晉不伐楚今臣之身而晉伐楚此臣之罪也請擊之王俛而泣涕沾襟起而拜羣大夫晉人聞之曰君臣爭}
  - {type: variant, offset: 19, length: 0, content: '', SBCK: 救宋魯僖二十八年春􅀳侯侵曹伐衛傳曰楚始得曹而新婚於衛也宋人使門尹班告急於􅀳門尹班宋大夫公告大夫曰宋人告急舎之則宋絶舎不救則宋降楚與我絶告楚則不許我告請請宋於楚楚不許我我欲擊楚齊􅁗不欲其􅀂之何又曰自大畢伯士之終也大畢伯士犬戎氏之二君終卒也犬戎氏以其職來王以其職謂其嗣子以其貴寳來見王天子曰予必以不享征之且觀之兵享賔服服禮以責犬戎而示之兵非也其無乃廢先王之訓而王幾頓乎幾危頓敗吾聞夫犬戎樹敦樹立言犬戎立性悙撲師舊德而守終純固師循也純專固一言犬戎氏脩先王之舊德奉其常職天性專一終身不移不聽穆王貴其厚享也其有以禦我矣禦應距也王不聽遂征之得四白狼四白鹿以歸白狼白鹿犬戎自是荒服者不至穆王責犬戎非禮􅁀兵露師傷威毁信荒服者不至又曰啇王帝辛大惡于人啇殷人本號辛紂名大惡大爲人所惡也庶人不忍欣載武王以致戎于啇牧載奉武兵牧啇郊牧野也是先王非務武也勤恤人隱而除其害恤憂隱痛又曰忠臣者務崇君之德讇臣者務廣君之地何以明之陳夏徵舒殺其君楚莊王伐之陳之人聽命莊王巳討有罪遣卒戍陳戍守也欲守陳大夫畢賀申叔時使於齊及還而不賀莊王曰陳爲無道寡人起六軍以討之征暴亂誅罪人群臣皆賀而子不賀何申叔時曰人有牽牛而徃蹊於人之田中田主殺其人而奪之牛罪則有矣罰亦重矣今君王以陳爲無道舉兵而征之因誅罪人遣卒戍陳諸侯聞之非以王爲誅罪人也貪陳國也蓋聞君子不棄義以爲利王曰善乃罷陳之戍後諸侯聞之朝於楚此務崇君之德也始張式爲智伯謀張式􅀳人􅀳六將軍中行子取弱而上下離心可伐以廣地於是伐范中行滅之矣又教智伯求地於韓魏韓魏裂地而授之趙氏不予乃率韓魏而伐趙圍晋陽三年三國隂謀遂滅之此務爲其君廣地也夫爲君崇德者霸爲君廣地者㓕故千乗之國文德行者王湯武是也萬乗之國好廣地者亡智伯是也莊子曰犀首請魏伐齊季子諌勿伐華子聞而醜之曰善言伐齊亂人也善言勿伐亦亂人謂伐之與不伐亂人者又亂人也列子曰􅀳文公出㑹欲伐衛公子鋤御而􅀏之公問之對曰􅀏臣鄰之人也鄰之人有送其妻適私家者道見桑婦恱而與之言然顧視其妻亦有招之者臣竊􅀏此也公悟乃引師而還未至而有伐其北鄙矣墨子曰天賜武王黄鳥之旗以伐紂又曰湯在鏕宫夢神謂之曰夏桀無道汝克戡之孫卿子曰堯伐驩兠舜伐三苗禹伐共工湯伐有夏文王伐崇武王伐紂此兩帝四王者仁義之兵於天下也尉繚子曰武王之伐紂也河水逆流左􅆖霆死地方百里戰卒三萬紂之陣起自黄鳥至于赤斧其間百里武王不罷士民兵不血刃克殷誅紂其人事然韓子􅀳獻公欲伐虞􅉑乃遺之屈産之乗垂􅁄之璧}
