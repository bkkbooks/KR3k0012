  - {type: variant, offset: 19, length: 0, content: '', krp: 過爲在巳不可伐也夜還師而歸又曰諸侯伐秦及涇莫濟魯襄十一年晉悼公伐鄭秦人伐晉救鄭十四年晉使六卿帥諸侯之大夫伐秦至涇水無有先渡者也晉叔嚮見叔孫穆子曰諸侯伐不恭而討之及涇而止於秦何益何益於伐秦之事穆子曰豹之業及匏有苦葉矣不知其他業事匏有苦葉詩風篇名匏有苦葉濟有深渉深則厲淺則揭言其必濟不知其他叔嚮退召舟虞與司馬舟虞掌舟司馬掌兵曰夫苦瓠不材於人共濟而巳材若裁也不裁於人言不可食共濟而巳佩匏可以渡水魯叔孫賦匏有苦葉必將渉矣詩以言志具舟除隧不共有法隧道共具也舟虞具舟司馬除道法刑也是行也魯人以莒人先濟諸侯從之又曰文公立四年楚成王伐宋四年魯僖二十七年冬也宋背楚事晉故楚伐之公率齊秦伐曹衞以救宋魯僖二十八年春晉侯侵曹伐衛傳曰楚始得曹而新婚於衛也宋人使門尹班告急於晉門尹班宋大夫公告大夫曰宋人告急舎之則宋絶舎不救則宋降楚與我絶告楚則不許我告請請宋於楚楚不許我我欲擊楚齊秦不欲其若之何又曰自大畢伯士之終也大畢伯士犬戎氏之二君終卒也犬戎氏以其職來王以其職謂其嗣子以其貴寳來見王天子曰予必以不享征之且觀之兵享賔服服禮以責犬戎而示之兵非也其無乃廢先王之訓而王幾頓乎幾危頓敗吾聞夫犬戎樹敦樹立言犬戎立性悙撲師舊德而守終純固師循也純專固一言犬戎氏脩先王之舊德奉其常職天性專一終身不移不聽穆王貴其厚享也其有以禦我矣禦應距也王不聽遂征之得四白狼四白鹿以歸白狼白鹿犬戎自是荒服者不至穆王責犬戎非禮暴兵露師傷威毁信荒服者不至又曰啇王帝辛大惡于人啇殷人本號辛紂名大惡大爲人所惡也庶人不忍欣載武王以致戎于啇牧載奉武兵牧啇郊牧野也是先王非務武也勤恤人隱而除其害恤憂隱痛又曰忠臣者務崇君之德讇臣者務廣君之地何以明之陳夏徵舒殺其君楚莊王伐之陳之人聽命莊王巳討有罪遣卒戍陳戍守也欲守陳大夫畢賀申叔時使於齊及還而不賀莊王曰陳爲無道寡人起六軍以討之征暴亂誅罪人群臣皆賀而子不賀何申叔時曰人有牽牛而徃蹊於人之田中田主殺其人而奪之牛罪則有矣罰亦重矣今君王以陳爲無道舉兵而征之因誅罪人遣卒戍陳諸侯聞之非以王爲誅罪人也貪陳國也蓋聞君子不棄義以爲利王曰善乃罷陳之戍後諸侯聞之朝於楚此務崇君之德也始張式爲智伯謀張式晉人晉六將軍中行子取弱而上下離心可伐以廣地於是伐范中行滅之矣又教智伯求地於韓魏韓魏裂地而授之趙氏不予乃率韓魏而伐趙圍晋陽三年三國隂謀遂滅之此務爲其君廣地也夫爲君崇德者霸爲君廣地者㓕故千乗之國文德行者王湯武是也萬乗之國好廣地者亡智伯是也莊子曰犀首請魏伐齊季子諌勿伐華子聞而醜之曰善言伐齊亂人也善言勿伐亦亂人謂伐之與不伐亂人者又亂人也列子曰晉文公出㑹欲伐衛公子鋤御而笑之公問之對曰笑臣鄰之人也鄰之人有送其妻適私家者道見桑婦恱而與之言然顧視其妻亦有招之者臣竊笑此也公悟乃引師而還未至而有伐其北鄙矣墨子曰天賜武王黄鳥之旗以伐紂又曰湯在鏕宫夢神謂之曰夏桀無道汝克戡之孫卿子曰堯伐驩兠舜伐三苗禹伐共工湯伐有夏文王伐崇武王伐紂此兩帝四王者仁義之兵於天下也尉繚子曰武王之伐紂也河水逆流左驂霆死地方百里戰卒三萬紂之陣起自黄鳥至于赤斧其間百里武王不罷士民兵不血刃克殷誅紂其人事然韓子晉獻公欲伐虞􅉑乃遺之屈産之乗垂棘之璧}
