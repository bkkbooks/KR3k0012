  - {type: variant, offset: 2242, length: 915, content: 事隋書曰崔仲方為虢州刺史上書論取陳之策曰臣謹案晉太康元年歲在庚子晉武平吳至今開皇六年歲次景午合三百七載春秋寶乾圖云王者三百年一蠲法合三百之期可謂備矣陳氏草竊起於景子至今景午為衝陰陽之忌昔史趙有言曰陳顓頊之族為水故歲在鶉火以滅又云周武王克商封胡公滿於陳至魯昭九年陳災裨竈曰歲五及鶉火而後陳亡楚克之楚祝融之後也為火正故復滅陳陳承舜後舜承顓頊雖太歲左行歲星又轉鶉火之歲陳族再亡戊午之年媯虞運盡語迹雖殊考事無別皇朝五運相承感火德而王國號為隨與楚同分楚是火正午為鶉火未為鶉首申為實沉酉為大梁既當周秦晉趙之分若當此分發兵得歲之助以今量古滅不疑也臣謂午未申酉並是數極蓋聞天時不如地利地利不如人和況主聖臣良兵強國富動植廻心人神叶契陳既主昏於上民讟於下險無百二之固眾非九國之師夏癸殷辛尚不能立獨此島夷而稽天討伏度朝廷自有宏謀但蒭蕘所見冀申營爛爝今唯須武昌已下蘄和滁方吳海等州更怗精兵密營渡計益信襄荊基郢等州速造舟多張勢為水戰之具蜀漢二江是其上流水路要衝必爭之所賊雖於流頭荊門延洲公安巴陵隱機夏首蘄口盆城置船然終聚漢口峽口以水戰大決若賊必以上流有軍令精兵赴援者下流諸將即須擇便橫渡如擁眾自衛上江水軍鼓行以前雖恃九江五湖之險非德無以為固徒有三吳百越之兵無恩不能自立上覽而大悅轉基州刺史徵入朝仲方因面陳經略上善之賜以御袍袴并雜綵五百叚進位開府而遣之及大舉伐陳以仲方為行軍總管率兵與秦會又曰開皇九年大舉伐陳若賀若弼為行軍揔管將渡江酹酒而呪曰弼親承廟略遠振國威伐罪吊民除兇剪暴上天長江鑒其若此如使福善禍淫大軍利涉如事有乖違得葬江魚腹中且不恨又曰李德林自隋有天下每贊平陳之計八年車駕幸同州德林以疾不從勑書追之書後御筆注云伐陳事意宜自隋也時高潁因使入京上語頴曰德林若患未堪行宜自至宅取其方略高祖以之付晉王後駕還在塗中高祖以馬鞭南指云待平陳訖會以七寶裝嚴公使自山東無及之者唐書曰武德初秦王東討王世充連年未下宿師于野高祖以兵久在外議欲班師中書令封德彝奏曰世充得地雖多而羇縻相屬其所用命者唯洛陽一城而已計盡力窮破在旦夕今若還兵賊勢必振更相連結後必難圖未若乘其已衰破之必矣高祖從其議及平世充高祖顧謂侍臣曰朕初發兵東討眾議多有不同唯秦王請行德彝贊成此計張華叶同晉武亦無以加, WYG: ''}
