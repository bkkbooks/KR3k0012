  - {type: variant, offset: 11, length: 0, content: '', SBCK: 建安中曹操於南皮攻􅀽譚斬之操作鼔吹自稱萬歳於馬上舞也紀年曰周穆王四十七年伐紆大起九師東至于九江比黿以爲梁春秋後􅁗語曰陳軫爲楚使來見􅁗惠王曰卞莊子方刺獸而管竪子止之曰兩獸方食牛牛必甘甘必争争必􅋐􅋐則大者傷小者死從傷而刺之一舉必有􅀟獸之功卞莊子以爲然立待之頃有兩獸之功今韓魏相攻朞年不解是必大國傷小國亡從傷而伐之一舉必有兩實此猶卞莊子刺虎之􅀋也惠王曰善又楚語曰白起將兵伐楚楚人黄歇者遊學􅀶聞襄王以爲辯故使於􅁗說昭王曰天下莫強於􅁗楚今聞大王欲伐楚此猶兩虎相與􅋐而怒犬受其弊不如善楚􅁗王乃止不伐楚約爲與國黄歇受約而歸又趙語曰張孟談隂見韓魏之君曰臣聞脣亡者齒寒今智伯率二君而伐趙趙亡矣趙亡則二君爲之次二君曰我知其然呉越春秋曰夫差令於􅀖中曰寡人欲伐齊敢有諌者死太子友請朝時懷丸挾彈從後園而來衣沾履濡呉王夫差怪而問之太子友對曰臣遊後園聞秋蟬之鳴徃而觀之秋蟬登髙樹飲清露悲吟以爲安不知螳蜋超枝縁條曵􅆎舉刃欲援其形也螳蜋貪心時進志在有利不知黄雀縁茂林徘徊枝葉欲啄螳蜋也夫黄雀知伺螳蜋之有味不知臣躊躇引彈蜚丸之集其背也又曰越王勾踐請大夫種曰􅀌聞呉王淫而好色因此而壞其謀可也大夫種曰可唯君王選擇美女二人而進之於是越王曰善哉乃使相工索國中得苧羅山賣薪之女名西施鄭旦而獻於呉又曰越王念呉欲復承之乃中夜抱柱而哭訖復承之以嘨於是羣臣咸曰君王何愁心之甚夫復讎謀敵非君王之憂自臣下急務也又曰呉王闔閭將伐楚登臺向風而嘨有頃而歎羣臣莫有曉王意者子胥乃薦孫子孫子者呉人也名武善爲兵法僻隱幽居丗人莫知其能孟子曰春秋無義戰彼善於此則有之矣征者上伐下也敵國不相征也吕氏春秋曰智伯將伐仇繇之國山險無道乃遺以大鍾方九䡄仇繇開道迎之因其道取其國韓子曰智伯鑄大鍾遺仇繇由君大悦除道迎之七月由仇亡也又曰闔閭選多力者五百人利止者三千人以爲前陳止足與荆戰五戰五勝遂有郢東征至于庳廬西伐至于巴蜀北廹齊􅀳令行中國又曰凡人之攻伐也非爲利則因名也名實不得國雖彊大則曷爲攻矣解在乎史墨來而輟不襲衛趙簡子可謂知動靜矣晉趙簡子鞅將襲衛史墨徃暏之反曰蘧伯五爲政未可與加簡子輟不伐衛故曰史墨來而輟不襲衛也又曰楚之邊邑曰卑梁其處女與呉之邊邑處女桑於境上戯而侍卑梁之處女卑梁人扶其侍子以讓呉人呉人􅀿之不恭卑梁人怒殺而去之呉人徃報之盡屠其家卑梁公怒曰呉人焉敢攻吾邑舉兵反攻之老弱盡殺之呉王夷昧聞之怒使人舉兵侵楚邊邑堯夷而復去之呉公子光又率師與楚人戰於雞父大敗之獲其師又曰荆莊王欲伐陳使人視之使者曰陳不可伐也莊公曰何故對曰城郭髙溝洫深畜積多也寜國曰陳可伐也寕囯楚臣夫陳小國也而畜積多賦斂重也則民怨上矣城郭髙溝洫􅀷則民力罷矣興兵伐之陳可取也莊王聽之遂取陳又曰箴尹爲荆使於宋司城子罕觴之西家之潦經其庭而不禁箴尹問其故曰西家髙吾宫卑潦不經吾庭不得冩爲是吾不禁也箴尹歸適遇荆欲攻宋箴尹諌於王曰宋不可攻也其君賢相仁賢者得民仁者能用之攻之必無功也淮南子曰堯時十日並出焦禾稼殺草木民人無食羿窳九嬰大風封豕鑿齒脩虵皆爲害堯乃使羿誅鑿齒於疇華之澤南地也殺九嬰於水凶水火之怪在北狄之地繳大風於青立之野大風鷙鳥也射十日而下其九日殺羿窳􅃺如龍首食人在西方也斷脩虵於洞庭在南方擒封豕於桑林封豕大彘也桑林湯禱旱地又曰􅀳伐楚三舎不止大夫擊之莊王曰先君之時􅀳不伐楚及􅀌之身而􅀳伐楚是􅀌之過也􅀂何其辱群大夫曰先臣之時􅀳不伐楚今臣之身而􅀳伐楚此臣之罪也請擊之王俛而泣涕沾襟起而拜羣大夫􅀳人聞之曰君臣爭以過爲在巳不可伐也夜還師而歸又曰諸侯伐􅁗及涇莫濟魯襄十一年􅀳悼公伐鄭}
