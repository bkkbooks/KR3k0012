  - {type: variant, offset: 2379, length: 1970, content: 及鶉火而後陳亡楚克之楚祝融之後也為火正故復滅陳陳承舜後舜承顓頊雖太歲左行歲星又轉鶉火之歲陳族再亡戊午之年媯虞運盡語迹雖殊考事無別皇朝五運相承感火德而王國號為隨與楚同分楚是火正午為鶉火未為鶉首申為實沉酉為大梁既當周秦晉趙之分若當此分發兵得歲之助以今量古滅不疑也臣謂午未申酉並是數極蓋聞天時不如地利地利不如人和況主聖臣良兵強國富動植廻心人神叶契陳既主昏於上民讟於下險無百二之固眾非九國之師夏癸殷辛尚不能立獨此島夷而稽天討伏度朝廷自有宏謀但蒭蕘所見冀申營爛爝今唯須武昌已下蘄和滁方吳海等州更怗精兵密營渡計益信襄荊基郢等州速造舟多張勢為水戰之具蜀漢二江是其上流水路要衝必爭之所賊雖於流頭荊門延洲公安巴陵隱機夏首蘄口盆城置船然終聚漢口峽口以水戰大決若賊必以上流有軍令精兵赴援者下流諸將即須擇便橫渡如擁眾自衛上江水軍鼓行以前雖恃九江五湖之險非德無以為固徒有三吳百越之兵無恩不能自立上覽而大悅轉基州刺史徵入朝仲方因面陳經略上善之賜以御袍袴并雜綵五百叚進位開府而遣之及大舉伐陳以仲方為行軍總管率兵與秦會又曰開皇九年大舉伐陳若賀若弼為行軍揔管將渡江酹酒而呪曰弼親承廟略遠振國威伐罪吊民除兇剪暴上天長江鑒其若此如使福善禍淫大軍利涉如事有乖違得葬江魚腹中且不恨又曰李德林自隋有天下每贊平陳之計八年車駕幸同州德林以疾不從勑書追之書後御筆注云伐陳事意宜自隋也時高潁因使入京上語頴曰德林若患未堪行宜自至宅取其方略高祖以之付晉王後駕還在塗中高祖以馬鞭南指云待平陳訖會以七寶裝嚴公使自山東無及之者唐書曰武德初秦王東討王世充連年未下宿師于野高祖以兵久在外議欲班師中書令封德彝奏曰世充得地雖多而羇縻相屬其所用命者唯洛陽一城而已計盡力窮破在旦夕今若還兵賊勢必振更相連結後必難圖未若乘其已衰破之必矣高祖從其議及平世充高祖顧謂侍臣曰朕初發兵東討眾議多有不同唯秦王請行德彝贊成此計張華叶同晉武亦無以加之又曰高崇文伐蜀領兵馬取鳳翔邪谷路李元奕領兵馬取駱谷路同赴梓州應接當秦惠王時用司馬錯之策以伐蜀漢光武使吳漢伐公孫述魏司馬文王使鄧艾伐劉禪晉穆帝使桓溫伐李子仁宋武帝使朱齡石伐譙縱梁武帝使鄧元起伐劉季連周太祖使尉遲逈平蕭紀隋文帝使梁睿平王謙憲宗命高崇文平劉闢自秦至元和九度伐蜀四為水軍泝江而上唯秦與鄧艾尉遲逈梁睿及崇文五在斜谷駱谷出師南討不廷古司馬兵法曰王霸之所以治諸侯者以土地刑諸侯列相也相諸侯優劣地而封之以德受土廣德受土小也以正命平諸侯王者以道德善政教訓諸侯平均之以禮信結諸侯謙恭愛惠接待諸侯官命誠信以治民心以材力說諸侯材能也力者任重理煩能堪物理事位高力大故諸侯悅來各修其職任以謀人維諸侯維持也諸侯遠方來不奉制令驕佚自專故立牧伯維持督御之同患同利以合諸侯明約有功賞之奢淫不從罰之所以合諸侯也比小大以和諸侯比次也使小國事大國不失尊卑之序以恊諸侯也會之所以發禁三者恐禁命不行以亂風化故發九伐三禁以申勑之凌弱犯寡則沮之侮弱侵寡則四面削其地賊傷人則伐之暴內簡外則壃之言諸侯內外典臣下無禮而暴虐之外輕慢小人不恤諴禁則置之空壃無人之地野荒民散則削之負固不伏則侵之賊殺其親則正之悖逆人倫則攻殺也放殺其君則殘之盡殘滅其首惡輩類也犯命凌正則杜之侮王者法則土塞不命與鄰國交通外內亂禽獸行則滅之諸侯淫亂失人倫內外不別與禽獸同行不可以示百姓則誅滅盡矣孫子曰夫伐大國則其兵眾不得聚威加於敵家則交不得合皆失之矣是故不事天下之交不養天下之權霸主者不結威天下諸侯之交權交者也伸己之私絕天下之交奪天下之權己威得伸己私也威加於敵家故其國可拔而其城可隳也無法之懸無功之令言軍法令不應預施懸也司馬法曰見敵作誓瞻功作賞此之謂也犯三軍之眾若使一人犯者用也言明罰雖用眾若使一人也又曰安能動之攻其所愛故我欲戰敵雖高壘深溝不得不與我戰者攻其所必救也絕糧道守歸路攻其君主上兵伐謀敵始有設謀伐之易其次伐交不令合春秋說題辭曰伐者涉入國內行威有所斬壞伐之為言敗也白虎通曰王者受命質家先伐文家先改正朔何質家言天命已使民誅無道故先伐文家天命已成為王者故先改正朔也文者先其文質者先其質也故論語曰予小子履改昭告于皇天上帝此謂湯伐桀告天也詩云命此文王言誅伐也禮記曰湯放桀武王伐紂時也尚書曰今予惟恭行天之罰此言開自出伐有扈也王制曰賜之弓矢乃得專征伐犯王誅者也大夫將兵出必不御者欲盛其威使士卒一意繫心故但聞將軍令不聞君命也明進退在大夫也又曰誅者何謂也誅猶責也誅其人責其罪極其過惡春秋曰楚子虔誘蔡侯班弒之于申傳曰誅君之子不立討者何謂也討猶除也欲言臣當掃除君之賊也春秋曰衛侯殺州吁于濮傳曰其稱人何討賊之辭也伐者何謂伐于也言欲伐擊之也尚書敘曰武王伐紂征者何謂也征猶正也欲言其正輕重縱辭誕以示東征誅祿甫也戰者何謂也尚書大傳曰戰者憚驚之也又曰諸侯之義非天子之命不得動眾起兵誅不義者所以強幹弱枝尊天子卑諸侯也論語曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出也, SBCK: ''}
