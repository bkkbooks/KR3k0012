  - {type: variant, offset: 3160, length: 2, content: 高崇, WYG: ''}
  - {type: variant, offset: 3163, length: 0, content: '', WYG: 公立四年楚成王}
  - {type: variant, offset: 3164, length: 2, content: 蜀領, WYG: 宋四年魯僖公二十七年宋背楚事晉故楚伐之公率齊秦伐曹衛以救宋魯僖二十八年春晉侯侵曹伐衛傳曰楚始得曹而新昏於衛也宋人使門尹班告急於晉門尹班宋大夫公吿大夫曰宋人告急舍之則宋絶舍不救則宋降楚與我絶告楚則不許我告請宋扵楚楚不許我我欲擊楚齊秦不欲其若之何又曰自大畢伯士之終也大畢伯士犬戎氏之二君終卒也犬戎氏以其職來王以其職謂其以大戎氏之寳來見王天子曰予必以不享征之且觀之}
  - {type: page-break, offset: 3164, content: '', id: KR3k0012_WYG_305-9a, image: WYG0895/WYG0895-0640c.png}
