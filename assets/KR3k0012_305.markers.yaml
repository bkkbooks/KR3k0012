  - {type: variant, offset: 8, length: 1, content: 史, SBCK: 女因追之不能還反其妻怒而去之臣􅀏其曠也簡子曰今吾伐國失國是吾曠也還師而歸又曰中行獻子將伐鄭范文子曰不可得志於鄭諸侯讎我憂必滋長郄至又曰得鄭是兼國也則王者固多憂乎文子曰王者盛其德而逺人歸故無憂今我寡德而有王者之功故多憂今子見無事而欲冨樂者乎新序曰􅁗欲伐楚使使者徃觀楚重寶楚王聞之召令尹子西問焉曰􅁗欲觀楚寳器和氏之璧隋侯之珠可以示諸侯乎封曰臣不知也召昭奚恤問焉對曰此欲觀吾國之得失而圖之非國之重寳也遂使恤應之恤發精兵三百人陳於西門之内爲東西之壇􅁗使者至恤曰君客也請就上位東子西南面太宗子方次之葉公子髙次之司馬子反次之恤自居西面之壇稱曰客觀楚之寳器楚所寳者賢臣也理百姓實倉􅅒使民人各得其所子西在此奉珪璧使諸侯解忿憤之難交兩國之欣使無兵革之憂太宗子方在此守封疆謹境界不侵鄰國隣國亦不見侵葉公子髙在此理師旅正兵戎以當強敵提桴鼓以動百萬人衆使皆赴湯火蹈白刃出萬死不顧一生司馬子反在此􅀂懷霸王之餘義撮治亂之遺風昭奚恤在此唯大國所觀􅁗使者懼然無以對遂揖而去使者反言於􅁗君曰楚多賢臣未可謀也又曰湯居亳七十里地與葛爲隣􅁑伯放淫不祀湯使人問之曰何爲不祀曰無以供犧牲也湯使人遺之牛羊􅁑伯食之又不以祀湯又使人問曰何爲不祀曰無以供粢盛也湯又使衆徃爲耕老弱餽食葛伯率其民要其有酒肉􅁰稻者奪之不受者殺之有一童子以􅁰肉餉殺而奪也書曰葛伯仇餉此之謂也爲其殺是童子而征之四海之内皆曰非冨天下也爲匹夫匹婦報讎也蜀王夲紀曰􅁗惠王欲伐蜀乃刻五石牛置金其後蜀人見之以爲牛能大便金牛下有養卒以爲此天牛也能便金蜀王以爲然即發卒千人使五丁力士拖牛成道致三枚於城郭􅁗道得通石牛力也後遣丞相張儀等將兵隨石牛道伐蜀焉英雄}
