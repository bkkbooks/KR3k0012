  - {type: variant, offset: 3203, length: 3, content: 蜀漢光, WYG: 之也其無乃廢先王之訓而王幾頓乎委頓吾聞夫犬戎樹敦樹敦言犬戎立性敦厚師舊徳而守純終固師循也純専一也言犬戎氏修先王之舊徳奉其常賦天性専一終身不移所以穆王責之不當其有以禦我矣禦應距也王不聽遂征之得四白狼四白鹿以歸目是荒服者不至又曰商皇帝辛大惡于人商殷人本號辛紂名大惡大為人之惡也庶人不忍欣載}
  - {type: page-break, offset: 3203, content: '', id: KR3k0012_WYG_305-9b, image: WYG0895/WYG0895-0640d.png}
  - {type: punctuation, offset: 3204, content: ，, id: KR3k0012_CHANT_305-bkkpn800}
  - {type: 'tls:seg', offset: 3204, content: '', id: KR3k0012_CHANT_305-23a.9}
  - {type: variant, offset: 3207, length: 0, content: '', WYG: 王以至戎于商牧再奏武兵扵商郊牧野也是先王非務武也恤民隠而除其害恤憂隠痛又曰忠臣者務崇君之徳諂臣者務廣君之地何以明之陳夏徴舒弑其君楚莊王伐之陳之人聽命莊王以計宥罪遣卒戍陳戍守也欲守城大夫畢賀申叔時}
  - {type: variant, offset: 3208, length: 2, content: 吳漢, WYG: 扵齊反還而不賀莊王曰陳為無道寡人起六軍以討之征暴亂誅罪人羣臣皆賀而子不賀何也申叔時曰有牽牛而往蹊人之田主殺其人而奪之牛罪則有矣罰亦重矣今君王以陳為無道舉兵而征之因誅罪人遣卒戍陳諸侯聞之非以王為誅罪人也貪陳國也蓋聞君子不棄義以為利王曰善乃罷陳之戍後諸侯聞之朝于楚此務崇君之徳也始張式為智伯謀張式晉人晉大將范中行子取弱而上下離心可}
  - {type: page-break, offset: 3208, content: '', id: KR3k0012_WYG_305-10a, image: WYG0895/WYG0895-0641a.png}
  - {type: variant, offset: 3211, length: 0, content: '', WYG: 以廣地於是伐范中行滅之已又教智伯求地於韓魏韓魏裂地而授之趙氏不予乃率韓魏而伐趙圍晉陽三年三國隂謀遂滅之此務為君廣其地也夫為君崇徳者霸為君廣地者滅故千乘之國修徳行者王湯武是也萬乘之國好廣地者亡智伯是也莊子曰犀首請魏伐齊季子請勿伐華子聞而醜之曰善言伐齊者亂人也善言勿伐者亦亂人也謂伐之與不伐亂人也者又亂人也列子曰晉文}
  - {type: page-break, offset: 3211, content: '', id: KR3k0012_WYG_305-10b, image: WYG0895/WYG0895-0641b.png}
  - {type: variant, offset: 3212, length: 0, content: '', WYG: 出㑹欲伐衛公了御而笑之公問之對曰笑臣鄰之人有送其妻適私家者道見桑婦恱而與之言然顧視其妻亦有招之者臣竊笑也公悟乃引師而還未至而有伐其北鄙矣墨子曰天賜武王黄鳥之旗以伐紂又曰湯在鏕宫夢神謂之曰夏桀無道汝克戡之}
  - {type: page-break, offset: 3212, content: '', id: KR3k0012_WYG_305-11a, image: WYG0895/WYG0895-0641c.png}
  - {type: variant, offset: 3213, length: 4, content: 述魏司馬, WYG: 卿子曰堯伐驩兜舜伐三苖禹伐共工湯伐有夏}
