  - {type: variant, offset: 3280, length: 778, content: 文平劉闢自秦至元和九度伐蜀四為水軍泝江而上唯秦與鄧艾尉遲逈梁睿及崇文五在斜谷駱谷出師南討不廷古司馬兵法曰王霸之所以治諸侯者以土地刑諸侯列相也相諸侯優劣地而封之以德受土廣德受土小也以正命平諸侯王者以道德善政教訓諸侯平均之以禮信結諸侯謙恭愛惠接待諸侯官命誠信以治民心以材力說諸侯材能也力者任重理煩能堪物理事位高力大故諸侯悅來各修其職任以謀人維諸侯維持也諸侯遠方來不奉制令驕佚自專故立牧伯維持督御之同患同利以合諸侯明約有功賞之奢淫不從罰之所以合諸侯也比小大以和諸侯比次也使小國事大國不失尊卑之序以恊諸侯也會之所以發禁三者恐禁命不行以亂風化故發九伐三禁以申勑之凌弱犯寡則沮之侮弱侵寡則四面削其地賊傷人則伐之暴內簡外則壃之言諸侯內外典臣下無禮而暴虐之外輕慢小人不恤諴禁則置之空壃無人之地野荒民散則削之負固不伏則侵之賊殺其親則正之悖逆人倫則攻殺也放殺其君則殘之盡殘滅其首惡輩類也犯命凌正則杜之侮王者法則土塞不命與鄰國交通外內亂禽獸行則滅之諸侯淫亂失人倫內外不別與禽獸同行不可以示百姓則誅滅盡矣孫子曰夫伐大國則其兵眾不得聚威加於敵家則交不得合皆失之矣是故不事天下之交不養天下之權霸主者不結威天下諸侯之交權交者也伸己之私絕天下之交奪天下之權己威得伸己私也威加於敵家故其國可拔而其城可隳也無法之懸無功之令言軍法令不應預施懸也司馬法曰見敵作誓瞻功作賞此之謂也犯三軍之眾若使一人犯者用也言明罰雖用眾若使一人也又曰安能動之攻其所愛故我欲戰敵雖高壘深溝不得不與我戰者攻其所必救也絕糧道守歸路攻其君主上兵伐謀敵始有設謀伐之易其次伐交不令合春秋說題辭曰伐者涉入國內行威有所斬壞伐之為言敗也白虎通曰王者受命質家先伐文家先改正朔何質家言天命已使民誅無道故先伐文家天命已成為王者故先改正朔也文者先其文質者先其質也故論語曰予小子履改昭告于皇天上帝此謂湯伐桀告天也詩云命此文王言誅伐也禮記曰湯放桀, WYG: ''}
