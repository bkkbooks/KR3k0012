  - {type: variant, offset: 1781, length: 508, content: 萬機便圖東討惡衣菲食繕甲治兵數年已來戰備稍足而偽主昏虐恣行無道伐暴除亂斯實其時今欲數道出兵水陸兼進北拒太行之路東扼黎陽之險若攻拔河陰兗豫則馳檄可定然後養銳享士以待其至但得一戰則破之必矣王公以為何如群臣咸稱善丁丑詔曰高氏因時放命據有汾漳檀假名器歷年永久朕以亭毒為心遵養時晦遂敦聘好務息黎元而彼懷惡不悛尋事侵軼背言負信竊邑藏姦往者軍下宜陽舋由彼始兵興汾曲事非我先此獲俘囚禮送相繼彼所拘執曾無一反加以淫刑妄逞毒賦繁興齊魯軫殄悴之哀幽并企來蘇之望既禍盈惡稔眾叛親離不可一戎何以大定今白藏在辰涼風戒節厲兵詰暴時事惟宜朕當親御六師龔行天罰庶憑祖宗之靈資將士之力風馳九有電掃八紘可分命眾軍指期進發以柱國陳王純為前一軍總管滎陽公司馬消難為前二軍總管鄭國公達奚震為前三軍總管越王盛為後一軍總管周昌公侯莫陳瓊為後二軍總管趙王招為後三軍總管齊王憲率眾二萬趣黎陽隨國公楊堅廣寧侯薛廻舟師三萬自渭入河柱國梁國公侯莫陳苪率眾一萬守太行道申國公李穆眾三萬守河陽道常山公于翼眾二萬出陳汝壬午上親率六軍眾六萬直指河陰八月癸卯入于齊境禁伐樹踐苗稼犯者以軍法從事隋書曰崔仲方為虢州刺史上書論取陳之策曰臣謹案晉太康元年歲在庚子晉武平吳至今開皇六年歲次景午合, SBCK: 卷第}
