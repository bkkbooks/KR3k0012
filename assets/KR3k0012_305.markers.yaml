  - {type: variant, offset: 677, length: 265, content: 降者以萬計吳丞相張悌及護軍孫震與楊州刺史周浚等戰于板橋破之臨陣斬悌震首濬遂汎舟東下所歷皆平軍至秣陵晧面縛輿舁襯將其太子詣濬降乃收其圖籍皆因吳所置除其虐政示以簡易百姓大悅乃赦天下改元為太康天下大酺五日晉書曰宣王破張魯請魏武便討劉備魏武曰人若無足既得隴復欲得蜀也又曰王羲之與會稽王牋陳殷浩不宜北伐并論時事又宣紀曰鎮東大將軍諸葛誕殺楊州刺史樂綝以淮南作亂議者請速伐之帝曰吾當與四方同力全勝制之乃表曰昔黥布叛逆漢祖親征隗囂違戾光武西伐皆所以奮楊赫斯震曜威武也又天文志曰參十星一曰參伐主斬刈又為天獄主殺又馮紞傳曰初謀伐吳紞與賈充荀勗同共苦諫, WYG: 言}
