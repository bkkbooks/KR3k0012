  - {type: variant, offset: 12, length: 1, content: 繆, SBCK: 人伐􅀳救鄭十四年晉使六卿帥諸侯之大夫伐􅁗至涇水無有先渡者也􅀳叔嚮見叔孫穆子曰諸侯伐不恭而討之及涇而止於􅁗何益何益於伐􅁗之事穆子曰豹之業及匏有苦葉矣不知其他業事匏有苦葉詩風篇名匏有苦葉濟有􅀷渉深則厲淺則揭言其必濟不知其他叔嚮退召舟虞與司馬舟虞掌舟司馬掌兵曰夫苦瓠不材於人共濟而巳材若裁也不裁於人言不可食共濟而巳佩匏可以渡水魯叔孫賦匏有苦葉必將渉矣詩以言志具舟除隧不共有法隧道共具也舟虞具舟司馬除道法刑也是行也魯人以莒人先濟諸侯從之又曰文}
