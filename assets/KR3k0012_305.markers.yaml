  - {type: variant, offset: 12, length: 1, content: 繆, WYG: 語曰陳軫為楚使來見秦恵王曰卞莊子方刺獸而管豎子止之曰兩獸方食牛食必甘甘必争爭必鬭鬭則大者傷小者死從傷而刺之一舉必有雙獸之功卞莊子以為然立待之頃有兩獸之功今韓魏相攻朞年不解是必大國傷小國亡從傷而伐之一舉必有兩國此猶莊子刺虎之類也恵王曰善又楚語曰白起將兵伐楚楚人黄歇者㳺學博聞襄王以為辯故使於秦說昭王曰天下莫强於秦楚今聞大王欲伐楚此猶兩虎相與鬭而怒必受其弊不如善楚秦王乃止不伐楚約為與國黄歇受約而歸又趙語曰張孟談隂見韓魏之君曰臣聞唇亡者齒寒今智伯率二君而伐趙趙亡矣趙亡則二君為之次二君曰我知其然吳越春秋曰夫差令於邦中曰寡人欲伐齊敢有諌者死太子友乃諷諫懐丸挾彈從後園而來衣沾履濡吳王夫差怪而問之太子友對曰臣逰後園聞秋蟬之聲往而觀之秋蟬登髙樹飲清露悲吟以為安不知螳螂超枝縁條曵腰聳距而稷其形夫螳螂翕心而進志在有利不知黄雀縁茂林徘徊枝隂欲啄螳螂也夫黄雀知伺螳螂之有味不知臣躊躇引彈蜚丸而集其背也又曰越王勾踐謂大夫種曰孤聞吳王淫而好色因此而謀之可乎大夫種曰可破唯君選擇美女二人而進之於是越王曰善哉乃使相者索國中得苧蘿山鬻薪之女名西施鄭旦而獻於吴又曰越王念吳欲復其讐乃中夜抱柱而哭又復承之以嘯於是羣臣咸曰君王何愁心之甚夫復讐謀敵非君王之憂是臣下急務也又曰吳王闔廬將伐楚登臺向風而嘯有頃而嘆羣臣莫有曉王意者子胥乃薦孫子孫子者吳人也名武善為兵法僻隱幽居世人莫知其能孟子曰春秋無義戰彼善於此則有之矣征者上伐下也敵國不相征也呂氏春秋曰智伯將伐仇繇之國山險無道乃遺以大鐘方九軌仇繇開道迎之人因其道取其國韓子曰智伯鑄大鐘遺仇繇其君大恱除道逆之因伐仇繇也又曰闔廬選多力者五百人敢死者三千人以為前陳進與荆戰五勝遂有郢東征至於庫盧西伐至扵巴蜀北逼齊晉命行中國又曰凡人之攻伐也非因利則因名也名實不得國雖欲彊大則勿為攻矣解在乎史墨東而輟不襲衛趙簡子可謂知動静矣晉趙簡子曰鞅將入衛史墨往觀之反曰蘧伯玉為政未可與校簡子輟不伐衛故曰史墨東而輟不襲衛也又曰楚之邊邑曰卑梁其處女與吳之邊邑處女桑於境上戲而侍卑梁之處女卑梁人挾其侍子以讓吳人吳人應之不恭卑梁人怒殺而去之吳人往報之盡屠其家卑景}
