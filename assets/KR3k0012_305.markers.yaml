  - {type: variant, offset: 1011, length: 1076, content: 乃發步騎七萬遣其丹陽王慕容瓚龍驤張崇攻永弟支于晉陽北史曰慕容紹宗討侯景於渦陽時景軍甚盛初聞韓軌往討之曰噉豬腸小兒聞高岳往曰此岳精凡人耳諸將被輕及聞紹宗至扣案曰誰教鮮卑小兒解遣紹宗來若然高王未死耶及與景戰諸將頻敗無肯先者紹宗麾兵徑進諸將從之因大捷三國典略曰周伐梁于謹大軍次于樊鄧岳陽王率軍會之傳檄于梁曰告梁文武眾官夫作國者罔弗以禮信為本惟爾今主往遭侯景逆亂之始實結我國家以鄰援今揔背德黨賊高洋引厥使人置之堂宇傲我王命擾我邊人我皇帝襲天之意弗敢以寧分命眾軍奉楊廟略凡眾十萬直指江陵丁卯梁主停講內外誡嚴是朝昏霧巳時方歇梁主親戎百官並甲冑從於禊飲堂間公私馬仗是日大風拔木王琛既至石梵未見我軍乃馳書報黃羅漢曰吾至梵境上怗然前曰所言皆兒戲耳羅漢入啟梁主疑之庚午續講百官以戎服聽後周書曰建德五年冬十月帝謂群臣曰朕去歲屬有疹疾遂不得克平逋寇前賊入境備見敵情觀彼行師殆同兒戲又聞其朝政昏亂政由群小百姓嗷然朝不謀夕天與不取恐貽後悔若復同往年出軍河外直為撫背末扼其喉然晉州本高歡所起之地鎮攝要重今往攻之彼必來援吾嚴軍以待擊之必克然後乘破竹之勢鼓行而東足以窮其窟穴混同文軌諸將多不願行帝曰機者事之微不可失矣若有沮吾軍者朕當以軍法裁之巳酉帝揔戎東伐以越王盛為右一軍揔管杞國公亮為右二軍揔管隨國公楊堅為右三軍揔管譙王儉為左一軍總管大將軍竇恭為左二軍總管齊王憲陳王純為前軍又曰保定中命宇文護統眾伐齊於是徵二十四軍及左右廂散隸及秦隴巴蜀之兵諸蕃國之眾二十萬人十月帝於廟廷授護斧鉞出軍至潼關乃遣柱國尉遲逈率精兵十萬為前鋒大將軍權景宣攻克豫州尋以洛陽圍解亦引軍退楊檦於軹關戰護於是班師以無功與諸將稽首請罪帝弗之責也又曰建德四年秋七月武帝召大將軍以上於文德殿帝曰太祖神武膺運創造王基兵威所臨有征無戰唯彼偽齊猶懷跋扈雖復戎車屢駕而大勳未集朕以寡昧纂承鴻緒往以政出權宰無所措懷自親覽萬機便圖東討惡衣菲食繕甲治兵數年已來戰備稍足而偽主昏虐恣行無道伐暴除亂斯實其時今欲數道出兵水陸兼進北拒太行之路東扼黎陽之險若攻拔河陰兗豫則馳檄可定然後養銳享士以待其至但得一戰則破之必矣王公以為何如群臣咸稱善丁丑詔曰高氏因時放命據有汾漳檀假名器歷年永久朕以亭毒為心遵養時晦遂敦聘好務息黎元而彼懷惡不悛尋事侵軼背言負信竊邑藏姦往者軍下宜陽舋由彼始兵興汾曲事非我先此獲俘囚禮送相繼彼所拘執曾無一反加以淫刑妄逞毒賦繁興齊魯軫殄悴之哀幽并企來蘇之望既禍盈惡稔眾叛親離不可一戎何以大定今白藏在辰涼風戒節厲兵詰暴時事惟宜朕當親御六師龔行天罰庶憑祖宗之靈資將士之力風馳九有電掃八紘可分命眾軍指期進發以柱國陳王純為前一軍總管滎陽公, WYG: 舟虞具舟}
