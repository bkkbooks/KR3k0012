  - {type: variant, offset: 8, length: 1, content: 史, WYG: 女因追之不能還反其妻怒而去之臣笑其曠也簡子曰今吾伐國失國是吾曠也還師而歸又曰中行獻子將伐鄭范文子曰不可得志於鄭諸侯讐我憂必滋長郤至又曰得鄭是兼國也則王者固多憂乎文子曰王者盛其徳而逺人歸故無憂今我寡徳而有王者之功故多憂今子見無事而欲富樂乎新序曰秦欲伐楚使者往觀楚重寳楚王聞之召令尹子西問焉曰秦欲觀楚寳噐和氏之璧隋侯之珠可以示諸乎對曰臣不知也召昭奚恤問焉對曰此欲觀吾國之得失而圗之非國之重寳也遂使恤應之恤發精兵三百人陳於西門之内為東西之壇秦使者至恤曰君客也請就上位東子西南面大宗子方次之葉公子髙次之司馬子反次之恤自居西面之壇稱曰客觀楚之寳噐楚所寳者賢臣也理百姓實倉廩使民人各得其所子西在此奉珪璧使諸侯解忿憤之難交兩國之欣使无兵革之憂大宗子方在此守封疆謹境界不侵鄰國鄰國亦不見侵葉公子髙在此理師旅正兵戎以當强敵提桴鼓以動百為之衆使皆赴湯火蹈白刃出萬死不顧一生司馬子反在此若懐忠貞之大義撮治亂之遺風昭奚恤在此唯大國所觀秦使者憮然無以對遂揖而去使者返言於秦君曰楚多賢臣未可謀也又曰湯居亳七十里地與葛伯為隣葛伯放淫不祀湯使人遺之牛羊葛伯食之又不以祀湯又使人問曰何為不祀曰無以供粢盛也湯又使亳衆往為之耕老弱饋食葛伯率其民要其有酒食黍稻者奪之不與者殺之有一童子以黍肉餉殺而奪之書曰葛伯仇餉此之謂也為其殺是童子而征之四海之内皆曰非富天下也為匹夫匹婦復讐也蜀王本紀曰秦惠王欲伐蜀乃刻五石牛置金其後蜀人見之以為牛能大便金牛下有養卒以告曰此天牛也能便金蜀王以為然即發卒千人使五丁力士拖牛成道􅃱三枚於城郭秦道得通石牛力也後遣丞相張儀等將兵隨石牛道伐蜀焉夷維}
