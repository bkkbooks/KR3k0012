  - {type: variant, offset: 176, length: 503, content: 周武王東伐至孟津諸侯叛殷會周者八百諸侯皆曰紂可伐又曰武王為文王木主載車中武王自稱太子發言奉文王以伐不敢自專又曰武王偏告諸侯曰殷有重罰不可不畢罰徐廣注云伐一作滅漢書郊祀志曰昔齊桓公欲封禪謂管仲曰寡人北伐山戎過孤竹西伐束馬縣車上卑耳之山南伐召陵登熊耳山以望江漢兵車之會三而乘車之會六遂九合諸侯一匡天下昔三代受命亦何以異乎又李廣利傳曰天子為萬里而伐不錄其過又匈奴傳曰東胡強聞冒頓殺父自立乃使使謂冒頓欲得單于閼氏冒頓問左右左右皆怒曰東胡無道乃求閼氏請擊之冒頓曰奈何與人憐愛一女子乎遂取所愛閼氏與之東胡愈驕冒頓遂東集襲擊東胡東胡初輕冒頓不為備及冒頓以兵至大破滅東胡王後漢書曰帝以關中未定而鄧禹久不進兵下勑曰司徒堯也亡賊桀也長安吏人遑遑無所依歸宜以時進討鎮慰西京繫百姓之心禹猶執前意乃分遣將軍別攻上郡諸縣更徵兵引穀歸至大要大要縣名魏志曰太祖父嵩去官後還譙以董卓之亂避難琅邪為陶謙所害故太祖志在復讎東伐又曰景元四年鄧艾伐蜀自陰平行無人之地七百餘里鑿山通道作橋閣山高谷深至有艱嶮艾以旃自裹推轉而下將士皆攀木緣崖魚貫而進王隱晉書曰太康元年龍驤將軍王濬等攻建平丹陽城剋之東擊西陵以下盡拔其城虜其將帥於是上下諸軍同時並進吳人降者, SBCK: ''}
