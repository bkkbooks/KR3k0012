  - {type: variant, offset: 1405, length: 252, content: 處當書可云也吳志曰尚書熊睦見孫皓酷虐微有諫皓使人以刃環撞殺之身無完肌也晉書曰杜預為尚書損益萬機不可勝數朝野服焉號曰杜武庫言其無所不有又曰山濤轉尚書表辭年老詔曰方今多事嘉謀良圖委以老成也又曰劉頌為尚書孫秀等推崇趙倫功宜加九錫百寮莫敢異議頌獨曰昔漢之錫魏魏之錫晉皆一時之用非可通行今宗廟乂安雖嬖后被退勢臣受誅用周勃誅諸呂而尊孝文霍光廢昌邑而奉孝宣並無九錫之命亂舊典而習權變非先王之制九錫之議謂無所施晉康帝起居注詔曰尚書萬事之本朕所責成也而廩秩儉薄甚非治體今雖軍國多費不為元凱惜祿其依令僕給尚書各親信五十人廩賜, SBCK: ''}
