  - {type: variant, offset: 138, length: 1, content: 祿, SBCK: 左丞正色在朝三臺清肅又曰郄詵爲尚書左丞推奏吏部尚書崔洪洪曰舉詵丞而還奏我此謂挽弩自射詵曰趙宣子任韓厥爲司馬而厥}
  - {type: variant, offset: 138, length: 1, content: 祿, WYG: 左丞正色在朝三臺清肅又曰郄詵為尚書左丞推奏吏部尚書崔洪洪曰舉詵丞而還奏我此謂挽弩自射詵曰趙宣子任韓厥為司馬而厥}
