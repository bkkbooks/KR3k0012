  - {type: variant, offset: 1860, length: 292, content: 納言幘絳朝服佩水蒼玉執笏負荷梁書曰陸杲遷尚書殿中曹郎拜日八座丞郎並到上省交禮而杲至晚不及時刻坐免官也又曰周捨問劉杳尚書官著紫荷相傳云挈囊竟何所出荅曰張安世傳云持橐簪筆事孝武帝數十年注云橐囊也近臣簪筆以待顧問也後魏書曰肅宗靈太后曾讌於華林園舉觴謂群臣曰袁尚書朕之杜預欲以此杯敬屬元凱今為盡之侍座者莫不羨仰翻名位俱重當時賢達咸推與之隋書曰于仲文上以尚書文簿繁雜吏多姦計令仲文勘錄省中事其所發擿甚多上嘉其明斷厚加勞賞焉唐新語曰玄宗欲以牛仙客為尚書張九齡諫曰不可尚書古之納言有唐巳來多用舊相居之不然歷踐內外清貫之地妙有德望者充之仙客本河湟一使典耳拔昇清流齒班常伯此官邪也益部耆舊傳曰太尉李固薦, SBCK: ''}
