  - {type: variant, offset: 756, length: 293, content: 又曰魏朗字少英入為尚書再升紫微謇諤禁省不屈豪右為百寮所服以黨事免朗性矜嚴閉門整法長吏希見動有禮序室家相待如賓子孫如事嚴君焉又曰蔡邕字伯喈以持書御史遷尚書三月之間周歷三臺又曰鍾離意字子阿明帝徵為尚書交阯太守坐贓伏法以資物簿入大司農詔頒賜群臣意得珠璣悉以委地而不拜帝怪問其故對曰臣聞孔子忍渴於盜泉之水曾參廻車於勝母之鄉惡其名也贓穢之寶不敢拜帝笑曰清乎尚書賜錢三十萬又曰荀緄字伯條拜尚書緄性明亮敏於眾職以勗群寮秉機平正直而行之是時內外公卿大夫莫不敬憚焉又曰韋彪上䟽曰欲急世所務當先除其患其源在尚書尚書典樞機天下事一決之不可不察漢官解詁曰士之權貴不過尚書又曰唐虞曰納言周官為內史機事所揔號令攸發, SBCK: 期會假署印綬及筆墨諸材用}
