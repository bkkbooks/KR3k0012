  - {type: variant, offset: 323, length: 406, content: 曹通掌圖書祕記章奏各有曹任常侍主丞相御史公卿事二千石曹主刺史郡國事民曹主吏民上書事客曹主外國夷狄事而成帝又置三公曹主斷獄共為五曹世祖又分增三公為二曹其一曹主歲盡課州郡事改常侍曹為吏曹主選舉祠祀民曹主繕治攻作鹽池苑囿客曹主護駕羗胡朝賀二千石曹主辭訟中都官主水火盜賊與三公為六曹又曰李固上䟽云陛下之有尚書猶天之有北斗北斗為天喉舌尚書為陛下喉舌謝承後漢書曰陳禁字子雅拜尚書公卿朝日晏無詔禁問臺上故事何時可罷對言巳食輒有詔罷今巳晏禁曰寧可白耶尚書郎以上方宴樂不敢白禁使罷公卿既罷上問左右今未有詔而罷朝何也尚書直對曰陳禁命罷上曰勿復問也禁在臺二年嘗病令僕射數奏久病滿百日請輒免有詔賜金帛醫藥又曰張陵字處仲為尚書首歲朝梁冀滯劍入省陵叱冀令出勑虎賁奪其劍冀跪謝陵劾之詔以歲俸贖罪百寮肅然冀弟不疑曾舉陵後疾冀不疑謂曰昔舉君所以自罰也陵曰明府不以陵不肖誤見擢序令申公憲非報私恩耳不疑有慚色又曰翟酺字子廣為侍中時尚書有缺詔將軍大夫六, SBCK: ''}
