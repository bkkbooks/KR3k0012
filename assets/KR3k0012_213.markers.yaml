  - {type: variant, offset: 1662, length: 3, content: 蔡謨為, SBCK: 王國寳因酒坐怒右丞祖台之攘􅃑喚呼以盤盞樂器擲台之復爲有司所彈烈宗詔曰國寳縱肆情性其不可長台之懦弱非監司體其免官沈約宋書曰晉西朝八座丞郎朝晡詣都座朝江左唯旦朝而已八座丞郎初拜並集都座交禮遷又解交漢舊制也今唯八座解交丞郎不復解交宋書百官志曰右丞掌臺内庫藏凢諸器物廨舎刑獄兵器唐書曰宇文節爲}
  - {type: variant, offset: 1662, length: 2, content: 蔡謨, WYG: 王國寳因酒坐怒右丞祖台之攘袂喚呼以盤盞樂噐擲台之復為有司所彈烈宗詔曰國寳縱肆情性甚不可長台之懦弱非監司體其免官沈約宋書曰晉西朝公八座丞郎朝晡詣都座朝江右唯旦朝而已八座丞郎初拜並集都座交禮遷又解交漢舊制也今唯八座解交丞郎不復解交宋書百官志曰右丞掌臺内庫藏凡諸噐物廨舍刑獄兵器唐書曰宇文節}
