  - {type: variant, offset: 140, length: 1, content: 終, WYG: 軍法戮宣子之僕崔侯為國舉才我以才見舉唯官是視各明至公何故}
  - {type: variant, offset: 140, length: 1, content: 終, krp: 軍法戮宣子崔侯爲國舉才我以才見舉唯官是視各明至公何故}
  - {type: variant, offset: 142, length: 1, content: 身, SBCK: 言乃至於此洪聞而恱服之又曰􅀓咸爲尚書左丞時尚書郭弈咸故將也累辭病疾不起復不上朝又自表妹葬乞出臨喪詔書聽許咸舉奏之又曰郄弘始爲尚書郎轉左右丞在朝爲百寮所憚後坐泄事免晉諸公讃曰許竒爲尚書左丞有准繩操又曰傅咸字長虞爲左丞臺閣小大望風自肅晉中興書曰荀㽔字令逺遷左丞時桓温平蜀朝廷欲以豫章封温㽔謂太宗曰􅀂温復假王威平定河洛修復山陵將復何以加之遂止沈約宋書曰何承天爲中丞與尚書左丞謝元素不相善二人競伺二臺之違累相糾奏宋書百官志曰晉宋之丗左丞主臺内禁令宗廟祠祀朝儀禮制選用署吏糺諸不法無所廻避三國典略曰北齊張耀甞爲尚書左丞文宣近出令耀居守文宣夜還耀不開門勒兵嚴備火至㸔面然後開迎文宣􅀏曰卿欲學郅君章也賜以錦􅂁以其忠勤􅀷見親待梁書曰賀琛遷尚書左丞并叅禮儀事琛前後居職凡郊廟諸議多所創定每見髙祖與語常移晷刻故省中爲之語曰上殿不下有賀雅琛容止都雅}
  - {type: page-break, offset: 142, content: '', id: KR3k0012_SBCK_213-2a}
  - {type: variant, offset: 142, length: 1, content: 身, WYG: 言乃至於此洪聞而悦服之又曰傅咸為尚書左丞時尚書郭奕咸故將也累辭病疾不起復不上朝又自表妹葬乞出臨喪詔書聽許咸舉奏之又曰郄宏始為尚書郎轉左右丞在朝為百寮所憚後坐事免晉諸公贊曰許竒為尚書左丞有凖繩操履又曰傅咸長虞為左丞臺閣小大望風自肅晉中興書曰荀㽔字令逺遷左丞時桓温平蜀朝廷欲以豫章封温㽔謂太宗曰若温復假主威平定河洛脩復山陵將復何以加之遂止沈約宋書曰何承天中丞與尚書左丞謝元素不相善二人競伺二臺之違累相糺奏宋書百官志曰晉宋之世左丞主臺内禁令宗廟祠祀朝儀禮制選用署吏糺諸不法無所迴避三國典略曰北齊張耀嘗為尚書左丞文宣近出令居守文宣夜還不開門勒兵嚴備火至看面然後開迎文宣笑曰卿欲學郅君章也賜以錦袍以其忠勤深見親待梁書曰賀琛遷尚書左丞并參禮儀事琛前後奉職凡郊廟諸議多所創定每見高祖與語常移晷刻故省中為之語曰上殿不下有賀雅琛容止都雅}
