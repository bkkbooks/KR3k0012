  - {type: variant, offset: 1220, length: 183, content: 制九品為官人之法群所建也又曰許混字子劭清淳有鑒識明帝時為尚書又曰丁謐字彥靜曹爽宿與相親拔為散騎常侍轉為尚書在臺閣數有所彈駮以勢屈於爽爽亦敬之時謗書謂臺中有三狗二狗崖柴不可當一狗憑點作疽囊三狗謂何鄧丁也點者爽小字也意言三狗皆欲嚙人而謐尤疽囊也又曰孔禮字德遠為尚書明帝方修臺署節氣不和天下少穀禮固爭因罷役制曰敬納讜言魏略曰帝遊宴在內選女子知書可付信者六人為女尚書使典省外, SBCK: 章表}
