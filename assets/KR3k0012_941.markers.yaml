  - {type: variant, offset: 462, length: 2, content: 琵琶, WYG: 孔融與韋康書云不意雙珠近出老蚌陳書曰武帝雅尚恭儉膳不過􅂾品私饗曲宴皆用瓦器蚌盤唐書曰太宗謂侍臣曰蜃性含水待月而水生木性懐火因燧而燄發人性含靈待學而成美墨子申屠狄謂周公曰賤人何可薄耶周之靈珪出於土石隋之明月出於蚌蜃少豪大豪出於汚澤天下諸侯皆以為寳狄今請退也淮南子曰季秋爵入大水為蛤又曰古者剡耜而耕摩蜃而耨剡利也耜挿属也蜃大蛤摩令利用之耨耨除苗穢又曰孟冬水始氷地始凍雉入大水為蜃雉陽鳥也三嵗而死極陽化隂故隨隂氣入水為蜃蜃大蛤也又曰眀月之珠出於蠬音蜃珠有夜光之明龍印月生於蠬中又曰毛羽者飛行之類也故屬於隂日者陽之主也是以春秋則群獸除日至而麋鹿觧觧角月者隂之宗也是以月虧而}
