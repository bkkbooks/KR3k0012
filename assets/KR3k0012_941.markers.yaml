  - {type: variant, offset: 1038, length: 436, content: 魚臨海水土記曰伏念魚似吹沙魚金石魚南越記曰金石魚形員如七寸柈婢屣魚臨海異物志曰婢屣魚口近腹下形似婦人屣奴屩魚臨海水土記曰奴屩魚長一尺如屩形𩷯魚臨海水土記曰𩷯魚似蒲魚長三尺銅吮魚臨海異物志曰銅吮魚長五寸似儵魚陶魚臨海水土記曰陶魚長三尺似鱦音繩魚石班魚臨海水土記曰石班魚媱蟲六蟲為一又曰石班魚媱蟲蝘蝥也魚長尺餘其如虎文俗言鰋蝥於水邊呼之因走上岸台臺牝其子不可食也戴星魚臨海水土記曰戴星魚狀如鳶魚背上有兩白璫如指大因名之云𩽳魚沈懷遠南越志曰𩽳魚似𩵩𩺷音畢尾上有剌如欓樹剌也魿魚臨海水土記曰魿魚似䰸魚異物志曰南方魚多不肥美唯魿魚為上大者長二尺作膾炙尤香而美嶺表錄異曰魿魚如白魚而身稍短尾不偃清遠江多此魚蓋不產於海也廣人得之多為膾不腥而美諸魚無以過也織杼魚臨海水土記曰織杼魚狀似𩸪魚味美於諸魚沈懷遠南越志曰織杼魚如真魚背上正青䱦鯺魚臨海水土記曰䱦鯺形似䱦魚戲於重川靡有定所土奴魚臨海水土記曰土奴魚頭如虎有剌螫人新婦魚臨海水土記曰新婦魚似䱦魚長一丈海狶魚臨海水土記曰海狶魚豕頭身長九尺, SBCK: ''}
