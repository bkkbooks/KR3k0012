  - {type: punctuation, offset: 462, content: 「, id: KR3k0012_CHANT_941-bkkpn164}
  - {type: variant, offset: 462, length: 2, content: 琵琶, SBCK: 􅀉居山蠃蟲而長如蠡而脚似蜘蛛大无殻入蠡殻中又曰螺大者如筥一邊重可爲酒器又曰吒螺着海邊樹上見人吒如人声可食又曰蒼螺江東人以爲椀假猪螺日南有之厭爲甲者鄧德明南康記曰平固水口下流數里有螺亭臨江昔一少女曽與伴俱乗小舩江漢採螺旣逼暮因停沙邊共􅀫忽聞騷騷如軍馬行湏􅁷乃見羣螺張口無數相與爲災來破舎噉此女子同侣諸嫗當時惶怖不敢作声悉走上岸至暁方還但見骨耳収斂喪骨薄埋林際歸報其家經四五日間近所埋處飜見石􅃁穹窿髙十餘丈頭可受二十人坐也今四面有階道髣髴人冢其頂上多螺殻新故相仍郷傳謂之螺亭丗語曰衛瓘大康永熈中家人炊飯墮地盡化爲螺出足而行瓘終見誅廣五行記曰晉武帝時裴楷家炊黍在甑或變爲螺其年楷卒又石崇家稻米化螺崇亦􅀍誅嶺表録異曰鸚鵡螺旋尖處屈而朱如鸚鵡觜故以此名殻上青緑斑大者可受二􅂛殻内光􅉷如雲母裝爲酒杯竒而可翫又紅螺大小亦􅀋鸚鵡螺殻薄而紅亦堪爲酒器刳小螺爲足綴以膠漆􅁑龔薦戴昱曰昱年六十二兄弟同居二十餘年及爲宗老分昱將妻子逃舊業入虞澤結茅爲室捃穫野豆拾掇蠃蚌以自振給蚌易通卦驗曰小雪雉入水爲蜄爾雅曰蜃小者珧珧玉珧也即小蚌珧音遥􅀃文曰􅪓歩梗切蜯也鮚巨栗切折音蚌也漢書曰漢律㑹稽獻鮚醬二􅂛蜯蜃之屬周書曰成三時具􅇌獻蜃鄭􅀇注曰蜃大蛤也大戴禮曰十月雉入淮爲蜃蜃者蒲蘆也春秋後語曰齊趙將伐燕􅂫代爲燕􅀃趙王曰今者臣來過小水見小蜯方出暴而鷸啄其肉蜯合而挾其啄啄口也上啄其肉音張角切下啄音許穢切鷸曰今日不􅀨明日不雨必見蜯脯蜯亦謂鷸曰今日不出明日不出必見死鷸兩不相捨漁父得而併擒之今趙且伐燕燕趙乆相支以弊其衆臣恐強􅁗之爲漁父也故願大王熟計之趙王於是乃止魏志曰孔融與韋康書云元將仲將不意􅀟珠近岀老蜯陳書曰武帝雅尚恭儉膳不過數品私饗曲宴皆用瓦器蚌盤唐書曰太宗謂侍臣曰蜃性含水待月而水生木性懐火因燧而􅆋發人性含靈待學而成美墨子曰申屠狄謂周公曰賤人何可薄􅁘周之靈珪岀於􅁟石楚之明月出於蚌蜃少家大豪出於汚澤天下諸侯皆以爲寳狄今請退也淮南子曰季秋爵入大水爲蛤爵依屋之萑也飛鳥也隨陽下藏故爲蛤又曰古者剡耜而耕摩蜃而耨剡利也耜臿屬也蜃大蛤摩令利用之耨耨除苗穢又曰孟冬水始冰地始凍雉入大水爲蜃雉陽鳥也三歳而死極陽切隂故隨隂氣入水爲蜃蜃大蛤也又曰明月之珠出於蛖音尨蜄珠有夜光之明月生於蛖中又曰毛羽者飛行之􅀋也故屬於隂日者陽之主也是以春夏則羣獸除日至而麋鹿解解角也月者隂之宗也是以月虧而}
