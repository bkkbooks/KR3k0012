  - {type: variant, offset: 479, length: 0, content: '', WYG: 多香螺文蛤之屬博物志曰東南之人食水之産西北之人食陸畜産食水産者龜蛤螺蚌以為珍味不覺其腥臊也食陸畜産者狸兎䑕雀以為珍味不覺其羶燋也杜寳大業拾遺録曰南方林邑有大蚌盈車明珠至寸不以為貴國人不採交州異物志曰鳥許山居射翠取羽剖蜯探珠}
