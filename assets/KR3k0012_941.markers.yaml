  - {type: variant, offset: 753, length: 284, content: 玄魚為神化之物以玄字合於魚字為鯀字邵魚臨海水土記曰邵魚狀如鳶魚鱬鰗魚臨海水土記曰鱬鰗魚狀如鳶魚形井魚臨海異物志曰井魚頭有兩角鏡魚臨海異物志曰鏡魚如鏡形體薄少肉含光魚臨海異物志曰含光魚一名臈魚黃而美故謂之臈有光照燭沈懷遠南越志曰含光謂臈魚正黃而美故謂為臈魚夜則有光嶺表錄異曰黃臈魚即江湖之橫魚頭觜長而鱗背金色南人臠為炙雖美而毒或煎爆或乾夜即有光如燭𩷩魚臨海異物志曰𩷩魚如指長七八寸但有脊骨好作羹大者如竹竿曝作燭極有光明𩸪魚臨海異物志曰𩸪魚三月生溪中裁長一寸至十月中東還死於海香氣聞於水上到時月輒復更生永嘉地記曰石堂水口多𩸪魚吹沙魚臨海異物志曰吹沙長三寸背上有剌犯之螫人伏, SBCK: 爲}
