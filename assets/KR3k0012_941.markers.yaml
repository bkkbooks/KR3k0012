  - {type: variant, offset: 367, length: 1, content: 寄, SBCK: 土産明珠大貝即紫貝也螺易􅀃卦曰離爲蠃注曰剛在外也周官天官上鼈人曰􅀕祀供蠯蠃蚳以授􅊽人蠃螔蝓也鄭司農云蠯蛤也杜子春云蠯也蠯音陴國語曰大夫種謀呉曰今呉大荒其民必移就蒲蠡於東海之濵必可伐廣志曰海文蠡數種其大者受一􅂛南人以爲酒杯魏書曰漢末天下荒亂率乏糧榖􅀽術在江淮取給蒲蠃民相食州郡蕭條宋書曰元嘉末魏太武征彭城遣使求酒及甘橘張暢宣孝武帝命致螺杯雜粽南􅁟所珍北史曰隋劉臻性好噉蜆以音同父諱呼爲扁螺淮南子曰蠃􅫡愈燭睨蠃附螺也􅫡細長螺也燭睨目中疾此皆治目之藥也人無故而永此物者必有蔽其明也水經曰桂陽貞女峽峽西岸髙巖名貞女山山下際有石如人形髙七尺􅃺女子故名貞女峽古來相傳有數女取螺於此遇風雨晝晦忽化爲石山海經曰旬山洵水出焉南流注于閼澤其中茈蠃紫色螺也又曰邽山濛水出焉有螺}
