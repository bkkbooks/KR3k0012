  - {type: variant, offset: 486, length: 88, content: 魚千歲為劍魚樂魚一名琵琶魚形似琵琶而喜鳴因以為名左思吳都賦曰鮫鯔琵琶曹毗楊都賦曰魚則琵琶烏賊䟽齒魚魏武四時食制曰䟽齒魚味如豬魚出東海潘岳滄海賦曰比目䟽齒班魚魏武四時食制曰班魚頭, SBCK: ''}
  - {type: variant, offset: 486, length: 3, content: 魚千歲, WYG: 中有洲島島上有大池謂之珠池毎年脩貢珠户入池採珠皆採老蚌剖而取珠池在海上疑其底與海通珠如踠豆大常珠也如彈丸者亦時有得徑寸照室之珠卒不可遇也又取小蚌肉貫之以篾曝乾謂之珠母容桂人卒將脯燒之以薦酒又曰中有細珠如梁粟乃知珠池之蚌隨其大小悉腹中有珠矣延篤與髙義方書曰今兹以五經}
