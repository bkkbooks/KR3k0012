  - {type: variant, offset: 1627, length: 863, content: 尺黍魚臨海水土記曰黍魚長三尺似𩶯鯧魚臨海水土記曰鯧魚兩肋下有大肉如炙臠大嶺表錄異曰鯧魚形似鯿魚而腔上突起連背而圓身肉甚厚肉白如凝脂只有一脊骨治之以薑蔥缹音缶也之粳米其骨亦軟飧者無所棄鄙俚謂之狗磕睡魚以其犬在盤下難伺其骨故云狗磕睡魚也饋尾魚南越記曰饋尾魚有毒一名鼈魚土拌魚臨海水土記曰土拌魚長七寸白黑班文高魚異物志曰高魚與鱒相似與蜥蜴於水上相合常以三二月中有雌而無雄食其胎殺人蘆䱐魚異物志曰蘆䱐似鰌蝥而有細文多膏肥美大如蘆管本出地中隨泉浮出俗名蘆䱐沈懷遠南越志曰蘆䱐魚生山曲之間穴地為窟泉源踴則此魚出今盧陵以南至于南州有焉俗以為醬鼉風魚異物志曰冬天此魚數千萬頭共處大窟中藏上有白氣或在鼉穴中皮黑如漆能潛知數里中空木所在因風而入空木化為蝙蝠其肉甚美鯤魚毛詩鷄鳴曰弊笱在梁其魚魴鯤爾雅曰鯤魚子凡魚之子總名鯤又曰鯤小魚音繩又孕今江東呼魚子未成者為繩也海鯤魚王子年拾遺錄曰黑河北極也其水濃黑不流上有黑雲生焉有黑鯤千尺狀如鯨常飛遊往於南海莊子曰北溟有魚其名為鯤其大不知幾千里江逌詩曰巨鰲戴蓬萊大鯤運天池倏忽雲雨興俯仰三洲移孫放詠莊子詩曰巨細同一馬物化無常歸脩鯤解長鱗鵬起片雲飛撫翼摶積風仰凌垂天翬袁宏北征賦曰魚託水而成鯤木在山而有松鮞魚呂氏春秋曰魚之美者東海之鮞張衡西京賦曰巢鯤鮞鯤魚子也鮞細魚類也細赤魚劉義慶幽冥錄曰始興雲水源有湯泉每至霜雪其上蒸氣高數十丈泉中常有細赤魚出遊莫有獲者鰥魚毛詩曰弊笱在梁其魚魴鰥鰥夫魚也孔叢子曰衛人釣於河得鰥其大盈車曰吾下一魴之餌鰥過而不視又以豚之半則吞矣子思曰鰥貪以餌死士貪以祿死真魚沈懷遠南越志曰真魚如織紵魚臨海水土記曰𩺘魚俗謂之猶魚鷄子魚嶺表錄異曰鷄子魚口有觜如鷂肉翅無鱗尾尖而長有風濤即乘風飛於海上舩稍類鮐鰑魚竹魚嶺表錄異曰竹魚產江溪間形如鱧魚大而少骨青黑色鱗下間以朱點鬣可翫或烹以為美臛肥而美乳穴魚嶺表錄異曰全義嶺之西南有盤龍山山有乳洞斜貫一溪號為靈水溪今桂州靈川縣也溪內有魚皆脩尾四足丹其腹游泳自若漁人不敢捕之爾雅云鯢似鯛四足聲如小兒今商州山溪內亦有此魚謂之魶魚𩻷魚臨海水土記曰𩻷魚似鱦魚長二尺, SBCK: ''}
