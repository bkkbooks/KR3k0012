  - {type: variant, offset: 471, length: 3, content: 似琵琶, SBCK: 記曰夏靖荅車茂弘論鄮縣書曰其蜯蛤之屬目所希見耳所未聞徐􅂨南方記曰白珠蜯殻長三寸半漲海中􅀷六七丈去岸四五十里永嘉郡記曰樂成縣木履山東帶採門凢海採者皆由其門}
