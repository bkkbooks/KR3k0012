  - {type: variant, offset: 460, length: 0, content: '', WYG: 記曰平固水口下流數里有螺亭臨江昔一少女曽與伴俱乗小船江漢採螺既逼暮因停沙邉共宿忽聞騷騷如軍馬行湏臾乃見羣螺張口無數相與為灾遂共亂噉此女子同侣諸嫗當時惶怖不敢作聲悉走上岸至曉方還但見骨耳收歛䘮骨薄埋林際歸報其家經四五日間近所埋䖏飜見石冡穹窿髙十餘丈頭可受二十人坐也今四面有堦道髣髴人冡其頂上多螺殻新故相仍鄉𫝊謂之螺亭世語曰衛瓘大康永熈中家人炊飯堕地盡化為螺出足而行瓘終見誅廣五行記曰晋武帝時裴楷家吹黍在甑㦯變為螺其年楷卒又石崇家稻米化螺崇亦被誅嶺表録異曰鸚鵡螺旋尖處屈而朱如鸚鵡嘴故以此名殻上青綠斑文大者可受二升殻内光瑩如雲母装為酒杯竒而可翫又紅螺大小亦類鸚鵡螺殻薄而紅亦堪為酒器刳小螺為足綴以膠漆葛龔薦戴昱曰昱年六十二兄弟同居二十餘年及為宗老分舊業昱將妻子逃入虞澤結茅為室捃穫野豆拾掇羸蚌以自賑給蚌易通卦騐曰小雪雉入水為蜃爾雅曰蜃小者珧珧玉珧也即小蚌珧音遥説文曰􅪓步柄切蜯也鮚巨果切􅀈音蚌也漢書曰漢律㑹稽獻鮚醤二升蜯蜃之屬周書曰成王時具區獻蜃蜃大蛤也大戴禮曰十月雉入淮為蜃蜃者蒲蘆也春秋後語曰齊趙將伐燕蘇代為燕說趙王曰今者臣來過小水見小蜯方出暴而鷸啄其肉蜯合而挾其喙喙口也上啄其肉音張角切下喙音計穢切鷸曰今日不雨明日不雨必見蜯脯蜯謂鷸曰今日不出明日不出必見死鷸兩未相舍漁父得而併擒之今趙且伐燕燕趙乆相支以弊其衆臣恐強秦之為漁父也故願大王熟計之趙王於是乃止魏}
