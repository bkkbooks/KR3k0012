  - {type: variant, offset: 479, length: 0, content: '', SBCK: 多香螺文蛤之屬􅀶物志曰東南之人食水之産西北之人食六畜産食水産者􅀛蛤螺蚌以爲珎味不覺其腥臊也食六畜産者狸兎䑕雀以爲珎味不覺其膻燋也杜寳大業拾遺録曰南方林邑有大蚌盈車明珠至寸不以爲貴國人不採交州異物志曰烏滸山居射翠取羽剖蜯􅊥珠}
