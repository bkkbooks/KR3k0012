  - {type: variant, offset: 509, length: 528, content: 名左思吳都賦曰鮫鯔琵琶曹毗楊都賦曰魚則琵琶烏賊䟽齒魚魏武四時食制曰䟽齒魚味如豬魚出東海潘岳滄海賦曰比目䟽齒班魚魏武四時食制曰班魚頭中有石如珠出北郭義恭廣志曰班魚頭中有玉石如珠璣黃雀魚臨海異物志曰黃雀魚常以八月化為黃雀到十月入海為魚風土記曰六月東南長風俗名黃雀風時海魚化為黃雀因為名也鷰魚臨海異物志曰鷰魚長五寸陰雨起飛高丈餘鳶魚臨海異物志曰鳶魚狀如鳶唯無尾足陰雨日亦飛高數丈赤魚魚豢魏略曰文帝欲受禪赤魚遊於露鑊玄魚王子年拾遺錄曰夏鯀理水無功沉於羽川化為玄魚大千尺後遂死橫於河海之間後世聖人以玄魚為神化之物以玄字合於魚字為鯀字邵魚臨海水土記曰邵魚狀如鳶魚鱬鰗魚臨海水土記曰鱬鰗魚狀如鳶魚形井魚臨海異物志曰井魚頭有兩角鏡魚臨海異物志曰鏡魚如鏡形體薄少肉含光魚臨海異物志曰含光魚一名臈魚黃而美故謂之臈有光照燭沈懷遠南越志曰含光謂臈魚正黃而美故謂為臈魚夜則有光嶺表錄異曰黃臈魚即江湖之橫魚頭觜長而鱗背金色南人臠為炙雖美而毒或煎爆或乾夜即有光如燭𩷩魚臨海異物志曰𩷩魚如指長七八寸但有脊骨好作羹大者如竹竿曝作燭極有光明𩸪魚臨海異物志曰𩸪魚三月生溪中裁長一寸至十月中東還死於海香氣聞於水上到時月輒復更生永嘉地記曰石堂水口多𩸪魚吹沙魚臨海異物志曰吹沙長三寸背上有剌犯之螫人伏, WYG: ''}
