  - {type: variant, offset: 367, length: 1, content: 寄, WYG: 土産眀珠大貝即紫貝也螺易說卦曰離為蠃注曰剛在外也周官天官鼈人曰祭祀供蠯羸蚳以授醢人蠃䗂蝓也蠯畔也音啤國語曰大夫種謀吴曰今吳大荒其民必移就蒲蠡於東海之濱可伐廣志曰海文蠡数種其大者受一斗南人以為酒杯魏書曰荒亂卒乏粮榖袁術在江淮取給蒲蠃民相食州郡蕭條宋書曰元嘉末魏太武征彭城遣使求酒及柑橘張暢宣孝武帝命致螺杯雜粽土所珍北史曰隋劉臻性好噉螺淮南子曰羸􅫡愈蠋睨羸附螺也􅫡細長螺也蠋睨目中疾此皆治目之藥也人無故而求此物者必有蔽其眀也水經曰桂陽貞女峽西岸髙巖名貞女山山下際有石如人形髙七尺狀如女子故名貞女峡古来相傳有数女取螺於此遇風雨晝晦忽化為石山海經曰洵山洵水出焉南流注於閼澤其中芘蠃紫色螺也又曰邽山濛水出焉有螺}
