  - {type: variant, offset: 369, length: 0, content: '', SBCK: 身而鳥翼見則其邑大水搜神記曰謝端夏官人少􅀌爲郷人所養年十八㳟謹自守後於邑下得一大螺如三升盆耳將盍甕中每早至野還見有飲飯湯火處端疑之於籬外窺之見一少女從甕中出至竈下燃火便入問之女荅曰我天漢中白水素女天帝哀卿少􅀌使我權相爲守舎炊煑使卿後得婦當還去今無故相伺不冝留此忽有風􅀨而去徐􅂨南方記曰馬軻蠃大者圍九寸長四寸細者圍七寸}
