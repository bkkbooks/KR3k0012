  - {type: variant, offset: 465, length: 0, content: '', SBCK: 腦減月死而螺蚌㾭㾭減蹴也又曰古者民茹草飲水採樹木之實食蠃蛖之肉時多疹病毒傷之害又曰明月之珠蜃蛖之病而我之利虎爪象牙禽獸之利而我之害栽猶人也又曰蛖象之病人之寳也蛖大蛤中有珠象牙還以自病故人得以爲寳人之病將有誰寳之者乎人以利欲爲病}
  - {type: variant, offset: 465, length: 0, content: '', WYG: 腦减月死而螺蚌瞧瞧减蹴也又曰古者民茹草飲水採樹木之實食蠃蠬之肉時多疹病毒傷之害又曰眀月之珠蜃蠬之病而我之利虎爪象牙禽獸之利而我之害我猶人也又曰蠬象之病人之寳也蠬大有蛤中有珠象牙還以自病故人得以為寳人之病將有誰寳之者乎人以利欲為病}
