  body:
  - {type: variant, offset: 4, length: 6, content: 二瓊魚漢武內, SBCK: 三貝螺􅑕貝尚書禹貢曰淮海惟揚州島夷卉服厥篚織貝又顧命曰大貝鼖鼔在西房大貝如車渠啇周傳寳之毛詩節巷伯曰萋􅀆菲􅀆成是貝錦貝如錦也又義䟽曰有紫貝質白如玉紫􅀧爲文皆行列相當大者徑一尺七寸今九眞交阯以爲杯盤實物也孝經援神契曰德至泉則江生大貝爾雅曰貝陸居贆方遥切在水者蜬水陸異名也貝中肉如科斗但有頭尾音含大者魧書大}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 三貝螺蚌貝尚書禹貢曰淮海惟楊州島夷卉服厥篚織貝又顧命曰大貝鼖鼓在西房大貝如車渠商周𫝊寳之毛詩巷伯章曰萋兮菲兮成是貝錦貝如錦也又義疏曰有紫貝質白如玉紫㸃為文皆行列相當大者徑一尺}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_WYG_941-1b, image: WYG0901/WYG0901-0346d.png}
  - {type: variant, offset: 4, length: 6, content: 二瓊魚漢武內, krp: 三貝螺􅑕貝尚書禹貢曰淮海惟揚州島夷卉服厥篚織貝又顧命曰大貝鼖鼔在西房大貝如車渠啇周傳寳之毛詩節巷伯曰萋兮菲兮成是貝錦貝如錦也又義䟽曰有紫貝質白如玉紫點爲文皆行列相當大者徑一尺七寸今九眞交阯以爲杯盤實物也孝經援神契曰德至泉則江生大貝爾雅曰貝陸居贆方遥切在水者蜬水陸異名也貝中肉如科斗但有頭尾音含大者魧書大}
  - {type: xml-element, offset: 5, content: '', id: KR3k0012_CHANT_941-bkkxmlele1}
  - {type: 'tls:seg', offset: 5, content: '', id: KR3k0012_CHANT_941-1a.1}
  - {type: 'tls:seg', offset: 5, content: '', id: KR3k0012_CHANT_941-1a.2}
  - {type: variant, offset: 5, length: 1, content: 瓊, WYG: 寸今九真交阯以為杯盤貢物也孝經援神契曰德至泉則江生大貝爾雅曰貝居陸贆方遥切在水者蜬水陸異名也貝中肉如科斗但有頭尾音含大者魧書大傳大貝如車渠車渠謂車􅀈即魧属魧如郎切小者鰿今細貝亦有紫色者出日南鰿音積元貝貽貝黑色貝也餘貾音池黃白文以黃為質白為文㸃餘泉白黃文以白為質黃為文㸃今之紫貝以紫為質黒為文㸃蚆音巴􅀶而頯頯者中夾廣兩頭鋭䪻逹䡄二音􅀈音困大而險險者汚薄􅜽小而橢即上小貝橢謂狭而長此皆説貝之形容橢他果切説文曰貝海介蟲也古者貨貝而寳龜也汲冡周書王㑹曰共家元貝共家吴越之蠻元貝昭貝也漢書曰文帝賜尉佗書佗因使者獻紫貝五百後周書曰歩落稽婦人多貫蜃貝以為飾隋書曰琉球國人用鳥羽為冠飾以珠貝唐書曰吐渾國婦人辮􅀈索後綴以珠貝又曰拂菻國有大貝車渠淮南子曰商拘文王於羑里於是散宜生乃以千金求天下之珍怪得大貝百朋五百為一朋也山海經曰號山之尾其上多玉}
