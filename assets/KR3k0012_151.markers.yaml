  - {type: variant, offset: 3577, length: 2, content: 河間, SBCK: 彭城王據建安十六年封范陽侯以環太妃彭城人徙封彭城呉志曰呉主孫權謝夫人㑹稽山隂人也父㷡權聘以爲妃愛幸有寵後權納姑孫徐氏欲令謝下之不肯由是失志早卒又曰呉主孫權徐夫人呉郡冨春人也祖父眞與權父堅相親堅以妺妻眞生琨琨生夫人􅀄適同郡陸尚尚卒權爲討虜將軍在呉娉以爲妃後母養子登後權遷移以夫人妬忌廢處呉積十餘年㝷卒臧榮緒晉書曰賈充前妻李氏生二女荃濬禁錮解荃等屢請充迎其母而父不判充當鎭􅀜中屯軍城西爲供帳受百官錢荃濬遂突出於坐中叩頭流血訴充并陳􅀃羣客以母應還之意荃是齊}
  - {type: page-break, offset: 3577, content: '', id: KR3k0012_SBCK_151-9a}
  - {type: variant, offset: 3577, length: 2, content: 河間, WYG: 彭城王據建安十六年封范陽侯以太妃彭城人徙封彭城吳志曰吳主孫權謝夫人會稽山陰人也父煚權聘以為妃愛幸有寵後權納姑孫徐氏欲令謝下之不肯由是失志早卒又曰吳王孫權徐夫人吳郡富春人也祖父真與權父堅相親堅以妹妻真生琨琨生夫人初適帝拜為夫人權為討虜將軍在吳聘以為妃令母養子登後權移鎮以夫人妬忌廢處吳積十年餘尋卒臧榮續晉書曰賈充前妻李氏生二女荃濬禁錮解荃等屢請充迎其母而充不從充當鎮闗中屯軍城西為供帳受百官餞荃濬遂突出於坐中叩頭流血訴充并陳説羣客以母應還之意荃是齊}
