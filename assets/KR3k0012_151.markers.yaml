  - {type: variant, offset: 2438, length: 2, content: 申公, SBCK: 才好士居不疑之地傾意賔客天下才學皆遊集焉後魏書曰河南王平原拜齊州刺史善於懷撫邊民歸附者千有餘家時歳頻不登齊民飢饉平原以私米三千餘斛爲粥以全民命北州戍卒一千餘人還者皆給路糧百姓咸稱詠之州民韓凝之}
