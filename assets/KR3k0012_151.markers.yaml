  - {type: variant, offset: 172, length: 0, content: '', WYG: 都督東南兖徐青冀幽六州諸軍事南兖州刺史登舟之日帷帳器服諸應隨刺史者悉留之荆楚以為美談又曰桂陽王休範進位司空休範素凡訥少知解不為諸兄所齒遇太宗常指左右人謂王景文曰休範人才不及此以我弟故生死富貴釋氏願生王家良有以也又曰建平宣簡王宏字休度文帝第七子也少而閒素篤好文籍太祖寵愛殊常為立第雞籠山畫山水之美建平國職髙他國一階又曰晉平王休祐貪淫好財色在荆州掊克}
