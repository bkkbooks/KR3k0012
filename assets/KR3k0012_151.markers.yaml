  - {type: variant, offset: 1782, length: 647, content: 次弟當立上書求入宿衛上怒下其使獄遂立少子為太子帝崩太子立是為孝昭帝賜諸侯王璽書旦得書不肯哭霍光秉政褒賜燕王錢三萬益封萬三千戶因怒曰我當為帝何賜也多齎金寶走馬賂遺蓋古盍切主上官桀及御史大夫桑弘羊等皆與交通數記䟽光過失與旦令上書告之桀欲從中下其章旦聞之喜上䟽是時昭帝年十四覺其有詐桀等皆伏誅旦聞之憂懣音悶置酒萬載宮會賓客臣妾坐飲王自歌曰歸空城兮狗不吠雞不鳴橫術何廣廣兮蘇林曰廣音曠瓚以術為道路固知國中之無人華容夫人起舞曰髮紛紛兮寘渠骨籍籍兮亡居母求死子兮妻求死夫俳佪兩渠間兮君子獨安居坐者皆泣又曰孝武李姬生廣陵厲王胥倡樂逸遊故終不得為漢嗣始昭帝時胥見上年少無子有覬欲心迎女巫李女須使下神祝詛女須泣曰孝武帝下我左右皆伏言吾必令胥為天子胥多賜女須以錢會昭帝崩胥曰女須良巫也殺牛塞禱及昌邑王徵復使巫祝詛之後王廢胥寢信女須等宣帝即位胥曰太子孫何以反得立復令女須祝詛如前又胥女為楚王延壽后弟婦相餽音匱遺通私書後延壽謀反誅辭連及胥又聞漢立太子謂姬南等曰我終不得立矣居數月祝詛事發覺有司桉驗天子遣廷尉大鴻臚即訊胥胥既見使者還置酒顯陽殿召太子霸及子女董訾胡生等夜飲使所幸八子郭昭君家人子趙左君等鼓瑟歌舞王自歌曰欲人生兮無終長不樂兮安窮奉天期兮不得須臾千里馬兮駐待路黃泉下兮幽深人生要死兮何為苦心何用為樂心所喜出入無悰為樂亟蒿里召兮郭門閱死不得取代庸身自逝左右悉更涕泣奏酒至雞鳴時罷胥讓太子霸曰上遇我厚今負之甚我死骸骨當暴幸而得葬薄之無厚也即以綬自絞死又曰淮陽憲王欽宣帝子好經書法律聰達有才帝甚愛之數嗟歎憲王曰真我子, SBCK: ''}
