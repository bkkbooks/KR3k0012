  - {type: variant, offset: 8, length: 0, content: '', SBCK: 而刻其水痕所至稱物以載之則校可知矣太祖大恱時軍國多事用刑嚴重太祖馬鞍在庫而爲䑕所齧庫吏懼必死欲面􅅞首罪猶懼不免沖謂曰待三日然後自歸沖於是以刃穿單衣如䑕齧者謬爲失意貌有愁色太祖問之沖對曰丗俗以爲䑕齧衣者其主不􅁻今單衣見齧是以憂慼太祖曰此妄言耳無所苦也俄而庫吏以齧鞍聞太祖􅀏曰兒衣在側尚齧況鞍懸柱乎一無所問冲仁愛識逹皆此􅀋也太祖數對羣臣稱述有欲傳後意年十三病卒太祖親爲請命及亡哀甚文帝寛喻太祖太祖曰此我之不幸而汝曹之幸也又曰中山王衮建安二十一年封平郷侯少好學年十餘歳能屬文毎讀書文學左右常恐以精力爲病數諌止之然性所樂不能廢也又曰樂陵王茂性傲很少無寵於太祖及文帝丗又獨不王太和元年徙封􅂓城公其年爲王詔曰昔象之爲虐至甚而舜猶侯之有􅋻近}
  - {type: page-break, offset: 8, content: '', id: KR3k0012_SBCK_151-1b}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 而刻其水痕所至稱物以載之則較可知矣太祖大悦時軍國多事用刑嚴重太祖馬鞍在庫而為䑕所齧庫吏懼必死欲面縛首罪猶懼不免冲謂曰待三日然後自歸冲於是以刃穿單衣如鼠齧者謬為失意貌有愁色太祖問之冲對曰世俗以為鼠齧衣者其主不吉今單衣見齧是以憂慼太祖曰此妄言耳無所苦也俄而庫吏以齧鞍聞太祖笑曰兒衣在側尚齧况鞍懸柱乎一無所問冲仁愛識達皆此類也太祖數對羣臣稱述有欲傳後意年十三病卒太祖親為請命及亡哀甚文帝寛慰太祖太祖曰此我之不幸而汝曹之幸也又曰中山王衮建安二十一年封平鄉侯少好學年十餘歲能屬文每讀書文學左右常恐以精力為病數諌止之然性所樂不能廢也又曰樂陵王茂性傲狠少無寵於太祖及文帝世又獨不王太和元年徙封聊城公其年為王詔曰昔象之為虐至甚而舜猶侯之有庳近}
