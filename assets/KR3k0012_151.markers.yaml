  - {type: variant, offset: 509, length: 1957, content: 楚元王交高帝少弟也高祖即帝位交與廬綰常侍上出入臥內傳語言諸內事隱謀文帝尊寵元王子爵比皇子又曰齊悼惠王肥其母高祖微時外婦也高祖六年立食七十餘城孝惠二年入朝帝與齊王燕飲后前置齊王上坐如家人禮太后怒遣人酌巵鴆酒置前令齊王為壽齊王起帝亦起欲俱為壽太后恐自起反巵齊王怪之因不敢飲陽醉而去又曰濟北王興居初以東牟侯與大臣共立文帝於代邸曰誅呂氏臣無功請與太僕滕公入清宮遂將少帝出迎皇帝入宮始誅呂氏時朱虛侯功尤大大臣許盡以趙地王朱虛侯章盡以梁地王東牟興居及孝文帝立聞朱虛東牟之初欲立齊王故黜其功又曰淮南王安為人好書鼓琴不喜弋獵狗馬騁馳亦欲行陰德撫循百姓流譽招致賓客方術之士數千人作為內書二十篇外書甚眾有中篇八卷言神仙黃白之術張晏曰黃黃金白白銀亦二十萬言時武帝方好藝文以安屬為諸父辯愽善為文辭甚重尊之每為報書及賜張晏曰賜賜書常召司馬相如等視草乃遣初安入朝獻所作內篇新出上愛秘之使為離騷賦旦受詔食時上又曰孝文皇后生景帝梁孝王孝王太后少子愛之賞賜不可勝道於是孝王築東苑方三百餘里廣睢陽城七十里大治宮室為複道自宮連屬於平臺三十餘里如淳曰在梁東北離宮所在也得賜天子旌旗從千乘萬騎出稱蹕入言警擬天子招延四方豪傑自山東遊士莫不至又曰梁懷王揖文帝子也文帝愛之異於他子五年壹朝因墮馬死又曰孝景栗姬生河間獻王德孝景二年立脩學好古從民間得善書必為好寫與之留其本加金帛賜以招之繇是四方道術之人不遠千里或有先祖舊書多奉以奏獻王者故得書多與漢朝等脩禮樂被服儒術造次必於儒者武帝時獻王來朝獻雅樂及詔策問三十餘事其對推道術而言得事之中文約而指明又曰江都易王非景帝子吳楚反時非年十五有材氣上書願擊吳景帝賜非將軍印吳已破二歲為江都王治吳故國以軍功賜天子旌旗元光五年匈奴大入漢為賊非上書願擊匈奴上不許又曰孝景程姬生魯恭王餘二年立為淮陽王吳楚反破後徙王魯好治宮室苑囿狗馬好音樂口吃難言王初治室壤孔子舊宅以廣宮室聞鍾磬琴瑟之聲遂不敢復壞於其壁中得古文經傳又曰孝景賈夫人生中山靖王勝建元三年來朝天子置酒勝聞樂聲而泣帝問其故勝對曰臣聞悲者不可為累欷思者不可為歎息故高漸離擊筑易水上荊軻為之泣而不食雍門子壹微吟孟嘗君為之於邑今臣之心結日久每聞窈眇之聲不知涕泣之橫集也夫眾煦漂山應劭曰煦吹煦聚蚊成雷朋黨執虎十夫橈椎臣身遠與寡莫為之先眾口鑠金積毀銷骨聚輕折軸羽翮飛肉今臣雍閼不得竊自悲也臣聞杜鼷不懽屋鼠不燻何則所託者然也臣雖薄也得蒙肺腑位雖卑也得為東藩屬又稱兄今群臣非有葭莩之親張晏曰葭蘆菓業莩裏白皮也鴻毛之重群居黨議明友相為使夫宗室擯卻骨肉冰釋斯伯奇所以流離比干所以橫分也勝又樂酒好肉有子百二十餘人常與趙王彭祖相非曰兄為王專代吏治事王者當日聽音樂御聲色趙王亦曰中山王但奢淫不佐天子拊循百姓何以稱為藩臣又曰景帝唐姬生長沙定王發唐姬故程姬侍者景帝名程姬有所避不願進而飾侍者唐兒使夜進上醉不知幸之遂有身及生子因名曰發以母微無寵故王居卑濕貧國應劭曰景帝後二年諸王來朝有詔稱爵歌舞定王但張袖小舉手左右嗟其拙上怪而間之對曰臣國小地狹不足廻旋帝以武陵桂陽屬焉又曰孝武李姬生燕剌盧達切王旦為人辯略愽學經書及衛太子敗齊懷王又薨旦自以次弟當立上書求入宿衛上怒下其使獄遂立少子為太子帝崩太子立是為孝昭帝賜諸侯王璽書旦得書不肯哭霍光秉政褒賜燕王錢三萬益封萬三千戶因怒曰我當為帝何賜也多齎金寶走馬賂遺蓋古盍切主上官桀及御史大夫桑弘羊等皆與交通數記䟽光過失與旦令上書告之桀欲從中下其章旦聞之喜上䟽是時昭帝年十四覺其有詐桀等皆伏誅旦聞之憂懣音悶置酒萬載宮會賓客臣妾坐飲王自歌曰歸空城兮狗不吠雞不鳴橫術何廣廣兮蘇林曰廣音曠瓚以術為道路固知國中之無人華容夫人起舞曰髮紛紛兮寘渠骨籍籍兮亡居母求死子兮妻求死夫俳佪兩渠間兮君子獨安居坐者皆泣又曰孝武李姬生廣陵厲王胥倡樂逸遊故終不得為漢嗣始昭帝時胥見上年少無子有覬欲心迎女巫李女須使下神祝詛女須泣曰孝武帝下我左右皆伏言吾必令胥為天子胥多賜女須以錢會昭帝崩胥曰女須良巫也殺牛塞禱及昌邑王徵復使巫祝詛之後王廢胥寢信女須等宣帝即位胥曰太子孫何以反得立復令女須祝詛如前又胥女為楚王延壽后弟婦相餽音匱遺通私書後延壽謀反誅辭連及胥又聞漢立太子謂姬南等曰我終不得立矣居數月祝詛事發覺有司桉驗天子遣廷尉大鴻臚即訊胥胥既見使者還置酒顯陽殿召太子霸及子女董訾胡生等夜飲使所幸八子郭昭君家人子趙左君等鼓瑟歌舞王自歌曰欲人生兮無終長不樂兮安窮奉天期兮不得須臾千里馬兮駐待路黃泉下兮幽深人生要死兮何為苦心何用為樂心所喜出入無悰為樂亟蒿里召兮郭門閱死不得取代庸身自逝左右悉更涕泣奏酒至雞鳴時罷胥讓太子霸曰上遇我厚今負之甚我死骸骨當暴幸而得葬薄之無厚也即以綬自絞死又曰淮陽憲王欽宣帝子好經書法律聰達有才帝甚愛之數嗟歎憲王曰真我子也又曰初楚元王敬禮申公等穆生不嗜酒元王每置酒常為穆生設醴也又曰王尊為東平相, WYG: ''}
