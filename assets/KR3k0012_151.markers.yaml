  - {type: variant, offset: 2461, length: 5, content: 尊為東平相, SBCK: 休少而聦慧治斷有稱車駕南伐領大司馬髙祖親行軍遇休以三盗人徇於軍將斬之有詔赦之休執曰陛下親御六師跋渉野次軍行始尓已有姧切如其不斬何以息盗請必行刑以肅姧匿詔曰大司馬執憲誠應如是但因縁㑹朕聞王者之體亦應有非常之澤雖違軍法可特原之休乃奉詔髙祖謂司徒馮誕曰大司馬嚴而秉法諸君不可不愼於是六軍肅然又曰永昌王健姿貌魁壯善弓馬逹兵法所征戰常有大功才藝比陳留桓王而智略過人又曰臨淮王彧字文􅀂少有才學時譽甚美侍中崔光見彧退而謂人曰黒頭三公當此人也瑯瑘王誦有名人也見之未甞不心醉忘疲又曰}
