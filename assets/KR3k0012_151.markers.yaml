  - {type: variant, offset: 2436, length: 1, content: 敬, SBCK: 宏字休度文帝第七子也少而閑素篤好文籍太祖寵愛殊常爲立第鷄籠山盡山水之美建平國髙他國一階又曰晉平王休祐貪􅁋好財色在荆州列所營財貨以短錢一百賦民田登求白米一斛皆令徹白􅀂折者悉簡糴此米􅂛一百至時又不受米平米責錢凡諸求皆如此蕭子顯齊書曰竟陵王子良雲英少尚}
