  - {type: variant, offset: 2980, length: 8, content: 即賜錢各五百萬於, SBCK: 誣以罪太后怒以故召趙王趙王至置邸不見命衛士圍守之弗與食趙王餓廼歌曰諸吕用事兮劉氏危迫脅王侯兮強授我妃我妃旣妬兮誣我以惡讒女亂國兮上曾不寤續漢書曰樂安陳夫人孝質皇帝母也家夲魏郡少以􅇊入孝王家得幸生質帝梁兾欲專國權令帝母不得至京都又帝短祚}
