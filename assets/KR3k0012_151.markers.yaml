  - {type: variant, offset: 367, length: 3, content: 襄悼惠, WYG: 休少而聰慧治斷有稱車駕南伐領大司馬髙祖親行軍遇休以三盜人徇於軍將斬之有詔赦之休執曰陛下新御六師跋渉野次軍行始爾已有奸竊如其不斬何以息盜請少行刑以肅奸慝詔曰大司馬執憲誠應如是但因縁會朕聞}
