  - {type: variant, offset: 8, length: 0, content: '', krp: 而刻其水痕所至稱物以載之則校可知矣太祖大恱時軍國多事用刑嚴重太祖馬鞍在庫而爲䑕所齧庫吏懼必死欲面縛首罪猶懼不免沖謂曰待三日然後自歸沖於是以刃穿單衣如䑕齧者謬爲失意貌有愁色太祖問之沖對曰丗俗以爲䑕齧衣者其主不吉今單衣見齧是以憂慼太祖曰此妄言耳無所苦也俄而庫吏以齧鞍聞太祖笑曰兒衣在側尚齧況鞍懸柱乎一無所問冲仁愛識逹皆此類也太祖數對羣臣稱述有欲傳後意年十三病卒太祖親爲請命及亡哀甚文帝寛喻太祖太祖曰此我之不幸而汝曹之幸也又曰中山王衮建安二十一年封平郷侯少好學年十餘歳能屬文毎讀書文學左右常恐以精力爲病數諌止之然性所樂不能廢也又曰樂陵王茂性傲很少無寵於太祖及文帝丗又獨不王太和元年徙封聊城公其年爲王詔曰昔象之爲虐至甚而舜猶侯之有􅋻近}
  - {type: variant, offset: 9, length: 0, content: '', SBCK: 氏淮南阜陵皆爲亂臣逆子而錫土有虞建之於上古漢文明帝行之于前代斯皆敦叙親親之厚義也􅂓城公茂少不閑禮教長不務善道先帝以爲古之立諸侯也皆命賢者故􅁎姓未有不爲侯者是以獨不王茂太皇太后數以爲言如聞茂頃來小知悔昔之非今封茂爲􅂓城王以慰太皇太后下流之念又曰任城威王彰字子文少善射御膂力過人手格猛獸不避險阻數從征伐志意慷􅁣太祖常抑之曰汝不念讀}
  - {type: page-break, offset: 9, content: '', id: KR3k0012_SBCK_151-2a}
  - {type: variant, offset: 9, length: 0, content: '', WYG: 氏淮南阜陵皆為亂臣逆子而錫土有虞建之於上古漢文明帝行之於前代斯皆敦叙親親之厚義也聊城公茂少不嫻禮教長不務善道先帝以為古之立諸侯也皆命賢者故宗姓未有不侯而茂以是至今不王太皇太后數以為言如聞茂頃來少知悔昔之非今封茂為樂陵王以􅇺太皇太后逮下之念又曰任城威王彰字子文少善射御膂力過人手格猛獸不避險阻數從征伐志意慷慨太祖常抑之曰汝不念讀}
  - {type: page-break, offset: 9, content: '', id: KR3k0012_WYG_151-3a, image: WYG0894/WYG0894-0390a.png}
  - {type: variant, offset: 9, length: 0, content: '', krp: 氏淮南阜陵皆爲亂臣逆子而錫土有虞建之於上古漢文明帝行之于前代斯皆敦叙親親之厚義也聊城公茂少不閑禮教長不務善道先帝以爲古之立諸侯也皆命賢者故姬姓未有不爲侯者是以獨不王茂太皇太后數以爲言如聞茂頃來小知悔昔之非今封茂爲聊城王以慰太皇太后下流之念又曰任城威王彰字子文少善射御膂力過人手格猛獸不避險阻數從征伐志意慷慨太祖常抑之曰汝不念讀}
  - {type: punctuation, offset: 10, content: ‧, id: KR3k0012_CHANT_151-bkkpn2}
  - {type: variant, offset: 10, length: 0, content: '', SBCK: 慕聖道而好乗汗馬擊劒此一夫之用何足貴也或諫彰讀書彰謂左右曰大丈夫一爲衛霍將十萬􅀐馳沙漠驅戎狄立功建號耳何能爲愽士耶又曰陳思王植字子建年十餘歳讀誦時論及辭賦數十萬言善屬文太祖甞視其文謂植曰汝倩人耳植跪曰言出爲論下筆成章頋當面試奈何倩人時鄴銅爵臺新成太祖悉將諸子登臺使各爲賦植援筆立成可觀太祖甚異之性簡易不治威儀輿馬服飾不尚華麗毎進見難問應聲而對特見寵愛蜀志曰魯王永字公􅀄永憎官人黄皓皓旣信任用事構永於後主稍䟽外永至不得朝見者十餘年呉書曰南陽王和字子孝􅀍譴之長沙行過蕪湖有鵲巢于㠶檣故官僚聞之皆憂􅃤以爲檣非乆安之象或言鵲巢之詩有積行累功以致爵位之言今王至德茂行當復國儻神靈以此告寤人意乎呉志曰魯王霸字子威和同母弟也和爲太子霸爲魯王寵愛崇特與和無殊頃之和霸不穆之聲聞於權耳權禁斷徃來假以精學又曰齊王奮字子揚居武昌權薨太愽諸􅁑恪不欲諸王處江濵兵馬之地徙奮於䂊章奮怒不從命又數越法度恪上牋諫曰帝王之尊與天同位是以家天下臣父兄大王冝上惟太伯順父之志中念河間獻王東海王彊恭敬之節下當存抑驕恣荒亂以爲警戒晉書曰安平獻王孚丗祖受禪爲太􅌠一門三丗同時十人封王二人丗子父子位極人臣子孫咸居大官出則旌旗節􅃏入則貂蟬衮冕自公族之寵未始有也享年九十然而夙夜滋恭恒有履冰之懼又曰安平王孚武帝以孚明德屬尊當宣化樹教爲羣后作則遂備置官屬焉又以孚內有親戚外有交遊惠下之費而經用不豐奉絹二千疋及元㑹詔孚輿車上殿帝於階迎拜旣坐帝親奉觴上壽如家人禮帝毎拜孚跪而止之又給以雲母輦青蓋車孚雖見尊寵不以爲榮常有憂色又曰安平獻王孚性通和以貞白自立未甞有怨於人陳留殷武有名於海內甞罹罪譴孚徃省之遂與同處分食談者稱焉又曰平原王幹字子良宣帝子太始元年封平原王邑一千三百户四年給鼔吹駙馬二疋使服侍中之服幹不治國事雖有爵禄􅀂不在身所得俸秩皆露積腐爛齊王囧爲長沙王乂所殺幹哭之哀謂左右曰宗室轉衰唯此兒最可而復害之從今殆矣又曰文帝崩齊王攸率禮過哀上以攸至孝毀甚二年五月文明皇太后親臨省攸攸毀瘠塵黒貌不可識太后留攸慰撫旬日還中詔勉攸曰􅀂萬一加以他疾將復如何冝逺慮􅀷思不可專守一意以䧟於不孝􅀂復不從徃言當遣人監守飲食又曰武帝子乂字仕慶封長沙王性果厲有威斷􅀄入洛謂成都王曰天下先帝之業王冝維之時齊王囧已至聞乂言者皆憚之又曰成都王頴字章度武帝子後屯􅀐校尉加散􅀐常侍形􅃺美而神明少乃不知書又曰梁孝王肜宣帝子拜大將軍領西戎校尉因大㑹語王銓曰我從兄爲尚書令不能啖大臠銓知肜求爲尚書令荅曰下邳王爲令與天下共嚼啖大臠故難公在此獨嚼肜曰長安大臠誰耶詮荅盧播是肜曰是吾家吏隱忍之耳詮曰天下皆王家吏王法可不復行之耶又曰齊王攸好學不倦借人書皆爲治護時還有水旱則出租秩加賤以賑國人須豐年乃收入夲直太康三年詔齊王攸當出方嶽遂撫其國加都督青州增封濟南郡備物典䇿軒懸之樂六佾之舞賜黄􅃏朝車乗輿之副晉陽秋曰齊王冏輔政士以牛酒郊勞平原王幹獨齎百錢于懷賀之晉中興書曰譙王丞鎭湘州至武昌釋軍備見王敦敦因宴集謂丞曰大王雅素佳士非將御才也丞曰公未盡耳安知鈆刀不能一割丞以敦欲測其情故發此言敦果謂錢鳯曰彼不知懼而學壯語此之不武何能爲聽丞之鎭又曰武陵威王晞爲桓温所收忠敬王少子也􅀍廢後新安王遵初封新寧王年十二受拜流涕哀慼左右將軍桓伊當造遵遵恕門人曰何通桓氏門人曰桓伊與桓温踈宗相見無嫌遵曰我聞人姓木邊便欲殺之況諸桓乎由是少稱聦察及長輙凡退無復名望晉}
