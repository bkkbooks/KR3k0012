  - {type: punctuation, offset: 364, content: 「, id: KR3k0012_CHANT_151-bkkpn93}
  - {type: variant, offset: 364, length: 883, content: 齊哀王襄悼惠王子高祖孫也太尉周勃誅諸呂大臣欲立齊王瑯琊王澤曰齊王母家駟鈞惡戾虎而冠者張晏曰言鈞惡戾如虎而著冠也方以呂氏幾亂天下又立齊王是復為呂氏也漢書曰吳王濞高帝兄仲之子也高祖立濞於沛為吳王已拜受印高祖召濞相之曰若狀有反相因撫其背曰後五十年東南有亂豈若耶天下同姓一家汝慎無反濞頓首曰不敢又曰楚元王交高帝少弟也高祖即帝位交與廬綰常侍上出入臥內傳語言諸內事隱謀文帝尊寵元王子爵比皇子又曰齊悼惠王肥其母高祖微時外婦也高祖六年立食七十餘城孝惠二年入朝帝與齊王燕飲后前置齊王上坐如家人禮太后怒遣人酌巵鴆酒置前令齊王為壽齊王起帝亦起欲俱為壽太后恐自起反巵齊王怪之因不敢飲陽醉而去又曰濟北王興居初以東牟侯與大臣共立文帝於代邸曰誅呂氏臣無功請與太僕滕公入清宮遂將少帝出迎皇帝入宮始誅呂氏時朱虛侯功尤大大臣許盡以趙地王朱虛侯章盡以梁地王東牟興居及孝文帝立聞朱虛東牟之初欲立齊王故黜其功又曰淮南王安為人好書鼓琴不喜弋獵狗馬騁馳亦欲行陰德撫循百姓流譽招致賓客方術之士數千人作為內書二十篇外書甚眾有中篇八卷言神仙黃白之術張晏曰黃黃金白白銀亦二十萬言時武帝方好藝文以安屬為諸父辯愽善為文辭甚重尊之每為報書及賜張晏曰賜賜書常召司馬相如等視草乃遣初安入朝獻所作內篇新出上愛秘之使為離騷賦旦受詔食時上又曰孝文皇后生景帝梁孝王孝王太后少子愛之賞賜不可勝道於是孝王築東苑方三百餘里廣睢陽城七十里大治宮室為複道自宮連屬於平臺三十餘里如淳曰在梁東北離宮所在也得賜天子旌旗從千乘萬騎出稱蹕入言警擬天子招延四方豪傑自山東遊士莫不至又曰梁懷王揖文帝子也文帝愛之異於他子五年壹朝因墮馬死又曰孝景栗姬生河間獻王德孝景二年立脩學好古從民間得善書必為好寫與之留其本加金帛賜以招之繇是四方道術之人不遠千里或有先祖舊書多奉以奏獻王者故得書多與漢朝等脩禮樂被服儒術造次必於儒者武帝時獻王來朝獻雅樂及詔策問三十餘事其對推道術而言得事之中文約而指明又曰江都易王非景帝子吳楚反時非年十五有材氣上書願擊吳景帝賜非將軍印吳已破二歲為江都王治吳故國以軍功賜天子旌旗元光五年匈奴大入漢為賊非上書願擊匈奴上不許又曰孝景程姬生魯恭王餘二年立為淮, SBCK: 桂}
