  - {type: variant, offset: 2976, length: 0, content: '', SBCK: 封安德焉隋書曰楊雄髙祖族子也􅀄封清漳王仁壽􅀄髙祖曰清漳之名未允聲望命職方進地圖上指安德郡以示羣臣曰此號足爲名德相稱於是改封安德王唐書曰紀王愼爲貝州刺史愼少好學長於文吏皇族中與越王貞齊名時人號爲紀越賈􅁩書曰髙皇帝分天下以封有功之臣反者如蝟毛而起髙皇帝以爲不可是故去不義諸侯空其國擇良日立諸子雒陽上東門之外諸子畢王而天下乃安蔡邕獨斷曰漢制皇子封爲王其實諸侯也周末諸侯或稱故以王號加之惣名諸侯王法律家皆曰列侯天子大社以五色土爲壇皇子封爲王者受天子太社之土以所封之方色東方受青南方受赤他以其方色藉}
  - {type: page-break, offset: 2976, content: '', id: KR3k0012_SBCK_151-8a}
  - {type: variant, offset: 2976, length: 0, content: '', WYG: 封安德王隋書曰楊雄髙祖族子也初封淸漳王仁壽初髙祖曰淸漳之名未允聲望命職方進地圖上指安德郡以示羣臣曰此號足為名德相稱於是改封安德王唐書曰紀王慎為真州刺史慎少好學長於文史皇族中與越王貞齊名時人號為紀越賈誼書曰髙皇帝分天下以封有功之臣反者如蝟毛而起髙皇帝以為不可故去不義諸侯空其國擇良日立諸子雒陽上東門之外諸子畢王而天下乃安蔡邕獨斷曰漢制皇子封為王其實諸侯也周末諸侯或稱王故以王號加之總名諸侯法律家皆曰列侯天子大社社以五色土為壇皇子封為王者受天子大社之土以所封之方色受之東方受靑南方受赤他人以其方色藉}
