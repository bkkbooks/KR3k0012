  - {type: variant, offset: 2976, length: 0, content: '', krp: 封安德焉隋書曰楊雄髙祖族子也𥘉封清漳王仁壽𥘉髙祖曰清漳之名未允聲望命職方進地圖上指安德郡以示羣臣曰此號足爲名德相稱於是改封安德王唐書曰紀王愼爲貝州刺史愼少好學長於文吏皇族中與越王貞齊名時人號爲紀越賈誼書曰髙皇帝分天下以封有功之臣反者如蝟毛而起髙皇帝以爲不可是故去不義諸侯空其國擇良日立諸子雒陽上東門之外諸子畢王而天下乃安蔡邕獨斷曰漢制皇子封爲王其實諸侯也周末諸侯或稱故以王號加之惣名諸侯王法律家皆曰列侯天子大社以五色土爲壇皇子封爲王者受天子太社之土以所封之方色東方受青南方受赤他以其方色藉}
