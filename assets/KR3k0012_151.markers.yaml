  - {type: variant, offset: 183, length: 179, content: 畫干營陵侯澤澤大悅之用二百斤金為壽田生已得金假大宅令其子求事呂太后所幸大謁者張卿居數月請張卿酒酣乃屏人說張卿曰太后欲立呂產為王恐大臣不聽今卿最幸大臣所敬何不諷大臣以聞太后太后必喜諸呂已王萬戶侯亦卿有卿大然之乃諷大臣立產呂產為王田生因說張卿曰呂產王也諸大臣未服今營陵侯澤諸劉長為大將軍尚觖音決望今卿言太后裂十縣王之彼得王喜於諸呂益固矣張卿入言太后乃以澤為琅琊王, SBCK: 爲美談}
