  - {type: variant, offset: 10, length: 0, content: '', WYG: 慕聖道而惟乘汗馬擊劒此一夫之用何足貴也或諫彰讀書彰謂左右曰大丈夫一為衞霍將十萬騎馳沙漠驅戎狄立功建號耳何能為博士耶又曰陳思王植字子建年十餘歲讀誦詩論及辭賦數十萬言善屬文太祖常視其文謂植曰汝倩人耳植跪曰言出為論下筆成章願當面試奈何倩人時鄴銅爵臺新成太祖悉將諸子登臺使各為賦植援筆立成可觀太祖甚異之性簡易不治威儀輿馬服飾不尚華麗每進見難問應聲而對特見寵愛蜀志曰魯王永字公壽永憎宦人黄皓皓既信任用事搆永於後主稍疏外永至不得朝見者十餘年吳書曰南陽王和字子孝被譴之長沙行過蕪湖有巢鵲于㠶檣故官僚聞知皆憂慘以為檣非乆安之象或言鵲巢之詩有積行累功以致爵位之言今王至德茂美行當復國儻神靈以此告寤人意乎吳志曰魯王霸字子威和同母弟也和為太子霸為魯王寵愛崇特與和無異殊頃之和霸不睦之聲聞於權耳權禁斷往來假以精學又曰濟王奮字子揚居武昌權薨太傅諸葛恪不欲諸王處江濵兵馬之地徙奮於豫章奮怒不從命又數越法度恪上牋諫曰帝王之尊與天同位是以家天下臣父兄大王宜上惟太伯順父之志中念河間獻王東海王彊恭敬之節下當裁抑驕恣荒亂以為警戒晉書曰安平獻王孚世祖受禪為太宰一門三世同時十人封王二人世子父子位極人臣子孫咸居大官出則旌旗節鉞入則貂蟬衮冕自公族之寵未始有也享年九十然而夙夜滋恭恒有履氷之懼又曰安平王孚武帝以孚明德屬尊當宣化樹敎為羣后作則遂備置官屬焉又以孚内有親戚外有交逰惠下之費而經用不豐奉絹二千疋及元會詔孚輿車上殿帝於阼階迎拜既坐帝親奉觴上壽如家人禮帝每拜孚跪而止之又給以雲母輦靑盖車孚雖見存尊寵不以為榮常有憂色又曰安平獻王孚性通和以貞白自立未嘗有怨於人陳留殷武有名於海内嘗罹罪譴孚往省之遂與同處分食談者稱焉又曰平原王幹字子良宣帝子太始元年封平原王邑萬一千三百户四年給鼔吹駙馬二匹使服侍中之服幹不治國事雖有爵禄若不在身所得俸秩皆露積腐爛齊王為長沙王人所殺幹哭之而哀謂左右曰宗室日衰唯此兒最可而復害之從今殆矣又曰文帝崩齊王攸率禮過哀上以攸至孝毁甚二年五月文明皇太后親臨省攸攸毁瘠塵墨貌不可識太后留攸慰撫旬日還中詔勉攸曰若萬一加以他疾將復如何宜遠慮深思不可專守一意以陷於不孝若復不從往言當遣人監守飲食又曰武帝子乂字仕度封長沙王性果厲有威斷初入洛謂成都王曰天下先帝之業王宜維之時齊王冏已至聞又言者皆憚之又曰成都王穎字章度武帝子拜越騎校尉加散騎常侍形狀美而神明少乃不知書又曰梁孝王彤宣帝子拜大將軍領西域校尉因大會語王銓曰我從兄為尚書令不能啖大臠銓知彤求為尚書令答曰下邳王為令與天下共嚼啖大臠故難公在此獨嚼彤曰長安大臠誰耶銓答盧播是彤曰是吾家吏隱忍之耳鈐曰天下皆王家吏王法可不復行之耶又曰齊王攸好學不倦借人書皆為治䕶時迭有水旱則出租秩加賤以賑國人須豐年乃收入本直太康三年詔齊王攸當出方嶽遂撫其國加都督靑州増封齊南郡備物典䇿軒懸之樂六佾之舞賜黄鉞朝車乗輿之副晉陽春秋曰齊王冏輔政朝士以牛酒郊勞平原王幹獨齎百錢于懷賀之晉中興書曰譙王丞鎮湘州至武昌釋軍備見王敦敦因宴集謂丞曰大王雅素佳士非將御才也丞曰公未盡耳安知鉛刀不能一割丞以敦欲測其情故發此言敦果謂錢鳯曰彼不知懼而學壯語此之不武何能為聽丞之鎮又曰武陵威王晞為桓温所收被廢卒於新安晞少子忠敬王遵初封新寧王年十二受拜流涕哀感左右將軍桓伊嘗造遵遵怒門人曰何通桓氏門人曰桓伊與桓温疎宗相見無嫌遵曰我聞人姓木邊便欲殺之况諸桓乎由是少稱聰察及長輒凢退無復名望晉}
