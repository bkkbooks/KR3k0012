  - {type: variant, offset: 1294, length: 185, content: 敢復壞於其壁中得古文經傳又曰孝景賈夫人生中山靖王勝建元三年來朝天子置酒勝聞樂聲而泣帝問其故勝對曰臣聞悲者不可為累欷思者不可為歎息故高漸離擊筑易水上荊軻為之泣而不食雍門子壹微吟孟嘗君為之於邑今臣之心結日久每聞窈眇之聲不知涕泣之橫集也夫眾煦漂山應劭曰煦吹煦聚蚊成雷朋黨執虎十夫橈椎臣身遠與寡莫為之先眾口鑠金積毀銷骨聚輕折軸羽翮飛肉今臣雍閼不得竊自悲也臣聞杜鼷不懽屋鼠不燻何則, SBCK: 爲諸兄}
