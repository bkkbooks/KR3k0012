  - {type: variant, offset: 3001, length: 412, content: 曰沛獻王輔矜嚴有法度好經書善說京氏易孝經世號之曰沛王通論在國謹節終始如一稱為賢王顯宗敬重數賞賜焉又曰琅琊孝王京建武十七年追爵為王京性恭孝好經學顯宗尤愛幸賞賜恩寵殊異莫以為比光烈皇后崩帝悉以太后遺金財寶賜京京都莒好治宮室窮極伎巧皆飾以金銀上詩賦頌德帝嘉美下之史官又曰樂成靖王黨永平十五年封樂成王黨聰慧善史書如正文字與肅宗同年尤相親愛又曰清河王慶為太子竇后諷有司奏廢慶慶時雖幼而知避嫌畏禍言不敢及宗氏帝更憐之勑皇后令衣服與太子齊等慶小心恭孝自以廢黜尤異事慎法每朝謁陵廟常夜分嚴裝衣冠待明約勑官屬不得與諸王車馳常以貴又葬禮有闕每竊感恨至四節臘輒祭於私寢竇氏誅後始使乳母於城北遙祠及竇太后崩慶求上冢致哀帝許之詔大官四時給祭慶垂涕曰生雖不獲供養終得奉祭祀私願足矣又曰李爕字德公靈帝時拜安平相先是時安平王續為張角賊所略國家贖王還欲復其國爕奏曰續在國無守蕃政不稱損辱聖朝不宜復國續竟歸蕃爕以謗毀宗室輪作佐校未滿歲王果坐不道被誅乃貴爕為議又, krp: ''}
