  - {type: variant, offset: 1337, length: 2, content: 管類, SBCK: 王大將軍年少時舊有田舎之名語音亦楚武帝喚時賢共言􅇊藝之事人人皆有所能唯王都無所解意色殊惡自言解打皷帝即令取皷令擊之於坐振䄂而起揚槌奮擊音節諧捷傍􅀂無人舉坐歎其雄爽春秋孔演圖曰有人金豊擊玉皷駕六龍皷喻所行清嚴人服其威勢}
