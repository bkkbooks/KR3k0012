  - {type: variant, offset: 1319, length: 2, content: 吹黃, SBCK: 皷用馬革圎徑八尺一寸夏至皷用牛皮圎徑五尺七寸尚書曰周成王崩鼖皷在西方長八尺尚書益稷曰下管鞀皷禮記曰廟堂之上罍樽在阼犧樽在西廟堂之下懸皷在西應皷在東又曰懸皷周皷也其小者曰㣧先擊小皷爲大皷導引故曰㣧一名鞞又曰春官小師掌教皷朦播鞀眡瞭播鞀又曰王執路侯執鼖將軍執晉皷師帥執提旅師執􅎏又曰夏后尺皷殷人置皷置植也亦作樹周人皷懸又曰籥章氏掌出土皷杜子春曰以毛土爲匡以革爲面可擊者也又曰除水蟲以炮􅁟之皷皷之以焚石投之狐蜮之属也又曰地官皷人掌教六皷四金之音聲以節聲樂以和軍旅以正田役音五聲合和者也教爲皷而辯其聲用教爲皷皷擊皷者大小之數又别其聲所用事以雷皷皷神祀雷皷八面皷神祀皷天神以靈皷皷社􅀕靈皷六面皷社􅀕及地祗以路皷皷􅀑享路皷四面皷􅀑享享宗廟以鼖皷皷軍事大皷謂之鼖長八尺鼖音扶云切以鼛皷皷役事鼛皷長丈二尺鼛音古刀切以晉皷皷金奏晉皷長六尺六寸者是也金奏謂樂作擊編}
