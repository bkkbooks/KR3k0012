  - {type: variant, offset: 56, length: 259, content: 博雅曰簫大者二十三管無底小者十六管有底通禮義纂曰伏犧作簫十六管蔡邕曰簫編竹有底大者二十三管小者十六管長則濁短則清以密蠟實其底而增減之則和然則邕時無洞聲者矣易說曰夏至之樂補以簫簫長四寸鄭玄曰簫亦管形似鳥翼鳥火禽也火數七夏時火用事二七十四簫之長由此也三禮圖曰雅簫長尺四寸二寸四彄頌簫二寸十六彄仲夏之月令樂師均管簫簫長則濁短則清以密蠟實其底而增減之則和管成而音定無所復調當與琴瑟相參風俗通曰舜作簫其形參差象鳳翼十管長尺二寸白虎通曰簫者中呂之氣也尚書益稷曰簫韶九成鳳凰來儀毛詩臣工有瞽曰既備乃奏簫管備舉春秋說曰夏至作樂聞以簫笙, SBCK: ''}
