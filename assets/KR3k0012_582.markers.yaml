  - {type: variant, offset: 1451, length: 0, content: '', SBCK: 以雄朔野而有之矣鳴笳以和簫聲非八音也騷人曰鳴箎笳竽皷吹樓車也昔蕭史吹簫於􅁗􅁗人爲之築鳯臺故皷吹陸則樓車水則樓舡其在庭也則以虡爲樓或曰鷺皷精也昔呉夫差啓虵門以厭越越人雷爲門以禳之擊大皷於雷門之下而虵門聞焉其後移皷建康宮之端門有􅀟鷺呪皷而飛乎雲末或曰皆非也詩曰振振鷺鷺于飛皷咽咽醉言歸古之君子仕於伶官悲周道之爲榛傷頌之棳音故飾皷以鷺欲其流風好焉今有龍頭大抗中皷獨掲小皷隨品秩焉短簫鐃歌軍樂也帝歧伯所作以建}
  - {type: variant, offset: 1451, length: 0, content: '', WYG: 以雄朔野而有之矣鳴笳以和簫聲非八音也騷人曰鳴箎笳竽皷吹樓車也昔簫史吹簫於秦秦人為之築鳳䑓皷吹故陸則樓車水則樓船其在庭也則以簴為樓或曰鷺皷精也昔呉夫差啟蛇門以厭越越人為雷門以禳之擊大皷於雷門之下而蛇門聞焉其后移皷逹康宫之端門有雙鷺呢皷而飛乎雲末或曰皆非也詩曰振振鷺鷺于飛皷咽咽醉言歸古之君子仕於伶官悲周道之榛榛傷頌之掇音故飾皷以鷺欲其流風好焉今有龍頭大執中皷蜀掲小皷隨品秩焉短簫鐃歌軍樂也帝岐伯所作以建}
