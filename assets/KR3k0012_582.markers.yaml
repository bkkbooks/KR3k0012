  - {type: variant, offset: 1457, length: 3, content: 竽笙三, SBCK: 桴調擊皷物也在邊徼曰警皷又曰銅皷鑄銅爲之虚其一面覆而擊其上南蠻扶南天笁􅀋皆如此嶺南豪家則有之大者廣尺餘又曰節皷如􅀶局中開圎孔適容其皷擊之以節樂也又曰毛貟皷似都曇而稍大又曰有鼉皷節皷不知誰所造又曰檐皷如小甕先冐以革而􅃮之又曰羯皷正如􅃮桶兩手俱擊以其出羯中故號羯皷亦謂兩杖皷板又曰正皷和皷一以正而一以和皆􅆎皷也又曰都曇皷似􅆎皷而小以小槌擊之又曰荅臘皷制廣於羯皷而皷以指揩之其聲甚震俗謂之揩皷又曰鷄婁皷正而貟首尾可擊之處平可數寸又曰方皷大暦元年司馬滔進廣平樂兼此皷以應黄鍾一均聲樂書曰雷鞉者周禮􅎩矇掌播鞉鞉如皷而小以木貫之作柄柄各四枚爲八面也旁以結皮爲耳揺之還自擊禮書云掌之人左手播鞉右手擊皷之是也柷敔釋名曰柷如物始見柷柷然也敔止也所以止樂尚書夔曰戞擊鳴球下管鼗皷合止柷敔孔安國曰戞擊柷敔也下管堂下樂也上下合心樂名有柷敔也禮記德音之音控掲天子賜諸侯樂則以柷將之樂記曰聖人作控掲壎箎則所起矣柷衆也立夏之音萬物衆形皆成也方面各二尺傍開貟孔内手於孔擊之以舉衆樂也爾雅曰所以皷柷謂之止所以皷敔謂之甄郭璞注曰柷如漆筩方二尺四寸深尺八寸中有椎柄連底折之令左右擊止者其椎名也敔如伏虎皆上有二}
