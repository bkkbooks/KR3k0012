  - {type: variant, offset: 1340, length: 2, content: 竹為, krp: 古今注曰漢有黄門皷吹一名樓車帝王丗紀曰黄帝殺夔以其皮爲皷聲聞五百後秦記曰姚泓永和元年天水兾石皷鳴聞數百里野雉皆雊神異經曰八方}
  - {type: variant, offset: 1343, length: 0, content: '', SBCK: 荒有石皷焉蒙之以皮其音如雷韓子曰楚厲王有驚皷與百姓爲戒飲酒過之而擊民大驚使人止之曰吾醉戯而擊之民皆罷居數月警而擊皷民不起也穆天子傳曰天子讀書于梨丘奏廣樂遺其靈皷虞喜志林曰建武二十四年南郡男子獻銅皷有銘五經要義曰皷所以檢樂爲群音之長也異苑曰晉武帝時呉郡臨平岸崩出一石皷打之無聲問張華華曰可取蜀人桐材刻作魚}
  - {type: variant, offset: 1343, length: 0, content: '', WYG: 聚歛而附益之子曰非吾徒也小子鳴鼓而攻之可也漢書曰李陵擊匈奴夜擊皷皷不鳴陵曰吾士氣少衰而皷不起何耶軍中豈有女子乎捜軍中得卒妻皆斬之又曰元帝疾不親政事留好音樂或置鼙殿下天子自軒檻上隤銅丸以撾皷聲中嚴皷之莭後宫及左右習知音者莫能為之後漢書曰王喬為葉令毎當朝鄴門下皷不擊自鳴聞於京昭帝取置于都亭無復有聲又曰禰衡字正平孔融雅愛其才數稱賞於曹操操欲見之衡不肯往操懐忿而以其才不欲殺之聞衡善鼓召為鼓吏因㑹賓客閲其音莭諸吏過者皆令脫其故衣更著岑牟單絞之服次至衡方操撾蹀􅗿而前吏呵之曰鼓吏何不改服而輕進衡於是解袒衣次則釋餘服裸身而立徐取岑牟單絞而著之復操撾顔色不怍操笑曰本欲辱衡衡反辱孤衡對曰不敢以先王之法服為伶倫之衣沈約宋書曰蕭思話年十許嵗好竒屋棟打細腰皷也南史曰孫挹為延陵縣令國子助教髙爽詣之挹了無故人懐爽出從閤下過取筆書皷面云徒有此大腹了自無肝腸面皮如許厚被打未遽尖唐書曰張𤣥素太子承乾又甞於宫中擊皷聲聞於外𤣥素叩閤請見極言切諌承乾乃出宫内鼓對𤣥素毁之唐書曰鄭餘慶兼判太常卿事初徳宗自山南遷宫闕輒有懐光吐蕃之虞都下驚擾遂詔太常習樂去大皷至是餘慶始奏復用大皷世説曰王大将軍年少時舊有田舍之名語音亦楚武帝唤時賢共言伎藝之事人人皆有所能唯王都無所能意色殊惡自言解打鼓帝即令取鼓擊之於坐振袖而起揚搥奮擊音莭清徤旁若無人舉坐歎其雄爽春秋孔演圖曰有人金豐擊玉皷駕六龍鼔喻所行清嚴人服其威勢也古今注曰漢有黄門鼓吹一名樓車帝王世紀曰黄帝殺䕫以其皮為鼓聲聞五百里後秦記曰姚泓永和元年天水兾石皷鳴數百里野雉皆雊神異經曰分荒之流有石皷焉蒙之以皮其音如雷韓子曰楚厲王有驚皷與百姓為戒飲酒過之而擊百姓大驚使人止之曰君醉戯而擊之民皆罷居數月驚而擊皷民不起也穆天子傳曰天子讀書于梨丘奏廣樂遺其簴皷虞喜志林曰建武二十四年南郡男子獻銅皷有銘五經要義曰皷所以檢樂為羣音之長也異苑曰晉武帝時呉郡臨平岸崩出一石皷打之無聲張華曰可取蜀人桐木刻作魚}
