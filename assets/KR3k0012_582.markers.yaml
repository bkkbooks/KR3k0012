  - {type: variant, offset: 1452, length: 4, content: 帝時丘仲, SBCK: 揚德風韶勸土地古今樂録曰鏄師掌金奏之皷謂主擊晉皷以奏其鍾鎛又卒長執鐃奴交切兩司馬執鐸公司馬執鐲音蜀又金鐃止皷以金鐸通皷以金鐲節皷以鍾皷者前擊鍾次擊皷也大周正樂曰劉貺曰皷動也冬至之音萬物含陽氣而動雷皷八面以祀天靈皷六面以祀地路皷四面以祀􅀑神夏后加之以足謂之足皷殷人貫之以柱謂之柱皷周人懸之謂之懸皷後世復殷制建之謂之建皷皷髙六尺六寸金奏則皷之傍有小皷謂之應皷以和大皷小皷有柄曰鞉揺以和皷大曰􅎏也􅆎皷大者瓦小者木皆廣首而纎腹齊皷如􅃮桶大一頭設齊於皷面如麝齊故曰齊皷又曰馬上之皷曰提皷有木可提執施於朝則登聞之皷敢諌之皷是也施於府寺曰朝皷在村墅曰枹皷抱一}
