  - {type: variant, offset: 1327, length: 2, content: 竽竽, WYG: 節樂以聲和軍旅以正田役音五聲合和者也教為鼓而辨其聲用教為鼓擊鼓者大小之數又别其聲以用事以雷鼓鼓神祀雷鼔八面鼓神祀天神以靈鼓鼓社祭靈鼓六面鼓社祭及地祗以露鼓鼓鬼享露鼓四面鼓鬼享祀宗廟以鼖鼓鼓軍事大鼔謂之鼖}
