  - {type: variant, offset: 1319, length: 3, content: 吹黃鍾, WYG: 皷用馬革圍徑八尺一寸夏至皷用牛皮圍徑五尺三寸尚書曰周成王崩鼖皷在西房長八尺尚書益稷曰下管鞉皷禮記曰廟堂}
  - {type: variant, offset: 1319, length: 2, content: 吹黃, krp: 皷用馬革圎徑八尺一寸夏至皷用牛皮圎徑五尺七寸尚書曰周成王崩鼖皷在西方長八尺尚書益稷曰下管鞀皷禮記曰廟堂之上罍樽在阼犧樽在西廟堂之下懸皷在西應皷在東又曰懸皷周皷也其小者曰㣧先擊小皷爲大皷導引故曰㣧一名鞞又曰春官小師掌教皷朦播鞀眡瞭播鞀又曰王執路侯執鼖將軍執晉皷師帥執提旅師執􅎏又曰夏后尺皷殷人置皷置植也亦作樹周人皷懸又曰籥章氏掌出土皷杜子春曰以毛土爲匡以革爲面可擊者也又曰除水蟲以炮土之皷皷之以焚石投之狐蜮之属也又曰地官皷人掌教六皷四金之音聲以節聲樂以和軍旅以正田役音五聲合和者也教爲皷而辯其聲用教爲皷皷擊皷者大小之數又别其聲所用事以雷皷皷神祀雷皷八面皷神祀皷天神以靈皷皷社祭靈皷六面皷社祭及地祗以路皷皷鬼享路皷四面皷鬼享享宗廟以鼖皷皷軍事大皷謂之鼖長八尺鼖音扶云切以鼛皷皷役事鼛皷長丈二尺鼛音古刀切以晉皷皷金奏晉皷長六尺六寸者是也金奏謂樂作擊編}
  - {type: variant, offset: 1322, length: 0, content: '', SBCK: 又冬官考工記韗人爲臯陶鄭司農曰臯陶皷木鄭玄謂鞠者以臯陶名官陶從革耳韗音况萬切又音運􅕦音陶長六尺有六寸左右端廣六寸中尺厚三寸板中廣頭挾爲穹崇鄭衆云皷木一判者其兩端廣六寸而中央廣尺如此乃得有腹矣穹者三}
  - {type: variant, offset: 1322, length: 0, content: '', krp: 又冬官考工記韗人爲臯陶鄭司農曰臯陶皷木鄭玄謂鞠者以臯陶名官陶從革耳韗音况萬切又音運􅕦音陶長六尺有六寸左右端廣六寸中尺厚三寸板中廣頭挾爲穹崇鄭衆云皷木一判者其兩端廣六寸而中央廣尺如此乃得有腹矣穹者三}
  - {type: variant, offset: 1323, length: 7, content: 律間音以竽竽長, SBCK: 一鄭衆云穹讀爲志無穹耶之穹謂皷木腹穹崇者居皷面三之一玄讀如穹蒼之穹穹崇者居皷面三之一則其皷}
  - {type: variant, offset: 1323, length: 2, content: 律間, WYG: 上罍樽在阼犧樽在西廟堂之下懸皷在西應皷在東又曰懸皷周皷也其小者曰𦙍先擊小皷為大皷導引故曰𦙍一名鞞又曰春官小師掌敎皷瞽矇掌播鼗眡瞭掌播鼗又曰王執路侯執鼖将軍執晉皷師帥執提旅帥執鼙又曰夏后足皷殷人置皷置植也亦作樹周人懸皷又曰籥章氏掌出土皷杜子春日以毛土為底以革為面可以擊者也又曰除水蟲以炮土之皷鼓之以焚石投之狐蜮之屬也又曰地官鼓人掌教六鼓四}
