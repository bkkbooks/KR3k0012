  - {type: variant, offset: 1789, length: 4, content: 巧言如簧, SBCK: 設業設簴崇牙樹羽周禮冬官梓人爲筍簴嬴者羽者鮮者以爲筍簴外骨内骨却行仄行紆行連行以脰鳴以翼鳴以爲雕􅅣厚唇弇口出目短耳大胷耀後者以爲鍾簴銳喙决吻小體騫腹者以爲磬簴小首而長􅅮身而鴻者以爲筍注曰爲鍾簴者有力而不走冝於任重也爲磬簴者其聲清楊冝逺聞也外骨􅀛内骨鼈却行螾仄行蟹紆行虵連行魚脰鳴鼃黽翼鳴發皇也螾蚰蜒皆以刻晝彞器􅅮庶物貴野聲禮明堂位曰夏后氏之龍簨簨殷之崇牙周之壁翣注云龍上刻􅀞爲重才}
  - {type: variant, offset: 1789, length: 5, content: 巧言如簧又, WYG: 設業設簴崇牙樹羽周禮冬官梓人為筍簴臝者羽者鱗者以為筍簴也外骨内骨却行仄行紆行連行以脰鳴以翼鳴以為雕琢厚唇弇口出目短耳大胸耀后者以為鐘簴銳喙决吻小體騫腹者以為磬簴小首而長摶身而鴻者以為筍注}
