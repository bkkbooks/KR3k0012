  - {type: variant, offset: 1746, length: 2, content: 韓昭, WYG: 掌之人左手播鞉右手擊皷者是也柷敔釋名曰柷如物始見柷柷然也敔止也所以止樂尚書䕫曰戛擊鳴球下管鼗皷合止柷敔孔安國曰戛擊柷敔也下管掌下樂也上下合心樂各有柷敔也禮記徳音之音控掲天子賜諸}
  - {type: variant, offset: 1749, length: 2, content: 田巖, WYG: 樂則以柷将之樂記曰聖人作控掲壎箎則所起矣柷衆也立夏之音萬物衆形皆成也方面各二尺旁開員孔内手於孔擊之以舉衆樂也爾雅曰所以皷柷謂之止所以皷敔謂之甄郭璞注曰柷如漆桶方二尺四寸深尺八寸中有椎柄連底挏之令左右擊止者其椎名也敔如伏虎背上有二十七鉏鋙刻以木長尺甄者其名也樂記圖曰乾主立冬隂陽終始故聖人象天以制柷形法}
