  - {type: variant, offset: 1336, length: 0, content: '', SBCK: 素叩閤請見極言切諌承乾乃出宫内皷對玄素毀之唐書鄭餘慶兼判太常卿事􅀄德宗自山南還宫􅀜輔有懷光吐蕃之虞都下驚擾遂詔太常習樂去大皷至是餘慶始奏復用大皷丗夲}
