  - {type: variant, offset: 1450, length: 0, content: '', SBCK: 建皷大皷也少昊氏作焉爲衆樂之節夏加四足謂之節皷啇人挂而貫之謂之􅄹皷周人縣而擊之謂之懸皷近代相承植而建之謂之建皷夲出於啇制也唐禮設於四隅劉瓛定軍禮曰皷吹未知其始也}
