  - {type: variant, offset: 1468, length: 3, content: 將竽形, WYG: 鎛師掌金奏之皷又卒長執鐃兩司馬執鐸公司馬執鐲以金鐃止皷以金鐸通皷以金鐲莭皷以鐘皷者前擊鐘後擊皷也大周樂正曰劉貺曰皷動也冬至之音萬物合陽氣而動雷皷八面以祀天靈皷六面以祀地路皷四面以祀鬼神夏后加以足謂之足皷殷人以柱貫之謂之建皷髙六尺六寸金奏則皷之旁有小傍皷謂之應皷以和大皷小皷有柄曰鞉揺以和皷大皷鼙也腰皷大者瓦小者木皆廣首而纎腹齊皷如漆桶大一頭設齊于皷面如麝齊故曰齊皷又曰馬上之皷曰提皷有木可提執施於朝則登聞之皷敢諌之皷是也施於府寺曰朝皷在村墅曰枹皷枹一作桴調擊皷物也在邊徼曰警皷又鼓鑄銅為之虛其一面覆而擊其上南蠻其南天竺}
