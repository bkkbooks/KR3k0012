  - {type: variant, offset: 316, length: 996, content: 禮春官小笙師曰小笙師掌吹簫史記曰五子胥鼓腹吹簫乞食於吳市也又曰周勃吹簫給喪事謝承後漢書曰靈帝善鼓琴吹洞簫丹陽記曰江寧縣南三十里有慈姥山積石臨江生簫管竹王褒洞簫賦所稱即此也其竹圓緻異於眾處自伶倫採竹嶰谷其後唯此簳見珍故歷代掌給樂府而俗呼曰鼓吹涼州記曰呂纂咸寧二年有盜發張駿墓得白玉罇玉笛紫玉簫列仙傳曰簫史者秦繆公時人善吹簫能致孔雀白鶴繆公女弄玉好之以妻焉其後隨鳳去故秦人作鳳女祠於雍宮代有簫聲江表傳曰孫權攻合肥不下而還休兵皆上道權與呂蒙等在後魏將張遼奄至鼓吹驚怖不能復鳴簫唱甘寧援刀欲斫之於是始作之莊子曰南郭子綦謂顏成子遊曰汝閒人籟曰而未聞地籟汝聞天籟郭象曰天籟簫也秦子曰一人執規十手自負一人吹簫長短皆應傳子曰馬先生能使木人吹簫比妙般輸墨翟不劣古矣笳杜贄笳賦序曰昔伯陽避亂入戎戎越之思有懷土風遂建斯樂美其出於戎貉之俗有大韶夏之音曹嘉之晉書曰劉疇曾避亂塢壁賈胡百數欲害之疇無懼色援笳而吹之為出塞入塞之聲動其遊客之思於是群胡皆泣而去蔡琰別傳曰琰字文姬先適河東衛仲道夫亡無子歸寧于家漢末大亂為胡騎所獲在左賢王部伍中春月登胡殿感笳之音晉先蚕儀注曰車駕住吹小菰發大菰即笳也又曰胡笳漢舊錄有其曲不記所出本末笳者胡人卷蘆葉吹之以作樂也故謂曰胡笳夏仲御別傳曰激南楚吹胡笳風雲為之搖動星辰為之變度世說曰劉越石為胡騎所圍數重城中窘迫無計越石始乘月登樓清嘯胡賊聞之皆悽然長嘆中夜奏胡笳賊皆流涕人有懷土之切向曉又吹之賊並棄圍奔走笙釋名曰笙生也象物管地而生以匏為之其中空以受簧爾雅曰大笙謂之巢小者謂之和郭璞曰大笙列管匏中施簧也管端大者十九簧小音十三簧犍為舍人曰大笙音聲眾而高也小者音相和也白虎通曰笙之言施也牙也萬物始施而牙笙者太簇之氣也象萬物之生也故曰笙有七正之節焉有六合之和焉天下樂之故謂之笙古之善吹笙者有王子晉見列仙傳周靈王之太子也毛詩鹿鳴曰我有嘉賓鼓瑟吹笙吹笙鼓簧承筐是將尚書益稷曰笙鏞以間鳥獸蹌蹌孔安國曰間迭也吹笙擊鍾鳥獸仰德相率而舞蹌蹌然也禮記檀弓上曰孔子既祥五日彈琴而不成聲十日而成笙歌五日彈十日笙歌除曲外也琴以手笙歌以氣也又曰女媧之笙簧周禮曰春官笙師掌教吹笙鄉飲酒曰笙入奏南陔白華邯鄲綽五經折疑曰夫笙者法萬物始生導達陰陽之氣故有長短黃鍾為始象法鳳凰蔡邕月令章句曰季秋之月上丁入學習吹笙所以通氣也管簫笙竽塤箎皆以吹鳴者也穆天子傳曰西王母吟月吹笙鼓簧簧在笙中衷心翔翔民之子惟天之望呂氏春秋曰墨子見荊王衣錦吹笙竽, SBCK: ''}
