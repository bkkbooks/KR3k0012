  - {type: variant, offset: 1334, length: 0, content: '', SBCK: 不􅀌曲也此數兩以六皷差之賈侍中云晉皷大而短近晉皷也以晉皷鼓金奏也皷長八尺皷四尺中圍加三之一謂之鼖皷中圍加三之一者加於面之圍以三分一也面四尺其圍十二尺加以三分一四又則中圍十六尺徑五尺三寸三分寸之一今皷亦合二十扳則板徴穹六寸三分寸之二爾雅云皷謂之鼖皷以鼖皷皷軍事}
  - {type: variant, offset: 1334, length: 0, content: '', WYG: 不弧曲也此皷兩以六皷差之賈侍中云晉皷大而短近晉皷也以晉皷鼓金奏也皷長八尺面四尺中圍加三之一謂之鼖皷中圍加三之一者加於面之圍以三分一也面四尺其圍十二尺加以三分有四尺則中圍十六尺徑五尺三寸三分寸之一今皷一合二十板則板微穹六寸三分寸之二爾雅云大皷謂之鼖以鼖皷鼓軍事}
  - {type: variant, offset: 1334, length: 0, content: '', krp: 不孤曲也此數兩以六皷差之賈侍中云晉皷大而短近晉皷也以晉皷鼓金奏也皷長八尺皷四尺中圍加三之一謂之鼖皷中圍加三之一者加於面之圍以三分一也面四尺其圍十二尺加以三分一四又則中圍十六尺徑五尺三寸三分寸之一今皷亦合二十扳則板徴穹六寸三分寸之二爾雅云皷謂之鼖皷以鼖皷皷軍事}
  - {type: variant, offset: 1335, length: 0, content: '', SBCK: 衆云皷四尺謂革所象者廣四尺也爲臯陶長尋有四尺皷四尺倨勾磬折以臯皷皷役事磬折中曲之不參正中圍與鼖皷同以磬折爲異也凢冐皷必以啓蟄之日啓蟄孟春之中蟄蟲始聞雷聲而動皷所以取象爲象皷以革者也良皷瑕如積環革調急也皷大而短則其聲疾而短聞音問下同小而長則其聲舒而逺聞禮記明堂位曰土皷蕢桴葦籥伊􅂄氏之樂也蕢當爲㓙伊􅂄古天子號令有􅂄氏也左傳成上曰師之耳目在吾旗皷又僖中曰三軍以利用也金皷以聲氣也又昭三曰分唐叔以宻湏之皷注宻湏國名也毛詩曰鄁風擊皷其鏜踊躍用兵又采􅉮曰方叔率止鉦人伐皷陳師鞫旅顯允方叔伐皷淵淵振旅闐闐又靈臺曰鼉皷蓬蓬矇瞍奏公又執競曰鍾皷喤喤磬筦將將又山有樞曰子有鍾皷不擊不考宛其死矣他人是保又有􅎩曰有􅎩有􅎩在周之廷設業設簴崇牙樹羽應田懸皷又曰猗歟歟置我鞉皷奏皷簡簡衎我烈祖又甫田曰琴瑟擊皷以御田祖又有駜曰振振鷺鷺于飛皷咽咽醉言歸又宛丘曰坎其擊皷宛丘之下論語曰季氏冨於周公而求也爲之聚歛而附益之子曰非吾徒也小子鳴皷而攻之可也漢書曰李陵擊匈奴夜擊皷起士皷不鳴陵曰吾士氣少衰而皷不起何􅁘軍中豈有女子乎捜軍中得卒妻皆斬之又曰元帝疾不親政事留好音樂或置􅎏殿下天子自軒檻上隤銅丸以撾皷聲中嚴皷之節後宫及左右習知音者莫能爲之後漢書曰王喬爲葉令每當朝鄴門下皷不擊自鳴聞於京昭帝取置其都亭無復有聲又曰祢衡字正平孔融雅愛其才數稱賞於曹操操欲見之衡不肯徃操懷忿而以其才不欲殺之聞衡善皷召爲皷吏因㑹賔客閱試音節諸吏過者皆令脫其故衣更着岑牟單絞之服次至衡方操撾踊躍而前吏呵之曰皷吏何不改服而輕進衡於是先解褒衣次釋餘服祼身而立徐取岑牟單絞而着之復操撾顔色不怍操􅀏曰夲欲辱衡衡反辱􅀌衡對曰不敢以先王之法服爲伶倫之衣沈約宋書曰蕭思話年十許歳好􅀐屋棟打細􅆎皷也南史曰孫挹爲延陵縣令國子助教髙爽詣之挹了無故人懷爽出從閤下過取筆書皷面云徒有此大腹了自無肝膓面皮如許厚􅀍打未遽央唐書曰張􅀇素太子承乾又甞於宫中擊皷聲聞於外}
