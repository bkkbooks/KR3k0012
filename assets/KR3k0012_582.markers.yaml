  - {type: variant, offset: 1330, length: 0, content: '', WYG: 八尺鼖音扶云以鼛鼓鼓役事鼛鼔長丈二尺鼛音古刀切以晉鼓鼓金奏晉鼓長六尺六寸者是也金奏為樂作擊編鐘又冬官考工記韗人為皋陶鄭司農曰皋陶鼓木鄭𤣥謂􅕦者以皋陶名官陶從革耳韗音况萬切又音運􅕦音陶長六尺有六寸左右端廣六寸中尺厚三寸板中廣頭狹為穹崇鄭衆云皷木一判者其兩頭廣六寸中央之廣尺如此乃得有腹矣穹者三之一鄭衆云穹讀為志無穹也之穹為皷木腹穹崇者居皷面三之一又讀如穹蒼之穹穹崇者居皷面三之一則其皷}
