  - {type: variant, offset: 26, length: 0, content: '', SBCK: 爲髙昌郡張􅁤吕光沮渠􅂪遜據河西皆置太守以統之又曰其國有八城地多磧石氣􅀱温暖厥土良沃􅂖麥一歳再熟冝蠶多五菓有草名羊刺其上生密而味佳出赤塩其味羙復有白塩其形如玉髙昌人取以爲枕貢之中國又曰後魏文成帝和}
