  - {type: variant, offset: 4436, length: 2, content: 宋雲, WYG: 使朝貢獻詔曰卿地隔關山境接荒漠頻請朝援徒國内遷雖來誠可嘉扵理未協何者彼之甿庶是漢魏遺黎自晋氏不綱因難播越成家立國積之已久惡徙重遷人懷戀舊今若動之恐異同之變爰在肘腋不得便如來表也又曰後魏孝明正光元年遣使奉表自以邊遐不習典誥求借五經諸史并請國子助教劉燮以為博士明帝許之又曰其國至隋時城周廻一千八百四十歩於坐室畫魯哀公問政扵孔子之像又曰服飾丈夫從羌俗婦人裙􅃭頭上作髻文字亦同華夏兼用左書有毛詩論語孝經置學官弟子以相教授雖習讀之而皆為譯語賦税則計田輸銀錢無者輸布又曰隋大業四年遣使貢獻帝待其使甚厚明年伯雅來朝伯雅髙昌國王名也因從擊髙麗還尚宗室女華容公主八年冬歸蕃下令國中曰先者以國邊荒境被髮左袵今大隋統御宇宙平一孤既沭浴和風庶均大化其庶人以上皆宜改服易制帝聞而善之下詔曰光禄大夫弁國公髙昌王伯雅本自諸華世阼西壤昔因多難剪為異服自我皇隋平一宇宙伯雅踰重阻奉貢來庭削袵曳裾懐音從夏可賜衣冠仍頒製造之式唐書曰髙昌有草名白疊其實類蠒國人採之織以爲布又曰武徳七年其王文㤗又獻狗雌雄各一髙六寸長尺餘性甚慧云本出拂菻國中國有拂菻自此始也又曰太宗嗣位復貢𤣥狐裘因賜其妻宇文氏花䥖一具宇文氏復貢玉盤也又曰貞觀四年冬宇文氏請預宗親詔賜姓李氏封長樂公主書慰諭之又曰貞觀十三年文㤗稱疾不朝太宗命侯君集為交河道大總管率左屯衛大將軍薛萬均及突厥契苾之衆歩騎數萬衆以擊之攻拔其城虜男女七千餘口文泰惶懼病死子智盛嗣立出城降君集先是其國童謡云髙昌兵馬如霜雪漢家兵馬如日月日月照霜雪廽首自消滅文㤗使人捕其初唱者不能得君集尋遣使告㨗太宗大悦宴百寮班賜各有差曲赦髙昌部内欲以髙昌為州縣特進魏徴諫以爲不便太宗不從遂以其地置西州又置安西都䕶府以鎮之吐谷渾後魏書曰吐谷渾慕容氏者本遼東鮮卑徒河涉歸有二子長曰吐谷渾少曰若洛廆涉歸死若洛廆代統部落别為慕容氏渾與洛廆二部馬鬭相傷洛廆怒謂渾曰何不分部令相逺渾曰馬是畜耳而何怒及求别甚易今當去汝萬里之外廆悔謝留之渾曰先公之世卜筮云有二子享福並流子孫我是卑庶理無並大今以馬致隔天所啟也試驅馬令東若還我當隨去即命擁馬背悲鳴西走遂西渡臨止扵甘松之南廆追悔之作吐谷渾阿于歌徒何以兄為阿于也遂依水草廬帳而居以肉駱為糧渾死其後以吐谷渾為氏又曰豺立自號}
