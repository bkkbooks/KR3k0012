  - {type: variant, offset: 336, length: 0, content: '', WYG: 身張解設難但計所費不圖其安宜開聖徳考行所長書奏帝乃復三郡使謁者郭璜督徙者各歸舊縣繕城郭置坼堠而激河浚渠為屯田省内郡費嵗一億計遂令安定北地上郡及隴西金城常儲糓粟令周}
