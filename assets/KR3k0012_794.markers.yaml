  - {type: variant, offset: 163, length: 1, content: 條, WYG: 羗無戈爰劒者秦厲公時為秦所拘執以爲奴不知爰劒何戎之别也後得亡歸而秦人追之急藏扵岩宂中得免羗人云爰劒初藏宂中秦人焚之有影象如虎為其蔽火得以免死既出又與劓女遇扵野遂成夫婦女耻其状被髪覆面羗人因以為俗遂俱亡入三河間諸羗見爰劒被焚不死恠其神共畏事之推以爲豪河湟間少五榖多禽獸以射獵為事爰劒教之田畜遂見尊信廬落種人依之者益衆羗人謂奴為無戈爰劒嘗為奴𨽻故因名之其後世為豪也又曰爰劒曾孫忍時秦獻公初立欲復穆公之迹兵師臨渭首滅狄伐戎忍季文卬畏秦之威將其種人部落南出賜}
