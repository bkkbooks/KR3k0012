  - {type: variant, offset: 1158, length: 307, content: 恒故地然自漢以來相承不絕其本姓溫月氏人也舊居祁連山北昭武城因被匈奴所破西踰葱嶺遂有其國支庶各分王故康國左右諸國並以昭武為姓示不忘本也王字代失畢為人寬厚甚得眾心其妻突厥達可汗女也都於薩寶水上阿祿連城城多眾居大臣三人共掌國事其王索髮冠七寶金花衣綾羅錦繡白疊其妻有髻幪以帛巾丈夫剪髮錦袍名為強國而西域諸國多歸之又曰有胡律置於祅祠決罰則取而斷之重罪者族次重者死賊盜截足人皆深目高鼻多鬢髯善於商賈諸夷交易多湊其國有大小鼓琵琶五絃箜篌笛婚姻喪制與突厥同國立祖廟以六月祭之諸國皆來助祭俗奉佛為胡書氣候溫宜五穀勤修園蔬樹木滋茂出馬駞驢騾封牛黃金碙砂甘香阿薩郍香瑟瑟麖皮氍㲣錦疊多蒲桃酒富家或致千石連年不敗大業中始遣使貢方物後遂絕焉, SBCK: 許}
