  - {type: variant, offset: 8, length: 2, content: 罽賓, SBCK: 羗無弋爰劒者􅁗厲公時爲􅁗所拘執以爲奴􅀠不知爰劒何戎之別也後得亡歸而秦人追之急藏於巖穴中得免羗人云爰劒􅀄藏穴中􅁗人焚之有影象如虎爲其蔽火得以免死旣出又與劓女遇於野遂成夫婦女耻其狀􅀍髪覆面羗人曰以爲俗遂俱亡入三河間諸羗見爰劒􅀍焚不死恠其神共畏事之推以爲豪河湟間少五榖多禽獸以射獵爲事爰劒教之田畜遂見尊信廬落種人依之者日益衆羗人謂奴爲無弋爰劒嘗爲奴􅀠故因名之其後丗丗爲豪也又曰爰劒曽孫忍時􅁗獻公􅀄立欲復穆公之迹兵臨渭首滅狄䝠戎忍季父卬畏􅁗之威將其種人附落南出賜支河曲西數千里與衆羗絶逺不復交通其後子孫分別各自爲種任隨所之或爲􅁵牛種越嶲羗是也或爲白馬種廣漢羗是也或爲叅狼種武都羗是也忍及弟舞獨留湟中並娶妻忍生九子爲九種舞生十七子爲十七種羗之興盛從此起矣又曰忍子研立時􅁗孝公雄強威服羗戎孝公使太子駟率戎狄九十二}
  - {type: page-break, offset: 8, content: '', id: KR3k0012_SBCK_794-1b}
  - {type: variant, offset: 8, length: 2, content: 罽賓, krp: 羗無弋爰劒者秦厲公時爲秦所拘執以爲奴隷不知爰劒何戎之別也後得亡歸而秦人追之急藏於巖穴中得免羗人云爰劒𥘉藏穴中秦人焚之有影象如虎爲其蔽火得以免死旣出又與劓女遇於野遂成夫婦女耻其狀𬒳髪覆面羗人曰以爲俗遂俱亡入三河間諸羗見爰劒𬒳焚不死恠其神共畏事之推以爲豪河湟間少五榖多禽獸以射獵爲事爰劒教之田畜遂見尊信廬落種人依之者日益衆羗人謂奴爲無弋爰劒嘗爲奴隷故因名之其後丗丗爲豪也又曰爰劒曽孫忍時秦獻公𥘉立欲復穆公之迹兵臨渭首滅狄䝠戎忍季父卬畏秦之威將其種人附落南出賜支河曲西數千里與衆羗絶逺不復交通其後子孫分別各自爲種任隨所之或爲釐牛種越嶲羗是也或爲白馬種廣漢羗是也或爲叅狼種武都羗是也忍及弟舞獨留湟中並娶妻忍生九子爲九種舞生十七子爲十七種羗之興盛從此起矣又曰忍子研立時秦孝公雄強威服羗戎孝公使太子駟率戎狄九十二}
