  - {type: variant, offset: 26, length: 0, content: '', krp: 爲髙昌郡張軌吕光沮渠蒙遜據河西皆置太守以統之又曰其國有八城地多磧石氣候温暖厥土良沃糓麥一歳再熟冝蠶多五菓有草名羊刺其上生密而味佳出赤塩其味羙復有白塩其形如玉髙昌人取以爲枕貢之中國又曰後魏文成帝和}
  - {type: variant, offset: 27, length: 1, content: 溫, SBCK: 六年髙昌人立麴嘉爲王嘉宇靈鳯金城榆中人遣使獻珠象白黒貂裘名馬塩枕等宣武延昌中以嘉爲持節平西將軍􅀲州刺史又曰後魏孝明熈平􅀄遣使朝貢獻詔曰卿地隔関山境接荒漢頻請朝援徙國内遷雖來誠可嘉於理未恊何者彼之甿庻是漢魏遺􅀺自晉氏不綱因難播越成家立國丗積巳乆惡徙重遷人懷蠻舊今若動之恐異同之變爰在时腋不得便如來表也又曰後魏孝明正光元年遣使奉表自以邊遐不習典誥求借五經諸史并請國子助教劉爕以爲􅀶士明帝許之又曰其國至隋城周廽一千八百四十歩於坐室􅀞魯哀公問政於孔子之像又曰服飾丈夫從胡法婦人裙􅃭頭上作髻文字亦同華夏兼用胡書有毛詩論語孝經置學官弟子以相教授雖習讀之而皆爲胡語賦稅則計田輸銀錢無者輸布又曰隋大業四年遣使貢獻帝待其使甚厚明年伯雅來朝伯雅髙昌國王名也因從擊髙麗還宗室女華容公主八年冬歸蕃下令國中曰先者以國邊荒境􅀍髮左袵今大隋統衘宇宙平一􅀌旣沐浴}
