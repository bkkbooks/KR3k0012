  - {type: variant, offset: 1559, length: 0, content: '', SBCK: 詔特進李靖爲西海道大惣管時伏允太子順欲因此立功由是遂降乃詔曰吐谷渾擅相君長􅀼據荒裔志在凶德政出權門酋渠携貳種落怨憤長惡不悛野心弥熾莫頋蕃臣之禮曽無事上之節莫􅀼疆􅂣䖍劉兆庻積惡旣稔天亡有徴朕君臨四海含育万􅀋一物失所責􅀷在予所以爰命六軍申兹九伐義存活國情非黷武其子大寜王慕容順隋氏之甥志懷明悟長自中土幸慕華風爰見時機􅀷識逆順以其愎諌違衆獨䧟迷途遂誅邪臣存兹大計翻然改轍代父歸罪忠孝之美􅀷有可嘉子能立功足以􅀘過旣徃之釁持冝原免然其建國西鄙巳歷年代旣從廢絶情所未忍継其宗祀允歸令嗣可封順爲西平郡王仍授趉九物切胡吕鳥甘豆可汗又曰吐谷渾自晉永嘉之末始西疫洮水建國於群羌之故地至龍朔三年爲吐蕃所㓕波斯北史曰波斯國都􅀫利城在忸􅁡西古條支國也去代二萬四千二百二十八里城方十里户十餘万河經其城中南流土地平正岀金鍮石􅃢瑚琥珀車渠馬腦多大真珠頗梨瑠璃水精瑟瑟金剛火齊􅣱鐵銅錫朱砂水銀綾錦疊毼氍毹毾㲪赤麞皮及欎金􅂫合青木等香胡椒畢撥石蜜千年􅀥香附子訶􅀺勒無食子塩緑雌黄等風物氣􅀱暑熱家自藏氷地多沙磧引水漑灌其五榖及鳥獸等與中夏略同唯無稻及􅁰稷土出名馬大馿及駞徃徃有一日能行七百里冨室至有數千頭又出白象師子大鳥夘形如槖駞有兩翼飛而不能髙食草與􅁏亦能噉火其王姓波氏名斯坐金羊牀戴金花冠衣錦􅂁織成帔飾以真珠寳物其俗文夫剪髮戴白皮帽貫頭衫亦有巾帔縁以織或錦婦女服之飾以金銀仍貫五色珠絡之於􅈩王於其國内别有小牙十餘所猶中國之離宫也毎年四月出遊處之十月乃還王即位以後擇諸子内賢者宻書其名封之於庫諸子及大臣皆莫之知也王死衆乃共發書視之其封内有名者即立以爲王餘子出各就邊任兄弟更不相見也國人号王曰毉􅓐妃曰防歩率王之諸子曰殺野又曰其刑法重罪懸諸竿上射殺之次則繫獄新王立乃釋之賦稅則准地輸銀錢又曰其俗以六月爲歳首尤重七月七日十二月一日其日人庶以上各相命召設會作樂又曰後魏孝明神􅀛中其國}
