  - {type: variant, offset: 335, length: 0, content: '', WYG: 阻山河乘阸據險因渠以溉水舂河漕水舂即水碓也用功省而軍糧饒足故孝武皇帝及世祖築朔方西河置上郡皆為此也而遭元元無妄之災衆羌内瀆郡縣兵荒二十餘年棄沃壤之饒損自然之財不可謂利離河山之阻守無險之處難以為固今三郡未復園陵單外園陵謂長安諸國陵也單外謂無守固也而公卿選懦容頭}
