  - {type: variant, offset: 4440, length: 0, content: '', WYG: 酋渠携二種落怨憤長惡不悛野心彌熾莫顧蕃臣之禮曽無事上之節僣竊彊場䖍劉兆庶積惡既稔天亡有徴朕君臨四海含育萬類一物失所責深在予所以爰命六軍申兹九伐義存活國情非黷武其子大寜王慕容順隋氏之甥志懷明悟長自中土幸慕華風爰見時機深識逆順以其愎諫違衆獨䧟迷途遂誅邪臣存兹大計翻然改轍代父歸罪忠孝之美深有可嘉子能立功足以補過既往之釁特宜原免然其建國西鄙已歴年代既從廢絶情所未忍繼其宗祀允歸令嗣可封順爲西平郡王又曰吐谷渾自晉永嘉之末始西度洮水建國扵羣羌之故地至龍朔三年為吐蕃所滅波斯北史曰波斯國都宿利城在忸宻西古條支國也去代二萬四千二百二十八里城方十里户十餘萬河經其城中南流土地平坦出金鍮石珊瑚琥珀車渠馬腦多大真珠玻棃瑠璃水精瑟瑟金剛火齊鑌鐡銅錫朱砂水銀綾錦疊毼氍毹㲪赤麞皮及鬱金蘇合青水等香胡椒蓽撥石蜜千年棗香附子訶黎勒無食子鹽緑雄黄等風物氣候暑熱家自藏氷地多沙磧引水溉灌其五榖及鳥獸等與中夏略同唯無稻及黍稷土出名馬大驢及駞往往有一日能行七百里富室至有數千頭又出白象獅子大鳥卵形如槖駞有兩翼飛而不能髙食草與肉亦能噉人其王姓波氏名斯坐金羊牀戴金花冠衣錦􅂁織成帔餙以珎珠寳物其俗丈夫剪髪戴白皮㡌貫頭衫亦有巾帔縁以織成錦婦女之服餙以金銀仍貫五色珠絡之扵􅈩上其國内别有小牙十餘所猶中國之離宫也每年四月出逰處之十月乃還王即位以後擇諸子内賢者宻書其名封之扵庫諸子及大臣皆莫之知也王死衆乃共發書視之其封内有名者即立以爲王餘子出各就邊任兄弟更不相見也國人號王曰醫􅓐妃曰防歩率王諸子曰殺野又曰其刑}
