  - {type: variant, offset: 337, length: 0, content: '', WYG: 年又曰順帝永和四年以來機爲并州刺史劉秉為凉州刺史大將軍梁商謂機等曰戎狄荒服蠻夷要服言其荒忽無常而統領之道亦無常法臨事制宜略依其俗今二君素性疾惡欲分白明黒孔子曰人而不仁疾之以甚亂也况戎狄乎其務安要荒防其大惡忍其小過機等天性虐刻遂不能從到州之日多所擾發五年夏雜種羌等遂反叛攻金城與西塞及湟中雜種羗大㓂三輔殺害長吏機秉並坐徴又曰自爰劒後子孫支分凡百五}
