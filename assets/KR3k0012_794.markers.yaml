  - {type: variant, offset: 3609, length: 199, content: 謂雀離佛圖也史國隋書曰史國都獨莫水南十里舊康居之地也其王姓昭武字逖遮亦康國王之支庶也都城方二里勝兵千餘俗同康國北去康國二百四十里南去吐火羅五百里大業中遣使朝貢師子通典曰師子國東晉時通焉天笁旁國也西海之中延袤二千餘里多出奇寶其地和適無冬夏之異五穀隨人所種不須時節其國舊無人止有鬼神有龍居之諸國商估來共市易鬼不見其形但出珍寶明其所堪價商人依價取之諸國人聞其土樂因此竟至或有停住者遂成大國能馴養師子遂以為, WYG: 治處}
