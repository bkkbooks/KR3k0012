  - {type: variant, offset: 1929, length: 774, content: 竺婆羅門胡為其上族婆羅門多解天文吉凶之數其王動則訪決焉土多林菓引水灌田豐稻夌事佛多諸寺塔寺極華麗人有爭訴服之以藥曲者發狂直者無恙為法不殺犯死罪唯徙於靈山西南有檀特山山上立寺以驢數頭運食山下無人控御自知往來烏郍曷隋書曰烏郍曷國都烏許水西舊安息之地王姓昭武亦康種類字佛食都城方二里勝兵數百人王坐金羊座北去安國四百里西北去穆國二百餘里東去瓜州七千五百里大業中遣使貢方物渴槃陁北史曰渴槃陁國在葱嶺東朱駒波西河經其國東北流有高山夏積霜雪亦事佛道附於濅噠通典曰渴槃陁後魏時通焉亦名漢陁國亦名渴槃羅陁國理葱嶺中在朱俱波國西西至護密國北至䟽勒國其王本䟽勒人累代相承居此國有戶二千餘有懸度山在國南四百里懸度者名山也谿谷不通以繩索相引而度其間四百里中往往有棧道因以為名今按懸度葱嶺邐迤相屬郵置所絕道阻且長故行人由之莫能分別然法明宋雲所經即懸度山也又有頭痛山在國西南向罽賓歷大頭痛小頭痛之山赤土身熱之坂宋膺異物志曰大頭痛小頭痛山皆渠搜之東䟽勒之西經之者身熱頭痛夏不可行行則至死唯冬可行尚嘔吐山有毒藥氣之所為冬乃枯歇故可行也鉢和北史曰鉢和國在渴槃陁西其土尤寒人畜同居穴地而處又有大雪山望若銀峰其人唯食餅麨飲夌酒服氈裘有二道一道西行向濅噠一道西南趣烏長亦為濅噠所屬大夏史記曰大夏在大宛西南二千餘里媯水南其俗土著有城屋與大宛同俗無大君長往往城邑寡小其兵弱畏戰善賈及大月氏西徙皆臣畜大夏大夏民多可百餘萬其都曰藍市城有市販賣諸物東南有身毒國張騫曰臣在大夏時見筇竹杖蜀布問曰安得此大夏國人曰吾賈人往市之身毒身毒國在大夏東南可數千里米國隋書曰米國都郍蜜水西舊康居之地也無王其城主姓昭武康國王之支庶字閉拙都城方二百里勝兵數百人西北去康居百里大業中頻貢方物鄧至通典曰鄧至羗之別種也後魏時與焉有像舒者代為白水酋帥因地名為號稱至王其地自千亭以東平武以西汶嶺以北宕昌以南風土習俗與宕昌同自舒理至, SBCK: 寳六載凡}
