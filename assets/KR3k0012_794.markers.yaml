  - {type: variant, offset: 2, length: 62, content: 二罽賓漢書曰罽賓國王治脩鮮城去長安萬二千二百里地平溫和有目蓿雜草花木檀櫰梓竹漆種五穀蒲陶有金銀銅錫以金銀為錢文為騎馬幕為人面, WYG: 三羌無戈湟中月氐胡氐車}
