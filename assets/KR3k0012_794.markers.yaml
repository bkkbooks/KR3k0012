  - {type: variant, offset: 3671, length: 816, content: 十里南去吐火羅五百里大業中遣使朝貢師子通典曰師子國東晉時通焉天笁旁國也西海之中延袤二千餘里多出奇寶其地和適無冬夏之異五穀隨人所種不須時節其國舊無人止有鬼神有龍居之諸國商估來共市易鬼不見其形但出珍寶明其所堪價商人依價取之諸國人聞其土樂因此竟至或有停住者遂成大國能馴養師子遂以為名風俗與婆羅門同而尤事佛法安帝義熙初遣使獻玉佛像像高四尺二寸玉色潔潤形制殊特殆非人功歷晉宋代在建康瓦官寺又曰宋文帝元嘉五年其王剎利摩訶南遣使貢獻梁武帝大通元年後王迦葉伽羅訶犁耶亦使使貢獻穆國北史曰穆國都烏滸河之西亦安息之故地與烏郍曷為鄰其王姓昭武亦康國王之種類也字阿濫密都城方三里勝兵二千人東北去安國五百里西去波斯國四千餘里大業中遣使貢方物奄蔡通典曰奄蔡漢時通焉西接大秦東南二千里與康居接去陽關八千餘里控弦十餘萬與康居同俗而役屬康居土氣溫和臨大澤無涯岸多楨松白草及貂畜收逐水草蓋近北海至漢改名阿蘭郍國後魏時白粟特國一名溫郍沙何國北史曰何國都郍密水南數里舊是康居地也其王姓昭武亦康國王之族類都城方二里勝兵者千人其王坐金羊座東去曹國百五十里西去小安國三百里東去瓜州六千七百五十里大業中遣使貢方物濅噠北史曰濅噠國大月氏之種類也亦高車之別種其原出於塞北自金山而南在于闐之西都烏許水南二百餘里去長安一萬一百里其王都拔底延城蓋王舍城也其城方十里餘多寺塔皆飾以金寶風俗與突厥略同兄弟共一妻無兄弟者依其多少之數更加帽焉衣服類加以纓絡頭皆剪髮其語與蠕蠕高車及諸胡不同眾可有十万無城邑依隨水草以氈為屋夏遷涼土冬逐暖處其王分其諸妻各在別所相去或一二里巡歷而行每月一處冬寒之時三月不徙王位不必傳子弟堪者死便受之其國無車輿多駞馬用刑嚴急偷盜無多少皆腰斬盜一責十死者富家累石為藏貧者掘地而埋隨身諸物皆置冢內人凶悍能鬭戰西域唐居于闐安息及諸小國三十許皆役屬之號為大國又曰後魏明帝熙平中遣宋雲沙門法力等使西域訪求佛經時有沙門慧生者亦與俱行正光中還慧生所經諸國不能知其本末及山川里數蓋舉其略云, SBCK: ''}
