  - {type: variant, offset: 1693, length: 176, content: 知名北至奇沙國相去一千五百里國中有副貨城周匝七十里宜五穀蒲桃唯有馬駞騾國王有黃金殿殿下有金駞七頭各高三尺其王遣使朝貢安國隋書曰安國漢時安息國也王姓昭武氏與康國王同族字設力登妻康國王女也都在郍密水南城有五里環以流水宮殿皆為平頭王坐金駞座高七八尺每聽政與妻相對大臣三人評理國事風俗同於康國唯妻子姊妹及母子相禽獸此為異也煬帝即位之後遣司隸從事杜行滿使於西域至, SBCK: 得入}
