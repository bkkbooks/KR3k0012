  - {type: variant, offset: 3343, length: 228, content: 之以其地為宕州鏺汗隋書曰鏺汗國都葱嶺之西五百餘里古渠搜國也王姓昭武守阿漆都城方四里勝兵數千人王坐金羊床妻戴金花俗多朱沙金鐵東去踈勒千里大業中遣使貢方物色知顯北史曰色知顯國都色知顯城在悉万斤西北去代一萬二千九百四十里土平多五菓伽色尼北史曰伽色國都伽色尼城在悉萬南去代一萬二千五百里土出鹽多五菓白蘭通典曰白蘭羗之別種後周時興焉東北接吐谷渾風俗物產與宕昌同周武帝保定元年朝獻使至乾陁北史曰乾陁國在烏萇西本名業波為濅噠所破因改焉好征戰與罽賓鬭三年不罷人怨苦之有鬭象, SBCK: 御覽卷第}
