  - {type: variant, offset: 2512, length: 1082, content: 百餘萬其都曰藍市城有市販賣諸物東南有身毒國張騫曰臣在大夏時見筇竹杖蜀布問曰安得此大夏國人曰吾賈人往市之身毒身毒國在大夏東南可數千里米國隋書曰米國都郍蜜水西舊康居之地也無王其城主姓昭武康國王之支庶字閉拙都城方二百里勝兵數百人西北去康居百里大業中頻貢方物鄧至通典曰鄧至羗之別種也後魏時與焉有像舒者代為白水酋帥因地名為號稱至王其地自千亭以東平武以西汶嶺以北宕昌以南風土習俗與宕昌同自舒理至十代孫舒彭附後魏孝文帝封甘松縣子鄧為王西魏恭帝初其主檐術因亂來奔周文帝遣兵送還自後無聞安息北史曰安息國在葱嶺之西都蔚搜城西與波斯相接東去長安一萬七百五十里周武天和二年其王遣使來獻乙弗獻通典曰乙弗獻後魏時聞焉在吐谷渾國有屈海周廻千餘里眾有萬落風俗與吐谷渾同然不識五穀唯食魚與蘇子狀若中國茍杞子或赤或黑西有契翰一部風俗亦同土特多狼伏盧尼北史曰伏盧尼都伏盧尼城在波斯國北去代二萬七千三百二十里累石為城東有大河南流中有鳥其形似人亦有如橐駞鳥者皆有翼常居水中出水便死城北有云尼山出銀珊瑚琥魄多師子石國隋書曰石國居藥殺水都城方十餘里其王姓石名泥國城之東南立屋置座於中正月六日七月十五日以王父母燒餘之骨金甕盛之置于床上巡遶而行散以花香雜菓王率臣下設祭焉禮終王與夫人出就別帳臣下以次列坐享宴而罷有粟夌多良馬其俗善戰曾貳於突厥射匱可汗興兵滅之令特勒甸職攝其國事大業五年遣使朝貢其後不復至宕昌通典曰宕昌羗後魏時興焉亦三苗之嗣與先零燒當罕開諸部姓別自立師皆有地分不相統攝宕昌即其一也俗皆土著居有楝宇其屋織氂牛及羖羊毛覆之無法令徭賦唯征伐之時乃相屯聚不然則各事生業不相來往皆衣裘褐牧養氂牛羊豕以供其食俗有蒸報無文字但取木榮落以記歲時三年一相聚殺牛羊以祭天俗重虎皮以之送死有梁勤者代為酋帥得羗毫心乃自稱王其界自仇池以西千里席水以南北八百里地多山阜部眾二萬餘落至其孫彌忽如遣使於後魏太武帝拜為宕昌王七葉孫彌秦皆授南北兩朝封爵後見兩魏分隔永熙末種人企定乃引吐谷渾寇金城後企定寇石門戍周武帝天和中詔大將軍田恒討平之以其地為宕州鏺汗隋書曰鏺汗國都葱嶺之西五百餘里古渠搜國也王姓昭武守阿漆都城方四里勝兵數千人王坐金羊床妻戴金花俗多朱沙金鐵東去踈勒千里大業中遣使貢方物色知顯北史曰色知顯國都色知顯城在悉万斤西北去代一萬二千九百四十里土平多五菓伽色尼北史曰伽色國都伽色尼城在悉萬南去代一萬二千五百里土出鹽多五菓白蘭通典曰白蘭羗之別種後周時興焉東北接吐谷渾風俗物產與宕昌同周武帝保定元年朝獻使至乾陁北史曰乾陁國在烏萇西本名業波為濅噠所破因改焉好征戰與罽賓鬭三年不罷人怨苦之有鬭象七百頭十人乘一象皆執兵仗象鼻縛刀以戰所都城東南, WYG: ''}
