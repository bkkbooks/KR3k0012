  - {type: variant, offset: 981, length: 6, content: 踈勒國高宗末, SBCK: 吐谷渾慕容氏者本遼西鮮卑徙河歩歸有二子長曰吐谷渾少曰􅀂洛廆代統部落別爲慕容氏歩歸之存貧分户百以給吐谷渾渾與洛廆二部馬􅋐相傷洛廆怒謂渾曰何不分部令相逺渾曰馬是畜耳而何怒及求別甚易今當去汝萬里之外廆悔謝留之渾曰先公之丗卜筮當有二子亭福並流子孫我是卑庻理無並大今以馬致隔天所啓也試駈馬令東􅀂還我當有隨即命擁馬皆悲鳴西走遂西渡隴止于甘松之南廆追悔之作吐谷渾河干歌徙何以兄爲河干也逐水草廬帳而居以􅁏酪爲粮渾死其後以吐谷渾爲氏又曰豺立自号沙州刺史部内有黃沙周迴數百里不生草木因号沙州梁書曰武帝天監十三年}
