  - {type: variant, offset: 333, length: 0, content: '', WYG: 又曰建武九年隗囂死司徒掾班彪上言今凉州部皆有降羗羗胡被髪左袵而與漢人雜處習俗既異言語不通數為小吏黠民所見侵奪窮忿無聊故致反叛夫蠻夷冦亂皆爲此也舊制益州部置蠻夷騎都尉幽州部置領烏桓校尉凉州部置䕶羗校尉皆持節領䕶理其怨結嵗時廵}
