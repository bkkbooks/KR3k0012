  - {type: variant, offset: 12, length: 0, content: '', SBCK: 研豪徤故羗中號其後爲研種及􅁗始皇時務并六國以諸侯爲事兵不西行故種人得以繁息又曰武帝征伐四夷開地廣境北却匈奴西逐諸羗及渡河湟築令居塞􅀄開河西別置四郡酒泉武威張掖敦煌通道玉門隔絶羗胡使南北不得交􅀜於是鄣塞亭燧出長城外數千里又曰建武九年隗􅅝死司徒􅁺班彪上言今凉州部皆有降羗羗胡􅀍髮左袵而與漢人􅄂處習俗旣異言語不通數爲小吏􅀧民所見侵奪窮恚無􅂓故致反叛夫蠻夷㓂亂皆爲此也舊制益州部置蠻夷􅀐都尉幽州部置領烏桓校尉凉州部置護羗校尉皆持節領護理其怨結歳時廵行問所疾苦又數遣使驛通導動静使塞外羗夷爲吏耳目州郡因此可得警備今冝復如舊以明威防丗祖從之即以牛邯爲護羗校尉又曰燒何豪有婦人銅鉗者年百餘歳多智筭爲種人所信向皆從取計䇿焉又曰龐叅以失期軍敗抵罪以馬賢代領校尉事後遣任尚爲中郎將羽林緹􅀐五營子弟三千五百人代班雄屯三輔尚臨行虞詡說尚曰使君頻奉國命討逐㓂賊三州屯兵二十餘萬民棄農桑疲苦徭役而未有功効勞費日滋􅀂此出不克誠爲使君危之尚曰憂惶乆矣不知所如詡曰兵法弱不攻強走不逐飛自然之勢今虜皆馬􅀐日行數百里來如風雨去如絶絃以歩追之勢不相及所以曠而無功也爲使君計者莫如罷諸郡兵各令出錢數千二人共市一馬如此可捨甲胄馳􅁿兵以万􅀐之衆逐數千之衆追尾掩截其道自窮便民利事大功立矣尚大喜即上言用其計乃遣輕􅀐鈔擊杜季貢於丁奚城斬首四百餘級獲牛馬羊數千頭又曰順帝永建元年隴西種羗反叛校尉馬賢將七千餘人擊之戰於臨洮斬首千餘級餘皆率種人降進封賢都郷侯自是凉州無事至四年尚書僕射虞翊上䟽曰臣聞子孫以奉祖爲孝君上以安民爲明此髙宗周宣所以上配湯武也禹貢雍州之域厥田惟上且沃野千里榖稼充積又有􅀛兹塩池以爲民利上郡􅀛兹縣有塩官即雍州之域也水草豐羙土冝産牧牛馬衘尾羣羊塞道北阻山河乗阨據險因渠以漑水舂河漕水春即水碓也用功省而軍粮饒足故孝武皇帝及丗祖築朔方西河置上郡皆爲此也而建元無妄之災衆羗内潰郡縣兵荒二十餘年棄沃壤之饒損自然之財不可謂利離河山之阻守無險之處難以爲固今三郡未復園陵單外園陵謂長安諸園陵也單外謂无守固也而公卿選懦容頭過身張解設難但計所費不圖其安冝開聖德考從所長書奏帝乃復三郡使謁者郭璜督促徙者各歸舊縣結城郭置􅃸釋旣而激河浚渠爲屯田省内郡費歳一億計遂令安定北地上郡及隴西金城常儲穀粟令周數年又曰順帝永和四年以宋機爲并州刺史劉康爲凉州刺史並當之職大將軍梁商謂機等曰戎狄荒服蠻夷要服言其荒忽無常而統領之道亦無常法臨事制冝略依其俗今二君性素疾惡欲分白明黒孔子曰人而不仁疾之巳甚亂也况戎狄乎其務安羗胡防其大故忍其小過機等天性虐刻遂不能從到州之日多所擾發五年夏雜種羗等遂反叛攻金城與西塞及湟中􅄂種羌大㓂三輔殺害長吏機康並坐徴又曰自爰劒後子孫支分凡百五十種其九種在賜支河首巳西及在蜀漢徼北唯叅狼在武都其五十二種衰少不能自立分散爲附落或絶滅無後或引而逺去其八十九種唯燒當種㝡強勝兵十餘萬其餘大者萬餘人小者數千人更相鈔盗盛衰無常湟中月氏胡後漢書曰湟中月氏胡其先大月氏之別也舊在張掖酒泉地月氏爲匈奴冒頓所殺餘種分散西踰葱嶺其羸弱者南入山阻依諸羌居止遂與共婚姻及驃􅀐將軍霍去病破匈奴取西河地開湟中於是月氏來降與漢民錯居雖依附縣官而首䑕兩端其後漢兵戰􅋐隨勢強弱􅀍服飲食言語略與羌同亦以父名母姓爲種其大種有七莊子曰羗人死燔而􅀭其􅁅風俗通曰羗本西戎卑賤者也主牧羊故羗字從羊人因以爲號無君臣上下徤者爲豪不能相一種别群分彊者凌弱轉相抄盗男子戰死以爲吉病終者謂之凶范曄西域論曰張奐盛稱戎狄一氣所生不冝誅盡流血汙野傷和致妖是何言之迂乎羗雖外患實􅀷内疾苦攻之不根是飬痾於心腹也根謂盡其根本又曰昔先王壃理九土判別畿荒知蠻貊殊性難以道御故斥逺諸華薄其貢職唯辤要而巳􅀂二漢御戎之方失其本矣氐支齊書曰氐楊氏與符氏同出略陽漢丗氐居仇池地号百頃建安中有百頃氐王是也又曰仇池四方壁立自然有樓櫓却敵􅃺髙並數文有二十二道可舉縁而􅂛東西二門盤道可七里上有岡阜泉源氐於上平地立宫室菓園食庫無貴賤皆爲板屋土牆所}
