  - {type: variant, offset: 4439, length: 0, content: '', WYG: 州刺史部内有黄沙周廻數百里不生草木因號沙洲梁書曰武帝天監十三年其王休運籌遣使獻金装馬腦鍾二口又表扵益州立九層佛寺詔書許焉十五年又遣使獻赤舞龍駒及方物隋書曰其王以皂為㡌妻戴金花其噐械衣服略與中國同其王公貴人多戴幕䍦婦人裙襦辮髪綴以珠貝國無常税殺人及盗馬者死餘坐則徴物贖罪風俗頗同突厥有大麥粟豆青海周廻千餘里中有小山其俗至冬輒放牝馬扵其上得龍種吐谷渾嘗得波斯草馬放入海因生驄駒能日行千里故時稱青海騘馬又曰開皇十六年以光化公主妻吐谷渾王伏允上表欲稱公主為天后上不許唐書曰隋煬帝時其王伏允來犯塞煬帝親總六軍以討之伏允以數千騎潜扵泥嶺而遁其仙頭王率男女十餘萬口來降煬帝立其質子順為王送之本國又曰貞觀九年詔特進李靖西海道大總管時伏允太子順欲因此立功由是遂降乃詔曰吐谷渾擅相君長竊㨿荒裔志在㓙徳政出權}
  - {type: page-break, offset: 4439, content: '', id: KR3k0012_WYG_794-14b, image: WYG0900/WYG0900-0067b.png}
