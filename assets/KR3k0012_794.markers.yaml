  - {type: variant, offset: 2903, length: 246, content: 河南流中有鳥其形似人亦有如橐駞鳥者皆有翼常居水中出水便死城北有云尼山出銀珊瑚琥魄多師子石國隋書曰石國居藥殺水都城方十餘里其王姓石名泥國城之東南立屋置座於中正月六日七月十五日以王父母燒餘之骨金甕盛之置于床上巡遶而行散以花香雜菓王率臣下設祭焉禮終王與夫人出就別帳臣下以次列坐享宴而罷有粟夌多良馬其俗善戰曾貳於突厥射匱可汗興兵滅之令特勒甸職攝其國事大業五年遣使朝貢其後不復至宕昌通典曰宕昌羗後魏時興焉亦三苗之嗣與先零燒當罕開諸部姓別自立師皆有地分不相統攝宕昌即其一也俗皆土著居有楝宇其屋織氂牛及羖羊, SBCK: ''}
