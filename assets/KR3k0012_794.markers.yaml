  - {type: variant, offset: 837, length: 356, content: 歸天子以天馬多益種蒲陶目蓿離宮館旁極望焉異物志云大宛馬有肉角數寸或有解人語及知音舞與鼓節相應西域圖記曰其鳥馬騮馬多白耳白馬驄馬多赤耳黃馬赤馬多黑耳踈勒漢書曰踈勒國王治踈勒城去長安九千三百五十里後漢書曰耿恭為戊巳校尉引眾入踈勒城城中乏水穿井十五丈不得水恭整衣服向井拜飛泉湧出賊遂退之後魏書曰踈勒國高宗末其王遣使送釋迦佛袈婆長二丈餘廣丈餘高宗以審是佛衣應有靈異遂燒之以驗虛實置於猛火之上經日不燃觀者莫不悚駭後每使朝貢隋書曰踈勒國都白山南百餘里其王字阿你厥手足皆六指產子非六指者不育王戴金師子多稻粟麻夌銅鐵銀雌黃唐書曰踈勒國王姓裴俗事祆呼切神有胡書文字貞觀九年遣使獻名馬又曰開元六年玄宗遣使冊立其王裴安定為踈勒王康國隋書曰康國者康居之後也遷徙無常不恒故地然自漢以來相承不絕其本姓溫月氏人也舊居祁連山北昭武城因被匈奴所破, WYG: 分散}
