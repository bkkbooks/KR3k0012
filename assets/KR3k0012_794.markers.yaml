  - {type: variant, offset: 3870, length: 2, content: 王剎, WYG: 服色而名之也土地險阻有麻銅漆蜜椒蠟等勇戅抵冐貪貨死}
  - {type: variant, offset: 3873, length: 2, content: 摩訶, WYG: 居扵河地一名仇池方百頃四面斗絶數為邊㓂郡縣討之則依固自守其俗語不與中國及羌胡同各自為姓如中國之姓其服尚青俗能織布善種田畜羊豕馬牛婚姻備六禮知書疏多知中國之語又曰漢武元封三年氐人反遣兵討破之分徙酒泉郡元鳳初復叛遣大鴻臚田廣明討破之又曰魏武之初諸氐戎叛乃令夏侯妙才討之因徙武都之種扵秦川以禦風俗通曰氐羌抵冐貪饕至死好利樂在山谿本西}
