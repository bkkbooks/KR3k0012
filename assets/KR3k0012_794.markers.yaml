  - {type: 'tls:seg', offset: 334, content: '', id: KR3k0012_CHANT_794-4a.27}
  - {type: variant, offset: 334, length: 0, content: '', WYG: 問所疾苦又數遣使驛通導動静使塞外羗夷為吏耳目州郡因此可得警備今宜復如舊以明威防世祖從之即以牛邯為䕶羗校尉又曰燒何豪有婦人銅鉗者年百餘嵗多智算為種人所信向皆從計策之又曰龎叅以失期敗軍抵罪以馬賢代領校尉事後遣任尚為中郎將將羽林緹騎五營子弟三千五百人代班雄屯三輔尚臨行懷令虞詡説尚曰使君頻奉國命討逐冦賊三州屯兵二十餘萬民棄農桑疲苦徭役而未有功効勞費日滋若此出不免誠為使君危之尚曰憂惶久矣不知所如詡曰兵法弱不攻强走不逐飛自然之勢今虜皆馬騎日行數百里來如風雨去如絶弦以步追之勢不相及所以曠而無功也為使君計者莫如罷諸郡兵各令出錢數千二人共市一馬如此可捨甲胄馳輕兵以萬騎之衆逐數千之虜追尾掩截其道自窮便民利事大功立矣尚大喜即上言用其計乃遣輕騎鈔擊杜季貢扵丁奚城斬首四百餘級獲牛馬羊數千頭又曰順帝永建元年隴西種羌反叛校尉馬賢將七千餘人擊之戰於臨洮斬首千餘級皆率種人降進封賢都鄉侯自是凉州無事至四年尚書僕射虞詡上䟽曰臣聞子孫以奉祖為孝君上以安民為明此髙宗周宣所以上配湯武也禹貢雍州之域厥田惟上且沃野千里榖稼充積又有龜兹鹽池以爲民利上郡龜兹縣有鹽官即雍州之域也水草豐美土宜産牧牛馬銜尾群羊塞道}
