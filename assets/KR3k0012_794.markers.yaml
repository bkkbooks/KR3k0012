  - {type: variant, offset: 507, length: 470, content: 北史曰大月氏北與蠕蠕接數為所侵遂西徒都薄羅城其王寄多羅勇武遂興師越太山南侵北天竺自乾陁羅以北五國盡屬之後魏太武時其國人商販京師自云能鑄石為五色瑠璃於是採礦山中於京師鑄之既成光澤美於西方來者乃詔為殿容百人光色映徹自此中國琉璃遂賤異物志曰月氏俗乘四輪車或四牛或八牛可容二十人王稱天子大宛漢書曰大宛國王治貴山城去長安萬二千五百五十里以蒲萄為酒富人藏酒至萬餘石久者至數十歲不敗俗嗜酒焉嗜曰宿宛別邑七十餘城多善馬馬汗血言其先天馬子也孟康曰言大宛國有高山其上有馬不可得因取五色母馬置其下與集生駒皆汗血因號曰天馬子云張騫始為武帝言之上遣使持金馬以請宛王不肯於是天子遣貳師將軍李廣利將兵伐宛連四年死人斬其王母寡首獻馬三千匹漢軍乃還又曰宛王蟬封與漢約歲獻天馬二疋漢使采蒲陶苜蓿種歸天子以天馬多益種蒲陶目蓿離宮館旁極望焉異物志云大宛馬有肉角數寸或有解人語及知音舞與鼓節相應西域圖記曰其鳥馬騮馬多白耳白馬驄馬多赤耳黃馬赤馬多黑耳踈勒漢書曰踈勒國王治踈勒城去長安九千三百五十里後漢書曰耿恭為戊巳校尉引眾入踈勒城城中乏水穿井十五丈不得水恭整衣服向井拜飛泉湧出賊遂退之, SBCK: 吐谷渾}
