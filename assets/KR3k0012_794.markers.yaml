  - {type: variant, offset: 16, length: 0, content: '', SBCK: 後魏大武真君十一年車師王車夷落遣使進薛直上書曰臣亡父僻處塞外仰慕天子威德遣使奉獻不空於歳天子降念賜遣甚厚及臣継立不闕常貢天子垂矜亦不異前丗敢縁至恩輙陳私懇臣國自無諱所攻擊經今八歳人庻飢荒無以存活賊今攻臣急甚不能自全遂捨國東奔三分免一即日巳到焉耆東界思歸天闕幸垂賑救於是下詔撫慰之開焉􅂄倉給之正平􅀄遣子入侍自後毎使朝貢髙昌北史曰髙昌者車師前王之故地東西二百里南北五百里四靣多大山以其地勢髙敞人庻昌盛因名髙昌亦云其地有漢時髙昌壘故以爲國號東}
