  - {type: variant, offset: 303, length: 182, content: 直下也武帝始遣使至安息王令將將二萬騎迎於東界東界至王都數千里行北過數十城民人相屬因發使隨漢使者來觀漢地以大鳥及卵來獻天子大悅後漢書曰章帝章和元年安息王遣使獻師子符拔符拔形似麟無角也北史曰周武天和二年其王遣使朝獻大月氏漢書曰大月氏國治監氏城去長安萬一千六百里物類民俗與安息同出一封橐馳師古曰脊上出一封也控弦十餘万故強輕匈奴師古曰恃其強盛而輕易匈奴也至冒頓單于攻破月氏, SBCK: 便太宗不從遂}
