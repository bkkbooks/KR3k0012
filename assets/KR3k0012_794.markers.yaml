  - {type: variant, offset: 12, length: 0, content: '', krp: 研豪徤故羗中號其後爲研種及秦始皇時務并六國以諸侯爲事兵不西行故種人得以繁息又曰武帝征伐四夷開地廣境北却匈奴西逐諸羗及渡河湟築令居塞𥘉開河西別置四郡酒泉武威張掖敦煌通道玉門隔絶羗胡使南北不得交關於是鄣塞亭燧出長城外數千里又曰建武九年隗囂死司徒掾班彪上言今凉州部皆有降羗羗胡𬒳髮左袵而與漢人雜處習俗旣異言語不通數爲小吏點民所見侵奪窮恚無聊故致反叛夫蠻夷㓂亂皆爲此也舊制益州部置蠻夷騎都尉幽州部置領烏桓校尉凉州部置護羗校尉皆持節領護理其怨結歳時廵行問所疾苦又數遣使驛通導動静使塞外羗夷爲吏耳目州郡因此可得警備今冝復如舊以明威防丗祖從之即以牛邯爲護羗校尉又曰燒何豪有婦人銅鉗者年百餘歳多智筭爲種人所信向皆從取計䇿焉又曰龐叅以失期軍敗抵罪以馬賢代領校尉事後遣任尚爲中郎將羽林緹騎五營子弟三千五百人代班雄屯三輔尚臨行虞詡說尚曰使君頻奉國命討逐㓂賊三州屯兵二十餘萬民棄農桑疲苦徭役而未有功効勞費日滋若此出不克誠爲使君危之尚曰憂惶乆矣不知所如詡曰兵法弱不攻強走不逐飛自然之勢今虜皆馬騎日行數百里來如風雨去如絶絃以歩追之勢不相及所以曠而無功也爲使君計者莫如罷諸郡兵各令出錢數千二人共市一馬如此可捨甲胄馳輕兵以万騎之衆逐數千之衆追尾掩截其道自窮便民利事大功立矣尚大喜即上言用其計乃遣輕騎鈔擊杜季貢於丁奚城斬首四百餘級獲牛馬羊數千頭又曰順帝永建元年隴西種羗反叛校尉馬賢將七千餘人擊之戰於臨洮斬首千餘級餘皆率種人降進封賢都郷侯自是凉州無事至四年尚書僕射虞翊上䟽曰臣聞子孫以奉祖爲孝君上以安民爲明此髙宗周宣所以上配湯武也禹貢雍州之域厥田惟上且沃野千里榖稼充積又有龜兹塩池以爲民利上郡龜兹縣有塩官即雍州之域也水草豐羙土冝産牧牛馬衘尾羣羊塞道北阻山河乗阨據險因渠以漑水舂河漕水春即水碓也用功省而軍粮饒足故孝武皇帝及丗祖築朔方西河置上郡皆爲此也而建元無妄之災衆羗内潰郡縣兵荒二十餘年棄沃壤之饒損自然之財不可謂利離河山之阻守無險之處難以爲固今三郡未復園陵單外園陵謂長安諸園陵也單外謂无守固也而公卿選懦容頭過身張解設難但計所費不圖其安冝開聖德考從所長書奏帝乃復三郡使謁者郭璜督促徙者各歸舊縣結城郭置候釋旣而激河浚渠爲屯田省内郡費歳一億計遂令安定北地上郡及隴西金城常儲穀粟令周數年又曰順帝永和四年以宋機爲并州刺史劉康爲凉州刺史並當之職大將軍梁商謂機等曰戎狄荒服蠻夷要服言其荒忽無常而統領之道亦無常法臨事制冝略依其俗今二君性素疾惡欲分白明黒孔子曰人而不仁疾之巳甚亂也况戎狄乎其務安羗胡防其大故忍其小過機等天性虐刻遂不能從到州之日多所擾發五年夏雜種羗等遂反叛攻金城與西塞及湟中雜種羌大㓂三輔殺害長吏機康並坐徴又曰自爰劒後子孫支分凡百五十種其九種在賜支河首巳西及在蜀漢徼北唯叅狼在武都其五十二種衰少不能自立分散爲附落或絶滅無後或引而逺去其八十九種唯燒當種㝡強勝兵十餘萬其餘大者萬餘人小者數千人更相鈔盗盛衰無常湟中月氏胡後漢書曰湟中月氏胡其先大月氏之別也舊在張掖酒泉地月氏爲匈奴冒頓所殺餘種分散西踰葱嶺其羸弱者南入山阻依諸羌居止遂與共婚姻及驃騎將軍霍去病破匈奴取西河地開湟中於是月氏來降與漢民錯居雖依附縣官而首䑕兩端其後漢兵戰鬪隨勢強弱𬒳服飲食言語略與羌同亦以父名母姓爲種其大種有七莊子曰羗人死燔而揚其灰風俗通曰羗本西戎卑賤者也主牧羊故羗字從羊人因以爲號無君臣上下徤者爲豪不能相一種别群分彊者凌弱轉相抄盗男子戰死以爲吉病終者謂之凶范曄西域論曰張奐盛稱戎狄一氣所生不冝誅盡流血汙野傷和致妖是何言之迂乎羗雖外患實深内疾苦攻之不根是飬痾於心腹也根謂盡其根本又曰昔先王壃理九土判別畿荒知蠻貊殊性難以道御故斥逺諸華薄其貢職唯辤要而巳若二漢御戎之方失其本矣氐支齊書曰氐楊氏與符氏同出略陽漢丗氐居仇池地号百頃建安中有百頃氐王是也又曰仇池四方壁立自然有樓櫓却敵狀髙並數文有二十二道可舉縁而升東西二門盤道可七里上有岡阜泉源氐於上平地立宫室菓園食庫無貴賤皆爲板屋土牆所}
  - {type: variant, offset: 13, length: 2, content: 脩鮮, SBCK: 處名洛谷又曰宋文帝元喜十九年龍驤將軍裴方明等伐氐尅仇池通典曰氐者西戎之別種則在廣漢西君長數十而白馬㝡大或号青氐或号白氐或稱蚺氐蚺而占切此盖中國人即其服色而名之也土地險阻有麻銅􅃮􅁡椒蠟等勇戅抵昌貪貨死利居於河地一名仇池方百頃四面斗絶數爲邊㓂郡縣討之則依固自守其俗語不與中國及羗胡同各自有姓如中國之姓其服尚青俗能織布善田種畜羊豕馬牛婚姻六禮知書䟽多知中國之語言與中國之姓其服尚青又曰漢武元封三年氐人反遣兵討破之分徙酒泉郡元鳯􅀄復叛遣大鴻臚田廣明討破之又曰魏武之􅀄諸氐戎叛乃令夏侯妙才討之因徙武都之種於秦川以御蜀虜風俗通曰氐言抵昌貪饕至死好利樂在山谿本西南夷之别種号曰白馬孝武帝遣中郎將郭昌等引兵征之降服以爲武都郡晉華隂令江統西戎論曰春秋之義内諸夏而外夷狄以其言論不通䞇幣不同種􅀋乖殊或居絶域之外山河嶇險阻之地與中國壤之表﨑断土隔不相侵渉賦役不及正朔不加故曰天子有道守在四夷又曰匈奴求守邊塞而俟應陳其不可單于屈􅂰未央蕭望之議以不臣是以有道之君不攻夷狄也車師北史曰車師國一名前部其王居交河}
