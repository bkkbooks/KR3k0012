  - {type: variant, offset: 2306, length: 2, content: 康帝, WYG: 陋聞之曰億兆之人無官者十居其九豈能髙士哉我病疾不堪恭相王之命非敢為髙也又曰劉驎之字子驥一字道民好逰于山澤志在存道常採藥至名山深入忘返見有一澗水南有二石囷一囷開一囷閉或説囷中皆仙方秘藥驎之欲便尋索終不能之桓沖請為長史固辭居于陽岐人事徃來無不投止驎之自供給人人豐足凡人致贈一無所受又曰龔𤣥之字道𤣥潜處陋巷未嘗出入公門人有致餉一無所受武陵太守孫放薦𤣥之詔}
