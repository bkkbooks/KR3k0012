  - {type: variant, offset: 682, length: 4, content: 楊軻天水, SBCK: 翟法賜尋陽柴桑人祖湯湯子莊莊子矯並髙尚不仕逃避徴辟矯生法賜少守家業立屋於廬山頂居後便不復還家不食五榖以獸皮結草爲辟著作郎不就後家人至石室尋求因復逺徙違避徴聘遁迹幽深後卒於巖石之間又曰沈道䖍呉興武康人少仁愛好老易縣北山石下爲精廬與諸􅀌兄子共釡􅁃之資困不改節受琴於戴逵辟府凢十二命皆不就太祖聞之遣使存問賜錢累丗事佛推父祖舊宅爲寺至四月八日毎請像請像之日輒舉家感動焉道䖍年老菜食􅁪無經日之資而琴書爲樂孜孜不倦又曰雷次宗字仲倫南昌}
