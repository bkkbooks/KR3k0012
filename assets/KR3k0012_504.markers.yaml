  - {type: variant, offset: 2654, length: 0, content: '', WYG: 休業琅琊人也少有志行乃徃東陽隠居不仕屢被徴辟聲譽甚髙山中有蚿䖝聲清長而形醜素乃為蚿賦以自況又曰戴顒字仲若譙郡銍人也父逵兄勃並隱遁有髙名顒年六十遭父憂幾於滅毁因此長抱羸患又不仕復修其業父善琴書顒並得之凡諸音律皆能揮手會稽剡縣多名山故世居剡下顒及兄殻並受琴於父父没所𫝊之聲不忍復奏各造新弄桐廬縣又多名山兄弟復共遨之因留居止以桐廬僻逺難以養疾乃出吳下吳下士人共為築室乃述莊周大㫖著逍遥論太祖元嘉初徴散騎常侍並不就太祖每欲見之常謂黄門侍郎張敷曰吾東巡之日當讌戴公山也以其好音長給正聲伎一部卒年六十四後景陽山成上歎曰恨不使戴顒觀之又曰宗炳字少}
  - {type: page-break, offset: 2654, content: '', id: KR3k0012_WYG_504-4a, image: WYG0897/WYG0897-0531a.png}
