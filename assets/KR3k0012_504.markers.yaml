  - {type: variant, offset: 567, length: 2, content: 燉煌, SBCK: 送傾朝謙要弘之同行荅曰凢祖離送别必在有情下官與殷風馬不接無縁扈從謙貴其言隨兄敬弘之安成郡弘之解職同行家在㑹稽上虞敬弘常解貂裘與之即着以採藥性好釣上虞江有一處名三石頭弘之裳垂綸於此經過者不識之或問漁師得魚賣否弘之曰亦自不得得亦不賣日夕載魚入至上虞郭經親故門各以一兩頭置門内而去始寧沈州有佳山水弘之又依巖築室謝靈運顔延之並相欽重又曰劉凝之字志安小名長年慕老萊嚴子陵爲人推家財與弟及兄子立屋於野外非其力不食州里重其仁德禮辟並不受妻梁州刺史郭鈐女也遣送豐麗凝之悉散之親族妻亦能弃榮華共安儉苦徴爲祕書郎不就荆州年飢衡陽王慮凝之餒弊餉錢十萬凝之大喜將錢至市門觀有飢色者悉分與之性好山水一旦携妻子泛江湖隱居衡山之陽登髙山絶人迹爲小屋居之採藥服食妻子皆從其志又曰龔祈字道孟武陵漢壽}
