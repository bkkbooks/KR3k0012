  - {type: variant, offset: 828, length: 1, content: 語, SBCK: 僧徒禮誦爲業有終焉之志旣雅愛山水兼有巧思結架巖林甚得逰放之適頗以此聞丗宗給其功力令與沙門統僧暹河南尹甄琛等周視嵩山形勝之處製閑居寺亮卒詔贈帛二百疋以供㓙事遺誡兄子綜殮以衣慆左手持板右手執孝經置屍盤石上積十餘日乃焚於山以􅁅燼處起佛塔􅀄亮以冬月亡時連驟雪窮山荒㵎鳥獸飢窘僵屍山野無所防護時有壽春道人惠需每旦徃看其屍拂去塵霰禽虫之迹交撗左右而􅀄無侵毀衣服如夲唯風吹幍落耳惠需又以大栗十枚開亮手置把中經􅀫乃爲虫爲盗食皮殻在地亦}
