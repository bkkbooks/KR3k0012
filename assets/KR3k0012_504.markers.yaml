  - {type: variant, offset: 2547, length: 95, content: 又曰郭翻字長翔不交世事家於臨川唯以漁獵為娛常以車獵道逢病人以車送之徒步而返庾亮薦公車徵不就乘小舡歸武昌庾翼躬往造之以翻船狹小欲引入大船翻曰使君不以名鄙賤而辱臨之此固野人之舟也遂不肯翼便俯屈入, WYG: 者隨}
  - {type: punctuation, offset: 2549, content: ：, id: KR3k0012_CHANT_504-bkkpn617}
