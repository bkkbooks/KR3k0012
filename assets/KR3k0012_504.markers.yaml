  - {type: variant, offset: 2735, length: 2, content: 頻徵, WYG: 志既雅愛山水兼有巧思結架林岩甚得逺逰之適頗以此聞世宗給其功力令與沙門統僧暹河南尹甄琛等周視嵩山形勝之處制閑居寺亮卒詔賜帛二百疋以供凶事遺誡兄子綜殮以衣縚左手持板右手執孝經置屍盤石上積十餘日乃焚于山以灰燼處起佛塔初亮以冬月亡時連驟雪窮山荒澗鳥獸飢窘僵屍山野無所防䕶時有夀春道人恵需每旦徃看其屍拂去塵霰禽蟲之迹交横左右而初無侵毁衣服如本唯風摧折耳需又以大栗十放開亮手置把中經宿乃為蟲盜食皮殻在地亦不傷肌體焚燎之日有素霧蓊鬱迴繞其旁自地屬天彌朝不絶中山道俗營助者百餘人莫不異焉魏書曰李謐字永和趙郡人少而好學博通諸經周覽百氏初師事小學博士孔璠數年之後璠還就業謐同門生為之語曰青盛藍藍謝青師何常在明經謐飲酒好音律愛樂山水髙尚之情長而彌固十遇其賞悠爾忘歸乃作神士賦又曰睦夸一名昶趙郡髙邑人年二十遭父喪鬚髮至白每悲哭聞者為流涕髙尚不仕寄情丘壑少與崔浩為莫逆之交及浩為司徒奏徴夸為中郎辭疾}
