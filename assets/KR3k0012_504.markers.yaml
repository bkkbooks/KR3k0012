  - {type: variant, offset: 1832, length: 675, content: 石壁曰丹崖百丈青壁萬尋奇木蓊鬱蔚若鄧林其人如玉維國之琛室邇人遐實勞我心纖注論語及為詩頌數萬言年八十篤學不倦張祚復遣使者備禮徵為太子友逼喻甚切纖喟然歎曰德非干木何敢稽停明命遂至姑臧祚遣其太子太和以執友禮造纖稱疾不見贈遺一皆不受後卒謚曰玄虛先生又曰鄧粲長沙人也少以高潔著名與南陽劉驎之南郡劉尚公同志友善並不應州郡辟命荊州刺史桓公卑辤厚禮請粲為別駕粲嘉其好賢乃起應召驎之尚公謂粲曰卿道學深眾所推懷忽然改節誠失所望粲荅曰足下可謂有志於隱而未知隱夫隱之為道朝亦可隱市亦可隱隱初在我不在於物公等無以難之又曰汜騰字無忌燉煌人舉孝廉除郎中天下兵亂去官還家太守張閟造之閉門不見禮遺一無所受歎曰吾聞亂世貴而能貧乃可以免散家財五十萬以施宗族柴門灌園琴書自適刺史張軌徵之為府司騰曰門一杜其可開乎固辤病卒又曰王長文字德郁廣漢人少以才學知名放蕩不羈州郡辟為別駕乃微服竊出舉州莫知所之後於成都市中蹲踞而坐齧胡餅食之刺史知其不出乃禮遣之於是閉門自守不交人事著通玄經四卷文言卦象可用以為卜筮晉中興書曰虞喜字仲寧好學博古中宗初鎮江左上䟽薦喜公車徵不至司空賀循每一詣喜輒經信宿云不能測也康帝以為散騎常侍又不起永和初將禘太廟應有遞毀尚書郎徐禪詣喜諮焉喜所著數十萬言又曰高陽許詢字玄度丹陽許玄字遠遊並治高不仕詢有才藻能清言玄山居服食志求仙道遊會稽臨海山誓不歸家乃與婦書令改適後入剡深山莫知所止或以為昇仙又曰翟陽字長淵尋陽人耕而後食凡有饋贈一無所受庾亮薦湯以國子博士徵不起湯子莊字祖休遵湯之操雅好弋釣及長不復獵人或問莊曰同是害生之道而先生止去其一何也莊曰獵自我釣自物故先節其甚者且貪餌吞釣豈我哉, SBCK: 敷}
