  - {type: variant, offset: 6, length: 2242, content: 三王隱晉書曰龔莊字子偉巴西人也潔己自守與鄉人譙秀齊名父叔為李特所害莊積年不除喪力弱不能復讎及李壽戍漢中與李期有嫌期特孫也壯欲假壽以報乃說壽曰節下若能并有西土稱藩於晉人必樂從且捨小就大以危易安莫大之策也壽然之遂率眾討期果克之壽猶襲偽號欲官之壯誓不仕賂遺一無所受壯書說壽以歸順允天心應人望永為國藩福流子孫壽不納壯謂曰百行之本莫先忠孝既假壽殺期私仇已雪又欲使其歸朝以明臣節壽既不從壯遂稱耳聾又云手不制物終身不復至成都下帷研考經典覃思文章至李勢時卒又曰韓績字興齊廣陵人也先避世居于吳之嘉興父建仕吳至大鴻臚績少好文學以潛退為操布衣蔬食不交當世由是東土並宗敬焉司徒王導聞其名辟以為掾不就咸康末會稽內史孔愉上䟽薦之詔以安車束帛徵之稱老病卒于家又曰譙秀字元彥巴西人也少而靜默不交於世知天下將亂預絕人事雖內外宗親不相見郡察孝廉州舉秀才皆不就及李雄據巴蜀慕秀名具束帛安車徵皆不應常冠皮弁弊衣躬耕山藪後避難宕渠鄉里宗族依憑之者以百數秀年出八十眾代之負檐秀曰各有老弱當先營護吾氣力猶足自堪豈以垂朽之年累諸君也年九十餘卒又曰辛謐字叔重隴西狄道人也少有志尚博學善屬文恬靜不接交遊召拜太子舍人諸王文學累徵不起永嘉末沒于劉聰拜太中大夫固辭不受又歷石季龍之世並不應辟命雖處喪亂之中頹然高邁視榮利蔑如也及冉閔僣亂復備禮徵為太常謐遺閔書因不食而卒又曰索襲字偉祖燉煌人也虛靜好學不應州郡之命舉孝廉賢良方正皆以病辭遊思於陰陽之術著天文地理十餘篇多所啟發不與當世交通或獨語獨笑長歎涕泣或請問不言燉煌太守陰澹奇而造焉經日忘返而歎曰索先生碩德名儒真可以諮大義澹欲行鄉射之禮請為三老會病卒時年七十九又曰楊軻天水人也少好易長而不娶學業精微養徒數百常食麤飯飲水衣短褐人不堪其憂而軻悠然自得疏賓異客音旨未嘗交也雖受業門徒非入室弟子莫得親言欲所論授入室弟子令相與宣授劉曜僣號徵拜太常軻固辭不赴曜亦敬而不逼遂隱於隴山及曜為石勒所擒秦人東徙軻留長安石季龍嗣位備玄纁束帛安車徵之軻以疾辤迫之乃發既見季龍不拜與語不言有司以軻倨傲請從大不敬論季龍弗從下詔任軻所尚常臥土床覆以布被倮寢其中下無茵褥潁川荀輔好奇之士也造而談經軻瞑目不荅輔發軻披露其形大笑之軻神體頹然無驚怒之狀于時咸以為焦先之徒未有能量其深淺也後上䟽陳思鄉求還季龍送以安車蒲輪自歸秦州仍教授不絕又曰公孫鳳字子鸞上谷人也隱于昌黎之九城山冬衣單布寢土床彈琴吟詠陶然自得人咸異之莫能測也慕容暐以安車徵至鄴及見暐不言不拜衣食舉止如在九城賓客造請鮮得與言數年病卒又曰公孫永字子陽襄平人也少而好學恬虛隱於平郭南山不娶妻妾非所墾植不衣不食吟詠巖間忻然自得年逾九十操尚不虧與公孫鳳俱被慕容暐徵至鄴王公已下造之不與言雖經隆寒盛暑端然自若一歲餘詐狂暐送之平郭後符堅又將備禮徵之難其年耆路遠乃遣使致問未至卒堅深悼之又曰張忠字巨和中山人也永嘉之難隱於太山恬靜寡欲清虛服氣飡芝餌石修導養之法冬無縕袍夏則帶索端拱尸居無琴書之適不修經典勸教但以至道虛無為宗其居依崇巖幽谷鑿地為窟居去忠六十餘步五日一朝其教以形不以言弟子授業觀形而退立道壇于窟上每旦朝拜之食用瓦器鑿而為谷左右居人饋之衣食一無所受年在期頤而視聽無爽符堅遣使徵之乃至長安堅賜以衣冠辭曰年朽髮落不堪衣冠請以野服入謁從之後堅以安車送之行達華山歎曰我東岳士歿於西岳命也奈何行五十里及關而死堅謚安道先生又曰石垣字洪孫自云北海劇人居無定處不娶妻妾不營產業食不求美衣必麤弊或有遺其衣服受而施人人有喪葬輒杖策弔之路無遠近時有寒暑必在其中或同日共時咸皆見之姚萇之亂莫知所終又曰郭荷字承休洛陽人也六世祖整漢安順之世公府八辟公車五徵皆不就自整及荷世以經學荷明究群籍特善史書不應州郡之命張祚遣使者以束帛安車徵為博士祭酒後上䟽乞還祚以安車蒲輪送還張掖東山年八十卒謚曰玄德先生又曰祁嘉字孔賓酒泉人也少清貧好學年二十餘夜忽窗中有聲呼曰祁孔賓隱去來脩飾人間甚苦不可諧所得未毛銖所喪如山崖旦而逃去至燉煌依學官誦書貧無衣食為儒生都養以自給遂博通經傳精究大義而教授門生百餘人張重華徵為儒林祭酒常謂為先生而不名之以壽終又曰瞿硎先生者不得姓名亦不知何許人也泰和末常居宣城郡界山中有瞿硎因以名焉大司馬桓溫常往造之既至見先生被鹿裘坐于石室神無忤色溫及僚佐數十人皆莫測之乃命伏滔為之銘贊竟卒於山中又曰宋纖字令文燉煌人也少有遠操沉靜不與世交隱於酒泉南山酒泉太守馬岌高尚之士也具威儀鳴鍾鼓造纖纖高樓重閤拒而不見岌歎曰名可聞而身不可見德可仰而形不可觀吾乃今而後知先生人中之龍也題詩於石壁曰丹崖百丈青壁萬尋奇木蓊鬱蔚若鄧林其人如玉維國之琛室邇人遐實勞我心纖注論語及為詩頌數萬言年八十篤學不倦張祚復遣使者備禮徵為太子友逼喻甚切纖喟然歎曰德非干木何敢稽停明命遂至姑臧祚遣其太子太和以執友禮造纖稱疾不見贈遺一皆不受後卒謚曰玄虛先生又曰鄧粲長沙人也少以高潔著名與南陽劉驎之南郡劉尚公同志友善並不應州郡辟命荊州刺史桓公卑辤厚禮請粲為別駕粲嘉其好賢乃起應召驎之尚公謂粲曰卿道學深眾所推懷忽然改節誠失所望粲荅曰足下可謂有志於隱而未知隱夫隱之為道朝亦可隱市亦可隱隱初在我不在於物公等無以難之又曰汜騰字無忌燉煌人舉孝廉除郎中天下兵亂去官還家太守張閟造之閉門不見禮遺一無所受歎曰吾聞亂世貴而能貧乃可以免散家財五十萬以施宗族柴門灌園琴書自適刺史張軌徵之為府司騰曰門一杜其可開乎固辤病卒又曰王長文字德郁廣漢人少以才學知名放蕩不羈州郡辟為別駕乃微服竊出舉州莫知所之後於成都市中蹲踞而坐齧胡餅食之刺史知其不出乃禮遣之於是閉門自守不交人事著通玄經, WYG: ''}
