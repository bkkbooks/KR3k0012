  - {type: variant, offset: 2655, length: 1, content: 度, WYG: 南陽人也髙祖領荆州辟為主簿不起問其故答曰栖丘飲谷三十餘年豈可於黄門折腰為趍走吏乎髙祖善其對妙善琴書精於言理每逰山水徃輙忘歸西長史王𢎞每從之逰未嘗不弭日也乃下入廬山就釋恵逺考尋文義兄臧為南平太守逼與俱還乃於江陵三湖立宅閒居無事髙祖召為太尉叅軍不就二兄早卒孤累甚多家貧無以相贍頗營稼穡髙祖數致餼賚宋受禪徴為太子舍人元嘉初又數徴庻子並不應衡陽王在荆州親至炳室與之飲讌命為諡議不起好山水愛逺遊西陟荆巫南登衡岳因而結宇衡山欲得尚平之志有疾還江陵歎曰老疾俱至名山恐難逰遍唯當澄懐觀道卧遊以理皆圖之於室謂人曰撫琴動操欲令衆山皆響古人金石弄唯炳𫝊焉太祖遣樂師卧就炳受之元嘉二十年炳卒又曰王𢎞之字方平琅琊臨沂人家貧而性好山水桓𤣥輔晉桓謙以為衛軍叅軍時殷仲文還姑孰祖送傾朝謙要𢎞之同行答曰凡祖帷送别必在有情下官於殷風馬不接無縁扈從謙貴其言隨兄敬之居成都𢎞之解職同行家在會稽上虞敬之常解貂裘與之即著以採藥性好釣上虞江有一處名三石頭𢎞之常垂綸於此經過者不之識或問漁師得魚賣否𢎞之曰亦自不得亦不賣日夕載魚入至上虞郭經親故門各以一兩頭置門内而去始寧沈州有佳山水𢎞之又依巖築室謝靈運顔延之並相欽重又曰劉凝之字志安少名長年慕老萊嚴子陵為人推家財與弟及兄子立屋于野外非其力不食州里重其仁徳禮辟並不受妻涼州刺史郭鈴女也遣送豐麗凝之悉散之親族妻亦能棄榮華共安儉苦徴為秘書郎不就荆州年飢衡陽王慮凝之餒弊餉錢十萬凝之大喜將錢至市門觀有飢色者悉分與之性好山水一旦攜妻小泛江湖隠居衡山之陽登髙山絶人迹為小屋居之採藥服食妻子皆從其志又曰龔祈字道孟武陵漢夀人也父黎民及祈並不應徴辟其風姿端雅容止可觀中書郎范述見而歎曰此荆楚仙人也時或賦詩不言及世事又曰翟法賜潯陽柴桑人祖湯湯子莊莊子矯並髙尚不仕逃避徴辟矯法賜少守家業立屋於廬山頂居後便不復還家不食五穀以獸皮結草為衣辟著作郎不就後家人至石室尋求因復逺徙違避徴聘遁迹幽深後卒於巖石之間又曰沈道䖍}
