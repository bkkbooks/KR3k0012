  - {type: variant, offset: 473, length: 1, content: 屬, SBCK: 琴書顒並傳之凢諸音律皆能揮手㑹稽剡縣多名山故丗居剡下顒及兄㪍並受琴於父父没所傳之聲不忍復奏各造新弄桐廬縣又多名山兄弟復共逰之因留居止以桐廬僻逺難以飬疾乃出居呉下呉下士人共爲築室乃􅄒莊周大旨著逍遥論太祖元嘉􅀄徴散􅀐常侍並不就太祖毎欲見之常謂黄門侍郎張敷曰吾東廵之日當讌戴公山也以其好音長給正聲􅇊一部卒年六十四後景陽山成上歎曰恨不使戴顒觀又曰宗炳字少}
