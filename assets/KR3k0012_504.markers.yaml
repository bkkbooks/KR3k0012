  - {type: variant, offset: 1158, length: 400, content: 也永嘉之難隱於太山恬靜寡欲清虛服氣飡芝餌石修導養之法冬無縕袍夏則帶索端拱尸居無琴書之適不修經典勸教但以至道虛無為宗其居依崇巖幽谷鑿地為窟居去忠六十餘步五日一朝其教以形不以言弟子授業觀形而退立道壇于窟上每旦朝拜之食用瓦器鑿而為谷左右居人饋之衣食一無所受年在期頤而視聽無爽符堅遣使徵之乃至長安堅賜以衣冠辭曰年朽髮落不堪衣冠請以野服入謁從之後堅以安車送之行達華山歎曰我東岳士歿於西岳命也奈何行五十里及關而死堅謚安道先生又曰石垣字洪孫自云北海劇人居無定處不娶妻妾不營產業食不求美衣必麤弊或有遺其衣服受而施人人有喪葬輒杖策弔之路無遠近時有寒暑必在其中或同日共時咸皆見之姚萇之亂莫知所終又曰郭荷字承休洛陽人也六世祖整漢安順之世公府八辟公車五徵皆不就自整及荷世以經學荷明究群籍特善史書不應州郡之命張祚遣使者以束帛安車徵為博士祭酒後上䟽乞還祚以安車蒲輪送還張掖東山年八十卒謚曰玄德先生又曰祁嘉字孔賓酒泉人也少清貧好學, SBCK: ''}
