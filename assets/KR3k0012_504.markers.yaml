  - {type: punctuation, offset: 2549, content: 「, id: KR3k0012_CHANT_504-bkkpn618}
  - {type: variant, offset: 2549, length: 314, content: 郭翻字長翔不交世事家於臨川唯以漁獵為娛常以車獵道逢病人以車送之徒步而返庾亮薦公車徵不就乘小舡歸武昌庾翼躬往造之以翻船狹小欲引入大船翻曰使君不以名鄙賤而辱臨之此固野人之舟也遂不肯翼便俯屈入其船中終日而去又曰孫略字文度吳人少佃於野人有刈其稻者略避之既而刈一擔自送與之鄉人感愧終日屢空怡然自足辟命皆不就妻虞預女也少稟伯喜風共安儉約又曰何琦音奇字萬倫養志衡門不交人事豊約與鄰鄉共之頻徵不起桓溫登琦縣界山喟然歎曰此山南有人焉何某真正是也又曰陶淡字處靜侃之孫雅好仙道年十五六便服食於山中立小草屋設小床獨坐故舊入山候者輒移渡澗莫得近本州舉秀才淡聞遂逃羅縣山中終身不返莫知所終又曰范宣少尚隱遁博綜眾書徵并不應雖閑居屢空常研講為業諷誦之聲有若齊魯, SBCK: 呉}
