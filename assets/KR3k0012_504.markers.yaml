  - {type: variant, offset: 469, length: 3, content: 尚博學, SBCK: 行乃往東陽隱居不仕屢􅀍徴辟聲譽甚髙山中有蚿虫聲清長而形醜素乃爲蚿賦以自况又曰戴顒字仲􅀂譙郡銍人也父逵兄㪍並隱遁有髙名顒年六十遭父憂幾於毁滅因此長抱羸患又不仕復修其業父}
