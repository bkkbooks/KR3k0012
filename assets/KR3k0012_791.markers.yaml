  - {type: variant, offset: 1149, length: 2, content: 長股, krp: 服墨𤏡濮廣志曰墨𤏡濮在永昌西南山居耐勤苦其衣服婦人以一幅布爲裙或以貫頭丈夫以榖皮爲衣其境出白蹄牛犀象武魄金銅華布朱提永昌郡傳曰朱提郡在犍爲南千八百里治朱提縣川中縱廣五六十里有大泉池水湏名千湏池又有龍池以灌漑種稻與𤏡道接時多援郡取鳴嘯於行人徑次聲聒人耳夷分布山谷間食肉衣皮雖有人形禽獸其心言語服飾不與華同有堂狼山山多毒草盛夏之月飛鳥過之不能得去又曰建寧郡朱提之東南六百里土氣和適盛夏之月熱不鬱述猛冬時寒慘慄又曰末昌郡在雲南西七百里郡東北八十里瀘倉津此津有鄣氣徃以三月渡之行者六十人皆悉悶亂毒氣中物則有聲中樹木枝則折中人則令奄然青爛也又曰興古郡在建寜南八百里郡領九縣縱經千里皆有瘴氣蒜榖雞豚魚酒不可食皆食啖病害人郡北三百有盤江廣數百歩深十餘丈此江有毒瘴九縣之人皆号曰鳩民言語嗜慾不與人同鳩民咸以三尺布角割作兩䄡不復加鍼縷之功也廣頭着前狹頭覆後不盖其形與祼身無異昆弥}
