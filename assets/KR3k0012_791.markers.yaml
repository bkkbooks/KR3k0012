  - {type: variant, offset: 61, length: 1, content: 遠, WYG: 臣使也蒙廼上書罪惡未成未疑漢家加誅隂勅旁郡守尉練士馬大司農先調榖積要害處調發也要害者在我為要於敵為害也調音徒釣切選任職太守徃以秋凉時入誅}
