  - {type: variant, offset: 531, length: 0, content: '', WYG: 夜郎者初有女子浣於遯水有三節大竹流入足間聞其中有號聲剖視之得一男兒歸而養之及長有才武自立為夜郎侯以竹為姓武帝平南夷夜郎侯迎降天子賜其王印綬後遂殺之夷獠咸以竹王非血氣所生甚重之求為立後牂牁太守吳覇以聞天子乃封其三子為侯死配食其父今夜郎縣有竹王神是也滇漢書曰南夷君長其西靡莫之屬以十數滇地最大皆椎髻耕田有邑聚楚威王時使將軍莊蹻將兵循江上略巴黔中以西莊蹻至滇池地方三百里旁地肥饒數千里以兵威定屬楚欲歸報㑹秦撃奪楚巴黔中郡道塞不通漢元狩中天子乃令王然于柏始昌吕越人等十餘軰間出西南夷指求身毒國至滇滇當羗乃留為求道四嵗餘皆閉昆明莫能通滇王與漢使言孰與我大及夜郎侯亦然各自以一州王不知漢廣大使者還因盛言滇大國足事親附天子注意焉漢晉春秋曰亮在南中所在戰㨗聞孟獲者為夷漢並所服募生致之既得使觀于營陣之間問曰此軍何如獲曰不知虛實故敗定易勝耳亮縱之使更戰七擒而亮猶遣獲止不去曰公天威也南人不復反矣遂至滇池南中皆平卭漢書曰自滇以北君長以十數卭都最大皆椎髻耕田有邑聚後漢書曰邛都夷者武帝開以為卭都縣無幾而地䧟為汚澤因名為卭池南人以為卭河其後復反叛元鼎六年漢兵自越嶲水伐平之以為越嶲郡其郡土地平原有稻田俗多逰蕩而喜謳歌畧與牂牁相類豪帥放縱難得制御王莽時郡守枚根調卭人長貴以為軍侯更始二年長貴攻殺根自立為卭谷王至光武因就封之授越嶲太守印綬後劉尚撃益州夷路由越嶲長貴聞之疑尚既定南邉威法必行已不得自放縱即聚兵托呼諸君長多醸毒酒欲先以勞軍因襲擊尚知其謀即分兵先據卭都遂掩長貴誅之徙其家屬於城都又曰永平中卭都太守巴郡張翕政化清平得夷人和在郡十七年卒夷人愛慕如䘮父母蘇祈斯文叟二百餘人齎牛羊送䘮至翕本縣起墳祭祀詔書嘉美為立祠堂後夷反亂天子以翕有遺愛拜其子湍為太守夷人歡喜皆奉迎道路曰郎君儀貌類我府君後湍頗失其心有欲反者諸夷耆老相曉語曰當為先府君故遂得以安南中八郡志曰卭河縱廣二十里深百餘丈多大魚長一二丈頭特大遥視如戴鉄盆狀李膺益州記曰卭都縣下有一老姥家貧孤獨每食輙有小蛇頭上戴一角在床間姥憐飴之後稍長大遂長丈餘令有駿馬蛇遂吸殺之令因大忿恨令姥責出蛇毋云在床下令即掘地愈大而無所見令遷怒殺姥蛇乃感人以靈言嗔令何殺我母當為母報讎此後每夜則聞若風四十許日百姓相見咸驚語汝頭郍忽戴魚是夜方四十里許一時俱䧟為湖土人謂之為䧟河唯毋宅無恙訖今猶存漁人採捕必依止宿每有浪輙居宅側恬静無他風静水清猶見城郭樓櫓畟然今水淺時土人下水取得舊木堅貞光黒如漆好事者以為枕相贈焉莋漢書曰自嶲以東北君長以十數莋都最大其俗或土著或移徙後漢書曰莋都夷者武帝所開以為莋都縣其人被髪左袵言語多譬類居處畧與汶山夷同土出長年神藥仙人山圖所居焉元鼎六年以為沉黎郡至天漢四年并蜀為兩部置兩部尉一居旄牛主徼外一居青衣主漢人也巂漢書曰桐師以東北至菓榆名為嶲昆明編髪隨畜遷徙無常處無君長地方可數千里永昌郡𫝊曰越嶲郡在建寧西北千七百里沿江都縣自建寧髙山相連至川中平地東西南北八千餘里郡特好桑蠶宜黍稷麻麥稻梁冉駹漢書曰自莋以東北君長以十數冉駹最大其俗或土著或移徙後漢書曰冉駹夷者武帝所開元鼎六年以為汶山郡今蜀郡西北通化郡地也至宣帝地節三年夷人以為賦重帝乃省并蜀郡為北部都尉其山有六夷七羗九氐各有部落其王侯頗知文書禮法俗嚴重貴婦人黨毋族死則燒其尸土氣多寒雖在盛夏氷猶未釋皆依山居止累石為高屋者至十餘丈為卭籠今彼土夷人呼為雕又土瘠地鹵不生榖粟麻菽唯以麥為資而宜畜牧有旄牛無角一名犝牛肉重千斤毛可為眊出名馬有靈羊可療毒又有食藥鹿麑有胎者其腸中糞亦療毒疾又有五角羊麝香輕毛毼鷄猩猩其人能作旄氊青頓班罽毞毲羊羧之屬青頓毲羧並未字詳此字書無二特多雜藥地有鹹土煑以為鹽鹿羊牛馬食之皆肥其西又有三河槃于虜北有黄石北地盧水胡其表乃為徼外後靈帝時復分蜀郡北部為汶山郡白馬漢書曰蜀之西冉駹以東北君長以十數白馬最大皆氐類也後漢書曰白馬氏者武帝元鼎中分開廣漢西部合以為武都土地險阻有麻田出名馬牛羊漆蜜氐人四面斗絶數為邉冦郡縣討之則依固自守元鳳初執金吾馬適建姓馬名適建等將三輔太常徒討破之建武初氐人悉附隴蜀及隗囂滅其酋豪乃背公孫述降漢馬援上復其王侯君長賜以印綬後囂族人隗茂反殺武都太守氐人大豪齊鍾留為種類所敬信威服諸豪與郡丞孔􅁬擊茂破斬之白狼夷後漢書曰永平中益州刺史梁國朱輔好立功名慷慨有大畧在州數嵗宣示漢徳威懐逺夷自汶山以東前代所不至正朔所不加白狼槃木唐菆等百餘國户百三十餘萬口六百萬以上舉種奉貢稱為臣僕輔上䟽曰臣聞詩云彼徂者岐有夷之行𫝊曰岐道雖僻而人不逺詩人誦詠以為符騐今白狼王唐菆等慕化歸義作詩三章路經卭來大山零高坂峭危峻險百倍岐道繈負老幼若歸慈母逺夷之語辭意難正草木難種鳥獸殊類有犍為郡掾田㳟與之習狎頗曉其言臣輙令訊其風俗譯其詞語今遣從事史李陵與恭䕶送詣闕并上其樂詩昔在聖帝舞四夷之樂今之所上庶備其一帝嘉之事下史官錄其歌焉東觀記載其歌並載夷人本語並重譯訓詁為華言今范史所載者是也至和帝永元十二年旄牛徼外白狼樓薄蠻夷王唐繒等遂率種人十七萬口内屬樿國音檀後漢書曰和帝永元九年椫國王雍由調遣使重譯奉國珍寳帝賜金印紫綬}
