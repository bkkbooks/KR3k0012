  - {type: variant, offset: 115, length: 3, content: 讙朱國, SBCK: 夜郎者􅀄有女子浣於遯水有三節大竹流入足間聞其中有號聲剖竹視之得一男子歸而養之及長有才武自立爲夜郎侯以竹爲姓武帝平南夷夜郎侯迎降天子賜其王印綬後遂殺之夷獠咸以竹王非血氣所生甚重之求爲立後牂柯太守吴霸以聞天子乃封其三子爲侯死配食其父今夜郎縣有竹王}
