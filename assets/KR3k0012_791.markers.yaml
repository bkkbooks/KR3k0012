  - {type: variant, offset: 535, length: 1, content: 中, WYG: 復遣朝貢獻樂及幻人能變化吐火自支解易牛馬頭又善跳丸數乃至千自言我海西人海西即大秦也樿國西南通大秦明年元㑹安帝作樂於庭封雍由調為漢大都尉賜印綬金銀綵繒各有差牂柯後漢書曰初楚頃襄王時遣將莊豪從沅水伐夜郎軍至且蘭椓船於岸而歩戰既滅夜郎因留王滇池以且蘭有椓船牂柯處乃改其名為牂柯牂柯地多雨潦俗好巫鬼禁忌寡畜生又無蠶桑故其郡最貧有桄榔木可以為麵百姓資之又曰公孫述時牂柯大姓龍𫝊尹董氏與郡曹謝暹保境為漢乃遣使從番禺江奉貢光武嘉之並加褒賞桓帝時郡人尹珍自以生於荒裔不知禮義乃從汝南許慎應奉受經書學成還鄉里敎授自是南域始有學焉}
