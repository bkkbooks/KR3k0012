  body:
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 七西南夷夜郎滇卭莋嶲冉駹白馬白狼夷禪國牂牁濮尾濮木綿濮文面濮析􅆎濮赤口濮黒􅈎濮朱提昆弥靣㸑東女國西南夷梁祚魏國統曰西夷土有異犀三角夜行如大炬火照數十歩或時解脫則藏於􅀷宻之處不欲令人見之王者貴其異以爲􅆪札消除㓙逆又曰西南夷有大湖名曰禁水水中有毒氣中有物嘖嘖作聲射中木石則破裂中人則死其俗名曰􅀑彈聞聲巳至不可得見故也郭義恭廣志曰建寧郡其氣平冬不極寒夏不極暑盛夏如此五月盛冬如此九月天下之異地海内唯有此按月令記五氣中之位冝在西南如此豈當土行之方戊巳之域乎夜郎漢書曰南夷君長以十數夜郎最大漢武帝建元}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_SBCK_791-1b}
