  - {type: variant, offset: 1113, length: 2, content: 白民, SBCK: 陽令伊尹爲四方獻令伊尹曰臣請正南歐隑五來切柱國指子陸童百濮九箘請今以珠璣瑇琩象齒文犀翠羽􅙪鶴短狗爲獻永昌郡傳曰雲南郡在建寧南四十五里治雲南縣亦多夷濮分布山野千五百人女大小蹲踞道側皆持數種器杖時宼鈔爲郡邑}
  - {type: variant, offset: 1113, length: 2, content: 白民, WYG: 湯令伊尹為四方獻令伊尹曰臣請正南甌鄧桂國指子産里百濮九箇請令以珠璣瑇瑁象牙齒文犀翠羽箘鶴短狗為獻永昌郡𫝊曰雲南郡在建寧南二十五里治雲南縣亦多夷濮分布山野千人五百女大小蹲踞道側皆持數種器杖時㓂鈔為郡邑}
