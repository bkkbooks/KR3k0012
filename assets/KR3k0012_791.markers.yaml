  - {type: variant, offset: 1602, length: 0, content: '', WYG: 北八十里瀘倉津此津有瘴氣徃以二月渡之行者六十人皆悉悶亂毒氣中物則有聲中樹木枝則折中人則令奄然青爛也又曰興古郡在建寕南八百里郡領九縣經千里皆有瘴氣菽榖雞豕魚酒不可食之害人郡北三百里有槃江廣數百歩深十餘丈此江有毒瘴九縣之人皆號曰鳩民言語嗜欲不與人同鳩民咸以三尺布角割作兩䄡不復加鍼縷之功也廣頭着前狹頭覆後不盖其形與裸身無異昆彌國唐書曰昆彌國一曰昆明西南夷也在爨之西洱河為界即葉榆河其俗與突厥畧同相𫝊云與匈奴本是兄弟國也漢武帝得其地入益州部其後復絶諸葛亮定南中亦所不至武徳四年嶲治中吉𢎞使南寧因至其國諭之至十二月遣使朝貢貞觀十九年四月右武侯將軍梁建方討蠻降其部落七十二户十萬九千三百西爨唐書曰西爨者南寕之渠帥也自云本河東安邑人七世祖仕晉為南寧太守屬中國亂遂王蠻夷梁元帝時南寧州刺史徐文威徴詣荆州有爨瓉者遂據南寧之地延袤}
