  - {type: variant, offset: 1606, length: 69, content: 毛人在大海中州島上為人短小面體有毛如豬熊云居亦衣服晉永嘉四年吳都郡司鹽都尉戴建云在海邊得一舩上有男女四人狀皆如此言語不通送詣承相府未至道路, SBCK: 俗多華民饒駿馬明珠犀象瓉}
  - {type: variant, offset: 1606, length: 3, content: 毛人在, WYG: 俗多華民饒駿馬明珠犀象瓉死有二子震翫分統其衆隋開皇初遣使朝貢文帝遣韋世冲將兵鎮之析置㳟州協州昆州未幾復叛後遣史萬嵗撃之所至皆破踰西洱河臨滇池而還翫懼而來朝文帝誅之諸子沒為官奴不収其地因與中國絶高祖受禪拜翫子𢎞達為昆州刺史持其父屍歸葬本郷益州叚綸又遣俞}
