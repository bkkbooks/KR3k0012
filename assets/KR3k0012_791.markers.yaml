  - {type: variant, offset: 1116, length: 0, content: '', SBCK: 害尾濮永昌郡傳曰郡西南千五百里徼外有尾濮尾􅀂􅀛形長三四寸欲坐輙先穿地空以安其尾􅀂邂逅誤折尾便死男女長各隨冝野㑹無有嫁娶猶知識母不復别父俗云貸老相食則此濮也古人所􅀃非目見也扶南土俗傳曰枸利東有蒲羅中人人皆有尾長五六寸其俗食人按其地並西南蒲羅盖尾濮之地名梁祚魏}
