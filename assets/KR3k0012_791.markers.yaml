  - {type: variant, offset: 2354, length: 981, content: 南州異物志曰察牢在安息中間大國也去天竺五千里人民勇健舉國人皆稱王種國無常王國人常選耆老有德者立為王三歲一更舉土地所與天竺同慕其土地不出國遠行類人南州異物志曰扶南海隅有人如獸此人扶南之東緣海邊略如禽獸人旡道也身黑若漆齒白如素扶南以外民皆漆齒使黑而此人身體雖獨不漆齒故正白也隨時流移居無常處此民不知安立屋宅乃隨寒暑素逐飲身體雖小夏則入水捕魚螺冬則登山射麋鹿也食唯魚肉不識禾稼寒無衣服以沙自覆此人無衣服若小過寒涼輒自覆惟以出面目耳時或屯聚豬犬雞糅此人旡衣服若遇寒涼以沙自覆惟以出面目耳時或此人或時權有可得停猶知立一小屋以自藉家中男女大小並止豬犬共息其中旡復分別也雖忝人形無踰六畜雕題國異物志曰雕題國畫其面及身刻其肥而青之或若錦衣或若魚鱗狼臙國異物志曰狼臙國男無衣服女撗布帷出與漢人交易不以晝市暮夜會俱以鼻嗅金則知好惡瓮人異物志曰瓮人齒及目甚鱗白面體異黑若漆皆光澤為奴婢強勤力黃頭人異物志曰黃頭人群相隨行無常居處其類與禽獸同或依大樹以草被其枝上而庇陰其下髮正黃如掃箒見漢人散入草終不可得近儋耳國異物志曰儋耳夷生則鏤其頭皮尾相連並鏤其耳匡為數行與頰相連狀如鷄腹下垂肩上食藷時諸切紡績為業穿胸國異物志曰穿胸人其衣則縫布二幅合兩頭開中央以頭貫穿胸身不突穿西屠國異物志曰西屠國在海水以草漆齒用白作黑一染則歷年不復變一號黑齒交州以南外國傳曰有銅柱表為漢之南極界左右十餘小國悉屬西屠有夷民所在二千餘家金鄰國異物志曰金鄰一名金陳去扶南可二千餘里地出銀人民多好獵大象生得乘騎死則取其牙齒外國傳曰從扶南西去金陳二千餘里到金陳波遼國外國傳曰從西圖南去百餘里到波遼十餘國皆在海邊屈都乾國外國傳曰從波遼國南去乘舩可三千里到屈都乾國地有人民可二千餘家皆曰朱吾縣民叛居其中波延洲外國傳曰從屈都乾國東去舡行可千餘里到波延洲有民人二百餘家專採金賣與屈都乾國究原國民外國傳曰究原有獠民出錫鐵雞舌香及赤白五色鸚鵡鳥究原達永昌一歲奴後國外國傳曰從林陽西去二千里奴後國可二萬餘戶與永昌接界炎人國愽物志曰楚之南炎人之國其親戚死刳肉死棄之然後埋其骨乃成孝子黃孫愽物志曰黃孫天毒君之孫也名貴負躁而好自飲汁父母笑之愧而去居此黃孫國去九嶷二萬一千里落頭民愽物志曰南方有落頭民其頭能飛其種人常有所祭號曰蟲落故因取名焉以其頭飛因眼便去以耳為翼將曉還復著體吳時往往得之鮫人愽物志曰南海水有鮫人水居如魚不廢織績其眼能泣珠松外諸蠻, SBCK: ''}
