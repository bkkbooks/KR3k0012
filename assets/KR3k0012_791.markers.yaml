  - {type: variant, offset: 105, length: 422, content: 使其子居南而祠也一曰讙朱國神異經曰南方荒中有人人手鳥足杖翼而行但食海中魚雖有翼不足以飛倚為徑行勢也一名讙兜為人佷惡姦踈不畏風雨不忌禽獸有所觸犯死乃休耳厭火國山海經曰厭火國其獸身黑色火出其口中似彌猴黑色也三苗國書曰堯竄三苗于三危山海經曰三苗國在赤水東神異經曰西北荒中有人焉皆人形而腋下有翼不能飛名曰苗民為人饕餮淫逸無禮外國圖曰昔唐以天下授虞有苗之君非之苗之民浮黑水入南海是為三苗民去九疑三萬三千里臷國山海經曰臷國其操弓射蛇大荒經曰此國國皆然有五穀衣服一曰盛國括地圖曰禹誅防風民夏德二龍降之禹使范氏御之以行經南方防風神見禹怒使射之有迅雨二龍升去臣懼以刃自貫其心死禹哀之療以不死草皆生是名穿匈民去會稽萬五千里交脛國山海經曰交脛國在貫匈東其人交脛言腳脛曲失相交所謂雕題交趾者外國圖曰交脛民長四尺不死國山海經曰不死國在交脛東其人黑色壽考有員丘山不死樹食之不死有赤泉飲之不老支舌國山海經曰支舌國在不死東其人舌皆歧或云支舌也三首國山海經曰三首國一身三首僬僥國, WYG: ''}
  - {type: variant, offset: 108, length: 1, content: 居, SBCK: 爲令夜郎旁小邑皆貪漢繒帛以爲漢道險終不能有也乃且聽􅂪約還報乃以爲犍爲郡發巴蜀卒治道自􅈎道指牂柯江蜀人司馬相如亦言西夷卭莋可置郡使相如以中郎將徃諭皆如}
  - {type: variant, offset: 108, length: 1, content: 居, krp: 爲令夜郎旁小邑皆貪漢繒帛以爲漢道險終不能有也乃且聽蒙約還報乃以爲犍爲郡發巴蜀卒治道自𤏡道指牂柯江蜀人司馬相如亦言西夷卭莋可置郡使相如以中郎將徃諭皆如}
  - {type: variant, offset: 110, length: 2, content: 而祠, SBCK: 夷爲置一都尉十餘縣屬蜀後數歳道不通士罷餓餧離暑濕死者甚衆西南夷又數反發兵興擊耗費亡功上患之使公孫弘徃視問焉還報言其不便上許之罷西夷獨置南夷兩縣一都尉稍令犍爲自保就令自保守且脩成其郡縣也夜郎侯始􅀝南粤南粤反巳滅還誅反者夜郎遂入朝上以爲夜郎王又曰昭帝始元中牂柯談指同並等二十四邑凢三萬餘人皆反並音伴談指同並後皆爲縣属漢牂柯郡遣水衡郡都尉發蜀郡犍爲兵擊破之後姑繒葉榆人復反鈎町侯亡波率其人擊之有功漢立亡波爲釣町王至成帝河平中夜郎王興與鈎町王禹漏卧侯俞漏卧侯邑名後爲縣属牂柯更舉兵相攻牂柯大守請發兵誅興等議者以道逺不可擊遣太中大夫張匡持節和解並不從杜欽􅀃王鳯曰張匡和解蠻夷王侯王侯不從不憚國威其効可見恐議者選耎復守和解選耎怯不前之意也選音息兖反耎音人兖反太守察動静有變迺以聞如此則復曠一時曠空}
  - {type: page-break, offset: 110, content: '', id: KR3k0012_SBCK_791-2b}
