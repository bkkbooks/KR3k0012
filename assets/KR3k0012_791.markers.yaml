  - {type: variant, offset: 1773, length: 231, content: 穴處雖云象人不知言語齊長五尺毛如熊豕眾輩相隨逐捕鳥鼠旡五穀唯捕鳥鼠魚肉以為糧耳勞民國山海經曰勞民國為人黑食果草實也有一鳥兩頭也手足盡黑氐人國山海經曰氐人國者觸抵之抵在建木西人面而魚身無足自胸以上人以下魚也姑射國山海經曰姑射國在海中蜮國山海經曰域有山者域有民之國食桑射蜮是食虵短狐也似鱉含沙射人中則病死則山出之也沃國山海經曰有沃之國言其土饒沃也沃民是處鳳凰鳥之卵是食甘露是飲故其欲其味皆存也反風國道書曰反風之國香逆風聞千里也林郍國竹芝扶南記曰林郍國蠻其延國未多曰黎, SBCK: 因}
