  - {type: variant, offset: 3526, length: 209, content: 馬牛豬羊雞犬飯用竹筲搏之而取羹用象柸若鷄彝有舩無車男女氈皮為帔女子絕布為裙於仍披氈皮之帔頭髻一盤而成形如髽阻瓜切男女皆跣至於死喪哭泣棺槨襲劍無不畢備三年之內穿地為坎殯於舍側上作小屋三年之外出而葬之蠡封蚌棺今其耐濕父母死皆斬衰布衣遠者至四五年近者三二年然後即吉其被人殺者喪主以麻結髮而黑其面衣裳不緝唯服內不廢婚妻不避同姓其俗有盜竊殺人淫穢之事酋長節立一長木為擊鼓警眾共會其下強盜者眾共殺之若賊家富強但燒其屋宅奪其田業而已, SBCK: 差卷終}
