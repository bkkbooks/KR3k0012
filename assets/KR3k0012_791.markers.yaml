  - {type: variant, offset: 114, length: 0, content: '', SBCK: 時三月言空廢一時不早發兵也王侯得収獵其衆申固其謀黨助衆多各不勝忿必相殄滅自知罪成狂勃守尉言起狂勃心而殺守尉逺藏温暑毒草之地雖有孫吴將賁育士􅀂入水火徃必焦没智勇俱亡所設施屯田守之費不可勝量冝因其罪惡未成疑漢加誅隂勑旁郡守尉練士馬大司農先調穀積要害處調發也要害者在我爲要於敵爲害也調音徒釣切選任職太守徃以秋凉時入誅其王侯尤不軌者即以爲不毛之地亡用之人聖王不以勞中國即猶草也不毛言不生草木也冝罷郡放弃其民絶其王侯勿復通如以先帝所立累代之功不可隳壞亦冝因其萌芽早断絶之及巳成形後師興則萬姓􅀍害矣鳯於是薦陳立爲牂柯太守立至牂柯迺從吏數十人出行無何召興將數千人出徃立數責因断興頭出曉其衆皆釋兵降釋解也興子耶務収餘兵迫脅旁二十邑反立又擊平之後漢}
  - {type: page-break, offset: 114, content: '', id: KR3k0012_SBCK_791-3a}
