  - {type: variant, offset: 531, length: 0, content: '', krp: 滇郡有池周回二百餘里水源深而末更淺狹有似倒流故謂之滇池河土平敞多岀鸚鵡孔雀有塩池田漁之饒金銀畜産之冨人俗豪俠居官者皆冨及累代及王莽政亂益州郡夷棟蚕若豆等起兵殺郡守越嶲姑復夷人大牟亦皆叛莽遣寧始將軍廉丹發巴蜀吏人卒徒十萬擊之連年不尅而還以廣漢文齊爲太守群夷始得其和及公孫述據益土齊固守拒險聞光武即位乃聞道遣使自聞蜀平徵爲鎭逺將軍封成義侯於道卒詔爲起祠堂郡人立廟祠之又曰建武十八年夷渠帥棟蚕與姑復挵㨂揲榆連然滇池建怜昆明諸種反叛遣武威將軍劉尚發卒擊之尚軍渡瀘水入益州界群夷皆弃壘奔走尚進軍連戰皆破之追至不韋孫盛蜀譜曰𥘉秦徙吕不韋子弟宗族於蜀漢武開西南夷置郡縣徙吕氏以充之因置不韋縣斬獲甚衆諸夷悉平又章帝元和中蜀郡王阜爲太守政化尤異有神馬四疋出滇池中蜀志曰後主建興二年諸葛亮率衆南征所戰皆捷孟獲者爲夷所服募生致之旣得使觀於營陣之間問曰此軍何如獲曰不知虚實故敗定易勝耳亮縱之使更戰七擒而亮猶遣獲獲止不去曰公天威也南人不復反矣遂至滇池南中皆平卭漢書曰自滇以北君長以十數卭都最大皆椎髻耕田有邑聚後漢書曰卭都夷者武帝開以爲卭都縣無幾而地䧟爲汙澤因名爲卭池南人以爲卭河其後復反叛元鼎六年漢兵自越嶲水伐平之以爲越嶲郡其郡土地平原有稻田俗多遊蕩而喜謳歌略與牂柯相類豪帥放縱難得制御王莽時郡守枚根枚根太守姓名也調卭人長貴以爲軍侯更始二年長貴攻殺根自立爲卭榖王至光武因就封之授越嶲太守印綬後劉尚擊益州夷路由越嶲長貴聞之疑尚旣定南邊威法必行巳不得自放縱即聚兵招呼諸君長多釀毒酒欲先以勞軍因襲擊尚尚知其謀即分兵先據卭都遂掩長貴誅之徙其家属於成都又曰安帝時永昌益州蜀郡夷並今雲南郡也皆叛衆十餘萬破壞二十餘縣益州刺史張喬乃遣從事楊竦將兵至楪榆破之渠帥三十六種皆來降附竦因奏長吏姦猾侵犯蠻夷者九十人皆减死論又曰永平中卭都太守巴郡張翕政化清平得夷人和在郡十七年卒夷人愛慕如䘮父母蘇祁斯人叟二百餘人齎牛羊送喪至翕本縣起墳祭祀詔書嘉羙爲立祠堂後夷人反亂天子以翕有遺愛乃拜其子湍爲太守夷人歡喜皆奉迎道路曰郎君儀貌類我府君後湍頗失其心有欲叛者諸夷耆老相曉語曰當爲先府君故遂得以安南中八郡志曰卭河縱廣二十里深百餘丈多大魚長一二丈頭持大遥視如載鐵釜狀李膺益州記曰卭都縣下有一老姥家貧孤獨毎食輙有小虵頭上戴角在床間姥憐飴之後稍長大遂長丈餘令有駿馬虵遂吸殺之令因大忿恨令姥責出虵母云在床下令即掘地愈大而無所見令遷怒殺姥虵乃感人以靈言嗔令何殺我母當爲母報讎此後毎夜輙聞若風四十許日百姓相見咸驚語汝頭郍忽戴魚是夜方四十里與城一時俱䧟爲湖土人謂之爲䧟河唯姥宅無恙訖今猶存漁人採捕必依止宿毎有浪輙居宅側恬静無他風静水清猶見城郭樓櫓畟然畟音測今水淺時土人没水取得舊木堅貞光黒如漆好事者以爲枕相贈焉莋漢書曰自嶲以東北君長以十數莋都最大其俗或土著或移徒後漢書曰莋都夷者武帝所開以爲莋都縣其人𬒳髪左袵言語多好譬類居處略與汶山夷同土岀長年神藥仙人山圖所居焉元鼎六年以爲沉黎郡至天漢四年并蜀爲西部置兩部尉一居旄牛主徼外夷一居青衣主漢人也嶲漢書曰桐師以東北至葉榆名爲嶲昆明編髪隨畜遷徙無常處無君長地方可數千里永昌郡傳曰越嶲郡在建寧西北千七百里治江都縣自建寜髙山相連至川中平地東西南北八千餘里郡特好桑蠶冝黍稷麻稻梁冉駹漢書曰自荏以東北君長以十數冉駹最大其俗或着土或移徙後漢書曰冉駹夷者武帝所開元鼎六年以爲汶山郡今蜀郡西北通化郡地也至宣帝地節三年夷人以立郡賦重帝乃省并蜀郡爲北部都尉其山有六夷七羗九氐各有部落其王侯頗知文書而法俗嚴重貴婦人黨母族死則燒其尸土氣多寒雖在盛夏氷猶未釋皆依山居止累石爲室髙者至十餘丈爲卭籠今彼土夷人呼爲雕又土地剛鹵不生穀粟麻菽唯以夌爲資而冝畜牧有旄牛無角一名犝牛肉重千斤毛可爲毦犝徒冬切毦音貳出名馬有羺羊羚音靈可療毒又有食藥鹿鹿麑有胎者其膓中糞亦療毒疾又有五角羊麝香輕毛毼鷄猩猩其人能作旄氈班罽青頓毞毲羊羧之屬青頓毲羧並未詳字書無二字特多雜藥地有鹹土煑以爲塩麡羊牛馬食之皆肥麡音子兮切其西又有三河槃于虜北有黄石北地盧水胡其表乃爲徼外後靈帝時復分蜀郡北部爲汶山郡白馬漢書曰蜀之西冉駹以東北君長以十數白馬最大皆氐類也後漢書曰白馬氐者武帝元鼎中分開廣漢西部合以爲武都土地險阻有麻田出名馬牛羊􅃮宻氐人勇戅抵冒貪貨死利居於河池一名仇池方百頃四面斗絶數爲邊宼郡縣討之則依固自守元封三年氐人反叛遣兵破之昭帝元鳯中氐人復叛執金吾馬適建姓馬適名建等將三輔太常徙討破之建武𥘉氐人悉附隴蜀反隗囂㓕其酋豪乃背公孫述降漢馬援上復其王侯君長賜以印綬後囂族人隗茂反殺武都太守氐人大豪齊鍾留爲種類所敬信威服諸豪與郡丞孔奮繫茂破斬之白狼夷後漢書曰永平中益州刺史梁國朱輔好立功名慷慨有大略在州數歳宣示漢德威懐逺夷自汶山以西前代所不至正朔所不加白狼槃木唐菆等百餘國户百三十餘萬口六百萬以上舉種奉貢稱爲臣僕輔上䟽曰臣聞詩云𬒳狙者歧有夷之行傳曰歧道雖僻而人不逺詩人誦詠以爲符驗今白狼王唐菆等慕化歸義作詩三章路經卭來山太零髙坂峭危峻險百倍歧道繦負老㓜若歸慈母逺夷之語辝意難正草木異種鳥獸殊類有犍爲郡掾田恭與之習狎頗曉其言臣輙令訊其風俗譯其辝語今遣從事史李陵與恭護送詣闕并上其樂詩昔在聖帝舞四夷之樂今之所上庻備其一帝嘉之事下史官録其歌焉東觀記載其歌并載夷人之本語並重譯訓語爲華言令范史所載者是也至和帝永元十二年旄牛徼外白狼樓薄蠻夷王唐繒等遂率種人十七萬口内属樿國音檀後漢書曰和帝永元九年樿國王雍由調遣使重譯奉國珎寳和帝賜金印紫綬}
  - {type: variant, offset: 534, length: 2, content: 初中, SBCK: 寧􅀄復遣使朝賀獻樂及幻人能變化吐火自支解易牛馬頭又善跳丸數乃至千自言我海西人海西即大􅁗也禪國西南通大􅁗明年元㑹安帝作樂於庭封雍由調爲漢大都尉賜印綬金銀綵繒各有差牂柯後漢書曰􅀄楚頃襄王時遣將莊豪從沆水伐夜郎軍至且蘭㭬舩於岸而歩戰旣㓕夜郎因留王滇池以且蘭有㭬舩牂柯處乃改其名爲䍧柯異物志曰牂柯擊舩戕也牂柯地多兩潦俗好巫􅀑禁忌寡畜生又無蠶桑故其郡最貧句縣有桄榔木可以爲麵百姓資之又曰公孫述時牂柯大姓龍傳尹董氏與郡功曹謝暹保境爲漢乃遣使從番禺江奉貢番禺江今南海郡光武嘉之並加褒賞桓帝時郡人尹珍自以生於荒裔不知禮義乃從汝南許慎應奉受經書學成還郷里教授自是南域始有學焉}
