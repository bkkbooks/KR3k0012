  - {type: variant, offset: 2900, length: 578, content: 不復變一號黑齒交州以南外國傳曰有銅柱表為漢之南極界左右十餘小國悉屬西屠有夷民所在二千餘家金鄰國異物志曰金鄰一名金陳去扶南可二千餘里地出銀人民多好獵大象生得乘騎死則取其牙齒外國傳曰從扶南西去金陳二千餘里到金陳波遼國外國傳曰從西圖南去百餘里到波遼十餘國皆在海邊屈都乾國外國傳曰從波遼國南去乘舩可三千里到屈都乾國地有人民可二千餘家皆曰朱吾縣民叛居其中波延洲外國傳曰從屈都乾國東去舡行可千餘里到波延洲有民人二百餘家專採金賣與屈都乾國究原國民外國傳曰究原有獠民出錫鐵雞舌香及赤白五色鸚鵡鳥究原達永昌一歲奴後國外國傳曰從林陽西去二千里奴後國可二萬餘戶與永昌接界炎人國愽物志曰楚之南炎人之國其親戚死刳肉死棄之然後埋其骨乃成孝子黃孫愽物志曰黃孫天毒君之孫也名貴負躁而好自飲汁父母笑之愧而去居此黃孫國去九嶷二萬一千里落頭民愽物志曰南方有落頭民其頭能飛其種人常有所祭號曰蟲落故因取名焉以其頭飛因眼便去以耳為翼將曉還復著體吳時往往得之鮫人愽物志曰南海水有鮫人水居如魚不廢織績其眼能泣珠松外諸蠻唐書曰松外諸蠻貞觀末為寇遣兵從西洱河討之其西洱河從嶲州西千五百里其地有數十百部落大者五六百戶小者二三百戶無大君長有數十姓以楊李趙董為名家各檀山川不相役屬自云其先本漢人有城郭村邑弓矢誕言語雖小訛舛大略與中夏同有文字頗解陰陽曆數自夜郎滇池以西皆云莊蹻之餘種也其土有稻麥粟豆種穫亦與中夏同而以, WYG: ''}
