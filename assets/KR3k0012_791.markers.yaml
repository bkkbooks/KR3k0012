  - {type: variant, offset: 63, length: 42, content: 人卵產去九疑四萬里讙兜國山海經曰讙兜國其人人面有翼鳥啄讙兜堯臣有罪自放南海而死帝矜之, SBCK: 侯名厚賜諭以威德約爲置吏}
  - {type: variant, offset: 63, length: 0, content: '', WYG: 王侯尤不軌者即以為不毛之地亡用之}
  - {type: variant, offset: 63, length: 42, content: 人卵產去九疑四萬里讙兜國山海經曰讙兜國其人人面有翼鳥啄讙兜堯臣有罪自放南海而死帝矜之, krp: 侯名厚賜諭以威德約爲置吏}
