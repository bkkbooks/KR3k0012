  - {type: variant, offset: 2005, length: 344, content: 毗騫同大洲放二萬里法俗是同無論國南州異物志曰無論有大道左右種桃枇杷及諸花果白曰行其下陰涼蔽熱十餘里一亭皆有井水食夌飯飲蒲桃酒如膠若欲飲以水和之其味甘美句稚國南州異物志曰句稚去典遊八百里有江口西南向東北行極大崎頭出漲海中淺而多礠石歌營國南州異物志曰歌營在句稚南可一月行到其南文灣中有洲名蒲類上有居人皆黑如漆齒正白眼赤男女皆裸形康泰扶南土俗大載而去常望海過則遮舡將雞豬山果易鐵器加陳國南州異物志曰加陳在歌營西南師漢國南州異物志曰師漢國在句稚西從稚去行可十四五日乃到其國亦稱王上有神人及明月珠但仁善不忍殺生土地平愽民有萬餘家扈利國南州異物志曰扈利國在奴調洲西南邊海姑奴國南州異物志曰姑奴去歌營可八千里民人萬餘戶皆乘四轅車駕二馬或四馬四會所集也舶舩常有百餘艘市會萬餘人晝夜作市舩皆鳴鼓吹角人民衣被, SBCK: ''}
