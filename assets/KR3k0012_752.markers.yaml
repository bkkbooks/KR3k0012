  - {type: 'tls:seg', offset: 113, content: '', id: KR3k0012_CHANT_752-2a.4}
  - {type: variant, offset: 115, length: 34, content: 書價則顧陸可同鍾離張僧繇可同逸少書則逡巡可成畫非歲月可就所以書多於畫, SBCK: 莫不服其竒麗}
  - {type: variant, offset: 115, length: 2, content: 書價, krp: 三日不下自以爲至巧墨子謂曰子之爲鵲也不如匠爲車轄也湏臾逝三寸之木而任五十石之重故利於人謂之巧不利於人謂之拙孟子曰公輸子之巧不以規矩不能成方圎也淮南子曰昔者楚欲攻宋墨子聞而悼之墨子名翟宋大夫悼傷也自魯趨而徃十日十夜而不休息裂衣裳褁足至於郢見楚王自從趨走也郢楚都也今南郡江陵北里郢是也曰臣聞大王舉兵將攻宋計必得宋而後罷之乎志其苦衆勞民頓兵剉銳天下以不義之名而不得咫尺之地猶且攻之乎頓罷剉辱銳精攻無罪之宋故負天下以不義之名猶且必也王曰必不得宋又且爲不義曷爲攻之墨子曰臣見大王之必傷義而不得宋王曰公輸子天下之巧士作爲雲梯設以攻宋曷爲弗取公輸魯班號時在楚雲梯攻城具髙長上與雲齊故日雲梯設施也墨子曰今公輸設攻宋之械墨子設守之備公輸九攻而墨子九拒之終弗能入入猶下也於是乃偃兵輟不攻宋輟止也又曰神機隂閉剞劂無迹人巧之妙也而治丗不以爲民業又曰工人下漆而上丹}
