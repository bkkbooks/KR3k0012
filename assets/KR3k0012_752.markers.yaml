  - {type: variant, offset: 3136, length: 6, content: 唐盧稜伽吳生, SBCK: 始皇起遊雲臺窮極四方之珍材搜天下之巧工人皆能騰虚縁木揮斤斧於空中又曰始皇二年騫消國獻善􅀞之工名裂裔刻白玉爲兩虎削玉爲毛有如眞矣不􅀧兩目睛始皇􅀧之即飛去明年南郡有獻白虎二頭始皇使視之乃是先刻玉者始命去目睛二虎不復能去歴代名􅀞記曰呉王趙夫人丞相趙逹之妹善書􅀞巧妙無􅀟能於指間以綵織爲龍鳯之錦宫中號爲機絶孫權常歎巴蜀未平思得善􅀞者圖山川地形夫人乃進所冩江湖九州山岳之勢夫人又於方帛之上繡作五岳列國地形宫中號爲針絶又以膠續絲髮作爲輕慢宫中號爲絲絶又曰宋謝莊字希逸性多巧思制木方丈圖天下山川土地各有分理離之則州别郡殊合之則寓内爲一老子曰大巧􅀂拙又曰絶巧弃利盗賊無有荘子曰陶者云我善治埴圎者中規方者中矩範土曰陶陶化也埴黏土也匠人曰我善治木曲者中鈎直者應繩曲鈎也繩直也謂匠人機巧善能治木曲直必中鈎繩也夫埴木之性豈欲中規矩鈎繩哉土木之性禀之造物不求曲直豈慕方圎陶者匠人浪爲臧否又曰百工有器械之巧則壯又曰巧者勞而智者憂無能者無所求又曰無爲也而􅀏巧巧者有爲以傷神又曰覆載天地刻雕衆形而不爲巧巧者爲之妙耳物皆自爾故無所稱巧也此之謂天樂忘樂而樂足矣又曰以瓦注者巧以鈎注者憚以黄金注者昏所要愈重則其心愈肝膽心肺脾腎腸胃外則筋骨支節皮毛齒髮皆假物也無不畢具者合㑹復如􅀄王誠廢其心則口不能言廢其肝則目不能視廢其腎則足不能歩穆王曰人之巧乃與造化同功乎詔貳車載之以歸夫班輸之雲梯墨翟之飛鳶自謂能之極也}
