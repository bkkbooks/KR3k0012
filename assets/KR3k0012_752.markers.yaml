  - {type: variant, offset: 822, length: 605, content: 不出可去紙筆即去之獸果出平子拱手不動潛以足指畫獸今號巴獸潭又曰昔張芝學崔瑗杜度草書之法因而變之以成今草字之體勢一筆而成氣脈通連隔行不斷唯王子敬明其深旨故後首之字往往繼其前行世上謂之一筆書其後陸探微亦作一筆畫綿連不斷故知書畫用筆同法陸探微精利潤媚新奇絕妙名高宋代時無等倫又曰魏曹植言觀畫者見三皇五帝莫不仰戴見三季暴主莫不悲惋見篡臣賊嗣莫不切齒見高節妙士莫不忘食見忠節死難莫不抗首見放臣斥子莫不歎息見淫夫妬婦莫不側目見令妃順后莫不嘉貴是知存乎鑒者畫也又曰蜀諸葛亮字孔明華陽國志云南夷其俗徵巫鬼好盟詛要之諸葛亮乃為夷作圖先畫天地日月君長城府次畫神龍及牛馬駞羊後畫部主吏乘馬幡蓋遠行安卹又畫夷牽牛負酒齎金寶詣之以賜夷甚重之又曰曹不興吳興人也孫權使畫屏風誤落筆點素因就成蠅狀權疑其真以手彈之時稱吳八絕張㪍吳錄云八絕者孤城鄭嫗善相劉惇善星象吳範善候風氣趙達善筭嚴武善碁宋壽善上夢皇象善書曹不興善畫赤烏中不興之清溪見赤龍出水上寫獻孫皓皓送秘府至宋朝陸探微見畫歎其妙因至清溪復見其龍宋時累月亢旱祈禱無應乃取不興龍置水上應時蓄水成霧累月霶霈謝赫云不興之跡代不復見秘閣內一龍頭而已觀其風骨擅名不虛在第一品矣又曰晉顧愷之字長康嘗於瓦官寺北殿畫維摩詰畫訖光耀月餘日京師寺記云興寧中瓦官寺初置僧眾設會請朝賢鳴剎注錢其時士大夫莫有過十萬者既至長康長康直打剎注百萬長康素貧眾以為大言後寺眾請勾䟽長康曰宜備一壁遂閉戶往來一月餘日所畫維摩詰一軀, krp: ''}
