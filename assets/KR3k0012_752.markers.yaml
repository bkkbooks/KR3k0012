  - {type: variant, offset: 3369, length: 1, content: 軍, SBCK: 攻宋計必得宋而後罷之乎志其苦衆勞民頓兵剉銳天下以不義之名而不得咫尺之地猶且攻之乎頓罷剉辱銳精攻無罪之宋故負天下以不義之名猶且必也王曰必不得宋又且爲不義曷爲攻之墨子曰臣見大王之必傷義而不得宋王曰公輸子天下之巧士作爲雲梯設以攻宋曷爲弗取公輸魯班號時在楚雲梯攻城具髙長上與雲齊故日雲梯設施也墨子曰今公輸設攻宋之械墨子設守之備公輸九攻而墨子九拒之終弗能入入猶下也於是乃偃兵輟不攻宋輟止}
