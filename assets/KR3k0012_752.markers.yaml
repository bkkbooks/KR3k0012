  - {type: variant, offset: 148, length: 1, content: 畫, WYG: 郢見楚王}
  - {type: variant, offset: 148, length: 1, content: 畫, krp: 心也又曰神明之事不可以智巧爲也不可以筋力致也天地所包隂陽所嘔雨露所濡以生萬殊翡翠瑇瑁碧玉珠文采明朗澤若濡摩而不玩乆而不渝奚仲不能旅魯般弗能造此之謂大巧又曰夫至巧不用劒巧在心手故不用劒又曰大匠不用斵又曰夫物有以}
