  - {type: variant, offset: 1569, length: 551, content: 罕見若時景融朗然乃含毫天地陰慘則不操筆今之畫人筆墨混於塵埃丹青和其泥滓徒污綃素豈曰繪畫自古善畫者匪衣冠貴胄逸士高人振妙一時傳芳千祀非閭閻鄙賤所能為也又曰南齊宗測宇敬微炳之孫也善畫傳其祖業志欲遊名山乃寫祖炳所畫尚子平圖於壁隱廬山居炳舊宅畫阮籍遇孫登於行障上坐臥對之又畫永業寺佛景臺皆稱妙絕又曰南齊謝赫姚㝡云點刷精研意存切似寫貌人物不俟對看所須一覽便歸操筆目想毫髮皆無遺失麗服靚粧隨時變改直眉曲鬢與世爭新別體細微多從赫始遂使委巷逐末皆類效嚬至於氣韻精靈未躬生動之致筆路纖弱不副雅致之懷然中興已後畫人馬貴在沈摽下毛惠遠上又曰南齊劉瑱字士溫彭城人少聰惠多才藝攻書畫嬪墻當代第一謝云用意綿密畫體簡細筆力困弱制置單省婦人最佳但纖削過差飜為失真然玩之詳熟甚有姿態又曰南齊毛惠遠滎陽陽武人也善畫馬時劉瑱善畫婦人並當代第一市青碧一千二百斤供御戈畫用錢六十五萬有言惠遠納利者勑尚書評價貴二十八萬後家徒壁立甚悔痛之惠遠弟惠秀永明仲待詔秘閣世祖將北伐命惠秀畫漢武北征圖中書郎王融監掌其圖成帝極重之置瑯琊臺上每披覽焉又曰北齊楊子華世祖時任直閣將軍嘗畫馬於壁夜聽啼齧長鳴如索水草圖龍於素舒卷輒雲氣縈集也世祖重之使居禁中夫子號為畫聖非有詔不得與人畫時有王子善碁通神號為二絕又曰北齊劉殺鬼與楊子華同時世祖俱重之畫鬭雀於壁間帝見之為生拂, WYG: 乎故工匠}
