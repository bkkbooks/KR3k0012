  - {type: variant, offset: 404, length: 367, content: 若言有書籍豈可無九經三史顧陸張吳為正經楊鄭董展為三史其餘畫跡為百家吳雖近可為正經又曰昔謝赫云畫有六法一曰氣韻生動二曰骨法用筆三曰應物象形四曰隨類賦綵五曰經營位置六曰傳摸移寫自古畫人罕能兼知試論曰古之畫者或有遺其形似而尚其骨氣以形似之外求其畫此難可與俗人道也今之畫縱得形似而氣韻不生以氣韻求其畫則形似自在其間矣上古之畫跡簡而意澹澹而雅正顧陸之流是也中古之畫細密而精緻以臻麗展鄭之流是也近代之畫煥爛而求備今人之畫錯亂而無旨眾工之跡是也夫象物必在於形似形似須全其骨氣骨氣形似皆本於意而歸乎用筆故工畫者多攻書然則古之嬪臂纖而骨束古之馬啄大而腹細古之臺閣竦峙古之服飾容曳故古畫非獨變態有奇意也抑亦物象殊也又曰徧觀眾畫唯顧生畫古賢得其妙理對之令人終日不倦凝神遐想妙悟自然物我兩忘離形去智身固可使如槁木心固可使如死灰不亦臻於妙理乎所謂畫之道也又曰漢, SBCK: ''}
