  - {type: variant, offset: 770, length: 1, content: 漢, WYG: 馬先生為機器未成裴世子疑而難之先生口屈不能對𫝊子謂裴子善乎言而不巧馬氏長於巧而短於言巧者天下之微事抱朴子曰善圍碁者世謂之碁聖故嚴子卿馬綏明有碁聖之名書聖皇象胡昭是也畫聖衛恊張墨是也巧聖}
