  - {type: variant, offset: 15, length: 2, content: 成教, krp: 圖山川地形夫人乃進所冩江湖九州山岳之勢夫人又於方帛之上繡作五岳列國地形宫中號爲針絶又以膠續絲髮作爲輕慢宫中號爲絲絶又曰宋謝莊字希逸性多巧思制木方丈圖天下山川土地各有分理離之則州别郡殊合之則寓内爲一老子曰大巧若拙又曰絶巧弃利盗賊無有荘子曰陶者云我善治埴圎者中規方者中矩範土曰陶陶}
  - {type: variant, offset: 16, length: 1, content: 教, WYG: 風而斵之盡堊而鼻不傷郢人立不失容宋元君聞之召匠石曰嘗試為寡人為之匠石曰臣則常能斵之雖然臣質死之矣列子曰周穆王西巡有獻工人名偃師曰臣惟命所試然臣已有所造願王先觀之穆王曰以若俱來吾與若俱觀之翌日偃師謁見王王曰若與偕者何人也對曰臣之所造能倡者穆王驚視之趨歩俯仰言語皆人也巧夫領其頥則歌合律捧其手則舞應節千變百}
  - {type: page-break, offset: 16, content: '', id: KR3k0012_WYG_752-8a, image: WYG0899/WYG0899-0605a.png}
