  - {type: 'tls:seg', offset: 18, content: '', id: KR3k0012_CHANT_752-1a.6}
  - {type: variant, offset: 18, length: 1, content: 助, WYG: 惟意所適王以為實}
  - {type: variant, offset: 18, length: 1, content: 助, krp: 也埴黏土也匠}
  - {type: variant, offset: 20, length: 7, content: 倫窮神變測幽微, WYG: 也}
  - {type: variant, offset: 20, length: 2, content: 倫窮, krp: 曰我善治木曲者中鈎直者應繩曲鈎也繩直也謂匠人機巧善能治木曲直必中鈎繩也夫埴木之性豈欲中規矩鈎繩哉土木之性禀之造物不求曲直豈慕方圎陶者匠人浪爲臧否又曰百工有器械之巧則壯又曰巧者勞而智者憂無能者無所求又曰無爲也而笑巧巧者有爲以傷}
  - {type: punctuation, offset: 21, content: ，, id: KR3k0012_CHANT_752-bkkpn7}
  - {type: 'tls:seg', offset: 21, content: '', id: KR3k0012_CHANT_752-1a.7}
  - {type: variant, offset: 23, length: 4, content: 變測幽微, krp: 又曰覆載天地刻雕衆形而不爲巧巧者爲之妙耳物皆自爾故無所稱巧也此之謂天樂忘樂而樂足矣又曰以瓦注者巧以鈎注者憚以黄金注者昏所要愈重則其心愈肝膽心肺脾腎腸胃外則筋骨支節皮毛齒髮皆假物也無不畢具者合㑹復如𥘉王誠廢其心則口不能言廢其肝則目不能視廢其腎則足不能歩穆王曰人之巧乃}
  - {type: punctuation, offset: 24, content: ，, id: KR3k0012_CHANT_752-bkkpn8}
