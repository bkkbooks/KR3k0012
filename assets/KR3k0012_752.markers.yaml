  - {type: variant, offset: 3471, length: 1066, content: 源畢宏於是閣筆又曰唐李漸善畫蕃馬騎射射鵰放牧川源之妙筆跡氣調今古無儔李仲和能繼其藝而筆力不及又曰天后朝張易之奏召天下畫工修內庫圖畫因使工人各推所長銳意摸寫仍舊裝皆一毫不差其真者多歸易之又曰唐朝吳道玄古今獨步前不見顧陸後無來者授筆法於張旭此又知書畫用筆同矣張既號書顛吳宜為畫聖神假天造英靈不窮唐畫斷曰唐吳道玄窮丹青之妙太約宗師張僧繇玄宗天寶中忽思蜀中嘉陵江水遂假吳生驛遞令往貌之及迴帝問其狀奏云臣無粉本並記在心遣於大同殿圖嘉陵江三百里山水一日而畢時有李將軍山水擅名亦畫大同殿數月方畢玄宗云李思順數月之功吳道玄一日之跡皆極其妙又畫殿內五龍鱗甲飛動每欲大雨即生煙霧吳生常持金剛經自識本身當天寶中有楊庭光與之齊名潛畫吳生真於講席眾人之中吳生觀之亦見便驚語庭光云老夫衰醜何用圖之又曰唐周昉字景玄郭子儀子壻趙縱常令韓幹寫具眾皆稱善後又請昉寫真二人皆有能名公常列二畫於座未能定其優劣因趙夫人歸省公公子儀也問云此畫何人對曰趙郎曰何者似云兩畫揔似後畫者嘉又問何以言之曰前畫空得趙狀貌後兼移其神氣情性笑言之姿公問後畫者何人乃云周昉是日定其二畫優劣令送錦綵數百疋又曰唐閻立本太宗時南山有猛獸害人太宗使驍勇者捕之不得虢王元鳳忠義奮發自往取之一箭而斃太宗壯之使立本圖其鞍馬僕從皆寫其真無不驚伏其能太宗幸玄都池池斗鸂䳵召立本貌十八學士凌煙閣功臣等實亦輝暎前古又曰唐韋無忝京兆人也玄宗朝以畫名馬異獸擅名時稱韋四足無不妙也曾見貌外國所獻師子酷似其真後師子放歸本國唯畫者在圖時因觀覽百獸見之皆懼又玄宗射獵一箭中兩野豬詔於玄武北門寫貌傳在人間乃妙之極也又曰唐楊光畫松石山水出於人表初稱處士謁盧黃門懷慎也館之甚厚知其丹青之能意欲求之而未敢言楊懇辭去復苦留之知其家在洛中衣食乏少心所不安乃令人潛將數百千至洛中供擬取其家書示楊公感之未知所報盧因從容乃言欲求一蹤以子孫寶之意尚難之遂月餘圖一松石雲物移動造化人莫能覩也又曰唐陳閎會稽人也以能寫真本道薦之開元中召入供奉每令寫真御容妙絕當時玄宗射豬鹿兔鴈等并按舞圖真容皆受詔寫貌又太清宮肅宗真容匪唯龍鳳姿日角天字之狀而筆力遒潤神彩英逸實天假其能也閻令之後一人而已又曰唐張萱京兆人也當畫貴公子鞍馬屏幄宮苑子女等名冠於時善起草點蔟置亭臺竹樹花鳥僕隸皆極精研又曰唐王墨不知何許人也名冷善潑墨時人為之王墨多游江湖善畫山水松柏雜樹等性踈野好酒每圖障興酣之後以墨潑之腳蹙手抹或拂或幹隨其形象為山為竹為樹應心隨意倏若造化圖成雲霞澹澹風雨蕭蕭不見污之路也又曰唐李靈雀落魄不拘檢每圖一障非其所欲不可強也以酒生思傲然自得王公之尊寒暑之若山水竹樹一點一抹, WYG: 巧}
