  - {type: variant, offset: 15, length: 0, content: '', WYG: 圖山川地形夫人乃進寫江湖九州山岳之勢夫人又於方帛之上繡作五岳列國地形宫中號為針絶又以膠續絲髮作為輕幔宫中號為絲絶又曰宋謝莊字希逸性多巧思制木方丈圖天下山川土地各有分理離之則州别郡殊合之則宇内為一老子曰大巧若拙又曰絶巧棄利盜賊無有莊子曰陶者曰我善治埴圓者中規方者中矩匠人曰我善治木曲者中鈎直者應繩夫埴木之性豈欲中規矩鈎繩哉陶道刀反謂窑也埴徐時力反崔云土也司馬云埴土可以為陶器尚書傳云土黏曰埴釋名曰埴膱也又曰百工有器械之巧則壯又曰巧者勞而智者憂無能者無所求又曰無為也而笑巧又曰覆載天地刻雕衆形而不為巧巧者為之妙而物皆自得故無所稱巧也此之謂天樂又曰以瓦注者巧以鈎注者憚以黄金注者昏所要愈重則其心愈矜也又曰郢人堊漫其鼻端若蠅翼使匠石斵之匠石運斤}
