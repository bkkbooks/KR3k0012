  - {type: variant, offset: 2740, length: 224, content: 乏精微李云田楊聲侔董展昔田楊與鄭法士同於京師光明寺畫小塔鄭圖東壁北壁田圖西壁南壁楊畫外邊四面是稱三絕楊以簟蔽畫處鄭竊觀之謂楊曰卿畫終不可學何勞鄣蔽揚託以婚姻有對門之好又求楊畫本楊引鄭至朝堂指宮闕衣冠車馬曰此是吾畫本也由是鄭深歎伏又唐張孝師為驃騎尉尢善畫地獄氣候幽默孝師曾死復蘇具見冥中事故備得之吳道玄見其畫因效之為地獄變又曰唐王陁子善山水幽致峰巒極佳也上言山水者稱陁子頭道子腳又曰唐王道子陽翟人也好酒使氣每欲揮毫必須酣飲學書於張長史旭賀監知章學書不, SBCK: ''}
