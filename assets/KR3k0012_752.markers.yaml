  - {type: variant, offset: 719, length: 4, content: 令人終日, WYG: 謂大巧又曰夫至巧}
  - {type: variant, offset: 719, length: 3, content: 令人終, krp: 猶不自知乃削木爲小麥試籴之無疑歸磨乃覺非麥論衡曰傳稱魯般墨子之巧刻木爲鳶飛之三日而不集下也夫言其以木爲鳶飛之可也言其三}
  - {type: variant, offset: 724, length: 7, content: 倦凝神遐想妙悟, WYG: 用劒又曰大匠不斵又曰夫物有以}
  - {type: variant, offset: 724, length: 5, content: 倦凝神遐想, krp: 集増之也猶丗傳言魯般巧亡其母矣言其巧工爲母作木車馬木人御者機關備具載母上臺去而不還失其母焉楊泉物理論曰夫蜘蛛之羅蜂之作巢其巧}
