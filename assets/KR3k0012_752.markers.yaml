  - {type: variant, offset: 2122, length: 1348, content: 覺嘗在禁中錫賴巨萬任梁州刺史又曰梁元帝名繹字世誠善畫曾畫聖僧武帝親為贊之任荊州刺史日畫蕃客入朝圖帝極稱善又畫職貢圖并序蓋外國來獻之事長子方智字實相尤能寫真坐上賓客隨容點染即成數人問童兒皆識之又曰梁蕭賁字文奐蘭陵人也多詞學工書畫曾於扇上畫山水咫尺之內見萬里可知姚最云雅性精密後來難比含毫命素動必依真學不為人自娛而已人間罕見其跡又曰陶弘景字通明丹陽秣陵人幼有異操年十歲讀書葛洪神仙傳便有隱逸之志居茅山號華陽隱居好著述明眾藝武帝嘗欲徵用隱居畫二牛一以金籠頭牽之一則迤邐就水草武帝知其意不以官爵逼之又曰梁張僧繇吳人也天監中為武陵王國侍郎直秘書閣知畫事武帝崇飾佛寺多僧繇畫之時諸王在外武帝思之遣僧繇乘傳寫貌對之如面江陵天皇寺明帝置也內有柏堂僧繇畫盧舍那佛及仲尼十哲帝怪問釋門內如何畫孔聖僧繇曰後當賴此耳及後代滅佛法焚天下寺塔獨以殿有宣尼像乃不令毀拆又金陵安樂寺畫四龍不點眼睛即恐飛去人以為妄誕固請點之遂點二龍須臾雷電破壁兩龍乘雲騰而上天二龍未點眼睛者見在又畫天竺二胡僧侯景亂散坼為二後一僧為唐右常侍陸堅所寶堅疾篤夢一胡僧告云我有同友離拆多時今在洛陽李家若求合得之當以法力助君陸以錢帛果於其處購得之其疾乃愈劉長卿為記述其事張畫所有靈感不可具記又曰北齊高孝珩世宗第二子也封廣寧郡王尚書令大司徒愽涉多才藝曾於廳壁上畫蒼膺觀者疑其真鳩雀不敢近又畫朝士圖當時妙絕又曰隋楊契丹官至上儀同僧悰云六法備詠甚有骨氣山東體制允屬伊人在閻立本下契丹之跡非不雄富此董展則乏精微李云田楊聲侔董展昔田楊與鄭法士同於京師光明寺畫小塔鄭圖東壁北壁田圖西壁南壁楊畫外邊四面是稱三絕楊以簟蔽畫處鄭竊觀之謂楊曰卿畫終不可學何勞鄣蔽揚託以婚姻有對門之好又求楊畫本楊引鄭至朝堂指宮闕衣冠車馬曰此是吾畫本也由是鄭深歎伏又唐張孝師為驃騎尉尢善畫地獄氣候幽默孝師曾死復蘇具見冥中事故備得之吳道玄見其畫因效之為地獄變又曰唐王陁子善山水幽致峰巒極佳也上言山水者稱陁子頭道子腳又曰唐王道子陽翟人也好酒使氣每欲揮毫必須酣飲學書於張長史旭賀監知章學書不成因攻畫曾事逍遙公韋嗣立為小吏因寫蜀道山水之體自為一家其書跡似薛少保亦甚便利初任兗州瑕丘縣尉玄宗召入禁中改名道玄因授內教博士非有詔不得畫張懷瓘每云吳生之畫下筆有神是張僧繇後身也可謂知言矣官至寧王友開元中將軍裴旻善舞劍道玄觀旻舞畢揮毫益進時又有公孫大娘亦善舞西河劍氣渾脫張旭見之因為之草書杜甫歌行述其事是知書畫之藝皆須意氣而成亦非懦夫所能作也又曰唐盧稜伽吳生弟子也畫跡似吳生但才力有限頗能細畫咫尺間山水廖廓物像精備經變佛像是其所長吳生嘗於京師畫揔總持寺三門大獲泉貨稜伽乃竊畫莊嚴寺三門銳思開張頗臻其妙一日吳生忽見之驚歎曰此子筆力當時不及我今乃類我精爽盡矣居一月稜伽果卒又曰唐馮紹政尤善畫膺鶻鷄雉盡其形態觜眼腳爪毛彩俱妙曾於禁中畫五龍亦稱其善有降雲蓄雨之感又曰唐李思訓宗室也即林甫之伯父早以藝稱於當代一家五人並善丹青高宗甚重之書畫稱一時之妙其畫山水樹石筆格遒勁湍瀨潺湲雲霞縹緲時覩神仙之事窅然巖嶺之幽時人謂之大李將軍也又曰唐韓幹尤工鞍馬忽有人詣門稱鬼使請馬一疋韓君畫馬焚之他日鬼使乘馬來謝其感神若此弟子孔榮為之上足又曰唐張璪字文通尤工樹石山水初畢宏擅名當代一見驚歎異之璪唯用禿筆成以手摸絹素因問璪所授璪曰外即造化中得, WYG: 矩圓規出乎}
