  - {type: variant, offset: 2237, length: 7, content: 扇上畫山水咫尺, SBCK: 當時襄國宫殿臺榭皆輔所營也馬鈞別傳曰釣字徳衡扶風人巧思絶丗不自知其爲巧也居貧舊綾機五十綜者五十躡六十綜者六十躡鈞乃易以十二躡其竒文異變因感而作猶自然而成形隂陽}
