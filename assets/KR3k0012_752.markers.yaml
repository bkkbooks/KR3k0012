  - {type: variant, offset: 853, length: 1373, content: 昔張芝學崔瑗杜度草書之法因而變之以成今草字之體勢一筆而成氣脈通連隔行不斷唯王子敬明其深旨故後首之字往往繼其前行世上謂之一筆書其後陸探微亦作一筆畫綿連不斷故知書畫用筆同法陸探微精利潤媚新奇絕妙名高宋代時無等倫又曰魏曹植言觀畫者見三皇五帝莫不仰戴見三季暴主莫不悲惋見篡臣賊嗣莫不切齒見高節妙士莫不忘食見忠節死難莫不抗首見放臣斥子莫不歎息見淫夫妬婦莫不側目見令妃順后莫不嘉貴是知存乎鑒者畫也又曰蜀諸葛亮字孔明華陽國志云南夷其俗徵巫鬼好盟詛要之諸葛亮乃為夷作圖先畫天地日月君長城府次畫神龍及牛馬駞羊後畫部主吏乘馬幡蓋遠行安卹又畫夷牽牛負酒齎金寶詣之以賜夷甚重之又曰曹不興吳興人也孫權使畫屏風誤落筆點素因就成蠅狀權疑其真以手彈之時稱吳八絕張㪍吳錄云八絕者孤城鄭嫗善相劉惇善星象吳範善候風氣趙達善筭嚴武善碁宋壽善上夢皇象善書曹不興善畫赤烏中不興之清溪見赤龍出水上寫獻孫皓皓送秘府至宋朝陸探微見畫歎其妙因至清溪復見其龍宋時累月亢旱祈禱無應乃取不興龍置水上應時蓄水成霧累月霶霈謝赫云不興之跡代不復見秘閣內一龍頭而已觀其風骨擅名不虛在第一品矣又曰晉顧愷之字長康嘗於瓦官寺北殿畫維摩詰畫訖光耀月餘日京師寺記云興寧中瓦官寺初置僧眾設會請朝賢鳴剎注錢其時士大夫莫有過十萬者既至長康長康直打剎注百萬長康素貧眾以為大言後寺眾請勾䟽長康曰宜備一壁遂閉戶往來一月餘日所畫維摩詰一軀工畢將欲點眸子乃謂寺僧曰第一日見請施十萬第二日可五萬第三日可任例責施及開戶光照一寺施者填咽俄而得百萬錢愷之嘗言畫人物最難次山水次狗馬臺閣一定器耳差為易也斯言得之至於鬼神人物有生動之可狀須神韻而後全若氣韻不周空陳形像筆力未到空善賦彩謂非妙也又曰宋朝顧駿之常結構高樓以為畫所每登樓去梯家人罕見若時景融朗然乃含毫天地陰慘則不操筆今之畫人筆墨混於塵埃丹青和其泥滓徒污綃素豈曰繪畫自古善畫者匪衣冠貴胄逸士高人振妙一時傳芳千祀非閭閻鄙賤所能為也又曰南齊宗測宇敬微炳之孫也善畫傳其祖業志欲遊名山乃寫祖炳所畫尚子平圖於壁隱廬山居炳舊宅畫阮籍遇孫登於行障上坐臥對之又畫永業寺佛景臺皆稱妙絕又曰南齊謝赫姚㝡云點刷精研意存切似寫貌人物不俟對看所須一覽便歸操筆目想毫髮皆無遺失麗服靚粧隨時變改直眉曲鬢與世爭新別體細微多從赫始遂使委巷逐末皆類效嚬至於氣韻精靈未躬生動之致筆路纖弱不副雅致之懷然中興已後畫人馬貴在沈摽下毛惠遠上又曰南齊劉瑱字士溫彭城人少聰惠多才藝攻書畫嬪墻當代第一謝云用意綿密畫體簡細筆力困弱制置單省婦人最佳但纖削過差飜為失真然玩之詳熟甚有姿態又曰南齊毛惠遠滎陽陽武人也善畫馬時劉瑱善畫婦人並當代第一市青碧一千二百斤供御戈畫用錢六十五萬有言惠遠納利者勑尚書評價貴二十八萬後家徒壁立甚悔痛之惠遠弟惠秀永明仲待詔秘閣世祖將北伐命惠秀畫漢武北征圖中書郎王融監掌其圖成帝極重之置瑯琊臺上每披覽焉又曰北齊楊子華世祖時任直閣將軍嘗畫馬於壁夜聽啼齧長鳴如索水草圖龍於素舒卷輒雲氣縈集也世祖重之使居禁中夫子號為畫聖非有詔不得與人畫時有王子善碁通神號為二絕又曰北齊劉殺鬼與楊子華同時世祖俱重之畫鬭雀於壁間帝見之為生拂之方覺嘗在禁中錫賴巨萬任梁州刺史又曰梁元帝名繹字世誠善畫曾畫聖僧武帝親為贊之任荊州刺史日畫蕃客入朝圖帝極稱善又畫職貢圖并序蓋外國來獻之事長子方智字實相尤能寫真坐上賓客隨容點染即成數人問童兒皆識之又曰梁蕭賁字文奐蘭, SBCK: 邴輔樂}
