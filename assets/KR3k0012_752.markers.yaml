  - {type: variant, offset: 4266, length: 0, content: '', SBCK: 故良匠不能斵金巧冶不能鑠木金之勢不可斵而木之性不可鑠也埏埴而爲器刳木而爲舟爍鐡而爲刄鑄金而爲鍾因其可也尸子曰古者倕爲規矩凖繩使天下倣焉愼子曰百工之子不學而能者非生而巧也言有常事傅子曰馬先生鈞天下之巧也有二子謂古無指南車記言之虚也先生曰古有之二子}
  - {type: variant, offset: 4267, length: 0, content: '', SBCK: 白明帝詔先生作之而指南車成此一異也從是天下服其巧矣居京都城内有地可爲園患無水以漑之先生乃作飜車令童兒轉之而灌水自覆其巧百倍於常此二異也後人有上百戲者}
