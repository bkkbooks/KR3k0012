  - {type: 'tls:seg', offset: 729, content: '', id: KR3k0012_CHANT_752-4a.7}
  - {type: variant, offset: 730, length: 28, content: 悟自然物我兩忘離形去智身固可使如槁木心固可使如死灰不亦臻, krp: 矣而况}
  - {type: punctuation, offset: 733, content: ，, id: KR3k0012_CHANT_752-bkkpn188}
  - {type: 'tls:seg', offset: 733, content: '', id: KR3k0012_CHANT_752-4a.8}
  - {type: variant, offset: 733, length: 5, content: 物我兩忘離, WYG: 而後人事有治也故良匠不能斵金巧冶不能鑠木金之勢不可斵而木之性不可鑠也埏埴而為器刳木而為舟爍鐵而為刃鑄金而為鍾因其可也尹子曰古者創為規矩凖繩使天下倣焉愼子曰百工之子不學而能者非生而巧也言有常事傅子曰馬先生鈞天下之巧者也二子謂古無指南車記言之虛也先生曰古有之二子以白明帝詔先生作之而指南車成此一異也從是天下服其巧矣居京都城内有地可為園患無水以漑之先生乃作飜車令童兒轉之而灌水自覆其功百倍於常此二異也後人有上百戯者能設而不能動帝以問先生可動否鈞曰可動帝曰其巧可益否對曰可益受詔作之以大木雕構使}
