  - {type: punctuation, offset: 111, content: 「, id: KR3k0012_CHANT_752-bkkpn30}
  - {type: variant, offset: 111, length: 0, content: '', WYG: 宋人有為其君以玉為楮葉者三年而後成亂之楮葉中而不可别也此人遂以巧食宋國列子聞之曰使天地生物三年而成一葉則物之有葉者寡矣故聖人恃道化而不恃智巧又曰老成子學幻於尹文先生三年不告老成子請其過而求退尹文先生曰昔老􅆅之徂西也顧而告余曰有生之氣有形之狀盡幻也造化之所始隂陽之所變者謂之生謂之死窮數達變因形移易者謂之化謂之幻造物者其巧妙其功深故難終難窮因形者其巧顯其功淺故隨起隨滅知幻化之不異生死也始可與學幻矣吾與汝亦幻也奚須學哉墨子曰公輸子削竹木為鵲成而飛之三日不下自以為至巧墨子謂曰子之為鵲也不如匠之為車轄也須臾豎三寸之木而任五十石之重故利於人謂之巧不利於人謂之拙孟子曰公輸子之巧不以規矩不能成方圓也淮南子曰昔者楚欲攻宋墨子聞而悼之墨子名翟宋大}
  - {type: page-break, offset: 111, content: '', id: KR3k0012_WYG_752-9a, image: WYG0899/WYG0899-0605c.png}
  - {type: page-break, offset: 111, content: '', id: KR3k0012_WYG_752-9b, image: WYG0899/WYG0899-0605d.png}
  - {type: variant, offset: 111, length: 0, content: '', krp: 宋人有爲其君以玉爲楮葉者三年而後成亂之楮葉中而不可別也此人遂以巧食宋國列子聞之曰使天地生物三年而成一葉則物之有葉者寡矣故聖人持道化而不持智巧轉子云象爲楮葉又曰考成子學幻於尹文先生三年不告考成子請其過而求退尹文先生曰昔老聃之祖西也顧而告余曰有生之氣有形之狀盡幻也造化之所始隂陽之所變者謂之生謂之死窮數逹變因形移易者謂之化謂之幻造物者其巧妙其功深故難終難窮因形者其巧顯其功淺故隨起隨滅知幻化之不異生死也始可學}
  - {type: variant, offset: 112, length: 35, content: 畫比之書價則顧陸可同鍾離張僧繇可同逸少書則逡巡可成畫非歲月可就所以書多, WYG: 悼傷也自魯趨而往十日十夜而不休息裂衣裳裹足至}
  - {type: page-break, offset: 112, content: '', id: KR3k0012_WYG_752-10a, image: WYG0899/WYG0899-0606a.png}
  - {type: variant, offset: 112, length: 2, content: 畫比, krp: 幻矣吾與汝亦幻也奚須學哉墨子曰公輸子削竹木爲鵲成而飛}
