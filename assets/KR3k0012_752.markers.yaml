  - {type: variant, offset: 5, length: 2, content: 下歷, WYG: 之工名裔刻白玉為兩虎削玉為毛如真矣不㸃兩目睛始皇㸃之即飛去明年南郡有獻白虎二頭始皇使視之乃是先刻玉者始命去目睛二虎不復能去歴}
  - {type: variant, offset: 5, length: 2, content: 下歷, krp: 之工名裂裔刻白玉爲兩虎削玉爲毛有如眞矣不點兩目睛始皇點之即飛去明年南郡有獻白虎二頭始皇使視之乃是先刻玉者始命去目睛二虎不復能去歴}
