  - {type: variant, offset: 28, length: 0, content: '', SBCK: 借於禮作機巧非也以與巳字本同又曰目巧之室則有奥阼周禮曰國有}
  - {type: variant, offset: 28, length: 2, content: 六籍, WYG: 盛姬内御並觀之伎將終倡者瞬其目而招王之左右侍妾王怒立便欲誅偃師偃師大懼立剖散倡者以示王皆革木膠漆白黑丹青之所為也自内則肝膽心肺脾腎腸胃外則筋骨支節皮毛齒髮皆假物也無不畢具者合㑹復如初王試廢其心則口不能言廢其肝則目不能視廢其腎則足不能歩穆王曰人之巧乃與造化}
