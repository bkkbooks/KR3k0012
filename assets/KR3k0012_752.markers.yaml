  - {type: variant, offset: 32, length: 1, content: 四, krp: 乎詔貳車載之以歸夫班輸之雲梯墨翟之飛鳶自謂能之極也弟子東賈會滑釐間以偃師之巧吿於二子二子終身不敢語藝而}
  - {type: variant, offset: 34, length: 2, content: 並運, SBCK: 之職亦處其一也知者創物謂始闓端造器物􅀂丗本作者是也巧者述之守之丗謂之工父子丗以相教百工之事皆聖人之作也事無非聖人所爲也爍金以爲刄凝土以爲器作車以行陸作舟以行水此皆聖人所作也凝堅也天有時地有氣材有美工有巧合此四者然後可以爲良時寒温也氣剛柔也良善也續漢書曰張衡性精微有巧藝作地動儀以精銅鑄其器圜徑八尺形似傾樽其蓋穹隆飾以􅂐文外有八龍首銜銅丸下有蟾蜍承之其牙}
