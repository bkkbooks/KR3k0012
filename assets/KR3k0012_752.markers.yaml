  body:
  - {type: variant, offset: 3, length: 2, content: 八畫, SBCK: 九巧釋名曰巧者合異􅀋共成一體也禮曰無作淫巧以蕩上心又曰季康子之母死公輸􅀂方小公輸若匠師方小言年尚㓜未知禮也歛般請以機封歛}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 九巧釋名曰巧者合異􅁼成一體禮曰無作淫巧以蕩上心又曰季康子之母死公輸若方小公輸若匠師方小言年尚㓜未知禮也歛般請以機封歛下棺於椁般若之族多伎巧也見若掌歛事而年尚㓜請代之而欲嘗其伎巧將從之時人服般之巧公肩假曰不可般爾以人之母嘗巧則豈不得以以已字言寧有強使爾者爾借於禮作機巧非也以與已字本同又曰目巧之室則有奥阼周禮曰國有六職百工與居一焉百工司空事官之属於天地四時之職亦處其一也知者創物謂使闓端造器物若世本作者是也巧者述之守之世謂之工父子世以相敎百工之事皆聖人之作也事無非聖人所為也爍金以為刃凝土以為器作車以行陸作舟以行水此皆聖人之所作也凝堅也天有時地有氣材有美工有巧合此四者然後可以為良時寒溫也氣剛柔也良善也續漢書曰張衡性情微有工藝作地動儀以精銅鑄其器圜徑}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_WYG_752-1b, image: WYG0899/WYG0899-0601d.png}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_WYG_752-2a, image: WYG0899/WYG0899-0602a.png}
  - {type: variant, offset: 3, length: 0, content: '', krp: 九巧釋名曰巧者合異類共成一體也禮曰無作淫巧以蕩上心又曰季康子之母死公輸若方小公輸若匠師方小言年尚㓜未知禮也歛般請以機封歛下棺於椁般若之族多技巧者見若掌歛事而年尚㓜請代之而欲甞其技巧將從之時人服般之巧公肩假曰不可般爾以人之母嘗巧則豈不得以以已字言寕有强使女者與借於禮作機巧非也以與巳字本同又曰目巧之室則有奥阼周禮曰國有六職百工與居一焉百工司空事官之屬於天地四時之職亦處其一也知者創物謂始闓端造器物若丗本作者是也巧者述之守之丗謂之工父子丗以相教百工之事皆聖人之作也事無非聖人所爲也爍金以爲刄凝土以爲器作車以行陸作舟以行水此皆聖人所作也凝堅也天有時地有氣材有美工有巧合此四者然後可以爲良時寒温也氣剛柔也良善也續漢書曰張衡性精微有巧藝作地動儀以精銅鑄其器圜徑}
