  - {type: variant, offset: 4, length: 0, content: '', WYG: 尺銅形似傾尊其蓋穹隆餙以篆文外有八龍首啣銅丸下有蟾蜍承之其牙發機皆隱在樽中周際無餘如一體焉地動機發龍即吐丸蟾蜍張口受丸聲乃振楊司者覺知即省龍機其餘七首不發則知地振所從起來也合契若神觀之莫不服其竒麗自古以來未嘗有也蜀志曰諸葛亮性巧損益連弩木牛流馬皆出意自為晉書曰嵇康性絶巧而好鍜宅中有一柳樹甚茂乃激水環之每夏月居其下以鍜晉紀曰宋王為圍慕容超張綱巧絶於人乃使綱大治攻具於是城上火石弓弩無所用之晉陽秋曰呉葛衡字思直明達天官能為機巧改作渾天儀又曰衡陽區紙者甚有巧思造作木室作一婦人居其中人扣其戸婦人開户而出當戸再拜還入户内閉戸又作鼠市於中四方丈餘有四門門中有一木人縱四五鼠欲出門木人輙推木掩之門門如此鼠不得出又作指南車及木奴令舂糓作米中宗聞其巧詔補尚方左校沈約宋書曰石虎使解飛姚興令狐生造指南車宋武帝平長安始得此車戎狄所制不甚精緻雖指南多不審正廻曲平聚猶須人力正之范陽人祖冲之甚有巧思常謂宜更構造順帝昇明末齊王為相命冲之造為其制甚精百屈千迴未嘗移變北齊書曰髙隆之性小巧至於公家羽儀百戯服制時有改易不循舊典時論非之文士傳曰張衡嘗作木鳥假以羽翮腹中施機能飛數里後趙録曰邴輔櫟陵人也好學多才藝巧思機智妙於當時襄國宫殿臺榭皆輔所營也馬鈞别傳曰鈞子衡扶風人巧思絶世不自知其為巧也居貧舊綾機伍十綜者伍十躡六十綜者六十躡鈞乃易以十二躡其異文竒變因而作猶自然而成形隂陽之無窮葛洪神仙傳曰葛田者蜀人也刻木作羊能行一旦騎羊入山遂云得仙未知指實也鄴中記曰石虎有指南車及司里車又有舂車木人及作行碓於車上動則人蹋碓行十里成米一斛又有磨車置石磨於車上行十里輙磨一斛此車皆以朱彩為餙唯用將軍一人車行則衆巧並發車止則止中御史解飛尚方人朱猛變所造虎至性好佛衆巧奢靡不可紀也嘗作檀車廣丈餘安四輪作金佛像坐於車上九龍吐水灌之又作一木道人恒以手摩佛心腹之間又十餘木道人長二尺餘皆披袈裟繞佛行當佛前輙揖禮佛又以手撮香投爐中與人無異車行則木人行龍吐水車止則止亦解飛所造也𤣥中記曰魯班以石為禹九州圖今在格城石室山東地巖述異記曰竒肱氏善竒巧能為飛車從風遠行西京雜記曰長安巧工人丁緩者為恒滿燈七龍五鳳雜以芙蓉蓮藕之竒又作卧褥香爐一名被中香爐其法度本出房風至緩更始為之環轉四周而爐體常平可置之被褥故取被褥為名又作九層博山鑪鏤為竒禽怪獸諸靈皆自然運動又作七輪扇連以七輪大皆徑丈並相連續一人運之滿堂皆生風寒焉又曰昭陽殿椽桷皆刻作龍蛇縈繞之狀匠人丁緩李菊所作也其巧為天下第一凉州記曰吕光時有任射者自匿為王欣家奴發覺應死射有竒巧王􅈛魯般之儔也故赦之及大殿歲久傾敗射運巧致思土木俱正王子年拾遺記曰因祇國去王都九萬里其國婦人善織以五色絲内於口中手引結之則成文錦似列燈燭又曰始皇起逰雲臺窮四方之珍材捜天下之巧工人皆能騰虛縁木揮斤斧於空中又曰始皇二年騫霄國獻善}
