  - {type: variant, offset: 1799, length: 241, content: 一簞食一壺漿而夫子使賜止之何也夫子止由之行仁也夫子以仁教而禁其行仁由也不受子曰爾以為餓何不告於君發倉廩以給食之而以爾私饋之是汝不明君之惠見汝之私義也速已則可矣否則爾受責不久矣子路心服而退又曰北郭騷踵見晏子曰竊悅先生之義願乞所以養母者晏子使人分倉粟府金而遺之辭金而受粟有間晏子見疑於景公出犇北郭子召其友而告之曰吾悅晏子之義而嘗乞所以養母者吾聞之曰養及親者身更其難今晏子見疑吾將以身白之遂造公庭求復之曰晏子天下之賢者也今去齊國國必侵矣方必見國之侵也不若先死請絕頸以白晏子逡巡而退因自殺也, SBCK: 都盡郗}
