  - {type: variant, offset: 835, length: 441, content: 太守素知韶名德竟無所坐又曰隗囂既敗公孫述欲安眾以成都郭外有秦時舊倉述改名白帝倉述以色尚白故改之自王莽已來常空述即使人言白帝倉出榖如山陵百姓空市里往觀之述乃大會群臣問曰白帝倉竟出榖乎皆對言無述曰訛言不可信道隗王破者復如此矣俄而囂將王元降述以為將軍又曰虞詡時朝歌賊甯季等數千人攻殺長吏屯聚連年州郡不能禁乃以詡為朝歌長故舊皆弔詡曰得朝歌何衰詡笑曰志不求易事不避難臣之職也不遇盤根錯節何以別利器乎始到河內太守馬棱勉之曰君儒者當謨謀廟堂之上反在朝歌邪詡曰初除之日士大夫皆見弔勉詡籌之知其能為也朝歌者韓魏之郊背太行臨黃河去敖倉百里而青冀之人流亡萬數賊不知開倉招眾劫庫兵守成皋斷天下右臂此不足憂也今其眾新盛難與爭鋒兵不厭權願寬假轡策勿令有所舉閡而已及到官設令三科以募求壯士自掾吏已下各舉所知攻劫者為上偷盜為次帶喪服而不事家業者為下收得百餘人詡為之饗會悉負其罪使入賊中誘令劫掠乃伏兵以待之遂殺賊數百人及潛遣貧民能縫者傭作賊衣以綵縫其裾為幟幟記也續漢書曰以縫縷其裾也有市里者吏輒擒之賊由是駭散咸稱神明, SBCK: ''}
