  - {type: variant, offset: 2609, length: 2, content: 庾露, krp: 闤市垣也闠市門也風俗通曰俗言市井者言至市鬻賣當湏於井上洗濯令物鮮㓗然後市案二十畝爲一井今因井爲市禮記曰用器不中度不鬻於市布帛精麤不中數幅廣狹不中量不鬻於市姧色亂正色不鬻於市也周禮曰大市日􅻈而市百族爲主朝市朝時而市啇賈爲主夕市夕時而市販夫販婦爲主法云主者言其多也百族百姓也又曰凡國凶荒札喪則市無征又曰國君過市刑人赦夫人過市罰一幕丗子過市罰一帟命夫過市罰一蓋命婦過市罰一帷注曰市者交利而行刑之處也君子無故不遊觀焉史記曰吕不韋撰春秋成牓於秦市曰有人能改一字者賜金三十斤後漢書曰張楷字公超通嚴氏春秋古文尚書門徒常數百人賔客慕之自父黨夙儒皆造門焉車馬填街黃門及貴戚之家皆起舎巷次以候過客來徃之利楷疾其如此輙徙避之家貧無以爲業常乗驢車至縣賣藥足給食者輙還郷里司隷舉茂才除長陵令不之官隱居弘農山學者隨之所居成市後華隂山中遂有公超市又曰王充家貧無書甞遊洛陽市閱所賣書一遍而誦之晉書曰羊祐疾漸篤乃舉杜預自代㝷卒時年五十八帝素服哭之甚哀是日大寒帝涕淚霑鬚皆爲冰南州人方市聞祜喪莫不號慟罷市巷哭者聲相接呉守邊將士亦爲之泣其仁徳感人如此韓子曰龐共與魏太子質於邯鄲共謂魏王曰今一人言市有虎王信乎王曰否二人言王信乎曰否三人言王信乎王曰寡人信矣共曰夫市無虎明矣三人言成市虎今邯鄲去魏逺於市謗臣者過於三人願王察之越絶書曰伍子胥至呉徒跣𬒳髮乞於呉市三日市正疑之而導於闔閭曰市中有非常人徒跣𬒳髮乞於呉市三日呉闔閭曰吾聞荆王殺其臣伍奢而非其罪其子胥勇且智彼必經諸侯之邦可以報其父之讎者王即使召子胥入呉王下堦迎而唁數之曰吾知子非常人也何素窮如此子胥跪而垂泣曰胥父無罪而楚王殺之并其子子胥得道遁逃出走唯可以歸骸骨者唯大王哀之呉王曰諾上殿與語三日語無復者王乃令邦中無貴賤長少有不聽子胥敎者猶不聽寡人之罪至死不赦又曰呉市者春申君所造闕兩城以爲市在湖里班固兩都賦曰内則街衢洞逹閭閻且千九市開埸貨別隧分人不得顧車不得旋闐城溢郭傍流百㕓紅塵四合煙雲相連宫闕記云長安市有九所各方二百六十六歩六市在道西三市在道東西里爲市凡九市致九州之人在突門夾横橋大道南又有當市觀又曰旗亭樓在社門大道南又有當市觀張衡西京賦云郭開九市通闤帶闠旗亭五重俯察百隧是也又按郡國誌云長安大俠萬子夏居柳市司馬季主卜東市西市在醴泉坊隋曰利人市因有西市署洛陽記曰三市大市名也金市在大城西南市在大城南馬市在大城東按金市在臨啇觀西兊爲金故曰金市馬市在東舊置丞焉又酈道元注水經云馬市即嵇康爲司馬昭所害之處蜀夲紀曰老子爲關令尹喜著道經臨別曰子行道千日後於成都青羊肆㝷吾今爲青羊觀是也郡國志曰幽州有邠亭新論云添縣邠亭夲大王所部其人相與夜市不爲則有重害焉又曰始皇陵有銀蠶金鴈以多竒物故俗云秦王地市又曰郢城内有市名蒲胥故南齊校尉府也又曰越州梅市即梅福爲市門卒之所又曰齊桓公宫内有七市韓娥東之齊乏粮過雍門鬻歌於市乃此也又曰雍州富平西南十五里有直市城秦文王造物無二價以直市爲名西京記曰東京豐都市東西南北居二坊之地四面各開三門邸凡三百一十二區資貨一百行𥘉築市掘得古冢上藏無塼甓棺木陳朽觸之便散屍着平上幘朱衣得銘曰筮道居朝龜言近市五百年間於斯見矣當時逹者叅驗其文魏黃𥘉二年所葬也又曰大業六年諸夷來朝請入市交易煬帝許之於是修飾諸行葺理邸店皆使甍宇齊正卑髙如一瓌貨充}
