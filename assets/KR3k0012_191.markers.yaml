  - {type: variant, offset: 2595, length: 2, content: 笥毛, SBCK: 匱今百姓乏於外而賦歛無巳者是桀紂殘賊而爲天下戮今皇天降災於藏臺是君之福也莊子曰天地有官隂陽有藏魏都白藏之藏注曰白藏庫在西城有屋一百七十四間爾雅秋爲白藏因以爲名列子曰范氏之藏大火啇丘開入火徃還無難色埃不漫身不燋子華之客乃謝之晉摯虞武庫屋銘曰有財無義惟家之殃無愛糞土以毀五常張衡西京賦曰武庫禁兵設在蘭錡曹毗魏都賦曰百藏之庫戎儲攸歸潘岳}
  - {type: page-break, offset: 2595, content: '', id: KR3k0012_SBCK_191-4a}
  - {type: variant, offset: 2595, length: 2, content: 笥毛, WYG: 匱今百姓乏於外而賦斂無已者桀紂殘賊而為天下戮今皇天降災於藏臺是君之福也荘子曰天地有官陰陽有藏列子曰范氏之藏大火商丘開入火往還無難色埃不漫身不燋子華之家乃謝之晉摯虞武庫屋銘曰有財無義惟家之殃無愛糞土以毁五常張衡西京賦曰武庫禁兵設在蘭錡曹毗魏都賦曰白藏之庫戎儲攸歸注曰白藏庫在西城有屋一百七十四間爾雅秋為白藏因以為名潘岳}
  - {type: page-break, offset: 2595, content: '', id: KR3k0012_WYG_191-6a, image: WYG0894/WYG0894-0689c.png}
