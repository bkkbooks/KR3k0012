  - {type: variant, offset: 13, length: 3, content: 倉黃取, SBCK: 帑金幣所藏也府文書所藏也禮記曰季秋之月命百工審五庫之量蔡邕月令章句曰五庫者一曰車庫二曰兵庫三日􅀕器庫四曰樂器庫五曰宴器庫又月令曰季春命有司開府庫出幣帛聘名士周禮曰太府掌九貢九賦九功之貳以受其貨賄之入頒其貨于受藏之府頒其賄于受用之府凡萬民之貢以充府庫太府下大夫若今之司農又曰玉府掌王之金玉玩好兵器凡良貨賄之藏共王之服玉佩玉珠玉含玉諸侯則共珠盤玉敦又曰内府掌受九貢九賦九功貨賄良兵器以待􅀖之大用凡四方之幣獻之金玉齒革兵器凡良貨賄入焉又曰外府掌􅀖布之出入以供百物而待􅀖之小用注布帛之藏帛曰布小用賜也又天官玉府曰合諸侯則供珠盤鄭玄注曰以注飾盤承牛耳又春官天府曰天府掌祖廟之守藏與其禁令凡國之玉鎭大寳器藏焉若有大􅀕大丧則出而陳之旣事藏之凡官府郷州及都鄙之治中受}
  - {type: page-break, offset: 13, content: '', id: KR3k0012_SBCK_191-1b}
  - {type: variant, offset: 13, length: 3, content: 倉黃取, WYG: 帑金帛所藏也府文書所藏也禮記曰季秋之月命百工審五庫之量蔡邕月令章句曰五庫者一曰車庫二曰兵庫三曰祭器庫四曰樂器庫五曰宴器庫又月令曰季春命有司開府庫出幣帛聘名士周禮曰太府掌九貢九賦九功之貳以受其貨賄之入頒其貨於受藏之府頒其賄於受用之府凡萬民之貢以充府庫太府下大夫若今之司農又曰玉府掌王之金玉玩好兵器凡良貨賄之藏共王之服玉珮玉珠玉含玉諸侯則共珠盤玉敦又曰内府掌受九貢九賦九功貨賄良兵器以待邦之大用凡四方之幣獻之金玉齒革兵器凡良貨賄入焉又曰外府掌邦布之出入以供百物而待邦之小用注布帛之藏帛曰布小用賜也又天官玉府曰合諸侯則供珠盤鄭𤣥注曰以珠飾盤承牛耳又春官天府曰天府掌祖廟之守藏與其禁令凡國之玉鎮大寶器藏焉若有大祭大喪則出而陳之既事藏之凡官府鄉州及都鄙之治中受}
