  - {type: variant, offset: 2612, length: 1, content: 也, SBCK: 人物華盛時諸行鋪􅔡崇侈麗至賣菜者亦以龍􅂡席藉之夷人有就店飲敢皆令不取直胡夷驚視􅐛以爲常又曰西市隋曰利人市市西北隅有海池長安中僧法成所穿分永安渠以注之以爲放生之所穿池得古石銘云百年爲市而後爲池自置都立市至是時百餘年矣太平御覽卷第一百九十一}
  - {type: page-break, offset: 2612, content: '', id: KR3k0012_SBCK_191-8a}
  - {type: variant, offset: 2612, length: 1, content: 也, WYG: 人物華盛時諸行舖競崇侈麗至賣菜者亦以龍鬚席藉之夷人有就店飲噉皆令不取直胡夷驚視寖以為常又曰西市隋曰利人市市西北隅有海池長安中僧法成所穿分永安渠以注之以為放生之所穿池得古石銘云百年為市而後為池自置都立市至是時百餘年矣太平御覽卷一百九十一}
