  - {type: variant, offset: 2602, length: 5, content: 庾如坻如京, SBCK: 所聚也詩曰乘馬在廏左傳曰莊二十九年新作延廏書不時也凡馬日中而出日中而入注日中春秋分也治廏當以秋分今以春作不時也榖梁傳曰二十九年新延廏延廏者法廏注周禮天子十二閑言法廏者六閑之舊制又曰晉獻公欲伐虢荀息曰何不以屈産之乗垂􅁄之壁假道于虞也公曰此􅀳之寳也息曰是我取之中府而藏之外府取之中廏而藏之外廏禮記􅄂記曰廏焚孔子拜郷人爲火來者拜之士一大夫再亦相予之道也論語郷黨曰廏焚子退朝曰傷人乎不問馬史記曰夏侯嬰爲沛廏司御每送客還過髙祖語未甞不移日東觀漢記曰順帝漢安元年始置承華廏舎令又曰靈帝光和四年􅀄置緑􅂹廏領受郡國調馬調謂徴發漢舊儀曰天子六廏未央廏承華廏皆方匹三輔黃圖曰未央宫有金廏輅軨廏大廏果馬廏乾廏􅀐馬廏大宛廏胡河廏騊駼廏九在城内孟子曰廏有肥馬野有餓殍是率獸而食人也郡國誌曰雍州霸昌廏在長安西二十五里王莽使司徒王㝷發長安􅀫此春秋佐􅂇期曰廏星傳令神名詩時市古史考曰神農作市丗夲祝融作市說文曰市買賣之所也古今}
  - {type: page-break, offset: 2602, content: '', id: KR3k0012_SBCK_191-4b}
  - {type: page-break, offset: 2602, content: '', id: KR3k0012_SBCK_191-5a}
  - {type: variant, offset: 2602, length: 5, content: 庾如坻如京, WYG: 所聚也詩曰乘馬在廏左傳曰荘二十九年新作延廏書不時也凡馬日中而出日中而入注日中春秋分也治廏當以秋分今以春作不時也榖梁傳曰二十九年新延廏者法廏注周禮天子十二閑言法廏者六閑之舊制又曰晉獻公欲伐虢荀息曰何不以屈産之乘垂棘之璧借道於虞也公曰此晉之寶也息曰是我取之中府而藏之外府取之中廏而藏之外廏禮記雜記曰廏焚孔子拜郷人為火来者拜之士一大夫再亦相子之道也論語曰廏焚子退朝曰傷人乎不問馬史記曰夏侯嬰為沛廏司御每送客還過髙祖語未嘗不移日東觀漢記曰順帝漢安元年始置承華廏舎令又曰靈帝光和四年初置緑驥廏領受郡國調馬調謂徵發漢舊儀曰天子六廏未央廏承華廏皆萬匹三輔黄圖曰未央宫有金花廏輅軨廏大廏果馬乾梁廏騎馬廏大宛廏胡河廏騊駼廏凡廏九在城内孟子曰廏有肥馬野有餓殍此率獸而食人也郡國志曰雍州霸昌廏在長安西二十五里王莽使司徒王尋發長安宿此春秋左助期曰廏星傳令神明請時市古史考曰神農作市一本祝融作市説文曰市買賣之所也古今}
