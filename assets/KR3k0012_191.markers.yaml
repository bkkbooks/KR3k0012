  - {type: variant, offset: 2602, length: 5, content: 庾如坻如京, krp: 所聚也詩曰乘馬在廏左傳曰莊二十九年新作延廏書不時也凡馬日中而出日中而入注日中春秋分也治廏當以秋分今以春作不時也榖梁傳曰二十九年新延廏延廏者法廏注周禮天子十二閑言法廏者六閑之舊制又曰晉獻公欲伐虢荀息曰何不以屈産之乗垂棘之壁假道于虞也公曰此晉之寳也息曰是我取之中府而藏之外府取之中廏而藏之外廏禮記雜記曰廏焚孔子拜郷人爲火來者拜之士一大夫再亦相予之道也論語郷黨曰廏焚子退朝曰傷人乎不問馬史記曰夏侯嬰爲沛廏司御每送客還過髙祖語未甞不移日東觀漢記曰順帝漢安元年始置承華廏舎令又曰靈帝光和四年𥘉置緑驥廏領受郡國調馬調謂徴發漢舊儀曰天子六廏未央廏承華廏皆方匹三輔黃圖曰未央宫有金廏輅軨廏大廏果馬廏乾廏騎馬廏大宛廏胡河廏騊駼廏九在城内孟子曰廏有肥馬野有餓殍是率獸而食人也郡國誌曰雍州霸昌廏在長安西二十五里王莽使司徒王㝷發長安宿此春秋佐助期曰廏星傳令神名詩時市古史考曰神農作市丗夲祝融作市說文曰市買賣之所也古今}
