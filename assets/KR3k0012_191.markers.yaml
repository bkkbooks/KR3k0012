  - {type: variant, offset: 2207, length: 360, content: 青田溪發源太湖湖是白土無復細石中生蘊藻冬天水熱如湯故眾魚歸之名為魚倉益州記曰今成都縣東有頹城毀垣土人云古白帝倉也異苑曰餘姚縣倉封閉完密而年年輒大損耗是富陽縣桓王陵上雙石龜所食即斲毀龜口於是無復虧減三輔故事曰漢大將軍周亞夫軍於細柳今石激是也石激西有細柳倉城東嘉禾倉老子曰田甚蕪倉甚虛管子曰倉廩實知禮節又曰不務地利則倉不盈莊子曰諸中國之在海內不似稊米之在太倉乎韓子曰韓昭侯之時黍種貴昭侯令人覆廩吏果竊黍種糶之淮南子曰近敖倉者不為之多飯期滿腹而已鹽鐵論曰匈奴因山谷為城池水草為倉廩地理志曰敖倉在河南廣武山鄭國所置漢王與項羽爭天下運敖倉之粟囷西京雜記曰曹元理善筭友人陳廣漢有二囷忘其石數後筭欠一斗乃有鼠大如斗在其中吳志曰周瑜過魯肅求資肅有米三千石乃指一囷與之續異記曰晉陵無錫尉嚴無欲貯榖後開乃成虵以草焚之便貧詩曰胡取禾三百囷兮庾, SBCK: 靈金府}
