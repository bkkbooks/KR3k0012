  - {type: variant, offset: 362, length: 506, content: 投其璧於河又曰王子虎盟諸侯于王庭要言曰皆獎王室無相害也有渝此盟明神殛之俾墜其師無克祚國又曰甯武子與衛人盟於宛濮曰天禍衛國君臣不協以及此憂今天誘其衷使皆降心以相從也不有居者誰守社稷不有行者誰扞牧圉有渝此盟以相及者明神先君是紏是殛國人聞此盟也而後不貳又曰楚師將去宋申犀稽首於王之馬前曰無畏知死而不敢廢王命王棄言焉王不能荅申叔僕曰築室反耕者宋必命從人宋之懼使華元夜入楚師登子反之床而起之曰寡君使元以病告曰獘邑易子而食折骸以爨雖然城下之盟有以國弊不能從也去我三十里唯命是聽子反懼與之盟而告王退三十里宋及楚平華元為質盟曰我無爾詐爾無我虞楚不詐宋宋不備楚也又曰晉士爕會楚公子罷許偃盟于宋西門之外曰凡晉楚無相加戎好惡同之同恤災危備救凶患交贄往來道路無壅謀其不協而討不庭也又曰秋七月盟于毫范宣子曰不慎必失諸侯乃盟載曰凡我同盟無蘊年蘊積年穀而不分定無壅利無姦保藏罪人也無留慝救災患恤禍亂同好惡獎王室也又曰鄭大夫盟於伯有氏裨諶曰是盟也其與幾何言其不能久也裨諶鄭大夫也詩曰君子屢盟亂是用長又曰小邾射以句繹來奔曰使季路要我吾無盟矣以子路信誠故得與相要誓而不須盟也子路即季路使子路子路辭季康子使冉有謂之曰千乘之國不信其盟而信子之言子何辱焉, WYG: ''}
