  body:
  - {type: variant, offset: 7, length: 184, content: 一盟誓說文曰誓約束也尚書甘誓曰大戰于甘乃召六卿王曰嗟六事之人予誓告汝有扈氏威侮五行怠棄三正天用勦絕其命今予惟龔行天之罰左弗攻于左汝弗龔命左軍左之主射攻治之其職也右弗攻于右汝弗龔命禦非其馬之正汝弗龔命三者有失皆不奉我命也用命賞于祖弗用命戮于社天子親又載社主謂之社土不用命則戮於社也予則孥戮汝又泰誓王曰王乃徇師而誓曰嗚呼西土有眾咸聽朕言予有亂臣十人同心同德雖有周親不如仁人, SBCK: 二仇讎上}
