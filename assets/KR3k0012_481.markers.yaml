  - {type: variant, offset: 3704, length: 2, content: 誕為, krp: 因輔結客殺盆子兄故式侯恭輔坐繫詔獄三日乃得釋魏志曰楊阿若後名豐字伯陽少遊俠常以報仇解怨爲事至建安中}
  - {type: variant, offset: 3706, length: 0, content: '', WYG: 事志建安中}
  - {type: variant, offset: 3707, length: 1, content: 祖, SBCK: 守徐揖誅郡中強族黄氏時黄昂得脫在外乃募衆得千餘以攻揖揖城守豐時在外以昂爲不義乃􅂢妻子入南羌中合衆得千餘􅀐昂獨走出􅆧捕得之豐遂殺之又曰韓曁字公至同縣豪右陳茂譛曁父兄幾致大辟暨陽不以爲言庸賃積資隂結死士遂追㝷擒茂以首􅀕父墓由是顯名又曰典韋形貌魁捂膂力過人好節俠襄邑劉氏與睢陽李禮爲讎韋爲報之禮故冨春長備怨甚謹韋乗車載雞酒僞爲候者門開懷匕首入殺禮并殺其妻徐岀取車呉志曰孫翊之妻徐氏甚美賊嬀覽殺翊悉取其嬪妾而復欲逼徐氏恐違之見害時月垂竟乃使人謂覽乞至晦日設􅀕除服覽許之徐氏遂潜使親信者語翊舊}
  - {type: variant, offset: 3707, length: 1, content: 祖, WYG: 守徐揖誅郡中强族黄氏時黄昴得脫在外乃募衆得千餘以攻揖揖城守豐時在外以昴為不義乃捐妻子入南羗中合衆得千餘騎昴獨走出羗捕得之豐遂殺之又曰韓暨字公至同縣豪右陳茂譛暨父母幾致大辟暨陽不以為言庸賃積資隂結死士遂追尋擒茂以首祭父墓由是顯名又曰典韋形貌魁梧膂力過人好節俠襄邑劉氏與睢陽李禮為讎韋為報之禮故富春長備怨甚謹韋乗車載鷄酒偽為候者門開懐匕首入殺禮并殺其妻徐出取車吳志曰孫翊之妻徐氏甚美賊媯覽殺翊悉取其嬪妾而復欲逼徐氏恐違之見害時月垂竟乃使人謂覽乞至晦日設祭除服覽許之徐氏遂潛使親信者語翊舊}
