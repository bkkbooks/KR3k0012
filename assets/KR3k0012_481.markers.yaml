  - {type: variant, offset: 3710, length: 0, content: '', krp: 曽食其肝肺又曰桓温父𬒳害之時温年十五枕戈泣血宻欲報仇經年方知乃提刀直進手刃仇人由是名重當時又曰龔壯字子偉值惠懷末天下大亂李特爲㓂壯父叔並爲特所害壯欲報仇㑹李壽鎮漢中壽時與李期有嫌壯因說壽討期壽然之遂帥衆還討期特孫也故壯假以復讎壽旣捷因欲官壯}
  - {type: variant, offset: 3712, length: 1, content: 見, SBCK: 仕又曰沈充敗于呉興呉興人呉儒充之將也充亡失道誤入儒家誘内充重壁因􅀏謂充曰三千户侯也充曰封侯不足貪也爾大義全我我宗族必厚報􅀂必殺我汝族滅矣儒遂殺之充子勁字丗堅即潜報仇族滅呉氏沈約宋書曰沈林子以仇讎未復從髙祖尅京城進平都邑時年十八身長七尺五寸仇沈預慮林子爲害常􅀍甲持戈至是林子與兄田子還東報讎五月夏節直入預男女無長㓜悉屠之以預首􅀕父祖墓孫嚴宋書曰宋越父爲蠻所殺其讎甞出郡越白日於市口刺殺之}
  - {type: page-break, offset: 3712, content: '', id: KR3k0012_SBCK_481-7b}
  - {type: variant, offset: 3712, length: 1, content: 見, WYG: 仕又曰沈充敗于吳興吳興人吳儒充之將也充亡失道誤入儒家内充重壁因笑謂充曰三千户侯也充曰封侯不足貪也爾大義全我我宗族必厚報若必殺我汝族㓕矣儒遂殺之充子勁字世堅即潛報仇族㓕吳氏沈約宋書曰沈林子以仇讎未復從髙祖剋京城進平都邑時年十八身長七尺五寸仇沈預慮林子為害常被甲持戈至是林子與兄田子還東報讎五月夏節直入預男女無長幼悉屠之以預首祭父墓孫嚴宋書曰宋越父為蠻所殺其讎嘗出郡越白日於市口刺殺之}
