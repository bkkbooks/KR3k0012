  - {type: variant, offset: 3710, length: 0, content: '', SBCK: 曽食其肝肺又曰桓温父􅀍害之時温年十五枕戈泣血宻欲報仇經年方知乃提刀直進手刃仇人由是名重當時又曰龔壯字子偉值惠懷末天下大亂李特爲㓂壯父叔並爲特所害壯欲報仇㑹李壽鎮漢中壽時與李期有嫌壯因􅀃壽討期壽然之遂帥衆還討期特孫也故壯假以復讎壽旣捷因欲官壯}
  - {type: page-break, offset: 3710, content: '', id: KR3k0012_SBCK_481-7a}
  - {type: variant, offset: 3710, length: 0, content: '', WYG: 曾食其肝肺又曰桓温父彛為人所害温年十五枕戈泣血密欲報仇經年方知乃提刀直進手刃仇由是名重當時又曰龔壯字子偉值惠懐末天下大亂李特為冦壯父叔並為特所害壯欲報仇㑹李夀鎮漢中夀時與李期有嫌壯因說夀討期夀然之遂帥衆還討期特孫也故壯假以復仇夀既捷因欲官壯}
