  - {type: variant, offset: 3476, length: 164, content: 東國吾為王殺太子不然則吾將與三國共立之然則下東國必可得矣又曰趙太后新用事秦急攻之趙氏求救於齊齊曰必以長安君為質兵乃出太后不肯大臣強諫太后謂左右言有復今長安君為質老婦必唾其面左師觸龍言曰今媼尊長安君之位而封之以膏腴之地與之重器不令有功於國若山陵崩長安君何以自託於趙老臣以媼為長安君計短也太后曰諾於是為長安君約車百乘質於齊齊兵乃出也, SBCK: ''}
