  - {type: variant, offset: 3715, length: 1, content: 叔, SBCK: 文明太后以其㓜而孝決又不逃罪特免之梁書曰張景仁廣平人也父天監􅀄爲同縣違法所殺景仁時年八歲及長志在復讎普通七年遇法公田渚手斬其首以􅀕父墓事竟詣郡自􅅞乞依刑法太守蔡天起上言乃下教褒美之原其罪下属長蠲其一户租調以旌孝行唐書曰絳州孝女衛氏子無忌夏縣人也􅀄其父爲郷人衛長則所殺無忌時年六歲}
  - {type: page-break, offset: 3715, content: '', id: KR3k0012_SBCK_481-8a}
  - {type: variant, offset: 3715, length: 1, content: 叔, WYG: 文明太后以其幼而孝且又不迯罪特免之梁書曰張景仁廣平人也父天監初為同縣韋法所殺景仁時年八歲及長志在復讎普通七年遇法分田渚乃斬其首以祭父墓事竟詣郡自縛乞依刑法太守蔡天起上言於時簡文在鎮乃下教褒美之原其罪下屬長蠲其一户租調以旌孝門唐書曰絳州孝女衛氏字無忌夏縣人也初其父為鄉人衞長則所殺無忌時年六歲}
