  - {type: variant, offset: 3714, length: 0, content: '', SBCK: 守夏侯穆嘉之擢爲隊主後魏書曰淳于誕字靈逺年十二隨父向楊州父於路爲盗所害誕雖童稚而哀感奮發傾資結客旬朔之内遂得復讎由是州里歎異之又曰孫益德其母爲人所害益德童㓜爲母復仇還家哭於殯以待縣官髙}
