  - {type: variant, offset: 3660, length: 0, content: '', SBCK: 欲爲報怨耳諸君寧肯哀之乎少年許諾相聚得數十百人因與吕母入海自稱將軍遂破海曲執縣宰殺之以􅀕其子冡也又曰趙喜字伯陽南宛人也少有節操從兄爲人所殺無子喜十五常思欲報之乃挾兵結客後遂徃復仇而仇家皆疾病無相拒者喜以因疾報殺非仁者心且釋之而去顧謂仇曰尔曹􅀂徤逺相避也後病愈悉自􅅞詣喜不與相見後竟殺之又曰周黨字伯况太原人至長安遊學􅀄郷佐甞衆中辱黨父黨懷之後讀}
