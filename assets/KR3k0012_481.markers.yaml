  - {type: variant, offset: 886, length: 1, content: 意, WYG: 耻猶今君之耻也戰國䇿曰晉畢陽之孫豫讓始事范中行氏不說去而就智伯智伯寵之及三晉分智氏趙襄子最怨智伯而將其頭以為飲器讓遁逃山中曰嗟乎士為知己者死女為恱己者容吾其報智氏之讎矣乃變姓名為刑人入宫塗厠欲刺襄子如厠心動執問塗者讓刃其扞曰欲為智伯報讎左右欲殺之襄子曰彼義士也吾謹避之耳智伯已死無後而其臣報讎此天下之賢也卒釋之讓又漆身為癘㓕鬚鬢去眉自刑以變其容為乞人而往乞其妻不識曰狀貌不似吾夫其音}
