  - {type: variant, offset: 1504, length: 152, content: 今王諸呂非約也東觀漢記曰隗囂字季孟天水人也以王莽篡逆復漢之祚乃立高祖太宗之廟稱臣執事史奉壁而告祝畢有司穿坎於庭割牲而盟魏志曰臧洪字子原廣陵射陽人也張邈起兵請洪與計事又致之於劉兗州公山孔豫州公緒乃設壇場方共盟誓諸州郡相讓乃共推洪洪乃升壇操盤血而盟晉中興書曰符洪第三子健陰圖關中陽使其徒種麥示無西意有微知其計, WYG: 雖死}
