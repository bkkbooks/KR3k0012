  - {type: variant, offset: 3707, length: 1, content: 祖, krp: 守徐揖誅郡中強族黄氏時黄昂得脫在外乃募衆得千餘以攻揖揖城守豐時在外以昂爲不義乃捐妻子入南羌中合衆得千餘騎昂獨走出羌捕得之豐遂殺之又曰韓曁字公至同縣豪右陳茂譛曁父兄幾致大辟暨陽不以爲言庸賃積資隂結死士遂追㝷擒茂以首祭父墓由是顯名又曰典韋形貌魁捂膂力過人好節俠襄邑劉氏與睢陽李禮爲讎韋爲報之禮故冨春長備怨甚謹韋乗車載雞酒僞爲候者門開懷匕首入殺禮并殺其妻徐岀取車呉志曰孫翊之妻徐氏甚美賊嬀覽殺翊悉取其嬪妾而復欲逼徐氏恐違之見害時月垂竟乃使人謂覽乞至晦日設祭除服覽許之徐氏遂潜使親信者語翊舊}
  - {type: variant, offset: 3709, length: 0, content: '', SBCK: 委任將孫髙􅀓嬰二人具白逼巳之狀欲徴立計以求助焉髙嬰等聞之涕泣言舊蒙翊恩許之乃宻結翊平時所侍養二十餘人以徐氏之言語之仍皆􅉀誓合謀至晦日徐氏遂設􅀕除服薫衣沐浴内施帷帳以􅀱覽焉大小怪其如此無不悽愴覽宻遣偵之無復疑慮徐氏乃命髙嬰輩羅住戸外使人報覽言巳除凶畢矣覽遂盛飾而入徐氏出拜戸外覽􅂊下拜徐氏即呼二郡可起髙嬰等齊出即時殺覽徐氏却服縗絰使持覽首以􅀕墓舉軍震駭以爲神韋昭呉書曰凌統怨甘寧殺其父操寧常避統不與相見孫權亦命統不得讎之甞於吕蒙舎酒酣統乃以刀舞寧起曰寧能􅀟㦸舞蒙曰寧雖能未若蒙之功也因操刀楯以身分之王隱晉書曰趙誘爲杜曽所害誘子胤}
  - {type: page-break, offset: 3709, content: '', id: KR3k0012_SBCK_481-6b}
  - {type: variant, offset: 3709, length: 0, content: '', WYG: 委任將孫髙𫝊嬰二人俱白逼己之狀欲徴立計以求助焉髙嬰等聞之涕泣言舊䝉翊恩許之乃宻結翊平時所侍養二十餘人以徐氏之言語之仍皆盟誓合謀至晦日徐氏遂設祭除服薫衣沐浴内施帷帳以候覽焉大小恠其如此無不悽愴覽宻遣偵之無復疑慮徐氏乃命髙嬰輩羅住户外使人報覽言已除㓙畢矣覽遂盛飾而入徐氏出拜户外覽纔下拜徐氏即呼二君可起髙嬰等齊出即時殺覽徐氏却服縗絰使持覽首以祭墓舉軍震駭以為神韋昭吳書曰凌統怨甘寧殺其父操寧常備統不與相見孫權亦命統不得讎之嘗於吕䝉舎酒酣統乃以刀舞寧起曰寧能雙㦸舞蒙曰寧雖能未若䝉之力也因操刀楯以身分之王𨼆晉書曰趙誘為杜曽所害誘子𦙍}
  - {type: page-break, offset: 3709, content: '', id: KR3k0012_WYG_481-11a, image: WYG0897/WYG0897-0367a.png}
  - {type: variant, offset: 3709, length: 0, content: '', krp: 委任將孫髙傳嬰二人具白逼巳之狀欲徴立計以求助焉髙嬰等聞之涕泣言舊蒙翊恩許之乃宻結翊平時所侍養二十餘人以徐氏之言語之仍皆􅉀誓合謀至晦日徐氏遂設祭除服薫衣沐浴内施帷帳以候覽焉大小怪其如此無不悽愴覽宻遣偵之無復疑慮徐氏乃命髙嬰輩羅住戸外使人報覽言巳除凶畢矣覽遂盛飾而入徐氏出拜戸外覽纔下拜徐氏即呼二郡可起髙嬰等齊出即時殺覽徐氏却服縗絰使持覽首以祭墓舉軍震駭以爲神韋昭呉書曰凌統怨甘寧殺其父操寧常避統不與相見孫權亦命統不得讎之甞於吕蒙舎酒酣統乃以刀舞寧起曰寧能雙㦸舞蒙曰寧雖能未若蒙之功也因操刀楯以身分之王隱晉書曰趙誘爲杜曽所害誘子胤}
