  - {type: variant, offset: 892, length: 0, content: '', WYG: 子之道甚難而無功謂子有志則然矣謂子智則否以子之才而善事襄子襄子必近子子之得近而行所欲此甚易而功必成讓乃笑而應之曰是為先知報後知為故君賊新君大亂君臣之義者必此矣凡吾所為此者以明君臣之義非從易也且夫委質而事人而求弑之懐二心以事君也吾所為難亦將以愧天下後世人臣懐二心者頃之襄子當出讓伏所當過橋下襄子至橋而馬驚襄子曰此必豫讓也使人問之果讓於是襄子數讓曰子不嘗事范中行氏乎智伯㓕范中行氏而子不為報讎反委質事智伯智伯已死子獨何為報之深也讓曰臣事范中行氏中行氏以衆人遇我我故衆人報之智伯以國士遇我我故國士報之襄子乃喟然泣曰嗟乎豫子豫子為智伯名既成矣}
