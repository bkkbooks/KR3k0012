  - {type: variant, offset: 3681, length: 3, content: 晉中興, SBCK: 更輟講而還與郷佐剋日交刃黨爲其所復困頓郷佐服義與歸養之數月方􅂫旣悟而去整身修志州里稱其髙也又曰申屠蟠同郡緱氏女玉爲父報讎殺夫氏之黨吏執玉以告外黄令梁配欲論殺玉蟠時年十五爲書生進諫曰玉之節義足以感無耻之孫激忍辱之子不遭明時當表旌廬墓況在清聽而不加哀矜配善其言乃爲讞得減死論郷人稱美之又曰酒泉龐㳙母者趙氏之女字娥父爲同縣人所殺而娥兄弟三人俱疾物故讎乃喜而自賀以爲莫已報也娥隂懷感憤乃潜備刀兵常推車以候讎家十餘年不能得後遇於都亭刺殺之因詣縣自首曰父仇巳報請就刑戮福冨長尹喜義之解印綬欲與俱亡娥不肯去曰怨塞身死妾之明分結罪治獄君之常理何敢苟生以枉公法後遇赦得免州郡表其閭太常張奂嘉歎以束帛禮之又曰彭寵故舊渤海趙寛妻子家屬依託寵居寛仇家趙伯有好奴以賕寵寵貪之爲盡殺寛家屬寵之勃徳不仁貪狼如此又曰郅惲友人董子張病將終惲候之子張視惲戯欷不能言惲曰吾知子不悲天命痛讎不復也惲即起將客遮仇人取其頭以示子張子張見而氣絶惲即詣縣以狀自首漢}
  - {type: page-break, offset: 3681, content: '', id: KR3k0012_SBCK_481-5a}
