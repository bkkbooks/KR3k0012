  - {type: variant, offset: 3686, length: 5, content: 諸葛誕叛遣, SBCK: 原渉與新豐冨人祁大伯友大伯同母弟王游公素嫉渉時爲縣門下􅁺􅀃尹公曰君以守令辱原渉如是一旦眞令至君復單車歸爲府史渉刺客如雲殺人皆不知主民可爲寒心今爲君計莫若條奏其舊惡君必得真令如此渉亦不敢怨矣尹公如其計王莽果以尹公爲真令渉繇此怨王游公遂殺游公及}
