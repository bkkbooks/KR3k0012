  - {type: variant, offset: 1657, length: 1215, content: 肯耕種者健殺之後十餘日師眾西行到孟津作浮橋渡河使弟雄步騎五千人入潼關兄子青軹關入河東誓曰若事不捷汝死河北我死河南為鬼無相見也王羲之為會稽內史慨然稱疾去郡於父母墓前自誓曰維永和十一年二月九日小子羲之敢昭告尊靈義之不天夙遭閔凶不遂過庭之訓母兄鞠育得漸庶幾遂因人之力蒙國寵榮進無忠孝之節退違聖賢量力之義將憂及宗祀豈在微身是用寤寐永嘆若墜淵谷羲之既去官與東士人士盡山水之遊弋釣為娛與道士許玄度共脩服食採求藥石不遠千里朝廷以其誓苦亦不徵又曰祖逖說中宗以掃平中原於是以逖為前鋒都督奮威將軍豫州刺史給布三千疋逖乃逕北渡江中流誓曰祖逖不清中原而復濟者如此江蕭子顯齊書曰王敬則為暨陽令縣有一部劫逃柴山中為民患敬則遣人致意劫師悉可出首當先申論治下廟神甚酷烈百姓畏之敬則引神為誓必不相負劫師既出敬則於廟中設酒會於坐收縛之曰吾先啟神若負誓還神十牛今不得違誓即殺十牛併斬諸賊百姓悅之漢書春秋曰梁皇后崩桓帝獨呼小黃門唐衡至北戶如廁問左右梁冀不相得者皆誰衡對曰單起左悺前詣河南尹不疑禮敬小簡不疑收其兄弟送雒陽獄於是帝與入室定謀齧起臂出血以為盟乃誅梁冀高士傳曰胡昭初晉宣帝為布衣時與昭有舊昭同郡周士等謀害帝昭聞而步險邀士於濟澠之間止士士不肯昭泣以示誠士感義乃止昭斫棗樹共士盟而別昭雖有陰德於帝口終不言時人莫知華陽國志曰昭王時有一虎傷害千餘人昭王乃募有能殺虎者賞時巴夷廖仲作白竹之弩乃射殺虎昭王刻石盟要曰秦犯夷輸黃龍一雙夷犯秦輸清酒一鍾夷人安之晏子春秋曰崔杼殺莊公盟於國者戟鉤其頸劍承其心晏子不與盟而出上車其僕將馳晏子撫其手曰鹿生於山命懸於廚命有所懸矣成節而去黃庭經曰黃庭為不死之道受者齋九日或七日或三日然後授之者為師受者奉焉結盟立誓期以勿泄古者盟用玄雲之錦九十尺金簡鳳文之羅四十尺竹林七賢論曰劉伶常病酒渴求酒於其妻妻捐酒毀器泣而諫曰君酒過非攝生之道也必宜斷之伶曰善吾不能自禁唯酒當禮鬼神自誓以斷之耳便可具酒肉妻敬聞命供酒肉於前請伶祝誓伶跪而祝曰天生劉伶以酒為名一飲一斛五斗解酲婦人之言慎不可聽仍引酒御肉隗然而已復醉矣孫卿子曰盟詛不及五帝誓誥不及三王交質不及五伯穀梁二傳交質不及二伯淮南子曰胡人彈骨胡人之盟約置酒人頭骨中飲以相咀也越人契臂中國唼盟所由名異其於信一也質左傳曰鄭武公莊公為平王卿士賈逵曰卿士也有事者六卿也王貳于虢鄭伯怨王王曰無之故周鄭交質王子狐為質於鄭鄭公子忽為質於周王子狐周平王之子鄭子忽鄭莊公太子忽也王崩周人將畀虢公政夏鄭祭仲帥師取溫之麥溫周地也蘇氏邑也秋又取成周之禾周鄭交惡君子曰信不由中質無益也又曰楚子圍鄭旬有七日鄭人卜行成不吉卜臨于大宮且巷出車吉賈達曰臨哭也巷出車陳於巷街示雖困不降必欲戰也國人大臨守陴者皆哭俾城堞也楚子退師鄭人脩城進復圍之三月克之入自皇門至於達路皇門鄭城門也鄭伯肉袒牽羊以逆曰孤不天不為天所佑也不能事君使君懷怒以及弊邑孤之罪也敢不唯命是聽其俘諸江南以實海濱亦唯命其翦以賜諸侯使臣妾之亦唯命若不泯其社稷使改事君君之惠也孤之願也, WYG: 恨}
