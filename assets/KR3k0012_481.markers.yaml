  - {type: variant, offset: 865, length: 0, content: '', SBCK: 有志則然矣謂子智則否以子之才而善事襄子襄子必近子子之得近而行所欲此甚見而功必成讓乃􅀏而應之曰是爲先知報後知爲故君賊新君大亂君臣之義者無此矣凢吾所謂此者以明君臣之義非從易也且夫委質而事人而求弑之懷二心以事君也吾所爲難亦將以愧天下後丗人臣懷二心者頃之襄子當出讓伏所當過橋下襄子至橋而馬驚襄子曰此必豫讓也使人問之果讓於是襄子數讓曰子不甞事范中行氏乎知伯滅范中行氏而子不爲報讎反委質事知伯知伯巳死子獨}
