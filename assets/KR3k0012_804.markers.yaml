  - {type: variant, offset: 3860, length: 1024, content: 公記曰震澤中洞庭山南有洞穴深百餘尺旁行五十餘里至龍宮杰公謂是東海龍王第七女掌龍王珠藏小龍千戶衛護此珠龍畏蠟愛美玉及空青而嗜燒鷰使通信可得寶珠帝聞大喜乃詔有能使者厚賞之於是羅子春兄弟三人應募帝勑百工以于闐舒河中美玉造小函二以桐木灰發其光求宣州空青汰取其精者用海魚膠調之成二函火堅之龍腦香尋亦繼之杰公曰以蠟塗子春等身及衣佩石乃燒鷰五百枚入洞穴至龍宮守門小蛟聞蠟氣俯伏不敢動乃以燒鷰百事賂之令其通以其上上者獻龍女龍女食之大喜又上玉函青缶具陳帝旨洞中有龍五千餘歲能變化出入人間善譯時俗之言龍女知帝禮之以大珠三小珠七雜珠一石以報帝命子春等乘龍載珠還國食頃之間便至龍去而子春薦珍帝大喜喜得聘通靈異獲天人之寶以珠示杰公公曰三珠其一是天帝如意珠之下者其二是驪龍珠之中者七珠二是虫珠五是海蚌珠人間之上者雜珠是蚌蛤虵鶴等珠不如大珠之貴帝遍示百寮朝廷咸謂杰公虛誕莫不詰之杰公曰如意珠之上者夜光照四十餘里中者十里下者一里光之所及無風雨雷雹水火刀兵諸毒癘驪珠九色夜光百步中者十步下者一室光之所及無虵虺虫豸之毒虫珠七色多赤六足二目目當其處有曰如鐵蟻皋蚌珠五色皆有夜光及數尺無瑕者為上有瑕者為下蚌珠生於其腹與月盈虧虵珠所致隋侯噲參即其事也又問虵鶴之辯對曰使其自識帝命杰公記虵鶴二珠斗餘雜珠散於殿前取大黃虵玄鶴各十數處布珠中間於是鶴御其珠鳴舞徘徊虵御其珠盤屈宛轉群公觀者莫不歎服帝復出如意龍虫等珠校光之遠近七元之數皆如杰公之言盛弘之荊州記曰石蘊玉以潤其區漢含珠而清其域闞駰十三州志曰僧彊疊國在天笁南佛寺三千餘所其地有神珠非玉石晝夜於國中光明於日珠徑一尺五寸其色正碧草方草木狀曰凡採珠一旁小平形似覆釜第一珠母肉玉白人民以薑齏食之常璩華陽國志曰廣陽縣山出青珠永昌郡愽南縣有光珠穴出光珠珠有黃珠白珠青珠碧珠徐哀南方草物狀曰凡採珠常三月用五牲祈禱若祠祭有失則風攪海水或有大魚在蚌左右自蚌珠長二寸半在漲海中其一寸五分其光色一旁小平形似覆釜為第一璫珠凡三品其一寸三分雖有光色形不員正為第二滑珠凡三品萬震南州異物志曰合浦有民善游採珠兒年十餘便教入水求珠官禁民採珠巧盜者蹲水底剖蜯得好珠吞之而出裴氏廣州記曰鯨鯢目即明月珠故死不見有目精林邑記曰黃被州上戶口殷富多明珠雜寶語林曰王長史語林道人曰真長可謂金石滿堂林公以語孫興公興公曰語不得耳選擇正可得少碎珠耳又曰中朝有人詣王太尉過王安豐大將軍丞相在坐因往別屋見李寅平子還謂人曰今之行𧢻目皆琳琅珠玉又曰玉夷甫處眾中如珠玉之在瓦石宋玉風賦曰垂珠步搖來排臣戶, WYG: ''}
