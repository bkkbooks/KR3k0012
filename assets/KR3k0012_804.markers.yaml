  - {type: variant, offset: 445, length: 0, content: '', SBCK: 公賜公衍羔裘使獻龍輔於齊侯龍輔玉名遂入羔裘齊侯喜與之陽榖陽榖齊邑又曰公疾徧賜大夫從公者大夫不受賜子家子􅀟琥琥玉器一環一璧輕服細好之服受之大夫皆受其賜巳未公薨子家反賜於府人曰吾不敢逆君命也大夫皆反其賜又昭十六年曰晉韓起聘于鄭宣子有環其一在鄭啇玉環同工共朴自共爲􅀟宣子謁諸鄭伯謁請子子産弗與曰非官府之守器也寡君不知子太叔子羽謂子産曰韓子亦無幾求言所􅀂我用瓘斝玉瓉鄭必不火子産弗與}
  - {type: page-break, offset: 445, content: '', id: KR3k0012_SBCK_804-4b}
  - {type: variant, offset: 445, length: 2, content: 以珠, WYG: 飲}
  - {type: variant, offset: 445, length: 2, content: 以珠, krp: 執}
  - {type: variant, offset: 446, length: 1, content: 珠, SBCK: 爲天災流行非禳所息故也爲明年宋衛陳災傳又定上曰蔡昭侯爲兩佩與兩裘佩佩}
  - {type: variant, offset: 448, length: 2, content: 為幣, SBCK: 也以如楚獻一佩一裘於昭王昭王服之以享蔡侯又曰蔡侯歸及漢執玉而沈曰余所有濟漢而南者有􅀂大川自誓言􅀂復渡漢當受禍明如大川又曰季平子行東野還未至丙申卒于房陽虎將以璵璠歛與璠美玉君所賜仲梁懷弗興曰改歩改玉昭公之出孫行君事偑璵􅀕宗廟今定公立復臣位改君歩則亦當去璵璠陽虎欲逐之告公山不狃曰彼爲君也子何怨焉又定下曰邾隠公來朝子貢觀焉邾子執玉髙其容仰公受玉卑其容俯王朝者之贄子貢曰以禮觀之二君者皆有死亡焉又曰陽虎脫甲如宫取寳玉大弓以出又哀上曰衛太子禱曰大命不敢請佩玉不敢愛又曰吴申叔儀乞糧於公孫有山氏曰佩玉葉􅀆余無所繫之榖梁傳隱公曰賵玉曰唅春秋孔演圖曰孔子論經有烏化爲書孔子奉以告天赤爵集書上化爲玉刻曰孔提命作應法春秋􅀃題辭曰孔子以受黄玉葬魯城北毛詩國風曰將翺將翔佩玉鏘鏘將將鳴玉而後行又竹竿曰巧􅀏之瑳佩玉之郍瑳巧􅀏貌郍行有節度又小雅曰它山之石可以攻玉攻錯也又大雅曰維玉及瑶鞞琫容刀詩含神霧曰孔子曰詩者天地之心刻之玉板藏之金府韓詩外傳曰良玉度尺雖有千仞之土不能掩其光周易鼎卦曰上九鼎玉鉉大吉無不利鄭􅀇注曰鼎蓋象玉似剛而柔廉而不劌易曰乾爲金爲玉孝經援神契曰神靈滋液百寳用則玉有瑛華宋均曰尊卑不失其服玉者英華也論語子罕曰子貢曰有美玉於斯韞櫝而藏諸求善價而沽諸子曰沽之哉沽之哉我待價者也寧有自訟賣之道乎我居而待價者又季氏曰孔子曰求虎兕出於椑􅀛玉毁於櫝中是誰之過與逸論語曰璠璵魯之寳玉也孔子曰美哉璠璵逺而望之煥􅀂也近而視之瑟􅀂也一則理勝一則孚勝}
