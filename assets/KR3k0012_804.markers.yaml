  - {type: variant, offset: 2004, length: 1, content: 鬱, krp: 曰宋人或得玉獻諸子罕子罕弗受獻玉者曰以示玉人玉人能治玉者玉人以爲寳也故敢獻之子罕曰我以不貪爲寳爾以玉爲寳若以與我皆喪寳也不若人有其寳稽首而告曰小人懷璧不可以越郷言必謂盗所害納此以請死也請免死子罕寘諸其里使玉人爲之攻之攻治也冨而後使復其所賣玉得冨又曰襄公十八年晉侯伐齊將濟河獻子以朱絲玉二瑴雙玉日瑴而禱曰齊環怙恃其險負其衆庻環齊靈公名負依也弃好背盟陵虐神主神主民也謂數伐魯民人曽臣彪將率諸侯以討焉彪晉平公名稱臣者明上有天子以謙告臣曽臣猶臣其官臣偃實先後之守官之臣偃獻子名苟捷有功無作神羞羞恥也官臣偃無敢復濟偃信巫言故以死自誓唯爾有神裁之沈玉而濟又昭七年曰燕曁齊平燕人歸燕姬嫁玉與齊侯賂以瑶罋玉櫝斝耳不克而還瑶玉也櫝匱也斝耳玉爵又曰公賜公衍羔裘使獻龍輔於齊侯龍輔玉名遂入羔裘齊侯喜與之陽榖陽榖齊邑又曰公疾徧賜大夫從公者大夫不受賜子家子雙琥琥玉器一環一璧輕服細好之服受之大夫皆受其賜巳未公薨子家反賜於府人曰吾不敢逆君命也大夫皆反其賜又昭十六年曰晉韓起聘于鄭宣子有環其一在鄭啇玉環同工共朴自共爲雙宣子謁諸鄭伯謁請子子産弗與曰非官府之守器也寡君不知子太叔子羽謂子産曰韓子亦無幾求言所若我用瓘斝玉瓉鄭必不火子産弗與以爲天災流行非禳所息故也爲明年宋衛陳災傳又定上曰蔡昭侯爲兩佩與兩裘佩佩玉也以如楚獻一佩一裘於昭王昭王服之以享蔡侯又曰蔡侯歸及漢執玉而沈曰余所有濟漢而南者有若大川自誓言若復渡漢當受禍明如大川又曰季平子行東野還未至丙申卒于房陽虎將以璵璠歛與璠美玉君所賜仲梁懷弗興曰改歩改玉昭公之出孫行君事偑璵祭宗廟今定公立復臣位改君歩則亦當去璵璠陽虎欲逐之告公山不狃曰彼爲君也子何怨焉又定下曰邾隠公來朝子貢觀焉邾子執玉髙其容仰公受玉卑其容俯王朝者之贄子貢曰以禮觀之二君者皆有死亡焉又曰陽虎脫甲如宫取寳玉大弓以出又哀上曰衛太子禱曰大命不敢請佩玉不敢愛又曰吴申叔儀乞糧於公孫有山氏曰佩玉葉兮余無所繫之榖梁傳隱公曰賵玉曰唅春秋孔演圖曰孔子論經有烏化爲書孔子奉以告天赤爵集書上化爲玉刻曰孔提命作應法春秋說題辭曰孔子以受黄玉葬魯城北毛詩國風曰將翺將翔佩玉鏘鏘將將鳴玉而後行又竹竿曰巧笑之瑳佩玉之郍瑳巧笑貌郍行有節度又小雅曰它山之石可以攻玉攻錯也又大雅曰維玉及瑶鞞琫容刀詩含神霧曰孔子曰詩者天地之心刻之玉板藏之金府韓詩外傳曰良玉度尺雖有千仞之土不能掩其光周易鼎卦曰上九鼎玉鉉大吉無不利鄭玄注曰鼎蓋象玉似剛而柔廉而不劌易曰乾爲金爲玉孝經援神契曰神靈滋液百寳用則玉有瑛華宋均曰尊卑不失其服玉者英華也論語子罕曰子貢曰有美玉於斯韞櫝而藏諸求善價而沽諸子曰沽之哉沽之哉我待價者也寧有自訟賣之道乎我居而待價者又季氏曰孔子曰求虎兕出於椑龜玉毁於櫝中是誰之過與逸論語曰璠璵魯之寳玉也孔子曰美哉璠璵逺而望之煥若也近而視之瑟若也一則理勝一則孚勝又曰玉十謂之區治玉謂之琢亦謂之雕雙王爲瑴五榖爲區雕治璞也㲄音角瑳玉色鮮白也瑩玉色也瑛玉光也瓊赤玉也璿瑾瑜美玉也璑舞三采玉也玲瑲琤􅖰瑝鍠玉聲也璬玉佩玉也瑱充耳也璪玉飾以水藻也史記曰范蠡事越王勾踐二十餘年竟滅吴范蠡曰君行令臣行意乃載其輕寳珠玉乗舟浮海行終不反漢書曰陳平求見漢王拜平爲都尉綘灌等或䜛平曰雖美丈夫如冠玉耳又曰文帝始幸雍新垣平以望氣見平使人持玉柸闕下獻之平言上曰闕下有寳玉氣果有獻玉柸者又郊祀志曰宣帝祀河東之明年鳯凰集祋祤於所集處得寳玉乃起萬壽宮又曰王莽就國孔休守新都相休謁見莽莽進其玉具寳劒休不肯受莽因曰誠見君靣有瘢美玉可以滅獻其璏耳即解其璏休復辭莽遂椎碎之自裏以進休也後漢書曰孝明帝時汴渠成故行幸滎陽廵行河渠薦嘉玉潔牲以禮河神續漢書曰桓帝時光禄吏舎下夜有青氣視之得玉鈎玦各一鈎長七寸三分玦五寸四分身中皆雕鏤又曰三老五更杖玉杖民年七十授之以玉杖華嶠後漢書曰嘉平中袁逢爲三老賜玉杖范曄後漢書曰梁兾金玉珠璣異方珎怪積藏室魏志曰漢時夫餘王葬用玉鉀常䂊以付玄莬郡王死則迎取以葬公淵伏誅玄莬庫猶有玉鉀一具今夫餘庫有玉璧珪瓉數代之物傳丗以爲寳耆老言先代之所賜也魏略曰大秦國出采玉五色玉夫餘國出赤玉晉書曰中興東遷舊章多闕而冕旒飾以翡翠珊瑚及雜珠等顧和奏舊冕十有二旒皆用玉珠今用雜珠等非禮若不能玉可用白琁成帝於是始下太常改之沈約宋書曰紫玉王者不藏金玉則光見深山崔鴻十六國春秋南燕録曰鎮南長史恱壽謂南海王法曰向見北海王子天資弘雅神爽髙邁始知天族多竒玉}
