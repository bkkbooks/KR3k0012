  - {type: 'tls:seg', offset: 2235, content: '', id: KR3k0012_CHANT_804-37a.5}
  - {type: variant, offset: 2236, length: 5, content: 丹州而來吐, WYG: 裹以進休也後漢書曰孝明帝時汴渠成故行幸滎陽巡行河渠薦嘉玉潔牲以禮河神續漢書曰桓帝時光禄吏舎下夜有青氣視之得玉鈎玦各一鈎長七寸三分玦五寸四分身中皆雕鏤又曰三老五更杖玊杖民年七十授之以玉杖華嶠後漢書曰嘉平中袁逄為三老賜玉杖范􅁮後漢書曰梁冀金玉珠璣異方琛恠積藏寳魏志曰漢夫餘王𦵏用玉鉀常豫以付𤣥莬郡王死則迎取以𦵏公淵伏誅𤣥莬庫猶有玉鉀一具今夫餘庫有玉璧珪瓉數代之物傳世以為寳耆老言先代之所賜也魏略曰大秦國出采玉}
