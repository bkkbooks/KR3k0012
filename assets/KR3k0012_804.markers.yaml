  - {type: variant, offset: 4544, length: 340, content: 一珠母肉玉白人民以薑齏食之常璩華陽國志曰廣陽縣山出青珠永昌郡愽南縣有光珠穴出光珠珠有黃珠白珠青珠碧珠徐哀南方草物狀曰凡採珠常三月用五牲祈禱若祠祭有失則風攪海水或有大魚在蚌左右自蚌珠長二寸半在漲海中其一寸五分其光色一旁小平形似覆釜為第一璫珠凡三品其一寸三分雖有光色形不員正為第二滑珠凡三品萬震南州異物志曰合浦有民善游採珠兒年十餘便教入水求珠官禁民採珠巧盜者蹲水底剖蜯得好珠吞之而出裴氏廣州記曰鯨鯢目即明月珠故死不見有目精林邑記曰黃被州上戶口殷富多明珠雜寶語林曰王長史語林道人曰真長可謂金石滿堂林公以語孫興公興公曰語不得耳選擇正可得少碎珠耳又曰中朝有人詣王太尉過王安豐大將軍丞相在坐因往別屋見李寅平子還謂人曰今之行𧢻目皆琳琅珠玉又曰玉夷甫處眾中如珠玉之在瓦石宋玉風賦曰垂珠步搖來排臣戶, SBCK: 八百四}
