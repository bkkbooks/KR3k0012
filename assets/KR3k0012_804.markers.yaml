  - {type: variant, offset: 440, length: 3, content: 藏金石, SBCK: 以討焉彪晉平公名稱臣者明上有天子以謙告臣曽臣猶臣其官臣偃實先後之守官之臣偃獻子名苟捷有功無作神羞羞恥也官臣偃無敢復濟偃信巫言故以死自誓唯爾有神裁之沈玉而濟又昭七年曰燕曁齊平燕人歸燕􅁎嫁玉與齊侯賂以瑶罋玉櫝斝耳不克而還瑶玉也櫝匱也斝耳玉爵}
