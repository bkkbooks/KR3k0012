  - {type: variant, offset: 464, length: 1, content: 丹, SBCK: 文帝始幸雍新垣平以望氣見平使人持玉柸闕下獻之平言上曰闕下有寳玉氣果有獻玉柸者又郊祀志曰宣帝祀河東之明年鳯凰集祋祤於所集處得寳玉乃起萬壽宮又曰王莽就國孔休守新都相休謁見莽莽進其玉具寳劒休不肯受莽因曰誠見君靣有瘢美玉可以滅獻其璏耳即解其璏休復辭莽遂椎碎之自裏以進休也後漢書曰孝明帝時汴渠成故行幸滎陽廵行河渠薦嘉玉潔牲以禮河神續漢書曰桓帝時光禄吏舎下夜有}
