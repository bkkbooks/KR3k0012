  - {type: variant, offset: 129, length: 281, content: 知所謂自聖朝已來為國盡忠清貞自守終始不渝者屈突通張道源而已通子三人來選共有一疋羸馬道源兒子不能存立未見一言及之今弘節為國立功前後大蒙賞賚居官終歿不言貪殘妻子賣珠未為有罪審其清者無所存問疑其濁者傍罪舉人雖疾惡情深實以好善不篤臣竊思度未見其可恐有識聞之必生撗議伏惟再思上撫掌曰造文不思遂有此語方知談不容易又曰婆利東有羅剎國其人極陋朱髮黑身獸牙鷹爪時與林邑人作市以夜而來自掩其面其國出火珠狀如水精日午時以珠承影取艾依之即火出管子曰桓公問管子曰昔者周人有天下諸侯賓復名教通於天下而奪於其下何數也管子對曰君分壤而貢入市朝同流黃金一篋也江陽之珠一篋也此謂以寡為多以狹為廣又曰, SBCK: 枯}
