  - {type: variant, offset: 567, length: 201, content: 既出果得珠孫卿子曰在物莫明於珠玉珠玉不覩王公則不為寶又曰昔衛靈公坐重華之臺侍御數百隨珠照日羅衣從風仲叔御入諫靈公下席再拜曰寡人過矣莊子曰夫唾大者如珠小者如霧又曰黃帝遊於赤水之北登于崑崙之丘遺其玄珠使知索之而弗得使離朱索之而弗得使罔象索之乃得又曰河上有貧窮待織蕭綃而食者其子投淵得千金之珠謂其子曰取石來鍜之夫千金之珠必在九重之淵驪龍頷下子能得珠者遭其睡也使驪龍悟子尚奚有哉又曰脩其道之謂備不以物挫志之謂完, WYG: ''}
