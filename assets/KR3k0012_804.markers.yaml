  - {type: variant, offset: 1944, length: 1, content: 珪, WYG: 器人不學不知道又聘義曰子貢問扵孔子曰敢問君子貴玉而賤珉何也為玊之寡珉之多與孔子曰非為珉之多故賤之也玉之寡故貴之也夫昔者君子比徳扵玊焉温潤而澤仁也縝宻而栗知也廉而不劌義也垂之如墜禮也叩之其聲清越以長其終詘然樂也瑕不掩瑜瑜不掩瑕忠也孚尹旁逹信也氣如白虹天也精神見扵山川地也圭}
  - {type: page-break, offset: 1944, content: '', id: KR3k0012_WYG_804-3b, image: WYG0900/WYG0900-0138d.png}
  - {type: variant, offset: 1944, length: 1, content: 珪, krp: 器人不學不知道又聘義曰子貢問於孔子曰敢問君子貴玉而賤珉何也爲玉之寡珉之多與孔子曰非爲珉之多故賤之也玉之寡故貴之也夫昔者君子比德於玉焉温潤而澤仁也縝宻而栗知也縝髮也栗堅貌廉而不劌義也劌猶傷也義者不苟傷人也垂之如墜禮也禮尚謙卑叩之其聲清越以長其終詘然樂也樂作則有聲止則無也越猶陽也詘絶止貌瑕不掩瑜瑜不掩瑕忠也暇玉之病也瑜其中間美者孚尹旁逹信也氣如白虹天也精神見于山川地也精神亦精氣也虹天氣也圭}
