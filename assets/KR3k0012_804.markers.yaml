  - {type: variant, offset: 1957, length: 4, content: 珠出館陶, krp: 禮稽命徴曰王者得禮制則澤谷之中有白玉焉禮斗威儀曰君乗金而王則紫玉見於深山左詩桓公曰𥘉虞叔有玉虞公求旃不獻旣而悔之曰周諺有之疋夫無罪懷璧其罪吾焉用此以其賈害乃獻之又莊公曰􅉑公晉侯朝王享禮命之宥命之以幣物有助也皆玉五㲄非禮也又僖上曰天王使邵武公内史過賜晉侯命受玉惰過歸告王曰晉侯其無後乎事具錫命門又僖下曰楚子玉自爲瓊弁玉纓未之服也先戰夢河神謂巳曰卑余賜汝孟諸之麋弗致也}
