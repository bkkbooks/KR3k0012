  - {type: variant, offset: 19, length: 0, content: '', WYG: 宗伯曰王作六器以禮天地四方以蒼璧禮天以黄琮禮地以青珪禮東方以赤璋禮南方以白琥禮西方以𤣥璜禮北方儀禮聘禮曰凡執玉無籍者襲鄭元注曰籍言修也大載禮曰玉在山而木潤淵生}
