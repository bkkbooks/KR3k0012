  - {type: variant, offset: 947, length: 1, content: 買, SBCK: 兄鑒曠弟寳迅皆以才識知名􅁗雍爲之語曰三龍一門金友玉昆又曰􅀄吕光之稱王也遣市六璽於于闐六月玉至也燕書曰文帝熈平二年左部民得玉璽玉鼎趙書曰劉聦徙治平陽於汾水中得白玉四寸髙二分龍鈕文曰有新保之後魏書曰崔挺爲光州刺史掖縣有人年踰九十板輿造州自稱少曽充使林邑得一美玉方尺四寸甚有光彩藏之海島垂六十歳忻逢明政今願奉之挺曰吾雖德謝古人未能以玉爲寳遣舡隨取光潤果然迄不肯受乃表送都又曰李預字元凱歴征西大將軍長史帶馮翊太守府解罷郡遂居長安羡古人飡玉法乃採訪藍田躬徃政得􅀂環璧雜器形者大小百餘頗有麤黒者亦挾盛以還至而觀之皆光潤可玩預乃椎七十􅋞爲屑食之餘多惠人後預及聞者更求玉於前處皆無所見翊公源懷弟得}
