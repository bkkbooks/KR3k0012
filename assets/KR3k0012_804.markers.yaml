  - {type: variant, offset: 1008, length: 475, content: 楚王亡其猨而林木為之殘楚莊王援揵躁衣木而處故殘林以求之也宋玉亡珠而池中魚為之殫又曰珠玉尊則天下爭禮樂飾則純朴散又曰禹填鴻水以為山堙崑崙以為土中立曾城九重其高萬一千里上有木禾禾長五丈五尺珠樹玉樹不死樹沙棠琅玕綘樹並在曾城沙棠琅玕珠類矣玉璜在西北隅任子曰丹淵之珠沉於黃泥牟子曰珠玉少而貴凡屬多而賤聖人七經而已佛遂萬億言恐煩而無當也抱朴子曰識珍者必拾濁水之明珠賞氣者必採穢藪之芳蕙穆天子傳曰北征舍於珠澤此澤出珠故名也珠澤之藪方四十里山海經曰開明山北有珠樹又曰三珠樹生赤水山其為樹如柏業皆為珠一曰其狀若彗如彗星狀又曰鳥鼠同穴之山滋水出焉西注于漢水多如魚魮之魚是生珠玉亦珠玉蚌類又曰數曆之山楚水出焉其中多白珠今蜀郡平澤出青珠戰國策曰張丑為質於燕王欲殺之走出國境境吏得丑丑曰燕所為將殺我者人有言我有寶珠也王欲得之我失已久矣如燕不信今子但欲致我我且言子之奪我珠而吞之燕王必且殺之刳子之腹矣吾要且死子之腹亦且寸絕境吏恐而放之又曰蘇秦說李兌不能聽送秦以明月之珠和氏之璧黑貂之裘又曰有人操隨侯之珠露野無弓弩之衛必危呂氏春秋曰宋桓司馬有寶珠抵罪出亡王使人問珠之所在曰投之池, SBCK: 孝昌}
