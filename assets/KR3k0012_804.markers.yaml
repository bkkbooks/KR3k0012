  - {type: variant, offset: 30, length: 87, content: 赤心耳何用珠為竟不受又曰貞觀中桂州都督李弘節以清慎聞身歿之後其家賣珠上聞之乃宣言於朝曰此人生時宰相言其清白今日既然所舉者豈得無罪必可理之不可捨也魏徵諫曰陛下言此人不清未見受財, SBCK: 食}
  - {type: variant, offset: 30, length: 87, content: 赤心耳何用珠為竟不受又曰貞觀中桂州都督李弘節以清慎聞身歿之後其家賣珠上聞之乃宣言於朝曰此人生時宰相言其清白今日既然所舉者豈得無罪必可理之不可捨也魏徵諫曰陛下言此人不清未見受財, krp: 食}
