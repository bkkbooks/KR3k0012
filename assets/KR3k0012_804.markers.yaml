  - {type: variant, offset: 2225, length: 4, content: 舜葬蒼梧, WYG: 季平子行東野還未至丙申卒于房陽虎以璵璠歛仲梁懷弗與曰改歩改玉昭公}
  - {type: variant, offset: 2225, length: 4, content: 舜葬蒼梧, krp: 孝昌中於廣平王第掘得古玉印勑召祖瑩與李琰}
  - {type: variant, offset: 2230, length: 1, content: 野, WYG: 岀季孫行君事佩璵璠祭宗廟今定公立復位臣改君歩則亦當去璵璠陽虎欲逐之告公山不狃曰彼為君也子何怨焉又定下曰邾隱公來朝子貢觀焉邾子執玊髙其容仰公受玊卑其容俯子貢曰以禮觀之二君者皆有死亡焉又曰陽虎脱甲如宫取寳玊大弓以出又哀上曰衛太子禱曰大命不敢請佩玊不敢愛又曰呉申叔儀乞糧於公孫有山氏曰佩玊蘂兮予無所繫之榖梁𫝊隱公曰賵玊曰唅春秋孔演圖曰孔子論經}
  - {type: page-break, offset: 2230, content: '', id: KR3k0012_WYG_804-8b, image: WYG0900/WYG0900-0141b.png}
  - {type: variant, offset: 2230, length: 3, content: 野有鳥, krp: 令辯何丗之物瑩云此是于闐國王晉㤗康中所獻乃以墨塗字觀之果}
  - {type: punctuation, offset: 2231, content: ，, id: KR3k0012_CHANT_804-bkkpn716}
  - {type: 'tls:seg', offset: 2231, content: '', id: KR3k0012_CHANT_804-37a.4}
  - {type: variant, offset: 2233, length: 0, content: '', WYG: 化為書孔子奉以告天赤爵集書上化為玊刻曰孔氏命作應法春秋説題辭曰孔子以受黃玉𦵏魯城北毛詩國風曰將翺將翔佩玊鏘鏘又竹竿曰巧笑之瑳佩玊之儺又小雅曰他山之石可以攻玉又大雅曰維玉及瑶鞞琫容刀詩含神霧曰孔子曰詩者天地之心刻之玉板藏之金府韓詩外𫝊曰良玉度尺雖有千仭之土不能掩其光周易鼎卦曰上九鼎玊鉉大吉旡不利孝經援神契曰神靈液百寳用則玊有璞宋匀曰尊卑不失其服玉者英華也論語子罕曰子貢曰有美玊扵斯韞櫝而藏諸求善賈而沽諸子曰沽之哉沽之哉我待賈者也又季氏曰孔子曰求虎兕出於柙龜玉毁扵櫝中是誰之過與逸論語曰璠璵舊魯之寳玊也孔子曰美哉璠璵逺而望之煥若也近而視之瑟若也一則理勝一則孚勝又曰玉十謂之區治玊謂之琢亦謂之雕雙玊為㲄五㲄為區雕治璞也皷音角瑳玉色鮮白也瑩玊色也瑛玊光也瓊赤玊也璿瑾瑜美玊也璑舞三采玊也玲瑲琤瑱瑝煌玊聲也璬玊珮玉也瑱充耳也璪玊飾以水藻也史記曰范蠡事越王勾踐二十餘年竟滅呉范蠡曰君行令臣行意乃載輕寳珠玉乘舟浮玉行終不反漢書曰陳平求見漢王拜平為都尉絳灌等或䜛平曰雖美丈夫}
