  - {type: variant, offset: 2455, length: 710, content: 四寸珠送闕下既去景帝時復獻三寸珠數十枚去不知所之列女傳曰珠崖令卒官妻息送喪歸漢法內珠入關者死妻棄其係臂珠男年九歲好而取之置其母鏡奩中母不知也至關吏搜索得珠問誰當坐者前妻子初曰初當坐之繼母請吏曰幸無劾兒誠不知也妾當坐初又曰夫人哀初之孤欲以活初耳因號泣傍人莫不酸鼻隕涕關吏執筆不能就一字乃曰母子有義如此吾寧坐之不忍加文又且相讓安知孰是乃棄珠而遣之神仙傳曰麻姑欲見蔡經母及經弟婦弟婦新產十數日麻姑望見之曰噫且止勿前即求少許米便以擲地視米墮地皆成珠方平笑曰姑故年少吾老矣不喜復作此變化也列仙傳曰鄭交甫將往楚道至漢皋臺下見二女佩兩珠大如荊雞卵交甫與之言曰欲子之佩二女解與之既行返顧二女不見佩亦失矣吳越春秋曰越王允常聘歐冶子造五劍秦客薛燭善相劍示之燭曰雖傾城量珠玉猶未可與也又曰伍員奔吳至昭關關吏欲執之伍員曰上所以索我者以我有美珠也今執我將言爾取之關吏因捨焉邴原別傳曰原遠遊學詣安丘孫崧崧辭曰君鄉里鄭君知之乎原荅曰然崧曰鄭君學覽古今學者之師模君乃舍之似不知也而曰然何原曰故有登山而採玉者有入海而採珠者不知山之高海之深哉愽物志曰鮫人從水出寓人家積曰賣絹將去從主人索一器泣而成珠滿盤以與主人又曰五月五日取青蛉頭正中埋皆成青珠王朗雜事曰焦生乞恩辭生未有婦從烏桓贖李娥為妻與耳中金璫一雙珠四枚璫二雙珠三十雙合中真珠一升盧綝四王起事曰張方劫帝西遷國家有寶物詔石將軍載之於是放軍人八千餘人三日輦之尚有缺角真珠百餘斛又曰惠帝遷長安時洛陽御府有大珠璫百餘斛衛玠別傳曰驃騎王武子君之舅也常與君同語語人曰昨日與吾外甥並坐冏若明珠之在我側朗然來暎人搜神記曰吳王夫差女名玉童子韓重有道術王悅之結氣死葬于昌門之外重至冢前哭祭女見形將重入冢臨去取徑寸明珠以送重, SBCK: ''}
