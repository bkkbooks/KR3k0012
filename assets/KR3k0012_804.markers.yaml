  - {type: variant, offset: 3215, length: 80, content: 鶴為戎人所射窮而歸參收養療治瘡愈放之後鶴夜到門外參秉燭視之鶴雌雄雙至各御明月珠報參焉又曰南海之外有鮫人水居如魚不廢緝績其人能泣珠幽明錄曰洛下有洞穴婦欲殺夫推下經, krp: 注云䓗變爲韮亦是謹案自六年巳來逺近山石}
  - {type: punctuation, offset: 3216, content: ，, id: KR3k0012_CHANT_804-bkkpn1017}
  - {type: 'tls:seg', offset: 3216, content: '', id: KR3k0012_CHANT_804-49a.13}
  - {type: variant, offset: 3217, length: 612, content: 戎人所射窮而歸參收養療治瘡愈放之後鶴夜到門外參秉燭視之鶴雌雄雙至各御明月珠報參焉又曰南海之外有鮫人水居如魚不廢緝績其人能泣珠幽明錄曰洛下有洞穴婦欲殺夫推下經多時至底仍得一穴行數十里見人皆長三丈披羽衣如此九處最晚所至告飢長人指中庭柏樹下有一羊令跪捋羊初捋得一珠後得始令其噉之即得療飢復尋穴行出交州還洛問張華云九處地仙名九館大夫羊為癡龍初一珠食之天地等壽次者延年後者充飢而已事具嵩山又曰漢武帝幸河渚聞絃歌之音而有老公及年少數人出皆長八九寸為帝奏樂飲酒樂老公顧命洞穴之寶一人受命下沒川底得一大珠徑數寸明耀絕世上問東方朔朔曰河底有穴沉數百丈中有赤蜯生此珠也事具樂部又曰王敦召王猛猛至江口入水中命舡人進舡至大電見猛行水中從東北還逆舡弟子問其故猛云水神數興波浪賊害行旅暫約勒以真珠一握為信三秦記曰始皇冢中以夜光珠為日月殿懸明月珠晝夜光明三輔決錄曰昆明池中有神池通白鹿原人釣魚綸絕而去夢於漢武帝求去鉤帝明日戲於池見大魚御索帝曰豈夢所見耶取而放之後三日池邊得明珠一雙帝曰豈魚之報耶沈懷遠南越志曰珠有九品大五分以上至一寸八分分為八品有光彩一邊小平似覆釜者名璫珠璫珠之次為走珠走珠之次為滑珠滑珠之次為磥砢珠磥砢珠之次為官兩珠官兩珠之次為稅珠稅珠之次為𦬘符珠孫柔之瑞應圖曰晉平公鼓琴有玄鶴二八而下御明珠舞於庭一鶴失珠覔得而走師曠掩口而笑廣志曰莫難珠其色黃生東夷又有明珠稱光大徑寸或團二寸以上出黃支有至員珠置平地終日不得停今上方名以甲乙為次第石珠鑄, WYG: 玉}
