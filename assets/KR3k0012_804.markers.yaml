  - {type: variant, offset: 2243, length: 0, content: '', WYG: 夫餘國出赤玉晉書曰中興東遷舊章多闕而冕旒飾以翡翠珊瑚及雜珠等顧和奏舊冕十有二旒皆用玉珠今用雜珠等非禮若不能玉可用白璇成帝扵是始下太常改}
  - {type: variant, offset: 2244, length: 3, content: 氣如雲, WYG: 沈約宋書曰紫玉王者不藏金玉則光見深山崔鴻十六國春秋南燕録曰南長史悦夀謂南海王法曰向見北海王子天資𢎞雅神爽髙邁始知天族多竒玊林皆寳又前凉録曰辛攀字懷逺隴西狄道人兄鑒曠弟寳迅皆以才識知}
  - {type: page-break, offset: 2244, content: '', id: KR3k0012_WYG_804-12a, image: WYG0900/WYG0900-0143a.png}
