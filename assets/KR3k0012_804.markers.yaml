  - {type: variant, offset: 945, length: 1, content: 鄭, SBCK: 􅃢瑚及􅄂珠等顧和奏舊冕十有二旒皆用玉珠今用􅄂珠等非禮􅀂不能玉可用白琁成帝於是始下太常改之沈約宋書曰紫玉王者不藏金玉則光見􅀷山崔鴻十六國春秋南燕録曰鎮南長史恱壽謂南海王法曰向見北海王子天資􅀪雅神爽髙邁始知天族多竒玉林皆寳又前涼録曰辛攀字懷逺隴西狄道}
