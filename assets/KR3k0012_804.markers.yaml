  - {type: variant, offset: 3296, length: 792, content: 時至底仍得一穴行數十里見人皆長三丈披羽衣如此九處最晚所至告飢長人指中庭柏樹下有一羊令跪捋羊初捋得一珠後得始令其噉之即得療飢復尋穴行出交州還洛問張華云九處地仙名九館大夫羊為癡龍初一珠食之天地等壽次者延年後者充飢而已事具嵩山又曰漢武帝幸河渚聞絃歌之音而有老公及年少數人出皆長八九寸為帝奏樂飲酒樂老公顧命洞穴之寶一人受命下沒川底得一大珠徑數寸明耀絕世上問東方朔朔曰河底有穴沉數百丈中有赤蜯生此珠也事具樂部又曰王敦召王猛猛至江口入水中命舡人進舡至大電見猛行水中從東北還逆舡弟子問其故猛云水神數興波浪賊害行旅暫約勒以真珠一握為信三秦記曰始皇冢中以夜光珠為日月殿懸明月珠晝夜光明三輔決錄曰昆明池中有神池通白鹿原人釣魚綸絕而去夢於漢武帝求去鉤帝明日戲於池見大魚御索帝曰豈夢所見耶取而放之後三日池邊得明珠一雙帝曰豈魚之報耶沈懷遠南越志曰珠有九品大五分以上至一寸八分分為八品有光彩一邊小平似覆釜者名璫珠璫珠之次為走珠走珠之次為滑珠滑珠之次為磥砢珠磥砢珠之次為官兩珠官兩珠之次為稅珠稅珠之次為𦬘符珠孫柔之瑞應圖曰晉平公鼓琴有玄鶴二八而下御明珠舞於庭一鶴失珠覔得而走師曠掩口而笑廣志曰莫難珠其色黃生東夷又有明珠稱光大徑寸或團二寸以上出黃支有至員珠置平地終日不得停今上方名以甲乙為次第石珠鑄石為珠廣志曰夫餘地美珠如酸棗又曰班魚頭中有白石如珠璣出北海梁四公記曰震澤中洞庭山南有洞穴深百餘尺旁行五十餘里至龍宮杰公謂是東海龍王第七女掌龍王珠藏小龍千戶衛護此珠龍畏蠟愛美玉及空青而嗜燒鷰使通信可得寶珠帝聞大喜乃詔有能使者厚賞之於是羅子春兄弟三人應募帝勑百工以于闐舒河中美玉造小函二以桐木灰發其光求宣州空青汰取其精者用海魚膠調之成二函火堅之龍腦香尋亦繼之杰公曰以蠟塗子春等身及衣佩石乃燒鷰五百枚入洞穴至龍宮守門小蛟聞蠟氣俯伏不敢動乃以燒鷰百事賂之令其通以其上上者獻龍女龍女食之大喜又上玉函青缶具陳帝旨洞中有龍五千餘歲能, SBCK: ''}
