  - {type: variant, offset: 5, length: 0, content: '', SBCK: 又顧命曰成王􅀍冕服馮玉几又曰大玉夷玉天琭在東序尚書中候曰湯沉璧於洛黒鳥隨魚止化爲黒玉赤勒文尚書􅀃曰有人能起載玉英鄭􅀇日王果實召載爲骨衣也尚書大傳曰堯致舜天}
  - {type: variant, offset: 5, length: 0, content: '', krp: 又顧命曰成王𬒳冕服馮玉几又曰大玉夷玉天琭在東序尚書中候曰湯沉璧於洛黒鳥隨魚止化爲黒玉赤勒文尚書說曰有人能起載玉英鄭玄日王果實召載爲骨衣也尚書大傳曰堯致舜天}
