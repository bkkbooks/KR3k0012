  - {type: variant, offset: 453, length: 4, content: 起於禺山, SBCK: 十謂之區治玉謂之􅅣亦謂之雕雙王爲瑴五榖爲區雕治璞也㲄音角瑳玉色鮮白也瑩玉色也瑛玉光也瓊赤玉也璿瑾瑜美玉也璑舞三采玉也玲瑲琤􅖰瑝鍠玉聲也璬玉佩玉也瑱充耳也璪玉飾以水藻也史記曰范蠡事越王勾踐二十餘年竟滅吴范蠡曰君行令臣行意乃載其輕寳}
  - {type: page-break, offset: 453, content: '', id: KR3k0012_SBCK_804-6a}
  - {type: variant, offset: 453, length: 9, content: 起於禺山珠起於赤野, WYG: 不趨志重玉也}
  - {type: variant, offset: 453, length: 1, content: 起, krp: 不趍志重玉也又檀弓曰石駘仲卒駘仲衛大夫石碏之疾無適子有庻子六人卜所以爲後者莫適立也曰沭浴佩玉則兆言齊潔則得吉兆也五人者則沐浴佩玉石祁子曰孰有執親之喪而沭浴佩玉者乎不沭浴佩玉心正且知禮又月令曰孟春之月天子衣青衣服蒼玉又玉藻曰古之君子必佩玉右徴角左宫羽玉聲所中也徵角在右事也民也可以勞宫羽在左宫也物也冝逸趨以采齊路門外之樂節也門外謂之趨齊當楚薺之薺行以肆夏登堂之樂節周還仲規反行也冝圎折還中矩曲行也冝方進則揖之退則揚之然後玉鏘鳴也揖之謂小免見}
