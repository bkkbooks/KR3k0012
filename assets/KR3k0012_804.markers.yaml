  - {type: variant, offset: 2234, length: 1, content: 雀, WYG: 冠玊耳又曰文帝始幸雍新垣平以望氣見平使人持玊杯闕下獻之平言上曰闕下有寳玊氣果有獻玊杯者又郊祀志曰宣帝祀河東之明年鳳凰集投翔於所集處得寳玉乃起萬夀宫又曰王莾就國孔休守新都相休謁見莾莾進其玊具寳劒休不肯受莾因曰誠見君面有瘢美玊可以滅獻其璏耳即辭解其璏休復辭莾遂推碎之}
  - {type: page-break, offset: 2234, content: '', id: KR3k0012_WYG_804-10b, image: WYG0900/WYG0900-0142b.png}
  - {type: variant, offset: 2234, length: 14, content: 雀自丹州而來吐五色之氣如雲名, krp: 瑩言時人稱爲博物後周書}
