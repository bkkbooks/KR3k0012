  - {type: variant, offset: 1573, length: 366, content: 珠彈不如泥丸各有所用也東方朔神異經曰西北荒中有二金闕上有明月珠徑三丈光照千里鹽鐵論曰珠璣出桂林距漢萬餘里說苑曰墨子謂滑氂曰今凶年有欲與子隨侯之珠者曰不得賣也以為飾又欲與子一鍾粟者得珠不得粟不得珠得粟子將何擇滑氂曰粟可取也新序曰秦使使者往觀楚之寶器楚王召子西而問焉曰吾和氏之璧隨侯之珠可以示諸子西對不知召昭奚恤而問焉昭奚恤對曰吾國之寶器在賢臣珠玉玩好之物非寶之重者太玄經曰明珠彈於飛肉其得不復論衡曰天地之間物氣相類實非者多海外西南有珠樹焉察之是珠然非魚中之珠也夫十日之日猶珠樹也珠樹非真珠十日似日非實日也又曰隨侯以藥作珠精曜如真又曰人審知有富貴之命則幽居俟之不須勞形求索也猶珠在山不求貴價於人人自貴之命富之人筋力自輕命貴之人才智自高白虎通曰德至淵泉即江出大貝海出明珠釋名曰王后首飾曰副副覆也上有垂珠步則搖也蔡邕勸學曰明珠不瑩焉發其光寶, WYG: ''}
