  - {type: variant, offset: 2106, length: 0, content: '', WYG: 暨齊平燕人歸燕姬嫁女扵齊侯賂以瑶罋玉櫝斚耳不克而還瑶玉也櫝匱也斚耳玉爵又曰公賜公衍羔裘使獻龍輔扵齊侯龍輔玉名遂入羔裘齊侯喜與之陽榖齊邑名又曰公疾徧賜大夫從公者大夫不受賜子家子雙琥一環一璧輕服細好之服受之大夫皆受其賜已未公薨子家反賜扵府人曰吾不敢逆君命也大夫皆反其賜又昭十六年曰晉韓起聘于鄭宣子有環其一在鄭商玊環同工共朴相與雙宣子謁諸鄭伯謁請子子産弗與曰非官府之守器也寡君不知子太叔子羽謂子産曰韓子亦無幾求晉國亦未可以貳晉國韓子不可偷也偷薄也若屬有䜛人交鬬其間鬼神而助之以興其凶怒悔之何及吾子何愛扵一環其以取憎扵大國也盍取而與之子産曰吾非偷晉而有二心将終事之是以弗與忠信故也僑聞君子非無賄之難立而無令名之患僑聞為國非不能事大字小之難無禮以定其位之患夫大國之人令扵小國而皆獲其求將何以給之一共一否為罪滋大大國之求無禮以斥之何饜之有吾且為鄙邑則失位矣若韓子奉命以使而求玊焉貪滛甚矣獨非罪乎出一玊以起二罪吾又失位韓子成貪將焉用之且吾以玉賈罪不亦鋭乎鋭細小也韓宣子私覲扵子産以玊與馬曰子命起舎夫玉是賜吾生而免吾死也敢不籍手以拜以玊馬籍手拜謝子産又昭十七年曰鄭禆竈言扵子産曰宋衛陳鄭將同日火若我用瓘斚玊瓉鄭必不火子産弗與以為天災流行非禳所息故也為明年宋衛陳災傳又定上曰蔡昭侯為兩佩與兩裘以如楚獻一佩一裘扵}
