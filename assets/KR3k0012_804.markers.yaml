  - {type: variant, offset: 1829, length: 625, content: 藥作珠精曜如真又曰人審知有富貴之命則幽居俟之不須勞形求索也猶珠在山不求貴價於人人自貴之命富之人筋力自輕命貴之人才智自高白虎通曰德至淵泉即江出大貝海出明珠釋名曰王后首飾曰副副覆也上有垂珠步則搖也蔡邕勸學曰明珠不瑩焉發其光寶玉不琢不成珪璋古今注曰章帝元和元年明珠出館陶大如李有明曜三年明月珠出豫章海昏大如雞子圍四寸八分章和元年鬱林大珠圍三寸和帝永元十五年鬱林降民得大珠圍五寸徑寸七分郭子橫冥記曰帝起甘泉望風臺臺上得白珠如花一枝帝以飾九華之蓋望之若照月王子年拾遺記曰黃帝之子名青陽是曰少昊一名繫有白雲之瑞號為白帝有鳳銜明珠致於庭少昊乃拾珠懷之使照服於天下又曰燕昭王時有黑鳥白頭集王之所御洞光之珠圓徑一尺此珠色黑如漆而懸室內百神不能隱其精靈又曰石季倫所愛婢數十人季倫嘗屑沈水香如塵末布象床上使所愛者踐之無跡則賜真珠百琲若有跡者即節其飲食令體輕故閨中相戲曰爾非細骨輕軀郍得百琲真珠琲蒲愷切珠貫之名也又曰舜葬蒼梧之野有鳥如雀自丹州而來吐五色之氣如雲名曰憑宵鳥時來蒼梧之野御者沙珠積成壟阜名曰珠丘今蒼梧之外採藥時得青石潔如珠服之不死帶者身輕又曰瀛洲有鳥如鳳身紺翼丹名藏珠每鳴翔而吐雜珠累斛仙人常以其餘飾仙裳輕而耀於日月也西京雜記曰高祖斬白蛇劍上有七采珠九華玉為飾雜廁五色琉璃為匣劍在室光影猶照於水也又曰漢諸陵寢皆以竹為簾簾皆為水文龜鳳之像昭陽殿織珠為簾風至則鳴如珂珮之聲列仙傳曰朱仲者會稽市販珠人也高后時募三寸珠乃詣闕上之珠好過度賜五百金魯元公主私以七百金從仲求仲, SBCK: ''}
