  - {type: variant, offset: 1957, length: 4, content: 珠出館陶, WYG: 禮稽命徴曰王者得禮制則澤谷之中有白玊焉禮斗威儀曰君乘金而玉則紫玉見扵深山左𫝊桓公曰初虞叔有玉虞公求用不獻既而悔之曰周諺有之匹夫無罪懷璧其罪吾焉用此以其賈害乃獻之又莊公曰虢公晉侯朝王享禮命之宥命之以幣物有助也皆玊五㲄非禮也又僖上曰天王使邵武公内史過賜晉侯命受玊隋過歸告王曰晉侯其無後乎又僖下曰楚子玉自為瓊弁玊纓未之服也先戰夢河神謂巳曰畀余余賜汝孟豬之麋弗致也}
