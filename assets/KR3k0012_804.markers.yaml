  - {type: variant, offset: 423, length: 1, content: 陰, SBCK: 隂也破勝水禮記月令曰孟春之月天子衣青衣服蒼玉又曲禮上曰受珠玉者以掬又曰執玉爵者弗揮又曰執玉不趍志重玉也又檀弓曰石駘仲卒駘仲衛大夫石碏之疾無適子有庻子六人卜所以爲後者莫適立也曰沭浴佩玉則兆言齊潔則得吉兆也五人者則沐浴佩玉石祁子曰孰有執親之喪而沭浴佩玉者乎不沭浴佩玉心正且知禮又月令曰孟春之月天子衣青衣服蒼玉又玉藻曰古之君子必佩玉右徴角左宫羽玉聲所中也徵角在右事也民也可以勞宫羽在左宫也物也冝逸趨以采齊路門外之樂節也門外謂之趨齊當楚薺之薺行以肆夏登堂之樂節周還仲規反行也冝圎折還中矩曲行也冝方進則揖之退則揚之然後玉鏘鳴也揖之謂小免見於前也揚之謂小仰見於後也鏘聲貌又曰君子無故玉不去身君子於玉比德焉故謂喪與災天子佩白玉而􅀇組綬公侯佩山􅀇玉而朱組綬大夫佩水蒼玉而純組綬世祖佩瑜玉而綦組綬士佩瓀玟而緼組綬玉有山􅀇水蒼者視之文色所似也緩者所以佩玉相承受也又學記曰玉不􅅣不成器人不學不知道又聘義曰子貢問於孔子曰敢問君子貴玉而賤珉何也爲玉之寡珉之多與孔子曰非爲珉之多故賤之也玉之寡故貴之也夫昔者君子比德於玉焉温潤而澤仁也縝宻而栗知也縝髮也栗堅貌廉而不劌義也劌猶傷也義者不苟傷人也垂之如墜禮也禮尚謙卑叩之其聲清越以長其終詘然樂也樂作則有聲止則無也越猶陽也詘絶止貌瑕不掩瑜瑜不掩瑕忠也暇玉之病也瑜其中間美者孚尹旁逹信也氣如白虹天也精神見于山川地也精神亦精氣也虹天氣也圭璋特逹德也特逹謂以朝聘天下莫不貴者道也道者人無不由詩云言念君子温其如玉故君子貴之也禮含文嘉曰玉石得冝則太白常明禮稽命徴曰王者得禮制則澤谷之中有白玉焉禮斗威儀曰君乗金而王則紫玉見於深山左詩桓公曰􅀄虞叔有玉虞公求旃不獻旣而悔之曰周諺有之疋夫無罪懷璧其罪吾焉用此以其賈害乃獻之又莊公曰􅉑公晉侯朝王享禮命之宥命之以幣物有助也皆玉五㲄非禮也又僖上曰天王使邵武公内史過賜晉侯命受玉惰過歸告王曰晉侯其無後乎事具錫命門又僖下曰楚子玉自爲瓊弁玉纓未之服也先戰夢河神謂巳曰􅂌余賜汝孟諸之麋弗致也大心與子西使榮黄諌弗聽榮季曰死而利國猶或爲之况瓊玉乎是糞土也而可以濟師將何愛焉弗聽又僖下曰晉侯執衛侯歸之于京師使醫衍酖衛侯寗俞貨醫使薄其酖不死公爲之納玉於王興晉侯皆十㲄王許之乃釋衛侯又文公下曰秦伯使西乞術來聘且言將伐晉襄仲辭玉事具奉使部又曰莒太子僕以其寳玉來奔又成上曰晉及齊戰于鞍齊師敗齊侯使賔媚人賂以紀甗玉磬與地不可則聽客之所爲又襄十五年曰宋人或得玉獻諸子罕子罕弗受獻玉者曰以示玉人玉人能治玉者玉人以爲寳}
