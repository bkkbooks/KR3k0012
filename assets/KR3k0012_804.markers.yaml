  body:
  - {type: variant, offset: 3, length: 1, content: 二, SBCK: 三玉上尚書堯典曰在璿璣玉衡以齊七政孔安國注日在察也璿美王璣衡王者正天之器可轉運者七政日月五星各異政舜察天文齊七政審巳當天心與否又㣧征曰火炎崑崗玉石俱焚山脊曰崗崑山出玉言火逸而害玉又禹貢曰華陽黒水惟梁州厥貢璆璆玉名也雍州厥貢惟球琳瑯玕球琳皆玉名琅王玕石而似}
  - {type: variant, offset: 3, length: 2, content: 二珠, WYG: 三玉上尚書堯典曰在璿璣玉衡以齊七政又𦙍征曰火炎崑崗玉石俱焚山脊曰崑崗山出玊言火逸而害玊又禹貢曰華陽黒水惟梁州厥貢璆雍州厥貢惟球琳琅玕又顧命曰成王被冕服憑玉几又曰太玉夷玉天球在東序尚書中侯曰湯沉璧扵洛黒鳥隨魚止化為黒玉赤勒文尚書説曰有人能起載玉英鄭𤣥曰王果實召載為骨衣也尚書大𫝊曰堯致舜天}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_WYG_804-1b, image: WYG0900/WYG0900-0137d.png}
