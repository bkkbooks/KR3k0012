  - {type: variant, offset: 2248, length: 0, content: '', WYG: 秦雍為之記}
  - {type: variant, offset: 2249, length: 7, content: 憑宵鳥時來蒼梧, WYG: 三龍一門金友昆玉又曰初吕光}
  - {type: variant, offset: 2249, length: 18, content: 憑宵鳥時來蒼梧之野御者沙珠積成壟阜名, krp: 武帝保定中晋公護獲玉斗以獻北史}
