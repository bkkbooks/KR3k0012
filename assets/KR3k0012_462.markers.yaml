  - {type: variant, offset: 1799, length: 2282, content: 過雒陽帝在焉敬脫輓輅見齊人虞將軍曰臣願見上言便宜虞將軍入言上召見賜食敬說曰陛下都洛陽豈欲周室比隆哉上曰然敬曰陛下取天下與周異周之先積德累善十有餘世武王伐紂成王即位周公之屬傳相焉乃營成周都雒陽以為天下中諸侯四方納貢職道里均矣有德則易以王無德則易以亡今陛下與項籍戰滎陽大戰七十小戰四十使天下之民肝腦塗地哭泣之聲不絕傷疾者未起而欲比隆成康之時臣竊以為不侔矣且夫秦地被山帶河四塞以為固卒然有急百萬之眾可具夫與人鬭不搤其亢張晏曰亢喉嚨拊其背未能全勝今陛下入關而都按秦之故此亦搤天下之亢而拊其背也高帝即日西都關中又曰陳狶反上自將至邯鄲而韓信謀反關中呂后用蕭何計誅信上已聞信誅便拜何相國益封五千戶令卒五百人一都尉為相國衛諸君皆賀邵平獨弔謂何曰禍自此始矣上暴露於外而君守內非被矢石之難而益君封置衛者以今者淮陰新反於中有疑君心夫置衛君非以寵君也讓封勿受悉以家私財佐軍何從其計上喜悅又曰齊悼惠王時曹參為相禮下賢人請蒯通為客初齊王田榮怨項羽謀舉兵叛之齊處士東郭先生梁石君在劫中強從及田榮敗二人醜之相與入山深隱居客謂通曰先生之於曹相國拾遺舉過顯賢進能齊國蔑若先生者先生知梁石君東郭先生士俗所不及何不進於相國乎通曰諾臣之里婦與里諸母相善也里婦夜亡肉姑以為盜怒而逐之婦晨去過所善諸母語以事而謝之里母曰汝安行我今令而家追汝矣即束蘊請火於亡肉家曰昨暮犬夜得肉爭鬭相殺請火治之亡肉家遽追呼其婦故里女非談說之士也束蘊乞火非還婦之道也然物有相感事有適可臣請乞火於曹相國曰婦人有夫死三日而嫁者有幽居守寡不出門者足下即求婦何取曰不取嫁者通曰然則求臣亦猶是也彼東郭先生梁石君齊之俊士隱居不嫁未嘗卑節下意以求仕也願足下使人禮之曹相國曰敬受命皆以為上賓又曰袁盎逢丞相申屠嘉下車拜謁丞相從車上謝盎還愧其吏迺之丞相舍上謁求見丞相曰且陛下從代來每朝郎官者上書䟽未嘗不正輦受其言不可用置之言可採未嘗不稱善何也欲以致天下賢士日聞所不聞以益聖今君自閉鉗天下之口而日益愚夫以聖主責愚相君受禍不久矣丞相乃再拜曰嘉鄙人迺不知將軍奉教引與之坐為上客范曄後漢書曰更始尚書令謝躬留魏郡太守陳康守鄴自率諸將擊五萊賊世祖因躬在外乃使吳漢襲其城漢先令辯士說陳康曰蓋聞之上智不處危以僥倖中智能因危以為功下愚安於危以自亡之智在人所由不可不察今京師敗亂四方雲擾公所聞也蕭王兵強士附河北歸命公所見也謝躬內背蕭王外失眾心公所知也公今據孤危之城待滅亡之禍義無所立節無所成不若開門內軍轉禍為福免下愚之敗收中智之功此計之至者也康然之於是開門內漢又曰袁紹奔冀州董卓購募求紹時侍中周秘城門校尉伍瓊等陰為紹說卓曰夫廢立大事非常人所及袁紹不識大體恐懼出奔非有它志今急購之勢必為變袁氏樹恩四世門生故吏遍於天下若收豪傑以藂徒眾英雄因之而起則山東非公之有也不如赦之拜一郡守紹喜於免罪必無患矣卓以為然乃遣授紹渤海太守又曰袁紹以書要公孫瓚以襲冀州收韓馥紹乃使外甥陳留商幹及頴川荀堪等說馥曰公孫瓚乘勝來南而諸郡應之袁車騎意未可量也竊為將軍危之馥懼曰然則為之柰何堪曰君自料寬仁容眾為天下所附熟與袁氏馥曰不如也臨危叱決智勇邁於人又孰與袁氏馥曰不如也世布恩德天下之蒙其惠又孰與袁氏馥曰不如也諶曰今將軍資三不如之勢久處其上袁氏一時之傑必不為將軍下也且公孫提征伐之卒其鋒不可當夫冀州天下之重資若兩軍並力兵交城下危亡可立而待也夫袁氏將軍之舊且同盟當今之計莫若舉冀州以讓袁氏厚德將軍公孫瓚不能復與之爭矣是將軍有讓賢之名而身安於太山也願勿有疑馥性怯因然其計又曰沮授說袁紹曰將軍累葉台輔世濟忠義今朝廷播越宗廟殘毀觀諸州郡雖外託義兵內實相圖未有匡正社稷卹民之意且今州城粗定兵強士附西迎大駕即宮鄴都挾天子令諸侯畜士馬以討不庭誰能禦之又曰曹操與袁紹相持於官渡紹遣人求助劉表許之而不至亦不助曹操且欲觀天下之變從事中郎南陽韓嵩別駕劉先說袁曰今豪桀並爭兩雄相持天下之重在於將軍將軍若欲有起乘弊可也如其不然因將軍所宜從豈可擁甲十萬坐觀成敗求援如不能助見賢而不肯歸此兩怨必集於將軍恐不得復中立矣又曰曹操軍至新野蒯越韓嵩傅選等說劉琮曰逆順有大體強弱有大勢以人臣拒人主逆道也以新造之楚御中國必危以劉備敵曹公不當也三者皆短欲以抗王師之鋒必亡之道也將軍自料何與劉備琮曰不若也選曰誠以劉備不足禦曹公則雖保全楚不能以自存也誠以劉備足禦曹公則備不為將軍下也願將軍勿疑琮乃請降又曰閻忠說皇甫嵩曰將軍指揮足以展風雲叱咤可以興雷電東觀漢記曰隗囂將王元說囂曰昔更始四方響應天下喁喁謂之太平一旦壞敗今南有子陽北有文伯江湖海岱王公十數而欲牽儒生之說棄千乘之基計之不可者也今天水完富士馬最強北取西河東收三輔案秦舊跡表裏山河元請以一丸泥為大王東封函谷關此萬世一時也若計不及此且畜養士馬據隘自守曠日持久以待四方之變圖王不成其弊猶足以霸囂然其計又曰更始大司馬朱鮪守洛陽吳漢諸將圍守數月不下世祖以岑彭嘗為鮪校尉令彭說鮪曰赤眉已得長安今公誰為守乎蕭王受命平定燕趙百姓安土歸心賢俊四面雲集今北方清淨大兵來攻洛保一城欲何望乎不如亟降鮪曰大司徒公被害時鮪與其謀又諫更始無遣上北伐自知罪深故不敢降耳彭還詣河陽白上上謂彭復往曉之夫建大事者不忌小怨今降官爵可保況誅罰乎上指水曰河水在此吾不食言彭奉上旨復至城下說鮪因曰彭往者得執鞭待從蒙薦舉拔擢深受厚恩思以報義不敢負公鮪從城上下索曰當如此來彭趨索欲上鮪見其不疑即曰旦蚤與我會上東門外彭如期往與鮪交馬語鮪輕騎詣彭降彭為殺羊具食鮪身為降虜未見吳公諸將不敢食彭即令鮪自縛與俱見吳公將詣行在所河津亭上即時解鮪縛復令彭夜送歸洛陽又曰更始使侍禦史黃黨即封世祖為蕭王罷兵耿弇音甘曰今使者來欲罷兵不可聽也兵一罷不可復會也上曰國家已, WYG: ''}
