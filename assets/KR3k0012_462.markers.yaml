  - {type: variant, offset: 41, length: 0, content: '', SBCK: 曹公追先主至於夏口諸葛亮曰事急矣請奉命求救於孫將軍時權軍柴桑觀望成敗亮􅀃權曰海内大亂將軍起兵江東劉表豫州牧衆漢南與曹操並争天下今操芟荑大難畧已平矣逺破荆州威震四海英雄無所用武故豫州牧遁逃至此將軍量力而處之􅀂能以呉越之衆與中國抗衡不如與之絶􅀂不能當何不按兵束甲北面而事之今將軍外託服從之名而内懷猶豫之計事急而不斷禍至無日矣晉中興書曰􅂫峻反温嶠推陶􅋲爲盟主􅋲欲西歸嶠􅀃􅋲曰天子幽逼社稷危殆四海臣子肝腦塗地嶠等與公致命之秋事􅀂尅濟則臣主同休如其不然身雖􅁅㓕足以謝責於先帝今之事􅀔義無旋踵􅀐虎之􅀔可得下平公􅀂違衆獨反衆心必沮沮衆以敗事義旗將廻指於公矣􅋲無以對遂留不去又曰建興􅀄祖逖進􅀃曰晉室之亂非上無道而逃民怨叛也由藩王争權自相誅滅遂使戎狄乗隙毒流中原今天下旣􅀍殘酷遺􅀺思夲人有奮擊之心但悉無所慿􅀝大王誠能命將帥使􅀂逖等執殳前驅上爲國家雪耻下爲百姓請命則郡國豪傑必因風嚮起沉溺之民欣於來}
  - {type: page-break, offset: 41, content: '', id: KR3k0012_SBCK_462-2a}
  - {type: variant, offset: 41, length: 0, content: '', WYG: 曹公追先主至於夏口諸葛亮曰事急矣請奉命求救於孫將軍時權軍柴桑觀望成敗亮説權曰海内大亂將軍起兵江東劉表豫州牧衆漢南與曹操並争天下今操芟夷大難略已平矣遂破荆州威震四海英雄無所用武故豫州牧遁逃至此將軍量力而處之若能以呉越之衆與中國抗衡不如與之絶若不能當何不按兵束甲北面而事之今將軍外託服從之名而内懐猶豫之計事急而不斷禍至無日矣晉中興書曰}
  - {type: page-break, offset: 41, content: '', id: KR3k0012_WYG_462-2b, image: WYG0897/WYG0897-0229b.png}
  - {type: variant, offset: 41, length: 0, content: '', krp: 曹公追先主至於夏口諸葛亮曰事急矣請奉命求救於孫將軍時權軍柴桑觀望成敗亮說權曰海内大亂將軍起兵江東劉表豫州牧衆漢南與曹操並争天下今操芟荑大難畧已平矣逺破荆州威震四海英雄無所用武故豫州牧遁逃至此將軍量力而處之若能以呉越之衆與中國抗衡不如與之絶若不能當何不按兵束甲北面而事之今將軍外託服從之名而内懷猶豫之計事急而不斷禍至無日矣晉中興書曰蘇峻反温嶠推陶侃爲盟主侃欲西歸嶠說侃曰天子幽逼社稷危殆四海臣子肝腦塗地嶠等與公致命之秋事若尅濟則臣主同休如其不然身雖灰㓕足以謝責於先帝今之事勢義無旋踵騎虎之勢可得下平公若違衆獨反衆心必沮沮衆以敗事義旗將廻指於公矣侃無以對遂留不去又曰建興𥘉祖逖進說曰晉室之亂非上無道而逃民怨叛也由藩王争權自相誅滅遂使戎狄乗隙毒流中原今天下旣𬒳殘酷遺黎思夲人有奮擊之心但悉無所慿倚大王誠能命將帥使若逖等執殳前驅上爲國家雪耻下爲百姓請命則郡國豪傑必因風嚮起沉溺之民欣於來蘇也掃灑中原清復寰宇此千載之一時願大王圖之中宗於是始欲疆理神州又曰劉牢之屯洌州桓玄至于湖熟遣牢之族舅何睦說曰今君戰敗則傾宗戰勝亦覆族欲以是安歸乎孰若翻然改圖唯理是宅則與金石等固名與天壤俱窮哉牢之得說詣玄請降也范亨燕書曰晉室大亂高祖方經略江東髙翔說髙祖曰自王公政錯士人失望繦負歸公者動有萬數今王氏敗没而福宿見尾箕其兆可見也今晉室雖衰人心未變冝遣貢使江東亦有所尊然後仗義聲以掃不庭可以有辭於天下髙祖深納焉宋書曰二㓙搆逆王憎逹廻感不知所從有客說之曰爲君計莫若承義師之撽移告傍郡使工言之士明示禍福也唐書曰李懷光屯軍咸陽反狀始萌李景略時說懷光請復宫闕迎大駕懷光不從景畧岀軍門慟哭曰誰知此軍一日䧟於不義軍士相顧甚義之因退歸私家又曰柏耆者將軍良器之子素負志畧學縱横家流㑹王承宗以常山叛朝廷厭兵欲以恩澤撫之耆於蔡州行營以畫干裴度請以朝旨奉使鎮州乃自處士受左拾遺旣見承宗以大義陳說承宗泣下請質二男獻兩郡由是知名韋昭呉書曰將軍曹仁在公安拒守吕蒙令虞飜說之飜至城門仁不肯相見乃爲書曰將軍獨守縈帶之城而不降死戰則毀宗滅祀爲天下笑幸熟思焉仁得書流涕而降之太公六韜曰文王齋戒三日乗田車田馬田于渭之陽吕尚以竿以漁曰今臣言至情不諱君其惡之乎緡微餌明小魚食之緡調餌多大魚食之夫魚食於餌乃牽於緡人食其禄而服於君故以餌取魚魚可殺以禄取人人可竭也春秋後傳曰梁以張儀爲齊相楚怒約而攻梁雍沮曰請令解攻雍沮謂齊楚之王曰王亦聞張儀之約秦王乎曰王若相儀於梁齊楚惡儀必攻魏魏戰而勝是齊楚之兵折而儀固得梁矣若不勝梁必事秦以持其國必割地以賂王若欲復攻其弊不足以應秦此儀之所以與秦王隂相約也齊楚王曰善乃遽解兵又曰魏加問春申君聞欲將臨武君有之乎曰有矣加曰臣少之時好射臣願以射譬可乎春申君曰可曰更嬴與魏王處廪下更嬴謂魏王曰臣能爲王虚發而下鳥有間鴈來更嬴虚發而烏下魏王曰然則射可至此乎更嬴曰此孽也王曰何以知之對曰其飛徐而嗚悲者故創痛也嗚悲者乆失羣也今臨武君甞爲秦孽不可爲距秦之將也又曰皇甫嵩旣破黄巾威震天下故信都令漢陽閻忠說嵩曰難得易失者時也時至不旋踵者機也故聖人常順時而動智者必因機以發今將軍遭難得之時蹈機而不發將何以權大名乎又曰劉備救徐州刺史陶謙㑹謙病死伏波將軍陳登說備曰今欲爲使君合衆十萬上可以匡主濟人成五覇之業下可以割地守境書名竹帛若使君不聽登亦未聽使君得發備遂領徐州孔演漢魏春秋曰興平元年曹公復征陶謙陳宮說張邈曰雄傑並起君以千里之衆當四戰之地撫劒頋盻亦足以爲人豪而反制於人不以鄙乎魏氏春秋曰鍾㑹隂懐異圖姜維見而知其心謂可構成擾亂以圖克復乃詭說之曰君自淮南巳來筭無遺䇿晉道克昌皆君爲之今復定蜀威德大震其民髙其功而主畏其謀欲以此安歸乎夫韓信不背漢於擾攘而見疑於旣平大夫種不從范蠡於五湖卒伏劒而亡彼豈闇主愚臣哉利害使之然也今君大功旣立大德巳著何不法陶朱公汎舟絶迹全功保身登娥媚之嶺而從赤松遊乎㑹曰君言逺我不能行且爲全身之道或未盡於此也維曰其他則君智力之所能無煩於老夫矣由是情好欣甚周載曰薄疑者衛之居士也疑進說衛嗣君以王道嗣君恱延之以相辭曰疑之母以疑爲賢然與疑議家事旣定則又决之所幸蔡嫗故事多不就母子之間猶不免乎蔡嫗之議今人主皆有蔡嫗而於臣非骨肉之親安得不敗君曰寡人聞命遂相之委以從事江表傳曰曹公聞周瑜年少有俊才謂可遊說動也宻下楊州遣九江蔣幹有儀容以才辯見稱獨歩江淮之間莫與爲對乃布衣葛巾自託私行詣瑜瑜出迎之立謂幹曰子翼卿苦逺江湖爲曹氏作說客耶幹曰吾與足下州里中間别隔遥聞芳烈故來叙闊并觀雅頌而云說客無乃逆詐乎瑜曰吾雖不及夔曠聞弦賞音足知曲也因延幹入爲設酒食後三日瑜請幹與周觀營中行視倉庫軍資器仗言訖還飲宴示之侍者服飾珍玩之物因謂幹曰丈夫處世一遇知巳外守君臣之義内結骨肉之恩言行計從禍福共之假使蘇張更生酈叟復在吾猶拊其背而折其辭豈足下㓜生所能移乎幹但笑終無所言幹還稱瑜雅量非言辭所間中州之士亦此多之王充論衡曰傳稱蘇秦張儀縱横之術於鬼谷先生掘地爲坎曰能下說令我泣岀則能分人主之地}
  - {type: variant, offset: 42, length: 1, content: 秦, SBCK: 也掃灑中原清復寰宇此千載之一時願大王圖之中宗於是始欲疆理神州又曰劉牢之屯洌州桓􅀇至于湖熟遣牢之族舅何睦}
  - {type: variant, offset: 42, length: 2, content: 秦說, WYG: 峻反温嶠推陶侃為盟主侃西歸嶠説侃曰天子幽逼社稷危殆四海臣子肝腦塗地嶠等與公是致命之秋事若剋濟則臣主同祚如其不然身雖灰滅足以謝責於先帝今之事故義無旋踵騎虎之勢可得下乎公若違衆獨反衆心必沮沮衆必敗事義旗將逥指於公矣侃無以對遂留不去又曰建興初祖逖進説曰晉室之亂非上無道而民怨叛也由藩王争權自相誅滅遂使戎狄乗隙毒流中原今天下既被殘酷遺黎思本人有奮擊之心但悉無所慿倚大王誠能命將帥使若逖等執殳前驅上為國家雪恥下為百姓請命則郡國豪傑必因風嚮起沈溺之民欣於来蘇灑掃中原清復寰宇此千載之一時願大王圖之中宗於是始欲疆理神州又曰劉牢之屯洌州桓𤣥至於湖遣牢之族舅何睦説曰今君戰敗則傾宗戰勝亦覆族欲以是安歸乎孰若翻然改圖唯理是宅夀與金石等固名與天壌俱窮牢之得説詣𤣥請降范亨燕書曰晉室大亂髙祖方經畧江東髙詡説髙祖曰自王公政錯士人失望襁負歸公者動有萬數今王氏敗沒而福宿見尾箕其兆可見矣今晉室雖衰人心未變宜遣貢使江東亦有所尊然後仗義聲以掃不庭可以有辭於天下髙祖深納焉宋書曰二㓙搆逆王僧達廻惑不知所従有客説之曰為君計莫若承義師之檄移告傍郡使工言之士眀示禍福也唐書曰李懐光屯軍咸陽反状始萌李景略時説懐光請復宫闕迎大駕懐光不従景略出軍門慟哭曰誰知此軍一旦陷於不義軍士相顧甚義之因退歸私家又曰栢耆者將軍良器之子素負志略學縱横家流㑹王承宗以常山叛朝廷厭兵欲以恩澤撫之耆于蔡州行營以畫干裴度請以朝㫖奉使鎮州乃自處士授左拾遺既見承宗以大義陳説承宗泣下請質二男獻兩郡由是知名韋昭吳書曰將軍曹仁在公安拒守吕蒙令虞翻説之翻至城門仁不肯相見乃為書曰将軍獨守縈帶之城而不降死戰則毁宗滅祀為天下笑幸熟思焉仁得書流涕而降之太公六韜曰文王齋戒三日乘田車田馬田於渭之陽吕尚以竿以漁曰今臣言至情不諱君其惡之乎緡㣲餌明小魚食之緡調餌多大魚食之夫魚食于餌乃牽於緡人食其禄而服於君故以餌取魚魚可殺以禄取人人可竭也春秋後𫝊曰梁以張儀為相}
