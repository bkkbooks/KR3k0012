  - {type: variant, offset: 104, length: 4, content: 隋何說淮, WYG: 蘇張重生酈叟復在吾猶拊其背而折其辭豈足下㓜生所能言乎幹但笑終無所言幹還稱瑜雅量非言辭所可間中州之士亦以此多之}
