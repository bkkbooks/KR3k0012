  - {type: variant, offset: 588, length: 6, content: 食其憑軾下齊, SBCK: 婁敬􅀃髙祖西都}
  - {type: variant, offset: 588, length: 1200, content: 食其憑軾下齊又曰張儀聞蘇秦死乃說楚王曰今秦與楚接境壤大王誠能聽臣臣請使秦以秦女為大王箕箒之妾長為昆弟之國臣以為計無便於此者楚從其計又曰李斯說秦王曰自孝公以來周室卑微諸侯相兼關東為六國秦之乘勝役諸侯蓋六世矣今諸侯服秦譬若郡縣夫以秦之強大王之賢如老嫗竈上掃除足以滅諸侯成帝業今怠而弗急諸侯復強相藂約從雖有黃帝之資弗能并也秦王聽其計又田李左車說成安君陳餘曰臣聞韓信涉西河虜魏王擒夏悅新喋血閼與今乃輔以張耳議欲以下趙此乘勝而遠鬭其鋒不可當臣聞千里餽糧士有飢色今井陘之道車不得方軌騎不得成列其勢糧食必在其後願足下假臣奇兵三萬人從間道絕其輜重彼前不得鬭退不得還吾奇兵絕其後野無所掠不至十日兩將之頭可致麾下又曰酈食其說齊王曰知天下所歸乎齊王曰天下何歸曰歸漢何以方之曰漢王與項王戮力西面擊秦約先入咸陽者王之項王負約不與而王之漢中又還殺義帝漢王聞之起蜀漢之兵責義帝之罪降城即以侯其將得財即以分其士蜀漢之粟方舡而下項羽有背約之名殺義帝之負於人之罪無所忘天下之士歸於漢王可坐而觀今以據敖倉之粟塞成皋之險守白馬之津杜太行之陵距飛狐之口天下後服者先亡王疾下漢王齊國社稷可得而保不下漢王危亡可立而待乃聽酈生又曰高祖使陸生賜尉他印為南越王陸生進說它曰足下中國人親戚昆弟墳墓在真定今反天姓棄冠帶欲以區區之越與天子抗衡禍且及身乃欲以新造未集之越屈強於此漢一偏將將十方眾臨越則殺王降漢如反覆手耳漢書曰張耳陳餘北略地燕界趙王為燕軍所獲燕因留之欲與分地趙有廝養卒乃走燕壁問曰知臣何欲燕將曰若欲得王耳曰君知張耳陳餘何人也燕將曰賢人也曰其志何欲燕將曰欲得其王耳趙卒嘆曰君未知兩人所欲也夫武臣張耳陳餘杖馬箠下趙數十城亦各欲南面王夫臣之與主豈可同日道哉兩人亦欲分趙而王時未可耳今兩人名為求王實欲燕殺之此兩人分趙而王夫以一趙尚易燕況以兩王右提左挈而責義殺王滅燕易矣燕以為然乃歸趙王養卒為禦而歸又曰陸賈說尉他他賜賈橐中裝直千金張晏注曰珠玉之寶裝裹也又曰魏豹叛漢王漢王謂酈生曰緩頰往說之又曰蒯通知天下權在於韓信欲說令背漢曰臣願披心腹隨介肝膽效愚忠恐足下不能用也曰夫功者難成而易敗時者難值而易失時不再來願足下無疑臣之計信猶豫不忍背漢遂謝通通乃陽狂為巫又曰漢三年與項羽相距京索間上數使使勞苦丞相鮑生謂蕭何曰數勞苦君者有疑君今為君計遣君于孫昆弟能勝兵者悉詣軍所上益信君於是何從其計漢王大悅又曰項羽擊陳留外黃不下數日降羽悉令男子年十五以上詣城東欲坑之外黃令舍人兒年十三往說羽曰彭越強劫外黃恐故降以待大王大王至又皆坑之百姓豈有所歸心哉從此以東梁地十餘城皆恐莫肯下矣羽然其言迺赦外黃當坑者而東至睢陽聞之皆爭下又曰漢王至雒陽新成三老董公遮說漢王曰臣聞順德者昌逆德者亡兵出無名事故不成故曰明其為賊敵乃可服項王為無道放殺其主天下之賊也夫仁不以勇義不以力三軍之眾為之素服以告諸侯為此東伐四海之內莫不仰德此三王之舉也漢王曰善非夫子無所聞於是漢王為義帝發喪哀臨三日發使告諸侯又曰, WYG: ''}
