  - {type: variant, offset: 4520, length: 632, content: 城若奮發盛德以投天隙霸王之業成矣宜改名號以鎮百姓述曰吾亦慮之公言起我意於是自立為蜀王熊復說述曰今山東飢饉人民相食兵所屬滅城邑丘墟蜀地沃野千里土壤膏腴果實所生無穀而飽女工之業覆衣天下名材竹幹不可勝用又有魚鹽銀銅之利浮水轉漕之便北據漢中杜褒斜之塗東守巴郡拒扞關之口地方數千里戰士不下百萬見利出兵而略地無利則堅守而力農東下漢水以窺秦地南順江流以震荊楊所謂用天因地成功之資也君有為之聲聞於天下而名號未定志士狐疑宜即大位使遠人有所依歸述遂自立為天子又曰荊邯東方漸平兵且西向說公孫述日兵者帝王之大器古今所不能廢也昔秦失其守豪桀並起漢祖無前人之跡立錐之地於戰陣之中躬自奮擊兵破身困數矣然軍敗復合創愈復戰何則死而功成踰於卻就於滅亡臣之愚計以為宜及天下之望未絕豪傑尚可招誘急以此時發國內精兵令田戎據江南之會倚巫山之固築壘堅守傳檄吳楚長沙已南必隨風而靡今延岑出漢中定三輔天水隴西拱手自服如此海內震搖冀有大利又曰鄧禹聞上安集河北即杖策北渡追及於鄴上欣其至禹進說曰更始雖都關西今山東未安赤眉青犢之屬動以萬數三輔假號往往群藂更始既未有所挫而自聽斷諸將皆庸人屈起志在財弊爭用威力朝夕自快非有忠良明智深慮遠圖欲尊主安民者明公雖蕃輔之功猶恐無所於今之計莫如覽延英雄務悅民心立高祖之業救萬民之命以公而慮天下不足定也上大悅因令左右號禹曰鄧將軍常宿止於中與定計議又曰光武以寇恂為河內太守行大將軍事恂同門生董崇說恂曰上新即位四方未定而君以此時據大郡此讒人所側目怨禍之府也宜思功遂身退之計恂然其言因病不視事, WYG: 二}
