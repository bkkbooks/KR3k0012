  - {type: variant, offset: 187, length: 3, content: 田常欲, WYG: 午合篇云伊尹五就桀五就湯然後合於湯吕尚三入殷朝三就文王然後合於文王此知天之至歸之不疑注云伊尹吕尚各以至知説聖王因澤釣行其術策又曰摩意篇云摩者揣之也説莫難於悉行事莫難於必成注曰摩不失其情故能建功又曰量權篇云言有通者從其所長言有塞者從其所短注曰人辭説條理通達即叙述從其長者以昭其徳人言壅滯即避其短稱宣其善以顯其行言説之樞機事物之至務者也又曰反覆篇云其和也若比目魚其伺言也若聲與響注曰和答問也因問而言申叙其解如比目魚相須而行候察言辭徃來若影之随行響之應聲又曰量權篇云介蟲之捍必以甲而後動螫蟲之動必先螫毒故禽獸知其所長而談者不知用也注云蟲以甲自覆障而言説者不知其長又曰揣情篇云説王公君長則審情以説王公避所短從所長又曰謀慮篇云乃立三儀曰上中下日叅以立焉變生事事生謀謀生計計生儀儀生説説生進注曰三儀有上有下有中㑹同異曰儀决是非曰説吕氏春秋曰伍子胥将見吳王而不得客有言之於王子光者王子光見之而惡其貌不聽其説而辭之客請之王子光曰其貌吾所甚惡也客以告子胥子胥曰此易改也願令王子光居於堂上重帷而見其衣子光許之胥説之半王子光舉帷摶其手而與之坐説畢王子光大悦子胥以}
