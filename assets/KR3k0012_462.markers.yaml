  - {type: variant, offset: 3628, length: 1524, content: 數而欲牽儒生之說棄千乘之基計之不可者也今天水完富士馬最強北取西河東收三輔案秦舊跡表裏山河元請以一丸泥為大王東封函谷關此萬世一時也若計不及此且畜養士馬據隘自守曠日持久以待四方之變圖王不成其弊猶足以霸囂然其計又曰更始大司馬朱鮪守洛陽吳漢諸將圍守數月不下世祖以岑彭嘗為鮪校尉令彭說鮪曰赤眉已得長安今公誰為守乎蕭王受命平定燕趙百姓安土歸心賢俊四面雲集今北方清淨大兵來攻洛保一城欲何望乎不如亟降鮪曰大司徒公被害時鮪與其謀又諫更始無遣上北伐自知罪深故不敢降耳彭還詣河陽白上上謂彭復往曉之夫建大事者不忌小怨今降官爵可保況誅罰乎上指水曰河水在此吾不食言彭奉上旨復至城下說鮪因曰彭往者得執鞭待從蒙薦舉拔擢深受厚恩思以報義不敢負公鮪從城上下索曰當如此來彭趨索欲上鮪見其不疑即曰旦蚤與我會上東門外彭如期往與鮪交馬語鮪輕騎詣彭降彭為殺羊具食鮪身為降虜未見吳公諸將不敢食彭即令鮪自縛與俱見吳公將詣行在所河津亭上即時解鮪縛復令彭夜送歸洛陽又曰更始使侍禦史黃黨即封世祖為蕭王罷兵耿弇音甘曰今使者來欲罷兵不可聽也兵一罷不可復會也上曰國家已都長安天下大定何用兵為弇曰青徐之賊銅馬赤眉之屬數十輩輩數十萬眾皆東至海所嚮無前聖公不能辯也敗必不久帝起坐曰卿失言我擊卿弇曰大王哀厚弇如父子故披赤心為大王陳事上曰我戲卿耳何以言之弇曰百姓患苦王莽苛刻日久聞劉氏復興莫不欣喜望風從化而去虎口就慈母倒戟橫矢不足以喻明公首事南破昆陽敗百萬師今復定河北以義征伐表善懲惡躬自克薄以待士民發號嚮應望風而至天下至重公可自取無令他姓得之上曰卿若東得無為人道之弇曰此重事不敢為人道也又曰馮異因間進說曰天下同苦王氏思漢久矣更始諸將縱橫暴虐所至虜掠百姓失望今專命方面施行恩德夫有桀紂之亂乃見湯武之功民人飢渴易為充飽宜急分遣官屬狥行郡縣理冤結布惠澤上納之又曰隗囂既立便聘平陵方望為軍帥望至說囂曰足下欲丞天順民輔漢而起今立者乃在南陽王莽尚據長安雖欲以漢為名其實無所受命將何以見信於眾宜急立高廟稱臣奉祠所謂神道設教求助民神者也且禮有損益質文無常削地開兆茅茨土階以致其肅敬雖未備物神明其舍諸囂從其言又曰蜀郡功曹李熊說公孫述曰方今四海波蕩疋夫橫議將軍割據千里地方十城若奮發盛德以投天隙霸王之業成矣宜改名號以鎮百姓述曰吾亦慮之公言起我意於是自立為蜀王熊復說述曰今山東飢饉人民相食兵所屬滅城邑丘墟蜀地沃野千里土壤膏腴果實所生無穀而飽女工之業覆衣天下名材竹幹不可勝用又有魚鹽銀銅之利浮水轉漕之便北據漢中杜褒斜之塗東守巴郡拒扞關之口地方數千里戰士不下百萬見利出兵而略地無利則堅守而力農東下漢水以窺秦地南順江流以震荊楊所謂用天因地成功之資也君有為之聲聞於天下而名號未定志士狐疑宜即大位使遠人有所依歸述遂自立為天子又曰荊邯東方漸平兵且西向說公孫述日兵者帝王之大器古今所不能廢也昔秦失其守豪桀並起漢祖無前人之跡立錐之地於戰陣之中躬自奮擊兵破身困數矣然軍敗復合創愈復戰何則死而功成踰於卻就於滅亡臣之愚計以為宜及天下之望未絕豪傑尚可招誘急以此時發國內精兵令田戎據江南之會倚巫山之固築壘堅守傳檄吳楚長沙已南必隨風而靡今延岑出漢中定三輔天水隴西拱手自服如此海內震搖冀有大利又曰鄧禹聞上安集河北即杖策北渡追及於鄴上欣其至禹進說曰更始雖都關西今山東未安赤眉青犢之屬動以萬數三輔假號往往群藂更始既未有所挫而自聽斷諸將皆庸人屈起志在財弊爭用威力朝夕自快非有忠良明智深慮遠圖欲尊主安民者明公雖蕃輔之功猶恐無所於今之計莫如覽延英雄務悅民心立高祖之業救萬民之命以公而慮天下不足定也上大悅因令左右號禹曰鄧將軍常宿止於中與定計議又曰光武以寇恂為河內太守行大將軍事恂同門生董崇說恂曰上新即位四方未定而君以此時據大郡此讒人所側目怨禍之府也宜思功遂身退之計恂然其言因病不視事, SBCK: 二}
