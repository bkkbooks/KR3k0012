  - {type: variant, offset: 2908, length: 663, content: 眾英雄因之而起則山東非公之有也不如赦之拜一郡守紹喜於免罪必無患矣卓以為然乃遣授紹渤海太守又曰袁紹以書要公孫瓚以襲冀州收韓馥紹乃使外甥陳留商幹及頴川荀堪等說馥曰公孫瓚乘勝來南而諸郡應之袁車騎意未可量也竊為將軍危之馥懼曰然則為之柰何堪曰君自料寬仁容眾為天下所附熟與袁氏馥曰不如也臨危叱決智勇邁於人又孰與袁氏馥曰不如也世布恩德天下之蒙其惠又孰與袁氏馥曰不如也諶曰今將軍資三不如之勢久處其上袁氏一時之傑必不為將軍下也且公孫提征伐之卒其鋒不可當夫冀州天下之重資若兩軍並力兵交城下危亡可立而待也夫袁氏將軍之舊且同盟當今之計莫若舉冀州以讓袁氏厚德將軍公孫瓚不能復與之爭矣是將軍有讓賢之名而身安於太山也願勿有疑馥性怯因然其計又曰沮授說袁紹曰將軍累葉台輔世濟忠義今朝廷播越宗廟殘毀觀諸州郡雖外託義兵內實相圖未有匡正社稷卹民之意且今州城粗定兵強士附西迎大駕即宮鄴都挾天子令諸侯畜士馬以討不庭誰能禦之又曰曹操與袁紹相持於官渡紹遣人求助劉表許之而不至亦不助曹操且欲觀天下之變從事中郎南陽韓嵩別駕劉先說袁曰今豪桀並爭兩雄相持天下之重在於將軍將軍若欲有起乘弊可也如其不然因將軍所宜從豈可擁甲十萬坐觀成敗求援如不能助見賢而不肯歸此兩怨必集於將軍恐不得復中立矣又曰曹操軍至新野蒯越韓嵩傅選等說劉琮曰逆順有大體強弱有大勢以人臣拒人主逆道也以新造之楚御中國必危以劉備敵曹公不當也三者皆短欲以抗王師之鋒必亡之道也將軍自料何與劉備琮曰不若也選曰誠以劉備不足禦曹公則雖保全楚不能以自存也誠以劉備足禦曹公則備不為將軍下也願將軍勿疑琮乃請降又曰閻忠說皇甫嵩曰將軍指揮足以展, SBCK: ''}
