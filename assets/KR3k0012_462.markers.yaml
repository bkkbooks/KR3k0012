  - {type: variant, offset: 113, length: 2, content: 請與, SBCK: 有三劒有天子劒有諸侯劒有庻人劒天子之劒包以四夷褁以四時一用天下服此天子之劒於是文王不出宫三月劒士皆伏弊之也列子曰鄧析操兩可之􅀃設無窮之弊韓子􅀃難篇曰不可不察愛増之主而後􅀃焉又􅀃難篇曰凢事以密成亦以􅂥禍未必其身􅂥也而語及所匿之事如此者身危矣又􅀃難篇曰龍喉下有逆鱗有嬰之則必煞人人主亦有逆鱗􅀃者能無嬰人主之逆鱗則幾死矣又􅀃難篇曰}
  - {type: page-break, offset: 113, content: '', id: KR3k0012_SBCK_462-6a}
  - {type: variant, offset: 113, length: 2, content: 請與, WYG: 有三劔有天子劔有諸侯劔有庶人劔天子之劔包以四夷裹以四時一用天下服四夷咸賓矣於是文王不出宫三月劔士皆伏弊之也列子曰鄧析操两可之説設無窮之辭韓子説難篇曰不可不察受憎之主而後説焉又説難篇曰凡事以宻成亦以洩禍未必其身洩也而語及所匿之事如此者身危矣又說難篇曰龍喉下有逆鱗嬰之則必殺人人主亦有逆鱗説者能無嬰人主之逆鱗則㡬矣又説難篇曰}
