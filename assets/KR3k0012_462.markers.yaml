  - {type: variant, offset: 109, length: 2, content: 隋何, WYG: 充論衡曰𫝊稱蘇秦張儀學縱横之術於鬼谷先生掘地為坎曰能下説令我泣出則能分人主之地蘇秦説鬼谷先生泣下沾衿張儀下説鬼谷先生泣亦沾衿劉向説苑曰孫卿曰夫談説之術端盛以處之堅强以持之莊子曰昔趙文王喜劔劔士日夜相擊於前太子悝患之乃使以千金奉莊子莊子不受請持劔服或乃見王}
