  - {type: variant, offset: 102, length: 0, content: '', SBCK: 陽閻忠􅀃嵩曰難得易失者時也時至不旋踵者機也故聖人常順時而動智者必因機以發今將軍遭難得之時蹈機而不發將何以權大名乎又曰劉備救徐州刺史陶謙㑹謙病死伏波將軍陳登􅀃備曰今欲爲使君合衆十萬上可以匡主濟人成五覇之業下可以割地守境書名竹帛􅀂使君不聽登亦未聽使君得發備遂領徐州孔演漢魏春秋曰興平元年曹公復征陶謙陳宮􅀃張邈曰雄傑並起君以千里之衆當四戰之地撫劒頋盻亦足以爲人豪而反制於人不以鄙乎魏氏春秋曰鍾㑹隂懐異圖姜維見而知其心謂可構成擾亂以圖克復乃詭􅀃之曰君自淮南巳來筭無遺䇿晉道克昌皆君爲之今復定蜀威德大震其民髙其功而主畏其謀欲以此安歸乎夫韓信不背漢於擾攘而見疑於旣平大夫種不從范蠡於五湖卒伏劒而亡彼豈闇主愚臣哉利害使之然也今君大功旣立大德巳著何不法陶朱公汎舟絶迹全功保身登娥媚之嶺而從赤松遊乎㑹曰君言逺我不能行且爲全身之道或未盡於此也維曰其他則君智力之所能無煩於老夫矣由是情好欣甚周載曰薄疑者衛之居士也疑進說衛嗣君以}
  - {type: page-break, offset: 102, content: '', id: KR3k0012_SBCK_462-4b}
  - {type: variant, offset: 102, length: 0, content: '', WYG: 陽閻忠説嵩曰難得易失者時也時至不旋踵者機也故聖人嘗順時而動智者必因機以發今將軍遭難得之時蹈機而不發将何以享大名乎又曰劉𤣥徳救徐州刺史陶謙謙病死伏波將軍陳登說𤣥徳曰今為使君合衆十萬上可以匡主濟人成五霸之業下可以割地守境書名竹帛若使君不聽登亦未聽使君得發備遂領徐州孔演漢魏春秋曰興平元年曹公復征陶謙陳宫説張邈曰雄傑並起君以千里之衆當四戰之地撫劔顧盼亦足以為人豪而反制於人不已鄙乎魏氏春秋曰鍾㑹隂懐異圖姜維見而知其心謂可構成擾亂以圖克復乃詭説之曰君自淮南以來筭無遺策晉道克昌皆君為之今復定蜀威徳大震其名髙其功著而主畏其謀欲以此安歸乎夫韓信不背漢於擾攘而見疑於既平大夫種不從范蠡于五湖卒伏劍而亡彼豈闇主愚臣哉利害使之然也今君大功既立大徳已著何不法陶朱公汎舟絶迹全功保身登峨嵋之嶺而從赤松逰乎㑹曰君言逺我不能行且為全身之道或未盡於此也維曰其他則君智力之所能無煩於老夫矣由是情好欣甚周載曰薄疑者衛之居士也疑進説衛嗣君以}
  - {type: page-break, offset: 102, content: '', id: KR3k0012_WYG_462-6b, image: WYG0897/WYG0897-0231b.png}
  - {type: page-break, offset: 102, content: '', id: KR3k0012_WYG_462-7a, image: WYG0897/WYG0897-0231c.png}
  - {type: variant, offset: 103, length: 0, content: '', SBCK: 道嗣君恱延之以相辭曰疑之母以疑爲賢然與疑議家事旣定則又决之所幸蔡嫗故事多不就母子之間猶不免乎蔡嫗之議今人主皆有蔡嫗而於臣非骨􅁏之親安得不敗君曰寡人聞命遂相之委以從事江表傳曰曹公聞周瑜年少有俊才謂可遊􅀃動也宻下楊州遣九江蔣幹有儀容以才辯見稱獨歩江淮之間莫與爲對乃布衣􅁑巾自託􅀻行詣瑜瑜出迎之立謂幹曰子翼卿苦逺江湖爲曹氏作􅀃客耶幹曰吾與足下州里中間别隔遥聞芳烈故來叙闊并觀雅頌而云說客無乃逆詐乎瑜曰吾雖不及夔曠聞弦賞音足知曲也因延幹入爲設酒食後三日瑜請幹與周觀營中行視倉庫軍資器仗言訖還飲宴示之侍者服飾珍玩之物因謂幹曰丈夫處世一遇知巳外守君臣之義内結骨􅁏之恩言行計從禍福共之假}
  - {type: page-break, offset: 103, content: '', id: KR3k0012_SBCK_462-5a}
  - {type: variant, offset: 103, length: 0, content: '', WYG: 道嗣君悦延之以相辭曰疑之母以疑為賢然與疑議家事既定則又决之所幸蔡嫗故事多不就母子之間猶不免乎蔡嫗之議今人主皆有蔡嫗而於臣非有骨肉之親安得不敗君曰寡人聞命遂相之委以從事江表𫝊曰曹公聞周瑜年少有俊才謂可逰説動也宻下揚州遣九江蔣幹有儀容以才辯見稱獨步江淮之間莫與為對乃布衣葛巾自託私行詣瑜瑜出迎之立謂幹曰子翼卿苦逺涉江湖為曹氏作説客耶幹曰吾與足下州里中間别隔遥聞芳烈故來叙濶并觀雅頌而云説客無乃逆詐乎瑜曰吾雖不及虁曠聞絃賞音足知曲也因延幹入為設酒食後三日瑜請幹與周觀營中行視倉庫軍資器仗言訖還飲宴示之侍者服飾珍玩之物因謂幹曰丈夫處世一遇知巳外守君臣之義内結骨肉之恩言行計從禍福共之假}
  - {type: page-break, offset: 103, content: '', id: KR3k0012_WYG_462-7b, image: WYG0897/WYG0897-0231d.png}
