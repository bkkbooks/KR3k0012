  - {type: variant, offset: 58, length: 6, content: 雷霆解如風雨, krp: 此者身危矣又說難篇曰龍喉下有逆鱗有嬰之則必煞人人主亦有逆鱗說者能無嬰人主之逆鱗則幾死矣又說難篇曰大意無所拂悟辭言無所擊排然後極聘智辯焉又說難篇曰略事陳意則曰怯懦而不盡慮事廣肆則曰草野而倨侮此說之難也又說難篇曰凢說得親近不疑而得盡其辭也鬼谷子曰抵巇音熈篇云巇者始有朕可抵而塞可抵而却聖人知之獨保其用因作說事}
