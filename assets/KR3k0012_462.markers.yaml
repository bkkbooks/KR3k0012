  - {type: variant, offset: 520, length: 8, content: 韓信既殺龍且項恐, SBCK: 善􅀃者􅀂巧士因人之力以自為力因其來而與來因其徃而與徃所因便也尸子曰公輸般爲蒙天之階階成將以攻宋墨子聞之赴於楚行十曰十夜而至於郢見王曰今有人於此舎其文軒鄰有弊輿而欲􅀼之舎其錦繡鄰有短􅄄而欲竊之舎其梁􅁏鄰有糟糠而欲竊之此爲何􅀂人王曰必􅀼疾矣墨子曰荆之地方五千里宋方五百里此猶文軒之與弊輿也荆有雲夢犀兒麋鹿􅄹溢江漢之魚鼈黿鼉爲天下饒宋所謂無雉兎鮒魚者也猶梁􅁏之與糠糟也荆有長松文栢梓柟豫章宋無長木猶錦繡之與短􅄄也臣以王之攻宋也爲與此同􅀋王曰善哉請無攻宋孔藂曰齊攻趙國禀立趙}
  - {type: page-break, offset: 520, content: '', id: KR3k0012_SBCK_462-8a}
  - {type: variant, offset: 520, length: 2, content: 韓信, WYG: 善説者若巧士因人之力以自為力因其来而與来因其徃而與徃聴因便也尸子曰公輸般為蒙天之階階成將以攻宋墨子聞之赴于楚行十日十夜而至於郢見王曰今有人於此舎其文軒隣有弊輿而欲竊之舎其錦繡隣有短褐而欲竊之舎其􅆝肉隣有糟糠而欲竊之此為何若人王曰必竊疾矣墨子曰荆之地方五千里宋方五百里此猶文軒之與弊輿也荆有雲夢犀兕麋鹿盈溢江漢之魚鱉黿鼉為天下饒宋所謂無雉兎鮒魚者也猶粱肉之與糟糠也荆有長松文栢梓柟豫章宋無長木猶錦繡之與短褐也臣以王之攻宋也為與此同類王曰善哉請無攻宋孔藂子曰齊攻趙國稟立趙使孔青撃之克齊軍尸三萬趙王詔勿歸其尸將困之子慎聘趙曰以臣愚計貧齊之術乃宜歸尸使其家逺来迎尸不得事農一費也歸而𦵏之二費也一年之中喪三萬費欲無困貧弗可得也王曰善又曰五國約而誅秦未入秦境而留兵于成皋子慎謂市丘君曰此師楚為之主今兵不散殆有異意君其備之市丘君曰先生幸而教之子慎許諾遂見楚王曰王約五國而伐秦事}
