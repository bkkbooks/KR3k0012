  - {type: variant, offset: 4318, length: 201, content: 姓失望今專命方面施行恩德夫有桀紂之亂乃見湯武之功民人飢渴易為充飽宜急分遣官屬狥行郡縣理冤結布惠澤上納之又曰隗囂既立便聘平陵方望為軍帥望至說囂曰足下欲丞天順民輔漢而起今立者乃在南陽王莽尚據長安雖欲以漢為名其實無所受命將何以見信於眾宜急立高廟稱臣奉祠所謂神道設教求助民神者也且禮有損益質文無常削地開兆茅茨土階以致其肅敬雖未備物神明其舍諸囂從其言又曰蜀郡功曹李熊說公孫述曰方今四海波蕩疋夫橫議將軍割據千里地方, WYG: 六}
