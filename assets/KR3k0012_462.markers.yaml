  - {type: variant, offset: 4084, length: 202, content: 天下大定何用兵為弇曰青徐之賊銅馬赤眉之屬數十輩輩數十萬眾皆東至海所嚮無前聖公不能辯也敗必不久帝起坐曰卿失言我擊卿弇曰大王哀厚弇如父子故披赤心為大王陳事上曰我戲卿耳何以言之弇曰百姓患苦王莽苛刻日久聞劉氏復興莫不欣喜望風從化而去虎口就慈母倒戟橫矢不足以喻明公首事南破昆陽敗百萬師今復定河北以義征伐表善懲惡躬自克薄以待士民發號嚮應望風而至天下至重公可自取無令他姓得之上曰卿若東得無為人道之弇曰此重事不敢為人道也, WYG: ''}
