  - {type: variant, offset: 1404, length: 1503, content: 又曰蒯通知天下權在於韓信欲說令背漢曰臣願披心腹隨介肝膽效愚忠恐足下不能用也曰夫功者難成而易敗時者難值而易失時不再來願足下無疑臣之計信猶豫不忍背漢遂謝通通乃陽狂為巫又曰漢三年與項羽相距京索間上數使使勞苦丞相鮑生謂蕭何曰數勞苦君者有疑君今為君計遣君于孫昆弟能勝兵者悉詣軍所上益信君於是何從其計漢王大悅又曰項羽擊陳留外黃不下數日降羽悉令男子年十五以上詣城東欲坑之外黃令舍人兒年十三往說羽曰彭越強劫外黃恐故降以待大王大王至又皆坑之百姓豈有所歸心哉從此以東梁地十餘城皆恐莫肯下矣羽然其言迺赦外黃當坑者而東至睢陽聞之皆爭下又曰漢王至雒陽新成三老董公遮說漢王曰臣聞順德者昌逆德者亡兵出無名事故不成故曰明其為賊敵乃可服項王為無道放殺其主天下之賊也夫仁不以勇義不以力三軍之眾為之素服以告諸侯為此東伐四海之內莫不仰德此三王之舉也漢王曰善非夫子無所聞於是漢王為義帝發喪哀臨三日發使告諸侯又曰婁敬齊人也漢五年戍隴西過雒陽帝在焉敬脫輓輅見齊人虞將軍曰臣願見上言便宜虞將軍入言上召見賜食敬說曰陛下都洛陽豈欲周室比隆哉上曰然敬曰陛下取天下與周異周之先積德累善十有餘世武王伐紂成王即位周公之屬傳相焉乃營成周都雒陽以為天下中諸侯四方納貢職道里均矣有德則易以王無德則易以亡今陛下與項籍戰滎陽大戰七十小戰四十使天下之民肝腦塗地哭泣之聲不絕傷疾者未起而欲比隆成康之時臣竊以為不侔矣且夫秦地被山帶河四塞以為固卒然有急百萬之眾可具夫與人鬭不搤其亢張晏曰亢喉嚨拊其背未能全勝今陛下入關而都按秦之故此亦搤天下之亢而拊其背也高帝即日西都關中又曰陳狶反上自將至邯鄲而韓信謀反關中呂后用蕭何計誅信上已聞信誅便拜何相國益封五千戶令卒五百人一都尉為相國衛諸君皆賀邵平獨弔謂何曰禍自此始矣上暴露於外而君守內非被矢石之難而益君封置衛者以今者淮陰新反於中有疑君心夫置衛君非以寵君也讓封勿受悉以家私財佐軍何從其計上喜悅又曰齊悼惠王時曹參為相禮下賢人請蒯通為客初齊王田榮怨項羽謀舉兵叛之齊處士東郭先生梁石君在劫中強從及田榮敗二人醜之相與入山深隱居客謂通曰先生之於曹相國拾遺舉過顯賢進能齊國蔑若先生者先生知梁石君東郭先生士俗所不及何不進於相國乎通曰諾臣之里婦與里諸母相善也里婦夜亡肉姑以為盜怒而逐之婦晨去過所善諸母語以事而謝之里母曰汝安行我今令而家追汝矣即束蘊請火於亡肉家曰昨暮犬夜得肉爭鬭相殺請火治之亡肉家遽追呼其婦故里女非談說之士也束蘊乞火非還婦之道也然物有相感事有適可臣請乞火於曹相國曰婦人有夫死三日而嫁者有幽居守寡不出門者足下即求婦何取曰不取嫁者通曰然則求臣亦猶是也彼東郭先生梁石君齊之俊士隱居不嫁未嘗卑節下意以求仕也願足下使人禮之曹相國曰敬受命皆以為上賓又曰袁盎逢丞相申屠嘉下車拜謁丞相從車上謝盎還愧其吏迺之丞相舍上謁求見丞相曰且陛下從代來每朝郎官者上書䟽未嘗不正輦受其言不可用置之言可採未嘗不稱善何也欲以致天下賢士日聞所不聞以益聖今君自閉鉗天下之口而日益愚夫以聖主責愚相君受禍不久矣丞相乃再拜曰嘉鄙人迺不知將軍奉教引與之坐為上客范曄後漢書曰更始尚書令謝躬留魏郡太守陳康守鄴自率諸將擊五萊賊世祖因躬在外乃使吳漢襲其城漢先令辯士說陳康曰蓋聞之上智不處危以僥倖中智能因危以為功下愚安於危以自亡之智在人所由不可不察今京師敗亂四方雲擾公所聞也蕭王兵強士附河北歸命公所見也謝躬內背蕭王外失眾心公所知也公今據孤危之城待滅亡之禍義無所立節無所成不若開門內軍轉禍為福免下愚之敗收中智之功此計之至者也康然之於是開門內漢又曰袁紹奔冀州董卓購募求紹時侍中周秘城門校尉伍瓊等陰為紹說卓曰夫廢立大事非常人所及袁紹不識大體恐懼出奔非有它志今急購之勢必為變袁氏樹恩四世門生故吏遍於天下若收豪傑以藂, SBCK: ''}
