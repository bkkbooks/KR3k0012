  - {type: variant, offset: 103, length: 3, content: 使隋何, krp: 然後合於文王此天知之至歸之不疑注云伊尹吕尚各以至知}
  - {type: variant, offset: 104, length: 2, content: 隋何, SBCK: 􅂫張更生酈叟復在吾猶拊其背而折其辭豈足下㓜生所能移乎幹但􅀏終無所言幹還稱瑜雅量非言辭所間中州之士亦此多之王充論衡曰􅀓稱􅂫􅁗張儀縱横之術於􅀑谷先生掘地爲坎曰能下􅀃令我泣岀則能分人主之地蘇􅁗}
