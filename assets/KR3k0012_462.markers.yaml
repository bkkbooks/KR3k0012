  - {type: variant, offset: 7, length: 4, content: 說中史記, SBCK: 􅀃下魏志曰􅀽紹領兾州牧從事沮授􅀃紹曰將軍屬廢立之際忠義奮發雖黄巾猾亂黒山跋扈舉軍東向則青州可定還討黒山則張燕可㓕迎大駕於西京復宗廟於洛邑號令天下以討未服以此争鋒誰敵之紹喜王沉魏書曰桓階字伯緒天下亂太祖興義兵􅀽紹強盛劉表舉州應之階􅀃其守張羡曰夫舉事而不夲於義未有不敗者也曹公雖弱扶義而起奉王命以討有罪羡曰善矣魚豢魏典畧}
  - {type: variant, offset: 8, length: 3, content: 中史記, WYG: 下魏志曰袁紹領冀州牧從事沮授説紹曰將軍屬廢立之際忠義奮發雖黄巾猾亂黒山䟦扈舉軍東面則青州可定還討黒山則張燕可滅迎大駕於西京復宗廟於洛邑號令天下以討未服以此爭鋒誰能敵之紹喜王沈魏書曰桓階字伯緒天下亂太祖興義兵袁緒强盛劉表舉州應之階説其守張羡曰夫舉事而不本於義未有不敗者也曹王雖弱扶義而起兵奉王命以討有罪羡曰善魚豢魏典略}
