  - {type: variant, offset: 2017, length: 1, content: 譙, WYG: 桞自立爲西楚霸王又都於此漢爲泗水郡後爲彭城郡漢書曰高祖過沛留置酒沛宫悉召故人父老子弟佐酒發沛中兒得百二十人教之歌酒酣上擊筑自歌大風之歌令兒皆習和之上乃起舞忼慨泣下謂沛父老曰遊子悲故鄉吾雖都關中萬歲之後吾䰟魄猶思沛宋書曰高祖經畧中原以彭城險要置府於此後王𤣥謨上表曰彭城南届大淮左右清汴城隍峻整襟衛周又自淮以西襄陽以北經塗三千達于濟岱六州之民三十萬户實由此境後魏書曰尉元上表曰彭城宋之要藩南師來侵莫不因之以凌諸夏泗州元和郡}
