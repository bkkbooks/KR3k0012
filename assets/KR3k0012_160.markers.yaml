  - {type: 'tls:seg', offset: 37, content: '', id: KR3k0012_CHANT_160-1a.10}
  - {type: variant, offset: 37, length: 3, content: 為三川, WYG: 即東郡地在漢爲濟隂郡之鄄城縣左傳曰齊桓公㑹諸侯于鄄杜注曰衛邑今東郡鄄城是也史記曰齊威王九年趙伐我取鄄左傳曰衛侯夢於北宫見人登昆吾之墟注云衛有觀在昆吾之墟今濮陽城是史記曰舜耕于厯山耕者讓畔應劭曰厯山即雷澤中山也水經曰昔師延爲紂作靡靡之樂武王伐紂延東走自投濮而死衛靈公將之晉舍於濮水之上夜聞歌聲召師涓受之濟州十道志曰濟州濟隂郡置在盧縣禹貢兖州之域春秋時其地屬齊秦兼天下爲東郡茌平地茌音仕淄反左傳曰齊鄭盟于石門尋盧之盟杜注曰今盧縣故城是史記曰扁鵲生盧故曰盧醫酈道元注水經曰碻磝城西即故茌平縣城碻磝即今州是也沈約宋書作敲囂字宋書曰元嘉七年到彦之北征拔碻磝後失之至二十七年以王𤣥謨爲寧朔將軍先鋒入河平之於此固守因置碻磝城郡國志曰後魏置濟州於單父城中昔石勒於耕處聞鼔角之聲即此圖經曰東阿春秋時齊地也郡國志曰其地岀繒縑故秦王服阿縞十道志曰石窌在長清縣左氏傳曰齊晉戰于鞍齊師敗績齊侯自徐關入辟女子曰君免乎曰免鋭司徒免乎曰免既而問之辟司徒之妻也與之石窌鄆州十道志曰鄆州東平郡置在須昌縣元和郡國志曰禹貢兖州之域春秋時屬宋即魯附庸須句國句音劬戰國時其地屬魏秦爲薛郡地漢爲東平國左傳曰晉人執季文子於莒丘公還待於鄆杜注曰鄆魯西邑又僖二十二年伐邾須句僖公將也又哀公十四年西狩于大野叔孫氏之車子鉏商獲麟賜虞人大野即鉅野縣青州十道志曰青州北海郡置在益都縣元和郡國志曰少昊之墟古青州之地舜時以青州越海遼逺分爲營州武王克商封師尚父於齊營丘周成王少時命太公東至于海西至于河南至於穆陵北至於無棣五侯九伯實得征之後子孫爲秦所滅分齊地置齊瑯琊二}
