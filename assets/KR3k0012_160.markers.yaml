  - {type: variant, offset: 2389, length: 450, content: 故城在長社縣後漢書曰宋寵為潁川太守問功曹鄭凱曰聞貴郡山川多產奇秀前賢往哲可得聞乎凱對曰鄙郡稟嵩高之靈中岳之精是以聖賢龍蟠俊乂鳳集昔許由巢父恥受堯禪洗耳河濱重道輕帝邈世高蹈樊仲父者志潔心遐恥山河之功賤天下之重抗節參雲公儀許由俱出陽城留侯張良奇謀輔世玄笇入微濟生民之命恢帝王之略功成而不居爵厚而不受出于父城胡元安體曾參之至行履樂正之純業喪親泣血骨立形存精神通於神明雉兔集於左右出潁陽彪義山英姿秀偉逸才挺出究孔子之房隩存文武於將墜出於昆陽杜伯夷經學著於師門政事熙於國朝清身不茍有於陵之操損已存公有公儀之節出定陵又曰獻帝建安元年遷都許魏略曰黃初五年文帝東征留郭后於永始臺霖雨百餘日城樓多壞有司請移后曰昔楚昭王出遊貞姜留漸臺江水至使者迎而無符不出卒沒今帝在遠未有急奈何移也又景福殿賦曰鎮以崇臺寔曰永始臺在許昌縣魏志曰荀彧字文若潁川潁陰人也董卓之亂彧謂父老曰潁川四戰之地天下有變當為兵衝宜亟去無久留鄉人多懷土猶豫會冀州牧韓馥迎彧獨將宗族至冀州後董卓遣李催等出關東所過虜掠至潁川鄉人留者多見殺略陳州十道志曰陳州淮陽, WYG: ''}
