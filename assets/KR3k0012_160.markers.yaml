  - {type: variant, offset: 1679, length: 284, content: 漢為濟陰郡地在濟水之南故以為名曹詩曰薈兮蔚兮南山朝躋曹南山也左傳僖二十八年曰晉侯圍曹門焉多死曹人尸諸城上棨晉死人於城上人晉侯患之聽輿人之誦曰移舍於墓言將發冢曹人兇懼因其兇也而攻之入曹而分曹衛之田以賜宋人晉侯有疾曹伯之豎侯獳貨筮史使曰以曹為解齊桓公為會而封異姓今君為會而滅同姓曹叔振鐸文之昭也先君唐叔武之穆也且合諸侯而滅兄弟非禮也公說復曹伯尚書曰夏師敗績遂伐三鬷俘厥寶玉孔曰三鬷國名今定陶也水經曰荷水俗謂之五丈溝東經定陶漢書曰高祖五年春二月甲午即皇帝位於定陶汜水之陽左傳曰衛孫蒯田于隧飲馬于重丘重丘人毀瓶因詬之重丘今乘氏縣亳州十道志曰亳州譙郡置在譙縣禹貢豫州之域春秋時陳, WYG: ''}
