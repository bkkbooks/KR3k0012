  - {type: variant, offset: 3216, length: 0, content: '', SBCK: 少昊之代爽鳩氏虞夏則有季萴仕則反湯有逢公伯陵逢音蒲江反殷末有蒲姑皆爲諸侯國於此地周成王時蒲姑與四國作亂成王滅之以封太公史記曰齊有清濟濁河可以爲固長城鉅防足以爲塞又曰􅂫􅁗東􅀃齊宣王曰齊南有泰山東有瑯瑘西有清河北有渤海此所謂四塞之國也齊地方二千餘里齊軍之良進如鋒矢戰如雷霆解如風雨即有軍役未甞倍泰山絶清河渉渤海也臨淄甚富其民無不吹簫鼔彈琴瑟擊筑􅃲雞走狗臨菑之塗車轂相擊人肩相摩連􅃑成帷舉􅃑成幕揮汗成雨家給人足志氣髙揚又曰齊所以名齊者有天齊祠也又封禪書曰始皇遊海上祠名山大川及八神求羡門之屬八神一曰天主祠天齊天齊池名在臨淄南郊山下漢書曰夫齊東有瑯瑘即墨之饒南有泰山之固西有濁河之限北有渤海之利地方二千里持㦸百萬懸隔千里之外齊得十二焉又曰齊有三服之官縱爲春服紈素爲冬服輕綃爲夏服韓詩外傳曰齊景公遊於牛山之上北望齊國曰美哉國乎鬱鬱葱葱使古人無死者則寡人將何去此俯而泣下沾􅁭國子髙子曰然臣頼君之賜􅂼食惡衣可得而食也駑馬柴車可得而乗也且猶不欲死而况君乎又俯而泣晏子􅀏曰樂哉今日之遊宴也見怯君一䛕臣二使古而無死則太公丁公至今猶存吾君方將􅀍萊笠而立畎􅅿惟農事之恤何暇念死乎公慙乃引觴自罰韓子曰景公與晏子遊於少海登柏寢之臺而望其國曰美哉堂堂乎後代孰有此晏子曰其田氏乎公曰寡人有國而田氏有之奈何對曰君欲奪之則近賢逺不肖振窮䘏􅀌雖十田氏其如君何齊記曰晉永嘉五年東萊牟平曹嶷爲刺史所築城有大澗甚廣因之爲固謂之廣固城城側有五龍口崔鴻十六國春秋南燕録曰慕容德􅀄議所都尚書潘聽曰青齊沃壤號曰東􅁗土方二千里四塞之固負海之饒可謂用武之國廣固者曹嶷之所營山川險峻足爲王者之都從之齊州十道志曰齊州濟南郡置在歷城縣古兖州之域周禮曰子爲􅀇枵齊之分左傳曰晉平公伐齊戰于歷下史記曰舜耕于歷山竹書穆天子傳曰天子自五鹿東征釣於漯水以􅀕淑人巳已天子東征飲于漯水之上漯水在祝阿即今禹城縣郡國縣道記曰章丘古髙唐縣也}
