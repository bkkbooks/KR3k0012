  - {type: variant, offset: 2842, length: 209, content: 菀丘縣元和郡國圖曰禹貢豫州之域本太昊之墟周武王封媯滿於陳春秋時楚滅之秦滅楚屬潁川郡漢高分置淮陽國後漢改為陳國毛詩陳風曰坎其擊鼓宛丘之下又曰東門之池可以漚麻注水經曰東門池水至清而不耗不生諸草爾雅曰陳有宛丘又曰丘上有丘為宛丘漢書曰高帝十一年立子友為淮陽王罷潁川郡以益之七賢傳曰漢武出淮陽到監鄉帝問陳翼曰此名為何翼曰監鄉上曰何欺乎翼曰臣言不欺若不欺佩刀當生白毛若欺則無毛視之刃果有毛監鄉在盧江縣潁州十道志曰潁州汝陰郡置在汝陰, SBCK: 湏昌}
