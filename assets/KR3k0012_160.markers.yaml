  - {type: variant, offset: 329, length: 193, content: 屬三川郡漢為河南郡之梁縣也左傳昭二十九年傳曰陶唐氏既衰其後有劉累學擾龍于豢龍氏以事孔甲能飲食之夏后嘉之賜氏曰御龍一雌死潛醢以食夏后夏后饗之而使求之懼而遷于魯縣即魯山縣也又曰楚白公之亂葉公率國人攻白公白公奔山縊死葉公遂邑焉即今葉縣也家語曰葉公好龍窗壁皆畫龍形真龍為降葉公見而喪魄漢書曰漢王至成皋轅生說漢王曰漢楚相拒滎陽數歲漢常困願君王出武關項王必引南走王深壁令滎陽成皋且休息使韓信等輯河北, SBCK: ''}
