  - {type: variant, offset: 49, length: 3, content: 左傳僖, WYG: 圖經曰少昊之代爽鳩氏虞夏則有季萴仕則反湯公逄公伯陵逄音蒲江反殷末有蒲姑皆爲諸侯國於此地周成王時蒲姑與四國作亂成王滅之以封太公史記曰齊有清河濁河可以爲固長城鉅防足以爲塞又曰蘇秦東説齊宣王曰齊南有泰山東有瑯琊西有清河北有渤海此所謂四塞之國也齊地方}
