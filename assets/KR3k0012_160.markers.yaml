  - {type: variant, offset: 651, length: 671, content: 都有熊今新鄭是也漢志曰新鄭本高辛氏火正祝融之墟國語曰鄭桓公為司徒問於史伯曰王室多故余懼及焉何以逃死史伯對曰王室將卑戎翟必昌不可偪也當成周者南有荊蠻申呂應鄧陳蔡隋唐北有衛燕翟鮮虞路泉徐蒲鮮虞姬姓路泉徐滿皆赤翟隗姓也西有虞虢晉隗霍楊魏芮八國姬姓也東有齊魯曹宋滕鄒莒是非王之友子母弟甥舅也皆則蠻夷戎狄之人也非親作頑不可入也其濟洛河穎之間乎言此四水之間可逃是其子男之國虢鄶為大虢東虢仲之後鄶姬姓虢叔恃勢鄶仲恃險皆有淫侈怠慢之心加之以貪冒君若以周難之故寄孥與賄焉不敢不許孥妻子賄財也周亂而是驕而貪必將背君君若以成周之眾奉辭伐罪無不克矣克二邑鄢弊補舟依柔歷華君之土也言克虢鄶此八邑可得若前華後河右洛左濟主芣騩而食溱洧芣驪山名主為神主也修典刑以守之可以少固公說乃東孥與賄虢鄶受之十邑皆有寄也後桓公之子武公竟取十邑之地而居之今河南新鄭是十邑謂前八邑及虢鄶韓詩外傳曰鄭國俗以二月桃花水下時會于溱洧之上以自祓除也故詩曰溱與洧方渙渙兮漢書曰漢王數困滎陽成皋間計欲捐成皋以東屯鞏雒以距楚酈食其曰夫敖倉天下轉輸久矣臣聞其下藏粟甚多楚人拔滎陽不能堅守敖倉此天所以資漢願足下急進兵攻滎陽據敖倉之粟即天下知所歸矣晉書曰阮籍嘗登廣武見劉項戰處歎曰時無英主使豎子成名其地在滎陽地道記曰陽武滎陽有博浪沙張良為韓擊秦始皇處宋州十道記曰宋州睢陽郡理宋城縣虞舜十二州為豫州之境周為青州之域武王封微子之邑後為齊楚魏所滅三分其地魏得其梁陳留齊得濟陰東平楚得沛梁即今州地禮記曰武王克殷下車而封殷之後於宋禹貢曰導荷澤被孟豬孟豬澤在今虞城縣明都澤是愽物志曰宋北至泗水南迄睢渦有孟豬之澤碭山之基元和, WYG: 郳}
