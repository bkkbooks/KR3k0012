  - {type: variant, offset: 2012, length: 2, content: 神農, WYG: 太公於營丘萊侯聞之遂與太公爭營丘左傳曰聊攝以東姑尤以西其爲人也多矣聊攝齊西界姑尤齊東界謂聊城攝城姑水尤水在即墨縣漢書郊祀志曰武帝元封元年大旱禱萬里沙孟康云沙長三百里沙在莱州界地理志曰長廣縣有貕養澤周禮職方氏曰幽州之藪曰貕養長廣今昌陽縣登州十道志曰登州文登郡漢牟平縣屬東萊郡文帝封齊惠王子將閭為牟平侯將閭邑也圖經曰古莱子國戰國及秦屬齊郡漢已下屬東莱郡又曰文登漢腄縣有梁山漢書曰腄有梁山丹水所岀師古曰腄直類切史記曰始皇二十八年行郡縣上太山過黃腄經成山其後二十九年又東遊登成山升之罘勒石紀功密州十道志曰密州高密郡置在諸城縣禹貢青州之域兼得徐州之地秦爲瑯琊郡漢屬齊文帝分齊立膠西國封齊悼惠王子夘爲膠西王都高密齊記曰密州本東武縣樂府東武郡吟是秦本紀曰始皇二十八年南登琅邪大樂之留三月乃徙黔首三萬户琅邪臺下吳越春秋曰越王勾踐二十五年徙都瑯琊立觀臺周旋七里以望東海史記曰齊湣王爲燕師所敗唯莒與即墨二城不下立湣王之子法章於莒是爲襄王徐州十道志曰徐州彭城郡置在彭城縣元和郡國志曰禹貢徐州之域春秋時宋滕薛小邾偪陽之地六國時屬楚秦併天下爲泗水郡楚漢之際楚懷王自旴眙徙都}
