  - {type: variant, offset: 3294, length: 3, content: 庚作亂, krp: 帝元封元年大旱禱萬里沙孟康云沙長三百里沙在郡界地里志曰長廣縣有奚養澤周禮職方氏曰幽州之藪曰奚養長廣今昌陽縣登州十道志曰登州文登郡漢牟平縣屬東萊郡文帝封齊悼惠王子將閭爲牟平侯此即將閭邑也圖經曰古萊子國也戰國及秦屬齊郡漢巳下屬東萊郡又曰文登漢腄縣有之罘山漢書曰腄有之罘山丹水所出師古曰腄直睡切史記曰始皇二十八年行郡縣上㤗山過黄腄經成山後二十九年又東遊登成山升之罘勒石紀功密州十道志曰密州髙密郡置在諸城縣禹貢青州之域兼得徐州之地秦爲瑯瑘郡漢屬齊文帝分齊立膠西國封齊悼惠王子卬爲膠西王都髙密齊記曰密州本東武縣樂府東武吟即是也秦夲紀曰始皇二十六年齊遂登瑯瑘層臺於山上秦王樂之因留三月乃徙黔首二萬户於瑯瑘山呉越春秋曰越王勾踐二十五年徙都瑯瑘立觀臺周旋七里以望東海史記曰齊湣王爲燕師所敗唯聊莒即墨三城不下立湣王之子法章於莒是爲襄王徐州十道志曰徐州彭城郡置在彭城縣元和郡縣圖曰禹貢徐州之域春秋時宋滕薛小邾偪陽之地六國時屬楚秦併天下爲泗水郡楚漢之際楚懷王自盱眙徙都之後項羽徙懷王于郴自立爲西楚霸王又都於此漢爲泗水郡後爲彭城郡漢書曰髙祖過沛留置酒沛宫悉召故人父老子弟佐酒發沛中兒得百二十人敎之歌酒酣上擊筑自歌大風之歌令兒皆習和之上乃起舞忼慨泣下謂沛父老曰遊子悲故郷吾雖都關中萬歳之後吾䰟魄猶思沛宋書曰髙祖經略中原以彭城險要置府於此後王玄謨上表曰彭城南届大淮左右清汴城隍峻整襟衛周固又自淮以西襄陽以北經塗三千逹于濟岱六州之民三十萬户實由此境後魏書曰尉元上表曰彭城宋之要藩南師來侵莫不因之以凌諸夏泗州元和郡縣圖曰泗州臨淮郡理臨淮縣禹貢徐州之域春秋屬魯又爲徐子之國後秦滅楚爲泗水郡漢分置臨淮郡漢書地理志曰厹猶屬臨淮郡王莽曰康義厹音仇即連水也都城記曰周穆王末徐君偃好行仁義東夷歸之者四十餘國穆王西廵聞徐君威德日逺遣楚襲其不備大破之殺偃王其子遂北徙彭城百姓從之者數萬徐國今徐城是也兖州十道志曰兖州魯郡置在瑕丘縣元和郡縣圖曰禹貢兖州之域春秋時爲魯國武王即位封}
