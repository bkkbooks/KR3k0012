  - {type: variant, offset: 2382, length: 55, content: 祊易許田今有魯故城在長社縣後漢書曰宋寵為潁川太守問功曹鄭凱曰聞貴郡山川多產奇秀前賢往哲可得聞乎凱對曰鄙郡稟嵩高, SBCK: 妻也與}
  - {type: page-break, offset: 2382, content: '', id: KR3k0012_SBCK_160-3a}
  - {type: variant, offset: 2382, length: 55, content: 祊易許田今有魯故城在長社縣後漢書曰宋寵為潁川太守問功曹鄭凱曰聞貴郡山川多產奇秀前賢往哲可得聞乎凱對曰鄙郡稟嵩高, krp: 妻也與}
