  - {type: variant, offset: 30, length: 1, content: 韓, WYG: 為東郡地左傳曰狄滅衛衛立戴公以廬于曹今白馬地即曹邑也衛文公自曹邑遷于楚今衛南地也衛成公又遷于帝今濮陽縣也史記曰秦始皇五年拔魏十五城始置東郡後漢書曰樊絛封燕侯即東郡也濮州十道志曰濮州濮陽郡置在鄄城縣禹貢兖州}
