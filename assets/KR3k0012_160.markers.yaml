  - {type: variant, offset: 1451, length: 205, content: 致畜藏史記曰梁孝王築東苑三百里是曰兔園又為複道自宮屬諸平臺三十餘里圖經曰梁王有脩竹園園中竹木天下之選集諸方遊士各為賦故館有鄒枚之號又有鴈鶩池周廻四里亦梁王所鑿又有清冷池有釣臺謂之清冷臺漢志曰寧陵屬陳留莽曰康善孟康曰故葛伯國今葛鄉是也漢書曰梁孝王武以孝文十二年徙梁梁為大國居天下膏腴地北界泰山西至高陽四十餘城多大縣於是孝王築東苑方三百餘里廣睢陽城七十里大治宮室為複道自宮連居於平臺四十餘里曹州十道志曰曹州濟陰郡置, WYG: 其}
