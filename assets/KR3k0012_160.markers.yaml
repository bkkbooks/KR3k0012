  - {type: variant, offset: 1231, length: 336, content: 為齊楚魏所滅三分其地魏得其梁陳留齊得濟陰東平楚得沛梁即今州地禮記曰武王克殷下車而封殷之後於宋禹貢曰導荷澤被孟豬孟豬澤在今虞城縣明都澤是愽物志曰宋北至泗水南迄睢渦有孟豬之澤碭山之基元和郡國志曰秦併天下改為碭郡後改為梁國漢文帝封子武為梁王自漢至晉為梁國屬豫州宋改為梁郡隋於睢陽置宋州唐書曰天寶末祿山亂兩河郡縣多所陷沒張巡許遠守睢陽賊將尹子奇併力攻圍逾年不下城中食盡竟為賊所陷巡等抗詞不撓遂被害陳留風俗傳曰宋之地猶有先王遺風重厚多仁好稼穡惡衣食以致畜藏史記曰梁孝王築東苑三百里是曰兔園又為複道自宮屬諸平臺三十餘里圖經曰梁王有脩竹園園中竹木天下之選集諸方遊士各為賦故館有鄒枚之號又有鴈鶩池周廻四里亦梁王所鑿又有清冷池有釣臺謂之清冷臺漢志曰寧陵屬陳留莽曰康善孟康曰故葛伯國今葛鄉是也, SBCK: ''}
