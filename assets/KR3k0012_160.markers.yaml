  - {type: punctuation, offset: 17, content: 》, id: KR3k0012_CHANT_160-bkkpn8}
  - {type: variant, offset: 17, length: 280, content: 豫州之域春秋為虢地七國時秦韓之境秦併天下為三川郡漢元鼎中置弘農郡左傳僖二年曰晉荀息以屈產之乘垂棘之璧以假道於虞以伐虢應劭漢官儀云弘大也所以廣大農業也漢志曰武帝置弘農縣於秦故函谷關山嶺下戴延之西征記曰函者道形如函也孫卿子曰秦有松柏之塞是也帝王世紀曰虢有三焉周興封虢仲於西虢此其地也封虢叔於東虢即成皋是也今陜郡平陸縣是北虢漢書曰楊僕為樓舩將軍恥為關外人於是徙關新安割秦河南南陽二郡之西境於故函谷置弘農郡漢書郊祀志曰黃帝以首山之銅鑄鼎於荊山之下後名其地為鼎湖今胡城縣也郡國縣道記曰盧氏西虢之別也遁甲開山圖曰盧氏山宜五穀可以避水災因山以名縣汝州十道志曰汝州臨汝郡禹貢豫, SBCK: 兖}
  - {type: variant, offset: 17, length: 1, content: 豫, WYG: 兖}
  - {type: variant, offset: 17, length: 280, content: 豫州之域春秋為虢地七國時秦韓之境秦併天下為三川郡漢元鼎中置弘農郡左傳僖二年曰晉荀息以屈產之乘垂棘之璧以假道於虞以伐虢應劭漢官儀云弘大也所以廣大農業也漢志曰武帝置弘農縣於秦故函谷關山嶺下戴延之西征記曰函者道形如函也孫卿子曰秦有松柏之塞是也帝王世紀曰虢有三焉周興封虢仲於西虢此其地也封虢叔於東虢即成皋是也今陜郡平陸縣是北虢漢書曰楊僕為樓舩將軍恥為關外人於是徙關新安割秦河南南陽二郡之西境於故函谷置弘農郡漢書郊祀志曰黃帝以首山之銅鑄鼎於荊山之下後名其地為鼎湖今胡城縣也郡國縣道記曰盧氏西虢之別也遁甲開山圖曰盧氏山宜五穀可以避水災因山以名縣汝州十道志曰汝州臨汝郡禹貢豫, krp: 兖}
