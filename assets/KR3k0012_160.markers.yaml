  - {type: variant, offset: 3224, length: 0, content: '', krp: 時屬齊秦爲齊郡漢爲濟南郡之般陽縣漢志曰般陽屬濟南郡應劭曰在般水之陽王莽曰濟南亭圖經曰長山縣本漢於陵縣也隋改焉以界内長白山爲名漢志曰於陵屬濟南郡王莽曰於陸郡國志曰長山於陵城散冝生得瑞獸}
  - {type: variant, offset: 3225, length: 1, content: 地, SBCK: 東故云東萊尚書禹貢曰萊夷作牧左傳曰齊侯伐萊萊人使正輿子賂夙沙衛以索馬牛皆百疋齊師乃還}
  - {type: variant, offset: 3225, length: 0, content: '', WYG: 武城聞絃歌之聲夫子莞爾而笑曰割雞焉用牛刀又曰公山弗擾以費畔召子欲往子路不悦曰末之也已何必公山氏之之也漢}
