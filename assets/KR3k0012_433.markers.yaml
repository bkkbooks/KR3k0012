  - {type: variant, offset: 1756, length: 1, content: 簡, WYG: 之良将也趙惠文王十六年亷頗為趙将伐齊大破之取晉陽拜為上卿以勇氣聞於諸侯又曰藺相如者趙人也為趙宦者令繆賢舍人趙惠文王時得楚和氏璧秦昭王願以十五城請易璧令曰臣賢舍人藺相如其人勇士有智謀宜可使乃使相如奉璧入秦秦王坐章臺得璧大喜傳璧以示美人及左右左右皆呼萬嵗相如視秦王無意償趙城乃前曰璧有瑕請指示王王授璧相如倚柱怒髪上衝冠謂秦王曰趙王齋戒五日使臣奉璧拜送書於廷何者嚴大國之威以脩敬也今臣至大王見臣列觀禮節甚倨得璧𫝊戯無償趙王城邑故臣復取璧大王必欲急臣臣頭今與璧俱碎於柱矣持璧睨柱欲以擊柱秦王恐其破璧乃辭謝固請召有司案圖十五城與趙相如見其詐乃謂曰趙王送璧時齋五日大王亦宜齋五日乃敢上璧秦王許相如就舍使其從者衣褐裹璧亡歸趙秦王齋竟引相如相如曰自秦繆公以来二十餘君未有堅盟約者臣恐見欺負趙故令人持璧歸間至趙矣王若割十五都與趙趙豈敢留璧得罪於大王臣知欺大王當誅請就湯鑊秦遂厚遇之既歸趙王以為賢大夫使不辱於諸侯拜為上大夫秦亦不以城與趙趙亦不與秦璧後秦王㑹澠池秦王飲酒酣曰寡人竊聞趙王好音請奏瑟趙王鼓瑟秦御史前書曰某年某月秦王與趙王㑹飲令趙王鼓瑟相如前曰趙王竊聞秦王善為秦聲請奏缶以相娱樂秦王怒不許於是相如前進缶因詭請之秦王不肯擊􅇲相如曰五步之内臣請以頸血濺大王矣左右欲刄相如相如張目叱之左右皆靡秦王不懌為一擊􅇲相如顧召趙御史書曰某年某月秦王為趙王擊􅇲秦之羣臣曰請以趙十五城為秦王壽相如亦曰請以秦之咸陽為趙王夀趙亦盛設兵待秦秦不敢動既罷歸國以相如功大拜為上卿位在亷頗右又曰曹沫者魯人也以勇力事魯荘公齊桓公與魯荘公㑹于柯而盟桓公與荘公既盟於壇上曹沫執匕首刼齊桓公桓公左右莫敢動問曰}
