  - {type: variant, offset: 119, length: 1284, content: 曰明君心寬裕以容其民慈愛以優柔之漢書曰翟方進少為郡小吏號遲鈍因病歸欲遊學後母愍其志而憐其幼隨之長安織履以給之謝丞後漢書曰楊彪子循為曹操所殺後見彪問曰公何瘦之甚對曰愧無日磾先見之明猶懷老牛舐犢之愛操為之改容列女傳曰魏孟陽之女芒卯之後妻也有三子前妻之子有五人皆不愛慈母前妻中子犯魏王令罪當死慈母憂感悲哀帶因減赤人有謂慈母曰人不愛母何為憂懼勤勞如此母曰其父為其孤也而使妾為之繼母如為人母而不能愛其子何謂慈乎魏王聞之高其義赦其子而復其家自此之後五子親侍慈母老子曰吾有三寶一曰慈韓子曰愛子者慈於子重生者慈於生貴功者慈於事仁淮南子曰堯立孝慈使民如子弟說苑曰魏文侯封太子摯於中山三年使不往來舍人趙倉唐曰為人子三年不聞父問不可謂孝為人父三年不聞子問不可謂慈臣願奉使侯何所好太子曰侯嗜晨鳧好北犬倉唐緤北犬奉晨鳧文侯賜太子衣一襲令以雞鳴時致之太子發筐視衣盡顛倒太子曰趣具駕君侯召我也唐來不受太子曰詩曰東方未明顛倒衣裳顛之倒之自公召之遂西至文侯大喜倉唐一使文侯為慈父摯為孝子潘岳西征賦曰夭赤子於西安坎路側而瘞之亭有千秋之號子無七日之期雖逸厲於延吳實潛慟於余慈蔡邕書曰邕薄祐早喪二親年踰三十鬢髮二色叔父親之猶若幼童陸則對座食則比豆恭敬說文曰恭肅也釋名曰恭供也自持也亦言供給事人敬警也易小過卦曰山下有雷小過君子以行過於恭取過於禮而不為害易繫辭曰君子致恭以存其位易文言曰敬以直內義以方外敬義立而德不孤尚書五子歌曰居民上者奈何弗敬毛詩小棄曰唯桑與梓必恭敬止又曰敬之敬之天惟顯思大戴禮曰昔禹見耕者五偶而式過十室之邑則下為秉德之士存焉又曰昔武王踐祚入於戶未嘗越履往來過之不履影禮記曲禮曰君子恭敬蹲節退讓以明禮又檀弓上曰晉獻公將殺其世子申生公子重耳謂之曰子盍言子之志於公乎世子曰不可君安驪姬是我傷公之心也曰然則盍行乎世子曰不可君謂我欲殺君也天下豈有無父之國哉吾何行如之使人辭於狐突曰君老矣子少國家多難伯氏不出而圖吾君圖謀伯氏茍出而圖吾君申生受賜而死再拜稽首乃卒是以為恭世子也又少儀曰賓客主恭祭祀主敬又樂記曰中正無邪禮之質也莊敬恭順禮之制也又哀公問曰敢問何謂敬身孔子對曰君子過言則民作辭過動則民作則君子言不過辭動不過則百姓不令而恭敬如是則能敬其身能敬其身則能成其親矣又經解曰恭儉莊敬禮教也左傳宣上曰晉靈公不君趙宣子驟諫公患之使鉏麑賊之晨往寢門闢矣盛服將朝尚早坐而假寐麑退而歎曰不忘恭敬民之主也賊民之主不忠觸槐而死又襄四年曰季氏以公鉏為馬正賈逵曰馬正家司馬慍而不出閔子馬見之閔子馬曾大夫閔馬父也曰為人子者患不孝不患無所恭敬父命何常之有公鉏然之敬恭朝夕恪居官次又昭七曰正考父佐戴武宣三人皆宋君也三命滋益恭三命上卿故其鼎銘云一命而僂再命而傴三命而俯俯恭於傴傴恭於僂循墻而走言不敢安行也亦莫余敢侮論語曰恭近於禮遠恥辱也又曰司馬牛憂曰人皆有兄弟我獨亡子夏曰商聞之矣死生有命富貴在天君子敬而無失與人恭而有禮四海之內皆兄弟也又曰樊遲問仁子曰居處恭執事敬與人忠雖之夷狄不可棄又曰子禽語子貢曰子之為恭也仲尼豈賢於子乎家語曰孔子曰恭則近禮堯舜篤恭以王天下又曰顏淵將西遊宋問孔子曰何以為身子曰恭敬而已矣恭則近於禮忠敬則人愛史記曰, SBCK: 九歳}
