  - {type: variant, offset: 1742, length: 4, content: 刑斧鑽加, SBCK: 利害日出而言之日中不決遂案劔歷階而上謂平原君曰從之利害兩言而決耳今日出而言從日中不決何也楚王謂平原君曰客何爲者也平原君曰是勝之舎人也楚王叱胡不下吾乃與爾君言汝何爲者也毛遂案劔而前曰今十歩之内王不得恃楚國之衆也王之命懸}
