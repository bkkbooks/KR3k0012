  - {type: punctuation, offset: 25, content: 「, id: KR3k0012_CHANT_433-bkkpn18}
  - {type: variant, offset: 25, length: 0, content: '', SBCK: 公及齊師戰于長勺公將鼔之曹劌曰未可齊人三鼔曰可矣齊師敗績公將馳之劌曰未可下視其轍登軾而望之曰可矣遂逐齊師旣克公問其故對曰戰勇氣也一鼓作氣再而衰三而竭彼竭我􅄹故克之}
  - {type: variant, offset: 25, length: 0, content: '', WYG: 公及齊師戰于長勺公将鼓之曹劌曰未可齊人三鼓曰可矣齊師敗績公將馳之劌曰未可下視其轍登軾而望之曰可矣遂逐齊師既尅公問其故對曰戰勇氣也一鼓作氣再而衰三而竭彼竭我盈故克之}
  - {type: variant, offset: 25, length: 0, content: '', krp: 公及齊師戰于長勺公將鼔之曹劌曰未可齊人三鼔曰可矣齊師敗績公將馳之劌曰未可下視其轍登軾而望之曰可矣遂逐齊師旣克公問其故對曰戰勇氣也一鼓作氣再而衰三而竭彼竭我盈故克之}
  - {type: variant, offset: 26, length: 1, content: 為, SBCK: 大國難測也懼有伏焉吾視其轍亂望其旗靡故逐之又曰􅀳襄公縳􅁗囚使菜駒以戈斬之囚呼菜駒失戈狼瞫取戈以斬囚禽之以從公乗遂以爲右箕之役先軫黜之而立續簡伯狼瞫怒其友曰盍死乎瞫曰吾未獲死所其友曰吾與汝爲難瞫曰周志有之勇則害上不登於明堂杜預曰周志書也明堂祖庿也所以崇功序德故不義之士不得外之死而不義非勇也共用之謂勇吾以勇求右無勇而黜之亦其所也謂上不我知黜而冝乃知我矣子姑待之及彭衙旣陳以其屬馳秦師死馬􅀳師從之大敗秦師君子謂狼瞫於是乎君子也又曰􅀳郄克及齊侯戰於鞍齊髙固入􅀳師磔石以投}
  - {type: page-break, offset: 26, content: '', id: KR3k0012_SBCK_433-2a}
  - {type: variant, offset: 26, length: 0, content: '', WYG: 大國難測也懼有伏焉吾視其轍亂望其旗靡故逐之又曰晉襄公縛秦囚使莱駒以戈斬之囚呼莱駒失戈狼瞫取戈以斬囚禽之以從公乘遂以}
  - {type: variant, offset: 26, length: 1, content: 為, krp: 大國難測也懼有伏焉吾視其轍亂望其旗靡故逐之又曰晉襄公縳秦囚使菜駒以戈斬之囚呼菜駒失戈狼瞫取戈以斬囚禽之以從公乗遂以爲右箕之役先軫黜之而立續簡伯狼瞫怒其友曰盍死乎瞫曰吾未獲死所其友曰吾與汝爲難瞫曰周志有之勇則害上不登於明堂杜預曰周志書也明堂祖庿也所以崇功序德故不義之士不得外之死而不義非勇也共用之謂勇吾以勇求右無勇而黜之亦其所也謂上不我知黜而冝乃知我矣子姑待之及彭衙旣陳以其屬馳秦師死馬晉師從之大敗秦師君子謂狼瞫於是乎君子也又曰晉郄克及齊侯戰於鞍齊髙固入晉師磔石以投}
  - {type: variant, offset: 27, length: 0, content: '', WYG: 右箕之役先軫黜之而立續簡伯狼瞫怒其友曰盍死乎瞫曰吾未獲死所其友曰吾與汝為難瞫曰周志有之勇則害上不登於明堂杜預曰周志書也明堂祖廟也所以策功序徳故不義之士不得升之死而不義非勇也共用之謂勇求右無勇而黜之亦其所也謂上不我知黜而宜乃知我矣子姑待之及彭衙既陳以其屬馳秦師死焉晉師從之大敗秦師君子謂狼瞫於是乎君子又曰晉郤克及齊侯戰於鞍齊髙固入晉師桀石以投}
  - {type: page-break, offset: 27, content: '', id: KR3k0012_WYG_433-3a, image: WYG0897/WYG0897-0013c.png}
  - {type: page-break, offset: 27, content: '', id: KR3k0012_WYG_433-3b, image: WYG0897/WYG0897-0013d.png}
  - {type: variant, offset: 28, length: 0, content: '', SBCK: 杜預曰磔也禽之而乗其車繫桑本焉以徇齊壘將至齊壘以桑樹繫車而走欲自異也曰欲勇者賈余餘勇賈買也言巳有餘勇欲賣之也又曰欒􅄹師曲沃之甲以晝入絳􅀄斐豹􅀠也著於丹書欒氏之力臣曰督戎國人懼之斐豹謂范宣子曰茍焚丹書我殺督戎宣子喜曰而殺之所不請於君焚丹書者有如日乃出豹而閉之督戎從之踰隱而待之督戎踰入豹自後擊而殺之又曰楚平王執伍奢無忌曰奢之子材􅀂在吴必憂楚國盍以免其}
  - {type: page-break, offset: 28, content: '', id: KR3k0012_SBCK_433-2b}
  - {type: variant, offset: 28, length: 0, content: '', WYG: 杜預曰桀擔也禽之而乘其車繫桑本焉以狥齊壘将至齊壘以桑樹繫車而走以自異也曰欲勇者賈予餘勇賈買也言已有餘勇欲賣之也又曰欒盈帥曲沃之甲以晝入絳初斐豹𨽻也著於丹書欒氏之力臣曰督戎國人懼之斐豹謂范宣子曰苟焚丹書我殺督戎宣子喜曰而殺之所不請於君焚丹書者有如日乃出豹而閉之督戎從之踰隐而待之督戎踰入豹自後擊而殺之又曰楚平王執伍奢無極曰奢之子材若在呉必憂楚國盍以免其}
  - {type: page-break, offset: 28, content: '', id: KR3k0012_WYG_433-4a, image: WYG0897/WYG0897-0014a.png}
  - {type: variant, offset: 28, length: 0, content: '', krp: 杜預曰磔也禽之而乗其車繫桑本焉以徇齊壘將至齊壘以桑樹繫車而走欲自異也曰欲勇者賈余餘勇賈買也言巳有餘勇欲賣之也又曰欒盈師曲沃之甲以晝入絳𥘉斐豹隷也著於丹書欒氏之力臣曰督戎國人懼之斐豹謂范宣子曰茍焚丹書我殺督戎宣子喜曰而殺之所不請於君焚丹書者有如日乃出豹而閉之督戎從之踰隱而待之督戎踰入豹自後擊而殺之又曰楚平王執伍奢無忌曰奢之子材若在吴必憂楚國盍以免其}
