  - {type: variant, offset: 1499, length: 227, content: 孫為小吏來歸謁萬石君必朝服見之魏略曰常林少單貧帶經耕鋤其妻自擔餉餽之林雖在田野其相敬過於賓客吳書曰顧悌字子通待妻子有禮常夜入晨出希見其面常疾篤妻出看之悌命左右自扶起冠幘王隱晉書曰庾袞執事有恪與弟子治藩跪而受條其人曰今在隱屏先生胡不踞袞乃揖而延之正席而坐告之曰何以幽顯易其操者乎樊英別傳曰英嘗病臥便室中英妻遣婢拜問英荅拜或問之英曰妻齊也說苑曰魯有恭士名曰机泥行年七十其恭甚益冬日行陰夏日行陽一食之間三起見衣裘褐之士則為之禮魯君問曰机子年甚長矣不可釋恭乎泥對, SBCK: ''}
