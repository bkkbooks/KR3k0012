  - {type: variant, offset: 1755, length: 0, content: '', SBCK: 范雎􅀃秦昭王夫以烏獲任鄙之力荆成孟賁許慎曰荆成古勇士孟賁衛人也慶忌夏育之勇焉而死死者人之所必不免也又曰廉頗者}
  - {type: variant, offset: 1755, length: 0, content: '', WYG: 范睢說秦昭王夫以烏獲任鄙之力荆成孟賁許慎曰荆成古勇士孟賁衞人也慶忌夏育之勇焉而死死者人之所必不免也又曰亷頗者}
  - {type: variant, offset: 1755, length: 0, content: '', krp: 范雎說秦昭王夫以烏獲任鄙之力荆成孟賁許慎曰荆成古勇士孟賁衛人也慶忌夏育之勇焉而死死者人之所必不免也又曰廉頗者}
  - {type: variant, offset: 1756, length: 1, content: 簡, SBCK: 之良將也趙惠文王十六年廉頗爲趙將伐齊大破之取􅀳陽拜爲上卿以勇氣聞於諸侯又曰藺相如者趙人也爲趙官者令繆賢舎人趙惠文王時得楚和氏璧秦昭王願以十五城請易璧令曰臣客舎人藺相如其人勇士有智謀冝可使乃使相如奉璧入秦秦王坐章臺得璧大喜傳璧以示美人及左右左右皆呼萬歳相如視秦王無意償趙城乃前曰璧有瑕請指示王王授璧中立􅀝柱怒髮上衝冠謂秦王曰趙王齋戒五日使臣奉璧拜送書於廷何者嚴大國之威以脩敬也今臣至大王見臣列觀禮節甚倨得璧傳􅃧無償趙王城邑故臣復取璧大王必欲急臣臣頭今與璧俱碎於柱矣持璧睨柱欲以擊柱秦王恐其破璧乃辭謝固請召有司案圖十五城與趙相如見其詐乃謂曰趙王送璧時齋五日大王亦冝齋五日乃敢上璧秦王許相如就舎使其從者衣􅄄褁璧亡歸趙秦王齋竟引相如相如曰自秦繆公以來二十餘君未有堅盟約者臣恐見欺􅀒趙故令人持璧歸間至趙矣王􅀂割十五都與趙趙豈敢留璧得罪於大王臣知欺大王當誅請就湯鑊秦遂厚遇之旣歸趙王以爲賢大夫使不辱於諸侯拜爲上大夫秦亦不以城與趙趙亦不與秦璧後秦王㑹澠池秦王飲酒酣曰寡人竊聞趙王好音請奏瑟趙王鼔瑟秦御史前書曰某年某月秦王與趙王㑹飲令趙王鼔瑟相如前曰趙王竊聞秦王善爲秦聲請奏􅇲以相娱樂秦王怒不許於是相如前進􅇲因跪請之秦王不肯擊􅇲相如曰五歩之内臣請以頸血濺大王矣左右欲刄相如相如張目叱之左右皆靡秦王不懌爲一擊􅇲相如顧召趙御史書曰某年某月秦王爲趙王擊􅇲秦之群臣曰請以趙十五城爲秦王壽相如亦曰請以秦之咸陽爲趙王壽趙亦盛設兵待秦秦不敢動旣罷歸國以相如功大拜爲上卿位在廉頗右又曰曹沫者魯人也以勇力事魯莊公齊桓公與魯莊公㑹于柯而盟桓公與莊公旣盟於壇上曹沬執匕首刧齊桓公桓公左右莫敢動問曰}
