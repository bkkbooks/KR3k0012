  - {type: variant, offset: 2695, length: 1470, content: 為侍中謝承後漢書曰應奉讀書五行並下九州春秋曰夏侯淵為劉備所殺於陽平曹公自長安出斜谷至陽平備拒險守峽王欲還出令曰雞肋官屬不知所謂楊脩便曰夫雞肋棄之可惜食之無所得以比漢中王欲還也引還吳志曰顧譚每省簿書未嘗下籌徒屈指心計盡發疑謬後魏書曰祖瑩字元珍十二為中書學生博士張天龍講尚書選為都講生徒悉集瑩夜讀書勞倦不覺天曉催講既切遂誤持曲禮卷上座博士嚴毅不敢復還仍置禮於前誦尚書三篇不遺一字沈約宋書曰劉穆之內總朝政外供軍旅決斷如流事無壅滯目覽辭訟手荅牋書耳行聽受口並酬應不相參涉益部耆舊傳曰何祗補成都令使人投筭祇聽其讀而心計不差升合其精如此費禕別傳曰于時戰國多事眾務煩猥禕識寤過人每續書記粗舉目蹔視已充其數接納賓客飲食嬉戲加之博弈每盡人之歡事不廢也董允代禕為尚書令欲則禕之所行旬日之中事多紆滯允為歎曰才力相懸若此之遠說苑曰昔鄒忌為齊相稷下先生淳于髡之屬七十二人皆輕鄒忌為設妙辭淳于三稱鄒忌三知之如應響淳于等辭詘而去故所以尚干將莫耶者貴於立斷也所以尚騏驥為立至也是以聰明敏捷欲人之入也世說曰魏武嘗過曹娥碑下楊脩從碑背上題曰黃絹幼婦外孫齏臼魏武謂脩卿解不荅曰解魏武帝曰卿未可言待我思之行三十里乃曰已得令脩別記所知脩曰黃絹色絲也於字為絕幼婦少女也於字為妙外孫女子也於字為好齏臼受辛也於字為辤所謂絕妙好辤帝亦記之與脩同乃歎曰不如卿三十里世說曰人餉食魏武帝一杯酪魏武噉少許蓋頭題上為合字以示眾眾莫之解次至楊脩脩便啖曰公教人一口何疑強記禮記曲禮曰博聞強識謂之君子漢書曰上行幸河東嘗亡書一篋張安世憶記之後得書以相校無所遺失安世長子千秋為中郎將將兵隨渡遼將軍范朋友擊烏桓還謁大將軍光光問千秋戰鬭方略山川形勢千秋口對兵事畫地成圖無所忘失東觀漢記曰虞延字君大為郡督郵光武東巡路由小黃高帝母昭靈后園陵在焉詔呼延引見問園陵之事延占對可觀其陵株梓皆識其數俎豆犧牲頗曉其禮謝承後漢書曰應奉常從彭城相袁賀時出行閉治車師門內出半面視奉奉即委去別後數十年於道路見車師識而呼之又曰吳郡陸續初仕郡戶曹史飢荒太守君興使續於都亭賦民饘粥續悉簡閱其人訊以名氏事畢興問所幾因說六百餘人皆分別姓字無有誤謬又曰王充字仲任上虞人家貧無書常遊洛陽肆閱所賣書輒能誦憶袁山松後漢書曰荀淑與陳寔神交及其棄朗陵而歸也數命駕詣之淑御慈明從叔慈抱孫文若而行寔亦令元方侍側季方作食抱孫長文而坐相對怡然嘗一朝求食季方尚少跪曰高聞大人荀君言甚善竊聽之甑壞飯成糜寔曰汝聽談解乎諶曰唯因令與二慈說之不失一辭二公大悅典略曰延篤字叔堅南陽犨人初從堂磎季度受春秋左傳借本便諷魏志曰初王粲與人共行讀道邊碑人問卿能誦否曰能即暗誦之不差一字觀人棊局壞粲為復之碁者不信以帊蓋局使更以他局為之用相比校不誤一道其強記嘿識如此吳志曰朱桓強識與人一面數十年不忘部曲妻子悉識之晉中興書曰陶侃明識過人武昌道上種楊柳人有竊之殖于其家侃見而識之問何以盜官所殖乎時以為神益部耆舊傳曰張松識達精異劉璋遣曹公楊脩以公所撰兵書示松飲讌之間一省即便闇誦禰衡別傳曰衡字正平黃射作章陵太守衡俱有所之見蔡伯喈所為碑正平一過視之歎之言好後各歸章陵自恨不令使寫之正平曰吾雖一過皆識其所言唯第四行中石盡磨滅兩字不分明因援筆書之初無遺失唯兩字不著蔡琰別傳曰琰字文姬邕之女年六歲邕鼓琴弦絕琰曰第一絃邕故斷其一絃問之琰曰第二絃邕故斷一絃琰曰第四絃世說曰夏侯策魏文示其爵里剌一見之悉憶俗說曰桓宣城喪後家至貧孔夫人疾患須羊解神不能得桓溫以弟買得質羊羊主家富謂桓言僕乃不須買得郎為質但郎家貧幸可為郎養買得郎耳車騎冲也後江州出射堂射羊主東邊看射車騎猶識之呼來問公識我否荅云不識桓公曰我是昔日買得郎也, SBCK: ''}
