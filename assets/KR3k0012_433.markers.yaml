  - {type: variant, offset: 47, length: 5, content: 笞禮記學記, SBCK: 避勇也父不可棄名不可廢爾其勉之相從爲愈伍尚歸奢聞貟不來曰楚君大夫其旰食乎楚人皆殺之又曰􅀳趙鞅圍衞報夷儀也􅀄衛侯伐邯鄲午於寒氏城其西北隅而守之霄􅑒及􅀳圍衛午以從七十人門於衛西門殺人於門中曰請報寒氏之役渉他}
