  - {type: variant, offset: 1740, length: 1, content: 除, SBCK: 蒲叛衛而止孔子弟子有公良孺者爲人賢良有勇力挺劔而合衆將與之戰蒲人懼曰苟無適衛吾則出子乃盟孔子出之又曰孔子北遊登乎農山子路子貢顔回侍側孔子四望喟然而歎曰於斯致思無所不至矣二三子各言爾志吾將擇焉子路進曰由願得白羽􅀂月赤羽􅀂日鍾鼓之音上震于天旌旗􅌭紛下蟠于地由也當一隊而敵之必也攘地千里搴旗執馘唯由能之使二子者從我焉夫子曰勇哉史記曰毛遂隨平原君與楚合從言}
  - {type: variant, offset: 1740, length: 1, content: 除, WYG: 蒲叛衞而止孔子弟子有公良儒者為人賢良有勇力挺劒而合衆将與之戰蒲人懼曰苟無􅆘衛吾則出子乃盟孔子出之又曰孔子北遊登乎農山子路子貢顔囘侍側孔子四望喟然而歎曰於斯致思無所不至矣二三子各言爾志吾將擇焉子路進曰由願得白羽若月赤羽若日鐘鼓之音上震於天旌旗繽紛下蟠於地由也當一隊而敵之必也攘地千里搴旗執馘唯由能之使二子者從我焉夫子曰勇哉史記曰毛遂隨平原君與楚合從言}
