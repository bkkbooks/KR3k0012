  - {type: variant, offset: 2039, length: 335, content: 子家號曰智囊又曰項王謂漢王曰天下匈匈數歲者徒以吾兩人耳願與漢王挑戰決雄雌漢王笑謂曰吾寧鬭智不鬭力漢書曰陳嬰者東陽令史也少年殺其令相藂邑中從之者得二萬人欲立嬰為王嬰母謂曰吾為乃家婦聞先故未曾貴今暴得大名不祥不如有屬成猶得封侯事敗易以亡亡為世所指名也嬰乃不敢為王范曄後漢書曰魯恭祖父匡王莽時羲和有權數號曰智囊干寶晉紀曰桓範出赴曹爽宣王謂蔣濟曰智囊往矣晉中興書曰王允之字淵猷年在總角從伯敦深智之嘗夜飲允之辭醉先眠時敦將謀作逆因允之醉別床臥夜中與錢鳳計議允之已醒悉聞其語恐或疑便於眠處大吐衣面並污鳳既出敦果照視見其眠吐中以為大醉不復疑之華陽國志曰任文孫字文公閬中人初武檐山石折文公曰噫西方智士死吾其應之遂卒益部為之諺曰任文公智無雙文子曰神者智之淵也神清則智明智者心之府也智公則心, SBCK: ''}
