  - {type: variant, offset: 20, length: 1, content: 韓, SBCK: 見敵踴躍欲擊之也􅀃文曰勇氣也從力用聲尚書曰武王左杖黃􅃏右秉白旄以麾曰逖矣西􅁟之人稱爾戈比爾于立爾矛予其誓朂哉夫子尚桓桓孔安國曰桓桓武皃也如虎如􅆛如熊如羆于啇郊又曰亦有熊羆之士弗二心之臣保乂王家言文武旣聖則亦有勇猛如熊也羆之士毛}
  - {type: variant, offset: 20, length: 1, content: 韓, WYG: 如虎如􅆛如熊如羆于商郊又曰亦有熊羆之士弗二心之臣保乂王家言文武既聖則亦有勇猛如熊羆之士毛}
  - {type: variant, offset: 20, length: 1, content: 韓, krp: 如虎如貔如熊如羆于啇郊又曰亦有熊羆之士弗二心之臣保乂王家言文武旣聖則亦有勇猛如熊也羆之士毛}
  - {type: variant, offset: 22, length: 1, content: 外, SBCK: 曰大叔于田刺莊公也叔多才而好勇不義而得衆大叔于田乗乗馬執轡如組兩􅆖如舞叔在藪火烈具舉􅃝禓􅁀虎獻于公所將叔無狃戒其傷女禮記曰魯莊公及宋人戰于乗丘縣賁父御卜國爲右馬驚敗績公墜左車授綏公曰末之卜也縣賁父曰他日不敗績而今敗績是無勇也遂死之又曰用人之智去其詐用人之勇去其怒用人之仁去其貪鄭玄曰用智者之謀勇者之断仁者之施足以成治矣又曰啇者五帝之遺聲也啇人識之故謂之啇齊者三代之遺聲也齊人識之故謂之齊明乎啇之音者臨事而屢斷明乎齊之音者見利而讓臨事屢斷勇也見利而讓義也有勇者義非歌孰能保此左}
  - {type: page-break, offset: 22, content: '', id: KR3k0012_SBCK_433-1b}
  - {type: variant, offset: 22, length: 1, content: 外, WYG: 曰大叔于田刺荘公也叔多才而好勇不義而得衆大叔于田乘乘馬執轡如組兩􅆖如舞叔在藪火烈具舉袒裼暴虎獻于公所將叔無狃戒其傷女禮記曰魯荘公及宋人戰于乘丘縣賁父御卜國為右馬驚敗績公墜佐車授綏公曰未之卜也懸賁父曰他日不敗績而今敗績是無勇也遂死之又曰用人之智去其詐用人之勇去其怒用人之仁去其貪鄭𤣥曰用智者之謀勇者之斷仁者之施是以成治矣又曰商者五帝之遺聲也商人識之故謂之商齊者三代之遺聲也齊人識之故謂之齊明乎商之音者臨事而屢斷明乎齊之音者見利而讓臨事屢斷勇也見利而讓義也有勇有義非歌孰能保此左}
  - {type: page-break, offset: 22, content: '', id: KR3k0012_WYG_433-2a, image: WYG0897/WYG0897-0013a.png}
