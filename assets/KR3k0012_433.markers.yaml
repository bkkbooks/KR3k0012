  - {type: variant, offset: 1750, length: 3, content: 釋恭為, SBCK: 且遂聞湯以七十里之地王天下文王以百里之壤而臣諸侯今楚地方五千里持㦸百萬此霸王之資也白起小竪子耳率數萬之衆興師以與楚戰一戰舉鄢郢再戰而燒夷陵三戰而辱王之先人此百世之怨而趙之所羞而王弗知惡合從者爲楚非爲趙也吾君在前叱者何也楚王曰先生之言是也遂定從而還}
