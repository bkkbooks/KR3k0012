  - {type: variant, offset: 2512, length: 0, content: '', WYG: 有道之士求賢主無不行也相得然後樂不謀而親不約而信之相為殫智竭力犯危行苦志懽樂之此功名所以大成也又曰伯里奚之未遇時亡虢而虜飯牛於秦鬻以五羊之皮公孫枝得而悦之獻諸繆公三日請屬事焉繆公曰買之五羊之皮而屬事無乃為}
