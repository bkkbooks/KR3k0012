  - {type: variant, offset: 3170, length: 249, content: 無為急謂成功似遟而速待時也又曰聖人南面而立以愛利民為心號令未出而天下皆延頸舉踵矣則精通乎民矣家語曰所謂聖者德合天地覩者不識其鄰又曰聖人能以天下為一家以中國為一人者非意之所為也必知其利達於其患然後乃為之又曰孔子在衛冉求言於季孫曰國有聖人而不能用欲以求治是猶卻步而欲求及前人也神異經曰西南大荒中有人身長一丈腹九尺踐龜虵戴朱鳥左手馮青龍右手馮白虎知河海斗斛識山石多少知天下鳥獸言語識士人所道知百穀可食識草木鹽苦名曰聖俗曰聖人一名哲俗曰睿哲一名先俗曰知先一名通俗曰通達一名無不達凡人見拜令人神智此人天下神聖, SBCK: 紹介}
