  - {type: variant, offset: 2647, length: 0, content: '', SBCK: 朝乎成王見周公三見而三笞其􅀃何也啇子曰二子蓋相與觀南山之陽有木焉名曰橋二子者往觀乎南山之陽見橋竦然實髙而仰反以告啇子啇子曰仰者父道也啇子曰二子蓋相與觀乎南山之隂有木焉名曰梓二子者往觀乎南山之隂見梓勃焉實而俯反以告啇子啇子曰俯者子道也二子者明日見乎周公入門而趍登堂而跪周公拂其首勞而食之曰安見君子二子對曰見啇子周公曰君子哉啇子}
