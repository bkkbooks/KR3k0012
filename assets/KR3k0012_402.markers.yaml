  - {type: variant, offset: 2583, length: 0, content: '', SBCK: 晉平公問叔向曰吾群臣孰賢對曰趙武賢武之立如不勝衣言如不岀口然其所舉士者數十人皆令得其意而公家甚頼之况武子之生也不利其家死不託其􅀌臣敢以爲賢孟子曰國君進賢如不得巳將使卑踰尊踈踰戚可不慎歟左右皆曰賢未可也諸大夫皆曰賢未可也國人皆曰賢然後察之見賢焉然後用之吕氏春秋曰}
  - {type: variant, offset: 2583, length: 10, content: 伊尹為宰百里奚為虜此, WYG: ''}
  - {type: variant, offset: 2583, length: 0, content: '', krp: 晉平公問叔向曰吾群臣孰賢對曰趙武賢武之立如不勝衣言如不岀口然其所舉士者數十人皆令得其意而公家甚頼之况武子之生也不利其家死不託其孤臣敢以爲賢孟子曰國君進賢如不得巳將使卑踰尊踈踰戚可不慎歟左右皆曰賢未可也諸大夫皆曰賢未可也國人皆曰賢然後察之見賢焉然後用之吕氏春秋曰}
  - {type: variant, offset: 2585, length: 0, content: '', SBCK: 出空桑之中長而賢湯聞伊尹使人請之有侁氏有侁氏不可伊尹亦欲歸湯湯於是請取妻於有侁氏有侁氏喜使伊尹爲媵送女故賢主之求有道之士無不以也有道之士求賢主無不行也相得然後樂不謀而親不約而信相}
  - {type: variant, offset: 2585, length: 0, content: '', krp: 出空桑之中長而賢湯聞伊尹使人請之有侁氏有侁氏不可伊尹亦欲歸湯湯於是請取妻於有侁氏有侁氏喜使伊尹爲媵送女故賢主之求有道之士無不以也有道之士求賢主無不行也相得然後樂不謀而親不約而信相}
