  - {type: variant, offset: 132, length: 498, content: 襄公三年曰臧武仲如晉雨過御叔在邑將飲酒御叔魯御邑大夫曰焉用聖人武仲多智時人謂之聖我將飲酒而已雨行何以聖為又昭公二曰季武子問於申豊曰雹可禦乎對曰聖人在上無雹雖有不為災又曰書曰聖作則逸書則法也又曰臧孫紇有言曰聖人有明德者若不當世其後必有達人今其將在孔丘乎又哀公下曰聖人不煩卜筮惠王其有焉不疑故不卜也禮記樂記曰作者之謂聖述者之謂明明聖者述作之謂也又坊記曰聖人之制富貴也使民富不足以驕貧不至於約貴不慊於上故亂益亡又中庸曰夫婦之愚可以與知焉及其至也雖聖人亦有所不知焉夫婦之不肖可以能行焉及其至也雖聖人亦有所不能焉又曰舜其大孝也與德為聖人尊為天子富有四海之內宗廟饗之子孫保之又曰誠者天之道也誠之者人之道也誠者不勉而中不思而得從容中道聖人也又曰大哉聖人之道洋洋乎發育萬物峻極于天毛詩狼跋美周公也周公攝政遠則四國流言近則王不知周大夫美其不失其聖也不失其聖者聞流言不惑王不知不怨終立其志成周之道致太平復成王之位又節南山巧言曰秩秩大猷聖人莫之周易乾卦曰雲從龍風從虎聖人作而萬物覩又曰其惟聖人乎知進退存亡而不失其正者其唯聖人乎又蒙卦曰蒙以養正聖功也又豫卦曰聖人以順動則刑罰清而民服又觀卦曰聖人以神道設教而天下服矣又咸卦, SBCK: 頥}
