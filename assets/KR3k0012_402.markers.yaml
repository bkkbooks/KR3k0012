  - {type: variant, offset: 3999, length: 185, content: 當故不求有所示而物自親之姚信士緯曰聖人高不可極深不可測窮神知化獨見先識仁若春陽信若影響此所稟於天也又曰神州何以專生聖人聖人曾不產於絕域乎推此論之明神州者處乾坤之正鍾日月之精地形爽塏源流清暢其生民也長短應數儀狀端正音聲得節性理調良圖墓書曰青鳥乃默皆聖人也記人生死所由琴操曰孔子使顏淵執轡到匡郭外顏淵舉策指匡穿垣曰往與陽虎正從此入匡人聞其言孔子既似陽虎告匡君曰往者陽虎今復來, SBCK: ''}
