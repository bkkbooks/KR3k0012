  - {type: variant, offset: 2974, length: 195, content: 又曰聖人若鏡不將不迎又曰文王知而好問故聖又曰孔子無黔突墨子無暖席是故聖人蒙恥辱以干世主者非貪祿慕位欲事天下之利除萬民之害也神農憔悴堯瘦臞其俱切舜微黑禹胼胝由此觀之憂勞百姓亦甚矣又曰古者聖人勞形盡慮為民興利除害焦天下之憂而平海內之事聖人之憂民也如此其明矣河圖曰黃帝曰凡人生一日天帝賜筭三萬六千又賜紀二千聖人得三萬六千七百二十凡人得三萬六千一紀主一歲聖人加七百二十呂氏春秋曰聖人之於事似緩而急緩, SBCK: 中間}
