  - {type: variant, offset: 1372, length: 223, content: 國則日月不食星辰不孛尚書考靈曜曰五百載聖紀符五百法天地之數也王命長故以為五百載也符圖書也又曰四千五百六十歲精及天數握命人起河出圖聖受思鄭玄注曰聖謂堯也天握命人當起者河乃出圖堯受而思之以受曆數也尚書大傳曰聖人在位其君子不誦無用之言其工不作無用之器其商不通無用之物又曰聖人者民之父母也母能生之能食之父能教之能誨之聖王曲備之者也能生之能食之能教之能誨之也為之城郭以居之為之宮室以處之為庠序之學以教誨之為之列地制畝以飲食之故書曰作民父母以為天下王此之謂也, WYG: ''}
