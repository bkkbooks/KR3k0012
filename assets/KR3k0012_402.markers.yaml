  - {type: variant, offset: 1856, length: 1, content: 聖, SBCK: 其閨門之内無別而子次之賢何也孔子對曰臣論其朝廷行事不論其私家之際也公曰其事何也孔子曰靈公之弟曰公子渠牟其智足以治千乗其信足以守之靈公愛而任之又有士曰王林者見賢必進之而退與分其禄是以衛國無遊放之才靈公知而尊之又有士曰慶足者國有大事則必起而治之國無事則退容賢言其所以退欲以容賢於朝靈公恱而敬之又有大夫史鰌以道去衛靈公郊舎三日琴瑟不御必待史鰌之入而後敢入臣以此取之難次之賢不亦可乎孔叢子曰魯人有公儀潜者厲節行道恬於榮利不事諸侯子思之與友穆公因子思欲以爲相謂子思曰公儀子必輔寡人寡人三分魯之一子思對曰如君之言則公儀愈所不至也若飢渇待賢納用其言儀雖􅂼食飲水亦願在下風今徒以髙官厚禄釣餌君子無信}
