  - {type: variant, offset: 2503, length: 4, content: 聖人聖人, SBCK: 之賢尹文子曰尹文子見齊宣王王歎國寡賢尹文子曰使國悉賢孰處王下王曰國悉不肖可乎尹文子曰國悉不肖孰理王朝王曰賢與不肖皆無可乎尹文子曰不然有不肖故王尊於上臣卑於下進賢退不肖所以有上下也王孫子曰趙簡子獵於晉山之陽撫轡而歎董安于曰敢問何歎子曰吾有食榖之馬數千多力之士數百欲以獵獸也吾恐隣國養賢以獵吾也文子曰虎豹之駒未成而有食牛之氣鴻鵠之翼未合而有四海之心賢}
  - {type: variant, offset: 2503, length: 1, content: 聖, WYG: 之賢尹文子曰尹文子見齊宣王王歎國寡賢尹文子曰使國悉賢孰處王下王曰國悉不肖可乎尹文子曰國悉不肖孰理王朝王曰賢與不肖皆無可乎尹文子曰不然有不肖故王尊於上臣卑於下進賢退不肖所以有上也王孫子曰趙簡子獵於晉山之陽撫轡而歎董安于曰敢問歎子曰吾食榖之馬數千多力之士數百以獵獸也恐鄰國養賢以獵吾也文子曰虎豹之駒未成而有食牛之氣鴻鵠之翼未合而有四海之志賢亦然也又曰國之所以不治者三不知用賢此其一也或求賢不能得此其二也雖得弗能盡此其三也申子曰千里有賢者是比肩而立韓子曰晉平公問叔向曰吾羣臣孰賢對曰武賢武之立如不勝衣言如不出口然其所舉士者數十}
