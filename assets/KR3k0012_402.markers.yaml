  - {type: variant, offset: 2598, length: 0, content: '', SBCK: 居髙處上則以仁義爲巢乗危履傾則以聖賢爲杖􅀃苑曰周公卜居曲阜命􅀛曰作邑于山之陽賢則茂昌不賢則速亡又曰夫朝無賢人猶鴻鵠之無羽翼是故絶江海者託於舡致逺道者託於乗欲覇王者託於賢又曰明君在上慎於擇士務於求賢設四佐以自輔有英俊以治官又曰伯禽與康叔封朝成王見周公三見而三笞康叔駭色謂伯禽曰有啇子者賢人}
