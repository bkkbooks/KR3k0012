  - {type: variant, offset: 1600, length: 0, content: '', SBCK: 魏文侯問狐卷子曰父賢足恃乎對曰不足子賢足恃乎對曰不足兄賢足恃乎對曰不足弟賢足恃乎對曰不足臣賢足恃乎對曰不足文侯勃然作色而怒曰寡人問此五者於子子一以爲不足者何也對曰父賢不過堯而丹朱放子賢不過}
