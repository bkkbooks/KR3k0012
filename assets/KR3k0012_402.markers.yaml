  - {type: variant, offset: 1632, length: 0, content: '', SBCK: 子之魯慎無以國驕人又曰楚昭王聘夫子夫子徃焉路岀東蔡大夫謀曰夫子賢者所刺譏皆中諸侯之病􅀂用於楚則陳蔡危矣遂使兵拒之孔子不得行家語曰孔子謂宓子賤曰子治單父衆恱何施而得之對曰此地民有賢於不齊者不齊事之事而禀度焉皆教不齊以治道孔子歎曰昔堯舜聽天下務求賢以自輔夫賢人百福之宗神明之主}
