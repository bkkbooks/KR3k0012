  - {type: variant, offset: 2521, length: 3, content: 天下無, SBCK: 國之所以不治者三不知用賢此其一也或求賢不能得此其}
  - {type: variant, offset: 2521, length: 0, content: '', WYG: 得十良馬不如得一伯樂得寸良劍不如得一歐冶得地千里不如得一賢人又曰魏文侯過段干木之閭而軾其僕曰君胡為軾曰此非段干木之閭歟干木盖賢者也吾安敢不軾又曰趙簡子將襲衛使史墨行瞶之瞶視也音貴期以一月六月而反趙簡子曰何其久也對曰謀利而得害猶弗察也今蘧伯玉為相史鰌佐焉孔子為客子貢使令於君前甚聽君聽其言易曰渙其羣元吉渙者賢也羣者衆也元者吉之始也渙其羣元吉其佐多賢簡子案兵不動周書隂符曰凡治國有三常一曰君以舉賢為常二曰官以任賢為常三曰士以敬賢為常夫然雖百代可知也京房易飛候曰何以知賢人隠師曰視四方有大雲五色具而不雨下賢人隠也易叅同契曰}
