  - {type: variant, offset: 742, length: 408, content: 志唯幾也故能成天下之務唯神也故不疾而速不行而至子曰易有聖人之道四焉者此之謂也又曰備物致用立成器以為天下利莫大乎聖人是故天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圖洛出書聖人則之易有四象所以示也又曰天地之大德曰生聖人之大寶曰位又曰上古穴居而野處後世聖人易之以宮室上棟下宇以待風雨蓋取諸大壯上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬又曰昔者聖人之作易也將以順性命之理是以立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義尚書伊訓曰敢有侮聖言逆忠直時謂亂風狎侮聖人之言而不行拒逆忠直之規而不納又說命曰股肱惟人良臣惟聖手足具乃成人有良臣乃成聖又洪範曰叡作聖於事無不通謂之聖又曰聖時風若君能通理則時風順之又多方曰惟聖罔念作狂惟狂克念作聖惟聖人無念於善則為狂人惟狂人能念於善則為聖人又君陳曰凡人未見聖若不克見既見聖亦不克由聖論語雍也曰子貢曰如有博施於民而能濟眾何如可謂仁乎子曰何事於仁必也聖乎堯舜其猶病諸, SBCK: ''}
