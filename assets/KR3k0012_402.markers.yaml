  - {type: variant, offset: 2716, length: 252, content: 曰懸子問子思曰吾聞同聲者相求同志者相好子之先君見子產則兄事而世謂子產仁愛稱夫子聖人是謂聖通事仁愛乎未喻其人之孰先也子思曰昔季孫問言游亦若子之言也子游荅曰以子產之仁愛譬夫子其猶浸水之與膏雨康子曰子產死鄭大夫捨玦珮婦女捨珠瑱巷哭三月琴瑟不作夫子之死吾未之聞魯人之若是也子游曰夫浸水所及也則生所不及則死民皆知焉膏雨之所生也廣莫大焉民之受賜也普矣莫識其由來者也淮南子曰聖人不貴尺壁而重寸陰時難得而易失故聖人守清道而抱雌節清和靜也雌柔弱也又曰聖人之道猶中衢樽耶過者斟酌多少各得所宜又曰唯聖人為能知權言而必信期而必當, SBCK: ''}
