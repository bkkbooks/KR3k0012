  - {type: variant, offset: 1656, length: 0, content: '', SBCK: 顔回之爲人奚若子曰回之信賢於丘曰子貢之爲人奚若子曰賜之敏賢於丘曰子路之爲人奚若子曰由之勇賢於丘曰子張之爲人奚􅀂子曰師之莊賢於丘子夏避席而問曰然則四子耆何爲事}
