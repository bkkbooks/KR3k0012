  - {type: variant, offset: 1616, length: 0, content: '', krp: 子智伯也智果曰不如霄也智果荀氏之族也霄宣子庶子也宣子曰霄也佷佷戾不從}
  - {type: punctuation, offset: 1618, content: 。, id: KR3k0012_CHANT_402-bkkpn550}
  - {type: 'tls:seg', offset: 1618, content: '', id: KR3k0012_CHANT_402-27a.7}
  - {type: variant, offset: 1618, length: 0, content: '', SBCK: 對曰霄之佷在面瑶之佷在心心佷敗國面佷不害瑶之賢於人者有五其不逮者一美鬢長大則賢􅁂髪􅁂也射御足力則賢􅇊藝必給則賢巧文辯惠則賢強毅果敢則賢􅀂是而甚不仁以其五賢陵人而以不仁行之其誰能待之􅀂果立瑶也智宗必㓕弗聽智果别族于太史爲輔氏太史掌氏姓也及智氏之亡也唯輔果在又曰臼季使舎於兾野臼季胥臣兾野晉地見兾缺耨其妻饁之相敬如賔耨耘田也野饋日饁字音曄從而問之兾芮之子也與之歸旣復命進之曰臣得賢敢以告文公曰子何以知其賢對曰臣見其賢不忘敬也公使爲下軍大夫史記曰燕昭王於破燕之後即位卑身厚幣以招賢者謂郭隗曰齊因􅀌之國亂襲破燕􅀌極知燕小力少不足以報然得賢士與共國以雪先王之耻􅀌之願也先生視可者得身事之郭隗曰王必欲致士必從隗始况賢於隗者豈逺千里哉於是昭王爲隗改築宫而師事之又曰伯禽就封於魯周公戒伯禽曰我}
  - {type: page-break, offset: 1618, content: '', id: KR3k0012_SBCK_402-3a}
  - {type: variant, offset: 1618, length: 0, content: '', WYG: 對曰霄之很在靣瑶之很在心心很敗國面很不害瑶之賢於人者有五其不逮者一美鬢長大則賢鬢髪鬢也射御足力則賢伎藝必畢給則賢巧文辯惠則賢強毅果敢則賢若是而甚不仁夫以其五賢陵人而以不仁行之其誰能待之若果立瑶也智宗必㓕弗聽智果别族于太史為輔氏太史掌氏姓也及智氏之亡也唯輔果在又曰臼季使舎於冀野臼季胥臣冀野晉地見冀缺耨其妻饁之相敬如賓耨耘田也野鐼曰饁字音時從而問之冀芮之子也與之歸既復命進之曰臣得賢敢以告文公曰子何以知其賢對曰臣見其賢不忘敬也公使為下軍大夫史記曰燕昭王於破燕之後即位卑身厚幣以招賢者謂郭隗曰齊因孤之國亂而襲破燕孤極知燕少不足以報然得賢士與共國以雪先王之恥孤之願也先生視可者得身事之郭隗曰王必欲致士必從隗始况賢於隗者豈逺千里哉於是昭王為隗改築宫而師事之又曰伯禽就封於魯周公戒伯禽曰我}
