  - {type: variant, offset: 2515, length: 3, content: 道管此, WYG: 君之明也讓賢而下之臣之忠也君為明君臣為忠臣彼為信賢境内將服敵國且畏夫誰暇笑哉遂用之謀無不當舉必有功號曰五羖大夫又曰史台謂申向曰吾所患者不知賢申向曰人之患不在乎不言用賢而在乎不誠用賢夫言用賢者口也却賢者行也言行相反而欲賢者用不肖者廢不亦難乎人主誠用賢則境内賢者出矣天下賢者至}
