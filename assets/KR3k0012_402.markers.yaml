  - {type: variant, offset: 2529, length: 0, content: '', WYG: 賢人猶鴻鵠之無羽翼是故絶江海者託於船致遠道者託於乗欲霸王者託於賢又曰明君在上慎於擇士務於求賢設四佐以自輔有英俊以治官又曰伯禽與康叔朝成王見周公三見而三笞康叔有駭色謂伯禽曰有商子者賢人也與子往見之康叔與伯禽見商子曰吾}
