  - {type: variant, offset: 2592, length: 0, content: '', SBCK: 飯牛於􅁗鬻以五羊之皮公孫枝得而恱之献諸繆公三日請屬事公曰賈之五羊之皮而屬事無乃爲天下􅀏乎枝曰信賢而任之君之明也議賢而下之臣之忠也君爲明君臣爲忠臣彼爲信賢境内將服敵國且畏夫誰暇􅀏哉遂用之謀無不當舉必有功號曰五羖大夫又曰史台謂申向曰吾所患者不知賢申向曰人之患不在乎不言用賢而在乎不誠用賢夫言用賢者口也􅁍賢者行也言行相反而欲賢者用不肖者廢不亦難乎人主誠用賢則境内賢者岀矣天下賢者至矣又曰得十良馬不如得一伯樂得十良劒不如得一歐冶得地千里不如得一賢人又曰魏文侯過段干木之閭而軾其僕曰君胡爲軾曰}
  - {type: page-break, offset: 2592, content: '', id: KR3k0012_SBCK_402-7a}
  - {type: variant, offset: 2592, length: 0, content: '', krp: 飯牛於秦鬻以五羊之皮公孫枝得而恱之献諸繆公三日請屬事公曰賈之五羊之皮而屬事無乃爲天下笑乎枝曰信賢而任之君之明也議賢而下之臣之忠也君爲明君臣爲忠臣彼爲信賢境内將服敵國且畏夫誰暇笑哉遂用之謀無不當舉必有功號曰五羖大夫又曰史台謂申向曰吾所患者不知賢申向曰人之患不在乎不言用賢而在乎不誠用賢夫言用賢者口也却賢者行也言行相反而欲賢者用不肖者廢不亦難乎人主誠用賢則境内賢者岀矣天下賢者至矣又曰得十良馬不如得一伯樂得十良劒不如得一歐冶得地千里不如得一賢人又曰魏文侯過段干木之閭而軾其僕曰君胡爲軾曰}
  - {type: variant, offset: 2593, length: 0, content: '', SBCK: 非段干木之閭歟干木蓋賢者也吾安敢不軾又曰趙簡子將襲衛使史墨行瞶之瞶視也音貴期以一月六月而反復簡子曰何其乆也對曰謀利而得害猶弗察也蘧伯玉爲相史鰌佐焉孔子爲客子貢使令於君前甚聽君聽其言易曰渙其羣元􅁻渙者賢也羣者衆也元者􅁻之始也渙其羣元􅁻者其佐多賢簡子案兵而不動周書隂符曰凢治國有三常一曰君以舉賢爲常}
  - {type: variant, offset: 2593, length: 0, content: '', krp: 非段干木之閭歟干木蓋賢者也吾安敢不軾又曰趙簡子將襲衛使史墨行瞶之瞶視也音貴期以一月六月而反復簡子曰何其乆也對曰謀利而得害猶弗察也蘧伯玉爲相史鰌佐焉孔子爲客子貢使令於君前甚聽君聽其言易曰渙其羣元吉渙者賢也羣者衆也元者吉之始也渙其羣元吉者其佐多賢簡子案兵而不動周書隂符曰凢治國有三常一曰君以舉賢爲常}
