  - {type: variant, offset: 4185, length: 117, content: 乃令桓魋圍孔子數日不解弟子皆有飢色於是孔子仰天而歎曰君子固窮乎子路聞孔子之言悲感悖然大怒張目奮劍聲如鐘鼓孔子曰由來今汝欲鬭名為戮我於天下為汝悲歌而感之汝皆和我由等唯唯孔子乃引琴而歌音曲甚哀有暴風擊拒軍士僵仆於是匡人乃知孔子聖人瓦解而去, SBCK: 太平御覧卷第四百二}
