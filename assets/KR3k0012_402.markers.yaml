  - {type: variant, offset: 2505, length: 1, content: 聖, WYG: 皆令得其意而公家甚賴之况武子之生也不利其家死不託其孤臣敢以為賢孟子曰國君進賢如不得已將使卑踰尊疎踰戚可不慎歟左右皆曰賢未可也諸大夫皆曰賢未可也國}
  - {type: variant, offset: 2507, length: 1, content: 者, WYG: 皆曰賢然後察之見賢焉然後用之吕氏春秋曰伊尹出空桑之中長而賢湯聞伊尹使人請之有侁氏有侁氏不可伊尹亦欲歸湯湯於是請取妻於有侁氏有侁氏喜使伊尹為媵送女故賢主之求有}
