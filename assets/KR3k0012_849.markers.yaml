  - {type: variant, offset: 230, length: 619, content: 密作數十人饌安至納設菜菓而俶下精飲食納怒客去杖俶四十又曰郄鑒字道徵永嘉亂在鄉里窮餒鄉人以鑒名德傳共餉之時兄子邁外生周翼並小常攜之就食鄉人曰恐不兼有所存鑒乃獨往食訖飯著兩頰邊含還與二兒後並得存同過江邁位至護軍翼為剡令鑒薨追撫育之恩解職而歸席苫心喪三年又曰庾袞父亡作莒賣以養母母見其勤曰我無所食對曰母食不甘袞將何居母感而安之宋書曰謝景仁為桓玄驍騎將軍時宋武帝為桓循撫事軍中兵參軍嘗詣景仁諮事景仁與語悅因留帝食食未辨而景仁為玄所召玄累促俄頃間騎詔績至帝屢求去景仁不許曰主上見待要應有方我欲與客食豈不得待竟安飽食然後應召帝甚感之又曰謝景仁愛弟甝音酣而憎弟述嘗設饌請宋武帝希帝命甝豫坐而帝召述述知非景仁夙意又慮非帝命之請急不從帝馳遣呼述須至乃飡其見重如此及景仁疾述盡心視湯藥飲食必嘗而後進衣不解帶不盥櫛者累旬景仁深感愧焉又曰劉穆之少時家貧誕節嗜酒食不修拘撿好往妻兄弟乞食多見辱不以為恥其妻江嗣女甚明識每禁不令往江氏後有慶會囑勿來穆之猶往食畢求檳榔江氏兄弟戲之曰檳榔消食君乃常飢何忽須此妻復截髮市肴饌為其兄弟以餉穆之自此不對穆之梳沐後穆之官達而性更奢豪食必方丈且輒為十人饌未嘗獨飡每至食時客止十人已還帳下依常下食以此為常常白帝曰穆之家本貧賤贍生多闕叨忝已來雖每存約損而朝夕所須微為過豊此外無一毫負公又曰王仲德與兄睿同起義兵與慕容垂戰敗仲德被重創走與家屬相失路經大澤困未能去臥林中有一小兒青衣年可七八歲騎牛行見仲德驚曰漢已食未仲德言飢小兒去須臾復來得飯, SBCK: ''}
  - {type: variant, offset: 230, length: 93, content: 密作數十人饌安至納設菜菓而俶下精飲食納怒客去杖俶四十又曰郄鑒字道徵永嘉亂在鄉里窮餒鄉人以鑒名德傳共餉之時兄子邁外生周翼並小常攜之就食鄉人曰恐不兼有所存鑒乃獨往食訖飯著兩頰邊含還與二兒後並, WYG: ''}
