  - {type: variant, offset: 854, length: 2, content: 廬陵, SBCK: 孫叔敖相楚糲飯菜羹枯魚之膳又曰管仲束􅅞自魯之齊路飢而泣過綺邑乞食封人跪飱之因竊謂仲曰􅀂用齊將何報我曰如子之言我且賢之用能之使我何報子封人怨之又曰季孫相魯子路爲都令魯以五月起衆爲長溝當此時子路以其私秩粟爲漿飲要溝者於五衢而飡之孔子聞之使子貢往覆其飲擊毀其器曰魯君有民子奚爲乃飡之子路怒攘肱而入請曰夫子疾由之爲仁義乎所學於夫子者仁義也仁義者與天下共而同其利者也今以由之秩粟而飡民其不可何也孔子曰由之野也吾以女知之女徒未及也女故如是之不知禮也女之飡之爲愛之也夫禮天子愛天下諸侯愛境内大夫愛官職士愛其家過其所愛曰侵今魯君有民而子擅愛之是子侵也不亦誣乎言未畢而季孫使者至讓曰肥也起民而使之先生令弟子從役止而飡之將奪肥民耶孔子駕而去魯又曰凡人上不屬天下而不着地以筋骨爲根夲不食則不能活是以不免於欲利之心欲利之心不除其身之憂也故聖人衣可犯寒食足以充虚則不憂矣又曰嬰兒共戯以塵爲飯以塗爲􅁰以木爲胾薄暮必資餉食者塵不可食也又曰餓歳之春從弟不饟穰歳之秋踈客必食非踈骨􅁏少多之心異也孟子曰飢者甘食渴者甘飲是未得飲食之正也飢渴害之也豈唯腹爲有飢渇之害人心亦皆有口害也孫子曰鑠金洪鑪盗􅀠不探鴆􅁏在爼餓徒不食淮南子曰􅋩􅆈焚炙調齊和之適以窮荆呉甘酸之變符子曰顔子有疾三日不食問之曰吾師也食非丹不飡茹非芝不食故七百歳子何不吮瑶以延生咀蘂以養齡也禮含文嘉曰燧人始鑚火炮生爲熟使人無腹疾山海經曰有叅青馬爲西}
