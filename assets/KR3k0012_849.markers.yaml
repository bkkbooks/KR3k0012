  - {type: variant, offset: 1478, length: 8, content: 阮佃夫奢侈中書舍, SBCK: 劉真長王仲祖共行日旰未食有相識小}
  - {type: variant, offset: 1478, length: 5, content: 阮佃夫奢侈, WYG: 劉真長王仲祖共行日旰未食有相識小人飴其飡者餚饌甚盛真長辭焉言曰小人都不可作緣又曰羊曼拜丹陽尹客早至並得佳殽日晏則漸罄不復及精随客早晚不問貴賤羊固拜臨海令飲食皆美雖晚至者猶獲其盛饌時論以固之豐腆乃不如曼之真率也又曰王東亭嘗之呉郡就汰公道人宿别浦許府家往凡官寺設幔屋竟一寺東亭將夕至夜後汰公設豆藿糜汰公自噉一大甌東亭有難色汰公强進半甌須臾東亭行帳設茗飲食果炙畢偹汰公都無所噉俗説曰桓城性噉㗱犬大司馬每過城時使従兄索食黄帝八十一問曰人不食七日而死者何也曰人胃中常有留糓三㪷五升水三升故平人一日再至清一行二升半日中五升七日七五三㪷五升而水糓盡矣故平人不食飲七日而死者水糓津液俱盡故也𢎞君舉食檄曰取灄􅀈獨穴之鯉灄音攝赤山後陂之蓴伺漉冷䜴及熱應分食畢作躁酒炙冝膊酒便清香肉則豆闕㹀麞肶若波潘急火中炙脂不得薰聞香者躑躅干咽者塞門羅奠椀子五十有餘牛膝𢷬炙鴨臐魚熊白麞脯糖蟹濡䑓車螯生甜滋味逺来日醉之後談悶不除應有蔗薑木𤓰元李楊梅五味橄欖石橊𤣥枸葵羮脫煮茗下一杯明皇雜録曰天寳中諸公主相效進食上命中官袁思藝為檢校進食使水陸珍羞數千盤之費盡中人十家之産}
