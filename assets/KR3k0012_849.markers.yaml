  - {type: variant, offset: 1735, length: 731, content: 率直為飽食盡歡而去又曰周顒隱居鍾山衛將軍王儉謂顒曰卿山中何所食顒曰赤米白鹽綠葵紫蓼文惠太子問顒菜食何味最勝顒曰春初早韭秋末晚菘又曰張緒口不言利有財輒散之清談端坐或竟日無食門生見緒飢為之辦食然未嘗求也梁書曰沈顗逢齊末兵荒與家人并日而食或有饋其梁肉者閉門不受唯採蓴荇根供食以樵採自資怡怡然恒不改其樂又曰孔休源到都寓於宗人少府孔登會以祠事入廟侍中范雲一與相遇深加褒賞曰不期忽覲清風頓祛鄙吝觀天披霧驗之今日後雲命駕到少府登便拂筵整席謂當詣己備水陸之品雲駐筋命休源及至取其常膳正有赤倉米飯蒸䱒音醃魚雲食休源食不嘗主人之饌高談盡日同載還家登深以為愧又曰臨川王蕭宏所倖江無敵服玩侔於齊東昏潘妃寶屧音燮直千萬好食鰿音鯽魚頭常日進三百他珍膳盈溢後房食之不盡棄諸道路又曰何遠為武昌太守江左水族甚賤遠每食不過乾魚數片而已又曰何裔侈於味食必方丈後稍去其甚者猶食白魚䱉脯糖蟹以為非見生物疑食蚶蠣使門人議之學生鍾玩曰䱉之就脯但驟於屈申蟹之將糖躁擾彌甚仁人用意深懷如怛至於車螯蚶蠣眉目內闕慚渾沌之寄獷殼外緘非金人之慎不悴不榮曾草木之不若無香無臭與瓦礫其何筭故宜長充庖廚永為口實陳書曰徐孝克為國子祭酒每侍宴無所食噉至席散當其前膳羞損減帝密記以問中書舍人管斌斌自是伺之見孝克取珍菓內紳帶中斌當時莫識其意後尋訪方知其以遺母斌以啟宣帝嗟嘆良久乃勑自今宴享孝克前饌並遣將還以餉其母時論美之崔鴻後趙錄曰石虎召姚弋仲弋仲輕騎至鄴引入領軍省賜以御食仲怒曰國家有賊召我擊之官當見我問方略以破賊而食我我來覓食耶乃引見又後燕錄曰王鳳字道翔宜都王桓之子也桓好脩宮室鳳年八歲左右抱之隨桓周行殿觀桓問之曰此第好不鳳笑曰此本石家諸王故第今王脩之室無常人何須過好桓大奇之每食必與之同案鳳辭曰今王之饍兼肴百品而外有糟糠之民非是, WYG: 間宫苑}
