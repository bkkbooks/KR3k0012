  - {type: variant, offset: 879, length: 1, content: 買, SBCK: 之所喜今君有憂色何也襄子曰江河之大也不過三日焱風􅁀􅀨日中不湏􅁷今趙氏之德行無所積一朝而下兩城亡其及我乎白虎通曰王者四食何明有四方之物食四時之功也四方不平四方不順有徹膳之法焉所以明至尊著法戒也王者居中央制御四方平旦食少陽之始食時大陽之始晡時食少隂之始食時大隂之始􅀃文曰饔饍熟食也餱乾食也䉵具食也䉵士眷切􅴱中食也弍文切餔日加申時食也饛盛器滿兒饛音蒙餬􅀉食也飫燕食食也餞送去食也餁火熟也釋名曰食殖也所以自生殖也塩鐵論曰古者燔􅁰而食捭豚相享賔㛰相召豆羹白飯今則燔炙滿案臑豚包鼈膾鯉􅀃苑曰晏子所與同衣食者百人而天下之士至也又曰晏子侍景公曰朝寒請子進煖食於寡人對曰臣非厨養之臣社稷之臣也又曰子思居於衛緼􅂁無裏二旬九食又曰魯有儉者煑甂中之食甂必眠切小益食而美以遺孔子子受之如受犬馬之遺弟子曰先生何爲受之熹如此曰非以煑甂瓦之薄也食之美故念吾親也揚子法言曰或曰食如蟻衣如華金朱煌煌無巳㤗乎曰由其德舜禹受天下不爲太不由其德亦太矣李􅁤注曰蟻言精細或曰北夷􅀍我純績帶我金犀珎膳㬅餬不亦厚乎曰社稷靈也不可不厚也論衡曰王子喬不食榖壽百嵗按人生禀飲食之性故形上有口齒下有孔竅以注冩口齒以進食王子喬形體與人同何以獨能度丗耶夫衣以温膚食以充腹衣温食飽則精神明盛人之生也以食爲氣草木以土爲氣閉口不食拔草離土必不壽矣桓譚新論曰太原郡隆冬不火食五日雖病不敢觸犯王者冝應改易潜夫論曰何知國之將亂也以其不􅄝賢也故病家之厨非無饌也乃其人弗之能食故遂至於死也亂國之官非無賢也乃其君弗能存故遂亡矣又曰欲知人且疾不􅄝食欲知國將亡不􅄝賢風俗通曰俗􅀃􅗬馬啖賔客宴食巳闕主意未盡欲復飲酒餘無施更岀脯鮓椒薑塩豉言其速疾如􅗬馬之傳命􅗬音瑱又曰俗􅀃臨日月薄食而飲令人蝕口謹案日太陽之精君之像也日有蝕之天子不舉樂里語不救蝕者出行遇􅀨恐有安坐飲食重懼也又曰堪輿書云上朔㑹客必闘争按劉君陽爲南陽牧甞上朔設盛饌了無闘者蔡邕月令論曰問者曰春食麥羊夏食菽雞}
