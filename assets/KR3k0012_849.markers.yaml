  - {type: variant, offset: 912, length: 0, content: '', WYG: 一物来其形似蛇長七尺五寸有光采卷異而飴之遂經數載産業加焉婦後宻打殺即得能食病日進三斛飯猶不飽少時而死幽明録曰海中有金䑓出水百丈餘結搆巧麗窮盡神工䑓内有金機彫文偹制上有百味之食四方力神常立守䕶有一五通仙人来欲甘膳四神排擊之而退又曰河南趙良與其鄉人諸生到長安界遇霖雨糧乏相謂曰飢正爾當那得食耶應時美飯備在前兩人驚愕不敢食有人聲曰但食無嫌也明日早兩人復曰那復得美食即復在前遂至長安無他禍福祖台之志怪曰建康小吏曹曽見盧山夫人夫人為設酒噉餘鳥啄􅑥其中鏤刻竒飾異形非人所名下七子合盤盤中亦無俗中餚秦記曰苻朗甚别味㑹稽王道子為朗設盛饌問曰闗中之食孰若}
