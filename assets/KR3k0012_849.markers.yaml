  - {type: variant, offset: 1218, length: 256, content: 和合掘地為坑穽實之以泥水以糟食置前令以口就槽中食之用為歡笑又曰宗愨累遷豫州刺史監五州諸軍事先是鄉人庾業家富豪侈侯服玉食與賓客相對膳必方丈而為愨設粟飯菜俎謂客曰宗上軍串古患切噉麤食愨致飽而退初無異辭至是業為愨長史帶梁郡愨待之甚厚不以昔事為嫌又曰沈攸之戰敗與第二子文和至華容之魽頭村投州吏家此吏嘗為攸之所鞭待攸之甚厚不以往罰為怨殺豚薦食既而村人欲取攸之於櫟林與文和俱自經死又曰袁愍孫為吏部郎孝建元年文帝詔曰群臣並於中興寺八關齊中食竟愍孫別與黃門郎張淹更進魚肉食尚書令何尚之奉法素謹密以白孝武孝武使御史中丞王謙之糾奏並, SBCK: ''}
