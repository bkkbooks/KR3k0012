  - {type: variant, offset: 885, length: 2, content: 齊內, SBCK: 五行月令服飾所食器械之制皆從五行者􅀃所食獨不以五行巳畧乎曰亦甞思之矣凢十二辰之㑹五時所食者必家人所畜丑牛未羊戍犬酉雞亥豕而巳其餘虎以下非食也汝南先賢傳曰周舉字宣光爲并州刺史太原舊俗以介子推燒死至其亡時民爲絶火食老少多死舉作書置子推廟中􅀃民不冝寒食因勒使炊食如故益部􅂄舊傳曰何祗字君肅爲人寛厚通濟體甚壯大能食飲好聲色不治節儉時人少貴之者曹毗杜蘭香傳曰蘭香戒張碩不露頭食永昌郡傳曰獠民口嚼食并以鼻飲水異苑曰新野􅂫卷與婦佃於野舎毎至飲時輙有一物來其形似虵長七尺五寸光采卷異而飴之遂經數載産業加焉婦後宻打殺即得能食病日進三斛飯猶不飽少時而死幽明録曰海中有金臺岀水百丈結構巧麗窮盡神工臺内有金机彫文備制上有百味之食四丈力神常立守護有一五通仙人來欲甘膳四神排擊遷延而退又曰河南趙良與其郷人諸生到長安界遇霖􅀨粮乏相謂曰飢正爾當那得食耶應時美飯備在前兩人驚愕不敢食有人聲曰但食無嫌也明日早兩人復曰那復得美食即復在前遂至長安無他禍福祖台之志恠曰建康小吏曹著見廬山夫人夫人爲設酒噉金鳥啄甖其中鏤刻竒飾異形非人所名下七子合盤盤中亦無俗中餚􅁗記曰符朗甚}
