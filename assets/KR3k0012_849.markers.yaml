  - {type: variant, offset: 2468, length: 2104, content: 所可同大王之味也桓彌加歎賞又南燕錄曰濟南尹鸞身長九尺腰帶十圍貫甲跨馬不據鞍由蹬慕容德見而奇其魁偉賜之以食一進斛餘德驚曰所噉如此非耕能飽且才皃不凡堪為貴人可以一縣試之於是拜逢陵長政理脩明大收民譽燕書曰少帝建熙六年上谷人公孫几久隱昌黎之域冬衣單布寢土床上夏則併飡茹於一器停使蛆臭然後乃食人咸異之莫能測也後魏書曰裴安祖年八九歲就師講詩至鹿鳴篇語諸兄云鹿得食相呼而況人乎自此未曾獨食又曰高閭嘗造胡叟家遇叟短褐曳柴從田歸舍為閭設酒食皆自手辨索其館宇卑陋園疇褊局而飯菜精潔醢醬調羹見其妾並衰跛眇衣布穿獘閭見其貧以衣物直十餘疋贈之亦無辭愧又曰盧彪為太子詹事魏收常來詣之訪以洛京舊事不待食而起云難為子費叔彪留之良久食至但有粟飡葵菜木椀盛之片脯而已所待僕從亦盡設食一與己同又曰楊愔幼時為季父暐大嗟異顧謂賓客曰此兒恬裕有我家風宅內有茂竹遂為愔於林邊別葺一室命獨處其中常同盤具盛饌以飯之因以督勵諸子曰汝輩但如遵彥謹慎自得竹林別室同盤重肉之食後椿誡子孫曰吾兄弟若在家必同盤而食若有近行不至必待其還亦有過中不食忍飢相待吾兄弟八人今存者有三是故不忍別食也又願畢吾兄弟不異居異財汝等眼見非為虛假如聞汝等兄弟時有別齋獨食此人又不如吾等一世也又曰元欽曾託青州人高僧壽為子求師師至未幾逃去欽以讓僧壽僧壽性滑稽乃謂欽曰凡人絕粒七日乃死始終五朝便爾逃遁去食就信實有所闕欽乃大慚於是待客稍厚又曰崔敬友恭寬接下循身勵節自景明已降頻歲不登飢寒請匄者取足而去又置逆旅於蕭然山南大路之北設食以供行者又曰刁少雍字季仲少聰頴有孝行尤為祖父紹先所愛紹先性嗜羊肝常呼少雍共食及紹先卒少雍終身不食肝北齊書曰崔瞻在御史臺恒於宅中送食備盡珍羞別室獨飡處之自若有一河東人士姓裴亦為御史伺瞻便往造焉瞻不與交言又不命匕筋裴坐觀瞻食罷而退明日裴自攜匕筋恣情飲噉瞻方謂裴云我初不喚君食亦不共君語君遂能不拘小節昔劉毅在京口冒請鵝炙豈亦異於是乎君定名士於是每與之同食又曰趙郡王叡十歲喪母高祖親送叡至領軍府發喪舉聲殞絕哀感左右三日水漿不入口高祖與武明婁皇后殷勤敦譬方漸順旨由是高祖食必喚叡同案其見愍惜如此又曰文宣昏逸常山王演固諫大被歐撻閉口不食太后極憂之常謂左右曰儻小兒死柰我老母何於是每問王疾謂曰努力強食當以王晞還汝乃釋晞令往王抱晞曰吾氣息惙然恐不能相見晞流涕曰天道神明豈令殿下遂斃此舍至尊親為人兄尊為人主安可與計殿下不食太后亦不食殿下縱不自惜不惜太后乎言未卒王強坐而飯晞由是得免遂還為王友又曰楊休之除中山太守先是韋道建宋欽道代為定州長史帶中山太守並立制禮之官出行不得過百姓飲食有者即數錢酬之休之常以為非及至郡復相因循或問其故休之曰吾昔非之者為其失仁義今日行之者自欲避嫌疑豈是夙心直是處世難耳後周書曰柳虬脫略人間不拘小節弊衣䟽食未嘗改操人或譏之虬曰衣不過適體食不過充飢孜孜營求徒勞思慮耳又曰長孫澄雅好賓客接引忘疲雖不飲酒而好觀人酣興常恐座客請歸每勤中廚別進異饌留之隋書曰田翼不知何許人也性至孝養母以孝聞其母臥疾歲餘翼親易燥濕母食則食母不食則不食唐書曰高祖師次于古堆去綘郡二十餘里有紫雲如華蓋樓闕之形正臨高祖之上時隋綘郡通守陳叔達堅守不下高祖謂廚人曰吾明日下城然後朝膳辛卯引兵攻城自旦及辰而破高祖乃食又曰太宗謂侍臣曰夫仁義之道當思之在心常令相繼若斯須懈怠則去之已遠猶如飲食資身恒令腹飽乃可存其性命又曰高宗朝諸宰臣以政事堂供饌珍美議減其料東臺侍郎張文瓘曰此食天子所以重機務待賢才也吾輩若不任其職當自陳乞以避賢路不可減削公膳以邀求名譽也國家之所費不在此茍有益於公道斯亦不為多也眾乃止又曰高宗朝文武官獻食賀破高麗上御玄武門之觀德殿奏九部樂極懽而罷又曰高宗朝皇太子久在內不出稀與官臣接見典膳丞邢文偉減膳上啟曰竊見大戴記曰太子既冠成人免保傅之嚴則有司過之史虧膳之宰史之義不得書過不書則死之宰之義不得撤膳不撤則死之近者已來未甚延納談議不接謁見尚稀三朝之後但與內人獨居何由發揮聖智使睿哲文明者乎今史雖闕官宰當奉職黍備所司不敢逃死謹守禮經遽申減膳其年右史員闕宰臣進擬數人上曰文偉嫌我兒不讀書不肯與肉喫此人甚正直可用為右史遂拜焉又曰盧懷慎為黃門監兼吏部尚書臥病既久宋璟盧從愿常相與訪焉懷慎臥於獘簀單席門無簾箔每風雨至即以席蔽焉常器重璟及從愿見之甚喜留連永日命設食有蒸豆兩甌菜數俎而已此外脩然無辨又曰韋陟性尚奢侈於饌羞尤為精潔植穀麥仍以鳥羽擇米每食畢視廚中所委棄不啻萬錢之直又曰裴冕性本侈靡尚車服及營珍膳每會賓客有昧於品味之名者又曰順宗時宰臣鄭珣瑜韋執誼方與諸宰相會食於中書故事丞相方食百寮無敢通見者王叔文是日至中書欲與執誼計事令直省通執誼直省以舊事告叔文叔文怒叱直省直省懼入白執誼執誼逡巡慚赧竟起迎叔文就其閤語良久宰相杜佑高郢珣瑜皆停箸以待報者云叔文索飯韋相公已與之同食閣中矣佑郢等心知其不可畏懼叔文莫敢出言珣瑜獨歎曰吾豈可復處此乎顧左右取馬徑歸遂不起又曰永泰中軍容使魚朝恩加內侍監判國子監事丁未詔魚朝恩赴國子監視事將令宰相大臣及常參并六軍將軍於國子監送上仍令京兆府造食出教坊樂以寵之是日文武大臣已下子弟二百餘人皆以本官備章服充附學生列於學館廊下待詔給錢一萬貫充食本以為附學生廚食之資朝恩自是數詣國學從者常, SBCK: ''}
