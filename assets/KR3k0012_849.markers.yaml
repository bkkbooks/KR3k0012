  - {type: variant, offset: 857, length: 2, content: 義真, SBCK: 母取食吕氏春秋曰有城氏有二佚女爲之九成之臺成猶重也飲食必以皷又曰湯得伊尹設朝見之􅀃湯以至味湯曰可得爲之乎對曰君之國小不足以具之爲天子然後可具三郡之蟲水}
  - {type: variant, offset: 857, length: 2, content: 義真, WYG: 母取食呂氏春秋曰有娥氏有三佚女為之九成之䑓飲食必以皷又曰湯得伊尹設朝見之説湯以至味湯曰可得為之乎對曰君之國小不足以具之為天子然後可具三部之蟲水}
  - {type: variant, offset: 857, length: 2, content: 義真, krp: 母取食吕氏春秋曰有城氏有二佚女爲之九成之臺成猶重也飲食必以皷又曰湯得伊尹設朝見之說湯以至味湯曰可得爲之乎對曰君之國小不足以具之爲天子然後可具三郡之蟲水}
  - {type: variant, offset: 860, length: 2, content: 武帝, SBCK: 者腥􅁏攫者臊草食者羶臭惡猶美皆有所以凢味之本水最爲始五味三材九沸九變火爲之紀時其疾徐減腥去臊鼎中之變精妙微纎口不能言志不能論􅀂射御之微隂陽之化四時之數故乆而不􅁦又曰趙襄子攻翟勝左人中人使者來謁之下左人中人城也襄子方食搏飯有}
