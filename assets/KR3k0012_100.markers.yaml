  - {type: variant, offset: 3608, length: 260, content: 帝幼稱聰悟簡文之崩也時年十歲至晡不臨左右進諫荅曰哀至則哭何常之有謝安嘗歎以為精理不減先帝既威權已出雅有人主之量既而溺於酒色殆為長夜之飲末年長星見帝心甚惡之夜於華林園舉酒祝之曰長星勸汝一柸酒自古何有萬歲天子耶太白連年晝見地震水旱為變者相屬醒日既少而傍無正人竟不能改焉時張貴人有寵年三十帝戲之曰汝以年當廢矣貴人潛怒向夕帝醉遂暴崩時道子昏惑元顯專權竟不推其罪初以簡文帝見讖云晉祚盡昌明及帝之在孕也李太后夢神人謂之曰汝生男以昌明為字及產東方始明因以名焉簡文帝後悟乃流涕及為清暑殿識者以為清暑反為楚聲哀楚之徵也俄而帝崩晉祚自此傾矣, SBCK: ''}
