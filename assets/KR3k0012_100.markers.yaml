  - {type: variant, offset: 652, length: 6, content: 后居崇德宮五, SBCK: 􅀓㑹稽王道子歸政四月甲戍兖州刺史王㳟豫州刺史􅁃揩舉兵以討尚書左僕射王國寳建威將軍王緒爲名甲申殺國寳及緒以恱于㳟㳟乃罷兵二年七月兖州刺史王㳟豫州刺史􅁃揩荆州刺史殷仲堪廣州刺史桓􅀇南蠻校尉楊佺期等舉兵反八月江州刺史王愉奔于臨川九月加太傅㑹稽王道子黄􅃏遣征虜將軍㑹稽王元顯等討桓􅀇等輔國將軍劉牢之次新亭使子敬宣擊敗恭㳟奔曲阿長塘湖湖尉收送京師斬之㝷遣太常殷茂諭仲堪及􅀇􅀇等走于㝷陽三年十一月妖賊孫恩䧟㑹稽内史王疑之死之吴國内史桓謙等並委官而遁遣衛將軍謝琰等逆擊走之四}
  - {type: page-break, offset: 652, content: '', id: KR3k0012_SBCK_100-1b}
  - {type: variant, offset: 652, length: 6, content: 后居崇德宮五, WYG: 傅㑹稽王道子歸政四月甲戌兖州刺史王恭豫州刺史庾楷舉兵以討尚書左僕射王國寶建威將軍王緒為名甲申殺國寶及緒以說于恭恭乃罷兵二年七月兖州刺史王恭豫州刺史庾楷荆州刺史殷仲堪廣州刺史桓𤣥南蠻校尉楊佺期等舉兵反八月江州刺史王愉奔于臨川九月辛夘加太傅㑹稽王道子黃鉞遣征虜將軍㑹稽王元顯等討桓𤣥輔國將軍劉牢之次新亭使子敬宣擊敗恭恭奔曲阿長塘湖尉収送京師斬之尋遣太常殷茂諭仲堪追𤣥𤣥等走于尋陽三年十一月甲寅妖賊孫恩陷㑹稽内史王凝之死之呉國内史桓謙等並委官而遁遣衞將軍謝琰等逆擊走之四}
