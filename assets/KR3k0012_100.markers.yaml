  - {type: variant, offset: 158, length: 0, content: '', krp: 徐州刺史都督楊徐兖豫青兾幽并八州諸軍事假節劉𥙿以謐領楊州刺史録尚書事辛酉劉𥙿誅尚書左僕射王愉及愉子荆州刺史緩司州刺史温詳辛未桓玄逼帝西上景戍宻詔以幽逼於玄萬機虚曠令武陵王遵依舊典承制揔百官行事加侍中餘如故并大赦謀反大逆巳下唯桓玄一祖之後不宥夏四月巳丑大將軍武陵王遵稱制緫萬機庚寅帝至江陵庚戌輔國將軍何無忌振武將軍劉道規及桓玄將庾稚何澹之戰于湓口大破之玄復逼帝東下五月癸酉冠軍將軍劉毅及玄戰于崢嶸洲又破之巳卯帝復幸江陵辛巳荆州别駕王康産南郡太守王騰之奉帝居于南郡壬午督護馮遷斬桓玄於南貊盤洲乗輿反正于江陵閏月巳丑桓玄楊武將軍桓振䧟江陵帝復蒙塵于賊營義熈元年正月帝在江陵太守魯宗之起義兵襲破襄陽巳丑劉毅次于馬頭桓振以帝屯于江津辛卯宗之破振將温揩于祚溪進次紀南爲振所敗振武將軍劉道規擊桓謙走之乗輿反正帝與琅耶王幸道規舟二月丁巳留臺備乗輿法駕迎帝于江陵三月桓振復襲江陵荆州刺史司馬休之奔于襄陽建威將軍劉懷簡討振斬之帝至自江陵六年十二月劉𥙿破盧循于豫章七年春二月右將軍劉藩斬徐道覆于始興傳首京師夏四月盧循走交州刺史杜慧斬之十}
  - {type: variant, offset: 160, length: 1, content: 九, krp: 八}
  - {type: variant, offset: 162, length: 10, content: 丙申立皇子聃為皇太子, krp: 劉𥙿及琅耶王徳文率衆伐姚泓景午大赦冬十月景寅姚泓將姚光以洛陽降巳丑遣兼司空髙宻王恢之脩謁五陵十三年秋七月劉𥙿尅長安執姚泓收其彛器歸京師十四年十二月}
