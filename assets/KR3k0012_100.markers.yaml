  - {type: variant, offset: 682, length: 0, content: '', WYG: 初𤣥恐帝不為手詔又慮璽不可得逼臨川王寳請帝自為手詔因奪取璽比臨軒璽已久出𤣥甚喜百官到姑孰𤣥偽讓朝臣固請乃于城南七里𤣥立郊壇以𤣥牡告天百僚陪列而儀注不備㤀稱萬歲遂升壇燎于南郊大赦改元永始初偽詔改元為建始右丞王攸之曰永始復是王莽始執權之歲也其兆}
