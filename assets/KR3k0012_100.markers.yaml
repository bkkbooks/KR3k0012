  - {type: variant, offset: 661, length: 0, content: '', SBCK: 孫恩㓂浹口謝琰爲孫恩所䧟死之恩轉㓂臨海六月輔國司馬劉􅁉破恩于南山恩將盧循䧟廣陵元興元年正月庚午朔大赦改元以後將軍元顯爲驃騎大將軍征討大都督鎮北將軍劉牢之爲元顯前鋒將軍譙王尚之爲後部以討桓􅀇二月景午帝戎服餞元顯于西河}
  - {type: variant, offset: 661, length: 0, content: '', WYG: 孫恩冦浹口庚寅謝琰為孫恩所陷死之恩轉冦臨海六月輔國司馬劉裕破恩於南山恩將盧循陷廣陵元興元年正月庚午朔大赦改元以後將軍元顯為驃騎將軍征討大都督鎭北將軍劉牢之為元顯前鋒將軍譙王尚之為後部以討桓𤣥二月庚午帝戎服餞元顯于西池}
