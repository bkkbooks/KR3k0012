  - {type: variant, offset: 413, length: 295, content: 建元二年九月景申立為皇太子戊戍康帝崩己亥即皇帝位時年二歲大赦尊皇后為皇太后壬寅皇太后臨朝攝政永和元年春正月甲戍朔皇太后設白紗帷於太極殿抱帝臨軒改元二年十一月辛未安西將軍桓溫師虜將軍周撫輔國將軍譙王元忌建武將軍袁喬伐蜀拜表輒行十二月枉矢自東南流于西北其長半天三年春三月桓溫攻成都剋之李勢降益州平十年二月己丑太尉征西將軍桓溫帥師伐關中廢楊州刺史殷浩為庶人六月符健將符雄悉眾及桓溫戰于白鹿原王師敗績九月桓溫以糧盡遂還升平元年春正月壬戍朔帝加元服告于太廟始親萬機大赦改元增文武位一等皇太后居崇德宮五年五月丁巳帝崩顯陽殿在位十七年時年十九葬永平陵廟號孝宗哀皇帝晉書曰哀皇帝諱丕字千齡成帝長子也咸康八年, krp: 𥘉}
