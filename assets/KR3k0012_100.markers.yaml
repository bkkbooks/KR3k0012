  - {type: variant, offset: 322, length: 2, content: 嗣君, krp: 東北風急義兵放火煙塵張天鼔譟之音震駭京邑劉𥙿執鉞麾而進謙等諸軍一時奔潰玄率親信數千人聲言赴戰遂出南掖門西至石頭使殷仲文具船相與南莾或勸其戰玄不暇荅直以䇿指天而經日不得食左古進以麄飯咽不能下其子昇時年數歳抱玄胷而撫之玄悲不自勝劉𥙿以武陵王遵攝萬機立行臺揔百官遣劉道䂓躡玄玄至㝷陽江州刺史郭昶之給其器用殷仲文自後至望見玄舟旌旗輿服備帝者之儀歎息曰敗中復振故可也玄於是逼乗輿西上於道作起居注叙其拒義軍之事自謂經略指授筭無遺䇿諸將違節度以致虧䘮非戰之罪玄至江陵石康納之}
