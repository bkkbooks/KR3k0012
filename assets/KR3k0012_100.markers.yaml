  - {type: page-break, offset: 683, content: '', id: KR3k0012_SBCK_100-5a}
  - {type: variant, offset: 683, length: 1, content: 孝, WYG: 不祥冥符僣逆如此國號大楚以南康平固縣奉晉帝為平固王車旗正朔如舊典遷居尋陽依陳畱王處鄴宫故事追尊其父溫宣武皇帝諸子皆為王𤣥入建康宫逆風迅雷激其儀飾皆傾及小㑹西堂設鼔樂殿上施絳帳鏤黃金為顔四角作金龍頭銜五色羽葆流蘇羣臣私相謂曰此頗似轜車亦王莽仙蓋之流也𤣥以其妻劉氏為皇后更造大輦容三十人坐以二百人舁之性好畋遊以體大不堪乘馬又作徘徊輿施轉開合動作無滯𤣥自簒盜之後驕奢荒侈遊畋無度以夜繼晝性又急暴呼召嚴速直官咸繫馬省前禁内雜亂無復朝廷之體于是百姓疲苦朝野勞悴怨怒思亂者十室八九焉劉裕劉毅何無忌等共謀克復裕等斬桓修于京口斬𢎞于廣陵裕率義軍至竹里𤣥遣呉甫之皇甫敷北拒義軍裕等於江乘與戰臨陣斬敷及甫之𤣥聞之大懼乃召諸道術人推算數為厭勝之法乃問衆曰朕其敗乎曹靖之對曰神怒人怨臣實懼焉𤣥曰人或可怨神何怒對曰移晉}
