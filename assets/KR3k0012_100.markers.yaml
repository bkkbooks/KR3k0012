  - {type: variant, offset: 139, length: 6, content: 賑恤鰥寡孤獨, krp: 増文武位一等太傳㑹稽王道子歸政四月甲戍兖州刺史王㳟豫州刺史庾揩舉兵以討尚書左僕射王國寳建威將軍王緒爲名甲申殺國寳及緒以恱于㳟㳟乃罷兵二年七月兖州刺史王㳟豫州刺史庾揩荆州刺史殷仲堪廣州刺史桓玄南蠻校尉楊佺期等舉兵反八月江州刺史王愉奔于臨川九月加太傅㑹稽王道子黄鉞遣征虜將軍㑹稽王元顯等討桓玄等輔國將軍劉牢之次新亭使子敬宣擊敗恭㳟奔曲阿長塘湖湖尉收送京師斬之㝷遣太常殷茂諭仲堪及玄玄等走于㝷陽三年十一月妖賊孫恩䧟㑹稽内史王疑之死之吴國内史桓謙等並委官而遁遣衛將軍謝琰等逆擊走之四年五月孫恩㓂浹口謝琰爲孫恩所䧟死之恩轉㓂臨海六月輔國司馬劉𥙿破恩于南山恩將盧循䧟廣陵元興元年正月庚午朔大赦改元以後將軍元顯爲驃騎大將軍征討大都督鎮北將軍劉牢之爲元顯前鋒將軍譙王尚之爲後部以討桓玄二月景午帝戎服餞元顯于西河丁巳遣兼侍中齊王柔之以騶虞幡宣告荆江二州丁卯桓玄敗王師于姑孰壬申桓玄自爲侍中丞相録尚書事二年春二月辛丑建威將軍劉𥙿破徐道覆于東陽乙卯桓玄自稱大將軍丁巳兾州刺史孫無終爲桓玄所害秋八月玄又自號相國楚王九月南陽太守庾庂起義兵爲玄所敗冬十一月壬午玄遷帝于永安宫癸未移太廟神主于琅耶國十二月壬辰玄纂位以帝爲平固王辛亥帝蒙塵于㝷陽三年春二月帝在㝷陽庚寅夜濤水入石頭漂殺人户乙夘建武將軍劉𥙿帥沛國劉毅東海何無忌等舉義兵景辰斬桓玄所署徐州刺史桓脩于京口及青州刺史桓弘于廣陵丁巳義師濟江}
