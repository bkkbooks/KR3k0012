  - {type: variant, offset: 681, length: 0, content: '', WYG: 帝不慧自少及長口不能言雖寒暑之變無以辨也凡所動止皆非已出故桓𤣥之簒因此獲全桓𤣥晉書曰桓𤣥字敬道一名靈寶大司馬溫之孽子也其母馬氏嘗與同輩月下夜坐見流星墜銅盆中忽為二珠燦然明淨競以瓢接取馬氏得而吞之若有感遂有光照室占者竒之故小名曰靈寶妳媼毎抱詣溫輒易人而後至其重兼常兒溫甚愛異之臨終命以為嗣襲爵年七歲溫服終府州文武辭其叔父沖沖撫𤣥頭曰此汝家故吏也𤣥因涕泣被面衆並異之及長形貌瓌竒丰神疎朗博綜藝術善屬文常負其才地以雄豪自處時咸憚之年二十三拜為太子洗馬時議謂溫有不臣之迹故折𤣥兄弟而為素官後出補義興太守鬱鬱不得志嘗登高望震澤歎曰父為九州伯兒為五湖長棄官歸國自以元勲之門而負謗于世乃上疏曰臣聞周公大聖而四國流言樂毅王佐而被謗騎劫巷伯有豺獸之慨蘇公興飄風之刺惡直醜正何代無之先臣蒙國殊遇姻婭皇極西平巴蜀北清伊洛竊號之冦繫頸北闕園陵復修大恥再雪飲馬灞滻懸旌趙魏勤王之師功非一㨗太和末皇基有潛移之懼遂奉天順人翼登聖朝晉室之基危于殷漢先臣之功高于伊霍矣至於先帝龍飛九五陛下之所以繼明南面請問談者誰之由也若陛下忘先臣大造之功信貝錦萋斐之説臣等自當奉還三封受戮市朝然後下從先臣歸先帝𤣥宫耳疏寢不報𤣥在荆楚積年優游無事荆州刺史殷仲堪敬憚之及中書令王國寶用事謀削弱方鎭内外騷動知王恭有憂國之言𤣥潛有意於功業乃説仲堪宜興晉陽之師以内匡朝廷已當悉荆楚之衆順流而下推王恭為盟主此桓文之舉也俄而王恭信至招仲堪及𤣥匡正朝廷國寶既死于是罷兵詔以𤣥為廣州刺史其年王恭又與庾楷起兵討江州刺史王愉及譙王尚之兄弟𤣥仲堪謂恭事必克捷一時響應仲堪令𤣥與楊佺期為前鋒𤣥至湓口獲王愉詔以𤣥為江州各西還屯于尋陽共相結納推𤣥為盟主後荆州大水仲堪賑恤飢者倉廩空竭𤣥乘其虚而伐之至江陵仲堪數道拒之不克佺期自襄陽來救期敗走殷仲堪亦見害于是平荆雍詔以𤣥督八州荆州牧𤣥于是樹腹心兵馬日盛其後孫恩逼京師𤣥建牙旗聚衆外託勤王實欲觀釁以兄偉為冠軍江州刺史畱偉守江陵抗表率衆下至尋陽移檄京師罪狀元顯𤣥既興師犯順慮衆不為用恒有迴斾之計既過尋陽不見王師意甚悦將吏亦振先使其將馮該等攻譙王尚之敗之劉牢之遣子敬宣降𤣥至新亭元顯自潰𤣥入京師矯詔加已總百揆為丞相黃鉞羽葆鼔吹府置官屬乃徙太傅道子于安成害元顯于市多僇朝望改易百官各置所親大赦改元為大亨𤣥將出居姑孰其中書令王謐對曰公羊有言周公何以不之魯欲天下一乎周也願靜根本以公旦為心𤣥善其對而不從遂大築城府乃出鎭焉大政皆咨之小事則決于僕射桓謙及卞範之後諷朝廷封諸子弟為公自知怨滿天下欲速定簒逆殷仲文卞範之等又共催促之于是先改授郡司其黨皆三公又矯詔封十郡為楚王加九錫備物楚國置丞相以下一遵舊典又諷天子御前殿而䇿授焉𤣥屢偽讓詔遣百僚敦勸乃就命𤣥偽上表求歸藩又自作詔畱之遣使宣㫖𤣥又上表固請又諷天子作詔固畱十一月矯制加具備天子禮服僭御禮樂焉又矯詔使王謐兼太保奉帝璽禪位于已帝出居永安宫移晉神主于琅琊}
