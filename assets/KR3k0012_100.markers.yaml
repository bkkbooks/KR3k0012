  - {type: variant, offset: 3329, length: 260, content: 帝講孝經冬十月癸酉日有蝕之十二月甲申神獸門災癸未皇太后詔曰傾者日蝕告變水旱不適雖剋己思救未盡其方賜百姓窮者米人五斛癸巳帝釋奠于中室祠孔子以顏回配泰元元年春正月帝加元服見于太廟皇太后歸政甲辰大赦改元景午帝始臨朝六年春正月帝初奉佛法立精舍于殿內引諸沙門以居之八年八月符堅帥眾渡淮遣征討都督謝石冠軍將軍謝玄輔國將軍謝琰西中郎將桓伊等拒之九月詔司徒琅耶王道子錄尚書六條事冬十月符堅弟融陷壽春乙亥諸將及苻堅戰於肥水大破之俘斬數萬計獲堅輿輦及雲母車十二年六月癸卯束帛聘處士戴逵龔玄之秋八月辛已立皇子德宗為皇太子大赦二十一年九月庚申帝, SBCK: ''}
