  - {type: variant, offset: 137, length: 295, content: 改元賑恤鰥寡孤獨三月以中書監庾冰為車騎將軍二年九月丙申立皇子聃為皇太子戊戍帝崩于式乾殿在位三年時年二十三葬崇平陵初成帝有疾中書令庾冰自以舅氏當朝權侔人主恐異世之後戚屬將踈乃言國有強敵宜立長君遂以帝為嗣制度年號再興中朝因改元曰建元或謂冰曰郭璞讖云立始之際丘山傾立者建也始者元也丘山諱也冰瞿然既而歎曰如有吉凶豈改易所能救乎至是果驗云世說曰何次道庾季堅二人並為元輔成帝初崩于時嗣君未定何欲立子庾及朝議以外方強寇嗣子幼欲立康帝康帝既登祚會群臣謂何曰朕今所以承大統為誰之議何曰陛下龍飛臣冰之功使于時用微臣今不覩聖明之世上有慚色穆皇帝晉書曰穆皇帝諱聃字彭子康帝子也建元二年九月景申立為皇太子戊戍康帝崩己, SBCK: 巳}
  - {type: variant, offset: 137, length: 294, content: 改元賑恤鰥寡孤獨三月以中書監庾冰為車騎將軍二年九月丙申立皇子聃為皇太子戊戍帝崩于式乾殿在位三年時年二十三葬崇平陵初成帝有疾中書令庾冰自以舅氏當朝權侔人主恐異世之後戚屬將踈乃言國有強敵宜立長君遂以帝為嗣制度年號再興中朝因改元曰建元或謂冰曰郭璞讖云立始之際丘山傾立者建也始者元也丘山諱也冰瞿然既而歎曰如有吉凶豈改易所能救乎至是果驗云世說曰何次道庾季堅二人並為元輔成帝初崩于時嗣君未定何欲立子庾及朝議以外方強寇嗣子幼欲立康帝康帝既登祚會群臣謂何曰朕今所以承大統為誰之議何曰陛下龍飛臣冰之功使于時用微臣今不覩聖明之世上有慚色穆皇帝晉書曰穆皇帝諱聃字彭子康帝子也建元二年九月景申立為皇太子戊戍康帝崩, WYG: ''}
