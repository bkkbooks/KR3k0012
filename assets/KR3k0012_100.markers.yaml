  - {type: variant, offset: 2818, length: 258, content: 性韻深沉雅有局鎮常與太宰武陵王晞桓溫同乘至板橋溫密勑令無因而鳴角鼓譟部伍並皆驚馳溫佯為駭異而晞大震驚急求下車帝舉止自若音顏不變溫每以此稱其德量故論者謂服憚之深若假帝脩年則溫纂逆之圖絕矣世說曰桓公既廢太宰武陵王晞父子仍上表云應割近情以存遠計欲除太宰父子可無后憂簡文手荅表云所不忍言況過於言桓公得此荅又重有表亂轉苦切為家國之計必應行事簡文復手荅云若使晉室靈長明公便應奉詔書若大運去矣請避賢路桓公讀詔手戰汗流而止遠徙新安而已孝武皇帝晉書曰孝武皇帝諱曜字昌明簡文帝第三子也興寧三年七月甲申封會稽王咸安二年秋七月己未立為皇太子, SBCK: 崩}
