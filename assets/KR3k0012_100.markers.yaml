  - {type: variant, offset: 2396, length: 1635, content: 口保之假還東帝謂之曰致意尊公家國事一至於此由吾不能以道自衛思患預防愧歎之深言何能喻又誦庾闡詩云士痛朝危臣哀主辱因泣下及不預詔溫曰吾遂委頓足下便入冀得相見又詔曰不謂疾患遂至於此今者惙然勢不復久且雖有詔豈復相及慨恨兼深如何可言天下艱難而昌明幼冲眇然非阿衡輔導之計當何以寧濟社稷國事家計一託之於公又曰帝以太興三年生弱而慧異中宗深器焉及長美風姿好清言舉止端詳器服陳素與劉恢王濛等為布衣之友由登庸歷位散騎常侍右將軍撫軍將軍以懿親民望任登宰輔值穆帝幼冲母后臨朝桓溫有平蜀洛之勳檀強西陜帝於家國之寄具瞻所歸而自斷之弱無以抗之陳郡人殷浩素有盛名時論比之管葛又琅耶王洽承相導子既是名公子少有聲望乃以浩為湘州刺史屈洽為長史徐州刺史葛羨亦以清貴居藩同心憂國溫見此樹置知在抗已溫既以雄武專朝任兼將相悉眾北討以成樂推之勢及枋頭奔敗知民望之乃屠豫州刺史袁真於壽陽城既而問郄超曰足下以何雪枋頭之恥乎超因說溫以廢立之事溫既宿有此謀深納超言既廢昏立明民人悅服然恭已南面政自溫出帝性韻深沉雅有局鎮常與太宰武陵王晞桓溫同乘至板橋溫密勑令無因而鳴角鼓譟部伍並皆驚馳溫佯為駭異而晞大震驚急求下車帝舉止自若音顏不變溫每以此稱其德量故論者謂服憚之深若假帝脩年則溫纂逆之圖絕矣世說曰桓公既廢太宰武陵王晞父子仍上表云應割近情以存遠計欲除太宰父子可無后憂簡文手荅表云所不忍言況過於言桓公得此荅又重有表亂轉苦切為家國之計必應行事簡文復手荅云若使晉室靈長明公便應奉詔書若大運去矣請避賢路桓公讀詔手戰汗流而止遠徙新安而已孝武皇帝晉書曰孝武皇帝諱曜字昌明簡文帝第三子也興寧三年七月甲申封會稽王咸安二年秋七月己未立為皇太子是日簡文帝崩太子即皇帝位詔曰朕以不造奄丁憫凶號天扣地靡知所訴藐然幼冲眇若綴旒深為社稷之重大懼不剋負荷仰憑祖宗之靈積德之祀先帝淳風玄德遺詠在民宰輔英賢勳隆德盛顧命之託寔賴匡訓群后率職百僚勤政冀孤弱之躬有寄皇極之基不墜先恩遺惠播于四海思弘餘潤以康黎庶其大赦天下與民更始九月甲寅追尊皇妣會稽王妃曰順皇后冬十一月甲午妖賊盧悚晨入殿庭游擊將軍毛安之討擒之是歲三吳大旱人多餓死詔所在賑給寧康元年春正月改元二月大司馬桓溫來朝秋七月己亥使持節侍中都督中外諸軍事丞相錄尚書大司馬楊州牧平北將軍徐兗二州刺史南郡公桓溫薨三年九月帝講孝經冬十月癸酉日有蝕之十二月甲申神獸門災癸未皇太后詔曰傾者日蝕告變水旱不適雖剋己思救未盡其方賜百姓窮者米人五斛癸巳帝釋奠于中室祠孔子以顏回配泰元元年春正月帝加元服見于太廟皇太后歸政甲辰大赦改元景午帝始臨朝六年春正月帝初奉佛法立精舍于殿內引諸沙門以居之八年八月符堅帥眾渡淮遣征討都督謝石冠軍將軍謝玄輔國將軍謝琰西中郎將桓伊等拒之九月詔司徒琅耶王道子錄尚書六條事冬十月符堅弟融陷壽春乙亥諸將及苻堅戰於肥水大破之俘斬數萬計獲堅輿輦及雲母車十二年六月癸卯束帛聘處士戴逵龔玄之秋八月辛已立皇子德宗為皇太子大赦二十一年九月庚申帝崩于清暑殿在位二十四年時年三十五葬平陵帝幼稱聰悟簡文之崩也時年十歲至晡不臨左右進諫荅曰哀至則哭何常之有謝安嘗歎以為精理不減先帝既威權已出雅有人主之量既而溺於酒色殆為長夜之飲末年長星見帝心甚惡之夜於華林園舉酒祝之曰長星勸汝一柸酒自古何有萬歲天子耶太白連年晝見地震水旱為變者相屬醒日既少而傍無正人竟不能改焉時張貴人有寵年三十帝戲之曰汝以年當廢矣貴人潛怒向夕帝醉遂暴崩時道子昏惑元顯專權竟不推其罪初以簡文帝見讖云晉祚盡昌明及帝之在孕也李太后夢神人謂之曰汝生男以昌明為字及產東方始明因以名焉簡文帝後悟乃流涕及為清暑殿識者以為清暑反為楚聲哀楚之徵也俄而帝崩晉祚自此傾矣續晉陽秋曰初帝躭於色末殆為長夜之飲醒治既少多居內殿留連於盤鐏之間時張貴人寵冠後宮威行閫內年幾三十帝妙列伎樂陪侍嬪少乃笑而戲之云汝已年廢矣吾已屬諸妹少矣貴人潛怒上不覺上稍醉臥貴人遂令其婢蒙之以被既絕云以魘崩至丑時方遷登太極前殿異苑曰晉孝武太元末帝每聞手巾箱中有鼓吹鼙角之饗於是請僧齋會夜見一臂長三丈許手長數尺來摸經案晉祚自此而衰, krp: ''}
