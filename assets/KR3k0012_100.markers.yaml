  - {type: variant, offset: 681, length: 1, content: 廟, SBCK: 帝不慧自少及長口不能言雖寒暑之變無以辨也凡所動止皆非巳出故桓􅀇之纂因此􅀗全桓􅀇􅀳書曰桓􅀇字敬道一名靈寳大司馬温之孽子也其母馬氏甞與同輩夜月下坐見流星墜銅盆中忽爲二珠璨然明静􅔡以瓢接取馬氏得而吞之􅀂有感遂有折及生有光照室占者竒之故小名曰靈寳妳媪毎抱詣温輙昜人而後至其重兼常兒温甚愛異之臨終命以爲嗣襲爵年七歳温服終府州文武辭其叔父冲冲撫􅀇頭曰此汝家故吏也􅀇因涕淚􅀍面衆並異之及長􅄱皃􅉞竒風神踈㓪􅀶綜藝術善屬文常􅀒其才地以雄豪自處時咸憚之年二十三拜爲太子洗馬時議謂温有不臣之迹故折􅀇兄弟而爲素官後出􅀘義興太守鬰鬰不得志甞登髙望震澤歎曰父爲九州伯兒爲五湖長弃官歸國自以元勲之門而􅀒謗於丗乃上䟽曰臣聞周公大聖而四國流言樂毅王佐而􅀍謗􅀐刧巷伯有豺獸之􅁣􅂫公興飄風之刺惡直醜正何代無之先臣蒙國殊遇姻婭皇極西平巴蜀北清伊洛使竊}
