  - {type: variant, offset: 722, length: 318, content: 十二年加中軍將軍升平三年除驃騎將軍五月丁巳穆帝崩皇太后令曰帝奄不救疾胤嗣未建琅耶王丕本中興正統明德懋親昔在咸康屬當儲貳以年在幼冲未堪國難故顯宗高讓今議望情地莫與為比其以王奉天統於是百官備法駕迎于琅耶第庾申即皇帝位大赦八月己卯夜天裂廣數文有聲如雷九月戊申立皇后王氏穆帝皇后何氏稱永安宮興寧元年九月壬戍大司馬桓溫師眾北伐癸亥以皇子生大赦二年二月癸卯帝親耕籍田三月庚戍朔大閱人戶嚴法禁辛亥帝不豫帝雅好黃老斷穀餌長生藥服食過多遂中毒不識萬機崇德太后復臨朝攝政三年二月景申帝崩于西堂在位四年時年二十五葬安平陵廢帝海西公晉書曰廢帝諱弈字延齡哀帝母弟也咸康八年封為東海王永和八年拜散騎常侍尋加鎮軍將軍升平四年拜車騎將軍五年改封琅耶王隆和初轉侍中驃騎大, WYG: 衞}
