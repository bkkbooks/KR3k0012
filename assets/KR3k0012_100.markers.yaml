  - {type: variant, offset: 2287, length: 410, content: 會稽國是日帝崩于東堂在位一年時年五十二續晉陽秋曰桓溫始以雄盛入輔係以廢立帝雖登祚內不自安初熒惑入太微尋廢海西公至是熒惑猶在太微帝惡之謂郗超曰命之脩短本所不計故當無復近日事耶超云大司馬臣溫方內固社稷外布經略非常之事臣以百口保之假還東帝謂之曰致意尊公家國事一至於此由吾不能以道自衛思患預防愧歎之深言何能喻又誦庾闡詩云士痛朝危臣哀主辱因泣下及不預詔溫曰吾遂委頓足下便入冀得相見又詔曰不謂疾患遂至於此今者惙然勢不復久且雖有詔豈復相及慨恨兼深如何可言天下艱難而昌明幼冲眇然非阿衡輔導之計當何以寧濟社稷國事家計一託之於公又曰帝以太興三年生弱而慧異中宗深器焉及長美風姿好清言舉止端詳器服陳素與劉恢王濛等為布衣之友由登庸歷位散騎常侍右將軍撫軍將軍以懿親民望任登宰輔值穆帝幼冲母后臨朝桓溫有平蜀洛之勳檀強西陜帝於家國之寄具瞻所歸而自斷之弱無以抗之陳郡人殷浩素有盛名時論比之管葛又琅耶王洽承相導子既是名公子少有聲望乃以浩為湘州刺史屈洽為長史, SBCK: ''}
