  - {type: variant, offset: 688, length: 1, content: 晉, SBCK: 璽禪位於巳岀居永安宫移􅀳神主于琅耶廟􅀄􅀇恐帝不爲手詔又慮璽不可得逼臨川王寳請帝自爲手詔因奪取璽比臨軒璽巳乆出􅀇甚喜百官到姑孰􅀇僞讓朝臣固請􅀇乃於城南七里立郊壇以􅀇牡告天百僚陪列而儀注不備妄稱萬歳遂升壇燎于南郊大赦改元永始􅀄僞詔改年爲建始右丞王攸之曰建始復是王莽始執權之歳也其兆號不祥􅁳符僣逆如此國號大楚以南康平固縣奉􅀳帝爲平固王車旗正朔如舊典遷居㝷陽依陳留王處鄴宫故事追尊其父温宣武皇帝諸子皆爲王􅀇入建康宫逆風迅激旌旗儀飾皆傾及小㑹西堂設妓樂殿上施絳綾帳鏤黄金爲顔四角作金龍頭銜五色羽葆旒􅂫群臣竊相謂曰此頗似轜車亦王莽仙蓋之流也􅀇以其妻劉氏爲皇后更造大輦容三十人坐以二百人舁之性好畋逰以體大不堪乗馬又作徘徊輿施轉閞令廻動無滯􅀇自纂盗之後驕奢荒侈遊獵無度以夜繼晝性又急暴呼召嚴速直官咸繫馬省前禁内雜亂無復朝廷之體於是百姓疲苦朝野勞悴怨怒思亂者十室八九焉劉􅁉劉毅何無忌等共謀克復􅁉等斬桓脩于京口斬桓引于廣陵􅁉率義軍至竹里􅀇遣呉甫之皇甫敷北距義軍􅁉等於江乗與戰臨陣斬敷及甫之􅀇聞之大懼乃召諸道術人推筭數爲厭勝之法乃問衆曰朕其敗乎曺靖之對曰神怒人怨臣實懼焉􅀇曰人或可怨神何爲怒對曰移􅀳宗廟飄泊無所失楚之􅀕不及於祖此其所以怒也􅀇曰卿何不諌對曰輦上君子自以爲堯舜之丗何敢妄言􅀇愈忿懼使桓謙何澹之屯東陵卞範之屯覆舟山西衆二萬拒義軍􅁉至蔣山使羸弱登山分張旗幟數道並前􅀇偵候還云􅁉軍四塞不知多以􅀇益憂惶于時東北風急義兵放火煙塵張天鼔譟之音震駭京邑劉􅁉執􅃏麾而進謙等諸軍一時奔潰􅀇率親信數千人聲言赴戰遂出南掖門西至石頭使殷仲文具船相與南莾或勸其戰􅀇不暇荅直以䇿指天而經日不得食左古進以麄飯咽不能下其子昇時年數歳抱􅀇胷而撫之􅀇悲不自勝劉􅁉以武陵王遵攝萬機立行臺揔百官遣劉道䂓躡􅀇􅀇至㝷陽江州刺史郭昶之給其器用殷仲文自後至望見􅀇舟旌旗輿服備帝者之儀歎息曰敗中復振故可也􅀇於是逼乗輿西上於道作起居注叙其拒義軍之事自謂經略指授筭無遺䇿諸將違節度以致虧䘮非戰之罪􅀇至江陵石康納之未三旬衆盛謂其群黨曰卿等並清塗翼從朕躬都下竊位者方應謝罪軍門其觀卿等入石頭並雲霄中人也􅀇遣何澹之守湓口何無忌劉道䂓等破之帥舟艦二百發江陵以徐放爲常侍遣􅀃無忌等解軍謂放曰諸人不識天命致此妄作遂懼禍屯結卿三州所信可明示朕心􅀂退軍解甲當與之更始授任江水在此朕不食言時道䂓巳至玄與戰於崢嶸州于時義軍數千􅀇兵甚盛而􅀇懼敗常漾輕舸於舫側故其衆莫有闘心義軍乗風縱火盡銳争先􅀇衆大潰􅀇留永安太后及皇后於巴陵殷仲文時在􅀇艦求出别船収集散軍因叛􅀇奉二后奔于江陵􅀇欲岀投漢州而制令不行左右於闇中斫之不中前後相殺交撗􅀇僅免於是荆州別駕王康産奉帝入南郡時益州刺史毛璩使其從孫祐之送帝璠喪葬江陵有衆二百璩弟子脩之先爲􅀇校尉誘􅀇以入蜀幸枚回洲祐之迎擊􅀇矢下如􅀨􅀇􅀍箭其子昇拔去之益州督馮遷抽刃而前􅀇拔頭上玉簮與之仍曰是何人邪敢殺天子遷曰欲殺天子之賊耳遂斬首時年三十六自篡逆至敗凡八旬矣恭皇帝􅀳}
