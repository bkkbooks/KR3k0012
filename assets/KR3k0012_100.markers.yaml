  - {type: 'tls:seg', offset: 663, content: '', id: KR3k0012_CHANT_100-3a.54}
  - {type: variant, offset: 663, length: 0, content: '', SBCK: 遣兼侍中齊王柔之以騶虞幡宣告荆江二州丁卯桓􅀇敗王師于姑孰壬申桓􅀇自爲侍中丞相録尚書事二年春二月辛􅐫建威將軍劉􅁉破徐道覆于東陽乙卯桓􅀇自稱大將軍丁巳兾州刺史孫無終爲桓􅀇所害秋八月􅀇又自號相國楚王九月南陽太守􅁃庂起義兵爲􅀇所敗冬十一月壬午􅀇遷帝于永安宫癸未移太廟神主于琅耶國十二月壬辰􅀇纂位以帝爲平固王辛亥帝􅀩塵于㝷陽三年春二月帝在㝷陽庚寅夜濤水入石頭漂殺人户乙夘建武將軍劉􅁉帥沛國劉毅東海何無忌等舉義兵景辰斬桓􅀇所署徐州刺史桓脩于京口及青州刺史桓弘于廣陵丁巳義師濟江三月戊午劉􅁉斬􅀇將呉甫之于江乗斬皇甫敷於羅落巳未桓􅀇衆潰而逃庚申劉􅁉置留臺具百官壬戌桓􅀇司徒王謐推劉􅁉行鎮軍將軍徐州刺史都督楊徐兖豫青兾幽并八州諸軍事假節劉􅁉以謐領楊州刺史録尚書事辛酉劉􅁉誅尚書左僕射王愉及愉子荆州刺史緩司州刺史温詳辛未桓􅀇逼帝西上景戍宻詔以幽逼於􅀇萬機虚曠令武陵王遵依舊典承制揔百官行事加侍中餘如故并大赦謀反大逆巳下唯桓􅀇一祖之後不宥夏四月巳􅐫大將軍武陵王遵稱制緫萬機庚寅帝至江陵庚戌輔國將軍何無忌振武將軍劉道規及桓􅀇將􅁃稚何澹之戰于湓口大破之􅀇復逼帝東下五月癸酉冠軍將軍劉毅及􅀇戰于崢嶸洲又破之巳卯帝復幸江陵辛巳荆州别駕王康産南郡太守王騰之奉帝居于南郡壬午督護馮遷斬桓􅀇於南貊盤洲乗輿反正于江陵閏月巳􅐫桓􅀇楊武將軍桓振䧟江陵帝復蒙塵于賊營義熈元年正月帝在江陵太守魯宗之起義兵襲破襄陽巳􅐫劉毅次于馬頭桓振以帝屯于江津辛卯宗之破振將温揩于祚溪進次紀南爲振所敗振武將軍劉道規擊桓謙走之乗輿反正帝與琅耶王幸道規舟二月丁巳留臺備乗輿法駕迎帝于江陵三月桓振復襲江陵荆州刺史司馬休之奔于襄陽建威將軍劉懷簡討振斬之帝至自江陵六年十二月劉􅁉破盧循于豫章七年春二月右將軍劉藩斬徐道覆于始興傳首京師夏四月盧循走交州刺史杜慧斬之十二年八月劉􅁉及琅耶王徳文率衆伐姚􅇦景午大赦冬十月景寅姚泓將姚光以洛陽降巳丑遣兼司空髙宻王恢之脩謁五陵十三年秋七月劉􅁉尅長安執姚􅇦收其彛器歸京師十四年十二月戊寅}
