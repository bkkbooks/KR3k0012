  - {type: variant, offset: 1139, length: 959, content: 馬桓溫帥眾伐慕容暐秋七月辛卯暐將慕容垂帥眾拒溫溫擊敗之九月戊寅桓溫禆將鄧遐朱序遇暐將傅末波於林渚又大破之戊子溫至枋頭景申以糧運不焚舟而歸六年十一月癸卯桓溫自廣陵屯于白石丁未詣闕因圖廢立誣帝在藩夙有痿疾嬖人相寵計好朱靈寶等參侍內寢而二美人田氏孟氏生三男長欲封樹時人惑之溫因諷太后以伊霍之舉己酉集百官于朝堂宣崇德太后令曰王室艱難穆哀短祚國嗣不育儲宮靡立琅耶王弈親則母弟故以入纂大位大圖德之不建乃至於斯昏濁潰亂動違禮度有此三孽莫知誰子人倫道喪醜聲遐布既不可以奉守社稷敬承宗廟且昏孽並大便欲建樹儲藩誣罔祖宗傾移皇基是而可忍孰不可懷今廢弈為東海王以王還弟供衛之儀皆如漢朝昌邑故事初桓溫有不臣之志欲先立功河朔以收時望及枋頭之敗威名頓挫遂潛謀廢立以長威權然憚帝守道恐招時議以宮闈重閟床笫易誣乃言帝為閹遂行廢辱初帝平生每以為慮嘗召術人扈謙筮之卦成荅曰晉室有盤石之固陛下有出宮之象竟如其言咸安二年正月降封帝為海西縣公臧榮緒晉書曰太和元年桓溫表率方伯北伐秋九月溫以王帥敗績于枋頭溫自廣陵屯于白石集百宮于朝堂稱崇德太后詔廢帝為東海王妖賊盧悚遣弟殿中監許龍晨到稱太后密詔奉迎稱覆帝曰我得罪在此幸蒙寬宥豈敢妄動且太后有詔使應官屬來迎何得如此必狂亂因叱左右縛之龍懼逸走由是朝廷以帝安於屈辱無僥倖之望不復懷疑帝亦知天命不再而深慮人禍乃閉聰塞明無思無慮終日酣暢耽于內寵有子不養庶保天年吳民憐之為作歌謠帝崩于吳宮年三十五因葬吳地續晉陽秋曰帝少同閹人之疾而昵比左右初在東海琅耶因親近嬖人相寵計好朱靈寶等並侍臥內美人田氏遂生三男眾致疑惑然莫能審其虛實至是將建儲貳大司馬溫因之以定廢立之計遂率百僚並還朝堂本省溫平旦以眾入分兵屯宮門呈草於皇太后曰今廢弈為東海王以還弟供衛之儀如漢朝昌邑故事丞相錄尚書事會稽王昱體自中宗明德劭令民望依係為日已久宜順天人以統皇極主者明依舊典以時施行但未亡人不幸罹此百憂感念存沒心焉如割社稷大計議者不獲已臨紙悲塞如何可言時太后在佛屋燒香內侍啟云外有急奏太后乃出堂倚戶前視表數行乃曰我本自疑比至半便止求筆題奏後云未亡人離此百憂感念存沒心焉如割溫奏未有此五十字即奏遂廻換內之簡文皇帝晉中興書曰太宗簡文帝諱昱字道成中宗少子也母曰鄭夫人永昌二年封琅耶王咸和元年鄭夫人薨上時年七歲哀號守誠乞得服重朝議哀之故從封會稽王康獻皇后臨朝建位撫軍大將軍錄, SBCK: 徒録}
