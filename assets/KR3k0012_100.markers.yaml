  - {type: variant, offset: 182, length: 0, content: '', krp: 二十}
  - {type: punctuation, offset: 184, content: ，, id: KR3k0012_CHANT_100-bkkpn40}
  - {type: 'tls:seg', offset: 184, content: '', id: KR3k0012_CHANT_100-1a.38}
  - {type: variant, offset: 186, length: 0, content: '', krp: 四十七葬休平陵帝不慧自少及長口不能言雖寒暑之變無以辨也凡所動止皆非巳出故桓玄之纂因此獲全桓玄晉書曰桓玄字敬道一名靈寳大司馬温之孽子也其母馬氏甞與同輩夜月下坐見流星墜銅盆中忽爲二珠璨然明静􅔡以瓢接取馬氏得而吞之若有感遂有折及生有光照室占者竒之故小名曰靈寳妳媪毎抱詣温輙昜人而後至其重兼常兒温甚愛異之臨終命以爲嗣襲爵年七歳温服終府州文武辭其叔父冲冲撫玄頭曰此汝家故吏也玄因涕淚𬒳面衆並異之及長形皃瓌竒風神踈㓪博綜藝術善屬文常負其才地以雄豪自處時咸憚之年}
  - {type: punctuation, offset: 189, content: ，, id: KR3k0012_CHANT_100-bkkpn41}
  - {type: 'tls:seg', offset: 189, content: '', id: KR3k0012_CHANT_100-1a.39}
  - {type: variant, offset: 189, length: 2, content: 葬崇, krp: 拜爲太子洗馬時議謂温有不臣之迹故折玄兄弟而爲素官後出𥙷義興太守鬰鬰不得志甞登髙望震澤歎曰父爲九州伯兒爲五湖長弃官歸國自以元勲之門而負謗於丗乃上䟽曰臣聞周公大聖而四國流言樂毅王佐而𬒳謗騎刧巷伯有豺獸之慨蘇公興飄風之刺惡直醜正何代無之先臣蒙國殊遇姻婭皇極西}
  - {type: variant, offset: 192, length: 0, content: '', krp: 巴蜀北清伊洛使竊號之㓂繫頸北闕園}
  - {type: punctuation, offset: 193, content: 。, id: KR3k0012_CHANT_100-bkkpn42}
  - {type: 'tls:seg', offset: 193, content: '', id: KR3k0012_CHANT_100-1a.40}
  - {type: variant, offset: 193, length: 2, content: 初成, krp: 修復大恥載雪飲馬灞滻懸旌趙魏勤王之師功非一捷泰和末皇基有潜移之懼遂奉順天人翼登聖朝晉室之機危於殷漢先臣之功髙於伊霍矣至於先}
  - {type: punctuation, offset: 194, content: ，, id: KR3k0012_CHANT_100-bkkpn43}
  - {type: 'tls:seg', offset: 194, content: '', id: KR3k0012_CHANT_100-1a.41}
  - {type: variant, offset: 196, length: 2, content: 有疾, krp: 龍飛九五陛下之所以繼明南靣請問談者誰之由也若陛下忘先臣大造之功信具錦萋斐之說臣等自當奉還三封受戮市朝然後下從先臣歸先帝玄宫耳䟽寢不報玄在荆楚積年優逰無事荆州刺史殷仲堪敬憚之及}
  - {type: punctuation, offset: 198, content: ，, id: KR3k0012_CHANT_100-bkkpn44}
  - {type: 'tls:seg', offset: 198, content: '', id: KR3k0012_CHANT_100-1a.42}
  - {type: variant, offset: 201, length: 0, content: '', krp: 王國寳用事謀削弱方鎮内外騷動知王㳟有憂國之言玄潜有意於功業乃說仲堪冝興晉陽之師以内匡朝廷巳當悉荆楚之衆順流而下推王㳟爲盟主此桓文之舉也俄而王㳟信至招仲堪及玄匡正朝廷國寳旣死於是罷兵詔以玄爲廣州刺史其年王恭又與}
  - {type: variant, offset: 202, length: 1, content: 冰, krp: 揩起兵討江州刺史王愉及譙王尚之兄弟玄仲堪謂恭事必尅捷一時響應仲堪令玄與楊佺期爲前鋒玄至盆口獲王愉詔以玄爲江州各西還屯于㝷陽共相結約推玄爲盟主後荆州大水仲堪振恤飢者倉廩空竭玄乗其虚而伐之至江陵仲堪數道拒之不尅佺期自襄陽來救期敗走殷仲堪亦見害於是平荆雍詔以玄督八州荆州牧玄於是樹腹心兵馬日盛其後孫恩逼京師玄建牙旗聚衆外託勤王實欲觀釁以兄偉爲冠軍江州刺史留偉守江陵抗表率衆下至㝷陽移檄京邑罪狀元顯玄旣興師犯順慮衆不爲用恒有廻斾之計旣過㝷陽不見王師意甚恱將吏亦振先使其將馮該等攻譙王尚之敗之劉牢之遣子敬宣降玄至新亭元顯自潰玄入京師矯詔加巳揔百揆爲丞相加黄鉞羽葆鼓吹府置官属乃徙太傅道子于安成害元顯于市多戮朝望改昜百官各置所親大赦改年爲大亨玄將出居姑孰其中書令王謐對曰公羊有言周公何以不之魯欲天下一乎周也願静根本以公旦爲心玄善其對而不從遂大築城府乃岀鎮焉大政皆諮之小事則决其僕射桓謙及卞範之後諷朝廷封諸子弟爲公自知怨满天下欲速定纂逆殷仲文卞範之等又共催促之於是先改授郡司其黨皆三公又矯詔封十郡爲楚王加九錫備物楚國丞相以下一遵舊典又諷天子御前殿而䇿授焉玄屬僞讓詔遣百僚敦勸乃就命玄僞上表求歸藩又自作詔留之遣使宣旨玄又上表固請又諷天子作詔固留十一月矯制加其備天子禮服御禮樂皆僣焉又矯詔使王謐兼太保奉皇帝璽禪位於巳岀居永安宫移晉神主于琅耶廟𥘉玄恐帝不爲手詔又慮璽不可得逼臨川王寳請帝自爲手詔因奪取璽比臨軒璽巳乆出玄甚喜百官到姑孰玄僞讓朝臣固請玄乃於城南七里立郊壇以玄牡告天百僚陪列而儀注不備妄稱萬歳遂升壇燎于南郊大赦改元永始𥘉僞詔改年爲建始右丞王攸之曰建始復是王莽始執權之歳也其兆號不祥冥符僣逆如此國號大楚以南康平固縣奉晉帝爲平固王車旗正朔如舊典遷居㝷陽依陳留王處鄴宫故事追尊其父温宣武皇帝諸子皆爲王玄入建康宫逆風迅激旌旗儀飾皆傾及小㑹西堂設妓樂殿上施絳綾帳鏤黄金爲顔四角作金龍頭銜五色羽葆旒蘇群臣竊相謂曰此頗似轜車亦王莽仙蓋之流也玄以其妻劉氏爲皇后更造大輦容三十人坐以二百人舁之性好畋逰以體大不堪乗馬又作徘徊輿施轉閞令廻動無滯玄自纂盗之後驕奢荒侈遊獵無度以夜繼晝性又急暴呼召嚴速直官咸繫馬省前禁内雜亂無復朝廷之體於是百姓疲苦朝野勞悴怨怒思亂者十室八九焉劉𥙿劉毅何無忌等共謀克復𥙿等斬桓脩于京口斬桓引于廣陵𥙿率義軍至竹里玄遣呉甫之皇甫敷北距義軍𥙿等於江乗與戰臨陣斬敷及甫之玄聞之大懼乃召諸道術人推筭數爲厭勝之法乃問衆曰朕其敗乎曺靖之對曰神怒人怨臣實懼焉玄曰人或可怨神何爲怒對曰移晉宗廟飄泊無所失楚之祭不及於祖此其所以怒也玄曰卿何不諌對曰輦上君子}
