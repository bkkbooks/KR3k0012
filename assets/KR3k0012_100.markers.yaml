  - {type: variant, offset: 685, length: 1, content: 哀, WYG: 廟飄泊無所大楚之祭不及于祖此其所以怒也𤣥曰卿何不諫對曰輦上君子自以為堯舜之世何敢妄言𤣥愈忿懼使桓謙何澹之屯東陵卞範之屯覆舟山帥衆二萬拒義軍裕至蔣山使老弱登山分張旗幟數道並前𤣥懼候還云裕軍四塞不知多少𤣥益憂惶于時東北風急義兵放火烟塵漲天鼔噪之音震駭京邑劉裕執鉞麾而進謙等諸軍一時奔潰𤣥率親信數千人聲言赴戰遂出南掖門西至石頭使殷仲文具舟相與南奔或勸其戰𤣥不暇荅直以䇿指天而經日不得食左右進以粗飯咽不能下其子昇時年數歲抱𤣥胷而撫之𤣥悲不自勝劉裕以武陵王遵攝萬幾立行臺總百官遣劉道規躡𤣥𤣥至尋陽江州刺史郭昶之給其器用殷仲文自後至望見𤣥舟旌旗輿服備帝者之儀嘆息曰敗中復振故可也𤣥于是逼乘輿西上于道作起居注叙其拒義軍之事自謂經畧指授算無遺䇿諸將違節度以致虧喪非戰之罪𤣥至江陵石康納之未三旬衆盛謂其羣黨曰卿等並清塗翼從朕躬都下竊位者方應謝罪軍門其觀卿等入石頭並雲霄中人也𤣥遣何澹之守湓口何無忌劉道規等破之帥舟艦三百發江陵以徐放為常侍遣説無忌等解軍謂放曰諸人不識天命致此妄作遂懼禍屯結卿三州所信可明示朕心若退軍解甲當與之更始授任江水在此朕不食言時道規已至𤣥與戰於崢嶸洲於時義兵數千𤣥兵甚盛而𤣥懼有敗常漾輕舸於舫側故其衆莫有鬭心義軍乘風縱火盡鋭爭先𤣥衆大潰𤣥畱永安太后及皇后于巴陵殷仲文時在𤣥艦求出别船収集散軍因叛𤣥奉二后奔於江陵𤣥欲出漢州投梁州刺史桓希而制令不行𤣥乘馬出城至門左右於闇中斫之不中前後相殺交橫𤣥僅免于是荆州别駕王康産奉帝入南郡時益州刺史毛璩使其從孫祐之送弟璠喪葬江陵有衆二百璩弟子修之先為𤣥校尉誘𤣥以入蜀達枚囘洲祐之迎擊𤣥矢下如雨𤣥被箭其子昇拔去之益州督䕶馮遷抽刀而前𤣥拔頭上玉簪與之仍曰是何人耶敢殺天子遷曰欲殺天子之賊耳遂斬首時年三十六自簒逆至敗時凡八旬矣恭}
