  - {type: variant, offset: 143, length: 5, content: 徐統有知人, WYG: 西将軍石虎廢石𢎞自立弋仲稱疾不賀虎累召}
  - {type: variant, offset: 149, length: 6, content: 鑒遇堅於路異, SBCK: 赤亭郍􅀇孫柯迥魏假綏戎校尉西羗都督迥生弋仲少而聦猛英果雄毅永嘉}
  - {type: variant, offset: 149, length: 181, content: 鑒遇堅於路異之執其手曰符郎此官之御街小兒敢戲統顧左右曰此兒有霸王之相後復遇之統下車謂曰符郎當大貴僕不及如何堅曰若如公言不敢忘德八歲請就師學洪曰尚小未可吾年十三方欲求師時人猶以為速成健之入關次于曲沃夢天神遣使朱衣赤冠命拜堅為龍驤將軍旦而為壇於曲沃拜堅泣謂曰先王昔始受此號汝父次為之今若若汝也復為神明所授可不勉之性至孝有器度博學多才藝年十一便有經略大志堅既殺符生永興, WYG: 乃赴太寧}
