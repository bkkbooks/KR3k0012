  - {type: variant, offset: 5076, length: 0, content: '', krp: 子興鎭長安四年十月立社稷于長安六年大敗符登于長安七年三月萇寢疾遣鎭東姚碩德守長安召太子興詣行在所八年十月萇如長安至于新支堡疾篤輿疾而進十二月至長安召太尉姚旻僕射尹緯等受遺詔輔政萇曰吾氣力轉微將不能復臨天下卿等善相吾子謂興曰有毀此諸人者愼勿受之汝撫骨肉以仁接大臣以禮待物以信遇民以恩四者旣備吾無恨矣庚子薨于永安宮年六十四謚武昭皇帝葬元陵廟號太祖姚興崔鴻十六國春秋後秦録曰姚興字子略萇之太子萇薨祕不發喪皇}
  - {type: variant, offset: 5078, length: 0, content: '', SBCK: 年乃發喪行服即位于槐里大赦改元七月如涇陽與符登徙改宻三萬户於長安二年以叔父緒爲晉王征西將軍碩德爲隴西王弟崇爲齊公􅂋爲常山公三年以緒爲并兾二州牧鎭蒲坂四年二月遣齊公崇伐洛陽弘始元年九月大赦改元冬十月尅洛陽以東平公紹爲都督山東諸軍事豫州牧鎭洛陽四年五月遣大將軍隴西王碩德率歩􅀐六萬伐吕隆於涼州先是吐蕃傉內沃切擅據西平沮渠蒙遜據張掖李暠據燉音屯煌各制方域共相侵伐碩德從金城濟河直趣廣武逕蒼松至隆城下隆遣弟輔國超龍驤邈等率衆拒碩德碩德大破之生擒邈傉擅蒙遜李暠等各脩表奉獻九月隆奉表請降興荅報嘉美以隆爲鎭西將軍凉州刺史建康公十一月鳩摩羅什至長安七年正月興如逍遥園引諸沙門聽什說佛經九年以太子泓録尚書事燕王慕容超遣使稱蕃十年與魏通和貢馬千疋十一年蜀譙縱遣使稱蕃十六年五月興疾于内寢太子泓以兵屯東華門侍疾于諮議堂尚書令廣平公弼如弼也潜謀爲亂招集數千人持兵於第興疾損升前殿百官咸㑹征虜劉羗泣曰陛下寢疾數旬柰何忽有斯第興曰朕過庭無訓諸子交惡含恥胡顔愧于四海興以弼文武兼才未忍致法免其尚書令以公就第十七}
