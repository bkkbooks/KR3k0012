  - {type: variant, offset: 2620, length: 158, content: 丞相餘如故謚武俟朝野巷哭三日十二年正月癸巳高陸民穿井得龜大三尺六寸背有八卦文命太卜池養之食之以粟四月堅下書曰涼州刺史張天錫雖稱蕃受位而臣道未純可步兵校尉姚萇等自石城津伐天錫率勁勇五萬來拒戰于赤岸涼師大潰天錫率騎數千奔還姑臧牋降于萇甲午大軍至姑臧天錫素車白馬面縛昇襯降于軍門萇釋縛焚襯送之長安諸郡悉降涼州平九月以梁熙為, SBCK: 征}
