  - {type: variant, offset: 2458, length: 160, content: 正月以徵士樂陵王忻為國子祭酒堅雅好文學英儒畢集純博之精莫如忻也終于太子少傳五月猛寢疾堅親祈南北郊宗廟社稷分遣侍臣禱河岳諸神無不周備以猛少瘳赦殊死七月堅臨省疾問以後事猛曰晉僻陋吳越乃正朔相承臣沒之後願不以晉為圖鮮卑羗虜我之仇讎終為大患宜漸除之以便社稷言終而卒時年五十一堅哭之慟謂太子宏曰天不欲使吾平一六合何奪吾景略之速也贈, SBCK: 拜}
