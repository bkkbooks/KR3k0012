  - {type: variant, offset: 1132, length: 1148, content: 邵羗帥步騎二萬救燕溫敗歸是月京兆民王攸上書獻十略一曰君道宜明二曰臣尚忠敬三曰子貴孝養四曰民生在勤五曰教無偏黨六曰養民在惠七曰延聘耆賢八曰懲惡顯善九曰伐叛柔服十曰易簡弘大堅納之以攸為諫議大夫十一月燕車騎吳王垂來奔桓溫既走慕容暐音葦悔割河洛之地以賂秦乃曰行人失辤分災救患理之常也堅大怒六年令輔國王猛帥鎮南楊安虎牙將軍張蚝音次建節鄧羗等步騎六萬討平燕冀八月猛攻剋壺關遣太傅上庸王評等帥四十萬屯於潞川猛覘丑艷切覘候也知評賣水鬻樵不撫將士大笑謂楊安等曰慕容評真奴才雖億兆之眾尚不足為慮況數十萬乎今破之必矣甲戍陳於渭原猛誓眾曰王景略受國厚恩任兼內外今與諸君深入賊地宜各勉進不可退也受爵明君之朝慶觴父母之室不亦美乎眾皆勇奮破釜棄糧大呼競進猛望燕師之眾惡之謂鄧羗曰今日之事非將軍莫可以捷也成敗之機在斯一舉羗曰若以司隸見與公無以為憂猛曰此非吾所及必以安定大守萬戶侯相處羗不悅而退俄而兵交猛召羗羗寢而不應猛乃馳就許之羗於是飲與張蚝徐成等跨馬馳入傍若無人搴音愆又居輦切舉也旗斬將燕師敗績進師圍鄴猛之未至鄴也劫盜公行及猛之至遠近怗然十一月堅自帥精銳十萬攻鄴七日而至於安陽故宅引諸耆老語及祖父舊事泫然流涕猛潛如安陽迎堅堅謂曰昔亞夫不出軍迎漢文將軍何以臨敵而背眾乎猛曰臣每覽亞夫之事常謂前卻人主以此而為名將竊未多之臣奉陛下神笇擊垂亡之虜若摧枯拉音獵朽何足憂也戊寅剋鄴慕容暐出奔將軍郭慶執暐於高陽送之辛巳堅入鄴宮大赦閱其圖籍郡百五十七縣一千五百七十九戶二百四十五萬八千九百六十九以王猛為都督諸軍事車騎大將軍開府儀同冀州牧鎮鄴封清河郡侯以偽太宰恪太傅評之第盡賜之加美妾五人上女妓十人中女妓三十八人猛辭堅曰昔魏絳和戎猶有金石絲竹之賞山甫翼周實受四牡之錫卿功超二子任過管葛安得辭也其敬受之無逆朕命以鄧羗為散騎常侍安定太守真定郡侯邑三千戶賞潞川之功七年七月堅如洛陽下書曰士死知己猶來格模故喬公一言魏祖追慟趙司隸高平徐統往在鄴都識朕於童稚每思其殷勤之言弗敢忘也可召其子孫詣行所八年五月以高平徐攀為琅邪太守攀統之少子以舊恩拔之也六月冀州牧猛入為丞相中書監司隸校尉猛固辭丞相改授司徒又固辭不拜乃停司徒之授四月天鼓鳴彗出于尾箕長十餘丈或名蚩九旗太史令張猛言於堅曰尾燕之分野而掃東井東井秦之分災深禍大十年之後燕滅秦之象二十年之後燕當為岱所滅慕容暐父子兄弟亡虜也而布列朝廷貴盛莫二宜除渠帥以寧皇秦若旦誅鮮卑不夕滅客彗者臣請就妖言之戮堅不納更以暐為尚書垂為京兆尹冲為平陽太守十年三月侍中太尉李威卒威字伯龍漢陽人荀太后姑子少與符雄結刎頸之交符生屢欲誅堅賴威之免堅深德之事威如父誅符生及法皆威與太后潛決大謀遂有辟陽之寵雅重王猛勸堅以國事任之堅常謂猛曰李公知卿猶鮑叔之於夷吾罕虎之於子產猛兄事之夏四月堅下書曰巴夷嶮逆寇亂益州招引吳軍為脣齒之勢特進鎮軍將軍, SBCK: ''}
