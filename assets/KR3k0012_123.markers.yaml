  - {type: variant, offset: 735, length: 586, content: 詹事十一月以猛為司隸侍中領選如故猛上䟽曰伏見陽平公融明德懿親光祿西河任群忠貞淑慎處士朱彤博識聰辯並宜左右彌綸暉贊九棘愚臣庸鄙請避賢路堅曰機務俟才允屬明哲朝野所望豈容致辭所舉融等尋別銓授於是以融為侍中中書監右僕射任群為光祿大夫領太子家令朱彤為中書侍郎領太子庶子三年九月鳳皇集于東閣大赦天下初將為赦與左僕射猛右僕射融議於露堂悉屏左右堅自為文猛融進紙筆有一大蒼蠅入自牖間鳴聲甚大集于筆端驅而復來堅惡之久而乃去俄而長安街巷市里民相告曰官今大赦有司以聞堅驚謂融曰事何從而泄勑外窮推咸言有一小人衣黑衣呼於市曰官今大赦須臾不見堅歎曰其向蒼蠅乎聲狀非常吾固惡之四年七月黃龍見於成紀梁山崩五年白虎見天水六年遣鴻臚拜張天錫為大將軍涼州牧西平公建元元年正月雍州秀才叚鏗對策上第拜吏部郎中孝廉通經者十餘人皆拜令長五年六月晉大司馬桓溫伐燕次于枋音方頭燕師屢敗遣散騎侍郎樂嵩來乞師請賂秦以虎牢以西之地八月遣將軍茍也洛州刺史邵羗帥步騎二萬救燕溫敗歸是月京兆民王攸上書獻十略一曰君道宜明二曰臣尚忠敬三曰子貴孝養四曰民生在勤五曰教無偏黨六曰養民在惠七曰延聘耆賢八曰懲惡顯善九曰伐叛柔服十曰易簡弘大堅納之以攸為諫議大夫十一月燕車騎吳王垂來奔桓溫既走慕容暐音葦悔割河洛之地以賂秦乃曰行人失辤分災救患理之常也堅大怒六年令輔國王猛帥鎮南楊安虎牙將軍張蚝音次建節鄧羗等步騎六萬討平燕冀八月猛攻剋壺關遣太傅上庸王評等帥, WYG: ''}
