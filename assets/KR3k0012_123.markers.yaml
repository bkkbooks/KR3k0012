  - {type: variant, offset: 1347, length: 413, content: 笑謂楊安等曰慕容評真奴才雖億兆之眾尚不足為慮況數十萬乎今破之必矣甲戍陳於渭原猛誓眾曰王景略受國厚恩任兼內外今與諸君深入賊地宜各勉進不可退也受爵明君之朝慶觴父母之室不亦美乎眾皆勇奮破釜棄糧大呼競進猛望燕師之眾惡之謂鄧羗曰今日之事非將軍莫可以捷也成敗之機在斯一舉羗曰若以司隸見與公無以為憂猛曰此非吾所及必以安定大守萬戶侯相處羗不悅而退俄而兵交猛召羗羗寢而不應猛乃馳就許之羗於是飲與張蚝徐成等跨馬馳入傍若無人搴音愆又居輦切舉也旗斬將燕師敗績進師圍鄴猛之未至鄴也劫盜公行及猛之至遠近怗然十一月堅自帥精銳十萬攻鄴七日而至於安陽故宅引諸耆老語及祖父舊事泫然流涕猛潛如安陽迎堅堅謂曰昔亞夫不出軍迎漢文將軍何以臨敵而背眾乎猛曰臣每覽亞夫之事常謂前卻人主以此而為名將竊未多之臣奉陛下神笇擊垂亡之虜若摧枯拉音獵朽何足憂也戊寅剋鄴慕容暐出奔將軍郭慶執暐於高陽送之辛巳堅入鄴宮大赦閱其圖籍郡百五十七縣一千五百七十九戶二百四十五萬八千九百六十九以王猛為, WYG: ''}
