  - {type: variant, offset: 5347, length: 0, content: '', SBCK: 分寕州興古永昌雲南朱捉越嶲音䯝河陽六郡爲漢州四月壽寢疾常見李期爲崇八月薨年四十謚昭文皇帝廟號中宗葬安昌陵李勢崔鴻十六國春秋蜀録曰李勢字子仁壽之長子身長七尺九寸􅆎帶十四圍善於俯仰時人異之壽旣薨僣即帝位大赦改太和元年正月尊母閻氏爲皇太后妻李氏爲皇后嘉寕二年晉遣安西將軍荆州刺史桓温來伐勢大發軍禦之鎭東李位都逆往降温逹成都之十里陌勢衆自潰}
