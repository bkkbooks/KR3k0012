  - {type: variant, offset: 5284, length: 0, content: '', WYG: 立妻任氏為皇后八年四月范長生卒以其子侍中賁為丞相長生善天文有術數民奉之如神十四年立兄子班為太子二十四年五月雄寝疾六月丁卯薨年六十一諡武皇帝廟號太宗十月塟安都陵太子班襲位李期崔鴻十六國春秋蜀録曰李期字世運雄第四子聦慧好學弱冠能屬文雄甍班即位雄子車騎将軍越自江陽奔喪以期與班非雄所生而嗣位心不平十月因夜哭臨越殺班於殯宫班字世文雄兄蕩第四子雄妻任氏無子養班為子越既殺班矯太后令陳班罪狀諡戾太子立期為主甲子期僣即皇帝位王恒元年正月大赦改年立妻閻氏為后四月大将軍漢王壽率歩騎一萬自涪音浮向成都期不虞其至不設僃至即尅城屯兵宫門殺相國建寧王越尚書令景騫尚書田衮等廢期為卭都縣公幽之别宫期自殺年二十五諡曰幽公李壽崔鴻十六國春秋蜀録曰李壽字武考特季弟驤之少子少尚禮容敏而好學雄竒其才畧以為足荷重任封為建寧王既而期立改封漢王領梁州刺史治涪城壽見期兄弟十餘人并有强兵懼不自全隂謀據成都稱藩於晉乃誓文武得數千人襲成都尅之縱兵擄掠數日乃定僣即皇帝位於南郊大赦改咸康四年為漢興元年追尊父驤為獻皇帝三年六月壽下書曰吳會遺燼乆逋天誅今将大興百萬躬行明罰九月大閱軍士七萬餘人舟師泝江而上過成都鼓譟盈江壽}
