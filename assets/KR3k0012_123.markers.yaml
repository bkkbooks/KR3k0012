  - {type: variant, offset: 1890, length: 948, content: 月堅如洛陽下書曰士死知己猶來格模故喬公一言魏祖追慟趙司隸高平徐統往在鄴都識朕於童稚每思其殷勤之言弗敢忘也可召其子孫詣行所八年五月以高平徐攀為琅邪太守攀統之少子以舊恩拔之也六月冀州牧猛入為丞相中書監司隸校尉猛固辭丞相改授司徒又固辭不拜乃停司徒之授四月天鼓鳴彗出于尾箕長十餘丈或名蚩九旗太史令張猛言於堅曰尾燕之分野而掃東井東井秦之分災深禍大十年之後燕滅秦之象二十年之後燕當為岱所滅慕容暐父子兄弟亡虜也而布列朝廷貴盛莫二宜除渠帥以寧皇秦若旦誅鮮卑不夕滅客彗者臣請就妖言之戮堅不納更以暐為尚書垂為京兆尹冲為平陽太守十年三月侍中太尉李威卒威字伯龍漢陽人荀太后姑子少與符雄結刎頸之交符生屢欲誅堅賴威之免堅深德之事威如父誅符生及法皆威與太后潛決大謀遂有辟陽之寵雅重王猛勸堅以國事任之堅常謂猛曰李公知卿猶鮑叔之於夷吾罕虎之於子產猛兄事之夏四月堅下書曰巴夷嶮逆寇亂益州招引吳軍為脣齒之勢特進鎮軍將軍護羗校尉鄧羗可帥甲士五萬星言赴討五月蜀人張育楊光等起兵二萬以應巴獠音老晉威遠將軍柏石帥眾三萬入據墊音店江張育自號蜀王稱蕃于晉八月鄧羗敗晉師于涪音浮西擊張育楊光於綿竹皆斬之益州平羗勒銘于岷山而還十二月羗至自成都堅引見東堂謂之曰將軍之先仲華遇漢世祖於前將軍復逢朕於後何鄧氏之多幸羌曰臣常謂光武之遇仲華非獨仲華之遭光武堅笑將軍蓋以自貺非直將軍之幸亦朕之遇賢十一年正月以徵士樂陵王忻為國子祭酒堅雅好文學英儒畢集純博之精莫如忻也終于太子少傳五月猛寢疾堅親祈南北郊宗廟社稷分遣侍臣禱河岳諸神無不周備以猛少瘳赦殊死七月堅臨省疾問以後事猛曰晉僻陋吳越乃正朔相承臣沒之後願不以晉為圖鮮卑羗虜我之仇讎終為大患宜漸除之以便社稷言終而卒時年五十一堅哭之慟謂太子宏曰天不欲使吾平一六合何奪吾景略之速也贈侍中丞相餘如故謚武俟朝野巷哭三日十二年正月癸巳高陸民穿井得龜大三尺六寸背有八卦文命太卜池養之食之以粟四月堅下書曰涼州刺史張天錫雖稱蕃受位而臣道未純可步兵校尉姚萇等自石城津伐天錫率勁勇五萬來拒戰于赤岸涼師大潰天錫率騎數千奔還姑臧牋降于萇甲午大軍至姑臧天錫素車白馬面縛昇襯降于軍門萇釋縛焚襯送之長安諸郡悉降涼州平九月以梁熙為西中郎將涼州刺史鎮姑臧徒豪右七千戶於關中封天錫重光縣之東寧鄉二百戶號歸義侯拜比部尚書遷右僕射萇之征也堅為天錫立第既至如歸, WYG: ''}
