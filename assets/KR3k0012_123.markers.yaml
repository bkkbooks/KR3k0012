  - {type: variant, offset: 5147, length: 0, content: '', SBCK: 八九進攻成都廞聞兵至驚懼不知所爲李苾等夜斬􅀜走出文武盡散廞獨與妻子乗小􅂳走至廣都爲其下人朱笁所煞先是梁州刺史羅尚聞廞叛上表稱廞非雄才又蜀人不願爲亂事終無成願欲征之惠帝遣尚平西將軍益州刺史率七千餘人入蜀特等聞尚來甚懼使弟驤於道奉迎并貢寳物尚甚恱冬十月六郡流人推特行鎭北將軍承制封拜其弟流行鎭東將軍弟驤驍􅀐將軍少子雄爲前將軍以相統領進兵攻尚於成都頻爲特所敗乃阻長圍縁水作營自都安至犍爲七百里與特相距大安二年都下推特爲大將軍大赦改元爲建初元年益州從事任明􅀃尚曰特旣兇逆侵􅁀百姓又分人散衆在諸村堡驕怠無備是天亡之時也可告諸村宻尅期日内外擊之破之必矣尚從之遣大衆奄襲特營尚出逆戰到官桑特軍敗績死之雄稱成都王追謚景王及稱尊號追尊曰景皇帝廟號始祖李流崔鴻十六國春秋蜀録曰李流字􅀇通特第四子也少好學便弓馬東羗校尉何攀稱流}
  - {type: page-break, offset: 5147, content: '', id: KR3k0012_SBCK_123-6b}
  - {type: variant, offset: 5147, length: 0, content: '', WYG: 八九進攻成都廞聞兵至驚懼不知所為李苾等夜斬關走文武盡散廞獨與妻子乘小船走至廣都為其下人朱竺所殺先是梁州刺史羅尚聞廞叛上表稱廞非雄才又蜀人不願為亂事終無成願往征之惠帝遣尚為平西将軍益州刺史率七千餘人入蜀特等聞尚來甚懼使其弟驤于道奉迎并貢寳物尚甚悦冬十月六郡流人推特行鎮北将軍承制封拜其弟流行鎮東将軍弟驤驍騎将軍少子雄為前将軍以相統領進兵攻尚於成都尚頻為特所敗乃阻長圍縁水作營自都安至犍為七百里與特相拒大安元年特乃自稱為大将軍大赦改元為建初元年益州從事任明說尚曰特既兇逆侵暴百姓今又分散人衆在諸村堡驕怠無備是天亡之時也可告諸村密刻期日内外擊之破之必矣尚從之遣大衆奄襲特營尚出逆戰到官桑特軍敗績死之雄稱成都王追諡景王及稱尊號追尊曰景皇帝廟號始祖李流崔鴻十六國春秋蜀録曰李流字𤣥通特第四子也少好學便弓馬東羌校尉何攀稱流}
