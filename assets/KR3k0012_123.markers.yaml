  - {type: variant, offset: 4094, length: 284, content: 于阿房改年更始冲率眾登城堅身貫甲胃督戰拒之飛矢滿身流血被體時雖兵寇危逼馮翊諸堡猶有負糧冒難而至者多為賊所殺先是言天或導余留汝兼總戎政勿與爭利吾當出隴收兵運糧以給汝自將張夫人及中山公詵率騎數百出如五將山六月太子宏將母妻數千騎出奔冲入據長安堅至五將山姚萇遣將軍吳忠圍之堅眾奔散獨侍御十數人而已神色自若召宰人進食俄而忠執堅以歸新平縣幽之別室萇求傳國璽於堅曰萇次應符曆可以為惠堅叱之曰小羗乃敢干逼天子豈以傳國璽授汝羗乎五胡次序無汝羗名違天不祥其能久乎璽已送晉不可得也萇遣右僕射尹偉說堅求為堯舜禪代之事堅曰姚萇叛賊柰何擬之古人因問偉曰卿於朕朝作何官對曰尚書令史堅歎曰卿宰相才也王, SBCK: 追謚}
