  - {type: variant, offset: 5136, length: 1, content: 進, SBCK: 􅁉至長安送泓于建康市戮之時年三十建康百里之内草木燋死自姚萇白雀元年歳在甲申至于是歳歳在丙辰三十有三歳蜀李特崔鴻十六國春秋蜀録曰李特字􅀇休巴西宕渠人其先廪君之苗裔秦併天下以爲黔中郡薄賦其人口歳出錢四十巴人謂賦爲賨藏宗切遂因名焉及髙祖爲漢王始募賨民平定三秦旣而不願出􅀜求還郷里髙祖以其功復同豐沛更名其地爲巴郡土有鹽􅃮之利民用殷阜俗性剽勇又善歌舞髙祖愛其舞詔樂府習之今巴渝舞是也其後繁昌分爲數十姓及魏武尅漢中特祖父虎歸魏魏武嘉之遷略一云洛陽陽拜虎等爲將軍内徙者亦萬餘家散居隴右諸郡及三輔泓農所在號爲巴人虎子慕爲東羗獵將慕凡有五子輔特庠流驤特身長八尺雄武善􅀐射沉毅有大度元康中氏齊萬年擾亂天水略陽扶風始平諸郡皆􅀍兵㓂民頻歳大飢流移就榖相與入漢川者數萬家特至劒閣顧盻嶮阻曰劉揮有如此地而靣縛於人豈非庸才耶同移者閻彧音郁等咸歎異之初流民旣至漢中上書求􅀉食巴蜀朝廷從之由是散在梁益不可禁止元康九年詔徴益州刺史趙廞音歆爲大長秋以成都内史耿勝代廞廞遂謀叛有劉氏割}
