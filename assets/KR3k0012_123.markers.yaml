  - {type: variant, offset: 4667, length: 295, content: 所煞乃舉哀于晉陽僣即皇帝位于晉陽南立堅行廟大赦改建元二十一年為太平元年九月置百官是月安西呂光自西城還師二年正月慕容垂僣稱尊號二月慕容冲左將軍韓延煞冲立叚隨為燕王改年昌平正月丕以呂光為車騎將軍梁州牧酒泉公是月姚萇僣稱尊號氐有啖青者謂諸將曰狄道長符登雖王室踈屬而志略雄明請共立之以赴大駕於是推登為使持節督隴右雍河二州牧率眾五萬東下隴右據南安馳使請命八月丕以登為征南大將軍開府儀同南安王持節雍州牧因其所稱而授之九月丕下書鮮卑慕容永我之騎將首亂京畿禍傾社稷其遣丞相王永帥禁衛虎旅覆而取之十月與慕容永戰于襄陵王師大敗丕懼帥騎數千南奔東垣晉揭威將軍馮該自陜要擊斬之送丕首于江東符登稱尊號謚為哀平皇帝符登, WYG: ''}
