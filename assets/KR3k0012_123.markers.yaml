  - {type: variant, offset: 2779, length: 443, content: 中郎將涼州刺史鎮姑臧徒豪右七千戶於關中封天錫重光縣之東寧鄉二百戶號歸義侯拜比部尚書遷右僕射萇之征也堅為天錫立第既至如歸十三年正月太史奏有星見于外國之分當有聖人之輔中國得之者昌堅聞西域有鳩摩羅什襄陽有釋道安竝遣求之十七年正月不雨至于六月徹樂減膳出宮女以迎和氣八月堅收起居注及著作所錄而觀之見茍太后李威之事慚怒乃焚其書著作郎董朏音斐雖更書時事然十不留一八年三月徙鄴銅駞銅馬飛廉翁仲于長安十月堅引群臣於太極殿議曰東南一隅未賓王化今欲起天下兵討之計其兵仗精卒九十七萬吾將先啟行薄伐南裔此行也朕與陽平公之任非諸將之事左右僕射權翼沙門道安陽平公融尚書石越等上書面諫前後數十堅終不納十九年晉車騎桓冲率眾十萬攻襄陽遣其前將軍劉波攻沔北堅大怒遣其子征南鉅鹿公叡冠軍慕容垂佐衛毛當等將步卒五萬救襄陽堅下書曰吳人敢恃江山屢寇王境宜時進討以清宇內便可戒嚴速脩戎備發州民則十丁遣一兵若門在灼然者為崇文義從朕將登會稽復禹績伐國存君義同三王其以司馬昌明為左僕射謝安為吏部尚書桓冲為侍中勢還不遠可並為起第八月戊午遣征南, SBCK: ''}
