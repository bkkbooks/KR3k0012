  - {type: variant, offset: 5284, length: 0, content: '', SBCK: 立妻任氏爲皇后八年四月范長生卒以其子侍中賁爲丞相長生善天文有術數民奉之如神十四年立兄子班爲太子二十四年五月雄寢疾六月丁卯薨年六十一謚武皇帝廟號太宗十月葬安都陵太子班襲位李期崔鴻十六國春秋蜀録曰李期字丗運雄第四子聦惠好學弱冠能屬文雄薨班即位雄子車􅀐將軍越自江陽奔䘮以期與班非雄所生而嗣位心不平十月因夜哭臨越煞班於殯宫班字丗文雄兄蕩第四子雄事任氏無子養班爲子越旣煞班於是矯太后令罪狀謚戾太子立期爲主甲子期􅆫即皇帝位玉􅁪元年正月大赦改年立妻閻氏爲后四月大將軍漢王壽率歩􅀐一萬自涪音浮向成都期不虞至預不設備至即尅城屯兵宫門殺相國建寕王越尚書令景騫尚書田衮等廢期爲卭都公幽之别宮期自殺年二十五謚曰幽公李壽崔鴻十六國春秋蜀録曰李壽字武考特季弟驤之子少尚禮容敏而好學雄竒其才秀以爲足荷重任封爲建寕王旣而期立改封漢王領梁州刺史治涪城壽見期兄弟十餘人竝有強兵懼不自全隂謀據成都稱藩於晉乃誓文武得數千人襲成都尅之放兵虜掠數日乃定於是僣即皇帝位於南郊大赦改咸康四年爲漢興元年追尊父驤獻皇帝三年六月壽下書曰呉㑹遺燼乆逋天誅今將太興百萬躬行天罰九月大閱軍士七萬餘人舟師泝江而上過成都鼔譟盈江壽}
