  - {type: variant, offset: 3691, length: 400, content: 為司馬討泓于華陽平原太守慕容冲起兵河東有眾二萬進攻蒲堅命竇衝討之符叡勇果輕敵戰于華陰叡敗績被殺堅大怒萇懼誅遂叛竇衝大破慕容冲于河東冲奔于泓泓眾至十萬餘遣使謂堅曰秦師傾敗將欲興復大燕吳王以定關東可速資備大駕奉送家兄皇帝返鄴都與秦以虎牢為界分王天下堅大怒召暐責之暐叩頭流血陳謝堅曰此自三豎之罪非卿之過復其位待之如初命暐以書招諭垂及泓冲使息兵暐密遣使謂之曰今秦數已終當不能復久吾籠中之人必無還理勉建大業以興復為務泓於是進向長安堅卒步騎二萬討姚萇於北地萇率眾七萬來攻堅為萇所敗聞慕容冲去長安二百餘里退師而歸使符方戍驪山符暉都督中外諸軍事配兵五萬拒冲暉師敗績堅又以尚書姜宇與符琳率眾三萬擊冲于霸上為冲所敗宇死之琳中流矢冲遂據阿房城進逼長安堅登城觀之歎曰此虜從何出也吾不用王景略陽平公之言使白虜敢以至於此長樂公符丕在鄴糧竭馬又無草削松木而食之會丁零叛慕垂引師去鄴始具西問知長安危逼遣從弟求救於謝玄二十一年慕容冲僣, WYG: ''}
