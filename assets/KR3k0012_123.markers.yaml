  - {type: variant, offset: 141, length: 1, content: 高, WYG: 歸順王處之于赤亭郍𤣥孫柯廻為魏鎮西将軍綏戎校尉西羌都督廻生弋仲少而聰猛英果雄毅永嘉之亂戎夏襁負隨之者數萬自稱雍州刺史䕶羌校尉扶風公劉曜以弋仲為}
