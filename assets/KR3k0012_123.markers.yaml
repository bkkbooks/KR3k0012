  - {type: variant, offset: 5076, length: 0, content: '', SBCK: 子興鎭長安四年十月立社稷于長安六年大敗符登于長安七年三月萇寢疾遣鎭東姚碩德守長安召太子興詣行在所八年十月萇如長安至于新支堡疾篤輿疾而進十二月至長安召太尉姚旻僕射尹緯等受遺詔輔政萇曰吾氣力轉微將不能復臨天下卿等善相吾子謂興曰有毀此諸人者愼勿受之汝撫骨肉以仁接大臣以禮待物以信遇民以恩四者旣備吾無恨矣庚子薨于永安宮年六十四謚武昭皇帝葬元陵廟號太祖姚興崔鴻十六國春秋後秦録曰姚興字子略萇之太子萇薨祕不發喪皇}
