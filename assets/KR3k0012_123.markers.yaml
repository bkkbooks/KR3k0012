  - {type: variant, offset: 332, length: 343, content: 六月去皇帝之號僣稱大秦天王即位太極殿誅董龍等二十餘人改壽光三年為永興元年追尊父為文桓皇帝世子宏為皇太子兄清河王法為丞相東海公永安公符候為太尉諸王皆貶爵為公符抑為尚書令封弟融為陽平公雙河南公子丕為長樂公暉為平原公暉為廣平公李威為左僕射梁平老為右僕射席寶為丞相長史王猛為中書令侍郎權翼為黃門郎諸公卿為生所誅者悉復本官十月丞相東海公法以疑忌賜死茍太后之意也堅性友愛與法訣於東堂慟哭嘔血二年四月堅如雍祀五畤音止六月如河東祀后土八月自臨晉登龍門顧謂群臣曰美哉山河之固權翼對曰吳起有言在德不在嶮深願陛下追蹤唐虞懷遠以德山河之固不足恃也堅大悅至韓原觀晉魏顆鬼結草抗秦軍之處賦詩而歸甘露元年正月起明堂禪音善南北郊六月甘露降乃大赦改年八月堅下書曰咸陽內史猛聲彰出納所在著績有臥龍之才宜入贊百揆絲綸王言可徵, WYG: ''}
