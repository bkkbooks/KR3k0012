  - {type: variant, offset: 5132, length: 2, content: 凡亭, SBCK: 陜城泓次于灞上􅁉至潼􅀜泓自㶚上還軍次于石橋􅁉進據鄭城泓遣姚􅁉屯兵宫中將軍姚丕守渭橋泓軍于逍遥園丕爲晉所敗泓自赴之因丕之敗遂相踐而退泓與河間公􅁉等數百􅀐岀奔于石橋大將軍東平公讃聞泓之敗率諸軍赴難㑹泓于石橋晉人巳固青門一云諸門諸軍不得入衆皆驚散泓與河間公􅁉等詣􅁉請降泓于彭城公伏念年十二謂泓曰陛下今雖降晉劉􅁉待人無禮終必不全願自裁決􅇦憮音武又音姥失意也然不荅念遂登宮牆自投而死平原公璞井州刺史尹昭以蒲坂降晉東平公讃率宗室子弟百餘人降于􅁉􅁉盡殺之}
  - {type: variant, offset: 5132, length: 2, content: 凡亭, WYG: 陜城泓次于灞上裕至潼關泓自灞上還軍次于石橋裕進據鄭城泓遣姚裕屯兵宫中将軍姚丕守渭橋泓軍于逍遥園丕為晉所敗因丕之敗泓自赴之遂相踐而退泓與河間公裕等數百騎出奔于石橋大将軍東平公讃聞泓之敗率諸軍赴難㑹泓于石橋晉人已圍青門一云諸門軍不得入衆皆驚散泓計無所出謀欲降于裕其子佛念年十二謂泓曰陛下今雖降晉劉裕待人無禮終必不全願自我決憮音武又音姥失意也然不答念遂登宫墻自投而死平原公璞并州刺史尹昭以蒲坂降晉東平讃率宗室子弟百餘人亦降于裕裕盡殺之}
