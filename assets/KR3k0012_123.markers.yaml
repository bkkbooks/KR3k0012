  - {type: variant, offset: 3275, length: 318, content: 十餘萬騎二十七萬前後千里九月堅至項城涼州之兵始達咸陽蜀漢之軍順流而下幽冀之眾至于彭城東西萬里水陸齊進融等攻壽春晉遣都督謝石徐州刺史謝玄豫州刺史桓伊水陸七萬敗堅于淝水堅為流矢所中單騎遁還於淮北顧謂夫人張氏曰朕用朝臣之言豈見今日之事耶何面目復臨天下泫然流涕堅諸軍悉潰及慕容垂一軍獨全比至洛陽百官威儀軍容粗備未及關而垂有貳志說堅請巡撫燕代并求拜墓堅許之權翼固諫以為不可堅不從堅至自淮南次于長安東之行宮入告罪于太廟丁零翟斌反于河南樂公符丕遣慕容垂及符飛龍討之垂南結丁零殺飛龍盡坑其眾垂引丁零烏九之眾二十餘萬為飛梯地道以攻鄴城慕容暐弟泓先為北城長史聞垂攻鄴亡奔關東妝諸馬牧鮮卑眾數千還屯華陰暐乃潛使諸弟及宗人起兵于外堅遣將軍強永擊之為泓所敗泓自稱, SBCK: 夷}
