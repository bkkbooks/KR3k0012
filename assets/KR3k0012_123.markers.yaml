  - {type: variant, offset: 3601, length: 351, content: 王推叔父垂為丞相大司馬冀州牧吳王堅謂權翼曰將若泓何翼曰慕容垂正可據山東為亂不暇近逼今暐宗族盡在京師鮮卑之眾布在畿甸實社稷之憂宜遣重將討之堅乃以廣平公符熙鎮蒲坂符叡為都督配兵五萬姚萇為司馬討泓于華陽平原太守慕容冲起兵河東有眾二萬進攻蒲堅命竇衝討之符叡勇果輕敵戰于華陰叡敗績被殺堅大怒萇懼誅遂叛竇衝大破慕容冲于河東冲奔于泓泓眾至十萬餘遣使謂堅曰秦師傾敗將欲興復大燕吳王以定關東可速資備大駕奉送家兄皇帝返鄴都與秦以虎牢為界分王天下堅大怒召暐責之暐叩頭流血陳謝堅曰此自三豎之罪非卿之過復其位待之如初命暐以書招諭垂及泓冲使息兵暐密遣使謂之曰今秦數已終當不能復久吾籠中之人必無還理勉建大業以興復為務泓於是進向長安堅卒步騎二萬討姚萇於北地萇率眾七萬來攻堅為萇所敗聞慕容冲去長安二百餘里退師而歸使符方戍驪山符暉都督中外, SBCK: ''}
