  - {type: variant, offset: 528, length: 601, content: 祀五畤音止六月如河東祀后土八月自臨晉登龍門顧謂群臣曰美哉山河之固權翼對曰吳起有言在德不在嶮深願陛下追蹤唐虞懷遠以德山河之固不足恃也堅大悅至韓原觀晉魏顆鬼結草抗秦軍之處賦詩而歸甘露元年正月起明堂禪音善南北郊六月甘露降乃大赦改年八月堅下書曰咸陽內史猛聲彰出納所在著績有臥龍之才宜入贊百揆絲綸王言可徵拜侍中中書令領京兆尹中丞鄧羗性鯁直與猛協規齊志於是百僚肅整豪右屏氣風化大行堅歎曰吾今始知天下之有法也以猛為吏部尚書遷太子詹事十一月以猛為司隸侍中領選如故猛上䟽曰伏見陽平公融明德懿親光祿西河任群忠貞淑慎處士朱彤博識聰辯並宜左右彌綸暉贊九棘愚臣庸鄙請避賢路堅曰機務俟才允屬明哲朝野所望豈容致辭所舉融等尋別銓授於是以融為侍中中書監右僕射任群為光祿大夫領太子家令朱彤為中書侍郎領太子庶子三年九月鳳皇集于東閣大赦天下初將為赦與左僕射猛右僕射融議於露堂悉屏左右堅自為文猛融進紙筆有一大蒼蠅入自牖間鳴聲甚大集于筆端驅而復來堅惡之久而乃去俄而長安街巷市里民相告曰官今大赦有司以聞堅驚謂融曰事何從而泄勑外窮推咸言有一小人衣黑衣呼於市曰官今大赦須臾不見堅歎曰其向蒼蠅乎聲狀非常吾固惡之四年七月黃龍見於成紀梁山崩五年白虎見天水六年遣鴻臚拜張天錫為大將軍涼州牧西平公建元元年正月雍州秀才叚鏗對策上第拜吏部郎中孝廉通經者十餘人皆拜令長五年六月晉大司馬桓溫伐燕次于枋音方頭燕師屢敗遣散騎侍郎樂嵩來乞師請賂秦以虎牢以西之地八月遣將軍茍也洛, SBCK: ''}
