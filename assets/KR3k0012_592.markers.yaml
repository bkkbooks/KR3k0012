  - {type: variant, offset: 5, length: 94, content: 上尚書皋陶曰帝庸作歌曰勑天之命惟時惟幾乃歌曰股肱喜哉元首起哉百工熙哉皋陶拜手稽首颺言曰念哉率作興事慎乃憲欽哉屢省乃成欽哉乃賡載歌曰元首明哉股肱良哉庶事康哉又歌曰元首叢脞哉股肱隋哉萬事隳哉漢, krp: 下唐}
