  - {type: variant, offset: 977, length: 1254, content: 字勑在朝辭人沈約已下同作高祖以王僧孺詩為工隋書曰陳禎明初後主作新歌詞甚哀思令後宮美人習而歌之其辭曰玉樹後庭花花開不復久時人以歌讖此其不久兆又曰大業三年幸榆林啟民可汗奉觴上壽拜伏甚恭帝大悅賦詩曰鹿塞鴻旗駐龍庭翠輦廻氈惟望風舉穹廬向日開呼韓稽顙至休屠繼踵來索辦擎羶肉韋韝獻酒杯何如漢天子空上單于臺國朝傳記曰煬帝善屬文而不欲人出其右司隸薛道衡由是得罪後因事誅之曰更能作空梁落鷰泥否煬帝為鷰歌行文士皆和著作郎王胄獨不下帝帝每御之胄竟坐此見害而誦其警句曰庭草無人隨意綠復能作此語耶又曰牛弘煬帝之在東宮也數有詩書遺弘弘亦有荅及嗣位之後嘗賜弘詩曰晉家山吏部魏世盧尚書莫言先哲異奇才亦佐余學行敦時俗道素乃冲虛納言雲閣上禮儀皇運初彝倫欣有敘垂拱事端居唐書曰太宗以武功定海內櫛風沐雨不暇於詩書洎於嗣業進引忠良銳精思政多孜孜求之若不及數年之後天下晏和遂於聽覽之暇留精文史敘事言懷時有制作天才宏麗興記玄遠著作鄧隆請編次之詔不許又曰太宗著金鏡述以示群臣其辭曰朕以萬機暇日遊心前文仰六代之高風觀百王之遺跡興亡之運可得言焉每至軒昊之無為唐虞之至治未嘗不留連贊詠不能已矣及於夏殷末世秦漢暴君使人凜然競懼如履朽薄然人君皆欲其永享萬乘之尊以垂百王之後而得失異跡興滅不同何也蓋短於自見不聞逆耳之言至於滅亡終身不悟豈不懼哉觀理亂之本原足為明鏡之鑒戒亂未常不任不肖理未嘗不任忠賢任忠賢則享天下之福用不肖則受天下之禍社稷臨危之主各師其臣若使覺悟安有危亡之禍特由不留心於任使翻屬意於遨遊豈不哀哉以遨遊將為任使以任使將為遨遊豈不善哉古人言舜禹不愛於聲不貪於色予謂不然將為愛也人云桀紂躭於聲色予將為不好也何以然桀紂命不終於天年樂不終於一世以此知為不好也舜禹命壽於終樂畢於世予謂之愛也且夫人有寬躁強柔之志愁樂貪慾之心性有善不善者也由是觀之堯舜禹湯躬行仁義治致隆平此稟其善性也幽厲桀紂乃為炮烙之刑刳孕婦割人心斮朝涉脯鬼侯造酒池糟丘為長夜之飲此其受於不善之性也夫立身之道在於折衷不在於偏躭吳起曰昔桑氏之君脩德廢武以滅其國有扈之君恃眾好勇以喪社稷仲尼曰寬濟猛猛濟寬仁義之道猶不得偏何況於左道乎況於不仁乎為君之道處至極之尊以億兆為心以萬邦為意安民必以文德防邊必以武功孔子曰夫文之所加者深武之所服者大德之所施者博則威之所制者廣不可以武威安民不可以文德備塞大鯨出水必廢遊波之功鴻鵠沉泥定無凌空之効若各令遂志並不失其能古人云構大廈者先擇木然後簡材治國者先擇佐然後定民大匠構屋必以大材為棟梁小材為榱撩茍有所中尺寸之木無棄此善理木者也非獨屋有棟梁國家亦然大德為宰相亦國之棟梁也予思三代以來君有所好民必從之在上留心臺榭奇巧之人必至致情遊獵馳騁之人遠臻存意管弦鄭衛多進降懷脂粉燕趙斯來塞切直之路為忠者必少開謟諛之道為佞者必多古人云君猶器也民猶水也方圓在於器不在於水以此而言足為永戒夫玉不琢不成器人不學不知道仲尼好於郯子文王學於虢叔聖人且猶如此何況於凡人乎治主思賢如農夫之望歲哲后求人若旱苗之思雨亂君嫉勝己如讎視不肖如子懷之中心何日暫忘王莽偽行仁義之道有始無終孫皓權施恩惠之風有初無末, WYG: 九十}
