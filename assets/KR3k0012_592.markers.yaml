  - {type: variant, offset: 4351, length: 0, content: '', SBCK: 其語曰南風之薫兮可以解吾民之愠兮薰風至之皃也南風之時兮可以阜吾民之財兮時得其時阜盛穆天子傳曰丙辰天子南遊于黃室之丘天子乃休日中天子北風雨雪有凍人天子作詩三章以哀民哀􅉖也我徂黃竹貟閟塞閟閉也帝收九行九行九道也傳曰經啓九道嗟我公侯百辟冢卿皇我萬民皇正也旦夕勿忘􅁪念也我徂黃竹貟閟寒帝收九行嗟我公侯百辟􅃁卿皇我萬民旦夕勿窮有皎者烏名音路翩翩其飛嗟我公侯勿則遷居樂其寡言守一居少樂不如遷􅁟居無求安也禮樂其民言當以禮樂化其民天子曰余一人則淫淫于遊樂不皇萬民漢武帝集曰奉車子侯暴病一日死上甚悼之乃自爲歌詩西京雜記曰始元元年黃鸖下太液池上爲歌曰黃鸖飛兮下建章羽肅肅兮行蹌蹌金爲衣兮菊爲裳唼喋荷荇出入蒹葭自顧菲薄媿尔嘉祥漢武帝栢梁詩曰日月星辰和四時梁王曰􅆖駕駟馬從梁來於}
