  - {type: variant, offset: 3141, length: 3, content: 存毛將, SBCK: 疑千載垂休體於至公何鄙何讎其惟哲王必頼良弼矧予不德闇於理術師旅繁起政刑多失遘兹艱屯夙夜祗慄翊我戴我實惟勲賢内熈庶績外揔十連威武載􅀭謀猷日宣長城壓境巨艦濟川同心同德扶危持顚予嘉尓誠尔相予理惟后失道亦臣之恥自昔格言愼終如始功載鼎彞道冠圖史無俾伊夔克專厥美作鑒勒銘永代是紀㝷有詔命勒石於起義堂西偏上爲題額又曰貞元十二年上以聽政之餘深思理本迺著刑政箴并序序曰朕以南面勵精理道雖及和平之際未臻玄古之風夙夜孜孜勤求不怠夫}
