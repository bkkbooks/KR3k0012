  - {type: variant, offset: 3326, length: 0, content: '', SBCK: 惟天惠人惟辟奉天從諫則聖共理惟賢皇立有極駿命不易揔萬機以成務齊六合之殊致一心不能獨鑑一目不能周視敷求哲人式序在位於戲君之任臣必求一德臣之事君咸思正直何啓沃之所冝亘古今而未得良以讜言者逆耳䜛䛕者伺側故下情未通而上聽巳惑俾夫忠賢敗於凶慝譬彼涇舟蒸徒檝之亦有和羮宰夫膳之孰云理國不自得師覆車之䡄予其懲而髙以下升和由甘受惟君無良亦臣之咎聞諸辛毗牽􅅂魏后則有禽息竭忠碎首勉思獻替以平可否勿謂無傷自微而彰勿謂何害積小成大事有隱而必見令旣出而焉悔皷鍾在宫聲聞于外浩然涉水朕未有艾將貞扆以虚心期盡忠而納誨在}
