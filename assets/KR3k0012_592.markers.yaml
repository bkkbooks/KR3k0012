  - {type: variant, offset: 1800, length: 256, content: 君脩德廢武以滅其國有扈之君恃眾好勇以喪社稷仲尼曰寬濟猛猛濟寬仁義之道猶不得偏何況於左道乎況於不仁乎為君之道處至極之尊以億兆為心以萬邦為意安民必以文德防邊必以武功孔子曰夫文之所加者深武之所服者大德之所施者博則威之所制者廣不可以武威安民不可以文德備塞大鯨出水必廢遊波之功鴻鵠沉泥定無凌空之効若各令遂志並不失其能古人云構大廈者先擇木然後簡材治國者先擇佐然後定民大匠構屋必以大材為棟梁小材為榱撩茍有所中尺寸之木無棄此善理木者也非獨屋有棟梁國家亦然大德為宰相亦國之棟梁也予思三代以來君有所好民必從之在上留心臺榭奇巧之人必至, SBCK: 通百慮一}
