  - {type: variant, offset: 1621, length: 160, content: 言舜禹不愛於聲不貪於色予謂不然將為愛也人云桀紂躭於聲色予將為不好也何以然桀紂命不終於天年樂不終於一世以此知為不好也舜禹命壽於終樂畢於世予謂之愛也且夫人有寬躁強柔之志愁樂貪慾之心性有善不善者也由是觀之堯舜禹湯躬行仁義治致隆平此稟其善性也幽厲桀紂乃為炮烙之刑刳孕婦割人心斮朝涉脯鬼侯造酒池糟丘為長夜之飲此其受於不善之性也夫立, SBCK: 正}
