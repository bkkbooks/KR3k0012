  - {type: variant, offset: 101, length: 13, content: 高祖還歸過沛置酒沛宮悉召故, SBCK: 德宗製中書麟德殿㑹百寮觀新樂詩仍令皇太子書以示百寮其序曰朕聞天地之德莫大於和萬物以生九功乃叙是以中春之首紀爲令節布陽和之政暢亭育之功式宴且歡順時而舉盖取象於交㤗之義也今歳華載陽嘉雪呈慶君臣同樂實獲我心近以聽政之餘叅比音律播於絲竹韻於歌詩象中和之容作中和之樂教習甫就畢陳于兹於是闢廣庭臨内殿張大㑹示群臣千載成文威儀有序禮洽歡浹中心是嘉上下之志通乾坤之理得善固未盡和莫甚焉聊復成篇以言其志詩曰芳歲肇佳節物華當仲春乾坤旣昭泰煙景含絪緼德淺荷􅀇貺樂成思治}
