  - {type: variant, offset: 2232, length: 2678, content: 子猶舡之汎巨浪毀在不遙若駑馬之奔千里困其將至古人云升量不以盛碩小智不可謀大巧詐不如拙誠信無廖矣有明主有暗主漢祖攝衣於酈生比干剖心於辛紂殷湯留情於伊尹龍逢被戮於夏桀楚莊暇隙而懷憂武侯罷朝而含喜闇主護短而永愚明主思短而長善覩漢祖殷湯仰其有德行譬若陰陽調四時會法令均萬民樂則騏驎呈其祥漢祖殷湯豈非騏驎之類乎觀夏癸商辛嗟其悖惡之甚猶政令不行寒暄失序則猛獸肆毒螽螟為害夏癸商辛豈非猛獸之儔乎予以此觀之豈非天道也雖曰天時抑亦人事成湯之世有七年之旱剪髮為犧千里雨降太戊之時桑穀生朝懼而脩德遂使十有六國重譯而來此豈非人事者也或云為君難為臣不易君處尊高之位執賞罰之權錄人之材因人之力何為不成何求不得此言似易論之實難何者輕凌天地眾精顯其妖忽慢神靈風雨應其暴是以帝乙有雷震之禍殷紂致分砂之災多營池觀遠求異寶民不得耕女不得蚕田荒業廢兆庶凋殘見其飢寒不為之哀覩其勞苦不為之戚苦民之君也非治民之主也薄賦輕傜百姓家給上無急命之徵下有謳歌之詠屈一身之欲樂四海之民憂國之主也樂民之君也此其所以為難也且用人之道又為未易己之所賢未必盡賢眾之所毀未必全惡知能不舉即為失才知惡不黜則為禍胎又人才互有長短不必兼通是以公綽優於大國之卿子產善為小邦之相綘侯木訥卒安劉氏之宗嗇夫利口不任上林之令捨短從長然後為美夫人剛柔之情各異曲直之性不同不可不察也逆主耳而履道戮孔懷以安國周公是也順上心以安身隨君情而殺之易牙是也棄己之命存君之身紀信是也挾國謀事以報公讎袁盎是也損身而執節孤立而自毀屈原是也外顯和穆之端內懷湯火之意宰嚭是也忠謟之道以此觀之足以永鏡白起為秦平趙乃被昭王所殺亞夫定七國之亂卒為景帝所誅文種設策滅吳翻遭越王之戮五員竭誠為國終罹賜劍之禍乃君之過也非臣之罪焉至如趙高韓信黥布陳狶之儔此自貽厥釁非君之濫刑之也高祖失於存功之能光武獲於置將之妙臣安君社稷之國君處臣危亡之地豈是相酬之道也為天下之君處萬民之上安可易乎背道違禮非惟損己乃為賢人之所笑卑身厲行實為君子又為凡夫之所譏越品進官其類必為深怨偏與人語眾以為曲私任使賢良則謂偶委伏凡才則言愚闇數言則謂太繁辭寡則謂道薄恣情忿怒則朝野戰慄留心寬恕則法令不行民樂則官苦官樂則民勞四海之內莫非王土要荒為枝葉畿內為根本古人云皮之不存毛將安傳深根固本之內相而伊尹傳說世所希逢至如鎮積冰之塞守飛雪之邊而魏尚李牧當今罕遇遣人遠撫則眷戀而不忍愍而不遺則枝葉而不存二宜之間致心何所是以晨興夕惕無忘斯事為上猶然何況臣下易云書不盡言言不盡意今略陳梗概以示心之所存耳古語云勞者必歌其事朕非故煩翰墨以見天藻但學以為己聊書所懷想達見群賢不以為嗤也又曰太宗思隋氏失道皇運開基因而序之以明誡慎神筆書石命工刻之以賜皇太子其詞曰昔隋季崩離天綱弛紊波濤沸四海氣霧塞三光鬼哭石言人怨神怒丁壯疲於兵甲老弱斃於飢寒爨骨百城流血千里宮闕變為禾黍中原化為寇場余以弱齡屬當厄運思靜大難以濟蒼生秣馬揮戈風驅電掃剋平八表臨撫萬方聊因暇景載懷興亂歷想前代暗君庸王莫不恃其智力則輕侮聖賢騁其文才則不尊道德縱其口辯以飾非肆其姦言以拒諫昏迷酒色習近讒邪暴疾黎元窮其轍跡傾危莫悟以至滅亡明鏡不遠於焉自鑒又曰魏徵葬日太宗登苑西樓臨路哭祭太宗復為製碑文并御書公卿士庶競來摸寫車馬填噎日有數千時人號其碑為二絕文與書也又曰太宗幸積翠池宴五品以上太宗曰今茲年穀大登水潦不能為害天下既安邊方靜息因此農隙與公等舉酒酒既酣各宜賦一事太宗賦尚書其詞曰日昊翫百篇臨登被五典夏康既逸預商辛亦流湎恣情昏主多剋己明君鮮滅身資累惡成名由積善又曰太宗征高麗廻次營州詔遼東戰死骸骨並集柳城東南有司設太牢以祭之大宗臨哭盡哀從臣無不流淚帝親為文祭之曰忠烈蓋世往賢明軌忘身徇國先哲良規惟爾等懷忠立節重義輕生奮劍提戈摧城陷陣冒鋒刃而不顧赴湯火以如歸殞命戰塲殘形寇壘膏原潤鉞身喪名存搖落寒關遂非生入蒼茫雷野無復餘蹤山川宛其不殊存亡颯焉非昔然則身者今之所重名者後之所貴身乃常有而愚夫怯焉功則難立惟烈士成焉去一生之短期收千載之令譽此聖賢之操也豈直忠勇者乎所以按轡停輿撫膺一慟嘉乃誠節痛爾遺靈酒俎既陳魂其斯享又曰貞觀十一年太宗幸洛陽遣使祭漢太師楊震墓太宗自為文曰惟君資華巖之奇氣稟金方之秀質艷忠篤以成性應時運而挺生彈冠贊務弼諧帝道正色立朝周行以肅坐槐爕理鼎飪載調值安德不昇政由近習氣舛玉衡日微黃道君慨然忠憤乃心王室昌言正議屢犯於逆鱗霜簡且繩志祛於時蠹而運屬陵夷道消賢哲不納嘉猷遂嬰嚴綱方弘至治遽夭天年英傑云亡邦國彌瘁斯乃緬想高蹤可為長歎朕省方班瑞言事東巡瞻墳隧於道周想風徽於前代若使九原可作吾將與歸千載如存依然何遠行潦致屬君其饗之又曰高宗製元首前星維城股肱等誡以示侍臣禮部尚書弘文館學士許敬宗又上表請揔名為天訓并請注解許之及注畢敬宗為之序又曰咸亨中上自製樂章有上元二儀三材四時五行六律七政八風九宮十洲得一慶雲之曲以示群臣令太常行用之又曰咸亨中御書飛白書贊以賜中書門下三品戶部尚書戴至德詞曰汎洪源俟舟楫中書侍郎郝處俊曰飛九霄假六翮吏部侍郎李敬玄曰資啟沃罄丹誠中書侍郎崔知悌曰竭忠節贊皇猷議者以戴郝寬厚而李崔忠勤故上以此言褒美之又曰顯慶中上以琴中雅曲古人歌之近代已來此聲頓絕令所司簡樂工解琴笙者脩習舊曲冬十月辛亥太常上書謹案禮記及家語云舜彈五弦之琴歌南風之詩是知琴操曲弄皆合於歌又張華博物志云白雪是太帝使素女鼓五十絃琴曲名又楚大夫宋玉對襄王云有客於郢中歌楊春白雪國中和者數十人是知白雪琴曲本宜合歌以其調高人和遂寡自宋玉已來迄今千祀未有能歌白雪曲臣今准勑依於琴中舊曲定其宮商然後教習並合於歌輒以御製雪詩為白雪歌詞又按古今樂府奏正曲之後皆別有聲君唱臣和事彰前史輒取侍中許敬宗等奉和雪詩以為送聲各十六節令悉教訖並皆諧韻上善之乃付太常編於樂府又曰玄宗製令長新誡一篇頒賜天下縣令其詞曰我求令長保義下人人之所為必有所因侵漁浸廣賦役不均使夫離散莫保其身徵諸善理寄爾良臣與之革故政在惟新調風變俗背偽歸真教先為富惠恤於貧無大無小以躬以親青旌勸農其唯在勤墨綬行令孰不攸遵曷云被之我澤如春又曰玄宗親製春臺望一章二十八句起居舍人蔡孚奏曰伏見所製氣雄詞美德音相屬鄙炎漢之奢侈徇有唐之儉陋知作勞而居逸念中人之家產用心如此天下斯安臣職在司言請宣示百寮及編國史又曰端午日玄宗自賦詩曰端午臨中夏時清日復良鹽梅已佐鼎麴藥且傳觴事古人留跡年深縷續長當軒知槿茂向水覺蘆香億兆同歸壽群公共保昌忠貞如不替貽厥後昆芳又曰玄宗幸寧王憲宅與諸王宴探韻賦詩上詩曰魯衛情先重親賢受轉多冕旒豐暇日乘景蹔經過戚里申高宴平臺奏雅歌復尋為善樂方驗保山河又曰天寶八載九月甲午是日皇太子生日上製仁孝詩六章親札於步障以賜太子令中官高力士以示朝臣, WYG: ''}
