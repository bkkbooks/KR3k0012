  - {type: variant, offset: 5, length: 94, content: 上尚書皋陶曰帝庸作歌曰勑天之命惟時惟幾乃歌曰股肱喜哉元首起哉百工熙哉皋陶拜手稽首颺言曰念哉率作興事慎乃憲欽哉屢省乃成欽哉乃賡載歌曰元首明哉股肱良哉庶事康哉又歌曰元首叢脞哉股肱隋哉萬事隳哉漢, SBCK: 下唐}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 下御製下唐書曰德宗御中書麟德殿會百寮觀新樂詩仍令皇太子書以示百寮其序曰朕聞天地之德莫大於和萬物以生九功乃叙是以中春之首紀為令節布陽和之政暢亭育之功式宴且觀順時而舉蓋取象於交泰之義也今嵗華載陽嘉雪呈慶君臣同樂實獲我心近以聴政之餘叅比音律播於絲竹韻以歌詩象中和之容作中和之樂教習甫就畢陳於兹於是闢廣庭臨内殿張大㑹示羣臣干籥成文威儀有序禮情備浹中心是嘉}
