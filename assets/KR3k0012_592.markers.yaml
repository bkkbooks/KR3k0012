  - {type: variant, offset: 170, length: 341, content: 求賢詔曰蓋有非常之功必待非常之人故馬或奔踶而致千里士或有負俗之累而立功名夫泛駕之馬弛斥之士亦在御之而已泛覆也方腫反弛廢也斥逐也其令州縣察吏民有茂才異等可為將相及使絕國者又曰武帝幸河東祠后土顧帝京欣然中流與君臣宴飲上歡甚乃自作秋風辭云秋風起兮白雲飛草木黃落兮鴈南歸蘭有秀兮菊有芳攜佳人兮不能忘泛樓舡兮濟汾河橫中流兮揚素波蕭鼓鳴兮發棹歌歡樂極兮哀情多少壯幾時兮柰老何後漢書東平憲王蒼傳曰顯宗以所自作光武本紀示蒼蒼因上世祖受命中興頌上甚善之令校書郎賈逵為之訓解又曰顯宗自制五家要說章句令桓郁定於宣明殿華嶠書曰帝自制五行章句此言五家即謂五行之家也魏志曰武帝御軍三十餘年手不捨書晝講軍策夜則思經傳登高必賦遇物必詩及造詩被之管弦皆成樂章魏志曰文帝行幸廣陵故城臨江觀兵戎卒十餘萬旌旗數百里帝馬上為, WYG: 栢梁}
