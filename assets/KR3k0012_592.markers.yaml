  - {type: variant, offset: 2057, length: 450, content: 情遊獵馳騁之人遠臻存意管弦鄭衛多進降懷脂粉燕趙斯來塞切直之路為忠者必少開謟諛之道為佞者必多古人云君猶器也民猶水也方圓在於器不在於水以此而言足為永戒夫玉不琢不成器人不學不知道仲尼好於郯子文王學於虢叔聖人且猶如此何況於凡人乎治主思賢如農夫之望歲哲后求人若旱苗之思雨亂君嫉勝己如讎視不肖如子懷之中心何日暫忘王莽偽行仁義之道有始無終孫皓權施恩惠之風有初無末二子猶舡之汎巨浪毀在不遙若駑馬之奔千里困其將至古人云升量不以盛碩小智不可謀大巧詐不如拙誠信無廖矣有明主有暗主漢祖攝衣於酈生比干剖心於辛紂殷湯留情於伊尹龍逢被戮於夏桀楚莊暇隙而懷憂武侯罷朝而含喜闇主護短而永愚明主思短而長善覩漢祖殷湯仰其有德行譬若陰陽調四時會法令均萬民樂則騏驎呈其祥漢祖殷湯豈非騏驎之類乎觀夏癸商辛嗟其悖惡之甚猶政令不行寒暄失序則猛獸肆毒螽螟為害夏癸商辛豈非猛獸之儔乎予以此觀之豈非天道也雖曰天時抑亦人事成湯之世有七年之旱剪髮為犧千里雨降太戊之時桑穀生朝懼而脩德遂使十有六國重譯而來此豈非人事者也或云為君難為臣不易君處尊高之位執賞罰之權錄, SBCK: 任}
