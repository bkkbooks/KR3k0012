  - {type: variant, offset: 117, length: 0, content: '', WYG: 識君恨不早我家柱石衰憂來學邱禱又曰文宗開成中駕幸龍首池觀内人賽雨自春不雨上孜孜憂勤徧禮羣望至是甘澤屢降中外感悦上賦詩喜雨云風雲方際會雷雨遂流滋薦幣虛陳禮動天實精思漸侵九夏節復在三春時霢霂垂朱闕飄颻入緑墀郊埛既霑足黍稷有豐期百辟同康樂萬方佇雍熙宰臣洎文武百官咸屬和焉家語曰昔者舜彈五絃之琴造南風之曲其辭曰南風之薰兮可以解吾民之愠兮薰風至之貌也南風之時兮可以阜吾民之財兮財得其時阜盛穆天}
