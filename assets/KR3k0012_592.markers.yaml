  - {type: variant, offset: 3444, length: 434, content: 騁其文才則不尊道德縱其口辯以飾非肆其姦言以拒諫昏迷酒色習近讒邪暴疾黎元窮其轍跡傾危莫悟以至滅亡明鏡不遠於焉自鑒又曰魏徵葬日太宗登苑西樓臨路哭祭太宗復為製碑文并御書公卿士庶競來摸寫車馬填噎日有數千時人號其碑為二絕文與書也又曰太宗幸積翠池宴五品以上太宗曰今茲年穀大登水潦不能為害天下既安邊方靜息因此農隙與公等舉酒酒既酣各宜賦一事太宗賦尚書其詞曰日昊翫百篇臨登被五典夏康既逸預商辛亦流湎恣情昏主多剋己明君鮮滅身資累惡成名由積善又曰太宗征高麗廻次營州詔遼東戰死骸骨並集柳城東南有司設太牢以祭之大宗臨哭盡哀從臣無不流淚帝親為文祭之曰忠烈蓋世往賢明軌忘身徇國先哲良規惟爾等懷忠立節重義輕生奮劍提戈摧城陷陣冒鋒刃而不顧赴湯火以如歸殞命戰塲殘形寇壘膏原潤鉞身喪名存搖落寒關遂非生入蒼茫雷野無復餘蹤山川宛其不殊存亡颯焉非昔然則身者今之所重名者後之所貴身乃常有而愚夫怯焉功則難立惟烈士成焉去一生之短期收千載之令譽此聖賢之操也豈直忠勇者乎所以按轡停輿撫膺一慟嘉乃誠節痛爾遺靈酒俎既陳魂其斯享, SBCK: 忡忡唱予和汝式示深􅂨}
