  - {type: variant, offset: 628, length: 1, content: 帝, WYG: 初平之元董卓弑主鴆后蕩覆王室是時家家思亂人人自危名豪大俠富室强族飄揚雲㑹萬里相赴兖豫之師戰於滎陽河内之甲軍於孟津卓遂遷大駕西都長安而山東大者連郡國中者嬰城邑小者聚阡陌百姓死亡暴骨如莽時余年五嵗上以世方擾亂教余學射六嵗而知射又教余騎馬八嵗而能騎射矣是以少}
  - {type: variant, offset: 630, length: 1, content: 文, WYG: 弓馬于今不衰建安十年始定冀州濊貊貢良弓燕代獻名馬時嵗之暮春弓燥手柔草淺獸肥與族兄子丹獵于鄴西終日手獲獐鹿九雉兎三十余又}
