  - {type: variant, offset: 3881, length: 3, content: 觀十一, SBCK: 元中上賜群臣㑹宴于曲江上令中使劉希昻宣慰上賜詩曰令節曉澄霽四郊煙靄空天清白露㓗菊散黃金叢寡德荷􅀇貺順時休百工豈懷歌鍾樂思與君臣同至化在亭育相成資始終未知康衢詠所仰唯}
  - {type: variant, offset: 3881, length: 3, content: 觀十一, krp: 元中上賜群臣㑹宴于曲江上令中使劉希昻宣慰上賜詩曰令節曉澄霽四郊煙靄空天清白露㓗菊散黃金叢寡德荷玄貺順時休百工豈懷歌鍾樂思與君臣同至化在亭育相成資始終未知康衢詠所仰唯}
  - {type: punctuation, offset: 3885, content: ，, id: KR3k0012_CHANT_592-bkkpn942}
  - {type: 'tls:seg', offset: 3885, content: '', id: KR3k0012_CHANT_592-24a.4}
  - {type: variant, offset: 3885, length: 204, content: 太宗幸洛陽遣使祭漢太師楊震墓太宗自為文曰惟君資華巖之奇氣稟金方之秀質艷忠篤以成性應時運而挺生彈冠贊務弼諧帝道正色立朝周行以肅坐槐爕理鼎飪載調值安德不昇政由近習氣舛玉衡日微黃道君慨然忠憤乃心王室昌言正議屢犯於逆鱗霜簡且繩志祛於時蠹而運屬陵夷道消賢哲不納嘉猷遂嬰嚴綱方弘至治遽夭天年英傑云亡邦國彌瘁斯乃緬想高蹤可為長歎朕省方班瑞言事東巡瞻墳隧於道周想風徽於前代若使九原可作吾將與歸千載如存依然何遠行潦致屬君其饗之, SBCK: 豐}
