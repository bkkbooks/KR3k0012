  - {type: variant, offset: 101, length: 12, content: 高祖還歸過沛置酒沛宮悉召, WYG: 君臣道合二曰辨邪正三曰戒權倖四曰戒微行五曰任賢臣六曰納忠諫七曰慎征伐八曰戒刑法九曰去奢泰十曰崇節儉十一曰奬忠直十二曰修徳政十三曰諫畋獵十四曰録勲賢分為上下卷上自製其目曰前代君臣事迹至是以其書寫於屏風六扇至中書宣示宰相李藩裴􅀈曰朕近撰此屏風常所觀覽}
