  - {type: variant, offset: 3026, length: 3, content: 所笑卑, SBCK: 情欲誠必著清己之慮心無億詐事必忠恕凢將有爲靡不三思喜怒以節動静以時毫􅁵或差禍害亦隨慢易於􅀄悔其曷追刑不可長武不可恃作威逞力厲階斯起垂旒蔽聦黈䌙塞耳含弘光大是以爲羙覆之如天愛之如子仁心感人率土自理嗟余寡昧嗣守丕圖㓂戎荐興德化未敷業業兢兢其敢以愉俯察物情上稽典謩作斯式言寘于座隅其台衡銘曰天列台星垂象于人聖人則天亦立輔臣以翼以佐爲衡爲鈞如耳目應心如股肱運}
