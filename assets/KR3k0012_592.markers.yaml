  - {type: variant, offset: 448, length: 427, content: 餘年手不捨書晝講軍策夜則思經傳登高必賦遇物必詩及造詩被之管弦皆成樂章魏志曰文帝行幸廣陵故城臨江觀兵戎卒十餘萬旌旗數百里帝馬上為詩曰觀兵臨江水水流何湯湯戈矛成山林玄甲曜日光猛將懷暴怒膽氣正縱橫誰云江水廣一葦可以航不戰能屈敵戢兵稱賢良古公宅歧邑實始剪殷商孟子營虎牢鄭人懼稽顙充國務耕植先零自破亡興農淮甸間築室都徐方量運宜權略六軍咸悅康豈如東山詩悠悠多悲傷魏文帝紀曰帝好文學以著述為務自所勒成垂百篇又使諸儒撰集經傳隨類柤從凡百篇號曰皇覽晉書曰殷仲堪為黃門郎孝武嘗戰士仲堪詩曰勿以己才而笑不才宋書曰高祖過彭城置酒命紙筆為詩曰先蕩臨淄穢卻清河洛塵華陽有逸驥桃林無伏輪於是群才並作也後魏書曰孝文帝雅好讀書手不釋卷五經之義覽之便講學不師授探其精奧史傳百家無不該涉才藻富贍好為文章詩賦銘頌有興而作有大手筆馬上口授及其成也不改一字自太和已後詔策皆帝文也自餘文章百有餘篇三國典略曰周明帝幼而好學詞彩溫麗捃摭眾書自羲農已來訖于魏末敘為世譜凡百卷所著文章十卷行於世後周書曰明帝三, SBCK: ''}
