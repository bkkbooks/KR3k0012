  - {type: variant, offset: 4407, length: 0, content: '', SBCK: 嬰城邑小者聚阡陌百姓死亡暴骨如莽時余年五􅀊上以丗方擾亂教余學射六歲而知射又教余􅀐馬八歳而能􅀐射矣是以少好弓馬于今不衰建安十年始定冀州獩㹮貢良弓燕代獻名馬時歳之暮春弓燥手柔草淺獸肥與族兄子丹獵于鄴西終日手􅀗麞鹿九雉兎三年十餘又學擊劒桓靈時有虎賁王越善斯術河南史何得其法於越余從何學之甚精嘗與平虜將軍劉勲奮威鄧展共飲展有手臂曉五兵法其能空手入白刃時酒後耳熱方食蔗以蔗爲杖下殿}
  - {type: page-break, offset: 4407, content: '', id: KR3k0012_SBCK_592-8b}
  - {type: variant, offset: 4407, length: 0, content: '', krp: 嬰城邑小者聚阡陌百姓死亡暴骨如莽時余年五歲上以丗方擾亂教余學射六歲而知射又教余騎馬八歳而能騎射矣是以少好弓馬于今不衰建安十年始定冀州獩㹮貢良弓燕代獻名馬時歳之暮春弓燥手柔草淺獸肥與族兄子丹獵于鄴西終日手獲麞鹿九雉兎三年十餘又學擊劒桓靈時有虎賁王越善斯術河南史何得其法於越余從何學之甚精嘗與平虜將軍劉勲奮威鄧展共飲展有手臂曉五兵法其能空手入白刃時酒後耳熱方食蔗以蔗爲杖下殿}
  - {type: variant, offset: 4408, length: 1, content: 十, SBCK: 交三中其臂左右大􅀏展意不平更求爲之復正截其顙坐中驚視余還坐􅀏曰昔陽慶使淳于意去其故方授以祕術余亦願鄧將軍􅂢弃故􅇊更受要道也一坐盡歡余於它戯弄之事少所喜唯於彈棊略盡其巧少爲之賦上雅好書籍雖在軍旅手不釋卷每定省從容常言}
