  - {type: variant, offset: 2791, length: 209, content: 安國周公是也順上心以安身隨君情而殺之易牙是也棄己之命存君之身紀信是也挾國謀事以報公讎袁盎是也損身而執節孤立而自毀屈原是也外顯和穆之端內懷湯火之意宰嚭是也忠謟之道以此觀之足以永鏡白起為秦平趙乃被昭王所殺亞夫定七國之亂卒為景帝所誅文種設策滅吳翻遭越王之戮五員竭誠為國終罹賜劍之禍乃君之過也非臣之罪焉至如趙高韓信黥布陳狶之儔此自貽厥釁非君之濫刑之也高祖失於存功之能光武獲於置將之妙臣安君社稷之國君處臣危亡之地豈是相酬之道也為, SBCK: ''}
