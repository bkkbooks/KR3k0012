  - {type: variant, offset: 2540, length: 214, content: 妖忽慢神靈風雨應其暴是以帝乙有雷震之禍殷紂致分砂之災多營池觀遠求異寶民不得耕女不得蚕田荒業廢兆庶凋殘見其飢寒不為之哀覩其勞苦不為之戚苦民之君也非治民之主也薄賦輕傜百姓家給上無急命之徵下有謳歌之詠屈一身之欲樂四海之民憂國之主也樂民之君也此其所以為難也且用人之道又為未易己之所賢未必盡賢眾之所毀未必全惡知能不舉即為失才知惡不黜則為禍胎又人才互有長短不必兼通是以公綽優於大國之卿子產善為小邦之相綘侯木訥卒安劉氏之宗嗇夫利口不任上林之令, SBCK: 器}
