  - {type: variant, offset: 3286, length: 3, content: 為嗤也, SBCK: 人從欲不以枉傷直故百度惟貞萬物作式匪陽不生匪隂不成寛則致慢猛亦取怨酌于大猷戒厥偏見罔咈人志罔興人患邇言必察芻蕘必詢奉無私之心以誠其意廣無情之聽思得其真憙怒有節措置有倫是以令肅如秋化行如春無邇憸人無信側言憸人則敗政側言乃惑聽罔攻異端愼乃出令知人不易在觀其行事實求理法乃因時法非生􅁦聖哲不爲導物􅀋之情以通其變相天地之道咸盡其冝教必明於順動必慮於違是以天覆之德日用不知六馬並馳在鈞衘䇿五音並奏在理金石苟去回邪可行蠻貊因人而理自古不易唐堯赭服夏禹泣辜以弼于理冀遷其愚寕漏吞舟豈求噬膚䧟之於過是曰毒痡天監孔明無臭無聲罔載爾僞必先爾誠蟻壤不防太山可傾患生所急禍起所輕故作事謀始而戒於未形予臨兆人道存化育祇荷􅀇貺幸清九服一夫不􅀗􅀂履深谷思正其源庶登於撲監于徃躅書以自朂}
