  - {type: variant, offset: 1594, length: 0, content: '', WYG: 書曰齊制宫内唯天子紗㡌臣下皆戎㡌特賜平秦王歸彦紗㡌以寵之後周書曰獨孤信在秦州嘗因獵日暮馳馬入城其㡌微側詰旦而吏人有戴㡌者咸慕信而側㡌焉隋書曰後周之時着突騎㡌其製如今垂裙覆帶盖索髪之遺象也又文帝項有瘤疾不欲人見每常着焉相魏之時}
