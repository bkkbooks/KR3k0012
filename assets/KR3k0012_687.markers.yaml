  - {type: variant, offset: 2466, length: 466, content: 會髮也又曰有頍丘弭切者弁實維伊何又曰側弁峨峨屢儛傞傞禮曰三王共皮弁素服又曰祭之日王皮弁以聽祭報又曰太學始教皮弁祭菜示敬道也又曰古者天子諸侯必有公桑大昕之朝君皮弁素積卜三宮夫人桑于公桑左傳曰楚子玉自為瓊弁玉纓未之服也先戰夢河神謂己曰異予予賜汝孟諸之麋又曰天王使劉定公勞趙孟於頴館於洛汭劉子曰美哉禹功明德遠矣微禹吾其魚乎吾與子弁冕端委以治民臨諸侯禹之力也周禮曰司服掌王之吉凶衣服凡兵事韋弁服鄭玄曰以韎韋為弁也春秋傳曰晉郤至衣韎韋之跗注是也眡朝則皮弁服鄭玄曰視朝視內外之事也皮弁之服十五升白布衣積素以為裳也凡甸冠弁服鄭玄曰甸獵也冠弁委貌也其服緇布衣亦積素以為裳諸侯以為視朝之服凡凶事服弁服弁服喪冠也其服斬衰齊衰凡弔事弁絰服弁絰者如爵弁而素加環絰又曰弁師掌王之皮弁會五采玉𤪌象邸玉笄𤪌結也皮弁之縫中貫結五采玉以為飾邸下秪也以象骨為之諸侯及孤卿大夫之冕韋弁皮弁弁絰各以其等為之儀禮曰士冠服爵弁服鄭玄曰此與君祭之服同也穀梁曰弁冠雖舊必加於首周室雖衰必先諸侯家語曰諸侯皮弁以告朔于太廟卒朔然後服之以視朝漢書曰韓延壽為潁川太守令文學校官諸生弁執俎豆, SBCK: 巾􅄄引入華林園}
