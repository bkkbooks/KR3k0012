  - {type: variant, offset: 1003, length: 184, content: 祀天地明堂平冕崔豹古今注云牛亨問曰冕旒如繁露何也荅曰綴而下垂如露之繁多故曰繁露摯氏決疑要注曰秦除六冕之制明帝漢明帝也永平中使諸儒案古文始復造袞冕符子曰龍逢諫桀曰臣觀君之冕非冕冕危石觀君之履非履履春冰未有冠危石而不壓蹈春冰而不陷也陳壽益部耆舊傳曰郭賀拜荊州剌史明帝巡狩到南陽特見嗟嘆賜以三公之服黼黻旒冕勑去幨露冕使百姓見此衣服以彰其德何法盛晉中興曰初中興儀服不備又冕旒飾, SBCK: 交阯蒼梧俗}
