  - {type: variant, offset: 945, length: 7, content: 垂真白珠各十二, SBCK: 漢書曰劉盆子􅊥得符後弃之復還依俠卿俠卿爲制絳單衣半頭赤幘幘巾所以覆髻也續漢書日童子幘无屋示未成人也半頭幘即空頂幘也其上無屋故以爲名董仲舒繁露曰以赤統者幘尚赤盆子承漢統故用赤也東宫故事曰太子有空頂幘一枚即半頭幘之制也東觀漢記曰光武􅀄起與諸李市弓弩絳衣赤幘又曰詔賜叚熲赤幘大冠一具又曰馬援外􅀋儻蕩簡易而内重禮事寡嫂雖在閨内必幘然後見又曰馬援􅀄見帝令中黄門引入上在宣德殿南廡下但幘坐援曰陛下何知臣非刺客姦臣而簡易若是謝承後漢書曰巴祗字敬祖爲楊州刺史黒幘毀壊不復改易以水澡墨傳而用之許愼􅀃文曰澡洗也續漢書曰許劭字子將劭知人入幘肆拔樊子昭􅀽曄漢獻帝春秋曰孫堅屯梁東爲董卓所攻衆少而不敵與其驍􅀐潰圍得出常著赤􅄢幘卓􅀐追堅堅脱􅄢幘令親近將祖茂著之堅從間道得去呉書曰顧悌字子通疾篤妻出省之悌命左右自扶起冠幘加襲令妻還貞潔不黷如此晉書曰􅁃顗字予嵩性儉家冨劉輿􅀃東海王越令就換錢千萬兾其有吝因此可乘越於衆坐中問顗顗頽然巳醉幘墮机上以頭就穿取徐荅云下官家故有兩千萬隨公所取矣輿於是乃服越甚恱又曰昜雄字興長長沙劉陽人也少爲縣吏自念卑賤無由自達乃脫幘挂縣門而去宋書曰檀道濟數拒魏有功及誅憤怒氣盛目光如炬俄爾間引飲一斛乃脫幘投地曰乃壞汝萬里長城齊書曰卞彬字士蔚濟隂死昫人也祖嗣之中領軍父延之弱冠爲上虞令有剛氣㑹稽太守孟彭以令長裁之積不能容脫幘投地曰我所以屈卿者政爲此幘耳今巳投之卿以一世勲門而慠天下國士拂衣而去梁書曰謝舉臨川始興諸王常所遊踐邵陵王綸於婁湖立園廣讌酒後好聚衆賔冠手自裂破投之唾壷皆莫敢言舉嘗預宴王欲取舉幘舉正色曰裂冠毁冕下官弗敢聞命拂衣而退王屢召不反甚有慙色北齊書曰平秦王歸彦額骨三道着幘不安文宣見之怒使以馬鞭擊其額血􅀍面曰爾反時嘗以此骨嚇漢後歸彦竟及云漢官儀曰謁者著緗幘大冠司馬彪續漢書曰梁兾改易輿服之制作平上軿車􅯿幘狹冠也衛宏漢舊儀曰凢齋紺幘耕青幘周遷輿服雜事曰漢桓帝延熈中梁兾誅後京師作幘皆顔短耳長短上長下以爲服祑董巴漢輿服志曰古者有冠無幘秦加其武將首飾爲絳栢以表貴賤後稍作顔題漢興續其顔却結之施巾連題却覆之今䘮幘是也至孝文乃髙顔續爲之耳崇其巾爲屋貴賤皆服之}
