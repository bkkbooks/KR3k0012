  - {type: variant, offset: 1595, length: 0, content: '', WYG: 而謁帝故後周一代將為雅服小朝公宴咸許戴之唐書曰代宗時禁民皂衫壓耳㡌以異官健西京雜記曰趙飛燕為皇后弟在昭陽殿遺飛燕書曰令月嘉辰貴姊懋膺}
  - {type: variant, offset: 1596, length: 0, content: '', WYG: 册上遺金花紫綸㡌以陳踴躍孟嘉别傳曰嘉為桓温叅軍九月九日温遊龍山叅僚悉集時佐吏並戎服有風吹嘉㡌墮初不覺良乆如厠温命還之授孫盛紙筆啁之置嘉坐䖏嘉還見之請筆即荅四坐嗟歎幽明録曰安開者安成之俗師也善於幻術時王凝之為江州向王當行陽為王刷}
  - {type: page-break, offset: 1596, content: '', id: KR3k0012_WYG_687-10b, image: WYG0899/WYG0899-0168d.png}
  - {type: variant, offset: 1597, length: 21, content: 纓纓裾至腰張融笑之曰北國士大夫帽裾亦有等級, SBCK: ''}
  - {type: variant, offset: 1597, length: 3, content: 纓纓裾, WYG: 簮荷葉以為㡌與王着當時亦不覺㡌之有異到座之後荷葉乃見舉坐驚駭魏文帝與劉􅁮書曰劉生帽裁製微不長有似里父之服孟達與諸葛亮書曰貢白綸帽一顔以示微意劉謐賦曰頭戴鹿心帽足著狗皮靴面𫝊黄灰澤髻挿無著花男女四五人皆如燒蝦蟆東晳近遊賦曰㡌引四角之縫裙有三條之殺又曰老公戴合歡之㡌少年着叢角之巾巾釋名曰巾謹也二十成人士冠庻人巾當自謹修四教也方言曰覆結謂之幘巾或謂之承露巾或謂覆髮巾也續漢書曰鉅鹿張角自稱天師弟子數十萬人始起兵皆着黄巾以相識别故世謂黄巾賊後漢書曰光武徴鮑永永疑不}
