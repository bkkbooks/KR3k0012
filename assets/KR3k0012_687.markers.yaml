  - {type: variant, offset: 103, length: 139, content: 者女功之始示不忘本不以皮反太古未有禮文之服也又曰冕所以前後邃延者何示進賢退不能也垂旒者示不視邪纊塞耳示不聽讒故水清無魚人察無徒明不尚極知下故禮曰天子玉藻十有二旒前後邃延也世本曰黃帝作旃冕宋均曰通帛為旃冕冠之有旒應劭云周始垂旒也又三禮圖曰黃帝戴黃冕周禮曰弁師掌王之五冕朱裏延紐冕綖, SBCK: 承露或謂}
