  - {type: variant, offset: 1635, length: 149, content: 而已山海經曰拘纓之國一手把纓管子曰桓公親郊管仲詘纓捷衽孟子曰孺子歌曰滄浪之水清兮可以濯我纓楚詞亦同莊子曰昔趙惠文王喜劍太子患之募左右孰能說王左右曰莊子當能太子乃使人以千金奉莊子莊子不受與使者俱往太子曰吾王所見唯劍士蓬頭突鬢冠曼胡之纓短後之衣瞋目而語難王乃說之今大夫必儒服而見王事必大逆莊子曰請為劍服, SBCK: 遂落盡故常垂裙皂㡌}
