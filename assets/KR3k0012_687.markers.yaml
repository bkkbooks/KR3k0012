  - {type: variant, offset: 1560, length: 0, content: '', SBCK: 左光禄開府儀同三司侍中如故尚之在家常着鹿皮㡌及拜開府天子臨軒百僚陪位沈慶之於殿庭戯之曰今日何不着鹿皮冠蕭子顯齊書曰東昏侯自造遊宴之服綴以花采錦繡群小又造四種㡌㡌因勢爲名一曰山鵲歸林者詩曰鵲巢夫人之德東昏寵嬖滛亂故鵲反藪二曰兎度坑天意言天下將有逐兎之事也三曰反􅅞黄離嘍黄口小鳥也反􅅞之應也四曰鳯凰度三橋鳯凰者嘉瑞三橋梁王宅處也又曰永明中蕭諶開􅀶風㡌後裠之製又爲破後帽丗祖崩後建謀廢立誅滅諸王又曰茹法亮呉興武康人也爲前軍延昌殿爲世祖隂室藏諸御髙宗即位開隂室出世祖白紗㡌防身刀法亮歔欷流涕又曰徐龍駒常住含章殿着黄綸㡌􅀍貂裘南面向案代帝書勑又曰䂊章王嶷妃􅁃氏嘗有疾瘳上幸嶷邸後堂設金石樂宫人畢至登桐臺使嶷著烏紗㡌因極宴盡歡梁書曰到漑嘗夢武帝遍見諸子至湘東而脫㡌與之於是宻敬事焉又曰􅀄賀革之江陵也意甚不恱過別御史中丞江革以情告之荅曰吾常夢主上遍見諸子唯至湘東王所手脫㡌以與之此人後必當璧卿}
