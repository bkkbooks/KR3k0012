  - {type: variant, offset: 245, length: 679, content: 紐小鼻貫所貫五採繅十有二就繅合五色絲為之垂之延之前後各十有二所謂邃延也就成也繩之每一匝而貫五采土十二斿則十二王也又曰司服掌王之服祀昊天上帝則大裘而冕祀五帝亦如之六服同冕享先王則袞冕享先公射享則鷩冕祀四望山川則毳冕祭社稷五祀則絺冕祭群小五祀則玄冕禮曰有虞氏皇而祭周人冕而祭皇冕屬畫羽飾之又曰諸侯冕而舞大武諸侯之僣禮也又曰王戴冕璪十有二旒則天數也又曰玄冕齋戒鬼神陰陽也陰陽夫婦又曰天子之冕朱綠藻十有二諸侯九上大夫七下大夫五士三此以文為貴也又曰魏文侯問於子夏曰吾端冕而聽古樂則唯恐臥鄭玄曰端玄衣又曰君子端冕則有敬色大戴禮曰古者冕而前旒所以蔽明黈纊塞耳所以揜聽也書曰王麻冕黼裳由賓階隮鄭玄曰三十升布冠也卿士邦君麻冕蟻裳入即位蟻謂色玄也太保太史太宗皆麻冕彤裳左傳曰晉士會帥師滅赤狄晉侯請于王以冠冕命士會將中軍且為太傅又曰公還及方城季武子使公冶問問公起居公冶季氏屬大夫公與公冶冕服以卿玄冕賞之固讓而後受公冶疾聚其臣曰我死必無以冕服歛非德賞也言公畏季氏而賞其使非以我有德又曰王使詹桓伯辭於晉曰我在伯父猶衣服之有冠冕木土之有本源民人之有謀主伯父若裂冠毀冕拔本塞源專棄謀主雖戎狄其何有余一人論語曰子曰禹吾無間然矣菲飲食而致孝乎鬼神惡衣服而致美乎黼冕又曰子曰行夏之時乘殷之輅服周之冕又曰麻冕禮也今也純儉吾從眾國語曰周襄王賜晉文公命晉侯端委而入大宰以王命命之冕服內史贊之三命而後即冕服家語曰子路問於孔子曰有人於此被褐而懷玉如何子曰國無道隱者可也國有道則袞冕而執玉五經通義曰冕制奈何禮器曰冕冠長六寸廣八寸員前冕緇布在上五采組十二旒夏殷之冕如周制矣其旒色異夏冕黑白赤組旒殷冕黑黃青組旒, SBCK: ''}
