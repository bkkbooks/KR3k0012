  - {type: variant, offset: 1820, length: 0, content: '', SBCK: 唐書曰代宗時禁民皂衫壓耳㡌以異官徤西京雜記曰趙飛燕爲皇后其弟在昭陽殿遺飛燕書曰今月嘉辰貴姉懋膺大􅉺上遺金花紫綸㡌以陳踴躍孟嘉别傳曰嘉爲桓温叅軍九月九日温遊龍山叅僚悉集時佐吏並戎服有風吹嘉㡌墮􅀄不覺良乆如厠温命還之授孫盛􅁓筆啁之置嘉坐處嘉還見之請筆即荅四坐嗟歎幽明録曰安開者安成之俗師也善於㓜術時王凝之爲江州向王當行陽爲王刷頭簮荷葉以爲㡌與王著當時亦不覺帽之有異到座之後荷葉乃見舉坐驚駭王不知魏文帝與劉曄書曰劉生㡌裁製微不長有似里父之服孟逵與諸􅁑亮書曰貢白綸㡌一顔以示微意劉謐之下野賦曰頭戴鹿心㡌足著狗皮靴靣傳黄􅁅滓髻挿蕪菁花男女四五人皆如燒蝦䗫束晳近遊賦曰㡌引四角之縫裠有叁條之殺又曰老公戴合歡之㡌少年著蕞角之巾巾釋名曰巾謹也二十成人士冠庶人巾當自謹修四教也方言曰兩􅃨結謂之幘巾或謂之承露巾或謂覆髪巾也續漢書曰鉅鹿張角自稱天師弟子數十萬人始起兵皆著黄巾以相識别故世謂黄巾賊後漢書曰光武徴鮑永永疑不至及更始亡乃發去上將軍列侯印綬悉罷兵但幅巾與諸將詣河内幅巾謂不著冠但幅巾束}
