  - {type: variant, offset: 3126, length: 6, content: 石季龍宮婢數, SBCK: 皇后出女􅀐一千爲鹵簿冬月皆着紫綸巾孰錦袴褶郭林宗別傳曰林宗嘗行陳梁間遇雨故其巾一角坫而折二國學士著巾莫不折其角云作林宗巾其見儀則如此傅子曰漢末王公多以幅巾爲雅是以􅀽紹之徒雖爲將帥皆著縑巾張華博物志曰魏文帝彈棊能用手巾角時有一書生又能低頭以所冠􅁑巾角撇棊羊祜與從弟護軍書曰年已朽老旣定邊事當角巾東路還歸郷里接離郭璞注爾雅曰白鷺翅上有長翰毛江東取爲接離世􅀃曰山簡爲荆州時酣暢人爲之歌曰山公時一醉逕造髙陽池日暮倒戴歸酩酊無所知時復乗駿馬倒著白接離舉手謝􅁑強何如并州兒髙陽池在襄陽強是其愛將并州人也鄣日晉八王故事曰􅀄趙王倫將簒位洛下童謡曰屠􅂫鄣日覆兩耳當有瞎兒作天子于時啇農通著大裁障日倫實眇目也孫楚謝牋曰大恩賜鄣日其器雖小而禮遇甚弘昔衛綰錫六劒珎而不用楚雖不敏且受而藏之太平御覽卷第六百八}
  - {type: page-break, offset: 3126, content: '', id: KR3k0012_SBCK_687-9a}
  - {type: page-break, offset: 3126, content: '', id: KR3k0012_SBCK_687-9b}
  - {type: variant, offset: 3126, length: 6, content: 石季龍宮婢數, WYG: 皇后出女騎一千為鹵簿冬月皆着紫衣巾熟錦袴褶郭林宗别傳曰林宗嘗行陳梁間遇雨故其巾一角霑而折二國學士着巾莫不折其角云作林宗巾其見儀則如此傳子曰漢末王公多以幅巾為雅是以袁紹之徒雖為将師皆着縑巾張華愽物志曰魏文帝彈棋能用手巾角時有一書生又能低頭以所冠葛巾角撇棋羊祜與從弟䕶書曰年已朽老既定邊事當角巾東路還歸鄉接離郭璞注爾雅曰白鷺翅上有長翰毛江東取為接離世說曰山簡為荆州時出酣暢人為之歌曰山公時一醉逕造髙陽池日暮倒載歸酩酊無所知時復乗駿馬倒着白接離舉首謝葛强何如并州兒髙陽池在襄陽强是其愛將并州人也鄣日晉八王故事曰初趙王倫將篡位洛下童謡曰屠蘇鄣日覆兩耳當有瞎兒作天子于時商農通着大裁彰日倫實眇目也孫楚謝牋曰日承恩賜鄣日其器雖小而禮遇甚𢎞昔衛綰錫六劔珍而不用楚雖不敏且受而藏之太平御覽卷六百八}
