  - {type: variant, offset: 900, length: 697, content: 升詩曰或獻或酢洗爵奠斝禮曰醆斝及尸君非禮也是謂僣君醆斝先王之爵也又曰季夏六月魯以禘禮祀周公爵用玉琖仍雕左傳曰齊侯伐燕燕人賂以瑤甕玉櫝斝耳斝耳玉爵也不克而還又曰鄭火裨竈言於子產曰若我用瓘斝玉瓚鄭必不火子產不許曰天道遠人道邇非所及也竈焉知天道錘孔叢子曰平原君強子高酒曰昔有遺諺堯舜千鍾孔子百觚子路嗑嗑音闔日飲百榼吾子何辤焉子高曰以予所聞賢聖以道德兼人未聞以飲食也沈約宋書曰蕭思話常從太祖登鍾山中道有盤石清泉上使於石上彈琴因賜以銀鍾酒曰相賞有松石間意涼州記曰胡安據等發張駿冢得馬瑙鍾論衡曰文王飲千鍾孔子百觚若酒用千鍾則肉宜百牛酒用百觚則肴宜用千羊則文王身如防風孔子體如長狄乃能堪之瓚三禮圖曰主瓚受四升徑八寸形如盤其柄以圭有流前注書曰平王錫晉文侯秬鬯圭瓚孔安國曰以圭為枘柄謂之圭瓚也詩曰氂爾珪瓚秬鬯一卣音酉又曰瑟彼玉瓚黃流在中玉瓚圭瓚也圭瓚文狀以圭為柄黃金為勺青金為外朱中央周禮曰祼音貫圭有瓚鄭司農云於圭頭為器可以挹鬯祼之祭謂之瓚也漢禮瓚盤大徑三升口徑八寸下有盤口經一尺也又曰祼圭尺有二寸有珪以祀宗廟也禮曰賜珪瓚然後祭又曰祀周公於太廟灌用玉瓚大圭瓚形如盤容五升以大圭為柄是謂圭瓚白虎通曰圭瓚者器之名所以受灌之器以圭瓚飭其柄樽彝說文曰樽酒器也罍龜目酒尊也木刻為雲象其施不窮爾雅曰彝卣罍器也皆酒尊彝其名也卣中尊也易曰樽酒簋二用缶納約自牖終無咎書曰用賚爾秬鬯一卣卣中尊也詩曰我姑酌彼金罍惟以不永懷周禮曰司尊彝掌六尊六彝之位春祠夏禴祼用雞彝鳥彝皆有舟其朝獻用兩獻音娑尊其再獻用兩象尊皆有罍秋嘗冬蒸祼用斝彝黃彝皆有舟其朝獻用兩箸直略切尊其饋獻用兩壺尊皆有罍彝亦尊也彝法也言為法之正也雞彝鳥彝謂刻而畫之為雞鳳之形也, SBCK: 彛}
