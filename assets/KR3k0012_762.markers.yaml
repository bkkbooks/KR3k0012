  - {type: variant, offset: 3301, length: 1, content: 韓, SBCK: 曰王戎爲司徒好治産業周遍天下水碓四十所鄴中記曰解飛者石虎時工人造作旃檀車左轂上置磑右轂上置碓每行十里磨麥一石春米一斛丗本曰公輸般作磑諸葛亮別傳曰孫權常饗蜀使費椲音揮停食䴵索筆作麥賦恪亦請筆作磨賦異􅁐曰上黨侯亮之於江都城下獲一石磨下有銅馬幽明録曰廣陵有家相傳漢江都王逮之墓也常有村人行過見地有數十具磨取一具持歸暮即叩門求磨甚急明且送着故處抱朴}
