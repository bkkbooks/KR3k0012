  - {type: 'tls:seg', offset: 3297, content: '', id: KR3k0012_CHANT_762-59a.10}
  - {type: variant, offset: 3297, length: 0, content: '', SBCK: 宅遂清安魏武上獻帝表曰臣􅃝騰有順帝賜噐今上藥杵臼一具堪與砧同爾雅曰堪謂之榩郭菐曰堪木質也榩音䖍廣雅曰枕質堪也東宫舊事曰太子納妃有石砧一枚又擣衣杵十杵荆州記曰柹歸縣有屈原宅女嬃音湏廟擣衣石猶存漢水記曰有女郎檮衣砧也古樂府詩曰藁砧今何在山上復有山藁砧謂失也碓廣雅曰碓也丁切方言曰碓機陳魏宋楚自􅀜而東謂之柩魏略曰司農王思弘作水碓免歸田里晉書曰魏舒遟鈍質朴不爲郷親所重從叔父吏部郎衡有當丗名猶不知之使守水碓王隱晉書曰石崇有水碓三十區又曰劉頌爲河内太守有公王水碓三十餘區所在遏塞輒爲侵害頌表上封諸民獲便冝又曰衛灌爲太子少傅詔賜園曰水碓不受又曰鄧攸去石勒投李矩借水碓舂於城東晉諸公讃曰征南杜預作連機碓晉陽秋曰給陳留王碓一區幽明録曰弘農徐儉家有一逺來客􅀉􅀫有馬一疋}
  - {type: page-break, offset: 3297, content: '', id: KR3k0012_SBCK_762-6b}
  - {type: page-break, offset: 3297, content: '', id: KR3k0012_SBCK_762-7a}
  - {type: variant, offset: 3297, length: 320, content: 中有丹書韓子曰晉公子重耳過曹僖負羈盛黃金於壺充之以食令人遺公子也說苑曰五大夫願衛人也負壺入井終日灌一區國語曰勾踐召范蠡而問焉曰諺有之曰觥飲不及壺飡言志在觥飲慮不至壺食喻己德小不能遠啚今歲晚矣子將奈何曰臣聞追亡人也蹶而趣之唯恐不及王曰諾遂伐吳神仙傳曰壺公賣藥常懸一壺於坐上日入之後公輒跳入壺中搜神記曰吳王夫差女王悅童子韓重結氣死形見將重入冢取崑崙玉壺與之琴操曰伍員奔吳過漂陽瀨溪見一女擊漂於水中旁有壺漿乃就乞飲飲畢謂女子曰掩夫人壺口女子知其意自投瀨溪而死洗三禮圖曰洗高三尺口徑尺五寸足徑三尺士鐵大夫以上銅為之諸侯白金飭天子黃金飭儀禮曰設洗于阼階東南禮曰其水在洗東祖天地之左海也魏武令曰臨祭就洗以手擬水而不盥以絜為敬未聞擬向不敬之禮吾親受水而盥, WYG: 太平御覽卷七百六十二}
  - {type: page-break, offset: 3297, content: '', id: KR3k0012_WYG_762-13b, image: WYG0899/WYG0899-0677d.png}
