  - {type: variant, offset: 1615, length: 386, content: 獻讀曰犧犧尊飾以翡翠象尊以象鳳皇或曰以象骨飾尊也斝讀為嫁彝畫禾稼也黃彝黃目尊也著尊者著地無足壺尊者以壺為尊禮曰五獻之尊門外缶門內壺君樽瓦甒音武此以小為貴也壺大一石瓦甒瓦大小未聞也易曰樽酒貳用缶也犧樽䟽布鼏音覔樿之善切勺此以素為貴也又曰夫禮之初始諸飲食其燔黍禆音伯豚汙音瓜切尊而抔薄侯切飲鄭玄云汙樽鑿地為撙也杯飲以手掬之也又曰黃目鬱氣之上尊也黃者中目者氣之清明者也言酌於中而清明於外也黃目黃彝也又曰魯李夏六月以禘禮祀周公於太廟尊用犧象山罍鬱尊用黃目犧尊以沙明為畫象骨飾之鬱鬱鬯之器黃目黃彝又曰泰有虞氏之尊也山罍夏后氏之尊也著殷之尊也犧象周之尊也泰用瓦著地無足傳曰犧象不出門喜樂不野合漢書曰梁孝王有罍尊上刻雲雷象也直千金戒後代善寶之王任后聞而欲得之王讓大母李太后曰先王有命無得以樽予音與人他物雖百鉅萬猶自恣任后絕欲得之王讓直使人開府取樽賜任后天子下吏驗問公卿治奏以為不孝讓誅也, SBCK: ''}
