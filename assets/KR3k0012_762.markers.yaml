  - {type: variant, offset: 3045, length: 224, content: 蘭香降張實輒齎元榼馬融奏事曰楚將吳起或遺之一榼酒注之上流使士卒迎流飲其下明不獨也劉伶酒德頌曰止則操巵執觚動則挈榼提壺壺三禮圖曰洗壺受一斛口徑一尺頭高五寸大中身兌音銳下赤漆中元上加青雲氣方壺受一斛腹圜足口方圜壺受一斛腹方足口圜詩曰顯甫餞之清酒百壺周禮曰挈壺氏以令軍井壺所以盛飲故以壺表井中凡軍事懸壺以序聚柝懸壺以為漏也柝竟託禮曰其以乘壺酒賜人亦曰乘壺酒乘壺四壺尊壺者面其鼻鼻在面上言向人也左傳曰晉侯問原守於寺人㪍鞮對曰昔趙襄以壺飧從徑餒而弗食故處原漢, WYG: 碾後魏}
