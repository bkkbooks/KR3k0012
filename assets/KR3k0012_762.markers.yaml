  - {type: variant, offset: 191, length: 0, content: '', SBCK: 禁長四尺廣二尺四寸通局足髙三寸􅃮赤中青雲􅀞䔖苕華飾刻鏤其足爲褰帷之形儀禮曰尊於户間兩甒音武有禁禁承尊之噐名之曰禁因爲酒戒也又曰尊兩壼于房户間斯斯禁禁切地無足也禮曰天子諸侯之尊廢禁大夫士棜禁此以下爲貴也廢猶去也棜斯禁也無足有似於棜或因名之}
