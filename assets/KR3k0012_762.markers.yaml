  - {type: variant, offset: 9, length: 2, content: 觥受, SBCK: 􅈟取四升瓠中破夫婦各一論語曰賢哉回也一簞食一瓢飲在陋巷人不堪其憂爾雅曰康瓠謂之甈孫炎曰康瓠也郭璞曰瓠壷也賈曰寳康瓠是也戰國䇿曰應侯謂秦昭王曰百人輿瓢而趍不如一人持而走疾百人試與瓢瓢必裂今秦國華陽穰侯太后用之秦國必裂矣東宫舊事曰􅃮􅈟爵二銀鏁連長}
