  - {type: variant, offset: 2932, length: 3, content: 元韶字, WYG: 昭武帝營新殿昌黎大棘城縣河岸崩出鐡築杵頭一千一百七十枚永樂民郭陵見之詣闕言狀詔曰經始崇殿而築具出人神允恊之應賜陵爵闗外侯戰國䇿曰智伯攻趙襄子於晉陽沉竈生鼃又曰衞人迎新婦婦入室見臼曰徙之牖下妨徃来者主人羙之河圖曰千嵗之後天可倚杵孟子曰盡信書不如無書吾於武成取二三䇿而已矣仁者無敵於天下以至仁伐至不仁何其血之流杵也吕氏春秋曰伊尹母夢神告之臼出水而東走賈誼書曰黄帝行道炎帝不聽故戰涿鹿之野血流漂杵淮南子曰觧門以為薪塞井以為臼雖小用而所喪大矣桓譚新論曰伏羲制杵臼之利後}
