  - {type: variant, offset: 2002, length: 1055, content: 觀漢記曰王霸擊賊作倡樂賊射營中霸前酒樽霸坐不動又曰章帝時美陽得銅酒樽采色青黃有古文後漢書曰章帝初元七年槐里歧山得銅樽一枚晉起居注曰穆帝升平二年尚書左丞劉兗元會曰彭城計佐虞興發白虎樽而群觀輻湊中蘭臺令史張玄不禁免玄令史沈約宋書曰正旦元會設白虎樽於殿庭樽蓋上施白虎有能獻直言者則發此樽飲酒蓋杜舉之遺式也蓋為白虎疑是後人所加欲令猛如虎無所忌憚也晏子春秋曰晉欲攻齊使范昭觀焉景公觴之范昭曰請君幸樽酌晏子命撤樽革具范昭歸曰齊不可伐也吾欲慚其君晏子知之孔子聞之曰不越於樽俎之間折衝千里也莊子曰市上之人有善戴尊者酒尊也累十尊而行人有與之更者行道未半而以其尊顛又曰百年之木破為犧樽青黃而文之其一斷在溝中比犧樽於溝之斷則美惡有間矣其於失性一也桀跖與魯史行義有間矣然其失性均也又曰純朴不殘孰為犧樽白玉不毀孰為珪璋道德不廢安取仁義淮南子曰百圍之木斬而為犧樽龍虵虎豹曲成文章高誘曰刻為蟠龍伏虎之狀也又曰夫聖人之道猶中衢而設樽耶過者斟酌多少不同各得其所宜又曰夫奉一爵酒不知於邑言其輕也挈石之樽則白汗交流言其重也又況羸天下之憂而任海內之事者乎重於樽亦遠矣風俗通曰坐不移樽俗說几宴飲者移轉樽酒令人訟諍志林曰先代不識犧樽但云沙畫之飾以翠羽至魏明帝時魯郡於地中得齊大夫子尾送女器有犧樽作犧牛形自爾乃知其定形吳越春秋曰闔閭女自殺以銀樽送之鄴中記曰石虎正會殿前有白龍樽作金龍於東箱西向龍口金樽受五十斛涼州記曰胡安據等發張駿陵得白玉樽受三升戴延之西征記曰太極殿中有銅龍長三丈銅樽容三十斛正旦大會龍從土中受酒口吐之於樽中傅玄朝會賦曰跱鳳虎之二樽清酤皆以淵停蔡邕論銘曰漢獲齊侯寶樽于槐里也孫綽陽燧樽銘曰詳觀茲器妙巧奇絕酌焉則注受滿則閉補結切吐寫適會未見其竭滑稽崔浩漢記音義曰滑稽酒器也轉注吐酒終日不已若今之陽燧樽史記曰吳王夫差取子胥尸盛以鴟夷革而浮之江中應劭曰取馬革為鴟夷鴟夷榼形漢書揚雄酒賦曰鴟夷滑稽腹大如壺晝日盛酒人復借酤常為國器託於屬車榼說文曰榼酒器也椑音鼙圜榼也左傳曰晉欒鍼使行人執榼承飲造于子童謝承後漢書曰陳茂為豫州別駕與刺史周敞行部到頴川陽翟傳車有美酒一椑敞勑載酒以行茂取椑擊柱破之曰使君傅車榼載酒非宜王隱晉書曰宣帝既滅公孫淵還作榼兩口二種酒持著馬上先飲佳酒塞口而開毒酒與牛金金飲而死北齊書曰元韶字世胄魏室奇寶多入韶家有馬瑙榼容三升玉縫之皆稱西域鬼作也涼州記曰胡安據等發張駿陵得流離榼孔叢子曰子路嗑嗑飲百榼已具鍾門列異傳曰濟北弦起神女來遊車上有壺榼青白流璃五具續齊諧記曰王敬伯夜見一女命婢取酒提一淥沉漆榼曹毗杜蘭香傳曰蘭香降張實輒齎元榼馬融奏, SBCK: 宫舊}
