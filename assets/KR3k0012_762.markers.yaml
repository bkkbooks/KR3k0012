  - {type: variant, offset: 3298, length: 0, content: '', SBCK: 夜驚跳客不安􅀐馬而去一物長丈餘來逐馬後客射之聞如中木聲明日㝷昨路見箭着一碓柵丗􅀃曰王戎旣貴且冨區宅水碓洛下莫比孔融􅁏刑論曰賢者所制或踰聖人水碓之巧勝於斷木掘地王渾表曰洛陽百里内舊不得作水碓臣表上先帝聽臣立碓并􅍴得官地磨􅀃文曰䃺莫佐切石磑也磑音五對切釋名曰磑磨也廣雅曰礱磨也方言曰磑或謂之婕即磨也錯碓切通俗文曰麤曰䃀内刀填音鏤䃺曰硐途棟切磨牀曰􅎥直易切魏略曰諸葛亮爲衝車圍郝昭於陳倉昭以繩繫石磨羂古犬切其衝車魏志曰管輅字公明平原人也徃同村郭思家磑上}
  - {type: page-break, offset: 3298, content: '', id: KR3k0012_SBCK_762-7b}
  - {type: variant, offset: 3298, length: 0, content: '', krp: 夜驚跳客不安騎馬而去一物長丈餘來逐馬後客射之聞如中木聲明日㝷昨路見箭着一碓柵丗說曰王戎旣貴且冨區宅水碓洛下莫比孔融肉刑論曰賢者所制或踰聖人水碓之巧勝於斷木掘地王渾表曰洛陽百里内舊不得作水碓臣表上先帝聽臣立碓并攙得官地磨說文曰䃺莫佐切石磑也磑音五對切釋名曰磑磨也廣雅曰礱磨也方言曰磑或謂之婕即磨也錯碓切通俗文曰麤曰䃀内刀填音鏤䃺曰硐途棟切磨牀曰􅎥直易切魏略曰諸葛亮爲衝車圍郝昭於陳倉昭以繩繫石磨羂古犬切其衝車魏志曰管輅字公明平原人也徃同村郭思家磑上}
