  - {type: variant, offset: 197, length: 702, content: 梓人為飲酒器觚三升獻以爵而酬以觚語曰子曰觚不觚觚哉觚哉孔子曰削觚而志有所念觥不時成或曰觚哉觚哉觚小器耳心不專一尚不時成況於大事也周地圖記曰秦使蒙恬北築長城又於原上築城以觚尊酒而祭有鶉飛止觚上因名鶉觚縣劉伶酒德頌曰止則操巵執觚巵說文曰巵圜器也觛小巵也圜音圓觛音但禮曰父母舅姑之敦音推牟巵𠤷非餕莫敢用史記曰高祖奉玉巵起為太上皇壽漢書曰沛公與項羽會鴻門樊噲居營外聞事急乃持揗直入帳下羽問為誰張良曰沛公驂乘羽曰壯士哉賜巵酒彘肩噲飲酒拔劍切肉食之羽曰復能飲乎曰死且不辭豈憚巵酒韓子曰棠谿空見韓昭侯曰今有白玉巵而無當有瓦巵而有當君渴將何以飲君曰以瓦巵棠谿空曰白王巵至貴君不以飲者以其無當耶君曰然空曰為人君漏泄群臣之語猶玉巵無當也空每見而出昭侯必獨臥惟恐夢言泄於妻妾戰國策曰昭陽為楚伐魏覆軍殺將得八城移師而攻齊陳軫為齊王使見昭陽再拜謝賀戰勝起而曰臣竊譬楚有詞者賜其舍人酒一巵舍人相謂曰數人飲不足一人飲有餘請畫地為虵虵先成者飲酒一人虵先成引酒且飲之乃左手持巵右手畫虵曰吾能為之足足未成一人虵成奪其巵曰虵固無足子安得為之足遂飲酒今子伐齊為虵畫足也淮南子曰霤水足以溢壺榼而江河不能實漏巵鹽鐵論曰川源不能實漏巵魏文帝荅楊脩書曰重惠流離巵昭厚意晉傅咸汙巵賦曰人有遺余琉璃巵者小兒竊弄墮之不潔意既惜之又感寶物之汙辱乃喪其所以為寶況君子行身而可以有玷乎𠤷說文曰𠤷似羹魁柄中有道可以注水纂文曰𠤷水器也儀禮曰嫡入室媵御奉𠤷沃盥左傳曰晉公子過秦秦伯納女五人懷羸與焉奉𠤷沃盥既而揮之𠤷沷盥器揮湔也怒曰秦晉匹也何以卑我國語曰勾踐命諸稽郢行成於吳曰勾踐願請盟一介適女執箕帚以胲姓於王宮一介適男奉𠤷盤以隨諸御胲備也音該醆斝說文曰斝玉爵也或說斝受十, SBCK: ''}
