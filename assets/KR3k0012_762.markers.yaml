  - {type: variant, offset: 3275, length: 1, content: 壺, SBCK: 公沙穆遊太學無資粮乃變服客傭爲吴祐賃舂祐與語大驚遂共定交於杵臼之間後漢書曰梁鴻之妻孟光多力能舉石臼又曰馮衍娶北地任氏女爲妻悍忌不得畜媵妾兒女常自探井臼王隱晉書曰賈后使小黄門孫慮徙􅉖懷太子於坊中不與食乃刼服杏子黒丸其夜薨或傳太子不肯服藥伺至厠以藥杵橦害之喚聲聞於外燕書曰昭武帝營新殿昌􅀺大􅁄城縣河岸崩出䥫築杵頭一千一百七十枚永樂民郭陵見之詣闕言􅃺詔曰經始崇殿而築具出人神允恊之應賜陵爵􅀜外侯戰國䇿曰智伯攻趙襄子於􅀳陽臼竈生鼃於禍切又曰衛人迎新婦婦入室見臼曰徙之牖下妨徃來}
