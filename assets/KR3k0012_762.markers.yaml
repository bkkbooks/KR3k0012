  - {type: variant, offset: 192, length: 2, content: 其尾, SBCK: 耳大夫用斯禁士用棜禁如今方案情悵局食架東宮舊事曰􅃮食架二食厨禮曰大夫七十而有閣閣以板爲之度食物也天子之閣左逹五右達五公侯伯於房中五大夫於閣三士於坫一達夾室大夫言於閣與天子同處天子二五倍諸侯也東宮舊事曰􅃮食厨一具酒臺}
