  - {type: variant, offset: 3286, length: 5, content: 景公遊於紀, SBCK: 伊尹母夢神告之臼出水而東走賈􅁩書曰黄帝行道炎帝不聽故戰􅃰鹿之野血流漂杵淮南子曰解門以爲薪塞井以爲臼雖用小而所喪大矣桓譚新論曰伏羲制杵臼之利後丗加巧因借身以踐碓而利十倍又曰復設機􅀜用驢羸牛馬及役水而舂其利百倍論衡曰春者以杵擣臼杵臼鼔動地動地臨池水河水震蕩夫臼杵木也水與木􅁟三者殊􅀋而相應首相叩動其􅀔然也風俗通曰秦留燕太子丹天爲雨栗厨中杵生􅁏是不然也丗本曰雍父曰作舂杵臼宋志折雍父黄帝名也湘州記曰􅀥陽縣有蔡倫宅宅西有一石臼云是倫舂紙臼荆州記曰長沙醴泉縣有山石空空中有石牀牀頭有臼容五升父老相傳昔有仙人以此合金丹衡山記曰桂英巖上鑿石作臼有鐵杵􅀝置巖畔石臼邊有兩人脚跡名山記曰羅浮山有道士賫䥫臼杵欲合丹未成而仙化丗說曰魏武帝讀曹娥碑云外孫虀臼楊修曰虀臼受辛受辛辤字幽明録曰劉松在家忽見一􅀑杖劒斫之􅀑走松起逐見􅀑在髙山巖室上卧仍徃逼突群􅀑争走遺置藥杵臼及所餘藥因將還家松爲人合藥時臨熟取一經此臼者無不効驗列異傳曰魏郡張舊家巨冨復􅁀衰賣宅與黎陽程應應入居死病相繼賣荆民何文日暮持刀上北堂中至二更有一人長丈餘髙冠黄衣來堂前呼問細􅆎舎中何以有人氣湏􅁷復有一人髙冠青衣次又髙冠白衣問並如前將曙文下堂如向法呼細􅆎問曰黄衣者誰曰金也在堂西壁下青衣者誰曰錢也在堂前井西五歩白衣誰曰銀也在堂東北任下汝誰也曰我也在竈下至明文按次掘之}
