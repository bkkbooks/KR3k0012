  - {type: variant, offset: 192, length: 2, content: 其尾, krp: 耳大夫用斯禁士用棜禁如今方案情悵局食架東宮舊事曰􅃮食架二食厨禮曰大夫七十而有閣閣以板爲之度食物也天子之閣左逹五右達五公侯伯於房中五大夫於閣三士於坫一達夾室大夫言於閣與天子同處天子二五倍諸侯也東宮舊事曰􅃮食厨一具酒臺}
  - {type: variant, offset: 193, length: 1, content: 尾, WYG: 足為褰帷之形儀禮曰尊於戸間兩甒有禁又曰尊兩壺于房戸間斯禮曰天子諸侯之尊廢禁大夫士棜禁此以下為貴也食架東宫舊事曰漆食架二食厨禮曰大夫七十而有閣閣以板為之度食物也天子之閣左逹五右逹五公侯伯房中五大夫於閣三士於坫一酒䑓}
