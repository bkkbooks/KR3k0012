  - {type: variant, offset: 2966, length: 1, content: 胡, WYG: 􅀥陽縣有蔡倫宅宅西有一石臼云是倫舂紙臼荆州記曰長沙醴泉縣有山石空空中有石床床頭有臼容五升父老相𫝊昔有仙人以此合金丹衡山記曰桂英巖上鑿石作臼有鐵杵倚置巖畔石臼邊有兩人脚跡名山記曰羅浮山有道士齎鐡臼杵欲合丹未成而仙化世説曰魏武讀曹娥碑曰外孫虀臼楊修曰虀臼受辛受辛辭字幽明録曰劉松在家忽見一鬼㧞劔斫之鬼走松起逐見鬼在髙山巖石上卧乃徃逼突群鬼争走遺置藥杵臼及所餘藥因將還家松為人合藥一經此臼者無不效魏武上獻帝表曰臣祖騰有順帝賜器今上藥杵臼一具碪與砧同爾雅曰碪謂之榩郭璞曰碪木質也榩音䖍廣雅曰枕質椹也東宫舊事曰太子妃有石砧一枚又擣衣砧杵十枚荆州記曰秭歸縣有屈原宅女嬃音湏廟擣衣石猶存漢水記曰有女郎擣衣砧也古樂府詩曰稿砧今何在山上復有山稿砧謂夫也碓廣雅曰􅀈碓也方言曰碓機陳魏宋楚自闗而東謂之梴磑或謂之䃀魏畧曰司農王思𢎞作水碓免歸田里晉書曰魏舒遲鈍質朴不為鄉親所重從叔父吏部郎衡有當世名猶不知之使守水碓王隱晉書曰石崇有水碓三十區又曰劉頌為河内太守有公王水碓三十餘區所在遏塞輙為侵害頌表上封之民始便焉又曰衞瓘為太子少傅詔賜園田水碓不受又曰鄧攸去石勒投李矩借水碓舂於城東晉諸公讃曰征南杜預作連機碓晉陽秋曰給陳留王碓一區幽明録曰𢎞農徐儉家有一逺来客寄宿有馬一匹中夜驚跳客不}
