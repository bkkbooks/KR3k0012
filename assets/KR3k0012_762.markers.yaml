  - {type: variant, offset: 2532, length: 355, content: 爾乃知其定形吳越春秋曰闔閭女自殺以銀樽送之鄴中記曰石虎正會殿前有白龍樽作金龍於東箱西向龍口金樽受五十斛涼州記曰胡安據等發張駿陵得白玉樽受三升戴延之西征記曰太極殿中有銅龍長三丈銅樽容三十斛正旦大會龍從土中受酒口吐之於樽中傅玄朝會賦曰跱鳳虎之二樽清酤皆以淵停蔡邕論銘曰漢獲齊侯寶樽于槐里也孫綽陽燧樽銘曰詳觀茲器妙巧奇絕酌焉則注受滿則閉補結切吐寫適會未見其竭滑稽崔浩漢記音義曰滑稽酒器也轉注吐酒終日不已若今之陽燧樽史記曰吳王夫差取子胥尸盛以鴟夷革而浮之江中應劭曰取馬革為鴟夷鴟夷榼形漢書揚雄酒賦曰鴟夷滑稽腹大如壺晝日盛酒人復借酤常為國器託於屬車榼說文曰榼酒器也椑音鼙圜榼也左傳曰晉欒鍼使行人執榼承飲造于子童謝承後漢書曰陳茂為豫州別駕與刺史周敞行部到頴川陽翟傳車有美酒一椑敞勑載酒以行茂取椑擊柱破之曰使君傅車榼載酒非宜, WYG: 操井臼}
