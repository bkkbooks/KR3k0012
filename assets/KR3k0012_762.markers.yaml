  - {type: variant, offset: 2968, length: 5, content: 據等發張駿, WYG: 騎馬而去一物長丈餘来逐馬後客射之聞如中水聲明日尋昨路見箭著一碓栅世說曰王戎旣貴且富區宅水碓洛下莫比孔融肉刑論曰賢者所制或踰聖人水碓之巧勝於斷木掘地王渾表曰洛陽百里内舊不得作水碓臣表上先帝聽臣立碓并􅍴得官地磨說文曰䃺石磑也釋名曰磑磨也廣雅曰礱磨也䃀也方言曰磑或謂之磨通俗文曰麤曰䃀取内切填音鎮䃺曰硐逢棟切磨牀曰摘魏畧曰諸葛亮為衝車圍郝昭於陳倉昭以繩繋石磨羂古犬切其衝車魏志曰管輅字公明平原人也徃同村郭思家碓上有鳩食相閗輅曰不祥明日射鳩悞中隣女蜀志曰許靖為從弟劭所排擯以馬磨自給晉書曰王戎為司徒好治産業周遍天下水碓四十所鄴中記曰解飛者石虎時工人作旃檀車左轂上置碓右轂上置磑每行十里磨麥壹石㫪米一斛世本曰公輸般作磑諸葛亮别傳曰孫權常饗蜀使費禕停食䴵索筆作人賦禕亦請筆作磨賦異苑曰上黨侯亮之於江都城下獲一石磨下有銅馬幽明録曰廣}
