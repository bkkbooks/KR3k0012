  - {type: variant, offset: 258, length: 1, content: 改, SBCK: 將軍呉子陽等救郢州六月子陽進據加湖去郢三十里傍山帶水築壘以自固七月髙祖命王茂潜師襲加湖俄而大潰子陽􅇡走衆盡溺于江王茂虜其餘而旋郢城主程茂以城降髙祖又遣軍主唐脩期攻隋郡並尅之司州刺史王僧景遣子入質司部悉平八月天子遣黄門勞軍九月詔髙祖平定東夏並以便宜從事是月豫州刺史申胄弃姑熟走大軍進據之遣曹景宗蕭頴逹領馬歩進頓江寜東昏遣李居士率歩軍迎戰景宗擊走之大軍次新林命王茂進據越城曹景宗據皂莢橋十月東昏又遣征虜將軍王珍國等列陣於航南大路精手利器尚萬人閹人王倀楮羊切子持白虎幡督率諸軍王茂曹景宗等掎居綺切角奔之鼓噪震天地珍國之衆一時土崩諸軍望之皆潰茂軍追至宣陽門李居士以新亭壘徐}
  - {type: page-break, offset: 258, content: '', id: KR3k0012_SBCK_132-3a}
