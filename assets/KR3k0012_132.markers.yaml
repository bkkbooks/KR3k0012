  - {type: variant, offset: 3323, length: 3, content: 八歲改, WYG: 四十九賊偽諡曰明皇帝廟稱高宗明年三月王僧辯率百官奉梓宫升朝堂世祖追崇為簡文皇帝廟曰太宗塟莊陵梁書曰太宗見幽縶題壁自序云有梁正士蘭陵蕭世讚立身行道終始如一風雨如晦雞鳴不已弗欺暗室豈凂三光數至於此命也如何又為連珠二首文甚悽愴蕭繹梁書曰世祖孝}
