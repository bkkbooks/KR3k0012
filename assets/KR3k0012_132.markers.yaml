  - {type: 'tls:seg', offset: 3332, content: '', id: KR3k0012_CHANT_132-4a.195}
  - {type: variant, offset: 3332, length: 0, content: '', WYG: 徙為都督荆雍湘司郢等九州諸軍事鎮西將軍荆州刺史三年三月侯景寇沒京師太子舍人蕭歆至江陵宣密詔以世祖為侍中假黄鉞}
  - {type: variant, offset: 3333, length: 1, content: 赦, WYG: 都督中外諸軍事司徒承制餘如故是月世祖徴兵於湘州湘州刺史河東王譽拒而不遣七月遣世子方等帥衆討譽戰敗又遣將軍鮑泉討譽九月雍州刺史岳陽王詧舉兵反來寇江陵世祖嬰城拒守詧將杜崱及楊混各率其衆來降詧遁走鮑泉攻湘州不尅又遣左衞將軍王僧辯伐之大寳元年五月王僧辯尅湘州斬河東王譽湘州平二年二月魏遣使來聘三月侯景悉兵西上㑹任約軍王僧辯率衆屯巴陵景進寇巴陵世祖遣將軍胡僧祐陸法和帥衆下援巴陵任約敗景遂遁走僧辯帥衆軍追景所至皆㨗八月僧辯下次湓城十月王僧辯奉表稱侯景弑逆皇帝賊害太子宗室在寇庭者並罹禍酷世祖奉諱大臨三日百官縞素司空南平王恪率宗室將軍胡僧祐率羣僚並奉牋勸進世祖固讓三年二月王僧辯衆軍發自尋陽世祖馳檄告四方有能縛侯景及送首者封萬户開國公三月王僧辯等平侯景傳其首於江陵告明堂大社四月益州刺史新除假黄鉞太尉武陵王紀竊位於蜀改號天正元年世祖遣司空蕭太謁塋陵修復社廟五月以尚書令征東將軍江州刺史王僧辯為司徒斬賊左僕射王偉尚書吕季略於江陵市是月魏遣太師潘洛辛等寇秦郡王僧辯遣杜崱帥衆拒之以陳霸先為征北大將軍南徐州刺史是月魏遣使賀平侯景八月蕭紀率巴蜀大衆東下遣護軍陸法和屯巴峽以拒之十月四方征鎮王公卿士復勸世祖即尊號表三上乃從之承聖元年十一月丙子即皇帝位於江陵立王太子方矩為皇太子追尊所生妣阮修容為文宣太后二年西魏遣大將尉遲逈襲益州三年以郢州刺史陸法和為司徒四月以征北大將軍陳霸先為司空九月魏遣其柱國萬紐于瑾率大衆來寇冬十月魏軍至於襄陽蕭詧率衆㑹之内外戒嚴輿駕出行都柵徴王僧辯等軍十一月魏軍至柵下徴廣州刺史王琳入援辛夘魏軍大攻世祖出枇杷門親臨陣督戰六軍敗績反者斬西門關以納魏師城陷於西魏世祖見執十二月西魏害世祖遂崩焉時年四十七太子皆見害明年四月追尊為孝元皇帝廟曰世祖梁書曰世祖聰悟俊朗天才英發年五六歳高祖問汝讀何書對曰能誦曲禮高祖曰汝試言之即誦上篇左右莫不驚歎既長好學博總羣書下筆成章出言為論才辯敏速冠絶一時也侯景附梁書曰侯景河朔人也少不羈髙歡以為將軍雄勇冠時征伐數有大功嘗謂歡曰若假景三萬人當横行天下要須縛取蕭衍老翁遣作太平寺主後高歡死景乃以河南降於梁高澄使慕容紹宗軍圍長社景謂紹宗曰欲送客耶將定雄雌耶紹宗曰吾將決戰景乃令將士皆披甲持短刀但低視砍人脛足遂敗紹宗軍禆將斛律光死之紹宗曰吾戰多矣未見此賊之難相持連月景食待盡其將暴顯等降紹宗景衆乃潰景與心腹數騎濟淮稍收散卒得馬步八百人晝夜兼行追軍不敢逼使謂紹宗曰景若就擒公復何用紹宗乃縱之遂攻夀陽下之而據其城梁武以為河南王招集戰士乃請絹萬疋為軍人作袍帝不與以青布給之又請娶於王謝武帝曰王謝門高非其偶可朱張已下訪之景恚曰㑹將胡兒女以配奴景既為朝廷所疑武帝使謂景曰譬如貧家畜十客尚能得志朕惟有一客致有忿言是朕之失也明日遂將兵於厯陽濟江聞邵陵王綸督衆軍景乃謀於王偉偉曰莫若直掩京都臨賀反於内大王攻於外天下不足定也兵法曰巧遲不如拙速今便須進路不然邵陵及矣景遂晨夜兼行至都百道攻城縱火焚諸城門城中倉卒未有備乃鑿門樓下水沃火久之方滅景又於城西各起土山以臨城内内亦作兩土山以應之簡文以下皆親執畚鍤景又募有先為奴者賞以不次朱屏家黥奴踰城投賊景以為儀同使至闕下以誘城内乗馬披錦袍詬曰朱屏五十年仕宦方得中領軍我始事侯王已為儀同使}
