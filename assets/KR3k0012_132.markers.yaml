  - {type: variant, offset: 3321, length: 0, content: '', WYG: 大寳元年正月大赦改元西魏寇安陸執司州刺史栁仲禮盡沒漢東之地二月邵陵王綸自尋陽至於夏口郢州刺史南平王恪以州讓綸侯景逼帝幸西州夏大饑人相食京師尤甚前司州刺史羊鴉仁自尚書省出奔西州八月湘東王繹遣領軍將軍王僧辯率衆逼郢州侯景自進位相國封二十郡為漢王邵陵王綸棄郢州走十月侯景自加宇宙大將軍都督六合諸軍事二年三月侯景自率衆西寇自石頭至新林舳艫相接四月景分遣偽將宋子仙任約襲郢州閏月景進寇巴陵王僧辯連戰不能尅五月湘東王遣遊擊將軍胡僧祐信州刺史陸法和援巴陵景遣任約帥衆拒援軍六月僧祐等擊破任約擒之景解圍宵遁王僧辯督衆軍追景攻魯山城尅之七月景還至京師王僧辯軍次湓城八月侯景遣衞尉卿彭儁率兵入殿廢帝為晉安王幽於永福省害皇太子大器尋陽王大心及尋陽王諸子二十人矯詔禪於豫章嗣王棟大赦改元十月帝崩永福省}
