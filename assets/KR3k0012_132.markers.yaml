  - {type: variant, offset: 3344, length: 7, content: 書侍郎薛道衡侍, WYG: 久而方絶武帝崩立簡文又立豫章王景皆殺之遂簒位國號漢年稱太始王偉請立七廟景問何謂七廟偉曰古者天子祭七代祖考故致七廟并請七代諱敕太常具祭祀之禮景曰前代吾不復憶惟記得阿爺名大標且在朔州伊那得來噉衆聞咸笑景頻為王僧辯所破將走王偉按劒諫曰自古豈有走天子今宫}
