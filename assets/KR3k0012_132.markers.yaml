  - {type: variant, offset: 1585, length: 661, content: 成皇帝諱湛神武皇帝第九子孝昭皇帝之母弟也儀表瓌傑神武尤所鍾愛神武方招懷荒遠乃為帝娉蠕蠕而蠢切太子菴烏含切羅辰女鄰和公主帝時年八歲冠服端嚴神情閑遠華戎歎異元象中封長廣郡公天保初進爵為王拜尚書令尋兼司徒遷太尉乾明初楊愔等密相踈忌以帝為大司馬領并州刺史帝既與孝昭謀誅諸執政遷太傅錄尚書事領京畿大都督皇建初進位右丞相孝昭幸晉陽帝以懿親居守鄴政事咸見委託二年孝昭崩遺詔徵帝入統大位及晉陽宮發喪於崇德殿皇太后令所司遺詔左丞相斛律金率百僚郭敦勸三奏乃許大寧元年冬十一月癸丑皇帝即位於南宮大赦改皇建二年為大寧庚申詔大使巡行天下求政善惡問人疾苦擢進賢良是歲周武帝保定元年也河清元年春正月乙亥車駕至自晉陽辛巳祀南郊壬午享太廟景戍立妃胡氏為皇后子緯為皇太子大赦四月乙巳青州刺史上言今月庚寅河濟清以河濟清改大寧二年為河清二年癸未春正月乙卯帝詔臨朝堂策試秀才以太子少傅魏收為兼尚書右僕射十二月大雨雪連月南北千餘里平地數尺雪晝下雨血於太原四年三月彗星見有物隕於殿庭如赤漆鼓帶小鈴殿上石自起兩兩相對又有神見於後園萬壽堂前山穴中其體壯大不辨其面兩齒絕白長出於脣帝直宿嬪御巳下七百人咸見焉帝又夢之夏四月戊午大將軍東安王婁叡坐事免乙亥陳人來聘太史奏天文有變其占當有易王景子乃使太宰叚韶兼太尉持節奉皇帝璽綬傳位於皇太子大赦改元為天統元年百官進級降罪各有差又詔皇太子妃斛律氏為皇后於是群公上尊號為太上皇帝軍國大事咸以奏聞始將傳政使內參乘子尚乘驛送詔書於鄴子尚出晉陽城見人騎馬隨後忽失之尚未至鄴而其言已布矣天統四年十二月辛未太上皇帝崩於鄴宮乾壽堂時年三十二謚曰武成, WYG: ''}
