  - {type: variant, offset: 296, length: 1, content: 錄, SBCK: 事劒履上殿入朝不趨讃拜不名加前後部羽葆鼔吹置左右長史司馬從事中郎􅁺屬各四人又詔進位相國揔百揆揚州刺史封十郡爲梁公備九錫之禮髙祖固辭二月進梁公爵爲王以豫州之南譙廬江永嘉等十郡益梁國并前爲二十郡三月命王冕十有二旒建天子旍旗出警入蹕景辰齊帝禪位于梁髙祖謙讓不受大史令蔣道秀陳天文符䜟六十四條並明著群臣固請乃從之夏四月景寅髙祖即皇帝位于南郊設壇柴燎告􅀋于天大赦改齊中興二年爲天監元年封齊帝爲巴陵王八月詔中書監王瑩等八人參定律令十一月立皇子統爲皇太子四年正月詔九流常選年未三十不通一經不得解􅄄􅀂有才同甘顔勿限年次是􅀊大穰米斛三十五年三月魏宣武帝從弟翼率其諸弟來降陳伯之自壽陽率衆歸降八年正月輿駕親祠南郊赦天下九年三月幸國子學親臨講肆詔皇太子及王侯之子年在從師者可令入學十年親祠南郊大赦三月鄧䏳旨􅀬切以昫山引魏軍遣振逺將軍馬仙琕按梁書㓜名仙婢及長以婢名不興遂去女從琕􅀘鼎切字書又音駢討之十月馬仙琕大破魏軍斬馘古􅀗切十餘萬復尅昫山城十八年親祠南郊普通元年正月改元大赦五年六月龍闘于曲阿王陂因西行至建陵城所經處樹木倒折七年赦死罪已下太通元年三月幸同泰寺捨身甲戌還宫赦天下改元二年十月以魏北海王元顥爲魏主遣東宫直閤將軍陳慶之衛送還北魏䂊州刺史鄧獻以地内屬中大通元年九月幸同泰寺捨身公卿巳下以錢一億萬奉贖十月輿駕還宫大赦改元三年十月幸同泰寺昇法座爲四部衆􅀃大般若􅄺槃經義六年春親耕籍田四月熒惑在南斗大同元年正月改元大赦二年三月詔文武在位舉尓所知公侯將相隨才擢用十年三月幸蘭陵謁建寧陵十一年四月魏遣使來聘中大同元年四月於同泰寺講􅀃法㑹大赦改元十月以前東楊州刺史岳陽王􅊫音察爲雍州刺史太清元年二月魏司徒侯景以豫章廣頴洛陽等十三州内屬以景爲大將軍封河南大行臺承詔如鄧禹故事四月大赦改元八月以大將軍侯景録行臺}
