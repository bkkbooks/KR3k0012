  - {type: variant, offset: 2463, length: 840, content: 品以上各舉一人秋七月戊辰誅左丞相咸陽王斛律光及其弟幽州行臺荊山公豐樂八月庚寅廢皇后斛律氏為庶人是月聖壽堂御覽成敕付史閤後改脩文殿御覽六年八月周師入洛川屯芒山攻逼洛城縱火舩焚浮橋河橋絕閏月己丑遣右丞相高阿那肱自晉陽禦之師次河陽周師夜遁七年冬十月帝太狩於祁連池周師攻晉州癸亥帝還晉陽甲子出兵大集晉陽庚午帝發晉陽列陣而行上雞栖原與周齊王憲相對至夜不戰周師斂陣而退十一月周武帝退還長安留偏師守晉州阿郍肱等圍其城戊寅帝至圍所十二月戊申周武帝來救晉州庚戍戰于城南齊軍大敗帝棄軍先還癸丑入晉陽憂不知所之甲寅大赦帝謂朝臣曰周師甚盛若何群臣咸曰天命未改一得一失自古皆然宜停百賦安朝野收遺兵背城死戰以存社稷帝意猶預欲向北朔州乃留安得王延宗廣寧王孝珩音行等守晉陽若晉陽不守即欲奔突厥群臣皆曰不可帝不從其言開府儀同三司賀拔伏恩輔相慕容鍾葵等與宿衛近臣三十餘人西奔周師乙卯詔募兵遣安德王延宗為左廣寧王孝珩為右延宗入見帝告欲向北朔州延宗泣諫不從帝密遣王康德與中人齊紹等送皇太后皇太子於北朔州景辰帝幸城南軍勞將士其夜欲遁諸將不從丁巳大赦改武平七年為隆化元年其日穆提婆降周詔除安德王延宗為相國委以備禦延宗流涕受命帝乃夜斬五龍門而出欲走突厥從官多散領軍梅勝郎叩馬諫乃廻之鄴時唯阿郍肱等十餘騎廣寧王孝珩襄城王彥道續至得數十人同行戊午延宗從眾議即皇帝位於晉陽改隆化為德昌元年庚申帝入鄴辛酉延宗與周師戰於晉陽大敗為周師所虜帝遣募人重加官賞雖有此言而竟不出廣寧王孝珩奏請出宮人及珍寶班賜將士帝不悅斛律孝卿居中受委帶甲以處分請帝親勞軍為帝撰辭且曰宜慷慨流涕感激人心帝既出臨眾將令之不復記所受言遂大笑左右無辭將士莫不解體於是自大丞相已下太宰三師大司馬大將軍三公等官並增員而授或三或四不可勝數甲子皇太后從北道至引文武一品已上入朱華門賜酒食及紙筆問以禦周之方略群臣各異議帝莫知所從又引高元海宋士素廬思道李德林等欲議禪位皇太子先是望氣者言當有華易於是依天統故事傳位幼主帝自稱太上皇幼主名恒帝之長子也母曰穆皇后武平元年六月生於鄴其年十, WYG: ''}
