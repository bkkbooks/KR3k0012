  - {type: variant, offset: 1094, length: 1, content: 為, SBCK: 徙爲都督荆雍湘司郢等九州諸軍事鎮西將軍荆州刺史三年三月侯景宼没京師太子舎人蕭歆至江陵宣密詔以丗祖爲侍中假黄􅃏大都督中外諸軍事司徒承制餘如故是月丗祖徴兵於湘州湘州刺史河東王譽拒而不遣七月遣丗子方等帥衆討譽戰敗又遣將軍鮑泉伐討譽九月雍州刺史岳陽王􅊫舉兵反來㓂江陵丗祖嬰城拒守􅊫將杜崱七力切及楊混各率其衆來降􅊫遁走鮑泉攻湘州不尅又遣左衛將軍王僧辯代將大寳元年五月王僧辯尅湘州斬河東王譽湘州平二年二月魏遣使來聘三月侯景悉兵西上㑹任約軍王僧辯帥衆屯巴陵景進㓂巴陵丗祖遣將軍胡僧祐陸法和帥衆下據任約敗景遂遁走僧辯帥軍追景所至皆捷八月僧辯下次湓城十月王僧辯等表稱侯景拭逆}
