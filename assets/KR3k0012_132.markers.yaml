  - {type: variant, offset: 3176, length: 5, content: 授或三或四, SBCK: 據其城梁武以爲河南王招集戰士乃請錦萬匹爲軍人作􅂁帝不與以青布給之又請娶於王謝武帝曰王謝門高非其偶可朱張巳下訪之景恚曰㑹將呉兒女以配奴景旣爲朝廷所疑武帝使謂景曰譬如貧家畜十客尚能得志朕惟有一客致有忿言是朕之失也明日遂將兵於􅄋陽濟江聞邵陵王綸督衆軍景乃謀於王偉偉曰莫􅀂直掩京都臨賀反於内大王攻於外天下不足定也兵法曰遲巧不如拙速今便須進路不然邵陵及人景遂晨夜兼行至都百道攻城縱火焚諸城門城中倉卒未有備乃鑿門樓下水沃火乆之方滅景又於城南城西各起土山以臨城内内亦作兩山以應之簡文以下皆親執畚音本鍤楚洽切景又募人先爲奴者賞以不次朱异家黥奴踰城投賊景以爲儀同使至闕下以誘城内乗馬披錦􅂁詬曰朱异五十年仕宦方得中領軍我始事侯王巳爲儀同使於是奴僮競出盡皆得志景決石闕前水百道攻城晝夜不息城䧟景自爲丞相以甲士五百人自衛帶劒昇殿帝謂景曰卿乆在戎得無勞乎景不對帝曰卿是何州人而至此又黙然左右任約代對及出景謂約曰吾嘗據鞍對敵矢刃交下而意無怖今見蕭公使人自慴豈非天威難犯吾}
