  - {type: variant, offset: 302, length: 333, content: 甲寅詔軍國事皆申晉陽稟大丞相常山王規笇秋八月太皇太后令廢帝為濟南王以大丞相常山王演入纂大統是日王居別宮皇建二年九月殂于晉陽時年十七謚閔悼王高演北齊書曰孝昭皇帝演字延安神武皇帝第六子文宣皇帝之母弟也幼而英峙早有大成之量武明皇太后早所愛重魏元象元年封常山郡公天保初進爵為王五年除并省尚書令帝善斷割長於文理省內畏服七年從文宣還鄴以尚書奏事有異同令帝與朝臣先論定得失然后敷奏帝長於政術剖斷咸盡其理文宣歎重之八年轉司空錄尚書事九年除大司馬仍錄尚書文宣崩帝居禁中護喪事幼主即位朝班除太傅錄尚書事朝政皆決於帝月餘乃居藩邸自是詔敕多不關帝客或言於帝曰鷙鳥捨巢必有探卵之患今日之地何宜屢出乾明元年從廢帝赴鄴居于領軍府時楊愔燕子獻可朱渾天和宋欽道鄭子默等以帝威望既重內懼權逼請以帝為太師, SBCK: 前}
