  - {type: variant, offset: 3603, length: 249, content: 數騎至青州南鄧林為周將尉遲剛所獲送鄴周武帝與抗賓主禮并太后幼主諸王俱送長安封帝溫國公在位凡一十三年帝業昏亂加之暴虐崔季舒斛律光等皆以直見殺帝好自彈琵琶而唱無愁曲每處深官羞見朝士三日一臨小殿啟事者走如飄風頭著于胸不得平視凡諸犬馬皆有儀同郡君之號又於宮中立貧窮材舍帝自弊衣為乞兒每好不急之求一夜索蝎及曉得三斗置之浴斛使人裸臥斛中觀其號叫宛轉而為笑樂又賣官爵各分州郡下至卿官皆降中旨於是州縣官人多出富商大賈競為貪縱人不聊生以至於敗也初武成夢大蝟攻破鄴城乃悉索境內蝟膏以絕之議者以帝之名聲與蝟和協亡齊之徵也, SBCK: 二}
