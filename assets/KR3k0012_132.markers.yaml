  - {type: variant, offset: 647, length: 350, content: 大司馬錄并省尚書事解京畿大都督帝既以尊親而見猜斥乃與長廣王期獵謀之於野三月甲戍帝初上省旦發領軍府大風暴起壞所御車幔甚惡之及至省朝士咸集坐定酒數行於坐執尚書令楊愔右僕射燕子獻領軍可朱渾天和侍中宋欽道等於座帝戎服與平原王叚韶平秦王高歸彥領軍劉洪徽入自雲龍門於中書省前遇散騎常侍鄭子默又執之同斬於御府之內帝至東閤門都督成休寧抽刃呵帝帝令高歸彥喻之寧厲聲大呼不從歸彥既為領軍素為兵士所服悉皆弭伏寧方歎息而罷帝入至昭陽殿幼主太皇太后皇太后並出臨御坐帝奏愔等罪求伏專擅之辜時庭中及兩廊下衛士二千餘人皆被甲待詔武衛娥永樂武力絕倫又被文宣重遇撫刃思效廢帝性吃訥兼倉卒不知所言太皇太后又為皇太后誓言帝無異志唯云逼而已高歸彥勑勞衛士解嚴永樂乃內刀而泣帝乃令歸彥引侍衛之士向華林園以京畿軍入守門閤斬娥永樂於園詔以帝為大丞相, WYG: ''}
