  - {type: variant, offset: 3336, length: 81, content: 黃門侍郎顏之推中書侍郎薛道衡侍中陳德信等勸太上皇往河外募兵更為經略若不濟南投陣國從之丁丑太皇太后太上皇自鄴先趣濟州周師漸逼癸未幼主又自出鄴東己丑周師至紫陌橋癸巳燒, SBCK: 天士尓好守}
  - {type: variant, offset: 3336, length: 3, content: 黃門侍, WYG: 奴僮競出盡皆得志景決石闕前水百道攻城晝夜不息城陷景自為丞相以甲士五百人自衞帶劒升殿帝謂景曰卿久在戎得無勞乎景不對帝曰卿是何州人而至此又黙然左右任約代對及出景謂約曰吾嘗據鞍對敵矢刃交下而意無怖今見蕭公使人自慴豈非天威難犯吾不可以再見之矣先是城中積屍不暇埋瘞又有已死未斂或將死未絶景悉命聚而焚之尚書}
