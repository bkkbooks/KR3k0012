  - {type: variant, offset: 1129, length: 972, content: 甲辰詔曰朕嬰此暴疾奄忽無遠今嗣子冲眇未聞政術社稷業重理歸上德右丞相長廣王研機測化體道居宗人雄之望海內瞻仰同胞共氣家國所憑可遣尚書左僕射趙郡王叡喻旨徵王統茲大寶先是帝不豫而無闕聽覽是日崩於晉陽宮時年二十七大寧元年閏十二月癸卯梓宮還鄴上謚曰孝昭皇帝葬於文野陵帝聰敏有識度深沉能斷不可窺測身長八尺腰帶十圍儀望風表逈然獨秀自居臺省留心政術閑明簿領吏所不逮及正位宸居彌所剋勵輕傜薄賦勤恤人隱內無私寵外收人物雖后父位亦特進無別日昊臨朝務知人之善惡每訪問左右冀獲直言曾問舍人裴澤在外議論得失澤率爾對曰陛下聰明至公自可遠侔古昔而有識之士咸言傷細帝王之度頗為未弘帝笑曰誠如卿言朕初臨萬機慮不周悉故致爾耳此事度可久行恐後又嫌踈漏澤因被寵遇其樂聞過也如此趙郡王叡與庫狄安侍坐帝曰須拔我同堂弟顯安我親姑子今序家人禮除君臣之敬可言我之不逮顯安曰陛下多妄言曰若何對曰陛下昔見文宣以馬鞭撻人常以為非而今行之非妄言耶帝握其手謝之又使直言對曰陛下太細天子乃更似吏帝曰朕甚知之然無法來久將整之以至無為耳又問王晞晞荅如顯安皆從容受納高湛北齊書曰世祖武成皇帝諱湛神武皇帝第九子孝昭皇帝之母弟也儀表瓌傑神武尤所鍾愛神武方招懷荒遠乃為帝娉蠕蠕而蠢切太子菴烏含切羅辰女鄰和公主帝時年八歲冠服端嚴神情閑遠華戎歎異元象中封長廣郡公天保初進爵為王拜尚書令尋兼司徒遷太尉乾明初楊愔等密相踈忌以帝為大司馬領并州刺史帝既與孝昭謀誅諸執政遷太傅錄尚書事領京畿大都督皇建初進位右丞相孝昭幸晉陽帝以懿親居守鄴政事咸見委託二年孝昭崩遺詔徵帝入統大位及晉陽宮發喪於崇德殿皇太后令所司遺詔左丞相斛律金率百僚郭敦勸三奏乃許大寧元年冬十一月癸丑皇帝即位於南宮大赦改皇建二年為大寧庚申詔大使巡行天下求政善惡問人疾苦擢進賢良是歲周武帝保定元年也河清元年春正月乙亥車駕至自晉陽辛巳祀南郊壬午享太廟景戍立妃胡氏為皇后子緯為皇太子大赦四月乙巳青州刺史上言今月庚寅河濟清以河濟清改大寧二年為河清二年癸未春正月乙卯帝詔臨朝堂策試秀才以太子少傅魏收為兼尚書右僕射十二月大雨雪連月南北千餘里平地數尺雪晝下雨血於太原四年三月彗星見有物隕於殿庭如赤漆鼓帶小鈴殿上石自起兩兩相對又有神見於後園萬壽堂前山穴中其體壯大不辨其面兩齒絕白長出於脣帝直宿嬪御巳下七百人咸見焉帝又夢之夏四月戊午大將軍東安王婁叡坐事免乙亥陳人來聘太史奏天文有變其占當有易王, SBCK: ''}
