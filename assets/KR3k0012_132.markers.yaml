  - {type: variant, offset: 1399, length: 185, content: 未弘帝笑曰誠如卿言朕初臨萬機慮不周悉故致爾耳此事度可久行恐後又嫌踈漏澤因被寵遇其樂聞過也如此趙郡王叡與庫狄安侍坐帝曰須拔我同堂弟顯安我親姑子今序家人禮除君臣之敬可言我之不逮顯安曰陛下多妄言曰若何對曰陛下昔見文宣以馬鞭撻人常以為非而今行之非妄言耶帝握其手謝之又使直言對曰陛下太細天子乃更似吏帝曰朕甚知之然無法來久將整之以至無為耳又問王晞晞荅如顯安皆從容受納高湛北齊書曰世祖, WYG: ''}
