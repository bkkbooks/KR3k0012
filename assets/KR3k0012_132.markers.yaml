  - {type: variant, offset: 2103, length: 913, content: 乃使太宰叚韶兼太尉持節奉皇帝璽綬傳位於皇太子大赦改元為天統元年百官進級降罪各有差又詔皇太子妃斛律氏為皇后於是群公上尊號為太上皇帝軍國大事咸以奏聞始將傳政使內參乘子尚乘驛送詔書於鄴子尚出晉陽城見人騎馬隨後忽失之尚未至鄴而其言已布矣天統四年十二月辛未太上皇帝崩於鄴宮乾壽堂時年三十二謚曰武成皇帝廟號世祖葬永平陵後主高緯北齊書曰后主諱緯字仁綱武成皇帝之長子也母曰胡皇后夢於海上坐玉盆日入裙下遂有娠天保七年五月五日生帝於并州邸帝少美容儀武成特所愛寵拜王世子及武城入纂太業立為皇太子河清四年武成禪位於帝天統元年乙酉夏四月景子皇帝即位於晉陽宮大赦改河清四年為天統三年二月壬寅朔帝加元服大赦四年秋周人來通和太上皇帝詔侍中斛斯文略報聘于周十二月辛未太上皇帝崩武平三年二月侍中祖珽為左僕射是月敕撰玄洲苑御覽後改名聖壽御覽三月辛酉詔文武官五品以上各舉一人秋七月戊辰誅左丞相咸陽王斛律光及其弟幽州行臺荊山公豐樂八月庚寅廢皇后斛律氏為庶人是月聖壽堂御覽成敕付史閤後改脩文殿御覽六年八月周師入洛川屯芒山攻逼洛城縱火舩焚浮橋河橋絕閏月己丑遣右丞相高阿那肱自晉陽禦之師次河陽周師夜遁七年冬十月帝太狩於祁連池周師攻晉州癸亥帝還晉陽甲子出兵大集晉陽庚午帝發晉陽列陣而行上雞栖原與周齊王憲相對至夜不戰周師斂陣而退十一月周武帝退還長安留偏師守晉州阿郍肱等圍其城戊寅帝至圍所十二月戊申周武帝來救晉州庚戍戰于城南齊軍大敗帝棄軍先還癸丑入晉陽憂不知所之甲寅大赦帝謂朝臣曰周師甚盛若何群臣咸曰天命未改一得一失自古皆然宜停百賦安朝野收遺兵背城死戰以存社稷帝意猶預欲向北朔州乃留安得王延宗廣寧王孝珩音行等守晉陽若晉陽不守即欲奔突厥群臣皆曰不可帝不從其言開府儀同三司賀拔伏恩輔相慕容鍾葵等與宿衛近臣三十餘人西奔周師乙卯詔募兵遣安德王延宗為左廣寧王孝珩為右延宗入見帝告欲向北朔州延宗泣諫不從帝密遣王康德與中人齊紹等送皇太后皇太子於北朔州景辰帝幸城南軍勞將士其夜欲遁諸將不從丁巳大赦改武平七年為隆化元年其日穆提婆降周詔除安德王延宗為相國委以備禦延宗流涕受命帝乃夜斬五龍門而出欲走突厥從官多散領軍梅勝郎叩馬諫乃廻之鄴時唯阿郍肱等十餘騎廣寧王孝珩襄城王彥道續至得數十人同行戊午延宗從眾議, SBCK: ''}
