  - {type: variant, offset: 3168, length: 0, content: '', krp: 陳霸先爲司空九月魏遣其柱國萬紐于謹率大衆來㓂冬十月魏軍至于襄陽蕭察率衆㑹之内外戒嚴輿駕出行柵徴王僧辯等軍十一月魏軍至柵下徴廣州刺史王琳入援辛卯魏軍大攻丗祖出枇杷門親臨陣督戰六軍敗績反者斬西門以納魏師城䧟于西魏丗祖見執十二月西魏害丗祖遂崩焉時年四十七太子皆見害明年四月追尊元皇帝廟曰丗祖梁書曰丗祖聦悟俊㓪天才英發年五六歲髙祖問汝讀何書對曰能誦曲禮髙祖曰汝試言之即誦上篇左右莫不驚歎旣長好學博揔群書下筆成章出言爲論才辯敏速冠絶一時也侯景附侯景河朔人也少不羈髙歡以爲將軍雄勇冠時征伐數有大功嘗謂歡曰若假景}
  - {type: variant, offset: 3169, length: 0, content: '', SBCK: 萬人當横行天下要須􅅞取蕭衍老翁遣作太平寺主後髙歡死景乃以河南降于梁髙澄使慕容紹宗圍於長社景謂紹宗曰欲送客耶將定雄雌耶紹宗曰吾將決戰景乃令戰士皆􅀍甲持短刀但低視斫人脛足遂敗紹宗軍禆將斛律光尤之紹宗曰吾戰多矣未見此賊之難相持連月景食盡其將􅁀顯等降紹宗景衆乃潰景與腹心數􅀐濟淮稍収散卒得馬歩八百人晝夜兼行追軍不敢逼使謂紹宗曰景􅀂就擒}
  - {type: variant, offset: 3169, length: 0, content: '', krp: 萬人當横行天下要須縛取蕭衍老翁遣作太平寺主後髙歡死景乃以河南降于梁髙澄使慕容紹宗圍於長社景謂紹宗曰欲送客耶將定雄雌耶紹宗曰吾將決戰景乃令戰士皆𬒳甲持短刀但低視斫人脛足遂敗紹宗軍禆將斛律光尤之紹宗曰吾戰多矣未見此賊之難相持連月景食盡其將暴顯等降紹宗景衆乃潰景與腹心數騎濟淮稍収散卒得馬歩八百人晝夜兼行追軍不敢逼使謂紹宗曰景若就擒}
