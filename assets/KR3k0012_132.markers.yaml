  - {type: variant, offset: 3327, length: 0, content: '', WYG: 皇帝諱繹字世誠小字七符高祖第七子也天監十三年封湘東郡王大同六年出}
  - {type: variant, offset: 3328, length: 2, content: 承光, WYG: 都督江州諸軍事江州刺史太清}
  - {type: page-break, offset: 3328, content: '', id: KR3k0012_WYG_132-10b, image: WYG0894/WYG0894-0226b.png}
