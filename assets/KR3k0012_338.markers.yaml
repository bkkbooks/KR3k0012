  - {type: variant, offset: 2219, length: 420, content: 帝召太尉司馬公討之軍到襄平公圍之北面東面有圍不合連車置水中積石鎮其上以鹿角塞之魏武帝表曰臣前遣討河內獲嘉諸屯獲生口辭云河內有一神人宋金生令諸屯皆云鹿角不須守吾使狗為汝守不從其言者即夜聞有軍兵聲明日視屯下但見虎跡臣輒部武猛都尉呂納將兵掩捉得生口輒行軍法諸葛亮教曰前到武都一日鹿角壞刀斧千餘枚賴賊已走若未走無所復用晉宣帝教曰今日當將作四千人東為三軍作營壍壘又當將斧三百枚破樹木作鹿角塞諸郵漏處諸葛亮軍令曰敵以來進持鹿角兵悉卻在連衝後敵已附鹿角裏兵但得進踞以矛戟刺之不得起住起住妨弩魏武軍策令曰夏侯淵今月賊燒都鹿角鹿角去本營十五里淵將四百兵行鹿角因使士捕之賊山上望見從谷中卒出淵使兵與鬥賊遂繞出其後兵退而淵未至甚可傷淵本非能用兵也軍中呼為白地將軍為督帥尚不當親戰况補鹿角乎王曠與楊州論討陳敏計曰賊今下屯固橫江又云復據烏江皆皆壍壘彭排鹿角步安嚴峻以襲歷陽諸軍辛昞洛戍時與桓郎牋曰桓振武今下官將千二百人奄襲營值天洪雨器仗沾濕壍廣深丈餘鹿角五重樓櫓嚴設, SBCK: ''}
