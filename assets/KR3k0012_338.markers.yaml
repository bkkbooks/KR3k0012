  - {type: variant, offset: 1434, length: 0, content: '', SBCK: 逺近相聞戎㓂至傳鼓相告諸侯之兵皆至救天子褒姒大恱􅀏之王欲褒姒之􅀏也因數擊鼓諸侯兵數至而無㓂後戎㓂眞至幽王擊鼓諸侯兵不至幽王之身乃死驪山之下爲天下􅀏韓侯曰吴使沮衛獻䖝蠹於荆師荆師將殺之以釁鼓衛曰死者無知則釁無益􅀂有知戰之時臣使鼓不鳴因不殺之孫子曰是故軍政曰言不相聞故爲鼓鐸視不相見故爲旌旗故夜戰多金鼓晝戰多旌旗夫金鼓旌旗所以一人之耳目也人旣專一則勇者不得獨進怯者不得獨退此用衆之法也抱朴子曰軍始發大風甚雨起於後旌旗前指金鼓清鳴大勝黄帝出軍决曰牙旗者將軍之精金鼓者將軍之氣一軍之形候也唐子曰將勿離鼓旗鼓旗將之耳目也徐幹齊都賦曰王乃垂華玉之路駕􅀇駮之駿翠幄浮遊金光皓旰公旦切戎車雲布武􅀐星散鉦鼓雷動旌旗虹亂陸雲南征賦曰戎士肅而啓行三軍分而雜遝長角哀吟以命旅金鼓訇隱而砰􅔫孫惠􅀕金鼓丈曰赫矣皇威用伐不庭金鼓麾旗以昭其聲鞞釋名曰鞞禆也禆助鼓節也鞞􅀘弥功吕氏春秋曰倕作鞞鼓鄭緝之東陽記曰晉隆安中孫恩遣偏師謝咸攻東陽東陽岑山下民聞嶺上有鼓鞞聲􅀂數萬人咸破潰而山上鼓鞞亦絶鞀鬻子曰禹之治天下也懸五聲以聽曰語寡人以獄訟者揮鞀音挑吕氏春秋曰倕作鞀}
