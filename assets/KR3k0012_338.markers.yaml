  - {type: variant, offset: 1667, length: 239, content: 執以為號令魏武本紀曰上與袁紹軍於官度賊射營中行者皆被甲眾皆恐上令傳言旝動而鼓說文曰旝發石車也乃造發石車擊紹櫓一日盡壞紹眾號之礕礰車沈懷文宋侍中趙倫之碑曰君戮力以致誠吐規以會機一鼓則寇騎雲徹旝動則敵車霧消鹿角袁曄漢獻帝春秋曰楊州刺史劉馥上言荊州牧劉表與會稽太守孫權謀襲京城遂壍許設鹿角砦王沈魏書曰李通拜汝南太守劉備與周瑜圍曹仁於江陵與諸將擊之通親下馬入圍拔鹿角勇冠諸將軍魚豢魏略曰夏侯霸字仲權為偏將軍大和中在長安及子午之役霸占為前鋒蜀人望知其是霸也指下兵攻之霸手戰鹿角間賴救然後解, SBCK: ''}
