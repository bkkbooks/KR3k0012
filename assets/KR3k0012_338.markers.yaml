  - {type: variant, offset: 363, length: 17, content: 以木為脊長一丈徑一尺五寸下安六腳下, SBCK: 樂令有數客}
  - {type: variant, offset: 363, length: 183, content: 以木為脊長一丈徑一尺五寸下安六腳下闊而上尖高七尺內可容六人以濕牛皮蒙之人蔽其下舁直抵城下木石鐵火所不能敗用攻其城謂之尖頭木驢又曰於城外起土為山乘城而上古謂之土山今之壘道用生牛皮作小屋並四面蒙之屋中置運土人以防攻擊者土山則孫子所謂距閩鑿地為道行於城下用攻其城往往建柱積薪於柱間而燒之柱折城摧謂之地道又曰以八輪車上樹高竿竿上安轆轤以繩挽板屋上竿首以窺城中版屋方四尺高五尺, WYG: 樂廣}
