  - {type: variant, offset: 1010, length: 405, content: 一發聲如雷吼敗隊之卒又曰鷰尾炬縛葦草為炬尾分為兩歧如鷰尾狀以油臈灌之加火從城墜下便騎木驢而燒之又曰松明以木明燒之夜以鐵鏁縋下巡城照敵人乘城而上又曰脂油燭炬燃燈秉燭於城中四衢要路門戶晨夜不得絕明用備非常又曰行爐融鐵汁爐舁行於城上以灑敵人又曰遊火以鐵筐盛火加脂臈鐵鏁懸縋下燒穴中孔城人又曰灰𪌙糠粃因風於城上擲之以瞇敵人目因以鐵汁灑之又曰連捧如打禾連枷狀用打女墻外上城敵人又曰扠竿如槍刃為兩歧用叉飛梯及人又曰鈞竿如槍刃兩旁有曲刃可以鉤搭又曰油囊盛水於城上擲安火車中囊敗火盛又曰天井敵攻城為地道來乃自於城道上直下穿井以邀之積薪安井中以火薰之敵人自焦灼又曰地聽於城內八方穿井各深二丈令頭覆戴新甕凡於井中坐聽則城外百步之內有孔城地道者並聲聞甕中而辯知方所近遠矣又曰鐵莢杖狀如鐵蒺䔧要路水中置之以刺人馬又曰陷馬坑坑長五尺闊一尺深三尺坑中埋鹿角槍竹籤其坑十字相交狀如鉤鏁以覆芻草葦木加之土種草實令生苗蒙覆其上軍城營壘要路皆設之, WYG: ''}
