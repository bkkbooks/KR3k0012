  - {type: variant, offset: 1815, length: 4, content: 通拜汝南, WYG: 廣行師不擊刁斗以自衛孟康曰以銅為鐎噐受一斗晝炊飲食夜擊持行夜銘曰刁斗在榮陽庫形如銷即銚也今俗呼銅銚漢名臣奏曰漢興以來深存古義宫殿省闥至五六重周衛刁斗柝説文曰􅈀夜行所擊木也易繫辭曰重門擊柝以待暴客蓋取諸豫周禮曰野廬氏有賓客則令守涂地之人聚􅈀之漢書舊儀曰宫中衞宫城門擊刁斗傳衡衞士周廬擊木柝張衡東京賦曰故函谷擊柝於東西柝守夜擊木也}
  - {type: page-break, offset: 1815, content: '', id: KR3k0012_WYG_338-12a, image: WYG0896/WYG0896-0047a.png}
  - {type: page-break, offset: 1819, content: '', id: KR3k0012_WYG_338-12b, image: WYG0896/WYG0896-0047b.png}
  - {type: variant, offset: 1820, length: 411, content: 守劉備與周瑜圍曹仁於江陵與諸將擊之通親下馬入圍拔鹿角勇冠諸將軍魚豢魏略曰夏侯霸字仲權為偏將軍大和中在長安及子午之役霸占為前鋒蜀人望知其是霸也指下兵攻之霸手戰鹿角間賴救然後解魏志曰徐晃討關羽於樊羽自將步騎五千出戰晃擊之退走遂追與俱入圍破之或自投沔水死魏太祖令曰賊為塹鹿角十里將軍致戰全勝遂陷賊圍將軍之功踰孫武穰苴虞溥江表傳曰曹公出濡須甘寧拔曹公鹿角逾壘入斬數十人王隱晉書曰馬隆為武威太守之郡作八陣圖地廣則鹿角車營進攻則木屋抱輪並戰並前虜弗能逼干寶晉紀曰曹爽留車駕宿伊水南伐木為鹿角發屯田兵數千人以為衛習鑿齒漢晉陽秋曰曹芳謁曹叡墓於大石山曹爽兄弟皆從於是司馬懿閉四城遂與太尉蔣濟俱屯洛水南浮橋奏罷爽兄弟不知所為芳還宿伊水南發屯田數千人樹鹿角為營晉惠帝起居注曰王浚乘勝追石超軍於斥丘超持重不與戰以鹿角為營一云以鹿角步安立營晉起居注曰義熙六年築壘起城于祖浦石頭城施鹿角以禦廬循司馬彪戰略曰遼東太守公孫淵反明帝召太尉司馬公討之軍到襄, WYG: ''}
