  - {type: variant, offset: 381, length: 594, content: 而上尖高七尺內可容六人以濕牛皮蒙之人蔽其下舁直抵城下木石鐵火所不能敗用攻其城謂之尖頭木驢又曰於城外起土為山乘城而上古謂之土山今之壘道用生牛皮作小屋並四面蒙之屋中置運土人以防攻擊者土山則孫子所謂距閩鑿地為道行於城下用攻其城往往建柱積薪於柱間而燒之柱折城摧謂之地道又曰以八輪車上樹高竿竿上安轆轤以繩挽板屋上竿首以窺城中版屋方四尺高五尺有十二孔四面列布車可進退圜城而行於營中遠視亦謂之巢車如鳥之巢即今之版屋也以版為幔立桔槔於四輪車上懸幔逼城堞間使趫捷者太白陰經曰使趫卒蔽之蟻附而上矢石所不能及謂之木幔又守城篇曰禽滑釐問墨翟守城之具墨翟荅以五六十事皆煩冗不便於用其後韋孝窺守晉州羊侃守臺城皆約封胡子伎巧之術法古不妙非合今之用也今述所便於事者如後渭浚湟深池增城修堞懸門懸板為重門也又曰突門於城中對敵營自鑿城內為闇門多少臨事令五六寸勿穿或於中夜或於敵初來營列未定精騎從突門躍出擊其無備襲其不意又曰涂扇以泥塗城門扇厚可三寸備火又曰鑿門為敵所逼門先自鑿門扇為數十孔出強弩射之長矛刺之則敵不得近門又曰涂棧以泥塗門上木棧厚可五寸備火又曰轉關橋一梁為橋梁端著撗括去其橋轉人馬不得渡皆傾水中秦用此橋而殺燕丹又曰積石備拋石大小隨事又曰樓櫓却敵上建候樓以板為之跳出為櫓笓籬戰隔於女墻上跳出㭬去墻三尺內著撗括㧻端安轄以荊柳編為之長一丈闊五尺懸㭬端用遮矢石又曰布幔以複布為幔以弱竿懸挂於女墻外去墻外七八尺以折拋石之勢矢石, SBCK: ''}
