  - {type: variant, offset: 2479, length: 625, content: 五里淵將四百兵行鹿角因使士捕之賊山上望見從谷中卒出淵使兵與鬥賊遂繞出其後兵退而淵未至甚可傷淵本非能用兵也軍中呼為白地將軍為督帥尚不當親戰况補鹿角乎王曠與楊州論討陳敏計曰賊今下屯固橫江又云復據烏江皆皆壍壘彭排鹿角步安嚴峻以襲歷陽諸軍辛昞洛戍時與桓郎牋曰桓振武今下官將千二百人奄襲營值天洪雨器仗沾濕壍廣深丈餘鹿角五重樓櫓嚴設自四更三唱攻逼至小食時不剋箛槍張揖廣雅曰𥳛謂之箛槍箛音孤服虔通俗文曰剡葦傷盜謂之槍何承天纂文曰𥳛音就箛槍也謝靈運自理表曰星言奔馳歸骨陛下及經山陰方衛彰赫彭排馬槍斷截衢巷宋起居注曰泰始二年有司奏賊帥劉胡等從南城蘭道領馬步萬餘人樹排槍陌山從東五道直來攻營杜預奏秦州軍事曰臣嘗聞邊人說虜專以騎為寇穿壍不如作馬塪馬塪法坑方三尺錯平穿之虜騎非下馬平治則終不得入又其外蹊要路亦可隨作塢施槍著塪中訖薄覆其上如此則虜當築地而行不敢輒往來也蔡謨與何驃騎書曰公失櫓上人吾亦具之矣在深草中立櫓無故以櫓自標令賊見之而自不得見賊賊不病癡何故不來取邪今令數百步內皆露見布竹箛如蝟毛賊不能飛何得卒至邪弋張揖埤蒼曰拱大弋也許慎說文曰擑弋也麋弋也太公六韜曰委環鐵弋長三丈千三百左傳曰齊人戰獲臧堅使宿沙衛喭之曰無死堅曰使刑臣禮於士以弋抉其傷而死司馬彪戰略曰遼東太守公孫淵反太尉司馬公討之軍到襄平去城百步穿重壍堅連柵安諸營立樓櫓其近水沙地不得作圍壍而車輪以大弋㧻穿中又堅輪障其前韋昭吳書曰賀齊討賊陳僕於林歷山山四面壁立不可攻齊乃陰作鐵弋於賊不備處以弋拓山為道夜潛上破賊, WYG: 八}
