  - {type: variant, offset: 1643, length: 6, content: 周桓王伐鄭鄭, WYG: 揚鑾和鈴昭其聲也魏志曰安平太守宅老鈴下作怪}
  - {type: variant, offset: 1643, length: 7, content: 周桓王伐鄭鄭為, krp: 揚鑾和鈴昭其聲也魏志曰安平太守宅老鈴下作怪爲鳥鵲鬪盖公府閤有繩鈴以傳呼鈴下有吏者也風俗通曰鈴柄施懸魚魚者欲君臣沉静如魚之入水不可復得聞見耳集異記曰廣陵士甲市得一宅但聞中有摇鈴聲夜輒止後遂見其眞形刀是其故人問曰何以常摇鈴荅曰我典使君藥物故夜持時耳問曰晝日何以不持時曰白日是死道之夜因别而去鐸}
