  - {type: variant, offset: 103, length: 9, content: 以大木為床下置六輪, SBCK: 今致􅀞長鳴角一􅀟幡眊副眊音餌宋書曰張興丗父仲子由興丗致位給事中興丗欲將往襄陽受郷里不肯去嘗謂興丗曰我雖田舎老公樂聞鼔角汝可送一部行田時欲吹之興丗素恭謹畏法譬之曰此是天子鼓角非田舎公所吹三國典略曰􅀄魏丗山崩得三石角藏於武庫至是齊主入庫賜從臣兵器持此角賜平􅁗王歸彦曰尓事常山不得反事長廣得反反時將此角嚇漢也史苓武昌記曰武昌有龍山欲隂雨}
