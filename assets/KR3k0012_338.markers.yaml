  - {type: variant, offset: 1420, length: 1, content: 坑, krp: 夫軍城及野營行軍在外日出日没時撾鼓一千搥三百三十三推爲通鼓音止角音動吹十二聲爲一疊角音止鼓音動}
  - {type: variant, offset: 1422, length: 2, content: 亞字, SBCK: 此三角三鼓而昏明畢又曰諸大將置鼓四十靣子緫管給鼓十靣營别給鼓一靣行即􅀒隨纛下擬晝夜及在道有警急擊之傳響今諸軍嚴警兼用防備賊侵逼如軍行引之時先軍卒逢賊㓂先軍即急擊鼓救中􅆎逢賊即湏擊鼓前軍聞聲便往後軍聞聲湏急向前赴救後頭逢賊即擊鼓前頭中􅆎聞聲即湏住並量抽兵}
  - {type: variant, offset: 1422, length: 2, content: 亞字, WYG: 此三鼔三角而昏明畢又曰諸大將置鼔四十面于總管給鼔十面營别給鼓一面行即負隨纛下擬晝夜及在道有警急擊之傳響令諸軍嚴警兼用防備賊侵逼如軍行引之時先軍卒逢賊冦先軍即急擊鼓救中腰逢賊即湏擊鼓前軍聞聲便住後軍聞聲湏急向前赴救後頭逢賊即擊鼓前頭中腰聞聲即須住並量抽兵}
  - {type: variant, offset: 1422, length: 2, content: 亞字, krp: 此三角三鼓而昏明畢又曰諸大將置鼓四十靣子緫管給鼓十靣營别給鼓一靣行即負隨纛下擬晝夜及在道有警急擊之傳響今諸軍嚴警兼用防備賊侵逼如軍行引之時先軍卒逢賊㓂先軍即急擊鼓救中腰逢賊即湏擊鼓前軍聞聲便往後軍聞聲湏急向前赴救後頭逢賊即擊鼓前頭中腰聞聲即湏住並量抽兵}
  - {type: variant, offset: 1425, length: 0, content: '', SBCK: 救如發引稍長鼓聲不徹中􅆎支料更湏置鼓傳響使前後得聞其諸營自湏著鼓靣用防夜中有賊犯營即急擊令諸軍有警備又曰諸行軍立營數則万計或逢泥溺或阻山河同聽角聲俱共齊發路狹難進徒餓馬驢應發營第一角聲絶右虞候捉馬驢第二角聲絶即􅀍駕右一軍捉馬驢第三角聲絶右虞􅃸即發引右一軍􅀍駕右二軍捉馬驢第四角聲絶右一軍即發引右二軍􅀍駕以後諸軍毎聽角聲裝束􅀍駕准此每營各出一戰隊今取虞候進止防有賊至便用騰擊後如其路更細小即湏更有角聲仍令虞候及營官人虞候子排比催督急過不得停擁過訖以後軍准前排比催迫急過金鼔釋名曰校號也將帥號令之所在也節爲號令賞罰之節也鐸度也號令之限度也金鼓金禁也爲進退之禁也詩曰方叔率止鉦人伐鼓陳師鞫旅又曰顯允方叔伐鼓淵淵振旅闐闐又曰擊鼓其鏜踊躍用兵周禮曰鼓人掌教六鼓以雷鼓鼓神祀雷鼓八靣鼓也以靈鼓鼓社􅀕靈鼓六靣鼓也社􅀕􅀕地祗也以路鼓鼓􅀑享路鼓四靣鼓也享宗廟也以賁鼓鼓軍事大鼓謂之賁鼓長八尺以鼛鼓鼓軍事鼛大鼓也長丈二尺也以晉鼓鼓金奏晉鼓長六尺六寸金奏謂樂正擊編鍾也左傳曰几師有鍾鼓曰伐無曰侵又曰吴子使其弟蹶由犒師犒勞也楚人執之將以釁鼓王使問曰汝卜來􅁻乎對曰􅁻寡君聞君將治於弊邑卜之以守􅀛曰余亟使人犒師請行以觀王怒之疾徐而爲之備尚克知之􅀛兆告􅁻曰克可知也君􅀂懽好逆使臣兹弊邑休怠而忘其死亡無日矣今君奮焉震電慿怒虐執使臣將以釁鼓則吴知所備矣乃釋之又曰宻須之鼓與其大輅文王所以大蒐也又曰簡子曰吴伏㢭歐血鼓音不衰今日我上也功爲上也又曰呉伐齊將戰公孫夏命其徒歌虞殯陳子行命其徒具唅玉陳書曰此行也吾聞鼓而巳不聞金矣鼓以進軍金以退軍不聞金言將死以也國語曰越甲至齊雍門子狄請死之齊王曰鼓鐸之聲未聞失石未交長兵未接子何務死焉後漢書曰光武徇河内韓歆議欲城守岑彭止不聽旣而光武至懐歆迫急迎降光武知其謀大怒收歆置鼓下將斬之中將軍最尊自執旗鼓􅀂置營則立旗以爲軍門并設鼓戮人必於其下召見彭彭因進􅀃俱獲免東觀漢記曰段潁起於徒中爲并州刺史有功徴還京師潁乘輕車介士鼓吹曲盖朱旗􅀐馬殷天蔽日錚鐸金鼓雷振動地}
