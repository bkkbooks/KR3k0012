  - {type: variant, offset: 1425, length: 0, content: '', WYG: 救如發引稍長鼓聲不徹中腰支料更湏置鼓傳響使傳後得聞其諸營自湏著鼓一面用防夜中有賊犯營即急擊令諸軍有警備又曰諸行軍立營數則萬計或逢沈溺或阻山河同聼角聲懼共齊發路狹難進從我馬驢應發營第一角聲絶右虞候促馬驢第二角聲絶即被駕右一軍促馬驢第三角聲絶右虞候即發引右一軍被駕右二軍促馬驢第四角聲絶右一軍即發引右二軍被駕以後諸軍毎聼角聲装束被駕准此毎營各出一戰隊今取虞候進止防有賊至便用騰擊後如其路便細小即湏臾有角聲仍令虞候及營官人虞候子排比催督急過不得停擁過訖以后軍准前排比併催廹急過金鼓釋名曰校號也將帥號令之所在也節為號令賞罰之節也鐸度也號令之限度也金鼔金禁也為進退之禁也又曰顯允方叔伐鼔淵淵振旅闐闐詩曰方叔率止鉦人伐鼓陳師鞫旅周禮曰鼓人掌教六鼓以雷鼓鼓神祀雷鼔八面鼔也以靈鼓鼔社祭靈鼔六面鼔也社祭祭地祇也以路鼓鼔鬼享路鼓四面鼔也享宗廟也以賁鼓鼔軍事大鼓謂之賁鼔長八尺以鼛鼔鼔軍事鼛大鼔也長丈二尺也以晋鼔鼓金奏晋鼔長六尺六寸金奏謂樂正擊編鐘也左傳曰凡師有金鼓曰伐無曰侵又曰吳子使其弟蹶由犒師犒勞也楚人執之將以釁鼔王使問曰汝卜來吉乎對曰吉寡君聞君將治兵於敝邑卜之以守龜曰余亟使人犒師請行以觀王怒之疾徐而為之備尚克知之龜兆告吉曰克可知也君若驩焉好逆使臣滋敝邑休怠而忘其死亡無日矣今君奮焉震電憑怒虐執使臣將以釁鼔則吳知所備矣乃釋之又曰宻湏之鼓與其大輅文王所以大蒐也又曰簡子曰吾伏弢嘔血鼓音不衰今日我上也功為上也又曰吳伐齊將戰公孫夏命其徒歌虞殯陳子行命其徒具含玉陳書曰此行也吾聞鼔而已不聞金矣鼔以進軍金以退軍不聞金言將死之也國語曰越甲至齊雍門子狄請死之齊王曰鼔鐸之聲未聞矢石未交長兵未接子何務死焉後漢書曰光武徇河内韓歆議欲城守岑彭止不聼既而光武至懐歆廹急迎䧏光武知其謀大怒收歆置鼔下將斬之中将軍最尊自執旗鼔若置營則立旗以為軍門并設鼔戮人必於其下召見彭彭因進説乃貰歆東觀漢記曰段熲起於徒中為并州刺史有功徵還京師熲乗輕車介士鼔吹曲蓋朱旗騎馬拂天蔽日錚鐸金鼔雷振動地}
