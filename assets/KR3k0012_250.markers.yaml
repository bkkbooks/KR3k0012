  - {type: variant, offset: 1511, length: 278, content: 勇為衛將軍舍人衛青也後使刺三河奏事稱意為京輔都尉干寶晉紀云閻纘為人鯁直不畏強禦初仕為太傅楊畯舍人記室參軍魏志曰太祖以陳琳阮瑀管記室軍國書檄多琳所作鍾會以中郎在大將軍管記室事為心腹之任時人謂之子房吳志曰孫惠以書干東海王越詭其姓名自稱南岳逸民秦祕之勉之以勤王匡世之略辭義甚美越省書牓題道衢招求其人惠乃出見越即以為記室參軍專掌文䟽豫參謀議每造書檄越或驛馬催之應命立成皆有辭旨何法盛晉中興書曰王丞少而冲淡弱冠知名太尉王衍雅重之以比南陽樂廣司空東海王越以為記室參軍雅相敬重勑子毗曰夫學之所益者淺體之所安者深閑習禮度不如式瞻儀形諷味遺言不如親承音旨王參軍人倫之表汝其師, SBCK: ''}
