  - {type: variant, offset: 2298, length: 588, content: 聳動重榮收復之功巨川之助也典略曰阮瑀字元瑜陳留人以才自護曹洪聞其有才欲使報荅書記瑀不肯榜笞瑀瑀終不屈洪以語曹公公知其無病使人呼瑀瑀終惶怖詣門公見之謂曰卿不肯為洪且為我作之瑀曰諾遂為記室世說曰太原孫楚字子荊為大司馬石苞記室參軍又曰郄超王珣並以儁才為桓溫大司馬所眷珣為主簿超為記室參軍桓時為荊州超為人多鬚珣形狀短小于時西人為之歌曰髯參軍短主簿能令公喜能令公怒府參軍魏志曰張范參丞相軍事甚見敬重太祖征伐常謂文帝曰舉動必咨此人世子執子孫禮又曰董昭等謂太祖宜進爵國公備九錫以彰殊勳密以諮荀彧彧以為太祖本興義兵以匡朝寧國秉忠貞之誠守退讓之實君子愛人以德不宜如此太祖由是心不平會征孫權表請彧勞軍于譙因留彧以侍中光祿大夫持節參丞相軍事太祖軍至濡須彧疾留壽春以憂薨時年五十又曰曹休字文烈劉備遣將吳蘭屯下辯太祖遣曹洪征之以休參洪軍事太祖謂休曰汝雖參軍其實帥也洪聞此令恒委事於休又曰于禁屯頴陰樂進屯陽翟張遼屯長社諸將任氣多共不恊使趙儼并參三軍每事誨諭遂相親睦又曰太祖征馬超文帝留守使程昱參軍田銀蘇伯等反河間遣將軍賈信討之賊有千餘人請降議者皆以為如舊法昱曰誅降之意臣以為不可誅也縱誅之宜先啟聞眾議曰軍事有專無請昱不荅文帝起入特引見昱昱曰凡專命者謂有臨時之急呼吸之間者耳今此賊制在賈信之手無朝夕之變故老臣不願將軍行之文帝荅曰君慮之善即白太祖太祖果不誅太祖還聞之甚悅謂昱曰君非徒明於軍計也又善處人父子之間, SBCK: 畢綜}
