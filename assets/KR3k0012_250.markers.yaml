  - {type: variant, offset: 3180, length: 5, content: 為軍祭酒言, SBCK: 路權遣使追拜岱交州牧晉書曰張茂爲凉州牧武公軌之子也築靈鈞臺周輪八十餘堵其髙九仞武陵人閻曽夜叩門呼曰武公遣我來曰何故勞百姓而築臺乎姑臧令辛巖以曽妖妄請殺之茂曰吾信勞人曽稱先君之令何爲妖乎太府主簿馬魴諌曰今丗難未夷唯當弘道業不冝勞役崇師臺榭比年已來轉覺衆務日奢}
