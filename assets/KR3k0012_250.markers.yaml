  - {type: variant, offset: 419, length: 0, content: '', SBCK: 從上送中郎將來歙䘮還入夏城門中與五官將軍相逢道迫良怒召門􅀱岑尊叩頭馬前永劾奏良曰今月二十七日車駕臨故中郎將來歙䘮還車駕過湏􅁷趙王良從後到與右中郎將張邯相逢城門中道迫狹叱邯旋車又召門􅀱岑尊詰責使前走數十歩按良諸侯藩臣蒙恩入侍知尊帝城門使􅀱吏六百石而肆意加怒令叩頭都道走馬頭前無藩臣之禮大不敬也後漢書曰鮑昱爲􅀠在職奉法守正有父風永平五年坐救火遟免又曰鮑永爲司􅀠鮑恢爲都官從事並不避強禦詔䇿曰貴戚且當歛手}
  - {type: page-break, offset: 419, content: '', id: KR3k0012_SBCK_250-2a}
  - {type: variant, offset: 419, length: 0, content: '', krp: 從上送中郎將來歙䘮還入夏城門中與五官將軍相逢道迫良怒召門候岑尊叩頭馬前永劾奏良曰今月二十七日車駕臨故中郎將來歙䘮還車駕過湏臾趙王良從後到與右中郎將張邯相逢城門中道迫狹叱邯旋車又召門候岑尊詰責使前走數十歩按良諸侯藩臣蒙恩入侍知尊帝城門使候吏六百石而肆意加怒令叩頭都道走馬頭前無藩臣之禮大不敬也後漢書曰鮑昱爲隷在職奉法守正有父風永平五年坐救火遟免又曰鮑永爲司隷鮑恢爲都官從事並不避強禦詔䇿曰貴戚且當歛手}
  - {type: variant, offset: 420, length: 3, content: 清白方, SBCK: 避二鮑其見憚如此永子昱復爲司􅀠􅀄拜使封胡降檄丗祖遣問昱曰有所恠否對曰臣聞故事通官文書不著姓名又當司徒露布怪使司􅀠下書而著姓也上曰吾故欲令天下知忠臣之子復爲司􅀠又曰李􅈾字元禮拜司􅀠校尉張讓弟朔爲野王令貪殘無道畏膺而逃藏讓舎柱中􅈾率將吏破柱取朔付獄殺之讓訴􅁈於帝帝詔詰􅈾􅈾曰昔仲尼爲魯司㓂七日而誅少}
  - {type: variant, offset: 420, length: 3, content: 清白方, krp: 避二鮑其見憚如此永子昱復爲司隷𥘉拜使封胡降檄丗祖遣問昱曰有所恠否對曰臣聞故事通官文書不著姓名又當司徒露布怪使司隷下書而著姓也上曰吾故欲令天下知忠臣之子復爲司隷又曰李􅈾字元禮拜司隷校尉張讓弟朔爲野王令貪殘無道畏膺而逃藏讓舎柱中􅈾率將吏破柱取朔付獄殺之讓訴冤於帝帝詔詰􅈾􅈾曰昔仲尼爲魯司㓂七日而誅少}
  - {type: variant, offset: 424, length: 18, content: 稱東平王蒼辟為西曹椽數諫正蒼多善策蒼, SBCK: 夘今臣到官巳積旬懼以淹留爲諐不意獲速疾之罪乞留五日克殄元惡帝謂讓曰汝弟之罪也自是宦官屏氣休沐不敢復出帝問其故並叩頭泣曰畏李司􅀠也又曰司􅀠校尉下邳趙興亦不䘏諱忌䘏憂也毎入官舎輙更繕脩館宇移穿改築故犯妖禁而家人爵禄益用豐熾官至頴川太守子峻太傅以才器􅁛孫安代魯相三葉皆爲司􅀠時􅁛其盛又曰江馮}
  - {type: page-break, offset: 424, content: '', id: KR3k0012_SBCK_250-2b}
  - {type: variant, offset: 424, length: 0, content: '', krp: 夘今臣到官巳積旬懼以淹留爲諐不意獲速疾之罪乞留五日克殄元惡帝謂讓曰汝弟之罪也自是宦官屏氣休沐不敢復出帝問其故並叩頭泣曰畏李司隷也又曰司隷校尉下邳趙興亦不䘏諱忌䘏憂也毎入官舎輙更繕脩館宇移穿改築故犯妖禁而家人爵禄益用豐熾官至頴川太守子峻太傅以才器}
