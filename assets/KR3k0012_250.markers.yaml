  - {type: variant, offset: 484, length: 296, content: 不言則為百石屬其後皆自辟故通為百石云魏志曰董尋字文奧為人忠直為軍謀掾青龍中上大興宮室群臣皆負土尋上書諫曰今臣自知言必死而臣自譬於牛之一毛生既無益其死何損且比本不生矣是以發筆流涕心與世辭臣有八子臣死之後以累陛下魏略曰令狐劭字孔叔在安邑毛城中會太祖攻破鄴遂圍毛城城破劭等輩十餘人皆當斬太祖閱見之疑其衣冠也問其祖考而識其父乃解於署軍謀掾蜀志云馬良字季常為左將軍掾後遣使吳良謂亮曰今衘國命恊穆二家幸為良介於孫將軍亮曰君試自為文良即草曰寡君遺掾良通好以紹昆吾豕韋之勳其人吉士荊楚之令鮮於造次之華而有克終之美願降心存納以慰將命權善待之吳志曰張溫父允以輕財重士名顯州郡為孫權東曹掾晉中興書曰荀闓字道明有清稱, WYG: 廻避}
