  - {type: variant, offset: 805, length: 11, content: 珣弱冠而陳郡謝玄俱辟大, WYG: 駿為}
  - {type: variant, offset: 812, length: 284, content: 玄俱辟大司馬桓溫語人曰謝掾年三十必擁旄仗節王掾當作黑頭公皆未易才也典略曰趙戩除萬年令遂遭三輔亂客荊州劉表以為賓客是時白衣平原禰衡高論冠世來遊京師詆䚹朝士及南見戩歎之曰所謂鐵則干將莫耶木則椅桐梓漆人則顏冉仲弓後辟魏王相國掾殷氏家傳曰殷秦字子平為大皇帝車騎掾委以書記上歎曰非唯秋兔之毫乃是鷹鸇之爪郭子曰王仲祖謝仁祖同為王公掾在坐長史云謝掾能作異舞王命為之謝便起舞神意甚暇王公熟視顧謂諸客曰使人思安豐安豐王戎封也語林曰王藍田少有癡稱王丞相以地辟之既見無所他問問來時米幾價藍田不荅直張目視王公王公云王掾不癡何以云癡府屬漢書曰谷永字子雲為長安吏後愽學經書有茂才除補御史大夫屬華嶠, SBCK: 承}
