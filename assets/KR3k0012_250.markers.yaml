  - {type: variant, offset: 1800, length: 496, content: 京兆杜乂並有美譽善言玄理論難精微故風流清談皆歸之征西將軍庾亮引為記室參軍又曰孔寅字舒元中宗命為安東參軍專掌記室時書命殷積寅每稱職沈約宋書曰孔顗署衡陽王義季記室奉牋固辭曰記室之局實惟華要自非文行秀敏莫敢居之顗學不綜實性又踈惰何可以屬知秘記秉筆文闈假吹之尤方斯非濫三國典略曰顏晃字克明瑯邪臨沂人也少孤貧有詞彩解褐梁邵陵王綸兼記室參軍時東宮學士庾信常使于府王使晃接對信輕其尚少曰此府兼記室幾人晃荅曰猶少於宮中學士杜龕為吳興太守專好勇力梁元患之及使晃管其書翰仍謂龕曰顏晃文學之士使相毗佐造次之間必宜諮稟後周書曰郁慶領記室時北雍州獻白鹿群臣欲草表陳賀尚書蘇綽謂慶曰近代已來文章華靡逮于江左彌復輕薄洛陽後進祖述不已相公柄民軌物君職典文房宜製此表以革前弊慶操筆立成辭兼文質綽讀而笑曰枳橘猶自可移況才子也隋書曰魏澹專精好學愽涉經史善屬文詞采贍逸齊愽陵王濟聞其名引為記室唐書曰李巨川字下巳隴右人國初十八學士道玄之後故相逢吉之姪曾孫父循大中八年登進士第巨川乾符應進士屬天下大亂流離奔播切於祿仕乃以刀筆從諸侯府王重榮鎮河中辟為掌書記時車駕在蜀賊據京師重榮匡合諸藩叶力殄寇軍書奏請堆案盈几巨川文思敏速翰動如飛傳之藩鄰, SBCK: 奪}
