  - {type: variant, offset: 176, length: 197, content: 二婢辟為從事中郎有戲之曰奴價倍婢納曰百里何必輕於五羖皮耶又曰稽紹字延祖方直儒雅為衛軍從事中郎虞預晉書曰劉隗字大連彭城人學涉有具為祕書郎避亂南渡遂為中宗從事中郎甚見器遇何法盛晉中興書曰謝萬少而才器儁秀太宗聞其名取為鎮軍從事中郎抱朴子曰友人稽君道為廣州刺史其弟應靜為太愽從事中郎別於襄陽君道泣而應靜不泣抱朴子以為丈夫宜然府椽史記曰倪寬為廷尉史為人溫良有廉智張湯以為長者數稱譽之及湯為御史大夫而寬為掾, SBCK: 盗賊}
