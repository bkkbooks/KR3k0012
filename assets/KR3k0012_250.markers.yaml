  - {type: variant, offset: 1100, length: 2, content: 陳寵, SBCK: 華松擢爲司􅀠校尉是時貴戚專勢有司軟弱莫敢糺罰松下車閉閤不通私書不與豪右相見姦慝犯者輙死奏馬氏三侯群豪歛手應劭漢官儀曰司􅀠校尉糺皇太子三公}
  - {type: variant, offset: 1100, length: 0, content: '', WYG: 鮑昱為司隸在職奉法守正有父風永平五年坐救火遲免又曰鮑永為司隸鮑恢為都官從事並不避强禦詔筞曰貴戚且當歛手以避二鮑其見憚如此永子昱復為司隸初拜使封胡降檄世祖遣問昱曰有所怪否對曰臣聞故事通官文書不著姓又當司徒露布怪使司隸下書而著姓也上曰吾故欲天下知忠臣之子復為司隸又曰李膺字元禮拜司隸校尉張讓弟朔為野王令貪殘無道畏膺而逃藏讓舍柱中膺率將吏卒破柱取朔付獄殺之讓訢寃於帝帝詔詰膺膺曰昔仲尼為魯司冦七日而誅少正卯今臣到官已積旬懼以淹留為諐不意獲速疾之罪乞留五日克殄元惡帝謂讓曰汝弟之罪也自是宦官屏氣休沐不敢復出帝問其故並叩頭泣曰畏李司隸也又曰司隸校尉下邳趙興亦不䘏諱忌䘏憂也毎入官輒更繕修館宇移穿改築故犯妖禁而家人爵禄益用豐熾官至頴川太守子峻太傳以材器稱孫安世魯相三葉皆為司隸時稱其盛又曰江馮上言宜令司隸校尉督察三公}
