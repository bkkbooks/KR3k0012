  - {type: variant, offset: 376, length: 3, content: 陳遵為, SBCK: 諸􅁑豐爲司􅀠無所廽避京師爲之語曰間何闊逢諸􅁑言間者何乆闊不相見以逢諸􅁑故也侍中許章以外属貴幸賔客犯法與章相連豐欲劾奏適逢章出豐駐車舉節招章曰下欲収之章馳去豐奔車逐之章突入殿得免由此成帝遂収豐節也又曰鮑宣字子都明經爲司􅀠丞相孔光行園陵官属行馳道中宣使鈎止丞相􅁺史没入其車馬以摧辱宰相事下御史中丞官欲捕從事閉門不内宣坐閉拒使者大不敬下獄愽士弟子王咸舉幡太學下曰欲救鮑司􅀠者㑹此下諸生㑹者千餘人朝日遮丞相孔光自言丞相車不得行宣罪减死一等又曰蓋寛饒字次}
  - {type: page-break, offset: 376, content: '', id: KR3k0012_SBCK_250-1b}
  - {type: variant, offset: 376, length: 2, content: 陳遵, WYG: 諸葛豐}
  - {type: variant, offset: 376, length: 8, content: 陳遵為公府掾公府, krp: 諸葛豐爲司隷無所廽避京師爲之語曰間何闊逢諸葛言間者何乆闊不相見以逢諸葛故也侍中許章以外属貴幸賔客犯法與章相連豐欲劾奏適逢章出豐駐車舉節招章曰下欲収之章馳去豐奔車逐之章突入殿得免由此成帝遂収豐節也又曰鮑宣字子都明經爲司隷丞相孔光行園陵官属行馳道中宣使鈎止丞相}
  - {type: variant, offset: 379, length: 104, content: 公府掾公府掾史率皆羸車小馬不尚鮮明而遵獨極輿馬衣服之好門外車騎交錯東觀漢記曰吳良以清白方正稱東平王蒼辟為西曹椽數諫正蒼多善策蒼上表薦良續漢書曰府掾比古之元士皆三命也漢舊注曰或曰漢初掾史辟皆上言故有祑皆比命士其, WYG: 司隸無}
