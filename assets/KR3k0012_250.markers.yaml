  - {type: variant, offset: 786, length: 1, content: 洛, WYG: 間何闊逢諸葛言間者何久濶不相見以逢諸葛故也侍}
  - {type: variant, offset: 788, length: 3, content: 英英荀, WYG: 許章以外屬貴幸賔客犯法與許章相連豐欲奏劾適逢章出豐駐車舉節招章曰下欲収之章馳去豐奔車逐之章突入殿得免由此成帝遂収豐節也又曰鮑宣字子都明經為司隸丞相孔光行園陵官屬行馳}
  - {type: variant, offset: 792, length: 1, content: 明, WYG: 中宣使鈎止丞相掾史没入其車馬以摧辱宰相事下御史中丞官欲捕從事閉門不内宣坐閉拒使者}
