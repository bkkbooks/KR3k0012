  - {type: variant, offset: 3181, length: 4, content: 軍祭酒言, WYG: 凉州牧武公軌之子也築靈鈞臺周輪八十餘堵其髙九仞武陵人閆増夜叩門呼曰武公遣我來曰何故勞百姓而築臺乎姑臧令辛巖以増妖妄請殺之茂曰吾信勞人増稱先君之令何為妖乎太府主簿馬魴諌曰今世難未夷惟當𢎞道業不宜勞役崇飾臺榭比年以來轉覺衆物日奢}
