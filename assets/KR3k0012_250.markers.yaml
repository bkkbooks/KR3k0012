  - {type: variant, offset: 3057, length: 2, content: 事從, SBCK: 莫可以捷也成敗之機在斯一舉將軍其勉之羗曰􅀂以司􅀠見與者公無以爲憂唐書官品志曰司􅀠臺大夫一人正四品掌諸廵察其所掌六條一察品官以上理政能不二察官人貪殘害政三察豪強姧猾侵害下人及田宅踰制官司不能禁止者四察水旱蟲災不以實言枉徴賦役及無災妄蠲免者五察部内賊盗不能窮逐隱而不申者六察德行孝悌茂才異行隱而不貢者毎年二月乗軺廵郡縣十月入奏英雄記曰董卓謂王允曰欲得一快司􅀠校尉誰可作者允曰唯有蓋勲元周京兆耳卓曰此明智有餘不可假以雄職列異傳曰故司􅀠校尉上黨鮑}
