  - {type: variant, offset: 1783, length: 590, content: 非交不發身非交不立楊子法言曰朋而不心面朋也友而不心面友也周昭新撰曰交之為道起自羲皇造化之初君臣始立而有人倫上下之敘象天地交泰以左右於民也唐虞三代莫不因之故交全情親則國安治強交敗情乖則國危治弱立交者欲其親也是故百姓不親禹作司徒踈者能睦廉頗相如忍忿以崇厚陳平周勃感陸生而相親所以安趙於強敵定漢於幾殆此交接之大義帝王之極務聞之於易曰交乃人倫之本務王道之大義也魏文帝集論曰夫陰陽交萬物成君臣交邦國治士庶交德行光同憂樂共富貴而交道備矣阮子政論曰夫交遊者儔黨結於家威權傾其國或以利厚而比或以名高相求同則譽廣異則毀深朝有兩端之議家有不協之論至令父子不同好兄弟異交友破和穆之道長諍訟之源鍾會芻蕘論曰凡人之結交誠宜盛不忘衰達不棄窮不疑惑於讒構不信受於流言經長歷遠久而逾固而人多初隆而後薄始密而終䟽斯何故也皆由交靜不發於神氣道數乖而不同權以一時之術取倉卒之利有貪其財而交有慕其勢而交有愛其色而交三者既衰䟽薄由生東方朔與公孫弘書曰蓋聞爵祿不相責以禮同類之遊不以遠近為是故東門先生居蓬戶空穴之中而魏公子一朝以百騎日造之呂望未嘗與文王同席而坐一朝讓以天下半夫丈夫相知何必以撫塵而遊垂髮齊年偃伏以日數哉離騷曰交不忠信兮怨長晉潘岳陽肇誄曰余以頑蔽覆露重陰仰追先達執友之心也古歌辭曰結交在相知骨肉何必親甘言無忠實世薄多蘇秦又曰採葵莫傷根結交莫羞貧傷根葵不生羞貧交不成交友一左傳曰吳公子劄聘于齊說晏平仲躬於鄭見子產, SBCK: ''}
