  - {type: variant, offset: 547, length: 0, content: '', WYG: 尹敏字㓜季與班彪相厚每相談常對案不食晝即至暝夜即徹旦又曰朱暉同縣張堪有名徳每與相見常接以友道暉以堪宿望盛名未敢安之堪至把暉臂曰欲以妻子託朱生暉舉手不敢荅堪後仕為漁陽太守暉自為臨淮太守絶相聞見時南陽饑堪妻子貧窮暉乃自徃候視其困分所有以賑給之又曰郅暉友人董子張者父先為郷人所害及子張病将終暉徃候之子張流涕視暉不能言暉曰吾知子不悲天命而痛讎不復也子張目繫而已暉即起将客遮仇人取其頭以示子張見而氣絶又曰趙喜為赤眉兵所圍迫急乃亡走與友人韓仲伯等數十人携小弱越山出武關仲伯以婦色美慮有强暴者而已受其害欲棄之於道喜怒不聴以泥塗仲婦面載以鹿車身推之毎逢賊欲逼奪喜輒言病以此得免又曰閔仲叔恬靜養神弗役於物與周黨相友黨每過仲叔共含菽飲水又曰應順字仲華汝南人少與同郡許敬善敬家貧親老無子為敬去妻更娶魏志曰荀攸彧從弟也太祖曰孤與荀公達周旋二十餘年初無毫毛可非者又曰公達賢人也所謂温良恭儉譲以得之孔子稱}
