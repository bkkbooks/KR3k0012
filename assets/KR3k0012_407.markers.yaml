  - {type: variant, offset: 1380, length: 2, content: 者言, SBCK: 周瑜知其竒也遂相親結定喬札之分又曰魯蕭代周瑜之當陸口過吕蒙屯下肅意尚輕蒙或􅀃肅曰吕將軍功曰顯不可以故意待也君冝順之肅遂往詣蒙酒酣蒙問肅曰君受重任與關羽爲隣將何計略以備不虞因爲晝五䇿肅於是越席就之拊其背曰吕子明吾不知卿才略所及乃至於此遂拜蒙母結友而别恕吴録曰張温字惠怒英才瓌偉遂以禮躬延見召對詞雅淹潤帝改容前席拜中郎聘蜀與諸􅁑全結金蘭之好焉蜀志曰馬謖音縮字㓜常才氣過人好論軍計謖臨終與諸􅁑亮書曰明公視謖猶子謖視明公猶父願深殛鯀興禹之義使平生之交不􅃜此謖雖死}
