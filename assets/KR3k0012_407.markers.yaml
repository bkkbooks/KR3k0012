  - {type: variant, offset: 12, length: 0, content: '', SBCK: 孔融宙之子也十歳從父詣京師時河南尹李膺簡重勑外云自京非當世才藝英賢通家子孫輙不得進融故造其門云我與公積代通家子孫膺乃召見問父祖甞與僕有恩舊曰然吾先君孔子與君先人李老君同徳比義而相師}
