  - {type: variant, offset: 1085, length: 286, content: 志曰胡質云古人之交也取多知其不貪奔北知其不怯聞流言而不信故可終也莊子曰凡交近則必相靡以信遠則必忠之以言孟子曰萬章曰敢問友孟子曰不挾長不挾貴不挾兄弟而友者友其德也不可以有挾也又曰舜尚見帝帝館甥于貳室迭為賓主是天子而友於匹夫也譙子齊交曰譬之於物猶素之白也染之以藍則青遊居交友亦人之所染也韓起與田蘇處而成好仁之名甘茂事史舉用顯齊秦之功曹參師蓋公致清靜之治竇長君兄弟出於賤隸謹恭師友皆為退讓君子語曰蓬生麻中不扶自直此言雖小可以喻大必得其人千里同好固於膠漆堅於金石窮達不阻其分毀譽不疑其實鄒子曰昔邢高呂安飲於市仰天泣二子非有喪之哀傷相知之晚耳君子所以勤於接賢汲汲於結善欲以立名者也呂, SBCK: ''}
