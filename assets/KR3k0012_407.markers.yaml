  - {type: variant, offset: 1377, length: 0, content: '', krp: 終始素與魏滕同邑相}
  - {type: variant, offset: 1378, length: 0, content: '', SBCK: 爲交􅅬甞有罪吴王權責怒甚敢有諌者處死範謂滕曰與汝偕死􅅬曰死而無益何死範曰安能慮此坐觀汝耶乃髠頭自􅅞詣門下使鈴下以聞鈴下不敢曰必死不可範曰汝有子耶曰有曰使汝爲吴範死子以屬我鈴下諾力排閤入言未卒權大怒欲投以㦸逡廵出走範因突入叩頭流血言與涕并良乆權意釋免􅅬又曰周瑜長壯有姿皃孫堅議興兵討董卓徙家於舒堅子䇿與同年獨}
  - {type: page-break, offset: 1378, content: '', id: KR3k0012_SBCK_407-6a}
  - {type: variant, offset: 1378, length: 0, content: '', WYG: 為交勝嘗有罪吳主權責怒甚敢有諫者處死範謂勝曰與汝偕死勝曰死而無益何死範曰安能慮此坐觀汝耶乃髠頭自縳詣門下使鈴下以聞鈴下不敢曰必死不可範曰汝有子耶曰有曰使汝為範死子以屬我鈴下者乃排閣入言未卒權大怒欲投以㦸逡廵出走範因突入叩頭流血言與涕并良乆權意釋免勝又曰周瑜長壮有姿貎孫堅議興兵討董卓徙家於舒堅子策與同年獨}
  - {type: page-break, offset: 1378, content: '', id: KR3k0012_WYG_407-9b, image: WYG0896/WYG0896-0583b.png}
  - {type: variant, offset: 1378, length: 0, content: '', krp: 爲交滕甞有罪吴王權責怒甚敢有諌者處死範謂滕曰與汝偕死滕曰死而無益何死範曰安能慮此坐觀汝耶乃髠頭自縛詣門下使鈴下以聞鈴下不敢曰必死不可範曰汝有子耶曰有曰使汝爲吴範死子以屬我鈴下諾力排閤入言未卒權大怒欲投以㦸逡廵出走範因突入叩頭流血言與涕并良乆權意釋免滕又曰周瑜長壯有姿皃孫堅議興兵討董卓徙家於舒堅子䇿與同年獨}
