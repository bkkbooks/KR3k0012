  - {type: variant, offset: 433, length: 1, content: 夏, WYG: 隱華隂山及鴻東遊思恢作詩遠不復相見恢亦髙抗終身不仕又曰陳蕃李膺之敗何顒與蕃舊善遂為宦者所陷乃改名姓亡匿汝南間所至皆親其豪傑有聲荆豫之域袁紹慕之私與徃來結爲奔走之交又曰孔奮字君魚扶風茂陵人也守姑臧長治貴仁平太守梁統深相敬待不以官屬禮之常迎於大門引入見母又曰李燮字徳公所交皆捨短取長好成人之美時潁川荀爽賈彪雖俱知名而不相能燮並交二子情無適莫世稱其正又曰王允字子師同郡郭林宗一見竒之曰王生一日千里王佐才也遂定交謝承後漢書曰范式為荆州刺史友人南陽孔嵩貧居親老乃變名姓傭於新野縣縣吏遣嵩為式𨗳騶式見而識之呼嵩把臂謂曰子非孔仲山耶對之歎息式勅縣代嵩嵩以傭未竟不肯去又曰陳蕃既被害友人陳留朱震時為銍令聞而棄官哭而收葬又曰許敬字鴻卿汝南人與同郡周伯靈為交友伯靈早亡鴻卿育飬其子又曰馬實字伯騫勒結英雄所欲友接負笈荷擔不逺萬里山陽王暢未仕時實慕髙名徃存之屇暢門投刺欲不肯見使從者拒之云行歴未旋實留連日日徃伺之謂從者曰夫孝子事親行不踰日而至今不歸非孝子也欲待與相見如㓙於路徃而不反哭之以爲死交暢聞其言嘆息壮志因執其手揖引與入美談畢請入見毋飲實定好而别實臨退報暢手訣曰大上立徳其次立功幸俱生盛明之世免磚瓦之姿託爲丈夫當建名後載不可爲空生徒死之物穢天壤之間又曰雷義字仲公豫章人舉茂才讓友人陳重字景公刺史不聽義遂陽狂披髪走不應命鄉里爲之語曰膠漆自謂堅不如雷與陳又曰范式字巨卿山陽金郷人少遊太學與汝南張劭為友劭字元伯二人並告歸鄉里式謂元伯曰後二年當還将過拜尊親見孺子焉乃共尅期至日巨卿果到升堂拜母飲盡懽而别後元伯寢疾篤同郡郅君章商子㣲晨夜省視元伯臨盡曰恨不見死友尋卒式夢元伯𤣥冕垂纓而呼}
