  - {type: variant, offset: 1375, length: 1, content: 荊, SBCK: 稱康寓居河内與之遊者未甞見其喜愠之色與陳留阮籍河内山濤向秀籍兄子瑯瑘王戎沛人劉伶相與友善遊於竹林號曰七賢吴志曰孫䇿創業命張昭爲長史撫軍中郎將􅂛堂拜母如比肩之舊文武之事一以委昭又曰吴範字文則與親故接}
  - {type: variant, offset: 1375, length: 1, content: 荊, WYG: 嵇康寓居河内與之遊者未嘗見其喜愠之色與陳留阮籍河内山濤向秀藉兄子咸瑯琊王戎沛人劉伶相與友善遊於竹林號曰七賢吳志曰孫策創業命張昭為長史撫軍中郎将升堂拜母如比肩之舊文武之事一以委昭又曰吳範字文則與親故接}
  - {type: variant, offset: 1375, length: 1, content: 荊, krp: 稱康寓居河内與之遊者未甞見其喜愠之色與陳留阮籍河内山濤向秀籍兄子瑯瑘王戎沛人劉伶相與友善遊於竹林號曰七賢吴志曰孫䇿創業命張昭爲長史撫軍中郎將升堂拜母如比肩之舊文武之事一以委昭又曰吴範字文則與親故接}
