  - {type: variant, offset: 336, length: 0, content: '', SBCK: 字仲公豫章人舉茂才讓友人陳重字景公刺史不聽義遂陽狂􅀍髪走不應命郷里爲之語曰膠􅃮自謂堅不如雷與陳又曰范式字巨卿山陽金郷人少遊太學與汝南張劭爲友劭字元伯二人並告歸郷里式謂元伯曰後二年當還將過拜尊親見孺子焉乃共尅期至日巨卿果到升堂拜母飲盡懽而別後元伯寢疾篤}
