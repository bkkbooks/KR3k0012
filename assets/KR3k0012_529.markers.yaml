  - {type: variant, offset: 769, length: 206, content: 以來未遑脩建禘祫毛詩清廟雍曰雍禘太祖也禘大祭有來雍雍至止肅肅相維辟公天子穆穆又商頌曰長發大禘大禘郊祭天也禮記曰王者禘其祖之所自出以其祖配之是謂也濬哲維商長發其祥洪水芒芒禹敷下土方外大國是疆幅隕既長箋云長猶久也隕當作圓圓謂周也深知乎維商家之德也久發見其禎祥矣乃用洪水禹敷下土正四方定諸夏廣大其竟界之時始有王天下之萌兆歷虞夏之世故為久也禮記曾子問曰當七廟五廟無虛主虛主唯天子崩諸侯薨與去其國與祫祭於太祖為無主耳禮記大, SBCK: ''}
