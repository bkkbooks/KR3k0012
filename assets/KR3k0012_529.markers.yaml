  - {type: variant, offset: 2894, length: 8, content: 禋于六宗李郃命別, SBCK: 下宰臣嗚咽流涕各請罪乞免相位是夜澍雨大洽又曰孔戣爲廣州刺史先是准詔禱南海神多令從事代戣必自越風波而徃韓愈爲潮州作詩美之華陽國志曰梁輔爲郡五官時天大旱請雨不降輔出禱乃積薪祝神曰二日不雨則欲自焚謝罪百姓言終而雨長沙郡􅂄舊}
