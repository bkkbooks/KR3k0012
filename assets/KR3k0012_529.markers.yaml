  - {type: variant, offset: 4, length: 2, content: 迎氣, WYG: 祀曰司命曰中霤曰國門曰國行曰太厲曰户曰竈諸侯為國立五祀曰司命曰中霤曰國門曰國行曰公厲大夫立三祀曰族厲曰門曰行適士立二祀曰門曰行庶人立一祀或立户或立竈五祀門户中霤也此者小神居人之門又月令曰孟春祀户孟夏祀竈季夏祀中霤孟秋祀門孟冬祀行餘見吉禮門白虎通曰何謂五祀者門户竈井中霤也又曰曲禮下記云天子祭天地四方山川五祀嵗遍諸侯方伯祀山川祭五祀歳遍士祭其先凡祭有廢莫敢舉有舉莫敢廢當祭而祭不祭而祭為之滛無福祭五祀所以嵗遍何慎五行也五經異議曰大戴說禮器云竈者老婦之祭許君按月令孟夏之月其祀竈五行之神王者所祭非老婦也鄭𤣥曰竈神祝融是老婦又曰王為羣姓立七祀一曰司命主督察三命也二曰中霤王宫室居處也三曰門四曰户出入五曰國行主道路也六曰太厲主殺也七曰竈主飲食也漢書議曰祠五祀謂五行金木水火土也木正曰勾芒火正曰祝融金正曰蓐収水正曰𤣥冥土正曰后土皆古賢能治成五行有功者也主其神祀之魏名臣奏曰秦静議云祭法七祀有國行今月令謂行為井是俗廢行而祀井武帝始定天下興復舊祀造祭祀門户井竈中霤文帝稱詔静按凡諸祠祀所以尊敬神靈不宜稱詔髙堂隆議曰國中霤門井竈多不遍唯祀在者故曰祭五祀在於廟今毎門户輙祭之自漢以来非舊典也祭井自漢從水類不列五祀宜除祭井祀行世本曰㣲作禓五祀㣲者殷王八世孫也者强死男也謂時儺索室駈疫逐强死鬼也五者謂門户及井竈中霤也傅𤣥五祀議曰禮大記云室中央中霤謂四霤之中也祭於漏井盖失之矣七祀之文皆云祀行而無井祭竈而不祭井於事則闕夫設祀者非唯報功而已亦神道設教使民慎之幽明也臣以為帝之都城宜祭一門正宫一門正室一户井竈中霤亦各擇其一正者祭之四望尚書舜典曰正月上日受終于文祖在璿璣玉衡以齊七政肆類于上帝禋于六宗望于山川遍于羣神嵗二月東廵狩至于岱宗柴望秩于山川肆覲東后孔安國曰望秩于山川者以尊卑祭之也五嶽視三公四瀆視諸侯其餘小者或卿大夫伯子男周禮春官上曰大宗伯之職國有大故則旅上帝及四望四望五岳四鎮四瀆也又春官曰小宗伯之職掌兆五帝于四郊四望四類亦如之又春官上典瑞曰掌玉瑞玉器之蔵四珪有邸以祀天旅上帝兩珪有邸以祀地旅四望又春官大司樂曰乃奏姑洗歌南吕舞大韶以禮四望又公羊傳僖下曰夏四月卜郊不從乃免牲猶三望者何望祭也則曷為祭太山河海山川有能潤于百里者天子秩而祭之五經通義曰王者所以因郊祭日月星辰風伯雨師山川何以為皆有功于民故祭之也皆天地之則神從官也縁天地之義亦欲及之故嵗一祭之禮日出于南門外禮月四瀆于北門外禮山川丘陵于西門外禮風伯雨師于東門外禮各即其位也以示明之其祭之柰何乎曰祭日者懸祭月者毁祭風者明祭雨者布祭山川者沉各象其貌也三輔黄圖曰宰衡王莽奏曰冬至使有司祭天神于南郊髙祖配而望羣陽夏至使有司祭地于北郊髙后配而望羣隂隋書志曰梁朱异議鄭衆云四望謂日月星海鄭𤣥曰五岳四瀆尋二鄭之說互有不同竊以望是不即之名凡厥遥祭皆有斯月豈容局于星海拘于海瀆請今天司有闕水旱之議爰有四海名山大川能興雲致雨一皆備祭髙禖禮記月令曰仲春𤣥鳥至之日以太牢祀于髙禖天子親往后妃率九嬪御乃禮天子所御帶以弓韣授以弓矢立于髙禖之前髙禖祀名也髙尤尊也禖者祈子孫之祀也天子所御謂后妃以下王妾御者韣弓衣也帶以弓衣使得男也𤣥鳥遺卵娥簡狄吞之生契以為禖官漢書曰太子據立為皇太子初上年二十九乃得太子甚喜為立禖禖求子禖神使東方朔枚臯作禖祝續漢書曰仲春之月立髙禖祀于城南禮以特牲五經異議曰王者一嵗七祭天地仲春后妃郊禖禖亦祭天也五經要議曰契母簡狄以𤣥鳥至之日祀于髙禖而生契髙禖者盖先王所以祈子孫也𤣥鳥感陽而至集人棟宇有孳乳之祥故重其至日因以用事五經異議曰鄭記曰𤣥鳥至之日以太牢祀于髙禖注曰髙辛氏世娥簡狄吞燕子而生契後王以為禖官嘉祥其祀焉王權問曰以注言之先商之時未有髙禖生民詩曰克禋克祀以祓無子傳以為古者必以髙禖為姜嫄禋祀上帝而生稷是則髙禖之祀非以生契後之立也譙喬荅曰先商之時自必有禖氏祓除之祀位在南郊盖亦以𤣥鳥之至日然其所禋乃于上帝娥蕳狄吞一子之後王以為禖官嘉祥祀之以配帝謂之髙禖晉束晳髙禖壇石議曰元康六年髙禖壇上石破為二叚詔問置此石来㡬時出何經典今應復不博士議禮無髙禖置石之文未知設造所由既以毁破無可改造說髙辛氏有簡狄吞卵之祥今此石有吞卵之象盖俗說所為而史籍無記但可改聚復于舊處而已太常以為吞卵之言盖是逸俗之失義固今毁破便宜廢除下四府博士議賊曹屬束晳議夫未詳其置之故而欲必其可除之理理不可然按郊祀志秦漢不祀髙禖漢武帝五子傳武帝晚得太子始為立禖其事未之能審許慎五經異說云山陽民祭皆以石為主然則石之為主由来尚矣其此象矣而祭祀龜策祭器敝則埋之而改置新石今破則宜埋而更造不宜遂廢収其破石埋之故處于禮無依于事不肅思所未安也時公卿從太常所處此議不用其後得髙堂隆故事魏青龍中造此禮詔書更鐫石令如舊置髙禖壇上埋破石入地一丈隋書禮志曰梁太廟北門内道西有石文如竹葉小屋覆之宋元嘉中脩廟所得陸澄以為孝武時郊禖之石然則江左亦有此禮矣後齊髙禖為壇于南郊傍廣輪二十六尺髙九尺四陞三壇禱祈周書曰四月孟夏王初祈禱于宗乃嘗麥于廟毛詩甫田曰琴瑟擊鼓以御田祖以祈甘雨以介我稷黍以榖我士女又生民行葦曰曽孫唯主酒醴唯醹酌以大斗以祈黄耉又臣工噫嘻曰春夏祈榖于上帝也周禮春官上小宗伯曰小宗伯掌大灾乃執事禱祠于上下神祗又春官下太祝掌六祝之辭以事鬼神示祈福祥求永貞神天神鬼人鬼示地祗也}
