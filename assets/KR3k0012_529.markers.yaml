  - {type: variant, offset: 3007, length: 0, content: '', WYG: 不祈其見超然可謂盛徳若使神明無知則安能降福必其有知則私己求媚之事君子尚不可恱也况于明神乎由此言之則履信思順天自祐之苟異于此實難致福故堯舜之務唯在脩已以安百姓管仲云義于人者和于神葢以人為神主故但務安人而已虢公求神以至危亡王莽妄祈以速漢兵古今明誡書傳}
  - {type: page-break, offset: 3007, content: '', id: KR3k0012_WYG_529-11a, image: WYG0897/WYG0897-0695a.png}
  - {type: variant, offset: 3008, length: 1, content: 據, WYG: 記望陛下每以漢文孔子之意為准則百福具臻矣上深嘉美之又曰文宗開成中以久旱分命郡官徧祠祈禱于紫宸殿對宰臣憂形於色宰臣以星官所奏天時當爾乞不過勞聖慮上凛然改容曰朕為天下主無徳及人致此災旱今又謫見于上若三日不雨退歸南位更選賢英主天下宰臣嗚咽流涕}
  - {type: page-break, offset: 3008, content: '', id: KR3k0012_WYG_529-11b, image: WYG0897/WYG0897-0695b.png}
  - {type: variant, offset: 3010, length: 0, content: '', WYG: 請罪乞免相位是夜㴻雨大洽又曰孔戣為廣州刺史先是准詔禱雨南海神多令従事代戣必自越風波而往而韓愈為潮州刺史作詩華陽國志曰良輔為郡五官時天大旱請雨不降輔出禱乃積薪祝神曰二日不雨則欲自焚謝罪百姓言終而雨長沙郡耆舊傳曰祝良為洛陽令時亢旱天子祈不得良乃曝身階庭告誠引罪自晨至午紫雲沓起甘雨大降民為之歌曰天久不雨烝民失所天王自出祝令持苦精答感應滂沱而下列仙傳曰厯陽有彭祖仙室前世禱請風雨莫不輒應常有兩虎在祠左右祀訖即有虎跡}
  - {type: page-break, offset: 3010, content: '', id: KR3k0012_WYG_529-12a, image: WYG0897/WYG0897-0695c.png}
