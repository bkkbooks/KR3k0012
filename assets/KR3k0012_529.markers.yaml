  - {type: punctuation, offset: 6, content: 《, id: KR3k0012_CHANT_529-bkkpn1}
  - {type: variant, offset: 6, length: 0, content: '', SBCK: 成功故􅀕天及之五經通義曰王者所以因郊􅀕日月星辰風伯雨師山川何以爲皆有功於民故􅀕之也皆天地之别神從官也縁天地之意亦欲及之故歳一􅀕之禮日於南門外禮月四瀆於北門外禮山川丘陵西門外􅀕風伯雨師於東門外各即其位也以是明之其􅀕之柰何乎曰􅀕日者懸􅀕月者毀􅀕風者明􅀕雨者布䟽􅀕山川者沉各象其貌也三輔黄圖曰宰衡王葬奏曰冬至使有司􅀕天神於南郊髙祖配而望羣陽夏至使有司􅀕地祇於北郊髙后配而望羣隂隋書志曰梁朱异議鄭衆云四望謂日月星海鄭玄云謂五岳四瀆㝷二鄭之􅀃牙有不同竊以望是不即之名凢厥遥􅀕皆有斯目豈容局於星海拘於海瀆請今天司有􅀜水旱之義爰有四海名山大川能興雲致雨一皆備􅀕髙禖禮記月令曰仲春􅀇鳥至之日以太牢祀于髙禖天子親徃后妃率九嬪御乃醴天子所御帶以弓韣授以弓矢立於髙禖之前蔡邕章句曰髙禖祀名也髙猶尊也禖者所以祈子孫之祀也天子所御謂后妃以下主妾御者韣弓衣也祝以髙禖之命飲以醴酒帶以弓衣尚使得男者也鄭􅀇注曰􅀇鳥遺􅆑娀簡狄吞之生􅆻後以爲禖官嘉祥而立祀也漢書曰太子據立爲皇太子􅀄上年二十九乃得太子甚喜爲立禖張晏曰禖求子禖神使東方朔枚皐作禖祝續漢書曰仲春之月立髙禖祀於城南禮以特牲五經異義曰王者一歳七􅀕天地仲春后妃郊禖禖亦􅀕天也五經要義曰契母簡狄以􅀇鳥至之日祀於髙禖而生􅆻髙禖者盖先王所以祈子孫之祀也玄鳥感陽而至集人棟宇有孳乳之祥故重其至日因以用事五經異義曰鄭記曰􅀇鳥至之日以太牢祀于髙禖注曰髙辛氏世娀簡狄吞鷰子而生契後王以爲禖官嘉祥其祀焉王權問曰以注言之先啇之時未有髙禖生民詩曰克禋克祀以祓無子傳以爲古者必以郊禖焉姜嫄禋祀上帝而生稷是則郊禖之祀非以生契之後立也譙喬荅曰先啇之時自必有禖氏祓除之祀位在􅀯郊盖亦以􅀇鳥至之日然其所禋乃於上帝娀簡狄吞乙子之後王以爲禖官嘉祥祀之以配帝謂之髙禖晉束晳髙禖壇石議曰元康六年髙禖壇上石破爲二叚詔書問置此石來幾時岀何經典今應復不􅀶士議禮無髙禖置石之文未知造設所由旣巳毀破無可改造設髙辛氏有簡狄吞􅆑之祥今此石有吞􅆑之象盖俗􅀃所爲而史籍無記可但收聚復於舊處而巳太常以爲吞􅆑之言盖是逸俗之失義因今毀破便冝廢除下四府􅀶士議賊曹屬束晢議夫未詳其置之故而欲必其可除之理理不可然按郊祀志􅁗漢不祀髙禖漢武帝五子傳武帝晚得太子始爲立禖其事未之能審許慎五經異􅀃云山陽民􅀕皆以石爲主然則石之爲主由來尚矣其此象矣而􅀕禮􅀛䇿􅀕器弊則埋之而改置新石今破則冝埋而更造不冝遂廢収集破石積之故處於禮無依於事不肅思所未安也時公卿從太常所處此議不用其後得髙堂隆故事魏青龍中造立此禮詔書更鐫石令如舊置髙禖壇上埋破石入地一丈隋書禮志曰梁太廟北門内道西有石文如竹葉小屋覆之宋元嘉中脩廟所得陸澄以爲孝武時郊禖之石然則江左亦有此禮矣後齊髙禖爲壇於南郊傍廣輪二十六尺髙九尺四陛三壇禱祈周書曰四月孟夏王􅀄祈禱于宗乃甞麥于廟毛詩甫田曰琴瑟擊鼔以御田祖以祈甘雨以戒我稷􅁰以榖我士女又生民行葦曰曽孫唯主酒醴維醹酌以大斗以祈黄者又臣工噫嘻曰春夏祈榖於上帝也祈猶禱求周禮春官上小宗伯曰小宗伯掌大災乃執事禱祠于上下神祇又春官下太祝掌六祝之辭以事􅀑神祈福祥求永貞馬融傳曰神天神􅀑人􅀑祇地祇也}
