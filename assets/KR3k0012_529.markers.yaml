  - {type: variant, offset: 2885, length: 2, content: 光武, krp: 鄧太后甞體不安左右憂惶至令禱祠願以人爲代太后聞之}
  - {type: variant, offset: 2888, length: 0, content: '', SBCK: 譴怒勑掖庭令以下何故乃有此不祥之言左右咸流涕歎太后臨大病不自頋而念兆民後病瘳豈非天地之應與晉中興書曰大旱經乆太興四年四月始雨有奏應報賽宗廟山川中宗詔曰祈廟云報賽非奉尊上辭也吾意有疑以爲舊山川有許報故雨賽非大事不應告廟臣子無要君之道黷􅀕稱賽於禮有違唐書曰憲宗謂宰臣曰穰災祈福之􅀃其事信否李藩對曰臣竊觀自古聖逹皆不禱祠故楚昭王有疾卜者謂河爲崇昭王以河不在楚非所獲罪孔子以爲知天道仲尼疾病門人子路請禱仲尼以爲神道助順繫於所行巳旣全徳無愧屋漏故荅子路云丘之禱乆矣書云惠迪􅁻從逆凶言順道則􅁻從逆則凶詩云自求多福則禍福之來感應行事􅀂苟爲非道則何福可求是以漢文}
  - {type: page-break, offset: 2888, content: '', id: KR3k0012_SBCK_529-6b}
  - {type: variant, offset: 2888, length: 21, content: 帝位燔燎告天禋于六宗李郃命別傳曰郃侍祠南郊, WYG: 譴怒勅掖庭令以下何故乃有此}
  - {type: variant, offset: 2888, length: 0, content: '', krp: 譴怒勑掖庭令以下何故乃有此不祥之言左右咸流涕歎太后臨大病不自頋而念兆民後病瘳豈非天地之應與晉中興書曰大旱經乆太興四年四月始雨有奏應報賽宗廟山川中宗詔曰祈廟云報賽非奉尊上辭也吾意有疑以爲舊山川有許報故雨賽非大事不應告廟臣子無要君之道黷祭稱賽於禮有違唐書曰憲宗謂宰臣曰穰災祈福之說其事信否李藩對曰臣竊觀自古聖逹皆不禱祠故楚昭王有疾卜者謂河爲崇昭王以河不在楚非所獲罪孔子以爲知天道仲尼疾病門人子路請禱仲尼以爲神道助順繫於所行巳旣全徳無愧屋漏故荅子路云丘之禱乆矣書云惠迪吉從逆凶言順道則吉從逆則凶詩云自求多福則禍福之來感應行事若苟爲非道則何福可求是以漢文}
  - {type: variant, offset: 2889, length: 0, content: '', SBCK: 毎有􅀕祀使有司敬而不祈其見超然可謂盛德若使神明無知則安能降福必其有知則私巳求媚之事君子尚不可恱也况於明神乎由此言之則履信思順自天祐之茍異於此實難致福故堯舜之務唯在脩巳以安百姓管仲云義於人者和於神蓋以人爲神主故但務安人而巳虢公求神以致危亡王莽妄祈以速漢兵古今明誡書傳所紀望陛下毎以漢文孔子之意爲凖則百福具臻矣上深嘉美之又曰文宗開成中以乆旱分命郡官偏祠祈禱於紫宸殿對宰臣憂形於色宰臣以星官所奏天時當爾乞不過勞聖慮上懔然改容曰朕爲天下主無徳及人致此災旱今又謫見于上􅀂三日不雨當退歸南}
  - {type: page-break, offset: 2889, content: '', id: KR3k0012_SBCK_529-7a}
