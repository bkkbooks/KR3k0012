  - {type: variant, offset: 2999, length: 0, content: '', SBCK: 身禱於桑林之下聖人之憂民如此其明也太平御覽卷第五百二}
  - {type: variant, offset: 2999, length: 4, content: 十一家凡, WYG: 河不在楚非所獲罪孔子以為知天道仲尼疾病門人子路請禱仲尼以神道助順繫於所行已既全徳無愧屋漏故荅子路云丘之禱久矣書云恵廸吉從逆凶言順道則吉從逆則凶詩云自求多福則禍福之来感應行事若苟為非道則何福可求是以漢文帝毎}
  - {type: variant, offset: 2999, length: 0, content: '', krp: 身禱於桑林之下聖人之憂民如此其明也太平御覽卷第五百二}
  - {type: variant, offset: 3000, length: 78, content: 一家凡有六統而所據各異考之經禮大義不通臣謂禋于六宗祀祖考所尊者六宗則三昭三穆也魏書曰明帝問王肅六宗竟幾對曰坎為水離為火震為雷巽為風艮為山兌為澤此乾坤六甲子也, SBCK: 九}
  - {type: variant, offset: 3000, length: 78, content: 一家凡有六統而所據各異考之經禮大義不通臣謂禋于六宗祀祖考所尊者六宗則三昭三穆也魏書曰明帝問王肅六宗竟幾對曰坎為水離為火震為雷巽為風艮為山兌為澤此乾坤六甲子也, krp: 九}
