  - {type: variant, offset: 78, length: 690, content: 於四郊以蒼珪禮東方以赤璋禮南方以白琥禮西方以玄璜禮北方皆有牲幣各放其方之色樂奏太蔟歌青陽冕執干戚舞雲翹育命所以導牧時和也孟夏迎夏於南郊章句曰迎夏者禮炎帝祝融神也於南郊七里因火數也王用赤璋牲幣各放其色樂奏中宮歌朱明其他皆如孟春也孟秋迎秋於西郊章句曰迎秋者禮少昊蓐收之神於西郊九里因金數也玉用白琥牲幣各放其色樂奏夷則歌自藏其他如孟夏之禮孟冬迎冬於北郊章句曰迎冬者禮顓頊玄冥之神也於北郊六里水數玉用玄牲幣各放其色樂奏應鍾歌玄英其祀皆孟秋之禮續漢書禮儀志曰立春之日百官皆衣青迎氣青郊郡縣皆青服幘立青幡施土牛耕人於門外以示兆民立夏之日百官皆衣赤迎氣赤郊立秋之日百官皆衣白迎氣曰郊立冬之日百官皆衣皂迎氣黑郊又祭祀志曰縣邑常以立春之日皆青幡青幘迎春於郭外令一童男帽青巾衣先在郭外迎春者至目野中出迎者拜之而還皇覽禮天子迎四節日天子迎春夏秋冬之樂又順天道是故距冬至日四十六日則天子迎春於東堂距邦八里堂高八尺堂階八等青稅八乘旂旐尚青田車載矛號曰助天生倡之以角舞之以羽此迎春之樂也自春分數四十六日則天子迎夏於南堂距邦七里堂高七尺堂階七等赤稅七乘旂旐尚赤田車載弓號曰助天養倡之以徵舞之鼓鞉此迎夏之樂也自夏至數四十六日則天子迎秋於西堂距邦九里堂高九尺堂階九等白稅九乘旂旐尚白田車載戟號曰助天收倡之以商舞之以干於戚此迎秋之樂也自秋分數四十六日則天子迎冬於北堂距邦六里堂高六尺堂階六等黑稅六乘旂旐尚黑田車載甲號曰助天誅倡之以羽舞之以籥此迎冬之樂也所以迎四時樂養九志於西堂冬養九勝於北堂養後三月而止天子行殺必順天道宋書禮志曰漢明帝據月令有五郊迎氣服色之禮因採元始中故事兆五郊於洛陽祭其帝與神車服各順方色魏晉依之江, SBCK: ''}
