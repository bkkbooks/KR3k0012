  - {type: variant, offset: 2717, length: 163, content: 神助陰陽變化有益於人郊天井祭之又曰古尚書說六宗者天地屬神之尊者謂天宗三地宗三天宗日月北辰也地宗岱山河海也日月為陰陽宗北辰為星宗岱為山宗河為水宗海為澤宗也祀天則天文從祀地則地理從也續漢書祭祀志曰安帝以尚書歐陽家說云六宗者在天地四方之中為上下四方之宗以元始故書謂六宗亦六子之氣日月雷風山澤者為非三月更立六宗祠於洛陽城西北地禮比太社, SBCK: 所祈}
