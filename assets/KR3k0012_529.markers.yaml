  - {type: variant, offset: 4, length: 1, content: 迎, krp: 祀曰司命曰中霤曰國門曰國行曰太厲曰戸曰竈諸侯爲國立五祀曰司命曰中霤曰國門曰國行曰公厲大夫立三祀曰族厲曰門曰行適士立二祀曰門曰行庶人立一祀或立戸或立竈鄭玄注曰五祀門户中霤也此皆小神居人之間司察小神也又月令曰孟春其祀戸孟夏其祀竈季夏其祀中霤孟秋其祀門孟冬其祀行餘吉吉禮門白虎通曰何謂五祀者門户竈井中霤也又曰曲禮下記云天子祭天地四方山川五祀歳遍諸侯方伯祀山川祭五祀歳遍士祭其先凡祀有廢之莫敢舉也有舉之莫敢廢也非所當祭而祭之名爲淫祀無福祭五祀所以歳遍何愼五行也五經異義曰大戴說禮器云竈者老婦之祭許君按月令孟夏之月其祀竈五祀之神王者所祭非老婦也鄭玄曰竈神祝融是老婦又曰王爲羣姓立七祀一曰司命主督察人命也二曰中霤王宫室居處也三曰門四曰戸主岀入五曰國行主道路也六曰大厲主殺也七曰竈主飲食也漢書議曰祠五祀謂五行金木水火土也木正曰勾芒火正曰祝融金正曰蓐收水正曰玄冥土正曰后土皆古賢能治成五行有功者也主其神祀之魏名臣奏曰秦静議云祭法七祀有國行今月令謂行爲井是以俗廢行而祀井武帝始定天下興復舊祀造祭祀門戸井竈中霤文帝稱詔靜按凡諸祠祀所以尊敬神靈不冝稱詔髙堂隆議曰國中霤門井竈多不遍唯祀在者故曰祭五祀在於廟今毎門户輒祭之自漢以來非舊典也祭井自漢從水類不列五祀冝除井祀行世夲曰徴作禓五祀徴者殷王八世孫也禓者強死男也謂時難索宣駈疫逐強死鬼也五者謂門户及井竈中霤也傳玄五祀議曰禮大記云室中央中霤謂四霤之中也祭於漏井盖失之矣七祀之文皆云祀行而無井祭竈而不祭井於事則闕夫設祀者非唯報功而巳亦神道設教使民慎之幽冥也臣以爲帝之都城冝祭一門正宫一門正室一户井竈中霤亦各擇其一正者祭之四望尚書舜典曰正月上日受終于文祖在璿璣玉衡以齊七政肆類于上帝禋于六宗望於山川遍于群神歳二月東廵狩至于岱宗柴望秩于山川肆覲東后孔安國曰望秩于山川者以尊卑祭之也五岳視三公四瀆視諸侯其餘小者或卿大夫伯子男周禮春官上曰大宗伯之職國有大故則旅上帝及四望四望五嶽四鎮四瀆也又春官曰小宗伯之職掌兆五帝於四郊四望四類亦如之兆爲壇之營城又春官上典瑞曰掌玉瑞玉器之藏四珪有邸以祀天旅上帝兩珪有邸以祀地旅四望又春官下大司樂曰春奏姑洗歌南吕舞大韶以禮四望公羊傳僖下曰夏四月卜郊不從乃免牲猶三望三望者何望祭也則曷爲祭祭㤗山河海山川有能潤于百里者天子秩而祭之比皆助天}
