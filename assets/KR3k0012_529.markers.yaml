  - {type: variant, offset: 1740, length: 975, content: 時享歲貢終王祖禰則日祭曾高則月祀二祧則時享壇墠則歲貢張晏曰去祧為壇掃地祭之也大禘則終王服虔曰夷蠻經王乃入助祭各以珍貢以助大祫之祭也彌遠彌尊故禘為重矣續漢書祭祀志曰建武二十六年詔問張純禘祫之禮奏三年一祫五年一禘禘之言諦諦昭穆尊卑之義以夏四月陽氣在上陰氣在下故正尊卑之義祫以冬十月五穀成熟故骨肉合聚飲食漢雜事曰元帝時匡衡貢禹以經義毀先帝親盡之廟高帝為太祖孝文為太宗孝武為世宗孝宣為中宗祖宗廟皆世世奉祀其餘惠景以下皆毀五年而再殷祭猶古之禘祫王隱晉書曰太康中太廟成遷神主於新廟上帥百官奉迎於道左遂親禘祫後魏書曰世宗景明二年夏六月祕書丞孫思蔚上言古之祭法時祫並行天子先祫後時諸侯先時後祫此施當世在今則煩且禮有升降事有節文適時之制聖人弗違當祫之月減時祭以從要省制可十一月壬寅改築圓丘於伊水之陽乙卯仍有事焉宋書禮志曰凡禘祫大祭則神主悉出廟堂為昭穆以安坐不復停室也又志曰博士徐道娛上議曰太廟烝嘗儀注皇帝行事畢出便坐三公已上獻太祝送神于門然後至尊還拜百官贊拜乃退謹尋清廟之道所以肅安神也禮曰廟者貌也神靈所憑依也事亡如存若恒在也既不應有送神之文自陳豆薦俎車駕至止並弗奉迎夫不迎而送送而後辭闇矩之情實用未達博士江邃議在始不迎明在廟也卒事而送節孝思也若不送而辭是舍親也辭而後送是違神也故孝子不忍違其親又不忍違神是以祝史送神以成烝嘗之義又禮志曰禘祫之禮三年一五年再公羊所謂五年再殷祭也在四時之間周禮所謂凡四時之間禮也蓋歷歲節月無定天子諸侯先後弗同禮天子祫嘗諸侯蒸祫有田則祭無田則薦鄭注天子先祫後祭諸侯先時祭然後祫有田者既祭又薦新祭以首時薦以仲月然則大祭四祀其月各異天子以孟月殷仲月蒸諸侯孟月嘗仲月祫也齊書禮志曰右僕射王儉議按禮記王制天子先祫後時祭諸侯先時祭後祫春秋魯僖二年祫明年春禘自此以後五年再殷禮緯稽命征曰三年一祫五年一禘經記所論禘祫與時祭其言詳矣唐書曰元和中太常上言按禮祭不欲數太廟禘祫祭禮重於時饗時饗與禘祫同月即其月但行禘祫祭不行時饗蓋不欲煩是禮先重者今時饗重於朔望薦食稽求禮情參酌輕重請每至時及臘但行饗禮其月朔望薦食請停如告廟曰與朔望薦食日同請先行告禮然後薦食六宗尚書舜典曰禋于六宗鄭注曰六宗謂星辰司中司命風雨師也尚書大傳曰萬物非天不生非地不載非春不動非夏不長非秋不收非冬不藏故書曰禋于六宗此之謂也五經異義曰今尚書歐陽夏侯說六宗者上不及天下不及地旁不及四方居中央恍忽, SBCK: ''}
