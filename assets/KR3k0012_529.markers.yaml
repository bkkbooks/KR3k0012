  - {type: variant, offset: 1402, length: 273, content: 於壇禘及郊宗石室五經通義曰王者諸侯所以三年一祫五年一禘何三年一閏天道小備故三年一祫祫者皆取未遷廟主合食太祖廟中五歲再閏天道大備故五歲一禘禘者諦也取己遷廟主合食太祖廟中禮記外傳曰禘祫謂之殷祭殷多盛也祫大而禘小祫合也合毀廟之主出而陳列之親廟之主升入大廟功臣又得配享其禮大也禘則各於宮神主不出廟也祭大何以名祫祭卑不敢降尊也春秋之經有禘而無祫經云大事於大廟又云有事於其廟即是禘也此是國之大事時云有事毀廟無時祭時祭月祭皆近廟耳玄孫之子於高祖親盡也但五年有二殷祭耳祭及遠祖象年再閏也神主入廟先為一禘為將遷徧告之也明年春禘而又祫祫後二年一禘禘後三年一祫自此為常, SBCK: ''}
