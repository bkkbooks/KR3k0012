  - {type: variant, offset: 137, length: 0, content: '', WYG: 荒年以菱為蔬范汪祠祭曰孟冬之祭菱芡楚辭曰制芰荷以為衣兮集芙蓉以為裳左思蜀都賦曰其沃瀛則有緑菱紅蓮潘岳西征賦曰鳬躍鴻漸唼喋菱芡郭璞江賦曰忽忘夕以宵歸詠採菱以叩舷曹植九愁曰採菱華而結辭孫楚論屈建文曰加籩之品菱芰存焉楚多陂塘菱芰所生父自嗜之而抑按宰祝既毁就養無}
