  - {type: variant, offset: 120, length: 2, content: 珊瑚, SBCK: 芋塊大者如車轂實隨華每華一闔各有六子先後相次子不俱生花不俱落此蕉有三種一種子大栂指長而銳有似羊角名羊角蕉味㝡甘好一種子大如雞􅆑有似牛乳味微減羊角蕉一種大如耦子長六七寸形正方少甘味㝡弱}
  - {type: variant, offset: 120, length: 2, content: 珊瑚, krp: 芋塊大者如車轂實隨華每華一闔各有六子先後相次子不俱生花不俱落此蕉有三種一種子大栂指長而銳有似羊角名羊角蕉味㝡甘好一種子大如雞卵有似牛乳味微減羊角蕉一種大如耦子長六七寸形正方少甘味㝡弱}
