  - {type: variant, offset: 1677, length: 223, content: 休聘雲南會川都督劉寬使使致甘蔗蔗節希似竹許消去後亦有甜味神異經曰南方荒內𤮽蔗林其高百丈圍三丈促節多汁甜如蜜𤮽音干蔗音柘異物志曰甘蔗遠近皆有交阯所產特醇好本末無薄厚其味甘圍數寸長丈餘頗似竹斷而食之既甘生取汁為飴餳益珍煎而暴之凝如冰甄異傳曰隆安中吳縣張牧字君林忽有鬼來無他須臾唯欲噉甘蔗自稱高褐主人因呼阿褐牧母見之是小女面青黑色通身青衣魏文帝典論曰嘗與平虜將軍劉勳奮威鄧展等共飲宿聞展有手臂曉三兵余與論劍酒酣耳熱方食干蔗便以為杖下殿數交三中其臂袁子正, SBCK: ''}
