  - {type: 'tls:seg', offset: 130, content: '', id: KR3k0012_CHANT_975-2a.14}
  - {type: variant, offset: 130, length: 3, content: 樹乾者, SBCK: 有九靣芋大不羙有􅂪控芋有青芋有曹芋子皆不可食莖可爲􅉁又有百子芋出葉榆縣有魁芋無旁子生永昌本草經曰芋土芝八月採左思蜀都賦曰􅀲疇芋區菱爾雅曰菱厥郭璞注曰今水中芰也尚書大傳曰鉅野夌鉅野大野也魯藪今蜀山陽也周書曰冬食菱藕周禮天官下籩人職曰加籩之實菱國語曰屈到嗜芰有疾召其宗老而屬之屈到楚卿宗老家臣曰􅀕我必以芰及祥宗老將薦芰屈建命去之建屈到之子子木曰夫子不以私欲干國之典也漢書循吏傳曰龔遂爲渤海太守勸民秋冬}
  - {type: page-break, offset: 130, content: '', id: KR3k0012_SBCK_975-4a}
  - {type: variant, offset: 130, length: 3, content: 樹乾者, WYG: 有九面芋大不美有蒙控芋有青芋有曹芋子皆不可食莖可為葅又有百子芋出葉榆縣有魁芋無旁子生永昌本草經曰芋土芝八月採左思蜀都賦曰瓜疇芋區菱爾雅曰菱蕨􅀈今水中芰也尚書大傳曰鉅野菱鉅野大野也周書曰冬食菱藕周禮天官下籩人職曰加籩之實菱國語曰屈到嗜芰有疾召其宗老而屬之屈到楚卿宗老家臣曰祭我必以芰及祥宗老将薦芰屈建命去之建到之子子木曰夫子不以私欲干國之典也漢書循吏傳曰龔遂為渤海太守勸民秋冬}
