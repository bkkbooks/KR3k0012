  - {type: 'tls:seg', offset: 122, content: '', id: KR3k0012_CHANT_975-2a.12}
  - {type: variant, offset: 123, length: 0, content: '', SBCK: 莖如芋取以􅁅練之可以紡績異物志曰芭蕉葉大如筵席其莖如芋取鑊煑之爲絲可紡續女工以爲絺綌今交阯􅁑也其内心如䔉鵠頭生大如合柈因爲實房一房有數十枚其實皮赤如火剖之中黒剥其皮食其肉如􅁡甚羙食之四五枚可飽而餘滋}
  - {type: variant, offset: 123, length: 0, content: '', WYG: 言梁民不死風土記曰博土芋蔓生根如鷄鴨卵華陽國志曰何隨字季業蜀郡郫人除安漢令蜀亡去官送吏行乏輒取道側民芋隨以綿繫其處使足所取直民相語曰聞何安漢清廉持綿追還之終不受因為語曰安漢令取糧為之償廣志曰凡十四芋有君子芋大如魁有車轂芋有旁巨芋有邊芋此四芋魁大如缾少子葉如繖葢緗色紫莖長丈餘易熟長}
  - {type: page-break, offset: 123, content: '', id: KR3k0012_WYG_975-5b, image: WYG0901/WYG0901-0569d.png}
  - {type: variant, offset: 123, length: 1, content: 味, krp: 莖如芋取以灰練之可以紡績異物志曰芭蕉葉大如筵席其莖如芋取鑊煑之爲絲可紡續女工以爲絺綌今交阯葛也其内心如䔉鵠頭生大如合柈因爲實房一房有數十枚其實皮赤如火剖之中黒剥其皮食其肉}
  - {type: variant, offset: 124, length: 0, content: '', SBCK: 猶在齒牙間一名甘蕉顧徽廣州記曰甘蕉與吴花實根葉不異真是南土暖不經霜凍四時花葉展其熟其未熟時亦苦澁也南方草物狀曰蕉樹子房相連累甜羙亦可􅁡藏遊名山志曰赤巖山水石之間唯有甘蕉林髙者十丈卞敬宗甘蕉讃曰扶踈似樹質則非木扶留吴録地理志曰始興有扶留藤縁木而生味辛可以食㯽榔蜀記曰扶留木根大}
  - {type: page-break, offset: 124, content: '', id: KR3k0012_SBCK_975-2a}
  - {type: variant, offset: 124, length: 4, content: 如蜜十一, WYG: 芋之最善者也莖可作羮臛有蔓芋縁枝生大者二三升有雞子芋色黄有百果芋畝收百斛有卑芋七}
  - {type: variant, offset: 125, length: 1, content: 蜜, SBCK: 箸視之似栁根又有蛤名古賁生水中取燒爲􅁅曰牡厲粉先以㯽榔着口中又扶留長寸古賁􅁅少許同嚼之除􅅐中惡氣異物志曰古賁􅁅壯厲􅁅也與扶留㯽榔三物合食而後善也扶留藤似木防巳扶留㯽榔所生相去逺爲物甚異而相成俗曰㯽榔扶留可以忘憂交州記曰扶留有三種一名扶留其根香羙一名南扶留葉青味辛一名扶留藤味亦辛廣志曰扶留藤縁樹生其花實即蒟也可爲醬左思吴都賦曰石忛水松東風扶留芋􅀃文曰齊人謂芋爲莒孝經援神記曰仲冬􅄧星中収莒芋宋均曰莒亦芋廣雅曰藉如水芋也亦曰烏芋漢書曰汝南郡有鴻隟大陂翟方進爲丞相奏破之郡中追怨童謡曰壞陂誰翟子威飯我豆食羹芋魁漢書曰􅁗破趙遷卓氏曰吾聞岷山之沃野下有蹲鴟注曰蹲鴟芋也至死不飢乃求逺遷致之臨卭至僮百人崔鴻}
  - {type: page-break, offset: 125, content: '', id: KR3k0012_SBCK_975-2b}
  - {type: punctuation, offset: 126, content: 。, id: KR3k0012_CHANT_975-bkkpn53}
  - {type: 'tls:seg', offset: 126, content: '', id: KR3k0012_CHANT_975-2a.13}
  - {type: variant, offset: 126, length: 0, content: '', krp: 甚羙食之四五枚可飽而餘滋味猶在齒牙間一名甘蕉顧徽廣州記曰甘蕉與吴花實根葉不異真是南土暖不經霜凍四時花葉展其熟其未熟時亦苦澁也南方草物狀曰蕉樹子房相連累甜羙亦可蜜藏遊名山志曰赤巖山水石之間唯有甘蕉林髙者}
  - {type: variant, offset: 127, length: 1, content: 一, SBCK: 六國春秋蜀録曰李雄剋成都衆甚飢餒乃將民就榖於郪掘野芋而食之南史孝義傳曰鮮于文宗漁陽人年七歳䘮父父以種芋時亡至明年芋時對芋嗚咽如此終身汜勝之書曰區種芋法區収三石汝南先賢傳曰􅀽安字召公除隂平長時年飢荒民皆菜食租入不畢安聽使輸芋曰百姓飢困長何得食榖先自引芋吏皆從之汝南先賢傳曰薜苞歸先人􅃁側種稻芋以􅀕祀芋以充飢耽道􅀃禮玄虚無爲列仙傳曰酒客爲梁承使民益種芋三年當大餓卒如其言梁民不死風土記曰􅀶士芋蔓生根如鵞鴨􅆑華陽國志曰何隨字季業蜀郫人母亡歸送吏飢輙取道側民芋隨以帛繫其處使足所取直民相語曰聞何安漢清民取糧令爲之償愽物志曰野芋食之煞人家芋種之三年不収後旅生亦不可食廣志曰凡十四芋有君芋大如魁有車轂芋有旁巨芋有青邊芋此四芋魁大如鉼少子葉如繖蓋緗色紫莖長丈餘易熟長味芋之最善者也莖可作羮臛有蔓芋緑支生大者二三升有雞子芋色黃有百果芋􅅿収百斛有卑芋七}
  - {type: page-break, offset: 127, content: '', id: KR3k0012_SBCK_975-3a}
  - {type: page-break, offset: 127, content: '', id: KR3k0012_SBCK_975-3b}
  - {type: variant, offset: 127, length: 0, content: '', krp: 丈卞敬宗甘蕉讃曰扶踈似樹質則非木扶留吴録地理志曰始興有扶留藤縁木而生味辛可以食㯽榔蜀記曰扶留木根大如箸視之似栁根又有蛤名古賁生水中取燒爲灰曰牡厲粉先以㯽榔着口中又扶留長寸古賁灰少許同嚼之除胸中惡氣異物志曰古賁灰壯厲灰也與扶留㯽榔三物合食而後善也扶留藤似木防巳扶留㯽榔所生相去逺爲物甚異而相成俗曰㯽榔扶留可以忘憂交州記曰扶留有三種}
  - {type: variant, offset: 128, length: 0, content: '', krp: 名扶留其根香羙一名南扶留葉青味辛一名扶留藤味亦辛廣志曰扶留藤縁樹生其花實即蒟也可爲醬左思吴都賦曰石忛水松東風扶留芋說文曰齊人謂芋爲莒孝經援神記曰仲冬昴星中収莒芋宋均曰莒亦芋廣雅曰藉如水芋也亦曰烏芋漢書曰汝南郡有鴻隟大陂翟方進爲丞相奏破之郡中追怨童謡曰壞陂誰翟子威飯我豆食羹芋魁漢書曰秦破趙遷卓氏曰吾聞岷山之沃野下有蹲鴟注曰蹲鴟芋也至死不飢乃求逺遷致之臨卭至僮百人崔鴻十六國春秋蜀録曰李雄剋成都衆甚飢餒乃將民就榖於郪掘野芋而食之南史孝義傳曰鮮于文宗漁陽人年七歳䘮父父以種芋時亡至明年芋時對芋嗚咽如此終身汜勝之書曰區種芋法區収三石汝南先賢傳曰袁安字召公除隂平長時年飢荒民皆菜食租入不畢安聽使輸芋曰百姓飢困長何得食榖先自引芋吏皆從之汝南先賢傳曰薜苞歸先人冡側種稻芋以祭祀芋以充飢耽道說禮玄虚無爲列仙傳曰酒客爲梁承使民益種芋三年當大餓卒如其言梁民不死風土記曰博士芋蔓生根如鵞鴨卵華陽國志曰何隨字季業蜀郫人母亡歸送吏飢輙取道側民芋隨以帛繫其處使足所取直民相語曰聞何安漢清民取糧令爲之償愽物志曰野芋食之煞人家芋種之三年不収後旅生亦不可食廣志曰凡十四芋有君芋大如魁有車轂芋有旁巨芋有青邊芋此四芋魁大如鉼少子葉如繖蓋緗色紫莖長丈餘易熟長味芋之最善者也莖可作羮臛有蔓芋緑支生大者二三升有雞子芋色黃有百果芋畝収百斛有卑芋七}
