  - {type: variant, offset: 767, length: 544, content: 無知其名因見生處遂名王壇其形小於龍眼有似木瓜七月熟甘美也王彪之閩中賦曰王壇侯栗楊都賦曰草則龍目荔支王壇丹橘三廉陳祈暢異物志曰三廉大實實不但三雖名三廉或有四五六枝食之多汁味酸且甘藏之尤好與眾果相參鬼目爾雅曰符鬼目郭景純曰今江東有鬼目草莖似葛葉圓而毛子如耳璫赤色叢生廣志曰鬼目似梅南人以飲酒南方草木狀曰鬼目樹大者如木子小者如鴨子二月花色仍連著實七月八月熟其色黃其味酸以蜜煮之滋味柔嘉交阯武平興古九真有之裴淵廣州記曰鬼目益智直爾不敢噉可為漿也交州記曰鬼目樹似棠梨葉似楮皮白樹高大如木瓜而小邪傾不周正味酢九月熟又有草眯子亦如之亦可為糝周其草似鬼目甘蔗說文曰藷蔗也漢書禮樂志郊祀歌曰百味旨酒布蘭生泰尊柘漿析朝酲應劭曰柘漿取柘汁以為飲也吳錄地理志曰交阯句屚音漏縣干蔗大數寸其味醇美異於他處笮以為餳曝之凝如冰破如博碁入口消釋江表傳曰孫亮使黃門以銀盌并蓋就中藏吏取交州所獻甘蔗餳黃門先恨藏吏以鼠矢投餳中啟言吏不謹亮呼吏持餳器入門曰此器既蓋之且有油覆無緣有此也黃門將有恨汝耶叩頭曰常從臣求官莞蓆有數不敢與亮曰必是此也問具服即於前加髡鞭斥外付晉書曰顧愷之每食蔗自尾至本人或問之曰漸入佳境宋書曰庾仲文好貨劉雍自謂得其助力事之如父夏中送甘蔗又曰元嘉末魏太武征彭城遣使至小市門致意求甘蔗及酒孝武遣人送酒二器甘蔗百挺, WYG: ''}
