  - {type: variant, offset: 366, length: 2, content: 郭璞, WYG: 其中的蓮房中子也的中薏子中心苦者也毛詩陳宛丘澤陂曰彼澤之陂有蒲與荷有美一人傷如之何史記曰龜千嵗遊於蓮葉之上焉吳時外國志曰大秦國有蓮藕雜果宋起居}
