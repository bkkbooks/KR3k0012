  - {type: variant, offset: 375, length: 3, content: 如指頭, WYG: 隨他去調甚悲苦至是應焉又曰髙緯所幸馮淑妃名小蓮也後唐書曰監軍張承業本朝舊人權貴任事人士脅肩低首候之唯馬郁以猾稽侮狎毎賔僚宴集承業出異方珍果陳列于前客無敢先甞者當郁前者食必盡承業私戒主膳者曰他日馬監至惟以乾蓮于置前而已郁至窺之知其不}
