  - {type: variant, offset: 1369, length: 337, content: 見稱美彪為設甘蔗黃粽隨盡復益彪笑謂曰范散騎小驗之一盡不能復得梁書曰庾沙彌性至孝母劉亡好噉甘蔗沙彌遂不食焉三國典略曰陸納反湘州分其眾二千人夜襲巴陵晨至城下宜豊侯脩出壘門座胡床以望之納眾乘水來攻矢下如雨脩方食甘蔗曾無懼色部分軍旅鼓而進之遂獲其一艦生擒六千人納遂歸保長沙又曰侯景至朱雀街南建康令庾信守朱雀門俄而景至信眾撤桁始除一舶見景軍皆著鐵面退隱于門自言口糝屢求甘蔗俄而飛箭中其門柱信手中甘蔗應弦而落隋書曰赤土國物產多同於交阯以甘蔗作酒雜以紫瓜根酒色黃赤味亦香美永嘉郡記曰樂城縣三州府江有三洲因以為名對岸有浦名為菰子出好甘蔗盧諶祭法曰冬祀用甘蔗范汪祠制曰孟春祠用甘蔗扶南傳曰安息國出甘蔗廣志曰甘蔗其餳為石密雲南記曰唐韋齊休聘雲南會川都督劉寬使使致甘蔗蔗節希似竹許消去後亦有甜味神, WYG: ''}
