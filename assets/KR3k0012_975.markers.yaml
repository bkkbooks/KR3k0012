  - {type: variant, offset: 130, length: 3, content: 樹乾者, krp: 有九靣芋大不羙有蒙控芋有青芋有曹芋子皆不可食莖可爲𦵔又有百子芋出葉榆縣有魁芋無旁子生永昌本草經曰芋土芝八月採左思蜀都賦曰瓜疇芋區菱爾雅曰菱厥郭璞注曰今水中芰也尚書大傳曰鉅野夌鉅野大野也魯藪今蜀山陽也周書曰冬食菱藕周禮天官下籩人職曰加籩之實菱國語曰屈到嗜芰有疾召其宗老而屬之屈到楚卿宗老家臣曰祭我必以芰及祥宗老將薦芰屈建命去之建屈到之子子木曰夫子不以私欲干國之典也漢書循吏傳曰龔遂爲渤海太守勸民秋冬}
  - {type: variant, offset: 134, length: 2, content: 美出, SBCK: 蓄菓實菱芡謝承後漢書曰􅀽閎父賀爲彭城相亡閎到郡迎䘮飢食菱芡渴飲行潦梁書曰魚弘爲湘東王鎮西司馬􅄒職西上道中乏食縁路採菱作菱飯給所部弘度之所後人覔一菱不得又於窮洲之上捕得獼猴數百爲脯以供酒食淮}
  - {type: page-break, offset: 134, content: '', id: KR3k0012_SBCK_975-4b}
  - {type: variant, offset: 134, length: 1, content: 美, WYG: 畜果實菱芡謝承後漢書曰袁閎父賀為彭城相亡閎到郡迎䘮飢食菱芡渇飲行潦梁書曰魚𢎞為湘東王鎮西司馬述職西上道中乏食縁路採菱作飯給所部𢎞度所後人覔一菱不得又於窮洲之上捕得獼猴數百為脯以供酒食淮南子曰楚靈王作章華之臺棄疾承民之怨而立公子比百姓避而去之乃食菱飲水枕塊而死呂氏春秋曰厲叔事莒陽公自以為不知而去居于海上夏日則食菱芡冬日則餐橡栗杜恕篤論曰夫萍之浮與菱之浮相似也菱植根萍隨波是以堯舜歎巧言之亂德仲尼惡紫之奪朱風俗通曰殿堂象東井形刻荷菱水物所以厭火也羅浮山記曰綏寜縣元龜淵中}
