  - {type: variant, offset: 2225, length: 316, content: 月乃成卵大者如鵝小者如鴨掘食其味甜經久得風乃淡泊耳出交阯武平九真興古陳祈暢異物志曰甘藷似芋亦有臣魁剝去皮肌肉正白如昉南方人專食之以當米穀蒸炙皆香美賓客酒食亦施設有如果實也燕薁毛詩豳七月曰六月食鬱及薁薁蘡薁也毛詩題綱曰葛藟一名燕薁藤好生河滸邊得水潤而長喻王九族蒙王恩惠以育子孫今王無澤於族人不如葛藟生河滸邊也廣雅曰燕薁嬰舌也廣志曰燕薁似梨早熟魏王花木志曰燕薁實大如龍眼黑色說文謂之嬰薁詩義䟽一名車鞅藤豳詩七月食鬱及薁此名燕薁潘岳閑居賦曰梅香薁棣之屬繁榮藻麗之節曹毗魏都賦曰英梅楊李若留郁棣郁俗謂煔郁廉薑廣雅曰蔟葰相維切廉薑也湘州記曰始安縣空龍山精了山出廉薑食經曰廉薑法蜜煮烏梅去滓以滓廉薑再三宿色黃赤如琥珀劉楨清慮賦曰仰秤木韭俯拔廉薑, SBCK: 五}
