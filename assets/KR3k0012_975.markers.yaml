  - {type: variant, offset: 136, length: 0, content: '', WYG: 菱甚為甘㫖廣志曰鉅野大菱大於常菱淮漢以}
  - {type: variant, offset: 137, length: 0, content: '', SBCK: 子曰楚靈王作章華之臺棄疾承民之怨而立公子比百姓避而去之乃食芰飲水枕塊而死吕氏春秋曰厲叔事莒閔公自以爲不知而去居於海上夏日則食菱芡冬日則飱橡栗杜恕篤論曰夫蓱之浮與菱之浮相似也菱植根萍隨波是以堯舜歎巧言之亂徳仲尼惡紫之奪朱風俗通曰殿堂象東井形刻作荷菱水物所以厭火也羅浮山記曰綏寜縣元􅀛淵中岀菱甚爲甘旨廣志曰鉅野大菱大於常菱淮漢以南凶年以芰爲􅂼范汪祠制曰孟秋之􅀕菱芡楚辭曰制芰荷以爲衣兮集芙蓉以爲裳左思蜀都賦曰其沃嬴則有緑菱紅蓮潘岳西征賦曰鳬躍漸唼喋菱芡郭璞江賦曰忽忘夕而宵歸詠採菱以叩舷曹植九愁曰採菱華而結辭孫楚論屈建文曰加籩之品菱芰存焉楚多陂塘菱所生父自嗜之而抑按宰祝旣毀就養無}
