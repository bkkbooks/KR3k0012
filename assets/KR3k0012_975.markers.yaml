  - {type: variant, offset: 2060, length: 164, content: 款曰副以甘柘豐弘誕節纖液玉津旨於飴蜜虞飜與弟書曰有數頭男皆如奴僕伯安雖癡諸兒不及觀我所生有兒無子伯安三男阿思似父思其兩弟有似人也去日南遠恐如甘蔗近抄即薄應璩與尚書諸郎書曰檀氏園葵菜繁茂諸蔗瓜芋亦離尚萌未知三生復何種植馮衍杖銘曰杖必取材不必用味相必取賢不必所愛都蔗雖甘猶不可杖佞人悅己亦不可相甘藷南方草物狀曰甘藷民家常以二月種之至, SBCK: ''}
