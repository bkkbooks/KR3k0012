  - {type: variant, offset: 370, length: 1, content: 朹, WYG: 元嘉十八年有司奏揚州刺史王濬解稱州治後池有兩蓮駢生雙房分體又十六年華林有雙蓮同幹秀出華池又曰太始二年八月嘉蓮雙葩並實合跗同莖生豫州鱧湖又六年雙蓮一蔕生東宮𤣥浦池三國典畧曰齊王還鄴髙麗新羅并遣使朝貢先是徐州蓮二莖兩蔕古云異木連枝遠人入欵斯其應也北齊書曰後主武平中特進侍中崔季舒宅中池内蓮莖皆作胡人面仍着鮮卑㡌俄而季舒見殺三國典畧曰周平齊齊㓜主胡太后等並歸於長安初武成殂後有謡云千錢置果園中有芙蓉}
  - {type: page-break, offset: 370, content: '', id: KR3k0012_WYG_975-10a, image: WYG0901/WYG0901-0572a.png}
