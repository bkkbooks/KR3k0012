  - {type: variant, offset: 113, length: 2, content: 枳椇, SBCK: 芭蕉􅉁或曰甘蕉莖如荷芋重皮相裏大如盂升}
  - {type: variant, offset: 113, length: 2, content: 枳椇, WYG: 芭蕉一曰芭苴或曰甘蕉莖如荷盂重皮相裹大如盂斗}
  - {type: variant, offset: 113, length: 2, content: 枳椇, krp: 芭蕉𦵔或曰甘蕉莖如荷芋重皮相裏大如盂升}
