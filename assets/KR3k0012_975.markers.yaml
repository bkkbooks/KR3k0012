  - {type: variant, offset: 117, length: 1, content: 柳, SBCK: 蒲萄甜而飽人其根大如芋魁大一石青色其莖解散如絲織以爲􅁑謂之蕉􅁑雖脆而好色黄白不如􅁑色岀交阯建安南州異物志曰甘蕉草􅀋望之如樹株大者一圍餘葉長一丈或七八尺廣尺餘二尺許花大如酒杯形色如芙蓉著莖末百餘}
  - {type: page-break, offset: 117, content: '', id: KR3k0012_SBCK_975-1b}
  - {type: variant, offset: 117, length: 1, content: 柳, krp: 蒲萄甜而飽人其根大如芋魁大一石青色其莖解散如絲織以爲葛謂之蕉葛雖脆而好色黄白不如葛色岀交阯建安南州異物志曰甘蕉草類望之如樹株大者一圍餘葉長一丈或七八尺廣尺餘二尺許花大如酒杯形色如芙蓉著莖末百餘}
