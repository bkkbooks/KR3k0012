  - {type: variant, offset: 379, length: 8, content: 食赤色似小㮏也棪, WYG: 啖異日鞾中置鐡鎚出以擊之承業大笑曰為公易饌勿敗予案夏侯湛芙蓉賦曰緑房翠蔕紫餙紅敷黄螺圓出垂甤散鬚纓以金牙㸃以素珠孫楚蓮華賦曰攢聚星列纎離相扶㣲若𤣥黎投幽夜粲若鄧林飛鵷鶵樂府歌曰江南可採蓮蓮葉何田田藕}
