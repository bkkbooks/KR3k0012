  - {type: variant, offset: 116, length: 0, content: '', SBCK: 廣二尺長一丈子有角子長六七寸或三四寸生爲行列兩兩共對若相抱形剥其上皮色黄白味}
  - {type: variant, offset: 116, length: 0, content: '', WYG: 廣二尺長一丈子有角子長六七寸或三四寸生為行列兩兩共對若相抱形剥其上皮色黄白味似葡萄甜而脆亦飽人其根大如芋魁而石青色其莖解散如絲織以為葛謂之蕉葛雖脆而好色黄白不如葛色出交阯建安南州異物志曰甘蕉草類望之如樹株大者一圍餘葉長一丈或七八尺廣尺餘二尺許花大如酒杯形色如芙蓉著莖末百餘子大名為房根似芋塊大者如車轂實隨華毎華一闔各有六子先後相次子不俱生花不俱落此葉有三種一種子大如梅長而鋭有似羊角名羊角蕉味最甘好一種子大如雞卵有似牛乳味㣲减羊角蕉一種大如藕子長六七寸形正方少甘味最下取其葉以灰練之績以為絲異物志曰芭蕉葉大如筵席其莖如芋取鑊煑之為絲可紡績女功以為絺綌今交阯葛也其内心如蒜鵠頭生大如合蚌因為實房一房有數十枚其實皮赤如火剖之中黑剥其皮食其肉如蜜甚美食之四五枚可飽而餘滋味猶在齒牙一名甘蕉顧徽廣州記曰甘蕉與蕉花實根葉不異眞是南土暖不經霜凍四時花葉展其熟耳其未熟亦苦澁也南方草物狀曰蕉樹子房相連累甜美亦可蜜藏遊名山志曰赤巖山水石之間有甘蕉林髙者十丈卞敬宗甘蕉讚曰扶疎似樹質則非木扶留吳録地理志曰始興有扶留藤縁木而生味辛可以食㯽榔蜀記曰扶留木根大如斗視之}
