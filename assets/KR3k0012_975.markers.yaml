  - {type: 'tls:seg', offset: 118, content: '', id: KR3k0012_CHANT_975-2a.11}
  - {type: variant, offset: 118, length: 0, content: '', WYG: 根又有蛤名古賁生水中取燒為灰曰牡厲粉先以㯽榔著口中又以扶留長寸古賁灰少許同嚼之除胷中惡氣異物志曰古賁灰牡厲灰也與扶留㯽榔三物合食而後善也扶留藤似木防已扶留㯽榔所生相去遠為物甚異而相成俗曰㯽榔扶留可以忘憂交州記曰扶留有三種一名檴扶留其根香美一名南扶留葉青味辛一名扶留藤味亦辛廣志曰扶留藤縁樹生其花實即蒟也可為醬左思吳都賦曰石肌氷松東風扶留芋説文曰齊人謂芋為莒孝經援神契曰仲冬昴星中收莒芋廣雅曰葄菇水芋也亦曰烏芋漢書曰汝南郡有鴻隙大陂翟方進為丞相奏破之郡中追怨童謡曰壊陂誰翟}
  - {type: page-break, offset: 118, content: '', id: KR3k0012_WYG_975-3b, image: WYG0901/WYG0901-0568d.png}
  - {type: page-break, offset: 118, content: '', id: KR3k0012_WYG_975-4a, image: WYG0901/WYG0901-0569a.png}
  - {type: variant, offset: 119, length: 0, content: '', SBCK: 大名爲房根}
  - {type: variant, offset: 119, length: 3, content: 似珊瑚, WYG: 威飯我豆食羮芋魁又曰秦破趙遷卓氏曰吾聞岷山之下沃野下有蹲鴟蹲鴟芋也至死不飢乃求遠遷致之臨卭富至童八百人崔鴻十六國春秋蜀録曰李雄克成都衆甚飢餒乃將民就穀于郪山掘野芋而食之南史孝義傳曰鮮于文宗漁陽人年七嵗䘮父父以種芋時亡至明年芋時對芋嗚咽如此終身汜勝之書曰區種芋法區收三石汝南先賢傳曰袁安字召公除隂平長時年飢荒民皆菜食租入不畢安聼使輸芋曰百姓飢困長何得食穀先自引芋吏皆從之汝南先賢傳曰薛包歸先人冡側種稻芋稻以祭祀芋以充飢耽道説禮𤣥虛無為列仙傳曰酒客為梁丞使民益種芋曰三年當大飢卒如}
