  - {type: variant, offset: 2078, length: 2, content: 汝處, WYG: 門合也吕氏春秋曰有讀史者晉史三豕涉河子夏曰非也是己亥也夫己之與三相近豕之與亥相似至晉而問之則曰晉師己亥涉河也漢書藝文志曰成帝詔光禄大夫劉向校經傳諸子詩賦步兵校尉任宏校兵書太史令尹咸校術數侍醫李柱國校方技每一書已師古曰已畢也向輒條其篇目撮其指意録奏之㑹向卒哀帝復使向子侍中奉車都尉歆卒父業歆}
