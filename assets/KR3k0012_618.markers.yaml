  - {type: variant, offset: 2270, length: 1, content: 輅, SBCK: 讎校者一人持本一人讀析􅀂怨家相對故曰讎也左傳曰晉師閏月濟于隂板杜預注云長曆推之此年無閏月疑爲門五日五字上與門合也吕氏春秋曰有讀史者晉師三家渉河子夏曰非也是已亥也夫巳之與三相近豕之與亥相似至問而問之則曰晉師巳亥渉河也漢書蓺文志曰成帝詔光禄大夫劉向言經傳諸子詩賦歩兵校尉任宏校兵書太史令尹咸校術數侍醫李柱國校方技每一書巳師古曰巳畢也向輙條其篇目撮其指意録而奏之㑹向卒哀帝復使向子奉車都尉歆卒}
  - {type: page-break, offset: 2270, content: '', id: KR3k0012_SBCK_618-3b}
