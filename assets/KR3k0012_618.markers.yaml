  - {type: variant, offset: 876, length: 297, content: 復暖者數四至朞忘食理竟不定沈約宋書曰高祖少事戎旅不經涉學及為宰相頗慕風流時或談論人皆依違不敢難也鄭解之難必切至未嘗假借要須高祖辭窮理屈然後置之高祖或時慚恧變色動容既而謂人曰我本無術學談義尤淺比時言論諸賢多見寬容唯鄭不爾獨能盡人之意甚以此感之時人謂之格佞宋書曰謝靈運辯博辭義鋒起王惠嘗與之談時然後言時荀伯子在座退而告人曰靈運固自蕭散直上王郎有如萬頃陂焉又曰謝瞻傳曰靈運好臧否人物混患之欲加裁折未有其方謂瞻曰非汝莫能乃與晦曜引微等共遊戲便使瞻與靈運共車靈運登車便商較人物瞻謂曰祕書早亡談者亦互有同異靈運默然言論自此衰止又曰張敷好讀玄言兼屬文論弱冠初父邵使與高士南陽宗少文談繫象往復數番少文欲屈握塵尾, WYG: 已勒}
