  - {type: variant, offset: 2257, length: 378, content: 勿廣也亦出著書門管輅別傳曰輅父為琅邪長輅時年十五琅邪太守單子春雅有才度聞輅一時之俊欲得相見輅父即遣輅造之大會賓客百餘人坐上有能言之士輅問子春府君多嘉客有雄貴之姿輅既年少膽志未剛若相觀懼失精神先飲三升清酒盡之然後而言子春大喜便酌三升酒獨使飲之酒盡之後問子春今欲與輅為對者府君耶四坐之士耶子春曰吾自欲與卿旗鼓相當輅言始讀詩論易學問微淺未能上引聖人之道陳周漢之事但論金木水火鬼神之情耳子春言此最難者而卿以為易耶於是唱大論之端遂造陰陽文彩汎流枝葉橫生少引聖籍多發天然子春及眾士牙相攻劫請難風起而輅人人荅對言皆有餘至日向暮酒食不行於是發聲徐州號之神童又冀州剌史裴徽召輅為文學從事相見清論終日不覺罷倦再相見轉為治中四相見轉為別駕前至十月舉為秀才物理論曰夫虛無之談無異春鼃秋蟬聒耳而已荊州先德傳曰龐士元師事司馬德操德操蠶月躬採桑後園士元往助之因與共談元善神遂移日忘飡德操, WYG: ''}
