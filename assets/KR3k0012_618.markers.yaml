  - {type: variant, offset: 2672, length: 181, content: 戶迎之因條向者勝理語弼曰此理僕以為理極可得復難不弼作難一坐便以為屈於是弼自為客主數憣皆一坐所不及也又曰衛玠字叔寶少有名理琅邪王平子高氣不群邁世獨遨每聞君之語議至乎理會之間要微之際輒絕倒於坐前後三聞為之三倒時人遂曰衛君談道平子三倒及君年長論者以為出於王武子之右世咸謂王家三子如衛家一兒玠於武昌見大將軍王敦與之談論彌日信宿敦顧謂僚屬曰昔何王吐金聲於中朝此子復玉振於江, SBCK: 其意}
