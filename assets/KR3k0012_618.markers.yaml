  - {type: variant, offset: 2075, length: 0, content: '', WYG: 至老耼之門而老耼不許也博物志曰劉徳治淮南王獄得枕中鴻寶秘書及其子向咸共竒之信黄白之術可成謂神仙之道可致卒亦無驗乃以罹罪又曰太古書今見存者有神農山海經山海經或云禹所作素問黄帝作連山歸藏夏殷之書周易曰易蔡邑云禮記月令周公所作諡法司馬法亦云周公所作論衡曰倉頡作書雨粟鬼哭虛也案圖書與書何異鬼神惡書則河出圖何也若不惡為書何忽致怪或作書時會鬼哭雨粟耳伏滔北征記曰皇天場北古時陶穴晉時有人逐狐入穴行十里許得書二千餘卷金樓子曰有細書周易尚書周官儀禮禮記毛詩春秋各一部又冩前漢史記三國志晉春秋莊子老子肘後方離騷等合六百三十四卷悉在一巾箱中書極精細又}
