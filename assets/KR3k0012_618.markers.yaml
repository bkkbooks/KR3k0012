  - {type: variant, offset: 2272, length: 7, content: 為琅邪長輅時年, SBCK: 業歆於是緫群書而奏其七略故有輯略師古曰輯與集同謂諸書之總要有六蓺略師古曰六蓺六經有諸子略有詩賦略有兵書略有術數略有方技略抱扑子曰書三冩以魯爲胄以帝爲虎劉向七略曰古文或誤以見爲典以陶爲隂如此􅀋多穎容春秋例曰漢興愽物洽聞著述之士前有司馬遷楊雄劉歆後有鄭衆賈逵班固近即馬融鄭􅀇其所著作違義正者遷尤多闕略舉一兩事以言之史記不識畢公文王之子而言與周同姓􅀭雄著法言不識六}
