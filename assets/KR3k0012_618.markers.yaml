  - {type: variant, offset: 2716, length: 388, content: 坐所不及也又曰衛玠字叔寶少有名理琅邪王平子高氣不群邁世獨遨每聞君之語議至乎理會之間要微之際輒絕倒於坐前後三聞為之三倒時人遂曰衛君談道平子三倒及君年長論者以為出於王武子之右世咸謂王家三子如衛家一兒玠於武昌見大將軍王敦與之談論彌日信宿敦顧謂僚屬曰昔何王吐金聲於中朝此子復玉振於江表微言之緒絕而復續不悟永嘉之末復有正始之音清言勝詠亹亹入微何平叔在當復倒矣又曰孝武將講孝經謝太傅與諸人私逆講師車武子謂袁彥伯曰不問則德音有遺多問則重勞二謝袁曰必無此嫌車曰何以知爾袁曰何嘗見明鏡疲於屢照清流撓於惠風也郭子曰張憑舉孝廉出京負其才氣謂必參時彥欲詣劉真長鄉里及同舉者咸共哂之張遂徑往詣劉既前處之下坐通寒暑而已真長方洗濯料事神意不接良久張欲自發而未有其端頃之王長史諸賢來詣言各有隔而不通處張忽遙於末坐判之言約皆遠便足以暢彼我之懷舉坐皆驚真長延之上坐遂清言彌日因留宿遂復至曉張退劉曰卿且前去我正爾往, WYG: 辨答}
