  - {type: variant, offset: 303, length: 9, content: 食晝即至暝夜即徹旦, WYG: 同未知孰是也又後漢王莽徴陳咸咸遂稱篤疾於是乃歛其家律令文書藏於壁中也後漢書曰吳祐字季英陳留長垣人也父恢為南海太守祐年十二随父到官恢欲殺青簡以寫經書祐諫曰大人踰越五嶺逺在海濱其俗誠陋然舊多珍怪上為國家所疑下為權戚所望此書若成則載之兼兩昔馬援以薏苡興謗王陽以衣囊邀名嫌疑之間誠先賢所慎也恢乃止撫其首曰吳氏世不乏季子矣魏志曰王脩家糓不滿十斛有書數百卷太祖歎曰士不妄有名也蜀志曰向朗字巨達潛心典籍積聚篇卷於是最多}
