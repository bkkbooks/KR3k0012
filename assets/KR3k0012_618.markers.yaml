  - {type: variant, offset: 56, length: 2, content: 人心, krp: 政由是文籍生焉伏犧神農黄帝之書謂之三墳言大道也少昊顓頊髙辛唐虞之書謂之五典言常道也至于夏啇周之書雖設教不倫雅誥奥義其}
  - {type: variant, offset: 59, length: 1, content: 湯, SBCK: 一揆是故歴代寳之以爲大訓八卦之􅀃謂之八索求其義也九州之志謂之九丘丘聚也言九州所有土地所生風氣所冝皆聚此書也春秋左氏傳曰楚左史􅀝相能讀三墳五典八索九丘即謂上丗帝王遺書也左氏傳曰晉荀躒如周籍談爲介謂籍談曰昔髙祖孫伯黶司晉之籍以爲大政故曰籍氏汝司典之後何忘之漢書蓺文志曰昔仲尼没而微言絶七十子終而大義乖故春秋分爲五韋昭曰謂左氏羊榖梁鄒氏夾氏也詩分爲四韋昭謂毛氏齊魯韓也易有數家之傳戰國從衡真僞分爭諸子之言紛然殽亂至秦患之乃燔滅文章以愚黔首漢興改秦之敗大收篇籍廣開獻書之路迄孝}
  - {type: page-break, offset: 59, content: '', id: KR3k0012_SBCK_618-1b}
  - {type: variant, offset: 59, length: 1, content: 湯, WYG: 一揆是故厯代寶之以為大訓八卦之說謂之八索求其義也九州之志謂之九丘丘聚也言九州所有土地所生風氣所宜皆聚此書也春秋左氏傳曰楚左史倚相能讀三墳五典八索九丘即上世帝王遺書也左氏傳曰晉荀躒如周籍談為介謂籍談曰昔髙祖孫伯黶司晉之籍以為大政故曰籍氏汝司典之後何忘之漢書藝文志曰昔仲尼沒而微言絶七十子終而大義乖故春秋分為五韋昭曰謂左氏公羊穀梁鄒氏夾氏也詩分為四韋昭謂毛氏齊魯韓也易有數家之傳戰國從衡真偽分争諸子之言紛然殽亂至秦患之乃燔滅文章以愚黔首漢興改秦之政大收篇籍廣開獻書之路迄孝}
