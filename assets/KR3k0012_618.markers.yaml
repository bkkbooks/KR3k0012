  - {type: variant, offset: 391, length: 258, content: 為不如己笑而遣之令過其子若思京方極其言論昌竊聽之乃歎服曰才不可假遂父子俱辱焉又曰郭象字子玄少有才理好老莊能清言太尉王衍每云聽象語如懸河瀉水注而不竭又曰樂廣嘗與裴顧清言欲以理服之而顧辭論豐博廣笑而不言時人謂顧為言談林藪又曰朝賢嘗上已禊飲或問王濟昨遊有何言談濟曰張華善說史漢裴頠論前言往行靡靡可聽王戎子房季扎之間超然玄著又曰王衍妙善玄言唯談老莊為事每捉玉柄塵尾與手同色義理有所不安隨即改更世號曰口中雌黃朝野翕然謂之一世龍門矣又曰胡母輔之字彥國與王澄等為友澄嘗與人書曰彥國吐佳言如鋸木屑霏霏不絕誠為後進領袖也又曰趙孟字長舒, WYG: 憲}
