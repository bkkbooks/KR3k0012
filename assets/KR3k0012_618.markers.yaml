  - {type: variant, offset: 1186, length: 788, content: 周書曰蘇綽屬太祖與公卿往昆明池觀漁行至城西漢故倉地顧問左右莫有知者或曰蘇綽博物多通請問之太祖乃召綽具以狀對太祖大悅因問天地造化之始歷代興亡之跡綽既有口辯應對如流太祖益喜乃與綽並馬徐行至池竟不設網罟而還遂留綽至夜問以治道太祖臥而聽之綽於是指陳帝王之道兼述申韓之要太祖乃起整衣危坐不覺膝之前席語遂達曙不厭詰朝謂周惠達曰蘇綽真奇士也又曰裴文舉字道𥙿少忠謹涉獵經史總管韋孝寬特相欽重每與談論不覺膝前於蓆又曰寇儁字祖儁上穀平昌人也世宗尚儒重德特欽賞之與相見同席而坐因顧訪洛陽故事儁容止端詳音韻清朗帝與之談不覺為之前席齊書劉繪傳曰永明末都下人士盛為文章談義皆湊竟陵西邸繪為後進領袖時張融以言辭辯健周顒稱為清綺而繪音采贍麗雅有風則時人為之語曰三人共宅夾清漳張南周北劉中央言其處二人間也又曰張緒性清談善談玄王儉嘗云緒過江所未有北土可求之耳不知陳仲弓黃叔度能過之不三國典略曰陳袁憲樞之弟也幼聰敏好學梁武帝修建庠序別開五館其一館在憲宅西常招引諸生與之談論每有新義出人意表國子博士周弘正謂憲父君正曰賢子今茲欲策試不君正曰經義猶淺未敢令試居數日君正遣門下客岑文豪與憲候引正將登講座弟子畢集乃授憲塵尾時謝歧何妥在坐弘正謂曰二賢雖窮奧賾得無憚此後生耶何謝起義端憲酬對閑敏神色自若弘正因謂文豪曰卿還諮袁吳郡此郎已堪見代為博士矣梁書曰沈約齊初為征虜記室帶襄陽令所奉主即齊文惠太子太子入居東宮為步兵校尉管書記時東宮多士約特蒙親遇時王侯列宮或不得進約每以為言太子曰吾生平嬾起是卿所悉得卿談論然後忘寢卿欲我夙興可恒早入又曰簡文在東宮召戚袞講論又嘗置宴集玄儒之士先命道學互相質疑次令中庶人徐摛騁大義間以劇談摛辭辯從撗難以荅抗諸儒懾氣時袞說朝聘義摛與往復袞精采自若應荅如流簡文深嘉歎之隋書曰辛彥之拜禮部尚書與祕書監牛弘撰新禮吳興沈重名為碩學高祖嘗令彥之與重論議重不能抗於是避席而謝之曰辛君所謂金城湯池無可攻之勢高祖大悅, SBCK: ''}
