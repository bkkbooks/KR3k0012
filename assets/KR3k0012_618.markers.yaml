  - {type: variant, offset: 2179, length: 1, content: 充, WYG: 之子而言與周同姓揚雄著法言不識六十四卦云}
  - {type: variant, offset: 2181, length: 5, content: 作論衡北方, WYG: 從来尚矣後漢書曰和熹鄧太后從曹大家受經書兼天文算數晝省王政夜則誦讀而患謬誤懼乖典章乃博選諸儒劉珍等及博士議郎四府掾史五十餘人詣東觀校傳記蜀志曰向朗字臣達年八十手自校書刋定謬誤也晉書曰鄭黙字思元起家秘書郎考覈舊文刪省浮穢中書令虞松謂曰而今而後朱紫別矣又曰齊王攸以禮自拘鮮有過事就人借書必手刋其謬然後返之後周書曰元偉世宗初拜師氏下大夫受詔於麟趾殿刋正經籍又曰明帝幼而好學博覽羣書善屬文詞彩温麗及即位集公卿已下有文學者八十餘人於麟趾殿刋校經史又捃採衆書自羲黄以來訖于魏末叙為世譜凡五百卷云所著文章十卷唐書曰褚元量以内庫舊書自髙宗代即藏在宫中漸致遺逸奏請繕寫刋校以𢎞經籍之道於是上令於東}
