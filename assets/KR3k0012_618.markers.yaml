  - {type: variant, offset: 2076, length: 35, content: 吾與汝處於魯之時人用意如飛鴻者吾走狗而逐之用意如井魚者吾為鉤繳以投之吾, krp: 太古書}
  - {type: variant, offset: 2077, length: 0, content: '', WYG: 今年四十六嵗聚書来四十年得書八萬卷也何閒之伴漢室頗謂過之也正謬誤劉向別傳曰讎校者一人持本一人讀折若怨家相對故曰讎也左傳曰晉師閏月濟於陰阪杜預注云長厯推之此年無閏月數為門五日五字上}
