  - {type: variant, offset: 3105, length: 394, content: 卿共詣撫軍撫軍簡文張既還舡同旅笑之曰卿何許宿還張笑而不荅須臾真長至遣教覔張孝廉舡同旅惋愕既同載俱詣撫軍至門劉謂撫軍曰下官今日為公得一太常博士妙選既前撫軍與之語言咨嗟稱善數日乃止曰張憑勁粹為理之窟即用為太常博士又曰范玄平注字玄平在簡文坐談欲屈引長史曰長史王仲祖卿助我王曰此非拔山之力所能助也異苑曰陸機初入洛次河南偃師時久結陰望道左人居因往投宿見一年少置易投壺與機談機心伏之而無以酬抗既曉便去稅驂逆旅問嫗嫗曰此東數十里無村落正是山陽王家墓耳機乃怪還睇昨路空野霾雲拱木蔽日知所遇者信王弼也又曰陸雲獨於空草中忽見一家墻院整頓雲時飢乏因而詣前見一年少可二十餘風姿可嘉論敘平生不異於人尋共說老子極有辭致雲出臨別語云我是山陽王輔嗣雲出門還望向處正是一冢雲始謂俄頃已經三日幽明錄曰阮瞻素秉無鬼論世莫能難每自謂理足可以辯正幽明忽有一鬼通姓名作客詣阮寒溫畢聊談名理客甚有才情未及鬼神事返覆甚苦遂屈乃作色曰鬼神, WYG: 晉宋}
