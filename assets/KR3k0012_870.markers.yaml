  - {type: variant, offset: 1035, length: 0, content: '', SBCK: 今臣弃逐於􅁗而出関爲足下掃室布席幸無我逐也􅂫子曰善史記曰始皇塚中以人膏爲燭謝承後漢書曰巴秪爲楊州刺史與客坐闇􅉂之中不燃官燭晉書曰周顗弟嵩嘗因酒瞑目謂顗日君才不及弟何乃横得重名以所執蠟燭投之覬神色無忤}
  - {type: variant, offset: 1035, length: 0, content: '', krp: 今臣弃逐於秦而出関爲足下掃室布席幸無我逐也蘇子曰善史記曰始皇塚中以人膏爲燭謝承後漢書曰巴秪爲楊州刺史與客坐闇瞑之中不燃官燭晉書曰周顗弟嵩嘗因酒瞑目謂顗日君才不及弟何乃横得重名以所執蠟燭投之覬神色無忤}
  - {type: variant, offset: 1036, length: 0, content: '', SBCK: 曰阿奴火攻固岀下䇿耳齊書曰竟陵王子良常集學士刻燭爲詩四韻者具刻一寸以此爲竒蕭文琛曰燒一寸濁爲四韻詩何難之有乃與丘楷江洪共打銅鉢爲五韻詩響㓕皆可􅀚覧後魏書曰髙祖甞幸清徽堂命黄門郞崔光鄴郭雅邢巒崔休等賦詩言志燭至公卿辭退髙祖曰燭至辭退無同姓之禮在夜載考宗族之義卿等且還朕與諸王宗室欲成此夜飲北齊書曰郎茂年十五師事國子􅀶士河間􅁠㑹受詩易三禮玄象刑名之學至忘􅃦食家人恐成病􅁪節其燭唐書曰劉􅃆爲忠武小校從李光顔討淮西爲捉生將前後與賊血戰鋒刃所傷幾死者數四嘗傷重卧草中月黒不知歸路昬然}
