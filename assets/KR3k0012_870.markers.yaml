  - {type: variant, offset: 3232, length: 0, content: '', SBCK: 玉矣蔡氏化清論曰伏龍非我馬白日非我燭藏之黙之保此小朴楚辭曰室中之觀多􅡋怪蘭膏明燭華容備古詩曰人生不滿百常懷千載憂晝短苦夜長何不秉燭遊魏明帝樂府詩曰晝作不輟手猛燭継望舒劉禎詩曰天地無期竟民生甚局促爲稱百年壽誰能應此録低昻倐忽去炯􅀂風中燭傳玄燭銘曰煌煌丹燭熖熖飛光取則龍景擬象扶桑照彼玄夜炳􅀂朝陽焚形監丗無隱不彰炬東觀漢記曰光武平河北任光伯卿暮入堂陽懸􅀐㫮炬}
