  - {type: variant, offset: 1766, length: 88, content: 火帝王天下死託祀於竈神抱朴子曰案河洛之文皆云水火者陰陽之餘氣也夫言氣則其不能生日月可知也若水火是日月所生亦何必盡如日月之方圓乎今火出於陽燧而火不圓也水出於方諸而水不方也又陽燧可, SBCK: 粘糖澳釡石季倫}
