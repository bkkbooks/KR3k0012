  - {type: variant, offset: 68, length: 0, content: '', SBCK: 漢武帝燃芳苡燈於閤上有白鳯黒龍足來戲於閤上芳苡草出奔盧國又曰丹豹髓白鳯膏磨青􅃬爲屑以淳蘇油和之照於神壇夜􅁀雨燈光不滅羊頭山記曰漢有常滿燈不添常滿光明不絶也法顕山記曰舎衛國精舎道東有外道天寺名曰影覆與佛論議處精舎夾道相對亦髙六丈許所以名影覆者日在西時佛精舎影則照外道天寺日在東時外道天寺影比暎不得照佛精舎也外道常遣人守天寺洒掃燒香燃燈供飬至明且其燈輙移在佛精舎中娑羅門恚言諸沙門取我燈}
