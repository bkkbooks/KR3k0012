  - {type: variant, offset: 3026, length: 281, content: 秦始皇葬驪山六年之間為項籍所發放羊兒墮羊冢中然火求羊燒其槨藏魏武帝明罰令曰聞太原上黨西河雁門冬至之後百五日皆火寒食云為介子推子胥沉江吳人未有絕水之事至於子推獨為寒食豈不偏乎河圖挺佐輔曰伏羲禪於伯牛錯木作火春秋潛潭巴曰火從井出有賢士從民間起宋均注曰火明賢者象賢者屈淵從井出禮含文嘉曰燧人始鑽木取火炮生為熟令人無腹疾遂天之意故為燧人也陸景典語曰衝風之摧枯枝烈火之炎寒草武王伐紂勢然也古今注曰宣帝地節元年上郡沙中夜中有火如粟出不熱又曰陽燧以銅為之形如鏡向日則火生以艾炷承之得火也璅語曰智伯既敗將出走夢火見於西方及夫出奔秦又夢見於南方遂奔楚也張衡靈憲曰日疋火月疋水火則外, WYG: 吾恥與鬼魅爭}
