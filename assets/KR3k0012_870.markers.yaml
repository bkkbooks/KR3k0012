  body:
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 三燈燭炬燈漢書曰王莽好變改制度政令煩多莽常御燈火至明東觀漢記曰上從長安東歸過汧幸􅀕遵營士衆作黄門武樂至夜御燈火晉書曰温嶠往武昌至牛渚磯水深不可測世云其下多恠物嶠遂燬犀燈而照之湏􅁷見水中竒形異􅃺或乗車馬著赤衣者嶠其夜夢人謂曰與君幽明道隔何故相照意甚惡至鎮踰旬而卒唐書曰皇甫無逸爲益州長史嘗夜􅀫人家遇燈炷盡主人將續之無逸抽佩刀断衣帶以爲炷其廉分如此又曰睿宗好樂聴之忘倦玄宗又善音律先天}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_SBCK_870-1b}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 三燈燭炬燈漢書曰王莽好變改制度政令煩多莽常御燈火至明東觀漢記曰上從長安東歸過汧幸祭遵營士衆作黄門武樂至夜御燈火晉書曰温嶠旋軍武昌至牛渚磯水深不可測世云其下多恠物嶠遂燬犀角而照之須臾見水族竒形異状或乗車馬著赤衣者嶠其夜夢人謂曰與君幽明道隔何故相照意甚惡之至鎮未旬而卒唐書曰皇甫無逸為益州長史嘗夜宿人家遇燈炷盡主人将續之無逸抽佩刀炷衣帯以為燈其亷介如此又曰睿宗好樂聴之忘倦𤣥宗又善音律先天}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_WYG_870-1b, image: WYG0900/WYG0900-0587d.png}
