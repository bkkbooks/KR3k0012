  - {type: variant, offset: 3338, length: 0, content: '', WYG: 葉隂數畆地夜視之如列燭晝則㓕矣又曰崑崙者西方曰彌山對七星之下出碧海之中有五色玉樹夜望水上光熖如燭抱朴子曰慕惡者猶宵蟲之赴明燭焉又曰夫明燭宵舉飛蟲羣起又曰有自無而生焉形須神而立焉有者無之宫形者神之宅故譬之於堤堤壞則水不留方之於燭燭盡則火不居住也文子曰鳴鐸以聲自毁膏燭以明自銷韓子曰郢人有遺燕相國書者夜書火不明因謂持燭者曰舉燭而誤書舉燭非書意也燕相國受書而恱之曰舉燭者言舉髙明者而任之國以治也淮南子曰天下時有盲妄自失之患此膏燭之類也火愈燃而消愈急説苑曰晉平公問於師曠曰吾年七十欲學恐已暮矣師曠曰臣聞少而學者如日出之光壯而學者如日中之光老而學者如炳燭之明不學昧趨如夜行焉炳燭之明孰與昧行公曰善世説曰王君夫王愷字以飴糖澳釡石李倫石崇字以蠟燭作炊𤣥晏春秋曰予讀漢書凶奴傳不識撐黎孤塗之字有小奚執燭顧而問之奴曰撐黎天子也盖匈奴之號單于猶漢人言天子也予扵是乎曠然發曚潜夫論曰偶燭之施明於幽室也前燭即盡照之矣後燭入而益明二者相因而成大論衡曰太公隂謀書稱武王伐紂兵至牧野晨舉脂燭權掩不備地鏡圗曰相玉者見美女子載燭行壇隂從其所出入處㝷之石中有玉矣蔡氏化浦説曰伏龍非我馬白日非我燭藏之然之保此小材楚辭曰室中之觀多珍怪蘭膏明燭華容備古詩曰人生不滿百常懐千載憂晝短苦夜長何不秉燭遊魏明帝樂府詩曰晝作不輟手猛燭繼望舒劉楨詩曰天地無期竟民生甚局促為稱百年壽誰能應此録低昻倐忽去炯若風中燭傳咸燭銘曰煌煌丹燭熖熖飛光取則景龍擬象扶桑照彼𤣥夜炳若朝陽焚形監世無隱不彰炬東觀漢記曰光武平河北任光伯卿暮入堂陽界騎皆持炬火天地赫然盡赤堂陽驚怖即夜降魏志曰滿寵字伯寧以前將軍都督揚州諸軍事孫權自将號十萬至合淝新城寵馳往赴募壮士十數人折松為炬灌以麻油從上風放火燒賊攻具射殺權弟子泰賊于是引退宋書曰王懿字仲徳太原人也符氏之敗仲徳年十七與兄叡同起義兵與慕容垂戰敗仲徳被重創走至滑臺復為翟遼所留使為将帥仲徳志欲南歸乃棄遼走太山遼追騎甚急夜行急見前有猛炬導之乗火夜行百}
