  - {type: 'tls:seg', offset: 3335, content: '', id: KR3k0012_CHANT_870-49a.6}
  - {type: variant, offset: 3337, length: 0, content: '', WYG: 西壁者幸以賜妾何為去我諸女以為然而留之今臣棄逐於秦而出闗為足下掃室布席幸無我逐也蘇子曰善史記曰始皇塚中以人魚膏為燭謝承後漢書曰巴祗為揚州刺史與客坐暗暝之中不燃官燭晉書曰周顗弟嵩嘗因酒暝目謂顗曰君才不及弟何乃横得重名以所執蠟燭投之顗神色無忤徐曰阿奴火攻固出下䇿耳南史曰竟陵王子良常集學士刻燭為詩四韻者則刻一寸以此為竒蕭文琰曰燒一寸燭為四韻詩何難之有乃與丘令楷江洪打銅鉢立韻響滅則詩成皆可觀覽後魏書曰髙祖嘗幸清徽堂命黄門即崔光鄴郭雅邢巒崔休等賦詩言志燭至公卿辭退髙祖曰燭至辭退異姓之禮在宗載考宗族之義卿等且還朕與諸王宗室欲成此夜飲北齊書曰郎茂年十五師事國子博士河間權㑹受詩易三禮𤣥象刑名之學至忘寢食家人恐成病恒節其燭唐書曰劉沔為忠武小校從李光顔討淮西為捉生將前後遇賊血戰鋒刃所傷幾死者數四嘗傷重臥草中月黑不知歸路昏然而睡夢人授之䨥燭曰子方大貴此行無患可持此而還既行然有雙光在前自後破虜危難每行嘗有此光及罷鎮後雙光遂息又曰桞公權充翰林書詔學士每浴堂召對繼燭見䟦語猶未盡不欲更取宫人以蠟淚揉紙繼之會稽典録曰盛吉拜廷尉吉性度仁恕務在寛矜每至冬月罪囚當斷其妻執燭吉手持丹筆夫妻相對垂泣又曰陳修字奉遷烏傷人也為豫章太守修性清潔履約恭儉十日一炊不燃官燭神仙傳曰漢章帝問劉馮曰殿下有怪嘗著朱衣被髪持燭相隨而走為可劾否馮曰可帝因使人偽為之馮以符擲之數人頓地帝驚曰以相試耳乃解之列女傳曰齊女徐吾者東海上貧婦人與其隣婦李吾之屬合燭夜績徐吾最貧無燭李吾曰徐吾燭數不屬請無與夜績徐吾曰妾以貧故起常先去常後洒掃陳席以待來者今一室之中益一人燭不為益明去一人燭不為益暗何愛餘光莫之能應遂復與夜績西京雜記曰閩越王獻髙帝石蜜五斛蜜燭二百枝又曰匡衡勤學無燭隣舎有燭乃穿壁引其光以書映光而讀之王子年拾遺記曰融臯西有銷明之草莖生}
