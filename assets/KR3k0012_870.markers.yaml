  - {type: variant, offset: 306, length: 528, content: 珠以遵於禹又曰員嶠之山名環丘有雲石廣五百里或四五十里扣之片片則蓊然雲出俄而徧潤天下有木名曰倚桑亦有冰蠶長七寸黑色角有鱗以霜雪覆之然後作繭長一尺其色五綵織為文錦入水而不濡其質輕軟柔滑以之投火則經宿不燎唐堯之世海人獻之又曰始皇好神仙之事求天下異術有宛渠之民乘蠡舟泛黑水而至於雍部始皇與之語及天初開之時子如親見始見問曰聞子明於見遠願聞其術對曰臣之國去咸池日沒之所九萬里焉日月之所不照以萬歲為夜其晝則天豁然中開闊數百丈萬歲還合則為一日也及其為夜琢燃石以代日光此石出於然山其土石皆自光明鑽斬皆火出大如栗則輝曜一室昔炎帝時火食國人獻此石也又曰申彌國去都萬里有燧明國不識四時晝夜其人不死厭世則升天國有火樹名燧木屈盤萬識雲霧出於中間折枝相鑽則火出矣後世聖人變腥臊之味遊日月之外以食救萬物乃至南垂目此樹表有鳥若鴞以口啄樹粲然火出聖人成焉因取小枝以鑽火號燧人氏在庖羲之前則火食起乎茲矣又曰郅寄字君珍喪親盡禮去墓一百里每夜行常有鳥銜火以夾之六韜曰軍不舉火將亦不食莊子曰木與木相摩則燃金與火相守則流陰陽錯行則天地大駭於是乎有雷有霆水中有火乃焚大槐又曰利害相摩生火甚多曲熟也眾人焚和眾人遺利則和若利害存懷則其和焚矣又曰曾子居衛縕袍無表三日不舉火十年不製衣又曰孔子窮於陳蔡之間七日不火, WYG: 輦共王飲}
