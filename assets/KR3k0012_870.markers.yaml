  - {type: variant, offset: 1795, length: 1199, content: 氣也夫言氣則其不能生日月可知也若水火是日月所生亦何必盡如日月之方圓乎今火出於陽燧而火不圓也水出於方諸而水不方也又陽燧可以取火於日而無取日於火之理則日精之生火明矣方諸可以取水於月而無取月於水之道則月精之生水可知矣又曰南海之中蕭丘之上有自生之火火常以春起而秋滅丘方千里當火起之時滿此丘上純生一種木火起正著此木木離為火所著但小燋黑人或得以為薪者火著如常薪但不成炭炊熟則灌滅之後復更用如此無窮又夷人取木華績以為火浣布木皮亦剝以灰煮為布但不及華細好耳白鼠大者重數斤毛長三寸居空木中其毛亦可績為布故火浣布有三種焉又曰暗非火積水非魚屬然暗竭則火滅水涸則魚死伐木而寄生蔓草菟絲萎又曰立夏日服六壬六癸之符或服飛霜之散則不熱幼伯子王仲都此二人衣之以重裘𦢊之於夏曰之中周以十爐之火口不稱熱身不流汗蓋用此方也傅子曰管寧之遼東而歸海中遇暴風餘舡皆波唯寧舡自若夜晦舡人盡惑莫知泊所忽望見火光趣之得島一無居人又無火爐行人感異焉以為神光之祐皇甫曰積善之應也尸子曰燧人上觀辰星下察五木以為火也陰符經曰火生於木禍發必剋孫子兵法曰凡火攻有五一曰火人二曰火積三曰火輜四曰火庫五曰火燧呂氏春秋曰齊桓公使人告魯曰管夷吾寡人之讎也願生得之魯君許諾乃使轉其拳滕其耳置之匣中至齊境桓公使以朝車迎之祓以爟火爟火所以祓除不祥也爟讀自灌又曰鷰雀處一屋之下自以為安竈突決火棟將焚鷰雀不知禍將至也又曰伊尹說湯五味九沸九變火為之紀博物志曰燧人鑽木而造火又曰臨卭有火井一所縱廣五尺深二三丈在縣南百里昔人以竹木投之以取火諸葛丞相往觀視後火轉盛以盆著井上煮鹽得鹽後人以家燭火投井中火即滅迄今不復然也又曰臨卭有火井深六十餘丈火光上出人以筒盛火行百餘里猶可燃也蜀王本紀亦同又曰魏明帝世河東有焦光者裸而不衣處火不燋處寒不凍又曰積油萬石則自然生火晉泰始中武庫火積油所致南越志曰廣州有大樹可以禦火山北謂之慎火南無霜雪故成樹也風俗通曰城門失火禍及池魚案百家書宋城門失火汲取池中水以沃之魚悉露見但就取之說云司門尉姓池名魚城門火救之燒死故云然耳又曰臧仲英家欲炊而失釜火從篋中起衣服盡燒而篋不損山海經曰符愚之山其鳥名𪂆音旻其狀如翠而赤喙翠以燕而紺色可以衛火畜之辟災又曰翠山之上其鳥多鸓音壘其狀如鵲赤黑而兩首可以衛火又曰崦嵫之山上多丹木其葉如穀其實如瓜赤符而黑理食之可以衛火又曰帶山之上有獸焉其狀如馬而一角其名曰䑏音歡䟽可以衛火又曰令丘之山無草木其上多火又曰崌音居山之上有鳥焉其狀如鴞而赤身白首名曰竊脂可以衛火又曰西海之南流沙之濱赤水後黑水前有山名曰崑崙之丘其外有炎火之山投物即然今扶南東萬里有耆蒲國東復五千里有火山國其雖霖雨火常燃火有白鼠常出山邊求食人捕之以毛作布而今之火浣布此類也又曰厭火國人獸身黑色火出其口中言能吐火神異經曰南荒外有火山焉長四十里廣四五里其中生木晝夜火燃得暴風雨火不滅火中有鼠重百斤毛長七尺餘細如絲可以作布新論曰漢元帝廣求方術之士漢中道人王仲都云但能忍寒暑耳以隆冬, WYG: ''}
