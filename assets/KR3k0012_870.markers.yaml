  - {type: variant, offset: 3232, length: 0, content: '', krp: 玉矣蔡氏化清論曰伏龍非我馬白日非我燭藏之黙之保此小朴楚辭曰室中之觀多􅡋怪蘭膏明燭華容備古詩曰人生不滿百常懷千載憂晝短苦夜長何不秉燭遊魏明帝樂府詩曰晝作不輟手猛燭継望舒劉禎詩曰天地無期竟民生甚局促爲稱百年壽誰能應此録低昻倐忽去炯若風中燭傳玄燭銘曰煌煌丹燭熖熖飛光取則龍景擬象扶桑照彼玄夜炳若朝陽焚形監丗無隱不彰炬東觀漢記曰光武平河北任光伯卿暮入堂陽懸騎㫮炬}
  - {type: variant, offset: 3233, length: 3, content: 如粟出, SBCK: 天地赫然盡赤堂陽驚怖即夜降魏志曰滿寵字伯寧以前將軍都督楊州諸軍事孫權自將號十萬至合淝新城寵馳徃赴募壯士十數人折松爲炬灌以麻油從上風放火燒賊攻具射殺權弟泰賊於是引退宋書曰王懿字仲德太原人也符氏之敗仲德年十七與兄叡同起義兵與慕容垂戰敗仲徳􅀍瘡退走至滑臺復爲翟遼所留使爲將師仲徳志欲南歸乃弃遼奔太山遼追􅀐甚急夜行忽見前有猛炬導之乗火夜行百里許得以免難六韜曰三軍有行臨領士衆旦則有雲梯逺望夜則設雲火萬炬淮南子曰亡者}
