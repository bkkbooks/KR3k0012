  - {type: variant, offset: 3, length: 2, content: 火下, SBCK: 年正月望日胡僧娑陁婆請夜開門燃百千燈睿宗御延喜門觀樂凢經四日從大酺睿宗御安福門樓觀百司酺宴以夜繼晝經月餘日河武内傳曰西王母遣使謂帝曰七月七日當暫來帝日掃除宫内然九光之燈荀采傳曰采荀爽女爲隂瑜妻而夫早亡爽逼嫁與太原郭弈采入郭氏室暮乃去帷帳建四燈歛祍正坐郭氏不敢逼三􅁗記曰始皇墓中燃鯨魚膏爲燈鄴中記曰石虎正平聲㑹於殿前設百二十枝燈以鐡爲之}
