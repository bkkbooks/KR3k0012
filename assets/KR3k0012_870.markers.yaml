  - {type: variant, offset: 1006, length: 644, content: 從石壁中從燼上下眾謂鬼物火過徐行而出若無所經涉襄子怪而留之徐而察之形色七竅人也氣息音聲人也問奚道而入火其人曰奚物而謂石奚物而謂火襄子曰嚮之來所出者石也而嚮之所涉者火也其人曰不知也管子曰黃帝作鑽燧出火以熟葷臊韓子曰魯燒積澤天北風火南倚恐燒國哀公懼自將眾趣而救火左右無人盡逐獸而不救火乃召問仲尼仲尼曰夫逐獸者樂而無罰救火者苦而無賞此火所以不救也事急不及以罰救火者盡賞之則舉國不足以賞於民請徒行罰乃下令曰不救火者比降北之罪令下未遍火已滅矣淮南子曰火上尋水下流又曰南方火也其帝祝融其佐朱明執衡而治夏衡平其神為熒惑其獸為朱鳥其音徵其日丙丁又曰十一月水正而陰勝陽陽氣為火陰氣為水水勝故夏至濕通合反火勝故冬至燥燥故炭輕濕故炭重又曰練土生木練治也練木生火練火生雲雲金氣也練雲生水練水生土又曰夫火熯則水滅之金堅則火消之又曰失火而遇雨失火則不幸遇雨則幸也故禍中有福也又曰槁竹有火弗鑽不然土中有水弗掘無泉掘猶窮也然音然又曰被蓑而救火毀瀆而止水乃愈益多又曰畜火井中操鉤上山揭斧入淵欲得所求難也又曰甑得火而液水中有火火中有水疾雷破石陰陽相薄自然之勢又曰夫救火者汲水而趍之或以甕瓴或以盆盂其方圓銳撱勑果反不同盛水各異其於滅火均也又曰順風從火紫芝與蕭艾俱死蕭蒿也又曰今人放燒或操火往益之或雨者皆未有功而相去亦遠矣又曰聖王之養民非求用之也性不能已若失火之自熱水之自寒夫有何脩焉及恃其力賴其功者若失火舟中言舟中之人同心救火其用為易又曰夫狂者之不能避水火之難而越溝瀆之嶮者豈無形神氣志哉然而用之異也與人異也又曰夫寒之與煖相反, WYG: 面甚小斯須轉}
