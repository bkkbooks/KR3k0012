  - {type: variant, offset: 2287, length: 171, content: 願生得之魯君許諾乃使轉其拳滕其耳置之匣中至齊境桓公使以朝車迎之祓以爟火爟火所以祓除不祥也爟讀自灌又曰鷰雀處一屋之下自以為安竈突決火棟將焚鷰雀不知禍將至也又曰伊尹說湯五味九沸九變火為之紀博物志曰燧人鑽木而造火又曰臨卭有火井一所縱廣五尺深二三丈在縣南百里昔人以竹木投之以取火諸葛丞相往觀視後火轉盛以盆著井上煮鹽得鹽後人以家燭火投井中火即滅迄今不復, SBCK: 予於是乎曠}
