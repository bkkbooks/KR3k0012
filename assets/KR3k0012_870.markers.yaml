  - {type: variant, offset: 3333, length: 2, content: 火穴, WYG: 厭倦也又曰曾子寢疾童子隅坐而執燭又曰孔子曰嫁女之家三夜不息燭思相離也又曰祭之日汎掃反道鄉為田燭又曰凢飲酒為獻主者執燭抱燋執燭不讓不辭不歌又曰禮者何也即事之治也君子有其事必有其治治國而無禮譬如終夜有求于幽室之中非燭何見又曰女子夜行以燭無燭則止周禮曰天府凡吉㓙之事祖廟之中沃盥執燭又曰凡邦之大事共墳燭庭燎墳燭麻燭也又墳大也樹庭燎於門外曰大燭於門内曰儀禮曰主人爵弁纒裳從車二乗執燭前焉又曰燕則庶子執燭於阼階上司宫執燭於西階上甸人執大燭於庭中閽人執燭於門外尚書大傳曰后夫人将侍於君前息燭後舉燭戰國䇿曰甘茂去秦之齊出闗遇蘇子曰君聞夫江上之處女乎夫江上處女有家貧無燭者處女相與語欲去之無燭者曰妾以無燭之故常先至掃室布席何愛東壁之餘}
