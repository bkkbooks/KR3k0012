  - {type: variant, offset: 2459, length: 507, content: 也又曰臨卭有火井深六十餘丈火光上出人以筒盛火行百餘里猶可燃也蜀王本紀亦同又曰魏明帝世河東有焦光者裸而不衣處火不燋處寒不凍又曰積油萬石則自然生火晉泰始中武庫火積油所致南越志曰廣州有大樹可以禦火山北謂之慎火南無霜雪故成樹也風俗通曰城門失火禍及池魚案百家書宋城門失火汲取池中水以沃之魚悉露見但就取之說云司門尉姓池名魚城門火救之燒死故云然耳又曰臧仲英家欲炊而失釜火從篋中起衣服盡燒而篋不損山海經曰符愚之山其鳥名𪂆音旻其狀如翠而赤喙翠以燕而紺色可以衛火畜之辟災又曰翠山之上其鳥多鸓音壘其狀如鵲赤黑而兩首可以衛火又曰崦嵫之山上多丹木其葉如穀其實如瓜赤符而黑理食之可以衛火又曰帶山之上有獸焉其狀如馬而一角其名曰䑏音歡䟽可以衛火又曰令丘之山無草木其上多火又曰崌音居山之上有鳥焉其狀如鴞而赤身白首名曰竊脂可以衛火又曰西海之南流沙之濱赤水後黑水前有山名曰崑崙之丘其外有炎火之山投物即然今扶南東萬里有耆蒲國東復五千里有火山國其雖霖雨火常燃火有白鼠常出山邊求食人捕之以毛作布而今之火浣布此類也又曰厭火國人獸身黑色火出其口中言能吐火神異經曰南荒外有火山焉長四十里廣四五里其中生木晝夜火燃得暴風雨火不滅火中有鼠重百斤毛長七尺餘細如絲可以作布新, SBCK: 發悟潜夫}
