  - {type: variant, offset: 152, length: 0, content: '', SBCK: 咸言瑞光遥加拜之以火浣布爲纒炷光蒲於宫内孫子曰火光明于天者燈燭何施焉符子曰不安其昧而樂其明也是猶夕蛾去暗赴燈而死􅁗子曰智惠多則引血氣如燈火消暗膏炷大而朗朗則膏消炷小而闇闇則息膏至乆也􅀃苑曰楚莊王賜羣臣酒日暮燈燭旣滅乃有人引羙人者羙人挽絶其冠纓桓譚新論曰余與劉伯師夜坐燈中脂炷燋秃將滅余謂伯師曰人衰老亦如彼秃炷矣伯師曰人衰老應自續余曰益性可使白髮更生黒至壽極亦死耳王朗􅁗故事曰五華燈樹正}
  - {type: page-break, offset: 152, content: '', id: KR3k0012_SBCK_870-3b}
  - {type: variant, offset: 152, length: 99, content: 月水騰沸以金石投之則爛如土矣孟冬之月稍燋涸中有黃色煙從地中出起數丈煙色萬變山人掘之入地數尺得燋石如炭或有碎火如俗聞之火有草名莽煌葉圓如荷去之十步炙人衣服則燋鳥獸不敢近也刈以為席冬彌溫以枝相歷磨則火出, WYG: 礙}
