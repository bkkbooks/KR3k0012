  - {type: variant, offset: 1974, length: 294, content: 熟則灌滅之後復更用如此無窮又夷人取木華績以為火浣布木皮亦剝以灰煮為布但不及華細好耳白鼠大者重數斤毛長三寸居空木中其毛亦可績為布故火浣布有三種焉又曰暗非火積水非魚屬然暗竭則火滅水涸則魚死伐木而寄生蔓草菟絲萎又曰立夏日服六壬六癸之符或服飛霜之散則不熱幼伯子王仲都此二人衣之以重裘𦢊之於夏曰之中周以十爐之火口不稱熱身不流汗蓋用此方也傅子曰管寧之遼東而歸海中遇暴風餘舡皆波唯寧舡自若夜晦舡人盡惑莫知泊所忽望見火光趣之得島一無居人又無火爐行人感異焉以為神光之祐皇甫曰積善之應也尸子曰燧人上觀辰星下察五木以為火也陰符經曰火生於木禍發必剋孫子兵法曰凡火攻有五一曰火人二曰火積三曰火輜四曰火庫五曰火燧呂氏, SBCK: 玄晏}
