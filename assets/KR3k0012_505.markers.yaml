  - {type: variant, offset: 1151, length: 305, content: 歡讌命為諮議不起好山水愛遠遊西陟荊巫南登衡岳因而結宇衡山欲懷尚平之志有疾還江陵歎曰老疾俱至名山恐難遊遍唯當澄懷觀道臥以遊理皆圖之於室謂人曰撫琴操欲令眾山皆響古有金石弄唯炳傳焉太祖遣樂師就炳受之元嘉二十年炳卒又曰王弘之字方平琅邪臨沂人家貧而性好山水桓玄輔晉桓謙以為衛軍參軍時殷仲文還姑孰祖送傾朝謙要弘之同行荅曰凡祖離送別必在有情下官與殷風馬不接無緣扈從謙貴其言隨兄敬弘之安成郡弘之解職同行家在會稽上虞敬弘常解貂裘與之即著以採藥性好釣上虞江有一處名三石頭弘之裳垂綸於此經過者不識之或問漁師得魚賣否弘之曰亦自不得得亦不賣日夕載魚入至上虞郭經親故門各以一兩頭置門內而去始寧沈州有佳山水弘之又依巖築室謝靈運顏延之並相欽重, SBCK: ''}
