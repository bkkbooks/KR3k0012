  - {type: variant, offset: 1462, length: 422, content: 志安小名長年慕老萊嚴子陵為人推家財與弟及兄子立屋於野外非其力不食州里重其仁德禮辟並不受妻梁州刺史郭鈐女也遣送豐麗凝之悉散之親族妻亦能棄榮華共安儉苦徵為祕書郎不就荊州年飢衡陽王慮凝之餒弊餉錢十萬凝之大喜將錢至市門觀有飢色者悉分與之性好山水一旦攜妻子泛江湖隱居衡山之陽登高山絕人跡為小屋居之採藥服食妻子皆從其志又曰龔祈字道孟武陵漢壽人也父黎民及祈並不應徵辟祈風姿端雅容止可觀中書郎范述見而歎曰此荊楚仙人也時或賦詩不言及世事又曰翟法賜尋陽柴桑人祖湯湯子莊莊子矯並高尚不仕逃避徵聘矯生法賜少守家業立屋於廬山頂居後便不復還家不食五穀以獸皮結草為辟著作郎不就後家人至石室尋求因復遠徙違避徵聘遁跡幽深後卒於嚴石之間又曰沈道虔吳興武康人少仁愛好老易縣比山石下為精廬與諸孤兄子共釜庾之資困不改節受琴於戴逵辟府凡十二命皆不就太祖聞之遣使存問賜錢累世事佛推父祖舊宅為寺至四月八日每請像請像之日輒舉家感動焉道虔年老菜食恒無經日之資而琴書為樂孜孜不倦又曰雷次宗字仲倫南昌, SBCK: 宣文彭城}
