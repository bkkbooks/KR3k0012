  - {type: variant, offset: 2552, length: 195, content: 仕寄情丘壑少與崔浩為莫逆之交及浩為司徒奏徵夸為其中郎辭疾不起州郡逼遣不得已及入都與浩相見經留數日惟飲酒敘平生不及世利浩每欲論屈之意不能發言見敬憚如此浩後遂投詔書於夸懷夸曰桃簡卿已為司徒何足以此勞國亡挑簡浩小名浩慮夸即還夸時乘一騾更無兼騎浩乃以騾內之廄中冀相維縶夸遂託鄉人輸租者謬為御車乃得出關浩知而歎恨曰睦夸獨行之士本不應以小職辱之又使其人杖策復路吾當何辭以謝也及浩誅後誇為之素服受鄉人吊喭, SBCK: 肯}
