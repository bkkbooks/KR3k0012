  - {type: variant, offset: 747, length: 233, content: 蚿賦以自況又曰戴顒字仲若譙郡銍人也父逵兄并隱遁有高名顒年六十遭父憂幾於毀滅因此長抱羸患又不仕復修其業父善琴書顒並傳之凡諸音律皆能揮手會稽剡縣多名山故世居剡下顒及兄勃並受琴於父父沒所傳之聲不忍復奏各造新弄桐廬縣又多名山兄弟復共遊之因留居止以桐廬僻遠難以養疾乃出居吳下吳下士人共為築室乃述莊周大旨著逍遙論太祖元嘉初徵散騎常侍並不就太祖每欲見之常謂黃門侍郎張敷曰吾東巡之日當讌戴公山也以其好音長給正聲伎一部卒年六十四後景陽山成上歎曰恨不使戴顒觀又曰宗炳字少文南陽人高祖領荊, WYG: 揚}
