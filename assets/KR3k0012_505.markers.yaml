  - {type: variant, offset: 574, length: 137, content: 周續之字道祖鴈門廣武人也終身不娶妻布衣蔬食常以稽康高士傳得山林之美因為之注高祖比討世子居守迎續之館于安樂寺延入講禮月餘復還山又曰朱百年會稽山陰人以伐樵採箬為業每以樵箬置道頭輒為行人所取明旦已復如此人稍怪之積久方知是朱隱士所賣須臾行者隨其所堪多少留錢取樵而去又曰王素字休業琅邪, WYG: 臧榮緒京莞莒}
