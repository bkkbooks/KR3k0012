  - {type: variant, offset: 2750, length: 1, content: 崔, SBCK: 其室雖邇其人何逺自是飲風者莫不歛祍望塵而息也又曰陶弘景字通明丹陽人生十􅀊讀􅁑洪神仙傳曰仰青雲覩白日不覺爲逺齊髙祖作相引爲侍讀永明􅀄脫朝服掛神武門上表辝禄詔乃許之居勾容曲山自号華陽隱居武帝即位有􅁻㓙征討大事皆使咨問時人号爲山中宰相預知梁祚覆没乃製詩曰夷甫任散誕平叔坐論空豈悟昭陽殿遂作單于宫及侯景傾䧟􅆲位果在昭陽殿皆如其言大同􅀄卒年八十五顔色不變屋中有異香氣累日氲謚貞白先生有肘後方枕中術及夲草又曰沈顗呉興人也性有至介常慕黄叔度徐孺子之爲人每獨處一室罕見其面從叔㪍貴顯當朝每還呉賔客迎送填咽顗送迎不出域㪍乃歎曰吾乃今知貴不如賤也又曰何􅀧字士哲廬江人也􅀧雖不出入城府而遨逰于外不簪不帶駕柴車躡草履恣心所適致醉而歸士大夫多慕從之時人謂之通隱後周書曰韋夐字敬逺孝寛之兄也志尚夷簡淡於榮利太祖經略王業仄席求賢備禮辝之終不能起彌加敬重丗宗即位禮遇逾厚勑有司日給河東酒一㪷号曰逍遥}
