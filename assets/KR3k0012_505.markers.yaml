  - {type: variant, offset: 389, length: 2, content: 沈約, SBCK: 郷宗慕之又曰臧榮緒東莞莒人也少􅀌躬自灌園以供􅀕祀母喪洒掃堂宇置筵席朔望輒拜薦焉甘珎未常先食純好學括東西晉爲一紀録志傳一百一十卷隱居京口教授齊髙帝爲楊州刺史徴榮緒爲主簿不到建元中司徒禇彦囬啓髙帝稱􅄒其羙以祕閣榮緒謂人曰昔宫尚奉丹書武王致齋降位李釋教誡並有禮敬之儀因甄明至道乃著拜五經序論常以宣尼庚子日生其日陳五經拜之自號披􅄄先生又以飲酒亂德言常爲誡永明六年卒􅀄榮緒與􅀜康之俱隱在京口時號爲二隱又曰呉苞字天蓋濮陽鄄城人也儒學善三禮及老莊}
