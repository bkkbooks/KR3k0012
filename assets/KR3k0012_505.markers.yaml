  - {type: variant, offset: 436, length: 0, content: '', WYG: 也太康孫􅃡為潯陽太守落日逍遥渚際見一輕舟凌波隠顯俄而漁父至神韻瀟洒垂綸長嘯緬甚異之乃問有魚賣乎漁父笑而答曰其釣非釣寧賣魚者耶􅃡忿怪焉遂褰裳涉水謂曰竊觀先生有道者也終朝鼔枻良亦勞止吾聞黄金白璧重利也駟馬髙盖榮勢也今方王道文明守在海外隱淪之士靡然向風子胡}
