  - {type: variant, offset: 735, length: 173, content: 有蚿蟲聲清長而形醜素乃為蚿賦以自況又曰戴顒字仲若譙郡銍人也父逵兄并隱遁有高名顒年六十遭父憂幾於毀滅因此長抱羸患又不仕復修其業父善琴書顒並傳之凡諸音律皆能揮手會稽剡縣多名山故世居剡下顒及兄勃並受琴於父父沒所傳之聲不忍復奏各造新弄桐廬縣又多名山兄弟復共遊之因留居止以桐廬僻遠難以養疾乃出居吳下吳下士人共為築室乃述莊周大旨著逍遙論太祖元嘉初徵散騎常侍並, SBCK: 舉秀才}
