  - {type: variant, offset: 704, length: 2, content: 王素, SBCK: 顧歡字景怡呉興塩官人也家丗寒賤父祖並爲農歡獨好學年六七􅀊知推六甲家貧父使田中駈雀歡作黄雀賦而歸雀食稻過半父怒欲撻之見賦乃止郷中有學舎歡貧無以受業於舎壁後􅀝聽無遺忘者夕則燃松節讀書或燃糠自昭及長篤志不倦聞呉興東遷邵玄之傳五經文旬假爲書師從之受業同郡顧凱之臨縣見而異之遣諸子與逰從豫章雷次宗諮玄儒諸義母亡水漿不入口廬于墓側遂隱不仕於剡天台山開館聚徒受業諸生常近百人歡早􅀌讀詩至哀哀父母生我劬勞輙執書慟哭由是受學者廢蓼莪篇不復講焉又曰蔡㑹}
  - {type: page-break, offset: 704, content: '', id: KR3k0012_SBCK_505-4a}
  - {type: variant, offset: 704, length: 2, content: 王素, krp: 顧歡字景怡呉興塩官人也家丗寒賤父祖並爲農歡獨好學年六七歲知推六甲家貧父使田中駈雀歡作黄雀賦而歸雀食稻過半父怒欲撻之見賦乃止郷中有學舎歡貧無以受業於舎壁後倚聽無遺忘者夕則燃松節讀書或燃糠自昭及長篤志不倦聞呉興東遷邵玄之傳五經文旬假爲書師從之受業同郡顧凱之臨縣見而異之遣諸子與逰從豫章雷次宗諮玄儒諸義母亡水漿不入口廬于墓側遂隱不仕於剡天台山開館聚徒受業諸生常近百人歡早孤讀詩至哀哀父母生我劬勞輙執書慟哭由是受學者廢蓼莪篇不復講焉又曰蔡㑹}
  - {type: variant, offset: 708, length: 1, content: 業, SBCK: 明陳留人清玩不與俗人交李撝謂江斆曰古人稱安貧清白曰夷􅄺而不緇曰白至如蔡休明者可不謂之夷白乎又曰徐伯珍字文楚東陽太末人也少􅀌貧無紙常以竹葉箭􅀂甘蔗及地上學書山水􅁀出漂溺宅舎村隣皆奔走伯珍累床而坐講書不輟叔父璠之與顔延之友善還祛䝉山立精舎講授伯珍徃從學積十年究尋經史逰學者多依之太守琅邪王曇生呉郡張淹並加禮辟伯珍應召便退如此者凡十二焉如釋氏老莊兼明道術歳常旱伯珍筮之如期而雨舉動有禮過曲水之下趍而避早䘮妻晩不復重娶自此曽參宅南九里有山伯珎移居之階户之間木生皆連理門前梓樹一年便合抱白雀一􅀟栖其户牖論者以爲隠徳之感也又曰沈麟士字雲禎呉興武康人也父䖍之爲樂安令麟士㓜而俊敏年七歳聽叔父岳言玄賔散言無所遣失岳撫其肩曰若斯文不絶其爾乎及長愽通經史有髙尚之志親亡居䘮盡禮服闋忌日輙涕泣彌旬居貧織簾誦書口手不息郷里號爲織簾先生常行路隣人認其所着屐麟士曰是郷屐耶即跣而返隣人得屐送前者還之麟士􅀏而受之宋文帝令何尚之抄撰五經訪舉學士縣以麟士應選不得巳至都尚之􅀷相接及去尚之謂子偃曰山藪固多竒士沈麟士黄叔度之流也汝師之麟士常苦無書因遊都下歴觀四部畢乃歎曰古人亦何人哉少時稱疾歸郷不與人物通或勸之仕荅曰魚懸獸檻天下一契聖人玄悟所以每履􅁻先吾誠未能景行坐忘何能不希企日損乃作􅀇散賦以絶丗隱居呉差山講經從學之士數百人各管屋宇依止其側時爲之語曰呉差山中有賢士開門教授居成市又曰諸葛璩字㓜玟}
