  - {type: variant, offset: 2750, length: 1, content: 崔, WYG: 其室雖邇其人何逺自是聞風者莫不歛袵望塵而息也又曰陶𢎞景字通明丹陽人生十嵗讀葛洪神仙𫝊曰仰青雲覩白日不覺為逺齊髙祖作相引為侍讀永明初脱朝服掛神武門上表辭禄詔乃許之居句容曲上自號華陽隠居武帝即位有吉凶征討大事皆使咨問時人號為山中宰相預知梁祚覆沒乃製詩曰夷甫任散誕平叔坐論空豈知昭陽殿遂作單于宫及侯景傾陷簒位果在昭陽殿皆如其言大同初卒八十五顔色不變屋中有異香氣累日氛氲諡貞白先生後有詩方枕中術及本草又曰沈顗吳興人也性有至介常慕黄叔度徐孺子之為人每獨處一室罕見其面從叔彀貴顯當朝每還其賔客迎送填咽顗送迎不出城彀乃歎曰吾乃今知貴不如賤也又曰何㸃字士哲廬江人也㸃雖不出入城府而遨遊於外不簮不帶駕柴車躡草履隨心所適致醉而歸士大夫多慕送之時人謂之通隠後周書曰韋夐字敬逺孝寛之兄也志尚夷簡淡於榮利太祖經畧王業側席求賢備禮辟之終不能起彌加敬重世宗即位禮遇逾厚勅有司日給河東酒一斛號曰逍遥}
