  - {type: variant, offset: 15, length: 3, content: 少孤少, SBCK: 元璩呉都錢塘人也年十八父爲婚婦入前門伯玉從後門出遂徃剡居瀑布山時人比之王仲都在山三十餘年隔絶人物王僧逹爲呉郡苦禮致之伯玉不得巳停郡信􅀫才交數言}
  - {type: variant, offset: 15, length: 1, content: 少, WYG: 元璩吳郡錢塘人也年十八父為婚婦入前門伯玉從後門出遂徃剡居瀑布山時人比之王仲都在山三十餘年隔絶人物王僧達為吳郡備禮致之伯玉不得已停郡信宿纔交數言而退寧朔將軍丘珍孫與僧達書曰聞禇先生出居貴館此子滅影雲棲不事王侯抗髙不食有年載矣自非折節好士何以致之望其還策之日蹔紆清塵亦願助為轡答曰禇先生従白雲逰舊矣此子索然唯朋松石介}
