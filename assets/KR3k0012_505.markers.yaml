  - {type: variant, offset: 1301, length: 212, content: 同行荅曰凡祖離送別必在有情下官與殷風馬不接無緣扈從謙貴其言隨兄敬弘之安成郡弘之解職同行家在會稽上虞敬弘常解貂裘與之即著以採藥性好釣上虞江有一處名三石頭弘之裳垂綸於此經過者不識之或問漁師得魚賣否弘之曰亦自不得得亦不賣日夕載魚入至上虞郭經親故門各以一兩頭置門內而去始寧沈州有佳山水弘之又依巖築室謝靈運顏延之並相欽重又曰劉凝之字志安小名長年慕老萊嚴子陵為人推家財與弟及兄子立屋於野外非其力不食州里重其仁德禮辟並不受妻梁州刺史郭鈐女, WYG: 感}
