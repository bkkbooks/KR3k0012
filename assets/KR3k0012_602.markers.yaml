  - {type: punctuation, offset: 69, content: 《, id: KR3k0012_CHANT_602-bkkpn28}
  - {type: variant, offset: 69, length: 5, content: 離騷左丘失, SBCK: 其所聞爲十二記八覽六論合十餘萬言名爲吕氏春秋􅁀之咸陽市門懸千金於其上有能増損一字者與之金時人無能増損􅀃者以爲非不能也盖憚相國畏其􅀔耳然其書以道德爲准的以無爲爲紀綱以忠義爲品式以公方爲撿格與孟軻孫卿相表裏也列仙傳曰李耳字伯陽陳人也生於殷時爲周柱下史好養精氣貴無名接而不施轉爲守藏吏積年乃知其真人也仲尼師之去入大秦過􅀜令尹喜待迎之彊使著書作道德上下經二卷鶡冠子或曰楚人隱居衣􅁦履穿以鶡爲冠莫測其名因服成號著書言道家事馮煖常師事之西京雜記曰淮南王著鴻列二十篇鴻大也烈}
  - {type: page-break, offset: 69, content: '', id: KR3k0012_SBCK_602-1b}
  - {type: variant, offset: 69, length: 5, content: 離騷左丘失, WYG: 其所聞為十二記八覧六論合十餘萬言名為吕氏春秋暴之咸陽市門懸千金於其上有能增損一字者與之金時人無能增損說者以為非不能也盖憚相國畏其勢耳然其書以道德為凖的以無為為紀綱忠義為品式以公方為檢式與孟軻孫卿相表裏也列仙傳曰李耳字伯陽陳人也生于殷時為周柱下史好養精氣貴無名接而不施轉為守藏吏積年乃知其真人也仲尼師之去入大秦過闗令尹喜待迎之疆使著書作道德經上下二卷鶡冠子或曰楚人隠居衣敝履穿以鶡為冠莫知其名因服成號著書言道家事西京雜記曰淮南王著鴻烈二十篇鴻大也烈}
