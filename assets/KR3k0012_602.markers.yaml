  - {type: variant, offset: 2212, length: 219, content: 堪吏職請脩國史上許之拜著作郎國朝傳記曰虞世南之為祕書也於省後堂集群書中事可為文用者號為北堂書鈔今北堂猶存而書益行於代唐書曰太宗以特進魏徵所撰類禮賜皇太子及諸王并藏本於祕府初徵以禮經遭秦滅學戴聖所編條流不次乃刪其所記以類相從為五十篇合二十卷太宗善之賜物一千段又曰太宗閱陸德明經典音義美其弘益學者歎曰德明雖亡此書可傳習因賜其家布帛百疋又曰高宗時太子賢敗太子洗馬劉訥言給事中唐之奇並坐私附庶人配流嶺外訥言博學有文詞以漢書授賢賢甚重之嘗撰續棑諧集, SBCK: 絶年}
