  - {type: variant, offset: 1801, length: 290, content: 謂深得文理常陳諸几案後周書曰齊王憲嘗以古今兵書繁廣難求指要乃自列定為五篇表陳高祖覽而稱善陳書曰陸瓊字伯玉吳人初瓊父雲公奉武帝勑撰嘉瑞記瓊述其旨而續焉三國典略曰齊主如晉陽尚書右僕射祖珽等上言昔魏文帝命韋誕諸人撰著皇覽包括群言區分義別陛下聽覽餘日眷言緗素究蘭臺之籍窮策府之文以為觀書貴博博而貴要省日兼功期於易簡前者脩文殿令臣等討尋舊典撰錄斯書謹罄庸短登即編次放天地之數為五十部象乾坤之策成三百六十卷昔漢世諸儒集論經傳奏之白虎閣因名白虎通竊緣斯義仍曰脩文殿御覽今繕寫已畢并目上呈伏願天鑒賜垂裁覽齊主命付史閣初齊武成令宋士素錄古來帝王言行要事三卷名為御覽置於齊主巾箱陽休之創意取芳林遍略加, WYG: 崔鴻}
