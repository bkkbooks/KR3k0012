  - {type: variant, offset: 1023, length: 399, content: 高名著欲令書傳於後是以假託帝曰古來亦有是顧謂公卿曰父子證明足以為審自今已後可無復疑又曰王長文字德獻廣漢郪人也少以才學知名而放蕩不羈州府辟命皆不就州辟別駕乃微服竊出舉州莫知之後於成都市中蹲踞齧胡餅剌史知其不出屈禮遣之閉門自守不交人事著書四卷擬易名曰通玄經有文言卦象可用卜筮時人比之揚雄太玄同郡馬秀曰揚雄作太玄唯桓譚以為必傳後世晚遭陸績玄道遂明長文通玄經未遭陸績君山耳又曰王隱字處叔太興初典章稍備乃召隱及郭璞俱為著作郎令撰晉史著作郎虞預私撰晉書而生長東南不知中朝事數訪於隱并借隱所著書竊寫之所聞漸廣是後更嫉隱形于言色預既豪族交結權貴共為朋黨以斥隱竟以謗免黜歸于家貧旡資用書遂不就乃依征西將軍庾亮供其紙筆書乃得成詣闕上之隱雖好著述而文辭鄙拙蕪舛不倫其書次弟可觀者皆其父所撰文體混雜義不可解者隱之作也宋書曰王淮之字元魯晉尚書僕射彬玄孫也曾祖彪之位尚書令博聞多見練悉朝儀自是家世並記江左舊事緘之有青箱世謂之王, SBCK: 魏}
