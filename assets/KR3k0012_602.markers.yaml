  - {type: variant, offset: 2440, length: 5, content: 樂及賢廢宮, WYG: 狎南史曰張率字士簡性寛雅年十二能屬文常日限為詩一篇或數日不作則追補之稍進作賦頌至年十六向作二千餘首有虞訥者見而詆之率乃一旦焚毁更為詩示焉託云沈約訥便向之嗟稱無字不善率曰此吾作也訥慚而退南史曰劉孝綽本名冉㓜聦敏七歲能屬文舅齊}
