  - {type: variant, offset: 119, length: 0, content: '', SBCK: 又曰董仲舒夢蛟龍入懷乃作春秋繁露又曰􅁑洪家世有劉子駿漢言百卷首尾無題目但以甲乙丙丁記其卷數先父􅀓之劉歆欲撰書編録漢事􅀋未得搆而亡故書無宗本止雜記而前後無事􅀋後好事者以意次第之始甲之癸爲十帙帙十卷合百卷洪家有小同異又曰楊雄著太玄經夢吐白鳯皇集其頂上而㓕楊雄傳賛曰雄好古而樂道其志欲窮文辭成名於後丗以爲經莫大於易於是故作太玄傳莫大於論語故作法言桓譚新論曰楊子雲才智聞逹卓絶於衆漢興巳來未有此也國師子駿曰何以言之荅曰通才著書以百數唯太史公爲廣大餘皆藂殘小論不能比之子雲所造法言太􅀇也人貴所聞賤所見故輕易之􅀂遇上好事必以太􅀇次五經也抱朴子曰王充作論衡北方都未有得之者蔡伯喈嘗到江東得之歎其文髙度越諸子及還中國諸儒覺其談論更逺嫌得異書或搜求至隱處果得論衡捉取數卷將去伯喈曰唯我與尓共之勿廣也又曰盧生問曰蔡伯喈張平子才足著子書正恐言逺旨深丗人不解故不著也余難云􅀂如來言子雲亦不應作太􅀇經也瓦甂木柸比門所饒金觴玉爵萬家無一也又曰孔鄭之門耳聽口受者滅絶而託竹素者爲丗寳也又曰余家遭火典籍蕩盡困於無力不能更得故抄掇衆書撮其精要用功少而所収多思不煩而所見博或謂洪曰流無源則乾條離株則悴吾恐玉屑盈車不如金璧余荅曰詠圎流者採珠而􅂢蚌登荆嶺者拾五而棄石余之抄畧譬猶擿翡翠之藻羽脫犀象之角牙又曰􅄞君道問二陸優劣抱扑子曰朱淮南嘗言二陸重規沓矩無多少也一手之中不無鈍利方之它人􅀂江漢之與潢潦陸子十篇誠爲快書者其辭之冨者雖覃思不可損也其理之約者雖潜筆腐豪不可益也陸平原作子書未成吾門生有在陸君軍中嘗在左右􅀃陸君臨亡曰窮通時也遭遇命也古人貴立言以爲不杇吾所作子書未成以此爲恨耳余謂仲長統作昌言未竟而亡後董襲撰次之桓譚新論未備而終班固謂其成琴道今才士何不賛成陸公子書頴容春秋例曰著述之事前有司馬遷楊雄後有鄭衆班固近即馬融鄭􅀇其所著作違義正者畧舉一兩事以言之遷史記不識畢公文王之子而言與周同姓楊雄法言不識六十四卦云所從來尚矣論衡曰􅀞工好􅀞上丗人不􅀞秦漢士者尊古卑今楊子云作太􅀇經法言張伯松不肯一觀與並肩故賤其言也􅀂生周丗則爲金匱}
