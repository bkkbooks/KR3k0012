  - {type: variant, offset: 1586, length: 2, content: 重復, krp: 足聊與温涼拂衣而出祖思固留之曰當與君論天人之際何遽而反乎叟對曰論天人}
  - {type: variant, offset: 1589, length: 3, content: 千字韻, krp: 其亡乆矣與君相知何夸言若是也遂不坐}
