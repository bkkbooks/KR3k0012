  - {type: variant, offset: 2442, length: 216, content: 賢廢宮中搜得之上怒曰經典誘人猶恐不能遷善排諧鄙說是導之以邪也遂徙于震州而死又曰天后聖曆中上以御覽及文思博要等書聚事多未周備令麟臺監張昌宗與麟臺少監李嶠廣召文學之士給事中徐彥伯水部郎中員半千等二十六人增損文思博要勒成一千三百卷於舊書外更加佛教道教及親屬姓氏方域等部至是畢功上親製名曰三教珠英彥伯已下改官加級賜物又曰天后自咸亨已後嘗召文學之士周思茂範履冰等入禁中令撰玄鑒百卷青宮要紀少陽政範各三十卷孝子傳及列女傳維城典訓鳳樓新誡各二十卷, SBCK: ''}
