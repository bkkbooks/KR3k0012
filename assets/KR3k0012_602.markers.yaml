  - {type: variant, offset: 618, length: 201, content: 京房夏侯勝等傳寶父先有所寵侍婢母甚妒忌及亡母乃生埋婢於墓中寶兄弟年少不知審也後十餘年母喪開墓而婢伏棺如生載還經日乃蘇言其父常取飲食與之恩情如生家中吉凶輒語之考校悉驗地中亦不覺為惡既而嫁之生子又寶兄嘗病氣絕積日不冷後遂悟見天地間鬼神事如夢覺不自知死寶以此遂撰集古今神祇靈異人物變化名為搜神記凡三十卷以示劉惔惔曰卿可謂鬼之董狐也干寶表曰臣前聊欲撰記古今怪異非常之事會聚散逸使同一貫博訪知之者片紙殘鈌事事各畢, SBCK: 疾門}
