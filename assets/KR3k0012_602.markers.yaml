  - {type: variant, offset: 471, length: 5, content: 說始詭異終, SBCK: 大牢之滋味故服􅗽絺之凉者不知盛暑之鬱燠襲貂狐之煖者不知至寒之悽愴予之術業豈賔客之能闚斯盖以筳撞鍾以蠡測海也予常切齒淮南不韋之書謂爲賔遊所製毎至著述之間不令賔客闚之也又曰桓譚新論華譚又}
