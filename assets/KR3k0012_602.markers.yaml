  - {type: variant, offset: 119, length: 0, content: '', WYG: 又曰董仲舒夢蛟龍入懐乃作春秋繁露又曰葛洪家世有劉子駿漢言百卷首尾無題名但以甲乙丙丁記其卷數先父傳之歆欲撰書編錄漢事類未得構而亡故書無宗本止雜記而前後無事類後好事者以意次第之始甲終癸為十帙十卷合百卷洪家有小同異也又曰揚雄著太𤣥經夢吐白鳯凰集其頂上揚雄傳賛曰雄好古而樂道其志欲窮文辭成名于後世以為經莫大于易是故作太𤣥傳莫大于論語故作法言桓譚新論曰揚子雲才智聞道卓絶于衆漢興以來未有此也國師子駿曰何以言之答曰通才著書以百數惟太史公為廣大餘皆藂殘小論不能比之子雲所造法言太𤣥經也人貴所聞賤所見也故輕易之若遇上好事必以太𤣥次五經也抱朴子曰王充作論衡北方郡未有得之者蔡伯喈常到江東得之嘆其文高度越諸子及還中國諸儒覺其談論更逺嫌得異書或捜求至隱處果得論衡捉取數卷將去伯喈曰惟吾與汝共之勿廣也又曰盧生問曰蔡伯喈張平子才足著書正恐言逺㫖深世人不解故不著也余難云如果言子雲亦不應作太𤣥經也瓦甒木杯比門所饒金觴玉爵萬家无一也又曰孔鄭之門耳聽口受者滅絶而托竹素者為世寳也又曰余家遭火典籍蕩盡困于无力不能更得故抄撰衆書撮其精要用工少而所收多思不煩而所見博或謂洪曰流无源則乾條離株則悴吾恐玉屑盈車不如金璧余答曰詠源流者採珠而捐蚌登荆領者拾玉而棄石余之抄畧譬猶摘翡翠之藻羽脫犀象之角牙又曰稽君道問二陸優劣抱朴子曰朱淮南嘗言二陸重規沓矩無多少也一手之中不無鈍利方之他人若江漢之與潢潦陸子十篇誠為快書者其詞之富者雖覃思不得損也其理之約者雖淺筆腐毫不可益也陸平原作子書未成吾門生有在陸君軍中常在左右説陸君臨亡曰窮通時也遭遇命也古人貴立言以為不朽吾所作子書未成以此為恨耳余謂仲長統作昌言未竟而亡後董襲撰次之桓譚新論未備而終班固謂其成琴道今才士何不賛成陸公子書頴容春秋例曰著述之事前有司馬遷揚雄後有鄭衆班固近即馬融鄭𤣥其所著作違義正者畧舉一兩事以言之遷史記不識畢公文王之子而言與周同姓揚雄法言不識六十四卦云所從來尚矣論衡曰畫工好畫上世人不畫秦漢士者尊古卑今揚子雲作太𤣥經法言張伯松不肯一觀與並肩故賤其言也若生周世則為金匱}
