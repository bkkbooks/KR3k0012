  - {type: variant, offset: 2481, length: 9, content: 天后聖曆中上以御覽, WYG: 謝貞八歲嘗為春日閑居詩從舅王筠奇之謂所親曰至如風定花猶落乃追步惠連矣年十三尤善左氏春秋工草隸蟲篆後周書曰李旭㓜年已解屬文有聲洛下時洛陽剏置明堂旭年十歲數為明堂賦雖優洽未足才制可觀見者咸曰有家風矣三國典畧曰蕭大心字仁恕小名英童與大器同年十歲並能屬文嘗雪朝入見梁武帝詠雪令二童各和並援筆立成梁書曰栁惲早有令名少工篇什為詩云亭臯木葉下隴首秋雲飛瑯琊王融見而嗟賞因書齋壁}
