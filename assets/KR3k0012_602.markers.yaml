  - {type: variant, offset: 3001, length: 552, content: 十卷奏之旋拜諫議大夫依前侍講學士將脩憲宗實錄復命兼充史職又曰貞元十一年左僕射平章事賈躭進海內華夷圖及古今郡國縣道四十卷圖廣三丈率以寸折成百里權德輿作序又曰韋處厚為中書舍人侍講學士時穆宗荒恣不親政務既居納誨之地宜有以啟導情虛乃銓擇經義雅言以類相從為二十卷謂之六經法言獻之錫以繒帛又曰唐次貶開州剌史在巴峽間十餘年不獲進用西川節度使韋皋抗表請為副使德宗密諭皋令罷之次滯蠻荒孤心抑鬱怨謗所積孰與申明乃採自古忠臣賢士遭罹讒謗放逐遂至殺身而君猶不悟其書三篇謂之辨謗略上之德宗省之猶怒謂左右曰唐次乃以吾為昏主何自諭如此次卒章武帝明哲嫉惡尤惡人朋比傾陷嘗閱書禁中得次所上書三篇覽而善之謂學士沈傳師曰唐次所集辨謗之書實君人者時宜觀之朕思古書中多有此事次編錄未盡卿家傳史學以類例廣之傳師奉詔與令狐楚杜元穎等分功脩續廣為十卷號元和辨謗略又曰鄭處誨方雅好古勤於著述撰集至多為校書郎時撰次明皇雜錄三篇行於世又曰裴潾充集賢殿學士集歷代文章續梁昭明太子文選成三十卷目曰大和通選并音義目一卷上之當時文士非素與潾遊者其文章少在其選時論薄之又曰柳玭嘗著書誡其子弟曰夫門地高者可畏不可恃可畏者立身行己一事有墜先訓則罪大於它人雖生可以茍取名位死何以見祖先於地下不可恃者門高則自驕族盛則人之所嫉實蓺懿行人未必信纖瑕微累十手爭指矣又數其五條詞多不載, SBCK: ''}
