  - {type: variant, offset: 1572, length: 4, content: 武帝取鍾, SBCK: 胡叟入長安觀風化隱匿名行懼人見知時京兆韋祖思少閱典墳多蔑時彦知叟至召而見之祖思習常待叟不足聊與温涼拂衣而出祖思固留之曰當與君論天人之際何遽而反乎叟對曰論天人者其亡乆矣與君相知何夸言􅀂是也遂不坐而去至主人家賦韋杜二族一􅀫而成時年十有八矣具述前載無違舊美叙中丗有恊時事而末及鄙黷人皆竒其才思其筆丗猶傳誦之以爲􅀏狎齊書曰張率字士簡性寛雅年十二能屬文常日限爲詩一篇或數日不作則追􅀘之稍進作賦頌至年十六向作二千餘首有虞訥者見而詆之率乃一旦焚毀更爲詩示焉託云沈約訥便向之嗟稱無字不善率曰此吾作也訥慙而退南史曰劉孝綽本名冉㓜聦敏七歳能屬文舅齊中書郎}
  - {type: page-break, offset: 1572, content: '', id: KR3k0012_SBCK_602-6b}
  - {type: variant, offset: 1572, length: 13, content: 武帝取鍾王真跡授周興嗣令選, krp: 胡叟入長安觀風化隱匿名行懼人見知時京兆韋祖思少閱典墳多蔑時彦知叟至召而見之祖思習常待叟}
  - {type: variant, offset: 1577, length: 13, content: 真跡授周興嗣令選不重復者千, SBCK: 融深賞異之與同載以適親友號曰神童融毎曰天下文章􅀂無我當歸阿士阿士即孝綽小}
