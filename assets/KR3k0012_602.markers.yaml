  - {type: variant, offset: 477, length: 0, content: '', SBCK: 新論楊雄有太􅀇經楊泉有太元經談此多誤動形色或云桓譚有新論何處復有華譚楊子但有太􅀇經何處復聞太元也皆由不學使之然矣隋大業拾遺曰大業之􅀄勑内史舎人竇威起居舎人崔祖濬及龍川賛治侯偉等三十餘人撰區宇圖志一部五百餘卷新成奏之又著丹陽郡風俗乃見以呉人爲東夷度越禮義及屬辭比事全失脩撰之意帝不恱遣内史舎人柳逵宣勑責威等云昔漢末三方鼎立大呉之國以稱人物故晉武帝云江東之有呉㑹猶江西之有汝潁衣冠人物千載一時及永嘉之末華夏衣纓盡過江表此乃天下之名都自平陳之後碩學通儒文人才子莫非彼至尓等著其風俗乃爲東夷之人度越禮義於尓等可乎然於著術之體又無次序各賜杖一頓即日勑追祕書學士十八人脩十郡志内史侍郎虞丗基惣檢於是丗基先令學士各序一郡風俗擬奏請體式學士著作佐郎虞綽序京兆郡風俗學士宣惠尉陵敬序河南郡風俗學士宣德郎杜寳序呉郡風俗四人先成以簡丗基丗基曰虞綽序京兆文}
  - {type: page-break, offset: 477, content: '', id: KR3k0012_SBCK_602-5a}
  - {type: variant, offset: 477, length: 0, content: '', WYG: 新論揚雄有太𤣥經楊泉有太元經談此多悞動形象或曰桓譚有新論何處復有華譚揚子但有太𤣥經何處復有太元經也皆由不學使之然矣隋大業拾遺曰大業之初勅内史舎人竇威起居舎人崔祖濬及龍川賛治侯偉等三十餘人撰區宇圖志一部五百餘卷新成奏之又著丹陽郡風俗乃見以呉人為東夷度越禮義及屬辭比事全失修撰之意帝不恱遣内史舍人栁逵宣敕責威等云昔漢末三分鼎立大呉之國以稱人物故晉武帝云江東之有吳㑹猶江西之有汝頴衣冠人物千載一時及永嘉之末華夏衣纓盡過江表此乃天下之名都自陳平之後碩學通儒文人才子莫非彼土爾等著其風俗乃為東夷之人度越禮義於爾等可乎然于著述之體又无次序各賜杖一頓即日敕追秘書學士十八人修十郡志内史侍郎虞世基緫檢于是世基先命學士各序一郡風俗奏擬請體式學士著作佐郎虞綽序京兆郡風俗學士宣惠尉陵敬序河南郡風俗學士宣德郎杜寳序呉郡風俗四人先成以簡世基世基曰虞綽序京兆文}
