  - {type: variant, offset: 2183, length: 0, content: '', WYG: 胡叟入長安觀風化隠匿名行懼人見知時京兆韋祖思少閱典墳多蔑時彦知叟至召而見之祖思習常待叟不足聊與叙溫涼拂衣而出祖思固留之曰當與君論天人之際何遽而反乎叟對曰論天人者亡乆矣與君相知何夸言若是也遂不坐而去至主人家賦韋}
