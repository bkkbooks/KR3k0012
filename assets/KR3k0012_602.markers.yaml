  - {type: variant, offset: 133, length: 11, content: 喜弋獵狗馬馳騁招致賓客, SBCK: 在多以爲龍少魚衆少者爲神充荅曰文衆勝寡財冨愈貧丗無一分吾有百篇人無一字吾有萬言孰爲賢也充仕數不遇以章和二年徙家避難揚州丹陽入爲治中才小任大職在刺劾笔札之思歷年寢廢章和三年罷州還年漸七十時可懸輿髪白齒落日月逾邁貧無供養志不娯快乃作養生之書凢十六篇論衡造於永平末定於建􅀄之年耳新論曰余爲新論術辨古今亦欲興治也何異春秋褒貶耶今有疑者所謂蚌異蛤二五爲非十也譚見劉向新序陸賈新語乃爲新論莊周寓言乃云堯問孔子淮南子云共工争帝地維絶亦皆爲妄作故丗人多云短書不可用然論天間莫明於聖人莊周等雖虚誕故當採其善何云盡弃耶風俗通應邵撰序云風者天氣有寒煖地形有隂陽泉水有美惡草木有剛柔俗者含血之􅀋象而生之百里不同風千里不同俗周􅁗嘗以月遣輶軒使采異代}
