  - {type: variant, offset: 1591, length: 30, content: 韻而文之興嗣一宿即上鬢髮皆白大被賞遇後興嗣目疾武帝親為之合藥, SBCK: 也}
  - {type: variant, offset: 1593, length: 4, content: 文之興嗣, krp: 去至主人家賦韋杜二族}
  - {type: variant, offset: 1594, length: 205, content: 之興嗣一宿即上鬢髮皆白大被賞遇後興嗣目疾武帝親為之合藥又曰劉勰字彥和自齊入梁撰文心雕龍五十篇論古今文體其序略云予齒在逾立嘗夜夢執丹漆之禮器隨仲尼而南行寤而喜曰大哉聖人之難見也乃小子之垂夢歟自生靈已來未有如夫子者也敷讚聖旨莫若注經而馬鄭諸儒弘之已精唯文章之用實經典之條枝五禮資之以成文六典因之以致用由是搦筆和墨乃始論文其為文用四十九篇而已既成未為時流所稱勰欲取定於沈約旡由自達乃負書候約於車前狀若欲貨鬻者約取讀大, WYG: 鄉里}
