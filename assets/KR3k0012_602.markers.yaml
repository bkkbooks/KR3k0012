  - {type: variant, offset: 2598, length: 0, content: '', WYG: 太祖文帝諱綱字世纉六歲能属文高祖驚其早就不之信也及于御前面試辭采甚美高祖嘆曰此子吾家之東阿也又曰丘遲字希範年八歲便屬文父靈鞠有才名常謂氣骨似我徴士何㸃見而異之又曰庾肩吾八歲能賦詩特為兄於陵所友愛又曰何遜字仲言八嵗能賦詩弱冠州舉秀才南鄉范雲見對䇿大相稱賞謂所親曰頃觀文人質則過儒麗則傷俗其能含清濁中今古見之何生矣沈約亦愛其文又曰陸從典字由儀㓜聦敏年八嵗讀沈約集見迴文妍麗援筆擬之便有佳致十二作栁賦其辭甚美從父瑜特所賞愛隋書曰李徳林㓜聦敏年數嵗誦左思蜀都賦十餘日便度高隆之見而嗟歎遍告朝士云若假其年必為}
