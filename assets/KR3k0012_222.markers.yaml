  - {type: variant, offset: 379, length: 333, content: 侍講禁中又輿服志曰禁門曰黃闥以中人主之故號曰黃令然則黃門郎給事黃闥之內故曰黃門郎本既無員於此各置六人也又百官志曰給事黃門侍郎六百石無員侍從左右給事中使開通中外諸王朝見於殿上引王就位獻帝起居注曰自誅黃門後侍中侍郎出入禁中機事頗露由是王允乃奏侍中黃門不得出入不通賓客自此始也漢官曰尚書郎奏事於明光殿省中皆胡粉塗璧其邊以丹漆地故曰丹墀尚書郎含雞舌香伏其下奏事黃門侍郎對揖跪受漢舊儀曰黃門郎屬黃門令日暮入對青瑣門拜名曰夕郎魏志曰王粲字仲宣山陽人年十七司徒辟詔除黃門侍郎以西京擾亂皆不就又曰夏侯玄字太初少知名弱冠為黃門侍郎嘗進見與皇后弟毛曾並坐玄恥之不悅形之於色明帝恨之左遷為羽林監又曰杜恕字矜伯為散騎黃門侍郎恕推誠以質不治飭在朝不結交每政有得失常引綱維以正言於是侍中辛毗等器, SBCK: ''}
