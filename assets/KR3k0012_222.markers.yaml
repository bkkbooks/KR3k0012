  - {type: variant, offset: 1000, length: 6, content: 孫皓每宴會群, SBCK: 郄髙卿爲中書舎人處事不回爲宰相元載所忌魚朝恩署牙將李琮爲兩街功徳使琮􅁀撗於銀臺門毀辱京兆尹崔昭髙卿立詣元載抗論以爲國耻請速論奏載不從髙卿遂以疾辭以前中書舎人居東洛凢十年自號伊川田父清名髙節稱於天下又曰建中三年詔中書舎人分署尚書六曹復舊制也又曰髙郢掌誥累年家無制草或謂曰人皆留制集公焚之何也曰王言不可存私家時人重其愼宻又穆宗詔曰中書舎人故事分押六司佐宰}
