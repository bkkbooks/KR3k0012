  - {type: variant, offset: 3864, length: 3, content: 冗從皆, SBCK: 忠切有文貞之風故不循月限授卿此官又謂之曰卿家有何舊書詔對曰比多失墜唯簮笏見在上令進來鄭覃曰在人不在笏上曰鄭覃不㑹我意此即甘棠之義非在笏而巳又曰魏謩文宗時爲起居舎人紫宸入閤遣中使取謩起居注欲視之謩執奏曰自古置史官書事以明鑒誡陛下但爲善事勿畏臣不書如陛下所行錯忤臣縱不書天下人書之臣以陛下爲文皇帝陛下比臣如禇遂良帝又曰我嘗取觀之謩曰由史官不守職分臣豈敢䧟陛下爲非法陛下一覽之後自此書事湏有廻避如此善惡不直非史也遺後代何以取信乃止又曰張次宗有文學稽古厲行開成中爲起居舎人文宗復故事每入閤左右史執筆立于螭頭之下宰相奏事得以備録宰臣旣退上召左右史更質證所奏}
