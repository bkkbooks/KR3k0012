  - {type: variant, offset: 175, length: 178, content: 前拜黃門郎又曰劉向字子政宣帝時以中郎為給事黃門侍郎又曰董賢字聖卿雲陽人為太子舍人賢待漏在殿下為人美麗自喜哀帝望見悅其儀皃識而問之曰是舍人董賢耶因引上與語拜為黃門侍郎東觀漢記曰鄧閶字秀昭遷黃門侍郎于時國家每有災異水旱閶側身暴露憂懼顦顇形於顏色公卿以下咸高尚焉漢興以來為外戚儀表後漢書曰馬防子鉅為常從小侯正月當冠特拜為黃門侍郎肅宗親御章臺下殿陳鼎俎自臨冠之續漢, SBCK: 饋遺北齊}
