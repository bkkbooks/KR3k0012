  - {type: variant, offset: 2230, length: 607, content: 茲鸞渚巳濯鴈行纔出公局奄歸蒿里永言荊樹坐折連枝眷彼恒山空餘一鳥俾遷榮於皂蓋宜襲寵於黃樞給事中六典曰給事中凡百司奏抄侍中審定則先讀而署之以駮正違失凡制勑宣行大事則稱揚德澤褒美功業覆奏而請施行小事則署而頒之凡文武六品以下授職所司奏楊則校其仕歷深淺功狀殿最訪其德行量其才藝若官非其人理失其事則白侍中而退量焉漢儀注曰諸給事中日上朝謁乎尚書奏事分為左右以有事殿中故曰給事中多名儒國親為之掌左右顧問漢書曰給事秦官也至漢因之皆為加官所加或大夫愽士議郎掌顧問應對位次中常侍又曰元帝詔蕭望之傅朕八年可賜爵關內侯給事中後漢書曰鄭眾字仲師以明經拜給事中魏志曰秦朗字元明明帝即位授以內官為給事中每車駕出入朗常隨從時明帝喜發舉數有以輕微而致大辟者朗終不能有所諫止又未嘗進一善人帝亦以是親愛每顧問之多呼其小字阿蘇晉書曰任熙字伯遠立德邈然徵拜給事中晉起居注曰武帝太康七年詔曰郎中張建忠篤履素為江表士大夫所稱宜在中朝其以建為給事中晉武帝詔曰燕王師陳邵清貞廉潔愽通六籍宜在左右以敦儒訓可給事中唐書曰盧粲幽州范陽人也京龍二年遷給事中時節愍太子初立韋庶人以非巳所生深加忌嫉勸中宗下勑令太子却取衛府封物每年以供服用粲駮奏曰皇太子處繼明之重當主鬯之尊歲時服用自可百司供擬又據周官諸應用財器歲終則會唯王及太子應用物並不會此則儲蓄之費咸與王同今與列國諸侯齊衡入封豈所謂憲章在昔垂法將來者也必謂青宮初啟服用所資自當廣支庫物不可長存藩封詔從之又曰盧粲遷給事中時安樂, SBCK: 􅁽}
