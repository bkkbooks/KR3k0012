  - {type: variant, offset: 3831, length: 1, content: 給, krp: 晉武帝時門下啓令史伊羡趙咸爲中書舎人對掌文法勗奏以爲不可起居郎六典曰起居郎掌記天子之法度以修記}
  - {type: variant, offset: 3833, length: 4, content: 中掌侍從, SBCK: 之史凢記事之制以事繫日以日繫月以月繫時以時繫年必書其朔日甲乙以紀曆數典禮文物以考制度遷拜旌賞以勸善誅伐黜免以懲惡季冬則授之于國史焉唐書曰大和九年十二月}
  - {type: variant, offset: 3833, length: 4, content: 中掌侍從, WYG: 之史凡記事之制以事繫日以日繫月以月繫時以時繫年必書其朔日甲乙以紀厯數典禮文物以考制度遷拜旌賞以勸善誅伐黜免以懲惡季冬則授之於國史焉唐書曰太和九年十二月}
