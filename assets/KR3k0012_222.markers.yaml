  - {type: variant, offset: 356, length: 2, content: 悅字, krp: 士遜世祖時爲中書舎人狀皃甚醜以文辭見用曽有事湏奏值世祖在後庭因左右傳通者不得士遜姓名乃云醜舎人世祖曰必士遜也看封題果是内人莫不忻笑又曰顔之推天保末從顯祖至天池以爲中書舎人令中書郎叚孝信將勑書出示之推之推營外飲酒孝信還以狀言顯祖仍曰且停由是遂寢北史曰魏収兼中書舎人與温子昇邢子才齊譽世號三才隋書曰虞世基拜内史舎人煬帝即位頋遇彌隆秘書監河東柳頋言博學有才罕所推謝至是與世基相見歎曰海内當共推此一人非吾儕所及也唐書曰貞觀中中書舎人髙季輔上封章曰時巳平矣功巳成矣然而刑典未措者何哉良由謀猷之臣不弘簡易之政臺閣之吏昧於經逺之道執憲者以深刻爲奉公當官者以侵下爲益國未有坦平恕之懷副聖明之旨伏願隨方訓誥使各楊其職人敦朴素俗革澆浮家識孝慈人知廉耻杜其利欲之心載以清淳之化自然家冨國肥禍亂何由而作太宗善之特賜鍾乳一劑曰卿進藥石之言故以藥石報之也又曰顔師古遷中書舎人專掌機宻于時軍國多務凢有制誥皆成其手師古逹於政理冊奏之工時無及者又曰武后天授元年壽春郡王成器兄弟五人𥘉出閤同日受冊有司撰儀注忘載冊文及百竂在列方知闕禮宰臣相頋失色中書舎人王劇立召小史五人各令執筆口授分冩同時湏臾俱畢詞理典贍時人歎伏又曰景龍四年初定内難唯中書舎人蘇頲在太極殿後文詔塡委動以萬計手操口對無毫氂差誤主書韓禮談子陽轉書詔草属謂頲曰乞公稍遟禮等書不及恐手腕將廢又曰楊炎爲中書舎人與常衮並掌綸誥衮長於制書炎善爲德音開元已來言詔制之美者號常楊焉又曰王徽曽祖擇從擇從兄易從天后朝登進士第從弟朋從言從睿宗朝並以進士擢第昆}
