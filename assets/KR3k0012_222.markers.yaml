  - {type: punctuation, offset: 3839, content: ，, id: KR3k0012_CHANT_222-bkkpn995}
  - {type: 'tls:seg', offset: 3839, content: '', id: KR3k0012_CHANT_222-46a.4}
  - {type: variant, offset: 3839, length: 0, content: '', SBCK: 省起居郎賫筆硯及紙於螭頭下記言記事又曰鄭㓪開成中爲起居郎􅀄太和末風俗稍奢文宗恭勤節儉兾革其風宰臣等言曰陛下躬儉節用風俗巳移長􅅂大􅃑漸以减損􅀂更令戚屬絶其侈靡不慮下不從教帝曰此事亦難户曉但去其泰甚自以儉德化之朕聞前時内庫唯二錦􅂁飾以金鳥一􅂁􅀇宗幸温湯時御之一與貴妃當時貴重如此今奢靡豈復貴之邪今冨家往往皆有左街副使張元昌便用金唾壺昨因李訓巳誅之矣時朗執筆螭頭下宰臣退上謂朗曰適所議論卿記録未吾試觀之朗對曰臣執筆所記便名爲史伏准故事帝王不可取觀昔太宗欲覽國史諌議大夫朱子奢云史官所􅄒不隱善惡或主非上智飾非護失見之則致怨所以義不可觀又禇遂良曰今之起居郎古之左右史也記人君言行善惡必書庶幾不爲非法不聞帝王躬自觀史帝曰適來所記}
  - {type: page-break, offset: 3839, content: '', id: KR3k0012_SBCK_222-7a}
  - {type: variant, offset: 3839, length: 0, content: '', WYG: 省起居郎賫筆硯及紙於螭頭下記言記事又曰鄭朗開成中爲起居郎初太和末風俗稍奢文宗恭勤節儉兾革其風宰臣等言曰陛下躬儉節用風俗已移長􅅂大袂漸以减損若更令戚屬絶其侈靡不慮下不從教帝曰此事亦難戸曉但去其太甚自以儉德化之朕聞前時内庫唯二錦袍飾以金烏一袍𤣥宗幸温湯時御之一與貴妃當時貴重如此今奢靡豈復貴之耶今富人往往皆有左街副使張元昌便用金唾壺昨因李訓已誅之矣時朗執筆螭頭下宰臣退上謂朗曰適所議論卿記録未吾試觀之朗對曰臣執筆所記便名爲史伏准故事帝王不可取觀昔太宗欲覽國史諫議大夫朱子奢云史官所述不隱善惡或主非上智飾非䕶失見之則致怨所以義不可觀又褚遂良曰今之起居郎古之左右史也記人君言行善惡必書庶幾不爲非法不聞帝王躬自觀史帝曰適來所記}
  - {type: page-break, offset: 3839, content: '', id: KR3k0012_WYG_222-11a, image: WYG0895/WYG0895-0068a.png}
  - {type: page-break, offset: 3839, content: '', id: KR3k0012_WYG_222-11b, image: WYG0895/WYG0895-0068b.png}
  - {type: variant, offset: 3839, length: 0, content: '', krp: 省起居郎賫筆硯及紙於螭頭下記言記事又曰鄭㓪開成中爲起居郎𥘉太和末風俗稍奢文宗恭勤節儉兾革其風宰臣等言曰陛下躬儉節用風俗巳移長𥚑大𬒮漸以减損若更令戚屬絶其侈靡不慮下不從教帝曰此事亦難户曉但去其泰甚自以儉德化之朕聞前時内庫唯二錦𫀆飾以金鳥一𫀆玄宗幸温湯時御之一與貴妃當時貴重如此今奢靡豈復貴之邪今冨家往往皆有左街副使張元昌便用金唾壺昨因李訓巳誅之矣時朗執筆螭頭下宰臣退上謂朗曰適所議論卿記録未吾試觀之朗對曰臣執筆所記便名爲史伏准故事帝王不可取觀昔太宗欲覽國史諌議大夫朱子奢云史官所𫐠不隱善惡或主非上智飾非護失見之則致怨所以義不可觀又禇遂良曰今之起居郎古之左右史也記人君言行善惡必書庶幾不爲非法不聞帝王躬自觀史帝曰適來所記}
  - {type: variant, offset: 3840, length: 2, content: 員位, SBCK: 可否臧見亦何爽乃宣謂宰臣曰鄭朗引故事不欲朕見起居注夫人君之言善惡必書朕恐有平常閑話不􅀜理體垂諸將來竊以爲恥異日臨朝庶幾稍改何妨一見以誡醜言朗遂進之又曰開成二年十二月閤門對左右史裴素等上自開成􅀄復故事每入閤左右史執筆立干螭頭之下君臣論奏得以備書故開成政事最詳於代起居舎人六典曰起居舎人掌修記言之史録天子之制詔德音如記事之制以紀時政之損益季冬則授之於國史唐書曰邢文偉滁州全椒人時右史官缺髙宗謂侍臣曰邢文偉事我兒能减膳切諌此正直人也遂擢拜右史又曰李讓夷字逹心爲諌議大夫開成元年以本官兼知起居舎人事時起居舎人李襃有痼疾請罷官宰臣李石奏闕官上曰禇遂良爲諌議大夫嘗兼此官卿可盡言今諌議大夫姓名石遂奏李讓夷馮定孫簡俶帝曰讓夷可也李固言欲用崔球張}
  - {type: page-break, offset: 3840, content: '', id: KR3k0012_SBCK_222-7b}
