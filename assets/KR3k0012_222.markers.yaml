  - {type: variant, offset: 1330, length: 280, content: 文案贊相威儀典署其事後魏書曰崔光為黃門侍郎未嘗留心文案唯從容論議參贊文政而巳又曰陽平王之子匡為黃門侍郎茹皓始有寵百寮微憚之世宗曾於山陵還詔匡陪乘乂命皓登車褰裳將上匡諫止世宗推之命下皓恨匡失色當時壯其忠謇又曰任城王之子順除給事黃門侍郎時領軍元乂威刑尤盛凡有遷授莫不造門謝謁順拜表而巳曾不詣乂乂謂順曰卿何得不見我順正色曰天子富於春秋委政宗輔叔父宜至公為心舉士報國如何賣恩責人私謝豈所望也北史曰盧誕拜給事黃門侍郎魏帝詔曰經典易求人師難得朕諸兒稍長欲令卿為師於是親幸晉王第勑晉王以下皆拜之於帝前隋書曰劉行本為黃門侍郎文帝嘗怒一郎於殿前笞之行本進諫帝不顧行本乃正當上前又, WYG: ''}
