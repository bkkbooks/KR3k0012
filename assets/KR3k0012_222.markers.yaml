  - {type: variant, offset: 12, length: 2, content: 黃門, SBCK: 中書舎人掌侍奉進奏叅議表章凢詔旨制勑及璽書􅁽命皆按典故起章草進畫旣下則署而行之其禁有四一曰漏􅂥二曰稽緩三曰違失四曰忘誤所以重王命也制勑旣行有誤則奏而正之通典曰自永淳以來天下文章道盛臺閣髦彦無不以文章逹故中書舎人爲文士之極任朝廷之盛選諸官莫比焉晉中興書曰劉起遷中書舎人時臺省初建内外多事出内書命以忠愼稱加以治身清苦衣不重帛每上所賜皆固辭曰凢陋小臣横竊賞賜無德而禄殃咎必至上益嘉焉又曰徐邈字仙民東莞姑幕人也少好學問尤善經傳時烈宗始覽典籍招延禮學之士謝安舉選􅀘中書舎人在西省撰正五經音訓學者宗之每預頋問輙有獻替多所􅀘益烈宗甚愛之齊書曰永明元年熒惑入紫微時中書通事舎人四人各住一省謂之四户旣㧾重權􅀔傾天下㑹􅀇象失度太史奏冝修福禳之太尉王儉謂帝曰天文乖忤此由四户乃具舎人王文明等名奏之又曰明帝踐阼引􅀓昭爲中書舎人時居此職者皆權傾天下昭獨廉静無所干預器服率略身安麄糲常挿燭板床明帝聞之賜􅃮合燭槃勑曰卿有古人之風故賜卿古人之物又曰茹法亮乆爲中書通事舎人後出爲大司農中書􅀔利之職法亮戀之垂涕而去梁書曰裴子野以中書}
