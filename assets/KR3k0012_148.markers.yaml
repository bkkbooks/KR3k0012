  - {type: variant, offset: 3111, length: 950, content: 書曰丹不肖生於僻陋之國長於不毛之地未曾得覩君子雅訓欲有所陳幸垂覽之丹聞丈夫之通義節恥受辱以生也貞正所羞之見却以虧其節故有刎喉不顧據鼎不過者斯豈樂死而忘生哉其心所守也今秦王反戾天常虎狼其行遇丹無禮諸侯最甚每念之痛入骨髓計燕國之眾不能敵之曠年相守力固不足欲收天下勇士集海內英雄破國空藏以奉養之重幣甘辭以市於秦秦貪我賂而信我辭則一劍之任當千萬之師須臾之間可解丹萬世之恥若其不然令丹生無目於天地死懷恨於九泉必令諸侯無以為歎易水之北未知誰有此蓋亦大夫恥也謹遣書願熟思之史記呂后本紀曰太后高祖微時妃也生孝惠帝為人仁弱高祖以為不類我常欲廢太子立戚姬子如意如意類我幾代太子者數矣賴大臣爭之及用留侯策太子得毋廢又張良世家曰上欲廢太子立戚夫人子趙王如意大臣多諫爭未能得堅決者也呂后恐不知所為人或謂呂后曰留侯善畫計策上信用之呂后乃使建成侯呂澤劫留侯曰君常為上謀臣今欲易太子君安得高枕而臥乎留侯曰始上數在困急之中幸用臣策今天下安定以愛欲易太子此骨肉間雖臣等百餘人何益呂澤強要曰為我畫計留侯曰此難以口舌爭也顧上有不能致者天下有四人四人者年老矣皆以為上慢侮人故逃匿山中義不為漢臣然上高此四人今公誠能無愛金玉璧帛令太子為書卑辭安車因使辯士請之來以為客時時從入朝令上見之則必異而問之上知此四人賢則一助也於是呂后令呂澤使人奉太子書卑辭厚禮迎四人四人至客建成侯所漢十一年黥布反上病欲使太子將往擊之四人相謂曰凡來者以將存太子太子將兵事危矣乃說建成侯曰太子將兵有功則位不益太子無功還則從此受禍矣且太子所與俱諸將皆嘗與上定天下驍將也今使太子將之此無異使羊將狼也皆不肯為盡力其無功必矣臣聞母愛者子抱今戚夫人日夜侍御趙王如意常抱居前上曰終不使不肖子居愛子之上明乎其代太子位必矣君何不急請呂后承間為上泣言黥布天下猛將也善用兵今諸將皆陛下故等夷夷猶餌也乃令太子將此屬無異使羊將狼也莫肯為用且使布聞之則鼓行而西耳晉灼曰鼓行而西言無所畏上雖病強載輜車臥而護之諸將不敢不盡力上雖苦為妻子自強於是呂澤立夜見呂后呂后承間為上泣涕而言如四人意上曰吾惟豎子固不足遣而公自行耳於是上自將兵而東群臣居守皆送至灞上留侯病自強起至曲郵長安縣有曲郵聚見上曰臣宜從病甚楚人剽疾願上無與楚人爭鋒因說上曰令太子為將軍監關中兵上曰子房雖疾強臥而傅太子是時叔孫通為太傅留侯行少傅事漢十, WYG: ''}
