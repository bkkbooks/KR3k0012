  - {type: variant, offset: 4992, length: 0, content: '', WYG: 坐廢為濟陰王明年三月安帝崩北鄉侯立濟陰王以廢黜不能上殿親臨梓宮悲號不食内外羣僚莫不哀之及北鄉侯薨車騎將軍閻顯及江京與中常侍劉安陳達等白太后秘不發喪而更徵立諸國王子乃閉宮門屯兵自守十一月丁巳京師及郡國十六地震是夜中黃門孫程等十九人共斬江京劉安陳達等迎濟陰王於德陽殿西鍾下即皇帝位年十一魏志曰文帝為五官中郎將而臨淄侯植才名方盛黨與}
