  - {type: variant, offset: 5782, length: 0, content: '', WYG: 自毁如此可即強進飲粥太子奉勅乃進數合自是至葬日進麥粥一升武帝又勅曰聞汝所進過少轉羸痩我比来更無病正為汝如此胷中亦圯塞成疾應强加饘粥不使我還爾懸心雖屢奉勸逼終喪日止一溢不嘗菜菓之味體素壯腰帶十圍至是減削過半毎入朝士庶見者莫不下泣又曰昭明太子性愛山水於園圃穿築更立亭館與朝士名素髙者逰其中嘗泛舟後池番禺侯軌盛稱此中宜奏女樂太子不答詠左思招隱詩云何必絲與竹山水有清音軌慙而止又曰昭明太子好士愛文劉孝綽與陳郡殷芸吳郡陸倕琅耶王筠彭城劉洽等同見禮待太子起樂賢堂後周書曰宣帝諱贇髙祖長子帝即位多過惡初帝之在東宫也髙祖慮其不堪承嗣遇之甚嚴朝見進止與諸臣無異雖隆寒甚暑亦不得休息性既嗜酒高祖遂醪醴不許至東宫帝毎有過輒加捶扑嘗謂之曰古來太子被廢者幾人餘兒豈不堪立邪於是遣東宫官屬録帝言語動作每月奏聞帝憚髙祖嚴矯情修飾以是過惡遂不聞隋書曰煬帝髙祖第二子母文獻獨孤皇后上美姿儀少敏慧髙祖及后於諸子中特鍾愛髙祖幸上所居第見樂器絃多斷絶又有塵埃若不用者以為不好聲色之玩上尤自矯飾當時稱為仁孝及太子勇廢立為皇太子唐書曰李綱隋開皇末為太子洗馬皇太子勇嘗以歲首宴宫臣左庶子唐令則自請奏琵琶又歌武媚娘之曲綱趨而出勇曰我欲為樂耳君勿多事及勇廢黜文帝召東宫官屬切讓之無敢對者綱對曰今日之事乃陛下之過非太子之罪也太子才非上品性是常人若得賢明之士輔導之足堪}
