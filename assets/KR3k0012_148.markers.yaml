  - {type: page-break, offset: 5780, content: '', id: KR3k0012_SBCK_148-9a}
  - {type: variant, offset: 5780, length: 0, content: '', WYG: 聞皇羲𤣥邈五帝攸往淳風澆散三王傳嗣欲令國有常居民有定奉關諸盛衰不易之道也伏惟皇子天挺竒表隆準豐下岐嶷之姿彰於始年大成之風顯於期月宜建立儲宫允副民望請下太史擇吉日告宗廟備禮奉行奏可後魏書曰太宗明元皇帝道武之長子初帝母既賜死太祖乃召帝告曰昔漢武帝將立其子而殺其母不令婦人後與國政使外家無亂汝當繼統吾故遠同漢武為長乆之計帝素純於孝哀泣不能自勝太祖怒召之帝欲入左右曰孝子事父小杖則受大杖避之今陛下怒盛入或不測陷帝於不義不如且出待和解而進不晚也帝從之乃逰行於外及元紹之逆也帝還而誅之天賜六年即皇帝位又曰景穆皇帝太武皇帝之長子也母曰賀夫人延和元年立為皇太子時年五歲明惠强識聞則不忘及長好讀經史皆通大義太武甚竒之初太武之伐河西李順等咸言姑臧無水草不可行太子有疑色及車駕至姑臧乃詔太子曰姑臧城東西門外涌泉於城其大如河澤草茂盛可供大軍數萬人之多言者亦可惡也太子謂言者曰為人臣不實若此豈是忠乎吾初聞有疑但帝決行耳幾誤人大事言者復何面見帝也正平元年六月薨於東宫時年二十四賜諡曰景穆皇太子髙宗即位追尊為景穆皇帝廟號恭宗又曰世宗宣武皇帝孝文皇帝第二子也母曰髙夫人初夢為日所逐避於牀下日化為龍繞己數匝遂有娠生帝於平城宫二十一年立為皇太子又曰肅宗孝明帝諱詡世宗第二子也延昌元年立為皇太子二年世宗}
