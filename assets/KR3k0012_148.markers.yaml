  - {type: variant, offset: 5092, length: 3, content: 孝元皇, WYG: 惠}
  - {type: variant, offset: 5093, length: 0, content: '', SBCK: 宗穆皇帝諱聃康帝子也建元二年康帝疾篤左光禄大夫領司徒謨尚書令恢等上䟽曰臣聞皇義􅀇邈五帝攸徃淳風澆散三王傳嗣欲令國有常居民有定奉􅀜諸盛衰不易之道也伏惟皇子天挺竒表隆凖豐下歧嶷之姿彰於始年大成之風顯於朞月冝建立儲宫允副民望請下太史擇􅁻日告宗廟備禮儀奉行奏可後魏書曰太宗明}
  - {type: variant, offset: 5093, length: 0, content: '', krp: 宗穆皇帝諱聃康帝子也建元二年康帝疾篤左光禄大夫領司徒謨尚書令恢等上䟽曰臣聞皇義玄邈五帝攸徃淳風澆散三王傳嗣欲令國有常居民有定奉關諸盛衰不易之道也伏惟皇子天挺竒表隆凖豐下歧嶷之姿彰於始年大成之風顯於朞月冝建立儲宫允副民望請下太史擇吉日告宗廟備禮儀奉行奏可後魏書曰太宗明}
  - {type: variant, offset: 5096, length: 1, content: 為, SBCK: 道武之長子􅀄帝母旣賜死大祖乃召帝告曰昔漢武帝將立其子而殺其母不令婦人後與國政使外家無亂汝當繼統吾故逺同漢武爲長乆之計帝素純孝哀泣不能自勝}
  - {type: page-break, offset: 5096, content: '', id: KR3k0012_SBCK_148-5b}
  - {type: variant, offset: 5096, length: 1, content: 為, krp: 道武之長子𥘉帝母旣賜死大祖乃召帝告曰昔漢武帝將立其子而殺其母不令婦人後與國政使外家無亂汝當繼統吾故逺同漢武爲長乆之計帝素純孝哀泣不能自勝}
  - {type: variant, offset: 5098, length: 0, content: '', SBCK: 祖怒召之帝欲入左右曰孝子事父小杖則受大杖避之今陛下怒盛入或不測䧟帝於不義不如且出待和解而進不晚也帝從之乃遊行於外及元紹之逆也帝還而誅之天賜六年即皇帝位又曰景穆皇帝太武皇帝之長}
  - {type: variant, offset: 5098, length: 0, content: '', krp: 祖怒召之帝欲入左右曰孝子事父小杖則受大杖避之今陛下怒盛入或不測䧟帝於不義不如且出待和解而進不晚也帝從之乃遊行於外及元紹之逆也帝還而誅之天賜六年即皇帝位又曰景穆皇帝太武皇帝之長}
