  - {type: variant, offset: 5065, length: 1, content: 臺, SBCK: 而建樹之意定也王隱晉書曰武皇帝寛惠仁厚深沉有智量風度容貌綽如也景元中爲撫軍咸熈元年晉國􅀄開立爲丗子遷撫軍大將軍開府副相國二年立爲太子又曰惠帝爲太子時上素知太子闇弱後必亂國然不能擇才乃遣荀朂和嶠徃觀之朂還盛稱太子德更進茂不同西宫之時也嶠荅詔稱臣以爲太子如故不見更勝此自陛下家事非臣所盡也}
