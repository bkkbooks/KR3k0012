  - {type: variant, offset: 4063, length: 564, content: 上從擊破布歸疾益甚愈欲易太子留侯諫不聽因疾不視事叔孫太傅稱說引古今以死爭太子上佯許之猶欲易之及讌置酒太子侍四人者從太子年皆八十有餘鬚眉皓白衣冠甚偉上怪之問曰彼何為者四人前對各言名姓東園公角里先生綺里季夏黃公上乃大驚曰吾求公數歲公避逃我今公何自從吾兒遊乎四人皆曰陛下輕士善罵臣等義不為辱故恐亡匿竊聞太子為人仁孝恭敬愛士天下莫不延頸欲為太子死者故臣等來耳上曰煩公幸卒調護太子如淳曰調護猶營護也四人為壽已畢起去上目送之召戚夫人指示四人者曰我欲易之彼四人輔之羽翼已成難動矣呂后子真而主矣漢書外戚傳曰孝景王皇后武帝母也入太子宮太子幸愛之生三女一男男方在身時王夫人夢日入其懷以告太子太子曰此貴徵也未生文帝崩景帝即位王夫人生男是時薄皇后無子後數歲景帝立齊栗姬男為太子而王夫人男為膠東王長公主嫖有女欲與太子為妃栗姬妬而景帝諸美人皆因長公主見得貴幸栗姬日怨怒謝長主長主不許長主欲與王夫人夫人許之會薄皇后廢長公主日譖栗姬景帝嘗囑諸姬子曰吾百歲後善視之栗姬怒不肯慮言不遜景帝心銜之而未發也長公主日譽王夫人男之美帝亦自賢之又以曩者所夢日符計未有所定王夫人又陰使人趣大臣立栗姬為皇后大行奏事文曰子以母貴母以子貴今太子母號宜為皇后帝怒曰是乃所當言耶遂按誅大行廢太子為臨江王栗姬愈恚不得見以憂死卒立王夫人為皇后男為太子漢武故事曰武帝生猗蘭殿四歲立為膠東王七歲, WYG: 六月}
