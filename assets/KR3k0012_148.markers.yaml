  - {type: variant, offset: 5079, length: 11, content: 司奉謚曰戾置奉邑三百家, WYG: 智量風度容貌綽如也景元中為撫軍咸熙元年晉國初開立為世子遷撫軍大將軍開府副使相國二年立為太子}
  - {type: variant, offset: 5079, length: 0, content: '', krp: 不肅之訓其令此六人更共徃來止其後太子好卑居小馬小牛令左右騎斷羈勒使墮地又令人屠肉巳自分齊手揣輕重斤兩不差云其母夲屠家女也頗好遊宴或闕朝侍稍失儲副望賈后無子妬害滋甚九年正月月暈赤黃數重三月十八日榮陽河南潁川繁霜殺桒及姚李杏花尉氏雨血有聲若牛出許昌城夏桒生于東宫西廂日長尺餘數日枯日中若飛鷰者積數月漢中平中亦有此變皆爲太子也賈后作頡子髻太子見頡之象也是時謡曰宫東馬子莫聾啌前至臘月纏汝􅷔十一月天連大風發屋折樹十二月二十八日后遣宫婢齎書與太子云陛下昨夜不快汝可入朝太子如令請朝詔聽二十九日入朝賈后不見使婢陳儛賜棗酒強使飲辭不見聽太子醉賈后誣奏太子有悖書廢徙金墉城以千兵防送幽于許昌宫之別坊賈后與賈謐等早害太子以絶民望三月十四日矯詔使小黄門孫慮害太子賈后表以廣陵王禮殯趙王倫誅賈謐廢賈后帝乃使持節兼}
