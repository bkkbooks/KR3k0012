  - {type: variant, offset: 4632, length: 0, content: '', WYG: 十七年十月郭后廢為中山太后自郭后廢疆不自安因左右陳誠願備藩輔其十九年六月疆廢為東海王二十八年十月就國食東海魯國并二郡二十九縣租入倍儲王賞賜恩寵無倫比多置虎賁旄頭宮殿設鍾簴之懸疆性聰達恭謙臨之國比上書讓還東海十九縣上不許以疆章示公卿大夫甚嘉歎之續}
