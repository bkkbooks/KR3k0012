  - {type: variant, offset: 5052, length: 0, content: '', SBCK: 旣而文帝得立抱毗頸而告之曰辛君知我喜不毗以告憲憲歎曰太子代君主宗廟社稷也代君不可以不慼主國不可以不懼冝慼而喜何以能乆魏其不昌乎魏志曰明帝文帝太子也生而太祖愛之常念在左右魏書曰明帝生數歳而有歧嶷之姿武帝異之曰我基於尓三丗矣毎朝燕㑹同與侍中近臣並列帷幄好學多識特留意於法理魏略曰文帝以郭后}
