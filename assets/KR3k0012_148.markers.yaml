  - {type: variant, offset: 5366, length: 0, content: '', SBCK: 明帝諱詡丗宗第二子也延昌元年立爲皇太子二年丗宗幸東宫召崔光與黃門甄琛廣陽王淵等並賜坐詔光曰卿是朕西臺大臣當今爲太子師傅光起拜固辭詔不許即命肅宗出從者十餘人勑以光爲􅀓之意令肅宗拜光光又拜辭不當受太子拜復不􅀩許肅宗遂南面再拜詹事王顯啓請從太子拜於是宫臣畢拜光北面立不敢荅拜唯西面拜謝而出又曰廢太子生而母死文明太后撫視之常置左右詔曰昔塗山有育美名列於夏典任姒作配昌發顯於周書故能緝熈丕緒祚延八百自元子誕育於今四載而名表未孚於四方茂實未昭於朝掖非所以憲章逺猷允光禮度者也太皇太后親發明旨爲之立名依德恊義名恂字元道國祚永隆儲貳有􅀉無窮之兆於是而始乃大赦天下太和十七年七月癸丑立恂爲皇太子髙祖毎歳征幸常留守恂不好書學體貌肥大􅀷忌河洛暑􅀬意毎追樂北方庶子髙道恱數苦諫恂甚銜之乃手刃道恱於禁中髙祖引羣臣於清徽堂議廢之爲庶人置之河陽後謀逆賜死梁書曰天監十四年正月朔旦帝臨軒冠太子於太極殿舊制太子着逺遊冠金蟬翆緌纓至是詔加金愽山又曰昭明太子母丁貴嬪有疾太子還永福省侍疾衣不解帶及薨歩從喪還宫至殯水漿不入口毎哭慟絶武帝命中書舎人顧恊宣旨曰毀不滅性聖人之制不勝喪比於不孝有我在郍得自毀如此可即強進飲粥太子奉勑乃進數合自是至葬日進麥粥一􅂛武帝又勑曰聞汝所進過少轉羸痩我比更無病正爲汝如此􅇩中亦圯塞}
