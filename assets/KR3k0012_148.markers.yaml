  - {type: variant, offset: 5777, length: 1, content: 謝, SBCK: 又曰隱太子建成髙祖長子也大業末髙祖捕賊汾晉令建成携家屬􅀉于河東義旗建遣使密召之建成與巢王元􅁻間行赴太原建成至髙祖大喜拜左領大都督封隴西郡公引兵略西河郡從平長安義寧元年冬隋恭帝拜唐國丗子開府置僚屬二年授抚軍大將軍東討元帥將兵十萬徇洛陽及還恭帝授尚書令武德元年立爲皇太子時太宗功業日盛建成與齊王元􅁻濳謀作亂九年六月三日太宗密奏建成元􅁻􅁋乱後宫因自陳}
  - {type: variant, offset: 5777, length: 1, content: 謝, WYG: 詔曰遹尚幼蒙今出上東宫雖當賴師傅羣賢之訓其逰處左右宜得正人使共周旋能相長益者太保衞瓘息庭司空司馬泰息略太子太傅楊濟息毖音祕太子少師裴楷息憲太子少傅張華息禕尚書令華廙音翼息恒並以道義之門有不肅之訓其令此六人更共往來其後太子好卑居小馬小牛令左右騎斷羇勒使墮地又令人屠肉己自分齊手揣輕重斤兩不差云其母本屠家女也頗好遊宴或闕朝侍稍失儲副望賈后無子妬害滋甚九年正月月暈赤黃數重三月十八日滎陽河南潁川繁霜殺桑及桃李杏花尉氏雨血有聲若牛出許昌城夏桑生於東宫西廂日長尺餘數日枯日中若飛燕者積數月漢中平中亦有此變皆為太子也賈后作擷字髻太子見擷之象也是時謡曰宫東馬子莫聾空前至臘月纒汝􅐢十一月天連日大風發屋折樹十二月二十八日后遣宫婢齎書與太子云陛下昨夜不快可入朝太子如令詣朝聽詔二十九日入朝賈后不見使婢陳儛賜棗酒強使飲辭不見聽太子醉賈后誣奏太子有悖書廢徙金墉城以千兵防送幽于許昌宫之别坊賈后與賈謐謀早害太子以絶民望三月十四日矯詔使小黃門孫慮害太子賈后表以廣陵王禮𦵏之趙王倫誅賈謐廢賈后帝乃使持節兼司空衞尉伊䇿故皇太子曰嗚呼少負岐嶷之質荷先帝殊異之寵大啓土宇奄有淮陵朕奉遵遺㫖建爾儲副以光顯我祖宗祇爾德行以從保傅事親孝敬禮無遺者而朕昧於㓙搆致爾於非命之禍俾申生孝己復見於今賴宰相賢明人神憤怨用啟朕心討厥有罪咸伏其辜何補於荼毒寃魂酷痛哉是用忉怛悼恨震動於五内今追復皇太子喪禮備制反葬京畿祀以太牢魂而有靈尚獲爾心文士傳曰賈謐與愍懷太子博争道成都王厲聲曰皇帝太子國之儲君賈長淵何得無禮晉書曰明帝元皇帝長子也幼而聰哲為元帝所寵異年數歲常坐置膝上屬長安使來因問帝曰汝謂日與長安孰遠對曰不聞人從日邊來居然可知也元帝異之明日宴羣僚又問之對曰日近元帝失色曰何乃間昨者之言對曰舉目見日不見長安由是益竒之及帝即尊號立為皇太子何法盛晉中興書曰肅祖中宗長子也建武元年中宗為晉王拜王太子及踐尊號為皇太子册曰於戯朕承天緒忝繼祖宗之洪基君臨於萬邦戰戰兢兢若涉淵水未有攸濟自古聖王敷宅四海莫不建立元子本枝百世今稽古授爾於儲宫以陪貳於朕躬欽哉爾其克念乃祖日新厥德何逺非佞何親非賢欽翼師傅以丕崇大化可不慎歟爾其敬之又曰孝宗穆皇帝諱􅔶康帝子也建元二年康帝疾篤左光禄大夫令司徒謨尚書令恢等上疏}
