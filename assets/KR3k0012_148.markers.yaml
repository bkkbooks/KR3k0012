  - {type: variant, offset: 4635, length: 1, content: 衛, WYG: 趙嘉為太尉中元二年上崩嘉受遺詔典録喪禮新承王莽之亂國無舊典皇太子與諸王雜坐同席尊卑無别嘉乃正色橫劔殿階扶下諸王以明尊卑范曄後漢書曰孝順皇帝安帝之子母李氏為閻}
