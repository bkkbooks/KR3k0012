  - {type: variant, offset: 5085, length: 3, content: 奉邑三, SBCK: 膝上屬長安使來因問帝曰汝謂日與長安孰逺對曰不聞人從日邊來居然可知也元帝異之明日宴羣僚又問之對曰日近元帝失色曰何乃異間者之言對曰舉目見日不見長安由是益竒之及帝即尊號立爲皇太子已見明帝紀中何法盛晉中興書曰肅祖中宗長子也建武元年中宗爲晉王拜王太子及踐尊號爲皇太子􅁽曰於戯朕承天緒忝繼祖宗之洪基君臨于萬􅀖戰戰兢兢􅀂渉淵水未有攸濟自古聖王敷宅四海莫不建立元子夲枝}
