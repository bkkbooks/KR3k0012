  - {type: variant, offset: 5440, length: 214, content: 三歲而宣帝崩元帝即位帝為太子壯好經書寬愽謹慎初居桂宮上常急召太子出龍樓門張晏曰門撞上有銅龍黃白鶴飛廉之為名也不敢絕道應劭曰馳道天子道也若今之中道然古甚重也西至直城門晉灼曰黃圖西出南頭第二門得絕乃度還入作室門上遟之問其故以狀對上大悅乃著令令太子得絕馳道云其後幸酒樂讌晉灼曰幸酒好酒樂讌上不以為能而定陶恭王有才藝母傅昭儀又愛幸上以故常有意欲以恭王為嗣賴侍中史丹護太子家輔助有力上亦以先帝尤愛太子故得無廢又曰孝哀皇帝庶孫定陶恭王子也嗣, SBCK: ''}
