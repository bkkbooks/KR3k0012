  - {type: variant, offset: 11, length: 160, content: 初宋芮司徒生女子芮司徒宋大夫赤而毛棄諸堤下其身色赤而生毛也恭姬之妾取以入名之曰棄長而美恭姬宋伯姬也平公入夕視夕也平公恭姬子也恭姬與之食公見棄也而視之尤右過也意悅之故視之過久姬納諸御納之平公之御嬖生佐公嬖棄而生佐佐立為宋元公惡而婉婉順也佐貌惡心順太子痤美而很太子貌美戾而心很很戾不從教合左師畏而惡之合左師向戍也寺人惠墻伊戾, WYG: 漢明帝}
