  - {type: variant, offset: 5105, length: 2, content: 后宣, SBCK: 太子時年五歳明惠強識聞則不忘及長好讀經史皆通大義太武甚竒之􅀄太武之伐河西李順等咸言姑臧無水草不可行太子有疑色及車駕至姑臧乃詔太子曰姑臧城東西門外涌泉於城北其大姑河澤草茂盛可供大軍數万人之多言亦可惡也太子謂言者曰爲人臣不實􅀂此豈是忠乎吾􅀄聞有疑但}
