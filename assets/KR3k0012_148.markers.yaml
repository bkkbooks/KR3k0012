  - {type: variant, offset: 5078, length: 0, content: '', SBCK: 立爲皇太子詔曰遹尚㓜􅀩今出止東宫雖當頼師傅羣賢之訓其遊處左右冝得正人陳共周旋能相長益者太保衛權息庭司空司馬􅁗息略太子太傅楊濟息毖音秘太子少師裴楷息憲太子少傅張華息禕尚書令華廙音翼息􅁪並以道義之門}
  - {type: variant, offset: 5078, length: 0, content: '', krp: 立爲皇太子詔曰遹尚㓜蒙今出止東宫雖當頼師傅羣賢之訓其遊處左右冝得正人陳共周旋能相長益者太保衛權息庭司空司馬秦息略太子太傅楊濟息毖音秘太子少師裴楷息憲太子少傅張華息禕尚書令華廙音翼息恒並以道義之門}
  - {type: variant, offset: 5079, length: 0, content: '', SBCK: 不肅之訓其令此六人更共徃來止其後太子好卑居小馬小牛令左右􅀐斷羈勒使墮地又令人屠肉巳自分齊手揣輕重斤兩不差云其母夲屠家女也頗好遊宴或闕朝侍稍失儲副望賈后無子妬害滋甚九年正月月暈赤黃數重三月十八日榮陽河南潁川繁霜殺桒及姚李杏花尉氏􅀨血有聲􅀂牛出許昌城夏桒生于東宫西廂日長尺餘數日枯日中􅀂飛鷰者積數月漢中平中亦有此變皆爲太子也賈后作頡子髻太子見頡之象也是時謡曰宫東馬子莫聾啌前至臘月􅆞汝􅷔十一月天連大風發屋折樹十二月二十八日后遣宫婢齎書與太子云陛下昨夜不快汝可入朝太子如令請朝詔聽二十九日入朝賈后不見使婢陳儛賜􅀥酒強使飲辭不見聽太子醉賈后誣奏太子有悖書廢徙金墉城以千兵防送幽于許昌宫之別坊賈后與賈謐等早害太子以絶民望三月十四日矯詔使小黄門孫慮害太子賈后表以廣陵王禮殯趙王倫誅賈謐廢賈后帝乃使持節兼}
