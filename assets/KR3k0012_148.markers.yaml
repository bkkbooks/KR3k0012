  - {type: variant, offset: 5081, length: 1, content: 謚, SBCK: 遵遺旨建尓儲副以光顯我祖宗祗尓徳行以從保傅事親孝敬禮無違者而朕昧于凶構致􅈛于非命之禍俾申生孝巳復見于今頼宰相賢明人神憤怨朕心討厥有罪咸伏其辜何􅀘於荼毒􅁈魂酷痛哉是用切怛悼恨震動於五内今追復皇太子䘮禮備制反葬京畿祠以太牢魂而有靈尚獲􅈛心文士傳}
