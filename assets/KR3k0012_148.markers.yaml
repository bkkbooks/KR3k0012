  - {type: variant, offset: 5799, length: 1, content: 宮, SBCK: 承乾廢長孫無忌李勣等議立爲皇太子又曰太子承乾得罪太宗欲立晉王而限以非次惶惑不決乃御兩儀殿羣臣盡出獨留長孫無忌及司空房􅀇齡李勣謂曰我三子一弟所爲如此我心無􅂓因自投於床抽佩刀欲自刺無忌等驚懼爭前扶抱取佩刀以授晉王無忌等請太宗所欲報曰我欲立晉王無忌曰謹奉詔有異議者臣請斬之太宗謂晉王曰汝勇許汝也汝冝拜謝晉王因下拜太宗謂無忌等曰公等旣符我意未知物論何如無忌曰晉王仁孝天下屬心乆矣乞召問百僚必無異辭於是建立遂定太平御覽卷第一百四十八}
  - {type: page-break, offset: 5799, content: '', id: KR3k0012_SBCK_148-9b}
  - {type: variant, offset: 5799, length: 1, content: 宮, WYG: 之罪耶隋書曰元德太子昭煬帝長子也生而高祖命飬宫中三歲時於𤣥武門弄石獅子高祖與文獻后至其所高祖適患腰痛舉手憑后昭因避去如此者再三高祖歎曰天生長者誰復教乎由是大竒之高祖嘗謂曰當為爾娶婦昭應聲而泣高祖問其故對曰漢王未婚時恒在至尊所一朝娶則便出外懼將違離是以啼耳上歎其有至性特鍾愛焉煬帝即位便幸雒陽宫昭留守京師大業元年帝遣使者立為皇太子唐書曰太宗文皇帝高祖第二子也母曰太穆皇后以隋開皇十八年生於武功之别館初在孕而語聲聞於外后心異之將誕育后不之覺而太宗已生高祖受禪拜尚書令進封秦王武德九年立為皇太子又曰隱太子建成高祖長子也大業末高祖捕賊汾晉令建成攜家屬寄於河東義旗建遣使密召之建成與齊王元吉間行赴太原建成至高祖大喜拜左領大都督封隴西郡公引兵略河西郡從平長安義寧元年冬隋恭帝拜唐國世子開府置僚屬二年授撫軍大將軍東討元帥將兵十萬狥洛陽及還恭帝授尚書令武德元年立為皇太子時太宗功業日盛建成與齊王元吉潛謀作亂九年六月三日太宗密奏建成元吉淫亂後宫因自陳曰臣於兄弟無絲毫所負今欲殺臣似為世充建德報讐臣今枉死永違君親魂歸地下實亦恥見諸賊高祖省之愕然報曰明日當勘問汝宜早叅四日太宗將左右九人至𤣥武門自衞高祖已調召裴寂蕭瑀竇延陳叔達封倫宇文士及顔師古等欲令窮覆其事建成元吉行至臨湖殿覺變即迴馬將東歸宫府太宗隨而呼之元吉馬上張弓再三不彀太宗乃射之建成應絃而斃又曰高宗文皇帝太宗第九子也母曰文德順聖長孫皇后貞觀二年生於東宫之麗正殿封晉王幼而岐嶷端審寛仁孝友初授孝經太宗問曰此書中何言為善對曰夫孝始於事親中於事君終於立身太宗大恱曰行此足以事父兄為臣子矣太子承乾廢長孫無忌李勣等議立為皇太子又曰太子承乾得罪太宗欲立晉王而限以非次惶惑不決乃御兩儀殿羣臣盡出獨留長孫無忌及司空房𤣥齡李勣謂曰我三子一弟所為如此我心無聊因自投於牀抽佩刀以自刺無忌等驚懼争前扶抱取佩刀以授晉王無忌等請太宗所欲報曰我欲晉王無忌曰謹奉詔有異議者臣請斬之太宗謂王曰汝舅許汝也汝宜拜謝晉王因下拜太宗太宗謂無忌等曰公等既符我意未知物論何如無忌曰晉王仁孝天下屬心乆矣乞召問百僚必無異辭於是建立遂定太平御覽巻一百四十八}
