  - {type: variant, offset: 5366, length: 0, content: '', krp: 明帝諱詡丗宗第二子也延昌元年立爲皇太子二年丗宗幸東宫召崔光與黃門甄琛廣陽王淵等並賜坐詔光曰卿是朕西臺大臣當今爲太子師傅光起拜固辭詔不許即命肅宗出從者十餘人勑以光爲傳之意令肅宗拜光光又拜辭不當受太子拜復不蒙許肅宗遂南面再拜詹事王顯啓請從太子拜於是宫臣畢拜光北面立不敢荅拜唯西面拜謝而出又曰廢太子生而母死文明太后撫視之常置左右詔曰昔塗山有育美名列於夏典任姒作配昌發顯於周書故能緝熈丕緒祚延八百自元子誕育於今四載而名表未孚於四方茂實未昭於朝掖非所以憲章逺猷允光禮度者也太皇太后親發明旨爲之立名依德恊義名恂字元道國祚永隆儲貳有寄無窮之兆於是而始乃大赦天下太和十七年七月癸丑立恂爲皇太子髙祖毎歳征幸常留守恂不好書學體貌肥大深忌河洛暑熱意毎追樂北方庶子髙道恱數苦諫恂甚銜之乃手刃道恱於禁中髙祖引羣臣於清徽堂議廢之爲庶人置之河陽後謀逆賜死梁書曰天監十四年正月朔旦帝臨軒冠太子於太極殿舊制太子着逺遊冠金蟬翆緌纓至是詔加金愽山又曰昭明太子母丁貴嬪有疾太子還永福省侍疾衣不解帶及薨歩從喪還宫至殯水漿不入口毎哭慟絶武帝命中書舎人顧恊宣旨曰毀不滅性聖人之制不勝喪比於不孝有我在郍得自毀如此可即強進飲粥太子奉勑乃進數合自是至葬日進麥粥一升武帝又勑曰聞汝所進過少轉羸痩我比更無病正爲汝如此匈中亦圯塞}
  - {type: variant, offset: 5367, length: 0, content: '', SBCK: 疾應強加饘粥不使我恒尓懸心雖屢奉勸逼終喪日止一溢不甞菜菓之味體素壯􅆎帶十圍至是減削過半每入朝士庶見者莫不下泣又曰昭明太子性愛山水於􅀇圃穿築更立亭館與朝士名素者遊其中甞泛舟後池畨禺侯軌盛􅁛此中冝奏女樂太子不荅詠左思招隱詩云何必絲與竹山水有清音軌慙而止又曰昭明太子好士愛文劉孝綽與陳郡殷芸呉郡陸倕琅瑘王筠彭城劉洽等同見禮待太子起樂賢堂後周書曰宣帝諱贇髙祖長子帝即位多過惡初帝之在東宫也髙祖慮其不堪承嗣遇之甚嚴朝見進止與諸臣無異雖隆寒盛暑亦不得休息性旣嗜酒髙祖遂醪醴不許至東宫帝每有過輙加捶扑甞謂之曰古來太子􅀍廢者幾人餘兒豈不堪立邪於是遣東宫官屬録帝言語動作每月奏聞帝憚髙祖嚴矯情脩飾以是過惡遂不聞隋書曰􅌆帝髙祖第二子也母文獻獨􅀌皇后上美姿儀少敏惠髙祖及后於諸子中特鍾愛髙祖幸上所居第見樂器􅃶多斷絶又有塵埃􅀂不用者以爲不好聲􅇊之玩上尤自矯飾當時稱爲仁孝及太子勇廢立爲皇太子唐書曰李綱隋開皇末爲太子洗馬皇太子勇甞以歳首宴宫臣左庶子唐令則自請奏琵琶又歌武媚娘之曲綱趨而出勇曰我欲爲樂耳君勿多事及勇廢黜文帝召東宫官屬切讓之無敢對者綱對曰今日之事乃陛下之過非太子之罪也太子才非上品性是常人􅀂得賢明之士輔導之足堪継嗣皇業方今多士盈朝當擇賢居任奈何以􅃶􅁔鷹犬之才日在其側致令至此乃陛下訓導不足豈太子之罪耶隋書曰元德太子昭􅌆帝長子也生而髙祖命養宫中三歳時於􅀇武門弄石師子髙祖與文獻后至其所髙祖適患腰痛舉手慿后昭因避去如此者再三髙祖歎曰天生長者誰復敎乎由是大竒之髙祖甞謂曰當爲􅈛娶婦昭應声而泣髙祖問其故對曰漢王未婚時恒在至尊所一朝娶便則出外懼將違離是以啼耳上歎其有至性特鍾愛焉􅌆帝即位便幸雒陽宫昭留守京師大業元年帝遣使者立爲皇太子唐書曰太宗文}
