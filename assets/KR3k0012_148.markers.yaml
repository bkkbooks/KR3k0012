  - {type: variant, offset: 5780, length: 7, content: 幸得繼父守藩為, krp: 於兄弟無絲毫所負今欲殺臣似爲丗充建德報讎臣今枉死永違君親魂歸地下實亦恥見}
  - {type: variant, offset: 5781, length: 0, content: '', WYG: 東宫召崔光與黄門甄琛廣陽王肅等並賜坐詔光曰卿是朕西臺大臣當令為太子師傅光起拜固辭詔不許即命肅宗出從者十餘人勅以光為傅之意令肅宗拜光光又拜辭又不當受太子拜復不蒙許肅宗遂南面再拜詹事王顯啟請從太子拜於是宫臣畢拜光北面立不敢答拜唯西面拜謝而出又曰廢太子生而母死文明太后撫視之常置左右詔曰昔塗山有育美名列於夏典任姒作配往跡顯於周書故能緝熙丕緒祚延八百自元子誕育於今四載而名表未孚於四方茂實未昭於朝掖非所以憲章遠猷允光禮度者也太皇太后親發明㫖為之立名依德協義名恂字元道國祚永隆儲貳有寄無窮之兆於是而始乃大赦天下太和十七年七月癸丑立恂為皇太子髙祖毎歲征幸常留守恂不好書學體貌肥大深忌河洛暑熱意毎追樂北方庶子髙道恱數苦諫恂甚銜之乃刃道悅於禁中髙祖引羣臣於清徽堂議廢之為庶人置之河陽後謀逆賜死梁書曰天監十四年正月朔旦帝臨軒冠太子於太極殿舊制太子著遠逰冠金蟬翠緌纓至是詔加金博山又曰昭明太子母丁貴嬪有疾太子還永福省侍疾衣不解帶及薨歩從喪還宫至殯水漿不入口毎哭慟絶武帝令中書舍人顧協宣㫖曰毁不滅性聖人之制不勝喪比於不孝有我在那}
  - {type: page-break, offset: 5781, content: '', id: KR3k0012_WYG_148-10b, image: WYG0894/WYG0894-0368b.png}
