  - {type: variant, offset: 5074, length: 0, content: '', SBCK: 六七歳時帝夜望火太子牽上衣裾使入闇中上問其故太子對以暮夜倉卒冝備非常不當近火光令人照見也又甞見官養猪肥大不常復問上何不殺以賜左右而乆費五榖上即烹之由是益竒之常稱以爲似}
