  - {type: variant, offset: 5120, length: 13, content: 八歲立為太子壯大柔仁好儒見, SBCK: 追尊爲景穆皇帝廟號恭宗又曰丗宗}
  - {type: variant, offset: 5120, length: 652, content: 八歲立為太子壯大柔仁好儒見宣帝所用多文法吏以刑名繩下大臣楊惲蓋寬饒等坐刺譏辭語為罪而誅嘗侍讌從容言陛下持刑太深宜用儒生宣帝作色曰漢家自有制度本以霸王道雜之奈何純任德教害政乎且俗儒不達時宜好是古非今使人眩於名實不知所守何足委任乃嘆曰亂我家者太子也繇是踈太子而愛淮陽王曰淮陽王明察好法宜為吾子而王母張婕妤尤幸上有意欲用淮陽王代太子然以少依許氏俱從微起故終不背焉又曰孝宣王皇后宣帝即位召入後宮稍進為婕妤霍皇后廢後上憐許太子早失母幾為霍氏所害於是乃選後宮素謹慎而無子者遂立王婕妤為皇后令母養太子又曰孝成皇帝元帝太子也母曰王皇后元帝在太子家生甲觀畫堂如淳曰甲觀二名畫堂二名三輔黃圖云太子宮有甲觀又別外不在未未夾宮中為世嫡皇孫宣帝愛之字曰太孫常置左右年三歲而宣帝崩元帝即位帝為太子壯好經書寬愽謹慎初居桂宮上常急召太子出龍樓門張晏曰門撞上有銅龍黃白鶴飛廉之為名也不敢絕道應劭曰馳道天子道也若今之中道然古甚重也西至直城門晉灼曰黃圖西出南頭第二門得絕乃度還入作室門上遟之問其故以狀對上大悅乃著令令太子得絕馳道云其後幸酒樂讌晉灼曰幸酒好酒樂讌上不以為能而定陶恭王有才藝母傅昭儀又愛幸上以故常有意欲以恭王為嗣賴侍中史丹護太子家輔助有力上亦以先帝尤愛太子故得無廢又曰孝哀皇帝庶孫定陶恭王子也嗣立為王好文辭法律元延四年入朝盡從傅相中尉時成帝少弟中山孝王亦來朝獨從傅上以問定陶王對曰令諸侯王朝得從其國二千石傅相中尉皆國二千石故盡從之上令誦詩通習能說他日問中山王獨從傅在何法令不能對帝由此賢定陶王數稱其材為加元服而遣之時年十七矣明年徵, WYG: ''}
