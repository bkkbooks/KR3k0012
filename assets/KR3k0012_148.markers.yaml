  - {type: variant, offset: 5102, length: 2, content: 哀許, SBCK: 賀夫人延和元年立爲}
  - {type: variant, offset: 5102, length: 2, content: 哀許, WYG: 愍懷太子名遹音聿字熙祖少聰慧武帝愛之六七歲帝夜望火太子牽上衣裾使入闇中上問其故太子對以暮夜倉卒宜備非常不當近火光令人照見也又嘗見官養猪肥大不常復問上何不殺以賜左右而乆費五穀上即烹之由是益竒之常稱以為似宣}
