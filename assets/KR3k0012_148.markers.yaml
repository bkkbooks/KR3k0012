  - {type: variant, offset: 775, length: 2335, content: 實娉之子西長而好善立長則順建善則治王順國治可不務乎子西怒曰是亂國而惡君王也謂夫人故太子建娉之廢而不立是謂亂國追惡君王也國有外援不可黷也外援謂太子任秦外孫黷易也秦為任外援不可易王有嫡嗣不可亂也敗親速讎亂嗣不祥我受其名賂吾以天下吾滋不從楚國何為必殺令尹令尹懼乃立昭王又曰齊燕姬生子不成而死燕姬齊景公嫡夫人昭七年燕人所歸不成未冠諸子鬻姒之子荼荼嬖諸子諸公子鬻姒景公妾也淳于人所納女荼安孺子諸大夫恐其為子也言於公曰君之齒長矣未有太子若之何為子為太子也荼少故恐立之言君年長未有太子一旦不諱當若之何欲令早立長也公曰二三子聞於憂虞則有疾疹亦姑謀樂何憂於無君言二三子聞於鄰國憂虞疾疹在其間今無疾疹何為不自謀自樂何憂無君乎公疾使國惠子高昭子立荼國惠子國景之子國憂也高昭高偃之子高張也寘群公子於菜寘置菜齊東鄙邑欲使遠齊公羊傳曰子般卒卒云子卒此其稱子般卒何何休注曰裾子赤不言子赤卒君存稱世子明當世父位為君也君薨稱子某緣民臣之心不可一日無君故稱子某繼父也名者尸柩尚在以君前臣名踰年稱公不曠年無君也又曰公孫慈如牟公及齊侯宋公陳侯衛侯鄭伯許男曹伯會王世子于首止戴曷為殊會王世子據宰周公不殊別也世子貴也世子猶世世子也解貴意也言當世父位儲君副主不可以諸侯會之為文故殊之使若諸侯為世子所會他自王者言之屈遠世子在三公下禮喪服斬衰曰公士大夫之眾臣是也自諸侯言之世子尊於三公此禮之威儀各有所施言及者因其文可得見汲汲也世子所以會者時桓公德衰故上假王世子示以公義也穀梁傳曰曹伯使世子射姑來朝朝不言使非正庾信注曰禮諸侯之適誓於天子攝其君則下其君一等未誓則以玉帛繼子男此謂會同急王命者也至於相朝非急會今曹伯有疾不朝魯未為有闕而使世子攝朝言非禮之正使世子伉諸侯之禮而來朝曹伯失正矣諸侯相見日朝以待人父之道待人之子以內為失正矣內魯內失正曹伯失正言二者俱失之世子可以已矣則是放命也放違也言世子違命而正是當不義則爭之又曰陳侯之弟招殺陳世子偃師招成公子偃師哀公子所謂悼太子者也哀公愛其世子留託之招哀公之柩衷公有疾招殺太子偃師而立留嚮曰陳公子招招發於十年矣今曰陳侯之弟招何也曰盡其親所以惡招也盡其親謂招稱公子又稱弟招先君之公子今君之母弟也兩下相殺不志乎春秋此其志何也世子者唯君之貳也貳副云可以重之存焉志之也諸侯之尊弟兄不得以屬通其弟云者親而殺之惡也惡哀公使招至放殺之孝經曰昔者明王之以孝治天下不敢遺小國之臣而況於公侯伯子男乎鄭玄注曰古者諸侯五年一朝天子使世子郊迎芻米百車以客禮待之盡坐正殿夜設庭燎思與相見問其勞苦也孔子家語曰邾隱公既即位將冠使大夫因孟懿子問於孔子孔子曰其禮如世子之冠冠於阼階所以著代王肅注曰主人之位以明代交也醮於客位加其成冠於阼階若不醴則用酒於客位敬而成之戶西為客也三加彌尊喻其志喻其志使彌知尊宜敬戒加綢布皮及爵弁冠而字之敬其名雖天子之元子猶士也其禮變天下無生而貴者又曰孔子曰古者王世子雖幼其即位則尊為人君治成人之事者也何冠之有孟懿子曰然則諸侯之冠異天子與怪天子無冠禮而諸侯之冠如子之冠問之也孔子曰君薨而世子主喪是亦冠已君人無所殊諸侯亦人君與天子無異孔叢子曰穆公問於子思曰立太子有常乎荅曰有之在周公之典曰文王舍適而立次微子舍孫而立其弟是何法也子思曰殷人質而尊故立其弟周人文而親其親故立其子亦各有禮也文質不同其禮則異文王舍適立次權也漢舊儀曰皇后太子各食三十縣曰湯沐邑白虎通曰何以知天子之子稱世子春秋傳星曰王世子會于首止是也何以知天子之稱太子尚書曰太子發升于舟是也中候曰廢考立發為太子明文王時稱太子也或云諸侯之子稱世子則春秋傳云晉太子申生鄭太子華齊太子光由是觀之周制太子世子亦不定也漢制天子稱皇帝其嫡嗣稱皇太子諸侯王之嫡稱世子後代咸因之又曰太子夫人無謚者何本婦人隨夫太子無謚其夫人不得有謚士冠經曰天子之元子猶士也無謚知太子亦無謚又曰天子太子諸侯之世子皆以諸侯禮娶與君同示無再之義也又曰天子之太子諸侯之世子皆就於諸外者尊師說先王之道也故曲禮曰聞有來學無往教也易曰匪我求童蒙童蒙求我記曰小學在公宮南之左太學在郊又曰太子群后之太子公卿大夫元士之適子皆造小學小學經藝之宮也太學者辟雍卿射之宮又曰君在立太子者所以防篡殺齊臣子之亂君在者春秋之義殺太子與殺君同罪春秋曰殺其君之子奚齊言君者明與君同也君薨夫人無子有遺腹待其產而立之何尊適重正也曾子問云立適以長不以賢賢不肖未可知也尚書曰知人則哲唯帝難之立子以貴不以長者塞愛憎也故春秋公羊傳曰立適以長不以賢立子以貴不以長列女傳曰魯漆室女倚柱而嘯鄰婦謂之曰何嘯之悲也子欲嫁乎吾為子求偶女曰吾豈嫁哉吾憂魯君老而太子少也鄰婦曰此乃魯大夫之憂也且魯國雖有事婦人何與女曰子知其一不知其二也昔者晉客舍吾家繫馬馬佚馳踐吾園葵使我終歲不厭菜鄰人女奔亡借吾兄追之溺流而死令吾終身無兄今魯君老老必將悖太子少少必愚愚悖之間奸偽互起夫魯國有事禍及眾庶婦人獨安所避之鄰婦謝曰子之慮非吾所及也居三年魯果內亂齊楚攻之男子戰鬭婦人輸不得休息史記曰周厲王奔彘太子靜匿召公之家國人聞之乃圍之召公以其子代王太子太子竟得脫召二相行政號曰共和共和十四年厲王死于彘太子靜長於召公家二相乃立共和是為宣王又曰幽王嬖愛襃姒生子伯服幽王廢后及太子而以襃姒為后伯服為太子太史伯陽曰禍成矣母可奈何申侯怒乃與犬戎共攻殺幽王麗山下虜襃姒於是諸侯共立故幽王太子宜咎是為平生紀年曰幽王八年立襃姒之子曰伯服為太子史記燕世家曰燕見秦且滅六國秦兵臨易水禍且至太子丹陰養壯士二十人使荊軻獻督亢地圖於秦王秦覺殺軻使將軍王剪擊燕二十年秦拔薊燕王亡徙居遼東斬丹以獻秦燕丹子曰太子丹質於秦秦王遇之無禮不得意欲歸秦王不聽謬言令烏白頭馬生角乃可丹仰天而歎烏即白頭馬生角秦不得已而遣之為機發之橋欲陷丹丹過之橋為不發夜到關丹為雞鳴遂得逃歸故怨於秦欲報之養勇士無所不至丹與其傅麴, WYG: ''}
