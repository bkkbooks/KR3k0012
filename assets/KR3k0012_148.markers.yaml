息史記曰周厲王奔彘太子靜匿召公之家國人聞之乃圍之召公以其子代王太子太子竟得脫召二相行政號曰共和共和十四年厲王死于彘太子靜長於召公家二相乃立共和是為宣王又曰幽王嬖愛襃姒生子伯服幽王廢后及太子而以襃姒為后伯服為太子太史伯陽曰禍成矣母可奈何申侯怒乃與犬戎共攻殺幽王麗山下虜襃姒於是諸侯共立故幽王太子宜咎是為平生紀年曰幽王八年立襃姒之子曰伯服為太子史記燕世家曰燕見秦且滅六國秦兵臨易水禍且至太子丹陰養壯士二十人使荊軻獻督亢地圖於秦王秦覺殺軻使將軍王剪擊燕二十年秦拔薊燕王亡徙居遼東斬丹以獻秦燕丹子曰太子丹質於秦秦王遇之無禮不得意欲歸秦王不聽謬言令烏白頭馬生角乃可丹仰天而歎烏即白頭馬生角秦不得已而遣之為機發之橋欲陷丹丹過之橋為不發夜到關丹為雞鳴遂得逃歸故怨於秦欲報之養勇士無所不至丹與其傅麴武書曰丹不肖生於僻陋之國長於不毛之地未曾得覩君子雅訓欲有所陳幸垂覽之丹聞丈夫之通義節恥受辱以生也貞正所羞之見却以虧其節故有刎喉不顧據鼎不過者斯豈樂死而忘生哉其心所守也今秦王反戾天常虎狼其行遇丹無禮諸侯最甚每念之痛入骨髓計燕國之眾不能敵之曠年相守力固不足欲收天下勇士集海內英雄破國空藏以奉養之重幣甘辭以市於秦秦貪我賂而信我辭則一劍之任當千萬之師須臾之間可解丹萬世之恥若其不然令丹生無目於天地死懷恨於九泉必令諸侯無以為歎易水之北未知誰有此蓋亦大夫恥也謹遣書願熟思之史記呂后本紀曰太后高祖微時妃也生孝惠帝為人仁弱高祖以為不類我常欲廢太子立戚姬子如意如意類我幾代太子者數矣賴大臣爭之及用留侯策太子得毋廢又張良世家曰上欲廢太子立戚夫人子趙王如意大臣多諫爭未能得堅決者也呂后恐不知所為人或謂呂后曰留侯善畫計策上信用之呂后乃使建成侯呂澤劫留侯曰君常為上謀臣今欲易太子君安得高枕而臥乎留侯曰始上數在困急之中幸用臣策今天下安定以愛欲易太子此骨肉間雖臣等百餘人何益呂澤強要曰為我畫計留侯曰此難以口舌爭也顧上有不能致者天下有四人四人者年老矣皆以為上慢侮人故逃匿山中義不為漢臣然上高此四人今公誠能無愛金玉璧帛令太子為書卑辭安車因使辯士請之來以為客時時從入朝令上見之則必異而問之上知此四人賢則一助也於是呂后令呂澤使人奉太子書卑辭厚禮迎四人四人至客建成侯所漢十一年黥布反上病欲使太子將往擊之四人相謂曰凡來者以將存太子太子將兵事危矣乃說建成侯曰太子將兵有功則位不益太子無功還則從此受禍矣且太子所與俱諸將皆嘗與上定天下驍將也今使太子將之此無異使羊將狼也皆不肯為盡力其無功必矣臣聞母愛者子抱今戚夫人日夜侍御趙王如意常抱居前上曰終不使不肖子居愛子之上明乎其代太子位必矣君何不急請呂后承間為上泣言黥布天下猛將也善用兵今諸將皆陛下故等夷夷猶餌也乃令太子將此屬無異使羊將狼也莫肯為用且使布聞之則鼓行而西耳晉灼曰鼓行而西言無所畏上雖病強載輜車臥而護之諸將不敢不盡力上雖苦為妻子自強於是呂澤立夜見呂后呂后承間為上泣涕而言如四人意上曰吾惟豎子固不足遣而公自行耳於是上自將兵而東群臣居守皆送至灞上留侯病自強起至曲郵長安縣有曲郵聚見上曰臣宜從病甚楚人剽疾願上無與楚人爭鋒因說上曰令太子為將軍監關中兵上曰子房雖疾強臥而傅太子是時叔孫通為太傅留侯行少傅事漢十二年上從擊破布歸疾益甚愈欲易太子留侯諫不聽因疾不視事叔孫太傅稱說引古今以死爭太子上佯許之猶欲易之及讌置酒太子侍四人者從太子年皆八十有餘鬚眉皓白衣冠甚偉上怪之問曰彼何為者四人前對各言名姓東園公角里先生綺里季夏黃公上乃大驚曰吾求公數歲公避逃我今公何自從吾兒遊乎四人皆曰陛下輕士善罵臣等義不為辱故恐亡匿竊聞太子為人仁孝恭敬愛士天下莫不延頸欲為太子死者故臣等來耳上曰煩公幸卒調護太子如淳曰調護猶營護也四人為壽已畢起去上目送之召戚夫人指示四人者曰我欲易之彼四人輔之羽翼已成難動矣呂后子真而主矣漢書外戚傳曰孝景王皇后武帝母也入太子宮太子幸愛之生三女一男男方在身時王夫人夢日入其懷以告太子太子曰此貴徵也未生文帝崩景帝即位王夫人生男是時薄皇后無子後數歲景帝立齊栗姬男為太子而王夫人男為膠東王長公主嫖有女欲與太子為妃栗姬妬而景帝諸美人皆因長公主見得貴幸栗姬日怨怒謝長主長主不許長主欲與王夫人夫人許之會薄皇后廢長公主日譖栗姬景帝嘗囑諸姬子曰吾百歲後善視之栗姬怒不肯慮言不遜景帝心銜之而未發也長公主日譽王夫人男之美帝亦自賢之又以曩者所夢日符計未有所定王夫人又陰使人趣大臣立栗姬為皇后大行奏事文曰子以母貴母以子貴今太子母號宜為皇后帝怒曰是乃所當言耶遂按誅大行廢太子為臨江王栗姬愈恚不得見以憂死卒立王夫人為皇后男為太子漢武故事曰武帝生猗蘭殿四歲立為膠東王七歲立為皇太子漢書曰衛皇后生戾太子據元狩元年立為皇太子年七歲矣初上年二十九乃得太子甚喜為立禖張晏曰禖者求子月令曰祀子高禖是使東方朔枚皋作禖祝及壯詔受公羊春秋又從瑕丘江公受穀梁及冠就宮上為立愽望苑使通賓客從其所好故多以異端進者元鼎四年納史良娣韋昭曰良娣官也太子有妃有良娣有孺子凡三等產子男進