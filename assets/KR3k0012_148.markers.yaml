  - {type: variant, offset: 455, length: 299, content: 與佐期日中聒而與之語聒讙也欲使失期佐過期乃縊而死經書宋公殺其世子痤平公用伊戾之譖聽夫人左師而之言世子師之言世子無罪而死故稱宋公殺罪之地佐為太子公徐聞其無罪也乃烹伊戾又曰許悼公虐許悼公靈公之子許男買瘧寒疾也五月戊辰飲太子止之藥卒經書夏五月戊辰許世子弒其君買止焯公子襄太子也公疾不瘳止進藥雖嘗而不由醫太子奔晉書曰弒其君禮醫不三世不使君有疾飲藥臣先嘗之親有疾飲藥子先嘗之公疾未瘳而進藥雖嘗而不由醫而卒故圖罪之書弒告於諸侯也君子曰盡心力以事君舍藥物可也原止之無惡藥物不害醫無以加壽命有終故曰舍藥物可也一曰罪止非也刺無良史物讀為勿止實孝能盡心事君舍藥勿以罪之又曰楚平王卒令尹子常欲立子西子西平王之長庶子宜申也, SBCK: 遂定魏略}
