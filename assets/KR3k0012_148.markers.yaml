  - {type: variant, offset: 4801, length: 187, content: 太子及衛氏有隙恐上晏駕後太子所誅會巫蠱事起充因此為姦是時上春秋高意多所惡以為左右皆為蠱道祝詛窮治其事充典治巫蠱遂至太子宮掘蠱得桐木人太子召問少傅石德德懼為師傅并誅因謂太子曰奸臣如此太子將不念秦扶蘇事耶太子急乃收捕充斬以聞遂部賓客為將率與丞相劉屈釐等戰太子兵敗亡不得上怒甚群下憂懼不知所出壺關三老茂上書云子弄父兵罪當笞爾書奏天子感寤太子之亡也東至湖藏匿泉鳩里主人家貧常賣屨以給, WYG: 豐京共搆陷}
