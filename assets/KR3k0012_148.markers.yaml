  - {type: variant, offset: 5655, length: 119, content: 為王好文辭法律元延四年入朝盡從傅相中尉時成帝少弟中山孝王亦來朝獨從傅上以問定陶王對曰令諸侯王朝得從其國二千石傅相中尉皆國二千石故盡從之上令誦詩通習能說他日問中山王獨從傅在何法令不能對帝由此賢定陶王數稱其材為加元服而遣之時年十七矣明年徵立為, SBCK: 爲}
