  - {type: variant, offset: 5783, length: 9, content: 父守藩為諸侯王材質, WYG: 嗣皇業方今多士盈朝當擇賢居任奈何以絃歌鷹犬之才日在其側致令至此乃陛下訓導}
  - {type: variant, offset: 5788, length: 1, content: 侯, SBCK: 賊髙祖省之愕然報曰明日當勘問汝冝早叅四日太宗將左右九人至􅀇武門自衛髙祖巳召裴寂蕭瑀竇延陳叔逹封倫宇文士及顔師古等欲令窮覆其事建成元􅁻行至臨湖殿覺變即廻馬將東㱕宫府太宗隨而呼之元􅁻馬上張弓再三不彀太宗乃射之建成應􅁌而斃又曰髙宗文皇帝太宗弟九子母曰文徳順聖長孫皇后貞觀二年生於東宫之麗正殿封晉}
