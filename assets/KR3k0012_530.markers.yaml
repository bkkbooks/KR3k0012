  - {type: variant, offset: 972, length: 1, content: 所, krp: 又祭統曰及時將祭君子乃齋齋之爲言齊也齋不齊}
  - {type: variant, offset: 974, length: 3, content: 因郊祭, SBCK: 致齋者也是故君子非有大事也非有恭敬也則不齋不齋則於物無防也􅄝欲無止也及其將齋也防其邪物訖其􅄝欲耳不聽樂故記曰齋者不樂言不敢散其志也心不茍慮必依於道手足不茍動必依於禮是故君子之齋也專致其精明之徳也故散齋七日以定之致齋三日以齊之定之之謂齋齋者精明之至也然後可以交於神明也定者定其志意是故先期旬有一日宫宰􅀫夫人夫人亦散齋七日致齋三日宫宰守宫官也􅀫讀爲肅肅猶戒也戒輕肅重也君致齋於外夫人致齋於内然後㑹於太廟又坊記曰子云七日戒三日齋承一人焉以爲尸過之者趍走以教敬也戒謂散齋也承猶事也又表記曰子曰齋戒以事􅀑神擇}
