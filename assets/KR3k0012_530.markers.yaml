  - {type: variant, offset: 116, length: 1, content: 月, SBCK: 檀}
  - {type: variant, offset: 116, length: 675, content: 月令曰孟春其祀戶孟夏其祀竈季夏其祀中霤孟秋其祀門孟冬其祀行餘吉吉禮門白虎通曰何謂五祀者門戶竈井中霤也又曰曲禮下記云天子祭天地四方山川五祀歲遍諸侯方伯祀山川祭五祀歲遍士祭其先凡祀有廢之莫敢舉也有舉之莫敢廢也非所當祭而祭之名為淫祀無福祭五祀所以歲遍何慎五行也五經異義曰大戴說禮器云竈者老婦之祭許君按月令孟夏之月其祀竈五祀之神王者所祭非老婦也鄭玄曰竈神祝融是老婦又曰王為群姓立七祀一曰司命主督察人命也二曰中霤王宮室居處也三曰門四曰戶主出入五曰國行主道路也六曰大厲主殺也七曰竈主飲食也漢書議曰祠五祀謂五行金木水火土也木正曰勾芒火正曰祝融金正曰蓐收水正曰玄冥土正曰後土皆古賢能治成五行有功者也主其神祀之魏名臣奏曰秦靜議云祭法七祀有國行今月令謂行為井是以俗廢行而祀井武帝始定天下興復舊祀造祭祀門戶井竈中霤文帝稱詔靜按凡諸祠祀所以尊敬神靈不宜稱詔高堂隆議曰國中霤門井竈多不遍唯祀在者故曰祭五祀在於廟今每門戶輒祭之自漢以來非舊典也祭井自漢從水類不列五祀宜除井祀行世本曰徵作禓五祀徵者殷王八世孫也禓者強死男也謂時難索宣驅疫逐強死鬼也五者謂門戶及井竈中霤也傅玄五祀議曰禮大記云室中央中霤謂四霤之中也祭於漏井蓋失之矣七祀之文皆云祀行而無井祭竈而不祭井於事則闕夫設祀者非唯報功而已亦神道設教使民慎之幽冥也臣以為帝之都城宜祭一門正宮一門正室一戶井竈中霤亦各擇其一正者祭之四望尚書舜典曰正月上日受終于文祖在璿璣玉衡以齊七政肆類于上帝禋于六宗望於山川遍于群神歲二月東巡狩至于岱宗柴望秩于山川肆覲東后孔安國曰望秩于山川者以尊卑祭之也五岳視三公四瀆視諸侯其餘小者或卿大夫伯子男周禮春官, WYG: 檀弓}
