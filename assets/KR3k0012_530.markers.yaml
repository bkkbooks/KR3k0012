  - {type: variant, offset: 974, length: 3, content: 因郊祭, WYG: 致其齊也是故君子非有大事也非有恭敬也則不齋不齊則于物無防也嗜欲無止也及其將齋也防其邪物訖其嗜欲耳不聽樂又曰齋者不樂言不敢散其志也心不苟慮必依于道手足不苟動必依于禮是故君子之齋也専致其精明之徳也故散齋七}
