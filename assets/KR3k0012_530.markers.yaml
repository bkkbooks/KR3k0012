  - {type: variant, offset: 3150, length: 310, content: 懍然改容曰朕為天下主無德及人致此災旱今又謫見于上若三日不雨當退歸南位更選賢明以主天下宰臣嗚咽流涕各請罪乞免相位是夜澍兩大洽又曰孔戣為廣州剌史先是准詔禱南海神多令從事代戣必自越風波而往韓愈為潮州作詩美之華陽國志曰梁輔為郡五官時天大旱請雨不降輔出禱乃積薪祝神曰二日不雨則欲自焚謝罪百姓言終而雨長沙郡耆舊傳曰祝良為洛陽令時亢旱天子祈不得良乃曝身階庭告誠引罪自晨至中紫雲沓起甘雨登降民為之歌曰天久不雨烝民失所天王自出祝令特苦精符感應滂沱而下列仙傳曰歷陽有彭祖仙室前世云禱請風雨莫不輒應常有兩虎在祠左右今日祠訖即有虎跡異苑曰晉簡文既廢世子道生次子郁又早卒而未有息嗣濮陽令在弟前禱至三更鬱有黃氣自西南來逆室前爾夜幸李太后而生孝武皇帝, WYG: ''}
