  - {type: variant, offset: 2941, length: 162, content: 以漢文帝每有祭祀使有司敬而不祈其見超然可謂盛德若使神明無知則安能降福必其有知則私己求媚之事君子尚不可悅也況於明神乎由此言之則履信思順自天祐之茍異於此實難致福故堯舜之務唯在脩己以安百姓管仲云義於人者和於神蓋以人為神主故但務安人而已虢公求神以致危亡王莽妄祈以速漢兵古今明誡書傳所紀望陛下每以漢文孔子之意為準則百福具臻矣上深嘉美之, WYG: 與}
