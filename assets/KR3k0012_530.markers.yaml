  - {type: variant, offset: 999, length: 522, content: 皆天地之別神從官也緣天地之意亦欲及之故歲一祭之禮日於南門外禮月四瀆於北門外禮山川丘陵西門外祭風伯雨師於東門外各即其位也以是明之其祭之柰何乎曰祭日者懸祭月者毀祭風者明祭雨者布䟽祭山川者沉各象其貌也三輔黃圖曰宰衡王莽奏曰冬至使有司祭天神於南郊高祖配而望群陽夏至使有司祭地祇於北郊高后配而望群陰隋書志曰梁朱異議鄭眾云四望謂日月星海鄭玄云謂五岳四瀆尋二鄭之說牙有不同竊以望是不即之名凡厥遙祭皆有斯目豈容局於星海拘於海瀆請今天司有關水旱之義爰有四海名山大川能興雲致雨一皆備祭高禖禮記月令曰仲春玄鳥至之日以太牢祀于高禖天子親往后妃率九嬪御乃醴天子所御帶以弓韣授以弓矢立於高禖之前蔡邕章句曰高禖祀名也高猶尊也禖者所以祈子孫之祀也天子所御謂后妃以下主妾御者韣弓衣也祝以高禖之命飲以醴酒帶以弓衣尚使得男者也鄭玄注曰玄鳥遺卵娀簡狄吞之生契後以為禖官嘉祥而立祀也漢書曰太子據立為皇太子初上年二十九乃得太子甚喜為立禖張晏曰禖求子禖神使東方朔枚皋作禖祝續漢書曰仲春之月立高禖祀於城南禮以特牲五經異義曰王者一歲七祭天地仲春后妃郊禖禖亦祭天也五經要義曰契母簡狄以玄鳥至之日祀於高禖而生契高禖者蓋先王所以祈子孫之祀也玄鳥感陽而至集人棟宇有孳乳之祥故重其至日因以用事五經異義曰鄭, WYG: 又表}
