  - {type: variant, offset: 3552, length: 3, content: 神傷民, krp: 如今魌頭也時儺四時作方相氏以儺却凶悪也月令季冬命國儺索搜也續漢書曰先臘一日大儺謂}
  - {type: variant, offset: 3556, length: 0, content: '', SBCK: 耳名之儺者取群􅀠爲儺儺之聲周禮夏官曰方相氏掌蒙熊皮黄金四目􅀇衣朱裳執戈楊盾帥百􅀠而時儺以索室歐疫蒙冐也冐熊皮者以驚歐疫癘之􅀑如今魌頭也時儺四時作方相氏以儺却凶􅁖也月令季冬}
