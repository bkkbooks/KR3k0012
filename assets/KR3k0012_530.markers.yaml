  - {type: variant, offset: 998, length: 178, content: 也皆天地之別神從官也緣天地之意亦欲及之故歲一祭之禮日於南門外禮月四瀆於北門外禮山川丘陵西門外祭風伯雨師於東門外各即其位也以是明之其祭之柰何乎曰祭日者懸祭月者毀祭風者明祭雨者布䟽祭山川者沉各象其貌也三輔黃圖曰宰衡王莽奏曰冬至使有司祭天神於南郊高祖配而望群陽夏至使有司祭地祇於北郊高后配而望群陰隋書志曰梁朱異議鄭眾云四望謂日月星海鄭玄云謂五岳四瀆尋二鄭之說牙有, SBCK: ''}
