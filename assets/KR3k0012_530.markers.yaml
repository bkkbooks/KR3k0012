  - {type: variant, offset: 2811, length: 5, content: 信否李藩對, WYG: 國有常刑冕以誓皇太子更其詞云各揚其職肅奉常儀又曰憲宗元和中南郊隂氣凝閉浃旬不開宰臣議請改日上曰郊廟事重吾齋戒有日豈可廢乎至獻享之際景物澄清人大恱鬼谷子曰周有豪士居鬼谷號為鬼谷先生蘇秦張儀往見之先生曰吾將為二子陳言至道子其齋戒擇日而學後秦儀齋戒而往莊子曰顔回曰吾無以進矣敢問其方仲尼曰齋吾將語若顔回曰回之家貧唯不飲酒不茹葷者數月矣若此則可以為齋乎曰是祭祀之齋非心齋也回曰敢問心齋仲尼曰一若志無聽之以耳而聼以心無聴之以心而聽以氣唯道集虛虛者心齋也又曰梓慶削大木為鐻鐻成見者驚猶鬼神魯侯見而問焉曰子何術以至此}
