  - {type: variant, offset: 507, length: 280, content: 廟今每門戶輒祭之自漢以來非舊典也祭井自漢從水類不列五祀宜除井祀行世本曰徵作禓五祀徵者殷王八世孫也禓者強死男也謂時難索宣驅疫逐強死鬼也五者謂門戶及井竈中霤也傅玄五祀議曰禮大記云室中央中霤謂四霤之中也祭於漏井蓋失之矣七祀之文皆云祀行而無井祭竈而不祭井於事則闕夫設祀者非唯報功而已亦神道設教使民慎之幽冥也臣以為帝之都城宜祭一門正宮一門正室一戶井竈中霤亦各擇其一正者祭之四望尚書舜典曰正月上日受終于文祖在璿璣玉衡以齊七政肆類于上帝禋于六宗望於山川遍于群神歲二月東巡狩至于岱宗柴望秩于山川肆覲東后孔安國曰望秩于山川者以尊卑祭之也五岳視三公四瀆視諸侯其餘小者或卿大夫伯子男, SBCK: ''}
