  - {type: 'tls:seg', offset: 1537, content: '', id: KR3k0012_CHANT_530-19a.7}
  - {type: variant, offset: 1537, length: 574, content: 高辛氏世娀簡狄吞鷰子而生契後王以為禖官嘉祥其祀焉王權問曰以注言之先商之時未有高禖生民詩曰克禋克祀以祓無子傳以為古者必以郊禖焉姜嫄禋祀上帝而生稷是則郊禖之祀非以生契之後立也譙喬荅曰先商之時自必有禖氏祓除之祀位在南郊蓋亦以玄鳥至之日然其所禋乃於上帝娀簡狄吞乙子之後王以為禖官嘉祥祀之以配帝謂之高禖晉束晳高禖壇石議曰元康六年高禖壇上石破為二段詔書問置此石來幾時出何經典今應復不博士議禮無高禖置石之文未知造設所由既已毀破無可改造設高辛氏有簡狄吞卵之祥今此石有吞卵之象蓋俗說所為而史籍無記可但收聚復於舊處而已太常以為吞卵之言蓋是逸俗之失義因今毀破便宜廢除下四府博士議賊曹屬束晳議夫未詳其置之故而欲必其可除之理理不可然按郊祀志秦漢不祀高禖漢武帝五子傳武帝晚得太子始為立禖其事未之能審許慎五經異說云山陽民祭皆以石為主然則石之為主由來尚矣其此象矣而祭禮龜策祭器弊則埋之而改置新石今破則宜埋而更造不宜遂廢收集破石積之故處於禮無依於事不肅思所未安也時公卿從太常所處此議不用其後得高堂隆故事魏青龍中造立此禮詔書更鐫石令如舊置高禖壇上埋破石入地一丈隋書禮志曰梁太廟北門內道西有石文如竹葉小屋覆之宋元嘉中脩廟所得陸澄以為孝武時郊禖之石然則江左亦有此禮矣後齊高禖為壇於南郊傍廣輪二十六尺高九尺四陛三壇禱祈周書曰四月孟夏王初祈禱于宗乃嘗麥于廟毛詩甫田曰琴瑟擊鼓以御田祖以祈甘雨以, WYG: 齋}
  - {type: variant, offset: 1537, length: 9, content: 高辛氏世娀簡狄吞鷰, krp: ''}
