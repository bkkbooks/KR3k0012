  - {type: variant, offset: 3552, length: 3, content: 神傷民, WYG: 于禁中設桃梗鬰儡葦茭畢執事者皆罷葦㦸桃枝以賜公卿將軍禮緯曰顓頊有三子生而亡去為疫鬼一居江水是為瘧鬼􅂒鬼一居宫室區隅善驚人小兒于是常以正嵗十二月令禮官方相氏掌熊皮黄金四目𤣥衣纁裳執戈揚盾帥百𨽻及童子而時儺以索室而駈疫鬼以桃弧葦矢工鼓且射}
