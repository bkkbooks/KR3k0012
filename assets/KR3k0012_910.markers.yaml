  - {type: variant, offset: 1867, length: 337, content: 歲之狐為淫婦百歲狐為美女又為巫神禮斗威儀曰君乘火王政平南海輸以文狐春秋潛潭巴曰白狐至國民利不至下驕恣韓詩外傳曰狐水神也春秋後語曰楚宣王以昭奚恤為相諸侯畏之王問群臣曰吾聞北方畏昭奚恤亦誠何如江乙對曰虎求百獸而食之得狐狐曰子無噉我天帝令我長百獸子若食我是逆天帝之命子以我為不信我為子先行隨我後觀百獸見我能無走乎虎以為然隨狐而行百獸見之皆走虎不知獸之畏已反以為畏狐也今王地方五千里帶甲百萬而任之於昭奚恤然北方非畏奚恤其實畏王之甲兵故人臣見畏者君威也君不用則威亡矣趙曄吳越春秋曰禹年三十未娶行塗山恐時暮失辭曰吾之娶也必有應已矣乃有白狐九尾而造於禹禹曰白者吾服也九尾者王證也於是塗山人歌曰綏綏白狐九尾龐龐成于家室我都彼昌禹乃娶塗山女淮南子曰夫狐之搏雉也必卑體弭毛以待其來也雉見而信之故, WYG: 餘皮}
