  - {type: variant, offset: 949, length: 3, content: 謀父諫, SBCK: 者飬之成群誑狙曰與􅀂茅朝三而暮四衆狙皆怒曰朝四而暮三衆狙皆喜韓子曰燕王微巧術人請以􅁄刺之端爲母猴母猴成巧人曰人主欲觀之必半􅀊}
  - {type: page-break, offset: 949, content: '', id: KR3k0012_SBCK_910-3b}
  - {type: variant, offset: 949, length: 3, content: 謀父諫, WYG: 之子少有文彩故守吏職彌猴乘土牛一何遲衆悦服荘子曰吳王浮于江登于狙且余切之山衆狙見之怐然奔走有一狙焉委蛇攫㧓見巧乎王王射之敏給搏㨗矢矢徃雖速而狙猶能摶之也王命相者趨射之狙死王顧謂其友顔}
  - {type: page-break, offset: 949, content: '', id: KR3k0012_WYG_910-5a, image: WYG0901/WYG0901-0112c.png}
  - {type: variant, offset: 949, length: 3, content: 謀父諫, krp: 者飬之成群誑狙曰與若茅朝三而暮四衆狙皆怒曰朝四而暮三衆狙皆喜韓子曰燕王微巧術人請以棘刺之端爲母猴母猴成巧人曰人主欲觀之必半歲}
  - {type: punctuation, offset: 952, content: ，, id: KR3k0012_CHANT_910-bkkpn305}
  - {type: 'tls:seg', offset: 952, content: '', id: KR3k0012_CHANT_910-12a.8}
  - {type: variant, offset: 953, length: 1, content: 聽, SBCK: 入宫不飲酒食􅁏􅀨霽日出視之晏隂之間而􅁄刺之母猴乃可見也燕王恩飬之不能觀也譙子法訓曰人之所以貴者以其禮節也人而無禮者猕猴乎雖人象而蟲質也淮南子曰楚有烹猴者而紿徒亥切其􅀖人􅀖人以爲狗羮而甘之後聞其猴也據地而吐之盡冩其所食此未爲知味者也抱朴子曰余友人騰永叔嘗養一大猕猴鏁着床間後忽齧殺人永叔使合鏁埋之後百許日有見􅀑者徃見猕猴走上永叔承塵上不悟見􅀑驚指之猕猴何以􅀍傷流血永叔曰始乃知皆有􅀑也又曰山中由曰稱人君者猴也猴壽八百􅀊王充論衡曰鹿之角足以觸大猴之手足以摶鼠然而鹿制於大猴服於䑕氣不利也神仙傳曰有人種􅁰山中正患猕猴食之聞介象有道聊從之乞辟猴之法象曰無他法也汝明日徃􅁰所望見群猴便大喚語之云巳白介君教莫復侵食􅁰此人明日視􅁰遇群猴適欲下樹承象語猕猴各自還山}
  - {type: page-break, offset: 953, content: '', id: KR3k0012_SBCK_910-4a}
  - {type: variant, offset: 953, length: 1, content: 聽, WYG: 疑曰之狙也伐其巧恃其便以傲予以至此殛也列子曰宋有狙公者養之成羣誕狙曰與之芧朝三而暮四衆狙皆怒曰然則朝四而暮三衆狙皆喜韓子曰燕王徴巧術人請以棘刺之端為母猴母猴成巧人曰人主欲觀之必半歳不入宫不飲酒食肉雨霽日出視之晏隂之間而棘刺之母猴乃可見也燕王恩養之不能觀也譙子洪訓曰人之所以貴者以其禮莭也人而無禮者猴乎雖人面而蟲箕也淮南子曰楚有烹猴者而給徒立切其邦人邦人以為狗羔美而甘之後聞其猴也據地而吐之盡寫其所食此未為知味者也抱朴子曰余友人滕永叔嘗養一大獮猴鎻着床間犬忽齧殺之永叔便合鏁埋之後百許日有見獮猴走上永叔承塵上驚指之曰獮猴何以被傷血流斷走乎永叔曰始乃知猴死復有鬼也又曰山中申日稱人君者猴也猴壽八百歲王充論衡曰鹿之角足以觸犬猴之手足以搏䑕然而鹿制於犬猴服於䑕氣不利也神仙傳曰有人種黍山中正患獮猴食之聞介象有道聊従之乞避猴之法象曰無他法也汝明日往黍所望見羣猴便大喚語之已白介君教莫復侵食黍此人明日視黍遇羣猴適欲下樹述象語獮猴各自還山}
