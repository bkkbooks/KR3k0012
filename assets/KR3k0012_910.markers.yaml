  - {type: variant, offset: 977, length: 0, content: '', SBCK: 南康營氏伍考之伐舡材忽見太杜樹上有一猴懷孕考之便登木逐猴騰赴如飛樹旣􅀌逈下又有人猴知不脫因以左手抱樹枝右手撫腹考之禽得遥擺地殺之割其腹有一子形狀垂産尓夜夢見一人稱神以殺猴責讓之後考之病經旬􅀄如狂因漸化爲虎毛􅁂爪牙悉生音聲亦變遂逸走入山永失蹤跡}
  - {type: page-break, offset: 977, content: '', id: KR3k0012_SBCK_910-4b}
  - {type: variant, offset: 977, length: 5, content: 周幽王時牛, WYG: 南康營民伍考之伐船材忽見大樹上有一猴懐孕考之便登木逐猴騰赴如飛樹既孤逈下又有人猴知不脫因以左手抱樹枝右手撫腹考之擒得母猴殺之割其腹見有一子形狀垂産夜夢見一人稱神以殺猴責譲之後考之病經旬初如狂因漸}
  - {type: variant, offset: 977, length: 0, content: '', krp: 南康營氏伍考之伐舡材忽見太杜樹上有一猴懷孕考之便登木逐猴騰赴如飛樹旣孤逈下又有人猴知不脫因以左手抱樹枝右手撫腹考之禽得遥擺地殺之割其腹有一子形狀垂産尓夜夢見一人稱神以殺猴責讓之後考之病經旬𥘉如狂因漸化爲虎毛鬢爪牙悉生音聲亦變遂逸走入山永失蹤跡}
