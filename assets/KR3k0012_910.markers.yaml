  - {type: variant, offset: 1512, length: 275, content: 後其禍僅可免也藻如之母亦扶病而出家人既集堂屋五間拉然暴崩唐書曰哥舒翰素與祿山思順不協上每和解祿山謂翰曰我父是胡母是突厥公母是突厥公是胡與公族類頗同何得不相親乎翰應之曰古人云野狐向窟嗥不祥以其忘本也敢不盡心焉祿山甚怒以為譏其胡也莊子曰夫豐狐文豹是何罪之有哉其皮為之災也管子曰代出狐白之皮狐應陰陽之變六月而一見公貴買之代人忘其難得喜其貴價必相率而求之取此物者因令齊載金錢之代谷求狐白皮代王聞之果去其農處山林求狐二十四月不得一狐離皮聞而伐之王即將其士卒服於齊慎子曰廊廟之材非一木之枝狐白之裘非一狐之皮范子曰狐皮出天外穆天子傳曰天子獵於滲澤得白狐玄貉祭於河宗, SBCK: ''}
