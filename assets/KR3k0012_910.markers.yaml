  - {type: variant, offset: 1378, length: 133, content: 胡也天意若曰有胡人居于此城南面而居也後竟為沮渠蒙遜所滅王隱晉書曰劉世則女病媚積年韓友令作布囊張著窗間乃閉戶驅逐須臾囊大脹急縛口懸樹間視之唯有二三斤狐毛遂差又曰淳于智濟北人夏侯藻母病因五鼓中出詣智卜有一狐當門向之嗥唳藻愁愕遂駞詣智智曰禍甚急君速歸在狐嗥喚處撫心啼坐勿休, SBCK: 果}
