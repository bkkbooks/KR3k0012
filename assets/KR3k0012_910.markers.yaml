  - {type: variant, offset: 1190, length: 0, content: '', krp: 木玃老者爲玃大而黒長前辟玃之白腰者爲獑猢博物志曰蜀中南髙山上有物似猕猴長七尺能行揵走名曰猴玃一名馬化或曰猳玃同行道婦}
  - {type: variant, offset: 1192, length: 3, content: 言曰狐, SBCK: 不食飬者母輒}
