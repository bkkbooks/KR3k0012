  - {type: variant, offset: 1025, length: 1, content: 舂, SBCK: 余嘗至綏安縣逢徒逐猴猴母􅀒子􅃿水水雖深而清乃以㦸㓨之自恊以下中斷脊尚連抄着舡中子隨其傍以手捫子而死陸機與弟雲書曰監徒武庫建始殿諸房中見有兩足猴真恠物也異物志曰南方人以猕猴頭爲鮓􅀽淑排諧集常}
  - {type: variant, offset: 1025, length: 1, content: 舂, WYG: 余嘗至綏安縣逄徒逐猴猴母負子没水水雖深而清乃以㦸刺之自脇以下中㫁脊尚連取着船中子隨其傍以手捫子而死陸機與弟雲書曰監徒武庫建始殿諸房中見有兩足猴真怪物也異物志曰南方以彌猴頭為鮓袁淑俳諧集常}
  - {type: variant, offset: 1025, length: 1, content: 舂, krp: 余嘗至綏安縣逢徒逐猴猴母負子沒水水雖深而清乃以㦸㓨之自恊以下中斷脊尚連抄着舡中子隨其傍以手捫子而死陸機與弟雲書曰監徒武庫建始殿諸房中見有兩足猴真恠物也異物志曰南方人以猕猴頭爲鮓袁淑排諧集常}
  - {type: variant, offset: 1027, length: 1, content: 百, SBCK: 王九命文曰及至圗身失所羈束人間馴纓服制惟意所牽登㨕而遨抱梁而眠拾摭遺餘恣口所便後漢王延壽王孫賦曰原夫天地之造化實神偉之屈竒道􅀇微以宻妙信無􅀄而弗爲王孫狡}
  - {type: variant, offset: 1027, length: 0, content: '', WYG: 王九命文曰及至圖身失所覊靮人間馴纓服制惟意所牽登楹而遨抱梁而眠捨摭遺餘恣口所便後漢王延夀王孫賦曰原夫天地之造化寔神偉之屈竒道淵微以宻妙信無物而弗為有王孫之狡獸形陋觀而醜儀顔狀類乎老公軀體似乎小兒眼睚􅀈以眩䘏眎􅀈睫以䀗睳突高匡而曲頞䁵􅀈厯而隳離鼻􅪱齁以䶋􅦃耳聿役以適知口嗛􅀈以䶨齺脣􅱎㗩以􅬯􅀈齒厓厓以齴齴嚼唯􅰘而囁唲儲糧食於兩頰稍委輸於胃脾踡蹲而狗踞聲厯鹿而喔吚或嗝嗝而􅢛􅢛又嘀􅢛其若嗁姿僭傔以總贛豁盱䦧以瑣􅀈眙睕䁓而􅀈睗盶􅀈􅀈而踧􅀢生深山之茂林處嶄巖之嶔﨑性僄猜而㺕疾態鋒出而横施縁}
  - {type: page-break, offset: 1027, content: '', id: KR3k0012_WYG_910-7b, image: WYG0901/WYG0901-0113d.png}
