  - {type: variant, offset: 943, length: 0, content: '', SBCK: 南征一軍盡化君子爲猨爲鵠小人於千仞爲沙爲泥張載論曰白猨玄豹藏於櫺檻何以知其接垂條於千仞孝子傳曰猨􅢈屬也或黄或黑通胂音申輕勦子小切善縁妙吟雌爲人所得終不徒生華陽國志曰鄧芝見猨抱子在樹上引弩射之中猿母其子爲拔箭以葉塞瘡芝乃歎息􅄬弩水中冝都山川記曰峽中猿鳴至清山谷傳其響冷泠不絶行者歌之曰巴東三峽猨鳴悲猨鳴三聲淚沾衣荆州圗經曰冝都夷道縣西山頂上有古墓名曰女王冢不詳其人林則女貞戰則白猨范汪荆州記曰夷陵縣陜口山非日夜半不見日月多猿鳴至清逺山海經圗讃曰白猿肆巧由基撫弓數如循環其妙無窮猴漢書曰韓生勸項羽都􅀜中羽曰吾聞冨貴不還故郷如衣錦夜行乃燒宮室都彭城韓生曰人言楚人沐猴而冠果然又曰張信少府檀長卿爲沐猴與狗􅋐蓋寛饒奏免之張晏日沐猴猕猴也王隱晉書曰護軍張邵母病淳于筮之使西出市弥猴繫母臂令傍人抱之拍猴恒使作聲三日三夜放去猴出門即爲犬所殺母於此漸差郭頒魏晉丗語曰司馬宣王辟州泰爲新城太守尚書鍾毓謂泰曰君釋􅄄登宰府乞児乗小車一何駛泰曰君名公之子少有文彩故守吏職猕猴乘􅁟牛一何遲衆賔恱服莊子曰呉王浮于江登于狙且余切之山衆狙見之恂然弃而走有一狙焉委虵玃搔見巧乎王王射之敏給搏矢矢徃雖速而狙猶能}
