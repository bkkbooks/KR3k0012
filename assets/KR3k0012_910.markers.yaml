  - {type: variant, offset: 1192, length: 3, content: 言曰狐, krp: 好者輙盗之以去人不得知行者毎經過其旁皆以其長繩相引然故不兔此能別男女氣臭故取女不取男取玄而爲家室其無子者終身不得還十年之後形類之意亦迷惑不復思歸有子者輒拘送還其家産子皆如人有不食飬者母輒}
