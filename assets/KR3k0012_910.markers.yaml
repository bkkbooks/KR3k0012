  - {type: variant, offset: 2456, length: 837, content: 餘里得書二千卷又曰河冰厚數尺冰始合車馬未過須狐先行此物善聽水無聲乃過酈善長水經注曰狐性多疑故俗有狐疑之說管輅傳曰夜有一小物如獸手持火以口吹之書生舉刀斫斷腰視之狐也郭璞九尾狐贊曰青丘奇獸九尾之狐有道祥見出則衘書作瑞於周以摽靈符劉敬叔異苑曰有胡道洽者自云廣陵人好音樂醫術之事體有臊氣恒以名香自防唯忌猛犬自審死日誡弟子曰氣絕便殯勿令狗見我尸也死於山陽歛畢覺棺空即開看不見尸體時人咸謂狐也搜神記曰酒泉郡每太守到官無幾輒卒死後渤海陳斐使此郡斐行卜卜者曰遠諸侯放伯永能解此則無憂斐既到官侍有張醫有王侯卒有史侯斐恒遠之夜半有上斐被者斐便以被冒取之物跳踉音郎訇訇作聲乃言曰我無惡意當深報府君府君曰汝為何魅曰我本百年狐今為魅垂當神聽一放我我字伯永府君有急難呼我斐乃喜便放之忽然有赤光如電後每事先以語斐於酒泉境界無毫毛之奸咸曰聖君月餘主簿李音私通斐侍婢既而驚懼遂為伯永所白遽與諸僕謀殺斐伺旁無人便伏人欲格殺之斐即呼伯永有如曳疋絳諸僕伏地失魂乃以次縛取皆伏即殺音等伯永乃辭謝斐曰未及白奸乃為府君所召猶用慚又曰燕昭王墓有老狐化男子詣張華講說華怪之謂電孔章曰今有男子少美高論孔章曰當是老精聞燕昭王墓有華表柱向千年可取照之當見如言化為狐又曰有一書生吳中皓首稱胡博士教授諸生忽復不見九月九日士人相與登山遊觀聞講書聲命僕尋之見空冢中群狐羅列見人即走老狐獨不去是皓首書生續搜神記曰襄陽習鑿齒為荊州主簿從桓武帝出獵時大雪於江陵城西見草上雪氣出伺視見一黃物射之應箭死往取乃一老雄狐腳上帶絳綾香囊又曰吳郡顧旃獵至一崗忽聞人語聲云咄咄今年衰乃與眾尋覔崗項有一穽是古時冢見一老狐蹲冢中前有一卷簿書老狐對書屈指有所計校放犬咋殺之取視口中無復齒頭毛皆白簿書悉是奸愛人女名已經奸者朱鉤頭所䟽名有百數旃女正在簿次金樓子曰狐白之裘天子被之而在廟堂為狐計者不若走於平澤狢說文曰狢似狐善睡周禮考工記曰狢踰汶則死土氣然也爾雅曰狢子狟穆天子傳曰天子獵於滲澤得玄狢以祭河宗後秦記曰姚襄遣參軍薛瓚使桓溫溫以胡戲瓚瓚曰在北曰狐在南曰狢何所問也, SBCK: ''}
