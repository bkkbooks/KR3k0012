  - {type: variant, offset: 103, length: 2, content: 伯石, SBCK: 楚王亡其猨於林木爲之殘宋王亡其珠於池中魚爲之殫又曰置猨檻中則與豚同非不巧捷也無所肆其能也呉越春秋曰趙王問范蠡手戰之術范蠡荅曰臣聞趙有處女國人稱之願王請問之手戰之道也於是王乃請女女將北見王道逢老人自稱􅀽公􅀽公問女曰聞子善爲劒願得一觀之處女曰妾不敢有所隱也惟公所試公即挽林抄之竹似桔橰末折墮地女接取其末􅀽公操其夲而㓨處女應節入之三入女因舉杖擊之􅀽公則飛上樹化爲白猨吕氏春秋曰荆王有白猨三射之則摶樹而熈使飬由基射之}
