  - {type: variant, offset: 207, length: 313, content: 或放狼令齧殺之建觀而大笑為樂又曰高祖使太子將兵四皓曰今使太子將兵無異羊將狠也宋書曰王仲德初遇符氏之敗兄叡同起義兵與慕容垂戰敗仲德被重創走與家屬相失路經大澤困未能去臥林中有一小兒青衣年可七八歲騎牛行見仲德驚曰已食未仲德言飢小兒去須臾復來得飯與之食畢欲行而暴雨莫知津逕有一白狼至前仰天而號號訖銜仲德衣因渡水仲德隨後得濟與叡相見後魏書曰匈奴單于生女姿容甚美國人皆以為神單于曰吾有此女安可配人將以與天乃於國無人之地築高臺置二女其上曰請天自迎之經三年其母欲迎之單于曰不可未徹之間復經一年乃有一老狼晝夜守臺下為穴經時不去其小女曰吾父處我於此欲與天而今狼來或是神物遂乃就之其姊大驚曰此是畜生無乃辱父母也妹不從下為狼妻而產子後遂滋繁成國故其民, SBCK: ''}
