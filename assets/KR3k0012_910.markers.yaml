  - {type: variant, offset: 1027, length: 1, content: 百, krp: 王九命文曰及至圗身失所羈束人間馴纓服制惟意所牽登㨕而遨抱梁而眠拾摭遺餘恣口所便後漢王延壽王孫賦曰原夫天地之造化實神偉之屈竒道玄微以宻妙信無𥘉而弗爲王孫狡}
  - {type: variant, offset: 1028, length: 0, content: '', WYG: 仞之高木攀窈褭之長枝背牢落之峻壑臨不測之幽谿尋柯條以宛轉或捉腐而登危或羣跳而電透或爪懸而匏垂猱説文曰猱貪}
  - {type: variant, offset: 1029, length: 8, content: 所藂爰有狼材野馬, SBCK: 形陋觀而醜儀顔狀􅀋乎老公軀體似乎小児眼睚五皆切􆁱五構切以􅸵音血視職音戢睫側夾切以䀗乎恱切睳䆕烏决切髙匡而曲頞䁵音儇可切歴而隳離鼻􅪱許解切齁許侯切以䶋音吸􅦃許夾切耳聿役以䁤音䁤知口嗛呼忝切呥音冉以䶨則咸切齺音鄒脣􅃖渉切㗩而躡切以􅬯疋里切齒崖崖以齡音爵任音荏􅸎音染而囁入葉切兒儲粮食於兩頰稍委輸於胃脾腃兎蹲而狗聲歴鹿而啒咿或嗝嗝苦革切而􅢛􅢛音的嗅火歴切􅀂啼姿僣傔呼店切而㹅贛音貢豁盱䦧以頊生深}
