  - {type: variant, offset: 2240, length: 45, content: 歲滿三百暫變為人形西京雜記曰廣川王玄疾藂其無賴少年遊獵無度國內冢墓盡發之嘗發欒書冢無餘物有, SBCK: ''}
  - {type: variant, offset: 2240, length: 215, content: 歲滿三百暫變為人形西京雜記曰廣川王玄疾藂其無賴少年遊獵無度國內冢墓盡發之嘗發欒書冢無餘物有一白狐見人驚走左右戟之不得傷左足於是王夢一丈夫髮眉盡白來謂王曰何故傷吾左足以杖叩王左腳王乃患腳至死不羗白虎通曰狐死首丘不忘本也德至鳥獸則九尾狐見九者子孫繁息也於尾者後當盛也崔豹古今注曰章帝元和二年白狐九尾見信都魏略曰文帝受禪九尾狐見於譙都名山記曰狐者先古之淫婦也其名曰紫紫化而為婦故其名自稱阿紫伏滔北征記曰皇天塢北古特陶穴晉時有人逐狐入穴行, WYG: ''}
