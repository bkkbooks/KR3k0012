  - {type: variant, offset: 1108, length: 0, content: '', SBCK: 謂之木玃老者爲玃大而黒長前辟玃之白􅆎者爲獑猢􅀶物志曰蜀中南髙山上有物似猕猴長七尺能行揵走名曰猴玃一名馬化或曰猳玃同行道婦人有好者輙盗之以}
