  - {type: variant, offset: 522, length: 3, content: 聲長歌, SBCK: 其氣也抱朴子曰玉䇿記稱猨夀五百􅀊則變而爲玃居縳切千􅀊則變爲老人}
  - {type: variant, offset: 522, length: 3, content: 聲長歌, WYG: 其氣也抱朴子曰玊䇿記稱猨夀五百歳則變而為玃居縳切千歳則變為老人}
  - {type: variant, offset: 522, length: 3, content: 聲長歌, krp: 其氣也抱朴子曰玉䇿記稱猨夀五百歲則變而爲玃居縳切千歲則變爲老人}
  - {type: punctuation, offset: 525, content: ，, id: KR3k0012_CHANT_910-bkkpn196}
  - {type: 'tls:seg', offset: 525, content: '', id: KR3k0012_CHANT_910-7a.36}
  - {type: variant, offset: 526, length: 413, content: 似狼嗥又曰初道武避窟咄難遣穆崇還察人心崇單馬與從者微服入其營會道武為舂妾所識賊皆驚起崇求從者不得因匿坑中徐乃竊馬奔走於大澤有白狼向崇號崇覺寤馳馬隨狼走遂免難道武異之命崇立祀子孫世奉焉後周書四夷傳曰突厥之先匈奴之別種也為鄰國所破其族有一小兒棄草澤中有牝狼以肉飼之及長與狼交合遂有孕焉彼王聞此兒尚在重遣殺之使者見狼在側并欲殺狼狼遂逃于高昌國之北山山有洞穴穴內有平壤茂草周廻數百里四面俱山狼匿其中遂生十男其後各為一姓阿史郍即其一也又曰突厥旗纛之上施金狼頭侍衛之士皆謂附離夏言亦狼也蓋本狼生志不忘本耳唐書曰薛延陁部落嘗有一客乞食於主人者主人引與入賬命妻具饌其妻顧視客乃狼頭人也主人不知覺妻告鄰人共視之狼頭人已食主人而去相與逐之至鬱督軍出見二人追者告其故二人曰我是也我即神人薛延陁當滅我來取之追者懼而返走又曰高宗時有孝子年十二喪父母以孝聞晝夜負土為墳又葬曾祖父母經二十載其功始畢有白狼號鳴於墓側詔旌表其門帝王世紀曰有神牽白狼銜鉤入殷國語, SBCK: ''}
