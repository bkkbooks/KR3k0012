  - {type: variant, offset: 1098, length: 1, content: 狼, SBCK: 猱猕猴也楚人謂之沐猴老者爲獑猢駿捷也其鳴噭噭而悲詩曰無教猱升木毛萇注曰猱猨屬也爾雅曰猱蝯善縁孫炎注曰猱母猴也江乗地記曰攝山有山猱赤足玃居縛切􅀃文曰玃母猴也爾雅曰玃父善頋郭璞日似猴而大倉黒也}
  - {type: page-break, offset: 1098, content: '', id: KR3k0012_SBCK_910-5b}
  - {type: variant, offset: 1098, length: 1, content: 狼, WYG: 猱獮猴也楚人謂之沐猴老者為獑猢駿捷也其鳴噭而悲詩曰無教猱升木毛萇注曰猱猨屬也爾雅曰猱猨善緣孫炎注曰猱母猴也江乗地記曰攝山有山猱赤足玃居縛切説文曰玃母猴也爾雅曰玃持善顧郭璞注曰似猴而大蒼黒色}
  - {type: variant, offset: 1098, length: 9, content: 狼能為小兒啼聲以誘, krp: 猱猕猴也楚}
  - {type: variant, offset: 1100, length: 5, content: 為小兒啼聲, SBCK: 玃持人好顧盻抱朴子曰猕猴及猿八百􅀊化爲玃古今注曰猴五百􅀊化爲玃吕氏春秋曰􅁏之美者玃猱之炙又曰聞言不可不察數傳白爲黒故狗似玃玃似母猴母猴似人人與狗則逺矣}
  - {type: variant, offset: 1100, length: 0, content: '', WYG: 攫持人好顧盼抱朴子曰獮猴及猿八百歳}
  - {type: page-break, offset: 1100, content: '', id: KR3k0012_WYG_910-9a, image: WYG0901/WYG0901-0114c.png}
  - {type: variant, offset: 1101, length: 4, content: 小兒啼聲, WYG: 玃古今注曰猴五百歳化為玃吕氏春秋曰肉之美者玃猱之炙又曰聞言不可不察數傳而白為黑故狗似玃玃似母猴母猴似人人與狗則逺矣毛詩草木蟲魚疏曰猱獮猴也楚人謂之沐猴老者為玃大而黒長前臂玃之白􅆎者為獑猢博物志曰蜀中南髙山上有物似獮猴長七尺能行捷走名曰猴玃一名馬化或曰猳玃同行道婦人有好者輙盗之}
  - {type: page-break, offset: 1101, content: '', id: KR3k0012_WYG_910-9b, image: WYG0901/WYG0901-0114d.png}
