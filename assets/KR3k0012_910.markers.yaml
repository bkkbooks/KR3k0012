  - {type: 'tls:seg', offset: 1183, content: '', id: KR3k0012_CHANT_910-17a.5}
  - {type: variant, offset: 1185, length: 4, content: 忘其本古, krp: 可不察數傳白爲黒故狗似玃玃似母猴母猴似人人與狗則逺矣以毛詩草木蟲魚䟽曰猱猕猴也楚人謂}
