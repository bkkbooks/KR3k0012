  - {type: variant, offset: 316, length: 6, content: 戰呂錡夢射月, SBCK: 飲酒御叔魯御邑大夫曰焉用聖人武仲多智時人謂之聖我將飲酒而己雨行何以聖爲又昭公二曰季武子問於申豊曰雹可禦乎對曰聖人在上無雹雖有不爲灾又曰書曰聖作則逸書則法也又曰臧孫紇有言曰聖人有明徳者􅀂不當世其後必有逹人今其將在孔丘乎又哀公下曰聖人不煩卜筮惠王其有焉不疑故不卜也禮記曰樂記曰作者之謂聖􅄒者之謂明明聖者述作之謂也又坊記曰聖人之制冨貴也使民冨不足以驕貧不至於約貴不慊於上故亂益亡又}
