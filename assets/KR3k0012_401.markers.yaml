  - {type: variant, offset: 348, length: 1, content: 入, SBCK: 存亡而不失其正者其唯聖人乎又蒙卦曰蒙以飬正聖功也又豫卦曰聖人以順動則刑罰清而民服又觀卦曰聖人以神道設教而天下服矣又咸卦曰天地感而萬物化生聖人感人心而天下和平又􅁪卦曰聖人乆}
