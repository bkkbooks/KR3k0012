  - {type: variant, offset: 2360, length: 399, content: 子使掘之數其罪鞭其尸投之漳水俄寢疾而死沈約宋書曰少帝凶暴日甚沈慶之猶盡言諫爭遣慶之從子攸之齎藥賜慶之死時年八十初慶之夢有人以兩疋絹與之謂曰此絹足度慶之語人曰老子今年不免兩疋八十尺也度無盈餘矣後魏書曰元熙於任城王澄薨前夢有人告之曰任城當死死後二百日外君亦不免若其不信試看任城家熙夢中顧瞻任城第舍四面牆崩無遺堵焉熙惡之覺而告所親及熙之死果如所夢又曰崔浩搆害李順基萌已成夜夢秉火爇順寢室火作而順死浩與室家群立而觀之俄而順弟息號哭而出曰此輩吾賊也以戈擊之悉投於河悟而惡之以告館客馮景仁景仁曰此真不善也非復虛事夫以火爇人暴之極也且兆始惡者終殃積不善者無餘慶厲階成矣公其圖之浩曰吾方思之而不能悛至後而族三國典略曰齊李鉉字寶鼎渤海南皮人也春夏務農秋冬入學經䟽之多發自於鉉嬰疾在床夜夢孔子忿其廣為䟽例繫而捶之既寤之後其䟽例焚尋而病愈齊書曰武帝初登位夢金翅鳥下殿食小龍子無數乃飛上天及明帝即位誅高武子孫並盡明帝名鸞故, SBCK: ''}
