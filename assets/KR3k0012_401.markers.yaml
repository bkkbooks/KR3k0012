  - {type: variant, offset: 1523, length: 1, content: 蹇, SBCK: 丘聖者歟荅曰丘非聖者三王聖者歟荅曰三王善任智勇者聖則丘弗知曰五帝聖者歟荅曰五帝善任仁者聖則丘弗知曰三皇聖者歟荅曰三皇善因時者聖則丘不知曰然則孰者爲聖孔子曰西方聖者不治而不亂不言而自信不化而自行蕩蕩乎民無能名焉又曰庖犧女媧神農夏后虵身人面牛首此非人之狀而有大聖之德尸子曰聖人之身猶日也夫日圜尺光盈天地聖人之身小其所燭逺矣聖人正巳而四方治故曰天地之大府慎子曰天有明而不憂人之闇地有財而不憂人之貧聖人有德而不憂人之危范子曰聖人之變如水墮形形平則平形險則險隨巢子曰大聖之行兼愛萬物踈而不絶賢則欣之不肖則矜之孫卿子曰神固之謂聖人聖人者道之管也天下之道管此矣又曰天下無二道聖人無二心神人無功聖人無名聖人者天下}
  - {type: page-break, offset: 1523, content: '', id: KR3k0012_SBCK_401-6b}
