  - {type: variant, offset: 365, length: 2, content: 由基, SBCK: 聖賢又繫辝曰易有聖人之道四焉以言者尚其辝以動者尚其變以制器者尚其象以卜筮者尚其占夫易聖人之所以極深而研幾也唯深也故能通天下之志唯幾也故能成天下之務唯神也故不疾而速不行而至子曰易有聖人之道四焉者此之謂也又曰備物致用立成器以爲天下利莫大乎聖人是故天生神物聖人則之天地變化聖人効之天垂象見􅁻凶聖人象之河出圖洛出書聖人則之易有四象所以示也又曰天地之大徳曰生聖人之大寳曰位又曰上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬又曰昔者聖人之作易也將以順性命之理是以立天之道曰隂}
