  - {type: variant, offset: 1225, length: 3, content: 初趙盾, SBCK: 􅁗繆公謂内史廖曰吾聞鄰國有聖人敵國之憂也今由餘寡人之患將如奈何又曰唐舉相蔡澤曰吾聞聖人不相殆先生乎管子曰聖人若天然無私覆若地然無私載老子曰絶聖弃智民利百倍又曰聖人無常心以百姓心爲心莊子曰聖人之生也天行其死也物化靜而與隂同德動而與陽同波不爲福先不爲禍始又曰以徳分人謂之聖又曰夫聖人鶉居而􅑹若候切食鳥行而無章天下有道則與物皆昌天下無道則修徳就閑又曰至人無己神人無功聖人無名又曰夫川竭而谷虚丘夷而淵實聖人己死則大盗不起文子曰聖人同死生愚人亦同死生聖人之同死生明於分理也愚人之同死生不知利害所}
