  - {type: variant, offset: 1525, length: 1, content: 西, SBCK: 器也啇子曰聖人之制民也如髙下制水如燥濕制火也申子曰百世有聖人猶隨踵而生韓子曰伊尹爲宰百里奚爲虜此二人者聖人也然猶不能無役身而進孟子曰子夏子張子游皆有聖人一體冉有伯牛閔子顔淵具體而微自生民以來未有盛於孔子者也又曰孔子曰登東山而小魯登太山而小天下故觀於海者難爲水遊於聖人之門者難爲言鶡冠子曰聖人者後天地而生而知天地之始先天地而亡而知天地之終孔叢子曰懸子問子思曰吾聞同聲者相求同志者相好子之先君見子産則兄事而世謂子産仁愛稱夫子聖人是謂聖通事仁愛乎未喻其人之孰先也子思曰昔季孫問言游亦􅀂子之言也子游荅曰以子産之仁愛譬夫子其猶浸水之與膏雨康子曰子産死鄭大夫捨玦珮婦女捨珠瑱巷哭三月琴瑟不作失子之死吾未之聞魯人之􅀂是也子游曰夫浸水所及也則生所不及則死民皆知焉膏􅀨之所生也廣莫大焉民之受賜也普矣莫識其由來者也淮}
