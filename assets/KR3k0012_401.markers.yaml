  - {type: variant, offset: 313, length: 0, content: '', SBCK: 春秋之稱微而顯志面晦婉而成章盡而不汗懲惡勸善非聖人誰能修之又曰諸侯將見子臧於王而立之子臧辝曰聖逹節聖人應天命不拘掌禮次守節爲君非吾節也雖不能聖敢失守乎又曰唯聖人能外内無患自非聖人外寜必有内憂驕亢則憂患生也又襄公三年曰臧武仲如}
