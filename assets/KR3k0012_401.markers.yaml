  - {type: variant, offset: 2070, length: 289, content: 斤吾其戮乎尋為王敦害之續晉陽秋曰符堅之遣慕容垂侍中權翼諫不聽於是翼乃夜私遣壯士要路而擊之垂是夜夢行路路窮顧見孔子墓傍墳有八覺而心惡之召占夢者占之曰行路窮道盡也不可行孔子名丘八以配丘此兵字路必有伏兵深宜慎之於是垂遂別路而進翼伏兵遂不擒之前涼錄曰張駿十二年五月駿有疾夢出遊不識其處見一玄龜向之張口而言更九日當有嘉問遂經九日而卒前趙錄曰劉曜末年夢三人金面丹脣東向逡巡不言而退曜拜履其跡太史令任義曰三者歷運之極東為震王者之始次也金為兌物衰落也脣丹不言事之畢也逡巡揖讓舍之道也為之拜者屈伏於人履跡而行慎不出疆兵必大起遠志三年曜為石勒所擒前燕錄曰慕容儁夜夢石虎齧其臂覺遂痛惡之曰死胡安敢夢生, SBCK: ''}
