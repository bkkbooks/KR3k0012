  - {type: variant, offset: 1958, length: 6, content: 溫嶠為驃騎鎮, SBCK: 聖人虎別其文炳也如虎之別百獸炳然殊異君子豹别其文蔚也有蔚文章次虎辯人狸別其文萃也又曰或問聖人表裏曰威儀文辭表也德行忠信裏也論衛曰上天之心在聖人之􅅐其譴告在聖人之口世無聖人安得知天變動風俗通曰聖者聲也通也言其聞聲知情通於天地調暢萬物荀恱申鑒曰聖不至聖何以盡性傳子曰聖人之道如天地諸子之異如四時四時相反天地合而通之􅀽准正書曰聖人之治也􅀂平地焉聾盲跛蹇皆能履之法若丘陵也非有逸足不能超也又曰唯聖知聖唯賢知賢信乎蔣子萬機論曰聖不獨立智不獨治神}
