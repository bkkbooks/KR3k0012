  - {type: variant, offset: 452, length: 167, content: 濟洹之水贈我以瓊瑰歸乎歸乎瓊瑰盈吾懷乎懼不敢占也還自鄭至于貍脤而占之曰余恐死故不敢占也今眾繁而從余三年矣而無傷也言之至暮而卒繁多也傳誡數占夢又襄王曰齊侯伐我北鄙中行獻子將伐齊夢與厲公說弗勝厲公獻子所殺者公以戈擊之首墜於前跪而戴之奉之以走見梗陽之巫皋梗陽晉邑也在太原皋巫名也夢并見之他日見諸與之言同巫亦夢見獻子與厲公訟巫曰今茲主必死若有, SBCK: 何}
