  - {type: variant, offset: 3112, length: 582, content: 齎符來追及滻將渡一人續至曰彼墳至大功須萬日遂不涉而寤計今萬日矣與公訣矣明日卒又曰崔湜與尚書右丞盧藏用同配流俱行湜謂藏用曰家弟承恩或冀寬宥因遲留不速進行至荊州夢於講堂照鏡鏡者明象吾當為人主所明也以告占夢人張申申退曰講堂者受法之所鏡者於文為立見金此其吉征其日追使至縊於驛中唐新語曰母煚俱永切直集賢無何以熱疾暴終初煚夢著衣冠上北邙山親友相送及至山頂廻顧不見一人意甚惡之及卒僚友送葬北邙山咸如所夢呂氏春秋曰齊莊公之時有士曰賓卑藂夢有壯士從而叱之唾其面惕然而寤然夜坐自不快明日召其友而告之曰吾年六十而無所挫辱吾將索之得之則可不得將死之每朝立乎衢三日不得退而自殺桓譚新論曰博士弟子韓生連三夜有惡夢以問人人教晨起廁中祝之三旦人告以為祝詛捕治數日死玄晏春秋曰十二月乙丑夕夢至京師自廟出見車騎甚眾以物呈廟云誅大將軍曹爽寤以告梁析析曰君欲曹人之夢乎朝無公孫疆予曰爽無叔振之請茍失天機則離矣何待於疆益部耆舊記曰何袨嘗夢井中生桑以問占夢趙直直曰桑非井中之物然桑字四十下有八君壽恐不過此後果如直言管輅別傳曰輅見何尚書何曰頃連夢青蠅數十來在鼻上驅之不肯去何也輅曰夫鼻者艮也天中之山而蠅集之位峻者危輕豪者亡後遂被誅搜神記曰吳時嘉興徐伯始病使道士呂石安神座石有弟子戴本王思二人居在海鹽伯始迎之以助石晝臥夢上天北斗門下見外鞍馬三疋云明日當以一迎石一迎本一迎思石夢覺語本思如此死期至可急還與家別不卒事, SBCK: 瓦解}
