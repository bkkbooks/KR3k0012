  body:
  - {type: variant, offset: 5, length: 177, content: 一凶夢禮記檀弓曰夫子蚤作負手曳杖逍遙於門歌曰泰山其頹乎梁木其壞乎哲人其萎乎既歌而入當戶而坐子貢聞之曰泰山其頹則吾將安仰梁木其壞哲人其萎則吾將安放夫子殆將病也遂趨而入夫子曰賜爾來何遲也夏后氏殯於東階之上則猶在阼也殷人殯於兩楹之間則與賓主夾之也周人殯於西階之上則猶賓之也而丘也殷人也子疇昔之夜夢坐奠於兩楹之間夫明王不興而天下其孰能宗子子殆將死也蓋寢疾七日而沒, SBCK: 二叙聖}
