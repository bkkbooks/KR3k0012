  - {type: variant, offset: 3710, length: 749, content: 日三人同日死續搜神記曰會稽謝奉與永嘉太守郭伯猷善謝忽夢郭與人於浙江上爭樗蒲錢為水神所責墮水死已營理郭凶事既覺便往郭許共圍碁良久謝云卿知吾來意不因說所夢郭聞之悵然云信與人爭如卿所夢何期太的也須臾如廁便倒氣絕謝斷理之如所夢異苑曰符堅將欲南師也夢葵生城內明以問婦婦曰若征軍遠行出難為將也堅又夢地東南傾復以問云江左不可平也君無南行必敗之應也堅不從卒敗又曰陳郡殷靈均義熙中為桂陽太守夢人縛將去形神乖散復有一人云且置在作衡陽當取之殷驚寤惆悵永初三年除衡陽郡知冥理難避辭不免尋寢疾而亡述異記曰陶繼之為秣陵令殺劫其中一人是大樂伎不為劫而陶逼殺之將死曰我實不作劫遂見枉殺若有鬼必自訴理少時陶夢見此伎來云訴天得雪今來相取遂跳入陶口中仍落腹而倒俄而陶遂病死又曰姚萇既殺符堅與符登相拒於隴東萇夜夢堅將天帝使者勒兵馳入萇營以予剌萇正中其陰萇驚覺陰腫痛明日遂死又曰張駿有疾夢出遊觀不識其處甘泉涌出有一玄龜向駿張口言曰更九日當有嘉問好消息忽然而覺自書記之封在筒中人不知也因寢疾經九日而死幽明錄曰魏武帝猜忌晉宣帝子非曹氏純臣又嘗夢三疋馬在一糟中共食意尤憎之因召文明二帝告以所見並云防理自多無為橫慮帝然之後果害族移器悉如夢焉又曰王丞相茂弘夢人欲以百萬錢買大兒長豫丞相甚惡之潛為祈禱者備材作屋得一窖錢料之百萬億大懼一皆藏閉俄而長豫亡又曰隴西秦嘉字士會雋秀之士婦曰徐淑亦以才美流譽桓帝時嘉為曹掾赴洛淑歸寧于家晝臥流涕覆面嫂怪問之云適見嘉自說往津鄉亭病亡二客俱留一客守喪一客齎書還日中當至舉家大驚書至事事如夢集異記曰陽平宋堇善解夢有孫氏求官睡得夢雙鳳集其兩拳以問堇堇曰鳳皇非梧桐不栖非竹實不食卿當大凶非苴杖即削杖也後孫氏果遭母喪又曰張天錫在涼州夢一綠色狗形甚長從城東南欲齰張張床上避一匝乃墮地後符堅遣狗長往破張著綠地錦袍從東南門入皆如夢焉, SBCK: ''}
