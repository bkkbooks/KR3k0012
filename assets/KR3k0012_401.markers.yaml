  - {type: variant, offset: 347, length: 0, content: '', SBCK: 道洋洋乎發育萬物峻極于天毛詩七月曰狼跋羙周公也周公攝政逺則四國流言近則王不知周大夫羙其不失其聖也不失其聖者聞流言不惑王不知不怨終立其志成周之道致太平復成王之位又節南山巧言曰秩秩大猷聖人莫之周易乹卦曰雲從龍風從虎聖人作而萬物覩又曰其惟聖人乎知進}
  - {type: variant, offset: 347, length: 0, content: '', WYG: 道洋洋乎發育萬物峻極于天毛詩七月曰狼䟦美周公也周公攝政逺則四國流言近則王不知周大夫美其不失其聖也不失其聖者聞流言不惑王不知不怨終立其志成周之王道致太平復成王之位又節南山巧言曰秩秩大猷聖人莫之周易乾卦曰雲從龍風從虎聖人作而萬物覩又曰其惟聖人乎知進}
