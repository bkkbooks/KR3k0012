  - {type: variant, offset: 3875, length: 0, content: '', SBCK: 歩輿令綱乗至閤下數引禁中問以政道又令轝入東宫皇太子引上殿親拜之綱於是陳君臣父子之道問寢視膳之方理順詞直聽者忘倦又曰貞觀十三年以左僕射房玄齡爲太子少師玄齡上表遜位詔不許太宗因謂侍臣曰太子師保古難其選􅀂成王㓜小以周公爲􅀓左右皆賢日聞雅訓自㓜及長便爲聖君􅁗之胡亥趙髙傅之教以刑法及其立也誅功臣殺親族酷烈不巳旋踵而亡以此言之善惡由於習近又曰唐休璟年力雖衰進取弥銳時宫人賀婁氏用事而休璟爲男取其養女因以自逹拜太子少師時議譏之又曰長慶中以兼太常卿趙宗儒爲太子少師太常有師子樂備五方之色非㑹朝聘享不作焉至是中人掌教坊之樂者移牒取之宗儒不敢違以􅃺白宰相以爲事在有司執守不合􅀜白而宗儒憂恐不已宰相責以懦怯不任事故換此散秩陶氏職官録曰三少舊視左僕射}
  - {type: page-break, offset: 3875, content: '', id: KR3k0012_SBCK_244-5a}
