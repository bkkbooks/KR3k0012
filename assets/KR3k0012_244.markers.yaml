  - {type: variant, offset: 198, length: 384, content: 佐命之勳其為車騎將軍開府如三司之儀又曰元年詔曰中書監光祿大夫張華歷世腹心情所憑賴故疇其勳績使儀同三司而虛冲挹損難違高尚其以光祿大夫儀同三司本職如故又給親信滿百人又曰元康元年詔曰光祿大夫王戎光祿大夫裴楷開府辟召儀同三司晉中興書曰郗愔咸安元年拜都督浙江東五都諸軍事進位鎮軍開府儀同三司辭不受又曰蔡謨免皇太后詔以謨為左光祿大夫開府儀同三司遣謁者孟洪就加冊命謨上䟽陳謝遂以疾篤不朝賜机杖門施行馬齊書曰徐孝嗣加開府儀同三司孝嗣聞有詔歛容謂左右曰吾德慚古人位登袞職將何以堪之明君可以理奪必當死請若不獲命正當角巾丘園待罪家巷耳故讓不受齊職儀曰開府儀同三司置舍人官騎建初三年馬防為車騎將軍儀同三司魏以黃權為車騎開府此後甚眾將軍開府依大司馬朱服光祿大夫開府依司徒皂服北史曰裴文舉武成二年就加使持節驃騎大將軍儀同三司蜀土沃饒啇販百倍或有勸文舉規利文舉荅之曰利之為貴莫若安身身安道隆非貨之謂, SBCK: 師}
