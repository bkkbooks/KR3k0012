  - {type: variant, offset: 1560, length: 169, content: 特進左右光祿金紫銀青等光祿大夫用人俱以舊德就閑者居之揔敘大夫白虎通曰大夫為言大扶進人也毛詩衛淇澳碩人曰大夫夙退無使君勞大夫未退君聽朝於路寢夫人聽內事於正寢大夫退然後罷也箋云莊姜始來時衛諸大夫朝夕者皆早退無使我君之勞倦以君夫人新為配偶宜親親之也毛詩節南山雨無正曰大夫離居莫知我則勞也箋云正長也官長之大夫厲王流于彘而皆散處無復知我民之見疲勞也, SBCK: 太子太師太傅太保是爲}
