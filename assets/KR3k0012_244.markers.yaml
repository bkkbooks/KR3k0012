  - {type: variant, offset: 3867, length: 0, content: '', SBCK: 曰太􅀓於太子不稱臣少􅀓稱臣太子太保禮記曰保也者慎其身以輔翼之而歸諸道者也晉書曰劉寔字子真以特進開府加太子太保晉中興書曰懷}
