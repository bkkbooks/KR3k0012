  - {type: variant, offset: 609, length: 205, content: 祖之奉魏太子西巡也至原州遂幸賢第讓齒而坐行鄉飲酒禮焉其後太祖又至原州令賢乘輅備儀服以諸侯會遇禮相見然後幸賢弟歡宴終日凡是親族頒賜有差陳書章昭達以平留異功授鎮前將軍開府儀同三司初文帝嘗夢昭達升臺鉉及旦以夢告之至是侍宴酒酣顧昭達曰卿憶夢不何以償夢昭達對曰當效犬馬之用以盡臣節自餘無以奉償隋書曰何稠安集嶺南有欽州刺史甯猛力帥眾迎軍初猛力掘山洞欲圖為逆至是惶懼請身入朝稠以其疾篤因示無猜貳遂放還州與之約曰八九月間可詣京, WYG: ''}
