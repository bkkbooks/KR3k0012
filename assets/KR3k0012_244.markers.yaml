  - {type: variant, offset: 3867, length: 0, content: '', krp: 曰太傳於太子不稱臣少傳稱臣太子太保禮記曰保也者慎其身以輔翼之而歸諸道者也晉書曰劉寔字子真以特進開府加太子太保晉中興書曰懷}
  - {type: variant, offset: 3868, length: 5, content: 善丕說罷朝, SBCK: 以荀組爲侍中特進行太子太保傅暢晉賛曰賈充爲太尉行太子太保以公位重其爲保傅㦯行或領各隨其時後魏書曰顯祖將禪位於京兆郡王子推隴西王源賀並固諌陸馥抗言曰皇太子聖德承基四海屬望不可橫議干􅀦之紀臣請刎頸殿廷有死無二乆之帝意乃􅄙詔曰馥直臣也其能保吾子乎遂以馥爲太保太子少師六典曰太子三少掌奉皇太子以觀三師之道德而教諭焉晉書曰惠帝以衛尉裴揩爲太子少師宋書曰太子少師少保並晉置後魏書曰郭祚領太子少師曽從丗宗幸東宫肅宗㓜弱祚懷一黄㼐出奉肅宗時應詔左右趙桃弓與御史王顯爲丗宗所信祚私事之時人謗祚者以爲桃弓僕射黄㼐少師唐書官品志曰太子少師少傅少保是爲三少各一人掌皇太子以觀三師之德出則三師在前三少在後又曰李綱拜太子少師綱有脚疾不堪踐履太宗}
  - {type: page-break, offset: 3868, content: '', id: KR3k0012_SBCK_244-4a}
  - {type: page-break, offset: 3868, content: '', id: KR3k0012_SBCK_244-4b}
  - {type: variant, offset: 3868, length: 5, content: 善丕說罷朝, WYG: 以荀組為侍中特進行太子太保傅暢晉贊曰賈充為太尉行太子太保以公位重其為保傅兼領各隨其時後魏書曰顯祖将禅位於京兆郡王子推隴西王源賀並固諫陸馥抗言曰皇太子聖徳承基四海屬望不可横議干國之紀臣請刎頸殿庭有死無二久之帝意乃解詔曰馥直臣也其能保吾子乎遂以馥為太保太子少師六典曰太子三少掌奉皇太子以觀三師之道徳而教諭焉晉書曰恵帝以衛尉裴楷為太子少師宋書曰太子少師少保并晉置後魏書曰郭祚領太子少師曽從世宗幸東宫肅宗幼弱祚懐一黄㼐出奉肅宗時應詔左右趙桃弓與御史王顯脣齒為世宗所信祚私事之時人謗祚者以為桃弓僕射黄㼐少師唐書官品志曰太子少師少傅少保是為三少各一人掌奉皇太子以觀三師之徳出則三師在前三少在後又曰李綱拜太子少師綱有脚疾不堪踐履太宗}
