  - {type: variant, offset: 815, length: 739, content: 相見稠還奏狀上意不懌其年十月猛力卒上謂稠曰汝前不將猛力來今竟死矣稠曰猛力共臣為約假令身死當遣子入侍越人性直其子必來初猛力臨終誡其子長真曰我與大使為約不可失信於國士汝葬我訖即宜上路長真如言入朝上大悅曰何稠著信蠻夷乃至於此以勳授開府齊王儉拜儀同三司章曰臣聞日中則昊盈虛之定分器滿必傾往覆之常理遂乃班同袞章爕和合曜外參論道內揔百司物議惟塵自識非據梁庾肩吾為武陵王拜儀同章曰臣宅慶紫霄聯休皇極地均西月既無跡而成高仕若乘風故不行而自遠今者四郊無壘天下同文都尉春田猶居塞外單于冬獵不入漁陽臣坐牧三邊非勞七戰豈能屯兵大夏封萬里之侯飛箭聊城受千金之壽論其才望有懼茂弘先佩印綬常羞叔度隋江揔太保蕭公謝儀同三司表曰阪泉野戰曾無汗馬之勞代邸運籌又闕前驅之勇薄伐專征早遊邊外執玉奉酎又虧朝則王人降止朝冊遠臨奉述勑書曲停表奏滄波阻敻既杜敬仲之辭關路攸長致絕趙衰之讓心馳紫路登文石而莫由目送白雲拜承明之未果特進東觀漢記曰鄧禹右將軍官罷以特進奉朝請漢雜事曰諸侯公德優盛朝廷所敬異者賜位特進在三公上無秩後漢書曰梁啇以女立為皇后妹為貴人加啇位特進更增國士賜安車駟馬謝承後漢書曰趙典道懿尊為國師位特進七為列卿寢布被瓦器食也晉書百官表曰特進官品第二漢制皇后之父率為此官傅咸奏曰公品第一執珪坐侍臣之上特進品第二執皮帛坐侍臣之下今啟特進宜執璧繼公沈約宋書曰特進魏世驃騎將軍劉放衛將軍孫資等遜位以侯就第並位特進其諸官加特進者從本官供給特進但為班位而已不別有吏卒車服也齊職儀曰特進以功德特進見之後魏書曰刀雍拜特進皇興中雍與隴西王源賀及中書監高充等並以耆年特見優禮錫雍几杖劍履上殿日致珍羞焉北史曰穆紹加特進時侍中元順與紹同官順常因醉入寢所紹擁披而起正色讓順曰老身二十年侍中與卿先君亟連職事縱卿後進何置相排突也遂謝事還家詔諭乃起, SBCK: ''}
