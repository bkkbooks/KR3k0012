  - {type: variant, offset: 3822, length: 2, content: 叔陵, SBCK: 德閏㑹稽山隂人拜太子太傅領中書孫權甞問書傳篇賦何者爲美澤欲諷諭以明治亂因對賈􅁩過􅁗論最美權覽讀焉又曰程秉字德樞汝南南頓人也秉事鄭玄避亂交州與劉熈考論大義遂愽通五經士爕命爲長史權聞其名儒以禮徴秉旣到拜太子太傅又曰張温字惠恕吴郡吴人也温少脩節操容貌竒偉權聞之以問公卿曰温當今與誰爲比大司農劉基曰可與全琮爲輩大常頋雍曰基未詳其爲人也今無輩權曰如是張允不死也徴到延見文辭占對觀者傾竦權改容加禮罷出張昭執其手曰老夫託意君冝明之拜議郎選曹尚書尋}
  - {type: page-break, offset: 3822, content: '', id: KR3k0012_SBCK_244-3b}
