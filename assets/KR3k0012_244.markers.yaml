  - {type: variant, offset: 2023, length: 157, content: 永斗筲之材質薄學杇無一日之雅左右之方將軍悅其狂言擢之皂衣之吏廁之爭臣之未又曰金日磾為光祿大夫親近未嘗有過上信愛之又曰貢禹上書云貧老家貲不滿萬錢拜光祿大夫賜益多家益富伏自念無報厚德日夜慚愧又曰杜陵王仲翁霍光以為光祿大夫仲翁出入蒼頭廬兒傳呼甚尊寵又曰蔡義上書云臣山東草萊之人行能無所比容貌不及眾然而不棄人倫者以聞道於先, SBCK: 太子國儲副君}
