  - {type: variant, offset: 2181, length: 742, content: 願賜清間之讌得舒精思於前上即見說詩甚悅擢為光祿大夫東觀漢記曰張堪字子孝為光祿大夫數諫堪常乘白馬光武每有異政輒曰白馬生且復諫矣又曰樊宏字靡卿為光祿大夫為人謙素畏慎每朝會迎期先到俯伏待事時至乃起帝聞之勑臨朝乃告勿令豫到後漢書曰鄧太后從樊准議悉以公田賦與貧人即擢准與議郎呂倉並守光祿大夫准使冀州倉使兗州准到部開倉廩食廩給慰安生業流人咸得蘇息又曰魏文帝受禪欲以楊彪為太尉先遣使示旨彪辭曰彪備漢三公遭代傾亂不能有所補益耄年被病豈可贊惟新之朝遂固辭乃授光祿大夫賜几杖衣袍因朝會引見令彪著布單衣麤皮冠而入待以賓客之禮華矯後漢書曰鄧彪遭後母憂毀瘠過禮因疾乞身以光祿大夫行服漢書解詁曰武帝以中大夫為光祿大夫與博士俱以儒雅之選異官通職周官所謂官聯者也溫故知新率由舊章皆能明古今辨章舊聞者也漢書百官表注曰光祿大夫古官也銀章青綬漢官儀曰光祿大夫秩比二千石不言屬光祿大夫勳門外特施行馬以旌別之魏志曰常林字伯槐河內溫人也時論林節操清峻欲致之公輔而林遂稱疾篤拜光祿大夫又曰黃初四年詔給光祿大夫楊彪吏卒門施行馬吳志曰八月遣光祿大夫周弈石偉巡行風俗察將吏清濁民所疾苦為黜陟之詔王隱晉書曰劉毅字仲雄年七十告老以光祿大夫致仕門施行馬賜錢百三十萬晉書曰王覽為宗正卿致仕詔遣殿中醫療疾給藥後轉光祿大夫門施行馬又曰鄭襃魏景元初疾病失明屢乞骸骨不許拜光祿大夫又曰華表字偉容歆子也太始中為太中大夫祿賜與卿同門施行馬晉陽秋曰李喜乞老以為光祿大夫門施行馬晉中興書曰王蘊字仁修烈宗將納后訪于公卿僕射安曰王蘊地望可與國婚定后既立徵拜金紫光祿大夫又曰祖納字士言少持操行能言名理遷右光祿大夫又曰荀組字太章頴川人也弱冠太尉王夷甫見而稱之為光祿大夫又曰荀松字景猷組族子也弱冠大原王濟甚相器重拜右光祿大夫又曰賀循字彥士會稽人也節操高厲童齓不群言行舉動, SBCK: 友}
