  - {type: variant, offset: 2282, length: 308, content: 若劉子政揚子雲之列是也蓋儒生轉通人通人為文人文人轉為鴻儒也又曰古之學者有二今之學者四焉夫子門徒轉相師授通聖人之經者謂之儒屈原宋玉枚乘長卿之徒止為辭賦則謂文今之儒博窮子史但能識其事不能通其理者謂之學至如不便為詩閻善為章奏如伯松若此之流謂之筆吟詠風謠流連哀思者謂之文唯須綺縠紛披宮徵靡曼脣吻適會情靈搖蕩潘安仁清綺若是而評者止稱情切故知為文之難也曹子建陸士衡皆文士觀其辭致側密事語堅明雖不以儒者命家此亦悉通其義也若夫今之俗也縉紳稚齒閭巷小生茍取成章貴在悅目龍首豕足隨時之宜牛頭馬髀強相附會夫挹酌道德憲章前言者君子所以行之也原憲云無財謂之貧學道不行謂之病末俗學徒頗或異此或假茲以為伎術或狎之以為戲笑未聞強學自立和樂慎禮者也齊, SBCK: 趙}
