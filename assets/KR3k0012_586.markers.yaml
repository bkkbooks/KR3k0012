  - {type: variant, offset: 3269, length: 3, content: 庶子掌, SBCK: 踈曰蕭仁祖之斯文可謂雕章間岀昔潘陸齊䡄不襲建安之風顔謝同聲遂革太乙之氣自漢逮晉情賞猶自不諧河北江南意製本應相詭顔黄門云吾愛其蕭散宛然在目而盧思道之徒雅所不愜箕畢殊好理冝固然又曰王睎爲常山王司馬睎恬憺寡欲不以世務爲累時謂之方叔司馬常遊晉祠賦詩曰日落應歸去魚鳥見留連時常山王遣使召睎睎不時至明日承相西閤􅀕酒盧思道問睎昨巳朱顔得無魚鳥致恠乎睎􅀏曰昨陶然以酒􅀍責卿軰亦是留連之一物豈直魚鳥而巳哉又曰辛德源甞於邢邵座賦詩其十字曰寒威漸離風春色方依樹衆咸稱善後王昕逢之謂曰今日可謂寒威離風春色依樹隋書曰楊素甞以五言詩七百字贈畨州刺史薛道衡詞氣宏拔風韻秀出亦爲一時盛作未幾而卒道衡歎曰人之將死其言也善豈􅀂是乎唐書文苑傳曰元萬頃乾封中從英國公李勣征髙麗爲遼東道}
