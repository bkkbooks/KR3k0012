  - {type: variant, offset: 286, length: 889, content: 賦欲麗文以氣為主氣之清濁有體不可力強而致古之作者寄身於翰墨見意於篇籍不假良史之辭不託飛馳之勢而聲名自傳於後故西伯幽而演易周旦顯而制禮不以隱約而弗務不以康樂而加恩夫然則古人賤尺壁而重寸陰懼乎時之過已而人多不強力貧賤則懾於飢寒富貴則流於逸樂遂營目前之務而遺千載之功日月逝於上體貌襄於下忽然與萬物遷行化斯志士之所大痛也晉摯虞文章流別論曰文章者所以宣上下之象明人倫之敘窮理盡性以究萬物之宜者也王澤流而詩作成功臻而頌興德勳立而銘著嘉美終而誄集祝史陳辭官箴王闕周禮太師掌教六詩曰風曰賦曰比曰興曰雅曰頌言一國之事繫一人之本謂之風言天下之事形四方之風謂之雅頌者美盛德之形容賦者敷陳之稱也比者喻類之言也興者有感之辭也後世之為詩者多矣其功德者謂之頌其餘則惣謂之詩頌詩之美者也古者聖帝明王功成治定而頌聲興於是奏於宗廟告於鬼神故頌之所美者聖王之德也古之作詩也發於情止乎禮義情之發因辭以形之禮義之指須事以明之故有賦焉所以假象盡辭敷陳其志古詩之賦以情義為主以事類為佐今之賦以事形為本以義正為助情義為主則言省而文有例矣事形為本則言富而辭無常矣文之煩省辭之險易蓋由於此夫假象過大則與類相遠免辭過壯則與事相違辯言過理則與義相失麗靡過美則與情相悖此四過者所以背大體而害政教示以司馬遷割相如之浮說揚雄疾辭人之賦麗以淫也沈約宋書論曰民稟天地之靈含五常之德剛柔迭用喜慍分情然則歌詠所興宜自生民始也周室既襄風流彌著屈平宋玉導清源於前賈誼相如振方塵於後英辭潤金玉高義薄雲天自茲以降情志逾廣王褒劉向楊班崔蔡之徒異軌同奔相師祖雖清辭麗曲時發于篇而蕪音累氣固亦多矣若夫平子豔發文以情變絕唱高蹤久無嗣響至于建安曹氏基命二祖陳王咸蓄盛藻自漢至魏四百餘年辭人才子文體三變相如巧為形似之言二班長於情理之說子建仲宣以氣質為體源其飆流所始莫不同祖風騷降及元康潘陸特秀律異班賈體變曹王縟采星稠繁文綺合綴平臺之逸響採南皮之高韻遺風餘烈事極江右爰逮宋氏顏謝騰聲靈運之興會標舉延年之體裁明密並方軌前秀垂範後昆李充翰林論曰或問曰何如斯可謂之文荅曰孔文舉之書陸士衡之議斯可謂成文也陸景典語曰所謂文者非徒執卷於儒生之門攄筆於翰墨之悉乃貴其造化之淵禮樂之盛也, SBCK: ''}
