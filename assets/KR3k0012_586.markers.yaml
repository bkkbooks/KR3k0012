  - {type: variant, offset: 1288, length: 0, content: '', SBCK: 論足稱優洽栢梁以來継作非一纂所至七言而巳九言不見者將由聲度闡誕不恊金石至於五言流靡則劉楨張華四言側宻則張衡王粲􅀂夫陳思王可謂兼之矣鍾嶸詩評曰古詩李陵班婕妤曹植劉楨王粲阮藉陸機潘岳張恊左思謝靈運等十二人詩皆上品曹植詩其原岀於國風其骨氣髙竒辭彩華茂情兼雅怨躰備文質粲然逸古卓尔不群嗟乎陳思之文}
