  - {type: variant, offset: 2043, length: 0, content: '', WYG: 省淨殆無長語篤意真古辭興婉媚至於歡言酌春酒日暮天無雲風華清靡豈直田家語邪古今隠逸詩之宗也漢書曰王襃字子淵蜀人也宣帝時脩武帝故事講論六藝劉向張子僑等待詔金馬聞襃有俊才使襃作中和樂職如淳曰言王政中和在官者樂其職宣布詩蓺林曰宣帝詩歌之名選好事者依鹿鳴之聲習而歌之魏書曰李康字蕭逺性介立不和俗為鄉里所嫉故官不進嘗作遊九疑詩明帝異其文問左右斯人安在吾欲擢之因起為隰陽長卒晉書載記曰李夀奢侈殺人以立威其臣龔壮作詩七篇託言應璩以諷夀夀報曰省詩知意若今人所作賢哲之話言也古人所作死鬼之常辭耳又桓𤣥既簒卻引用孟㫤問其人於劉邁邁曰臣在京口不聞㫤有異能但父子紛紛更相贈詩爾𤣥笑之而止宋書曰顔延之與陳郡謝靈運俱以詞彩齊名而遲速懸絶文帝嘗勅各擬樂府池上篇延之受詔便成靈運久之乃就延之嘗問鮑昭已與靈運優劣昭曰謝五言如初發芙蓉自然可愛君詩若鋪錦列繡彫繪滿眼鍾嶸詩評云靈運詩其原出於陳思雜有景陽之體嶸謂若人興多才博寓日輙書内無文思外無遺物其繁且富宜哉然名章秀句處處間起妙曲新聲絡繹奔㑹類青松㧞木白玉映沙未足以貶髙才也又謝恵連方明之子也十嵗能屬文族兄靈運嘉賞之云毎有篇章對恵連輙得佳語嘗於永嘉西堂思詩竟日不就忽夢恵連則得池塘生春草大以為工常云此語有神助非余語也趙録曰徐光字季武年十四五為将軍秣馬光但日書栁吾浪反杜為詩頌不親馬事梁書曰丘遲字希范辭采麗逸時有鍾嶸詩評云范雲婉轉清便如流風廻雪遲詩㸃綴映媚似落花依草雖淺於江淹而秀於任昉其見稱如此三國典畧曰周文州氐酋反制鄜州刺史髙琳討平之軍還帝宴羣公卿士命賦詩言志琳詩云寄言竇車騎為謝霍将軍何以報天子沙漠静妖氛帝大恱曰獯獫陸梁未時款塞卿言有騐國之福也又齊蕭慤字仁祖為太子洗馬嘗於秋夜賦詩其兩句云芙蓉露下落楊栁月中踈曰蕭仁祖之斯文可謂雕章間出昔潘陸齊軌不襲建安之風顔謝同聲遂革太初之氣自漢逮晉情賞猶自不諧河北江南意製本應相詭顔黄門云吾愛其蕭散宛然在目而盧思道之徒雅所不愜箕畢殊好理固宜然又王晞為常山王司馬晞澹泊寡慾不以世務為累時謂之物外司馬嘗遊晉祠賦詩曰日落應歸去魚鳥見留連時常山王遣使召晞晞不時至明日丞相西閣祭酒盧思道問晞昨被召以來頗得無以魚鳥致恠乎晞笑曰昨晚陶然頗以酒漿被責卿輩亦是留連之一物豈直魚鳥而已又辛徳源嘗於邢邵座賦詩其十字曰寒威漸離風春色方依樹衆咸稱善後王昕逢之謂曰今日可謂寒威離風春色依樹隋書曰楊素嘗以五言詩七百字贈潘州刺史薛道衡詞氣宏抜風韻秀出亦為一時之作未幾而卒道衡嘆曰人之将死其言也善豈若是乎唐書文苑傳曰元萬頃乾封中從英國公李勣征髙麗為􅈙東道管記時别帥馮本以水軍援裨将郭待封船破失期待封欲作書與勣恐髙麗知其救兵不至乗危迫之乃令萬頃作離合詩贈勣勣不達其意大怒曰軍機急切何用詩為必斬之萬頃解釋之乃止又錢起能五言詩初從鄉薦家寄江湖嘗於客舍月夜獨吟遽聞吟於庭曰曲終人不見江上數峯青起愕然攝衣視之無所見矣以為鬼怪而志之及起就試之年李暐所試湘靈鼓瑟詩題中有青字起即以鬼謡十字為落句暐深嘉之稱為絶倡是嵗登第又元稹聰警絶人年少有才名與太原白居易為友稹為詩善状詠當時風態物色當時言詩者稱元白焉自衣冠士子至閭閻下俚悉傳諷之號為元和體穆宗在東宫有妃嬪左右嘗念及稹篇詠者宫中呼為元才子至是極承恩遇嘗為長慶宫詞數十百篇閭里競為傅唱又劉禹錫晩年與少傅白居易友善居易詩筆文章時無在其右者嘗與錫倡和徃來因合其詩而序之曰彭城劉夢得詩豪者也其鋒森然少敢當者予不量力徃徃犯之}
