  - {type: variant, offset: 1181, length: 0, content: '', SBCK: 情性三百之蔽義歸無邪持之爲訓有符焉􅈛人禀七情應物斯感感物吟志莫非自然堯有大唐之歌虞造南風之詩觀其二}
  - {type: variant, offset: 1181, length: 0, content: '', WYG: 情性三百之蔽義歸無邪持之為訓有符焉爾人禀七情應物斯感感物吟志莫非自然堯有大唐之歌虞造南風之詩觀其二}
  - {type: variant, offset: 1181, length: 0, content: '', krp: 情性三百之蔽義歸無邪持之爲訓有符焉爾人禀七情應物斯感感物吟志莫非自然堯有大唐之歌虞造南風之詩觀其二}
  - {type: variant, offset: 1182, length: 0, content: '', SBCK: 詞逹而巳及大禹成功九序惟歌少康敗德五子咸諷順羙匡惡其來乆矣自啇曁周雅頌圎備四始彪炳六義環􅀷子夏鑒絢素}
