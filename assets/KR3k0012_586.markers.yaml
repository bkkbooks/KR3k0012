  - {type: variant, offset: 2663, length: 661, content: 字之中音韻悉異兩句之內角徵不同不可增減世為永明體厥與約書曰范詹事自序性別宮商識清濁特能適輕重濟艱難古今文多不全了斯處縱有會此者此必不從根本中來沈尚書亦云自靈均已來此秘未覩或闇與理合匪由思至張蔡曹王曾無先覺潘陸顏謝去之彌遠大旨欲宮羽相變低昂舛節若前有浮聲則後須切響一簡之內音韻盡殊兩句之中輕重悉異辭既美矣理又善焉但觀歷代眾賢似不都闇此處而云此秘未覩近於誣乎案范云不從根本中來尚書云匪由思至斯則揣情謬於玄黃㰅句著其音律也范又云時有會此者尚書云或闇與理合夫思有合離前哲同所不免文有開塞即事不得無之子建所以欲人譏彈士衡所以遺恨終篇自魏文屬論深以清濁為言劉楨奏書大明體勢之致齟齬安帖之談操末續顛之說興玄黃於律呂比五色之相宣茍此秘未覩茲論為何所指耶至於掩瑕藏疾合少謬多則臨淄所云人之著述不能無病者也長門上林殆非一家之賦洛神池鴈便成二體之作王粲初征他文未能稱是楊脩敏捷暑賦彌日不獻率意寡尤則事促乎一曰翳愈伏而理賖於七步一人之思遲速天懸一家之文工拙壤隔何獨宮商律呂必責其如一耶三國典略曰徐摛字士秀東海郯人也員外散騎常侍起之子文好新率不拘舊體梁武謂周捨曰為我求一人文學俱長兼有德行者欲令與晉安遊處捨曰臣外弟徐摛形質陋小若不勝衣而堪此選梁武曰必有仲宣之才亦不簡其貌也乃以摛為侍讀王為太子轉家令文體既別春坊盡學之謂之宮體宮體之號自斯而起又曰齊王嘗問于魏收曰卿才何如徐陵收對曰臣大國之才典以雅徐陵亡國之才麗以豔後周書庾信父肩吾為梁太子中庶子掌管記東海徐摛為左衛率摛子陵及信並為抄撰學士父子在東宮出入禁闥恩禮莫與比隆既有盛才文並綺豔故世號為徐庾體焉, WYG: 百八十六}
