  - {type: variant, offset: 1182, length: 0, content: '', krp: 詞逹而巳及大禹成功九序惟歌少康敗德五子咸諷順羙匡惡其來乆矣自啇曁周雅頌圎備四始彪炳六義環深子夏鑒絢素}
  - {type: variant, offset: 1183, length: 1, content: 元, SBCK: 章子貢悟􅅣磨之句故啇賜二子可以言詩自王澤弥竭風人輟采春秋觀志以諷誦舊章酬酢以爲賔榮吐納而成聲文逮楚國諷怨則離騷爲刺􅁗王滅典亦造仙詩漢􅀄四言韋孟首唱匡諌之義継䡄周人孝武愛文栢梁列韻嚴馬之徒屬詞無方至成帝品録三百餘篇朝章國采亦云周備而詞人遣翰莫見五言所以李陵班婕見擬於前代按邵南行露始}
