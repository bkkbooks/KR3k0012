  - {type: variant, offset: 1226, length: 10, content: 河圖孕乎八卦絡書韞乎, SBCK: 應璩百一獨立不懼詞譎義具魏之遺直也晉世群才稍入輕綺張左潘陸比肩詩衢采縟於正始力柔於建安或折文以爲武或流靡以自研此其大略也江左篇製溺於玄風羞􅀏徇務之志崇盛忘機之談􅀽孫巳下雖各有雕采而詞趣一揆莫與争雄所以景純仙篇挺拔而爲㑺也宋初文詠體有因革嚴老告退而山水方滋儷采百家之偶争價一句之竒情必極貌以冩物必窮力而追新此近代之所竟也故鋪觀列代而情變之數可鑒撮舉同異而綱領之要可明矣􅀂夫四言正體則雅潤爲本五言流調則清麗居宗華實異用惟才所安故平子得其雅叔夜合其潤茂先擬其清景陽振其麗􅀂兼善則子建仲宣徧羙則太冲公幹然詩有恒裁思無定位隨性􅃴分鮮能圎通􅀂妙識所難其易也將至忽以爲易其難也方來矣至於三六雜言則出自篇什離合之發則萌於啚䜟逥文所興則道原爲始聮句共韻則栢梁餘製巨細或殊情理同致緫歸詩囿故不繁云列子曰堯微服遊於康衢聞兒童謡曰立我蒸民莫匪尓極不識不知順帝之則堯問曰孰教尔爲此言童兒曰我聞之大夫問大夫大夫曰古詩也文章流别論曰詩言志歌永言古有採詩之官王者以知得失古詩之四言者振鷺于飛是也漢郊廟歌多用之五言者誰謂雀無角何以穿我屋是也樂府亦用之六言者我姑酌彼金罍是也樂府亦用之七言者交交黄鳥止于桑是也於俳諧倡樂世用之古詩之}
