  - {type: variant, offset: 1595, length: 681, content: 二患理鬱者始貧辭溺者傷亂然則博見為饋貧之糧貫一為拯辭之藥博而能一亦有助乎心力矣又曰翬備色而翱翥百步肌豊而力沉也鷹隼無采而翰飛戾天骨勁而荒猛也文章才力有似於此若風骨乏采則鷙集翰林采乏風骨則雉竄文囿若藻曜而高翔固文章之鳴鳳也又曰括囊雜體功在銓別宮商朱紫隨勢各配章表奏議則准的乎典雅賦頌歌詩則羽儀乎清麗符檄書移則揩式於明斷史論序注則軌範於覈要箴銘碑誄則體制於弘深連珠七辭則從事於功豔此脩體而成勢隨變而立功者也雖復契會相參節文牙雜譬五色之錦各以本采為地矣又曰夫薑桂因地辛在本性文章沿學能在天才故才自內發學以外成有學飽而才餒有才富而學貧學貧者迍邅於事義才餒者劬勞於辭情此內外之殊分也是以屬意於文心與筆謀才為盟主學為輔佐合德文采必霸才學褊狹雖美少功才童學文宜正體制必以情志為神明事義為骨骾辭采為肌膚宮商為聲氣然後品藻玄黃摘振金玉獻可替否以裁厥中斯綴思之恒數也夫文變無方意見浮雜約則義孤博則辭叛變故多尤而為事賤且才分不同思緒各異或製首以通尾或尺接以寸附然通製者蓋寡接附者甚眾若統緒失宗辭味必亂義脈不流則偏枯文體夫能懸識湊理然後節文自會如膠之粘木石之合玉矣是以四壯異力而六轡如琴馭文之法有似於此昔張湯疑奏而再卻虞松草表而屢譴並事理之不明而辭旨之失調也及倪寬更草鍾會易字而漢武歎奇晉景稱善者乃理得而事明心敏而辭當也宋范曄獄中與諸生姪書以自序其略曰吾少嬾學問年三十許始有尚耳自爾已來轉為心化至於所通處皆自得之胸懷常為情志所託故當以意為主以文傳意以意為主則其旨必見以文傳意則其辭不流然後抽其芬芳振其金石耳金樓子曰王仲任言夫說一經者為儒生也傳古今者為通人也上書奏事者為文人也能精思著文連, SBCK: ''}
