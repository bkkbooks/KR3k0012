  - {type: variant, offset: 3297, length: 2, content: 宮出, SBCK: 宫有妃嬪左右甞念及稹篇詠者宫中呼爲元才子至是極承恩遇甞爲長慶宫詞數十百篇閭里竟爲傳唱又曰劉禹錫晚年與少􅀓白居易友善居昜詩筆文章時無在其右者甞與禹錫唱和徃來因集其詩而序之曰彭城劉夢得詩豪者也其鋒森然少敢當者予不量力徃徃犯之夫合應者聲同交争者力敵一徃一復欲罷不能一二年來曰㝷筆硯同和贈荅不􅁴滋多大和三年春巳前􅁓墨所在者凢一百三十八首其餘乗興仗醉率然作者不在此數甞戯微之云僕與足下二十年來爲文友詩敵幸也亦不幸也吟詠情性播揚名聲其適遺形其樂忘老幸也然江南士女語才子者多云元白以子之故使僕不得獨歩於呉越閭此亦不幸也今垂老復遇夢得非重不幸耶夢得文之神妙莫先於詩􅀂妙與神則吾豈敢如夢得雪裏髙山頭白早海中仙果子生遟沉舟側畔千㠶過病樹前頭萬木春之句之􅀋真謂神妙矣在在處處應有靈物護持豈止兩家子弟秘藏而巳性􅀃曰夏侯孝􅀂作周詩成示潘岳曰此文非徒温雅乃見孝悌之性潘因此遂作家風詩又曰孫秀収石崇潘岳先送石棄市潘後至石謂潘曰安仁卿亦復尔耶潘曰可謂白首同所歸潘金谷詩云投分􅀉石友白首同所歸乃成其詩又曰孫子荆除婦服作詩以示王武子曰未知文生於情情生於文覽之悽然憎伉儷之重文士傳曰張秉自知短命乃作千年歌詩以自傷顔氏家訓曰王籍}
