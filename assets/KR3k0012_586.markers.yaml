  - {type: variant, offset: 3310, length: 2, content: 盛才, SBCK: 何贈智者常於任昉座賦詩而其詩言不􅀋任云卿詩可謂髙厚其人大怒曰遂以我詩爲狗號國朝傳記曰薛道衡聘陳爲人日詩云入春􅂊七日離家巳二年南人嗤之曰是底言語誰謂此虜解作詩及云人歸落鴈後思發在花前乃喜曰名下固無虚士國朝雜記曰沈佺期以工詩著名燕公張􅀃甞謂之曰沈三兄詩直湏還他第一國史􅀘曰德宗以二月一日爲中和節宴百寮賦詩群臣奉和詔冩本賜戴叔倫於容州天下榮之又曰杜佑在淮南進崔叔清詩百篇上曰此惡詩焉用進時人謂之淮勑惡詩陸機}
  - {type: page-break, offset: 3310, content: '', id: KR3k0012_SBCK_586-7b}
  - {type: variant, offset: 3310, length: 2, content: 盛才, krp: 何贈智者常於任昉座賦詩而其詩言不類任云卿詩可謂髙厚其人大怒曰遂以我詩爲狗號國朝傳記曰薛道衡聘陳爲人日詩云入春纔七日離家巳二年南人嗤之曰是底言語誰謂此虜解作詩及云人歸落鴈後思發在花前乃喜曰名下固無虚士國朝雜記曰沈佺期以工詩著名燕公張說甞謂之曰沈三兄詩直湏還他第一國史𥙷曰德宗以二月一日爲中和節宴百寮賦詩群臣奉和詔冩本賜戴叔倫於容州天下榮之又曰杜佑在淮南進崔叔清詩百篇上曰此惡詩焉用進時人謂之淮勑惡詩陸機}
