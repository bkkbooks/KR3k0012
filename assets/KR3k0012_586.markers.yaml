  - {type: variant, offset: 1290, length: 1, content: 煥, SBCK: 公幹􅂛堂思王入室王陽潘陸自可坐於廊廡之間劉楨文躰出於古詩伏氣愛竒動多震絶楨骨氣凌霜髙風跨俗但氣過其文彫潤恨少然自陳思巳徃楨稱獨歩張恊字景陽詩其原出於王粲文章華静實少病累又巧構形似之言雄於潘岳靡於太冲風流調逺實曠代之髙才其辭彩葱蒨音韻鏗鏘使人味之亹亹不倦阮籍詩其原出於小雅雖無彫斵之巧而詠懷之作可以陶性靈發幽致言在耳目之内情􅀉八荒之表洋洋}
