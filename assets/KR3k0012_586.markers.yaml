  body:
  - {type: variant, offset: 2, length: 283, content: 一敘文易賁卦彖曰觀乎天文以察時變觀乎人文以化成天下春秋襄二十五年傳曰鄭子產獻捷于晉獻入陳之功士莊伯不能詰仲尼曰志有之言以足志文以足言不言誰知其志言之無文行之不遠論語曰孔子曰周鑒於二代郁郁乎文哉吾從周又曰子貢曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也又曰大哉堯之為君也巍巍乎唯天為大唯堯則之蕩蕩乎民無能名焉巍巍乎其有成功煥乎其有文章楊子法言曰或曰良玉不雕美言不文何謂也曰玉不雕璵璠不作器言不文典謨不作經桓寬鹽鐵論曰內無其實而外學其文若畫脂鏤冰費日損功王充論衡曰學問習熟則能推類興文文由外而滋未必實才與文相副也魏文帝典論曰夫文本同而末異蓋奏議宜雅書論宜理銘誄尚實, SBCK: ''}
  - {type: variant, offset: 2, length: 28, content: 一敘文易賁卦彖曰觀乎天文以察時變觀乎人文以化成天下春秋襄, WYG: ''}
