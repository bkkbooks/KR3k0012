  - {type: 'tls:seg', offset: 3274, content: '', id: KR3k0012_CHANT_586-20a.14}
  - {type: variant, offset: 3274, length: 9, content: 東海徐摛為左衛率摛, SBCK: 時别帥馮本以水軍援禆將郭封舡破失期封欲作書與勣恐髙麗知其救兵不至乗危迫之乃令萬頃作離合詩贈勣勣不逹其意大怒曰軍機急切何用詩爲必斬之萬頃解􅇚之乃止又曰錢起能五言詩􅀄從郷薦家􅀉江湖甞於客舎月夜獨吟遽聞人吟於廷曰曲終人不見江上數峯青起愕然懾衣視之無所見矣以爲􅀑恠而志之及起就試之年李暐所試湘靈皷瑟詩題中有青字起即以􅀑謡十字爲落句暐深嘉之稱爲絶唱是歳登第又曰元稹聦警絶人年少有才名與太原白居易爲友工爲詩善狀詠當時風態物色當時言詩者稱元白焉自衣冠士}
  - {type: page-break, offset: 3274, content: '', id: KR3k0012_SBCK_586-6a}
  - {type: variant, offset: 3274, length: 9, content: 東海徐摛為左衛率摛, krp: 時别帥馮本以水軍援禆將郭封舡破失期封欲作書與勣恐髙麗知其救兵不至乗危迫之乃令萬頃作離合詩贈勣勣不逹其意大怒曰軍機急切何用詩爲必斬之萬頃解釋之乃止又曰錢起能五言詩𥘉從郷薦家寄江湖甞於客舎月夜獨吟遽聞人吟於廷曰曲終人不見江上數峯青起愕然懾衣視之無所見矣以爲鬼恠而志之及起就試之年李暐所試湘靈皷瑟詩題中有青字起即以鬼謡十字爲落句暐深嘉之稱爲絶唱是歳登第又曰元稹聦警絶人年少有才名與太原白居易爲友工爲詩善狀詠當時風態物色當時言詩者稱元白焉自衣冠士}
