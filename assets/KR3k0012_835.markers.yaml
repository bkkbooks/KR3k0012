  - {type: variant, offset: 306, length: 3, content: 鄭敬隱, WYG: 明帝時舘陶公主光武女為子求郎不許而賜錢千萬謂羣臣曰郎官上應列宿出宰百里史記曰太㣲宫後二十五星郎位也有非其人則民受其殃是以難之又曰樊儵卒帝遣小黄門張音問所遺言先是河南縣亡失官錢典負者典謂主典負謂欠負坐死及罪徙者甚衆遂委責}
  - {type: variant, offset: 306, length: 0, content: '', krp: 明帝時館陶公主光武女爲子求郎不許而賜錢千萬謂羣臣曰郎官上應列宿岀宰百星史記曰太微宫後二十五星郎位也有非其人則民受其殃是以難之又曰樊鯈卒帝遣小黄門張音問所遺言先是河南縣亡失官錢典負者典謂主典負謂欠負坐死及罪徙者甚衆遂委責於人以償其耗郷部吏司因此爲姧鯈常疾之欲奏罷之疾病未及得上音歸具以聞帝覽之而悲歎勑郡並從之又曰京兆尹閻興召第五倫爲主簿時長安鑄錢多姦巧乃署倫爲督鑄錢掾領長安市東觀漢記曰時長安市未有祑又鑄錢官䡖姦所集無能整齊理之者興署倫督鑄錢掾領長安市其後小人爭頌皆云第五掾所平亦無姦枉又曰𥘉馬援在隴西上書言冝如舊鑄五銖錢事三府三府奏以爲未可事遂寢及援還從公府求得前奏難十餘條乃隨牒解釋東觀漢記曰十三難援一一觧之條奏其狀也更具表言帝從之天下頼其便又曰公孫𫐠廢銅錢用鐡官錢置鐵以鐵錢百姓貨幣不行蜀中童謡言黄牛白腹五銖當復好事者竊言王莽稱黃𫐠自號白五銖錢漢貨也言天下當并還劉氏又曰江革建武末年與母歸郷里毎至歳時縣當案比安驗以比之猶今㒵閱也革以母老不欲揺動自在轅中輓車不用牛馬由是郷里稱之曰江巨孝臨淄令楊音髙之設特席顯異巨孝於稠人廣衆中親奉錢以助供養又曰楊秉免歸雅素清儉家至貧窶并曰而食任城故孝廉景虜齎錢百餘萬以餉秉秉閉門拒絶不受又曰鍾離意薦劉平王望等書奏有詔徴平等特賜辨裝錢至皆拜議郎又曰崔寔從兄烈有重名於北州歷位郡守九卿靈帝時開鴻都門牓賣官爵公卿州郡下至黄綬各有差其冨者則先入錢貧者到官而後悟輸是時叚熲樊陵張温等雖有功勤名譽然皆先輸貨財而後登公位烈時因傳母入錢五百萬得爲司徒及拜日天子臨軒百僚畢㑹帝頋謂親倖者曰悔不小靳可至千萬靳固惜之也程夫人於傍應曰崔公冀州名士豈買官頼我得是反不知姝邪姝美也言反不可斯事之美也姝或作株株根本也又曰董卓壞五銖錢更鑄小錢悉取洛陽及長安銅人鍾虞飛廉銅馬之属以充鑄焉故貨錢物貴榖不數萬又錢無輪郭文章不便人用魏志曰卓鑄小錢大五分無文章肉好無輪郭不磨鑢也時人以爲秦始皇見長人於臨洮乃鑄銅人卓臨洮人也而今毁之雖成毁不同凶暴相類焉又曰車駕西廵乃厚賜韋彪錢珍羞食物使歸平陵上家又曰}
  - {type: variant, offset: 307, length: 2, content: 敬隱, SBCK: 弘爲陽羡令都郷部民有弟用兄錢者爲嫂所責叔未還嫂詣弘言之弘賣中單爲叔還錢兄慙自繫婦即去又王符論曰夫竊位之人天奪其鑒寧見朽千萬而不忍賜人一錢續漢書曰劉寵宇祖榮遷㑹稽太守正身率下郡中大治徴入爲將作大匠山隂民去治數拾里有􅀂郍水在山谷間五六老翁年七八十聞遷相率共送寵人齎百錢寵見勞來曰父老何乃自苦逺來皆對曰山父鄙老生未甞到郡縣他時吏發求不巳民間或夜行不絶狗吠竟夕人不得安自明府下車以來狗不吠夜吏希至人間年老遭值聖化聞當見弃去故戮力來送寵謝之爲選受壹大錢故寵在㑹稽號爲取一錢其清如是又曰扶風人事孫奮居冨而慳恡梁冀因以馬乗遺之從賃錢二十萬􅁬以錢十萬與之冀大怒又曰靈帝中平二年二月巳酉南宫靈䑓災庚戌樂中城殿門災延及北闕燒嘉德和歡殿收天下田畒十錢以治宫加調刺史二千石遷除皆責治宫錢大郡至二千萬帝本侯家居貧即帝曰桓帝不能作家曽無私錢財故}
