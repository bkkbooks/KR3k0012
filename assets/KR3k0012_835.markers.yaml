  - {type: variant, offset: 105, length: 1, content: 釣, SBCK: 以子貨物物輕則子獨行物重則以母權而行之也子母相通民皆得其欲也􅀂不堪重則多作輕而行之亦不發重於是乎有子權母而行小大利之堪任也不任者幣重物輕則妨其用也故雜而用之子權母者母不足則以于平而行之故民皆以爲利今王廢輕而作重民失其資能無匱乎廢䡖而作重則大竭而未寡故民失其資􅀂匱王用將有所乏民財匱無以供上故王用將乏乏則將厚取於民民不給將有逺志是離民也給供也逺志通逃也若民離而財匱災至而備亡王其若之何病亡無救災之備也王其圖之王弗聽卒鑄大錢歸藏曰有人將來遺我錢財曰夜望之周書曰武王剋商發鹿䑓之錢散鉅橋之粟韓詩曰旣詐我德賈用不售一錢之物舉賣百何時當售乎史記曰􅀄􅂫􅁗之燕貸百錢爲資及得資以百金償之又曰髙祖以愛繇咸陽吏皆送奉錢三李竒注或三百或五百蕭何獨以五後益封二千戸又曰單父人吕公善沛令避仇從之沛中豪傑吏聞令有客皆徃賀蕭何爲主吏主進令諸大夫曰不滿千錢坐堂下髙祖爲亭長素易諸吏乃給爲謁曰賀錢萬實不持一錢又曰上使善相者相鄧通曰當貧餓死文帝曰能富通者在我何謂貧於是賜通蜀嚴道銅山自鑄錢鄧氏錢布天下又曰安息在大月氏西以銀爲錢錢如其王靣王死轉更錢效王靣焉又曰今上即位武帝數歳漢興七十餘年之間國家無事京師之錢累百巨萬貫朽}
