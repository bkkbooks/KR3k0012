  - {type: variant, offset: 1223, length: 1287, content: 之上楚王使大夫二人往見焉曰願以境內累夫子莊子持竿不顧又曰任公子好釣巨魚為大綸巨釣以犗牛為餌蹲會稽投東海朞年不得魚已而大魚食之牽巨釣驚揚波而奮鬐白波若山海水振蕩任公子得若魚離而臘之浙河以東蒼梧以北莫不厭若魚者淮南子曰詹公之釣千歲之鯉又曰聖人以道德為竿以昏義為鉤餌役之天地門萬物孰非其有哉又曰無餌之釣不可以得魚愚士無禮不可以得賢又曰釣者靜之罛者舟之罩者抑之罾者舉之為之異得魚一也孫綽子曰海人與山客辯其方物海人曰橫海有魚額若華山之頂一吸萬頃之波山客曰鄧林有木圍三萬尋直上千里傍蔭數國有人曰東極有大人斬木為策短不可支釣魚為鮮不足充饑抱樸子曰金鉤玉餌雖珍而不能制九淵之沉鱗顯寵豐祿雖貴而不能致無欲之幽人符子方外曰太公釣隱溪五十有六年矣而未嘗得一魚魯連聞之往而觀其釣太公跪石隱崖且不餌而釣仰詠俯吟及暮而釋竿傅子曰劉曄責楊暨曰夫釣者中大魚則縱而隨之須可制而後牽之則無不得也人主之威豈徒大魚而已子誠直臣然計不足不可不精思也穆天子傳曰天子北征舍於珠澤此澤出珠因名之云今越攜平澤出青珠以釣於流水又曰辛未天子北還釣于漸澤食魚于桑野又曰天子乃釣于河以觀姑繇之木姑繇大木也山海經曰尋木長千里生河邊謂此木之類六韜曰呂尚坐茅以漁文王勞而問焉呂尚曰魚求於餌乃牽其緡人食於祿乃服於君故以餌取魚魚可殺以祿取人人可竭以小釣釣川而擒其魚中釣釣國而擒其萬國諸侯呂氏春秋曰善釣者出魚乎千仞之下餌香也又曰太公釣於紂之世文王得之而王文王千乘也紂天子也天子失之而千乘得之知與不知也又曰若釣者魚有大小餌有宜適羽有動靜羽釣浮也說苑曰宓于賤為單父宰過於陽書曰子亦有以送僕乎陽書曰吾少也賤不知治民之術有釣道二焉請以送子子賤曰釣道柰何陽書曰夫投綸餌迎而吸之者陽橋也其為魚也薄而不美若存若亡若食不食者魴也其為魚也薄而味厚宓子賤曰善於是未至單父冠蓋迎之者交接於道子賤曰驅驅之夫陽書之所謂陽橋者至矣焦贛易林曰曳綸江海鉤挂魴鯉王孫利得以饗仲友列仙傳曰呂尚冀州人避紂亂釣于卞溪三年不獲魚比嫗聞曰自可止矣公曰非爾所矣果獲大鯉得兵鈐於魚腹中後葬無尸唯玉鈐六薦在棺中又曰涓子者齊人釣於澤得符鯉中又曰陵陽子明銍鄉人釣施溪得白龍子解網拜謝放之後數十年得白魚腹中有書教子明服食遂上黃山採五石脂石肺服之三年白龍來迎之神仙傳曰左慈字元放盧江人少有神通嘗在曹公坐公從容曰今日高會珍羞略備所少吳松江鱸魚耳而放下坐應曰此可得也因求銅盤貯水以竹竿餌釣於盤須臾引入鱸魚出公大笑會者咸驚中論曰獨思則滯而不通獨為則困而不就善釣不易坻而得魚君子不降席而追道又曰又王遇姜公於渭濱皤然皓首秉竿而釣文王得之灼若袪雲而見日霍若開霧而觀山桓範世論曰水則有波釣則有磨我欲更之無如之何言物動而舋已彰形行而跡已著又曰釣巨魚不使嬰兒輕預非不親力不堪也王子年拾遺記曰漢帝元鳳中季秋之月泛衝瀾靈鷁之舟窮晷繼夜釣于臺下以香金為鉤霜絲為綸丹鯉為餌得白蛟長三丈大若蛇無鱗甲又曰吳主與潘夫人遊釣得大魚吳主喜夫人曰昔聞泣魚今乃為喜有喜必憂以為深誡至末年漸相譖毀稍見離退時人謂夫人知幾釣臺今猶存焉世說曰劉道真少時常漁釣草澤善歌嘯聞者莫不留連有一老嫗識異常人甚樂歌嘯乃殺豚進之道真食豚盡了不謝嫗見不飽又進一豚食半, SBCK: ''}
  - {type: variant, offset: 1223, length: 1287, content: 之上楚王使大夫二人往見焉曰願以境內累夫子莊子持竿不顧又曰任公子好釣巨魚為大綸巨釣以犗牛為餌蹲會稽投東海朞年不得魚已而大魚食之牽巨釣驚揚波而奮鬐白波若山海水振蕩任公子得若魚離而臘之浙河以東蒼梧以北莫不厭若魚者淮南子曰詹公之釣千歲之鯉又曰聖人以道德為竿以昏義為鉤餌役之天地門萬物孰非其有哉又曰無餌之釣不可以得魚愚士無禮不可以得賢又曰釣者靜之罛者舟之罩者抑之罾者舉之為之異得魚一也孫綽子曰海人與山客辯其方物海人曰橫海有魚額若華山之頂一吸萬頃之波山客曰鄧林有木圍三萬尋直上千里傍蔭數國有人曰東極有大人斬木為策短不可支釣魚為鮮不足充饑抱樸子曰金鉤玉餌雖珍而不能制九淵之沉鱗顯寵豐祿雖貴而不能致無欲之幽人符子方外曰太公釣隱溪五十有六年矣而未嘗得一魚魯連聞之往而觀其釣太公跪石隱崖且不餌而釣仰詠俯吟及暮而釋竿傅子曰劉曄責楊暨曰夫釣者中大魚則縱而隨之須可制而後牽之則無不得也人主之威豈徒大魚而已子誠直臣然計不足不可不精思也穆天子傳曰天子北征舍於珠澤此澤出珠因名之云今越攜平澤出青珠以釣於流水又曰辛未天子北還釣于漸澤食魚于桑野又曰天子乃釣于河以觀姑繇之木姑繇大木也山海經曰尋木長千里生河邊謂此木之類六韜曰呂尚坐茅以漁文王勞而問焉呂尚曰魚求於餌乃牽其緡人食於祿乃服於君故以餌取魚魚可殺以祿取人人可竭以小釣釣川而擒其魚中釣釣國而擒其萬國諸侯呂氏春秋曰善釣者出魚乎千仞之下餌香也又曰太公釣於紂之世文王得之而王文王千乘也紂天子也天子失之而千乘得之知與不知也又曰若釣者魚有大小餌有宜適羽有動靜羽釣浮也說苑曰宓于賤為單父宰過於陽書曰子亦有以送僕乎陽書曰吾少也賤不知治民之術有釣道二焉請以送子子賤曰釣道柰何陽書曰夫投綸餌迎而吸之者陽橋也其為魚也薄而不美若存若亡若食不食者魴也其為魚也薄而味厚宓子賤曰善於是未至單父冠蓋迎之者交接於道子賤曰驅驅之夫陽書之所謂陽橋者至矣焦贛易林曰曳綸江海鉤挂魴鯉王孫利得以饗仲友列仙傳曰呂尚冀州人避紂亂釣于卞溪三年不獲魚比嫗聞曰自可止矣公曰非爾所矣果獲大鯉得兵鈐於魚腹中後葬無尸唯玉鈐六薦在棺中又曰涓子者齊人釣於澤得符鯉中又曰陵陽子明銍鄉人釣施溪得白龍子解網拜謝放之後數十年得白魚腹中有書教子明服食遂上黃山採五石脂石肺服之三年白龍來迎之神仙傳曰左慈字元放盧江人少有神通嘗在曹公坐公從容曰今日高會珍羞略備所少吳松江鱸魚耳而放下坐應曰此可得也因求銅盤貯水以竹竿餌釣於盤須臾引入鱸魚出公大笑會者咸驚中論曰獨思則滯而不通獨為則困而不就善釣不易坻而得魚君子不降席而追道又曰又王遇姜公於渭濱皤然皓首秉竿而釣文王得之灼若袪雲而見日霍若開霧而觀山桓範世論曰水則有波釣則有磨我欲更之無如之何言物動而舋已彰形行而跡已著又曰釣巨魚不使嬰兒輕預非不親力不堪也王子年拾遺記曰漢帝元鳳中季秋之月泛衝瀾靈鷁之舟窮晷繼夜釣于臺下以香金為鉤霜絲為綸丹鯉為餌得白蛟長三丈大若蛇無鱗甲又曰吳主與潘夫人遊釣得大魚吳主喜夫人曰昔聞泣魚今乃為喜有喜必憂以為深誡至末年漸相譖毀稍見離退時人謂夫人知幾釣臺今猶存焉世說曰劉道真少時常漁釣草澤善歌嘯聞者莫不留連有一老嫗識異常人甚樂歌嘯乃殺豚進之道真食豚盡了不謝嫗見不飽又進一豚食半, WYG: ''}
