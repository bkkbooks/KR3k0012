  - {type: variant, offset: 183, length: 0, content: '', SBCK: 幣爲三等黄金以鎰爲名孟子曰二十兩爲鎰臣瓉按􅁗以一鎰爲一金漢以一斤爲一金上幣銅錢漢興以爲􅁗錢重難用更令民鑄莢錢如淳曰如榆莢又曰凡貨金錢布泉之用夏殷以前其詳靡記太公爲周立九府貟法李竒曰貟即錢黄金故貨而方寸重一斤錢圎函方輕重以銖布泉廣二尺二寸爲幅長四丈爲疋故貨寳於金利於刀流於泉布於門行如流泉布於民間束於帛束又曰孝惠帝時天下􅀄定呉有䂊章銅山即招致天下亡命者盗鑄錢又曰髙后二年秋七月行八銖錢又曰文帝五年除盗鑄錢令應劭曰聽放鑄更造四銖應劭日文帝以五分錢泰䡖小更作四銖錢文亦曰半兩錢今民閒半兩錢最䡖小又曰建元元年春行三銖錢五年春罷三銖錢行半兩錢又曰成帝時郡國鑄錢民多姦錢多輕而公卿請令京師鑄官赤仄如淳曰銅爲其郭也今錢見有赤仄者不知作法云何是又曰宣帝二年春岀水衡錢應劭曰水衡與折府皆天子私錢耳縣當仰給司農今丗水衡錢言宣帝即位爲異政又曰自孝武元狩五年三官􅀄鑄五銖錢至平帝元始中成二百八十億萬餘又曰韓信爲楚}
  - {type: page-break, offset: 183, content: '', id: KR3k0012_SBCK_835-3a}
  - {type: variant, offset: 183, length: 0, content: '', WYG: 幣為二等黄金以鎰為名孟子曰二十兩為鎰臣瓉按秦以一鎰為一金漢以一斤為一金上幣銅錢漢興以為秦錢重難用更令民鑄莢錢如淳曰莢如榆莢又曰凡貨金錢布帛之用夏殷以前其詳靡記太公為周立九府圜法李竒曰圜即錢也黄金方寸而重一斤錢圜函方輕重以銖布帛廣二尺二寸為幅長四丈為疋故貨寳於金利於刀流於泉布於布行於流泉布扵民間束於帛又曰孝恵帝時天下初定呉有豫章銅山即招致天下亡命者盗鑄錢又曰髙后二年秋七月行八銖錢又曰文帝五年除盗鑄錢令應劭曰聽放鑄更造四銖應劭曰文帝以五分錢太輕小更作四銖錢文亦曰半兩錢今民間半兩錢最輕小又曰建元元年春行三銖錢五年春罷三銖錢而行半兩錢又曰成帝時郡國鑄錢民多姦錢多輕而公卿請令京師鑄官赤仄又曰宣帝二年春出水衡錢應劭曰水衡與少府皆天子私錢耳縣當仰給司農今出水衡錢言宣皇即位為異政又曰自孝武元狩五年三官初鑄五銖錢至平帝元始中成二百八十億萬餘又曰韓信為楚}
