  - {type: variant, offset: 3909, length: 668, content: 星在罶牂羊牝羊也罶曲梁寡婦之笱也爾雅曰嫠婦之笱謂之罶敦璞注曰謂以簿為其魚笱廣雅曰曲梁謂之昴纂文曰楊州取魚罶也吳人謂之為笱主說文曰罶曲梁寡婦笱魚所留也罺爾雅曰罺謂之汕郭璞注曰今之撩罟也犍為舍人曰以薄摷魚曰摷者也纂文曰以魚乘水上為汕罩爾雅曰籗謂之罩郭璞注曰捕魚籠毛詩小雅曰南有嘉魚蒸然罩罩纂文曰以鐵施掉因以取魚符子曰天羅廓矣野人猶有罩翳之勤涔爾雅曰糝謂之涔郭璞注曰今作糝者聚柴於水中魚得寒入其裏藏隱因以簿圍捕取之犍為舍人曰以米投水中養魚曰涔也纂文曰以鐵施竹頭取魚為涔罾說文曰罾魚網也史記曰陳勝詐為書置人所罾魚腹中風土記曰罾樹四植而張網於水車輓上下之形如蜘蟵之網方而不圓楚辭曰鳥何萃兮蘋中罾何為兮木上俞失其所應璩新詩曰洛水禁罾罟魚鱉不為殖罾罟網名空令自相啖吏民不得食笱毛詩雞鳴弊笱曰弊笱在梁其魚唯唯又小雅小弁曰無逝我梁無發我笱說文曰笱曲竹捕魚笱也從竹勾亦聲欚廣雅曰其罾謂之欚梁毛詩國風曰維鵜在梁不濡其翼鵜洿澤也梁水中之梁鵜在梁可謂不濡其翼彼其之子不稱其服箋云不稱者言德薄而服尊維鵜在梁不濡其咮咮啄也彼其之子不遂其媾又小雅曰鴛鴦在梁戢其左翼言休息也箋云梁石絕水之梁戢歛也鴛鴦休息梁又曰彼何人斯其心孔艱胡逝我梁不入我門魏志曰文帝東征郭后留譙宮時后兄表留宿衛欲遏水取魚后曰水當通運漕又少材木奴客不在目前當復私取官竹木作梁遏水今奉車所不足者豈魚乎齊地記曰高密郡有古斷水處因造魚歲收億數故號曰萬疋梁軥廣雅曰軥謂之軥上罠說文曰罠䱷也罨廣雅曰罨鮆網也風土記曰罨如𦌇而小斂口從水上掩而取者也箄纂文曰箄流水中張魚器也纂文曰取蟹者曰銛纂文曰鐵有鉅施竹頭以擲魚為銛, SBCK: 十五}
