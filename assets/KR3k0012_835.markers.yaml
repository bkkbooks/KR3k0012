  - {type: variant, offset: 30, length: 0, content: '', WYG: 金幣之名所}
  - {type: variant, offset: 31, length: 1, content: 此, WYG: 質貨物通財用也古曰泉後轉曰錢大錢大於舊其價重也單穆公曰不可穆公王卿士單靖公曽孫古者天降灾戾於是乎量資幣權輕重以振救民量度資財也權稱振拯也民患輕則為之作重幣以行之民患幣輕而物貴則作重幣以行其輕也於是乎}
  - {type: variant, offset: 33, length: 1, content: 求, WYG: 母權子而行民皆得焉重曰母輕曰子以子貨物物輕則子獨行物重則以母權而行之也子母相通民皆得其欲也若不堪重則多作輕而行之亦不廢重}
  - {type: page-break, offset: 33, content: '', id: KR3k0012_WYG_835-2a, image: WYG0900/WYG0900-0388a.png}
  - {type: variant, offset: 35, length: 2, content: 何彼, WYG: 是乎有子權母而行小大利之堪任也不任者幣重物輕則妨其用也故雜而用之子權母者母不足則以子平而行之故民皆}
  - {type: punctuation, offset: 36, content: ，, id: KR3k0012_CHANT_835-bkkpn16}
  - {type: 'tls:seg', offset: 36, content: '', id: KR3k0012_CHANT_835-1a.12}
  - {type: variant, offset: 39, length: 0, content: '', WYG: 利今王廢輕而作重民失其資能無匱乎廢輕而作重則本竭而末寡故民失其資若匱王用將有所乏民財匱無所供上故王将用乏乏則將厚取於民民不給將有逺志是離民也給供也逺志逋逃也若民離而財匱灾至而備亡其若}
  - {type: variant, offset: 40, length: 1, content: 乎, WYG: 何備亡無救灾之備也王其圖之王弗聽卒鑄大錢歸藏曰有人将来遺我錢財日夜望之周書曰武王克啇散鹿臺之錢發鉅橋之粟韓詩曰既阻我徳賈用不售一錢之物舉賣百何時當售也史記曰初蘇秦之燕貸百錢為資及得資}
  - {type: page-break, offset: 40, content: '', id: KR3k0012_WYG_835-2b, image: WYG0900/WYG0900-0388b.png}
  - {type: punctuation, offset: 41, content: ？, id: KR3k0012_CHANT_835-bkkpn17}
  - {type: 'tls:seg', offset: 41, content: '', id: KR3k0012_CHANT_835-1a.13}
  - {type: variant, offset: 42, length: 1, content: 絲, WYG: 百金償之又曰漢髙祖以愛繇咸陽吏皆奉錢三李竒注或三百或五百蕭何獨以五後益封二千户又曰單父人吕公善沛令避仇従之沛中豪傑吏聞令有客皆往賀蕭何}
  - {type: page-break, offset: 42, content: '', id: KR3k0012_WYG_835-3a, image: WYG0900/WYG0900-0388c.png}
  - {type: variant, offset: 44, length: 0, content: '', WYG: 主吏主進令諸大夫曰不滿千錢坐堂下髙祖為亭長素易諸吏乃紿為謁者曰賀錢萬貫不持一錢又曰上使善相者相鄧通曰當貧餓死文帝曰能富通者在我何謂貧於是賜通蜀嚴道銅山自鑄錢鄧氏錢布天下又曰安息在大月氐西以銀為錢錢如其王面王死轉更錢效王靣焉又曰今上即位武帝數歳漢興七十餘年}
