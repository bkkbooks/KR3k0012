  - {type: variant, offset: 549, length: 0, content: '', WYG: 秦始皇見長人於臨洮乃鑄銅人卓臨洮人也而今毁之雖成毁不同㓙暴相類焉又曰車駕西廵乃厚賜韋彪錢珎羞食物使歸平陵上家焉又曰鄭𢎞為楊羡令都鄉部民有弟用兄錢者為嫂所賣叔未還嫂詣𢎞言之𢎞賣巾車為叔還錢兄慙自繫婦即去又王符論曰夫竊位之人天奪其鑒寧見朽千萬而不忍賜人一錢續漢書曰劉寵字祖榮遷㑹稽太守正身率下郡中大治徴入為將作大匠山隂民去治數千里有若邪水在山谷間五六老翁年七八十聞遷相率共送寵人賫百錢寵見勞来曰父老何乃自苦逺来皆對曰山人鄙老生未嘗到郡縣他時吏發求不已民間或夜行不絶狗吠竟夕人不得安自明府下車以来狗不夜吠吏希至人間年老遭值聖化聞當見棄去故戮力来送寵謝之為選受一大錢故寵在㑹稽􅃅為取一錢其清如是又曰扶風人士孫奮居富而慳恡梁冀因以馬乗遺之従賃錢二十萬奮以錢十萬與之冀大怒又曰靈帝中平二年二月己酉南宫靈臺災庚戌樂城殿門災延及北闕燒嘉徳和歡殿收天下田畆十錢以治宫加調刺史二千石遷除皆責治宫錢大郡至二千萬帝本侯家居貧即帝位曰桓帝不能作家曽無錢財故於西園造萬金堂以為私藏復寄小黄門常侍家私錢至數千萬東觀漢記曰光禄勲杜林與馬援鄉里親厚援南方還時林馬適死援遣子持一匹馬遺林曰朋友有車馬之饋可以備之居數日林遣子奉書曰將軍内施九族外有賔客望恩者多林父子食卿禄禄常有盈今奉錢五萬援謂兒曰當以此為法杜伯山所以勝我者也又曰趙勤字益卿劉賜姊子勤童幼有志操往来賜家國租適到時勤在旁賜指錢示勤曰拜乞汝三十萬勤曰拜而得錢非義所取終不肯拜又曰荀均字仲虞兄仲祥為縣吏受禮遺均數諫止不聽即脫身出作歳餘得錢數萬歸以與兄曰錢盡可復得為吏坐賍終身捐棄兄感其言遂亷潔稱清吏又曰王阜為益州大守大將軍竇憲貴盛嘗移書益州取六百萬阜疑有奸詐以狀上憲追奴騶帳下吏李文迎錢阜以詔書未報拒不與文積二十餘日詔書報給文以錢市馬獻帝春秋曰靈帝作錢猶五銖而有四道連於邉輪識者以為妖竊言錢有四道京師將破壞此錢四出散於四方乎還如其言范􅁮後漢書云四出錢應劭漢官曰王莾簒位以劉字金刀罷五銖更作小錢文曰貨泉其文反白水真人此則世祖中興之瑞也魏志曰劉虞在幽州清浄儉約以禮義化民靈帝時南宫災吏遷補州郡者皆責助治宫錢或一千萬或三千萬富者以私財辦或發民錢補之貧而清慎者無以充調或至自殺靈帝以虞清貧特不使出錢也又曰劉類為𢎞農太守使人掘地求錢所在市里皆有孔穴又曰文帝夢磨錢文欲令滅而更明周宣占之曰陛下家事時帝欲治弟植逼太后但加貶守呉書曰嘉禾五年春鑄大錢一當五百詔使吏民輸銅計銅畀直設盗鑄之科蜀志曰先主攻劉璋與士衆約若事定庫府百物孤無豫焉及㧞成都士衆捨干戈赴府藏競取寳物軍用不足先主甚憂之劉巴曰易耳但當鑄直百錢平諸物價令吏為官市先主從之數月之間府庫充矣晉陽秋曰朝士以牛酒勞齊王冏平原王幹獨賫百錢晉書曰阮宣子常杖頭挂百錢造市店酣飲而歸又曰王衍疾其妻郭氏之貪鄙故口未嘗言錢郭氏欲試之令婢以錢繞床使不得行衍晨起見錢謂婢曰舉阿堵物却其措意如此又曰王𨗳子悦少侍講東宫歴吴王友中書侍郎𨗳夢人以百萬錢買悦意甚惡之後掘地得錢一窖皆蔵閉而悦果以疾終又曰張軌為涼州叅軍索輔言於軌曰古者金貝皮幣為貨息榖帛量度之耗二漢制五銖錢通易不滯太始中河西荒廢遂不用錢裂疋以為叚數縑布既壞市易又難徒壊女工不任衣用弊之甚也今中州雖亂此方安全宜復五銖以濟通變之㑹軌納之立制准布用錢錢遂大行人頼其利南史曰宋文袁皇后家本貧薄后每就上求錢帛以贍之上性儉所得不過錢三五萬帛三五十疋後潘淑妃有寵愛傾後宫咸言所求無不得后聞}
