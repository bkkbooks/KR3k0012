  - {type: variant, offset: 310, length: 4, content: 蟻陂釣魚, SBCK: 西園造萬金堂以爲私藏復􅀉小黄門常侍家私錢至數千萬東觀漢記曰光禄勲杜林與馬援郷里親厚援南方還時林馬適死援遣子持一疋馬遺林曰朋友有車馬之饋可以備之居數日林遣子奉書曰將軍内施九族外有賔客望恩者多林父子食卿禄禄常有盈今奉錢五萬援謂兒曰當以此爲法杜伯山所以勝我者也又曰趙勤字益卿劉賜姊子勤童㓜有志操徃來賜家國租適到時勤在旁賜指錢示勤曰拜乞汝三十萬勤曰拜而得錢非義所取終不肯拜又曰鄭均字仲虞兄仲爲縣吏受禮遺均數諌止不聽即脫身岀作嵗餘得數萬錢歸以與兄曰錢盡可復得爲吏坐􅂍終身損弃兄感其言遂廉㓗稱清吏又曰王阜爲益州太守}
