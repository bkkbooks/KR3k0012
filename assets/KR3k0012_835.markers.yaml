  - {type: variant, offset: 3498, length: 410, content: 昊師蜘蟵而結網國語曰魯宣公夏濫於泗淵濫漬也漬罟於泗水之淵以取魚泗在魯城北里革斷其罟而棄之罟網曰古者大寒降土蟄發降下也寒氣初下謂季冬建丑之月大寒之後也土蟄發謂孟春建寅之月蟄蟲始震魚上水獺祭魚水虞於是乎講罛罶取名魚登川禽而嘗之寢廟行諸國助宣氣也今魚方別孕不放魚長又行罣罟貪無藝也公聞之曰吾過而里革匡我不亦善乎是良罟也為我得法良善使有司藏之使吾無忘諗言里此罟則不忘里革言諗告也曰藏罟不如寘里革於側之不忘也寘置又曰聖人貴讓且諺曰獸惡其網民惡其上獸惡其網為害己民惡其上為病也古史考曰庖羲作卦觀像而作網世本曰芒則網宋襄注曰芒庖羲臣呂氏春秋曰湯見設網者四面張而祝之曰自天下者自地出者自四方來者皆罹我網湯曰嘻盡之矣非桀其孰如此又曰舜之末遇時也以其從屬拙他財取水利編蒲韋結罘網應璩報東海相染季然書曰足下頓彌天之網收萬仞之魚量之以谿谷數之以陔兆何其壯乎觀夫任公子之所釣此為鰌音秋鰕未足為吾子之道罶毛詩鹿鳴曰魚麗于罶鱨鯊又小雅苕之華曰牂羊僨首, SBCK: 平御覽卷第八百}
