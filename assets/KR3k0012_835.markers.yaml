  - {type: punctuation, offset: 306, content: 「, id: KR3k0012_CHANT_835-bkkpn111}
  - {type: variant, offset: 306, length: 0, content: '', SBCK: 明帝時館陶公主光武女爲子求郎不許而賜錢千萬謂羣臣曰郎官上應列􅀫岀宰百星史記曰太微宫後二十五星郎位也有非其人則民受其殃是以難之又曰樊鯈卒帝遣小黄門張音問所遺言先是河南縣亡失官錢典􅀒者典謂主典􅀒謂欠􅀒坐死及罪徙者甚衆遂委責於人以償其耗郷部吏司因此爲姧鯈常疾之欲奏罷之疾病未及得上音歸具以聞帝覽之而悲歎勑郡並從之又曰京兆尹閻興召第五倫爲主簿時長安鑄錢多姦巧乃署倫爲督鑄錢􅁺領長安市東觀漢記曰時長安市未有祑又鑄錢官䡖姦所集無能整齊理之者興署倫督鑄錢掾領長安市其後小人爭頌皆云第五􅁺所平亦無姦枉又曰􅀄馬援在隴西上書言冝如舊鑄五銖錢事三府三府奏以爲未可事遂寢及援還從公府求得前奏難十餘條乃隨牒解釋東觀漢記曰十三難援一一觧之條奏其􅃺也更具表言帝從之天下頼其便又曰公孫􅄒廢銅錢用鐡官錢置鐵以鐵錢百姓貨幣不行蜀中童謡言黄牛白腹五銖當復好事者􅀼言王莽稱黃􅄒自號白五銖錢漢貨也言天下當并還劉氏又曰江革建武末年與母歸郷里毎至歳時縣當案比安驗以比之猶今㒵閱也革以母老不欲揺動自在轅中輓車不用牛馬由是郷里稱之曰江巨孝臨淄令楊音髙之設特席顯異巨孝於稠人廣衆中親奉錢以助供養又曰楊秉免歸雅素清儉家至貧窶并曰而食任城故孝廉景虜齎錢百餘萬以餉秉秉􅐬門拒絶不受又曰鍾離意薦劉平王望等書奏有詔徴平等特賜辨裝錢至皆拜議􅀰又曰崔寔從兄烈有重名於北州歷位郡守九卿靈帝時開鴻都門牓賣官爵公卿州郡下至黄綬各有差其冨者則先入錢貧者到官而後悟輸是時叚熲樊陵張温等雖有功勤名譽然皆先輸貨財而後登公位烈時因傳母入錢五百萬得爲司徒及拜日天子臨軒百僚畢㑹帝頋謂親倖者曰悔不小靳可至千萬靳固惜之也程夫人於傍應曰崔公冀州名士豈買官頼我得是反不知姝邪姝美也言反不可斯事之美也姝或作株株根本也又曰董卓壞五銖錢更鑄小錢悉取洛陽及長安銅人鍾虞飛廉銅馬之属以充鑄焉故貨錢物貴榖不數萬又錢無輪郭文章不便人用魏志曰卓鑄小錢大五分無文章肉好無輪郭不磨鑢也時人以爲􅁗始皇見長人於臨洮乃鑄銅人卓臨洮人也而今毁之雖成毁不同凶􅁀相􅀋焉又曰車駕西廵乃厚賜韋彪錢珍羞食物使歸平陵上家又曰}
