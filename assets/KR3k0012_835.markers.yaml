  - {type: variant, offset: 2689, length: 596, content: 固下大有鱸魚一出手釣得四十七枚又與書曰昨日䟽成後出釣手所獲魚以為二坩鮓今奉送筌周易曰筌者所以在魚得魚而忘筌廣雅曰篝筌謂之昆莊子曰得魚忘筌王朝之與庾安牋曰此間萬頃江湖撓之不濁澄之不清而百姓投一綸下一筌者皆奪其魚器不輸十疋則不得放不知漆園吏何得持竿不顧漁父鼓泄而歌滄浪也罛說文曰罛罟也爾雅曰魚罟謂之罛郭璞注曰最大網罟也今江東云毛詩碩人曰河水洋洋北流活活施罛穢穢鱣鮪發發莊子曰函車之獸介而離山不免乎網罟淮南子曰張天下以為籠因江海以為罟又何亡魚失鳥之有乎綱罟廣雅曰罻罾魚網謂之罟說文曰網庖羲所結繩以田以漁也周禮天官上曰獸人掌罟田獸辨其名物罟網也以網搏所當田之獸冬獻狼夏獻麋春秋獻獸物狼膏聚麋膏散聚則溫散則涼以救時之苦也獸物凡獸皆可獻也時田則守罟備獸觸玃禮記中庸曰子曰人皆曰予知驅而納諸罟獲陷阱之中而莫之知辟也毛詩國風曰九罭之魚鱒魴興也九罭變罟小魚魚之網也鱒魴大魚也周易曰庖犧氏結繩而為網罟爾雅曰緵罟謂之九罭九罭魚網也今之百囊罟是亦謂之䍣今江東呼為緵韓詩曰九罭之魚鱒魴九罭取芘也史記曰泉陽漁人豫且舉網獲江東神龜漢書曰豺獺未祭罝網不布於澤焉魏志曰邴原在遼東十餘年後乃潛遁還南行已數日而公孫度甫覺度知原之不可復追也因曰邴君所謂雲中白鶴非鶉雉之網可能羅始吾自遣之勿復求也宋書曰孫法宗常居墓所山禽野獸皆悉馴附每逢鹿觸網必解放之備以錢物陳書曰張昭字德明吳郡吳人也幼有孝性父熯常患消渴嗜鮮魚昭乃身自結網捕魚以供朝夕, SBCK: ''}
