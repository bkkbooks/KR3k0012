  - {type: variant, offset: 26, length: 3, content: 箋云釣, WYG: 國語曰周景王二十一年將鑄大錢景王周靈王之子錢}
  - {type: variant, offset: 26, length: 26, content: 箋云釣者以此有求於何彼以為之乎以絲為之綸則是善釣也又, krp: ''}
