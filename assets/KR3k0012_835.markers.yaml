  - {type: variant, offset: 14, length: 11, content: 釣維何維絲伊緡伊維緡綸, SBCK: 藏日泉其行曰布取名於水泉其流行無不偏泉始蓋一品周景王鑄大泉而有二品後數變易不復識夲制至漢唯有五銖乆行王莽改貨而易作泉布多至十品今存於民間多者有貨布大泉貨泉貨布長二寸五分廣寸首長八分有竒廣八分其圜好徑二分半足枝長八分其右文曰貨左文曰布重二十五銖直貨泉二十五大泉徑一寸二分重十二銖文曰大泉直十五貨泉貨泉徑一寸重五銖右文曰貨左文曰泉直一}
  - {type: variant, offset: 14, length: 11, content: 釣維何維絲伊緡伊維緡綸, WYG: 蔵曰泉其行曰布取名於水泉其流行者無不徧泉盖一品周景王鑄大泉而有二品後數變易不復識本制至漢唯有五銖久行王莾改貨而易作泉布多至十品今存於民間多者有貨布大泉貨泉貨布長二寸五分廣寸首長八分有竒廣八分其圜好徑二分半足枝長八分其右文曰貨左文曰布重二十五銖直泉二十五大泉徑一寸二分重十二銖文曰大泉直十五貨泉徑一寸重五銖右文曰貨左文曰泉直一}
