  - {type: variant, offset: 423, length: 661, content: 領大都督右三軍皆隸焉封燉煌郡公大軍西上賈胡堡音保隋將宋老生率精兵二萬屯霍邑以拒義師會久雨糧盡高祖與裴寂議且還太原以圖後舉太宗曰本興大義以救蒼生當須先入咸陽號令天下遇小敵即班師將恐從義之徒一朝解體還守太原一城之地以為賊耳何以自全高祖不納促令引發太宗遂號泣於外聲聞帳中高祖召問其故對曰今兵以義動戰則必剋退還則必散眾散於前敵乘於後死亡須臾而至是以悲耳高祖乃悟而止八月己卯雨霽高祖引師趣霍邑太宗恐老生不出戰乃將數騎先詣其城下舉鞭指麾若將圍城者以激怒之老生果怒開門出兵背城而陣高祖與建成合陣於城東太宗及柴紹陣於城南老生麾兵疾進先薄高祖而建成墜馬老生乘之高祖興建成軍咸卻太宗自南原率二騎馳下峻坂衝斷其軍引兵奮擊賊眾大敗各捨仗而走懸門發老生引繩欲上遂斬之平霍邑至河東關中豪傑爭走赴義太宗請進師入關取永豐倉以賑窮乏收群盜以圖京師高祖稱善太宗以前軍濟河先定渭北三輔吏民及諸豪猾詣軍門請自效者日以千計扶老攜幼滿於麾下收納英俊以備僚列遠近聞者咸自託焉師次于涇陽勝兵九萬破胡賊劉雞子以并其眾留殷開山劉弘基屯長安故城太宗自趣司竹賊帥李仲文何潘仁向善志等皆來會頓于阿城獲兵十三萬長安父老齎牛酒詣旌門者不可勝紀勞而遣之一無所受軍令嚴肅秋毫無所犯尋與大軍平京城高祖輔政授唐國內史改封秦國公會薛舉以勁卒萬人來逼渭濱太宗親擊之大破其眾追斬萬餘級略地至于隴坻義寧元年十二月復為右元帥揔兵十萬徇東都及將旋謂左右曰賊見吾還必相追躡設三伏以待之俄而隋將叚達率萬餘人自後而至度三王陵發伏擊之叚達大敗追奔至于城下因於宜陽新安置熊毅二州戍之而還徙封趙國公高祖受禪拜尚書令右, krp: ''}
