  - {type: variant, offset: 1101, length: 1212, content: 月揔率諸將攻王世充於洛邑師次穀州世充率精兵三萬陣於慈澗太宗以輕騎挑之時眾寡不敵陷於重圍左右咸懼太宗命左右先歸獨留後殿世充驍將單雄信數百騎夾道來逼交搶競進太宗幾為所敗太宗左右射之無不應弦而倒獲其大將燕頎世充乃拔慈澗之鎮歸于東都太宗遣行軍揔管史萬寶自宜陽南據龍門劉德威自太行東圍河內王君廓自洛口斷賊糧道又遣黃君漢夜從孝永河中下舟師襲廻洛城剋之黃河已南莫不響應城堡相次來降大軍進屯邙山九月太宗以五百騎先觀戰地卒與世充萬餘人相遇會戰復破之斬首三千餘級獲大將陳智略世充僅以身免其揔管楊慶遣使請降遣李世勣率師出轘轅道安撫其眾滎汴洧豫九州相繼來降世充遂求救於竇建德四年二月又進屯青城宮營壘未立世充率眾二萬自方諸門臨穀水而陣太宗以精騎陣於北邙山令屈突通率步卒五千渡水以擊之因誡通曰待兵交即放煙吾當率騎軍南下兵才接太宗以騎衝之挺身先進與通表裏相應賊眾殊死戰散而復合者數焉自辰及午賊眾始退縱兵乘之俘斬八千人於是進營城下世充不敢復出但嬰城自守以待建德之援建德以兵十餘萬來援世充至于酸棗蕭瑀音禹屈突通封德彝皆以腹背受敵恐非萬全請退師穀州以觀之太宗曰世充糧盡內外離心我當不勞攻擊坐收其弊建德新破孟海公將驕卒惰吾當進據武牢扼其襟要賊若冒險與我爭鋒破之必矣如其不戰旬月間世充當自潰若不速進賊入武牢諸城新附必不能守二賊併力將若之何通又請解圍就險以就其變太宗不許於是留通輔齊王元吉以圍世充親率步騎三千五百人趣武牢建德自滎陽西上築壘於板渚太宗屯武牢相持二十餘日謀者曰建德伺官軍芻盡俟牧馬於河北因將襲武牢太宗知其謀遂牧馬於河北以誘之誥朝建德果悉眾而至陳兵汜水世充將郭士衡陣於其南綿亙數里鼓譟諸將大懼太宗將數騎升高丘以望之謂諸將曰賊起山東未見大敵今度險而囂是無政令逼城而陣有輕我心我按兵不出彼乃氣衰陣久卒饑必將自退追而擊之無往不剋吾與公等約必以午時後破之建德列陣自辰至午兵士饑倦皆坐列又爭飲水逡巡欲退太宗曰可擊親率輕騎誘之眾繼至建德廻師而陣未及整列太宗先登擊之所向皆靡俄而眾軍合戰囂塵四起太宗率史大奈程咬金秦叔寶宇文歆等纏幡而入直突出其陣後張我旗幟賊顧見之大潰追奔三十里生擒建德於陣太宗數之曰我以干戈問罪本在王世充得失存亡不預汝事何故越境犯我兵鋒建德股慄而言曰今若不來恐勞遠取乃將建德至東都城下世充懼率其官屬二千餘人詣軍門請降山東悉平太宗入據宮城令蕭瑀竇軌等封守府庫一無所取令記室房玄齡收隋圖籍於是誅其同惡叚達等五十餘人大饗將士班賜有差高祖令尚書左僕射裴寂勞於軍中六月凱旋大宗親被金甲鐵馬一萬騎甲士三萬人前後部鼓吹俘二偽主及隋氏器物輦輅獻于太廟高祖大悅行飲至禮以享焉高祖以自古舊官不稱殊功乃別表徽號用旌勳十月加號大策上將軍陜東道大行臺位在王公上增邑二萬戶通前三萬戶賜金輅一乘袞冕之服玉壁一雙黃金六千斤前後部鼓吹及九部之樂班劍四十人于時海內漸平太宗乃銳意經籍開文學館以待四方之士行臺司勳郎中杜如晦等十有八人為學士每更直閣下降以溫顏與之討論經義或夜分而罷八年加中書令九, krp: ''}
