  - {type: variant, offset: 3154, length: 1065, content: 孫正道送之京師二月癸亥幸溫湯甲辰李靖又破突厥于陰山頡利可汗輕騎遠遁甲寅大赦賜酺五月三日庚辰大同道行軍副揔管張寶相生擒頡利可汗獻于京師甲午以俘頡利告於太廟夏四月御順天門軍吏執頡利以獻捷自是西北諸蕃咸請上尊號為天可汗於是降璽書冊命其君長則兼稱之九月庚午令收瘞長城之南骸骨仍令致祭壬午令自古明王聖帝賢臣烈士墳墓無得蒭牧春秋致祭冬十月壬辰幸隴州曲赦岐隴二州給復一年十日校獵於貴泉谷十三日校獵於魚龍川自射鹿獻於太安宮甲子至自隴州戊寅制決罪人不得鞭背以明堂孔穴針炙所失高昌王麴文泰來朝是歲斷死刑二十九人幾致刑措山東至于海河南至于嶺皆外戶不閉行旅不齎糧焉六年十二月辛未親錄囚徒歸死罪者二百九十人于家令明年秋末就刑其後應期畢至詔悉原之是歲黨項諸羗前後內屬三十萬口八年二月乙巳皇太子加元服景午賜天下酺三日三月庚辰幸九成宮五月丁丑上初服翼善冠貴臣服進德冠九年五月太上皇崩于太安宮七月甲寅增修太廟為六室冬十月庚寅葬高祖於獻陵十三年春正月乙巳朔謁獻陵曲赦三原縣及行從大辟罪四月戊寅幸九成宮甲申阿史郍結社爾犯御營伏誅壬寅雲陽石燃者方丈晝如灰夜則有光投草木於上則焚歷年而止十二月壬辰狩于咸陽是歲滁州言野蚕食檞音解葉成繭大如柰其色綠凡收六千五百七十石高麗新羅西突厥吐火羅康國安國波斯棘勒于闐焉耆高昌林邑昆明及荒服蠻酋相次遣使朝貢十五年詔以來年二月有事太山所司詳定儀制五月壬申并州僧道及老人等抗表以太原王業所因明年登封已後愿特臨幸上於武成殿賜宴因從容謂侍臣曰朕少在太原喜群聚愽戲暑往寒逝將三十年矣時會中有舊識上者相與道舊以為笑樂因謂之曰他人之言或有面諛公等朕之故人實以告朕即日政教於百姓何如人間得無疾苦耶皆奏即日四海太平百姓歡樂陛下力也臣等餘年日惜一日但眷戀聖化不知疾苦因固請過井州上謂曰飛鳥過故鄉猶躑躅徘徊況朕於太原起義兵定天下復少小遊觀誠所不忘岱禮若畢或冀與公等相見於是賜物各有差六月戊申詔天下諸州舉學綜古今及孝悌淳篤文章秀異者並以來年二月揔集泰山己酉有星孛于太微犯郎位景辰停封泰山避正殿以思咎命尚食減膳秋七月甲戍孛星滅十六年冬十一月景辰狩于岐山辛酉使祭隋文帝陵丁卯宴武功士女於慶善宮南門酒酣上與父老等涕泣論舊事老人等遞起為舞爭上千萬歲壽上各盡一柸庚午至自岐州十二月癸卯幸溫湯甲辰狩于驪山時陰寒晦冥圍兵斷絕上乘高望見之欲捨其罰恐虧軍令乃廻鑾轡入谷以避之十七年正月戊申詔圖畫司徒趙國公無忌等勳臣二十四人於凌煙閣三月丁巳熒惑守心前星十九日而退夏四月皇太子承乾有罪廢為庶人景戍立晉王治為皇太子大赦賜酺三日己丑加司徒長孫無忌太子太師司空房玄齡太子太傅特進蕭瑀太子太保, WYG: ''}
