  - {type: variant, offset: 10, length: 0, content: '', SBCK: 德順聖皇后長孫氏以貞觀二年六月生於東宫之麗正殿五年封晉王七年遥授并州都督㓜而􅄮嶷端審寛仁孝友􅀄授孝經於著作郎蕭德言太宗問曰此書中何言爲善對曰夫孝始於事親中於事君終於立身君子之事上也進思盡忠退思􅀘過將順其羙臣救其惡太宗恱曰行此足以事父兄爲臣子矣及文德皇后崩晉王時年九歳哀慕感動左右太宗屢加慰撫由是特深寵異尋拜右武􅃸大將軍十七年皇太子承乾廢魏王㤗亦以罪黜太宗與長孫無忌房􅀇齡李世勣等計議立晉王爲皇太子太宗每視朝常令在側觀决庻政或令參議太宗數稱其善十八年太宗將伐髙麗命太子留鎮定州及駕發有期悲啼累日因請飛驛遞表起居并遞勑垂報並許之及軍旋太子從至并州時太宗患疽太子親吮徂兖切之扶輦歩從數日二十三年五月己巳太宗崩六月甲戌皇太子即皇帝位時年二十二詔大赦天下内外文武賜勲官一級永徽元年春正月辛丑朔上不受朝詔改元景午立妃王氏爲皇后二年春正月戊戌詔曰去歳􅀜輔之地頗弊蝗螟音􅁳天下諸州或遭水旱百姓之間致有罄乏此由朕之不德兆庻何辜矜物罪已載深憂惕今獻歳肇春東作方始糧廪或空事資賑給其遭蟲水處有貧乏者量以正義倉賑貸五年春三月戊午幸萬年宫辛未曲赦所經州縣繫囚以工部尚書閻立德領丁夫四萬築長安羅郭八月大理奏决死囚揔有七十餘人六年九月庚午尚書右僕射禇遂良以諌立武昭儀貶授潭州都督乙酉洛州大水毀天津橋冬十月已酉廢皇后王氏爲庻人立昭儀武氏爲皇后大赦天下七年正月辛未廢皇太子忠爲梁王立代王􅀪爲皇太子壬申大赦改元爲顯慶元年五月巳夘太尉長孫無忌進史館所撰梁陳周齊隋五代史志三十卷五年八月庚辰􅂫定方等討平百濟靣􅅞其王扶餘義慈國分爲五部郡三十七城二百户七十六萬以其地分置熊津等五都督府麟德元年三月辛亥展大射禮十二月景戍殺西臺侍郎上官儀戊子庻人忠坐與儀交通賜死二年十月司禮太常伯劉常道上䟽請封禪癸亥髙麗王髙藏遣其子福男來朝丁夘將封泰山發自東都是歳大稔米㪷五錢麰音牟麥不列于市麟德三年春正月戊辰朔車駕至泰山頓是日親祀昊天上帝於封祀壇以髙祖太宗配饗已巳帝昇山行封禪之禮庚午禪於社首祭皇地祇以太穆太皇太后文德皇太后配饗皇后爲亞獻越國太妃燕氏爲終獻辛未御降禪壇壬申御朝覲壇受朝賀改麟徳三年爲乾封元年正月景戍發自泰山甲午次曲阜縣幸孔子廟追贈太師増修祠宇以少牢致祭其襃聖侯德倫子孫並免賦役二月己未次亳州幸老君廟追號曰太上􅀇元皇帝創造祠堂改谷陽縣爲眞源縣縣内宗姓特給復一年夏四月甲辰車駕至自泰山先謁太廟而後入庚寅改鑄乾封泉寳錢冬十月己酉司空英國公勣爲遼東道行軍大揔管以伐髙麗三年二月戊寅以明堂制度歴代不同漢魏以還彌更訛舛遂増損古今新制其圖下詔大赦改元爲緫章元年二月戊寅幸九成宫九月癸巳司空英國公勣破髙麗拔平壤城擒其王髙藏及其大臣男建等以歸境内盡降其城一百七十上元二年三月丁巳天后親蠶於邙山之陽時帝風􅐄不能聽朝政事皆决於天后自誅上官儀後上每視朝天后垂簾於御座後政事大小皆預聞之内外稱爲二聖帝欲下詔令天后攝國政中書侍郎郝處俊諌止之調露元年十月單于大都護府突厥阿史德温􅀓及奉職二部相率反叛二年八月甲子廢皇太子賢爲庻人幽於別所乙丑立英王哲爲皇太子改調露二年爲永隆元年大赦天下二年閠七月庚申上以服餌令皇太子􅁥國景寅雍州大風害稼米價翔踊是月裴行儉大破突厥史伏念之衆伏念爲程務挺急追來降行儉於是盡平突厥餘黨行儉執伏念振旅凱旋永淳二年春正月甲午朔幸奉天宫遣使􅀕嵩嶽少室箕山具茨等山西王母啓母巢父許由等祠十一月丁未自奉天宫還東都上疾甚宰臣巳下並不得謁見十二月丁巳詔改永淳二年爲􅀪道元年將宣赦書上欲親御則天門樓氣逆不能上馬遂召百姓於殿前宣之禮畢上問侍臣曰民庻喜否曰百姓蒙赦無不感恱上曰蒼生雖喜我命危篤天地神祗􅀂延吾一兩月之命得還長安死亦無恨是夕帝崩於貞觀殿時年五十六謚曰天皇大帝廟號髙宗文明元年八月葬于乾陵天寳十三載改謚曰天皇大􅀪孝皇帝則天皇后唐書曰則天皇后武氏諱明空并州文水人也父士彠憂􅅞切隋大業末爲鷹楊府隊正髙祖行軍於汾晉每休止其家義旗􅀄起從平京城貞觀中累遷工部尚書荆州都督封應國公􅀄則天年十四時太宗聞其美容止召入宫立爲才人及太宗崩遂爲尼居感業寺大帝於寺見之復召入宫拜昭儀時皇后王氏良娣蕭氏頻與武昭儀争寵㸦讒毁之帝皆不納進號宸妃永徽六年廢王皇后而立武宸妃爲皇后髙宗稱天皇武后亦稱天后后素多智計兼渉文史帝自顯慶巳後多苦風疾百司表奏皆委天后詳决自此内輔國政數十年威勢與帝無異當時稱爲二聖􅀪道元年十二月大帝崩皇太子顯即位尊天后爲皇太后旣將簒奪是日自臨朝稱制嗣聖元年春正月甲申朔改元二月戊午廢皇帝爲廬陵王幽于別所仍改名哲巳未立豫王輪爲皇帝令居於別殿大赦天下改爲文明皇太后仍臨朝稱制庚申廢皇太孫重照爲庻人九月栁州司馬徐敬業殺楊州長史陳敞之舉兵移檄天下左玉鈐衛大將軍李孝逸討平之垂拱四年五月皇太后加尊號曰聖母神皇秋七月大赦天下八月壬寅􅀶州刺史瑯瑘王冲據􅀶州起兵命左金吾大將軍丘神勣爲行軍揔管討之庚戍冲父豫州刺史越王貞又舉兵與冲相應九月命内史岑長倩鳯閣侍郎張光輔左􅁥門大將軍麴崇裕率兵討之景寅斬貞及冲等􅀓首神都改姓爲虺音卉氏曲赦􅀶州韓王元嘉魯王靈夔元嘉子黄國公譔音選靈夔子左散􅀐常侍范陽王藹霍王元䡄及子江都王緒故虢王元鳯子東莞音管公融坐與貞通謀元嘉靈䕫自殺元䡄配流黔州譔等伏誅改姓虺氏自是宗室諸王相繼誅死者殆將盡矣其子孫年㓜者咸配流嶺外并誅其親黨數百餘家載􅀄元年春正月神皇親享明堂大赦天下依周制建子月爲正月改十二月爲臘月改舊正月爲壹月大酺三日神皇以曌字爲名遂改詔書爲制書秋九月革唐命改國號爲周改元爲天授大赦天下乙酉加尊號爲聖神皇帝降皇后帝輪爲皇嗣景戍立武氏七廟追尊神皇父士彠爲孝明皇帝證聖元年春正月加尊號曰慈氏越古金輪聖神皇帝大赦天下改元大酺七日二月上去慈氏越古尊號秋九月親祀南郊加尊號天􅁽金輪聖神皇帝大赦天下改元爲天􅁽萬歳大辟罪已下及犯十惡常赦所不原者咸赦除之大酺九日萬歳登封元年臘月甲申上登封于嵩嶽大赦天下改元大酺九日丁亥禪于少室山聖歴元年正月親享明堂大赦天下改元大酺九日三月召廬陵王哲於房州九月景子廬陵王哲爲皇太子令依舊名顯大赦天下神龍元年春正月大赦改元上不豫制自文明元年巳後得罪人除楊豫􅀶三州及諸逆魁首咸赦除之癸夘麟臺􅁥張易之與弟司僕卿昌宗謀反皇太子率左右羽林軍桓彦範敬暉等以羽林兵入禁中誅之甲辰皇太子􅁥國大赦天下是日上傳皇帝位于皇太子徙居上陽宫戊申皇帝上尊號曰則天大聖皇帝冬十一月壬寅則天將大漸遺制祔廟歸陵令去帝號稱則天大聖皇后是日崩于洛陽宫之仙居殿年八十三謚曰則天大聖皇后祔葬于乾陵中宗和}
