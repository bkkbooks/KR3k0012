  - {type: variant, offset: 3629, length: 0, content: '', krp: 丁巳詔改永淳二年爲弘道元年將宣赦書上欲親御則天門樓氣逆不能上馬遂召百姓於殿前宣之禮畢上問侍臣曰民庻喜否曰百姓蒙赦無不感恱上曰蒼生雖喜我命危篤天地神祗若延吾一兩月之命得還長安死亦無恨是夕帝崩於貞觀殿時年五十六謚曰天皇大帝廟號髙宗文明元年八月葬于乾陵天寳十三載改謚曰天皇大弘孝皇帝則天皇后唐書曰則天皇后武氏諱明空并州文水人也父士彠憂縛切隋大業末爲鷹楊府隊正髙祖行軍於汾晉每休止其家義旗𥘉起從平京城貞觀中累遷工部尚書荆州都督封應國公𥘉則天年十四時太宗聞其美容止召入宫立爲才人及太宗崩遂爲尼居感業寺大帝於寺見之復召入宫拜昭儀時皇后王氏良娣蕭氏頻與武昭儀争寵㸦讒毁之帝皆不納進號宸妃永徽六年廢王皇后而立武宸妃爲皇后髙宗稱天皇武后亦稱天后后素多智計兼渉文史帝自顯慶巳後多苦風疾百司表奏皆委天后詳决自此内輔國政數十年威勢與帝無異當時稱爲二聖弘道元年十二月大帝崩皇太子顯即位尊天后爲皇太后旣將簒奪是日自臨朝稱制嗣聖元年春正月甲申朔改元二月戊午廢皇帝爲廬陵王幽于別所仍改名哲巳未立豫王輪爲皇帝令居於別殿大赦天下改爲文明皇太后仍臨朝稱制庚申廢皇太孫重照爲庻人九月栁州司馬徐敬業殺楊州長史陳敞之舉兵移檄天下左玉鈐衛大將軍李孝逸討平之垂拱四年五月皇太后加尊號曰聖母神皇秋七月大赦天下八月}
  - {type: variant, offset: 3630, length: 0, content: '', krp: 寅博州刺史瑯瑘王冲據博州起兵命左金吾大將軍丘神勣爲行軍揔管討之庚戍冲父豫州刺史越王貞又舉兵與冲相應九月命内史岑長倩鳯閣侍郎張光輔左監門大將軍麴崇裕率兵討之景寅斬貞及冲等傳首神都改姓爲虺音卉氏曲赦博州韓王元嘉魯王靈夔元嘉子黄國公譔音選靈夔子左散騎常侍范陽王藹霍王元䡄及子江都王緒故虢王元鳯子東莞音管公融坐與貞通謀元嘉靈䕫自殺元䡄配流黔州譔等伏誅改姓虺氏自是宗室諸王相繼誅死者殆將盡矣其子孫年㓜者咸配流嶺外并誅其親黨數百餘家載𥘉元年春正月神皇親享明堂大赦天下依周制建子月爲正月改十二月爲臘月改舊正月爲壹月大酺三日神皇以曌字爲名遂改詔書爲制書秋九月革唐命改國號爲周改元爲天授大赦天下乙酉加尊號爲聖神皇帝降皇后帝輪爲皇嗣景戍立武氏七廟追尊神皇父士彠爲孝明皇帝證聖元年春正月加尊號曰慈氏越古金輪聖神皇帝大赦天下改元大酺七日二月上去慈氏越古尊號秋九月親祀南郊加尊號天冊金輪聖神皇帝大赦天下改元爲天冊萬歳大辟罪已下及犯十惡常赦所不原者咸赦除之大酺九日萬歳登封元年臘月甲申上登封于嵩嶽大赦天下改元大酺九日丁亥禪于少室山聖歴元年正月親享明堂大赦天下改元大酺九日三月召廬陵王哲於房州九月景子廬陵王哲爲皇太子令依舊名顯大赦天下神龍元年春正月大赦改元上不豫制自文明元年巳後得罪人除楊豫博三州及諸逆魁首咸赦除之癸夘麟臺監張易之與弟司僕卿昌宗謀反皇太子率左右羽林軍桓彦範敬暉等以羽林兵入禁中誅之甲}
