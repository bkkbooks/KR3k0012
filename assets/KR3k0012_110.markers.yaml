  - {type: variant, offset: 3523, length: 469, content: 五月太上皇崩于太安宮七月甲寅增修太廟為六室冬十月庚寅葬高祖於獻陵十三年春正月乙巳朔謁獻陵曲赦三原縣及行從大辟罪四月戊寅幸九成宮甲申阿史郍結社爾犯御營伏誅壬寅雲陽石燃者方丈晝如灰夜則有光投草木於上則焚歷年而止十二月壬辰狩于咸陽是歲滁州言野蚕食檞音解葉成繭大如柰其色綠凡收六千五百七十石高麗新羅西突厥吐火羅康國安國波斯棘勒于闐焉耆高昌林邑昆明及荒服蠻酋相次遣使朝貢十五年詔以來年二月有事太山所司詳定儀制五月壬申并州僧道及老人等抗表以太原王業所因明年登封已後愿特臨幸上於武成殿賜宴因從容謂侍臣曰朕少在太原喜群聚愽戲暑往寒逝將三十年矣時會中有舊識上者相與道舊以為笑樂因謂之曰他人之言或有面諛公等朕之故人實以告朕即日政教於百姓何如人間得無疾苦耶皆奏即日四海太平百姓歡樂陛下力也臣等餘年日惜一日但眷戀聖化不知疾苦因固請過井州上謂曰飛鳥過故鄉猶躑躅徘徊況朕於太原起義兵定天下復少小遊觀誠所不忘岱禮若畢或冀與公等相見於是賜物各有差六月戊申詔天下諸州舉學綜古今及孝悌淳篤文章秀異者並以來年二月揔集泰山己酉有星孛于太微犯郎位景辰停封泰山避正殿以思咎命尚食減膳, SBCK: ''}
