  - {type: variant, offset: 2026, length: 288, content: 城下世充懼率其官屬二千餘人詣軍門請降山東悉平太宗入據宮城令蕭瑀竇軌等封守府庫一無所取令記室房玄齡收隋圖籍於是誅其同惡叚達等五十餘人大饗將士班賜有差高祖令尚書左僕射裴寂勞於軍中六月凱旋大宗親被金甲鐵馬一萬騎甲士三萬人前後部鼓吹俘二偽主及隋氏器物輦輅獻于太廟高祖大悅行飲至禮以享焉高祖以自古舊官不稱殊功乃別表徽號用旌勳十月加號大策上將軍陜東道大行臺位在王公上增邑二萬戶通前三萬戶賜金輅一乘袞冕之服玉壁一雙黃金六千斤前後部鼓吹及九部之樂班劍四十人于時海內漸平太宗乃銳意經籍開文學館以待四方之士行臺司勳郎中杜如晦等十有八人為學士每更直閣下降以溫顏與之討論經義或夜分而罷八年加中書令九年, SBCK: 立爲}
  - {type: variant, offset: 2026, length: 331, content: 城下世充懼率其官屬二千餘人詣軍門請降山東悉平太宗入據宮城令蕭瑀竇軌等封守府庫一無所取令記室房玄齡收隋圖籍於是誅其同惡叚達等五十餘人大饗將士班賜有差高祖令尚書左僕射裴寂勞於軍中六月凱旋大宗親被金甲鐵馬一萬騎甲士三萬人前後部鼓吹俘二偽主及隋氏器物輦輅獻于太廟高祖大悅行飲至禮以享焉高祖以自古舊官不稱殊功乃別表徽號用旌勳十月加號大策上將軍陜東道大行臺位在王公上增邑二萬戶通前三萬戶賜金輅一乘袞冕之服玉壁一雙黃金六千斤前後部鼓吹及九部之樂班劍四十人于時海內漸平太宗乃銳意經籍開文學館以待四方之士行臺司勳郎中杜如晦等十有八人為學士每更直閣下降以溫顏與之討論經義或夜分而罷八年加中書令九年皇太子建成齊王元吉謀害太宗六月四日太宗率長孫無忌尉遟敬德房玄齡杜如晦等於玄武門誅之甲子, WYG: ''}
