  - {type: variant, offset: 52, length: 812, content: 武功之別館時有二龍戲於館門之外三日而去高祖之臨岐州太宗時年四歲有書生自言善相謁高祖曰公貴人也且有貴子因見太宗曰龍鳳之姿天日之表年將二十必能濟世安民矣高祖懼其言大將殺之忽失所在陰採濟世安民之義以為名焉太宗幼聰叡玄鑒深遠臨機果斷不拘小節時人莫能測也大業末煬帝於鴈門為突厥所圍太宗應募救援隸屯衛將軍雲定興營將行謂定興曰必齎旗鼓以設疑兵且始畢可汗舉國之師敢圍天子必以國家倉卒無援我張軍容令數十里幡旗相續夜則鉦鼓相應虜必謂救兵雲集望塵而遁矣不然彼眾我寡悉軍來戰必不能支矣定興從之師次崞音郭縣突厥候騎馳告始畢曰王師大至由是解圍而遁及高祖之守太原太宗時年十八有高陽賊帥魏刀兒自號歷山飛來攻太原高祖擊之深入賊陣太宗輕騎突圍而進射之所向皆披靡拔高祖於萬眾之中適會步兵至高祖與太宗又奮擊大破之時隋祚已終太宗潛圖義舉每折節下士推財養客及義兵起乃率兵略徇西河剋之拜右領大都督右三軍皆隸焉封燉煌郡公大軍西上賈胡堡音保隋將宋老生率精兵二萬屯霍邑以拒義師會久雨糧盡高祖與裴寂議且還太原以圖後舉太宗曰本興大義以救蒼生當須先入咸陽號令天下遇小敵即班師將恐從義之徒一朝解體還守太原一城之地以為賊耳何以自全高祖不納促令引發太宗遂號泣於外聲聞帳中高祖召問其故對曰今兵以義動戰則必剋退還則必散眾散於前敵乘於後死亡須臾而至是以悲耳高祖乃悟而止八月己卯雨霽高祖引師趣霍邑太宗恐老生不出戰乃將數騎先詣其城下舉鞭指麾若將圍城者以激怒之老生果怒開門出兵背城而陣高祖與建成合陣於城東太宗及柴紹陣於城南老生麾兵疾進先薄高祖而建成墜馬老生乘之高祖興建成軍咸卻太宗自南原率二騎馳下峻坂衝斷其軍引兵奮擊賊眾大敗各捨仗而走懸門發老生引繩欲上遂斬之平霍邑至河東關中豪傑爭走赴義太宗請進師入關取永豐倉以賑窮乏收群盜以圖京師高祖稱善太宗以前軍濟河先定渭北三輔吏民及諸豪猾詣軍門請自效者日以千計扶老攜幼滿於麾下收納英俊以備僚列遠近聞者咸自託焉師次于涇陽勝兵九萬破胡賊劉雞子以并其眾留殷開山劉弘基屯, SBCK: ''}
