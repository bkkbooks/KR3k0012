  - {type: variant, offset: 10, length: 0, content: '', WYG: 徳順聖皇后長孫氏以貞觀二年六月生於東宫之䴡正殿五年封晉王七年進授并州都督幼而岐嶷端審寛仁孝友初授孝經於著作郎蕭徳言太宗問曰此書中以何言為善對曰夫孝始於事親中於事君終於立身君子之事上也進思盡忠退思補過將順其美匡救其惡太宗恱曰行此足以事父兄為臣子矣及文徳皇后崩晉王時年九嵗哀慕感動左右太宗屢加慰撫由是特深寵異尋拜右武衛大將軍十七年皇太子承乾廢魏王亦以罪黜太宗與長孫無忌房𤣥齡李世勣算計議立晉王為皇太子太宗每視朝常令在側觀决庶政或㕘議太宗數稱其善十八年太宗將伐髙䴡命太子留鎮定州及駕發有期悲號累日因請飛騎逓表起居并逓勅垂報並許之及軍旋太子從至并州太宗患癰太子親吮徂兖切之扶輦步従數日二十二年五月己巳太宗崩六月甲戌皇太子即皇帝位時年二十二詔大赦天下内外文武賜勲官一級永徽元年春正月辛丑上不受朝詔改元丙午立妃王氏為皇后二年春正月戊戌詔曰去嵗闗輔之地頗弊蝗螟天下諸州或水旱百姓之間致有匱乏此由朕之不徳兆庶何辜矜物罪已載深憂惕今獻嵗肇春東方方始糧廪或空事資賑給其遭蟲水處有貧乏者量以正義倉賑貸五年春三月戊午幸萬年宫辛未赦岐州及所經州縣繫囚以工部尚書閆立徳領丁夫四萬築長安羅郭八月大理奏决死囚捴有七十餘人六年九月庚午尚書右僕射禇遂良以諌立武昭儀貶授潭州都督乙酉洛州大水毁天津橋冬十月己酉廢皇后為庶人立昭儀武氏為皇后大赦天下七年正月辛未廢皇太子忠為梁王立代王𢎞為太子壬申大赦改元為顯慶元年五月己夘太尉長孫無忌進史館所撰梁陳周齊隋五代史志三十卷五年八月庚辰蘇定方等討平百濟面縳其王扶餘義慈國分為五部郡三十七城二百户七十六萬以其地置熊津等五都督府麟徳元年三月辛亥展大禮十二月丙戌殺西臺侍郎上官儀戊子庶人忠坐與儀交通賜死二年十月司禮太常伯劉祥道上疏請封禪癸亥髙麗王髙蔵遣其子福男來朝丁夘將封泰山發自東都是嵗大稔米斛五錢麰音牟麥不列於市麟徳三年春正月戊辰朔車駕至泰山頂是日親祀昊天上帝于封祀壇以髙祖太宗配饗己巳帝升山行封禪之禮庚午禪社首祭皇帝地祗以大穆太皇太后文徳皇太后配饗皇后為亞獻越國大妃燕氏為終獻辛未御降禪壇壬申御朝覲壇受朝賀改麟徳三年為乾封元年正月丙戌發自泰山甲午次曲阜縣幸孔子廟追諡太師增修祠宇以少牢致祭其褒聖侯徳倫子孫並免賦役三月己未次亳州幸老君廟追號曰大上𤣥元皇帝創造祠堂改陽榖縣為真元縣縣人宗姓給復二年夏四月甲辰車駕至自泰山先謁太廟而後入壇庚寅改鑄乾封皇寳錢又十月己酉司空英國公勣為遼東送行臺大總管以伐髙䴡三年二月戊寅以明堂制度厯代不同漢魏以還彌更訛舛遂増損古今新制其圖下詔大赦改元為總章元年二月戊寅幸九成宫九月癸巳司空英國公勣破髙䴡抜平壤城擒其王髙蔵及其大臣男建等以歸境内盡降其城一百七十上元二年三月丁巳天后親蠶於印山之陽時帝風疾不能聽朝政事皆決於天后自誅上官儀後上每視朝天后垂簾於御座後政事大小皆預聞之内外稱為二聖帝欲下詔令天后攝國政中書侍郎郝處俊諌止之調露元年十月單于大都䕶府突厥阿史徳温傳及奉職二部相率反叛二年八月甲子廢皇太子𢎞為庶人幽於别所乙丑立英王哲為皇太子改調露二年為永隆元年大赦天下閏十月庚申上以服餌令皇太子監國丙寅雍州大風害禾稼價翔湧是月裴行儉大破突厥史伏念之衆伏念為程務挺急追來降行儉於是盡平突厥餘黨行儉執伏念振旅凱旋永淳二年春正月甲午朔幸奉天宫遣使祭嵩嶽少室箕山具􅗔等山西王母巢父許由等祠十一月丁未自奉天宫還東都上疾甚宰臣以下並不得謁見冬十二月丁巳詔改永淳二年為𢎞道元年將宣赦書上欲親御則天門樓氣逆不能上馬遂召百姓於殿前宣之禮畢上問侍臣民庶喜否對曰百姓蒙赦無不感恱上曰蒼生雖喜我命危篤天地神祗若延吾一兩月之命得還長安死亦無恨是夕帝崩于貞觀殿時年五十六諡曰天皇大帝廟號髙宗文明元年八月葬於乾陵天寳十三載改諡曰天皇大𢎞孝皇帝則天皇后唐書曰則天皇后武氏諱曌并州文水人也父士彠憂縛切隋大業末為鷹揚府隊正髙祖行軍於汾晉每休止其家義旗初起從平京城貞觀時遷工部尚書荆州都督封應國公初則天年十四時太宗聞其羙容止召入宫立為才人及太宗崩遂為尼居感業寺大帝於寺見之復召入宫拜昭儀時皇后王氏良姊蕭氏頻與武昭儀争寵更䜛毁之帝皆不納進號宸妃永徽六年廢王皇后而立武宸妃為皇后髙宗稱天皇武后亦稱天后素多智計兼涉文史帝自顯慶已後多苦風疾百司表奏皆委天后詳决自此内輔國政數十年威勢與帝無異當時稱為二聖𢎞道元年十二月大帝崩皇太子顯即位尊天后為皇太后既將簒奪是日自臨朝稱制嗣聖元年春正月甲申朔改元二月戊午廢皇帝為廬陵王幽於别所仍改名哲己未立豫王輪為皇帝令居於别宫大赦天下改為文明皇太后仍臨朝稱制庚申廢皇太孫重照為庶人九月栁州司馬徐敬業殺揚州長史陳敬之舉兵移檄天下左玉鈐衛大將軍李孝逸討平之垂拱四年五月皇太后加尊號曰聖母神皇是秋七月大赦天下八月壬寅博州刺史瑯琊王冲據博州起兵命左金吾大將軍丘神勣為行軍捴管討之庚戌冲父豫州刺史越王貞舉兵與冲相應九月命内史岑長倩鳯閤侍郎張光輔左監門大將軍麴崇裕率兵討之丙寅斬貞及冲等傳首神都改其姓為虺氏曲赦博州韓王元嘉魯王靈䕫元嘉子黄國公譔靈䕫子左散騎常侍范陽王藹霍王元軌及子江都王緒故虢王鳳子東筦公融坐與貞通謀元嘉靈䕫自殺元軌流配黔州譔等伏誅改姓虺氏自是宗室諸王相繼誅死者殆盡矣其子孫年幼者咸配流嶺外并誅其親黨數百餘家載初元年春正月神皇親饗明堂大赦天下依周制建子月為正月改十二月為臘來嵗正月為一月大酺三日神皇自以曌字為名遂改詔書為制書秋九月革唐命改國號為周改元為天授大赦天下乙酉加尊號為神聖皇帝降皇帝輪為皇嗣丙戌立武氏七廟追尊神皇父士彠為孝明皇帝證聖元年春正月加尊號曰慈氏越古金輪聖神皇帝大赦天下大酺七日二月上去慈氏越古尊號秋九月親祀南郊加尊號天册金輪聖神皇帝大赦天下改元為天册萬嵗大辟已下及犯十惡常赦所不原者咸赦除之大酺九日萬嵗登封元年臘月上登封於神嶽大赦天下大酺九日丁亥禪于少室山聖厯元年正月親享明堂大赦天下改元大酺九日三月召廬陵王哲於房州九月庚子廬陵王哲為皇太子令依舊名顯大赦天下神龍元年春正月大赦改元上不豫制自文明元年已後得罪人除揚豫博三州及諸逆魁首咸赦除之癸夘麟臺監張易之與弟司僕卿昌宗謀反皇太子率左右羽林軍桓彦範敬暉等以羽林入禁中誅之甲辰皇太子監國大赦天下是日上傳皇帝位于皇太子徙居上陽宫戊申皇帝上尊號曰則天大聖皇帝冬十一月壬寅則天將大漸遺制祔廟歸陵令去帝號稱則天大聖皇后是日崩於洛陽宫之仙居殿年八十三諡曰則天大聖皇后祔𦵏於乾陵中宗孝和}
