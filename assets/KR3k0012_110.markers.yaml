  - {type: variant, offset: 2953, length: 1, content: 夏, SBCK: 詔九品巳上及朝集使極言朝政得失兼舉賢良方正直言極諌之士景龍三年十一月乙丑親祀南郊皇后登壇亞獻左僕射舒國公韋巨源爲終獻大赦天下}
  - {type: page-break, offset: 2953, content: '', id: KR3k0012_SBCK_110-6b}
  - {type: variant, offset: 2953, length: 2, content: 夏四, WYG: 改元唐隆丁亥皇太子即帝位時年十六皇太后韋氏臨朝稱制大赦天下常赦所不原者咸赦除之内外兵馬令諸親王掌令韋温捴之特召諸府折衝兵五萬人分屯京城列為左右營諸韋子姓分統之庚子夜臨淄王隆基舉兵誅諸韋諸武皆梟首於安福門外韋太后為亂兵所殺九月丁夘上諡曰孝和皇帝廟號中宗𦵏定陵天寳十三載二月改諡曰太和大聖大昭孝皇帝睿宗𤣥貞皇帝唐書曰睿宗𤣥貞皇帝諱旦髙宗第八子中宗母弟龍翔三年六}
  - {type: page-break, offset: 2953, content: '', id: KR3k0012_WYG_110-11a, image: WYG0894/WYG0894-0049a.png}
  - {type: variant, offset: 2955, length: 0, content: '', SBCK: 年五月丁夘前許州司兵參軍燕欽融上書言皇后干預國政安樂公主武延秀宗楚客等同危宗社帝怒召欽融庭見撲殺之時安樂公主志欲皇后臨朝稱制而求立爲皇太女由是與后合謀進鴆六月壬午帝遇毒崩于神龍殿年五十五祕不發䘮皇后親揔庻政立温王重茂爲皇太子甲申發䘮于太極殿宣遺制皇太后臨朝大赦天下改元爲唐隆丁亥皇太子即帝位時年十六皇太后韋氏臨朝稱制大赦天下常赦所不原者咸赦除之内外兵馬令諸親王掌仍令韋温揔知時召諸府折衝兵五萬人分屯京城列爲左右營諸軍子姪分統之庚子夜臨淄王諱舉兵誅諸韋諸武皆梟首於安福門外韋太后爲亂兵所殺九月丁夘上謚日孝和皇帝廟號中宗葬定陵天寶十三載二月改謚日大和大聖大昭孝皇帝睿宗􅀇眞皇帝唐書日睿宗􅀇眞皇帝諱旦髙宗第八子中宗母弟龍朔二年六}
  - {type: page-break, offset: 2955, content: '', id: KR3k0012_SBCK_110-7a}
  - {type: variant, offset: 2957, length: 7, content: 卯詔骸骨暴露者, SBCK: 未生於長安其年封殷王遥領兾州大都督單于大都護右金吾衛大將軍及長謙恭孝友好學工草隸尢愛文字訓詁之書乾封元年徙封豫王緫章二年徙封兾王上初名旭輪至是去旭字上元二年徙封相王拜右衛大將軍儀鳯三年遷洛州牧改名旦徙封豫王嗣聖元年則天臨朝廢中宗爲廬陵王立豫王爲皇帝仍臨朝稱制及革命改國號爲周降帝爲皇嗣}
  - {type: variant, offset: 2957, length: 7, content: 卯詔骸骨暴露者, WYG: 未生於長安其年封殷王領冀州大都督單于大都䕶右金吾衛大將軍及長謙恭孝友好學工草𨽻尤愛文字訓誥之書乾封元年徙封豫王總章二年徙封冀王上初名旭輪至是去旭字上元二年復封豫王拜右衛大將軍儀鳯三年遷洛州牧徙封相王復封豫王嗣聖元年則天臨朝廢中宗為廬陵王立豫王為皇帝仍臨朝稱制及革命改國號為周降皇帝為皇嗣}
