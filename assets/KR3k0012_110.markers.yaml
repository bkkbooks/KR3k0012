  - {type: variant, offset: 3724, length: 0, content: '', krp: 遷於均州尋徙居房陵聖暦元年召還東都立爲皇太子依舊名顯時張易之與弟昌宗潜圖逆亂神龍元年鳯閣侍郎張柬之鸞臺侍郎崔玄暐音韋左羽林將軍敬暉右羽林將軍桓彦範司刑少卿袁恕巳等定䇿率羽林兵誅易之昌宗迎皇太子赦天下鳯閣侍郎韋承慶正諌大夫房融司禮卿崔慶等下獄甲辰命地官侍郎樊忱音諶往京師告陵廟乙巳則天傳位於皇太子景午即皇帝位於通天宫大赦天下唯易之黨與不在原限二月甲寅復國號依舊爲唐社稷宗廟陵寢郊祀行軍旗幟服色天地日月等字臺閣官名並依永淳已前故事甲子立妃韋氏爲皇后大赦天下詔九品巳上及朝集使極言朝政得失兼舉賢良方正直言極諌之士景龍三年十一月乙丑親祀南郊皇后登壇亞獻左僕射舒國公韋巨源爲終獻大赦天下四年五月丁夘前許州司兵參軍燕欽融上書言皇后干預國政安樂公主武延秀宗楚客等同危宗社帝怒召欽融庭見撲殺之時安樂公主志欲皇后臨朝稱制而求立爲皇太女由是與后合謀進鴆六月}
  - {type: variant, offset: 3725, length: 0, content: '', krp: 午帝遇毒崩于神龍殿年五十五祕不發䘮皇后親揔庻政立温王重茂爲皇太子甲}
  - {type: punctuation, offset: 3726, content: ，, id: KR3k0012_CHANT_110-bkkpn712}
  - {type: 'tls:seg', offset: 3726, content: '', id: KR3k0012_CHANT_110-1a.641}
  - {type: variant, offset: 3726, length: 0, content: '', krp: 發䘮于太極殿宣遺制皇太后臨朝大赦天下改元爲唐隆丁亥皇太子即帝位時年十六皇太后韋氏臨朝稱制大赦天下常赦所不原者咸赦除之内外兵馬令諸親王掌仍令韋温揔知時召諸府折衝兵五萬人分屯京城列爲左右營諸軍子姪分統之庚子夜臨淄王諱舉兵誅諸韋諸武皆梟首於安福門外韋太后爲亂兵所殺九月丁夘上謚日孝和皇帝廟號中宗葬定陵天寶十三載二月改謚日大和大聖大昭孝皇帝睿宗玄眞皇帝唐書日睿宗玄眞皇帝諱旦髙宗第八子中宗母弟龍朔二年六月己未生於長安其年封殷王遥領兾州大都督單于大都護右金吾衛大將軍及長謙恭孝友好學工草隸尢愛文字訓詁之書乾封元年徙封豫王緫章二年徙封兾王上初名旭輪至是去旭字上元二年徙封相王拜右衛大將軍儀鳯三年遷洛州牧改名旦徙封豫王嗣聖元年則天臨朝廢中宗爲廬陵王立豫王爲皇帝仍臨朝稱制及革命改國號爲周降帝爲皇嗣令依舊名輪徙居東宫其僟一比皇太子聖暦元年中宗自房陵還帝數稱疾不朝請讓位於中宗則天遂立中宗爲皇太子封帝爲相王又改名旦授太子右衛率長安中拜司徒右羽林衛大將軍自則天初臨朝及革命之際王室屢有變故帝每恭險退讓竟免于禍神龍元年以誅張易之兄弟功進號安國相王遷太尉加實封其年立爲皇太弟固辭不受景龍四年夏六月中宗崩韋庶人臨朝引用其黨分握政柄忌帝望實素髙潛謀危害庚子夜臨淄王與太平公主子薛崇簡前朝邑尉劉幽求長上果毅麻嗣宗宫苑揔監鍾紹京等率兵入北軍誅韋溫紀處訥宗楚客武延秀馬秦客葉靜能趙履温楊均等諸韋武黨與皆誅之辛丑帝挾少主御安福門樓慰諭百姓大赦天下其日王公百寮上表咸以國家多難冝立長君以帝衆望所歸請即尊位甲辰少帝詔日叔父相王髙宗之子昔以天下讓于先帝孝友寛簡彰信兆人神龍之初已有明旨將立太弟以爲嗣君爲王懇辭未行冊命所以東宫虚位至于厯年撤綴渉衛切在辰禍變倉卒然後稱制計立沖人欽奉前懷願遵理命上申先聖之旨下遂蒼生之心俯稽圖緯之文仰峻祖宗之烈起今日請叔父相王卽皇帝位朕退守本藩歸于舊邸凡百卿士敬承朕言克賛我天人之休期光我有唐之勲業布告遐邇咸使聞知相王上表讓日臣以宗社事重國家情深誅鋤巨逆奉戴嗣主今承制旨猥推宸極在臣虚薄不敢祗膺循環震驚無任感哽制荅日皇極大寶天下至公王者臨之蓋非獲己王先聖舊意蒼生推仰龍光紫宸實允係望請遵前旨勿或讓推於是少帝遜于別宫是日卽皇帝位御承天門樓大赦天下景雲三年春正月辛未朔親謁太廟癸酉上始釋慘七糝切服御正殿受朝賀甲戌}
