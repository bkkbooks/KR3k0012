  - {type: variant, offset: 2424, length: 525, content: 己卯突厥寇高陵辛巳行軍揔管尉遟敬德與突厥戰於涇陽大破之斬首千餘級癸未突厥頡利至于渭水便橋之北遣其酋帥執失思力入朝為覘自張形勢太宗命囚之親出玄武門馳六騎幸渭水之上與頡利隔津而語責以負約俄而眾軍繼至頡利見軍容既盛又知思力就拘由是大懼遂請和詔許焉即日還宮乙酉又幸便橋與頡利刑白馬設盟突厥引退九月景戌頡利獻馬三千疋羊萬口帝不受令頡利歸所掠中國戶口丁未引諸軍衛騎兵統將等習射于顯德殿庭謂將軍以下曰自古突厥與中國更有盛衰若軒轅善用五兵即能北逐獯鬻周宣驅馳方邵亦能制勝太原至漢晉之君逮于隋代不使兵士素習干戈突厥來侵莫能抗禦致遣中國生民塗炭於寇手我今不使汝等穿池築苑造諸淫費農民恣令逸樂兵土唯習弓馬庶使汝鬥戰亦望汝前無撗敵於是每日引數百人於殿前教射帝親自臨試射中者隨賞弓刀布帛自是後士卒皆為精銳十月癸亥立中山王承乾為皇太子貞觀元年春正月乙酉改元三月癸巳皇后親蚕十二月壬午上謂侍臣曰神仙事本虛妄空有其名秦始皇非分愛好遂為方士所詐乃遣童男女數千人隨其入海求仙藥方士避秦苛虐因留不歸始皇猶海側以待之還至沙丘而死漢武帝為求仙乃將女嫁道術人既無驗便行誅戮既此二事神仙不煩妄求也二年春二月景戌靺羯上音末下音曷內屬三月丁卯遣御史大夫杜淹巡關內諸州出御府金寶贖男女自賣者還其父母庚午, SBCK: ''}
