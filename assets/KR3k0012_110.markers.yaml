  - {type: variant, offset: 1673, length: 351, content: 吉以圍世充親率步騎三千五百人趣武牢建德自滎陽西上築壘於板渚太宗屯武牢相持二十餘日謀者曰建德伺官軍芻盡俟牧馬於河北因將襲武牢太宗知其謀遂牧馬於河北以誘之誥朝建德果悉眾而至陳兵汜水世充將郭士衡陣於其南綿亙數里鼓譟諸將大懼太宗將數騎升高丘以望之謂諸將曰賊起山東未見大敵今度險而囂是無政令逼城而陣有輕我心我按兵不出彼乃氣衰陣久卒饑必將自退追而擊之無往不剋吾與公等約必以午時後破之建德列陣自辰至午兵士饑倦皆坐列又爭飲水逡巡欲退太宗曰可擊親率輕騎誘之眾繼至建德廻師而陣未及整列太宗先登擊之所向皆靡俄而眾軍合戰囂塵四起太宗率史大奈程咬金秦叔寶宇文歆等纏幡而入直突出其陣後張我旗幟賊顧見之大潰追奔三十里生擒建德於陣太宗數之曰我以干戈問罪本在王世充得失存亡不預汝事何故越境犯我兵鋒建德股慄而言曰今若不來恐勞遠取乃將建德至, SBCK: 年召還}
