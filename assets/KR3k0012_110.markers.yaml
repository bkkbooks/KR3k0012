  - {type: variant, offset: 994, length: 383, content: 帥揔兵十萬徇東都及將旋謂左右曰賊見吾還必相追躡設三伏以待之俄而隋將叚達率萬餘人自後而至度三王陵發伏擊之叚達大敗追奔至于城下因於宜陽新安置熊毅二州戍之而還徙封趙國公高祖受禪拜尚書令右武侯大將軍進封秦王加授雍州牧三年七月揔率諸將攻王世充於洛邑師次穀州世充率精兵三萬陣於慈澗太宗以輕騎挑之時眾寡不敵陷於重圍左右咸懼太宗命左右先歸獨留後殿世充驍將單雄信數百騎夾道來逼交搶競進太宗幾為所敗太宗左右射之無不應弦而倒獲其大將燕頎世充乃拔慈澗之鎮歸于東都太宗遣行軍揔管史萬寶自宜陽南據龍門劉德威自太行東圍河內王君廓自洛口斷賊糧道又遣黃君漢夜從孝永河中下舟師襲廻洛城剋之黃河已南莫不響應城堡相次來降大軍進屯邙山九月太宗以五百騎先觀戰地卒與世充萬餘人相遇會戰復破之斬首三千餘級獲大將陳智略世充僅以身免其揔管楊慶遣使請降遣李世勣率師出轘轅道安撫其眾滎汴洧豫九州相繼來降世充遂求救於竇建德四, SBCK: 嗣聖元}
