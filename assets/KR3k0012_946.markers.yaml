  - {type: variant, offset: 248, length: 2, content: 肩吾, WYG: 螳蜋怒臂以當車轍不知不勝任也是才之美者也司馬彪曰非不有美才顧不勝任耳揚雄方言曰螳蜋謂之髠或謂之虰或謂之􅀈􅀈郭璞曰今江東呼為石蜋爾雅作蛑方言依此失之許慎讒文曰螳蜋不過也一名蟷蠰一名研父邯鄲氏笑林曰楚人居貧讀淮南方得螳蜋伺蟬自鄣遂可以隱形遂於樹下仰取葉螳蜋執葉伺蟬以摘之葉落樹下樹下先有落葉不能復分别掃取數斗歸一一以葉自鄣問其妻曰汝}
