  - {type: variant, offset: 56, length: 0, content: '', WYG: 此螳螂也為蟲知進而不知退不量力而輕就敵公曰此為天下勇士矣迴車避之勇士歸焉淮南子同又曰楚莊王將伐晉告士大夫有諫者死孫叔敖曰}
  - {type: page-break, offset: 56, content: '', id: KR3k0012_WYG_946-8b, image: WYG0901/WYG0901-0381d.png}
  - {type: variant, offset: 57, length: 9, content: 聞眾喣漂山藂蚊成雷, WYG: 園中有榆榆上有蟬蟬方奮翼悲鳴不知螳螂在後欲攫而食之螳螂方取蟬不知黄雀在其後也禮記曰月令仲夏之月螳螂生蔡邕月令章句曰螳蜋蟲名食蟬殺蟲鄭禮記注曰螳蜋螵蛸母也王瓚曰爾雅云莫貈螳螂同類物也今沛魯以南謂之螳蜋燕趙之際謂之食厖爾雅曰莫貈螳蜋蛑莫貈一名螳蜋一名蛑即不過也郭云有斧蟲不過蟷蠰蟷蠰螳蜋别名螳壤二音其子螵蛸一名􅡯蟭蟷蠰卵也張揖廣雅曰芊芊齕肱螳蜋也􅡯蟭鳥洟冒焦螵蛸也華嶠}
