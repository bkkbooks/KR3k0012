  - {type: variant, offset: 1473, length: 492, content: 以有興遂賦之王襃聖主得賢臣頌曰蟋蟀候秋吟蜉蝣出以陰蠛蠓爾雅曰蠛蠓小蟲似蚋喜亂飛漢實錄曰周太祖軍至北郊時慕容彥超自負沉勇謂上曰北來都將臣盡諳知以臣觀之蜉蝣蠛蠓耳列子曰朽壤之土春夏之月蠛蠓者因雨而生見陽而死莊子曰孔子聞老聃之言出告顏回曰丘之於道也其猶醯雞歟醯雞者甕中之蠛蠓也淮南子曰衰世則藂蟲滿野許慎日飛蟲蠛蠓抱朴子曰蠓蟈之育於醢酢芝檽之產於木石蛣𧌑之滋於洿游翠蘿之老於松枝非彼四物所創造也字書曰蠛蠓小蟲三風舂雨磑者也蝴蝶北齊書曰魏收嘗在洛京輕薄尤甚人號云魏收驚蛺蝶文襄曾遊東山令給事黃門侍郎等宴文襄曰魏收博才無宜適須出其短往復數番收忽大唱曰楊遵彥理屈已倒遵彥從容曰我綽有餘暇山立不動若遇當塗恐翩翩遂逝當塗者魏翩翩者蝶也文襄先知之大笑稱善梁書曰沈麟士年過八十耳目猶聰明反故抄寫火下細書復成二三千卷滿數十篋時人以為養身靜嘿所致仍製黑蝶賦以寄意漢實錄曰右監門衛大將軍許遷言臣奉命博州至博平縣戴村有蝝彌亙數里一夕言並化蝶飛去列子曰烏足以其根為蠐螬其葉為蝴蝶莊子曰昔周夢為胡蝶林林然胡蝶也不知周也俄覺則瞿瞿然周也不知周之夢為胡蝶與胡蝶之夢為周與周與胡蝶則必有分矣此謂物化抱朴子曰髻孺背千金而逐蛺蝶, WYG: 畏惡}
