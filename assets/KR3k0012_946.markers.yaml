  - {type: 'tls:seg', offset: 3024, content: '', id: KR3k0012_CHANT_946-52a.7}
  - {type: variant, offset: 3025, length: 0, content: '', SBCK: 夜食爾雅曰蝙蝠服翼也齊人呼爲蟙䘃或謂之仙䑕職墨二音抱朴子曰千歳蝙蝠色如白雪集則倒懸䐉重故也此物得而隂乾末服之令人壽四萬歳􅀇中記曰百歳伏翼其色赤止則倒懸千歳伏翼色白得食之夀萬歳水經曰交州丹水亭下有石穴甚深未甞測其逺近穴中蝙蝠大者如烏多倒懸得而服之使人神仙荆州記曰冝都夷道縣有石穴穴中有蝙蝠如烏多倒懸崔豹古今注曰蝙蝠一名仙䑕又曰飛䑕五百歳則色白腦重集物則頭垂故謂爲倒挂䑕食之得仙幽明録曰淮南郡有物髠人髪太守朱誕曰吾知之矣多置黐音􅄐以塗壁夕有數蝙蝠大如雞集其上不得去殺之乃絶屋簷下巳有數百人頭髻范汪治瘧方曰蝙蝠七枚合擣五百發雞鳴服一丸禺中一丸遇發乃與粥清一升耳守宫毛詩節正月曰哀今之人胡爲虺蝪蝪螈也虺蜴之性見人則走陸機毛詩䟽義曰蜴一名榮原水蜴也或謂之䗂蜼音濉蛇醫如蜥蝪青緑色大如指􅄱狀可惡也春秋考異郵曰土勝水故守宫食蠆宋均曰守宫生於土蠆藏物屬坎水也爾雅曰蠑螈􅔼蝪􅔼蝪蝘蜓蝘蜓守宫也轉相解慱異語别四名也漢書東方朔傳曰武帝置守宫盆下使射之朔曰臣以爲龍又無角謂之爲蛇又有足跂跂脉脉善縁壁􅀂非守宫即􅔼蝪上曰善賜帛十匹抱朴子曰謂蜥蝪爲神龍者非但不識神龍亦不識􅔼蝪又曰沙礫無量而珠壁甚尠鴟隼屯飛而鸞鳯罕出虺􅔼盈藪而虬龍希覿王充論衡曰禹南濟於江黃龍􅀒舟舟中人人五色無主禹乃咲而稱曰我受命於天竭力以勞萬民生􅀉也死歸也視龍猶蝘蜓也龍去而亡患楊雄方言曰􅁗晉西夏謂之守宫其在澤者謂之􅔼蝪南楚謂之蛇毉或謂之蠑螈北燕謂之祝蜓桂林之中守宫大能鳴者謂之蛤蠏}
