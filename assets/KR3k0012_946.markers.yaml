  - {type: variant, offset: 104, length: 109, content: 敢入也晉書曰道安曰猛虎當道食不覺蚊䖟來唐史曰江東有吐蚊鳥夏夜鳴吐紋於蘆荻中湖湘尤甚晏子曰東海有蟲巢蚊睫乳而不飛蚊不驚名曰焦冥列子曰江浦之間生麼蟲麼細也名曰焦螟群飛而集於蚊睫弗相觸也又曰焦螟生於蚊睫離珠子羽拭眼而望弗能見, WYG: 知黄雀方緣茂林徘徊枝葉欲啄螳蜋}
