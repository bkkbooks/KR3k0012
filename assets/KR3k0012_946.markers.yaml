  - {type: variant, offset: 3023, length: 1, content: 腰, SBCK: 青色長股而鳴喻后妃之性不妬忌子孫衆多爾雅白蜇音斯螽蜙蝑郭璞注曰蜙䗥也俗呼蝽蝙蝠春秋運斗樞曰揺光携則服翼兩頭並翔廢江淮山瀆之祠揺光不明服翼九足服翼附䑕也孝經援神契曰蝙蝠伏匿}
  - {type: variant, offset: 3023, length: 1, content: 腰, krp: 青色長股而鳴喻后妃之性不妬忌子孫衆多爾雅白蜇音斯螽蜙蝑郭璞注曰蜙䗥也俗呼蝽蝙蝠春秋運斗樞曰揺光携則服翼兩頭並翔廢江淮山瀆之祠揺光不明服翼九足服翼附䑕也孝經援神契曰蝙蝠伏匿}
