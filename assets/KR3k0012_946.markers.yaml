  - {type: variant, offset: 3052, length: 2, content: 呪云, krp: 今子乃以鴟梟而咲鳯皇執蝘蜓而謿龜龍不亦病乎蜣蜋爾雅曰蛣蜣蜣蜋也郭璞曰黑甲蟲噉糞者也張揖廣雅曰天柱蜣蜋也一作天社許愼說文曰蜣蜋一曰天柱衝波傳曰蜣蜋無鼻而聞香抱朴子曰玄蟬㓗飢不羡蜣蜋穢飽郭義㳟廣志曰交州無蜣蜋崔豹古今注曰蜣蜋能以土包糞轉而成丸莊周所謂蛣蜣之智在於轉丸者也一名蜣蜋一名結蜣一名弄丸一名轉丸夢書曰蜣蜋爲憂財輔矣行者夢見蜣蜋憂財粮也白魚爾雅曰蟫音淫白魚也衣書中蟲一名蛃魚音丙張揖廣雅曰白魚蛃魚也齊書曰明帝𥘉有疾無輟聽覽羣臣莫知及疾篤勑臺省府署求白魚以爲藥外始知之夲草經曰白魚一名衣魚治婦人疝疵小便不利小兒頭中風項彊皆冝摩之生咸陽呉氏夲草經曰衣中白魚一名蟫范汪方曰治小便不利取白魚二七擣之令糜爛分爲數丸頓服之即通也螳蜋易通繫卦曰螳蜋搏蟬之蟲乗寒而殺物自隱蔽而有所害捕搏之}
  - {type: punctuation, offset: 3054, content: 『, id: KR3k0012_CHANT_946-bkkpn1051}
  - {type: variant, offset: 3055, length: 3, content: 我象我, SBCK: 也周書時訓曰芒種之日螳蜋生不生是謂隂息韓詩外傳曰齊莊公出獵有螳蜋舉足􅀅搏其輪問其御曰此何蟲對曰此螳蜋也爲蟲知進而不知退不量力而輕就敵公曰此爲天下勇士矣廻車避之勇士歸焉淮南子同又曰楚莊王􅀅伐晉告士大夫有諌者死孫叔敖曰臣園中有榆榆上有蟬蟬方􅁬翼悲鳴不知螳蜋在後欲攫而食之螳蜋方取蟬不知黄雀在其後}
