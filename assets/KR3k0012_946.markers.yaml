  - {type: variant, offset: 76, length: 1, content: 服, WYG: 曰蔡君向來至門而去主人遽自追而問其故邕具以告彈琴者曰我向鼓絃見螳蜋方向鳴蟬蟬將去未飛螳蜋為之一前一却吾心聳然唯恐螳蜋失之也此豈為殺心而形於色者乎邕曰此足以當之矣呉越春秋曰呉王夫差令於邦中曰寡人欲伐齊敢有諌者死太子友因諷諫以激於王以清旦懷大挾彈}
