  - {type: variant, offset: 23, length: 0, content: '', WYG: 滎蚖蛇毉以注鳴者也在壁曰蝘蜓在草曰蜥蜴蜥蜴守宫也淮南萬畢術曰守宫塗臍婦人無子取守宫一枚置甕中及蛇醫以新布宻裹之懸於隂處百日治守宫蛇醫分等以唾和之塗婦人臍磨令温即無子矣又曰守宫飾女臂有文章取守宫新合隂陽者牝牡各一藏之瓮中隂乾百日以飾女臂則生文章與男子合隂陽輒滅去又曰取七月七日守宫隂乾之治合以井花水和塗女人身有文章則以}
  - {type: page-break, offset: 23, content: '', id: KR3k0012_WYG_946-5a, image: WYG0901/WYG0901-0380a.png}
  - {type: page-break, offset: 23, content: '', id: KR3k0012_WYG_946-5b, image: WYG0901/WYG0901-0380b.png}
  - {type: variant, offset: 24, length: 9, content: 鳥羞白鳥白鳥蚊也漢, WYG: 塗之不去者不淫去者有姦徐懷逺南越志曰成陽縣樹多守宫大者能鳴謂之蛤解郭義恭廣志曰守宫鱗色如虵而四足似蝘蜓長尺餘蝘蜓有屋壁間者有草野者石上者博物志曰蜥蜴或蝘蜓以器養之食以朱砂體盡赤所食滿七斤擣萬杵以㸃女人支體終身不滅故號曰守宫崔豹古今注曰蝘蜓一曰守宫一曰龍子善於樹上捕蟬食之其長細五色者名為蜥蜴其短大者名為蠑螈一曰蛇醫大者長三尺其色𤣥紺善魅人一曰𤣥螈一名緑螈曹叔雅異物志曰魚跳躍則蜥蜴從草中下稍相依近便共浮水上而相合事竟魚還水底蜥還草中干寶搜神記曰淮南書佐劉雅夢見青蜥蜴從屋入腹内因苦腹痛夢}
  - {type: page-break, offset: 24, content: '', id: KR3k0012_WYG_946-6a, image: WYG0901/WYG0901-0380c.png}
  - {type: page-break, offset: 24, content: '', id: KR3k0012_WYG_946-6b, image: WYG0901/WYG0901-0380d.png}
  - {type: variant, offset: 27, length: 838, content: 鳥白鳥蚊也漢書曰中山靖王朝天子置酒聞樂聲而泣問其故靖王對曰臣聞眾喣漂山藂蚊成雷後漢書曰趙炳有道術人服從者如歸章安令惡其惑眾收殺之人為立祠室於永康至今蚊蚋不敢入也晉書曰道安曰猛虎當道食不覺蚊䖟來唐史曰江東有吐蚊鳥夏夜鳴吐紋於蘆荻中湖湘尤甚晏子曰東海有蟲巢蚊睫乳而不飛蚊不驚名曰焦冥列子曰江浦之間生麼蟲麼細也名曰焦螟群飛而集於蚊睫弗相觸也又曰焦螟生於蚊睫離珠子羽拭眼而望弗能見也莊子曰夫愛馬者以筐盛屎以筐盛溺適有蚊撲緣而拊之不時則缺衘毀首碎胸又曰肩吾見狂接輿狂接輿曰日中始何以語汝肩吾曰告我君人者以己出經式義度民孰敢不聽而化接輿曰是欺德也其於治天下也猶涉海鑿河而使蚊負山也又曰孔子見老聃而語仁義老聃曰夫播糠瞇目則天地四方易位矣蚊蝱噆音匝膚則通霄不寐矣淮南子曰夫貴賤之於身也猶條風之時麗也時麗忽一過也毀譽之於己也猶蚊䖟之一過也又曰蜂蠆螫指而神不能掞音淡蟁蚊音文䖟噆膚噆齧也而性不能平今憂患之來嬰人心也非直蜂蠆之螫毒而蟁䖟之憯音慘怛也而欲靜漠虛無奈何哉牟子曰昔公明儀為牛彈清角之操伏食如故轉為蟁䖟聲則翹尾而躡躒夏侯子曰一螘之行一蚊之飛聖人皆知之金樓子曰荊州高齊盛夏之月無白鳥余亟寢處於其中及移餘齋則藂蚊之聲如雷矣數丈之間如此之異吁可怪哉又曰白鳥蚊也齊桓公臥於柏寢謂仲父曰吾國富民殷無餘憂矣一物失所寡人猶為之於邑白鳥營飢而求飽寡人因之開翠紗之帳進蚊子焉其蚊有知禮者不食公之肉而退其蚊有知足者㗱子立切公之肉而退其蚊有不知足者遂長噓短吸而食之及其飽也腹腸為之破潰公曰嗟乎民生亦猶是矣孝子傳曰吳猛年七歲時夏日伏於母床下恐蚊䖟及父母蕭廣濟孝子傳曰鄧展父母在牖下臥多蚊展伏床下以自當之神異經曰南方蚊翼下有小蜚蟲焉目明者見之每生九卵復成九子蜚而俱出蚊遂不知論衡曰蚊䖟不如牛馬之力牛馬困於蚊䖟蚊䖟有勢也搜神記曰吳猛性至孝小兒時在父母邊臥夏時多蚊蚋而終不搖扇恐蚊蚋去己而及父母嶺南異物志曰嶺表有樹如冬青實生枝間形如枇杷子每熟即拆裂蚊子群飛唯皮殼而已士人謂之蚊子樹嶺表錄異曰蚊母鳥形如青鷁觜大而長於池塘捕, SBCK: ''}
