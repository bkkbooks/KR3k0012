  - {type: variant, offset: 3061, length: 0, content: '', SBCK: 月令曰仲夏之月螳蜋生蔡邕月令章句曰螳蜋蟲名食蟬殺蟲鄭禮記注曰螳蜋螵蛸母也王瓉曰爾雅云莫貈螳蜋同􅀋物色也今沛魯以南謂之螳蜋燕趙之際謂之食肬齊兖以東謂之馬敷爾雅曰莫貈螳蜋蛑螳蜋有斧蟲江東呼爲石蜋蛑音謀貈户各反不過蟷蠰螳蠰螳蜋别名堂襄二音其子蜱蛸一名折蟭螳蠰􅆑也蜱音禆音􅅮蟭音焦張揖廣雅曰羊羊蛻蚘堂蜋也􅀶焦夷冒焦螵蛸也華嶠後漢書曰蔡雍在陳留其鄰人有以酒食召雍者比至而酒酣焉客有彈琴於屏雍至門潜聽之曰嘻以樂召我而有殺心何也遂反􅀅命者告主人曰蔡君向來至門而去主人遽自追而問其故雍具以告彈琴者曰我向鼓􅃶見螳蜋方向鳴蟬蟬􅀅去未飛螳蜋爲之一前一却吾心聳然唯恐螳蜋失之也此豈爲殺心而􅄱於声者乎雍曰此足以當之矣呉越春秋曰呉王夫差令於􅀖}
