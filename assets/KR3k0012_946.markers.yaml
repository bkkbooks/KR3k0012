  - {type: variant, offset: 1063, length: 287, content: 有蚊蚋人多異焉列子曰目將眇者先暑秋毫耳將聾者先聞蚋飛淮南子曰涵牛之鼎沸而蠅蚋弗敢入涵牛受一牛之鼎也崑山之玉瑱崑山崑崙也瑱式也而塵垢弗能汙也又曰羊肉不慕蟻蟻慕於羊肉羶也醯酸不慕蚋蚋慕於醯酸也呂氏春秋曰缶醯黃蚋藂之有酸也美羹徒水則必不可以狸致鼠以冰致蠅雖上聖不能以茹魚去蠅蠅愈至茹女居反臭也以致之之道去之也蜉蝣毛詩曹蜉蝣曰剌奢也蜉蝣之羽衣裳楚楚蜉蝣渠略也朝生夕死猶有羽翼以自脩飾楚楚鮮明貌爾雅曰蜉蝣渠略似蛣蜣身狹而長角黃黑色叢生糞土中朝生暮死豬好啖之說文曰秦晉之間謂蜉蝣為渠略郭璞注曰似天牛而小有甲也又曰𧑀音略蟲也一名蜉蝣朝生暮死陸機毛詩䟽義曰蜉蝣方土通謂之渠略似甲蟲有角大如指, WYG: 見蜈蚣}
