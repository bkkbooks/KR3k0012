  - {type: variant, offset: 48, length: 1, content: 泣, WYG: 殺物自隠蔽而有所害捕搏之象也周書時訓曰芒種之日螳螂生是謂隂息韓詩外傳曰齊莊公出獵有螳螂舉足將拒其輪}
