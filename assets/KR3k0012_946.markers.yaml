  - {type: variant, offset: 35, length: 0, content: '', WYG: 守宫為寡婦着垣牆也夢見守宫憂寡婦人也呉氏本草經曰石龍子一名守宫一名石暢一名石龍子揚子雲解嘲曰今子乃以鴟梟而笑鳯凰執蝘蜓而嘲龜龍不亦病乎蜣蜋爾雅曰蛣蜣蜣蜋也郭璞曰黒甲蟲噉糞土者張揖廣雅曰天柱蜣蜋也一作天杜許慎説文曰蜣蜋一曰天柱衝波傳曰蜣蜋無鼻而聞香抱朴子曰𤣥蟬潔饑不羨蜣蜋穢飽郭義恭廣志曰交州無蜣蜋崔豹古今注曰蜣蜋能以土包糞轉而成丸莊周所謂蛣蜣之智在於轉丸者也一名蜣蜋一名蛣蜣一名弄丸一名轉丸夢書曰蜣蜋為憂財輔以行者夢見蜣蜋憂財糧也白魚爾雅曰蟫白魚書}
  - {type: page-break, offset: 35, content: '', id: KR3k0012_WYG_946-7a, image: WYG0901/WYG0901-0381a.png}
  - {type: page-break, offset: 35, content: '', id: KR3k0012_WYG_946-7b, image: WYG0901/WYG0901-0381b.png}
  - {type: variant, offset: 36, length: 11, content: 山靖王朝天子置酒聞樂聲, WYG: 蟲一名蛃魚音淫張揖廣雅曰白魚蛃魚也齊書曰明帝初有疾無輟聽覽羣臣莫知及疾甚勑臺省府署求白魚以為藥外始知之本草經曰白魚一名衣魚治婦人疝疪小便泄利小兒頭中風項彊皆宜摩之生咸陽呉氏本草經曰衣中白魚一名蟫范注方曰治小便不利取白魚二七擣之令糜爛分為數次須臾服之即通也螳螂易通繋卦曰螳螂摶蟬之蟲乘寒}
