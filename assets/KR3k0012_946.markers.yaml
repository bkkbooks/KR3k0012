  - {type: variant, offset: 3128, length: 3, content: 為政化, SBCK: 曰蝍蛆甘帶司馬彪曰帶小蛇也蝍蛆喜食其眼抱朴子曰南人入山皆以竹管盛活呉公呉公知有蛇之地便動作於管中如此則草中便有蛇也呉公見蛇能以氣禁之蛇即死淮南子曰月照天下蝕於蟾蜍螣蛇游霧而殆蝍蛆蟾諸月中蝦蟇也食月故曰食於蟾諸蝍蛆蓋呉公也殆猶畏者也沈懷逺南越志曰綏定縣多呉公其大者能以氣吸蜥蝪劉欣期交州記曰大呉公岀徐聞縣界取其皮可以冠皷宋永􅀄記亦同沈瑩臨海異物志曰晉安東南呉嶼山呉公千萬積聚或云長丈餘者以作脯味似大蝦嶺南異物志曰珠崖人毎晴明見海中逺山羅列皆如翠屏而東西不定悉呉公也嶺表録異曰蜈蚣南越志云大者其皮可以鞔皷取其肉曝爲脯美於牛肉又云長數丈能噉牛人或遇之則鳴皷燃火炬以驅逐之陶潜續搜神記曰曇遊道人清苦沙門也剡縣有一家事蠱人噉其食飲无不吐血死遊詣之主人下食遊依常呪願一􅀟呉公長尺餘便於拌中跳走遊快飲食安然无他王琰􅁳祥記曰沙門安法開者北人也甞見呉公長三尺自屋墮地旋徊而去葛洪遐觀賊曰呉公大者長}
