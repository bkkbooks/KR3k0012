  - {type: variant, offset: 862, length: 5, content: 池塘捕魚而, WYG: 樓中跳走遊快飲}
  - {type: variant, offset: 866, length: 350, content: 而食每叫一聲則有蚊蚋飛出其口俗云採其翎為扇可辟蚊子亦呼為吐蚊鳥䖟晉書曰惠帝時洛陽南山有䖟作聲曰韓屍識者以為韓氏將屍戮俄而韓謐被誅淮南子曰䖟戢精血以類推之也許慎曰䖟食血又曰䖟與驥致千里而不飛無糗糧之資而不飢又曰上古之時冬日則不勝霜雪霧露夏日則不勝暑熱蟁䖟蚋梁書曰梁武丁貴嬪諱令光譙國人也初貴嬪少時與鄰女月下紡績諸女並患蚊蚋而貴嬪弗之覺也又曰孫謙居身儉素床施蘧蒢屏風冬則布被莞席夏日無幬帳而夜臥未嘗有蚊蚋人多異焉列子曰目將眇者先暑秋毫耳將聾者先聞蚋飛淮南子曰涵牛之鼎沸而蠅蚋弗敢入涵牛受一牛之鼎也崑山之玉瑱崑山崑崙也瑱式也而塵垢弗能汙也又曰羊肉不慕蟻蟻慕於羊肉羶也醯酸不慕蚋蚋慕於醯酸也呂氏春秋曰缶醯黃蚋藂之有酸也美羹徒水則必不可以狸致鼠以冰致蠅雖上聖不能以茹魚去蠅蠅愈至茹女居反臭也以致之之道去之也蜉蝣, SBCK: 螗蜋蝍蛆莎雞}
