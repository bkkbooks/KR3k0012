  - {type: variant, offset: 3045, length: 0, content: '', SBCK: 守宫隂乾之治合以井花水和􅂗女人身有文章則以丹塗之不去者不􅁋去者有姦徐懷逺南越志曰成陽縣樹多守宫大者能鳴謂之蛤蠏郭義㳟廣志曰守宫鱗色如虵}
  - {type: variant, offset: 3045, length: 0, content: '', krp: 守宫隂乾之治合以井花水和塗女人身有文章則以丹塗之不去者不淫去者有姦徐懷逺南越志曰成陽縣樹多守宫大者能鳴謂之蛤蠏郭義㳟廣志曰守宫鱗色如虵}
  - {type: variant, offset: 3046, length: 1, content: 化, SBCK: 四足似蝘蜓有尺餘蝘蜓有屋壁間者有草野者有石上者􅀶物志曰蜥蝪或蝘蜓以器養之食以朱砂躰盡赤所食满七斤擣萬杵以􅀧女人支躰終身不滅故号曰守宫崔豹古今注曰蝘蜓一曰守宫一曰龍子善於􅀣上捕蟬食之}
  - {type: variant, offset: 3046, length: 1, content: 化, krp: 四足似蝘蜓有尺餘蝘蜓有屋壁間者有草野者有石上者博物志曰蜥蝪或蝘蜓以器養之食以朱砂躰盡赤所食满七斤擣萬杵以點女人支躰終身不滅故号曰守宫崔豹古今注曰蝘蜓一曰守宫一曰龍子善於樹上捕蟬食之}
  - {type: variant, offset: 3048, length: 0, content: '', SBCK: 長細五色者名爲蜥蝪其短大者名爲蠑螈一曰蛇毉大者長三尺其色􅀇紺善魅人一曰􅀇螈一名緑螈曹叔雅異物志曰魚跳躍則蜥蝪從草中下稍相依近便共浮水上而相合事竟魚還水底蜥還草中于寳捜神記曰淮南書佐劉雅夢見青􅔼蝪從屋棟落其腹内因苦腹痛夢書曰守宫爲寡婦着垣牆也夢見守宫憂寡婦人也呉氏夲草經曰石龍}
