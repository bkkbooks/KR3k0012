  - {type: variant, offset: 861, length: 0, content: '', WYG: 數丈能噉牛里人或遇之則鳴鼓燃火炬以驅逐之陶濳續搜神記曰曇遊道人清苦沙門也剡縣有一家事蠱人噉其食飲無不吐血死遊詣之主人下食遊依常呪願一雙蜈蚣長尺餘便}
