  - {type: variant, offset: 3075, length: 0, content: '', SBCK: 臣遊後園聞秋蟬之鳴往而觀之秋蟬登髙樹自以爲安不知螳蜋超枝縁條曳要舉刃欲哺其􅄱也螳蜋貪心務進志在有利不知黄雀盛縁茂林俳􅆦枝葉欲啄螳蜋也莊子曰莊周游於雕陵之樊覩一異鵲自南方來者執彈而留之宿留伺其便也覩一蟬方得美䕃而忘其身螳蜋執翳且搏之執草以自翳見得而忘其􅄱異鵲從而利之見利而忘其眞眞身也莊周􅇶然曰噫物固相累二􅀋相召也􅂢彈而反走又曰螳蜋怒臂以當車轍不知不勝任也是才之美者也司馬彪曰非不有美才顧不勝任耳楊雄方言曰螳蜋謂之髠或謂之丁或謂之羊羊郭璞曰江東呼齕折按爾雅丁􅀿下屬方言依此失其旨許愼􅀃}
