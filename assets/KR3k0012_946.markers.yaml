  - {type: variant, offset: 501, length: 267, content: 高齊盛夏之月無白鳥余亟寢處於其中及移餘齋則藂蚊之聲如雷矣數丈之間如此之異吁可怪哉又曰白鳥蚊也齊桓公臥於柏寢謂仲父曰吾國富民殷無餘憂矣一物失所寡人猶為之於邑白鳥營飢而求飽寡人因之開翠紗之帳進蚊子焉其蚊有知禮者不食公之肉而退其蚊有知足者㗱子立切公之肉而退其蚊有不知足者遂長噓短吸而食之及其飽也腹腸為之破潰公曰嗟乎民生亦猶是矣孝子傳曰吳猛年七歲時夏日伏於母床下恐蚊䖟及父母蕭廣濟孝子傳曰鄧展父母在牖下臥多蚊展伏床下以自當之神異經曰南方蚊翼下有小蜚蟲焉目明者見之每生九卵復成九子蜚而俱出蚊遂不知論衡曰蚊䖟不如牛馬之力牛馬困於蚊䖟蚊䖟有勢也搜神, WYG: ''}
