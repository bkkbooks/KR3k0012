  - {type: variant, offset: 2036, length: 952, content: 野蛾一名風蝶東人謂為撻末色白背青者是也其大有如蝙蝠者或黑色或亦斑名曰鳳子一名鳳車一曰鬼車生江南甘橘園中廣五行記曰晉安帝義熙中烏傷人葛輝在妻家宿三更有兩人把火逕至階前疑是惡人便打之欲下杖悉化為蝶蠙紛飛散有一物衝輝腋下便打倒地輝少時而死嶺南異物志曰嘗有人浮南海泊於孤岸忽有物如蒲帆飛過海將到舟竟以物擊之如帆者盡破碎墜地視之乃蛺蝶也海人去其翅足秤之得肉八十斤噉之極肥美嶺表錄異曰鶴子草蔓上春生雙蟲只食其葉越女收於粧奩中養之如蠶摘其葉飼之蟲老不食而蛻為蝶蝶赤黃色婦女收而帶之謂媚蝶螢毛詩豳七月曰町畽鹿場熠耀宵行螢火也大戴禮夏小正曰丹鳥羞白鳥丹鳥也者謂丹良也白鳥也者謂蛟蚋也其謂之鳥者重其養也凡有翼者為鳥羞也者進也禮記月令曰季夏之月腐草為螢爾雅曰螢火即炤夜飛腹下有火音照廣雅曰景天螢火燐也續晉陽春秋曰車胤字武子好學不倦家貧不常得油夏月則練囊盛數十螢火以夜繼日焉後漢書曰光熹元年秋張讓段珪劫少帝及陳留王協走小平津帝與王夜步逐螢火光行數里得民家露車共乘還宮隋書曰大葉十二年煬帝幸景華宮徵求螢火得數斛夜出遊山而放之光遍巖谷崔豹古今注曰螢一名輝夜一名景輝天一名熠燿一名燐一名丹良一名夜光一名宵燭腐草為之食蚊蚋焉月令曰丹鳥羞白鳥白鳥即蚊也丹鳥螢也說文云秦人謂蚊曰蚋淮南萬畢術曰螢火卻馬注云取螢火裹以羊皮置土中馬見之鳴卻不敢行祖台之志怪曰昔懷帝永嘉中譙國丁祚渡江至陰陵界時天昏霧在道北有社見一物如人到立兩眼垂血從額下藂地兩處各有升餘祚與從弟齊喝之滅而不見立處藂血皆化為螢火數千枚縱橫飛起本草經曰螢一夕夜光一名即照一名熠燿潘岳螢火賦曰爛若飛景之霄遊彗音衛如移星之雲流動集飄揚灼如隨珠熠爚若丹蘂之初葩彯頴若流金之在沙傅咸螢火賦曰余曾獨處夜不能寐顧見螢火意遂有感於是執以自炤而為之賦其辭曰感詩人之攸懷兮覽熠耀於前庭不以姿質之鄙薄兮欲增輝乎太清雖無補於日月期自竭於陋形螟蛉毛詩節小宛曰螟蛉有子蜾蠃負之螟蛉桑蟲也蜾蠃蒲盧也負持也箋云蒲盧取桑蟲之子脅持而去煦嫗養之以成子毛詩義䟽曰螟蛉似步屈其色青細小或在草葉上土蜂取之置木穴中或書卷間筆筒中七日而成其子里語曰呪云象我象我陸機毛詩義䟽曰螟蛉犍為文學舍人曰桑上小青蟲也似步屈郭璞注方言曰尺蠖又呼步屈其色青而細小或在草木葉上今蜾蠃所負為子者爾雅曰螟蛉桑蟲也俗亦謂桑蟃亦曰戎支蠮螉爾雅曰蜾蠃蒲盧也, SBCK: 莎雞}
