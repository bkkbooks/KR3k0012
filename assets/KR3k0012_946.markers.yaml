  body:
  - {type: variant, offset: 3, length: 23, content: 二蚊說文曰秦謂之蚋楚謂之蚊大戴禮夏小正曰丹鳥羞, SBCK: 三莎雞螽斯蜙蝑蝙蝠守宫蜣蜋}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 三莎鷄毛詩豳七月曰六月莎雞振羽莎雞羽成而振迅之陸璣毛詩疏義曰莎雞如蝗而斑色翅數重下翅正赤或謂之天雞六月飛而振羽索索聲幽州人謂之蒲錯也爾雅曰螒天雞也孫炎注曰小蟲黒身赤頭一名莎雞郭璞注曰一名樗雞也廣志曰莎雞似蠶蛾而五色赤曰犨雞螽斯毛詩螽斯曰螽斯后妃子孫衆多也言若螽斯不妬忌則子孫衆多也螽斯羽詵詵兮螽斯蜙蝑也毛詩豳七月曰五月斯螽動股斯螽蜙蝑也蜙蝑陸璣毛詩疏義曰爾雅云螽斯蜙宣龍切蝑相魚切也楊雄云春黍也幽州謂之春箕角長青色班黒其股似瑇􅈘文五月中以兩股相瑳作聲聞數十步毛詩題綱曰螽斯名蜙蝑一名春黍似蝗而小青色長股而鳴喻后妃之性不妬忌子孫衆多爾雅曰蜤音斯螽蜙蝑郭璞注曰蜙䗥也俗呼春黍蝙蝠春秋運斗樞曰行失瑤光則伏翼兩頭並翔廣江淮山瀆之祠則揺光明服翼九足服翼附鼠也孝經援神契曰蝙蝠伏匿故夜食爾雅曰蝙蝠服翼也齊人呼為蟙䘃或謂之仙鼠闕墨}
