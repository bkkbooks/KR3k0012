  - {type: variant, offset: 4, length: 3, content: 蚊說文, WYG: 音抱朴子曰千嵗蝙蝠色如白雪集則倒懸腦重故也此物得而隂乾末服之令人壽萬嵗𤣥中記曰百嵗服翼其色赤止則倒懸千嵗服翼色白得食之壽萬嵗水經曰交州丹水亭下有石穴甚深未嘗測其逺近穴中蝙蝠大者如鳥多則倒懸得而服之使人神仙荆州記曰宜都夷道縣有石穴穴中有蝙蝠如鳥則倒懸崔豹古今註曰蝙蝠一名仙鼠又曰飛鼠五百嵗則色白腦重集物則頭垂故謂為倒挂鼠食之得仙幽明録曰淮南郡有物髠人髪太守朱誕曰吾知之矣多置黐音離以塗壁夕有數蝙蝠大如雞集其上不得去殺之乃絶屋簷下已有數百人頭髻范注治瘧方曰蝙蝠七枚合擣五百下發日雞鳴服一丸日中一丸遇發乃與粥清一升耳守宫毛詩節正月曰哀今之人胡為虺蜴蜴螈也虺蜴之性見人則走陸璣毛詩疏義曰蜴一名蠑螈蜥蜴也或謂之蠦䘃一名蛇醫如蜥蜴青緑色大如指形狀可惡也春秋考異郵曰土勝水故守宫食蠆宋均曰守宫生於土蠆藏物屬坎水也爾雅曰蠑螈蜥蜴蝘蜓蝘蜓守官也轉相解傳異語别四名也漢書東方朔傳曰武帝置守宫盆下使射之朔曰臣以為龍又無角謂之為蛇又有足跂跂脉脉善緣壁若非守宫即蜥蜴上曰善賜帛十匹抱朴子曰謂蜥蜴為神龍者非但不識神龍亦不識蜥蜴又曰沙礫無量而珠璧甚尠雞隼屯飛而鸞鳯罕出虺蜥盈數而虬龍希覿王充論衡曰禹南濟於江黄龍負舟舟中人五色無主禹乃笑而稱曰我受命於天竭力以勞萬民生寄也死歸也視龍猶蝘蜓也龍去而亡患揚雄方言}
