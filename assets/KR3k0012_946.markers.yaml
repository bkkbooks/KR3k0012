  - {type: variant, offset: 3126, length: 1, content: 為, SBCK: 義蝍蛆春秋考異郵曰土勝水故蝍蛆􅅮蛇宋均曰蝍蛆生土虵藏物屬於坎坎水也爲隱伏爾雅曰蒺䔧蝍蛆郭璞曰似蝗大腹長角能食虵腦張揖廣雅曰蝍蛆呉公也荘}
  - {type: variant, offset: 3126, length: 1, content: 為, krp: 義蝍蛆春秋考異郵曰土勝水故蝍蛆搏蛇宋均曰蝍蛆生土虵藏物屬於坎坎水也爲隱伏爾雅曰蒺䔧蝍蛆郭璞曰似蝗大腹長角能食虵腦張揖廣雅曰蝍蛆呉公也荘}
