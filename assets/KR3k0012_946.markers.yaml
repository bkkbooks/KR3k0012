  - {type: variant, offset: 258, length: 1, content: 日, WYG: 螳蜋為亡人蔽其草也夢見螳蜋憂亡命者范子計然曰螵蛸出三輔上價三百吳氏本草經曰桑蛸條蝕也一名害焦成公綏螳蜋賦曰戢翼鷹峙延頸鵠望推翳俟前翹翼後抗鳥伏蛇騰鷹撃隼放俯飛蟬而奮猛躍蟪蛄而逞壯距車輪而軒翥固齊侯之所尚郭璞螳蜋讃曰螳蜋氣蟲揮斧奮臂當轍不迴勾踐是避勇士致文勵之以義蝍蛆春秋考異郵曰土勝水故蝍蛆搏蛇宋均曰蝍蛆生土地伏物屬於坎坎水也為隱伏爾雅曰蒺藜蝍蛆郭璞曰似蝗大腹長角能食蛇腦張揖廣雅曰蝍蛆蜈蚣也莊子曰蝍蛆甘𢃄司馬彪曰𢃄小蛇也蝍蛆喜食其眼抱朴子曰南人入山皆以竹管盛活蜈蚣蜈蚣知有蛇之地便動作於管}
