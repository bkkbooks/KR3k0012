  - {type: variant, offset: 1608, length: 665, content: 淮南子曰衰世則藂蟲滿野許慎日飛蟲蠛蠓抱朴子曰蠓蟈之育於醢酢芝檽之產於木石蛣𧌑之滋於洿游翠蘿之老於松枝非彼四物所創造也字書曰蠛蠓小蟲三風舂雨磑者也蝴蝶北齊書曰魏收嘗在洛京輕薄尤甚人號云魏收驚蛺蝶文襄曾遊東山令給事黃門侍郎等宴文襄曰魏收博才無宜適須出其短往復數番收忽大唱曰楊遵彥理屈已倒遵彥從容曰我綽有餘暇山立不動若遇當塗恐翩翩遂逝當塗者魏翩翩者蝶也文襄先知之大笑稱善梁書曰沈麟士年過八十耳目猶聰明反故抄寫火下細書復成二三千卷滿數十篋時人以為養身靜嘿所致仍製黑蝶賦以寄意漢實錄曰右監門衛大將軍許遷言臣奉命博州至博平縣戴村有蝝彌亙數里一夕言並化蝶飛去列子曰烏足以其根為蠐螬其葉為蝴蝶莊子曰昔周夢為胡蝶林林然胡蝶也不知周也俄覺則瞿瞿然周也不知周之夢為胡蝶與胡蝶之夢為周與周與胡蝶則必有分矣此謂物化抱朴子曰髻孺背千金而逐蛺蝶越人棄八珍而甘龜虵金樓子曰陳思之文群才之俊也而武帝誅之尊靈永蟄明帝頌云聖體浮輕浮輕有似於胡蝶永蟄頗擬於昆蟲施之尊極不其蚩乎崔豹古今注曰蛺蝶一名野蛾一名風蝶東人謂為撻末色白背青者是也其大有如蝙蝠者或黑色或亦斑名曰鳳子一名鳳車一曰鬼車生江南甘橘園中廣五行記曰晉安帝義熙中烏傷人葛輝在妻家宿三更有兩人把火逕至階前疑是惡人便打之欲下杖悉化為蝶蠙紛飛散有一物衝輝腋下便打倒地輝少時而死嶺南異物志曰嘗有人浮南海泊於孤岸忽有物如蒲帆飛過海將到舟竟以物擊之如帆者盡破碎墜地視之乃蛺蝶也海人去其翅足秤之得肉八十斤噉之極肥美嶺表錄異曰鶴子草蔓上春生雙蟲只食其葉越女收於粧奩中養之如蠶摘其葉飼之蟲老不食而蛻為蝶蝶赤黃色婦女收而帶之謂媚蝶螢, krp: ''}
