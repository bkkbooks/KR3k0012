  - {type: variant, offset: 2211, length: 968, content: 斤噉之極肥美嶺表錄異曰鶴子草蔓上春生雙蟲只食其葉越女收於粧奩中養之如蠶摘其葉飼之蟲老不食而蛻為蝶蝶赤黃色婦女收而帶之謂媚蝶螢毛詩豳七月曰町畽鹿場熠耀宵行螢火也大戴禮夏小正曰丹鳥羞白鳥丹鳥也者謂丹良也白鳥也者謂蛟蚋也其謂之鳥者重其養也凡有翼者為鳥羞也者進也禮記月令曰季夏之月腐草為螢爾雅曰螢火即炤夜飛腹下有火音照廣雅曰景天螢火燐也續晉陽春秋曰車胤字武子好學不倦家貧不常得油夏月則練囊盛數十螢火以夜繼日焉後漢書曰光熹元年秋張讓段珪劫少帝及陳留王協走小平津帝與王夜步逐螢火光行數里得民家露車共乘還宮隋書曰大葉十二年煬帝幸景華宮徵求螢火得數斛夜出遊山而放之光遍巖谷崔豹古今注曰螢一名輝夜一名景輝天一名熠燿一名燐一名丹良一名夜光一名宵燭腐草為之食蚊蚋焉月令曰丹鳥羞白鳥白鳥即蚊也丹鳥螢也說文云秦人謂蚊曰蚋淮南萬畢術曰螢火卻馬注云取螢火裹以羊皮置土中馬見之鳴卻不敢行祖台之志怪曰昔懷帝永嘉中譙國丁祚渡江至陰陵界時天昏霧在道北有社見一物如人到立兩眼垂血從額下藂地兩處各有升餘祚與從弟齊喝之滅而不見立處藂血皆化為螢火數千枚縱橫飛起本草經曰螢一夕夜光一名即照一名熠燿潘岳螢火賦曰爛若飛景之霄遊彗音衛如移星之雲流動集飄揚灼如隨珠熠爚若丹蘂之初葩彯頴若流金之在沙傅咸螢火賦曰余曾獨處夜不能寐顧見螢火意遂有感於是執以自炤而為之賦其辭曰感詩人之攸懷兮覽熠耀於前庭不以姿質之鄙薄兮欲增輝乎太清雖無補於日月期自竭於陋形螟蛉毛詩節小宛曰螟蛉有子蜾蠃負之螟蛉桑蟲也蜾蠃蒲盧也負持也箋云蒲盧取桑蟲之子脅持而去煦嫗養之以成子毛詩義䟽曰螟蛉似步屈其色青細小或在草葉上土蜂取之置木穴中或書卷間筆筒中七日而成其子里語曰呪云象我象我陸機毛詩義䟽曰螟蛉犍為文學舍人曰桑上小青蟲也似步屈郭璞注方言曰尺蠖又呼步屈其色青而細小或在草木葉上今蜾蠃所負為子者爾雅曰螟蛉桑蟲也俗亦謂桑蟃亦曰戎支蠮螉爾雅曰蜾蠃蒲盧也郭璞注曰細腰蜂也俗呼為蠮螉音咽翁陸機毛詩䟽義曰蜾蠃土蜂一名蒲盧似蜂而小腰故許慎云細腰也取桑蟲負之於木空中筆筒中七日而化其子里語曰呪云象我象我也禮記中庸曰哀公問政於孔子孔子對曰文武之政布在方策其人存則其政舉其人亡則其政息人道敏政地道敏樹夫政也者蒲盧也蒲盧蜾蠃土蟲也取螟蛉而化之以為子為政化百姓亦如蒲盧也故為政在人揚子法言曰螟蛉之子殪而逢蜾蠃祝曰類我久則肖之矣速哉七十子之肖仲尼也肖類也, WYG: 六}
