  - {type: variant, offset: 3052, length: 2, content: 呪云, SBCK: 今子乃以鴟梟而咲鳯皇執蝘蜓而謿􅀛龍不亦病乎蜣蜋爾雅曰蛣蜣蜣蜋也郭璞曰黑甲蟲噉糞者也張揖廣雅曰天柱蜣蜋也一作天社許愼􅀃文曰蜣蜋一曰天柱衝波傳曰蜣蜋無鼻而聞香抱朴子曰􅀇蟬㓗飢不羡蜣蜋穢飽郭義㳟廣志曰交州無蜣蜋崔豹古今注曰蜣蜋能以土包糞轉而成丸莊周所謂蛣蜣之智在於轉丸者也一名蜣蜋一名結蜣一名弄丸一名轉丸夢書曰蜣蜋爲憂財輔矣行者夢見蜣蜋憂財粮也白魚爾雅曰蟫音􅁋白魚也衣書中蟲一名蛃魚音丙張揖廣雅曰白魚蛃魚也齊書曰明帝􅀄有疾無輟聽覽羣臣莫知及疾篤勑臺省府署求白魚以爲藥外始知之夲草經曰白魚一名衣魚治婦人疝疵小便不利小兒頭中風項彊皆冝摩之生咸陽呉氏夲草經曰衣中白魚一名蟫范汪方曰治小便不利取白魚二七擣之令糜爛分爲數丸頓服之即通也螳蜋易通繫卦曰螳蜋搏蟬之蟲乗寒而殺物自隱蔽而有所害捕搏之}
