  - {type: variant, offset: 2724, length: 0, content: '', WYG: 酷吏来俊臣所作大枷凡有十號一曰定百脉二曰喘不得三曰突地吼四曰著即承五曰失魂膽六曰實同反七曰反是實八曰死猪愁九曰求即死十曰求破家又令寝處糞穢備諸苦毒自非身死終不得出山海􅀴曰貳負臣曰危與貳負煞窫窳帝乃梏之䟽屬之山桎其右足桎械也反縛兩手與髮繫之山上郭璞注曰漢宣帝使人作上郡發盤石石室得一人蹝裸被髪反縛械一足以問羣臣莫之能知劉子政案此對之帝大驚於是時人争學山海經也又曰大荒之中有宋山者有木生山上名楓木蚩尤所棄桎梏蚩尤為黄帝所得械之後擲棄其械化而為樹也魏苑曰新野庾紹之少字道遐與南陽宋協中表之親桓𤣥時庾為湘東}
