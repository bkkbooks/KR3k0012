  - {type: variant, offset: 465, length: 425, content: 君何可為計哉又曰蕭何卒召曹參參去囑其後相曰以齊獄市為寄慎勿擾也又曰周勃為丞相十餘月乃免相就國歲餘每河東守尉行縣至絳絳侯勃自畏恐誅常被甲令家人持兵以見之其後有上書告勃反下廷尉勃恐不知置辭吏稍侵辱之勃以千金與獄吏吏乃書牘背示之曰以公主為證公主者孝文女也勃子勝之尚公主故獄吏教引為證薄太后亦以勃無反事文帝朝太后以冒絮提文帝曰絳侯綰皇帝璽將兵於北軍不以此時反今居一小縣顧反耶文帝使持節赦絳侯復爵邑絳侯既出曰吾嘗將百萬軍然安知獄吏之貴也又曰鉤弋夫人得幸武帝乃生昭帝帝立時年五歲衛太子廢後上幸甘泉宮命畫工圖畫周公負成王於是左右群臣知帝欲立少子後數日帝譴責鉤弋夫人夫人脫簪珥叩頭帝曰引持去送掖庭獄夫人還顧帝曰趣行汝不得活夫人死雲陽宮時暴風揚塵百姓感傷使者持棺往葬之封識其處後帝閑居問左右曰人言何左右對曰人言且立其子何去其母乎帝曰然是非兒曹愚人所知也往古國家所以亂者由主少母壯也女主獨居驕蹇淫亂自恣莫能禁也汝不聞呂后耶故諸為武帝生子者無男女其母無不譴死豈可謂非賢聖哉, SBCK: 桎梏}
