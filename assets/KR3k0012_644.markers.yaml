  - {type: variant, offset: 2920, length: 221, content: 二日未出去城因不復歸館門外有故問扇撗地城晝夜坐臥其上判官不自安辭去晏子春秋曰景公籍重而獄多拘者蒲圄怨者蒲朝晏子諫不聽淮南子曰君不入獄為恩也論衡曰獬豸者一角之羊也性知有罪皋陶治其罪疑者令羊觸之有罪則觸無罪則不斯盍天生一角聖獸助獄為驗故皋陶禮羊跪坐事之此則神奇瑞應之類風俗通曰易噬嗑為獄獄十月之卦從犬言聲二犬亦存以守也廷者陽也陽尚生長獄者陰也陰主刑煞故獄皆在庭北順其位又曰詩云宜犴宜獄犴司空也周禮凡萬民之有罪過已離於法者桎梏以上坐諸嘉石役諸司空今, SBCK: 尺五寸太}
