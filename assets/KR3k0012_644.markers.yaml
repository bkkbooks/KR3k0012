  - {type: variant, offset: 1964, length: 14, content: 鮑昱為泚陽長縣人趙堅殺人繫獄, SBCK: 并州刺史司馬騰執諸胡於止東賣充軍實將詣兾州兩胡一枷石勒亦在中又載記曰符丕敗徐義爲慕容永所獲械堙}
  - {type: punctuation, offset: 1970, content: 。, id: KR3k0012_CHANT_644-bkkpn565}
  - {type: 'tls:seg', offset: 1970, content: '', id: KR3k0012_CHANT_644-23a.4}
