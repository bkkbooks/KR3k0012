  - {type: variant, offset: 2587, length: 248, content: 不之官所受秩奉散給寮吏民有犯罪罪者陰悉知之或竟歲不發至再三犯乃因都會時於眾中召出親案其罪五人處死徒流者甚眾合境惶懾令行禁止小民蘇息稱為神明爾後不修囹圄殆無爭訟又曰薛冑為兗州剌史及到官繫囚數百胄剖斷旬日便了囹圄空虛又曰柳儉拜蓬州剌史獄訟者庭遣不為文書約束縱容而已獄無繫囚唐書曰太宗行次靈石縣指獄而謂皇太子曰此何謂皇太子對曰此所謂圓獄將繫罪人太宗因曰文王作罰刑茲無赦而漢文帝志在輕刑但以詳平為佳非謂有罪而釋也濫繫無辜則政道缺久滯有罪則怨氣生圓土之中仰視青天有同懸鏡而鏁械虜體鬱結其中夫循諸己者可以知物, SBCK: ''}
