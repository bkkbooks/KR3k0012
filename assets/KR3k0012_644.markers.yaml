  - {type: variant, offset: 3234, length: 1305, content: 獄扶南傳曰扶南俗理訟無牢獄鞭杖唯以探湯捧鑕沒水為信先使沐浴齋戒乃令以手內湯或捧熱鑕或沒水中無罪者不爛不燋不沒罪者即驗也會稽典錄曰鍾離意為堂邑令縣民房廣為父報仇繫獄其母病死廣聞之號泣獄意為之悽惻出廣見之曰今欲出若歸家殯歛有義則還無義則已丞掾諫以為不可意曰不還之罪令自受之廣臨殯畢即自獄以狀表上詔減死一等又曰盛吉字君達山陰人司徒虞延辟西曹掾時隴西太守鄧融以贓罪徵詣廷尉前後考驗歷歲不服明帝下三府遣精能掾屬更就彈劾吉到詔獄但勑主者供湯沐飲食不去問事明日復往解融桎梏安徐以情責君若無贓強見誣枉宜具列辭當相伸理如審有罪不得誣罔國家融感吉意即移辭首服又曰黃昌為蜀郡太守密捕得盜師一人悉使䟽諸縣強盜密往捕錄其諸小盜皆原其死讁作棧道以代民役由是道不拾遺獄至連年無有重囚又曰高豐字文林為酇縣獄吏剌史虞孟行部到旬日酇縣僻勑酇長將囚徒就所在錄見林被文書閉獄下籥不肯送徒自詣諫曰明使君乘法駕騑驂銜命理冤當縣縣乃至今乃遙召囚徒欲省更煩盍普天之下莫非王土率土之濱莫非王臣酇獄非漢地乎囚徒終不出縣特望朱軒迴輪向酇孟遂到酇襄陽耆舊記諸葛亮出關中使馬謖統大眾在前為魏將張郃所破坐下獄死時年四十九臨終與亮書曰明公視謖猶子謖視明公猶父願推殛鯀興禹之義使平生之交不虧謖雖死無恨於黃泉博物志曰夏曰念室殷曰動止周曰稽留三代之異名也又狴犴者亦獄別名韓陽天文要集曰貫索貴人之牢中星實則囚多虛則開出搜神記曰漢武帝東遊未出函谷關有物當道其身數丈其狀像牛青眼而曜精四足入土動而不死百官驚懼東方朔乃請酒以灌之灌之十斛而物消帝問其故荅曰此名為患憂之物氣之所生此必秦之獄地不然則罪人徒作者之聚夫酒忘憂故能消之也帝曰吁博物之士至於此乎東方朔曰孝武皇帝時幸甘泉至長平坂上馳道中央有䖝覆而赤如生肝狀頭目口齒鼻耳盡具先軀旄頭馳還以聞曰道不可御於是上止車遣侍中馳往視之還盡莫知也時東方朔從在後屬車上召朔使馳往視之還對曰怪哉上曰何謂也朔對曰秦始皇時拘繫無罪幽殺無辜眾庶怨恨無所告訴仰天而歎曰怪哉感動皇天此憤氣之所存也故名之曰怪哉是地必秦之獄處也上有詔使丞相公孫弘案地圖果秦之獄處也上曰善當何以去之朔曰夫積憂者得酒而去之以酒置中立消靡上大笑曰東方生真所謂先生也何以報先知之聖人哉乃賜帛百疋異苑曰建康陵欣景平中死於楊州作部剋辰當葬作部督夢欣云今為獄公姥祖夕有期莫由自反勞君解謝今得放遣督不信夜後又夢言辭轉切因歌一曲云生時世上人死作獄中鬼不得還墳墓灰沒有餘罪督覺為謝神從此便絕劉義慶幽明錄曰晉廬陵太守寵企字子及上祖坐事繫獄而非其罪見螻蛄行其左右相謂曰使爾有神能活我死不當善乎因投飯與螻蛄食盡去有頃復來形體稍大意異之復與食數日其大如豚及當行刑螻蛄掘璧根為大孔道得從此出亡後遇赦得活矣齊諧記曰吳當陽縣董昭之泛舡過錢塘江江中見一蟻著一短蘆惶遽畏死使以繩繫蘆著舡舡至岸蟻得出中夜夢見一人烏衣來謝云僕是蟻中王君有急難當見先語歷十餘年江左劫盜縱撗錄昭之為劫主繫餘姚獄昭之自惟蟻王夢云緩急當告今何處告之獄囚言但取兩三蟻著掌中祝之昭之如其言暮果夢昔烏衣人云可急去入餘杭山天下既赦命不久也於是便覺蟻齧械已盡因得出獄過江投餘杭山遇赦遂得免桓子新論曰近哀平間道士臨淮董仲君坐繫獄病死數日目陷生䖝吏捐棄之便更活去, SBCK: ''}
