  - {type: variant, offset: 2518, length: 7, content: 獄中注解經史十, SBCK: 縣自以清廉不事左右浸潤日至遂鏁繫尚方歎曰一見天子足矣上召問曰復欲何陳荅臣坐清所以獲罪上曰清復何以獲罪曰無以承奉要人上曰要人爲誰㠝之以手扶四面指曰此赤衣諸賢皆是􅀂臣得更鳴必令清譽日至㠝之雖危言上亦不責後知其無罪重除丹徒令又曰禇玠除山隂令縣人張次的王休逹等與諸猾吏賄賂通姦全丁户􅀋多隱没玠鏁次的等具狀啓臺宣帝手勑慰勞并遣使助玠捜括所出軍人八百}
