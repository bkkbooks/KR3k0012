  - {type: variant, offset: 3117, length: 0, content: '', WYG: 囚者上罪梏拲而桎王之同族拲有爵者桎以待弊罪拲者兩手共入一木王同姓及命士已上雖有上罪或拲或桎而已弊猶㫁也晉令曰死罪二械加拲手趙書曰後石率精騎五千襲邵續一戰生擒續於青丘鉗頸拲手於㐮國青陽城鎻説文曰鋃鐺鏁也漢書食貨志曰王莽為貨有非詛者郡國檻車鐵鏁傳送長安鍾官又王莽傳曰民犯鑄錢伍人相坐入官為奴婢其男子檻車児女子步以鐵鏁鋃鐺其頸傳至鍾官奴以千}
  - {type: page-break, offset: 3117, content: '', id: KR3k0012_WYG_644-6a, image: WYG0898/WYG0898-0744a.png}
  - {type: variant, offset: 3118, length: 1, content: 民, WYG: 數華嶠後漢書曰崔鈞為西河太守與袁紹起兵董卓收鈞父烈下}
  - {type: variant, offset: 3120, length: 0, content: '', WYG: 郿獄鋃鐺卓誅烈得歸長安也王隐晉書曰石勒鏁苟晞頸以為司馬而反殺之南史曰丹徒縣令沈㠝之以清亷抵罪㠝之吴興武康人性踈直在縣自以清㢘不事左右浸潤日至遂鏁繋尚方歎曰一見天子足矣王召問曰復欲何陳荅曰臣坐清所以獲罪上曰清復何以獲罪曰無以承奉要人上曰要人為誰㠝之以手扶四面指曰此赤衣諸賢皆是若臣得更鳴必令清譽日至㠝之雖危言上亦不責後知其無罪重除丹徒令又曰褚玠除山隂令縣人張次的王休達等與諸猾吏賄賂通姦全丁大戸類多隠没玠鏁次的等具状啟臺宣帝手勅慰勞并遣使助玠捜括所出軍人八百餘户三國典畧曰梁湘東王以鮑泉圍湘州乆不陷使平南将軍王僧辨代為都督數泉十罪舎人羅重歡領齊仗三百人與僧辨往先令通泉曰羅舍人被令送王竟陵来泉愕然顧左右曰得王竟陵助我賊不足平俄而重懽先入僧辯繼之泉方拂席而坐僧辯曰鮑郎卿}
  - {type: page-break, offset: 3120, content: '', id: KR3k0012_WYG_644-6b, image: WYG0898/WYG0898-0744b.png}
  - {type: page-break, offset: 3120, content: '', id: KR3k0012_WYG_644-7a, image: WYG0898/WYG0898-0744c.png}
  - {type: variant, offset: 3122, length: 0, content: '', WYG: 令㫖使我鏁卿勿以故意見期羅重歡宣令即鏁之於牀側泉舉止自若謂重歡曰稽緩王師甘受其罪但恐後人更思鮑泉之憒憒耳僧辯意甚不平泉乃為啟自申拜謝淹遲之罪湘東怒觧遂釋之宋躬孝子傳曰繆斐字文雅東海蘭陵人父忽得患醫藥不給斐晝夜叩頭不寝不食氣息将盡至三更中忽有二神引鏁而至求哀曰尊府君昔經見侵故有怒報君至孝所感昨為天曺所攝鏁鋃鐺斐驚視父已差云吾病恒見二人見持向来忽不見斐乃具説父曰吾曾}
