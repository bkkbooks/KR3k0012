  - {type: variant, offset: 892, length: 283, content: 曰韓安國坐法抵獄吏田甲辱安國安國曰死灰獨復不燃乎田曰燃即溺之居無幾安國為梁內史田甲亡安國曰甲不就官我滅爾宗田甲肉袒謝安國歎曰公等足與治乎卒善遇之又曰孝宣帝初生號曰皇孫生數月遭巫蠱事收繫郡邸邴吉為廷尉監望氣者言長安獄中有天子氣上遣使者分條中都官獄繫者輕重皆煞之內謁者令郭攘夜至郡邸獄吉拒關使者不得入皇曾孫賴吉得全又曰張湯杜陵人父為長安丞出湯為兒守舍鼠盜肉父怒湯湯掘燻得鼠及餘肉劾鼠掠笞并取鼠與肉具獄磔堂下父見之文辭如老獄吏大驚遂使書獄又曰夏侯勝為議不許宣帝尊武帝廟下獄及丞相長史黃霸坐不舉劾俱下獄霸欲從勝受經勝辭以罪死霸曰朝聞道夕死可矣勝賢其言遂授之繫更再冬講論不怠又, SBCK: ''}
