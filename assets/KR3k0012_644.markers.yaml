  - {type: variant, offset: 2395, length: 1, content: 撝, SBCK: 義誦觀丗音經至夜圡開械脫出於重禁之中􅀂有人脫之者遂奔後魏書曰孝文太和􅀄時法官及州郡縣多爲重枷復以縋石懸於囚頸傷肉至骨勒以誣服吏以爲能帝聞而傷之乃制非大逆有明證而不疑辭者不得大枷又曰宋飜爲河南令縣舊有大枷時人號曰方結切尾青及飜爲縣主吏請焚之飜曰且置南墻下以待豪猾未幾有内􅁥楊小駒詣縣請事辭色不遜飜命取青尾以鎮之小駒旣免}
  - {type: page-break, offset: 2395, content: '', id: KR3k0012_SBCK_644-2b}
  - {type: variant, offset: 2397, length: 0, content: '', SBCK: 訴於宣武宣武大怒勑河南尹推之飜具自陳伏詔曰卿固違朝法豈不欲作威以買名飜對曰造具亦非臣所以留者非敢施於百姓欲待兇􅁀之徒如駒者耳由是威振京師三國典略曰東魏中尉宋遊道限外受故選狀詞渤海王怒而禁之}
  - {type: variant, offset: 2398, length: 10, content: 數宿鬚皆白免死繫尚方, SBCK: 􅁺欲爲之脫枷逰道不肯曰此王命所着不可輒脫王聞而宥之北齊書曰庫狄遷封武章郡王其子士文爲貝州刺史性􅀌直其子㗖官厨餅枷於獄累日杖之二百歩送還京}
