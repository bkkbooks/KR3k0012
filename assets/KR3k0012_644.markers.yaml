  - {type: 'tls:seg', offset: 1978, content: '', id: KR3k0012_CHANT_644-23a.5}
  - {type: variant, offset: 1979, length: 413, content: 父母詣昱自言年七十餘唯有一子適新娶今繫獄當死長無種類涕泣求哀昱憐其言令將妻入獄解止宿遂任身有子衛宏漢舊儀曰郡邸獄理天下郡國上計屬大鴻臚東市獄屬京兆尹王隱晉書曰太康五年夏六月初置黃沙獄晉書曰武帝置黃沙獄以典詔囚以高光歷世明法用為黃沙御史又曰帝至平陽為劉聰所幽辱麴允伏地號哭不能起聰大怒幽之於獄允發憤自殺聰善其忠烈贈車騎將軍節愍俟又曰喬智明為歿寇將軍隆慮共二縣令愛之號為神君部人張兌為父報仇母老單身有妻無子智明愍之停其獄歲餘令兌將妻入獄兼陰縱之人有勸兌免兌曰有君如此吾何忍累之縱吾得免作何面目視息世間於獄產一男會赦得免又曰霍原字休明燕國廣陽人也少有智力叔父坐法當死原入獄訟之捶毒備加終免叔父晉令曰獄屋皆當完固厚其草蓐家人餉饋獄卒為溫暖傳致去家遠無餉饋者悉給廩獄卒作食寒者與衣疾者給醫藥宋書曰溉撝明帝立擢為太子洗馬撝資籍豪富厚自奉養供一身一月十萬宅宇山池妓妾姿藝皆窮上品才調流贍善納交遊愛妓陳玉珠明帝遣求不與逼奪之撝頗怨帝令有司誣奏, SBCK: 足}
