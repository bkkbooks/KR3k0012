  - {type: variant, offset: 2481, length: 0, content: '', SBCK: 後周書曰栁慶爲雍州别駕廣陵王元欣魏之懿親其甥孟氏屢爲凶横或有告其盗牛慶捕推得實趣令就禁孟氏殊無懼容乃謂慶曰今􅀂加以桎梏後復何以脫之欣亦遣使辨其無罪孟氏由此益驕慶於是大集僚吏盛言孟氏依􅀝權戚侵虐之狀言畢便令笞殺之此後貴戚歛手不敢侵􅁀唐書曰酷吏來俊臣所作大枷凡有十號一曰定百脉二曰喘不得三曰突地吼四曰着即臣五曰失魂膽六曰實同反七曰反是實八曰死猪愁九曰求即死十曰求破家又令寢處糞􅁾備諸苦毒自非身死終不得出山海經曰貳􅀒之臣曰危與貳􅀒煞窫窳帝乃梏之䟽屬之山桎其右足桎械也反縛兩手與髮繫之山上郭璞注曰漢宣帝使人作上郡發盤石石室得一人徒役􅀍髮反縛械一足以問群臣莫能知劉子政案此對之帝大驚於是時人争學山海經也又曰大荒之中有宋山者有木生山上名楓木􅃖尤所弃桎梏􅃖尤黄帝所得械之煞巳擲弃其械化而爲樹也異􅁐曰新野􅁃紹之少子道遐與南陽宋恊中表之親桓玄時􅁃爲湘東太守病亡恊以義熈中晨起服茱茰酒一小兒通云􅁃湘東湏􅁷便至兩脚着械脫之而坐孟子曰盡其道而死者正命也桎梏死者非正命也吕氏春秋曰齊有善相狗者其隣畜之數年不取䑕以告相者相者曰此良狗也志在麞豕鹿不在䑕也欲其䑕則桎之其隣桎其後足則狗取䑕矣賈􅁩書曰紂作梏數千睨諸侯之不謟巳者而桎梏之文王桎梏囚于羑里七年而後得免及武王剋殷旣定令殷之民連梏而流之於河民輸梏者以手㯙之弗敢敗之跪入之水不敢投也昔者文王擁此故思愛文王猶敬其梏况其法教乎風俗通曰延嘉中京師長者皆着木􅄚婦人始嫁至作􅃮􅀞五采爲系謹案黨事始發傳詣黄門北寺臨時惶恐不能信天任命多有逃亡不就栲者九族拘繫及所過歴長少婦女皆􅀍桎梏應木􅄚之像矣又曰械戒也所以警戒使爲善也桎實也言其下垂至地然後吐情首實語林曰嵇中散夜彈琴忽有一􅀑着械來歎其手快曰君一絃不調中散與琴調之聲更清婉問姓名不對疑是蔡伯喈伯喈將亡亦􅀍桎梏拲音拱周禮秋官上曰掌囚掌守盗賊凡囚者上罪梏拲而桎王之同族拲有爵者桎以待弊罪拲者兩手共入一木王同性及命上巳上雖有上罪或拲或桎而巳弊猶断也晉令曰死罪二械加拲手趙書曰後石率精􅀐五千襲邵續一戰生禽續於青丘鉗頸拲手於襄國青陽城門頓頭稱囚鎻說文曰銀鐺鏁也漢書食貨志曰王莽爲貨有誹詛者郡國檻車䥫鏁傳}
