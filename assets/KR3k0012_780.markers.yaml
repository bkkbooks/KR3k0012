  - {type: variant, offset: 141, length: 0, content: '', SBCK: 也尼谿相參三也將軍王唊四也唊音頰相與謀使人殺朝鮮王右渠來降王儉城未下故右渠之大臣成己又反復攻吏左將軍使右渠子長降相路人子最告諭其民誅成己遂定朝鮮爲真畨臨屯樂浪玄莵四郡漢書地理志曰􅀇莵樂浪武帝時􅀄置皆朝鮮獩㹮勾驪蠻夷殷道衰箕子去之朝鮮教其民以禮義田蚕織作樂浪朝鮮民犯禁八條如淳曰有其四其四不見相殺以}
  - {type: page-break, offset: 141, content: '', id: KR3k0012_SBCK_780-5a}
  - {type: variant, offset: 141, length: 0, content: '', WYG: 尼谿相參三人也軍王唊四人也唊音頰相與謀使人殺朝鮮王右渠來降王險城未下故右渠之大臣成已又反覆攻吏左將軍使右渠子長降相路人子最告諭其民誅成已遂定朝鮮為真番臨屯樂浪𤣥莬四郡漢書地理志曰𤣥莬樂浪武帝時初置皆朝鮮獩貊勾驪蠻夷殷道衰箕子去之朝鮮教其民以禮義田蠶織作樂浪朝鮮民犯禁八條如淳曰有其四其四不見相殺以}
