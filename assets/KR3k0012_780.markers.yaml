  - {type: variant, offset: 1684, length: 463, content: 萬囊瓦奔鄭王保於隨師入郢胥行郢都親射宮臨于王冡笞其墓若此則梧可為拊也又曰明君之使人也任之以事不制之以辭王逸子曰或問張騫可謂名使者歟曰周流斷城東西數萬里其中胡貊皆知其習俗得始大䔉蒲萄首蓿等語林曰魏武將見匈奴使自以形陋不足雄遠國使崔季珪代當坐自捉刀床頭座既畢令人問魏王何如使荅曰魏王信雅望非常然床頭捉刀人此乃英雄也魏王聞馳遣殺此使天文要集曰天節星主奉使小而明則使中正也梁元帝鄭眾論曰漢世銜命匈奴困而不食者二人而己子卿手持漢節臥伏冰霜仲師固無下拜陽絕太水況復風生稽落日隱龍堆翰海飛沙皋蘭走霰豈不酸鼻痛心憶雒陽之宮陛屑泣撗悲想長安之城闕直以為臣之道義不為生事君之節生為義盡豈望拔幽泉出重仞經長樂抵未央及還望塞亭來依候火傍觀上郡側眺雲中雖在己之自隆而於時之報未重梁劉孝儀北使還與永豐侯書曰足踐寒地身犯朔風暮宿客亭晨炊謁舍飄颻辛苦迄屆氈鄉雜種覃化頗幕中國兵傳李緒之法樓擬衛律所治而毳幕難淹酪漿易厭王程有限時反玉關射鹿胡奴乃共歸國刻龍漢節還待入塞馬衘苜蓿嘶逗故墟人獲蒲萄歸種舊里稚子出迎善鄰相勞倦握蟹螯亟覆蝦椀每取朱顏略多自醉用此終日亦自娛, WYG: 八十}
