  - {type: variant, offset: 1218, length: 929, content: 里地封𨻳陵君君不受使虞且謝秦王忿然作色謂且曰亦嘗見天子之怒乎曰臣未嘗見也王曰天子之怒伏尸百萬流血千里且曰大王亦嘗見布衣韋帶之士怒乎王曰布衣韋帶之士怒則解冠徒跣以頭槍地耳何難知者且曰此乃庸夫之怒耳布衣之士怒伏尸二人流血五步即持其匕首起視秦王曰今將是矣秦王變色長跪曰先生就坐寡人諭矣又曰趙王遣使者之楚方鼓瑟而送之誡之曰必如吾言注事具瑟門又曰齊使淳于髡聘楚髡為人形皃短小楚王薄賤之曰謂之齊無人耶而使子來乎何長也髡對曰臣無所長要中七尺之劍欲斬無狀王王曰止吾但戲子耳與髡共飲酒又曰晉楚之君為好會苑丘之上宋使人臣晉楚大夫曰趣以天子禮見吾我將見子使者曰冠雖弊義居上履雖新義居下周室微諸侯未之能易也師雖昇未城臣猶不更臣之服也遂以諸侯禮見之又曰楚使者聘齊齊王享之梧宮使者曰大哉梧乎王曰江海之魚吞舟國之樹巨使者曰昔燕攻齊遵雄路渡濟橋楚雍問擊齊左而虛其右王鼎絕頭乎杜山公孫羌格死于龍門飲馬乎淄澠宣獲乎瑯琊王與太后奔乎莒逃城陽之山此時梧之大小何如矣力渤對曰使者問梧之年即昔荊州王為無道加諸申氏殺子胥父與兄子胥被髮食於吳闔廬以為相三年將兵復讎于楚戰勝舉級頭百萬囊瓦奔鄭王保於隨師入郢胥行郢都親射宮臨于王冡笞其墓若此則梧可為拊也又曰明君之使人也任之以事不制之以辭王逸子曰或問張騫可謂名使者歟曰周流斷城東西數萬里其中胡貊皆知其習俗得始大䔉蒲萄首蓿等語林曰魏武將見匈奴使自以形陋不足雄遠國使崔季珪代當坐自捉刀床頭座既畢令人問魏王何如使荅曰魏王信雅望非常然床頭捉刀人此乃英雄也魏王聞馳遣殺此使天文要集曰天節星主奉使小而明則使中正也梁元帝鄭眾論曰漢世銜命匈奴困而不食者二人而己子卿手持漢節臥伏冰霜仲師固無下拜陽絕太水況復風生稽落日隱龍堆翰海飛沙皋蘭走霰豈不酸鼻痛心憶雒陽之宮陛屑泣撗悲想長安之城闕直以為臣之道義不為生事君之節生為義盡豈望拔幽泉出重仞經長樂抵未央及還望塞亭來依候火傍觀上郡側眺雲中雖在己之自隆而於時之報未重梁劉孝儀北使還與永豐侯書曰足踐寒地身犯朔風暮宿客亭晨炊謁舍飄颻辛苦迄屆氈鄉雜種覃化頗幕中國兵傳李緒之法樓擬衛律所治而毳幕難淹酪漿易厭王程有限時反玉關射鹿胡奴乃共歸國刻龍漢節還待入塞馬衘苜蓿嘶逗故墟人獲蒲萄歸種舊里稚子出迎善鄰相勞倦握蟹螯亟覆蝦椀每取朱顏略多自醉用此終日亦自娛, SBCK: 八十}
