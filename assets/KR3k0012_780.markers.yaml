  - {type: variant, offset: 799, length: 638, content: 嗣封太子擊於中山三年不往來其傅趙倉唐諫曰父忘子子不可忘父何不遣使乎擊曰願之久矣未有所使倉唐對曰為之使則臣請使擊曰諾於是乃問君何所好與所嗜曰君嗜晨鳧好北大遂求晨鳧北大齎行倉唐至曰北藩中山之君有北大晨鳧使倉唐再拜獻之文侯曰嘻擊知吾好北大晨鳧也即見使者文侯曰擊無恙乎倉唐唯唯三問而不對文侯曰不對何也倉唐曰臣聞諸侯下名君既已賜弊邑使得小侯國不敢對也文侯曰中山君無恙乎倉唐曰今者之來拜送於郊文侯曰中山君長短若何矣倉唐曰聞諸侯比諸侯不朝則側者皆人臣也臣無所比之然則所賜之裘幾能勝之矣文侯曰中山之君亦何好乎對曰好詩文侯曰於詩何好曰好黍離與晨風文侯曰黍離詩何哉對曰彼黍離離彼稷之苗行邁靡靡中心搖搖知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉文侯曰怨乎曰非敢怨也時思也文侯曰晨風謂何對曰詩云鴆彼晨風鬱彼北林未見君子憂心欽欽如何如何忘我實多此以忘我者也於是大悅曰欲知其子視其母欲知其君視其使中山君若不賢惡能使其使賢遂廢太子訢而召中山君以為嗣說苑曰秦王以五百里地封𨻳陵君君不受使虞且謝秦王忿然作色謂且曰亦嘗見天子之怒乎曰臣未嘗見也王曰天子之怒伏尸百萬流血千里且曰大王亦嘗見布衣韋帶之士怒乎王曰布衣韋帶之士怒則解冠徒跣以頭槍地耳何難知者且曰此乃庸夫之怒耳布衣之士怒伏尸二人流血五步即持其匕首起視秦王曰今將是矣秦王變色長跪曰先生就坐寡人諭矣又曰趙王遣使者之楚方鼓瑟而送之誡之曰必如吾言注事具瑟門又曰齊使淳于髡聘楚髡為人形皃短小楚王薄賤之曰謂之齊無人耶而使子來乎何長也髡對曰臣無所長要中七尺之劍欲斬無狀, WYG: 韓}
