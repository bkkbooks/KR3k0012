  - {type: variant, offset: 142, length: 1, content: 到, krp: 時償殺相傷者以糓償相盗者男沒入爲其家奴女子爲婢欲自贖者人五十萬雖免爲民俗猶羞之嫁娶無所讎是以其民終不相盗無門户之閉婦人貞信不淫辝其田民飲食以籩豆都邑頗放效吏及内郡賈人往往以杯器食郡𥘉取吏於遼東吏見民無閉藏及賈人徃者夜則爲盗俗稍}
  - {type: variant, offset: 144, length: 5, content: 州投公舍宿, SBCK: 薄今相犯禁䆮多致六十餘條可貴哉仁賢之化也然東夷天性柔順異於三方之外故孔子悼道之不行乗桴浮於海欲居九夷有以也獩㹮魏志曰獩㹮國南與辰韓北與高勾麗沷沮接東窮大海今朝鮮之東皆其地也户二萬餘昔箕子旣適朝鮮作八條之教無門户之􅐬而民不爲盗其後四十餘丗朝鮮侯淮僣號稱王陳勝等起略叛􅁗燕齊趙民避地東入朝鮮數萬口燕人衛滿魋結夷服復來王之漢武帝伐滅朝鮮分其地爲四郡自是之後胡漢稍别無大君長自漢己來其官有侯邑君三老統主下户其􅂄舊自謂與勾麗同種其人性慤愿少嗜慾有廉耻不請勾麗言語法俗大抵與勾麗同衣服有異男女衣皆着曲領男子繫錢花廣數寸以爲飾自單單大嶺以西屬樂浪以東七縣都尉主之皆以獩爲民後省都尉封其渠帥爲侯今不耐獩皆其種也其俗同姓不婚多忌諱毎疾病死亡輒􅂢弃舊宅更作新居布麻蚕綿飲食亦有俎豆曉侯星􅀫豫知年􅀊豊約嫁娶䘮葬之法有似勾麗不以珠玉爲寳常用十月節􅀕天晝夜飲酒歌儛名爲儛天文􅀕虎以爲神其邑落相侵犯輒相罰責生口牛馬之名曰責禍殺人者償死㓂盗作矛長三丈至戰}
