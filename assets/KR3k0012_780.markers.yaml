  - {type: variant, offset: 221, length: 2, content: 周秦, SBCK: 㹮者謹案春秋傳大㹮小㹮㹮者路也薄也不知送往勞來無宗廟粢盛賦殿輕薄也三韓辰韓折弁辰附後漢書曰韓有三種一曰馬韓二曰辰韓三曰弁辰馬韓在西有五十四國其北與樂浪南與倭接辰韓在東十有二國其地與獩㹮接并韓在辰韓之南亦有十二國其有亦與倭接凢七十二國大者萬餘户小者數千家各在山海間地合方四千餘里東西以海爲限皆古之辰國也馬韓最大共立其種爲辰王都目友國盡王三韓之地其諸國王先皆是馬韓種人焉馬韓人知田蚕作綿布出大栗如梨有長尾雞尾長五尺邑落雜居亦無城郭作土室形如􅃁開户在上不知跪拜無長㓜男女之別少綱紀國邑雖有主師不能相制御其葬有棺無槨不知􅀐乗牛馬不貴金寳錦􅄢唯重纓珠以綴衣爲飾及懸頸垂耳大率皆魁頭露紒魁頭猶科頭也謂以髮縈繞成科結也紒音計布􅂁草履其人壯勇少年有築室作力者輒以繩貫脊皮縋以大木嚾呼爲徤善用弓矛櫓雖有闘爭攻戰而貴相屈服俗信􅀑神}
  - {type: page-break, offset: 221, content: '', id: KR3k0012_SBCK_780-6b}
  - {type: page-break, offset: 221, content: '', id: KR3k0012_SBCK_780-7a}
  - {type: variant, offset: 221, length: 2, content: 周秦, WYG: 貊者謹按春秋傳大貊小貊者路也薄也不知送徃勞來無宗廟粢盛賦役輕薄也三韓辰韓弁韓後漢書曰韓有三種一曰馬韓二曰辰韓三曰弁韓馬韓在西有五十四國其北與樂浪南倭接辰韓在東十有二國其北與獩貊接弁韓在辰韓之内亦有十二國其南亦與倭接凡七十九國大者萬餘户小者數千家各在山海間地合方四千餘里東西以海為限皆古之辰國也馬韓最大共立其種為辰王都月支國盡王三韓之地其諸國王先皆是馬韓種人焉馬韓人知田蠶作綿布出大栗如梨有長尾雞尾長五尺邑落雜居亦無城郭作土室形如冢開户在上不知跪拜無長㓜男女之别少綱紀國邑雖有主帥不能相制御其葬有棺無槨不知騎乘牛馬不貴金寶錦羅唯重纓珠以綴衣為飾及懸頸垂耳大率皆魁頭露紒魁頭猶科頭也謂以髪縈繞成科結也紒音計布袍草履其人壯勇少年有築室作力者輒以繩貫脊皮縋以大木懽呼為健善用弓矟矛櫓雖有鬭爭攻戰而貴相屈服俗信鬼神}
