  - {type: variant, offset: 141, length: 0, content: '', krp: 也尼谿相參三也將軍王唊四也唊音頰相與謀使人殺朝鮮王右渠來降王儉城未下故右渠之大臣成己又反復攻吏左將軍使右渠子長降相路人子最告諭其民誅成己遂定朝鮮爲真畨臨屯樂浪玄莵四郡漢書地理志曰玄莵樂浪武帝時𥘉置皆朝鮮獩㹮勾驪蠻夷殷道衰箕子去之朝鮮教其民以禮義田蚕織作樂浪朝鮮民犯禁八條如淳曰有其四其四不見相殺以}
  - {type: variant, offset: 142, length: 1, content: 到, SBCK: 時償殺相傷者以􅂖償相盗者男􅃿入爲其家奴女子爲婢欲自贖者人五十萬雖免爲民俗猶羞之嫁娶無所讎是以其民終不相盗無門户之􅐬婦人貞信不淫辝其田民飲食以籩豆都邑頗放效吏及内郡賈人往往以杯器食郡􅀄取吏於遼東吏見民無閉藏及賈人徃者夜則爲盗俗稍}
  - {type: variant, offset: 142, length: 1, content: 到, WYG: 時償殺相傷者以糓償相盜者男没入其家為奴女子為婢欲自贖者人五十萬雖免為民俗猶羞之嫁取無所讎是以其民終不相盜無門户之閉婦人貞信不淫辟其田民飲食以籩豆都邑頗放效吏及内郡賈人徃徃以杯器食郡初取吏於遼東吏見民無閉藏及賈人徃者夜則為盜俗稍}
