  - {type: variant, offset: 139, length: 0, content: '', SBCK: 左將軍詐殺之遂不渡浿水復引歸左將軍破浿水上軍廼前至城下圍其西北樓舡亦徃㑹居城南右渠遂堅城守數月未能下左將軍急擊之朝鮮大臣廼隂間使人約降樓舡徃來言尚未肯决天子使濟南太守公孫遂徃征之有便冝得以從事遂至以節召樓舡將軍入左將軍營計事即命左將軍戯下執縳樓舡將軍并其軍以報天子天子誅逐左將軍己并兩軍即急擊朝鮮朝鮮相路人韓陶尼谿相叅將軍王唊師古曰相路一人也韓陶}
