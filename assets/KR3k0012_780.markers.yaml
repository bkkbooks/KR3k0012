  - {type: variant, offset: 1, length: 0, content: '', krp: 詔師古曰責譲也音才笑切何去至界臨浿水}
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 馭刺殺送何者朝鮮禆王長長禆王名也即渡水馳入塞遂歸報天子曰殺朝鮮將上爲其名羙即不詰拜何爲遼東東}
