  front:
  - {type: variant, offset: 0, length: 0, content: '', SBCK: 太平御覽卷第七百八十四夷部一東夷叙東夷朝鮮獩㹮三韓辰韓弁辰附叙東夷尚書堯典曰分命羲仲宅嵎夷曰􅊙谷東表之地稱嵎夷暘明也日出於谷而天下明又大誥曰武主崩三監及淮夷叛三監管􅀕啇淮夷徐奄之屬皆叛周周公相成王將黜殷命作大誥又蔡仲之命曰成王東伐淮夷遂踐奄成王即政淮夷奄國又叛王親征之遂滅奄而徙之作成王政爲平淮夷徙奄之政令又費誓曰魯侯命伯禽宅曲阜徐戎並興東郊不開徐戎淮夷並起爲㓂於魯故東郊不開徂兹淮夷徐戎並興令徃征此淮浦之夷徐州之戎並起爲㓂此戎夷帝王所羇縻統叙故錯居九州之内􅁗始皇遂出之善􅂖乃甲胄敿乃干無敢不弔備乃弓矢鍜乃戈矛礪乃鋒刃無敢不善左傳僖下曰􅂎桓公來朝用夷禮故曰子􅂎先代之後而迫於東夷風俗􅄂壞言語衣服有時而夷故傳言其夷也又成公上莒子曰辟陋在夷其孰以我爲虞又襄公六曰􅂎夏餘也而即東夷行夷禮又定公下曰公㑹齊侯于􅂎其實夾谷孔丘相犂彌言於齊侯曰孔丘知禮而無勇􅀂使萊人以兵刼魯侯必得志焉菜人齊所滅菜夷也齊侯從之孔丘以公退曰士兵之以兵擊萊人兩君合好而􅒨夷之俘以兵亂之􅒨逺也非齊君所以命諸侯也􅒨不謀夏夷不亂華齊侯聞之遽辟之辟兵萊兵也毛詩云苕之華大夫閔時也幽王之時西戎東夷交侵中國師旅並起因之以饑饉君子閔周室之將亡傷己逢之故作是詩也又江漢尹吉甫美宣王也能興衰撥亂命召公平淮夷江漢浮浮武夫滔滔匪安匪遊淮夷來求論語子罕曰子欲居九夷馬曰九夷東方之夷有九種或曰陋如之何子曰君子居之何陋之有馬曰君子所居則化後漢書曰王制云東方曰夷夷者抵也言仁而好生萬物抵地而出故天性柔順易以道御至有君子不死之國焉又曰㑹稽海外有東鯷人鯷達奚切分爲二十餘國又有夷洲及澶州傳言􅁗始皇遣方士徐福將童男童女數千人入海求蓬萊神仙不得徐福畏誅不敢還遂止此洲代代相承有數萬家人􅀊時至㑹稽市會稽東冶縣人有入海行遭風流移至澶洲者所在絶逺不可來徃竹書紀年曰后芳即位三年九夷來御曰畎夷干夷方夷黄夷白夷赤夷玄夷風夷陽夷又曰后發即位元年諸夷賔于王門諸夷入舞又曰仲丁即位于藍夷白虎通曰夷者蹲也言無禮儀史系曰天􅁥五年丹陽南山得瓦物髙五尺圍四尺上鋭下平蓋如合焉中得劒一瓷具十數時人莫識沈約云此東夷罨盂也葬則用之代棺此制度􅂌小則隨當時矣東夷死則坐葬之武帝服其博識臨海水土志曰夷州在臨海東南去郡二千里土地無雪霜草木不死四靣是山衆山夷所居山頂有越王射的正白乃是石也此夷各號爲王分畫土地人民各自別異人皆髠頭穿耳女人不穿耳作室居種荆爲蕃鄣土地饒沃旣生五榖又多魚肉舅姑子婦男女卧息共一大牀交㑹之時各不相避能作細布亦作班文布刻晝其内有文章以爲飾好也其地亦岀銅鐵唯用鹿觡矛以戰闘耳磨礪青石以作矢鏃刃斧鐶貫珠璫飲食不㓗取生魚肉􅄂貯大器中以滷之歴日月乃啖食之以爲上餚呼民人爲彌麟如有所召取大空材材十餘文以着中庭又以大杵旁㫪之聞四五里如鼓民人聞之皆徃馳赴㑹飲食皆踞相對鑿牀作器如稀槽􅃺以魚肉腥臊安中十十五五共食之以粟爲酒木槽貯之用大竹筒長七寸許飲之歌似犬㘁以相娯樂得人頭斫去腦駮其面肉留置骨取犬毛染之以作􅁂眉髮編具齒以作口自臨戰闘時用之如假靣􅃺此是夷王所服戰得頭着首還於中庭建一大材髙十餘丈以所得頭差次挂之歷年不下彰示其功又卑家有女乙家有男仍委父母往就之居與作夫妻同牢而食女以嫁皆􅆙去前上一齒又曰安家之民悉依深山架立屋舎於棧格上似樓狀居處飲食衣服􅀍節與夷州民相似父母死亡殺犬􅀕之作四方凾以盛屍飲酒歌舞畢仍懸着髙山巖石之間不埋土中作塚墎也男女悉無履今安陽羅江縣民是其子孫也皆好猴頭羮以菜和中以醒酒􅄂五肉臛不及之其俗言寧自􅀒人千石之粟不願􅀒人猴頭羮臛朝鮮尚書大傳曰武王勝殷繼公子禄父禄父紂之子也釋箕子之囚箕子不忍啇之亡走之朝鮮朝鮮今樂浪郡武王聞之因以朝鮮封之箕子旣受周之封不得無臣禮故於十二祀來朝吏記曰朝鮮張晏注曰朝鮮有濕水洌水汕水合爲洌水疑樂浪朝鮮取名於此又曰朝鮮王滿燕人也自始燕時嘗略屬眞畨朝鮮爲置吏築鄣塞􅁗滅燕屬遼東外徼漢興爲逺難守復脩遼東故塞至浿水爲界屬燕燕王盧綰反入匈奴滿亡命聚黨千餘人魋結蠻夷服而東走出塞渡浿水居􅁗故空地上下鄣稍役屬眞畨朝鮮蠻夷及故燕齊亡命者王之都王險王險地名㑹孝惠髙后時天下􅀄定遼東太守即約滿爲外臣保塞外蠻夷母使侵盗邊以聞上許之以故滿得以兵威財物侵降其旁小邑眞畨臨屯皆來服屬方數千里傳子至孫右渠所誘漢亡人滋多又未嘗入見眞畨旁衆國欲上書見天子又雍閼弗通元封二年漢使渉何譙諭右渠終不肯}
