  - {type: variant, offset: 328, length: 119, content: 聞之賜人主者瓜桃不削橘柚不剖臣故不敢剖臣非不知又曰晏子使楚楚人為小門而延晏子晏子不入曰使狗國者從狗門入今臣使楚不當狗門入也王曰齊無人耶對曰齊之臨淄三萬戶張袂成帷揮汗成雨何為無人齊以賢者使賢主不肖者使不肖主嬰不肖是故使王耳又曰晏子聘楚楚王知, SBCK: 智次有儉側次有樊祗次有殺奚次有邑偕皆}
