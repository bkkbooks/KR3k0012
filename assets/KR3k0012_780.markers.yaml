  - {type: variant, offset: 225, length: 1, content: 歲, SBCK: 五月竟􅀕􅀑神晝夜酒食群聚歌舞輒數十人相随踏地爲節十月農功畢亦如之諸國邑各以一人主􅀕天神號爲天君又立蘇塗蘇塗者似浮塗建大木以懸鈴故事􅀑神其南界近倭亦有文身者魏志曰馬韓漢桓靈之末韓獩強盛郡縣不能制民多㳘入韓國建安中公孫康分屯右縣以南荒地爲帶方郡遣公孫模張敞等収集遺人興兵伐韓獩舊人稍出是後倭韓遂屬帶方魏景􅀄中明帝遣帶方太守劉昕樂浪太守鮮干嗣越海定二郡諸韓國臣智加賜邑君印綬其次與邑長其俗好衣幘下户詣郡朝謁皆假衣幘自服印綬部從事呉林以樂浪夲統韓國分割辰韓}
  - {type: variant, offset: 225, length: 1, content: 歲, WYG: 五月競祭鬼神晝夜酒食羣聚歌舞輒數十人相隨踏路為節十月農功畢亦如之諸國邑各以一人主祭天神號為天君又立蘇塗建大木以懸鈴鼔事鬼神其南界近倭亦有文身者魏志曰馬韓漢桓靈之末韓濊强盛郡縣不能制民多流入韓國建安中公孫康分屯右縣以南荒地為帶方郡遣公孫模張敞等收集遺人興兵伐韓濊舊人稍出是後倭韓遂屬帶方魏景初中明帝遣帶方太守劉昕樂浪太守鮮于嗣越海定二郡諸韓國臣智加賜邑君印綬其次與邑長其俗好衣幘下户詣郡朝謁皆假衣幘自服印綬部從事吳林以樂浪本統韓國分割辰韓}
