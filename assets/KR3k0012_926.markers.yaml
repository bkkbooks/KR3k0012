  - {type: variant, offset: 713, length: 1, content: 玄, SBCK: 武德􅀄萬年縣法曹孫伏伽上表以三事諌其一曰陛下貴爲天子冨有四海凡曰蒐狩湏順四時陛下二十日龍飛二十一日有献鷂鶵者此乃前朝之弊風少年之事務何忽今日行之又曰太子承乾與漢王元昌相託附承乾賜以琵琶名馬元昌報以鷂子山鷄又曰太}
  - {type: page-break, offset: 713, content: '', id: KR3k0012_SBCK_926-8a}
  - {type: variant, offset: 713, length: 1, content: 玄, krp: 武德𥘉萬年縣法曹孫伏伽上表以三事諌其一曰陛下貴爲天子冨有四海凡曰蒐狩湏順四時陛下二十日龍飛二十一日有献鷂鶵者此乃前朝之弊風少年之事務何忽今日行之又曰太子承乾與漢王元昌相託附承乾賜以琵琶名馬元昌報以鷂子山鷄又曰太}
  - {type: variant, offset: 715, length: 2, content: 嘗遣, SBCK: 得鷂絶俊異私自臂之望見鄭公魏徴乃藏於懷公知之遂前白事因語古帝王逸䂊微以諷諌語乆帝惜鷂且死而素嚴敬徴欲盡其言徴語不時盡鷂死懷}
