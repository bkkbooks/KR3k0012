  - {type: variant, offset: 866, length: 176, content: 玄服國其人食鷗南越志曰江鷗一名海鷗在漲海中隨潮上下常以三月風至乃還洲嶼生卵似鷄卵色青頗知風雲若群飛至岸必風漁人及度海者皆以此為候列子曰海上之人有好鷗鳥者每旦之海上從鷗鳥遊鷗鳥之至者百數而不止其父曰吾聞鷗鳥皆從汝遊取來吾翫之明日之海上鷗鳥舞而不下也晉咸和起居注曰二年正月饗萬國有五鷗集太極殿前晉中與徵祥說曰鷗集太極殿殿非鷗所處湖澤鳥也時蘇峻作逆宮室被焚唐, SBCK: 鵰漢}
