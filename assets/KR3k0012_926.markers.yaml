  - {type: variant, offset: 1044, length: 10, content: 崔湜既私附太平公主時, krp: 李廣爲上郡守匈奴入上郡武帝使中貴}
  - {type: page-break, offset: 1049, content: '', id: KR3k0012_WYG_926-18b, image: WYG0901/WYG0901-0248b.png}
  - {type: variant, offset: 1051, length: 617, content: 公主時人咸為之懼門客陳振鷺獻海鷗賦以諷之湜雖稱善而心實不悅鷺詩曰坎其擊鼓宛丘之下無冬無夏值其鷺羽鷺鳥之羽可以翳舞者所持以指麾又曰振鷺二王之後來助祭也振鷺于飛于彼西雝我客戾止亦有斯容又曰振振鷺鷺于下鼓咽咽醉言舞于胥樂兮毛詩義䟽曰鷺水鳥好白而潔故謂之白鳥齊魯之間謂之春鋤遼東樂浪吳楊人皆云白鷺大小如鷂青腳高尺七八寸解指尾如鷹尾啄長三寸頂上有毛十數枚長尺餘毿毿然眾毛異甚好將欲取魚時弭之今吳乂亦養之好群飛行楚成王時有朱鷺合沓飛舞則復有赤色舊鼓吹曲有朱鷺是也爾雅曰鷺舂鋤郭璞注曰白鷺也頭翅皆上皆有長翰毛江東以取為接離名之月白鷺穆天子傳曰天子作詩三章以哀民曰有皎者鵅鵅鳥名音路鶣鶣其飛幽明錄曰巴東有一道士忘其姓名事道精進入屋燒香忽有風雨至家人見一白鷺從屋中飛出雨住遂失道士所在古金樂錄曰吳王夫差時有雙鷺飛出鼓中而去南史曰張融年弱冠同郡道士陸修靖以白鷺羽扇遺之曰此異物奉異人䳭鴒詩曰䳭鴒在原兄弟急難毛詩義䟽曰䳭鴒水鳥一名渠梁大如鷃雀腳長尾尖背上青灰色腹下白頸下黑如連錢故桂陽謂之連錢爾雅曰䳭鴒雝渠郭璞注曰雀屬也飛則鳥行則搖鷁左傳曰正月戊申六鷁退飛過宋都風也莊子曰夫白鷁之相視眸子不運而風化列子曰河澤之鳥視而孕曰鶂錄異傳曰弘公者吳興烏程人患瘧經年弘後獨至旁舍瘧發有數小兒或騎公腹或扶公首腳公因佯眠忽起捉得一兒遂化成黃鷁餘者皆走公乃縛以還家暮懸窗上云明日當殺食之比曉失鷁處公瘧遂斷于時人有得瘧者但依弘便瘧斷晉書曰武帝謀伐吳詔王濬修舟艦濬乃作大舩連舫方, WYG: 御覽卷九}
