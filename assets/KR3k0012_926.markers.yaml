  - {type: variant, offset: 101, length: 8, content: 嘉辰貴姊懋膺洪冊, WYG: 成蒼雖曰排虛性殊衆鳥雌則體大雄則形小遇犬則驚猜得人則馴擾養雛則少病野羅則多巧察之為易調之實難格必高逈屋必華寛薑以取熱酒以排寒韝須温煖肉不陳乾近之令狎静之使安晝不離手夜便火宿㣲加其毛少减其肉肌羸腸痩心和性熟念絶雲霄志在馳逐鶻北齊書曰}
