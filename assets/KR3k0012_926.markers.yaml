  - {type: variant, offset: 1671, length: 922, content: 步受二千餘人以木為城起樓櫓開四出門其上皆得馳馬來往又畫鷁首怪獸於舩首以懼江神博物志曰白鷁雄雌相視則孕或曰雄鳴上風雌鳴下風則亦孕劉禎魯都賦曰綠鷁蔥鸊鷉爾雅曰虪須羸似鳧而小膏中螢刀揚雄方言曰野鳧甚小而好沒水中者南楚之外謂之鸊鵜大者謂之鶻鵜纂文曰鵒施石撽開零皆野鴨沒食曰鵅長頸曰施多白曰開零在山澗曰石撽白𪇰爾雅曰鵅烏𪇰郭璞注曰水鳥也似鶂而短頸後翅紫白色皆上綠色江東呼為鳥𪇰音駁卞敬宗𪇰賦曰烏真野之性備於俯仰之間專視緩步有自卑之志鴇詩曰鴇羽剌時也晉昭公之後大亂五世君子下從征役不得養父母也肅肅鴇羽集于苞栩肅肅鴇行集于苞桑肅肅鴇翼集于苞棘禮曰鷄肝鴈腎鴇奧鹿胃鄭玄云奧脾鶢鶋爾雅曰鶢鶋雜縣郭璞注曰漢文帝時琅琊有大鳥如馬駒時人謂之爰居廣志曰馬鳥鶢鶋莊子曰海鳥止於魯郊魯侯觴之於廟奏九韶以為樂具太牢以為膳鳥胘視憂悲不敢食一臠不敢飲一杯三日而死此以人養鳥也不如以鳥養鳥司馬彪曰即鶢鶋也國語曰海鳥曰委居止於魯東門之外三日爰居雜縣東門城門臧文仲使國人祭之文仲不知以為神展禽曰越哉臧孫之為政也越足也言其迂闊不知政要也夫祀國之大節也節制而節政之所成也言節所以成政故慎制祀以為國典今無故而加典非政之宜也夫聖王之制祀也功施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能扞大患則祀之非是族也不在祀典今海鳥至己不知而祀之以為國典難以為仁且智矣夫仁者講功而智者處物無功而祀之非仁也不知而不問非智也今茲海其有災乎夫廣川之鳥獸恒知而避其災也是歲也海多大風鵜鶘爾雅曰鵜鶘鴮鸅郭璞注曰今之鵜鶘也好群飛入水食魚故名夸睪俗呼為陶河毛詩䟽曰唯鵜在梁許慎曰鵜鶘也一名汗澤一名陶河水鳥身形似鴆而極大啄長尺餘直而廣目中赤𪁟下故大如數斗囊若有小水魚便抑水滿其湖而棄之令水竭盡魚在陸地乃共食之故曰陶河魏志曰五月有鵜鶘集靈芝池詔曰此詩人所謂污澤也曹詩㓨恭公遠君子而近小人今豈有賢智之士處于下位乎否則斯鳥胡為而至其博舉天下雋德茂材獨行君子以荅曹人之㓨山海經曰憲斯之山沙水出焉其中多鵜鶘如鴛鴦而人足其鳴自叫見國有土功莊子曰魚不畏網而畏鵜鶘網者公平無私鵜鶘有心故魚畏之明主行賞罰如網淮南子曰鵜鶘飲水數升而不足鸕鶿爾雅曰鶿鷧郭璞注曰即鸕鶿也觜角曲如鉤食魚異物志曰鸕鶿不生卵而孕鶵於池澤間又吐生多者八九少者五, SBCK: ''}
