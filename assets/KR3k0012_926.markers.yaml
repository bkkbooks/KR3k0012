  - {type: variant, offset: 1322, length: 2, content: 哀民, SBCK: 􅀐從有􅀟鵰飛於上太宗命左右射之莫能中鵰旋飛稍髙幹自請射之以二箭而下􅀟鵰太宗嘉之賜御弓矢金帶以旌其能軍中於是号幹爲落鵰都尉北齊書}
  - {type: variant, offset: 1322, length: 2, content: 哀民, krp: 騎從有雙鵰飛於上太宗命左右射之莫能中鵰旋飛稍髙幹自請射之以二箭而下雙鵰太宗嘉之賜御弓矢金帶以旌其能軍中於是号幹爲落鵰都尉北齊書}
