  - {type: variant, offset: 4, length: 5, content: 二鴛鴦歸藏, WYG: 三鷹鶻鸇隼鷂鵰鷲鶚白鷢鷹春秋運斗樞曰瑶光星散為鷹禮記月令曰驚蟄之日鷹化為鳩又曰七月鳩化為鷹然後設蔚羅左傳文公十八年季文子使太史克對宣公曰先大夫臧文公敎行父事君之禮行父奉以周旋弗敢失墜曰見無禮於其君者誅之如鷹鸇之逐鳥雀也又昭公四郯子曰少皡鳥師而鳥名爽鳩氏司寇者也杜預曰爽鳩鷹鸇鳥也故為司冦主盗賊也又襄公四曰子産始知然明問為政焉對曰視民如子見不仁者誅之如鷹鸇之逐鳥雀毛詩曰唯師尚父時唯鷹揚如鷹之飛揚也箋云鷹鷙鳥也爾雅曰鷹鶆鳩郭璞注曰鶆當為鷞字之誤也左傳作鷞鳩是也善擊官于代郡捕之又曰鷹隼醜其飛也翬鼔翅翬翬然疾春秋考異郵曰金伐木故鷹擊雉易通卦驗曰鷹者鷙殺之鳥周書曰驚蟄之日鷹變為鳩小暑之日鷹乃學習處暑之日鷹乃祭鳥大戴禮曰正月鷹則為鳩鷹也者其殺之時也鳩也者非其殺之時也善變而之仁故具言之也鳩為鷹而之不仁故不盡其辭史記曰李斯臨刑思牽黄犬臂蒼鷹出上蔡東門不可得矣漢書曰鷹隼未擊矰弋不得施於蹊隧又酷吏傳曰郅都為濟陽太守時人號為蒼鷹又曰孫寶為京兆尹請故吏侯文為掾立秋日文謂寳曰今鷹隼始擊當順天氣成嚴霜之誅後漢書曰崔駰與竇憲牋曰今日漢陽太守率吏卒數十人皆臂鷹牽狗云欲上幕府夫鷹犬所獲不過雉兎斯乃細人之事東觀漢記曰和熹皇后臨朝上林鷹犬悉斥放之又曰趙卿字孟卿太守桓虞署都郵新野令日責還印綬去虞歎曰善吏如使良鷹下韝即中馬融與謝伯世書曰憤憤愁思猶不解懐思在竹間放狗逐麋晩秋渉冬大蒼出籠黄棘下菟芼以乾葵以送餘日兹樂而已魏志曰吕布因陳登求徐州牧不得布怒登喻之曰登見曹公言待将軍譬如養虎當飽其肉否則噬人公曰譬如養鷹饑則為用飽則揚出布乃解晉書曰虞潭字思奥㑹沈充等逼京師潭起義軍至上虞有野鷹飛集屋梁衆懼潭曰起大義而剛鷙之鳥來破賊必矣後如其言又曰崔洪清厲骨鯁為尚書左丞時人為之語曰叢生荆棘來自博陵在南為鷂在北為鷹又戴記曰慕容垂請至鄴拜墓符堅許之權翼諫曰垂猶鷹也飢則附人飽便颺去遇風塵之㑹必有凌霄之志唯宜急其羈絆不可任其所欲堅不從南史曰王僧達性好鷹犬何尚之致仕復膺朝命於宅設八闗齋大集朝士自行香次至僧達曰願郎且放鷹犬勿復遊獵又曰齊鬱林王即位未踰旬多聚飛鷹犬以粱肉擁之陳書曰侯安都率水軍於中流斷齊軍糧運又襲秦郡破徐嗣徽柵收其家口得嗣徽所弹琵琶及所養鷹遣信餉之曰昨至弟住處得此今以相還嗣徽等大懼北史曰後魏華山郡王澄弟嵩孝父時位步兵校尉大司馬安定王休薨未及卒哭嵩便遊田帝聞大怒曰嵩大司馬薨殂一月爾便以鷹鷂自娱猶父之痛子之情損心棄禮何其太速便可免官又曰北齊廣陵王孝珩有技藝嘗於㕔事壁自畫一蒼鷹見者皆以為真三國典略曰元坦為冀州刺史不卹人事專為聚斂性好畋漁無日不出秋冬獵禽獸春夏捕水族鷹犬常數百頭器網十餘車自云寧三日不食不能一日不獵唐書曰太宗初傳位舊苑中有籠鷹悉斷聮任去良犬並解絏放之又曰太宗謂世臣曰李大亮可謂忠直矣朕遣使至其所見有佳鷹諷令獻朕大亮因宻表責朕云陛下久絶畋獵而使者求鷹若是陛下之意深乖昔㫖如其自便是任使非人朕覽表殊嘉歎不能自己有臣若是朕復何憂於是賜之金壺以章忠讜又曰乾源曜為京兆尹仍京師留守乾曜政存寛簡不嚴而理嘗有仗内白鷹因縱逸遂失所在上令京兆切捕之俄于野外獲之其鷹掛于叢棘而死官吏懼得罪相顧失色乾曜徐曰事有邂逅死亦常理主上仁明當不以此寘罪必其獲戾吾自當之不須懼也遂入自請失㫖之罪不問又曰憲宗時每嵗冬以鷹犬出近畿習狩謂之外按宣徽院供奉官為其使領徒數百恃恩恣横郡邑懼擾皆厚禮迎犒之恣其所便止舍私邸百姓畏之如冦賊戰國策曰唐睢謂秦王曰要離刺慶忌蒼鷹擊於殿上廣志}
