  - {type: variant, offset: 387, length: 3, content: 羅列自, krp: 命還之唐杜甫義鶻行曰隂崖二蒼鷹養子黒栢顚白蛇登其巢吞噬恣朝飡雄飛逺永食雌者鳴辛酸力強不可制黄口寕半存其父從西來翻身入長煙斯湏領徤鶻憤懣寄所宣斗上捩孤影無聲來九天脩鱗脫逺枝巨顙拆老拳髙空得蹭蹬短草辝蜿蜒折尾能一擺飽膓今巳穿生雖滅衆鶵死亦垂千年物情有報復快意貴目前兹實鷙鳥㝡急難心烱然功}
