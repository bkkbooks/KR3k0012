  - {type: variant, offset: 1325, length: 0, content: '', SBCK: 斛律光甞從丗宗於洹橋校獵見一大鳥雲表飛颺光引弓射之正中其頸此鳥形如車輪旋轉而下至地乃大鵰也世宗取而觀之深壯異焉丞相属邢子髙見而歎曰此射鵰手也當時傳号落鵰都督隋書曰長孫晟周宣帝時突厥攝圖請婚于周以趙王招女妻之然周與攝圖各相誇競妙選驍勇以充使者因遣晟副汝南公宇文神慶送千金公主于其牙前後使數十輩攝圖多不禮見晟而獨愛焉毎共遊獵留之竟歳甞}
  - {type: page-break, offset: 1325, content: '', id: KR3k0012_SBCK_926-10a}
  - {type: variant, offset: 1325, length: 0, content: '', krp: 斛律光甞從丗宗於洹橋校獵見一大鳥雲表飛颺光引弓射之正中其頸此鳥形如車輪旋轉而下至地乃大鵰也世宗取而觀之深壯異焉丞相属邢子髙見而歎曰此射鵰手也當時傳号落鵰都督隋書曰長孫晟周宣帝時突厥攝圖請婚于周以趙王招女妻之然周與攝圖各相誇競妙選驍勇以充使者因遣晟副汝南公宇文神慶送千金公主于其牙前後使數十輩攝圖多不禮見晟而獨愛焉毎共遊獵留之竟歳甞}
  - {type: variant, offset: 1326, length: 4, content: 皎者鵅鵅, SBCK: 二鵰飛而争􅁏因以兩箭與晟曰請射取之晟乃彎弓馳徃遇鵰相攫遂一發而雙貫焉攝圖喜命諸子弟貴人皆親友兾昵近之以學彈射鷲漢書曰匈奴有計入漢地直張掖郡直當也生竒材箭竿鷲羽師古曰大鵰也黃頭赤目其羽可用爲箭西域諸國記曰􅂄闍崛山在王舎城北四里山有兩崖鷲}
