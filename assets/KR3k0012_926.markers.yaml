  - {type: variant, offset: 154, length: 432, content: 宣對曰後宮當有暴死者上曰吾詐卿耳宣曰夫夢意也茍以形言便占吉凶言未卒黃門令奏宮人相殺干寶搜神記曰大夫韓憑其妻美宋康王奪之憑怨王囚之憑遂自殺妻乃陰腐其衣王與之登臺自投臺下左右投衣衣不勝手遺書於帶曰願以屍還韓氏而合葬王怒令埋之二塚相對經宿忽有梓木生二塚之上根交於下枝連其上有鳥如鴛鴦雌雄各一恒栖其樹朝暮悲鳴音聲感人古今注曰鴛鴦水鳥鳧類雌雄未嘗相離人得其一則一者相思死故謂之疋鳥楚詞曰鴛鴦兮噰噰古詩曰客從遠方來遺我一端綺文彩雙鴛鴦裁為合歡被又曰入門時左顧但見雙鴛鴦鴛鴦七十二羅列自成行鄭氏婚禮謁文贊曰鴛鴦雌雄相類飛止相疋鸂鶒臨海異物志曰鸂鶒水鳥毛有五彩色食短菰其在溪中無毒氣劇談錄曰河南府尹闕前臨大溪每僚佐有入臺者則水中沙有小灘漲出石礫金光澄澈可愛牛僧孺為縣尉一旦忽報灘出翌日宰邑與同僚列筵於亭上觀之因召老宿備詢其事有老吏云此必分司御史非西臺之命若是西臺灘上當有鸂鶒雙立前後居人以此為則僧孺潛揣縣僚無出己者因舉柸曰既能有灘何惜一雙鸂鶒宴未終俄有鸂鶒飛下不旬日拜西臺御史鵁鶄, SBCK: ''}
