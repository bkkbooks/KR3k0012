  - {type: variant, offset: 79, length: 1, content: 趙, krp: 茂陵少年李亭好馳駿狗逐獸或以鷹鷂逐兎皆以爲佳名狗則有修毫釐睷白望青曹之名鷹則有青翅草眸青冥金距之屬鷂則有從風鷂孤}
  - {type: variant, offset: 81, length: 1, content: 鷰, WYG: 鷂論衡曰孔子畏陽虎却行流汗陽虎未必色白孔子未必面青鷹擊雀鶚啄鴈未必鷹鶚南方雀鴈西方自以筋力勇壮相勝服也秦子曰虎能雄猛不可以託麋鷹能飄擊不可以寄雛物理論曰使武士宰民如使狼牧羊使鷹養雛也焦贑易林曰鷹棲茂樹候雀往來益部耆舊傳曰馮顥}
