  - {type: variant, offset: 130, length: 127, content: 文帝問占夢周宣曰吾夢殿屋兩瓦墮化為雙鴛鴦此何為也宣對曰後宮當有暴死者上曰吾詐卿耳宣曰夫夢意也茍以形言便占吉凶言未卒黃門令奏宮人相殺干寶搜神記曰大夫韓憑其妻美宋康王奪之憑怨王囚之憑遂自殺妻乃陰腐其衣王與之登臺自投臺下左右投衣衣不勝手遺書於帶曰願以屍還韓氏而, WYG: 元和四年藹徳曷里祿沒弭施}
