  - {type: variant, offset: 604, length: 2, content: 家畜, SBCK: 生所與分亦在顧眄間􅂓爲義鶻行永激壯士肝鸇爾雅日晨風鸇也郭璞注曰鵭屬孟子曰爲䕺驅雀者鸇也爲湯武驅民者桀與紂也隼毛詩曰織文鳥章白斾央央箋云鳥章隼}
  - {type: variant, offset: 604, length: 2, content: 家畜, krp: 謂}
  - {type: punctuation, offset: 607, content: ，, id: KR3k0012_CHANT_926-bkkpn210}
  - {type: 'tls:seg', offset: 607, content: '', id: KR3k0012_CHANT_926-5a.11}
  - {type: variant, offset: 607, length: 0, content: '', SBCK: 文章將帥之服又曰鴆彼飛隼其飛戾天亦集爰止隼急疾之鳥詩義䟽曰鷂也齊人謂之擊正或謂之題肩或曰雀鷹春化爲布榖此属數種皆爲隼周易曰公用射隼于髙墉之上春秋考異郵曰隂陽氣貪故題肩擊宗均注曰題肩有爪芒爲陽中隂故擊殺也國語曰仲尼在陳有隼集于陳侯之庭而死楛矢貫之石弩其長尺有咫陳惠公使}
  - {type: page-break, offset: 607, content: '', id: KR3k0012_SBCK_926-7a}
  - {type: variant, offset: 607, length: 0, content: '', krp: 擊正或謂之題肩或曰雀鷹春化爲布榖此属數種皆爲隼周易曰公用射隼于髙墉之上春秋考異郵曰隂陽氣貪故題肩擊宗均注曰題肩有爪芒爲陽中隂故擊殺也國語曰仲尼在陳有隼集于陳侯之庭而死楛矢貫之石弩其長尺有咫陳惠公使}
  - {type: variant, offset: 608, length: 8, content: 厭火災鳴音鶂肩反, SBCK: 隼如仲尼之館問之仲尼曰隼之來也逺矣此肅愼氏之矢也昔武王克啇通道于九夷八蛮使各以其方賄來貢使無忘職業於是肅愼氏貢楛矢石弩其長尺有咫先王欲昭其令德之致逺也故銘其括曰肅愼氏之貢矢以分大􅁎配虞胡公而封諸陳古者分同姓以宝玉展親也分異姓以逺方之職貢使無忘服也故分陳以肅愼氏之貢君􅀂使有司求諸故府其可得也使求得之金櫝鷂}
