  - {type: variant, offset: 687, length: 362, content: 也婦見之此獨居也婿見之恐失妻也雄雌俱行淫佚遊也唐書曰玄宗嘗遣中官往江南採捕鵁鶄及諸水禽汴州刺史倪若水上䟽諫曰方今九扈時忙三農作苦田夫擁耒蠶婦持桑而以此時採捕奇禽異鳥供園池之翫遠自江嶺達於京師水備舟舫陸倦擔負飯之以魚肉間之以稻梁道路觀者莫不以陛下賤人而貴鳥也陛下當以鳳凰為凡鳥麒麟為凡獸即鵁鶄鸂鶒曷足為貴也鷗倉頡解詁曰鷖鷗也生藕葉上名水鴞說文曰鷗水鴞也山海經曰玄服國其人食鷗南越志曰江鷗一名海鷗在漲海中隨潮上下常以三月風至乃還洲嶼生卵似鷄卵色青頗知風雲若群飛至岸必風漁人及度海者皆以此為候列子曰海上之人有好鷗鳥者每旦之海上從鷗鳥遊鷗鳥之至者百數而不止其父曰吾聞鷗鳥皆從汝遊取來吾翫之明日之海上鷗鳥舞而不下也晉咸和起居注曰二年正月饗萬國有五鷗集太極殿前晉中與徵祥說曰鷗集太極殿殿非鷗所處湖澤鳥也時蘇峻作逆宮室被焚唐書曰崔湜既私附, WYG: ''}
