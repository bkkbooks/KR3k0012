  - {type: variant, offset: 2594, length: 1449, content: 相連而出若系緒水鳥而巢高樹上或在石窟之間隋書曰俀國草木冬青土地膏腴水多陸少以小環挂鸕鶿項令入水捕魚得百餘頭以充食唐書曰貞元十三年四月上以自春已來時雨未降正陽之月可行雩祀遂幸興慶宮龍堂兆庶祈禱忽有白鸕鶿沉浮水際群類翼從其後左右侍衛者咸驚異之俄然莫知所往方悟龍神之變化遂相率蹈舞稱慶至乙丑果大雨遠近滂沱於是宰臣等上表陳賀范汪治咽方曰咽鸕鶿啄即愈治鯁燒鸕鶿羽水服半錢即下若呼鸕鶿鸕鶿亦有下者婟澤爾雅曰紡澤虞孫炎注曰尸鴆或謂紡澤虞其別名郭璞注曰今澤也常在澤中見人輒鳴不去有象主守之官因名之也鸛雀說文曰鸛雀也詩曰我來自東零雨其濛鸛鳴于垤婦歎于室毛詩義䟽曰鸛一名負釜一名背竈一名皂君泥其巢一旁為池含水滿之取魚置池中食其鶵若殺其子則一村致災旱華嶠後漢書曰楊震字伯起年五十始應州郡之辟眾人謂之晚暮後有鸛雀衘三鱣魚飛集講堂前都講取魚進曰虵魚者卿大夫之服象也數三者法三台也先生自此升矣淮南萬畢術曰天雄鸛胎日行千里取鸛鳥胎於月中暴一日一夜增天雄一月用三十天雄而井治為丸大如梧子欲行吞一丸得騰虵膽和大良去天雄乃膳獨即行千里桓譚新語曰昔有鸛郡國皆殺之而三輔俗不敢取取或雷霹靂起原天不獨在彼而在此其殺取時正與雷偶耳抱朴子曰以鸛血塗金丹一丸內衣中以指物隨口變化神農本草曰鸛骨味甘無毒治鬼蟲諸㾏五尸心腹疾博物志曰鸛水鳥也伏卵時數入水卵冷則不孕取礐石周圍繞卵以助暖氣故方術家以鸛巢中暖礜石為真物列仙傳曰木羽者鉅鹿人母貧賤主助產產探婦婦兒生開目大笑母大怖暮夢見大冠赤幘者守兒言此即司命君當報汝恩使汝子木羽得仙母陰識之生兒字木羽所探兒至年十五夜有車馬來迎之過呼木羽為我御車遂俱去又二十餘年鸛雀旦以二尺魚著戶上母匿不道而賣其魚四十餘年母乃終鶖詩曰有鶖在梁說文曰鶖禿鶖也環氏吳紀曰嗣主問中書令張尚鳥之中大者唯鶴小者雀乎尚曰大者有禿鶖小者鷦鷯嗣主忌勝己因徙尚楚辭曰鵾鴻群晨雜鶖鶬鵾鵾鷄也鴻吉也鶖禿鶖後魏書曰正光二年八月獲禿鶖於宮內詔以示崔光崔光表曰蒙示十四日所得大鳥此即詩所謂有鶖在梁解云禿鶖也貪惡之鳥野澤所育不應入於殿庭昔魏氏黃初中有鵜鶘集于靈芝池文帝下詔以曹恭公遠君子近小人博求賢俊太尉華歆由此遜位而讓管寧也臣聞野物入舍古為不善是以張珔惡鶽賈誼忌鵩鵜鶘蹔集而去前王猶為至誡況今親入宮禁為人所獲方被畜養宴然不以為懼准諸往義信有殊矣且號饕餮之禽必資魚肉菽麥稻梁時或飡啄一食之費容過斤溢今春夏陽旱穀糴稍貴窮窘之家時有菜色陛下為民父母撫之如傷豈可棄人養鳥留意於醜形惡聲哉衛侯好鶴曹伯愛鴈身死國滅可為寒心陛下學通春秋親覽前事何得口詠其行未遵誠願遠師殷宗近法魏祖修德延賢消災集慶放無用之物棄之川澤取樂琴書頤養神性肅宗覽表大悅即棄之池澤南史曰齊晉安王子勛即偽位於尋陽其夕有禿鶖鳥集城上唐書曰會昌曰元年六月有禿鶖鳥集于禁苑鶬爾雅曰鶬縻鴰郭璞注曰今呼鶬鴰音箭括一音利也莊子曰大鶬飽食仰天而噓列子曰蒲且子之弋連雙鶬於青雲之際楚辭曰酸鵠臇鳥臇小臛也煎鴻鶬江賦曰奇鶬九頭精衛山海經曰炎帝之女名媱游于東海溺而不反是為精衛常取西山之木石以堙東海述異記曰昔炎帝女溺死東海中化為精衛其鳴自呼每衘西山木石以填東海怨溺死故也海畔俗說精衛無雄耦海燕而生生雌狀如精衛生雄狀如海鷰今東海畔精衛誓水處猶存溺於此川誓不飲其水一名誓鳥一名宛禽又名志鳥俗呼為帝女雀博物志曰有鳥如烏文首白喙赤足名曰精衛昔赤帝之女名女媱往遊于東海溺死而不反其神化為精衛故精衛常取西山之木石以填東海左思衛都賦曰𦐊𦐊音祗精衛衘木償怨左思吳都賦曰精衛衘石而遇繳文鰩夜飛而觸綸水扎鳥南夷志曰水扎鳥出昆明池冬月遍於水際, SBCK: ''}
