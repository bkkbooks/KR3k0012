  - {type: variant, offset: 387, length: 3, content: 羅列自, WYG: 命還之唐杜甫義鶻行曰隂崖有蒼鷹養子黒柏顛白虵登其巢吞噬恣朝餐雄飛逺求食雌者鳴辛酸力强不可制黄口無半存其父從西來翻身入長烟斯須領徤鶻痛憤寄所宣斗上捩孤影噭哮來九天修鱗脫逺枝巨顙折老拳高空得蹭蹬短草辭蜿蜒折尾能一折飽腸皆已穿生雖滅衆雛死亦垂千年物情有報復快意貴目前兹實鷙鳥最急難心炯然功}
