  - {type: variant, offset: 392, length: 194, content: 鄭氏婚禮謁文贊曰鴛鴦雌雄相類飛止相疋鸂鶒臨海異物志曰鸂鶒水鳥毛有五彩色食短菰其在溪中無毒氣劇談錄曰河南府尹闕前臨大溪每僚佐有入臺者則水中沙有小灘漲出石礫金光澄澈可愛牛僧孺為縣尉一旦忽報灘出翌日宰邑與同僚列筵於亭上觀之因召老宿備詢其事有老吏云此必分司御史非西臺之命若是西臺灘上當有鸂鶒雙立前後居人以此為則僧孺潛揣縣僚無出己者因舉柸曰既能有灘何惜一雙鸂鶒宴未終俄有鸂鶒飛下不旬日拜西臺御史鵁鶄, WYG: 永激壮士肝鸇}
