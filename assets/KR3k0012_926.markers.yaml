  - {type: variant, offset: 741, length: 0, content: '', SBCK: 誰獲罪無忌者􅁘一鷂獨低頭不敢仰視乃取殺之盡放其餘名聲布流天下歸焉論衡曰儒書稱魏公子}
  - {type: variant, offset: 741, length: 0, content: '', krp: 誰獲罪無忌者耶一鷂獨低頭不敢仰視乃取殺之盡放其餘名聲布流天下歸焉論衡曰儒書稱魏公子}
  - {type: variant, offset: 742, length: 0, content: '', SBCK: 欲與客飲有鸇擊鳩鳩逃公子案下鸇追殺之於公子之前公子使人設罔捕鸇得數十責殺鳩之罪擊鳩之鸇俯頭不敢仰視公子乃殺之此虚言也鸇有千數擊鳩飛去安可復得或是捕鸇者折其頸也夢書曰鷹鷂爲攻剽殘心也夢見鷹鷂憂賊人也魏陳王曹植鷂雀賦曰鷂欲取雀雀自言雀微賤身躰柴小肌􅁏痟痩所得盖少君欲相噉實不足飽鷂得雀言􅀄不敢語頃來轗軻資糧乏旅三日不食略思死䑕}
