  - {type: variant, offset: 596, length: 3, content: 鳧腳高, SBCK: 愁胡曲觜短頸足若􅀟枯隋魏彦深鷹賦曰惟兹禽之化育實鍾山之所生資金方之猛氣擅火德之炎精何虞者之多端運横羅以羈東綴輕􅁝於􅀟臉結長皮於两足飛不遂於本情食不充於所欲逸翰由其暫歛雄心爲之自􅈰􅀂乃貌非一體相乃多途指重十字尾貴合盧立如植木望似愁胡觜同劒利脚等荆枯亦有白如散花赤如􅀧血大文􅀂錦細班似纈眼􅀋明珠}
  - {type: page-break, offset: 596, content: '', id: KR3k0012_SBCK_926-5b}
  - {type: variant, offset: 596, length: 20, content: 鳧腳高毛冠江東人家畜之以厭火災鳴音鶂肩反, WYG: 鷹尾上白也廣雅曰白鷢鷹也}
  - {type: punctuation, offset: 597, content: ，, id: KR3k0012_CHANT_926-bkkpn207}
  - {type: 'tls:seg', offset: 597, content: '', id: KR3k0012_CHANT_926-5a.8}
  - {type: punctuation, offset: 599, content: ，, id: KR3k0012_CHANT_926-bkkpn208}
  - {type: 'tls:seg', offset: 599, content: '', id: KR3k0012_CHANT_926-5a.9}
  - {type: variant, offset: 600, length: 0, content: '', SBCK: 猶霜雪身重􅀂金爪剛如鐵或復頂平似削頭圎如􅆑臆闊頸長筋麁脛短翅厚羽勁髀寛􅁏緩求之事用俱爲絶伴或似鶉頭或似鵄首赤精黄足細骨小肘􅂴而易驚姦而難誘住不可呼飛不及走􅀂斯之軰不如勿有若夫疾食速消此則有命兎頸猴立是爲無病厠門忌大結肚惡軟條不欲絶背不宜喘生於窟者則好眠巢於木者則常立􅀟骹長者則起遟六翮短者則飛急毛衣屢改厥色無常寅生酉就緫號爲黄二周作鴘千日成蒼雖日排虚性殊衆鳥雌則體大雄則形小遇大則驚猜得人則馴擾養鶵則少病野羅則多巧察之爲易調之實難格必髙逈屋必華寛薑以取熱酒以排寒韝湏温煖􅁏不陳乾近之令狎靜之使安晝不離手夜便火􅀫微加其毛少減其􅁏肌肥骨瘦心和性熟念絶雲霄志在馳逐鶻北齊書曰上洛王思宗弟思好少以􅀐射事文襄及文宣受命爲左衞將軍本名思孝天保五年討賊文宣恱其驍勇謂曰爾擊賊如鶻入鵶羣宜思好事故改名焉隋書曰劉昶子居士爲太子千牛備身聚徒任俠不遵法度公卿子弟有力雄徤者􅂺將至家以車輪括其頸而捧之殆死能不屈者稱爲壯士釋而與交黨與三百人其趫捷者号爲餓鶻隊唐書曰元和四年藹徳􅂚里禄設弭施合􅁡里迦可汗遣使請改廻紇爲廻鶻義取廻旋輕犍如鶻又曰元和八年淄青節度使李師道進鶻十二命還之唐杜甫義鶻行曰隂崖二蒼鷹養子黒栢顚白蛇登其巢吞噬恣朝飡雄飛逺永食雌者鳴辛酸力強不可制黄口寕半存其父從西來翻身入長煙斯湏領徤鶻憤懣􅀉所宣斗上捩孤影無聲來九天脩鱗脫逺枝巨顙拆老拳髙空得蹭蹬短草辝蜿蜒折尾能一擺飽膓今巳穿生雖滅衆鶵死亦垂千年物情有報復快意貴目前兹實鷙鳥㝡急難心烱然功成失所徃用捨何其賢近經潏水湄此事樵夫傳飄蕭斍素髮凛欲衝儒}
  - {type: page-break, offset: 600, content: '', id: KR3k0012_SBCK_926-6a}
  - {type: page-break, offset: 600, content: '', id: KR3k0012_SBCK_926-6b}
  - {type: variant, offset: 600, length: 3, content: 冠江東, krp: 詩曰織文鳥章白斾央央箋云鳥章隼之文章將帥之服又曰鴆彼飛隼其飛戾天亦集爰止隼急疾之鳥詩義䟽曰鷂也齊}
  - {type: punctuation, offset: 601, content: 。, id: KR3k0012_CHANT_926-bkkpn209}
