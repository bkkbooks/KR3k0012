  - {type: variant, offset: 26, length: 127, content: 思古明王交於萬物有道自奉養有節焉鴛鴦于飛畢之羅之君子萬年福祿宜之鴛鴦在梁戢其左翼君子萬年宜其遐福西京雜記曰趙飛鷰為皇后其女弟昭儀在昭陽殿遺飛鷰書曰今日嘉辰貴姊懋膺洪冊上檖三十五條以陳踴躍內有鴛鴦襦鴛鴦被魏志曰文帝問占夢周宣曰吾夢殿屋兩瓦墮化為雙鴛鴦此何為, SBCK: 箋云鷹鷙鳥}
