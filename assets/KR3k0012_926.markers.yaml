  - {type: variant, offset: 110, length: 1, content: 檖, WYG: 洛王思宗弟思好少以騎射事文襄及文宣受命為左衛将軍改名思孝天保五年討賊文宣恱其驍勇謂曰爾擊賊如鶻入鵶羣宜思孝事故改名焉隋書曰劉昶字居士為太子千牛備身聚徒任俠不遵法度公卿子弟有力雄徤者轍将至家以車輪括其頸而奉之殆死能不屈者稱為壮士釋而與交黨與}
  - {type: variant, offset: 110, length: 1, content: 檖, krp: 洛王思宗弟思好少以騎射事文襄及文宣受命爲左衞將軍本名思孝天保五年討賊文宣恱其驍勇謂曰爾擊賊如鶻入鵶羣宜思好事故改名焉隋書曰劉昶子居士爲太子千牛備身聚徒任俠不遵法度公卿子弟有力雄徤者輒將至家以車輪括其頸而捧之殆死能不屈者稱爲壯士釋而與交黨與}
