  - {type: variant, offset: 99, length: 1, content: 今, WYG: 商風振條秦鷹秋吟斯可謂聲協鍾石氣應風律孫楚鷹賦曰郭延考與余遊後從者韝二鷹以侍側郭邉人也好弋獵顧盻心欲自娱樂請余為賦曰其為相也踈尾闊臆高鬐頽顱深目蛾眉状似愁胡曲嘴短頸足若雙枯麾則應机招則易呼背碣石以西遊經馬嶺而南徂隋魏彦深鷹賦曰惟兹禽之化育實鍾山之所生資金方之猛氣擅火德之炎精何虞人之多端運横羅以羇束加青􅁝於雙臉結長皮於兩足飛不遂於本情食不充於所欲逸翰由其暫斂雄心為之自局若乃貌非一體相乃多途指重十字尾貴合盧立如植木望似愁胡嘴同劒利脚等荆枯亦有白如散花赤如㸃血大文若錦細班似纈眼類明珠毛猶霜雪身重若金爪鋼如鐵或復頂平似削頭圎如卵臆濶頸長筋麤脛短翅厚羽勁髀寛肉緩求之事用俱為絶伴或似鶉頭或似鵄首赤睛黄足細骨小肘懶而易驚姦而難誘住不可呼飛不及走若斯之軰不如勿有若夫疾食速消此則有命兎頸猴立是為無病厠門忌大結肚惡軟絛不欲絶背不宜喘生於窟者則好伏巢於木者則常立雙骹長者則起遲六翮短者則飛急毛衣屢改厥色無常寅生酉就總號為黄二周作鴇千}
