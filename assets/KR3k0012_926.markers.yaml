  - {type: variant, offset: 1317, length: 4, content: 作詩三章, SBCK: 曰周宣王之牧正有役人梁鴦者能養野禽獸委食於園庭之内雖虎狼鵰鶚之􅀋無不柔者雌雄在前孳尾成羣異􅀋雜居不相􅅮噬後魏書曰􅁗王幹機悟壯勇善弓馬太宗出遊白登之東北幹}
  - {type: variant, offset: 1317, length: 4, content: 作詩三章, krp: 曰周宣王之牧正有役人梁鴦者能養野禽獸委食於園庭之内雖虎狼鵰鶚之類無不柔者雌雄在前孳尾成羣異類雜居不相搏噬後魏書曰秦王幹機悟壯勇善弓馬太宗出遊白登之東北幹}
