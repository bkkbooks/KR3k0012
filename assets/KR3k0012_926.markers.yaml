  - {type: variant, offset: 595, length: 0, content: '', SBCK: 鶆當爲鷞字之誤也左傳作鷞鳩是也善擊官於代郡捕之又曰鷹隼醜其飛也翬鼓趐翬翬然疾春秋考異郵曰金伐木故鷹擊雉易通卦驗曰鷹者鷙殺之鳥周書曰驚蟄之日鷹變爲鳩小暑之日鷹乃學習處暑之日鷹乃􅀕鳥大戴禮日正月鷹則爲鳩鷹也者非其殺之時也鳩也者非其殺之時也善變而知仁故具言之也鳩爲鷹而不仁故不盡其辭史記曰李斯臨刑思牽黄犬臂蒼鷹出上蔡東門不可得矣漢書曰鷹隼未撃矰弋不得施於蹊隧又酷吏傳曰郅都爲濟陽太守時人號爲蒼鷹又曰孫寳爲京兆尹請故吏侯文爲椽立秋日文謂寳曰今鷹隼始擊當順天氣成嚴霜之誅後漢書曰崔駰與竇憲牋曰今日漢陽太守率吏卒數十人皆臂鷹牽狗云欲上幕府夫鷹犬所􅀗不過雉兎斯乃細人之事東觀漢記曰和熹皇后臨朝上林鷹犬悉斥賣之又曰趙勤字孟卿太守桓虞署督郵新野令自責還印綬去虞歎曰善吏如使良鷹下韝即中馬融與伯丗書曰憒憒愁思猶不解懷思在竹間放狗逐麋晚秋渉冬大蒼出籠黄􅁄下莵芼以乾蔡以送餘日兹樂而巳魏志曰吕布因陳登求徐州牧不得布怒登喻之曰登見曹公言待將軍譬如養虎當飽其􅁏不則噬人公曰不如養鷹飢則爲用飽則揚去布乃解晉書曰虞潭字思奥㑹沈充等逼京師潭起義軍至上虞有野鷹飛集屋梁衆懼潭曰起大義而剛鷙之鳥來破賊必矣後如其言又曰崔洪清厲骨鯁爲尚書左丞時人爲之語曰叢生荆棘來自􅀶陵在南爲鷂在北爲鷹又載記曰慕容垂請至鄴拜墓符堅許之權翼諌曰垂猶鷹也飢則附人飽便髙颺遇風塵之㑹必有凌霄之志唯宜急其羈靽不可任其所欲堅不從南史曰王僧逹性好鷹犬何尚之致仕復膺朝命於宅設八􅀜齊大集朝士自行香次至僧逹曰願即且放鷹犬勿復遊獵又曰齊鬱林王即位未踰旬多聚飛鷹快犬以梁肉俸之陳書曰侯安都率水軍於中流斷齊軍糧運又襲􅁗郡破徐嗣徽柵收其家口得嗣徽所彈琵琶及所養鷹遣信餉之曰昨至弟住處得此今以相還嗣徽等見之大懼北史曰後魏華山郡王澄弟嵩孝文時位歩兵校尉大司馬安定王休薨未及卒哭嵩便遊田帝聞大怒曰嵩大司馬薨殂一月爾便以鷹鷂自娱有叔父之痛無猶子之情損心棄禮何其太速便可免官又曰齊廣寧王孫孝珩好綴文有技藝甞於㕔事壁自􅀞一蒼鷹見者皆以爲眞三國典略曰元坦爲冀州刺史不恤人事專爲聚歛性好畋漁無日不岀秋冬獵禽獸春夏捕水族鷹犬常數百頭器網十餘車自云寧三日不食不能一日不獵唐書曰太宗􅀄傳位舊苑中有籠鷹悉斷聮任去良大並解絏放之又曰太宗謂侍臣曰李大亮可謂忠直矣朕遣使至其所見有佳鷹諷令獻朕大亮因宻表責朕云陛下乆絶田獵而使者求鷹􅀂是陛下之意深乖昔旨如其自擅便是任使非人朕覽表嘉歎不能自巳有臣􅀂是朕復何憂於是賜之金壷以彰忠讜又曰源乾曜爲京兆尹仍京師留守乾曜政存寛簡不嚴而理甞有仗内白鷹因縱逸遂失所在上令京兆切捕之俄於野外獲之其鷹掛於叢􅁄而死官吏懼得罪相頋失色乾曜徐曰事有邂逅死亦常理主上仁明當不以此寘罪必其􅀗戾吾自當之不湏懼也遂入自請失旨之罪上不問又曰憲宗時每歳冬以鷹犬出近畿習狩謂之外按宣徽院供奉官爲其使領徒數百恃恩恣横郡邑懼擾皆厚礼迎犒之恣其所便止舎私邸百姓畏之如㓂盗戰國䇿曰唐睢謂􅁗王曰要離刺慶忌蒼鷹擊於殿上廣志曰有雉鷹有莵鷹一歳爲黄二歳爲撫三歳爲青胡鷹􅀗麞出廬江幽明録曰楚文王少時好獵有人獻一鷹文王見之􅀲距神爽殊絶常鷹故爲獵於雲夢置網雲布烟燒張天毛羣羽族争噬競􅅮此鷹軒頸瞪目逺視雲際無搏噬之志王曰吾鷹所􅀗以百數汝鷹曽無􅁬意將欺余耶獻者曰􅀂効於雉兎臣豈敢獻俄而雲際有一物凝翔鮮白不辯其形鷹便竦翮而􅂛矗􅀂飛電湏􅁷羽墮如雪血下如􅀨有大鳥墮地度其兩翅數十里衆莫能識時有􅀶物君子曰此大鵬鶵也文王乃厚賞之西京􅄂記曰茂陵少年李亭好馳駿狗逐獸或以鷹鷂逐兎皆以爲佳名狗則有修毫􅁵睷白望青曹之名鷹則有青翅草眸青􅁳金距之屬鷂則有從風鷂􅀌飛鷂論衡曰孔子畏陽虎却行流汙陽虎未必色白孔子未必面青鷹擊雀鶚啄鴈未必鷹鶚南方雀鴈西方自以䈥力勇壯相勝服也􅁗子曰虎能雄猛不可以託麑鷹能飄擊不可以􅀉鶵物理論曰使武士宰民如使狼牧羊使鷹養鶵也焦贑易林曰鷹棲茂樹候雀徃來益部􅂄舊傳曰廣漢馮顥爲謁者逐單于至雲中大將軍梁冀遣人求鷹止晉陽舎人不避顥顥収之使人擊鷹而亡也顥追捕甚急冀辭乃止古樂府曰豹則虎之弟鷹則鷂之兄魏文帝荅繁欽書曰啇風振條􅁗鷹秋吟斯可謂聲恊鍾石氣應風律孫楚鷹賦曰郭延考與余辞其後從者韝二鷹以侍側郭邊人也好弋獵顧眄心欲自娱樂請余爲賦曰其爲相也踈尾闊臆髙鬐圎顱深自娥眉狀}
