  - {type: variant, offset: 719, length: 4, content: 往江南採, SBCK: 恃貴寵放鷂不避人禾稼德幹擒而杖之二十悉拔其鷂頭宦者涕泣􅃝背以示於帝帝曰爾情知此漢獰何湏犯他百姓竟不之問又曰貞元十四年九月中書門下奏賀嵯峨山獲白鷂莊子曰鷂爲鸇鸇爲布谷布谷復爲鷂此物変也列士傳曰魏公子無忌方食有鳩飛入案下公子使人頋望見一鷂在屋上飛去公子乃縱鳩令出鷂逐而殺之公子暮爲不食曰鳩避患歸無忌竟爲鷂所得吾􅀒之爲吾}
