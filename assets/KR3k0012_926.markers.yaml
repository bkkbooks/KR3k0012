  - {type: variant, offset: 743, length: 29, content: 九扈時忙三農作苦田夫擁耒蠶婦持桑而以此時採捕奇禽異鳥供園池, SBCK: 日相得寕復置汝雀得鷂言意甚怔營性命至重雀䑕貪生君得一食我命隕傾皇天是鍳賢者是聽鷂得雀言意甚泹惋當死􅁦雀頭如果蒜不早首服烈頸大喚行人聞}
