  - {type: variant, offset: 589, length: 2, content: 鵁鶄, WYG: 晨風鸇也郭樸注曰鷂屬孟子曰為叢敺爵者鸇也為湯武敺民者桀與紂也隼毛詩曰織文鳥章白斾央央箋云鳥章隼之文章将帥之服又曰鴥彼飛隼其飛戾天亦集爰止隼急疾之鳥詩義疏曰鷂也齊人謂之擊征或謂之題肩或曰雀鷹春化為布榖此属數種皆為隼周易曰公用射隼于高墉之上春秋考異郵曰隂陽氣貪故題肩擊國語曰仲尼在陳有隼集於陳侯之庭而死楛矢貫之石弩其長尺有咫陳惠公使以隼如仲尼之舘仲尼曰隼其來也逺矣此肅慎氏之矢也昔武王克商通道于九夷八蠻使各以其方賄來貢使無妄職業於是肅慎氏貢楛矢石弩其長尺有咫先王欲昭其令徳之致逺也故名其括曰肅慎氏之貢矢以分太妃配虞公思而封諸陳古者分同姓以寳玉展親也分異姓以逺方之職貢使無忘服也故分陳以肅慎氏貢矢若使有司求諸故府其可得也求得之金櫝鷂說文曰鷂鷙也爾雅曰鷣負雀郭璞注曰鷣鷂也江東呼為􅀈善捉雀因名云廣雅曰顙肩鷸子籠脱鷂也廣志曰鷸子大如胡燕色似燕鷂食雀籠脱擊鳩鵲晉書曰王育京兆人也太守杜宣命為主簿俄而宣左遷萬人令杜令王攸詣宣宣不迎之攸怒曰卿往為二千石吾所敬也今吾儕耳何故不迎欲以雀遇我使畏死鷂乎唐書曰武徳初萬年縣法曹孫伏上表以三事諌其一曰陛下貴為天子富有四海凡曰蒐狩須順四時陛下二十日龍飛二十一日有獻鷂雛者此乃前朝之夙弊少年之事務何忽今日行之又曰太子承乾與漢王元昌相附託承乾賜以琵琶名馬元昌報以鷂子山雞又曰太宗得鷂絶􅖡異私自臂之望見鄭公魏徴乃藏於懐公知之遂前白事因語帝王逸豫㣲以諷諌語久帝惜鷂且死而素嚴敬徴欲盡其言徴語不時盡鷂死懐中又曰楊徳幹高宗朝為萬年令有宦官恃貴寵放鷂不避人禾稼徳幹擒而杖之二十悉捩其鷂頭宦者涕泣袒背以示于帝帝曰爾情知此漢獰何須犯他百姓竟不加問又曰貞元十四年九月中書門下奏賀嵯峨山獲白鷂荘子曰鷂為鸇鸇為布榖布榖復為鷂此物變也列女傳曰魏公子無忌方食有鳩飛入案下公子使人顧望見一鷂在屋上飛去公子乃縱鳩令出鷂逐而殺之公子暮為不食曰鳩避患歸無忌竟為鷂所得吾負之為吾捕得此鷂者無忌無所愛于是左右宣公子慈聲旁國左右捕得鷂三百餘頭以奉公子欲盡殺恐無辜乃自按劍至其籠上曰誰獲罪無忌者邪一鷂獨低頭不敢仰視乃取殺之盡放其餘名聲布流天下歸焉論衡曰儒書稱魏公子方欲賔客飲有鸇擊鳩鳩迯公子案下鸇追殺之於公子之前公子使人設網捕鸇得數千責殺鳩之罪擊鳩之鸇俯頭不敢仰視公子乃殺之此虛言也鸇有千數擊鳩飛去安可復得或是捕鸇者折其頸也夢書曰鷹鷂為攻剽殘心夢鷹鷂憂賊人也魏陳王曹植鷂雀賦曰鷂欲取雀雀自言雀微賤身體些小肌肉􅇤痩所得盖少君欲相噉實不足飽鷂得雀言初不敢語頃來轗軻資糧乏旅三日不食略思死鼠今日相得寧復舍汝雀得鷂言意甚怔營性命至重雀鼠貪生君得一食我命是傾皇天降鑒賢者是聴鷂得雀言意甚怛惋當死敝雀頭如果蒜不早首服捩頸大喚行人聞之莫不往觀雀得鷂言意甚不移目如擘椒跳蕭二翅我當死矣略無可避鷂乃置雀良久方去二雀相逢似是公嫗相将入草共上一樹仍敘本末苦辛相語向者兒出為鷂所捕賴我翻㨗體素便附說我便語千條萬句欺恐舍長令兒大怖我之得免復勝于自今徙意莫復相妬鵰毛詩國風四月曰匪鶉匪鳶翰飛戾天毛詩曰鶉鵰也鵰鳶貪殘之鳥也說文曰鷲黄頭赤目五色皆備一曰鵰漢書曰李廣為上郡守匃奴入上郡武帝使中貴人從廣匈奴射中貴人廣曰是必射鵰者也廣射殺二人生得一人果射鵰者也穆天子傳曰春山爰有青鵰執犬羊食豕鹿列子曰周宣王之牧正有役人梁鴦者能養野禽獸委食于園庭之内雖虎狼鵰鶚之類無不柔者雌雄在前孳尾成羣異類雜居不相搏噬後魏書曰秦王幹機養壮勇善弓馬太宗出逰白登之東北幹以騎從有雙鵰飛于上太宗命左右射之莫能中鵰旋飛少高幹自請射之以二箭而下雙鵰太宗嘉之賜御弓矢金𢃄以旌其能軍中於是號幹為落鵰都尉北齊書曰斛律光嘗從世宗於洹橋校獵見一太鳥雲表飛颺光引弓射之正中其頸此鳥形如車輪旋轉而下至地乃大鵰也世宗取而觀之深驚異焉丞相属邢子高見而歎曰此射鵰手也當時傳號落鵰都督隋書曰長孫晟周宣帝時突厥攝圗請婚於周以趙王招女妻之然周與攝圗各相誇競每選驍勇以充使者因遣副汝南公家各人慶送千金公主於其牙前後數十軰攝圗多不禮見晟而獨愛焉每共遊獵留之竟嵗嘗有二鵰飛而争肉因以兩箭與晟曰請射取之晟乃彎弓馳往遇鵰相攫遂一發而雙貫焉攝圖喜令諸子弟貴人皆親昵之以學彈射鷲漢書曰匈奴有謀入漢地直張掖郡直當也生竒材箭竿鷲羽師古曰大鵰也黄頭赤目其羽可用為箭西域諸國記曰耆崛山在王舍城北四里山有兩崖鷲鳥常居其巔土人號為靈鷲山也佛國記曰山頭有雙鷲上有王使鑿石攻之如兩翼兩翮脚今見存林邑國記曰西南逺界有靈鷲能知吉凶覘人将死食屍肉盡乃去家人取骨燒為灰投之漲海鶚毛詩曰闗雎后妃之徳風之始也所以風化天下而正夫婦焉闗闗雎鳩在河之洲一名黄雎一名鵰鷞江東呼為鶚似鷙而有别倉頡解詁曰鶚金啄鳥也見則天下兵能擊殺麞鹿漢書曰鄒陽諌漢王曰臣聞鷙鳥累百不如一鶚孟康曰鶚大鵬白鷢爾雅曰揚白鷢}
