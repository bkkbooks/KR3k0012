  - {type: variant, offset: 81, length: 6, content: 鷰為皇后其女, krp: 鷂論衡曰孔子畏陽虎却行流汙陽虎未必色白孔子未必面青鷹擊雀鶚啄鴈未必鷹鶚南方雀鴈西方自以䈥力勇壯相勝服也秦子曰虎能雄猛不可以託麑鷹能飄擊不可以寄鶵物理論曰使武士宰民如使狼牧羊使鷹養鶵也焦贑易林曰鷹棲茂樹候雀徃來益部耆舊傳曰廣漢馮顥爲謁者逐單于至雲中大將軍梁冀遣人求鷹止晉陽舎人不避顥顥収之使人擊鷹而亡也顥追捕甚急冀辭乃止古樂府曰豹則虎之}
