  - {type: variant, offset: 1003, length: 1, content: 政, WYG: 王三字甚明又曰永徽二年藍田縣令田仁獻瑞石文理成字曰天安永得立祥瑞圖曰張掖之柳谷有石始見於建安成形於黄初文備於太和建安黄初太和皆年號其石狀象龜嶷然盤峙廣一丈六尺長一丈七尺周圍五丈餘蒼質麟鳯龍馬炳煥成形文字燦然斯蓋大晉受終聖徳兼該之應也魏氏春秋曰明帝時青龍三年張掖刪丹縣金山𤣥川溢湧寳石負圖狀象靈龜立於川西有石馬七其一仙人騎之其一羇絆其五有形而不善成有玉匣闗葢於前上有玉字玉玦二璜一又有麒麟在東鳯凰在南白虎在西有犧牛在北馬自中布列南方有字曰大討曹金但取之此司馬氏革運之徴瑞應圖曰碧石玉者玩弄之物不用則出禮稽命徴曰王者得禮之制則澤谷之中乃生白石又曰王者君臣父子夫妻}
