  - {type: variant, offset: 958, length: 1, content: 喜, SBCK: 敬讓禮容之節威儀之羙則秬鬯生又曰王者節敬依禮度親踈有别則秬鬯生又曰黄帝時南夷乗白鹿來獻秬鬯孝經援神契曰王者德至於地則秬鬯生福草孫氏瑞應圖曰王者宗廟至敬則福草生於廟一云禮草禮斗威儀曰君乗木而王其政􅂛平則福草生廟中宋均曰廟中生草蓋福草也即朱草之别名可以染􅀕服故應仁孝而生廟中福并孫氏瑞圖曰福并瑞草生王者有德則福并生威蕤孫氏瑞應圖曰王者禮備則威蕤生一日威蕤又曰王者愛人倫則威蕤生於殿前屈軼孫氏瑞應圖曰屈軼者太平之代生於庭有佞人則草指之延嘉孫氏瑞應圖曰延嘉王者有德則見又曰王孝道行則延嘉生孝經援神契曰天子至徳屬于四海則延嘉生紫逹孫氏瑞應圖曰紫逹者王者仁義行則常見}
