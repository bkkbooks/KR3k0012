  - {type: variant, offset: 2864, length: 4, content: 則景雲出, SBCK: 獻芝草東觀漢記曰桓帝時芝草生中黄藏府宋書曰順帝時臨城縣生紫芝齊書曰武帝時襄陽獲紫芝隋書曰開皇十九年朱雀等十六門生芝草唐書曰貞觀十七年安禮門御榻産靈芝五莖又皇太子寢室中産素芝十四莖悉爲龍鳯之狀又曰貞觀十七年滁州言所部川源徧生芝草百寮及雍州父老上表固請封禪唐春秋曰貞觀十九年雍州李樹生芝英赤蓋紫光色鮮麗司徒長孫無忌與官方岳上表請禪不許}
