  - {type: variant, offset: 965, length: 1, content: 乘, WYG: 乗水而王其政和平則江海著其神象神不與俱者象而已青黄赤白𤣥水具冇此色焉春秋運斗樞曰揺光則海出明珠洛謝承後漢書曰沛國陳宣字子建光武十年洛水出造􅀈城門或欲築塞之宣諫曰昔王尊正身金隄水退况聖主耶言未絶而水去尚書中候曰堯沉璧於洛赤色起又曰武王沉璧青雲浮洛易乾鑿度曰帝徳之盛應於洛水先温九日乃寒五日變爲五色𤣥黄水陳書曰髙祖至南康破蔡路養李遷仕贛石舊有二十四灘多巨石行旅者以爲難髙祖之發也水暴起數丈三百里間巨石皆沒唐書曰武徳元年七月新豐鸚鵡谷水清世𫝊此水清天下平禮斗威儀曰君乗}
