  - {type: variant, offset: 4444, length: 305, content: 黃帝攝政蚩尤兄弟八十一人並獸身人語銅頭鐵額食沙石造兵杖威震天下誅殺無道不仁不慈黃帝行天下事仰天而歎天遣玄女下授黃帝兵信神符而令制伏蚩尤蚩尤歸臣因使鎮兵以制八方尚書中候曰堯使禹治水禹辭天地重功帝欽擇人帝曰出爾命圖爾乃天言天使汝洽水非我禹臨河觀有白面長人魚身出曰吾河精也表曰文命治淫水表安也言曰文治治淫決之水臣河圖去入淵河圖謂括地象漢書曰武帝太始四年三月幸不其如淳曰其音基不其山名因以為縣祠神人于交門宮應劭曰神人蓬萊仙人之屬也晉灼曰琅邪縣有交門漢武帝所造若有嚮坐拜者作交門之歌山海經曰有人首蛇身長如轅左右有首衣紫衣冠名曰延維人主得而食之伯天下即於虵也瑞應圖曰黃帝時西王母使乘白鹿來獻白環一本云帝舜時西王母遣使獻玉環, SBCK: 平兩}
