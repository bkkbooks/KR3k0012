  - {type: variant, offset: 2871, length: 0, content: '', SBCK: 寳七載三月大同殿柱礎産玉芝兩莖又曰肅宗上元二年甲辰延英殿御座梁上玉芝生一莖三花御製靈芝詩以示羣下又曰上元二年九月壬午朔皇后奏含暉院生金芝大同起居注曰九年金芝二十八莖生于殿庭少府卿蕭介以聞古今注曰漢武時甘泉殿房内産芝九莖連業作芝房之歌白虎通曰王者徳至於山則芝實茂孫整長歷曰黃帝以五芝爲房名瑞令記曰食芝延年不終與真人同論衡曰建􅀄三年零陵泉陵縣女}
  - {type: page-break, offset: 2871, content: '', id: KR3k0012_SBCK_873-11b}
  - {type: variant, offset: 2871, length: 0, content: '', krp: 寳七載三月大同殿柱礎産玉芝兩莖又曰肅宗上元二年甲辰延英殿御座梁上玉芝生一莖三花御製靈芝詩以示羣下又曰上元二年九月壬午朔皇后奏含暉院生金芝大同起居注曰九年金芝二十八莖生于殿庭少府卿蕭介以聞古今注曰漢武時甘泉殿房内産芝九莖連業作芝房之歌白虎通曰王者徳至於山則芝實茂孫整長歷曰黃帝以五芝爲房名瑞令記曰食芝延年不終與真人同論衡曰建𥘉三年零陵泉陵縣女}
  - {type: variant, offset: 2872, length: 0, content: '', SBCK: 􅀶寧宅内生芝草五本莖葉紫色太守沈鄷遣門下􅁺奉獻皇帝恱懌又曰芝草一年三華食之令人眉壽慶丗蓋仙人之所食又曰紫芝者其栽如豆繆襲神芝讃曰青龍元年神芝産于長平之習陽許昌典農中郎蔣充奉表以聞其色丹紫其質光耀上别爲三幹分爲九枝散爲三十六莖委綏連屬有似􅃢瑚之狀考圖按譜蓋羙乎前代矣蘭禮斗威儀曰君乗金而王其政和平則蘭常生宋均日蘭生主給和調也茅史記曰齊桓公欲封禪管仲曰古之封禪鄗上之􅁰北里之禾江淮之間有一茅三脊所以爲藉周書曰成王時竒幹獻茅其頭􅀂雄雉佩之不昧宋書曰}
  - {type: page-break, offset: 2872, content: '', id: KR3k0012_SBCK_873-12a}
  - {type: variant, offset: 2872, length: 0, content: '', krp: 博寧宅内生芝草五本莖葉紫色太守沈鄷遣門下掾奉獻皇帝恱懌又曰芝草一年三華食之令人眉壽慶丗蓋仙人之所食又曰紫芝者其栽如豆繆襲神芝讃曰青龍元年神芝産于長平之習陽許昌典農中郎蔣充奉表以聞其色丹紫其質光耀上别爲三幹分爲九枝散爲三十六莖委綏連屬有似珊瑚之狀考圖按譜蓋羙乎前代矣蘭禮斗威儀曰君乗金而王其政和平則蘭常生宋均日蘭生主給和調也茅史記曰齊桓公欲封禪管仲曰古之封禪鄗上之黍北里之禾江淮之間有一茅三脊所以爲藉周書曰成王時竒幹獻茅其頭若雄雉佩之不昧宋書曰}
  - {type: variant, offset: 2873, length: 0, content: '', SBCK: 武時三脊茅生石頭西岸江陵夏王義恭表勸封禪唐書曰麟徳元年毫州奏老君廟側生三脊茅蒿大戴禮曰周時徳澤洽和蒿大可以爲宫柱曰蒿宫此天子之路寢也木禮稽命徴曰王者得禮之制}
  - {type: page-break, offset: 2873, content: '', id: KR3k0012_SBCK_873-12b}
  - {type: variant, offset: 2873, length: 0, content: '', krp: 武時三脊茅生石頭西岸江陵夏王義恭表勸封禪唐書曰麟徳元年毫州奏老君廟側生三脊茅蒿大戴禮曰周時徳澤洽和蒿大可以爲宫柱曰蒿宫此天子之路寢也木禮稽命徴曰王者得禮之制}
  - {type: variant, offset: 2874, length: 3, content: 景雲見, SBCK: 澤谷之中生赤木又曰王者得禮之冝則宗廟生祥木地鏡圖曰國治益地則木生水上又曰國理君喜則樹木忽自大又曰理君京房易傳曰君有徳生聖子則木生屋上及朝廷又曰君徳強且髙昌則木生城脅一尺圍巳上長數文此謂城強}
