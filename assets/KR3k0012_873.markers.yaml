  - {type: variant, offset: 1565, length: 4, content: 王政和平, SBCK: 揺光得}
  - {type: variant, offset: 1565, length: 129, content: 王政和平則老人星臨國萬民以歌孝經援神契曰德至天則斗極明又曰天子刑于四海德洞淪冥八方神化則斗霣精又曰神靈滋液百珍寶用有景星又曰鎮星舍房符明道興宋均曰符驗明而道興年豊也又曰太白合表四夷從服之象宋均曰合表從中道也太白進退主侯兵合從中道無進退孝經內事曰天子行孝德則景, WYG: 樞}
  - {type: variant, offset: 1565, length: 4, content: 王政和平, krp: 揺光得}
  - {type: punctuation, offset: 1569, content: ，, id: KR3k0012_CHANT_873-bkkpn537}
  - {type: 'tls:seg', offset: 1569, content: '', id: KR3k0012_CHANT_873-26a.10}
  - {type: variant, offset: 1570, length: 684, content: 老人星臨國萬民以歌孝經援神契曰德至天則斗極明又曰天子刑于四海德洞淪冥八方神化則斗霣精又曰神靈滋液百珍寶用有景星又曰鎮星舍房符明道興宋均曰符驗明而道興年豊也又曰太白合表四夷從服之象宋均曰合表從中道也太白進退主侯兵合從中道無進退孝經內事曰天子行孝德則景星見又曰王者動得天度止得地意從容中道陰陽合度則太微五帝座星明以光也又曰王者得禮之制不傷財不害民君臣和草木昆蟲各象正性則三台為齊明不闊不狹如其度宋均云君臣制度宮室車旗多少各有科品則應也又曰王者敬諸父有差則大角光明以揚宋均云諸父伯仲叔季也斗為帝車帝所乘也角堅剛而居帝前帝敬諸父感天應之也又曰王者遠嫌別微殊貴賤抑驕臣息亂子則屏星為之明以潤帝座章而光宋均云屏星五帝座為之明以潤章大也又曰天子得雲臺之禮則五車均明河行不離其常宋均云天子考察天氣若梓慎見星之祲者也所以獲福禳災五車主五穀民禳災得福民無飢寒之困五穀星明以應之河若離常則有決溢之憂則九穀失所殖矣又曰昆弟有親親之思則鉤鈴不離房宋均云鉤鈴遠房則踈闊今昆弟相親故天相近明其友也又曰王者厚長幼各得其正則房心有德星應之宋均云房心為天子明堂布政之宮長幼厚則政教著明房心應之而時也風史記曰黃帝行德天為之起風從西北東必以庚辛一秋中五至大赦三至小赦也唐書曰肅宗在平涼未知所適會朔方留後杜鴻漸奉牋迎上又河西行軍司馬裴冕勸上治兵於靈武以圖進取上發平涼至豊寧南見黃河天壍之固欲整軍北渡以保豊寧忽大風飛沙跬步之間不辨人物及回軍趍靈武風沙頓止天地廓清尚書大傳曰王者德及皇天則祥風起又曰舜將禪禹于時八風脩通禮斗威儀曰王者乘火而王其政昇平則祥風至宋均云即景風其來長養萬物符瑞圖曰翔風者瑞風也一名景風春為發, SBCK: 陵出玄芝}
  - {type: variant, offset: 1570, length: 684, content: 老人星臨國萬民以歌孝經援神契曰德至天則斗極明又曰天子刑于四海德洞淪冥八方神化則斗霣精又曰神靈滋液百珍寶用有景星又曰鎮星舍房符明道興宋均曰符驗明而道興年豊也又曰太白合表四夷從服之象宋均曰合表從中道也太白進退主侯兵合從中道無進退孝經內事曰天子行孝德則景星見又曰王者動得天度止得地意從容中道陰陽合度則太微五帝座星明以光也又曰王者得禮之制不傷財不害民君臣和草木昆蟲各象正性則三台為齊明不闊不狹如其度宋均云君臣制度宮室車旗多少各有科品則應也又曰王者敬諸父有差則大角光明以揚宋均云諸父伯仲叔季也斗為帝車帝所乘也角堅剛而居帝前帝敬諸父感天應之也又曰王者遠嫌別微殊貴賤抑驕臣息亂子則屏星為之明以潤帝座章而光宋均云屏星五帝座為之明以潤章大也又曰天子得雲臺之禮則五車均明河行不離其常宋均云天子考察天氣若梓慎見星之祲者也所以獲福禳災五車主五穀民禳災得福民無飢寒之困五穀星明以應之河若離常則有決溢之憂則九穀失所殖矣又曰昆弟有親親之思則鉤鈴不離房宋均云鉤鈴遠房則踈闊今昆弟相親故天相近明其友也又曰王者厚長幼各得其正則房心有德星應之宋均云房心為天子明堂布政之宮長幼厚則政教著明房心應之而時也風史記曰黃帝行德天為之起風從西北東必以庚辛一秋中五至大赦三至小赦也唐書曰肅宗在平涼未知所適會朔方留後杜鴻漸奉牋迎上又河西行軍司馬裴冕勸上治兵於靈武以圖進取上發平涼至豊寧南見黃河天壍之固欲整軍北渡以保豊寧忽大風飛沙跬步之間不辨人物及回軍趍靈武風沙頓止天地廓清尚書大傳曰王者德及皇天則祥風起又曰舜將禪禹于時八風脩通禮斗威儀曰王者乘火而王其政昇平則祥風至宋均云即景風其來長養萬物符瑞圖曰翔風者瑞風也一名景風春為發, krp: 陵出玄芝}
