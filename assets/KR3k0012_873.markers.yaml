  - {type: variant, offset: 1001, length: 0, content: '', WYG: 神農修徳作耒耨地應以醴泉春秋潛潭巴曰君徳應陽則醴泉出焉春秋潛潭樞曰旅星得則醴泉出春秋感精符曰徳淪於地則醴泉出焉孝經援神契曰王者徳至淵泉則醴泉出孫氏瑞應圖曰醴泉者水之精也味甘如醴泉出流所及草木皆茂飲之令}
  - {type: page-break, offset: 1001, content: '', id: KR3k0012_WYG_873-6b, image: WYG0900/WYG0900-0614b.png}
  - {type: variant, offset: 1002, length: 0, content: '', WYG: 壽也又曰理訟得所醴泉出於京師有仙人以爵酌之白虎通曰徳至淵泉則湧醴泉湧醴泉者羙泉也狀如醴酒可以養老也鶡冠子曰聖人徳上及太寧中及萬靈則醴泉出徐整正厯曰黄帝上時以醴泉爲漿井孫氏瑞應圖曰王者清净則浪井出有仙人主之典畧曰浪井者不鑿自成之井池唐書曰大厯八年解州安邑兩池生乳鹽後賜號寳應靈慶池土左傳曰晉文公過衛文公不禮出於五鹿乞食於野野人人與之塊公子欲鞭之子犯曰天賜也稽首受而載之史記曰黄帝時有土瑞故以土徳王庾温瑞應圖曰王者徳温逺方則物化爲土蜀王本紀曰蜀王獵於褒谷秦王以金一笥遺蜀報以禮物盡化土秦王大怒臣下拜賀曰土者地也今秦當有蜀矣社漢書曰昌邑王門社有枯樹復生枝葉後宣帝立晉書曰武帝時洛陽太社中有青氣占者以爲東莞後當有天子東莞王改封琅琊王江東之應也春秋潛潭巴曰里社鳴此里有聖人其呴百姓歸之闕湯放桀時有此祥呴呼后切石漢書曰昭帝時太山莱蕪山南匈匈有數千人聲民視之有大石自立髙一丈五尺大四十八圍入地深八尺三石為足石立處有白烏數千集其旁宣帝中興之瑞也唐書曰貞觀十九年陜州有石理成文曰李}
