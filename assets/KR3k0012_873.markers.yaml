  - {type: variant, offset: 991, length: 5, content: 昭明于日月, WYG: 唐書曰貞觀二十三年肅州醴泉出有文石五彩蓋泉尚書中候曰醴甘也取名醴酒又曰堯徳匪懈醴泉出又曰文命盛徳俊乂在官醴泉出山禮斗威儀曰醴泉味甘王政和可貴故水甘也禮稽命徴曰王者刑殺當罪賞賜當功得禮之儀則醴泉出又曰王者得禮之制則澤谷之中白泉出飲之使壽長}
