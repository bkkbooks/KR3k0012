  - {type: variant, offset: 908, length: 2, content: 納忠, SBCK: 父子夫妻尊卑有别則石生於澤也禮含文嘉曰内外之制各得其冝則山澤出􅀛寳石草萐莆孫氏瑞應圖曰萐莆王者不徴滋味庖厨不踰深盛則生於厨一名􅀝扇一名實閭一名􅀝萐生如蓮枝多葉少根如絲轉而生風主於飲食清涼駈殺蟲蠅舜時生於厨又堯時冬死夏生又舜時生於厨及階左春秋潜潭巴曰君臣和得道度叶中則萐莆孳於庖厨孝經援神契曰王者德至山陵則阜岀萐莆宋均注曰文典備則萐莆應也華苹祥瑞圖曰􅀟蓮爲苹又曰華苹者其枝正平王者徳剛則仰弱則低又曰王者政令均則華苹孝經援神契曰王者}
