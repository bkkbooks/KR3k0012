  - {type: variant, offset: 974, length: 68, content: 月黃而多輝禮瑞應圖曰昔太清之治世也昭明于日月禮含文嘉曰人君政尊則日月貞明春秋潛潭巴曰君臣和得道葉度則日月大光明天下和平上下俱昌延年益壽星, SBCK: 紫逹常生芝}
  - {type: variant, offset: 974, length: 5, content: 月黃而多輝, WYG: 䝉水出於山宋均曰蒙小水也岀可滋灌無不生植也異苑曰臨淄牛山下有女水齊人曰世治則女水流世亂則女水竭慕容超時乾涸彌載及天兵薄伐乃激洪波醴泉}
