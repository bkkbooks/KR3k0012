  - {type: variant, offset: 915, length: 2, content: 抱載, SBCK: 朱草草之精也聖人之徳無所不至則生又曰朱草者百草之精也王者德無所不通四方有歌詠之聲則生大戴禮共朱草日生一葉至十六日落一葉周而復始尚書大傳曰王者德下究地之厚則朱草生又曰帝命周公踐祚朱草暢生尚書中􅀱曰文命咸得俊乂}
