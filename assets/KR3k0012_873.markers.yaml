  - {type: variant, offset: 3386, length: 863, content: 美露也降則物無不盛論衡曰甘露味如飴王者太平之應鶡冠子曰聖德上及太清下及萬靈則膏露下晉中興徵祥記曰甘露仁澤也凝如脂甘如飴王者德至於天則降呂氏春秋曰陰陽之和不長一類甘露時雨不私一物山海經曰軒丘鳳卵民食之甘露民食之所欲自從魏明帝與東河王詔曰昔先帝時甘露屢降仁壽殿前自吾建承露盤以來甘露復降芳林園雷史記曰高祖母劉媼嘗遊大澤之陂夢與神遇時雷電冥晦見蛟龍上已而有妊遂產高祖河圖曰帝以雷精起尚書中候曰秦穆公出狩天震大雷下有火化為白雀御丹書集公車曰秦伯霸也氣史記曰秦始皇曰東南有天子氣於是東遊以厭當之又曰高祖隱於芒碭山澤間呂后與人俱求常得之高祖怪問后后曰季所居上常有雲氣故從往常得漢書曰宣帝繫獄望氣者言長安獄有天子氣詔繫者殺之內謁者令郭穰夜至郡獄邴吉拒使者不得入後漢書曰望氣者蘇伯河為王莽使至南陽遙見望春亭郭唶曰唶音子夜切氣佳哉鬱鬱葱葱然東觀漢記曰和帝時十一月夜白氣長三丈起圖東北軍市西域象奇踈勒二國歸義魏書曰武宣卞皇后琅邪開陽人文帝母也以漢延熹二年十二月乙巳生齊郡白亭有黃氣滿室移日父敬侯怪之以問卜者王旦曰此吉祥也晉書曰天子氣森森然感華蓋或如龍如馬宋書曰明帝太始二年六月日入後有黃白氣東西竟天光明潤澤也楚漢春秋曰項王在鴻門亞父諫曰吾使人望沛公其氣衝天五彩相繆或似人此非人臣之氣不若殺之應劭漢官儀曰世祖封禪久有白氣一丈東南極望正直壇所有青氣上與天屬遙望不見顛瑞命之符也光漢書郊祀志曰武帝祀汾陰汾陰傍有光如降上遂立后土祠於汾陰又曰郊太一祠上有光又曰宣帝祠世宗神光興於殿旁神光又興於房中如燭狀東觀漢記曰李軼等讖言劉氏當復起李氏為輔遂市兵弩絳衣赤幘歸舊廬望見廬南有若火光以為人持火呼之光遂盛曈曈上屬天有頃不見上異之後魏書曰太祖武皇帝母曰獻明賀皇后夢日出室內寤而光明屬天歆然有感乃生於參合之北其夜復有光明又曰高祖孝文皇帝母曰李夫人皇興元年八月生平城紫宮神光照室天地氤氳和氣充塞尚書中候曰堯沉壁於河榮光出符瑞圖曰玉燭者瑞光也見則四時之色洞如燭也又曰景者光也亦曰象也光而可象應行而臻故茂德內彰則瑞光外燭又曰昌光者瑞光也見於天漢高受命昌光出軫又曰榮光者瑞光, SBCK: 樹名}
