  - {type: variant, offset: 4783, length: 185, content: 里援弓將射未敢發見人物具焉右祛不走馬管仲曰臣聞登山之神有俞兒者長尺人物具焉霸王之君與走馬前道也祛衣其前水右祛示從右涉至溪如所言公拜焉曰仲父之聖若此莊子曰齊桓公遊於澤管仲御公見鬼仲曰澤有委虵其大如轂其長如轅紫衣朱冠見人則舉其首而立見之者殆乎霸公曰此寡人之所見也墨子曰鄭繆公晝日處廟有神入門而左鳥身素服面狀正方繆公乃懼神曰無奔帝享汝明德使錫汝壽十年使君國昌公問神神曰予為勾芒, SBCK: 三}
