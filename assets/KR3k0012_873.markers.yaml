  - {type: variant, offset: 902, length: 1, content: 黃, SBCK: 王者徳至淵泉則醴泉岀孫氏瑞應圖曰醴泉者水之精也味甘如醴泉出流所及草木皆茂飲之令人壽也又曰理訟得所醴泉出於京師有仙人以爵酌之白虎通曰徳至淵泉則醴泉湧醴泉者羙泉也狀如醴酒可以養老也鶡冠子曰聖人徳上及太寜中及萬靈則醴泉出徐整正曆曰黄帝上時以醴泉爲漿井孫氏瑞應圖曰王者清浄則浪井出有仙人主之典畧曰浪井者不鑿自成之井池唐書曰大暦八年解州安邑兩池生乳塩後賜號寳應靈慶池土左傳曰晉文公過衛文公不禮出於五鹿乞食於野野人與之塊公子欲鞭之子犯曰天賜也稽首受而載之史記曰黄帝時有土瑞故以土徳王庚温瑞應圖曰王者徳温逺方則物化爲土蜀王夲紀曰蜀王獵於褒谷􅁗王以金一笥遺蜀報以禮物盡化爲土􅁗王大怒臣下拜賀曰土者地也今􅁗當有蜀矣社漢書曰昌邑王門社有枯樹復生枝葉後宣帝立晉書曰武帝時洛陽太社中有青}
  - {type: page-break, offset: 902, content: '', id: KR3k0012_SBCK_873-4b}
  - {type: variant, offset: 902, length: 1, content: 黃, krp: 王者徳至淵泉則醴泉岀孫氏瑞應圖曰醴泉者水之精也味甘如醴泉出流所及草木皆茂飲之令人壽也又曰理訟得所醴泉出於京師有仙人以爵酌之白虎通曰徳至淵泉則醴泉湧醴泉者羙泉也狀如醴酒可以養老也鶡冠子曰聖人徳上及太寜中及萬靈則醴泉出徐整正曆曰黄帝上時以醴泉爲漿井孫氏瑞應圖曰王者清浄則浪井出有仙人主之典畧曰浪井者不鑿自成之井池唐書曰大暦八年解州安邑兩池生乳塩後賜號寳應靈慶池土左傳曰晉文公過衛文公不禮出於五鹿乞食於野野人與之塊公子欲鞭之子犯曰天賜也稽首受而載之史記曰黄帝時有土瑞故以土徳王庚温瑞應圖曰王者徳温逺方則物化爲土蜀王夲紀曰蜀王獵於褒谷秦王以金一笥遺蜀報以禮物盡化爲土秦王大怒臣下拜賀曰土者地也今秦當有蜀矣社漢書曰昌邑王門社有枯樹復生枝葉後宣帝立晉書曰武帝時洛陽太社中有青}
  - {type: variant, offset: 904, length: 3, content: 抱日輔, SBCK: 占者以爲東萖後當有天子東萖王改封琅邪王江東之應也春秋潜潭巴曰里社鳴此里有聖人其呴百姓歸之呴鳴之恐者湯起放桀時有此祥呴呼后切石漢書曰昭帝時太山萊蕪山南匈匈有數千聲民視之有大石自立髙一丈五尺大三十八圍入地深八尺三石爲足立後有白鳥數千集其旁宣帝中興之瑞也唐書曰貞觀十九年陜州有石理成文曰李君王三字甚明又曰永徽二年藍田縣令田仁注獻瑞石文理成字曰天安永得立祥瑞圖曰張掖之柳谷有石始見於建安成形於黄􅀄文備於太和建安黄􅀄太和皆年號其石狀象􅀛嶷然盤峙廣一丈六尺長一丈七尺周圍五丈餘蒼質麟鳯龍馬炳燠成形文字燦然斯盖大晉受終聖徳兼該之應也魏氏春秋曰明帝靑龍三年張掖刪丹縣金山玄川溢涌寳石􅀒圖􅃺象靈􅀛立于川西有石馬七其一仙人􅀐之其一羈絆其五有形而不善成有玉匣関闔於前上有玉字王缺二王横一又有麒麟在東鳯凰在南白虎在西犧牛在北馬自中布列南方有字曰大討曹金但取之此司馬氏革運之徴瑞應圖曰碧石玉者玩弄之物不用則岀禮稽命徴曰王者得禮之制則澤谷之中乃生白石又曰王者君}
