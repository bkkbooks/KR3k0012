  - {type: variant, offset: 2292, length: 0, content: '', WYG: 石金銀投其中立可丸爲泥以金投中名曰金漿以玉投之名曰玉釀服之皆長生也鶡冠子曰聖人至徳上及太清下及太寧中及萬靈則朱草生魏畧曰文帝欲受禪朱草生於文昌殿側蓂莢孫氏瑞應圖曰蓂莢者葉圓而五色一名厯莢十五葉日生一葉從朔至望畢從十六日毁一葉至晦而盡月小則一葉卷而不落聖明之瑞也人君徳合乾坤則生祥瑞圖曰蓂莢堯時生尚書大𫝊曰周公輔㓜主不矜功則蓂莢生春秋運斗樞曰老人星臨國則蓂莢生尚書中候曰周公作樂而治蓂莢生又曰箕星得則蓂莢生孝經援神契曰王者徳至於地則蓂莢生風俗通曰按孝經説古太平蓂莢生階其味酸王者取以調味後以醯醢代之徐整正厯曰黄帝之時以蓂莢者瑞草也蓋神靈之嘉應也白虎通曰王者考厯得其分度則蓂莢生於階間蓂莢者樹名也嘉榖孫氏瑞應圖曰嘉禾五榖之長盛徳之精也文者則二本而同秀質者則同本而異秀此夏殷時嘉禾也又曰周時嘉禾三本同穗貫桑而生其穗􅄹箱生於唐叔之國以獻周公曰此嘉禾也大和氣之所生焉此文王之徳乃獻文王之廟書曰唐叔得禾異畆同頴各一隴合爲一穗獻之天子王命周公作嘉禾篇尚書中候曰嘉禾莖長五尺三十五穗禮含文嘉曰神農作耒耨天應以嘉禾又曰綏五車明五禮則五禾應以大豐禮斗威儀曰人君乗土而王其政昇平則嘉榖並生詩含神霧曰堯時嘉禾七莖連三十五穗春秋運斗樞曰旋星得嘉禾掖孝經援神契曰王者徳至於地則嘉禾生周書曰神農時天雨粟神農耕而種之然後五榖興以助果實漢書曰宣帝時嘉禾降於郡國後漢書曰安帝時九真嘉禾生五百六十本七百六十八穗東觀漢記曰光武以建平元年生於濟陽縣舍時有嘉禾一莖九穗縣境大熟又曰文帝時嘉禾嘉麥日月不絶魏志曰文帝欲受禪郡國三嘉禾生王隠晉書曰元帝初藉稿草悉成禾沈約宋書曰文帝時醴湖生嘉粟一莖九穗又曰宋文帝元嘉二十五年嘉禾生華林園十株七百穗又曰孝武帝大明元年嘉禾生清暑殿鴟尾中一株六穗齊書曰武帝時固始縣嘉禾一莖五穗新蔡又獲一莖九穗一莖七穗梁起居注曰大同六年九月始平獻嘉禾一莖十七穗白虎通曰嘉禾者大禾也晉徴祥説曰王者盛徳則嘉禾生嘉禾者仁卉也其大􅄹箱一稃二米國政質則同本而異頴國政文則同頴而異本唐書曰開元十九年楊州奏穭生稻二百一十五頃再熟稻一千八百頃其粒與常稻無異又曰大中二年福建進粟十五莖莖有五六穗又曰大中六年淮南節度使杜悰奏海陵高郵兩縣百姓於官河中漉得異米煑食呼爲聖米秬鬯孫氏瑞應圗曰秬鬯者三隅之黍一稃三米王者宗廟修則生又曰昭穆序祭祀宰人咸有敬謹禮容之節威儀之美則秬鬯生又曰王者節敬依禮度親疎有别則秬鬯生又曰黄帝時南夷乗白鹿來獻秬鬯孝經援神契曰王者徳至於地則秬鬯生福草孫氏瑞應圗曰王者宗廟致敬則福草生於廟一名禮草禮斗威儀曰君乗木而王其政昇平則福草生廟中宋均曰廟中生草蓋福草即朱草之别名可以染祭服故君人孝而生廟中福并孫氏瑞應圗曰福并草王者有徳則福并生葳㽔孫氏瑞應圗曰王者禮備則威綏生一曰葳㽔又曰王者愛人倫則葳㽔生於殿前屈軼孫氏瑞應圖曰屈軼者太平之代生於庭前有佞人則草指之延嘉孫氏瑞應圖曰延嘉王者有徳則見又曰王者孝道行則延嘉生孝經援神契曰天子至徳屬於四海則延嘉生紫達孫氏瑞應圖曰紫達者王者仁義行則常見禮斗威儀曰君乗土而王其政太平則紫脱常生芝孫氏瑞應圖曰王者慈仁則芝草生食之令人延年春秋運斗樞曰揺光得則陵出𤣥芝孝經援神契曰王者徳至於草木則芝草生漢書曰武帝元封六年甘泉宫内産芝草九莖異産連葉又曰王者寵近􅂄老養有道則芝莢生宣帝神爵元年金芝九莖産於函徳殿銅池中銅池水宫也以銅作池後漢書曰明帝時郡國上芝英又曰章帝建初三年零陵獻芝草東觀漢記曰桓帝時芝草生中黄藏府宋書曰順帝時臨城縣生紫芝齊書曰武帝時襄陽獲紫芝隋書曰開皇十九年朱雀等十六門生芝草唐書曰貞觀十七年安禮門御榻産靈芝五莖又皇太子寢室中産素芝十四莖悉爲龍鳯之狀又曰貞觀十七年滁州言所部川源徧生芝草百僚及雍州父老上表固請封禪唐春秋曰貞觀十九年雍州李樹生芝英赤蓋紫光色鮮麗司徒長孫無忌與}
