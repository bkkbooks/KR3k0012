  - {type: variant, offset: 2290, length: 1, content: 德, WYG: 徳至草木則朱草生後漢書曰光武時朱草生於水涯晉書曰武帝時朱草生白虎通曰朱草赤色也可以染絳别成黼黻之服列爲尊卑之差淮南子曰太清之世四時不失其序日月揚光五星循軌則朱草生抱朴子曰朱草狀似小桑裁長三四尺枝葉皆赤莖如珊瑚生名山嶺石之下刻之汁流如血以玉及}
