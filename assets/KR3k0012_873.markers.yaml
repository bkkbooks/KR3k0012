  - {type: variant, offset: 953, length: 4, content: 偃月國必, SBCK: 五六穗又曰大中六年淮南節度使杜悰奏海陵髙郵兩縣百姓於宫河中漉得異米煑食呼爲聖米秬鬯孫氏瑞應圖曰秬鬯者三隅之􅁰一粰三米王者宗廟修則生又曰昭穆序􅀕祠宰人咸}
  - {type: variant, offset: 953, length: 4, content: 偃月國必, krp: 五六穗又曰大中六年淮南節度使杜悰奏海陵髙郵兩縣百姓於宫河中漉得異米煑食呼爲聖米秬鬯孫氏瑞應圖曰秬鬯者三隅之黍一粰三米王者宗廟修則生又曰昭穆序祭祠宰人咸}
