  - {type: variant, offset: 4251, length: 155, content: 光五彩焉出於水上又曰五光彩者天見五色三光重輝輝于地也春秋合誠圖曰五光垂彩天下大嘉人尚書中候洛師謀曰呂尚出遊於戊午有赤人雄出赤人水神授吾簡丹書曰命遊呂吾我也由用也禮含文嘉曰禹卑宮室盡力乎溝洫百馨用成神龍靈龜馴伏玉女降魏志曰咸熙二年晉太子襲位襄武縣言有大人見長丈餘跡長三尺一寸白髮著黃單衣黃巾柱杖呼民三始語云今當太, SBCK: 􅃺連累相承}
