  - {type: variant, offset: 190, length: 485, content: 餘鳥獸之卵胎皆可俯而闚也則是無故非有他事使之言也先王能脩禮以達順故此順之實也又曰升中于天而鳳皇降龜龍假功成而太平陰陽氣和而致象物假音格又曰享帝於郊而風雨節寒暑時五行木為雨金為陽火為燠水為寒土為風黃帝太階六符經曰三階平則陰陽和風雨時社稷咸獲其宜天下大安是謂太平韓詩外傳曰成王之時有三苗貫桑而生為一秀大幾滿車長幾充箱成王問周公曰此何物也周公曰三苗同為一秀意者天下殆同一也此期三年果有越裳氏重九譯而至獻白雉於周公曰道路悠遠山川幽深恐使人之未達也故重譯而來周公辭曰吾何以見賜也譯曰吾受命國之黃髮日久矣天下之不迅風疾雨也海之不波溢也三年於茲矣意者中國殆聖人蓋往朝之於是周公乃敬其所來故小雅云有黭淒淒興雲祁祁以是知太平無飄風暴雨亦明矣又曰祥者福之先見者也風角占曰福先見曰祥春秋繁露曰王者人之始也王正則元氣和順風雨時景星見黃龍下又曰五帝三王之理云天下不敢有君民之心什一而稅教以愛使以忠敬長老親親而尊尊不奪民時使民不過歲三日民家給人足無怨望忿怒之患故天為下甘露朱草生醴泉出風雨時嘉禾興鳳凰騏驎遊于郊日孫氏瑞應圖曰君賢得土地則日有黃抱又曰楊光者人君不假臣之權則日楊光又曰王者動不失日楊光也, SBCK: 寳}
