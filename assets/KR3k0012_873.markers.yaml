  - {type: variant, offset: 950, length: 0, content: '', SBCK: 周公作樂而治蓂莢生春秋運斗摳曰老人星臨國則蓂莢生又曰箕星得則蓂莢生孝經援神契曰王者徳至於地則蓂莢生風俗通曰按孝經􅀃古太平蓂莢生階其味酸王者取以調味後以醯􅊽代之徐整}
  - {type: variant, offset: 950, length: 0, content: '', krp: 周公作樂而治蓂莢生春秋運斗摳曰老人星臨國則蓂莢生又曰箕星得則蓂莢生孝經援神契曰王者徳至於地則蓂莢生風俗通曰按孝經說古太平蓂莢生階其味酸王者取以調味後以醯醢代之徐整}
  - {type: variant, offset: 951, length: 0, content: '', SBCK: 曆曰黄帝之時以蓂莢者瑞草也蓋神靈之嘉應也白虎通曰王者考曆得其分度則蓂生於階莢者樹名也嘉􅂖孫氏瑞應圖曰嘉禾五􅂖之長盛徳之精也文者則二本而同秀質者則同本而異秀此夏殷時嘉禾也又曰周時嘉禾三年夲同穗異貫桑而生其穗盈箱生於唐叔之國以獻周公曰此嘉禾也太和氣之所生焉此文王之徳乃獻文王之廟書曰唐叔得禾異􅅿同頴各一隴合爲一穗獻之天子王命周公作嘉禾篇尚書中􅃸曰嘉禾莖長五尺三十五穗禮含文嘉曰神農作耒耨天應以嘉禾又曰綏五車明五禮則五禾應以大豐禮斗威儀曰人君乗土而王其政􅂛平則嘉􅂖並生詩含神霧曰堯時嘉禾七莖連三十五穗春秋運斗樞曰旋星得嘉禾液孝經援神契曰王者徳至於地則嘉禾生周書曰神農時天雨粟神農耕而種之然後五􅂖興以􅂇果實漢書曰宣帝時嘉榖降于郡國後漢書曰安帝時九真嘉禾生五百六十夲七百六十八穗東觀漢記曰光武以建平元年生於濟陽縣舎時有嘉禾一莖九穗縣境大熟因名曰秀又曰章帝時嘉禾嘉麦日}
  - {type: page-break, offset: 951, content: '', id: KR3k0012_SBCK_873-8a}
  - {type: page-break, offset: 951, content: '', id: KR3k0012_SBCK_873-8b}
  - {type: variant, offset: 951, length: 0, content: '', krp: 曆曰黄帝之時以蓂莢者瑞草也蓋神靈之嘉應也白虎通曰王者考曆得其分度則蓂生於階莢者樹名也嘉糓孫氏瑞應圖曰嘉禾五糓之長盛徳之精也文者則二本而同秀質者則同本而異秀此夏殷時嘉禾也又曰周時嘉禾三年夲同穗異貫桑而生其穗盈箱生於唐叔之國以獻周公曰此嘉禾也太和氣之所生焉此文王之徳乃獻文王之廟書曰唐叔得禾異畝同頴各一隴合爲一穗獻之天子王命周公作嘉禾篇尚書中候曰嘉禾莖長五尺三十五穗禮含文嘉曰神農作耒耨天應以嘉禾又曰綏五車明五禮則五禾應以大豐禮斗威儀曰人君乗土而王其政升平則嘉糓並生詩含神霧曰堯時嘉禾七莖連三十五穗春秋運斗樞曰旋星得嘉禾液孝經援神契曰王者徳至於地則嘉禾生周書曰神農時天雨粟神農耕而種之然後五糓興以助果實漢書曰宣帝時嘉榖降于郡國後漢書曰安帝時九真嘉禾生五百六十夲七百六十八穗東觀漢記曰光武以建平元年生於濟陽縣舎時有嘉禾一莖九穗縣境大熟因名曰秀又曰章帝時嘉禾嘉麦日}
  - {type: variant, offset: 952, length: 0, content: '', SBCK: 不絶魏志曰文帝欲受禪郡國三嘉禾生王隱晉書曰元帝􅀄藉藁草悉成未沈約宋書曰文帝時醴湖生嘉粟一莖九穗又曰宋文帝元嘉二十五年嘉禾生華林園十株七百穗又曰孝武帝大明元年嘉禾生清暑殿鴟尾中一株六穗齊書曰武帝時固始縣嘉禾一莖五穗新蔡又􅀗一莖九穗一莖七穗梁起居注曰大同六年九月始平獻嘉禾一莖十七穗白虎通曰嘉禾者太和之爲美瑞者也晉徴祥􅀃曰王者盛徳則嘉禾生嘉禾者仁卉也其大盈箱一桴二米國政質則同夲而異頴國政文則同頴而異夲唐書曰開元十九年􅀭州奏穞生稻二百一十五頃再熟稻一千八百頃其粒與常稻無異穞音旅又曰大中二年福建進瑞粟十五莖莖}
