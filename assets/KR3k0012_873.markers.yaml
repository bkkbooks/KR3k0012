  - {type: variant, offset: 2255, length: 597, content: 夏為長盈秋為收藏盡為安寧春秋繁露曰王者思及金石則涼風出孝經援神契曰王者德八方則祥風至王充論衡曰王者太平則五日一風風不鳴條風角曰風清明高不及地二三尺此下有聖人或清明其來久長而不動搖樹木枝葉此龍德在其下晉陽春秋曰劉裕平慕容超將鎮下邳聞盧循反何無忌敗乃還次山陽造楊子江問行人曰朝廷如何對曰則尚未至劉公若還無所憂也裕將濟而風急眾咸難之裕曰吾有天命風當自息如天不助覆溺何足可怯即命登舟舟移而風止雨禮斗威儀曰君乘金而王其政平則嘉雨時至春秋說題辭曰大節二十四小節十二功德分也故一歲三十六雨鹽鐵論曰太平之世則雨不破塊旬日一雨雨必以夜符瑞圖曰周公時天下太平當此之時旬而一雨雨必以夜又曰靈雨者遇歲亢旱責躬引咎理察冤枉退去貪殘側身修政則降以靈雨非誠感瑞則非靈也又曰昔殷湯之世天下大旱以六條自責於是大雨淮南子曰神農之世甘雨以時五穀蕃殖尸子曰神農氏治天下欲雨則雨五日為谷雨旬五日為行雨萬物咸利故謂之神雲史記曰若煙非煙若雲非雲郁郁紛紛蕭索輪囷是謂慶雲嘉氣也漢書曰武帝封禪夜有白雲封中出魏書曰文帝生時有雲氣青色而圓如車蓋當其上終日望者以為至貴之證宋書曰世祖在江州起義建牙軍門有紫雲二叚落于牙上唐書曰玄宗嘗出畋有紫雲在其上從者望而得之又曰肅宗自奉天而北夕次永壽有白雲起西北長數丈如樓閣之狀識者以為天子之氣尚書中候曰堯德清平乃沉壁於河白雲起禮斗威儀曰景雲景明也言雲氣光明也又曰周成王治平觀於河青雲浮春秋孔演圖曰黃帝將興黃雲升於堂, SBCK: ''}
  - {type: variant, offset: 2255, length: 12, content: 夏為長盈秋為收藏盡為安寧, WYG: ''}
