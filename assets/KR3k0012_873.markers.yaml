  - {type: variant, offset: 2862, length: 1, content: 山, SBCK: 於草木則芝草生漢書曰武帝元封六年甘泉宫内産芝草九莖産連葉宣帝神雀元年金芝九莖産于􅉼德殿銅池中如淳曰銅池承霤也晉灼日以銅作池韋昭日以銅節池邊也後漢書曰明帝時郡國上芝英又曰章帝建􅀄三年零}
