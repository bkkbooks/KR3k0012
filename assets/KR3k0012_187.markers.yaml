  - {type: variant, offset: 1894, length: 954, content: 斤及牛酒須賈以睢持魏陰事告齊故睢獨得此饋心怒歸以告魏相魏齊齊使人笞擊睢折脅折齒睢佯死卷以置廁中賓客飲者醉更溺睢以懲後無妄言者又曰李斯者楚之上蔡人也少時為鄉小吏見吏舍廁中鼠食不絜近人犬數驚恐之斯入倉觀倉中鼠食積粟居大廡下不見人犬之憂於是李斯乃嘆曰人之賢不肖譬如鼠矣在所自處耳乃從荀卿學帝王之術又曰萬石君長子建老白首萬石君尚無恙建為郎中令每五日洗沐歸謁親入子舍竊問侍者取親中裙廁牏身自浣滌徐廣曰牏築垣短版也音注廁牏謂溷垣牆隱於其側而浣滌也一謂牏竇言建又自洗盪廁竇廁竇寫除穢污之穴也呂靜曰楲窬褻器音威豆復與侍者不敢令萬石君知以為常又曰趙襄子滅智伯其臣豫讓遁逃山中曰嗟乎士為知已者死女為說己者容今智伯知我我必為報讎而死以報智伯則吾魂魄不媿矣乃變名姓為刑人入宮塗廁中挾匕首欲以刺襄子襄子如廁心動執問塗廁之刑人豫讓內持刃兵曰欲為智伯報仇左右欲誅之趙襄子曰彼義人也吾謹避之耳且智伯亡無後而其臣欲為報仇此天下之賢人也卒釋去之又曰大將軍衛青侍中上據廁而視之注溷廁也漢書郅都侍上賈姬如廁有野彘入廁上目都擊之都不往上欲自行都伏諫曰一姬死復一姬進上雖自輕奈太后宗廟何太后聞之賜都金晉書王戎惠帝反宮以戎為尚書令既而河間王顒遣使說成都王潁將誅齊王冏檄書至冏謂戎曰孫秀作逆天子幽偪孤紏合義兵掃除元惡臣子之節信著神明二王聽讒造構大難當賴忠謀以和不協卿善為我籌之戎曰公首舉義眾定大業開辟已來未始有也然論功報賞不及有勞朝野失望人懷貳志今二王帶甲百萬其鋒不可當若以王就第不失故爵委權崇讓此求安之計也冏謀臣葛旟怒曰漢魏以來王公就第寧有得保妻子乎議者可斬於是百官震悚戎偽藥發墯廁得不及禍又曰郭璞素與桓彝友善彝每造之或值璞在婦女間便入璞曰卿來他處自可徑前但不可廁上相尋耳必客主有殃彝後因醉詣璞正逢在廁掩而觀之見璞躶身被髮銜刀設醊璞見彝撫心大驚曰吾每屬卿勿來反更如是非但禍吾卿亦不免矣天實為之將以誰咎璞終嬰王敦之禍彝亦死蘇峻之難魏氏春秋曰許允為鎮北將軍未發徙樂浪允善相印將拜印以不善更刻大如此者三允曰印雖好而已被辱問送印者果懷之而墜于廁幽明錄曰建德民虞敬上廁輒有一人授草手內與之不覩其形如此非一過後至廁久無送者但聞戶外鬥聲窺之正見死奴與死婢爭先進草奴適在前婢便因後撾之由此輒兩相擊食頃敬欲出婢奴陣勢方未已乃厲聲叱之奄如火滅自是遂絕又曰阮德如嘗於廁見一鬼長, SBCK: 餘}
