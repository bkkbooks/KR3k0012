  - {type: variant, offset: 1593, length: 0, content: '', WYG: 燕丹子曰荆軻以匕首擿決秦王入銅柱火出淮南子曰柱不可以刺齒蓬不可以持屋世説陸玩初拜司空有人往索酒得便自起瀉著梁柱間地祝曰當今乏才以爾為柱石之用莫傾人棟梁玩笑曰戢卿良箴楚辭天問曰八柱何當東南何虧傅元京都賦曰錦牆雕柱劉良七舉曰緑柱朱榱青璅碧璫李尤楹銘曰幹强體正雖重不移上下相安髙而不危世説夏侯𤣥讚曰𤣥嘗倚柱作書雷破其柱神色不變作書如故俞益期箋曰馬文淵昔立兩銅柱於林邑岸北有遺兵十餘家不反遂居其地岸南樹對銅柱悉姓為馬自為婚姻有二百户交州以流寓號曰馬流言語飲食尚}
