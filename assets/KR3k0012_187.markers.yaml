  - {type: variant, offset: 417, length: 394, content: 蓬萊仙者乃可見之封禪則不死黃帝是也天子親祀竈焉又曰初霍氏奢侈茂陵徐生曰霍氏必亡夫奢則不遜不遜必侮上侮上逆道也在人之右眾必害之也霍氏秉權日久害之者多矣天下害之而又行以逆道不亡何待乃上䟽言霍氏太盛陛下即愛厚之宜以時抑制無使至亡書三上輒不報聞其後霍氏誅滅而告霍氏者皆封人為徐生上書曰臣聞客有過主人者見其竈直突傍有積薪客謂主人更為曲突遠徙其薪不者且有火患主人不應俄而家果失火鄰里共救之幸而得息於是殺牛置酒謝其人灼爛者在於上行餘各以次不錄言曲突者人謂主人曰鄉使聽客之言不費牛酒終亡火患今論功而請賓曲突徙薪亡恩澤燋頭爛額為上客主人迺寤而請之茂陵徐福數上書言霍氏且變宜防絕之鄉使福說行則國亡裂土出爵之費臣亡逆亂誅滅之敗往事既已而福不蒙其功唯陛下察之貴徙薪曲突之策使居焦髮灼爛之右上迺賜福帛千疋後以為郎又曰息夫躬祠竈人見之告呪詛遂棄市又曰昭帝時燕王宮豕出圂胡困切壞都竈注都竈注都竈蒸炊之大竈也劉向以為豕禍, SBCK: ''}
