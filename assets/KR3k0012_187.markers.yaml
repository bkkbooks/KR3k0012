  - {type: variant, offset: 892, length: 7, content: 更始李軼朱鮪擅, SBCK: 史叔賔者陳留人也少有盛名郭林宗見而告人曰牆髙基下雖得必失後果以論議阿枉毀名云又曰崔晏仕䆠歴位邊郡而愈貧薄家徒四壁卒無以殯歛光禄勲楊賜太僕􅀽逢少府叚熲爲備棺椁葬具大將軍􅀽隗樹碑頌又曰杜安字伯夷少有志節年十三入太學號竒童京師貴戚慕其名或遺之書安不發悉壁藏之及後捕案貴戚賔客安開壁岀書印封如故竟不罹患時人貴之位至巴郡太守呉志曰吕蒙病孫權時在江安迎置内廐治護萬方欲數見顔色又恐勞動常穿壁曕之見其少食則喜不能則咄唶也􅀳書外國傳大􅁗國以琉璃爲牆壁齊書曰劉璡字子璥方䡄正直兄瓛夜隔壁呼璡出不荅方下牀着衣立行及簾外然後應瓛問其故璡曰向束帶未竟又曰徐孝嗣􅀄在率府晝卧齋北壁下夢兩童子遽云移公牀孝嗣驚起行數歩而壁崩莊子曰正考父一}
