  - {type: variant, offset: 3208, length: 271, content: 年而歸家問其故曼都曰在山中仙人乘龍迎我上天先過紫府金床玉几真貴處也仙人以流霞柸飲我輒不死不飢渴昔淮南王事天帝有失行謫之守廁矣吾何人哉語林曰劉寔詣石崇如廁見有絳文帳茵縟甚麗兩婢持錦囊寔遽退笑謂崇曰向誤入卿室崇曰是廁耳寔更往向乃守廁婢所進錦囊是籌良久不得便行出謂崇曰貧士不得此廁乃如他廁又曰石崇廁常有十餘婢侍列皆佳麗藻飾置甲煎沉香無不畢備又與新衣客多不能著王敦為將軍年少往脫故衣著新衣氣色傲然群婢謂曰此客必能作賊世說王大將軍敦初尚主廁見漆箱中盛乾棗本以塞鼻王謂廁上下菓食遂至盡既還婢擎金澡盤盛水瑠璃椀盛澡豆敦自倒著水中而飲之謂之乾飯群婢掩口而笑之, SBCK: 七}
