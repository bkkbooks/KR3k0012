  - {type: variant, offset: 1579, length: 7, content: 阮逸避亂依胡母, WYG: 曰石季龍掘秦始皇冢取其銅柱鑄以為器又曰太始二年秋營太廟致荆山之材採華山之石鑄銅柱十二塗以黄金鏤以百物綴以明珠曹嘉之晉紀曰諸葛誕以氣厲稱常倚柱讀書雷震其柱誕讀書自若陳書曰初梁侯景焚太極殿及景平至陳武帝議欲營之獨闕一柱至是有樟木大十八圍長四丈五尺流泊後渚因得用之漢武内傳曰上起神屋鑄銅為柱塗金大五圍帝王世紀曰桀作金柱三千列女傳曰紂作銅柱以炭火燃之有罪者令抱其柱輒墜炭中妲己觀以為笑漢官典職曰徳陽殿柱皆金刻鏤宫掖之好竒禽萬巧飾以丹青翡翠竟柱構以水精一柱三帶韜以赤緹應劭漢官儀曰開陽門始成未有名夜一柱飛来樓上琅邪開陽縣上言南一柱飛去光武使視因刻記其年月以名門焉神異經曰崑崙山有銅柱其髙入天所謂天柱也圍三千里圓􅂞如削下有仙人府與天地同休息男女名曰玉人男即玉男女即玉女無為配疋而仙道成也三}
