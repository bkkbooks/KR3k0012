  - {type: variant, offset: 949, length: 144, content: 養中郎將爛羊頭關內侯又曰虞詡為懷令後羗寇武都鄧太后以詡有將帥之略遷武都太守引見嘉德殿厚加賞賜羗乃率眾數千遮詡於陳倉崤谷詡即停軍不進而宣言上書請兵須到當發羌聞之乃分鈔傍縣詡因其兵散日夜進道兼行百餘里令吏士各作兩竈日增倍之羌不敢迫或問曰孫臏減竈而君增之兵法日行不過三十里以戒不虞而今日行二百何, SBCK: 恐頽}
