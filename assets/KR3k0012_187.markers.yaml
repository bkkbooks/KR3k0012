  - {type: variant, offset: 1593, length: 0, content: '', krp: 咸曰金梁鐡柱又曰家人之升曰髙樓無柱顚僵不乆紂失人主身死牧竪盛弘之荆州記曰巴東城西有一栢柱孤殖大可數圍髙三丈餘相傳是公孫述時樓柱乃云斫之血岀枯而不朽歴代彌固將恐有物慿焉江陵記曰沔城内有赤湖客舎襄陽大道經城中過元嘉十一年連雨城南門沮壞得土中故柟柱長一丈七尺臨川康王取以爲大齋西北柱𥘉時色黒一季後不復黒計此千年列子曰共工觸不周山天柱折晏子春秋曰晏子將死鑿楹納書焉謂妻曰楹記日也子壯而示之燕丹曰荊軻以匕首擿决秦王入銅柱火出淮南子曰柱不可以刺齒蓬不可以持屋丗說曰陸抗𥘉拜司空有人往索酒便自起酌梁柱間祝曰當今乏才以尓爲柱石之任莫傾人棟梁陸笑曰感卿良箴楚辭天問曰八柱何當東南何虧傅玄正都賦曰錦牆雕柱劉良七舉曰緑柱朱榱青璅壁璫李尤楹銘曰幹強體正雖重不移上下相安髙而不危丗說夏侯玄讃曰玄甞倚柱作書霹靈其柱神色無變作書如故俞益期牋曰馬文淵昔立兩銅柱於林邑岸北有遺兵十餘家不反居寜夀靈岸南對銅柱悉姓爲馬自爲婚姻有二百户交州以流寓號曰馬流言語飲食尚}
