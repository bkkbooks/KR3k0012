  - {type: variant, offset: 36, length: 4, content: 遠庖廚凡, SBCK: 無易由言耳屬于垣由用也人將聽之又曰將仲子􅀆無踰我牆又曰兄弟䦧于牆外禦其務務侮又曰徹我牆屋田卒汗萊毁牆屋不得農也書序􅁗始皇滅先代典籍焚書坑儒天下學士逃難解散我先人用藏其家書于屋壁至魯恭王時好治宮室壞孔子舊宅以廣其居於壁中得先人所藏古文虞夏啇周之書及傳論語孝經皆科斗文字又曰峻宇雕牆禮曰七月坯牆垣六月小暑後五日蟋蟀居壁周禮曰牆厚三尺崇之注云髙卑爲率足以相爲勝也左傳叔孫曰人之}
