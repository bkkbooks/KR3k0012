  - {type: variant, offset: 493, length: 770, content: 害之而又行以逆道不亡何待乃上䟽言霍氏太盛陛下即愛厚之宜以時抑制無使至亡書三上輒不報聞其後霍氏誅滅而告霍氏者皆封人為徐生上書曰臣聞客有過主人者見其竈直突傍有積薪客謂主人更為曲突遠徙其薪不者且有火患主人不應俄而家果失火鄰里共救之幸而得息於是殺牛置酒謝其人灼爛者在於上行餘各以次不錄言曲突者人謂主人曰鄉使聽客之言不費牛酒終亡火患今論功而請賓曲突徙薪亡恩澤燋頭爛額為上客主人迺寤而請之茂陵徐福數上書言霍氏且變宜防絕之鄉使福說行則國亡裂土出爵之費臣亡逆亂誅滅之敗往事既已而福不蒙其功唯陛下察之貴徙薪曲突之策使居焦髮灼爛之右上迺賜福帛千疋後以為郎又曰息夫躬祠竈人見之告呪詛遂棄市又曰昭帝時燕王宮豕出圂胡困切壞都竈注都竈注都竈蒸炊之大竈也劉向以為豕禍後漢書李南女曉術為由拳縣人妻晨詣竈室卒有暴風婦上堂從姑求歸辭其二親姑不許乃跪而泣曰家世傳術疾風起先吹竈突及井此禍為婦女主爨者妾將應之因著其亡日乃聽還家如期病卒又曰更始李軼朱鮪擅命山東王匡張印橫暴三輔其所與官爵皆群小賈豎或有膳夫庖人多著繡面衣錦袴襜褕諸子駡詈道中長安為之語曰竈下養中郎將爛羊頭關內侯又曰虞詡為懷令後羗寇武都鄧太后以詡有將帥之略遷武都太守引見嘉德殿厚加賞賜羗乃率眾數千遮詡於陳倉崤谷詡即停軍不進而宣言上書請兵須到當發羌聞之乃分鈔傍縣詡因其兵散日夜進道兼行百餘里令吏士各作兩竈日增倍之羌不敢迫或問曰孫臏減竈而君增之兵法日行不過三十里以戒不虞而今日行二百何也詡曰虜眾多吾兵少徐行則易為所及速過則彼所不測虜見吾竈日增必謂郡兵來迎眾多行速必憚追我孫臏見弱吾今示強勢有不同故也又曰向栩性不恒又似狂坐於竈北板屋上又曰張忠署孫賓為主簿遂祭竈請比鄰又曰陰識之子方臘日晨炊而竈神見殺黃羊因祀之三世繁昌遂常以臘日祭也戰國策曰智伯攻晉陽城城不沉者三板洎竈生蛙懸釜而炊魯連子曰一井五鉼洩可立待一竈五突烹飪十倍分煙者眾, WYG: ''}
