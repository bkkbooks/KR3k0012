  - {type: variant, offset: 1579, length: 7, content: 阮逸避亂依胡母, SBCK: 曰石季龍掘秦始皇􅃁取其銅柱鑄以爲器又曰太始二年秋營太廟致荆山之材採華山之石鑄銅柱十二塗以黄金鏤以百物綴以明珠曹嘉之􅀳紀曰諸􅁑誕以氣勵稱常􅀝柱讀書雷震其柱誕讀書自若陳書曰􅀄梁侯景焚太極殿及景平至陳武帝議欲營之獨闕一柱至是有樟木大十八圍長四丈五尺流泊後渚因得用之漢武内傳曰上起神屋鑄銅爲柱金􅂗大五圍帝王丗紀曰桀作金柱三千列女傳曰紂作銅柱以炭火然之有罪者令抱其柱􅂺墮炭中妲巳觀以爲􅀏漢官典職曰徳陽殿柱皆金刻鏤作竒禽萬巧間以丹青翡翆竟柱構以水精一柱三帶韜以赤緹應劭漢官曰開陽門始成未有名夜有一柱飛來樓上後琅邪開陽縣上言南門一柱飛去光武使視因刻記其年月以名門焉神異經曰崑崙山有銅柱其髙入天所謂天柱也圍三千里周廻如削下有仙人府與天地同休息男女名曰玉人男即玉男女即玉女無爲配疋而仙道成也三}
