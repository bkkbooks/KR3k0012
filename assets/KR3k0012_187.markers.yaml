  - {type: variant, offset: 1588, length: 4, content: 初至屬輔, SBCK: 因題殿柱曰堂堂乎張京兆田郎伏滔北征記曰廣陵呉王濞所都脩大城得栢柱三皆栢心蓋呉王濞門柱也華延儁洛陽記曰太極殿有四金銅柱焦贑易林旅}
  - {type: page-break, offset: 1588, content: '', id: KR3k0012_SBCK_187-6a}
  - {type: variant, offset: 1588, length: 0, content: '', WYG: 因題殿柱曰堂堂乎張京兆田郎伏滔北征記曰廣陵吳王濞所都大城得柏柱三皆柏心盖吳濞門柱也華延雋洛陽記曰太極殿有四銅柱焦贑易林旅之咸曰金梁鐵柱又曰家人之升髙樓無柱顛僵不乆紂失主人身死牧豎盛宏之荆州記曰巴東城西有一柏柱孤植大可數圍髙三丈餘相傳是公孫述時樓柱乃云斫之血出枯而不朽厯代彌固將恐有物憑焉江陵記曰沔城内有赤湖客舎襄陽大道經城中過元嘉十年連雨城南門沮壊得土中故柟柱長一丈七尺臨川康王取以為大齋西北柱}
  - {type: page-break, offset: 1588, content: '', id: KR3k0012_WYG_187-10a, image: WYG0894/WYG0894-0664c.png}
  - {type: variant, offset: 1588, length: 4, content: 初至屬輔, krp: 因題殿柱曰堂堂乎張京兆田郎伏滔北征記曰廣陵呉王濞所都脩大城得栢柱三皆栢心蓋呉王濞門柱也華延儁洛陽記曰太極殿有四金銅柱焦贑易林旅}
