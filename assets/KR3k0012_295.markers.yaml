  - {type: variant, offset: 1291, length: 1, content: 寶, krp: 超圍廣固城數月不拔或說𥙿曰昔石季龍攻曹嶷瞻氣者以爲澠水帶城澠音繩非可攻抜若塞五龍口城必自䧟季龍從之而嶷降慕容恪圍叚龕亦如之而龕降降後無幾又震開之今舊跡猶在可塞之𥙿從其言於是城中男女患脚弱疾者太半時有蒼鵝飛入帳座衆咸驚愕其將曰蒼胡色也鵝者我也胡虜歸我之徵衆大恱將攻城諸將咸諌曰今往亡之日兵家所忌𥙿曰我往彼亡吉孰大焉乃命悉登遂尅平廣固又曰嶺南城盧循㓂建業宋武擊破之走至彭蠡湖乃悉力栅断左里大軍至左里將戰宋武所執麾竿折幡沉水衆並恠懼公歡笑曰徃年覆舟之戰幡竿亦折今者復然賊必破矣即攻柵而進循兵雖殊死戰弗能禁諸軍乘勝奔之循單舸走所殺及投水死凡萬餘人納其降附宥其逼掠遣劉藩孟懷玉輕軍追之循收散卒尚有數千人逕還廣州又秃髮利鹿孤}
