  - {type: variant, offset: 9, length: 0, content: '', SBCK: 曰兵怒而不相迎交而不合又不相去必謹察之備奇伏也左傳曰齊師伐魯敗退魯莊公將逐之曹􅔘曰未可夫大國難測也懼有伏焉恐許而奔也吾視其轍亂望其旗靡故逐之旗靡轍亂怖遽也又曰􅁗晉戰于羈馬交綏􅁗行人夜戒晉師曰兩君之士皆未憗也明日請相見也憗缺也魚覲切晉大夫􅁷駢曰使者目動而言肆懼我也日動心不安言肆声放失常節也將遁矣薄諸河必敗之薄迫也晉禆將胥甲趙穿當軍門呼曰死傷未收而棄之不惠也不待期而薄人於險無勇也乃止􅁗師果夜遁又曰晉侯伐齊齊侯畏其衆齊師夜遁師曠曰鳥烏之声樂齊師其遁鳥烏得空故樂也邢伯曰有班馬之声夜遁馬不聞見故鳴班列也齊師其遁叔向曰城上有烏齊師其遁又曰晉師伐楚將戰楚子登巢車以觀晉軍巢車車上爲櫓楚將子重使太宰伯州犁侍于王後州􅀺晉伯宗子先奔楚王曰騁而左右何也騁走曰召軍吏也皆聚於中軍矣曰合謀也張幕矣曰䖍卜於先君也徹幕矣曰將發命也甚囂且塵上矣曰將塞井夷竈而爲行也夷平行户郎切皆乗矣左右執兵而下矣曰聽誓也左將帥右車右竟販楚于􅋣陵㥼音偃後漢書曰劉備遣將呉蘭屯下辯曹公遣曹洪征之備遣張飛屯固山欲断軍後衆議狐疑洪曰賊實断道者當伏兵濳行今反張声此其不能也冝及其未集促擊蘭破則飛自走集兵擊蘭大破之飛果走宋書曰東晉末武帝率兵北伐圍南燕慕容超於廣固未下時後􅁗姚興遣使告宋武云慕容見與隣好以窮告急今當遣鐡􅀐一萬遥據洛陽晉軍􅀂不退者便當長驅而進宋武遣興使荅曰語汝姚興我定燕之後息甲三年當平關洛今能自送便可速來劉穆之聞興使入而宋武發遣巳去以興所言并荅具語穆之穆之曰常日事無大小必賜與謀此冝善詳云何率尓便荅未能威敵只增彼怒耳若燕未可拔興救奄至不審何以待之宋武􅀏曰此是兵機非卿所解故不語耳夫兵貴神速彼若審能遣救必畏我知寕容先遣信命此是其見我伐燕内巳懷懼自強之辝耳興竟不能出師廣固終抜擒慕容超平齊地又曰武帝自京口舉義兵討桓􅀇􅀇將桓謙屯于東陵卞範屯覆舟山西以拒之宋武疑賊有伏兵謂小將劉鍾曰此山下當有伏兵卿可率部下往取之鍾應声馳進果有伏兵數百一時奔走又曰雍州刺史􅀽顗舉兵反㳂流入鵲尾與官軍相持旣义官軍主張興丗越鵲尾上據錢溪顗將劉胡攻之不下遣人傳唱錢溪巳平官軍之衆並懼宋將沈攸之曰不然若錢溪實敗萬人中要應有逃亡得者必是彼戰失利唱空聲以惑衆耳勒軍中不得輙動錢溪信㝷至果大破賊攸之悉以錢溪所送胡軍耳鼻示之顗駭懼急追胡還遂潰走後魏書曰司馬楚之討蠕蠕蠕蠕濳遣姧覘蠕如兖切入楚之軍截驢耳而去有吿失驢耳者諸將莫能察楚之曰必是覘賊截之以爲驗耳賊將至即使軍人伐柳爲城水灌令凍城立而賊至冰峻城固不可攻逼賊乃走散丗祖聞而喜之又曰將韓果性強記兼有權略所行之處山川形勢輙能記憶兼善伺敵虚實揣知情􅃺有潛匿溪谷欲爲間遉者果登髙視之所疑之處往必有獲通典曰周武帝帥師攻圍髙齊晉州齊後主將兵十万自來援之時柱國陳王純頓千里徑大將軍永昌公椿屯雞棲原大將軍宇文盛守汾水􅀜並受齊王憲節度憲密謂椿}
