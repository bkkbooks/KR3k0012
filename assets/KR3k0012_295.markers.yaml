  - {type: variant, offset: 9, length: 0, content: '', WYG: 曰兵怒而不相迎交而不合又不相去必謹察之備竒伏也左傳曰齊師伐魯敗退魯莊公將逐之曹劌曰未可夫大國難測也懼有伏焉恐詐而奔也吾視其轍亂望其旗靡故逐之旗靡轍亂怖遽也又曰秦晉戰于河曲秦行人夜戒晉師曰兩君之士皆未憖也明日請相見也憖切也魚覲切晉大夫臾駢曰使者目動而言肆懼我也目動心不安言肆聲放失常節也將遁矣薄諸河必敗之薄廹也晉禆將胥甲趙穿當軍門呼曰死傷未收而棄之不惠也不待期而薄人於險無勇也乃止秦師果夜遁又曰晉侯伐齊齊侯畏其衆齊師夜遁師曠曰鳥烏之聲樂齊師其遁鳥烏得空故樂也邢伯曰有班馬之聲夜遁馬不聞見故鳴班列也齊師其遁叔向曰城上有烏齊師其遁又曰晉師伐楚將戰楚子登巢車以觀晉軍巢車車上為櫓楚將子重使太宰伯州犂侍於王後州犂晉伯宗子先奔楚王曰騁而左右何也騁走曰召軍吏也皆聚於中軍矣曰合謀也張幕矣曰䖍卜於先君也徹幕矣曰將發命也甚囂且塵上矣曰將塞井夷竈而為行也夷平行户郎切皆乗矣左右執兵而下矣曰聽誓也左將帥右車右竟敗楚於鄢陵鄢音􅟠魏志曰𤣥德遣將吳蘭屯下辯曹公遣曹洪征之以曹休參軍事𤣥德遣張飛屯固山欲斷軍後衆議狐疑休曰賊實斷道者當伏兵潜行今乃先張聲勢此其不能也宜及其未集促擊蘭破則飛自走洪從之進兵擊蘭大破之飛果走宋書曰東晉末武帝率兵北伐圍南燕慕容超於廣固未下時後秦姚興遣使告宋武云慕容見與鄰好以窮告急今當遣鐵騎一萬遥據洛陽晉軍若不退者便當長驅而進宋武答興使曰語汝姚興我定燕之後息甲三年當平關洛今能自送便可速來穆之聞興使入而宋武發遣已去以興所言并答具語穆之穆之曰常日事無大小必賜與謀此宜善詳云何率爾便答未能威敵正足怒彼耳若燕未可㧞興救奄至不審何以待之宋武笑曰此是兵機非卿所解故不語耳夫兵貴神速彼若審能遣救必畏我知寧容先遣信命此是其見我伐燕内已懐懼自强之辭耳興竟不能出師廣固終㧞擒慕容超平齊地又曰武帝自京口舉義兵討桓𤣥𤣥將桓謙屯於東陵卞範屯覆舟山西以拒之宋武疑賊有伏兵謂小將劉鍾此山下當有伏兵卿可率部下徃取之鍾應聲馳進果有伏兵數百一時奔走又曰雍州刺史袁覬舉兵反㳂流入鵲尾與官軍相持既乆官軍主張興世越鵲尾上據錢溪覬將劉胡攻之不下遣人傳唱錢溪已平官軍之衆並懼宋將沈攸之曰不然若錢溪實敗萬人中要應有逃亡來者必是彼戰失利唱空聲以惑衆耳勒軍中不得輒動錢溪信尋至果大破賊攸之悉以錢溪所送胡軍耳鼻示人覬駭懼急追胡還遂潰走後魏書曰司馬楚之討蠕蠕蠕蠕潜遣諜者蠕而宣切入楚之軍截驢耳而去有告失驢耳者諸將莫能察楚之曰必是覘賊截之以為驗耳賊將至即使軍人伐桞為城水灌令凍城立而賊至冰峻城固不可攻逼敗乃走散世祖聞而嘉之又曰韓果性强記兼具有權畧所行之處山川形勢輒能記憶兼善伺敵虛實揣知情状有潜匿溪谷欲為間遁者果登高視之所疑之處徃必有獲通典曰周武帝帥師攻圍高齊晉州齊後主將兵十萬自來援之時柱國陳王純屯千里逕大將軍永昌公椿屯雞棲原大將軍宇文盛屯汾水關并受齊王憲節度憲宻謂椿}
