  - {type: variant, offset: 3913, length: 190, content: 魏人見意閑且戰又不利因退走又曰後魏將宇文測行綏州事每歲河冰合後突厥即來寇先是常遣居人入城堡以避之測至皆令安堵如舊乃於要路數百處並多積柴仍遠遣斥候知其動靜是年十二月突厥從連谷入寇去界數十里測命積柴之處一時縱火突厥謂有大軍至懼而遁走自相蹂踐委棄雜畜及輜重不可勝數測徐率所部收之分給百姓自是突厥不敢復至又曰梁雍州刺史岳陽王蕭登雖稱藩附於西魏而尚有貳心西魏將楊忠自樊城觀兵於漢濱易旗進實騎, SBCK: 斬}
