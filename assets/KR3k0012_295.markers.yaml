  - {type: variant, offset: 172, length: 256, content: 使彼張惶離亂而不集聚也合於利而動暴之使離亂之使不齊動兵而戰之不合於利而止左傳曰蔡聲子謂楚令尹屈建曰若敖之亂伯賁之子苗賁皇奔晉以為謀主及鄢陵之役楚晨壓晉軍而陣苗賁皇曰楚師之良在中軍王族而已若塞井夷竈成陣以當之欒范易行以誘之欒書時將中軍范燮佐之易行謂簡兵備欲令楚貪己而不復顧二穆之兵易以豉反行胡郎反中行二郤必克二穆郤錡時將上軍中行偃佐之郤至左新軍令此三人分良以攻二穆之兵楚子重子辛皆出穆王故曰二穆吾乃四萃於王族必大敗之四萃四面集攻之也晉人從之楚師大敗王夷師熸夷傷也吳楚之間謂火滅為熸子廉切子反死之鄭叛吳興則苗賁皇之為, WYG: ''}
