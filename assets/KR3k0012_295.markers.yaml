  - {type: variant, offset: 2778, length: 1132, content: 十餘騎奔射殺之而復還至其騎中解鞍令士皆縱馬臥是時會暮胡兵終怪之卒不敢擊向夜半時胡兵以為漢有伏軍於旁欲夜取之皆引兵去詰朝廣乃歸其軍後漢書曰廉范為雲中太守會匈奴大入塞范自率士卒拒之虜眾盛不敵會日暮令軍士各交縛兩炬三頭然火虜遙見火多謂漢兵救至待朝將退范乃令軍中蓐食晨往擊之斬首數百級虜自此不敢復向雲中又曰虞詡為武郡太守以討叛羌羌乃率眾數千遮詡於陳倉崤谷詡即停軍不進而宣言上書請兵須到當發聞之乃分抄傍縣詡因其兵散日夜進道兼行百餘里令吏士各作兩竈或曰孫臏減竈而君增之兵法日行不過三十里以戒不虞而今日且二百里何也詡曰虜眾多吾兵少徐行則易為所及速進則彼所不測虜見吾竈日增必謂郡兵來迎眾多行速必憚追我孫臏見弱吾今示強勢有不同故也既到郡兵不滿三千而羌眾萬餘攻圍赤亭數十日詡乃令中使強弩勿發先用小弩羌以為矢力弱不能至并兵急攻詡於是使二十強弩共射一人發無不中羌大震退詡因出城奮擊多所傷殺明日悉陳其眾令從東郭門出北郭門入換易衣服廻轉數周羌不知其數更相恐動詡計賊當退乃潛遣五百餘人於淺水設伏候其走路虜果奔因掩擊大破之通典曰後漢末陳登為廣陵守孫策遣軍攻登於匡琦城登使人求救於曹公而密去城十里理軍營處所令多取柴薪兩束一聚相去十步從橫成行令俱起火牙燃其聚城上稱慶若大軍到賊覩火驚潰登勒兵追奔斬首萬級也又曰蜀大將諸葛亮屯于陽平并兵東下亮唯留萬人守城魏將司馬宣王率二十萬眾拒亮當亮六十里所候邏白宣王說亮在城中力弱將士失色亮是時意氣自若勑軍皆臥旗息鼓不得輒出卷幔開四門掃地却洒宣王疑其有伏於是引軍北趣山亮謂參佐曰司馬懿謂吾有強伏循山走矣候邏還白亮所言宣王深以為恨又曰西晉將杜元凱伐吳陳兵于江陵遣牙門管定周旨伍巢等率奇兵八百汎舟夜度以襲樂鄉多張旗幟起火巴山出於要害之地以奪賊心吳都督孫歆震恐與吳將伍延書曰北來諸軍乃飛渡江也皆破之又曰東晉末宋武帝為將討海賊孫恩恩在扈瀆海鹽令鮑陋遣子嗣之以吳兵一千請為前驅宋武曰賊兵甚精吳人不習戰若前驅失利必敗我軍可在後為聲援不從是夜宋武多設伏兵兼置旗鼓然一處不過數人明日賊率眾乃萬餘迎戰前驅既交諸伏皆舉旗鳴鼓謂四面有軍乃引退嗣之追奔為賊所沒宋武且戰且退賊既盛所領死傷且盡宋武慮不免至向伏兵處乃止令左右脫取死人衣賊謂當走反停疑猶有伏宋武因呼更戰氣色甚猛賊以為然乃引軍去宋武徐歸然後散兵稍集又曰東齊末桓玄篡晉宋武帝起義討玄使將桓謙何湛之屯覆舟山武帝使羸弱登蔣山多張旗幟玄不之測大懼武帝與劉毅等分為數隊進突謙陣皆殊死戰無不一當百東北風急義軍放火煙塵漲天鼓譟之音震駭京邑謙等諸軍一時奔散又曰蕭齊將馮道根守阜陵城戍初到阜陵理城隍遠斥候有如敵將至者眾頗笑之道根曰怯防勇戰此之謂也理城未畢會魏將黨法宗傅堅眼率眾二萬奄至城下道根塹壘未固城中眾少失色道根命廣開門緩服登城選精銳二百人出與魏軍, SBCK: 纂}
  - {type: variant, offset: 2778, length: 1132, content: 十餘騎奔射殺之而復還至其騎中解鞍令士皆縱馬臥是時會暮胡兵終怪之卒不敢擊向夜半時胡兵以為漢有伏軍於旁欲夜取之皆引兵去詰朝廣乃歸其軍後漢書曰廉范為雲中太守會匈奴大入塞范自率士卒拒之虜眾盛不敵會日暮令軍士各交縛兩炬三頭然火虜遙見火多謂漢兵救至待朝將退范乃令軍中蓐食晨往擊之斬首數百級虜自此不敢復向雲中又曰虞詡為武郡太守以討叛羌羌乃率眾數千遮詡於陳倉崤谷詡即停軍不進而宣言上書請兵須到當發聞之乃分抄傍縣詡因其兵散日夜進道兼行百餘里令吏士各作兩竈或曰孫臏減竈而君增之兵法日行不過三十里以戒不虞而今日且二百里何也詡曰虜眾多吾兵少徐行則易為所及速進則彼所不測虜見吾竈日增必謂郡兵來迎眾多行速必憚追我孫臏見弱吾今示強勢有不同故也既到郡兵不滿三千而羌眾萬餘攻圍赤亭數十日詡乃令中使強弩勿發先用小弩羌以為矢力弱不能至并兵急攻詡於是使二十強弩共射一人發無不中羌大震退詡因出城奮擊多所傷殺明日悉陳其眾令從東郭門出北郭門入換易衣服廻轉數周羌不知其數更相恐動詡計賊當退乃潛遣五百餘人於淺水設伏候其走路虜果奔因掩擊大破之通典曰後漢末陳登為廣陵守孫策遣軍攻登於匡琦城登使人求救於曹公而密去城十里理軍營處所令多取柴薪兩束一聚相去十步從橫成行令俱起火牙燃其聚城上稱慶若大軍到賊覩火驚潰登勒兵追奔斬首萬級也又曰蜀大將諸葛亮屯于陽平并兵東下亮唯留萬人守城魏將司馬宣王率二十萬眾拒亮當亮六十里所候邏白宣王說亮在城中力弱將士失色亮是時意氣自若勑軍皆臥旗息鼓不得輒出卷幔開四門掃地却洒宣王疑其有伏於是引軍北趣山亮謂參佐曰司馬懿謂吾有強伏循山走矣候邏還白亮所言宣王深以為恨又曰西晉將杜元凱伐吳陳兵于江陵遣牙門管定周旨伍巢等率奇兵八百汎舟夜度以襲樂鄉多張旗幟起火巴山出於要害之地以奪賊心吳都督孫歆震恐與吳將伍延書曰北來諸軍乃飛渡江也皆破之又曰東晉末宋武帝為將討海賊孫恩恩在扈瀆海鹽令鮑陋遣子嗣之以吳兵一千請為前驅宋武曰賊兵甚精吳人不習戰若前驅失利必敗我軍可在後為聲援不從是夜宋武多設伏兵兼置旗鼓然一處不過數人明日賊率眾乃萬餘迎戰前驅既交諸伏皆舉旗鳴鼓謂四面有軍乃引退嗣之追奔為賊所沒宋武且戰且退賊既盛所領死傷且盡宋武慮不免至向伏兵處乃止令左右脫取死人衣賊謂當走反停疑猶有伏宋武因呼更戰氣色甚猛賊以為然乃引軍去宋武徐歸然後散兵稍集又曰東齊末桓玄篡晉宋武帝起義討玄使將桓謙何湛之屯覆舟山武帝使羸弱登蔣山多張旗幟玄不之測大懼武帝與劉毅等分為數隊進突謙陣皆殊死戰無不一當百東北風急義軍放火煙塵漲天鼓譟之音震駭京邑謙等諸軍一時奔散又曰蕭齊將馮道根守阜陵城戍初到阜陵理城隍遠斥候有如敵將至者眾頗笑之道根曰怯防勇戰此之謂也理城未畢會魏將黨法宗傅堅眼率眾二萬奄至城下道根塹壘未固城中眾少失色道根命廣開門緩服登城選精銳二百人出與魏軍, WYG: 纂}
