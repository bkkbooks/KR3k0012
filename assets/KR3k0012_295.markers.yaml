  - {type: variant, offset: 14, length: 0, content: '', WYG: 去畱不定見機而作不得遵常汝今為營勢令兵去之後賊猶致疑不湏張幕可伐疑也時齊分軍萬人向千里逕又令其衆出汾水關自率大兵與椿對陣宇文盛馳騎告急憲自以千騎救之齊人覩谷中塵起相率遽退盛與柱國侯莫陳昺渉汾逐之多有斬獲俄而椿吿齊衆稍逼憲又廻軍赴之㑹被勅追還夜返齊人果謂椿張幕不疑軍退翌日始悟軍䜟曰夫用兵者必察敵國之情視其倉廩度其餘糧以卜其强弱運糧二百里者無二年之食也運糧三百里者無三年之糧也是謂虛國民窮上下不相親則有離叛心上行暴虐則下刻急相殘賊是為亡國若進惡不退羣賢隠蔽不肖在位國受其害内貪外廉竊公為恩飾躬正顔以獲髙官是謂盜端避銳孫子曰少而逃之高壁壘勿與戰也彼衆我寡師不可敵則軍自逃守匿其形也不若則能避之若兵避之强弱不敵勢不相若則引軍避之待利而動故小敵之堅大敵之擒小不能當大言小國不量其力敢與大邦為讐雖權時堅城固守然後必見擒獲春秋傳曰既不能强又不能弱所以敗}
