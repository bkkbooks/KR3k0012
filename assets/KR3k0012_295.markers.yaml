  - {type: variant, offset: 1291, length: 1, content: 寶, SBCK: 超圍廣固城數月不拔或􅀃􅁉曰昔石季龍攻曹嶷瞻氣者以爲澠水帶城澠音繩非可攻抜􅀂塞五龍口城必自䧟季龍從之而嶷降慕容恪圍叚龕亦如之而龕降降後無幾又震開之今舊跡猶在可塞之􅁉從其言於是城中男女患脚弱疾者太半時有蒼鵝飛入帳座衆咸驚愕其將曰蒼胡色也鵝者我也胡虜歸我之徵衆大恱將攻城諸將咸諌曰今往亡之日兵家所忌􅁉曰我往彼亡吉孰大焉乃命悉登遂尅平廣固又曰嶺南城盧循㓂建業宋武擊破之走至彭蠡湖乃悉力栅断左里大軍至左里將戰宋武所執麾竿折幡沉水衆並恠懼公歡􅀏曰徃年覆舟之戰幡竿亦折今者復然賊必破矣即攻柵而進循兵雖殊死戰弗能禁諸軍乘勝奔之循單舸走所殺及投水死凡萬餘人納其降附宥其逼掠遣劉藩孟懷玉輕軍追之循收散卒尚有數千人逕還廣州又秃髮利鹿􅀌}
  - {type: page-break, offset: 1291, content: '', id: KR3k0012_SBCK_295-7b}
  - {type: page-break, offset: 1291, content: '', id: KR3k0012_SBCK_295-8a}
  - {type: variant, offset: 1291, length: 1, content: 寶, WYG: 超圍廣固城數月不㧞或說裕曰昔石季龍攻曹嶷瞻氣者以為澠水帶城澠音黽非可攻㧞若塞五龍口城必自陷季龍從之而嶷降慕容恪圍段龕亦如之而龕降降後無幾又震開之今舊跡猶在可塞之裕從其言於是城中男女患脚弱疾者大半時有蒼鵝飛入帳座衆咸驚愕其將胡色曰鵝者我也敵人歸我之徴衆大悅將攻城諸咸諫曰今徃亡之日兵家所忌裕曰我徃彼亡吉孰大焉乃命悉登遂克平廣固宋書曰嶺南賊盧循㓂建業太祖擊破之走至彭蠡湖乃悉力柵斷左里大軍至左里將戰太祖所執麾竿折幡沉水衆並怪懼太祖笑曰徃年霸舟之戰幡竿亦折今者復然賊必破矣即攻柵而進循兵雖殊死戰弗能禁諸軍乗勝奔之循單騎走所殺及投池水死凡萬餘人納其降附宥其逼略遣劉籓孟懐玉輕車追之循收散卒尚有數千人徑還廣州又禿髪利烏孤}
