  - {type: variant, offset: 1108, length: 3, content: 孫策遣, WYG: 王郎起光武馳至下曲陽傳聞王郎兵在後從者恐及滹沱河候吏還白河水流澌澌音斯無船不可濟官屬大懼光武令霸徃視之霸恐驚衆欲且前阻水還即詭曰氷堅可渡官屬皆喜光武笑曰候吏果妄語也遂前比至河河氷亦合乃令霸䕶渡未畢數騎而氷解光武謂霸曰安吾衆得濟免者卿之力也霸謝曰此明公至徳神靈之佑雖武王白魚之應無以加此昔武王渡孟津白魚躍入王舟光武謂官屬曰王霸權以濟事殆天瑞也以為}
