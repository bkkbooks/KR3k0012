  - {type: variant, offset: 4249, length: 0, content: '', SBCK: 配歩􅀐五千擊秋引師岀振武夜有工梟鳴於牙中艾曰梟邀也六慱得梟者勝今梟鳴牙中尅敵之兆於是進戰大破之斬首五千級又曰後燕慕容寳遣將慕容賀麟}
  - {type: variant, offset: 4249, length: 0, content: '', WYG: 配歩騎五千擊秋引師出臨武威有梟鳥鳴於牙中艾曰梟邀也六愽得梟者勝今梟鳴牙中尅敵之兆於是進戰大破之斬首五千級又曰後燕慕容寳遣將慕容賀鱗率三萬餘人冦新市甲子晦後魏道武進軍討之太史令晁崇奏曰昔紂以甲子亡兵家忌不可出帝曰紂以甲子日亡周武不以甲子日勝乎崇無以對帝遂進軍新市賀鱗退阻𣲖水依漸洳澤以自固漸子亷切洳而據切甲戌帝臨其營戰於義臺塢大破之梁書曰庾域為華陽太守後魏軍攻圍南鄭時粮儲寡少人情恟懼恟許供切州有空倉數十所域手自封題指示將士云此中粟皆滿足支二年但努力堅守衆心以安虜退以功拜羽林監又曰楊公則随武帝大軍至新林公則自越城移屯領軍府壘北樓與南掖門相對嘗登樓望戰城中遥見麾蓋縱神鋒弩射之矢貫胡牀左右皆失色公則笑曰幾中吾脚談笑如初通典曰隋末李密據興洛倉破宇文化及還士卒皆疲倦隋將王充欲乗其弊而擊之恐衆心不一乃假託鬼神云夢見周公乃立祠於洛水上遣巫宣言公欲令今僕射討李密當有大功否則兵皆疲死充兵多楚人故妖言以惑之衆皆請戰遂破密唐書曰髙祖為山西河東撫慰大使行至太平關遇賊數千人時所將兵少左右皆懼髙祖謂之曰此烏合之賊易與耳因}
