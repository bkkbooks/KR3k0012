  - {type: variant, offset: 714, length: 3, content: 彼三晉, SBCK: 髙帝巳封大功臣二十餘人其餘日夜爭功不决未得行封帝在洛陽南宮從􅃨道遥見諸將徃徃相與坐沙中語張良曰陛下起布衣以此屬取天下今爲天子而所封皆蕭曹故人及親愛而所誅者皆生平所仇怨今軍吏計功以天下不足遍封此屬畏陛下不能尽封又恐見疑平生過失及誅故即相聚謀反耳帝憂曰爲}
