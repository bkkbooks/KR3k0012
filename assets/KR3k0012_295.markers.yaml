  - {type: variant, offset: 704, length: 2, content: 去韓, SBCK: 或以爲在今誠以吾衆爲天下唱冝多應者謂首号令廣以爲然迺行卜卜者知其指意曰足下事皆成功然足下卜之􅀑乎卜者云事成有功然須假託􅀑神乃可興起耳故勝廣曉其意則爲魚書狐鳴以威衆也勝廣喜念􅀑曰此敎我先威衆耳廼丹書帛曰陳勝王置所􅊻魚腹中罾音曾卒買魚烹食得書巳怪之矣又間令廣之所次旁叢祠中夜搆火狐鳴呼曰大楚興陳勝王間謂􅀼令人行也密於廣所次舎處旁側叢祠中爲之叢謂草木之岑蔚者也祠神祠也構謂結起也呼火故切卒皆夜驚恐朝日卒中徃徃指目勝廣因}
  - {type: variant, offset: 704, length: 2, content: 去韓, WYG: 或以為在今誠以吾衆為天下倡宜多應者謂首號令廣以為然乃行卜卜者知其指意曰足下皆成功然足下卜之鬼乎卜者云事成有功然湏假托鬼神乃可興起耳故勝廣曉其意則為魚書狐鳴以威衆也勝廣喜念鬼曰此教我先威衆耳廼丹書帛曰陳勝王置所罾魚腹中罾音曽卒買魚烹食得書已怪之矣又間令廣之次近所旁叢祠中夜篝火狐鳴呼曰大楚興陳勝王間謂竊令人行也宻於廣所次舍處旁側叢祠中謂之叢謂草木之岑蔚者也祠神祠也搆謂結起也呼火故切卒皆夜驚恐朝日卒中徃徃指目勝廣因}
