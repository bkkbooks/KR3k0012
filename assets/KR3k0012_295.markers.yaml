  - {type: variant, offset: 2034, length: 689, content: 而歸百濮離居將各走其邑誰暇謀人乃出師旬有五日百濮乃罷自廬以往振廩同食往往伐庸也振發也廩倉也同食上下無異饌也又曰晉文公率諸侯伐楚楚將子玉從晉師晉退三舍楚師不止又次于城濮楚師背酅而舍酅丘陵險阻名也酅音攜文公患之聽輿人之誦恐眾畏險故聽其歌誦也曰原田莓莓舍其舊而新是謀高平曰原喻晉軍美盛若原田草也莓然可以謀立新功不足念舊惠也晉大夫狐偃曰戰也戰而捷必得諸侯若其不捷表裏山河必無害也晉國外河而內山也晉車七百乘韅靷鞅靽五萬二千五百人也在背曰韅在胸曰靷在腹曰鞅在後曰靽言駕乘修備韅呼見切靷與進切晉侯登有莘之墟以觀師曰少長有禮其可用也有莘故國名也遂伐其木以益其兵伐木以益攻戰之具盖亦示強也終敗楚師又曰晉侯伐齊齊侯登巫山以觀晉人使司馬斥山澤之險雖所不至必斾而䟽陣之斥候也䟽建旌旗以為陣示眾也使乘車者左實右偽以斾先偽以衣物為人形也建斾以先驅輿曳柴而從之以揚麈齊侯見之畏其眾也乃脫歸脫不張旌幟也又曰蔡聲子聘楚謂令尹屈建曰子儀之亂折公奔晉以為謀主繞角之役析公曰楚師輕佻易震蕩也若多鼓鈞聲以夜軍之鈞同其聲楚師必遁晉人從之楚師宵潰晉遂侵蔡襲沈獲其君敗申息之師于桑隧獲申麗而還鄭於是不敢南面楚失諸華則析公之為也漢書曰景帝時匈奴大入上郡天子使中貴人從李廣中官之幸貴也勒習兵擊匈奴貴人將數十騎出獵見匈奴三人與戰被射傷中貴人煞其騎且盡中貴人走廣廣曰是必匈奴射鵰者也鵰善飛故使善射者射之廣乃遂從百騎往馳三人令騎左右翼而廣身射彼三者殺其二人生得一人果射鵰者也遙見匈奴有數千騎廣以為誘騎驚上山陣廣之百騎皆大恐還馳走廣曰吾去大軍數十里今若走匈奴追射我立盡今我留匈奴必以我為大軍誘之必不敢擊我廣令諸騎曰前到匈奴陣二里所止令曰皆, SBCK: 傉檀}
