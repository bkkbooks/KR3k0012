  body:
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 五十拒守上孫子曰昔之善戰者先爲不可勝先諮之廟堂虜其危難然後髙壘􅀷溝使兵士練習故敵不得勝以待敵之可勝以此守備之固待敵之闕則可勝也不可勝在己言守備之固制敵在外也可勝在敵守備之固自脩理以􅀱敵之虗解巳見敵敵有闕漏之形然後可勝也故善戰者能爲不可勝不能使敵必不可勝巳􅀂敵曉練兵事䇿與道合􅀷爲已備者亦不可強勝故曰勝可知見成形也而不可爲也敵有備也已料見形者則勝􅀒可知􅀂敵宻而無形亦不可強使爲敗故范蠡曰時不至不可強生事不究不可強成不可勝者守也形藏也􅀂未見其形彼衆我寡則自守也可勝者攻也敵攻巳乃可勝也己見其形彼寡我衆則可攻故善守者藏於九地之下善守備者務因其山川之阻丘􅁜之固使不知所攻言其􅀷宻藏於九地之下又曰城有所不攻固而多重易曰利用禦㓂不利爲㓂左傳曰晉侯伐齊齊侯禦諸平隂壍防門而守之廣里夙沙衛曰不能戰莫如守險􅀳將范宣子告齊大夫折文子曰吾知子敢匿情乎魯人莒人皆請以車千乗自其郷入旣許之矣􅀂入君必失國子盍圖之子家以告公公恐晏嬰間之曰君固無勇而又聞是弗能乆矣不能乆敵齊師夜遁又曰倍則攻敵則戰少則守後漢書曰涼州賊王國圍陳倉左將軍皇甫嵩督前軍董卓救之卓欲進赴陳倉嵩不聽卓曰智者不後時勇者不留決速救則城全不救則城滅全滅之􅀔在於此也嵩曰不然百戰百勝不如不戰而屈人之兵是以先爲不可勝以待敵之可勝不可勝在我可勝在彼彼守不足我攻有餘有餘者動於九天之上不足者䧟於九地之下今陳倉雖小城守固備非九地之䧟也王國雖強而攻我之所不救非九天之􅀔夫􅀔非九天攻者受害䧟非九地守者不㧞國今巳䧟受害之地而陳倉保不􅂢之地我可不煩兵動衆而取全勝之功將何救焉遂不聽王國陳倉自冬迄春八十餘日城堅守固竟不能㧞賊衆疲弊果自解去又曰來歙與征虜將軍􅀕遵襲略陽遵道病還分遣精兵隨歙合二千餘人伐山開道從畨湏迴中畨湏廻中並地名也畨音盤武帝元封}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_SBCK_319-1b}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_SBCK_319-2a}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 五十拒守拒守上孫子曰昔之善戰者先為不可勝先諮之廟堂慮其危難然後髙壘深溝使兵士練習故敵不得勝以待敵之可勝以此守備之固待敵之闕則可勝也不可勝在己言守備之固制敵在外也可勝在敵守備之固自脩理以俟敵之虛懈已見敵人有闕漏之形然後可勝故善戰者能為不可勝不可使敵必不可勝若敵曉練兵事䇿與道合深為已備者亦不可強勝故曰勝可知見成形也而不可為也敵有備也已料見形者則勝負可知若敵宻而無形亦不可强使為欺故范蠡曰時不至不可強生事不究不可強成不可勝者守也形藏也若未見其形彼衆我寡則自守也可勝者攻也故善守者藏於九地之下善守備者務因其山川之阻丘陵之固使不知所故言其深宻藏於九地之下又曰城有所不攻固而重多易曰利用禦冦不利為冦左傳曰晉侯伐齊齊侯禦諸平隂塹防門而守之廣里夙沙衞曰不能戰莫如守險弗聽范宣子告齊大夫析文子曰吾知子敢匿情乎魯人莒人皆請以車千乗自其鄉入既許之矣若入君必失國子盍圖之子家以告公公恐晏嬰聞之曰君故無勇而又聞是弗能久矣齊師夜遁又曰倍則攻敵則戰少則守後漢書曰涼州賊王國圍陳倉左將軍皇甫嵩督前將軍董卓救之卓欲進赴陳倉嵩不聽卓曰知者不後時勇者不留决速救則城全不救則城滅全滅之勢在於此也嵩曰不然百戰百勝不如不戰而屈人之兵是以為不可勝以待敵之可勝不可勝在我可勝在彼彼守不足我攻有餘有餘者動於九天之上不足者陷於九地之下今陳倉雖小城守固備非九地之陷也王國雖强而攻我之所不救非九天之勢非九天攻者受害陷非九地守者不㧞國今已䧟害受之地而陳倉保不拔之地我可不煩兵動衆而取全勝之功將何救焉遂不聽王國圍陳倉自冬迄春八十餘日城堅守固竟不能㧞賊衆疲弊果自解去又曰來歙與征虜將軍祭遵襲畧陽遵道病還分遣精兵隨歙合二千餘人伐山開道從畨湏迴中畨湏迴中並地名也畨音盤武帝元封}
