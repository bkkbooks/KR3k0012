  - {type: variant, offset: 482, length: 5, content: 魏眾既多弩, SBCK: 曰僕之破亡在於晷漏誠知殺卿無益然人臣之節守之以死乃流涕斬之并収紹宗等尸以禮埋􅄟又曰將賀􅀂敦率歩􅀐六千渡江取陳湘川陳將侯瑱討之江路遂斷糧援旣絶人懷危懼敦於是分兵抄掠以充資費恐瑱等知其糧少乃於營内聚土覆之以米集諸營軍士人各持囊遣官司部分􅀂給糧者因召側近村民佯有所訪問令於營外遥見隨即遣之瑱等聞之良以爲實乃據守要險欲曠日老敦敦又増脩營壘造廬舎示以持乆敦軍數有叛人乗馬投瑱者遂納之敦又別取一馬趣􅂳􅂳中逆以鞭鞭之如是者再三馬便畏􅂳不上後伏兵於江岸遣人乗畏􅂳馬以招瑱軍詐稱降附瑱遣兵迎接竟來牽馬馬旣畏􅂳不上敦發伏掩之盡殪又湘之人乗輕􅂳載米粟乃籠鷄鴨以餉瑱軍敦患之乃爲土人裝􅂳伏甲士於中瑱兵見之謂餉舡至逆來爭之敦甲士出而擒之此後實有饋餉乃亡命奔瑱者猶謂敦之設詐逆遣扞擊並不敢受相持歳餘瑱}
  - {type: page-break, offset: 482, content: '', id: KR3k0012_SBCK_319-6b}
  - {type: variant, offset: 482, length: 2, content: 魏眾, WYG: 曰僕之破亡在於晷漏誠知殺卿無益然人臣之節守之以死乃流涕斬之并收紹宗等尸以禮埋瘞又曰賀若敦率步騎六千渡江取陳湘州陳將侯瑱禦之江路遂斷糧援}
