  - {type: variant, offset: 3, length: 0, content: '', WYG: 年幸雍通回中道前書音義曰回中在今隴州􅊈源縣也徑至畧陽斬隗囂守將金梁因其保域囂大驚曰何其神也東觀漢記曰上聞得畧陽甚悦左右怪上數破大敵今得小城何足喜上曰畧陽囂所依阻心腹已壞則制其支體易也乃悉兵數萬人圍略陽斬山築堤激水灌城歙與將士固死堅守矢盡乃發屋斷木以為兵囂盡鋭攻之自春至秋其士卒疲弊帝乃大發關東兵自將上隴囂衆潰走圍解於是置酒髙㑹勞賜歙班坐絶席在諸將之右賜歙妻縑千疋召使留屯長安悉監䕶諸將又曰大司徒鄧禹西征定河東張宗詣禹自歸禹聞宗素多權謀表為偏將軍禹軍到栒邑赤眉大衆且至禹以栒邑不足守欲引師進就堅城而衆人多畏賊追憚為後拒禹乃書諸將名于竹簡署其前後亂著笥中令各探之笥以竹為之鄭𤣥注禮記云圎曰簟方曰笥宗獨不肯探曰死生有命張宗豈辭難就逸乎禹嘆息謂曰將軍有親弱在營奈何不顧宗曰愚聞一卒畢力百人不當萬夫致死可以横行宗今擁兵數千以承大威何遽其必敗乎遂留為後拒諸營既引兵宗方勒厲軍士堅壘壁以死當之禹到前縣議曰以張將軍之衆當百萬之師猶以小雪投沸湯雖欲戮力其勢不全也乃遣步騎二千人反還迎宗宗引兵始發而赤眉至宗與戰却之乃得歸營於是諸將服其勇又曰隗囂大將王捷别在戎丘登城呼漢軍曰為隗王城守者皆必死無二心願諸軍亟罷亟紀力切請自殺以明之遂自剄死又曰世祖即位遣宗正劉延攻天井關與田邑連戰}
