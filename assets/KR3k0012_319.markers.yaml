  - {type: variant, offset: 3579, length: 0, content: '', SBCK: 當百齊師必却乃令妻妾軍民子女晝夜脩城三日而就帝率六軍亦至齊師解圍營於城東十餘里士彦見帝持帝􅂡而泣曰臣幾不見陛下帝亦爲之流涕時帝以將士疲倦意欲班師士庻叩馬而諌曰今齊師遁衆心皆動因其懼也而攻之其􅀔必舉帝從之大軍遂進帝執其手曰余之有晉州爲平齊之基􅀂不固守則事不諧矣朕無前慮惟恐後變善爲我守之又曰郭榮宇文護擢中外府水曹叅軍時齊㓂屢侵護令榮於汾州觀賊形􅀔時汾州與姚襄鎭相去懸逺榮以爲二城􅀌逈􅀔不相救請於州鎭之間更築一城以相控攝護從之俄而齊將祖孝先攻䧟姚襄汾州二城唯榮所立者獨}
