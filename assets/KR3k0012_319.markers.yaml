  - {type: variant, offset: 1936, length: 230, content: 頴水灌城陷之思政知事不濟率左右據土山謂之曰吾受國任遂辱王命力屈道窮計無所出唯當効死以謝朝恩仰天大哭左右皆號慟思政向西再拜便欲自剄先是齊文襄告城中人曰有生致王大將軍者封侯重賞若大將軍身有損親近左右皆從大戮都督駱訓謂思政曰公常語訓等但將我頭降非但得富貴亦是活一城人今高襄既有此語公豈不哀城中士卒也固共止之不得引決齊文襄遣其散騎常侍趙彥深就土山執手申意引見文襄辭氣慷慨涕泗交流無屈撓之容文襄以其忠於所事禮遇甚厚思政初入頴川士卒八千人及城陷之日存者纔三千人遂無叛者後周, SBCK: 全隋}
