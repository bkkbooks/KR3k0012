  - {type: variant, offset: 485, length: 2, content: 多弩, WYG: 絶人懐危懼敦於是分兵抄掠以充資費恐瑱等知其糧少乃入營内聚土覆之以米集諸營軍士人各持囊遣官司部分若給糧者因召側近村民佯有所訪問令於營外遥見隨即遣之瑱等聞知良以為實乃據守要險欲曠日老師敦又増修營壘造廬舍示以持久敦軍數有叛人乗馬投瑱者遂納之敦又别取一馬趣船令船中逆以鞭鞭之如是者再三馬便畏船不上後伏兵於江岸遣人乗畏船馬以招瑱軍詐稱降附瑱遣兵迎接竟來牽馬馬既畏船不上敦發伏掩之盡殪又湘之人乗輕船載米粟及籠雞鴨以餉瑱軍敦患之乃為土人甲士出而擒之此後實有饋餉及亡命奔瑱者猶謂敦之設詐逆遣押擊並不敢受相持嵗餘瑱}
