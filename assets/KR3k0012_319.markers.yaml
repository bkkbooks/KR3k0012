  - {type: variant, offset: 3043, length: 528, content: 必不憚於野戰今若攻其城柵乃是出其不意滅賊之機唯在此舉靖乃率諸將水戰俱苦戰破之二軍悉潰走靖遂率輕兵先至丹陽公祏餘眾雖多不敢戰擁兵東走並相次擒獲又曰高祖率眾攻屈突通於河東士卒登城南面者已千餘人高祖在東原望之而不見會暴雨至鳴角止軍由是不剋或勸遂攻之高祖曰屈突通習兵而無勇若決戰非其所長嬰城難以必勝此自守虜耳不足為虞遂收軍營於河渚又曰薛萬均圍梁師都突厥不敢來援諸將見賊城險固皆有憚色萬均謂之曰城中無氣鼓聲不徹此見敗亡之候平在旦夕諸君勿以為憂俄而師都見殺城降又曰天寶末祿山反尚衡起義兵討祿山以王栖曜為牙旗將下兗鄆諸縣軍威稍振兼衙前總管復下曹州初逆將邢超然乘城號令栖曜曰彼可取也一箭殞之城中氣懾遂下又曰馬燧自京還太原初田悅新代承嗣統兵恐人不附己詐示誠款燧上䟽明其必反宜先備之其年悅果與青恒州通謀自將兵五萬圍邢州攻臨洺築重城內絕其外以拒救兵邢州將李洪臨洺將張伾皆堅守不拔昭義軍數告急乃詔燧將救臨洺燧軍出崞口兵未過險乃遣人持書喻說且示之好悅謂燧畏之十一月師次邯鄲悅遣使至斬之以徇遣兵擊破其支軍射殺其將成鉉之悅自攻臨洺遣大將楊朝先將兵萬餘於臨洺南雙崗下東西列二柵以禦燧燧乃率李抱真李晟進軍營於二柵之中其夜東柵走歸悅進軍營明山取其棄柵以置輜重謂將吏曰朝先守堅柵不下萬人彼令悅等, SBCK: ''}
