  - {type: variant, offset: 2462, length: 429, content: 顧漸密又曰陳稜大業三年拜賀武賁郎將後三歲與朝議大夫張鎮周發東陽兵萬餘人自義安汎海擊流求國月餘而至流求人初見舩艦以為啇旅往往詣軍中貿易稜率眾登岸遣鎮周為先鋒其主歡斯渴剌兜遣兵拒戰鎮周頻擊破之稜進至低沒檀洞其小王歡老摸率兵拒戰稜擊敗之斬老摸其日霧雨晦暝將士皆懼稜刑白馬以祭海神既而開霽分為五軍趍其都邑渴剌兜率眾數千逆拒稜遣鎮周又先鋒擊走之稜乘勝逐北至其柵渴剌兜背柵而陣稜盡銳擊之從晨至未苦鬥不息渴剌兜自以軍疲引入柵稜遂填墳壍攻破其柵斬渴剌兜獲其子島槌虜男女數千而歸帝大悅進稜位右光祿大夫武賁如故唐書曰武德初宇文化及據聊城淮安王神通進兵躡之祕書丞徵謂神通曰化及今據聊城莘人為其固守若至莘即宜攻取但拔莘縣聊城益懼因而逼之易同俯拾須以攻具自隨一足威敵二不乏用不然兵至莘城見無攻具不下如不能剋莘而遠追化及恐亦無功則化及非旬月可獲莘人阻我糧運士及為之外援恐非計之善者神通不從軍次莘果不下而退敗又曰武德中李靖隋河間王孝恭討輔公祏音石賊一軍舟師三萬頓于當塗柵斷江口傍江築城又遣, SBCK: 緫}
