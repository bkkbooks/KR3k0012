  - {type: variant, offset: 462, length: 0, content: '', SBCK: 前欲以填塹刺史蔡道恭塹内作蒙艟􅋐艦以待之魏人不得進又潛作伏道以決壍水道恭載土填塞之相持百餘日前後斬獲不可勝計魏大造梯衝攻圍日急道恭用四石烏􅃮大弓射所中皆洞甲飲羽一}
  - {type: punctuation, offset: 463, content: ，, id: KR3k0012_CHANT_319-bkkpn94}
  - {type: 'tls:seg', offset: 463, content: '', id: KR3k0012_CHANT_319-3a.42}
  - {type: variant, offset: 463, length: 2, content: 寅薄, SBCK: 或貫兩人敵人望弓皆靡又於城内作土山多作大矟長二丈五尺施長刃使壯士執以刺魏人魏軍甚憚之陳書曰冝黄侯慧紀鎭荆州隨師濟江慧紀率將士三萬人舡艦千餘乗㳂江而下欲趣臺城遣南康太守吕肅將兵據巫峽以五條鐡鎻横江肅竭其􅀻財以充軍用隋將楊素􅁬兵擊之四十餘戰爭馬鞍山及磨刀澗守險隋軍死者五千人陳人盡取其鼻以求功賞旣而隋軍屢捷獲陳之士三縱之肅乃遁後周書曰李遷哲天和三年進位大將軍詔遷哲率金上等諸州兵鎭襄陽五年陳將章昭逹}
  - {type: page-break, offset: 463, content: '', id: KR3k0012_SBCK_319-4b}
  - {type: variant, offset: 466, length: 0, content: '', SBCK: 逼江陵梁主蕭告急於襄州衛公直令遷哲徃救焉遷哲率其所部守江陵外城與陳將程文季交戰兵稍却遷哲乃親自䧟陣手殺數人㑹江陵㹅管陸騰出兵助之陳人又因水汎長壞龍川寜朔堤引水灌城城中驚擾遷哲乃先塞水又募驍勇出擊之頻有斬獲衆心稍定俄而敵人郭内焚燒人家遷哲自率􅀐出南門又令歩兵自北門出兩軍合勢首尾邀之陳人復敗多投水而死是夜陳人又竊於城西堞以梯登者巳百數人遷哲又率驍勇扞之陳人復潰俄而大風􅁀起遷哲乗闇出兵擊其}
  - {type: punctuation, offset: 467, content: 。, id: KR3k0012_CHANT_319-bkkpn95}
  - {type: 'tls:seg', offset: 467, content: '', id: KR3k0012_CHANT_319-3a.43}
  - {type: variant, offset: 467, length: 0, content: '', SBCK: 陳人大亂殺傷甚衆陸騰復破之於西堤陳人乃遁又曰太祖以王羆爲荆州刺史進號撫軍將軍梁復遣曹義宗衆數萬國荆州堰水灌城不没者數板時旣内外多虞未遑救援乃遺羆鐡劵云城全當授夲州刺史城中糧盡羆煑粥與將士均分而食之每出戰嘗不擐甲胄大呼曰荆州城孝文皇帝所置天􅀂不祐國家使賊箭中王羆不爾王羆湏破賊屢經戰陣亦不􅀍傷彌歴三年義宗方退進封霸城縣公㝷遷車􅀐大將軍又曰王羆華州刺史沙苑之役齊神武士馬甚盛太祖以華州衝要遣使勞羆令加守備羆語使人曰老羆當道卧驩子安得過太祖聞而壯之及齊神武至城下謂羆曰何不早降羆乃大呼曰此城是王羆家生死在此欲死者來齊神武遂不敢攻又曰王思政守頴川兼河南諸軍事東魏太尉髙岳行臺慕容紹宗儀同劉豐生等率􅀐十萬來攻頴川城内卧鼓偃旗􅀂無人者岳恃其衆謂一戰可屠乃四面鼓噪而上思政選城中驍勇開門出入岳衆不能當引軍亂退思政登城遥見岳陣不整乃率歩􅀐三千出邀擊之殺傷甚衆然後還城設守禦之備岳知不可卒攻乃多修營壘又隨地􅀔髙處築土山以臨城中飛梯大車晝夜盡攻擊之法思政亦作火鑚子筭切因迅風便投之土山又以火箭射之燒其攻具仍募勇士縋而出戰岳衆披靡其守土山人亦弃山而走思政即命據其兩土山置折堞以助防守岳等}
