  - {type: variant, offset: 481, length: 0, content: '', SBCK: 城中俄而大風􅁀起􅂳乃飄至城下城上人以長鈎牽船弓弩亂發紹宗窮急透水而死豐生向土山復中矢而斃生擒永珎思政謂}
