  - {type: variant, offset: 4, length: 6, content: 九攻圍下王隱, SBCK: 餘合延不得進邑迎母弟妻子爲延所獲東觀漢記曰鄧禹使積弩將軍馮愔將兵擊邑愔悉得邑母弟妻子後邑聞更始敗乃遣使詣洛陽獻璧馬即拜爲上黨太守}
