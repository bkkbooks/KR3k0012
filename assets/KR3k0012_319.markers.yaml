  - {type: variant, offset: 14, length: 3, content: 約為豫, krp: 逖周訪又曰呉彦爲呉建平太守時王濬將伐呉造舡於蜀彦覺之請増矣爲備皓不從彦乃輙爲鐡鎻撗断江路及師臨境縁江諸城皆望風降附或見攻而㧞唯彦堅守大衆攻之不能剋退舎禮之梁書曰侯景反兵逼建業衆皆兇懼梁將羊侃爲守城督侃僞稱得外射書云邵陵王西昌侯兵巳至路衆乃少安賊爲尖頭木驢攻城矢石所不能制侃作雉尾炬施鐡鏃以油灌之擲驢上燒之俄盡賊又東西四面起土山以臨城城中震駭侃命爲地道潛引其土山不能立賊又作登城樓車髙十餘丈欲臨射城内侃曰車髙塹虗彼來必倒可卧而觀之不勞設備及車動果倒衆皆服焉賊頻攻不捷㑹侃病死城方䧟又曰蔡道恭爲司}
  - {type: variant, offset: 16, length: 1, content: 豫, WYG: 吳建平太守時王濬將伐吳造船於蜀彦覺之請増兵為備皓不從彦乃輙為鐵鎖横斷江路及師臨境縁江諸城皆望風降附或見攻而㧞唯彦堅守大衆攻之不能剋退舎禮之梁書曰侯景反兵偪建業衆皆兇懼羊侃副宣城王督諸軍偽稱得外射書云邵陵王西昌侯已至近路衆乃少安賊為尖頂木驢攻城矢石所不能制侃作雉尾炬施鐵鏃以油灌之擲驢上燒之俄盡賊又東西兩面起土山以臨城城中震駭侃命為地道􅅗引其土山不能立賊又作登城樓車髙十餘丈欲臨射城内侃曰車髙塹虛彼來必倒可卧而觀之不勞設備及車動果倒衆皆服焉賊步攻不捷㑹侃病死城方陷南史曰蔡道恭為司}
