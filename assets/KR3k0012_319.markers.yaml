  - {type: variant, offset: 26, length: 0, content: '', WYG: 風暴起遷哲乗闇出兵擊其營陳人大亂殺傷甚衆陸騰復破之於西堤陳人乃遁又曰太祖以王羆為荆州刺史進號撫軍將軍梁復遣曹義宗衆數萬圍荆州堰水灌城不沒者數版時既内外多虞未遑救援乃遺羆鐵劵云城全當授本州刺史糧盡羆煮粥與將士均分而食之每出}
