  - {type: variant, offset: 490, length: 1418, content: 超石初行別齎大搥并千餘張矟乃斷矟長四尺以搥搥之一矟輒洞貫三四人魏眾不能當一時奔潰宋書曰晉義熙五年六月偽燕主慕容超留羸老守廣固使其廣甯王賀刺盧及公孫五樓悉力據臨朐去城四十里有臣夢水超告五樓急據之北至為龍符所保五樓乃退大軍分四千兩車為二翼方軌徐行車悉張幰御者執矟以騎為遊軍軍令嚴肅比及臨朐賊騎交至帝命兗州刺史劉藩荊州刺史劉道鄰等陷其陣日向昃戰猶酣帝用參軍胡藩策襲剋臨朐賊乃大奔超遁還廣固獲其玉璽豹尾輦等送于都景子剋廣固大城超固其小城乃築長圍以守之館穀於青土停江淮轉輸又曰朱循之隨右軍到彥之北自河南廻循之留戍滑臺被魏將安頡攻之圍糧絕將士熏鼠食之循之被圍既久母常悲憂忽一旦乳汁驚出母號慟告家人曰我年老非復有乳汁時今如此兒必沒矣魏果以其日剋滑臺囚之又曰宗越為長水校尉竟陵王誕據廣陵反越領軍馬隸沈慶之攻誕及城陷孝武使悉殺城內男丁越受旨行誅躬臨其事莫不先加捶楚或有鞭其面者欣然有所得殺凡數千人改封始安縣子三國典略曰侯景收其餘眾步騎八百南過小城城人登埤詬之曰跛腳奴景怒攻城拔之殺詬者而去又曰周王思政固守頴川高岳久圍不解陳元康言於齊王澄曰公自匡輔朝政未有殊功雖敗侯景本非外賊潁城將陷願公因而乘之足以取威定業王從之於是親至頴川益發其眾號曰決命夫更起土山王坐於堰上趙道德言於王曰箭頭有鐵不避大王引王帶而下箭集於王唑之所梁書曰武帝自襄陽率兵東下至郢州攻未拔蕭頴冑在江陵遣衛尉席闡文勞軍因謂梁武曰今頓兵兩岸不併軍圍郢定西陽武昌取江州此機已失莫若請救於魏與北連和猶為上策梁武謂闡文曰漢口路通荊雍控引秦梁糧運資儲聽此氣息兵若進魯山必阻河路所謂搤喉若糧運不通自然離散何謂持久劉元起近欲以三千往定尋陽彼若懽然悟機一酈生亦足脫拒我師固非三千能下西陽武昌取使耳得便應鎮守兩城不減萬人糧儲稱足卒無所出脫東君有上者萬人攻一城兩城勢不相救若我分軍應援首尾俱弱如其不遣孤城必陷一城既沒諸城相次土崩天下大事於是去矣若郢州既拔席卷沿流西陽武昌自然風靡何遽分兵散眾自貽其憂且丈夫舉動言靜天步況擁七州之兵以誅群豎懸河注火奚有不滅豈容北面請救以自示弱彼未必能信徒貽我醜聲此之下計何謂上策及拔郢城向下城戍無不風靡遂剋建業崔鴻十六國春秋曰前燕將慕容恪率兵討叚龕於廣固恪圍之諸將勸恪宜急攻之恪曰軍勢有宜緩以剋敵有宜急而取之若彼我勢均且須強援虜腹背之患者須急攻之以速大利如其我強彼弱外無寇援力足制之者當羈縻守之以待其弊兵法十圍五攻此之謂也龕恩結賊黨眾未離心今憑固天險上下同心攻守勢倍軍之常法若其促攻不過數旬剋之必矣但恐傷吾士眾當持久以取耳乃築室返耕嚴固圍壘終剋廣固又曰燕將呂護據野王陰通晉事覺燕將慕容恪等率眾討之將軍傅顏言於恪曰護窮寇假合王師既臨則上下喪氣必士卒攝魂敗亡之驗也殿下前以廣固天險守易攻難故為長久之策今賊形便不與往同宜急攻之以省千金之費恪曰護老賊經變多矣觀其為備之道未易卒圖令圈之窮城樵採路絕內無蓄積外無強援不過十旬其斃必矣何必遽殘士卒之命而趍一時之利哉吾嚴濬圍壘休養將卒以重官美貨間而離之事淹勢窮其釁易動我則未勞而寇已弊此謂兵不血刃坐以制勝也遂長圍守之凡經六月而野王潰護南奔于晉悉降其眾後魏書曰齊神武起義兵於河北被爾朱兆天光度律仲遠等四將同會鄴南士馬精強號二十萬圍於鄴南韓陵山時神武馬二千步不滿三萬兆等及圍不合神武連繫牛驢自塞之於是將士死戰四面奮擊大破兆等又曰燕鳳字子章代人也少好學愽綜經史明習陰陽讖緯昭成以禮迎致之鳳不應聘命諸軍圍代城人曰燕鳳不來吾將屠汝代人懼送鳳昭城與語大悅待以賓禮, SBCK: ''}
