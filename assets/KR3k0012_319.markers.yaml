  - {type: variant, offset: 123, length: 282, content: 知風偶自轉為能感動晉書曰趙王倫孫秀為義師所討日蹙乃與秀謀或欲收餘卒出戰或欲焚燒宮室誅殺不赴己者或欲乘船東走入海計未決王與率營兵七百餘人自南掖門入勑宮中兵各守衛諸門三部司馬為應於內與自往攻秀秀閉中書南門與放兵登墻燒屋秀及左右遽走出左衛將軍趙泉斬秀等以徇又曰劉𥙿率兵伐後秦姚泓後魏遣將鵝青等步騎十萬屯河北有數千騎緣河隨晉軍進止時軍人緣河南岸牽百丈河流迅急有漂渡北岸者輒為魏人所殺掠遣軍纔過岸即退軍還復來宋武乃遣白直隊主丁旿音午率七百人及車百乘於河北岸上去水百餘步為却月陣兩頭抱河車置七仗士事畢使豎一白眊仍吏功羽毛飾魏人見數百人步牽車上不解其意並未動宋武先命朱超石戒嚴二, SBCK: 滿五}
