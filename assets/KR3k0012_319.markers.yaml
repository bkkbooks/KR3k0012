  - {type: variant, offset: 2548, length: 669, content: 拒戰鎮周頻擊破之稜進至低沒檀洞其小王歡老摸率兵拒戰稜擊敗之斬老摸其日霧雨晦暝將士皆懼稜刑白馬以祭海神既而開霽分為五軍趍其都邑渴剌兜率眾數千逆拒稜遣鎮周又先鋒擊走之稜乘勝逐北至其柵渴剌兜背柵而陣稜盡銳擊之從晨至未苦鬥不息渴剌兜自以軍疲引入柵稜遂填墳壍攻破其柵斬渴剌兜獲其子島槌虜男女數千而歸帝大悅進稜位右光祿大夫武賁如故唐書曰武德初宇文化及據聊城淮安王神通進兵躡之祕書丞徵謂神通曰化及今據聊城莘人為其固守若至莘即宜攻取但拔莘縣聊城益懼因而逼之易同俯拾須以攻具自隨一足威敵二不乏用不然兵至莘城見無攻具不下如不能剋莘而遠追化及恐亦無功則化及非旬月可獲莘人阻我糧運士及為之外援恐非計之善者神通不從軍次莘果不下而退敗又曰武德中李靖隋河間王孝恭討輔公祏音石賊一軍舟師三萬頓于當塗柵斷江口傍江築城又遣六軍二萬據當塗南路亦造柵自固並蓄力養銳以抗大軍諸將皆云二軍並是強兵為不戰之計城柵既固率不可攻請直指丹陽掩其巢穴若丹陽既破二軍可不戰而破靖曰公祏精銳雖在水陸二軍然其自統之兵亦是勁勇二軍城柵尚不可攻公祏既保石頭豈應易拔若我師師至丹陽留停旬日進則石頭未平退則歸路已絕此便腹背受敵恐非萬全之計然此二軍皆是百戰餘賊必不憚於野戰今若攻其城柵乃是出其不意滅賊之機唯在此舉靖乃率諸將水戰俱苦戰破之二軍悉潰走靖遂率輕兵先至丹陽公祏餘眾雖多不敢戰擁兵東走並相次擒獲又曰高祖率眾攻屈突通於河東士卒登城南面者已千餘人高祖在東原望之而不見會暴雨至鳴角止軍由是不剋或勸遂攻之高祖曰屈突通習兵而無勇若決戰非其所長嬰城難以必勝此自守虜耳不足為虞遂收軍營於河渚又曰薛萬均圍梁師都突厥不敢, WYG: ''}
