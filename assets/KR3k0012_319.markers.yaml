  - {type: variant, offset: 3, length: 0, content: '', SBCK: 年幸雍通囬中道前書音義曰回中在汧汧今隴州汧元縣也徑至略陽徑直也斬􅅝守將金梁因其保城􅅝大驚曰何其神也東􅀚漢記曰上聞得略陽甚恱左右怪上數破大敵今得小城何足以喜然上以略陽􅅝所依阻心腹巳壞制則其支躰也乃悉兵數萬人圍略陽斬山築堤激水灌城歙與將士固死堅守矢盡乃發屋斷木以爲兵􅅝盡銳攻之自春至秋其士卒疲弊帝乃大發􅀜東兵自將上隴􅅝衆潰走圍解於是置酒髙㑹勞賜歙班坐絶席在諸將之右賜歙妻縑千疋詔使留屯長安悉􅁥護諸將又曰大司徒鄧禹西征定河東張宗詣禹自歸禹聞宗素多􅁠謀乃表爲偏將軍禹軍到徇邑赤眉大衆且至禹以徇邑不足守欲引師進就堅城而衆人多畏賊追憚爲後拒禹乃書諸將名於竹簡署其前後亂着笥中令各􅊥之笥以竹爲之鄭玄注禮記云圎曰簞方曰笥宗獨不肯􅊥曰死生有命張宗豈辭難就逸乎禹歎息謂曰將軍有親弱在營奈何不顧宗曰愚聞一卒畢力百人不當萬夫致死可以横行宗今擁兵數千以承大威何遽其必敗乎遂留爲後拒諸營旣引宗方勒厲軍士堅壘壁以死當之禹到前縣議曰以張將軍之衆當百萬之師猶以小雪投沸湯雖欲勠力其􅀔不全也乃遣歩􅀐二千人反還迎宗宗引兵始發而赤眉至宗與戰却之乃得歸營於是諸將服其勇又曰隗􅅝大將王捷別在戎丘登城呼漢軍曰爲隗王城守者皆必死無二心願諸軍亟罷亟紀力切請自殺以明之遂自刎頸死又曰丗祖即位遣宗正劉延攻天井􅀜與田邑連戰}
