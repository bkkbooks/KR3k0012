  - {type: variant, offset: 1929, length: 1, content: 備, SBCK: 連營數十里至於城下乃於城南起土山欲乗之以入當其山處城上先有兩髙樓孝寛更􅅞木接之令極峻多積戰具以禦之敵人以樓髙不得入遂於城南鑿地道又於城北起土山且作且攻晝夜不息孝寛復掘長塹截其道乃置戰士屯於塹上城外每穿至塹戰士即擒殺之又於塹外積柴貯火敵人有在地道内者便下柴火以皮吹之蒲拜切火氣一衝咸即灼爛城外又作攻車車之所及莫不摧毀雖有排楯莫之能抗孝寛乃縫布爲幔隨其所向則張設之布旣懸於空中其車竟不能壞城外又􅅞松麻於竿灌油加火規以燒布并欲焚樓孝寛復長作鐡鉤利其鋒刃火竿亦來以鉤遥割之松麻俱落城外又於城西面穿地作二十一道分爲四路於其中各施梁柱作訖以油灌柱放火燒之柱折城並崩壞孝寛又隨壊處堅木柵以扞之敵不得入城外}
