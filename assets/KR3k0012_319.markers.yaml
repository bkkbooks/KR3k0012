  - {type: variant, offset: 20, length: 1, content: 胡, WYG: 魏圍司州時城中衆不滿五千人食裁半嵗魏軍攻之晝夜不息乃作大車載土四面俱前欲以填塹道恭塹内作艨艟鬬艦以待之魏人不得進又潛作伏道以决塹水道恭載土屯塞之相持百餘日前後斬獲不可勝計魏大造梯衝攻圍日急道恭用四石烏漆大弓射所中皆洞甲飲羽一發或貫兩人敵人望弓皆靡又於城内作土山多作大矟長二丈五尺施長刃使壯士執以刺魏軍甚憚之又曰陳宜黄侯慧紀鎮荆州隋師濟江慧紀率將士三萬人船艦千餘乗沿江而下欲趣臺城遣南康太守吕肅將兵據巫峽以五條鐵鎖横江肅竭其私財以充軍用隋將楊素奮兵擊之四十餘戰争馬鞍山及磨刀澗守險隋軍死者五千人陳人盡取其鼻以求功賞既而隋軍屢捷獲陳之士三縱之肅乃遁後周書曰李遷哲天和三年進位大將軍召遷哲率金上等諸州兵鎮襄陽五年陳將章昭逹攻逼江陵梁明帝告急於襄州衞公直令遷哲往救焉遷哲率其所部守江陵外城與陳將程文季交戰兵却遷哲乃親自陷陣手殺數人㑹江陵總管陸騰出兵助之陳人又因水汎長壊龍川寧朔堤引水灌城城中驚擾遷哲乃先塞水又募驍勇出擊之少有斬獲衆心始定俄而敵于郭内焚燒人家遷哲自率}
