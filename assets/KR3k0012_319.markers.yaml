  - {type: variant, offset: 3741, length: 853, content: 百人得穀三十萬斛器甲稱是悅收兵夜走邢州五代周史曰慕容彥超漢祖即位授澶州節度使檢校太尉杜重威叛於鄴下以鄆州節度使高行周為行營都部署彥超為副兵至城下二帥不恊杜重威之子婦即行周之息女也行周用兵持重彥超舉措輕躁彥超欲速於攻城行周以為未可彥超乃揚言稱行周以愛女之故惜賊而不攻行周忿之漢祖聞其事懼有他變以是親征及車駕至鄴彥超數因事凌迫行周行周不勝其憾嘗一日至於行宮幕次雨泣告於執政又自掬糞茄於口中聲氣甚厲聞於御座漢祖深知彥超之曲遣近臣和解行周亦召彥超於帳中責之兼令首過於行周行周稍解時彥超獨排君議累請攻城漢祖信之乃親督諸軍四面齊進損傷者萬餘人死者千餘人眾議無不歸罪於彥超自是不復敢言攻城矣說苑曰田單為齊上將興師十餘萬將以攻翟往見魯仲連子曰將軍之攻翟必不能下矣田將軍曰單以五里之城十里之郭復齊之國何謂攻翟不能下也及攻翟三月不下齊之童兒謠曰大冠如箕長劍柱頤攻翟不能下累於吾兵於是田單恐駭往見仲連子曰先生何以知單攻翟不能下也仲連子曰夫將軍即墨之時坐則織簣立則杖箠為士卒唱曰恐宗廟亡矣故將有死之心無生之氣今將軍東有掖邑之封西有淄上之寶黃金橫帶馳乎淄澠之間是以樂生而惡死也田單明日結髮祖于矢石之間乃引桴而鼓之翟人下之淮南子曰趙簡子死未葬中牟入齊中牟自入臣於齊也已葬五日襄子起兵攻之圍未合而城自壞者十丈襄子擊金而退之軍法鼓以進眾鉦以退之軍吏諫曰君誅中牟之罪而城自壞是天助我何故去之襄子曰吾聞之叔向曰君子不乘人於利不迫人於險使之治城城成而後攻之中牟聞其義乃請降古司馬兵法曰眾以合寡為追裹而闕合有交兵眾者以寡合對追逐也圍也以眾擊寡逐而圍之聞其去道無令死戰敵若眾則受裹敵眾己寡則依利道而受圍以堅眾心分共四向而受敵則眾以死為生拔能衝逐四出以克勝也敵若寡若畏則譬之開之敵家少弱恐懼者則開去道無令為窮寇必死戰也韓子曰世有三亡以亂攻治者亡以邪攻正者亡以逆攻順者亡清濟濁河足以為限長城巨防足以為塞管子曰善攻者料眾以攻料食以攻食料備以攻備以眾攻眾眾存不攻以食攻食食存不攻以備攻備備存不攻列子曰楚攻宋圍其城民易子而食之析骸而炊之丁壯者皆乘城而戰者太半, WYG: ''}
