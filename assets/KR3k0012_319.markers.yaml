  - {type: variant, offset: 14, length: 3, content: 約為豫, SBCK: 逖周訪又曰呉彦爲呉建平太守時王濬將伐呉造舡於蜀彦覺之請増矣爲備皓不從彦乃輙爲鐡鎻撗断江路及師臨境縁江諸城皆望風降附或見攻而㧞唯彦堅守大衆攻之不能剋退舎禮之梁書曰侯景反兵逼建業衆皆兇懼梁將羊侃爲守城督侃僞稱得外射書云邵陵王西昌侯兵巳至路衆乃少安賊爲尖頭木驢攻城矢石所不能制􅋲作雉尾炬施鐡鏃以油灌之擲驢上燒之俄盡賊又東西四面起土山以臨城城中震駭侃命爲地道潛引其土山不能立賊又作登城樓車髙十餘丈欲臨射城内侃曰車髙塹虗彼來必倒可卧而觀之不勞設備及車動果倒衆皆服焉賊頻攻不捷㑹侃病死城方䧟又曰蔡道恭爲司}
