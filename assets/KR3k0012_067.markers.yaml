  - {type: variant, offset: 3387, length: 508, content: 丈世傳佷子未曾從父命父臨終欲葬山上故謬曰葬我水中佷子唯從此命習鑿齒記云佷子是漢時人家在山東五女徼鄧德明南康記曰梓潭有梓樹洪直巨圍葉廣丈餘垂柯數畝又曰贛潭在郡下昔有長者於此潭以釣為事恒作漁父歌其聲慷慨忽聞綸動須臾一物形似小水牛眼光如鏡或言水犀浮躍逐綸角帶金繅釣客因引得鏁出水數十丈鏁斷餘數丈盡是珍寶羅浮山記曰牛潭深洞無極北岸有石周圍三丈許漁人見牛自水而出盤於此石抱朴子曰昔石頭水有大黿常在潭中因名此為黿潭能作魅行病於人吳有道士戴昞者乃以越章封埿偏投潭水中良久有大黿徑長丈久餘浮出不敢動乃格殺之而病人並愈又有小黿出羅列死於水渚甚多南康記曰梓潭山在雩都縣之東南六十九里其山有大梓樹吳王令都尉蕭武伐為龍舟艚斫成而牽引不動占云須童男女數十人為歌樂乃當得下依其言以童男女牽拽艚沒于潭中男女皆溺其後每天晴朗淨髣髴若見人船焉夜宿潭邊或聞歌唱之聲因號梓潭焉鄱陽記曰懷蛟水一名孝經潭在縣南二百步江中流石際有潭往往有蛟浮出時傷人焉每至五月五日鄉人於此江水以船競渡俗云為屈原攘災承前郡守縣綵以賞之刺史張栖遷貞以人之行莫大於孝縣孝經摽竿上賞之而人知勸俗號為蛟水或曰孝經潭湘州記曰益陽有昭潭其下無底湘洲最深處也或謂周昭王南征不復沒於此潭因以為名, SBCK: 七}
