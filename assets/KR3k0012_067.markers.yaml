  - {type: variant, offset: 1248, length: 0, content: '', SBCK: 源俱北流合爲一川名天漿谿又曰閩中有徐登者女子化爲丈夫與東陽趙昞並善越方時遭兵亂相遇於谿各矜其所能登先禁谿水爲不流昞次禁枯柳爲生荑二}
  - {type: variant, offset: 1248, length: 0, content: '', krp: 源俱北流合爲一川名天漿谿又曰閩中有徐登者女子化爲丈夫與東陽趙昞並善越方時遭兵亂相遇於谿各矜其所能登先禁谿水爲不流昞次禁枯柳爲生荑二}
  - {type: variant, offset: 1249, length: 2, content: 共愽, SBCK: 相視而􅀏登年長昞師事之後登身故昞東入章安百姓未知昞乃􅂛茅屋榰鼎而㸑主人驚怪昞􅀏而不應屋亦不損又甞臨水求渡舡人不許昞乃張盖坐中長嘯呼風亂流而濟}
  - {type: variant, offset: 1249, length: 2, content: 共愽, krp: 相視而笑登年長昞師事之後登身故昞東入章安百姓未知昞乃升茅屋榰鼎而㸑主人驚怪昞笑而不應屋亦不損又甞臨水求渡舡人不許昞乃張盖坐中長嘯呼風亂流而濟}
  - {type: variant, offset: 1252, length: 2, content: 湖間, SBCK: 是百姓神服從者如歸又曰山隂縣西四十里有二溪東溪廣一丈九尺冬暖夏冷西溪廣三丈五尺冬冷夏暖二溪北出行三里至徐村合成一溪廣五丈餘而温凉不雜盖山經所謂茗水也又曰朐䏰縣有􅀛溪出靈􅀛咸熈元年獻􅀛於相府言出}
  - {type: page-break, offset: 1252, content: '', id: KR3k0012_SBCK_067-6b}
  - {type: variant, offset: 1252, length: 269, content: 湖間自稱赤松子安期先生有一壺酌酒以飲徐公公醉而寐其側比醒不復見劉澄之豫州記曰城父縣有巢湖湖周五里湖中有三山湖南有四鼎山戰園策曰秦與荊戰大破之取洞庭五渚吳地記曰吳王葬女取土成湖又郡國志云三女墳在郭西云闔閭食蒸魚羹留半賜三女三女怨自殺王痛之葬於郭西文石為槨金印玉牒銀樽朱盤悉以送葬又云盤郢之劍或曰湛鑪之劍夜飛適楚以水繞墳因名女墳湖又云葬女時有白鶴舞吳市因入羨門悉化為犬錢塘記曰去邑十里有詔息湖古老相傳昔秦始皇巡狩經塗暫憩因詔以息為名周景式廬山記曰山頂有一窮湖湖足頳尾鯉鰭皆傷剝而又有一故艑槽崇山峻遠非舟楫所游豈深谷為陵而此物不與丘壑同遷乎顧微, WYG: 是焉}
  - {type: variant, offset: 1252, length: 2, content: 湖間, krp: 是百姓神服從者如歸又曰山隂縣西四十里有二溪東溪廣一丈九尺冬暖夏冷西溪廣三丈五尺冬冷夏暖二溪北出行三里至徐村合成一溪廣五丈餘而温凉不雜盖山經所謂茗水也又曰朐䏰縣有龜溪出靈龜咸熈元年獻龜於相府言出}
