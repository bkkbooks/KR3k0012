  - {type: variant, offset: 1685, length: 2, content: 武強, WYG: 隴西神馬山有淵池龍馬所生即是水西流謂之馬池又曰蔡州西即蔡倫故宅傍有蔡子池倫漢黄門郎順帝之世始𢷬故魚網為紙用代簡素自其始也又曰滇池中有神馬家馬交之則生駿駒日行五百里顧子曰與子華逰於東池子華曰水有四徳池為一焉沭浴群生流澤萬世仁也揚清激濁盪滌塵穢義也弱而難勝勇也導江䟽河變盈流謙智也顧子曰我得汝於池上矣方輿記曰興元府南鄭}
  - {type: page-break, offset: 1685, content: '', id: KR3k0012_WYG_067-7b, image: WYG0893/WYG0893-0550d.png}
  - {type: variant, offset: 1688, length: 4, content: 耆宿云邑, WYG: 天池山上有池方二十里冬夏不竭久飲之可愈痼疾故號天池又曰梅福池一名風雨池梅福種蓮池福歎曰生為我酷身為桎梏形為我辱智為我毒於是棄南昌縣尉去妻子入洪崖山得道為神仙代代有}
  - {type: page-break, offset: 1688, content: '', id: KR3k0012_WYG_067-8a, image: WYG0893/WYG0893-0551a.png}
