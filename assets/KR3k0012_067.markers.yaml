  - {type: 'tls:seg', offset: 38, content: '', id: KR3k0012_CHANT_067-2a.7}
  - {type: variant, offset: 38, length: 0, content: '', WYG: 可試問西域胡也以朔不知難以核問至後漢明帝時外國道人入來洛陽時有憶方朔言者乃以武帝時墨灰問之胡人云天地大刼将盡則刼燒}
  - {type: page-break, offset: 38, content: '', id: KR3k0012_WYG_067-2b, image: WYG0893/WYG0893-0548b.png}
  - {type: variant, offset: 39, length: 2, content: 在德, WYG: 刼燒之餘乃知朔言者是又曰昭帝元始元年春三月黄鵠下建章宮太液池又曰宣帝詔曰池籞未御幸者蘇林曰折竹以䋲綿連若禁籞使人}
  - {type: variant, offset: 42, length: 2, content: 在險, WYG: 得往來也假與貧民郡國宫舘勿復脩治又曰宣帝神爵元年詔曰金芝生于涵徳殿銅池中銅作池也魏志曰太祖還鄴作𤣥武池以肄舟師}
