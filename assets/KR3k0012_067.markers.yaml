  - {type: variant, offset: 1522, length: 119, content: 州記曰廬山上有一湖至甲戍日輒聞山有鼓角聲劉澄之楊州記曰新城縣東有俱山山上有湖湖中有白鵝一隻時時飛來不可常見劉楨京口記曰龍目湖秦王東游觀地勢云此有天子氣使赭衣徒鑿湖中長岡使斷因改為丹徒今水北注江也梁典曰武帝望京峴山盤紆似龍掘其右為龍目二湖徐, WYG: ''}
  - {type: punctuation, offset: 1524, content: 》, id: KR3k0012_CHANT_067-bkkpn449}
