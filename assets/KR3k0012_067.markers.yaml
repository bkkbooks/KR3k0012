  - {type: punctuation, offset: 2806, content: 「, id: KR3k0012_CHANT_067-bkkpn799}
  - {type: variant, offset: 2810, length: 575, content: 尋陽縣東南與都昌縣分界湖心有大孤山案郡國志彭蠡湖周迴四百五十里內有石高數十丈大禹刻其石以記功焉又有乞烏隨船行舟人擲搏飯接之高下不失一粒今此烏沿江靈廟多有不獨在彭蠡湖爾郡國志曰鶴門湖者陶侃微時喪母忽有二客來吊化為雙白鶴飛去後因以為名丹陽記曰吳孫皓寶鼎元年丹陽縣宣騫之母年八十浴於後湖化為黿後湖又名練湖在縣北百二十步輿地志曰曲阿出名酒皆云後湖水所釀故醇烈也今按湖水上承丹徒陳驪覆船山馬林溪水色白味甘輿地志云練塘陳敏所立遏高陵水以溪為後湖語林曰褚公遊曲阿後湖狂風忽起船傾褚公已醉乃曰此舫人皆無可以招天譴者唯有孫興公多塵滓正當以厭天欲耳便欲捉孫擲水中孫懼無計唯大呼曰季野卿念我褚公褚彥回也季野彥回字也伏滔登故臺詩序曰夫差姑蘇臺東有丹湖萬頃內有金銀塘方輿記曰銅船湖馬援鑄銅船五隻一留此湖中四隻將過海征林邑潭幽明錄曰碩縣下有眩潭以視之眩人眼因以為名傍有田陂昔有人舡行過此陂見一死蛟在陂上不得下無何見一人長壯烏衣立於岸側語行人云吾昨下陂不過而死可為報眩潭行人曰眩潭無人云何可報烏衣人云但至潭便大言之行人如其旨須臾潭中有號泣聲又曰晉元熙中桂陽郡有一老翁常以釣為業後清晨出釣遇大魚食餌掣綸甚急船人奄然俱沒家人尋喪於釣所見老翁及魚並死為釣綸所纏魚腹下有丹字文曰我聞曾潭樂故從檐潭來磔死弊老翁持釣數見欺好食赤鯉鱠今日得汝為荊州圖記曰武當縣西北六里江中名佷字潭潭中有石磧洲長, SBCK: 溝壑太平御覽卷第}
