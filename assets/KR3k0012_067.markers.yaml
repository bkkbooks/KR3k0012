  - {type: punctuation, offset: 22, content: 「, id: KR3k0012_CHANT_067-bkkpn18}
  - {type: variant, offset: 22, length: 0, content: '', WYG: 秦始皇逰海上祠名山大川及八神仙人羡門之屬八神一曰天齊祠天齊天池名臨南郊山漢書曰昆明池漢武帝元狩}
  - {type: page-break, offset: 22, content: '', id: KR3k0012_WYG_067-2a, image: WYG0893/WYG0893-0548a.png}
  - {type: variant, offset: 22, length: 0, content: '', krp: 秦始皇遊海上祠名山大川及八神仙人羡門之属八神一曰天齊祠天齊天池名臨南郊山漢書曰昆明池漢武帝元狩}
  - {type: variant, offset: 23, length: 10, content: 苗氏左洞庭右彭蠡德義, WYG: 年所穿也初漢欲求身毒國為昆明池夷所閉昆明有滇池方三百里名曰滇河漢将伐昆明以通身毒使謫卒伐棘上林象滇河作昆明池以習水戰池周廽四十里漢武帝平昆明以其地為益州郡其滇水原深廣末反淺狹有似倒流故曰滇河潘岳關中記曰昆明池漢武帝習水戰也中有靈沼神池云堯時理水訖停船此池蓋堯時已有汚池漢代因而深廣耳曹毗志怪云漢武鑿昆明池深極悉是墨灰無復土舉朝}
  - {type: variant, offset: 23, length: 8, content: 苗氏左洞庭右彭蠡, krp: 年所穿也𥘉漢欲求身毒國爲昆明池夷所閉昆明有滇池方三百里名曰滇河漢將伐昆明以通身毒使謫卒伐棘上林象滇河作昆明池以習水戰池周廻四十里漢武帝平昆明以其地爲益州郡其滇水原深廣末反淺狹有似倒流故日滇河潘岳關中記曰昆明池漢武習水戰也中有靈沼神池云堯時理水訖停舡此池盖堯時巳有汚池漢代因而深廣耳曺毗志怪云漢武鑿昆明池極深悉是灰墨無復土舉朝不觧以問東方朔朝曰臣愚不足以知之可試問西域胡帝以朔不知難以核問至後漢明帝時外國道人入來洛陽時有憶方朔言者乃試以武帝時灰墨問之胡人云經云天地大刧將盡則刼燒此刼焼之餘乃知朔言有旨又曰昭帝元始元年春三月黄鵠下建昌宫太液池又曰宣帝詔曰池籞未御幸者蘇林日折竹以䋲綿連若禁籞使人不得徃来也假與貧民郡國宫館勿復脩治又曰宣帝神爵元年詔曰金芝生于涵}
  - {type: punctuation, offset: 28, content: ，, id: KR3k0012_CHANT_067-bkkpn19}
  - {type: 'tls:seg', offset: 28, content: '', id: KR3k0012_CHANT_067-2a.4}
  - {type: punctuation, offset: 31, content: ，, id: KR3k0012_CHANT_067-bkkpn20}
  - {type: 'tls:seg', offset: 31, content: '', id: KR3k0012_CHANT_067-2a.5}
  - {type: variant, offset: 32, length: 12, content: 義不修舜滅之此在德不在險, krp: 殿銅池中銅作池魏志曰太祖還鄴作玄武池以肄舟師}
  - {type: variant, offset: 34, length: 3, content: 修舜滅, WYG: 觧以問東方朔朔曰臣愚不足以知}
  - {type: punctuation, offset: 35, content: ，, id: KR3k0012_CHANT_067-bkkpn21}
  - {type: 'tls:seg', offset: 35, content: '', id: KR3k0012_CHANT_067-2a.6}
