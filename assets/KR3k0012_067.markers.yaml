  - {type: variant, offset: 1646, length: 4, content: 句踐滅吳, WYG: 丁宻字靖公蒼梧人父艱泣血三年飛鳬一雙逰宻廬傍小池郡國志曰晉州臨汾縣臭水池百畜不飲一名翻鑊池今池上有脂潤又曰成都郡秦惠王二十七年使張儀築以象咸池沃野千里號曰陸海有萬嵗池是築城取土處又曰合浦海曲出珠號曰珠池又有夷人號越邑多採甲香為業世説曰晉明帝欲作池臺元帝不許時明帝為太子養武士一夕中作池曉便成即今}
