  - {type: variant, offset: 19, length: 0, content: '', WYG: 有水曰池無水曰隍詩曰東門之池可以漚麻又曰王在靈沼於牣魚躍沼池也牣滿也箋云靈沼之水魚盈滿其中皆飛躍言亦得其所也韓詩外傳曰齊景公出弋昭華之池傳曰齊伐楚楚子使屈完對曰楚國方城以為城漢水以為池齊雖衆無所用之}
  - {type: punctuation, offset: 21, content: 》, id: KR3k0012_CHANT_067-bkkpn16}
  - {type: variant, offset: 21, length: 24, content: 曰三苗氏左洞庭右彭蠡德義不修舜滅之此在德不在險晉, SBCK: 封禪}
  - {type: variant, offset: 21, length: 0, content: '', WYG: 封禪書}
