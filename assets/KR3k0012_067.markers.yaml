  - {type: variant, offset: 1237, length: 0, content: '', SBCK: 北征􅀌竹廻未至卑耳之谿授弓而射未敢發謂左右曰見前人乎對曰不見公曰寡人見人長尺而人物具焉管仲曰臣聞霸王之君興而登山神見公拜曰仲父之聖􅀂此俗􅀃曰郗僧施青谿中汎舟一曲處輙作一篇詩謝益壽見詩嘆曰青谿中曲復何可窮水經注曰磻溪即太公釣所也石壁深髙幽泉䆳宻林障秀阻亦人罕交東南隅有石室盖太公所居也水次平石即太公垂釣之處也其水清冷神異北流注于渭又曰長陽谿源石穴中有神魚大}
  - {type: page-break, offset: 1237, content: '', id: KR3k0012_SBCK_067-6a}
  - {type: variant, offset: 1237, length: 0, content: '', krp: 北征孤竹廻未至卑耳之谿授弓而射未敢發謂左右曰見前人乎對曰不見公曰寡人見人長尺而人物具焉管仲曰臣聞霸王之君興而登山神見公拜曰仲父之聖若此俗說曰郗僧施青谿中汎舟一曲處輙作一篇詩謝益壽見詩嘆曰青谿中曲復何可窮水經注曰磻溪即太公釣所也石壁深髙幽泉䆳宻林障秀阻亦人罕交東南隅有石室盖太公所居也水次平石即太公垂釣之處也其水清冷神異北流注于渭又曰長陽谿源石穴中有神魚大}
  - {type: punctuation, offset: 1238, content: ，, id: KR3k0012_CHANT_067-bkkpn362}
  - {type: 'tls:seg', offset: 1238, content: '', id: KR3k0012_CHANT_067-16a.13}
  - {type: variant, offset: 1238, length: 8, content: 嘗登嶺至此處見湖, SBCK: 二尺小者一尺居民釣魚先陳所須多少拜而請之拜訖投釣得魚過數者水輙波涌􅁀風卒起樹木催折水側生異花路人欲摘者皆當先請不得輙取又曰白馬谿水出冝陽山有大石厥狀似馬故谿澗以物色受名也又曰向城有}
  - {type: variant, offset: 1238, length: 8, content: 嘗登嶺至此處見湖, krp: 二尺小者一尺居民釣魚先陳所須多少拜而請之拜訖投釣得魚過數者水輙波涌暴風卒起樹木催折水側生異花路人欲摘者皆當先請不得輙取又曰白馬谿水出冝陽山有大石厥狀似馬故谿澗以物色受名也又曰向城有}
