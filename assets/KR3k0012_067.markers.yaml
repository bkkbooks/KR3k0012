  - {type: variant, offset: 1892, length: 7, content: 東南海中烜洲上, WYG: 朐䏰縣}
  - {type: variant, offset: 1895, length: 412, content: 中烜洲上有溫胡其中唯有鯽魚焉長八尺食之宜暑而避寒郡國志曰潤州遏陂有湖名龍目湖京口出好酒人習戰故桓溫云京口土瘠人窶無可戀唯酒可飲兵可用耳會稽記曰漢順帝永和五年會稽太守馬臻創立鏡湖在會稽山陰兩縣界築塘蓄水高丈餘田又高海丈餘若水少則洩湖灌田如水多則開湖洩田中水入海所以無凶年堤塘周迴三百一十里溉田九千餘頃又會稽記云創湖之始多淹塚宅有千餘人怨訴於臺臻遂被刑於市及臺中遣使按鞠總不見人驗籍皆是先死亡人之名又按輿地志云山陰南湖縈帶郊郭白水翠巖互相映發有若圖畫南徐州記曰子英常於芙蓉湖捕魚得赤鯉持歸以穀養一年遂生角翅魚云我來迎汝子英騎之即乘風雨騰而上天故列仙傳云每經數載來歸見妻子魚復來迎如是數十廻而不還芙蓉湖即射貴湖也又名上湖吳地記曰臨平湖在臨平山南吳志曰歸命侯天璽元年吳郡言臨平湖自漢末草穢擁塞今更除平古老相傳云此湖塞天下亂此湖開天下平又湖邊得石函函中有小石青色長四寸廣二寸餘刻上作皇帝字於是改年大赦俄而晉平吳孫盛以為元皇中興之符歙縣, SBCK: ''}
