  - {type: variant, offset: 66, length: 16, content: 錢塘湖開或言天下當太平青蓋入洛皓, SBCK: 理水訖停舡此池盖堯時巳有汚池漢代因而深廣耳曺毗志怪云漢武鑿昆明池極深悉是􅁅墨無復土舉朝不觧}
  - {type: variant, offset: 66, length: 4, content: 錢塘湖開, WYG: 時能騎馬倒著白接䍦舉鞭向葛疆何如并州児疆家在并州簡愛將也又曰荀勗久在中書專管機事失之甚怏怏}
  - {type: variant, offset: 66, length: 4, content: 錢塘湖開, krp: 時能騎馬倒着白接離舉鞭向葛疆何如并州兒彊家在并州簡愛將也又曰荀勗乆在中書􅌹管機事失之甚怏怏}
