  - {type: variant, offset: 1154, length: 0, content: '', SBCK: 臺王莽死於是也廣州先賢傳曰丁宻字靖公蒼梧人遭父艱哭泣三年飛鳬一􅀟游宻廬傍小池郡國志曰􅀳州臨汾縣臭水池下畜不飲一名飜鑊池即煑眉間}
  - {type: variant, offset: 1154, length: 97, content: 赤鱗魚使者渴極欲往飲水有赤鱗魚張鰭向之使者不敢飲南康記曰空山上有平湖湖中有艑音便底浮在湖中動搖便起風兩鄭緝之東陽記曰北山去郡三十餘里有赤松廟故老相傳云其下有居民曰徐公者嘗登嶺至此處見湖水二人共愽, WYG: 臺王莽死}
  - {type: variant, offset: 1154, length: 0, content: '', krp: 臺王莽死於是也廣州先賢傳曰丁宻字靖公蒼梧人遭父艱哭泣三年飛鳬一雙游宻廬傍小池郡國志曰晉州臨汾縣臭水池下畜不飲一名飜鑊池即煑眉間}
  - {type: variant, offset: 1155, length: 1, content: 鱗, SBCK: 頭處鑊飜因成池今水上猶有脂潤又曰成都郡􅁗惠王二十七年使張儀築城以象咸陽沃野千里號曰陸海有萬􅀊池是築城取土處又曰合浦海曲出珠號曰珠池又有夷人號越㐌多採甲香爲業吕氏春秋曰衛靈公天寒鑿池宛春諌曰天寒公曰天寒乎宛春曰公衣狐裘坐熊席陬隅有竈是以不寒淮南子曰隂氣極則下至黄泉故不可鑿池穿井丗􅀃曰􅀳明帝欲作池臺元帝不許之明帝爲太子養武士一夕中作比暁便成即今謂太子池是也又曰太原王國寳治宅因浚池忽見一物如酒杓形長四尺許飛去水經注曰隴西神馬山有淵池龍馬所生即是水西流謂之馬池又曰蔡州西即蔡倫故宅傍有蔡子池倫漢黄門即順帝之丗始檮故}
  - {type: page-break, offset: 1155, content: '', id: KR3k0012_SBCK_067-4a}
  - {type: variant, offset: 1155, length: 1, content: 鱗, krp: 頭處鑊飜因成池今水上猶有脂潤又曰成都郡秦惠王二十七年使張儀築城以象咸陽沃野千里號曰陸海有萬歲池是築城取土處又曰合浦海曲出珠號曰珠池又有夷人號越㐌多採甲香爲業吕氏春秋曰衛靈公天寒鑿池宛春諌曰天寒公曰天寒乎宛春曰公衣狐裘坐熊席陬隅有竈是以不寒淮南子曰隂氣極則下至黄泉故不可鑿池穿井丗說曰晉明帝欲作池臺元帝不許之明帝爲太子養武士一夕中作比暁便成即今謂太子池是也又曰太原王國寳治宅因浚池忽見一物如酒杓形長四尺許飛去水經注曰隴西神馬山有淵池龍馬所生即是水西流謂之馬池又曰蔡州西即蔡倫故宅傍有蔡子池倫漢黄門即順帝之丗始檮故}
