  - {type: variant, offset: 47, length: 4, content: 陳訓少學, SBCK: 􅁗始皇遊海上祠名山大川及八神仙人羡門之属八神一曰}
  - {type: variant, offset: 47, length: 14, content: 陳訓少學天文孫皓以為奉禁都尉, WYG: 山簡㳺優卒嵗唯酒是躭諸習氏荆土豪族有家園池簡每出嬉逰多之池上置酒輙醉名之曰髙陽池時有童兒歌曰山公出何許徃至髙陽池日夕倒載歸酩酊無所}
  - {type: page-break, offset: 47, content: '', id: KR3k0012_WYG_067-3a, image: WYG0893/WYG0893-0548c.png}
  - {type: variant, offset: 47, length: 14, content: 陳訓少學天文孫皓以為奉禁都尉, krp: 山簡優遊卒歲唯酒是躭諸習氏荆土豪族有佳園池簡毎出嬉遊多之池上置酒輙醉名之曰髙陽池時有童兒歌曰山公出何許徃至髙陽池日夕倒載歸酩酊無所}
  - {type: variant, offset: 52, length: 3, content: 文孫皓, SBCK: 齊祠天齊天池名臨南郊山漢書曰昆明池漢武帝元狩三年所穿也􅀄漢欲求身毒國爲昆明池夷所閉昆明有滇池方三百里名曰滇河漢將伐昆明}
  - {type: punctuation, offset: 53, content: ，, id: KR3k0012_CHANT_067-bkkpn29}
  - {type: 'tls:seg', offset: 53, content: '', id: KR3k0012_CHANT_067-2a.10}
  - {type: variant, offset: 56, length: 9, content: 為奉禁都尉知皓必敗, SBCK: 通身毒使謫卒伐􅁄上林象滇河作昆明池以習水戰池周廻四十里漢武帝平昆明以其地爲益州郡其滇水原深廣末反淺狹有似倒流故日滇河潘岳關中記曰昆明池漢武習水戰也中有靈沼神池云堯}
