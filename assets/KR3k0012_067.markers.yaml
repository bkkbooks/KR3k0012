  - {type: punctuation, offset: 1525, content: 「, id: KR3k0012_CHANT_067-bkkpn451}
  - {type: variant, offset: 1525, length: 350, content: 廬山上有一湖至甲戍日輒聞山有鼓角聲劉澄之楊州記曰新城縣東有俱山山上有湖湖中有白鵝一隻時時飛來不可常見劉楨京口記曰龍目湖秦王東游觀地勢云此有天子氣使赭衣徒鑿湖中長岡使斷因改為丹徒今水北注江也梁典曰武帝望京峴山盤紆似龍掘其右為龍目二湖徐州先賢傳曰句踐滅吳謂范蠡曰吾將與子分國而有之蠡曰君行令臣行意乃乘扁舟浮五湖而不返水經注曰武強縣耆宿云邑人有行於途有一小虵疑其有靈持而養之名曰檐生長而吞噬人里中患之遂捕繫獄檐生負而奔邑淪為湖縣長及吏咸為魚矣今縣東北半許里有淵謂之郎君淵耆宿又言縣淪之日其子東奔又陷於此故淵得郎君之目矣神異經曰北方荒外有湖方千里平滿無高下有魚長七八尺刑狀如鯉而目赤晝在湖中夜化為人刺之不入煮之不死以烏梅二七煮之即熟食之可以愈邪病又曰北方荒中有石湖方千里無凸凹上直結反下於交反平滿無高下岸深五, SBCK: 百管谿周廻}
