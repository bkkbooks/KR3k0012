  - {type: variant, offset: 2924, length: 3, content: 名丹陽, WYG: 指此溪也管子曰桓公征北孤竹迴未至卑耳之谿援弓而射未敢發謂左右曰見前人乎對曰不見公曰寡人見人長尺而人物具焉管仲曰臣聞霸王之君興則登山神見公拜曰仲父之聖若此世說曰郗僧施青谿中汎舟一曲處輒作一篇詩謝益夀見詩嘆曰青谿中曲何可窮水經注曰磻溪即太公釣所也䂖髙深泉䆳宻林障秀阻人迹罕交東南隅有䂖室蓋太公所居也水次平䂖即太公垂釣之處也其水清泠神異北流注於渭廣州}
