  - {type: variant, offset: 2310, length: 3, content: 黃墩湖, krp: 銅溪}
  - {type: variant, offset: 2314, length: 497, content: 縣西南其湖有蜃常與呂湖蜃斗程靈銑好勇而善射夢蜃化為人告之曰吾為呂湖蜃所厄君能助吾必厚報束帛練者吾也明日靈銑彎弧助之正中後蜃不知所之後人名其處為蜃灘時有一道人詣靈銑母求食食訖曰勞毋設食今當為求善墓地使母隨行上山以白石識其地曰葬此可以暴貴矣靈銑因移父葬其所侯景亂靈銑率郡鄉萬餘眾保新安因隨陳武帝有奇功及陳武受梁禪靈銑以佐命功臣與周文昱侯安都為三傑按靈銑宅在湖東二里徐爰釋問曰玄武湖本桑泊晉元帝創為北湖宋以隸舟師京都記云從北望鍾山從宮亭湖望廬岳齊武帝理水軍於此中號曰昆明池故沈約登覆舟山詩云南瞻儲胥館北望昆明池即此爾永嘉末有龍見於湖內故改為玄武湖豫章記曰擔石湖在州東北其湖水中有兩石山有孔如人穿擔狀古老云壯士擔此兩石置湖中因以為名輿地志曰安成有蜜湖中有絲蓴鯽魚為時所重并有石窟容百人坐其魚味甘如蜜因此為名在縣東二十里淮南子曰夫歷陽之都一夕化而為湖勇力聖智與不肖者同命無遺脫也荊南志曰高沙湖在枚廻洲上翠澤平皛胡了切水陸彌曠芰荷殷生鱗羽滋阜湖南林野清曠可以栖託故徵士宗炳昔常家焉北有小水自湖通江謂之曾口是也渚宮故事曰江陵城西二十里高沙湖其中多魚又曰五葉湖昔湖測有主人張披五葉同居因以為名九江記曰彭蠡湖在尋, WYG: 弋}
  - {type: variant, offset: 2316, length: 0, content: '', SBCK: 北五十里其水黄色狀似銅故號銅溪也孫興公天台山賦云過靈溪而一濯是也善歌録曰武溪水源出武山東}
  - {type: variant, offset: 2316, length: 0, content: '', krp: 北五十里其水黄色狀似銅故號銅溪也孫興公天台山賦云過靈溪而一濯是也善歌録曰武溪水源出武山東}
