  - {type: variant, offset: 1699, length: 3, content: 小虵疑, WYG: 臺云是漢髙所營水經注云形如偃月故號明月池又曰七女池昔有人無男而飬七女父亡七女負土𦵏父取土之處今成一池號曰七女池邊又有七女塚吕氏春秋曰衛靈公天寒鑿池宛春諌曰天寒公曰天寒乎宛春曰公衣狐裘坐熊席陬隅有竈是以不寒淮南子曰隂氣極則下至黄泉故不可鑿池穿井谿尚書大傳曰吕尚釣於磻谿得魚腹中有玉璜春秋說題辭曰谿者隱也老子曰知}
