  - {type: page-break, offset: 2951, content: '', id: KR3k0012_SBCK_241-9b}
  - {type: variant, offset: 2951, length: 0, content: '', WYG: 樊曄與世祖有舊世祖嘗於新野坐文書事被拘時曄為市吏餽餌一笥上徳之后拜河東尉臨發之官引見雲臺賜御食衣被上啁曄曰一笥餌得都尉何如曄頓首曰小臣蒙恩特見拔擢陛下不忘往舊臣得竭死自効又曰任延字長孫南陽宛人更始拜為西部都尉年十九迎吏見其少皆驚及到淡泊無為下車遣吏以中牢具祠延陵季子時天下新定道路不通諸避世江南者皆未還㑹稽多士延到皆禮之聘請髙行俊乂董子儀嚴子陵等待以師友之禮行縣所到輒使勞孝子崇禮養善如此建武之初上書言臣贊拜不由王庭願收骸骨詔書徴延民攀持轂涕泣漢書觧詁云都尉將兵副佐太守備盗賊也魏略曰積弩都尉秩比二千石后更為典弩都尉又有典鎧都尉秩與弩同皆屬積弩又曰撫軍都尉秩比二千石本校事官始太祖欲廣耳目使虞洪趙達二人主刺舉洪達多所陷入故于時軍中為之語曰不畏曹公但畏虞洪虞洪尚可趙達殺我後達竟亦為人之所迫死魏志曰韓暨為監治謁者在職七年器用充實詔書褒歎就加司金都尉班亞九卿吳志曰孫桓字叔武儀容端正器懷聰朗博學强記能議論應對權常稱為宗室顔淵擢為武衞都尉從討關羽於華容誘羽餘黨得五千人牛馬器械甚衆臨海記曰漢元鼎五年立都尉府於候官以鎮撫二越所謂東南一尉者也黃帝占軍氣决曰都尉氣如合抱之榆周紹新論曰散騎侍郎武衞都尉孫竒字仲容年十七以秀才入侍帷幄余作詩一篇美而風之恂恂周公美妙無已誕姿既豐世胄有紀平南之孫奮威之子湖廣邉都尉箴曰巍巍上聖}
