  body:
  - {type: variant, offset: 1, length: 1, content: 號, SBCK: 中郎將凡五都尉奉車都尉􅀐都尉中郎將漢書曰武帝拜張騫爲中郎將使西域又曰宣帝即位詔曰朕微􅆌時故掖庭令張賀輔導朕躬賀有孤孫霸七歳拜爲中郎將又曰宣帝時楊惲爲中郎將郎官故事郎出錢市財用給文書乃得出名曰山郎山郎以資財爲郎也山之所出財用故取名焉惲罷山郎皆以法令從事有罪過輒奏免郎官化之莫不自勵又曰司馬相如爲中郎將持節過蜀縣令􅀒弩前導蜀人以爲榮又曰衛綰爲中郎將醇謹無他孝景幸上林詔中郎將叅乗還問曰君知所以得叅乗乎綰曰臣代戲車士得功次遷待罪中郎將不知也又曰張安世長子千秋與霍光子禹俱爲中郎將將兵隨渡遼}
  - {type: page-break, offset: 1, content: '', id: KR3k0012_SBCK_241-1b}
