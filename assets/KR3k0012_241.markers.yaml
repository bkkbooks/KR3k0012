  - {type: variant, offset: 2217, length: 0, content: '', WYG: 旅㑹同亦如之舍則守王閑尚書牧誓曰戎車三百兩虎賁三千人與紂戰于牧野作牧誓周書曰古有虎賁士千人以牛投牛以馬投馬以車捧車漢書百官表曰期門僕射秩比千石平帝元始元年更名虎賁郎置中郎將秩比二千石東觀漢記曰馬援從隴西太守遷虎賁中郎將又曰馬后不以私家干朝廷兄為虎賁中郎將訖永平世不轉又曰明太后姊子夏夀等私呼虎賁張鳴與敖戲争鬭上特詔曰爾虎賁將軍蒙國厚恩位在中臣宿衞禁門當進人不避仇讐舉罰不避親戚今者反於殿中交通輕薄虎賁蘭内所使至命欲相殺於殿下避門内畏懦恣縱故不逐捕此皆生於不學之門所致也又曰馬廖任傀皆從羽林監遷虎賁中郎將續漢書曰魯國孔融為北軍中候三日遷虎賁中郎將又曰虎賁中郎將比二千石主虎賁宿衞也左右僕射左右陛長各一人僕射主虎賁郎將陛長主直虎賁朝㑹在殿之下又曰虎賁武騎皆鶡冠虎文單衣襄邑歲獻織成虎文雲鶡者勇雉也其鬭死乃止又曰虎賁中郎將秩比二千石虎賁中郎比六百石虎賁侍郎比四百石虎賁郎中比三百石節從虎賁比二百石皆無員數掌宿衞侍從虎賁武騎皆鶡冠虎文單衣謝承後漢書曰建武十八年夏旱公卿皆暴露請雨洛陽令着車葢出門候何湯將衞士鈎令車收案有詔免令官拜湯虎賁中郎將上常歎曰赳赳武夫公侯干城何湯之謂也漢官典職曰虎賁中郎將主虎賁千五百人郎多至千人漢名臣奏曰丞相薛宣奏漢興以來深考古義推萬變之備於是制宣室出入之義正輕重之罰故司馬殿省闕至五六里周衞擊刁斗禁門自近臣侍側尚不得著劔入防未然也陛下聖徳純備海内晏然此國家之明制必前後備虎賁漢舊儀曰期門騎者隴西工射獵人及能用五兵仗刀三百人王莾以為虎賁郎劉謙之晉紀曰桓公欲復虎賁中郎將疑應直與不訪之僚佐咸莫能定叅軍劉蘭之對曰昔潘岳為秋興賦序云兼虎賁中郎將寓直於散騎之省以此言之是直官也後魏書曰韓茂膂力絶人尤善騎射太祖曽親征丁零翟猛茂為中軍執幢時大風諸軍旌旗皆偃仆茂于馬上持幢初不傾倒太祖異而問之徴茂所屬具以狀對太宗謂左右曰記之尋徴詣行在所試以騎射太宗深竒之以茂為虎賁中郎將九州春秋曰袁術為虎賁中郎將張讓殺何進術斫閣起火環濟要略曰漢武帝好微行因置期門郎與之期於殿門平帝改為虎賁中郎張純别傳曰純字伯仁郊廟冠婚喪祭禮儀多所正定上甚重之以純兼虎賁中郎將一日數見東中郎將}
