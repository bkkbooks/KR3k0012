  - {type: variant, offset: 2217, length: 0, content: '', SBCK: 旅㑹同亦如之舎則守王閑閑梐枑也尚書牧誓曰戎車三百兩虎賁三百人與受戰于牧野作牧誓周書曰古有虎賁士千人以牛投牛以馬投馬以車捧車漢書百官表曰期門僕射秩比千石平帝元始元年更名虎賁郎置中郎將秩比二千石東觀漢記曰馬援從隴西太守遷虎賁中郎將又曰馬后不以私家于朝廷兄爲虎賁中郎將訖永平世不轉又曰明德太后姉子夏夀等私呼虎賁張鳴與敖戲爭闘上特詔曰爾虎賁將軍􅂪國厚恩位在中臣宿衛禁門當進人不避仇讎舉罰不避親戚今者反於殿中交通輕薄虎賁蘭内所使至命欲相殺於殿下不避門内畏懦恣縱故不逐捕此皆生於不學之門所致也又曰馬廖任傀皆從羽林監遷虎賁中郎將續漢書曰魯國孔融爲北軍中􅀱三日遷虎賁中郎將又曰虎賁中郎將比二千石主虎賁宿衛也左右僕射左右陛長各一人僕射主虎賁郎將陛長主直虎賁朝㑹在殿之下又曰虎賁武􅀐皆鶡冠虎文單衣襄邑歳獻織成虎文云鶡者勇雉也其闘死乃止又曰虎賁中郎將秩比二千石虎賁中郎比六百石虎賁侍郎比四百石虎賁郎中比三百石節從虎賁比二百石皆無貟數掌􅀫衛侍從虎賁武􅀐皆鶡冠虎文單衣謝承後漢書曰建武十八年夏旱公卿皆暴露請雨洛陽令着車盖出門􅀱何湯將衛士鈎令車收案有詔免令官拜湯虎賁中郎將上常歎曰﨣﨣武夫公侯干城何湯之謂也漢官典職曰虎賁中郎將主虎賁千五百人郎多至千人漢名臣奏曰丞相薛宣奏漢興以來深考古義推萬變之俻於是制宣室出入之義正輕重之罰故司馬殿省闕至五六里周衛擊刀斗竟門自近臣侍側尚不得著劒人防未然也陛下聖德純備海内晏然此􅀦家之明制必前後備虎賁漢舊儀曰期門􅀐者隴西工射獵人及能用五兵材力二百人王莽以爲虎賁郎劉謙之晉紀曰桓玄欲復虎賁中郎將疑應直與不訪之僚佐咸莫能定叅軍劉蘭之對曰昔潘岳爲秋興賦序云兼虎賁中郎將寓直於散􅀐之省以此言之是直官也後魏書曰韓荗膂力絶人尤善􅀐射太宗曽親征丁零翟猛荗爲中軍執幢時大風諸軍旌旗皆偃仆茂於馬上持幢􅀄不傾倒太宗異而問之徴茂所屬具以狀對太宗謂左右曰記之㝷徵詣行在所試以􅀐射太宗深竒之以茂爲虎賁中郎將九州春秋曰􅀽術爲虎賁中郎將張讓殺何進術斫閤起火}
