  - {type: variant, offset: 2732, length: 1, content: 羅, SBCK: 仲㳟河東聞喜人爲洛陽典農時取農民以治宫室儉上䟽曰臣愚以爲天下所急除者二賊所急務者衣食誠使二賊不滅士民飢凍雖崇美宫室猶無益也魏略曰上以農殖大事將選典農以徐邈爲頴川典農中郎將所在著稱武衛中郎將魏志曰許楮字仲康太祖與遂超等單馬㑹語左右皆不得從唯禇在超􅀒其力隂欲突太祖素聞禇勇疑從􅀐是禇乃問太祖曰公有虎侯者安在太祖顧指禇禇瞋目眄之超不動乃各罷後數日㑹戰大破超等禇身斬首級遷武衛中郎將武衛之號自此始也建義中郎將後}
