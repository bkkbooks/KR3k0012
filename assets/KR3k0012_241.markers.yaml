  - {type: variant, offset: 9, length: 0, content: '', SBCK: 光問千秋戰闘方略山川形􅀔千秋口對兵事􅀞地成圖無所忘失問禹禹不能記曰皆有文書光由是賢千秋以禹爲不才歎曰霍氏世衰張氏興矣後霍禹誅滅安世子相繼爲侍中常侍列校十餘人又曰卜式爲中郎􅀄式不願爲郎上曰吾有羊在上林欲令子牧之式即爲郎而牧羊歳餘肥息上善之式曰非獨羊也治民亦猶是矣以時起居惡者輒去無令敗羣上竒其言}
  - {type: page-break, offset: 9, content: '', id: KR3k0012_SBCK_241-2a}
  - {type: variant, offset: 9, length: 0, content: '', WYG: 光問千秋戰鬬方略山川形勢千秋口對兵事畫地成圖無所忘失問禹禹不能記曰皆有文書光由是賢千秋以禹為不才歎曰霍氏世衰張氏興矣後霍禹誅滅安世子相繼為侍中常侍列校十餘人又曰卜式為中郎初式不願為郎上曰吾有羊在上林欲令子牧之式既為郎而牧羊嵗餘肥息上善之式曰非獨羊也治民亦由是矣以時起居惡者去之無令敗羣上竒其言}
