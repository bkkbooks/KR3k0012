  - {type: variant, offset: 282, length: 5, content: 武帝元光七, SBCK: 董卓以吕布爲􅀐都尉誓爲父子甚愛信之遷至中郎將卓自知凶恣毎懷猜畏行止嘗以布自衛小失卓意抜手㦸擲之布拳捷得免而改容顧謝卓意亦解布由是隂怨於卓蜀志曰霍峻字仲邈南郡支江人也兄篤於郷里合部曲數百人篤卒荆州牧劉表令峻攝其衆表卒峻率衆歸先主先主以峻爲中郎將又曰劉焉字君郎江夏竟陵人少仕州郡以宗室拜中郎後以師祝公喪去官又曰張飛字益德􅃰郡人也少與􅀜羽俱事先主羽}
