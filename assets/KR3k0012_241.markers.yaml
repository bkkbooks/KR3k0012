  - {type: variant, offset: 24, length: 255, content: 軍從攻雒陽奮威將軍魏志曰呂布殺董卓王允以布為奮威大將軍儀比三司又曰葅援說袁紹紹即表為奮威將軍奮武將軍吳志曰賀齊封豫章東部民彭材李玉王海等起為賊亂眾萬餘人齊討平之誅其首惡餘皆降服揀其精健為兵次為縣戶遷奮武將軍振威將軍魏志曰太祖以程昱為振威大將軍破袁譚尚揚威將軍魏志曰臧霸字宣高太山人也從太祖討孫權於濡須口與張遼為前鋒行遇霖雨大軍先反水遂長賊舡稍近將士皆不安遼欲去霸止之曰公明於利鈍寧肯捐吾等耶明日果有令遼至以語太祖太祖善之拜霸揚威將軍建武將軍魏志曰太祖以夏侯惇為建武將軍又曰文帝善孟達姿才容觀以為建武將軍輕車將軍, SBCK: 後}
