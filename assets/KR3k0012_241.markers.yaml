  - {type: variant, offset: 642, length: 203, content: 販馬自業素聞世祖長者獨欲歸心及世祖於廣阿拜漢為偏將軍又曰臧宮字君翁潁川人也從世祖征戰諸將多稱勇世祖察宮勤力少言甚親納之及至河北以為偏將軍吳志曰陳武字子列廬江人孫策在壽春武脩謁時年十八長七尺七寸及權統事尤為權所愛拜為偏將軍又曰董襲字元伐會稽人長八尺武力過人拜偏將軍禆將軍魏志曰李通字文達江夏平春人以遊俠聞於江汝之間屬連歲大飢通傾家振施與士分糟糠建安初通舉眾詣太祖于許太祖討張繡通為先登大破繡軍拜禆將軍虎牙將軍, SBCK: 信謹質朴故常見用續}
