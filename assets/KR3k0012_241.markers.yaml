  - {type: variant, offset: 3037, length: 3, content: 司馬文, SBCK: 徐晃字公明河内東陽人也爲郡吏從車􅀐將軍楊奉討賊有功拜􅀐都尉呉志曰駱統字公緒㑹稽烏陽人時飢荒多有困乏統爲飲食衰少其姉仁愛寡歸無子見統甚哀之數問其故統曰士大夫糟糠不足我何心獨飽姉曰誠如是何不告我而自苦􅀂此乃自以私粟與統又以告母母亦賢之遂使分施由是顯名孫權以將軍領㑹稽太守統年二十試爲烏程相民户過萬咸歎其惠理權嘉之召爲功曹行􅀐都尉又曰孫權遣􅀐都尉趙咨使魏魏帝問曰呉}
