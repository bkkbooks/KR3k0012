  - {type: variant, offset: 1770, length: 231, content: 供朝夕時有困絕或併日而食恒布衣不完妻子不霑寸祿晉中興書曰羊祜字叔子遷中領軍悉統宿衛入直殿中執兵之要事兼內外齊書曰蕭景先武帝少年與景先共車行埿路車久故壞至領軍府西門車轅折俱狼狽景先謂帝曰兩人脫作領軍亦不得忘今日艱辛及武帝踐阼詔以景先為領軍拜日羽儀甚盛傾朝觀屬拜還未至府門中詔相聞領軍今日故當無折轅事耶景先奉謝梁書曰臧盾遷中領軍領軍管天下兵要監局事多盾為人敏贍有風力長於撥繁職事甚理天監中吳平候蕭景居此職著聲稱至是盾復繼之三國典略曰齊左僕射祖珽陸令萱求為領軍齊主許之, SBCK: ''}
