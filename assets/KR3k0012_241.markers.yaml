  - {type: variant, offset: 2593, length: 107, content: 道將為北軍中候又曰太祖永昌元年以鍾雅為北軍中候五年省併領軍晉中興書曰陶回字恭之王導以回有器幹擢拜北軍中候回性不畏強禦朱衣直閣後魏書曰元文景大司農卿康之次子除員外郎冠軍將軍朱衣直閤直寢後魏書曰于忠字思賢弱冠拜侍御史文, SBCK: 然}
