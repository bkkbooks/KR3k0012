  - {type: variant, offset: 2951, length: 0, content: '', SBCK: 樊曄與世祖有舊世祖常於新野坐文書事􅀍拘時曄爲市吏餽餌一笥上德之後拜爲河東尉臨發之官引見雲臺賜御食衣􅀍上啁曄曰一笥餌得都尉何如曄頓首曰小臣蒙恩特見拔擢陛下不忘徃舊臣得竭死自効又曰任延字長孫南宛人更始拜爲西部都尉年十九迎吏見其少皆驚及到澹泊無爲下車遣吏以中牢具祠延陵季子時天下新定道路不通諸避世江南者皆未還㑹稽多士延到皆禮之卑請髙行俊乂董子儀嚴子陵等待以師友之禮行縣所到輙使勞孝子崇禮飬善如此建武之􅀄上書言臣賛拜不由王庭願牧骸骨詔書徴延民攀持轂涕泣漢官解詁云都尉將兵副佐太守俻盗賊也魏略曰積弩都尉秩比二千石後更爲典弩都尉又有典鎧都尉秩與弩同皆屬積弩又曰撫軍都尉秩比二千石夲校事官始太祖欲廣耳目使盧洪趙逹二人主刺舉洪逹多所䧟入故于時軍中爲之語曰不畏曹公但畏盧洪盧洪尚可趙逹殺我後逹竟爲人迫死魏志曰韓曁爲監冶謁者在職七年器用充實詔書襃歎就加司金都尉班亞九卿呉志曰孫桓字叔武儀容端正器懐聦朗愽學強記能論議應對權常稱爲宗室顔淵擢爲武衛都尉從討􅀜羽於華容誘羽餘黨得五千人牛馬器械甚衆臨海記曰漢元鼎五年立都尉府於候官以鎮撫二越所謂東南一尉者也黃帝占軍氣决曰都尉氣如合抱之榆周紹新論曰散􅀐侍郎武衛都尉孫竒字仲容年十七以秀才入侍帷幄余作詩一篇美而風之恂恂周公美妙無巳誕姿旣豐丗胄有紀平南之孫􅁬威之子胡廣邊都尉箴曰巍巍上聖}
