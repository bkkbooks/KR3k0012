  - {type: variant, offset: 3068, length: 0, content: '', SBCK: 羅縠累月而成裁之爲幔内外視之飄飄如煙氣輕動而房内自涼異􅁐曰張仲舒爲司空廣陵城北元嘉年七月中輙見門側有赤氣赫然後空中忽雨絳羅於其庭内廣七八分長五六寸皆}
