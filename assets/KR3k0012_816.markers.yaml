  - {type: variant, offset: 5025, length: 2, content: 針絕, WYG: 綈几公侯皆以竹木為之不得加綈之餙王子年拾遺記曰漢成帝於太液池傍起霄遊宫以漆為柱鋪黒綈之幕又造飛行殿所幸之宫咸以氊綈藉地惡車轍馬跡之喧也竹林七賢論曰舊俗七月七日法當曬衣諸阮庭中爛然莫非錦綈阮咸時緫角乃竪長竿標大布犢鼻於庭中曰未能免俗爾鄴中記曰石虎中尚方御府中巧工作錦織成署皆數百人有青綈或白綈或緋綈或黃綈或緑綈或紫綈范子計然曰綈出河東䀋鐵論曰鼲鼦旃罽不益錦綈之實是以王者不珍張衡西京賦曰木衣綈錦土被朱紫罽􅅊輝光毛詩問曰七月之時旡褐箋云褐毛布也賤者之所服也今􅄢亦用為之爾雅曰氂􅄢也郭璞注曰毛􅈊所以為􅄢也又曰氂毛也􅄢胡人續羊毛作衣説文曰􅄢西胡毳布也}
  - {type: page-break, offset: 5025, content: '', id: KR3k0012_WYG_816-14b, image: WYG0900/WYG0900-0236d.png}
  - {type: page-break, offset: 5025, content: '', id: KR3k0012_WYG_816-15a, image: WYG0900/WYG0900-0237a.png}
  - {type: variant, offset: 5025, length: 4, content: 針絕吳越, krp: 綈几諸侯皆以竹木爲之不得加綈錦之飾王子年拾遺記曰漢成帝於太液池傍起宵遊宫以􅃮爲柱鋪黒綈之幕又造飛行殿所幸之宫咸以氊綈籍地惡車轍馬跡之喧也竹林七賢論曰舊俗七月七日法當曬衣諸阮庭中爛然莫非錦綈阮咸時緫角乃豎長竿摽大布犢鼻於庭中曰未能免俗爾鄴中記曰石虎尚方御府中巧工作錦織成署皆數百人有青綈或白綈或緋綈或黃綈或緑綈或紫綈范子計然曰綈出河東鹽鐵論曰鼲貂狢不益錦綈之寳是以王者不珎張衡西京賦曰木衣綈錦土𬒳朱紫罽韋輝光毛詩問曰七月之時無褐箋云褐毛布也賤者之所服也今罽亦用爲之爾雅曰氂罽也郭璞注曰毛氂所以爲罽也揵爲舎人注曰氂毛也罽胡人績羊毛作衣說文曰罽西胡毳布也呉曆曰魏文帝賜呉王太子罽二張呉志曰孫堅爲董卓軍所攻堅與數十騎潰圍而出堅常着赤罽幘令親近將祖茂著之卓騎爭逐茂故堅從間道得免于寳晉紀曰孫皓遣使詔書賜班罽五十張絳罽二十張紫青罽各十五張崔鴻十六國}
