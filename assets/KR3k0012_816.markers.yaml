  - {type: variant, offset: 623, length: 646, content: 又昭六曰齊侯將納公命無受魯貨申豐後女賈豐賈二人皆季氏家臣也以幣錦二兩二丈為一端二端為一兩所謂匹也二兩二匹縛一如瑱瑱充耳縛卷也急卷使如充耳易懷藏適齊師謂子猶之人高齮齮子猶家臣子猶梁丘據能貨子猶為高氏後粟五千庾言若能為我行貨於子猶當為請使得為高氏後又當致栗五千庾庾十六斗凡八千斛高齮以錦示子猶子猶欲之齮曰魯人買之百兩一布以道之不通先入幣財言魯人買此甚多布陳之以百兩為數子猶受之又哀上曰吳人藩衛侯之舍藩篱子服景伯謂子貢曰夫諸侯之會事既畢矣侯伯致禮地主歸餼侯伯致禮以禮賓也地主所會主人也餼生物以相辭也各以禮辭讓今吾不行禮於衛而藩其君舍以難之難若用也子盍見大宰乃請束錦以行以賂吳毛詩淇澳碩人曰碩人其頎衣錦褧衣齊侯之子衛侯之妻又蟋蟀曰角枕粲兮錦衾爛兮又巷伯曰巷伯刺幽王也寺人傷於讒而作是詩也萋兮斐兮成是貝錦萋斐文相錯也彼譖人者亦以太甚論語曰宰我問三年之喪期已久矣君子三年不為禮禮必壞三年不為樂樂必崩舊穀既沒新穀既升鑽燧改火期可已矣子曰食夫稻衣夫錦於女安乎曰安女安則為之爾雅曰素錦綢杠以白地錦韜旗之竿尚書大傳曰古之帝王者必有命民能敬長憐孤取舍好讓舉事力者命於其君然後得乘飾車軿馬衣文錦漢書曰項羽在關中懷思東歸曰富貴不歸故鄉如衣錦夜行又曰景帝二年下詔曰雕文刻鏤傷農事錦繡纂組害女工宜禁之又曰賈人母得衣錦謝承後漢書曰朱寵仲威為太尉家貧食脫粟臥布被朝廷賜錦被梁肉皆不敢當漢官儀曰虎賁中郎將古官衣紗縠單衣虎文錦袴餘郎亦然漢官典職曰尚書郎直中官供錦被魏志曰景初中賜倭女王絳地交龍錦五疋紺地勾文錦三疋倭獻暴文雜錦二十疋, SBCK: ''}
