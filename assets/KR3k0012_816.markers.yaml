  - {type: variant, offset: 1534, length: 916, content: 隱晉書曰袁甫字公曹稱所知於領軍何勗勗曰君稱其好人則多所宜何以為欲使宰民不可為臺閣職乎甫曰人各有能有不能此人雖好好莫過錦錦不可以為焰王隱晉書曰竇滔妻蘇氏善屬文符堅時滔為秦州刺史被徙流沙蘇氏思之織錦為回文詩以寄滔循環宛轉以讀之詞甚悽切晉書曰石季龍僣立遷都于鄴傾心事佛圖澄有重於勒下書衣澄以綾錦乘以雕輦南史曰宋元凶劭將作難賜袁淑等袴褶又就主衣取錦裁三尺為一叚又中裂之分蕭斌與淑及左右使以縛袴褶齊書曰江淹為宣城太守時罷歸始泊禪靈寺渚夜夢一人自稱張景陽謂曰前以一疋錦相寄今可見還淹探懷中得數尺與之此人大恚曰郍得割截都盡顧見丘遲謂曰餘尺既無用以遺君自爾淹文章躓矣趙書曰前石死調大臣子弟六十人為挽郎引錦一疋後魏書曰甄琛為定州刺史既至鄉衣錦晝遊政體嚴細甚無聲譽又曰孝武至彭城宋江夏王義恭獻蠟燭十挺武陵王駿獻錦一疋北史曰齊畢義雲家有十餘機織錦并造金銀器物後周書曰太祖曾在同州與郡公宴集出錦罽及雜綾絹數叚命諸將樗蒲取之唐書曰王方慶天后初為廣州都督境內清肅手制襃之曰朕以卿歷職有稱故授此官既美化遠聞實副朝寄令賜卿雜綵六十叚并瑞錦等物以彰善政也又曰大曆初代宗詔許宰臣元載王縉及左僕射裴冕戶部侍郎判度支第五琦京兆尹黎幹各出錢三十萬宴郭子儀于子儀私第內侍魚朝恩參其會焉朝恩出錦三十疋羅五十疋綾一百疋為子儀纏頭之費極歡而罷舊俗賞歌舞人以錦綵置之頭上謂之纏頭宴饗加惠借以為詞又曰大曆中代宗勑曰王制命市納賈以觀人之好惡布帛精麤不中度廣狹不中量不鬻於市漢詔亦云纂組文繡害女工也朕思以恭儉克己敦朴化人每尚素玄之服庶齊金土之價而風俗不一踰侈相高浸弊於時其來自久耗縑繒之本資錦綺之奢異彩奇文恣其誇競今師旅未戢黎元不康豈使淫巧之功更虧恒制在外所織造大張錦軟錦瑞錦透背及大𦅘錦竭鑿六硬已上錦獨窠文紗四尺幅及獨窠吳綾獨窠司馬綾等並宜禁斷其長行高麗白錦雜色錦及常行小文字綾錦花文所織盤龍對鳳麒麟師子天馬辟邪孔鵲仙鶴芝草萬字雙勝及諸織差樣文字等亦宜禁斷又曰張萬福為和州刺史賊許果至楚州大掠節度使韋元甫命萬福追討未至淮陰果為其將康自勸所逐自勸擁兵繼掠循淮南東萬福倍道追而殺之代宗發詔以勞之賜衣一襲宮錦十雙又曰太和中賜修指南車記里古人故金忠義男公亮緋衣牙笏錦三十疋范子計然曰錦大丈出陳留列, SBCK: 孫}
