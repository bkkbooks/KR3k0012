  - {type: variant, offset: 3080, length: 1, content: 便, SBCK: 曰石非繒綵之稱􅀳令曰第三品巳下得服􅄂杯之綺第六品巳下得服七綵綺東宫舊事曰太子納妃有七綵杯文綺􅀍一絳石杯文綺􅀍一七綵杯文絳袴長命杯文綺袴司馬相如長文賦曰張羅綺之幔帷垂楚組之連綱班固西都賦曰紅羅颯纚綺組􅌭紛潘岳秋興賦序曰余兼虎賁中郎將寓直散􅀐之省珥蟬冕襲綺紈之士此馬遊處古詩曰客從逺方來贈我一端綺文作􅀟鴛鴦裁爲合歡􅀍又曰緗綺爲下裳紫綺爲上襦曹植詩曰西北有織婦綺縞何􅌭紛清晨秉機杼日暮不}
