  - {type: variant, offset: 4903, length: 2, content: 甘泉, SBCK: 馬融􅀶洽通儒敎養諸生千數融好侈飾常施絳紗帳前授生徒後列女樂􅀳書曰武帝泰始九年帝多簡良家子女以充内職自擇其美者以絳紗繫臂梁書曰王僧孺㓜貧其母鬻紗布以自業事具鹵簿門後魏書曰游明根以年踰七十表求致仕優詔許之引入陳謝悲不自勝帝言別殷勤仍爲流涕賜青紗丹衣委貌冠􅀍褥錦􅂁等物北齊書曰琅邪王儼字威仁武成第三子拜京畿大都督領軍大將軍領御史中丞遷大司徒􅀄從北宫出將上中丞凢京畿歩騎領軍之官屬中丞之威儀司徒之鹵簿莫不畢備帝與后在華林園東門外張幕隔青紗歩障觀之北史齊盧道䖍娉妻元氏甚聦悟常􅂛髙􅚋講老子道䖍從弟元明隔紗帷以聽焉唐書曰太宗幸蒲州刺史趙元揩服黄紗單衣迎謁路左東宫舊事曰皇太子􅀄拜}
  - {type: page-break, offset: 4903, content: '', id: KR3k0012_SBCK_816-7a}
  - {type: variant, offset: 4903, length: 2, content: 甘泉, WYG: 馬融􅀶洽通儒教養諸生千數融好侈飾常施紗帳前授生徒後列女樂晉書曰武帝泰始元年帝多用良家子女以充内職自擇其美者以絳紗繫臂梁書曰王僧孺㓜貧其母鬻紗布以自業事具鹵簿門後魏書曰遊明根以年踰七十表求致仕罷詔許之引入陳謝悲不自勝帝言别慇懃仍為流涕賜青單衣委貌冠被褥錦袍等物北齊書曰琅琊王儼字威仁武成第三于拜京畿大都督領軍大將軍領御史中丞遷大司徒初從北宮出將上中丞凡京畿步騎領軍之官属中丞之威儀司徒之鹵簿莫不畢備帝與后在華林園東門外張幕隔青紗步障觀之北史齊盧道䖍聘妻元氏甚聦悟常升髙坐講老子道䖍弟元明隔羅帷以聽馬唐書曰太宗幸蒲州刺史趙元楷課父老服黃紗單衣迎謁路左東宮舊事曰皇太子初拜}
