  - {type: variant, offset: 3068, length: 0, content: '', krp: 羅縠累月而成裁之爲幔内外視之飄飄如煙氣輕動而房内自涼異苑曰張仲舒爲司空廣陵城北元嘉年七月中輙見門側有赤氣赫然後空中忽雨絳羅於其庭内廣七八分長五六寸皆}
  - {type: variant, offset: 3069, length: 1, content: 五, SBCK: 箋􅁓繼之廣長亦與羅等紛紛甚張惡而焚之猶有數片府州多相傳示張經􅀫􅁀疾而死世􅀃曰武帝常降王武子供饌悉用琉璃器婢子百餘人皆綾羅袴以手擎飲食宋玉風賦曰躋于羅帷經于洞房司馬相如美人賦曰女以玉􅁫挂臣冠羅䄂拂臣衣張衡南都賦曰羅韈懾惵而容與古詩曰明月何皎皎照我羅床帷古歌詩曰大婦織綺羅中婦織流黃小婦無所作挾瑟上髙堂阮籍詩曰西方有佳人皎皎如日光被服纎羅衣左右佩􅀟璫綺廣雅曰鬱金流黃綦綺􅀃文曰綺文繒也釋名曰綺踦也其文欹邪不順經緯之縱橫也有杯文形似杯也有長命其采}
  - {type: page-break, offset: 3069, content: '', id: KR3k0012_SBCK_816-2b}
  - {type: variant, offset: 3069, length: 1, content: 五, WYG: 巧}
  - {type: variant, offset: 3069, length: 1, content: 五, krp: 箋𥿄繼之廣長亦與羅等紛紛甚張惡而焚之猶有數片府州多相傳示張經宿暴疾而死世說曰武帝常降王武子供饌悉用琉璃器婢子百餘人皆綾羅袴以手擎飲食宋玉風賦曰躋于羅帷經于洞房司馬相如美人賦曰女以玉釵挂臣冠羅䄂拂臣衣張衡南都賦曰羅韈懾惵而容與古詩曰明月何皎皎照我羅床帷古歌詩曰大婦織綺羅中婦織流黃小婦無所作挾瑟上髙堂阮籍詩曰西方有佳人皎皎如日光被服纎羅衣左右佩雙璫綺廣雅曰鬱金流黃綦綺說文曰綺文繒也釋名曰綺踦也其文欹邪不順經緯之縱橫也有杯文形似杯也有長命其采}
