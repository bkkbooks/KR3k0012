  - {type: variant, offset: 4948, length: 1, content: 吳, SBCK: 江漢之民至暮春上巳之日禊集之祠或結五色紗囊盛食沉於波中以言蛟龍水虫畏之不侵食也蔡克別傳曰克字子尼體貌尊嚴莫有媟嫚髙平劉整儁才白衣居家車服奢麗謂人曰紗縠吾之常服耳遇蔡子在㘴而經日不自安齊諧記曰餘杭縣有一人姓沈名蹤與父同入山至夜二更中忽見一人着紗㡌披絳綾􅂁云是闘山王闘山在餘杭縣秦記曰符堅以太常韋逞母宋氏傳其父業周官音義乃就宋家立講堂書生百人隔絳紗幔而受業焉綃毛詩義䟽曰楊之水素衣朱繡繡當爲綃綃綺也禮記玉藻曰君子狐青裘豹褏玄綃衣以楊之君子大夫士也綃綺屬也染之於玄以狐青裘相冝也廣雅曰綃謂之緗􅀳令曰第六品巳下不得服羅綃王子年拾遺記曰燕昭王二年廣延國來獻善舞者二人昭王處以單綃華幄又曰呉}
