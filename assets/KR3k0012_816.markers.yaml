  - {type: variant, offset: 1664, length: 241, content: 佛圖澄有重於勒下書衣澄以綾錦乘以雕輦南史曰宋元凶劭將作難賜袁淑等袴褶又就主衣取錦裁三尺為一叚又中裂之分蕭斌與淑及左右使以縛袴褶齊書曰江淹為宣城太守時罷歸始泊禪靈寺渚夜夢一人自稱張景陽謂曰前以一疋錦相寄今可見還淹探懷中得數尺與之此人大恚曰郍得割截都盡顧見丘遲謂曰餘尺既無用以遺君自爾淹文章躓矣趙書曰前石死調大臣子弟六十人為挽郎引錦一疋後魏書曰甄琛為定州刺史既至鄉衣錦晝遊政體嚴細甚無聲譽又曰孝武至彭城宋江夏王義恭獻蠟燭十挺武陵王駿獻錦一疋北史曰齊畢義雲家有十餘機織錦并造金銀器物後周書, WYG: ''}
