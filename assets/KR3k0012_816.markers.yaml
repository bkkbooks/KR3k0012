  - {type: variant, offset: 4922, length: 1, content: 孔, WYG: 漢武帝思夫人問少君曰朕思李氏其可得乎少君曰可遙見而不可同帷幄耳潜英石色青輕如毛羽寒盛則石溫暑盛則石冷刻之人像不異真人使此往後則夫人至矣乃遣人至暗海經年而還得此石命工依李夫人形刻成置於輕紗幕裏宛若生時帝大悦又曰江漢之民至暮春上巳之日禊集招祗之祠或結五色紗囊盛食沈於波中以食蛟龍水蟲畏之不侵食也蔡克别傳曰克字}
