  - {type: variant, offset: 36, length: 581, content: 禮記王制曰錦文珠玉成器不鬻於市不示民也奢與貪成猶善也禮記玉藻曰童子之節也緇衣衣錦緣錦紬并紐錦束髮皆朱錦童子未冠之稱冠禮曰將冠者彩絲衣紒也又玉藻曰君衣狐白裘錦衣以褐之錦衣狐裘諸侯之服也又曰居士錦帶居士道藝處士也又中庸曰詩云衣錦褧衣惡其文之著也故君子之道暗然而日章小人之道的然而日亡言君子深遠難知小人淺近易知也所以不知孔子以其深遠也襌為褧錦衣以美而君子以褧表之為其文章露似小人也左傳閔公曰衛遷于曹齊桓公歸夫人魚軒重錦三十兩又襄三曰晉侯先歸公享晉六卿于蒲圃賄荀偃束錦加璧又襄五曰左師見夫人之步馬者步馬習馬問之對曰君夫人氏也左師曰誰為君夫人余胡弗知圉人歸以告夫人使饋之錦與馬先之以玉又襄六曰子皮欲使尹何為邑子產曰少未知可否子皮曰吾愛之夫往而學焉亦愈知治子產曰人之愛人求利之也今吾子愛人以政猶未能操刀而使割也其傷實多子之愛人傷之而已子有美錦不使人學製焉大官大邑身之所庇而使學者製焉其為美錦不亦多乎言官邑人重多於美錦也又昭四曰晉合諸侯次于衛地叔鮒求貨於衛淫蒭蕘者淫放也欲使衛惠之而致貨也衛人使屠伯饋叔向羹與一篋錦屠伯衛大夫也曰諸侯事晉未敢攜貳況衛在君之宇下屋宇之下喻近而敢有異志蒭蕘者異於他日敢請之請止之也叔向受羹反錦受羹示不逆其意且非貨也又昭四曰平丘之會公不與盟晉人執季孫意如以幕蒙之使狄人守之司鐸射魯大夫也懷錦奉壺飲冰以匍匐焉守者御之乃與之錦而入匍匐竊往飲季孫也冰箭箭蓋, SBCK: 麤}
