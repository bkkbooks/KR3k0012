  - {type: variant, offset: 2693, length: 9, content: 好獻錦組百純郭璞注, SBCK: 西京􅄂記}
  - {type: variant, offset: 2693, length: 264, content: 好獻錦組百純郭璞注曰純疋錦名也組綾屬音祖也西王母再拜受之又曰盛姬之喪天子使襞人贈用文錦漢武內傳曰帝見西王母巾器中有一卷小黃書盛以紫錦之囊帝問此書是仙方耶不審其目可得瞻盻不王母出以示之此五岳之真形圖也文祕禁豈汝穢質所宜佩王母即命女宋靈賓更取一圖以與武帝靈賓探懷中得一卷盛以雲錦之囊王母起立手以付帝說苑曰魏文侯與田子方語有兩童子衣錦而侍於君前田子曰此君之寵子乎文侯曰非也此其父死於戰此其幼孤也寡人收之潛夫論曰夫攻玉以石治金以鹽濯錦以魚浣布以灰物故有以醜治好者矣郭子橫洞冥記曰元鼎元年起招仙靈閣於甘泉宮西編翠羽麟毫為廉有走龍錦有翻鴻錦, WYG: ''}
