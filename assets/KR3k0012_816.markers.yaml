  - {type: variant, offset: 4922, length: 2, content: 孔子, SBCK: 漢武帝思李夫人不可復得詔董仲君曰朕思李氏其可得乎仲君曰可遥見而不可同帷幄有潜英石色青輕如毛羽寒盛則石温暑盛則石冷刻之人像不異眞人使此像徃則夫人至矣乃遣人至海經年而還得此石命工衣李夫人彩刻成置於輕紗幕裏宛􅀂}
