  - {type: variant, offset: 1338, length: 197, content: 南子使人謂之曰四方君子之來者必見寡小君孔子不得已見之夫人在錦帷中孔子北面稽首吳志曰蔣欽字公弈為右護軍孫權常入其內母練帳縹被權歎其在貴守約勑御府為其母作錦被改易帷帳又曰甘寧住止常以繒錦維舟去輒割棄以示奢又曰諸葛融父兄質素雖在軍旅身無采飾而融錦罽文繡獨為奢侈環氏吳紀曰蜀遣使獻重錦千端江表傳曰陸遜攻劉備於夷陵備捨舡步走燒皮鎧以斷道使兵以錦挽車走入白帝蜀志曰先主入益州賜諸葛亮法正張飛關羽錦各千疋王隱, WYG: 也}
