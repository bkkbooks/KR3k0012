  - {type: variant, offset: 5025, length: 4, content: 針絕吳越, SBCK: 綈几諸侯皆以竹木爲之不得加綈錦之飾王子年拾遺記曰漢成帝於太液池傍起宵遊宫以􅃮爲柱鋪黒綈之幕又造飛行殿所􅄑之宫咸以氊綈籍地惡車轍馬跡之喧也竹林七賢論曰舊俗七月七日法當曬衣諸阮庭中爛然莫非錦綈阮咸時緫角乃豎長竿摽大布犢鼻於庭中曰未能免俗爾鄴中記曰石虎尚方御府中巧工作錦織成署皆數百人有青綈或白綈或緋綈或黃綈或緑綈或紫綈范子計然曰綈出河東鹽鐵論曰鼲貂狢不益錦綈之寳是以王者不珎張衡西京賦曰木衣綈錦土􅀍朱紫􅄢韋輝光毛詩問曰七月之時無􅄄箋云􅄄毛布也賤者之所服也今􅄢亦用爲之爾雅曰􅈊􅄢也郭璞注曰毛􅈊所以爲􅄢也揵爲舎人注曰􅈊毛也􅄢胡人績羊毛作衣􅀃文曰􅄢西胡毳布也呉曆曰魏文帝賜呉王太子􅄢二張呉志曰孫堅爲董卓軍所攻堅與數十騎潰圍而出堅常着赤􅄢幘令親近將祖茂著之卓騎爭逐茂故堅從間道得免于寳􅀳紀曰孫皓遣使詔書賜班􅄢五十張絳􅄢二十張紫青􅄢各十五張崔鴻十六國}
