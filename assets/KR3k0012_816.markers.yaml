  - {type: variant, offset: 3175, length: 0, content: '', WYG: 綺席六重長一丈干寳晉紀曰初洛中名服有白石綺織者尤之曰石非繒綵之稱晉令曰第三品已下得服雜杯之綺第六品已下得服七綵綺東宮舊事曰太子納妃有七綵杯文綺被一絳石杯文綺被一七綵杯文絳袴長命杯文綺袴司馬相如長門賦曰張羅綺之幔帷垂楚紐之連綱班固西都賦曰紅羅颯纚綺組繽紛潘岳秋興賦序曰今兼虎賁中郎將寓直散騎之省珥璫冕裳綺紈之士此焉遊處古詩曰客從逺方來贈我一端綺文作雙鴛鴦裁為合歡被又曰緗綺為下裳紫綺為上襦曹植詩曰西北有織婦綺縞何繽紛清晨秉機杼日暮不成文織成廣邪曰天竺出細織成續漢書輿服志曰虎賁武騎皆鶡冠虎文章衣襄邑歲獻織成虎文魏畧曰大秦國出金織成帳吳時魏國𫝊曰大秦國天竺國皆金縷織成晉後畧曰張方兵入洛諸官府大刼掠御寳織成流蘇皆分割為馬棧矣晉令曰織成衣為禁物搜神記曰陳節方諸神東海君以織成青襦一領遺之西京雜記曰宣帝被收繫郡邸獄臂上猶帶史良姊合采婉轉}
