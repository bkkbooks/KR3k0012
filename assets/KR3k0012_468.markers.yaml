  - {type: variant, offset: 1119, length: 174, content: 非樂其貴然喜下人得吾也又曰龍且與韓信夾濰水陣信乃夜令人為萬餘囊滿盛沙水壅上流引軍半渡擊龍且佯不勝還走龍且果喜曰固知韓信怯也追信渡水信使人決壅囊水大至擊殺龍且又曰慶雲喜氣也又曰呂后謂高祖曰季所居之上常有雲氣故從性常得季高祖心喜又曰邑中人民嘗俱出獵任安為人分麋鹿雉兔眾人皆喜曰無傷也任少卿分則平也漢書曰朱博為左馮翊長陵大姓尚方禁少時盜人妻見斫創著頰博聞, SBCK: 憂}
