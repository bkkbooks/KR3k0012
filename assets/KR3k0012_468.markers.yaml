  - {type: variant, offset: 49, length: 0, content: '', krp: 王在在鎬凱樂飲酒禮記曰傲不可長欲不可從志不可満樂不可極又曰樂者樂也君子樂得其道小人樂得其欲又曰子貢觀於蜡孔子曰賜也樂乎對曰一國之人皆若狂賜未知其樂也子曰百日之蜡一日之澤非尔所知也左傳曰公入而賦大隧之中其樂也融融姜氏出而賦大隧之外其樂也洩洩論語曰有朋自逺方來不亦樂乎又曰飯𬞞食飲水曲肱而枕之樂亦在其中矣又曰樂然後笑人不厭其笑又曰在陋巷人不堪其憂回也不改其樂又曰不仁者不可以長處樂戰國策曰魏文侯與虞人期獵是日飲酒樂天雨文侯出左右曰飲酒樂天又雨君將焉之文侯曰吾與虞人期獵雖樂豈可不一㑹期哉乃徃身自罷之魏於是始強又曰梁王魏嬰㑹諸侯於蘭臺酒酣請魯君舉觴魯君避席曰昔楚王登疆臺而望崇山左江右湖以臨方皇其樂忘死曰後代必有以髙臺陂池亡國者今君前夾林後蘭臺疆臺之樂可無誡乎東觀漢記曰光武發薊還士衆喜樂師行鼔舞歌詠雷聲又曰東平王張蒼曰爲善最樂袁宏後漢紀曰光武甞聽朝至于日側講經至於夜半皇太子從容曰陛下有禹湯之明而失黃老養性之道今天下又安願省思慮養精神優遊以自寛上荅曰吾以爲樂也王沈魏書曰太祖告歸郷里築室城外習讀書傳秋冬弋獵以自娯樂裴子野宋畧曰廢帝於華林園爲列肆親自酤賣又開瀆與左右引舡唱呼以爲歡樂管子曰桀放虎入市樂人之驚晏子春秋曰景公飲酒數日去冠破裳自鼓盆問左右曰仁人者亦樂此乎晏子曰人所以貴於禽獸者以有禮也君無禮何以臨下景公請易衣冠也又曰景公飲酒移於晏子前駈欵門曰君至晏子立於門曰國家得微有故乎君何爲非時而夜辱公曰酒醲之味金石之聲願與夫子樂之晏子曰夫鋪薦席陳簠簋者有人臣不敢預焉又移司馬穰苴穰苴介胄操㦸立門曰鋪薦蓆陳簠簋者有人臣不敢預焉又移於梁丘據據左援琴右挈竽行歌而至公曰樂哉今夕吾飲微二子何以治吾國微此一臣何以樂吾身也文子曰秦楚燕魏之歌異傳而皆樂也列子曰仲尼間居子貢入侍而有憂色子貢不敢問岀告顔回回援琴而歌孔子問曰若奚敢獨樂回曰吾昔聞諸夫子樂天知命故不憂回所以樂也又曰孔子遊太山見榮啓期行乎郕之野鹿裘帶索鼔琴而歌孔子曰先生所爲樂何也對曰吾樂甚多天生萬物人爲貴吾旣得爲人一樂也男女之別男尊女卑吾旣得爲男二樂也人生有不見日月不免襁褓吾行年九十是三樂也貧者人之常死者命之終處常待終當何憂哉孔子曰自寛者也又曰林類年且百歳晨㫪被裘拾遺穗於故畦並歌並進孔子適衛望之謂子貢曰彼叟可與言子貢逆之壠端面之歎曰先生曽不悔乎乃仰而應曰吾何悔邪吾所以爲樂人皆有之而反以爲憂少不勤行長不競時故能夀若此老無妻子死期將至故能樂若此莊子曰古之得道者窮亦樂通亦樂所樂非窮通也道德於此則窮通爲寒暑}
  - {type: variant, offset: 51, length: 0, content: '', SBCK: 之序矣又曰與人和者謂之人樂與天和者謂之天樂又曰莊子與惠子遊濠梁水上莊子曰鯈魚出遊從容是魚樂也惠子曰子非魚安知魚之樂也莊子曰子非我安知我不知魚之樂又曰孔子謂顔回曰回來家貧居卑不仕乎對曰不願仕回有郭外之田五十􅅿足以給饘粥郭内之田十􅅿足以爲絲麻以道自樂回不願仕也孟子曰君子有三樂父母俱存兄弟無故一樂也仰不愧天俯不怍人二樂也得天下英才而教育之三樂也又曰樂人之樂人亦樂其樂憂人之憂人亦憂其憂從獸無厭謂之荒樂酒無厭謂之亡又曰梁惠王立沼上頋鴻鵠麋鹿曰賢者亦樂此乎孟子曰賢者而後樂此不賢者雖有此不樂荀子曰子路問於孔子曰君子亦有憂乎孔子曰君子其未得也則樂其意旣巳得之又樂其治是以有終身之樂無一日之憂小人其未得則憂不得之旣得之又恐失之是以有終身之憂而無一日之樂又曰鳯烏啾啾其翼􅀂竽其聲􅀂簫有皇有鳯樂帝之心淮南子曰令尹子佩請飲莊王莊王許諾子佩之於京臺莊王不徃明日子佩跣揖北面立於殿下曰昔君王許之今不果徃意者臣有罪乎莊王曰吾聞子具於京臺京臺者南望獵山以臨方皇左江而右淮其樂忘歸􅀂薄徳之人不可以當此樂也恐流不能反又曰吾所謂樂者人得其得者也夫得其得者不以奢爲樂不以慊爲悲與隂俱閉與陽俱開與子夏心戰而曜道勝而肥聖人不以身徇物不欲人爲之而以自樂也頋子曰遇其樂也則欲荒􅁋流湎逮其喜也則欲歡􅀏鼓舞荒流則傷義鼔舞則􅃜風又曰子謂子華曰􅈛有四樂頗知之乎子華曰未之知也子曰二親具存是􅈛一樂兄弟無故是􅈛二樂夫和妻柔是􅈛三樂披褐懷玉是􅈛四樂子華曰華乃有五遇千載之㑹而登夫子之堂則華之五樂也又曰或曰夫人三墳五典八索九丘蓋聖人之陳迹耳子何好焉子曰上紀五帝之盛下述百王之義粲粲}
