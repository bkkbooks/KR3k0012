  - {type: variant, offset: 820, length: 233, content: 實言而無謀是以難及於身子何喜焉戰國策曰呂他亡西周之東周盡輸西周情於東周東周大喜又曰孟嘗君出行至楚楚獻象床郢之登徒直送之不欲往見孟嘗門人公孫戊曰臣郢之登徒直送象床象床之直千金傷此若髮標賣妻息不足以償足下能使僕無行先人有寶劍願獻之戊曰諾入見孟嘗曰五國所以皆致相印於君以國事累君者誠悅君之義慕君之廉今君至楚而受象床所未至國將何以待君孟嘗曰善戊趍而出孟嘗君曰今子舉足高志之楊何也戊曰臣有大喜三重之以寶劍一孟嘗曰何謂也戊曰門下百數莫敢入諫臣入諫一喜諫而聽臣二喜諫而止君之過三喜, SBCK: 困}
