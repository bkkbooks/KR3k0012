  - {type: variant, offset: 56, length: 2, content: 已既, WYG: 及刈穫請令民人自刈刈𫝊郭者歸可以益食不資冦三請宓子不聽俄而麥畢資乎齊冦季孫聞之怒使人讓宓子宓子曰今年失麥明年可樹令不耕者得穫是樂有冦也且一嵗之麥於魯不加强䘮之不加弱令民有自取之心必數年不息季孫聞之慙曰使穴可入乎吾豈忍見宓子哉揚雄連珠曰臣聞天下三樂焉隂陽和調四時不忒年豐物遂無有夭折灾害不生兵戎不作天下之樂也聖明在上禄不遺賢罰不偏罪君子小人各處其位衆人之樂也吏不苟暴役賦不重財力不傷安土樂業民之樂也劉向説苑曰楚昭王欲之荆臺逰司馬子綦進諫曰荆臺之逰左洞庭之陂右彭蠡之水南望獵山下臨方淮其樂使人遺老而忘死人君逰者盡以亡其國願大王勿往逰焉又曰齊景公逰海上樂之六月不歸令左右敢言歸者死顔燭諌曰君樂治海不樂治國彼至有治國者且安得樂此海也譙周法訓曰或曰君子處陋巷之中奚樂也曰樂得其親樂得其友樂聖人之道也劉向列女𫝊曰楚昭越姬者越王勾踐之女也昭王燕逰蔡姬在左右越姬驂乗駟以馳逐登附燕莊之臺以望雲夣之囿乃顧謂二姬曰樂乎吾願與子生死若此蔡姬曰故願生俱樂死同時顧謂史書之楚辭曰樂莫樂於新相知劉伶酒徳頌曰先生乃捧罌承糟銜盃潄醪無思無慮其樂陶陶曹子建箜篌引曰樂飲過三爵緩帶傾庶羞主稱千金夀賓奉萬年酬憂上説文曰憂愁也易曰作易者其有憂患乎又曰當其憂悔吝之時纎介不可慢也毛詩曰踧踧周道鞠為茂草我心憂傷惄焉如𢷬假寐永歎惟憂用老又曰知我者謂我心憂不知我者謂我何求又曰未}
