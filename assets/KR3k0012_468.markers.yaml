  - {type: variant, offset: 2006, length: 1028, content: 各騎竹馬於道次迎拜伋問曰兒曹何自遠來對曰聞使君到喜故來奉迎魏志曰潁川戲志才籌畫士也太祖甚器之早卒太祖與荀彧書曰自志才亡後莫可與計事者汝潁固多奇士誰可以繼之彧薦郭嘉召見論天下事太祖曰使孤成大業者必此人也嘉出亦喜曰真吾主矣表為司空軍謀吳志曰曹公破走魯肅先還權大喜肅將入閤拜權起禮之因謂曰孤特鞌下馬相迎足以顯卿未肅趍進曰未也眾人聞之無不愕然就坐徐舉鞭曰願至尊威德加乎四海總括九州克成帝業更以安車蒲輪徵肅始當顯耳權拊掌歡笑王隱晉書曰石珩問袁甫壽春以西何以常旱東何以恒水甫曰東是吳人新附積憂成陰西是中國新平吳珍寶美人皆入志盈心滿長歡故旱孫嚴宋書曰劉宣字萬壽彭城人也素曉天文知晉室當復又夢九土服之覺而喜曰九者桓也桓既吞矣吾當復本土乎齊書曰謝超宗詣東府門自通其日風慘太祖謂四座曰此客至使人不衣自暖矣超宗既坐飲酒數巡辭氣橫出太祖對之甚歡崔鴻後秦錄曰秦末祅星見于東井尹緯知秦將滅心喜踴躍向天再拜唐書陸贄從幸山南道途艱險扈從不及與帝相失一夕不至上喻軍士曰得贄者賞千金翌日贄謁見上喜形於顏色其寵待如此周書曰人有五氣喜氣內畜雖欲隱之陽喜必見喜色油然以出又曰師曠見太子晉曰願聞一言王子應之曰吾聞太師將來吾心甚喜既已見子喜而又懼吾年甚少見子而懾盡忘吾度韓詩外傳曰曾子曰吾嘗仕為吏祿不過鍾釜尚猶欣欣而喜者非以為多也樂其逮親也張勃吳錄曰長沙桓王在歷陽遣書呼周瑜瑜將兵五百人舡糧器仗星夜馳赴王大喜執瑜手曰卿至諧矣又曰吳王之女有所怨王者遂自殺王痛之葬於昌門外文石為槨高墳深池珍玩人馬以徇葬國人哀之湛盧之劍夜飛去楚楚昭王覺劍在其床首昭王召風胡子而問焉對曰越獻劍於吳名曰湛盧人君有過則去適他國聞吳王葬女奢侈以人從死其必是也昭王大喜胡沖吳曆曰太史慈字子義於神亭戰敗為孫策所執策素聞其名即解縛諮問進取之術慈曰州郡新破士卒離心若儻分散難復合藂欲出宣恩安集恐不合尊旨策長跪荅曰誠本心所望也明日日中望君來還諸將皆疑策曰太史子義青州名士以信義為先終不欺策明日大會諸將預設酒食立竿視中而慈至策大懽喜常與參論軍事司馬彪九州春秋曰曹公與袁紹相距遣人招張繡繡欲歸紹賈詡勸繡歸曹公繡曰紹強又曹公與吾有讎不可詡曰此乃所以宜從之也夫有霸王之志者固將釋大怨明德於四海也繡從之歸曹公曹公見之喜執詡手曰使我信重於天下者君也檀道鸞續晉陽秋曰初符堅南寇京師大震謝玄入問討禦之方謝安夷然無懼色玄等既破賊有驛書至安方對客圍棊看書既畢攝放床上了無喜色還棊如故客問之安徐荅云小兒輩遂已破賊客罷還內過戶安心喜甚不覺履齒之折其矯情鎮物如此也太公, SBCK: ''}
  - {type: variant, offset: 2006, length: 1028, content: 各騎竹馬於道次迎拜伋問曰兒曹何自遠來對曰聞使君到喜故來奉迎魏志曰潁川戲志才籌畫士也太祖甚器之早卒太祖與荀彧書曰自志才亡後莫可與計事者汝潁固多奇士誰可以繼之彧薦郭嘉召見論天下事太祖曰使孤成大業者必此人也嘉出亦喜曰真吾主矣表為司空軍謀吳志曰曹公破走魯肅先還權大喜肅將入閤拜權起禮之因謂曰孤特鞌下馬相迎足以顯卿未肅趍進曰未也眾人聞之無不愕然就坐徐舉鞭曰願至尊威德加乎四海總括九州克成帝業更以安車蒲輪徵肅始當顯耳權拊掌歡笑王隱晉書曰石珩問袁甫壽春以西何以常旱東何以恒水甫曰東是吳人新附積憂成陰西是中國新平吳珍寶美人皆入志盈心滿長歡故旱孫嚴宋書曰劉宣字萬壽彭城人也素曉天文知晉室當復又夢九土服之覺而喜曰九者桓也桓既吞矣吾當復本土乎齊書曰謝超宗詣東府門自通其日風慘太祖謂四座曰此客至使人不衣自暖矣超宗既坐飲酒數巡辭氣橫出太祖對之甚歡崔鴻後秦錄曰秦末祅星見于東井尹緯知秦將滅心喜踴躍向天再拜唐書陸贄從幸山南道途艱險扈從不及與帝相失一夕不至上喻軍士曰得贄者賞千金翌日贄謁見上喜形於顏色其寵待如此周書曰人有五氣喜氣內畜雖欲隱之陽喜必見喜色油然以出又曰師曠見太子晉曰願聞一言王子應之曰吾聞太師將來吾心甚喜既已見子喜而又懼吾年甚少見子而懾盡忘吾度韓詩外傳曰曾子曰吾嘗仕為吏祿不過鍾釜尚猶欣欣而喜者非以為多也樂其逮親也張勃吳錄曰長沙桓王在歷陽遣書呼周瑜瑜將兵五百人舡糧器仗星夜馳赴王大喜執瑜手曰卿至諧矣又曰吳王之女有所怨王者遂自殺王痛之葬於昌門外文石為槨高墳深池珍玩人馬以徇葬國人哀之湛盧之劍夜飛去楚楚昭王覺劍在其床首昭王召風胡子而問焉對曰越獻劍於吳名曰湛盧人君有過則去適他國聞吳王葬女奢侈以人從死其必是也昭王大喜胡沖吳曆曰太史慈字子義於神亭戰敗為孫策所執策素聞其名即解縛諮問進取之術慈曰州郡新破士卒離心若儻分散難復合藂欲出宣恩安集恐不合尊旨策長跪荅曰誠本心所望也明日日中望君來還諸將皆疑策曰太史子義青州名士以信義為先終不欺策明日大會諸將預設酒食立竿視中而慈至策大懽喜常與參論軍事司馬彪九州春秋曰曹公與袁紹相距遣人招張繡繡欲歸紹賈詡勸繡歸曹公繡曰紹強又曹公與吾有讎不可詡曰此乃所以宜從之也夫有霸王之志者固將釋大怨明德於四海也繡從之歸曹公曹公見之喜執詡手曰使我信重於天下者君也檀道鸞續晉陽秋曰初符堅南寇京師大震謝玄入問討禦之方謝安夷然無懼色玄等既破賊有驛書至安方對客圍棊看書既畢攝放床上了無喜色還棊如故客問之安徐荅云小兒輩遂已破賊客罷還內過戶安心喜甚不覺履齒之折其矯情鎮物如此也太公, WYG: ''}
