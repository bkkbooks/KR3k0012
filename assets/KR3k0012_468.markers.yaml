  - {type: variant, offset: 1294, length: 632, content: 它事召視其面果瘢博辟左右問方禁是何創禁自知情得叩頭服狀博笑曰大丈夫固時有是博欲洒卿恥能自效不方禁且喜且懼對曰必死博因親信以為耳目又曰高祖入關與父老約法三章民大喜也又曰英布間行與隋何俱歸漢王方踞床洗召布入見布大怒悔來欲自死就舍張御食飲從官如漢王居布又大喜又曰韓信投漢蕭何等已數言上不用即亡何聞信亡不及以聞自追之人有言上曰丞相何亡上怒如失左右手居一二日何來謁上且怒且喜又曰呂須嘗以陳平前為高帝謀執樊噲數讒平於呂后曰為丞相不治事日飲醇酒戲婦人平聞日益甚太后聞之私喜又曰翟方進隨父至汝南蔡父奇方進形皃有封侯骨方進既厭為小吏聞蔡父言心喜又曰匈奴單于言願壻漢氏以自親元帝以後宮良家子王嬙字昭君賜單于單于忻喜謝承後漢書曰廬江毛義家貧以孝行稱南陽張奉慕其名往候之坐定而府檄適至以義守令義捧檄而入喜動顏色續漢書曰荀爽嘗謁李膺因為其御既還喜曰今日乃得御李君侯見慕如此東觀漢記曰上謂鮑永曰我攻懷三日兵不下關東畏卿且將故人往即拜永諫大夫至懷謂太守曰足下所以堅不下者未知孰是也今聖主即位天下以定不降何待即開城降上大喜與永對食又曰賈復北與五校戰於真定大破之復傷瘡甚上驚復病尋愈追及上上見大喜又曰梁鴻妻椎髻著布衣操作具而前鴻大喜曰此真梁鴻之妻也字之曰德曜孟光又曰上幸長祠高廟十一陵歷覽宮館舊處會郡縣吏勞賜作樂者有縣三老大言陛下入東都臣望顏色容儀類似先帝臣一驩喜百官嚴設如舊時臣二驩喜見吏賞賜識先帝時事臣三驩喜陛下聽用直諫默然受之臣四驩喜陛下至明懲艾酷吏視人如赤子臣五驩喜進賢用能各得其所臣六驩喜, SBCK: ''}
  - {type: variant, offset: 1294, length: 632, content: 它事召視其面果瘢博辟左右問方禁是何創禁自知情得叩頭服狀博笑曰大丈夫固時有是博欲洒卿恥能自效不方禁且喜且懼對曰必死博因親信以為耳目又曰高祖入關與父老約法三章民大喜也又曰英布間行與隋何俱歸漢王方踞床洗召布入見布大怒悔來欲自死就舍張御食飲從官如漢王居布又大喜又曰韓信投漢蕭何等已數言上不用即亡何聞信亡不及以聞自追之人有言上曰丞相何亡上怒如失左右手居一二日何來謁上且怒且喜又曰呂須嘗以陳平前為高帝謀執樊噲數讒平於呂后曰為丞相不治事日飲醇酒戲婦人平聞日益甚太后聞之私喜又曰翟方進隨父至汝南蔡父奇方進形皃有封侯骨方進既厭為小吏聞蔡父言心喜又曰匈奴單于言願壻漢氏以自親元帝以後宮良家子王嬙字昭君賜單于單于忻喜謝承後漢書曰廬江毛義家貧以孝行稱南陽張奉慕其名往候之坐定而府檄適至以義守令義捧檄而入喜動顏色續漢書曰荀爽嘗謁李膺因為其御既還喜曰今日乃得御李君侯見慕如此東觀漢記曰上謂鮑永曰我攻懷三日兵不下關東畏卿且將故人往即拜永諫大夫至懷謂太守曰足下所以堅不下者未知孰是也今聖主即位天下以定不降何待即開城降上大喜與永對食又曰賈復北與五校戰於真定大破之復傷瘡甚上驚復病尋愈追及上上見大喜又曰梁鴻妻椎髻著布衣操作具而前鴻大喜曰此真梁鴻之妻也字之曰德曜孟光又曰上幸長祠高廟十一陵歷覽宮館舊處會郡縣吏勞賜作樂者有縣三老大言陛下入東都臣望顏色容儀類似先帝臣一驩喜百官嚴設如舊時臣二驩喜見吏賞賜識先帝時事臣三驩喜陛下聽用直諫默然受之臣四驩喜陛下至明懲艾酷吏視人如赤子臣五驩喜進賢用能各得其所臣六驩喜, WYG: ''}
