  - {type: variant, offset: 464, length: 354, content: 公羊傳曰九月丁卯子同生子同者孰謂謂莊公何言乎子同生喜有正也此言喜有正何久無正子也又曰齊高子來盟高子者何齊大夫也何以不稱使我無君也然則何以不名喜之也爾雅曰坎坎僔僔喜也論語曰父母之年不可不知也一則以喜一則以懼又曰上失其道民散久矣如得其情則哀矜而勿喜又曰子曰道不行乘桴浮于海從我者其由也與子路聞之喜尚書中候曰維王既誅崇侯虎諸侯貢萬民咸喜鄭玄曰王文王也貢貢國異物色也尚書大傳曰惟丙午王還師師乃鼓譟師乃慆前歌後舞鄭玄曰慆喜也眾大喜前歌後舞也春秋元命包曰兩口衘土為喜喜得明心喜者為憙憙天心宋均曰心為天王布政之宮萬物須之乃盛所以為喜也今於口間土移一畫之者於字體安也是為兩口土也喜得明明得所喜也春秋繁露曰春之言猶蠢也蠢蠢者喜樂之皃國語曰伯宗朝以喜歸其妻曰子貌有喜何也曰吾言於朝諸大夫皆謂我似陽子知有似也陽子陽處父也對曰陽子華, SBCK: 憂}
