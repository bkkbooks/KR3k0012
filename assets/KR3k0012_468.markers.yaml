  - {type: variant, offset: 1056, length: 1, content: 趙, SBCK: 􅁗昭王臨朝歎息應侯進曰臣聞主憂臣辱主辱臣死今大王中朝而憂臣敢請其罪昭王曰吾聞楚之䥫劒利則士勇倡優拙則思慮逺矣以逺思慮而御勇士恐楚之圖􅁗也今武安君死鄭安平叛内無良將外多敵國吾是以憂又曰懷王}
  - {type: page-break, offset: 1056, content: '', id: KR3k0012_SBCK_468-6b}
  - {type: variant, offset: 1056, length: 1, content: 趙, WYG: 秦昭王臨朝歎息應侯進曰臣聞主憂臣辱主辱臣死今大王中朝而憂臣敢請其罪昭王曰吾聞楚之鐡劒利則戰士勇倡優拙則思慮遠矣以遠思慮而御勇士恐楚之圖秦也今武安君死鄭安平叛内無良將外多敵國吾是以憂又曰懐王}
  - {type: variant, offset: 1056, length: 1, content: 趙, krp: 秦昭王臨朝歎息應侯進曰臣聞主憂臣辱主辱臣死今大王中朝而憂臣敢請其罪昭王曰吾聞楚之䥫劒利則士勇倡優拙則思慮逺矣以逺思慮而御勇士恐楚之圖秦也今武安君死鄭安平叛内無良將外多敵國吾是以憂又曰懷王}
  - {type: variant, offset: 1058, length: 1, content: 蘭, SBCK: 屈原造爲憲令草藁未定尚上官大夫見而欲奪之不與因䜛之曰王使平爲令衆莫不知每一令出平伐其功王怒而踈平平疾䜛謟蔽明也邪曲之害公也方正之不容也故憂愁幽思而作離騷蜀志曰曹公征孫權呼先主自救先主遣使告劉璋曰曹公征呉呉憂危急孫氏與􅀌夲爲脣齒又曰進在青泥與􅀜羽}
  - {type: variant, offset: 1058, length: 1, content: 蘭, WYG: 屈原造為憲令草稾未定上官大夫見而欲奪之不與因䜛之曰王使平為令衆莫不知每一令出平伐其功王怒而疎平平疾䜛諂之蔽明也邪曲之害公也方正之不容也故憂愁幽思而作離騷蜀志曰曹公征孫權權呼先主自救先主遣使告劉璋曰曹公征吳吳憂危急孫氏與孤本為脣齒又曰進在青泥與雲長}
  - {type: page-break, offset: 1058, content: '', id: KR3k0012_WYG_468-10b, image: WYG0897/WYG0897-0278d.png}
  - {type: variant, offset: 1058, length: 1, content: 蘭, krp: 屈原造爲憲令草藁未定尚上官大夫見而欲奪之不與因䜛之曰王使平爲令衆莫不知每一令出平伐其功王怒而踈平平疾䜛謟蔽明也邪曲之害公也方正之不容也故憂愁幽思而作離騷蜀志曰曹公征孫權呼先主自救先主遣使告劉璋曰曹公征呉呉憂危急孫氏與孤夲爲脣齒又曰進在青泥與關羽}
  - {type: variant, offset: 1060, length: 0, content: '', SBCK: 距今不徃救進必尅轉侵州界其憂有甚於魯魯自守之賊不足慮沈約宋書曰武帝起桓玄聞便憂懼無復計或曰劉􅁉等衆力甚弱豈能有成陛下何慮之􅀇曰劉􅁉自足爲一丗之雄劉毅家無檐石之儲樗蒲一擲百萬何無忌劉牢之之甥酷似其舅共舉大事何謂無成吴越春秋曰越王欲復怨於呉冬寒則抱氷夏􅀬則握火憂苦其志懸膽於户岀入甞之不絶於口華陽國志曰蜀中傳相告曰井中有人學士靳普言客星入東井益州之分憂刺客入耳山海經曰牛首山有草名曰鬼目其葉}
  - {type: page-break, offset: 1060, content: '', id: KR3k0012_SBCK_468-7a}
