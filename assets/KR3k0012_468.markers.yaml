  - {type: variant, offset: 3115, length: 934, content: 九日謂亭長曰曹濟南雖敗存亡未可知公幸能以車牛相送往還四五日吾厚報公亭長乃以車牛送操未至譙數十里騎求操者多操開帷示之皆大喜始寤是操雷換別傳曰張華以煥為豊城令得雙寶劍乃送一劍與華自留一劍華得劍甚喜曰此干將也邴原別傳曰魏太祖為司空辟原署東閤祭酒太祖北伐三郡克單于還太祖曰孤返鄴守諸君必將來迎其不來者獨邴祭酒耳言訖未久而原先至門下通謁太祖大喜攬履而起遠出迎原曰賢者誠難則度孤謂君將不能來而遠自屈誠副飢虛之心零陵先賢傳曰劉巴入益益州牧劉璋見而驚喜每有事咨問璋遣法正迎劉備巴諫曰備雄人入必有為不可內也既入巴復諫曰若使備討張魯是放虎於山林璋不聽巴閉門稱疾備攻成都令軍中曰其有害巴者誅及三族及得巴甚喜列異記曰華子魚為諸生寄宿入門外主人婦夜生頃兩吏詣門便辟易卻相謂曰公在此躊躕良久一吏曰籍當定柰何住乃前向子魚拜相將入出並行共語曰當與幾歲一人曰當三歲子魚後故往視之兒果已死子魚喜曰我固當公後果為太尉西京雜記曰樊將軍噲問陸賈曰自古人君皆云受命於天云有瑞應豈有是乎賈應之曰有之夫目瞤得酒食火花得錢財幹鵲噪則行人至蜘蛛集而百事喜也晉朝雜事曰明帝入幘不正元帝自為正之明帝大喜莊子曰凡交近則靡以信遠則必忠之言以言必或傳之失傳兩喜兩怒之方天下之難者也夫兩喜必多溢美之言兩怒必多溢惡之言凡溢之類妄則信之列子曰鄭人有薪於野者遇駭鹿從而擊之斃恐人之見也遽藏諸隍中覆之以蕉不勝其喜俄而遺其所藏之處遂以為夢焉又曰堯微服遊於康衢聞兒童謠曰立我蒸民莫匪爾極不識不知順帝之則堯喜曰疇教爾為此言童兒曰我聞之大夫問大夫曰古詩也孟子曰魯欲使樂正子為政孟子聞之喜而不寐公孫丑曰奚為喜曰其為人也好善又曰子路人告其過則喜抱朴子曰人主有道國無粗政則四七從度五星不逆日不蝕朔月不薄望霜不夏繁雷不冬洩嘉瑞並臻災厲寢滅此則天喜也呂氏春秋曰湯聞伊尹使人請之有侁氏有侁氏不可伊尹亦欲歸湯湯於是請取婦為婚有侁氏喜以伊尹為媵送女顧子曰夫哀樂喜怒愛憎欲懼人之情也當其哀也則欲哭泣擗踴遇其樂也則欲懽笑鼓舞公孫尼子曰君子怒則自說以和喜則收之以正楚辭曰師望在肆昌何識敼刀楊聲后乃喜王逸曰師謂太公也昌文王也后亦文王也曹植禮上表曰臣得去幽屏之城獲覲百官之美此一喜也背茅茨之陋登閶闔之闥此二喜也必以有靦之容瞻見穆穆之顏此三喜也將以檮杌之質稟受崇聖之訓此四喜也, SBCK: ''}
