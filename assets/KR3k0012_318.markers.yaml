  - {type: variant, offset: 2701, length: 0, content: '', SBCK: 將軍即墨之時坐則織簣立則杖箠爲士卒唱曰恐宗廟士矣故將有死之心無生之氣今將軍東有掖邑之封西有淄上之寳黄金横帶馳乎淄澠之間是以樂生而惡死也田單明日結髪祖于矢石之間乃引桴而鼓之翟人下之淮南子曰趙簡子死未葬中牟入齊中牟自入臣於齊也巳葬五日襄子起兵攻之}
