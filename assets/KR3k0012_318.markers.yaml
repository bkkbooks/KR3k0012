  - {type: variant, offset: 2703, length: 1, content: 必, SBCK: 自壞者十丈襄子擊金而退之軍法鼓以進衆鉦以退之軍吏諌曰君誅中牟之罪而城自壞是天助我何故去之襄子曰吾聞之叔向曰君子不乗人於利不迫人於險使之治城城成而後攻之中牟聞其義乃請降古司馬兵法曰衆以合寡爲追裹而闕合有交兵衆者以寡合對追逐也圍也以衆擊寡逐而圍之聞其去道無令死戰敵􅀂衆則受裹敵衆巳寡則依利道而受圍以堅衆心分共四向而受敵則衆以死爲生故能衝逐四出以克勝也敵􅀂寡􅀂畏則譬之}
