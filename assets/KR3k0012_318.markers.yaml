  - {type: variant, offset: 2199, length: 0, content: '', WYG: 攻洪同永安二城並㧞之是夜虹見於晉城上首向南尾入紫宫長十餘丈帝每日自汾曲赴城下督戰城中惶窘庚午齊行臺左丞侯子欽出降壬午齊晉州刺史崔景嵩守城北面夜宻遣送欵上開府王軌率衆應之未明登城鼓譟齊衆潰遂剋晉州擒其城主俘甲士八千人送關中隋書曰大業中煬帝徴天下驍果之士以伐遼左沈光預焉同類數萬人皆出其下光將詣行在所賔客送至灞上者百餘騎光酧酒而誓曰是行也若不能建功立名當死於髙麗不復與諸君相見矣及從帝攻遼東以衝梯擊城竿長十五丈光升其端臨城與賊戰短兵接殺數人賊競擊之而墜未及於地適遇竿尚有垂絙光接而復上帝望見壯異之馳召與語大悦即日拜朝請大夫賜寳刀良馬恒致左右親顧漸宻又曰陳稜大業}
