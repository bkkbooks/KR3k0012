  - {type: variant, offset: 2206, length: 0, content: '', SBCK: 燕鳯字子章代人也少好學􅀶綜經史明習隂陽䜟緯昭成以禮迎致之鳯不應聘命諸軍圍代城人曰燕鳯不來吾將屠汝代人懼送鳯昭城與語大恱待以賔禮北史曰西魏將}
  - {type: variant, offset: 2206, length: 0, content: '', WYG: 髙祖率衆攻屈突通於河東士卒登城南面者已千餘人髙祖在東原望之而不見㑹暴雨至鳴角止軍由是不剋或勸遂攻之髙祖曰屈突通習兵而無勇若决戰非其所長嬰城難以必勝此自守虜耳不足為虞遂収軍營于河渚又曰薛萬均圍梁師都突厥率衆來援諸將見賊城險固皆有憚色萬均謂之曰城中無氣鼓聲不徹此見敗亡之候平在旦夕諸君勿以為憂俄而師都見殺城降又曰天寳末禄山反尚衡起義兵討禄山以}
  - {type: page-break, offset: 2206, content: '', id: KR3k0012_WYG_318-11b, image: WYG0895/WYG0895-0740b.png}
  - {type: variant, offset: 2206, length: 0, content: '', krp: 燕鳯字子章代人也少好學博綜經史明習隂陽䜟緯昭成以禮迎致之鳯不應聘命諸軍圍代城人曰燕鳯不來吾將屠汝代人懼送鳯昭城與語大恱待以賔禮北史曰西魏將}
  - {type: variant, offset: 2207, length: 0, content: '', SBCK: 思政守潁川郡城東魏師十萬攻之備盡攻擊之術以潁水灌城䧟之思政知事不濟率左右據土山謂之曰吾受國任遂辱王命力屈道窮計無所出唯當効死以謝朝恩仰天大哭左右皆號慟思政向西再拜便欲自剄先是齊文襄告城中人曰有生致王大將軍者封侯重賞􅀂大將軍身有損親近左右皆從大戮都督駱訓謂思政曰公常語訓等但將我頭降非但得冨貴亦是活一城人今髙襄旣有此語公豈不哀城中士卒也固共止之不得引決齊文襄遣其散􅀐常侍趙産􅀷就土山執手申意引見文襄辭氣慷􅁣涕泗交流無屈撓之容文襄以其忠於所事禮遇甚厚思政􅀄入頴川士卒八千人及城䧟之日存者􅂊三千人遂無叛者後周書曰武帝建德五年東伐齊六軍攻􅀳州城帝屯於汾曲齊王憲攻洪洞永安二城並㧞之是夜虹見於晉城上首向南尾入紫宫長十餘文帝每日自汾曲赴城下親督戰城下惶窘庚午齊行臺左丞侯子欽出降壬午齊􅀳州刺史崔景嵩守城北面夜宻遣送欵上開府王􅁤率衆應之未明登城鼓噪齊衆潰遂剋􅀳州擒其城主俘甲士八千人送􅀜中隋書曰大業中煬帝徴天下驍果之士以伐遼左沈光預焉同􅀋數萬人皆出其下光將詣行在所賔客送至灞上者百餘􅀐光酹酒而誓曰是行也􅀂不能建功立名當死於髙麗不復與諸君相見矣及從帝攻遼東以衝梯擊城竿長十五丈光昇其端臨城與賊戰短兵接殺十數人賊竟擊之而墜未及於地適遇竿上有垂絙光接而復上帝望見壯異之馳召與語大恱即日拜朝請大夫賜寳刀良馬恒致左右親顧漸宻又曰陳稜大業三年拜賀武賁}
