  - {type: variant, offset: 2317, length: 3, content: 聞車駕, SBCK: 無氣鼓聲不徹此見敗亡之候平在旦夕諸君勿以爲憂俄而師都見殺城降又曰天寳末禄山反尚衡起義兵討禄山以王栖曜爲牙旗將下兖鄆諸縣軍威稍振兼衙前㹅管復下曹州初逆將邢超然乗城號令栖曜曰彼可取也一箭殞之城中氣懾遂下又曰馬燧自京還太原􅀄田恱新代承嗣統兵恐人不附巳詐示誠􅅃燧上䟽明其必反冝先備之其年恱果與青􅁪州通謀自將兵五萬圍邢州攻臨洺築重城内絶其外以拒救兵邢州將李洪臨洺將張伾皆堅守不㧞昭義軍數告急乃詔燧將救臨洺燧軍出崞口兵未過險乃遣人持書喻􅀃且示之好悅謂燧畏之十一月師次邯鄲恱遣使}
