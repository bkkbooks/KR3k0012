  - {type: variant, offset: 990, length: 1188, content: 三月克之哀其窮故為退師尚不服故獲圍之九十日入自皇門至于逵路方九執曰逵鄭伯肉袒牽羊以逆示服為臣僕也曰孤實不天不為天所祐不能事君使君懷怒以及弊邑孤之罪也敢不唯命是聽其俘諸江南以實海濱亦唯命其剪以賜諸侯使臣妾之亦唯命若惠顧前好世有盟誓使改事君夷於九縣楚滅九國以為縣也君之惠也孤之願也非所敢望也敢布腹心君實圖之又曰齊侯伐我北鄙圍龍魯邑頃公之嬖人盧蒲就魁門焉攻龍門也龍人囚之齊人曰弗殺吾與而盟弗聽殺而膊諸城上膊磔也齊侯怒親鼓士陵城三日取龍國語曰晉獻公見翟相之氛歸寢不寐翟相國名也言有亡國之氣也一曰敵國有善祥己國凶惡也郄叔虎朝公語之遂伐翟相叔虎乘城被羽先登剋之羽羽衣登并其城也戰國策曰平原君謂馮忌曰寡人欲出兵攻燕何如對曰不可夫以秦將伐武安君公孫起乘十勝之威與馬服子戰於長平之下大敗趙師自以餘兵圍邯鄲之城趙以十敗之餘收破軍之弊秦罷於邯鄲之下趙守而不可拔者攻難而守易也今非有十克之威而燕非有長平之禍也今一敗之禍未復而欲以罷趙攻強燕強秦以兵承趙之弊此乃強吳所以亡而弱越所以霸也故臣未見燕之可攻也平原曰善又曰樂羊為魏將而攻中山其子在中山中山之君烹其子而遺羹樂羊坐於幕下啜之盡一杯文侯曰樂羊以我故食其子之羹賞其功而疑其心又曰秦攻趙蘇子說秦王曰臣聞王之於民也多聽而時用之是故事無敗也臣聞懷重寶者不夜行任大功者不輕敵是以賢者任重而行恭智者功大而辭順故民不惡其尊世不妬其業秦乃解兵諸侯休天下安不相攻二十九年史記曰秦末沛公破南陽守齮走保城守宛齮魚綺切張良曰沛公雖欲急入關秦兵尚眾距險今不下宛宛從後擊彊秦在前此危道也於是沛公乃夜引軍從他道還更張旗幟黎明圍宛城三匝黎未也未明之貌頃已圍之事畢方明又言黎黑色亦未明也南陽守欲自剄其舍人陳恢曰死未晚也乃踰城見沛公曰臣聞足下約先入咸陽者王之今足下留守宛宛大郡之都也連城數十人庶眾積蓄多吏人自以為降必死故皆堅守乘城今足下盡日止攻士死傷者必多引兵去宛宛必隨足下後足下前則失咸陽之約後又有彊宛之患為足下計莫若約降封其守因使止守引其甲卒與之西諸城未下者聞聲爭開門而待足下通行無所累矣沛公曰善乃以宛守為殷侯封陳恢千戶引兵而無有不下者又曰武安君白起攻韓拔九城斬首五萬又周本紀曰古公積德行義國人皆戴之獯育戎狄攻之欲得財物與之已復攻欲得地與民民皆怒欲戰古公曰今戎翟所為攻戰以吾地與民民之在我與其在彼何異民欲以我故戰殺人父子而君之予不忍為漢書李陵傳曰單于急攻陵陵居谷中虜在山上四面射之矢下如雨又曰李廣利及郡國惡年少數萬人至貳師取善馬故號貳師將軍當道小國各堅守不肯給食攻郁城殺傷甚眾引而還天子聞之大怒使使遮玉關軍有敢入輒斬之貳師恐益發惡少年及邊騎六萬人伐宛宛城外流水於是遣水工徙其城攻之三十餘日宛貴人相與謀遣人到貳師軍約漢無攻我我盡出善馬貳師許之取善馬中馬以三千疋餘後漢書曰河南賊董憲招誘五校餘賊步騎數千人屯建陽去昌慮三十里光武親征至番音波去憲百餘里諸將請進帝不聽知五校乏食當退勑各各堅壁, SBCK: ''}
