  - {type: variant, offset: 3249, length: 241, content: 月城中餓死者過半尚聞鄴急將兵萬餘人還救操逆擊破之尚走依曲漳為營操復圍之尚懼遣陰夔陳球請降不聽尚還走藍田操復進急圍之尚將馬迎等臨陣降眾大潰尚奔中山盡收其輜重得尚印綬節鉞及衣物以示城中城中崩沮配審命士卒曰堅守死戰操軍疲矣幽州方至何憂無主以其兄子榮為東門校尉榮夜開門內操兵配猶拒戰城陷生獲配意活之配意氣壯烈終無撓辭見者莫不歎息遂斬之魏志曰袁紹圍太祖於官渡糧乏問計於賈詡詡曰公明勝紹勇勝紹用人勝紹決機勝紹有此四勝而半年不定者但顧萬全故也必決其機須臾可定太祖曰善乃棄兵出為圍擊紹紹軍大潰河北平, SBCK: ''}
