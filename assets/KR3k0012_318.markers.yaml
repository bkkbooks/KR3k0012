  - {type: variant, offset: 2200, length: 1, content: 日, SBCK: 萬兆等及圍不合神武連繫牛驢自塞之於是將士死戰四靣奮擊}
  - {type: variant, offset: 2200, length: 0, content: '', WYG: 年拜武賁郎將後三嵗與朝請大夫張鎮周發東陽兵萬餘人自義安汎海擊琉球國月餘而至琉球人初見船艦以為商旅往往詣軍中貨易稜率衆登岸遣鎮周為先鋒其主歡斯渇刺兠遣兵拒戰鎮周頻擊破之稜至低沒檀洞其小王歡斯老模率兵拒戰稜擊敗之斬老模其}
  - {type: page-break, offset: 2200, content: '', id: KR3k0012_WYG_318-9b, image: WYG0895/WYG0895-0739b.png}
  - {type: variant, offset: 2200, length: 1, content: 日, krp: 萬兆等及圍不合神武連繫牛驢自塞之於是將士死戰四靣奮擊}
  - {type: variant, offset: 2201, length: 0, content: '', WYG: 霧雨晦瞑將士皆懼稜刑白馬以祭海神既而開霽分為五軍趨其都邑渇刺兠率衆數千逆拒稜遣鎮周先鋒擊走之稜乗勝逐北至其柵渇刺兠背柵而陣稜盡鋭擊之從晨至未苦鬭不息渇刺兠自以兵疲引入柵稜遂填塹攻破其柵斬渇刺兠獲其子島槌虜男女數千而歸帝大悦進稜位右光禄大夫武賁如故唐書曰武徳初宇文化及據聊城淮安王神通進兵躡之祕書丞徴謂神通曰化及今據聊城莘人為其固守若至莘即宜攻取但㧞莘縣聊城益懼因而逼之易同俯拾湏以攻具自隨一足威敵二不乏用不然兵至莘城見無攻具不下如不能剋莘而逺追化及恐亦無功則化及非旬月可獲莘人阻我糧運化及為之外援恐非計之善者神通不從軍次莘果不下而退敗又曰武徳中李靖隨河間王孝恭討輔公祏賊遣將率舟師三萬頓于當塗柵斷江口傍江築城又遣陸軍二萬據當塗南路亦造栅自固並蓄力養鋭以抗大軍諸將皆云二軍並是强兵為不戰之計城柵既固率不可攻請直指丹陽掩其巢穴若丹陽既破二軍可不戰而破靖曰公祏精鋭雖在水陸二軍然其自統之兵亦是勁勇二軍城柵尚不可攻公祏既保石頭豈應易㧞若我帥師至丹陽留停旬日進則石頭未平退則歸路已絶此便背腹受敵恐非萬全之計然此二軍皆是百戰餘賊必不憚於野戰今若攻其城栅乃是出其不意滅賊之機唯在此舉靖乃率諸將水陸俱進}
