  - {type: variant, offset: 228, length: 437, content: 餘吾所守者力不足也所以攻者力有餘也所以善守者藏於九地之下因其山水丘陵之固善攻者動於九天之上因天時力利之變若動於九天之上也故能自保而全勝也又曰攻而必取者攻其所不守也守而必固者守其所必攻也謂敵之惜者也故善攻者敵不知其所守善守者敵不知其所攻清不洩也微乎微乎故能隱於常形神乎神乎故能為敵司命進不可禦者衝其虛也退而不可追也速而不可及也卒往攻其虛解退又疾也故我欲戰雖高壘深溝不得不與我戰者攻其所必救之絕糧道守歸路攻君王也我不欲戰畫地而守之軍不煩也敵不得與我戰者乘其所之乘捩也捩其道示以利害使疑之我末脩壘塹敵人不敢敵我者以形勢之長攻就能加之於敵也左傳曰晉荀吳帥師伐鮮虞圍鼓鼓伯狄之別種也巨鹿下曲陽縣有鼓聚鼓人或請以城叛穆子弗許曰或以吾城叛吾所惡也人以城來吾獨何好焉使敵殺叛人而繕守備圍鼓三月鼓人請降使其民見曰猶有食色姑脩而城軍吏曰獲城而弗取何以事君穆子曰吾以事君也獲一邑而教民怠將焉用邑人能事其君我亦能事吾君卒義不爽爽差好惡不愆城可獲而民知義所知義所在有死命而無二心不亦可乎鼓人告食竭力盡, SBCK: 冝急}
