  - {type: variant, offset: 2314, length: 1, content: 鋒, SBCK: 巢穴􅀂丹陽旣破二軍可不戰而破靖曰公祏精銳雖在水陸二軍然其自統之兵亦是勁勇二軍城柵尚不可攻公祏旣保石頭豈應易㧞􅀂我師師至丹陽留停旬日進則石頭未平退則歸路巳絶此便腹背受敵恐非萬全之計然此二軍皆是百戰餘賊必不憚於野戰今􅀂攻其城柵乃是出其不意滅賊之機唯在此舉靖乃率諸將水戰俱苦戰破之二軍悉潰走靖遂率輕兵先至丹陽公袥餘衆雖多不敢戰擁兵東走並相次擒獲又曰髙祖率衆攻屈突通於河東士卒登城南面者巳千餘人髙祖在東原望之而不見㑹􅁀􅀨至鳴角止軍由是不剋或勸遂攻之髙祖曰屈突通習兵而無勇􅀂決戰非其所長嬰城難以必勝此自守虜耳不足爲虞遂収軍營於河渚又曰薛萬均圍梁師都突厥不敢來援諸將見賊城險固皆有憚色萬均謂之曰}
