  - {type: variant, offset: 15, length: 0, content: '', WYG: 其日西風兵火俱攻賊以繩繫鐵鈎摘挽城樓樓柱㧞壞又作鐵鈎􅠁城登梯得上所挽樓城墻三十歩壞約始大怖使戴洋呼孫叔敖伍子胥卿若使胡奴得城當持白酒寸脯著卿前急令轉風却賊當上肥牛中後風轉下晡賊退晉書曰趙王倫孫秀為義師所討日蹙乃與秀謀或欲收餘卒出戰或欲焚燒宫室誅殺不附己者或欲乗船東走入海計未决王輿率營兵七百餘人自南掖門入勅宫中兵各守衞諸門三部司馬為應于内自往攻秀秀閉中書南門輿放兵登墻燒屋秀及左右遽走出左衞將軍趙泉斬秀等以狥宋書曰髙祖率兵伐後秦姚泓後魏遣鵝青等歩騎十萬屯河北有數千騎緣河隨晉軍進止時軍人緣河南岸牽百丈河流迅急有漂渡北岸者輒為魏人所殺掠遣軍纔過岸即退軍還復來髙祖乃遣白直隊王丁旿率七百人及車百乗于河北岸上去水百餘步為却月陣兩頭抱河車置七仗士事畢使竪一白毦魏人見數百人步牽車上不解其意並未動髙祖先命朱超石馳往赴之並齎大弩百張一車益二十人設彭排轅上魏人見營陣既立乃進圍營超石先以軟弓小箭射敵敵以衆少兵弱四面俱至遂内薄攻營於是百弩俱發又遣善射者叢箭射之魏衆既多不能制超石初行别齎大鎚并千餘張矟乃斷矟長三四尺以鎚鎚之一矟輒洞貫三四人魏衆不能當一時奔潰退還平城又曰晉義熙五年六月偽燕主慕容超留羸老守廣固使其廣甯王賀賴盧及公孫五樓悉力據臨胊去城四十里有巨蔑水超告五樓急據之比至為龍符所保五樓乃退有車四千兩分為二翼方􅁤徐行車張幔御者執矟又以輕騎為遊軍軍令嚴肅比及臨胊賊騎交至帝命兖州刺史劉藩荆州刺史劉道隣等陷其陣日向昃戰猶酣帝用叅軍胡藩策襲剋臨胊賊乃大奔超遁還廣固獲其玉璽豹尾輦等送于都丙子剋廣固大城超保其小城乃築長圍以守之館榖於齊土停江淮轉輸又曰朱修之隨到彦之北伐彦之自河南廻留修之戍滑臺為魏將安頡所圍至絶糧將士熏鼠食之循被圍既久母常悲憂忽一旦乳汁驚出母號慟告家人曰我年老非復有乳汁時今如此兒必沒矣魏果以其日剋滑臺囚之又曰宗越為長水校尉竟陵王誕據廣陵反越領馬軍𨽻沈慶之攻誕及城䧟孝武使悉殺城内男丁越受㫖行誅躬臨其事莫不先加棰楚或有鞭其面者欣欣然若有所得所殺凡數千人改封始安縣子三國典略曰侯景收其餘衆步騎八百南過小城城人登陴詬之曰跛脚奴景怒}
