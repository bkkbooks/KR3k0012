  - {type: variant, offset: 2195, length: 0, content: '', SBCK: 則上下䘮氣必士卒攝魂敗亡之驗也殿下前以廣固天險守昜攻難故爲長乆之䇿今賊形便不與徃同冝急攻之以省千金之費恪曰護老賊經變多矣觀其爲備之道未昜卒圗令圈之窮城樵採路絶内無蓄積外無強援不過十旬其斃必矣何必遽殘士卒之命而趍一時之利哉吾嚴濬圍壘休養將卒以重官羙貨間而離之事淹􅀔窮其釁昜動我則未勞而㓂巳弊此謂兵不血刃坐以制勝也遂長圍守之凡經六月而野王潰護南奔于晉悉降其衆後魏書曰齊神武起義兵於河北􅀍爾朱兆天光度律仲逺等}
  - {type: variant, offset: 2195, length: 0, content: '', WYG: 則上下喪氣必士卒攝魂敗亡之騐也殿下前以廣固天險守易攻難故為長久之策今賊形便不與往同宜急攻之以省千金之費恪曰護老賊經變多矣觀其為備之道未易卒圖今圍之窮城樵採路絶内無蓄積外無强援不過十旬其斃必矣何必遽殘士卒之命而趨一時之利哉吾嚴濬圍壘休養將卒以重官美貨間而離之事淹勢窮其釁易動我則未勞而冦已弊此謂兵不血刃坐以制勝也遂長圍守之凡經六月而野王潰護南奔于晉悉降其衆後魏書曰齊神武起義兵於河北被爾朱兆天光度律仲逺等四將同㑹鄴南精强士馬號二十萬圍於鄴南韓陵山時神武馬二千步不滿三萬衆寡不敵乃為圓陣連牛馬以塞歸路於是將士死戰}
  - {type: page-break, offset: 2195, content: '', id: KR3k0012_WYG_318-6b, image: WYG0895/WYG0895-0737d.png}
  - {type: page-break, offset: 2195, content: '', id: KR3k0012_WYG_318-7a, image: WYG0895/WYG0895-0738a.png}
  - {type: variant, offset: 2195, length: 0, content: '', krp: 則上下䘮氣必士卒攝魂敗亡之驗也殿下前以廣固天險守昜攻難故爲長乆之䇿今賊形便不與徃同冝急攻之以省千金之費恪曰護老賊經變多矣觀其爲備之道未昜卒圗令圈之窮城樵採路絶内無蓄積外無強援不過十旬其斃必矣何必遽殘士卒之命而趍一時之利哉吾嚴濬圍壘休養將卒以重官羙貨間而離之事淹勢窮其釁昜動我則未勞而㓂巳弊此謂兵不血刃坐以制勝也遂長圍守之凡經六月而野王潰護南奔于晉悉降其衆後魏書曰齊神武起義兵於河北𬒳爾朱兆天光度律仲逺等}
  - {type: variant, offset: 2196, length: 3, content: 面攻憲, SBCK: 將同㑹鄴南士馬精強號二十萬圍於鄴南韓陵山時神武馬二千歩不滿}
  - {type: variant, offset: 2196, length: 3, content: 面攻憲, krp: 將同㑹鄴南士馬精強號二十萬圍於鄴南韓陵山時神武馬二千歩不滿}
  - {type: variant, offset: 2197, length: 0, content: '', WYG: 奮擊大破兆等又曰燕鳯字子章代人也好學博綜經史明習隂陽䜟緯昭成以禮迎致之鳯不應聘命諸軍圍代城令曰燕鳯不來吾將屠汝代人懼送鳯昭成與語大悦待以賔禮北史曰西魏將王思政守潁川郡城東魏師十萬}
  - {type: variant, offset: 2198, length: 0, content: '', WYG: 之備盡攻擊之術以潁水灌城陷之思政知事不濟率左右據山上謂之曰吾受國任遂辱王命力屈道窮計無所出唯當効死以謝朝恩仰天大哭左右皆號慟思政向西再拜便欲自剄先是齊文襄告城中人曰有生致王大將軍者封侯重賞若大將軍身有損親近左右皆從大戮都督駱訓謂思政曰公常語訓等但將我頭降非但得富貴亦足活一城人今敵人既有此語公豈不哀城中士卒也因共止之不得引决齊文襄遣其散騎常侍趙彦深就土山執手申意引見文襄辭氣慷慨涕泗交流無屈撓之容文襄以其忠於所事禮遇甚厚思政初入潁川士卒八千人及城陷之日存者纔三千人遂無叛者後周書曰武帝建徳五年東伐齊六軍攻晉州城屯於汾曲齊王}
