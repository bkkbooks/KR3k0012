  - {type: variant, offset: 2413, length: 153, content: 攻城未日中而拔之故開圍一角令其眾得奔歸鍾城鍾城人聞祝阿已潰大恐懼遂空壁亡去又曰漢將朱儁與荊州刺史徐璆共討黃巾擊賊帥趙弘斬之賊餘帥韓忠復據宛乞降司馬張超請聽之儁曰兵有形同而勢異者昔秦項之際人無定主故賞降附勸以來耳今海內一統唯黃巾造寇納降無以勸善討之足以懲惡今若受之更開逆意賊利則進戰鈍則乞降縱敵長寇非良計也因, SBCK: 至暮}
