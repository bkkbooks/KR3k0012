  - {type: variant, offset: 15, length: 0, content: '', SBCK: 大戰其日西風兵火俱攻賊以繩繫䥫鈎擿挽城樓樓住㧞壞又作䥫鈎􅠁音斸城登挮得上所挽樓城北角行墻三十歩壞約始大怖使戴洋呼孫叔敖伍子胥卿􅀂使胡奴得城當持白酒寸脯着卿前急今轉風却賊當上肥牛中後風轉下晡賊退亦不知風偶自轉爲能感動晉書曰趙王倫孫秀爲義師所討日蹙乃與秀謀或欲収餘卒出戰或欲焚燒宫室誅殺不赴已者或欲乗􅂳東走入海計未決王與率營兵七百餘人自南掖門入勑宫中兵各守衛諸門三部司馬爲應於内與自徃攻秀秀閉中書南門與放兵登墻燒屋秀及左右遽走出左衛將軍趙泉斬秀等以徇又曰劉􅁉率兵伐後􅁗姚泓後魏遣將鵝青等歩􅀐十萬屯河北有數千􅀐縁河隨晉軍進止時軍人縁河南岸牽百丈河流迅急有漂渡北岸者輙爲魏人所殺掠遣軍􅂊過岸即退軍還復來宋武乃遣白直隊主丁旿音午率七百人及車百乗於河北岸上去水百餘歩爲却月陣兩頭抱河車置七仗士事畢使竪一白眊仍吏功羽毛飾魏人見數百人歩牽車上不解其意並未動宋武先命朱超石戒嚴二千人白眊旣舉超石馳徃赴之並賷大弩百張一車益二千人設彭排轅上魏人見營陣乃進圍營超石先以軟弓小箭射敵敵以衆少兵弱四面俱發寅薄攻營於是百弩俱發又遣善射者叢箭射之魏衆旣多弩不能制超石初行別賷大搥并千餘張矟乃斷矟長四尺以搥搥之一矟輙洞貫三四人魏衆不能當一時奔潰宋書曰晉義熈五年六月僞燕主慕容超留羸老守廣固使其廣寗王賀刺盧及公孫五樓悉力據臨胊去城四十里有臣夢水超告五樓急據之北至爲龍符所保五樓乃退大軍分四千兩車爲二翼方軓徐行車悉張幰御者執矟以􅀐爲遊軍軍令嚴肅比及臨胊賊􅀐交至帝命兖州刺史劉藩荆州刺史劉道隣等䧟其陣日向􅉴戰猶酣帝用叅軍胡藩䇿襲剋臨胊賊乃大奔超遁還廣固獲其玉璽豹尾輦等送于都景子剋廣固大城超固其小城乃築長圍以守之舘􅂖於青土停江淮轉輸又曰朱循之隨右軍到彦之北自河南􅅆循之留戍滑臺􅀍魏將安頡攻之圍糧絶將士熏䑕食之循之􅀍圍旣乆母常悲憂忽一旦乳汁驚出母號慟告家人曰我年老非復有乳汁時今如此兒必没矣魏果以其日剋滑臺囚之又曰宗越爲長水校尉竟陵王誕據廣陵反越領軍馬􅀠沈慶之攻誕及城䧟孝武使悉殺城内男丁越受旨行誅躬臨其事莫不先加捶楚或有鞭其靣者欣然有所得殺凡數千人改封始安縣子三國典略曰侯景収其餘衆歩􅀐八百南過小城城人登埤詬之曰跛脚奴景怒}
