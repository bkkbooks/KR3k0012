  - {type: variant, offset: 18, length: 2, content: 法為, SBCK: 殺詬者而去又曰周王思政固守頴川髙岳乆圍}
  - {type: variant, offset: 18, length: 1, content: 法, WYG: 殺詬者而去又曰周王思政固守頴川髙岳久圍不解陳元康言于齊王澄曰公自匡輔朝政未有殊功雖敗侯景本非外賊頴城将陷願公因而乗之足以取威定業王從之于是親至頴川益發其衆號曰决命夫更起土山王坐於堰上趙道徳言於王曰箭頭有鐵不避大王引王帶而下箭集於王坐之所梁書曰武帝自襄陽率兵東下至鄂州攻未㧞蕭頴胄在江陵遣衞尉席闡文勞軍因謂梁武曰今頓兵兩岸不併軍圍郢定西陽武昌取江州此機已失莫若請救于魏與北連和猶}
  - {type: page-break, offset: 18, content: '', id: KR3k0012_WYG_318-4b, image: WYG0895/WYG0895-0736d.png}
  - {type: variant, offset: 18, length: 2, content: 法為, krp: 殺詬者而去又曰周王思政固守頴川髙岳乆圍}
  - {type: variant, offset: 20, length: 0, content: '', WYG: 上策梁武謂闡文曰漢口路通荆雍控引秦梁糧運資儲聽此氣息若分兵前進魯山必阻沔路所謂搤喉若粮運}
  - {type: variant, offset: 21, length: 0, content: '', SBCK: 解陳元康言於齊王澄曰公自匡輔朝政未有殊功雖敗侯景夲非外賊潁城將䧟願公因而乗之足以取威定業王從之於是親至頴川益發其衆號曰決命夫更起土山王坐於堰上趙道德言於王曰箭頭有鐵不避大王引王帯而下箭集於王㘴之所梁書曰武帝自襄陽率兵東下至郢州攻未柭蕭頴胄在江陵遣衛尉席闡文勞軍因謂梁武曰今頓兵兩岸不併軍圍郢定西陽武昌取江州此機已失莫􅀂請救於魏與北連和猶爲上䇿梁武謂闡文曰漢口路通荆雍控引􅁗梁糧運資儲聽此氣息兵􅀂進魯山必阻河路所謂搤喉􅀂糧運不通自然離散何謂持乆劉元起近欲以三千徃定㝷陽彼􅀂懽然悟機一酈生亦足脫拒我師固非三千能下西陽武昌取使耳}
  - {type: page-break, offset: 21, content: '', id: KR3k0012_SBCK_318-3a}
  - {type: variant, offset: 21, length: 0, content: '', WYG: 通自然離散何謂持久劉元起近欲以三千兵往定㝷陽彼若懽然悟機一酈生亦足脱拒王師故非三千能下西陽武昌取便}
  - {type: page-break, offset: 21, content: '', id: KR3k0012_WYG_318-5a, image: WYG0895/WYG0895-0737a.png}
  - {type: variant, offset: 21, length: 0, content: '', krp: 解陳元康言於齊王澄曰公自匡輔朝政未有殊功雖敗侯景夲非外賊潁城將䧟願公因而乗之足以取威定業王從之於是親至頴川益發其衆號曰決命夫更起土山王坐於堰上趙道德言於王曰箭頭有鐵不避大王引王帯而下箭集於王㘴之所梁書曰武帝自襄陽率兵東下至郢州攻未柭蕭頴胄在江陵遣衛尉席闡文勞軍因謂梁武曰今頓兵兩岸不併軍圍郢定西陽武昌取江州此機已失莫若請救於魏與北連和猶爲上䇿梁武謂闡文曰漢口路通荆雍控引秦梁糧運資儲聽此氣息兵若進魯山必阻河路所謂搤喉若糧運不通自然離散何謂持乆劉元起近欲以三千徃定㝷陽彼若懽然悟機一酈生亦足脫拒我師固非三千能下西陽武昌取使耳}
