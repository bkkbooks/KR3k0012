  - {type: variant, offset: 2825, length: 52, content: 守相與雜居人不專一其聲雖大而虛易攻弇內欲攻之告令軍中治攻具後五日攻西安復縱生口令歸藍聞之晨夜守城至其日夜, SBCK: ''}
  - {type: variant, offset: 2825, length: 360, content: 守相與雜居人不專一其聲雖大而虛易攻弇內欲攻之告令軍中治攻具後五日攻西安復縱生口令歸藍聞之晨夜守城至其日夜半令軍皆食會明求乞攻西安臨淄不能救也弇曰然吾故揚言欲攻西安今方自憂治城具而吾攻臨淄一日必拔何救之有吾得臨淄即西安孤必復亡矣所謂一舉而兩得者也且西安城堅精兵二萬人攻之未可卒下卒必多死傷正使得其城張藍引兵突臨淄更強勒兵憑城觀人虛實吾深入敵城後無轉輸旬月之間不戰而困諸軍不見是爾弇遂擊臨淄至日中破之張藍聞臨淄破果將其眾亡漢表傳曰郭典字君業為鉅鹿太守與中郎將董卓攻黃巾賊張寶於下曲陽典作圍塹而卓不肯典曰受詔攻賊有死而已使諸將引兵屯東典獨於西當賊之衝晝夜進攻寶由是城守不敢出時為之語曰郭君圍塹董將不許幾令狐貍化為豺虎賴我郭君不畏強禦轉機之間敵為窮虜猗猗惠君實邈壃土英雄記曰袁尚使審配守鄴曹操進軍攻鄴審配將馮禮為內應開突門內操兵, WYG: 平御覽卷}
