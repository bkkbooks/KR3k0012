  - {type: variant, offset: 1818, length: 0, content: '', SBCK: 玄陳太子也後母􅉲之陳侯令自投遼水魚􅀒之以出玄曰我罪人也故求死耳魚乃去西京􅄂記曰昆明池刻石爲魚每雷雨魚甞鳴吼鬐尾皆動漢代祈雨徃徃有驗又曰昔人有東海遊者隨風浪莫知所之一日一夜得一􅀌洲共侣歡然下石植纜登洲煑食食未熟而洲没在舡者斫纜舡復飄蕩向者􅀌洲大魚也怒棹楊鬐吹波吐浪去疾風雲在洲上死者十餘人神山傳曰葛玄見賣大魚者玄謂曰蹔煩此魚到河伯處魚主曰魚已死玄曰無苦乃以丹書􅁓内魚口中擲水中有頃魚還躍上岸得書青黒如木業又與吴王坐樓上見作請雨社人玄曰雨易得耳即書符着社中一}
