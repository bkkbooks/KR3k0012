  - {type: variant, offset: 10, length: 2, content: 車騎, SBCK: 天魚一星在尾後河中星明則河海岀大魚周易姤卦曰包有魚義不及賔也又中孚曰豚魚􅁻信及豚魚也又明象曰筌者所以在魚得魚而忘筌也毛詩曰潜季冬薦魚春獻鮪也冬魚之性定春鮪新來冝薦又魚藻曰魚在在藻有頒其首毛云頒大首皃也禮記曲禮曰凢登宗廟槀魚曰啇祭鮮魚曰脡祭尚書益稷曰曁鳥獸魚鼈咸􅀂注微物咸順之左傳昭元劉子曰善哉禹功明德逺矣微禹吾其魚乎又昭元曰魚鹽蜃蛤弗加於海春秋運斗樞曰四方煩擾小民失恩虎銜魚爾雅曰魚有力者強大多力者音暉魚枕謂之丁枕在魚頭骨中形似􅂐書丁字可作印魚膓謂之乙魚尾謂之丙此皆似􅂐書字因以名焉禮記曰魚去乙然則魚之骨體盡似丙丁之屬因形名之史記周本紀曰武王渡河中流白魚躍入舡中武王俯取以燎之漢書曰陳勝呉廣爲屯長領兵戍漁舉大討威兵士以丹書帛曰陳勝王置所􅊻人魚腹中兵買魚見書東觀漢記曰世祖率鄧禹等擊王郎橫野}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_SBCK_935-1b}
  - {type: variant, offset: 10, length: 0, content: '', WYG: 今奉}
  - {type: variant, offset: 10, length: 2, content: 車騎, krp: 天魚一星在尾後河中星明則河海岀大魚周易姤卦曰包有魚義不及賔也又中孚曰豚魚吉信及豚魚也又明象曰筌者所以在魚得魚而忘筌也毛詩曰潜季冬薦魚春獻鮪也冬魚之性定春鮪新來冝薦又魚藻曰魚在在藻有頒其首毛云頒大首皃也禮記曲禮曰凢登宗廟槀魚曰啇祭鮮魚曰脡祭尚書益稷曰曁鳥獸魚鼈咸若注微物咸順之左傳昭元劉子曰善哉禹功明德逺矣微禹吾其魚乎又昭元曰魚鹽蜃蛤弗加於海春秋運斗樞曰四方煩擾小民失恩虎銜魚爾雅曰魚有力者強大多力者音暉魚枕謂之丁枕在魚頭骨中形似篆書丁字可作印魚膓謂之乙魚尾謂之丙此皆似篆書字因以名焉禮記曰魚去乙然則魚之骨體盡似丙丁之屬因形名之史記周本紀曰武王渡河中流白魚躍入舡中武王俯取以燎之漢書曰陳勝呉廣爲屯長領兵戍漁舉大討威兵士以丹書帛曰陳勝王置所􅊻人魚腹中兵買魚見書東觀漢記曰世祖率鄧禹等擊王郎橫野}
  - {type: variant, offset: 11, length: 16, content: 騎將軍巴郡馮緄字鴻卿為議郎發綬笥, WYG: 所不足豈此魚乎吳志曰孫權時謠云寧飲建鄴水不食武昌魚寧還建鄴死不止武昌居晉書曰王延性仁孝繼母卜氏嘗盛冬思生魚勅延求而不獲杖之流血延尋向汾水叩凌而哭忽有一魚五尺躍出水上延取以進母卜氏食之積日不盡於是心悟撫延如己生又曰五部單于賢王劉豹妻呼延氏魏嘉卑祈子於龍門俄而有一大魚頂}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_WYG_935-3b, image: WYG0901/WYG0901-0306d.png}
  - {type: variant, offset: 14, length: 13, content: 巴郡馮緄字鴻卿為議郎發綬笥, SBCK: 劉奉大破之上過禹營禹進炙魚上飱㗖勞勉士吏威嚴甚厲衆皆竊言劉公真天人也謝承後漢書曰㑹稽陳􅅝少時於郭外水邊捕魚人有盗取之者􅅝見避之草中追以魚遺之盗慙不受自是無復盗其魚後漢書曰羊續爲南陽太守府丞嘗獻其生魚續受而懸於庭丞後又進之續乃出所懸者以杜其意魏志曰黃初六年帝東征呉文德郭后留譙時后從兄弟欲遏水取魚后曰今奉車所不足豈此魚乎呉志曰孫權時謡云寧飲建鄴水不食武昌魚寧還建鄴死不止武昌居晉書曰王延性仁孝繼母卜氏甞盛冬思生魚勑延求而不獲杖之流血延㝷汾叩凌而哭忽有一魚長五尺躍出水上延取以進母卜氏食之積日不盡於是心悟撫延如巳生又曰五部單于左賢王劉豹妻呼延氏魏嘉平祈子於龍門俄而有一大魚頂}
  - {type: page-break, offset: 14, content: '', id: KR3k0012_SBCK_935-2a}
  - {type: variant, offset: 14, length: 13, content: 巴郡馮緄字鴻卿為議郎發綬笥, krp: 劉奉大破之上過禹營禹進炙魚上飱㗖勞勉士吏威嚴甚厲衆皆竊言劉公真天人也謝承後漢書曰㑹稽陳囂少時於郭外水邊捕魚人有盗取之者囂見避之草中追以魚遺之盗慙不受自是無復盗其魚後漢書曰羊續爲南陽太守府丞嘗獻其生魚續受而懸於庭丞後又進之續乃出所懸者以杜其意魏志曰黃初六年帝東征呉文德郭后留譙時后從兄弟欲遏水取魚后曰今奉車所不足豈此魚乎呉志曰孫權時謡云寧飲建鄴水不食武昌魚寧還建鄴死不止武昌居晉書曰王延性仁孝繼母卜氏甞盛冬思生魚勑延求而不獲杖之流血延㝷汾叩凌而哭忽有一魚長五尺躍出水上延取以進母卜氏食之積日不盡於是心悟撫延如巳生又曰五部單于左賢王劉豹妻呼延氏魏嘉平祈子於龍門俄而有一大魚頂}
