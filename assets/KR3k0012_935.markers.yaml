  - {type: variant, offset: 1123, length: 0, content: '', WYG: 有傾墜而死利能誘也韓子曰公儀休相魯而嗜魚一邦皆争買魚而獻之公儀子不受曰夫唯嗜魚因不受也淮南子曰夫水濁則魚噞政苛則民亂又曰木上升水下流故鳥飛而髙魚動而下又曰上求材臣殘木上求魚臣亁谷又曰欲致魚者先通水欲致鳥者先樹木水積而魚聚木􅌗而鳥集又曰林中不賣薪湖上不鬻魚非所無也又曰俎之先生魚豆之先太羮此皆不快於耳目不適於口腹而先王貴之先本後末也又曰使葉落者風搖之使水濁者魚撓之又曰惠子從車百乘以過孟諸荘子見之而棄餘魚疾惠子故也又曰月者陰之宗是以月毁則魚腦減又曰楚王亡其猨而林木為之殘爰捷躁依木而處故殘林以求之也宋君亡其珠池魚為之殫又曰為魚德者非挈而入淵為猿賜者非負而縁木縱其所之而已又曰富池魚者必去徧音編獺飬禽獸者必去豺狼又曰臨河羨魚不若歸而織網又曰争魚者濡逐獸者趨非樂之也故至言去言至為無為又曰故天之且風草木未動而鳥已翔矣鳥巢知風也其且雨也陰曀未集而魚已噞矣魚潛雨也又曰燿蟬者務在明其火釣魚者務在芳其餌明其火者所以燿而致之也芳其餌者所以誘而利之也又曰季子治亶父}
