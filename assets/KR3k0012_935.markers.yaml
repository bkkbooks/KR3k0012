  - {type: variant, offset: 3, length: 6, content: 六虵下風俗通, SBCK: 七魚上星經}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 七魚上星經曰天魚一星在尾後河中此星明則河海出大魚周易姤卦曰包有魚義不及賓也又中孚曰豚魚吉信及豚魚也又明象曰筌者所以在魚得魚而忘筌也毛詩曰季冬薦魚春獻鮪也又魚藻曰魚在在藻有頒其首禮記曰禮曰凡豋宗廟藁魚曰商祭鮮魚曰脡祭尚書益稷曰暨鳥獸魚鱉咸若左傳昭元劉子曰美哉禹功明德遠矣微禹吾其魚乎又昭元曰魚鹽蜃蛤弗加於海春秋運斗樞曰四方煩擾小民失恩虎御魚爾雅曰魚有力者鰴强力多者音暉魚枕謂之丁枕在魚頭骨中形似篆書丁字可作印魚膓謂之乙魚尾謂之丙此皆以篆書字因以名焉禮記曰魚去乙然則魚之骨體盡似丙丁之属形因名之史記周本紀曰武王渡河中流白魚躍入船中武王俯取以燎之漢書曰陳勝吳廣為屯長領兵戍將舉大計威兵士以丹書帛曰陳勝王置所罾入魚腹中兵買魚而見書東觀漢記曰世祖率鄧禹等撃王郎横野将軍劉奉大破之兵過禹營禹進炙魚上飱㗖勞勉吏士威容嚴厲衆皆竊言劉公真天人也謝承漢書曰㑹稽陳嚚少時於郭外水邉捕魚人有盜取之者嚚見避之草中追以魚遺之盜慙不受自是無復盜其魚後漢書曰羊續為南陽太守府丞嘗獻其生魚續受而懸於庭丞後又進之續乃出所懸者以杜其意魏志曰黄初}
