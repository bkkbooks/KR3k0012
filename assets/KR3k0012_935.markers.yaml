  - {type: variant, offset: 1072, length: 10, content: 奴婢居野舍每至飯時輒, WYG: 惠子遊於濠梁之上荘子曰儵出遊從容是魚之樂也惠子曰子非魚安知魚之樂荘子曰子非我安知我不知魚之樂也又曰吞舟之魚蕩而失水則螻蟻能制之故鳥飛不厭髙魚沈不厭深又曰朽𤓰化為魚物之變也又曰任公子蹲㑹稽釣東海朞年而大魚食之公子得若魚浙河以東蒼梧以北無不厭若魚者又曰井魚不可語海夏蟲不可語冰符子曰太公㳙釣於隱溪五十}
