  - {type: variant, offset: 1066, length: 0, content: '', SBCK: 莊子與惠子遊於濠梁之上莊子曰儵出遊從容是魚之樂也惠子曰子非魚安知樂莊子曰子非我安知我不知魚之樂也又曰吞舟之魚蕩而失水則螻蟻能制之故鳥飛不厭髙魚鱉不厭深又曰朽爪化爲魚物之變也又曰任公子蹲㑹稽釣東海朞年而大魚食之公子得􅀂魚淅河以東蒼梧以北無不厭􅀂魚者又曰井魚不可語海夏蟲不可語氷符子曰太公㳙釣於隱溪五十有六而未嘗得一魚魯連聞而觀焉太公㳙跽而隱崖不餌而釣仰咏俯吟暮則釋竿其膝所處石皆􅀂曰其跗觸崖􅀂路魯連曰釣所本以在魚無魚何釣太公曰不見康王父之釣耶念蓬萊釣巨海摧岸投輪五百年矣未嘗得一魚方吾猶一朝耳顧子曰昔宋人臨萬仞之淵釣數寸之鱗魚將食釣不知􅂰之自進有頃墮而死利能誘也韓子曰公儀休相魯而􅄝魚一􅀖皆爭買魚而獻之公儀子不受曰夫唯嗜魚固不受也淮南子曰夫水濁則魚噞政苛則民亂又曰火上㝷水下流故鳥動而髙魚動而下又曰上求材臣殘木上求魚臣乾谷又曰欲致魚者先通水欲致鳥者先樹木水積而魚聚木茂而鳥集又曰林中不賣}
  - {type: page-break, offset: 1066, content: '', id: KR3k0012_SBCK_935-5a}
  - {type: page-break, offset: 1066, content: '', id: KR3k0012_SBCK_935-5b}
  - {type: variant, offset: 1066, length: 5, content: 薪野蘇卷常, WYG: 荘子}
  - {type: variant, offset: 1066, length: 0, content: '', krp: 莊子與惠子遊於濠梁之上莊子曰儵出遊從容是魚之樂也惠子曰子非魚安知樂莊子曰子非我安知我不知魚之樂也又曰吞舟之魚蕩而失水則螻蟻能制之故鳥飛不厭髙魚鱉不厭深又曰朽爪化爲魚物之變也又曰任公子蹲㑹稽釣東海朞年而大魚食之公子得若魚淅河以東蒼梧以北無不厭若魚者又曰井魚不可語海夏蟲不可語氷符子曰太公㳙釣於隱溪五十有六而未嘗得一魚魯連聞而觀焉太公㳙跽而隱崖不餌而釣仰咏俯吟暮則釋竿其膝所處石皆若曰其跗觸崖若路魯連曰釣所本以在魚無魚何釣太公曰不見康王父之釣耶念蓬萊釣巨海摧岸投輪五百年矣未嘗得一魚方吾猶一朝耳顧子曰昔宋人臨萬仞之淵釣數寸之鱗魚將食釣不知膝之自進有頃墮而死利能誘也韓子曰公儀休相魯而嗜魚一邦皆爭買魚而獻之公儀子不受曰夫唯嗜魚固不受也淮南子曰夫水濁則魚噞政苛則民亂又曰火上㝷水下流故鳥動而髙魚動而下又曰上求材臣殘木上求魚臣乾谷又曰欲致魚者先通水欲致鳥者先樹木水積而魚聚木茂而鳥集又曰林中不賣}
  - {type: variant, offset: 1067, length: 4, content: 野蘇卷常, SBCK: 湖上不鬻魚有所餘也又曰爼之先生魚豆之先㤗羮此皆不快於耳目不適於口腹而先王貴之先本後末也又曰使葉落者風揺之使水濁者魚撓之又曰惠子從車百乗以過孟諸莊子見之而棄餘魚疾惠故也又曰月者隂之宗是以月毀則魚腦減又曰楚王亡其猨而林木爲之殘猨捷躁依木而處故殘林以求之也宋君亡其珠而池魚爲之殫殫盡也又曰爲魚德者非挈而入淵爲猨賜者非􅀒而縁木縱其所之而已又曰畜池魚者必去猵音編􅆩養禽獸者必去豺狼又曰臨河羡魚不􅀂歸家織網羡願也又曰爭魚者濡逐獸者趨非樂之也故至言去言至爲無爲又曰故天之且風草木未動而鳥巳翔矣鳥巢知風也其且雨也隂曀未集而魚巳噞矣魚潜知雨也又曰燿蟬者務在明其火釣魚者務在芳其餌明其火者所以燿而致之也芳其餌者所以誘而利之也又曰季子治亶父三年季子子賤而巫馬期衣短􅄄易容貌徃觀化焉易服而徃微以視之也見夜魚者釋之巫馬期問焉曰凢子所爲魚者欲得也今得而釋之何也魚者對曰季子不欲人取小魚也所得者小魚是以釋之巫馬期歸以報孔子曰季子之德至矣抱朴子曰取一把礜丸内一活魚口}
