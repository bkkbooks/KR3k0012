  - {type: variant, offset: 2312, length: 221, content: 常其禍安在吳氏本草經曰虵脫一名龍子單衣一名弓皮一名虵附一名虵筋一名龍皮一名龍單衣楚辭曰蝮虵蓁蓁封孤千里傅玄神虵銘曰嘉茲虵靈斷而能續飛不須翼行不假足揚雄客難曰獨不見翠虵絳螭之將登天乎必聳身於蒼梧之淵階浮雲翼疾風而上虺毛詩鴻鴈斯干曰唯虺唯虵女子之祥國語曰吳伐越越王請盟吳王將許之申胥申胥伍子胥曰不可許大夫種勇以善謀將還玩吳國於股掌之上以婉辭順志虺而弗剉為虵將若之何吳王不聽乃許盟搜神記曰陳留阮士禹傷於虺不忍其痛數嗅其瘡已而虺成於鼻中任昉述異記曰虺, WYG: 醬太平御覽卷九百三十}
