  - {type: variant, offset: 1212, length: 151, content: 有寺廟今民欲架室者輒見大虵數十丈出來驚人故莫得安焉周景式廬山記曰安侯世高者安息國太子與友人共出家學道友人好恚怒死受蟒報為此宮亭廟神世高於廣州為人所殺還生安息國復為王子年二十又棄國入吳之宮亭泊舡過呼友人與語友人身長數十丈見世高向之胡語竟各分去暮有一少年上世高舡跪受呪願囚忽不見世高語同舡人曰向少年即此廟神, SBCK: 弓良}
