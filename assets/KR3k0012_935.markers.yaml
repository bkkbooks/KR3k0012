  - {type: variant, offset: 943, length: 0, content: '', krp: 非禮而可養太子老子曰魚不可脫於淵國之利噐不可以示人文子曰川廣者魚大山髙者獸脩故魚不可以無餌釣獸不可以空器召又曰因所貴而貴之}
  - {type: variant, offset: 944, length: 0, content: '', SBCK: 無不貴因所賤而賤之物無不賤故不放魚於木沉鳥於淵鄧析書曰夫水濁則無掉尾之魚政苛則無逸樂之士列子曰八紘之北有溳海魚廣千里其長稱焉孟子曰有餽生魚於子産子産使校人畜之池反命曰始舎之圉圉焉少則洋洋焉子産曰得其所哉校人曰孰謂子産智吾旣烹而食之矣又曰故爲淵敺魚者􅆩也爲叢敺雀者鸇也魯連子曰古善魚者宿沙習子使魚生於山則雖十􅀫沙不得一魚焉宿沙非闇於魚道者彼山非魚之所生也莊子曰泉涸魚相與處於陸相煦以濕相濡以洙不}
