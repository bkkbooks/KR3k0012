  - {type: variant, offset: 1965, length: 137, content: 安城東隅形勢之地也中多王侯第宅天后初有居人王純掘地獲黃金百斤致富官司聞之密加搜獲純懼投於井中縣官窺之見雙赤䖵仰首張吻遂不敢入純以此金當為己復入井取之還見赤虵赫然蟠屈純懼而出其夜井水湧溢漸成此池可廣百餘頃嶺表錄異曰南土有金虵亦名錫虵又名地鱓州土出黔中桂州亦有即不及黔南者其虵粗, SBCK: 五丈頭}
