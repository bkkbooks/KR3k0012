  - {type: variant, offset: 1818, length: 0, content: '', WYG: 元陳太子也後母譛之陳侯令自投遼水魚負之以出元曰我罪人也故求死耳魚乃去西京雜記曰昆明池刻石為魚毎雷雨魚嘗鳴吼鬐尾皆動漢代祈雨往往有驗又曰昔人有逰東海者隨風浪莫知所之一日一夜得一孤洲共侶歡然下石植䌫登洲煑食食未熟而洲汎住船者斫䌫船復飄蕩向者孤洲乃大魚也掉尾揚鬐吹波吐浪而去疾若風雲洲上死者十餘人神仙傳曰葛元見賣大魚者元謂曰暫煩此魚到河伯處魚主曰魚已死元曰無苦乃以丹書紙内魚口中擲水中有頃魚還躍上㟁得書青黑如木又與呉王坐樓上見天吐雲元曰雨易得耳即書符著社中一}
