  - {type: variant, offset: 29, length: 3, content: 赤虵可, SBCK: 角軒鬐躍鱗而至祭所乆之而去巫覡皆異之曰此嘉祥也其夜夢旦所見魚變爲人左手把一物大如半鷄子光景非常授呼延曰此是日精服之生貴子寤而告豹豹曰􅁻徴也自是十三月而生元海又曰錢唐杜子恭有秘術甞就人借爪刀其主求之恭曰當即相還耳旣而刀主至嘉興有魚躍入舡中破魚得􅀲刀又曰呉隱之爲廣州刺史帳下人進魚毎剔去骨存􅁏隱之覺其用意罰而黜焉宋書曰王弘之性好釣上虞江有一處名三石頭弘之常垂綸於此經過者不識之或問魚師得魚賣不弘之曰亦不得得亦不賣日夕載魚入上虞郭經親故各以一兩頭置門而去沈約宋書曰明帝太始二年幸華林園天淵池白魚躍入御舟齊書曰中興元年義師下未至竟陵三十里魚}
