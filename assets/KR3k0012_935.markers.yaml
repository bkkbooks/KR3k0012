  - {type: variant, offset: 173, length: 3, content: 崑崙西, SBCK: 王固甞聘魏因晏饗昆明池魏人以南人嗜魚大設􅅈網固以佛法呪之遂一鱗不獲崔鴻十六國春秋前凉録曰金城太守胡勗叛張䡄遣都護宗毅治中令狐瀏討之濟河中流白魚入舡瀏曰魚鱗物虜必解甲歸我矣勗請降軌宥之後魏書曰髙祖幸清徽堂因之流化池髙祖曰此地中亦有佳魚任城王澄曰此所謂魚在在藻有頒其首髙祖曰且取王在靈沼於牣魚躍}
  - {type: variant, offset: 173, length: 3, content: 崑崙西, WYG: 王固嘗聘魏國晏饗昆明池魏人以南人嗜魚大設罟網固以佛法呪之遂一鱗不獲崔鴻十六國春秋前京録曰金城太守胡朂叛張軌遣都䕶宗毅治中令狐瀏討之濟河中流白魚入船瀏曰魚鱗物虜必解甲歸我矣朂請降軌宥之後魏書曰高祖幸清徽堂因之流化池高祖曰此池中亦有魚在任城王澄曰此所謂魚在在藻有頒其首髙祖曰且取王在靈沼於牣魚躍}
