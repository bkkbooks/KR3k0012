  - {type: variant, offset: 191, length: 171, content: 居此山飲食滄海陳留風俗傳曰小黃縣者宋地故陽武東黃鄉也因黃水以名縣沛公起兵野戰喪皇妣于黃鄉天下平定乃使者以梓宮招魂幽野於是丹虵在水自洗濯入于梓宮其浴有遺髮故謚曰昭靈夫人雷次宗豫章記曰永嘉末有大虵長十餘丈斷道經過者輒以氣吸引取之吞噬已百數行旅斷道道士吳猛與弟子數人往欲殺虵虵藏深穴不肯出猛符南昌社公虵乃出穴頭高數丈猛於尾緣背而以足按虵頭著地弟子於, WYG: 苦難得}
