  - {type: variant, offset: 3843, length: 2, content: 海灣, SBCK: 夷志曰夜半國在蒼望城東北隔麗水城川原其婦人唯與􅀑通能知吉凶禍福本土君長崇信之蠻夷徃徃以金購之要知善惡女王國南夷志曰女王國去驩州十月程徃徃與驩州人交昜蠻嘗伐之}
