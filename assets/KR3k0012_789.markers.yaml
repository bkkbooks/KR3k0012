  - {type: variant, offset: 3862, length: 0, content: '', SBCK: 唯披牛羊皮施蠻南夷志曰施蠻本烏蠻種族也䥫橋西北大施賧小施賧劒㝷賧皆其所居之地男以繒布爲縵襠袴婦人從頂横分其髪當額及頂後各爲}
  - {type: variant, offset: 3862, length: 0, content: '', WYG: 唯披牛羊皮施蠻南夷志曰施蠻種族也鐡橋西北大施賧劒尋賧皆其所居之地男小繒布為􅥶襠袴婦人從頂横分其髪當額及頂後各為髻男女絡身跣足披牛羊皮磨㱔蠻南夷志曰磨㱔蠻鳥種也鐡橋上下及大婆小婆三探覽昆池等川皆其所居之地土多牛羊}
  - {type: page-break, offset: 3862, content: '', id: KR3k0012_WYG_789-11a, image: WYG0900/WYG0900-0021c.png}
  - {type: variant, offset: 3862, length: 0, content: '', krp: 唯披牛羊皮施蠻南夷志曰施蠻本烏蠻種族也䥫橋西北大施賧小施賧劒㝷賧皆其所居之地男以繒布爲縵襠袴婦人從頂横分其髪當額及頂後各爲}
  - {type: variant, offset: 3863, length: 6, content: 名勃焚洲抱朴, SBCK: 髻男女終身跣足披牛羊皮磨些蠻南夷志曰磨些蠻鳥種也䥫橋上下及大婆小婆三婆採覽昆池等川皆其所居之地土多牛羊一家即有羊群終身不洗手靣男女皆披羊皮俗好飲酒歌舞撲}
  - {type: variant, offset: 3863, length: 6, content: 名勃焚洲抱朴, WYG: 家即有羊羣終身不洗手面男女皆披羊皮俗好飲酒歌舞樸}
  - {type: variant, offset: 3863, length: 6, content: 名勃焚洲抱朴, krp: 髻男女終身跣足披牛羊皮磨些蠻南夷志曰磨些蠻鳥種也䥫橋上下及大婆小婆三婆採覽昆池等川皆其所居之地土多牛羊一家即有羊群終身不洗手靣男女皆披羊皮俗好飲酒歌舞撲}
