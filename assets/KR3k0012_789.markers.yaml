  - {type: variant, offset: 1464, length: 0, content: '', SBCK: 苴烏星虜望等歸化聞牟尋之意因諸蠻寓書於牟尋且招懷之牟尋乃斬吐蕃使去其所立帝號以歸我仍請復南詔舊名􅀄吐蕃因爭}
  - {type: variant, offset: 1464, length: 1, content: 北, WYG: 本烏蠻之别種也姓䝉氏蠻謂王為詔自言哀牢之後代居蒙舍州為渠州在漢永昌故郡東姚州之西其先渠師有六自號六詔兵力相埒各有君長無統帥蜀時為諸葛亮所征皆臣服之又曰南詔蠻國初有䝉舍龍生迦獨龎迦獨生細奴邏髙宗時来朝細奴邏生邏盛武后時来朝其妻方娠邏盛次姚州聞妻生子曰吾且有子死於唐地足矣子名曰盛邏皮邏盛至京師賜錦袍金帶歸國開元初邏盛死子盛邏皮立盛邏皮死子皮邏閣立又曰南詔蠻皮邏閣嗣立二十六年詔授特進南越國公賜名曰歸義其後破洱河蠻洱音而志切以功䇿授雲南王歸義漸强盛餘五詔浸弱先是劒南節度王昱受歸義賂奏六詔合為一詔歸義既併五詔服羣蠻破吐蕃之衆兵日以驕大遂徙居太和城天寶四載歸義遣孫鳳迦異来朝授鴻臚卿歸國恩賜甚厚又曰閣羅鳳襲封王無何鮮于仲通為劒南節度使張䖍陀為雲南太守仲通􅄶急寡謀䖍陀矯詐遇之不以禮舊事南詔嘗}
