  - {type: variant, offset: 2162, length: 275, content: 夜必關閉以防賊盜國有二萬家號令自王出嘉良夷政令擊之酋師重罪者死輕者罰牛人皆輕捷便擊劍漆皮為牟甲弓長六尺以竹為弦妻其群母及其嫂兒弟死父兄亦納其妻好歌舞鼓吹長笛有死者無服制置屍高床之上沐浴衣服被以牟甲覆以獸皮子孫不哭帶甲舞劍而呼云我父為鬼所取我欲報冤殺鬼自餘親戚哭三聲而止婦人哭必以兩手掩面死家殺牛親屬以豬酒相遺共飲噉而瘞之死後十日而大葬必集親賓殺馬動至數十疋立其祖父神而事之其俗以皮為帽形圓如鉢或戴羃䍦衣多毛毼皮裘為靴頂繫鐵鎖手貫鐵釧王與酋師金為飾胸前懸一金花徑三寸其土高氣候涼多風少雨土宜小麥青科山出銀銀多白雉水有嘉魚長四尺而鮮細大業四年其王遣使素福, SBCK: 聘迦羅婆提}
  - {type: variant, offset: 2162, length: 715, content: 夜必關閉以防賊盜國有二萬家號令自王出嘉良夷政令擊之酋師重罪者死輕者罰牛人皆輕捷便擊劍漆皮為牟甲弓長六尺以竹為弦妻其群母及其嫂兒弟死父兄亦納其妻好歌舞鼓吹長笛有死者無服制置屍高床之上沐浴衣服被以牟甲覆以獸皮子孫不哭帶甲舞劍而呼云我父為鬼所取我欲報冤殺鬼自餘親戚哭三聲而止婦人哭必以兩手掩面死家殺牛親屬以豬酒相遺共飲噉而瘞之死後十日而大葬必集親賓殺馬動至數十疋立其祖父神而事之其俗以皮為帽形圓如鉢或戴羃䍦衣多毛毼皮裘為靴頂繫鐵鎖手貫鐵釧王與酋師金為飾胸前懸一金花徑三寸其土高氣候涼多風少雨土宜小麥青科山出銀銀多白雉水有嘉魚長四尺而鮮細大業四年其王遣使素福等八人入朝明年又遣其弟子宜林率嘉良夷六十人朝貢欲獻良馬以路險不通請開山道脩職貢煬帝以勞人不許嘉良有水闊六七十丈附國有水闊百餘丈並南流用皮為舟而濟邊斗四國隋書曰邊斗國一大班斗都昆國一作都稚拘利國一作九雅比嵩國並扶南度金鄰大灣南行三千里有此國其農作與金鄰同其人多白色都昆出好棧香藿香及硫黃其藿香樹生千歲根本甚大伐之四五年木皆朽敗唯中節堅貞芬香獨存取為香殊奈國唐書曰貞觀二年殊奈國遣使貢方物殊奈者崑崙人也在林邑南去交阯海行三月餘日俗習文字與婆羅門同路絕遠古未常朝中國至是始通甘堂國唐書曰甘堂國在大海之南崑崙人也貞觀十年與未俱婆國同日朝貢太宗謂侍臣曰南荒西城自遠而至其故何也房玄齡對曰當中國人安帝德遠被也太宗曰誠如公言向使中國不安何緣至朕何德以堪之金利毗逝國唐書曰金利毗逝國在京西南四萬餘里東去致物國二千里西去赤土國一千五百里南去波利國三千里柳衢國三千里其國有城邑庭舍衣朝霞白疊每食先泥上鋪席而後座國王名本多楊牙前有隊仗甲鍪貝多樹皮及其風俗物產與真臘同墮和羅國唐書曰墮和羅國南與盤盤國北與, WYG: 聘}
