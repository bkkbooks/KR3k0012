  - {type: variant, offset: 3815, length: 2, content: 陁訶, krp: 南詔重譯來朝又獻其國樂凡十曲與樂工三十五人俱樂曲皆演釋氏經論之詞意以悉利移爲試大僕卿南夷志曰驃國在永昌南七十五日程閤羅鳯所通也其國用銀錢以青塼爲圎城周行一日程百姓盡在城内有十二所堂當國王所居門前有大象露坐髙百餘尺白如霜雪俗尚廉耻人壯和善少言重佛法城中並無宰殺又多推歩天文若有訴訟者王即令焚香向大象思惟是非便各引退或有災疫王亦焚香對象悔過自責男子多衣白疊婦人當頂爲髙髻以金銀真珠爲飾餘着青婆裙又披羅叚行必持扇貴家婦女皆三人五人在傍持扇與波}
  - {type: variant, offset: 3818, length: 0, content: '', SBCK: 及婆羅門接界西去舎利城六十日程疑此是東天竺也􅁀蠻等部落南夷志曰竹子嶺東有􅁀蠻部落嶺西有盧鹿蠻部落又有生蠻磨弥殿部落此等部落皆東㸑烏蠻也男則髻女則散髪見人無禮節拜跪三譯乃與華通大部落則有大􅀑主百家二百家小部落亦有小􅀑主一切信使􅀑巫用相服制土多牛馬無布帛男女悉􅀍牛羊皮勿鄧南夷志曰勿鄧部落大􅀑主夢衝地方千里功部一姓白蠻五姓烏蠻烏蠻婦人以白黒繒爲衣白蠻婦人以白繒爲衣下不過膝大賧南夷志曰大賧周迴百餘里悉是野蠻無君長地有瘴毒河賧人至中瘴者十死八九閤羅鳯嘗}
  - {type: page-break, offset: 3818, content: '', id: KR3k0012_SBCK_789-5a}
  - {type: variant, offset: 3818, length: 0, content: '', WYG: 及婆羅門接界西去舍利城六十日程疑此是東天竺也暴蠻等部落南夷志曰竹子嶺東有暴蠻部落嶺西有盧鹿蠻部落又有生蠻磨彌殿部落此等部落皆東爨鳥蠻也男則髻女則散髪見人無節拜跪三譯乃與華通大部落則有大鬼主百姓二百家小部亦有小鬼主一切信使鬼巫用相主服制土多牛馬無布帛男女悉被牛羊皮勿鄧南夷志曰勿鄧部落大鬼主薨衢地方十萬里功部一姓白蠻五姓烏蠻婦人以墨繒為衣白蠻婦人白繒為衣下不過膝大賧南夷志曰大賧周迴百餘里悉是野蠻無君長地有瘴毒南賧人至中瘴者十死八九閣邏鳳嘗}
