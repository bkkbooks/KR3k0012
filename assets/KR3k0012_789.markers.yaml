  - {type: variant, offset: 3875, length: 4, content: 薰緣水膠, krp: 上無食器以芭蕉葉藉之㝷傳蠻南夷志曰尋傳蠻俗無絲綿布帛披婆羅籠跣足可以踐履捺棘持弓挾矢射豪猪生食其肉取其兩牙雙挿頂傍爲飾又條其皮以擊腰毎戰鬪即以籠子籠頭如兠鍪狀祼形蠻南夷志曰祼形蠻在㝷傳城西三百里爲巢穴謂之野蠻閤羅鳯旣定㝷傳而野蠻散居山谷集戰即召之亦無君長女多男少無田農衣服唯有木皮以蔽形或十妻五妻共養一丈夫盡日持弓下褐欄有外來侵害者則射之苴望子蠻南夷志曰苴望子蠻在蘭蒼江以西其人勇捷善於馬上用槍}
  - {type: variant, offset: 3880, length: 0, content: '', SBCK: 乗馬不用鞍跣足衣短甲􅂊蔽􅅐腹而巳望蠻南夷志曰望蠻外喻部落在永昌北其人長大􅀒排持槊前無強敵又能用木弓短箭傅毒藥中人立斃婦人跣足以青布爲衣聯珂具巴齒真珠斜絡其身有夫竪分髪爲兩髻無夫者頂後爲一髻垂之地冝沙牛角長四尺以來婦人􅄝乳酪黒齒金齒銀齒繡脚南夷志曰黒齒金齒銀齒繡脚四蠻並在永昌􅀜南􅄂種􅀋也黒齒以􅃮􅃮其齒金齒以金鏤片裏其齒以銀齒以銀有事見人則以此爲飾寢食則去之皆當頂上爲一髻以青布爲通身袴又斜披青布條繡脚蠻則於踝上腓下周匝刻爲文彩衣以緋布繡靣蠻南夷志曰繡靣蠻生一月則以針刺靣青黛塗之如繡狀穿鼻蠻南夷志曰穿鼻蠻在柘東以徑尺金環穿鼻中隔下垂過頥君長即以絲繩繫使人牽起乃行其次者花頭金釘兩枚從鼻兩邊穿令透下長鬃㨂鋒南夷志曰長鬃㨂鋒二蠻部落鬃黒而長當額前爲一長鬃髻下過臍每行即以物撑起君長使兩女在前各持一物撑之今爲南詔所惣茫蠻南夷志曰茫蠻部落並開南􅄂種也茫是其君之号亦呼茫詔從永昌城南先過唐封次鳯藍苴次茫天連次茫吐薅又有火賧茫昌盛恐他茫鮓茫施皆其􅀋也樓居無城郭或􅃮齒衣青布衫藤篾􅆞腰紅繒布緾髻}
