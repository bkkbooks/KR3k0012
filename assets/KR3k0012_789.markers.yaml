  - {type: variant, offset: 3880, length: 0, content: '', WYG: 乗馬不用鞍跣足衣闕纔蔽胷服而已望蠻南夷志曰望蠻外喻部落在永昌北其人長大排持槊前無强敵又能用木弓短箭𫝊毒藥中人立斃婦人跣足以青為衣聮珂貝巴珠斜絡其身有夫竪分髪為兩髻無夫者頂後為一髻垂之地宜沙牛角長四尺以来婦人嗜乳酪黒齒金齒銀齒繡脚南夷志曰黒齒金齒銀齒繡脚四蠻並在永昌開南雜種類也黒齒以漆漆其齒金齒以金鏤片裹其齒銀齒以銀有事見人則以此為飾􅃦食則去之皆當頂上為一髻以青布為通身袴又斜披青布條綉脚蠻則於踝上腓下周匝刻為文彩衣以緋布繡面蠻南夷志曰繡面蠻生一月則以針刺面青黛塗之如繡狀穿鼻蠻南夷志曰穿鼻蠻在柘東以徑尺金環穿鼻中隔下垂過頥從長即以絲䋲繋使人牽起仍行有次者花頭金釘兩枚從鼻兩邊穿令透下長鬃㨂鋒南夷志曰長鬃㨂鋒二蠻部落闕前為一長鬃髻下過臍每行則以物撑起君長闕在前各持一物撑之今為南詔所屬茫蠻南夷志曰茫蠻部落並開南雜種也茫是其君之號亦呼范記曰永昌城南先過唐封次鳳籃苴次茫天連次茫吐薅又有火賧茫昌城恐他茫鮓茫施皆其類也樓石無城郭或漆齒衣青布袴籐篾纒腰紅繒布纒髻}
