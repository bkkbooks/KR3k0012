  - {type: variant, offset: 3021, length: 375, content: 紅毛數十莖與翅齊及婆律膏仍請馬及銅鍾詔並給之墮婆登國唐書曰墮婆登國在林邑南海行二月東與訶陵西與迷黎車接北界大海風俗與訶陵同種稻每月一熟有文字書於貝多葉其死者口實以金又以金釧貫於四支然後加以婆律膏及檀沉龍腦等香積薪以燔之貞觀中遣使獻金花等物王之所居堅木為城造大屋重閣覆以椶棕櫚皮所坐床悉以象牙為之亦以象牙為席食以手檈之音古患反又以椰樹花為酒飲之亦醉有山穴海湧而出鹽國人取食其國人有毒與常人同止宿即令身生瘡與之交會便死若涎液霑著草木即枯其人身死不臭不爛多蔑國唐書曰多蔑國貞觀時通焉在南海外國界周廻可一月行南阻大海西俱遊國北波利利刺國東真陁桓國戶口極多置三十州不役屬他國有州郭宮殿樓櫓並用瓦木以十二月為歲其物產有金銀銅鐵象牙犀角朝霞朝雲等布其俗交易用金銀朝霞等為賈百姓二十而稅一五穀菜蔬與中國不殊多摩國唐書曰多摩國長居國長居於海島東與婆鳳西與多隆南與半反跋, SBCK: 序}
