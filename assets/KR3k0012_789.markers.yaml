  - {type: variant, offset: 3815, length: 2, content: 陁訶, SBCK: 南詔重譯來朝又獻其國樂凡十曲與樂工三十五人俱樂曲皆演釋氏經論之詞意以悉利移爲試大僕卿南夷志曰驃國在永昌南七十五日程閤羅鳯所通也其國用銀錢以青塼爲圎城周行一日程百姓盡在城内有十二所堂當國王所居門前有大象露坐髙百餘尺白如霜雪俗尚廉耻人壯和善少言重佛法城中並無宰殺又多推歩天文􅀂有訴訟者王即令焚香向大象思惟是非便各引退或有災疫王亦焚香對象悔過自責男子多衣白疊婦人當頂爲髙髻以金銀真珠爲飾餘着青婆裙又披羅叚行必持扇貴家婦女皆三人五人在傍持扇與波}
  - {type: page-break, offset: 3815, content: '', id: KR3k0012_SBCK_789-4b}
  - {type: variant, offset: 3815, length: 2, content: 陁訶, WYG: 南詔重譯来朝又獻其國樂凡十曲與樂工三十五人俱樂曲皆演釋氏經論之詞意以悉利移為試大僕卿南夷志曰驃國在永昌南七十五日程閣邏鳳所通也其國用金銀錢以青塼為圓城周行一日程百姓盡在城中有十二門當國王所居門前有大象路坐髙百餘尺國人多推步天文若有所訟者即令焚香向大象自思是非便各引退或有災疫王亦焚香對象思過自咎男子多衣白疊婦人當頂為髙髻以金銀真珠為飾衣青婆裙人披羅縀行必持扇貴家婦三人五人在傍持扇與波}
