  - {type: variant, offset: 1590, length: 395, content: 隋書曰羅剎國在婆利之東其人極陋朱髮黑身獸牙鷹爪時與邑人作市輒以夜晝日則掩其面煬帝大業三年使常駿等使赤土國致羅剎國投和國隋書曰投和國在南海大洲真獵之南自廣州西南水行百里至其國王姓投和羅名脯邪乞遙理所城覆屋以瓦並為閣而居屋壁皆以彩畫之城內皆王室城外人居可萬餘家王宿衛之士百餘人每臨朝則衣朝霞冠金耳挂金環頸挂金涎衣敘連切足履寶裝皮履官屬有朝請將軍惣知國政又有參軍功曹主簿城局金威將軍贊理贊府等官分理文武又有州及郡縣州有參軍郡有金威將軍縣有城局為其長官初至各選官僚助理政事刑法賊盜多死者輕者穿耳及頰私鑄銀錢者截腕國無賦稅俱隨意貢奉無多少之限多以農商為業國人乘象及馬一國之中馬不過千疋又無鞍轡唯以繩穿頰為之節制音樂則吹蠡擊鼓死喪則祠祀哭泣又焚屍以甖盛之沉於水中若父母之喪則截髮為孝其國市六所貿易皆用銀錢小如榆莢有佛道有學校文字與中夏不同訊其耆老云王無姓名齊杖靡王所坐塔圓以佛塔以金飾之門皆東開坐亦東向, SBCK: ''}
