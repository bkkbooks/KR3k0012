  - {type: variant, offset: 314, length: 1143, content: 史曰毗騫國俗有室屋衣服噉粳米其人言語小異扶南國內不受賈客有往者殺而噉之是以商旅不敢至王常樓居不血食不事鬼神其子孫生死如常人唯王不死扶南王數使與書相報荅常遺扶南王純金五十人食器形如圓盤又如瓦塸名為多羅受五升又如椀者受一升竺芝扶南紀曰毗騫國去扶南八千里在海中國王身長三丈頸長三尺自古以來不死知神聖未然之事亦有子孫子孫生死如常人唯此王不死耳號曰長頸王食器皆純金金如此間之石無央限也不聽妄取有偷者知則殺食之長頸王亦能作天竺書自道宿命所經與佛語相似作書可三千言皆道是事其國法有罪者共在王前食之平常不噉人也丹丹國梁書曰丹丹國中大通二年其王遣使奉表送象牙及畫塔二軀并獻火齊珠古貝雜香藥大同元年復遣使獻金銀琉璃雜寶香藥等物隋書曰丹丹國在多羅摩羅國西北振州東南振州今延德郡朱雀同島上王姓剎利名尸陵伽理所可二萬餘家亦置州縣以相統領王每晨夕二時臨朝其大臣八人號曰八座並以婆羅朝其之王每以香粉塗身冠通天冠掛雜寶瓔珞身衣朝霞足履皮屨近則乘輿遠則馭象其攻伐則吹蠡擊鼓兼有幡旗其刑盜賊無多少皆殺之土出金銀白檀蘇方檳榔其穀唯稻畜有沙牛羖羊豬雞鵝鴨麞鹿鳥有越鳥孔雀果蓏力果切有蒲桃石榴瓜瓠菱蓮菜有葱䔉蔓菁東謝唐書曰東謝蠻其地在黔州之西數百里內南接守宮獠西連夷子北至白蠻土宜五穀不以牛耕但為畬田每歲一易俗無文字刻木為契散在山洞間依樹為層巢而居汲流以飲皆自營生業無賦稅之事謁見貴人皆執鞭而拜有功勞者以牛馬銅鼓賞之有犯罪者小事杖罰大事殺之盜物倍還其贓婚姻之禮以牛酒為娉女歸夫家皆母自送之女夫慚逃避經旬乃出讌聚則擊銅鼓吹大角歌舞以為樂好帶刀劍未常捨離丈夫衣服有衫襖大口袴以綿紬及布為之右肩上斜束皮帶裝以螺蚾虎豹猿狖及犬羊之皮以為外飾坐皆蹲踞男女椎髻以緋向後垂下其首領謝元深既世為酋長其部落皆尊畏之謝氏一族法不育女自云姓高不可下嫁故也貞觀三年元深入朝冠烏熊皮冠若今之旄頭以金銀絡額身披毛帔韋皮行滕而著履中書侍郎顏師古奏言昔周武時天下太平遠國歸款周史乃集其事為王會篇令萬國來朝至今如此輩章服實可圖寫今請撰為正會圖從之以其地為應州仍拜元深為刺史隸黔州都督府又曰南謝首領謝強與西謝鄰共元深俱來朝見為南壽州刺史後改為莊州貞觀十三年正月西南番大酋長蠻州刺史資陽郡開國公宋鼎卭州刺史謝汕音訕蠻州巴江縣令宋萬傳牂州錄事參軍謝文經黔中經略招討觀察使王礎奏前件刺史三年一度朝今年懇訴稱州接牂牁同被聲教獨此排擯竊自慚恥謹遣隨牂牁刺史授官其牂牁兩州戶口殷盛人力強大鄰側諸蕃悉皆敬憚請比兩州每三年一度朝賀仍依牂牁輪環差定并以才幹位望為眾推者元勑從之西趙蠻唐書曰西趙蠻在東謝之南其界東至夷子西至昆明南至西洱河洱音珥山洞阻深莫知道里南北十八日行東西二十三日行其風俗物產與東謝同首領趙氏世為酋長有戶萬餘貞觀三年遣使入朝二十一年以其地置明州即以首領趙磨為刺史南平, SBCK: 詔}
