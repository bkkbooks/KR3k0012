  - {type: variant, offset: 3518, length: 203, content: 別其食器銅鐵銀所食尚酥乳駱沙糖石蜜其家畜有羖水牛野獸有麞鹿等死亡無喪紀之制以火焚其屍其音樂略同天竺有波郍婆宅護遮奄磨石榴等菓多甘蔗從其國經薛盧都思訶盧林邑等國達於交州哥羅舍分國唐書曰哥羅舍分國在南海之南接墮和羅勝兵二萬人其王蒲越伽摩顯慶五年遣使朝貢杜薄國唐書曰杜薄國在扶南東漲海中直渡海數十日至其人色白晢皆有衣服國有稻田女子作白疊華布出金銀鐵以金為錢出雞舌香可含以香不入服雞舌其為水也氣辛而性厲禽獸不能至故, SBCK: 徒里拙古}
