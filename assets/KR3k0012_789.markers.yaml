  - {type: punctuation, offset: 3870, content: 》, id: KR3k0012_CHANT_789-bkkpn934}
  - {type: variant, offset: 3870, length: 4, content: 云勃焚洲, SBCK: 蠻南夷志曰撲子蠻勇悍趫捷以青婆羅叚爲通身袴善用泊箕竹弓􅀷林間射飛䑕發無不中部落首領謂之酋}
  - {type: variant, offset: 3870, length: 4, content: 云勃焚洲, WYG: 蠻南夷志曰樸子蠻勇悍趫捷以青婆羅叚為通身袴善射治其竹弓深林間射飛鼠發無不中部落首領謂之酋其土無食器以芭蕉葉藉之尋𫝊蠻南夷志曰尋𫝊蠻俗無絲綿布帛披婆羅籠跣足可以踐履􅎄棘持弓挾矢射豪猪生食其皮取其兩牙雙挿頂以為飾又條其皮以繋腰每戰閗即以籠子籠頭如兠鍪狀祼形蠻南夷志曰祼形蠻}
  - {type: page-break, offset: 3870, content: '', id: KR3k0012_WYG_789-11b, image: WYG0900/WYG0900-0021d.png}
