  - {type: variant, offset: 3825, length: 0, content: '', SBCK: 木王岀即乗象百姓皆樓居披婆羅籠男少女多俗好音樂樓兩頭置皷飲酒即擊皷男女携手樓中踏舞為樂在永昌城西南六十日程崑崙國南夷志曰崑崙國王北去西洱河八十一程出象及青木香旃檀㯽榔琉璃水精犀牙}
