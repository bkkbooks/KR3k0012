  - {type: variant, offset: 3875, length: 4, content: 薰緣水膠, SBCK: 上無食器以芭蕉葉藉之㝷傳蠻南夷志曰尋􅀓蠻俗無􅁝綿布帛披婆羅籠跣足可以踐􅂂捺􅁄持弓挾矢射豪猪生食其肉取其兩牙􅀟挿頂傍爲飾又條其皮以擊腰毎戰􅋐即以籠子籠頭如兠鍪狀祼形蠻􅀯夷志曰祼形蠻在㝷􅀓城西三百里爲巢穴謂之野蠻閤羅鳯旣定㝷􅀓而野蠻散居山谷集戰即召之亦無君長女多男少無田農衣服唯有木皮以蔽形或十妻五妻共養一丈夫盡日持弓下褐欄有外來侵害者則射之苴望子蠻南夷志曰苴望子蠻在蘭蒼江以西其人勇捷善於馬上用槍}
  - {type: page-break, offset: 3875, content: '', id: KR3k0012_SBCK_789-7b}
  - {type: variant, offset: 3875, length: 4, content: 薰緣水膠, WYG: 尋𫝊城西三百里為巢穴謂之野蠻閣羅鳳既定尋𫝊蠻野蠻散居山谷集戰即召之亦無君長女多男少無田農衣服唯有木皮以蔽形或十妻五妻共養一丈夫盡日持弓下褐欄有外来浸害者即射之苴望子蠻南夷志曰苴望子蠻在蘭蒼江以西其人勇徤善於馬上用搶}
