  - {type: variant, offset: 3847, length: 0, content: '', SBCK: 藥箭百不存獨錦蠻南夷志曰獨錦蠻者烏蠻之苗裔也在秦臧川去安寜兩日程其族多姓李異牟尋母即獨錦蠻女也有季􅀒藍貞元中爲大將軍在勃弄㨂川爲城使等弄㨂蠻南夷志曰弄㨂蠻則白蠻苗裔也本姚州弄㨂縣部落其地舊爲褒州嘗有首領誤殺司户懼罪率衆北奔在摩磨些江側貞元中異牟㝷破吐蕃城邑獲弄㨂城遷於永昌之地清蛉蠻南夷志曰清蛉蠻亦白蠻苗裔也本清蛉縣部落天寳中嶲州􅀄䧟有首領尹氏父子相率南奔河賧閣羅鳯厚待之貞元中南詔清平官尹輔酋皆其}
  - {type: page-break, offset: 3847, content: '', id: KR3k0012_SBCK_789-6b}
  - {type: variant, offset: 3847, length: 0, content: '', WYG: 藥箭百不存一獨錦國南夷志曰獨錦蠻之苖裔也在秦臧川去安寧兩日程其族多姓李異牟尋母即獨錦蠻女也有季負籃貞元中為大將軍在㪍弄㨂川為城使等弄㨂蠻南夷志曰弄㨂蠻則白蠻苖裔也本姚州弄㨂縣闕地舊為褒州嘗有首領誤殺司户懼罪率衆北奔闕磨磨㱔江則貞元中異牟尋破吐蕃城邑獲弄㨂城遷於永昌之地清蛉蠻南夷志曰清蛉蠻亦白蠻苖裔也本清蛉縣部落天寶中嶲州初䧟有首領尹氏父子相率南奔河縣閣邏鳳厚待之貞元中南詔清平官尹輔酋皆其}
  - {type: page-break, offset: 3847, content: '', id: KR3k0012_WYG_789-10a, image: WYG0900/WYG0900-0021a.png}
  - {type: variant, offset: 3847, length: 0, content: '', krp: 藥箭百不存獨錦蠻南夷志曰獨錦蠻者烏蠻之苗裔也在秦臧川去安寜兩日程其族多姓李異牟尋母即獨錦蠻女也有季負藍貞元中爲大將軍在勃弄㨂川爲城使等弄㨂蠻南夷志曰弄㨂蠻則白蠻苗裔也本姚州弄㨂縣部落其地舊爲褒州嘗有首領誤殺司户懼罪率衆北奔在摩磨些江側貞元中異牟㝷破吐蕃城邑獲弄㨂城遷於永昌之地清蛉蠻南夷志曰清蛉蠻亦白蠻苗裔也本清蛉縣部落天寳中嶲州𥘉䧟有首領尹氏父子相率南奔河賧閣羅鳯厚待之貞元中南詔清平官尹輔酋皆其}
  - {type: variant, offset: 3848, length: 11, content: 色黑而齒白眼正赤男女並, SBCK: 也衣服言語與蒙舎略同長禈蠻南夷志曰長禈蠻本鳥蠻之後部落在劒川属浪詔其俗皆衣長禈曵地更}
