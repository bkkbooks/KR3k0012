  - {type: variant, offset: 1462, length: 0, content: '', SBCK: 詔蠻本烏蠻之別種也姓􅂪氏蠻謂王爲詔自言哀牢之後代居􅂪舎州爲渠帥在漢永昌故郡東姚州之西其先渠帥有六自號六詔兵力相埓各有君長無統帥蜀時爲諸葛亮所征皆臣服之又曰南詔蠻國􅀄時有􅂪舎尨生迦獨迦獨生細奴邏髙宗時來朝細奴邏生邏盛武后時來朝其妻方娠邏盛次姚州間妻生子曰吾且有子死於唐地足矣子名盛邏皮邏盛至京師賜錦􅂁金帶師國開元􅀄邏盛死盛邏皮立盛邏皮死子皮邏閤立又曰南詔蠻皮邏閤嗣立二十六年詔授特進封越國公賜名曰歸義其後破洱阿蠻洱音而志切以功策授雲南王歸義漸強盛餘五詔浸弱先是劒南節度王昱受歸義賂奏六詔合爲一詔歸義旣併五詔服群蠻破吐蕃之衆兵日縣令嶲州䧟爲所虜閤羅鳯以回有儒學更名曰蠻利甚愛重之命教鳯迦異及異牟㝷立以回爲清}
  - {type: page-break, offset: 1462, content: '', id: KR3k0012_SBCK_789-2a}
  - {type: page-break, offset: 1462, content: '', id: KR3k0012_SBCK_789-3a}
  - {type: variant, offset: 1462, length: 1, content: 平, WYG: 詔}
  - {type: variant, offset: 1462, length: 0, content: '', krp: 詔蠻本烏蠻之別種也姓蒙氏蠻謂王爲詔自言哀牢之後代居蒙舎州爲渠帥在漢永昌故郡東姚州之西其先渠帥有六自號六詔兵力相埓各有君長無統帥蜀時爲諸葛亮所征皆臣服之又曰南詔蠻國𥘉時有蒙舎尨生迦獨迦獨生細奴邏髙宗時來朝細奴邏生邏盛武后時來朝其妻方娠邏盛次姚州間妻生子曰吾且有子死於唐地足矣子名盛邏皮邏盛至京師賜錦𫀆金帶師國開元𥘉邏盛死盛邏皮立盛邏皮死子皮邏閤立又曰南詔蠻皮邏閤嗣立二十六年詔授特進封越國公賜名曰歸義其後破洱阿蠻洱音而志切以功策授雲南王歸義漸強盛餘五詔浸弱先是劒南節度王昱受歸義賂奏六詔合爲一詔歸義旣併五詔服群蠻破吐蕃之衆兵日縣令嶲州䧟爲所虜閤羅鳯以回有儒學更名曰蠻利甚愛重之命教鳯迦異及異牟㝷立以回爲清}
  - {type: variant, offset: 1463, length: 0, content: '', SBCK: 官事皆咨之回嘗言於牟㝷曰自昔南詔嘗􅅃附中國中國尚禮義以惠飬爲務無所求取今弃蕃歸唐無逺戍之勞利莫大焉牟尋善其言謀内附者十餘年矣會劒南西川節度使韋臯招撫諸}
  - {type: variant, offset: 1463, length: 0, content: '', krp: 官事皆咨之回嘗言於牟㝷曰自昔南詔嘗𣢾附中國中國尚禮義以惠飬爲務無所求取今弃蕃歸唐無逺戍之勞利莫大焉牟尋善其言謀内附者十餘年矣會劒南西川節度使韋臯招撫諸}
