  - {type: variant, offset: 3818, length: 0, content: '', krp: 及婆羅門接界西去舎利城六十日程疑此是東天竺也暴蠻等部落南夷志曰竹子嶺東有暴蠻部落嶺西有盧鹿蠻部落又有生蠻磨弥殿部落此等部落皆東㸑烏蠻也男則髻女則散髪見人無禮節拜跪三譯乃與華通大部落則有大鬼主百家二百家小部落亦有小鬼主一切信使鬼巫用相服制土多牛馬無布帛男女悉𬒳牛羊皮勿鄧南夷志曰勿鄧部落大鬼主夢衝地方千里功部一姓白蠻五姓烏蠻烏蠻婦人以白黒繒爲衣白蠻婦人以白繒爲衣下不過膝大賧南夷志曰大賧周迴百餘里悉是野蠻無君長地有瘴毒河賧人至中瘴者十死八九閤羅鳯嘗}
  - {type: variant, offset: 3820, length: 4, content: 獻龍腦麝, SBCK: 築城於彼管制野蠻不逾歳死者過半歳遂罷弃其土肥沃種瓠長丈餘冬􅀲亦然皆三尺圍又多薏苡無農桑収此充粮三靣皆是雪山其髙造天南瀘南夷志曰瀘水蜀諸葛亮伐南蠻五月渡瀘處大如臂川中氣候常熱雖方冬行過者皆􅃝衣流汗量水川南夷志曰量水川在滇池南兩日行漢舊􅀺州地川中有天地其水東南流岀一石竇中水流甚廣石竇甚狹蠻云此竇忽室空則百姓憂溺弥諾國弥臣國南夷志曰弥諾國弥臣國皆邊海國也呼其君長爲壽弥諾面赤而長弥臣靣黒而短性恭謹毎與人語向前一歩一拜國無城郭弥諾王所居屋之中有一大柱雕刻爲文飾以金銀弥臣王以木柵爲居海際水中以石師子爲屋四足仍以板蓋悉用}
  - {type: page-break, offset: 3820, content: '', id: KR3k0012_SBCK_789-5b}
  - {type: variant, offset: 3820, length: 4, content: 獻龍腦麝, WYG: 築城於彼管制野蠻不逾嵗死者過半遂罷棄其土肥沃種瓠長丈餘冬􅆶亦然皆三尺圍又多薏苡無農桑收此充糧三面皆是雪山其髙造天南瀘南夷志曰瀘水蜀諸葛亮伐南蠻五月渡瀘大如臂川中氣候常熱雖方冬行過者皆袒衣流汗量水川南夷志曰量水川在湞池南兩日行漢舊黎州地川中有尺地其地水南流出一石竇中水流甚廣石竇甚狹蠻土云此竇忽室空則百姓憂溺彌諾國彌臣國南夷志曰彌諾國彌臣國皆邊海國也呼其君長為壽彌諾面赤而長彌臣面黒而短性恭謹每與人語向前一步一拜國無城郭彌諾王所居屋之中有一大柱雕刻為文飾以金銀彌臣王以木柵為居海際水中以石師子為屋四足仍以板葢悉用}
