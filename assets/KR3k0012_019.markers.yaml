  - {type: variant, offset: 798, length: 0, content: '', WYG: 又曰仲春之月先春三日奮鐸以令于兆民曰雷且發聲有不戒其容止者生子不備必有凶灾耕者少舎晏子春秋曰齊景公夏逰獵又起太臺之役晏子諫曰夏春起役㳺獵奪民農時國家空虛不可景公曰吾聞相賢者國成臣忠者主逸吾年無幾矣欲遂吾所樂卒即律反吾所好子其息矣晏子曰聞文王不敢盤于逰畋故國昌而民安楚靈不廢乾谿之役起章華之臺而民叛之今君不思將危社稷而為諸侯笑臣聞忠不避死諫不違罪君不聽臣臣將逝矣景公曰唯唯揚子法言曰或曰為政先殺後教是歟於戲天先秋而後春乎將先春而後秋乎梁元帝纂要曰春亦曰發生芳春青春陽春三春九春風曰陽風暄風柔風惠風景曰媚景和景韶景時曰良時嘉時辰曰良辰嘉辰芳辰節曰芳節嘉節韶節淑節草曰弱草芳草木曰華木華樹芳樹林曰芳林茂林鳥曰陽鳥時鳥陽禽候鳥時禽好禽周}
