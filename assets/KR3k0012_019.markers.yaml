  - {type: variant, offset: 378, length: 0, content: '', SBCK: 春喜氣故生又曰春之猶言偆偆者音蠢又癡准反喜樂之貌也春秋元命包曰春者神明推移精華結紐神明猶隂陽也相推使物精華結成紐結要也又曰春含名出位東方動春明逹春之言蠢東之言動合此名以自明自達山六合俱生萬物應節雖於時爲春以其蠢動無節應此時節也五行並起各以名利自六合俱生以通五行各有隂陽交合故能然也其精青龍龍之言萌也獸之妙莫􅀂龍故青萌以名之隂中之陽也老子曰衆人熈熙􅀂享太牢如登春臺莊子曰夫春氣發而百草生正得秋而萬寳成夫春與秋豈無得而然哉}
  - {type: page-break, offset: 378, content: '', id: KR3k0012_SBCK_019-3a}
  - {type: variant, offset: 378, length: 134, content: 天有十日謂甲乙丙丁戊巳庚辛壬癸甲乙屬木主春故云其日甲乙也其帝太皞其神勾芒昔太皞氏以木德繼天而王故為春帝高辛氏有天下置五行之官木正曰勾芒故勾芒為木神佐太皞於春律中太蔟律者候氣之管以竹為之中猶應也正月氣至則太蔟之律應應謂吹灰也太蔟者林鍾所生三分益一管長八寸空徑三分團九分立, WYG: 仲}
  - {type: variant, offset: 378, length: 0, content: '', krp: 春喜氣故生又曰春之猶言偆偆者音蠢又癡准反喜樂之貌也春秋元命包曰春者神明推移精華結紐神明猶隂陽也相推使物精華結成紐結要也又曰春含名出位東方動春明逹春之言蠢東之言動合此名以自明自達山六合俱生萬物應節雖於時爲春以其蠢動無節應此時節也五行並起各以名利自六合俱生以通五行各有隂陽交合故能然也其精青龍龍之言萌也獸之妙莫若龍故青萌以名之隂中之陽也老子曰衆人熈熙若享太牢如登春臺莊子曰夫春氣發而百草生正得秋而萬寳成夫春與秋豈無得而然哉}
  - {type: variant, offset: 379, length: 0, content: '', SBCK: 道巳行矣春秋主生成皆得自然之道故不爲又曰春夏先秋冬後四時之序也萬物化則萌區}
