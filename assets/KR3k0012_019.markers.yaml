  - {type: variant, offset: 382, length: 0, content: '', SBCK: 衣皮毛夏日衣葛絺春耕夏種形足以勞動秋収冬歛身足以休食日出而作日入而息逍遥於天地之間而心意自得吾何以天下爲哉文子曰政失於春嵗星盈縮不居其常春政不失禾􅁰滋又曰因春而生因秋而殺所生不德所殺不怨則幾於道矣尸子曰翔風瑞風也一名景風一名惠風春爲發生夏爲長嬴秋爲収成冬爲安寜爾雅以爲四時之別名也又曰春爲忠也東方爲春春動也是故鳥獸孕榮華生萬物遂忠之志也鶡冠子曰斗柄指東天下皆春列子曰荆之南有冥靈者五百嵗爲春五百嵗爲秋上古有大椿者以八千嵗爲春八千嵗爲秋管子曰孟春之朝君自聽朝論爵賞管子曰隣人}
