  - {type: variant, offset: 2312, length: 839, content: 卿佐三公三公佐天子天子踐位諸侯各以其局就位乃升諸侯之教士執弓挾矢揖讓以升履物以射其地以心端色容正時以效技有慶以地不時有讓以地天下之有道也開元禮曰仲春上丁釋奠于太學孔宣父為先聖顏子為先師上戊釋奠于齊太公以張良配易通統圖曰日春行東方青道曰東陸易說曰春有白鶴雲京房易占曰春當退貪殘進柔良卹幼孤賑不足求隱士則萬物應節而生隨氣而長所謂春取榆柳之火尚書大傳曰萬物非天不生非地不載非春不動非夏不長非秋不收非冬不藏故書禋于六宗此之謂也禋祭也字當為禋馬氏以為太宗謂日月星辰泰山河海也經曰肆類于上帝禋于六宗望秩于山川徧于群神月令孟冬天子祈來年于天宗如此則六宗近謂天神也以周禮差之則為星辰司人司命風師雨師也又曰東方者何也動方也物之動也何以謂之春春出也物之出也故謂東方春也尚書說曰東方春龍房位其規仁好生不賊五靈東方曰蒼龍五均東曰規五姓曰仁也其帝青表聖明行趜德表德也春好生故曰德尚書考靈耀曰春佩蒼璧蒼佩玉以象德也乘蒼馬以出遊發令於外春行仁政順天之常以安國也又曰鳥星為春候詩含神霧曰齊地處孟春之位海岱之間土地汙泥流之所歸利之所聚律中太蔟音中宮角陳地處季春之位土地平夷無有山谷律中沽洗音中宮徵韓詩外傳簡主曰夫春樹桃李夏得蔭其下秋得食其實春樹蒺藜夏不可采其葉秋得其刺焉由此觀之在所樹也今子所樹非其人也故君子擇而後種又曰天有四時春夏秋冬風雨霜露無非教也韓詩章句曰溱與洧方渙渙兮謂三月桃花水下時鄭國之俗三月上巳於此水招魂續魄祅除不祥之故也三禮義宗曰五行之官也木正曰勾芒者物始生皆勾屈而芒角因用為官名又曰祭六宗之禮寒暑有往來之期可退則祭禳卻之命退應至而不至則祭求之命至故春則送寒而迎暑秋則送暑而迎寒又曰東岳所以謂之岱者代謝之義陽春用事除故生新萬物更生相代之道故以代為名也又曰天子諸侯宮寢之制若春氣三月之中居正寢退息之時常居東北之寢三月之末土王之日則居中寢夏之三月則居東南之寢秋之三月則居西南之寢冬之三月則居西北之寢此三時後土王之日亦各居中寢以從時氣又曰古之學者干戈之舞得從春夏羽籥之職得入秋冬四事之中有文有武故得分之, WYG: ''}
