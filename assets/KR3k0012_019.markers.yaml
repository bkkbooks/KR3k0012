  - {type: variant, offset: 2029, length: 345, content: 時不若不全成長幼老疾孤寡以時通于四疆月闔而不通有煩而不洽則民不樂生不利衣食凡民之藏貯以及山川之神明加于民者發圖功謀齋戒必敬會時必節日曆巫祝執伎以守官俟命而作祈王年禱民命及畜穀蜚征庶虞草方春三月緩施生育動作百物於時有事享于皇祖皇考朝孤子八人以成春事又曰二月祭鮪鮪者魚之先至也又曰三月參則伏不見又曰古者天子孟春論吏之德行能法者為有行能理得法者為有能盛法德者為有功故論吏而法行事治而功成季冬正法孟春論吏治國之要也春論班賞冬考量刑則莫不懲勸也又曰諸侯相見治卿為介以其教士畢行使仁者守會朝于天子天子以歲二月為壇于東郊建五色設五兵具五味陳六律品奏五聲聽明教置離抗大長侯規鵠豎物九卿佐三公三公佐天子天子踐位諸侯各以其局就位乃升諸侯之教士執弓挾矢揖讓以升履物以射其地以心端色容正時以效技有慶以地不時有讓以地, SBCK: 知}
