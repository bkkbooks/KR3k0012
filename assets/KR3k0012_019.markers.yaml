  - {type: variant, offset: 1391, length: 252, content: 冰先薦寢廟又曰季春之月蚕事既登分繭秤絲效功以供宗廟之服又曰季春之月天子乃為麥祈實鄭玄注曰於含秀求其成也又曰春生夏長仁也秋歛冬藏義也又曰天子五年一巡狩天子以海內為家時一巡狩省之五年者虞夏之制也周則十二歲一巡狩也歲二月東巡守至于岱宗柴而望祀山川柴祭天告至也覲諸侯覲見也問百年者就見之就見老人命大師陳詩以觀民風陳詩謂采其詩而視之命市納賈以觀民之所好惡志淫好辟市典者賈謂知物貴賤厚薄也質則用物貴民則侈物貴民之志淫邪則其所好者不正周禮曰媒氏掌萬民之判判半也合成夫婦也仲春月會男女成春體是時奔者不禁無故而不用令者罰之, SBCK: 氷}
