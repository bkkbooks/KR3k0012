  - {type: variant, offset: 792, length: 5, content: 孚甲種類分, WYG: 吕氏春秋曰天行不信不能成歲地安不信草木不茂春風不信百華不盛果實不生又曰仲春之月𤣥鳥至至之日以太牢祠于髙禖蔡邕曰髙禖神明}
