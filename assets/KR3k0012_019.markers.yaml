  - {type: variant, offset: 3039, length: 112, content: 春氣三月之中居正寢退息之時常居東北之寢三月之末土王之日則居中寢夏之三月則居東南之寢秋之三月則居西南之寢冬之三月則居西北之寢此三時後土王之日亦各居中寢以從時氣又曰古之學者干戈之舞得從春夏羽籥之職得入秋冬四事之中有文有武故得分之, krp: 不見即人無威振太平御覽卷第十九}
