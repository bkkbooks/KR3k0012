  - {type: variant, offset: 1790, length: 521, content: 有四年春正月無冰皆君不明去就政治紓緩之所致五行傳曰視之不明是謂不哲厥咎舒厥罰常燠無冰時燠也又曰四時之田皆為宗廟之事也春曰田取獸於田夏曰苗因為苗除害故曰苗秋曰蒐蒐擇之舍小取大冬曰狩狩團狩也冬物畢成獲則取之無所擇語曰莫春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸爾雅曰春為青陽一曰發生又曰春獵為蒐搜索取也又曰春祭曰祀薦尚韭柳禮䟽曰祀者思也思嚮所以設之日祀也大戴禮曰三代之禮天子春朝朝日秋暮夕月祭日東壇祭月西壇故以別外內以端其政位所以明有敬也教天下之臣也又曰司徒典春以教民之不時不若不全成長幼老疾孤寡以時通于四疆月闔而不通有煩而不洽則民不樂生不利衣食凡民之藏貯以及山川之神明加于民者發圖功謀齋戒必敬會時必節日曆巫祝執伎以守官俟命而作祈王年禱民命及畜穀蜚征庶虞草方春三月緩施生育動作百物於時有事享于皇祖皇考朝孤子八人以成春事又曰二月祭鮪鮪者魚之先至也又曰三月參則伏不見又曰古者天子孟春論吏之德行能法者為有行能理得法者為有能盛法德者為有功故論吏而法行事治而功成季冬正法孟春論吏治國之要也春論班賞冬考量刑則莫不懲勸也又曰諸侯相見治卿為介以其教士畢行使仁者守會朝于天子天子以歲二月為壇于東郊建五色設五兵具五味陳六律品奏五聲聽明教置離抗大長侯規鵠豎物, WYG: ''}
