  - {type: variant, offset: 786, length: 0, content: '', WYG: 助木節宣四方之氣而出種物也位于卯在二月東陽記曰山南有春草巖出龍鬚多藥物西京雜記曰賈佩蘭云在宫時正月上辰出池邉盥濯食蓬餌以去妖形荆州記曰陸凱與范曄為友在江南寄梅花一枝詣長安與曄并贈詩云折梅逢驛使寄與隴頭人江南無所有聊贈一枝春荆楚歲時記曰正月夜多鬼鳥度家家搥牀打户捩狗耳滅燈燭以禳之𤣥中記云此鳥名姑獲一名天地文一名隱飛鳥一名夜行逰女好取人女子養之有小兒之家即以血㸃其衣以為誌故世人名為鬼鳥荆州彌多斯言信矣又曰正月未日夜蘆苣火照井厠中百鬼走博物志曰宋國有田夫常衣黂分衮反緼僅以過冬暨春東作自曝于日不知天下之有廣厦奥室綿絲狐貉顧謂其妻曰負日之暄人莫知}
