  - {type: variant, offset: 782, length: 6, content: 夾鍾何夾者孚, SBCK: 夕乃布収其藏而閉其寒収歛其所藏而出布之其隂塞全不得發泚}
  - {type: variant, offset: 782, length: 0, content: '', WYG: 日薦韭卵于祖禰五行志曰於易震在東方為春為木者也兌在西方為秋為金離在南方為夏為火坎在北方為冬為水春與秋日夜分寒暑平是以金木之氣易以相變故貌傷則致秋隂常雨言傷則致春陽常旱也至于冬夏日夜相反謂夏日長夜短冬日短夜長也寒暑殊絶水火之氣不得相併故視傷常燠聽傷常寒者其氣然也又曰}
