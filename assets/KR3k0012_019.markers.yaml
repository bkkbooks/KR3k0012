  - {type: variant, offset: 93, length: 0, content: '', WYG: 伐輅車可引避也後漢書曰張奐為武威太守其俗多妖忌凡二月五日産子及與父母同日者悉殺之奐示}
  - {type: variant, offset: 94, length: 0, content: '', WYG: 義方嚴加賞罰風俗遂改百姓為立祠又曰章帝建初三年二月祀五帝于明堂遂登靈臺望雲物赦天下又曰元初二年春正月詔曰令人有産子者復無算三歲諸懷妊者賜月養榖復其夫勿算一歲著以為令又詔三公曰方春生養萬物孚甲冝助萌芽以育時物其令有司罪非誅死且勿案驗又丙午詔曰畿内七十以上暮春赴京師將行養老之禮又曰王莽上書曰夫三皇象春五帝象夏三王象秋五覇象冬皇王運德也覇者繼帝續之以成厯數故其道駮謝承後漢書曰鄭宏為臨淮太守春行有兩白鹿隨車夾轂而行宏後為太尉續漢書曰太守常以春行縣至縣勸人農桑}
  - {type: page-break, offset: 94, content: '', id: KR3k0012_WYG_019-3a, image: WYG0893/WYG0893-0184c.png}
  - {type: page-break, offset: 94, content: '', id: KR3k0012_WYG_019-3b, image: WYG0893/WYG0893-0184d.png}
  - {type: variant, offset: 95, length: 2, content: 文教, WYG: 救乏絶第五倫為太守因春行見鄭宏竒之署督郵鄭宏時為鄉嗇夫律厯志曰日行東陸謂之春魏略曰孟康為𢎞農守尚寛平羣吏二百餘人渉春遣休常四分遣一分無宿諾晉書曰郭黁奴敦反西平人也少明于易仕郡主簿張天錫末年符氏每有西伐之問太守趙凝使黁筮之黁曰若郡内二月十五日失囚者東兵當至凉祚必終凝乃申條屬縣至十五日鮮卑折握送馬與凝凝怒其非駿幽之廐内鮮卑懼而夜遁凝以吿黁黁曰是也國家將亡弗可復振春秋繁露曰春氣喜故生又曰春之為言偆也偆音蠢者喜樂之貌也春秋元命苞曰春者神明推移精華結紐又曰春含名蠢位東方動春明達春之言蠢東之言動含此名以自明自達也六合俱生萬物應節惟于時為春以其蠢動無節應此時節也五行並起各以名利自六合俱生以通五行各有隂陽交合故能然也其精青龍龍之言萌也隂中之陽也老子曰衆人熙熙若享太牢如登春臺莊子曰夫春氣發而百草生正得秋而萬寶成夫春與秋豈無得而然哉天道已行矣又曰春夏先秋冬後四時之序也萬物化則萌區有壯盛衰之殺變化之流}
