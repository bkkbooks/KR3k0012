  - {type: variant, offset: 1220, length: 281, content: 見天子居青陽右個是月也天子乃薦鞠衣于先帝鞠衣衣名蓋黃桑之服薦于先帝者為進於太廟天子始乘舟薦鮪于寢廟進時美味聘名士禮賢者聘謂問也名士謂有名譽也又曰三月中氣日在胃穀雨為三月中氣昏張中曉南斗中斗建辰位之中穀雨之日萍始生後五日鳴鳩拂其羽後五日戴勝降于桑命有司無伐桑柘受蠶食乃修蠶器蠶器謂薄搥鉤筐之類擇吉日大合樂大合樂者言行射禮禮曰仲春之月天子乃獻羔開冰先薦寢廟又曰季春之月蚕事既登分繭秤絲效功以供宗廟之服又曰季春之月天子乃為麥祈實鄭玄注曰於含秀求其成也又曰春生夏長仁也秋歛冬藏義也又曰天子五年一巡狩天子以海內為家時一巡狩省之五年者虞夏之制也周則十二歲一巡狩也歲二月東巡守, WYG: 電𤣥鳥不}
