  - {type: variant, offset: 32, length: 181, content: 律中太蔟律之言率也所以率氣也太者大也蔟者湊也言萬物始大湊地而出也書曰每歲孟春遒人以木鐸徇于路注云遒人宣令之官木鐸金鈴木舌所以振文教也又曰分命羲仲宅嵎夷曰暘谷平秩東作日中星鳥以殷仲春詩曰春日遲遲采蘩祁祁鄭注曰遲遲舒緩也又曰有女懷春吉士誘之又曰春日載陽爰求柔桑又曰嗟嗟保介維暮之春亦又何求如何新畬田二歲曰新三歲曰畬箋云保介車右也月令曰正月之節日在虛立春為正月之節謹按, SBCK: ''}
