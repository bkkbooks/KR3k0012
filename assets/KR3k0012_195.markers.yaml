  - {type: variant, offset: 2365, length: 2, content: 項羽, SBCK: 曰江充出逢館陶長公主行馳道中充聞之公主曰有太后詔充曰獨公主得行車􅀐皆不得盡劾没入官充從上甘泉逢太子家使乘車馬行馳道中充以屬吏太子聞之使人謝充曰非愛車馬誠不欲令上聞之以敎勑亡素者唯江君寛之充不聽遂白奏上曰人臣當如是矣大見信用威震京師又曰惠帝爲東朝長樂宮作􅃨道方築髙帝廟南叔孫通曰陛下何築􅃨道髙帝寢衣冠月出遊髙廟奈何令子孫宗廟道上行哉惠帝懼曰急壞之通曰人主無過舉今巳作百姓皆知矣願陛下爲原廟渭北衣冠月游之益廣宗廟大孝夲也帝從之又曰元帝即位成帝爲太子上甞召太子出龍樓門不敢絶馳道至直城門得絶乃度上遟之問其故以􅃺對上乃令太子􅀍召得絶馳道又曰上居雒陽南宫從􅃨道望見諸將徃徃數人偶語上曰此何語良曰陛下不知乎此謀反耳上曰天下屬安定何故而反良曰陛下與此屬取天下今陛下己爲天子而所封皆蕭曹故人所誅者皆平生仇怨今軍吏計功天下不足以徧封又恐見疑過失及誅故相聚謀反耳上迺憂曰爲將奈何良曰上平生所憎羣臣所共知誰最甚者上曰雍齒與我有故數窘辱我良曰今急先封雍齒以示羣臣則人人自堅矣於是置酒封雍齒爲什方侯而急趣丞相御史定功行封羣臣皆喜曰雍齒且侯我屬無患矣塗易震卦曰震大塗王廙注曰大塗万物所岀論語陽貨曰道聽而塗說德之弃也尓雅曰堂塗謂之陳路依塗吕氏春秋曰孔子用魯三年男行乎塗左女行乎途右財物之遺者民莫之舉司馬相如上林賦曰長塗中􅀫阡陌史記曰啇鞅相秦孝公壞井田開阡陌漢書游俠}
