  - {type: variant, offset: 1712, length: 7, content: 梁孝王遊於忘憂, SBCK: 朱超石與兄書曰洛下道路夲好青槐䕃暎可愛列子曰楊子}
  - {type: variant, offset: 1712, length: 4, content: 梁孝王遊, WYG: 朱超石與兄書曰洛下道路本好青槐䕃映可愛列子曰楊子之憐亡羊既率其黨又請楊子之豎追之楊子曰亡一羊何追者衆曰多岐路既反問獲羊乎曰亡之矣岐路之中又有岐焉吾不知所之而反楊子曰大道以多岐亡羊學者以多方䘮志韓子曰魯以五月起衆為長溝子路私為漿飲要作溝者}
