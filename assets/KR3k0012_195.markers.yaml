  - {type: variant, offset: 135, length: 616, content: 曰楚令尹子元欲蠱文夫人為館於其宮側而振萬焉萬舞又僖上曰改館晉侯饋七牢焉詩國風鄭緇衣曰適子之館兮還子授子之粲兮又大雅云篤公劉于豳斯館周禮地官司徒下云國野之道十里有廬廬有飲食三十里有宿宿有路室路室有委五十里有市市有候館館有積注云候樓館可以觀望也又秋官司寇下云凡諸侯入王則逆勞于畿及郊勞視館注云視館致館也又司儀云主君郊勞交擯三辭車送拜三揖三辭受拜車送三辭再拜致館亦如之注云館舍也使大夫授之君又以禮親致之儀禮聘禮云卿致館注云致至也至此館主人以禮致之所以安之也又環人云掌送迎邦國之通賓客以路節達諸四方舍則授館又云至于國賓入館次于舍門注云次待事于客儀禮公食大夫禮云有司卷三牲之俎歸于賓館注云牲之俎正饌尤尊盡以歸尊賓之至也又聘禮云厥明訝迎于館注云此訝下大夫以君命迎賓謂之訝訝迎亦皮弁也禮記曲禮上云問疾弗能遺不問其所欲見人弗能館不問其所舍又檀弓上云賓客至無所館夫子曰生於我乎館死於我乎殯又云子貢曰於門人之喪未有所說驂於舊館無乃以重乎又曾子問云卿大夫之家曰私館公館與公所為曰公館注云公館若今縣官舍也左傳莊元年經云夏單伯送王姬秋築王姬之館于外注云公在諒闇慮齊侯當親迎不忍便以禮接於廟又不敢逆王命故改築舍於外也又僖三十年傳云晉分曹衛之田公使臧文仲往宿於重館重館人告曰晉新得諸侯必親其恭不速行將無及也又襄三十一年傳云子產相鄭伯如晉晉侯以我喪故未之見也子產使壞其館之垣而納車馬士文伯讓之曰獘邑以政刑之不脩寇盜充斥是以令吏人完客所館今吾子壞之其若異客何子產曰僑, SBCK: ''}
