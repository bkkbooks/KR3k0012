  - {type: variant, offset: 1520, length: 0, content: '', SBCK: 逺曷云能來又曰行路遟遟中心有違又曰踧踧周道鞠爲茂草又曰路阻且躋躋升又曰周道逶遟歷逺貌又曰周道如砥貢賦均平又曰有杖之杜行彼周道又曰遵大路􅀆摻執子之祛􅀆又􅀜雎兎􅆯曰肅肅兎􅆯施于中逵周禮夏官曰合方氏掌天下道路又曰司險掌九州之圖以周知其山林川澤之阻而逹其道路又夏官􅀱人曰各掌其方之道禮記檀弓曰哀公使人弔蕢尚遇諸道於路畫宫而受弔焉哀公魯君也盡宫􅀞地爲宫象曾子曰蕢尚不如􅂎梁之妻知禮也又月令曰三月開通道路又曰道路男子由左婦人由右車從中央左傳曰公孫閼與潁考叔爭車潁考叔挾輈以走子都拔㦸以逐之及大逵弗及子都怒又曰盟諸王父之衢史記曰文帝行至霸陵愼夫人從}
  - {type: page-break, offset: 1520, content: '', id: KR3k0012_SBCK_195-3b}
  - {type: page-break, offset: 1520, content: '', id: KR3k0012_SBCK_195-4a}
  - {type: variant, offset: 1520, length: 0, content: '', WYG: 逺曷云能來又曰行道遲遲中心有違又曰踧踧周道鞠為茂草又曰道阻且躋升也又曰周道逶遲厯逺貌又曰周道如砥均平也又曰有杕之杜生於道周又曰遵大路兮摻執子之袪兮又曰肅肅兎罝施于中逵周禮夏官曰合方氏掌天下道路又曰司險掌九州之圖以周知其山林川澤之阻而達其道路又夏官候人曰各掌其方之道禮記檀弓曰哀公使人弔蕢尚遇諸道於路畫宫而受弔焉哀公魯君也畫宫畫地為宫象曽子曰蕢尚不如杞梁之妻知禮也又月令曰三月開通道路又曰道路男子由左婦人由右車從中央左傳曰公孫閼與潁考叔争車潁考叔挾輈以走子都拔㦸以逐之及大逵弗及子都怒又曰盟諸五父之衢史記曰文帝行至㶚陵慎夫人從}
