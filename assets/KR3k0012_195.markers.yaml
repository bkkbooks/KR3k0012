  - {type: variant, offset: 2078, length: 134, content: 此二皆館名張衡東京賦曰其西則有平樂都場示遠之館龍省盤蜿天馬半漢劉邵趙都賦曰置酒乎黃華之館左思魏都賦曰營密館以周坊飾賓侶之所集潘尼東都館賦曰東館者蓋東武陽侯之館也我而遷居謂余曰吾將老焉故有終焉之心而無移易之意子且為我賦之傳舍釋名曰傳傳也人所止息而去後人復來轉相傳無常人也, SBCK: 驅車駕言邁悠悠渉長道馳道}
