  - {type: variant, offset: 5, length: 81, content: 二館驛說文云館客舍也從食官聲周禮曰五十里有市市有館館有積以待朝聘之客廣雅釋宮云館舍也桂苑云客舍也待賓之舍曰館開元文字云凡事之賓客館焉舍也館有積以待朝聘之官是也客舍, SBCK: 三}
