  - {type: variant, offset: 3264, length: 271, content: 故基淪毀隆安中有丹陽尹司馬恢移創今地謝石創征虜亭三吳搢紳創治亭並太元中尋陽記曰稽亭北瞰大江南望高岳淹留遠客因以為名焉劉楨京口記曰劫亭湖亭通阿湖陵郡治丹徒縣八縣來往經過此湖中多劫於邊立亭因以為名裴淵明廣州記曰尉佗築臺以朔望升拜號為朝拜臺傍江構起華館以送陸賈因稱朝亭永嘉記曰樂城縣三京亭此亭是祖送行人之所王韶之始興記曰淘水源有堯山長嶺衡亙遠望如陣雲山下有平陵陵上有古大堂基十餘處雖巳夷漫而猶可識謂曰堯故亭父老相傳堯南巡登此山故亭即其行宮三齊略記曰曲城齊城東有萬歲水水北有萬歲亭漢武帝所造伏琛齊地記曰平壽城西北有平望亭亦古縣也或云秦始皇因為望海臺莊, SBCK: 尸}
