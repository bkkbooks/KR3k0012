  - {type: variant, offset: 1720, length: 76, content: 館進諸游士各使為賦隱訣易遷館含真臺有女真二人為主一曰張微子二曰傅禮和晉宮閤名云華林館有繁昌館建康館顯昌館延祚館壽安館干祿館班孟堅西都賦云於是天子乃登屬王, WYG: 以相接惟郢路}
