  - {type: variant, offset: 1519, length: 0, content: '', WYG: 曰上嘗至栢谷夜投亭宿亭長不内乃宿於逆旅逆旅翁謂上曰汝長大多力當勤種稼穡何忽𢃄劍羣聚夜行動衆此不欲為盜則淫耳上黙然不應因乞漿飲翁曰吾止有溺無漿也有頃還内上使人覘之見翁方要少年十餘人皆持弓矢刀劍令主人嫗出安過客嫗歸謂其翁曰吾觀此丈夫乃非常人也且亦有備不可圖也不如因禮之其夫曰此易與耳鳴鼓㑹衆討此羣盜何憂不克嫗曰安之令其眠乃可圖也翁從之時上從者十餘人既聞其謀皆懼勸上夜去上曰去必致禍不如且止以安之有頃嫗出謂上曰諸公子不聞主人翁言乎此翁好飲酒狂悖不足計也今日且令公子安眠無他嫗因還内時天寒嫗酌酒多與其夫諸少年皆醉嫗出謝客殺雞作食平明上去是日還宫乃召逆旅夫妻見之賜嫗金十觔其夫為羽林郎自是懲戒希復微行續漢書五行傳曰靈帝數逰戲於西園中令後宫綵女為客舎主身為商賈服行至舎綵女下酒食因共飲食以為戲樂東觀漢記曰第五倫自度仕宦牢落遂将家屬客河東變易姓名自稱王伯齊常與奴載鹽北至太原販賣每所至客舎去輙為糞除道上號曰道士開門請求不復責舎宿直范曄後漢書曰周防字偉公父楊少孤微常修逆旅以供過客而不受其報郭林宗别傳曰林宗每行宿逆旅輙躬灑掃及明去後人至見之曰此必郭有道昨宿處也晉書曰桑虞常行寄逆旅同宿客失脯疑虞為盜虞黙然無言便觧衣償之主人曰此舎數失魚肉雞鴨多是狐狸偷去君何以疑人乃将脯主至山冢間尋求果得遺脯以衣還虞虞投之不顧説苑曰鄭桓公㑹封於鄭暮舍於宋東之逆旅逆旅之叟從外來曰客将焉之曰㑹封於鄭逆旅之叟曰聞之時難得而易失也今客之寢安殆非就封者也鄭桓公聞之援轡自駕行十日十夜至即有與之争封者楚辭七諫曰路室女之方桑路室客舎孔子過之以自侍言孔子出逰過於客舍其女方採桑一心不視善其貞信故以自侍潘岳客舎議曰被下尚書勅客舎廢農奸淫亡命敗亂法度皆當除外十里安一宫舎使老少貧民守之又差吏掌主依官舎收錢數春農事興求須冬閒謹案客舎逆旅久矣其所由來矣行者頼其頓止居者薄收其直交易貿遷各得其所官無役賦而因民成利恵加百姓而公無所費語曰許由辭此帝堯之命而舎於逆旅自唐到今未有不得客舎之法道路爾雅曰廟中路謂之唐一達謂之道路二達謂之枝旁三達謂之劇旁今南陽冠章孫鄉數通交錯道路呼之五劇鄉四達謂之衢五達謂之康六達謂之荘七達謂之劇驂三道復一道岐出者北海極縣有此道也八達謂之崇期四道交出九達謂之逵四者交征出復有旁通者又曰大路謂之奔説文曰一逵謂之道路又曰馗九達道也似龜背故謂之馗易曰艮為徑路王廙注曰物始故為徑路又曰何天之衢道大行也又曰幢幢往來朋從爾思詩曰道之}
