  - {type: variant, offset: 756, length: 758, content: 為盟主也宮室無觀卑庳臺榭以崇大諸侯之館今銅鞮之宮數里而諸侯舍於隸人門不容車不可踰越士文伯不能對晉侯見鄭伯有加禮厚其宴好而歸之乃築諸侯之館又昭十三年傳云宣子謂叔向曰子能歸季孫乎對曰不能鮒也能乃使叔魚見季孫曰鮒聞諸吏將為子除館於西河其若之何且泣又曰叔孫所館雖一日必葺其牆屋去之如始至漢書薛宣子惠為彭城令宣過之橋梁郵驛不脩宣知其不能又郊祀志曰孫卿曰仙人可見上往常遽以故不見今陛下可為館如維氏城置脯酒神人可致且仙人好樓居於是上令長安作飛廉桂館甘泉作延壽館又曰鄭莊置驛以延賓客又曰公孫弘起徒步數年至宰相封侯於是起客館開東閤以延賢人與絫謀議又元后傳曰王莽又知太后婦人饜居深宮中莽欲娛樂以示其權迺令太后四時車駕巡狩四郊存見孤寡婦人春幸璽館率皇后列侯夫人桑遵霸水而祓除又外戚傳曰成帝許美人在上林鹿館數召入飾室中元延二年懷子漢書敘傳述元紀云宮不新館陵不崇墓又揚雄傳長楊賦云張網置罘捕熊豪豬狖玃狐兔麋鹿載以檻車輸長楊射熊館又羽獵賦云於是禽彈中衰相與集於靖冥之館魏志曰文昭甄宣后明帝母也后已早廢父逸上蔡令早卒及明帝即位追封逸為上蔡侯謚敬侯適孫蒙襲爵薨子暢嗣上為暢起大第車駕自臨之世說曰魏明帝為外祖母築館于甄氏自行視謂左右曰館當以何為名侍中繆襲對曰陛下聖恩齊于哲王罔極過于曾閔此館之興情鍾舅氏宜以渭陽為名魏書曰帝於後園為母起觀及宮名其里曰渭陽里晉書天文志云傳舍九星在莖善上近河賓客之館主胡人入中國客星守之備奸使亦曰胡兵起宋書文帝本紀云帝臨玄武館閱武又隱逸雷次宗傳云徵詣京邑為築室於鍾山西巖下謂之招隱館齊書禇伯玉傳云高帝即位手詔吳會二郡以禮迎伯玉伯玉辭疾上不欲違其志勑於剡白石山立太平館以居之梁書高祖紀云大統七年幸於宮城西立士林館延集學徒置集雅館以招遠學冲虛真經黃帝云黃帝於是放萬機舍寢室去直待徹鍾縣減廚膳退而閑居大庭之館齋心服形三月不親政事, SBCK: 爭營丘}
