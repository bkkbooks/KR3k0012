  - {type: variant, offset: 1520, length: 0, content: '', krp: 逺曷云能來又曰行路遟遟中心有違又曰踧踧周道鞠爲茂草又曰路阻且躋躋升又曰周道逶遟歷逺貌又曰周道如砥貢賦均平又曰有杖之杜行彼周道又曰遵大路兮摻執子之祛兮又關雎兎罝曰肅肅兎罝施于中逵周禮夏官曰合方氏掌天下道路又曰司險掌九州之圖以周知其山林川澤之阻而逹其道路又夏官候人曰各掌其方之道禮記檀弓曰哀公使人弔蕢尚遇諸道於路畫宫而受弔焉哀公魯君也盡宫畫地爲宫象曾子曰蕢尚不如𣏌梁之妻知禮也又月令曰三月開通道路又曰道路男子由左婦人由右車從中央左傳曰公孫閼與潁考叔爭車潁考叔挾輈以走子都拔㦸以逐之及大逵弗及子都怒又曰盟諸王父之衢史記曰文帝行至霸陵愼夫人從}
  - {type: variant, offset: 1521, length: 0, content: '', SBCK: 示愼夫人新豐道曰此走邯鄲道也東觀漢記曰逢萌􅀍徴上道迷不知東西云朝所徴我者爲聦明叡智有益於政方面不知安能濟政即駕而歸國語曰夫辰角見而除道故夏令曰九月除道賈逵注曰辰角大辰倉龍之龍角星名也家語曰武王克啇通道于九夷八蠻魏􅀳春秋曰阮籍有時率意獨行不由徑路車跡所窮輙慟哭而返陸機洛陽記曰宫門及城中大道皆分作三中央御道兩邊築土牆髙四尺餘外分之唯公卿尚書章服道從中道凡人皆行左右左入右出夾道種榆槐樹此三道四通五逹也淮南子曰楊朱見歧路而哭曰可以南可以北又曰聖人之道如衢設罇過者斯酌之􅀶物志曰文王以太公爲灌壇令其年風不鳴條文王夢一婦人甚麗當道哭問其故曰我東山女嫁爲西海婦行必以暴風雨今灌壇令當道有德吾不敢以風􅀨過也十洲記曰天帝君之城仙眞之人岀道徑}
  - {type: page-break, offset: 1521, content: '', id: KR3k0012_SBCK_195-4b}
  - {type: variant, offset: 1521, length: 0, content: '', WYG: 示慎夫人新豐道曰此走邯鄲道也東觀漢記曰逢萌被徵道上迷不知東西云朝所徵我者為聰明睿智有益於政方面不知安能濟政即駕而歸國語曰夫辰角見而除道故夏令曰九月除道賈逵注曰辰角大辰倉龍之宿角星名也家語曰武王克商通道于九夷八蠻魏晉春秋曰阮籍有時率意獨行不由徑路車路所窮輙慟哭而走陸機洛陽記曰官門及城中大道皆分作三中央御道兩邉策土墻髙四尺餘外分之唯公卿尚書章服道從中道凡人皆行左右左入右出夾道種榆槐樹此三道四通五達也淮南子曰楊朱見岐路而哭曰可以南可以北又曰聖人之道如衢設罇過者斯酌之博物志曰文王以太公為灌壇令其年風不鳴條文王夣一婦人甚麗當道哭問其故曰我東山女嫁為西海婦行必以暴風雨今灌壇令當道有徳吾不敢以風雨過也十洲記曰天帝君之城仙員之人出道徑}
