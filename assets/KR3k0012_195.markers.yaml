  - {type: variant, offset: 1806, length: 233, content: 五月余之長安壬寅于新安之千秋亭甲辰而弱子失越翌旦乙巳瘞于亭高允塞上公亭詩序曰延和三年余赴京師發石門北行失道夜寓宿代之快馬亭其俗云古塞上公所貴之邑也曰公有良馬因以命之此其所貴也負長城而面南山皋澤帶其側涌波灌其前停騑策以流目抱遺風以依然仰德音於在昔遂揮毫以寄言代人云塞上公姓李代之李氏並其後也張平子西京賦曰顧往昔之遺館獲林光於秦餘又云郡國宮館百四十五右極𥂕屋并卷酆鄠又云豫樟珍館揭焉中峙班婕妤自傷賦曰痛陽祿與柘館皆宮名生二子處此二館皆失也仍襁褓而罹災豈妾人之殃咎兮將天命, WYG: ''}
