  - {type: variant, offset: 3609, length: 556, content: 四亭河陰界東出戶鄉亭南泉亭街郵亭孔蹕會稽記云江夏太守宋輔於重山南白樓亭立學教授又郡國志云沛國桓儼避地至會稽聞陳業賢而往候之不見臨去入交州留書繫白樓亭柱而別翻陽記曰白雲亭在縣西南旁對干越亭而峙焉跨古城之危瞰長江之深隋州刺史劉長卿題詩曰孤城上與白雲齊因以白雲為名豫章記曰徐孺子墓在郡南十四里曰白杜亭吳嘉禾中太守長沙徐熙於墓隧種松太守南陽謝景於墓側立碑永安中太守梁郡夏侯嵩於碑邊立思賢亭松碑亭今並在松大合抱亭世世脩治至今謂之謝君亭越絕書曰女陽亭者勾踐入宦於吳夫人從道產女於亭養於雋李謂之語兒鄉郡國志皇甫謐云鳴條之野立鳴條亭又曰涼州候馬亭貳師伐大宛得天馬感西風頓羈而逸至燉煌北塞下鳴而去貳師候於此遂名之又曰韶州潼溪里有三楓亭又曰濟州周首亭即埋長狄喬如首於山西是也又曰冀州華陽亭即嵇叔夜學琴於此又曰幽州督亢亭即荊軻以地圖獻秦處又曰郴州武丁岡有欒亭即太守欒巴所建也又曰柯亭一名千秋亭又名高遷亭會稽記云漢議郎蔡邕避難宿於此亭仰觀榱竹知有奇響因取為笛果有異聲又曰潤州覆舟山有閬風亭襄江記峴山亭在襄陽縣東一十里今基跡尚存兩京新記曰西京苑內有望雲亭鞠場亭柳園亭真興亭神皋亭園桃亭臨渭亭永泰亭南昌園園北昌國亭流杯亭青門亭邵平種瓜之所也又曰東京上陽宮有曜掌亭九洲亭又曰東都苑內有金谷亭凝碧池建安記曰止馬亭在飛蝯嶺口馬之登降於此止息故名之, SBCK: 五}
