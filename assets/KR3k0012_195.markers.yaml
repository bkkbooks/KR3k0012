  - {type: variant, offset: 2365, length: 2, content: 項羽, WYG: 曰江充出逢舘陶長公主行馳道中充問之公主曰有太后詔充曰獨公主得行車騎皆不得盡劾没入官充從上甘泉逢太子家使乘車馬行馳道中充以屬吏太子聞知使人謝充曰非寡車馬誠不欲令上聞之以教勑亡素者唯江君寛之充不聽遂白奏上曰人臣當如是矣大見信用威震京師又曰恵帝為東廟長樂宫作複道方築髙帝廟南叔孫通曰陛下何築複道髙帝寝衣冠日出逰髙廟奈何令子孫宗廟道上行哉恵帝懼曰急壊之通曰人主無過舉今已作百姓皆知矣願陛下為原廟渭北衣冠月㳺之益廣宗廟大孝本也帝從之又曰元帝即位成帝為太子上嘗召太子出龍樓門不敢絶馳道至直城門得絶乃度上遲之問其故以状對上乃令太子被召得絶馳道又曰上居雒陽南宫從複道望見諸將往往數人偶語上曰此何語良曰陛下不知乎此謀反耳上曰天下安定此屬何故而反良曰陛下與此屬取天下今陛下已為天子而所為封皆蕭曹故人所誅者皆平生讐怨今軍吏計功天下不足以徧封又恐見疑過失及誅故相聚謀反耳上廼憂曰今將柰何良曰上平生所憎羣臣所共知誰最甚上曰雍齒與我有故數窘辱我良曰今急先封雍齒以示羣臣則人人自堅矣於是置酒封雍齒為什邡侯而急趣丞相御史定功行封羣臣皆喜曰雍齒且侯我屬無患矣塗易震卦曰為大塗王廙注曰火塗萬物所出論語陽貨曰道聽而塗説徳之弃也爾雅曰堂塗謂之陳路依塗吕氏春秋曰孔子用魯三年男行乎塗左女行乎塗右財物之遺者民莫之舉司馬相如上林賦曰長塗中宿阡陌史記曰商鞅相秦孝公壊井田開阡陌漢書㳺俠}
