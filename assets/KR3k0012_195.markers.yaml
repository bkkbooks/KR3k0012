  - {type: variant, offset: 1519, length: 0, content: '', SBCK: 曰上甞至栢谷夜投亭􅀫亭長不内乃􅀫於逆旅逆旅翁謂上曰汝長大多力當勤稼穡何忽帶劒羣聚夜行動衆此不欲爲盗則􅁋耳上黙然不應因乞漿飲翁曰吾正有溺無漿也有頃還内上使人覘之見翁方要少年十餘人皆持弓矢刀劒令主人嫗出安過客嫗歸謂其翁曰吾觀此丈夫乃非常人也且亦有備不可圖也不如因禮之其夫曰此易與耳鳴鼓會衆討此羣盗何憂不尅嫗曰且安之令其眠乃可圖也翁從之時上從者十餘人旣聞其謀皆懼勸上夜去上曰去必致禍不如且止以安之有頃嫗出謂上曰諸翁子不聞主人翁言乎此翁好飲酒狂悖不足計也今日具令公子安眠無他嫗因還内時天寒嫗酌酒多與其夫諸少年皆醉嫗出謝客殺雞作食平明上去是日還宫乃召逆旅夫妻見之賜嫗金十斤其夫爲羽林郎自是懲戒希復微行續漢書五行傳曰靈帝數遊戲於西園中令後宮采女爲客舎主身爲啇賈服行至舎采女下酒食因共飲食以爲戲樂東觀漢記曰第五倫自度仕䆠牢落遂將家屬客河東變易姓名自稱王伯齊常與奴載鹽北至太原販賣每所止客舎去輙爲糞除道上號曰道士開門請求不復責舎􅀫直范曄後漢書曰周防字偉公父楊少􅀌微常脩逆旅以供過客而不受其報郭林宗別傳曰林宗每行􅀫逆旅輙躬洒掃及明去後人至見之曰此必郭有道昨􅀫處也晉書曰桑虞甞行􅀉逆旅同􅀫客失脯疑虞爲盗虞黙然無言便解衣償之主人曰此舎數失魚肉雞鴨多是狐狸偷去君何以疑人乃將脯主至山冢間㝷求果得遺脯以衣還虞虞投之不顧說􅁐曰鄭桓公會封於鄭暮舎於宋東之逆旅逆旅之叟從外來曰客將焉之曰㑹封於鄭逆旅之叟曰聞之時難得而易失也今客之寢安殆非就封者也鄭桓公聞之援轡自駕行十日十夜至即有與之爭封者楚辭七諫曰路室女之方桒路室客舎孔子過之以自侍言孔子岀遊過於客舎其女方採桒一心不視善其貞信故以自侍潘岳客舎議曰尚書勑客舎廢農姧淫亡命敗亂法度皆當除壞十里安一官舎使老小貧民守之又差吏掌主依官舎收錢數春農事興求湏冬閑謹案客舎逆旅乆矣其所由來矣行者賴以頓止居者薄收其直交易􅐙遷各得其所官無役賦而因民成利惠加百姓而公無所費語曰許由辭帝堯之命而舎於逆旅自唐到今未有不得客舎之法道路爾雅曰廟中路謂之唐一逹謂之道路二逹謂之枝旁三逹謂之劇旁今南陽冠章孫卿數通交錯道路呼之五劇郷四逹謂之衢五逹謂之康六逹謂之莊七逹謂之劇驂三道復一道􅄮出者北海極縣有此道八逹謂之崇期四道交岀九逹謂之逵四者交道岀復有旁通者又曰大路謂之奔說文曰一逹謂之道路又曰馗九逹道也似􅀛背故謂之馗易曰艮爲徑王廙注曰物始故爲徑路又曰何天之衢道大行也又曰憧憧徃來朋從爾思詩曰道之}
