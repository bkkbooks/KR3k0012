  - {type: variant, offset: 443, length: 2, content: 伏甲, WYG: 殺吳王僚湛盧去如楚昭王寤而得召風胡子問之曰此劒值幾何對曰赤堇之山已合若耶之溪深而不測羣神上天歐冶已死雖有傾城量金珠玉不可與况駿馬萬戸之都乎又曰越王問范蠡用兵行陣對曰越有處女出扵南林之中願君王問以手戰之道立可見也處女將見道逢老人自稱袁公袁公曰聞子善為劒願一觀之女曰妾不敢有隠袁公即跪拔林之竹處女即接其末公操其本而刺處女處女因舉杖擊之袁公即飛上樹變為白猨女别去見越王越王大悦乃命五校之隊長髙才習之以教軍人當此之時皆稱越女劒又曰干將者吳人與歐冶同師俱作劒前獻劒一枚闔閭得而寳之以故使干將造劍二枚一曰干將二曰莫耶莫耶者干將之妻名也干將作劍採五山之精合六合之英候天伺地隂陽同光百神臨觀天氣下䧏而金鐵之精未流莫耶曰子以善為劒聞}
