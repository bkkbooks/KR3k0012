  - {type: variant, offset: 3511, length: 5, content: 水波浪驚沸, WYG: 右右光照左又曰西閭過渡河而溺焉能説諸侯過曰干將莫耶拂鍾不錚以之攝履曾不如兩錢之錐錚楚庚切又曰齊遣淳于髠到楚髠為人頭小楚王甚薄之謂曰齊無人耶而使子來子何長也髠對曰臣無所長腰中七尺之劒欲斬無狀王王曰止吾但戲子耳即與髠共飲酒鹽鐡論曰所謂利兵者非謂吳楚之鋌干將之劒也以道徳為城以仁義為郭莫之敢攻莫之敢入文王是也以道徳為胄仁義為劒莫之敢當莫之敢禦湯武是也今不建不攻之城不可當之兵而任匹夫之役而行三尺之刃亦細矣魏文帝典論曰余好擊劒善以短乗長選兹良金命彼國工精而煉之至于百辟其始成也五色駭鑪巨橐自鼓又曰建安二十四年二月丙午魏太子丕造百辟寳劒長四尺二寸重一斤十有五兩淬以清漳厲以礛音監䃴音諸飭以文玉表以通犀光似星名曰飛景礛䃴青􅀈石也世説曰王子喬墓在京陵戰國時人有盗發之者覩無所見唯有一劒停在空中欲進取之劒作龍鳴虎吼遂不敢近俄而徑飛上天又曰鍾㑹是荀濟北從舅二人情好不協荀有好寳劒可值百萬常在母鍾太夫人所㑹善書學荀手跡作書與母取劒仍竊去不還荀深知是鍾無可得求思所以報之鍾㑹兄弟共以千萬起新宅始成甚精麗未得移住荀善畫}
