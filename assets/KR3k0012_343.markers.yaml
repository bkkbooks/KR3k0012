  - {type: variant, offset: 820, length: 0, content: '', SBCK: 出户望南山松上石上劒在其巔及産果男母以告尺尺破柱得劒欲報􅀳君客有爲報者將尺首及劒見晉君君怒烹之首不爛王臨之客以擬王王首墜湯中客因自擬之三首盡麋不分乃爲三冢曰三王冡也文士傳曰魏文帝愛楊脩才脩誅後追憶脩脩曽以寳劒與文帝文帝後佩之告左右曰此楊脩劒也周斐先賢傳曰許嘉給縣功曹儀}
