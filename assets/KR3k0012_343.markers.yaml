  - {type: variant, offset: 3496, length: 2, content: 蟠縈, SBCK: 盤交湏􅁷光采微發曜日映川􅀃苑曰經侯往過魏太子左帶玉具劒右帶環珮左光照右右光照左又曰西閭過渡河而溺焉能􅀃諸侯過曰干將莫耶拂鍾不錚以之攝履曽不如兩錢之錐錚楚庚切又曰齊遣淳于髠到楚髠爲人頭小楚王甚薄之謂曰齊無人耶而使子來子何長也髠對曰臣無所長􅆎中七尺之劒欲斬无狀王王曰止吾但戯子耳即與髠共飲酒􅐭鐵論曰所謂利兵者非謂吴楚之鋌干將之劒也以道德爲城以仁義爲郭莫之敢攻莫之敢入文王是也以道德爲胄仁義爲劒莫之敢當莫之敢禦湯武是也今不建不攻之城不可當之兵而任匹夫之􅃥而行三尺之刄亦細矣魏文帝典論曰余好擊劒善以短乗長選兹良金命彼國工精而錬之至于百辟其始成也五色駭鑪巨槖自皷又曰建安二十四年二月丙午魏太子丕造百辟寳劒長四尺二寸重一斤十}
