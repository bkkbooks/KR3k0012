  - {type: variant, offset: 1348, length: 971, content: 於道路人無不按劍相眄者何則無因而至前也又曰高祖送徒驪山夜徑澤中令一人行前行前者還報曰前有大蛇當徑願還高祖曰壯士行何畏乃前拔劍斬蛇又曰高祖置酒雒陽宮曰吾有三傑而能用之故吾以布衣提三尺劍取天下也項羽有一范增而不能用所以為吾擒也又曰高祖擊英布時為流矢所中高祖問毉曰病可治於醫曰可治於是高祖慢罵之曰吾以布衣提三尺劍取天下此非天命乎命乃在天雖扁鵲何益又曰伍員奔吳舡人濟之員感其德解寶劍賜之舡人曰子達吳勿相忘劍則不敢以當又曰魏相為丞相好武皆令諸吏有奏事者帶劍而前奏或有不帶劍者入奏事乃借錯劍而方敢入又曰荊軻衛人之燕燕人謂之軻卿軻卿好讀書學擊劍以術說元君元君不用又曰司馬相如好讀書學擊劍故母名曰犬子漢書曰雋不疑字曼倩渤海人治春秋為郡文學進退必以禮名聞州郡武帝末暴勝之為直指使者衣繡衣素聞不疑賢至渤海遣吏請與相見不疑冠進賢冠帶擂具劍應劭曰擂具摽首之擂磊落壯大之皃又曰時中國初定尉他平南越回王之高祖使中大夫陸賈賜他印為南越王王賜賈橐中裝千金賈有五男迺出所使橐中裝賣千金分其子子二百金賈常乘安車駟馬從歌鼓瑟侍者十人寶劍直百金謂其子曰與汝約過汝汝給人馬酒食極歡十日而更約所死家得寶劍其遊漢庭名聲籍甚言狼籍甚盛也又曰朱博奏王莽為庶人莽就國南陽太守以莽貴重選門下掾孔休守新都伯休謁見莽莽盡禮自納休亦聞其名莽後疾休候之莽緣恩意進其玉具劍欲以為好休不肯受莽因見誠見君面有瘢美玉可以滅瘢休復辭讓莽曰君嫌其價耶遂椎碎自裹以進休乃受之又曰朱雲曰臣願請上方斬馬劍斷佞臣一人首上問誰對曰安昌侯張禹上怒又曰龔遂為渤海太守務農勸人賣劍買牛曰可為佩牛乎又曰沛公從百餘騎見羽於鴻門羽因留沛公飲范增數目羽擊沛公羽不應范增起出謂項莊曰君王為人不忍汝入以劍舞因擊殺之莊入為壽壽畢曰軍中無以為樂請以劍舞因拔劍起舞項伯亦起舞常以身翼蔽沛公獲免又曰孝景帝賜衛綰曰先帝賜臣劍凡六不敢奉詔上曰劍人之所施獨亦至今乎綰曰具在上使取六劍尚盛未嘗服之也又曰質氏以治削而鼎食注治刀劍也又曰王莽使武賁以斬馬劍挫音剉董忠又曰梁冀帶劍入省尚書張凌呵叱令出冀跪謝凌不應因劾奏詔以一歲俸贖罪楚漢春秋曰上過陳留酈生求見使者入通公方洗足問如何人曰狀類大儒上曰吾方以天下為事未暇見大儒也使者出告酈生瞋目按劍入言高陽酒徒非儒者也後漢書曰韓稄為尚書令與僕射郅壽尚書陳寵同時俱以才能稱肅宗嘗賜諸尚書劍唯此三人特以寵劍自手署其名曰韓稜楚龍泉, SBCK: 善星暦卜占}
