  - {type: variant, offset: 2320, length: 771, content: 太康記曰汝南西平縣有龍泉可淬刀劍特堅利汝南即楚分野也郅壽蜀漢文陳寵濟南椎成椎音宜追切漢官椎成作鍛成時論者為之說以稜深有謀故得龍泉壽明達有文章故得漢文寵敦朴善不見外故得椎成謝承後漢書曰延熹中詔應奉曰蠻夷叛逆作難積惡放恣鑊中之魚火熾湯盡當急燋爛以刷國恥朝廷以奉昔守南土威名播越故復式序重任奉之廢興期在於今賜奉錢十萬駮犀方具劍金錯把刃劍革帶各一奉其勉之又曰吳郡張業字仲叔為郡門下掾逐太守歸鄉里至河內遇賊業拔劍與賊交戰而死子武時幼不識父傷父喪不還每至節日持業遺劍至河內到業死處醊祭悲哀感動路人東觀漢記曰世祖十三年王國有獻名馬寶劍直百金馬以駕鼓車劍以賜騎士又曰馮石襲母公主封獲嘉亦為侍中稍遷衛尉能取悅當世為安帝所寵帝嘗幸其府留飲十數日賜駮犀具劍紫艾授玉玦各一又曰建武二年遣馮異西擊赤眉平關中上自河南賜異乘輿七尺玉具劍又曰光武有駭犀之劍以賜陳遵魏志曰文帝為太子時與鄧展飲酣論及劍術不決時方食甘蔗因以習之下殿數交三中其臂魏略曰嚴翰字公仲器性重厚篤好擊劍魏氏春秋曰魏武過城皋故人呂伯奢伯奢不在家人為供王聞其食器聲疑其圖己夜手劍殺八人既見食飲而悽愴曰寧我負人無令人負我吳書曰太史慈臨亡歎息曰丈夫生世當帶七尺之劍以升天子之階今所志未從奈何而死乎權甚悼惜之晉書曰上公九命則劍履上殿又曰張軌遣主簿令狐亞聘南陽王模甚悅遺軌以帝所賜劍謂軌曰自隴已西征伐斷割悉以相委如此劍矣又曰武庫火歷代之寶孔子履漢高斬白蛇劍王莽頭皆失所在張華見龍劍排戶而飛去又曰何攀除兗州刺史錫班劍赤舄又曰王如初聚眾作逆敗王敦弟稜愛驍武請敦配麾下稜甚加寵遇如數與敦將角射鬥爭為過稜杖之如甚以為恥初敦有不臣之迹稜每諫之敦常怒異色乃密使人激怒如勸令殺稜因稜閑晏如請劍儛為勸稜從之如於是儛刀為戲漸來前稜惡而呵之不止遂直前斬稜敦聞而佯驚亦捕如誅之又曰張華傳吳之未滅也斗牛之間常有紫氣道術者皆以吳方強盛未可圖也唯, SBCK: ''}
