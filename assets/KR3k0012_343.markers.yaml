  - {type: variant, offset: 457, length: 2, content: 甲坐, WYG: 子作劒三年不成者其有意乎干將曰吾不知其理莫耶曰夫神物之化湏人而成今夫子作劒得無當得人而後成干將曰昔吾師之作冶也金鐵之頴不消夫妻俱入冶爐之中莫耶曰先師親爍身以成物妾何難也}
