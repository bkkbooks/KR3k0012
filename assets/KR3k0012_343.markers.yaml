  - {type: variant, offset: 142, length: 3, content: 左首尊, SBCK: 吴人與歐冶同師俱作劒前獻劒壹杖闔閭得而寳之以故使干將造劒二枚一曰干將二曰莫耶莫耶者干將之妻名也干將作劒採五山之精合六合之英候天伺地隂陽同光百神臨觀天氣下降而金鐵之精未流莫耶曰子以憘爲劒聞於王王使子作劒三年不成者其有意乎干將曰吾不知其理莫耶曰夫神物之化湏人而成今夫子作劒得無當得人而後成干將曰昔吾師之作冶也金鐡之頴不消夫妻俱入冶鑪之中莫耶曰先師親爍身以成物妾何難也於是干將夫妻乃断髪揃音剪指投之鑪中使僮女一作子三百皷槖裝炭金鐡乃濡遂以成劒陽曰干將而作􅀛文隂曰莫耶而作漫理干將匿其陽出其隂而獻之闔閭闔閭甚惜之又曰伍子胥過江解劒與漁父曰此劒中有七星北斗文其直千金越絶書曰楚王召風胡子而問之曰寡人聞吴有干將越有歐冶子此二人寡人願賫􅀖之重寳皆以奉子因吴王請此二人爲鐡劒可乎風胡子曰善於是乃令風胡子之吴見歐冶子干將使之爲鐡劒歐冶子干將鑿茨山洩其溪取其鐵英爲劒三枚一曰龍淵二曰太阿三曰工市劒成風胡子奏之楚王楚王見之精神太恱見風胡子問之曰此三劒其名爲何風胡子曰一曰龍淵二曰太阿三曰工市楚王曰何爲龍淵太阿工市風胡子對曰欲知龍淵觀其狀如登髙山臨􅀷淵欲知太阿觀其鍔巍巍翼翼如流水之波欲知工市觀其鍔從文間起至脊而止如珠而不可枉文􅀂流而不絶晉鄭聞此三劒而求之不得興師圍楚之城三年不解倉榖盡庫無兵革於是引太阿之劒登城而麾之三軍破敗士卒迷惑流血千里晉鄭之頭畢白楚王於是大恱曰此劒威耶寡人力也風胡子對曰劒之威也因大王之神楚王曰夫劒鐵耳固能有精神如此乎風胡子曰神農以石爲兵黄帝以玉爲兵禹以銅鐵爲兵天下皆服此亦鐵之神也王之德}
