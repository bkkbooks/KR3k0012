  - {type: variant, offset: 803, length: 10, content: 齊桓公問曰齊國寡甲兵, WYG: 吾藏劒在南山之隂北山之陽松生石上劒在其中矣君若覺殺我爾生男以告之及至君覺殺干將妻後生男名赤鼻具以告之赤鼻斫南山之松不得劒思於屋柱中得之晋君夢一人眉廣三寸辭欲報讎購求甚急乃逃朱興山中遇客欲}
