  - {type: variant, offset: 803, length: 4, content: 齊桓公問, SBCK: 吾藏劒在南山之隂北山之陽松生石上劒在其中矣君􅀂􅁴殺我尓生男以告之及至君覺殺干將妻後生男名赤􅈹具以告之赤􅈹斫南山之松不得劒思於屋柱中得之晉君夢一人眉廣三寸辭欲報讎購求甚急乃逃朱興山中遇客欲爲之報乃刎首將以奉􅀳君客令鑊煑之頭三日三日跳不爛君往觀之客以雄劒􅀝擬君君頭墮鑊中客又自刎三頭悉爛不可分別分葬之名}
