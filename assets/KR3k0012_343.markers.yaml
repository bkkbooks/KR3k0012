  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第三百四十三}
  body:
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 四劒中吴越春秋曰越王允常聘歐冶子作名劒五枚}
  - {type: variant, offset: 4, length: 205, content: 三劍上釋名曰劍撿也所以防檢非常也又歛也以其在身拱時歛在臂內也其旁鼻曰鐔音尋鐔尋也帶所貫尋也其末曰鋒末之言也韻集曰鐔音覃劍口也方言曰鞘音肖謂之室說文曰韜謂之衣亦曰襓襓音遶字林曰璏直例反劍鼻也禮記曰武王克商後散軍而郊射左射狸首右射騶虞而貫革之射息也禆冕搢笏而虎賁之士脫劍又曰進劍者左首尊也又曰受弓劍以袂敬也周禮曰周官桃氏為劍臘廣二寸有半寸臘謂兩刃音腊兩從半之劍脊兩殺趍鍔者以其臘廣為之莖圍長倍之莖謂劍天人之所握以上, WYG: 四劒}
  - {type: variant, offset: 4, length: 0, content: '', krp: 四劒中吴越春秋曰越王允常聘歐冶子作名劒五枚}
  - {type: xml-element, offset: 5, content: '', id: KR3k0012_CHANT_343-bkkxmlele1}
  - {type: 'tls:seg', offset: 5, content: '', id: KR3k0012_CHANT_343-1a.1}
  - {type: 'tls:seg', offset: 5, content: '', id: KR3k0012_CHANT_343-1a.2}
  - {type: variant, offset: 5, length: 1, content: 劍, SBCK: 大二小一曰純鈞二曰湛盧三曰豪曹或曰盤郢四曰魚膓五曰鉅闕􅁗客薛燭善相劒王取豪曹示之薛燭曰非寳劒也夫寳劒五色並見今豪曹五色黯然無華殞其光亡其神矣王復取鉅闕示之薛燭曰非寳劒也夫寳劒金錫和同氣如雲煙今其光巳離矣王復取魚腸示之薛燭曰夫寳劒者金精從理至本不逆今魚膓倒本從末逆理之劒也服此者臣弑其君子弑其父王取純鈞示之薛燭矍然而望之曰光乎如屈陽之華沈沈如芙蓉始生於湘觀其文如列星之芒觀其光如水之溢塘觀其色渙如冰將釋見日之光此純鈞者也王曰是也客有買此劒者市之郷三十駿馬千疋千户之都二其可與乎薛燭曰不可臣聞王之􅀄造此劒赤董之山破而出錫􅀂耶之溪涸而出銅雨師灑道雷公發皷蛟龍捧爐天帝壯炭太一下觀於是歐冶子曰天地之精悉其􅇊巧造爲此劒吉者冝王凶者可以遺人凶者尚直萬金况純鈞者耶取湛盧薛燭曰善哉衘金鐵之英吐銀錫之精竒氣託靈有遊出之神服此劒者可以折衝伐敵人君有逆謀則去之他國允常乃以湛盧獻吴吴公子光殺吴王僚湛盧去如楚昭王寤而得之召風胡子問之此劒直㡬何對曰赤董之山巳合􅀂耶之溪深而不測群神}
