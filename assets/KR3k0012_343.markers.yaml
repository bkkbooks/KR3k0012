  - {type: variant, offset: 1056, length: 229, content: 地而王天下文王以百里之壤而臣諸侯今楚地方五千里持戟百萬此霸王之資也白起小豎子耳率數萬之眾興師以與楚戰一戰而舉鄢郢再戰而燒夷陵三戰而辱王之先人此百世之怨而趙之所羞而王弗知惡合從者為楚非為趙也吾君在前叱者何也諸侯乃定從又曰范睢傳云秦昭王臨朝歎息應侯進曰臣聞主憂臣辱主辱臣死今大王中朝而憂臣敢請其罪王曰吾聞楚之鐵劍利而倡優拙夫鐵劍利則士勇倡優拙則思慮遠夫以遠思慮而御勇士恐楚之圖秦也又曰李斯上書云今陛下服太阿之劍乘纖離之馬此數寶者秦不生一焉又曰陳平間行杖劍亡渡河舡, SBCK: 使}
