  - {type: variant, offset: 328, length: 467, content: 玉虞叔虞公之弟虞公求旃弗獻既而悔之曰周諺有之疋夫無罪懷壁其罪吾焉用此以賈害也乃獻之又求其寶劍叔曰是無厭無厭將及我遂伐虞故虞公出奔洪池洪池地名又曰莒子庚輿虐而好劍茍鑄劍必試諸人國人患之又將叛齊烏存帥國人以逐之烏存莒大夫也又曰吳公子光伏甲於掘室而享王掘地為室王使甲坐於道及其門門階戶席皆王親也夾之以鈹羞者獻體改服於門外進羞者獻體解衣也執羞者坐行而入執鈹者夾承之承執羞者也光偽足疾入法掘室恐難作王黨殺已豫避之也專諸寘劍魚中以進遂殺王又曰吳將伐齊越子率其眾以朝吳人皆喜唯子胥懼曰是豢吳也吳王聞之使賜之屬鏤以死屬鏤劍也又曰楚太子建為鄭人殺之其子勝在鄭晉人伐鄭楚救之與之盟勝怒曰鄭人在此讎不遠矣勝自厲劍子平見之曰王孫何以自厲也曰將以殺汝父也又曰宋殺申再楚子聞之劍及寢門之外怒也家語曰子路戎服見孔子拔劍舞之曰古之君子以劍自衛子曰古之君子忠以為質仁以為衛不出環堵之室而知千里之外有不善則以忠化之寇暴則以仁圉之何必持劍子路曰由乃得聞此言也請攝齊以受教又曰顏回曰願鑄劍戟為農器戰國策曰韓卒之劍皆出於冥山棠谿墨陽宛馮龍泉太阿皆陸斷馬牛水擊鴻鴈當敵於甲盾耳此, SBCK: 雄雌}
