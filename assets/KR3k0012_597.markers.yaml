  - {type: variant, offset: 1600, length: 1305, content: 稱者矣夫弔雖古義而華辭未造華過韻緩則化而為賦固宜正義以繩理昭德而塞違析割褒貶哀而有正則無奪倫矣左傳莊十一年白秋宋大水公使弔焉曰天作淫雨害於粢盛若之何不弔對曰孤實不敬天降之災又以為君憂拜命之辱臧文仲曰宋其興乎禹湯罪己其興也勃焉桀紂罪人其亡也忽焉且列國有凶稱孤禮也言懼而名禮其庶乎史記曰相如從上至長楊還過宜春宮奏賦以哀二世行失也其辭曰東馳工山兮北揭石瀨弭節容與兮歷弔二世持身不謹兮亡國失勢信讒不寤兮宗廟滅絕墳墓蕪穢而不修魂無歸而不食漢書曰揚雄怪屈原文過相如至不容作離騷自投江而死悲其文未嘗不流涕也君子遇不遇命也何必沉身哉迺作書往往撫離騷文而反之自岷山投諸江流以弔屈原名曰反騷禰衡別傳曰南陽寇柏松記劉景升當蹔小出屬守長胡政令給視之柏松父子宿與政不佳景升不在柏松子在後羅人盜跡胡政無狀便爾殺之景升還慚悼無已即治殺胡政為作三牲醊焉正平為作板書弔之時當行在焉上駐馬授筆倚柱而作之禰衡弔張衡其辭曰南岳有精君誕其姿清和有理君達其機故能下筆繡亂揚手文飛昔伊尹值湯呂尚遇旦嗟矣君生而獨植漢倉蠅爭飛鳳凰已散元龜可羈河龍可絆石堅而朽星華而滅唯道與隆悠悠永絕靡君音與浮河水有竭君聲永流周旦先沒發夢孔丘余生雖後身亦存遊士貴知己君其勿憂糜元弔比干曰余既詰紂之後又感比干亢辭進諫不顧其身而受刳屠之戮殺身之後紂不悔寤適足快凶君之心而無益於世故復責而弔之糜元弔夷齊曰少承洪烈從戎子王側聞先生餓於首陽敢不敬弔寄之山岡嗚呼哀哉夫五德更運天秩靡常如有絕代之主必有受命之王故堯終于虞舜禹殄於成湯且夏后氏之末祀亦殷氏之所亡若周武為有失則帝乙亦有傷子不棄殷而餓何獨背周而深藏所行誰路而子涉之首陽誰山而子匿之彼薇誰菜而子食之行周之道藏周之林讀周之書彈周之琴飲周之水食周之茶而謗周之主謂周之淫是誦聖之文聽聖之音居聖之世而異聖之心束晢弔蕭孟恩文曰東海蕭惠孟恩者父昔為御史與晢先君同僚孟恩及晢旦夕同遊分義早著孟恩夫婦皆亡門無立胤時有伯母從兄之憂未獲自往致文一篇以弔其魂并修薄奠其文曰舊友人陽平束晢謹請同業生李察奉腵脩一束麥糒一器以致詞于處士蕭生之墓曰嗚呼哀哉精爽遐登形骸幽匿有耶亡耶莫之能測敬薦薄饋魂兮來食孟恩孟恩豈猶我識束晢弔衛巨山曰元康元年楚王瑋矯詔舉兵害太保衛公及公四子三孫公世子黃門郎巨山與晢有交好時自本郡來赴其喪作弔文一篇以告其柩曰同志舊友陽平束晢頃聞飛虎肆暴竊矯皇制禍集于子宗枋幾滅越自冀方來赴來祭遙望子弟銘旌藂立既闚子庭其殯盈十徘徊感慟載號載泣歛袂升階子不我楫引袂授祛子不我執魂兮魂兮於焉栖集李充弔嵇中散曰先生挺邈世之風資高明之質神蕭蕭以宏遠志落落以遐逸忘尊榮於華堂括卑靜於蓬室寧漆園之逍遙安柱下之得一寄欣孤松取樂竹林尚想榮莊聊與抽簪味孫觴之濁醪鳴七弦之清琴慕義人於玄旨詠千載之徽音凌晨風而長嘯託歸流而永吟乃自足於丘壑孰有慍乎陸沉馬樂厚而翹足龜悅塗而曳尾疇廟堂之是榮豈和鈴之足視久先生之所期差玄達於遐旨尚遺大以出生何殉小而入死嗟乎先生逢時命之不丁冀後凋於歲寒遭繁霜而夏零滅皎皎之玉質絕琅琅之金聲投明珠以彈雀捐所重而為輕諒心不爽非大雅之所營袁宏友李氏弔嵇中散曰宣尼有言曰唯仁者能好人能惡人自非賢智之流不可以褒貶明德擬議英哲矣故彼嵇中散之為人可謂命世之傑矣, WYG: ''}
