  - {type: variant, offset: 1902, length: 613, content: 出屬守長胡政令給視之柏松父子宿與政不佳景升不在柏松子在後羅人盜跡胡政無狀便爾殺之景升還慚悼無已即治殺胡政為作三牲醊焉正平為作板書弔之時當行在焉上駐馬授筆倚柱而作之禰衡弔張衡其辭曰南岳有精君誕其姿清和有理君達其機故能下筆繡亂揚手文飛昔伊尹值湯呂尚遇旦嗟矣君生而獨植漢倉蠅爭飛鳳凰已散元龜可羈河龍可絆石堅而朽星華而滅唯道與隆悠悠永絕靡君音與浮河水有竭君聲永流周旦先沒發夢孔丘余生雖後身亦存遊士貴知己君其勿憂糜元弔比干曰余既詰紂之後又感比干亢辭進諫不顧其身而受刳屠之戮殺身之後紂不悔寤適足快凶君之心而無益於世故復責而弔之糜元弔夷齊曰少承洪烈從戎子王側聞先生餓於首陽敢不敬弔寄之山岡嗚呼哀哉夫五德更運天秩靡常如有絕代之主必有受命之王故堯終于虞舜禹殄於成湯且夏后氏之末祀亦殷氏之所亡若周武為有失則帝乙亦有傷子不棄殷而餓何獨背周而深藏所行誰路而子涉之首陽誰山而子匿之彼薇誰菜而子食之行周之道藏周之林讀周之書彈周之琴飲周之水食周之茶而謗周之主謂周之淫是誦聖之文聽聖之音居聖之世而異聖之心束晢弔蕭孟恩文曰東海蕭惠孟恩者父昔為御史與晢先君同僚孟恩及晢旦夕同遊分義早著孟恩夫婦皆亡門無立胤時有伯母從兄之憂未獲自往致文一篇以弔其魂并修薄奠其文曰舊友人陽平束晢謹請同業生李察奉腵脩一束麥糒一器以致詞于處士蕭生之墓曰嗚呼哀哉精爽遐登形骸幽匿有耶亡耶莫之能測敬薦薄饋魂兮來食孟恩孟恩豈猶我識束晢弔衛巨山曰元康元年楚王瑋矯詔舉兵害太保衛公及公四子三孫公世子, SBCK: ''}
