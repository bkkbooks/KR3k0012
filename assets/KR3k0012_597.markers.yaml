  - {type: variant, offset: 1255, length: 344, content: 遜亡祖何至與此人周旋又曰謝太傅問主簿陸退張憑何以作母誄陸荅曰故當是丈夫之德表於事行婦人之美非誄不顯弔文文心雕龍曰弔者至也詩云神之吊矣言神至也君子令終定謚事極理哀故賓之慰主亦以至到為言也壓溺乖道所以不弔矣又宋水鄭火行人奉辭國災人亡故同弔也及晉築虎臺齊襲燕城史趙蘇秦翻賀為弔害民構怨亦亡之道凡斯之例弔之所設也或驕貴以殞身或狷介以乖道或有志而無時或行美而兼累追而慰之並名為弔自賈誼浮湘發憤而弔屈體周而事覈辭清而理哀蓋首出之作也及相如之弔二世全為賦體桓譚以為其言惻愴讀者歎息及卒章意要切斷而能悲也揚雄序屈思積功寡意深文略故辭韻沈膇班彪蔡邕並敏於致詰然影附賈氏難為並驅耳故胡阮之弔夷齊褒喪而無文仲宣所製譏呵實工然則胡阮嘉其清王子傷其隘各其志也禰衡之弔平子縟麗而輕清陸機之弔魏武詞巧而文繁降斯已下未有, WYG: 蹔輟俄頃得七紙殊}
