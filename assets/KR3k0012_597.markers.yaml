  - {type: variant, offset: 2906, length: 835, content: 其德奇偉風韻劭邈有似明月之暎幽夜清風之過松林也若夫呂安者嵇子之良友也鍾會者天下之惡人也良友不可以不明明之而理全惡人不可以不拒拒之而道顯然夜光匪與魚目比暎三秀難與朝華爭榮故布鼓自嫌於雷門礫石有忌於琳琅矣嗟乎道之喪也雖智周萬物不能遣絕糧之困識達去留不能違顫沛之艱故存其心者不以一𤯝累懷檢乎跡者必以纖芥為事達人之獲譏懼高範之莫全凌清風以三歎予撫茲而悵焉聞先覺之高唱理極滯其必宣候千載之大聖期百五之明賢聊寄憤於斯章思慷慨男兒而泫然哀辭文章流別傳曰哀辭者誄之流也崔瑗蘇順馬融等為之率以施於童殤夭折不以壽終者建安中文帝臨菑侯各失稚子命徐幹劉禎等為之哀辭哀辭之體以哀痛為主緣以歎息之辭文心雕龍曰哀者依也悲實依心故曰哀也以辭遣哀蓋下流之悼故不在黃髮必施夭昏昔三良殉秦百夫莫贖事均夭枉黃鳥賦哀抑亦詩人之哀辭乎漢武封禪而霍嬗暴亡哀傷而作詩亦哀辭之類也降及後漢汝陽主亡崔瑗哀辭始變前式然腹穾鬼門怪而不辭駕龍乘雲僊而不哀又卒章五言頗似歌謠亦髣髴乎漢武也至於顯順張升並述哀文雖發其華而未極心實建安哀辭唯偉長差善行女篇時有惻怛及潘岳繼作實鍾其美觀其慮瞻辭變情洞悲苦敘事如傳結言摹詩促節四言鮮有緩句故能義直而文婉體舊而趣新金鹿澤蘭莫之或繼也原夫哀辭大體情主於痛傷而辭窮乎愛惜幼未成性故興言止於察惠弱不勝務故悼惜加乎容色隱心而結文則事愜觀文而屬心則體奢體奢為辭則雖麗不哀必使情往會悲文來引泣乃其貴耳班固馬仲都哀辭曰車騎將軍順文侯馬仲都明帝舅也從車駕於洛水浮橋馬驚入水溺死帝謂侍御史班固為馬上三十步哀辭南史曰劉孝綽三妹一適東海徐悱文尤清壯所謂劉三娘者也悱為晉安郡卒喪還建業妻為祭文詞甚悽愴悱父勉欲為哀辭見之乃閣筆三國典略曰齊文宣崩楊愔選其挽歌令樂署歌之其魏收四首陽休之祖珽劉逖各二首盧思道八首入用於是晉陽人謂思道為八采盧郎北營剌史李愔戲謂逖曰盧八問誶劉二逖每衘之至是愔上感思賦自陳文宣之世遭遇讒譖逖為帝奏其文誹謗先帝齊主怒令鞭之逖喜曰高搥三十熟鞭之百何如喚劉二時哀策文章流別傳論曰今所哀策者古誄之義世說曰, WYG: ''}
