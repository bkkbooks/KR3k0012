  - {type: variant, offset: 2607, length: 116, content: 我楫引袂授祛子不我執魂兮魂兮於焉栖集李充弔嵇中散曰先生挺邈世之風資高明之質神蕭蕭以宏遠志落落以遐逸忘尊榮於華堂括卑靜於蓬室寧漆園之逍遙安柱下之得一寄欣孤松取樂竹林尚想榮莊聊與抽簪味孫觴之濁醪鳴七弦之清琴慕義人於玄旨詠千載之徽音凌晨風, SBCK: 多脫復髙曵長縑虚張功捷尤}
