  - {type: variant, offset: 25, length: 6, content: 周禮春官下曰, WYG: 齊桓征楚詰菁茅之闕晉厲伐秦責箕郜之焚管仲吕相奉詞先路詳其意義即今之檄文暨乎戰國始稱為檄檄者皦也宣布於外皎然明白也張儀檄楚書以尺二明白之文或稱露布夫兵以定亂莫敢自專天子親戎則稱㳟行天罰諸侯禦師則云肅將王誅故分閫推轂奉詞伐罪非唯致果為毅亦且勵詞為武使聲如衡風所擊氣似欃槍所掃􅁬其武怒總其罪人乗其惡稔之時顯其貫盈之數揺姦宄之膽訂信慎之心使百尺之衝摧折於咫書萬雉之城顛墜於一檄者也觀隗􅅝之檄亡新布其三逆文不雕餙而詞切事明隴右文士得檄之體也陳琳之檄壯有骨鯁雖姦閹携養章宻}
