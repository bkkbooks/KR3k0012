  - {type: variant, offset: 1077, length: 737, content: 而武帝誄云尊靈永蟄明帝頌云聖體浮輕輕浮有似於蝴蝶永蟄頗擬於昆蟲施之尊極不其蚩乎南史宋謝莊作宣貴妃誄曰贊堯門方之漢釣弋也及廢帝即位下莊于獄曰卿作此誄時知有東宮否列女傳曰柳下惠死門下將誄之妻曰將述夫子德耶二三子不若妾之知之乃為誄曰夫子之信誠與人無害兮嗚呼哀哉魂神泄兮夫子之謚宜為惠兮門人從之世說曰孫長樂作王長史誄云余與夫子交非勢利心猶淡水同此玄昧孝伯見云才士不遜亡祖何至與此人周旋又曰謝太傅問主簿陸退張憑何以作母誄陸荅曰故當是丈夫之德表於事行婦人之美非誄不顯弔文文心雕龍曰弔者至也詩云神之吊矣言神至也君子令終定謚事極理哀故賓之慰主亦以至到為言也壓溺乖道所以不弔矣又宋水鄭火行人奉辭國災人亡故同弔也及晉築虎臺齊襲燕城史趙蘇秦翻賀為弔害民構怨亦亡之道凡斯之例弔之所設也或驕貴以殞身或狷介以乖道或有志而無時或行美而兼累追而慰之並名為弔自賈誼浮湘發憤而弔屈體周而事覈辭清而理哀蓋首出之作也及相如之弔二世全為賦體桓譚以為其言惻愴讀者歎息及卒章意要切斷而能悲也揚雄序屈思積功寡意深文略故辭韻沈膇班彪蔡邕並敏於致詰然影附賈氏難為並驅耳故胡阮之弔夷齊褒喪而無文仲宣所製譏呵實工然則胡阮嘉其清王子傷其隘各其志也禰衡之弔平子縟麗而輕清陸機之弔魏武詞巧而文繁降斯已下未有可稱者矣夫弔雖古義而華辭未造華過韻緩則化而為賦固宜正義以繩理昭德而塞違析割褒貶哀而有正則無奪倫矣左傳莊十一年白秋宋大水公使弔焉曰天作淫雨害於粢盛若之何不弔對曰孤實不敬天降之災又以為君憂拜命之辱臧文仲曰宋其興乎禹湯罪己其興也勃焉桀紂罪人其亡也忽焉且列國有凶稱孤禮也言懼而名禮其庶乎史記曰相如從上至長楊還過宜春宮奏賦以哀二世行失也其辭曰東馳工山兮北揭石瀨弭節容與兮歷弔二世持身不謹兮亡國失勢信讒不寤兮宗廟滅絕墳墓蕪穢而不修魂無歸而不食, SBCK: 後}
  - {type: variant, offset: 1077, length: 35, content: 而武帝誄云尊靈永蟄明帝頌云聖體浮輕輕浮有似於蝴蝶永蟄頗擬於昆蟲施之尊極, WYG: 後魏書曰邢巒從征漢北巒後至髙祖曰至此以來雖未擒㓕城隍已崩想在}
