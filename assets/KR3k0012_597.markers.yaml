  - {type: variant, offset: 395, length: 0, content: '', WYG: 之曰此實有之惜雄位微力弱不能救國之難王室如燬安用生為今日即戮得作忠鬼乃所願也敦憚其辭正釋之衆人皆賀雄笑曰昨夜夢乗車掛肉其傍夫肉必有筋筋者斤也車傍有斤吾其戮乎㝷而敦遣殺之當時見者無不傷惋又曰張軌為凉州刺史時晉昌張越凉州大族䜟言張氏覇凉自以才力應之越初為梁州刺史而志在涼州遂托病歸河西隂謀代軌乃遣兄鎮及曹袪麴佩移檄廢軌軌遣主簿奉表詣闕將歸老宜陽長史王融叅軍孟暢蹹折鎮檄排閣入諫軌黙然}
