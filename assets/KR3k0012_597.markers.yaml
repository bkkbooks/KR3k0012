  - {type: variant, offset: 654, length: 0, content: '', WYG: 移者易也移風易俗令徃而民隨者也相如之難蜀老文曉而喻博有移檄之骨焉及劉歆之移太常詞剛而義辨文移之首也陸機之移百官言簡而事顯武移之要者也故檄移為用事兼文武其在金革則逆黨用檄順命資移所以洗濯民心堅同符契意用小異而體義大同漢書曰劉歆字子駿成帝時與父尚俱領校書講六藝傳記後王莽篡位為京兆尹哀帝時與五經博士講論諸儒博士不肯置對歆因移書太常博士後漢書曰韓馥見民情歸袁紹忌其得衆恐將圖已嘗遺從事守紹門不聽發兵喬瑁乃詐為三公移書傳檄州郡說董卓罪惡企望義兵以釋國難馥於是方聼紹舉兵齊書曰孔稚珪字徳璋會稽人也}
