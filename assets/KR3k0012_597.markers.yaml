  - {type: variant, offset: 557, length: 3, content: 謝超宗, SBCK: 髙祖西討命中外府司馬李義深知相府城局李士略共作檄文二人皆辭請以孫搴自代髙祖引搴入帳自爲吹火催促之搴援筆立成其文甚羙髙祖大恱即署相府主簿專典文筆梁書曰元帝擒宋子仙及丁和送之江陵並下于獄子仙檄湘東曰旣瞎且尰尔勇伊何即書記沈烱之文也}
  - {type: variant, offset: 557, length: 2, content: 謝超, WYG: 髙祖西討命中外府司馬李義深知相府城局李士畧共作檄文二人皆辭請以孫搴自代髙祖引塞入帳自為吹火催促之搴援筆立成其文甚美髙祖大恱即署相府主簿専典文筆梁書曰元帝擒宋子仙及丁和送之江陵並下於獄子仙檄湘東曰既瞎且尰爾勇伊何即書記沈炯之文也有司焚燬湘東弗知僧辨購炯獲之酧錢十萬炯既不敢謁見惟謟事於僧辨自此軍書咸出於炯又曰王偉洛陽人也學通周易嘗在掲陽賦詩曰平明聼戰鼔薄暮叙存亡楚漢方龍闘秦關陣未央既至江陵繫之於獄以詩贈湘東嬖人曰趙壹能為賦鄒陽觧獻書何惜西江水不救轍中魚又上五十韻詩以希不死湘東愛其詞翰猶欲未誅左右嫉之乃曰偉前檄文言湘東不順湘東取視其檄云項羽重瞳尚有烏江之敗湘東二目寧為赤縣所歸湘東大怒釘其舌於柱剜其臍抽其腸出乃斬之陳書曰趙知禮渉獵文史善書翰武帝之討元景仲也或薦之引為記室知禮為文贍速每召製書下筆便就率皆稱㫖又曰顧野王愽識洽聞侯景之冦率鄉黨隨郡守舉兵赴援文檄皆以委之口占便就未嘗起草國朝傳記曰元萬頃初為李勣記室勣征遼東令作檄書云不知守鴨緑之險莫離支報曰謹聞命矣遂移兵固守官軍不得入萬頃坐流嶺南唐書曰李巨川為華州掌書記時李茂貞犯京師天子駐蹕於華韓建以一州之力供億萬乗恐其不濟遣巨川傳檄天下請助轉餉同匡王室完葺京城四方書檄酬報輻輳巨川灑翰陳叙文理俱愜昭}
