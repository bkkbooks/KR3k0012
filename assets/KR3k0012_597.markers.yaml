  - {type: variant, offset: 654, length: 0, content: '', SBCK: 移者易也移風易俗令徃而人隨者也相如之難蜀尤文曉而喻􅀶有檄移之骨焉詞剛而義辨文移之首也陸機之移百官言簡而事顯武移之要者也故檄移爲用事兼文武其在金革則逆黨用檄順衆資移所以洗濯民心堅明符契意用小異而體大同也漢書曰劉歆字子駿成帝時與父向俱領校書講六藝傳記後王莽簒位爲京兆尹哀帝時與五經􅀶士講論諸儒愽士不肯置對歆因移書太常􅀶士後漢書曰韓馥見民情歸􅀽紹忌方得衆恐將圖巳常遣從事守紹門不聽發兵橋􅈘乃詐爲三公移書傳驛州郡􅀃董卓罪惡企望義兵以釋國難馥於是方聽紹舉兵齊書曰孔稚珪字德璋㑹稽人也}
