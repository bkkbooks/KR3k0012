  - {type: variant, offset: 389, length: 2, content: 與美, SBCK: 張奉聞其名徃候之坐有頃府檄到當守令義攝檄持入白母喜甚事具孝門後漢書曰耿㳟爲戊巳校尉移檄烏孫示漢威德大昆弥己下皆喜遣使獻名馬又曰隗囂故宰府椽吏善爲文書每上移檄士大夫莫不諷誦魏書曰陳琳作檄草成呈太祖太祖先苦頭風是日疾發卧讀琳所作翕然而起曰此愈我疾病太祖平鄴謂陳琳曰君昔爲本􅀄作檄書但罪􅀌而巳何乃上及父祖乎琳謝曰矢在􅁌上不得不發太祖愛其才不咎又曰劉放善爲書檄三祖詔命有所招喻多放之所爲張華别傳曰駕西征鍾㑹次長安華兼中書侍郎從行掌軍中書䟽表檄文帝善之晉書曰易雄長沙人也爲㫪陵令刺史譙王承旣拒王敦將謀起兵以赴朝廷雄承符馳檄逺近列王敦罪西城䧟爲其所虜意氣慷􅁣神色無怍送到武昌敦遣人持檄示雄而數之雄曰此實有之惜雄位微力弱不能救國之難王室如燬安用生爲今日即戮得作惡􅀑乃所願也敦憚其辭正釋之衆人皆賀雄􅀏曰昨夜夢乗車掛肉其傍夫肉必有筋筋者斤也車傍有斤吾其戮乎㝷而敦遣殺之當時見者無不傷惋又曰張䡄爲涼州刺史時晋昌張越涼州大族䜟言張氏覇涼自以才力應之越􅀄爲梁州刺史而志在涼州遂託病歸河而隂謀伐䡄乃遣兄鎭及曹祛麴佩移檄廢䡄䡄遣主簿奉表詣闕將歸老冝}
