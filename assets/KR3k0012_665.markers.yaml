  - {type: variant, offset: 145, length: 379, content: 栖不定也又曰以丸藥和水而飲之又并抱草而臥則傷死於空室中謂之兵解又曰上品惟八素列紀受而不行餘皆白日尸解得為飛仙登真隱訣曰尸解者當死之時或刀兵水火痛楚之切不異世人也既死之後其神方得遷逝形不能去爾又曰董仲居淮南人也少時服氣鍊形年百餘歲不老常見誣繫獄尸解仙去又曰清平吉沛人也漢高祖時卒也至光武時故不老後尸解去真誥曰顧歡字玄平吳郡人齊永平中卒於剡山葬鹽官樂附里木連理生墓縣令江山圖表狀歡尸解而去又曰辛玄子字延期隴西定谷人好道行渡秦川長梁津致溺水解而去之又曰張祖常者彭城人吳時北來行入方山洞室中託形墮車隱化幽館而修守一之業又曰劉平河者無名字漢末為九江平河長行醫術有功德救人疾患如己之病行遇仙人周正時授以隱存之道居於方山洞室常服日月晨氣顏貌甚少後尸解而去又曰受大戒者死滅度鍊神上補天官謂之尸解又曰人死必視其形如生人視足不青皮不皺目光不毀者皆尸解也白日尸解自是仙也非尸解之例, SBCK: 宴太極}
