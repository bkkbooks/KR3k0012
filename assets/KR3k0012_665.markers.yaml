  - {type: variant, offset: 17, length: 0, content: '', SBCK: 解者以劒代身五百年之後此劒皆自然還其處諸以劒解者}
  - {type: variant, offset: 17, length: 0, content: '', WYG: 觧之劍非昆吾之流金也此太極真人紫陽公告王君也軒轅駕龍𤣥圃是歩綱之詞以術以觧化後乃行前真多有此例此劍經前章也太極上化符以飛精書紙盛以紫嚢欲去時以係劔鐶右以曲晨飛精書劍左面令至劍抄也又太極藏景符飛精書紙盛以絳嚢欲去時以係劍鞘右以曲晨飛精書劍右面令至劍抄也又太極籙形符以飛精書紙臨去之日服之身生七色之雲自有電光右以曲晨飛精書劍背正當兩刄之際也又太極化符恒日或一符七年去朱書竹中帛秘要也是合曲晨丹成臨欲觧化時以題劍七年以後朱題劍亦能觧化陶隠居曰晋永嘉中劉㦎呼麥功多竒識亦云是異人作此劍乃依佛符字殊細設婁羅鐶製大乖而法鑯甚快利宋來便恒供衛衛名曰劉㦎鈸與千年刀同寶久已易去鐶摩刻䖏亦漸漸欲㓕又見有四五故鐶並相似如一不知其劍身何在東山顧居士亦造此諸人有同時共製者今猶存焉大抵違謬不可具説乃有銅鑄作環以釘鑄著故刀如此並可以類推今此儀式惟是陶隠居所造深心匠觧亦謂理極未知必同大極模範不耳凢試刄之利鈍取中形芸数枚急束以一髪懸其秒繫于杖頭令一人執之乃以劍一斫芒㫁而髪猶連計芸多少為優劣劉㦎鈸千年刀皆舊斫十三芒又有一百鍊剛刀斫十三芒國中惟穪此為絶而近造神劍斫十五芒觀其鐡色青激光彩有異葢薛燭所謂澳如氷之将釋者矣頃來有作者十餘人皆不及此作剛朴是上虞謝平鑿鏤装治平聲是石尚方師黄文慶並是中國絶手以齊建武元年甲戌歳八月十九日辛酉造於茅山至梁天監四年乙酉歳勅令造刀劍形供御用窮極精巧竒䴡絶世别有製法時公家自作百鍊黄文慶因此得免餘役為山舘道士也周禮制劍長三尺柄居五寸是六分之一也内刄廣二寸半重古秤一觔四兩今秤二觔十兩也今公家劍長四尺七寸柄居一尺五寸是三分之一小减也刀廣一寸六分輕重不定此寳劍長三尺九寸廣一寸四分而經有刀劍兩名晋武帝大始十年中書監荀朂及張華等校定鍾律八音不與古樂相諧由漢來用尺漸長乃更依周禮積黍法制尺以量鑄新器募求古物得周世正玉律比之毫厘無差因擊古鍾以律命之亦此響合兼以七鍾右物相課皆㑹又得汲冢竹簡亦長二尺四寸於是施用謂之古尺阮咸聼茍樂聲以為過髙非興國之音咸亡後有人掘地得銅尺長荀古尺之四分半時人以阮咸之觧音遂復施行謂之官尺令司農相承以制五尺并取積寸以作㪷斛也宋元嘉中大将軍彭城王義康制物毎欲廣大又加官尺寸半民間復有相與用之者今謂之尚方御府都水材官用尺乃復長民間一分諸如衆例則以古尺為勝鍾律宫商自然響㑹是合精神𠖇數且周世有玉尺製劍之時兼荀張窮極精巧時又有束晢雷煥之徒妙貫神鬼阮咸雖善音樂而性度縱誕}
