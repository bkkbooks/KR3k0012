  - {type: punctuation, offset: 12, content: 「, id: KR3k0012_CHANT_665-bkkpn4}
  - {type: variant, offset: 14, length: 0, content: '', SBCK: 則能遊宴太極採五星}
  - {type: page-break, offset: 14, content: '', id: KR3k0012_SBCK_665-1b}
  - {type: variant, offset: 14, length: 0, content: '', krp: 則能遊宴太極採五星}
  - {type: variant, offset: 15, length: 1, content: 道, SBCK: 靈軌煥七元之威光以儀烈映眞氣故軒轅喬山之葬劒舄在焉王子渤海之家劒鳴空槨王喬有京陵之墓劒飛冲霄斯實眞驗九􅀇精應太靈神方靈致威劒之妙化也諸以劒}
  - {type: variant, offset: 15, length: 0, content: '', WYG: 上品也夫尸觧之法多如蟬蜕今此劍非蛻也故云上品明變遁之髙}
  - {type: variant, offset: 15, length: 1, content: 道, krp: 靈軌煥七元之威光以儀烈映眞氣故軒轅喬山之葬劒舄在焉王子渤海之家劒鳴空槨王喬有京陵之墓劒飛冲霄斯實眞驗九玄精應太靈神方靈致威劒之妙化也諸以劒}
  - {type: punctuation, offset: 16, content: ，, id: KR3k0012_CHANT_665-bkkpn5}
  - {type: 'tls:seg', offset: 16, content: '', id: KR3k0012_CHANT_665-1a.5}
  - {type: variant, offset: 16, length: 0, content: '', WYG: 也營造劍之時先齋戒百日乃於幽隠䖏近清泉立西向屋作竈口亦西向善鍜人鍊好鉄生鋌合鍊成令得八觔為足也若欲窮其精理當用竹炭又以銅錫柔沃如此用歳月功夫殊多所以古人作劍三年然後成也薛燭云歐冶鑄劍赤水之上破而出錫若耶之洞溪常出銅今以此合燒則煉多而不燥剛利而銷其鍜人亦湏温良新衣沐浴造劍之日尤不得飲酒食肉及逰履淹穢七月庚申日八月辛酉日使長三尺九寸廣一寸四分厚三分半謂背脊上近柄間令厚三分半也至兩刅際可减一二厘耳又向刃邉先殺背二分乃自兩至抄亦以漸令薄也抄九寸為左右兩䖏當從鐶項定度整三尺刻背為刄亦廣三分八厘必使中脊餘六分也抄九分合殺兩邉令尖殺抄鋒令有兩稜如㦸抄殺鋒也其柄用長短適令鐶髙二寸四分身長二寸四分則餘一尺二寸六分以柄為鉄因當中央令廣九分厚二寸與鐶相連柄操梓材近籙圍四寸九分刃圍三寸九分皆以釦竟為正若作劍装則促扁於此也劍頭可安籙鐶謂發始鍊剛仍使鐶身相連勿别作模合作釘連之都使外形大小厚薄相似乃鑿除應空之内亦可先鑚作數孔鑿為易其伏基䖏鑿鏝之都畢令大環髙二寸四分横分廣䖏對中徑二寸八分内方員徑四分鐶形古今多法或正圓或狹長或如鼎耳乃有十許種今此經中所圗亦是􅂋其左右法耳非正定形也謹准製古今取其合度立圗如左又鐶之内不得正圓如竹亦不得正方如界盡當令内靣小方而外落稜角必令得刻已刃字不甚邪轉佳使長三尺九寸耳尺寸度數厚薄形制並備如别圗尋古今尺長短不同九章筭法皆積毫釐之度晋中書監荀朂善音律伎藝常恨八音不調後有人掘地得一玉尺銘題周世短晋尺四分半以改定音律聲韻合度今冝用此尺為准所以示者惣真桐柏並以周時作劍用周尺也籙鐶者鏤刻劍鐶止左右面刻之作刄字面有九字也鐶背上刻作九已字也深刻字皆從刀背而下順刄謂兩邉刀及字已皆對從刄背邉起俱下就刄故曰順刄也順鐶而刻之隨鐶曲轉故曰順鐶也諸刻䖏欲得以金銀間之益分眀佳也劍身刻象鐶中央復有竪起如小羊鐶者名之曰伏基之義謂為日月之基隠秋光景也内鐶左面為日字内鐶者即小鐶之中伏基也刻右面為月字先又圓刻日月之外為郭也五百年還出以揮五嶽入以藏無間謂潜靈遁迹隠影藏形也下以制九隂謂可攝召九隂之神也上以承𤣥冥星主隠變也衛足以逐邪魔威足以鑒七情謂控威乗勢鑒照七星也仰以映五色謂五行之氣常栖映也俯以代身化行矣欲知劍之左右内外以見正指南使劍背在上使劍刄在下也於是以東東面右西面為左也東為内面西為外面此劍尺度長短廣狹厚薄刻鏤文字乃太極四真人靈劍之模範也上清真人亦皆帶劍上清之劍並是太極所造耳故此經為太極之法乃四真人定範何必須昆吾之金剛玉之鋌也此葢明不必湏精鉄所存者模範而已王子喬劍乃凢下之鉄耳喬山}
