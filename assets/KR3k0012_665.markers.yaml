  - {type: variant, offset: 1007, length: 220, content: 十里而終形狀如生又曰若六行未通宿植尚少則入中品以為尸解遁變也降此以下是正服御功行淺劣則入階下階勝者則滅度更生更生之後修道隨功多少方始得道太上太霄琅書曰修學上法時入山林服餌靈藥因緣應過雖復尸解和光世禮與世大異者不棺不槨拂山平之上掃深樹之下單衾覆於地太上太真科曰若祠祀先人應知歸否者有功德升度得道子孫仁孝則化形來遊歆所設也亦尸解之類金闕聖君傳曰靈書紫文者或曰五老寶經有之者尸解行之者成道東海青童傳曰保洞觀經曰雲靈上玄品有之者白日尸解抱朴子曰道林, SBCK: 符}
