  - {type: variant, offset: 570, length: 232, content: 際去者謂之地下主者也瓊文四紀篇曰得九真中經者白日尸解或曰飛行羽經輕也又六紀篇曰靈書紫芝或五老者寶經有之者尸解神仙傳曰介象字元則會稽人也吳先主甚重之常謂曰介君象速求去先主不聽象言病先主使左右賜美棃一奩須臾象死解去又曰紫清上宮九華安祀謂楊君曰可尋解劍之道作吉終之術自盡出嘿之會隱顯之跡又曰葛玄字孝先從左慈受九丹金液經常餌朮語弟子張奉曰當尸解去八月十二日時當發至期玄衣冠而臥無氣而色不變尸解而去又曰壺公謝元歷陽人也費長房師之及道士李意期將兩弟子去積年長房及兩弟子皆隱變解, SBCK: ''}
