  - {type: variant, offset: 19, length: 1, content: 俱, WYG: 清切故以单綬為好耳掘地銅尺應是後漢時尺也梁天監四年又更校尺以調正鍾律定用張荀古尺半分於事合𠂻今施用名曰法尺又曰若欲潜遁名山隨時觀化不願真官隠浪自足者當脩劍尸觧之道以曲晨飛精書劍左右面先逆自托疾然後當抱劍而卧也謂先偽稱疾􅆍卧數日乃密脱劍青嚢㧞出題書及繫符都畢於是抱之而視湏天馬迎至觧衣而遊勿令人知覺也又以飛精藥密拭劍鐶呼劍名字祝畢勿見太一以天馬來迎於寝卧之前於前上馬若女子則以輜軿來迎古來諸仙多有托以他物或用竹杖或巾履惟鮑靚見太清刀法此}
