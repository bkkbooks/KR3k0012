  - {type: variant, offset: 83, length: 0, content: '', SBCK: 得正方如界尺當令内面小方而外落稜角必令得刻己刃字不甚邪轉惟使長三尺九寸耳尺寸度數厚薄形制並備如別圗尋古今尺長短不同九章筭法皆積毫􅁵之度晉中書監荀勗善音律伎藝常恨八音不調後有人掘地得一玉律銘題周世短晉尺四分半以改定音律聲韻合度今冝用此尺爲准所以尔者揔眞桐柏並以周時作劒用周尺也籙鐶者鏤刻劒鐶鐶左右面刻之作刃字面有九刃字也鐶背上刻作九已字也深刻字皆從刃背而下順刃謂兩邊刃及已字皆對從刃皆邊起俱下就刃故曰順刃也順環而刻之隨鐶曲轉故曰順鐶也謂刻處得以金銀閒之益分明佳也劒身刻象鐶中央復有竪起如小手鐶者名之曰伏基伏基之義謂爲日月之基隱秋光景也内鐶左面爲日字内鐶者卽小環之中伏基也刻右面爲月字先又圎刻日月之外爲郭也五百年還出以揮五岳入以藏無閒謂濳靈遁迹隱影藏形也下以制九陰謂可以攝召九陰之神也上以承􅀇冥謂北斗􅀇冥星主隱變也衛足以逐邪魔威足以鑒七精謂控威秉􅀔鑒照七星也仰以映五氣謂五行之氣常栖映也俯以代身化形矣欲知劒之左右内外以劒正指南使劒背在上使劒刃在下也於是以東面爲右西面爲左東爲内面西爲外面此劒尺度長短廣狹厚薄刻鏤文字乃太極四眞人靈劒之模範也上淸眞人亦皆帶劒上淸之劒並是太極所造耳故此經爲太極之法乃四眞人定範何必須昆吾之金割玉之鋌耶此蓋明不必須精鐵所存者模範而已王子喬劒乃凡下之鐵耳喬山尸解之劍非昆吾之流金也此太極眞人紫陽公詞以告王君也軒轅駕龍􅀇圃是步綱之術爲解化後乃行前眞多有此例此劒經前章也太極上化符以飛精書􅁓盛以紫囊欲去時以係劒鐶右以曲晨飛精書劒左面令至劒抄也又太極藏景符飛精書紙盛以絳囊欲去時以係劒鞘右以曲晨飛精書劒右面令至劒杪也又太極籙形符以飛精書紙臨去之日服之身生七色之雲自有電光右以曲晨飛精書劒背令皆兩刃之際也又太極解化符􅁪日服一符七年化去朱書竹中帛祕要也是合曲晨丹成臨欲解化時以題劒七年以後朱題劒亦能解化陶隱居曰晉永嘉中劉㦎呼麥切多奇識亦云是異人作此劒乃方佛符字殊細設婁羅鐶日大乘法而䥫甚快利宋來便􅁪供御衛名曰劉㦎鈸尚千牛刀同寶女巳易去鐶麾刻處亦漸漸欲滅又見有四五故鐶並相似如一不知其剱身何在東山顧居上亦造此劒諸人有同時共製者今猶存焉大抵違謬不可具說乃有銅鑄作鐶以釘鑄着故刀如此並可以􅀋推今此儀式惟是陶隱居所匠深搆心解亦謂理極未知必同太極模範不耳凡試刃之利鈍取中形芒數枚急束以一髮懸其抄繫於杖頭令一人執之乃以刃一斫芒斷而髮猶連計芒多少爲優劣劉㦎鈸千牛刀皆舊斫十三芒又有一百鍊剛刀斫十二芒國中惟稱此爲絶而近造神劒斫十五芒觀其鐵色青激光采有異蓋薛燭所謂渙如冰之將釋者矣頃來有作者十餘人皆不及此作剛朴是上虞謝平鑿鏤裝怡平聲是石尚方師黃文慶並是中國絕手以齊建武元年甲戌歲八月十九日辛酉建於茅山造至梁天監四年乙酉歲勑令造刃劒形供御用窮極精功奇麗絶世別有橫法剛公家自作百鍊黃文慶因此得免隷役爲山館道士也周禮制劒長三尺柄居五寸是六分之一也内刃廣二寸半重古秤一斤四兩今秤三斤十兩也今公家劒長四尺七寸柄居一尺五寸是三分之一小減也刃廣一寸六分}
