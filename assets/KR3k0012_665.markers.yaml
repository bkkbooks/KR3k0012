  - {type: variant, offset: 803, length: 5, content: 又曰鮑靚字, SBCK: 遁乎}
  - {type: variant, offset: 803, length: 746, content: 又曰鮑靚字太玄琅邪人晉明帝時人葛洪妻父陰君授其尸解法一說云靚上黨人漢司隸鮑宣之後修身養性年過七十而解去有徐寧者師事靚寧夜聞靚室有琴聲而問焉荅曰嵇叔夜昔示跡東市而寶兵解耳晉中興書曰葛洪赴岣嶁令行至廣州其剌史鄧岱留不聽去洪乃止羅浮山中鍊丹積年忽與岱書當遠行尋藥岱得書徑往別而洪已亡年八十一顏色如平生入棺輕如空衣尸解而去道學傳曰吳猛字雲世有道術庾亮聞其神異厚禮迎之來武昌尋求歸辭以筭盡請具棺庾公閔然即日發遣未達家五十里而終形狀如生又曰若六行未通宿植尚少則入中品以為尸解遁變也降此以下是正服御功行淺劣則入階下階勝者則滅度更生更生之後修道隨功多少方始得道太上太霄琅書曰修學上法時入山林服餌靈藥因緣應過雖復尸解和光世禮與世大異者不棺不槨拂山平之上掃深樹之下單衾覆於地太上太真科曰若祠祀先人應知歸否者有功德升度得道子孫仁孝則化形來遊歆所設也亦尸解之類金闕聖君傳曰靈書紫文者或曰五老寶經有之者尸解行之者成道東海青童傳曰保洞觀經曰雲靈上玄品有之者白日尸解抱朴子曰道林中有五種尸解符今太玄陰生符及是一病解者列仙傳曰甯封黃帝時為陶正以火自燒而隨煙上下真誥云甯生服石腦而火則是作火解也又曰司馬季主漢文帝時人受西靈子都劍解之道在委羽山大有宮服明丹之華抱扶晨之暉皃如女子鬚長三尺一男名法育一女名濟華同得道真訣云季主服靈散潛升猶首足異處此語似作劍兵解法兵解則不得在太極而其女尚讀洞經便是別修高法也守玄白術隱居太茅山東守玄白能隱形亦數見身介琰者白羊公弟子也今在建安方山琰初為孫權所殺解化而去又曰愕綠華者女仙也顏整晉穆帝昇平三年己未十一月十日降於羊權家自云南山人權字道學即晉簡文時黃門侍郎羊欣之祖也權及欣皆潛修道要躭玄味真綠華云凡修道之士視爵位如過客視金玉如瓦礫則得長生因授權尸解法亦隱景化去又曰中侯王夫人於兄子晉處受飛解脫網, WYG: ''}
