  - {type: variant, offset: 5, length: 0, content: '', SBCK: 太極眞人石精金光藏景録形神經曰制劒之法上宰惣眞}
  - {type: variant, offset: 5, length: 0, content: '', krp: 太極眞人石精金光藏景録形神經曰制劒之法上宰惣眞}
  - {type: variant, offset: 7, length: 0, content: '', WYG: 玉君昔授於紫陽公施行道成惣真昔用劍觧之道又授九轉丹方於里長先生此即周人也東鄉序云潄龍胎而死宜服瓊英先師}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_WYG_665-1b, image: WYG0899/WYG0899-0008d.png}
  - {type: variant, offset: 8, length: 1, content: 真, SBCK: 君昔授之於紫陽公施行道成揔眞昔用劒解之道又授九轉丹方於長里先生此即周人也東鄕序云漱龍胎而死決服瓊英先師王西城此是飲丹後用劒解而不言服九轉者當是雖授而不遂合用後以付門弟子茅君亦是受而不用故云付耳茅君傳南岳魏夫}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 西城本是飲丹後用劍觧而不言服九轉者當是雖授而不遂合用後以付門弟子茅君亦是受而不用故云付耳茅君傳南嶽魏夫人夫人傳楊君故安妃云可尋劍解之道但不知遂用不耳許長史既服腴石或當不必為其事椽從鎮南夜觧則又非此法椽許長史子也若是太清觧及单用劍者應不得及望故鄉而椽遊䖏方臺還居本邦也神劍用之而觧化則能遊宴太極採五星之靈䡄煥七元之威光以範儀烈映真氣故軒轅喬山之𦵏劍舄在焉王子渤海之冢劍鳴空槨王喬景陵之墓劍飛冲霄斯實真騐九𤣥精應太靈神方靈致威劍之妙化也諸以尸觧者以劍代身五百年之後此劍皆自然還其䖏以劍觧者不必止是用丹書空劍亦可幽響無聞恍惚難尋不可得言矣不可得言之法見之者惟當應之於心耳神竒歘怳變動無方非復物理所期正當恩心任化即事從冝耳為之者亦不覺其所以見之者固莫測其所然軒轅採首山之銅以鑄鼎虎豹百禽為之視火恭鑪鼎而軒轅疾崩塟喬山五百年後山崩寳劍赤舄在焉一旦又失王子者曽詣鍾山獲九化十變經以隠遁日月逰行星辰後一旦疾終營冢渤海山夏襄時有發王子墓者一劍在北􅆍上自作龍鳴人無敢近後亦失所之王子喬墓在景陵戰國時復有發其墓者見一劍人適欲取視其劍忽然上飛去王子喬事舊説浮丘公携與乗鶴共登嵩山此事不同觧化時年正十五六耳故戴逺逰冠也昔葛洪云隂君授鮑靚尸觧之法後死埋石子崗有人發其棺見一大刀塚左右有人馬之聲遂不敢取此是觧劍法而不能飛去此是周靈寳太𤣥隂生符朱書刀矣太清之下故得主者而已按玉清靈傳説惣真帶劍楊君説同柏帶劍此並應是先觧劍化也}
