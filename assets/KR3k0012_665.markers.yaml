  - {type: variant, offset: 8, length: 1, content: 真, krp: 君昔授之於紫陽公施行道成揔眞昔用劒解之道又授九轉丹方於長里先生此即周人也東鄕序云漱龍胎而死決服瓊英先師王西城此是飲丹後用劒解而不言服九轉者當是雖授而不遂合用後以付門弟子茅君亦是受而不用故云付耳茅君傳南岳魏夫}
  - {type: variant, offset: 10, length: 3, content: 傳曰解, WYG: 用寳劍以尸觧蝉}
  - {type: punctuation, offset: 11, content: 》, id: KR3k0012_CHANT_665-bkkpn2}
  - {type: variant, offset: 11, length: 1, content: 曰, SBCK: 楊君故安妃云可尋劒解之道但不知遂用不耳許長史旣服􅃾石或當不必爲其事􅁺從鎭南夜解則又非此法􅁺許長史子也若是太淸解及單用劒者應不得反望故鄉而􅁺遊處方臺還本居􅀖也神劒用之而}
  - {type: variant, offset: 11, length: 1, content: 曰, krp: 楊君故安妃云可尋劒解之道但不知遂用不耳許長史旣服腴石或當不必爲其事掾從鎭南夜解則又非此法掾許長史子也若是太淸解及單用劒者應不得反望故鄉而掾遊處方臺還本居邦也神劒用之而}
  - {type: punctuation, offset: 12, content: ：, id: KR3k0012_CHANT_665-bkkpn3}
