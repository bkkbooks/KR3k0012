  - {type: variant, offset: 1721, length: 715, content: 劫會之數度學者之身玄都有此經佩之得為聖上朝太清功德未滿即得田解又曰社契字廣平京兆人建安初來江東依孫策後遇介琰先生授之以稱異人再拜奉其香火少女乃教其朝天帝王皇之法尸解而去隱存方臺老君傳九真五石並日暫入太陰權過三官者始得上解之法又曰紫陽公傳西城劍解之法修佩神劍七年朱書符解化去若以曲晨飛精題之者立能變遁隱化太一遣吉光寶衣來迎又曰王遠字方平見蔡經骨相當尸解且告以要言方平冠遠遊冠朱衣虎頭鞶囊五色綬帶劍黃色少髭長短中人也乘羽車駕五龍異色綬帶前後麾節幡旗自天而下須臾引見經父兄因遣之召麻姑姑報先被詔按行蓬萊今便往願還來即去如此兩時聞麻姑來先聞人馬聲從官當半於遠姑至經舉家亦見之是好年才如笄於頂上作髻餘髮散垂至腰衣有文彩又非錦繡光彩曜日不可名狀皆世所無也入拜遠遠為之起立各進行廚脯行云是麟脯遠去經父母怪私問經經曰王君常在崑崙山往來羅浮等山山上有宮室王君出唯乘一黃麟十數侍者每行山海神皆奉迎拜謁也遠有書與陳尉其書廊落大而不正先是無人知方平名遠用此知之陳存錄王君手書於小箱中也經後尸解而去又曰張微子漢昭帝時將作大匠張慶女也微子好道得尸解又曰蘇子訓者齊人也人莫知其有道在鄉里行信讓積年顏色不老人追隨之不見所常服餌好清談常閑居讀易為文皆有意義京師貴人聞之莫不虛心謁見不可致之後至適出門諸貴人冠蓋塞路諸生具言適去矣東陌上乘驢者是也各奔馬逐之不及子訓至陳公家言曰吾明日當去不復還也陳公以葛布單衣一送之至時子訓死解化仙去又曰陰長生新野人也後漢戚里專務道術聞馬明生得度世之道乃造焉明生但日夕別與之高談論語當世之事治田農之業如此十餘年長生不懈同事明生者十二人皆悉歸唯長生彌肅明生曰子真得道矣乃將入青城山以太清神丹經授之丹成仙去著書九篇云上古仙者多矣伹漢興以來四, SBCK: ''}
