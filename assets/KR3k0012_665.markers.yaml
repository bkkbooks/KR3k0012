  - {type: variant, offset: 70, length: 0, content: '', SBCK: 處近淸泉立西向屋作竈口亦西向善鍜人鍊好鐵生鋌合鍊成令得八斤爲足也若欲窮其精理當用竹炭又以銅錫柔澳如此用歲月功夫殊多所以古人作劒三年然後成也薛燭云甌冶鑄劒赤鍾之山破而出錫若耶之溪涸而出銅今以此合燒則煉多而不燥剛利而銷其鍜人亦須温良新衣沐浴造劒之日尢不得飲酒食肉及遊履淹穢用七月庚申日八月辛酉日使長三尺九寸廣一寸四分厚三分半謂背脊上近柄閒令厚三分半也至兩刃際可減一二􅁵耳又向刃邊先殺背二分乃立刃至杪亦以漸令簿也杪九寸爲左右刃處當從鐶項定度整三尺刻背爲刃亦廣三分八􅁵必使中脊餘六分也杪九分合殺兩邊令尖殺杪鋒令有兩稜如戟杪殺鋒也其柄用長短}
