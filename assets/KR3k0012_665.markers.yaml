  - {type: variant, offset: 84, length: 0, content: '', SBCK: 重不定此寶劒長三尺九寸廣一寸四分而經有刀劒兩名晉武帝大始十年中書監荀勗及張華等校定鍾律八音不與古樂相諧由漢來用尺漸長乃更依周禮積黍法制尺以量鑄新器募求古物得周世正玉律比之毫􅁵無差因擊古鍾以律命之亦皆響合兼以七種古物相課皆㑹又得汲冢竹􅂤亦長二尺四寸於是施用謂之古尺阮咸聽荀樂聲以爲髙功非興國之音咸亡後有人掘地得銅尺長荀尺古尺之四分半時人以阮咸之解音遂復施行謂之官尺令司農相承以制五尺并取積寸以作㪷斛也宗元嘉中大將軍彭城王義康製物每欲廣大又加官尺寸半民閒復有相與用之至今謂之爲尚方御府都水材官用尺乃復長民一分推如衆例則以古尺爲勝鍾律宫商自然嚮㑹是合神精冥數且周世又二眞製劒之時兼荀張窮極精功時又有束晳雷煥之徒妙貫神􅀑阮咸雖善音樂而性度縱誕不能淸切故以單緩爲好耳掘地銅尺猶應是後漢時物也梁天監四年又更校尺以調正鍾律定用張荀古尺半分於事合衷今施用名曰法尺又曰若欲濳遁名山隨時觀化不願眞官隱浪自足者當修劒尸解之道以曲晨飛精書劒左右面先逆自託疾然後當抱劒而臥也謂先僞稱疾寢卧數日乃密脫劒靑囊拔出題書及繫符都畢於是抱之而祝須天馬迎至解衣而遊勿令人知􅁴也又以飛精藥密拭劒鐶呼劒名字祝畢忽見太一以天馬來迎於寢卧之前於是上馬若女子則以輜軿來迎古來諸仙多有託以餘物或用竹杖或巾屨惟鮑靚用太淸刀法此神變欻怳假􅀋㑹形不可以理趣相求眞奇事矣天馬者吉光騰黃之獸也古畫圗有此獸形皆昔眞人所顯相傳示也吉光似鹿騰黃􅀋馬男則單騎女則駕軿也太極眞人命太一使者賫馬執控并迎以寶衣欻忽而來不知所以然也太一主仙變也馬去之時雖衆醫侍疾子孫滿側則我易服束劒流景變跡而不覺我之云爲}
