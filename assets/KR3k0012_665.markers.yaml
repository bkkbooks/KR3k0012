  - {type: variant, offset: 2438, length: 1485, content: 人連余為六矣三十人尸解餘並白日仙去陰君自序曰漢延光元年新野山北之子受仙君神丹要訣道成去世付之名山於是陰君裂黃素舄丹經一通函以文石置嵩高山一通黃櫨簡漆書之函以青玉置太華山一通黃金之簡刻而書之函以白銀著蜀經山一封縑書合為一篇付弟子使世世當有所傳付又著詩三篇以示將來也又曰成仙公名武丁桂陽人也後漢時為縣小吏少言大度博通經學不從師授有自然之性時先被使京還過長沙郡投郵舍不及遂宿於野忽聞樹上人語云向長沙市藥平旦視之乃二白鶴仙公異之遂往市見二人張白蓋相從而行謂仙公曰君當得地仙耳令還仙公病卒尸解又曰龍伯高者後漢伏波將軍馬援戒其兄子稱此人之美可法者也伯高後從仙人刁道林受服胎氣之法又受服青䭀方醉亡隱處方臺師定籙君伯高名述京兆人漢建武中為仙都長至零陵太守馬援戒兄子嚴書曰龍伯高敦厚周慎口無擇言謙約節儉公廉有威吾愛之重之願汝曹効之又曰漢期門郎程偉妻得道者也能通變化偉逼求術妻不傳逼之不已妻蹶然而死尸解而去南岳魏夫人內傳曰清虛真人王子登與東華青童君來降授夫人曰隱遷白翳神散一劑又與白石精金化形靈丸使頓服之稱疾勿行剋期有定俱會丹壠之南陽洛山陽洛宮言畢二真人去即服藥因稱腳疾閉目寢息飲而不食夜半之後太一玄仙遣颷車來迎駕氣騁御徑入帷中其時弟子侍疾眾親滿側莫之覺也陽洛山昔夏禹巡諸名山刻石於此下有洞臺神仙學者萬餘人又曰王晉賢晉王夷甫女也為愍懷太子妃洛城亂劉曜略晉賢欲妻之晉賢大罵曰我皇太子婦司徒公之女胡羗小醜敢欲干我乎言畢投河其侍婢名六出投河死時遇嵩高女真韓西華出遊遂俱猶內救外示其死體實密濟將入嵩高山今華陽內洞中六出年二十餘體貌脩整有節操姓田漁陽人魏故浚儀令田諷之孫諷有陰德以及六出耳又曰董奉字君異候宮人也吳先主時有少年為奉本縣長見奉年四十餘不知有道罷官去後五十餘年復見他職行經候官諸故吏人皆往見之奉顏皃一如往日奉居山不種田為人治病亦不取錢愈者使裁五株杏數年計十餘萬株令人將穀一器自往取杏一器貨杏得穀賑救貧乏供給行旅不逮者歲二萬餘斛乃尸解去裴君曰尸解之仙不得御華蓋乘飛龍登太極遊九宮也諸有單用曲晨飛精劍解者得八素列紀惟奉寶祕不修行皆白日尸解其有作水火兵病及用大刀竹杖解去者先詣名山並為太清尸解凡修劍解之道並紀名紫簡上隸高仙諸有宿功善業陰德信仙其神得詣朱火丹陵宮受學仙道為九宮真人諸有用大極尸解之道夜半去者職為地真應尸解者或學功淺深志尚頹廢或為祭酒精勒救治者並得為三十六洞天文解地下主者一百四十年一轉武解鬼師二百八十年一轉凡有三等乃得進補仙職九天生神章經曰夫學上道希慕神仙及得尸解者終歸仙道神化則同不相逢雜俱入人道真明真科曰生世好道精功布德名書上清者得尸解下仙遊行五岳後生人中更受經法為人宗師太微經曰諸尸解者按四極真科云一百四十年乃得神中真官於是始得飛華蓋乘輦龍登太極遊九宮也雌一五老經曰夫仙之去世也或絕跡藏往而內栖事外或解劍遣杖飄然雲霧延神寄玄莫知其端緒也又曰若有此五老經雖不齋戒存思與俗混雜故不失隱存下神白日尸解及命過大陰地下主者或遺骨胎變受化南宮是必宿有骨緣也上清經曰元始天帝以上清變化七十四方解形之道授南極元君太清真人內傳及名山記曰羅浮山洞周五百里在會稽南行三十里其山絕高葛洪解化處真誥謂之增城山集仙錄曰張天師道陵隱龍虎山修三元默朝之道得黃帝龍虎中丹之術丹成服之能分形散景天師白鄱陽人嵩高山得隱書制命之術又曰周爰友者汝南安城人也漢河南尹周暢女也暢平生多陰德爰友小好道餌伏苓四十年後遇石先生教其遁化及隱景之道解形而去又曰唐廬眉娘者生而眉綠性機巧南海太守進至闕順宗嘆其在宮內謂之神姑但食胡麻飯一三合至元和中憲宗嘉其聰惠因賜金鳳環以束其腕久之不願在宮掖乃度為女道士放歸南海賜號逍遙數年不食尸解化去, SBCK: ''}
