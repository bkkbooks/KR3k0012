  - {type: variant, offset: 31, length: 1, content: 故, SBCK: 去謂宦者曰速召花奴將羯皷來爲我解穢黄幡綽亦知音者上甞使人召之不時至上怒絡驛使尋捕之旣至及殿側聞上理皷固止謁者不令報俄頃上又問侍官奴來未曲罷改奏􅂊三數十聲綽即入上謂曰頼稍遲我向來怒意至必撾焉適方思之長入供奉巳五十餘日暫一日出外不可不許他東西過徃綽拜謝畢内官有偶而􅀏者上詰之具言綽尋至聽皷而候其時入上問之綽語其方及解怒之際皆無􅆧悟上竒之復厲聲}
