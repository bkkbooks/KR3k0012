  - {type: variant, offset: 14, length: 0, content: '', WYG: 起長三尺五寸法天地與五行也四絃象四時也以手琵琶之者因以為名語林曰謝鎮西著紫羅襦據胡床在大市佛圖門樓上弹琵琶作大道曲異苑曰南平國兵在姑蘇有鬼附之毎占吉凶輒索琵琶随彈而言事事有驗云是老鼠所作名靈侯王保言期䧏幕祠儀曰琵琶出於絃鞉笙簧基於絲竹竹林七賢傳曰阮咸善琵琶荀朂雅解音律自以逺不及也文士傳曰孔輝善弹琵琶呉歸命恒使為樂孫放别傳曰君性好音能操琴及琵琶以自散傅𤣥琵琶賦序曰聞之故老云漢遣烏孫公主念其行道思慕使二知音者載琴筝筑箜篌之屬作馬上之樂觀其器盤圓柄直隂陽之序也四絃法四時也以方語目之故云琵琶也取易傳於外國也杜摰以為嬴秦之末蓋苦長城之役百姓絃鼗而鼓之二者各有所據以意斷之烏孫近焉石崇琵琶引曰王明君者本為昭君以觸文帝諱改匈奴請婚元帝以明君配焉昔公主嫁烏孫令琵琶馬上作樂以慰其思其送明君亦然故序之云耳傅子曰朱生善弹琴琵琶雖伯牙之妙無以加也文士傳曰孔煒字正忠解音律弹琵琶異苑曰永嘉中李謙素善琵琶元嘉初往廣州夜集坐倦悉寝唯謙獨揮弹未輟便聞忩外有唱佳聲毎至契㑹弹之無不擊莭謙怪語曰何不進耶對曰遺生已久無宜干突始悟是鬼幽明錄曰司空桓豁在荆州有叅軍五月五日剪鸜鵒毎教令學語遂無不名與人相問顧叅軍善弹琵琶鸜鵒毎令聽移時錄異傳曰呉赤烏三年句章民楊度至餘姚夜行有一年少持琵琶求寄載度許之鼓琵琶作數十曲曲畢乃吐舌擊目以怖度而去復行數十里許又見一老父寄載自云姓王名戒因復載之謂曰鬼工鼓琵琶甚哀戒曰我亦能鼓即是向鬼復擊眼吐舌度怖幾死語林曰桓宣武外甥恒在坐鼓琵琶宣武醉后指琵琶曰名士固亦操斯器三輔决錄曰游楚上表乞宿衛拜駙馬都尉楚無學好遊遨音樂畜歌者琵琶筝笛毎行将以自隨樂府雜錄曰唐文宗朝女弟子鄭中丞善於胡琴中丞即宫中之人也内庫有兩面琵琶號大小忽雷鄭常弹小忽雷因題頭脱送於崇仁坊南趙家修理大約樂器多在此坊中南北二趙家最妙太和中有權相舊吏梁厚本荘在渭南縣之西北臨渭水一日因垂釣忽見一物流過長五尺許悉以錦纒其上令家僮接得就岸乃秘器也及發棺視之乃一女郎也粧色儼然久伺之口鼻間餘息未絶遂移於曲室中将養經旬漸能言詢之云是鄭中丞也昨以忤聖㫖命内官縊殺投於渭河錦即諸子弟相贈耳及如故因垂涕感謝厚本即納為妻言其琵琶今尚在南趙家值鄭注之亂莫有知者梁乃潜賂樂匠贖得之毎至夜深方敢輕弹後遇良辰美景飲於花下酒酣不覺朗弹數曲洎有黄門放鷂子過其門私於墻外聽之曰此是鄭中丞琵琶聲也不日召入内乃赦厚本之罪仍加錫賜也明皇雜錄曰天寳中上命宫女數百人為梨園弟子皆居宜春北院上素曉音律時有馬仙期李龜年賀懐智洞知律安祿山自范陽入覲亦獻白玉簫管數百事安皆陳於梨園自是音響殆不類人間有中官白秀貞自蜀使迴得琵琶以獻其槽以邏逤檀為之清潤如玉光輝可見有金縷紅文蹙成雙鳳貴妃毎抱是琵琶奏於梨園音韻淒清飄如雲外而諸王貴主洎虢國以下競為貴妃琵琶弟子毎授曲畢皆廣有進獻其後龜年流落江南毎遇良辰勝景常為人歌數闋坐客聞之莫不掩泣罷酒羯皷羯皷錄曰羯皷出外夷以戎羯之皷故曰羯皷其音主太蔟一均龜茲髙昌踈勒天竺諸部皆用之次在都曇荅獵皷之下都曇似腰皷而小荅獵即背皷也雞婁皷之上狀如漆桶山桑為之下以小牙床承之擊用兩杖其音焦殺明烈尤宜急曲促破作戰杖連碎之聲又宜髙樓曉影明月清風破空透逺特異衆樂杖用黄檀狗骨花楸須乾𦂳至縱濕氣而復柔膩乾取發越響亮膩取戰裊健舉抱用鋼鐡鐡當精煉棬須至匀若不鋼則應絛髙下紐捩不停不匀則皷面緩急似若琴徽之􅂒病𤣥宗洞曉音律由於天縱凡是管絃悉}
