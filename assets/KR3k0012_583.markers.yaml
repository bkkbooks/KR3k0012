  - {type: variant, offset: 19, length: 0, content: '', SBCK: 不日召入内乃捨厚本之罪仍加錫賜也明皇雜録曰天寳中上命宫女子數百人爲梨園弟子皆居冝}
  - {type: variant, offset: 19, length: 0, content: '', WYG: 尤愛羯皷横笛云八音之領袖也諸樂不可方此嘗值二月詰旦巾􅌨方畢時宿雨初晴景色明麗小殿庭内栁杏方吐覩而歎曰對此景物豈可不與他判斷之左右相目之将備酒唯髙力士遣取羯皷上旋命之臨軒縱擊一曲名}
