  - {type: variant, offset: 1330, length: 0, content: '', WYG: 此曲近因張通儒而入長安某家流散父没西河此曲遂絶今但按舊譜數本尋之竟無結尾聲故夜夜求之琬曰曲不盡意乎工曰盡琬曰意盡則曲盡又何索乎工曰奈何聲不盡也琬曰可言矣夫曲有如此當以他曲解之方可盡其聲矣夫耶婆色雞當用掘柘急徧解之工如其所教果得諧叶聲意皆盡工泣謝之而即言於寺卿奏為主簿累官至太常少卿為宗正卿又曰永泰中杜鴻漸為三川副元帥兼西川節度使亦能擊羯皷之成都有以削杖二枚獻於鴻漸者鴻漸得之示於衆曰此舊物也當衣襟下收貯積時矣匠曰某於脊溝中養之二十年及鴻漸出蜀至利州西界望嘉驛入漢川自西南來始至嘉陵頗有山川景致至夜月色又佳乃與從事楊崖州杜亞軰驛樓望月行觴讌話曰今日出難危脫積廹外則不辱命於朝廷内則不中禍於微質皆諸賢之力也既保此安歩又瞰此殊境安得不自賀乎遂命家童取羯皷笛以所得杖酣奏數曲四山猿鳥忽皆飛鳴從事頗異之曰昔夔之擊拊百獸舞庭此豈逺耶漸曰漸但於此稍當致功猶未臻妙尚能及是况聖主御天賢臣考樂飛走之類又何不感因言某有别墅近花巖閣毎值風清月白時或登閣奏此初見羣羊於川下數舉頭躑躅不已某謂以鼓然也及鼓止亦止某復鼓之亦復然遂以疾徐髙下而節之無不相應旋有二犬自其家走而吠之及羊側遂漸止聲仰首若有所聴少選即復宛頸揺尾亦從而變態是率舞固無難矣某後不敢}
