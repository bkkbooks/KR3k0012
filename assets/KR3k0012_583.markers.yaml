  - {type: variant, offset: 20, length: 1, content: 分, WYG: 光好上自製神思自得及顧栁杏皆已發拆指笑曰此事不喚我作天公可乎左右皆稱萬嵗又製秋風髙毎至秋空逈徹纎羅不起即奏}
  - {type: variant, offset: 20, length: 1, content: 分, krp: 北院上素曉音律時有馬仙期李龜年賀懷智洞知律度安禄山自范陽入覲亦獻白玉簫管數百事皆陳於梨園自是音響殆不類人間有中官白秀貞自蜀使廽得琵琶以獻其槽以邏逤檀爲}
  - {type: variant, offset: 22, length: 0, content: '', SBCK: 温潤如玉光輝可鑒有金縷紅文蹙成􅀟鳯貴妃毎抱是琵琶奏於梨園}
  - {type: variant, offset: 22, length: 2, content: 音萬, WYG: 必逺風徐來庭葉墜落其妙絶入神也如此又曰汝陽王璡寧王長子也姿容妍美秀出藩邸上特鍾愛焉自傳受又以其聦悟敏恵妙逹其㫖毎隨遊幸頃刻不舍璡甞戴砑綃帽打曲上自摘槿花一朶置於帽上著處二}
