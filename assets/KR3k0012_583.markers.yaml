  - {type: variant, offset: 480, length: 845, content: 皋陶鼓木鄭玄謂鞠者以皋陶名官陶從草耳韗音況萬切又音運鞠音陶長六尺有六寸左右端廣六寸中尺厚三寸板中廣頭挾為穹崇鄭眾云鼓木一判者其兩端廣六寸而中央廣尺如此乃得有腹矣穹者三之一鄭眾云穹讀為志無穹耶之穹謂鼓木腹穹崇者居鼓面三之一玄讀如穹蒼之穹穹崇者居鼓面三之一則其鼓四尺者板一尺三寸三分寸之一倍之為二尺六寸三分寸之二加鼓四尺穹之徑六尺六寸三分寸之二此鼓合二十板上三正鄭玄云謂兩頭一半中央一平鄭玄讀三當為參正言直也參直者穹上一直兩端又直名居二尺二寸不孤曲也此數兩以六鼓差之賈侍中云晉鼓大而短近晉鼓也以晉鼓鼓金奏也鼓長八尺鼓四尺中圍加三之一謂之鼖鼓中圍加三之一者加於面之圍以三分一也面四尺其圍十二尺加以三分一四又則中圍十六尺徑五尺三寸三分寸之一今鼓亦合二十板則板微穹六寸三分寸之二爾雅云鼓謂之鼖鼓以鼖鼓鼓軍事鄭眾云鼓四尺謂革所象者廣四尺也為皋陶長尋有四尺鼓四尺倨勾磬折以皋鼓鼓役事磬折中曲之不參正中圍與鼖鼓同以磬折為異也凡冐鼓必以啟蟄之日啟蟄孟春之中蟄蟲始聞雷聲而動鼓所以取象為象鼓以革者也良鼓瑕如積環革調急也鼓大而短則其聲疾而短聞音問下同小而長則其聲舒而遠聞禮記明堂位曰土鼓蕢桴葦籥伊耆氏之樂也蕢當為凶伊耆古天子號令有耆氏也左傳成上曰師之耳目在吾旗鼓又僖中曰三軍以利用也金鼓以聲氣也又昭三曰分唐叔以密須之鼓注密須國名也毛詩曰鄁風擊鼓其鏜踊躍用兵又采芑曰方叔率止鉦人伐鼓陳師鞫旅顯允方叔伐鼓淵淵振旅闐闐又靈臺曰鼉鼓蓬蓬矇瞍奏公又執競曰鍾鼓喤喤磬筦將將又山有樞曰子有鍾鼓不擊不考宛其死矣他人是保又有瞽曰有瞽有瞽在周之廷設業設簴崇牙樹羽應田懸鼓又那曰猗歟那歟置我鞉鼓奏鼓簡簡衎我烈祖又甫田曰琴瑟擊鼓以御田祖又有駜曰振振鷺鷺于飛鼓咽咽醉言歸又宛丘曰坎其擊鼓宛丘之下論語曰季氏富於周公而求也為之聚歛而附益之子曰非吾徒也小子鳴鼓而攻之可也漢書曰李陵擊匈奴夜擊鼓起士鼓不鳴陵曰吾士氣少襄而鼓不起何耶軍中豈有女子乎搜軍中得卒妻皆斬之又曰元帝疾不親政事留好音樂或置鼙殿下天子自軒檻上聵銅丸以撾鼓聲中嚴鼓之節後宮及左右習, SBCK: 君固}
