  - {type: variant, offset: 167, length: 4, content: 懸鼓周鼓, SBCK: 宋開府雖耿介不倫亦􅀷好聲樂尤善羯皷􅀯山起雲北山起雨即開府所爲始承恩頋與上論皷事曰不是青州石即是魯山花歐然少年碧掌下雖有朋肯聲據此乃漢震第二皷}
  - {type: variant, offset: 167, length: 1, content: 懸, WYG: 宋開府雖耿介不倫亦深好聲樂善羯皷南山起雲北山起雨即宋開府所為也承恩顧與上論皷事曰不是青州石末即是魯山花甆撚小碧上掌下須有朋肯聲據此乃漢震第二皷也且􅀈用石末花瓷固是腰皷掌下朋肯聲是以手拍非羯皷明矣又謂上曰頭如青山峰手似白雨㸃此即羯}
