  - {type: variant, offset: 30, length: 0, content: '', SBCK: 短之上􅀏曰大哥不在過慮阿暪自是相師上於諸親自稱此號夫帝王之相且湏英特越逸之氣不然則有深沉包育之候􅀂花奴但端秀過人悉無此犬固無猜也而又舉止淹雅更得公卿間令譽耳寕王又謝之曰如此則臣乃輸之上曰􅀂此則阿暪亦輸大哥矣寕王又謙謝上曰阿暪嬴處亦多大哥大用僞揖衆皆歡􅀏也上性儁邁酷不好琴甞聽彈正弄未及畢叱琴者曰待詔}
  - {type: variant, offset: 30, length: 0, content: '', WYG: 短之上笑曰大哥不須慮阿瞞自是相師上於諸親自稱此號夫帝王之相且須英特越逸之氣不然則有深沉包育之量若花奴但端秀過人悉無此態固無猜也而又舉止淹雅更得公卿間令譽耳寧王又謝之曰如此則臣乃輸之上曰若此則阿瞞亦輸大哥矣寧王又謙謝上曰阿瞞贏處亦多大哥太用撝抑衆皆歡笑也上性雋邁雅不好琴甞聴弹三㺯未及畢叱琴者曰待詔}
