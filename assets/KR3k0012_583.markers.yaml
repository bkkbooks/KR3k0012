  - {type: variant, offset: 14, length: 0, content: '', SBCK: 起長三尺五寸法天地人與五行也四絃象四時也以手琵琶之因以爲名語林曰謝鎭西着紫羅􅃭據胡床在大市佛圖門樓上彈琵琶作大道曲異苑曰南平國兵在姑熟有􅀑附之毎占㓙輙先索琵琶隨彈而言事事有驗云是老䑕所作名曰靈侯王諐期絳幕祠儀曰琵琶出於弦鞉笙簧基於􅁝竹竹林七賢傳曰阮咸善琵琶荀朂雅解音律自以逺不及也文士傳曰孔輝善彈琵琶呉歸命􅁪使爲樂孫放別傳曰君性好音能操琴及琵琶以自散傅􅀇琵琶序曰聞之故老云漢遣焉烏孫公主念其行道思慕使工知音者戰琴筝筑箜篌之属作馬上之樂觀其器盤圎柄直隂陽序也四弦法四時也以方語目之故枇杷也取易傳於外國也杜摯以爲興􅁗之末盖苦長城之役百姓弦鼗而皷之二者各有所據以意斷之烏孫近焉石崇琵琶引曰王明君曰本爲昭君以觸文帝諱改匈奴請婚元帝以明君配焉昔公主嫁烏孫令琵琶馬上作樂以慰其思其送明君亦故然序之云耳􅀓子曰朱生善彈琵琶雖伯牙之妙無加也文士傳曰孔煒字正忠解音律彈琵琶異苑曰永嘉中李謙素善琵琶元嘉􅀄徃廣州夜集坐倦悉寢唯謙獨揮彈未輟便聞䆫外有唱佳聲毎至契㑹無不擊節謙恠語曰何不進􅁘對曰遺生以乆無冝干突始悟是􅀑幽明録曰晉司空桓豁在荆州有叅軍五月五日剪鸜鵒舌教令學語遂無不鳴與人相問頋叅軍善彈琵琶鸜鵒每立聽移時録異傳曰呉赤烏三年句章氏楊度至餘姚夜行有一年少持琵琶求􅀉載度受之皷琵琶作數十曲曲畢乃􅄍舌擘目以怖度而去復行二十里許又見一老父􅀉載自云姓王名戒因復載之謂曰􅀑工皷琵琶甚哀戒曰我亦能皷即是向􅀑復擘眼吐舌度怖幾死語林曰桓宣武外甥􅁪在坐皷琵琶宣武醉後指琵琶曰名士固亦操斯器三輔决録曰遊楚上表乞􅀫衛拜駙馬都尉楚無學問好遊遨音樂乃畜歌琵琶筝笛每行將以自隨樂府雜録曰唐文宗朝女弟子鄭中丞善於胡琴中丞即宫人之官也内庫有兩面琵琶號大忽雷鄭常彈小忽雷因匙頭脫送於崇仁坊南趙家修理大約}
