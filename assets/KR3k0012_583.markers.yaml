  - {type: variant, offset: 1397, length: 204, content: 以其才不欲殺之聞衡善鼓召為鼓吏因會賓客閱試音節諸吏過者皆令脫其故衣更著岑單絞之服次至衡方操撾踊躍而前吏呵之曰鼓吏何不改服而輕進衡於是先解褒衣次釋餘服祼身而立徐取岑牟單絞而著之復操撾顏色不怍操笑曰本欲辱衡衡反辱孤衡對曰不敢以先王之法服為伶倫之衣沈約宋書曰蕭思話年十許歲好騎屋楝打細腰鼓也南史曰孫抱為延陵縣令國子助教高爽詣之抱了無故人懷爽出從閤下過取筆書鼓面云徒有此大腹了自無肝腸面皮如許厚被打未遽央唐書曰張玄素, WYG: 已}
