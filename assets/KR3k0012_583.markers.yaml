  - {type: variant, offset: 4, length: 1, content: 鼓, SBCK: 一琵琶羯皷琵琶釋名曰琵琶夲胡中馬上所皷推手前曰琵引手却曰琶因以爲名晉書曰石季倫善彈琵琶宋書曰􅁃仲文爲吏部尚書好貨先與劉德願殊惡德願自持琵琶甚精麗遺之便復欵然南史曰宋范曄善彈琵琶能爲新聲上欲聞之屢諷以微旨曄僞􅀂不肯爲上甞宴飲歡適謂曄曰我欲歌卿可彈曄乃奉旨上歌旣畢曄乃罷弦蕭子顯齊書曰太祖曲江宴群臣數人各使效􅇊藝禇淵彈琵琶王僧度彈琴沈文季歌張敬兒舞王敬則柏王儉曰臣無所解唯知誦書因跪上前誦相如封禪書上􅀏曰此盛德之事吾何以堪之遽止使陸澄誦孝經自仲尼居而起儉曰澄所謂􅀶而寡要臣請誦之乃誦君子之事上章上曰善張子布更􅁴非竒隋祕書􅁥牛弘修皇后房内之樂文帝龍潜時頗好音樂甞􅀝琵琶作歌二首名曰地厚天髙託言夫妻之義因即取之爲房内曲命婦人並登歌上壽並用之職在宫内之女人教習之樂府雜録曰貞元中有王芬曹保其子善才其孫曹綱及裴興奴善彈琵琶其曹綱善運撥聲􅀂風􅀨不事但弦其裴興奴善於攏撚不撥稍軟時人云曹綱有右手裴興奴有左手武宗朝朱崖李太尉有樂吏廉郊者師於曹綱精妙入神甞謂儕流曰教授人亦多矣未曽有此性靈弟子也甞因清夜携樂器於平泉别墅臨池彈蕤賔調芰荷聞有聲意其魚躍也及彈別調即寂然因復彈蕤賔乆之池中擲物跳上岸觀之乃一片方響蕤賔䥫盖以聲律諧和相應故也其妙􅀂此又曰貞元中有康崑崙彈琵琶第一手因長安大旱詔移兩市以祈雨及至天門街市人廣較勝􅀒及闘聲樂即街東有康崑崙琵琶最上必謂街西無以敵也遂請崑崙登綵樓彈一曲新翻羽調録要即緑􅆎是也夲因樂上進曲上令録出要者因以爲名自後來誤言緑􅆎也其街西亦建一樓東市大誚之及崑崙度曲西市樓上出一女郎抱樂器先云我亦彈此曲兼移在楓香調及下撥聲如雷其妙絶入神崑崙即驚駭乃拜請爲師女郎乃更衣而出及見即僧也盖西市内豪族厚賂莊嚴寺僧善夲善本名俗姓叚也以定東􅆵之勝也翌日德宗召入令陳夲藝異常佳奬因令教授崑崙奏曰且請崑崙彈一調子乃彈之師曰本領何雜也兼帶雅聲崑崙驚曰叚師神人也臣小年􅀄學琵琶偏於隣舎女巫處授一品絃調子後仍易數師叚精鑒玄妙如此叚師奏曰遣崑崙不近樂器十餘年使忘其夲領然後可教詔許之後盡叚師之蓺也又曰開元中有賀懷智善琵琶以石爲槽鵾鷄荕作絃用䥫撥彈之又曰琵琶始自烏孫公主造馬上彈之直項曲項者曲項盖使於急􅀜也古曲有陌上葉范曄石苞謝弈皆善此樂也}
