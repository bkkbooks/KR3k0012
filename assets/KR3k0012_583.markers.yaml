  - {type: variant, offset: 20, length: 1, content: 分, SBCK: 北院上素曉音律時有馬仙期李􅀛年賀懷智洞知律度安禄山自范陽入覲亦獻白玉簫管數百事皆陳於梨園自是音響殆不􅀋人間有中官白秀貞自蜀使廽得琵琶以獻其槽以邏逤檀爲}
