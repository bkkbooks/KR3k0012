  - {type: 'tls:seg', offset: 23, content: '', id: KR3k0012_CHANT_583-1a.9}
  - {type: variant, offset: 23, length: 0, content: '', SBCK: 韻淒清飄如雲外而諸王貴主洎􅉑國已下競爲貴妃琵琶弟子毎授曲畢皆廣有進獻其後􅀛年流落江南每遇良晨勝景常爲人歌數闋座客聞之莫不掩泣罷酒羯皷羯皷録曰羯皷出外夷以戎羯之皷故曰羯皷其音主太簇一均􅀛兹髙昌踈勒天笁諸部皆用之次在都曇荅獵皷之下都曇似􅆎皷而小荅獵即楷皷也鷄皷之上如􅃮桶山桒爲之下以小牙床承之擊用兩杖其音焦殺鳴烈尤冝急曲促破作戰杖連碎之聲又冝髙樓曉影明月清風破空透逺特異衆樂杖用黄檀狗骨花楸等木湏至乾緊絶濕氣而復柔􅕹乾取發越響亮􅕹取戰􅙂徤舉捲用鋼䥫䥫當精練捲湏至勻􅀂不以鋼則應絛髙下細捩不停不勻則皷面緩急􅀂琴徽之病玄宗洞曉音律由之天縱凢是管絃悉造其妙􅀂製作曲調隨意即成如不立章度取適長短應指發聲皆中􅀧拍至於清濁變轉律吕呼召君臣事物相制使雖古之夔曠無以過也尤愛羯皷横笛云八音之領䄂也諸樂不可爲比甞值二月詰旦巾櫛方畢時􅀫兩􅀄晴景色明麗小殿庭内栁杏將吐覩而歎曰對此景物豈可不與他判斷之左右相目將令備酒唯髙力士遣取羯皷上旋命之臨軒縱擊一曲名春光好上自掣神思自得及頋柳杏皆巳發拆指而􅀏曰此事不喚我作天公可乎左右皆稱}
  - {type: page-break, offset: 23, content: '', id: KR3k0012_SBCK_583-5b}
  - {type: variant, offset: 23, length: 0, content: '', krp: 韻淒清飄如雲外而諸王貴主洎􅉑國已下競爲貴妃琵琶弟子毎授曲畢皆廣有進獻其後龜年流落江南每遇良晨勝景常爲人歌數闋座客聞之莫不掩泣罷酒羯皷羯皷録曰羯皷出外夷以戎羯之皷故曰羯皷其音主太簇一均龜兹髙昌踈勒天笁諸部皆用之次在都曇荅獵皷之下都曇似腰皷而小荅獵即楷皷也鷄皷之上如􅃮桶山桒爲之下以小牙床承之擊用兩杖其音焦殺鳴烈尤冝急曲促破作戰杖連碎之聲又冝髙樓曉影明月清風破空透逺特異衆樂杖用黄檀狗骨花楸等木湏至乾緊絶濕氣而復柔􅕹乾取發越響亮􅕹取戰褭徤舉捲用鋼䥫䥫當精練捲湏至勻若不以鋼則應絛髙下細捩不停不勻則皷面緩急若琴徽之病玄宗洞曉音律由之天縱凢是管絃悉造其妙若製作曲調隨意即成如不立章度取適長短應指發聲皆中點拍至於清濁變轉律吕呼召君臣事物相制使雖古之夔曠無以過也尤愛羯皷横笛云八音之領䄂也諸樂不可爲比甞值二月詰旦巾櫛方畢時宿兩𥘉晴景色明麗小殿庭内栁杏將吐覩而歎曰對此景物豈可不與他判斷之左右相目將令備酒唯髙力士遣取羯皷上旋命之臨軒縱擊一曲名春光好上自掣神思自得及頋柳杏皆巳發拆指而笑曰此事不喚我作天公可乎左右皆稱}
  - {type: variant, offset: 24, length: 0, content: '', SBCK: 歳又製秋風髙毎至秋空逈徹纎塵不起即奏之必逺風徐來庭葉墜落其妙絶入神也如此又曰汝陽王璡寕王長子也姿容妍羙秀出藩邸上特鍾愛焉自傳授之又以其聦悟敏惠妙逹其旨每隨遊幸頃刻不捨璡甞戴砑綃帽打曲上自樀槿花一朶置於帽上着處二}
  - {type: page-break, offset: 24, content: '', id: KR3k0012_SBCK_583-6a}
  - {type: variant, offset: 24, length: 0, content: '', krp: 歳又製秋風髙毎至秋空逈徹纎塵不起即奏之必逺風徐來庭葉墜落其妙絶入神也如此又曰汝陽王璡寕王長子也姿容妍羙秀出藩邸上特鍾愛焉自傳授之又以其聦悟敏惠妙逹其旨每隨遊幸頃刻不捨璡甞戴砑綃帽打曲上自樀槿花一朶置於帽上着處二}
  - {type: variant, offset: 26, length: 3, content: 郭皮甲, SBCK: 極滑乆之方安遂奏舞山花一曲花不墜本色所謂定頭項難在不動揺上大喜􅀏賜金器一厨因誇花奴璡小名也姿質明瑩肌膚光細非人間人必神仙謫墜也寕王謙讓隨}
