  - {type: variant, offset: 17, length: 1, content: 郭, SBCK: 梁乃潜賂樂匠贖得之毎至夜􅀷方敢輕彈後遇良晨美景飲於花下酒酣不􅁴郎彈數曲洎有黄門放鷂子過其門􅀻於牆外聽之曰此是鄭中丞琵琶聲}
  - {type: variant, offset: 17, length: 1, content: 郭, krp: 梁乃潜賂樂匠贖得之毎至夜深方敢輕彈後遇良晨美景飲於花下酒酣不覺郎彈數曲洎有黄門放鷂子過其門私於牆外聽之曰此是鄭中丞琵琶聲}
