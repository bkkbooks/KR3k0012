  - {type: variant, offset: 1602, length: 229, content: 子承乾又嘗於宮中擊鼓聲聞於外玄素叩閤請見極言切諫承乾乃出宮內鼓對玄素毀之唐書鄭餘慶兼判太常卿事初德宗自山南還宮關輔有懷光吐蕃之虞都下驚擾遂詔太常習樂去大鼓至是餘慶始奏復用大鼓世本曰王大將軍年少時舊有田舍之名語音亦楚武帝喚時賢共言伎藝之事人人皆有所能唯王都無所解意色殊惡自言解打鼓帝即令取鼓令擊之於坐振袖而起揚槌奮擊音節諧捷傍若無人舉坐歎其雄爽春秋孔演圖曰有人金豐擊玉鼓駕六龍鼓喻所行清嚴人服其威勢也古今注曰漢有黃門鼓吹一名樓車帝王世紀曰黃帝殺夔以其皮為鼓聲聞, SBCK: 平御覽卷第}
