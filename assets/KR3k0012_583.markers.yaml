  - {type: variant, offset: 5, length: 0, content: '', WYG: 推手前曰琵引手却曰琶因以為名晉書曰石季倫善弹琵琶宋書曰庾仲文為吏部尚書好貨先與劉徳願殊惡徳願自持琵琶甚精麗遺之便復欵然南史曰宋范􅁮善弹琵琶能為新聲上欲聞之屢諷以微㫖􅁮偽若不曉終不肯為上嘗宴飲歡適謂曰􅁮我欲歌卿可弹􅁮乃奉㫖上歌既畢􅁮乃罷絃蕭子顯齊書曰太祖曲江宴羣臣數人各使傚伎藝褚淵弹琵琶王僧䖍弹琴沈文季歌張敬兒舞王敬則拍張王儉曰臣無所解唯知誦書因跪上前誦相如封禅書上笑曰此盛徳之事吾何以堪之遽止使陸澄誦孝經自仲尼居起儉曰澄所謂博而寡要臣請誦之乃誦君子之事上章上曰善張子布更覺非竒隋祕書監牛𢎞脩皇后房内之樂文帝龍潜時頗好音樂甞以琵琶作歌二首名曰地厚天髙託言夫妻之義因莭取之為房内曲命婦人並登歌上夀並用之職在宫内女人教習之樂府雜錄曰貞元中有王芬曹保保子善才其孫綱及裴興奴善弹琵琶其曹綱善用撥聲若風雨不事扣絃其裴興奴善於攏撚用撥稍軟時人云曹綱有右手裴興奴有左手武宗朝朱崖李太尉有樂吏亷郊者師於曹綱精妙入神嘗謂儕流曰教授人亦多矣未曽有此性靈弟子也甞因清夜擕樂器於平泉别墅臨池弹蕤賓調芰荷間有聲意其魚躍也及弹别調即寂然因復弹蕤賓久之池中物跳擲上岸觀之乃一片方響蕤賓鐡盖以聲律諧和相應故也其妙若此又曰貞元中有康崑崙弹琵琶第一手因長安大旱詔移兩市以祈雨及至天門街市人廣較勝負及鬭聲樂即街東有康崑崙琵琶最上必謂街西無以敵也遂請崑崙登綵樓弹一曲新翻調錄要即錄要目是也本因樂工進曲上令錄出要者因以為名自後來誤書緑腰也其街西亦建一樓東市大誚之也及崑崙度曲畢西市樓上出一女郎抱樂器先云我亦彈此曲兼移在楓香調中及下撥聲如雷其絶妙入神崑崙即驚駭乃拜請為師女郎乃更衣而出及見即僧也盖西市豪族厚賂荘嚴寺僧善本善本名俗姓叚也以定東􅆵之聲也翌日徳宗召入令陳本藝異常嘉奨因令教授崑崙奏曰且請崑崙弹一調子乃弹之師曰本領何雜也兼帶邪聲崑崙曰叚師神人也臣少年初學琵琶偏於隣舍女巫處授一品絃調子后乃易數師叚精監𤣥妙如此叚師奏曰遣崑崙不近樂器十年後使忘其本領然後可教詔許之后盡叚師之藝也又曰開元中有賀懐智善琵琶以石為槽鵾雞筋作絃用鐡撥弹之又曰琵琶始自烏孫公主造馬上弹之有直項者曲項者葢便於急闗中也古曲有陌上桑范􅁮石苞謝弈皆善此樂也}
