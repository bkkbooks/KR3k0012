  - {type: variant, offset: 2060, length: 1684, content: 十里有祠并石人石鼓齊世將亂石人輒打鼓聞數十里羅浮山記曰浮山東石樓下有兩石鼓扣之清越所謂神鉦也盛弘之荊州記曰始興郡陽山縣有豫章木本徑可二丈名為聖木秦時伐此木為鼓顙顙成忽有奔逸北至桂陽又王韶之始興記云息於臨武遂之洛陽因名聖鼓城今在臨武臨海記曰郡西有白鵠山山上有石鼓元嘉中居人志祭祀山神乃推此鼓數十里聞如金石之響相傳云此云有鵠飛入會稽郡雷門鼓中打鼓聲洛陽聞之後逆賊孫恩斫破此鼓見一白鵠飛出去通禮義纂曰建鼓大鼓也少昊氏作焉為眾樂之節夏加四足謂之節鼓商人挂而貫之謂之盈鼓周人縣而擊之謂之懸鼓近代相承植而建之謂之建鼓本出於商制也唐禮設於四隅劉瓛定軍禮曰鼓吹未知其始也漢以雄朔野而有之矣鳴笳以和簫聲非八音也騷人曰鳴箎笳竽鼓吹樓車也昔蕭史吹簫於秦秦人為之築鳳臺故鼓吹陸則樓車水則樓舡其在庭也則以虡為樓或曰鷺鼓精也昔吳夫差啟虵門以厭越越人雷為門以禳之擊大鼓於雷門之下而虵門聞焉其後移鼓建康宮之端門有雙鷺呪鼓而飛乎雲末或曰皆非也詩曰振振鷺鷺于飛鼓咽咽醉言歸古之君子仕於伶官悲周道之為榛傷頌之棳音故飾鼓以鷺欲其流風好焉今有龍頭大抗中鼓獨揭小鼓隨品秩焉短簫鐃歌軍樂也帝歧伯所作以建武揚德風韶勸土地古今樂錄曰鎛師掌金奏之鼓謂主擊晉鼓以奏其鍾鎛又卒長執鐃奴交切兩司馬執鐸公司馬執鐲音蜀又金鐃止鼓以金鐸通鼓以金鐲節鼓以鍾鼓者前擊鍾次擊鼓也大周正樂曰劉貺曰鼓動也冬至之音萬物含陽氣而動雷鼓八面以祀天靈鼓六面以祀地路鼓四面以祀鬼神夏后加之以足謂之足鼓殷人貫之以柱謂之柱鼓周人懸之謂之懸鼓後世復殷制建之謂之建鼓鼓高六尺六寸金奏則鼓之傍有小鼓謂之應鼓以和大鼓小鼓有柄曰鞉搖以和鼓大曰鼙也腰鼓大者瓦小者木皆廣首而纖腹齊鼓如漆桶大一頭設齊於鼓面如麝齊故曰齊鼓又曰馬上之鼓曰提鼓有木可提執施於朝則登聞之鼓敢諫之鼓是也施於府寺曰朝鼓在村墅曰枹鼓抱一作桴調擊鼓物也在邊徼曰警鼓又曰銅鼓鑄銅為之虛其一面覆而擊其上南蠻扶南天笁類皆如此嶺南豪家則有之大者廣尺餘又曰節鼓如博局中開圓孔適容其鼓擊之以節樂也又曰毛員鼓似都曇而稍大又曰有鼉鼓節鼓不知誰所造又曰檐鼓如小甕先冐以革而漆之又曰羯鼓正如漆桶兩手俱擊以其出羯中故號羯鼓亦謂兩杖鼓板又曰正鼓和鼓一以正而一以和皆腰鼓也又曰都曇鼓似腰鼓而小以小槌擊之又曰荅臘鼓制廣於羯鼓而鼓以指揩之其聲甚震俗謂之揩鼓又曰鷄婁鼓正而員首尾可擊之處平可數寸又曰方鼓大曆元年司馬滔進廣平樂兼此鼓以應黃鍾一均聲樂書曰雷鞉者周禮瞽矇掌播鞉鞉如鼓而小以木貫之作柄柄各四枚為八面也旁以結皮為耳搖之還自擊禮書云掌之人左手播鞉右手擊鼓之是也柷敔釋名曰柷如物始見柷柷然也敔止也所以止樂尚書夔曰戛擊鳴球下管鼗鼓合止柷敔孔安國曰憂擊柷敔也下管堂下樂也上下合心樂名有柷敔也禮記德音之音控揭天子賜諸侯樂則以柷將之樂記曰聖人作控揭壎箎則所起矣柷眾也立夏之音萬物眾形皆成也方面各二尺傍開員孔內手於孔擊之以舉眾樂也爾雅曰所以鼓柷謂之止所以鼓敔謂之甄郭璞注曰柷如漆筩方二尺四寸深尺八寸中有推柄連底桐之令左右擊止者其椎名也敔如伏虎皆上有二十七鉏鋙刻以木長尺甄者其也樂汁圖曰乾主立冬陰陽終始故聖人承天以制柷刑法使死者不恨生者不怨宋均曰柷圉從中發聲人情死恨亦從中起爾雅曰敔謂之甄音真注云敔如伏虎背上二十七鉏鋙刻以木長尺櫟之甄其名也筍簴爾雅曰木謂之簴郭璞注曰懸磬之本曰簴方言几其高者謂之簴郭璞注曰筍簴也釋名曰所以懸鍾鼓者撗曰簨簨峻也在上高峻也縱曰簴簴舉也在旁舉簨者也毛詩曰設業設簴崇牙樹羽周禮冬官梓人為筍簴嬴者羽者鮮者以為筍簴外骨內骨卻行仄行紆行連行以脰鳴以翼鳴以為雕琢厚唇弇口出目短耳大胸耀後者以為鍾簴銳喙決吻小體騫腹者以為磬簴小首而長搏身而鴻者以為筍注曰為鍾簴者有力而不走宜於任重也為磬簴者其聲清楊宜遠聞也外骨龜內骨鼈卻行螾仄行蟹紆行虵連行魚脰鳴蛙黽翼鳴發皇也螾蚰蜒皆以刻晝彝器搏庶物貴野聲禮明堂位曰夏后氏之龍簨簨殷之崇牙周之壁翣注云龍上刻畫為重才又盡繒為翣載之以壁臿五羽於其下也賈誼真簴賦曰櫻攣拳以蟉虬負大鍾而欲飛楚詞曰簫鼓兮瑤簴說苑曰秦始皇建千石之鍾立萬石之簴三輔舊事曰秦始皇歛天下銅鐵皆著咸陽鑄作銅簴高廟簴二枚魏明帝徙詣洛陽尚在, SBCK: ''}
