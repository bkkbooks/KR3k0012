  - {type: variant, offset: 968, length: 0, content: '', SBCK: 一尺之面語林曰王武子與武帝圍碁孫皓㸔王曰孫歸命何以好剥人面皮皓曰見無禮於其君者則剥其皮乃舉碁局武子伸脚在局下又曰劉眞長病積時公主毀悴將終喚主主旣見其如}
