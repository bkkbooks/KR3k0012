  - {type: variant, offset: 468, length: 0, content: '', WYG: 美眉左傳定公八年曰公侵齊門于陽州顔息射人中眉顔息魯人退曰我無勇吾志其目也穀梁傳曰長狄兄弟三人逓為害㫁其首而載之眉見於軾戰國策曰豫讓欲報趙襄子㓕鬢去眉吞炭漆春秋後語曰呂不韋謂太后曰詐腐刑嫪毐則得給事中乃令人以腐罪告之㧞其鬚眉以為宦者漢書曰張敞為婦畫眉長安中傳京兆眉憮應劭曰憮大也孟康曰憮音詡北方人謂好為詡也東觀漢記曰王莽天鳳五年樊崇起兵於莒恐其衆與莽兵亂乃皆朱其眉由是號曰赤眉又曰明徳馬后眉不施黛獨左眉}
