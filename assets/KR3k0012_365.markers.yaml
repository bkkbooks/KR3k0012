  - {type: variant, offset: 1644, length: 1196, content: 餘並如先列女傳曰京師節女長安大昌里人夫有仇仇家執父使要其子為中間女念不聽則殺父殺父不孝聽則殺夫殺夫不義乃許之曰夜在樓上新沐頭東首臥者是還譎其夫使臥他處自沐臥樓上仇家斷其頭而去仇悲義之遂不殺其父益部耆舊傳曰段翳字元章善天文風角有一諸生來學積年諸生略究要術辭歸鄉里翳為作一脂筒中盛簡書曰有變乃發視之生至葭萌與吏爭津吏檛從人頭破開筒得書言到葭萌與吏鬭破頭者以此脂裹之生喟然而歎乃還卒其業博物志曰人以冷水漬至膝啖瓜數十漬至頭可啖百餘水皆作瓜氣括地圖曰白民白首身被髮三巴記曰巴有將軍曼子請於楚以平巴亂楚使請城曼子曰城不可得乃自刎其頭與楚楚義之以上卿禮葬其頭巴以上卿禮葬其身長沙耆舊傳曰劉壽少時遇相師曰君腦有玉枕必至公也後至太尉李郃別傳曰公耳有奇表腦枕如鼎形易洞林曰郭璞為左尉周恭卜云君墮馬傷頭尉後乘馬行黃昏坂下有犢車觸馬馬驚頭打石上流血殆死語林曰魏郡太守陳異嘗詣郡民尹方方被頭以水洗盤抱小兒出更無餘言異曰被頭者欲吾治民如理髮洗盤者欲使吾清如水抱小兒者欲使吾愛民如赤子也世說曰祖廣字淵度行怕縮頭詣桓南郡下車桓曰天甚明朗祖參軍如從屋漏中來又曰諸葛道明初過江左名亞王廋之下先為臨沂令丞相謂曰明府當為黑頭公楚辭曰魂兮來歸君無上天些一夫九首拔木九千些頂說文曰頂巔也易大過卦曰過涉滅頂凶無咎韋曜毛詩問曰早鬼眼在頂上列女傳曰齊鍾離春齊無鹽邑之女鐘離姓春名也其為人極醜無雙臼頭深目頂上少髮折腰出胸莊子曰支離䟽頤隱於臍肩高於頂應璩新詩曰醉酒巾幘落頂禿赤如狐額釋名曰額鄂也有垠鄂也故幽州人謂之鄂易說卦曰巽為廣顙上大下小故為廣顙河圖曰黃帝廣顙龍額又曰天之東西南北極各有銅頭鐵額兵長三千萬丈三千億萬人毛詩鄘柏舟君子偕老曰子之清揚揚且之顏也清視明也揚廣揚而顏豐滿也展如之人兮邦之媛也詩含神霧曰代漢者龍顏珠額春秋元命苞曰在天為文昌在人為顏顙太一之謂也顏之言氣畔也陽立於五故顏博五寸論語摘輔象曰樊遲山額有若月衡反宇陷額是謂和喜方言曰𩔣音稽額也顏顙也江湘謂之頭中夏謂之額東齊謂之顙河濟淮泗之間謂之顏漢書曰成帝幸宮人嚴宮生男帝為趙昭儀召殺之宮曰果欲姊弟擅天下我兒男也額上有壯髮類孝元帝令兒安在危殺之矣奈何令長信得聞之東觀漢記曰和熹皇后年五歲夫人為鬋髮夫人年老目瞑并中后額雖痛忍不言又曰銚期從擊王郎將兒宏劉奉於鉅鹿下期先登陷陣手殺五十餘人瘡中額攝情復戰遂大破之又曰馬廖上䟽曰夫改政移風必有其本長安語曰城中好廣眉四方過半額魏志曰龐意親與關羽交戰射羽中額王隱晉書曰元帝白毫生額上有光明崔鴻後趙錄曰石勒征見無劉曜守軍大悅舉手指天又指額曰天也北齊書曰文宣帝洋為王時夢人以筆點記額明日告舍人王雲哲曰吾其誅乎雲哲賀曰王上加點為主乎後果然隋書曰劉孝焯字士龍信都人犀額龜背望高視遠聰敏深沉弱不好弄又曰煬帝令陳稜討杜伏威伏威自出陣前挑戰稜部將射中其額伏威怒指之曰不殺汝我終不拔箭遂馳之獲所射者使其拔箭然後斬之鹽鐵論曰古者君子思德小人思利今人堅額健舌或以致業, WYG: ''}
