  - {type: variant, offset: 972, length: 4, content: 易冠殺身, SBCK: 自脩飾劉便牽􅀍覆面背之不忍視又曰王右軍見杜弘冶歎曰面如凝脂眼如􅀧􅃮如神仙中人又曰何晏字平叔美姿容帝疑其􅀓粉賜湯餅令晏食之汗出流面拭之轉白丗􅀃同丗􅀃曰康僧淵目深而鼻髙王丞相每調之僧淵曰鼻者面之山目者面之淵山不髙則不靈淵不深則不清又曰鍾㑹撰四本論始畢甚欲使嵇康一見置懷中不敢出户外遥擲面便走郭子曰琅邪諸􅁑忘名面病鼠瘻劉眞長見歎曰䑕乃復窟穴人面乎異􅁐曰陳郡謝石字石奴少患面創諸治莫愈乃自幽逺止於􅀂下中宵有物來舐其創隨舐隨除旣不見形竟爲是龍而舐處悉白故丗呼爲謝白面㑹稽後賢記曰貞女謝仙女者謝承孫也呉歸命侯采仙女充後宮仙女乃炙面服醇醯}
