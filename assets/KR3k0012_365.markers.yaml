  - {type: variant, offset: 9, length: 0, content: '', SBCK: 張􅁉曉相術每舉鏡照面自知死刑未甞不撲之于地又曰劉琰妻胡入賀太后太后令特留胡經月乃出胡有美色琰疑其與後主有私呼卒檛胡至於以履􅅮面而後棄遣胡具告言琰坐下獄有司議曰卒非檛妻之人面非受杖之地琰竟棄市呉志曰諸􅁑恪父瑾長面}
  - {type: variant, offset: 9, length: 2, content: 孫權, krp: 張𥙿曉相術每舉鏡照面自知死刑未甞不撲之于地又曰劉琰妻胡入賀}
  - {type: variant, offset: 11, length: 33, content: 太子和被幽閉驃騎將軍朱據尚書樸射屈晃率諸將吏泥頭自縛連日詣闕請和又, SBCK: 大㑹羣臣使人牽一馿檢其面題}
  - {type: variant, offset: 12, length: 32, content: 子和被幽閉驃騎將軍朱據尚書樸射屈晃率諸將吏泥頭自縛連日詣闕請和又, krp: 后太后令特留胡經月乃出胡有美色琰疑其與後主有私呼卒檛胡至於以履搏面而後棄遣胡具告言琰坐下獄有司議曰卒非檛妻之人面非受杖之地琰竟棄市呉志}
