  - {type: variant, offset: 2692, length: 0, content: '', SBCK: 毛􅀂虚絳州太平人也眉毛覆於眼性殘忍􅀄爲蜀川縣尉天寳末爲武功丞年巳六十餘矣帝王丗紀曰}
  - {type: variant, offset: 2692, length: 0, content: '', krp: 毛若虚絳州太平人也眉毛覆於眼性殘忍𥘉爲蜀川縣尉天寳末爲武功丞年巳六十餘矣帝王丗紀曰}
  - {type: variant, offset: 2693, length: 1, content: 宣, SBCK: 王虎眉列仙傳曰陽都女生而連眉衆以爲異列仙傳曰莫耶子赤鼻眉間一尺列士傳曰千將子赤鼻眉廣三寸荆州先賢傳曰馬良字季常襄陽冝城人兄弟五人皆有令名良眉中有白毛郷里頌曰馬氏五常白眉最良呉越春秋曰伍子胥眉間廣一尺韓子曰失鏡無以正􅁂眉失道無以知迷惑吕氏春秋曰呉闔閭使民習戰劒如眉流血不可止淮南子曰今盆水在庭清之終日未能見眉睫濁之不過一撓而不能察方圎察見也人神易濁而難清猶盆水之􅀋也風俗通曰桓}
