  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第三百六十五}
  body:
  - {type: variant, offset: 3, length: 1, content: 五, SBCK: 六面眉面􅀃文曰面顔前也從􅔣音首象人面形音于願切靣不正也頢音括短面也頷音胡感切靣黄也顬音刀丁切靣瘦淺顬顬也􅎼面慙赤也可圖曰蒼帝方靣赤帝圎靣白帝廣靣黒帝深靣周易革卦曰上六君子豹變小人革靣禮記内則曰女子出門必擁蔽其面左傳僖三十三年曰晉侯敗狄于箕先􅎮免胄入狄師死焉狄人歸其元靣如生言其有異於人又襄六曰鄭子産曰人心之不同也如其面焉吾豈敢謂子靣如吾面乎又襄四曰晉程鄭卒子産始知然明問爲政焉對曰視民如子見不仁者誅之如鷹鸇之逐鳥雀也子産喜以語子大叔曰他日吾見蔑之靣而巳今吾見其心矣又哀下曰楚白公作亂殺子西子期于朝而劫惠王子西以􅃑掩面而死葉公在蔡方城之外皆曰可以入矣及北門乃胄而進又遇一人曰君胡胄國人望君如望歳焉曰日以幾兾君來􅀂見君面是得艾也艾安也史記曰孟戯中衍鳥身人面趙之先也漢書曰李夫人病篤上自臨候之夫人遂轉面向壁歔欷而不復言又曰哀帝􅀄即位博士申咸毀給事中薛宣不供養行䘮服薄於骨肉不冝復列封侯使在朝省宣子況爲右曹侍郎數問其語賕音求客􅀭明欲令創咸面目使不居位㑹司􅀠闕沉恐咸爲之遂令明遮斫咸宫門外斷鼻脣身八創事下有司沉減死一等宣坐免爲庶人又曰朱博爲左馮翊長陵大姓尚方禁少時曾盗人妻見斫創着其頰府功曹曰白除禁調守尉博聞知以他事召見視其面果有瘢博辟左右問禁是何等創也禁乃叩}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_365-1b}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_365-2a}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 六面眉面説文曰面顔前也從􅔣音首象人面形􅀈音于願切面不正也頢昔括短面也頷音胡感切面黄也顬音刀丁切面痩淺顬顬也􅎼面慙赤也河圖曰蒼帝方面赤帝圎面白帝廣面黒帝深面周易革卦曰上六君子豹變小人革面禮記内則曰女子出門必擁蔽其面左傳僖三十三年曰晋侯敗狄于箕先軫免胄入狄師死焉狄人歸其元面如生言其有異于人又襄六年鄭子産曰人心之不同也如其面焉吾豈敢謂子面如吾面乎襄二十}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_WYG_365-1b, image: WYG0896/WYG0896-0250b.png}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_WYG_365-2a, image: WYG0896/WYG0896-0250c.png}
  - {type: variant, offset: 3, length: 1, content: 五, krp: 六面眉面說文曰面顔前也從􅔣音首象人面形音于願切靣不正也頢音括短面也頷音胡感切靣黄也顬音刀丁切靣瘦淺顬顬也𧹞面慙赤也可圖曰蒼帝方靣赤帝圎靣白帝廣靣黒帝深靣周易革卦曰上六君子豹變小人革靣禮記内則曰女子出門必擁蔽其面左傳僖三十三年曰晉侯敗狄于箕先􅎮免胄入狄師死焉狄人歸其元靣如生言其有異於人又襄六曰鄭子産曰人心之不同也如其面焉吾豈敢謂子靣如吾面乎又襄四曰晉程鄭卒子産始知然明問爲政焉對曰視民如子見不仁者誅之如鷹鸇之逐鳥雀也子産喜以語子大叔曰他日吾見蔑之靣而巳今吾見其心矣又哀下曰楚白公作亂殺子西子期于朝而劫惠王子西以𬒮掩面而死葉公在蔡方城之外皆曰可以入矣及北門乃胄而進又遇一人曰君胡胄國人望君如望歳焉曰日以幾兾君來若見君面是得艾也艾安也史記曰孟戯中衍鳥身人面趙之先也漢書曰李夫人病篤上自臨候之夫人遂轉面向壁歔欷而不復言又曰哀帝𥘉即位博士申咸毀給事中薛宣不供養行䘮服薄於骨肉不冝復列封侯使在朝省宣子況爲右曹侍郎數問其語賕音求客揚明欲令創咸面目使不居位㑹司隷闕沉恐咸爲之遂令明遮斫咸宫門外斷鼻脣身八創事下有司沉減死一等宣坐免爲庶人又曰朱博爲左馮翊長陵大姓尚方禁少時曾盗人妻見斫創着其頰府功曹曰白除禁調守尉博聞知以他事召見視其面果有瘢博辟左右問禁是何等創也禁乃叩}
  - {type: xml-element, offset: 4, content: '', id: KR3k0012_CHANT_365-bkkxmlele1}
  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_365-1a.1}
  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_365-1a.2}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 年晉程鄭卒子産始知然明問為政焉對曰視民如子見不仁者誅之如鷹鸇之逐鳥雀也子産喜以語子太叔且曰他日吾見蔑之靣而已今吾見其心矣哀十六年楚白公作亂殺子西子期于朝而刼惠王子西以袂掩面而死葉公在蔡方城之外皆曰可以入矣及北門乃胄而進又遇一人曰君胡胄國人望君如望嵗焉日月以幾兾君來若見君面是得艾也艾安也史記曰孟戱中衍鳥身人面趙之先也漢書曰李夫人病篤上自臨候之夫人遂轉靣向壁歔欷而不復言又曰哀帝初即位博士申咸毁給事中薛宣不供養行喪服薄於骨肉不宜復列封侯使在朝省宣子沉為右曹侍郎數聞其語賕音求客楊明欲令創咸面目使不居位㑹司𨽻缺沉恐咸為之遂令明遮斫咸宫門外㫁鼻脣身八創事下有司沉减死一等宣坐免為庶人又曰朱博為左馮翊長陵大姓尚方禁少時曽盗人妻見斫創着其頰府功曹曰白除禁調守尉博聞知以他事召見視其面果有瘢博辟左右問禁是何等創也禁乃叩}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_WYG_365-2b, image: WYG0896/WYG0896-0250d.png}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_WYG_365-3a, image: WYG0896/WYG0896-0251a.png}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 服博􅀏曰大丈夫固時有是因親信以爲耳目又曰朱博爲人廉儉不好酒色之宴自微賤至冨貴食不重味案上不過三杯夜寢早起妻希見其面又曰董仲舒廣川人也景帝時爲博士}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 服博笑曰大丈夫固時有是因親信以為耳目又曰孔休守新都相休謁見莽莽縁恩意進其玉具寶劒欲以為好休不肯受莽因曰誠見君面有瘢美玉可以㓕瘢欲献其玉彘耳又曰張禹為兒數隨家至市喜觀於卜相者乆而頗曉其别蓍布卦意卜者愛之又竒其面貌謂禹父曰是兒多知可令學經東觀漢記曰耿秉為征西将軍鎮撫單于以}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_365-3b, image: WYG0896/WYG0896-0251b.png}
  - {type: variant, offset: 5, length: 0, content: '', krp: 服博笑曰大丈夫固時有是因親信以爲耳目又曰朱博爲人廉儉不好酒色之宴自微賤至冨貴食不重味案上不過三杯夜寢早起妻希見其面又曰董仲舒廣川人也景帝時爲博士}
  - {type: xml-element, offset: 6, content: '', id: KR3k0012_CHANT_365-bkkxmlele2}
  - {type: xml-element, offset: 6, content: '', id: KR3k0012_CHANT_365-bkkxmlele3}
  - {type: 'tls:seg', offset: 6, content: '', id: KR3k0012_CHANT_365-1a.3}
  - {type: punctuation, offset: 6, content: 《, id: KR3k0012_CHANT_365-bkkpn1}
  - {type: variant, offset: 6, length: 1, content: 吳, SBCK: 帷講誦弟子以次相授業或莫見其面三年不窺園圃其精如此又曰孔休守新都相休謁見莽莽縁恩意進其玉貝寳劒欲以爲好休不肯受莽因曰誠見君面有瘢美玉可以滅瘢欲獻其玉璏耳音衛劒鼻也又曰張禹爲兒數隨家至市喜觀於􅁲相者乆而頗曉其别􅆱布卦意卜者愛之又竒其靣貌謂禹父曰是兒多知可令學經東觀漢記曰耿秉爲征西將軍鎭撫單于以下及薨􅀯單于舉國發哀犂靣流血後漢書曰應奉年二十時甞詣彭城相􅀽賀賀時出行閉門造車匠於内開扇出半面視奉奉即委去後數十年於路見車匠識而呼之魏略曰徐庶名福本單家子好任俠擊劒中平末甞爲人報讎白堊突面􅀍髮而走蜀}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_SBCK_365-2b}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_SBCK_365-3a}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 及薨南單于舉國發哀剺面流血後漢書曰應奉年二十時嘗詣彭城相袁賀賀時出行閉門造車匠於内開扇出半面視奉即委去後數十年於路見車匠識而呼之魏畧曰徐庶名福本單家子好任俠擊劒中平末嘗為人報讎白堊突面被髮而走蜀志曰張裕曉相術毎舉鏡照靣自知死刑未嘗不撲之于地又曰劉琰妻胡入賀太后太后令特留胡經月乃出胡有美色琰疑其與後主有私呼卒檛胡至於以履搏面而後弃遣胡告具言琰坐下獄有司議曰卒非檛妻之人面非受杖之地琰竟弃市}
