  - {type: variant, offset: 1139, length: 504, content: 便斷頭以白曹公公大喜曰果慈頭定視是一束茅耳搜神記曰南方有落頭民吳時將軍朱桓得一婢每夜臥後頭輒飛去或從狗竇或從天窗中出入以耳為翼將曉復還數數如此旁人怪之夜照視唯有身無頭其體微冷氣息裁屬乃蒙之以被至時頭還礙被不得安再三墮地噫咤甚愁而體氣急疾若將死者乃去被頭復起傅頸得安復如常人時南征大將亦往往得之又嘗有覆以銅盤者頭不得進遂死博物志同又曰渤海太守史良好一女子許而不果良斷其頭而歸投於竈下曰當令火葬頭語曰使君我相從何圖當耳異苑曰管寧避難遼東還汎海遭風舡垂傾沒寧思衍曰吾嘗一朝科頭三晨晏起今天怒猥集過恐在此又曰晉惠帝元康三年武軍火燒夫子履漢斬白虵劍漆王莽頭等錄異傳曰漢武帝時蒼梧賈雍為豫章太守有神術出界討賊為賊所殺失頭雍上馬還營營中咸走來視雍雍胸中語曰戰不利為賊所傷諸君視有頭為佳無頭佳乎吏泣曰有頭佳雍曰不然無頭亦佳言畢遂死幽明錄曰河東賈弼小名翳兒具諳究世譜義熙中為琅邪府參軍夜夢有一人面齄甚多大鼻瞷目請之曰愛君之貌欲易頭可乎乃於夢中許易明朝起自不覺而人悉驚走琅邪王大驚遣傳教呼視弼到琅邪遙見起還內弼取鏡自看方知怪異因還家家悉驚入內婦女走藏弼坐自陳說良久并遣人至府檢問方信後能半面啼半面笑兩手各捉一筆俱書辭意皆美此為異, WYG: 眉}
