  - {type: variant, offset: 1095, length: 1066, content: 婦女財物以斷頭繫車轅軸還雒云攻敗大獲稱萬歲入關雒陽城門焚燒其頭神仙傳曰曹公捕左慈數日得之便斷頭以白曹公公大喜曰果慈頭定視是一束茅耳搜神記曰南方有落頭民吳時將軍朱桓得一婢每夜臥後頭輒飛去或從狗竇或從天窗中出入以耳為翼將曉復還數數如此旁人怪之夜照視唯有身無頭其體微冷氣息裁屬乃蒙之以被至時頭還礙被不得安再三墮地噫咤甚愁而體氣急疾若將死者乃去被頭復起傅頸得安復如常人時南征大將亦往往得之又嘗有覆以銅盤者頭不得進遂死博物志同又曰渤海太守史良好一女子許而不果良斷其頭而歸投於竈下曰當令火葬頭語曰使君我相從何圖當耳異苑曰管寧避難遼東還汎海遭風舡垂傾沒寧思衍曰吾嘗一朝科頭三晨晏起今天怒猥集過恐在此又曰晉惠帝元康三年武軍火燒夫子履漢斬白虵劍漆王莽頭等錄異傳曰漢武帝時蒼梧賈雍為豫章太守有神術出界討賊為賊所殺失頭雍上馬還營營中咸走來視雍雍胸中語曰戰不利為賊所傷諸君視有頭為佳無頭佳乎吏泣曰有頭佳雍曰不然無頭亦佳言畢遂死幽明錄曰河東賈弼小名翳兒具諳究世譜義熙中為琅邪府參軍夜夢有一人面齄甚多大鼻瞷目請之曰愛君之貌欲易頭可乎乃於夢中許易明朝起自不覺而人悉驚走琅邪王大驚遣傳教呼視弼到琅邪遙見起還內弼取鏡自看方知怪異因還家家悉驚入內婦女走藏弼坐自陳說良久并遣人至府檢問方信後能半面啼半面笑兩手各捉一筆俱書辭意皆美此為異也餘並如先列女傳曰京師節女長安大昌里人夫有仇仇家執父使要其子為中間女念不聽則殺父殺父不孝聽則殺夫殺夫不義乃許之曰夜在樓上新沐頭東首臥者是還譎其夫使臥他處自沐臥樓上仇家斷其頭而去仇悲義之遂不殺其父益部耆舊傳曰段翳字元章善天文風角有一諸生來學積年諸生略究要術辭歸鄉里翳為作一脂筒中盛簡書曰有變乃發視之生至葭萌與吏爭津吏檛從人頭破開筒得書言到葭萌與吏鬭破頭者以此脂裹之生喟然而歎乃還卒其業博物志曰人以冷水漬至膝啖瓜數十漬至頭可啖百餘水皆作瓜氣括地圖曰白民白首身被髮三巴記曰巴有將軍曼子請於楚以平巴亂楚使請城曼子曰城不可得乃自刎其頭與楚楚義之以上卿禮葬其頭巴以上卿禮葬其身長沙耆舊傳曰劉壽少時遇相師曰君腦有玉枕必至公也後至太尉李郃別傳曰公耳有奇表腦枕如鼎形易洞林曰郭璞為左尉周恭卜云君墮馬傷頭尉後乘馬行黃昏坂下有犢車觸馬馬驚頭打石上流血殆死語林曰魏郡太守陳異嘗詣郡民尹方方被頭以水洗盤抱小兒出更無餘言異曰被頭者欲吾治民如理髮洗盤者欲使吾清如水抱小兒者欲使吾愛民如赤子也世說曰祖廣字淵度行怕縮頭詣桓南郡下車桓曰天甚明朗祖參軍如從屋漏中來又曰諸葛道明初過江左名亞王廋之下先為臨沂令丞相謂曰明府當為黑頭公楚辭曰魂兮來歸君無上天些一夫九首拔木九千些頂說, SBCK: 心惑矣眉􅀃}
