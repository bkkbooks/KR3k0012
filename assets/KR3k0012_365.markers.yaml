  - {type: variant, offset: 305, length: 2, content: 庾亮, SBCK: 王珂爲桓温主簿二軍文武數萬人悉識其面晉書曰􅀄王恭敗梟首於東桁王平之抽槊刺其面又曰桓温字元子豪爽有風槩姿貌甚偉面有七星又曰劉牢之面紫赤色􅁂目驚人而沉毅多計又曰劉􅁉於東府聚樗蒱大擲一判應至數百萬餘人並黒犢唯􅁉及劉毅在後毅次擲得雉大喜褰衣繞床叫謂同座曰非不能盧不事此耳􅁉因挼五木乆之曰老兄試爲卿荅即成盧焉毅意殊不快然素黒其面如鐵色焉宋書曰沈慶之謂帝曰耕當問奴織當問婢今論争伐問白面書生事何由濟又曰明帝大㑹新亭接勞諸軍主樗蒲賭官李安人五擲皆盧帝大驚目安人曰卿面方如田封侯􅃺也又曰劉瑀爲右衛將軍因求益州甚不得意至江陵}
