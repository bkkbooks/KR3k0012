  - {type: variant, offset: 528, length: 209, content: 逃楚入山道逢一客客問曰子眉間尺乎荅曰是也吾能為子報讎尺曰父無分寸之罪枉被荼毒君今惠念何所用耶客曰須子之頭并子之劍尺乃與頭客與王王大賞之即以鑊煮其頭七日七夜不爛客曰此頭不爛者王親臨之王即看之客於後以劍斬王頭入鑊中二頭相齧客恐尺不勝自以劍擬頭入鑊中三頭相咬七日後一時俱爛乃分葬汝南宜春縣并三冢山海經曰三首國一身三首羽民國為人長頭又曰共工之臣曰相仰氏共工霸九州者也九首以食于九山晏子春秋曰景公遊於梧丘夜夢五大夫稱冤公問晏子晏, WYG: 韓}
