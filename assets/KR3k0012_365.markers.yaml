  - {type: variant, offset: 466, length: 0, content: '', WYG: 小子也太后愛之不肯遣大臣强諌太后怒謂左右曰敢復言長安君為質者老婦必唾其面山海經曰大荒之山日月所入有顓頊之子三靣一臂不死郭璞注曰人頭三邉各有靣也又曰一目國一目中其面而居尸子曰子貢問孔子曰古者黄帝四面信乎孔子曰黄帝合巳者四人使治四方大有成功此之謂四靣也又曰禹長頸鳥啄面貌亦惡天下從賢之者學也孫卿子曰衛靈公有臣公孫吕身長七尺面長三尺廣三寸名動天下荘子曰孔子謂盗跖曰今将軍身長九尺二寸面目有光脣如激丹齒如含貝音中鐘聲而名曰盗跖丘竊為将軍耻之韓子曰古人目短於自見故以鏡觀燕子太子曰田光云脉勇怒而面青骨勇怒而靣白荆軻者神勇也怒而不變説苑曰吳王将死曰吾以不用子胥言以至於今死者無知則已死者有知吾何面見子胥也遂䝉絮覆靣自刎吕氏春秋同輿論曰袁紹妻劉性妬忌紹死其尸未殯殺其妾五人恐死者有知皆髠髪黒面論中曰小人耻其面不如子都君子耻其行不如堯舜譙周法訓曰昔有人使妻為母作粥妻不肯乃以刀劈傷妻面此可為孝乎傅子曰相者三亭九候定於一尺之面語林曰王武子與武帝圍碁孫皓㸔王曰孫歸命何以好剥人面皮皓曰見無禮於其君者則剥其皮乃舉碁局武子伸脚在􅈰下又曰劉眞長病積時公主毁悴将終喚主主既見其如此乃舉指之云君危篤何以自脩飾劉便牽被覆面背之不忍視又曰王右軍見杜宏治歎曰面如凝脂眼如㸃膝如神仙中人又曰何晏字平叔羙姿容帝疑其傳粉賜湯餅令晏食之汗出流靣拭之轉白世説同世説曰康僧淵目深而鼻髙王丞相毎調之僧淵曰鼻者面之山目者面之淵山不髙則不靈淵不深則不清又曰鍾㑹撰四本論始畢甚欲使稽康一見署懷中不敢出户外遥擲面便走郭子曰琅邪諸葛忘名面病鼠瘻劉眞長見嘆曰鼠乃復窟穴人面乎異苑曰陳郡謝石字石奴少患面創諸治莫愈乃自幽逺止於岩下中宵有物來䑛其創隨䑛隨除既不見形竟為是龍而䑛處悉白故世呼為謝白面㑹稽後賢記曰貞女謝仙女者謝承孫也吳歸命侯采仙女充後宫仙女乃炙面服醇醯以取黄痩竟得免黄帝八十一問曰人面獨能寒何也曰頭者諸陽之脉㑹也諸隂脉皆至頸項不還上獨諸陽脉上頭故面能寒耳相决曰奇毛生身及面皆豪貴白毫黒毛生共孔帶印綬蔡邕女戒曰夫心猶面首也一旦不脩飾則塵垢穢之人心不思善則邪惡入之人盛飾其靣而莫脩其心惑矣眉説文曰眉目上毛也釋名曰眉媚也有娬媚也毛詩淇澳碩人曰螓首蛾眉螓首顙廣而方巧笑倩兮美目盼兮尚書大傳曰堯有眉八如八字也淮南子同大戴禮曰曽子曰敢問不勞可以為名乎孔子愀然揚眉曰參女以明主為勞乎昔者舜左禹而右臯陶不下席而天下治禮説曰君子乗金而王}
