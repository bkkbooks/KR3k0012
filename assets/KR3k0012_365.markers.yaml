  - {type: variant, offset: 471, length: 45, content: 銳瞳子白黑分明視瞻不轉小頭而銳斷敢行也瞳子白黑見事明也視瞻不轉執志強也可以持久難與爭鋒廉頗, WYG: 廞得免宋書曰王元謨在雍人言欲反元謨馳啓自觧帝知其虚馳遣主書呉喜公慰撫之曰七十老公反欲何求聊復為笑想}
