  - {type: variant, offset: 518, length: 2, content: 當之, WYG: 伸卿眉頭耳元謨性嚴未曽妄笑時人言元謨眉目未曽伸故以此見戱梁書曰武寕王太威字仁容羙風儀眉目如畫三國典畧曰梁簡文方頰豊下眉目秀發隋書曰元暉字叔平河南洛陽人也父智鬚眉如畫進止可觀少得羙名于京師唐書曰毛若虚絳州太平人也眉毛覆於眼性殘忍初為蜀郡縣尉天寶末為武公丞年已六十餘矣帝王世紀曰文王虎眉列仙傳曰陽都女生而連眉衆以為異列仙傳曰莫耶子赤鼻眉濶一尺列仙傳曰干将子赤鼻眉廣三寸荆州先賢傳曰馬良字季常襄陽宜城人兄弟五人皆有令名良眉中有白毛鄉里頌曰馬氏五常白眉最良}
