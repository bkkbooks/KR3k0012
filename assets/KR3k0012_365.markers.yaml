  - {type: variant, offset: 469, length: 4, content: 頭而銳瞳, SBCK: ''}
  - {type: variant, offset: 469, length: 0, content: '', WYG: 缺補之以縹又曰馬援自還京數被進見為人鬒髯眉目如畫又曰梁鴻居呉賃舂毎歸妻為其食不敢於鴻前仰視舉案齊眉鄧粲晋記曰荆州民宗廞嘗以酒犯王平子怒叱左右捽廞郭舒厲色謂左右曰使君醉汝軰何敢妄動平子大恚曰别駕狂耶枉言我醉因遣炙舒眉}
