  - {type: punctuation, offset: 11, content: 「, id: KR3k0012_CHANT_503-bkkpn4}
  - {type: variant, offset: 11, length: 0, content: '', SBCK: 龔莊字子偉巴西人也㓗巳自守與鄉人譙秀齊名父叔爲李特所害莊積年不除喪力弱不能復讎及李壽戍漢中與李期有嫌期特孫也壯欲假壽以報乃􅀃壽曰節下􅀂能并有西􅁟稱藩於晉人必樂從且捨小就大以危易安莫大之䇿也壽然之遂率衆討期果克之壽猶襲僞号欲官之壯誓不仕賂遺一無所受壯書􅀃壽以歸順允天心應人望永爲國藩福流子孫壽不納壯謂曰百行之夲莫先忠孝旣假壽殺期私仇巳雪又欲使其歸朝以明臣節壽旣不從壯遂稱耳聾又云手不制物終身不復至成都下帷研考經典覃思文章至李􅀔時卒又曰韓績字興齊廣陵人也先避丗居于呉之嘉興父建仕呉至大鴻臚績少好文學以潜退爲操布衣􅂼食不交當丗由是東土並宗敬焉司徒}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_SBCK_503-1b}
  - {type: variant, offset: 11, length: 0, content: '', WYG: 龔壯字子偉巴西人也潔己自守與鄉人譙秀齊名父叔為李特所􅊣壯積年不除喪力弱不能復讐及李夀戍漢中與李期有隙期特孫也時壯欲假夀以報乃説夀曰節下若能并有西土稱藩於晉人必樂從且捨小就大以危易安莫大之策也夀然之遂率衆討期果克之夀猶襲偽號欲官之壯誓不仕賂遺一無所受壯書説夀以歸順允天心應人望永為國藩福流子孫夀不納壯曰百行之本莫先忠孝既假夀殺期私仇已雪又欲使其歸朝以明臣節夀既不從壯遂稱耳聾又云手不制物終身不復至成都惟研考經典覃思文章至李勢時卒又曰韓績字興齊廣陵人也先避世居於吳之嘉興父建仕吳至大鴻臚績少好文學以􅇓退為操布衣蔬食不交當世由是當世並宗敬焉司徒}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_WYG_503-1b, image: WYG0897/WYG0897-0524d.png}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_WYG_503-2a, image: WYG0897/WYG0897-0525a.png}
  - {type: variant, offset: 11, length: 0, content: '', krp: 龔莊字子偉巴西人也㓗巳自守與鄉人譙秀齊名父叔爲李特所害莊積年不除喪力弱不能復讎及李壽戍漢中與李期有嫌期特孫也壯欲假壽以報乃說壽曰節下若能并有西土稱藩於晉人必樂從且捨小就大以危易安莫大之䇿也壽然之遂率衆討期果克之壽猶襲僞号欲官之壯誓不仕賂遺一無所受壯書說壽以歸順允天心應人望永爲國藩福流子孫壽不納壯謂曰百行之夲莫先忠孝旣假壽殺期私仇巳雪又欲使其歸朝以明臣節壽旣不從壯遂稱耳聾又云手不制物終身不復至成都下帷研考經典覃思文章至李勢時卒又曰韓績字興齊廣陵人也先避丗居于呉之嘉興父建仕呉至大鴻臚績少好文學以潜退爲操布衣𬞞食不交當丗由是東土並宗敬焉司徒}
  - {type: variant, offset: 12, length: 1, content: 符, SBCK: 導聞其名辟以爲􅁺不就咸康末㑹稽内史孔愉上䟽薦之詔以安車束帛徴之稱老病卒于家又曰譙秀}
  - {type: variant, offset: 12, length: 1, content: 符, WYG: 導聞其名辟以為掾不就咸康末會稽内使孔愉上疏荐之詔以安車束帛徴之稱老病卒於家又曰譙秀}
  - {type: variant, offset: 12, length: 1, content: 符, krp: 導聞其名辟以爲掾不就咸康末㑹稽内史孔愉上䟽薦之詔以安車束帛徴之稱老病卒于家又曰譙秀}
