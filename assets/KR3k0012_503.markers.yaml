  - {type: variant, offset: 1973, length: 0, content: '', SBCK: 或以爲昇仙又曰翟陽字長淵尋陽人耕而後食凡有饋贈一無所受􅁃亮薦湯以國子愽士徴不起湯子莊字祖休遵湯之操雅好弋釣及長不復獵人或問莊曰同是害生之道而先生止去其一何也莊曰獵自我釣自物故先節其甚者且貪餌吞釣豈我哉時人以爲知言晚節亦不復釣端坐蓽門啜菽飲水徴辟皆不就莊子矯矯子法賜並徴不至丗有隱行}
