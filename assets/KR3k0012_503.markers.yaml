  - {type: variant, offset: 1976, length: 1, content: 文, SBCK: 翻字長翔不交丗事家于臨川唯以漁獵爲娯常以車獵道逢病人以車送之徒歩而返􅁃亮薦公車徴不就乗小舡歸武昌􅁃翼躬徃造之以翻船狹小欲引入大􅂳翻曰使君不以名鄙賤而辱臨之此固野人之舟也遂不肯翼便俯屈入其􅂳中終日而去又曰孫略}
