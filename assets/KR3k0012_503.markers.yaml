  - {type: variant, offset: 808, length: 104, content: 次卿汝南人閑居不修人倫都尉逼為功曹廳事前樹時有清汁以為甘露敬曰明府政未能致甘露此木汁耳辭病去隱處精學同郡鄧敬公為督郵過存敬敬方釣魚於大澤因折芰為坐以荷薦肉瓠瓢盈酒言談彌日蓬廬蓽門琴書自娛世祖公車徵不行又曰楊后, SBCK: 玄度丹陽許玄}
