  - {type: variant, offset: 1916, length: 0, content: '', WYG: 徳非干木何敢稽停明命遂至姑藏祚遣其太子太和以執友禮造纎稱疾不見贈遺一皆不受後卒諡曰𤣥虛先生又曰鄧粲長沙人也少以髙潔著名與南陽劉驎之南郡劉尚公同志友善並不應州郡辟命荆州刺史桓公卑辭厚禮請粲為别駕粲嘉其好賢乃起應召驎之尚公謂粲曰卿道廣學深衆所推懐忽然改節誠非所望粲答曰足下可謂有志於隠而未知隠夫隠之為道朝亦可隠市亦可隠隱初在我不在於人尚公等無以難之又曰汜騰字無忌燉煌人舉孝亷除郎中}
