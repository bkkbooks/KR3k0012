  - {type: variant, offset: 502, length: 1, content: 交, WYG: 修經典勸教但以至道虛無為宗其居依崇岩幽谷鑿地為窟居穴為宫六十為步五日一朝其教以形不以言弟子受業觀形而退立道壇于窟上每旦朝拜之食用瓦器鑿而為釡左右居人饋之衣食一無所受年在期頥而視聽無爽苻堅遣使徴之乃至長安堅賜以衣冠辭曰年朽髪落不堪衣冠請以野服入謁從之後堅以安車送之行達華山歎曰我東嶽士殁於西嶽命也奈何行五十里及闗而死堅諡安道先生又曰石垣字洪孫自云北海􅀈人居無定處不娶妻妾不營産業食不求美衣必麄弊或有遺其衣服受而施人人有喪葬輙杖策弔之路無逺近時有寒暑必在其中或同日共時咸皆見之姚萇之亂莫知所終又曰郭荷字承沐洛陽人也其世祖整漢安順之世公府八辟公車五徴皆不就自整及荷世以學終荷明究羣籍特善𨽻書不應州郡之命張祚遣使者以束帛安車徴為博士祭酒後主疏乞還祚以安車蒲輪送還張掖東山年八十卒諡曰𤣥徳先生又曰祁嘉字孔賔酒泉人也少清貧好學年二十餘夜聞空中有聲呼曰祁孔賔隱去來修飾}
