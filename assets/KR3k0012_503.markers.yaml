  - {type: variant, offset: 1223, length: 689, content: 字子明少遊太學後遁常山并州牧高幹辟不至表安樂令不就後遷居任縣廣平太守盧毓到官二日綱紀曰承前致版謁臶毓教曰張先生所謂上不事天子下不友諸侯豈此版所可光飾哉但遣主簿奉書致羊酒之禮王隱晉書曰魏末有孫登字公和汲郡人無家屬時人於汲郡北山上土窟中得之夏則編草為裳冬則被髮覆面對人無言好讀易鼓琴初宜陽山中作炭者忽見有人不語精神不似常人帝使阮籍往視與語亦不應籍因大嘯野人乃笑曰爾復作向聲籍又為嘯籍將求出野人不聽而去登出並嘯如簫韶笙簧之音聲震山谷而還問炭人曰故是向人耳尋知求不知所止推問久之乃知姓名孫登別傳又載又曰庾袞字叔褒頴川人與弟子治藩必跪而授條夌孰穫者雖畢而多捃者袞退待間乃方自捃不曲行旁掇跪而把之每飢率其邑人入於山林拾橡為郡功曹舉清白異行皆不就值亂攜妻子入林慮民歸之葆於大頭山而田其下有終焉之心咳發柱杖將起杖跌墜岸而死又曰董京字威輦不知何許人太始初值魏禪晉遂被髮佯狂常宿白社中時乞於市得殘碎繒絮結以自覆全帛佳綿則不肯受著作孫楚就社中與語遂載與歸終不肯坐後數年去莫知其所其寢處得一石子及詩曰未世流奔以文代質逝將抱此玄虛歸我寂寞之室又曰夏統字仲御會稽人常學戲舡其母疾市藥于洛陽賈充聞而訪之問曰卿居海濱作何戲習仲御曰能戲舡耳充因命焉仲御即登舟鼓枻為鯆音孚音甫魚浮之歌學鯆䱐之狀俄然雲霧杳冥白魚跳入其舡充甚異之因就與語仲御不對充整服謝之仲御引掉而去弗之見也充乃歎曰可謂木人石心哉初仲御在鄉也人或說之使仕仲御勃然作色謂之曰我安能隨俗低眉下意乎聞君之言不覺寒毛競豎白汗四匝顏如渥丹心如火炙舌不住齒口不能張兩耳閉塞雙眸俱瞑也遂竟不仕又曰董養字仲道惠帝時遷楊后于金墉有侍婢十餘人賈后奪之然後絕膳八日而崩仲道, WYG: 纎}
