  - {type: variant, offset: 1917, length: 0, content: '', WYG: 下兵亂去官還家太守張閟造之閉門不見禮遺一無所受歎曰吾聞亂世貴而能貧乃可以免散家財五十萬以施宗族柴門灌園琴書自適刺史張軌徴之為府司騰曰門一杜其可開乎固辭病卒又曰王長字文徳都廣漢}
