  - {type: variant, offset: 21, length: 0, content: '', SBCK: 也少有志尚愽學善属文恬靜不接交遊召拜太子舎人諸王文學累徴不起永嘉末沒于劉聦拜太中大夫固辭不受又厯石季龍之世並不應辟命雖處喪亂之中頽然髙邁視榮利蔑如也及冉閔􅆫亂復備禮徴爲太常謐遺閔書因不食而卒又曰索襲字偉祖燉煌人也虚靜}
