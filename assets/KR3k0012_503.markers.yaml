  - {type: variant, offset: 130, length: 2, content: 向栩, SBCK: 楊軻天水人也少好易長而不娶學業精微養徒數百常食麄飯飲水衣短褐人不堪其憂而軻悠然自得踈賔異客音㫖未嘗交也雖受業門徒非入室弟子莫得親言欲所論授入室弟子令相與宣授劉曜僭號徵拜太常軻固辭不赴曜亦敬而不逼遂隱於隴山及曜爲石勒所擒秦人東徙軻留長安石季龍嗣位備􅀇纁束帛安車徵之軻以疾辤迫之乃發旣見季龍不拜與語不言有司以軻倨傲請從大不敬論季龍弗從下詔任軻所尙常卧土床覆以布被倮寢其中下無茵褥潁川荀輔好奇之士也造而談經軻瞑目不荅輔發軻披露其形大􅀏之軻神體頽然無驚怒之狀于時咸以爲焦先之徒未有能量其深淺也後上䟽陳思鄕求還季龍送以安車蒲輪自歸秦州仍教授不絶又日公孫鳳}
