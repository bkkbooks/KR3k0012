  - {type: variant, offset: 179, length: 0, content: '', SBCK: 也慕容暐以安車徵至鄴及見暐不言不拜衣食舉止如在九城賔客造請鮮得與言數年病卒又曰公孫永字子陽襄平人也少而好學恬虚隱於平郭南山不娶妻妾非所墾植不衣不食吟咏巖間忻然自得年逾九十操尚不􅃜與公孫鳯俱􅀍慕容暐徴至鄴王公巳下造之不與言雖經隆寒盛暑端然自􅀂一􅀊餘詐狂暐送之平郭}
