  - {type: variant, offset: 17, length: 3, content: 定臨涇, SBCK: 車徴皆不應常冠皮弁弊衣躬耕山藪後避難宕渠郷里宗族依慿之者以百數秀年出八十衆代之負檐秀曰各有老弱當先營護吾氣力猶足自堪豈以垂朽之年累諸君也年九十餘卒又曰辛謐字叔重隴西狄道}
