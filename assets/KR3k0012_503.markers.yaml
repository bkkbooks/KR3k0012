  - {type: variant, offset: 913, length: 510, content: 仲桓廣漢人潛身藪澤耦耕誦經司徒楊震表薦其高操公車特徵不就益州刺史焦參行部致謁后惡其苛暴時耕於大澤即委鉏疾逝參志恚之收其妻子錄繫欲以致后遂不知后所在乃出其妻子又曰張奉字公先弟表字公儀河內人兄弟少有高節立精舍教授惡衣麤食太傳袁隗以女妻奉送女奢麗奴婢百人皆被羅縠輜軿光路婦入門數年奉住精舍有如路人其妻待奉入朝乃徑前跪曰家公年老不以妾頑陋使侍君巾櫛自知不副雅操君如欲執梁鴻之高節妾欲懷孟光之徵志奉無以荅妻悉徹玩飾被服奴婢著縵帛執紡績具奉然後納之諸公連徵不就謂之張氏兩賢又曰符融字偉明少為都官郎恥之委去私事少府李膺膺常貴融融幅巾褐衣振袖清談膺捧手高聽歎息不暇郭林宗始入京師詣融融一見與定至交海內服融高識公府連徵不就魏志曰張臶在甸切字子明少遊太學後遁常山并州牧高幹辟不至表安樂令不就後遷居任縣廣平太守盧毓到官二日綱紀曰承前致版謁臶毓教曰張先生所謂上不事天子下不友諸侯豈此版所可光飾哉但遣主簿奉書致羊酒之禮王隱晉書曰魏末有孫登字公和汲郡人無家屬時人於汲郡北山上土窟中得之夏則編草為裳冬則被髮覆面對人無言好讀易鼓琴初宜陽山中作炭者忽見有人不語精神不似常人帝使阮籍往視與語亦不應籍因大嘯野人乃笑曰爾復作向聲籍又為嘯籍將求出野人不聽而去登出, SBCK: 逺逰}
