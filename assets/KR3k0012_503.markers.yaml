  - {type: variant, offset: 576, length: 0, content: '', SBCK: 温常往造之旣至見先生􅀍鹿裘坐于石室神無忤色温及僚佐數十人皆莫測之乃命伏滔爲之銘賛竟卒於山中又曰宋纎字令文燉煌人也少有逺操沉静不與丗交隱於酒泉南山酒泉太守馬岌髙尚之士也具威儀鳴鍾鼓造纎纎髙樓重閤拒而不見岌歎曰名可聞而身不可見徳可仰而形不可觀吾乃今而後知先生人中之龍也題詩於石壁曰丹崖百丈青壁萬尋竒木蓊􅊊蔚􅀂鄧林其人如玉維國之琛室邇人遐實勞我心纎注論語及爲詩頌數萬言年八十篤學不倦張祚復遣使者備禮徴爲太子友逼喻甚切纎喟然歎曰德非干木何敢稽停明命遂至姑臧祚遣其太子太和以執友禮造纎稱疾不見贈遺一皆不受後卒謚曰玄虚先生又曰鄧粲長沙人也少以髙㓗著名與南陽劉驎之南郡劉尚公同志友善並不應州郡辟命荆州刺史桓公卑辤厚禮請粲爲别駕粲嘉其好賢乃起應召驎之尚公謂粲曰卿道學􅀷衆所推懐忽然改節誠失所望粲荅曰足下可謂有志於隱而未知隱夫隱之爲道朝亦可隱市亦可隱隱􅀄在我不在於物公等無以難之又曰汜騰字無忌燉煌人舉孝廉除郎中天下兵亂去官還家太守張閟造之閉門不見禮遺一無所受歎曰吾聞亂丗貴而能貧乃可以免散家財五十萬以施宗族柴門灌園琴書自􅃴刺史張􅁤徴之爲府司騰曰門一杜其可開乎固辤病卒又曰王長文字德郁廣漢人少以才學知名放蕩不覉州郡辟爲别駕乃微服􅀼出舉州莫知所之後於成都市中蹲踞而坐齧胡餅食之刺史知其不出乃禮遣之於是閉門自守不交人事著通􅀇經四卷文言卦象可用以爲卜筮晉中興書曰虞喜字仲寜好學愽古中宗􅀄鎭江左上䟽薦喜公車徴不至司空賀循每一詣喜輙經信􅀫云不能測也康}
