  - {type: variant, offset: 822, length: 400, content: 為功曹廳事前樹時有清汁以為甘露敬曰明府政未能致甘露此木汁耳辭病去隱處精學同郡鄧敬公為督郵過存敬敬方釣魚於大澤因折芰為坐以荷薦肉瓠瓢盈酒言談彌日蓬廬蓽門琴書自娛世祖公車徵不行又曰楊后字仲桓廣漢人潛身藪澤耦耕誦經司徒楊震表薦其高操公車特徵不就益州刺史焦參行部致謁后惡其苛暴時耕於大澤即委鉏疾逝參志恚之收其妻子錄繫欲以致后遂不知后所在乃出其妻子又曰張奉字公先弟表字公儀河內人兄弟少有高節立精舍教授惡衣麤食太傳袁隗以女妻奉送女奢麗奴婢百人皆被羅縠輜軿光路婦入門數年奉住精舍有如路人其妻待奉入朝乃徑前跪曰家公年老不以妾頑陋使侍君巾櫛自知不副雅操君如欲執梁鴻之高節妾欲懷孟光之徵志奉無以荅妻悉徹玩飾被服奴婢著縵帛執紡績具奉然後納之諸公連徵不就謂之張氏兩賢又曰符融字偉明少為都官郎恥之委去私事少府李膺膺常貴融融幅巾褐衣振袖清談膺捧手高聽歎息不暇郭林宗始入京師詣融融一見與定至交海內服融高識公府連徵不就魏志曰張臶在甸, WYG: 喻甚}
