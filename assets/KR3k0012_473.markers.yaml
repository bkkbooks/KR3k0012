  - {type: variant, offset: 3563, length: 150, content: 孳息不可計貲擬王公馳名天下以興富於猗氏故曰猗頓也淮南子曰天下有至富而非金玉也至壽而非千歲也適情知足則富矣明死生之分則壽矣又呂氏春秋曰富貴而之不知道適足以為患出車入輦務以自佚命之曰蹶身之機肥肉厚酒務以自強命之曰爛腹之食靡曼皓齒鄭衛之音命之曰伐性之斧三患者富貴之所致又曰隨侯之珠和氏之壁得之而富失之而貧也, SBCK: 從如雲}
