  - {type: variant, offset: 1046, length: 1, content: 欲, SBCK: 後人有毁渉者乃姧人之雄䘮家子即時刺殺又曰卭成太后外家王氏貴而侍中王林卿通輕俠傾京師後坐法免賔客愈盛又曰漢興禁網踈闊外戚大臣魏其武安之屬競逐於京師遊俠劇孟郭解之徒馳騖於閭閻荀恱漢記曰立氣􅀔}
