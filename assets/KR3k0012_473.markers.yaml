  - {type: variant, offset: 3391, length: 171, content: 福則富貴至富貴則衣食美衣食美則驕心生驕心生則行僻邪而動棄理也行僻邪則身夭死動棄理則無成功尸子曰家有千金之玉而不知猶謂之貧也良功治之則富弇二國身有至貴而不知猶謂之賤也聖人告之則貴最天下孔叢子曰子思曰吾不取於人謂之富不屈於人謂之貴也又曰猗頓魯之窮士也耕則常飢桑則常寒聞淘朱公富往問術焉朱公告之子欲速富當畜五㹀於是乃適西河大畜牛羊於猗氏之南十年之間, SBCK: 徒}
