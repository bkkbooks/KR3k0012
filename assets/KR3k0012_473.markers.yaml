  - {type: variant, offset: 1598, length: 420, content: 視之得犬子雌雄各一長老云此名犀犬得之者富又曰有周攬嘖者貧而好道夫婦夜耕困臥夢天公過而哀之勑外有以給與司祿案云此人相貧限不過此唯有張車子應賜錢千萬車子未生請以借之公曰善曙覺言之於是夫妻戮力晝夜以治生所為輒得貲至千萬先時有嫗者常往攬嘖傭賃墅舍有身月滿孕使遣出駐車屋下產得兒主人往視哀其孤寒作糜粥以食之問當名汝兒作何嫗曰在車下生夢天告之名為車子攬嘖乃悟曰吾昔夢從天換錢外白以張車子錢貸我必是子也財當歸之矣自是居日衰減車子長富於周家又曰京兆長安有張氏者獨處室有鳩自外入于室止于對床張氏惡之披懷而祝曰為我禍耶飛上承塵為我福耶來入我懷鳩飜入懷以手探之則不知鳩之所在而得一金帶鉤焉遂寶之自是後子孫昌盛貲財萬倍故關西稱張氏鉤又曰河間管弼僑居臨水北岸田作商賈往往如意嘗載兩舫米下都糴垂行忽於宅中見一物形似鼉而長大行還輒大得利如此一家遂巨富二十年恒有萬斛米續搜神記曰廬陵巴丘人夕晃者世以田作為業年市田數十頃家漸富晉太元初秋收已過穫刈都畢明旦至田禾悉復滿鬱然如先, SBCK: ''}
