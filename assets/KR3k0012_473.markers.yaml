  - {type: variant, offset: 1042, length: 2, content: 惜錢, krp: 不避風雨又曰萬章字子夏長安熾盛街閭各有豪俠章在城西柳京號曰城西萬子夏爲京兆尹門下督從至殿中諸侯貴人争欲揖章莫與京兆言者又曰婁護字君卿是時王氏方盛賔客滿門兄弟争其客各有所厚唯誰盡入其門咸得其懽心結士大夫無不傾心交長者尤見親禮爲人短小精辯論議常依名節聽之者皆竦㑹母死送葬致車千兩又曰陳遵字孟公杜陵人身長八尺餘容皃甚偉性善書與人尺牘主皆藏去以爲榮時列侯有子與遵同姓字者每至人門曰陳孟公坐中莫不震動旣至而非因號曰陳驚坐又曰原渉爲谷口令時年二十餘谷口聞其名不言而治人甞置酒請渉入里門客有道渉所知母病避疾在里宅者渉即往候叩門哭因問以䘮事家無所有渉乃削牘爲䟽具記衣𬒳飯含之物分付市買日跌皆㑹其周急待人}
  - {type: punctuation, offset: 1046, content: ，, id: KR3k0012_CHANT_473-bkkpn306}
