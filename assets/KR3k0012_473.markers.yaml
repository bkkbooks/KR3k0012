  - {type: variant, offset: 2384, length: 202, content: 皆勿收獨求如願爾去果以繒帛送明辭之乃求如願神大怪明知之意甚惜不得已呼如願使隨去如願者青洪婢也常使之取物明將如願歸所欲輒得之數年大成富人意漸驕盈不復愛如願歲朝鷄一鳴呼如願如願不起明大怒欲棰之如願乃走明逐之於糞上糞上有昨日故歲掃除藂薪如願乃於此得去明不知謂逃在積薪糞中乃以杖棰使出久無出者乃知不能困曰汝但使我富不復棰汝今世人歲朝雞鳴時轉往棰糞云使人富也韓詩外傳曰陳之富人有處師氏者校車百乘觴於韞兵之止風俗通曰, SBCK: 唐書丘和}
