  - {type: variant, offset: 855, length: 184, content: 此遂為富室踰年因雨騰躍而去於是生貲日不暇給俗說云與龍共居不知龍神效矣說苑曰楚王問莊辛曰君子之富柰何對曰君子之富假貸人不買也飲食人不便不役也親戚愛之罪人善之不尚者事之皆欲其壽樂不傷於患此君子之富也論衡曰揚子雲作法言蜀富賈人齎錢十萬願載書子雲不能曰夫富無仁義猶圈中之羊安得妄載三輔決錄曰平陵士孫奮字景卿少為郡五官掾起宅得錢貲至一億七千萬富聞京師而性儉恡客舍雇錢甚少主人曰君, SBCK: ''}
