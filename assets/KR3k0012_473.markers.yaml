  - {type: variant, offset: 1042, length: 2, content: 惜錢, WYG: 不避風雨又曰萬章字子夏長安熾盛街閭各有豪俠章在城西柳京號曰城西萬子夏為京兆尹門下督從至殿中諸侯貴人爭欲揖章莫與京兆言者又曰樓䕶字君卿是時王氏方盛賓客滿門兄弟爭具客各有所厚唯䕶盡入其門咸得其懽心結士大夫無不傾心交長者尤見親禮為人短小精辯論議常依名節聽之者皆竦會母死送葬致車千兩又曰陳遵字孟公杜陵人身長八尺餘容貌甚偉性善書與人尺牘主皆藏去以為榮時列侯有子與遵同姓字者每至人門曰陳孟公坐中莫不震動既至而非因號曰陳驚坐又曰原涉為谷口令時年二十餘谷口聞其名不言而治人常置酒請涉入里門客有道涉所知母病避疾在里宅者涉即往候叩門哭因問以䘮事家旡所有涉乃削牘為疏具記衣被飯含之物分付市買日昳皆會其周急待人}
