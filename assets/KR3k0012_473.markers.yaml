  - {type: variant, offset: 2872, length: 227, content: 下莫有比契䟽鞅掌夜與夫人燭下散籌筭計又曰武帝嘗降王武子家武子供饌並不用盤悉用琉璃器婢子百餘人皆綾羅袴褶以手擎飲食蒸肫肥美於常味武帝怪問何由得尔云以人乳飲之武帝色甚不平所下飲食未畢便去又曰王君夫以飴糒澳釜石季倫以蠟炊君夫作絲布步障四十里崇作錦步障五十里石以椒為泥泥屏王以赤石脂泥壁新序曰魯孟獻子聘於晉韓宣子觴之飲三徒鍾石之懸不移而具獻子曰富哉宣子曰子之家孰與我富獻子曰吾家甚貧我有二士曰顏回慈無靈此二士者使吾邦家安平百姓和協客出宣子曰彼君子也以畜賢為富我鄙, SBCK: 陽}
