  - {type: variant, offset: 1896, length: 913, content: 關西稱張氏鉤又曰河間管弼僑居臨水北岸田作商賈往往如意嘗載兩舫米下都糴垂行忽於宅中見一物形似鼉而長大行還輒大得利如此一家遂巨富二十年恒有萬斛米續搜神記曰廬陵巴丘人夕晃者世以田作為業年市田數十頃家漸富晉太元初秋收已過穫刈都畢明旦至田禾悉復滿鬱然如先即使更穫於是遂巨富列女傳曰陶荅子妻者陶大夫荅子之妻也子治陶二年名譽不興家富三倍其妻數荅子怒曰非汝所知居五年從車百乘歸休宗人牽牛酒而賀之其妻抱兒而泣姑怒其不祥也婦曰夫子能薄而官大是謂縈害無功而家昌是謂積殃昔楚令尹之治國家貧而國富君敬之民戴之故福祿結於子孫名垂於後世今夫子貪富務大不顧後害妾聞南山有玄豹霧雨七日不下食何也飽其志飢其腹將欲以澤其毛衣而成其文章也故藏而遠害豕不擇食以肥身坐而須死今夫子治陶家日益富而國日益貧君不敬人不戴也夫子之逢禍必矣請去顧與少子俱脫於是遂棄之出其年荅子之家果以盜誅母老而免婦乃與少子歸養終始天年錄異傳曰昔廬陵邑子甌明者從客賈道經彭澤湖每輒以舡中所有多少投湖中云以為禮積數年後過見湖中有大道道上多風麝有數吏乘車馬來候云是青洪君使要明知是神然不敢不往甚怖問吏恐不得還吏曰無可怖責洪君以君前後有禮故要君必重送君者皆勿收獨求如願爾去果以繒帛送明辭之乃求如願神大怪明知之意甚惜不得已呼如願使隨去如願者青洪婢也常使之取物明將如願歸所欲輒得之數年大成富人意漸驕盈不復愛如願歲朝鷄一鳴呼如願如願不起明大怒欲棰之如願乃走明逐之於糞上糞上有昨日故歲掃除藂薪如願乃於此得去明不知謂逃在積薪糞中乃以杖棰使出久無出者乃知不能困曰汝但使我富不復棰汝今世人歲朝雞鳴時轉往棰糞云使人富也韓詩外傳曰陳之富人有處師氏者校車百乘觴於韞兵之止風俗通曰河南平陰龐儉本魏郡鄴人遭倉卒之世失其父時儉三歲弟纔襁抱耳流傳客居廬里中鑿井得錢千餘萬遂富儉作府吏躬親家事行求老倉頭謹信屬任者年六十餘直二萬錢使主牛馬耕種有賓婚大會母在堂上酒酣陳樂歌笑奴在竈下助廚竊言堂上母我婦也客罷婢語次說老奴無狀為妄語所說不可道也窮誌具白母謂婢試問其形狀奴曰家居鄴時在富樂里宛西婦艾氏女字阿橫大兒字阿嶷小兒曰越子時為縣吏為人所略賣阿橫右足下有黑子右胲下赤誌如半櫛母曰是汝公也因下堂相對啼泣兒婦前為汝公拜即洗浴身見衣被遂為夫婦如初, WYG: ''}
