  - {type: variant, offset: 1371, length: 4, content: 皆棄置而, SBCK: 其頭以示張張憙氣因絶惲見令以狀首令應之遟趍出詣獄令跣追之不及即自入獄謝惲抜刃自嚮以要惲曰子不從我岀敢不以死明心乎惲遂岀魏志曰典韋陳留人已皃魁梧力過人好豪俠襄邑劉氏與睢陽李禮爲讎韋報之禮故冨春長備怨其謹韋乗車載鷄酒僞􅀱者開懷匕首入殺禮并妻徐出取車上刀㦸歩}
