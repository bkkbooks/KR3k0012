  - {type: punctuation, offset: 39, content: 『, id: KR3k0012_CHANT_473-bkkpn11}
  - {type: variant, offset: 39, length: 1, content: 為, SBCK: 吾嘗過薛其俗閭里多􅁀桀子弟與鄒魯殊問其政曰孟常君招致天下任俠姦人薛中盖六萬家矣又曰鄭衛俗與趙伯􅀋濮上}
  - {type: variant, offset: 39, length: 0, content: '', WYG: 吾常過薛其俗閭里多暴傑子弟與鄒魯殊問其故曰孟嘗君招致天下任俠姦人薛中葢六萬家矣又曰鄭衞俗與趙相類濮上之邑徙衞野王縣也王好氣任俠衞之風也又曰寗成抵罪得脫乃詐刻傳出闗歸家稱曰仕不至二千石賈不至千萬安可比人乎乃貰貸買陂田千餘頃役使數千家數年産至千金}
  - {type: page-break, offset: 39, content: '', id: KR3k0012_WYG_473-3b, image: WYG0897/WYG0897-0308d.png}
  - {type: variant, offset: 39, length: 1, content: 為, krp: 吾嘗過薛其俗閭里多暴桀子弟與鄒魯殊問其政曰孟常君招致天下任俠姦人薛中盖六萬家矣又曰鄭衛俗與趙伯類濮上}
  - {type: variant, offset: 40, length: 0, content: '', WYG: 任俠其役民重於郡守又曰列國公子魏有信陵趙有平原齊有孟嘗楚有春申皆籍王公}
  - {type: variant, offset: 41, length: 1, content: 柰, SBCK: 邑徙衛野王縣也王好氣任俠衛之風也又曰寗成抵罪得脫乃詐刻傳岀􅀜歸家稱曰仕不至二千后賈不至千萬安可比人乎乃貫貸買陂田千餘頃役使數千家數年産至千金爲任俠其役民重於郡守又曰列國時魏有信陵趙有平原齊有孟嘗楚有春申皆藉王公之􅀔悉爲遊俠鷄鳴狗盗無不賔禮而趙相虞卿弃國􅂢君以周窮支魏齊之厄信陵無忌竊符矯命殺將專師以赴平原之急皆以取重諸侯顯名天下搤腕而遊談者以四豪爲稱首又曰季布爲人任俠有名項籍滅髙祖購求布千金敢舎匿罪三族布匿濮陽周氏周氏曰漢求將軍急且至能聽臣敢進計布許之迺髠鉗布衣􅄄置廣柳車中而共其家僮數十人之魯朱家所賣之朱家心知其季布也置田舎乃之雒陽見汝隂侯􅅬公說曰季布}
  - {type: page-break, offset: 41, content: '', id: KR3k0012_SBCK_473-2b}
  - {type: variant, offset: 41, length: 1, content: 柰, WYG: 勢悉為遊俠雞鳴狗盜無不賓禮而趙相虞卿弃國相印以周窮交魏齊之危信陵無忌竊符矯命殺將專師以赴平原之急皆以取重諸侯順名天下搤腕而遊談者以四豪為稱首漢書季布為人任俠有名項籍滅髙祖購求布千金敢舎匿罪三族布匿濮陽周氏周氏曰漢求將軍急且至能聽臣敢進計布許之廼髠鉗布衣褐置廣柳車中而共其家僮數十人之魯朱家所賣之朱家心知其季布也置田舎乃之雒陽見汝陰侯滕公說曰季布}
  - {type: page-break, offset: 41, content: '', id: KR3k0012_WYG_473-4a, image: WYG0897/WYG0897-0309a.png}
  - {type: variant, offset: 41, length: 1, content: 柰, krp: 邑徙衛野王縣也王好氣任俠衛之風也又曰寗成抵罪得脫乃詐刻傳岀關歸家稱曰仕不至二千后賈不至千萬安可比人乎乃貫貸買陂田千餘頃役使數千家數年産至千金爲任俠其役民重於郡守又曰列國時魏有信陵趙有平原齊有孟嘗楚有春申皆藉王公之勢悉爲遊俠鷄鳴狗盗無不賔禮而趙相虞卿弃國捐君以周窮支魏齊之厄信陵無忌竊符矯命殺將專師以赴平原之急皆以取重諸侯顯名天下搤腕而遊談者以四豪爲稱首又曰季布爲人任俠有名項籍滅髙祖購求布千金敢舎匿罪三族布匿濮陽周氏周氏曰漢求將軍急且至能聽臣敢進計布許之迺髠鉗布衣褐置廣柳車中而共其家僮數十人之魯朱家所賣之朱家心知其季布也置田舎乃之雒陽見汝隂侯滕公說曰季布}
