  - {type: variant, offset: 194, length: 162, content: 夫昔鬭斗子文三舍令尹無一日之積恤民故也成王每出子文之祿必逃王止而復人謂子文曰人生求富而子逃之何也對曰夫從政者以庇民也民多曠曠寡而我取富是不勤民以自封也封厚死無日矣我逃死非逃富也太公六韜曰文王問守土柰何對曰人君必從事於富弗富不足為人弗與無以合親䟽其親則困失其眾則敗也太史公素王妙論曰諸稱富者非貴其身得志也乃貴恩覆子孫而澤及鄉里, SBCK: 猾}
