  - {type: 'tls:seg', offset: 37, content: '', id: KR3k0012_CHANT_473-1a.7}
  - {type: variant, offset: 37, length: 0, content: '', SBCK: 至濮陽見嚴仲子曰前日所以不許子曰徒以親也親今不幸死仲子所欲報者爲誰仲子具告之政獨行拔劒至韓韓適有東孟之㑹韓王及相皆在焉持兵㦸而衛者甚衆政直入上階刺韓傫傫走而抱哀侯聶政刺之兼中哀侯左右大亂又曰大史}
  - {type: variant, offset: 37, length: 0, content: '', WYG: 至濮陽見嚴仲子曰前日所以不許子者徒以親也親今不幸死仲子所欲報者為誰仲子具告之政獨行㧞劍至韓韓適有東孟之會韓主及相皆在焉持兵㦸而衞者甚衆政直入上階刺韓傫傫走而抱哀侯聶政刺之兼中哀侯左右大亂史記太史}
  - {type: page-break, offset: 37, content: '', id: KR3k0012_WYG_473-3a, image: WYG0897/WYG0897-0308c.png}
  - {type: variant, offset: 37, length: 0, content: '', krp: 至濮陽見嚴仲子曰前日所以不許子曰徒以親也親今不幸死仲子所欲報者爲誰仲子具告之政獨行拔劒至韓韓適有東孟之㑹韓王及相皆在焉持兵㦸而衛者甚衆政直入上階刺韓傫傫走而抱哀侯聶政刺之兼中哀侯左右大亂又曰大史}
