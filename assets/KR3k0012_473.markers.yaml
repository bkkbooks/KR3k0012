  - {type: 'tls:seg', offset: 43, content: '', id: KR3k0012_CHANT_473-1a.9}
  - {type: variant, offset: 43, length: 1, content: 孔, SBCK: 罪臣各爲其主項氏臣豈可盡誅耶今上始得天下而以私怒求一人何示不廣且以季布之賢漢求之急如此不北走胡則南走越耳夫忌壯士資敵國此伍}
