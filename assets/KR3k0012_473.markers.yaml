  - {type: variant, offset: 29, length: 0, content: '', SBCK: 不延頸願交焉又曰楚田仲以俠聞父事朱家田仲死而有雒陽劇孟以任俠顯呉楚反時條侯爲太尉乗傳東至河南得劇喜曰呉楚舉}
  - {type: variant, offset: 29, length: 0, content: '', WYG: 不延頸願交又曰楚田仲以俠聞父事朱家田仲死而有雒陽劇孟以任俠顯吳楚反時條侯為太尉乗傳東至河南得劇孟喜曰吳楚舉}
  - {type: variant, offset: 29, length: 0, content: '', krp: 不延頸願交焉又曰楚田仲以俠聞父事朱家田仲死而有雒陽劇孟以任俠顯呉楚反時條侯爲太尉乗傳東至河南得劇喜曰呉楚舉}
  - {type: variant, offset: 30, length: 1, content: 乎, SBCK: 事而不求孟吾知其無能爲也天下騷動􅌠相得之若一敵國而劇孟行大􅀋朱家孟母死自逺方送䘮車盖千乗又曰郭解河内軹人字伯翁善相者許􅀒外孫也解父以任俠孝文時誅死解爲人短小精悍不飲酒少時隂賊感槩不快意身所役甚衆以軀借支報仇藏亡令作姦剽刼不休及鑄錢掘􅃁不可勝數年長更折節爲儉以德報怨厚施薄望然其自喜爲俠益甚解姉子􅀒解之􅀔與人飲之嚼徐廣曰盡酒也音子妙反非其任強灌之人怒抜刀刺殺解}
  - {type: page-break, offset: 30, content: '', id: KR3k0012_SBCK_473-1b}
  - {type: variant, offset: 30, length: 1, content: 乎, WYG: 事而不求孟吾知其無能為也天下騷動大將軍得之若敵國云孟行大類朱家孟母死自遠方送䘮車葢千乗及孟死家不餘十金之財又曰郭解河内軹人字伯翁善相者許負外孫也解父素任俠孝文時誅死解為人短小精悍不飲酒少時隂賊感槩不快意身所殺甚衆以軀借交報仇藏命作姦剽刼不休及鑄錢掘冡不可勝數年長更折節為儉以德報怨厚施薄望然其自喜為俠益甚解姉子負解之勢與人飲使之釂徐廣曰盡酒也音子妙反非其任强灌之人怒㧞刀刺殺解}
  - {type: page-break, offset: 30, content: '', id: KR3k0012_WYG_473-2a, image: WYG0897/WYG0897-0308a.png}
  - {type: variant, offset: 30, length: 1, content: 乎, krp: 事而不求孟吾知其無能爲也天下騷動宰相得之若一敵國而劇孟行大類朱家孟母死自逺方送䘮車盖千乗又曰郭解河内軹人字伯翁善相者許負外孫也解父以任俠孝文時誅死解爲人短小精悍不飲酒少時隂賊感槩不快意身所役甚衆以軀借支報仇藏亡令作姦剽刼不休及鑄錢掘冡不可勝數年長更折節爲儉以德報怨厚施薄望然其自喜爲俠益甚解姉子負解之勢與人飲之嚼徐廣曰盡酒也音子妙反非其任強灌之人怒抜刀刺殺解}
  - {type: variant, offset: 33, length: 1, content: 富, SBCK: 徵之賊窘自歸}
  - {type: variant, offset: 33, length: 2, content: 富且, WYG: 㣲知賊窘自歸具以實告解解曰公殺之固當吾兒不直遂去諸公聞之皆多解之義益附焉戰國䇿曰韓傫相韓嚴遂重於君二人相害也嚴遂正議直指舉韓傫之過韓叱之於朝嚴遂㧞劒趍之於是懼亡去求人可以報韓傫者至齊人言聶政勇敢士也避讎隱於屠肆之間嚴遂陰交於政以意厚之政母死既䘮除政曰嗟乎政乃市井之人鼓刀以屠而嚴仲子乃諸侯之卿相也不遠千里枉車騎而交臣舉百金為親}
  - {type: page-break, offset: 33, content: '', id: KR3k0012_WYG_473-2b, image: WYG0897/WYG0897-0308b.png}
  - {type: variant, offset: 33, length: 1, content: 富, krp: 徵之賊窘自歸}
  - {type: variant, offset: 35, length: 0, content: '', SBCK: 以實告解解曰公殺人當吾兒不直遂去諸公聞之皆多解之義益隱焉戰國策曰韓傫相韓嚴遂重於君二人相害也嚴遂正議直指舉韓傫之過韓叱之於朝嚴遂拔劒趍之於是懼亡去求人可以報韓傫者至齊人言聶政勇敢士也避仇隱於屠肆之間嚴遂隂交於政以意厚之政母死旣䘮除政曰嗟乎政乃市井之人鼓刀以屠而嚴仲子乃諸侯之卿相也不逺千里枉車騎而交臣舉百金爲親}
