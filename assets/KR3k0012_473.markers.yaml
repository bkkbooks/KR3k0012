  - {type: variant, offset: 2588, length: 283, content: 平陰龐儉本魏郡鄴人遭倉卒之世失其父時儉三歲弟纔襁抱耳流傳客居廬里中鑿井得錢千餘萬遂富儉作府吏躬親家事行求老倉頭謹信屬任者年六十餘直二萬錢使主牛馬耕種有賓婚大會母在堂上酒酣陳樂歌笑奴在竈下助廚竊言堂上母我婦也客罷婢語次說老奴無狀為妄語所說不可道也窮誌具白母謂婢試問其形狀奴曰家居鄴時在富樂里宛西婦艾氏女字阿橫大兒字阿嶷小兒曰越子時為縣吏為人所略賣阿橫右足下有黑子右胲下赤誌如半櫛母曰是汝公也因下堂相對啼泣兒婦前為汝公拜即洗浴身見衣被遂為夫婦如初時人為之語曰廬里諸龐鑿井得銅買奴得公子孫羞之言我先人初居廬里者兄弟二人家買奴得公尔世說曰司徒王戎既貴且富區宅僮役膏腴水碓之屬, SBCK: ''}
