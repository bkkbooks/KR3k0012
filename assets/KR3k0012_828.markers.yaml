  - {type: variant, offset: 4325, length: 0, content: '', WYG: 所有夕時便罷無人也今乃夜糴糓明癡騃不足也凡斬不施惠者曰夜糴傅子曰􅂕帝牓門官崔烈入錢五百萬取司徒語林曰蘇峻新平帑藏空猶餘數千端麤練王公謂諸公曰國家凋敝貢御不至但恐賣練不售吾當與諸賢各製練服之數日間賣遂大售端至一金應􅇵新詩曰大官有餘厨大小無不賣豈徒脯與糗醯醢及鹽䜴劉超譲表曰臣家理應用一純牛連市素不如意外廐猥牛中有任用者臣請以正陌三萬錢五疋布乞以買此牛詔曰監此不足賣與宜便賜之然義與前後辭譲不忘受一賜}
