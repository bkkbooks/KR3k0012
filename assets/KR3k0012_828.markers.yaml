  - {type: variant, offset: 2866, length: 2, content: 昔齊, WYG: 崔寔初父卒剽買田宅起冢塋立碑頌葬訖資産竭盡困窘因以酤醸販鬻為業時人多以譏之寔不之改亦取足而已不致盈餘吴志曰潘璋字文珪性博蕩嗜酒居貧好奢酤債家至門輙言後豪富相還宋書曰吏部尚書度仰文當令奴酤酒利其十百後魏書曰鄭羲為西兖州刺吏多所受納政以賄成性又嗇恡人}
