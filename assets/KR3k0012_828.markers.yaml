  - {type: variant, offset: 2966, length: 2, content: 孫卿, WYG: 興人也嫂亡無以葬自賣為十夫客以營冡椁從祖弟敬夫妻荒年被畧賣江北逹之有田十畆賣以贖之南史曰會稽寒人陳氏有三女無男祖父母年八九十老無所知又篤隆病母不安其室遇歲饑三女相率於西湖採菱蓴更日至市貨賣未嘗戱怠鄉里稱為義門北史曰齊常景躭好經史愛翫文詞若遇新異之書慇懃求訪或復貨買不問價之貴賤必以得為期晏子春秋曰􅂕公婦人丈夫飾者國盡服之公使禁之曰女子以男飾者裂其衣斷其帯裂衣㫁𢃄相望不止公問晏子晏}
