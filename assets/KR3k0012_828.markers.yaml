  - {type: variant, offset: 2794, length: 2, content: 百乘, WYG: 朱泙漫學屠龍於支離益單千金之家技成而無所用尉繚子曰太公望行年七十屠牛朝歌尸子曰屠者割肉則知牛長少又曰宋人有公斂皮者適市反呼曰公斂皮屠者􅃍收其皮燕丹子曰荆軻與武陽入秦過陽翟軻買肉争輕重屠者辱軻武陽欲撃軻止之淮南子曰命屠而烹其肉或以酸或以甘劑和萬方其本一牛之體也又曰屠牛坦一朝觧九牛而刃可以剃毛庖丁為刃十九年刃如新砥硎庖丁又砥磨也何則逰乎衆虛之門賈誼書曰屠牛坦一朝觧十二牛而芒刃不頓剥割皆中理鹽鐵論曰騏􅂹輓車垂頭於太行之坂屠者脫之桓譚論曰関東鄙語曰人聞長安樂出門西向笑知肉味美則對屠門而大嚼三輔舊事曰太上皇不樂関中思慕鄉里髙祖徙豐沛屠兒賣餅商人立為新豐縣故多小人又曰更始遣将軍李松攻王莽屠兒賣餅者皆従之屠兒杜虞手殺莽凉州異物志曰大秦}
