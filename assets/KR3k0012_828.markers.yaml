  - {type: variant, offset: 2963, length: 1, content: 禮, WYG: 欲令近臣自諸曹侍中以上家無得私販賣者又曰中平元年初賣官自闗内侯以下至虎賁羽林入錢各有差公千萬卿五百萬東觀漢記曰光武常與朱祐皆買蜜合藥上追念之即賜祐白蜜二石問今憶與朕長安時共買蜜乎又曰郭丹從師長買繻入函谷闗乃慨然歎曰丹不乗使者車終不出闗又曰司空宋𢎞常受俸得鹽豉千斛遣諸生迎取上河令糶之鹽賤諸生不糶𢎞怒便遣及其賤悉糶賣不與民争利謝承後漢書曰靈帝數遊戱於西園令後宫綵女為客主身為商賈謝承後漢書曰張楷字公超治嚴氏春秋家貧無以為業嘗乗驢車至縣賣藥足給食輙還鄉王隐晉書曰劉宴字子真平原人少貧苦糠飯繩索作牛衣賣手䋲口誦齊書宋文濟字敬逹吳興人自賣以葬母太守謝瀹命為儒林不就又曰吳逹}
