  - {type: variant, offset: 2948, length: 1, content: 軻, WYG: 者既而葬諸斗城論語曰百工居肆以成其事君子學以致其道續漢書曰孝􅂕皇帝於後宫與人列肆販賣使偷盗争闘上視以為樂謝承後漢書曰郭泰㧞申屠子陵於漆工之中嘉許偉康於屠酤之肆袁山松後漢書曰世祖令盆子賞甚厚以為趙王郎中後以疾失明賜均輸官地以為列使食税於其身晋中興徴祥説曰孝宗世㑹稽王輔政於府内園中穿池築山山池之間䖏䖏有女婢沽酒賣肉于其中道子將見幸乗船至酒肆輙携入肆買肉状如㕓以為笑樂梁書曰吕僧珎為南兖州刺史從兄子先以販葱為業僧珍至乃棄業求州官僧珍曰吾荷國㤙重無以報效汝等固有常分豈可妄求叨越當速反葱肆耳皇甫謐髙士𫝊曰許劭名}
