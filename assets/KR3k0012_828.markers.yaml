  - {type: variant, offset: 2944, length: 1, content: 徙, WYG: 曰魯匡曰今絶天下之酒則無以行禮相飬放而亡限費財傷民請法古令官作酒以千五百石為一率関一盧以賣如淳曰酒家関四得客設酒盧故以盧名肆臣瓉案盧酒瓮世説曰阮公見酒家婦有美色當盧酤酒阮與王安豐常從婦飲酒既醉便眠其婦側夫始殊疑之伺察終無他意又曰王濬冲為尚書令着公服乘軺車經黄公酒盧下過顧謂後車曰昔吾與􅄞叔夜阮嗣宗共酧飲於此竹林之逰亦預其末自􅄞生阮公亡以来便為時所羈紲今日視此雖近邈若山河南史曰謝幾卿性通脫㑹意便行不拘朝憲常預樂逰苑宴不得醉而還因詣道邉酒盧停車褰幔與車前三騶對飲時觀者如堵卿處之自若肆周禮天官内宰之職曰凡建國佐后立市設其次置其叙正其肆地官下曰肆長各掌其肆之政令陳其貨賄名相近者相逺也實相近者相邇也而平正之左傳襄三十年曰伯有死於羊肆羊肆市列子産禭之枕之股而哭之斂而殯諸伯有之臣}
