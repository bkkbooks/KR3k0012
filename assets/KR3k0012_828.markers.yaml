  - {type: variant, offset: 2918, length: 6, content: 商皆悅願藏於, WYG: 法則其弊革矣韓子曰宋有酤酒者升概甚平遇客甚美為酒甚美懸旗甚髙然而酒酸不售怪其故問所知問長者楊青楊青曰汝狗猛也狗猛也何故不售曰人長焉或令孺子懐錢契壺往酤而狗迎齕之酒所以酸而不售夫國亦有狗猛迎而齕之士懐其術而徃欲以明萬乘之主臣為狗猛迎而齕之如此則主所以蔽士所以不用也賈誼新書曰鄒穆公視民如子及死酤家不售酒童子不謳歌列仙𫝊曰酒客者梁}
