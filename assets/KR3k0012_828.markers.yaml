  - {type: variant, offset: 1339, length: 4, content: 何武兄弟, krp: 中平元年𥘉賣官自關内侯以下至虎賁羽林入錢各有差公千萬卿}
  - {type: variant, offset: 1344, length: 144, content: 人皆為郡吏縣敬憚之武弟顯家有市籍租常不入縣數負其課市嗇夫求商辱捕顯家顯怒欲以吏事中商武曰以吾家租賦繇役不眾為先奉公吏不亦宜乎又曰刺繡文不如倚市門此言末業貧者之資也又曰司隸校尉解光秦王根縱橫恣意大治宮室第中起土山立兩市殿上赤墀戶下青瑣又曰永平中王尊為京兆尹拊循貧弱不私豪強長安宿豪大猾東市賈, SBCK: 百}
