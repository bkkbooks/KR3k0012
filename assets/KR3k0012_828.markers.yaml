  - {type: variant, offset: 3702, length: 411, content: 集論二十餘萬言以為備天地萬物古今之重號白呂氏春秋布咸陽市懸千金其上延諸侯遊士賓客有能增損改定一字者與千金莫能有定者桓譚新論曰扶風漆縣之邠亭部言本大王所據其民會日相與為夜市如不為則有羞風俗通曰市井俗說市井者言至市有所鬻賣當於井上洗濯令其物香潔然後到市又曰陳留太守泰山吳文章少孤遭憂衰之世與兄伯武相失別二十年後會下邳市爭計共鬥伯武歐文章欲報擊之心中惻愴手不能舉大自怪也因投杖於地觀者咸嗤笑之還相問乃真兄弟也列仙傳曰陰生者長安中渭橋下乞兒也常止於市中乞市中厭若以糞灑長吏試之收繫著桎梏而續在市中乞又欲殺之乃去灑者家室自壞殺十餘人長安中謠曰見乞兒與美酒可以免破家之咎神仙傳曰李阿者蜀人也傳世見之不老如故常乞於成都市所得隨以與貧者夜去朝還市人莫知其宿處漢名臣奏曰太尉屬應劭司徒屬孫嵩司空掾孔伷議以鮮卑隔在漠北犬羊為君無君長之師廬落之居又其天性貪而無信故自漢興至于茲數犯障塞吏民創楚不與交關唯至朝市反成靡服非畏威懷德實玩中國珍異之故耳, SBCK: 豚聲}
