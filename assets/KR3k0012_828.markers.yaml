  - {type: variant, offset: 11, length: 0, content: '', SBCK: 酒之處累土爲盧以居酒瓮四邊隆起其一靣髙形如鍜盧故名盧耳又曰霍光秉政趙廣漢事光及薨後廣漢爲京兆尹心知微指發長安吏自將與俱至光子禹弟直突入其門捜索私屠酤椎破盧罌又曰魯匡曰今絶天下之酒則無以行禮相養放而亡限費財傷民請法古令官作酒以千五百石爲一率開一盧以賣如淳日酒家開肆得客設酒盧故以盧名肆臣瓉案盧酒瓮丗􅀃曰阮公邑家婦有美色當盧酤酒阮與王安豐常從婦飲酒旣醉便眠其婦側夫始殊疑之伺察終無他意又曰王濬冲爲尚書令着公服乗軺車經黄公酒盧下迴頋謂後車客曰吾與􅄞叔夜阮嗣宗共酣飲於盧竹林之遊亦預其末自􅄞生阮公亡以來便爲時}
