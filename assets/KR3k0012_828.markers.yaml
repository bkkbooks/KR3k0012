  - {type: variant, offset: 2000, length: 624, content: 居弘農山中學者隨之所居成市後華陰山南遂有公超市典略曰荊軻者其先齊人也與燕之狗屠及高漸離為友軻嗜酒日與狗屠飲於燕市漸離擊筑荊軻和之而歌相泣魏略曰趙岐逃難江淮海岱靡所不歷自匿姓名賣餅北海市中安丘孫嵩年二十遊市見岐察非常人乃停車問曰賣餅幾荅曰賣餅三十嵩曰視子非賣者當有怨者乃載岐歸家魏志曰遼東送袁尚首懸在馬市牽招覩之悲感又曰襄邑劉氏與睢陽李永為讎典韋為報之永故富春長備衛甚謹韋乘車載雞酒偽為候者門開懷匕首入殺永并殺其妻徐出取車上刀戟步去永居近市一市盡駭追者數百莫敢近又曰袁紹以董昭領魏郡時郡界大亂賊以萬數遣使往來交易市買昭厚待之因以為間乘虛掩討輒大克破之又曰顏斐為京兆太守青龍中司馬宣王在長安立軍市而軍中吏士多侵侮縣民斐以白宣王宣王乃發怒召軍市候便於斐前杖一百時長安典農與斐共坐以為斐宜謝乃私推築斐斐不肯謝良久乃曰斐意觀明公受分陝之任乃欲一齊眾庶必非為不得明公意也宣王遂嚴將吏士自是之後軍營郡縣各得其分又曰梁習為并州刺史鮮卑大人育延常為州所畏一旦將其部落五十餘騎詣習求互市習念不聽則恐其怨若聽到州下又恐為所略於是乃許往與會空城中交市遂勑郡縣自將治中已下軍往就之市易未畢而市吏收縛一胡延騎皆驚上馬彎弓圍習數重吏民惶怖不知所施習乃徐呼市吏問縛胡意而胡實侵民習乃使譯呼延延到習責延曰汝胡自犯法吏不侵汝汝何為使諸騎驚駭耶遂斬之餘胡破膽不敢動吳志曰孫皓愛妾或使人至市賤奪百姓財物司市中郎將陳聲素皓幸臣也恃皓寵遇繩之以法妾以訴皓皓大怒假他事燒鋸斷聲頭投其身於四望之下, SBCK: ''}
