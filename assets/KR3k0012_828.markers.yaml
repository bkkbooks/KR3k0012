  - {type: variant, offset: 4143, length: 1, content: 隊, WYG: 之踊貴漢武内𫝊曰帝先有玉杖一枝是西湖王所獻帝甚愛之崩後故以入槨其年有人於扶風郡市中買得者帝時左右侍人識之以告有司詰問云見市中一人扵巷賣之貴三十疋即催交直寔不識賣者姓名皇甫謐髙士傳曰毛公薛公皆趙人也遭戰國亂二人俱以䖏士隐於邯郸市毛公隐為博徒薛公隐為賣膠又曰韓康字伯休京兆㶚陵人常採藥名山賣於長安市口不二價三十餘年時女從賣藥康守價不與女子怒曰是韓伯休耶乃不二價康嘆曰我本避名今小女子皆知有我何用藥為乃遁㶚陵山中搜神記曰南陽宗定伯少年夜行逢鬼鬼問為誰定伯欺云我亦鬼遂為共侣赴宛行極困相擔問鬼曰畏何物曰唯不喜人唾欲至宛便担鬼着酒瓮上經詣市鬼化為羊恐其變並唾之賣得錢千五百晋後記曰成都王圍京邑城中魚肉}
