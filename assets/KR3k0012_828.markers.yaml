  - {type: variant, offset: 3, length: 0, content: '', SBCK: 八屠酤盧肆店附賣買駔㑹屠周禮地官下曰凡屠歛其皮角筋骨入于王府以當稅給作噐物也史記曰魏公子母忌請朱亥奪晉鄙軍亥􅀏曰臣乃市井鼓刀屠者公子親數存之所以不報謝者小禮無所用今乃臣効命之秋也又曰淮隂屠中少年有侮韓信者曰汝雖長大好帶刀劒中情怯耳又曰樊噲少以屠狗爲事東觀漢記曰閔仲叔客居安邑者老病家貧不能買肉日買一片猪肝屠者不肯爲斷王隱晉書曰愍懷太子令人屠肉自巳分齊手揣輕重斤兩不差公曰其母本屠家女齊書曰王敬則少時屠狗啇販遍於三呉後爲呉興太守入烏程從市過見屠肉枅歎是我少時在此作也召故人飲酒􅀃平生不以屑也蕭子顯齊書曰帝於芳樂􅁐立市太官毎旦進酒肉雜肴使宫人屠酤周書曰太祖常遊上黨有市屠壯徤衆多畏憚太祖氣凌之嘗醉命屠進几割肉小不如意叱之屠坦其腹謂太祖曰尓豪則刺我太祖即剚其腹市人駭觀執之屬吏李繼韜惜而逸之孔叢子曰子髙謂齊王曰昔臣甞行臨淄市見屠啇焉身脩八尺鬚髯如㦸市易之男女未有敬之者無徳故也莊子曰楚昭王謂司馬子綦曰屠羊􅀃居處卑賤陳義甚髙子爲我延之以三旌之位􅀃曰夫三旌之位吾知其貴於屠羊之肆萬鍾之禄吾知其冨於屠羊之利然豈可貪爵禄使吾君有妄施之名願復反吾屠羊之肆遂不受也又曰朱泙漫學屠龍於支離益單千金之家技成而無所用尉繚子曰太公望行年}
