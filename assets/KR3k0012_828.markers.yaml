  - {type: variant, offset: 1799, length: 160, content: 訟輒云第五掾平市無姦枉欺詐之巧又曰更始在長安官爵多群小里閭語曰使兒居市決作者不能得傭之市空返問何故曰今日騎都尉往會日也猶是四方不復信向京師又曰王郎起上在薊郎移檄購上上令王霸至市中募人將以繫郎市人皆大笑舉手揶揄之霸慚而去又曰竇融請孔奮置議曹掾守姑臧長天下擾亂唯西河獨安而姑臧稱為富邑通貨胡羗市曰四合每居縣者不盈數日輒致豐積, SBCK: 利}
