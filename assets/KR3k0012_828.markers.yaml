  - {type: variant, offset: 2953, length: 0, content: '', WYG: 男女䴡靡奢于許史繁欽嘲應徳璉文曰應温徳云昔與季叔才俱到富波飲於酒肆日暮留宿主人有飬女年十五肥頭赤面形似鮮卑偶悦之夜與通姦便住足下荘子曰曽不如早索我於枯魚之肆揚子法言曰如書不能要諸仲尼肆也李軌註曰賣書市書不經非書也語林曰王仲祖少有三逹覽鏡自翫曰王開山那生此兒又酷貧帽敝自以形美乃入帽肆就帽嫗戱乃得新帽店世説曰阮修字宣子常步行一百錢挂杖頭至酒店便獨酌酣暢崔豹古今註曰店置也以置貨鬻之物賣買周禮地官下曰泉府掌以市之征布斂市之不售貨之滯於民用者以其賈之物揭而書之以待不時而買者買者各從其抵都鄙從其主國人郊人從其有司然後予之又曰司市掌市之治教以量度成賈而徵儥儥買也物有定價則買者来也以質劑結信而止訟質劑謂兩書札而别之也以賈民禁偽而除詐以賈民為之者知物之情偽與寔詐以刑罰禁虣而去盗以泉府同而歛賖凡㑹同師役市司帥賈師而從治其市政掌其賣儥之事儥買也㑹同師役必市者大衆所在来物以備之質人掌成市之貨賄人民牛馬兵器珍異凡賣儥者質劑焉大市以質小市以劑鄭𤣥曰質劑月平價凡質大賈劑小賈𤣥謂質劑者為之劵書藏之也又曰賈師凡國之賣儥各帥禮記曲禮曰君子雖貧不鬻祭器左𫝊昭公二年公在乾侯平子每嵗賈馬具從者之衣履而歸之乎乾侯公執歸馬者賣之乃不歸馬史記曰子貢既學於仲尼退而仕衛鬻財於齊魯之間戰國策曰燕王見郭隗曰齊因孤國之亂而襲破燕何如對曰古之人君有以千金求千里馬者三年不得涓人請求之曰得千里馬馬已死五百金買其骨反以報君大怒對曰死馬尚市况生馬乎期年千里馬至者三漢書曰漢興接秦之弊諸侯並起民失作業而大饑饉米石五千人相食死者過半髙祖令民無得賣子就食蜀漢天下既定民無盖藏蘇林曰無物可盖藏又曰衛青比年出撃胡賦税既不足以奉戰士有司請令民得買爵及贖禁錮免贓罪請置賞官名曰武功爵級七十萬又曰桑𢎞羊置平凖於京師受天下委輸工官治車諸器皆仰給大農大農諸官盡籠天下之貨物貴則賣之賤則買之而富啇大賈無所牟大}
