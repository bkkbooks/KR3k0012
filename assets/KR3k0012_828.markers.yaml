  - {type: variant, offset: 756, length: 668, content: 楚圍宋也又昭公三年曰齊景公欲更晏子之宅曰子之宅近市湫隘囂塵不可以居湫下隘小也囂聲塵土也請更諸爽塏者爽明塏燥辭曰君之先臣容焉先臣晏子之先人臣不足以嗣之於臣侈矣侈奢也且小人近市朝夕得所求小人之利也敢煩里旅於眾也不敢勞眾為己宅公笑曰子近市識貴賤乎對曰既利之敢不識乎又昭公十九年楚令尹子瑕言蹶由於楚子曰彼何罪諺所謂室於怒市於色者楚之謂矣言靈王恕吳子而窟執其弟猶人忿於室家而作色於市人舍前之忿可也乃歸蹶由言楚子能用善言毛詩國風曰東門之枌疾亂也幽公淫荒風化之所行男女棄其舊業亟會於道路歌舞於市井爾又曰定之方中衛文公徙居楚丘始建城市而營宮室論語比考讖曰從善繹繹繈負如歸市爵不失德故恥無道主徒歸茂德之君繹繹相尋及之皃古史考曰神農作市高陽氏衰市官不脩祝融脩市戰國策曰王孫假年十五事閔王王出走失王之處其母曰汝事王王出走汝不知其處汝尚何歸王孫假乃入市中曰淖齒亂齊殺閔王欲與我者祖右市人從者四百人與之誅淖齒又曰齊桓公宮中九市管仲為三歸之家以掩桓公之非也漢書曰曹參相齊使者召參去屬其後相曰以齊獄市為寄慎勿擾也後相曰治無大於此者乎參曰夫獄市者所以并容也今若擾之奸人安所容乎又曰楚王戊與吳通謀申公曰生二子諫不聽乃胥靡之應邵曰詩云若此旡罪淪胥以鋪靡刑名也晉灼曰胥相也亦靡隨衣之赭衣使杵臼雅舂於市又曰尹翁歸河東平陽人曉習文法大將軍霍光秉政諸霍在平陽奴客持兵入市鬥變吏不能禁及翁歸之為市門吏莫敢犯者又曰何武兄弟五人皆為郡吏縣敬憚之武弟顯家有市籍租常不入縣數負其課市嗇夫求商辱捕顯家顯怒欲以吏事中商武曰以吾家租賦繇役不眾為先奉公吏不亦宜乎又曰刺繡文不如倚市門此言末業貧者之資, WYG: ''}
