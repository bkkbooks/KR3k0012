  - {type: variant, offset: 4236, length: 0, content: '', SBCK: 連市素不如意外厩猥牛中牛色有任用者臣有正陌三萬錢五疋布乞以買此牛詔曰􅁥此不足賣與冝便賜之然義與前後辭讓不妄受一賜令亦必復不受可聽如所啓駔儈􅀃文曰駔馬儈也漢書曰子貸金錢千貫節駔儈孟康曰節節物貴賤也謂除估儈其節利比於千乗之家師古曰儈者合㑹二家易折者駔者其首辛也駔音子郎切儈音貢外切後漢書曰呉漢字子顔家貧給事縣爲亭長王莽末以賔客犯法乃亡命至漁陽資用乏以販馬爲業續漢書曰平原王君公以明道􅀷曉隂陽懷德㓕行和光}
