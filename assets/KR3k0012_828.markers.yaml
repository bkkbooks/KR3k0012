  - {type: variant, offset: 690, length: 154, content: 曰晉人獲秦諜殺諸絳市六日而蘇又宣公下曰楚子使申舟聘于齊不假道于宋及宋宋人殺之楚子聞之怒投袂而起履及於室皇劍及於寢門之外車及蒲胥之市秋楚圍宋也又昭公三年曰齊景公欲更晏子之宅曰子之宅近市湫隘囂塵不可以居湫下隘小也囂聲塵土也請更諸爽塏者爽明塏燥辭曰君之先臣容焉先臣晏子之先人臣不足以嗣之於臣侈矣侈奢也且小人近市朝夕, SBCK: 家無}
