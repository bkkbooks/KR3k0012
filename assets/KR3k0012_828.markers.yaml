  - {type: variant, offset: 3006, length: 413, content: 已得履乃曰吾忘持度反歸取之及反市罷遂不得履又曰衛嗣公使人為客過市關關市苛難之因事關市以金關吏乃舍之嗣公謂關市曰其時客過而予女金女因遣之關市乃大恐而以嗣公為明察又曰商太宰使少庶子之市顧反而問之曰何見於市對曰無見也太宰曰雖然何見也對曰市南門之外甚眾牛車僅可以行耳太宰因戒使者無敢告人吾所問於女因召市吏而誚之曰市門之外何多牛矢市吏甚怪太宰知之疾也乃聳懼又曰龐敬縣令也遣市者行而召公大夫而還之公大夫亦遣為市立有間無以詔之卒遣行不命卒遣去俱不測其由也市者以為令與公大夫有言不相信以至無姦大夫雖告以命彼亦不信故不敢為姦也又曰龐恭與太子質於邯鄲謂魏王曰今一人言市有虎王信之乎王曰不二人言市有虎王信之乎王曰不三人言市有虎王信之乎王曰寡人信之龐恭曰夫市之無虎也明矣然而三人言而成虎今邯鄲之去魏也遠於市議臣者過於三人願王察之龐恭從邯鄲反竟不得見六韜曰武王伐殷得二丈夫而問之曰殷國將亡亦有妖災乎其一人對曰殷君善治宮室大者百里中有九市周書世紀同春秋後, SBCK: ''}
