  - {type: variant, offset: 2872, length: 56, content: 清旦衣冠而之市適鬻金者之所因攫其金而去吏捕問之對曰取金之時不見人徒見金孟子曰市廛不征則天下之商皆悅願藏於市廛市宅, SBCK: ''}
  - {type: variant, offset: 2872, length: 4, content: 清旦衣冠, WYG: 不與杯酒臠肉西門受羊酒東酤賣之唐書曰建中三年初㩁酒天下悉令官醸斛収直三千米雖賤不得减二十委州縣綜領醨簿私醸罪有差以京師王者都特免其㩁又曰元和十四年湖州刺史李應奏先官酟酒代百姓納摧歳月既乆為弊滋深伏望許令百姓自酤取登舊額仍舊兩稅隨貫均出依舊倒折納輕貨送上都許㩁酒錢舊皆隨两税徴衆户自貞元以来近有進奉故上言百姓因弊納輕不允請置官坊酤以代之既得請則􅃊設酒法困之人舉手觸禁}
