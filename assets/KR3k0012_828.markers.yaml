  - {type: variant, offset: 3566, length: 135, content: 募民有能徙置北門者與十金又曰蘇秦在齊齊大夫多與爭寵而使人刺之不殊而走殊絕齊王求賊不得蘇秦將死乃謂王曰臣死之後王車裂臣殉於市曰蘇秦為燕作亂於齊如此則刺臣之賊必得矣齊王如其言殺蘇秦者果自出齊王因而誅之又曰始皇初立尊呂不韋為相國時諸侯多辯士知荀卿之徒著書布天下不韋亦使其客著所, SBCK: 藿藿但}
