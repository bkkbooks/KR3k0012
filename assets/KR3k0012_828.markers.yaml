  - {type: variant, offset: 5, length: 1, content: 說, SBCK: 反呼曰公歛皮屠者遽収其皮燕丹子曰荆軻與武陽入􅁗過陽翟軻買肉爭輕重者屠辱軻武陽欲擊軻止之淮南子曰命屠而享其肉或以酸或以甘齊和萬方其本一牛之躰也又曰屠牛坦一朝解九牛而刃可以剃毛庖丁爲刀十九年刃如新砥硎庖丁宋人砥磨也何則遊乎衆虚之門賈􅁩書曰屠牛坦朝解十二牛而芒刃不頓剥割皆中理􅐭鐵論曰騏驥輓塩車垂頭於太行之坂屠者脫之桓譚新論曰関東鄙語曰人聞長安樂出門西向􅀏知肉味美則對屠門而嚼媿}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_828-2b}
  - {type: variant, offset: 5, length: 1, content: 說, krp: 反呼曰公歛皮屠者遽収其皮燕丹子曰荆軻與武陽入秦過陽翟軻買肉爭輕重者屠辱軻武陽欲擊軻止之淮南子曰命屠而享其肉或以酸或以甘齊和萬方其本一牛之躰也又曰屠牛坦一朝解九牛而刃可以剃毛庖丁爲刀十九年刃如新砥硎庖丁宋人砥磨也何則遊乎衆虚之門賈誼書曰屠牛坦朝解十二牛而芒刃不頓剥割皆中理􅐭鐵論曰騏驥輓塩車垂頭於太行之坂屠者脫之桓譚新論曰関東鄙語曰人聞長安樂出門西向笑知肉味美則對屠門而嚼媿}
  - {type: substitution, offset: 5, original: 說, replacement: 説, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19811}}
  - {type: punctuation, offset: 7, content: 》, id: KR3k0012_CHANT_828-bkkpn2}
  - {type: variant, offset: 7, length: 0, content: '', SBCK: 帝與呉質書亦云也三輔舊事曰太上皇不樂関中思慕郷里髙祖徙豐沛屠兒酤酒賣餅商人立爲新豐縣故一縣多小人又曰更始遣將軍李松攻王莽屠兒賣餅者皆從之屠兒杜虞手殺莽涼州異物志曰大􅁗之國斷首去軀操刀屠人杜夷幽求曰齊宣王見屠牽羊哀其無罪以豕代之傳咸集曰屠牛酤酒鑿錢作錫皆有損害酤毛詩鹿鳴伐木曰有酒湑我無酒酤我論語郷黨曰酤酒市脯不食漢書曰武帝天漢三年􅀄榷酒酤應劭曰縣官自搉賣酒小民不復得酤後漢書曰瑯瑘海曲吕母家素豐資産數百萬乃益釀醇酒買刀劒衣服少年來酤者皆賖與之視其乏者輙假衣裳不問多少又曰劉寛嘗坐客遣蒼頭市酒迂乆大醉而還迂乆猶良乆也客不堪之罵曰畜産寛湏􅁷遣人視奴疑必自殺顧左右曰此人也罵言畜産辱孰甚焉故吾懼其死也又曰崔寔􅀄父卒剽賣田宅起家􅉷立碑頌廣雅曰剽削也音疋妙反葬訖資産竭盡因窮困以酤釀販鬻爲業時人多以此譏之寔終不改亦取足而巳不致盈餘呉志曰潘璋字文章性􅀶蕩􅄝酒居貧好賒酤債家至門輙言後豪當相還宋書曰吏部尚書􅁃仲文尚書中令奴酤酒利其百十後魏書曰鄭羲爲西兖州刺史多所受納政以賄成性又嗇恡人有禮餉者不與盃酒臠肉西門受羊酒東門酤賣之唐書曰建中三年􅀄㩁酒天下悉令官釀斛収直三千米雖賤不得减二千委州縣綜領醨薄私醸罪有差以京師王者都特免其㩁又曰和元十四年湖州刺史李應奏先是官酤酒代百姓納搉歳月旣乆爲弊滋􅀷伏望許令百姓自酤取登舊額仍許入兩稅隨貫均出依舊例折納輕貨送上都許搉酒錢舊皆隨兩稅徴衆戸自貞元已來有土者競爲進奉故上言百姓困弊納輸不充請置官坊酤酒以代之旣得請則嚴設酒法閭閻之人舉手觸禁而官収厚利以濟其私爲害之日乆矣及李應奏罷議者謂宰臣能因一州之請推爲天下之法則其弊革矣韓子曰宋有酤酒者升概甚平遇客甚謹爲酒甚美懸旗甚髙然而酒酸不售恠其故問所知閭長者楊青青曰汝狗猛也曰狗猛也何故不售曰人畏焉或令孺子懷錢挈有壷徃酤而狗迎齕之酒所以酸而不售夫國亦有狗猛欲道之士懷其術而徃欲以明萬乗之主臣爲狗猛迎而齕之如此則主所以蔽賢士所以不用也賈􅁩新書曰鄒穆公視民如子及死酤家不售酒童子不謳歌列仙傳曰酒客者梁市上酒家客也作酒常美曰售萬錢有過主人逐之主人酒更酸敗遂至貧窮又曰女凡者陳留酤酒婦也作酒甚美遇仙人過飲以素書五卷爲質乆開書乃養性交接之術閇房與諸少年飲酒與􅀫止行文書法顔色更好如二十時仙人後過之􅀏曰盗道無師有翅不飛遂追仙人去曹植樂府歌}
