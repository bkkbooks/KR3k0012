  - {type: variant, offset: 49, length: 0, content: '', krp: 中嘉許偉康於屠酤之肆袁山松後漢書曰丗祖怜盆子賞甚厚}
  - {type: variant, offset: 50, length: 1, content: 陰, SBCK: 爲趙王郎中後疾失明賜滎陽均輸官地以爲列肆使食稅終其身晉中興徴祥記曰烈宗丗㑹稽王輔政於府内園中穿池築山山池之間處處有肆使婢酤賣肉於其中道子將見幸乗舡至酒肆輙携入肆買酒肉狀如市􅝬以爲􅀏樂梁書曰吕僧珎爲南兖州刺史從父兄子先以販䓗爲業僧珎至乃棄業求州官僧珎曰吾荷國恩重無以報効汝等自有常分豈可妄求叨越當速反䓗肆耳皇甫謐髙士傳曰許邵名知人歴客舎則知虞求賢人幘肆則㧞楚子昭晉令曰坐盧肆者皆不得􅀫肆上殷氏丗傳曰盖寛字元祚河南鄭廉始岀寒賤未知名君見而友之廉父常居肆乃就拜其父於市衆皆驚由是顯名位至司徒楚辭曰連蕙􅀂以爲佩過鮑肆而失香張衡西京賦曰彼肆人之男女麗靡奢于許史繁欽嘲應德璉文曰應温德云昔與季叔才俱到富波飲於酒肆日暮留􅀫主人有養女年十五肥頭赤面形似鮮卑偶恱之夜與姦通便生足下莊子曰曽不如早索我於枯魚之肆楊子法言曰好書不能要諸仲尼書肆也李􅁤注曰賣書市也書不經非書也語林曰王仲祖少有三逹覽鏡自翫曰王開山郍生此兒又酷貧帽敗自以形美乃入帽肆就帽嫗戯乃得新帽店丗􅀃曰阮脩字宣子常歩行以一百錢桂杖頭至酒店上便獨酣暢崔豹古今注曰店置也以置貨鬻之物賣買周}
