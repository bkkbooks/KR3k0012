  - {type: variant, offset: 41, length: 1, content: 出, SBCK: 名相近者相逺也實相近者相邇也而平正之爾亦近也俱是物也使惡者逺善善自相近鄭司農云謂􅀂殊王之屬俱名爲珠俱名爲王而賈或百萬或數萬恐農夫愚民見欺故别異令相逺使賈人不得雜亂以欺人左傳襄三十年曰伯有死於羊肆羊肆市列子産禭之枕之股而􅂘之歛而殯諸伯有之臣在市側者旣而葬諸斗城論語曰百工居肆以成}
