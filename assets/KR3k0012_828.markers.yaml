  - {type: variant, offset: 1733, length: 137, content: 也安邑令出勑市令遂買得仲叔怪問其子道狀乃歎曰閔仲叔豈以口腹累安邑耶遂去之沛又曰京兆尹閻興召第五倫署督鑄掾領長安市平銓衡正斗其後小民爭訟輒云第五掾平市無姦枉欺詐之巧又曰更始在長安官爵多群小里閭語曰使兒居市決作者不能得傭之市空返問何故曰今日騎都尉往會日也猶是四方不復信向京師又曰, WYG: ''}
