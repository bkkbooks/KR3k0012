  - {type: variant, offset: 3144, length: 1, content: 常, WYG: 庸使重其罪民將叛之無民孰戰又曰晉楚遇於鄢陵范文子不欲戰郤至曰韓之戰惠公不振旅又曰潘尫之子黨與養由基蹲甲而射之以示王曰君有二臣如此何憂於戰又曰苖賁皇徇曰蒐乘補卒秣馬利兵修陣固列蓐食申禱明日復戰乃逸楚囚又曰智武子曰大勞未艾君子勞心小人勞力先王之制諸侯皆不欲戰乃許鄭成又曰晉陽處父侵蔡楚子上救之與晉師夾泜而軍陽子患之使謂子上曰吾聞之文不犯順武不違敵子若欲戰則吾退舍子濟而陣遲速唯命又曰宣子曰秦獲穿也獲一卿矣秦以勝歸我何以報乃皆出戰交綏公羊傳曰己巳晉侯及楚戰城濮楚師敗績此大戰也又曰詐戰曰及此何以曰及又曰晉人及秦伯戰于殽秦敗或曰襄公稱人何貶也君在殯而用師作戰又曰狐壤之戰隱公獲焉然則何以不言戰諱獲也又曰齊侯衛侯鄭伯來戰于郎此偏戰也何以不言師敗績内不言戰言戰乃敗績又曰及鄭師伐宋丁未戰于宋地戰不言伐何避嫌也惡乎嫌嫌與鄭人戰也此偏戰也何以不言師敗績内不言戰言戰乃敗績與鄭人戰扵宋地故舉伐以明之也家語曰齊國書伐魯書齊卿也季康子使冉求帥左師衛之樊遲為右季氏曰須也弱須遲名弱幼也有子曰能用命矣及齊師戰于郊未踰溝前有溝衆不肯踰也樊遲曰非不能也不信子也言季孫徳不素著}
