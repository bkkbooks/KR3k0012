  - {type: variant, offset: 3136, length: 9, content: 旦據有江東刑政無常, SBCK: 子帥師背城而戰}
  - {type: variant, offset: 3136, length: 2, content: 旦據, WYG: 子帥師背城而戰不屬者非魯人也當子之身齊人伐魯而不能戰子之恥也又曰彭城之役晉楚遇於靡角之谷晉侯將遁矣雍子發命於軍曰恤老幼反孤疾二人役歸一人簡兵蒐乘秣馬蓐食師陣焚次明日將戰行歸者而逸楚囚楚師宵潰又曰入我河曲伐我涑川俘我王官翦我羈馬我是以}
  - {type: variant, offset: 3136, length: 9, content: 旦據有江東刑政無常, krp: 子帥師背城而戰}
