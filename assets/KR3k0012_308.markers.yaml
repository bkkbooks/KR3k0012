  - {type: variant, offset: 1285, length: 225, content: 王曰嗟六事之人予誓告汝有扈氏威侮五行怠棄三正天用勦絕其命用命賞于祖不用命戮于社予則孥戮汝又曰羲和湎淫廢時亂日胤往征之告于眾曰羲和尸厥官昏迷于天象以干先王之誅今予奉將天罰火炎崑崗玉石俱焚天吏逸德烈于猛火殲厥渠魁脅從罔治嗚呼威克厥愛允濟愛克厥威允罔功爾眾士懋戒哉欽承天子休命又曰魯侯伯禽宅曲阜徐夷並興東郊不開作費誓公曰嗟人無譁聽命善穀乃甲胃備乃弓矢鍜乃戈矛無敢不善峙乃糗糧峙乃蒭茭無敢不逮汝則有大刑魯人三郊三遂峙乃楨幹甲戍我惟築無敢不恭汝則有無餘刑刑者非, SBCK: ''}
