  - {type: variant, offset: 3133, length: 2, content: 陳敏, SBCK: 􅀳師伐楚苗賁皇言於􅀳侯曰楚之良在其中軍王族而巳請分良以擊其左右而三軍萃於卒萃集必大敗之及戰􅀳將吕錡射楚恭王中目錡魚綺切楚師霄遁􅀳師入楚三日館􅂖又曰求曰􅀂不可則君無出}
  - {type: variant, offset: 3133, length: 2, content: 陳敏, WYG: 晉師伐楚苖賁皇言於晉侯曰楚之良在其中軍王族而已請分良以擊其左右三軍萃於王卒萃集必大敗之及戰晉將吕錡射楚恭王中目楚師宵遁晉師入楚三日館穀又冉求曰若不可則君無出}
