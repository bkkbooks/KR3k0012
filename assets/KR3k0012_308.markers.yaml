  - {type: variant, offset: 2570, length: 1, content: 作, SBCK: 止又曰􅀳侯使張骼輔躒致楚師求御于鄭欲得鄭人自御知其地利者也鄭人卜宛射犬吉射犬鄭公孫也將及楚師而後從之乗皆踞轉而鼓琴轉衣裝也近不告而馳之皆取胄於橐而胄入壘皆下􅅮人以投収禽挾囚禽獲也弗待而岀又曰子蒲曰吾未知呉道使楚人先與呉人戰又曰呉師居麋子期將焚之子西曰父兄親暴骨焉不能収而又焚之不可子期曰國亡矣豈憚焚之焚之而又戰又曰呉伐楚師及清發清發水名將擊之夫槩王曰困獸猶闘況人乎􅀂知不免而致死必敗我若使先濟者知免後者慕之蔑有闘心矣半濟而後可擊也從之又敗之楚人爲食呉人及之奔食而又從之敗諸雍澨}
