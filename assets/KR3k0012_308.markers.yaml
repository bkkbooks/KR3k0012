  - {type: variant, offset: 4733, length: 205, content: 十三年秦師過周北門及滑鄭商人弦高將市於周遇之以乘韋先牛十二犒師商行賈也乘四韋也先韋及入牛也古者將獻饋於人有以先也曰寡君聞吾子將步於弊邑敢犒從者不腆弊邑為從者之淹則具一日之積腆厚也淹久也積蒭米菜薪也行則備一夕之衛又曰楚子以馹至于羅汭馹傳也羅水名吳子使其弟蹶由犒師楚人執之將以釁鼓王使問焉曰汝卜來吉乎對曰吉且吳社稷是卜豈直為一人使臣獲釁鼓而弊邑知備以禦不虞其為吉孰大焉乃弗殺後漢書曰岑鼓長驅入江關令軍中無得虜掠所過, WYG: ''}
