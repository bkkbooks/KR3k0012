  - {type: variant, offset: 4477, length: 159, content: 若干惠於諸將最少早喪父事母以孝聞太祖嘗造射堂新成與諸將宴射惠竊歎曰親孝矣何時辨此乎太祖聞之即日徙堂於惠宅其見重如此淮南子曰員中規方中矩動成戰止成文可以榆眾而不可以陳軍滌杯而食洗爵而飲盥而後饋可以養少而不可以饗眾黃石公記曰動為事機舒之彌四海卷之不盈懷柔而能剛則其國彌光弱而能強則其國彌章一單之醪投之於河令士眾迎飲三軍為其, SBCK: 善虜果赴水溺}
