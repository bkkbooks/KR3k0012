  - {type: variant, offset: 2143, length: 322, content: 隋室無道毒被蒼生我國家受命于天寧濟憶兆世充敢抗大邦數行侵暴誅殺良善恣其淫酷國家為百姓除害事不獲已各宜整爾軍旅脩爾器械立勳立効龔行天罰敢有犯命者斬無赦又曰朱泚反韋皋於隴州築壇于庭血牲與將士等盟曰上天不弔國家多難逆臣乘間盜據皇宮而李楚琳亦扇兇徒傾陷城邑酷虐所加爰及本使既不事上安能恤下皋是用激心憤氣不遑底寧誓舉群公竭誠王室凡我同盟一心竭力伏順除兇祖先之靈必當幽贊言誠則志合義感則心齊粉骨塵軀決無所顧有渝此志明神殛之迨於子孫亦罔遺育皇天后土當兆斯言又使通於吐蕃以求助古司馬兵法曰古者逐奔不遠縱綏不及所以示君子且有禮不遠則難誘不及則難陷以禮為固以仁為勝既勝之後其教可復是故君子貴之也有虞氏戒於國中欲人體其命也舜以農教戰以戰教民畋獵簡習故民體之也夏后氏誓, SBCK: 塞井夷􅍳陣}
