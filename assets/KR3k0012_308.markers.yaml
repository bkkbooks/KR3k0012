  - {type: variant, offset: 3756, length: 4, content: 武候大將, SBCK: 季氏曰須也弱湏遲名弱㓜也有子曰能用命矣及齊師戰于郊未踰溝前有溝衆不肯踰也樊遲曰非不能也不信子也言季孫德不素著不爲民所信也請三交而踰之與衆要信三交而踰溝也如之衆從之師入齊齊}
