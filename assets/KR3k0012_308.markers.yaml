  - {type: variant, offset: 1678, length: 6, content: 今予發惟恭行, SBCK: 齊伯郭啓伐莒子將戰宛羊牧諌之曰齊師賤其求不多不如下之又曰諸侯之戌謀曰􅀂華氏知困而致死楚恥無功而疾戰非吾利也又曰孟懿子陽虎伐鄆鄆人將戰又曰宋多責賂於鄭鄭人不堪故以絶魯及齊與宋衛燕戰不書所戰後也又曰冬宋人以諸侯伐鄭報宋之戰也又曰齊人侵魯疆疆吏來告曰疆􅂣之事愼守其一而備其不虞姑盡所備焉事至而戰又何謁焉又曰狄人伐衛衛懿公好鶴鶴有乗軒者將戰國人受甲者皆曰使鶴鶴實有禄位余焉能戰又曰里克諌曰故君之嗣適不可以帥師君失其官帥師不威將焉用之且臣聞臯落氏將戰君其舎之又曰楚人伐宋以救鄭宋公將戰大司馬固諌曰}
  - {type: page-break, offset: 1678, content: '', id: KR3k0012_SBCK_308-2a}
