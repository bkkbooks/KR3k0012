  - {type: variant, offset: 3151, length: 1, content: 且, WYG: 牛乘馬擾馴猛獸以與炎帝戰于阪泉之野又曰}
  - {type: variant, offset: 3153, length: 4, content: 弟凶暴所, WYG: 貢言志曰願得齊楚合戰於漭蕩之野埃塵連接挺刃交兵國語曰申包胥曰夫戰智為始仁次之勇次之不智則不知人之極不仁則致三軍飢勞之殃不勇不能斷疑以發大計戰國策曰魏太子自將過宋水黄徐子曰臣有百戰之術今太子自將攻齊大勝不過有魏而貴不益為王若不勝即墨世無魏矣此臣百勝之術也太子曰請從公言而還太子上車請還其御曰將出而還與北同不如遂行乃與齊人戰而死史記曰黄帝教熊羆貙虎以與炎帝戰于阪泉之野服䖍曰阪泉地名皇甫謐曰}
