  - {type: variant, offset: 98, length: 187, content: 初卷人維汜卷縣名屬河南郡故城在今鄭州原武縣西北訞言稱神有弟子數百人坐伏誅後其弟子李廣等宣汜神化不死以誑惑百姓十七年遂共聚會徒黨攻沒睆城睆縣名屬盧江郡今舒州懷寧縣睆音下板切又下管切殺睆俟劉閔自稱南岳大師遣謁者張宗將兵數千人討之復為廣所敗於是使馬援發諸郡兵合萬餘人擊破廣等斬之又曰章和二年護羗校尉張紆誘誅燒當種羗迷吾等由是諸羗大怒謀欲報怨朝廷憂之公卿舉鄧訓代紆為校尉諸羗激忿遂相, WYG: 湯}
