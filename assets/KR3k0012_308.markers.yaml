  - {type: variant, offset: 286, length: 994, content: 解仇結婚交質盟詛鄭玄注周禮云大事曰盟小事曰詛眾四萬餘人期冰合渡河攻訓又曰吳漢為安樂令會王郎起北州擾惑漢素聞光武長者獨欲歸心乃說太守彭寵曰漁陽上谷突騎天下所聞也君何不合二郡精銳兵附劉公擊邯鄲此一時之功也一時言不可再遇也寵以為然又曰朱鮪聞光武北伐而河內孤使討難將軍蘇茂副將賈強率兵三萬餘人渡鞏河攻溫鞏溫並今洛州縣也臨廣河故曰鞏河檄書至寇恂即勒軍馳出並移告屬縣發兵會於溫下軍吏皆諫曰今洛陽兵渡河前後不絕宜待眾軍畢集乃可出也恂曰溫郡之藩蔽失溫則郡不可守遂馳赴之且曰合戰而偏將軍馮異遣救及諸縣兵適至及士馬四集幡旗蔽野恂乃令士卒乘城鼓噪大呼言曰劉公兵到蘇茂軍聞之陣動恂因奔擊大破之又曰吳漢悉發幽州兵與光武會清陽諸將望見漢還士馬甚盛皆曰是寧肯分兵與人耶及漢至莫府上兵簿莫大也兵簿軍上之名帳諸將人人多請之光武曰屬者恐不與人屬猶近也今所請又何多也諸將皆慚晉書天文志曰征吳之役三河徐兗之兵悉出交戰於吳楚之地唐書曰憲宗時鄆州李師道翻覆違命詔宣武義成武寧橫海四節度之師與田弘正會軍討之弘正奏請取黎陽渡河會李光顏等軍齊進帝召宰臣於延英議可否皆曰閫外之事大將制之既有奏陳宜遂其請裴度獨以為不可奏曰魏博一軍不同諸道過河之後却退不得便須進擊方見成功若取黎陽渡河即纔離本界便至滑州徒有供餉之勞又生顧望之勢况弘正光顏並少威斷更相疑惑必恐遷延然兵事不從中制一定處分或慮不可若欲於河南持重則不如河北養威不然即且秩馬厲兵候霜降水落於楊劉渡河直抵鄆但得至陽谷已來下營則兵勢自盛形自不撓上曰卿言是矣乃詔弘正取楊劉渡河及弘正軍既濟河而南距鄆州四十里築壘賊勢果蹙頃之誅師道三國典略曰周武帝率六軍趣鄴齊主令群臣議之廣寧王孝珩議曰今大寇既深事藉機變請使任城王便領幽州道兵自土門入聲取并州獨孤永業便領洛州兵自潼關入聲取長安臣請領京畿兵出溢只鼓行逆戰賊懸軍遠來日增疲老聞南北有兵自然應退誓眾書曰帝曰咨禹惟時有苗弗率汝徂征三苗之民數千王誅率循也徂往也不循帝道言亂逆也命禹討之禹乃會群后誓于師曰濟濟有眾咸聽朕命會諸侯伐有苗也軍旅曰誓濟濟眾盛之貌蠢茲有苗昏迷不恭蠢動昏闇也言其所以宜討侮慢自賢反道敗德狎侮先王輕慢典教反正道敗德義君子在野小人在位廢仁賢任姦佞民棄不保天降之咎言民叛天災之肆予以爾眾士奉辭罰罪肆故也辭謂不恭罪謂姦慢以下事爾尚一乃心力其克有勳三旬苗民逆命益贊于禹曰惟德動天無遠弗屆禹拜昌言班師振旅帝乃誕敷文德舞于羽於兩階七旬有苗格又曰啟與有扈, WYG: 桀}
