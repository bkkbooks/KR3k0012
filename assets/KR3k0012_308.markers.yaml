  - {type: variant, offset: 3741, length: 1, content: 肅, SBCK: 陽子患之使謂子上曰吾聞之文不犯順武不違敵子􅀂欲戰則吾退舎子濟而陣遲速唯命又曰宣子曰􅁗獲穿也獲一卿矣秦以勝歸我何以報乃皆出戰交綏公羊傳曰巳巳晋侯及楚戰城濮楚師敗績此大戰也又曰詐戰不日此何以日詐卒也齊人語也又曰晉人及秦伯戰于殽秦敗或曰襄公稱人何貶也君在殯而用師詐戰又曰狐壤之戰隱公獲焉}
