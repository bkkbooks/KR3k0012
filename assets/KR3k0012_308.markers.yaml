  - {type: variant, offset: 3753, length: 2, content: 尋轉, SBCK: 何以不言師敗績内不言戰乃敗績又曰及鄭師伐宋丁未戰于宋戰不言伐何避嫌也惡乎嫌嫌與鄭人戰也此偏戰也何以不言師敗績内不言戰言戰乃敗績與鄭人戰於宋地故學伐以明之也家語曰齊國書伐魯書齊卿也季康子使冉求帥左師衛之樊遲爲}
  - {type: page-break, offset: 3753, content: '', id: KR3k0012_SBCK_308-6a}
  - {type: variant, offset: 3753, length: 554, content: 尋轉右武候大將軍唐書曰德宗時鄭權為涇原節度使劉昌從事昌病亟請入覲度軍中必有變以權寬厚善容眾俾主留務既而兵果為亂權挺身於白刃中抗詞以明逆順因殺其首亂者數人士皆戢伏又曰昭宗時玉山都頭楊守信叶楊復恭稱兵闕下陣于通化門上陳兵於延喜門是夜令劉崇望守度支庫明日曉入含光門未開門內禁軍列于左右俟門開即劫掠兩市及聞傳呼宰相來門方開崇望駐馬慰諭之曰聖上在街東親揔戎事公等禁軍何不樓前殺賊立取功名切不可剽掠街市圖小利以成惡名也將士唯唯從崇望至長樂門守信見兵來即遁軍士呼萬歲是日庫市獲全軍人不亂緊崇望之方略也五代周史曰世宗至泗洲太祖皇帝乘勝麾軍焚郭門奪月城帝親冒矢石以攻其壘丙午日南至從臣拜賀於月城之上語林曰諸葛武侯與司馬宣王在渭濱將戰宣王戎服莅事使人視武侯素輿葛巾持白毛扇指麾三軍皆隨其進止宣王聞而歎曰可謂名士饗士左傳曰宋華元將戰殺羊食其御羊斟不與及戰曰疇昔之羊子為政今日之事我為政與入鄭師故敗君子謂羊斟非人也以其私憾敗國殄民刑孰大焉史記曰樂毅并護趙楚韓魏燕之兵以伐齊破之濟西諸侯罷歸而燕軍樂毅獨追至于臨輜齊昏王之敗濟而亡走保於莒樂毅獨留徇齊皆城守樂毅攻入臨淄盡取齊寶財物祭器輸之燕昭王大悅親至濟上勞軍行賞饗士封毅於昌國號為昌國君東觀漢記曰上大發關東兵自將上隴隗囂眾潰走圍解於是置酒高會勞賜諸將來歙班坐絕席在諸將之右賜歙縑千疋後, WYG: ''}
