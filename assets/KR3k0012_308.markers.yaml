  - {type: variant, offset: 3150, length: 0, content: '', WYG: 信也請三刻而踰之與衆要信三刻而踰溝也如之衆從之師入齊齊軍遁冉有用戈故能入焉子聞之曰義也在軍能却敵合於義既戰季孫問冉有曰子於戰學之乎性達之乎對曰學之季孫曰從事孔子兹何學冉有曰即學於孔子也孔子者大聖兼該文武並用也適聞其戰法猶未之詳也季孫樊以告孔子孔子曰季孫於是乎可謂恱人之有能矣又曰孔子曰黄帝}
