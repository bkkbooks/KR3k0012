  - {type: variant, offset: 3735, length: 5, content: 雄立指麾六, SBCK: 黨與飬由基蹲甲而射之以示王曰君有二臣如此何憂於戰又曰苗賁皇徇曰蒐乗􅀘卒秣馬利兵脩陣固列蓐食申禱明日復戰乃逸楚囚又曰智武子曰大勞未艾君子勞心小人勞力先王之制諸侯皆不欲戰乃許鄭成又曰晉陽處父侵蔡楚子上救之與晉師夾江而}
