  - {type: variant, offset: 2567, length: 2, content: 法度, SBCK: 慈愛戰所蓄也又曰楚子與􅀂敖氏戰于睪滸睪滸楚地伯棼射王汰輈及鼔跗着於丁寧伯棼子越椒也輈車轅汰過也箭過車轅上也丁寕鉦也又射汰輈以貫笠轂兵車尊者則邊人執笠依轂下以禦寒暑師懼退王使廵師曰吾先君文王克息獲三矢焉伯棼竊其二盡於是矣鼓而進之遂㓕􅀂敖氏又曰􅀳楚交戰叔山冉􅅮人以投中車折軾􅀳師}
  - {type: variant, offset: 2567, length: 2, content: 法度, WYG: 慈愛戰所蓄也又曰楚子與若敖氏戰于臯滸臯滸楚地伯棼射王汰輈及鼔跗著於丁寜伯棼子越椒也輈車轅汰過也箭過車轅上也丁寜鉦也又射汰輈以貫笠轂兵車尊者則邊人執笠依轂下以禦寒暑師懼退王使巡師曰吾先君文王克息獲三矢焉伯棼竊其二盡於是矣鼓而進之遂滅若敖氏又曰晉楚交戰叔山冉搏人以投中車折軾晉人}
