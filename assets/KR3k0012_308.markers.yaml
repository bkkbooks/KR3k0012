  - {type: variant, offset: 4939, length: 123, content: 姓皆奉牛酒迎勞彭見諸耆老為言大漢哀愍巴蜀久見虜役故興師遂伐以討有罪為人除害讓不受其牛酒百姓皆大喜悅爭開門降晉書曰桓溫進兵至霸上耆老持牛酒迎溫曰不圖今日復見官軍後梁略曰大寶元年西魏將楊忠來逼荊鎮上懼其至送遣犒軍既而與忠結盟并送質子與魏相約為兄弟之親, SBCK: ''}
  - {type: variant, offset: 4939, length: 311, content: 姓皆奉牛酒迎勞彭見諸耆老為言大漢哀愍巴蜀久見虜役故興師遂伐以討有罪為人除害讓不受其牛酒百姓皆大喜悅爭開門降晉書曰桓溫進兵至霸上耆老持牛酒迎溫曰不圖今日復見官軍後梁略曰大寶元年西魏將楊忠來逼荊鎮上懼其至送遣犒軍既而與忠結盟并送質子與魏相約為兄弟之親於是聘使往還相望道路後魏書曰鄧頴從世祖幸漢南高車莫弗庫若於率騎數萬驅鹿百餘萬諸行在所詔頴為文銘于漢南以昭功德淮南子曰秦繆公使孟明舉兵襲鄭鄭賈人弦高蹇他他弦高黨人相與謀曰師行數千里又數過諸侯之地其勢必襲鄭凡襲國者以為無備也其以知其情必不敢進乃矯鄭伯之命以十二牛勞三率相與謀三率秦將白乙孟明西乞曰守備必固進必無功乃還師而反晉先軫舉兵擊之先軫晉大夫也大破之鄭伯乃以存國之賞賞弦高高辭, WYG: 八}
