  - {type: variant, offset: 2468, length: 0, content: '', krp: 而䟽行首晉楚唯天所授何患焉文子執戈逐之曰國之存亡童子何知焉又曰齊侯還自晉不入不入國遂襲莒門于且于且于莒邑傷股而退齊侯傷明日將復戰期于壽舒夀舒莒邑𣏌殖華還載甲夜入且于之隧宿於莒郊郊子齊大夫也且于隧狹路明日先遇莒子於蒲侯氏蒲侯氏近莒之邑莒子重賂之使無死曰請有盟}
  - {type: variant, offset: 2469, length: 0, content: '', SBCK: 以盟二子無致死戰華周對曰貪貨棄命亦君所惡也華周即華還也昬而受命日未中而棄之何以事君莒子親鼓之從而伐之獲􅂎梁􅂎梁即􅂎植又曰齊師伐我公將戰曹􅔘請見其郷人曰肉食者謀之又何間焉􅁏食在位者也間猶与也􅔘曰肉食者鄙未能逺謀乃入見問何以戰公曰衣食所安弗敢專也必以分人對曰小惠未徧}
  - {type: page-break, offset: 2469, content: '', id: KR3k0012_SBCK_308-3a}
  - {type: variant, offset: 2469, length: 0, content: '', WYG: 以盟二子無致死戰華周對曰貪貨棄命亦君所惡也華周即華還也昏而受命日未中而棄之何以事君莒子親鼔之從而伐之獲杞梁杞梁即杞殖又曰齊師伐我公將戰曹劌請見其鄉人曰肉食者謀之又何間焉肉食在位者也間猶與也劌曰肉食者鄙未能逺謀乃入見問何以戰公曰衣食所安弗敢専也必以分人對曰小恵未徧}
  - {type: page-break, offset: 2469, content: '', id: KR3k0012_WYG_308-4b, image: WYG0895/WYG0895-0662d.png}
  - {type: variant, offset: 2469, length: 0, content: '', krp: 以盟二子無致死戰華周對曰貪貨棄命亦君所惡也華周即華還也昬而受命日未中而棄之何以事君莒子親鼓之從而伐之獲𣏌梁𣏌梁即𣏌植又曰齊師伐我公將戰曹􅔘請見其郷人曰肉食者謀之又何間焉肉食在位者也間猶与也􅔘曰肉食者鄙未能逺謀乃入見問何以戰公曰衣食所安弗敢專也必以分人對曰小惠未徧}
  - {type: variant, offset: 2470, length: 1, content: 先, SBCK: 不從也公曰犧牲玉帛不敢加也必以信對曰小信未孚神不福也公曰大小之獄雖不能察必以情對曰忠之屬也上思吏民忠也可以一戰戰則請從公與之乗戰于長勺公將鼓之􅔘曰未可齊人三鼓曰可矣遂逐齊師旣克公問其故對曰夫戰勇氣也一鼓作氣再而衰三而竭我􅄹彼竭故克之夫大國難測也懼有伏焉吾視其轍亂望其旗靡故逐之又曰丙戌復戰大敗呉師獲太子友王孫彌庸又曰郤獻子曰二憾往矣弗備必敗􅇾子曰鄭人勸戰弗敢從也楚人求}
