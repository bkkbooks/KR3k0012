  - {type: variant, offset: 3277, length: 335, content: 敏眾潰散單騎東奔為義師所斬梁書曰魏中山王元英冠北徐州高祖詔韋叡率眾會焉英自率眾來戰叡乘素木輿執白角如意以麾軍一日數合英甚憚其強劉璠梁典曰韋叡字文懷京兆杜陵人也叡雖有曠世之度莅民以惠愛為本所居必治將兵仁愛被服必於儒者雖臨陣交鋒常緩服乘輿執竹如意以麾進止北史曰唐永身長八尺少耿介有將帥才讀班超傳慨然有萬里之志正光中為北地太守永善取下士人競為之用臨陣常著白裙襦把角如意以指麾處分辭色自若在北地四年與賊數十戰未嘗敗北時人語曰莫陸梁恐爾逢唐將永所營之處至今猶稱唐公壘後魏書曰毛法仁言聲壯大至於軍旅田狩唱呼處分振於山谷後周書曰李遠字萬歲幼有器局志度恢然嘗與群兒為戰鬥之戲指麾部分便有軍陣之法郡守見而異之召使更戲群兒懼而散走遠持杖叱之復為向勢意氣雄壯殆甚於前郡守曰此小兒必為將帥非常人, SBCK: 恥}
