  - {type: variant, offset: 2472, length: 87, content: 其慮也禹會軍聚重復教肆進退左右前後離合周旋也殷誓於軍門之外欲民先意待事也殷既遵虞夏之教民又於軍門外復簡試周將交刃而誓之以致意也周用虞夏殷之教民交和接兵又復申望誓之軍德薄民俗巧, SBCK: 弗能好}
