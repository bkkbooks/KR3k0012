  - {type: variant, offset: 767, length: 440, content: 可奏曰魏博一軍不同諸道過河之後却退不得便須進擊方見成功若取黎陽渡河即纔離本界便至滑州徒有供餉之勞又生顧望之勢况弘正光顏並少威斷更相疑惑必恐遷延然兵事不從中制一定處分或慮不可若欲於河南持重則不如河北養威不然即且秩馬厲兵候霜降水落於楊劉渡河直抵鄆但得至陽谷已來下營則兵勢自盛形自不撓上曰卿言是矣乃詔弘正取楊劉渡河及弘正軍既濟河而南距鄆州四十里築壘賊勢果蹙頃之誅師道三國典略曰周武帝率六軍趣鄴齊主令群臣議之廣寧王孝珩議曰今大寇既深事藉機變請使任城王便領幽州道兵自土門入聲取并州獨孤永業便領洛州兵自潼關入聲取長安臣請領京畿兵出溢只鼓行逆戰賊懸軍遠來日增疲老聞南北有兵自然應退誓眾書曰帝曰咨禹惟時有苗弗率汝徂征三苗之民數千王誅率循也徂往也不循帝道言亂逆也命禹討之禹乃會群后誓于師曰濟濟有眾咸聽朕命會諸侯伐有苗也軍旅曰誓濟濟眾盛之貌蠢茲有苗昏迷不恭蠢動昏闇也言其所以宜討侮慢自賢反道敗德狎侮先王輕慢典教反正道敗德義君子在野小人在位廢仁賢任姦佞民棄不保天降之咎言民叛天災之肆予以爾眾士奉辭罰罪肆, SBCK: 堪}
