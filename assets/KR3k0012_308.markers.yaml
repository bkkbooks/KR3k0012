  - {type: variant, offset: 2468, length: 0, content: '', SBCK: 而䟽行首􅀳楚唯天所授何患焉文子執戈逐之曰國之存亡童子何知焉又曰齊侯還自晉不入不入國遂襲莒門于且于且于莒邑傷股而退齊侯傷明日將復戰期于壽舒夀舒莒邑􅂎殖華還載甲夜入且于之隧􅀫於莒郊郊子齊大夫也且于隧狹路明日先遇莒子於蒲侯氏蒲侯氏近莒之邑莒子重賂之使無死曰請有盟}
  - {type: variant, offset: 2468, length: 0, content: '', WYG: 而疏行首晉楚唯天所授何患焉文子執戈逐之曰國之存亡童子何知焉又曰齊侯還自晉不入不入國遂襲莒門于且于莒邑名傷股而退齊侯傷明日將復戰期于夀舒夀舒莒邑杞殖華還載甲夜入且于之隧宿於莒郊二子齊大夫也隧且于狹路明日先遇莒子於蒲侯氏蒲侯氏近莒之邑莒子重賂之使無死曰請有盟}
