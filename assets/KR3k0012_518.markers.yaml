  - {type: variant, offset: 869, length: 0, content: '', SBCK: 言其父坦之乃還家省父而􅄒愛坦之雖長大猶抱之於膝上坦之乃言婚事於􅄒大怒遽推坦之於􅂰下曰汝竟癡也詎可視面以妻兵乃止又曰阮籍謂王渾曰濬仲清賞非卿倫也共卿言不如共阿戎談及戎子邁有美名少而肥大戎曰令食糠轉益肥也又曰王祥二子烈芬並知名爲祥所重愛同時而病將士遺嘱烈欲還葬舊􅁟芬欲留葬京邑祥涕泣曰不忘郷仁也不戀夲逹也唯仁與逹二子有焉又曰王衍䘮㓜子山簡弟之衍悲不自勝簡曰孩抱中物何至於此衍曰聖人忘情下人不及情情之所鍾正在吾輩也簡服其言更爲之慟又曰魏舒字陽元爲司徒子混字延廣有才}
  - {type: page-break, offset: 869, content: '', id: KR3k0012_SBCK_518-6a}
  - {type: variant, offset: 869, length: 0, content: '', krp: 言其父坦之乃還家省父而𫐠愛坦之雖長大猶抱之於膝上坦之乃言婚事於𫐠大怒遽推坦之於膝下曰汝竟癡也詎可視面以妻兵乃止又曰阮籍謂王渾曰濬仲清賞非卿倫也共卿言不如共阿戎談及戎子邁有美名少而肥大戎曰令食糠轉益肥也又曰王祥二子烈芬並知名爲祥所重愛同時而病將士遺嘱烈欲還葬舊土芬欲留葬京邑祥涕泣曰不忘郷仁也不戀夲逹也唯仁與逹二子有焉又曰王衍䘮㓜子山簡弟之衍悲不自勝簡曰孩抱中物何至於此衍曰聖人忘情下人不及情情之所鍾正在吾輩也簡服其言更爲之慟又曰魏舒字陽元爲司徒子混字延廣有才}
  - {type: variant, offset: 870, length: 5, content: 者妾亦請從, SBCK: 爲太子舎人年二十七卒朝野咸爲舒惜舒每哀慟退而歎曰吾不及莊生逺矣豈以無益自損更不復哭又曰胡母輔之字彦國􅄝酒子謙之字子光才學不及父而傲縱過之至酣醉時甞自呼其父字輔之不以介意丗以爲狂又曰石崇字季倫渤海南皮人苞之}
