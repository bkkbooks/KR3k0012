  - {type: variant, offset: 876, length: 3, content: 紹孟光, SBCK: 子也生於青州故小名齊奴少敏惠勇而有謀父苞臨終分財與諸子獨不及倫其母爲言之苞曰此兒雖小後自能致又曰郄超字景興一字嘉賔父愔爲司徒愔事道超奉佛愔又好聚積錢數千萬甞開庫任超所取超性好施一日之中散與親故都盡桓温辟爲征西大將軍􅁺温懷不軌超爲之謀轉司徒左長史而卒􅀄雖黨桓氏以愔忠於王室不䡄}
