  - {type: variant, offset: 1857, length: 295, content: 飾不敢見舅姑又內則曰婦事舅姑如事父母雞初鳴咸盥漱櫛蹝笄總衣紳左佩紛悅刀礪小觿金燧右佩箴管線纊施縏袠大觿木燧衿纓綦屨以適舅姑之所及所下氣怡聲問衣燠寒疾痛苛癢而敬抑搔之又曰婦將有事大小必請於舅姑不敢專行也儀禮婚禮曰舅饗送者以一獻禮酬以束錦姑饗婦人送酬亦如之左傳襄元曰魯齊姜薨初穆姜使擇美檟以自為櫬與頌琴季文子取以葬君子曰非禮也禮無所逆婦養姑者也虧姑以成婦逆莫大焉穆姜成公母禮姜成公婦也列女傳曰鄒孟軻既娶將入室其婦祖而內孟子不悅遂去不入婦辭孟母求去曰妾聞夫婦之道私室不與焉今妾竊惰在室而夫子見妾悖然不悅是客妾也婦人之義蓋不客宿請歸於父母姑召軻而謂之曰夫禮將上堂聲必揚所以戒人也將入戶視必下恐見人過, SBCK: 憂}
