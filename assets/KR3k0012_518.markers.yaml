  - {type: variant, offset: 642, length: 1, content: 姊, WYG: 衍悲不自勝簡曰孩抱中物何至於此衍曰聖人忘情下人不及情情之所鍾正在吾輩也簡服其言更}
  - {type: variant, offset: 644, length: 4, content: 設飯冉留, WYG: 之慟又曰魏舒字陽元為司徒子混字延廣有才行為太子舍人年二十七卒朝野咸為舒惜每哀慟退而歎曰吾不及荘生逺矣豈以無益自損更不復哭又曰胡母輔之字彦國嗜酒子謙字子光才學不及父而傲縱過之至酣醉時常自呼其父字輔之不以介意世以為狂又曰石崇字季倫渤海南皮人苞之少子也生於青州故小名齊奴少敏惠勇而有謀父苞臨終分財與諸子獨不及倫其母為言之苞曰此兒雖少後自能致又曰郗超字景興一字嘉賓父愔為司徒愔事道超奉佛愔好聚積}
