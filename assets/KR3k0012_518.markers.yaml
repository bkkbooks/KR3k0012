  - {type: variant, offset: 793, length: 158, content: 忘糟糠之妻不下堂帝謂主曰事不諧矣又曰汝南袁隗妻馬融之女少有才辨融家世豐豪裝遣甚盛及初成禮隗謂之曰婦奉箕箒而已何乃過珍麗對曰慈親垂愛不敢逆命君欲鮑宣梁鴻之行者妾亦請從少紹孟光之事又問曰弟先兄舉世以為笑今處姊未適人而君先行可乎對曰妾姊高行殊邈未遇良匹不如鄙薄茍然而已又問南郡學窮道奧文為辭宗而所在之識輒以資財為損何耶對曰, WYG: 隠}
