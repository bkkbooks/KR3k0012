  - {type: variant, offset: 2556, length: 394, content: 為九族所重休前妻女既幼又休父布臨終生庶子沈休命棄之石氏曰奈何使舅之胤不存乎遂養沈及前妻女力不兼舉九年之間三不舉子又曰王渾妻鍾氏字琰生子濟渾嘗共琰坐濟趨庭而過渾欣然曰生子如此足慰人心琰曰若新婦得配參軍為渾弟淪也生子固不啻如此耳又曰王澄字平子衍季弟也衍妻郭氏性貪鄙令婢於路擔糞澄年十四諫郭郭大怒謂澄曰昔先人臨終之日以小郎囑新婦不以新婦囑小郎因捉其衣裾欲杖之澄懼踰窗而走得脫又曰王凝之妻謝氏字道韞弈之女也聰識有才辨凝之弟獻之嘗與賓客談議詞理將屈道韞使婢白獻之曰新婦欲與小郎解圍乃以青綾步障自蔽申獻酬之義客遂不能屈也又曰晉中書令王珉與嫂婢私通嫂撻甚苦婢素善歌而珉好執白團扇故製白團扇歌又曰顏含字弘都嫂老而失明含奉養如親束帶躬侍嫂病困須蚺虵膽求之不獲憂歎盈懷方獨坐愁苦忽有一童子持一青囊授含含聞之乃蚺虵膽也童子出戶化為青鳥飛去含得藥成嫂病遂愈齊書曰吳達之義興人嫂亡無以具葬乃自賣為十夫傭以營葬三十國, SBCK: ''}
