  - {type: variant, offset: 651, length: 0, content: '', WYG: 萬錢買恱潛為祈禱者備矣尋掘地得錢百萬意甚惡之一一皆藏閉比恱疾篤導憂念特至不食積日忽見一人形狀甚偉被甲持刀導問是何人曰僕蔣侯也公兒不佳欲為請命故來耳導因求之食至數斗食畢謂導曰中書命盡非可救也言訖不見恱亦殞絶又曰劉殷字長盛新興人有子七人五人各授一經其一子授太史公記一子授漢書一門之内七業俱興北州之學殷最為盛門又曰索靖子琳字巨秀少有逸群之才靖每曰琳宗廟之器非簡劄之用州郡之任不足汚吾兒也又曰戴若思廣陵人父昌㑹稽太守若思徃武陵時郡人潘京素有理筌識鑒父遣若思與語潘稱若思有公輔之才又曰王獻之字子敬羲之子也謝安甚欽之請為長史因問獻之曰君書何如尊君答曰固不同安曰外論不爾對曰人那得知獻之嘗書義之自後掣其筆不得嘆曰此兒當有大名又以掃箒沾泥書大字方一丈甚以為工宋書曰戴顒字仲若淮南人父逵喜琴顒及兄勃並受琴於父父歿所傳之聲不忍復奏各造新弄五部顒又製長弄一部並傳於世齊書曰世祖常問王儉當今誰能作五言詩對曰謝朏得父之膏腴梁書曰謝朏祖𢎞微宋太常卿父莊齊光祿朏十嵗能屬}
