  - {type: variant, offset: 11, length: 1, content: 先, SBCK: 考無咎厲終吉又家人卦曰家人嗃嗃悔厲􅁻父子嘻嘻終吝儀禮曰父爲長子服三年何也正禮乎上又所重也禮記内則曰由命士以上父子皆異宫又􅀕義曰身也者父母之遺體也行父母之遺體敢不敬乎左傳隱公曰衛莊公之子州吁有寵而好兵公弗禁石碏諌曰臣聞愛子教之以義方不納於邪又宣上曰楚司馬子良}
