  - {type: variant, offset: 811, length: 0, content: '', SBCK: 崔烈􅃰郡人靈帝開鴻都門牓賣官爵烈入錢五百萬得爲司徒及拜曰天子臨軒百寮畢㑹帝欣謂親幸曰悔不至三公後聲譽日滅烈不自安問子鈞曰吾爲三公於議何如鈞曰嫌大人銅臭烈舉杖擊之鈞時爲虎賁中郎服虎并載鶡尾狼狽而走烈罵曰死卒父撾而走豈孝乎鈞曰舜之事父也小杖受大杖走此恐䧟父於不義非不孝也烈慙而讓官魏志曰張廣字嗣宗魯第二子也魯雅爲魏武所寵諸子未勝纓並遣中使拜授官爵南鄭城碑曰位尊上將體極人臣五子十室榮並爵均童年嬰稚抱拜王人命婚帝族或尚或嬪又曰胡威字伯庸父質操厲清白爲荆州太守威至荆州省之十餘日歸質賜絹一疋威跪問曰大人清髙何得此物質曰俸禄之餘耳武帝問威曰卿清何如父清威曰臣不如父逺矣帝曰何對曰父清畏人知臣清畏人不知是以不如也又曰賈充字公閭父逵晚生充言充後當有充閭之度故名充字公閭又曰羊祜字叔子年數歲令乳母取所棄金鐶乳母曰}
