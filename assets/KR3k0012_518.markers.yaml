  - {type: variant, offset: 863, length: 0, content: '', SBCK: 勲績如此云何相志宏急荅曰精明百錬在割能断功以濟時職以静亂長沙之勲爲史所讃胡奴乃止又曰謝尚字祖仁豫章太守鯤之子也八歳神晤夙成鯤嘗携之或曰此兒一座顔回也尚應聲曰座無尼父誰識顔回一席之賔莫不驚異又曰王述字懷祖遷尚書僕射􅄒毎受職不爲虚讓其子坦之諌曰故事應讓􅄒曰汝爲我不堪也坦之曰非也克讓自美耳述曰旣云堪何爲復譲也坦之爲􅁊温府長史温子}
  - {type: page-break, offset: 863, content: '', id: KR3k0012_SBCK_518-5b}
  - {type: variant, offset: 863, length: 0, content: '', krp: 勲績如此云何相志宏急荅曰精明百錬在割能断功以濟時職以静亂長沙之勲爲史所讃胡奴乃止又曰謝尚字祖仁豫章太守鯤之子也八歳神晤夙成鯤嘗携之或曰此兒一座顔回也尚應聲曰座無尼父誰識顔回一席之賔莫不驚異又曰王述字懷祖遷尚書僕射𫐠毎受職不爲虚讓其子坦之諌曰故事應讓𫐠曰汝爲我不堪也坦之曰非也克讓自美耳述曰旣云堪何爲復譲也坦之爲桓温府長史温子}
  - {type: variant, offset: 864, length: 4, content: 鮑宣梁鴻, SBCK: 求婚于王因坦}
