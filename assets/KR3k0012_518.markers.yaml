  - {type: variant, offset: 1190, length: 330, content: 莞徐氏生邈及二姊適同郡劉氏文章最盛又曰慕容垂妻段氏字元妃光祿大夫段儀女婉惠有志操常謂妺季妃曰我終不作凡人妻季妃曰我亦不作庸夫婦鄰人聞笑之後燕王納元妃為室范陽王德娉季妃並如其言又曰王凝之妻謝氏名道韞安西將軍弈之女也聰明有才辯同郡張玄妹亦有才質適顧氏謝玄每之以敵道韞有濟尼者遊於二家或問之荅曰謝夫人神情散朗故有林下之風顧家婦清心玉映自是閨房之秀宋書新野庾彥達為益州刺史攜姊之官資給中分祿秩西土稱之齊書曰永興中有王氏女年五歲得毒病兩目皆盲性至孝年二十父亡盲女臨屍一叫眼皆血出小妺娥舐之其左眼即開愈時人皆以為孝感所致也梁典曰長廣橋者宋武帝姊昔賣紗糴米還橋小不敢過無舡得渡日晚宋武帝大飢久方見姊負米還乃謂姊曰若異日富貴當長廣此橋遂為名也新子曰梁車新為鄴令其姊往見之值暮郭, WYG: ''}
