  - {type: variant, offset: 2256, length: 299, content: 檀弓曰子思之哭嫂也為位婦人倡踊又曰嫂叔之無服也蓋推之遠之也又雜記曰嫂不撫叔叔不撫嫂史記曰蘇秦洛陽人從鬼谷歸大困窮困兄嫂姊妹妻皆笑之不為下機秦乃閉室不出讀周書陰符後合六國從約并力相六國北報趙過洛陽車騎輜重擬於王者乃歸昆弟嫂側目不敢仰視秦謂嫂曰何前踞而後恭嫂匍匐以面伏地謝曰見季子位高金多也漢書曰高祖長兄伯妻高祖微時嘗避事時與賓友過其丘嫂丘空也無壻曰丘乃寡嫂也嫂厭叔引客來食佯為羹盡轑釜客去高祖視釜尚有羹由是怨之後定天下而伯子獨不得封太上皇為言之高祖曰非敢忘也但其母不長者耳後七年封為羹頡侯又曰陳平兄伯常耕田縱平遊學嫂疾之不親家事或問平食何物而肥對曰食糠籺耳嫂曰有叔如此不如無伯聞而逐其妻晉書曰鄭休妻石, SBCK: 奚憂焉吕}
