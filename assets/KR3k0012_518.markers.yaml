  - {type: variant, offset: 461, length: 0, content: '', WYG: 司馬談為太史天子建漢家之封而太史公留滯周南不得從事發憤而卒子遷適見父於河洛之間太史公執遷手下泣曰其先即周之太史後世中衰絶於余乎汝後為太史則續吾祖矣漢書曰張湯杜陵人父為長安丞父出湯為兒守舍遭鼠盗肉父還怒之笞湯湯掘地燻鼠得餘肉劾鼠掠治訊鞫鞫論報取鼠磔堂下父忽視其文辭如老吏大驚異遂使書獄焉又曰王遵字子貢涿人遷益州刺史先是王陽為益州至卬峽九折坂歎曰奉先人遺體奈何數乗此險後以疾去及遵至此阪問吏曰此非王陽所畏道耶吏曰是遵叱其馭曰驅之王陽為孝子王遵為忠臣又曰曹參代蕭何為相國日夜飲酒子窋為中大夫惠帝怪之令窋言曰無以請事何以憂天下窋洗沐歸具言參怒之乃笞二百曰趣入侍天下事非汝所當言又曰路温舒字長君鉅鹿人父為里門監使温舒牧羊因取澤中蒲截為牒編之寫書又曰揚雄蜀人自揚季至雄五代一子也又曰韋賢字長孺魯人質樸少欲篤志於學通詩書易以教受號鄒魯大儒為丞相薨少子元成字少翁以明經厯位丞相故鄒魯諺曰遺子黄金滿籯不如一經又曰張禹字子文河内軹人父徙家蓮勺禹為小兒數至市卜相者竒其面貌謂禹父曰此兒多智可令經學矣又曰疏廣字仲翁東海蘭陵人也明春秋為太子太傅知止足與兄子受上疏乞骸骨上賜黄金二十斤太子贈五十斤歸郷里請故舊賔客為樂嵗餘子孫竊謂昆弟老人勸説買田宅廣曰吾豈不念子孫哉顧有田廬足供衣食今更增益以為贏餘教子孫怠惰耳賢而多財損其志愚而多財益其過且富者衆之怨也吾既無教化於子孫不欲益其生怨也又曰朱邑字仲卿廬江人少時為桐郷嗇夫病且死囑其子曰我為桐郷吏其民愛我必葬之桐郷後世子孫奉祀我不如桐郷民及死其子葬之民果為起冢立祠又曰石奮從髙祖至景帝時為九卿子慶等四人官至二千石景帝尊寵號為}
