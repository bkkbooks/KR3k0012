  - {type: variant, offset: 881, length: 0, content: '', SBCK: 不令愔知將亡出一箱書付門生曰夲欲焚之恐公年老老必傷􅉖爲􅁦我亡後􅀂大損寢食可呈此箱不爾即便焚之愔後果哀悼成病門生依旨呈之則悉與温徃反宻計悉見愔於是大怒曰小子死恨晚矣更不復哭}
  - {type: variant, offset: 881, length: 0, content: '', krp: 不令愔知將亡出一箱書付門生曰夲欲焚之恐公年老老必傷愍爲弊我亡後若大損寢食可呈此箱不爾即便焚之愔後果哀悼成病門生依旨呈之則悉與温徃反宻計悉見愔於是大怒曰小子死恨晚矣更不復哭}
  - {type: variant, offset: 882, length: 0, content: '', SBCK: 曰􅁃冰字季堅都督江荆七郡軍事子襲常貸官絹一疋冰怒捶之市絹十疋還官又曰王濛字仲祖父汭字文開爲淦令美容姿甞覽鏡自照稱其父字曰王文開生如此兒又曰王導字茂弘子恱字長豫弱冠有髙名事親色飬導甚愛之常與恱弈碁争道導􅀏曰想與有􅀲􅁑郍得爾耶導性儉悵下甘果爛敗令棄之云勿使大郎知恱爲中書郎先導卒導先夢人以百萬錢買恱潜爲祈禱者備矣㝷掘地得錢百萬意甚􅁖之一一皆藏閉及恱疾篤導憂念時至不食積日忽見一人形狀甚偉􅀍甲持刀導}
