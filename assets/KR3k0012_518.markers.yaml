  - {type: variant, offset: 1521, length: 159, content: 閉遂踰郭而入梁車新因刖其足趙成侯以為不慈遂奪璽免官應劭風俗通曰郝廉太原人飢寒不受人衣食曾過姊家飯留五十文置席下而去世說曰郗嘉賓死婦弟欲迎其姊還姊終不肯歸曰生縱不得與郗郎同室死甯不同穴也又曰袁彥道有二姊一適殷源一適謝祖嘗語桓宣武切恨不更有一人配卿也王子年拾遺曰賈逵年六歲其姊聞鄰家讀書日日抱逵就籬聽之逵年十歲乃暗誦六經父, WYG: 吳}
