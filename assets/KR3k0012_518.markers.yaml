  - {type: variant, offset: 635, length: 19, content: 范冉姊病往看之姊為設飯冉留錢一百文姊使, SBCK: 馮勤字偉伯魏郡}
  - {type: variant, offset: 635, length: 3, content: 范冉姊, WYG: 馮勤字偉伯魏郡人曾祖楊宣帝時為𢎞農太守有子八人皆為二千石魏趙間號萬石君又曰周華字宣光汝南人子勰字臣勝自曽祖楊至勰孫六代一子皆知名又曰吳祐字季英陳留人父恢為南海太守祐年十二隨父到官恢欲殺青簡竹以寫書祐諫曰今大夫踰越五嶺逺在海濵其俗誠陋舊多珍怪上為國家所疑下為權威所望此書若成即載之兼兩昔馬援以薏苡興謗王陽以衣囊徼名嫌疑之間先賢所慎恢竒之乃撫其首曰吴氏世不乏季子矣又曰崔烈涿郡人靈帝開鴻都門牓賣官爵烈入錢五百萬得為司徒及拜日天子臨軒拜百寮畢㑹帝欣謂親幸曰悔不少靳烈至三公聲譽日減烈不自安問子釣曰吾為三公於議如何釣曰嫌大人銅臭烈舉杖撃之釣時為虎賁中郎服虎弁戴鶡尾狼狽而走烈罵曰死卒父撻而走豈孝乎釣曰舜之事父也小杖受大杖走此恐陷父於不義非不孝也烈慙而讓官魏志曰張廣字嗣宗魯第二子也魯雅為魏武所寵諸子未勝纓並遣中使拜授官爵南鄭城碑曰位尊上将體極人臣五子十室榮並爵均童年嬰稚抱拜王人命婚帝族或尚或嬪又曰吳威字伯庸父質操厲清白為荆州太守威至荆州省之十餘日歸質賜絹一匹威跪問曰大人清髙何得此物質曰俸祿之餘耳武帝問威曰卿清何如父清威曰臣不如父逺矣帝曰何對曰父清畏人知臣清畏人不知是以不如也又曰賈充字公閭父逵晚生充言充後當有充閭之慶故名充字公閭晉書曰羊祜字叔子年數嵗令乳母取所棄金鐶乳母曰汝先無此物祜即指隣人李氏東垣桑樹中探得之主人驚曰此吾亡兒所失物也時人謂祜前身為李氏之子又曰華嶠字叔駿才學深博為秘書監性嗜酒率常沉醉撰漢紀九十七卷其十典未成而終秘書監何劭奏嶠子徹為佐著作續成之亦未竟而卒又曰王隱字處叔陳人世寒素父銓歴陽令有著述志每私録晉事及功臣行狀未就而卒隠儒素自守不交權貴博學多聞受遺業為著作郎令撰晉史又曰孫盛字安國次子放字齊荘幼稱令惠年七八嵗在荆州與父俱從庾亮出獵亮謂曰君亦來耶放應聲答曰無小無大從公于邁亮曰欲齊何莊放曰齊莊周亮曰不慕仲尼耶放曰仲尼生而知之者非所企及亮大竒之曰王輔嗣不過也又曰庾翼字稚恭孫盛字安國翼子愛客常候孫盛盛不在見盛子放謂之曰安國何在放曰徃稚恭家愛客曰孫氏大盛有兒如此放曰不如諸庾之翼翼既而語人曰我固得重呼奴父乎又曰袁宏為東征賦並列過江諸名德獨不載桓彛其子温怒焉宏一時之文宗為文不欲令人顯問時並遊青山飲歸温命宏同載因問曰君作東征賦何獨不及家君宏對曰尊公稱謂非下官敢專既未遑啓不敢顯之温疑其不實乃曰欲謂何宏曰風鑒散朗或搜或引身雖可亡道則不殞宣城之節信而為允也温泫然而止又不及陶侃侃子胡奴常於曲室抽刀逼問宏曰家君勲績如此云何相忘宏急答曰精明百錬在割能㫁功以濟時識以靜亂長沙之勲為史所讃胡奴乃止又曰謝尚字祖仁豫章太守鯤之子也八嵗神悟夙成鯤嘗攜之或曰此兒一座顔囘也尚應聲曰座無尼父焉别顔回一席之賓莫不驚異又曰王述字懐祖遷尚書僕射述每受職不為虛讓其子坦之諫曰故事應讓述曰汝為我不堪也坦之曰非也但克讓自美事耳述曰既云堪何為復讓也人謂汝勝我殆不如也坦之為桓温府功曺見温時倒執手板真不如父也温子欲求婚於王因坦之言於父坦之還家省父而述愛坦之雖長大猶抱之於膝上坦之乃言婚事於述大怒遽推坦之於膝下曰汝竟癡也詎可以女妻兵乃止又曰阮籍謂王渾曰濬冲清賞非卿倫也共卿言不如共阿戎談及戎子邁有美名少而肥大戎令食糠益轉肥也又曰王祥二子烈芬並知名為祥所愛同時而}
