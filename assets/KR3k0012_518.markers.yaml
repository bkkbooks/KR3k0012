  - {type: variant, offset: 63, length: 189, content: 我則有姊之喪故也二三子皆尚左左傳成上曰潞子嬰兒之夫人晉景公之姊也酆舒為政而殺之又傷潞子之目晉侯欲伐之諸大夫皆曰不可酆舒有三雋才不如待後之人伯宗曰必伐之狄有五罪雋才雖多其何補焉遂滅潞酆舒奔衛衛人歸請晉晉人殺之又昭元曰鄭徐吳犯之妹美公孫楚聘之矣公孫黑又使強委禽焉犯懼告子產子產曰是國無政非子之患也惟所欲與犯請于二子使女擇焉子晢盛飾而入布弊而出晢公孫黑子南戎服而入左右射超乘而出女自房, SBCK: 盍徃}
