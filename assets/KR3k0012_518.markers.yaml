  - {type: variant, offset: 649, length: 0, content: '', WYG: 數千萬常開庫任超所取超性好施}
  - {type: variant, offset: 650, length: 0, content: '', WYG: 日之中散與親故都盡桓温辟為征西大将軍椽温懐不軌超為之謀轉司徒左長史而卒初雖黨桓氏以愔忠於王室不軌之事不令愔知将死出一箱書付門生曰本欲焚之恐父年老老必傷愍為弊我亡後若大損寝食可呈此箱不爾即便焚之愔果哀悼成病門生依旨呈之則悉與温徃反宻計悉見愔於是大怒曰小子死恨晩矣更不復哭又曰庾氷字季堅都督江荆七郡軍事子襲常貸官絹十疋氷怒捶之市絹十疋還官又曰王濛字仲祖父汭字文開為當塗令美姿容嘗覽鏡自照稱其父字曰王文開生如此兒又曰王導字茂𢎞子恱字長豫弱冠有髙名事親色養導甚愛之常與恱奕棋爭道導笑曰相與有瓜葛那得爾耶導性儉帳下甘果爛敗令棄之云勿使大郎知恱為中書郎先導卒導先夢人以}
  - {type: page-break, offset: 650, content: '', id: KR3k0012_WYG_518-10b, image: WYG0897/WYG0897-0623b.png}
