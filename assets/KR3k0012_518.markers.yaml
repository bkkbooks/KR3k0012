  - {type: variant, offset: 461, length: 0, content: '', SBCK: 司馬談爲太史天子建漢家之封而太史公留滯周南不得從事發憤而卒子遷適見父於河洛之間太史公執遷手下泣曰其先即周之太吏後丗中衰絶於余乎汝後爲太史則續吾祖矣漢書曰張湯杜陵人父爲長安丞父出湯爲兒守舎遭䑕盗肉父還怒之笞湯湯掘地薫䑕得餘肉劾䑕掠治訊鞠鞫論報取䑕磔堂下父忽視其文辭如老吏大驚異遂使書獄焉又曰王遵字子貢􅃰人遷益州刺史先是王陽爲益州至卭崍九折坂歎曰奉先人遺體奈何數乗此險後以疾去及遵至此坂問吏曰此非王陽所畏道耶吏曰是遵叱其馭曰駈之王陽爲孝子王遵爲忠臣又曰曹參代蕭何爲相國日夜飲酒子窋爲中大夫惠帝怪之令窋言曰無以請事何以憂夭下窋洗沐歸具言參怒之乃笞二百曰趣入侍天下事非汝所當言又曰路温舒字長君鉅鹿人父爲里門􅁥使温舒牧羊因取澤中蒲截爲牒編之冩書又曰楊雄蜀人自楊季至雄五代一子也又曰韋賢字長孺魯人質朴少欲篤志於學通詩書易以教授號鄒魯大儒爲丞相薨少子玄成字少翁以明經歴位丞相故鄒魯諺曰遺子黄金滿籯不如教之一經又曰張禹字子文河内軹人父徙家蓮勺禹爲小兒數至市卜相者竒其面貌謂禹父曰此兒多智可令經學矣又曰踈廣字仲翁東海蘭陵人也明春秋爲太子太傳知止足與兄子受上䟽乞骸骨上賜黄金二十斤太子贈五十斤歸郷里請故舊賔客爲樂歳餘子孫􅀼謂昆弟老人勸􅀃買田宅廣曰吾豈不念子孫哉顧有田廬足供衣食令更増益以爲盈餘教子孫怠惰耳賢而多財損其志愚而多財益以爲其過冨者衆人怨也吾旣無教化於子孫不欲益生於怨也又曰朱邑字仲卿廬江人少時爲桐郷嗇夫病且死嘱其子曰我爲桐郷吏其民愛我死必葬之後丗子孫奉祀我不如桐郷死且葬之民爲起􅃁祠又曰石􅁬從髙祖至景帝時爲九卿子等四人官至二千石景帝尊寵號爲}
