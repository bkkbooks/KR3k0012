  - {type: variant, offset: 1442, length: 1, content: 宋, SBCK: 不徃乃從温言詣陶至便拜􅁃風姿雅潤陶見拜不覺自起止之曰􅁃元規何縁拜陶士衡江統作謁拜議曰以爲諸郡吏都無太守伯叔兄敬者近臣君服斯服然則朝幹佐以下左右者可從君而拜君所拜統士古者見賔主皆拜今自非君臣上下則不拜君之新親者唯幹佐小吏則可君拜斯拜矣君之諸父無道謂之事甲辰儀臣見諸王直恭敬而巳無鞭板拜揖雖於皇帝爲諸祖諸父其義皆同又河南河内諸郡吏前後亦爲太守伯叔兄謁拜者其比甚衆矣尚}
