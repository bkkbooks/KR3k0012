  - {type: 'tls:seg', offset: 2552, content: '', id: KR3k0012_CHANT_542-26a.4}
  - {type: variant, offset: 2555, length: 0, content: '', krp: 㑹崇謙非臣下所知無在儀注之制張闈受侯不拜國太妃表云昔爲晉陵内}
  - {type: punctuation, offset: 2556, content: 。, id: KR3k0012_CHANT_542-bkkpn749}
