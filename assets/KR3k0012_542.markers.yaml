  - {type: variant, offset: 1823, length: 583, content: 令曰丈夫三十而室女子十五而嫁又曰衛人嫁其子而教之曰必私積聚為人婦而出常也其成居幸也其子因私積聚其姑以為多私而出之其子所以返者倍其所以嫁其父不自罪於教子非也而自知其益富淮南子曰禮三十而娶文王十五而生武王非法也歲星十二歲而周天天道一備故國君十二歲而冠冠而娶十五而生子重國嗣不從古制也白虎通曰婚姻者何謂昏時行禮故曰婚婦人因夫而成故曰姻又曰人道何以有嫁娶者何以為情性之大者莫大於男女之交人倫之始莫若夫婦男三十而娶女二十而嫁何陽數奇陰數偶男長女幼者何陽道舒陰道促男三十䈥骨以堅彊任為人父女二十肌膚充盛任為人母合為五十應大衍之數生萬物也又曰禮曰女子十五許嫁納采問名納吉請期親迎以鴈為贄納徵用玄纁故不用鴈也納徵玄纁束帛離皮玄三法天纁二法地也陽奇陰偶明陽道之大也離皮者兩皮也以為庭實庭實偶也又曰嫁娶必以春何春天地交通萬物始生陰陽交接之時也詩曰士如歸妻迨冰未泮夏小正曰二月冠子娶婦之時也夫有惡行妻不得去地無去天之義夫雖有惡猶不可去也故郊特牲記曰壹與之醮終身不改悖逆人倫殺妻父母廢絕綱紀亂之大者也義絕乃得去耳天子諸侯一娶九女者何重國廣繼嗣也適九何地有九州承天之施無所不生一娶九女亦足承君施九而無子百亦無益也又曰男二十五繫心女十五許嫁感陰陽也陽數八陰數一男八歲毀齒陽氣數奇三八二十四加一而繫心陰數偶故再成十四加一為五故十五許嫁各加一者明專一繫心所以繫心者防其淫佚也又曰婚經曰賓升北面奠鴈再, krp: ''}
