  - {type: variant, offset: 8, length: 0, content: '', SBCK: 大祝曰大祝辨九拜一曰稽首二曰頓首三曰空首四曰振動五曰吉拜六曰凶拜七曰竒拜八曰褒拜九曰肅拜以享右􅀕祀稽首拜頭至地也頓首頭叩地空首拜頭至手所謂拜手也古拜拜而後稽顙謂齊衰不杖以下者也言吉者此殷之凶拜周以其與頓首相近故謂之吉拜云凶拜稽顙而後拜謂三年服者也杜子春云竒讀爲竒偶之竒謂先屈一􅂰雅拜是也或云竒讀曰􅀝􅀝拜謂持節持㦸拜身􅀝之以拜也鄭大夫云動讀爲董書亦或爲董振董以兩手相擊也竒拜謂一拜也褒謂報報再拜是也鄭司農云折褒拜今時持節拜也肅拜但俯身下手今時揖是也介者不拜故曰爲事敢肅使者玄謂振動戰慄變動之拜也書曰王折色変一拜折荅臣下也再拜禮神與尸享獻也謂朝獻饋獻也右讀爲侑侑勸尸食而拜禮記曲禮曰侍食於長者主人親饋則拜而食主人不親饋則不拜而食以其禮於巳不隆也又曲禮曰君言至則主人出拜君言之辱使者歸則必拜送于門外又曲禮曰介者不拜爲其拜而莝拜莝則失容節莝猶詐也又曲禮下曰士有獻於國君問之曰安取彼再拜稽首而後對又檀弓上曰孔子曰拜而後稽顙頽乎其順也稽顙而後拜頎乎其至也頽頎懇至也此俱喪拜時人行之異禮又内則曰凡拜男尚右手女拜尚左手鄭玄注曰左陽右隂左傳僖公曰王使宰孔賜齊侯胙胙􅀕肉尊之此二王後曰天子有事于文武使孔賜伯舅胙天子謂異姓諸侯曰伯舅齊侯將下拜孔曰且有後命天子使孔曰以伯舅耊老加勞賜一級無下拜七十曰耊級等也對曰天威不違顔咫尺言天監察不逺威嚴常在顔靣之前八寸曰咫小白余敢貪天子之命無下拜小百齊侯名余身也恐隕越于下隕越顚墜也􅀭天王居上故言恐顚墜于下以遺天子羞敢不下拜下拜登受又僖中曰公賦河水公賦六月趙衰曰重耳拜賜公子降拜稽首公降一級而辝焉衰曰君稱所以佐天子者命重耳重耳敢不拜又文上曰公如晉及晉侯盟晉侯饗公賦菁菁者我菁菁者莪詩小雅取其旣見君子樂且有儀莊叔以公降拜日小國受命於大國敢不慎儀君貺之以大禮何樂如之抑小國之樂大國之惠也侯降辭登成拜公賦嘉樂嘉樂詩大雅取顯顯令德冝民冝人受禄于天又成公九年曰季文子如宋致女復命公享之賦韓弈之五章韓弈詩大雅篇名其五章言蹶父嫁女於韓後爲女相所居莫如韓樂文子喻魯侯有蹶父之德宋公如韓侯宋土如韓樂穆姜出于房再拜曰大夫勤辱不忘先君以及嗣君施及未亡人穆姜伯姫母聞文子言宋樂喜而出謝其行勞婦人夫死自稱未亡人先君猶有望也言先君亦望文子之􅀂此敢拜大夫之重勤又賦緑衣之卒章而入緑衣詩邶風也取其我思古人實􅀗我心喻文子言得已意又襄元曰穆叔如晉報智武子之聘也晉侯享之金奏肆夏之三不拜肆夏樂曲名工歌文王之三又不拜歌鹿鳴之三三拜韓獻子使行人子問之對曰三夏天子所以享元侯也使臣弗敢與聞文王兩君相見之樂也使臣不敢及鹿鳴君所以嘉寡君敢不拜嘉嘉者以叔孫爲嘉賔故歌鹿鳴之詩取其我有嘉賔也叔孫奉君命求嘉叔孫乃所以嘉魯君四牡君所以勞使臣也敢不重拜皇皇者華君教使臣曰必諮於周皇皇者華君遣使臣之詩也言中臣奉使能輝光君命如華之皇皇然又當諮於忠信以􅀘巳不及也臣聞之訪問於善爲諮諮親爲詢諮禮爲度諮事爲諏諮難爲謀臣獲五善敢不重拜五善謂諮詢度諏謀也又襄二曰公使厚成叔弔于衛曰寡君使瘠聞君不撫社稷而越在他境􅀂之何不弔衛人使太叔儀對曰羣臣不佞得罪于寡君寡君不以即刑而悼棄之君不忘先君之好辱弔羣臣敢拜君命之辱重拜大貺又昭四曰􅀄楚恭王無冢適有寵子五人無適立焉乃大有事于羣望而祈曰隨神擇於五人者使王社稷乃徧以璧見於羣望曰當璧而拜者神所立也誰敢違之旣乃與巴􅁎宻埋璧於大室之庭巴􅁎恭王妾太室祖廟使五人齊而長㓜入拜順長㓜以次拜也康王跨之靈王肘加焉子于子哲皆逺之平王弱抱而入再拜皆厭紐孝經右契曰制作孝經道備使七十人弟子向北辰星而聲折孔子絳單衣向星而拜}
