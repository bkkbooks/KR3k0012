  - {type: punctuation, offset: 2540, content: 「, id: KR3k0012_CHANT_542-bkkpn747}
  - {type: variant, offset: 2540, length: 0, content: '', krp: 建安元年自徐州還髙宻道遇黄巾賊數萬人見玄皆再拜樊英別傳曰英嘗病卧便室中英妻遣婢拜問疾英下牀荅拜陳寔問英何荅婢拜英曰妻齊也共奉祭祀禮無徃而不反荀氏家傳曰魏文帝在東宫武帝謂曰荀公爲人之師表也汝當盡禮敬之荀曽病丗子問疾拜牀下三輔決録曰孟他字伯郎靈帝時中常侍張讓專朝譲監奴典任家計他殫家財賂監奴共結親厚積年衆奴心慙問他所欲他曰欲得汝曹拜奴等皆許諾時賔客求見譲者門車常數百乗或累曰不得過他最後徃眾奴以其至皆迎而拜之將他車騎入衆人大驚謂他與讓善爭以珎物遺他他得盡以賂讓讓大喜後以蒲陶酒遺讓即拜梁州刺史燕書曰皇甫眞字楚季鄴城失守秦主𥘉入臨前殿醼羣臣數百人皆集東掖門見待中王猛來眞等望馬首拜之明日更見眞乃卿猛猛曰昨拜朝卿何恭慢之相違眞荅曰卿昨爲賊朝是國士吾冥拜賊而卿國士亦何所怪也猛嘉之韓子曰禮者所以貌情也中心懷而不諭}
  - {type: variant, offset: 2541, length: 0, content: '', krp: 疾趍卑拜以明之燕丹子曰田先生見太子太子側階而迎迎而再拜賈誼書曰受計之禮主所親拜者二聞生民之數則拜之聞登榖則拜之郭子曰陶公自上流來陶折字士衡也赴蘇峻之難含怒於庾公庾公謂必戮巳進退無計温父乃勸詣陶公卿但俓拜必無他我爲卿保之庾殊未了而不得不徃乃從温言詣陶至便拜庾風姿雅潤陶見拜不覺自起止之曰庾元規何縁拜陶士衡江統作謁拜議曰以爲諸郡吏都無太守伯叔兄敬者近臣君服斯服然則朝幹佐以下左右者可從君而拜君所拜統士古者見賔主皆拜今自非君臣上下則不拜君之新親者唯幹佐小吏則可君拜斯拜矣君之諸父無道謂之事甲辰儀臣見諸王直恭敬而巳無鞭板拜揖雖於皇帝爲諸祖諸父其義皆同又河南河内諸郡吏前後亦爲太守伯叔兄謁拜者其比甚衆矣}
  - {type: variant, offset: 2543, length: 4, content: 左丞同縣, krp: 逸令曰卞壼等奏三代以來記籍禮經無拜臣之制唯漢成帝拜}
  - {type: variant, offset: 2548, length: 6, content: 逸年十三為縣, krp: 禹庸主凡臣不足爲軌先帝拜司徒導以元皇興自蕃國布衣之交拜在人臣之故師而不改以君拜臣大教有違事應改正太后又詔曰帝㓜少冝一遵先帝壼等又固争云云臣期不奉詔又反覆乃從外奏成帝拜王公時議曹疑於儀注博士杜瑗及陳舒議禮無以君拜臣下也}
