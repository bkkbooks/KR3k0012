  - {type: xml-element, offset: 5, content: '', id: KR3k0012_CHANT_542-bkkxmlele1}
  - {type: 'tls:seg', offset: 5, content: '', id: KR3k0012_CHANT_542-1a.1}
  - {type: 'tls:seg', offset: 5, content: '', id: KR3k0012_CHANT_542-1a.2}
  - {type: variant, offset: 5, length: 2, content: 婚姻, SBCK: 一拜􅀃文曰拜首至地也尚書舜典曰帝曰俞咨垂汝作共工垂拜稽首讓千殳斨帝曰俞咨益汝作朕虞益拜稽首讓于朱虎熊羆帝曰俞咨伯汝作秩宗伯拜稽首讓于䕫龍又大禹謨曰帝曰禹官占惟先蔽志昆命于元􅀛朕志先定詢謀僉同􅀑神其依􅀛筮叶從卜不習吉禹拜稽首固辭又大禹謨曰益賛于禹曰惟德動天無逺弗届滿招損謙受益時乃天道禹拜昌言曰俞班師振旅又益稷曰臯陶拜手稽首颺言曰念哉周禮春官}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_542-1b}
  - {type: variant, offset: 5, length: 2, content: 婚姻, WYG: 一拜説文曰拜首至地也尚書舜典曰帝曰俞咨垂汝作共工垂拜稽首讓於殳斨帝曰俞咨益汝作朕虞益拜稽首讓於朱虎熊羆帝曰俞咨伯汝作秩宗伯拜稽首讓於夔龍又大禹謨曰帝曰禹官占惟先蔽志昆命於元龜朕志先定詢謀僉同鬼神其依龜筮協從卜不習吉禹拜稽首固辭又大禹謨曰益賛於禹曰惟徳動天無逺弗届滿招損謙受益時廼天道禹拜昌言曰俞班師振旅又益稷曰臯陶拜手稽首颺言曰念哉周禮春官太祝曰太祝辨九拜一曰稽首二曰頓首三曰空首四曰振動五曰吉拜六曰凶拜七曰竒拜八曰褒拜九曰肅拜以享右祭祀稽首拜頭至地也頓首頭叩地空首拜頭至手所謂拜手也吉拜拜而後稽顙謂齊衰不杖以}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_542-1b, image: WYG0898/WYG0898-0064b.png}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_542-2a, image: WYG0898/WYG0898-0064c.png}
  - {type: variant, offset: 5, length: 2, content: 婚姻, krp: 一拜說文曰拜首至地也尚書舜典曰帝曰俞咨垂汝作共工垂拜稽首讓千殳斨帝曰俞咨益汝作朕虞益拜稽首讓于朱虎熊羆帝曰俞咨伯汝作秩宗伯拜稽首讓于䕫龍又大禹謨曰帝曰禹官占惟先蔽志昆命于元龜朕志先定詢謀僉同鬼神其依龜筮叶從卜不習吉禹拜稽首固辭又大禹謨曰益賛于禹曰惟德動天無逺弗届滿招損謙受益時乃天道禹拜昌言曰俞班師振旅又益稷曰臯陶拜手稽首颺言曰念哉周禮春官}
