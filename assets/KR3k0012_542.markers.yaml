  - {type: variant, offset: 946, length: 140, content: 許人彥弟馥問褒褒曰賢兄葬父於洛陽隨母還臨淄用意如此何婚之有魏氏春秋曰司空東萊王基當世大儒豈不達禮而納司空王忱女以姓同源異故也又曰陳矯本劉氏子出嗣舅氏而婚于本族徐宣每非之廷議其闕太祖以矯才量欲全之乃下令曰喪亂以來風教凋薄謗議之言難同褒貶自建安五年已前一切勿論其以斷前誹議者以其罪罪也, SBCK: 爲紀拜由是顯名}
