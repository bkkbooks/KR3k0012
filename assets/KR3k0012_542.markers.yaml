  - {type: variant, offset: 138, length: 291, content: 他日董祈愬之於范獻子曰不吾敬也獻子執而紡之紡猶懸也懸於庭之槐也叔向過之曰子盍為我請乎叔向曰求繫既繫矣求援既援矣欲而得之又何請焉家語曰伯夏生叔梁紇叔梁紇娶於魯施氏生女九人無男叔梁紇曰雖有九女是無子也乃求婚於顏氏顏氏有三女小曰徵在顏父問三女曰鄒大夫雖父祖為士然先聖之裔也今其人身長九尺武力絕倫吾甚貪之雖年長性嚴不足為疑三子孰能為之妻二女莫對徵在進曰從父所制將何問焉父曰即爾能矣遂以妻之又曰男子二十而冠有為人父之端女年十五許嫁有適人之道群生閉藏乎陰而為化育之始聖人因時以合偶男女窮天數也霜降而婦功成嫁娶者行焉季秋霜降嫁娶者始於此冰泮而農桑起婚禮殺於此焉龍魚圖曰以賣馬錢娶婦令多惡病夫妻離別, WYG: ''}
