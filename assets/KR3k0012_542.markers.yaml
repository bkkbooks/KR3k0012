  - {type: variant, offset: 1988, length: 763, content: 曰人道何以有嫁娶者何以為情性之大者莫大於男女之交人倫之始莫若夫婦男三十而娶女二十而嫁何陽數奇陰數偶男長女幼者何陽道舒陰道促男三十䈥骨以堅彊任為人父女二十肌膚充盛任為人母合為五十應大衍之數生萬物也又曰禮曰女子十五許嫁納采問名納吉請期親迎以鴈為贄納徵用玄纁故不用鴈也納徵玄纁束帛離皮玄三法天纁二法地也陽奇陰偶明陽道之大也離皮者兩皮也以為庭實庭實偶也又曰嫁娶必以春何春天地交通萬物始生陰陽交接之時也詩曰士如歸妻迨冰未泮夏小正曰二月冠子娶婦之時也夫有惡行妻不得去地無去天之義夫雖有惡猶不可去也故郊特牲記曰壹與之醮終身不改悖逆人倫殺妻父母廢絕綱紀亂之大者也義絕乃得去耳天子諸侯一娶九女者何重國廣繼嗣也適九何地有九州承天之施無所不生一娶九女亦足承君施九而無子百亦無益也又曰男二十五繫心女十五許嫁感陰陽也陽數八陰數一男八歲毀齒陽氣數奇三八二十四加一而繫心陰數偶故再成十四加一為五故十五許嫁各加一者明專一繫心所以繫心者防其淫佚也又曰婚經曰賓升北面奠鴈再拜稽首降出婦從房中降自西階壻御婦車授綏遣女於禰廟重先人之遺體不敢自專故告禰也父母親戒女何親親之至父曰戒之敬之夙夜無違命母施矜結縭曰勉之敬之夙夜無違宮事父誡於阼階母誡於西階庶女及門內施鞶申以父母之命命之曰敬恭宗廟父母之言夙夜無愆視諸𥘞鞶去不辭誡不諾蓋恥之重去也鄭玄別傳曰故尚書左丞同縣張逸年十三為縣小史君謂之曰爾有贊道之質玉雖美須雕琢而成器能為書生以成爾志不對曰願之乃遂拔於其輩妻以弟女列女傳曰邵南申女者申人之女也既許嫁於農家禮不備而欲迎之女與其人言其人媒氏往求命之者以為夫婦者人倫之始也不可不正夫家輕我違制不可以行夫家訟之女曰一物不具一禮不備守節持義必死不往又曰魯師春姜者魯師氏之母也嫁其女三往而三逐春姜問故以輕其室人也春姜召其女而笞之曰夫婦人以順從為務貞愨為首故婦事夫有五平旦纚笄而朝則有, SBCK: 恐失}
