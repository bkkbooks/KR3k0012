  - {type: variant, offset: 2556, length: 2, content: 君謂, krp: 在東海國封内時丗孫㓜小太妃秉政前内史遷授除拜日及當}
  - {type: variant, offset: 2559, length: 5, content: 曰爾有贊道, krp: 官皆上䟽拜閤執純臣}
