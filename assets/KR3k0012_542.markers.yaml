  - {type: variant, offset: 975, length: 2, content: 魏氏, WYG: 又曰晉宣王以常林鄉邑耆徳每為拜或謂林曰司馬公貴重君宜上之林曰司馬公自欲敦長㓜之序為後生法貴非吾之所畏也拜非吾之所制也言者踧踖而退蜀志曰先主為漢中王許靖為太傅丞相諸葛亮皆為之拜又曰伊籍隨先主入益州東使吳孫權聞其才辯欲逆折以辭籍適入拜權曰勞事無道之君籍即對曰一拜一起未足為勞吳志曰朱治領吳郡舉孫權為孝亷後權歴位上將及為吳王治毎見權常親迎執板交拜又曰人誣樓𤣥謗訕政事華覈上䟽乞𤣥自新孫皓疾𤣥名聲復徙𤣥及子男據付交趾将張奕使以戰自効隂别敕奕令殺之據到交趾病死𤣥身隨奕討賊持刀見奕輙拜奕不忍殺㑹奕暴疾卒𤣥殯歛奕於器中見敕書還便自殺耳王隠晉書曰何曽司徒與髙鄭二公將見文帝曽在中央獨先拜漢晉}
