  - {type: variant, offset: 8, length: 0, content: '', WYG: 者言吉凶者比殷之凶拜周以其與頓首相近故謂之吉拜云拜稽顙而後拜謂三年服者也杜子春云竒讀為竒偶之竒謂先屈一膝推拜是也或云竒讀曰倚倚拜謂持節持㦸拜身倚之以拜也鄭大夫云動讀為董書亦或為振董董以兩手相係也竒拜謂一拜也褒讀為報報拜再拜是也鄭司農云褒拜今時持節拜是也肅拜但俯身下手今時揖是也介者不拜故曰為事敢肅使者或為振動戰慄變動之拜也書曰王動色變一拜以答臣下也再拜禮神與尸享獻也謂朝獻饋獻也右讀為侑侑勸尸食而拜禮記曲禮曰侍食於長者主人親饋則拜而食主人不親饋則不拜而食以其禮於己不隆也又曲禮曰君言至則主人出拜君言之辱使者歸則必拜送於門外又曲禮曰介者不拜為其拜而蓌拜蓌則失容節蓌猶詐也又曲禮下曰士有獻於國君問之曰安取彼再拜稽首而後對又檀弓上曰孔子曰拜而後稽顙頽乎其順也稽顙而後拜頎乎其至也頽順懇至也此俱䘮拜時人行之異禮又内則曰凡拜男尚右手女拜尚左手鄭𤣥注曰左陽右隂左傳僖公曰王使宰孔賜齊侯胙胙祭肉尊之此三王後曰天子有事於文武使孔賜伯舅胙天子謂異姓諸侯曰伯舅齊侯將下拜孔曰且有後命天子使孔曰以伯舅耋老加勞賜一級無下拜九十曰耄級等也對曰天威不違顔咫尺言天監察不違威嚴常在顔靣之前八尺曰咫小白余敢貪天子之命無下拜小白齊侯名余身也恐隕越於下隕越顛墜也以天子居上故恐顛墜以遺天子羞敢不下拜下拜登受又僖中曰公子賦河水公賦六月趙衰曰重耳拜賜公子降拜稽首公降一級而辭焉衰曰君稱所以佐天子者命重耳重耳敢不拜又文上曰公如晉及晉侯盟晉侯饗公賦菁菁者莪菁菁者莪詩小雅取其旣見君子樂且有儀矣荘叔以公降拜曰小國受命於大國敢不慎儀君貺之以大禮何樂如之抑小國之樂大國之惠也晉侯降辭登成拜公賦嘉樂嘉樂詩大雅取其顯顯令徳宜民宜人受禄于天又成公九年曰季文子如宋致女復命公享之賦韓奕之五章韓奕詩大雅篇名其五章言厥父嫁女於韓為女相所居莫如韓樂文子喻魯侯厥父之嫁宋公如韓使宋土如韓樂穆姜出於房再拜曰大夫勤辱不㤀先君以及嗣君施及未亡人穆姜伯姬母聞文子言宋樂喜而出謝其行勞婦人夫死自稱未亡人先君猶有望也言先君亦望文子之若此敢拜大夫之重勤又賦緑衣之卒章而入又襄四年曰穆叔如晉報知武子之聘也晉侯享之金奏肆夏之三不拜肆夏樂曲名工歌文王之三又不拜歌鹿鳴之三三拜韓獻子使行人子員問之對曰三夏天子所以享元侯也使臣弗敢與聞文王兩君相見之樂也臣不敢及鹿鳴君所以嘉寡君也敢不拜嘉以穆叔為嘉賔故歌鹿鳴之詩取其我有嘉賔也穆叔奉君命來嘉穆叔乃所以嘉魯君四牡君所以勞使臣也敢不重拜皇皇者華君教使臣曰必諮於周臣聞之訪問於善為咨咨親為詢咨禮為度咨事為諏咨難為謀臣獲五善敢不重拜也又襄十四年曰公使厚成叔弔於衛曰寡君使瘠聞君不撫社稷而越在他竟若之何不弔衛人使大叔儀對曰羣臣不佞得罪於寡君寡君不以即刑而悼棄之君不㤀先君之好辱弔羣臣敢拜君命之辱重拜大貺又昭十三年曰初楚共王無冡適有寵子五人無適立焉乃大有事於羣望而祈曰請神擇於五人者使主社稷乃徧以璧見於羣望曰當璧而拜者神所立也誰敢違之既乃與巴姬宻埋璧於大室之庭巴姬共王妾大室祖廟使五人齊而長入拜康王跨之靈王肘加焉子干子晳皆逺之王平弱抱而入再拜皆厭紐孝經右契曰制作孝經道備使七十二弟子向北辰星而罄折孔子絳單衣向星而拜}
