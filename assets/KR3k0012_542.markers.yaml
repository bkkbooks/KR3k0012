  - {type: variant, offset: 2766, length: 746, content: 反而行則有兄弟之道必期必誠則有朋友之信寢席之交然後有夫婦之際君子謂春姜曰知陰陽之順逆也楚國先賢傳曰孫雋字文英與李元禮俱娶太尉桓焉女時人謂桓叔元兩女俱秉龍言得壻如龍也世說曰王戎儉恡其從子婚與一單衣裁後便責之戎女適裴氏貸錢數萬女歸戎色不說女還錢乃懌世說曰溫嶠從姑劉氏家值亂離唯有一女姑問嶠有求婚意荅云佳壻難得但如嶠比云何姑荅云喪破之餘乞得粗相存活便足慰吾餘年敢希汝比卻數日嶠報姑云已得婚處門地粗可壻身不減嶠因下玉鏡臺一枚姑大喜既婚交禮女以手披紗扇大笑曰固嫌是此老奴果如所疑玉鏡臺是嶠為劉越右長史北征劉聰所得也又曰王文度為桓公長史桓為兒求垣女王許桓藍田既還因言桓求己女婚藍田大怒文度還云下官家中先得婚處桓公曰吾知矣此尊府君不肯又曰王丞相初在江左欲結吳人請婚陸太尉太尉曰培塿無松柏薰蕕不同器抏雖不才義不為亂倫之始也又曰諸葛恢大女適庾亮兒次女適羊忱亮子被蘇峻害改適江霦恢兒娶鄧攸女子時謝尚書求其小女婚恢乃云羊鄧是平婚江家我顧伊庾家伊顧我不能復與謝褒兒婚也又曰諸葛恢女既寡誓不復再出其女性甚凶彊無有登車理恢既許江思玄婚乃移家嫁之初紿女云宜徙於是家人一時去獨留女在後比其覺已不復得出江郎暮來女哭詈積日漸久歇江霦暝入宿但在對床上後觀其意轉帖霦乃詐厭良久聲氣轉急女乃呼婢云喚江郎覺江於是躍來就之云自是天下男子厭何預卿事而見喚耶既爾相關不得復不與人語於是默然而慚遂為夫妻聖證論云嫁娶古人皆以秋冬毛詩曰東門之楊其葉牂牂毛萇傳曰男女失時不逮秋冬也李固助展允婚教曰告文學師議曹史展允篤學貧苦慈孝推讓年將知命妃匹未定聞之愴然其閔哀之夫冠娶仕進非所以己親允兄弟無意亦朋友不好事之罪也前遣師輔為允娶云譚處士等各欲佐助迄今未定出錢千萬率先生大夫府內掾史守助佐幹及譚掾等其欲議朋友少徵條名目允貧也禮宜從約二三萬錢足以成婚虞翻與弟, SBCK: 唐}
