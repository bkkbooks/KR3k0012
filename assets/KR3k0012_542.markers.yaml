  - {type: variant, offset: 3704, length: 338, content: 將求秦以反國不敢逆秦故也梁簡文帝資遣孔燾二女教曰夫思人至鄉事惟悼往表閭式墓義匪字孤至如游殷之息見撫張既橋玄之子受託魏王斯故美在令終受兼身後故無錫令孔燾經術弘長志履貞慨遊處積年一朝長往聞其在室二女並未有行可廣訪姻家務求偶對媒毛詩七月曰伐柯如之何匪斧不克娶妻如之何匪媒不得毛詩氓曰送子涉淇至于頓丘匪我愆期子無良媒周禮地官下曰媒氏掌萬民之判凡男女自成名以上皆書年月日名焉令男三十而娶女二十而嫁又地官曰媒氏凡男女之陰訟聽之于勝國之社陰訟爭中冓之事以觸法者家語曰孔子之郯遇程子於途顧謂子路曰取束帛以贈先生子路對曰由聞士不中間不見女無媒君子不與交禮焉白虎通曰男娶女嫁何陰卑不能自專就陽而成之故傳曰陽唱陰和男行女隨男不專娶女不專嫁必由父母須媒妁何遠恥防淫佚也淮南子曰女因媒而嫁不因媒而親闞駰, SBCK: 拜太平御覽卷第五百四}
