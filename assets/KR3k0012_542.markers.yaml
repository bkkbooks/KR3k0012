  - {type: variant, offset: 73, length: 1, content: 女, SBCK: 啓跪也郭璞注曰小跪也方言曰東齊青岱北燕之郊跪謂長鶩郭璞注曰今東郡人亦呼長跪爲長鶩釋名曰跪危也兩膝隠地體危倪他跽忌也見所敬者不敢自安也拜於丈夫爲趺跌然屈折下就地也於婦人爲扶自相扶而上下也漢書曰武帝幸不其如淳曰其音基不基山名因以爲縣祠神人於交門宫􅀿邵曰神人蓬萊仙人之屬也瑯瑘縣有交門宫武帝所造􅀂有嚮坐拜者作交門之歌又曰劉章巳殺吕産帝令謁者持節勞章章欲奪節謁者不肯章乃從與載因節信馳斬長樂衛尉吕更始還入北軍復報太尉勃起拜賀又曰大將軍衛青旣益尊姉爲皇后然汲黯與亢禮或􅀃黯曰自天}
