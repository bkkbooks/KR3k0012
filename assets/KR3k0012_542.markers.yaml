  - {type: variant, offset: 2568, length: 173, content: 美須雕琢而成器能為書生以成爾志不對曰願之乃遂拔於其輩妻以弟女列女傳曰邵南申女者申人之女也既許嫁於農家禮不備而欲迎之女與其人言其人媒氏往求命之者以為夫婦者人倫之始也不可不正夫家輕我違制不可以行夫家訟之女曰一物不具一禮不備守節持義必死不往又曰魯師春姜者魯師氏之母也嫁其女三往而三逐春姜問故以輕其室人也春姜召其女而笞之曰夫婦人以順從為務貞愨為首故婦事夫, krp: 爵}
