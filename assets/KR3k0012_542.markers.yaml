  - {type: variant, offset: 1348, length: 1, content: 籍, SBCK: 猛少貧賤鬻畚爲事嘗至洛陽貨畚有一人於市買其畚云家近在此也隨我去取直猛隨去忽至深山中此人語且住樹下當先啓導湏􅁷猛進見一公踞胡牀髦悉白侍從十許人有一人引猛云大司馬公猛因拜老公公曰王公何縁拜即十倍酬畚直遣人送猛出山旣出嶺視乃嵩髙山晉中興書曰顯宗嘗使太常丞張放歸胙於王導詔無下拜導不敢當辭以疾􅀄顯宗㓜冲見導􅁪拜晋諸公讃曰司馬駿鎮西戎旣薨毎見其碑讀者無不拜}
  - {type: page-break, offset: 1348, content: '', id: KR3k0012_SBCK_542-7b}
  - {type: variant, offset: 1348, length: 1, content: 籍, WYG: 猛少貧賤鬻畚為事嘗至洛陽貨畚有一人於市買其畚云家近在此也隨我去取直猛隨去忽至深山中此人語且住樹下當先啓道須臾猛進見一老公踞胡牀髪悉白侍從十許人有一人引猛云司馬公猛因拜老公公曰王公縁何拜即十倍酬畚直遣人送猛出山旣出嶺視乃嵩山晉中興書曰顯宗嘗使太常丞張放歸胙於王導詔無下拜導不敢當辭以疾初顯宗㓜冲見導恒拜晉諸公讃曰司馬駿鎮西戎旣薨每見其碑讀者無不拜}
  - {type: page-break, offset: 1348, content: '', id: KR3k0012_WYG_542-12a, image: WYG0898/WYG0898-0069c.png}
  - {type: variant, offset: 1348, length: 16, content: 籍之為太子文學居叔母之喪而婚丞相, krp: 猛少貧賤鬻畚爲事嘗至洛陽貨畚有一人於市買其畚云家近在此也隨我去取直猛隨去忽至深山中此人語且住樹下當先啓導湏臾猛進見一公踞胡牀髦悉白侍從十許人有一人引猛云大}
  - {type: variant, offset: 1350, length: 1, content: 為, SBCK: 後魏書曰沈文秀爲慕容白曜攻之長圍數匝自夏至秋始剋文秀取所持節衣冠儼然坐齊内亂兵入文秀厲聲數四身見執而祼送于白曜曜左右令拜文秀曰各二國大臣無相拜之禮曹䐽別傳曰沛國桓邵亦輕太祖邵避難交州得出首拜謝於庭中太祖曰跪可解死耶遂殺之郭太別傳曰郷人見太皆於床下拜鄭􅀇別傳曰建安元年自徐州還髙宻道遇黄巾賊數萬人見玄皆再拜樊英別傳曰英嘗病卧便室中英妻遣婢拜問疾英下牀荅拜陳寔問英何荅婢拜英曰妻齊也共奉􅀕祀禮無徃而不反荀氏家傳曰魏文帝在東宫武帝謂曰荀公爲人之師表也汝當盡禮敬之荀曽病丗子問疾拜牀下三輔決録曰孟他字伯郎靈帝時中常侍張讓專朝譲監奴典任家計他殫家財賂監奴共結親厚積年衆奴心慙問他所欲他曰欲得汝曹拜奴等皆許諾時賔客求見譲者門車常數百乗或累曰不得過他最後徃眾奴以其至皆迎而拜之將他車􅀐入衆人大驚謂他與讓善爭以珎物遺他他得盡以賂讓讓大喜後以蒲陶酒遺讓即拜梁州刺史燕書曰皇甫眞字楚季鄴城失守􅁗主􅀄入臨前殿醼羣臣數百人皆集東掖門見待中王猛來眞等望馬首拜之明日更見眞乃卿猛猛曰昨拜朝卿何恭慢之相違眞荅曰卿昨爲賊朝是國士吾􅁳拜賊而卿國士亦何所怪也猛嘉之韓子曰禮者所以貌情也中心懷而不諭故疾趍卑拜以明之燕丹子曰田先生見}
