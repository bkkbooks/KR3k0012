  - {type: variant, offset: 3519, length: 184, content: 求婦其父如此誰肯嫁之者造求小姓足使生子天其福人不在舊族揚雄之才非出孔氏芝草無根醴泉無源家聖受禪父嚚母頑虞家世法出癡子魏袁淮正論曰或曰同姓不相娶何也曰遠別也曰今之人外內相婚禮歟曰中外之親近於同姓同姓且猶不可而況中外之親乎古人以為無疑故不制也今以古之不言固謂之可婚不知禮者也或曰國語云同德則同姓同姓雖遠男女不相及異德則異姓異姓雖近男女相及也斯言何故也曰司空季子有為而言也文, WYG: ''}
