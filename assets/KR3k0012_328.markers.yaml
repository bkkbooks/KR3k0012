  - {type: variant, offset: 152, length: 0, content: '', SBCK: 劉曜咸和三年曜夢三人金靣丹脣東向逡廵不言而退曜拜而履其跡旦召公卿巳下議之朝臣咸賀以爲􅁻祥唯太史令任義進曰三者歴運統之極也人爲震位王者之始次也金爲兊位物衰落也脣丹不言事之畢也逡廵揖讓退舎之道也爲拜者屈伏於人履跡而行愼勿出壃也東井􅁗分也五車趙分也􅁗兵必􅁀起亡主衆師留敗趙地逺至三年近至七百日應不逺願陛下思而防之曜大懼又曰}
