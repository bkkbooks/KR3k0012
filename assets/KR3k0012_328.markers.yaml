  - {type: variant, offset: 1729, length: 282, content: 曰無故如天如地說苑曰魏文侯攻中山樂羊將已得中山還反叛文侯命主書曰群臣賓客所獻書操以進主書者舉兩篋以進令將軍視之盡難攻中山之事也將軍還北面而再拜曰中山之舉也非臣之力君之功也韓子曰晉文公將與楚戰召舅犯問曰吾將與楚戰彼眾我寡為之柰何對曰臣聞之君子不厭忠信戰陣不厭詐偽君其詐之而已又問雍季對曰焚林而田後必無獸以詐遇民後必無民公曰善以舅犯謀與楚戰大敗之歸行爵先雍季而後舅犯群臣曰城濮之事舅犯之謀夫用其言而後其身可乎公曰此非若所知夫舅犯之言權也雍季之言萬世之利也罷兵史記曰漢武帝患匈奴屢為邊患鴈門馬邑豪聶壹因大將軍王恢言匈奴初和親親信邊可誘以利致之伏兵襲擊必破之道也帝召問公卿, SBCK: 怒}
