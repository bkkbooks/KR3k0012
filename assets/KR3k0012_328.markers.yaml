  - {type: variant, offset: 567, length: 5, content: 西突厥葉護, SBCK: 淮南道行臺僕射輔公祏據丹陽反遣趙郡王恭爲行軍元帥討之將發與諸將宴集命取水忽變爲血在座中皆失色恭舉止自􅀂諭之曰禍福無門唯人自召自頋無􅀒於物諸君何憂懼之􅀷公祏惡積禍􅄹今承廟筭以致討盆中之血乃公祏授首之徴遂盡歡而罷時人服其識度而能安衆竟平公祏焉又曰李晟之將復京師也時熒惑守歳乆之方退賔介或勸晟曰今熒惑巳退皇家之利也}
  - {type: page-break, offset: 567, content: '', id: KR3k0012_SBCK_328-6a}
  - {type: variant, offset: 567, length: 5, content: 西突厥葉護, WYG: 淮南道行臺僕射輔公祐據丹陽反遣趙郡王恭為行軍元帥討之將發與諸將宴集命取水忽變為血在坐中皆失色恭舉止自若諭之曰禍福無門惟人自召自顧無負于物諸君何憂懼之深公祐惡積禍盈今承廟算以致討盆中之血乃公祐授首之徴遂盡歡而罷時人服其識度而能安衆竟平公祐焉又曰李晟之恢復京師也時熒惑守嵗乆之方退賔介或勸晟曰今熒惑已退皇家之利也}
  - {type: page-break, offset: 567, content: '', id: KR3k0012_WYG_328-10a, image: WYG0895/WYG0895-0815a.png}
  - {type: variant, offset: 567, length: 5, content: 西突厥葉護, krp: 淮南道行臺僕射輔公祏據丹陽反遣趙郡王恭爲行軍元帥討之將發與諸將宴集命取水忽變爲血在座中皆失色恭舉止自若諭之曰禍福無門唯人自召自頋無負於物諸君何憂懼之深公祏惡積禍盈今承廟筭以致討盆中之血乃公祏授首之徴遂盡歡而罷時人服其識度而能安衆竟平公祏焉又曰李晟之將復京師也時熒惑守歳乆之方退賔介或勸晟曰今熒惑巳退皇家之利也}
  - {type: variant, offset: 573, length: 2, content: 汗遣, SBCK: 速出兵晟曰天子外次人臣當死節垂象玄逺吾安知天道至是謂叅佐曰前者公勸晟出兵非敢拒也且軍士可用之不可}
  - {type: variant, offset: 573, length: 2, content: 汗遣, WYG: 速出兵晟以天子外次人臣當死節垂象𤣥逺吾安知天道至是謂叅佐曰前者公勸晟出兵非敢拒也且軍士可用之不可}
