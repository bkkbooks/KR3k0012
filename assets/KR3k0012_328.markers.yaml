  - {type: variant, offset: 3421, length: 8, content: 載戢干戈載橐弓矢, SBCK: 二四凶不祥不可舉事太公進曰退非子之所及也聖人生天地之間承衰亂而起􅀛者枯骨􅆱者折草何足以辯􅁻凶祖行之日雨輜車至􅎮是洗濯甲兵也行之日幟旗爲三是軍分爲三如此斬紂之首􅁻也抱朴子曰晉太康二年京邑始亂三國舉兵攻長沙王人小民張昌反於荆州奉劉尼爲漢主乃遣石水擊定楊州屯於建業宋道衝􅀃冰求爲丹陽太守到郡發兵以攻冰召余爲貯兵都尉余年二十一見軍旅不得巳而就之宋侯不用吾計數敗吾令宋侯從月建住華盖下遂収合餘燼從吾計破石冰焉}
