  - {type: variant, offset: 2847, length: 149, content: 曰公輸般為蒙天之階階成將以攻宋墨子聞之赴於宋至於郢見般曰聞子為階將以攻宋宋何罪之有無罪而攻之不可謂仁胡不已也公輸般曰不可吾既以言之王矣墨子曰胡不見我於王公輸般曰諾墨子見楚王曰今有人於此舍其文軒鄰有弊輿而欲竊之舍其錦繡鄰有短褐而欲竊之舍其梁肉鄰有糠糟而欲竊之此為何若人王曰此為竊疾耳墨子曰荊之地方五千, SBCK: 當百夫風鳴氣者賊存在十}
