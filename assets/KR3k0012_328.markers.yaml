  - {type: variant, offset: 401, length: 160, content: 許便開門奮擊遂摧破之叔業進退失圖於是奔走左右欲追之永曰弱卒不滿三千彼精甲猶盛非力屈而敗直墮吾計中耳既不測我之虛實足喪其膽俘此足矣何暇逐之獲叔業傘扇鼓幕甲仗万餘兩月之中遂獻再捷高祖嘉之後周書曰武帝平齊夏四月至自東伐列齊主於前其王公等並從車轝旗幟及器物以次陳於其後大駕布六軍備凱樂獻俘於太廟京邑觀者皆稱万歲戊申封齊主為溫國公, SBCK: 賊衆多降}
