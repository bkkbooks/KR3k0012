  - {type: variant, offset: 1714, length: 0, content: '', SBCK: 用兵者順天道未必􅁻逆之不必凶􅀂失人事三軍敗亡且天道􅀑神視之不見聽之不聞智將不發而愚將拘之􅀂乃好賢而能用舉事而得此則不看時曰而事利不暇卜筮而事􅁻不禱祝而福從遂命駈之前進周公曰}
