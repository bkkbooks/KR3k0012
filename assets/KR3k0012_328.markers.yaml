  - {type: variant, offset: 626, length: 856, content: 封德彝進曰若不戰而和親夷狄必謂中國畏懼未若擊之剋捷而和親此則威恩兼舉高祖然之戊辰西突厥遣使獻名馬已巳并州大惣管襄邑王神符擊突厥於汾東斬首五百級虜其馬二千疋汾州刺史蕭顗斬突厥五千餘級又曰太宗平東都凱旋親被黃金甲陳鐵馬一万騎甲士三萬人前後部鼓吹俘二偽主及隨神器輦輅獻捷于太廟高祖大悅行飲至禮以享焉又曰張瑾初仕隋歷職顯貴煬帝被圍於鴈門也瑾以驍果出城擊戰一日九捷煬帝登城望之大悅賜物二千叚又曰元和中忠武軍節度使李光顏奏破吳元濟之眾上大悅賜其告捷使奴婢銀錦又曰元和十二年十月隋唐節度使李愬帥師入蔡州執賊師吳元濟以聞淮西平辛巳上御宣政殿受朝賀九品已上及宗子四夷之使皆會又曰元和十四年魏愽節度使田弘正遣使獻逆臣李師道命左右軍兵衛之先獻于太廟郊社上御興安門百寮於門下列位稱賀又曰元和中昭義節度郗士美以賊首三百來獻詔梟於通化門外班師爾雅曰出曰治兵尚武也入曰振旅反尊卑也郭璞曰幼賤在前貴勇也尊老在後尚儀也詩曰出車勞還率也赫赫南仲薄伐西戎昔我往矣黍稷方華春日遟遟卉木萋萋執訊獲醜薄言還歸又曰杖杜勞還役也有杖之社其葉萋萋周禮曰若師有功左執律右秉鉞以先凱樂獻于社左傳曰三年而治兵入而振旅歸而飲至以數軍實飲至於廟以數車徒所獲也又曰楚子敗晉師于邲潘黨曰君盍築武軍而收晉尸以為京觀楚子曰夫文止戈為武武有七德禁暴戢兵保大定功安人和眾豐財者也我無一焉何以示子孫祀于河作先君宮告成事而還後漢書曰曹操討劉備出教曰雞肋外曹莫曉楊德祖曰夫雞肋食之則無所得棄則我惜公歸計決矣操乃還軍又曰馬援自南方振旅還京師軍吏經瘴疫死者十四五賜援兵車一乘晉書曰王濬平吳上表云間在秣陵諸軍凡二十萬眾臣軍先至為土地之主百姓之心皆歸仰臣臣切勑所領秋毫不犯諸有市易皆明破劵契有違犯者凡斬十三人皆吳人所知也餘軍縱橫詐稱臣軍而軍類皆蜀人幸以此自別耳又曰賈充為伐吳大都督孫皓降於王濬充未之知方以吳未可平抗表請斑師充表與告捷表同至朝野以充佐居人上智出人下宋書曰十二月景申大軍次左里將戰帝麾之麾竿折幡沉于水眾咸懼帝笑曰昔覆舟之役亦如此今勝必矣遂攻其柵盧循單舸走眾軍皆旋晉帝遣侍中黃門勞師于行所, SBCK: ''}
