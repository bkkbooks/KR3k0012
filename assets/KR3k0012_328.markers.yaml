  - {type: variant, offset: 2019, length: 126, content: 如韓安國曰臣聞高皇帝圍於平城匈奴至者投鞍高如城者數所平城之飢七日不食天下歌之及解圍反位而無忿怒之心夫聖人以天下為度者不以己私怒傷天下之政故乃遣劉敬奉金千斤以結和親至今為五代利孝文皇帝又嘗一擁天下之精兵聚之廣武常谿終無尺寸之功而天下黔首無不憂孝文悟於兵之, SBCK: ''}
