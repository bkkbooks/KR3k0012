  - {type: variant, offset: 3589, length: 2, content: 定收, SBCK: 亂諸侯争雄玄女兵法曰凢行兵之道}
  - {type: variant, offset: 3589, length: 0, content: '', WYG: 亂諸侯争雄𤣥女兵法曰凡行兵之道天地大寳得者全勝失者必負北斗之中禽有旬始狀像雄雞制百兵之母能得其術何神不使九地九天各有表裏三竒六合主威軍士又曰黄帝攻蚩尤三年城不下募求術士乃得伍骨與之言曰今日余攻蚩尤三年城不下其咎安在伍骨曰此城中之將為人必白色商音帝始攻時得無以秋之東方行乎今黄帝為人蒼色角音此雄軍也以戰為之黄帝曰善為之若何伍骨曰臣請攻蚩尤三日城必下黄帝大喜其中黄直曰帝積三年攻蚩尤而城不下今子欲以三日下之何以為明伍骨曰不如臣言請以軍法論黄帝曰子欲以何時臣請朱雀之日日正中時立赤色徴音絳衣之軍于南方以輔角軍臣請以青龍之日平旦時立青色角音青衣之軍于東方以輔羽軍臣請以𤣥武之日人}
