  - {type: variant, offset: 3590, length: 1, content: 收, WYG: 時立黒色羽音黒衣之將于北方以輔商軍臣請以白虎之日日入時立白色商音白衣之將于西方以輔宫軍四將以立臣請為帝以黄龍之日日中建黄旗于中央以制四方五軍已具西面攻蚩尤三日其城果下黄帝即封骨世世不絶又曰戰鬭之法當從九}
