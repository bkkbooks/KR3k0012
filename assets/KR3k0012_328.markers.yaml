  - {type: variant, offset: 3592, length: 0, content: '', SBCK: 地大寳得者全勝失者必􅀒北斗之中禽有旬始􅃺像雄雞制百兵之母能得其術何神不使九地九天各有表裏三竒六合王威軍事又曰黄帝攻􅃖尤三年城不}
  - {type: variant, offset: 3592, length: 0, content: '', WYG: 之上擊九地之下衆士黙黙人無見者九天者春在青龍夏在朱雀秋在白虎冬在𤣥武四神為九天其衝為九地星占曰太白出髙用兵深入敢戰者吉星出東方中國大利蠻夷大敗兵書曰氣聚如龍如鵠尾其}
  - {type: variant, offset: 3592, length: 0, content: '', krp: 地大寳得者全勝失者必負北斗之中禽有旬始狀像雄雞制百兵之母能得其術何神不使九地九天各有表裏三竒六合王威軍事又曰黄帝攻蚩尤三年城不}
