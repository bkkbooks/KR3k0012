  - {type: variant, offset: 2288, length: 377, content: 皇帝以國富人逸攘却匈奴西連諸國至于安息東過碣石造塩鐵酒攉之利以佐用度猶不能足當此之時寇賊並起征伐不休之故也今陛下不忍悁悁之忿欲歐士眾擠之大海之中悁居緣切擠祖奚切快心幽冥之地非所以保全元元也詩云蠢爾荊蠻大邦為讎自古患之久矣何況万里之蠻乎臣竊以往者羗軍言之暴師曾未一年兵出不踰千里費四十餘萬大司農錢盡乃以少府禁錢續之夫一隅為不善費尚如此況於勞師遠攻亡士無功乎臣愚以為非冠帶之國禹貢所不及皆可且無以為於是遂罷其郡後漢書曰光武建武中北匈奴衰弱臧宮馬武上書請臨塞厚懸購賞喻告高勾驪烏桓鮮卑攻其左發河西四郡及天水隴西羗胡擊其右如此北虜之滅不過數年矣帝曰舍近謀遠者勞而無功舍遠謀近者逸而有終故曰務廣地者荒務廣德者強有其有者安貪人有者殘殘滅之政雖成必敗今國無善政災變不息百姓驚惶人不自保而復遠事邊外乎孔子曰吾恐季孫之憂不在顓臾自是諸將莫敢復言兵事魏志曰諸葛誕據壽春及魏將, SBCK: ''}
