  - {type: variant, offset: 3969, length: 709, content: 六年初兼天下有長人見於臨洮其高五丈足迹六尺放寫其刑鑄金人以象之翁仲君何是也發謫戍入蒭槀戍守長城也入蒭藁之說以供國用之也頭會箕賦於少府頭會隨民口數人責其稅箕賦似箕斂民財多取意也少府官名如今司農丁壯大夫西至臨洮狄道臨洮隴西之縣洮水北狄道漢陽之縣是也東至會稽浮石會稽山名浮石隨水高下言不沒皆在遼西界一說會稽山在泰山下封于泰山禪於會稽是也南至豫章桂林豫章郡桂林鬱林也北至飛狄陽原飛狄在代郡南飛狄山也陽原在太原道路死人以溝量言滿溝也當此之時忠諫者謂之不祥而道仁義者謂之狂逮至高皇帝存亡繼絕漢高祖也舉天下之大義身自奮袂執銳以為百姓請命于皇天執利兵伐無道以求百姓之命祈之皇天也當此之時天下雄俊豪英暴露于野澤才過千人為俊百人為豪萬人為英前蒙矢石而後墮壑出百死而紹一生以爭天下之權墮入也紹至也奮武厲誠以決一旦之命當此之時豐衣愽帶而道儒墨者以為不肖言尚武也逮至累亂以勝勝暴亂也海內大定繼文之業立武之功繼文王受命之業武王誅無道之功履天子之圖籍造劉氏之貌冠高祖於新農所作竹冠一曰季貌冠也揔鄒魯之儒墨通先聖之遺教載天下之旗乘泰輅建九旒撞大鍾擊鳴鼓奏咸池陽干戚周禮天子五輅泰輅上輅也王者功成作樂故撞鍾擊鼓咸池黃帝樂也干楯也戚斧也春夏舞者所執當此之時有立武者見疑一世之間而文武代為雌雄有時而用也今世之為武也則非文也為文者則非武更相非而不知時世之用也說苑曰魏文侯與田子方語有兩童子衣青白衣而侍於君前子方曰此君子之寵子乎文侯曰非也其父死於戰此其孤幼也寡人收之子方曰臣以君之賊心為足今滋甚君之寵此子也又且以誰之父殺之乎文侯愍然曰寡人受令矣自是已後兵革不用左太冲魏都賦曰喪亂既弭而能宴武人歸獸以去戰蕭斧戢柯以押刃虹旌攝麾以就卷沈休文詩曰丹浦非樂戰負重切君臨, SBCK: 八}
