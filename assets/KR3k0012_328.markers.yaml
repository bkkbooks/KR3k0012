  - {type: variant, offset: 12, length: 0, content: '', krp: 百人從軍後魏書曰張衮字洪龍上谷沮陽人也好學有文才太祖爲代王選爲左長史决䇿幃幄太祖器之禮遇優厚又曰韓茂從討平凉當茂所衝莫不應弦而殪由是丗祖壯之又曰張衮從太祖破賀訥登勿居山聚石爲峰以記功徳命衮爲文又曰豆代田從討平凉擊破赫連定得奚斤等世祖以定妻賜之詔斤膝行授酒於代田勑斤曰全尓命者代田功也進爵長廣公隋書曰郭榮遼東之役以功進位左光禄大夫明年帝復事遼東榮以爲中國疲敝万乗不冝屢動乃言於帝曰戎狄失禮臣下之事臣聞千鈞之弩不爲鼷䑕發機豈有親辱大駕以臨小㓂帝不納復從軍攻遼東城榮親蒙矢石晝夜不釋甲胄王粲從軍詩曰下舡登髙防草露霑我衣廻身赴床寢此愁當告誰身服干戈事豈得念所私又曰從軍有苦樂但問所從誰所從神且武焉得乆勞師鮑明逺東武吟曰始隨張校尉召募到河源後逐李輕車追虜窮塞垣曹子建詩曰從軍度凾谷馳馬過西京嵇叔夜贈秀才入軍詩曰良馬旣閑麗服有輝風馳霓逝躡景追飛凌厲中原頋盻生姿陸機從軍行曰朝食不免胄夕息常負戈苦哉逺征人附心悲如何薛瑩荅華永先詩曰桴鼔常在側筆研永欲捐卷衮不復開干戈以爲權劉義恭擬古詩曰束甲辝京洛負戈事烏孫後軍齊太河築壘黎陽屯旦聞羽檄飛夕見邊驛奔羽書史記曰齊使魯連爲書以箭射之遺燕將曰吾聞之知者不背時而弃利勇士不怯死而滅名忠臣不先身而後君忠廢名滅後代無稱非智也且吾聞效小莭者不能行大威悪小恥者不能立榮名昔管仲曹沬二公者非不能効小莭死小恥也以爲殺身絶代功名不立非智也故業與王覇争流名與天壤相弊公其圗之燕將自殺漢書髙紀曰武臣自立爲趙王沛令欲以沛應之恐有変欲誅蕭曹恐踰城保髙祖乃書帛射城中與沛父老父老乃殺沛令開門迎髙祖後漢書曰隗囂檄告州郡言王莽之罪楚越之竹不足以書其惡魏志曰閞羽圍行征南將軍曹仁於樊趙儼以議郎叅仁軍事儼謂軍將曰今賊猶盛我徒卒單少而仁隅絶不得同力前軍逼圍遣謀通仁使知外救以勵將士然後表裏俱發破楚必矣諸將皆喜便作地道射箭飛書與仁消息晉書曰𥘉安南將軍甘卓與左將軍隋王承書勸使固守當以兵出沔口断王敦歸路則湘圍自解承荅其書略曰足下若能卷甲電赴猶或有濟若其狐疑求我枯魚之肆矣梁後略曰己酉上自長沙寺移住天居寺是日北軍射書城内今者行兵不貪城隍土地不貪子女玉帛志存救弊濟此生民廣訪民人擇善而立梁朝士庶尚未相領解蟻聚窮城寂無求問㝷此異卜良用到惑又曰禇蘿率其下五百人乗大艦於鹿頭後湖以輝水戰北軍聚而觀蘿乃掉艦向岸北軍引去蘿亦廻歸上乃射書北軍大開賞募有能斬送賊帥者封五千户侯賜絹万疋占候孫子曰天者隂陽寒暑莭制也謂順天行誅因隂陽四時剛柔之制故司馬法日冬夏不興師所以兼受愛吾人若細雨沐軍臨機必有}
