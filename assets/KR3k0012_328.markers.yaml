  - {type: variant, offset: 2666, length: 177, content: 基討之司馬文王欲遣諸將輕兵深入招迎吳將唐咨等子弟因釁有蕩覆吳之勢基諫曰昔吳將諸葛恪乘東關之勝竭江表兵以圍新城城既不拔而眾死者太半蜀將姜維因洮上之利輕軍深入糧餉不繼軍覆上邽音圭夫既勝之後必輕敵則慮難不深今賊新敗於外又內患未弭是其脩政設慮之時也且兵出踰年人有歸志俘馘十万罪人斯得自歷代征伐未有全兵獨克如今之盛者也武皇帝破袁紹於官度自以所獲已多不復追奔懼挫威也, SBCK: ''}
