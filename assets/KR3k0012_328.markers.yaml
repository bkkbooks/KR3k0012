  - {type: variant, offset: 3013, length: 399, content: 荊有雲夢犀兕麋鹿盈之以江漢之魚鱉黿鼉為天下饒宋無雉兔鮒魚者也猶梁肉之與糠糟也荊有長松文梓楩柟豫章宋無長木此猶錦繡之與短褐也臣以王之攻宋也為與此同類王曰善請無攻宋呂氏春秋曰秦興兵欲攻魏司馬唐諫秦君曰叚干木賢者也而魏禮之天下莫不聞無乃不可加兵乎秦君乃按兵而輟不攻魏文侯可謂善用兵矣聞君子之用兵也莫見其形其功已成此之謂也偃武易曰澤上於地萃君子以除戎器戒不虞書曰武王伐殷乃偃武脩文倒載干戈包以虎皮示不用也行禮射設庠序修文教也歸馬于華山之陽放牛于桃林之野示天下弗服山南曰陽桃林在華山東北皆非長養牛馬之地欲使自生死示天下不服乘用也脩文教也禮記曰武王克啇後散軍而郊左射狸首右射騶虞而貫革之射息矣歸馬于華山之陽放牛于桃林之野干戈弓矢包之以虎皮示天下不復用兵也左傳曰宋向戍欲弭諸侯之兵以為名子罕曰天生五材民並用之廢一不可誰能去兵兵之設久矣所以威不軌而昭文德也聖人以興亂人以廢興廢存亡昏明之術皆兵由也而子求去之不亦誣乎, SBCK: ''}
