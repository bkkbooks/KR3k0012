  - {type: variant, offset: 3668, length: 299, content: 姓之殷實故取其嘉名也莊子曰孔子謂盜跖曰將軍有意聽臣臣請南使吳越北使齊魯東使宋衛西使晉楚使為將軍造大城數百里立數十萬戶之邑使尊將軍為諸侯與天下更始罷兵休卒收養昆弟共祭先祖此聖人才士之行而天下之願又曰見侮不辱救民之鬥禁政寢兵救世之戰古司馬法曰古者武軍三年不與民覩之勞也上下相報和之至也還師罷兵復戎卒三年不徭役以荅人勞得意則凱樂歌示喜也聖主誅不義百姓皆得其所喜樂各安其居樂其常偃伯靈臺荅民之勞告不興也偃休息也伯主兵也靈臺錯德美之喜以祭天示不復用兵也呂氏春秋曰武王以武得之以文持之倒戈弛矢示天下不用兵尸子曰武王已戰之後三革不累五刃不砥牛馬放之歷山終身弗乘也淮南子曰秦之時高為臺榭大為苑囿遠為馳道鑄金人秦始皇, WYG: ''}
