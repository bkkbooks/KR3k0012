  - {type: variant, offset: 1487, length: 0, content: '', SBCK: 十一月癸未梁主閱戎干津陽門外立二城南爲呉地北爲虜城西北風甚急􅄎天昬暗幡旗南靡乃移虜軍度南城呉軍度北城以順風也俄而驟雨􅁀降梁王輕輦還宫至城而霽觀者怪之又曰太原郡王髙洋督兵攻王思政䧟于潁川遂入東魏先是長社夜有聲如車􅀐從西北向城居二日黒風起於乹地吹水入城城壞風羊角而上又曰侯瑱敗王琳于梁山琳及蕭莊並奔于}
