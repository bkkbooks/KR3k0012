  - {type: variant, offset: 13, length: 0, content: '', SBCK: 廻風相觸道還而無功雲􅀋羊群必走之道氣如驚鹿必敗之勢黒雲出壘赤氣臨軍皆敗之兆􅀂烟非煙此􅂟雲也必勝􅀂霧非霧是泣軍也必敗是知風雲之占其來乆矣孫子占曰三軍將行其旌旗從容以向前是爲天送必亟擊之得其大將三軍將行其旍旗墊音店然􅀂􅀨是謂天霑其師失三軍將行旍旗乱於上東西南北無所主方其軍不還三軍將陣雨甚是爲浴師勿用陣戰三軍將戰有雲其上而赤勿用陣先陣戰者莫復其迹三軍方行大風飄起於軍前右周絶軍其將亡右周中其師得粮}
  - {type: page-break, offset: 13, content: '', id: KR3k0012_SBCK_328-4a}
  - {type: variant, offset: 13, length: 0, content: '', krp: 廻風相觸道還而無功雲類羊群必走之道氣如驚鹿必敗之勢黒雲出壘赤氣臨軍皆敗之兆若烟非煙此慶雲也必勝若霧非霧是泣軍也必敗是知風雲之占其來乆矣孫子占曰三軍將行其旌旗從容以向前是爲天送必亟擊之得其大將三軍將行其旍旗墊音店然若雨是謂天霑其師失三軍將行旍旗乱於上東西南北無所主方其軍不還三軍將陣雨甚是爲浴師勿用陣戰三軍將戰有雲其上而赤勿用陣先陣戰者莫復其迹三軍方行大風飄起於軍前右周絶軍其將亡右周中其師得粮}
