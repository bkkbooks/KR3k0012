  - {type: variant, offset: 9, length: 2, content: 一月, SBCK: 伯也執殳爲王前驅自伯之東首如飛蓬豈無膏沐誰􅃴爲容又曰鳵羽刺君子下從征役不得養父母也肅肅鳵羽集于苞栩王事靡盬不遑啓處漢書張良曰良性多病未嘗持兵將常爲畫䇿臣時從行後漢書曰周嘉字惠文仕郡爲主簿王莽未群盗入汝陽嘉從太守何敞討賊爲流矢所中賊圍十重白刃交集嘉以身捍之曰嘉請以死贖君命後太守㓂恂舉爲孝廉拜侍郎引見問遭難之事詔嘉尚公主嘉稱疾不肯當梁書曰曹景宗爲竟陵太守及帝起兵景帝聚族并率五服内子弟}
  - {type: page-break, offset: 9, content: '', id: KR3k0012_SBCK_328-1b}
  - {type: variant, offset: 9, length: 2, content: 一月, WYG: 伯也執殳為王前驅自伯之東首如飛蓬豈無膏沐誰適為容又曰鴇羽刺君子乆從征役不得養父母也肅肅鴇羽集于苞栩王事靡盬不能蓺稷黍漢書張良傳曰良多病未嘗特將兵長為畫䇿臣時從行後漢書曰周嘉字惠文仕郡為主簿王莽末羣盗入汝陽嘉從太守何敞討賊為流矢所中賊圍十重白刃交集嘉以身捍之曰嘉請以死贖君命後太守冦恂舉為孝亷拜侍郎引見問遭難之事詔嘉尚公主嘉稱不敢當梁書曰曹景宗為竟陵太守及帝起兵景宗聚衆率五服内子弟}
