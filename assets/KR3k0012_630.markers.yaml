  - {type: variant, offset: 453, length: 2, content: 長壽, WYG: 大将軍王鳯用事上遂謙讓無所専左右嘗薦光禄大夫劉向少子歆通逹有異材上召見誦讀詩賦甚悦之欲以為中常侍召取衣冠臨拜皆曰未曉大将軍又曰王鳯病天子數自臨問親執其手垂涕曰将軍病如有不諱平阿侯譚次將軍矣鳯頓首泣曰譚等雖與臣至親行奢僭無以率導百姓不如御史大夫音臣敢死保之初譚等倨不尊事鳯而音敬鳯卑恭如子故薦之又曰哀帝有詔舉太常王莽入收大司馬董賢印綬詔有司舉可代司馬者莽故大司馬辭位辟丁傅衆庶稱以為賢又太后近親自大司徒孔光以下武獨謀以為往事孝惠孝昭少主之世外戚吕霍上官持權幾危社稷今孝成孝哀比世無嗣方當選立親近輔㓜主不宜令異姓大臣持權親踈相錯為國計便於是何武舉公孫禄可大司馬而禄亦舉武太后竟自用莽為大司馬莽諷有司劾奏武公孫禄互相稱舉皆免又曰王嘉薦儒者公孫光滿昌及能吏蕭成薛修皆故}
