  - {type: variant, offset: 1089, length: 181, content: 李揆兼禮部侍郎揆嘗以主司取士多不考實徒峻其隄防索其書策殊未知蓺不至者居文史之囿亦不能摛其詞藻深昧求賢之意也及其試進士文章日於庭中設五經諸史及切韻本於床而引貢士謂之曰大國選士但務得才經籍在此請恣尋檢由是數日之間美聲上聞又曰上元年劉嶢上䟽曰國家以禮部為孝廉之門考文章於甲乙故天下響應驅於才蓺不務於德行夫德行者可以化人成俗才藝者可以約法立名故有朝登甲科而夕陷刑辟制法守, SBCK: 拜}
