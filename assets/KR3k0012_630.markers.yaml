  - {type: variant, offset: 2542, length: 716, content: 陸贄權知貢舉時崔元翰梁肅文蓺冠時贄輸心於肅與元翰推薦蓺實之士升第之日雖眾望不愜然一歲選士纔十四五數年之內居臺省者十餘人又曰元和初四月以起居舍人翰林學士王涯為都官員外郎吏部員外郎韋貫之為果州剌史先是策賢良詔楊於陵鄭敬李益與貫之同考覆是時牛僧孺皇甫湜李宗閔條對甚直無所畏避考官第其策皆居三等權幸或惡其詆己而不中第者乃注解其策同為唱誹又言涯居翰林其甥皇甫湜中選考覈之際不先上言故同坐焉居數日貫之再黜巴州司馬涯虢州司馬楊於陵遂出為廣州節度裴垍時為翰林學士居中覆視無所同異及為貴倖泣訴請罪於上上不得已罷垍翰林學士除戶部侍郎又曰元和中權知禮部侍郎庾承宣奏臣有親屬應明經進士舉者請准舊例送考功考試從之又曰長慶元年勑今年錢徽下進士鄭朗等一十四人宜令中書舍人王起主客郎中知制誥白居易等重試覆落十人三月丁未詔曰國家設文學之科本求才實茍容僥倖則異至公訪聞近日浮薄之徒扇為朋黨謂之關節干擾主司每歲策名無不先定永言敗俗深用興懷鄭朗等昨令重試不求深僻題目貴觀學蓻淺深孤竹管是祭天之樂出於周禮正經閱其程試之文都不知其本事詞律鄙淺蕪類可知其孔溫業等三人粗通可與及第其餘落第今後禮部舉人宜准開元二十五年勑及第人所試雜文并策先送中書門下詳覆又曰長慶中禮部侍郎王起奏曰伏以禮部放牓已是成名中書重覆尚未及第若重覆之中萬一不定則放牓之後遠近誤傳其於事理實為非便臣伏請每年進士堪及第者本司考試訖其詩賦先送中書門下詳覆後勑卻下本司然後准舊例大字放牓從之又曰太和初以散騎常侍馮宿太常少卿賈餗庫部郎中龐嚴為考官策第二十二人而前進士劉蕡策最切直不居是選其間指陳時事不避貴近言詞激切士林感動雖晁董無以過也而考官有所畏忌不敢上聞隨例擯斥識者之議喧然不平守道正人傳其文至有相對而泣者諫官等或, SBCK: ''}
