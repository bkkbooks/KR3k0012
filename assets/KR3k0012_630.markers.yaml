  - {type: variant, offset: 1259, length: 198, content: 登甲科而夕陷刑辟制法守度使之然也陛下焉得不改而張之至如日誦萬言何關理體文成七步未足化人昔子張學于祿仲尼曰言寡尤行寡悔祿在其中矣又曰行有餘力則以學文今捨其本而條其末況古之作文必諧風雅今之末學不近典謨勞心於卉木之門極筆於煙霞之際以此成俗斯大謬也昔者採詩觀風俗詠卷耳則忠臣喜誦蓼莪而孝子悲溫良敦厚詩教也豈主於淫文哉夫人之愛名如水之務下上有所好下必甚焉陛下若以德行為先文蓺為末必敦德勵行以佇甲科酆舒俊才沒, WYG: 廷知}
  - {type: punctuation, offset: 1267, content: ，, id: KR3k0012_CHANT_630-bkkpn267}
