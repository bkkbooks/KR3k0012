  - {type: variant, offset: 7, length: 1, content: 唐, SBCK: 曰趙文子知人所舉於晉國管庫之士七十有餘家管庫之士府史以下官長所置也舉之於君以爲大夫士也管鍵也庫物所藏禮記雜記曰管仲遇盗取二人焉上以爲公臣曰其所與遊僻也可人也言此人可也但居惡人之中使之犯法又儒行曰儒有内稱不避親外舉不避怨程功積事推賢而逹逹之不望其報苟利國家不求冨貴其舉賢援能有如此者左傳莊公曰鮑叔帥師來言曰子糺親也請君討之鮑叔乗勝而進軍志在生得管仲故言不忍之辭管召讎也請受而甘心焉管仲射桓公故曰讎甘心言欲快意戮殺之乃殺子紏于生竇召忽死之管仲請囚鮑叔受之及堂阜而稅之堂阜齊地或日鮑叔解夷吾縛於此因以爲名歸而以告曰管夷吾治於髙傒髙傒齊卿髙敬仲也言管仲治理政事之才多於敬仲使相可也公從之又僖中曰晉侯問原守於寺人勃鞮對曰昔趙衰以壷飱從徑餒而弗食言其廉且仁不忘君也徑猶行也故使處原從披言也衰雖有大功猶簡小善以進之示不遺勞又僖下曰楚子將圍宋使子文治兵於暌終朝而畢不戮一人暌楚邑自旦及食時爲終朝復使子玉治兵於蔿終日而畢鞭七人貫三人耳蔿邑自旦及夕爲終日國老皆賀子文子文飲之酒蔿賈尚㓜後至不賀子文問之對曰不知所賀子之傳政於子玉曰以靖國也靖諸内而敗諸外所獲幾何子玉之敗子之舉也舉以敗國將何賀焉又曰􅀄臼季使遇兾見兾缺耨其妻饁之敬相待如賔與之歸言諸文公曰敬德之聚也能敬必有德德以治民請君用之公曰其父有罪可乎對曰舜之罪也殛鯀其舉也興禹管仲桓公之賊也實相以濟康誥曰父不慈子不祗兄不友弟不恭不相及也詩曰採葑採菲無以下體君取節焉可也文公以爲下軍大夫又曰晉蒐于􅀍廬作三軍謀元帥趙襄曰郤縠可臣亟聞其言矣􅀃禮樂而敦詩書詩書義之府也禮樂德之則也德義利之夲也夏}
