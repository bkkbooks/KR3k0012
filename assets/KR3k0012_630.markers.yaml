  - {type: 'tls:seg', offset: 66, content: '', id: KR3k0012_CHANT_630-1a.14}
  - {type: variant, offset: 66, length: 0, content: '', SBCK: 未也畨吾君曰牛畜荀欣徐越皆賢可公仲乃進三人牛畜侍烈侯以仁義約以王道明日荀欣侍以選練舉賢任宫使能明日徐越侍以節財儉用察度功德所與無不充君悅乃使使謂相國曰歌者之田且止官牛畜爲師荀欣爲中尉徐越爲内史賜相國衣二襲史記藺相如者趙人也爲趙官者令繆賢舎人趙惠文王時得楚和氏璧秦昭王聞之使人遺趙王書願以十五城請易璧趙王與諸大臣謀欲與􅁗恐秦城不得見欺欲勿與即患􅁗兵之來計未定求人可使報秦者未得官者令繆賢曰臣舎人藺相如可使王問何以知之對曰臣甞有罪竊計欲亡走燕舎人藺相如止臣曰君何以知燕王臣語曰臣甞從大王與燕王㑹境上燕王私握臣手曰願結交以此知之故欲徃相如謂臣曰夫趙強而燕弱而君幸於趙王故燕王欲結交於君今君乃亡趙走燕燕畏趙其􅀔必不敢留君而束君歸趙矣君不如肉􅃝伏斧鑕請罪則幸得脫矣臣從其計大王亦幸赦臣臣􅀼以爲其人勇士有智謀冝可使於是王召問藺相如以爲賢遂使奉璧入秦又曰趙奢趙之田部吏也收租稅而平原君家不肯出趙奢以法治之殺用事者九人平原君怒將殺奢奢因說曰君於趙爲貴公子今縱君家而不奉公則法削法削則國弱國弱則}
  - {type: page-break, offset: 66, content: '', id: KR3k0012_SBCK_630-5a}
  - {type: variant, offset: 67, length: 3, content: 侯能自, WYG: 將亡以十數公無所追追信詐也何曰信國士無雙王必欲長王漢中無所事信張晏曰旡事用信也必欲争天下非信無可與計事者又曰孫叔通降漢從弟子百餘人然無所進専言諸故羣盜壯士進之弟子皆曰事先生數年幸而}
  - {type: page-break, offset: 67, content: '', id: KR3k0012_WYG_630-10a, image: WYG0898/WYG0898-0646c.png}
  - {type: variant, offset: 68, length: 0, content: '', SBCK: 加兵是無趙也君安得有此冨乎當以君之貴奉公如法則上下平上下平則國強國強趙固而君爲貴戚豈輕於天下􅁘平原君以爲賢言之於王王用之治國賦太平民冨而府庫實卒爲名將又曰陳平亡楚歸漢因魏無知求見漢王與語而􅀃之乃拜爲都尉使爲叅乗典護軍諸將盡讙後絳侯灌嬰等咸䜛平曰臣聞平居家時盗其嫂事魏不容亡歸楚歸楚不忠又忘歸漢今日大王尊官之令護軍臣聞平受諸將金多者得善處金少者得惡處平反覆亂臣也願王察之漢王疑召讓魏無知無知曰臣所言者}
  - {type: page-break, offset: 68, content: '', id: KR3k0012_SBCK_630-5b}
  - {type: variant, offset: 68, length: 0, content: '', krp: 加兵是無趙也君安得有此冨乎當以君之貴奉公如法則上下平上下平則國強國強趙固而君爲貴戚豈輕於天下耶平原君以爲賢言之於王王用之治國賦太平民冨而府庫實卒爲名將又曰陳平亡楚歸漢因魏無知求見漢王與語而說之乃拜爲都尉使爲叅乗典護軍諸將盡讙後絳侯灌嬰等咸䜛平曰臣聞平居家時盗其嫂事魏不容亡歸楚歸楚不忠又忘歸漢今日大王尊官之令護軍臣聞平受諸將金多者得善處金少者得惡處平反覆亂臣也願王察之漢王疑召讓魏無知無知曰臣所言者}
  - {type: variant, offset: 69, length: 0, content: '', SBCK: 也陛下所問者行也今有尾生孝巳之行而無益於勝􅀒之數陛下何暇用之乎楚漢相距臣進竒謀之士顧其計誠足以利國家不耳且盗嫂受金又何足疑乎王乃厚賜平拜爲護軍中尉盡護諸將後髙祖定天下與平剖符丗丗勿絶爲户牖侯平辭曰此非臣之功也上曰吾用先生謀計戰勝尅敵非功而何平曰非魏無知臣安得進上曰􅀂子可謂不背本矣乃復賞魏無知漢書曰韓信投漢蕭何等巳數言上不用即亡何聞信去不及以聞}
  - {type: page-break, offset: 69, content: '', id: KR3k0012_SBCK_630-6a}
  - {type: variant, offset: 69, length: 0, content: '', krp: 也陛下所問者行也今有尾生孝巳之行而無益於勝負之數陛下何暇用之乎楚漢相距臣進竒謀之士顧其計誠足以利國家不耳且盗嫂受金又何足疑乎王乃厚賜平拜爲護軍中尉盡護諸將後髙祖定天下與平剖符丗丗勿絶爲户牖侯平辭曰此非臣之功也上曰吾用先生謀計戰勝尅敵非功而何平曰非魏無知臣安得進上曰若子可謂不背本矣乃復賞魏無知漢書曰韓信投漢蕭何等巳數言上不用即亡何聞信去不及以聞}
  - {type: variant, offset: 70, length: 0, content: '', SBCK: 追之人有言上曰丞相何亡上怒如失左右手一二日何來謁上見怒且喜罵何曰􅀂亡何也曰臣非敢亡追亡者耳上曰亡者誰曰韓信上曰亡者十數公無所追追信詐也何曰信國士無􅀟王必欲長王漢中無所事信張晏日無事用信也必欲争天下非信無可與計事者又曰叔孫通降漢從弟子百餘人然無所進專言諸故群盗壯士進之弟子皆曰事先生數年幸而}
