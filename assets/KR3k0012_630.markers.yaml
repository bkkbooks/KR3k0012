  - {type: variant, offset: 348, length: 2, content: 景雲, WYG: 韓安國為人多大畧知當世取捨而出於忠厚貪嗜財貨然所推舉士皆賢於己者又曰張安世嘗有所薦人来謝弗復為通有郎功髙不調自言安世應曰君之功髙明主所知人臣執事何長短而自言乎絶不許已而郎果遷幕府長史辭去之官安世問以過失長史曰将軍明主股肱而士無進論者以為譏安世曰夫明主在上賢不肖較然臣下自修而已何知士而薦之其欲匿名迹逺權勢如此又曰朱買臣随上計吏為卒将重車至長安詣闕上書久不報待詔公車糧用乏上計吏卒更乞與之㑹邑子嚴助貴幸薦臣召見説春秋言楚辭帝甚悦之拜買臣為大夫與嚴助俱侍}
