  - {type: variant, offset: 7, length: 1, content: 唐, WYG: 曰趙文子知人所舉於晉國管庫之士七十有餘家管庫之士府吏以下官長所置也舉之於君以為大夫士也管鍵也庫物所蔵禮記雜記曰管仲遇盜取二人焉上以為公臣曰其所與遊僻也可人也言此人可用也但居惡人之中使之犯法又儒行曰儒有内稱不避親外舉不避怨程功積事推賢而進之不望其報苟利國家不求富貴其舉賢援能有如此者左傳莊公曰鮑叔帥師來言曰子糾親也請君討之鮑叔乗勝而進軍志在生得管仲故托不忍之辭管仲讎也請受而甘心焉管仲射桓公故曰讎甘心言欲快意殺戮之乃殺子糾於生竇召忽死之管仲請囚及堂阜而脱之堂阜齊地或曰鮑叔解夷吾縛於此因以為名歸而以告曰管夷吾治於高傒高傒齊卿高敬仲也言管仲治理政事之才多於敬仲使相可也公從之又僖中曰晉侯問原守於寺人勃鞮對曰昔趙衰以壺飡從徑餒而弗食言其亷且仁不忘君也徑猶行也故使處原從披言也衰雖有大功猶間小善以進之示不貴勞又僖下曰楚子将圍宋使子文治兵於暌終朝而畢不戮一人暌楚邑自旦及食時為終朝復使子玉治兵於蒍終日而畢鞭七人貫三人耳蒍邑名自旦及夕為終日國老皆賀子文子文飲之酒蒍賈尚幼後至不賀子文問之對曰不知所賀子之傳政於子玉曰以靖國也靖諸内而敗諸外所獲幾何子玉之敗子之舉也舉以敗國将何賀焉又曰初臼季使過冀見冀缺耨其妻饁之敬相待如賔與之歸言諸文公曰敬徳之聚也能敬必有徳徳以治民請君祗用之公曰其父有罪可乎對曰舜之罪也殛鯀其舉也興禹管仲桓公之賊也實相之以濟康誥曰父不慈子不孝兄不友弟不恭不相及也詩曰採葑採菲無以下體君取節焉可也文公以為下軍大夫又曰晉蒐於被廬作三軍謀元帥趙衰曰郤穀可臣亟聞其言矣説禮樂而敦詩書詩書義之府也禮樂徳之則也徳義禮之本也夏}
