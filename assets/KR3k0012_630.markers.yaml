  - {type: variant, offset: 50, length: 1, content: 昔, krp: 歌者之田且止官牛畜爲師荀欣爲中尉徐越爲内史賜相國衣二襲史記藺相如者趙人也爲趙官者令繆賢舎人趙惠文王時得}
