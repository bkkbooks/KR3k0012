  - {type: variant, offset: 140, length: 0, content: '', SBCK: 果遷幕府長史辭去之官安士問以過失長史曰將軍明主股肱而士無所進論者以爲譏安丗曰夫明主在上賢不肖較然臣下自脩而巳何知士而薦之其欲匿名迹逺權􅀔如此又曰朱買臣隨上計吏爲卒將重車至長安詣闕上書乆不報待詔公車粮用乏上計吏卒更乞與之㑹邑子嚴􅂇貴幸薦買臣召見􅀃春秋言楚辭帝甚恱之拜買臣爲大夫與嚴助俱侍中又曰前將軍韓増舉馮奉丗以衛侯使持節送大宛諸國客至伊修城都尉宋昌言莎車與旁國攻殺漢使奉丗與其副嚴昌計遂以節諭諸國}
