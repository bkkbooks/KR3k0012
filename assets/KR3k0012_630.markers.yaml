  - {type: variant, offset: 135, length: 1, content: 考, krp: 同居以貲爲騎郎事孝文帝十年不得調亡所知釋之曰乆宦減仲之産不遂欲免歸中郎將爰盎知其賢惜其去乃請徙釋之𥙷謁者又曰賈誼年十八以能誦詩書屬文稱於郡中河南守呉公聞其秀才召置門下甚愛幸文帝𥘉立聞河南守呉公治平爲天下第一故與李斯同邑而甞學事焉徴以爲廷尉廷尉乃言誼年少頗通諸家之書文帝召以爲博士又曰武帝𥘉即位是時丞相田蚡毎入奏事移日所言皆聽薦人或起家至二千石權移主上上迺曰君除吏盡未吾亦欲除吏也又曰韓安國爲人多大畧知當丗取捨而出於忠厚貪嗜財貨然所推舉士皆賢於己者又曰張安丗甞有所薦人來謝弗復爲通有郎}
