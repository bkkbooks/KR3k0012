  - {type: variant, offset: 13, length: 3, content: 諸州所, SBCK: 軍又曰􅁗伯伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽尸而還遂覇西戎用孟明也君子是以知􅁗穆之爲君也}
  - {type: variant, offset: 13, length: 0, content: '', WYG: 軍又曰秦伯伐晉濟河焚舟取王官及郊晉人不出遂自茅津濟封殽尸而還遂霸西戎用孟明也君子是以知秦穆之為君也舉人之周也周普徧也不以一敗棄其善與人之一也一無二心孟明之臣也其不解也能懼思也子桑之忠也其知人也能舉善也子桑公孫枝舉孟明者詩曰于以采蘩于沼於沚于以用之公侯之事秦穆有焉夙夜匪懈以事一人孟明有焉貽厥孫謀以燕翼子子桑有焉言子桑有舉善之謀又曰晉蒐於夷舍二軍使狐射姑将中軍趙盾佐之陽處父至自温改蒐於董易中軍陽子成季之屬也故黨於趙氏且謂趙盾能曰使能國之利也是以上之宣子於是乎始為國政又文公下曰昔髙陽氏有才子八人髙陽帝顓頊之號八人其苗裔蒼舒隤敳檮戭大臨尨降庭堅仲容叔逹此即垂益禹臯陶之倫庭堅即臯陶字齊聖廣淵明允篤誠天下之民謂之八愷髙辛氏有才子八人伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍髙辛帝嚳之號八人即稷契朱虎熊罷之倫忠肅恭懿宣慈恵和天下之民謂之八元此十六族也世濟其美不隕其名以至於堯堯不能舉舜臣堯舉八愷使主后土以揆百事莫不時序地平天成舉八元使布五教於四方父義母慈兄友弟恭子孝内平外成是以堯崩而天下如一同心戴舜以為天子以其舉十六相去四凶也又襄公曰祁奚請老老致仕晉侯問嗣焉嗣續其職者稱解狐其讎也将立之而卒解狐卒又問焉對曰午也可午祁奚子於是羊舌職死矣晉侯曰孰可以代之對曰赤也可赤職之子伯華於是使祁午為中軍尉羊舌職佐之各代其父君子謂祁奚於是能舉善矣稱其讎不為謟立其子不為比舉其偏不為黨商書曰無偏無黨王道蕩蕩其祁奚之謂矣解狐得舉未得位故曰得舉祁午得位伯華得官建一官而三物成一官軍尉物事也能舉善也夫惟善故能舉其善詩曰惟其有之是以似之祁奚有焉又襄公曰鄭子皮授子産政辭曰國小而偪偪近大國族大寵多不可為也子皮曰虎率以聴誰敢犯子子善相之國無小言在治政小能事大國乃寛為大所恤故也論語子夏曰富哉言乎舜有天下選於衆舉臯陶不仁者逺矣湯有天下選於衆舉伊尹不仁者逺矣又曰仲弓為季氏宰問政子曰先有司赦小過舉賢才曰焉知賢才而舉之曰舉爾所知爾所不知人其舍}
