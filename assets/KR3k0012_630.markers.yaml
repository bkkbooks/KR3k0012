  - {type: variant, offset: 1271, length: 486, content: 使之然也陛下焉得不改而張之至如日誦萬言何關理體文成七步未足化人昔子張學于祿仲尼曰言寡尤行寡悔祿在其中矣又曰行有餘力則以學文今捨其本而條其末況古之作文必諧風雅今之末學不近典謨勞心於卉木之門極筆於煙霞之際以此成俗斯大謬也昔者採詩觀風俗詠卷耳則忠臣喜誦蓼莪而孝子悲溫良敦厚詩教也豈主於淫文哉夫人之愛名如水之務下上有所好下必甚焉陛下若以德行為先文蓺為末必敦德勵行以佇甲科酆舒俊才沒而不齒陳寔長者拔而用之則多士雷奔四方風動俗從於下聖理於上豈有不變者歟又曰寶應初禮部侍郎楊綰奏請每歲舉人依鄉舉里選察秀才孝廉勑公卿已下集議中書舍人賈至議曰楊綰所奏實為正論然衣冠遷徙人多僑寓士居鄉土百無一二今依古制恐取士之道未盡今禮部每歲擢甲乙之科足長浮薄之風啟僥倖之路矣其國子博士等望加員數十道大郡量置太學館令博士出外兼領郡官召致生徒依乎故事保桑梓者鄉里舉焉在流寓者庠序推焉如此則青青不復興剌擾擾由其歸本焉勑旨每州歲察孝廉取在鄉閭有孝悌廉恥之行薦焉秀才有司以禮待之試其所通之學五通之內精通一經兼能對策達於體理者並量行業授官又曰寶應初禮部侍郎楊綰奏貢舉條孝廉各令精通一經其取左氏傳公羊穀梁禮記周禮儀禮毛詩, SBCK: 遼將軍}
