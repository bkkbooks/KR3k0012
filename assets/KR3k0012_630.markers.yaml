  - {type: variant, offset: 1602, length: 4300, content: 道大郡量置太學館令博士出外兼領郡官召致生徒依乎故事保桑梓者鄉里舉焉在流寓者庠序推焉如此則青青不復興剌擾擾由其歸本焉勑旨每州歲察孝廉取在鄉閭有孝悌廉恥之行薦焉秀才有司以禮待之試其所通之學五通之內精通一經兼能對策達於體理者並量行業授官又曰寶應初禮部侍郎楊綰奏貢舉條孝廉各令精通一經其取左氏傳公羊穀梁禮記周禮儀禮毛詩尚書周易任通一經每經問義二十條皆取傍通諸義務窮根本試策三道問古今理體及當時要務取堪行用者仍每日一道三道畢日經義及策全通為上第其上第者望付吏部便與官其問義每十條通七策通二為中第與出身下者罷之又論語孝經皆聖人深旨孟子亦儒門之達者其學官望兼習此三者共為一經其試如上秀才舉望令精通五經問義二十條對策試一道全通者為上第送名中書門下請超與處分問義十條通七策通四為中第中第者送吏部與官下者罷之孝悌力田但能熟讀一經言音典切即令所司舉送試通便與出身今年舉人或舊業既習理難速改或遠州所送身已在途事須收獎不可中廢其今秋舉人中有情願依舊業舉者亦聽今年之後一依新格勑旨進士明經置來日久今頓令改業恐難有其人諸色舉人宜與舊法兼行又曰建中初中書舍人權知禮部貢舉趙贊奏應口問大義明經等舉人明經之目義以為先比來相承唯務習帖至於義理少有能通經術𥧲衰莫不由此今若頓取大義恐全少其人欲且因循又無以勸學請約舉司舊例稍示考義之難承前問義不形文字落第之後喧競者多臣今請以所問錄於紙上各令直書其義不假文言既與策有殊又事堪微證憑此取捨庶歸至公如有義策全通者五經舉人請准廣德元年七月勑超與處分明經請減兩選伏請每歲甄獎不過數人庶使經術漸興人知教本勑旨明經義策全通者令所司具名聞奏續商量處分餘依又曰建中初尚書左選權知禮部貢舉顧少連奏伏以取士之科以明經為首教人之本則義理為先至於帖書及以對策皆形文字並易考尋試義之時獨令耳對對荅之失覆視無憑黜退之中流議遂起伏請准建中二年十二月勑以所問錄於紙上各令直書其義不假文言仍請依經䟽對勑旨宜依元和二年十二月禮部貢院奏五經舉人請罷試口義准舊試墨義十條五經通六便放入策詔從之又曰建中三年四月勑禮部應進士舉人等自今已後如試官并不合選諸色出身人有應舉者宜先於舉司陳狀准例考試如才堪及第者送名中書門下重加考覈如實不堪即令所司追納告身注毀官甲准例與及第至選日仍稍優與處分其正員官不在舉限又曰貞元中兵部侍郎陸贄權知貢舉時崔元翰梁肅文蓺冠時贄輸心於肅與元翰推薦蓺實之士升第之日雖眾望不愜然一歲選士纔十四五數年之內居臺省者十餘人又曰元和初四月以起居舍人翰林學士王涯為都官員外郎吏部員外郎韋貫之為果州剌史先是策賢良詔楊於陵鄭敬李益與貫之同考覆是時牛僧孺皇甫湜李宗閔條對甚直無所畏避考官第其策皆居三等權幸或惡其詆己而不中第者乃注解其策同為唱誹又言涯居翰林其甥皇甫湜中選考覈之際不先上言故同坐焉居數日貫之再黜巴州司馬涯虢州司馬楊於陵遂出為廣州節度裴垍時為翰林學士居中覆視無所同異及為貴倖泣訴請罪於上上不得已罷垍翰林學士除戶部侍郎又曰元和中權知禮部侍郎庾承宣奏臣有親屬應明經進士舉者請准舊例送考功考試從之又曰長慶元年勑今年錢徽下進士鄭朗等一十四人宜令中書舍人王起主客郎中知制誥白居易等重試覆落十人三月丁未詔曰國家設文學之科本求才實茍容僥倖則異至公訪聞近日浮薄之徒扇為朋黨謂之關節干擾主司每歲策名無不先定永言敗俗深用興懷鄭朗等昨令重試不求深僻題目貴觀學蓻淺深孤竹管是祭天之樂出於周禮正經閱其程試之文都不知其本事詞律鄙淺蕪類可知其孔溫業等三人粗通可與及第其餘落第今後禮部舉人宜准開元二十五年勑及第人所試雜文并策先送中書門下詳覆又曰長慶中禮部侍郎王起奏曰伏以禮部放牓已是成名中書重覆尚未及第若重覆之中萬一不定則放牓之後遠近誤傳其於事理實為非便臣伏請每年進士堪及第者本司考試訖其詩賦先送中書門下詳覆後勑卻下本司然後准舊例大字放牓從之又曰太和初以散騎常侍馮宿太常少卿賈餗庫部郎中龐嚴為考官策第二十二人而前進士劉蕡策最切直不居是選其間指陳時事不避貴近言詞激切士林感動雖晁董無以過也而考官有所畏忌不敢上聞隨例擯斥識者之議喧然不平守道正人傳其文至有相對而泣者諫官等或將其策白於宰臣宰臣怯憚亦不敢為之明白登科人李邵者深有所愧抗表請讓官於蕡事竟不行天復初劉季述敗起居郎羅袞上䟽請追贈蕡於是下詔贈左諫議大夫仍訪子孫敘用初蕡條對制策言宦官權盛後必為患及是果然也又曰大和中禮部侍郎李漢奏准大和七年八月勑貢舉人不要試詩賦策且先帖大經小經共十帖次對正義十道次試論義各一首訖考覈放及第又曰大和八年中書門下奏進士放牓舊例禮部侍郎皆將及第人名先呈宰相然後放牓伏以委在有司固當精慎宰臣先知取捨事匪至公今年已後請便令放牓不用先呈人名其及第人所試雜文及鄉貫三代名諱並當日送中書門下便令定例又曰會昌三年勑禮部所放進士及第人數目今後但據才堪者即與不要限人數每年止於十人五人惣得又曰會昌四年中書門下奏朝廷設文學之科以求髦俊臺閣清選莫不由茲近緣覈實不在於鄉閭超名頗雜於非類致有跋扈之地請計交通將澄化源在舉明憲臣等商量今日以後舉人於禮部納家狀後望依前五人自相保其衣冠則以親姻故舊久同遊處者其江湖之士則以封壤接近素所諳知者為保如有缺孝悌之行資朋黨之勢跡由邪徑言涉多端者並不在就試之限如容情故自相隱蔽有人糾舉其同保人並三年不得赴舉仍委禮部明為戒勵編入舉格勑旨依奏又曰大中初禮部侍郎魏扶放及第二十三人續奏堪放及第三人封彥卿崔𣵠鄭延休等皆以文蓺為眾所知其父皆在重任不敢選取其所試詩賦並封奉進止令翰林學士戶部侍郎知制誥韋琮等考盡合程度其月二十三日奉進止並付所司放及第有司考試只合在公如徙徇私自有刑典從今以後但依常例取捨不得別有奏聞又曰大中初勑自今放進士牓後杏園任依舊宴集所司不得禁制先是武宗好巡遊曲江亭禁人宴聚故也又曰大中九年吏部試宏辭舉人漏洩題目為御史所劾侍郎裴諗改國子祭酒郎中周敬罰兩月俸考官刑部郎中唐扶出為虔州剌史監察御史馮顓罰一月俸其登科十人並落下又曰大中十年禮部侍郎鄭顥進諸家科目記十三卷勑付翰林自今放牓後仰寫及第人姓名及所試詩賦題目進入仍令所司逐年編次又曰大中十二年中書舍人李潘知舉放博舉宏辭科陳琬等三人及進詩賦論等召潘謂曰所試詩中重用字何如潘曰錢起湘靈鼓瑟詩有重用字乃是庶幾上曰此詩似不及起乃落下李肇國史補略曰進士為時所尚久矣是故俊又由其中出者終身為聞人故爭名常切其都會謂之舉場通稱謂之秀才投剌謂之鄉貢得第謂之前進士互推敬謂之先輩俱捷謂之同年有司謂之座主京兆府考而升者謂之等第外府不試而貢者謂之拔解然拔解亦須預記人為詞賦非謂自薦將試相保謂之合保群居而賦謂之私試造請權要謂之關節激楊聲價謂之往還既捷列名於慈恩寺謂之題名會大讌於曲江亭謂之曲江會曲江大會在關試後亦謂之關宴宴後同年各有所之歸鄉井間謂之離會籍而入選謂之春關不捷而醉飽謂之打眊燥匿名造謗謂之無名子退而隸業謂之夏課挾藏而入試謂之書策此其略也其風俗繫於先達其制置存於有司雖然賢者得其大志故位極人臣常十有二三登顯列十有六七制舉科唐書顯慶三年二月志烈秋霜科韓思彥及第乾封元年幽素科蘇瓌解琬苗神客格輔元除昭劉訥言崔谷神及第上元三年正月詞殫文律科崔融及第永隆元年岳牧舉垂拱四年十二月詞標文苑科房晉甫夔王旦及第永昌元年正月蓄文藻之思科彭景直及第抱儒素之業科李文願及第長壽三年四月臨難不顧徇節寧邦科薛稷寇泚及第證聖元年長才廣度沉跡下僚科張猗及第通天元年文蓺優長科韓璘及第神功元年九月絕倫科蘇頲崔玄童袁仁敬何鳳孟溫禮洪子與盧從原趙不欺及第大足元年理選使孟詵試拔萃科崔翹鄭微及第少疾惡科馮萬石及第長安二年龔黃科馬克麾及第神龍二年才膺管樂科張大求魏啟心魏愔盧絢張文成褚璆咸慶業郭鄰趙不為及第才高位下科馮萬石晁良貞張敬及第三年材堪經邦科張九齡康元瓌及第賢良方正科蘇晉宋務光寇泚盧怡呂恂及第景龍三年抱器懷能科夏侯銛及第茂才異等科王敬從盧重玄及第景雲二年文以經國科袁暉韓朝宗及第藏名負俗科李俊之及第先天元年文經邦國科韓休及第藻思清華科趙冬曦及第寄以宣風則能興化變俗科郭璘之及第道侔伊呂科張九齡及第手筆俊拔超越輩流科杜昱張子漸張秀明常無名趙居貞賈登郍巨及第開元二年直言極諫科梁昇卿袁楚客及第哲人奇士逸淪屠釣科孫逖及第良才異等科邵閏之崔翹及第五年文史兼優科李昇期康子九達奚列及第文儒異等科崔侃禇庭晦及第六年博學通議科鄭少微蕭誠及第七年文詞雅麗科邢巨苗晉卿禇思光趙良器及第十二年將帥科裴敦復房自謙及第十五年武足安邊科鄭昉樊衡及第高才沉淪草澤自舉科鄧景山及第十七年才高未達沉跡下僚科吳鞏及第十九年博學宏詞科鄭昉陶翰及第二十一年多才科李史魚及第二十三年王霸科劉璀杜綰及第智謀將帥科張重光崔圓季廣琛及第天寶元年文詞秀逸科崔允顏真卿及第六年風雅古調科薛據及第十三年二月詞藻宏麗科楊綰及第大曆二年樂道安貧科楊膺及第六年諷諫主文科鄭珣瑜李益及第建中元年賢良方正能直言極諫科姜公輔元友直樊澤呂元膺及第文詞清麗科奚陟梁肅劉公亮鄭轅沈封吳通玄及第經學優深科孫玼黎逢白季隨及第高蹈丘園科張紳衡良儒蘇哲及第軍謀越眾科夏侯審平知和鄭儋凌正周渭丁侁及第孝悌力田聞於鄉閭科郭黃中崔浩李牧及第貞元元年九月賢良方正能直言極諫科韋執誼鄭利用穆賢楊鄬裴復柳公綽歸登直李言崔邠鄭敬魏弘簡回元估徐袞及第博通墳典達於教化科熊執易劉簡甫及第識洞韜略堪任將帥科許贄及第四年四月賢良方正能直言極諫科崔元翰裴次元李彝崔豐史牟陸震柳公綽趙參徐弘毅韋彭壽鄒儒立王乃杜倫元易王真及第清廉守節政術可稱堪任縣令科李巽孝悌力田聞於鄉閭科張晧及第十年十月賢良方正能直言極諫科裴垍王播朱諫裴度熊執易許堯佐徐弘毅崔群皇甫鎛王仲舒許季同仲子陵鄭士林丘顓及第博通墳典達於教化科朱頴及第詳明政術可以理人科張平叔李景亮及第其年四月才識兼茂明於體用科元稹韋惇獨孤郁白居易曹景伯韋慶復崔琯羅讓崔護薛存慶章衍李璠元脩蕭俛沈傳師柴宿及第達於吏理可使從政科陳岵及第三年四月賢良方正直言極諫科牛僧孺皇甫湜李宗閔李正封吉弘宗徐晦賈鍊王起郭球姚袞便威及第博通墳典達於教化科馮苞陸旦及第軍謀宏遠材任將帥科樊宗師及第達於吏理可使從政科蕭睦及第長慶元年十二月賢良方正能直言極諫科寵嚴任琬呂述姚中韋曙李回崔椵崔龜從韋正實崔知陳白玄錫及第詳明政術可以理人科崔郢及第軍謀宏遠材任將帥科吳思李商卿及第博通墳典達於教化科李思玄及第寶曆元年四月賢良方正能直言極諫科唐申楊儉韋端符舒元褒蕭敞楊魯士來擇趙祝裴惲韋繇李昌實嚴封李涯蕭夷中求元晦及第詳明吏理達於教化科韋正實及第軍謀宏遠材任邊將科裴儔侯雲章及第大和二年閏三月賢良方正能直言極諫科裴休裴素李郃南卓李甘杜牧馬植鄭亞崔博崔璵王式羅邵京崔渠韓賓崔慎由苗愔韋昶崔煥崔讜及第詳明吏理達於教化科宋琨及第軍謀宏遠堪任將帥科鄭冠李式及第, WYG: ''}
