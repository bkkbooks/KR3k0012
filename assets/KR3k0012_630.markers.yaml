  - {type: variant, offset: 54, length: 1, content: 議, krp: 聞之使人遺趙王書願以十五城請易璧趙王與諸大臣謀欲與秦恐秦城不得見欺欲勿與即患秦兵之來計未定求人可使報秦者未得官者令繆賢曰臣舎人藺相如可使王問何以知之對曰臣甞有罪竊計欲亡走燕舎人藺相如止臣曰君何以知燕王臣語曰臣甞從大王與燕王㑹境上燕王私握臣手曰願結交以此知之故欲徃相如謂臣曰夫趙強而燕弱而君幸於趙王故燕王欲結交於君今君乃亡趙走燕燕畏趙其勢必不敢留君而束君歸趙矣君不如肉袒伏斧鑕請罪則幸得脫矣臣從其計大王亦幸赦臣臣竊以爲其人勇士有智謀冝可使於是王召問藺相如以爲賢遂使奉璧入秦又曰趙奢趙之田部吏也收租稅而平原君家不肯出趙奢以法治之殺用}
