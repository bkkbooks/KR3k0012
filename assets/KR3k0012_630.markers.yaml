  - {type: variant, offset: 827, length: 117, content: 開元中勑今之明經進士則古之孝廉秀才近日已來殊乖本意進士以聲韻為學多昧古今明經以帖誦為功罕窮旨趣安得為敦本復古經明行脩以此登科非選士取賢之道其明經自今已後每經宜帖十取通五已上免舊試一帖仍按問大義十條取六已上免試經策十條令若時務策三道取粗, SBCK: 橋􅀇遷司空轉司徒素與南陽太守陳球}
