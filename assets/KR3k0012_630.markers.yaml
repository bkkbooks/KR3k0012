  - {type: variant, offset: 25, length: 1, content: 問, SBCK: 之宣子於是乎始爲國政又文下曰昔髙陽氏有才子八人髙陽帝顓頊之號八人其苗裔蒼舒隤敳檮戭大臨尨降庭堅仲容叔逹此即垂益禹臯陶之倫庭堅即臯陶字齊聖廣淵明允篤誠天下之民謂之八愷髙辛氏有才子八人伯􅁬仲堪叔獻季仲伯虎仲熊叔豹季貍髙辛帝嚳之號此八人稷契朱虎熊羆之倫忠肅共懿宣慈惠和天下之民謂之八元此十六族也丗濟其美不隕其名}
  - {type: variant, offset: 26, length: 23, content: 以皇王政術及皇太子問以曾參說孝經並不能荅太宗謂, WYG: 為誰}
