  - {type: 'tls:seg', offset: 56, content: '', id: KR3k0012_CHANT_630-1a.11}
  - {type: variant, offset: 56, length: 0, content: '', SBCK: 也能舉善也夫唯善故能舉其􅀋詩云惟其有之是以似之祁奚有焉又襄六曰鄭子皮授子産政辭曰國小而偪偪近大國族大寵多不可爲也子皮曰虎帥以聽誰敢犯子子善相子之國無小言在治政小能事大國乃寛爲大所恤故也論語子夏曰冨哉言乎舜有天下選於衆舉臯陶不仁者逺矣湯有天下選於衆舉伊尹不仁者逺矣又曰仲弓爲季氏宰問政子曰先有司赦小過舉賢才曰焉知賢才而舉之曰舉爾所知爾所不知人其舎諸孔曰女所不知者人將自舉之各舉其所知則賢才無遺又曰公叔文子之臣大夫僎與文子同􅂛諸公孔曰大夫僎本文子家臣薦之使與巳並爲大夫同升在公朝子聞之曰可以爲文矣孔曰言行如是可謚爲文史記曰秦繆公以羖羊皮贖百里奚釋其囚與語國事百里奚讓曰臣不及臣友蹇叔蹇叔賢而丗莫知臣甞遊困於齊而乞食銍人蹇叔収臣困而欲事齊君無知蹇叔止臣臣得脫齊難遂之周周王子頽好牛臣以養牛干之及頽欲用臣蹇叔止臣臣去得不誅事虞君蹇叔止臣臣知虞君不用臣臣誠私利禄爵且留再用其言得脫一不用及虞君之難是以知其賢於是繆公使人厚幣迎蹇叔以爲上大夫又曰􅁗孝公下令曰賔客}
