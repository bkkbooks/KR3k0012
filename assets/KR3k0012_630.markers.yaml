  - {type: variant, offset: 45, length: 3, content: 荅太宗, SBCK: 舉舜臣堯舉八愷使主后土以揆百事莫不時序地平天成舉八元使布五教于四方父義母慈兄友弟恭子孝内平外成是以堯崩而天下如一同心戴舜以爲天子以其舉十六相去四㓙也又襄三曰祁奚請老老致仕晉侯問嗣焉嗣續其職者稱解狐其讎也將立之而卒解狐卒又問焉對曰午也可午祁奚子於是羊舌職死矣晉侯曰孰可以代之對曰赤也可赤職之子伯華於是使祁午爲中軍尉羊舌赤佐之各祁其父君子}
