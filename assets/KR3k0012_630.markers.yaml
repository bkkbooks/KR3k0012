  - {type: variant, offset: 858, length: 222, content: 學多昧古今明經以帖誦為功罕窮旨趣安得為敦本復古經明行脩以此登科非選士取賢之道其明經自今已後每經宜帖十取通五已上免舊試一帖仍按問大義十條取六已上免試經策十條令若時務策三道取粗有文性者與及第其進士宜停小經准明經帖大經十帖取通四已上然後准例試雜文策考通與及第其明經中有明五經已上試無不通者進士中兼有精通一史能試策十條得六已上者委所司奏聽進止其應試進士等唱第訖具所試雜文策及送中書門下詳覆其所問明經大義日須對同舉人考試庶能否共知取捨無媿有功者達可不勉歟, WYG: 廷尉}
