  - {type: variant, offset: 1843, length: 698, content: 第與出身下者罷之又論語孝經皆聖人深旨孟子亦儒門之達者其學官望兼習此三者共為一經其試如上秀才舉望令精通五經問義二十條對策試一道全通者為上第送名中書門下請超與處分問義十條通七策通四為中第中第者送吏部與官下者罷之孝悌力田但能熟讀一經言音典切即令所司舉送試通便與出身今年舉人或舊業既習理難速改或遠州所送身已在途事須收獎不可中廢其今秋舉人中有情願依舊業舉者亦聽今年之後一依新格勑旨進士明經置來日久今頓令改業恐難有其人諸色舉人宜與舊法兼行又曰建中初中書舍人權知禮部貢舉趙贊奏應口問大義明經等舉人明經之目義以為先比來相承唯務習帖至於義理少有能通經術𥧲衰莫不由此今若頓取大義恐全少其人欲且因循又無以勸學請約舉司舊例稍示考義之難承前問義不形文字落第之後喧競者多臣今請以所問錄於紙上各令直書其義不假文言既與策有殊又事堪微證憑此取捨庶歸至公如有義策全通者五經舉人請准廣德元年七月勑超與處分明經請減兩選伏請每歲甄獎不過數人庶使經術漸興人知教本勑旨明經義策全通者令所司具名聞奏續商量處分餘依又曰建中初尚書左選權知禮部貢舉顧少連奏伏以取士之科以明經為首教人之本則義理為先至於帖書及以對策皆形文字並易考尋試義之時獨令耳對對荅之失覆視無憑黜退之中流議遂起伏請准建中二年十二月勑以所問錄於紙上各令直書其義不假文言仍請依經䟽對勑旨宜依元和二年十二月禮部貢院奏五經舉人請罷試口義准舊試墨義十條五經通六便放入策詔從之又曰建中三年四月勑禮部應進士舉人等自今已後如試官并不合選諸色出身人有應舉者宜先於舉司陳狀准例考試如才堪及第者送名中書門下重加考覈如實不堪即令所司追納告身注毀官甲准例與及第至選日仍稍優與處分其正員官不在舉限又曰貞元中兵部侍, SBCK: ''}
