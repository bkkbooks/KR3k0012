  - {type: variant, offset: 17, length: 4, content: 孝廉賜坐, SBCK: 人之周也周備也不偏以一堊弃其善與人之壹也一無二心孟明之臣也其不解也能懼思也子桑之忠也其知人也能舉善也子桑公孫枝舉孟明者詩曰于以采蘩于沼于沚于以用之公侯之事􅁗穆有焉夙夜匪解以事一人孟明有焉詒厥孫謀以燕翼子子桑有焉言子桑有舉善之謀又曰晉蒐于夷舎二軍使狐射姑將中軍趙盾佐之陽處父至自温改蒐于董易中軍陽子成季之屬也故黨}
  - {type: page-break, offset: 17, content: '', id: KR3k0012_SBCK_630-2b}
  - {type: variant, offset: 17, length: 0, content: '', WYG: 之各舉其所知則賢才無遺又曰公叔文子之臣大夫僎與文子同升諸公孔曰大夫僎本文子家臣薦之使與已並為大夫同升諸公朝子聞之曰可以為文矣孔曰言行如是可諡為文史記曰秦繆公以五羖羊皮贖百里奚釋其囚與語國事百里奚讓曰臣不及臣友蹇叔蹇叔賢而世莫知臣嘗遊困於齊而乞食銍人蹇叔収臣臣因而欲事齊君無知蹇叔止臣臣得脱齊難遂之周周王子頺好牛臣以養牛干之及頺欲用臣蹇叔止臣臣去得不誅事虞君蹇叔止臣臣知虞君不用臣臣誠私利禄爵且留再用其言得脱一不用及虞君之難是以知其賢於是繆公使人厚幣迎蹇叔以為上大夫又曰秦}
  - {type: page-break, offset: 17, content: '', id: KR3k0012_WYG_630-6a, image: WYG0898/WYG0898-0644c.png}
  - {type: variant, offset: 17, length: 0, content: '', krp: 之各舉其所知則賢才無遺又曰公叔文子之臣大夫僎與文子同升諸公孔曰大夫僎本文子家臣薦之使與巳並爲大夫同升在公朝子聞之曰可以爲文矣孔曰言行如是可謚爲文史記曰秦繆公以羖羊皮贖百里奚釋其囚與語國事百里奚讓曰臣不及臣友蹇叔蹇叔賢而丗莫知臣甞遊困於齊而乞食銍人蹇叔収臣困而欲事齊君無知蹇叔止臣臣得脫齊難遂之周周王子頽好牛臣以養牛干之及頽欲用臣蹇叔止臣臣去得不誅事虞君蹇叔止臣臣知虞君不用臣臣誠私利禄爵且留再用其言得脫一不用及虞君之難是以知其賢於是繆公使人厚幣迎蹇叔以爲上大夫又曰秦}
  - {type: variant, offset: 18, length: 1, content: 廉, WYG: 公下令曰賔客羣臣有能出竒計强秦者吾且尊官與之分土衛鞅聞是令下西入秦因景監求見孝公説孝公變法修刑内務耕稼外勸戰士明行賞罰孝公善之卒用鞅法百姓便之乃拜鞅為左庶長又曰王稽使於魏問鄭安平魏有賢人可與俱西乎安平曰臣里中有張禄先生欲見君言天下事稽知其范雎乃載以入秦又曰趙烈侯好音謂相國公仲連曰寡人有愛可以貴之乎公仲曰富之則可貴之則否烈侯曰然夫鄭歌者搶石二人吾}
  - {type: page-break, offset: 18, content: '', id: KR3k0012_WYG_630-6b, image: WYG0898/WYG0898-0644d.png}
  - {type: variant, offset: 18, length: 21, content: 廉賜坐於御前上問以皇王政術及皇太子問以曾參, krp: 公下令曰賔客群臣有能出竒計強秦者吾且尊官與之分土衛鞅聞是令下西入秦因景監求見孝公}
  - {type: variant, offset: 20, length: 1, content: 坐, WYG: 之田人萬畆公仲曰諾不與居一月烈侯問歌者公仲曰求未有可者有頃復問公仲終不與乃稱疾不朝番吾君謂公仲曰君實好善而未知所持今公仲相趙四年亦有進士乎曰未也番吾君曰牛畜荀欣徐越皆賢可公仲乃進三人牛畜侍烈侯以仁義約以王道明日荀欣侍以選練舉賢任官使能明日徐越侍以節財儉用察度功徳所與無不充君悦乃使謂相國曰歌者之田且止官牛畜為師荀欣為中尉徐越為内史賜相國衣二襲又曰藺相如者趙人也為趙宦者令繆賢舎人趙惠文王時得楚和氏璧秦昭王聞之使人遺趙王書願以十五城請易璧趙王與諸大臣謀欲與秦秦城恐不可得徒見欺欲勿與即患秦兵之來計未定求人可使報秦者未得宦者令繆賢曰臣舎人藺相如可使王問何以知之對曰臣嘗有罪竊計欲亡走燕舎人藺相如止臣曰君何以知燕王臣語曰臣嘗從大王與燕王㑹境上燕王私握臣手曰願結交以此知之故欲徃相如謂臣曰夫趙强而燕弱而君幸}
  - {type: page-break, offset: 20, content: '', id: KR3k0012_WYG_630-7a, image: WYG0898/WYG0898-0645a.png}
  - {type: page-break, offset: 20, content: '', id: KR3k0012_WYG_630-7b, image: WYG0898/WYG0898-0645b.png}
  - {type: variant, offset: 22, length: 2, content: 御前, SBCK: 趙氏且謂趙盾能曰使能國之利也是以}
  - {type: variant, offset: 22, length: 2, content: 御前, WYG: 君王故燕王欲結交於君今君乃亡趙走燕燕畏趙其勢必不敢留君而束君歸趙矣君不如肉袒伏斧鑕請罪則幸得脱矣臣從其計大王亦幸赦臣臣竊以為其人勇士有智謀宜可使於是王召問藺相如以為賢遂使奉璧入秦又曰趙奢者趙之田部吏也收租税而平原君家不肯出趙奢以法治之殺用事者九人平原君怒将殺奢奢因説曰君於趙為貴公子今縱君家而不奉公則法削法削則國弱國弱則諸侯加兵是無趙也君安得有此富乎當以君之貴奉公如法則上下平上下平則國强國强趙固而君為貴戚豈輕於天下耶平原君以為賢言之於王王用之治國賦大平民富而府庫實卒為名将又曰陳平亡楚歸漢因魏無知求見漢王與語而悦之乃拜為都尉使為叅乗典䕶軍諸将盡讙後絳侯灌嬰等咸讒平曰臣聞平居家時盜其嫂事魏不容亡歸楚歸楚不忠又亡歸漢今日大王尊官之令䕶軍臣聞平受諸將金多者得善處金少者得惡處平反覆亂臣也願王察之漢王疑召讓無知無知曰臣所言者能也陛下所問者行也今有尾生孝已之行而無益於勝負之數陛下何暇用之楚漢相距臣進竒謀之士顧其計誠足以為國家利耳且盜嫂受金亦何足疑乎王乃厚賜平拜為䕶軍都尉盡䕶諸將後高祖定天下與平剖符世世勿絶為户牖侯平辭曰此非臣之功也上曰吾用先生謀計戰勝尅敵非功而何乎曰非魏無知臣安得進上曰若子可謂不背本矣乃復賞魏無知漢書曰韓信度蕭何等已數言上不用即亡何聞信去不及以聞自追之人有言上曰丞相何亡上怒如失左右手一二日何來上且怒且喜罵何曰昔亡者何也曰臣非敢亡追亡者耳}
