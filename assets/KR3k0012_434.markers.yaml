  - {type: variant, offset: 793, length: 0, content: '', WYG: 宇止之曰此義士死節可賜以劔序受劔衘鬚於口顧左右曰無令鬚汚又曰朱暉字文季南陽人暉早孤有氣决年十三莽敗天下亂與外氏家屬從田間奔入苑城道遇羣賊賊操兵弩欲祼奪婦女衣服昆弟賓客皆惶廹伏地莫敢動暉抜劔前曰財物皆可取諸母衣不可得今日朱暉死日也賊見其小壯之笑曰童子内刀遂舎之謝承後漢書曰彭脩字子陽㑹稽人年十五時父為郡吏得休與脩歸道為盗}
