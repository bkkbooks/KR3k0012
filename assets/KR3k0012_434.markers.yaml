  - {type: variant, offset: 797, length: 2, content: 君焚, WYG: 南山中奪之送者莫敢動因與父俱亡命東海由是以勇壯聞又曰曹真字子}
  - {type: variant, offset: 800, length: 0, content: '', WYG: 太祖族子也少孤召飬與諸子同使與文帝共止嘗獵為虎所逐顧射之應聲而倒太祖壯其鷙勇使将虎騎討虛丘賊抜之封靈夀亭侯又曰劉􅁮字子揚淮南成徳人也鄭寳張多許乾之屬各擁部曲寳最驍果才力過人一方所憚􅁮時年二十餘㑹太祖遣使詣州有所案問寳從使百人齎牛酒來候􅁮命家童将其衆坐中門外為設酒飯與寳于内宴飲宻勒徤兒令因行觸而斫寳寳性不甘酒視候甚明觴者不敢發擊因自引取佩刀以斫殺寳斬其首以示其軍魏}
