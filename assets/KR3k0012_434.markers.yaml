  - {type: variant, offset: 795, length: 34, content: 請於君焚丹書者有如日乃出豹而閉之督戎從之踰隱而待之督戎踰入豹自後擊而, SBCK: 得不急遂縊}
  - {type: variant, offset: 795, length: 1, content: 請, WYG: 宜逼之遂辭謝而去魏志曰龎徳将所領與曹仁共拔宛與闗雲長相持時樊下諸與以徳兄在漢中頗疑之徳常曰我受國恩義在効死與雲長戰射雲長中額時徳常乘白馬蜀軍謂之白馬將軍又曰曹仁從平荆州以仁行征南将軍晉屯江陵拒吳周瑜士将數萬人來攻遣部曲将牛金逆與挑戰賊多金衆少遂為所圍仁望金等垂涙左右皆失色仁氣奮怒甚将壮士數十騎直前衝入賊圍金等乃得解餘衆未盡出仁復直還突出金兵賊乃退又曰荘覇字宣髙太山人父戎為縣獄掾據法不聽太守所欲殺太守怒收戎詣府送者百餘人覇年十八将客數人}
