  - {type: variant, offset: 1631, length: 180, content: 子各言爾志吾將擇焉子路進曰由願得白羽若月赤羽若日鍾鼓之音上震于夫旌旗繽紛下蟠于地由也當一隊而敵之必也攘地千里搴旗執馘唯由能之使二子者從我焉夫子曰勇哉史記曰毛遂隨平原君與楚合從言其利害日出而言之日中不決遂案劍歷階而上謂平原君曰從之利害兩言而決耳今日出而言從日中不決何也楚王謂平原君曰客何為者也平原君曰是勝之舍人也楚王叱胡不下吾乃與爾君言汝何為者也毛遂案劍而前曰今, WYG: ''}
