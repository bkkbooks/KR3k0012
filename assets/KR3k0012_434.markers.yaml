  - {type: variant, offset: 2337, length: 695, content: 餘君未有堅盟約者臣恐見欺負趙故令人持璧歸間至趙矣王若割十五都與趙趙豈敢留璧得罪於大王臣知欺大王當誅請就湯鑊秦遂厚遇之既歸趙王以為賢大夫使不辱於諸侯拜為上大夫秦亦不以城與趙趙亦不與秦璧後秦王會澠池秦王飲酒酣曰寡人竊聞趙王好音請奏瑟趙王鼓瑟秦御史前書曰某年某月秦王與趙王會飲令趙王鼓瑟相如前曰趙王竊聞秦王善為秦聲請奏缶以相娛樂秦王怒不許於是相如前進缶因跪請之秦王不肯擊缶相如曰五步之內臣請以頸血濺大王矣左右欲刃相如相如張目叱之左右皆靡秦王不懌為一擊缶相如顧召趙御史書曰某年某月秦王為趙王擊缶秦之群臣曰請以趙十五城為秦王壽相如亦曰請以秦之咸陽為趙王壽趙亦盛設兵待秦秦不敢動既罷歸國以相如功大拜為上卿位在廉頗右又曰曹沫者魯人也以勇力事魯莊公齊桓公與魯莊公會于柯而盟桓公與莊公既盟於壇上曹沫執匕首劫齊桓公桓公左右莫敢動問曰子將何曹沫曰齊強魯弱而大國侵魯亦已甚矣今城壞即壓境君其圖之公乃許盡還魯之侵地既已言曹沫沒其匕首下壇北面就群臣之位顏色不變辭令如故又曰楚於期奔燕丹計無所出鞠武曰燕有田光先生者其為人智深而勇沉可與謀太子因謁光光言荊卿太子曰願因先生得結交於荊卿可乎田光曰敬諾即起趍出太子送之至門戒曰丹所報先生言者國大事也願先生勿泄也田光跪而笑曰諾見荊軻曰光與子相善燕國莫不知今太子聞光壯盛之時不知吾形已不逮也幸而教之曰燕秦不兩立願先生留意光竊不自外言足下於太子願足下過太子於宮荊軻曰謹奉教田光曰吾聞之長者為行不使人疑之今太子告光曰所言國之大事也願先生勿泄也是太子疑光也夫為行而使人疑之非節也欲自殺以激荊卿曰願足下急過太子言光已死明不言也因遂自刎又曰秦將李信年少壯勇嘗以兵數千逐燕太子丹至於汙水卒得破丹, SBCK: 四}
