  - {type: variant, offset: 48, length: 2, content: 逖矣, SBCK: 項羽下邳人身長八尺二寸力能扛鼎少學書劔不成季父梁怒羽羽曰書足以記姓名劔一人敵不足學也梁梁竒之教以兵法籍大喜遇秦始皇遊㑹稽渡浙江梁與籍俱觀籍曰彼可取而代也梁掩其口㑹七月陳勝起兵九月㑹稽守通謂梁曰江}
