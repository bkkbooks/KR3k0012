  - {type: variant, offset: 35, length: 0, content: '', WYG: 韓信數以策干項羽弗用漢王之入蜀信亡楚歸漢未得知名為連敖楚官也坐法當斬其疇十三人皆已斬至信信乃仰視滕公曰上不欲就天下乎柰何斬壯士滕公奇其言壯其貌釋弗斬與語大悦之漢王以為治粟都尉信謂漢王曰臣嘗事項王請言項王為人也項王喑啞叱咤千人皆廢然不能任屬賢將此特匹夫之勇也又曰齊哀王弟章髙后封為朱虛侯章年二十有氣力忿劉氏不得職入嘗侍燕飲髙后令章為酒吏章自請曰臣將種也請得以軍法行酒髙后曰可酒酣章進歌舞已而曰請為太后言耕田髙后兒子畜之笑曰顧乃父知田耳若生而王子安知田子章曰知之太后曰試為我言田意章曰深耕概種立苖欲疏非其種者鋤而去之太后黙然頃之諸吕有一人醉亡酒章追抜劔斬之而還報曰有亡酒一人臣謹行軍法斬之太后大驚已許其軍法毋以罪也因罷酒又曰江都易王非二年立為汝南王吳楚反時非年十五有才氣上書自請擊吳景帝賜非将軍印擊吳吳破徙王江都治故吳國以功賜天子旌旗又曰李廣為上谷太守數與匈奴戰典屬國公孫昆耶為上泣曰李廣才氣天下無䨇自負其能數與虜确恐亡之師古曰确音角上乃徙廣為上郡太守廣以郎中令将四千騎出右北平博望侯張騫将萬騎與廣俱異道行數百里匈奴将四萬騎圍廣軍士皆恐廣乃使其子敢往馳之敢往從數十騎直貫胡騎出其左右而還謂廣曰胡虜易與耳軍士乃安為圜陳外鄉胡急擊矢下如雨漢兵死者過半漢矢且盡廣乃令持蒲毋發而廣自以以大黄射其裨将服䖍曰黄肩弩殺數人胡虜益解㑹暮吏面無人色而廣意氣自若益治軍軍中服其勇也明日復力戰而博望侯軍亦至匈奴乃解去又曰王尊字子贛涿郡人為東平相時王素驕不奉法尊謂王曰天下皆言王勇但負貴安能勇如尊乃勇耳王變色欲格殺之遷東郡太守河水盛溢泛浸瓠子金堤老弱奔走恐水大決為害尊躬率吏民投沉白馬祀水神河伯尊親執圭璧使巫䇿祝請以身填金堤因止宿廬居堤上吏民數千萬人争叩頭救止尊終不肯去及水盛堤壊吏民皆走唯一主簿泣在尊旁尊立不動而流波稍却廽還吏民嘉壯尊之勇節白馬三老朱英等奏其狀詔秩尊中二千石賜黄金二十斤又曰朱雲字游魯人也徙平陵少時通輕俠借客報仇身長八尺餘容貌甚壯以勇力聞又曰趙充國字翁孫陜西人後徙金城令居以六郡良家子善騎射補羽林為人沉勇有大畧少好将帥之節學兵法通知四夷事}
