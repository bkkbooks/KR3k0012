  - {type: variant, offset: 87, length: 6, content: 熊如羆于商郊, SBCK: 狼強不可令者斬之乃置酒髙㑹留四十六日不進是時天寒士卒飢凍籍曰且國家兵新破王坐不安席掃境内屬將軍國家安危在此一舉今不恤士卒而徇私非社稷之臣也籍乃斬宋義於帳中左右懾伏莫敢枝梧悉發兵渡河沉舟敗釡燒廬舎持三日粮示必死乃大破秦兵虜王離諸將入轅門膝行而前莫敢仰視師次鉅鹿㑹戰夜坑秦卒二十萬入􅀜屠咸陽殺子嬰自立爲西楚覇王與漢王相持五年後漢兵大㑹垓下食盡與漢王戰不利圍之夜聞漢軍作楚歌聲驚曰漢巳得楚乎遂與從􅀐者八百人夜潰圍南馳漢令􅀐將灌嬰追至東城籍唯單􅀐自知智窮乃大呼躍自刎而死遂爲五將各分一體漢王以魯公葬於􅂖城諸項賜姓劉}
  - {type: page-break, offset: 87, content: '', id: KR3k0012_SBCK_434-4a}
