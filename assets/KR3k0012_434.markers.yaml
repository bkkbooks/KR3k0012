  - {type: variant, offset: 35, length: 0, content: '', SBCK: 韓信數以䇿干項羽弗用漢王之入蜀信亡楚歸漢未得知名爲連敖楚官也坐法當斬其疇十三人皆巳斬至信信乃仰視滕公曰上不欲就天下乎而斬壯士滕公竒其言壯其貌釋弗斬與語大恱之漢王以爲治粟都尉信謂漢王曰臣嘗事項王請言項王爲人也項王意嗚叱咤千人皆廢然不能任屬賢將匹夫之勇也又曰齊哀王弟章髙后封爲朱虚侯章年二十有氣力忿劉氏不得職嘗入侍醼飲髙后令章爲酒吏章自請曰臣將種也請得以軍法行酒髙后曰可酒酣章進歌舞巳而曰請爲太后言耕田髙后兒子畜之􅀏曰顧乃父知田耳􅀂生而王子安知田乎章曰知之太后曰試爲我言田意章曰深耕種立苗欲䟽非其種者鋤而去之太后嘿然頃之諸吕有一人醉云酒章追拔劔斬之而還報曰有云酒一人臣謹行軍法斬之太后大驚已許其軍法母以罪也因罷酒又曰江都易王非二年立爲汝南王吴楚反時非年十五有才氣上書自請擊吴景帝賜非將軍印擊吴吴破徙王江都治故吴國以功賜天子旌旗又曰李廣爲上谷太守數與匈奴戰典屬國公孫昆耶爲上泣曰李廣才氣天下無􅀟自􅀒其能數與虜硧恐亡之或曰硧音角上乃徙廣爲上郡太守廣以郎中令將四千􅀐出右北平􅀶望侯張騫將万􅀐與廣俱異道行數百里匈奴將四万􅀐圍廣軍士皆恐廣乃使其子敢徃馳之敢從數十􅀐直貫胡􅀐出其左右而還謂廣曰胡虜易與耳軍士乃安爲圜陳外郷胡急擊矢下如雨漢王兵死者過半漢矢且盡廣乃令持滿母發而廣身自以大黃射其禆將服䖍曰黃間弩殺數人胡虜益解㑹暮吏以無人色而廣意氣自􅀂益治軍軍中服其勇也明日復力戰而􅀶望侯軍亦至匈奴乃解去又曰王尊字子贑涿郡人爲東平相時王素驕不奉法尊謂王曰天下皆言王勇但􅀒貴安能勇如尊乃勇耳王變色欲格殺之遷東郡太守河水盛溢泛浸瓠子金堤老弱奔走至恐水大决爲害尊躬率吏民投沉白馬祀水神河伯尊親執圭璧使巫䇿祝請以身塡金堤因止宿廬居隄上吏民數千萬人爭叩頭救止尊終不肯去及水盛隄壞吏民皆走唯一主簿泣在尊旁尊立不動而水波稍却廻還吏民嘉壯尊之勇節白三毛朱英等奏其狀詔秩尊中二千石賜黃金二十斤又曰朱雲字游魯人徙平陵少時通輕俠借客報仇身長八尺餘容貌甚壯以勇力聞又曰趙充國字翁孫隴西人後徙金城令居以六郡良家子善􅀐射􅀘羽林爲人沉勇有大略少好將帥之節學兵法通知四夷事}
