  - {type: variant, offset: 2102, length: 167, content: 智謀宜可使乃使相如奉璧入秦秦王坐章臺得璧大喜傳璧以示美人及左右左右皆呼萬歲相如視秦王無意償趙城乃前曰璧有瑕請指示王王授璧中立倚柱怒髮上衝冠謂秦王曰趙王齋戒五日使臣奉璧拜送書於廷何者嚴大國之威以脩敬也今臣至大王見臣列觀禮節甚倨得璧傳戲無儻趙王城邑故臣復取璧大王必欲急臣臣頭今與璧俱碎於柱矣持璧睨柱欲以擊柱秦王恐其破璧乃辭謝固請召有司案圖, SBCK: 典君手提􅀟㦸八}
