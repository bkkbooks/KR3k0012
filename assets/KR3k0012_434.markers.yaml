  - {type: variant, offset: 1812, length: 1220, content: 步之內王不得恃楚國之眾也王之命懸於遂手叱者何且遂聞湯以七十里之地王矢下文王以百里之壤而臣諸侯今楚地方五千里持戟百萬此霸王之資也白起小豎子耳率數萬之眾興師以與楚戰一戰舉鄢郢再戰而燒夷陵三戰而辱王之先人此百世之怨而趙之所羞而王弗知惡合從者為楚非為趙也吾君在前叱者何也楚王曰先生之言是也遂定從而還又曰范睢說秦昭王夫以烏獲任鄙之力荊成孟賁許慎曰荊成古勇士孟賁衛人也慶忌夏育之勇焉而死死者人之所必不免也又曰廉頗者趙之良將也趙惠文王十六年廉頗為趙將伐齊大破之取晉陽拜為上卿以勇氣聞於諸侯又曰蘭相如者趙人也為趙官者令繆賢舍人趙惠文王時得楚和氏璧秦昭王願以十五城請易璧令曰臣客舍人蘭相如其人勇士有智謀宜可使乃使相如奉璧入秦秦王坐章臺得璧大喜傳璧以示美人及左右左右皆呼萬歲相如視秦王無意償趙城乃前曰璧有瑕請指示王王授璧中立倚柱怒髮上衝冠謂秦王曰趙王齋戒五日使臣奉璧拜送書於廷何者嚴大國之威以脩敬也今臣至大王見臣列觀禮節甚倨得璧傳戲無儻趙王城邑故臣復取璧大王必欲急臣臣頭今與璧俱碎於柱矣持璧睨柱欲以擊柱秦王恐其破璧乃辭謝固請召有司案圖十五城與趙相如見其詐乃謂曰趙王送璧時齋五日大王亦宜齋五日乃敢上璧秦王許相如就舍使其從者衣褐褁璧亡歸趙秦王齋竟引相如相如曰自秦繆公以來二十餘君未有堅盟約者臣恐見欺負趙故令人持璧歸間至趙矣王若割十五都與趙趙豈敢留璧得罪於大王臣知欺大王當誅請就湯鑊秦遂厚遇之既歸趙王以為賢大夫使不辱於諸侯拜為上大夫秦亦不以城與趙趙亦不與秦璧後秦王會澠池秦王飲酒酣曰寡人竊聞趙王好音請奏瑟趙王鼓瑟秦御史前書曰某年某月秦王與趙王會飲令趙王鼓瑟相如前曰趙王竊聞秦王善為秦聲請奏缶以相娛樂秦王怒不許於是相如前進缶因跪請之秦王不肯擊缶相如曰五步之內臣請以頸血濺大王矣左右欲刃相如相如張目叱之左右皆靡秦王不懌為一擊缶相如顧召趙御史書曰某年某月秦王為趙王擊缶秦之群臣曰請以趙十五城為秦王壽相如亦曰請以秦之咸陽為趙王壽趙亦盛設兵待秦秦不敢動既罷歸國以相如功大拜為上卿位在廉頗右又曰曹沫者魯人也以勇力事魯莊公齊桓公與魯莊公會于柯而盟桓公與莊公既盟於壇上曹沫執匕首劫齊桓公桓公左右莫敢動問曰子將何曹沫曰齊強魯弱而大國侵魯亦已甚矣今城壞即壓境君其圖之公乃許盡還魯之侵地既已言曹沫沒其匕首下壇北面就群臣之位顏色不變辭令如故又曰楚於期奔燕丹計無所出鞠武曰燕有田光先生者其為人智深而勇沉可與謀太子因謁光光言荊卿太子曰願因先生得結交於荊卿可乎田光曰敬諾即起趍出太子送之至門戒曰丹所報先生言者國大事也願先生勿泄也田光跪而笑曰諾見荊軻曰光與子相善燕國莫不知今太子聞光壯盛之時不知吾形已不逮也幸而教之曰燕秦不兩立願先生留意光竊不自外言足下於太子願足下過太子於宮荊軻曰謹奉教田光曰吾聞之長者為行不使人疑之今太子告光曰所言國之大事也願先生勿泄也是太子疑光也夫為行而使人疑之非節也欲自殺以激荊卿曰願足下急過太子言光已死明不言也因遂自刎又曰秦將李信年少壯勇嘗以兵數千逐燕太子丹至於汙水卒得破丹, WYG: 四}
