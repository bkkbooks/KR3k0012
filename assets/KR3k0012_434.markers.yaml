  - {type: variant, offset: 662, length: 5, content: 晉郄克及齊, SBCK: 賈復以偏將軍從上拔邯鄲擊青犢大戰至日中賊陣堅不却傅召復曰吏士飢且朝飯復曰先破之後食耳於是􅀍羽先登所向皆靡諸將咸服其勇上以復敢􅀷入希令逺征而壯其勇節常自從之故復少方靣之勲諸將毎論功復未曽有言上輙曰賈君之功我自知之又曰張歩攻耿弇營合戰飛矢中弇股以佩刀截之左右無知者又曰邳彤爲遼東太守有勇力能貫三百斤弓虜毎犯塞常爲士卒先鋒數破之又曰温序爲護羗校尉行部爲隗囂將苟宇所拘刼序素有氣大怒叱宇等曰虜何敢迫脅漢將因以節撾殺數人衆爭欲殺之宇止之曰此義士死節可賜以劔序受劔銜􅂡於口顧左右曰無令􅂡汚又曰朱暉字文季南陽人暉早􅀌有氣决年十三莽敗天下亂與外氏家屬從田間奔入宛城道遇群賊賊操兵弩欲倮奪婦女衣物昆弟賔客皆惶迫伏地莫敢動暉抜劔前曰財物皆可取諸母衣不可得今日朱暉死日也賊見其小壯其志􅀏曰童子内刀遂舎之謝承後漢書曰彭脩字子陽㑹稽人年十五時父爲郡吏得休與脩歸道爲盜所刼脩困迫乃拔佩刀前持盗曰父辱子死盗相謂曰此童子義勇士也不冝逼之遂辭謝而去魏志曰龐德將所領與曹仁共抜宛遂南屯樊討􅀜羽樊下諸將以德兄在漢中頗疑之德常曰我受國恩義在効死親與羽交敵射羽中額時德常乗白馬羽軍謂之白馬將軍又曰曹仁從平荆州以仁行征南將軍留屯江陵拒呉周瑜瑜將數萬人來攻遣部曲將牛金逆與挑戰賊多金衆少遂爲所圍仁望金等垂没左右皆失色仁氣􅁬怒甚將壯士數十􅀐直前衝入賊圍等金乃得解餘衆未盡出仁復直還突出金兵賊乃退又曰臧覇字宣髙太山人父戒爲縣獄􅁺據法不聽太守所欲殺太守怒収戒詣府送者百餘人覇年十八將客數人於南山中奪之送者莫敢動因與父俱亡命東海由是以勇壯聞又曰曹真字子丹太祖族子也少􅀌召飬與諸子同使與文帝共止嘗獵爲虎所逐顧射之應聲而倒太祖壯其鷙勇使將虎􅀐討虚丘賊拔之封靈壽亭}
