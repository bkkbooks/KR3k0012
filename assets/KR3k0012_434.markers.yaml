  - {type: variant, offset: 1668, length: 432, content: 蟠于地由也當一隊而敵之必也攘地千里搴旗執馘唯由能之使二子者從我焉夫子曰勇哉史記曰毛遂隨平原君與楚合從言其利害日出而言之日中不決遂案劍歷階而上謂平原君曰從之利害兩言而決耳今日出而言從日中不決何也楚王謂平原君曰客何為者也平原君曰是勝之舍人也楚王叱胡不下吾乃與爾君言汝何為者也毛遂案劍而前曰今十步之內王不得恃楚國之眾也王之命懸於遂手叱者何且遂聞湯以七十里之地王矢下文王以百里之壤而臣諸侯今楚地方五千里持戟百萬此霸王之資也白起小豎子耳率數萬之眾興師以與楚戰一戰舉鄢郢再戰而燒夷陵三戰而辱王之先人此百世之怨而趙之所羞而王弗知惡合從者為楚非為趙也吾君在前叱者何也楚王曰先生之言是也遂定從而還又曰范睢說秦昭王夫以烏獲任鄙之力荊成孟賁許慎曰荊成古勇士孟賁衛人也慶忌夏育之勇焉而死死者人之所必不免也又曰廉頗者趙之良將也趙惠文王十六年廉頗為趙將伐齊大破之取晉陽拜為上卿以勇氣聞於諸侯又曰蘭相如者趙人也為趙官者令繆賢舍人趙惠文王時得楚和氏璧秦昭王願以十五城請易璧令曰臣客舍人蘭相如其人勇, SBCK: 壯}
