  - {type: variant, offset: 1221, length: 215, content: 事也克則為卿不克則烹固其所也何害乃烹石乞又曰晉楚戰楚師薄於險叔山冉謂養由基曰雖君有命為國故子必射乃射再發盡殪叔山冉搏人以投中軍折軾晉師乃止言二人皆有退人之能又曰齊莊公朝指殖綽郭最曰寡人之雄也州綽曰君以為雄誰敢不雄然臣不敏平陰之役先二子鳴十八年晉伐齊及平陰莊公為勇爵設爵位以命勇士殖綽郭最與焉州綽曰東閭之役臣左驂迫還於門中識其板數識門板數其可以與此乎周官曰司右掌群右之政令凡軍國之勇士能用五兵者屬焉掌其政令河圖曰勇敢重瞳宋均注曰項羽, SBCK: 始}
