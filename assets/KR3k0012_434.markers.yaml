  - {type: variant, offset: 801, length: 3, content: 者有如, WYG: 曰吕布字奉先五原人也董卓為都尉誓為父子官至中郎将卓每以布自衛布嘗小失於卓卓拔㦸擲之布趫㨗得免布由是隂怨於卓布後應王允於門刺殺卓李傕等攻布布不能拒投袁術術不納又投袁紹紹遂與布擊張燕布嘗御良馬號赤兔能馳城飛塹屢突張燕軍陣一}
