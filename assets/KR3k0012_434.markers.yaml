  - {type: variant, offset: 78, length: 1, content: 桓, SBCK: 楚亡人獨籍知其處請召籍受命籍因擊殺數十人府中讋伏梁遂舉郡中得八千人渡江而去至下邳軍巳六七萬邯鄲人范曽􅀃梁曰秦滅六國楚最無罪自懷王入秦不返楚人憐之至今􅀂立楚後亡楚必也梁然之梁於是立懷王孫心爲楚王是爲義帝從民望也都盱眙梁自號}
  - {type: variant, offset: 78, length: 1, content: 桓, WYG: 楚亡獨籍知其處請召籍受命籍遂擊殺數十百人衆皆讋伏梁遂舉郡中得八千人渡江而去至下邳凡六七萬人居鄛人范増説梁曰秦滅六國楚最無罪自懐王入秦不返楚人憐之至今若立楚後亡秦必也梁從之廼求楚懐王孫心為楚王是為義帝從民望也都盱眙梁自號}
