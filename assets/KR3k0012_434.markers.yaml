  - {type: variant, offset: 101, length: 1, content: 弗, SBCK: 賜之巵酒彘肩噲旣飲酒咀彘肩羽曰能復飲乎噲曰臣死且不辭何憚巵酒且漢王入􅀜定咸陽曝師于㶚上以待大王今大王至而聽小人言與漢王有􅂩臣恐天下解心疑大王也項羽嘿然噲因目揮漢王佯如厠遂與噲輕􅀐歸營漢王即皇帝位封噲爲武陽侯後從上擊陳豨有功遷左丞相又從上破黥布後上病惡見人群臣莫敢入噲排闥直入大臣等隨之噲曰陛下起沛何其壯也今天下巳定又何憊也且陛下病甚不見臣等計㑹國事獨與一宦者處幽室中絶不見臣等陛下豈不思趙髙之事乎上􅀏而起又曰天漢}
