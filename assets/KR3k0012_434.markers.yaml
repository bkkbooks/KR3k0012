  - {type: variant, offset: 1453, length: 214, content: 仲由字子路少孔子九歲子路性鄙好勇力志抗直冠雄雞佩猳豚陵暴孔子孔子設禮稍誘之子路後服子路問君子尚勇乎孔子曰君子義以為上君子好勇而無義則亂小人好勇而無義則盜又曰孔子將之衛路出於蒲會公叔氏以蒲叛衛而止孔子弟子有公良孺者為人賢良有勇力挺劍而合眾將與之戰蒲人懼曰茍無適衛吾則出子乃盟孔子出之又曰孔子北遊登乎農山子路子貢顏回侍側孔子四望喟然而歎曰於斯致思無所不至矣二三子各言爾志吾將擇焉子路進曰由願得白羽若月赤羽若日鍾鼓之音上震于夫旌旗繽紛, SBCK: 帳}
