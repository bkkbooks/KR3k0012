  - {type: variant, offset: 80, length: 2, content: 皃也, SBCK: 信君師次定陶有驕色宋義諌曰戰勝而驕卒墮者敗今卒墮矣秦兵日益爲君危之梁不聽秦將章邯兵至擊楚大破梁戰死義帝以宋義有先見徴爲上將軍羽爲次將范増爲末將北救趙至安陽留不進籍謂義曰今秦軍圍鉅鹿疾引兵渡河楚擊其外趙應其内破秦軍必矣義曰不然夫􅅮牛之䖟不可以破虱蝨蟣今秦攻趙戰勝則兵疲我乗其弊不勝則我引兵鼔行而西必舉秦矣夫擊敵輕銳我不如公坐運籌䇿公不如我因下令曰猛}
  - {type: page-break, offset: 80, content: '', id: KR3k0012_SBCK_434-3b}
