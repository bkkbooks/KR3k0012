  - {type: variant, offset: 91, length: 2, content: 商郊, WYG: 帳中左右懾服莫敢支吾悉發兵渡河沉舟敗釜燒廬舎持三日粮示必死乃大破秦兵虜王離諸将入轅門膝行而前莫敢仰視師次鉅鹿㑹戰夜坑秦卒二十萬入關屠咸陽殺子嬰自立為西楚覇王與漢王相持五年及漢兵大㑹垓下食盡與漢兵戰不利圍之夜聞漢軍皆楚歌乃驚曰漢皆已得楚乎遂以從騎八百人夜潰圍南出漢令騎将灌嬰追至東城籍惟单騎自知智窮仰天呼躍自刎而死遂為五将各分體漢王以魯公禮𦵏羽穀城諸項賜姓劉}
