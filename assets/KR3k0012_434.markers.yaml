  - {type: variant, offset: 247, length: 202, content: 之智去其詐用人之勇去其怒用人之仁去其貪鄭玄曰用智者之謀勇者之斷仁者之施足以成治矣又曰商者五帝之遺聲也商人識之故謂之商齊者三代之遺聲也齊人識之故謂之齊明乎商之音者臨事而屢斷明乎齊之音者見利而讓臨事屢斷勇也見利而讓義也有勇者義非歌孰能保此左傳曰公及齊師戰于長勺公將鼓之曹劌曰未可齊人三鼓曰可矣齊師敗績公將馳之劌曰未可下視其轍登軾而望之曰可矣遂逐齊師既克公問其故對曰戰勇氣也一鼓作氣再而衰三而竭彼竭我盈故克之夫, SBCK: 擊十}
