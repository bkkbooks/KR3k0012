  - {type: variant, offset: 653, length: 1466, content: 不若若順也螭魅罔兩螭山神獸形魅怪物罔兩水神莫能逢之又昭元曰晉侯有疾鄭伯使公孫僑如晉聘且問疾叔向問焉曰寡君之疾病卜人曰實沈臺駘為祟敢問此何神也子產曰昔高辛氏有二子長曰閼伯季曰實沈居于曠林不相能也日尋干戈以相征討后帝不臧遷閼伯于商丘主辰遷實沈于大身主參由是觀之則實沈參神也昔金天氏有裔子曰昧為玄冥師生允格臺駘臺駘能業其官宣汾洮障大澤以處大原帝用嘉之封諸汾川由是觀之則臺駘汾神也又昭三曰石言于晉魏榆魏榆晉也晉侯問於師曠曰石何故言對曰石不能言神或馮焉謂有精神馮依石而言不然民聽濫也抑臣又聞之曰作事不時怨讟動於民則有非言之物而言今宮室崇侈民力凋盡怨讟並作莫保其性石言不亦宜乎論語曰子不語怪力亂神神謂鬼神之事又曰子路問事鬼神子曰未能事人焉能事鬼鬼神難明語之無益故不荅家語曰不食者不死而神國語曰虢公夢在廟有神人面白色虎瓜執鉞立於西阿之下公懼而走神曰無走帝命曰使晉襲于爾門公拜稽首覺召史嚚占之對曰如君之言則蓐收也天之刑神也天事官成公使囚之且使國人賀夢舟之僑告其族曰眾謂虢不久吾乃今知之又曰有神降於莘王問內史過曰是何故對曰昔夏之興祝融降於崇山其亡也回祿信於聆隧商之興也檮杌次於丕山其亡也夷羊在牧周之興也鸑鷟鳴於歧山其衰也杜伯射王於鄗宣王殺杜伯不辜後宣王田于囿中杜伯起於道左衣朱冠操朱弓矢射宣王中心拆脊而死今則丹朱之神也虢其亡也賈逵注曰祝融回掾火之神也檮杌鯀也丹朱堯子又曰長勺之役曹劌問所以戰於莊公公曰余不愛衣食於民不愛牲玉於神對曰夫惠本而後民歸之志民和而後神降之福今將惠以小賜祀以獨恭小賜不咸民弗歸也獨恭不優神弗福也又曰夏之衰也褒人之神降化為二龍以同于王庭而言曰余襃之二君也夏后卜殺之與去之與止之莫吉卜請其漦而藏之吉乃布幣焉而策告之龍亡其漦在櫝而藏之又曰古者民神不雜謂司民司神之官各異民之精爽不攜貳者而又能齊肅衷正其智能上下比義其聖能光遠宣朗其明能光照之其聰能聽徹之如是則明神降之在男曰覡在女曰巫河圖曰東方蒼帝神名靈威仰精為青龍南方赤帝神名赤熛怒精為朱鳥中央黃帝神名含樞紐其精為麟西方白帝神名白招矩精為白虎北方黑帝神名叶光紀精為玄武龍魚河圖曰天歲星主德慶其精下為大社之神天太白星主兵凶其精下為雨師之神天熒惑星主司非其精下為風伯之神天辰星之氣司災其精下為先農之神天鎮星主得士之慶其精下為靈星之神又曰東方太山君神姓圓名常龍南方衡山君神姓丹名靈峙西方華山君神姓浩名鬱狩北方恒山君神姓登名僧中央嵩山君神姓壽名逸群呼之令人不病東方太山將軍姓唐名臣南方霍山將軍姓朱名丹西岳華陰將軍姓鄒名尚北岳恒山將軍姓莫名惠中岳嵩高山將軍姓石名玄恒存之卻百邪東海君姓馮名脩青夫人姓朱名隱娥南海君姓視名赤夫人姓翳名逸寥西海君姓勾大名丘百夫人姓靈名素簡北海君姓是名禹帳里夫人姓結名連翹河伯公名子夫人姓馮名夷君有四海河神名並可請之呼之卻鬼氣又曰髮神名壽長耳神名嬌女目神名珠殃鼻神名勇盧齒神名丹朱夜臥三呼之有患亦便呼之九過惡鬼自卻史記曰趙襄子為智伯所敗走棄晉陽原過從後至於王澤見三神人自帶以上可見自帶以下不可見與原過竹二節莫通曰為我以是遺趙無卹原過既至以告襄子襄子齊三日親自剖竹有朱書曰趙無卹余霍太山之陽侯天使也三月丙戊余將使汝反滅智氏汝亦立我百邑余將賜汝林胡之地襄子再拜受如三神之令果以丙戍滅智氏又曰始皇夢與海神戰如人狀問占夢博士曰水神不可見以大魚鮫龍為候今上禱祠謹而有此惡神當除去而善神可致又曰始皇西南渡淮水之衡山南郡浮江至湘山神逢大風幾不得渡上問博士曰湘君何神博士對曰聞堯女舜之妻也而葬此於是始皇大怒使刑徒三千人伐湘山樹赭其山漢書曰高祖夜徑澤中有大虵當逕乃前拔劍斬虵後人來至虵所見, SBCK: ''}
