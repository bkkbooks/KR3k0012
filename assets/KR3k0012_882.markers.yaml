  - {type: variant, offset: 2120, length: 230, content: 老嫗夜哭人問何哭嫗曰人殺吾子人曰嫗子何為見殺曰吾子白帝子也化為虵當道今赤帝子斬之因忽不見又曰張良嘗遊下邳圯上有老父至良所直墮其履道下謂良曰孺子下取履良因取之父笑而去良殊大驚父去里餘復還曰孺子可教矣後五日平明與我會良怪之跪曰諾五日平明往父已先在怒曰與老人期後何也後五日復會早來良半夜往有頃父亦來喜曰當如是出一編書曰讀此當為王者師矣後十三年孺子見我濟北穀城下黃石即我矣視其書即太公兵法也又郊祀志曰秦文公九年獲若石云于陳蒼北阪城祠其神或歲不至或歲數來來常以夜煇若流星, SBCK: 􅀐絡鐵}
