  - {type: variant, offset: 3226, length: 126, content: 宣帝時陰子方者至孝有仁恩嘗臘日晨炊見竈神形見雜五行書曰竈神長衣黃衣夜被髮從灶中出知其名呼之而可除凶惡子方再拜受慶家有黃羊因以祀之自是已後暴至巨富田有七百餘頃輿馬僕隸比於邦君子方常言我子孫必將強大至孫識三世而遂繁昌故後常以臘日祀竈而薦黃羊焉又曰班超至于寘, SBCK: 􅁗昭}
