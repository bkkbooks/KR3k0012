  - {type: variant, offset: 2383, length: 579, content: 川及八神將自古而有之或曰太公以來作之八神一曰天主二曰地主三曰兵主四曰陰主五曰陽主六曰日主七曰月主八曰四時主又曰武帝初即位尤敬鬼神之祀上求神君舍之上林中磃氏館音蹄神君者長陵女子以乳死見神於先後宛若產乳而死也兄弟妻相謂先後宛若祠之其室平原君亦往祠之其後子孫以尊顯平原君武帝外祖冉又曰毫人繆忌奏曰天神貴者太一大一佐曰五帝謂青帝靈威仰赤帝赤熛黃帝含樞紐白招矩黑帝叶光紀也又曰游水發根言上郡有巫病鬼而下之上召置之甘泉及病使人問神君神君言曰天子無憂病病少瘉強與我會甘泉於是上病瘉遂起幸甘泉病良已大赦置壽宮神君神君最貴者曰太一其佐曰大禁司命之屬皆從之非可得見聞其言言與人音時去時來則風肅然居室帷中時晝言然常以夜天子祓然後入因巫為主人關飲食所欲言行下又置壽官北官張羽旗設共具以禮神君所言上使受書其名曰盡法其所言世俗之所知也無絕殊者而天子心獨喜其事祕世莫知也又曰公孫卿言見神人東萊山若云欲見天子天子於是幸緱氏城拜卿為中大夫遂至東萊宿留之數日無所見見大人跡云又曰祠神人於交門宮若有鄉坐拜者師古曰如有神景象嚮祠坐而拜也或言益州有金馬碧雞之神可醮祭而致於是遣諫大夫王襃使持節而求之又曰谷永說成帝曰昔周史萇弘欲以鬼神之術輔導靈王會朝諸侯而周愈微諸侯叛楚懷王隆祭祀事鬼神欲以獲福助卻秦師而兵挫地削身辱國危秦始皇并天下甘心於神仙之道遣徐福韓終之屬多齎童男童女入海求神采藥因逃不還天下怨恨漢, SBCK: 破兒唐}
