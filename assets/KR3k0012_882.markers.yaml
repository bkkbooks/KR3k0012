  - {type: variant, offset: 3535, length: 6, content: 市買其畚而云, SBCK: 是蜀沃野千里號爲陸海天下謂之天府也氷又作石犀五頭以厭水精時青衣有深水出䝉山下伏行地中㑹江至南安觸山崖水脉漂蕩破害舟舡氷乃發卒鑿平崖時水神怒氷乃操刀入水與神闘迄今􅂪福漢武故事曰上祀太畤􅀕常有光明照長安城如月光上以問東方朔此何神也朔曰此司命之神揔鬼神者也上曰祠之能令益壽乎對曰皇者壽命懸於天司命}
