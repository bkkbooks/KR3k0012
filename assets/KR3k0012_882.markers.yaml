  - {type: variant, offset: 3056, length: 3, content: 何敞祖, SBCK: 􅀄薛延陁之將敗也有一客乞食於主人主人引入帳令妻具饌其妻頋視客乃狼頭人也妻告隣人共視之狼頭人巳食主人而去相與逐之止鬰督軍山見二人追者告其故二人曰我則神人也薛延陁當滅我來取之追者懼而退走延陁竟敗於鬱督軍山老子曰神得一以靈神無以靈將恐歇莊子曰藐姑射之山有神人居焉肌膚􅀂氷雪綽約􅀂處子不食五榖吸風飲露乗雲氣御飛龍而遊乎四海之外管子曰桓公北征􅀌竹未至卑耳之谿十里闟然止瞠然視援弓將射引而未敢發也謂左右曰見是前人乎左右對曰不見也公曰事其不濟乎寡人大惑今者寡人見人長尺而人物具焉冠右祛衣走馬前疾事其不濟乎寡人大惑豈有人􅀂此乎管仲對曰臣聞登山之神有俞兒者長尺而人物具焉覇王之君興而登山之神見且走馬前道也祛衣示前有水也右祛衣示從右方渉也至卑耳之谿有賛水者曰從左方渉其深及冠從右方渉其深至膝巳渉其大濟桓公坐拜管仲之馬前曰仲}
  - {type: page-break, offset: 3056, content: '', id: KR3k0012_SBCK_882-2b}
  - {type: variant, offset: 3056, length: 0, content: '', WYG: 初薛延陁之將敗也有一客乞食於主人主引入帳令妻具饌其妻顧視客乃狼頭人也妻告隣人共視之狼頭人已食而去主人相與逐之止鬱督軍山見二人追者告其故二人曰我則神人也薛延陁當滅我來取之追者懼而退走延陁竟敗於鬱督軍山老子曰神得人以靈神無依靈將空歇莊子曰藐姑射之山有神人居焉肌膚若氷雪綽約若處子不食五穀吸風飲露乗雲氣凌飛龍而遊乎四海之外管子曰桓公北征孤竹未至卑耳之谿十里闟然止瞠然視援弓將射引而未敢發也謂左右曰見軾前人乎左右對曰不見也公曰事其不濟乎寡人大惑今者寡人見人長尺而人物具焉冠右袪衣走馬前疾事其不濟乎寡人大惑豈有人若此乎管仲對曰臣聞登山之神有俞兒者長尺而人物具焉覇王之君興而登山之神見且走馬前示疾道也袪衣示前有水也右袪衣示從右方涉也至卑耳之谿有賛水者曰從左方涉其深及冠從右方涉其深至膝若右涉其大濟桓公立拜管仲之馬前曰仲父之聖至若此寡人之罪久矣墨子曰鄭繆公處乎廟有神入門身烏素服曰帝饗汝明徳使錫汝壽十年有九公曰敢問神明為}
  - {type: page-break, offset: 3056, content: '', id: KR3k0012_WYG_882-3b, image: WYG0900/WYG0900-0692b.png}
  - {type: page-break, offset: 3056, content: '', id: KR3k0012_WYG_882-4a, image: WYG0900/WYG0900-0692c.png}
  - {type: variant, offset: 3056, length: 3, content: 何敞祖, krp: 𥘉薛延陁之將敗也有一客乞食於主人主人引入帳令妻具饌其妻頋視客乃狼頭人也妻告隣人共視之狼頭人巳食主人而去相與逐之止鬰督軍山見二人追者告其故二人曰我則神人也薛延陁當滅我來取之追者懼而退走延陁竟敗於鬱督軍山老子曰神得一以靈神無以靈將恐歇莊子曰藐姑射之山有神人居焉肌膚若氷雪綽約若處子不食五榖吸風飲露乗雲氣御飛龍而遊乎四海之外管子曰桓公北征孤竹未至卑耳之谿十里闟然止瞠然視援弓將射引而未敢發也謂左右曰見是前人乎左右對曰不見也公曰事其不濟乎寡人大惑今者寡人見人長尺而人物具焉冠右祛衣走馬前疾事其不濟乎寡人大惑豈有人若此乎管仲對曰臣聞登山之神有俞兒者長尺而人物具焉覇王之君興而登山之神見且走馬前道也祛衣示前有水也右祛衣示從右方渉也至卑耳之谿有賛水者曰從左方渉其深及冠從右方渉其深至膝巳渉其大濟桓公坐拜管仲之馬前曰仲}
  - {type: variant, offset: 3057, length: 2, content: 敞祖, WYG: 曰為勾芒韓子曰齊人謂齊王曰河伯水神也王不識與之遇乎請使王遇之乃為壇塲于大水之上而與王立焉有間大魚動因曰此河伯也隋巢子曰昔三苖大亂天命殛之夏后受之大神降而冨也司命益年而民不夭四方歸之闢地以王山海經曰豐山神耕}
  - {type: page-break, offset: 3057, content: '', id: KR3k0012_WYG_882-4b, image: WYG0900/WYG0900-0692d.png}
  - {type: variant, offset: 3060, length: 2, content: 比干, SBCK: 之聖至􅀂此寡人之罪也乆矣墨子曰鄭繆公處乎廟有神入門身鳥素服曰帝饗汝明德使􅃬汝壽十年有九公曰敢問神名曰予爲勾芸韓子曰齊人謂齊王曰河伯大神也王不識與之遇乎請使王遇之乃爲壇􅂣大水之上而與王立焉有間大魚動因曰此河伯也隋巢子曰昔三苗大亂天命殛之夏后受之大神降而冨也司命益年而民不夭四方歸之闢地以王山海經曰豐山有神耕父處之常游清冷之淵出入有光清冷水在西折縣山上有祠水赤有光又曰崑崙山神陸吾虎身長九首人靣又曰西北海外章尾山有神人靣虵身而赤身長千里其眼乃晦其視乃明視爲晝明爲衣雨風是謁能請風雨是燭九隂是謂燭龍詩含神務曰天不是西北無隂陽消息故有龍銜火精照天門中又曰􅃖尤作兵犯黄帝乃令應龍攻於兾州之野􅃖􅀹請風伯所從大風雨黄帝乃下天女魃止雨遂殺􅃖􅀹魃不得復上故所居不雨黄庭内景經曰至道不煩决存眞􅅺九百節皆有神髪神蒼華}
