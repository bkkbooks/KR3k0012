  - {type: variant, offset: 44, length: 0, content: '', WYG: 子春設伏摧破之授南青州刺史又曰蕭猷封臨汝侯為呉興郡守性倜儻與楚王廟}
  - {type: variant, offset: 45, length: 21, content: 之所為乎夫變化之道不為而自然故知變化者則知, SBCK: 交飲至一斛毎酹祀盡懽極醉}
