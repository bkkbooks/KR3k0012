  - {type: variant, offset: 3535, length: 2, content: 市買, WYG: 是蜀沃野千里號為陸海天下謂之天府也氷又作石犀五頭以厭水精時青衣有沬水出蒙山下伏行地中會江至南安觸山崖水脉漂蕩破害舟舡氷乃發卒鑿平崖時水神怒氷乃操刀入水與神闘迄今蒙}
