  - {type: variant, offset: 48, length: 120, content: 乎夫變化之道不為而自然故知變化者則知神之所為唯神也故不疾而速不行而至毛詩嵩高曰維嶽降神生甫及申禮記孔子間居曰清明在躬氣志如神又中庸曰鬼神之為德也其盛矣乎視之而弗見聽之而弗聞體物而不可遺體猶生也可猶所也不有所遺言萬物無不以鬼神之氣生也使天下之, WYG: 益州刺史時江陽}
