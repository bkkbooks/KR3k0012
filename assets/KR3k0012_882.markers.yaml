  - {type: variant, offset: 3445, length: 0, content: '', SBCK: 北靣者江神死後無復患博物志曰太公望爲灌壇令文王夢見婦人當道􅂘問其故曰吾太山之神嫁爲西海婦灌壇令當吾道不敢以疾風􅁀雨過也夢􅁴召太公三日果疾風􅁀雨三齊略記曰始皇作石橋欲過海觀日出處于時有神人能驅石下海城陽一山石盡起立嶷嶷東傾􅃺似相隨而行云石去不速神人輙鞭之皆流血石莫不悉赤至今猶爾又云始皇於海中作石橋海神爲之竪柱始皇感其恵求與相見海神荅云我}
