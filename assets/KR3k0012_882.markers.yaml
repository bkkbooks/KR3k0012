  - {type: variant, offset: 170, length: 196, content: 明盛服以承祭祀洋洋乎如在其上如在其左右詩曰神之格思不可度思矧可射思格來也蚓況也射厭也言神之來其形象不可億度況可厭倦乎又祭法曰山林川谷丘陵能出雲為風雨見怪物皆曰神又祭義宰我曰吾聞鬼神之名不知其所謂子曰氣也者神之盛也魄也者鬼之盛也合鬼與神教之至也眾生必死死必歸土此之謂鬼骨肉斃于下陰為野土其氣發揚于上為昭明焄蒿悽愴此百物之精也神之著也因物之精制為之極明命鬼神以為黔首則百眾以畏萬民以服又樂記曰明則, SBCK: 苟兒反猷乃遥禱請救是日}
