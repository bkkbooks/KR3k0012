  - {type: variant, offset: 36, length: 8, content: 知變化之道者其知, SBCK: 蕭猷封臨汝侯爲吴興郡守性倜儻與楚王廟}
  - {type: variant, offset: 36, length: 0, content: '', WYG: 李安民為呉興太守郡有項羽神護郡聽事太守到郡必須祀以軛下牛安民奉佛法不與神牛著屐上聽事又於上設八闗齋俄而牛死安人尋卒世以神為祟南史曰王神念為青州刺史性剛正所更州郡必禁止淫祠時東北有石鹿山臨海先有神廟神念至便令毁撤神影壊屋舍坐棟上有一大蛇長丈餘入海水時陰子春為東莞太守夣人通名詣子春云有人見苦破壊宅舍既無所託欽君厚徳欲憇此境子春心密記之經二日而}
