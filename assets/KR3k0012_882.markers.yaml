  body:
  - {type: variant, offset: 1, length: 1, content: 鬼, SBCK: 􅀑}
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 二神下北齊書曰神武以髙昻爲西道大都督徑趣啇洛昻渡河􅀕河伯曰河伯水中之神髙敖曹地上之虎齊書曰義郷縣長風廟神姓鄧先經爲縣令死遂發靈周山圖啓乞加神位輔國將軍上曰足狗􅁏便了事何用階級齊書曰安人爲吴興太守郡有項羽神護郡㕔事太守到郡必須祀以軛下牛安人奉佛法不與神牛著履上㕔事又於上設八關齋俄而牛死安人尋卒丗以神爲祟梁書曰王神念爲青州刺史性剛正所更州郡必禁止􅁋祠時東北有石鹿山臨海先有神廟神念至便令毀撤神影壞屋舎坐棟上有}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_882-1b}
  - {type: variant, offset: 3, length: 1, content: 一, WYG: 二}
  - {type: variant, offset: 3, length: 0, content: '', krp: 二神下北齊書曰神武以髙昻爲西道大都督徑趣啇洛昻渡河祭河伯曰河伯水中之神髙敖曹地上之虎齊書曰義郷縣長風廟神姓鄧先經爲縣令死遂發靈周山圖啓乞加神位輔國將軍上曰足狗肉便了事何用階級齊書曰安人爲吴興太守郡有項羽神護郡㕔事太守到郡必須祀以軛下牛安人奉佛法不與神牛著履上㕔事又於上設八關齋俄而牛死安人尋卒丗以神爲祟梁書曰王神念爲青州刺史性剛正所更州郡必禁止淫祠時東北有石鹿山臨海先有神廟神念至便令毀撤神影壞屋舎坐棟上有}
  - {type: xml-element, offset: 4, content: '', id: KR3k0012_CHANT_882-bkkxmlele1}
  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_882-1a.1}
  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_882-1a.2}
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 大虵長丈餘入海水時隂子春爲東莞太守夢人通名詣子春云有人見苦􅀍壞宅舎旣無所託欽君厚德欲憇此境子春心宻記之經二日而知之甚驚以爲前所夢}
  - {type: variant, offset: 4, length: 0, content: '', krp: 大虵長丈餘入海水時隂子春爲東莞太守夢人通名詣子春云有人見苦𬒳壞宅舎旣無所託欽君厚德欲憇此境子春心宻記之經二日而知之甚驚以爲前所夢}
  - {type: variant, offset: 5, length: 7, content: 上易曰陰陽不測, SBCK: 因辦牲醑請召安致一處數日復夢一朱衣人相聞辭謝云得君厚惠當以一州相報子春心喜供事彌勤經月餘魏欲襲朐山間諜前知子春設伏摧破}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 下北齊書曰神武以髙昻為雲南道大都督徑趣商洛昻渡河祭河伯曰河伯水中之神髙敖曹地}
  - {type: variant, offset: 5, length: 7, content: 上易曰陰陽不測, krp: 因辦牲醑請召安致一處數日復夢一朱衣人相聞辭謝云得君厚惠當以一州相報子春心喜供事彌勤經月餘魏欲襲朐山間諜前知子春設伏摧破}
