  - {type: variant, offset: 3534, length: 0, content: '', SBCK: 及鳥獸無犯者淮地記曰按古嶽瀆經云禹治水止桐柏山乃獲淮渦水神名曰無支祁善應對言語辨淮之淺深源之逺近形􅀂猕猴縮鼻髙額青軀白首金目雪牙頸伸百尺力逾九象禹授之庚申遂頸鎻大䥫鼻穿金鈴從淮之隂鎻􅀛山之足淮水乃安流注于海華陽國志曰周滅後􅁗孝文王以李氷爲蜀守氷能知天文地理謂汶山爲天彭門髣髴􅀂見神遂水上立祠三所壅江作塴穿郫江以行舟舡又漑灌三郡}
  - {type: variant, offset: 3534, length: 0, content: '', WYG: 及鳥獸無犯者淮地記曰按古嶽瀆經云禹治水止桐栢山乃獲淮渦水神善應對言語辨淮之淺深源之逺近形若獮猴聳鼻髙額青軀白首金目雪牙頸伸百尺力逾九象禹授之庚申頸鎖大鐵鼻穿金鈴從淮之陰鎻龜山之足淮水乃安流注于海華陽國志曰周滅後秦孝文王以李氷為蜀守氷能知天文地理謂汶山為天彭門髣髴若見神遂水上立祠三所壅江作壩穿郫江以行舟船又溉灌三郡}
  - {type: page-break, offset: 3534, content: '', id: KR3k0012_WYG_882-8b, image: WYG0900/WYG0900-0694d.png}
