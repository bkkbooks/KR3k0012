  - {type: variant, offset: 3917, length: 1, content: 順, krp: 有徳徳者得也又祭義曰天子有善讓徳於天又中庸曰雖有其位苟無其徳不敢作禮樂焉雖有其徳苟無其位亦不敢作禮樂焉又曰小徳川流大徳敦化此天地之所以爲大也又表記曰以徳報徳則民有所勸又大學曰冨潤屋徳潤身左傳桓公曰臧哀伯諌曰君人者將昭徳塞違以臨照百官猶懼或失之故昭令徳以示子孫又僖公中曰庸勲親親䁥近尊賢德之大者也又曰德以柔中國刑以威四夷又曰太上以德撫民又文公上曰孝敬忠信爲吉徳盗賊姧藏爲凶徳又宣公上曰楚子觀兵于周疆定王使王孫滿勞楚子楚子問鼎之大小輕重焉對曰在徳不在鼎又成公上曰四王之王也禹湯文武樹徳而濟同欲焉又襄公四曰太上有立德其次有立功又昭公三曰盛徳必百世毛詩蕩烝民曰徳輶如毛民鮮克舉之尚書舜典曰玄徳升聞乃命以位玄謂幽潜潜行道徳升聞天朝遂見徴用又大禹謨曰臯陶邁種徳徳乃降黎民懷之邁行種布也臯陶布行其徳下洽於民民歸服之又曰惟徳動天無逺不届又伊訓曰徳日新萬邦惟懷志自蒲九族乃離又曰爾惟徳罔小萬邦惟慶爾惟不徳罔大墜厥宗又太甲曰徳惟治否徳亂爲政以徳則治不以德則亂又咸有一徳曰非天私我有啇惟天佑于一徳非啇求于下民惟民歸于一徳徳惟一動罔不吉徳二三動罔不凶又秦誓曰同力度徳同徳度義力鈞則有徳者勝德鈞則秉義者強又曰受有億兆夷人離心離徳子有亂臣十人同心同徳又曰樹徳務滋除惡務本立德務滋長去惡務除本又洪範五福四曰攸好徳所好者徳福之道又旅獒曰玩人喪徳玩物喪志以人爲戯弄則䘮其徳又蔡仲之命曰皇天無親惟徳是輔又周官曰作德心逸日休作僞心勞日拙為德直道而行於心逸豫而名日美又君陳曰黍稷非馨明徳惟馨周易坤卦象曰地勢坤君子以厚徳載物又繫辭曰冨有之謂大業日新之謂盛徳論語爲政曰爲政以徳譬如北辰居其所而衆星拱之德者無爲猶北辰之不移而衆星拱之又里仁子曰徳不孤必有隣又先進曰徳行顔回閔子騫冉伯牛仲弓又憲問耻曰有徳者必有言有言者不必有徳又曰驥不稱其力稱其徳也驥古之善馬也徳謂在五御之威儀又季氏曰逺人不服則修文徳以來之尚書大傳曰有徳者尊其位而重其禄史記曰一年種之以榖十年樹之以木百年來之以徳東觀漢記曰張湛字子孝右扶風人以篤行純淑郷里歸徳雖居幽室闇處自整頓三輔以爲儀表又曰淳于恭字孟孫北海淳于人以謙儉推讓爲節人有刈恭禾見之念其愧因伏草中至去乃起恭家井在門外上有盆鄰里牧牛兒争飲牛恭惡其争多置器其上爲預汲水滿之小兒復争恭各語其家父母父母乃禁怒之里落皆化而不争三輔決録曰馮豹字徳文母爲父所岀後母遇之甚酷豹事之愈謹時人爲之語曰道徳彬彬馬徳文王隱晉書曰庚衮字叔襃頴川人少遭大疫二兄亡次兄毗又疫其癘氣方熾衮父母諸弟皆出避家衮獨不出諸父強之不可曰衮性不畏病納漿粥扶持不捨晝夜省柩哀臨十有餘旬病曁歇家乃反而衮亦無患害宗黨歎曰異哉此子能守人之所不能守能行人之所不能行晉中興書曰衛玠字叔寳常以人有不及可以情恕非意相干可以理遣故終身不見其喜愠齊書曰張緒字思曼爲吏部尚書毎朝見太祖目送之謂王儉曰緒以位尊我我以徳貴緒又曰王秀之字伯奮爲南郡内史州西曹荀丕欲交秀之拒而不納報丕書曰僕以徳爲寳足下以位爲寳各寳其寳於此敬冝也老子曰上徳不徳是以有徳下徳不失徳是以無徳上徳之人唯道用其徳故能有德下德而徳之必有失焉文子曰山髙者其木脩地廣者其徳厚又曰閉九竅㓕志意棄聦明反無識含陽吐隂而與萬物同徳也莊子曰至徳之世不尚賢不使能韓子曰善爲吏者樹徳不能爲吏者樹怨孟子曰周于利者凶年不能殺周于徳者邪世不能亂鶡冠子曰徳及萬人者謂之豪徳過百人者謂之英孔叢子曰晏子長不過六尺齊國莫不宗焉趙文子身如不勝衣相晉國以寜諸侯敬服其徳故也楊子法言曰耕道而得道獵徳而得徳傅子曰上徳之人其濟萬物也猶天之有春秋時至自生非徳之力太公金匱曰徳行則福徳廢則覆易叅同契曰道成徳就潜伏俟時海内先賢行狀曰王烈字伯善時有盗牛者主得之盗者曰我邂逅迷惑從今將改子旣赦宥幸無使王烈聞之又曰戴良字叔鸞髙才磥硌英聲逺播少者懷之長者慕之郷里搢紳下至黎庶莫有忿争之家又曰徐孺子徴聘未甞出門赴䘮不逺萬里常事江夏黄公薨往㑹其葬家貧無以自供賫磨鏡具自隨毎至所在賃磨取資然後得前旣至設祭哭畢而返陳仲舉爲豫章太守召之則到饋之則受但不服事以成其節又曰仇覧字季智學通五經選爲亭長民有孫元少孤與母居詣覽告元不孝覽謝遣之属母歸勿言方爲教之後覧賫禮詣元爲陳孝子供養之意元遂感激卒爲孝子時令河内王渙政尚清嚴聞覧得元不治心獨望之乃問覽在亭不治不孝得無失鷹鸇之志乎對曰竊以鷹鸇不如鳯皇故不爲也渙感覧言用損威刑㑹稽典録曰鄭弘字巨爲郡督郵上計史時計掾勾章任尚居素温冨乗鮮車駕肥馬弘恒在後尚輙罵弘無愠容弘尚在京師遊學還郡俱見府君府君所問弘無不對而尚不知出又問弘掾行道數相折辱何}
