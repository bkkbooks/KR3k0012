  - {type: variant, offset: 4112, length: 147, content: 問何以知之曰妾聞禮下公門式路馬所以廣敬也夫忠臣不為昭昭信節不為冥冥墯行今伯玉衛國賢大夫也仁而有智敬於事上此其人必不以闇昧廢禮是以知之公使視之果伯玉也反戲之曰非也夫人進觴再拜賀之公曰子何以賀曰始妾謂獨有伯玉今衛復有與之齊者是君有二賢臣也國多賢臣則國之福也西京雜記曰漢文帝為太子立思賢菀以招賓客周斐, SBCK: ''}
