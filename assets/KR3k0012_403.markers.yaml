  - {type: variant, offset: 2588, length: 1144, content: 賢孟子曰國君進賢如不得已將使卑踰尊踈踰戚可不慎歟左右皆曰賢未可也諸大夫皆曰賢未可也國人皆曰賢然後察之見賢焉然後用之呂氏春秋曰伊尹出空桑之中長而賢湯聞伊尹使人請之有侁氏有侁氏不可伊尹亦欲歸湯湯於是請取妻於有侁氏有侁氏喜使伊尹為媵送女故賢主之求有道之士無不以也有道之士求賢主無不行也相得然後樂不謀而親不約而信相為殫智竭力犯危行苦志懽樂之此功名所以大成也又曰百里奚之未遇時亡虢而虜飯牛於秦鬻以五羊之皮公孫枝得而悅之獻諸繆公三日請屬事公曰賈之五羊之皮而屬事無乃為天下笑乎枝曰信賢而任之君之明也議賢而下之臣之忠也君為明君臣為忠臣彼為信賢境內將服敵國且畏夫誰暇笑哉遂用之謀無不當舉必有功號曰五羖大夫又曰史台謂申向曰吾所患者不知賢申向曰人之患不在乎不言用賢而在乎不誠用賢夫言用賢者口也卻賢者行也言行相反而欲賢者用不肖者廢不亦難乎人主誠用賢則境內賢者出矣天下賢者至矣又曰得十良馬不如得一伯樂得十良劍不如得一歐冶得地千里不如得一賢人又曰魏文侯過段干木之閭而軾其僕曰君胡為軾曰此非段干木之閭歟干木蓋賢者也吾安敢不軾又曰趙簡子將襲衛使史墨行瞶之瞶視也音貴期以一月六月而反復簡子曰何其久也對曰謀利而得害猶弗察也蘧伯玉為相史鰌佐焉孔子為客子貢使令於君前甚聽君聽其言易曰渙其群元吉渙者賢也群者眾也元者吉之始也渙其群元吉者其佐多賢簡子案兵而不動周書陰符曰凡治國有三常一曰君以舉賢為常二曰官以任賢為常三曰士以敬賢為常夫然雖百代可知也京房易飛候曰何以知賢人隱師曰視四方有大雲五色具而不雨下賢人隱也易參同契曰天道無適莫常傳與賢者黃石公三略曰傷賢者殃及三世蔽賢者身當遭害達賢者福流子孫嫉賢者其名不令陸賈新語曰聖人居高處上則以仁義為巢乘危履傾則以聖賢為杖說苑曰周公卜居曲阜命龜曰作邑于山之陽賢則茂昌不賢則速亡又曰夫朝無賢人猶鴻鵠之無羽翼是故絕江海者託於舡致遠道者託於乘欲霸王者託於賢又曰明君在上慎於擇士務於求賢設四佐以自輔有英俊以治官又曰伯禽與康叔封朝成王見周公三見而三笞康叔駭色謂伯禽曰有商子者賢人也與子往見之康叔與伯禽見商子曰吾二子者朝乎成王見周公三見而三笞其說何也商子曰二子蓋相與觀南山之陽有木焉名曰橋二子者往觀乎南山之陽見橋竦然實高而仰反以告商子商子曰仰者父道也商子曰二子蓋相與觀乎南山之陰有木焉名曰梓二子者往觀乎南山之陰見梓勃焉實而俯反以告商子商子曰俯者子道也二子者明日見乎周公入門而趍登堂而跪周公拂其首勞而食之曰安見君子二子對曰見商子周公曰君子哉商子也又曰孔子之郯遭程子於塗傾蓋而語終日有間顧謂子路曰取束帛以贈先生子路不對有間又顧謂曰取束帛以贈先生子路悄然對曰由聞之也士不中間而見女無媒而嫁君子不行也孔子曰詩不云乎野有蔓草零露團兮有美一人清陽婉兮邂逅相遇適我願愿兮今程子天下之賢士於是不贈終身弗見也中間謂紹介也六韜曰, WYG: 城}
