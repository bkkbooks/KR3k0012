  - {type: variant, offset: 4307, length: 1, content: 紀, SBCK: 力人也􅀄武子有嬖妾無子武子疾命顆曰必嫁是疾病則曰必爲殉及卒顆嫁之曰病疾則亂吾從其治也及輔氏之役顆見老人結草以亢杜回亢禦也杜回躓而顛故􅀗之夜夢之曰余而所嫁婦}
