  - {type: variant, offset: 4338, length: 0, content: '', SBCK: 士等謀欲害帝昭聞而渉險邀士於齊澠之間止士不肯昭泣以示誠士感義乃止昭雖有隂徳於帝口終不言續齊諧記曰楊寳年九歳時至華隂山北見一黄雀爲鵶鳬所摶墜於樹下爲螻蟻所困寳取之以歸置巾箱中唯食以黄花百餘日毛羽成乃飛去其夜有黃夜童子向寳再拜曰我王母使者君仁愛救拯實感成濟以白環四枚與寳曰令君子孫絜白位登三}
  - {type: variant, offset: 4338, length: 2, content: 公體, WYG: 士等謀欲害帝昭聞而渉險邀士於齊澠之間止士不肯昭泣以示誠士感義乃止昭雖有隂徳於帝口終不言續齊諧記曰楊寶年九歲時至華隂山北見黄雀為鴟梟所搏墜於樹下為螻蟻所困寶取之以歸置巾箱中唯食以黄花百餘日毛羽成乃飛去其夜有黄衣童子向寶再拜曰我王母使者君仁愛救拯實感成濟以白環四枚與寶曰令君子孫潔白位登三事當如此數矣㑹稽典録曰鄭宏為靈文鄉嗇夫民有弟用兄錢者未還之嫂詣宏訴之宏賣中單即今之汗袖也為叔還錢兄聞之遣其婢索錢還宏宏不受又曰夏香字曼卿永興人門側有}
