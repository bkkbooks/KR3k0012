  - {type: variant, offset: 4303, length: 0, content: '', SBCK: 視君狀皃不似惡人冝深尅已反善然此當由困貧令遺絹二疋自是縣無復盗竊荀氏家傳曰荀彧徳行周備名重天下海内英俊咸嘉焉又曰鍾繇以爲顔子旣没能備九徳百行不二其過者唯荀彧乎或問繇曰君推荀君比之顔子自以不及其可得聞乎繇曰夫明君師臣其次友之以太祖之聦明毎大事常先諮之荀彧是則古師友之義也吾等受命而行猶或不盡去固逺􅁘潘朂别傳曰朂寛}
