  - {type: variant, offset: 1394, length: 216, content: 為事先生子曰居吾語汝夫回能信而不能反反謂反信也君子言不必信唯義所在也賜能敏而不能詘詘人唯辯敏亦宜有折屈時也由能勇而不能怯師能莊而不能同言人雖務莊亦當有和同時也兼四子者之有以易吾吾弗與也此其所以事吾而不及也又曰孔子讀史至楚復陳夏徵舒殺其君楚莊王討之取陳而有之申叔時諫莊王莊王從之乃復陳國也喟然曰賢哉楚莊王輕千乘之國而重一言之信非申叔時之忠弗能建其義非莊王之賢弗能受其訓又曰所謂賢者德不踰閑閑法行中規繩又曰哀公問於孔子曰當今之君孰者最賢, SBCK: 如}
