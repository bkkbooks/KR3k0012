  - {type: variant, offset: 2284, length: 425, content: 財分人謂之賢尹文子曰尹文子見齊宣王王歎國寡賢尹文子曰使國悉賢孰處王下王曰國悉不肖可乎尹文子曰國悉不肖孰理王朝王曰賢與不肖皆無可乎尹文子曰不然有不肖故王尊於上臣卑於下進賢退不肖所以有上下也王孫子曰趙簡子獵於晉山之陽撫轡而歎董安于曰敢問何歎子曰吾有食殺之馬數千多力之士數百欲以獵獸也吾恐鄰國養賢以獵吾也文子曰虎豹之駒未成而有食牛之氣鴻鵠之翼未合而有四海之心賢者之生亦然也又曰國之所以不治者三不知用賢此其一也或求賢不能得此其二也雖得弗能盡此其三也申子曰千里有賢者是比肩而立韓子曰晉平公問叔向曰吾群臣孰賢對曰趙武賢武之立如不勝衣言如不出口然其所舉士者數十人皆令得其意而公家甚賴之況武子之生也不利其家死不託其孤臣敢以為賢孟子曰國君進賢如不得已將使卑踰尊踈踰戚可不慎歟左右皆曰賢未可也諸大夫皆曰賢未可也國人皆曰賢然後察之見賢焉然後用之呂氏春秋曰伊尹出空桑之中長而賢湯聞伊尹使人請之有侁氏有侁氏不可伊尹亦欲歸湯湯於是請取妻於有侁氏有侁氏喜使伊尹為媵送女故賢主之求有, SBCK: ''}
