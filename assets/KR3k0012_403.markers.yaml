  - {type: variant, offset: 3912, length: 3, content: 賢代賢, SBCK: 道治五帝以德化王道純粹其德如彼霸道駮雜其功如此王逸正部曰仲尼門人餔道醇飲道宗昌言曰道德仁義天性也織之以成其物練之以致其情瑩之以發其光任子曰道德之懷民猶春陽之柔物也履深冰而不寒結木條而不折杜氏幽求子曰蓋道清淡以無爲爲家恬虚寂靜弘廣多包豈非聖人所宅乎又曰有道之國其􅀑不神崔元始正論曰國不信道工不信度亡可待也傅子曰君子審其宗而後學明其道而後行中論曰道之於人甚簡且易不如採金攻玉渉艱難也符子曰爲道者日損而月章爲名者日章而月損釋名曰徳得也得事冝也周禮地官下師氏曰一曰至徳二曰敏徳三曰孝徳至徳中和之德敏德仁義順時孝徳尊祖愛親禮記學記曰禮樂皆得}
  - {type: page-break, offset: 3912, content: '', id: KR3k0012_SBCK_403-4a}
  - {type: variant, offset: 3912, length: 3, content: 賢代賢, WYG: 道治五帝以徳化王道純粹其徳如彼霸道駮雜其功如此王逸正部曰仲尼門人餔道醇飲道宗昌言曰道徳仁義天性也織之以成其物練之以致其情瑩之以發其光任子曰道徳之懐民道春陽之柔物也履深冰而不寒結本條而不折杜氏幽求子曰盖道清淡以無為為家恬虛寂静寛廣多包豈非聖人所宅乎又曰有道之國其鬼不神崔元始正論曰國不信道工不信度亡可待也傅子曰君子審其宗而後學明其道而後行中論曰道之於人甚簡且易不如採金攻玉渉艱難也符子曰為道者日損而月章為名者日章而月損釋名曰徳得也得事宜也周禮地官下師氏曰一曰至徳二曰敏徳三曰孝徳至徳中和之徳敏徳仁義順時孝徳尊祖愛親禮記學記禮樂皆得}
