  - {type: variant, offset: 4351, length: 0, content: '', SBCK: 無爭專以徳化香至四節先慶酌二親退賫酒肴勞問里中父老以此爲常益都􅂄舊記曰王忳常詣京師於空舎中見一書生疾困􅉖而視之書生謂忳曰我當到洛而得病命在湏􅁷腰下有金十斤願以相贈死後乞藏骸骨未及問姓名而絶忳即鬻金一斤營其殯葬餘金悉置棺下人無知者後歸數年縣署忳大度亭長􅀄到之日有馬馳入亭中其日風飄一繍􅀍復墮忳前即言於縣馬遂奔走牽忳入他舎主人見之喜曰今擒盗矣問忳得馬忳􅀃其􅃺并繡􅀍主人悵然良乆乃曰􅀍隨飄風與馬俱亡卿何隂徳而致此二物忳自念有葬書生事因爲􅀃之道書生形兒及埋金之處主人驚曰是我子姓金名彦前往京師不知所在何意卿乃葬之大恩乆不報}
  - {type: page-break, offset: 4351, content: '', id: KR3k0012_SBCK_403-12b}
  - {type: variant, offset: 4351, length: 0, content: '', WYG: 無争專以徳化香至四節先慶酌二親退賫酒入肴勞問里中父老以此為常益都耆舊記曰王忳常詣京師於空舎中見一書生疾困愍而視之書生謂忳曰我當到洛而得病命在須臾腰下有金十斤願以相贈死後乞葬藏骸骨未及問姓名而命絶忳即鬻金一斤營其殯𦵏餘金悉置棺下人無知者後歸數年縣署忳大度亭長初到之日有馬馳入亭中其日風飄繡被復墮忳前即言於縣馬遂奔走牽忳入他舎主人見之喜曰今擒盜矣問忳忳具道得馬并繡被狀主人悵然良久乃曰被墮飄風與馬俱亡卿何隂徳而致此二物忳思自念有葬書生事因為説之道書生形貌及埋金之處主人驚曰是我子姓金名彦前徃京師不知所在不意卿乃葬之大恩久不報}
