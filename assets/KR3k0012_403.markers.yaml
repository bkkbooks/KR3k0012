  - {type: variant, offset: 4323, length: 1, content: 惟, SBCK: 于定國父于公爲縣獄吏郡決曹獄平羅文法者于公所决皆不恨其閭門壞父老方共治之于公謂曰少高大閭門令容駟馬髙蓋車我治獄多隂徳未曽有所􅁈子孫必有興者至定國爲丞相又曰邴吉字少卿魯國人爲丞相寛大好禮􅀄吉有隂徳於孝宣帝微時帝即位衆莫知之吉亦不言􅁻從大將軍長史遷至御史大夫帝聞將封之㑹􅁻病甚將使人加綬而封之及其生也太子太傅夏侯勝曰此未死也臣聞有隂徳者必饗其樂以及子孫今未􅀗其樂而病非其死病也後果愈乃封􅀶陽侯終饗其禄後漢書曰何敞六代祖比干學尚書於晁錯注云比干字少卿經明行脩兼通法律爲汝隂縣獄吏決曹􅁺平活數千人後爲丹陽都尉征和三年三月辛亥天大隂雨比干在家日中夢貴客車騎滿門覺以語妻語未巳而門有老嫗年可八十餘頭白求􅀉避雨雨甚而衣履不霑雨漬止送至門乃謂比干曰公有隂徳今天賜公策以廣公之子孫因出懷中符䇿狀如簡長九寸凡九百九十杖以授比干曰子孫佩印綬者如此筭又曰和熹鄧}
  - {type: page-break, offset: 4323, content: '', id: KR3k0012_SBCK_403-9b}
  - {type: page-break, offset: 4323, content: '', id: KR3k0012_SBCK_403-10a}
  - {type: variant, offset: 4323, length: 1, content: 惟, WYG: 于定國父于公為縣獄吏郡決曹獄平羅文法者于公所決皆不恨其閭門壊父老方共治之于公謂曰少髙大閭門令容駟馬髙盖車我治獄多隂徳未曾有所寃子孫必有興者至定國為丞相又曰邴吉字少卿魯國人為丞相寛大好禮初吉有隂徳於孝宣帝微時帝即位衆莫知之吉亦不言吉從大將軍長史遷至御史大夫帝聞將封之㑹吉病甚將使人加綬而封之及其生也太子太傅夏侯勝曰此未死也臣聞有隂徳者必饗其樂以及子孫今未獲其樂而病非其死病也後果愈乃封博陽侯終饗其禄後漢書曰何敞六代祖比干學尚書於晁錯注云比干字少卿經明行脩兼通法律為汝隂縣獄吏決曹掾平活數千人後為丹陽都尉征和三年三月辛亥天大隂雨比干在家中日夢貴客車騎滿門覺以語妻語未巳而門有老嫗年可八十餘頭白求寄避雨雨甚而衣履不沾漬雨止送至門乃謂比干曰公有隂徳今天賜公䇿以廣公之子孫因出懐中符䇿狀如簡長九寸凡九百九十枚以授比干曰子孫佩印綬者如此算又曰和熹鄧}
  - {type: page-break, offset: 4323, content: '', id: KR3k0012_WYG_403-16a, image: WYG0896/WYG0896-0555c.png}
  - {type: page-break, offset: 4323, content: '', id: KR3k0012_WYG_403-16b, image: WYG0896/WYG0896-0555d.png}
  - {type: variant, offset: 4323, length: 1, content: 惟, krp: 于定國父于公爲縣獄吏郡決曹獄平羅文法者于公所决皆不恨其閭門壞父老方共治之于公謂曰少高大閭門令容駟馬髙蓋車我治獄多隂徳未曽有所冤子孫必有興者至定國爲丞相又曰邴吉字少卿魯國人爲丞相寛大好禮𥘉吉有隂徳於孝宣帝微時帝即位衆莫知之吉亦不言吉從大將軍長史遷至御史大夫帝聞將封之㑹吉病甚將使人加綬而封之及其生也太子太傅夏侯勝曰此未死也臣聞有隂徳者必饗其樂以及子孫今未獲其樂而病非其死病也後果愈乃封博陽侯終饗其禄後漢書曰何敞六代祖比干學尚書於晁錯注云比干字少卿經明行脩兼通法律爲汝隂縣獄吏決曹掾平活數千人後爲丹陽都尉征和三年三月辛亥天大隂雨比干在家日中夢貴客車騎滿門覺以語妻語未巳而門有老嫗年可八十餘頭白求寄避雨雨甚而衣履不霑雨漬止送至門乃謂比干曰公有隂徳今天賜公策以廣公之子孫因出懷中符䇿狀如簡長九寸凡九百九十杖以授比干曰子孫佩印綬者如此筭又曰和熹鄧}
  - {type: variant, offset: 4325, length: 0, content: '', SBCK: 叔父陔言常聞活千人者子孫有封兄訓爲謁者使修石臼河歳活數千人大道可信家必蒙福􅀄太傅禹歎曰吾將百萬之衆未甞妄殺一人其後代必有興者又曰永平中楚王英謀爲逆事下郡覆考明年三府舉􅀽安能理劇拜楚郡太守是時英辭所連及繫者數千人顯宗怒甚吏按之急迫痛自誣死者甚衆安到郡不入府先往按獄理其無明驗者條上岀之府丞椽吏皆叩頭争以爲阿附反虜去與同罪不可安曰如有不合太守自當坐之不以相及也遂分別具奏帝感悟即報許得出者四百餘人又曰虞詡字升卿祖經爲縣獄吏決獄平甞曰東海于公髙其里門而其子定國卒至丞相吾決獄六十年矣雖不及于公其庶幾乎吾子孫何必不爲九卿􅁘故字詡曰􅂛卿謝承後漢書曰陳重字景公豫章冝春人舉孝廉在郞署有郎􅀒息錢數十萬債主日至煎求無巳重乃宻以錢代還郎後覺知而厚辭謝之重曰}
  - {type: page-break, offset: 4325, content: '', id: KR3k0012_SBCK_403-10b}
  - {type: variant, offset: 4325, length: 0, content: '', WYG: 叔父陔言常聞活千人者子孫有封兄訓為謁者使脩石臼河歲活數千人大道可信家必蒙福初太傅禹歎曰吾將百萬之衆未嘗妄殺一人其後代必有興者又曰永平中楚王英謀為逆事下郡覆考明年三府舉袁安能理劇拜楚郡太守是時英辭所連及繫者數千人顯宗怒甚吏按之急廹痛自誣死者甚衆安到郡不入府先往按獄理其無明騐者條上出之府丞掾吏皆叩頭争以為阿附反虜法與同罪不可安曰如有不合太守自當坐之不以相及也遂分别其奏帝感悟即報許得出者四百餘家又曰虞詡字升卿祖經為縣獄吏決平嘗曰東海于公髙其里門而其子定國卒至丞相吾決獄六十年矣雖不及于公其庶幾乎吾子孫何必不為九卿耶故字詡曰升卿謝承後漢書曰陳重字景公豫章宜春人舉孝亷在郎署有郎負息錢數十萬債主日至剪求無已重乃密以錢代還郎後覺知而厚辭謝之重曰}
