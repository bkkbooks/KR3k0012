  - {type: variant, offset: 606, length: 707, content: 曰父賢足恃乎對曰不足子賢足恃乎對曰不足兄賢足恃乎對曰不足弟賢足恃乎對曰不足臣賢足恃乎對曰不足文侯勃然作色而怒曰寡人問此五者於子子一以為不足者何也對曰父賢不過堯而丹朱放子賢不過舜而瞽瞍拘兄賢不過周公而管叔誅臣賢不若湯武而桀紂伐君欲治從身始人何恃國語曰智宣子將以瑤為後宣子荀寅瑤宣子之子智伯也智果曰不如霄也智果荀氏之族也霄宣子庶子也宣子曰霄也佷佷戾不從人也對曰霄之佷在面瑤之佷在心心佷敗國面佷不害瑤之賢於人者有五其不逮者一美鬢長大則賢鬢髮鬢也射御足力則賢伎藝必給則賢巧文辯惠則賢強毅果敢則賢若是而甚不仁以其五賢陵人而以不仁行之其誰能待之若果立瑤也智宗必滅弗聽智果別族于太史為輔氏太史掌氏姓也及智氏之亡也唯輔果在又曰臼季使舍於冀野臼季胥臣冀野晉地見冀缺耨其妻饁之相敬如賓耨耘田也野饋曰鎑字音曄從而問之冀芮之子也與之歸既復命進之曰臣得賢敢以告文公曰子何以知其賢對曰臣見其賢不忘敬也公使為下軍大夫史記曰燕昭王於破燕之後即位卑身厚幣以招賢者謂郭隗曰齊因孤之國亂襲破燕孤極知燕小力少不足以報然得賢士與共國以雪先王之恥孤之願也先生視可者得身事之郭隗曰王必欲致士必從隗始況賢於隗者豈遠千里哉於是昭王為隗改築宮而師事之又曰伯禽就封於魯周公戒伯禽曰我文王之子武王之弟成王之叔父我於天下亦不賤矣然我一沐三握髮一飯三起以待士猶恐失天下之賢人子之魯慎無以國驕人又曰楚昭王聘夫子夫子往焉路出東蔡大夫謀曰夫子賢者所剌譏皆中諸侯之病若用於楚則陳蔡危矣遂使兵拒之孔子不得行家語曰孔子謂宓子賤曰子治單父眾悅何施而得之對曰此地民有賢於不齊者不齊事之事而稟度焉皆教不齊以治道孔子歎曰昔堯舜聽天下務求賢以自輔夫賢人百福之宗神明之主也惜乎不齊之所治小也又曰子夏, SBCK: ''}
