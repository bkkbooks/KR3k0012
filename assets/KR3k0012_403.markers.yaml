  - {type: variant, offset: 2076, length: 206, content: 以為己任處則不求私名仕則不求私寵不為其身不阿其君積禮義於朝播仁風於民使天下之人翼翼焉向戴其君之尊欣欣焉歌舞其君之德文子曰山有猛獸林木為之不斬野有螫蟲葵藿為之不採國有賢臣折衝千里列子曰牛缺者上地之大儒也至邯鄲遇盜於耦沙之中盡取其衣裝車牛步而去視之欣然無憂苦之色盜追而問其故曰君子不以所養害其所養盜曰嘻賢矣既而相謂曰彼之賢往見趙君使以我為事必困我乃相與追而殺之孫卿子曰古之賢人賤為布衣貧為匹夫然而非禮不進非義不受莊子, SBCK: 鹽鐵論}
