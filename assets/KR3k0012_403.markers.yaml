  - {type: variant, offset: 3934, length: 171, content: 察知佞臣若視俎上之脯指掌中之文風俗通曰賢堅也堅中廉外白虎通曰王者即位先封賢者憂民之急也故列土為疆非為諸侯張官設府非為卿大夫皆為民也越絕書曰子胥正而信范蠡智而明皆賢人也潛夫論曰南面之大務莫急於知賢異苑曰汝南陳仲躬與諸息姪就穎川荀季和父子于時德星為之藂太史奏曰五百里內有賢人集列女傳曰衛靈公與夫人夜坐聞車聲轔轔至闕而止過闕復有聲公問曰知此為誰夫人, SBCK: 歎}
