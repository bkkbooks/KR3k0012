  - {type: variant, offset: 4328, length: 5, content: 乂惟賢非后, SBCK: 言惠吴志曰鍾離牧字子幹㑹稽山隂人少居永興自墾稻田二十餘畒臨熟而縣民識之牧曰本以田荒故墾之耳遂以稻與縣人沈約宋書曰沈道䖍吴興武康人少仁愛好老易郡州府凡十二命皆不就有人竊其園菜者外還見之乃自逃隱􅀱竊者取足去後乃出唐書曰載􅀄中徐有功爲大理丞時酷吏來俊臣等構䧟無辜公卿震恐有功獨存平恕詔下大理者有功皆議岀之前後濟活數十百家吕氏春秋曰宋景公時熒惑在心問子韋子韋對曰禍在君可移宰相公曰宰相所與治國家曰移於民公曰民死誰與爲君曰移於歳公曰歳飢民必死子韋北面再拜曰君有至徳之言三天必賞君熒感果三徙舎賈􅁩書曰楚惠王食寒􅉁得水蛭王不欲以飲食傷人乃吞之令尹避席再拜而賀曰臣聞天道無親唯徳是輔是夜惠王之後溷而蛭出其乆病心膓之積皆愈又曰孫叔敖之爲兒也岀遊歸遂憂而}
