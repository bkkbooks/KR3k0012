  - {type: variant, offset: 4203, length: 2, content: 馬上, SBCK: 得雀闕子曰任公子冬羅鯉於山阿衆人皆以爲惑旣而鸇鶚撃黄雀觸公子羅者千萬數劉楨魯都賦曰長罼掩壑大羅􅀍睪􅆯毛詩􅀜睢曰兎􅆯后妃之化也􅀜睢之化行則莫不好德賢人衆多也肅肅兎􅆯㭬之丁丁﨣﨣武夫公侯干城􅀃文曰兎􅅈謂之􅆯郭璞注曰􅆯􅃒也犍爲舎人曰兎自作俓路張􅆯以捕之頋譚新言曰設􅆯於淵施網於崗欲民之愼亦如此也終無魚兎矣物}
