  - {type: variant, offset: 111, length: 0, content: '', WYG: 閑肆五兵因以順時取禽其禮將軍執晉皷師率執提旅率執鼙以教坐作進退徐疾之節璅語曰范獻子卜獵占之曰君子得􅷞小人遺冠獻子獵無所得而遺其冠潛夫論曰昔有司原氏獵於中野鹿東奔司原從而譟之西方之衆有逐狶}
