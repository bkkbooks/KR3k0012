  - {type: variant, offset: 3182, length: 1, content: 日, SBCK: 伯以弋戰國夫􅁗魏燕趙王之騏鴈也齊魯鄭者青首也鄒費郯邵者羅籠也其餘}
  - {type: variant, offset: 3182, length: 1, content: 日, krp: 伯以弋戰國夫秦魏燕趙王之騏鴈也齊魯鄭者青首也鄒費郯邵者羅籠也其餘}
  - {type: variant, offset: 3184, length: 9, content: 歸受辤辯訟多在獵所, SBCK: 足射也見鳥六􅀟唯王何取王􅀂以聖}
