  - {type: variant, offset: 2429, length: 0, content: '', SBCK: 明日㑹天疾風左右止侯侯不聽曰不可疾風失信吾不爲遂犯風徃而罷虞人也穆天子傳曰天子東田于澤至于重璧之䑓盛􅁎告病又曰天子獵于滲澤於}
  - {type: page-break, offset: 2429, content: '', id: KR3k0012_SBCK_832-2a}
  - {type: variant, offset: 2429, length: 0, content: '', krp: 明日㑹天疾風左右止侯侯不聽曰不可疾風失信吾不爲遂犯風徃而罷虞人也穆天子傳曰天子東田于澤至于重璧之䑓盛姬告病又曰天子獵于滲澤於}
  - {type: variant, offset: 2430, length: 0, content: '', SBCK: 得白狐􅀇貉焉以􅀕于河宗以將事於河宗􅀗比故用又曰天子大饗王公諸侯王勤七萃之士勤猶勞也于羽陵之上乃奏廣樂六師之人翔畋于曠原得􅀗無疆鳥獸絶羣六師之人大畋九}
  - {type: variant, offset: 2430, length: 0, content: '', krp: 得白狐玄貉焉以祭于河宗以將事於河宗獲比故用又曰天子大饗王公諸侯王勤七萃之士勤猶勞也于羽陵之上乃奏廣樂六師之人翔畋于曠原得獲無疆鳥獸絶羣六師之人大畋九}
  - {type: variant, offset: 2431, length: 3, content: 飲酒樂, SBCK: 乃収皮效物是載羽車國語曰晉趙簡子田于螻蝼晉君囿史黯聞之以犬侍于門黯晉大夫史墨時爲簡子史文田犬門君囿門也簡子見之曰何爲曰有所得犬欲試之兹囿兹山簡子曰何爲不告對曰君行臣不從不順言從法臣從君主將􅃴螻而麓不聞麓主君苑囿之官􅀓曰山林之木衡麓守之臣敢煩當日當日直日也言主將之君囿不煩麓以告君臣亦不敢煩主之直日自白也簡子乃還吕氏春秋曰齊有好獵者乆不得獸所以不得狗惡故也欲得良狗則家貧乃還耕則家富則求良狗則數得獸矣非獨獵事皆然春秋後語曰魏信陵君嘗與王共􅀶於是北境舉烽火傳言趙宼至王釋􅀶欲召大臣議之信陵君曰趙王獵耳非爲宼也復􅀶如故王恐心不在􅀶居有頃復從北方傳言趙王獵耳非爲宼也王大驚曰公子何以知之對曰臣之客有能􅊥趙王隂謀者趙王所爲客輒以報臣臣以此知之六韜曰文王畋于渭陽見吕尚坐弟以漁太公金匱曰紂常以六月獵於西土發人逐禽民諌曰}
