  - {type: variant, offset: 2218, length: 257, content: 曰所獲非熊非羆霸王之輔西伯果遇呂望釣于渭濱遂載歸號太公望又曰任安字少卿邑中人民俱出獵安常為人分麋鹿雉兔部署老小劇易眾人皆喜又曰今上為膠東王時韓嫣與上學書相愛及上為太子愈益親嫣善騎射上即位欲事代匈奴而嫣先習胡兵以故益尊貴嫣常與上臥起江都王入朝有詔得從入獵上林中天子車駕馬未行而先使嫣乘副車從數十百騎馳騖視獸江都王望見以為天子避從者伏謁道旁嫣驅不見既過江都王怒為皇太后泣請得歸國入宿衛比韓嫣太后由此嫌嫣戰國策曰魏文侯與虞人期獵是日飲酒樂天雨文侯將出左右曰今日飲酒樂天又雨君焉出文侯曰吾與虞人期獵雖樂豈可不壹會期哉乃往漢, WYG: 夢}
