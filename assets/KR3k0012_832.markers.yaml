  - {type: variant, offset: 112, length: 3, content: 受令焉, WYG: 聞司原之譟竟舉音而和之司原反覆追之乃得大狶喜以為瑞陸子曰欲水之清則勿涉欲草之茂則勿獵杜夷幽求曰獵者嗜肉不多於不獵及其凌岡巒赴谿嶺而有遺身之志語林曰夏少明在東國不知名聞裴逸民知人乃裹粮寄載入洛從之未至家少許見一人着黄皮袴褶乘馬將獵問曰裴逸民家逺近答曰君何以問夏曰聞其名知人故從㑹稽來投之裴曰身是逸民君明可更來明往逸民果知之用為西明門侯於此遂知名石勒别𫝊曰冬十一月大雪平地三尺勒主簿程朗諌勒不從出獵墜馬顧左右曰不從主簿之言而致墜馬賜朗絹百疋以旌忠亮續搜神記曰晉中興後譙郡周子文家在晉陵少時喜射獵嘗入山忽山岫間見一人長五丈許提弓箭箭鏑頭廣二尺許白如霜雪忽出喚曰阿䑕阿䑕子文小字子文不覺應曰諾此人牽弓滿鏑向子文子文便失魂厭伏}
