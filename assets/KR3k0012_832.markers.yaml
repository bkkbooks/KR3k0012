  - {type: variant, offset: 2437, length: 0, content: '', SBCK: 公出田逐獸碭入大澤迷不知所爲漁者送文公出澤漁者曰鴻鵠乃保大海之中厭而徙之小澤則必有矢矰之憂黿保於􅀷淵厭而出之淺渚則必有羅網之憂今君逐獸碭入至此何行之太逺也君歸國臣亦反漁所又曰晉文逐鹿而失之問農夫老者曰吾鹿何在老者以足指曰如是行徃公曰寡人問子子以足指何也老者振衣而起曰不意人君至此虎豹之居也厭閑而得近故人得之魚鼈之居也厭􅀷而得淺故人亦得之諸}
  - {type: page-break, offset: 2437, content: '', id: KR3k0012_SBCK_832-3a}
  - {type: variant, offset: 2437, length: 0, content: '', krp: 公出田逐獸碭入大澤迷不知所爲漁者送文公出澤漁者曰鴻鵠乃保大海之中厭而徙之小澤則必有矢矰之憂黿保於深淵厭而出之淺渚則必有羅網之憂今君逐獸碭入至此何行之太逺也君歸國臣亦反漁所又曰晉文逐鹿而失之問農夫老者曰吾鹿何在老者以足指曰如是行徃公曰寡人問子子以足指何也老者振衣而起曰不意人君至此虎豹之居也厭閑而得近故人得之魚鼈之居也厭深而得淺故人亦得之諸}
  - {type: variant, offset: 2438, length: 0, content: '', SBCK: 厭衆而亡其國唯鵲有巢唯鳩居之今君不歸人}
  - {type: variant, offset: 2438, length: 0, content: '', krp: 厭衆而亡其國唯鵲有巢唯鳩居之今君不歸人}
  - {type: variant, offset: 2439, length: 0, content: '', SBCK: 居之於是文公恐而歸新序曰晉文公畋於虢還見一老問曰虢亡何也對曰虢君斷則不能用人也文公輟畋而歸趙襄子曰其人安在公曰吾與來襄子曰君聽其言不用其身文公乃召賞之􅀃苑曰楚莊王獵大夫諌之王曰吾就獵求士也榛薄刺虎知其勇也􅅮犀􅀗兕知其勁也罷畋而分所得知其仁也由此道得三士可乎又曰晉平公有馳逐之車錯以羽芝㑹羣臣觀焉田差三過不頋白虎通曰王者諸侯所以田狩者何也爲田除害上以供宗廟下以簡集土衆也蔡邕月令章句曰季秋之月天子乃教于田獵閑肆五兵因以順時取禽其礼將軍執晉鼔師率執提旅率執鼙以教坐作進退徐疾之節璅語曰范獻子卜獵占之曰君子得黿小人遺㓂獻子獵無所得而遺其冠潜夫論曰昔有司原氏獵於中野鹿東奔司原從而譟之西方之衆有逐狶者聞司原之譟竟舉音而和之司原反覆追之乃得大狶喜以爲瑞陸子曰欲水之清則勿渉欲草之茂則勿獵杜夷幽求曰獵者嗜肉不多於不獵及其陵岡峦赴溪嶺而有遺身之志語林曰夏少明在東國不知名聞裴逸民知人乃裹糧􅀉載入洛從之未至家少許見一人着黃皮袴褶乗馬將獵問曰裴逸民家逺近荅曰君何以問夏曰聞其名知人故從㑹稽來投之裴曰身是逸民君明可更來明徃逸民果知之用爲西明門候於此遂知名也石勒別傳曰冬十一月大雪平地三尺勒主簿程朗諌勒不從}
  - {type: page-break, offset: 2439, content: '', id: KR3k0012_SBCK_832-3b}
