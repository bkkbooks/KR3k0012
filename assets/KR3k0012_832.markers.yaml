  - {type: variant, offset: 4412, length: 0, content: '', SBCK: 而任小人猶欲捕麋鹿而張兎􅆯不能撃麋鹿猶小人不能任大事罦韓詩曰有兎爰爰雉離于罦爾雅曰罬謂之罦罦覆車也今之翻車也有兩轅巾施骨鋪鳥展轉相解廣異語􅀃文曰罦覆車也罿韓詩曰有兔爰爰雉離于罿薛君注曰張羅車上曰罿也爾雅四繴謂之罿罿罬也郭璞曰今翻車也有兩轅中施羅㭪鳥罻􅀃文曰罻捕鳥也禮記王制曰鳩化爲鷹然後設罻羅罼禮記月令曰季春罼醫無出國門鄭􅀇曰網小柄長謂之罼醫射者鳥息隱蔡邕月令章句曰奄飛禽曰罼􅀃文曰罼罔也率捕鳥罼象絲網上下其革柄也罞爾雅曰縻􅅈謂之罞郭璞注曰冐其頭也犍爲舎人曰縻有難制張罼也羉爾雅曰􅇾􅅈謂之羉羉幕也犍為舎人曰彘剛惡齕人故張網而羅之也磻纂文曰磻射石也繳列仙傳曰赤將子者黄帝時人也不食五榖而食百草華至堯時爲木工能隨風雨上下時市中賣繳亦謂之繳父淮南子曰堯使羿繳大風於青丘之野大風鷙鳥也青丘東方也環濟典略曰繳綸也綸于前望飛鳥而射之夢書曰夢横繳欲舉薦}
