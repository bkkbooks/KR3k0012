  - {type: variant, offset: 2496, length: 0, content: '', SBCK: 入山忽山岫間見一人長五丈許提弓箭箭鏑頭廣二尺許白如霜雪忽出喚曰阿䑕阿䑕子文小字子文不覺應曰諾此人牽弓滿鏑向子文子文便失䰟厭伏又曰呉末臨海人入山射獵爲舎住}
