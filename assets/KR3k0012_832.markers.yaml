  - {type: variant, offset: 3750, length: 2, content: 若搏, SBCK: 鳥以數百目視子子以二目御之子謹周子廪田子方曰善子加之弋我家之國鄭長者聞之曰子方知欲爲廪而未得所以爲廪夫虚無見者􅅒也一日齊宣王問弋於唐易子曰弋者奚貴唐易子曰在於謹廪王曰何謂謹廪對曰鳥以數十目視人人以二目視鳥柰何其不謹廪也故曰在於謹廪然則爲天下何以爲此廪今人主以二目視一國一國以萬目視人主將何以自爲謹廪乎又曰衛人有佐弋者鳥至因先以捲麾之鳥驚而不可得也又曰夫弩弱而矰髙者激於風也身不肖而令行者得助於衆也韓子曰齊宣王問匡倩曰儒者弋乎匡倩對曰不曰何也弋者從下害於上者也是從下傷君也儒者以爲害義故不弋淮南子曰蒲且子連鳥於百仭之上弓良也蒲且子楚人善射弋劉向別録曰有行過江上弋鴈賦行弋賦弋雌得雄賦法言曰鴻飛􅁳􅁳弋者何篡篡􅂑也太􅀇經曰弋彼三飛終日不歸稽康與山濤書曰弋釣草野而吏卒守}
