  - {type: variant, offset: 755, length: 238, content: 殺則下大綏諸侯殺則下小綏綏當為綏綏有虞氏之旌旗也大夫殺則止佐車佐車止則百姓田獵佐車驅送之車獺祭魚然後虞人入澤梁豺祭獸然後田獵鳩化為鷹然後設罻羅草木零落然後入山林昆蟲未蟄不以火田取物必順時候不麛卵不殺胎不殃夭不覆巢覆敗左傳文公上曰宋華御事逆楚子勞且聽命時楚欲誘呼宋共戰御事華元父遂道以田孟諸孟諸宋大藪也在梁國睢陽縣東北宋公為右盂鄭伯為右盂盂田獵陳名期思公復遂為右司馬復遂楚期思邑公今弋陽期思縣子朱及文之無畏為左司馬將獵張兩甄故置二左司馬然則右司馬一人當中央命夙駕載燧燧取火然者也, SBCK: 乎}
