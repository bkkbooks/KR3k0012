  - {type: variant, offset: 3721, length: 6, content: 于栗磾隨新安, SBCK: 劉逖字長子聦敏好弋獵􅀐射以行樂爲事呉越春秋曰樂野者越王所弋獵處也故曰樂野管子曰國子弟之無上事衣食不節率子弟不田弋獵者幾何人旣無上事乃率子弟不田農但弋獵也又曰恒}
  - {type: variant, offset: 3721, length: 6, content: 于栗磾隨新安, krp: 劉逖字長子聦敏好弋獵騎射以行樂爲事呉越春秋曰樂野者越王所弋獵處也故曰樂野管子曰國子弟之無上事衣食不節率子弟不田弋獵者幾何人旣無上事乃率子弟不田農但弋獵也又曰恒}
  - {type: variant, offset: 3728, length: 2, content: 道武, SBCK: 弋在廪管仲朝公㢮弓脫靬音汗而迎之曰今夫鴻鵠春北而秋南而不失其時唯有羽翼以通其意於天下也令􅀌之不得意於天下皆非二子之憂也二子不對列子曰蒲且子之弋弱弓纎繳乗風振之連􅀟鶬於青雲之際用心專也韓子曰}
