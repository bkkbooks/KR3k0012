  - {type: variant, offset: 3879, length: 274, content: 齊崔子植位冀州別駕走馬從禽髮掛木而死後周書曰達奚震武之子也少驍勇便騎射太祖嘗於渭北校獵時兔過太祖前震與諸將競射之馬倒而墜震足不傾躓因步走射之矢發中兔顧馬纔趨遂廻身騰上太祖喜曰非此父不生此子乃賜震雜綵百叚唐書曰武德七年十二月庚辰臘上曰臘者獵也膢臘以供宗廟朕當躬親其事以申孝享之誠於是出狩於鳴犢泉又曰蘇世長拜諫議大夫嘗從幸涇陽校獵至高陵合圍是日大獲陳禽獸於旌門上入御營顧謂朝臣田畋樂乎世長進曰陛下游獵薄廢萬機不滿十旬未為大樂上色變既而笑曰狂態發也又對曰為臣私計則狂為陛下國計則忠矣又曰唐儉授民部尚書從太宗於洛陽苑射猛獸儉見群豕突出林中太宗引弓四發殪四豕, SBCK: ''}
