  - {type: variant, offset: 2497, length: 0, content: '', SBCK: 中有一人長一丈着黃衣白帶來謂射人曰我有讎尅明日當戰君可見助當厚相報射人曰自欲􅂇君何以相報荅曰明日食時君可岀溪邊敵}
  - {type: variant, offset: 2497, length: 0, content: '', krp: 中有一人長一丈着黃衣白帶來謂射人曰我有讎尅明日當戰君可見助當厚相報射人曰自欲助君何以相報荅曰明日食時君可岀溪邊敵}
  - {type: variant, offset: 2498, length: 0, content: '', SBCK: 北來我南徃應白帶者我黄帶者彼射人許之明岀果聞岸北有聲狀如風雨草木四靡視南亦尔唯見二大虵長十餘丈於溪中相遇白虵勢弱人即引弩射之黄虵即死日將暮復見前人來辝謝云住此}
  - {type: variant, offset: 2498, length: 0, content: '', krp: 北來我南徃應白帶者我黄帶者彼射人許之明岀果聞岸北有聲狀如風雨草木四靡視南亦尔唯見二大虵長十餘丈於溪中相遇白虵勢弱人即引弩射之黄虵即死日將暮復見前人來辝謝云住此}
  - {type: variant, offset: 2499, length: 1, content: 騎, SBCK: 年獵明年愼勿復來來必爲禍射人曰善遂停一年獵所􅀗甚多家致巨富數年後憶先山多肉忘前言復更徃獵見先白帶人語之言我語君勿復更來不能見用讎子已大今必報君非我所知射人聞之甚怖便欲走乃見三烏衣人皆長八尺俱張口向之射人即死異苑曰慕容皝}
