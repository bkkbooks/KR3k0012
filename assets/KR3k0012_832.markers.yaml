  - {type: variant, offset: 19, length: 1, content: 前, WYG: 也得獸今吾田也得人又曰梁君出獵見白鴈羣下下車彀弩欲射之道有行者不止白鴈羣駭梁君怒欲射行者其御公孫龍撫轡曰今主君以白鴈故而欲射殺人無異於虎狼梁君援其手與歸呼萬嵗曰樂哉今日獵也人皆得獸吾獨得善言尸子曰宓羲氏之世天下多獸故敎民以獵也韓子曰孟孫獵得麑使西秦巴持之其母隨而呼之西秦巴不忍而與其母孟孫適至求麑對曰予不忍而與其母孟孫大怒逐之居三月復召為其子傅曰夫子不忍於麑且忍吾子乎又曰魏文侯與虞人}
