  - {type: punctuation, offset: 669, content: 「, id: KR3k0012_CHANT_832-bkkpn191}
  - {type: variant, offset: 670, length: 0, content: '', WYG: 子弟之無上事衣食不節率子弟不田弋獵者幾何人既無上事乃率子弟不田農但弋獵也又曰桓公弋在廪管仲朝公㢮弓脫靬音汗而迎之曰今夫鴻鵠春北而秋南而不失其意惟有羽翼以適其意於天下者也今孤之不得意於天下皆非二子之憂也二子不對列子曰蒲旦子之弋弱弓纎繳乘風振之連雙鶬於青雲之際用心專動手均也韓子曰田子方問唐易鞠曰弋者何慎對曰鳥以數百目視子子以二目御之子謹周子廪田子方曰善子加之弋我加之國鄭張者聞之曰子方知欲為廪而未得所以為廪夫虛無見者廪也一日齊宣王問弋於唐易子曰弋者奚貴唐易子曰在於謹廪王曰何謹廪對曰鳥以數十目視人人以二目視鳥奈何其不謹廪也故曰在於謹廪然則為天下何異為此廪今人主以二目視一國一國以萬目視人主將何以自為廩乎又曰衛人有佐弋者鳥至因先以捲麾之鳥驚而不可得也又曰夫弩弱而矰高者激於風也身不肖而令行者得助於衆也韓子曰齊宣王問匡倩曰儒者弋乎匡倩對曰否也弋者從下害於上者也是從下傷}
  - {type: page-break, offset: 670, content: '', id: KR3k0012_WYG_832-10b, image: WYG0900/WYG0900-0365d.png}
  - {type: page-break, offset: 670, content: '', id: KR3k0012_WYG_832-11a, image: WYG0900/WYG0900-0366a.png}
  - {type: page-break, offset: 670, content: '', id: KR3k0012_WYG_832-11b, image: WYG0900/WYG0900-0366b.png}
  - {type: variant, offset: 671, length: 0, content: '', WYG: 也儒者以為害義故不弋淮南子曰蒲旦子連鳥於百仭之上弓良也蒲旦子楚人善射弋劉白别録曰有行過江上弋鴈賦行弋賦雌得雄賦法言曰鴻飛𠖇𠖇弋者何簒簒取也太𤣥經曰弋彼三飛終日不歸稽康與山濤書曰弋釣草野而吏卒守之不得妄動二不可也羅周禮夏官上羅氏曰羅氏掌羅烏鳥烏謂卑居鵲之屬蜡則作羅襦襦細密之羅襦讀為繻有衣襦之繻也仲}
  - {type: page-break, offset: 671, content: '', id: KR3k0012_WYG_832-12a, image: WYG0900/WYG0900-0366c.png}
  - {type: variant, offset: 672, length: 1, content: 田, WYG: 羅春鳥獻鳩以養國老春鳥蟄而始出者若今南郡黄雀之屬是時鷹化為鳩鳩與春鳥變舊為新宜以養老助生氣耳毛詩國風曰有兎爰爰雉離于羅鳥網為羅又小雅曰鴛鴦于飛畢之羅之爾雅曰鳥罟音古謂之羅羅絡也國語曰里革諌魯宣公曰鳥獸孕水䖝成獸虞於是乎禁􅆯羅列仙𫝊曰李仲甫夜卧床上或為鴞鳥跱架候北風當飛渡南海山上有羅得鴟視之仲甫也向羅者笑王子年拾遺記曰晉文公焚林以求介子推有白鵶繞烟而噪或集介子推之側火}
  - {type: page-break, offset: 672, content: '', id: KR3k0012_WYG_832-12b, image: WYG0900/WYG0900-0366d.png}
  - {type: page-break, offset: 672, content: '', id: KR3k0012_WYG_832-13a, image: WYG0900/WYG0900-0367a.png}
  - {type: variant, offset: 674, length: 1, content: 圍, WYG: 能焚晉人嘉之於山數百里不復設羅網幽明録曰有一傖士行反小兒放牛野中伴輩數人見一鬼依諸叢草間處處設網欲以捕人設網後未竟傖小兒竊取前網仍以罨之即縳得鬼文子曰有鳥將來張羅而待之得鳥者羅之一目今為一目之羅無得鳥焉鶡冠子曰一目之羅不可以得雀闕子曰任公子冬羅鯉於山阿衆人皆以為惑既而鸇鶚擊黄雀觸公子羅者千萬數劉棋魯都賦曰長罼掩壑大羅被}
  - {type: page-break, offset: 674, content: '', id: KR3k0012_WYG_832-13b, image: WYG0900/WYG0900-0367b.png}
