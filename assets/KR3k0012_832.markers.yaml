  - {type: variant, offset: 992, length: 603, content: 也又襄四年曰昔周辛甲之為太史也命百官官箴王闕辛甲周武王大史闕過也使百官各為箴辭戒王過於虞人之箴虞人掌田獵曰芒芒禹跡畫為九州芒芒遠貌畫分也經啟九道啟開九州之道民有寢廟獸有茂草各有攸處德用不擾人神各有所歸故得不亂在帝后羿冒于原獸冒貪也忘其國恤而思其麀牡言但念獸武不可重重猶數也用不恢于夏家羿以好武雖有家而不能恢大之獸臣司原敢告僕夫獸臣虞人僕夫不取斥尊虞箴如是可不懲乎於是晉侯好田故魏絳及之及后羿事又襄十七年曰衛孫蒯田于曹隧越竟而獵孫蒯林父之子飲馬于重丘重丘曹邑毀其瓶重丘人閉門而訽之訽罵也曰親逐其君爾父為厲厲惡鬼林父逐君在十四年是之不憂而何以田為又襄三十年曰鄭豊卷將祭請田焉弗許田獵也田唯君用鮮鮮野獸眾給而已眾臣祭以芻豢為足又昭公曰齊侯田于沛言疾愈行獵沛澤名招虞人以弓不進虞人掌山澤之官公使執之辭曰昔我先君之田旃以招大夫弓以招士皮冠以招虞人臣不見皮冠故不敢進乃舍之仲尼曰守道不如守官君招當往道之常也非物不進官之制也君子韙之韙是也又定公上曰魏獻役於韓簡子及原壽過簡子韓起孫不信也原壽過周大夫而田於大陸焚焉禹貢大陸在鉅鹿地嫌絕遠疑此田在汲郡吳澤荒蕪之地大田并見燒也爾雅廣平曰陸還卒於甯甯今修武縣近澤范獻子去其柏槨以其未復命而田也范獻子代魏子為政去其柏槨示貶之又哀公下曰西狩於大野叔孫氏之車子鉏商獲麟大野在高平鉅野縣東北大澤是也車子微者鉏商之名以為不祥以賜虞人時所未嘗見故怪虞人掌山澤之官仲尼觀之曰麟也然後取之言魯史, WYG: ''}
