  - {type: variant, offset: 543, length: 6, content: 田僕掌馭田路, WYG: 桓南郡好獵騁良馬馳擊若飛䨥飄所指行陣不整麏兎騰逸叅佐無不被撃呉地記曰長洲在姑蘇南太湖北岸闔閭所遊獵處也呉主遣徐詳至魏魏太祖謂詳曰孤比老願濟横江之津與孫將軍遊姑蘇之上獵長洲之苑吾志足矣詳對曰若越横江而遊姑蘇是踵亡秦而躡夫差恐天下之事去矣太祖大笑曰徐生無乃逆詐乎鄴中記曰石虎少好遊獵後體壯大不復乘馬作獵輦二十人擔之如今之步輦上安徘徊華葢當坐處安轉關牀若射鳥獸直有所向關隨身而轉虎善射矢不虛發襄陽耆舊𫝊曰楚王好遊獵之事揚鑣馳逐乎華容之下射鴻乎夏水之濵弋說文曰矰弋射矢也毛詩緇衣女曰鷄鳴士曰昧旦子興視夜明星有爛將翺將翔弋鳬與鴈詩義問曰}
