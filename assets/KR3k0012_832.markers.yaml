  - {type: variant, offset: 3168, length: 0, content: '', SBCK: 後體壯大不復乗馬作獵輦二十人擔之如今之歩輦上安徘徊曲蓋當坐處安轉􅀜牀􅀂射鳥獸直有所向􅀜隨身}
  - {type: page-break, offset: 3168, content: '', id: KR3k0012_SBCK_832-5b}
  - {type: variant, offset: 3168, length: 0, content: '', krp: 後體壯大不復乗馬作獵輦二十人擔之如今之歩輦上安徘徊曲蓋當坐處安轉關牀若射鳥獸直有所向關隨身}
  - {type: variant, offset: 3169, length: 2, content: 山郡, SBCK: 轉虎善射矢不虚發矣襄陽􅂄舊記曰楚王好遊獵之事揚鑣馳逐乎華容之下射鴻乎夏水之濵弋􅀃文曰矰弋射矢也毛詩緇衣女曰雞鳴曰將翺將翔弋鳬與鴈詩義問曰以繳繫矢而射弋言加之與子宜之又大雅桑柔曰嗟爾明友予豈不知而作如彼飛蟲時亦弋􅀗禮記月令曰季春之月罼弋}
  - {type: variant, offset: 3169, length: 2, content: 山郡, krp: 轉虎善射矢不虚發矣襄陽耆舊記曰楚王好遊獵之事揚鑣馳逐乎華容之下射鴻乎夏水之濵弋說文曰矰弋射矢也毛詩緇衣女曰雞鳴曰將翺將翔弋鳬與鴈詩義問曰以繳繫矢而射弋言加之與子宜之又大雅桑柔曰嗟爾明友予豈不知而作如彼飛蟲時亦弋獲禮記月令曰季春之月罼弋}
  - {type: variant, offset: 3172, length: 8, content: 事僧達肆意馳騁或, SBCK: 出九門蔡邕章句曰繳射日弋左傳襄公上曰曹伯陽好田弋曹鄙人公孫強好弋􅀗白鴈而獻之且言田弋之􅀃論語􅄒而曰子曰弋不射􅀫春秋後語曰楚頃襄王時人有好以弱弓微繳加歸鴈之上者王聞之召而問焉對曰外臣之好射騏鴈羅籠小矢之發也何足爲大王道哉且楚王之大大王之賢所弋非直此也昔者}
  - {type: page-break, offset: 3172, content: '', id: KR3k0012_SBCK_832-6a}
  - {type: variant, offset: 3172, length: 8, content: 事僧達肆意馳騁或, krp: 出九門蔡邕章句曰繳射日弋左傳襄公上曰曹伯陽好田弋曹鄙人公孫強好弋獲白鴈而獻之且言田弋之說論語𫐠而曰子曰弋不射宿春秋後語曰楚頃襄王時人有好以弱弓微繳加歸鴈之上者王聞之召而問焉對曰外臣之好射騏鴈羅籠小矢之發也何足爲大王道哉且楚王之大大王之賢所弋非直此也昔者}
