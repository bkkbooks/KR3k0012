  - {type: variant, offset: 152, length: 355, content: 追寇賊也竭作盡行又夏官大司馬之職曰中春遂以蒐田有司表貉誓民鼓遂圍禁火弊獻禽以祭社春田為蒐有司大司徒也掌大田役治徒庶之政令表貉立表而貉祭也誓氏誓以犯田法之罰也中夏遂以苗田如蒐之灋車弊獻禽以享礿夏田為苗釋取不孕任者若治苗去不秀實者云車弊驅獸之車止中秋遂以獮田如蒐田之法羅弊致禽以祀祊秋田為獮獮殺也羅弊罔止也秋田主用罔中殺者多也皆殺而罔止中冬遂以狩田以旌為左右和之門群吏各帥其車徒以敘和出左右陳車徒有司平之旗車卒間以分地前後有屯百步有司巡其前後險野人為主易野車為主冬田為野言守取之無所擇也軍門曰和今謂之壘門立兩旌以為之敘和出用次第出和門也旗軍吏所載分地調其部曲踈數前後有屯百步車徒異群相去之數也險野人為主人居前易野車為主車居前既陳乃設驅逆之車有司表貉于陳前驅驅出禽獸使趨田者也逆逆要不得令走設此車者田僕也中軍以鼙令鼓, SBCK: ''}
