  - {type: variant, offset: 994, length: 1426, content: 襄四年曰昔周辛甲之為太史也命百官官箴王闕辛甲周武王大史闕過也使百官各為箴辭戒王過於虞人之箴虞人掌田獵曰芒芒禹跡畫為九州芒芒遠貌畫分也經啟九道啟開九州之道民有寢廟獸有茂草各有攸處德用不擾人神各有所歸故得不亂在帝后羿冒于原獸冒貪也忘其國恤而思其麀牡言但念獸武不可重重猶數也用不恢于夏家羿以好武雖有家而不能恢大之獸臣司原敢告僕夫獸臣虞人僕夫不取斥尊虞箴如是可不懲乎於是晉侯好田故魏絳及之及后羿事又襄十七年曰衛孫蒯田于曹隧越竟而獵孫蒯林父之子飲馬于重丘重丘曹邑毀其瓶重丘人閉門而訽之訽罵也曰親逐其君爾父為厲厲惡鬼林父逐君在十四年是之不憂而何以田為又襄三十年曰鄭豊卷將祭請田焉弗許田獵也田唯君用鮮鮮野獸眾給而已眾臣祭以芻豢為足又昭公曰齊侯田于沛言疾愈行獵沛澤名招虞人以弓不進虞人掌山澤之官公使執之辭曰昔我先君之田旃以招大夫弓以招士皮冠以招虞人臣不見皮冠故不敢進乃舍之仲尼曰守道不如守官君招當往道之常也非物不進官之制也君子韙之韙是也又定公上曰魏獻役於韓簡子及原壽過簡子韓起孫不信也原壽過周大夫而田於大陸焚焉禹貢大陸在鉅鹿地嫌絕遠疑此田在汲郡吳澤荒蕪之地大田并見燒也爾雅廣平曰陸還卒於甯甯今修武縣近澤范獻子去其柏槨以其未復命而田也范獻子代魏子為政去其柏槨示貶之又哀公下曰西狩於大野叔孫氏之車子鉏商獲麟大野在高平鉅野縣東北大澤是也車子微者鉏商之名以為不祥以賜虞人時所未嘗見故怪虞人掌山澤之官仲尼觀之曰麟也然後取之言魯史所以得書獲麟之也穀梁傳昭公曰秋獀于鴻正也獀狩以習用戎事禮之大者也艾蘭以為防置旃以為轅門禽雖多天子取三十焉其餘射於宮射而中田不得禽則得禽田得禽射而不中則不得禽以是知貴仁義而賤勇力也毛詩鵲巢曰騶虞鵲巢之應也鵲巢之化行人倫既正朝廷既治天下純被文王之化則庶類蕃殖蒐田以時仁如騶虞則王道成也彼茁者葭茁出也葭蘆也記蘆始出者著春田之早晚也一發五豝虞人翼五豝以待公之發于嗟乎騶虞騶虞義獸有至信之德則應彼茁者蓬蓬草一發五豵豕一歲曰從于嗟乎騶虞又緇衣叔于田曰叔于田巷無居人不如叔也洵美且仁又雞鳴曰還刺荒也襄公好田獵從禽獸而無厭國人化之遂成風俗習於田獵謂之賢閑於馳遂謂之好焉子之還兮遭我乎峱之間兮並驅從兩肩兮揖我謂我儇兮從逐也獸三歲曰肩儇利也又雞鳴盧令曰盧令刺荒也襄公好田獵畢弋不脩民事百姓苦之故陳古以風焉盧令令其人美且仁又嘉魚曰吉日美宣王田也吉日維戊既伯既禱田車既好四牡孔阜升彼大阜從其群醜吉日庚午既差我馬獸之所同麀鹿麌麌漆沮之從天子之所周易曰比卦王用三驅失前禽也尚書五子之歌曰太康尸位以逸豫滅厥德黎民咸貳乃盤遊無度畋于有洛之表十旬弗反尚書歸藏曰穆王獵于戈之墅韓詩內傳曰春曰畋夏曰獀秋曰獀冬曰狩天子抗大綏諸侯小綏辟小獻禽其下天子親射之旍門夫田獵因以講道習武簡兵也爾雅曰春獵為蒐郭璞注曰搜索取不任者夏獵為苗為苗稼除害也秋獵為獮鮮少者從殺氣也冬獵為狩得獸取之無所擇宵田為獠管子曰獠獵畢弋今江東亦呼獵為獠音為遼或曰即今夜獵載鑪縣也火田為狩放火燒草獵亦為狩史記曰西伯將畋卜之曰所獲非熊非羆霸王之輔西伯果遇呂望釣于渭濱遂載歸號太公望又曰任安字少卿邑中人民俱出獵安常為人分麋鹿雉兔部署老小劇易眾人皆喜又曰今上為膠東王時韓嫣與上學書相愛及上為太子愈益親嫣善騎射上即位欲事代匈奴而嫣先習胡兵以故益尊貴嫣常與上臥起江都王入朝有詔得從入獵上林中天子車駕馬未行而先使嫣乘副車從數十百騎馳騖視獸江都王望見以為天子避從者伏謁道旁嫣驅不見既過江都王怒為皇太后泣請得歸國入宿衛比韓嫣太后由此嫌嫣戰國策, SBCK: ''}
