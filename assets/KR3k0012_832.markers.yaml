  - {type: variant, offset: 676, length: 0, content: '', WYG: 罝毛詩關雎曰兎罝后妃之化也關雎之化行則莫不好徳賢人衆多也肅肅兎􅆯㭬之丁丁﨣﨣武夫公侯干城爾雅曰兎罟謂之罝郭璞注曰罝遮也犍為舍人曰兎自作徑路張罝以捕之顧譚新言曰設罝於淵施網於岡欲民之慎亦如此也終無魚兎矣物理論曰夫欲定天下而任小人猶欲捕麋鹿而張兎罝不能擊麋鹿猶小人不能任}
