  - {type: variant, offset: 12, length: 5, content: 鄉師凡四時, WYG: 龍下射彼使無驚吾鳥龍曰昔吾闕為踐土之盟不戮一人吾今一朝田而必曰為闕人將故救之簡子愀焉曰不愛其身以活人者可無闕乎環車輟田曰人}
