  - {type: variant, offset: 4438, length: 440, content: 樂也六合大同萬方咸慶張樂高宴上下歡洽三樂也今日王可從禽明日當飲讌耳又曰高宗狩于陸渾縣六日止飛山顛高宗親御弧矢獵四鹿及兔數十頭晚次御營望見太官烹宰欲供百官之膳因問侍中許圉師曰朕目擊彼羊在於格下見其無罪就戮非無憫惻之情今欲以死獸易之可乎圉師對曰昔者宋文侯見人欲將牛釁鍾因曰吾觀此牛觳觫似無罪而就死也乃不釁鍾陛下取已死之鹿代欲刲之羊則堯舜之用心地遂釋其羊不殺九日又於山南布圍大順府果毅王萬興以輒先促圍集眾欲斬之上謂侍臣曰軍令有犯罪在不赦恐外人謂我翫好畋獵輕斷人命又以其從征遼有功特令放免又曰高宗出獵在路遇雨因問諫議大夫谷郍律曰油衣若為不漏對曰能瓦為之必不漏矣上大悅因此不復出獵又曰高宗駕幸自九成宮還宮仍西狩校習自麟遊西北遶歧梁歷普潤止雍為兩圍殿中侍御史杜易簡賈言忠監圍山阜懸危杖策不得蹔停凡五日而合劾奏將軍劉玄意黃河上等斷圍玄意抵罪黃河上圍曰軍容齊整詔特原之又曰吳王恪好畋獵損居人田苗侍御史柳範奏彈之上因謂侍御臣曰權萬紀事我兒不能匡正其罪合死範進曰房玄齡事陛下猶不能諫止畋獵豈可獨非萬紀, SBCK: ''}
