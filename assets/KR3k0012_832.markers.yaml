  - {type: variant, offset: 3989, length: 889, content: 月庚辰臘上曰臘者獵也膢臘以供宗廟朕當躬親其事以申孝享之誠於是出狩於鳴犢泉又曰蘇世長拜諫議大夫嘗從幸涇陽校獵至高陵合圍是日大獲陳禽獸於旌門上入御營顧謂朝臣田畋樂乎世長進曰陛下游獵薄廢萬機不滿十旬未為大樂上色變既而笑曰狂態發也又對曰為臣私計則狂為陛下國計則忠矣又曰唐儉授民部尚書從太宗於洛陽苑射猛獸儉見群豕突出林中太宗引弓四發殪四豕有一雄彘及馬鐙儉懼將搏之太宗拔劍斷豕頭笑曰天策長史不見上將擊賊耶何懼之甚儉對曰漢高祖以馬上得之不可以馬上理之陛下以神武定四方豈復逞雄心於一豕太宗納之因罷獵又曰貞觀十四年太宗欲親幸同州遊獵櫟陽縣丞劉仁軌上䟽曰四時蒐狩前王恒典事有沿革未必因循今年甘雨應時秋稼甚盛盡力收穫月半猶未畢功貧家無力禾下始擬種麥直據尋常料喚田家以有所妨今既祗供頓事兼之修理橋道縱謂大簡動費一二萬工百姓收歛實為狼狽臣願陛下少留萬乘之尊垂聽一介之說退延旬日收刈揔了則盡閑暇家得康寧鑾駕徐動公私交泰上降璽書勞之又曰太宗謂高昌王麴文泰曰丈夫在生樂事有三天下太平家給人足一樂也草淺獸肥以禮田狩弓不虛發箭不妄中二樂也六合大同萬方咸慶張樂高宴上下歡洽三樂也今日王可從禽明日當飲讌耳又曰高宗狩于陸渾縣六日止飛山顛高宗親御弧矢獵四鹿及兔數十頭晚次御營望見太官烹宰欲供百官之膳因問侍中許圉師曰朕目擊彼羊在於格下見其無罪就戮非無憫惻之情今欲以死獸易之可乎圉師對曰昔者宋文侯見人欲將牛釁鍾因曰吾觀此牛觳觫似無罪而就死也乃不釁鍾陛下取已死之鹿代欲刲之羊則堯舜之用心地遂釋其羊不殺九日又於山南布圍大順府果毅王萬興以輒先促圍集眾欲斬之上謂侍臣曰軍令有犯罪在不赦恐外人謂我翫好畋獵輕斷人命又以其從征遼有功特令放免又曰高宗出獵在路遇雨因問諫議大夫谷郍律曰油衣若為不漏對曰能瓦為之必不漏矣上大悅因此不復出獵又曰高宗駕幸自九成宮還宮仍西狩校習自麟遊西北遶歧梁歷普潤止雍為兩圍殿中侍御史杜易簡賈言忠監圍山阜懸危杖策不得蹔停凡五日而合劾奏將軍劉玄意黃河上等斷圍玄意抵罪黃河上圍曰軍容齊整詔特原之又曰吳王恪好畋獵損居人田苗侍御史柳範奏彈之上因謂侍御臣曰權萬紀事我兒不能匡正其罪合死範進曰房玄齡事陛下猶不能諫止畋獵豈可獨非萬紀, WYG: ''}
