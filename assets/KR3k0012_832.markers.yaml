  - {type: variant, offset: 3284, length: 298, content: 位望隆重人所重瞻不宜然景宗謂所親曰我昔在鄉里騎快馬如龍與年少輩數十騎拍弓弦作霹靂聲箭如餓鴟叫平澤中逐麞數助射之渴飲其血饑食其胃甜如甘露漿覺耳後風生鼻頭出火此樂使人忘死不知老之將至今來楊州作貴人動轉不得路行開車幔小人輒言不可閉置車中如三日新婦此邑邑使人無氣南史曰宋臧熹常與溧陽令阮崇獵遇猛獸突圍獵徒並散熹射之應弦而倒崔鴻十六國春秋後趙錄曰石虎遣司農中郎將費霸帥工匠四千於東平罡山造獵車千乘轅長三丈高丈八尺格虎車四十乘立級行樓二層於其上自靈昌津南至滎陽東極陽都而還使御史監司其中禽獸有犯者罪至大辟又曰石虎命太子宣行祈山川遊獵藪澤乘大輅羽葆華蓋建天子旌旂十有六軍戎卒八萬出金明馳逐終夕所在陳列行宮四面各, SBCK: 榮爵嬰心唯}
