  - {type: variant, offset: 1627, length: 489, content: 艾蘭以為防置旃以為轅門禽雖多天子取三十焉其餘射於宮射而中田不得禽則得禽田得禽射而不中則不得禽以是知貴仁義而賤勇力也毛詩鵲巢曰騶虞鵲巢之應也鵲巢之化行人倫既正朝廷既治天下純被文王之化則庶類蕃殖蒐田以時仁如騶虞則王道成也彼茁者葭茁出也葭蘆也記蘆始出者著春田之早晚也一發五豝虞人翼五豝以待公之發于嗟乎騶虞騶虞義獸有至信之德則應彼茁者蓬蓬草一發五豵豕一歲曰從于嗟乎騶虞又緇衣叔于田曰叔于田巷無居人不如叔也洵美且仁又雞鳴曰還刺荒也襄公好田獵從禽獸而無厭國人化之遂成風俗習於田獵謂之賢閑於馳遂謂之好焉子之還兮遭我乎峱之間兮並驅從兩肩兮揖我謂我儇兮從逐也獸三歲曰肩儇利也又雞鳴盧令曰盧令刺荒也襄公好田獵畢弋不脩民事百姓苦之故陳古以風焉盧令令其人美且仁又嘉魚曰吉日美宣王田也吉日維戊既伯既禱田車既好四牡孔阜升彼大阜從其群醜吉日庚午既差我馬獸之所同麀鹿麌麌漆沮之從天子之所周易曰比卦王用三驅失前禽也尚書五子之歌曰太康尸位以逸豫滅厥德黎民咸貳乃盤遊無度畋于有洛之表十旬弗反尚書歸藏曰穆王獵于戈之墅韓詩內傳曰春曰畋夏曰獀秋曰獀冬曰狩天子抗大綏諸侯小綏辟小獻禽其下天子親射之旍門夫田獵因以講道習武簡兵也, WYG: 罞}
