  - {type: variant, offset: 689, length: 6, content: 時重傷其類又, WYG: 罦罦覆車也今之翻車也有兩轅中施胄以捕鳥展轉相觧廣異語說文曰罦覆車也罿韓詩曰有兎爰爰雉離于罿薛君注曰張羅車上曰罿也爾雅曰繴謂之罿罿罬也郭璞曰今翻車也有兩轅中施􅇢以捕鳥罻說文曰罻捕鳥网也禮記}
