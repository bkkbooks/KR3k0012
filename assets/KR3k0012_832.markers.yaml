  - {type: variant, offset: 639, length: 1, content: 能, WYG: 好以弱弓微繳加歸鴈之上者王聞之召而問焉對曰外臣之好射鶀鴈羅鸗小矢之發也何足為大王道哉且楚王之大以大王之賢所弋非直此也昔者三王以弋道徳五霸以弋戰國夫秦魏燕趙王之鶀鴈也齊魯鄭者青首也鄒費郯邵者羅鸗也其餘不足射也見鳥六雙惟王何}
  - {type: variant, offset: 641, length: 3, content: 蔬食田, WYG: 王若以聖人為弓勇士為繳時張而射之此六雙者可得而囊載也其樂非特朝夕之樂也韓詩外𫝊曰齊景公出弋昭華之池使顔涿聚主鳥而亡之景公怒而欲殺之晏子曰夫涿聚有死罪三臣請以其罪數而誅之晉中興書曰桓石秀豁第二子代叔父冲為江州刺史雖入門貴盛不以榮爵嬰心惟以弋釣為事後魏書曰劉逖字長子聰敏好弋}
