  - {type: variant, offset: 2607, length: 1380, content: 王靡不明本立教以孝治天下柰何在諒闇之中脩馳騁之事乎毀其表而竟行獵中道頓息問侍臣獵之與樂何樂八音也侍中劉曄對曰獵勝於樂勛抗辭曰夫樂上通神明下和人理故移風易俗莫善於樂況獵暴華蓋於原野因奏劉曄佞諛不忠又曰蘇則從文帝獵蹉跮失鹿帝大怒踞胡床拔刀悉收督吏將斬之則稽首曰臣聞古之聖王不以禽獸害人今陛下方隆唐堯之化而以獵戲多殺群吏愚臣以為不可敢以死請帝曰卿直臣也遂皆赦之又曰清河令徐季龍使人行獵令管輅筮其所得輅曰當獲小獸復非食禽雖有爪牙微而不彊雖有文章蔚而不明非虎非雉其名曰貍獵人暮歸果如輅言魏末傳曰初帝以母廢未立為嗣文帝與俱獵見子母鹿文帝彎弓射其母令帝復射其子帝置弓泣曰陛下已殺其母臣不忍殺其子帝曰汝語動人心遂定為嗣也吳志曰孫權每日獵常乘馬射虎虎嘗突前攀持馬鞍張昭變色而前曰將軍何有當爾夫為人君者謂能駕御英雄驅使群賢豈謂馳逐於原野校勇於猛獸者乎如有一旦之患柰天下笑何權詔曰年少慮事不過遠以此慚君然猶不能已江表傳曰曹公與孫權書曰兵者奉辭伐罪旍麾南指劉琮束手今水軍八十萬眾與將軍會獵於吳王隱晉書曰魏舒字陽元少工射著韋衣入山澤每獵大獲南史曰宋衡陽王義季鎮荊州嘗大蒐於郊有野老帶苫而耕命左右斥之老人擁耒對曰昔楚子盤遊受譏令尹今陽和扇氣播厥之始一日不作人失其時大王馳騁為樂驅斥老夫非勸農之意義季止馬曰此賢者也命賜之食齊書曰王僧達為宣城太守性好遊獵而山郡無事僧達肆意馳騁或三五日不歸受辤辯訟多在獵所人或逢不識問府君所在僧達報曰在近梁書曰曹景宗幼善騎射好畋獵常與少年數十人澤中逐麞鹿每眾騎趁鹿馬相亂景宗於眾中射之人皆懼中馬足應弦輒斃以此為樂後景宗為楊州刺史出行常欲褰車帷幔左右輒諫以位望隆重人所重瞻不宜然景宗謂所親曰我昔在鄉里騎快馬如龍與年少輩數十騎拍弓弦作霹靂聲箭如餓鴟叫平澤中逐麞數助射之渴飲其血饑食其胃甜如甘露漿覺耳後風生鼻頭出火此樂使人忘死不知老之將至今來楊州作貴人動轉不得路行開車幔小人輒言不可閉置車中如三日新婦此邑邑使人無氣南史曰宋臧熹常與溧陽令阮崇獵遇猛獸突圍獵徒並散熹射之應弦而倒崔鴻十六國春秋後趙錄曰石虎遣司農中郎將費霸帥工匠四千於東平罡山造獵車千乘轅長三丈高丈八尺格虎車四十乘立級行樓二層於其上自靈昌津南至滎陽東極陽都而還使御史監司其中禽獸有犯者罪至大辟又曰石虎命太子宣行祈山川遊獵藪澤乘大輅羽葆華蓋建天子旌旂十有六軍戎卒八萬出金明馳逐終夕所在陳列行宮四面各以百里為度驅圍禽獸皆暮集行宮文武跪立圍守重行烽炬星羅光燭如晝勁騎百餘馳射其中宣與顯德美人乘輦觀之嬉娛忘反獸殫乃止禽獸奔逸當之者坐有爵者奪又秦錄曰姚興性好遊田頗損農要京兆杜延以左僕射齊難無匡輔之益著豊草詩以箴之難具以聞馮翊相靈作德獵賦以風焉興皆覽而善之賜以金帛然終不能改也後魏書曰于栗磾隨新安公道武田於白登山見熊將數子顧栗磾曰能搏之乎對曰若搏之不勝豈不虛斃一壯士自可驅致御前而制之尋皆擒獲帝顧而謝之又曰宿石常從獵文成親欲射猛獸石叩馬諫引帝至高原上後猛獸騰躍殺人詔褒美其忠許後有犯罪宥而勿坐又曰來大千常從明元校獵見獸在巖上持矟直刺之應手而死帝嘉其勇壯北史曰齊元恒字集和自言寧三日不食不能一日不獵又曰齊崔子植位冀州別駕走馬從禽髮掛木而死後周書曰達奚震武之子也少驍勇便騎射太祖嘗於渭北校獵時兔過太祖前震與諸將競射之馬倒而墜震足不傾躓因步走射之矢發中兔顧馬纔趨遂廻身騰上太祖喜曰非此父不生此子乃賜震雜綵百叚唐書曰武德七年, WYG: ''}
