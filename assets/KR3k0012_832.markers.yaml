  - {type: variant, offset: 2591, length: 239, content: 文帝將出遊獵鮑勛停車上䟽曰五帝三王靡不明本立教以孝治天下柰何在諒闇之中脩馳騁之事乎毀其表而竟行獵中道頓息問侍臣獵之與樂何樂八音也侍中劉曄對曰獵勝於樂勛抗辭曰夫樂上通神明下和人理故移風易俗莫善於樂況獵暴華蓋於原野因奏劉曄佞諛不忠又曰蘇則從文帝獵蹉跮失鹿帝大怒踞胡床拔刀悉收督吏將斬之則稽首曰臣聞古之聖王不以禽獸害人今陛下方隆唐堯之化而以獵戲多殺群吏愚臣以為不可敢以死請帝曰卿直臣也遂皆赦之又曰清河令徐季龍使人行獵令管輅筮其所得輅曰當獲小獸復非食禽雖有爪牙微而不彊雖有文章蔚而不明非, SBCK: 石}
  - {type: variant, offset: 2591, length: 239, content: 文帝將出遊獵鮑勛停車上䟽曰五帝三王靡不明本立教以孝治天下柰何在諒闇之中脩馳騁之事乎毀其表而竟行獵中道頓息問侍臣獵之與樂何樂八音也侍中劉曄對曰獵勝於樂勛抗辭曰夫樂上通神明下和人理故移風易俗莫善於樂況獵暴華蓋於原野因奏劉曄佞諛不忠又曰蘇則從文帝獵蹉跮失鹿帝大怒踞胡床拔刀悉收督吏將斬之則稽首曰臣聞古之聖王不以禽獸害人今陛下方隆唐堯之化而以獵戲多殺群吏愚臣以為不可敢以死請帝曰卿直臣也遂皆赦之又曰清河令徐季龍使人行獵令管輅筮其所得輅曰當獲小獸復非食禽雖有爪牙微而不彊雖有文章蔚而不明非, krp: 石}
