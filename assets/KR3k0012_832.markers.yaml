  - {type: variant, offset: 2477, length: 99, content: 李廣被黜與故頴陰侯屏居藍田南山中射獵嘗夜從一騎出從人田間飲還至亭霸陵尉醉呵止廣廣騎曰故李將軍也尉曰今將軍尚不得夜行何故也宿廣亭下魏志曰夏侯淵之子稱年十六淵與之畋見奔虎執楯驅馬逐之禁之不可一箭而中名聞, WYG: 夢横繳欲舉薦}
