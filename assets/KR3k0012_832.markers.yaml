  - {type: variant, offset: 95, length: 21, content: 掌邦田之地政為之厲禁而守之凡田獵者受令焉又, SBCK: 無異於虎狼梁君援其手與歸呼萬歳}
  - {type: variant, offset: 95, length: 2, content: 掌邦, WYG: 問子子以足指何也老古振衣而起曰不意人君至此虎豹之居也厭閑而近人故人亦得之諸侯厭衆而亡其國惟鵲有巢惟鳩居之今君不歸人將居之於是文公恐而歸又曰晉文公畋于虢見一老父問曰虢亡何也對曰虢君斷則不能用人也文公輟畋而歸趙襄子曰其人安在公曰吾未與之俱來襄子曰君聽其言而棄其身文公於是乃召而賞之說苑曰楚莊王獵大夫諌之王曰吾就獵求士也榛薄刺虎知其勇也摶犀獲兕知其勁也罷畋而分所得知其仁也由此道得三士可乎又曰晉平公有馳逐之車錯以羽芝㑹羣臣觀焉}
