  - {type: variant, offset: 634, length: 4, content: 山林藪澤, WYG: 季春之月畢弋無出九門蔡邕章句曰繳射曰弋左𫝊襄公上曰曹伯陽好田弋曹鄙人公孫强好弋獲白鴈而獻之且言田弋之說論語述而曰子曰弋不射宿春秋後語曰楚項襄王時人}
