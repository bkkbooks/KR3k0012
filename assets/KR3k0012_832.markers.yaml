  - {type: variant, offset: 12, length: 5, content: 鄉師凡四時, SBCK: 龍下射彼使無驚吾鳥龍曰昔吾先君伐衛免曹退爲踐土之盟不戮一人吾今一朝田而曰必爲我殺人是虎狠殺人故將救之簡子愀焉曰不愛其身以活人者可無從乎環車輟田曰人}
