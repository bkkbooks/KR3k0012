  - {type: variant, offset: 4213, length: 197, content: 四方豈復逞雄心於一豕太宗納之因罷獵又曰貞觀十四年太宗欲親幸同州遊獵櫟陽縣丞劉仁軌上䟽曰四時蒐狩前王恒典事有沿革未必因循今年甘雨應時秋稼甚盛盡力收穫月半猶未畢功貧家無力禾下始擬種麥直據尋常料喚田家以有所妨今既祗供頓事兼之修理橋道縱謂大簡動費一二萬工百姓收歛實為狼狽臣願陛下少留萬乘之尊垂聽一介之說退延旬日收刈揔了則盡閑暇家得康寧鑾駕徐動公私交泰上降璽書勞之又曰太宗謂高昌王麴文泰曰丈夫在生樂事有三, SBCK: ''}
