  - {type: variant, offset: 21, length: 0, content: '', WYG: 獵明日㑹天疾風左右止侯侯不聽曰不可疾風失信吾不為遂犯風往而罷虞人穆天子𫝊曰天子東田于澤至於重壁之䑓盛姬告病又曰天子獵于滲澤於是得白狐𤣥貉焉以祭于河宗以將事於河宗獲此故用又曰天子大饗正公諸侯王勤七萃之士勤猶勞也于羽陵之上乃奏廣樂六師之人翔畋于曠原得獲無疆鳥獸絶羣六師之人大畋九日乃收皮效物於是載羽百車國語曰晉趙簡子田于螻螻晉君囿史黯聞之以犬侍于門黯晉大夫史墨時為簡子史犬田犬門君囿門也簡子見之曰何為曰有所得犬欲試之兹囿兹此也簡子曰何為不告對曰君行臣從不從不順羣從法臣從君主將適螻而麓不聞麓主君苑囿之官𫝊曰山林之木衡麓守之臣敢煩當日當日直日也言主將之君囿不煩麓以告君臣亦不敢煩主之直日白主君也簡子乃還呂氏春秋曰齊有好獵者久不得獸所以不得狗惡故也欲得良狗則家貧乃還疾耕疾耕則家富家富則有以求良狗狗良則數得獸矣非獨獵也百事皆然春秋後語曰魏信陵君嘗與王共博於是北境舉烽火𫝊趙寇至王釋博欲召大臣議之信陵君曰趙王獵耳非為寇也復博如故王恐心不在博居有頃復從北方𫝊言趙王獵耳非為寇也王大驚曰公子何以知之信陵君對曰臣之客有能探趙王隂謀者趙王所為客輙以報臣臣以此知之六韜曰文王畋于渭陽見呂尚坐茅以漁太公金匱曰紂以六月獵於西土發人逐禽民諌曰天務覆施地務長養今盛夏發民逐禽而元元命懸於野民踐之百日不食紂以為妖殺之新序曰晉文公}
