  - {type: variant, offset: 3099, length: 0, content: '', SBCK: 至鄒山劉義隆魯郡太守崔耶利率属城降使使者以太牢祀孔子次于彭城遂趨盱音吁眙音怡十二月車駕至淮詔刈雚葦作筏數萬而濟義隆盱眙守將臧質閉門距守將軍胡崇之等率衆二萬援盱眙燕王譚大破之梟崇之等斬首萬餘級淮南皆降是月永昌王仁攻懸瓠拔之獲義隆守將趙淮送京師斬之車駕臨江起行宫於􅀲歩山義隆使獻百牢貢其方物又請}
  - {type: variant, offset: 3099, length: 2, content: 進軍, WYG: 至}
  - {type: variant, offset: 3100, length: 0, content: '', SBCK: 女於皇孫帝以師婚非禮許和而不許婚使散􅀐侍郎夏侯野報之帝詔皇孫爲書致馬通問焉正平元年二月車駕濟河次于魯口皇太子朝於行宫十二月車駕至自南伐飲至䇿勲告於宗廟夏五月大赦六月改年十月封皇孫濬爲髙陽王㝷以皇孫丗嫡不冝在藩乃止改封􅁗王翰爲東平王燕王譚爲臨淮王楚王建爲廣陽王吴王余爲南安王二年二月帝崩於永安宫在位二十九年時年四十五秘不發喪中常侍宗愛矯皇后令殺東平王翰迎南安王余入而立之大赦改元爲承平三月上尊謚曰太武皇帝葬于雲中金陵廟號丗祖冬十月余爲宗愛所賊殿中尚書長孫渴侯與尚書陸麗迎立皇孫是爲髙宗帝生不逮􅁡太后及有所識言則悲慟哀感傍人太宗聞而嘉歎曁太宗不豫衣不釋帶性清儉率素服御飲饍取給而巳不好珎麗食不二味所幸昭儀貴人衣無縑綵羣臣白帝更峻京邑城隍以從周昜設險之義又陳蕭何壯麗之􅀃帝曰古人有言在德不在險屈丐蒸土築城而朕㓕之豈在城也天下未平方湏民力土功之事朕所未爲蕭何之對非雅言也毎以財者}
  - {type: page-break, offset: 3100, content: '', id: KR3k0012_SBCK_102-7b}
  - {type: page-break, offset: 3100, content: '', id: KR3k0012_SBCK_102-8a}
  - {type: variant, offset: 3101, length: 0, content: '', SBCK: 國之本無所輕費至於賞賜皆是死事勲績之家親戚愛寵未曽撗有所及髙宗文成皇帝後魏書曰髙宗文成皇帝諱濬景穆皇帝之長子也母曰閭氏真君元年六月生於東宫帝少聦逹丗祖愛之常置左右號丗嫡皇孫年五􅀊丗祖北廵帝在後逢慮帥桎一奴欲加其罰常謂之曰奴今遭我汝宜釋之帥奉命解縛丗祖聞之曰此兒雖小欲以天子自處意竒之旣長風格異常毎有大政常叅决可否正平二年二月}
  - {type: variant, offset: 3102, length: 0, content: '', SBCK: 常侍宗愛弑逆立南安王余十月又賊余於殿中尚書長孫渴侯與尚書陸麗奉迎皇孫即帝位於永安前殿改元興安元年十二月􅀄復佛法二年二月發京師五千人穿天淵池是月劉義隆子劭殺其父而自立夏五月行幸崞音郭}
  - {type: page-break, offset: 3102, content: '', id: KR3k0012_SBCK_102-8b}
  - {type: punctuation, offset: 3103, content: ，, id: KR3k0012_CHANT_102-bkkpn678}
  - {type: 'tls:seg', offset: 3103, content: '', id: KR3k0012_CHANT_102-5a.130}
  - {type: variant, offset: 3103, length: 3, content: 引騎圍, SBCK: 是月劉邵弟駿殺劭而自立閏月太后赫連氏崩八月詔曰朕以眇身纂承大業即位以來百姓宴安風􅀨順序邊方無事衆瑞兼呈不可稱數又於内苑獲方寸玉印其文曰子孫長壽羣公卿士咸曰休哉豈朕一人尅臻斯應實由天地祖宗降祐}
  - {type: variant, offset: 3103, length: 1, content: 引, WYG: 劉義隆魯郡太守崔邪利率屬城降使使者以太牢祀孔子次于彭城遂趨盱音吁眙音怡十二月車駕至淮詔刈萑葦作筏數萬而濟義隆盱眙守將臧質閉門拒守將軍胡崇之等率衆二萬援盱眙燕王譚大破之斬首萬餘淮南皆降是月永昌王仁攻懸瓠拔之獲義隆守將趙淮送京師斬之車駕臨江起行宫於𤓰步山義隆使獻百牢貢其方物又請進女於皇孫以求和好帝以師婚非禮許和而不許婚使散}
