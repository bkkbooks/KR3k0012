  - {type: variant, offset: 16, length: 187, content: 黃帝有子二十五人或內列諸華或外分荒服昌意少子受封北國有大鮮卑山因以為號其後世為君長統幽都之北廣漠之野畜牧遷徙射獵為業淳樸為俗簡易為化不為文字刻木紀契而已世事遠近人相傳授如史官之紀錄焉黃帝以土德王北俗為土為托謂后為跋故以為氏其裔始均入仕堯世逐女魃於弱水北民賴其勳帝舜嘉之命為田祖爰歷三代以及於秦熏鬻獫狁山戎匈奴之屬累代殘暴作害中州而始均之裔不交南夏是以載籍無聞焉積六十七世至成, SBCK: 太宗明元}
  - {type: variant, offset: 16, length: 187, content: 黃帝有子二十五人或內列諸華或外分荒服昌意少子受封北國有大鮮卑山因以為號其後世為君長統幽都之北廣漠之野畜牧遷徙射獵為業淳樸為俗簡易為化不為文字刻木紀契而已世事遠近人相傳授如史官之紀錄焉黃帝以土德王北俗為土為托謂后為跋故以為氏其裔始均入仕堯世逐女魃於弱水北民賴其勳帝舜嘉之命為田祖爰歷三代以及於秦熏鬻獫狁山戎匈奴之屬累代殘暴作害中州而始均之裔不交南夏是以載籍無聞焉積六十七世至成, WYG: 太宗明元}
