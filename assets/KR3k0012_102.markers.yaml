  - {type: variant, offset: 4532, length: 0, content: '', krp: 月車駕南廵出自天門關路恒嶺四方蕃附大人各率所部從者五萬餘人十有一月皇太子親統六軍出鎮塞上八年二月築長城於長川之南起自赤城西至五原延袤二千餘里備置戍衛三月田於鄴南韓陵山幸汲郡至于坊頭濟自靈昌津幸陳留東郡濟河而北西之河内造浮橋於治坂津夏四月幸成臯觀虎牢而城内乏水懸綆汲河帝令連艦上施轒輼絶其汲路轒符分切輼於云切兵車也又穿地道以奪其井丁丑幸洛陽觀石經蠻王梅安率渠帥數千人来朝閏月還幸河内北登太行幸髙都晉陽賜百官王公巳下至於厮賤無不霑洽五月還次鴈門皇太子率留臺王公迎于句注之北庚寅車駕至自南廵冬十月廣西宫起外牆周廽二十里是歲民飢詔所在開倉賑給十有一}
