  - {type: variant, offset: 510, length: 1942, content: 皇帝也故時人諺曰詰汾皇帝無婦家力微皇帝無舅家帝崩神元皇帝立諱力微生而聰叡元年歲在庚子先是西部內侵國民離散依於沒鹿廻部大人竇賓始祖有雄傑之度時人莫測後與賓攻西部賓軍敗失馬步走始祖使人以所乘駿焉給之賓歸令其部內求與馬之人賞當加重賞始祖隱而不言賓後知大驚將分國之半以奉始祖不受賓臨終戒其二子使謹奉始祖其子不從乃陰謀為逆始祖召而殺之盡并其眾部大人悉皆從服控弦士馬二十餘萬三十九年遷於定襄之盛樂始祖乃告諸大人曰我歷觀前世匈奴蹋頓之徒茍貪財利抄掠邊民雖有所得而多其死傷復不足相補更招寇讎百姓塗炭非長計也於是與魏和親四十二年遣子文帝如魏且觀風土是歲魏景元二年也文皇帝諱沙漠汗以國太子留洛陽為魏賓之冠魏晉禪代和好仍密始祖春秋已邁帝以父老求歸晉武帝具禮護送四十八年帝至自晉五十六年帝復如晉其年冬還國晉遺帝錦罽繒綵綿絹諸物豐厚車牛馬百乘行達并州晉征北將軍衛瓘以帝為人雄異恐為後患乃密白晉帝請留不遣晉帝難於失信不許瓘復請以金帛賂國之大人令致間隙使相厄害晉帝從之遂留帝於是國之執事及部人皆受瓘貨五十八年方遣帝始祖聞帝歸大悅使諸部大人詣陰館陰迎之酒酣帝仰視飛鳥謂諸大人曰我為女曹取之授彈飛丸應弦而落時國俗無彈眾咸大驚並先馳還始祖曰我子既歷他國進德何如皆對曰太子才藝非常引空弓而落飛鳥似得晉人異法術亂國害民之兆唯願察之自帝在晉之後諸子愛寵日進始祖年踰期頤頗有所惑聞諸大人語意乃有疑因曰不可容者便當除之於是大人乃馳詣塞南害帝後乃追謚焉始祖尋崩凡饗國五十八年年一百四歲太祖即位尊為始祖章皇帝諱悉鹿立始祖之子也饗國九年而崩平皇帝諱綽立章帝之少弟也饗國七年而崩惠帝弗立文帝少子思即位一年崩昭皇帝立諱祿官始祖神元之子也九年分國為三部帝自以一部居東在上谷北須源之西東接宇文部以文帝之長子桓皇帝諱猗㐌統一部居代郡之參合陂北以桓帝之弟穆皇帝諱猗盧統一部居定襄之盛樂故城自始祖以來與晉和好百姓乂安財畜富實控引騎士四十餘萬十年晉惠帝為城都王穎逼留在鄴匈奴別種劉淵反於離石號漢王并州刺史司馬騰來乞師帝與桓帝同時大舉以助之大破淵眾於西河上黨晉假桓帝大單于金印紫綬是歲桓帝崩帝英傑魁岸馬不能勝常乘安車駕大牛牛角容一石帝曾中蠱哎吐之地仍生榆木參合陂土無林樹故世人異之至今傳記十三年昭帝崩是歲羯胡石勒與晉馬牧帥汲桑反穆皇帝天姿英峙勇略過人昭帝崩後遂揔攝三部以為一統元年劉淵僣帝自稱大漢三年晉并州刺史劉琨遣使以子為質又遣使乞師救洛陽帝遣步騎二萬助之晉太傅東海王司馬越辤以洛中飢饉師還是年劉淵死子聰僣立五年劉琨遣使乞師以討劉聰石勒以琨忠義矜而許之會聰遣其子粲攻洛陽害琨父母而據其城琨來告難帝大怒遣長子六脩桓帝子普根及衛瓘范班姬澹等為前鋒帝統大眾二十四萬為後繼粲懼棄輜重突圍遁走縱騎追斬其將劉豐伏尸數百里琨來拜謝帝以禮待之琨固請進軍帝曰吾不早來致卿父母見害誠以後時相愧今卿已復州境然吾遠來士馬疲弊且待後期賊豈可盡乎與琨馬牛羊各千餘車牛百乘又留勁銳戍之而還六年城盛樂以為北郡脩故平城以為南郡帝登平城西山望觀地勢乃更南百里於灅水之陽黃瓜堆築新平城晉人謂之小平城使子六脩鎮之統領南部九年帝召六脩不至帝怒討之失利乃微服民間遂崩普根先守外境聞難來赴功六脩減之普根立月餘而薨也平文皇帝諱鬱律立惠帝之子也二年西兼烏孫故地東吞勿吉以西控胘上馬將有百萬劉聰死焉族子曜僣立帝聞晉愍帝為曜所害顧謂大臣曰今中原無主天其資我乎劉曜遣使請和帝不納是年司馬叡稱大位於江南四年桓帝后以帝得眾心恐不利於已子帝遂崩大人死者數十人天興初尊曰太祖惠皇帝諱賀傉立桓帝之中子也未親政事太后臨朝遣使與石勒通和時人謂之女國使四年帝始臨朝五年崩煬皇帝諱紇那立惠帝之弟也五年出居於宇文部賀蘭及諸部大人共立烈帝烈皇帝諱翳槐立平文之長子也石勒遣使來和帝遣弟昭成皇帝如襄國二年石勒僣立自稱大趙王烈皇帝崩昭武皇帝諱什翼犍立平文之次子也生而奇偉寬仁大度喜怒不形于色身長八尺隆準龍顏立髮委地臥則乳垂至席烈帝崩顧命曰必迎立什翼犍社稷可安烈帝崩帝弟彌乃自詣鄴奉迎與帝俱還建國元年十一月帝即位於繁畤之北時年十九二年始置百官分掌眾職八年張駿私署假涼王十三年魏郡人冉閔殺石鑒僣立十四年氐符健僣稱天王自號大秦十五年慕容儁滅冉閔僣稱尊號二十七年春車駕還雲中冬十一月討沒歌部破之獲牛馬羊數百萬頭三十四年春長孫斤謀反伏誅斤之反也拔刃向御座太子獻明皇帝諱寔格之傷脅夏五月薨後追謚焉秋七月皇孫珪生大赦三十九年符堅遣其大司馬符落率眾二十萬朱彤張毛音䖝剌鄧羌等諸道來寇侵逼南境冬十一月白部獨孤部禦之敗績南部大人劉庫仁走雲中復遣庫仁率騎十萬逆戰於石子嶺王師不利帝時不豫十二月至雲中旬有二日帝崩時年五十七太祖即位尊曰高祖帝雅性寬厚智通仁恕時國中少繒帛代人許謙盜絹二疋守者以告帝匿之謂燕鳳曰吾不忍視謙之面卿勿泄言謙或慚而自殺為財辱士非也太祖道武, krp: ''}
