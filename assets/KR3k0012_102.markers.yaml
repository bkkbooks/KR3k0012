  - {type: variant, offset: 4249, length: 0, content: '', SBCK: 􅁐觀射虎三頭五月行幸隂山秋七月詔曰朕毎􅀊閏月命羣臣講武平壤所幸之處必立宫壇縻費之功損勞非一冝仍舊貫何必改作也八月遂由於河西詔曰朕順時田獵而從官殺􅀗過度旣殫禽獸乖不圍之義其勑從官及典圍者將校自今巳後不聽濫殺其田獲皮肉別目頒頼十二月詔曰名位不同禮亦異數所以殊等級示􅁤儀今䘮葬嫁娶之禮未備貴􅀔豪冨越度奢靡非所謂式}
