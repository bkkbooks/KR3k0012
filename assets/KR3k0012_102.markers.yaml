  - {type: variant, offset: 205, length: 5, content: 諱屯立聰武, krp: 太宗}
  - {type: variant, offset: 206, length: 922, content: 屯立聰武明智遠近所推統國三十六大姓九十威振北方莫不率服成帝崩節皇帝諱貸立節帝崩其後四世宣帝諱推寅立南遷大澤方千餘里厥土昏冥沮洳謀更南徙未行而崩其後六世獻皇帝諱鄰立時有神人言於國曰此土方遐未足以建都邑宜復徙居帝年時衰老乃以授予聖武帝諱詰汾獻帝命令南移山谷高深九難八阻於是欲止有神獸其形似馬其聲類牛先行導引歷年乃出始居匈奴之故地其遷徙策略多出宣獻二帝故時人並號曰推寅蓋俗云鑽研之義初聖武帝常率數萬騎田於山澤欻見輜軿自天而下既至見美婦人侍衛甚盛帝異而問之對曰我天女也受命相偶遂同宿旦請還曰明年同時復會於此言終而別去如風雨及朞帝至先所遊處果復相見天女以所生男授帝曰此君之子也善視之子孫相承當世為帝王語訖而去即始祖神元皇帝也故時人諺曰詰汾皇帝無婦家力微皇帝無舅家帝崩神元皇帝立諱力微生而聰叡元年歲在庚子先是西部內侵國民離散依於沒鹿廻部大人竇賓始祖有雄傑之度時人莫測後與賓攻西部賓軍敗失馬步走始祖使人以所乘駿焉給之賓歸令其部內求與馬之人賞當加重賞始祖隱而不言賓後知大驚將分國之半以奉始祖不受賓臨終戒其二子使謹奉始祖其子不從乃陰謀為逆始祖召而殺之盡并其眾部大人悉皆從服控弦士馬二十餘萬三十九年遷於定襄之盛樂始祖乃告諸大人曰我歷觀前世匈奴蹋頓之徒茍貪財利抄掠邊民雖有所得而多其死傷復不足相補更招寇讎百姓塗炭非長計也於是與魏和親四十二年遣子文帝如魏且觀風土是歲魏景元二年也文皇帝諱沙漠汗以國太子留洛陽為魏賓之冠魏晉禪代和好仍密始祖春秋已邁帝以父老求歸晉武帝具禮護送四十八年帝至自晉五十六年帝復如晉其年冬還國晉遺帝錦罽繒綵綿絹諸物豐厚車牛馬百乘行達并州晉征北將軍衛瓘以帝為人雄異恐為後患乃密白晉帝請留不遣晉帝難於失信不許瓘復請以金帛賂國之大人令致間隙使相厄害晉帝從之遂留帝於是國之執事及部人皆受瓘貨五十八年方遣帝始祖聞帝歸大悅使諸部大人詣陰館陰迎之酒酣帝仰視飛鳥謂諸大人曰我為女曹取之授彈飛丸應弦而落時國俗無彈眾咸大驚並先馳還始祖曰我子既歷他國進德何如皆對曰太子才藝非常引空弓而落飛鳥似得晉人異法術亂國害民之兆唯願察之自帝在晉之後諸子愛寵日進始祖年踰期頤頗有所惑聞諸大人語意乃有疑因曰不可容者便當除之於是大人乃馳詣塞南害帝後乃追謚焉始祖尋崩凡饗國五十八年年一百四歲, SBCK: 嗣}
  - {type: variant, offset: 206, length: 1, content: 屯, WYG: 嗣太祖道武皇帝長子也母曰劉貴人登國七年生雲中宫太祖晩有子聞而大悦乃大赦天下帝明睿寛毅非禮不動太祖甚竒之天興六年封齊王拜相國加車騎大將軍初帝母既賜死太祖乃召帝曰昔漢武帝將}
