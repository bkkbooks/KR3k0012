  - {type: variant, offset: 4247, length: 1, content: 起, WYG: 詔曰夫三代之隆莫不崇尚年齒今選舉之官多不以次令頒白處後晩進居先豈所謂彛倫攸叙者也諸曹選補宜各先盡勞舊才能十二月制戰陣之法十有餘條因大儺耀兵有飛龍騰蛇魚麗之變以示威武四年春三月賜京師民年七十已上大官厨食以終其年夏四月上幸}
