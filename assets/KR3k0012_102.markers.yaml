  - {type: variant, offset: 4272, length: 1, content: 島, krp: 乞伏乾歸自稱秦王海}
  - {type: variant, offset: 4274, length: 1, content: 桓, krp: 馮䟦僣號天王國稱大燕三年春二月詔曰衣食足知榮辱夫人飢寒切巳惟恐朝夕不濟所急者温飽而巳何暇及於仁義之事乎王敎之多違蓋由於此非夫耕婦織内外相承何以家給人足矣其簡宫人非所當御及執作伎巧自餘悉岀以賜鰥民三月詔侍臣常佩劒四年二月登虎圈射虎夏四月宴羣臣於西宫使各獻言勿有所諱秋七月東廵置四廂大將又於十二時置十二小將以山陽侯奚斤元城公元屈行左右丞相是歲沮渠蒙遜僣稱河西王神瑞元年春正月以慎瑞頻集改年大赦二年六月幸去畿陂觀漁次于濡源立臺遂射白熊于頽牛山獲之幸赤城親見長老問民之疾苦復租一年南次石亭幸上谷問百年訪賢俊復田租之半壬申幸涿鹿登橋山觀温泉使以太牢祠黄帝唐尭廟幸廣寗事如上谷登廣寗之暦山以太牢祠虞舜廟帝親加禮焉㤗常元年六月帝自鹿陂西行大獵于牛川發釡山臨殷繁水而南觀于九十九泉三年春正月帝自長川詔護髙車郎將薛䌓率髙車丁零十二部大人衆二萬北至弱水招懐伐叛降者二千餘落獲牛馬二萬餘頭是年赫連勃勃僣稱皇帝四年夏四月車駕有事於東廟逺蕃助祭者數百國五月詔曰宣武皇帝體得一之}
