  - {type: variant, offset: 4536, length: 0, content: '', krp: 西宫在位十五年時年三十二遣詔以司空奚斤所獲軍實賜大臣自司徒長孫嵩巳下至于士卒各有差十二月上謚曰明元皇帝葬于雲中金陵廟稱太宗帝禮愛儒生好覽史傳以劉向所撰說苑新序於經典正義多有所闕乃撰新集三十篇採摭經史該洽古義兼資文武焉丗祖太武皇帝後魏書曰丗祖太武皇帝諱燾太宗明元皇帝長子也母曰杜貴嬪}
  - {type: variant, offset: 4537, length: 1, content: 安, SBCK: 華}
  - {type: variant, offset: 4537, length: 1, content: 安, WYG: 華}
  - {type: variant, offset: 4537, length: 0, content: '', krp: 賜五年生於東宫體貌瓌異太祖竒而恱之曰成吾業者此子也㤗常七年四月封太平王五月爲監國太宗有疾命帝㹅攝百揆聦明大度意豁如也八年十一月即皇帝位大赦天下十有二月追尊皇妣爲密皇太后進司徒長孫嵩爵爲北平王司空奚斤爲冝城王藍田公長孫翰爲平陽王其餘普增爵位各有差始光元年夏四月東廵幸大寗二年三月尊保母竇氏曰保太后營故東宫爲萬壽宫起永}
  - {type: variant, offset: 4538, length: 0, content: '', krp: 安樂二殿臨望觀九華堂𥘉造新字千餘詔曰昔帝軒刱制造物乃命倉頡因鳥獸之跡以立文字繼歷乆逺傳習多失其真今制定文字丗所用者頒下逺近永爲揩拭是年赫連屈丐死子昌僣立三年春二月起太學於城東祠孔子以顔淵配十有一月帝率輕騎二萬襲赫連昌至其城下徙萬餘家而還十有二月武都氐王楊玄及沮渠蒙遜等皆遣使内附四年春赫連昌遣其弟平原公定率衆二萬向長安帝聞之乃遣就隂山伐木大造攻具二月車駕還宫三月遣髙源王禮鎮長安詔執金吾桓貸造橋於君子津五月車駕西討赫連昌濟君子津至于黒水帝親祈天告祖宗之靈而誓衆焉六月昌引衆出城大破之車駕入城虜昌羣弟及其諸母姊妹妻妾宫人萬數府庫珎寳車旗器物不可勝計八月車駕至自征飲至䇿勲告於宗廟班軍實以賜留臺百寮各有差冬十一月以氐王楊玄爲都督荆梁益寧四州諸軍事假征南大將軍梁州刺史南秦王神䴥音加元年春正月以天下守令多行非法精選忠良悉代之二月改元是歳皇子晃生三年春正月行幸廣寗臨温泉作温泉之歌三月帝聞劉義隆將宼邊乃詔兾定相三州造􅊑三千艘簡幽州已南戍兵集于河上以備之秋七月詔諸征鎮將軍王公仗節邊逺者聽開府辟召其次増置吏貟詔大鴻臚卿杜超假節都督兾定相三州諸軍事行征南大將軍太宰進爵爲王鎮鄴爲諸軍節度九月立宻皇太后廟于鄴甲辰行幸統萬遂徃平涼十一月車駕至平凉先是赫連定將數萬人東御於鄜城留其弟上谷公杜于廣陽公度洛孤城守帝至于凉登北原使赫連昌招喻之杜于不降遂掘壍圍守之十二月定弟杜于度洛孤面縳出降涼平收其珍寳定長安臨晉武功守將皆奔走關中平車駕東還留巴東公延普等鎮安定四年九月加太尉長孫嵩柱國大將軍特進左光禄大夫崔浩爲司徒征西大將軍長孫道生爲司空詔曰頃逆命縱逸方夏未寧戎軍屢駕不遑休息今二㓂摧珍士馬無爲方將偃武修文遵太平之化昩旦思求想遇師輔訪諸有司咸稱范陽盧玄博陵崔綽趙郡李靈河間邢潁滄水髙允廣平㳺雅太原張偉等皆賢雋之胄冠冕州邦羽儀之用庻得其人任之政事共臻邕熙之羙易曰我有好爵吾與爾縻之如玄之比隠跡衡門不曜名譽者盡勑州郡以禮發遣遂徴玄等及州郡所遣至者數百人皆差次叙用冬十月詔司徒崔浩改定律令延和元年春正月尊保太后爲皇太后立皇后赫連氏立皇子晃爲皇太子謁於太廟太赦改年大延元年出太祖太宗宫人令得嫁大赦改年六月詔曰去春小旱冬作不茂憂勤尅己祈請靈祗上下咸秩豈朕精誠有感何報應之速雲雨震洒流澤沾渥有鄙婦人持方寸王印詣潞縣侯孫家旣而亡去莫知所在玉色鮮白光照内映印有三字爲龍鳥之形要妙竒巧不類人迹文曰旱疫平推㝷其理蓋神靈之報應也朕用嘉焉比者以來禎瑞仍臻所在非一天降嘉貺將何德以酬之所以内省警震欣懼交懐其令天下大酺五日禮報百神守宰祭界内名山大川上荅天意以求福禄二年十一月行幸棝音固陽驅野馬於雲中置野馬苑三年髙麗契丹國龜兹恱服焉耆車師栗特䟽勒烏孫渴槃陁鄯善諸國各遣使朝獻奉汗血馬四年春罷沙門年五十巳下五年六月車駕西討沮渠牧犍侍中宜都王穆壽輔皇太子决留臺事八月車駕至姑臧牧犍兄子祖踰城來降乃分軍圍之九月牧犍兄子萬年率麾下來降是日牧犍與左右文武五千人面縛軍門帝解其縛待之以蕃臣之禮收其城内户口二十餘萬倉庫珎寳不可稱計冬十月車駕東還宫徙凉州民三萬餘家于京師太平眞召元年六月皇孫濬生大赦改元三年春正月帝至道壇親受符籙備法駕旗幟盡青十月封皇子伏羅爲晉王翰爲秦王譚爲燕王建爲楚王余爲吴王四年冬十一月詔曰朕承祖宗重光之緒思闡洪基恢隆萬丗自經營天下剪暴除亂掃清不順二十年矣夫隂陽有徃復四時有代謝授子任賢所以休息優隆功臣式固長乆蓋古今不昜之令典也令皇太子副理萬機楤統百揆諸朕功臣勤勞日乆皆當以爵歸第隨時朝請饗宴朕論道陳謨而巳不冝復煩劇職更舉賢俊以備百官主者明爲科制以稱朕心五年春正月皇太子始揔百揆諸上書者皆稱臣詔曰愚民無識信惑妖邪私養師巫挾藏䜟記隂陽圖緯方伎之書又沙門之假西戎虚誕生致妖孽非所以一齊政化布淳徳于天下也自王公巳下至於庶人有養沙門師巫及金銀工巧之人在其家者皆遣詣曹不得容匿限今年二月十五日過期不岀師巫沙門身死主人門誅明相宣吿咸使知聞詔曰自頃巳來軍國多事未宣文敎非所以整齊風俗示軌則於天下也今制自王公巳下至於卿士其子息皆詣太學其百工伎巧騶卒子息當習其父兄所業不聽私立學校違者師身死主人門誅六年春正月車駕行幸定州引見長老存問之二月遂西幸上黨觀連理樹於玄氏十一月遣殿中尚書安定公韓茂率騎屯相州之陽平郡發兾州民造浮橋於碻苦交切磝五交切津七年二月幸長安存問父老丁亥幸昆明池三月詔諸州坑沙門毁諸佛像徙長安城内工巧二千家於京師車駕旋􅎮幸洛水夏四月車駕至自長安毀鄴城五層佛圖於泥像中得玉蠒二其文皆曰受命於天旣壽永昌其一刻其旁曰魏所受漢傳國璽八年六月西征諸將扶風公元處真等八將坐盗没軍資所在虜掠贓各千萬計並斬之九年冬十月以婚􅊚奢靡䘮葬過度詔有司更爲科限十有一年春正月行幸洛陽所過郡國皆親對髙年存恤孤寡遂征懸瓠夏四月車駕還宫賜從者及留臺郎吏巳下生口各有差六月誅司徒崔浩九月車駕南伐冬十月車駕濟河詔諸將分道並進使征西大將軍永昌王仁自洛陽岀壽春向書長孫眞趨馬頭楚王建趨鍾離髙凉王郍自青州趨下邳車駕自中道十一月至鄒山劉義隆魯郡太守崔耶利率属城降使使者以太牢祀孔子次于彭城遂趨盱音吁眙音怡十二月車駕至淮詔刈雚葦作筏數萬而濟義隆盱眙守將臧質閉門距守將軍胡崇之等率衆二萬援盱眙燕王譚大破之梟崇之等斬首萬餘級淮南皆降是月永昌王仁攻懸瓠拔之獲義隆守將趙淮送京師斬之車駕臨江起行宫於瓜歩山義隆使獻百牢貢其方物又請進女於皇孫帝以師婚非禮許和而不許婚使散騎侍郎夏侯野報之帝詔皇孫爲書致馬通問焉正平元年二月車駕濟河次于魯口皇太子朝於行宫十二月車駕至自南伐飲至䇿勲告於宗廟夏五月大赦六月改年十月封皇孫濬爲髙陽王㝷以皇孫丗嫡不冝在藩乃止改封秦王翰爲東平王燕王譚爲臨淮王楚王建爲廣陽王吴王余爲南安王二年二月帝崩於永安宫在位二十九年時年四十五秘不發喪中常侍宗愛矯皇后令殺東平王翰迎南安王余入而立之大赦改元爲承平三月上尊謚曰太武皇帝葬于雲中金陵廟號丗祖冬十月余爲宗愛所賊殿中尚書長孫渴侯與尚書陸麗迎立皇孫是爲髙宗帝生不逮蜜太后及有所識言則悲慟哀感傍人太宗聞而嘉歎曁太宗不豫衣不釋帶性清儉率素服御飲饍取給而巳不好珎麗食不二味所幸昭儀貴人衣無縑綵羣臣白帝更峻京邑城隍以從周昜設險之義又陳蕭何壯麗之說帝曰古人有言在德不在險屈丐蒸土築城而朕㓕之豈在城也天下未平方湏民力土功之事朕所未爲蕭何之對非雅言也毎以財者軍國之本無所輕費至於賞賜皆是死事勲績之家親戚愛寵未曽撗有所及髙宗文成皇帝後魏書曰髙宗文成皇帝諱濬景穆皇帝之長子也母曰閭氏真君元年六月生於東宫帝少聦逹丗祖愛之常置左右號丗嫡皇孫年五歲丗祖北廵帝在後逢慮帥桎一奴欲加其罰常謂之曰奴今遭我汝宜釋之帥奉命解縛丗祖聞之曰此兒雖小欲以天子自處意竒之旣長風格異常毎有大政常叅决可否正平二年二月中常侍宗愛弑逆立南安王余十月又賊余於殿中尚書長孫渴侯與尚書陸麗奉迎皇孫即帝位於永安前殿改元興安元年十二月𥘉復佛法二年二月發京師五千人穿天淵池是月劉義隆子劭殺其父而自立夏五月行幸崞音郭山是月劉邵弟駿殺劭而自立閏月太后赫連氏崩八月詔曰朕以眇身纂承大業即位以來百姓宴安風雨順序邊方無事衆瑞兼呈不可稱數又於内苑獲方寸玉印其文曰子孫長壽羣公卿士咸曰休哉豈朕一人尅臻斯應實由天地祖宗降祐之所致也思與兆庶共兹嘉慶其令民大酺三日諸殊死已下各降罪一等興光元年二月帝至道壇受圖籙七月皇子弘生大赦改元太安元年遣尚書穆㐲真等二十人廵行州郡觀察風俗二年春正月立皇后馮氏二月丁巳立皇子弘爲皇太子大赦天下三年冬十月將東廵狩詔太宰常英起行宫於遼西黄山四年春正月至遼西黄山宫二月登碣石山觀滄海大饗羣臣於山上班賞進爵各有差改碣石爲樂遊山築壇記日行於海濵冬十月北廵至隂山有古塚毀發詔曰昔姬文葬枯骨天下歸仁自今有穿毀墳塚者斬之和平二年正月詔曰刺史牧民爲萬里之表自項毎因發調逼民假貸大啇冨賈射時利旬日之間増嬴十倍上下同通分以閏屋故編户之家困於凍餒豪冨之門日有兼積爲政之弊莫過於此其一切禁絶犯者十疋以上皆死布告天下咸令知禁二月行幸中山遂幸信都車駕所過皆親對髙年問民疾苦詔民年八十以上一子不從役靈丘南有山髙四百餘丈乃詔羣臣仰射山峯無能踰者帝彎弧發矢出山三十餘丈過山南二百二十歩遂刋石勒銘三年冬十月詔曰夫三代之隆莫不崇尚年齒今選舉之官多不以次令班白處後晚進居先豈所謂彛倫攸叙者也諸曹選𥙷宜各先盡勞舊才能十二月制戰陣之法十有餘條因大灘曜兵有飛龍騰虵魚麗之變以示威武四年春三月賜京師民年七十巳上太官厨食以終其年夏四月上幸西苑觀射虎三頭五月行幸隂山秋七月詔曰朕毎歲閏月命羣臣講武平壤所幸之處必立宫壇縻費之功損勞非一冝仍舊貫何必改作也八月遂由於河西詔曰朕順時田獵而從官殺獲過度旣殫禽獸乖不圍之義其勑從官及典圍者將校自今巳後不聽濫殺其田獲皮肉別目頒頼十二月詔曰名位不同禮亦異數所以殊等級示軌儀今䘮葬嫁娶之禮未備貴勢豪冨越度奢靡非所謂式昭典憲者也有司可爲之條格使貴賤有章上下咸序著之于令詔曰夫婚姻者人道之始尊卑髙下宜令區別然中古以來貴族之門多不率法或貪利財賄或因縁私好在於茍合無所擇選今貴賤不分巨細同貫塵穢清化虧損人倫將何以宣示典謨垂于來裔今制皇族肺腑王公侯伯及士民之家不得與百工伎巧卑姓爲㛰犯者加罪六年四月破洛郍國獻汗血馬普嵐國獻寳劒五月帝崩於太華}
