  - {type: variant, offset: 3029, length: 315, content: 拜公侯將軍刺史太守尚書郎已下悉用文人帝初拓中原留心慰納諸王大夫詣軍門者無少長皆引入賜見存問周悉人得自盡茍有微能咸蒙敘用冬十月車駕出井陘十一月進軍中山引騎圍之二年春正月饗群臣於魯口慕容寶遣其左衛將軍慕容騰寇愽陵殺中山太守及高陽諸縣令長抄掠租運是時信都未下帝乃進軍引騎圍之寶將軍張讓讓護軍將軍徐超率將吏以下舉城降寶聞帝幸信都乃趣愽之深澤屯滹沱水遣弟賀麟寇楊城三月車駕次于盧奴寶遣使求和解焉仍請割常山以西奉魏乞守中山以東帝許之已而寶背約車駕次中山命諸將圍之是夜寶弟賀麟妻子出走西山寶見賀麟走恐先據和龍壬子夜遂將其妻子及兄弟親族數千騎北遁城內共立慕容普鄰為主麟復入中山殺普鄰而自立九月賀麟飢窮率三萬餘人出寇新市甲子晦帝進軍討之太史令晁崇奏, krp: ''}
