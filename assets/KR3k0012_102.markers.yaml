  - {type: variant, offset: 4270, length: 0, content: '', krp: 𥘉帝母旣賜死太祖乃召帝告曰昔漢武帝將立其子而殺其母不令婦人預國政使外家爲亂汝當繼統故吾逺同漢武爲長乆之計帝素純孝哀泣不能自勝太祖怒之帝還宫哀不自止日夜號泣太祖知又召之帝欲入左右諌曰孝子事父小杖則受大杖則避之今陛下怒盛入或不測䧟帝於不義不如且出待和解而進不晚也帝從之乃遊行於外天賜六年冬十月即皇帝位大赦改元爲永興元年追尊皇妣爲宣穆皇后公卿大臣先罷歸第不與朝者悉復登用之}
