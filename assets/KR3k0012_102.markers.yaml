  - {type: variant, offset: 3107, length: 0, content: '', SBCK: 所致也思與兆庶共兹嘉慶其令民大酺三日諸殊死已下各降罪一等興光元年二月帝至道壇受圖籙七月皇子􅀪生大赦改元太安元年遣尚書穆㐲真等二十人廵行州郡觀察風俗}
  - {type: variant, offset: 3107, length: 0, content: '', WYG: 帝詔皇孫為書致馬通問焉正平元年二月車駕濟河次于魯口皇太子朝於行宫三月車駕至自南伐飲至䇿勲告於宗廟夏五月大赦六月改元十月封皇孫濬為高陽王尋以皇孫世嫡不宜在藩乃止改封秦王翰為東平王燕王譚為臨淮王楚王建為廣陽王呉王余為南安王二年二月帝崩於永安宫在位二十九年時年四十五秘不發喪中常侍宗愛矯皇后令殺東平王翰迎南安王余入而立之大赦改元為承平三月上尊諡曰太武皇帝葬於雲中金陵廟號世祖冬十月余為宗愛所賊殿中尚書長孫渴侯與尚書陸麗迎立皇孫是為高宗帝生不逮密太后及有所識言則哀慟悲感傍人太宗聞而嘉歎暨太宗不豫衣不釋帶性情儉率素服御飲膳取給而已不好珍麗食不二味所幸昭儀貴人衣無縑綵羣臣白帝更峻京邑城隍以從周易設險之義又陳蕭何壯麗之説帝曰古人有言在德不在險屈丐蒸土築城而朕滅之豈在地也天下未平方須民力土功之事朕所未為蕭何之對非雅言也每以財者軍國之本無所輕費至於賞賜皆是死事勲績之家親戚愛寵未曾橫有所及高宗文成皇帝後魏書曰高宗文成皇帝諱濬景穆皇帝之長子也母郁乆閭氏真君元年六月生於東宫帝少聰達世祖愛之常置左右號世嫡皇孫年五歲世祖北巡帝從在後逢虜帥桎一奴欲加其罰帝謂之曰奴今遭我汝宜釋之帥奉命解縛世祖聞之曰此兒雖小欲以天子自處意竒之既長風格異常每有大政常參決可否正平二年二月中常侍宗愛逆立南安王余十月又賊余於殿中尚書長孫渴侯與尚書陸麗奉迎皇孫即帝位於永安前殿大赦改元興安元年十二月初復佛法二年二月發京師五千人穿天淵池是月劉義隆子劭殺其父而自立夏五月行幸崞音郭山是月劉劭弟駿殺劭而自立閏月太后赫連氏崩八月詔曰朕以眇身纂承大業即位以來百姓晏安風雨順序邊方無事衆瑞兼呈不可稱數又於内苑獲方寸玉印其文曰子孫長壽羣公卿士咸曰休哉豈朕一人克臻斯應實由天地祖宗降佑之所致也思與兆庶共兹嘉慶其令民大酺三日諸殊死已下各降罪一等興光元年二月帝至道壇登受圖籙七月皇子𢎞生大赦改元大安元年遣尚書穆伏眞等三十人巡行州郡觀察風俗}
