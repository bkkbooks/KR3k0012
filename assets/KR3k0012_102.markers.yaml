  - {type: variant, offset: 3345, length: 914, content: 不吉帝曰其義云何對曰昔紂以甲子亡兵家忌之帝曰紂以甲子亡周武不以甲子勝乎崇無以對冬十月帝進軍西市賀麟退阻泒水依漸洳澤以自固甲戍臨其營戰於義室塢大破之斬首九千餘級賀麟單馬走西山遂奔鄴慕容德殺之中山平遣三萬騎赴衛王儀將以攻鄴天興元年春正月慕容德走保滑臺克鄴車駕幸鄴巡登臺榭觀覽宮城將有定都之意乃置行臺以龍驤將軍曰南公和跋為尚書與左丞賈尋率郎吏及兵五千人鎮鄴車駕自鄴還中山所過存問百姓詔大軍所在州郡復貲租一年除山東民租賦之半車駕將北還發卒萬人通直道自望都鐵關鑿恒嶺至代五百餘里六月詔有司議定國號群臣奏曰昔周秦以前帝王居所生之土有國有家及王天下即承為號自漢以來罷侯置守時無世繼其應運而起者皆不由尺土之資今國家萬世相承啟基雲代臣等以為若取長遠應以代為號詔曰昔朕遠祖總御幽都控制遐國雖踐王位未定九州迨于朕躬百代之季天下分裂諸華乏主民俗雖殊撫之在德故躬率六軍掃平土宇凶逆蕩除遐邇率服宜仍先號為魏焉秋七月遷都平城始營宮室建宗廟立社稷八月詔有司正封畿制郊甸端經術摽道里平五權較五量定五度冬十月起天文殿十有一月詔尚書吏部郎中鄧淵典官制立爵品定律呂協音樂儀曹郎中盧謐撰郊廟社稷朝覲饗宴之儀三公郎中王德定律令申科禁太史令晁崇造渾儀考天象吏部尚書崔玄伯總而裁之十有二月帝駕臨於天文殿太尉司徒進璽綬百官咸稱萬歲大赦改年追尊成皇帝已下及后號謚樂將皇始之舞詔有司議定行次尚書崔玄伯等奏從土德服色尚黃數用五未社辰臘犧牲用白五郊立氣宣贊時令敬授民時行夏之正徙六州二十二郡守宰豪傑吏民二千家于代都二年春正月初祠上帝于南郊以始祖神元皇帝配降壇視燎成禮而反二月破高車以所獲之眾起鹿苑於南臺陰北距長城東苞白登屬之西山廣輪數十里鑿渠引武川水注之苑中䟽為三溝分流宮城內外又穿鴻鴈池三月初令五經群書各置博士增國子太學生員三千人秋七月起天華殿大閱于鹿苑饗賜各有差冬十月太廟成遷神元平文昭成獻明皇帝神主于太廟三年三月立皇后慕容氏是月穿城南渠通於城內作東西魚池夏四月姚興遣使朝貢五月車駕東巡遂幸涿鹿遣使者以太牢祠帝堯帝舜廟七月車駕還宮起大中殿及雲母堂金華室四年三月帝親漁薦于寢廟五月起紫極殿玄武樓冬十二月集博士儒生比眾經文字義類相從凡四萬餘字號曰眾文經六年冬十月起西昭陽殿乙卯立皇子嗣為, krp: ''}
