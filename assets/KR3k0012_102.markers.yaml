  - {type: variant, offset: 4247, length: 1, content: 起, SBCK: 詔曰夫三代之隆莫不崇尚年齒今選舉之官多不以次令班白處後晚進居先豈所謂彛倫攸叙者也諸曹選􅀘宜各先盡勞舊才能十二月制戰陣之法十有餘條因大灘曜兵有飛龍騰虵魚麗之變以示威武四年春三月賜京師民年七十巳上太官厨食以終其年夏四月上幸}
