  - {type: variant, offset: 4310, length: 222, content: 夏帝不豫初服寒食散自太醫令陰羗死後藥數動發至此逾甚而災變屢見憂懣莫困切不安或數日不食或不寢達旦歸咎群下喜怒乖常謂百寮左右曰人不可信慮如天文之占或有肘腋之虞追思既往成敗得失終日竟夜獨語不止若傍有鬼物對揚者朝臣至前追其舊惡便見殺害其餘或有顏色變動或以喘息不調或以行步乖節或以言詞失措帝皆以為懷惡在心變見於外乃手自毆擊死者皆陳天安殿前於是朝野人情各懷危懼有司廢怠莫敢相督攝百工偷劫盜賊公行巷里之間人為稀少帝亦聞之曰朕故縱之使然待過災年當更清治之耳冬十, SBCK: 四月破洛郍國獻汗血馬普嵐國獻寳劒五}
