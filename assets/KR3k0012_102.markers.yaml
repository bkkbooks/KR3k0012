  - {type: variant, offset: 208, length: 1, content: 聰, WYG: 其子而殺其母不令婦人預國政使外家為亂汝當繼統故吾逺同漢}
  - {type: variant, offset: 210, length: 4, content: 明智遠近, WYG: 為長久之計帝素純孝哀泣不能自勝太祖怒之帝還宫哀不自止日夜號泣太祖知而又召之帝欲入左右曰孝子事父小杖則受大杖避之今陛下怒盛入或不測陷帝於不義不如且出待怒解而進不晩也帝從之乃遊行逃於外天賜六年冬十月即皇帝位大赦改元為永興元年追尊皇妣為宣穆皇后公卿大臣先罷歸不與朝政者悉復登用之是歲乞伏乾歸自稱秦王海夷馮跋僭號自稱大燕天王三年春二月詔曰衣食足知榮辱夫人飢寒切已惟恐朝夕不濟}
  - {type: page-break, offset: 210, content: '', id: KR3k0012_WYG_102-2a, image: WYG0893/WYG0893-0828c.png}
  - {type: variant, offset: 211, length: 298, content: 智遠近所推統國三十六大姓九十威振北方莫不率服成帝崩節皇帝諱貸立節帝崩其後四世宣帝諱推寅立南遷大澤方千餘里厥土昏冥沮洳謀更南徙未行而崩其後六世獻皇帝諱鄰立時有神人言於國曰此土方遐未足以建都邑宜復徙居帝年時衰老乃以授予聖武帝諱詰汾獻帝命令南移山谷高深九難八阻於是欲止有神獸其形似馬其聲類牛先行導引歷年乃出始居匈奴之故地其遷徙策略多出宣獻二帝故時人並號曰推寅蓋俗云鑽研之義初聖武帝常率數萬騎田於山澤欻見輜軿自天而下既至見美婦人侍衛甚盛帝異而問之對曰我天女也受命相偶遂同宿旦請還曰明年同時復會於此言終而別去如風雨及朞帝至先所遊處果復相見天女以所生男授帝曰此君之子也善視之子孫相承當世為帝王語訖而去即始祖神, krp: ''}
