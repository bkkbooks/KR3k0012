  - {type: variant, offset: 2663, length: 0, content: '', WYG: 太宗有疾命帝總攝百揆聰明大度意豁如也八年十一月即皇帝位大赦天下十有二月追尊皇妣為密皇太后進司徒長孫嵩爵為北平王司空奚斤為宜城王藍田公長孫翰為平陽王其餘普増爵位各有差始光元年夏四月東巡幸大寧二年三月尊保母竇氏曰保太后庚申營故東宫為萬壽宫起永安安樂二殿臨望觀九華堂初造新宇千餘詔曰昔帝軒剙制造物乃命倉頡因鳥獸之跡以立文字繼厯久逺傳習多失其眞今制定文字世所用者頒下逺近永為楷式是年赫連屈丐死子昌僭立三年春二月起太學於城東祀孔子以顔淵配十有一月帝率輕騎二萬襲赫連昌至其城下徙萬餘家而還十有二月武都氐王楊𤣥及沮渠蒙遜等皆遣使内附四年春正月赫連昌遣其弟平原公定率衆二萬向長安帝聞之乃遣就陰山伐木大造攻具二月車駕還宫三月遣高陽王禮鎭長安詔執金吾桓貸造橋於君子津五月車駕西討赫連昌濟君子津至于黑水帝親祈天告祖宗之靈而誓衆焉六月昌引衆出城大破之車駕入城虜昌羣弟及其諸母姊妹妻妾宫人萬數府庫珍寶車旗器物不可勝計八月壬子車駕至自西伐飲至䇿勲告於宗廟班軍實以賜畱臺百寮各有差冬十有一月以氐王楊𤣥為都督荆梁益寧四州諸軍事假征南大將軍梁州刺史南秦王神䴥}
