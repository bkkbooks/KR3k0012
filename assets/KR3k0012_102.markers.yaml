  - {type: variant, offset: 215, length: 3, content: 推統國, WYG: 急者溫飽而已何暇及於仁義之事乎王教之多違蓋由於此非夫耕婦織内外相成何以家給人足其簡宫人非所當御及執作伎巧自餘悉出以賜瘝民}
