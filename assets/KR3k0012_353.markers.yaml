  - {type: variant, offset: 5, length: 1, content: 戟, SBCK: 公領兵入見皆交㦸义頸而前􅀄曹公將討張繡入覲天子時始復此制公自是不敢朝見一出郭頒丗語孫盛異同難語曰太祖甞私入中常侍張讓室讓覺之乃舞手㦸于庭前踰垣而出材力絶人莫之能害于寳捜神記曰漢武帝時張寛爲楊州刺史先是有二老翁争山地詣州訟疆界連年不决寛視事復來寛視二翁形􅃺非人令卒持㦸將入問汝何等精翁欲走寛呵格之化爲巨虵又曰成都王之攻長沙也反軍于鄴内外陳兵是夜㦸鋒皆有火遥望如懸燭就則亡焉三十國春秋又載劉敬叔異苑曰彭城劉黃雅以太元中爲京口府佐􅀍使還都路經竹里亭多虎劉極自防衛牛馬繫於户前手㦸布於地}
