  - {type: variant, offset: 3320, length: 136, content: 朔執戟在殿陛遙指獨語上見呼問之朔對曰殿後柏樹上有鵲立枯枝上東向鳴上遣侍中視之如朔言上問何以知之朔曰風從東來鵲尾旁風則傾背風則蹶必當順風而立故知東向鳴也新雨生枝滑故枝澀故立枯枝上上大笑賜帛十疋又曰孝武元封三年作柏梁臺召群臣有能為七言者乃得上坐衛尉曰周衛交戟禁不時陳壽益部耆舊, SBCK: 列女}
