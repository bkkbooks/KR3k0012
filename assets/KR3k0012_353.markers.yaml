  - {type: variant, offset: 2635, length: 237, content: 將軍戎服執戟前導觀者指曰此故長安天子崔鴻後趙錄曰冉閔所乘赤馬曰朱龍日行千里左杖雙刃矛右執鉤戟斬鮮卑三百餘級齊書曰宋升平三年尤里封人於官高湖際得瑞靸蘇合切戟三杖旁有古字隋書曰柳彧為屯田侍郎固讓弗許時制三品已上門皆列戟左僕射高熲子弘德封應國公申牒請戟彧判曰僕射之子更不異居父之戟槊已列門外尊有厭卑之義子有避父之禮豈容外門既設內閣又施事竟不行熲聞而歎伏家語曰孔子北遊登于農山之上子路子貢顏回侍側孔子曰二三子各言爾志吾將擇焉顏回曰回願得明王聖主而相之敷其五教導之禮樂使城郭不脩溝池不, krp: 俱蕩九騎留呉}
