  - {type: variant, offset: 7, length: 0, content: '', WYG: 宵中士庶同睡虎乗間跳入跨越人畜獨取劉而去劉義慶幽明録曰項縣姚牛十餘歳父為鄉人所殺牛常賣衣服市刀㦸圖欲報讎後在縣門前相遇手刃之於衆中東陽無疑齊諧記曰東陽郡朱子之有一鬼恒來其家子之兒病心痛鬼曰待我為汝尋方云燒虎凥飲即差汝覔大㦸與我我為汝取也其家便持㦸與鬼鬼持㦸去須臾還放㦸中庭擲虎凥着地猶尚暖束晢發䝉記曰師子五色而食虎於巨木之岫一噬則百人仆唯畏鈎㦸顧愷啓蒙記曰玉精名委似美女而青衣見以挑㦸刺之以其名呼之可得也周處風土記曰㦸長一丈三尺奮揚俯仰乍跪乍立兼五兵而能乃謂名人又曰敎學講武戒逺慮戎首𤣥戈奮長雄迎來送往斫截横從扶強頓弱唯敵所從首先也𤣥戈北斗杓端招揺之内貫索之外獨星也㦸為五兵雄蓋取威㑹振也尤國㦸法先小送動之陵上攝逆下收功扵中國在首領之間來迎去順而下也植則虎龍交互神變無常去者厚餞來者不攘言用雙㦸之法交㦸相向左手為龍右手為虎更出更入更上更下上下無常隨變而改顛倒入懐轉如回風敵若孤勝攝㦸徐反可謂上下無常非為邪也進退無恒非離羣也蓋其進足奮手欲及機也如敵來輜去疾進而送之來重進疾開而待之南中八郡志曰永昌郡西南三千里有驃國以金為刀㦸焦贛易林曰桃弓葦㦸除殘去惡又曰倚鋒據㦸傷我胷臆春秋考異郵曰劉子單子挾猛入城天王奔走尹氏立朝國有三王天下兩生周分為二莫能救討強弩張於前長㦸㧞於後管子曰黄帝問於伯髙伯髙曰雍孤之山發水出金蚩尤受而制之以為雍孤之㦸晏子春秋曰景公飲酒移於晏子前驅欵門曰君至晏子立於門曰君何為非時而夜辱公曰酒醲之味金石之聲願與夫子樂之晏子曰夫鋪薦蓆陳簠簋者有人臣不敢與焉又移司馬穰苴介胄操㦸立於門曰鋪薦蓆陳簠簋者有人臣不敢與焉又曰崔杼殺莊公盟諸大夫令有敢不盟者㦸鈎其頸孫卿子曰雖有戈矛之㦸不如恭儉之利與人善言煖於布帛傷人以言深於矛㦸又曰孤父戈以钃牛愚莫甚焉钃徐玊切史曰鉏耰棘矜非錟音淡於句㦸長鎩也如淳曰長刃矛也又曰矛刀下有鐵上句曲然而成敗異變功業相反也尉繚子曰夫殺之五十歩之内者誰也曰矛㦸也韓子曰譬如劒㦸愚人行忿則禍生聖人誅暴則福成淮南子曰孟夏之月南宫御女赤色衣赤采吹竽笙其兵㦸髙誘曰有枝幹象陽布散也劉向新序曰趙簡子上羊腸之坂羣臣皆偏袒推車而虎㑹獨擔㦸行歌簡子曰寡人上坂㑹獨不推車而侮其上者其罪何若㑹曰為人臣侮其主者其罪死而又死簡子曰何謂死而又死虎會對曰身死妻子又死謂之死而又死又曰齊景公遊海上樂之六月不歸令左右敢言歸者死顔􅢴諌曰君樂治海上不樂治國儻有治國者君且安得出樂海也公據㦸將斫之􅢴撫衣而待之曰君奚不斫也昔桀殺關龍逢紂殺王子比干君奚不斫臣以參此二人不亦可乎公遂歸抱朴子曰太阿臨項長㦸指心而操不可奪也又曰拙者得工輸之斤斧不能以成雲梯怯者得馮婦之刀㦸不能以擒兕虎蔣子曰士有一餐而倒㦸義所驅也應璩詩曰丈夫要雄㦸更來宿紫庭今者宅四海誰復有不并又曰郡國募將士馳騁習弓㦸雖妙未更事難用應卒廹司馬相如上林曰曵明月之珠旗建干將之雄㦸干將韓王劍師雄㦸干將所造也左思吳都賦曰吳鈎越棘楚鐵利故稱越棘也又曰羽旄揚㽔雄㦸耀鋩繁欽撰征賦曰左倚雄㦸右攅干將兩都賦曰郎將司階虎㦸交鎩音殺又曰周蘆千列陛㦸百重陶侃表曰伏惟武庫傾蕩宿衛有失輙簡選其差可者奉獻金鈴大㦸五十張孫盛奏事曰諸違令私作鎧一領角弩力七石以上一張㦸十枚以上皆棄市張載劒閣銘曰一人荷㦸萬夫趦趄難行貎也李尤㦸銘曰鼔㦸之設以戒非常秉執操持邪暴是防須臾之分終日為殃山陸之禍起於豪芒張恊手㦸銘曰錟錟雄㦸精金練鋼名配越棘用過干將嚴鋒勁校摛鍔耀芒魏文帝書曰漢中地形實為險固四嶽三塗皆不及也張魯有精甲數萬臨髙守要一夫掉㦸千人不得進而我軍過之若駭鯨之决網罟奔兕之觸魯縞未足以喻其易應瑒表曰長㦸百萬胡馬千羣應真華覽曰强弩連城長㦸指塞傅𤣥朝㑹賦曰流蘇粲粲華蓋重隂羽林虎旅長㦸􅀈摻上音寅下音參賈誼過秦論曰陳渉以戍卒散亂之衆數百奮臂大呼不用弓㦸之兵鉏耰音優白梃横行天下秦人長㦸不刺强弩不射楚師深入戰於鴻門曽無藩籬之艱殳}
