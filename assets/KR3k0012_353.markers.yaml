  - {type: variant, offset: 1187, length: 763, content: 漢躬被甲持戟告令諸部將曰聞鼓聲皆大呼俱進後至者斬遂鼓而進賊兵大破又曰建武四年隗囂遣馬援奏課京師因曰臣與公孫述同縣少小相善臣前往蜀述陛戟乃見臣今臣遠從異方來陛下何以知臣非刺客奸人而簡易若是上大笑又曰田邑字伯玉為上黨太守時更始遣鮑永馮衍屯太原永衍恐其先降說之曰晏嬰臨盟擬以曲戟不易其辭又曰楊政字子行師事愽士范升建武中范升為太常丞為去妻所誣告坐事繫獄當伏重罪政以車駕出時伏道邊抱升子持車叩頭武騎虎賁恐驚馬引弓射之不去旄頭以戟叉政傷胸前政遂涕泣求哀上即尺一出升又曰孫程與王康等斬江京等迎立濟陰王是為順帝閻顯弟景為衛尉從省中還外府收兵至盛德門尚書郭鎮率直宿羽林出逢景景因斫鎮不中鎮劍擊景墮車左右以戟叉其胸禽之送廷尉謝承後漢書曰彭循字子陽太守祕君聞循義勇多謀請循以守吳令民歌之曰時歲倉卒盜賊縱橫大戟強弩不可當賴遇賢令彭子陽司馬彪續漢書曰楊仁字文義巴郡人顯宗特詔補北宮衛士及帝崩時諸馬貴盛各爭欲入宮仁被甲持戟嚴勒門衛莫敢輕進者肅宗既立諸馬共譖仁上知其忠愈善之張瀅漢南記曰陳蕃等欲除諸黃門謀泄閽寺之黨於宮中詐稱驚云外有反者蕃奔入宮小黃門朱寓逆以戟刺蕃魏志曰董卓恐人謀己常以呂布自衛嘗失意拔手戟擿布布拳捷之由是陰怨卓英雄記又載呂布詣董卓卓嘗拔戟擲之言布亂其私室又曰袁術遣將紀靈等步騎三萬攻劉備備求救於呂布嚴步兵千騎二百馳往赴備布謂靈等曰布性不憙合鬥但憙解鬥耳布令門候於營門中舉一只戟布言諸君觀布射戟小枝一發中者諸君當解去不中可留鬥布舉弓射戟正中小枝諸將皆驚言將軍天威也明日歡會然後各罷又曰張繡反襲太祖營太祖出戰不利典韋以長戟左右擊之一叉輒十餘𨥨音矛摧左右死傷者略盡韋被數十創短兵接戰賊前搏之韋雙挾兩戟擊殺之餘賊不敢前又曰典韋好持大雙戟與長刀軍中為之語曰賬下壯士有典軍持一雙戟八十斤王沈魏書曰太祖討呂布於濮陽布有別屯在濮西相持太祖募隱陳典韋先占但, SBCK: 衣木履}
