  - {type: variant, offset: 2244, length: 628, content: 錄曰嚴白虎使弟輿詣長沙桓王請和許之輿請與王獨會面約既會王引白削斫席輿體動王知其無能以手戟投之立死蜀志曰兩鑲音孃是謂閉木戶持雙戟是謂坐鐵室也常璩華陽國志曰荊邯記公孫述曰昔漢祖敗而復征故能禽秦亡楚以弱為強況今地方數千杖戟百萬晉書曰賈后字南風初為太子妃性酷虐嘗手殺數人或以戟擲孕妾子隨刃隨地帝聞之大怒欲廢之又曰楊駿字文長為賈后所誅初溫縣有人如狂造書曰光光文長大戟為牆毒藥雖行戟還自傷及駿居內府以戟為衛至兵入駿府逃于馬廄以戟殺之又曰裴楷有知人之鑒謂鍾會如觀武庫森森見矛戟在前王隱晉書曰上聞賈妃酷妬戟擿諸孕子者皆墮已治金墉城當廢之趙粲救於內荀勗請於外故不廢焉又曰祖逖軍大飢進據食犬丘城樊雅遣六十餘人入逖營拔戟楯大呼向逖逖軍人夜不知何賊多少皆欲散走崔鴻前趙錄曰杜育字子光濮陽人少為賊其母每怒育曰天下將亂且以習膽如意望封侯不如意但不使他斫人頭曾為賊圍衣甲三重持戟蓬轉而出又曰劉聰獵上林以愍帝行車騎將軍戎服執戟前導觀者指曰此故長安天子崔鴻後趙錄曰冉閔所乘赤馬曰朱龍日行千里左杖雙刃矛右執鉤戟斬鮮卑三百餘級齊書曰宋升平三年尤里封人於官高湖際得瑞靸蘇合切戟三杖旁有古字隋書曰柳彧為屯田侍郎固讓弗許時制三品已上門皆列戟左僕射高熲子弘德封應國公申牒請戟彧判曰僕射之子更不異居父之戟槊已列門外尊有厭卑之義子有避父之禮豈容外門既設內閣又施事竟不行熲聞而歎伏家語曰孔子北遊登于農山之上子路子貢顏回侍側孔子曰二三子各言爾志吾將擇焉顏回曰回願得明王聖主而相之敷其五教導之禮樂使城郭不脩溝池不, WYG: ''}
