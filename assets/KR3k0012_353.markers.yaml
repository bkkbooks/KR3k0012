  - {type: variant, offset: 3459, length: 163, content: 霸遷會稽太守是後盜賊衰少野無遺寇童謠曰棄若戟棄若矛盜賊盡吏皆休蕭廣濟孝子傳曰魏陽不知何處人獨與父居父有刀戟市南少年求之陽曰老父所服不敢相許少年怒道逢陽父打傷叩頭請罪父沒陽斷少年頭以謝父冢前師覺授孝子傳曰仲子崔者仲由之子也子路仕衛赴蒯聵之亂衛人于黶遂殺之子崔既長欲報父讎黶知之曰夫君子不掩人之不備須後日於城西決戰其日黶持滿弓木戟, SBCK: 奐}
