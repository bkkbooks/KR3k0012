  - {type: variant, offset: 7, length: 0, content: '', SBCK: 宵中士庶同睡虎乗間跳入跨越人畜獨取劉而去劉義慶幽明録曰項縣姚牛十餘歳父爲郷人所殺牛常賣衣物市刀㦸圖欲報讎後在縣門前相遇手刄之於衆中東陽無疑齊諧記曰東陽郡朱子之有一􅀑􅁪來其家子之兒病心痛􅀑語之我爲汝尋方云燒虎丸飲即差汝覔大㦸與我我爲汝取也其家便持㦸與􅀑􅀑持㦸去湏􅁷還放㦸中庭擲虎丸着地猶尚暖束晢發蒙記曰師子五色而食虎於巨木之岫一噬則百人仆唯畏鈎㦸顧愷啓蒙記曰玉精名委似美女而靑衣見以桃㦸刺之以其名呼之可得也周處風土記曰㦸長一丈三尺􅁬楊俯仰乍跪乍立兼五兵而能乃謂名人又曰教學講武戒逺慮戎首玄戈􅁬長雄迎來送徃斫截横從扶強頓弱唯敵所從首先也玄戈北斗杓端招摇之内貫索之外獨星也㦸爲五兵雄盖取威􅁬振也凢用㦸法必先小振動之陵上攝下收功於中􅁪在首煩之間來迎去送順而不逆也植則虎龍交牙神變無常去者厚餞來者不攘言用雙㦸之法交相向左手爲龍右手爲虎更出更入更上更下上下無常隨變而改顚倒入懷轉如回風敵斃􅀌勝攝㦸徐反可謂上下無常非爲邪也進退無􅁪非離羣也蓋乃進足􅁬手欲及機也如敵來輕去疾進而送之來重進疾開而待之南州八郡志曰宋昌郡西南三千里有剽國以金爲刀㦸焦贑易林曰桃弓葦㦸除殘去惡又曰􅀝鋒據㦸傷我胷臆春秋考異郵曰劉子單子折猛入城天王奔走尹氏立朝國有三王天下兩主周分爲二莫能救討強弩張於前楴音剃㦸拔於後管子曰黃帝問於伯髙伯髙曰雍狐之山發水出金􅃖尤受而制之以爲雍狐之㦸晏子春秋曰景公飲酒移於晏子前驅欵門曰君至晏子立於門曰君何爲非時而夜辱公曰酒醴之味金石之聲願與夫子樂之晏子曰夫鋪薦席陳簠簋者有人臣不敢與焉又移司馬穰苴介胄操㦸立於門曰鋪薦蓆陳簠簋者有人臣不敢與焉又曰崔杼殺莊公盟諸大夫令有敢不盟者㦸鈎其頸孫卿子曰雖有戈矛之㦸不如恭儉之利與人善言煖於布帛傷人以言深於矛㦸又曰狐父戈以钃牛愚莫甚焉钃徐玉切又曰鉏擾􅁄矜非錟音談於句㦸長也如淳曰長刄矛也又曰矛刄下有鐵上句曲然而成敗異變功業相反也尉繚子曰夫殺之五十歩之内者誰也曰矛㦸也韓子曰譬如劒㦸愚人行忿則禍生聖人誅暴則福成淮南子曰孟夏之月南宫御女赤色衣赤采吹竽笙其兵㦸髙誘曰有披幹象陽布散也劉向新序曰趙簡子上羊膓之坂群臣皆偏􅃝推車而席會獨擔㦸行歌簡子曰寡人上坂會獨不推車而侮其主者其罪何􅀂會曰爲人臣侮其主者其罪死而又死簡子曰何謂死而又死席會對曰身死妻子爲戮謂之死而又死又曰齊景公遊海上樂之六月不歸令左右敢言歸者死顔歜諌曰君樂治海上不樂治國儻有治國者君且安得樂此海也公據㦸將斫之歜撫衣而侍之曰君奚不斫也昔桀殺關龍逢紂殺王子比干君奚不斫以臣叅此二人不亦可乎公遂歸枹朴子曰太阿臨項長㦸指心而操不可奪也又曰拙者得工輸之斤斧不能以成雲梯怯者得馮婦之刀㦸不能以格兕虎蔣子曰士有一飡而倒㦸義所驅也應璩詩曰丈夫要雄㦸更來􅀫紫庭今者宅四海誰復有不并又曰郡國貪慕將馳騁習弓㦸雖妙未更事難用應卒迫司馬相如上林賦曰曳明月之珠旗建干將之雄㦸干將韓王劒師雄㦸干將所造也左思吴都賦曰吴鈎越􅁄越鐵利故稱越􅁄也又曰羽旄楊雄㦸耀芒繁欽撰征賦曰左􅀐雄㦸右攅干將兩都賦曰郎將司階虎㦸交煞音金殺又曰周廬千列陛㦸百重陶侃表曰伏惟武庫傾蕩􅀫衛有闕輙簡選其差可者奉獻金鈴大㦸五十張孫盛奏事曰諸違令私作鎧一領角弩力七石以上一張㦸十枚以上皆弃市張載劒閣銘曰人荷㦸萬夫趑趄難行皃也李尤㦸銘曰皷㦸之設以戒非常秉執操持邪暴是防湏􅁷之忿終日爲殃山陵之禍起於豪芒張恊手㦸銘曰錟錟音談雄㦸清金練鋼名配越􅁄用過于將嚴鋒勁枝摛鍔耀芒魏文帝書曰漢中地形實爲險固四嶽三塗皆不及也張魯有精鉀數萬臨髙守要一夫揮㦸千人不得進而我軍過之􅀂駭鯨之决網􅅈奔兕之觸魯縞未足以喻其易應㻛表曰長㦸百萬胡馬千群應貞華覽曰強弩連城長㦸指塞􅀓玄朝會賦曰流蘇粲粲華蓋重隂羽林虎旅長㦸㩋撡上音蕭下音參賈誼過􅁗論曰陳渉以戍卒散亂之衆數百􅁬臂大呼不用弓㦸之兵鉏擾音優白挺横行天下秦人長㦸不刺強弩不射楚師深入戰於鴻門曾無藩籬之艱殳}
