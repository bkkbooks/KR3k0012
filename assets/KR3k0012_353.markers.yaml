  - {type: variant, offset: 3133, length: 174, content: 布怒拔戟斫机曰不惟吾所求無獲但為卿父子所賣耳登不為動容徐對曰登見曹公言養將軍譬如養虎當飽其肉不飽則將噬人公曰不如卿言譬如養鷹飢則為用飽則颺去其言如此布意乃解王隆漢官解詁曰衛尉宮闕周廬殿掖屯陳夾道當兵交戟胡伯始曰謂諸門郎閣陳屯士夾其道旁當兵以示威武交戟以遮妄出入者也應劭漢官儀曰舊制太子食湯沐十縣家令領主自有宮置周衛交戟五日一朝因坐東廂省視膳食東方朔, SBCK: 反戰死之神仙}
