  - {type: variant, offset: 43, length: 0, content: '', SBCK: 兵􅄂則不利長兵以衛短兵以守太長則犯太短則不及太輕則閱閱則易亂太犯則不濟季氏曰兵長短相爲衛守合同爲用太長太短太輕皆不如法度者也犯者觸推故不濟不及者不還於利閱者不固則破敗故奔北走擾亂煩也故􅀄列即㦸間焉一弓一㦸相間也次列殳矛間焉一殳一矛相間也又曰周左執黃􅃏右執白旄所以不進者審察斬殺之威也有司皆執殳戈示諸鞭朴之辱歐使不行不進者也又曰弓矢圉殳矛守戈㦸助五兵長短各有所冝因事而施凡五兵當長以衛短短以救長以㦸則乆皆戰則疆淮南子曰武王執戈秉􅃏以勝殷搢笏杖殳以臨朝魏文帝詩曰行行遊且獵且獵路南隅彎我烏號弓騁我纎驪駒走者貫􅄡鏑伏者飢戈殳白日未及移手獲三十餘王粲七釋曰流鋒四射罼罕撗厲􅁬千殳而捎擊㢮鷹犬以􅅮噬罼音必夏侯湛獵兎賦曰擬以銳殳規以良弓都毫末而放鏃兮殪之于窟中左思吴都賦曰于鹵殳鋋賜夷勃盧殳鋋皆矛也謝惠連從軍行曰趙􅀐馳四牡吴舟浮三翼弓矛有恒用殳鋋無蹔息太公六韜曰方凶兩枝鐵义柄長三丈以上三百枝矛釋名曰矛冒也刄下冒矜也下頭曰鐏徂悶切鐏入地也松櫝長三丈其矜冝徑以松作之櫝速也前速之言也矛長丈八尺曰矟馬上所持言其矟矟便殺也又曰繳矛繳也可以繳截敵陣之矛也仇矛頭爲三义言以討仇敵之矛也矛㦸㦸}
