  - {type: variant, offset: 15, length: 0, content: '', WYG: 所撞直降切桎歩降切於車上使殊離也說文曰殳以杖殊人也禮殳以積竹八觚長丈二尺建於車又曰弓矢圍殳矛守戈㦸助五兵長短各有所宜因事而施凡五兵當長以衛短短以救長代逓則久皆戰則彊淮南子曰武王執戈杖鉞以勝殷搢笏杖殳以臨朝魏文帝詩曰行行遊且獵且獵路南隅彎我烏號弓騁我纎驪駒走者貫鋒鏑伏者驚戈殳白日未及移手獲三十餘王粲七釋曰流鋒四射畢罕横厲奮干殳而稍繫馳鷹犬以搏噬夏侯湛獵兔賦曰擬以銳殳規以良弓覩豪末而放鏇兮殪之于田中左思吳都賦曰干鹵殳鋋腸夷勃盧謝惠連從軍行曰趙騎馳四牡吳舟浮三翼弓矛有恒用矛鋋元蹔息太公六韜曰方凶支鐵殳柄長三丈以上三百}
