  - {type: variant, offset: 1179, length: 7, content: 吳漢與蘇茂周建, SBCK: 蜀李雄無事小出丞相楊裒於後持矛馳馬過雄雄恠問之對曰夫統天下之重者如乗惡馬持矛也急之則慮自傷緩之則懼其失是以馬馳而不制也雄寤即還晉太康起居注詔曰諸王中尉及諸軍皆典兵以備不虞乃有着中}
