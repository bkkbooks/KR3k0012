  - {type: variant, offset: 5, length: 1, content: 戟, WYG: 失伍世說曰舊制三公領兵入見皆交㦸义頸而前初曹公將討張繡入覲天子時始復此制公自是不敢朝見一出郭頌世語孫盛異同難語曰太祖嘗私入中常侍張譲室譲覺之乃舞手㦸于庭前踰垣而出材力絶人莫之能害于寶捜神記曰漢武帝時張寛為揚州刺史先是有二老翁争山地詣州訟疆界連年不决寛視事復來寛視二翁形狀非人令卒持㦸將入問汝何等精翁欲走寛呵格之化為巨蛇又曰成都王之攻長沙也反軍于鄴内外陳兵是夜㦸鋒皆有火遥望如懸燭就則無焉三十國春秋亦載劉敬叔異苑曰彭城劉黄雅以太元中為京口府佐被使還都路經行里亭多虎劉極自防衛牛馬繋于户前以㦸布於地}
