  - {type: variant, offset: 3458, length: 0, content: '', SBCK: 巴趙娥者趙萬之妻郡縣遭亂萬得足疾不能行爲賊所殺賊欲殺娥娥守喪不去賊舉矛指娥欲以怖之娥知賊必刼略乃以身赴矛貫心逹背而死劉敬叔異苑曰河間沐堅字壁強石勒時監作水田御下苛虐百姓怨毒爲堅形以刄矛斫刺呪令速斃堅尋得病􅀂􅀍捶割於是遂殞夢書曰矛㦸爲相待期蚤晚也夢得矛㦸者憂相勑也持矛待交友見人持矛待於巳也持矛來倒却中止也魏文帝詩曰戈矛成山林玄甲曜日光樂府左延年􅁗女休行曰始出上西門遥望􅁗氏廬􅁗氏有好女自名爲女休女休十四五爲宗行報讎左執白陽刀右執宛景矛}
