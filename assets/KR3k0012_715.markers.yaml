  - {type: variant, offset: 218, length: 5, content: 徐季龍取十, SBCK: 皇后入廟歩揺以黄金爲山題貫白珠桂枝相糺八爵九華熊虎赤羆天鹿辟邪後漢書曰和熹鄧后賜馮貴人赤綬以未有歩揺環佩各加賜一具晉書曰慕容廆曽祖莫護跋魏􅀄率其諸部入居遼西從宣帝伐公孫氏以功拜率義王始建國於􅁄城之北時燕代多冠歩摇冠護跋見之乃歛髮襲冠諸部因呼之爲歩摇其後音訛遂爲慕容焉江表傳曰務皓使尚方以金作歩揺假髻以千數令宫人着以相撲朝成夕敗輙命更作晉令曰歩揺蔽髻皆爲禁物西京雜記曰趙飛鷰爲皇后其女弟上遺黄金歩揺宋玉風賦曰主人之女垂珠歩揺梁沈靖妻沈氏歩揺花詩曰珠花縈翡翠寳葉間金瓊翦荷不似製爲花如自生低枝拂衣領微歩動揺英假髻周禮曰追師掌王后首服爲副鄭玄云副婦人首飾}
