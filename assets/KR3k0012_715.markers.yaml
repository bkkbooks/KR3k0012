  - {type: variant, offset: 351, length: 210, content: 畜梳枇而欲髮之治物理論曰威行法明漏吞舟之魚法之不明則數於細櫛細櫛則苛慝生也夢書曰夢梳枇為憂解也虱盡去百病愈傅咸櫛賦敘曰夫才之治世猶櫛之理髮涂岑詩曰思見君巾櫛以弭我勞慚蔡邕女誡曰用櫛則思其心之理高文惠與婦書曰今致瑇瑁梳一枚陸雲與兄機書曰按行視曹公器物梳枇皆在四愁詩曰美人遺我旃檀梳晉傅咸櫛賦曰我嘉茲櫛惡亂好理一髮不順實以為恥雖日用而匪懈不告勞而自已茍以理而委任期竭力以沒齒刷說文曰荔草似蒲而小根可作刷通俗文曰所以理髮謂之刷, SBCK: 得着假髻髲}
