  - {type: variant, offset: 1845, length: 234, content: 爭者若此之細則天下無爭矣文子曰廟戰者帝神化者王廟戰者法天道也神化者明四時也列子曰黃帝與炎帝戰于阪泉之野率熊羆狼豹貙虎而前驅鵰鶡鷹鳶為旗幟此以力使禽獸也孟子曰爭地以戰殺人盈野爭城以戰殺人盈城此所為率土地而食人肉罪不容於死也六韜曰以少擊眾必以日之暮以眾擊眾必以日之早穰苴兵法曰以戰去戰戰雖戰可也戰春不東秋不西月食還師所以止戰也古司馬兵法曰凡軍使法在己曰專與下畏法曰法軍無小聽戰無小利小聽謂輕弱敵人稱其虛弱危敗易勝以喜士眾沮備預也小利謂小敵擊誘於餌數為小戰也又曰凡五兵長以衛, SBCK: ''}
