  - {type: variant, offset: 2715, length: 2, content: 首尾, WYG: 不可犯也今不取必為後憂曹公不從居數月蜀降者說蜀中一日數十驚備斬之而不能禁也曹公悔之問曄曄曰今已小定未可擊也晉書曰何無忌南追桓𤣥與劉道規}
