  - {type: variant, offset: 127, length: 0, content: '', SBCK: 建康移書録之府州執事者並證康祖其夕在京遂得無恙追奔孫子曰歸師勿遏􅀂窮㓂退還依險而行人人懷歸敢能死戰徐觀其變勿逺截也後漢書曰曹公圍張繡於穰劉表遣兵救繡以絶軍後公將引還繡兵來追公軍不得進連營稍前到安衆繡與兵合守險公軍前後受敵公乃夜鑿險爲地道悉過輜重設竒兵㑹明賊謂公爲遁也悉軍來追縱竒兵歩􅀐夾攻大破之公謂荀彧曰虜遏吾歸師而與吾死地吾是以知勝矣又曰曹公征張繡於攘一朝引軍退繡自追之賈詡謂繡曰不可追必敗繡不從大敗而還詡謂繡曰更追之必勝繡曰不用公言以至於此今巳敗奈何}
  - {type: page-break, offset: 127, content: '', id: KR3k0012_SBCK_314-3a}
