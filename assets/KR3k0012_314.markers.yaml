  - {type: variant, offset: 1165, length: 2, content: 典略, SBCK: 春秋曰前􅁗符堅自征晉於壽春敗還長安慕容泓起兵于華澤堅將符叡竇衝姚萇討之叡以苪切符叡勇果輕敵不恤士衆􅇦聞其至也懼率衆將奔􅀜東叡馳兵邀之姚萇諌曰鮮卑有思歸之心冝馳令出􅀜不可遏也叡弗從戰于華澤叡敗績􅀍殺又曰夏赫連㪍㪍伐南涼秃髮傉檀大敗之駈掠二萬七千口牛馬羊數十萬而還傉檀率衆追之其將焦㓪曰㪍㪍天姿雄警御軍齊肅未可輕也今因抄掠之資率思歸之士人自爲戰難與爭鋒不如從温圍北趣萬解惟阻水結營制其咽喉百戰百勝之術也傉檀不從㪍㪍聞而大喜乃於楊武下峽鑿凌埋車以塞路㪍㪍乃勒衆逆擊大敗之殺傷萬計又}
