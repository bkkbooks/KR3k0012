  - {type: variant, offset: 2699, length: 1, content: 擊, SBCK: 兵固有先聲而後實者此之謂也韓信並從之燕齊從風而靡後漢書曰王莽兵攻昆陽光武自將歩􅀐千餘前去大軍四五里而陣㝷邑亦遣人數千合戰光武奔之斬首十級􅁗法斬首一賜爵一級故因謂斬首爲級諸部喜曰劉將軍平生見小敵怯今見大敵勇甚可怪也且復居前請助將軍光武復進㝷邑兵却諸部共乗之斬首數百千級連勝遂前時伯升㧞宛巳三日而光武尚未知乃僞使持書報城中云宛下兵到而陽墮}
