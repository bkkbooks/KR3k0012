  - {type: variant, offset: 4455, length: 116, content: 軍礪其鋒甲設其奇伏量其形勢遙則力疲而不及近則敵知而不應若不通此機乃智不及於鳥獸亦何能取勝於就寇乎仍須怒士勵眾使之奮勇故能無強陣於前無堅城於外以弱勝強必因勢也楊子雲長楊賦曰高祖奉命順斗極運天關橫巨海漂崑崙提劍而叱之所過麾城摲邑下將降旗, SBCK: 百}
  - {type: variant, offset: 4455, length: 243, content: 軍礪其鋒甲設其奇伏量其形勢遙則力疲而不及近則敵知而不應若不通此機乃智不及於鳥獸亦何能取勝於就寇乎仍須怒士勵眾使之奮勇故能無強陣於前無堅城於外以弱勝強必因勢也楊子雲長楊賦曰高祖奉命順斗極運天關橫巨海漂崑崙提劍而叱之所過麾城摲邑下將降旗一日之戰不可殫紀潘安仁西征賦曰追皇駕而驟戰望玉輅而縱鏑潘安仁射雉賦曰若夫多疑少決膽劣心捐內無固守出不交戰謝玄暉詩曰炎靈劍遺璽當塗駭龍戰李少卿答蘇武書曰疲兵載戰一以當千陸士衡辨亡論曰我陸公挫之西陸覆師敗績因而後濟絕命永安續以濡須之寇臨川摧銳蓬蘢之戰隻輪不反, WYG: 百十四}
