  - {type: variant, offset: 2965, length: 236, content: 多力者五兵鳩衣鐵甲操鐵杖以戰所擊無不碎所衝無不陷以車投車以人投人又曰趙簡子攻衛自將兵及戰且遠立又居於犀櫓之下鼓之而士不起簡子投桴而歎曰嗚呼士之弊一若此乎行人燭過免冑橫戈而進曰君不能耳士何弊之有簡子艴然作色曰寡人之無使而身自將是眾也子親謂寡人無能有說則可無說則死對曰昔吾先君獻公即位五年兼國十九用此士也惠公即位二年淫色暴嫚身好玉女秦人襲我去絳七十用此士也文公即位二年底之以勇三年而士盡果敢城濮之戰五敗荊人圍衛取曹拔石社定天子之位成尊名於天下用此士也亦有君不敢耳士何弊之有簡子, krp: ''}
