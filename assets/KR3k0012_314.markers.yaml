  - {type: variant, offset: 1165, length: 2, content: 典略, WYG: 春秋曰前秦苻堅自征晉於夀春敗還長安慕容泓起兵于華澤堅將苻叡竇衝姚萇討之苻叡勇果輕敵不恤士衆泓聞其至也懼率衆將奔關東叡馳兵邀之姚諫曰鮮卑有思歸之心宜馳兵出關不可遏也叡弗從戰于華澤叡敗績被殺又曰夏赫連勃勃伐南凉秃髪傉檀大敗之驅掠二萬七千口牛馬羊數十萬而還傉檀率衆追之其將焦朗曰勃勃天姿雄警大軍齊肅未可輕也今因抄掠之資率思歸之士人自為戰難與爭鋒不如從温圍北渡趣萬斛堆阻水結營制其咽喉百戰百勝之術也傉檀不從勃勃聞而大喜乃于陽武下陜鑿凌埋車以塞路勃勃乃勒衆逆擊大敗之又}
