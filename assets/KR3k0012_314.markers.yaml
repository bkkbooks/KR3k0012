  - {type: variant, offset: 107, length: 1, content: 眾, krp: 仁還乃歎曰將軍眞天人也三軍服其勇太祖益壯之晉書曰李矩將張友與劉粲戰於盟津矩進救之使壯士三千㲹舟迎友賊臨河列陣作長鈎以鈎船連戰數日不得渡夜遣部將格増濟入友壘與友選精騎千餘而殺所獲牛馬焚燒器械夜突圍而出奔武牢宋書曰劉康祖丗居京口便弓馬膂力絶人浮蕩蒲酒爲事毎犯法爲郡縣所録輒越屋踰墻莫能擒之夜入人家爲有司所圍突圍去並莫能追}
