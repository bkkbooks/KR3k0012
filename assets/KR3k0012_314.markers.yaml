  - {type: variant, offset: 137, length: 3, content: 孔範出, SBCK: 斷後諸將雖勇亦非將軍敵故雖用敗兵而戰必勝也繡大服又曰睢陽復返城迎劉永盖延復率諸將圍之百餘日収其野榖永乏食突走延追擊盡得輜重永爲其將所殺永弟防舉城降又曰璽書拜馬援爲伏波將軍以扶樂侯劉隆爲副扶樂縣名屬九眞郡督樓􅂳將軍叚志等南擊交阯軍至合浦而志病卒詔援并將其兵遂縁海而進隨山刋道千餘里刋除也十八年春軍至浪泊上與賊戰破之斬首數千級降者萬餘人援追徴側等至禁溪數敗之賊遂散走明年正月徴側徴貳傳首洛陽又曰陳俊與五校}
