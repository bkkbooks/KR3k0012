  - {type: variant, offset: 111, length: 1, content: 置, WYG: 配以縋引之孚得入城中鼓譟皆呼萬嵗守圍者以狀聞公笑曰此非徒入方且復出孚計事訖欲還而外圍急謂配曰城中糓少無用老弱為不如驅出之省糓乃夜簡得一千人皆令持白幡及脂燭從三門而出請降孚所將來騎隨衆人而出時守圍吏聞城中悉降火光照耀但共觀火不復視圍孚出北門突圍而歸尚明日曹公聞孚已得去曰果如吾言又曰公孫瓉除遼東屬國長史嘗從數十騎出行塞外遥見鮮卑數百騎瓉乃退入空亭約其從者曰今不衝之則死盡矣乃自持矛兩頭施刃馳出殺傷數十人瓚亦亡其從騎半遂得免晉書曰李矩將張支與劉燦戰於盟津矩進救之以壯士三千汎舟迎支賊臨河列}
