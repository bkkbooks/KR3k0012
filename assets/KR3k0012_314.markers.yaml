  - {type: variant, offset: 2714, length: 7, content: 則首尾俱至夫善, SBCK: 堅敢死謂敢而死者凡軍事中軍最尊居以堅銳自輔故曰中堅也㝷邑陳亂乗銳崩之遂殺㝷邑城中亦鼓噪而出中外合􅀔震動天地莾兵大敗走者相騰踐奔殪百餘里間殪仆也㑹大雷風屋瓦皆飛􅀨下如注滍川盛溢水經曰滍水出南陽魯陽縣西堯山南經崑陽城北東入汝滍音直理也虎豹皆股}
  - {type: page-break, offset: 2714, content: '', id: KR3k0012_SBCK_314-8a}
  - {type: variant, offset: 2714, length: 0, content: '', WYG: 堅敢死謂果敢而死者凡軍事中軍將最尊居中以堅鋭自輔故曰中堅也尋邑陣亂乗鋭崩之遂殺王尋城中亦鼓譟而出中外合勢震動天地莽兵大敗走者相騰踐奔殪百餘里間殪仆也㑹大雷風屋瓦皆飛雨如注滍川盛溢水經曰滍水出南陽魯陽縣西堯山切東南經昆陽城北東入汝滍音直理虎豹皆股戰士卒爭赴溺死者以萬數水不流數過於萬故以萬為數王邑嚴尤陳茂輕騎乗死人渡水逃去盡獲其輜重車甲珍寳不可勝算魏志曰曹公征張魯定漢中劉曄進說曰明公以步卒五千西誅董卓北破袁紹南征劉表九州百郡十并其八威震天下勢傾内外今舉漢中蜀人觀風破膽失守推此而前蜀可傳檄而定也𤣥德人傑也有智度而遲新得蜀人猶未附今破漢中蜀人震恐其勢自傾以公之神明因其傾而壓之無不尅也若少緩之諸葛亮明於治理而為相關張諸人勇冠三軍而為將蜀人既定據險守要}
