  - {type: variant, offset: 4377, length: 5, content: 用奇設伏乘, SBCK: 侯暉之徒巳破膽矣只可因其兇懼而攻之􅀔當必剋剋平摸之後自可鼓行而前成都必不能守􅀂緩兵相持虚實相見涪軍復來難爲敵也進不能戰退無所資二萬餘人悉爲蜀子虜耳從之翌日進攻皆剋斬侯暉等縱之城守相次瓦解又曰盧循率衆數萬方艦而下劉􅁉率兵拒之出輕利􅋐艦躬提幡鼓命衆軍齊力擊之又上歩􅀐於西岸右軍叅軍􅁃樂生乗艦不進斬而徇之於是衆軍並騰踊爭先軍中多萬鈞神弩所至莫不摧䧟􅁉自於中流蹙之因風水}
