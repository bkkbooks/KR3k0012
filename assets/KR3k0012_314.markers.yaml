  - {type: variant, offset: 52, length: 1, content: 官, SBCK: 督廵歴圍壘所過呵責失候者輙捶之自東歴西徑出曹公營當城門復怒守闈者収􅅞之因開圍馳入城下配以縋引之孚得入城中皷噪皆呼萬􅀊守圍者以􅃺聞公􅀏曰此非徒入方且復出孚計事訖欲還而外圍益急謂配曰城中􅂖少無用老弱爲不如駈出之省榖配乃夜簡得一千人皆令秉白幡持脂燭從三門而出請降孚所將來􅀐隨降人而出時守圍吏聞城中悉降火光照曜但共觀火不復視圍孚出北門突圍而歸}
