  - {type: variant, offset: 2014, length: 485, content: 使法在己曰專與下畏法曰法軍無小聽戰無小利小聽謂輕弱敵人稱其虛弱危敗易勝以喜士眾沮備預也小利謂小敵擊誘於餌數為小戰也又曰凡五兵長以衛短短救長迭戰則久皆戰則強迭更也言更息則可堪久悉舉兵戰眾多者強孫子曰兵以詐立以利動以分合變者也兵一分合以敵為變兵法詭詐以利動敵心或合離為變化之術也故其疾如風言進退應機其徐如林不見利不前也如風吹林木小動而其大不移侵掠如火疾也抄掠財物如炎火之猛烈不動如山守也不信敵之誑惑安固如山難知如陰莫測如天之陰雲不見列宿之象動如雷霆盛猛速疾不及應也故太公曰疾雷不及掩耳疾電不及瞋目也指嚮分眾因敵而制勝也旌旗所指向則往分離其師眾也先知迂直之計者勝此軍爭之法也又曰我專而敵分我專一而敵分散也我專為一敵分為十是以十共其一也我料見敵形審其虛實故所備者少專為屯以我之專擊彼之散卒為十共擊一也則我眾而敵寡我專為一故眾敵分為十故寡能以眾敵寡者則吾所與戰者約矣言約少而易勝吾所與戰之地不可知也言舉動微密情不可使彼知吾所舉不知吾所集也不可知則敵所備者多敵所備者多則吾所與戰者寡矣形藏敵疑則分離其眾備我也言少而易擊故也故備前則後寡備後則前寡備左則右寡備右則左寡無不備者無不寡言敵, WYG: ''}
