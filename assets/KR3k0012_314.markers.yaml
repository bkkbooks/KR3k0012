  - {type: variant, offset: 3052, length: 1, content: 君, WYG: 徽軍連戰士卒傷滅知勇俱竭宜因其弊遂擒之若舍而寛之徽飬病收亡餘衆更合圗之未易也特從之復進攻徽潰圍而走特遣將水陸追之遂害徽生擒徽子存以徽䘮還之唐書曰太宗進逼西河宋金剛果遁走太宗追之身先士卒奮擊大破之乗勝逐北一日一夜行二百餘里轉戰數十合士卒疲弊至高壁嶺總管劉𢎞基叩馬而諫曰大王功效於是足矣亦宜思自安之計方今草創敵可盡乎且餱糧已竭士卒疲頓更欲何之願且停營待兵糧咸集而後决戰太宗曰功者難成易敗機者難得易失金剛走到汾州衆心已沮我及其未定乗勢擊之此破竹之易也如更遲留必為賊禽此失機之道吾國家之事當竭忠盡力豈顧身之安危乎遂䇿馬去諸軍乃進莫敢以饑乏為辭夜宿於雀䑕谷之西原太宗}
