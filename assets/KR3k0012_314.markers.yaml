  - {type: variant, offset: 4387, length: 1, content: 良, SBCK: 剋之冝及其衰乗之可滅鼓行而進遂定漢􅃆崔鴻十六國春秋蜀李特攻晉}
  - {type: variant, offset: 4389, length: 1, content: 用, SBCK: 張徽敗徽軍特議欲釋徽還涪音浮諸將進曰徽軍連戰士卒傷減智勇俱竭冝因其弊遂擒之􅀂舎而寛之徽飬病收亡餘衆更合圗之未易也特從之復進攻徽潰圍走特遣將水陸追之遂害徽生擒徽子存以徽喪還之也唐書曰太宗進逼西河宋金剛果遁走太宗追之身先士卒􅁬擊大破之乗勝逐北一日一夜行二百餘里轉戰數十合士卒疲弊至髙壁嶺揔管劉弘基執馬而諌曰大王功効於此足矣亦冝思自安之計方今草創敵可盡乎且喉糧巳竭士卒疲頓更欲何之願且停營待}
  - {type: page-break, offset: 4389, content: '', id: KR3k0012_SBCK_314-10a}
  - {type: punctuation, offset: 4391, content: ，, id: KR3k0012_CHANT_314-bkkpn1078}
  - {type: 'tls:seg', offset: 4391, content: '', id: KR3k0012_CHANT_314-34a.70}
  - {type: variant, offset: 4391, length: 1, content: 審, SBCK: 糧咸集而後決戰太宗曰功者難成易敗機者難得易失金剛走到汾州衆心巳沮我及其未定當乗勢擊之此破竹之義也如更遲留必爲賊計此失機之道吾國家之事當竭忠盡力豈願身之安危乎遂䇿馬去諸軍乃進莫敢以飢乏爲辭夜􅀫}
  - {type: variant, offset: 4393, length: 2, content: 機勢, SBCK: 雀䑕谷之西原太宗不食二日不解甲三日矣軍中􅀂飢此夕惟有一羊太宗撫將士與之同食三軍感恱皆飽}
  - {type: page-break, offset: 4393, content: '', id: KR3k0012_SBCK_314-10b}
  - {type: punctuation, offset: 4395, content: ，, id: KR3k0012_CHANT_314-bkkpn1079}
  - {type: 'tls:seg', offset: 4395, content: '', id: KR3k0012_CHANT_314-34a.71}
  - {type: variant, offset: 4396, length: 1, content: 用, SBCK: 思􅁬激明日趍汾州金剛列陣南北七里以抗官軍太宗遣揔管李勣程䶧金􅁗叔寳當其北翟長孫􅁗武通當其南親御中軍以臨之諸軍戰小却爲賊所乗太宗率精􅀐三千直趣金剛賊衆大潰斬首三千餘級追奔數十里至張難堡有浩州行軍揔管樊伯通張德政先據此堡望見太宗輕􅀐而來􅀄未識之太宗免胄曰我也堡人讙譟旣而涕泣曰不圗今日生謁大王死無所恨左右以太宗不食告之乃奉濁酒脫粟飯太宗曰今日飢渇並解雖公孫豆粥何以加之又曰武德􅀄太宗征薛仁果大破之乗勝遂逼折撫城竇抗等苦諌曰賊主猶據堅城雖破其將宗羅侯未可即逼請按}
  - {type: variant, offset: 4398, length: 3, content: 仍須鼓, SBCK: 以候其變太宗曰筭之乆矣破竹之􅀔不可失也賊大軍以敗餘衆何足爲虞兇魁之計盡於此矣遂率衆}
  - {type: page-break, offset: 4398, content: '', id: KR3k0012_SBCK_314-11a}
  - {type: variant, offset: 4402, length: 28, content: 怒之感而勇之賞而勸之激而揚之若鷙之玃獸之搏必修其牙距度力, SBCK: 進至夜半軍臨賊城守陴者皆亂爭自投}
