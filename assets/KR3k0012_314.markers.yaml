  - {type: variant, offset: 107, length: 1, content: 眾, SBCK: 仁還乃歎曰將軍眞天人也三軍服其勇太祖益壯之晉書曰李矩將張友與劉粲戰於盟津矩進救之使壯士三千㲹舟迎友賊臨河列陣作長鈎以鈎􅂳連戰數日不得渡夜遣部將格増濟入友壘與友選精􅀐千餘而殺所獲牛馬焚燒器械夜突圍而出奔武牢宋書曰劉康祖丗居京口便弓馬膂力絶人浮蕩蒲酒爲事毎犯法爲郡縣所録輒越屋踰墻莫能擒之夜入人家爲有司所圍突圍去並莫能追}
  - {type: variant, offset: 107, length: 1, content: 眾, WYG: 仁還乃歎曰將軍真天人也三軍服其勇太祖益壯之又曰袁尚征袁譚於平原使其將審配守鄴曹公攻鄴城尚聞鄴急還救鄴欲令城中知外動止李孚請行尚曰當何所需李曰今鄴圍甚急多人則不可孚乃自選温信者三人不示其謀各給駿馬令釋戎噐著平上冠持問事杖投暮直抵鄴下自稱曹公都督廵厯圍壘所過呵責失候者輒捶之自東厯西徑出曹公營當城門復怒守圍者收縳之}
