  - {type: variant, offset: 2080, length: 601, content: 短救長迭戰則久皆戰則強迭更也言更息則可堪久悉舉兵戰眾多者強孫子曰兵以詐立以利動以分合變者也兵一分合以敵為變兵法詭詐以利動敵心或合離為變化之術也故其疾如風言進退應機其徐如林不見利不前也如風吹林木小動而其大不移侵掠如火疾也抄掠財物如炎火之猛烈不動如山守也不信敵之誑惑安固如山難知如陰莫測如天之陰雲不見列宿之象動如雷霆盛猛速疾不及應也故太公曰疾雷不及掩耳疾電不及瞋目也指嚮分眾因敵而制勝也旌旗所指向則往分離其師眾也先知迂直之計者勝此軍爭之法也又曰我專而敵分我專一而敵分散也我專為一敵分為十是以十共其一也我料見敵形審其虛實故所備者少專為屯以我之專擊彼之散卒為十共擊一也則我眾而敵寡我專為一故眾敵分為十故寡能以眾敵寡者則吾所與戰者約矣言約少而易勝吾所與戰之地不可知也言舉動微密情不可使彼知吾所舉不知吾所集也不可知則敵所備者多敵所備者多則吾所與戰者寡矣形藏敵疑則分離其眾備我也言少而易擊故也故備前則後寡備後則前寡備左則右寡備右則左寡無不備者無不寡言敵之所備者多則士卒無不分散而少寡者備人者也敵分散而少者皆先備人也眾者使人備己者也敵所以備多己者由我專而眾散故也故知戰之地知戰之日則千里而會戰以度量知空虛先知戰地之形又必戰之日則可千里期會先往以待之若敵以先至不往可以勞之不知戰地不知戰日則左不能救右右不能救左前不能救後後不能救前而况遠者數十里近者數里乎敵以先居形勢之地己方趨利欲戰則左右前後惑疑進退不能相救況數十里之間, SBCK: ''}
