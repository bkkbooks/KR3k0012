  - {type: variant, offset: 2922, length: 0, content: '', krp: 吾國家之事當竭忠盡力豈願身之安危乎遂䇿馬去諸軍乃進莫敢以飢乏爲辭夜宿於雀䑕谷之西原太宗不食二日不解甲三日矣軍中若飢此夕惟有一羊太宗撫將士與之同食三軍感恱皆飽而思奮激明日趍汾州金剛列陣南北七里以抗官軍太宗遣揔管李勣程䶧金秦叔寳當其北翟長孫秦武通當其南親御中軍以臨之諸軍戰小却爲賊所乗太宗率精騎三千直趣金剛賊衆大潰斬首三千餘級追奔數十里至張難堡有浩州行軍揔管樊伯通張德政}
