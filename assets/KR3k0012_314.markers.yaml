  - {type: variant, offset: 3198, length: 1175, content: 有簡子乃去犀蔽屏櫓而立矢石之所及一鼓而士畢乘之簡子曰與吾得革車千乘也不如聞行人燭過之一言行人燭過可謂能諫其君矣又曰昔荊恭王與晉厲公戰於鄢陵荊師敗共王傷臨戰司馬子反渴而求飲豎陽穀操參酒而進之酒器受三升曰參子反曰訾退酒也豎陽穀曰非酒也子反曰訾退却豎陽穀又曰非酒也子反受而飲之子反之為人也嗜酒甘而不能絕於口醉戰既罷共王欲復戰而謀使召司馬子反子反辭以心疾共王駕而往視之入幄中聞酒臭而還曰今日之戰不穀親侍所恃者司馬也而司馬又若此是忘荊國之社稷而不恤吾眾不穀無與傷戰矣於是罷師去之斬司馬子反以為戰故豎陽穀之進酒也非以醉子反也其心以忠也而適足殺之故曰小忠大忠之敗也又曰齊晉與戰平阿之餘子亡戟得矛平阿齊邑餘子官氏退而去不自快謂路之人曰亡戟得矛可以歸乎路之人曰戟亦兵也矛亦兵也亡兵何為不可以歸心猶不自快也遇高堂之孤叔無孫孤特位尊也叔姓無孫名餘子當其馬前曰今者戰亡戟得矛可以歸乎叔孫曰矛非戟也戟非矛也亡戟得矛豈亢責也哉亢當平阿餘子曰嘻還反戰趨尚及之遂戰而死又曰吳起謂啇文曰馬與人敵在前援桴一鼓三軍之士樂死若生子與我孰賢啇文曰吾不如子淮南子曰昔晉文公將與楚戰城濮問於咎犯曰為之奈何咎犯曰仁義之軍不厭忠信戰陣之戎不厭詐偽君其詐之而已問雍季雍季對曰焚林而獵偷多獸必無獸以詐偽愚人雖偷利厚亦無復利其正之而已矣於是不聽雍季之計而用咎犯之謀與楚人戰大破還賞有功者先季雍左右曰城濮之戰咎犯之謀也賞先季雍者何也文公言曰咎犯之言一時之權也季雍之言萬世之利吾豈可以一時之權而先萬世之利哉又曰敵潰而走後必可移適迫而不動名之曰奄遲擊之如雷霆斬之若草木燿之若火電欲疾以速人不及步車不及以轉轂兵如植木弩如羊角人雖眾多勢莫敢格春秋感精符曰強傑並侵兵雷合龍門溺驂宋均曰龍門魯門也時與宋齊戰敗相殺血溺驂馬者也賈誼新書曰黃帝行道炎帝不聽故戰涿鹿之野血流漂杵三輔舊事曰武帝發兵攻衛太子連鬥五日白虎門前溝中血流沒足列女傳曰湯受命而伐桀戰于鳴條鳴條南夷地名桀師不戰湯遂放桀與末嬉嬖妾同舟浮海死於南巢之山諸葛亮兵法曰山陵之戰不仰其高水上之戰不逆其流草上之戰不涉其深平地之戰不逆其虛此兵之利也故戰鬥之利唯氣其形也衛公兵法曰凡事有形同而勢異者亦有勢同而形別者若順其可則一舉而功濟如從未可則蹔動而必敗故孫臏曰計者因其勢而利導之兵法曰百里趨利則蹶上將五十里而趨利者半至善動敵者形之而敵從之與之而敵取之以奇動之以本待之此戰勢之要術也若我士卒以齊法令以行奇正以設置陣以定誓眾以畢上下已怒天時已應地利也據鼓角以震風勢已順敵人雖眾其奈我哉譬虎之有牙兕之有角身不蔽捍手無寸刃而欲搏之勢不可觸其亦明矣故兵有三勢一曰氣勢二曰地勢三曰因勢若將勇輕敵士卒樂戰三軍之眾志厲青雲氣等飄風聲如雷霆此所謂氣勢也若關山狹路大阜深澗龍虵蟠陰羊腸拘門一夫守險千人不過此所謂地勢也若因敵怠慢勞役飢渴風波驚擾將吏縱橫前營未舍後軍半濟此謂因勢也若遇此勢當潛我形, SBCK: ''}
