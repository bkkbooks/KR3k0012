  - {type: variant, offset: 47, length: 4, content: 護軍樊毅, SBCK: 旗音與麾同所殺傷數十人不得前復還走漢壁亡其奴獨與兩􅀐歸又曰􅀽尚征􅀽譚於平原使其將審配守鄴曹公攻鄴城尚聞鄴急弃平原而永入城以計事者主簿李孚請行尚曰當何所辦李曰今鄴圍甚急多人則不可孚乃自選温信者三人不示其謀各給駿馬令釋戎器著平上冠持問事杖投暮直􅔰鄴下自稱曹公}
