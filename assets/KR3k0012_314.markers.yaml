  - {type: variant, offset: 36, length: 4, content: 南偏鎮東, SBCK: 遂得解身􅀍二十餘瘡又曰灌夫父張孟嘗爲頴隂侯灌嬰舎人蒙灌氏姓爲灌孟師古曰蒙冒也孟年老頴隂侯強請之鬱鬱不得意故戰嘗䧟堅遂死呉軍中軍法父子俱有死事得與䘮歸夫􅁬曰願得呉王下將軍頭以報父仇於是夫􅀍甲持㦸募中軍壯士所善願從數十人及出壁門莫敢前獨兩人及從奴十餘􅀐馳入呉軍至戯下師古曰戯}
