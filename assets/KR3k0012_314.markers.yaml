  - {type: variant, offset: 754, length: 326, content: 其動譟而奔擊乃大破焉又曰建中初田悅反以兵圍臨淄洺邢州詔以李晟為神策先鋒都知兵馬使與河東節度使馬燧昭義軍節度使李抱真合兵救臨淄尋加兼御史中丞河東昭義軍攻楊朝光於臨淄南晟與河東騎將李自良奉國擊悅於雙崗悅兵却遂斬朝光戰于臨淄諸軍皆却晟引軍渡淄水乘兵而濟橫擊悅諸軍復振擊悅大破敗悅於洹水以功加撿校左散騎常侍實封百戶又曰德宗以李晟兼魏府左司馬居無何朱滔王武俊皆反聯兵救田悅悅深壁不戰以老王師時武俊遣兵圍康日知於趙州晟乃獻狀請解趙州圍因合義武節度使張孝忠以軍圖范陽上大壯之乃加御史大夫俾禁兵將莫仁擢趙光銑杜季玼皆隸焉晟乃自魏州直趨趙州賊解圍而去晟留趙州三日與義武合軍而北略恒州圍朱滔將鄭景濟於清苑決水灌之田悅朱滔王武俊皆遣兵來救戰於白樓賊犯義武義武軍却晟引步騎數百, SBCK: 走}
