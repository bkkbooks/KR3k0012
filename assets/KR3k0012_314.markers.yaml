  - {type: variant, offset: 2872, length: 1, content: 勝, SBCK: 鎮南將軍都督荆州杜元凱襲呉樂郷在今江陵郡松滋縣東六十里虜都督孫歆沆湖以南至于交廣覩風送欵時衆㑹議或曰百年之冦未可盡剋今將暑􅀬水潦方降疾疫將起冝俟來冬大舉凱曰昔燕樂毅籍濟西一戰以并強齊今王師兵威巳震譬如破竹數節之後皆迎刃而解也遂指援群帥直指抺陵所過城邑莫不束手遂平呉國先議}
  - {type: page-break, offset: 2872, content: '', id: KR3k0012_SBCK_314-9a}
  - {type: variant, offset: 2872, length: 1, content: 勝, WYG: 鎮南將軍都督荆州杜元凱襲吾樂鄉在今江陵口松滋縣東六十里虜都督孫歆沆湖以南至於交廣覩風送欵時衆議或曰百年之㓂未可盡剋今將暑熱水潦方降疾疫將起宜候冬大舉凱曰昔燕樂毅藉濟西一戰以并強齊今王師兵威已震譬如破竹數節之後皆迎刃而觧遂指授羣帥直指秣陵所過城邑莫不束手遂平吳國先議}
  - {type: page-break, offset: 2872, content: '', id: KR3k0012_WYG_314-14b, image: WYG0895/WYG0895-0712b.png}
  - {type: variant, offset: 2872, length: 0, content: '', krp: 鎮南將軍都督荆州杜元凱襲呉樂郷在今江陵郡松滋縣東六十里虜都督孫歆沆湖以南至于交廣覩風送欵時衆㑹議或曰百年之冦未可盡剋今將暑熱水潦方降疾疫將起冝俟來冬大舉凱曰昔燕樂毅籍濟西一戰以并強齊今王師兵威巳震譬如破竹數節之後皆迎刃而解也遂指援群帥直指抺陵所過城邑莫不束手遂平呉國先議者慙而謝焉又曰朱齡石伐蜀賊譙縱縱將譙道福重兵守涪齡石師次平摸去成都二百里縱遣將侯暉譙恱屯平摸夾岸連城立柵齡石謂禆將劉鐘曰天方暑熱賊今固險攻之難㧞祗困我師吾欲蓄銳息兵伺隙而進卿以爲何如鐘曰不然前揚聲言大衆由涪水故譙道福不敢捨涪今重軍逼之出其不意侯暉之徒巳破膽矣只可因其兇懼而攻之勢當必剋剋平摸之後自可鼓行而前成都必不能守若緩兵相持虚實相見涪軍復來難爲敵也進不能戰退無所資二萬餘人悉爲蜀子虜耳從之翌日進攻皆剋斬侯暉等縱之城守相次瓦解又曰盧循率衆數萬方艦而下劉𥙿率兵拒之出輕利鬪艦躬提幡鼓命衆軍齊力擊之又上歩騎於西岸右軍叅軍庾樂生乗艦不進斬而徇之於是衆軍並騰踊爭先軍中多萬鈞神弩所至莫不摧䧟𥙿自於中流蹙之因風水勢艦悉泊西岸上軍先備火具乃投火焚之烟熖翳天賊衆大敗追奔至夜乃歸循等還㝷陽𥘉分遣歩兵莫不疑怪及燒賊艦衆乃恱服又曰周訪討賊杜曽曽大潰殺千餘人訪夜追之諸將請待明訪曰曽驍勇能戰向之敗也彼勞我逸是以剋之冝及其衰乗之可滅鼓行而進遂定漢沔崔鴻十六國春秋蜀李特攻晉將張徽敗徽軍特議欲釋徽還涪音浮諸將進曰徽軍連戰士卒傷減智勇俱竭冝因其弊遂擒之若舎而寛之徽飬病收亡餘衆更合圗之未易也特從之復進攻徽潰圍走特遣將水陸追之遂害徽生擒徽子存以徽喪還之也唐書曰太宗進逼西河宋金剛果遁走太宗追之身先士卒奮擊大破之乗}
