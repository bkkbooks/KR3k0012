  - {type: variant, offset: 4383, length: 2, content: 取勝, SBCK: 艦悉泊西岸上軍先備火具乃􅄬火焚之烟熖翳天賊衆大敗追奔至夜乃歸循等還㝷陽􅀄分遣歩兵莫不疑怪及燒賊艦衆乃恱服又曰周訪討賊杜曽曽大潰殺千餘人訪夜追之諸將請待明訪曰曽驍勇能戰向之敗也彼勞我逸}
