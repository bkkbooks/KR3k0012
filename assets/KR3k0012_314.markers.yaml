  - {type: variant, offset: 3475, length: 205, content: 齊晉與戰平阿之餘子亡戟得矛平阿齊邑餘子官氏退而去不自快謂路之人曰亡戟得矛可以歸乎路之人曰戟亦兵也矛亦兵也亡兵何為不可以歸心猶不自快也遇高堂之孤叔無孫孤特位尊也叔姓無孫名餘子當其馬前曰今者戰亡戟得矛可以歸乎叔孫曰矛非戟也戟非矛也亡戟得矛豈亢責也哉亢當平阿餘子曰嘻還反戰趨尚及之遂戰而死又曰吳起謂啇文曰馬與人敵在前援桴一鼓三軍之士樂死若生子與我孰賢啇文曰吾不如子淮南子曰昔晉文公將與楚戰城濮問於咎犯曰為之奈何咎犯曰, WYG: 武徳初太宗征薛}
