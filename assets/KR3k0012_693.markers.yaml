  - {type: variant, offset: 609, length: 0, content: '', WYG: 子不與士共飢渇所以亡史記曰五羖大夫鄙人也聞秦繆公之賢自鬻秦客被褐食牛暮年舉之牛口之下加之百姓之上又曰趙惠文}
  - {type: variant, offset: 610, length: 0, content: '', WYG: 得楚和璧秦昭王遺趙王書願以十城易璧趙遣藺相如奉璧秦王無償城邑相如使從者衣褐懐璧便道亡歸又曰婁敬隴西人過洛陽衣羊裘因齊人虞将軍求見上虞将軍欲為易其衣}
  - {type: variant, offset: 611, length: 32, content: 恤下也魚豢魏略曰有雙璜雙珩琚瑀衝牙琨珠為珮者乃漢明帝采古文始制也, SBCK: 仕司空張温數以禮辟不能致後温以車􅀐將軍出征凉州將行􅀇自廬􅀍􅄄帶索要說温不能用}
  - {type: variant, offset: 611, length: 2, content: 恤下, WYG: 肯曰臣衣帛衣帛見衣褐衣褐見遂見上説上西行漢書曰貢禹上書云年老貧窮家貲不滿萬錢妻子糠豆不贍短褐不完後漢書曰張𤣥字處微有才畧以世亂不仕司空張温數以理辟不能致後温以車騎将軍出征凉州将行𤣥自廬被褐帶索要説温不能用晋書曰皇甫謐字士安上疏曰咎繇之振褐不仁者逺矣陶潜五桞先生傳曰短褐穿結簞瓢屢空晏如}
