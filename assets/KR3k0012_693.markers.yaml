  - {type: variant, offset: 2310, length: 335, content: 道樞樞得其環中以應於無窮夫是非反覆相尋無窮故謂之環中空矣令以是非為環而得其中者也無是非者也無是非故能夫是非無窮故應亦無窮玦說文曰玦玉珮珮如環而有玦故云玦詩曰芃蘭之葉僮子佩韘韘玦也左傳曰狄人伐衛將戰衛懿公與石祁子玦與甯莊子矢使守莊子甯遠也玦玉玦曰以此贊國擇利而為之贊助也玦示以當決斷矢示以禦難又曰晉侯使申生伐山皋落氏珮之金玦狐穾曰金寒玦離胡可恃也罕夷曰金玦不復雖復何為君有心矣國語曰獻公使申生伐東山衣偏裻音篤之衣佩之金玦太子見理克曰君賜我以偏衣金玦何也克曰孺子懼乎衣金之偏而握金不偷矣太子遂行狐突御戎先友為右告先友曰君與我此衣何也先友曰中分而金玦之權在此行也狐突歎曰以厖衣純尨雜色純德謂太子而玦之以金銑者寒甚矣胡可恃也典略曰項羽與沛公飲范增數目羽舉所佩玉以示之者三羽默然後, SBCK: 藍縷}
