  - {type: variant, offset: 2689, length: 1, content: 明, WYG: 耿純率宗族賔客二千人皆􅀈襜褕絺巾迎上又曰更始在長安自恣三輔苦之又所官爵多群小或繡面衣錦袴襜褕罵詈道路又曰王阜為益州太守大将軍竇憲貴盛以絳罽襜褕與阜不受又曰叚頴滅羗詔賜頴錢十萬綘襜褕一領又曰延岑上元還被襜褕宿下邑亭亭長白言睢陽賊衣綘􅄢襜褕今宿客疑是乃發卒來岑卧不動吏謝去邉譲别傳曰譲字文禮孔融薦譲於武}
