  - {type: variant, offset: 38, length: 7, content: 有玉有容刀有帨, WYG: 袍與之生至市賣袍睢陽王識是女袍収拷談生生具對呼児似王女又曰郭璞每自為卦知其㐫終嘗逢一趣走少年便脱新絲袍與之此人不觧其意璞曰身命卒當在君手故逆相属耳及當死果此人行刑旁人皆為属求利璞曰我託之乆矣此人為之歔欷哽咽行刑既畢乃説如此鄴中記曰石虎臨軒大㑹著丹紗袍鍾岏良史傳曰袁彭字伯楚為南陽太守政以清潔糲食緼袍不易其操古樂府白紵歌白紵寳如月輕如雲色似銀袍以光驅}
