  - {type: variant, offset: 1933, length: 375, content: 窮左傳曰穆叔之子仲壬與公御萊書觀於公宮公予之環使才人入示之不示出命佩之又曰宣子有玉環其一在鄭商玉環同工共朴自共為雙宣子謁諸鄭伯謁請也子產弗與事具玉部宋書曰江夏王義恭孝武即位以其藩所服玉環大綬賜之梁書曰柳惔武帝之鎮襄陽惔祖道帝解玉環贈之天監二年元會帝謂曰卿珮玉環是新亭所贈耶對曰既瑞感神衷臣謹服之無斁白虎通曰修道無窮即珮環也瑞應圖曰黃帝時西王母乘白鹿來獻白環舜時復來獻白環王子年拾遺錄曰顓頊時濱海之北有勒題國皆衣毛無翼而飛帝乃更衣以文豹為飾獻黑玉之環色如淳漆荀卿子曰大夫待放于境君賜以環即返以玦即去西京雜記曰趙飛鷰為后女弟昭儀上五色玉環春秋後語曰秦始皇聞齊王后賢嘗使遺之連環曰齊人多智能解此乎后以示群臣莫能解乃引椎破之謝秦使曰謹以解矣以報始皇壯其志益不敢謀齊劉向列女傳曰齊桓公行霸諸侯朝之衛獨不至公謀伐衛衛姬脫簪珥解環再拜請徵之罪莊子內篇云彼是莫得其偶, SBCK: 縁}
