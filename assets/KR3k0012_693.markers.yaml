  - {type: variant, offset: 29, length: 0, content: '', WYG: 衣薄觧所御袍賜之蜀志曰彭羕字永年姿性驕傲多所輕忽惟敬同郡秦宓薦之於太守許靖曰竊見處士綿竹秦宓應山甫之德履隽生之直枕石潄流吟詠緼袍也王隠晋書曰江東賜凉州刺史張駿眞金印大袍又曰鄭冲以儒雅為德蒞職無幹局之譽簞食緼袍不營資産世以此重之又曰惠帝自鄴還洛陽賜中書監慮志鶴綾袍一領又曰武帝賜桓伊錢百萬袍裏千端又曰慕容冲進逼符堅送一領錦袍遺冲曰古者交兵使在其間今送一袍以明本懐齊書曰卞彬蚤虱賦序曰余居貧布衣十年不製一袍之緼有所生託資其寒暑無與易之為之多病起居甚踈庸寢敗絮不能自釋梁書曰侯景將為亂時謡曰青袍白馬夀陽來後景軍衆悉着青袍景長乘白馬又曰臨賀王正德侯景之亂正德為平北將軍屯朱雀殿景至正德乃北向望闕三拜歔欷流涕引賊入宣陽門與景交揖馬上退㨿左衛府先是其軍皆著絳袍袍裏皆碧至是悉反之賊以正德為天子唐書曰武后出緋紫單羅銘襟背袍以賜文武臣其袍文各有炯戒諸王則飾以盤石及鹿宰相飾以鳳池尚書飾以對雁左右衛將軍飾以麒麟左右武衛飾以對虎左右鷹揚飾以鷹左右千牛飾以牛左右豹韜飾以獅子左右金吾飾以象又銘其襟背作八字廻文焉又曰肅宗為皇太子受册當被絳袍太子以為與皇帝同稱辭不敢當下百官議帝手勅改為朱明服又曰薛平能守法度理身儉薄一緑袍十年不易㤙加朱紱然後始解去莊子曰曾子居衛緼袍無表十年不製衣墨子曰楚莊王鮮冠緼紐纓綘衣博袍以理其國政也説􅁐曰子思居衛緼袍無裏田子方遺狐白之裘恐其不受之謂之曰吾假人遂忘之子思竟不受鹽鐡論曰原憲之緼袍賢於季孫之狐貉又曰倪寛練袍衣若僕妾食若庸夫東宫舊事曰太子納妃有絳綾袍一領漢武内傳曰上元夫人降武帝服赤霜之袍雲彩亂色}
