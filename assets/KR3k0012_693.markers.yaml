  - {type: variant, offset: 1387, length: 2, content: 七萃, SBCK: 建康小吏曹著爲廬山使君所迎配以女婉著形意不安屢求諌退婉澘然流涕賦詩序別并贈織禈衫也劉敬叔異苑曰母丘儉征浟使王傾其東界父老云曽有破舡從漢海流得布衫身如中國人但兩䄂俱長三丈䄡䄖方言曰䄡䄖江淮}
  - {type: page-break, offset: 1387, content: '', id: KR3k0012_SBCK_693-7a}
  - {type: variant, offset: 1387, length: 2, content: 七萃, WYG: 建康小吏曹着為蘆山使君所迎配以女婉着形意不安屢求諌退婉澘然流涕賦詩序别拜贈織褌衫也劉敬叔異􅁐曰毋丘儉征沃沮使王傾窮其東界父老云曾有破船從漢海流得布衫身如中國人但兩袖俱長三寸襜褕方言曰襜褕江淮}
  - {type: variant, offset: 1387, length: 2, content: 七萃, krp: 建康小吏曹著爲廬山使君所迎配以女婉著形意不安屢求諌退婉澘然流涕賦詩序別并贈織禈衫也劉敬叔異苑曰母丘儉征浟使王傾其東界父老云曽有破舡從漢海流得布衫身如中國人但兩䄂俱長三丈䄡䄖方言曰䄡䄖江淮}
  - {type: variant, offset: 1390, length: 500, content: 士天子賜以左佩玉華玉華之珮珮之精者又曰天子渴於沙中沙中無水七萃之士高奔戎剌其左驂之頰取其清血而飲天子天子美之乃賜奔戎珮玉一雙列仙傳曰江濱二女者不知何許人步游江濱逢鄭交甫挑之不知神人也女遂解珮與之交甫悅乃受珮而去數十步空懷無珮女亦不見拾遺錄曰燕昭王時西王母降與昭王遊乎燧林之下說炎皇鑽火之術取綠桂之膏然以照夜忽有飛蛾御火狀如丹雀來拂桂膏之上此蛾出員丘之穴穴洞達於九天中有細珠流沙可穿而結因用為珮又曰漢成帝時乘輿服皆尚黑宮中美女服皂班姬以下皆玄綬䃜珮又曰漢昭帝元始元年穿林池廣千步中植分枝荷一莖四葉狀如駢蓋日照則葉低廕根莖若葵之衛足也名曰低光荷實如玄珠可以飾珮漢武內傳曰上元夫人帶六出火玉之珮搜神記曰元康中婦人之飾有五兵珮楚辭曰扈江離與薜荔扈被也紉秋蘭以為珮紉蘭索香草也又曰雲衣兮披披披披長貌玉珮兮陸離陸離光彩皃又曰連蕙若以為珮兮過鮑肆而失香又曰盍吾遊此春宮春宮東方青帝宮折瓊枝以繼珮潘岳西征賦曰飛翠緌拖鳴玉出入禁門者眾矣想珮聲之遺響若鏗鎗之在耳劉梁七舉曰珮則結綠懸黎寶之妙微荷彩昭爛流景楊暉曹植與陳琳書曰帶蜿虹以為紳連日月以為珮殷仲堪與相王牋曰所致玉佩光潤清越傅玄大言賦曰腰珮六氣首戴天文環說文曰好倍肉, SBCK: 間}
