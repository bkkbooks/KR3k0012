  - {type: variant, offset: 603, length: 0, content: '', krp: 居三年宋果亡史記曰五羖大夫鄙人也聞秦繆公之賢自粥秦客𬒳褐食牛朞年舉之牛口之下加之百姓之上又曰趙惠文王得楚和氏壁秦昭王遺趙王書願以十城易壁趙遣藺相如奉璧秦王}
  - {type: variant, offset: 604, length: 0, content: '', WYG: 矣麄則有之若登首山}
  - {type: variant, offset: 604, length: 0, content: '', krp: 償城色相如使從者衣褐懷壁便道亡歸又曰婁敬齊人戍隴西過洛陽衣羊裘因齊人虞將軍求見上虞將軍欲爲易其衣不肯曰臣衣帛衣帛見衣褐衣褐見遂見上說上西都長安漢書曰貢禹上書云年老貧窮家貲不滿萬錢妻子糠豆不贍短褐不完范曄後漢書曰張玄處徴有才畧}
