  - {type: variant, offset: 2729, length: 345, content: 夜有青氣視之得玉鉤玦各一魏氏春秋曰明帝張掖郡金山玄川溢涌寶石負圖有玉匣開蓋於前上有玉玦二璜一魏略曰太祖征漢中太子在孟津聞鍾繇有玉玦使臨淄侯曹子建也因人說之繇遂送焉太子與繇書曰南陽宗惠叔稱君侯昔有美玦聞之驚喜笑與抃會當自白書恐傳言未審是以令舍弟子建因荀仲茂時從容喻鄙指鄴騎既到寶玦初至捧押跪發五內震駭繩窮押開爛然滿目偎以蒙鄙之姿得覩希世之寶不煩一介之使不捐連成之價既有秦昭章臺之觀而無藺生詭奪之誑嘉貺益腆敢不欽承謹奉賦一篇王隱晉書曰禮能使決疑者珮玦故遣其臣亦授之以玦今靈命有二玦其一當魏曆數既終當禪大晉故與之玦凡受命將即天子之位皆眾人之所疑以武皇帝能斷決應天順民受曹氏禪而無疑德應珮玦故以賜焉是以有二玦蕭子顯齊書曰太祖在淮陰治城得錫玦大數尺下有篆字人莫識紀僧真曰何須辯文此自久遠之物即九錫之徵, WYG: 邑亭}
