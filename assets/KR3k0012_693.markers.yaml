  - {type: variant, offset: 2769, length: 639, content: 有玉玦二璜一魏略曰太祖征漢中太子在孟津聞鍾繇有玉玦使臨淄侯曹子建也因人說之繇遂送焉太子與繇書曰南陽宗惠叔稱君侯昔有美玦聞之驚喜笑與抃會當自白書恐傳言未審是以令舍弟子建因荀仲茂時從容喻鄙指鄴騎既到寶玦初至捧押跪發五內震駭繩窮押開爛然滿目偎以蒙鄙之姿得覩希世之寶不煩一介之使不捐連成之價既有秦昭章臺之觀而無藺生詭奪之誑嘉貺益腆敢不欽承謹奉賦一篇王隱晉書曰禮能使決疑者珮玦故遣其臣亦授之以玦今靈命有二玦其一當魏曆數既終當禪大晉故與之玦凡受命將即天子之位皆眾人之所疑以武皇帝能斷決應天順民受曹氏禪而無疑德應珮玦故以賜焉是以有二玦蕭子顯齊書曰太祖在淮陰治城得錫玦大數尺下有篆字人莫識紀僧真曰何須辯文此自久遠之物即九錫之徵也太祖曰卿勿妄言北齊書曰樂陵王百年傳博陵人賈德冑教百年嘗作數勑字德冑封以奏帝帝怒召百年百年知不免割帶玦留與妃斛律氏及百年被誅妃把玦哀號不食而死玦猶在手拳不可開其父自擘之乃開白虎通曰能決嫌疑則佩玦瑞應圖曰舜時西王母獻白環玦隨巢子曰召人以環絕人以玦莊子曰儒者綬佩玦者事至而斷西京雜記曰趙飛鷰為皇后女弟昭儀上珊瑚玦孟達與諸葛亮書曰今送綸帽玉玦各一以徵意焉笏釋名曰笏忽也君有教命及所啟白則書其上備忽忘也或曰薄可以薄䟽物禮曰笏天子以球玉諸侯以象大夫以魚須與鬚同文竹士竹本象可也見於天子與射無說音脫笏入太廟說笏非古也小功不說笏當事免則說之免悲哀哭踊之時凡有指畫於君前用笏造受命於君必書於笏笏畢用也因飾焉畢畫也笏度二尺有六寸其中博三寸其殺六分而去一殺猶抒也天子抒上終葵首諸侯不終葵首, SBCK: ''}
