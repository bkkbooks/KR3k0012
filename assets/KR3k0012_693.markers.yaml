  - {type: variant, offset: 4573, length: 808, content: 禮圖曰士竹笏飾以象骨大夫飾以魚須輿服雜事曰古者貴賤皆執笏主書君上之政令有事則搢之於要帶中近代以來唯八座尚書執笏者白筆綴手板頭以紫囊褁之其餘王公卿士但執手板主于敬不執笏亦非記事官也周遷車服雜事曰應仲遠云昔荊軻逐秦王其後謁者持匕首以備不虞從此侍官執刀劍漢高祖偃武脩文始制以手板代焉江表傳曰孫權既即尊位請會百官歸功周瑜初張昭勸迎曹公權不從而周瑜敗之及是昭舉笏欲褒贊功德未及言權曰如張公之計今已乞食矣昭大慚伏地流汗又曰獻帝嘗見郗慮及少府孔融問融曰鴻豫慮字鴻豫何所優長融曰可與適道未可與權慮舉笏曰融昔宰北海政散民流其權安在遂與融互相長短穆天子傳曰天子大服冕禕帗帶搢笏夾佩郭璞注云沃蹕也夾佩左右兩佩也奉壁南面立于塞下受何也郭子撗洞冥記曰孟歧清河之逸人也年可七百歲語及周初時事如目前歧時侍周公升壇上政以手摩成王之足周公以玉笏與之郡國志曰晉明為太子時嘗戲殿前以玉手板弄銅蟠螭口手傾溜入螭腹中不能出人後見一白鼠出入螭口世說曰王子猷作桓車騎騎兵參軍桓曰卿在府久此當相料理初不荅高視以手板柱頰云西山朝來致有爽氣相手板經曰相手板法出蕭何或曰四皓初出殆不行世東方朔見而善之曰此非庸人所解至魏司空陳長史見此書歎伏以示許士宗韋仲將管輅見而推歎郭景純以夜兼晝方得其妙理相手板將以閑太之時取五行尋四時定八節明二十四氣百不失一板長一尺五寸廣一寸五分上狹而薄下廣而厚八角十二芒並欲端平板形皆完淨板凶少吉多者可用吉少凶多者不可用服也舊用白直檀剌榆桑柘四材也番當令理通直從上至下直如絃不得出邊絕理板頭是君坐板頭缺與君共事必不得終分板作四分上一分為二親左為父右為母第二分都為婦第三分左為男右為女第四分左為奴右為婢婢之不辟方留為田宅財物牛馬猪羊鷄犬之屬以五行十二時分若其處崩毀傷蹈破裂弔節蝎穿兆隨所屬物必損失死亡板兩邊左為城右為社寬博文彩班班光澤清淨必得封邑仲長子曰笏以書君教令記善剌過今之板以象焉劉義恭啟事曰聖恩優重猥賜華纓玉笏珍冠飾首琛板耀握非臣朽薄所宜服之, SBCK: ''}
