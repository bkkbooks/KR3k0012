  - {type: variant, offset: 3739, length: 378, content: 入討劭錄宏殿內自拔莫由孝武先嘗以一手板於宏遣左右親信周法道齎手板詣孝武事以為尚書左僕射又曰庾道愍尤精相板宋明帝時山陽王休祐屢以言語忤顏見道愍託以己板為他物令道愍占之道愍曰此乃甚貴然使人多愆忤祐以禇彥同祥密求換其板他日彥回侍明帝自稱下官帝多忌甚不悅休祐具以狀言帝乃意解又曰綦母珍之在西州時有一手板相者云當貴每以此言動帝又圖黃門郎帝嘗問之曰西州時手板何在珍之曰此是黃門手板官何須問帝大笑齊書曰豫章王嶷薨見形於第居第也後園乘腰輿指麾處分呼直兵直兵無手板左右授一玉手板與之謂曰橘樹一株死可覔補之因出後園閣直兵倒地仍失手板宋書曰明帝起事諸方並舉兵帝謂蔡興宗曰頃日人情言何事當濟不興宗曰今米甚豐賤而人情更安以此論之清蕩可必伹臣之所憂更在事後猶羊公言既平之後方當勞聖慮耳尚書禇彥回以手板築興宗不已上曰如卿言北齊書曰爾朱榮既誅得其手板上有數牒啟皆左右去留人名非其腹心在出限, SBCK: ''}
