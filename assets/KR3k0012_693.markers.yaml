  - {type: variant, offset: 927, length: 173, content: 復作之今玉珮受法於粲三禮圖曰凡玉珮上有雙衡長五寸博一寸下有雙璜徑三寸衝牙蠙珠以納其間上下為衡半璧為璜璜中橫以衝牙以蒼珠為瑀董巴漢輿服志曰古者君臣珮玉三代同之五霸興兵珮非戰器去珮留其係穟以為章表秦乃以采組連結謂之綬漢承秦制用而弗改至孝明皇帝乃為大珮衝牙雙渠璜皆以白玉乘輿絡以白珠公卿諸貴以采絲其玉視冕旒蔡邕輿服志曰孝明帝作蠙珠之珮以郊祀天地白虎通曰, SBCK: 二年御史丞羊希奏山隂令謝沉親憂未除常著青絳衲兩襠請免沈前}
