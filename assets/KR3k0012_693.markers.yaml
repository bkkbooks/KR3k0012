  - {type: variant, offset: 29, length: 0, content: '', krp: 衣薄解所御𫀆賜之蜀志曰彭羡字永年姿性驕慠多所輕忽唯敬同郡秦安薦之於太守許靖曰竊見處士綿竹秦安應山甫之德履雋生之直枕石漱流吟詠緼𫀆也王隱晉書曰江東賜凉州刺史張駿真金印大𫀆又曰鄭冲以儒雅爲德莅職無幹局之譽簞食緼𫀆不營資産丗以此重之又曰惠帝自鄴還洛陽賜中書監盧士鸖綾𫀆一領又曰武帝賜桓伊錢百萬𫀆裹千端又曰慕容冲進逼符堅送一領錦𫀆遺冲詔曰古者交兵使在其間今送一𫀆以明夲懷齊書曰卞彬蚤虱賦序曰余居貧布衣十年不製一𫀆之緼有生所託資其寒暑無與易之爲之多病起居甚踈縈寢敗絮不能自釋梁書曰侯景將爲亂時謡曰青𫀆白馬壽陽來後景軍中悉着青𫀆景長乗白馬又曰臨賀王正德侯景之亂正德爲平北將軍屯朱雀航景王正德乃北向望闕三拜歔欷流涕引賊入宣陽門與景交揖馬上退據左衛府先是其軍普着絳𫀆𫀆裏皆碧至是悉反之賊以正德爲天子唐書曰武后出緋紫單羅銘襟背𫀆以賜文武臣其𫀆文各有炯戒諸王則飾以盤石及鹿宰相飾以鳯池尚書飾以對鴈左右衛將軍飾以麒麟左右武衛飾以對虎左右鷹對飾以鷹左右千牛餙以牛左右豹韜飾以師子左右金吾飾以象又銘其襟背作八字迴文焉又曰肅宗爲皇太子受冊當彼絳紗𫀆太子以爲與皇帝同稱辭不敢當下百官議帝手勑改爲米明服又曰薛平能守法度理身儉薄一緑𫀆十年不易恩加朱紱然始解去莊子曰曽子居衛緼𫀆無表十年不制衣墨子曰楚莊王鮮冠緼組纓絳衣博𫀆以理其國政也說苑曰子思居衞緼𫀆無裏田子方遺狐白之裘恐其不受謂之曰吾假人遂忘之子思竟不受鹽鐵論曰原憲之緼𫀆賢於季孫之狐狢又曰倪寛練袍衣若僕妾食若庸夫東宫舊事曰太子納妃有絳綾𫀆一領漢武内傳曰上元夫人降武帝服赤霜之𫀆雲綵亂色}
  - {type: variant, offset: 30, length: 0, content: '', SBCK: 錦非繡不可得名神仙傳曰太傅楊駿使人迎孫登共語不荅以􅃨布􅂁賜之受之出門從人借刀斷􅂁上下異處放駿門下又大讙斫刺當時人謂爲狂後乃知駿當誅斬其人王褒内傳曰真人將褒見太上文人着流霞羽􅂁芙蓉冠捜神記曰有談生者年四十無婦夜有女年十五六姿顔無􅀟來爲生妻經三年遂乃生}
  - {type: variant, offset: 30, length: 0, content: '', WYG: 錦非繡不可得名神仙傳曰太傅楊駿使人迎孫登共語不荅復以布袍賜之受之出門從人借刀斷袍上下異處於駿門下又大讙斫當時人謂為狂後乃知駿當誅斬其人王褒内傳曰其人將褒見太上丈人著流霞羽袍芙蓉冠捜神記曰有談生者年四十無婦夜有女年十五六姿顔無雙來為生妻經三年遂乃生}
