  - {type: 'tls:seg', offset: 27, content: '', id: KR3k0012_CHANT_693-1a.11}
  - {type: variant, offset: 27, length: 0, content: '', SBCK: 内衣也論語曰衣弊緼􅂁與衣狐貉者立而不耻者其由也與詩曰豈曰無衣與子同􅂁史記曰􅁗相范雎與魏人湏賈有􅂩及賈使􅁗雎自稱張禄先生見賈寒取一綈􅂁以賜之及數其罪曰尓得無死者將以綈􅂁有戀戀故人之意漢書曰文帝使遺單于繡祫長襦錦祫􅂁各一續漢書曰􅀽安爲光禄勲至清鹿􅂁糲食又曰三老五更皆服都禄大􅂁又曰輿服志曰公主貴人妃以上嫁娶得服錦繡羅􅜄十二色緑􅂁東觀漢記曰明德馬右􅂁極麄踈諸王朝望見反以爲綺華矯後漢書曰藥崧者家貧爲主無􅀍糟食自此詔給帷􅀍皂􅂁􅀽山松後漢書曰靈帝欲以羊續爲太尉時拜三公者皆輸東園禮錢千萬中使取之續乃舉緼􅂁以示之曰臣之所資惟斯而巳故不登公位古今善}
  - {type: page-break, offset: 27, content: '', id: KR3k0012_SBCK_693-1b}
  - {type: variant, offset: 27, length: 0, content: '', WYG: 内衣也論語曰衣敝緼袍與衣狐貉者立而不耻者其由也與詩曰豈曰無衣與子同袍史記曰秦相范睢與魏人須賈有隙及賈使秦睢自稱張禄先生見賈寒取一綈袍以賜之及數其罪曰爾得無死者将以綈袍有戀故人之意漢書曰文帝遺單于繡袷長襦褘袷袍各一續漢書曰袁安為光禄勲至清鹿袍糲食又曰三老五更皆服都禄大袍輿服志曰公主貴人妃以上嫁娶得錦綉羅縠十二色緑袍東觀漢記曰明德馬后袍極麄疎諸王朝望見反以為竒焉後漢書曰藥崧者家貧為郎無被糟食自此詔給帷被皂袍袁山松後漢書曰靈帝欲以羊續為太尉時拜三公者皆輸東園禮錢千萬中使督之續乃舉緼袍以示之曰臣之所資惟斯而已故不登公位古今善}
  - {type: page-break, offset: 27, content: '', id: KR3k0012_WYG_693-2a, image: WYG0899/WYG0899-0211a.png}
  - {type: page-break, offset: 27, content: '', id: KR3k0012_WYG_693-2b, image: WYG0899/WYG0899-0211b.png}
  - {type: variant, offset: 27, length: 0, content: '', krp: 内衣也論語曰衣弊緼𫀆與衣狐貉者立而不耻者其由也與詩曰豈曰無衣與子同𫀆史記曰秦相范雎與魏人湏賈有隙及賈使秦雎自稱張禄先生見賈寒取一綈𫀆以賜之及數其罪曰尓得無死者將以綈𫀆有戀戀故人之意漢書曰文帝使遺單于繡祫長襦錦祫𫀆各一續漢書曰袁安爲光禄勲至清鹿𫀆糲食又曰三老五更皆服都禄大𫀆又曰輿服志曰公主貴人妃以上嫁娶得服錦繡羅縠十二色緑𫀆東觀漢記曰明德馬右𫀆極麄踈諸王朝望見反以爲綺華矯後漢書曰藥崧者家貧爲主無𬒳糟食自此詔給帷𬒳皂𫀆袁山松後漢書曰靈帝欲以羊續爲太尉時拜三公者皆輸東園禮錢千萬中使取之續乃舉緼𫀆以示之曰臣之所資惟斯而巳故不登公位古今善}
  - {type: variant, offset: 28, length: 0, content: '', SBCK: 曰續出黄􅁓􅀘􅂁以示使人時人謡曰天下清苦羊續祖又曰桓鸞字始春焉弟也少立志行緼􅂁糟食不求盈餘以濁丗耻不肯仕魏略曰薛夏字宣聲黄􅀄中爲祕書丞帝與夏推論書傳未甞不終日也帝見}
  - {type: page-break, offset: 28, content: '', id: KR3k0012_SBCK_693-2a}
  - {type: variant, offset: 28, length: 0, content: '', WYG: 曰續出黄紙補袍以示使人時人謡曰天下清苦羊續祖又曰桓鸞字始春鄢弟也少立志行緼袍糟食不求盈餘以濁世耻不肯仕魏略曰薛夏字宣聲黄初中為秘書丞帝與夏推論書傳未嘗不終日也帝見}
  - {type: page-break, offset: 28, content: '', id: KR3k0012_WYG_693-3a, image: WYG0899/WYG0899-0211c.png}
  - {type: variant, offset: 28, length: 0, content: '', krp: 曰續出黄𥿄𥙷𫀆以示使人時人謡曰天下清苦羊續祖又曰桓鸞字始春焉弟也少立志行緼𫀆糟食不求盈餘以濁丗耻不肯仕魏略曰薛夏字宣聲黄𥘉中爲祕書丞帝與夏推論書傳未甞不終日也帝見}
  - {type: variant, offset: 29, length: 0, content: '', SBCK: 衣薄解所御􅂁賜之蜀志曰彭羡字永年姿性驕慠多所輕忽唯敬同郡􅁗安薦之於太守許靖曰􅀼見處士綿竹􅁗安應山甫之德履雋生之直枕石漱流吟詠緼􅂁也王隱晉書曰江東賜凉州刺史張駿真金印大􅂁又曰鄭冲以儒雅爲德莅職無幹局之譽簞食緼􅂁不營資産丗以此重之又曰惠帝自鄴還洛陽賜中書􅁥盧士鸖綾􅂁一領又曰武帝賜桓伊錢百萬􅂁裹千端又曰慕容冲進逼符堅送一領錦􅂁遺冲詔曰古者交兵使在其間今送一􅂁以明夲懷齊書曰卞彬蚤虱賦序曰余居貧布衣十年不製一􅂁之緼有生所託資其寒暑無與易之爲之多病起居甚踈縈􅃦敗絮不能自釋梁書曰侯景將爲亂時謡曰青􅂁白馬壽陽來後景軍中悉着青􅂁景長乗白馬又曰臨賀王正德侯景之亂正德爲平北將軍屯朱雀航景王正德乃北向望闕三拜歔欷流涕引賊入宣陽門與景交揖馬上退據左衛府先是其軍普着絳􅂁􅂁裏皆碧至是悉反之賊以正德爲天子唐書曰武后出緋紫單羅銘􅁭背􅂁以賜文武臣其􅂁文各有炯戒諸王則飾以盤石及鹿宰相飾以鳯池尚書飾以對鴈左右衛將軍飾以麒麟左右武衛飾以對虎左右鷹對飾以鷹左右千牛餙以牛左右豹韜飾以師子左右金吾飾以象又銘其襟背作八字迴文焉又曰肅宗爲皇太子受􅁽當彼絳紗􅂁太子以爲與皇帝同稱辭不敢當下百官議帝手勑改爲米明服又曰薛平能守法度理身儉薄一緑􅂁十年不易恩加朱紱然始解去莊子曰曽子居衛緼􅂁無表十年不制衣墨子曰楚莊王鮮冠緼組纓絳衣􅀶􅂁以理其國政也􅀃苑曰子思居衞緼􅂁無裏田子方遺狐白之裘恐其不受謂之曰吾假人遂忘之子思竟不受鹽鐵論曰原憲之緼􅂁賢於季孫之狐狢又曰倪寛練袍衣􅀂僕妾食􅀂庸夫東宫舊事曰太子納妃有絳綾􅂁一領漢武内傳曰上元夫人降武帝服赤霜之􅂁雲綵亂色}
