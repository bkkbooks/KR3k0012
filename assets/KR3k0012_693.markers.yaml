  - {type: variant, offset: 185, length: 326, content: 以瑞玉為佩佩之鞙然周禮曰玉府掌王之金玉玩好共王之服玉佩玉禮曰主珮倚則臣珮垂主佩垂則臣珮委又曰石駘仲卒無適子有庶子六人卜所以為後者曰沐浴珮玉則兆五人者皆沐浴珮玉石祁子曰孰有執親之喪而沐浴珮玉者乎不沐浴佩玉石祁子兆又曰古之君子必珮玉右徵角左宮羽趨以采齊路門之外樂節也行以肆夏證堂之樂節也周旋中規折旋中矩進則揖之退則揚之然後玉鏘鳴也故君子在車則聞和鸞之聲行則鳴珮玉是以非辟之心無自而入也君在不佩玉左結珮右設珮朝於君亦結左齊則綪結珮而爵韠凡帶必有佩玉唯喪否珮玉有衡牙居中央以前後觸君子無故玉不去身君子於玉比德焉天子佩白玉而玄組綬公侯佩山玄玉而朱組綬大夫珮水蒼玉而純組綬世子珮瑜玉而綦組綬士珮瓀玫而縕組綬孔子珮象環五寸而綦組綬大戴禮曰上車以和鸞為節下車以珮玉為度, SBCK: ''}
