  - {type: variant, offset: 3090, length: 292, content: 年傳博陵人賈德冑教百年嘗作數勑字德冑封以奏帝帝怒召百年百年知不免割帶玦留與妃斛律氏及百年被誅妃把玦哀號不食而死玦猶在手拳不可開其父自擘之乃開白虎通曰能決嫌疑則佩玦瑞應圖曰舜時西王母獻白環玦隨巢子曰召人以環絕人以玦莊子曰儒者綬佩玦者事至而斷西京雜記曰趙飛鷰為皇后女弟昭儀上珊瑚玦孟達與諸葛亮書曰今送綸帽玉玦各一以徵意焉笏釋名曰笏忽也君有教命及所啟白則書其上備忽忘也或曰薄可以薄䟽物禮曰笏天子以球玉諸侯以象大夫以魚須與鬚同文竹士竹本象可也見於天子與射無說音脫笏入太廟說笏非古也小功不說笏當事免則說之免悲哀哭踊之時凡有指畫於君前用笏造受命於君必書於笏笏畢用也因飾焉畢畫也笏度二尺有六寸其中博, WYG: 九十}
