  - {type: variant, offset: 3517, length: 104, content: 五經要義曰天子之笏謂之珽珽然無所屈也周書曰武王不閉外門以示無懼去釰搢笏以示無仇後漢書曰陳蕃為光祿勳范滂為主事以公儀詣蕃執板入閤至坐不奪滂投板振衣而去郭泰責蕃曰以階級言滂宜有敬以類數推之至閤宜省所暴切吳志曰朱治, SBCK: 叚潁滅羗詔賜潁錢十萬絳䄡䄖一}
