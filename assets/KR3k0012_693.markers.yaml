  - {type: variant, offset: 646, length: 4, content: 王祥箸遺, WYG: 徐湛之母㑹稽公主髙祖㣲時有納布衫襖等衣皆是武敬皇后手自作髙祖既貴以此衣付公主曰後代若驕奢不莭者可以此示之又曰到溉為建安太守任昉以詩贈之求二衫云鐵錢兩當一百代易名實為惠當及時無待凉秋日溉荅云余衣本百結閩中徒八蠶假}
  - {type: page-break, offset: 646, content: '', id: KR3k0012_WYG_693-9b, image: WYG0899/WYG0899-0214d.png}
  - {type: variant, offset: 646, length: 0, content: '', krp: 皇甫謐字士安上䟽曰咎繇振褐不仁者逺矣陶潜五栁先生傳曰短褐穿結簞瓢屢空晏如也孝子曰聖人𬒳褐而懷玉墨子曰人不可衣短褐衣服不美身體從容不足觀也新序曰齊有婦人極醜無雙號無塩女行年四十無所容入衒嫁不售乃拂短褐自詣宣}
  - {type: variant, offset: 647, length: 3, content: 祥箸遺, SBCK: 曰願當君王盛顔符子曰有澤父者冠葭蘆之笠納蔍之屨莎裳􅄄衣裴淵記曰蠻夷取􅂖樹皮熟搥之以爲􅄄趙壹疾邪賦曰􅀔家多所冝欬唾自成珠􅀍􅄄懷金玉蘭蕙化爲芻古詩曰短􅄄中無絮帶斷續以䋲衫釋名曰衫芟也衫乗無䄂端也􅃭襠者當胷一當背也揚雄方言曰陳魏宋楚之間謂之䄡或謂之單􅃭沈約宋書曰徐湛之母㑹稽公主髙祖微時有納布衫襖等衣皆是武敬皇后手自作髙祖旣貴以此衣付公主曰後代􅀂驕奢不節者可以此示之又曰到漑爲建安太守任昉以詩贈之求二衫云䥫錢兩當一百代易名實爲惠當及時無待凉秋日漑荅云余衣本百結閩中徒八􅁞假}
