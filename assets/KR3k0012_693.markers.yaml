  - {type: variant, offset: 571, length: 4, content: 申叔儀吳, SBCK: 曰佩玉蘂􅀆余無繫之旨酒一盞􅀆余與􅄄之父睨之對曰梁則無矣麄則有之􅀂登首山以呼庚癸則乎諾軍中不得出粮牧爲私隠庚西方主殻癸北方主水傳言呉子不與士共飢渴所以亡韓詩外傳曰東郭書知宋之將亡故褰􅄄而過鬲其朝曰宋將有棘荆故褰􅄄而避之也居三年宋果亡史記曰五羖}
