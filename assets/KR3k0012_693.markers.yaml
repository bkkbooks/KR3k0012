  - {type: variant, offset: 3383, length: 1998, content: 寸其殺六分而去一殺猶抒也天子抒上終葵首諸侯不終葵首又曰將適公所書思對命思所思念將以告君書之於笏為失忘也又曰侍坐於君子君子欠伸運笏澤劍首還履問日之蚤音早暮請退可也運澤猶翫弄也大戴禮曰天子御珽珽言挺然方正於天下諸侯御荼荼前詘後直下天子也荼音舒大夫服笏前詘後詘無所不護也又曰五經要義曰天子之笏謂之珽珽然無所屈也周書曰武王不閉外門以示無懼去釰搢笏以示無仇後漢書曰陳蕃為光祿勳范滂為主事以公儀詣蕃執板入閤至坐不奪滂投板振衣而去郭泰責蕃曰以階級言滂宜有敬以類數推之至閤宜省所暴切吳志曰朱治領吳郡舉孫權為孝廉後權為吳王治每見權常執板交拜板即笏也晉書曰王敦表溫嶠為丹陽尹因餞會錢鳳自起行酒至鳳未飲嶠偽醉以手板擊鳳幘墜作色曰錢鳳何人溫太真行酒敦不悅兩釋之又曰桓溫秉政謝安王坦之往候之坦之倒持手板宋書曰建平王宏文帝子也元凶劭弒立孝武入討劭錄宏殿內自拔莫由孝武先嘗以一手板於宏遣左右親信周法道齎手板詣孝武事以為尚書左僕射又曰庾道愍尤精相板宋明帝時山陽王休祐屢以言語忤顏見道愍託以己板為他物令道愍占之道愍曰此乃甚貴然使人多愆忤祐以禇彥同祥密求換其板他日彥回侍明帝自稱下官帝多忌甚不悅休祐具以狀言帝乃意解又曰綦母珍之在西州時有一手板相者云當貴每以此言動帝又圖黃門郎帝嘗問之曰西州時手板何在珍之曰此是黃門手板官何須問帝大笑齊書曰豫章王嶷薨見形於第居第也後園乘腰輿指麾處分呼直兵直兵無手板左右授一玉手板與之謂曰橘樹一株死可覔補之因出後園閣直兵倒地仍失手板宋書曰明帝起事諸方並舉兵帝謂蔡興宗曰頃日人情言何事當濟不興宗曰今米甚豐賤而人情更安以此論之清蕩可必伹臣之所憂更在事後猶羊公言既平之後方當勞聖慮耳尚書禇彥回以手板築興宗不已上曰如卿言北齊書曰爾朱榮既誅得其手板上有數牒啟皆左右去留人名非其腹心在出限帝曰豎子若過今日便不可制又曰文襄疑文宣佯愚慮其有後變將陰圖之以問崔暹暹曰嘗與二郎俱在行位試以手板柏其背而不瞋乃將犀手板換暹竹者自揩拭而翫視之以是知其實癡不足慮也帝既鏁暹責其往昔打背暹自陳所對文襄之言己功以贖死帝悟曰我免禍乃暹之力釋而勞之唐書曰高宗欲立武昭儀禇遂良諫不從置笏殿街曰還陛下此笏乃解巾叩頭流血又曰崔滌玄宗時嘗朝夕宮掖出入無間慮有所漏洩乃於滌笏上親札慎密二字以誡之又曰玄宗以張九齡體弱簪笏不勝命置笏囊又曰李絳面論吐突承瓘用兵無功合從顯責又論承瓘於軍中立聖政碑事不可許上初怒色變絳語不已詞旨懇切因泣下上察其意乃大開忤拜絳為中書舍人即命曳去所立碑曰微降言吾不知為損又面賜絳紫親為絳擇笏以賜之因謂之曰爾他時勿易此心又曰朱泚盜據宮闕乃遣將韓旻領兵疾趨奉天召段秀實與之謀議秀實從欲圖之陰說大將劉海賓何明禮等同謀殺泚明日泚召秀實議事秀實勃然而起奪源休笏以擊泚傷額流血海賓等不至秀實遂被害又曰魏謨文宗時為起居舍人上謂之曰卿家有何舊書詔對曰比多失墜唯簪笏獨存輒令進之鄭覃曰在人不在笏上曰覃不解我意乃此甘棠之義非在笏而已三禮圖曰士竹笏飾以象骨大夫飾以魚須輿服雜事曰古者貴賤皆執笏主書君上之政令有事則搢之於要帶中近代以來唯八座尚書執笏者白筆綴手板頭以紫囊褁之其餘王公卿士但執手板主于敬不執笏亦非記事官也周遷車服雜事曰應仲遠云昔荊軻逐秦王其後謁者持匕首以備不虞從此侍官執刀劍漢高祖偃武脩文始制以手板代焉江表傳曰孫權既即尊位請會百官歸功周瑜初張昭勸迎曹公權不從而周瑜敗之及是昭舉笏欲褒贊功德未及言權曰如張公之計今已乞食矣昭大慚伏地流汗又曰獻帝嘗見郗慮及少府孔融問融曰鴻豫慮字鴻豫何所優長融曰可與適道未可與權慮舉笏曰融昔宰北海政散民流其權安在遂與融互相長短穆天子傳曰天子大服冕禕帗帶搢笏夾佩郭璞注云沃蹕也夾佩左右兩佩也奉壁南面立于塞下受何也郭子撗洞冥記曰孟歧清河之逸人也年可七百歲語及周初時事如目前歧時侍周公升壇上政以手摩成王之足周公以玉笏與之郡國志曰晉明為太子時嘗戲殿前以玉手板弄銅蟠螭口手傾溜入螭腹中不能出人後見一白鼠出入螭口世說曰王子猷作桓車騎騎兵參軍桓曰卿在府久此當相料理初不荅高視以手板柱頰云西山朝來致有爽氣相手板經曰相手板法出蕭何或曰四皓初出殆不行世東方朔見而善之曰此非庸人所解至魏司空陳長史見此書歎伏以示許士宗韋仲將管輅見而推歎郭景純以夜兼晝方得其妙理相手板將以閑太之時取五行尋四時定八節明二十四氣百不失一板長一尺五寸廣一寸五分上狹而薄下廣而厚八角十二芒並欲端平板形皆完淨板凶少吉多者可用吉少凶多者不可用服也舊用白直檀剌榆桑柘四材也番當令理通直從上至下直如絃不得出邊絕理板頭是君坐板頭缺與君共事必不得終分板作四分上一分為二親左為父右為母第二分都為婦第三分左為男右為女第四分左為奴右為婢婢之不辟方留為田宅財物牛馬猪羊鷄犬之屬以五行十二時分若其處崩毀傷蹈破裂弔節蝎穿兆隨所屬物必損失死亡板兩邊左為城右為社寬博文彩班班光澤清淨必得封邑仲長子曰笏以書君教令記善剌過今之板以象焉劉義恭啟事曰聖恩優重猥賜華纓玉笏珍冠飾首琛板耀握非臣朽薄所宜服之, WYG: ''}
