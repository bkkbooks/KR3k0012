  - {type: variant, offset: 1163, length: 166, content: 孔藂子曰子產死鄭人大夫舍玦珮婦女舍珠玉說死曰襄成君始封之日衣翠衣帶玉珮至流水之上大夫莊辛見而悅之又曰經侯過魏太子左服玉具劍右帶珮環左光照左右光照右太子不視經侯曰魏國有寶乎太子曰主信臣忠百姓戴上此魏國寶也經侯應聲解劍而去珮鹽鐵論曰子思銀珮尚書舊傳曰淑妃脩媛脩華修容婕妤佩彩瓊玉貴人珮於寘玉鄴中記曰石虎後出行有女鼓吹尚書官屬皆著錦袴珮玉, SBCK: ''}
