  - {type: variant, offset: 4310, length: 262, content: 齡體弱簪笏不勝命置笏囊又曰李絳面論吐突承瓘用兵無功合從顯責又論承瓘於軍中立聖政碑事不可許上初怒色變絳語不已詞旨懇切因泣下上察其意乃大開忤拜絳為中書舍人即命曳去所立碑曰微降言吾不知為損又面賜絳紫親為絳擇笏以賜之因謂之曰爾他時勿易此心又曰朱泚盜據宮闕乃遣將韓旻領兵疾趨奉天召段秀實與之謀議秀實從欲圖之陰說大將劉海賓何明禮等同謀殺泚明日泚召秀實議事秀實勃然而起奪源休笏以擊泚傷額流血海賓等不至秀實遂被害又曰魏謨文宗時為起居舍人上謂之曰卿家有何舊書詔對曰比多失墜唯簪笏獨存輒令進之鄭覃曰在人不在笏上曰覃不解我意乃此甘棠之義非在笏而已, SBCK: 十}
