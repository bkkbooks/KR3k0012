  - {type: variant, offset: 578, length: 1, content: 孫, SBCK: 之賢自粥􅁗客􅀍􅄄食牛朞年舉之牛口之下加之百姓之上又曰趙惠文王得楚和氏壁􅁗昭王遺趙王書願以十城易壁趙遣藺相如奉璧秦王無償城色相如使從者衣􅄄懷壁便道亡歸又曰婁敬齊人戍隴西過洛陽衣羊裘因齊人虞將軍求見上虞將軍欲爲易其衣不肯曰臣衣帛衣帛見衣􅄄衣􅄄見遂見上􅀃上西都長安漢書曰貢禹上書云年老貧窮家貲不滿萬錢妻子糠豆不贍短􅄄不完范曄後漢書曰張􅀇處徴}
