  - {type: variant, offset: 1403, length: 0, content: '', SBCK: 鵰鶡爲旗幟漢書曰京兆尹張敞言鶡雀飛集丞相府丞相黄霸以爲神雀欲以上聞敞劾奏之霸大慙續漢書輿服志曰虎賁武􅀐皆鶡者勇雉也其􅋐死乃止故趙武靈王以表武士焉晉八王故事曰張方將移惠帝於長安入殿奉迎自領五千􅀐皆捉鐵􅆞槊二節髮眊繫兠鍪皆用凉州白鶡毛望之􅀂茶天子見之大驚山海經曰惲諸之山其}
