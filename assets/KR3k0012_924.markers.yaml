  - {type: variant, offset: 12, length: 0, content: '', SBCK: 文士􅀓曰黄祖丗子射賔客大㑹有獻鸚鵡鳥射舉巵酒扵禰衡曰願先生爲之賦事具賦門成公綏鸚鵡賦曰小鳥以其能言解意故育以金籠昇之堂殿然未得鳥之性張華鷦鷯賦曰鸚鵡慧而入籠􅀓咸荅李斌書曰吾作左丞未幾而以吾爲京兆雖心知此爲不合然是家親郷里自願便􅁒從耳時足下問吾當去否吾荅鸚鵡子言阿安樂今到阿安樂何爲不去宣驗記曰有鸚鵡飛集山中禽獸輙相愛重鸚鵡不可乆也便去後月山中大火鸚鵡遥見便入水沾羽飛而洒之天神言汝雖有志何足云也鸚鵡曰猶知不能然甞僑是山禽獸行善皆爲兄弟不忍見耳天神嘉感即爲滅火南方異物志曰鸚鵡鳥有三種一種青大如鳥臼一種大如鴟鶚一種五色大如青而小於白者交州以南盡有之白及五色出杜薄州凡鳥四指三向後此鳥兩向前兩指向後異於凡鳥也行則以口啄地然後足從之又曰廣管雷羅春勤等州多鸚鵡野者翠毛丹觜可效人言但稍小不及隴山者毎羣飛皆數百􅃗山果熟者遇之立盡南中云養之切忌以手捫摸其背犯者即不飲不啄病而卒余寓畨禺曽遊新㑹縣遇安南歡好使麴將軍名承美見代爲交趾使也見養一鸚鵡背尾有深淺翠毛臆前淡紫嫰紅間出兩腋別垂黄毛翅尾甚竒雲南行記曰瞿笇館磴道﨑危又過兩重髙山上下各十四五里山頂平四望無人煙多鸚鵡又曰新安城路多縵山盡是松林其上多鸚鵡飛鳴周宣夢書鸚鵡爲亡人居宅也夢見鸚鵡是亡人也其在堂上憂豪賢白鸚鵡笁法眞登羅浮山記曰山中有純白鸚鵡異􅁐曰張華字茂先有一白鸚鵡華毎行還鳥輙說僮使善惡後寂無言華問其故鳥云見藏瓮中何由得知公後在外令喚鸚鵡鸚鵡曰昨夜夢惡不出户公猶強之至庭爲鸇所撥敎其啄鸇脚僅而􅀗免南史曰婆皇國宋大明三年獻赤白鸚鵡又曰婆利國梁普通三年其王頻伽遣使珠智獻白鸚鵡隋書曰杜正玄㓜聦敏愽渉多通開皇末舉秀才㑹林邑獻白鸚鵡僕射楊素促召正玄使作賦正玄倉卒之際援筆立成素見文不加􅀧始異之又曰獨􅀌師受蕃客鸜鵡帝察知遂斬之唐書曰貞觀中陁洹國王察失利多婆末郍遣使獻白鸚鵡毛羽皓素頭上有紅毛數十垂與翅齊并五色鸜鵡各一明皇􅄂録曰開元中嶺南獻白鸚鵡養之宫中歳乆頗聦慧洞曉言詞上及貴妃皆呼雪衣女性旣馴擾常假其飲啄飛鳴然亦不離屏帷間上令以近代詞臣詩篇授之數遍便可諷誦上毎與貴妃及諸王􅀶戲上稍不勝左右呼雪衣娘必飛入局中一鼔舞以亂其行列或啄嬪御及諸王手使不能争道忽一日飛上貴妃鏡臺語曰雪衣娘昨夜夢爲鷙鳥所􅅮將盡於此乎上使貴妃授以多心經記誦頗精熟日夜不息􅀂懼禍難有所攘者上與貴妃出於別殿貴妃致雪衣娘於歩輦竿上與之同去旣至上命從官校獵於殿下鸚鵡方戲於殿檻瞥有鷹至立時而斃上與貴妃歎息乆之遂命瘞於􅁐中爲立冢呼爲鸚鵡塜赤鸚鵡沈約宋書曰謝莊爲太子庶子時南平王鑠上赤鸚鵡普詔羣臣爲賦太子左衛率􅀽淑文冠當時作賦畢賫以示莊莊賦亦竟淑見而歎曰江東無我卿當獨秀我􅀂無卿亦一時傑也遂隱其賦南史曰西南夷訶羅陁國宋元嘉七年遣使貢金指環赤鸚鵡五色鸚鵡吴時外國傳曰扶南東漲海中有洲出五色鸚鵡曽見其白者如母鷄廣志同唐書曰玄宗有五色鸚鵡能言育於宫中上命左右試牽御衣鳥輙瞋目吨咤歧王能文學因獻鸚鵡篇以賛其事上以示百寮尚書左丞相張說上表賀曰伏見天恩以靈異鸚鵡及所述篇出示朝列臣按南海異物志有時樂鳥鳴皆太平天下有道則見臣験其圖丹首紅臆朱冠緑翼與此鸚鵡無異而心聦性辯護主報恩故非常品凡禽實瑞經所謂時樂鳥也歧王雖叙其事未正其名望編國史以彰聖瑞又曰元和十年訶陵國遣使獻五色鸚鵡頻伽鳥嶺表異録曰容管廉白州産􅁗􅁻了大約似鸚鵡觜脚皆紅兩眼後夾腦有黄􅁏冠善效人言語音雄大分明於鸚鵡以熟鷄子和飰如􅀥飼之或云容州有純白色者俱未之見也孔雀春秋元命苞曰火離爲孔雀周書曰成王時方獻孔雀方亦戎別名漢書曰􅄢賔國出孔雀又曰尉佗獻文帝孔雀二雙續漢書曰西南夷魚池出孔雀又曰西域條支國出孔雀張璠漢記曰條支國臨西海出師子孔雀江表傳曰魏文帝遣使於吴求孔雀羣臣以爲非禮欲不與孫權勑付使魏文帝與朝臣詔曰前于寘王所上孔雀尾萬枚文采五色以爲金根車盖遥望耀人眼吴志曰孫休永安五年使察獸到交趾調孔雀大猪又曰薛綜上䟽曰日南逺致孔雀充備寳玩不抑其賦以益中國吴録地理志曰交阯西子縣多孔雀在山草中郡内及朱崖皆有之晉書公卿賛曰丗祖時西域獻孔雀解人語彈指應聲起儛晉書公孫皓時交趾太守孫諝貪累爲百姓所患㑹察獸鄧荀至擅調孔雀三千頭人畜一頭遣送秣稜和旣苦逺役咸思爲亂郡吏吕興殺諝及荀以郡内附齊書曰武帝年十三夢人以筆􅀞身左右爲兩翅又着孔雀羽衣裳空中飛舉又曰文惠太子長懋製珎翫之物織孔雀毛爲裘光采金翠過於雉頭逺矣}
