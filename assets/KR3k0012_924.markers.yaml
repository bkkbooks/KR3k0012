  - {type: variant, offset: 457, length: 1, content: 鎮, WYG: 成王時蒼梧獻翡翠漢書曰尉佗獻文帝翠鳥千又曰燕刺王旦郎中侍從貂羽黄金附蟬徐廣車服注曰天子輅金根車翠羽盖皇后首飾歩摇八雀九華加翡翠吳録曰薛綜上疏曰日南逺致翡翠充備寶玩晉令曰翡鳥不得}
