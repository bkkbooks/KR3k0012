  - {type: variant, offset: 1187, length: 903, content: 魏志曰戴絍烏巢張珔門陰告門人曰夫戴鵀陽鳥而巢門陰此凶祥也旬日而卒揚雄方言曰燕之東北朝鮮洌水之間鳲謂之鶝鴀自關而東謂之戴絍東齊海岱之間謂之戴南南猶絍也或謂之紡澤或謂之輻燕之東北朝鮮冽水之間謂之𪂉𪂉郭璞注爾雅曰尸鳩布穀非戴勝也爾雅紡在戴絍下然曰案爾王鳥名爾方言依此義又失之廣雅同也扈詩曰交交桑扈率塲啄粟桑扈竊脂也牋云竊脂肉食今無肉自場啄粟失其性也不能以自治又曰交交桑扈有鶯其羽詩義䟽曰或說有鶯其羽言雖小鳥其鶯然有文章左傳曰郯子云少皞擊以鳥名官九扈為九農正扈民無淫者也杜預注云扈止也止民使不淫爾雅曰春扈頒扶云切鶞勑偷切夏扈竊玄秋扈竊藍冬扈竊黃桑扈竊脂棘扈竊丹行扈唶唶子夜切宵扈嘖嘖郭璞注曰諸扈皆因其毛色音聲以名也犍為舍人曰頒鶞主三士宜穀種樹也竊玄黑色移民去黃竊扈青移民收歛竊黃色黃氏蓋藏竊丹色赤為民鴟鳥行扈晝行鳴宵扈夜行鳴皆隨四時同依諸扈為節候也嘖音債山海經曰崌山有鳥焉如鶚赤身白首其名竊脂郭璞注曰今呼責雀為竊脂疑非此也又曰上申之山鳥多當扈狀如雉以髯飛食之不眴目上音瞬淮南子曰馬不食脂桑扈不啄粟非廉也左思齊都賦曰四扈推移春秋冬夏四時鳥也百舌禮記曰仲夏之月反舌無聲鄭玄注曰反舌百舌也又曰郯子曰少皞鳥師而鳥名祝鳩氏司徒者也杜預注鵻鳩孝故為徒主司教民春秋保乾圖曰江充之害太子交啄反舌鳥入殿宋均注曰交啄反舌百舌鳥風土記曰祝鳩反舌也鄭注禮記云反舌百舌鳥麋信難曰案緯書反舌蝦蟆也昔於長安與諸生共至城北水中取蝦蟆剝視之其舌反成向此則鄭君得過乎喬夙荅曰蝦蟆五月中始得水當聒人耳何云無聲是知蝦蟆非反舌鳥易通卦驗曰反舌鳥乃能反覆其舌隨百鳥之音周書曰芒種之日又五日反舌無聲反舌有聲佞人在側孔子明鏡曰國臣謀反有反舌鳥入宮淮南子曰人有多言猶百舌之聲後魏書曰汝陽王為東豫州刺史舉城降梁梁武以為北道總督至項城朝廷出師討之望風退走梁武責之曰舌同百鳥瞻若鼷鼠遂徙合浦郭愔百舌鳥詩曰百舌鳴高樹弄音無常則借問聲何煩永俗不尚嘿伯勞禮曰仲夏之月鷃始鳴鄭云鵙搏勞蔡邕章句鵙伯勞一曰伯趙應時而鳴為陰候也左傳曰郯子云少皞時伯趙氏司至者也杜預注曰伯越伯勞也夏至鳴冬至止詩曰七月鳴鵙鄭玄曰伯勞鳴將寒之候五月鳴幽也晚寒鳥物之候從其氣焉爾雅曰鵙伯勞也郭璞注曰似𪁞鶡而大, WYG: ''}
