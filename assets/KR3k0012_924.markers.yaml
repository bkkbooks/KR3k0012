  - {type: variant, offset: 459, length: 4, content: 將軍謝尚, WYG: 度隴倉頡解詁曰鷸翠别名也說文曰翡翠青赤雀也異物志曰翠鳥似燕翡赤而翠青其羽可以為飾又南州異物志曰翠唯六翮毛長寸餘青茸翡大於燕小於烏又曰翠鳥先髙作巣及生子愛之恐墜稍下作巣子生羽毛復益愛之又更下巣也又異物志曰翠大如燕腹背純赤民捕食之不知貴其毛羽也廣志曰翡色赤翠色紺皆出交趾與古縣交州志曰翡翠出九真頭黒腹下赤青縹色似鷓鴣太𤣥經曰翡翠狐鼦好作咎也離騷曰翾飛兮翠層楚辭曰翡帷翠幬宋玊登徒子賦曰眉如翠羽司馬相如子虛賦曰錯翡翠之威吳都賦曰山雞歸飛而來棲翡翠列巣以重行劉羣七筆曰剪雋陵之縹翠函葱嶺之碧雞秦書曰苻堅時西域獻翠鳥四頭雄雌各二籠盛之月餘並死左傳曰鄭子臧好聚鷸冠戰國䇿曰趙且伐燕蘇秦謂燕惠王曰今者臣來過水蚌方出曝而鷸啄其肉蚌合而拑其喙鷸曰今日不雨明日不雨即見蚌脯蚌亦謂鷸曰今日不出明日不出必有死鷸蚌鷸兩不肯解漁者并擒之今趙且伐燕燕趙久相支以弊衆臣恐强秦之為漁父也范子曰計管者蔡丘漢上人晉三公子姓辛氏}
