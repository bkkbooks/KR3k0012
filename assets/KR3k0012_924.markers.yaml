  - {type: variant, offset: 12, length: 0, content: '', WYG: 文士傳曰黄祖世子射賔客大㑹有獻鸚鵡鳥者舉巵酒於禰衡曰願先生為之賦事具賦門成公綬鸚鵡賦曰小鳥以其能言解意故育以金籠昇之堂殿然未得鳥之性張華鷦鷯賦白鸚鵡慧而入籠傅咸荅李斌書曰吾作左丞未幾而以吾為京兆雖心知此為不合然是家鄉親里自願便從俗耳時足下問吾當去否吾荅鸚鵡子言阿安樂今到阿安樂何為不去冥驗記曰有鸚鵡飛集山中禽獸輙相愛重鸚鵡不可久也便去後月山中大火鸚鵡遥見便入水沾羽飛而洒之天神言汝雖有志何足云也鸚鵡曰固知不能然是山禽獸行善皆為弟兄不忍見耳天神嘉感遂滅火南方異物志曰鸚鵡有三種一種青大如烏臼一種白大如鴟鴞一種五色大於青者交州以南盡有之五色者出杜薄州凡鳥四指三向後此鳥兩指向前兩指向後異於凡鳥也行則以口啄地然後足從之又曰廣管雷羅等州俱多鸚鵡翠毛丹嘴可效人言但稍小不及隴山者每羣飛皆數百隻山果熟時遇之立盡南中云飬之切忌以手捫摸其背犯者即不飲不啄病而卒余寓番禺曽遊新㑹縣遇安南歡好使麴將軍見飬一鸚鵡背尾有深淺翠毛臆前淡紫嫩紅間出兩䏶别垂黄毛翅尾甚可愛雲南行記曰瞿笇館路﨑危又過重髙山上下各十四五里山頂平西望無人烟多鸚鵡又曰新安城路多縵出盡是松林其上多鸚鵡飛鳴周宣夢書曰鸚鵡為亡人居宅也夢見鸚鵡憂亡人也其在堂上憂賢豪也白鸚鵡羅浮山記曰山中有純白鸚鵡異苑曰張華字茂先有一白鸚鵡華每行還鳥輙說僮僕善惡后寂無言華問其故鳥云見藏瓮中何由得知公後在外令喚鸚鵡鸚鵡曰昨夜夢惡不出户公猶强之至庭為鸇所搏教其啄鸇脚僅而獲免南史曰婆皇國宋大明三年獻鸚鵡又曰婆利國梁普通三年其王頻伽遣使智獻白鸚鵡隋書曰杜正𤣥㓜聰敏博涉多通開皇末舉秀才㑹林邑獻白鸚鵡僕射楊素促召正𤣥使作賦正𤣥倉卒之際援筆立成素見文不加㸃始異之又曰獨孤師受畨客鸚鵡帝察之遂論斬決唐書曰貞觀中陁洹國王察失利多􅀢末郍遣使獻白鸚鵡毛羽皓素頭上有紅毛數十與翅齊並五色鸚鵡各一明皇襍録曰開元中嶺南獻白鸚鵡飬之宫中嵗久頗聰慧洞曉言詞上及貴妃皆呼為雪衣女性最馴擾雖常飲啄飛鳴然亦不離屏帷間上令以近代詞臣詩篇授之數遍便可諷誦上每與貴妃及諸王博戲上稍不勝左右呼雪衣娘必飛入局中鼔舞以亂其行列或啄嬪御及諸王手使不能争道忽一日飛上貴妃鏡臺語曰雪衣娘昨夜夢為鷙鳥所搏將盡於此乎上使貴妃授以多心經記誦頗精熟日夜不息若懼禍難有所禳者上與貴妃出於别殿貴妃致雪衣娘於步輦竿上與之同去既至上命從官校獵於殿内鸚鵡方戲於殿檻瞥有鷹搏之而斃上與貴妃歎息久之遂命瘞於苑中立􅊘呼為鸚鵡􅊘赤鸚鵡宋書曰謝荘為太子庶子時南平王鑠上赤鸚鵡普召羣臣為賦太子左衛率袁淑之文冠當時作賦畢齎以示荘荘賦亦竟淑見而歎曰江東無我卿當獨秀我若無卿亦一時傑也遂隠其賦南史曰西南夷詞羅地國宋元嘉七年遣使貢金指環赤鸚鵡五色鸚鵡外國傳曰扶南東漲海中有洲出五色鸚鵡㑹見其白者如母雞唐書曰𤣥宗有五色鸚鵡能言育於宫中上命左右試牽御衣鳥輒瞋目叱咤岐王文學熊延京因獻鸚鵡篇以賛其事上以鳥及延京詩示百僚尚書左丞相張說上表賀曰伏見天恩以靈異鸚鵡及熊延京所述篇出示朝班列臣按南海異物志有樂鳥鳴皆太平天下有道則見臣騐其圖丹首紅臆珠冠緑翼與此鸚鵡無異而心聰性辨護主報恩固非常品凡禽實瑞經所謂時樂鳥也延京雖叙其事未正其名望編國史以彰聖瑞又曰元和十年訶陵國遣使獻五色鸚鵡嶺表録異曰容管廉邕諸州産秦吉了大約似鸚鵡嘴脚背脛兩股後夾腦有黄玉冠善效人言音頗雄大分明於鸚鵡以熟雞子和如棗子飼之或云容州有純白色者俱未之見也孔雀春秋元命苞曰火離為孔雀周書曰成王時方獻孔雀方亦戎别名漢書曰􅄢賔國出孔雀又曰尉佗獻孔雀二雙續漢書曰西南夷滇池出孔雀又曰西城條支國出孔雀張璠漢記曰條支國臨西海出孔雀江表傳曰魏文帝遣使於吳求孔雀羣臣以為非禮欲不與孫權勅付使魏文帝與朝臣詔曰前于闐王所上孔雀尾萬枝文采五色以為金根車盖遥望耀人眼呉志曰孫休永安五年使察獸到交趾調孔雀大猪又薛綜上䟽曰日南逺致孔雀充備寶玩不抑其賦以益中國地理志曰交趾西子縣多孔雀在山草中郡内朱崖有之晉書公卿贊曰世祖時西域獻孔雀解人語彈指應聲起儛公孫皓時交趾太守孫諝貪墨為百姓所患㑹察獸鄧荀至檀調孔雀三千頭遣送秣陵既苦逺役咸思為亂郡吏吕興殺諝及荀以郡内附齊書曰武帝年十三夢人以筆畫身左右為兩翅又著孔雀羽衣裳空中飛舉又曰文慧太子長懋制珍玩之物織孔雀毛為裘光采金翠過於雉頭逺矣}
