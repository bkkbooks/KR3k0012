  - {type: variant, offset: 3005, length: 521, content: 注桃蟲鷦鷯是也故爾雅曰桃蟲鷦也微小黃雀其鶵化為蜩故俗語曰鷦鷯生蜩雀易林亦謂桃蟲生蜩或云布穀生子鷦鷯養之方言曰自關而東謂之土雀或謂之女匠今亦名巧婦以東呼希母自關而西謂之鸋鴂爾雅云𪁽鴙鵄鴞屬也非甯決音自關而西謂之桑死或謂之蔑雀莊子曰鷦鷯巢深林不過一枝說苑曰孟嘗君寄客於齊王三年不見用客反見孟嘗君曰不知臣罪耶君之過也孟嘗君曰縷因針而入不因針而急夫子之才必薄矣客曰不然臣見鷦鷯巢於葦之苕鴻毛著之臨危建之工女不能為可謂完堅矣大風至則苕折卵破者其所託者使然也晉書曰張華素孤貧為鷦鷯賦成阮籍見之曰王佐之才也由是聲名始著巂爾雅曰巂周也郭璞注曰巂鳥孫炎為鷰別名風土記亦云是赤口鷰也蜀王本紀曰望帝使臣鱉靈治水去後望帝與其妻通慚愧且以德薄不及鱉靈乃委國授之去望帝去時子䳏鳴故蜀人悲子䳏鳴而思望帝望帝杜宇也從天墮臨海異物志日鷤䳏一名田鵑春三月鳴晝夜不止音聲自呼俗言取母血塗其口兩邊皆赤上天自言乞恩至當陸子熟鳴乃得止耳呂氏春秋曰伊尹說云肉之美者巂燕鷰之翠高誘注鳥名翠踈異苑曰杜鵑始陽相推而鳴先發聲者便吐血死昔有人山行見一群寂然即聊學其聲便嘔血死鵽爾雅曰鵽鳩冠雉郭璞注曰鵽大如鴿似鳴雉鼠腳無後指歧為鳥憨急群飛出北方沙漠地莊子曰青鵽愛子忘親司馬彪注曰鵽鳥專愛其子而忘其母也, SBCK: ''}
