  - {type: variant, offset: 4308, length: 194, content: 元年太山有鳶焚其巢子墮地黑色東觀漢記曰馬援擊交阯下潦上霧毒氣上蒸仰視烏鳶跕跕丁兼切墮水中梁書曰永安侯蕭礭字仲正少好弓馬人有笑者礭謂之曰吾當為國家破賊故預習之每臨陣對敵意氣安祥帶甲據鞍自朝至夕馳驟往返不以為勞侯景愛之恒在左右常從景出獵見飛鳶景眾射之莫能中礭射之應弦而落自是王偉忌之隋書曰崔彭善射達頭可汗遣使於上曰請得崔將軍一與相見上曰此必善射聞於虜庭所以來請耳遂遣之及至匈奴中可汗召善射者數, SBCK: 御覽卷第九百二}
