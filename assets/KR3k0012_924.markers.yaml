  - {type: variant, offset: 1399, length: 3, content: 少皞擊, SBCK: 鷓鴣雖東西廽翔然開翅之始必先南翥亦胡馬嘶北之義也其鳴自呼社薄州本草云自呼鈎輈格􅣭李群玉山行聞鷓鴣詩云方穿詰曲﨑嶇路又聽鈎輈格磔聲白鷼西京雜記曰南越王獻髙帝白鷼黒鷼各一􅃗後漢書班固傳西都賦曰招白鷼下􅀟鵠榆文竿出比目王彪之閩中賦曰林鷼繡白謝惠連雪賦曰白鷼失素南雲記曰韋齊休使至雲南其國饋白鷼皆生致之鶡說文曰鶡似雉出上黨列子曰黄帝與炎帝戰}
