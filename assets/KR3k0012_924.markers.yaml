  - {type: variant, offset: 1021, length: 0, content: '', SBCK: 來翔月餘而去異物志曰孔雀其大如鴈而足髙毛皆有班文采捕得畜之拍手則舞又曰孔雀形體旣大細頸隆背似鳯凰自背及尾皆作珠文五彩光耀長短相次羽毛末皆作貟文五色相繞如帶千錢文長二三尺頭}
