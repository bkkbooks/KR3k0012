  - {type: variant, offset: 1862, length: 212, content: 聲佞人在側孔子明鏡曰國臣謀反有反舌鳥入宮淮南子曰人有多言猶百舌之聲後魏書曰汝陽王為東豫州刺史舉城降梁梁武以為北道總督至項城朝廷出師討之望風退走梁武責之曰舌同百鳥瞻若鼷鼠遂徙合浦郭愔百舌鳥詩曰百舌鳴高樹弄音無常則借問聲何煩永俗不尚嘿伯勞禮曰仲夏之月鷃始鳴鄭云鵙搏勞蔡邕章句鵙伯勞一曰伯趙應時而鳴為陰候也左傳曰郯子云少皞時伯趙氏司至者也杜預注曰伯越伯勞也夏至鳴冬至止詩曰七月鳴鵙鄭玄曰伯勞鳴將寒之候五月鳴幽也晚寒鳥物之候從其氣焉, SBCK: 懸鶉兮}
