  - {type: variant, offset: 1017, length: 2, content: 季春, SBCK: 魯恭王好闘鴨鴈養孔雀鵁鶄奉榖一年二千石鹽鐵論曰南越以孔雀珥門户今貴其所饒非所以厚中國也太玄經曰孔鴈}
  - {type: variant, offset: 1017, length: 2, content: 季春, krp: 魯恭王好闘鴨鴈養孔雀鵁鶄奉榖一年二千石鹽鐵論曰南越以孔雀珥門户今貴其所饒非所以厚中國也太玄經曰孔鴈}
  - {type: variant, offset: 1020, length: 0, content: '', SBCK: 義可法則也虞翻注曰鴈飛成列亦成行故可法則也郭子曰梁國陽氏子年九歳甚聦慧孔君平詣其父不在乃呼兒岀爲之設果有楊梅孔指以示兒此實君家果應聲荅曰未聞孔雀是夫子家禽南越志曰義寧縣杜山多孔雀爲鳥不必疋合止以音影相接便有孕楚辭曰孔雀盖兮翠旌王延曰以孔雀之翅爲車盖登九天兮撫慧星華陽國志曰雲南郡出孔雀常以二}
  - {type: variant, offset: 1020, length: 0, content: '', krp: 義可法則也虞翻注曰鴈飛成列亦成行故可法則也郭子曰梁國陽氏子年九歳甚聦慧孔君平詣其父不在乃呼兒岀爲之設果有楊梅孔指以示兒此實君家果應聲荅曰未聞孔雀是夫子家禽南越志曰義寧縣杜山多孔雀爲鳥不必疋合止以音影相接便有孕楚辭曰孔雀盖兮翠旌王延曰以孔雀之翅爲車盖登九天兮撫慧星華陽國志曰雲南郡出孔雀常以二}
