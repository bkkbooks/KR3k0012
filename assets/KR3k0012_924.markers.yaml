  - {type: variant, offset: 1181, length: 7, content: 戴絍下蠶始生魏, SBCK: 神靈滋液則翠羽曜周書曰成王時蒼梧獻翡翠漢書曰尉佗獻文帝翠鳥千又曰燕刺王旦郎中侍從豸羽黄金附蟬晉灼曰以翠羽飾冠徐廣車服注曰天子輅金根車翠羽盖皇后首飾歩摇八雀九革加翡翠吴録曰薛綜上䟽曰日南逺致翡翠充備寳玩晉令曰翡鳥不得西度隴倉頡解詁曰鷸翠別名也說文曰翡翠青赤雀也異物}
