  - {type: variant, offset: 3903, length: 180, content: 也淮南子曰虞氏者梁富人也登高樓臨大路設樂陳酒博於其上遊俠相隨行樓下博者射中而笑飛鳶墮腐鼠而中遊俠俠相與語曰虞氏富人奚有輕人之志乃辱我以腐鼠其夜乃殺虞氏大滅其家此謂類非也淮南萬畢術曰鴟腦令鷄自伏取鴟腦以塗鷄自即伏不能起也呂氏春秋曰亂國之妖市有舞鴟鹽鐵論曰泰山之鴟啄腐鼠於窮澤非有害於人也今有同盜主財而食之焉得若泰山之鴟乎後魏書曰孝武即位蠕蠕諸藩並遣使朝貢帝臨軒宴, SBCK: 宮内嬪好皆恱}
