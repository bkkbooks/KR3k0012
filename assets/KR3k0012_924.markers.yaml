  - {type: variant, offset: 291, length: 151, content: 襦褰袴也鸜鵒之巢遠哉遙遙稠父喪勞宋父以驕稠父昭公死故喪勞也宋父定公代玄以驕鸜鵒鸜鵒往歌來哭昭公生出歌也死還哭也童謠有是今鸜鵒來巢其將及乎公羊傳曰有鸜鵒來巢何以書記異也何異爾非中國之禽也宜穴而巢何休注曰鸜鵒猶欲此推固欲自下居上之徵春秋考異郵曰鸜鵒者飛行屬於陽夷狄之鳥穴居於陰異苑曰五月五日翦鸜鵒舌令學人語, SBCK: 㛰}
