  - {type: variant, offset: 3561, length: 129, content: 一名突厥雀南飛突厥犯塞之候也及是春還復北飛至靈夏之北悉墮地而死視之則無頭矣裴行儉問於右史苗神容曰鳥獸之祥乃應人事何也對曰人雖最靈而稟性含氣同於萬類故吉凶兆於彼禍福應於此聖王受命龍鳳為嘉瑞者和氣同也故漢高斬虵而驗秦之必亡仲尼感麟而知己之將死夷羊在牧殷紂以滅鸜鵒, SBCK: 如鷦鷯}
  - {type: variant, offset: 3561, length: 522, content: 一名突厥雀南飛突厥犯塞之候也及是春還復北飛至靈夏之北悉墮地而死視之則無頭矣裴行儉問於右史苗神容曰鳥獸之祥乃應人事何也對曰人雖最靈而稟性含氣同於萬類故吉凶兆於彼禍福應於此聖王受命龍鳳為嘉瑞者和氣同也故漢高斬虵而驗秦之必亡仲尼感麟而知己之將死夷羊在牧殷紂以滅鸜鵒來巢魯昭出奔鼠舞端門燕剌誅死大鳥飛集昌邑以敗是故君子處恭寅畏動必思義雖在幽獨如承大事知明神之照臨懼患難之及己也雉升鼎耳殷宗側身以修德鵩止坐隅賈生作賦以敘命卒以無患者德勝祥也鴞毛詩曰鴟鴞周公救亂也鴟鴞鴟鴞既取我子無毀我室詩義䟽曰鴟鴞似黃雀而小啄剌如錐取茅為巢以麻紩之如剌絑靴縣著樹或一房或二房幽州謂之鸋鳲或曰女匠關東謂之工雀關西謂之蔑雀或謂巧女爾雅曰鴟鴞鸋鳲鴟春秋運斗樞曰玉衡星散為鴟莊子曰鴟得腐鼠鵷鶵過之仰而視之又曰鵄嗜鼠之鳥也淮南子曰虞氏者梁富人也登高樓臨大路設樂陳酒博於其上遊俠相隨行樓下博者射中而笑飛鳶墮腐鼠而中遊俠俠相與語曰虞氏富人奚有輕人之志乃辱我以腐鼠其夜乃殺虞氏大滅其家此謂類非也淮南萬畢術曰鴟腦令鷄自伏取鴟腦以塗鷄自即伏不能起也呂氏春秋曰亂國之妖市有舞鴟鹽鐵論曰泰山之鴟啄腐鼠於窮澤非有害於人也今有同盜主財而食之焉得若泰山之鴟乎後魏書曰孝武即位蠕蠕諸藩並遣使朝貢帝臨軒宴, WYG: 宫内嬪皆好}
