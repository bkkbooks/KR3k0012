  - {type: variant, offset: 2390, length: 217, content: 乃顧曰伯奇勞乎是吾子栖吾輿非吾子飛勿居言未卒鳥尋聲而栖其蓋歸入門集于井幹之上向室而號吉甫命後妻載弩射之遂射殺後妻以謝之故俗惡伯勞鳴言所鳴之家必有尸也好事附名為之說令俗人惡之其實否也伯勞以五月鳴應陰氣之動陽為仁養陰為殘賊伯勞蓋賊害之鳥也屈原曰鵙鴂之先鳴使百草為之不芳其聲鵙鵙故以音名也晉書曰慕容垂之起於關東歲在癸未符堅之分氐戶於諸鎮也趙整因侍援琴而歌曰阿得脂博勞舅父是仇綏尾長翼短不能飛遠徙種人留鮮卑一旦緩急語阿誰堅笑而不納至是整言驗矣, SBCK: ''}
