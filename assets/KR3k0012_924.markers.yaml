  - {type: variant, offset: 449, length: 525, content: 青臒及鸜鵒晉書曰鎮西將軍謝尚字仁祖善鸜鵒舞幽明錄曰晉司空桓豁在荊有參軍剪五月五日鸜鵒舌教令學語遂無所不名顧參軍善彈琵琶鸜鵒每立聽移時又善能效人語聲司空大會吏佐令悉效四坐語無不絕似有生齆鼻語難學學之不似因內頭於甕中以效焉遂與齆者語聲不異主典人於鸜鵒前盜物參軍如廁鸜鵒伺無人密白主典人盜如千種一二條列衘之而未發後盜牛肉鸜鵒復白參軍曰汝云盜肉應有驗鸜鵒曰以新荷裹著屏風後檢之果獲痛加治而盜者患之以熱湯灌殺參軍為之悲傷累日遂請殺此人以報其怨司空言曰原殺鸜鵒之痛誠合治殺不可以禽鳥故極之於法令止五歲刑也淮南萬畢術曰寒皋斷舌可使語取寒皋斷其舌即語寒皋一名鸜鵒唐書曰祕書少監崔行功未得吾品前忽有鸜鵒衘一物入其堂置案上而去乃魚袋玦數日加大夫荊楚歲時記曰五月鸜鵒子毛羽新成俗好登巢取養之以教其語謂之花鵒倉庚禮記曰仲春之月倉庚鳴毛詩曰春日載陽有鳴倉庚又曰倉庚于飛熠熠其羽又曰黃鳥于飛集于灌木又曰綿綿黃鳥止于丘阿又曰睍睆黃鳥載好其音又曰黃鳥哀三良也交交黃鳥止于棘誰從穆公子車奄息詩義䟽曰黃麗留也或謂黃栗留幽州謂之黃鸎或謂之黃鳥一名倉庚一名商庚一名鵹黃一名楚雀齊人謂之搏黍關西謂之黃鳥常以椹熟時來在桑間此乃應節趣時之鳥或謂之黃袍爾雅曰倉庚商庚即鶩黃也鵹黃楚雀即倉庚也又曰皇黃, SBCK: 孔}
  - {type: variant, offset: 449, length: 0, content: '', WYG: 孔雀為鳥不必匹合止以音影相接便有孕楚辭曰孔雀盖兮翠旌以孔雀之羽為車盖登九天兮撫彗星華陽國志曰雲南郡出孔雀常以二月來翔月餘而去異物志曰孔雀其大如鴈而足髙毛皆有斑文采捕得蓄之拍手則舞又曰孔雀形體既大細頸隆背似鳳凰自背及尾皆作圎文五色相繞如帶千錢文長二三尺頭戴三色長毛以為冠足有距棲遊岡陵迎晨則鳴相和傅巽奢儉論曰豐狐以赤色禍身翡翠孔雀亦灾斯文異物志曰孔雀人指其尾則舞交州記曰孔雀色}
  - {type: page-break, offset: 449, content: '', id: KR3k0012_WYG_924-10b, image: WYG0901/WYG0901-0227b.png}
  - {type: variant, offset: 449, length: 525, content: 青臒及鸜鵒晉書曰鎮西將軍謝尚字仁祖善鸜鵒舞幽明錄曰晉司空桓豁在荊有參軍剪五月五日鸜鵒舌教令學語遂無所不名顧參軍善彈琵琶鸜鵒每立聽移時又善能效人語聲司空大會吏佐令悉效四坐語無不絕似有生齆鼻語難學學之不似因內頭於甕中以效焉遂與齆者語聲不異主典人於鸜鵒前盜物參軍如廁鸜鵒伺無人密白主典人盜如千種一二條列衘之而未發後盜牛肉鸜鵒復白參軍曰汝云盜肉應有驗鸜鵒曰以新荷裹著屏風後檢之果獲痛加治而盜者患之以熱湯灌殺參軍為之悲傷累日遂請殺此人以報其怨司空言曰原殺鸜鵒之痛誠合治殺不可以禽鳥故極之於法令止五歲刑也淮南萬畢術曰寒皋斷舌可使語取寒皋斷其舌即語寒皋一名鸜鵒唐書曰祕書少監崔行功未得吾品前忽有鸜鵒衘一物入其堂置案上而去乃魚袋玦數日加大夫荊楚歲時記曰五月鸜鵒子毛羽新成俗好登巢取養之以教其語謂之花鵒倉庚禮記曰仲春之月倉庚鳴毛詩曰春日載陽有鳴倉庚又曰倉庚于飛熠熠其羽又曰黃鳥于飛集于灌木又曰綿綿黃鳥止于丘阿又曰睍睆黃鳥載好其音又曰黃鳥哀三良也交交黃鳥止于棘誰從穆公子車奄息詩義䟽曰黃麗留也或謂黃栗留幽州謂之黃鸎或謂之黃鳥一名倉庚一名商庚一名鵹黃一名楚雀齊人謂之搏黍關西謂之黃鳥常以椹熟時來在桑間此乃應節趣時之鳥或謂之黃袍爾雅曰倉庚商庚即鶩黃也鵹黃楚雀即倉庚也又曰皇黃, krp: 孔}
  - {type: variant, offset: 450, length: 5, content: 臒及鸜鵒晉, WYG: 尾長六七尺能舒舞足為節異物志曰交趾郡人多養孔雀或遺人以充口腹或殺之以為脯腊人又養其雛以為媒傍施捕網罟野孔雀伺其飛下則牽網横掩之採其金翠毛裝為扇拂或全株生截其尾為方物云生取則金翠之色不減耳翡翠爾雅曰翠鷸也似燕紺色出鬱林神契曰神靈滋液則翠羽耀周}
