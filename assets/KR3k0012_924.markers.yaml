  - {type: variant, offset: 1398, length: 0, content: '', SBCK: 臧好聚鷸冠戰國䇿曰趙且伐燕􅂫代謂燕惠王曰今者臣來過水蚌方岀曝而鷸啄其􅁏蚌合而拑其啄鷸曰今日不􅀨明日不􅀨即見蚌脯蚌亦謂鷸曰今日不岀明日不岀必有死鷸蚌鷸兩不肯解漁者併擒之今趙且伐燕燕趙乆相支以􅁦衆臣恐強􅁗之爲漁父也范子計然曰計然者蔡丘濮上人晉三公子姓辛氏字文子􅀶學無所不通范蠡知其賢人卑身事之請受道藏於石室乃刑白鷸而盟焉鷓鴣崔鴻蜀録曰蜀連有災天􅀨血地仍震地生毛鷓鴣集城下異物志曰鷓鴣其形似雌雞其志懷南不思北其名呼飛但南不北其􅁏肥美冝炙可以飲酒爲諸膳也嶺表録異曰鷓鴣臆前有白圎􅀧背上間紫赤毛其大如小野雞多對啼南越志}
  - {type: page-break, offset: 1398, content: '', id: KR3k0012_SBCK_924-8b}
  - {type: variant, offset: 1398, length: 0, content: '', krp: 臧好聚鷸冠戰國䇿曰趙且伐燕蘇代謂燕惠王曰今者臣來過水蚌方岀曝而鷸啄其肉蚌合而拑其啄鷸曰今日不雨明日不雨即見蚌脯蚌亦謂鷸曰今日不岀明日不岀必有死鷸蚌鷸兩不肯解漁者併擒之今趙且伐燕燕趙乆相支以弊衆臣恐強秦之爲漁父也范子計然曰計然者蔡丘濮上人晉三公子姓辛氏字文子博學無所不通范蠡知其賢人卑身事之請受道藏於石室乃刑白鷸而盟焉鷓鴣崔鴻蜀録曰蜀連有災天雨血地仍震地生毛鷓鴣集城下異物志曰鷓鴣其形似雌雞其志懷南不思北其名呼飛但南不北其肉肥美冝炙可以飲酒爲諸膳也嶺表録異曰鷓鴣臆前有白圎點背上間紫赤毛其大如小野雞多對啼南越志}
