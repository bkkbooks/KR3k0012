  - {type: variant, offset: 1624, length: 237, content: 食脂桑扈不啄粟非廉也左思齊都賦曰四扈推移春秋冬夏四時鳥也百舌禮記曰仲夏之月反舌無聲鄭玄注曰反舌百舌也又曰郯子曰少皞鳥師而鳥名祝鳩氏司徒者也杜預注鵻鳩孝故為徒主司教民春秋保乾圖曰江充之害太子交啄反舌鳥入殿宋均注曰交啄反舌百舌鳥風土記曰祝鳩反舌也鄭注禮記云反舌百舌鳥麋信難曰案緯書反舌蝦蟆也昔於長安與諸生共至城北水中取蝦蟆剝視之其舌反成向此則鄭君得過乎喬夙荅曰蝦蟆五月中始得水當聒人耳何云無聲是知蝦蟆非反舌鳥易通卦驗曰反舌鳥乃能反覆其舌隨百鳥之音周書曰芒種之日又五日反舌無聲反舌, SBCK: 獵胡瞻爾庭}
