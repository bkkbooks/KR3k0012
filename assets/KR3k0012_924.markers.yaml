  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_924-1a.2}
  - {type: variant, offset: 4, length: 1, content: 鴿, SBCK: 一鸚鵡白鸚鵡赤鸚鵡五色鸚鵡孔雀翡翠鷓鴣白鷼鶡䳺鶉萬春鳥舎利鳥兵曹鳥巢衣鳥鸚鵡禮記曰鸚鵡能言不離飛鳥漢書曰献帝興平元年益州蠻夷獻鸚鵡三詔曰徃者益州獻鸚鵡三枚夜食三􅂛麻子今榖價騰貴此鳥無益有損可付空西將軍陽定國令歸本土江表􅀓曰孫權曽大㑹有白頭鳥集殿前權曰此何鳥諸􅁑恪對曰白頭公張昭自以坐中最老疑恪以鳥名戲之因曰恪欺陛下未甞聞鳥名白頭翁者試使恪復索白頭母恪曰鳥名鸚䳇未必有對試使輔吴復求鸚父也昭不能荅山海經曰黄山有鳥焉其狀如鶚青羽赤啄人舌能言名曰鸚鵡郭璞曰鸚鵡舌似児扶南徼外有色如赤有純赤赤者大如鴈也又曰鸚鵡慧鳥栖林啄蘂四指中分行則啄地淮南子曰鸚鵡能言而不可使長官是得其所言不得所以言}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_924-1b}
  - {type: variant, offset: 4, length: 1, content: 鴿, WYG: 一鸚鷁白鸚鵡五色鸚鵡赤鸚鵡孔雀翡翠鷓鴣白鷴鷗䳺鶉萬春鳥舍利鳥兵曹鳥巣衣鳥鸚鵡禮記曰鸚鵡能言不離飛鳥漢書曰獻帝興平元年益州蠻夷獻鸚鵡三詔曰往者益州獻鸚鵡三枚夜食麻子三升今穀價騰貴此鳥无益有損可付西征將軍楊定國令歸本土江表傳曰孫權曾大會有白頭鳥集殿前權曰此何鳥諸葛恪對曰白頭公張昭自以坐中最老疑恪以鳥名戱之因曰恪欺陛下未聞鳥有白頭公者試使恪復索白頭母恪曰鳥名鸚䳇未必有對試使輔呉復求鸚父昭不能荅山海經曰黄山有鳥焉其狀如鴞青羽赤喙人舌能言名曰鸚鵡又曰鸚鵡慧鳥棲林啄蘂四指中分行則啄地淮南子曰鸚鵡能言而不可使長言是得其言不得其所以言}
