  - {type: variant, offset: 2810, length: 130, content: 惟志所欲此蓋禽獸性清者榮性濁者辱閩中名士傳曰薛令之唐開元中為左補闕兼太子侍講時東宮官冷落久次難進令之題詩云明月夜團團照見先生盤盤中何所有苜蓿長欄干飯澀匙難綰羹稀筯易寬只可謀朝夕郍能度歲寒明皇因幸春宮見之不悅命筆酬之曰啄木觜距長鳳凰毛羽短既嫌松桂寒任逐桑榆暖令之, SBCK: 語大業十年遣使入貢後}
