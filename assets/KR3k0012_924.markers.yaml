  - {type: variant, offset: 4173, length: 134, content: 仲甫也後留更三年自云往崑崙去茅鴟爾雅曰狂茅鴟郭璞注曰鳩鴟也似鷹而白孫炎曰大目鵂鶹也廣雅曰盧休茅鴟鳩也左傳曰叔孫穆子食慶封慶封汜祭穆子不說使工為之誦茅鴟茅鴟逸詩剌不敬亦不知鳶禮記曰前有塵埃則載鳴鳶鳶鳥則膊風也毛詩曰鳶飛戾天魚躍于淵爾雅曰鳶鳥醜其飛也翔布翅翱翔漢書曰成帝河, SBCK: 太}
