  - {type: variant, offset: 4503, length: 190, content: 人因擲肉於野以集飛鳶遣其善射者射之多不中復請彭射之連發數矢皆應弦而落突厥相顧莫不歎服可汗留彭不遣百餘日上賂以繒綵然後得歸又曰長孫晟引啟民可汗歸附賜射於武安殿選善射者十二人分為兩列啟民曰臣有長孫大使得見天子今日賜射願入其列許之給晟箭六隻發皆入鹿啟民列竟勝時有鳶群飛上曰公善彈為我取之十發俱中應丸而落是日百官獲賚晟獨居多博物志曰漢舊使綦國送鳶卵給太官晉中興書徵祥說曰永和九年吳郡獻白鳶, SBCK: 四}
