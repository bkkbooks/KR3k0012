  - {type: variant, offset: 446, length: 1, content: 衡, WYG: 南方多孔雀列僊傳曰蕭史吹簫致孔雀西京雜記曰魯恭王好閗鴨鴈養孔雀鵁鵲奉榖一年二千石鹽鐵論曰南越以孔雀珥門戸今貴其所饒非所以厚中國也太𤣥經曰孔鴈之儀可法則也虞翻注曰鴈飛成列亦成行故可以為法則也郭子曰梁國楊氏子年甫九歲甚聰慧孔君平詣其父不在乃呼兒出為之設果有楊梅孔指以示兒此實君家果應聲答曰未聞孔雀是夫子家禽也南越志曰義寧縣杜}
