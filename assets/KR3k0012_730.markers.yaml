  - {type: variant, offset: 1218, length: 4, content: 韋賢為吏, krp: 來和好相術髙祖微時來詣和相和待人去私謂高祖曰公當王有四海及爲丞相拜儀同旣受禪進爵爲子開皇末和上表自陳日臣早奉龍顔自周代天和三年己來數蒙陛下顧問當時具言}
  - {type: variant, offset: 1219, length: 0, content: '', WYG: 鼎仕梁為太府卿初鼎之聘周也嘗與髙祖相遇鼎謂髙祖曰觀公容貎故非常人而神監深逺亦非羣}
  - {type: variant, offset: 1220, length: 0, content: '', WYG: 所逮也不久必大貴貴則天下一家嵗一周天老夫當委質願深自愛及陳平上馳召之授上儀同三司待遇甚厚又曰龎晃知髙祖非常人深自結納及髙祖去官歸京師晃迎見髙祖于襄邑髙祖甚歡晃因白髙祖曰公相貎非常名在圖籙九五之日希願不忘髙祖笑曰何妄言也頃之有一雄雉鳴庭髙祖命晃射之曰中則有賞至富貴之日持以}
  - {type: page-break, offset: 1220, content: '', id: KR3k0012_WYG_730-12b, image: WYG0899/WYG0899-0449d.png}
  - {type: variant, offset: 1221, length: 1, content: 吏, WYG: 驗晃既射而中髙祖撫掌大笑曰此是天意公能感之而中也又曰來和好相術髙祖微時來詣和相和待人去私謂髙祖曰公當王有四海及為丞相拜儀同既受禪進爵為子開皇末和上表自陳曰臣早奉龍顔自周代天和三年以來數蒙陛下顧問當時具言}
