  - {type: variant, offset: 2396, length: 179, content: 壽又命徧相眾賓建平曰將軍當壽八十至四十時當小有厄願謹護之謂夏侯威曰君四十九位為州牧而當有厄厄若得過可年至七十致位公輔謂應璩曰君六十二位為常伯而當有厄先此一年獨見白狗而旁人不見也謂曹彪曰君據藩國至五十七當厄於兵宜善防之後文帝黃初七年年四十病困左右曰建平所言八十謂晝夜也吾其決矣頃之果崩夏侯威為兗州剌史年四十九十二月上旬得疾念建平之言自分必死至三十日夜半卒應璩六, SBCK: ''}
