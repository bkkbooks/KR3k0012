  - {type: variant, offset: 468, length: 0, content: '', SBCK: 五擲皆盧帝大驚目安人日􅀸面方如田封侯狀也安人少時貧有一人從門過相之日君後當富貴與天子交手共戲至是安人尋此人不知所在孫嚴宋書日沈攸之字仲達少孤貧與吳郡孫超之全景文共乘小船岀京都三人共上引埭有一人止之而相日君三人皆當至方伯攸之日豈有三人俱有相相者日骨法如此若不驗便是相書誤耳後攸之爲荆郢二州超之廣州景文南豫州又日徐羨之年少時嘗有一人來謂日我是汝祖羨之拜此人汝日有貴相而有大厄冝以錢二十八文埋宅四􅊁可以免災過此可位極人臣後羨之隨親之縣内嘗暫出而賊自後破縣縣内人無免者雞犬亦盡唯羡之在外􅀗全齊書日太祖初爲建康令有能名少府蕭惠開雅有知人鍳謂人日昔魏武爲洛陽北部人服其英今看蕭建康但當過之耳又日張欣泰少時有人相當得三公而年纔三十後屋瓦墜傷額又問相者云無復公相年壽可更增亦可得方伯之任耳後爲刺史年三十六卒又日曹武雖武士頗有知人之鍳性儉嗇無所餉遺獨餉梁武謂日􅀸必大貴我當不及見今以弱子相託每密遺錢物并好馬時帝在戎多乏就武換借未嘗不得遂至十七萬又日明帝體上有赤誌常祕不言旣而江祐勸帝出以示人晉壽陽太守王洪􅁤罷任還上祖示之日皆謂此是日月相卿幸無泄軌日公日月在軀如何可隱輒當言之公􅀸上大恱梁書日梁武帝初爲衛軍王儉東閣祭酒儉一見深相器異請爲戸曹屬謂廬江何憲日此蕭郞三十内當作侍中出此則貴不可言又日梁武帝遷隋王鎭西諮議參軍行經牛渚逢風入泊龍瀆有一老人謂帝日君龍行虎步相不可言}
