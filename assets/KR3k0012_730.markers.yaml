  - {type: variant, offset: 1231, length: 1, content: 丞, WYG: 謹録龍潛之時臣有所言一得書之秘府死無所恨昔陛下在周嘗與永富公竇容定語臣曰我聞有行聲即知其人臣當時即言公眼如曙星無所不照當王有天下願忍誅殺建德四年五月周武帝在雲陽宫謂臣曰諸公皆汝所識隋公}
