  - {type: 'tls:seg', offset: 589, content: '', id: KR3k0012_CHANT_730-9a.4}
  - {type: variant, offset: 594, length: 2, content: 子使, WYG: 實無何禳之有今三軍之事在於明公唯應達命任理以保之言未幾而紹宗果溺死又曰暴顯㓜時見一沙門指之曰此郎有好}
  - {type: page-break, offset: 594, content: '', id: KR3k0012_WYG_730-7b, image: WYG0899/WYG0899-0447b.png}
  - {type: variant, offset: 597, length: 5, content: 之子卿曰無, WYG: 長大必}
