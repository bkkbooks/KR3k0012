  - {type: variant, offset: 570, length: 194, content: 一幸生代王即文帝也又曰姑布子卿見趙簡子簡子徧召其子使相之子卿曰無為將軍者𥳑子曰趙氏其滅乎子卿曰吾嘗見一子於路殆君之子也𥳑子召子母恤母恤至則子卿起曰此真將軍矣簡子曰其母賤翟婢也奚道貴哉子卿曰天所授也雖賤必貴自是之後簡子盡召諸子與語母恤最賢簡子乃告諸子曰吾藏寶符於常山之上先得者賞諸子馳之恒山求無所得母恤還曰已得符矣簡子曰奏之母恤曰從常山臨代代可取也𥳑子於是知母恤果賢乃廢太伯魯而以母恤為太子, SBCK: 拜淑儀}
