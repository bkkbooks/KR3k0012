  - {type: page-break, offset: 468, content: '', id: KR3k0012_SBCK_730-2b}
  - {type: variant, offset: 468, length: 0, content: '', WYG: 五擲皆盧帝大驚謂安人曰卿面方如田封侯相也安人少時貧有一人從門過相之曰君後當富貴與天子交手共戲至是安人尋此人不知所在孫嚴宋書曰沈攸之字仲達少孤貧與吳郡孫超之王景文共乘小船出京都三人共上引埭有一人止之而相曰君三人皆當至方伯攸之曰豈有三人俱貴相者曰骨法如此若不驗便是相書誤耳後攸之為荆郢二州超之廣州景文南豫州又曰徐羡之年少時嘗有一人來謂曰我是汝祖羡之拜此人曰汝有貴相而有大厄宜以錢二十八文埋宅四角可以免災過此可位極人臣後羡之隨親之縣内嘗暮出而賊自後破縣縣内人無免者鷄犬亦盡唯羡之在外獲全齊書曰太祖初為建康令有能名少府蕭惠閑雅有知人鑒謂人曰昔魏武為洛陽北陪人服其英今看蕭建康但當過之耳又曰張欣泰少時有人相當得三公而年纔三十後屋瓦墜傷額又問相者云無復公相年壽可更增亦可得方伯之任耳後為刺史年三十卒又曰曹武雖武士頗有知人之鑒性儉嗇無所餉遺獨餉梁武謂曰卿必大貴我當不及見今以弱子相託每密遺錢物并好馬時帝在戎多乏就武換借未嘗不得遂至十七萬又曰明帝體上有志赤常秘不言既而江祐勸帝出以示人晉壽陽太守王洪軌曰公日月在軀上曰皆謂此是日月相卿幸無泄軌曰公日月在軀如何可隱輒當言之公卿上大悅梁書曰梁武帝初為衛將軍王儉東閣祭酒儉一見深相器異請為户曹屬謂廬江何憲曰此蕭郎三十内當作侍中出此則貴不可言又曰梁武帝遷隋王鎮西諮議參軍行經牛渚逢風入泊龍瀆有一老人謂帝曰君龍行虎步相不可言今}
