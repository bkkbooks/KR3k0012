  - {type: variant, offset: 1662, length: 227, content: 迎曰公當極位也宏曰家貧負債何得貴乎淵曰公相然也張濟就淵相淵曰事劉宏可至三公濟事宏宏後為解犢侯既去南陽桓帝崩迎解犢侯為天子是為靈帝濟為司空也又曰明德馬皇后伏波將軍援女其母嘗使善相者看后曰此女必將大貴遂為帝王妃然而少子養他子得力乃當踰於所生耳又曰章德竇皇后扶風平陵人大司徒融之曾孫也父勳尚東海恭王疆女泚陽公主后其長女也家既廢壞數呼相工問息耗薛氏韓詩章句曰耗惡也息耗猶言善惡也見后者皆言當大尊貴非臣妾容貌又曰和熹鄧后傳曰幼時嘗有相者蘇大見后大驚曰此成湯之骨法也, SBCK: ''}
