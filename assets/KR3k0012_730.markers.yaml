  - {type: variant, offset: 2857, length: 766, content: 位至大將軍封侯吳志曰漢以孫策遠脩職貢遣使者劉琬加錫命琬語人曰吾觀孫氏兄弟才秀明遠然皆祿祚不終唯中弟孝廉形貌奇偉骨體不恒有大貴之表年又最壽爾其識之晉書裴秀傳曰文帝未定嗣而屬意舞陽侯攸武帝懼不得立問秀曰人有相否因以奇表示之秀後言於文帝曰中撫軍人望既茂文表如此固非人臣之相也由是世子乃定又曰孝武李太后諱陵容本出微賤始簡文帝為會稽王有三子繼夭自道生廢黜獻王早世其後諸姬絕孕將十年帝乃令善相者召諸愛妾而示之皆云非其人又悉以諸婢媵示焉時后為宮人在織坊中形長而色黑宮人皆謂之崑崙既至相者驚云此其人也帝以大計召之侍寢后數夢兩龍枕膝日月入懷意以為吉祥向儕類說之帝聞而異焉遂生孝武帝及會稽文孝王鄱陽長公主晉書曰王覽祥之弟也初呂虔有佩刀工相之以為必登三公可服此刀虔謂祥曰茍非其人刀或為害卿有公輔之量故以相與祥始固辭強之乃受祥臨薨以刀授覽曰汝後必興足稱此刀覽後弈世多賢才興於江左矣又曰羊祜少喪父遊汶水之濱父老謂之曰子有好相年未滿六十必建大功於天下既而去莫知所在又羊祜傳曰祜幼時有喜相墓者言祜墓有帝王氣若鑿之則無後祜遂鑿之相者見曰猶出折臂三公而祜竟墮馬折臂位至三公而無子又曰豫章人雷煥妙達緯象張華乃要煥宿屏人曰可共尋天文知將來吉凶因登樓仰觀煥曰僕察之久矣唯牛斗之閒頗有異氣華曰是何祥也煥曰寶劍之精上徹於天耳華曰君言得之吾少時有相者言吾年六十位登三事當得寶劍佩之斯言豈効歟又曰檀梁憑之嘗有善相者晉陵韋叟見憑之大驚曰卿有急兵之厄其候不過三四日耳宜深藏以避之不可輕出及桓玄將皇甫敷之至羅落橋也憑之與劉裕各領一隊而戰軍敗為敷軍所害又曰魏詠之字長道任城人家素貧而躬耕為事好學不倦生而兔缺有善相者謂之曰卿當富貴後果如言又曰王彌少遊俠京師隱者董仲道見而謂之曰君豺聲豹視好亂樂禍若天下騷擾不作士大夫矣晉中興書曰陶侃少漁雷澤夢生八翼飛至天門而不入相者師珪曰君位當上公為八州都督, WYG: ''}
