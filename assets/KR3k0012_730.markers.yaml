  - {type: variant, offset: 2048, length: 142, content: 也司徒郃之子固貌狀有奇表鼎角匿犀足履龜文少好學常步行隨師不遠千里魏志曰管輅族兄李國居在斥丘輅往從之與二客會客去後輅謂國曰此二人天廷及耳口之閒同有凶氣黑變俱起雙魂無宅輅別傳曰厚味腊毒天精幽夕坎為棺槨兌為喪車流魄于海骨歸于家少許時當並死後十數日二人飲酒醉夜共載車牛渴下道入漳河中皆即溺死矣, WYG: 臣}
