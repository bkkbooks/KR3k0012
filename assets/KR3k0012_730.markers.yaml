  - {type: variant, offset: 476, length: 0, content: '', SBCK: 儒善相太常􅀸崔暹私引子儒潛觀齊王儒日人有七尺之形不如一尺之面一尺之面不如一寸之眼大將軍臉薄顧速非帝王相也皇甫玉又竊觀王於道日此不作物㑹是垂洟者垂洟者謂太原公洋又日齊高歸彦嘗令皇甫玉相己玉日公位極人臣必可反歸彦日我爲何須反玉日公有反骨又日周王軌以隋公楊堅相表殊異因入侍讌陽醉撥去堅帽言日是何物頭額帝謂之雖大而却無所至也皇甫后}
