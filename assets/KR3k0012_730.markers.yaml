  - {type: variant, offset: 3439, length: 0, content: '', SBCK: 術同郡韓則嘗詣和相謂之日後四五當大官人初不知所謂則至開皇十五年五月而終人間其故和日十五年爲三五加以五月爲四五大官槨也和言多此􅀋著相經四十卷北史日李賢幼有志節不妄舉動常岀遊逢一老人鬚眉皎白謂日我年八十觀士多矣未有如􅀸􅀸必爲台牧努力勉之九歲從師受業略觀大指而巳或義其不精荅日賢豈能領師徒授業至如忠孝之道實銘於心問}
