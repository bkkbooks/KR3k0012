  - {type: variant, offset: 638, length: 1, content: 則, WYG: 文宣再三舉手指天而已口無所言見者異之又曰梁宣豐侯脩參軍陳冕善相人脩因法㑹將冕自隨令相簡文有天下否冕言簡文九州骨成必踐帝位而地部過苦非但王畿蹙侵兼恐不善終又曰東魏御史賈}
  - {type: page-break, offset: 638, content: '', id: KR3k0012_WYG_730-9b, image: WYG0899/WYG0899-0448b.png}
  - {type: variant, offset: 640, length: 0, content: '', WYG: 儒善相太常}
  - {type: variant, offset: 641, length: 1, content: 起, WYG: 崔暹私引子儒潛視齊王儒曰人有七尺之形不如一尺之面一尺之面不如一寸之眼大將軍臉薄顧速非帝王相也皇甫玉又竊觀王於道}
