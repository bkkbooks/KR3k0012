  - {type: variant, offset: 581, length: 2, content: 姑布, WYG: 盧淵出鎮闗右詔兼侍中初淵年十四嘗詣長安將還餞送者五十餘人别於渭北有相者扶風人王伯達曰諸君不皆如此盧郎雖位不副實然得聲甚盛望踰公輔後二十餘年當制命闗右願不相忘此行也相者年過八十詣軍門請見言平生南史曰梁元帝初從劉景授相術因訊以年荅曰未至五十當有小厄攘之可免帝曰苟有期㑹禳之何益及四十七為魏所㓕崔鴻十六國春秋後趙録曰石勒東至平原賣與東平人師懽為奴有一老父謂勒曰君龍角髮際上四道已成當貴為人主甲戌之歲王彭祖可圖勒曰若如公言不敢背德忽然不見又曰張秀字伯文羌梁部人也頗曉相法常謂石虎曰明公之相非人臣之骨虎掩其口曰莫妄言族吾父}
  - {type: page-break, offset: 581, content: '', id: KR3k0012_WYG_730-6a, image: WYG0899/WYG0899-0446c.png}
  - {type: page-break, offset: 581, content: '', id: KR3k0012_WYG_730-6b, image: WYG0899/WYG0899-0446d.png}
  - {type: variant, offset: 584, length: 1, content: 卿, WYG: 又南燕録曰慕容德年十八身長八尺二寸姿貌雄異額上有日月兩角足下有偃月重文太史公黄泓善相謂德曰殿下相法當先為人臣然後為人君但恐下官入地不}
  - {type: variant, offset: 586, length: 7, content: 趙簡子簡子徧召, WYG: 殿下昇天耳德拜范陽王建元年即帝位又前凉録曰汎瑗與同郡陳琠宗配遇相者於路相者曰三人皆二千石封然汎瑗腹有逆毛當兵死無後北齊書曰房豹遷侍御史王思敬入據穎州隨慕容紹宗出討乃為紹宗開府主簿兼行臺郎中紹宗自云有水厄遂於戰檻中浴并自投於水中兾以厭當之豹謂紹宗曰夫命也在天豈人理所能延公若實有災厄非禳避所免若}
  - {type: page-break, offset: 586, content: '', id: KR3k0012_WYG_730-7a, image: WYG0899/WYG0899-0447a.png}
