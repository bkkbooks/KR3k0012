  - {type: variant, offset: 2068, length: 327, content: 少好學常步行隨師不遠千里魏志曰管輅族兄李國居在斥丘輅往從之與二客會客去後輅謂國曰此二人天廷及耳口之閒同有凶氣黑變俱起雙魂無宅輅別傳曰厚味腊毒天精幽夕坎為棺槨兌為喪車流魄于海骨歸于家少許時當並死後十數日二人飲酒醉夜共載車牛渴下道入漳河中皆即溺死矣又曰鍾繇嘗與族父瑜俱至洛陽道遇相者曰此童有貴相然當厄於水努力慎之行未十里度橋馬驚墮水幾死瑜以相者言中益貴繇是供給資費使得專學舉孝廉又曰朱建平沛國人善相術頴川荀修鍾繇相與親善修先亡子幼繇經記其門戶欲嫁其女與人書曰吾與公達曾共使朱建平相建平曰荀君雖少然當以後事付鍾君吾時嘲之曰唯當嫁卿阿騖耳何意此子竟早殞歿戲言遂驗乎今欲嫁阿騖使得善處焉追思建平之妙雖唐舉許負何以復加耶又曰文帝為五官將坐上會客三十餘人文帝問朱建平巳, SBCK: 述}
