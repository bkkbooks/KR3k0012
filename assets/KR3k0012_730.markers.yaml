  - {type: variant, offset: 1099, length: 0, content: '', SBCK: 高祖生於馮翊波若寺紫氣充庭有尼來自河東謂皇妣曰此兒所從來甚異不可俗閒處之尼將高祖舎於别館躬自撫養皇妣嘗抱高祖忽見頭上角岀遍體鱗起皇妣大駭墜髙祖於地尼自外入見日巳驚我兒致令晩得天下爲人龍顔額有五柱八頂目光外射有文在手曰王長上短下沉深嚴重又髙曰祖在周明帝即位授右小宫伯進封大興郡公帝嘗遣善相者趙照視之照詭對曰不過作柱國耳旣而陰謂髙祖日公}
  - {type: variant, offset: 1099, length: 4, content: 當貧餓死, WYG: 髙祖生於馮翊般若寺紫氣充庭有尼來自河東謂皇妣曰此兒所從來甚異不可俗間處之尼將髙祖舍於别館躬自撫養皇妣嘗抱髙祖忽見頭上角出遍體鱗起皇妣大駭墜髙祖於地尼自外入見曰已驚我兒致令晚得天下為人龍顔額上有五柱入頂目光外射有}
  - {type: page-break, offset: 1099, content: '', id: KR3k0012_WYG_730-11b, image: WYG0899/WYG0899-0449b.png}
  - {type: variant, offset: 1099, length: 0, content: '', krp: 高祖生於馮翊波若寺紫氣充庭有尼來自河東謂皇妣曰此兒所從來甚異不可俗閒處之尼將高祖舎於别館躬自撫養皇妣嘗抱高祖忽見頭上角岀遍體鱗起皇妣大駭墜髙祖於地尼自外入見日巳驚我兒致令晩得天下爲人龍顔額有五柱八頂目光外射有文在手曰王長上短下沉深嚴重又髙曰祖在周明帝即位授右小宫伯進封大興郡公帝嘗遣善相者趙照視之照詭對曰不過作柱國耳旣而陰謂髙祖日公}
  - {type: variant, offset: 1100, length: 21, content: 貧餓死文帝曰能富通者在我於是賜通蜀嚴銅山得, SBCK: 爲天下君必大誅殺而後定善記鄙言也又日韋鼎仕梁爲太府􅀸初鼎之聘周也嘗與高祖相遇鼎謂高祖日觀公容貌故非常人而神監深遠亦非羣賢所逮也不乆必太貴貴則天下一家歲一周天老夫當委質願深}
