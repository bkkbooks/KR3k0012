  - {type: variant, offset: 664, length: 4, content: 天所授也, WYG: 公位極人臣但莫反歸彦曰我為何須反王曰公有反骨又曰周王軌以隨公楊堅相表殊異因入侍讌陽醉撥去堅㡌言曰是何物頭額帝圍之}
