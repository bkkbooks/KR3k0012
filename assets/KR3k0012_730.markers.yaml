  - {type: variant, offset: 618, length: 1, content: 嘗, WYG: 夢汝以某月得患某月某日漸損皆如其言既而歎曰壽陽陷吾以頸血湔城而死佛教不聽自殺故荏苒偷生今可死矣於是閉氣而絶其家購屍歸塟又曰遼西叚長太原龎蒼鷹俱有先知之識叚長為魏懷朔鎮將}
  - {type: variant, offset: 620, length: 1, content: 一, WYG: 髙祖甚異之謂髙祖云君有康世之才終不徒然也請以}
  - {type: variant, offset: 622, length: 0, content: '', WYG: 孫為托興和中追贈司空擢子寧相府從事中郎天禄初兼南中郎將倉鷹交遊豪俠厚待賔旅居}
  - {type: page-break, offset: 622, content: '', id: KR3k0012_WYG_730-8b, image: WYG0899/WYG0899-0447d.png}
  - {type: variant, offset: 623, length: 3, content: 路殆君, WYG: 州城髙祖客其舍初居處於蝸牛廬中蒼鷹數見廬上赤氣屬天蒼鷹亦知髙祖有霸王}
  - {type: punctuation, offset: 624, content: ，, id: KR3k0012_CHANT_730-bkkpn198}
  - {type: 'tls:seg', offset: 624, content: '', id: KR3k0012_CHANT_730-9a.11}
  - {type: variant, offset: 627, length: 0, content: '', WYG: 相每私加敬割其宅半以奉髙祖由此遂蒙親識三國典畧曰髙澄嗣渤海王朝於鄴時有吳士目盲而妙於聲相王使試之聞劉桃枝之聲曰有所繫屬然當大富貴王侯將相多死於其手譬如鷹犬為人所使聞趙道德之聲曰亦繫屬人聞太原公之聲曰當為人主聞王之聲崔暹私搯之乃謬言亦國主也王曰我家羣奴猶當極貴况吾身也又曰齊文宣字子進神武第二}
  - {type: page-break, offset: 627, content: '', id: KR3k0012_WYG_730-9a, image: WYG0899/WYG0899-0448a.png}
