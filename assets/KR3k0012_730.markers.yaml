  - {type: variant, offset: 470, length: 0, content: '', SBCK: 將亂安之者其在君乎問其名氏忽然不見又日梁武帝初為司州刺史有沙門自稱僧惲謂帝日君頂有伏龍非人臣也復求莫知所之又日武帝起兵時吕僧珍一夜忽頭痛壯􅀬及明而顙骨益大其骨法蓋有異焉又嘗語親舊日吾昔在蒙縣􅀬病發黃時必謂不濟主上見􅀸有富}
