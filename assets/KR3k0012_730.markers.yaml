  - {type: variant, offset: 470, length: 0, content: '', krp: 將亂安之者其在君乎問其名氏忽然不見又日梁武帝初為司州刺史有沙門自稱僧惲謂帝日君頂有伏龍非人臣也復求莫知所之又日武帝起兵時吕僧珍一夜忽頭痛壯熱及明而顙骨益大其骨法蓋有異焉又嘗語親舊日吾昔在蒙縣熱病發黃時必謂不濟主上見卿有富}
  - {type: variant, offset: 471, length: 0, content: '', SBCK: 相必當不死俄而果愈又僧珍童兒時從學有相工厯觀諸生指僧珍日此有奇聲封侯相也後隨武帝起義平東昏封平固侯南兖州刺史後魏書日李訢字元盛訢母賤爲諸兄所輕父崇日此子相者言貴吾每觀察或未可知遂使入都爲中書學生世祖幸中書學見而異之謂從者日此小兒終効用於朕之子孫矣目識眄之世祖舅陽平王杜超有女將許貴戚世祖聞之謂超日李訢後必官達益}
