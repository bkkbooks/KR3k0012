  - {type: variant, offset: 629, length: 1, content: 𥳑, WYG: 婁太后初孕文宣每夜有赤光照室既生數月后乃與親姻相對共憂寒餒文宣忽應曰得活故名侯尼于鮮卑言有相}
  - {type: variant, offset: 631, length: 1, content: 召, WYG: 也及長黑色大頬兌下鱗身重踝瞻視審定不好戲弄深沉有大度晉陽有沙門乍愚乍智時人不測呼為阿秃師婁后見其諸}
  - {type: variant, offset: 633, length: 1, content: 母, WYG: 厯}
