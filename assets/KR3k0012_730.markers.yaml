  - {type: variant, offset: 1350, length: 206, content: 帝召濞相之曰若狀有反相因拊其背曰漢後五十年東南有亂者豈汝耶然天下同姓一家慎無反濞頓首曰不敢又曰李陵為匈奴所圍上欲陵戰死召陵毋及婦使相者視之無死喪色後聞降上甚怒又曰翟方進字子威汝南上蔡人家世微賤方進年十二三失父孤學給事大守府為小吏號遲鈍不及事數為掾史所詈辱方進自傷乃從汝南蔡父相問己能所宜蔡父大奇其形皃謂曰小吏有封侯骨當以經術進方進聞蔡父言心喜因病歸家辭其後母欲西至京師受經後母憐其幼隨之長安織履以給方進又曰黃霸與, SBCK: 祖密令}
