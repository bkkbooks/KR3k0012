  - {type: variant, offset: 603, length: 0, content: '', WYG: 良將貴極人臣語終失僧莫知所在後累遷特進驃騎大}
  - {type: variant, offset: 605, length: 0, content: '', WYG: 又曰尉瑾為聘梁使梁人陳昭善相謂瑾曰二十年後當為宰相瑾出昭謂人曰此公為宰相後不過三年當死昭後為陳後主兼散騎常侍至齊瑾時兼右僕射鳴騶鐃吹復謂人曰二年當死果如言焉又曰盧潛陷陳時李騊駼將逃歸并要潛潛曰我此頭面何可誑人吾少時相}
  - {type: page-break, offset: 605, content: '', id: KR3k0012_WYG_730-8a, image: WYG0899/WYG0899-0447c.png}
