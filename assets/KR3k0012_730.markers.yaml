  - {type: 'tls:seg', offset: 472, content: '', id: KR3k0012_CHANT_730-7a.8}
  - {type: variant, offset: 472, length: 0, content: '', SBCK: 門戸可以女妻之遂勸成婚南人李哲嘗言訢必當貴逹杜超之死也世祖親哭三日訢以超婚得在喪位出入帝目而指之謂左右觀此人舉動豈不有異於衆必爲朕家幹事之臣又日寇讃字奉國上谷人嘗從相者唐文相日君額上黑子入幘位當方伯封公及爲上谷太守文以百姓禮拜謁文日明公憶疇昔言乎爾日伹知公當貴不知得爲州人讃日往時卿言社瓊不得官人咸謂不然後瓊得盭屋令􅀸猶言相中不見而瓊未拜果暴終昔魏舒見主皃死自知己必至三公吾􅁪以􅀸言瓊之驗亦復不息此望也又日盧淵岀鎮關右詔兼侍中初淵年十四嘗詣長安將還餞送者五十餘人別於渭北有相者扶風人王伯達日諸君皆不如此盧郞雖位不副實然德聲甚盛望踰公輔後二十餘年當制命關右願不相忘此行也相者年過八十詣軍門請見言敘平生南史日梁元帝初從劉景授相術因訊以年荅日未至五十當有小厄禳之可免帝日苟有期會禳之何益及四十七爲魏所滅崔鴻十六國春秋後趙録日石勒東至平原賣與荏平人師懽爲奴有一老父謂勒日君龍􅊁髪際上四道已成當貴爲人主甲戌之歲王彭祖可圗勒日若如公言不敢忘德忽然不見又日張秀字文伯羌渠部人也頗曉相法常謂石虎日明公之相非人臣骨虎掩其口日君勿妄言族吾父子又南燕録日慕容德年十八身長八尺二寸姿貌雄異額上有日月雨角足下有偃月重文太史公黃􅇦善相謂德日殿下相法當先爲人臣然後為人君但恐下官入地不見殿下昇天耳德拜范陽王建元年即帝位又前涼録日況瑗與同郡陳琠他典反宗配遇相者於路相者日三人皆二千石封然況瑗腹有逆毛當兵死無後北齊書日房豹遷侍御史王思敬入據頴川隨慕容紹宗出討乃爲紹宗開府主簿兼行臺郞中紹宗自云有水厄遂於戰艦中浴幷自投於水中兾以厭當之豹謂紹宗日夫命也在天豈人理所能延公若實有災厄非禳避所免若其實無何禳之有今三軍之事在於明公唯應達命任理以保之元吉末幾而紹宗遇溺死又日慕容顯時幼見一沙門指之日此郎子有好相表大必爲良將貴極人臣語終失僧莫知所在後累遷特進驃騎大將軍封定陽王又日尉瑾爲聘梁使人陳昭善相謂瑾日二十年後當爲宰相瑾岀昭謂人日此公爲宰相後不過三年當死昭後爲陳後主兼散騎常侍至齊瑾時兼右僕射鳴騶鐃吹昭復謂人日二年當死果如言焉又日廬潜陷陳時李騊駼將逃歸并要潛潜日我此頭面何可誑人吾少時相者云没在吳越死生已定弟其行也因寄書與弟士􅃉日吾夢汝以其日得患某月某日漸損皆如其言旣而歎日壽陽陷吾以頸血湔城而死佛敎不聽自殺故荏苒偷生今可死矣於是閇氣而絕其家購屍歸葬又日遼西段長太原龐倉鷹俱有先知之監長爲魏懷朔鎮將見髙祖甚異之謂髙祖云君有康世之才終不徒然也請以子孫爲託興和中啓贈司空公子寧相府從事中郎天禄初兼南中郎將倉鷹交遊豪俠厚待賔旅居於州城高祖客其舎初居處於蝸牛盧中倉鷹母數見廬上赤氣屬天倉鷹亦知髙祖有霸王之相毎私加敬割其宅半以奉髙祖由此遂蒙親識三國典略日髙澄嗣渤海王朝於鄴時有吳土目盲而妙於聲相王使試之聞劉桃桃板之聲日有所繫屬當大富貴王侯將相多死於其手譬如鷹犬爲人所使聞趙道德之聲日亦繫屬人聞太原公之聲日當爲人主聞王之聲崔暹私稱之謬日亦有國主也日我家羣奴猶當極貴況吾身也又日齊文宣字子進神武第二子也婁太后初孕文宣毎夜有赤光照室旣生數月后乃與親姻相對共憂寒餧文宣怱應日得活故名俟尼干鮮卑言有相子也及長黒色大顙兊下鱗身重踝瞻視審定不好戲弄深沈有大度晉陽有沙門乍愚乍智時人不測呼爲阿秃師婁后見其諸子􅍓問禄位至文宣再三舉手指天而己口無所言見者異之又日梁宣豐侯脩參軍陳晃善相人脩因法㑹將晃自隨}
