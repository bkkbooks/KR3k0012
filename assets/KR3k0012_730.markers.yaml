  - {type: variant, offset: 2577, length: 828, content: 為侍中直省內歘見白狗問之眾人悉無見者於是數聚會并急遊田里飲宴自娛過期一年而卒曹彪封王五十七坐與王陵通謀賜死凡說此輩無不如言魏書曰文帝甄皇后漢光和五年十二月丁酉生每寢寐家中髣髴見如人持玉衣覆其上常共怪之後相者劉良相后及諸姊指后曰此貴乃不可言蜀志曰先主穆皇后陳留人也兄吳壹少孤壹父素與劉焉有舊焉有異志聞善相者相后當大貴遂為子瑁納后瑁死后寡居先主既定益州而孫夫人還吳群下勸先主娉后先主疑與瑁同族法正進曰論其親踈可與晉文之於子圉乎於是納后為夫人又曰張裕曉相術每舉鏡視面自知刑死未嘗不撲之於地也又曰鄧芝字伯苗義陽新野人也漢末入蜀知益州從事張裕善相芝往從之裕謂曰君年過七十位至大將軍封侯吳志曰漢以孫策遠脩職貢遣使者劉琬加錫命琬語人曰吾觀孫氏兄弟才秀明遠然皆祿祚不終唯中弟孝廉形貌奇偉骨體不恒有大貴之表年又最壽爾其識之晉書裴秀傳曰文帝未定嗣而屬意舞陽侯攸武帝懼不得立問秀曰人有相否因以奇表示之秀後言於文帝曰中撫軍人望既茂文表如此固非人臣之相也由是世子乃定又曰孝武李太后諱陵容本出微賤始簡文帝為會稽王有三子繼夭自道生廢黜獻王早世其後諸姬絕孕將十年帝乃令善相者召諸愛妾而示之皆云非其人又悉以諸婢媵示焉時后為宮人在織坊中形長而色黑宮人皆謂之崑崙既至相者驚云此其人也帝以大計召之侍寢后數夢兩龍枕膝日月入懷意以為吉祥向儕類說之帝聞而異焉遂生孝武帝及會稽文孝王鄱陽長公主晉書曰王覽祥之弟也初呂虔有佩刀工相之以為必登三公可服此刀虔謂祥曰茍非其人刀或為害卿有公輔之量故以相與祥始固辭強之乃受祥臨薨以刀授覽曰汝後必興足稱此刀覽後弈世多賢才興於江左矣又曰羊祜少喪父遊汶水之濱父老謂之曰子有好相年未滿六十必建大功於天下既而去莫知所在又羊祜傳曰祜幼時有喜相墓者言祜墓有帝王氣若鑿之則無後祜遂鑿之相者見曰猶出折臂三公而祜竟墮馬折臂位至三公而無子又曰豫章人雷煥妙達緯象張華乃要煥宿屏人曰可共尋天文知將來吉凶因登樓仰觀煥曰僕察之久矣唯牛斗之閒頗有異氣華曰是何祥也煥曰寶劍之精上徹於天耳華曰君言得之吾少, SBCK: ''}
