  - {type: variant, offset: 2376, length: 0, content: '', WYG: 時蘭陵公主寡上}
  - {type: variant, offset: 2377, length: 0, content: '', WYG: 之求夫選親衞柳述及蕭瑒等以示韋鼎鼎曰瑒當封侯而無貴妻之相述亦通顯而守位不終上曰位由我耳遂以主降述又曰來和善相術同郡韓則嘗詣和相謂之曰後四}
