  - {type: variant, offset: 19, length: 2, content: 故難, WYG: 又曰桓公有主簿善别酒輙令先嘗好者謂青州從事惡者謂平原督郵青州有齊郡平原有革縣從事}
  - {type: variant, offset: 22, length: 12, content: 酒以白酒為賢人清酒為聖人, WYG: 至齊督郵言至革}
