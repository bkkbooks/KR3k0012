  body:
  - {type: variant, offset: 3, length: 1, content: 二, SBCK: 三酒下孟子曰禹惡旨酒而好善言孔叢子曰平原君與子髙飲強子髙酒曰有諺云堯舜千鍾孔子飲百觚子路嗑嗑尚飲百榼古之賢聖無不能飲子何辭焉子髙曰以予所聞聖賢以道德兼人未聞飲酒列子曰夫醉者之墜於車也雖􅐄不死骨節與人同犯害與人異其神全也乗亦不知也墜亦不知也死生驚懼不入乎其胷是故遌物而不慴彼得全於酒而猶􅀂是况得全於天乎韓子曰晉平公與羣臣飲飲酣乃喟然而歎曰莫樂爲人君惟其言而莫之違師曠侍坐於前援琴撞之公披袵而避琴傷於臂公曰大師誰撞師曠曰今者有小人言於側者故撞之公曰寡人也師曠曰嘻是非君人者之言也左右請除之公曰釋之以爲寡人戒又曰齊桓公飲酒醉遺其冠耻之三日不朝管仲曰此非有國之耻也公胡不雪之以政公曰善因發倉賜貧窮論囹圄岀薄罪處三日而民歌之曰公胡不復遺冠乎又曰宋人有少者欲效善見長者飲無餘亦自飲而盡之王孫子新書曰楚莊王攻宋厨有臰肉樽有敗酒將軍子重諫曰今君厨肉臰而不可食樽酒敗而不可飲而三軍之士皆有飢色欲以勝敵不亦難乎莊王曰請有酒投之士有食饋之賢淮南子曰楚㑹諸侯魯趙皆獻酒於楚王主酒吏求酒於趙趙不與吏怒乃以趙厚酒易魯薄者奏之楚王以趙酒薄遂圍邯鄲抱朴子曰鄭君釀酒酒成因以附子甘草屠内}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_845-1b}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_845-2a}
  - {type: variant, offset: 3, length: 1, content: 二, WYG: 三酒下孟子曰禹惡㫖酒而好善言孔叢子曰平原君與子髙飲强子髙酒曰諺云尭舜千鍾孔子飲百􅒀子路嗑嗑尚飲十榼古之賢聖無不能飲子何辭焉子髙曰予聞聖賢以道德兼人未聞飲酒列子曰夫醉者之墜車也雖疾不死骨節與人同而犯害與人異其神全也乗亦不知也墜亦不知也死生驚懼不入乎其胷是故遻物而不慴彼得全於酒而猶若是况得全於天乎韓子曰晉平公與羣臣飲酒酣乃喟然而歎曰莫樂為人君惟其言而莫之違師曠侍坐於前援琴撞之公披袵而避琴傷於臂公曰大師誰撞師曠曰今者有小人言於側者故撞之公曰寡人也師曠曰嘻是非君人者之言也左右請除之公曰釋之以為寡人戒又曰齊桓公飲酒醉遺其冠恥之三日不朝管仲曰此非有國之恥也公胡不雪之以政公曰善因發倉賜貧窮論囹圄出薄罪處三日而民歌之曰公胡不復遺冠乎又曰宋人有少者欲效善見長者飲無餘亦自飲而盡之王孫子新書曰楚荘王攻宋厨有臭肉樽有敗酒将軍子重諫曰今君厨肉臭而不可食樽酒敗而不可飲而三軍之士皆有饑色欲以勝敵不亦難乎曰請有酒投之士有食饋之賢淮南子曰楚㑹諸侯魯趙皆獻酒於楚王主酒吏求酒於趙趙不與吏怒乃以趙厚酒易魯薄者奏之楚王以趙酒薄遂圍邯鄲抱朴子曰鄭君酒釀成因以附子甘草屑内}
