  - {type: variant, offset: 1758, length: 2319, content: 斗妻王氏飲亦至三斗常對食竟日而視事不廢又曰袁粲為丹陽尹嘗步屧白揚郊野間道遇一士大夫便呼與飲酣明日此人謂被知顧到門求進粲曰昨飲酒無偶聊相要耳竟不與相見又曰蕭思話嘗從文帝登鍾山北嶺中道有盤石清泉上使於石上彈琴因賜以銀鍾酒謂曰相賞有松石間意又彭城王義康傳曰會稽長公主於兄弟為長文帝所親敬上嘗就主宴集甚歡主起再拜頓首悲不自勝上不曉其意起自扶之主曰車子歲暮必不見容特乞其命因慟哭上亦流涕指蔣山曰必無此慮若違今誓便是負初寧陵即封所餘酒賜義康曰會稽姉飲憶弟所餘今封送車子義康小字也齊書曰高帝幸東宮召諸王宴飲因遊玄圃園長沙王晃捉華蓋臨川王暎執雉尾扇聞喜公子良持酒鎗南郡王行酒武帝與豫章王嶷及王敬則自捧肴饌高帝大飲賜武帝已下酒並大醉盡歡日暮乃去又曰謝朏為吳興太守與弟瀹於征虜渚送別朏指瀹口曰此中唯宜飲酒瀹建武之朝專以長酣為事與劉瑱沈昭略交飲各至數斗朏既至郡致瀹數斛酒遺上曰力飲此物勿豫人事瀹嘗與劉悛飲推辭久之悛曰謝莊兒不可云不能飲瀹曰茍得其人自可沉湎千日悛甚慚無言又曰王琨儉於財用酒不過兩爵輒云取酒難遇之梁書曰初梁武帝揔延後進二十餘人置酒賦詩臧盾以詩不成罰酒一斗飲盡顏色不變言笑自若蕭介染翰便成文無加點帝兩美之曰臧盾之飲蕭介之文席之美也又曰陰鏗嘗與賓友飲宴見行觴者因迴酒炙以授之眾坐皆笑鏗曰吾儕終日酣飲而執爵者不知其味非人情也及侯景之亂鏗嘗為賊擒或救之獲免鏗問之乃前所行觴者又曰張纘為湘州刺史初吳興吳規頗有才學邵陵王綸引為賓客深相禮遇及綸作牧郢藩規隨從江夏遇纘出之湘鎮路經郢服綸餞之南浦纘見規在坐意不能平忽舉盃曰吳規此酒慶汝得陪今宴規尋起還其子翁孺見父不悅問而知之翁孺因氣結爾夜便卒規恨纘悲慟而憤哭兼至信次之間又殞規妻深痛夫子翌日又亡時人為張纘一盃酒殺吳氏三人南史曰南海有頓遜國在海崎上有酒樹似安石榴採其花汁停瓮中數日而成酒後魏書曰太宗引崔浩論事語至中夜太宗大悅賜浩縹醪酒十斛水精戎鹽一兩曰朕味卿言若鹽酒故與卿同其味也又曰高允被勑論集往世酒之敗德以為酒訓孝文覽而悅之又曰胡叟少孤每言及父母則淚下若孺子之號春秋常祭之前則先求旨酒時燉煌汜潛家善釀酒每節送一壺與叟論者以潛為君子又李元忠拜南趙郡太守好酒無政績及莊帝崩棄官潛圖義舉會齊神武東出元忠便乘露車載濁酒以奉迎神武聞其酒客未即見之元忠下車獨坐酌酒擘脯食之謂門者曰本言公招延豪傑今聞國士到門不能吐哺輟洗其人可知還吾刺勿復通也門者以告神武遽見之又曰齊神武自太原來朝見朱遊道曰此人是遊道邪常聞其名今日始識其面遷遊道別駕後日神武之司州饗朝士舉觴屬遊道曰飲高歡手中酒者大丈夫卿之為人合飲此酒又曰魏帝宴華林園謂神武曰自頃所在百司多有貪暴朝廷中有能公平直言彈劾不避親戚者王可勸酒神武降階跪言唯御史中尉崔暹一人謹奉明旨敢以酒勸并臣所射賜物千叚乞以廻賜帝又褒美之又曰劉藻字彥先父宗之廬江太守涉獵群籍美談笑善與人交飲酒至一石不亂藻為平東別將辭於洛水之南孝文曰與卿石頭相見藻對曰臣雖才非古人度亦不留賊虜而陛下輒當釃曲阿之酒以待百姓帝大笑曰今未至曲阿且以河東數石賜卿又曰裴粲傳元顥入洛以粲為西兗州刺史尋為濮陽太守崔巨倫所逐棄州入嵩高山節閔帝初復為中書令後正月晦帝出臨洛濱粲起御前再拜上壽酒帝曰昔北海入朝蹔竊神器爾曰卿誡之以酒今欲我飲何異於往情粲曰北海志在沈湎故諫其所失陛下齊聖溫克臣敢獻微誠帝曰甚愧來譽仍為命酌又曰齊郡王簡性好酒不能理公私之事妻常氏燕郡公喜女也文明太后以賜簡幹綜家事頗節簡酒乃至盜竊求乞婢侍卒不能禁又曰阮孚性機辯好酒貌短而禿周文帝偏所眷顧常於室內置酒十瓶餘一斛上皆加帽欲戲孚孚適入室見即驚喜曰吾兄弟輩甚無禮何為竊入王家匡坐相對宜早還宅也因持酒歸周文撫手大笑北齊書曰叚韶尤嗇於財雖親戚故舊略無施與其子孫尚公主并省丞郎在家佐事十餘日事畢辭還人唯賜一杯酒又曰高季式豪率好酒又恃舉家勳功不拘儉節與光州刺史李元忠生平遊款在濟州夜飲憶元忠開城門令左右乘驛馬持一壺酒往光州勸元忠朝廷知而容之又曰齊河南王孝瑜武成禮遇特隆帝在晉陽手勑之曰吾飲汾清二盃勸汝鄴酌兩盌其親愛如此也又曰齊皇甫亮性質朴純厚終無片言矯飾屬有勑下司各列勤墮亮三日不上省文宣王詰其故亮曰一日雨一日醉一日病酒文宣以其實優容之又曰周文帝聞韋敻養高不仕辟之不能屈明帝即位禮敬逾重乃為詩願時朝謁帝大悅勑有司日給河東酒一斗號之曰逍遙公唐書曰定州惣管李玄通性剛烈無所屈撓初城陷為劉黑闥所囚其故吏有以酒食餽之者玄通謂之曰諸君哀吾困辱故以酒食來相寬慰耳吾要當為諸君一醉可乎遂與樂飲因請劍起舞舞畢以劍潰腹而死又曰蒲桃酒西域有之前代或有貢獻及破高昌收馬乳蒲桃實於苑中種之并得其酒法上自損益造酒酒成凡有八色芳春酷列味兼醍盎既頒賜群臣京師識其味又曰麟德元年九月壁州刺史鄧弘慶制酒令平索看精四序又曰張鎮州拜舒州都督舒州即其本邑鎮州乃多市酒肴就望江舊宅盡召故人親戚與之酣宴散髮箕踞敦疇昔之歡十日贈以錢帛既而垂泣謂親賓曰比者張鎮州與故人為歡今日以後舒州都督治百姓耳君民禮隔不得交遊因與之訣自是親戚有犯法一無所縱州境因茲肅然又曰李景伯景龍中為諫議大夫中宗嘗與宰臣貴戚內宴酒酣遞唱迴波樂甚諠雜失禮次至景伯歌曰迴波爾時酒巵微臣職在箴規禮飲只合三爵君臣雜混非宜席為之散時人稱之又曰李適之雅好賓友飲酒一斗不亂夜則宴賞晝決公務廷無留事管子曰桓公飲管仲酒仲棄其半公問其故對曰臣聞酒入舌出舌出言失言失身棄臣棄身不如棄酒桓公笑焉晏子曰景公飲酒移於晏子之家晏子立於門曰國德無有故乎君今何為非時而夜辱公曰酒醴之味金石之聲願與夫子樂之晏子曰臣不敢與焉公乃移於司馬穰苴之家穰苴荅如晏子公復移於梁丘據據左執琴右擁竽行歌而至公曰樂哉無彼二子何以持國無此一臣何以樂身孫卿子曰醉者越百步溝以為跬步也俯而出城門以為萬丈之門酒亂其神也, WYG: ''}
