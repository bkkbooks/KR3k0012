  - {type: variant, offset: 189, length: 0, content: '', SBCK: 飲食之禮不脫屨而即序者謂之禮跣而上坐者謂之宴能飲者飲之不能飲者巳謂之醧齊顔色均衆寡謂之沉閉門不出者謂之湎故君子可以宴可以醧不可以沉不可以湎黄石公記曰昔者良將用兵人有饋一單醪者使投之於河令將士迎流而飲之夫一單醪不能味一河水三軍思爲之死非滋味及之也賈􅁩新書曰晉師伐號􅉑公出奔至澤中曰吾飢渴甚其御者進清酒腵脯問御曰汝何故謟䛕曰恐君必亡所以儲也號公作色怒御者曰臣言誤也君所以亡者}
