  - {type: variant, offset: 633, length: 695, content: 及通酌兵各一兩盌至二更時銜枚出斫敵敵驚動遂退寧益貴重又曰孫皓每饗宴無不竟日坐席無能不率以七升為限雖不悉入口皆澆灌取盡韋曜素飲酒不過二升初見禮異時常為裁減或密賜茶茗以當酒至於寵衰更見逼強輒以為罪又於酒後使侍臣難折公卿以嘲弄侵剋發擿私短以為歡笑焉又曰笮融督廣陵運漕大起浮圖祠每浴佛多設酒飯布席於路經數十里民人來觀及就食且萬人費以巨萬計蜀志曰簡雍拜昭德將軍時天旱禁酒釀者有刑吏於人家索得釀具論者欲令與作酒者同罰雍從先主遊觀見一男子行於道謂先主曰彼欲淫何以不縛先主曰卿何以知之對曰彼有其具與欲釀者同先主大笑而原欲釀者晉書曰王戎嘗如阮籍飲時袞州刺史劉昶字公榮在坐籍以酒少酌不及昶昶無恨色戎異之他日問籍曰彼何如人荅曰勝公榮不可不與飲若減公榮則不敢不共飲惟公榮可不與飲晉書曰山濤飲酒至八斗方醉帝欲試之以酒八斗飲之密益其酒濤極本量而止又曰陸抗與羊祜推僑禮之好抗嘗遺祜酒祜飲之不疑抗有疾祜饋之藥抗亦推心服之于時以為華元子反復見於今又曰阮孚為散騎常侍以金貂換酒為有司所彈又曰謝弈為桓溫司馬謂之方外司馬因以酒逼溫走入南康王門避之主曰君無狂司馬何由得相見弈遂引溫一兵卒於廳事共飲曰失一老兵得一老兵亦何所怪又曰陸納字祖言為吳興太守將之郡先至姑熟辭桓溫因問溫曰公致酒可飲幾升食肉多少溫曰年大來飲三升便醉白肉不過十臠卿復云何曰素不能飲正可二升肉亦不足言後伺溫閑曰外有微禮方守遠郡欲與公一醉以展下情溫欣然納之時王坦之刁協在座及受禮唯有酒一斗鹿肉一拌座客驚愕納徐曰明公近云飲酒三升納正可二升今有一斗以備杯酌餘瀝溫及賓客並歎其真率溫更勑中廚設精饌酣宴極歡而罷又曰何充字次道能飲酒雅為劉恢所貴恢每云見次道飲令人欲傾家釀言其能溫克, WYG: 清}
