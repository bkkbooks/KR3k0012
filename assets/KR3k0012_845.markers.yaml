  - {type: variant, offset: 3912, length: 0, content: '', SBCK: 是八風谷凍成者終年不壞今臭其氣酸洿林酒滑而色淺故云然嶺表録異曰南中醖酒即先用諸藥別淘漉粳米漉乾旋旋}
  - {type: variant, offset: 3912, length: 0, content: '', krp: 是八風谷凍成者終年不壞今臭其氣酸洿林酒滑而色淺故云然嶺表録異曰南中醖酒即先用諸藥別淘漉粳米漉乾旋旋}
  - {type: variant, offset: 3913, length: 13, content: 舌出舌出言失言失身棄臣棄身, SBCK: 藥和米搗熟即緑紛矣熱水溲而􅇛之形如餢飳以指中心刺作一竅布於簟席上以茍􅂎構葉罨之其體候好弱一如造麹法旣而以藤薎貫之懸於煙火之上每醖一年用幾箇餅子固有恒凖矣南中地䐘春冬七日熟秋夏五日熟旣熟貯以瓦甕用糞掃火燒之亦有}
