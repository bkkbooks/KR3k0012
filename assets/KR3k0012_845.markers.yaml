  - {type: variant, offset: 213, length: 1, content: 無, SBCK: 孔子百觚聖人􅅐腹小大與人均等􅀂飲千鍾冝食百牛能飲百觚則能食十羊使文王身如防風孔子身如長狄文王孔子率禮之人垂譽後丗豈千鍾百觚􅁘紂車行酒􅀐行炙二十日爲一夜按紂以酒爲池因謂車行酒以􅁏爲林因爲􅀐行炙耳或是覆酒滂沲於地因以爲池釀酒積糟因以爲丘懸肉似林因言肉林耳西京􅄂記曰司馬相如還成都以所服鷫鸘裘就市陽昌貰酒與卓文君爲歡典論曰孝靈末百司湎酒酒千文一斗常侍張讓子奉爲太醫令與人飲輙去衣露形爲戯樂也又曰洛陽令郭珎家有巨億毎暑召客侍婢數十盛裝飾羅縠披之􅃝祼其中使進酒又曰劉表有酒爵三大曰伯雅次曰仲雅小曰季雅伯雅容七􅂛仲雅六􅂛季雅五􅂛又設大針於杖端客有酒輙以􅥵之驗醉醒也博物志曰劉􅀇石曽於中山酒家沽酒酒家與千日酒飲之至家大醉其家不知以爲死葬之後酒家計向千日徃視之云巳葬於是開棺醉始醒俗云􅀇石飲酒一醉千日又曰西域有蒲桃酒積年不敗彼俗傳云可至十年欲飲之醉彌日乃解古今記曰烏孫國有青田核得水則有酒味甚淳美如好酒飲盡隨更注水隨成不可乆乆則苦不可飲名曰青田酒丗􅀃曰鍾毓鍾㑹少有令譽其父晝寢因共偷服散酒父時覺且託寐以觀之毓拜而後飲㑹飲而不拜父問其故毓曰酒}
