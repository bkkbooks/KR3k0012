  - {type: punctuation, offset: 9, content: 「, id: KR3k0012_CHANT_845-bkkpn4}
  - {type: variant, offset: 9, length: 2, content: 太祖, WYG: 葛仙公每飲酒醉常入門前陂中竟日乃出㑹從呉主到荆州還天風仙公舡没吳主謂其已死須㬰從水上來衣履不濕而有酒色云昨為伍子胥召設酒不能便歸以淹留也吕氏春秋曰肥肉厚酒務以自强命曰爛腸之食韓詩外𫝊曰夫飲之禮不脱履而即序者謂之禮跣足上坐者謂之宴能飲者飲之不能飲者已謂之醧齊顔色均衆寡謂之沉閉門不出者謂之湎故君子可以宴可以醧不可以沉不可以湎黄石公記曰昔者良将用兵人有饋一簞醪者使投之於河令将士迎流而飲之夫一簞醪不能味一河水三軍思為之死非滋味及之也賈誼新書曰晉師伐虢虢公出奔至澤中曰吾饑渴甚其御者進清酒腵脯問御曰汝何故謟䛕曰恐君必亡所以儲也虢公作色怒御者曰臣言誤也君所以亡者天下皆不肖疾公賢也虢公喜據軾而笑饑勌乃枕御者膝而卧御以塊代其膝而去虢公因餓死神異經曰西北外海有人長二千里兩脚中間相去千里腹圍一千六百里但日飲天酒五斗不食五糓魚肉唯飲天酒忽有饑}
  - {type: page-break, offset: 9, content: '', id: KR3k0012_WYG_845-3b, image: WYG0900/WYG0900-0462b.png}
  - {type: page-break, offset: 9, content: '', id: KR3k0012_WYG_845-4a, image: WYG0900/WYG0900-0462c.png}
  - {type: variant, offset: 12, length: 1, content: 禁, WYG: 向天仍飲好逰山海間不犯百姓不干萬物與天地同生又曰西北荒中有酒泉此酒美如肉清如鏡其上有五罇取一罇復一罇出與天地同休無乾時飲此酒人不死長生東方朔别傳曰武帝幸甘泉長平阪道中有虫赤如肝頭目口齒悉具先驅馳還以報上使視之莫知也時朔在屬車中令往視焉朔曰此謂恠氣是必秦獄處也上使案地圖果秦獄地上問朔何以知之朔曰夫積憂者得}
  - {type: page-break, offset: 12, content: '', id: KR3k0012_WYG_845-4b, image: WYG0900/WYG0900-0462d.png}
  - {type: punctuation, offset: 14, content: ，, id: KR3k0012_CHANT_845-bkkpn5}
  - {type: 'tls:seg', offset: 14, content: '', id: KR3k0012_CHANT_845-1a.5}
  - {type: variant, offset: 14, length: 20, content: 而人竊飲之故難言酒以白酒為賢人清酒為聖人, SBCK: ''}
  - {type: variant, offset: 14, length: 20, content: 而人竊飲之故難言酒以白酒為賢人清酒為聖人, krp: ''}
  - {type: variant, offset: 15, length: 0, content: '', WYG: 解乃取虫置酒中立消賜朔帛百疋後屬車上盛酒為此故也説苑曰魏文侯與大夫飲使公乗不仁為觴政曰飲若不盡浮之大白文侯不盡公乗不仁舉白浮君也又曰吳王從民飲酒胥諫曰昔白龍下於清冷之淵化為魚漁者射中其目白龍上告天王捨萬乗從布衣恐有射目之患也論衡曰東風至酒湛溢按酒味酸從東方木也味酸故酒湛溢也又曰文王飲酒千鍾孔子百觚聖}
  - {type: page-break, offset: 15, content: '', id: KR3k0012_WYG_845-5a, image: WYG0900/WYG0900-0463a.png}
  - {type: variant, offset: 16, length: 1, content: 竊, WYG: 胷腹小大與人均等若飲千鍾宜食百牛能飲百觚則能食十羊使文王身如防風孔子身如長狄文王孔子率禮之人垂譽後世豈千鍾百觚耶紂車行酒騎行炙二十日為一夜按紂以酒為池因謂車行酒以肉為林因為騎行炙耳或是覆酒滂沱於地因以為池釀酒積糟因以為丘懸肉似林因言肉林也西京雜記曰司馬相如還成都以所服鷫鸘裘就市易錢貰酒與卓文君為歡典論曰孝靈末百司湎酒酒千文一斗常侍張讓于奉為太醫令與人飲去衣露形為樂也世説洛陽令郭珎家有巨億每暑召客侍婢數十盛装飾羅糓被之􅃝祼其中使進酒又曰阮宣子嘗步行以百錢掛杖頭至店便獨醉酣暢雖當世貴盛不肯詣也又曰山季倫為荆州時出酣暢人為之歌曰山公時一醉遥造髙陽池日暮倒醉歸酩酊無所知時復乗駿馬倒着白接䍦舉手語葛强何如并州兒髙陽池在襄陽是其愛将并州人也襄陽記曰漢侍中習郁於峴山南依范蠡養魚法作魚池池邊有髙堤皆種竹及長楸芙蓉覆水是㳺宴名處山季倫逰此池未嘗不大醉而還恒曰此是我髙陽池也又曰鴻臚孔羣好飲酒王丞相語云卿恒飲酒不見酒家覆缾布日月乆則糜爛羣曰公不見糟中肉乃更堪乆羣常與親舊書云今年田得七百斛秫米不了麴蘖事又曰周顗字伯仁風徳雅重深逺危亂還江東積年恒大飲酒嘗經三日不醒人謂之三日僕射又曰諸阮能飲酒客至宗人間集不復用常杯酌以瓮盛酒賔主相向大酌更飲時有羣褚來飲酒不止便共}
