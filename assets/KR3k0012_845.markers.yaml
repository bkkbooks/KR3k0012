  - {type: variant, offset: 3619, length: 288, content: 并得其酒法上自損益造酒酒成凡有八色芳春酷列味兼醍盎既頒賜群臣京師識其味又曰麟德元年九月壁州刺史鄧弘慶制酒令平索看精四序又曰張鎮州拜舒州都督舒州即其本邑鎮州乃多市酒肴就望江舊宅盡召故人親戚與之酣宴散髮箕踞敦疇昔之歡十日贈以錢帛既而垂泣謂親賓曰比者張鎮州與故人為歡今日以後舒州都督治百姓耳君民禮隔不得交遊因與之訣自是親戚有犯法一無所縱州境因茲肅然又曰李景伯景龍中為諫議大夫中宗嘗與宰臣貴戚內宴酒酣遞唱迴波樂甚諠雜失禮次至景伯歌曰迴波爾時酒巵微臣職在箴規禮飲只合三爵君臣雜混非宜席為之散時人稱之又曰李適之雅好賓友飲酒一斗不亂夜則宴賞晝決公務廷無留事管子曰桓公飲管仲酒仲棄其半公問其故, SBCK: 異}
