  - {type: variant, offset: 36, length: 8, content: 王陵表滿寵年過躭, SBCK: 􅁑仙公毎飲酒醉常入門前陂中竟日乃岀曽從呉主到列州還大風仙公舡没呉主謂其巳死湏􅁷從水上來衣履不濕而有酒色云昨爲伍子胥召設}
  - {type: variant, offset: 36, length: 8, content: 王陵表滿寵年過躭, krp: 葛仙公毎飲酒醉常入門前陂中竟日乃岀曽從呉主到列州還大風仙公舡没呉主謂其巳死湏臾從水上來衣履不濕而有酒色云昨爲伍子胥召設}
  - {type: variant, offset: 37, length: 7, content: 陵表滿寵年過躭, WYG: 孝伯問王大阮籍何如司馬相如王大曰阮籍胷中壘隗故須澆之言同相如惟有酒異大忱小字王大歎曰三日不飲酒覺形神不復相親宋明帝文章志曰忱嗜酒一飲或連日不酌自號上頓也諺以大飲為上頓起於忱也王孝伯云名士不須竒才但使常得無事飲酒讀離騷便可稱名士也神仙傳曰孔元方者專脩道術元方為人惡衣踈食飲}
