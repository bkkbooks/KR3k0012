  - {type: variant, offset: 1029, length: 2261, content: 以為華元子反復見於今又曰阮孚為散騎常侍以金貂換酒為有司所彈又曰謝弈為桓溫司馬謂之方外司馬因以酒逼溫走入南康王門避之主曰君無狂司馬何由得相見弈遂引溫一兵卒於廳事共飲曰失一老兵得一老兵亦何所怪又曰陸納字祖言為吳興太守將之郡先至姑熟辭桓溫因問溫曰公致酒可飲幾升食肉多少溫曰年大來飲三升便醉白肉不過十臠卿復云何曰素不能飲正可二升肉亦不足言後伺溫閑曰外有微禮方守遠郡欲與公一醉以展下情溫欣然納之時王坦之刁協在座及受禮唯有酒一斗鹿肉一拌座客驚愕納徐曰明公近云飲酒三升納正可二升今有一斗以備杯酌餘瀝溫及賓客並歎其真率溫更勑中廚設精饌酣宴極歡而罷又曰何充字次道能飲酒雅為劉恢所貴恢每云見次道飲令人欲傾家釀言其能溫克也又曰陶侃每飲酒有常限歡有餘而限已竭殷浩更勸少進侃悽然曰年少時嘗誡之乃已宋書曰王弘為江州刺史欲識陶潛不能致也潛嘗往廬山弘令潛故人龐通之遺酒於半道栗里要之潛有腳疾使一門生二兒舉籃輿及至欣然便共飲酌俄頃弘至亦無忤也先是顏延之為劉柳後車功曹在尋陽與潛情款後為始安郡經過潛每往必酣飲致醉延之臨去留二萬錢與潛潛悉送酒家稍就取酒嘗九月九日無酒出宅邊菊叢中坐久之逢弘送酒至即便就酌醉而後歸潛不解音聲而畜素琴一張每有酒適輒撫弄以寄其意貴賤造者有酒輒設潛若先醉便語客我醉欲眠卿可去其真率如此郡將候潛逢其酒熟取頭上葛巾漉酒畢還復著之又曰顧憲之為建康令清儉強力為政甚得人和故都下飲酒者醇旨輒號為顧建康謂其清且美焉又曰孔顗為江夏內史性便酒每醉輒彌日不醒居常貧罄無有豐約未嘗關懷為府長史典籤諮事不呼前不敢前不令去不敢去雖醉日居多而曉明政事醒時判決未嘗有擁眾咸云孔公一月二十九日醉勝世人二十九日醒也又曰顏延之好騎馬遨遊里巷遇舊知輒據鞍索酒得必傾盡欣然自得又曰沈文季出為吳興太守文季飲酒至五斗妻王氏飲亦至三斗常對食竟日而視事不廢又曰袁粲為丹陽尹嘗步屧白揚郊野間道遇一士大夫便呼與飲酣明日此人謂被知顧到門求進粲曰昨飲酒無偶聊相要耳竟不與相見又曰蕭思話嘗從文帝登鍾山北嶺中道有盤石清泉上使於石上彈琴因賜以銀鍾酒謂曰相賞有松石間意又彭城王義康傳曰會稽長公主於兄弟為長文帝所親敬上嘗就主宴集甚歡主起再拜頓首悲不自勝上不曉其意起自扶之主曰車子歲暮必不見容特乞其命因慟哭上亦流涕指蔣山曰必無此慮若違今誓便是負初寧陵即封所餘酒賜義康曰會稽姉飲憶弟所餘今封送車子義康小字也齊書曰高帝幸東宮召諸王宴飲因遊玄圃園長沙王晃捉華蓋臨川王暎執雉尾扇聞喜公子良持酒鎗南郡王行酒武帝與豫章王嶷及王敬則自捧肴饌高帝大飲賜武帝已下酒並大醉盡歡日暮乃去又曰謝朏為吳興太守與弟瀹於征虜渚送別朏指瀹口曰此中唯宜飲酒瀹建武之朝專以長酣為事與劉瑱沈昭略交飲各至數斗朏既至郡致瀹數斛酒遺上曰力飲此物勿豫人事瀹嘗與劉悛飲推辭久之悛曰謝莊兒不可云不能飲瀹曰茍得其人自可沉湎千日悛甚慚無言又曰王琨儉於財用酒不過兩爵輒云取酒難遇之梁書曰初梁武帝揔延後進二十餘人置酒賦詩臧盾以詩不成罰酒一斗飲盡顏色不變言笑自若蕭介染翰便成文無加點帝兩美之曰臧盾之飲蕭介之文席之美也又曰陰鏗嘗與賓友飲宴見行觴者因迴酒炙以授之眾坐皆笑鏗曰吾儕終日酣飲而執爵者不知其味非人情也及侯景之亂鏗嘗為賊擒或救之獲免鏗問之乃前所行觴者又曰張纘為湘州刺史初吳興吳規頗有才學邵陵王綸引為賓客深相禮遇及綸作牧郢藩規隨從江夏遇纘出之湘鎮路經郢服綸餞之南浦纘見規在坐意不能平忽舉盃曰吳規此酒慶汝得陪今宴規尋起還其子翁孺見父不悅問而知之翁孺因氣結爾夜便卒規恨纘悲慟而憤哭兼至信次之間又殞規妻深痛夫子翌日又亡時人為張纘一盃酒殺吳氏三人南史曰南海有頓遜國在海崎上有酒樹似安石榴採其花汁停瓮中數日而成酒後魏書曰太宗引崔浩論事語至中夜太宗大悅賜浩縹醪酒十斛水精戎鹽一兩曰朕味卿言若鹽酒故與卿同其味也又曰高允被勑論集往世酒之敗德以為酒訓孝文覽而悅之又曰胡叟少孤每言及父母則淚下若孺子之號春秋常祭之前則先求旨酒時燉煌汜潛家善釀酒每節送一壺與叟論者以潛為君子又李元忠拜南趙郡太守好酒無政績及莊帝崩棄官潛圖義舉會齊神武東出元忠便乘露車載濁酒以奉迎神武聞其酒客未即見之元忠下車獨坐酌酒擘脯食之謂門者曰本言公招延豪傑今聞國士到門不能吐哺輟洗其人可知還吾刺勿復通也門者以告神武遽見之又曰齊神武自太原來朝見朱遊道曰此人是遊道邪常聞其名今日始識其面遷遊道別駕後日神武之司州饗朝士舉觴屬遊道曰飲高歡手中酒者大丈夫卿之為人合飲此酒又曰魏帝宴華林園謂神武曰自頃所在百司多有貪暴朝廷中有能公平直言彈劾不避親戚者王可勸酒神武降階跪言唯御史中尉崔暹一人謹奉明旨敢以酒勸并臣所射賜物千叚乞以廻賜帝又褒美之又曰劉藻字彥先父宗之廬江太守涉獵群籍美談笑善與人交飲酒至一石不亂藻為平東別將辭於洛水之南孝文曰與卿石頭相見藻對曰臣雖才非古人度亦不留賊虜而陛下輒當釃曲阿之酒以待百姓帝大笑曰今未至曲阿且以河東數石賜卿又曰裴粲傳元顥入洛以粲為西兗州刺史尋為濮陽太守崔巨倫所逐棄州入嵩高山節閔帝初復為中書令後正月晦帝出臨洛濱粲起御前再拜上壽酒帝曰昔北海入朝蹔竊神器爾曰卿誡之以酒今欲我飲何異於往情粲曰北海志在沈湎故諫其所失陛下齊聖溫克臣敢獻微誠帝曰甚愧來譽仍為命酌又曰齊郡王簡性好酒不能理公私之事妻常氏燕郡公喜女也文明太后以賜簡幹綜家事頗節簡酒乃至盜竊求乞婢侍卒不能禁又曰阮孚性機辯好酒貌短而禿周文帝偏所眷顧常於室內置酒十瓶餘一斛上皆加帽欲戲孚孚適入室見即驚喜曰吾兄弟輩甚無禮何為竊入王家匡坐相對宜早還宅也因持酒歸周文撫手大笑北齊書曰叚韶尤嗇於財雖親戚故舊略無施與其子孫尚公主并省丞郎在家佐事十餘日事畢辭還人唯賜, SBCK: ''}
