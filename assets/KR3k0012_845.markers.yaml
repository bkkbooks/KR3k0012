  - {type: variant, offset: 614, length: 118, content: 惜死卿何以獨惜死都督見寧色厲即起拜持酒及通酌兵各一兩盌至二更時銜枚出斫敵敵驚動遂退寧益貴重又曰孫皓每饗宴無不竟日坐席無能不率以七升為限雖不悉入口皆澆灌取盡韋曜素飲酒不過二升初見禮異時常為裁減或密賜茶茗以當酒至於寵衰更見逼強輒以為罪又於酒, SBCK: 爲身}
