  - {type: variant, offset: 190, length: 0, content: '', SBCK: 下皆不肖疾公賢也􅉑公喜據軾而􅀏飢勌乃枕御者􅂰而卧御以塊代其􅂰而去􅉑公因餓死神異經曰西北海外有人長二千里兩脚中間相去千里腹圍一千六百里但日飲天酒五􅂛不食五􅂖魚肉唯飲天酒忽有飢時向天仍飲好游山海間不犯百姓不千萬物與天地同生又曰西北荒中}
