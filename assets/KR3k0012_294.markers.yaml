  - {type: variant, offset: 2377, length: 796, content: 餘騎追奔直趣折摭以乘之仁果列陣城下太宗據涇水以臨賊賊徒氣沮無敢進戰其騎將澤幹等數人臨陣來降請還取馬太宗縱遣之於是各乘良馬須臾並至仁果大懼嬰城自守太宗具知賊中虛實將夕大軍繼至四面合圍因縱辯士諭以禍福仁果遂開門降既而諸將奉賀因問曰始大王野戰破賊其主尚保堅城王無攻具輕騎騰逐不待步兵徑薄城下咸疑不剋而竟下之何也太宗曰此以權道迫之使其計不暇發以故剋也羅侯恃往前之勝兼復養銳日久見吾不出意在相輕今喜吾悉出兵來戰吾雖破之擒殺盖少若不急躡還走投城仁果收而撫之則便未可得矣且其兵眾皆隴西人一敗被追不及廻顧散歸隴外則折摭自虛我軍隨而迫之所以懼而降也此乃成筭諸君盡不見耶又曰武后初徐敬業舉兵於江都稱匡復皇家以𥂕厔尉魏思溫為謀主問計於思溫對曰明公既以太后幽縶少主志在於匡復兵貴拙速但宜早度淮北親率大眾直入東都山東將士知公有勤王之舉必以死從此則指日刻期天下必定敬業將從其策薛璋又說曰金陵之地王氣已見宜早應之兼有大江設險足可以自固請且攻取常潤等州以為王霸之業然後率兵北上鼓行而前此則退有所歸進無不利實為良筭也敬業以為然乃自率兵四千人南度以擊潤州思溫密謂杜求仁曰兵勢宜合不可分今敬業不知并力渡淮率山東之眾以取洛陽必是無能成事命也可知敬業尋亦悔之所以遂敗呂氏春秋曰凡兵欲急疾捷不可久處所以兔起鳧舉喻急疾也雖有江河之險則陵之雖有太山之塞遂踰之衛公兵法曰用兵上神戰貴其速簡練士卒申明號令曉其目以麾幟習其耳以鼓金嚴賞罰以戒之重芻豢以養之浚溝塹以防之指山川以導之召才能以任之述奇正以教之如此則雖敵人有雷電之疾而我亦有所待也若兵無先備則不應卒卒不應則失於機失於機則後於事後於事則不制勝而軍覆矣故呂氏春秋云凡兵者欲急疾捷所以一決取勝不可久而用之矣或曰兵之情唯主速乘人之不及然敵將多謀戎卒輯睦令行禁止兵利甲堅氣銳而嚴力全而勁豈可速而犯之耶荅曰若此則當卷迹藏聲蓄盈待竭避其鋒勢與其持久安可犯之哉廉頗之拒白起守而不戰宣王之抗武侯抑而不進是也, SBCK: 泗}
