  body:
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 五示弱示強示弱孫子曰兵者詭道也無常形以詭詐爲道􅀂息侯誘蔡楚子謀宋也故能而示之不能用而示之不用言巳實能用師外示之怯也􅀂孫臏示弱而制龐㳙近而示之逺逺而示之近欲進而理去道也言多疑設其近誑曜敵軍示之以逺本從其近􅀂韓信之襲安邑陳舟臨晉而渡夏陽又曰古之善用兵者能使敵人前後不相及衆寡不相待貴賤不相求上下不相扶卒離而不集兵合而不齊多設詐変出東見西攻南引北亂之使彼張惶離亂而不集聚也合於利而動暴之使離亂之使不齊動兵而戰之不合於利而止左傳曰蔡聲子謂楚令尹屈建曰􅀂敖之亂伯賁之子苗賁皇奔晉以爲謀主及鄢陵之役楚晨壓晉軍而陣苗賁皇曰楚師之良在中軍王族而巳􅀂塞井夷竈成陣以當之欒范易行以誘之欒書時將中軍范爕佐之易行謂簡兵備欲令楚貪巳而不復顧二穆之兵易以豉反行胡郎反中行二郤必克二穆郤錡時將上軍中行偃佐之郤至佐新軍令此三人分良以攻二穆之兵楚子重子辛皆出穆王故日二穆吾乃}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_294-1b}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 五示弱示强示弱孫子曰兵者詭道也無常形以詭詐為道若息侯誘蔡楚子謀宋也故能而示之不能用而示之不用言已實能用師外示之怯也若孫臏示弱而制龎涓近而示之逺逺而示之近欲進而理去道也言多疑設其近誑曜敵軍示之以逺本從其近若韓信之襲安邑陳丹臨晉而渡夏陽又曰古人善用兵者能使敵人前後不相及衆寡不相持貴賤不相求上下不相扶卒離而不集兵合而不齊多設詐變出東見西攻南引北亂之使彼張惶離而不能聚也合於利而動不合於利而止左傳曰蔡聲子謂楚令尹屈建曰若敖之亂伯賁之子苗賁皇奔晉以為謀主及鄢陵之役楚晨壓晉軍而陣苗賁皇曰楚師之良在中軍王族而已若塞井夷竈成陣以當之欒范易行以誘之欒書時將中軍范士􅝂佐之易行謂簡兵備欲令楚貪已而不復顧二穆之兵易以䜴反行胡郎反中行二郤必尅二穆郤錡時將上軍中行偃佐之郤至佐新軍令此三人分二以攻二穆之兵楚子重子辛皆出穆王故曰二穆吾乃}
