  - {type: variant, offset: 1770, length: 212, content: 甲晨夜赴之亮覩塵而遁宣王曰吾倍道疲勞此曉兵者之所忌也亮不敢據渭水此易與耳進次漢陽與亮相遇宣王列陣以待之使將牛金輕騎餌之兵纔接而亮退也又曰蜀將孟達之降魏也魏朝以達領新城太守假節達於是連吳固蜀潛圖中國謀洩將舉兵司馬宣王秉政恐達速發以書安之達得書猶與不決宣王乃潛軍進諸將皆言達與二賊交搆宜審察而後動宣王曰達無信義此其相疑之時也當及其未定往決之乃倍道兼行八日到其城下吳蜀各遣其將救達宣王分諸將以拒之初達與諸葛亮書曰宛去洛八百里去吾千, WYG: ''}
