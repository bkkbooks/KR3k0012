  - {type: variant, offset: 1261, length: 189, content: 將軍衝天王率玄胡萬人攻萇將姚當於杏城萇將雷惡地叛應褐飛攻萇將姚漢得於李潤萇議將討之群臣咸曰陛下不憂六十里符登乃憂六百里褐飛萇曰登非可卒殄吾城亦非登所能卒圖惡地多智非常人也南引褐飛東結董咸甘言美說以成姦謀若得杏城李潤惡地據之控制遠近相為羽翼長安東北非復吾有於是潛軍赴之萇時眾不滿二千褐飛惡地眾至數萬玄胡赴之者首尾不絕萇每見一軍至輒有喜色群下怪而問之萇曰今同惡相濟皆來會集吾得乘勝席, SBCK: 夏太平御覽}
