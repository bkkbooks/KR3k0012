  - {type: variant, offset: 9, length: 1, content: 策, SBCK: 䇿}
  - {type: variant, offset: 9, length: 0, content: '', WYG: 䇿曰趙將李牧常居代雁門備匈奴以便宜置吏市租皆輸入于幕府為士卒費日擊數牛饗士習騎射謹烽火多間諜厚遇戰士為約曰匈奴即入盗急入牧保有敢捕處者斬匈奴毎入烽火謹輒入牧保不敢戰如是數嵗亦不亡失然匈奴謂牧為怯趙王讓牧牧如故王怒使人代之嵗餘匈奴毎來出戰數不利復遣牧牧至如故約匈奴數來無所得終以為怯邊將日得賞賜而不用皆願一戰於是乃具戰車得千三百乗選騎得萬三千疋千金之士五萬人彀弓弩者十萬人悉勤習戰大縱畜牧人衆滿野匈奴小入佯北不勝以數千人委之單于聞之大喜率衆來入牧多為竒陣張左右翼擊大破之殺匈奴十餘萬騎單于奔走十餘嵗不敢近邊也又曰韓魏相攻齊將田忌率兵伐魏魏將龎涓聞之去韓而歸魏孫臏謂田忌曰彼三晉之兵素悍勇而輕齊齊為張怯善戰者因其勢而利導之兵法百里而趨利者蹶上將蹶猶挫也五十里走者軍半至使舉軍入魏地為十萬竈明日為五萬竈又明日為二萬竈龎涓行三日大喜曰我故知齊軍怯入吾地三日士卒亡者過半矣乃棄其歩兵與其輕銳倍日并行逐之并畢正切孫子度其行暮當至馬陵馬陵道狹而旁多阻險可伏兵乃斫大樹白而書之曰龎涓死此樹下於是令萬弩夾道而伏期日暮見舉火而俱發龎涓夜至斫木下見白書乃舉火燭之讀書未畢齊軍萬弩俱發軍大亂龎涓乃自刎曰遂成豎子之名漢書曰韓王信反帝往擊至晉陽聞信與匈奴欲擊漢上大怒使人使匈奴匈奴匿其壯士肥牛馬徒見其老弱及羸䇿使者十軰來皆言匈奴易擊帝使劉敬復徃使匈奴還報曰二國相撃此宜誇矜見所長今臣徃徒見羸胔老弱胔音漬一說讀曰瘠瘠瘦也此欲見短伏竒兵以争利愚以為匈奴不可擊也是時漢兵已逾句注三十萬餘衆兵已前行帝怒罵敬以為妄言阻軍械繫敬遂徃至平城匈奴果出竒兵圍高帝白登七日然後得解先賢行狀曰孫}
