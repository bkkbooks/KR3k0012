  - {type: variant, offset: 566, length: 2, content: 賀拔, WYG: 黨法宗傅豎眼率衆二萬掩至城下道根塹壘未固城中衆少失色道根命開城門緩服登城選精鋭二百人出與魏軍戰敗之魏人見意閒且戰又不利因退走又曰後魏將宇文測行綏州事毎嵗河冰合後突厥即來冦先是常遣居人入城堡以避之測至皆令安堵如舊乃於要路數百處並多積柴仍逺遣斥候知其動静是年十二月突厥從連谷入冦去界數十里測命積柴之處一時縱火突厥謂有大軍至懼而遁走自相蹂踐委棄雜畜及輜重不可勝數測徐率所部收之分給百姓自是突厥不敢復至又曰梁雍州刺史}
