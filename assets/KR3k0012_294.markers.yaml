  - {type: variant, offset: 556, length: 0, content: '', SBCK: 東晉末宋武帝爲將討海賊孫恩恩在扈瀆海鹽令鮑陋遣子嗣之以呉兵一千請爲前驅宋武曰賊兵甚精呉人不習戰􅀂前驅失利必敗我軍可在後爲聲援不從是夜宋武多設伏兵兼置旗鼔然一處不過數人明日賊率衆乃}
  - {type: variant, offset: 556, length: 0, content: '', WYG: 東晉末宋武帝為將討海賊孫恩恩在扈瀆海鹽令鮑陋遣子伺之以吳兵一千請為前驅宋武曰賊兵甚精吳人不習戰若前驅失利必敗我軍可在後為聲援不從是夜宋武多設伏兵兼置旗鼓然一處不過數人明日賊率衆乃}
  - {type: variant, offset: 556, length: 0, content: '', krp: 東晉末宋武帝爲將討海賊孫恩恩在扈瀆海鹽令鮑陋遣子嗣之以呉兵一千請爲前驅宋武曰賊兵甚精呉人不習戰若前驅失利必敗我軍可在後爲聲援不從是夜宋武多設伏兵兼置旗鼔然一處不過數人明日賊率衆乃}
  - {type: variant, offset: 557, length: 6, content: 俟醜奴稱亂關, SBCK: 餘迎戰前驅旣交諸伏皆舉旗鳴鼔謂四靣有軍乃引退嗣之追奔爲賊所没宋武且戰且退賊旣盛所領死傷且盡宋武慮不免至向伏兵處乃止令左}
  - {type: page-break, offset: 557, content: '', id: KR3k0012_SBCK_294-8a}
  - {type: variant, offset: 557, length: 6, content: 俟醜奴稱亂關, WYG: 餘迎戰前驅既交諸伏兵皆舉旗鳴鼓謂四面有軍乃引退伺之追奔為賊所迫及宋武且戰且退賊既盛所領死傷且盡宋武慮不免至向伏兵處乃止令左}
