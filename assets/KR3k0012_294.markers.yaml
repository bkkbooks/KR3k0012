  - {type: variant, offset: 10, length: 0, content: '', WYG: 攻陳登於匡琦城賊初到旌甲覆水咸勸登引避之登乃閉門自守示弱不戰將士歛聲寂若無人登乗城觀形勢知其可擊乃申命士衆宿整兵噐昧爽開門引軍至賊營緩歩抄其後賊周章方布陣不得還船登縱兵乗之賊遂大敗晉書}
