  - {type: variant, offset: 1984, length: 392, content: 里聞吾舉事當表上天子比相返覆一月間也則吾城已固諸軍足辦吾所在深險司馬公不自來諸將來吾無患矣及兵到達又告亮曰吾舉事八日而兵至城下何其神速也上庸城三面阻水達於城外為水柵以自固宣王度其水破其柵直造城下八道攻之旬有六日達甥劉賢將李輔等開門出降遂斬達又曰東魏荊州刺史辛纂據穰城西魏將楊忠從獨孤信討之纂迎戰敗退走信令忠為前驅馳至其城北叱問者曰今大軍已至城中有應爾等求活何不避走聞者盡散忠乘而入彎弓大呼纂兵衛百餘人莫之敢禦遂斬纂以徇城中懾伏唐書曰隋末高祖義兵發太原次靈石縣賈胡堡隋將宋老生率精兵二萬屯霍邑以拒之會久雨糧盡與長史裴寂及諸將議曰宋老生頓霍邑屈突通鎮河東二人同心非造次可進欲還太原以圖後舉太宗曰本興大義以救蒼生當須先入咸陽號令天下今遇小敵便即班師將恐義從之徒一朝解體還守太原一城之地此為賊耳何以自全高祖乃止太宗引師赴霍邑遂平老生也又曰武德中太宗征薛仁果其將宗羅侯來拒大破於淺水原因率左右二, SBCK: 九}
