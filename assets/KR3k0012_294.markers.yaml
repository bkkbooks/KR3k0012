  - {type: variant, offset: 564, length: 0, content: '', SBCK: 脫取死人衣賊謂當走反停疑猶有伏宋武因呼更戰氣色甚猛賊以爲然乃引軍去宋武徐歸然後散兵稍集又日東齊末桓􅀇簒晉宋武帝起義討玄使將桓謙何湛之屯覆舟山武帝使羸弱登蔣山多張旗幟􅀇不之測大懼武帝與劉毅等分爲數隊進突謙陣皆殊死戰無不一當百東北風急義軍放火煙塵漲天鼔譟之音震駭京邑謙等諸軍一時奔散又曰蕭齊將馮道根守阜陵城戍􅀄到阜陵理城隍逺斥􅀱有如敵將至者衆頗突之道根曰怯防勇戰此之謂也理城未畢㑹}
  - {type: variant, offset: 564, length: 0, content: '', WYG: 脫取死人衣賊謂當走反停疑猶有伏宋武因呼更戰氣色甚猛賊以為然乃引軍去宋武徐歸然後散兵稍集又曰東晉末桓𤣥簒晉宋武帝起兵討𤣥使將桓謙何湛之屯覆舟山武帝使羸弱登蔣山多張旗幟𤣥不之測大懼武帝與劉毅等分為數隊進突謙陣皆殊死戰無不一當百東北風急軍中放火煙塵漲天鼓譟之音震駭京邑謙等諸軍一時奔散又曰蕭齊將馮道根守阜陵城戍初到阜陵理城隍逺斥堠如敵將至者衆頗笑之道根曰怯防勇戰此之謂也理城未畢㑹}
