  - {type: variant, offset: 11, length: 1, content: 秦, SBCK: 趙將李牧常居代鴈門備匈奴以便冝置吏市租皆輸入于幕府爲士卒費日擊數牛饗士習􅀐射謹烽火多間諜厚遇戰士爲約曰匈奴即入盗急入收保有敢捕虜者斬匈奴毎入烽火謹趣入收保不敢戰如是數歳亦不亡失然匈奴謂牧爲怯趙王讓牧牧如故王怒使人代將歳餘匈奴毎來岀戰數不利復遣牧牧至如故約匈奴數來道狹而旁多阻隘可伏兵乃斫大樹白而書之曰龐㳙死于此樹之下於是令萬弩夾道而伏期曰暮見火舉而俱發龐㳙夜至斫木下見白書乃鑚火燭之讀書未畢齊軍萬弩俱發軍大亂龐㳙乃自剄曰遂成竪子之名漢書曰韓王信反髙帝自往擊至晉陽聞信與匈奴欲擊漢帝使人使匈奴匈奴匿其壯士肥牛馬徒見其老弱及羸畜使者十軰來皆言匈奴易擊帝使劉敬復往使匈奴還報曰兩國相擊此冝誇矜見所長見示也今臣往徒見羸胔老弱胔音漬一說讀日瘠瘠瘦也此欲見短伏竒兵以爭利愚以爲匈奴不可擊也是時漢兵以踰句注三十餘萬衆兵巳業行帝怒以爲沮吾軍阻謂止壞也械繫敬廣武遂往至平城匈奴果出竒兵圍髙帝白登七日然後得解漢書曰孫䇿遣軍攻陳登於匡􅄾城賊􅀄到旌甲覆水郡下衆寡不敵登乃閉門自守示弱不戰將士銜聲寂􅀂無人登乗城觀􅄱勢知其可擊乃申命士衆宿整兵器昧爽開門引軍指賊營歩􅀐抄其後賊周章方結陣不得還舩登縱兵乗之賊遂大敗晉書曰李矩守滎陽城前趙劉聦將劉暢歩􅀐三萬討矩屯于韓王故壘相去七里遣使招矩時暢卒至矩未暇爲備遣使奉牛酒詐降于暢潛匿精勇見其老弱暢不以爲虞大饗渠帥人皆醉飽矩謀夜襲之暢僅以身免又曰慕容寳載記曰魏}
