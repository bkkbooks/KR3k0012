  - {type: variant, offset: 352, length: 201, content: 不聽司馬陳珪曰昔攻上庸八部並進晝夜不息故能一旬之半拔堅城塹孟達今者遠來而更安緩愚竊惑焉宣王曰孟達眾少而食支一年吾將士四倍於達而糧不淹一月以一月圖一年安可不速今賊眾我寡賊飢我飽水雨乃爾功力不設雖當促之欲何所為自發京師不憂戰攻但恐賊糧垂盡而圍落未合掠其牛馬抄其樵採此故驅使走也夫兵者詭道善因事變賊憑眾恃雨故雖飢困安肯束手當示無能為之若取小利以驚之非計也既而雨止遂合圍起土山地道楯櫓鉤橦竟發矢石雨下晝夜攻而拔, SBCK: 破}
