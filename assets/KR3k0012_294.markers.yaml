  - {type: variant, offset: 11, length: 1, content: 秦, krp: 趙將李牧常居代鴈門備匈奴以便冝置吏市租皆輸入于幕府爲士卒費日擊數牛饗士習騎射謹烽火多間諜厚遇戰士爲約曰匈奴即入盗急入收保有敢捕虜者斬匈奴毎入烽火謹趣入收保不敢戰如是數歳亦不亡失然匈奴謂牧爲怯趙王讓牧牧如故王怒使人代將歳餘匈奴毎來岀戰數不利復遣牧牧至如故約匈奴數來道狹而旁多阻隘可伏兵乃斫大樹白而書之曰龐㳙死于此樹之下於是令萬弩夾道而伏期曰暮見火舉而俱發龐㳙夜至斫木下見白書乃鑚火燭之讀書未畢齊軍萬弩俱發軍大亂龐㳙乃自剄曰遂成竪子之名漢書曰韓王信反髙帝自往擊至晉陽聞信與匈奴欲擊漢帝使人使匈奴匈奴匿其壯士肥牛馬徒見其老弱及羸畜使者十軰來皆言匈奴易擊帝使劉敬復往使匈奴還報曰兩國相擊此冝誇矜見所長見示也今臣往徒見羸胔老弱胔音漬一說讀日瘠瘠瘦也此欲見短伏竒兵以爭利愚以爲匈奴不可擊也是時漢兵以踰句注三十餘萬衆兵巳業行帝怒以爲沮吾軍阻謂止壞也械繫敬廣武遂往至平城匈奴果出竒兵圍髙帝白登七日然後得解漢書曰孫䇿遣軍攻陳登於匡琦城賊𥘉到旌甲覆水郡下衆寡不敵登乃閉門自守示弱不戰將士銜聲寂若無人登乗城觀形勢知其可擊乃申命士衆宿整兵器昧爽開門引軍指賊營歩騎抄其後賊周章方結陣不得還舩登縱兵乗之賊遂大敗晉書曰李矩守滎陽城前趙劉聦將劉暢歩騎三萬討矩屯于韓王故壘相去七里遣使招矩時暢卒至矩未暇爲備遣使奉牛酒詐降于暢潛匿精勇見其老弱暢不以爲虞大饗渠帥人皆醉飽矩謀夜襲之暢僅以身免又曰慕容寳載記曰魏}
  - {type: variant, offset: 13, length: 1, content: 韓, SBCK: 并州驃􅀐李農逆戰敗績寳引群臣于東堂議之尚書封懿曰今魏師十萬天下之勁敵也示之以弱岨􅀜拒戰計之上也陳書曰武帝東討杜龕侯安都軍守北齊軍人據石頭遊騎至于闕下安都閉門偃旗幟示之以弱耳令城中曰有登陴看賊者斬及夕賊收軍還石頭安都夜令士卒密營禦敵之具明辰賊又至安都率甲士三百人開東西掖門與戰大敗之賊乃退還石頭不敢復逼臺城後周書曰隋文帝作相之􅀄尉遲逈拒命遣將崔仲文率兵定􅀜東軍次蓼隄逈將檀讓擁衆數萬仲文以羸師戰讓悉衆來拒仲文僞北讓軍頗驕於是遣精兵左右翼擊之大敗讓軍進攻梁郡逈守將劉子寛弃城遁走隋書曰煬帝大業中彭城賊張大彪宋丗模等衆至數萬作保縣薄山㓂掠徐兖隋將董純討之純􅀄閉營不與戰賊屢桃之不出賊以純爲怯不設備縱兵大掠純選精銳擊賊合戰於昌慮大破之斬首萬餘級築爲京􅀚又曰隋末山賊孟讓衆號十萬屯盱眙煬帝遣王充保都梁山以拒之乆不與戰乃宣言士卒亡叛使賊中聞之讓果大􅀏曰王充文法吏何能爲將吾當生􅅞之於是進攻其柵充與戰佯不勝讓益輕之乃分兵虜掠充知其可擊令軍中移竈撤幕設方陣四靣而出戰大破之虜男女十萬餘口讓僅以身免六韜曰武王問太公曰敵人先至巳據便地形􅀔又強則如之何對曰當示以怯弱設伏徉走自投死地敵見之必疾而赴擾亂失次必離固所入我伏兵齊起急擊前後衝其兩旁示強左傳曰楚將子元以車六百乗伐鄭師入桔祑之門桔祑鄭逺郊之門也又入自純門及逵市純門鄭外郭門也逹市郭内道上市也懸門不發楚言而出子元曰鄭有人焉懸折門施折於内城門鄭示楚以間暇故不閑城門出兵而效楚言故子元畏不敢進也諸侯救鄭楚師夜遁鄭人將奔桐丘諜言曰楚幕楚囯有烏乃止幕帳也又曰楚大饑戎伐其西南戎山夷也庸人帥羣蠻以叛楚庸楚屬之小國麋人率百濮將伐楚百濮夷也於是申息之北門不啓備中國也楚人謀徙於阪髙楚險地也蔿賈曰不可我能往㓂亦能往不如伐庸夫䴢與百濮謂我饑不能師故伐我我􅀂出師必懼而歸百濮離居將各走其邑誰暇謀人乃出師旬有五日百濮乃罷自廬以徃振廪同食往往伐庸也振發也廪倉也同食上下無異饌也又曰晉文公率諸侯伐楚楚子王從晉師晉退三舎楚師不止又次于城濮楚師背􅈶而舎􅈶丘陵險阻名也􅈶音携文公患之聽輿人之誦恐衆畏險故聽其歌誦也曰原田莓莓舎其舊而新是謀髙平日原喻晉軍羙盛􅀂原田草也莓然可以謀立新功不足念舊惠也晉大夫狐偃曰戰也􅀾而捷必得諸侯􅀂其不捷表裏山河必無害也晉國外河而内山也晉車七百乗韅靷鞅靽五萬二千五百人也在背曰􆀁在􅇩曰靷在腹曰鞅在後曰靽言駕乗修備韅呼見切靷與進切晉侯登有莘之墟以觀師曰少長有禮其可用也有莘故國名也遂伐其木以益其兵伐木以益攻􅀾之具盖亦示強也終敗楚師又曰晉侯伐齊齊侯登巫山以觀晉人使司馬斥山澤之險雖所不至必斾而䟽陣之斥􅀱也䟽建旌旗以爲陣示衆也使乗車者左實右僞以斾先僞以衣物爲人􅄱也建斾以先驅輿曳柴而從之以揚塵齊侯見之畏其衆也乃脫歸脫不張旌幟也又曰蔡聲子聘楚謂令尹屈建曰子儀之亂折公奔晉以爲謀主繞角之役析公曰楚師輕佻易震蕩也􅀂多鼔鈞聲以夜軍之鈞同其聲楚師必遁晉人從之楚師宵潰晉遂侵蔡襲沈獲其君敗申息之師于桒隧獲申麗而還鄭於是不敢南靣楚失諸華則析公之爲也漢書曰景帝時匈奴大入上郡天子使中貴人從李廣中官之幸貴也勒習兵擊匈奴貴人將數十􅀐出獵見匈奴三人與戰􅀍射傷中貴人煞其􅀐且盡中貴人走廣廣曰是必匈奴射鵰者也鵰善飛故使善射者射之廣乃遂從百􅀐徃馳三人令􅀐左右翼而廣身射彼三者殺其二人生得一人果射鵰者也遥見匈奴有數千􅀐廣以爲誘􅀐驚上山陣廣之百􅀐皆大恐還馳走廣曰吾去大軍數十里今􅀂走匈奴追射我立盡今我留匈奴必以我爲大軍誘之必不敢擊我廣令諸􅀐曰前到匈奴陣二里所止令曰皆下馬解鞌其􅀐曰虜多且近即急奈何廣曰彼虜以我爲走今皆解鞌以示不走用堅其意胡􅀐遂不敢擊有白馬將出護其兵於是廣上馬與十餘􅀐奔射殺之而復還至其􅀐中解鞌令士皆縱馬卧是時㑹暮胡兵終恠之卒不敢擊向夜半時胡兵以爲漢有伏}
