  - {type: variant, offset: 5, length: 2, content: 示緩, SBCK: 萃於王族必大敗之四萃四靣集攻之也晉人從之楚師大敗王夷師􅑒夷傷也呉楚之間謂火滅爲􅑒子廉切子反死之鄭叛呉興則苗賁皇之爲也}
  - {type: variant, offset: 5, length: 2, content: 示緩, WYG: 萃於王族必大敗之四萃四面集攻之也晉人從之楚師大敗王夷師􅑒夷傷也吳楚之間謂火滅為􅑒子亷切子反死之鄭叛吳興則苗賁皇之為也}
