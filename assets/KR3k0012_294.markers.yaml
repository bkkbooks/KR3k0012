  - {type: variant, offset: 1451, length: 531, content: 一舉而覆其巢穴東北無復餘也褐飛等以萇兵少盡眾來攻萇固壘不戰示之以弱潛遣子崇率騎數百出其不意以乘其後褐飛兵擾亂萇遣將王超等率步騎擊之褐飛眾大潰斬褐飛惡地請降萇待之如初通典曰後漢末荀攸從曹公征呂布至下邳布敗固守攻之不拔連戰士卒疲曹公欲還攸與郭嘉說公曰呂布勇而無謀今三戰皆北其銳氣衰三軍以氣為主主衰則軍無奮意且布之謀主陳宮有智而遲今及布氣衰而未復宮謀之未定進急攻之布可拔也乃引沂泗灌城城潰生擒布又曰蜀將諸葛亮伐魏魏將司馬宣王郭淮等禦亮張郃勸宣王分軍住雍郿為後鎮宣王曰料前軍能獨當之者將軍言是也若不能當而分為前後此楚之三軍所以為黥布擒也遂進軍隃音舒縻亮聞大軍且至乃自帥眾將芟上邽之麥諸將皆懼宣王曰亮慮多決少必安營自固然後芟麥吾得二日兼行足矣於是卷甲晨夜赴之亮覩塵而遁宣王曰吾倍道疲勞此曉兵者之所忌也亮不敢據渭水此易與耳進次漢陽與亮相遇宣王列陣以待之使將牛金輕騎餌之兵纔接而亮退也又曰蜀將孟達之降魏也魏朝以達領新城太守假節達於是連吳固蜀潛圖中國謀洩將舉兵司馬宣王秉政恐達速發以書安之達得書猶與不決宣王乃潛軍進諸將皆言達與二賊交搆宜審察而後動宣王曰達無信義此其相疑之時也當及其未定往決之乃倍道兼行八日到其城下吳蜀各遣其將救達宣王分諸將以拒之初達與諸葛亮書曰宛去洛八百里去吾千, SBCK: 第}
