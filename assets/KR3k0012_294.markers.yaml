  - {type: variant, offset: 713, length: 387, content: 走晉書安平獻王孚傳曰吳諸葛恪圍新城以孚督諸軍二十萬禦之孚次壽春遣母立儉文欽等討之諸將欲速擊之孚曰夫攻者借人之力以為攻且當詐巧不可爭力也故稽留月餘乃進軍吳師望風而退宋書曰臨烈王道規曰兵法屈申有時不可茍進諸桓世居西楚群小皆為竭力桓振勇寇三軍難以爭勝且可頓兵養銳徐以計策縻之不憂不剋也務速孫子曰久則頓兵挫銳攻城則力屈頓弊屈盡久暴師則國用不足夫頓兵挫銳力屈貨殫音單則諸侯乘其弊而起雖有智者不能善其後故兵聞拙速雖拙有速勝也未有工之久也夫久兵而國利者未之有也左傳曰先軫曰一日縱敵數世之患也又曰楚子伐隨隨少師謂隨侯曰必速戰不然將失楚師又曰武城黑謂常曰吳用木也我用革也不可久也不如速戰魏志曰夏侯淵性果悍進軍疾速人歌曰夏侯淵三日六百五日千晉書呂光載記曰光行至高昌聞堅寇晉光欲更須後命部將杜進曰節下任全方面赴機宜速何不了而留乎又曰杜預破吳眾議且俟來冬預曰兵威已振譬如破竹數節之後迎刀而解乃平之也, SBCK: 伏焉}
