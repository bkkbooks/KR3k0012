  - {type: variant, offset: 5494, length: 0, content: '', krp: 戎王在位四十六年崩子幽王宫涅立帝王世紀曰宣王元年以邵穆公爲相秦仲爲大夫誅西戎是時天大旱王以不雨遇灾而懼整身修行欲以消去之祈于群神六月乃得雨大夫仍叔美而歌之今雲漢之詩是也是歲西戎殺秦仲王於是進用賢良樊仲山父尹吉父程伯休父虢文公申伯韓侯顯父南仲方叔仍叔邵穆公張仲之屬並爲卿佐自厲王失政獫狁荆蠻交侵中國官政墮廢百姓離散王乃脩復宮室納規諌安集兆民命南仲邵虎方叔吉父並征定之復先王境土繕車徒興畋狩禮天下喜王化復行號稱中興墨子曰周宣王殺杜伯不辜杜伯曰死若有知三年必使君知之宣王田於圃田從人滿野日中杜伯乗白馬素車朱衣朱冠手執朱弓挾朱矢射王而中其心折脊伏㢰而死從者莫不聞見幽王國語曰幽王之二年西周三川皆震伯陽父曰周將亡矣夫天地之氣不失其序若過其序民亂之也陽伏而不能出隂迫而不能蒸於是有地震今三川寔震陽失其所而鎮於隂也史記曰幽王得褒姒而篤愛之乃欲廢后并太子用褒姒爲后以其子伯服爲太子褒姒爲人不好笑恱之萬方猶不笑幽王爲烽燧火鼔㓂至則舉烽火於是諸侯悉至至而無㓂褒姒乃大笑幽王恱之爲數舉烽火其後諸侯不信並不至幽王以虢石父爲卿用事國人皆怨之石父爲人佞巧善䛕好利今王用之幽王之廢后去太子也申侯怒乃與繒西夷大戎共攻幽王王舉烽火徵兵兵莫至遂殺幽王驪山之下虜褒姒盡取周之財而去於是諸侯乃即申侯而共立故太子冝臼是爲平王以奉周祀平王乃東徙洛邑避戎㓂也幽王在位凡一十一年紀年曰幽王立褒姒之子伯盤以爲太子瑣語曰宣王之元妃獻后}
  - {type: variant, offset: 5495, length: 0, content: '', SBCK: 子不恒朞月而生后弗敢舉天子召問群王之元史史皆荅曰􅀂男子也身體有不全諸骨節有不備者則可身體全骨節備不利於天子也將必䘮􅀖天子曰􅀂而不利余一人命棄之仲山父曰天子年長矣而未有子或者天將以是棄周雖棄之何益天子弗棄之平王史記曰平王之時王室微弱而諸侯以強并弱齊楚􅁗晉始大政由方伯五十一年平王崩太子泄父早死立其子林是爲桓王桓王平王孫也帝王世紀曰平王元年鄭武公爲司徒與晉文侯股肱周室夾輔平王率諸侯戮力一心東遷洛邑桓王史記曰桓王在位二十三年崩子莊王他立帝王世紀曰桓王旣失於信禮義陵遲男子􅁋奔䜛僞並作諸侯背叛構怨連禍九族不親故詩人刺之莊王史記曰莊王四年周公黒肩欲殺莊王而立王子克辛伯告王王殺周公王子克奔燕十五年莊王崩子僖王胡齊立僖王史記曰僖王三年齊桓公始霸五年僖王崩子惠王閬立帝王世紀曰僖王自即位以來變文武之制作􅀇黃華麗之飾宫室峻而奢侈故孔子譏焉五年王崩子凉洪代立惠王傳曰有神降於莘惠王問内史過曰是何故也對曰國興明神降之􅁥其徳也將亡神又降之觀其惡也故有得神以興亦有以亡虞夏商周皆有之史記曰􅀄莊王嬖姬姚生子頽有寵及惠王即位奪其大臣蔿國之田以爲囿故大夫邊伯等五人作亂謀召燕衛之師伐惠王惠王奔温居鄭之櫟立僖王弟子頽爲王遂享諸大夫樂及徧儛虢君怒四年鄭與􅉑君殺子頽復立惠王惠王在位二十五年崩子襄王鄭立襄王史記曰襄王母蚤死後母曰惠后后生叔帶有寵襄王畏之三年叔帯與戎翟謀伐襄王襄王欲誅叔帶叔帶奔齊齊桓公使管仲平戎于王十五年王以翟師伐鄭王德翟人將以其女爲后冨辰諌不聽十六年王絀翟后翟人來誅殺譚伯冨辰曰吾數諌不從乃以其屬死之􅀄惠后欲立王子帶故以其黨開翟翟人遂入周襄王出奔於鄭鄭居於汜子帶立爲王取襄王所絀翟后與居温十七年襄王乃告急於􅀳􅀳文納王而誅叔帶襄王於是賜晉文公秬鬯弓矢爲伯以河内地與晉二十年晉文公又召襄王襄王㑹之河陽書曰天王狩于河陽三十二年襄王崩子頃王壬臣立頃王史記曰頃王六年崩子匡王班立匡王史記曰匡王六年崩弟瑜代立是爲定至定王史記曰定王元年楚伐陸渾之戎次於洛使人問九鼎之重輕王使王孫滿應設以辭楚兵乃去二十一年定王崩子簡王夷代立簡王史記曰簡王十三年􅀳殺其君厲公迎子周於周立之爲悼公十四年簡王崩子靈王泄心立靈王傳曰王子朝使告于諸侯曰定王六年􅁗人降祓曰周其有頿王亦克能脩其職至于靈王生而有頿王甚神聖無惡於諸侯國語曰靈王二十年榖雒􅋐將毁王宫賈逵注日榖雒二水合有似􅃲洛在王城南榖在城北者王欲壅之太子􅀳諌曰不可􅀳聞古之長民者不􅈥山不崇藪不竇澤竇决出夫山土之聚也藪物之歸也川氣之導也澤水之鍾也天地成聚於髙歸物於下䟽爲川谷以導其氣陂塘汙原以鍾其美聚萬物合之美大也伯屬封崇九山决汨九川陂障九澤豐殖九原故天無伏隂地無散陽觀之詩書與民之憲言則皆亡王之爲也王其圖之王卒壅之亂於是始史記曰靈王在位二十七年崩子景王貴立景王傳曰天王將鑄無射周景王也無射鍾名泠州鳩曰王其以心疾死乎泠樂官州鳩其名也夫樂天子之職職主也夫音樂之輿也樂因音而行而鍾音之器也音由器以發天子省風以作樂省風俗作樂以移之器以鍾之鍾聚之與以行之樂須音而行小者不窕窕細也他彫切大者不槬槬横大不入也音􅀞則和於物物和則嘉成喜樂成也故和聲入於耳而和於心心僖則樂僖安也窕則不咸不充滿人心大則不容心不堪容心是以感感實生疾今鍾摦矣王心弗堪其能乆乎史記曰景王太子聖而早卒王愛子朝欲立之㑹崩子丐之黨與争立國人立長子猛爲王子朝攻殺猛猛爲悼王晉人攻子朝而立丐是爲敬王帝王世紀曰景王遇心疾崩于榮錡氏單穆公與劉文公立太子猛是爲悼王景王在位二十五年悼王帝王世紀曰悼王以景王二十五年四月始即位十一月崩王立凡二百日故春秋稱王子猛卒不成䘮故不言天王崩也立王母弟是爲敬王敬王史記曰􅀳定公遂入敬王于周四十三年敬王崩子元王仁立元王史記曰元王八年崩子定王介立貞定王史記曰定王十六年三晉滅智伯分其地二十八年崩子去疾立是爲哀王皇甫謚日貞定王哀王帝王世紀曰哀王即位三月弟叔襲殺王而立是爲思王思王帝王世紀曰思王即位五月弟隗攻殺王而代立是爲考哲王考王史記曰考王十五年崩子威烈王午立威烈王帝王世紀曰威烈王崩子躭立是爲元安王安王史記曰安王立二十六年而崩子烈王喜代立帝王世紀曰安王子喜立是爲烈王烈王史記曰烈王十年崩弟扁立是爲顯王顯王史記曰顯王三十五年致文武昨於􅁗惠王四十四年􅁗惠王稱王其後諸侯皆爲王四十八年顯王崩子慎王定立帝王世紀曰顯王元年趙成侯韓哀侯來攻周二年西周威公之嗣曰惠公始封惠公}
