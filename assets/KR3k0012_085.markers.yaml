  - {type: variant, offset: 5493, length: 0, content: '', SBCK: 子變是爲夷王夷王禮曰禮天子不下堂而見諸侯下堂而見諸侯天子之失禮也由夷王巳下也史記曰夷王崩子厲王胡立紀年曰夷王二年蜀人吕人來獻瓊賔于河用介珪三年王致諸侯烹齊哀公于鼎帝王世紀曰夷王即位諸侯來朝王降與抗禮諸侯德之三年王有惡疾愆于厥身諸侯莫不並走群望以祈王身十六年王崩厲王史記曰厲王即位三十年好利近榮夷公大夫芮良諌王不聽卒以榮爲卿士用事王行暴虐侈傲國人謗王召公諌曰民不堪命王怒得衛巫使􅁥謗以告則殺之諸侯不朝三十四年王益嚴國人莫敢言道路以目三年相與叛襲厲王出奔于􅮿太子靜匿召公之家國人聞乃圍之召公以其子代太子竟得脫召公周公二人相共行政號曰共和共和十四年厲王死于􅇾太子静長於召公家二相乃共立之是爲宣王帝王世紀曰厲王荒沉于酒􅁋於婦人宣王史記曰宣王即位二相輔之修政法文武成康之遺風諸侯復宗周十二年魯武公來朝宣王不脩籍於千畒虢文公諌曰不可王弗聽三十九年戰于千畒王師敗績于}
