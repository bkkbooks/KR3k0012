  - {type: variant, offset: 4373, length: 354, content: 伐紂渡於盟津陽侯之波逆流而擊疾風晦暝人馬不見於是武王左操黃銊右執白旄瞋目而麾之曰余在天下誰敢害吾意者於是風濟而波罷又曰武王克殷欲築宮於五行之山五行山今太行山也河內野王縣北上黨間周公曰不可夫五行之山固塞險阻之地也使我德能覆之則天下納其貢職者廻也廻迂難也使我有暴亂之行則天下之伐我難周公言我有暴亂之行財天下當來伐我無為於五行之山使天下來伐我者難也言其依德不恃嶮也此所以三十六世而不奪也說苑曰武王伐紂過墜斬山過水拆舟過谷發梁過山焚萊示民無返志成王史記曰成王少周公攝政管叔蔡叔群弟疑周公與武庚作亂叛周周公奉成王命伐誅武庚殺管叔蔡叔以微子開伐殷後國於宋周公行政七年成王長周公反政成王北面就群臣之位成王在酆使召公復營洛邑如武王之意周公復卜申視卒營築居九鼎焉曰此天下之中四方入貢道理均作周官興正禮樂制度於是改而民和睦頌聲興, WYG: ''}
