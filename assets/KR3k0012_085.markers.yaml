  - {type: variant, offset: 5491, length: 0, content: '', krp: 年以德衰南征及濟于漢舡人惡之乃膠船進王王御船至中流膠液解王及祭公俱没水而崩其右辛游靡長臂且多力拯得王周人諱之王室於是乎大微王娶於房曰房后生太子滿代立是謂穆王漢上記曰咋額至横桑三十里桑字本作䘮辛㳺靡取昭王䘮處吕氏春秋曰周昭王親征荆髙誘注曰秦莊王名楚故曰荆還及渉漢梁敗王杜於漢中杜尤粉切䚯墜也辛餘靡振王北濟穆王歸藏曰昔穆王天子筮出於西征不吉曰龍降於天而道里脩逺飛而中天蒼蒼其羽傳曰穆王有塗山之㑹周穆王㑹諸侯於塗山又曰昔穆王欲肆其心周}
  - {type: variant, offset: 5492, length: 0, content: '', SBCK: 天下將必皆有車轍馬跡焉􅀕父作祈招之詩以止王心王是以獲殁於祗宫史記曰穆王即位春秋巳五十矣而王道衰微王將征犬戎􅀕公謀父諌不可王遂征之得四白狼四白鹿以歸自是荒服者不至諸侯有不睦者甫侯言於王作脩刑辟命曰甫刑穆王立五十五年年一百五歳而崩子恭王翳扈立穆天子傳曰天子北征乃絶漳水郭璞注日絶猶截也水今在鄴縣也於是即井鈃山之下即井鈃山也今在常山石邑縣鈃音刑癸未􅀨雪天子獵于鈃山之西河河山足坡乃至于崑崙之丘以觀春山之寳乃披圗視典用觀天子之寳器省河所出禮圗玉果石似美玉所謂如果者也璿珠璿玉􅀋也音琁燭銀有精光如燭也黄金之膏金膏亦猶玉膏皆其精汋宿於崑崙之阿赤水之陽崑崙山有赤水東北流見山海經也升于崑崙之丘以觀黄帝之宫黄帝巡遊四海登崑崙山而起宫室其上見新涪也天子北征舎乎珠澤此澤出珠乃因名之今越舊平舊岀青海北昇于舂山之上以望四野曰春山是惟天下之髙山者也癸丑天子乃遂西征吉日甲子天子賔于西王母西王母如人虎齒蓬髪載勝善嘯紀年曰穆王十七年西征于崑崙之丘見西王母其年辛􅐫來賔于昭宫乃執白珪􅀇璧以見西王母執贄者致敬也獻錦組百純乙􅐫天子觴西王母于瑶池之上西王母爲天子謡謡徒歌也曰白雲在天山陵自岀道里悠逺山川間之將子無死將請尚能復來尚庶幾也巳酉天子飲于溽水之上音汗溽也六師之人畢至于曠原乃奏廣樂六師之人翔畋于曠原翔猶遊也得獲無疆無􅆠猶無限也鳥獸絶群言取盡也帝王世紀曰穆王修德教㑹諸侯於塗山命吕侯爲相或謂之甫侯五十一年王巳百歳老耄以吕侯有賢能之德於是乃命吕侯作吕刑之書五十五年王年百􅀊崩于祗宫楊子法言曰周穆少不好學至乎耄長抱朴子曰周穆王南征一軍盡化君子爲猨爲鵠小人爲蟲爲沙恭王帝王世紀曰恭王能庇昭穆之闕故春秋稱之周自恭至夷王四世年紀不明是以曆依魯爲正王在位二十年崩子堅代立懿王史記曰懿王時王室遂衰懿王在位二十五年崩恭王弟辟方立是爲孝王帝王世紀曰懿王二年徙都犬丘孝王史記曰孝王在位十五年崩諸侯復立懿王}
