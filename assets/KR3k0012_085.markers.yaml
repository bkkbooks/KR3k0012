  - {type: variant, offset: 44, length: 100, content: 遂踐之而孕居期而生子以為不祥棄之隘巷牛羊過者皆避不踐徙置林中適會山林中多人遷而棄渠中冰上飛鳥以翼覆薦之姜嫄以為神遂收養之因名為棄棄為兒時遊戲好種樹麻菽麻菽溢美及成人遂好耕農相地之宜親稼穡堯聞之舉為農師, WYG: 際}
