  - {type: variant, offset: 2813, length: 379, content: 被才也又曰文王處岐事紂冤侮雅孫朝夕必時雅正孫順紂雖冤柱而侮慢之而文王猶正順諸侯之禮而不失其時也止貢必適祭祀必敬紂喜命文王稱西伯賜之千里之地文王再拜稽首而辭曰願為民請去炮烙之刑紂見熨斗爛人手因作銅柱布火於其下令人走其上墮火而死以之為樂以之為方之炮故名為炮烙也文王非惡千里之地也以為民請去炮烙之刑必得民心得民心則賢於千里之地矣呂氏春秋曰文王修德百姓親附是時崇侯虎與文王同列為諸侯德不能及文王常嫉妬之乃譖文王於紂曰西伯昌聖人也長子發中子旦皆聖合謀君其慮之紂乃囚文王於羑里將欲殺之於是文王四臣散宜生等乃周流海內經歷豐土得美女二人水中文具白馬朱鬣以獻於紂陳於中庭紂立出西伯文王在羑里時演易八卦為六十四作鬱厄之辭困于石據于蒺蔾乃申憤以作歌曰殷道溷溷浸濁煩兮朱紫相合不別分兮迷亂聲色信讒言兮閻閻之虐使我愆兮幽閉閉牢穽由其言兮遘我四人憂勤勤兮論衡曰文王飲酒千鍾聖人能以德將酒, WYG: 受罪}
