  - {type: variant, offset: 3209, length: 1, content: 士, WYG: 乃膠船進王王御船至中流膠液解王及祭公俱沒水而崩其佐辛游靡長臂且多力拯得王周人諱之王室於是乎大微王娶於房曰房后生太子滿代立是謂穆王漢上記曰咋額至橫桑三十里桑字本作喪辛游靡取昭王喪處吕氏春秋曰周昭王親征荆髙誘注曰秦莊王名楚故曰荆還及渉漢梁敗王隕於漢中隕尤粉切傾墜也辛游靡拯王北濟穆王歸藏曰昔穆王天子筮西征卜吉日龍降於天而道里脩逺飛而冲天蒼其羽傳曰穆王有塗山之㑹周穆王㑹諸侯於塗山又曰昔穆王欲肆其心周行天下將必皆有車轍馬跡焉祭父作祁招之詩以止王心王}
