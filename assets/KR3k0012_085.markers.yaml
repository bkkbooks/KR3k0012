  - {type: variant, offset: 4752, length: 0, content: '', WYG: 静長於召公家二相乃共立之是為宣王帝王世紀曰厲王荒耽于酒淫婦人宣王史記曰宣王即位二相輔之修政法文武成康之遺風諸侯復宗周十二年魯武公來朝宣王不修籍於千畝虢文公諌曰不可王弗聽三十九年戰于千畝王師敗績于姜戎王在位四十六年崩子幽王宫湼立帝王世紀曰宣王元年以召穆公為相秦仲為大夫誅西戎是時天大旱王以不雨遇灾而懼整身修行欲以消去之祈于羣神六月乃得雨大夫仍叔美而歌之今雲漢之詩是也是歲西戎殺秦仲王於是進用賢良樊侯仲甫尹吉甫程伯休父虢文公申伯韓侯顯父南仲方叔仍叔召穆公張仲之屬並為卿佐自厲王失政玁狁荆蠻交侵中國官政墮廢百姓離散王乃修復宫室興賢人納規諌安集兆民命南宫仲召虎方叔吉甫並正四方復先王境土繕車徒興畋狩禮天下喜王化復行號稱中興墨子曰周宣王殺杜伯不辜杜伯曰死若有知三年必使君知之宣王田於圃田從人滿野日中杜伯乘白馬素車朱衣朱冠手執朱弓挾朱天射王而中其心折脊伏弦而死從者莫不見聞幽王國語曰幽王之二年西周三川皆震伯陽父曰周將亡矣夫天地之氣不失其序若過其序民亂之也陽伏而不能出隂迫而不能蒸於是有地震今三川實震陽失其所而填於隂也史記曰幽王愛褒姒生子伯服竟廢申后及太子以褒姒為后以其子伯服為太子褒姒為人不好笑悦之萬方故不笑幽王為烽燧大鼓冦至則舉烽火於是諸侯悉至至而無冦褒姒乃大笑幽王恱之為數舉烽火其後諸侯並不至幽王以虢石父為卿用事國人皆怨之石父為人佞巧善䛕好利王用之幽王又廢申后去太子也申侯怒乃與西夷犬戎共攻幽王王舉烽火徵兵兵莫至遂殺幽王驪山之下虜褒姒盡取周之賂而去於是諸侯乃即申侯而共立故太子宜臼是為平王以奉周祀平王乃東遷洛邑避戎冦也幽王在位一十一年紀年曰幽王立褒姒之子伯服以為太子瑣録曰宣王元后不恒朞月生子后弗敢舉天子召問羣臣及元史史臣荅曰若男子也身體有不全諸骨節有不備立為天子也將必喪邦天子曰若而不利余一人命棄之仲山父曰天子年長也而未有子或者天將以是棄周雖棄之何益天子弗棄之平王史記曰平王之時王室微弱而諸侯以強倂弱齊楚秦晉始大政由方伯五十一年平王崩太子泄父早死立其子林是為桓王桓王平王之孫也帝王世紀曰平王元年鄭武公為司徒與晉文侯股肱周室夾輔平王率諸侯戮力一心東遷洛邑桓王史記曰桓王在位二十三年崩子莊王佗立帝王世紀曰桓王既失於信禮義陵遲男子淫奔䜛偽並作諸侯背叛搆怨連禍九族不親故詩人刺之莊王史記曰莊王四年周公黒肩欲殺莊王而立王子克辛伯告王王殺周公王子克奔燕十五年莊王崩子僖王胡齊立僖王史記曰僖王三年齊桓公始伯五年僖王崩子惠王閬立帝王世紀曰僖王自即位以來變文武之制作元黃華麗之飾宫室峻而奢侈故孔子譏焉五年王崩子凉洪代立惠王左傳有神降於莘惠王問内史過曰是何故也對曰國之將興明神降之監其徳也將亡又降之觀其惡也故有得神以興亦有以亡虞夏商周皆有之史記曰初莊王嬖姬姚生子頽頽有寵及惠王即位奪其大臣園圃之田以為囿故大夫邊伯等五人作亂謀召燕衛之師伐惠王惠王奔温居鄭之櫟立僖王弟子頽為王遂享諸大夫樂及徧舞鄭虢君怒四年鄭與虢君伐殺子頽復入惠王惠王二十五年崩子襄王鄭立襄王史記曰襄王母早死後母曰惠后后生叔帶有寵襄王畏之三年叔帶與戎翟謀伐襄王襄王欲誅叔帶叔帶奔齊齊桓公使管仲平戎于周十五年王以翟師伐鄭王德翟人將以其女為后富辰諌不聽十六年王絀翟后翟人來誅殺譚伯富辰以其屬死之初惠后欲立王子帶故以其黨開翟翟人遂入周襄王出奔于鄭鄭居王于鄭帶立為王取襄王所絀翟后與居温十七年襄王乃告急於晉晉文納王而誅叔帶襄王於是賜晉文公秬鬯弓矢為伯以河内地與晉二十年晉文公乃召襄王襄王會之河陽書曰天王狩于河陽三十二年襄王崩子頃王壬臣立頃王史記曰頃王六年崩子匡王班立匡王史記曰匡王六年崩弟瑜代立是為定王定王史記曰定王元年楚伐陸渾之戎次於洛使人問九鼎之輕重王使王孫滿應設以辭楚兵乃去二十一年定王崩子簡王夷代立簡王史記曰簡王十三年晉殺其君厲公迎子周於周立之為悼公十四年簡王崩子靈王泄心立靈王傳曰王子朝使告白諸侯曰定王六年秦人降妖曰周其有頿王亦克能修其職至于靈王生而有頿王甚神聖無惡於諸侯國語曰靈王二十二年榖雒鬭將毁王宫賈逵注曰榖雒二水似鬬洛在王城南榖在城北王欲壅之太子晉諌曰不可晉聞古之長民者不墮山不崇藪不竇澤竇决也夫山土之聚也藪物之歸也川氣之導也澤水之鍾也天地成聚於髙歸物於下疏為川谷以導其氣陂塘汚庳以鍾其美聚合萬物之美也伯禹封崇九山决泊九川陂障九澤豐殖九原故天無伏隂地無散陽觀之詩書與民之憲言則皆亡主之為也王其圖之王卒壅之亂於是始史記曰靈王在位二十七年崩子景王貴立景王左傳天王將鑄無射周景王也無射鐘名伶州鳩曰王其以心疾死乎夫樂天子之職也夫音樂之輿也樂曰音而行而鐘音之噐也音由噐以發天子省風以作樂省風俗作樂以移之噐以鍾之鍾聚也輿以行之樂須音而行小者不窕窕細也他彫切大者不槬槬横大不入也音畫則和於物物和則嘉成喜樂成也故和聲入於耳而藏於心心億則樂億安也窕則不咸不充滿人心槬則不容心不堪容心是以感感實生疾今鐘槬矣王心弗堪其能久乎史記曰景王太子聖而早卒王愛子朝欲立之㑹崩子丐之黨與爭立國人立長子猛為王子朝攻殺猛猛為悼王晉人攻子朝而立丐是為敬王帝王世紀曰景王遇心疾崩于榮錡氏單穆公與劉文公立太子猛是為悼王景王在位二十五年悼王帝王世紀曰悼王以景王二十五年四月始即位十一月崩王立凡二百日故春秋稱王子猛卒不成喪故不言天王崩也立王母弟丐是為敬王敬王史記曰晉定公遂入敬王于周四十四年敬王崩子元王仁立元王史記曰元王}
