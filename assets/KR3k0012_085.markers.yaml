  - {type: variant, offset: 5493, length: 0, content: '', krp: 子變是爲夷王夷王禮曰禮天子不下堂而見諸侯下堂而見諸侯天子之失禮也由夷王巳下也史記曰夷王崩子厲王胡立紀年曰夷王二年蜀人吕人來獻瓊賔于河用介珪三年王致諸侯烹齊哀公于鼎帝王世紀曰夷王即位諸侯來朝王降與抗禮諸侯德之三年王有惡疾愆于厥身諸侯莫不並走群望以祈王身十六年王崩厲王史記曰厲王即位三十年好利近榮夷公大夫芮良諌王不聽卒以榮爲卿士用事王行暴虐侈傲國人謗王召公諌曰民不堪命王怒得衛巫使監謗以告則殺之諸侯不朝三十四年王益嚴國人莫敢言道路以目三年相與叛襲厲王出奔于􅮿太子靜匿召公之家國人聞乃圍之召公以其子代太子竟得脫召公周公二人相共行政號曰共和共和十四年厲王死于彘太子静長於召公家二相乃共立之是爲宣王帝王世紀曰厲王荒沉于酒淫於婦人宣王史記曰宣王即位二相輔之修政法文武成康之遺風諸侯復宗周十二年魯武公來朝宣王不脩籍於千畒虢文公諌曰不可王弗聽三十九年戰于千畒王師敗績于}
  - {type: variant, offset: 5494, length: 0, content: '', SBCK: 戎王在位四十六年崩子幽王宫􅄺立帝王世紀曰宣王元年以邵穆公爲相􅁗仲爲大夫誅西戎是時天大旱王以不􅀨遇灾而懼整身修行欲以消去之祈于群神六月乃得􅀨大夫仍叔美而歌之今雲漢之詩是也是􅀊西戎殺􅁗仲王於是進用賢良樊仲山父尹吉父程伯休父虢文公申伯韓侯顯父南仲方叔仍叔邵穆公張仲之屬並爲卿佐自厲王失政獫狁荆蠻交侵中國官政􅈥廢百姓離散王乃脩復宮室納規諌安集兆民命南仲邵虎方叔吉父並征定之復先王境土繕車徒興畋狩禮天下喜王化復行號稱中興墨子曰周宣王殺杜伯不􅇳杜伯曰死􅀂有知三年必使君知之宣王田於圃田從人滿野日中杜伯乗白馬素車朱衣朱冠手執朱弓挾朱矢射王而中其心折脊伏㢰而死從者莫不聞見幽王國語曰幽王之二年西周三川皆震伯陽父曰周將亡矣夫天地之氣不失其序􅀂過其序民亂之也陽伏而不能出隂迫而不能蒸於是有地震今三川寔震陽失其所而鎮於隂也史記曰幽王得褒姒而篤愛之乃欲廢后并太子用褒姒爲后以其子伯服爲太子褒姒爲人不好􅀏恱之萬方猶不􅀏幽王爲烽燧火鼔㓂至則舉烽火於是諸侯悉至至而無㓂褒姒乃大􅀏幽王恱之爲數舉烽火其後諸侯不信並不至幽王以虢石父爲卿用事國人皆怨之石父爲人佞巧善䛕好利今王用之幽王之廢后去太子也申侯怒乃與繒西夷大戎共攻幽王王舉烽火徵兵兵莫至遂殺幽王驪山之下虜褒姒盡取周之財而去於是諸侯乃即申侯而共立故太子冝臼是爲平王以奉周祀平王乃東徙洛邑避戎㓂也幽王在位凡一十一年紀年曰幽王立褒姒之子伯盤以爲太子􅃈語曰宣王之元妃獻后}
