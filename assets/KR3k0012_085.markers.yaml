  - {type: variant, offset: 2296, length: 299, content: 過百里天下二分歸之文王欲以卑弱制強暴以為天下去殘除賊而成王道故太公之謀主也太公為周陳陰符兵謀也賈誼書曰文王晝臥夢人登城而呼己曰我東北陬之腐骨也速以人君葬我文王曰諾覺召吏視之信有焉文王曰速以人君葬之吏曰此無主請以五大夫文王曰吾夢中已許之矣奈何其背也士民聞之曰我君不以夢之故背腐骨況於生人乎桓子新論曰文王操者文王之時紂無道爛金為格溢酒為池宮中相殘骨肉成泥琁室瑤臺藹雲翳風鍾聲雷起疾動天地文王躬被法度陰行仁義援琴作操故其聲紛以擾駭角震商琴操曰受命者謂文王受天命文王以紂時為岐侯躬修道德執行仁義百姓附親是時紂為無道刳胎斬涉廢壞三仁天統易運諸侯瓦解皆歸文王其後有鳳凰銜書於郊文王曰殷帝無道虐亂天下皇命已移不得, WYG: ''}
