  - {type: variant, offset: 5497, length: 1, content: 季, krp: 班於鞏以奉王是爲東周惠公周於是始分爲東西王微弱政在西周慎靚王帝王世紀曰慎靚王六年崩子延代立是爲𧹞王赧王史記曰東西周分治赧王徙都西周五十九年秦攻西周王奔秦頓首受罪盡獻其邑三十六口三十萬秦受其獻而歸其君於周周王赧卒周民遂東亡秦取九鼎寳器而遷西周公於􅓆音憚狐後七歳秦莊襄王滅東西周皆入於秦周旣不祀旣盡也漢書曰幽平之後日以陵夷至乎﨑嶇河洛之間分爲二周然天下謂之共主雖後微弱猶云以爲主強大弗之敢傾}
