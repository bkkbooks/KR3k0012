  - {type: variant, offset: 4755, length: 0, content: '', WYG: 介立貞定王史記曰貞定王十六年三晉滅智伯分其地二十八年崩子去疾立是為哀王皇甫謐曰真定哀王帝王世紀曰哀王即位三月弟叔襲殺王而立是為思王思王帝王世紀曰思王即位五月弟嵬攻殺王而自立是為考王考王史記曰考王十五年崩子威烈王午立威烈王帝王世紀曰威烈王在位二十四年崩子驕立是為安王安王史記曰安王二十六年而崩子烈王喜代立帝王世紀曰安王子喜立是為烈王烈王史記曰烈王十年崩弟扁立是為顯王顯王史記曰顯王三十五年致文武胙於秦惠王四十四年秦惠王稱王其後諸侯皆為王四十八年顯王崩子慎靚王定立帝王世紀曰顯王元年趙成侯韓哀侯來攻周二年西周威公之嗣曰惠公}
