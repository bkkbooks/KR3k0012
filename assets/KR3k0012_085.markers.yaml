  - {type: variant, offset: 5499, length: 1, content: 今, SBCK: 載八百餘年數極德盡曁於􅎼王降爲庶人號位以絶於天下尚枝葉相持莫得居其虚位四海亡主三十餘年帝王世紀曰􅎼王二十七年冬十月􅁗昭襄王仍僣號西帝齊閔王稱東帝十一月齊各復去帝號爲王四十五年王如􅁗得罪於􅁗􅁗攻周或􅀃􅁗王乃止王雖居天子之位爲諸侯之所侵逼與家人無異多貰於民無以歸之乃上臺以避之故周人因名其臺曰逃債之臺洛陽南宫謻臺謻音夷又音尸移切是也五十九年􅁗攻韓魏趙大破之玉懼乃背􅁗與諸侯合從將天下銳師出伊門攻􅁗􅁗昭襄王大怒使將軍摎音虬攻周王王恐乃入􅁗頓首受罪盡獻其邑􅁗盡納其獻使赧王歸于周降爲庶人以夀終王􅇣正部曰幽厲禮樂崩壊諸侯力政轉相吞滅德不能懐威不能制至於王赧遂䘮王計太平御覽卷}
  - {type: page-break, offset: 5499, content: '', id: KR3k0012_SBCK_085-11a}
