  - {type: variant, offset: 182, length: 1045, content: 窋陟反律立不窋末年夏后氏政衰去稷不務不窋失其官而奔戎狄之間不窋卒子鞠立鞠卒子公劉立公劉雖在戎狄之間復修后稷之業務耕種行地宜百姓懷之多從而保歸焉周道興蓋自此也公劉卒子慶節立國於邠九世至古公亶父復修后稷公劉之業積德行義國人皆戴之獯音勳鬻音育戎狄攻之欲得地與民民皆怒欲戰古公曰有民立君將以利之今戎狄所攻戰以吾地與民民之在我與在彼何異以我故戰殺人父子而君之予不忍為乃以私屬去邠渡漆沮踰梁山止於歧下邠人舉國老弱盡歸歧下及他旁國聞古公仁亦多歸之於是古公貶戎狄之俗營築城郭室屋而邑別居之民皆歌頌其德古公有長子曰太伯次曰虞仲太姜生少子季歷季歷娶大任皆賢婦人生昌有聖瑞古公曰我世當有興者其在昌乎長子太伯虞仲知父欲立季歷古公卒季歷立是為王季王季修古公之道篤於行義諸侯順之王季卒子昌立是為西伯西伯曰文王遵后稷公劉之業則古公王季之法篤仁敬老慈少禮下賢者日中不暇食以待士伯夷叔齊太顛閎夭散宜生鬻子辛甲之徒皆歸之崇侯虎譖於紂曰西伯積德諸侯嚮之將不利於帝紂囚西伯於羑里閎夭之徒乃求有莘氏美女驪戎文馬因殷嬖臣費仲獻之紂乃赦之紂喜賜之弓矢斧銊使得征伐謂西伯曰愬汝者崇侯虎也西伯乃獻洛西之地以請除炮烙之刑西伯遂為諸侯決平虞芮人有訟不能決詣周入其界見耕者皆讓畔未見西伯而慚相謂曰吾所爭者周所恥也遂還明年伐犬夷又明年伐密須又明年伐崇侯虎而徙都於酆諸侯多歸之都酆明年而薨太子發立尚書帝命驗曰季秋之月甲子赤雀銜丹書入酆止昌戶拜稽首稽首頭至地也至于磻谿之水呂尚釣涯呂氏尚名王下趣拜急見也曰公望七年日公乎我相望七年言久也乃今見光景于斯尊之辭斯此也荅曰望釣得玉璜半璧壁曰璜釣得魚中有璜刻曰姬受命呂佐旌受天命為天子呂佐旌理之也遂置車左王躬執驅下賢也車尊曰左王身執轡而驅焉號曰師尚父周書曰文王昌曰吾聞之無變古無易常無陰謀無擅制無更創為此則不祥太公曰夫天下非常一人之天下也天下之國非常一人之國也莫常有之唯有道者取之古之王者未使民民化未賞民民勸不知怒不知喜愉愉然其如赤子此古善為政也又曰文王在鎬召太子發曰嗚呼我身老矣吾語汝我所保與我所守傳之子孫吾厚德而廣惠忠信而志愛吾不為驕侈不為太靡不淫於美吾栝柱而茅茨吾為民愛費也春夏育山林不昇以成草木之長而慎天時水澤不內舟楫以成魚鱉之長不麛不卵以成鳥獸之長畋獵唯時不殺童羊不夭胎童牛不服童馬不馳不騖澤不行害士不失其宜萬物不失其性天下不失其時又曰文王獨坐屏去左右深念遠慮召太公望曰帝王猛暴無文強梁好武侵凌諸侯苦勞天下百姓之怨心生矣其災予奚行而得免於無道乎太公曰因其所為且興其化上知天道中知人事下知地理乃可以有國焉, WYG: 用}
