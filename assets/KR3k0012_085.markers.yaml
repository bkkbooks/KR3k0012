  - {type: variant, offset: 4732, length: 0, content: '', WYG: 共王能庇昭穆之闕故春秋稱之周自共王至夷王四世年紀不明是以厯依魯為正王在位二十年崩子囏代立懿王史記曰懿王之時王室遂衰詩人作刺懿王在位二十五年崩共王弟辟方立為孝王帝王世紀曰懿王二年徙都犬丘孝王史記曰孝王在位十五年崩諸侯復立懿王太子燮是為夷王夷王禮曰禮天子不下堂而見諸侯下堂而見諸侯天子之失禮也由夷王已下史記曰夷王崩子厲王胡立紀年曰夷王二年蜀人吕人來獻瓊賔于河用介珪三年王致諸侯烹齊哀公于鼎帝王世紀曰夷王即位諸侯來朝王降與抗禮諸侯徳之三年王有惡疾愆于厥身諸侯莫不並走羣望以祈王身十六年王崩厲王史記曰厲王即位三十年好利近榮夷公大夫芮良諌王不聽卒以榮為卿士用事王行暴虐侈傲國人謗王召公諫曰民不堪命王怒得衛巫使監謗以告則殺之諸侯不朝三十四年王益嚴國人莫敢言道路以目三年相與叛襲厲王出奔于彘太子靜匿召公之家國人聞乃圍之召公以其子代太子竟得脱召公}
