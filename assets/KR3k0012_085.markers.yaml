  - {type: variant, offset: 1310, length: 205, content: 梓樹之于闕間梓化為松柏柞棫覺而驚以告文王文王不敢占召太子發命祝以幣告于宗廟群神然後占之于明堂及發並拜吉夢遂作程寤始文王繼父為西伯都於雍州之地及受命復兼梁荊二州化被于江漢之域於是諸侯歸附之者六州而文王不失臣節先是文王夢日月之光著身又鸑鷟鳴於岐作武象之樂神農氏始作五絃之琴以具宮商角徵羽之音歷九代至文王復增其二絃曰少宮少商文王嗣位五十年即周書所謂文王受命享國五十年是也雒書靈准聽曰蒼帝姬昌日角鳥鼻身長八尺二寸詩曰文, WYG: 郊}
