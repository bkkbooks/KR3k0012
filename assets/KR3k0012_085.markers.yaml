  - {type: variant, offset: 5491, length: 0, content: '', SBCK: 年以德衰南征及濟于漢舡人惡之乃膠􅂳進王王御船至中流膠液解王及􅀕公俱没水而崩其右辛游靡長臂且多力拯得王周人諱之王室於是乎大微王娶於房曰房后生太子滿代立是謂穆王漢上記曰咋額至横桑三十里桑字本作䘮辛㳺靡取昭王䘮處吕氏春秋曰周昭王親征荆髙誘注曰􅁗莊王名楚故曰荆還及渉漢梁敗王杜於漢中杜􅀹粉切䚯墜也辛餘靡振王北濟穆王歸藏曰昔穆王天子筮出於西征不􅁻曰龍降於天而道里脩逺飛而中天蒼蒼其羽傳曰穆王有塗山之㑹周穆王㑹諸侯於塗山又曰昔穆王欲肆其心周}
