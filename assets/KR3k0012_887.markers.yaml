  - {type: variant, offset: 32, length: 0, content: '', krp: 譏望君之容似類賢者是以停留依慿左右文合曰恱子之心願交歡於今夕女曰聞之諸姑婦人以貞專爲德㓗白爲稱文合與相反覆終無動志天明別去文合死巳再宿停當歛視其靣有色摸心温半日間蘇文合將驗其事遂至易陽問其令則女父也從之因問令某月某日君女寕卒亡而生耶具說女姿顔服色言語相反覆本末令入問女與文合同大驚乃以女配文合又曰臨海松陽人栁榮從張悌拒晉軍病死舩中二日時軍巳上岸無埋之者忽然大呼言人縛軍帥聲激揚遂活人問之言上天北斗門下卒見人縛張軍帥門下人怒榮叱逐使去榮懼怖口餘聲發揚其日悌戰死續捜神記曰武都太守李仲文在郡喪女年十八權假葬郡城北後有張丗之代爲郡丗之男子長年二十侍從在郡中夢一女年可十七八顔色不常自言前府君女不幸早亡㑹今當更生心相愛樂故來相就如此五六夕忽然晝見解衣服薫香殊絶遂爲夫妻寢息衣皆有汚如處女焉後仲文婦遣婢視女墓因過丗之婦相聞入室中見此女一隻履在子長牀下取之啼泣呼言發冢持履歸以示仲文仲文驚愕遣問丗之君兒何由得亡女履耶丗之呼兒具陳本末李張並謂可恠發棺視之女體生肉顔姿如故右脚有履左脚無也自後遂死肉爛不復得生後夕女來曰夫婦情至謂偕老而無狀忘履以致覺露不復得生萬恨之心當復何言泣涕而別又曰東平馮孝將爲廣陵太守兒名馬子年二十餘獨卧殿中夜夢見女子年十八九言我是前太守徐玄方女北海人不幸早亡來至今四年爲鬼所枉殺案録當年八十餘聽我更生要當有所依慿乃得生活又應爲君妻能從所陳免活不馬子荅曰可遂與馬子剋期當出至期日牀前地髣髴如人正與地平令人埽去愈分明始悟是所夢見者遂屏除左右人便漸覺額出次復面出一炊頃形體盡出馬子便令前坐對榻上陳說語言竒妙非常遂與馬子宿息毎戒云我尚虚君當自節問何可得出荅曰出當得本生日生日尚未至遂徃殿中言語聲音人皆聞女計生日至女具教馬子出巳養之法語畢拜去馬子從其言至日以丹雄雞一隻黍飯一盤清酒一升酹其喪前去殿十餘歩祭訖掘出開視女身完全如故徐徐抱出着氈帳中唯心下微暖口有氣令婢四人守養之常以青羊乳汁瀝其兩眼開口能咽粥漸漸能語二百日中杖起一朞之後顔色肌膚氣力悉復乃遣報徐氏上下盡來選吉日下禮娉爲三日遂爲夫婦生二男一女長子字元度永嘉𥘉爲祕書郎小男敬度太傅掾女適濟南劉子彦徵士延丗之孫也又曰襄陽李除病死中時其婦守尸至夜三更中崛然起坐脫婦臂上金釧甚遽急婦因助脫得手執之還卧伺察之至曉心下更暖遂漸漸得蘇旣活云吏將某去比伴甚多見有行貨得免歸者即許吏金訓吏令還取故歸取以與吏吏得釧便放令還幽明録曰琅邪人姓王名志居錢塘妻朱氏以太元九年病亡有二孤兒王復以其年四月暴死下三日而心猶暖經七日方蘇說𥘉死時有二十餘人皆烏衣見録録去到朱門白壁狀如宮殿吏朱衣素帶玄冠介幘或所𬒳着悉珠玉相連結非丗中儀服復前見一人長大所着衣狀如雲氣王向叩頭自說歸巳亡餘孤兒尚小無奈何便流涕此人爲之動容云汝命自應來以汝孤兒特與三年之期王又曰三年不足活兒左右有一人語云}
