  - {type: variant, offset: 34, length: 0, content: '', WYG: 年世中是三十年因便送出又三十年王果卒愽物志曰漢末大亂有發前漢時宫人塚者宫人猶活既出平復如舊魏郭后憐念録著宫中常置左右問漢時宫中事説之了了皆有次序及郭后崩哭泣過遂死又曰魏大司馬曹休所統中郎將謝璋部曲義兵奚儂恩女年四嵗病死故埋葬五日復生太和三年七}
