  - {type: variant, offset: 3, length: 0, content: '', krp: 三重生變化上重生左傳宣上曰晉人獲秦諜殺諸絳市六日而蘇續漢書曰献帝𥘉平中長沙人姓桓死月餘其母聞棺中有聲發之遂生至隂爲陽下人爲上其後曹公由匹庶起又曰武安四年武陵女子李娥年六十餘病物故瘞於城外數里巳四十日行人聞其塚中有人聲便語其家家徃視聞娥聲出之遂活呉志曰孫休永安四年吴民陳焦死埋之六日更生穿土中出前趙録曰麟嘉元年大將軍東平王豹卒一指猶暖遂不殯殮至甲戍乃蘇言見淵於不周山經五日遂復從至崑崙山三日而復返唐書曰貞元中翰林待詔戴少平死十六日復生建康實録曰晉方士戴洋字國流吴興長城人也年十}
