  - {type: variant, offset: 3228, length: 128, content: 食人以其名呼之則逃去又曰故溷之精名曰卑狀如美女而持鏡呼之使人知愧王子年拾遺記曰劉向校書天祿專精不倦假寐彌時有人植青藜之杖時夜已暗乃吹其杖端炯然火出因以照向則戶內如燈燭也向與言三代已前帝王興亡之事如目見焉及說陰陽運數起滅之兆向因受五行洪範之文向問其姓名對曰我, WYG: 化為碧}
