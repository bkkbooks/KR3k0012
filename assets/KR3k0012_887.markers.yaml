  body:
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 三重生變化上重生左傳宣上曰􅀳人獲􅁗諜殺諸絳市六日而蘇續漢書曰献帝􅀄平中長沙人姓桓死月餘其母聞棺中有聲發之遂生至隂爲陽下人爲上其後曹公由匹庶起又曰武安四年武陵女子李娥年六十餘病物故􅄟於城外數里巳四十日行人聞其􅊘中有人聲便語其家家徃視聞娥聲出之遂活呉志曰孫休永安四年吴民陳焦死埋之六日更生穿土中出前趙録曰麟嘉元年大將軍東平王豹卒一指猶暖遂不殯殮至甲戍乃􅂫言見淵於不周山經五日遂復從至崑崙山三日而復返唐書曰貞元中翰林待詔戴少平死十六日復生建康實録曰晉方士戴洋字國流吴興長城人也年十}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_887-1b}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 三重生變化上重生左傳宣上曰晉人獲秦諜殺諸絳市六日而蘇續漢書曰獻帝初平中長沙人姓桓死月餘其母聞棺中有聲發之遂生至隂為陽下人為上其後曹公由庶士起又曰建安四年武陵女子李娥年六十餘病卒瘞於城外數里已十四日行人聞其塜中有人聲遂語其家其家往視聞娥聲出之遂活吳書曰孫休永安四年吳民陳焦死埋之六日更生穿土中出前趙録曰麟嘉元年大將軍東平王約卒一指猶暖遂不殯殮至甲戌乃蘇言見淵於不周山經五日遂復從至崑崙山三日而復返唐書曰貞元中翰林待詔戴少平死十六日復生建康實録曰晋方士戴洋字國流呉興長城人也年十}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_WYG_887-1b, image: WYG0900/WYG0900-0724d.png}
