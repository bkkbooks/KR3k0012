  - {type: variant, offset: 450, length: 333, content: 服錦繡死於衣被何用魂衣為史記曰高祖謂沛父兄曰遊子悲故鄉吾雖都關中萬歲之後吾魂魄猶樂思沛也晉中興書曰東海王越妃裴痛越棺柩被焚乃招魂葬越於丹徒中宗以為非禮乃下詔曰夫冢以藏形廟以安神今世招魂葬者是埋神也其禁之淮南子曰天氣為魂地氣為魄又曰魄問於魂曰道何以為體曰以無有為體魄曰無有無形也魄曰無有何得而問也魂曰吾直有所遇之耳視之無形聽之無聲謂之幽冥幽冥者所以喻道而非道也白虎通曰魂魄者何謂也魂猶伝伝行不休也少陽之氣故動不息人為外魄者猶迫然著人也此少陰之氣象金石著人不移也魂者芸也情以除穢魄者迫也性以治內精神者何謂也精者靜也太陰施化之氣也象水之化須待任坐也神者恍惚大陰之氣出入無間抱朴子曰師言欲求長生當勤服大藥欲得通神當金水分形形分則自見其身三魂七魄而天靈地衹皆下接山川之神皆可役, SBCK: ''}
