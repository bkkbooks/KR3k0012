  - {type: variant, offset: 32, length: 0, content: '', WYG: 至感于天地故死而更生此非常事不得以常理斷之請還開冢者又曰漢平帝元始元年二月朔方廣牧女子趙春病死既棺歛六日出棺外自言見死夫及父曰年二十七不當死太守譚以聞説曰至陰以為陽下人為上其後王莽簒位又曰晉咸寧中瑯琊顔畿得病就醫張瑳自治死於瑳家家人迎䘮旐每遶樹木不可解引喪者忽顛仆稱幾言曰我壽命未應死但服藥太多傷我五臓耳今當復活慎無葬我也父拊而祝之曰若爾有命復當更生豈非骨肉所願今但欲還家不葬爾也旐乃解還家乃開棺形骸如故微有人色而以手刮棺手爪盡傷於是漸有氣息以緜飲瀝口能咽遂與出之久久飲食稍多能開目視瞻屈伸手足然不與人相當不能言語飲食猶使人如此者十餘年家人相供䕶不復得操事其弟含乃絶棄人事躬侍養以知名州黨後稍更衰劣卒復還死又曰東平馮孝將為廣陵太守兒名馬子年二十餘卧殿中夜夣見女子年十八九言我是前太守徐元方女北海人不幸早亡亡來至今四年為鬼所枉殺案生録當八十餘聽我更生要當有所憑依乃得生活又應為君妻能從所委見救活不馬子答曰可爾與馬子尅期當出至期牀前頭髪如人正與地平令人掃去愈分明始悟是所夣見者遂屏除左右人便漸漸額出次頭面出又次肩項形體盡出馬子便令坐對榻上陳説語言竒妙非常遂與馬子宿息每戒尚虛君當自節問何時得出答曰出當得本生日生日尚未至遂往至廐中言語聲音人皆聞女計生日至乃具教馬子出己養之法語畢辭去馬子從其言至日以丹雄雞一隻黍飯一盤清酒一升醊其䘮前去廐十餘歩祭訖掘棺出開視女身完全如故徐徐抱出着帳中唯心下㣲暖有口氣令婢四人守養之常以青羊乳汁瀝其兩眼開口能咽粥既而漸能語二百日中持杖起及一年之後顔色肌膚氣力悉復乃遣報徐氏上下盡來選吉日下禮聘為夫婦生二男一女長子字元度永嘉初為秘書郎小男敬度太傅掾女適濟南劉子彦徴士延世之孫也幽明録曰瑯琊人姓王忘名居錢塘妻朱氏以太康九年病亡有二孤兒王復以其年四月暴死下三日而心猶暖經七日方蘇説初死時有二十餘人皆烏衣見録比去到朱門白壁狀如宫殿吏朱衣紫帶去冠介幘或所被著悉珠玉相連結非世中儀服復前見一人長大所著衣狀如雲氣王向叩頭自説婦已亡餘孤兒尚小正奈何便流涕此人為之動容云汝命自應來以汝孤兒遲汝三年之期王又曰三年不足活兒左右有一人語云}
