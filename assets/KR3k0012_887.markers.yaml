  - {type: variant, offset: 2625, length: 600, content: 狀如美女衣青衣見之以桃戈刺之而呼其名則得金之精名倉狀如豚居人家使人不宜妻以其名呼之即去水之精名罔象其狀如小兒赤色大耳長爪以索縛之則可得烹之吉又曰故門之精名野狀如朱儒見人則拜以名呼之宜飲食又曰故宅之精名曰揮文又曰山冕其狀如虵一身兩頭五采文以其名呼之可使取金銀又曰故廢丘墓之精名曰元狀如老役夫衣青衣而杵好舂以其名呼之宜禾穀又曰故道徑之精名忌狀如野人以其名呼之使人不迷又曰道之精名作器狀如丈夫善眩人以其名呼之則去又曰故池之精名意狀如豚以其名呼之即去又曰故井之精名觀狀如美女好吹簫以其名呼之即去又曰絕水有金者精名曰侯伯狀如人長五尺綵衣以其名呼之即去又曰故臺屋之精名兩貴狀如赤狗以其名呼之使人目明又曰左右有石水生其間水出流千歲不絕其精名曰喜狀如小兒黑色以名呼之可使取飲食又曰三軍所載精名曰賓滿狀如人頭無身赤目見人則轉以其名呼之即去又曰故水石者精名慶忌狀如人乘車蓋日馳千里以其名呼之可使入水取魚又曰丘墓之精名狼鬼善與人鬥不休為桃弓棘矢羽以鵄羽以射之狼鬼為飄風脫覆投之不能化又曰故市精名曰毛門其狀如囷無手足以名呼之即去又曰室之精名徯龍如小兒長一尺四寸衣黑衣赤幘大冠帶劍持戟以其名呼之即去又曰山之精名夔狀如鼓一足而行以其名呼之可使取虎豹又曰故牧弊池之精名曰髡頓狀如牛無頭見人則逐人以其名呼之則去又曰夜見堂下有小兒被髮走勿惡之名曰溝以其名呼之即無咎又曰百歲狼化為女人名曰知女狀如美女坐道旁告丈夫曰我無父母兄弟丈夫取為妻, WYG: 血}
