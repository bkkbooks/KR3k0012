  - {type: variant, offset: 25, length: 2, content: 洧說, SBCK: 服以水灌之捧其頭揺消之食頃即開目動手顔色如故漸復半日能起坐四日後能語遂復常搜神記曰晉武帝丗河間郡有男女相恱許相配適旣而男從軍積年父母以女適人無幾而憂死男還悲痛乃至冢所欲􅂘之叙哀而巳不勝其情遂發冢開棺即時􅂫活因􅀒還家將養數日平復其夫往求之其人還曰卿婦巳死天下豈聞死人復活耶此天賜我非卿婦也於是相訟郡縣不能决以讞廷尉奏以精誠之至感於天地故死而更生常理之外非禮之所處刑之所裁斷以還開冢者又曰漢平帝元始元年二月朔方廣收女子趙春病死旣棺歛六日出棺外自言見死人及父曰年二十七不當死太守譚以聞􅀃曰至隂爲陽下人爲上其後王莽􅆲位又曰􅀳咸寕中琅邪顔畿得病就醫張嗟自治死於嗟家家人迎喪旐毎繞樹木不可解送喪者或爲之傷乃言曰我壽命未應死但服藥太多傷我五臓耳今當復活愼無葬我也父拊而祝之曰􅀂爾有命復當更生豈非骨􅁏所願今但欲還家不葬爾也旐乃解還家乃開棺形骸如故微有人色而手爪所刮摩棺材皆傷於是漸漸氣息以緜飲􅄋口能咽遂乃出之日乆飲食稍多能開目視瞻屈伸手足然不與人相當不能言語飲食猶常人如此者十餘年家疲相供護不復得操事其弟弘都絶棄人事躬侍養以知名後氣力稍更衰劣卒後還死又曰建安中南陽賈偶字文合得病卒亡死時有吏將詣太山同名男女十人司命閱呈謂行吏曰當召某郡文合來何以召此人促遣令去時日暮治下有禁不得舎遂至郭門外大樹下􅀫有好女獨行無伴文合問之曰子似衣冠家何爲歩行姓字爲誰女曰我三河}
