  - {type: variant, offset: 221, length: 3, content: 產適晉, krp: 化爲丈夫賢人去位君獨居丈夫化爲女子隂氣淖小人聚漢書曰哀帝建平中豫章男子化爲女子嫁爲人婦生一子長安陳鳯言此陽變爲隂將亡繼嗣自相生之象一日嫁爲人婦生一子者將復一丗乃絶續漢書曰靈帝時江夏黄氏之母浴而化爲黿入于深淵其後時時出見𥘉簮一銀釵及見猶在其首又曰建安二十年越嶲有男子化爲女子時周群言哀帝時亦有此將有易代之事至二十五年献帝封于山陽國語曰}
