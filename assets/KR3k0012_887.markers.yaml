  - {type: variant, offset: 34, length: 0, content: '', SBCK: 年是丗中三十年因便送出又三十年王果卒又曰桓玄時牛大疫有一人食死牛􅁏因得病亡玄死時見人執録將至天上有一貴人問云此人何罪對曰此人坐食疫牛􅁏貴人云湏牛以轉輸􅁏以充百姓食何故復殺之催令還旣更生具􅀃其事於是食牛􅁏者无復有患又曰于慶無病卒吴猛語慶子曰于侯筭未窮方爲請命未可殯殮尸卧淨舎唯心下尚暖七日時盛暑慶形體向壞猛敎令屬纊候氣續爲作水令以與洗并飲漱如此便退日中許慶􅂫但開眼張口不得發聲時合門欣喜以向水洗唅吐腐血數􅂛能言語三日平復如常􅀃􅀄見十數人來執縛挃梏到獄同軰十餘人以次語對未至俄而見吴君北面陳釋聽斷之王勑脫械歸所經官府莫不迎接請謁吴君皆與抗禮不知悉何神耳􅀶物志曰漢末大亂有發前漢時宫人冢者宫人猶活旣出平復如舊魏郭后愛念之録著宫中常置左右問漢時宫中事􅀃之了了皆有次緒及郭后崩􅂘泣過遂死又曰魏大司馬曹休所統中郎將謝漳部曲義兵奚儂息女年四歳病死故埋藏五日復生太和三年七}
