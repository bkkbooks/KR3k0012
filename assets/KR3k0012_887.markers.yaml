  - {type: variant, offset: 1602, length: 1623, content: 出客驚怖叔高曰樹老汁赤耳斫之血大流出空處有一白頭翁出走高以刀斫殺之所謂木石怪夔蝄蜽乎搜神記曰孔子厄於陳絃歌於館中夜有一人長九尺餘皂衣高冠大咤聲動左右子路引出與戰于庭仆於地乃是大鯷魚也長九尺餘孔子歎曰此物也何為來哉吾聞物老則群精依之因衰而至此其來也豈以吾遇厄絕糧從者病乎夫六畜之物及龜蛇魚鼈草木久者神皆能為妖怪故謂之五酉五酉五行之方皆有其物酉者老也故物老皆為怪矣殺之則已夫何患焉又曰吳先主時陸敬叔為建安郡使人伐大樟樹下數斧有血出樹斷有物人面狗身從樹中出敬叔曰此名彭侯乃烹食之味如狗又曰諸葛恪為丹陽太守出獵兩山之間有物如小兒伸手引人恪令曳去故地死參佐問之恪曰此事在白澤圖曰兩山之間有精如小兒名曰傒囊諸人未之見也異苑曰天門張某與村人共獵見大樹下有蓬菴似寢息處而無煙火須臾一人形長七尺毛而不衣負數頭猿與語不酬將歸閉之十餘日後送著先處孫皓時臨海得七精如人而有毛此將山精幽明錄曰漢武帝與群臣宴未央殿方噉黍臛忽聞語云老臣尋覔不見梁上有一公長八九寸柱杖僂步帝問之公下稽首不言目仰視屋俯指帝腳忽然不見問東方朔朔對曰其名為藻兼水木之精也夏巢林冬潛河陛下興造宮室斬伐其居故來訴耳仰視屋者殿名未央也俯視腳者腳足也願止足於此也帝為此暫止少時幸河者聞水底有絃歌之聲肴膳芬芳前梁上公及年少數人絳衣素帶皆長八九寸凌波而出或有挾樂器者帝命坐於食案上老公曰老臣前昧死歸訴幸蒙陛下即息斧斤全其居宅不勝欣躍故私相賀耳便治絃而歌聲小大無異於人而清婉繞梁帝欣悅勸酒乃獻帝一紫螺殼中有物狀如牛脂帝又曰可思以珍異見貽老公顧命取洞穴之寶一人下波淵底倏忽還得一大珠數寸明燿絕世俄而公等忽然而去東方朔曰螺殼中是蛟髓以傅面令人好顏色又女子在草中用之產易雷次宗豫章記曰永嘉末有大蛇長十餘丈斷道經過者蛇輒吸取吞噬已百數道士吳猛與弟子殺蛇蛇死而蜀賊杜弢滅玄中記曰千歲樹精為青羊萬歲樹精為青牛多出遊人間事具牛部又曰山精如人一足長三四尺食山蟹夜出晝藏人晝日不見夜聞其聲千歲蟾蜍食之又曰玉精為白虎金精為車馬銅精為僮奴鈆精為老婦愽物志曰山有夔其形如鼓一足澤有委虵狀如轂長轅見之者霸昔夏禹觀河見長人魚身出曰吾河精豈河伯也白澤圖曰廁之精名曰依倚青衣持白杖知其名呼之者除不知其名則死築室三年不居其中有小兒長三尺而無髮見人則掩鼻見之有福火之精名必方狀如鳥一足以其名呼之即去木之精名彭侯狀如黑狗無尾可烹之食之千載木其中有蟲名曰賈詘狀如豚食之如狗肉味又曰上有山林下有川泉地理之間生精名曰必方狀如鳥長尾此陰陽變化所生玉之精名岱委其狀如美女衣青衣見之以桃戈刺之而呼其名則得金之精名倉狀如豚居人家使人不宜妻以其名呼之即去水之精名罔象其狀如小兒赤色大耳長爪以索縛之則可得烹之吉又曰故門之精名野狀如朱儒見人則拜以名呼之宜飲食又曰故宅之精名曰揮文又曰山冕其狀如虵一身兩頭五采文以其名呼之可使取金銀又曰故廢丘墓之精名曰元狀如老役夫衣青衣而杵好舂以其名呼之宜禾穀又曰故道徑之精名忌狀如野人以其名呼之使人不迷又曰道之精名作器狀如丈夫善眩人以其名呼之則去又曰故池之精名意狀如豚以其名呼之即去又曰故井之精名觀狀如美女好吹簫以其名呼之即去又曰絕水有金者精名曰侯伯狀如人長五尺綵衣以其名呼之即去又曰故臺屋之精名兩貴狀如赤狗以其名呼之使人目明又曰左右有石水生其間水出流千歲不絕其精名曰喜狀如小兒黑色以名呼之可使取飲食又曰三軍所載精名曰賓滿狀如人頭無身赤目見人則轉以其名呼之即去又曰故水石者精名慶忌狀如人乘車蓋日馳千里以其名呼之可使入水取魚又曰丘墓之精名狼鬼善與人鬥不休為桃弓棘矢羽以鵄羽以射之狼鬼為飄風脫覆投之不能化又曰故市精名曰毛門其狀如囷無手足以名呼之即去又曰室之精名徯龍如小兒長一尺四寸衣黑衣赤幘大冠帶劍持戟以其名呼之即去又曰山之精名夔狀如鼓一足而行以其名呼之可使取虎豹又曰故牧弊池之精名曰髡頓狀如牛無頭見人則逐人以其名呼之則去又曰夜見堂下有小兒被髮走勿惡之名曰溝以其名呼之即無咎又曰百歲狼化為女人名曰知女狀如美女坐道旁告丈夫曰我無父母兄弟丈夫取為妻, SBCK: ''}
