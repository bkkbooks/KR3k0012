  - {type: variant, offset: 227, length: 1, content: 問, SBCK: 歎曰雀入海化爲蛤雉入于淮化爲蜃黿鼉魚鼈莫不能化唯人不能悲夫鴻範五行傳曰魏襄王十三年張儀詐得罪於􅁗而去相魏將爲􅁗而欺奪魏君是歳魏有女子化爲丈夫者天􅀂語魏曰勿用張儀隂變爲陽臣將爲君是時魏王亦􅁴之不用張儀儀免去歸秦魏無害紀年曰周宣王時馬化爲狐山海經曰姑媱之山音遥帝女死}
  - {type: variant, offset: 227, length: 1, content: 問, WYG: 歎曰雀入海化為蛤雉入于淮化為蜃黿鼉魚鼈莫不能化唯人不能悲夫洪範五行傳曰魏㐮王十三年張儀詐得罪於秦而去相魏將為秦而欺奪魏君是嵗魏有女子化為丈夫者天若語魏曰勿用張儀陰變為陽臣將為君是時魏王亦覺之不用張儀儀免去歸秦魏無害紀年曰周宣王時馬化為狐山海經曰姑媱之山帝女死}
