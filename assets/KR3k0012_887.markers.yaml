  - {type: variant, offset: 25, length: 2, content: 洧說, WYG: 服以水灌之捧其頭揺而消之食頃即開目動手顔色如故既服半日能起坐四日後能語遂復常捜神記曰晉武帝世河間郡有男女相悦許相配適既而男從軍積年父母以女適}
  - {type: page-break, offset: 25, content: '', id: KR3k0012_WYG_887-2b, image: WYG0900/WYG0900-0725b.png}
  - {type: variant, offset: 25, length: 1, content: 洧, krp: 服以水灌之捧其頭揺消之食頃即開目動手顔色如故漸復半日能起坐四日後能語遂復常搜神記曰晉武帝丗河間郡有男女相恱許相配適旣而男從軍積年父母以女適人無幾而憂死男還悲痛乃至冢所欲哭之叙哀而巳不勝其情遂發冢開棺即時蘇活因負還家將養數日平復其夫往求之其人還曰卿婦巳死天下豈聞死人復活耶此天賜我非卿婦也於是相訟郡縣不能决以讞廷尉奏以精誠之至感於天地故死而更生常理之外非禮之所處刑之所裁斷以還開冢者又曰漢平帝元始元年二月朔方廣收女子趙春病死旣棺歛六日出棺外自言見死人及父曰年二十七不當死太守譚以聞}
