  - {type: variant, offset: 2198, length: 301, content: 無異於人而清婉繞梁帝欣悅勸酒乃獻帝一紫螺殼中有物狀如牛脂帝又曰可思以珍異見貽老公顧命取洞穴之寶一人下波淵底倏忽還得一大珠數寸明燿絕世俄而公等忽然而去東方朔曰螺殼中是蛟髓以傅面令人好顏色又女子在草中用之產易雷次宗豫章記曰永嘉末有大蛇長十餘丈斷道經過者蛇輒吸取吞噬已百數道士吳猛與弟子殺蛇蛇死而蜀賊杜弢滅玄中記曰千歲樹精為青羊萬歲樹精為青牛多出遊人間事具牛部又曰山精如人一足長三四尺食山蟹夜出晝藏人晝日不見夜聞其聲千歲蟾蜍食之又曰玉精為白虎金精為車馬銅精為僮奴鈆精為老婦愽物志曰山有夔其形如鼓一足澤有委虵狀如轂長轅見之者霸昔夏禹觀河見長人魚身出曰吾河精豈河伯也白澤圖曰廁之精名曰依倚青衣持白杖知其名呼之者除, WYG: ''}
