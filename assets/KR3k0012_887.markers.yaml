  - {type: variant, offset: 1565, length: 485, content: 鼈此涸川水之精也列異傳曰桂陽太守張叔高家居鄢陵里中有樹大十圍遣客斫之樹大血出客驚怖叔高曰樹老汁赤耳斫之血大流出空處有一白頭翁出走高以刀斫殺之所謂木石怪夔蝄蜽乎搜神記曰孔子厄於陳絃歌於館中夜有一人長九尺餘皂衣高冠大咤聲動左右子路引出與戰于庭仆於地乃是大鯷魚也長九尺餘孔子歎曰此物也何為來哉吾聞物老則群精依之因衰而至此其來也豈以吾遇厄絕糧從者病乎夫六畜之物及龜蛇魚鼈草木久者神皆能為妖怪故謂之五酉五酉五行之方皆有其物酉者老也故物老皆為怪矣殺之則已夫何患焉又曰吳先主時陸敬叔為建安郡使人伐大樟樹下數斧有血出樹斷有物人面狗身從樹中出敬叔曰此名彭侯乃烹食之味如狗又曰諸葛恪為丹陽太守出獵兩山之間有物如小兒伸手引人恪令曳去故地死參佐問之恪曰此事在白澤圖曰兩山之間有精如小兒名曰傒囊諸人未之見也異苑曰天門張某與村人共獵見大樹下有蓬菴似寢息處而無煙火須臾一人形長七尺毛而不衣負數頭猿與語不酬將歸閉之十餘日後送著先處孫皓時臨海得七精如人而有毛此將山精幽明錄曰漢武帝與群臣宴未央殿方噉黍臛忽聞語云老臣尋覔不見梁上有一公長八九寸柱杖僂步帝問之公下稽首不言目仰視屋俯指帝腳忽然不見問東方朔朔對曰, WYG: ''}
