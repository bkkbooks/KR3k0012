  - {type: variant, offset: 3357, length: 219, content: 一之精主天地圖讖聞子好學下而觀焉抱朴子曰萬物之老者其精悉能假託形以惑人唯不能於鏡中易形耳是以古人入山道士皆以明鏡懸於背後則老魅不敢近人又曰山之精形如小兒而獨足足向後喜來犯人人入山谷夜聞其音聲笑語其名曰蛟知而呼之即不敢犯人一名曰超空亦可兼呼之又曰有山精或如鼓色赤一足其名曰揮又或如人長九尺衣裘帶笠名曰金累又或如龍而五色未有名曰飛龍見之皆以其名呼之不敢為害又曰山中大樹能語者非樹語也其精名曰雲陽以其名呼之即吉又曰山中夜見胡人者銅鐵精也見秦人者, WYG: 平御覧卷八}
