  - {type: variant, offset: 1087, length: 514, content: 樹樹亦能自聲聲如牛吼聞之者皆心震神駭伐其根心在玉釜中煮取汁更微火熟煎之如黑飴令可丸名驚精香或名之為震靈丸或名之為反生香或名之為鳥精香或名之為卻死香一種五名斯靈物也香氣聞數百里死尸在地聞仍活愽物志曰援神契云五岳之神聖四瀆之精仁太山天帝孫也主召人魂東方萬物始故主人生命之長短王子年拾遺錄曰融皋山上有飜魂稻言食者死更生楚辭曰招魂者宋玉之所作也王憐哀屈原忠而斥棄憂愁山澤魂魄放佚厥命將落故作招魂欲以復其精神延其年壽外陳四方之惡內崇楚國之美以諷諫懷王冀其覺悟而還之也又招魂曰帝告巫陽曰有人在下我欲輔之魂魄離散汝筮與之使筮其所宜而與招其魂使復其精神精易上繫曰男女構精萬物化生禮記祭義曰眾生必死死必歸土此之謂鬼骨肉斃于下陰為野土其氣發揚于上為昭明焄蒿悽愴此百物之精也神之著也唐書曰睿宗子申王撝之初生則天嘗以示僧萬迴曰此兒是西域大樹之精養之宜兄弟則天甚悅始令列於兄弟之次管子曰故涸澤數百歲谷之不徙水之不絕者生慶忌慶忌者其狀若人其長四寸衣黃衣冠黃冠戴黃蓋乘小馬好疾馳以其名呼之可使千里外一日反報此涸澤之精也涸川水之精者生于蟡于蟡者一頭而兩身其狀如虵其長八尺以其名呼之可以取魚鼈此涸川水之精也列異傳曰桂陽太守張叔高家居鄢陵里中有樹大十圍遣客斫之樹大, SBCK: ''}
