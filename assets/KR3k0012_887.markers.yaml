  - {type: variant, offset: 796, length: 669, content: 封之以太一泥卒死三日以還者折齒內一丸以水送之入喉活活者皆見使者持節召之又曰人無賢愚皆知己身之魂魄魂魄分去則人病盡去則死故分去術家有錄之之法盡去則禮典有招魂之義此之為物至近者也然與人俱生至於終身莫或自聞見之者豈可不聞見復言無乎又曰軫星逐鬼張星拘魂東井還魄也異苑曰新野庾寔妻滎陽毛氏女義熙中五月曝曬席忽見女在席下薦上以驚怛便走女真形在別床如故不旬日而夭也仲夏忌舉床第茲驗矣襄陽耆舊記曰羊公與鄒潤甫登峴山垂泣曰自有宇宙便有此山由來賢達勝士登此遠望如我與卿者多矣皆湮滅無聞不可得知念此使人悲傷我百年後魂魄猶當登此山十洲記曰聚窟洲在西海中申未洲上有大樹與楓木相似華葉香聞數百里名此為反魂樹叩其樹樹亦能自聲聲如牛吼聞之者皆心震神駭伐其根心在玉釜中煮取汁更微火熟煎之如黑飴令可丸名驚精香或名之為震靈丸或名之為反生香或名之為鳥精香或名之為卻死香一種五名斯靈物也香氣聞數百里死尸在地聞仍活愽物志曰援神契云五岳之神聖四瀆之精仁太山天帝孫也主召人魂東方萬物始故主人生命之長短王子年拾遺錄曰融皋山上有飜魂稻言食者死更生楚辭曰招魂者宋玉之所作也王憐哀屈原忠而斥棄憂愁山澤魂魄放佚厥命將落故作招魂欲以復其精神延其年壽外陳四方之惡內崇楚國之美以諷諫懷王冀其覺悟而還之也又招魂曰帝告巫陽曰有人在下我欲輔之魂魄離散汝筮與之使筮其所宜而與招其魂使復其精神精易上繫曰男女構精萬物化生禮記祭義曰眾生必死死必歸土此之謂鬼骨肉斃于下陰為野土其氣發揚于上為昭明焄蒿悽愴此百物之精也神之著也唐書曰睿宗子申王撝之初生則天嘗以示僧萬迴曰此兒是西域大樹之精養之宜兄弟則天甚悅始令列於兄弟之次管, WYG: 焉莊}
