  - {type: variant, offset: 221, length: 3, content: 產適晉, SBCK: 化爲丈夫賢人去位君獨居丈夫化爲女子隂氣淖小人聚漢書曰哀帝建平中豫章男子化爲女子嫁爲人婦生一子長安陳鳯言此陽變爲隂將亡繼嗣自相生之象一日嫁爲人婦生一子者將復一丗乃絶續漢書曰靈帝時江夏黄氏之母浴而化爲黿入于深淵其後時時出見􅀄簮一銀􅁫及見猶在其首又曰建安二十年越嶲有男子化爲女子時周群言哀帝時亦有此將有易代之事至二十五年献帝封于山陽國語曰}
  - {type: page-break, offset: 221, content: '', id: KR3k0012_SBCK_887-6b}
  - {type: variant, offset: 221, length: 3, content: 產適晉, WYG: 化為丈夫賢人去位君獨居丈夫化為女子陰氣淖小人聚漢書曰哀帝建平中豫章男子化為女子嫁人為婦生一子長安陳鳯言此陽變為陰將亡繼嗣自相生之象一曰嫁為人婦生一子將復一世乃絶續漢書曰靈帝時江夏黃氏之母浴而化為黿入于深淵其後時出見初簮一銀釵及見猶在其首又曰建安二十年越雋有男子化為女子時周祥言哀帝時亦有此將有易代之事至二十五年獻帝封于山陽國語曰}
