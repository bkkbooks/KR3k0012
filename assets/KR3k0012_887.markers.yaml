  - {type: variant, offset: 3577, length: 285, content: 歲木精也山水之間見吏者曰四激以其名呼之則吉又曰山中寅日有稱虞吏者虎也稱當路君者狼也稱令長者老俚也卯日稱丈夫者兔也稱東王父者糜也稱西王母者鹿也辰日稱雨師者龍也稱河伯者魚也稱無膓公子者蟹也巳日稱寡人者社神也稱時君者龜也午日稱三公者馬也稱人者老樹也未日稱主人者羊也稱吏者麞也申日稱人君者猴也稱九卿者猨也酉日稱將軍者老雞也稱賊捕者雉也戍日稱人姓字者犬也稱咸陽公仲者狐也亥日稱臣君者豬也稱婦人者金玉也子日稱社者鼠也稱神人者伏翼也丑日稱書生者牛也知其物則不能為害又曰山川石木井竈洿池猶有精氣人身之中亦有魂魄況天地為物物之至大者於理當有精神有精神則宜賞善罰惡但其體大綱䟽不必機發而應耳, SBCK: 八十七}
