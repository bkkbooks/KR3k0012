  - {type: punctuation, offset: 62, content: 「, id: KR3k0012_CHANT_465-bkkpn24}
  - {type: variant, offset: 62, length: 1, content: 謝, SBCK: 衛子夫爲皇后弟青貴震天下天下歌之生男無喜生女無怒獨不見衛子夫霸天下漢書曰石顯與中僕射牢梁少府五鹿充宗結爲友黨諸附􅀝者得寵位民歌之曰牢耶石耶五鹿耶印何累累耶綬何􅀂􅀂耶言其兼官據勢也又曰太始二年趙中大夫白公白姓公爵也爲孺子之也復奏穿渠引涇水首起谷口尾入櫟陽注渭中延袤二百里漑田四千五百餘頃因名白渠民甚饒歌之曰田於何所池陽谷口鄭國在前白渠起後舉挿爲雲决渠爲􅀨涇水一石其泥數斗且糞且漑長我禾􅁰衣食京師億萬之口又曰馮立字聖通爲西河上郡與兄野王相代政行相似吏人嘉之乃歌曰大馮君小馮君兄弟繼踵相因循聦明聖智惠吏人政如魯衛德化鈞周公康叔猶二君又曰王氏五侯争爲奢侈大起第宅百姓歌曰五侯􅀄起曲陽最怒壞决髙都連境外杜土山漸臺象西白武白虎殿名後漢書曰皇甫嵩討平黄巾請兾州一年田租以瞻飢民百姓歌曰天下亂兮市爲墟母不保于妻失夫頼得皇甫復汝居又曰劉陶駼除順陽長以病免吏民思而歌之曰邑然不樂思我劉君何時復來}
