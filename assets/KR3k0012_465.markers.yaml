  - {type: variant, offset: 3351, length: 0, content: '', WYG: 以病免吏民思而歌之曰悒然不樂思我劉君何時復來安此下民又曰郭賀字喬卿為荆州刺}
  - {type: punctuation, offset: 3352, content: ，, id: KR3k0012_CHANT_465-bkkpn1016}
