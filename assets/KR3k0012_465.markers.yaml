  - {type: variant, offset: 3427, length: 4, content: 劇談范曄, WYG: 令公喜能令公怒常璩華陽國志曰吳資字元約為巴郡大守屢獲豐年人歌之曰習習晨風動㴻雨潤乎苗我后恤時務我人以優饒劉向新序曰季子以劒帶徐君墓樹徐人嘉而歌之曰延陵季子不忘舊故千金之劒以帶丘墓陳留耆舊𫝊曰爰珎除六令吏人訟息教誨其子弟歌曰我有田疇爰父殖置我有子弟爰父教誨襄陽耆舊𫝊曰山季倫毎臨習池未嘗不大醉而還曰我髙陽池也襄陵城中小兒歌之曰山公出何去往至髙陽池日夕倒載歸酩酊無所知時時能騎馬到著白接離舉鞭向葛强何如并州兒又曰襄陽太守胡烈有惠化百姓歌曰美哉明后雋哲惟嶷陶廣乾坤周孔是則文武播暢威振遐域謡爾雅曰徒歌曰謡漢書石顯失權數月丞相條奏顯舊惡及其黨牢梁陳順皆免官顯與妻子徙歸故郡憂懣不食道病死諸所交結以顯為官廢罷少府五鹿充宗左遷𤣥莵太守御史中丞伊嘉為鴈門都尉長安謡曰伊徙鴈鹿徙莵去牢與陳石無徒袁山松}
