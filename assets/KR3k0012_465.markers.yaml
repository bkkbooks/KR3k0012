  - {type: variant, offset: 3344, length: 0, content: '', WYG: 為法講若畫一曹參代}
  - {type: variant, offset: 3345, length: 3, content: 約採擇, WYG: 守而勿失載其清静人以寧壹又曰衛子夫為皇后弟青貴震天下天下歌之生男無喜生女無怒獨不見衛子夫霸天下漢書曰石顯與中僕射牢梁少府五鹿充宗結友黨諸附倚者多寵位民歌之曰牢耶石耶五鹿客耶印何纍纍綬若若耶言其兼官據勢也又曰太始二年趙中大夫白公白姓公爵時人相謂為公復奏穿渠引涇水首起谷口尾入櫟陽注渭中袤二百里溉田四千五百餘頃因名白渠民甚饒歌之曰田扵何所池陽谷口鄭國在前白渠起後舉鍤為雲决渠為雨涇水一石其泥數斗且糞且溉長我禾黍衣食京師億萬之口又曰馮立字聖通為西河上}
