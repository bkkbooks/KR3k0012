  - {type: variant, offset: 3426, length: 0, content: '', SBCK: 復遺其冠乎吕氏春秋曰魏襄王使呉起爲鄴令引漳水灌田民大得利相與歌曰鄴有呉聖令爲公决漳水灌鄴旁終古斥鹵生稻粱世􅀃曰郗超王珣並以雋才爲桓温大司馬所眷珣爲主簿超爲記室叅軍超多􅂡珣形狀短小時人爲之歌曰髯叅軍短主簿}
