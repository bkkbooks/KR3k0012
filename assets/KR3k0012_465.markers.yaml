  - {type: variant, offset: 280, length: 368, content: 幽冀之士鈍如椎持鈍椎棰君利錐皆當摧矣陶雅並稱有神錐不可得摧納曰假有神錐必有神椎陶雅無以對又曰武帝始登祚探策得一王者世數繼此多少帝既不怡群臣失色莫能有言者侍中裴揩正容儀進曰臣聞天得一以清地得一以寧侯王得一以為天下貞帝意悅群臣歎服又曰李密字令伯犍為武陽人蜀朝舊臣數使於吳應機當義吳人稱其才辯蜀平以太子洗馬召張華問曰安樂公何如密曰可次齊桓華問其事密曰齊得管仲而霸得豎刀而流亡安樂公得諸葛亮而抗魏後任黃皓而喪國成敗一也又曰釋道安俊辯有高才自北至荊州與習鑿齒初相見道安曰彌天釋道安鑿齒曰四海習鑿齒宋紀曰孝武常賜謝莊寶劍莊以與預州刺史魯爽後反叛孝武因宴集問劍所在荅曰昔以與魯爽別竊為陛下杜郵之賜上甚悅當時以為知言蕭子顯齊書曰張融字思光吳郡人也玄義無師法而神王過人白黑談論鮮能抗拒又曰周顒字彥倫汝南人音辭雅麗出言不窮商較朱紫發口成句每賓友會同顒虛席晤, WYG: 歌且謡家}
