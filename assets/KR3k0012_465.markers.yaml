  - {type: variant, offset: 3779, length: 7, content: 容貌短小言訥澀, SBCK: 遣迎彦䘮金具存民謡之曰信哉少林丗爲遇飛􅀍走馬與􅄦語陳留􅂄舊傳曰呉祐爲􅁪農令勸善懲姦貪濁出境甘露降年榖豊童謡曰君不我憂人何以休不行界署焉知人處啇氏丗傳曰啇亮字子華舉孝廉到陽城遇兩虎争一羊亮案劒直前斬羊虎乃各以其半去時人爲之謡曰石里之勇啇子華􅁀虎見之藏􅀲牙常璩華陽國志曰閻慮字孟度爲綿竹令以禮讓爲夲童謡曰閻君賦政明且昶蠲苛去碎以禮讓劉恭叔異苑曰晉時長安謡曰􅁗川中血没踠唯}
