  - {type: variant, offset: 3, length: 6, content: 一百五辯下晉, WYG: 謳說文曰謳齊歌也左傳曰宋華元為植廵功城者謳曰睅其目皤其腹棄甲而復于思于思棄甲復来又曰宋皇國父為太宰為平公築臺妨扵農收子罕請俟農功之畢公不許築者謳曰澤門之晳實興我役邑中之黔實慰我心漢}
