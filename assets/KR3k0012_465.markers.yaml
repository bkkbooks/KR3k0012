  - {type: variant, offset: 1243, length: 1877, content: 足也高其踐地也深鹿與而牛舍又曰公孫龍辯者之徒飾人之心易人之意能勝人之口不能服人之心辯者之囿也又曰古者王天下者智雖絡天地不自慮也辯雖彫萬物不自說也魯連子曰齊之辯者田巴辯於狙丘議於稷下毀五帝罪三王訾五伯離堅白合同異一日而服千人有徐劫者其弟子曰魯連謂劫曰臣願得當田子使之不敢復談可乎徐劫言之田巴曰劫弟子年十二耳然千里之駒也願得侍議於前田巴曰可魯連曰臣聞堂上之糞不除郊草不芸白刃交前不救流矢何則急者不救則緩者非務楚軍南陽趙氏伐高唐燕人十萬之眾在聊城而不去國亡在旦暮耳先王將柰何田巴曰無柰何魯連曰夫危不能為安亡不能為存則無為貴學士矣今臣將罷南陽之師還高唐之兵卻聊城之眾為所貴談談者其若此也先生之言有似梟鳴出聲而人惡之願先生之勿復談也田巴曰謹聞教明日見徐劫曰先生之駒乃非兔騕褭也豈特千里哉於是杜口易業終身不復談淮南子曰智絡天地明照日月辯解連環澤潤玉石抱朴子曰飛清機之英麗言約暢而判滯辯人也太公六韜曰辯言巧辭善毀譽者曰飛言之士皇甫謐高士傳曰趙惠文王好劍士夾門而客三千人太子悝患之募有能止王者與千金左右曰莊子必能太子使人奉周周見王曰臣有三劍唯所用焉天子之劍賓諸侯正天下諸侯之劍如雷霆之威震四封之內無不賓服庶人之劍上絕頸領下脫肺肝而此無異於鬭雞而爭一旦之命也今大王有天子之位而好庶人之業臣竊為大王薄之王不出宮三月劍客皆伏韓詩外傳曰鳥之美羽勾啄者鳥共畏之人之利口巧辯者人共畏之是以君子避三端文士筆端辯士舌端武士鋒端又曰子貢曰兩國構難壯士列陳塵埃張天錫不持尺兵斗糧解兩國之難用賜者存不用賜者亡孔子曰辯士哉語林曰諸葛靚字仲思在吳於朝堂大會孫皓問曰卿字仲思為欲何思之曰在家思孝事君思忠朋友思信如斯而已王子年拾遺錄曰張儀蘇秦二人遞翦髮以相活或傭力寫書行遇聖人之文無以題記則以墨書於掌中及股裏夜還折竹寫之二人假食於路剝樹皮為囊以盛天下良書每息大樹之下假息而寐有一先生問曰二子何勤苦若是而儀秦共與言論曰子是何人荅曰吾死生歸於山谷世論謂余歸谷子也秦儀後遊學復逢歸谷子乃請其學術則教以干世俗之辯乃探胸中韋袟三卷書言輔時之事故儀秦學之以終身也古史考云儀秦受術鬼谷先生歸之聲與鬼相亂故也桓譚新論曰公孫龍六國時辯士也為堅白之論假物取譬謂白馬為非馬非馬者言白所以名色馬所以名形也色非形形非色世說曰郭象議如懸河瀉水注而不竭劉向別錄曰鄒奭者頗采鄒衍之術迂大而閎辯文具難勝齊人美之頌曰談天鄒說苑曰林既衣韋而朝齊景公景公曰君子之服也小人之服也林既作色曰夫服何足以揣士行乎昔荊為長劍危冠令尹子西出焉齊短衣而管仲隰朋出焉越文身剪髮而范蠡大夫種出焉如君言衣狗裘者當犬號衣羊裘者當羊鳴今君衣狐裘而朝得無為變乎文士傳曰劉禎字公幹年八歲能誦論及賦數萬言性辯捷文帝嘗請同好為主人使甄夫人出拜坐者皆伏而禎獨平視如故武帝使人觀之見禎大怒命收之主者案禎大不恭應死減一等輸作部使磨石武帝嘗輦至尚方觀作者見禎故環坐正色磨石不仰武帝問曰石何如禎因得喻己自理跪對曰石出自荊山玄巖之下外有五色之章內含卞氏之珍磨之不加瑩彫之不增文稟氣堅貞受茲自然顧理枉屈紆繞獨不得申武帝顧左右大笑即日還宮赦禎復署吏又曰華譚字令思年十四舉秀才入洛會宣武塲座有辯者嘲南人諸君楚人亡國之餘有何秀異忽應斯舉眾無荅譚在下行遙曰當今六合齊軌異人並出吾聞大禹出於東夷文王生於西羗賢聖之所在豈常之有昔武王伐紂遷商頑民於洛邑得無吾子是其苗裔時咸改視辯者無以應也王瑱之童子傳曰孔林魯國人年十歲詣臺魯相劉公客有獻鴈者歎曰天之於人生五穀以為之食有魚鳥以為之肴眾賓咸曰誠如公旨林曰不然夫萬物所生各稟天氣事不必為人人徒以智得之故蚊蚋食人蚓虫噉土非天為蚊蚋生人為蚓生土公曰童子辯焉郭子曰梁國楊氏子年九歲甚聰慧孔君平詣其父父不在乃呼兒出為設菓有楊梅孔指示兒此君家果兒應聲荅曰未聞孔崔是夫子家禽王弼別傳曰弼年十餘歲好老莊通辯能言者列女傳曰袁次陽妻者扶風馬季長之女也下車禮畢次陽問曰為婦之道貞順而已何輜軿僮婢數十黼黻玄黃珠璣之飾耶夫人荅曰女有三從之義在家係於父母情愛無已欲其豊麗故不敢逆命今君欲擬鮑子子都之風不受婦家之送此乃清高異行也妾亦欲察君志悉還所有以成君之高不亦可乎次陽又問曰弟先足舉猶以為鄙高士不為也賢姊未嫁而新婦先行有何汲汲乎荅曰家姊有宋伯姬之風梁高之行節操慨於青雲貞介皦於白日家君庶堯之配舜孔子妻公冶之義世乏此賢故且躊躇妾固陋不才遭人則可次陽嘿然悵恨外聽者曰使君努力何為新婦所困之有傅玄七禮曰辯論鋒起探虎摩龍徐幹七喻曰戰國之際秦儀之徒智略兼人辯利軼軌倜儻挾義觀釁相時圖爵位則佩六紱謀貨財則輸海內一怒而諸侯懼安居而天下憩人主見弄於股掌之上而莫之知惡也班固荅賓戲曰子雖馳辯如濤波摛藻, SBCK: 恩}
