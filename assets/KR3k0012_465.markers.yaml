  - {type: variant, offset: 3417, length: 3, content: 揚雄好, SBCK: 范丹字史雲爲萊蕪長遭黨錮事推鹿車載妻子捃拾自資有時絶粮丹言貌無改閭里歌之曰甑中生塵范史雲釜中生魚范萊蕪又曰朱暉爲臨淮太守抑強絶雅歳常豊熟人爲之歌曰強直自遂南陽朱季吏畏其威人懷其惠又曰張堪爲漁陽太守勸人耕種以致豊冨百姓歌曰桑無附枝麥秀兩岐張君爲政樂不可支呉錄曰彭循字子陽毗陵人建國二年海賊丁儀等萬人據呉太守秋君聞循勇謀以守令循與儀相見陳􅀃利害應時散隆民歌之曰時歳倉卒賊縱横大㦸強弩不可當頼遇賢令彭子陽又曰王譚字世容爲成武令民服德化􅀫惡奔逆父老歌之曰王世容治無􅀟省傜役盗賊空晉書束晳傳太康中郡界大旱晳爲邑人請雨三日而雨注衆謂晳誠感爲作歌曰束先生通神明請天三日甘雨零零我􅁰以育我稷以成何以醻之報束先生又曰鄧攸爲呉郡守刑政清明百姓歡恱爲中興良守後稱疾去職郡常有送迎錢數百萬攸去郡不受一錢百姓數千人留牽攸舡不得進攸乃少停夜中發去吳人歌之曰纔如打五皷雞鳴天欲曙鄧侯挽不留謝令推不去又曰徐州刺史吕䖍檄王祥爲別駕祥年垂耳順固辭不受爲具車牛祥乃應召䖍委以州事于時冦盗充斥祥率勵兵士頻討破之州界清静政化大行時人歌之曰海沂之康實頼王祥􅀖國不空別駕之功又曰諸葛恢字道明荀闓字道明蔡謨字道明皆有名譽號曰中興三明時人歌之曰京師三明各有名蔡氏儒雅荀葛廉清王隠晉書曰應詹爲南平郡郡人歌之曰亂離旣}
