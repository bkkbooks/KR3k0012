  - {type: variant, offset: 649, length: 552, content: 聲如流聽者忘倦蕭方等三十國春秋曰劉裕為太尉中書監裕既拜朝賢畢至僕射謝混後來衣冠傾縱頗有傲慢之容裕甚不平乃謂之曰何謂旁若無人混對曰明公將隆伊周之化方使四海解襟謝混何人而敢獨異乎乃以手板披撥其襟領悉皆解散裕大悅魏收魏書曰李諧字虔和博學才辯天平中以諧兼散騎常侍為聘梁王衍遣主客郎范胥當接胥曰黃旗紫蓋本出東南君臨萬拜故宜在此諧荅帝王符命豈得與中國比隆紫蓋黃旗終於入洛無乃自害邪陳書曰簡文在東宮召戚袞講論又嘗置宴集玄儒之士先命道學玄相質難次令中庶子徐摛馳騁大義間以劇談摛辭辯縱橫難以荅抗諸人懾氣皆失次序袞時騁義摛與往復袞精釆自若對荅如流簡文深加歎賞隋書曰吳興沈重名為碩學高祖嘗令辛彥之與重論議重不能抗於是避席而謝之曰辛所謂金城湯池無可攻之勢高祖大悅又曰蘇夔字伯尼少聰敏有口辯煬帝嘗從容謂宇文述虞世基等曰四夷率服觀禮華夏鴻臚之職須歸令皇寧有多才多藝美容儀可以接對賓客者為之乎咸以夔對是日拜鴻臚少卿又曰柳誓為東宮學士每召入臥內與之宴謔誓尤俊辯多在侍從有所顧問應荅如響唐書曰薛收歸國秦府記室房玄齡薦之於太宗即日召見問以經略收辯對縱橫皆合旨要授秦王府主簿又曰文宗嘗於誕節召白居易與僧惟澄道士趙常盈對御講論於麟德殿居易論難鋒起辭辯泉注上疑宿構深嗟挹之列子云子夏問於孔子孔子對曰賜辯賢於丘賜也能辯不能訥吾兼有之所以事吾也矣莊子, WYG: ''}
