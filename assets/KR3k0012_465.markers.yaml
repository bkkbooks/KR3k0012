  - {type: variant, offset: 3777, length: 0, content: '', SBCK: 際又乗青騘馬徃反時節與謡相應至時是方悟列子曰堯微服遊於康衢開童謡曰立我蒸民莫匪尓極不識不知順帝之則抱朴子曰童謡猶助聖人之耳目豈况墳素之宏􅀶哉益部􅂄舊傳曰王忳字少林詣京師於客見諸生病甚困生謂忳曰腰下有金十斤願以相與乞収藏尸骸未問姓名呼吸因絶忳賣金一斤以給棺絮九斤置生腰下後署大度亭長到亭日有馬一疋到亭中其日大風有一繡􅀍隨風以來後忳􅀐馬突入金彦父見曰真得盗矣忳􅀃馬狀又取􅀍示之彦父帳然曰􅀍馬俱止卿有何隂德忳具􅀃葬諸生事彦父曰此吾}
  - {type: page-break, offset: 3777, content: '', id: KR3k0012_SBCK_465-8b}
