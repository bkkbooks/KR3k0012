  - {type: variant, offset: 3422, length: 0, content: '', SBCK: 顔師古叔父遊􅁗武德􅀄累遷廉州刺史封臨沂縣男時劉黒闥􅀄平人多以強􅁀寡禮風俗未安遊􅁗撫恤境内禮讓大行邑人歌之曰廉州顔有道性行同莊老愛人如赤子不煞非時草髙祖璽書勞勉之韓子曰齊桓公飲酒醉遺其冠耻之管仲曰公胡不雪之以政公曰善因發困倉賜貧窮論囹圄三日}
