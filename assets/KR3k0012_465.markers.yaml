  - {type: variant, offset: 3421, length: 0, content: '', SBCK: 殆爲􅁅朽僥倖之運頼兹應后䕃我塗炭惠隆丘阜潤曰江海恩猶父母崔鴻前􅁗録曰王猛化洽六州人移風變百姓歌之曰長安大街夾樹楊槐下走朱輪上有鸞栖英彦雲集誨我人􅀺又曰符堅時鳯皇集于東闕歌之曰鳯皇于飛其羽翼翼淵哉聖后饗齡萬億崔鴻崔氏家傳曰崔瑗爲汲令開溝澮興造稲田長老歌之曰上天降神明錫我慈仁父臨人布德澤恩惠施以序唐}
