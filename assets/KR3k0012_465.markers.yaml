  - {type: variant, offset: 1887, length: 930, content: 諸葛靚字仲思在吳於朝堂大會孫皓問曰卿字仲思為欲何思之曰在家思孝事君思忠朋友思信如斯而已王子年拾遺錄曰張儀蘇秦二人遞翦髮以相活或傭力寫書行遇聖人之文無以題記則以墨書於掌中及股裏夜還折竹寫之二人假食於路剝樹皮為囊以盛天下良書每息大樹之下假息而寐有一先生問曰二子何勤苦若是而儀秦共與言論曰子是何人荅曰吾死生歸於山谷世論謂余歸谷子也秦儀後遊學復逢歸谷子乃請其學術則教以干世俗之辯乃探胸中韋袟三卷書言輔時之事故儀秦學之以終身也古史考云儀秦受術鬼谷先生歸之聲與鬼相亂故也桓譚新論曰公孫龍六國時辯士也為堅白之論假物取譬謂白馬為非馬非馬者言白所以名色馬所以名形也色非形形非色世說曰郭象議如懸河瀉水注而不竭劉向別錄曰鄒奭者頗采鄒衍之術迂大而閎辯文具難勝齊人美之頌曰談天鄒說苑曰林既衣韋而朝齊景公景公曰君子之服也小人之服也林既作色曰夫服何足以揣士行乎昔荊為長劍危冠令尹子西出焉齊短衣而管仲隰朋出焉越文身剪髮而范蠡大夫種出焉如君言衣狗裘者當犬號衣羊裘者當羊鳴今君衣狐裘而朝得無為變乎文士傳曰劉禎字公幹年八歲能誦論及賦數萬言性辯捷文帝嘗請同好為主人使甄夫人出拜坐者皆伏而禎獨平視如故武帝使人觀之見禎大怒命收之主者案禎大不恭應死減一等輸作部使磨石武帝嘗輦至尚方觀作者見禎故環坐正色磨石不仰武帝問曰石何如禎因得喻己自理跪對曰石出自荊山玄巖之下外有五色之章內含卞氏之珍磨之不加瑩彫之不增文稟氣堅貞受茲自然顧理枉屈紆繞獨不得申武帝顧左右大笑即日還宮赦禎復署吏又曰華譚字令思年十四舉秀才入洛會宣武塲座有辯者嘲南人諸君楚人亡國之餘有何秀異忽應斯舉眾無荅譚在下行遙曰當今六合齊軌異人並出吾聞大禹出於東夷文王生於西羗賢聖之所在豈常之有昔武王伐紂遷商頑民於洛邑得無吾子是其苗裔時咸改視辯者無以應也王瑱之童子傳曰孔林魯國人年十歲詣臺魯相劉公客有獻鴈者歎曰天之於人生五穀以為之食有魚鳥以為之肴眾賓咸曰誠如公旨林曰不然夫萬物所生各稟天氣事不必為人人徒以智得之故蚊蚋食人蚓虫噉土非天為蚊蚋生人為蚓生土公曰童子辯焉郭子曰梁國楊氏子年九歲甚聰慧孔君平詣其父父不在乃呼兒出為設菓有楊梅孔指示兒此君家果兒應聲荅曰未聞孔崔是夫子家禽王弼別傳曰弼年十餘歲好老莊通辯能言者列女傳曰袁次陽妻者扶風馬季長之女也下車禮畢次陽問曰為, WYG: 彼}
