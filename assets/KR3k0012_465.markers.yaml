  - {type: variant, offset: 60, length: 219, content: 又曰謝安常賞袁宏機對辯速安為楊州刺史宏自吏部郎出為東陽郡及祖道於治亭時賢皆集安欲以卒迫試之臨別執宏手顧左右取一扇而授之曰聊以贈行宏應聲荅曰輒當奉楊仁風慰彼黎庶又曰華譚或問曰諺云人之相去如九牛毛寧有此理乎譚對曰昔許由讓天子之貴市道小人爭半錢之利此相去何啻九牛毛也聞者稱善又曰呂珩問袁甫曰卿名能辯豈知壽陽已東何以恒水甫曰壽陽已東皆是吳人夫亡國之音哀以思鼎足疆邦一朝失職憤歎甚積積憂成雨雨久成水故其城恒澇也又曰祖納謂梅陶及鍾雅曰君汝潁之士利如錐, WYG: ''}
  - {type: punctuation, offset: 62, content: ：, id: KR3k0012_CHANT_465-bkkpn23}
