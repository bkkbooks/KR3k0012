  - {type: variant, offset: 3427, length: 4, content: 劇談范曄, SBCK: 令公喜能令公怒常璩華陽國志曰吳資字元約爲巴郡太守屢獲豐年人歌之曰習習晨風動澍雨潤乎苗我后恤時務我人以優饒劉向新序曰季子以劒帯徐君墓樹徐人嘉而歌之曰延陵季子不忘舊故千金之劒以帶丘墓陳留􅂄舊傳曰爰珎除六令吏人訟息教誨其子弟歌之曰我有田疇爰父殖置我有子弟爰父教誨襄陽􅂄舊傳曰山季倫每臨習池未甞不大醉而還曰我髙陽地也襄陵城中小兒歌之曰山公出何去徃至髙陽池日夕倒載歸酩酊無所知時時能􅀐馬到着白接籬舉鞭向􅁑强何如并州兒又曰襄陽太守胡烈有惠化百姓歌曰羙哉明后儁哲惟嶷陶廣乹坤周孔是則文武播暢威振遐域謡爾雅曰徒歌曰謡漢書曰石顯失權數月丞相條奏顯舊惡及其黨牢梁陳順皆免官顯與妻子徒歸故郡憂懣不食道病死諸所交結以顯爲官廢罷少府五鹿充宗左遷􅀇菟太守御史中丞伊嘉爲鴈門都尉長安謡曰伊徙鴈鹿菟去牢與陳石無徒􅀽山松}
