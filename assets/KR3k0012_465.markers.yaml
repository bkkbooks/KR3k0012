  - {type: variant, offset: 3703, length: 2, content: 慕容, SBCK: 裴秀􅂊十餘歳叔父徽有聲名賔客詣徽岀則過秀時人謡曰後進領䄂有裴秀又曰杜預開楊口起夏口水道洪洞逹巴陵經千餘里内冩長江之險外通零桂之漕南土美而謡之曰後世無叛由杜翁孰識智名與勇功又曰潘岳字安仁清辯能屬文早辟賈充府太子舎人出爲河陽令以仕次冝爲郎不得意時僕射山濤領選岳内非之宻作謡曰閣道東有大牛王濟鞅裴楷鞦和嶠刺促不得休崔鴻後趙録曰張樓爲臨水長嚴政酷刑殘忍無惠人謡之曰陽平張樓頭如箱見人切齒劇虎狼崔鴻前􅁗録曰符洪母姜氏因寢産洪驚悸而寤先是隴右大霖雨百姓苦之謡曰雨􅀂不止洪水必起故名之曰洪又曰􅀄符生夢大魚食蒲又長安謡曰東海大魚化爲龍男便為王女爲公問在何所洛門東海堅將也時爲龍驤將軍第在洛門之東是月生以謡夢之故誅侍中魚遵趙書曰劉膠討陳安於隴城安下小將劉牙趙牢路松多堅戍不下城内得安死力謡曰隴上徤兒曰陳安軀幹雖小腹中寛愛養將士同心肝騄􅍡駮馬鐵瑕鞍七尺大刀配齊鐶丈八虵矛左右盤十盪十决無當前百􅀐俱出如雲浮追者千萬􅀐悠悠戰始三交失虵矛十􅀐俱盪九􅀐留弃我騄􅍡攀巖悲天降雨迨者休阿呵嗚乎奈子乎嗚呼阿呵柰子何又曰汲桑六月盛暑而重裘累茵使人扇之患不清凉斬扇者時軍中爲之謡曰士爲將軍何可羞六月重茵􅀍}
  - {type: page-break, offset: 3703, content: '', id: KR3k0012_SBCK_465-7a}
  - {type: page-break, offset: 3703, content: '', id: KR3k0012_SBCK_465-7b}
  - {type: variant, offset: 3703, length: 7, content: 慕容納沉靜深邃, WYG: 裴秀纔十餘嵗叔父徽有聲名賓客詣徽出則過秀時人謡曰後進領䄂有裴秀又曰杜預開楊口水道洪洞逹巴陵經千餘里内瀉長江之險}
  - {type: variant, offset: 3703, length: 2, content: 慕容, krp: 裴秀纔十餘歳叔父徽有聲名賔客詣徽岀則過秀時人謡曰後進領䄂有裴秀又曰杜預開楊口起夏口水道洪洞逹巴陵經千餘里内冩長江之險外通零桂之漕南土美而謡之曰後世無叛由杜翁孰識智名與勇功又曰潘岳字安仁清辯能屬文早辟賈充府太子舎人出爲河陽令以仕次冝爲郎不得意時僕射山濤領選岳内非之宻作謡曰閣道東有大牛王濟鞅裴楷鞦和嶠刺促不得休崔鴻後趙録曰張樓爲臨水長嚴政酷刑殘忍無惠人謡之曰陽平張樓頭如箱見人切齒劇虎狼崔鴻前秦録曰符洪母姜氏因寢産洪驚悸而寤先是隴右大霖雨百姓苦之謡曰雨若不止洪水必起故名之曰洪又曰𥘉符生夢大魚食蒲又長安謡曰東海大魚化爲龍男便為王女爲公問在何所洛門東海堅將也時爲龍驤將軍第在洛門之東是月生以謡夢之故誅侍中魚遵趙書曰劉膠討陳安於隴城安下小將劉牙趙牢路松多堅戍不下城内得安死力謡曰隴上徤兒曰陳安軀幹雖小腹中寛愛養將士同心肝騄􅍡駮馬鐵瑕鞍七尺大刀配齊鐶丈八虵矛左右盤十盪十决無當前百騎俱出如雲浮追者千萬騎悠悠戰始三交失虵矛十騎俱盪九騎留弃我騄􅍡攀巖悲天降雨迨者休阿呵嗚乎奈子乎嗚呼阿呵柰子何又曰汲桑六月盛暑而重裘累茵使人扇之患不清凉斬扇者時軍中爲之謡曰士爲將軍何可羞六月重茵𬒳}
