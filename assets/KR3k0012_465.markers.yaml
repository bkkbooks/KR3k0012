  - {type: variant, offset: 3352, length: 1, content: 訥, WYG: 到官有殊政百姓歌之曰厥徳仁明郭喬卿忠正朝廷上下平謝承後漢書曰岑晊遷魏郡太守民歌之曰我有枳棘岑君伐之我有蛑賊岑君遏之狗吠不驚足下生􅀢含哺鼓腹焉知凶災我嘉我生獨丁斯時美矣岑君}
  - {type: page-break, offset: 3352, content: '', id: KR3k0012_WYG_465-4a, image: WYG0897/WYG0897-0252c.png}
