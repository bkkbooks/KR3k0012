  - {type: variant, offset: 3349, length: 1, content: 國, WYG: 與兄野王相代政行相似吏人嘉之乃歌曰大馮君小馮君兄弟繼踵相因循聰明聖智恵吏人政如魯衛徳化鈞周公康叔猶二君又曰王氏五侯争為奢侈大起第宅百姓歌曰五侯初起曲陽最怒壊决髙都連境外杜土山漸臺象西白武白武殿名後漢書曰皇甫嵩討平黄巾請冀州一年田租以贍饑民百姓歌曰天下亂兮市為墟母不保子妻失夫賴得皇甫復汝居又曰劉陶駼除順陽}
