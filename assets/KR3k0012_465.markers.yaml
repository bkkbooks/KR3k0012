  - {type: variant, offset: 3696, length: 5, content: 質張詮南燕, SBCK: 曰此必水軍有功但當思應其名者耳又曰杜預遣周旨伍巢等伏兵樂郷城外孫歆遣軍岀拒王濬大敗而還旨等發伏兵隨歆軍而入直至帳下虜歆而還故軍中爲之謡曰以討伐戰一當萬於是進逼江陵又曰太始中爲賈充等謡曰賈裴王乱紀綱王裴賈濟天下言亡魏而成晉也王隠晉}
