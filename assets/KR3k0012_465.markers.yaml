  - {type: variant, offset: 3824, length: 156, content: 如老吃耳張騭文士傳曰左思字太沖貌惡不揚口訥不能給談默而心解又曰成公綏口訥不能談論嘿而內朗人有劇問以筆墨荅之裴啟語林曰鄧艾口吃常云艾艾宣王曰為云艾艾終是幾艾荅曰譬如鳳兮鳳兮故作一鳳耳玄晏春秋曰予朴訥不好戲弄口又不能戲談崔琰述初賦序云琰性頑口訥年十八不能會問好擊劍尚武事紀騭表孫皓曰臣稟氣淺薄體不及眾形容短陋訥口弱顏, SBCK: 五}
