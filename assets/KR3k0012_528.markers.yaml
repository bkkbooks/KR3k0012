  - {type: variant, offset: 4540, length: 266, content: 一月祭南郊其地今秣陵縣南十餘里郊中是也晉氏南遷立南郊於己地非禮所謂陽位之義也宋武大明三年尚書右丞徐爰議郊祀之位遠古薎聞禮記燔柴於太一祭天也兆於南郊就陽位也漢初甘泉河東禋埋易位終亦徙於長安南北光武紹祚定二郊洛陽南北晉氏過江悉在北及郊兆之議紛然不一又南出道狹未議開闡遂於東南己地創立丘壇皇宋受命因而弗改且居民之中非邑外之謂今聖圖重造舊章畢新南驛開塗陽路脩遠謂宜郊正午以定天位博士司馬興之傳郁太常丞陸澄並同爰議乃移郊兆於秣陵牛頭山西正在宮之午地也傳玄正都賦曰建乎禋祀祈福上帝天子乃反古服襲大裘綖紐五采平冕垂旒質文斌斌帝容孔脩列大駕於郊畛升, SBCK: ''}
