  - {type: variant, offset: 51, length: 13, content: 上帝配以后稷農星先王皆與食, SBCK: 來未遑脩建禘祫}
  - {type: variant, offset: 51, length: 1, content: 上, WYG: 立春之日皆青幡青幘迎春于郊外令一童男㡌青巾衣先在郭外迎春者至自野中出迎者拜之而還皇覽禮云天子迎四節日天子迎春夏秋冬之樂又順天道是故距冬至日四十六日則天子迎春于東堂距邦八里堂髙八尺堂階八等青稅八乗旂旐尚青田車載矛號曰助天生倡之以角舞之以羽此迎春之樂也自春分四十六日則天子迎夏于南堂距邦七里堂髙七尺堂階七等赤稅七乗旂旐尚赤田車載弓號曰助天養倡之以徵舞之鼔鞉此迎夏之樂也夏至四十六日則天子迎秋于西堂距邦九里堂髙九尺堂階九等白稅九乗旂旐尚白田車載㦸號曰助天收倡之以商舞之以干此迎秋之樂也自秋分數至四十六日則天子迎冬于北堂距邦六里堂髙六尺堂階六等黑稅六乗旂旐尚黑田車載甲號曰助天誅倡之以羽舞之以籥此迎冬之樂也所以迎四時樂飬九志于西堂冬飬九勝于北堂飬後三日而止天子行殺必順天道宋書禮志曰漢明}
