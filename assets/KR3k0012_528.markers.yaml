  - {type: variant, offset: 49, length: 0, content: '', WYG: 章句曰迎夏者禮炎帝祝融神也于南郊七里因火數也玉用赤牲幣各放其色樂奏中吕歌朱明其他皆如孟春也孟秋迎秋于西郊章句曰迎秋者禮少昊蓐收之神于西郊九里因金數也玉用白虎牲幣各倣其色樂奏夷則歌白藏其他如孟夏之禮孟冬迎冬于北郊章句曰迎冬者禮顓頊𤣥㝠之神也于北郊六里因水數也玉用𤣥牲幣冬倣其色樂奏應鍾歌𤣥英其他如孟秋之禮續漢書禮儀志曰立春之日百官皆衣青迎氣青郊郡縣皆青服幘立幡施土牛耕人于門外以示兆民立夏之日百官皆衣赤迎氣赤郊立秋之日百官皆衣白迎氣白郊立冬之日百官皆衣皂迎氣黑郊又郊}
