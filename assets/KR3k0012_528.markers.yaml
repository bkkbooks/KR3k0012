  - {type: variant, offset: 2528, length: 193, content: 上都雒陽制兆於城南七里北郊四里行夏之時時以平旦服色犧牲尚黑明火德之運常服徽熾尚赤四時隨色季夏黃色議者曰昔周公郊祀后稷以配天宗祀文王以配上帝圖讖著伊堯赤帝之子俱與后稷並受命而為王漢劉祖令宜郊祀帝堯以配天宗祀高祖以配上帝有司奏議曰追跡先代無郊其五運之祖者故禹不郊白帝周不郊帝嚳漢雖唐之苗堯以歷數命舜高祖自感赤龍火德承運而起當以高祖配堯之後還復於漢宜脩奉濟陽成陽縣堯冢雲臺致敬祭祀禮亦宜之又曰, SBCK: ''}
