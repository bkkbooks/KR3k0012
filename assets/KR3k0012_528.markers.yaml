  - {type: variant, offset: 84, length: 1, content: 昊, SBCK: 禮}
  - {type: variant, offset: 84, length: 464, content: 昊天有成命二后受之成王不敢康夙夜基命宥密昊天昊大號也有成命者言周自后稷之生而已有王命也文王武王受其業施行道德成此王功周禮春官上大宗伯曰以禋祀祀昊天上帝禋之言煙煙者周人尚臭煙氣之臭聞也昊天上帝冬至祀于圓丘天皇大帝也以實柴祀日月星辰星五緯也辰日月所會十二次以槱燎祀司中司命風師雨師槱積也司中文昌宮中星也風師箕星也雨師畢星也鄭云司中司命文昌第四第五星也又春官上大宗伯曰蒼璧禮天禮天以冬至謂天皇大帝在北極者禮神必以其類璧圓象天黃琮禮地禮地以夏至謂神在崑崙方象地也又春官上典瑞曰四珪有邸以祀天旅上帝鄭眾云於中央為璧珪著其四面一玉俱成故曰四邸珪未四出或說四珪有邸有四角也上帝玄天地鄭玄曰祀天夏正郊上天也上帝五帝所郊亦猶五帝殊言天者尊異兩珪有邸以祀地旅四望兩珪者象地數二也謂所祀於北郊神州之神又春官下大司樂曰大司樂乃奏黃鍾歌大呂舞雲門以祀天神天神謂五帝及日月星辰也王者各以夏正月祀其受命之帝於南郊尊也奏太蔟歌應鍾舞咸池以祭地衹地衹祭於北郊謂神州之神及社稷也靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬至日於地上之圓丘奏之若樂六變則天神皆降可得禮矣此褅, WYG: 禘}
