  - {type: punctuation, offset: 693, content: 《, id: KR3k0012_CHANT_528-bkkpn201}
  - {type: variant, offset: 694, length: 285, content: 運曰祭帝於郊所以定天位也祀社於國所以列地利也又郊特牲曰郊之祭也迎長日之至大報天而主日也兆於南郊就陽位也掃地而祭於其質也器用陶匏以象天地之性也於郊故謂之郊牲用騂尚赤也用犢貴誠也尚赤者周也郊之用辛也自周之始郊日以至言日以至周郊天之月而日至陽氣新用事順之而用辛曰三王之郊一用夏正魯以無冬至祭天圓丘之是事以建子月郊天是先有事也用辛日者凡為人君當齋戒自新耳卜郊受命于祖廟作龜於禰宮尊祖親考之義也郊所以明天道也萬物本乎天人本乎祖此所以配上帝郊之祭也大報本反始也又明堂位曰成王封周公於魯命魯公世世祀周公以天子之禮樂是以魯君孟春乘大輅戴弧韣旂十有二旒日月之章祀帝于郊配以后稷天子之禮也又, SBCK: 記}
