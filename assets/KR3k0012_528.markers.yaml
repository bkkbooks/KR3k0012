  - {type: variant, offset: 1923, length: 1, content: 祭, SBCK: 三年一祫五年一禘何三年一閏}
  - {type: variant, offset: 1923, length: 0, content: '', WYG: 三年一祫五年一禘何三年一閏天道小備故三年一祫祫皆取未遷廟主合食太祖廟中五嵗再閏天道大備故五嵗一禘禘者諦也取已遷廟主合食太祖廟中禮記外傳曰禘祫謂之殷}
  - {type: variant, offset: 1923, length: 0, content: '', krp: 三年一祫五年一禘何三年一閏天道小備故三年一祫祫者皆取未遷廟主合食太祖廟中五歳再閏天道大備故五歳一禘禘者諦也取巳遷廟主合食太祖廟中禮記外傳曰禘祫謂之殷}
  - {type: variant, offset: 1924, length: 6, content: 天地何王者父, WYG: 祫大而禘小春秋之經有禘而無祫毁廟無時祭但五年有二殷祭耳神主入廟先為一禘明年春禘而又祫經云有}
  - {type: page-break, offset: 1924, content: '', id: KR3k0012_WYG_528-5b, image: WYG0897/WYG0897-0687b.png}
  - {type: variant, offset: 1924, length: 2, content: 天地, krp: 殷多盛也祫大而禘小祫合也合毀廟之主岀而陳列之親廟之主升入大廟功臣又得配享其禮大也禘則各於宫神主不出廟也祭大}
  - {type: variant, offset: 1925, length: 1, content: 地, SBCK: 道小備故三年一祫祫者皆取未遷廟主合食太祖廟中五歳再閏天道大備故五歳一禘禘者諦也取巳遷廟主合食太祖廟中禮記外傳曰禘祫謂之殷􅀕殷多盛也祫大而禘小祫合也合毀廟之主岀而陳列之親廟之主升入大廟功臣又得配享其禮大也禘則各於宫神主不出廟也􅀕大}
