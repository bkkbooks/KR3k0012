  - {type: variant, offset: 4232, length: 257, content: 大寧三年上親祠七月又詔自中興以來雖南郊未嘗北郊五岳四瀆名山大川應望祑者廢而未舉居其官者舉其職司其事勿令一代之典闕而不備主者詳依舊處又曰安帝元興三年十二月明年應郊乘輿未反博訪內外左丞王納之議曰議者謂應郊故承制中事納之謂大饗大祀大樂皆是承制不可得命三公行者郊天極尊唯一而已故非天子不祀也又案武皇受禪用二月郊元年中興亦以二月今郊時未過日望鑾駕無為欲速而據皇輿旋反更不得親奉不如緩而盡美於是異同難明遂從納之議宋書禮志曰晉太始二年十一月有司又議古者丘郊不異宜并圓丘方丘於南北郊更脩治壇兆其二至之祀合於二郊帝又從之一如宣帝所用, SBCK: 問}
