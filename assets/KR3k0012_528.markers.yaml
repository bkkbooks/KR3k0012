  - {type: variant, offset: 2418, length: 0, content: '', WYG: 則神主出廟堂為昭穆以安坐不復停室也又志曰博士徐道娱上議曰太廟烝甞儀注皇帝行事畢出便坐三公以上獻太祖送神于門然後至尊還拜百官賛拜乃退尋清廟之道所以肅敬安神也又曰廟者貌也神靈所憑也事亡如存若恒在也即不應有送神之文自陳豆薦俎車駕至止並弗奉迎夫不迎而送送而後辭齟齬之情實用未達又博士江䆳議曰在始不迎明在廟也卒事送神節孝思也若不送而辭是舍親也辭而後送是速神也故孝子不忍違其親又不忍違神是以祝史送神以成烝甞之義又禮志曰禘祫之禮三年一五年再公羊所謂五年再殷祭也在四時之上周禮所謂肆獻祼饋食在四時之上是也蓋厯嵗節月無定天子諸侯先後弗同禮天子祫甞諸侯烝祫有田則祭無田則薦鄭注天子先祫後時祭諸侯先時祭後祫有田也即祭又薦新祭以首時祭以仲月然則大祭四祀其月各畢天子以孟月殷仲月烝諸侯孟月嘗仲月祫也齊書禮志曰右僕射王儉議按禮記王制天子先祫後時祭諸侯先時祭後祫春秋魯僖公二年祫明年春禘自此以五年再殷孔緯稽命徵曰三年一祫五年一禘經紀所論禘祫與時其言鮮矣唐書曰元和中太常上言按禮祭不欲數太廟禘祫祭禮重于時享與禘同月即其月但行禘祫祭不行時享盖不欲煩是禮先重者今時享重于朔望薦食稽求禮情參酌輕重請每時至及蜡但行享禮其月朔望薦食請停知}
