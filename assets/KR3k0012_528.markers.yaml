  - {type: variant, offset: 2419, length: 0, content: '', SBCK: 廟日與朔望薦食日同請先行告禮然後薦食六宗尚書舜典曰禋于六宗鄭注曰六宗謂星辰司中司命風雨師也尚書大傳曰萬物非天不生非地不載非春不動非夏不長非秋不収非冬不藏故書曰禋于六宗此之謂也五經異義曰今尚書歐陽夏侯􅀃六宗者上不及天下不及地旁不及四方居中央恍忽無有神助隂陽變化有益於人郊天并􅀕之又曰古尚書􅀃六宗者}
