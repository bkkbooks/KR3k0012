  - {type: variant, offset: 2417, length: 1, content: 祭, SBCK: 乙卯仍有事焉宋書禮志曰凡禘祫大􅀕則神主悉出廟堂爲昭穆以安坐不復停室也又志曰􅀶士徐道娱上議曰太廟烝甞儀注皇帝行事畢出便坐三公巳上獻太祝送神于門然後至尊還拜百官賛拜乃退謹㝷清廟之道所以肅安神也禮曰廟者貌也神靈所慿依也事亡如存􅀂恒在也旣不應有送神之文自陳豆薦爼車駕至止並弗奉迎夫不迎而送送而後辭闇矩之情實用未逹􅀶士江􅃉議在始不迎明在廟也卒事而送節孝思也􅀂不送而辭是舎親也辭而後送是違神也故孝子不忍違其親又不忍違神是以祝史送神以成烝甞之義又禮志曰禘祫之禮三年一五年再公羊所謂五年再殷􅀕也在四時之間周禮所謂凡四時之間禮也盖歷歳節月無定天子諸侯先後弗同禮天子祫甞諸侯蒸祫有田則􅀕無田則薦鄭注天子先祫後􅀕諸侯先時􅀕然後祫有田者既􅀕又薦新􅀕以首時薦以仲月然則大􅀕四祀其月各異天子以孟月殷仲月蒸諸侯孟月甞仲月祫也齊書禮志曰右僕射王儉議按禮記王制天子先祫後時􅀕諸侯先時􅀕後祫春秋魯僖二年祫明年春禘自此以後五年再殷禮緯稽命徴曰三年一祫五年一禘經記所論禘祫與時􅀕其言詳矣唐書曰元和中太常上言按禮􅀕不欲數太廟禘祫􅀕禮重於時饗時饗與禘祫同月即其月但行禘祫􅀕不行時饗盖不欲煩是禮先重者今時饗重於朔望薦食稽求禮情叅酌輕重請毎至時及臘但行饗禮其月朔望薦食請停如}
