  - {type: variant, offset: 2403, length: 12, content: 光武帝即位于鄗為壇營于鄗, SBCK: 而再殷􅀕猶古之禘祫王隱晉書曰太康中太廟成遷神主於新廟上帥百官奉迎於道左遂親禘祫後魏書曰世宗景明二年夏六月祕書丞孫思蔚上言古之􅀕法時祫並行天子先祫後時諸侯先時後祫此施當世在今則煩且禮有􅂛降事有節文適時之制聖人弗違當祫之月减時􅀕以從要省制可十一月壬寅改築圎亡於伊水}
