  - {type: variant, offset: 2023, length: 245, content: 吾聞天有五帝而四何也莫知其說於是高祖曰吾知之矣待我而具五也乃立黑帝之祠名曰黑畤又郊祀志曰遂郊雍至隴西登崆峒幸甘泉令祠官寬舒等具太一祠壇祠壇放亳忌太一壇壇三垓五帝壇環居其下各如其方黃帝西南除八通鬼道太一所用如雍五畤物而加醴棗脯之屬殺一狸牛以為俎豆牢具又郊祀志曰三年一郊秦以十月為歲首故常以十月上宿郊見通權火張晏曰權火烽火也狀若井桔槔矣其法類稱故謂之權欲令光明遠照通於祀所也漢祀五畤於雍五里一烽火如淳曰權舉也拜於咸陽之旁而衣上白其用如經祠云服虎曰經常又郊祀志曰武帝立后土祠於汾陰立太一祠於甘泉祭, WYG: ''}
