  - {type: variant, offset: 4807, length: 228, content: 通之靈壇執鎮珪而進蒼壁思致美乎上乾爾乃太蔟為徵圓鍾為宮吹孤竹而拊雲和脩軒轅之遺風類於圓丘六變既終則天神斯降可得而禮矣司馬相如封禪書曰濯濯之麟遊彼靈畤孟冬十月君徂郊祀馳我君車帝以享祉郭璞上䟽曰臣歲首粗有所占得解之既濟案解卦繇云君子以赦過宥罪既濟云思患而預防之郊祀者以通天人之誠感因農祥而祈事上乃致敬於皇靈下以播惠於萌黎者也臣愚以為於卦之義既郊之後宜發哀矜之詔引在予之責蕩除瑕釁贊陽布惠使幽弊之民應養生以悅育否滯之氣隨谷風而舒散此亦寄時事以制用藉開塞而曲成者也, SBCK: ''}
