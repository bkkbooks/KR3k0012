  - {type: variant, offset: 3994, length: 235, content: 禮志曰晉太始二年詔群臣議五帝即天也王氣時異故殊其號雖名有五其實一神明堂南郊宜除五帝之坐五郊改五精之號皆同稱昊天上帝各設一坐而已又禮志曰康帝建元元年正月將北郊有疑議太常顧和表北郊之月古無明文漢光武正月辛未始建北郊則與南郊同月咸和中北郊同共正月周禮三王之郊一用夏正於是從和議是月辛未南郊辛巳北郊帝皆親奉宋書禮志曰晉孝武帝詔曰郊祀國之大事而稽古之制闕然便可詳議祠部郎徐邈議圓丘郊祀經典無二宣皇帝嘗辨斯義而撿以聖典爰及中興備加研極以定南北二郊誠非異學所可輕改也謂仍舊為安晉起居注, SBCK: ''}
