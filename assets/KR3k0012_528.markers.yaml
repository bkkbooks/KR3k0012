  - {type: variant, offset: 3274, length: 199, content: 廢無常一彼一此四百餘年廢無禘禮古代之所更立者遂有闕焉曹氏世繫出自有虞氏今祀圓丘以始祖帝舜配地以舜妃伊氏配天郊所祭曰皇天之神以太祖武皇帝配地郊所祭曰皇地之祗以武宣皇后配宗祀皇考高祖文皇帝於明堂以配上帝江表傳曰群臣以孫權未郊祀奏議曰頃者嘉瑞屢臻遠國慕義宜備郊祀以承天意權曰郊祀當於中土今非其所於何施此重奏曰普天之下莫非王土王者以天下為家周文武郊酆鄗非必中土權曰武王伐紂即作鄗京而郊其所也文王未為天子立郊, WYG: ''}
