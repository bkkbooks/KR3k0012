  - {type: variant, offset: 1818, length: 0, content: '', SBCK: 周禮宗伯職曰以肆獻祼享先王以饋食享先王以祠春享先王以禴夏享先王以甞秋享先王以烝冬享先王宗廟之􅀕有此六享肆獻祼饋食在四時之上則是祫也禘也禮稽命曜曰三年一祫五年一禘以衣服想見其容色三日齋思親志意想見所好意喜然後入廟左傳昭四曰十五年春將禘于武公戒百官杜預注曰戒齋也梓慎曰禘之日其有咎乎吾見赤黒之祲非􅀕祥也喪氛也祲妭氣也在其莅事乎公羊傳文上曰祫者何也合􅀕也其合􅀕柰何毀廟之主陳乎太祖未毀廟之主皆􅂛合食於太祖爾雅曰禘大􅀕也郭璞注曰五年大􅀕白虎通曰􅀕宗廟所以禘祫何尊人君貴功徳廣孝道位尊徳盛所及彌逺}
  - {type: page-break, offset: 1818, content: '', id: KR3k0012_SBCK_528-3a}
  - {type: variant, offset: 1818, length: 0, content: '', krp: 周禮宗伯職曰以肆獻祼享先王以饋食享先王以祠春享先王以禴夏享先王以甞秋享先王以烝冬享先王宗廟之祭有此六享肆獻祼饋食在四時之上則是祫也禘也禮稽命曜曰三年一祫五年一禘以衣服想見其容色三日齋思親志意想見所好意喜然後入廟左傳昭四曰十五年春將禘于武公戒百官杜預注曰戒齋也梓慎曰禘之日其有咎乎吾見赤黒之祲非祭祥也喪氛也祲妭氣也在其莅事乎公羊傳文上曰祫者何也合祭也其合祭柰何毀廟之主陳乎太祖未毀廟之主皆升合食於太祖爾雅曰禘大祭也郭璞注曰五年大祭白虎通曰祭宗廟所以禘祫何尊人君貴功徳廣孝道位尊徳盛所及彌逺}
