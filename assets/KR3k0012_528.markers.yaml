  - {type: variant, offset: 1077, length: 724, content: 后稷以配天配靈威仰也宗祀文王於明堂以配上帝汎配五帝也又祭法曰有虞氏禘黃帝而郊嚳祖顓頊而宗堯夏后氏亦禘黃帝而郊鯀祖顓頊而宗禹殷人禘嚳而郊冥祖契而宗湯周人亦禘嚳而郊稷祖文王而宗武王禘郊祖宗謂祭祀以配食也此禘謂祭昊天於圓丘又祭義曰郊之祭大報天而主日配以月夏后氏祭其闇殷人祭其陽周人祭日以朝及闇祭日於壇祭月於坎以別幽明以制上下祭日於東祭月於西以別內外以端其位日出於東月生於西陰陽長短終始相巡以致天下之和天下之禮致反始也致鬼神也致和用也致義也致讓也禮含文嘉曰五祀南郊北郊西郊東郊中郊兆正謀東郊去都城八里南郊九里北郊六里中郊西南去城五里兆者作封畔兆域也謀者方欲迎氣齋戒自端正謀慮其事也五者天子公侯伯子男卿大夫士所以承天也禮記外傳曰王者冬至之日祭昊天上帝於圓丘冬至一陽生非人力所為謂之丘自然高大也天體圓諸侯不祭天魯無圓丘之祭及二王之後各祭其感生帝於南郊王肅云天雄一帝鄭玄以天有六帝據周禮祀昊天又旅五帝是六星辰之位列于壇下正祭之時天尸在壇上也掃地而祭以下為貴燔牲玉於壇上又曰夏至日祭皇地祇於方澤配以后土地禮方也謂祭崑崙山之神也地之正祭歲有二此一祭也立冬之日祭神州地祇於北郊配以后稷此周制也神州即王者所居在崑崙東南五千里封域之內土地之神州此即吉士可以享帝於郊也左傳襄上曰三卜郊不從乃免牲孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事郊祀后稷以配天后稷周始祖能播植是故啟蟄而郊郊而後耕今既耕而後卜郊宜其不從也穀梁傳宣公曰郊牛之口傷之口綬辭也鼷鼠齧郊牛角不言之危辭也角者兵之象故給養不謹敬鬼神不享故緩也傷自牛作也改卜牛死乃不郊春秋繁露曰王者歲一祭天於郊天者百神之君王者所最尊也又曰春秋之義國有大喪者止宗廟之祭而不止郊祭不止郊祭者不敢以父母之喪廢事天之禮也孝經曰昔者周公郊禮, SBCK: ''}
