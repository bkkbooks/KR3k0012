  - {type: variant, offset: 1001, length: 460, content: 凡大祭曰禘自由也大祭其先祖先所由生謂郊祭天王者之先祖皆感太微五帝之精蒼則靈威仰赤則赤熛怒黃則含樞紐白則白招拒黑則汁光紀皆正歲之正郊祭之蓋特尊焉孝經曰郊祀后稷以配天配靈威仰也宗祀文王於明堂以配上帝汎配五帝也又祭法曰有虞氏禘黃帝而郊嚳祖顓頊而宗堯夏后氏亦禘黃帝而郊鯀祖顓頊而宗禹殷人禘嚳而郊冥祖契而宗湯周人亦禘嚳而郊稷祖文王而宗武王禘郊祖宗謂祭祀以配食也此禘謂祭昊天於圓丘又祭義曰郊之祭大報天而主日配以月夏后氏祭其闇殷人祭其陽周人祭日以朝及闇祭日於壇祭月於坎以別幽明以制上下祭日於東祭月於西以別內外以端其位日出於東月生於西陰陽長短終始相巡以致天下之和天下之禮致反始也致鬼神也致和用也致義也致讓也禮含文嘉曰五祀南郊北郊西郊東郊中郊兆正謀東郊去都城八里南郊九里北郊六里中郊西南去城五里兆者作封畔兆域也謀者方欲迎氣齋戒自端正謀慮其事也五者天子公侯伯子男卿大夫士所以承天也禮記外傳曰王者冬至之日祭昊天上帝於圓丘冬至一陽生非人力所為謂之丘自然高大也天體圓諸侯不祭天魯無圓丘之祭及二王之後各祭其感生帝於南郊王肅云天雄一帝鄭玄以天有六帝據, WYG: ''}
