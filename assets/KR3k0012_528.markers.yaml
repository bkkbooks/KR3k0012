  - {type: punctuation, offset: 6, content: 《, id: KR3k0012_CHANT_528-bkkpn1}
  - {type: variant, offset: 7, length: 0, content: '', SBCK: 青田車載矛號曰助天生倡之以角舞之以羽此迎春之樂也自春分數四十六日則天子迎夏於南堂距􅀖七里堂髙七尺堂階七等赤稅七乗旂旐尚赤田車載弓號曰助天養倡之以徴舞之鼔鞉此迎夏之樂也自夏至數四十六日則天子迎秋於西堂距􅀖九里堂髙九尺堂階九等白稅九乗旂旐尚白田車載㦸號曰助天收倡之以啇舞之以于戚此迎秋之樂也自秋分數四十六日則天子迎冬於北堂距􅀖六里堂髙六尺堂階六等黒稅六乗旂旐尚黒田車載甲號曰助天誅倡之以羽舞之以籥此迎冬之樂也所以迎四時樂養九志於西堂冬養九勝於北堂養後三月而止天子行殺必順天道宋}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_SBCK_528-2a}
  - {type: variant, offset: 7, length: 0, content: '', krp: 青田車載矛號曰助天生倡之以角舞之以羽此迎春之樂也自春分數四十六日則天子迎夏於南堂距邦七里堂髙七尺堂階七等赤稅七乗旂旐尚赤田車載弓號曰助天養倡之以徴舞之鼔鞉此迎夏之樂也自夏至數四十六日則天子迎秋於西堂距邦九里堂髙九尺堂階九等白稅九乗旂旐尚白田車載㦸號曰助天收倡之以啇舞之以于戚此迎秋之樂也自秋分數四十六日則天子迎冬於北堂距邦六里堂髙六尺堂階六等黒稅六乗旂旐尚黒田車載甲號曰助天誅倡之以羽舞之以籥此迎冬之樂也所以迎四時樂養九志於西堂冬養九勝於北堂養後三月而止天子行殺必順天道宋}
