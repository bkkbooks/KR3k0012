  - {type: variant, offset: 4, length: 0, content: '', WYG: 宗迎氣禮記月令曰孟春立春之月天子親帥三公九卿大夫迎春于東}
  - {type: variant, offset: 4, length: 0, content: '', krp: 宗迎氣禮記月令曰孟春立春之日天子親率三公九卿大夫迎春於東}
  - {type: variant, offset: 5, length: 1, content: 丘, SBCK: 蔡邕章句曰迎春者禮昊天句芒之神也於東郊就其位也邑外爲郊去邑八里内因木數也周禮建國之神位兆五帝於四郊以蒼珪禮東方以赤璋禮南方以白琥禮西方以玄璜禮北方皆有牲幣各放其方之色樂奏太蔟歌青陽冕執于戚舞雲翹育命所以導牧時和也孟夏迎夏於南郊章句曰迎夏者禮炎帝祝融神也於南郊七里因火數也王用赤璋牲幣各放其色樂奏中宫歌朱明其他皆如孟春也孟秋迎秋於西郊章句曰迎秋者禮少昊蓐收之神於西郊九里因金數也玉用白琥牲幣各放其色樂奏夷則歌自藏其他如孟夏之禮孟冬迎冬於北郊章句曰迎冬者禮顓頊玄冥之神也於北郊六里水數玉用􅀇牲幣各放其色樂奏應鍾歌􅀇英其祀皆如孟秋之禮續漢書禮儀志曰立春之日百官皆衣青迎氣青郊郡縣皆青服幘立青幡施土牛耕人於門外以示兆民立夏之日百官皆衣赤迎氣赤郊立秋之日百官皆衣白迎氣白郊立冬之日百官皆衣皂迎氣黒郊又􅀕祀志曰縣邑常以立春之日皆青幡青幘迎春於郭外令一童男帽青巾衣先在郭外迎春者至自野中岀迎者拜之而還皇覽禮天子迎四節日天子迎春夏秋冬之樂又順天道是故距冬至日四十六日則天子迎春於東堂距􅀖八里堂髙八尺堂階八等青稅八乗旂旐}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_528-1b}
  - {type: variant, offset: 5, length: 5, content: 丘尚書召誥, WYG: 蔡邕章句}
  - {type: variant, offset: 5, length: 1, content: 丘, krp: 蔡邕章句曰迎春者禮昊天句芒之神也於東郊就其位也邑外爲郊去邑八里内因木數也周禮建國之神位兆五帝於四郊以蒼珪禮東方以赤璋禮南方以白琥禮西方以玄璜禮北方皆有牲幣各放其方之色樂奏太蔟歌青陽冕執于戚舞雲翹育命所以導牧時和也孟夏迎夏於南郊章句曰迎夏者禮炎帝祝融神也於南郊七里因火數也王用赤璋牲幣各放其色樂奏中宫歌朱明其他皆如孟春也孟秋迎秋於西郊章句曰迎秋者禮少昊蓐收之神於西郊九里因金數也玉用白琥牲幣各放其色樂奏夷則歌自藏其他如孟夏之禮孟冬迎冬於北郊章句曰迎冬者禮顓頊玄冥之神也於北郊六里水數玉用玄牲幣各放其色樂奏應鍾歌玄英其祀皆如孟秋之禮續漢書禮儀志曰立春之日百官皆衣青迎氣青郊郡縣皆青服幘立青幡施土牛耕人於門外以示兆民立夏之日百官皆衣赤迎氣赤郊立秋之日百官皆衣白迎氣白郊立冬之日百官皆衣皂迎氣黒郊又祭祀志曰縣邑常以立春之日皆青幡青幘迎春於郭外令一童男帽青巾衣先在郭外迎春者至自野中岀迎者拜之而還皇覽禮天子迎四節日天子迎春夏秋冬之樂又順天道是故距冬至日四十六日則天子迎春於東堂距邦八里堂髙八尺堂階八等青稅八乗旂旐}
  - {type: xml-element, offset: 6, content: '', id: KR3k0012_CHANT_528-bkkxmlele2}
  - {type: xml-element, offset: 6, content: '', id: KR3k0012_CHANT_528-bkkxmlele3}
