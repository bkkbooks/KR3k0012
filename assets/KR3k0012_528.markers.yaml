  - {type: variant, offset: 3367, length: 364, content: 明堂以配上帝江表傳曰群臣以孫權未郊祀奏議曰頃者嘉瑞屢臻遠國慕義宜備郊祀以承天意權曰郊祀當於中土今非其所於何施此重奏曰普天之下莫非王土王者以天下為家周文武郊酆鄗非必中土權曰武王伐紂即作鄗京而郊其所也文王未為天子立郊于酆見何經典復奏曰伏見漢書郊祀志匡衡奏徙甘泉河東郊於長安言文王郊於酆權曰文王德性謙讓處諸侯之位明未郊也經傳無明文匡衡俗儒臆說非典籍正義不可用志林曰吳主糾駮郊祀之奏追貶匡衡謂之俗儒凡在見者莫不慨然以為妙盡物理達於事宜至於稽之典籍乃更不通毛氏之說云堯見天因以邰而生后稷故國之於邰命使事天故詩曰后稷肇祀庶無罪悔以迄于今言自后稷以來皆得祭天猶魯人郊祀也是以棫樸之作有積燎之薪文王郊酆經有文匡衡豈俗而柱之哉文王雖未為天子然三分天下有二伐崇龕黎祖伊奔告天既棄殷乃眷西顧太伯三讓以有天下文王為王於義何疑然則匡衡之奏有所未盡案世宗立, SBCK: ''}
