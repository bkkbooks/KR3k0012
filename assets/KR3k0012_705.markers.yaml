  - {type: variant, offset: 1498, length: 1074, content: 都門外官奴帝後知腰斬之拾遺錄曰蘇秦張儀二人假食於路剝樹皮為囊以盛天下良書又曰燕昭王夢西方羽人從雲中來曰大王精智未開求恒生久視之觀不可得也以指畫王心應手而裂王乃驚悟血濕於襟王復見所夢人曰本欲易王之心乃出方寸綠囊囊中有續脈石名丸補血精散摩王之臆俄而即愈又曰石虎為浴臺皆用鍮石珷玞為隄岸或以虎魄車渠為缾杓夏則自渠水以內池池中皆紗縠為囊盛百雜香漬於水裏王肅喪服要記曰昔魯哀公祖載其父孔子問曰寧設五穀囊乎哀公曰五穀囊者起伯夷叔濟讓國不食周粟而餓首陽之山恐魂乏飢故作五穀囊吾父食味含哺而死何以此為國語曰吳王殺申胥盛以鳲鴺而投之於江鳲鴺革囊春秋後語曰趙王使平原君入楚求其從約其客有文武者二十人偕得十九人未有可以備二十者毛遂請行平原君曰賢士處世譬如錐之處囊其鋒立見今先生處勝門下三年無所聞是先生無所能也遂曰臣乃今日請處囊中耳若早處囊中乃頴脫而出非特末見也平原乃許與偕江表傳曰魏太祖與馬超單馬會語超負其多力嘗置六斛米囊東西走馬輒製米囊以量太祖輕重太祖尋知之曰幾為狡虜所欺漢武內傳曰帝見三母有一卷書盛以紫錦之囊母曰此吾真形圖也曹暪傳曰操性佻易自佩小鞶囊盛手巾細物益部耆舊傳曰閻憲字孟度為綿竹令男子杜成行於路得遺裝囊開視有錦帛二十五疋明送詣吏汝南先賢傳曰范滂被詰受幾許贓賕滂曰曾為北部督郵汝陽令有記囊表裹六尺若以此為贓贓直六十耳郭文舉別傳曰文舉河內人也懷帝未濟江至餘杭市賣箭箬易鹽米以樹皮作囊得米鹽以內囊中裴淵廣州記曰州廳事梁上畫五羊象又作五穀囊隨象懸之云昔高固為楚相五年衘穀萃於楚庭因是圖其象荊楚歲時記八月民俗以錦綵為眼明囊記曰赤松子此日以囊承柏樹下露以為相貽或以金薄為之遞相餉遺幽明錄曰習鑿齒為荊州主簿從桓宣武出獵見黃物射之即死是老雄狐臂帶絳綾香囊又曰廣陵韓略將下馬覺鞭重見有綠錦囊中有短卷書著鞭鞘皆不知所從來開視之故穀紙祝經乃世之常聞也異苑曰信安鄭微年少時見人遺一囊云中有物欲碎便為凶兆微密開看乃是一挺炭意甚祕之年八十病篤語子弟云吾齒老矣可試啟此囊見炭悉碎折於是遂死趙一秦客詩曰文籍雖滿腹不如一囊錢宋劉義恭啟曰垂賜金虎魄茱萸囊七寶校裝玉眼明囊帊幞通俗文曰帛三幅曰帊帊衣曰幞職官曰尚書郎入直中宮供青縑曰綾幞晉中興書曰陸納為吳興太守徵拜左右尚書臨發止留被幞餘悉還官梁書曰張譏幼喪母有錯綵絲經帕即母之遺製及有所識家人具以告之每歲時輒對帕哽咽不能自勝南史曰關康之寓居南平昌特進顏延之等當時名士十許人入山候之見其散髮被黃布帊而臥了不相眄延之等咨嗟而退不敢干也北史曰後魏元文既專政於禁中自作別庫掌握之珍寶充牣其中又曾臥婦人於食輿以帊覆之令人輿入禁內出亦如之直衛雖知無敢言者東宮, SBCK: 宫}
