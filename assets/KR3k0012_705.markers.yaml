  - {type: variant, offset: 1225, length: 272, content: 晉中經簿曰盛書皁縹囊書函中皆有香囊二世說曰謝玄年少時好著紫羅香囊垂覆手太傅患之而而不欲傷其意乃鐍與戲賭得即燒之語林曰劉承胤少有淹雅之度王庾溫公皆素與周旋聞其至共載看之劉倚被囊了不與王公言神味亦不相酬俄頃賓退王庾甚怪此意未能解溫曰承胤好賄被下必有珍寶當有市井事令人視之果見向囊皆珍玩焉與胡父諧賈諧賈貲鬻又曰石崇廁內兩婢持錦囊是籌也俗說曰何承天顏延年俱為郎何問顏曰藿囊是何物顏荅曰此當復何解耶蒮囊將是卿言腹中無所有純是藿此是世俗相調之辭也西京雜記曰惠帝與趙王同寢處后殺之不得後帝早獵后命力士於被中搤殺之乃死呂后不信以綠囊盛之載以小軿車入見厚賜之力士, SBCK: ''}
