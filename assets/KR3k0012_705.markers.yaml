  - {type: variant, offset: 196, length: 388, content: 決壅水大至急擊殺龍且戰國策曰荊軻逐秦王時侍醫夏無且以樂囊提軻提抵擊也漢書曰陸賈使尉佗佗賜賈囊中裝直千金又曰東方朔曰侏儒長三尺奉一囊粟錢二百四十朔長九尺餘亦一囊粟錢二百四十侏儒飽欲死臣朔飢欲死又曰楊王孫病且終先令其子曰吾欲臝葬以反吾真死則為布囊盛入地七尺既下從兄脫其囊以身親士又東方朔傳曰文帝集上書囊以為殿帷又曰張安世持囊簪筆事孝武數十年見謂忠謹囊擊橐也近臣負也又曰邴吉馭吏嘗知邊塞吏出適見驛持赤白囊邊郡發犇命書馳來至虜入雲中代郡遽歸府見吉白狀又曰成帝許美人乳詔使婢嚴持乳醫及藥篋至美人所後詔使嚴持綠囊書與許美人告嚴曰美人當有以予女受來置飾室中美人葦篋一合盛所生兒死緘封及綠囊報書予嚴又曰王陽好車馬衣服鮮明而遷徙轉移所載不過囊橐時人怪其奢伏其儉故俗傳王陽能作黃金東觀漢記曰岑彭與吳漢圍隗囂壅谷水以縑囊盛土為堤灌西城後漢書張湛傳曰光武嘗召見諸郡計吏問前後守令能否蜀郡計掾樊顯曰漁陽, SBCK: ''}
