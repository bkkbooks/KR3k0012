  - {type: variant, offset: 2581, length: 5, content: 絳綾裹幞帊, SBCK: 􅃮馬齒書簏金裝綵花簏古詩曰交文象牙簏婉轉青絲繩篋左傳昭四曰叔鮒求貨於衛滛芻蕘者衛人使屠伯饋叔向羮與一篋錦春秋後語曰魏文侯命樂羊將攻中山三年而抜之樂羊反而論功文侯示之謗書一篋漢書曰張安丗字子孺以父任爲郎用善書給事尚書精力於職上行幸河東嘗亡書三篋詔問莫能知唯安丗識之具作其事後購求得書以相校無遺失魏志曰胡質爲荆州刺史薨無餘財唯有賜衣書篋而巳晉書曰張華身死之日家無遺財有文史溢于几篋太平御覽卷第七百}
  - {type: page-break, offset: 2581, content: '', id: KR3k0012_SBCK_705-2a}
  - {type: variant, offset: 2581, length: 5, content: 絳綾裹幞帊, WYG: 漆馬齒書簏金裝彩花簏古詩曰交工象牙簏婉轉青絲繩篋左傳昭四曰叔鮒求貨於衛淫芻蕘者衛人使屠伯饋叔向羮與一篋錦春秋後語曰魏文侯命樂羊將攻中山三年而拔之樂羊反而論功文侯示之謗書一篋漢書曰張安世字子儒以父任用為郎善事給事尚書精力于職上行幸河東嘗亡書三篋詔問莫能知者惟安世識之且作其事後購求得書以相校無遺失魏志曰胡質為荆州刺史薨無餘財惟有賜書衣篋而已晉書曰張華身死之日家無遺財有文史溢於几篋太平御覽卷七百}
