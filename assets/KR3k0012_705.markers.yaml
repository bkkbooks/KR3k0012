  - {type: variant, offset: 585, length: 312, content: 守張堪昔在蜀仁以惠下威能討姦前公孫述破時珍寶山積捲握之物足富十世而堪去職之日乘折轅車布被囊而已范曄後漢書曰楊琁為零陵太守以緋囊盛石灰於車上繫布索於馬尾會戰從風鼓灰賊不得視因以火燒布布燒馬驚奔突賊陣又曰和熹鄧后臨朝杜根以安帝長宜親政事乃上書直諫太后怒收根盛以縑囊撲殺之執法者以根知名私語行事人使不加力而載出城外根得蘇典略曰馬略為司隸督軍從事討郭援為飛矢所中乃以囊褁其足而戰斬援首詔拜徐州剌史魏略曰大秦國王有五宮相去各十里王一旦至一宮聽事止宿明旦復至一宮遍而還出行常以一韋囊自隨有上言者收辭囊中還宮乃省之吳錄曰步騭表言北降王潛等說北箱部伍圖以東向多作布囊欲以盛沙塞江孫權見呂範諸葛恪云每讀騭表輒獨失笑此江與開闢俱生寧有可囊塞埋乎, SBCK: 祖繇是疑焉}
