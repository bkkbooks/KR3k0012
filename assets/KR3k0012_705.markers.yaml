  - {type: variant, offset: 331, length: 588, content: 親士又東方朔傳曰文帝集上書囊以為殿帷又曰張安世持囊簪筆事孝武數十年見謂忠謹囊擊橐也近臣負也又曰邴吉馭吏嘗知邊塞吏出適見驛持赤白囊邊郡發犇命書馳來至虜入雲中代郡遽歸府見吉白狀又曰成帝許美人乳詔使婢嚴持乳醫及藥篋至美人所後詔使嚴持綠囊書與許美人告嚴曰美人當有以予女受來置飾室中美人葦篋一合盛所生兒死緘封及綠囊報書予嚴又曰王陽好車馬衣服鮮明而遷徙轉移所載不過囊橐時人怪其奢伏其儉故俗傳王陽能作黃金東觀漢記曰岑彭與吳漢圍隗囂壅谷水以縑囊盛土為堤灌西城後漢書張湛傳曰光武嘗召見諸郡計吏問前後守令能否蜀郡計掾樊顯曰漁陽太守張堪昔在蜀仁以惠下威能討姦前公孫述破時珍寶山積捲握之物足富十世而堪去職之日乘折轅車布被囊而已范曄後漢書曰楊琁為零陵太守以緋囊盛石灰於車上繫布索於馬尾會戰從風鼓灰賊不得視因以火燒布布燒馬驚奔突賊陣又曰和熹鄧后臨朝杜根以安帝長宜親政事乃上書直諫太后怒收根盛以縑囊撲殺之執法者以根知名私語行事人使不加力而載出城外根得蘇典略曰馬略為司隸督軍從事討郭援為飛矢所中乃以囊褁其足而戰斬援首詔拜徐州剌史魏略曰大秦國王有五宮相去各十里王一旦至一宮聽事止宿明旦復至一宮遍而還出行常以一韋囊自隨有上言者收辭囊中還宮乃省之吳錄曰步騭表言北降王潛等說北箱部伍圖以東向多作布囊欲以盛沙塞江孫權見呂範諸葛恪云每讀騭表輒獨失笑此江與開闢俱生寧有可囊塞埋乎王隱晉書曰棗嵩用事於王浚時謠曰十囊五囊入棗郎, WYG: 映簏}
