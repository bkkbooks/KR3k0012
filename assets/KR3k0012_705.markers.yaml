  - {type: variant, offset: 975, length: 214, content: 書九卷與之璞由是洞曉其術宋書曰吳郡人陳遺少為郡吏母好食鐺底飯遺在役恒帶一囊每煮食輒錄其燋以貽母陳書曰後主怠於政事每啟奏後主倚隱囊置張貴妃於膝上共決之隋書曰張虔威嘗在塗見一遺囊恐其主求失因令左右負之而行後數日物主來認悉以付之莊子曰人而不學命之曰視皮學而不行命之曰輒囊輒繫又曰將為胠篋探囊發匱之盜而為守備則必攝緘縢固扄鐍此世俗所謂智也然巨盜至則負匱揭篋擔囊而趨唯恐緘縢之不固也淮南萬畢術曰鴻毛囊之可以渡江盛鴻毛滿囊可渡江不溺也東宮舊, SBCK: 有故絮脩復山陵故}
