  - {type: variant, offset: 2030, length: 1, content: 郝, SBCK: 呉良字太儀齊國臨淄人以清白方正稱於郷里爲郡議曹􅁺正旦􅁺入賀太守門下􅁺王望前言曰齊郡敗亂遭離盗賊人民飢餓不聞鷄鳴狗吠之音明府視事五年土地開闢盗賊滅息五􅂖豊熟家給人足今日嵗首誠上雅壽􅁺皆稱萬􅀊良跪曰門下􅁺佞謟明府無受其觴盗賊未弭人民困乏不能家給人足於今議曹􅁺尚無袴寧爲家給人足􅁘太守曰此生言是遂不舉觴賜鰒魚百枚宴罷教署功曹良耻以言受官不拜又曰申屠剛字巨卿扶風人性剛直忠正志節抗厲常慕史鰌汲黯之爲人渉獵書記果於行義元始中舉賢良對䇿言甚切直建武􅀄徴拜侍御史遷尚書令謇謇多直無所屈撓時隴蜀未平上甞欲近出剛諌上不聽剛以頭軔乗輿車輪馬不得前謝承後漢書曰李爕爲議郎㑹西羗及邊章轉遂作亂隴右徴發天下役賦無巳司徒崔烈以爲冝弃凉州爕厲色言曰斬司徒天下安尚書郎楊賛奏爕廷辱大臣帝以問爕爕曰凉州天下衝要國家藩衛今牧御失和使一州叛逆烈爲宰相不念爲國思所以弭之之䇿乃欲割弃一方萬里之土臣竊惑之􅀂烈不知之是極蔽也知而故言是不忠也帝從爕議由是朝廷重其方略每公卿有缺爲衆議所歸又曰范滂字孟􅀶汝南人太宗守資署功曹滂外甥西平李頌頑嚚濁穢郷曲所弃常侍唐衡求属仕宦資勑曹召署文學史滂不聽極乆衡復有書誚資資怒召功曹書佐朱零問不召頌意􅃺零以告滂滂謂曰􅀂荅敎當言頌則滂之姊}
