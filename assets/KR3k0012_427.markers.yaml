  - {type: 'tls:seg', offset: 21, content: '', id: KR3k0012_CHANT_427-1a.6}
  - {type: variant, offset: 26, length: 4, content: 也為晉平, SBCK: 口吃又盛怒曰臣雖口不能言然臣知其不可陛下欲廢}
  - {type: variant, offset: 26, length: 1, content: 也, WYG: 吃又盛怒曰臣口不能言然臣心知其不可陛下欲廢太子臣期期不奉詔上欣然而笑即罷吕后側耳於東廂聽見昌}
