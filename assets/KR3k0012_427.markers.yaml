  - {type: variant, offset: 18, length: 7, content: 字伯奮琅琊臨沂, SBCK: 昌甞入奏事髙帝方擁戚􅁎昌退走髙帝退還􅀐昌項問曰我何如主昌仰曰陛下即桀紂之主也於是上􅀏之然尤憚昌及髙帝欲廢太子而立戚􅁎子如意爲太子群臣固爭莫能得而昌廷爭之上問其􅀃昌爲}
  - {type: page-break, offset: 18, content: '', id: KR3k0012_SBCK_427-2a}
  - {type: variant, offset: 18, length: 7, content: 字伯奮琅琊臨沂, WYG: 昌嘗入奏事髙帝方擁戚姬昌退走髙帝逐得騎昌項問曰我何如主也昌仰曰陛下即桀紂之主也於是上笑之然尤惮昌及髙帝欲廢太子而立戚姬子如意為太子大臣固争莫能得而昌廷爭之强上問其說昌為}
  - {type: variant, offset: 18, length: 7, content: 字伯奮琅琊臨沂, krp: 昌甞入奏事髙帝方擁戚姬昌退走髙帝退還騎昌項問曰我何如主昌仰曰陛下即桀紂之主也於是上笑之然尤憚昌及髙帝欲廢太子而立戚姬子如意爲太子群臣固爭莫能得而昌廷爭之上問其說昌爲}
