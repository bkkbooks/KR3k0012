  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書太平御覽卷四百二十七宋李昉等撰}
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_427-1a, image: WYG0896/WYG0896-0721a.png}
  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第四百二十七}
  body:
  - {type: variant, offset: 5, length: 3, content: 七清廉, SBCK: 八正直上易坤卦曰六二直方大不習無不利直方地之性也又曰夫軋其静也專其動也直是以廣生焉尚書皐陶謨曰直而温又洪範曰無反無側王道正直又曰三德一曰正直毛詩緇衣羔裘曰彼其之子􅀖之司直又谷風小明曰靖共尓位好是正直神之聽之介爾景福左傳襄元曰恤民爲德正直爲正正曲爲直叅和爲仁又昭四仲尼曰叔向古之遺直也事具刑法門論語爲政曰哀公問何爲則民服孔子對曰舉直措諸枉則民服舉枉措諸直則民不服措猶投也諸之也言投之於上位也又曰業公曰吾黨有直躬者其父攘羊而子證之攘盗也我郷黨有直人名躬父盗羊則證其罪孔子曰吾黨之直者異於是父爲子隱子爲父隱直在其中矣又衛靈公曰直哉史魚􅀖有道如矢􅀖無道如矢史魚衛大夫名鰌君有道無道行常如矢直不曲也又微子曰栁}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_427-1b}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 八正直上易坤卦曰六二直方大不習無不利直方地之性也又曰夫乾其静也專其動也直是以廣生焉尚書臯陶謨曰直而温又洪範曰無反無側王道正直又曰三徳一曰正直毛詩緇衣羔裘曰彼其之子邦之司直又小雅小明曰靖共爾位好是正直神之聽之介爾景福左傳襄}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_427-1b, image: WYG0896/WYG0896-0721b.png}
  - {type: variant, offset: 5, length: 3, content: 七清廉, krp: 八正直上易坤卦曰六二直方大不習無不利直方地之性也又曰夫軋其静也專其動也直是以廣生焉尚書皐陶謨曰直而温又洪範曰無反無側王道正直又曰三德一曰正直毛詩緇衣羔裘曰彼其之子邦之司直又谷風小明曰靖共尓位好是正直神之聽之介爾景福左傳襄元曰恤民爲德正直爲正正曲爲直叅和爲仁又昭四仲尼曰叔向古之遺直也事具刑法門論語爲政曰哀公問何爲則民服孔子對曰舉直措諸枉則民服舉枉措諸直則民不服措猶投也諸之也言投之於上位也又曰業公曰吾黨有直躬者其父攘羊而子證之攘盗也我郷黨有直人名躬父盗羊則證其罪孔子曰吾黨之直者異於是父爲子隱子爲父隱直在其中矣又衛靈公曰直哉史魚邦有道如矢邦無道如矢史魚衛大夫名鰌君有道無道行常如矢直不曲也又微子曰栁}
  - {type: xml-element, offset: 6, content: '', id: KR3k0012_CHANT_427-bkkxmlele1}
  - {type: 'tls:seg', offset: 6, content: '', id: KR3k0012_CHANT_427-1a.1}
  - {type: 'tls:seg', offset: 6, content: '', id: KR3k0012_CHANT_427-1a.2}
  - {type: variant, offset: 6, length: 2, content: 清廉, WYG: 曰恤民為徳正直為正正曲為直叅和為人又昭四仲尼曰叔向古之遺直也事具刑法門論語為政曰哀公問何為則民服孔子對曰舉直錯諸枉則民服舉枉錯諸直則民不服錯猶投也諸之也言投於上位也又曰葉公曰吾黨有直躬者其父攘羊而子證之攘盗也我鄉黨有直人名躬父盗羊則証其罪孔子曰吾黨之直者異於是父為子隠子為父隠直在其中矣又衛靈公篇直哉史魚邦有道如矢邦無道如矢史魚衛大夫名鰌君有道無道行常如矢直不曲也又㣲子篇柳}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_WYG_427-2a, image: WYG0896/WYG0896-0721c.png}
