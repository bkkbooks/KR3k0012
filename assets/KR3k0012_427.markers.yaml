  - {type: variant, offset: 395, length: 3, content: 賈敦頤, SBCK: 安昌侯張禹以帝師位至特進甚尊重朱雲上書求見公卿在前雲曰今朝廷臣上不能匡主下無以益民皆尸位素飡臣願賜尚方斬馬劒断佞臣一人頭以厲其餘上問誰也對曰安昌侯張禹上大怒曰小臣居下訕上廷辱師傳罪不赦御史將雲下雲攀殿檻檻折雲呼曰臣得下從龍逢比干遊地下足矣未知聖朝何如耳於是左將軍辛慶忌免冠解印綬叩頭殿下曰此臣素著狂直於丗使其言是不可誅其言非固當容之上意然後巳及後當治殿檻上曰勿易因而葺之以旌直言之臣東觀漢記曰戴慿爲侍中數進見問得失上謂慿曰侍中當匡輔國政勿有隱情慿對曰陛下嚴曰朕何用嚴慿曰伏見前太尉西}
