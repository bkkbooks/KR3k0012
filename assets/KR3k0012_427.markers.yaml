  - {type: variant, offset: 2614, length: 317, content: 斛倉不受一粒鍾離意別傳曰意為尚書交恥太守張悝居官貪亂贓踰千金珠璣玩寶乃有石數收贓薄入司農詔悉以珠賜諸尚書尚書皆拜受意獨委珠璣於地不拜受明帝問委珠何也對曰愚聞孔子忍渴不飲盜泉之水曾子還車不入勝母之閭晉其名也今陛下以贓珠賜忠臣以故臣不拜受耳羊祜別傳曰昔有攘羊遺叔向母母埋之後事發撿羊肉盡唯舌存遂以羊舌為氏族祜其後也華陽國志曰何隨字季業除安漢令蜀亡去官時巴土飢荒所在無穀送吏行乏輒取道側民羊隨以綿繫其處使足所取直民視羊見綿相語曰聞何安漢清廉行過從者無糧必能爾耳持綿追還之終不受人為語曰安漢吏取糧令為之償范亭燕書曰皇甫真字楚季安定朝郍人也從輔國恪討檎冉閔即南圍拔鄴石氏舊都城內珍玩寶貨充溢真無所取唯存恤人物收歛圖籍真上䟽曰臣輒以家奴婢五十口馬, SBCK: ''}
