  - {type: variant, offset: 2032, length: 2, content: 廉飢, WYG: 豈不樂其升進頌縁汙穢小人不宜玷塵清朝不敢以位私人是以不召又曰楊竒字公偉𢎞農人為侍中天子所問引經㨿義靡事不對靈帝常問朕何如桓帝對曰陛下躬秉藝文聖才雅操有優先帝禮善慎刑或未之有今天下以陛下准桓帝猶為堯舜比徳者也上不悦其言謂曰竒所謂楊震子孫有強項遺風想死後又當致大鳥也袁山松後漢書曰李膺等下獄獄吏曰諸入獄當祭臯繇以祈福范滂曰曰臯繇古之直臣知滂無罪將理之於天如其有罪祭之何益及訊獄王甫以次詰之滂年少在後越次而前甫曰夫合黨連羣必有盟誓其所謀圖皆何等耶滂曰切聞仲尼之言見善如不及見惡如探湯欲使善齊其清惡惡同其行謂王政之所思不悮反以為黨乃仰天嘆曰古之修善自求多福今之修善身陷大戮死之日願賜一幡埋於首陽山側上不負皇天下不愧夷齊尚書霍諝以黨事無驗表陳赦之范曄後漢書曰髙獲字敬公南陽人與世祖有素舊師事司徒歐陽歙歙下獄當斷獲冠鐵冠帶鉄鎖詣闕請歙帝雖不赦而引見之謂曰敬公朕用子為吏宜改常性獲對曰臣受性於父母}
