  - {type: variant, offset: 399, length: 3, content: 州冤句, SBCK: 椽蔣遵清亮忠孝學通古今陛下納膚受之訴遂致禁錮丗於是爲嚴上怒曰汝南子欲復黨乎慿謝曰臣無蹇諤之節而有狂瞽之言不能以尸伏諌偷生苟活誠慙聖朝上即勑尚書解遵禁錮拜慿虎賁中郎將以侍中兼領之又曰朱暉字文季南陽苑}
