  - {type: variant, offset: 28, length: 2, content: 晉平, WYG: 跪謝曰㣲君}
  - {type: variant, offset: 31, length: 3, content: 守至郡, SBCK: 子臣}
  - {type: variant, offset: 31, length: 136, content: 守至郡期年謂人曰此郡豐壤祿俸常盈吾生資已足豈可久留以妨賢路上表請代時人為王晉平恐富求歸齊春秋曰何敬叔為東海令在縣清廉不受饋夏節忽牋門受餉數日中得米二千餘斛他物稱是悉以代貧民輸租梁書曰范岫每所居官恒以廉潔著稱為長城令時有梓材巾箱至數十年經貴遂不改易在晉陵唯作牙管一雙猶以為費, WYG: 子㡬廢}
