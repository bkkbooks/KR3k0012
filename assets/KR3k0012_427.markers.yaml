  - {type: punctuation, offset: 15, content: 「, id: KR3k0012_CHANT_427-bkkpn4}
  - {type: variant, offset: 15, length: 2, content: 王秀, SBCK: 周昌爲人強力敢直言自蕭曹等皆卑下}
  - {type: variant, offset: 15, length: 2, content: 王秀, WYG: 周昌為人強力敢直言自蕭曹等皆卑下}
  - {type: variant, offset: 15, length: 2, content: 王秀, krp: 周昌爲人強力敢直言自蕭曹等皆卑下}
