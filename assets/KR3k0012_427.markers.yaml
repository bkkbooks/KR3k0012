  - {type: variant, offset: 712, length: 1197, content: 清水見底明鏡照心余之效官必至於此復書於使者乃歸之又曰李懷遠久居榮位而好尚清廉宅舍屋無所增改嘗乘款段馬豆盧欽望謂之曰榮貴如此何不買駿馬乘之荅曰此馬幸免驚蹶無假別求聞者莫不歎伏又曰裴玢為鄜州刺史三年改授山南西道節度使玢歷二鎮頗以公清苦節為政不交權倖不務貢獻蔬食弊衣居處纔避風雨而廩庫饒實百姓安業又曰杜暹在家孝友撫異母弟昱甚厚常以公清勒儉為己任弱冠便自誓不受親友贈遺以終其身初為婺州參軍秩滿將歸州吏以紙萬餘張以贈之暹唯受一百餘悉還之時州寮別者見而歎曰昔清吏受一大錢復何異也家語曰曾子弊衣而耕於魯君聞之而賜邑焉曾子固辭曰吾聞受人者常驕人與人者常驕人縱君不我驕也吾能勿畏乎孔子聞之曰參之言足以全其節說苑同又曰子路問於孔子曰仁人廉士窮則改節乎子曰改節則何以稱仁廉哉孔叢子曰子思居貧其友饋之粟者受三車焉或獻鐏酒束脩子思弗當也或曰子取人粟而辭吾酒是辭少而取多也義則無名介則不全子思曰然伋不幸而貧於財至乃困乏將絕先人之祀夫所以受粟為賙之酒脯則所飲讌也方乏於食而乃飲讌非義也吾豈以為介哉或擔其酒脯以歸韓詩外傳曰鮑焦衣弊膚見挈畚採蔬遇子貢於道子貢問曰吾子何以至於此乎鮑焦曰天下之道德教者眾矣吾何以不至於此吾聞之世不己知而行之不己者是華行也上不己用而干之不正者是毀廉也行華廉毀然且弗舍惑於利者也子貢曰吾聞之非其世者不生其利汙其君者不食其土非其世而採其蔬詩曰溥天之下莫非王土此誰之有哉鮑焦曰於戲吾聞賢者重進而輕退廉者易愧而輕死則棄其蔬而立槁於洛水之上列子曰東方有人焉曰爰旌目將有適也而餓於道孤父之盜曰丘見而下一飧以餔之旌目三餔而後能視曰子何為者也曰我孤父盜人爰旌目曰譆汝非盜耶吾義不食也兩手據地而歐之不出喀喀而死孟子萬章曰陳仲子豈不誠廉士哉居於陵三日不食耳無聞目無見井上有李螬食實者過半矣匍匐往將食之三咽然後耳有聞目有見也李實有虫食之過半避兄離母居於陵又曰伯夷叔齊聖人之清者也聞伯夷叔齊之風貪夫廉懦夫有立志晏子春秋曰景公以五十乘魚賜弦章章歸魚車塞塗撫其御之手曰昔者晏子辭賞以正君故過失不掩今諸臣謟諛以干利吾若受魚是反晏子之義而順謟諛之欲固辭魚不受君子曰弦章之廉晏子之遺行也又曰有工女託於晏子之家者曰婢子東郭之野人願得入身比數於下陳焉晏子曰乃今而後自知吾不肖也古之為政者士農工商異居男女有別而士無邪行女無淫事今僕託國主民而僕必行無清也遂不見韓子曰晉文公出亡箕鄭挈一壺食而從迷而失道與文公相失餓而不敢食及文公反國伐原以為原令呂氏春秋曰古之人非無寶也所寶者異孫叔敖將死屬其子曰我死王必封汝汝毋受利地荊楚之間有寢丘其利少而甚惡可長有也其子受之至今不失淮南子曰曾子立廉不飲盜泉所謂養志者也又曰君子不入市為其挫廉說苑曰孔子見景公景公致廩丘以為養孔子辭不受出謂弟子曰吾聞君子當功以受祿今說景公未之行而賜我廩丘其不知丘亦甚矣遂辭而行又曰子思居於衛縕袍無裏二旬九食田子方使人遺白裘恐其不受因謂之曰吾假人遂忘之吾予人也如棄之子思辭曰伋聞忘予, SBCK: 犯禁觸罪}
