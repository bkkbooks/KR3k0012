  - {type: variant, offset: 2932, length: 291, content: 疋牛四十頭以助軍資物理論曰有呂子義當世清賢士也有舊人往存省嫌其設酒食懷乾糒而往主人榮其降己乃盛為饌義出懷中乾糒求一柸冷水而食之語林曰何公為楊州親親有葬者乞數萬錢而帳下無有楊州常有㮧胡恩切米以賑孤寡乃有千餘萬斛虞存為治中面見道帳下空索求糶此米付帳下何公曰次道義不與其孤寡爭粒世說曰范宣潔行廉約韓豫章遺百疋絹不受稍減遂至一疋既終不肯受韓後與范同載就車中手裂二丈與范云人寧可使婦無禈耶范笑而受之郭子曰庾公為護軍屬桓廷尉為索一柱吏桓後遇見徐寧而知之寧字安期東海人致與庾而稱云是海內清士顏延之廷語曰清者人之正路劉弘教曰錄事巫衛忠清厲節衣食不充賜單復衣各一旦恒令廚食給其家榖三百斛諸吏宜見賢思齊, SBCK: ''}
