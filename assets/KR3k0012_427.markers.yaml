  - {type: variant, offset: 2032, length: 2, content: 廉飢, SBCK: 豈不樂其􅂛進頌縁汙􅁾小人不冝玷塵清朝不敢以位私人是以不召又曰楊竒字公偉􅀪農人爲侍中天子所問引經據義靡事不對靈帝甞問朕何如桓帝對曰陛下躬秉藝文聖才雅藻有優先帝禮善愼刑或未之有今天下以陛下准桓帝猶謂堯舜比德者也上不恱其言謂曰竒所謂楊震子孫有強項遺風想死後又當致大鳥也􅀽山松後漢書曰李膺等下獄獄吏曰諸入獄當􅀕皐繇以祈福范滂曰皐繇古之賢臣知滂無罪將理之於天如其有罪􅀕之何益及訊獄王甫以次詰之滂年少在後越次而前甫曰夫合黨連群必有盟誓其所謀圖皆何等􅁘滂曰竊聞仲尼之言見善如不及見惡如􅊥湯欲使善善齊其情惡惡同其行謂王政之所思不悟反以爲黨乃仰天歎曰古之脩善自求多福今之脩善乃䧟大戮死之日願賜一幡埋於首陽山側上不􅀒皇天下不愧夷齊尚書霍諝以黨事無驗表陳赦之范曄後漢書曰髙􅀗字敬公南陽人與丗祖有素舊師事司徒歐陽歙歙下獄當斷􅀗冠䥫冠帶鈇鑕詣闕請歙帝雖不赦而引見之謂曰敬公朕用子爲吏冝改常性􅀗對曰臣受性於天地父母}
