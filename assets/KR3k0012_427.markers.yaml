  - {type: variant, offset: 9, length: 1, content: 蕭, SBCK: 惠爲士師三黜栁下惠魯大夫展禽食菜栁下謚曰惠士師獄官名黜貶退也人曰}
  - {type: variant, offset: 9, length: 1, content: 蕭, WYG: 惠為士師三黜柳下惠魯大夫展禽食采柳下諡曰惠士師獄官名黜貶退也人曰}
  - {type: variant, offset: 9, length: 1, content: 蕭, krp: 惠爲士師三黜栁下惠魯大夫展禽食菜栁下謚曰惠士師獄官名黜貶退也人曰}
  - {type: variant, offset: 11, length: 2, content: 顯齊, SBCK: 未可以去乎曰直道而事人焉徃而不三黜枉道而事人何必去父母之􅀖漢}
  - {type: variant, offset: 11, length: 2, content: 顯齊, WYG: 未可以去乎曰直道而事人焉往而不三黜枉道而事人何必去父母之邦漢}
