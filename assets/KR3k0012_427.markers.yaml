  - {type: variant, offset: 2568, length: 2, content: 清死, SBCK: 稀出又曰王基字伯輿東萊人爲荆州刺史書戒司馬景王曰許允傅嘏􅀽保崔賛皆一時正士有直質而無流心可與同政事者也景王納其言呉志曰張昭毎朝見言論辝氣壯厲義形於色曽以直言逆旨中否不進見後蜀使來稱蜀德美而群臣莫拒權歎曰使張公在坐彼不折則廢安得復自誇乎明日遣中使勞問因請見昭昭避席曰昔太后桓王不以老臣属陛下而陛下属老臣臣是以思盡臣節以報厚恩􅀂}
