  - {type: variant, offset: 2030, length: 1, content: 郝, WYG: 吴良字大儀齊國臨淄人以清白方正稱於鄉里為郡議曹椽正旦掾入賀太守門下椽王望前言曰齊郡敗亂遭離盗賊人民飢餓不聞鷄鳴狗吠之音明府視事五年土地開闢盗賊滅息五榖豐熟家給人足今日嵗首誠上雅壽掾皆稱萬嵗良跪曰門下掾佞諂明府無受其觴盗賊未弭人民困乏不能家給人足於今議曹掾尚無袴寧為家給人足耶太守曰此生言是遂不舉觴賜鰒魚百枚宴罷教署功曹良耻以言受官不拜又曰申屠剛字巨卿扶風人性剛直忠正志節抗厲常慕史鰌汲黯之為人涉獵書記果於行義元始中舉賢良策言甚切直建武初徴拜侍御史遷尚書令謇謇多直無所屈撓時隴蜀未平上嘗欲近出剛諫上不聽剛以頭軔乘輿車輪馬不得前謝承後漢書曰李爕為議郎㑹西羌及邊章韓遂作亂隴右徴發天下役賦無巳司徒崔烈以為宜棄凉州爕厲色言曰斬司徒天下安尚書郎楊賛奏爕廷辱大臣帝以問爕爕曰凉州天下衝要國家藩衛今牧御失和使一州叛逆烈為宰相不念為國思所以弭之之䇿乃欲割棄一方萬里之土臣切惑之若烈不知之是極弊也知而故言是不忠也帝從爕議由是朝廷重其方畧毎公卿有缺為衆議所歸又曰范滂字孟博汝南人太守宗資署功曹滂外甥西平李頌頑嚚濁穢鄉曲所棄常侍唐衡求屬仕官資勅曹召署文學史滂不聽極乆衡復有書誚資資怒召功曹書佐朱零問不召頌意狀零以告滂滂謂曰若答教當言頌則滂之娣}
