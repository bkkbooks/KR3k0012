  - {type: variant, offset: 386, length: 2, content: 島鴈, WYG: 蟚螖音骨小蟹也生海邉塗中食土一名長卿其有螯偏大者名擁劍一名執火其螯赤故謂之執火也俗謂之越王劍杜寳大業拾遺録曰吴都獻蜜蟹二千頭作如糖蟹法蜜擁劍四瓮擁劍似蟹而小一螯偏大吴都賦所謂烏賊擁劍是也鰌蝥祖台之志怪曰㑹稽山隂東郭氏女先與縣人私通此人估還於縣東靈慈橋女往入船就之因共寝接為設食鰌蝥食畢女將兩鰌蝥上岸去船還来至郭逢人語此女已死乃往省之尚未殯也發衾視之兩手各把一鰌螯嶺表録異曰鰌蛑乃蟹之巨者兩螯差大而有細毛如苔身上八足蝤蝥則足無毛後兩小足薄而濶俗謂之撥棹子與蟹有殊其大如升南人皆呼為蟹有大如小楪子者八月此物與人鬭往往夾殺人也彭螖爾雅曰螖蠌小者蟧螺属見捭蒼或曰即彭螖也似蟹而小滑澤二音晉書曰夏統字仲御㑹稽永興人也幼孤貧養親以孝聞睦於兄弟毎採捃求食星行夜歸或至海邉捉蟛􅒹以資養搜神記曰晉太康四年㑹稽彭螖化為䑕食稻為災崔豹古今注曰彭螖小蟹也一名長卿嶺表録異曰彭螖吳呼為越盖語訛也足上無毛堪食吴越間多以鹽藏而貨於市竭朴臨海異物記曰竭朴大於彭螖殻黒斑有文章螯正赤}
