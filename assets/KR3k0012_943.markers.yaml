  - {type: variant, offset: 1908, length: 487, content: 於使蟹捕鼠蟾諸捕蚤不足以禁奸塞邪亂乃逾滋以艾灼蟹筐上內置穴中迺熱走窮穴適能擒一鼠又曰礠石引鐵蟹之敗漆置蟹漆中則漆敗也雖在明知弗能然也抱朴子曰若蟹之化漆麻之壞酒此不可以理推者也又曰山中稱無腹公子者蟹也又曰兵地生蟹者宜急移軍太一在玉帳之中不可攻也郭子曰畢茂世云一手持蟹螯一手持酒盃拍浮酒池中可了一生哉國語曰越王召范蠡而問焉曰與子謀吳子未可也今其稻蟹食不遺種其可乎范蠡對曰天應至矣謂稻蟹人事未也勤須厲志世說曰蔡司徒渡江見蟛蜞大喜曰蟹有八足加以二螯令烹之既食委頓吐下方知非蟹後向謝仁祖說此事謝曰卿讀爾雅不熟幾為勤學死劉孝標云大戴禮勸學篇曰蟹八足二螯非虵蛆之穴無所寄托者用心躁也故爾雅云螖小者勞即彭螖也似蟹而小按今蟛蜞小於蟹而大於螖爾雅所謂螖澤者也然此三物皆八足二螯狀甚相類蔡謨不精其大小食而致獘故云讀爾雅不熟也永嘉郡記曰安國縣有山鬼形體如人而一腳裁長一尺許好噉鹽伐木人鹽輒偷將去不甚畏人人亦不敢伐木犯之即不利也喜於山澗中取石蟹伺伐木人眠息便十十五五出就火邊跂石炙噉之嘗有伐木人見其如此未眠之前痛燃石使熱羅置火畔便佯眠看之須臾魑出悉皆跂石石熱灼之跳梁叫呼罵詈而去此伐木人家後被燒委頓博, SBCK: ''}
