  - {type: variant, offset: 2573, length: 552, content: 尺宋元嘉中章安縣民屠虎取此蟹食之肥美過常虎其夜夢一少嫗語之曰汝噉我知汝尋被噉不屠氏明日出行為虎所食餘家人殯瘞之虎又發棺噉之肌體無遺此水今猶有大蟹莫敢復犯廣五行記曰元嘉中富陽人姓王於瀆中作蟹斷且往視之見一材頭長二尺許在斷中而裂開蟹出都盡乃治斷出材岸上明旦往視之見材復在斷中而裂開如前王又治斷出材明晨往視所見如初王疑此材妖異乃取籠中檐歸去家一二里聞籠中窣動聲王生顧見向材段變成一物人面猴身一手一足語王生曰我性嗜蟹比實入破君斷食蟹以此相負望君恕我我是山神當相祐助王曰汝犯暴人罪自應死何以多言此物曰君何姓名頻問不已王終不荅去家轉近曰既不放我又不告我姓名當復何許王至家以火焚之土俗謂之山𤢖知人姓名則能為傷人耳又曰軍行地無故生蟹者宜急移吉蟹魚之類水失其性則有此孽嶺南異物志曰嘗有行海得洲渚林木甚茂乃維舟登岸於水傍半炊而林沒於水遽斷其纜乃得去詳視之大蟹也嶺表錄異曰水蟹螯殼內皆鹹水自有味廣人取之淡煮吸其鹹汁下酒黃膏蟹殼內有膏如黃蘇加以五味和殼爆之食亦有味赤母蟹殼內黃赤膏如雞鴨子黃肉白以和膏實其殼中淋以五味蒙以細麵為蟹饆饠珍美可尚紅蟹殼殷紅色巨者可以裝為酒盃也虎蟹殼上有虎班可裝為酒器與紅蟹皆產瓊崖海邊本草經曰蟹味鹹治胸中邪氣熱結痛張敞集曰朱登為東海相遺敞蟹報書曰蘧伯玉受孔氏之賜必及鄉敞謹分斯貺于三老尊行者曷敢獨烹之, SBCK: ''}
