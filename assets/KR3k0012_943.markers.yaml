  - {type: variant, offset: 1077, length: 0, content: '', SBCK: 呉録地理志曰交阯龍編縣有鱟形如惠文冠青黑色十二足似蟹長五寸腹中有子如麻子取以作醬尤美裴淵廣州記曰鱟廣尺餘形如熨斗頭如蜣蜋腹下有十足南人重之以爲鮓南越志曰漲海口有鱟毎過海輒相積於背髙尺餘如㠶乗風而遊嶺表録異曰鱟魚其殻瑩浄滑如青瓷盌􅌯背眼在背上口在腹下青黒色腹兩傍爲六脚有尾長尺餘三稜如㨑莖常雌附雄而行捕者必􅀟得之􅀂摘去雄者雌者即自止背􅀒之方行腹中有子如菉豆南人取之碎其肉脚和以爲醬食之尾中有珠如粟色黄雌者小置之水中即雄者浮雌者沉瑟􅲯}
