  - {type: variant, offset: 1328, length: 0, content: '', SBCK: 今青州呼蝦魚爲鰝音鄗東觀漢記曰馬稜字伯威爲廣陵太守奏罷塩官賑貧羸薄賦稅蝗蟲飛入海化爲魚蝦王隱晉書曰呉後置廣州以南陽􅅬脩爲刺史或語脩蝦長一丈脩不信其人後故至東海取蝦􅂡長四五尺封以示脩脩乃服廣州記亦云金樓子曰舜攝天子有緩耳貫胷之民來獻珠蝦丗􅀃曰虞嘯父爲孝武帝侍中帝從容謂曰卿在閤下􅀄不聞有獻替虞家冨近海謂帝望其意對曰天時尚䁔魚鼈蝦鮓未可致㝷有所獻帝撫掌大􅀏異物志曰蝦種多最大中作脯}
  - {type: page-break, offset: 1328, content: '', id: KR3k0012_SBCK_943-5b}
