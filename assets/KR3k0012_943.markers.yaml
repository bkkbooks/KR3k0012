  - {type: variant, offset: 1326, length: 1, content: 七, SBCK: 三寸如小竹大有甲正黒中食陽遂足臨海水土物志曰陽遂足此物形狀背青黒腹下正白有五足長短大小皆等不知頭尾所在生時躰軟死即乾脆􅡷􅠦上音迷下音麻臨海水􅁟物志曰􅡷􅠦􅔢􅨐相似形大如䕠生渤海邊沙中肉極好噉一枚有三斛膏土肉臨海水土物志曰土肉正黒如小兒臂大長五寸中有腹無口自有三十足如􅁫股大中食蝦爾雅曰鰝大蝦也蝦大者出海中長二三丈鬚長數}
