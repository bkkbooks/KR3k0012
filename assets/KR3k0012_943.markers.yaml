  - {type: variant, offset: 2401, length: 0, content: '', SBCK: 蝦􅂡長四五十尺嶺表録異曰海蝦皮殻嫰紅色就中腦殻與前􅀟脚有鉗者其色如朱余甞曽登海􅔓忽見牎版懸二巨蝦殻頭尾鉗足具全各七八尺首占其一分刺尖利如鋒刃刺上有􅂡如紅筯各長二三尺前􅀟脚上有鉗云以此捉食鉗麁如人大指長三尺餘上有芒刺如薔薇枝赤而銛硬手不可觸腦殻烘透彎環尺餘何止於盃盂也北户録云滕脩爲廣州刺史有客語脩曰蝦􅂡有一丈者堪爲拄杖脩不之信故去東海取􅂡長四丈以示脩方服其異寕蝦大者亦首尾尺餘閩越率取其肉臠而爲炙又渾以塩藏自然紅色謂之紅蝦貢送白蝦肉薄而白瑩如}
  - {type: variant, offset: 2401, length: 0, content: '', WYG: 蝦鬚四五十尺嶺表録異曰海蝦皮殻嫩紅色就中腦殻與前雙脚有鉗者其色如朱余嘗登海􅔓忽見窓版懸二巨蝦殻頭尾鉗足具全各七八尺首占其一分嘴尖如鋒刄嘴上有鬚如紅筯各長二三尺前雙脚有鉗云以此捉食鉗麄如人大指長三尺餘上有芒刺如薔􅅔枝赤而銛硬手不可觸腦殻烘透彎環尺餘何止於盃盂也北户録云滕修為廣州刺史有客語脩曰蝦鬚有一丈者堪為柱杖脩不之信故去東海取鬚長四丈以示脩方服其異寜蝦大者亦首尾尺餘閩越牽取其肉臠而為炙又渾以鹽藏自然紅色謂之紅蝦貢送白蝦肉薄而白瑩如}
  - {type: page-break, offset: 2401, content: '', id: KR3k0012_WYG_943-9b, image: WYG0901/WYG0901-0362d.png}
  - {type: page-break, offset: 2401, content: '', id: KR3k0012_WYG_943-10a, image: WYG0901/WYG0901-0363a.png}
  - {type: variant, offset: 2401, length: 0, content: '', krp: 蝦鬚長四五十尺嶺表録異曰海蝦皮殻嫰紅色就中腦殻與前雙脚有鉗者其色如朱余甞曽登海􅔓忽見牎版懸二巨蝦殻頭尾鉗足具全各七八尺首占其一分刺尖利如鋒刃刺上有鬚如紅筯各長二三尺前雙脚上有鉗云以此捉食鉗麁如人大指長三尺餘上有芒刺如薔薇枝赤而銛硬手不可觸腦殻烘透彎環尺餘何止於盃盂也北户録云滕脩爲廣州刺史有客語脩曰蝦鬚有一丈者堪爲拄杖脩不之信故去東海取鬚長四丈以示脩方服其異寕蝦大者亦首尾尺餘閩越率取其肉臠而爲炙又渾以塩藏自然紅色謂之紅蝦貢送白蝦肉薄而白瑩如}
  - {type: variant, offset: 2402, length: 1, content: 蟲, SBCK: 精廣人偏食之蓋美而毒詢於閩川吴中悉無此􅀋嶺表録異曰南人多買蝦之細者生切綽菜蘭香蓼等用濃醬醋先潑活蝦盖以生菜然以􅀬飲覆其上就口跑之亦有跳出醋揲者謂之蝦生鄙俚重之以爲異饌也王朗荅魏文表曰夫張大網以漉鰌蝦辱九鼎以烹鼃鼂應璩百一詩曰大􅀛承衰弊復欲密其羅蚍蜉猶見得何云鰌與蝦􅁑龔與張季景書曰夜從劉伯宣舎西垂過龔家無飯噉煼蝦海月臨海水土物志曰海月大如鏡白色正圎常死海邊其指如搔頭大中食謝靈運詩曰挂席拾海月玉䖴余招切臨海水土物志曰玉䖴似蚌長二寸廣五寸上大下小其殻中拄炙之味似酒陵龍臨海水土物志曰陵龍之躰黃身四足形短尾長有鱗無角南越嘉羞見之竟逐石矩嶺表録異曰石矩亦章舉之􅀋身小而足長入塩爲乾燒食極美又有小者兩足如帶曝乾後似射踏子故南中呼爲射踏子也玳瑁嶺表録異曰玳瑁形狀如􅀛唯腹背甲有烘􅀧其大者悉似盤蓋本草經云玳瑁解毒兼云辟邪余􅀉居廣南日見盧亭海島夷人獲活玳瑁􅀛一枚以獻連帥嗣薛王王令生取背甲小者二片帶於左臂上以辟毒􅀛􅀍生揭其甲亦甚苦楚後養於使宅後北池伺其揭處漸生復遣盧亭送於海畔或云玳瑁􅀂生帶之有蠱毒玳瑁甲即自揺動􅀂死無此驗蟕􅏲上遵為切下音嶺表録異曰蟕􅏲俗謂之兹夷乃山􅀛之巨者人立其背可􅀒而行産潮循山中鄉人採之取殻以貨要全其殻湏以木楔其肉􅀛吼如牛聲響山谷廣州有巧匠取其甲以爲梳箆盃器之属水母廣志曰水母如羊􅠛在海中常浮聞人聲沉水底可生切食沈懷逺南越志曰海岸間育水母東海謂之蛇音蜡張茂先􅀶物志曰東海有物􅃺如凝血廣數尺正方圎}
