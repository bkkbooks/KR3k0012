  - {type: variant, offset: 2402, length: 4, content: 蟲名剻蛤, WYG: 精廣人偏食之盖美而毒詢於閩川吴中悉無此類嶺表録異曰南人多買蝦之細者生切菜蘭香蓼等用濃醬醋先潑活蝦盖以生菜然後以熟飲覆其上就口封之亦有跳出醋楪者謂之蝦生鄙里重之以為異饌也王朗答魏文表曰夫張大網以漉蝤蝦熱九鼎以烹􅀢鼂應璩百一詩曰大龜既衰弊復欲宻其羅蚍蜉猶見得何云蝤與蝦葛龔與張季景書曰夜從劉伯宣舍西垂過龔家無飯噉􅀈蝦海月臨海水土物志曰海月大如鏡白色正圓常死海邉其指如搔頭大中食王䖴余招切臨海水土物志曰玉䖴如蜂長二寸廣五寸上大下小其殻中拄炙之味似酒陵龍臨海水土物志曰陵龍之體黄身四足形短尾長有鱗無角為南越嘉羞石矩嶺表録異曰石矩亦章舉}
  - {type: page-break, offset: 2402, content: '', id: KR3k0012_WYG_943-10b, image: WYG0901/WYG0901-0363b.png}
