  - {type: variant, offset: 386, length: 2, content: 島鴈, SBCK: 蟚螖音滑小蟹也生海邊塗中食土一名長卿其有螯偏大者名擁劒一名執火其螯赤故謂之執火也俗謂之越王劒杜寳大業拾遺録曰呉郡獻蜜蟹二千頭作如糖蟹法蜜擁劒四擁劒似蟹而小一螯偏大呉都賦所謂烏賊擁劒是也鰌蝥祖台之志怪曰㑹稽山隂東郭氏女先與縣人私通此人買還於縣東靈慈橋女徃入船就之因共寢爲設食食蝥食畢女將兩鰌蝥上岸去船還來至郭逢人語此女巳死乃徃省之尚未殯也發衾視之兩手各把一鰌蝥嶺表録異曰蝤蛑乃蟹之巨者異者兩螯上有細毛如苔身有八足蝤蛑則螯足無毛後兩小足薄而闊俗謂之撥掉子與蟹有殊其大如􅂛南人皆呼爲蟹有大如小楪子者八月此物與人闘徃往夾殺人也彭螖爾雅曰螖蠌小者蟧螺属見捭蒼或曰即彭螖也似蟹而小滑澤二音晉書曰夏統字仲御㑹稽永興人也㓜􅀌貧養親以孝聞睦於兄弟毎採捃求食星行夜歸或至海邊拘蟛􅒹以資養捜神記曰晉太康四年㑹稽彭螖化爲䑕食稻爲災崔豹古今注曰彭螖小蟹也一名長卿嶺表録異曰蟛螖吴呼爲越蓋語訛也足上無毛堪食呉越間多以塩藏貨於市竭朴臨海異物記曰竭朴大於彭螖殻黒斑有文章螯正赤}
