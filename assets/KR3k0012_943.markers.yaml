  - {type: punctuation, offset: 41, content: 「, id: KR3k0012_CHANT_943-bkkpn20}
  - {type: variant, offset: 44, length: 237, content: 蛤東越則海際蛤文蛤三國典略曰周天和元年夏齊冀州人於蚌蛤中得瑤環一隻又曰徐之才初遷豫章王綜國常侍隨綜入背有一人患足跟痛諸醫咸莫能識之才視之曰蛤精疾也得之當由乘船入海垂腳入水中疾者曰實曾如此之才為剖之得蛤子二大如榆莢淮南子曰土龍致兩鷰鷰鴈代飛鷰春南而鴈秋北也蛤蚌珠龜與月盛衰呂氏春秋曰月者群陰之本月望則蚌蛤實群陰盈月晦則蚌蛤虛群陰湫夫月形于天而群陰化乎淵漢武帝內傳曰西王母云仙家之藥有白水靈蛤汝南先賢傳曰周燮字彥祖好潛靖養志唯典籍是樂有仙人草廬廬下有陂魚蛤生非身所耕則不食也南越, SBCK: 鏡擁劒廣}
