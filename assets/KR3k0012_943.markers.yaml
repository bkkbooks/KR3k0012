  - {type: variant, offset: 2402, length: 4, content: 蟲名剻蛤, krp: 精廣人偏食之蓋美而毒詢於閩川吴中悉無此類嶺表録異曰南人多買蝦之細者生切綽菜蘭香蓼等用濃醬醋先潑活蝦盖以生菜然以熱飲覆其上就口跑之亦有跳出醋揲者謂之蝦生鄙俚重之以爲異饌也王朗荅魏文表曰夫張大網以漉鰌蝦辱九鼎以烹鼃鼂應璩百一詩曰大龜承衰弊復欲密其羅蚍蜉猶見得何云鰌與蝦葛龔與張季景書曰夜從劉伯宣舎西垂過龔家無飯噉煼蝦海月臨海水土物志曰海月大如鏡白色正圎常死海邊其指如搔頭大中食謝靈運詩曰挂席拾海月玉䖴余招切臨海水土物志曰玉䖴似蚌長二寸廣五寸上大下小其殻中拄炙之味似酒陵龍臨海水土物志曰陵龍之躰黃身四足形短尾長有鱗無角南越嘉羞見之竟逐石矩嶺表録異曰石矩亦章舉}
  - {type: variant, offset: 2404, length: 2, content: 剻蛤, SBCK: 曰水母無頭目所處則衆蝦附}
