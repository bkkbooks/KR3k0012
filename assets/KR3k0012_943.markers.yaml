  - {type: variant, offset: 2409, length: 0, content: '', SBCK: 嶺表録異曰水母廣州謂之水母閩人謂之䖳癡駕切}
  - {type: variant, offset: 2409, length: 0, content: '', WYG: 玳瑁嶺表録異曰玳瑁形狀如龜唯腹背甲有班㸃}
  - {type: variant, offset: 2409, length: 0, content: '', krp: 玳瑁嶺表録異曰玳瑁形狀如龜唯腹背甲有烘點}
  - {type: variant, offset: 2410, length: 0, content: '', SBCK: 形乃渾然凝結一物有淡紫色者大如覆帽小者如盌腹下有物如懸絮俗謂之足而無口眼常有數十蝦􅀉腹下咂食其涎浮汎水上捕者或遇之即歘然而没乃是蝦有所見耳越絶書云海鏡蟹爲腹水母即蝦爲目也南中好食之海鏡嶺表録異曰海鏡廣人呼爲膏葉盤兩片合以成形殻圎中甚瑩滑日照如雲母光内有少肉如􅑕胎腹}
  - {type: variant, offset: 2410, length: 0, content: '', WYG: 大者悉似盤盖本草經曰玳瑁觧毒兼云辟邪余所居廣南日見盧亭海島夷人獲活玳瑁龜一枚以獻連帥嗣薛主王令生取甲小者三片帶於左臂上以辟毒龜被生揭其甲亦甚苦楚後養於使宅後北池伺其揭處漸生後遣盧亭送於海畔或云玳瑁若生帶之有蟲毒玳瑁甲即自揺動若死無此騐蟕􅏲上遵為切下音擕嶺表録異曰蟕􅏲俗謂之滋夷乃山龜之巨者人立其背可負而行産潮循山中鄉人採之取殻以貨金其殻須以木楔其肉龜吼如牛聲響山谷廣州有巧匠取其甲以為梳笓盃器之屬水母廣志曰水母如羊胃在海中常浮聞人聲沉水底可生切食沈懐逺南越志曰海岸間有水母東海謂之䖳音蜡張茂先博物志曰東海有物狀如凝血廣􅂾尺正方圎名曰水母無頭目所處則衆蝦附之隨其東西南北可煑食之異物志曰水母在海汎汎常浮其體正白常在水上浮也嶺表録異曰水母廣州謂之水母閩人謂之䖳癡駕切其形乃渾然一物有淡紫色大者如覆帽小者如盌腹下有物如懸絮俗謂之足而無口眼常有數十蝦寄腹下咂食其涎浮沉於水捕者或遇之即歘然而沒乃是蝦有所見耳越絶書云海鏡以蟹為腹水母以蝦為目也南中好食之海鏡嶺表録異曰海鏡廣人呼為膏葉盤兩片合以成形殻圎中甚瑩滑日照如雲母光内有少肉如蚌蛤腹}
