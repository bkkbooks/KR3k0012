  - {type: variant, offset: 2407, length: 1, content: 類, SBCK: 隨其東西南北可煑食之異物志曰水母在海汎汎常浮其躰正白常在水上浮}
  - {type: variant, offset: 2408, length: 0, content: '', WYG: 身小而足長入鹽為乾燒食極美又有小者两足如帶曝乾後似射踏子故南中呼為射踏子}
