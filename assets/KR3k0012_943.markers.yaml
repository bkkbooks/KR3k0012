  - {type: variant, offset: 1575, length: 319, content: 即甚壅腸胃蜆爾雅曰蜃小者曰珧郭璞注曰新燕蛤也江東呼為蜆也蟹廣雅曰蟹蚭音尼也其雄曰蜋螘其雌曰轉帶山海經曰大蟹在海中蓋十里之蟹又女丑有大蟹廣千里汲冢周書王會曰成王時海陽獻蟹大戴禮曰蟹二螯八足非鱣之穴而無所寄托者心躁也孫卿子同禮記檀弓下曰成人者兄死而不為衰者聞子皋將為成宰遂為之衰成人曰蠶則績而蟹有筐范則冠而蟬有緌兄則死子皋為之衰孝經援神契曰蟹二螯兩端傍行螯猶兵也小蟲而欲兩端自衛故使傍行也晉書曰解系坐免官以白衣還第闔門自守及張華裴頠之被誅也倫秀以宿憾收系兄弟梁王彤救系等倫怒曰我於水中蟹且惡之況此人兄弟輕我耶此而可忍孰不可忍彤苦爭之不得遂害之又曰劉聰左都水使者襄陵王攄坐魚蟹不供斬於東市三國典略曰周永定元年夏四月齊主禁取蟹蛤之類唯許私家捕魚淮, SBCK: 嶺}
