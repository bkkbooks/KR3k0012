  - {type: variant, offset: 1875, length: 406, content: 覺歡又曰徐師子字德威東海人也陳武帝立宗靈大觀引德威為觀主後卒文皇勑齎祕器葬焉太平經曰嚴寄之字靜處丹陽句容人也為道士事親至孝住石渚觀母老不敢遠離乃迎母於觀邊立小屋以盡溫清母終毀痟過禮識者嘉之又曰郗愔字方回高平金鄉人為晉鎮軍將軍心尚道法密自遵行善隸書與右軍相埒手自起寫道經將盈百卷于今多有在者又曰張孝秀以王元規筆跡妙巧頻相請屈元規但翫泉石終日撫琴嘯詠了不執筆臨還止為行書數行而已孝秀雅相推憚弗敢固祈今簡寂館長牓猶有筆跡也又曰許思玄者許遠遊之弟也生而好道儒雅知名晉簡文帝為俗外之交也又曰任敦尚博昌人永嘉中投茅山講道集眾敦竊歎曰眾人雖云慕善皆外好耳未見真心可與斷金者又曰晉陸納為尚書令時年四十病瘡告杜恭云弈世短壽臨終皆患此瘡恭為奏章又與雲飛散謂納曰君命至七十果如其言王右軍病請恭恭謂弟子曰右軍病不羗何用吾十餘日果卒又曰蔣負芻義興人也與晉陵薛彪之為俗外之交去來茅山有志栖託齊永明中暫下都陶隱居一遇便盡素契陶後解紱結宇中茅中, SBCK: ''}
