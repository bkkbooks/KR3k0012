  - {type: variant, offset: 2302, length: 308, content: 楊超字超遠東海人也出入事陶隱居往復與陶論難得為入室又曰諸慧開字智遠吳興烏程人也每以戒行自修拯濟為務齊大明八年天下飢饉慧開有少穀實乃悉分賑鄉邑賴之有三人積飢食飽而致死其家訴縣稱慧開飼殺餓人苦相誣謗邑令笑曰乞食飽死反怨主人法無此科遣而不問又曰濮陽者不知何許人事道專心祈請皆驗鄭鮷音帝女足跛陽療之尋差晉簡文廢世子無嗣時使人祈請於陽於是中夜有黃氣起自西南遙墮室爾時李皇后懷孝武又曰許邁字叔玄少名映後改名遠遊志求仙道入臨安西山經月不返人亦不知其所之先娶散騎常侍吳郡孫宏女為妻邁居臨安山中為書謝遣其妻云欲聞懸雷之響山鳥之鳴自為簫韶九成不勝能也偶景青蔥之下栖息巖岫之室以為殿堂廣廈不能過也情願所終志絕於此吾其去矣長離別矣又曰禇伯玉, SBCK: 陸脩静}
