  - {type: variant, offset: 2947, length: 790, content: 月六日仙化門徒欲厚葬之興忽然重起曰道士絕累與俗有殊胡為哀哭厚葬但建修齋功此乃合太古淳真人法也言訖而化明日中時有叩石室者門人出視見兩童子引入戶公與欻起去葬於鞏縣界潔素里又曰孟道養字孝元外名援平昌人少時聞有法席不問遠近往觀聽焉及長性沉靜學專為己不求聞達閉戶開䆫披書玩古及入室讀誦聲纔出口有劉緩戴詵相造研論窗玄理各歎伏以為邁絕又曰吳猛字世雲豫章人也性純孝夏夜在父母側不敢驅拂蚊蚋恐去己而集親年三十邑人丁義士奉道以術傳之鄉人隱銅為設酒既去酒在器中不耗道士舒道雲病瘧比年猛授以三皇詩使諷之頓愈嘗還豫章以白羽畫江而渡縣東有石笥歷代未嘗開猛往發之多得簡牒古字不可識縣南有峻石時立千仞猨狖不能上猛仗策登之縣令新蔡千慶好畋獵猛屢諫不聽後慶大獵四面引火烘天而猛坐草中自若鳥獸依附左右火不能及慶大駭因是悔王敦於坐收猛俄失之敦大怒是歲敦敗猛登廬山見一叟坐樹下以玉柸承甘露授猛又有玉房金室見數人與猛語若舊相識設玉膏終日猛又乘鐵舡於廬山頂又曰錢妙真晉陵人也幼而好道便欲離俗親族逼以適人泣涕固免遂居大小二茅山後往鷰口洞手裁書并詩七章與陶隱居又曰孔靈產會稽山陰人也遭母憂以孝聞宴酌珍羞自此而絕饘蔬布素志畢終身父見過毀惻然命具饌靈產勉從父命咽以成疾父以人有天性不可移遂不復逼深研道幾遍覽仙籍宋明帝於禹穴之側立懷仙觀詔使居之遷太中大夫加給事高帝賜以鹿巾猿裘竹素之器手詔曰君有古人之風賜以林下之服登泛之日可以相存也又曰張繹字士和吳郡人也獎勵學徒整肅法事屢講眾經理致深密詞端華辯當時所宗梁武帝雅相欽賞時陶隱居著法檢論明釋老二教繹往復討論甚有條理隱居嘉焉專心道法居貧守約善八體書別制雲篆作茅山南洞碑甚工又曰宋文同字文明吳郡人也梁簡文時文明以道家詣經莫不敷釋撰靈寶經義䟽題曰謂之通門又作大義名曰義淵學者宗賴四方延請長於著撰訥於口辭又曰王遂起太原人為集真觀主性少眠縱臥熟猶覺人語言論相涉即領其辭莫不歎其清寤又曰晝夜不臥日月合光, SBCK: ''}
