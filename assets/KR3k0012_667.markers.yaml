  - {type: variant, offset: 1626, length: 158, content: 又曰陳景尚吳人也善講誦道釋中皆不可及制靈書經大行於世梁邵陵王甚重之召景尚隨王之郢終於江夏又曰桓闓字音舒東海丹徒人也梁初崑崙山渚平沙中有三古漆笥內有黃素寫千君所出太平經三部村人驚異於經所起靜供養先呈陶隱居隱居云此真千君古本闓將經至都便苦勞瘧諸治不愈陶隱居聞云此病非餘恐取經為咎何不送經還本即依二日送尋愈又曰曹寶字世珍丹, WYG: 隠雲}
