  - {type: variant, offset: 437, length: 0, content: '', SBCK: 疾病當齋官露臺齋中奏子午章苦到必感又曰􅀇清玉皇之道上皇天帝授太微天帝君三元紫精君眞陽元老君後以付太上道君以傳金闕李君李君傳太靈眞人南岳赤君又紫元夫人以傳清靈王君王君傳南岳魏夫人夫人傳楊君使授許長史}
  - {type: variant, offset: 437, length: 0, content: '', WYG: 疾病當齋官露臺齋中奏子午章若到必感又曰𤣥清玊皇之道上皇天帝授太㣲天帝君三光紫精君真陽元老君後以付太一道君以傳金闕李君李君傳太靈真人南岳赤君又紫元夫人以傳清虛王君王君傳南岳魏夫人夫人傳楊君使授許長史}
  - {type: page-break, offset: 437, content: '', id: KR3k0012_WYG_667-2a, image: WYG0899/WYG0899-0020c.png}
  - {type: variant, offset: 437, length: 0, content: '', krp: 疾病當齋官露臺齋中奏子午章苦到必感又曰玄清玉皇之道上皇天帝授太微天帝君三元紫精君眞陽元老君後以付太上道君以傳金闕李君李君傳太靈眞人南岳赤君又紫元夫人以傳清靈王君王君傳南岳魏夫人夫人傳楊君使授許長史}
  - {type: variant, offset: 438, length: 1, content: 師, SBCK: 􅁺授受者齋戒七日又曰衆眞授道先齋戒百日或三十日或十日又當先告齋一日以洗素心三千年六傳尋上經齋戒無如此者行之十四年太上迎以玉輪登上清爲上眞三皇經曰凢齋戒三事以定心口身之業也又曰凢齋戒講讀元譜大經佩服内文以成其道又曰凢齋者佩服三皇内文以成隱顯道登眞隱訣日道齋謂之守静謂齋定其心潔静其體在乎澄神遣務檢隔内外心齋者也又曰修道之人湏齋戒禮謝七世之愆又曰上清每以􅁻日㑹五眞凢修道之人當其􅁻日思存􅁻事心願飛仙立德施惠振救窮乏此太上之事也當湏齋戒遣諸􅄂念宻處静室眞誥曰齋戒}
  - {type: page-break, offset: 438, content: '', id: KR3k0012_SBCK_667-2a}
  - {type: variant, offset: 438, length: 1, content: 師, WYG: 掾授受者齋戒七日又曰衆真授道先齋戒百日或三十日或十日又當先告齋一日以洗素心三十年六傳尋上經齋戒無如此者行之四十年太上迎以玉輪登上清為上真三皇經曰凡齋戒三事以定心口身之業也又曰凡齋戒講誦元譜大經佩服内文以成其道又曰齋者佩服三皇内文以成隠顯之道登真隠訣曰道齋謂之守靜謂齋定其心㓗靜其體在乎澄神遣務檢隔内外心齋者也又曰修道之人須齋戒禮謝七世之愆又曰上清每以吉日㑹五真凡修道之人當其吉日思存吉事心願飛仙立德施惠振救窮乏此太上之事也當須齋戒遣諸雜念宻處静室真誥曰齋戒}
