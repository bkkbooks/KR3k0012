  - {type: variant, offset: 2761, length: 182, content: 觀孔稚圭立碑又曰張陵博學及河洛天文悉窮其妙靜處衡門不求聞達彈琴詠詩順志而已又曰龍威丈人山中得道者也時人莫知其名號曰山隱居慠然不群高絕人世又曰陶弘景字道明魏郡平陽人也自號華陽隱居常謂人曰我心恒如懸鏡觸物不遺好行陰德拯濟困窮合施諸藥遠近賴之平生未嘗晝眠看書必至半夜好聞松風之聲少絕肥羶晚惟進䭀迅音食餕荅紫菜生薑飲酒能至一斗而斷不醉也老氏聖紀曰神毉中岳仙人成公與以姚氏泓, SBCK: 御覽卷第六百六}
