  - {type: variant, offset: 911, length: 295, content: 仲微漢明帝時人也少好道德不仕周遊名山後居武當山寢息無常所或因積石或倚大樹四時衣服不變恒散髮亦有練巾又曰鮑靚字太玄上黨人也漢司隸鮑宣之後稟性清慧學通經史修身養性蠕而允切動不犯聞人之惡如犯家諱人多從受業楊道化物號曰儒林又曰王嘉字子年隴西人也在東陽谷口鑿岸穴居其徒數百各自穴處為人皃短陋而聰察滑稽有問世事善惡終不直說過率有驗又曰嚴遵守君平蜀郡人也修道自保與人子言孝與人臣言忠與人弟言順各因其發導之以善又曰王遠字方平常降蔡經家須臾麻姑至騎從半於方平麻姑手爪如鳥經私心曰時背癢得搔之佳也方平曰姑神人汝何遽此遂鞭之經願從方平學道方平使背立從後觀之曰心邪不可教之仙道乃與度世術又曰庾承仙字崇光頴川人明老莊, SBCK: 尚}
  - {type: variant, offset: 911, length: 714, content: 仲微漢明帝時人也少好道德不仕周遊名山後居武當山寢息無常所或因積石或倚大樹四時衣服不變恒散髮亦有練巾又曰鮑靚字太玄上黨人也漢司隸鮑宣之後稟性清慧學通經史修身養性蠕而允切動不犯聞人之惡如犯家諱人多從受業楊道化物號曰儒林又曰王嘉字子年隴西人也在東陽谷口鑿岸穴居其徒數百各自穴處為人皃短陋而聰察滑稽有問世事善惡終不直說過率有驗又曰嚴遵守君平蜀郡人也修道自保與人子言孝與人臣言忠與人弟言順各因其發導之以善又曰王遠字方平常降蔡經家須臾麻姑至騎從半於方平麻姑手爪如鳥經私心曰時背癢得搔之佳也方平曰姑神人汝何遽此遂鞭之經願從方平學道方平使背立從後觀之曰心邪不可教之仙道乃與度世術又曰庾承仙字崇光頴川人明老莊隱文江縣白水臺立廬舍講肆儒士釋老受其學隱居江南累詔不出後來始興講道德經剖析凝滯又曰薛玉寶字延世沛國人也梁時師玄圃先生以文章見美善書翰嘗書一章於崇靈觀道正省壁上見者翫之也又曰東鄉宗超字逸倫高密黔陬人也嘗露壇行道奩中香盡自然滿溢又爐中無火而煙氣自生氤氳周遍久之不歇又曰張𥙿天師十二世孫起招真觀植名果盡山栖之趣梁簡文為製碑又曰晉陵人錢妙真於茅山鷰口洞得道門人立碑於茅山邵陵王為觀序今具存焉又曰梁武帝天監二年置大小道正平昌孟景翼字道輔時為大正屢為國講說四年建安王偉於座問曰道家經教科禁甚重老子二篇盟誓乃授豈先聖之旨非凡所說耶景翼曰崇祕嚴科正宗妙化理在相成事非乖越又曰劉法先彭城人也時顧歡著道經義於孔德璋多有與奪法先與書討論同異顧道屈服乃荅曰吾自古之遣狂水火不避得足下此箴始覺醒悟既往狂言不足在怪又云法先每見道釋二眾亟相是非乃著息爭之論顧歡又作夷夏辯或及三科論明釋老同異又曰張詵吳郡嘉興人也善玄言屢講老子修行上道討論上經人自遠來集也詵尋求真祕甚識宗, WYG: ''}
