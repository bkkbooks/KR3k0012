  - {type: variant, offset: 476, length: 4, content: 鍾山北河, WYG: 太眞則書名𤣥圃靈寳赤書曰元始五老諸天帝皇帝以歳六齋之月㑹於上三天靈都宫元陽紫㣲之臺集筭天元推校運度又云紫㣲宫舊格丹書白素齋戒百日誦之太素玊籙}
  - {type: variant, offset: 476, length: 4, content: 鍾山北河, krp: 太眞則書名玄圖靈寳赤書曰元始五老諸天帝皇帝以歳六齋之月㑹於上三天靈都宮元陽紫微之臺集筭天元推校運度又云紫微宫舊格丹書白素齋戒百日誦之太素玉籙}
