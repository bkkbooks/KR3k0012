  - {type: variant, offset: 2634, length: 125, content: 後門出往剡居瀑布山性耐寒暑在山三十餘年隔絕人事一說云伯玉初遊南岳路入閩中飛湍走險伯玉泊舟晚瀨衝颷忽起山水暴至激船上巔崩落絕嶂徒侶以為冰碎緣阻尋求見伯玉自若以小杖撝舟涉不測之泉眾以駭伏入霍山而去初隱瀑布山齊高祖欽其風欲與相見辭以疾而去帝追恨詔瀑布山下立, SBCK: 清}
