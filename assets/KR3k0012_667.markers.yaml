  - {type: variant, offset: 1207, length: 577, content: 文江縣白水臺立廬舍講肆儒士釋老受其學隱居江南累詔不出後來始興講道德經剖析凝滯又曰薛玉寶字延世沛國人也梁時師玄圃先生以文章見美善書翰嘗書一章於崇靈觀道正省壁上見者翫之也又曰東鄉宗超字逸倫高密黔陬人也嘗露壇行道奩中香盡自然滿溢又爐中無火而煙氣自生氤氳周遍久之不歇又曰張𥙿天師十二世孫起招真觀植名果盡山栖之趣梁簡文為製碑又曰晉陵人錢妙真於茅山鷰口洞得道門人立碑於茅山邵陵王為觀序今具存焉又曰梁武帝天監二年置大小道正平昌孟景翼字道輔時為大正屢為國講說四年建安王偉於座問曰道家經教科禁甚重老子二篇盟誓乃授豈先聖之旨非凡所說耶景翼曰崇祕嚴科正宗妙化理在相成事非乖越又曰劉法先彭城人也時顧歡著道經義於孔德璋多有與奪法先與書討論同異顧道屈服乃荅曰吾自古之遣狂水火不避得足下此箴始覺醒悟既往狂言不足在怪又云法先每見道釋二眾亟相是非乃著息爭之論顧歡又作夷夏辯或及三科論明釋老同異又曰張詵吳郡嘉興人也善玄言屢講老子修行上道討論上經人自遠來集也詵尋求真祕甚識宗尚又曰陳景尚吳人也善講誦道釋中皆不可及制靈書經大行於世梁邵陵王甚重之召景尚隨王之郢終於江夏又曰桓闓字音舒東海丹徒人也梁初崑崙山渚平沙中有三古漆笥內有黃素寫千君所出太平經三部村人驚異於經所起靜供養先呈陶隱居隱居云此真千君古本闓將經至都便苦勞瘧諸治不愈陶隱居聞云此病非餘恐取經為咎何不送經還本即依二日送尋愈又曰曹寶字世珍丹, SBCK: 雲}
