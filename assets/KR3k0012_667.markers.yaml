  - {type: variant, offset: 481, length: 0, content: '', SBCK: 曰齋戒存思誦習此經精進無怠神通智逹位爲太素眞人太平經曰眞人云人之精神常居空閑之處不居汙濁之間也欲思還神皆當齋戒香室中百病自除不齋戒則精神不肯返人也皆上天共訴人所以人病積多死者不絶八素奔辰訣日}
  - {type: variant, offset: 481, length: 0, content: '', WYG: 曰齋戒存思誦習此經精進無怠神通智逹位為太素真人大平經曰真人云人之精神常居空閑之處不居汙濁之門也欲思還神皆當齋戒香室中百病自除不齋戒則精神不肯返皆上天共訢人所以人病積多死者不絶八素奔辰訣曰}
