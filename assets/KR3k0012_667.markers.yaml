  - {type: variant, offset: 444, length: 1, content: 傷, SBCK: 日是尸􅀑競亂精神躁穢之日當齋戒不寢遣諸可欲凢五夘之曰常當齋戒入室東向心拜在神念氣適意所陳又曰漢建安中左慈聞句曲山在金陵通峨眉羅浮故渡江尋之遂齋戒三月而登此山乃得其門入茅君受以三種神芝􅀫啓功儀曰捧香仙女下衛齋戒之人又曰太極眞人受太上口訣千歳五傳依隱書之制齋戒五日乃授立約珠囊曰凢八五岳以甲子上旬之日沐浴齋戒七日乃行􅀂名山有芝英竒藥者奉之作素奏丹書其文乞登仙度世飛行上清再拜放自鷄犬各一於石上而去然後求芝英竒藥所欲}
  - {type: page-break, offset: 444, content: '', id: KR3k0012_SBCK_667-2b}
