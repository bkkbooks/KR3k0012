  - {type: variant, offset: 482, length: 1, content: 試, SBCK: 曜五星審識形色見之早晚於庭伺之􅀂晦􅁳之夕皆於寢室存念齋戒修行如存奔日月之法日中赤氣紫芒者爲曜靈九神華芒也月中黄氣白光八朗之芒是爲月華夜精道人皆知服日月之氣}
  - {type: variant, offset: 482, length: 1, content: 試, WYG: 曜五星審識形色早晚于所見處祠之若晦𠖇之夕皆於寢室存念齋戒修行如存奔日月之法日中赤氣紫芸者為曜靈九神華芒也月中黄氣白光八朗之芒是為月華夜精道人皆知服月之氣}
  - {type: variant, offset: 482, length: 1, content: 試, krp: 曜五星審識形色見之早晚於庭伺之若晦冥之夕皆於寢室存念齋戒修行如存奔日月之法日中赤氣紫芒者爲曜靈九神華芒也月中黄氣白光八朗之芒是爲月華夜精道人皆知服日月之氣}
  - {type: variant, offset: 484, length: 0, content: '', SBCK: 吸九華靈芒能修存奔日月之道安妃授楊君書二卷皆是竒法日月之道甚多髙妙上清金闕靈書曰太上之吉㑹日者髙眞集宴慶獻之日也廻元者太上之更始日也甲子隂陽之首氣月晦改度之􅀄萌故爲新日也}
