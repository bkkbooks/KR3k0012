  - {type: variant, offset: 1154, length: 679, content: 者必問所以己之方眾人為見故各言其方也抱朴子曰蝮虵中人不曉方術者但以刀割肉投地其肉沸如火炙須臾燋盡嵇含遇蠆客賦曰元康二年七月七日中夜遇蠆客有戲余者曰諺云過滿百為蠆所螫斯言信哉蠱周禮秋官曰庶氏掌除毒蠱以嘉草攻之左傳曰宣二晉里克有蠱疾沈約宋書曰沛郡相縣唐賜往比村飲酒還因得病吐蠱虫十枚臨死語妻張曰死後刳腹出病張手破之藏悉糜碎搜神記曰蠱有怪物若鬼其妖形變化雜類殊種或為狗豕或為虫虵其人皆自知其形狀常行之於百姓所中皆死續搜神記曰曇游道人清苦沙門也剡縣有一家事蠱人噉其食飲無不吐血死遊詣之主人下食遊便呪焉一雙蜈蚣長丈餘於盤中走出飽食歸安然無他靈鬼志曰滎陽郡有一家姓廖其家累世為蠱以致富子女豐悅後取新婦不以此語之家人悉行婦獨守家見屋中一大堽試發見一大蛇便作沸湯悉灌殺之家人還婦具說焉舉家驚惋無幾其家疾病死亡略盡癰疽廣雅曰痤疽癰也說文曰癰腫也痤小腫也釋名曰癰壅也氣壅不通結裏而潰也左傳襄十九年傳曰晉荀偃癉疽生瘍於頭癉疽惡瘡濟河及著癰病自出史記曰卒有病癰者吳起為吮之卒母哭之曰往年吳公吮其父父遂戰死今又吮此子妾不知其所死矣漢書曰項羽疑范增奪其權增怒曰天下且定而王自為之願賜骸骨羽許之亞父未至彭城疽發背而死又曰僕射鄭崇數以職事見責發頸癰而死又曰文帝病癰鄧通常為上吮之上問曰天下誰最愛我通曰莫若太子太子入上使吮癰太子色難聞通吮之慚遂恨通東觀漢記曰樊儵事後母至孝母常病癰樊至吮嗽典略曰趙戩病疽疾年六十餘聞魏王薨哭泣哀過瘡發而卒王隱晉書曰徐苗字叔胄弟亡臨殯口中癰大潰膿溢苗含去之宋書曰劉瑀與何偃俱發背癰瑀疾已篤聞偃亡懽甚叫呼於是亦卒南史曰徐嗣伯春月出戲聞草屋中有呻吟聲嗣伯曰此病甚重更, WYG: ''}
