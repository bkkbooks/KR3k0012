  - {type: variant, offset: 3048, length: 260, content: 尺方與深同取沙三斛著中以淳酒三升沃其上府君即從之病者即愈疫疾遂絕山海經曰復州之山有企踵之鳥如鴞一足彘毛見則其國中大疫三輔決錄曰井丹舉室疫病梁松自將醫藥治丹盛弘之荊州記曰始安郡有鳥焉其形似鵲白尾名為青鳥常以三月自蒼梧而度群飛不可勝數山人見其來多苦疫氣魏文帝與吳質書曰昔年疾疫親故多罹其災徐陳應劉一時俱逝曹植說疫氣曰建安二十二年厲氣流行家家有僵尸之痛室室有號泣之哀或闔門而殪或覆族而喪或以為疫者鬼神所作夫罹此者悉被褐茹藿之子荊室蓬戶之人耳若夫殿處鼎食之家重貂累蓐之門若是者鮮焉此乃陰陽失位寒暑錯時是故生疫而愚民懸符厭之亦可笑, SBCK: ''}
