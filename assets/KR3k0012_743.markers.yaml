  - {type: variant, offset: 2078, length: 278, content: 鰧魚蒼文赤尾食之不癰譙明之山譙水注焉多阿羅魚一首十身食之已癰辛氏三秦記曰大魚如羊在長池中世人食之生癰瘡論衡曰儒書云齊桓公負婦人朝諸侯管仲告諸侯曰吾君有疽瘡不得婦人瘡惡不愈諸侯信管仲故無叛者瘻說文曰瘻頸腫也山海經曰脫扈之山植豬之草可以已鼠郭璞注曰鼠瘻也淮南子曰狸頭已鼠鷄頭已瘻洞林曰柳祖休婦病鼠瘻積年不差及困令兒就吾卦之語之曰當得賤師姓石者治之事具鼠部癬說文曰癬乾瘡也山海經曰渠豬之山多豪魚赤喙赤尾食之可已白癬又曰橐山橐水出焉脩郡之魚其音如鴟食之已癬瘃說文曰瘃中塞腫漢書曰趙充國討先零帝詔充國曰欲至冬擊虜將軍士寒手足皸瘃豈有利哉皸坼裂也瘃寒瘡也疥說文曰疥瘙也, SBCK: 温瘧}
