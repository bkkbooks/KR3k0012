  - {type: variant, offset: 386, length: 128, content: 難以自明世無良醫悞其死矣嘗聞惡疾蝮虵螫之不痛試為求之當令兄弟知我乃於南山得虵以股觸之痛楚號叫俄而腫死抱朴子曰治金瘡以氣吹之血即斷痛立止論衡曰儒書言燕太子丹使客荊軻刺秦王不得誅死後高漸離復以擊筑見秦王王知燕之客乃膠其眼使之擊筑漸離置鈆於筑中以為重而擊秦王秦王, WYG: ''}
