  - {type: variant, offset: 2501, length: 0, content: '', SBCK: 巳瘧玄晏春秋曰夏四月予瘧于河南歸于新安不瘳出􅀃曰中朝有小兒其父患瘧行乞藥人曰尊侯明德君子何以病瘧荅曰來病君子所以爲瘧列異傳曰陽㽔字聖卿逃瘧神祠有人呼言杜卸杜卸聖卿應曰諾起至户口人曰取此書去得素書一卷皆譴劾百神法乃差録異傳曰嘉興令吴士季瘧經武昌廟遣人辭謝乞斷瘧􅀑去廟二十里卧夢見塘上一人乗馬追呼行太急速至季舡下馬與吏共入舡後縛取一小兒去夢􅁴瘧即斷又曰􅀪父患瘧經年後獨至田舎瘧發有數小兒持公首脚公見因陽瞑忽起捉得一兒化成黄鷁餘者皆走仍縛以還家懸著䆫上明當殺食之比曉失鷁瘧遂斷于時有瘧者但呼弘公便斷甄異傳曰吴興張安病正發覺有物在􅀍上病便更甚安自力舉􅀍捉之物化成鳥如鵂鶹瘧登時愈盛􅀪之荆州記曰始興含淮縣有翁水下流有聖鼓横在川側上下􅊑人刺篙有撞之者皆得瘧疾消渴後漢書曰司馬相如有消渴病後漢書李通素有消渴疾消消中之疾也周禮云春有痟疾自爲宰相謝病不視事帝令以公位歸第養病魏略曰卞蘭得消渴疾時明帝信呪水使人持水賜蘭蘭曰治病當以方藥何信於此遂不肯飲以至於卒時人見蘭好直言謂帝面折之而蘭自殺其實不也晉書裴楷有渴利疾不樂處􅀔王渾爲楷請當見將養不違其志不聽及疾詔遣黄門郎王􅄛省疾楷廻眸矚之曰竟未見識􅄛深歎其神雋南史何􅀧少時甞患渴逾歳不逾後在呉中石佛寺建講所晝寢夢一道人形貌非常授丸一掬夢中服之而差唐書鄧玄挺綜銓選無藻鑒之明又患消渴人因號爲鄧渴王子年拾遺録曰晉武爲撫軍時羗人姚馥字丗芬姚襄即其祖也好啜嚼濁糟言渴於醇酒羣軰常狎之呼爲渴羗爲朝歌邑長馥辭之帝曰朝歌紂之故郷地有酒池故使老羗不復呼飲交州記曰浮石體虚而輕煑飲止渇淮南子曰嫁女於疾痟渴者夫死後則難可復處以爲故妨之後人不要蹷逆韓詩外傳曰扁鵲過虢虢侯丗子􅁀病死乃造宫門曰丗子病所謂尸蹷者也吕氏春秋曰室大多隂則蹷咳􅎳釋名曰咳刻也氣奔至出入不平調􅀂尅物也􅎳促也用力急促也易􅀃曰立秋氣未當至而至則少陽脉盛人病咳周書曰立秋之日白露不降民多病咳禮記月令曰季夏行春令則國多風欬春秋䌓露曰人君好戰貪城邑則民病欬嗽抱朴子曰􅀛鼈黿鼉之􅀑令人病欬劉弘教曰吾昨四鼓中起聞西城上兵欬聲甚深即呼省之年過六十羸病無􅃭而督將差以持時持時備不虞耳此旣無所防捍又老病羸凍不隱恤必致死亡督將豈可乃尓耶嘔吐左傳哀下曰衛侯爲靈臺于籍圃與諸大夫飲酒焉禇師聲子韤而登席古者見君解韤公怒辭曰臣有疾異於人足有瘡疾􅀂見之君將殻之殻嘔吐也漢書曰西域有大小頭痛坂令人歐吐謝承後漢書曰吴郡嬀晧字元起其母至婚家醉嘔吐恐食得毒伏地甞吐仰曰吐寒耳非毒也鄧粲晉記曰阮籍母死與人棊如故旣而飲酒三升舉聲一號吐血數升晉中興書曰王允之年在揔角爲從伯敦所知甞夜飲允之辭醉眠在别牀敦與錢鳯謀逆允之悉聞其語便於眠處大吐以爲大醉不復疑沈約宋書曰蕭惠開除府加給事性素剛益不得志發病嘔血有物如肝肺者甚多孟宗别傳曰孟宗爲光禄勲甞大㑹公先少飲酒偶有強者飲一杯便吐時令峻急凡有醉吐者皆傳詔司察公吐麥飯察者以聞上乃歎息詔問食麥飯意宗荅曰臣家足有米飯耳直愚性所安其德行純素如此列子曰東方有人焉曰爰旌目將有適也而餓於道狐父之盗曰丘見而下壷飱以餔之爰旌目三餔而後能視曰子何爲者也曰我狐父之人丘也爰旌目曰譆汝非盗耶胡爲而食我吾義不食子食也兩手據地而嘔不岀客客而死水疾東觀漢記曰東平王蒼到國後病水氣喘逆上遣太醫丞相視之小黄門侍疾置驛馬傳起居以千里爲程晏子春秋曰景公水病夢與二日􅃲不勝召占夢問之晏子謂占夢曰公所病者隂也日陽也一隂不勝兩陽公病將巳占夢以其言對三日公病大愈賜占夢占夢曰晏子教臣也公召晏子賜之晏子曰占夢以臣言對故有益也􅀂使臣言則不信也腫釋名曰腫鍾也寒􅀬氣所鍾聚也春秋濳潭巴曰枉矢黒軍士不勇疾流腫宋均注云矢當楊光明今黒有死䘮之氣則腫死春秋䌓露曰人君簡宗廟逆天時民病流腫尸子曰有醫竘者􅁗之良醫張子之背腫謂之曰背非吾背也任子制焉夫身與國亦猶此也必有委制然後治之齊諧記曰范光禄得病腹脚並腫不飲食忽有一人清朝不自通遥進入光禄齋中就光禄邊坐光禄云先不識君君郍得來而不自通此人荅曰佛使我來治君病發衣見之因捉其脚以甘刀針腫上儵忽之間頓針兩脚及膀胱百餘下然不覺痛復欲針腹其兒黄門不聽語竟便去後針孔中黄膿汁當岀二三升許至明暁脚都差針亦無孔范甚喜疝釋名曰心痛曰疝疝詵也氣詵詵然而上也後漢書太醫皮循從獵上林還暮􅀫殿門下寒疝病發時鄧訓直事聞循聲起徃問曰兾得火以熨背訓至太官門爲求火不得乃以口嘘其背復呼同廬郎共更嘘至朝遂愈瘕龍魚河圖曰犬狗魚鳥不熟食之成瘕易􅀃曰白露氣當至不至太隂脉盛人多瘕疝宋書徐文伯傳宋明帝宫人患􅆎痛牽心每至輙氣欲絶衆毉以爲肉瘕文伯曰此髮瘕以油投之即吐得物如髮稍引之長三尺頭巳成蛇能動懸柱上水滴盡一髮而}
