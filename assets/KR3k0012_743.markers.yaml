  - {type: variant, offset: 2804, length: 0, content: '', SBCK: 人痢隂痿漢書曰膠西王端爲人賤戾又隂痿一近婦人病數月又曰周仁爲人隂重不泄張晏曰隂重不泄下濕故溺袴是以得此官者入後宫魏志公孫康死子晃淵皆小衆以康弟恭嗣恭隂消爲閹人劣弱不能治國淵脅奪恭位晉書南陽王摸丗子保體質豐偉甞自秤重八百斤素喜睡痿疾不能御婦人宋書曰明帝素肥晚年痿疾不能御内陽病左傳襄三曰楚子使薳子馮爲令尹訪於申叔豫申叔豫曰國多寵王弱國不可爲也遂以疾辭方暑闕地下冰而牀焉重繭衣裘鮮食而寢楚子使醫視之復曰瘠}
