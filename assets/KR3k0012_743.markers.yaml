  - {type: variant, offset: 2502, length: 1, content: 疥, WYG: 瘧𤣥晏春秋曰夏四月予瘧于河南歸于新安不瘳世說曰中朝有小兒其父患瘧行乞藥人曰尊侯明徳君子何以病瘧答曰來病君子所以為瘧列異傳曰陽㽔字聖卿逃瘧神祠有人呼言杜卸杜卸聖卿應曰諾起至户口人曰取此書去得素書一卷皆譴劾百神法乃差録異傳曰嘉興令吴士季瘧經武昌廟遣人辭謝乞斷瘧鬼去廟二十里卧夣見塘上一人乗馬追呼行太急速至季船下馬與吏共入船後縛取一小兒去夢覺瘧即斷又曰𢎞公患瘧經年後獨至田舍瘧發有數小兒持公首脚公見因陽瞑忽起捉得一皃化成黄鷁餘者皆走仍縳以還家懸著窓上明當殺之比曉失鷁瘧遂斷于時有瘧者但呼𢎞公便斷甄異傳曰吾興張安病正發覺有物在被上病便更甚安自力舉被捉之物化成鳥如鵂鶹瘧登時愈盛𢎞之荆州記曰始興含淮縣有滃水下流有聖鼓横在川側上下船人刺篙有撞之者皆得瘧病消渇後漢書曰司馬相如有消渇病後漢書曰李通素有消渇疾消消中之疾也周禮云春有痟疾自為宰相謝病不視事帝令以公位歸第養病魏畧曰卞蘭得消渇疾時明帝信呪水使人持水賜蘭蘭曰治病當以方藥何信於此遂不肯飲以至於卒時人見蘭好直言謂帝面折之而蘭自殺其實非也晉書曰裴楷有渇利疾不樂處勢王渾為楷請當見將養不違其志不聼及疾詔遣黄門郎王衍省疾楷回眸矚之曰竟未見識衍深歎其神雋南史何㸃少時嘗患渇逾歲不愈後在吴中石佛寺建講所晝􅃦夢一道人形貌非常授丸一掬夢中服之而差唐書鄧𤣥挺綜銓選無藻鑒之明又患消渇人因號為鄧渇王子年拾遺記曰晉武為撫軍時羗人姚馥字世芬姚襄即其祖也好啜酒嚼濁糟言渇於醇酒羣輩常狎之呼為渇羗為朝歌邑長馥辭之帝曰朝歌紂之故鄉池有酒也故使老羗不復呼渇交州記曰浮石體虛而輕煑飲止渇淮南子曰嫁女於疾消渇者夫死後則難可復處以為女妨之後人不娶蹷逆韓詩外傳曰扁鵲過虢虢侯世子暴病死乃追宫門曰世子病所謂尸蹷者也吕氏春秋曰室大多隂則蹷咳嗽釋名曰咳刻也氣奔至出入不平調若剋物也嗽促也用力急促也易說曰立秋氣未當至而至則少陽脉盛人病咳周書曰立秋之日白露不降民多病咳禮記月令曰季夏行春令則國多風欬春秋繁露曰人君好戰貪城邑則民病咳嗽抱朴子曰龜鼈鼉之鬼令人病欬劉𢎞教曰吾昨四鼓中起聞西城上兵欬聲甚深即呼省之年過六十羸病無襦而督將差以持時持時􅊀不虞耳此既無所防捍又老病羸凍不隠恤必致死亡督將豈可乃爾耶嘔吐左傳哀下曰衞侯為靈臺于藉圃與諸大夫飲酒焉禇師聲子韤而登席古者見君解韤公怒辭曰臣有疾異於人足有瘡疾若見之君將殻之殻嘔吐也漢書曰西域有大小頭痛坂令人嘔吐謝承後漢書曰吴郡媯皓字元起其母至婚家醉嘔吐恐食得毒伏地嘗吐仰曰吐寒耳非毒也鄧粲晉記曰阮籍母死與人棊如故既而飲酒三升舉聲一號吐血數升晉中興書曰王允之年在總角為從伯敦所知嘗夜飲允之辭醉眠在别牀敦與錢鳯謀逆允之悉聞其語便於眠處大吐以為大醉不復疑沈約宋書曰蕭惠開除府家給事性素剛益不得志登病嘔血有物如肝肺者甚多孟宗别傳曰孟宗為光禄勲嘗大㑹公卿先少飲酒偶有强者飲一杯便吐時令峻急凡有醉吐者皆傳詔司察公吐麥飯察者以聞上乃歎息詔問食麥飯意宗答曰臣家足有米飯耳直愚性所安其徳行純素如此列子曰東方有人焉曰爰旌目將有適也而餓於道狐父之盗曰丘見而下壺飱而餔之爰旌目三餔而後能視曰子何為者也曰我狐父之人丘也爰旌目曰譆汝非盗耶胡為而食我吾義不食子食也兩手據地而嘔不出而死水疾東觀漢記曰東平王蒼到國後病水氣喘逆上遣太醫丞相視之小黄門侍疾置馬傳起居以千里為程晏子春秋曰景公水疾夢與二日鬭不勝召占夢問之晏子謂占夢曰公所病者隂也日陽也一隂不勝兩陽公病將已占夢以其言對三日公病大愈賜占夢占夢曰晏子教臣也公召晏子賜之晏子曰占夢以臣言對故有益也若使臣言則不信腫釋名曰腫鍾也寒熱氣所鍾聚也春秋潜潭巴曰枉矢黒軍士不勇疾流腫宋有注曰矢當揚光明今黒有見䘮之氣則腫死春秋繁露曰人君簡宗廟逆天時民病流腫尸子曰有醫竘者秦之良醫張子之背腫謂之曰背非吾背也任子制焉夫身與國亦猶此也必有委制然後治之齊諧記曰范光禄得病腹脚並腫不飲食忽有一人清朝不自通遥進入光禄齋中就光禄邉坐光禄云先不識君君那得来而不自通此人答曰佛使我来治君病發衣見之因捉其脚以甘刀針腫上倐忽之間頓針而脚及膀胱百餘下然不覺痛復欲針腹其兒黄門不聽語竟便去後針孔中黄膿汁當出二三升許至明曉脚都差針亦無孔范甚喜疝釋名曰心痛曰疝疝詵也氣詵詵然而上也後漢書太醫食循從獵上林還暮宿殿門下寒疝病發時鄧訓直事聞循聲起徃問曰冀得火以熨背訓至大官門為求火不得乃以口嘘其背遂愈瘕龍魚河圗曰犬狗魚鳥不熱食之成瘕易說曰白露氣當至不至太隂脉盛人多疝瘕宋書徐文伯傳宋明帝宫人患腰痛牽心毎至輙氣欲絶衆醫以肉為瘕文伯曰此髪瘕以油投之即吐得物如髪稍引之長三尺頭已成蛇能動懸柱上水滴盡一髪而已病都差山海經曰麗麂之水其中多有育沛佩之無瘕疾郭日肓沛未聞列仙傳曰𤣥俗者常餌巴豆雲母賣藥於都市河間王病瘕𤣥俗脈之下蛇十餘頭俗言王病六世餘殃非王所招也王嘗放鹿鹿是麟母仁心感天故遭俗耳續捜神記曰太尉郄公鎮丹徒嘗出獵時二月中蕨始生有一甲士折噬食之即覺心中淡淡欲吐因歸家仍成心腹疾半年許忽大吐吐一蛇長尺餘尚活動揺乃掛著屋簷前汁稍稍出蛇漸焦小經一宿視之成一莖蕨猶前所食也病遂除差又曰桓宣武帝時有一督將因時行病後虛熱更能飲復茗必一斛二升乃飽人苦勸復啜五升乃大吐向所飲都盡有一物隨吐後出如斗大試以一斛二升復茗洗之此物噏之都盡而正覺小復又増五升更悉混然後從口中涌出既吐此物病遂差或問之曰此何病答曰此病名斛二瘕又曰昔有一人與奴俱得心瘕病奴既死割剖腹視得一白鼈赤眼甚鮮明乃試以諸毒藥澆灌之并内藥於鼈口無損乃繫鼈於牀脚有客乗白馬來看之溺濺鼈惶遽疾走避溺既繫之不得去乃縮頸藏脚不敢動病者察之謂其子曰吾疾或可救乃試取白馬溺以灌鼈上消滅成數升水病者乃頓飲升餘白馬溺即豁然除異苑曰章安有人元嘉中噉鴨肉乃成瘕病胷滿面赤不得飲食醫令服秫米瀋須㬰煩悶吐一鴨雛身喙趐皆已成就惟左脚故綴昔所食肉病遂獲差志怪曰有人得瘕病腹晝夜切痛臨終勅其子云吾氣絶後可剖視之其子不忍違割之得一銅酒鎗容數合醫者聞其病而解之復出巾箱中藥以投鎗即消成酒痺春秋考異郵曰痺在喉闕㐫命漢書曰哀帝即位痿痺又曰馮野王弟立為東海太守下濕病痺天子聞之徙立為太原太守晉書皇甫謐字士安得風痺疾猶手不輟卷後魏書臨淮王譚孫孚好酒後遇風患手足不隨口不能言乃左手畫地作字乞解所任唐書曰處羅可汗欲分兵大掠中國羣下多曰我父失國賴隋得立恩不可忘時處羅久疾主者有五石餌之俄而處羅疽死痔釋名曰痔食也蟲食之也山海經曰天帝山有烏其狀黒文而赤翁郭璞注云翁郭下毛之物名曰櫟食之已痔又虎蛟可以為痔郭璞注為治也莊子曰秦王有病召乙破癰者將一軍痔者將軍匠乘所治愈下將乘愈多尸子曰有乙􅀈者秦之良必為㑹王治痔愈}
