  - {type: variant, offset: 2919, length: 2, content: 文舉, SBCK: 􅄛爲洪州揔管晉王鎮淮海因召􅄛隂共計議又恐人疑無故來徃託以􅄛妻患癭王妃蕭氏有術能療之以狀奏髙祖髙祖聽􅄛共妻向江都徃來無度唐書曰安禄山䧟西京王維佯中風失音賊猶強授僞官後蒙原罪又曰王徽傳黄巢入潼關僖宗出幸徽與同列崔沆豆盧瑑僕射干琮至􅍼方知遂相與奔馳赴行在徽夜落荆榛中隱於崔谷爲賊所}
