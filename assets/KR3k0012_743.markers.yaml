  - {type: variant, offset: 918, length: 235, content: 漢書曰灌嬰矯先帝詔當棄市嬰陽病痱不食欲死或聞上無殺意嬰復食治病議定不死矣乃有飛語為惡言聞上故以棄市東觀漢記曰明帝行幸諸國勑執金吾馮魴將緹騎宿玄武門複道上詔曰複道多風寒左右老人且病痱多取帷帳東西完塞䆫皆令緻密螫毒魏志曰彭城夫人夜之廁蠆螫其手呻吟無賴華佗令溫湯漬手數易湯常令煖其旦即愈搜神記曰阮瑀傷於虺嗅其瘡而雙虺出鼻中孔叢子曰宰我使齊反見夫子曰梁丘據遇毒三旬而瘳齊會大夫眾賓賀焉大夫並復獻攻毒之方弟子謂曰梁丘子瘳矣方安所施夫子曰三折肱而知為良醫治梁丘遇虺害而獲瘳假有與之同, WYG: 痁熱瘧也}
