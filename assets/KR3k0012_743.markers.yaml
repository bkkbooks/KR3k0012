  - {type: variant, offset: 2519, length: 263, content: 登徒悅之使有五子又曰竹山有草名曰黃藿枝如樗葉如麻白華赤實浴之已疥惡疾韓詩外傳曰芣苢傷夫有惡疾也采采芣苢薄言捋之芣苢澤瀉也芣苢良惡之菜猶捋之不已君子雖有惡疾我猶不能去離也論語雍也曰伯牛有疾子問之自牖執其手包曰牛有惡疾不欲見人曰亡之命矣夫斯人也而有斯疾也斯人也而有斯疾也後魏書曰李庶生而天閹崔諶調之曰教弟種鬢以錐遍刺作孔插以馬尾庶曰先以此方廻施貴族藝眉有效然後樹鬢世傳諶門有惡疾以呼沱為墓田故庶言及之列女傳曰蔡夫之妻者宋人之女也既嫁於蔡夫有惡疾其母將改嫁之女曰夫之不幸乃妾之不幸將何去之終不聽其母而作芣苢之詩疫癘說文曰疫皆民之疾也, krp: 痢}
