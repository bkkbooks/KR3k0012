  - {type: variant, offset: 1836, length: 229, content: 療必死乃往視見一老姥稱體痛而處處有𪒠黑無數嗣伯還煮斗餘湯送令服之訖痛熱愈甚跳投床者無數須臾所𪒠處皆拔出長寸許乃以膏塗諸瘡口三日而復云此名釘疽也又曰薛伯宗善徙癰疽公孫泰患發背伯宗為氣封之徙置齋前柳樹上明日而癰消樹邊使起一瘤如拳大稍稍長二十餘日瘤大膿爛出黃赤汁升餘樹為之痿損唐書曰李洧正巳從父兄正巳死洧以徐州歸順封潮陽郡王無何背發疽稍平乃大具糜餅飯僧於市洧乘平肩輿自臨其塲市人讙呼洧驚疽會於背而卒孝子傳曰魏達父苦疽痺達吮嗽而愈山海經曰帶山有鳥狀如馬五采名鵸䳜食之, SBCK: 至則多疾瘧白露當降}
