  - {type: variant, offset: 666, length: 183, content: 巖下中霄有物舐其瘡隨舐除而舐處悉白故世呼為謝白面又曰有田父耕值見傷一虵有一虵銜草著瘡上而傷者差田父收其餘葉治瘡皆驗又曰晉時長山趙宣母任身如常而髀上癢搔之成瘡二兒從瘡中出母子平安幽明錄曰漢武在甘泉宮有玉女降與帝圍棊女風姿端正帝乃欲通之女因唾帝面遂成瘡帝避跪謝神女為出溫水洗之事貝溫泉部西京雜記曰廣川王好發冢後發欒書冢是夕王夢一丈大鬢眉盡白以杖扣王左腳王覺左腳腫痛因生瘡, WYG: 死死尸相注或}
