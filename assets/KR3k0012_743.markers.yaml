  - {type: variant, offset: 397, length: 759, content: 矣嘗聞惡疾蝮虵螫之不痛試為求之當令兄弟知我乃於南山得虵以股觸之痛楚號叫俄而腫死抱朴子曰治金瘡以氣吹之血即斷痛立止論衡曰儒書言燕太子丹使客荊軻刺秦王不得誅死後高漸離復以擊筑見秦王王知燕之客乃膠其眼使之擊筑漸離置鈆於筑中以為重而擊秦王秦王病瘡三月而死夫言高漸離以筑擊秦王實也言中秦王病瘡三月而死虛也嵇康高士傳曰孔休元嘗被人斫之至見王莽以其面有瘡瘢乃碎其玉劍與治之華佗別傳曰瑯琊有女子右股上有瘡癢而不痛愈已復發佗曰當得稻糠色犬繫馬頓走出五十里斷頭向癢乃從之須臾有虵在皮中動以鐵橫貫引出長三尺許七日便愈異苑曰陳郡謝石少患面瘡諸治莫愈乃自匿遠山臥於巖下中霄有物舐其瘡隨舐除而舐處悉白故世呼為謝白面又曰有田父耕值見傷一虵有一虵銜草著瘡上而傷者差田父收其餘葉治瘡皆驗又曰晉時長山趙宣母任身如常而髀上癢搔之成瘡二兒從瘡中出母子平安幽明錄曰漢武在甘泉宮有玉女降與帝圍棊女風姿端正帝乃欲通之女因唾帝面遂成瘡帝避跪謝神女為出溫水洗之事貝溫泉部西京雜記曰廣川王好發冢後發欒書冢是夕王夢一丈大鬢眉盡白以杖扣王左腳王覺左腳腫痛因生瘡至死不差三輔故事曰衛太子嶽鼻武帝疾避暑甘泉宮江充謂太子曰陛下惡太子鼻當持紙蔽其鼻及入充言曰太子不欲聞陛下膿臭蔽鼻而入帝大怒痱說文曰痱風病也漢書曰灌嬰矯先帝詔當棄市嬰陽病痱不食欲死或聞上無殺意嬰復食治病議定不死矣乃有飛語為惡言聞上故以棄市東觀漢記曰明帝行幸諸國勑執金吾馮魴將緹騎宿玄武門複道上詔曰複道多風寒左右老人且病痱多取帷帳東西完塞䆫皆令緻密螫毒魏志曰彭城夫人夜之廁蠆螫其手呻吟無賴華佗令溫湯漬手數易湯常令煖其旦即愈搜神記曰阮瑀傷於虺嗅其瘡而雙虺出鼻中孔叢子曰宰我使齊反見夫子曰梁丘據遇毒三旬而瘳齊會大夫眾賓賀焉大夫並復獻攻毒之方弟子謂曰梁丘子瘳矣方安所施夫子曰三折肱而知為良醫治梁丘遇虺害而獲瘳假有與之同疾者必, SBCK: ''}
