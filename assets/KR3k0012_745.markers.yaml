  - {type: variant, offset: 3588, length: 8, content: 畢復入門明晨復出, SBCK: 射也不射之射乃盡善矣又曰射者非前期而中謂之善射天下皆羿也可乎不期而中誤中者耳非善射也􅀂謂謬中爲善射是則天下皆可謂之羿乎言不可矣列子曰列子學射中矣請於􅀜尹子􅀜尹子曰子知子之所以中者乎對曰弗知也􅀜尹子曰未可退而習之三年又以報􅀜尹子􅀜尹子曰子知子之所以中者乎列子曰知之矣􅀜尹子曰可矣而勿失也非獨射爲國與身亦皆}
