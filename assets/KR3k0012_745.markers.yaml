  - {type: variant, offset: 344, length: 363, content: 不亂射上中論藝紀曰射以平志御以和心書以綴事數以理煩李顒遊藝箴曰邈矣姬旦惟藝之淵易曰弦木為弧剡木為矢弧矢之利以威天下蓋取諸睽睽乖也物乖則爭興弧矢之用所以威乖爭也又曰公用射隼于高墉之上獲之無不利子曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有動而不括是以出而有獲語成器而後動者也括結也君子待時而動則無結閔之患也詩曰既張我弓又挾我矢又曰終日射侯不出正兮禮曰工尹商陽與陳棄疾追吳師及之陳棄疾謂工尹商陽曰王事也子手弓子射諸射之斃一人韔弓丑亮切韔弓衣止其御曰朝不坐燕不與殺三人亦足以反命矣朝燕于寢大夫坐於上士立於下然則商陽與御者皆土也孔子曰殺人之中又有禮馬善之又曰孔子云士使之射不能則辭以疾懸弧之義也男子生而設弧于門左示有射道而未能也又曰射有似乎君子失諸正鵠反求諸其身反求於其身不以怨人也盡曰正皮曰鵠也又曰孔子射於矍相之圃蓋, SBCK: 力}
