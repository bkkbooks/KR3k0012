  - {type: variant, offset: 3896, length: 45, content: 魏舒累遷後將軍鍾毓長史每與參佐射舒常為畫籌而已後遇朋人不足以舒滿數毓初不知其善射舒容貌閑雅, SBCK: 斯羿也}
  - {type: variant, offset: 3896, length: 4, content: 魏舒累遷, WYG: 薛仁貴領兵擊九姓突厥於天山将行髙宗出甲令仁貴試之上曰古之善射穿七札者卿且射五重仁貴射而洞之髙宗大驚更取金甲以賜之又曰李晟性雄烈有才善騎射年十八從軍身長六尺勇敢絶倫時河西節度使王忠嗣擊吐蕃有驍將乘城拒鬬頗傷士卒忠嗣募軍中能射者射之晟引軍一發而斃三軍皆大呼忠嗣厚賞之因撫其背曰此萬人敵也荘子曰吳王浮乎江登于狙之山衆狙見之狥而走逃於深榛有一狙焉見巧於王左射之敏給敏疾也給續也博㨗矢㨗速也矢性雖㨗而狙能博也王命相者趨而射之狙既死王顧謂其友顔不疑曰是狙也伐其巧恃其便以傲於予以至此殛也戒之哉又曰列御冦為伯昬無人射引之盈貫盈貫謂溢鏑也措杯水其肘上左手如拒右手如附技右手放發而左手不知故可措之杯水也發之適矢復沓矢去也箭適去復㰱沓也方矢復寓箭方去未至的已復寄杯於肘上言其敏捷之妙也當是時猶象人也不動之至伯昬無人曰是射之射非不射之射也又曰射者非前期而中謂之善射天下皆羿也可乎不期而中誤中者耳非善射也若謂謬中為善射則天下皆可謂之羿乎言不可矣列子曰列子學射中矣請於關尹子關尹子曰子知子之所以中者乎對曰弗知也關尹子曰未可退而習之三年又以報關尹子關尹子曰子知子之所以中者乎列子曰知之矣關尹子曰可矣守而勿失也非獨射為國與身亦皆如之又曰中山公子牟恱趙人公孫龍樂正子輿之徒笑之公子牟曰子何笑牟之悦龍也子輿曰吾笑龍之紿孔穿紿欺言善射者能令}
