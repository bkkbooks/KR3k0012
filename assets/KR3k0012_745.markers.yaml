  - {type: variant, offset: 3912, length: 5, content: 舒常為畫籌, WYG: 其目矢至眸也而眶不睫矢墜地而塵不揚是豈智者之言歟公子牟曰知者之言固非愚者之所曉也後鏃中前括均後於前也矢注眸子而眶不睫盡矢之勢也子何疑焉又曰甘蠅古之善射者彀弓而獸伏鳥下弟子名飛衛學於甘蠅而巧過其師紀昌又學射於飛衛飛衛曰爾先學不瞬而後可言射矣紀昌歸偃臥其妻之機下以目承牽挺三年之後雖椎末到眥而不瞬也以告飛衛曰未也必也視小如大視微如著而後告我紀昌以氂懸虱於牖南面而望之旬日之間浸大也三年之後如輪焉以覩餘物若丘山也乃以燕角之弧朔蓬之簳射之貫虱之心而懸不絶以告飛衛飛衛髙蹈拊膺曰汝得之矣紀昌既盡衛之術計天下之敵己者一人}
  - {type: page-break, offset: 3912, content: '', id: KR3k0012_WYG_745-9b, image: WYG0899/WYG0899-0557d.png}
