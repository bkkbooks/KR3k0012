  - {type: variant, offset: 3945, length: 5, content: 舉坐愕然莫, SBCK: 而與之賞罰則不中的者何也傅弥仁曰􅀂羿也口懼爲之災萬金爲之患矣人能遺其喜去其萬金則天下之人皆不愧於羿矣夏王曰人聞子之言始得無欲之道淮南子曰尭時十日並出堯命羿仰射十日中其九焉又曰史皇産而能書史皇蒼頡生而見鳥迹知著書虎曰史皇或曰鴶皇羿左臂脩脩長也而善射羿}
