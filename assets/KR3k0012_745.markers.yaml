  - {type: variant, offset: 55, length: 2, content: 尚伎, SBCK: 􅈛朱兆萬仁榮從子也少驍猛善􅀐射蹻捷過人榮曾送臺使見二鹿乃命兆前授之二箭曰可取此鹿供令食也遂停馬搆火以待之俄然兆􅀗其一榮欲矜誇使人責兆曰何不盡取杖之五十又曰山偉字仲才河南洛陽人其先代人也祖強攻􅀐射彎弓五石􅀄爲駕部郎顯祖出於方山兩狐起於御前詔強射之百歩之内二狐俱死顯祖善之除内行長又曰元庫汗爲羽林中郎從駕北廵有􅇠起於乗輿命庫汗射之應弦}
  - {type: page-break, offset: 55, content: '', id: KR3k0012_SBCK_745-1b}
  - {type: variant, offset: 55, length: 2, content: 尚伎, WYG: 長孫晟嘗使攝圗攝圗獨愛晟每共遊獵留之竟嵗有二鵰飛}
  - {type: variant, offset: 55, length: 2, content: 尚伎, krp: 爾朱兆萬仁榮從子也少驍猛善騎射蹻捷過人榮曾送臺使見二鹿乃命兆前授之二箭曰可取此鹿供令食也遂停馬搆火以待之俄然兆獲其一榮欲矜誇使人責兆曰何不盡取杖之五十又曰山偉字仲才河南洛陽人其先代人也祖強攻騎射彎弓五石𥘉爲駕部郎顯祖出於方山兩狐起於御前詔強射之百歩之内二狐俱死顯祖善之除内行長又曰元庫汗爲羽林中郎從駕北廵有兔起於乗輿命庫汗射之應弦}
  - {type: variant, offset: 58, length: 1, content: 賤, SBCK: 斃太祖大恱賜金􅇠一枚以旌其能又曰楊播字延慶}
  - {type: variant, offset: 58, length: 1, content: 賤, WYG: 争肉因以箭兩隻與晟請射取之晟馳往遇鵰相攫遂一發䨇貫焉攝圗喜命諸子弟貴人皆相親友兾眤近之以學彈射又曰爾朱兆字萬仁榮從子也少驍猛善騎射蹻捷過人榮曾送臺使見二鹿乃命兆前授之二箭曰可取此鹿供今食也遂停馬構火以待俄然射獲其一榮欲矜誇使人責兆曰何不盡取杖之五十又曰山偉字仲才河南洛陽人其先居代祖强工騎射彎弓五石初為駕部即顯祖獵於方山兩狐起於御前詔強射之百歩之内二狐俱死顯祖善之除内行長又曰元庫汗為羽林中郎從駕北廵有兔起於乘輿命庫汗射之應弦而斃太祖大悦賜金一枚以旌其能又曰楊播字延慶}
