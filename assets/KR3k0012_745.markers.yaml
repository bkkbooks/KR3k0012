  - {type: variant, offset: 1023, length: 381, content: 鵠故天子大射謂之射侯射侯者射為諸侯也射中則得為諸侯射不中不得為諸侯大射將祭擇士之射也以為某鵠者將射還視侯中之則成人不中之則不成人也得為諸侯為有慶也不得為諸侯謂有讓也天子將祭必先習射於澤澤者所以擇士也已射於澤而後射於射宮射中者得與於祭不中者不得與於祭不得與於祭者有讓削以地得與於祭者有慶益以地進爵絀地是也澤宮名也士謂諸侯朝者諸臣及所貢士也皆先令習射於澤己乃射宮課中否也諸侯有慶者先進爵有讓者先削地也故男子生桑弧蓬矢六以射天地四方天地四方者男子之所有事也故必先有志於其所有事然後敢用穀也左傳曰晉楚將戰潘尫乏子黨與養由基蹲甲而射之徹七禮焉蹲聚以示王曰君有二臣如此何憂於戰王怒曰大辱國詰朝爾射死藝言汝以射自多必當以藝死也呂錡夢射日中之退入於泥呂錡魏錡也占之曰姬姓日也異姓月也射而中之退入於泥亦必死矣及戰射恭王中目王召養由基與之二矢使射呂錡中項伏弢他力切弓衣也以一矢復命言, SBCK: 宇文貴}
