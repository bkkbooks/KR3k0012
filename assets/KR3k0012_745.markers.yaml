  - {type: variant, offset: 3597, length: 0, content: '', SBCK: 之又曰中山公子牟恱趙人公務龍樂正子輿之徒􅀏之公子牟曰子何􅀏牟之恱龍也子輿曰吾􅀏龍之給孔穿給欺言善射者能令後鏃中前括音闊發發相及矢矢相屬前矢造淮而無絶落後矢之栝猶衘弦視之􅀂一焉孔穿駭之龍曰}
  - {type: punctuation, offset: 3598, content: ，, id: KR3k0012_CHANT_745-bkkpn1126}
