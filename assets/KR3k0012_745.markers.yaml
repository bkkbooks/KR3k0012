  - {type: variant, offset: 3019, length: 1, content: 我, SBCK: 昔李將軍廣親有此事公今復尓可謂丗載其德雖熊渠之名不能獨善其羙又曰趙文少而修德存忠節便弓馬能左右馳射又曰豆盧寧甞與梁企定遇於平涼川相與肆射乃於百歩懸莎草以射之七發五中企定時以爲能贈遺甚厚又曰賀跋勝從太祖宴于昆明池時有􅀟鳬遊於池上太祖乃授弓矢於勝曰不見公射乆矣請以爲歡勝射之一發俱中因拜太祖曰使勝得奉神武以討不庭皆如此也太祖大恱自是恩禮尤重又曰齊王憲子貴年十一從憲獵於鹽州圍中手射野馬及鹿一十有五隋書曰突厥入朝隋文賜之射突厥一發中的上曰}
