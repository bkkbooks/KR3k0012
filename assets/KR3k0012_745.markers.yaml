  - {type: variant, offset: 3951, length: 1, content: 敵, SBCK: 窮之君也又曰越人學逺射叅天而發適在五歩之内越人習水便舟而不知射射逺反直仰向天而發矢勢盡而還故近在五歩之内叅猶望也不易儀儀射法也言不曉射故不知易去叅天之法也丗巳變矣而守其故譬猶越人之射也言其守故不知變也又曰楚王有白援王自射之則摶矢而熈熈戯也使養由基射之始調弓矯矢未發而猨擁柱號矣由基楚王之臣養姓調張矯直擁抱號呼幽通賦日養流睇而援虎是也又曰夫矢}
