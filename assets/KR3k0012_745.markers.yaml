  - {type: variant, offset: 3923, length: 0, content: '', WYG: 交射中路矢鋒相觸而墜於地而塵不揚飛衛之矢先射紀昌之矢唯一發飛衛以棘刺之端扞之而無差焉於是二子泣而投弓相拜於塗請為之父子韓子曰李悝為魏文侯北地之守而欲民之善射者乃下令曰民之有狐疑之説者令人射杓音標中之者勝不中者不勝令且下而民皆習射日夜不休乃與奏戰大敗之以民之善射故也墨子曰或有於墨子學射墨子曰不可夫學者必量其力國士猶不可及今子非國士豈能我學又成射哉國先烈子善射皆不盡弓力善治不盡下情尸子曰荆荘王命養由基射青蛉王曰吾欲生得之養由基抜弓射之拂左翼焉王大善符子曰晉之相者桓氏世傳于楚善以道假乎射焉常以其所不晝射而患晝之}
