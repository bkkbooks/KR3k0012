  - {type: variant, offset: 1512, length: 524, content: 他不從丁學故曰遠始與公差具退悔而獨還射丁公孫丁授公轡而射之貫臂貫手公他臂又曰吳子諸樊伐楚以報舟師之役門于巢攻巢門也巢牛臣曰吳王勇而輕若啟之親門啟開門也我獲射之必殪殪死也是君也死疆其少安從之吳子門焉牛臣隱於短墻以射之卒又曰昔賈大夫惡貌醜也娶妻而美三年不言御以如皋射雉獲之其妻始笑而言周禮曰不司樂掌成均之法鄭司農云均調也樂師主調其音大司樂主受此成事已調之樂大射王出入令奏王夏及射令奏騶虞騶虞樂章名在召南之卒章王射以騶虞為節也詔諸侯以弓矢舞舞謂執弓挾矢揖讓進退之儀又曰樂師掌國學之政以教國子少舞謂以年幼少時教之舞凡射王以騶虞為節諸侯以貍首為節大夫以采蘋為節士以采繁為節騶虞采蘋采繁皆樂章名在國風召南為貍首在樂記又曰王以六耦射三侯三獲三容樂以騶虞九節五正諸侯以四耦射二侯二獲二容樂以貍首七節三正孤卿大夫以三耦射一候一獲一容樂以采蘋五節二正士以三耦射犴侯一獲一容樂以采蘋五節二正鄭司農云三侯虎熊豹也容者乏也待獲者所蔽也九節析羽九重設於長杠正所射也若王大射則以貍步張三侯鄭司農云貍步謂不舉足為步於今為半步也玄謂貍善博者也行則止而擬度焉其發必獲是以量侯道法之也王射則令去侯立於後以矢行告卒令取矢鄭司農云射人王令人去侯所而立於後也以矢行告射人以矢行高下左右告於王者, SBCK: 字}
