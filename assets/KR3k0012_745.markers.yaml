  - {type: variant, offset: 708, length: 279, content: 者如堵墻矍相地名也樹菜蔬曰圃射至於司馬使子路執弓矢出延射曰賁房吻切軍之將亡國之大夫與為人後者不入其餘皆入蓋去者半入者半先行飲酒禮將射弓以司馬子路執弓矢延射則為司射也賁讀為僨僨猶覆則也又使公罔之裘序點楊觶而語曰幼壯孝悌耆耋好禮不從流俗修身以俟死者不在此位也蓋去者半處者半序點楊觶而語曰好學不倦好禮不變耄期音基稱道不亂者不在此位也蓋僅有存焉之發聲也射畢又使此二人舉觶者古者於旅也語語謂說美理也三十曰壯耆耋皆老也流俗失俗也處猶留也不可以在此賓位序點或為徐點壯或為將耄期或為旄動又曰射之為言繹也或曰舍也繹者各繹己之志也故心平體正持弓矢審固持弓矢審固則射中矣故曰為人父, WYG: ''}
