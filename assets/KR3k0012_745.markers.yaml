  - {type: variant, offset: 3472, length: 0, content: '', SBCK: 晟引軍一發而斃}
  - {type: variant, offset: 3473, length: 0, content: '', SBCK: 軍皆大呼忠嗣厚賞之因撫其背曰此萬人敵也荘子曰吴王浮乎江登于狙之山衆狙見之徇然而走逃於􅀷榛有一狙焉見巧於王王射之敏給敏疾也給績也􅅮捷矢捷速也矢徃雖速而狙能搏也王命相者趨而射之狙執死王顧謂其友顔不疑曰是狙也伐其巧恃其便以傲於予以至此殛也戒之哉又曰列禦㓂爲伯昏瞀人射引之􅄹貫棤杯水於其肘左手如矩右手如附枝左手放}
  - {type: page-break, offset: 3473, content: '', id: KR3k0012_SBCK_745-5a}
  - {type: punctuation, offset: 3474, content: ，, id: KR3k0012_CHANT_745-bkkpn1097}
  - {type: 'tls:seg', offset: 3474, content: '', id: KR3k0012_CHANT_745-37a.7}
  - {type: variant, offset: 3474, length: 5, content: 三鹿皆應弦, SBCK: ''}
  - {type: variant, offset: 3477, length: 345, content: 應弦而倒吳志曰太史慈字子義初北海相孔融以黃巾寇暴出屯都昌為賊管亥所圍慈乃帶鞬攝弓上馬將兩騎自隨各作一的持之開門直出外軍圍下左右人並驚駭兵馬牙出慈引馬至城下塹內植所持的各一出射之射畢徑入門晨復如此圍下人或起或臥故慈復植的射之畢復入門明晨復出如此無復起者於是鞭馬直突圍中馳去此賊覺知慈行已過又射數人皆應弦而倒故無敢追者慈猿臂善射弦不虛發嘗從孫策討麻保賊賊於屯裏緣樓上行罵以手持樓棼慈引弓射之矢貫手著棼圍外萬餘人莫不稱善其妙如此晉書曰劉曜字永明身長九尺六寸垂手過膝雄武有膂力射鐵入一寸焉時號神射也又曰庾翼時有眾萬詔加都督征討諸軍事師次襄陽大會僚佐陳旌甲親授弧矢曰我之行也善此射矣遂三起三疊徒眾屬目其氣十倍又曰庾翼鎮武昌謝尚數詣翼諮謀軍事嘗與翼共射翼曰卿若破的當以鼓吹相賞尚應聲中之翼即以其副鼓吹給, WYG: 敬憚}
