  - {type: variant, offset: 4139, length: 396, content: 六子善射常取甘蔗插地百步射之十發十中古之楊葉殆不能加陳書曰禇玠剛毅有膽決長騎射常從司空侯安都於徐州出獵遇猛獸玠射之再發中口入腹俄而獸斃燕書曰賈堅字世固彎弓三石餘烈祖以堅善射故親試之乃取一牛置百步上召堅使射曰能中之乎堅曰少壯之時能令不中今已年老正可中之恪大笑射發一矢拂脊再一矢磨腹皆附膚落毛上下如一恪曰復能中乎堅曰所貴者以不中為奇中之何難一發中之堅時年六十餘觀者咸服其妙又曰慕容根善射嘗從行獵有一野羊立於懸崖太祖命左右射之莫有中者根自募求射之一發而中崔鴻十六國春秋燕錄曰建威翰奔還本國有勁騎百餘追之翰遙謂之曰吾既思戀而歸必無返面吾之弧矢汝曹知否無為相逼自取死也吾處汝國久矣誓不殺汝可百步豎刀吾射中者汝便宜返不中者可前也諸騎解刀豎之翰發而中鐶追騎乃散又後燕錄曰慕容盛行遇賊盛曰汝欲當鋒乎試豎汝手中箭百步我善中之宜慎汝命如不中當束身相授盜乃豎箭盛一發中之盜曰相試耳資而遣之又前秦錄曰符琳字永瑤堅之第, SBCK: ''}
