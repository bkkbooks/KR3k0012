  - {type: variant, offset: 3598, length: 0, content: '', SBCK: 未其妙者逢蒙之弟子曰鴻起怒其妻而怖之引烏號之弓淇衛之箭射其目矢至眸子而眶不睫矢墜地而塵不揚是豈智者之言歟公子牟曰知者之言固非愚者之所暁也後鏃中前括均後於前也矢注眸子而眶不睫盡矢之􅀔也子何疑焉又曰甘蠅古之善射者彀弓而獸伏鳥下弟子名飛衛學於甘蠅而巧過其師紀昌又學射於飛衛曰尓先學不瞚音舜而後可言射矣紀昌歸偃卧其妻之機下以目承牽挺牽挺機躡也三年之後錐末到眥而不瞚也以告飛衛飛衛日未也亞學視小如大視微如著而後告我紀昌以􅈊懸虱於牖南面而望之旬日之間浸大也三年之後如輪焉以覩餘物並丘山也乃以燕角之弧朔蓬之簳射之貫虱之心而懸不絶以告飛衛飛衛髙蹈捬膺曰汝得之矣紀昌旣盡衛之術計天下之敵巳者一人而已乃謀殺飛衛相遇於野二人交射中路矢鋒相觸而墜於地而塵不􅀭飛衛之矢先射紀昌之矢唯一旣發飛衛以􅁄刺之端扞之而}
