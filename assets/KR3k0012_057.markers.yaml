  - {type: variant, offset: 209, length: 581, content: 作也毛詩曰考盤在陸碩人之軸又曰鴻飛遵陸公歸不復於女信宿毛萇曰陸非鴻所宜處也周禮曰作車以行陸作舟以行水此皆聖人之作樂動聲儀曰土肥饒原陸隘狹斯生奢侈之俗也漢書曰禹陸行載車又曰秦地有鄠杜竹林號曰陸海又曰鄒陽奏書吳王曰高皇帝水攻則章邯以亡其城陸擊則荊王以失其地魏名臣奏曰執金吾龐延秦其山居林澤有火耕畬種而平地平陸雖有往古耒耜區種之法就其收者適可䟽食不足實食也關令內傳曰關令尹喜生時其家堂陸地自生蓮華光色鮮盛文子曰卻走馬以糞車軌不接於遠方之外是謂坐馳陸汎老子曰蓋聞善攝生者河上公曰攝養也陸行不遇兕虎自然遠避害不干也入軍不被甲兵莊子曰泉涸魚相與處陸相煦以濕相濡以洙不若相忘于江湖王充論衡曰夫知古不知今謂之陸沉然則儒生所謂陸沉者也應劭風俗通曰荊鱉令死亡隨水上荊人求之不得也鱉令至岷山下邑起見蜀望帝使鱉令鑿巫山然後蜀得陸處望帝自以德不如以國禪與鱉令為蜀王號曰開明傳子曰堯遭洪水而貴陸湯大旱而重水又曰陸田命懸於天人力雖脩茍水旱不時則一年之功棄矣六韜曰天下之人陸沉於殷久矣傅咸扇賦曰水不策驥陸不乘舟世無為而俎豆設詩時有虞而干戈脩夏侯湛春可樂曰春可樂兮樂崇陸之可娛登夷岡以逈眺兮超矯駕乎山嵎又秋可哀曰秋可哀兮哀南畝之菜荒既採蕭於大陸兮又刈蘭乎崇岡又梁田賦曰嬉于夷寧之廣陸步于大野之長京察田疇之疆畔兮觀遊雉之逸形京說文曰京人所為絕高丘也毛詩曰升彼墟矣以望楚矣望楚與堂景山與京毛萇曰京高丘, WYG: ''}
