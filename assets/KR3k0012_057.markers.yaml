  - {type: variant, offset: 314, length: 1, content: 高, SBCK: 魏之先居幽都也鑿石爲祖宗之廟於烏洛侯國西北自後南遷其地隔逺遣中書侍郎李敞詣石室告祭天地以皇祖先妣配敞等旣祭斬樺木立之以置牲體而還後所立樺木生長成林其民益神之咸謂魏國感靈祗之應也又曰太祖道武帝以建國三十四年七月七日生於叅合陂北明年有榆生於埋胞之坎後遂成林又曰葬昭成}
