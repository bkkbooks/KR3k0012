  - {type: variant, offset: 1259, length: 329, content: 巨海而脅於田常孫楚王驃騎誄曰逍遙芒阿闔門下帷研精六藝採鉤微湛方生詩曰發鞌踞平陸秣馬青山阿濁酒炙枯魚鼎食何必過袁宏採菊詩曰息足廻阿圓坐長林披榛即澗藉草依陰酈炎詩曰靈芝生河洲動搖困洪波秋蘭榮何晚嚴霜瘁其柯哀哉二芳草不殖太山阿摯虞遷宅誥曰惟大始三年九月上旬涉自洛川周于原阿乃卜昌水東黃水西背山面隰惟此良陸機逸民賦曰相荒土而卜居兮度山阿而考室又緩齊歌行曰遨仙聚靈族高讌曾城阿長風萬里舉慶雲鬱嵯峨峴從征記曰青峴沙峴一名小峴木多櫨杏續述征記曰菟頭峴雖無峭嶮然連林脩坂數十里中行者固亦密勿矣伏琛齊地記曰萊蕪谷有銅冶峴古鑄銅處朱虛城西有山峴遠而峻今名半車峴白淵之齊道記曰黃丘北十里有鸑鷟峴下帶長澗東北流經牛山山去此水八十餘里今號曰牛頭水是齊景公所登而歎處劉楨京口記曰去城九里, SBCK: ''}
