  - {type: variant, offset: 239, length: 3, content: 陸非鴻, SBCK: 北林名也招賢人往從之使疾如晨風之飛入北林又曰有鶖在梁有鶴在林鄭􅀇曰鶖之性貪惡而今在梁鶴絜白而反在林也又曰厥初生民時惟姜嫄載生載育時維后稷誕寘之隘巷羊牛腓字之毛萇曰寘置也腓辟也字愛也鄭􅀇曰姜嫄置后㮨羊牛之徑亦以爲異也誕寘之平林㑹伐平林置人平林又爲人}
