  - {type: variant, offset: 249, length: 2, content: 作車, SBCK: 凢􅀖工入山林而掄材不禁又曰林衡掌廵林麓之禁令而平其守}
  - {type: page-break, offset: 249, content: '', id: KR3k0012_SBCK_057-2a}
  - {type: variant, offset: 249, length: 2, content: 作車, krp: 凢邦工入山林而掄材不禁又曰林衡掌廵林麓之禁令而平其守}
  - {type: variant, offset: 252, length: 3, content: 行陸作, SBCK: 時計林麓而賞罰之鄭􅀇曰平其守者平其地民守林麓之部分又曰柞氏掌攻草木及林麓夏日至令刋陽木而火之冬日至令剥隂木而水之鄭􅀇曰刋剥也生山南爲陽木生山北爲隂木火之水之則使其􅀠不又鄭注曰竹木曰林大戴禮曰髙山多林虎豹蕃孕焉深泉大川魚龍交焉左傳曰楚薳掩爲司馬書土田度山林鳩藪澤収隰臯楊方五經鈎深曰夫鳥遊曠澤之地而北翮者万群虎居繁林之藪而接豪者千數又曰夫霜樹落葉而鴻鴈南飛桃林披華而􅀇鳥入宇家語曰芝蘭生於深林不以無人而不芳君子脩道立德不爲困窮而改節史記曰殷紂厚賦稅實鹿臺錢􅄹鉅橋粟廣沙丘苑臺大戯沙丘以酒爲池懸􅁏爲林爲長夜之飲又曰稷母姜嫄見巨人迹心忻踐之而身動如孕胎居期生子棄之隘巷馬牛不踐徙之林中㑹山林多人遷之渠中水上鳥以翼覆薦之又曰單于秋馬肥大㑹蹛林課校人畜又曰神􅀛在江南嘉林中嘉林者無鳥獸無毒䖝火所不及斧所不至帝王世紀曰桀爲􅁏山脯林以酒爲池使可運}
