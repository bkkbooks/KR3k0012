  - {type: variant, offset: 163, length: 1, content: 鳧, WYG: 林有樸䔩野有死鹿白茅純束又曰爰居爰處爰喪其馬于以求之于林之下又曰鴥彼晨風鬱彼北林毛萇曰先君招賢人賢人往從之駚疾如晨風之飛入于北林又曰有鶖在梁有鶴在林鄭𤣥曰鶖之性貪惡而反在梁鶴潔白而反在林也又曰厥初生民時惟姜嫄載生載育時維后稷誕寘之隘巷羊牛腓字之毛萇曰寘置也腓辟也宇慶曰鄭𤣥曰嫄置后稷羊牛之徑亦以為異也誕寘之平林㑹伐平林置之平林又為人所收也又贍彼中林甡甡其鹿鄭𤣥曰視彼中林其鹿相輩耦行甡甡然衆多今朝廷羣臣皆相欺皆不相與以善道言其鹿之不如又曰翩彼飛鴞集於泮林食我桑椹懐我好音鄭𤣥曰鶚惡鳴之鳥止於泮水之木食桑椹改其鳴歸就我善音喻人感于恩則化也禮曰草木零落然後入山林又曰林藪川澤有能取蔬食也虞教道之又曰林麓川澤以時入而不禁蔡邕月令章句曰叢木曰林受衆流注曰海周禮曰凡邦工入山而掄材不禁又曰林衡掌巡林麓禁令而平其守計以時其林麓而賞罰之鄭𤣥曰平其守者平其地各守林麓之部分又曰柞氏掌攻草木及林麓夏日至令刋陽木而火之冬日至令剝隂木而水之鄭𤣥曰刋剝也生山南為陽木生山北為陰木火之水之則使其肄不生鄭注曰竹木曰林大戴禮曰高山多林虎豹蕃孕焉深泉大川魚龍交焉左傳曰楚薳掩為司馬書土田度山林鳩藪澤牧濕皋楊方五經鈎深曰夫鳥遊曠澤之地而比翮者萬羣虎居繁林之藪而接豪者千數又曰夫霜樹落葉而鴻雁南飛桃林披華而去鳥深入家語曰芝蘭生于深林不以無人而不芳君子修道立徳不為窮困而改節史記曰殷紂厚賦税實鹿臺錢盈鉅橋粟廣沙丘苑臺大戲沙丘以酒為}
