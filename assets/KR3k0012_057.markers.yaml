  - {type: variant, offset: 246, length: 0, content: '', SBCK: 又曰瞻彼中林牲牲其鹿毛萇曰視彼林中其鹿相軰偶牲牲衆多今朝廷羣臣皆相欺皆言其鹿之不知也又曰翩彼飛鴞集于泮林食我桒椹懷我好音鄭􅀇曰鴞惡鳴之鳥止於泮水之木食桒椹改其鳴歸就我善音喻人感於恩則化之禮曰草木零落然後入山林又曰林藪川澤有能取􅂼食野虞敎導之又曰林麓川澤以時入而不禁蔡邕月令章句曰叢木曰林受衆流注曰海}
  - {type: variant, offset: 246, length: 0, content: '', krp: 又曰瞻彼中林牲牲其鹿毛萇曰視彼林中其鹿相軰偶牲牲衆多今朝廷羣臣皆相欺皆言其鹿之不知也又曰翩彼飛鴞集于泮林食我桒椹懷我好音鄭玄曰鴞惡鳴之鳥止於泮水之木食桒椹改其鳴歸就我善音喻人感於恩則化之禮曰草木零落然後入山林又曰林藪川澤有能取𬞞食野虞敎導之又曰林麓川澤以時入而不禁蔡邕月令章句曰叢木曰林受衆流注曰海}
