  - {type: variant, offset: 294, length: 2, content: 秦地, SBCK: 山林之士往而不能返朝廷之士入而不能出後漢書曰法雄爲南郡太守移書屬縣曰凢虎狼之在山林猶人民之居城市張瑩漢南記樊重家素富田至三百頃竹木成林六畜放牧桒􅃮魚池閉門成市魏志曰曹植上䟽曰東}
