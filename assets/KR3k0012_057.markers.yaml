  - {type: variant, offset: 2248, length: 331, content: 里水邊有漢武堆漢武嘗遊此以為鉤臺後人覩其崇基謂之漢武堆述異記曰當陽縣南有龍川鳳川云漢帝時八龍五鳳常遊於此亦呼為五鳳堆安定圖經曰振履堆者故老云夸父逐日振履於此故名之墟說文曰墟大丘也崑崙謂之墟史記曰成王伐管蔡以殷餘人封康叔為衛君居故啇墟漢書曰元城郭東有五鹿之墟即沙麓之地也越絕書曰千里墟者闔廬以鑄干將劍處又曰吳門外雞坡墟故吳王所畜雞處也新序曰齊恒公出見遺墟問諸野人野人曰是虢公之墟公曰虢氏何為亡對曰善不能行惡不能去所以為墟矣風俗通曰謹案尚書舜生姚墟又曰姚墟在濟陰城陽縣帝顓頊之墟閼伯之墟是也培塿說文曰附婁小土山也左傳曰培塿無松柏方言曰冢秦晉之間謂之培塿墨子曰培塿之沉則生松柏民衣焉食焉家焉死焉地終不責德故以為仁風俗通曰培塿者即阜之類也今齊魯之間田中小高者名之為培塿矣, SBCK: 七}
