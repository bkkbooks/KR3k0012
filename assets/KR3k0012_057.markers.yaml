  - {type: variant, offset: 1022, length: 2, content: 菁菁, SBCK: 晉侯宋公齊國歸父秦小子憖次于城濮楚師背􅈶而舎晉侯患之聽輿人之誦曰原田莓莓舎其舊而新是謀公疑焉子犯曰戰也戰而捷必得志於諸侯􅀂其不捷表裏山河必無害也春秋􅀃題辭曰原端也平而有度也宋均曰度法則也公羊傳曰上平曰原􅂖梁傳曰中國曰太原夷狄曰大鹵國語曰温之㑹晉人執衛成公歸之于周使醫鴆之不死醫亦不誅臧文仲言於僖公曰刑大}
