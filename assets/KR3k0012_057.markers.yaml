  - {type: variant, offset: 179, length: 0, content: '', WYG: 魏志曰曹植上疏曰東有覆敗之軍西有殪没之將至使蜂蛤浮翔於淮泗􅀈鼬讙譁於林木臧榮緒晉書曰郄詵為雍州刺史帝於東堂餞之問詵曰卿自以為何如詵對曰臣舉賢良對䇿為天下第一猶桂林之一枝昆山之片玉世祖笑侍中奏免詵誥曰吾與之戲耳又曰華譚移前松滋令袁甫曰枯澤非應龍之泉平林非鸞鳳之窟又曰王戎少阮籍二十餘年相得如時輩遂為竹林之遊晉書曰劉伶與阮籍嵇康相遇忻然神解便攜手入林又曰嵇康以髙契難期每思郢質所與神交者唯阮籍山濤遂為竹林之遊務預其流者向秀劉伶阮咸王戎干寳晉紀曰初管輅過毌丘氏墓下倚樹哀吟精神不樂林木雖茂無形可交碑誄雖美無後可守後魏書曰魏之先居幽都也鑿石為祖宗之廟於烏洛侯國西北自後南遷其地隔逺遣其部侍郎李敞詣石室告祭天下以皇祖先妣配敞行大祭斬樺木立之以致牲體而還後所立樺木生殖成林其民益神之咸謂魏國感靈祗之應又曰太祖武帝以建國三十四年七月七日生於㕘合坡北明年有榆生于傾胞之次後遂成林又曰葬昭成皇帝於金陵營梓宫梯盡生成林顧愷之啟矇記曰汎林鼓于浪嶺註西北海有汎林或方三百里或百里皆生海中浮土上樹根隨浪鼔動山海經曰桃林方三百里在崑崙南夸父山北又曰夸父逐日影渇飲河不足道渇死其杖化為鄧林山謙之吳興記曰於潜縣北有天木山山上衆木甚美非常因名翔鳳林盛𢎞之荆州記曰宅上山頂有玉女遂營墳整固上有喬木叢生名為女貞林常有白猿栖遊哀鳴清絶又曰江陵縣東一百里有緑林山茂林蓊鬰襄陽大路經由其西所謂當陽之緑林也伍瑞體江陵記曰城西北六十里有林春秋魯文公六年楚飢戎侵其西至于阜山師火林即此城也又曰州城東北十二里有曹公林相傳云建安十三年曹闕任豫益州記曰廣平有石闕林禹闕處也地方百許里今人猶不敢居之外國圖曰桂林地多林木無平地衆猴居之無人民去九疑曰萬里龜林地險無平土衆龜居之應邵風俗通曰梅林在太山西南五六里今樹木不足義慶世說曰魏武行役失汲道三軍皆渴乃曰前有大梅林饒子甘酸可以解渴士卒聞之口皆出水乗此得及前源莊子曰孔子遊乎緇帷之林坐杏壇上弟子讀書孔子絃歌鼓琴曲未半漁父下船來國語曰唐叔射兕于徒林殪以為大甲越絶書曰麻林者越王種麻于此以為弓弦故曰麻林麓說文曰林屬於山曰麓一曰麓者山守林吏也左傳僖公十四年沙麓崩書洪範五行傳曰沙麓者山林也詩文王篇旱麓章曰瞻彼旱麓山足曰麓禮記曰林麓川澤以時入而不禁漢書曰王翁孺徙魏郡元城元城見公曰昔春秋時沙麓崩晉史卜之曰隂為雌陽為雄二火相乗後六百四十五年宜有聖女興今王翁孺徙其地日月當之翁孺生禁禁生元后漢書應劭曰麓林之大者風俗通曰}
