  body:
  - {type: variant, offset: 5, length: 4, content: 六王師漢, SBCK: 七從事中郎府椽府屬諮議叅軍公府舎人記室叅軍府叅軍從事中郎諸府附魏志曰韓嵩字德髙義陽人少好學貧不改操知丗將亂不應三公之命與同好數人隱居於酈西山中黄巾起嵩避難南方劉表逼以爲從事中郎吴志曰嚴畯字㬅才彭城人也少躭學善詩書三禮避亂江東與諸􅁑瑾歩隲齊名有善性質純厚其於人物忠告善導志存􅀘益張昭進之於孫權權以爲􅀐都尉從事中郎晉}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_249-1b}
  - {type: variant, offset: 5, length: 4, content: 六王師漢, WYG: 七從事中郎府掾府屬諮議參軍公府舍人記室參軍府參軍從事中郎諸府附魏志曰韓嵩字德髙義陽人少好學貧不改操知世將亂不應三公之命與同好數人隠居於酈西山下黄巾起嵩避難南方劉表逼以為從事中郎呉志曰嚴畯字㬅才彭城人也少躭學善詩書三禮避亂江東與諸葛瑾歩隲齊名友善性質純厚其於人物忠告善導志存補益張昭進之於孫權權以為騎都尉從事中郎晉}
