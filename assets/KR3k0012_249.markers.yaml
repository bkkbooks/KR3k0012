  - {type: variant, offset: 3333, length: 0, content: '', WYG: 後故相逢吉之姪曽孫父循大中八年登進士第巨川乾符應進士屬天下大亂流離奔播切於禄仕乃以刀筆從諸侯府王重榮鎮河中辟為掌書記時車駕在蜀賊據京師重榮匡合諸藩叶力殄㓂軍書奏請堆案盈几巨川文思敏速斡動如飛傳之藩鄰無不聳動重榮収復之功巨川之助也典畧曰阮瑀字元瑜陳留人以才自䕶曹洪聞其有才欲使報荅書記瑀不肯榜笞瑀瑀終不屈洪以語曹公公知其無病使人呼瑀瑀乃惶怖詣門公見之謂曰卿不肯為洪且為我作之瑀曰諾遂為記室世說曰太原孫楚字子荆為大司馬石苞記室參軍又曰郗超王珣並以雋才為桓大司馬所眷珣為主簿超為記室參軍桓時為荆州超為人多鬚珣形狀短小於時西人為之歌曰髯參軍短主簿能令公喜能令公怒府參軍諸府附魏志曰張範參丞相軍事甚見敬重太祖征伐常謂文帝曰舉動必諮此人世子執弟子禮又曰董昭等謂太祖宜進爵國公備九錫以彰殊勲宻以諮荀彧彧以為太祖本興義兵以匡朝寧國秉忠貞之誠守退讓之實君子愛人以徳不宜如此太祖由是心不平會征孫權表請彧勞軍於譙因留彧以侍中光禄大夫持節參丞相事太祖軍至濡湏彧疾留壽春以憂薨時年五十又曰曹休字文烈蜀主遣將呉蘭屯下辯太祖遣曹洪征之以休參洪軍事太祖謂休曰汝雖參軍其實師也洪聞此令恒委事於休又曰于禁屯潁隂樂進屯陽翟張遼屯長社諸將任氣多共不恊使趙儼并參三軍每事誨諭遂相親睦又曰太祖征馬超文帝留守使程昱參軍田銀蘇伯等反河間遣將賈信討之賊有千餘人請降議者皆以為如舊法昱曰誅降不義臣以為不可誅也縱誅之宜先啟聞衆議曰軍事有專無請昱不答文帝趨入特引見昱昱曰凡專命者有臨時之急呼吸之間者耳今此賊制在賈信之手無朝夕之變故老臣不願將軍行之文帝答曰君慮之善即白太祖太祖果不誅太祖還聞之甚悦謂昱曰君非徒明於軍計也又善處人父子之間晉書曰魏舒字晹元為相國參軍府朝碎事未嘗}
