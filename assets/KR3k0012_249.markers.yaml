  - {type: variant, offset: 3060, length: 0, content: '', SBCK: 府􅁺屬不肯親事但出入養虚故寵獨勤心於事又以法令繁冗吏得生因縁以致輕重乃置撰科牒辝訟比例使事􅀋相從以塞姧源其後公府奉以爲法魏志曰蔣濟字子通辟丞相主簿西曹屬令曰舜舉臯陶不仁者逺臧否得中望於賢屬又曰胡質字文德少與蔣子通俱知名於江淮間仕州郡濟爲別駕使見太祖太祖問曰胡通逹}
  - {type: variant, offset: 3060, length: 0, content: '', WYG: 府諮議典籖主率共事事舉而情得或謂岱曰主王既以報事多門而每能緝和公私云何致此岱曰古人言一心可以事百君我為政端平待物以禮悔􅈔之事無由而及明闇短}
  - {type: variant, offset: 3060, length: 0, content: '', krp: 府掾屬不肯親事但出入養虚故寵獨勤心於事又以法令繁冗吏得生因縁以致輕重乃置撰科牒辝訟比例使事類相從以塞姧源其後公府奉以爲法魏志曰蔣濟字子通辟丞相主簿西曹屬令曰舜舉臯陶不仁者逺臧否得中望於賢屬又曰胡質字文德少與蔣子通俱知名於江淮間仕州郡濟爲別駕使見太祖太祖問曰胡通逹}
  - {type: variant, offset: 3061, length: 0, content: '', SBCK: 者寜有子孫不濟曰有子曰質䂓摹大略不及父至於精良綜事過之太祖辟爲丞相屬臧榮緒晉書云劉沈字道真丗爲北州名族􅀶學好古辟衛瓘屬范亨燕書曰鮮于休有才器􅇊幹辟爲左光禄大夫曹屬諮議叅軍諸府附齊書曰張岱歴爲三府諮議與典籖主帥共事事舉而情得或謂岱曰主王旣以執事多門而毎能緝和公私云何致此岱曰古人言一心可以事百君我爲政端平待物以禮悔􅈔之事無由而及明闇短長更是才用之多少耳南}
