  - {type: variant, offset: 3341, length: 0, content: '', SBCK: 曰宗越隨栁元景北伐領馬幢主􅈻栁元怙有戰功在景後還􅀘後軍叅軍督護隨王誕戲之曰汝何人遂得我府四字越荅曰征伐未死不憂不得諮議叅軍誕大􅀏宋書曰王瞻字明逺一字叔鸞􅀒氣傲俗好貶裁人物仕宋爲王府叅軍甞詣劉彦節直登榻曰君侯是公孫僕是公子引满促􅂰唯余二人彦節外跡雖酬之意甚不恱梁史曰沈警字丗明惇篤有行業學通左氏春秋家累千金}
