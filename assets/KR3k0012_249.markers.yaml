  - {type: variant, offset: 3333, length: 0, content: '', SBCK: 後故相逢􅁻之姪曽孫父循大中八年登進士第巨川乹符應進士屬天下大亂流離奔播切於禄仕乃以刀筆從諸侯府王重榮鎮河中辟爲掌書記時車駕在蜀賊據京師重榮匡合諸藩叶力殄㓂軍書奏請堆案盈几巨川文思敏速翰動如飛傳之藩鄰無不聳動重榮収復之功巨川之助也典略曰阮瑀字元瑜陳留人以才自護曹洪聞其有才欲使報荅書記瑀不肯榜笞瑀瑀終不屈洪以語曹公公知其無病使人呼瑀瑀終惶怖詣門公見之謂曰卿不肯爲洪且爲我作之瑀曰諾遂爲記室丗說曰太原孫楚字子荆爲大司馬石苞記室叅軍又曰郄超王珣並以儁才爲桓温大司馬所眷珣爲主簿超爲記室叅軍桓時爲荆州超爲人多􅂡珣形􅃺短小于時西人爲之歌曰髯叅軍短主簿能令公喜能令公怒府叅軍諸府附魏志曰張范叅丞相軍事甚見敬重太祖征伐常謂文帝曰舉動必咨此人丗子執子孫禮又曰董昭等謂太祖冝進爵國公備九錫以彰殊勲密以諮荀彧彧以爲太祖夲興義兵以匡朝寜國秉忠貞之誠守退讓之實君子愛人以德不冝如此太祖由是心不平㑹征孫權表請彧勞軍于譙國留彧以侍中光禄大夫持節叅丞相軍事太祖軍至濡湏彧疾留壽春以憂薨時年五十又曰曹休字文烈劉備遣將呉蘭屯下辯太祖遣曹洪征之以休叅洪軍事太祖謂休曰汝雖叅軍其實帥也洪聞此令􅁪委事於休又曰于禁屯頴隂樂進屯陽翟張遼屯長社諸將任氣多共不恊使趙儼并叅三軍毎事誨諭遂相親睦又曰太祖征馬超文帝留守使程昱叅軍田銀蘇伯等反河間遣將軍賈信討之賊有千餘人請降議者皆以爲如舊法昱曰誅降之意臣以爲不可誅也縱誅之冝先啓聞衆議曰軍事有專無請昱不荅文帝起入特引見昱昱日凡專命者謂有臨時之急呼吸之間者耳今此賊制在賈信之手無朝夕之變故老臣不願將軍行之文帝荅曰君慮之善即白太祖太祖果不誅太祖還聞之甚恱謂昱曰君非徒明於軍計也又善處人父子之間晉書曰魏舒字陽元爲相國叅府朝碎事未甞不見是非至廢興大事衆人旣下意然後徐爲之多出衆議莫不敬從晉王日魏舒堂堂人之領䄂也又曰孫楚字子荆爲佐著作郎叅石苞驃􅀐軍事楚旣􅀒其才器頗侮易苞􅀄至揖曰天子命我叅卿軍􅀄叅軍不敬府主楚旣輕苞遂制施敬自楚始也又曰李㳙字宣伯容皃簡素頺然􅀂不足者而智度沉􅃉言必有中髙祖爲大將軍㳙再叅軍上信重之臧榮緒晉書曰􅁃敳字子嵩叅太􅀓軍事從子亮}
