  - {type: variant, offset: 2543, length: 217, content: 中尉史記曰魯申公弟子為愽士十餘人孔安國至臨淮太守徐偃為膠西中尉其治官皆有廉節稱其好學漢書曰鄭當時字莊陳人也稍遷為魯中尉又曰梁孝王招延四方豪傑齊人公孫詭多奇計初見曰王賜千金官至中尉號曰公孫將軍續漢書曰清河王小心恭孝特見親愛後諸王就國鄧太后詔特清河國置中尉內史賜乘上御物焉漢舊儀曰帝子為王王國置太傅相公尉各一人秩二千石以輔王三輔決錄曰淮陽憲王宣帝愛子器異其才欲以為嗣王恃寵自驕天子乃用韋玄成為中尉以輔導之受詔與蕭望之等論五經同異於石渠閤邵, SBCK: 􅁺殷}
