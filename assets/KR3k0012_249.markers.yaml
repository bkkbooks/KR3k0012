  - {type: variant, offset: 3331, length: 0, content: '', SBCK: 丞少而冲淡弱冠知名太尉王衍雅重之以比南陽樂廣司空東海王越以爲記室叅軍雅相敬重勑子毗曰夫學之所益者淺體之所安者深閑習禮度不如式瞻儀形諷味遺言不如親承音旨王叅軍人倫之表汝其師之又曰殷浩字淵源弱冠與京兆杜乂並有美譽善言玄理論難精微故風流清談皆歸之征西將軍􅁃亮引爲記室叅軍又曰孔寅字舒元中宗命爲安東叅軍專掌記室時書命殷積寅毎􅁛職沈約宋書曰孔顗署衡陽王義季記室奉牋固辭曰記室之􅈰實惟華要自非文行秀敏莫敢居之顗學不綜實性又踈惰何可以屬知秘記秉筆文闈假吹之尤方斯非濫三國典略曰顔晃字克明瑯邪臨沂人也少􅀌貧有詞彩解􅄄梁邵陵王綸兼記室叅軍時東宫學士􅁃信常使于府王使晃接對信輕其尚少曰此府兼記室幾人晃荅曰猶少於宫中學士杜龕爲吴興太守專好勇力梁元患之及使晃管其書翰仍謂龕曰顔晃文學之士使相毗佐造次之間必冝諮禀後周書曰郁慶領記室時北雍州}
