  - {type: variant, offset: 654, length: 443, content: 疑令散人無依仰又啟今者職散中誠自有人然劉訥才志外內非稱臣以為宜蒙此者是以啟及不審固可用不詔可爾所啟王侍讀隋書曰楊汪字元度勤學專精左氏傳通三禮解福周冀王侍讀王甚重之每曰王侍讀德業優深孤之穆生也唐書曰姚思廉初為代王侍讀屬義師入京城時府寮駭散唯思廉侍王不離其側義師入殿門思廉謂之曰唐公舉兵本匡王室卿等不宜無禮於王眾服其言於是布列階下須臾太宗至聞而義之許其扶王至順陽閤下泣拜而去觀者咸歎曰忠烈之士也仁者有勇此之謂也太宗居藩引為文學及親征徐圓朗思廉時在洛陽太宗嘗從容言及隋亡之事慨然歎曰姚思廉不懼兵刃以明大節求諸古人亦何以加也因寄物百叚遺其書曰想卿節義之風故有斯贈王文學魏志曰中山恭王褒每讀書文學左右常恐以精力為病數諫止之不能廢也文學阬輔相與言曰受詔察王舉措有過當奏及有善亦宜以聞遂共表陳褒美褒聞之大驚責讓文學曰修身自守常人之行耳而諸君以上聞適增其負累也晉書曰鄭袤魏武帝初封諸子為侯精選賓友袤與徐幹俱為臨淄文學晉諸公讚曰扶風王年八歲聰明善詩賦中表奇之魏烈祖以為齊王芳文學長沙耆舊傳曰太尉李公時為荊, WYG: 廣}
