  - {type: variant, offset: 2003, length: 192, content: 媿人及國中皆畏憚之王又與騶奴宰人遊戲飲食賞賜無度遂入見王涕泣𣍿行左右侍御皆出涕王曰郎中令何為哭遂曰臣痛社稷之危也又曰周勃等共誅諸呂迎代王郎中令張武等議皆曰不可信願稱疾無往以觀其變中尉宋昌進曰群臣之議皆非願大王勿疑也代王遣太后薄昭見勃勃等俱言所以迎立王者昭還報信矣王笑謂宋昌曰果如公言乃令宋昌驂乘張武等乘傳詣長安群臣奉法駕代邸皇帝即日夕入未央宮夜拜宋昌為衛將軍領南北軍張武為郎中令行殿中, SBCK: 䇿蒼上表薦良}
