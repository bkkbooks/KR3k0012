  - {type: variant, offset: 171, length: 230, content: 譴而林特受賞賜又辭不敢受帝益重之吳志是儀字子羽北海營陵人也南魯二宮初立儀以本職領魯王傅儀嫌二宮相近切乃上䟽曰臣竊以魯王天挺懿德兼資文武當今之宜宜鎮四方為國藩輔宣揚德美廣耀威靈乃國家之良規海內所瞻望但臣言辭鄙野不能究盡其意愚以二宮宜有降殺正上下之序明教化之本書三四上為傅盡忠動輒規諫事上勤與人恭不治產業不受施惠為屋舍纔足自容鄰家有𧺫大宅者權出望見問起大室者誰左右對曰似是儀家也權曰儀儉必非問果他家其見知信如此唐書曰丘悅河南陸渾人亦有學業景龍中為相王府掾與文學韋利, SBCK: ''}
