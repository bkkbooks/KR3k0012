  - {type: variant, offset: 3467, length: 202, content: 史時人呼儉府為入芙蓉池又曰陸慧曉為晉熙王冠軍長史慧曉歷輔五政治身清肅僚佐以下造請起送之或謂慧曉曰長史貴重不宜妄自謙屈荅曰我性惡人無禮不容不以禮處人又曰陸慧曉遷右長史時陳郡謝朏為左長史府公竟陵王子良謂王融曰我府二上佐求之前世誰可為比融曰兩賢同時便是未有前例崔鴻十六國春秋後趙錄曰張躍字世淵清河東武城人也學敏才達雅善清談石勒偉其儀辯拜世子衛軍長史勑世子曰張長史人之表範汝其師之後魏書曰張袞字洪龍上谷沮陽人也好, SBCK: 康愽}
