  - {type: variant, offset: 3334, length: 0, content: '', WYG: 見是非至於興大事衆人莫能斷者舒徐為籌之多出衆議之表晉王曰魏舒堂堂人之領䄂也又曰孫楚字子荆為佐著作郎參石苞驃騎軍事楚既負其才器頗侮易苞初至揖曰天子命我參卿軍事初參軍不敬府主楚既輕苞遂制施敬自楚始也又曰李涓字宣伯容貌簡素頺然若不足者而智度沉􅃉言必}
  - {type: page-break, offset: 3334, content: '', id: KR3k0012_WYG_249-12b, image: WYG0895/WYG0895-0271b.png}
  - {type: variant, offset: 3334, length: 0, content: '', krp: 時見敳在太傳府僚佐多名士皆一丗秀異敳處其中常自䄂手晉中興書曰郄超字景興少而卓犖不羈}
  - {type: variant, offset: 3335, length: 2, content: 清譽, SBCK: 曠丗之度俶儻髙雋籠盖當時時人爲之語曰楊州獨歩王文度盛徳絶倫郗景興交遊士林毎在勝抜又精於理義大司馬桓温取爲叅軍英氣盖丗罕有所推與超相見常謂不能測也又曰薛兼爲軍􅀕酒言於中宗曰臣邑人張闓才幹堪任當今之良器願垂引納以綜朝事中宗即召闓爲安東叅軍又曰郭璞爲尚書郎大將軍王敦以璞有術取爲叅軍璞畏不敢辭又曰中宗之爲安東取周訪爲叅軍在散輩中未之識也府進鎮東訪隨例爲叅軍時府叅軍譙國周訪有罪當死誤収訪訪自列無罪而吏不察訪窮蹙乃身自執使仗􅁬擊収捕數十人皆被創披散訪得逸走歸府聞中宗大驚怒不問格闘之罪又曰蘇峻反范汪逃遁西歸時􅁃亮温嶠治兵潯陽咸以衆少賊強未敢即路且信使阻絶不相知聞及汪經過嶠等訪焉汪曰賊政令不一貪暴縱横滅亡巳兆雖強易弱朝廷倒懸冝時進討嶠等納之是日護軍平南二府交命始解􅄄叅護軍事又曰阮孚字遥集咸子也避亂渡江中宗以爲安東叅軍蓬髮飲酒不以王務嬰心又曰鎮南將軍劉弘以陶􅋲爲長史謂􅋲曰我昔爲羊太􅀓叅軍羊公見語云君後當居我身處我今相察}
