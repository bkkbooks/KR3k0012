  - {type: variant, offset: 3335, length: 2, content: 清譽, WYG: 中髙祖為大將軍涓再參軍上信重之臧榮緒晉書曰庾敳字子嵩參太傅軍事從子亮少時見敳在太傅府僚佐多名士皆一世秀異敳處其中常自神王晉中興書曰郄超字景興少而卓犖不覊有曠世之度俶儻髙儁籠盖當時時人為之語曰揚州獨歩王文度盛徳絶倫郄景興交遊士林每在勝㧞又精於義理大司馬桓温取為參軍英氣盖世罕有所推與超相見常謂不能測也又曰薛兼為軍祭酒言於中宗曰臣邑人張闓才幹堪任當今之良器願垂引納以綜朝事中宗即召闓為安東參軍又曰中宗之為安東取周訪為參軍在散軰中未之識也府進鎭東訪隨例為參軍時府參軍譙國周訪有罪當死誤収訪訪自列無罪而吏不察訪窮蹙乃身自執仗奮擊収捕數十人皆被創披散訪得逸走歸府聞中宗大驚怒不問格鬭之罪又曰蘇峻反范汪逃遁西歸時庾亮温嶠治兵潯陽咸以衆少賊强未敢即路且信使阻絶不相知聞及汪經過嶠等訪焉汪曰賊政令不一貪暴縱横滅亡已兆雖强易弱朝廷倒懸宜時進討嶠等納之是日䕶軍平南二府交命始解褐參議軍事又曰阮孚字遥集咸子也避亂渡江中宗以為安東參軍蓬髪飲酒不以王務嬰心又曰鎮府將軍劉𢎞以陶侃為長史謂侃曰我昔為羊太傅參軍羊公見語云君後當居身處我今相察}
