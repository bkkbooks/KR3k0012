  - {type: variant, offset: 3058, length: 1, content: 為, SBCK: 屬華嶠後漢書曰陳寵以時俗}
  - {type: variant, offset: 3058, length: 0, content: '', WYG: 而寛為掾漢書曰陳遵為公府掾公府掾史率皆嬴車小馬不尚鮮明而遵獨極輿馬衣服之好門外車騎交錯東觀漢記曰呉良以清白方正稱東平王蒼辟為西曹掾數諌王蒼多善䇿蒼上表薦良續漢書曰府掾比古之元士皆三命也漢舊注曰漢初掾史辟皆上言故有秩皆比命士其所不言則為百石屬其後皆自辟故通為百石云魏志曰董㝷字文奥為人忠直為軍謀掾青龍中上大興宫室羣臣皆負土尋上書諫曰今臣自知言必死而臣自譬於牛之一毛生既無益其死何損且臣不欲生矣是以發筆流涕心與世辭臣有八子臣死之後以累陛下魏志曰令狐劭字孔叔在安邑毛城中會太祖攻破鄴圍毛城城破邵等軰十餘人皆當斬太祖閱見之疑其衣冠也問其祖考而識其父乃解放署軍謀掾蜀志云馬良字季常為左將軍掾後使呉良謂亮曰今銜國命恊穆二家幸為良介於孫將軍亮曰君試自為文良即草曰寡君遣掾良通好以紹昆吾豕韋之勲其人吉士荆楚之令鮮於造次之華而有克終之美願降心存納以慰將命權敬待之呉志曰張温父允以輕財重士名顯州郡為孫權東曹掾晉中興書曰荀闓字道明有清稱京師為之語曰洛中英英荀道明大司馬齊王冏辟以為掾又曰王珣弱冠與陳郡謝𤣥俱辟大司馬桓温語人曰謝掾年三十必擁旄仗節王掾當作黒頭公皆未易才也典畧曰趙戬除萬年令遂遭三輔亂客荆州劉表以為賔客是時白衣平原禰衡髙論冠世來遊京師詆訿朝士及南見戬歎之曰所謂鐵則干將莫邪木則猗桐梓漆人則顔冉仲弓後辟魏王相國掾殷氏家𫝊曰殷泰字子平為文皇帝車騎掾委以書記上歎曰非惟秋兎之毫乃是鷹鸇之爪郭子曰王仲祖謝仁祖同為王公掾在坐長史云謝掾能作異舞王命為之謝便起舞神意甚暇王公熟視顧謂諸客曰使人思安豐安豐王戎封也語林曰王藍田少有癡稱王丞相以門地辟之既見無所他問問來時米價藍田不答直張目視王公王公云王掾不癡何以云癡府屬諸府附漢書曰谷永字子雲為長安吏後博學經書有茂材除補御史大夫屬華嶠後漢書曰陳寵以時俗三府掾屬不肯親事但出入養虛故寵獨勤心於事又以法令繁不良吏得生因縁以致輕重及制撰科牒詞訟比例事類相從以塞奸源其後公府奉以為法魏志曰蔣濟字子通辟丞相主簿西曹屬令曰舜舉臯陶不仁者逺臧否得中望於賢屬又曰胡質字文徳少與蔣子通俱知名於江淮間任州郡濟為别駕使見太祖太祖問曰胡通逹長者寧有孫子不濟曰有子曰質規模大畧不及父至於精良綜事過之太祖辟為丞相屬臧榮緒晉書云劉沈字道真世為北州名族􅀶學好古辟衛瓘屬范亨燕書曰鮮於休有才器使幹辟為左光禄大夫曹屬諮議參軍齊書曰張岱厯}
