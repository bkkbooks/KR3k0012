  - {type: variant, offset: 3802, length: 929, content: 日醉勝他人二十九日醒也孝武每欲引見遣人覘其醉醒隋書曰衛玄初仕周武帝親揔萬機拜益州揔管府長史賜以萬釘寶帶唐書曰和元祏為千牛衛長史先是元祏獻詩十首其詞猥陋皆寓言嬖幸而意及兵戈韋氏命拘於大理而將戮月餘而韋氏就誅其詩言若合符讖故上聞而拜之魏武故事載令曰府長史王必是吾披荊棘時吏也忠能勤事心如鐵石國之長吏也蹉跌久不辟之捨騏驥而不乘焉惶惶而更求哉今故教辟之陶氏家傳云猷字恭豫王導以君江東儁望請為右軍長史君恪勤王事每當朝日恒夙興就路及到府門輒先眾僚為人美容止善談論亦以此見稱當世焉府司馬左傳曰季氏以公鉏為馬正馬正家司馬也慍而不出閔子馬見之曰閔子馬閔馬父也子無然禍福無門惟人所召為人子者患不孝不患無所所位處也恭敬父命何常之有言廢置在父無常位公鉏然之恭敬朝夕恪居官次家語曰鄉射曰孔子觀於鄉射於是退而與門人習射於矍相之圃蓋觀者如堵墻焉射至於司馬使子路執弓矢出延射者子路為司馬故射至於子路使出延射魏略曰諸葛誕伐吳戰于東關上欲速進軍司馬王儀諫曰吳賊必有伏宜持重不可進上不聽果為吳人所覆儀曰今日之敗誰當其咎上曰司馬欲委罪孤耶遂法儀晉書曰石苞為景帝中護軍司馬宣帝聞苞好色薄行以讓帝帝荅曰苞雖細行不足而有經國才略夫廉貞之土未必能經濟世務是以齊桓忘管仲之奢僣而錄其匡合之大謀漢高舍陳平之污行而取其六奇之妙筭苞雖未可以上儔二子亦今日之選也懿乃止晉陽秋曰晉陵人韋敻桓脩令於坐相劉𥙿仕官當至州不敻云劉粗是有相人當不失邊州刺史既出私於𥙿曰卿大有貴相向不敢極言耳𥙿惡其言末略荅曰卿狂言驗當相用為司馬義旗後數年敻見𥙿訴曰周成不負桐葉之信公不應忘司馬之言今不希鎮軍府聞護軍司馬鈌願賜卒恩𥙿美而用之晉中興書曰中宗為安東將軍鎮下邳請王導為司馬軍國之事無不諮訪中宗遷鎮建康導為司馬委以政事于時朝野傾心號曰仲父導忠於事上達於從政以百六之弊寄寓江左為治之本務在清靜沈約宋書曰羊徽被遇於高祖高祖謂諮議參軍鄭鱗之曰羊徽一時美器世論猶在兄後恨不識之拔補右將軍劉蕃司馬後魏書曰辛祥為并州平北府司馬有白壁還兵藥道顯被誣為賊官屬推據咸以為然祥曰道顯面有悲色察獄以色其此之謂乎苦執申之月餘別獲真賊世說云謝弈為桓宣武荊州司馬弈既上猶推布衣之交在溫坐岸幘嘯詠無異常日宣武每曰我方外司馬也弈醉溫於許主避之主每曰君若無狂司馬我何由得相見, SBCK: ''}
