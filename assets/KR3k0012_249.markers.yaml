  - {type: variant, offset: 1124, length: 431, content: 得一珠不可捨蚌求之於魚或百文學不出奇士不可捨文學求之於斗筲也由是言之蜯乃珠之所藏文學亦士之場矣郡國相東觀漢記曰吳祐字季英陳留人遷膠東相政唯仁簡以身率物民有相爭訴者輒閉閤自責然後科其所訟以道譬之或身到閭里重相和解自是之後爭隟省息吏民不欺又曰魯平字叔陵拜趙相為政尚寬惠禮讓雖有官不廢教授門人常有數百關東號曰五經復興魯叔陵後漢書曰張禹遷下邳相徐縣北界有蒲陽坡東觀記曰坡水廣二十里徑直百里在道西其東有田可萬傾坡與陂同傍多良田而堙廢莫修禹為開水門通引灌溉遂成熟田數百頃勸率吏人假與種糧親自勉勞遂大收穀實鄰郡貧者歸之千餘戶室廬相屬其下成市後歲至墾千餘頃人用溫給又曰趙咨應召復拜東海相之官道經榮陽令燉煌曹暠咨之故孝廉也咨為燉煌太守時暠薦為孝廉迎路謁候咨不為留暠送至亭水次望塵不及謂主簿曰趙君名重今過界不見必為天下笑即棄印綬追至東海謁咨畢辭歸家其為時人所貴若此謝承後漢書曰東郡趙咨為東海相人遺其雙枯魚噉之二歲不盡以儉化俗魏志曰初曹公為兗州以東平畢諶為別駕張邈之叛也邈劫諶父母弟妻, WYG: 泣抱朴}
