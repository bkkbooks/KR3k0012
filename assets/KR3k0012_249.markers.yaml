  - {type: variant, offset: 3332, length: 0, content: '', SBCK: 白鹿羣臣欲草表陳賀尚書􅂫綽謂慶曰近代巳來文章華靡逮于江左彌復輕薄洛陽後進祖述不已相公柄民䡄物君職典文房冝製此表以革前弊慶操筆立成辝兼文質綽讀而􅀏曰枳橘猶自可移况才子也隋書曰魏澹專精好學愽渉經史善屬文詞采贍逸齊愽陵王濟聞其名引爲記室唐書曰李巨川字下巳隴右人國􅀄十八學士道玄}
  - {type: variant, offset: 3332, length: 0, content: '', WYG: 白鹿羣臣欲草表賀尚書蘇綽謂慶曰近代以來文章華靡逮於江右彌復輕薄洛陽後進祖述不已相公柄民軌物君職典文房宜製此表以革前弊慶操筆立成辭兼文質綽讀而笑曰枳橘猶自可移况才子也隋書曰魏澹專精好學博渉經史善屬文詞采贍逸齊博陵王濟聞其名引為記室唐書曰李巨川字下已隴右人國初十八學士道𤣥}
