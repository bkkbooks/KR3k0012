  - {type: variant, offset: 1618, length: 763, content: 魯相又曰太祖光和末黃巾𧺫拜騎都尉討頴川賊遷為濟南相國有十餘長吏多阿附貴戚贓污狼籍於是奏免其人禁斷淫祀奸究逃竄郡界肅然蜀志劉備領平原相郡民劉平素輕先主恥為之下使客刺之客不忍刺語之而去其得人心如此晉書曰文帝輔政阮籍常從容言於帝曰平生曾遊東平縣樂其風土帝大悅即拜東平相籍乘驢到郡壞府舍屏障使內外相望法令清簡旬日而還又曰阮神遷平原相時襄邑衛京自南陽太守遷於河內與神俱拜帝望而歎曰二千石皆若此朕何憂乎九州春秋曰孔融為北海相一朝殺部督郵會稽典錄曰駱俊字孝遠烏傷人孝靈皇帝擢拜陳相汝南葛陂盜賊並起陳與接境四面受敵俊厲吏民為之保鄣出倉見穀以贍貧民鄰郡士庶咸往歸之身捐俸祿給其衣食民有產子常勑主者厚致米肉生男女者輒以駱為名國郎中令漢書曰龔遂字少卿山陽人以明經為官至昌邑郎中令事王賀賀動作多不正遂為人忠厚剛毅有大節內諫諍於王外責傳相引經義陳禍福至於涕泣謇謇無已面刺王過王至掩耳起走曰郎中令善媿人及國中皆畏憚之王又與騶奴宰人遊戲飲食賞賜無度遂入見王涕泣𣍿行左右侍御皆出涕王曰郎中令何為哭遂曰臣痛社稷之危也又曰周勃等共誅諸呂迎代王郎中令張武等議皆曰不可信願稱疾無往以觀其變中尉宋昌進曰群臣之議皆非願大王勿疑也代王遣太后薄昭見勃勃等俱言所以迎立王者昭還報信矣王笑謂宋昌曰果如公言乃令宋昌驂乘張武等乘傳詣長安群臣奉法駕代邸皇帝即日夕入未央宮夜拜宋昌為衛將軍領南北軍張武為郎中令行殿中續漢書曰皇子封王其郡為國每國置郎中令一人秩千石掌王夫人郎中宿衛官也魏志曰袁渙為魏國郎中令及卒太祖為之流涕穀二千斛一教以太倉穀千斛賜郎中令家一教以垣下穀千斛與卿家外不解其意教曰以太倉穀者官法也以垣下穀者親舊也晉中興書曰顧榮時在洛者唯陸機陸雲及榮唯三人而已機雲雖有才藻不及榮也以南土秀望補吳王郎中令沈約宋書曰宋國初建當置郎中令高祖難其人謂傅亮曰今用郎中令不可減袁曜卿也既而曰吾, WYG: 各}
