  - {type: variant, offset: 397, length: 1350, content: 命太師陳詩以觀民風命市納賈以觀民之所好惡志淫好辟命典禮考時月定日同律禮樂制度衣服正之山川神祗有不舉者為不敬不敬者君削以地宗廟有不順者為不孝不孝者君絀以爵變禮易樂者為不從不從者君流革制度衣服者為叛叛者君討有功德於民者加地進律又祭義曰天子巡狩諸侯待於境天子先見百年者問其國君以百年者所在而見八十九十者東行西行者弗敢過欲言政者君就之可也弗敢過者謂道經則見之禮記逸禮曰王者必制巡狩之禮何尊天重民也所以五年一巡狩何五歲再閏天道大備所以至四嶽者盛德之山四方之中能興雲致雨也巡狩者何巡循也狩牧也為天循行牧民也禮記外傳曰溥天之下莫非王土封建諸侯各守天子之地故巡行之夏殷五載一巡狩五年再閏周制十二年一巡狩歲星一周皆在仲月以至嶽下仲者中也正也燔柴告天此因事而告至也天下廣大四方幽隱南面之君多行威福憂民之至故問之巡狩之年四方諸侯先會嶽之下以俟見嶽有湯沐之邑助祭泰山先齊戒以見天子考其制度以齊同書同文車同軌合其章律甲子有善惡以黜陟之左傳莊公曰天子非展義不巡狩注云天子巡狩所以宣布德義又僖下曰晉侯召王以諸侯見且使王狩仲尼曰以臣召君不可以訓故書曰天王狩於河陽言非其地且明德也漢書曰人有告韓信反陳平曰古者天子巡狩偽遊雲夢也又武紀曰朕郊見上帝巡於北見群鶴留止不以羅網靡所獲獻薦於大畤如淳曰是時春也非用羅網時故無所獲光景並見又曰元封五年南巡狩至於盛唐注如淳曰縣名在南郡也望虞舜於九疑應邵曰舜葬蒼梧九疑山名今在零陵營道也自尋陽浮江親射蛟江中獲之舳艫千里薄樅陽而出縣名屬盧江也作盛唐樅陽之歌又曰宣帝尊孝武廟為世宗行巡狩郡國皆立廟又食貨志曰天子始出巡郡國東渡河河東守不意行巡至不辨自殺行西踰隴隴西守以行往卒或曰踰度也卒倉卒從官不得食隴西守自殺於是上北出蕭關從數萬騎馬獵新秦中以勒邊兵而歸後漢書曰光武建武十八年二月西巡狩幸長安三月祠高廟遂有事十一陵歷馮翊界進幸蒲坂祠后土夏四月車駕還宮又曰章帝元和二年二月丙辰東巡狩乙丑帝耕于定陶使使者祠唐堯於咸陽靈臺辛未幸大山柴告岱宗有黃鵠三十從西南來經祠壇上東北過于宮屋翱翔升降進幸奉高又曰章帝巡幸詔曰惟巡狩之制以宣聲教考同遐邇解釋怨結又和紀曰冬十月戍申幸章陵祠舊宅癸丑祠園廟會宗室於宅勞賜作樂宋書禮志曰古者天子巡狩之禮布在方策至秦漢巡幸或以厭望氣之祥或以希神仙之應煩擾之役多非舊典惟後漢諸帝頗有古禮焉魏文帝值三分初創方隅事多皇輿亟動略無寧歲蓋應時之務又非舊章也明帝凡三東巡所過存問高年恤人疾苦或賜穀帛有古巡幸之風焉齊王正始元年巡洛陽縣賜高年力田各有差又曰元嘉四年二月太祖東巡至丹徒告覲園陵三月幸冊徒離宮升京城北顧饗父老舊勳于丹徒行宮加賜衣裳各有差蠲丹徒縣其年租賦宋書文帝行丹徒詔吾生在此城及盧循肆亂害流茲境先帝以桑梓根本寔同休愍復以蒙弱猥預艱難情義繾綣夷險備經遺蹤舊物猶存心目歲月不居逝踰三紀時人故老與運遷落眷惟既往倍深感歎越絕書曰禹巡狩大越見耆老納詩書審銓衡平斗斛孟子曰夏諺曰吾王不遊吾何以休吾王不預吾何以助一遊一豫為諸侯度也又曰晏子對齊景公曰天子適諸侯曰巡狩春省耕而補不足秋省歛而助不給也孔叢子曰古者天子將巡狩必造于祖禰命告群祀及社稷畿內名山大川七日而遍親告用牲史用幣蔡邕獨斷曰上巡狩校獵還公卿已下陳洛陽亭前街上乘輿到公卿以下拜天子東公卿親識顏色然後還宮酈善長注水經曰光武之征秦豊幸舊邑置酒極歡張平子, WYG: 尚}
