  - {type: variant, offset: 3907, length: 7, content: 升壇公卿耕訖嗇, SBCK: 親與之合瑞信者正君臣重法度也五經異義曰古春秋五氏􅀃閏以正時時以作事事以厚生生民之夲於是乎在不告閏朔弃時政也弃時政則不知其所行故閏月不以朝者諸侯歲遣大}
  - {type: variant, offset: 3907, length: 14, content: 升壇公卿耕訖嗇夫下種凡稱籍田, WYG: 親與之合瑞信者正君臣重法度是也五經異議曰古春秋左氏說閏以正時時以作事事以厚生生民之本於是乎在不告閏朔棄時正也棄時正則不知其所行故閏月不以朝者諸侯嵗遣大臣之京師受十二月之正還藏於太廟月旦朝廟存神有司因告曰今月當行某正至於閏月藂殘餘分之月無正故不以朝經書閏月猶朝之者是也摯虞决疑要注曰漢制㑹於建始殿晉制大㑹於太極殿小㑹於東堂其㑹則五時朝服庭設金石虎賁旄頭文衣繡尾廣記曰尉陀所都處築髙臺以朝漢室員基千歩直峭有百丈螺道登進頂上朔朢}
