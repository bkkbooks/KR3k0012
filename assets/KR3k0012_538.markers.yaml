  - {type: variant, offset: 3713, length: 0, content: '', WYG: 晉人徴朝于鄭鄭人使少正公孫僑對曰在晉先君悼公九年我寡君於是即位即位八月而我先大夫子駟從寡君以朝于執事執事不禮於寡君寡君懼因是行也我二年六月朝于楚晉是以有戯之役楚人猶競而申禮於敝邑敝邑欲從執事而懼為大尤曰晉其謂我不共有禮是以不敢攜貳於楚我四年三月先大夫子蟜又從寡君以觀釁於楚晉於是乎有蕭魚之役謂我敝邑邇在晉國譬諸草木吾臭味也而何敢差池以大國政令之無常國家罷病不虞荐至無日不惕豈敢忘職大國若安定之其朝夕在庭何辱命焉又昭公四年康有酆宫之朝又昭公十三年明王之制使諸侯嵗聘以志業間朝以講禮再朝而㑹以示威再㑹而盟以顯昭明志業於好講禮於等示威於衆昭明於神春秋說題辭曰朝者不占而到諸侯秉政尊卑有序各來朝講文徳明禮讓天下法制四方受度㑹者所以興徳明義考遺廢於天下史記曰子貢結駟連騎束帛之幣以聘享諸侯所至國君無不郊迎與抗禮者漢書武紀曰元年春}
  - {type: page-break, offset: 3713, content: '', id: KR3k0012_WYG_538-6a, image: WYG0898/WYG0898-0040a.png}
