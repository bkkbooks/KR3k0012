  - {type: variant, offset: 2468, length: 0, content: '', SBCK: 賔要服以内諸侯也大客謂其􅀌卿也春朝諸侯而圖天下之事秋覲以比􅀖國之功夏宗以陳天下之謨冬遇以恊諸侯之慮時㑹以發四方之禁殷同以施天下之政此六事者以王見諸侯爲文時聘以結諸侯之好殷覜以除􅀖國之慝此二事者亦以王見諸侯之使來者時爲文間問以諭諸侯之志歸脤以交諸侯之福賀慶以賛諸侯之喜致禬以􅀘諸侯之烖此四者主使臣於諸侯之禮也間問者間歳一問諸侯謂存省之屬也諸侯之志者言語諭書名其􅀋也交或徃或來者也賛助也致禬凶禮之吊禮禬禮也􅀘諸侯栽者􅀂春秋澶淵之㑹謀歸宋財凡太國之􅀌執皮帛以継小國之君凡諸侯之卿其禮各下其君二等以下及其大}
  - {type: page-break, offset: 2468, content: '', id: KR3k0012_SBCK_538-2a}
  - {type: variant, offset: 2468, length: 13, content: 夫躬耕帝籍天子三推公五推卿, WYG: 賔要服以内}
  - {type: variant, offset: 2468, length: 0, content: '', krp: 賔要服以内諸侯也大客謂其孤卿也春朝諸侯而圖天下之事秋覲以比邦國之功夏宗以陳天下之謨冬遇以恊諸侯之慮時㑹以發四方之禁殷同以施天下之政此六事者以王見諸侯爲文時聘以結諸侯之好殷覜以除邦國之慝此二事者亦以王見諸侯之使來者時爲文間問以諭諸侯之志歸脤以交諸侯之福賀慶以賛諸侯之喜致禬以𥙷諸侯之烖此四者主使臣於諸侯之禮也間問者間歳一問諸侯謂存省之屬也諸侯之志者言語諭書名其類也交或徃或來者也賛助也致禬凶禮之吊禮禬禮也𥙷諸侯栽者若春秋澶淵之㑹謀歸宋財凡太國之孤執皮帛以継小國之君凡諸侯之卿其禮各下其君二等以下及其大}
  - {type: punctuation, offset: 2469, content: ，, id: KR3k0012_CHANT_538-bkkpn770}
