  - {type: variant, offset: 2576, length: 0, content: '', SBCK: 諸侯兵不用而諸侯自爲正之具也比年小聘所謂歳相問也三年大聘所謂殷相聘也左傳隠公曰十一年􅅬侯薛侯來朝爭長薛侯曰我先封􅅬侯曰我周之卜正薛庶姓也我不可以後之公使羽父請於薛侯曰周之宗盟異姓爲後寡人􅀂朝于薛不敢與諸任齒乃長􅅬侯又莊公曰􅉑公晋侯朝王王饗醴命之宥玉之覲群后始則行饗禮先置醋酒示不忘古飲宴則以幣物宥助也所以助歡敬之意言備誤也皆賜玉五㲄馬三匹非禮也􅀟玉爲瑴王命諸侯名位不同禮亦異數不以禮假人又莊公曰夫禮所以整民也故㑹以訓上下之則制財用之節朝以正班爵之義帥長㓜之序又文上曰穆伯如齊始聘焉禮也穆伯公孫教也凡君即位卿出並聘踐脩舊好要結外援踐猶子履行女事隣國以衛社稷忠信卑讓之道也忠德之正也信德之固也卑讓德之基}
  - {type: page-break, offset: 2576, content: '', id: KR3k0012_SBCK_538-3b}
  - {type: variant, offset: 2576, length: 0, content: '', WYG: 諸侯兵不用而諸侯自為正之具也左傳隠公十一年春滕侯薛侯来朝争長薛侯曰我先封滕侯曰我周之卜正薛庶姓也我不可以後之公使羽父請於薛侯曰周之宗盟異姓為後寡人若朝於薛不敢與諸任齒乃長滕侯又莊公虢公晉侯朝王王饗醴命之宥皆賜玉五㲄馬三匹非禮也雙玉為㲄王命諸侯名位不同禮數亦異不以禮假人又莊公曰夫禮所以整民也故㑹以訓上下之則制財用之節朝以正班爵之義帥長㓜之序又文上曰穆伯如齊始聘焉禮也凡君即位卿出並聘踐脩舊好要結外援好事隣國以衛社稷忠信卑讓之道也忠徳之正也信徳之固也卑讓徳之基}
