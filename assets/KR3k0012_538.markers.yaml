  - {type: variant, offset: 2576, length: 0, content: '', krp: 諸侯兵不用而諸侯自爲正之具也比年小聘所謂歳相問也三年大聘所謂殷相聘也左傳隠公曰十一年滕侯薛侯來朝爭長薛侯曰我先封滕侯曰我周之卜正薛庶姓也我不可以後之公使羽父請於薛侯曰周之宗盟異姓爲後寡人若朝于薛不敢與諸任齒乃長滕侯又莊公曰􅉑公晋侯朝王王饗醴命之宥玉之覲群后始則行饗禮先置醋酒示不忘古飲宴則以幣物宥助也所以助歡敬之意言備誤也皆賜玉五㲄馬三匹非禮也雙玉爲瑴王命諸侯名位不同禮亦異數不以禮假人又莊公曰夫禮所以整民也故㑹以訓上下之則制財用之節朝以正班爵之義帥長㓜之序又文上曰穆伯如齊始聘焉禮也穆伯公孫教也凡君即位卿出並聘踐脩舊好要結外援踐猶子履行女事隣國以衛社稷忠信卑讓之道也忠德之正也信德之固也卑讓德之基}
