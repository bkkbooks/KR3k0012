  - {type: variant, offset: 3713, length: 0, content: '', krp: 晉人徴朝于鄭召鄭使朝鄭人使少正公孫僑對曰在晉先君悼公九年我寡君於是即位即位八月而我先大夫子駟從寡君以朝于執事執事不禮於寡君言朝執事謙不敢斥晉侯寡君懼因是行也我二年六月朝于楚因朝晉不見禮生朝楚心晉是以有戯之伇楚人猶一􅔡而申禮於敝邑敝邑欲從執事而懼爲大尤曰晉其謂我不共有禮是以不敢攜貳於楚我四年三月先大夫子蟜又從寡君以觀釁於楚晉於是乎有蕭魚之伇謂我敝邑邇在晉國譬諸草木吾臭味也而何敢差池以大國政令之無常國家罷病不虞荐至無日不惕豈敢忘職大國若安定之其朝夕在庭何辱命焉又昭二曰康有酆宫之朝鄷在始平折縣東有靈臺康王於是朝諸侯又昭四曰明王之制使諸侯歳聘以志業志職也歳聘以脩其職業間朝以講禮三年而一朝正班爵之義率長㓜之序再朝而㑹以示威六年而一㑹以訓上下之則制財用之節再㑹而盟以顯昭明十二年而一盟所以昭信義也凡八聘四朝再㑹王一巡狩盟于方嶽之下志業於好講禮於等示威於衆昭明於神春秋說題辭曰朝者不占而到諸侯秉政尊卑有序各來朝講文德明禮讓天下法制四方受度㑹者所以興德明義考遺廢於天下史記曰子貢結駟連騎束帛之幣以聘享諸侯所至國君無不郊迎與抗禮者漢書武紀曰元年春}
