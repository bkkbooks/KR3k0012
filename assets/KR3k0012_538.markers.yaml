  - {type: variant, offset: 1749, length: 589, content: 真人南巡觀舊里焉三齊略曰堯山在廣固城西七里堯巡狩所登遂以為名山頂立祠祠邊有柏樹枯而復生不知幾代樹也又石上有堯跡于今猶存風俗通曰巡者循也狩者守也道德太平恐遠近不同故必自親行之循功考德黜陟幽明也白虎通曰王者所巡狩者何巡者循也狩者收也道德太平恐遠近不同化幽隱有不得所者故必自親行之謙敬重民之至也何以知太平乃巡狩以武王不巡狩至成王乃巡狩也黃帝太一密推曰師曠曰先知巡狩之年當視太一與天目在四維之歲法為巡狩若不出則遣使者按行風俗太一雖在四維不出也即出知巡狩何方以主人所在處之班固東巡頌曰事大而瑞盛誠非一小臣所任頌述不勝狂簡之情謹上岱宗頌一篇班固南巡頌曰是時聖上運天官之法賀馮列宿而贊元崔駰東巡頌曰登天靈之威輅駕太一之象車躬東作之上務始八政於南行崔駰南巡頌曰建初九年秋穀始登猶斯嘉時舉先王之大禮假于章陵遂南巡楚路臨江川以望衡山顧九疑嘆虞舜之風是時庶績咸熙罔可黜陟崔駰西巡頌曰惟永平三年八月巳丑行幸河東志曰君舉必書是故工歌其詩史歷春秋若夫聲管不發雅頌罔記崔駰北巡頌曰元和三年正月上既畢郊祠之事乃東巡出於河內經青兗之郊迴冀州遂禮北嶽聖澤流浹黎元被德嘉瑞並集乃作頌曰張衡巡狩頌曰初吉帝將狩於岱嶽展誼省方觀風設教丙寅朏率群賓備法駕以祖於東門乙酉觀禮於魯而休齊焉巳丑屆于靈宮是日有鳳雙集于臺馬融東巡頌曰敷六典經八成爕和萬殊總領神明類乎上帝柴乎三辰禋祠乎六宗祗燎乎群神籍田毛詩閔子載芟曰載芟春籍田而祈社稷, WYG: 薄}
