  - {type: variant, offset: 2498, length: 0, content: '', SBCK: 西面曰朝諸侯春見曰朝受摯於朝受享於廟生氣文也秋見日覲一受之於廟殺氣質也朝者位於内朝而序進覲者位於廟門外而序入王南面立於依宁而受焉夏宗依春冬遇依秋春秋時齊侯言魯昭公以遇禮相見取易略也覲禮今存朝野宗遇禮今亡諸侯未及期相見曰遇相見於卻地曰㑹諸侯使}
  - {type: page-break, offset: 2498, content: '', id: KR3k0012_SBCK_538-2b}
  - {type: variant, offset: 2498, length: 0, content: '', WYG: 而圖天下之事秋覲以比邦國之功夏宗以陳天下之謨冬遇以恊諸侯之慮時㑹以發四方之禁殷同以施天下之政此六者以王見諸侯為文時聘以結諸侯之好殷覜以除邦國之慝此二事者亦以王見諸侯之使来者時為文間問以諭諸侯之志歸脤以交諸侯之福賀慶以賛諸侯之喜致禬以補諸侯之烖凡大國之孤執皮帛以繼小國之君凡諸侯之卿其禮各下其君二等以下及其}
