  - {type: variant, offset: 1006, length: 1332, content: 樅陽而出縣名屬盧江也作盛唐樅陽之歌又曰宣帝尊孝武廟為世宗行巡狩郡國皆立廟又食貨志曰天子始出巡郡國東渡河河東守不意行巡至不辨自殺行西踰隴隴西守以行往卒或曰踰度也卒倉卒從官不得食隴西守自殺於是上北出蕭關從數萬騎馬獵新秦中以勒邊兵而歸後漢書曰光武建武十八年二月西巡狩幸長安三月祠高廟遂有事十一陵歷馮翊界進幸蒲坂祠后土夏四月車駕還宮又曰章帝元和二年二月丙辰東巡狩乙丑帝耕于定陶使使者祠唐堯於咸陽靈臺辛未幸大山柴告岱宗有黃鵠三十從西南來經祠壇上東北過于宮屋翱翔升降進幸奉高又曰章帝巡幸詔曰惟巡狩之制以宣聲教考同遐邇解釋怨結又和紀曰冬十月戍申幸章陵祠舊宅癸丑祠園廟會宗室於宅勞賜作樂宋書禮志曰古者天子巡狩之禮布在方策至秦漢巡幸或以厭望氣之祥或以希神仙之應煩擾之役多非舊典惟後漢諸帝頗有古禮焉魏文帝值三分初創方隅事多皇輿亟動略無寧歲蓋應時之務又非舊章也明帝凡三東巡所過存問高年恤人疾苦或賜穀帛有古巡幸之風焉齊王正始元年巡洛陽縣賜高年力田各有差又曰元嘉四年二月太祖東巡至丹徒告覲園陵三月幸冊徒離宮升京城北顧饗父老舊勳于丹徒行宮加賜衣裳各有差蠲丹徒縣其年租賦宋書文帝行丹徒詔吾生在此城及盧循肆亂害流茲境先帝以桑梓根本寔同休愍復以蒙弱猥預艱難情義繾綣夷險備經遺蹤舊物猶存心目歲月不居逝踰三紀時人故老與運遷落眷惟既往倍深感歎越絕書曰禹巡狩大越見耆老納詩書審銓衡平斗斛孟子曰夏諺曰吾王不遊吾何以休吾王不預吾何以助一遊一豫為諸侯度也又曰晏子對齊景公曰天子適諸侯曰巡狩春省耕而補不足秋省歛而助不給也孔叢子曰古者天子將巡狩必造于祖禰命告群祀及社稷畿內名山大川七日而遍親告用牲史用幣蔡邕獨斷曰上巡狩校獵還公卿已下陳洛陽亭前街上乘輿到公卿以下拜天子東公卿親識顏色然後還宮酈善長注水經曰光武之征秦豊幸舊邑置酒極歡張平子以為真人南巡觀舊里焉三齊略曰堯山在廣固城西七里堯巡狩所登遂以為名山頂立祠祠邊有柏樹枯而復生不知幾代樹也又石上有堯跡于今猶存風俗通曰巡者循也狩者守也道德太平恐遠近不同故必自親行之循功考德黜陟幽明也白虎通曰王者所巡狩者何巡者循也狩者收也道德太平恐遠近不同化幽隱有不得所者故必自親行之謙敬重民之至也何以知太平乃巡狩以武王不巡狩至成王乃巡狩也黃帝太一密推曰師曠曰先知巡狩之年當視太一與天目在四維之歲法為巡狩若不出則遣使者按行風俗太一雖在四維不出也即出知巡狩何方以主人所在處之班固東巡頌曰事大而瑞盛誠非一小臣所任頌述不勝狂簡之情謹上岱宗頌一篇班固南巡頌曰是時聖上運天官之法賀馮列宿而贊元崔駰東巡頌曰登天靈之威輅駕太一之象車躬東作之上務始八政於南行崔駰南巡頌曰建初九年秋穀始登猶斯嘉時舉先王之大禮假于章陵遂南巡楚路臨江川以望衡山顧九疑嘆虞舜之風是時庶績咸熙罔可黜陟崔駰西巡頌曰惟永平三年八月巳丑行幸河東志曰君舉必書是故工歌其詩史歷春秋若夫聲管不發雅頌罔記崔駰北巡頌曰元和三年正月上既畢郊祠之事乃東巡出於河內經青兗之郊迴冀州遂禮北嶽聖澤流浹黎元被德嘉瑞並集乃作頌曰張衡巡狩頌曰初吉帝將狩於岱嶽展誼省方觀風設教丙寅朏率群賓備法駕以祖於東門乙酉觀禮於魯而休齊焉巳丑屆于靈宮是日有鳳雙集于臺馬融東巡頌曰敷六典經八成爕和萬殊總領神明類乎上帝柴乎三辰禋祠乎六宗祗燎乎群神籍田毛詩閔子載芟曰載芟春籍田而祈社稷, SBCK: ''}
