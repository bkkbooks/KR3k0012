  - {type: variant, offset: 2941, length: 166, content: 司請行事訖就耕位天子諸侯百官以次耕晉書禮志曰武帝末有司奏古諸侯耕籍百畝躬執耒耜以奉社稷宗廟勸率農功今諸王臨國宜依之竟不施行又江彪傳曰哀帝即位欲躬自籍田彪以禮廢日久儀注不存中興以來所不行宜停之宋書禮志曰親耕籍晉武帝太始四年詔曰夫民之大事在農是以古之聖王躬耕帝籍以供郊廟之粢盛且以訓化天下近代以來耕籍於數步中空有慕古之名曾無供祀訓農之實, WYG: 容貌采章嘉淑}
