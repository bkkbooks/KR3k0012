  - {type: variant, offset: 2360, length: 0, content: '', krp: 早也宗尊也欲其尊王也覲之言勤也欲其勤王之事也遇猶偶也欲其若不期而俱至也時見者無常期也諸侯有不順服者王將}
  - {type: variant, offset: 2361, length: 3, content: 供粢盛, SBCK: 征討之事則旣朝覲王爲壇於囯外合諸侯有而命焉春秋傳曰有事而㑹不恊而鹽是也殷猶衆也十二歳王如不廵狩則六服盡朝朝礼旣畢王亦爲壇命諸侯以命改焉所命之政如王廵狩殷見四方四時分來終歳則徧矣時聘曰問殷覜曰視時聘者亦無常期天子有事乃聘之焉境外之臣旣非朝歳不敢爲小禮殷覜謂一服朝之歳以朝者少諸侯乃使卿以大禮衆聘焉一服朝在元年七年十一月終也}
