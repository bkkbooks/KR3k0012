  - {type: variant, offset: 2888, length: 821, content: 昭帝始元元年上耕于鉤盾弄田應劭曰時帝年九歲未能親耕帝籍鉤盾官者近署故往試耕為戲弄也續漢書禮儀志曰正月始耕有司請行事訖就耕位天子諸侯百官以次耕晉書禮志曰武帝末有司奏古諸侯耕籍百畝躬執耒耜以奉社稷宗廟勸率農功今諸王臨國宜依之竟不施行又江彪傳曰哀帝即位欲躬自籍田彪以禮廢日久儀注不存中興以來所不行宜停之宋書禮志曰親耕籍晉武帝太始四年詔曰夫民之大事在農是以古之聖王躬耕帝籍以供郊廟之粢盛且以訓化天下近代以來耕籍於數步中空有慕古之名曾無供祀訓農之實而有百官車徒之費今脩千畝之制當與群公卿士躬稼穡之艱難以帥天下又曰元嘉二十一年太祖將親耕而其儀久廢使何承天撰定儀注乃下詔曰國以民為本民以食為天古者從時脈土以訓農功躬耕帝籍敬供粢盛仰瞻前王思遵令典何可量處千畝考上元辰朕當親率百辟致禮郊甸庶幾誠素獎被斯民又曰籍田皇帝冠通天冠朱紘青介幘衣青紗兗侍中陪乘奉車即秉轡又曰車駕至籍田侍中跪奏降車臨壇大司農跪奏先農已享請皇帝親耕太史令讚曰皇帝親耕三推三反於是群臣以次耕王公五等開國諸侯五推五反孤卿大夫七推七反士九推九反籍田令率其屬耕竟畝灑種即耰齊書禮志曰永明三年有司奏來年正月二十五日丁亥可祠先農即日輿駕親耕宋元嘉大明以來並用立春後亥日尚書令王儉以為亥日籍田經記無文太學博士劉蔓議禮孟春之月立春迎春又於是月以元日祈穀又擇元辰躬耕帝籍盧植說禮通辰日曰甲至癸也辰子至亥也郊天陽也故以日籍田陰也以辰陰禮畢後必居其末亥辰之末故記稱元辰注曰吉亥又五行之說木生於亥日祭先農又其義也隋書禮志曰北齊籍於帝城東南千畝每歲正月上辛後吉亥使公卿以一太牢祠先農神農氏於壇上無配饗祭訖親耕唐書曰貞觀三年春太宗親祭先農躬御耒耜籍于千畝之甸初晉氏南遷後魏來自雲朔中原分裂又雜以獯戎代歷周隋此禮久廢而今始行之觀者莫不駭躍於是秘書郎岑文本獻籍田頌以美之又曰乾元中耕籍田至於先農之壇因閱耒耜有雕刻文飾者謂左右曰田器農人執之在於朴素豈貴文飾乎乃命徹之又曰儀鳳二年春上親耕籍田于東郊禮畢作籍田賦以示群臣又曰開元, SBCK: 襄}
