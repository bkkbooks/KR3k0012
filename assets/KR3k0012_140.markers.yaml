  - {type: variant, offset: 512, length: 412, content: 東宮生太祖符洛之內侮也后與太祖及故臣民避難北徙俄而高車奄來抄掠后乘車與太祖避賊而南輅失轄后懼仰天告曰國家胤胄豈正爾絕滅也唯神靈扶助遂馳輪正不傾而免難其後劉顯使人將害太祖帝姑為顯弟亢埿妻知之密以告后后乃令太祖去之后夜飲顯使醉之向晨故驚廄中群馬使起視馬后泣而謂曰吾諸子始皆在此今盡亡失汝等誰殺之也故顯不使急追太祖至賀蘭部顯怒將害后后夜奔亢埿家匿神車中三日元埿舉室請救乃得免會劉顯部亂始得亡去皇始元年崩時年四十六祔葬于盛樂金陵追尊謚配饗焉道武慕容皇后後魏書曰道武皇后慕容寶之季女也中山平後入充掖庭得幸左相丞相衛王儀等奏請立后帝從群臣議后鑄金人成乃立之告於郊廟封后母孟為溧陽君後崩道武劉皇后後魏書曰道武宣穆皇后劉眷女也登國初納為夫人生華陰公主後生明元后專理內事寵待有加鑄金人不成故不得登后位魏故事後宮產子將為儲貳其母皆賜死太祖末年后以舊法薨太宗即位追尊謚號配饗太祖自此後宮子為帝母加正位配饗焉明元姚皇后後魏書曰明元昭哀皇后姚興女也興, SBCK: 附拜定州刺史}
