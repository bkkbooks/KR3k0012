  - {type: variant, offset: 92, length: 64, content: 二子速侯回題令其善事帝及賓卒速侯等欲因帝會喪為變語頗漏泄帝聞之知其終不奉順乃先圖之於是使勇士於中營晨起以佩刀殺后馳使告速侯等言曰, WYG: 後}
