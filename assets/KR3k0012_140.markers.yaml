  - {type: variant, offset: 1654, length: 550, content: 三居于諒闇太后密定大策誅渾遂臨朝聽政及高祖生太后躬親撫養是後罷令不聽政事太后行不正內寵李弈顯祖因事誅之太后不得意顯祖暴崩時言太后為之也承明元年尊號曰太皇太后復臨朝聽政太后性聰達自入宮掖粗學書計及登尊極省決萬機高祖詔曰朕以虛寡幼纂寶曆仰恃慈明緝寧四海欲報之德正覺是憑諸鷙音至傷生之類宜放山林其以此地為太皇太后經始靈塔是時罵鷹師曹以其地為報德佛寺太后與高祖遊于方山顧瞻川阜有終焉之志因謂群臣曰舜葬蒼梧二妃不從豈必遠祔山陵然後為貴哉吾百年之後神其安此高祖乃詔有司營建壽陵於方山又起永固石室將終為清廟焉刊石立碑頌太后功德太后以高祖富於春秋乃作勸戒歌三百餘章又作皇誥十八篇太后又制內屬五廟之孫外戚本親緦麻皆受復除素儉性不好華飾躬御縵繒而太后多智略猜忌能行大事是以威福兼作震動內外故王遇張祐符丞祖等拔自微閹歲中而至王公王叡出入臥內數年之間便為宰輔賞齎財帛以千萬億計金書鐵券許以不死之誓李冲雖以器能受任亦由見寵帷幄密加賜齎不可勝數太后曾與高祖幸靈泉池醼群臣及蕃國使人諸方渠帥各令為其方舞高祖率群臣上壽於太后忻然自歌高祖亦和歌遂命群官各言其志於是和歌者九十人太后外禮民望元丕游明根等頒賜金帛輿馬每至褒美叡等皆引丕等而參之以示無私也十四年崩於太和殿年四十九其日有雌雉集于太華殿高祖酌飲不入口五日毀慕過禮謚曰文明太皇太后, SBCK: 六}
