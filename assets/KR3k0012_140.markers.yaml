  - {type: variant, offset: 159, length: 2, content: 速侯, SBCK: 魚爛始於此矣及武太元年􅈛朱榮稱兵渡河太后盡召明帝六宫皆令入道太后亦自落髪榮遣􅀐拘送太后及㓜主河隂太后對榮多所陳說榮拂衣而起太后及㓜主並沉於河水太后妹馮翊君収瘞於􅀟靈寺武帝時始葬以后禮而追加謚焉又曰靈太后頗事莊飾數出遊幸元順靣諍曰禮婦人夫䘮自稱未亡人首去珠珥音餌衣不被綵陛下母臨天下年垂不惑過修容飾何以示後丗靈太后慙而還入召順責曰千里相徴豈欲衆見辱也順曰陛下盛服炫容不畏天下所􅀏何耻臣之一言乎孝明胡皇后後魏書曰孝明胡皇后靈太后從兄兾州刺史盛之女也靈太后欲榮重門族故立爲皇后肅宗頗在酒德專嬖充華潘氏及嬪御並無過寵太后爲肅宗選納抑屈人流時􅀶陵崔孝芬女范陽盧道約女隴西李瓉}
  - {type: page-break, offset: 159, content: '', id: KR3k0012_SBCK_140-4a}
  - {type: variant, offset: 159, length: 2, content: 速侯, WYG: 宫禁事秘人莫悉而世之議者皆歸咎於髙夫人葬永泰陵諡曰順皇后宣武高皇后後魏書曰宣武高皇后文昭皇后弟偃之女也世宗納為貴嬪生皇子早夭又生建徳公主拜為皇后甚見禮重性妬忌宫人稀得進御及肅宗即位上尊號曰皇太后尋為尼居瑶光寺非大節慶不入宫中建徳公主始五六嵗靈太后恒置左右撫愛之神龜元年太后出覲母武邑君時天文有變靈太后欲以后當禍是夜遂暴崩天下寃之喪還瑶光佛寺𦵏殯皆以尼禮世宗暮年髙后悍忌夫人嬪御有至帝崩不蒙侍接者由是在洛二十餘年皇太子全育者惟肅宗一人而已宣武胡皇后後魏書曰宣武靈皇后胡氏安定臨涇人司徒國珍之女母皇甫氏産后之日赤光四照京兆山北縣有趙胡者善於卜相國珍徃問之胡云賢女有大貴之表方為天地母生天地主勿過三人知也后始為尼頗能講道世宗初入講禁中積數嵗諷左右稱后姿行世宗聞之召入掖庭為承華世婦而椒掖之中以國舊制相與祈祝皆願生諸王公主不願生太子也惟后毎謂夫人}
  - {type: page-break, offset: 159, content: '', id: KR3k0012_WYG_140-3a, image: WYG0894/WYG0894-0294a.png}
  - {type: page-break, offset: 159, content: '', id: KR3k0012_WYG_140-3b, image: WYG0894/WYG0894-0294b.png}
  - {type: variant, offset: 159, length: 2, content: 速侯, krp: 宫禁事祕莫能知悉而丗議歸咎于髙夫人葬永太陵謚曰慎皇后宣武髙皇后後魏書曰宣武髙皇后文昭弟偃之女也世宗納爲貴嬪生皇子早夭文生建德公主後拜爲皇后甚見禮重性妬忌宫人稀得進御及肅宗即位上尊號曰皇太后尋爲尼居瑶光寺非大節慶不入宫中建德公主始五六歳靈太后恒置左右撫愛之神龜元年太后出覲母武邑君時天文有變靈太后欲以太后當禍是夜暴崩天下怨之喪還瑶光佛寺葬殯皆以尼禮丗宗暮年髙后悍音翰忌夫人嬪御有至帝崩不蒙待接者由是在洛二丗二十餘年皇太子全育惟肅宗而已宣武胡皇后後魏書曰宣武靈皇后胡氏安定臨涇人司徒國珎之女后母皇甫氏産后之日赤光四照京兆北山縣有趙胡者善於卜相國珎徃問之胡云賢女有大貴之表方爲天地母生天地主勿過三人知也后姑爲尼頗能講道丗宗初人講禁中積數丗諷左右稱后姿行丗宗聞之乃召入掖庭爲承華丗婦而椒庭之中以國舊制相與祈祝皆願生諸王公主不願生太子也惟后每謂夫人}
  - {type: variant, offset: 162, length: 8, content: 驚走赴因執而殺之, SBCK: 女俱爲丗婦諸人訴訟咸見忿責武太􅀄后旣入道遂居於瑶光寺焉西魏孝武髙皇后後魏書曰孝武皇后髙氏齊神武長女也帝見立乃納爲后及帝西幸􅀜中降爲彭城王妃}
  - {type: variant, offset: 162, length: 2, content: 驚走, WYG: 言天子豈可獨無兒子何縁畏一身之死而令皇家不育冢嫡乎及肅宗在孕同列猶以故事相恐勸為諸計后意確然幽夜獨誓云但使所懐是男次第當長子子生身死所不辭也既誕肅宗進為充華嬪先是世宗頻年䘮皇子自以春秋長矣深加慎護為擇乳母皆取良家宜子者養於别宫皇后及充華嬪皆莫得而撫視焉及肅宗踐祚尊后為皇太妃後尊為皇太后臨朝聽政猶稱殿下令以行事後改令稱詔羣臣上書稱陛下自稱曰朕太后以肅宗冲㓜未堪親祭欲傍周禮夫人與君交獻之義代行祭祀訪尋故式門下召禮官博士議以為不可而太后欲以帷幔自障觀三公行事重問侍中崔光光便據漢時和熹鄧后薦祭故事太后大悦遂攝行祠禮太后性聡悟才藝始既為尼㓜相依託略得佛經大義親覧萬機手筆㫁决幸西園林法流堂命侍臣射不能射者罰之又自射針孔中之大恱賜左右布帛有差先是太后勑造申訟車時御焉出自雲龍大司馬門從西而北入自千秋門以納寃訟又親䇿孝秀州郡計吏於朝堂太后以肅宗幸華林園宴羣臣於都亭曲水令王公以下賦七言詩太后詩曰化光造物含氣貞肅宗詩曰恭己無為頼慈英王公以下賜帛有差太后父薨百寮表請公除太后不許尋幸永寕寺觀建刹於九級之基僧尼士女}
