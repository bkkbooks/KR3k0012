  - {type: 'tls:seg', offset: 2546, content: '', id: KR3k0012_CHANT_140-18a.5}
  - {type: variant, offset: 2546, length: 0, content: '', SBCK: 革命出居里第大業十二年殂明獨􅀌后後周書曰明獨孤后太保衛公信之長女也帝在藩納爲夫人帝即位立爲王后在位數日崩葬昭陵丗宗崩與后祔葬之武阿史那后後周書曰武阿史那后突厥木杆可汗俟斤之女突厥蠕蠕而恕反後盡有塞表之地控弦十數萬於是陵逼中原太祖方與齊人爭衡結以爲媛俟斤􅀄欲以女配帝保定五年二月詔陳公純等備皇后文物及行殿并六宫巳下一百二十人至俟斗牙帳所迎后俟斗又許齊人以㛰將有異志純等在彼累載不得返命㑹雷風大起飄壞其穹廬等旬日不止俟斗大懼以爲天譴去戰切乃禮送后及純等設行殿列羽儀奉之以歸髙祖行親迎之禮后有姿貌善容止髙祖􅀷敬焉宣帝即位尊爲天元上皇太后隋開皇二年殂年三十一隋文詔后祔葬孝陵孝帝李后後周書曰孝帝李后名娥姿楚人也于謹}
  - {type: page-break, offset: 2546, content: '', id: KR3k0012_SBCK_140-7b}
  - {type: variant, offset: 2546, length: 0, content: '', WYG: 革命居里第大業十二年殂明獨孤后後周書曰明獨孤后太保衛公信之長女帝之在藩為夫人二年正月立為皇后即位數日崩塟昭陵世宗崩與后合葬武成阿史那后後周書曰武成阿史那后突厥木杆可汗俟斤之女突厥滅蠕蠕後盡有塞表之地控弦數十萬衆志陵中夏太祖方與齊人爭衡俟斤初欲以女配帝保定五年二月詔陳公純等備皇后文物及行殿并六宫以下一百二十人至俟斤牙帳所迎后俟斤又許齊人以婚将有異志純等在彼累請不得反命會雷風大起飃壞其穹廬等旬日不止俟斤大懼以為天譴去戰切乃禮送后及純等設行殿羽儀奉之以歸高祖行親迎之禮后有姿貎善容止高祖深敬焉宣帝即位尊為天元上皇太后開皇二年殂年三十二隋文詔后祔葬孝陵武帝李后後周書曰武帝李后名娥姿楚人于謹}
