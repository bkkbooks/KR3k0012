  - {type: variant, offset: 155, length: 0, content: '', SBCK: 天子豈可獨有兒子何縁畏一身之死而令皇家不育􅃁嫡乎及肅宗在孕同列猶以故事相恐勸爲諸計后固意􅃀然幽夜獨誓云但使所懷是男次第當長子生身死所不辭也旣誕肅宗進爲充華嬪先是丗宗頻䘮皇子自以春秋長矣􅀷加愼護爲擇乳母皆取良家冝子者養於别宫皇后及充華嬪皆莫得而撫視焉及肅宗踐祚尊后爲皇太妃後尊爲皇太后臨朝聽政猶稱殿下令以行事後改令稱詔羣臣上書}
  - {type: punctuation, offset: 156, content: ：, id: KR3k0012_CHANT_140-bkkpn34}
  - {type: 'tls:seg', offset: 156, content: '', id: KR3k0012_CHANT_140-2a.18}
  - {type: variant, offset: 156, length: 0, content: '', SBCK: 陛下自稱曰朕太}
  - {type: variant, offset: 157, length: 1, content: 暴, SBCK: 以肅宗冲㓜未堪親􅀕欲傍周禮夫人與君交獻之義代行􅀕禮訪尋故式門下召禮官􅀶士議以爲不可而太后欲以惟慢自鄣觀三公行事重問侍中崔光光便據漢和熹鄧后熹音熙薦􅀕故事太后大悅遂攝行祠祀太后性聦悟多才藝姑旣爲尼㓜相依託略得佛經大義親覽萬機手筆断决幸西林園法流堂命侍臣射不能射者罰之又自射針孔中之大恱賜左右布帛有差先是太后勑造申訟車時復御焉出自雲龍大司馬門從宫西而北入自千秋門以納􅁈訟又親䇿孝秀州郡計吏於朝堂太后與肅宗幸華林園宴羣臣于都亭曲水令王公以下賦七言詩太后詩曰化光造物含氣貞肅宗詩曰恭巳無爲賴慈英王公以下賜帛有差太后父薨百寮表請公除太后不許尋幸永寧寺觀建刹於九級之基僧尼士女赴者數萬人後幸左藏公主嬪女巳下從者百餘人皆令任力􅀒布絹即以賜之尋幸闕口温水登雞頭山自射象牙簮一發中之勑示文武時太后得志逼幸清河王懌媱亂肆情爲天下所惡領軍元又長秋卿劉騰等奉肅宗於顯陽殿幽太后於北宫於禁中殺懌自劉騰死义又寛怠太后與肅宗及髙陽王雍爲計解又領軍太后復臨朝大赦改元自是朝政踈緩威恩不立天下牧守所在貪惏音嵐鄭儼寵私宫掖􅀔傾海内李神􅁤徐紇並見親待一二年中位緫禁要手握王爵輕重在心宣􅁋於朝爲四方之所厭穢文武懈體所在亂逆土}
