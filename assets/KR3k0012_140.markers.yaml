  - {type: variant, offset: 2544, length: 1, content: 林, WYG: 齊神武王之苐二女也天平四年詔聘以為后王前後固辭帝不許興和中詔侍中司徒孫騰司空襄成王旭一云㫤兼尚書令司州牧西河王悰藏宗切兼太常卿及宗正卿元孝友等奉詔致禮并備宫官侍衛以后駕迎於晉陽之丞相第五月立為皇后大赦天下齊受襌降為中山王妃後降於尚書左僕射楊遵彦後周文元皇后後周書曰文元皇后魏孝武妺初封平原公主適開府張歡遇后無禮帝殺歡改封后馮翊公主以配太祖生孝閔薨合葬成陵武成初尊追為皇后文叱奴后後周書曰叱奴后代人太祖為丞相納為姫生高祖天和三年六月尊為皇太后建徳三年三月癸酉崩四月丁巳葬固陵閔元后後周書曰閔元皇后名胡摩魏文帝苐五女初封晉安公主帝之為洛陽公尚焉及踐祚立為皇后帝被廢后出俗為尼高祖誅晉公護上帝尊號為帝以后為孝閔皇后居崇徳宫隋}
