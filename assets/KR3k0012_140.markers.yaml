  - {type: variant, offset: 3165, length: 113, content: 此後后漸憂懼與母常氏求託女巫禱厭無所不至願高祖疾不起一旦得如文明太后輔少主稱令者許賞報不貲音髭乃取三牲宮中妖祠假言祈福專為左道高祖自豫州北幸鄴后慮還見治撿彌懷危怖驟令閹人託參起居皆賜之衣服慇懃託寄勿使漏泄亦令雙蒙充行皆其信者也, SBCK: ''}
