  - {type: variant, offset: 87, length: 1, content: 賓, SBCK: 也丗宗始親政事烈時爲領軍緫心膂之任以嬪御未備因左右諷諭稱后有容德丗宗乃迎入爲貴人時年十四甚見寵愛立爲皇后謁于太廟后静黙寛容性不妬忌生皇子昌三歳夭没其后􅁀崩宫禁事祕莫能知悉而丗議歸咎于髙夫人葬永太陵謚曰慎皇后宣武髙皇后後魏書曰宣武髙皇后文昭弟偃之女也世宗納爲貴嬪生皇子早夭文生建德公主後拜爲皇后甚見禮重性妬忌宫人稀得進御及肅宗即位上尊號曰皇太后尋爲尼居瑶光寺非大節慶不入宫中建德公主始五六歳靈太后恒置左右撫愛之神􅀛元年太后出覲母武邑君時天文有變靈太后欲以太后當禍是夜􅁀崩天下怨之喪還瑶光佛寺葬殯皆以尼禮丗宗暮年髙后悍音翰忌夫人嬪御有至帝崩不蒙待接者由是在洛二丗二十餘年皇太子全育惟肅宗而已宣武胡皇后後魏書曰宣武靈皇后胡氏安定}
  - {type: page-break, offset: 87, content: '', id: KR3k0012_SBCK_140-2a}
  - {type: variant, offset: 87, length: 4, content: 賓臨終誡, WYG: 也世宗始親政事烈時為領軍總心膂之任以嬪御未備因左右諷諭稱后有容徳世宗乃迎入為貴人時年十四甚見寵愛立為皇后謁於太廟后靜黙寛容性不妬忌生皇子昌三嵗夭没}
  - {type: variant, offset: 87, length: 4, content: 賓臨終誡, krp: 也丗宗始親政事烈時爲領軍緫心膂之任以嬪御未備因左右諷諭稱后有容德丗宗乃迎入爲貴人時年十四甚見寵愛立爲皇后謁于太廟后静黙寛容性不妬忌生皇子昌三歳夭没}
  - {type: variant, offset: 89, length: 11, content: 終誡其二子速侯回題令其, SBCK: 涇人司徒國珎之女后母皇甫氏産后之日赤光四照京兆北山縣有趙胡者}
