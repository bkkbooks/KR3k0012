  - {type: variant, offset: 2563, length: 3, content: 位至尚, SBCK: 隋開皇初出俗爲尼改名常悲薨以尼禮葬之京城南宣帝楊后後周}
  - {type: variant, offset: 2563, length: 0, content: '', WYG: 隋開皇初出俗為尼改名常悲薨以尼禮葬於京城南宣帝楊后後周書曰宣帝楊后名麗華隋文帝長女帝在東宫高祖為帝納后為皇太子妃宣政元年立為天元皇后后性柔婉不妬忌四皇后及嬪御等咸愛而仰之帝後昏暴滋甚喜怒乖度嘗譴后欲加之罪后進止詳閒辭色不撓帝大怒遂賜后死逼令引决后母獨孤氏聞之詣閤陳謝叩頭流血然後得免帝崩静帝尊為皇太后居於宏聖宫先是宣帝不豫詔隋文帝入禁中侍疾及大漸劉昉鄭譯等因矯詔以后父受遺輔政后雖初不預謀然嗣主㓜冲恐權在他族不利於己聞昉譯已行此詔甚恱後知父有異圖意頗不平形於顔色及行禅代憤惋愈甚隋文帝既不能譴責内甚愧之開皇六年封后為樂平公主後又議奪其志后誓不許乃止大業中殂祔葬定陵宣朱后後周書曰宣朱皇后名滿月吳人也其家坐事没入東宫帝為太子后被選掌衣服召而幸之遂生靜帝静帝立尊為天元帝后后本非良家子年長於帝十嵗踈賤無寵以靜帝故特尊崇之宣帝崩静帝即}
