  - {type: variant, offset: 165, length: 2, content: 因執, WYG: 者數萬人後幸左藏公主嬪女以下從者百餘人皆令任力負布絹即以賜之尋幸缺口温水登雞頭山自射象牙簪一發中之勑示文武時太后得志逼幸清河王懌淫亂肆情為天下所惡領軍元义長秋卿劉騰等奉肅宗於顯陽殿幽太后於北宫於禁中殺懌自劉騰死义又寛怠太后與肅宗及髙陽王雍為計解义領軍太后復臨朝大赦改元自是朝政踈緩威恩不立天下牧守所在貪惏又鄭儼汙亂宫掖勢傾海内李神􅁤徐紇並見親侍一二年中位總禁要手握王爵輕重在心宣滛於朝為四方之所厭穢文武解體所在亂逆土崩魚爛始於此矣及武泰元年尒朱稱兵渡河太后盡召明帝六宫皆令入道太后亦自落髪榮遣騎拘送太后及㓜主於河隂太后對榮多所陳説榮拂衣}
