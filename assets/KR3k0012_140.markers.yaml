  - {type: variant, offset: 3153, length: 281, content: 彭城王侍疾左右乃具言其事此後后漸憂懼與母常氏求託女巫禱厭無所不至願高祖疾不起一旦得如文明太后輔少主稱令者許賞報不貲音髭乃取三牲宮中妖祠假言祈福專為左道高祖自豫州北幸鄴后慮還見治撿彌懷危怖驟令閹人託參起居皆賜之衣服慇懃託寄勿使漏泄亦令雙蒙充行皆其信者也唯小黃門蘇興壽密陳委曲高祖問其本末勑以勿泄至洛執問菩薩雙蒙六人迭相證舉具得情狀高祖臥含溫室夜引后并列菩薩等於戶外后臨入令閹人搜衣中稱有寸刃便斬后頓首泣謝乃賜坐東楹去御筵二丈餘高祖令菩薩等陳狀讓后曰汝母妖術可具言之后乞屏左右有所密啟高祖勑中侍悉出唯令長秋卿白整在側后猶不言高祖乃令以綿堅塞整耳小語呼整再三無所應乃命, WYG: ''}
