  - {type: variant, offset: 3442, length: 478, content: 高祖乃呼彭城北海二王令入唑言昔是爾㛐今乃他人俱入勿避二王固辭不獲命及入高祖云此老嫗乃欲白刃捶我肋汝可窮問本末白有所難高祖深自引過致愧二王又云馮家女不能復相廢逐且使在宮中空坐有心乃能自死汝等勿謂吾猶有情也高祖素至孝猶以文明太后故未便行廢良久二王出乃賜后辭決再拜稽首泣涕欷歔令宿東房高祖疾甚謂彭城王勰曰後宮久乖陰政自絕于天若不早為之所恐成漢末故事吾死之後可賜自盡別宮可葬以后禮庶掩馮門之大過高祖崩北海王祥奉宣遺旨長秋卿白整等入授后藥后走呼不肯引決執持強之乃含椒而盡殯以后禮謚曰幽后葬長陵營內孝文高皇后後魏書曰孝文昭皇后高氏司徒公肇妺也父颺母蓋氏凡四男三女皆生於東裔高祖初乃舉室西歸達龍城鎮表后德色婉艷任充宮掖及至文明太后親幸北部見后姿貌奇之遂入掖庭年十三初后之幼也曾夢在堂內立而日光自窗中照之灼灼而熱后東西避之光猶斜照不已如是數夕后自怪之以白其父颺颺以問遼東人閔宗曰此奇徵也貴不可言颺曰何以知之宗曰夫日者君之德帝王之象也光照女身將被帝命誕育人君之象遂生世宗後生廣平王懷次長樂公主及馮昭儀寵盛密有母養世宗之意后自代如洛陽暴薨於汲郡之共縣或云昭儀遣人賊后也世祖之為, SBCK: 時}
