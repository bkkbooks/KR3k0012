  - {type: variant, offset: 258, length: 215, content: 祿也得者莫不馴而放之為利人也得蚤者莫不摩之齒牙為害身也虞翻與弟書曰其餘幾何老更衣希為蚤虱所咋故一二相告省書一過悉以付火齊卞土蚤虱賦序曰余居貧布衣十年不製一袍之縕有生所託資其寒暑無與易之為之多病起居甚踈縈寢敗絮不能自釋兼攝性懈惰嬾事皮膚澡刷不謹澣沐失時四體㲰㲰乃耕切加以臭穢故葦席蓬纓之間蚤虱猥流探揣獲撮日不替手虱蟣說文曰虱齧人蟲也蟣虱子也漢書曰項羽謂宋義曰疾引兵渡河破秦必矣義曰不然夫搏牛之䖟不可以破虱䖟諭秦虱諭章即等言大小不同勢, SBCK: 汁赤如血}
