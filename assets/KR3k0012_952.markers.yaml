  - {type: variant, offset: 11, length: 0, content: '', SBCK: 徴也春秋繁露曰木有變春凋冬榮傜貞剛精銳無以治之又曰崔亮爲雍州刺史城北渭水淺不通舡行人艱阻亮謂僚佐曰昔杜預乃造橋况此有異長河且魏晉之日亦自有橋吾今決欲營之咸曰水淺不可爲浮橋泛長無常又不可施柱恐難成立亮曰昔􅁗居咸陽横渡渭以像閣道此即以柱爲橋今唯慮長柱不可得耳㑹天}
  - {type: variant, offset: 11, length: 0, content: '', WYG: 徵也春秋繁露曰木有變春凋冬榮眞鋼精鋭無以治之北魏書曰崔亮為雍州刺史城北渭水淺不通船行人擁阻崔亮謂僚佐曰昔杜預乃造橋况此有異長河且魏晉之時亦有橋吾今更欲造之咸曰水淺不可為浮橋而長橋又不可施柱恐難成立亮曰昔秦居咸陽度渭以像閣道濟師以柱為橋今唯意慮長柱不可得其夕天}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_WYG_952-3a, image: WYG0901/WYG0901-0420c.png}
  - {type: variant, offset: 11, length: 0, content: '', krp: 徴也春秋繁露曰木有變春凋冬榮傜貞剛精銳無以治之又曰崔亮爲雍州刺史城北渭水淺不通舡行人艱阻亮謂僚佐曰昔杜預乃造橋况此有異長河且魏晉之日亦自有橋吾今決欲營之咸曰水淺不可爲浮橋泛長無常又不可施柱恐難成立亮曰昔秦居咸陽横渡渭以像閣道此即以柱爲橋今唯慮長柱不可得耳㑹天}
  - {type: variant, offset: 12, length: 1, content: 過, SBCK: 􅀨山水􅁀至浮山長木數百根藉此爲用橋遂成立百姓利之至今猶名崔公橋後周書}
  - {type: variant, offset: 12, length: 1, content: 過, WYG: 雨山水暴至浮長木數百根藉此為用橋遂成立百姓利之至今猶名崔公橋後周書}
