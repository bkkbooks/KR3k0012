  - {type: variant, offset: 14, length: 11, content: 亂頭多憂蚤虱生愁膳夫仲, SBCK: 沙俊齊神武夜遁追至河上復大克􅀗前後虜其卒七萬献俘長安還軍渭南於是所徴諸州兵始至乃於戰所准當時兵士人種樹一株以旌武功又曰王羆以功授右將軍西河内史辝不拜時人謂之曰西河大拜俸禄殷厚何爲致辝羆曰京洛材木盡出西河朝貴營第宅者有永假如其私辦即力所不堪􅀂科發民間又違法憲以此辝耳唐書曰貞觀中山南獻木連理交錯玲瓏有同羅木一丈之􅆬并枝者二十餘所又曰代宗大暦十二}
  - {type: page-break, offset: 14, content: '', id: KR3k0012_SBCK_952-2b}
  - {type: variant, offset: 14, length: 11, content: 亂頭多憂蚤虱生愁膳夫仲, WYG: 沙苑之役齊神武夜遁追至河上復大克獲前後擄其衆七萬獻俘長安還軍渭南于是所徵諸州兵始至乃於戰所令所得當時兵士人種樹一株以旌武功又曰王羆以功授右将軍西河内史辭不拜時人謂之曰西河大拜俸禄殷厚何為致辭羆曰京洛材木盡出西河朝貴營地併第宅者有求假如其私辦即力所不堪若科發民間又違法憲以此辭也唐書曰貞觀中山木連理交錯玲瓏有同羅木一丈之幹并枝者二十餘所又曰代宗大厯十二}
