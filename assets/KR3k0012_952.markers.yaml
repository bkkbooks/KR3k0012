  - {type: variant, offset: 39, length: 0, content: '', SBCK: 柔弱其死也堅強草木之生也柔脆其死也枯槁柔弱生之徒剛強死之徒合抱之樹生於毫末莊子曰南伯子綦遊乎啇之丘見木焉其大也然必有異材從而視其細枝則拳曲而不可以爲㨂俯而視其大根不可以爲棺椁䑛其葉則舌爛嗅之則使人狂酲子綦曰此果不材之木以至其大矣又曰莊子行於山中見大木枝葉盛茂採木者止其旁而不取也問其故曰無所可用莊子曰此木以不材得終其天年矣孟子曰孟子謂齊宣王曰所謂故國者非謂有喬木之謂也有丗臣之謂也孫卿子曰山下望十􅅿之木􅀂著而求著者不止折也又曰林木茂斧斤至又曰玉在山而木潤孔藂子曰夫子墓方一里諸弟子各以四方竒木來殖之尸子曰木之精氣爲畢方愼子曰廊廟之中材蓋非一木之枝吕氏春秋曰今夫爚蟬者務在乎明其火振其樹而已火不明雖振其樹何益雖振其權蟬其飛去不能得故曰何益明不燭在乎火在於闇闇无所見火乃光耳故曰在於闇中當今之時世暗甚矣人主有能明其徳者天下之士歸之也􅀂蟬之赴明火也又曰子之於父母也一躰而兩分同氣而異息􅀂草莽之有華實也樹木之有根心也又曰樹木盛則飛鳥歸之芻草美則禽獸歸之人主賢則豪桀歸之}
