  - {type: variant, offset: 2339, length: 780, content: 膚黃麤修之戚戚然意飲以元華一撮即出蟯可數升病已三十日如故淮南子曰天下物莫不資於水澤及蚑音歧蟯而不求報高誘曰蟯微蟲也蛻廣雅曰復育蛻也論衡曰蟬生於復育開背而出蛾詩曰螓首蛾眉爾雅曰蛾羅也蠶蛾廣雅曰蛢步丁反蛾也漢書曰建始元年春三月上幸雍祠五畤秋八月有白蛾群飛蔽日從東都門至軹道宋書曰傅亮少帝失德內懷憂懼直宿禁中睹夜蛾赴燭作感物以寄意焉王子年拾遺記曰有谷將子學道也言於燕昭王曰西王母尋來必語虛尤之術不踰一年王母果至與昭王遊乎燧林之下談炎上鑽火之術取緣桂之膏燃以映夜忽有飛蛾銜火狀如丹雀來拂於桂膏之上蛾出於員丘之穴郭子橫洞冥記曰武帝既躭於靈怪常得丹豹之髓白鳳之膏磨青錫為屑以淳蘇油和之照於神壇夜暴雨火光不滅有霜蛾如蜂赴燈侍者舉麟鬚之拂以驅之列仙傳曰園客濟陽人種五色香草服食其實一旦有五色蛾止其香末收而薦之生蠶焉符子曰不安其昧而樂其明是猶夕蛾去闇赴燈而死者也崔豹古今注曰飛蛾善拂燈一名火花一名慕光廣志曰有蠶蛾凡草木蟲以蛹化為蛾甚眾任昉述異記曰楚莊王宮人一旦化為野蛾而飛去夢書曰蛾為婦女眉儇也夢見蛾者憂婚也白澤圖曰赤蛾兩頭而白翼者龍也殺之兵死矣支曇諦火蛾賦序曰悉達有言曰愚人貪財如蛾投火誠哉斯言信而有徵鮑明遠飛蛾賦曰仙人司闇飛蛾候明均靈升化詭態齊生觀生齊而態詭各會性以憑方凌焦煙之浮景赴熙爛之明光拔身幽草下畢命君子堂本輕死以邀願得縻願其何傷豈效南山之文豹避霧雨而巖藏蛹爾雅曰螝蛹也郭璞曰蠶蛹也說文曰螝蛹也讀若潰蛹繭蟲也韓子曰蟲有螝者一身兩頭爭食相嚙也遂殺己人臣爭事亡其國者皆螝類也蛓爾雅曰蜭戶感切毛蠹即蛓也蟔蛅如占切蟴蛓屬今八角螫蟲說文曰蛓毛蟲也讀若笥蜭手蠹也蟥蛢爾雅曰蟥蚑符蟥蛢郭璞曰甲蟲也大如虎豆綠色江東呼黃蛢孫炎曰翼在甲裏說文曰蛢𧑐音韋也蟥也以翼鳴者也班貓本草經曰班貓一名龍尾味寒生谷吳氏本草經曰班貓一名班蚝音判一名龍蚝一名班菌一名腃髮一名晏青神農辛歧伯鹹桐君有毒扁鵲甘, SBCK: ''}
