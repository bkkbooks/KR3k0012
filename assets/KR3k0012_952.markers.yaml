  - {type: variant, offset: 582, length: 1653, content: 傍若無人溫察而奇之晉書曰阮籍著大人先生傳曰少稱鄉黨長聞鄰國上欲圖三公下不失州牧獨不見群虱之處禈中逃乎深縫匿乎壞絮自以為吉宅行不敢離縫匿乎禈襠自以為得繩墨也然炎丘火流焦邑滅都群虱處於褌中而不能出也君子之處域內何異夫虱之處禈中乎齊書曰江泌性行仁義衣弊虱多綿裏置壁上恐虱飢死乃置衣中數日中終身無復虱又曰卞彬為南康郡丞彬頗飲酒檳棄形體仕既不遂乃著蚤虱𧍪蟲蝦蟆等賦皆大有指斥三國典略曰梁劉殼常有飛書謗殼梁主怒曰劉殼似衣中虱必須搯之音恰北史司馬子如為大行臺及文襄輔政見之哀其憔悴以膝承其首親為擇虱賜酒百缾羊五百口粳米五百石子如曰無事尚被囚幾死若受此豈有生路耶列子曰紀昌學射於飛衛使學視小如大紀昌以氂懸虱於牖南面而望之二年之後如車輪焉以覩餘物皆丘山也乃以燕角之弧孤蓬之簳射之貫虱之心而懸不絕以告飛衛飛衛曰汝得之矣莊子曰濡需者豕虱是也擇䟽鬣自以為廣宮大囿奎蹄曲限乳間股腳自為安室利處不知屠者一旦布燥煙火而與豕俱燋韓子曰天下無道攻擊不已甲胄生蟣虱燕雀處帷幄而兵不歸故曰戎馬生於郊淮南子亦云又曰應侯謂秦王曰王得宛臨陳陽夏斷河內臨東陽邯鄲猶口中虱也又曰三虱食彘相與訟一虱遇之曰奚訟三虱曰爭肥饒者一虱曰若爾不患臘之將至而烹之也躁目若有奚患於是乃相與藂其目而食之彘瘦人乃不殺淮南子曰牛馬之氣蒸不能生蟣虱蟣虱之風蒸不能生牛馬故化生於外非生於內也又曰湯沐具而蟣虱相吊大廈成而鷰雀相賀抱朴子曰夫虱生於我我非虱之父母虱非我之子孫也又曰眼能察天衢而不能周項領之間耳能聞雷霆而不能周蟣虱之音也又曰今頭虱著身皆稍變而白身虱著頭皆漸化而黑則玄素果無定質移易在乎所漸也符子曰齊魯爭汶陽之田魯侯有憂色魯隱者周豊往觀曰臣嘗晝寢愀然聞群虱之鬭乎衣中甘臣膏腴之肌珍臣項膂之膚相與樹黨爭之日夜不息相殺者太半虱父止之曰我與汝黨不過縫所飡食不過容口奚用竊乎交戰為哉群虱止今君以七百里地為君之城亦以足矣而以汝汶陽數步之田感君之心曾不如一虱之知竊為君羞之魯侯曰善語林曰顧和始為楊州從事月旦當朝未入停車州門外須臾週侯已醉著白恰憑兩人來詣丞相歷和車邊和先在車中覔虱夷然不動周始見遙過去行數步覆反還指顧心曰此中何所顧擇虱不輟徐徐應曰此中最是難測量地風俗通曰河南趙仲讓為梁冀從事郎中冬月坐庭中向日解壞裘捕虱襄成君使推問之冀笑曰此我從事絕清高士也楊偉時務論曰夫吞八荒者不咀蟣虱也神異經曰西荒之中有人焉長短如人著百結敗衣手足虎爪名獏㺔張茂先曰俗曰貌偽音撝伺人眠輒往就人欲食人腦先使捕虱得臥而舌出盤地丈餘聞其聲常燒大石伺其得臥舌出以石投舌上於是低頭絕氣而死異苑曰太孫廣頭上不得有虱虱大者便遭朞喪大功小則小功殤服劉義慶宣驗記曰晉義熙中京師長年寺道人惠祥與法向連堂夜四更中惠遙喚向暫來往視祥仰眠交手胸上足脡欶鼎切直云可解我手足繩曰上並無繩也祥因得轉動云向有人眾以我手足鞭箠交下問何故齧虱語祥若更不止當入兩間磕之音盍祥後徵戒於虱餘無精進相牛經曰治牛虱用苦梗生魚汁清坎底土若酒和塗之夢書曰夢梳篦為憂解也其髮滑澤心喜也蟣虱盡去百病愈也蟣虱為憂齧人身也夢見蟣虱有憂至也揚雄長楊賦曰鞮鍪生蟣虱介胄被霑汗趙壹作非草書曰俯而擇虱不睱見地仰而觀鍼不睱見天天地至大而不見者銳精於鍼虱也魏文帝與王朗書曰蚤虱雖細虐於安寢鼷鼠至微猶毀郊牛嵇康養生論曰夫虱處頭而黑麝食桓而香又與山濤書曰危坐一時痺不得搖性復多虱把搔無已而當襲以章服揖拜上官三不可堪也螕字林曰螕齧牛蟲也蟭螟晏子春秋曰景公問晏子曰天下有極細乎對曰東海有蟲生於蚊睫再乳而飛蚊不為驚臣嬰不知其名東海者者命曰蟭螟列子曰江浦之間生麼細麼也蟲其名曰焦螟群飛而集於睫不相觸也捷栖宿去來蚊不覺也離朱子羽方晝拭皆揚眉而望之弗見其形離未黃帝時明目人子羽未聞也抱朴子曰焦螟也蚑眉之中而笑彌天之大鵬寸鮒遊牛跡之水不貴橫海之巨鱣也蛕說文曰蛕蝮中長蟲也叩頭異苑曰有小蟲形色如大豆呪令叩頭又使吐血皆從所教如似請放稽顙輒七十而有聲故俗呼為叩頭也傅咸叩頭蟲賦敘曰叩頭蟲蟲之微細者然觸之輒叩頭人以其叩頭殺之不祥故莫之害也食屍裴氏廣州記曰林任縣有甲蟲嗜臭肉人死食屍都盡紛紛滿屋非可驅殺博, SBCK: 愽}
