  - {type: variant, offset: 0, length: 2, content: 蟲豸, krp: 太平御覽九百五十二木}
  body:
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 一木上昜曰巽爲木坎其於木也爲堅多心艮其於木也爲堅多節離其於木也爲科上槁堅多心爲剛中也山木堅心也多其節令隂氣故曰科空也爲日所乾故上槁也又􅂛卦曰地中生木􅂛君子以順德積小以髙大書曰兖州厥木惟喬厥貢惟木孔安國曰喬髙又洪範五行三曰木木曰曲直曲直作酸又􅀃命曰木從繩則正后從諌則聖詩曰黄鳥于飛集于灌木其鳴喈二灌木藂木也又曰荏苒柔木君子樹之往來行言心焉數之荏苒寛柔貌也木椅桐梓也又曰南有喬木不可休息漢有遊女不可求思興也南方之木美喬上竦者思辝也漢上遊女無求思者也又曰后妃逮下而無嫉妬之心焉南有樛木􅁑藟纍之木下曲曰謬周禮曰仲冬斬隂木仲夏斬陽木陽木生南山隂木生北山禮記月令曰孟春之月盛德在木孟夏之月母伐大樹樂記曰土敝則草木不長水煩則魚鼈不大稽命微曰出号施令合民心作樂制禮得天心則草木有益於人長以養民也王者得禮之制則澤谷之中生赤木北斗威儀曰君乗木而王者其政􅂛平則草木豐茂左傳曰山有木工則度之又曰鳥能擇木木豈能擇鳥春秋元命苞曰木者陽精生於隂故水者木之母也木之爲言觸也氣動躍也其字}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_952-1b}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 一木上易曰巽為木坎其於木也為堅多心艮其於木也為堅多節離其於木也為科上槁多心為剛中也山木堅在内多節艮陽在外其堅多節科空也離中虛則木枯槁又升卦曰地中生木升君子以順德積小以髙大書曰兖州厥木惟喬又洪範五行三曰木木曰曲直曲直作酸又説命曰木從繩則正后從諫則聖詩曰黄鳥于飛集于灌木其鳴喈喈灌木叢木也又曰荏苒柔木君子樹之往來行言心焉數之荏苒柔貌柔嘉之木材中琴瑟樹植也又曰南有喬木不可休息漢有遊女不可求思興也以喬木方遊女以不可息興起不可求又曰南有樛木葛藟纍之木下曲曰樛言后妃能逮下而無嫉妬之心焉周禮曰仲冬斬隂木仲夏斬陽木陽木生南山隂木生北山禮記月令曰孟春之月盛德在木孟夏之月毋伐大樹樂記曰王者作樂制禮得天心則草木有益於人者将以養民也王者得禮之制則澤谷之中生赤木禮斗威儀曰君乗木而王者其政平則草木豐茂左傳曰山有木工則度之又曰鳥則能擇木木豈能擇鳥春秋元命苞曰木者陽精生於隂故水者木之母也木之為言觸也氣動躍也其字}
