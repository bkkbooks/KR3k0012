  - {type: variant, offset: 179, length: 1, content: 釋, SBCK: 食木者多力而惡熊犀之屬是也食草者善走而愚麋鹿之屬是也又曰良匠不能斷金巧冶不能鑠木金之􅀔不可斷而木之性不可鑠也又曰髙陽魋或曰髙陽楚時王魋宋}
