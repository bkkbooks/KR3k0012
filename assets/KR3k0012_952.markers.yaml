  - {type: variant, offset: 3397, length: 145, content: 其聲採者鮮得名以善價求之以為媚藥蛆梁書曰王琳敗後入齊為特進侍中所居屋脊無故剝破出赤蛆數升落地化為血蠕動又曰元帝時安城人劉敬躬於田間得白蛆化為黃金龜將銷之龜生光照室敬躬以為神而禱之所請多驗遂謀作亂帝命都督王僧辯討擒之後魏書曰宣武遐昌三年章武王熙為相州刺史有蛆生於庭俄而反伏誅廣五行記曰北燕馮跋, SBCK: 氣乃活}
