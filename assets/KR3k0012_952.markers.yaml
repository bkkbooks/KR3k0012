  - {type: variant, offset: 144, length: 5, content: 昌羊去蚤虱, SBCK: 草木洪者爲夲而殺者爲末禽獸之性大者爲首而小者爲尾末大於夲則折尾大於腰則不掉故食其口而百節肥灌其夲而枝葉美又曰夫樹木灌以潦水疇以肥壤千人養之一人技之則必無餘孽况以一國同伐之雖欲乆豈可得哉又曰山生金反自刻木生蠧反自食人生事反自賊賊敗也又曰今夫徙樹者失其隂陽之性則莫不枯槁失猶易也故橘之江北則化而爲枳鸜鵒不過濟洛度汶而死又曰馮生陽閼自馮之先也陽閼生鱗鮐音台鱗鮐生幹木幹木生庶木凢根枝者生庶木根枝木名也又曰髙山􅀷林非爲虎豹也大木茂枝非爲飛鳥也又曰天有明不憂民之晦也百姓穿户鑿牗自取炤焉地有財不憂民之貧也百姓伐木艾草自取冨焉又曰郢人有買屋棟者求大三圍之木}
  - {type: page-break, offset: 144, content: '', id: KR3k0012_SBCK_952-4b}
  - {type: variant, offset: 144, length: 5, content: 昌羊去蚤虱, WYG: 木洪者為夲而殺者為末禽獸之大者為首而小者為尾末大於夲則易折尾大於腰則不掉故食於口而百節肥壅其本而枝葉美又曰夫樹木灌以潦水疇以肥壤千人養之一人㧞之則必無餘蘖况以一國同伐之雖欲久豈可得哉又曰山生金反自尅木生蠧反自食人生事反自賊賊敗也又曰今夫徙樹者失其隂陽之性則莫不枯槁失猶易也故橘之江北則化而為枳鸜鵒不過濟貉渡汶而死又曰鳩生陽閼自鳩之先也陽閼生鱗鮐音台鱗鮐生鮐幹木幹木生庶木根枝木者生於庻木根枝木名也又曰髙山深水非為虎豹也大木茂枝非為飛鳥也又曰天有明不憂民之晦也百姓穿户鑿牖自取炤焉地有財不憂民之貧也百姓伐木艾草自取富焉又曰郢人有買屋棟者求三圍之大木}
