  - {type: variant, offset: 231, length: 3, content: 蚤虱群, SBCK: 山中大樹能語者非樹語也其精名曰靈陽山夜見火者皆古枯所致勿怪也甲子日稱仙人者樹也孫綽子曰海上人與山客辨其山物海人曰魚額若華山之頂一吸萬頃之波山客曰鄧林有木圍三萬尋直上千里旁蔭數國有人曰東極有大人斬木爲策短不可支鈎魚爲鮮不足充飢金樓子曰利内有水材元嘉中大水有千餘段木流出斧迹未滅俗云漢將將}
  - {type: variant, offset: 231, length: 24, content: 蚤虱群攻臥不獲安曹植論曰孟春之旦從陽徑生貴放鳥雀, WYG: 山中大樹能語}
