  - {type: variant, offset: 183, length: 1, content: 小, SBCK: 重塗今雖善後必敗髙陽應曰不然夫木枯則益重塗乾則益輕塗今雖惡後必善匠人窮於辭以對卒爲室其始成均然善也而後果敗此直於辭而不可用者也又曰捨茂木而集于枯不弋鵠而鳥難與有圖圖謀也言其愚也耳又曰質的張而弓矢集林木茂而斧斤入非或召之形􅀔所致也又曰冬水可析夏木可結時難得而易失木方茂盛終日採而不知秋風下霜一夕而殫殫盡也又曰佐􅀕者得嘗救􅃲者得傷䕃不祥之木爲電所撲薜木也撲擊也又曰金勝木者非以刀殘林也土勝水者非以璞音朴土塊也塞江也又曰剖劂銷音削鋸非良匠不能以制木鑪橐音朶坊設鑪槖皆冶坊之形也非巧冶不能以治金又曰羽翼美者傷骨骸}
  - {type: page-break, offset: 183, content: '', id: KR3k0012_SBCK_952-5b}
  - {type: variant, offset: 183, length: 1, content: 小, WYG: 重塗今雖善後必敗髙陽應曰不然夫木枯則益重塗乾則益輕塗今雖惡後必善匠人窮於辭以對卒為屋其始成居然善也而後果敗此直於辭而不可用者也又曰捨茂木而集於枯不弋鵠而鳥難與有圖圖謀也言其愚也又曰質的張而弓矢集林木茂而斧斤入非或召之形勢所致也又曰冬氷可折夏木可結時難得而易失木方茂盛終日採而不知秋風下霜一夕而殫殫盡也又曰佐祭者得嘗救鬭者得傷䕃不祥之木為電所撲蔭植也撲擊也又曰金勝木者非以刀殘木也土勝水者非以墣音朴土塊也塞江也又曰剞劂銷音削鋸非良匠不能以制木鑪􅗜音朶坊設鑪􅗜皆冶坊之形也非巧冶不能以治金又曰羽翼美者傷骨骸}
