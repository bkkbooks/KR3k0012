  - {type: variant, offset: 1554, length: 627, content: 成事智者見於未萌邯鄲氏笑林曰桓帝時有人辟公府椽者倩人作奏記文人不能為作因語曰梁國葛龔者先善為記文自可寫用不煩更作遂從人言寫記文不去龔名姓府公大驚不荅而罷歸故時人語曰作奏雖工宜去葛龔賈誼新書鄙諺曰欲投鼠而忌器此善喻也鼠近於器尚憚而弗投恐傷器也況貴大之臣近於主帝乎桓子新論曰關東諺語曰人聞長安樂則出門而西向笑知肉味美則對屠門而大嚼又諺曰侏儒見一節而長短可知孔子言舉一隅足以三隅反觀吾小時二賦亦足以揆其能否崔寔政論曰每詔書所欲禁絕雖重懇惻罵詈極筆由復廢捨終無悛意故里語曰州郡記如霹靂得詔書但掛壁又曰一歲再赦奴兒噫唶況不軌之民熟不肆意應劭漢官儀曰里語云仕官不止車生耳蔡邕獨斷曰古幘無巾王莽頭禿乃始施巾故語曰莽頭禿幘如屋王朗貧窶語曰諺曰魯班雖巧不能為乞丐者顏魏武選令曰諺曰失晨之雞思補更鳴昔季闡在白馬有受金取婢之罪棄而弗問後以為濟北相以其能故曹植令曰諺云相門有相將門有將夫相者文德昭將者武功烈鬭爭左傳隱公曰鄭伯將伐許授兵於太宮公孫閼與潁考叔爭車潁考叔挾輈以走輈車轅也子都拔戟以逐之又襄二十六年曰秦伯之弟鍼如晉脩成叔向命召行人子員欲使答秦行人子朱曰朱也當御御進也言當次行三云叔向不應子朱怒曰班爵同同為大夫何以黜朱於朝無劍從之叔向曰秦晉不和久矣今日之事幸而集晉國賴之不集三軍暴骨子員道二國之言無私子常易之姦以事君者吾所能御也拂衣從之人救之平公曰晉其庶乎庶幾於治吾臣之所爭者大師曠曰公室懼卑臣不心競而力爭不務德而爭善私欲已侈能無卑乎又襄五年曰楚伐鄭至於城麇鄭皇頡戍之出與, WYG: 鄢陵}
