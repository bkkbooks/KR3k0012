  - {type: variant, offset: 18, length: 1, content: 卒, krp: 請曰蔣琬社稷之器非百里之才也願主父重加察之乃不加罪吴志曰孫權爲吴王遊宴之後起自行酒虞飜伏地陽醉不持權去飜起坐權於是大怒欲手擊之大司農劉基起抱權諫曰大王以三爵後殺善士雖飜有罪天下孰知之權曰曹孟德尚殺孔文舉孤於虞飜何有哉基曰孟德輕害名士天下非之今大王躬行仁德欲與堯舜比隆由是得免權因勑左右自今酒後言殺皆悉不得殺也又曰孫皓大㑹群臣王蕃沉醉頓伏皓疑而不恱蕃轝出以頃之請還酒亦小解蕃性有威嚴行止自若皓大怒呵左右於殿下斬之魏典略曰董卓雖親愛吕布然時醉酒則罵之以刀劒擊之不中布恐終𬒳害乃先畜死士以㦸刺卓卓曰布何在布曰有詔遂殺之又曰時苗字德胄出爲壽春令}
