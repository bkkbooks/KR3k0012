  - {type: variant, offset: 3748, length: 0, content: '', krp: 君曰醉足以亡裘乎荅曰紂以酒亡天下而况裘亡乎又曰紂爲長夜而失日問於左右盡弗知曰使人問箕子謂}
  - {type: variant, offset: 3749, length: 0, content: '', SBCK: 從曰爲天下王而一國皆失日天下其危矣一國皆不知而我獨知之我其危矣辭以醉而不知也又曰齊桓公飲酒醉遺其冠耻之三日不朝管仲曰此非有國者之耻也公胡不雪之以政公曰善因發囷倉賜貧窮論囹圄出薄罪}
