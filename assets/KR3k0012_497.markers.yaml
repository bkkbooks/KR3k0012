  - {type: variant, offset: 15, length: 3, content: 諸葛亮, SBCK: 酣樂酒也又曰酒}
  - {type: variant, offset: 15, length: 0, content: '', WYG: 漢髙祖為泗上亭長亭中吏無所不狎侮好酒及色常從王媼武負貰飲酒醉卧武負王媼見其上常有怪此兩家常拆券棄債又曰髙祖被酒夜經澤中令一人前前者還報曰前有大蛇當徑髙祖醉曰壯士何畏乃前拔劒斬蛇分為兩道開行數里醉因卧又曰萬石君徙居陵里内史慶醉歸入外門不下車萬石君聞之不食慶恐肉袒請罪不許舉宗及兄建肉袒萬石君讓曰内史貴人入閭里里中長老皆走匿而内史坐車中如故乃謝罷慶慶及諸子入里門趍至家又曰衞青伐匈奴右賢王當青等以為漢兵不能至飲醉漢兵夜至圍右賢王驚而夜逃又曰李廣當斬贖為庶人與故潁隂侯屏居藍田南山射獵嘗夜從一騎出從人田間飲還至亭霸陵尉醉呵止廣廣騎曰故李將軍尉曰今將軍尚不得夜行何故也宿廣亭下又曰陳遵為京兆尹嗜酒每大飲賔客滿堂輒閉門取車轄投井中雖有急終不得去有部刺史奏事過遵值其方飲刺史候遵宿醉時突入見遵母乃叩頭白當對尚書有期㑹乃令從後閤出去遵雖嘗醉然事亦不廢又曰邴吉始於官屬掾史務掩過揚善吉馭吏嗜酒數逋蕩嘗從吉出醉嘔丞相車下茵西曹主吏白欲斥之吉以醉飽之失去是使此人將復何所容西曹忍之此不過汙丞相車茵耳遂不去東漢觀記曰更始納趙萌女為夫人有寵遂委政於萌日夜與婦人飲讌後庭羣臣欲進言事輒醉不能見乃令侍中坐帳内與諸將語識非更始聲出皆怨謝承後漢書曰劉寛為太尉嘗朝見寛被酒沉醉伏地睡詔問太尉醉耶寛仰對曰臣不敢醉但任重責大憂心如醉魏志曰徐邈字景山魏國初建為尚書郎時科禁酒而邈私飲沉醉校事趙達問以曹事邈曰中聖人達白太祖甚怒度遼將軍鮮于輔平曰醉客謂清酒為聖人濁酒為賢人邈性脩慎偶醉言耳後文帝踐祚問邈曰頗復中聖人不對曰宿瘤以醜見知微臣以醉見識帝大笑顧左右曰名不虛也又曰曹仁為蜀兵所圍太祖以曹植行征虜將軍欲令救仁植醉不能受命於是罷之蜀志曰蔣琬字公琰除廣都長先主嘗因遊觀奄至廣都衆事不理時又沉醉先主大怒將加罪戮}
