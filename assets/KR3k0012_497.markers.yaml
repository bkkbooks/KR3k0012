  - {type: variant, offset: 208, length: 0, content: '', WYG: 元石從中山酒家酤酒酒家與之千日酒不語其節度至家而醉家以為死而葬之酒家計滿千日乃憶之往索元石元石家云亡來三年服已闋矣乃至家掘而問之元石起於棺中説苑曰楚莊王賜羣臣酒日暮燭滅有引美人衣者美人援絶其}
  - {type: variant, offset: 209, length: 0, content: '', WYG: 纓告王王曰賜人酒使失禮奈何欲顯婦人之節而辱士乎乃命左右令曰與寡人飲不絶冠纓者不歡羣臣皆絶其冠纓乃止世説曰周伯仁有德量深達危亂過江積年恒大飲酒嘗經}
  - {type: page-break, offset: 209, content: '', id: KR3k0012_WYG_497-11b, image: WYG0897/WYG0897-0486d.png}
  - {type: variant, offset: 210, length: 197, content: 軍其所持手戟長幾一尋軍中為之語曰帳下壯士有典軍手提雙戟八十斤又曰郭典字君業為鉅鹿太守與中郎將董卓攻黃巾賊張寶於曲陽典作圍塹卓不肯典獨於西當賊之衝晝夜進攻寶由是城守不敢出時人為語曰郭君圍壍董將不許幾令狐狸化為豺虎賴我郭君不畏強禦轉機之間敵為窮虜猗猗惠君保完疆土又曰柳琮字伯騫所拔進皆為時所稱致位牧守鄉里為諺曰得黃金一笥不如為柳伯鶱所識皇甫謐達士傳曰繆斐字文雅代脩儒學繼踵六博士以經行脩明學士稱之故, WYG: 日醒}
