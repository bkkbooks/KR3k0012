  - {type: variant, offset: 38, length: 0, content: '', SBCK: 也又曰孔顗使酒仗氣每醉輙弥日不醒僚􅀋之間多所凌忽尤不能曲意權倖莫不畏而疾之又曰陶潜甞九月九日無酒出宅邊菊藂中坐乆之值王􅀪送酒至便酌大醉而歸崔鴻後趙録曰石勒制法甚嚴兼諱胡尤峻有醉胡乗馬突入止車勒大怒謂宫門小執法馮翥曰夫人君爲令將使下之無犯吾尚望威行天下况於宫閤之間向馳馬入門爲是何人而不彈白縱之耶翥惶懼忘諱對曰向醉胡乗馬馳入甚呵衛之而不可與語所謂互郷難與言小人所不能制勒􅀏曰胡正自難與言恕而不罪崔鴻前秦録曰建武十四年堅宴群臣於釣臺以祕書􅁥朱肜爲酒正堅曰今日之飲當以落池爲限史典論曰荆州牧劉表跨有南􅁟子弟驕貴並好酒爲三爵大曰伯雅次曰}
  - {type: page-break, offset: 38, content: '', id: KR3k0012_SBCK_497-5b}
  - {type: variant, offset: 38, length: 0, content: '', WYG: 也又曰孔顗使酒仗氣每醉輒彌日不醒僚類之間多所凌忽尤不能曲意權倖莫不畏而疾之又曰陶潛嘗九月九日無酒出宅邉菊藂中坐久之值王宏送酒至便酌大醉而歸崔鴻後趙録曰石勒制法甚嚴兼諱胡尤峻有醉胡乘馬突入止車門勒怒謂宫門小執法馮翥曰夫人君為令將使下之無犯吾尚望威行天下况於宫閣之間向馳馬入門為是何人而不彈白縱之耶翥惶懼忘諱對曰向醉胡乘馬馳入甚呵衞之而不可與語所謂互鄉難與言小人所不能制勒笑曰胡正自難與言恕不罪崔鴻前秦録曰建武十四年堅宴羣臣於釣臺以秘書監朱肜為酒正堅曰今日之飲酒當以落池為限史典論曰荆州牧劉表跨有南土子弟驕貴並好酒為三爵大曰伯雅次曰}
