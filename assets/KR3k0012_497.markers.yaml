  - {type: variant, offset: 36, length: 1, content: 走, SBCK: 旟曰以顧榮爲主簿所以甄拔才望委以事機不復計南北親踈欲平海内之心也今府大事殷非酒客之政旟曰榮江南望士且居職日淺不冝輕代易之熊曰可轉爲中書侍郎榮不失清顯而府更收實才旟然之白囧以爲中書侍郎在職不復飲酒人或問之曰何前醉而後醒耶榮懼乃復更飲晉中興書曰畢卓字茂丗爲吏部郎比舎郎釀熟卓因醉夜至其甕間取酒飲之掌酒者􅅞卓郎往視之釋􅅞宴於甕側取醉而去又曰周顗代戴淵爲護軍尚書紀瞻置酒請顗及王導等二十人顗荒醉失儀復爲有司所奏檀道鸞晉書曰桓􅀇詣㑹稽王道子道子巳醉對􅀇張目瞩四座云桓温作賊玄見此醉􅀔難測伏地流汗宋書曰荆州刺史王忱范太外弟也忱嗜酒醉輙累旬及醒則儼然端肅太謂忱曰酒雖㑹性亦所以傷}
