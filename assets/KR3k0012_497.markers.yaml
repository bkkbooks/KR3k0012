  - {type: variant, offset: 812, length: 306, content: 輔決錄曰馮豹字仲文後母遇之甚酷豹事之愈謹時人為之語曰道德彬彬馮仲文又曰五門子孫凡民之伍門今在河南西四十里澗穀洛三水之交傳聞馬氏兄弟五人共居此地作五門客舍因以為名主養豬賣豚故民為之語曰苑中三公館下二卿五門嚾嚾但聞豚聲又曰賈彪兄弟三人並有高名彪最優故天下稱曰賈氏三虎偉節最怒又曰游殷字幼齊為胡軫所害月餘軫得病但言伏伏游幼齊將鬼來於是遽死關中諺曰生有知人之明死有貴神之靈臨海異物志曰安家夷皆好噉猴頭羹諺言人寧負人千石之粟不願負人猴頭羹臛又曰䱥魚肥炙食甚美諺曰寧去累世田宅不去䱥魚額風俗通曰趙王好大眉人間半額楚王好廣領國人沒項齊王好細腰後宮有餓死者又曰延嘉中常侍單超左琯徐璜具瑗唐衡在帝左右縱其姦逸時人為之語曰左廻天徐轉, WYG: ''}
