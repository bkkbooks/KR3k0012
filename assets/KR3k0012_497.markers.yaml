  - {type: variant, offset: 3180, length: 516, content: 直見人鬭則觸不直聞人論咋不正名曰獬豸一名任法今御史用法冠俗曰獬豸冠也續搜神記曰晉太原中北地人陳良與沛郡民李焉共為賈後大得利焉殺良取物死十許日良忽蘇活得歸家說死時見周旋人劉舒舒久已亡謂良曰去年春社日祠祀家中鬭爭吾實忿之作一兕於庭前良故往報舒家其怪亦絕皇甫士安逸士傳曰高鳳鄰里有爭財鬭者兵刃相加鳳脫衣巾為叩頭曰仁義遜讓不可廢也爭財者投兵謝之而罷東觀漢記又載又曰管寧所居屯落會有汲者或男女雜錯或爭井鬭鬩寧患之乃買器分置井傍汲以待之各自相責不復鬭也會稽典錄曰夏香字曼卿門側有大井上有瓦盆里中兒童各競飲牛爭水共鬭香豫為汲多置盆器由是無爭費禕別傳曰魏延與楊儀並坐爭論延或舉刃擬儀儀涕泣橫集禕常入坐其間諫喻分別石勒別傳曰勒微時居與邑人李陽相近陽性剛愎每輕勒與爭漚麻池共相打楪互有勝負吳越春秋曰伍子胥始吳時遇專諸於途專諸方與人鬭將就之適其怒有萬人之氣其妻一呼即還子胥怪而問其狀專諸曰夫屈一人之下必伸萬人之上列子曰昔共工與顓頊爭為帝怒觸不周之山折天柱絕地維胡非子曰胡非子脩墨子教有屈將子恃勇聞墨者非鬭帶劍危冠往見胡非子劫而問之曰將聞先生非鬭而好勇有說則可無說則死胡非子為言五勇屈將子悅服尸子曰魯人有孝者三為母北魯人稱之彼其鬭則害親不鬭則辱羸矣不若兩降, WYG: 斬}
