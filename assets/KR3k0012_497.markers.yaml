  - {type: variant, offset: 993, length: 2450, content: 靈臨海異物志曰安家夷皆好噉猴頭羹諺言人寧負人千石之粟不願負人猴頭羹臛又曰䱥魚肥炙食甚美諺曰寧去累世田宅不去䱥魚額風俗通曰趙王好大眉人間半額楚王好廣領國人沒項齊王好細腰後宮有餓死者又曰延嘉中常侍單超左琯徐璜具瑗唐衡在帝左右縱其姦逸時人為之語曰左廻天徐轉日具獨坐唐應聲言信用甚於轉圓也又曰里語曰縣官漫漫怨死者半六韜曰天下攘攘皆為利往天下熙熙皆為利來列子曰周諺曰田父可坐殺晨出夜入自以性之恒啜菽茹藿自以味之極一朝處以軟毛綈薦以梁肉蘭味心㾓體煩內熱生病矣又曰揚朱曰古語有之生相憐死相捐此語至矣又曰趙子文曰國諺有言察見淵魚者不祥智料隱逸者殃且君欲無盜莫若舉賢而任之孟子曰齊人有言雖有智慧不如乘勢雖有鎡基不如待時齊人之諺語也乘勢居富貴之勢也鎡錤田器耒耜之屬也孔叢子曰平原君與子高飲強子高酒曰昔有遺諺堯舜千鍾孔子百觚子路嗑嗑尚飲百榼古之賢聖無不能飲也吾子何辭焉韓子曰鄙諺曰長袖善舞多錢善賈此言多資之易為工又曰古有諺曰為政猶沐也雖有棄髮之廢而有長髮之利也慎子曰諺云不聰不明不能為王不瞽不聾不能為公蔣子萬機論曰學者如牛毛成者如鱗角又曰猛虎不處卑勢勁鷹不立垂枝抱朴子曰桓靈曰舉秀才不知書察孝廉父別居寒素清白濁如泥高第良將怯如蠅又曰古人欲達勤誦經今世圖官勉治生商君書曰公孫鞅謂秦孝公曰臣聞之疑行無名疑事無功君亟定變法之慮殆猶天下之議語曰愚者暗於成事智者見於未萌邯鄲氏笑林曰桓帝時有人辟公府椽者倩人作奏記文人不能為作因語曰梁國葛龔者先善為記文自可寫用不煩更作遂從人言寫記文不去龔名姓府公大驚不荅而罷歸故時人語曰作奏雖工宜去葛龔賈誼新書鄙諺曰欲投鼠而忌器此善喻也鼠近於器尚憚而弗投恐傷器也況貴大之臣近於主帝乎桓子新論曰關東諺語曰人聞長安樂則出門而西向笑知肉味美則對屠門而大嚼又諺曰侏儒見一節而長短可知孔子言舉一隅足以三隅反觀吾小時二賦亦足以揆其能否崔寔政論曰每詔書所欲禁絕雖重懇惻罵詈極筆由復廢捨終無悛意故里語曰州郡記如霹靂得詔書但掛壁又曰一歲再赦奴兒噫唶況不軌之民熟不肆意應劭漢官儀曰里語云仕官不止車生耳蔡邕獨斷曰古幘無巾王莽頭禿乃始施巾故語曰莽頭禿幘如屋王朗貧窶語曰諺曰魯班雖巧不能為乞丐者顏魏武選令曰諺曰失晨之雞思補更鳴昔季闡在白馬有受金取婢之罪棄而弗問後以為濟北相以其能故曹植令曰諺云相門有相將門有將夫相者文德昭將者武功烈鬭爭左傳隱公曰鄭伯將伐許授兵於太宮公孫閼與潁考叔爭車潁考叔挾輈以走輈車轅也子都拔戟以逐之又襄二十六年曰秦伯之弟鍼如晉脩成叔向命召行人子員欲使答秦行人子朱曰朱也當御御進也言當次行三云叔向不應子朱怒曰班爵同同為大夫何以黜朱於朝無劍從之叔向曰秦晉不和久矣今日之事幸而集晉國賴之不集三軍暴骨子員道二國之言無私子常易之姦以事君者吾所能御也拂衣從之人救之平公曰晉其庶乎庶幾於治吾臣之所爭者大師曠曰公室懼卑臣不心競而力爭不務德而爭善私欲已侈能無卑乎又襄五年曰楚伐鄭至於城麇鄭皇頡戍之出與楚師戰敗穿封戍囚皇頡公子圍與之爭之正於伯州犂正曲直也伯州犂曰請問於囚乃立囚伯州犂曰所爭君子也其何不知上其手曰夫子為王子圍寡君之貴介弟也下其手曰此子為穿封戍方城外之縣尹也誰獲子上下手以道囚意囚曰頡遇王子弱焉弱敗也言為王子所得戍怒抽戈逐王子圍史記曰蘭相如功大拜為上卿位在廉頗右頗曰我為趙將有攻城野戰之功相如徒以口舌為勞位居我上吾不忍為之下必辱之相如聞之不肯與會每朝常稱病不欲與頗爭列於是舍人請辭去相如曰強秦不敢加兵於趙者徒以吾兩人在也今兩虎共鬭勢不俱生所以先國家之急而後私讎也又曰彭越字仲常漁鉅野中為群盜陳勝項梁起少年或謂越曰豪傑相立叛秦仲可效之越曰兩龍方鬭且待之又曰婁敬說上曰天與人鬭不搤其亢張晏曰亢嚨喉拊其背未能全其勝也今陛下入關而都案秦之故此亦搤天下亢而拊其背也又曰孔子去陳過蒲會公叔氏以蒲叛蒲人止孔子弟子公良孺者有勇力謂曰昔從夫子遇難於匡今遇難於此命也吾寧鬭而死鬭甚疾蒲人懼謂曰無適衛吾出子也漢書曰項羽謂漢王曰天下匈匈以吾兩人願與王挑戰決雌雄漢王笑曰吾寧鬭智不能鬭力也又曰大將軍霍光秉政諸霍在平陽奴客持刀兵入市吏不能禁及尹翁歸為市吏莫敢犯者又曰邴吉常出逢群鬭者死傷橫道吉過之不問掾史獨怪之吉曰民鬭相殺傷長安令京兆尹職所當禁也宰相不親小事又曰原涉遣奴至市買肉奴乘涉氣與屠者爭言斫傷屠者又漢書張耳贊曰張耳陳餘世所稱賢始居約時相然信死豈顧問哉及據國爭權卒相滅亡勢利之交古人羞之續漢書曰孝靈皇帝於後宮人為列肆販賣使相偷盜爭鬭上臨視之以為樂東觀漢記曰執金吾賈復在汝南部將殺人頴川捕得寇恂乃戮之於市復以為恥過頴川謂左右曰吾今見恂必手劍之恂知其謀不欲與相見恂曰昔蘭相如屈於廉頗者為國也乃勑屬縣盛供具一人皆兼二人之饌恂乃出迎於道稱疾還賈復勒兵欲追之而吏士皆醉遂過去恂以狀聞上乃徵恂恂至引見時復先在座欲起相避上曰天下未定兩虎安得私鬭又曰周黨字伯況太原人鄉佐發黨傜道於人中辱之黨學春秋長安聞復讎之義輟講下辭歸到與鄉佐相聞期鬭日卿佐多從兵往使卿佐先拔刀然後與相擊鄉佐服其義勇袁山松後漢書曰劉盆子居長樂宮赤眉諸將日會論功名自言欲為某王欲得某官爭言號呼拔劍相擊英雄記曰呂布字奉先劉備屯小沛袁術遣將紀靈步士三萬攻備備求救於布布率騎千餘馳赴之遣人招備並請靈等饗因謂靈曰布性不喜合鬭但喜解鬭耳蜀志曰劉封與孟達分爭不和封奪達鼓吹達遂降魏山海經曰刑夭與帝爭神帝斷其首葬之常羊之山神異經曰東北荒中有獸焉其狀如羊一角毛青四足似熊性忠而直見人鬭則觸不直聞人論咋不正名曰獬豸一名任法今御史用法冠俗曰獬豸冠也續搜神記曰晉太原中北地人陳良與沛郡民李焉共為賈後大得利焉殺良取物死十許日良忽蘇活得歸家說死時見周旋人劉舒舒久已亡謂良曰去年春社日祠祀家中鬭爭吾實忿之作一兕於庭前良故往報舒家其怪亦絕皇甫士安逸士傳曰高鳳鄰里有爭財鬭者兵刃相加鳳脫衣巾為叩頭曰仁義遜讓不可廢也爭財者投兵謝之而罷東觀漢記又載又曰管寧所居屯落會有汲者或男女雜錯或爭井鬭鬩寧患之乃買器分置井傍汲以待之各自相責不復鬭也會稽典錄曰夏香字曼卿門側有大井上有瓦盆里中兒童各競飲牛爭水共鬭香豫為汲多置盆器由是無爭, SBCK: 諤諤}
