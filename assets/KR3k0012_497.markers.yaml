  - {type: variant, offset: 20, length: 3, content: 儀整軍, krp: 州治在其縣時蔣濟爲治中苗以𥘉至往欲謁濟濟素嗜酒適㑹其醉不能見恚恨還刻木爲人署曰酒徒蔣濟竪之於牆下旦夕射之又曰丁冲爲司隷校尉後數歳過諸將飲酒美不能止醉爛膓死也晉書曰羊曇者太山人知名士也少爲謝安所愛重安薨後輟樂弥年行不由西路州甞因石頭大醉扶路唱樂不覺至州門也左右白曰此西州門曇悲感不巳以馬䇿扣扉誦曹子詩曰生存華屋處零落歸山丘因慟哭}
  - {type: variant, offset: 23, length: 0, content: '', SBCK: 事告齊故得此饋還以告魏相魏齊大怒使舎人笞睢折脅拉齒睢佯死旣卷簀置厠中賔客飲酒醉更溺睢睢從簀中謂守者曰旣岀我我厚謝公守者乃請棄簀中死人齊醉曰可矣又曰齊威王置酒後宫召淳于髠賜酒問曰先生能飲幾許而醉髠曰飲一斗亦醉飲一石亦醉王曰先生飲一斗而醉廼能飲一石哉髠曰賜酒大王之前執法在傍御史在後髠恐懼俯伏而飲一斗徑醉若州閭之㑹男女雜坐前有墮珥後有遺簮髠竊樂此飲可八斗堂上燭㓕主人留髠}
