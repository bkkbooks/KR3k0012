  - {type: variant, offset: 10, length: 0, content: '', WYG: 皆欲言來者參輒飲酒醉而後去終莫能開説又曰景帝召程姬有所避而飾侍者唐兒使夜進上醉不知以為程姬而幸之遂有娠及生子命曰發為長沙王}
