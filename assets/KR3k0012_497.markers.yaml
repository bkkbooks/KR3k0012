  - {type: 'tls:seg', offset: 220, content: '', id: KR3k0012_CHANT_497-3a.15}
  - {type: variant, offset: 224, length: 761, content: 語曰帳下壯士有典軍手提雙戟八十斤又曰郭典字君業為鉅鹿太守與中郎將董卓攻黃巾賊張寶於曲陽典作圍塹卓不肯典獨於西當賊之衝晝夜進攻寶由是城守不敢出時人為語曰郭君圍壍董將不許幾令狐狸化為豺虎賴我郭君不畏強禦轉機之間敵為窮虜猗猗惠君保完疆土又曰柳琮字伯騫所拔進皆為時所稱致位牧守鄉里為諺曰得黃金一笥不如為柳伯鶱所識皇甫謐達士傳曰繆斐字文雅代脩儒學繼踵六博士以經行脩明學士稱之故時人謂之語曰素車白馬繆文雅王祥別傳曰晉受禪時廊廟之士莫不懽容而祥色不加怡時人為之語曰王公恨恨有送故之情也張方賢楚國先賢傳曰諺曰黃尚為司隸姦慝自弭左雄為尚書令天下慎選舉荀氏家傳曰荀邃夫人有至行時歲荒每來糴者夫人恒叩其斛糴者歸量輒過其本時人號曰掾斛夫人陳留風俗傳曰許晏守偉君授魯詩於琅邪王改學曰許氏章句列在儒林故諺曰殿上成群許偉君曹操別傳曰呂布梟勇且有駿馬時人為之語曰人中有呂布馬中有赤免文士傳曰江應元時人諺曰嶷然希言江應元又曰留侯七世孫張讚字子卿初居吳縣相人里時人諺曰相里張多賢良積善應子孫昌習鑿齒襄陽記曰黃承產謂諸葛亮曰身有醜女才堪相配即載送之鄉里語曰孔明擇婦正得外醜也和苞漢趙記曰陳安奮刀左右俱發隴上語曰隴上壯士有陳安丈八虵矛左右槃西京雜記曰韓嫣好彈以金為丸一日所失者十餘長安為之語曰若飢寒逐彈丸京師兒童每聞嫣出彈輒隨之望丸所落便拾取焉英雄記曰袁紹父成字文開貴盛自梁冀以下皆與交言無不從京師諺曰事不諧詣文開三輔決錄曰馮豹字仲文後母遇之甚酷豹事之愈謹時人為之語曰道德彬彬馮仲文又曰五門子孫凡民之伍門今在河南西四十里澗穀洛三水之交傳聞馬氏兄弟五人共居此地作五門客舍因以為名主養豬賣豚故民為之語曰苑中三公館下二卿五門嚾嚾但聞豚聲又曰賈彪兄弟三人並有高名彪最優故天下稱曰賈氏三虎偉節最怒又曰游殷字幼齊為胡軫所害月餘軫得病但言伏伏游幼齊將鬼來於是遽死關中諺曰生有知, SBCK: 腋衆}
