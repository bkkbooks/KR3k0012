  - {type: variant, offset: 36, length: 1, content: 走, WYG: 旟曰以顧榮為主簿所以甄拔才望委以事機不復計南北親疏欲平海内之心也今府大事殷非酒客之政旟曰榮江南望士且居職日淺不宜輕代易之熊曰可轉為中書侍郎榮不失清顯而府更收實才旟然之白冏以為中書侍郎在職不復飲酒人或問之曰何前醉而後醒耶榮懼乃復更飲晉中興書曰畢卓字茂世為吏部郎比舍郎釀熟卓因醉夜至其甕間取酒飲之掌酒者縳卓郎往視之釋縳宴於甕側取醉而去又曰周顗代戴淵為䕶軍尚書紀瞻置酒請顗及王導等二十人顗荒醉失儀復為有司所奏檀道鸞晉書曰桓𤣥詣㑹稽王道子道子已醉對𤣥張目矚四座云桓溫作賊𤣥見已醉勢難測伏地流汗宋書曰荆州刺史王忱范太外弟也忱嗜酒醉輒累旬及醒則儼然端肅太謂忱曰酒雖㑹性亦所以傷}
