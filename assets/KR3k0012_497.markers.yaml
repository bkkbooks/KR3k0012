  - {type: variant, offset: 2226, length: 811, content: 也其何不知上其手曰夫子為王子圍寡君之貴介弟也下其手曰此子為穿封戍方城外之縣尹也誰獲子上下手以道囚意囚曰頡遇王子弱焉弱敗也言為王子所得戍怒抽戈逐王子圍史記曰蘭相如功大拜為上卿位在廉頗右頗曰我為趙將有攻城野戰之功相如徒以口舌為勞位居我上吾不忍為之下必辱之相如聞之不肯與會每朝常稱病不欲與頗爭列於是舍人請辭去相如曰強秦不敢加兵於趙者徒以吾兩人在也今兩虎共鬭勢不俱生所以先國家之急而後私讎也又曰彭越字仲常漁鉅野中為群盜陳勝項梁起少年或謂越曰豪傑相立叛秦仲可效之越曰兩龍方鬭且待之又曰婁敬說上曰天與人鬭不搤其亢張晏曰亢嚨喉拊其背未能全其勝也今陛下入關而都案秦之故此亦搤天下亢而拊其背也又曰孔子去陳過蒲會公叔氏以蒲叛蒲人止孔子弟子公良孺者有勇力謂曰昔從夫子遇難於匡今遇難於此命也吾寧鬭而死鬭甚疾蒲人懼謂曰無適衛吾出子也漢書曰項羽謂漢王曰天下匈匈以吾兩人願與王挑戰決雌雄漢王笑曰吾寧鬭智不能鬭力也又曰大將軍霍光秉政諸霍在平陽奴客持刀兵入市吏不能禁及尹翁歸為市吏莫敢犯者又曰邴吉常出逢群鬭者死傷橫道吉過之不問掾史獨怪之吉曰民鬭相殺傷長安令京兆尹職所當禁也宰相不親小事又曰原涉遣奴至市買肉奴乘涉氣與屠者爭言斫傷屠者又漢書張耳贊曰張耳陳餘世所稱賢始居約時相然信死豈顧問哉及據國爭權卒相滅亡勢利之交古人羞之續漢書曰孝靈皇帝於後宮人為列肆販賣使相偷盜爭鬭上臨視之以為樂東觀漢記曰執金吾賈復在汝南部將殺人頴川捕得寇恂乃戮之於市復以為恥過頴川謂左右曰吾今見恂必手劍之恂知其謀不欲與相見恂曰昔蘭相如屈於廉頗者為國也乃勑屬縣盛供具一人皆兼二人之饌恂乃出迎於道稱疾還賈復勒兵欲追之而吏士皆醉遂過去恂以狀聞上乃徵恂恂至引見時復先在座欲起相避上曰天下未定兩虎安得私鬭又曰周黨字伯況太原人鄉佐發黨傜道於人中辱之黨學春秋長安聞復讎之義輟講下辭歸到與鄉佐相聞期鬭日卿佐多從兵往使卿佐先拔刀然後與相擊鄉佐服其義勇袁山松後漢書曰劉盆子居長樂宮赤眉諸將日會論功名自言欲為某, WYG: 反}
