  - {type: variant, offset: 3740, length: 0, content: '', SBCK: 秦繆公之時西戎強大繆公遺女樂戎王大喜以其故數飲食日夜不休左右有言秦㓂之至因按弓而射之秦㓂果至戎王醉而卧於樽下卒生縛而擒之愽物志曰人中酒醉不解浴之以湯自漬則愈湯亦作酒氣味又曰昔有人名玄石從中山酒家酤酒酒家與之千日酒不語其節度至家而醉家以爲死而葬之酒家計滿千日乃憶之往索玄石􅀇石家云亡來三年服巳闋矣乃至家掘而問之􅀇石起於棺中􅀃苑曰}
  - {type: variant, offset: 3740, length: 0, content: '', krp: 秦繆公之時西戎強大繆公遺女樂戎王大喜以其故數飲食日夜不休左右有言秦㓂之至因按弓而射之秦㓂果至戎王醉而卧於樽下卒生縛而擒之愽物志曰人中酒醉不解浴之以湯自漬則愈湯亦作酒氣味又曰昔有人名玄石從中山酒家酤酒酒家與之千日酒不語其節度至家而醉家以爲死而葬之酒家計滿千日乃憶之往索玄石玄石家云亡來三年服巳闋矣乃至家掘而問之玄石起於棺中說苑曰}
  - {type: variant, offset: 3741, length: 0, content: '', SBCK: 莊王賜群臣酒日暮燭滅有引美人衣者美人援絶其冠纓告王王曰賜人酒使醉失禮柰何欲顯婦人}
  - {type: page-break, offset: 3741, content: '', id: KR3k0012_SBCK_497-7a}
  - {type: variant, offset: 3741, length: 0, content: '', krp: 莊王賜群臣酒日暮燭滅有引美人衣者美人援絶其冠纓告王王曰賜人酒使醉失禮柰何欲顯婦人}
  - {type: variant, offset: 3742, length: 0, content: '', SBCK: 節而辱士乎乃命左右曰與寡人飲不絶冠纓者不歡群臣皆絶其冠纓乃止丗􅀃曰周伯仁有德量深逹危亂過江積年恒大飲酒甞經三日醒時人謂三日僕射又曰張華旣貴有少時知識來候之華屏官事與共飲九醖酒爲酣暢其夜醉眠張華甞飲此酒醉眠輙使左右轉側至覺左右依常爲張公轉側其友無轉側者至明起友人猶不寤張公曰咄此必死矣使就視之酒果穿腹流牀下滂沱又曰山公曰􅄞叔夜之爲人也巖然􅀂􅀌松之獨立及其醉也嵬峩􅀂玉山之將頽又曰杜預爲荆州刺史鎮襄陽時有讌集大醉閉齋獨眠或見一大虵垂頭牀}
  - {type: page-break, offset: 3742, content: '', id: KR3k0012_SBCK_497-7b}
  - {type: variant, offset: 3742, length: 0, content: '', krp: 節而辱士乎乃命左右曰與寡人飲不絶冠纓者不歡群臣皆絶其冠纓乃止丗說曰周伯仁有德量深逹危亂過江積年恒大飲酒甞經三日醒時人謂三日僕射又曰張華旣貴有少時知識來候之華屏官事與共飲九醖酒爲酣暢其夜醉眠張華甞飲此酒醉眠輙使左右轉側至覺左右依常爲張公轉側其友無轉側者至明起友人猶不寤張公曰咄此必死矣使就視之酒果穿腹流牀下滂沱又曰山公曰嵇叔夜之爲人也巖然若孤松之獨立及其醉也嵬峩若玉山之將頽又曰杜預爲荆州刺史鎮襄陽時有讌集大醉閉齋獨眠或見一大虵垂頭牀}
  - {type: variant, offset: 3743, length: 1, content: 邑, SBCK: 吐語林曰周伯仁過江􅁪醉止有姉䘮三日醒姑喪三日醒也又曰周伯仁在中朝能飲一斛酒過江雖日醉然未甞飲一斛以無其對也後有舊對忽從北來相得欣然乃岀二斛酒共飲之旣醉伯仁得眠眠覺問共飲者何在曰西廂問得轉不荅不得轉伯仁曰異事使視之脅腐而死十洲記曰瀛州者玉膏如酒味}
  - {type: variant, offset: 3743, length: 1, content: 邑, krp: 吐語林曰周伯仁過江恒醉止有姉䘮三日醒姑喪三日醒也又曰周伯仁在中朝能飲一斛酒過江雖日醉然未甞飲一斛以無其對也後有舊對忽從北來相得欣然乃岀二斛酒共飲之旣醉伯仁得眠眠覺問共飲者何在曰西廂問得轉不荅不得轉伯仁曰異事使視之脅腐而死十洲記曰瀛州者玉膏如酒味}
  - {type: variant, offset: 3746, length: 1, content: 卑, SBCK: 玉酒飲數升輙醉令人長生俗記曰宋禕死後葬在金城南山對琅琊郡門􅀽崧爲琅琊太守每醉輙乗輿上宋禕冢作行路難歌列子曰子産相鄭有兄曰公孫朝好酒朝之室聚酒千鍾積麹成封糟糠之氣逆於人鼻方其荒醉不知丗道之安危魯連子曰楚王成章華臺酌諸侯酒魯君先至恱之故醉與之大曲之弓不琢之璧已而悔之魯君懼乃歸之莊子曰醉者之墜車也希死形體與人同其悟物與人異則其神者全也尸子曰赤縣洲者寔爲崑崙之墟其東則滷水島山左右蓬萊玉紅之草生焉食其一實醉卧三百歳而寤韓子曰楚共王與晉厲公戰於鄢陵楚師敗績共王傷目司馬子反渴而求飲􅂖陽樹操觴而進子反王欲復戰召子反議子反醉乃辭以疾王入其幕酒臭旋師而斬韓子曰紹緇昧醉而忘其裘}
