  - {type: variant, offset: 1433, length: 120, content: 蔣子萬機論曰學者如牛毛成者如鱗角又曰猛虎不處卑勢勁鷹不立垂枝抱朴子曰桓靈曰舉秀才不知書察孝廉父別居寒素清白濁如泥高第良將怯如蠅又曰古人欲達勤誦經今世圖官勉治生商君書曰公孫鞅謂秦孝公曰臣聞之疑行無名疑事無功君亟定變法之慮殆猶天下之議語曰愚者暗, WYG: 戰}
