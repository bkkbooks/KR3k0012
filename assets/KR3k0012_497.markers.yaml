  - {type: variant, offset: 7, length: 2, content: 七諺, krp: 八酣醉說文曰酣樂酒也又曰酒卒曰醉各卒其度量不至於亂也一曰瀆也易未濟曰有孚于飲酒無咎濡其首有孚失是飲酒有思信而無保言尤濡其首有孚失是况酒無節至濡首雖有飲酒之信失是不醉之節明飲酒不節濡首不可不戒也象曰飲酒濡首亦不知節也毛詩曰旣醉告太平也旣醉以酒旣飽以德又曰幽王荒廢䙝近小人飲酒無度沉湎淫泆是曰旣醉不知其尤醉而旣出並受其福醉而不出是謂伐德左傳曰重耳及齊齊桓公妻之公子安之姜曰行也公子不可姜與子犯醉而遣之醒以戈逐子犯史記曰范睢事魏中大夫湏賈使齊睢從齊襄王聞睢辨乃使人賜睢牛酒湏賈以爲睢持軍事告齊故得此饋還以告魏相魏齊大怒使舎人笞睢折脅拉齒睢佯死旣卷簀置厠中賔客飲酒醉更溺睢睢從簀中謂守者曰旣岀我我厚謝公守者乃請棄簀中死人齊醉曰可矣又曰齊威王置酒後宫召淳于髠賜酒問曰先生能飲幾許而醉髠曰飲一斗亦醉飲一石亦醉王曰先生飲一斗而醉廼能飲一石哉髠曰賜酒大王之前執法在傍御史在後髠恐懼俯伏而飲一斗徑醉若州閭之㑹男女雜坐前有墮珥後有遺簮髠竊樂此飲可八斗堂上燭㓕主人留髠而出送客羅𥜗衿解微聞香澤當此之時髠心最欣能飲一石又曰曹參爲漢相國無所變更一遵蕭何日飲淳酒卿大夫以}
