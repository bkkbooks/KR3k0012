  - {type: 'tls:seg', offset: 25, content: '', id: KR3k0012_CHANT_497-1a.6}
  - {type: variant, offset: 25, length: 1, content: 宣, SBCK: 送客羅􅃭衿解微聞香澤當此之時髠心最欣能飲一石又曰曹參爲漢相國無所變更一遵蕭何日飲淳酒卿大夫以下皆欲言來者參輙飲酒醉而後去終莫得開􅀃又曰景帝召程􅁎􅁎有所避而飾侍者唐兒使夜進上醉不知以爲程姬而幸之遂有娠及生子命曰發爲長沙}
  - {type: page-break, offset: 25, content: '', id: KR3k0012_SBCK_497-2a}
  - {type: variant, offset: 25, length: 1, content: 宣, WYG: 以蝢之請還酒亦小解蕃性有威嚴行止自若皓大怒呵左右於殿下斬之魏典略曰董卓雖親愛吕布然時醉酒則罵之以刀劒擊之不中布恐終被害乃先畜死士以㦸刺卓卓曰布何在布曰有詔遂殺之又曰時苗字得胄出為壽春令揚州治在其縣時蔣濟為治中苗以初至往欲謁濟濟素嗜酒適㑹其醉不能見恚恨還刻木為人署曰酒徒蔣濟豎之於牆下旦夕射之又曰丁沖為司𨽻校尉後數歲過諸將飲酒美不能止醉爛腸死也晉書曰羊曇者太山人知名士也少為謝安所愛重安薨後輟樂彌年行不由西州門嘗由石頭大醉扶路唱樂不覺至州門也左右白曰此西州門曇悲感不已以䇿扣扉誦曹子建詩曰生存華屋處零落歸山丘因慟哭而去又}
