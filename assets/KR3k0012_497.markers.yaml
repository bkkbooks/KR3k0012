  - {type: variant, offset: 7, length: 7, content: 七諺下漢晉春秋, SBCK: 八酣醉􅀃文}
  - {type: variant, offset: 7, length: 2, content: 七諺, WYG: 八酣醉説文曰酣樂酒也又曰酒卒曰醉各卒其度量不至於亂也一曰瀆也又易曰有孚於飲酒無咎濡其首有孚失是飲酒有思信而無保言猶濡其首有孚失是况酒無節至濡首雖有飲酒之信且失不醉之節明飲酒有節濡首不可不戒也象曰飲酒濡首亦不知節也毛詩曰既醉言太平也既醉以酒既飽以德又曰幽王荒廢䙝近小人飲酒無度沉湎淫泆是曰既醉不知其郵既醉而出並受其福醉而不出是謂伐德左傳曰重耳及齊齊桓公妻之公子安之姜曰行也公子不可姜與子犯醉而遣之醒以戈逐子犯史記曰范雎事魏中大夫須賈使齊雎從齊襄王聞雎辯乃使人賜雎牛酒須賈以為雎持國事告齊故得此饋還以告魏齊齊大怒使舍人笞雎拆脅摺齒雎佯死即裹以簀置厠中賔客飲酒醉更溺雎雎從簀中謂守者曰能出我我厚謝公守者乃請棄簀中死人齊醉曰可矣又曰齊威王置酒後宫召淳于髠賜問曰先生能飲幾許而醉髠曰飲一斗亦醉飲一石亦醉王曰先生飲一斗而醉迺能飲一石哉髠曰賜酒大王之前執法在傍御史在後髠恐懼俯伏而飲一斗徑醉若州閭之㑹男女雜坐前有墮珥後有遺簪髠竊樂此飲可八斗堂上燭滅主又留髠而出送客羅襦衿解微聞薌澤當此之時髠心最欣能飲一石又曰曹參為漢相國無所變更一遵蕭何日飲醇酒卿大夫以}
