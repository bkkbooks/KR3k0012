  - {type: variant, offset: 27, length: 0, content: '', SBCK: 漢書曰漢髙祖爲泗上亭長亭中吏無所}
  - {type: variant, offset: 27, length: 2, content: 不逼, WYG: 㳟𫝊曰㑹稽王道子置酒於東府尚書令謝石因醉為委巷之歌恭正色曰居端右之重集藩王之第而肆淫聲欲令羣下何所取則石深銜之又曰王蘊素嗜酒末年尤甚及在㑹稽略少醒日然猶以和簡為}
  - {type: page-break, offset: 27, content: '', id: KR3k0012_WYG_497-7b, image: WYG0897/WYG0897-0484d.png}
  - {type: variant, offset: 27, length: 2, content: 不逼, krp: 恭傳㑹稽王道子置酒於東府尚書令謝石因醉爲委巷之歌恭正色曰居端右之重集藩王之第而肆淫聲欲令群下何所取則石深衘之又曰王藴素嗜酒末年尤甚及在㑹稽略少醒日然猶以和簡爲}
  - {type: variant, offset: 28, length: 1, content: 逼, SBCK: 狎侮好酒及色常從王媪武􅀒貰飲酒醉卧武􅀒王媪見其上常有怪此兩家常折劵棄債又曰髙祖􅀍酒夜經澤中令一人前前者還報曰前有大虵當徑髙祖醉曰壯士何畏乃前拔劒斬虵分爲兩道開行數里醉因卧又曰萬石君徙居陵里内史慶醉歸入外門不下車萬石君聞之不食慶恐肉袒請罪不許舉宗及兄建肉􅃝萬石君讓曰内史貴人入閭里中長老皆走匿而内史坐車中如故乃謝罷慶慶及諸子入里門趍至家又曰衛青伐匈奴右賢王當青等以爲漢兵不能至飲醉漢兵夜至圍右賢王驚而夜逃又曰李廣當斬贖爲庻人與故潁陰侯屏居藍田南山射獵甞夜從一􅀐岀從人田間飲還至亭㶚陵尉醉呵止廣廣􅀐曰故李將軍尉曰今將軍尚不得夜行何故也􅀫廣亭下又曰陳遵爲京兆尹􅄝酒每大飲賔客滿堂輙閉門取車轄投井中雖有急終不得去有部刺史奏事過遵值其方飲刺史􅀱遵􅀫醉時突入見遵母乃叩頭白當對尚書有期㑹乃令從後閤岀去遵雖常醉然事亦不廢又曰邴吉始於官屬椽史務掩過揚善吉馭吏􅄝酒數逋蕩甞從吉出醉嘔丞相車下茵西曹主吏白欲斥之吉以醉飽之失去士使此人將復何所容西曹忍之此不過汙丞相車茵耳遂不去也東觀漢記曰更始納趙萌女爲夫人有寵遂委政於萌日夜與婦人飲讌後庭群臣欲遂言事輙醉不能見乃令侍中坐帳内與語諸將識非更始聲出皆怨謝承後漢書曰劉寛爲太尉甞朝見寛􅀍酒沉醉伏地睡詔問太尉醉耶寛仰對曰臣不敢醉但任重責大憂心如醉魏志曰徐邈字景山魏國􅀄建爲尚書郎時科禁酒而邈私飲沉醉校事趙逹問以曹事邈曰中聖人逹白太祖甚怒渡遼將軍鮮于輔平曰醉客謂清酒爲聖人濁酒爲賢者邈性脩慎偶醉言耳後文帝踐祚問邈曰頗復中聖人不對曰􅀫瘤以醜見知微臣以醉見識帝大􅀏顧左右曰名不虚也又曰曹仁爲􅀜羽所圍太祖以曹植行征虜將軍欲令救仁植醉不能受命於是罷之蜀志曰蔣琬字公琰除廣都長先主甞因遊觀奄至廣都衆事不理時又沉醉先主大怒將加罪戮諸􅁑亮請曰蔣琬社稷之器非百里之才也願主父重加察之乃不加罪吴志曰孫權爲吴王遊宴之後起自行酒虞飜伏地陽醉不持權去飜起坐權於是大怒欲手擊之大司農劉基起抱權諫曰大王以三爵後殺善士雖飜有罪天下孰知之權曰曹孟德尚殺孔文舉􅀌於虞飜何有哉基曰孟德輕害名士天下非之今大王躬行仁德欲與堯舜比隆由是得免權因勑左右自今酒後言殺皆悉不得殺也又曰孫皓大㑹群臣王蕃沉醉頓伏皓疑而不恱蕃轝出以頃之請還酒亦小解蕃性有威嚴行止自􅀂皓大怒呵左右於殿下斬之魏典略曰董卓雖親愛吕布然時醉酒則罵之以刀劒擊之不中布恐終􅀍害乃先畜死士以㦸刺卓卓曰布何在布曰有詔遂殺之又曰時苗字德胄出爲壽春令楊州治在其縣時蔣濟爲治中苗以􅀄至往欲謁濟濟素􅄝酒適㑹其醉不能見恚恨還刻木爲人署曰酒徒蔣濟竪之於牆下旦夕射之又曰丁冲爲司􅀠校尉後數歳過諸將飲酒美不能止醉爛膓死也晉書曰羊曇者太山人知名士也少爲謝安所愛重安薨後輟樂弥年行不由西路州甞因石頭大醉扶路唱樂不􅁴至州門也左右白曰此西州門曇悲感不巳以馬䇿扣扉誦曹子詩曰生存華屋處零落歸山丘因慟哭而去又曰王恭傳㑹稽王道子置酒於東府尚書令謝石因醉爲委巷之歌恭正色曰居端右之重集藩王之第而肆􅁋聲欲令群下何所取則石深衘之又曰王藴素􅄝酒末年尤甚及在㑹稽略少醒日然猶以和簡爲}
