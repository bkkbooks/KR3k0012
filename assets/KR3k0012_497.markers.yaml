  - {type: variant, offset: 18, length: 5, content: 卒楊儀整軍, WYG: 請曰蔣琬社稷之器非百里之才也願主公重加察之乃不加罪呉志曰孫權為呉王欣宴之末起自行酒虞翻伏地偽醉不持權去翻起坐權於是大怒欲手擊之大司農劉基起抱權諫曰大王以三爵後殺善士雖翻有罪天下孰知之權曰曹孟德尚殺孔文舉孤於虞翻何有哉基曰孟德輕害名士天下非之今大王躬行仁德欲與堯舜比隆由是得免權因勅左右自今酒後言殺皆悉不得殺又曰孫皓大㑹羣臣王蕃沉醉蝢伏皓疑}
