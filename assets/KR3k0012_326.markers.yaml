  - {type: variant, offset: 1306, length: 0, content: '', WYG: 千降李愬愬從秀琳於新興柵遂以琳之衆攻吳房夏四月庚寅朔辛夘李愬奏師至嵖岈谷擒賊將栁世千李奏等二人李光顔敗元濟之衆三萬於偃城其將張伯良奔於蔡州殺其卒十二三獲馬千餘疋噐甲三萬其甲上悉畫作雷公符北斗星文又云速破城北軍急急如律令周史曰皇甫暉正陽敗入保滁州太祖皇帝麾兵渉水踰城入盡戮其黨生擒暉及其偽命都監姚鳯等送於行在世宗召見之暉曰臣力竭矣欲暫坐及坐又曰臣欲暫卧不俟命而卧神色自若世宗亦復容之乃言曰臣非不盡忠於本國實以甲兵勇怯不敵臣早事晋朝屢將兵與契丹相持未如天朝此日甲馬之盛昨者退守滁州不謂天兵便能踰城攻取如履平地臣力所不加故就擒耳因盛稱太祖之武勇世宗命釋之賜衣服帶鞍馬後數日暉以金瘡尋卒於洛陽暉本驍將唐莊宗之基業因暉而敗焉故暉著名於天下虜掠左傳曰鄭祭足帥師取温之麥秋又取成周之禾後漢書曰馮異謂苗萌曰今諸將皆壯士崛起多暴横獨有劉將軍所到不虜掠其言語舉止非庸人也可以歸身苗萌曰死生同命敬從於計又曰郅惲至廬江因遇積弩將軍傅俊東徇揚州俊素聞惲名乃禮請上之上為將兵長史授以軍政惲乃誓衆曰無掩人不備窮人於厄不得斷人肢體裸人形骸淫於婦女俊軍士猶發塜陳尸掠奪百姓惲諫俊曰昔文王不忍露白骨武王不以天下易一人之命吕氏春秋曰武王伐紂至鮪水紂使膠鬲候周問武王曰何日至武王曰將以甲子日至膠鬲行天大雨日夜不休武王疾行不輟吏諫之武王曰吾之疾行以救膠鬲之死也故能獲天地之應克商如林之旅天地之應謂夜雨上畢陳白魚入舟之類克勝也商殷號也旅衆也如林言衆多尚書曰武王伐紂紂率其旅若林㑹于牧野將軍如何不師法文王而犯逆天地之禁多傷人害物虐及枯骨取罪神明今不謝天改政無以全命願將軍親率士卒収傷葬死哭所殘暴以明非將軍本意也從之百姓恱服所向皆下晉書曰宫人孟玖弟超並為成都王頴所嬖寵超領萬人為小都督未戰縱兵大掠陸機戮其主者超將鐵騎百餘人直入機麾下奪之顧謂機曰貉奴能作督不機司馬孫極勸機殺之機不能用超宣言於衆曰陸機將反又曰惠帝末妖賊劉栢根起於東萊王彌率家僮從之栢根死亡入長廣山為群盗彌多權略凡有所掠必預圖成敗舉無遺䇿弓馬迅㨗膂力過人時號為飛將軍}
