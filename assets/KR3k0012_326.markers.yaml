  - {type: variant, offset: 1418, length: 1, content: 墉, krp: 對戰始合寂弃軍而走兵遂大潰寳誼復爲賊所擒髙祖𥘉聞其没也泣曰寳誼烈士必不生降賜其家物千叚米三百石寳誼後謀背賊事洩遇害臨死西向大言曰臣無狀負陛下𬒳屠潰是所甘心但敗軍䘮師九泉所恨及賊退髙祖遣使迎其柩謚曰剛又曰恒州節度李寳臣使人謂朱滔曰吾聞未公皃如神安得而識}
  - {type: variant, offset: 1420, length: 0, content: '', SBCK: 願因繢事以觀可乎滔乃圖其形以示之錦衣金鈎甚偉寳臣懸於射堂命諸將熟視之曰朱公信神人也他日滔出獵寳臣宻選精卒劫之戒其將曰取彼貌如射堂所懸者是時二軍方共事不相虞而卒變􅁀至滔駭然與戰於瓦橋適衣他服以不識免又曰蔡州賊將呉秀琳以文城柵兵三千降李愬愬從秀琳於新興柵遂以琳之衆攻呉房夏四月庚寅朔辛夘李愬奏師至嵖岈山擒賊將柳丗于李湊等二人李光顔敗元濟之衆三萬於郾城其將張伯良奔于蔡州殺其卒十二三􅀗馬千餘疋器甲三萬其甲上悉􅀞作雷公符北斗星文又云速破城北軍急急如律令周史曰皇甫暉正陽敗入保滁州太祖皇帝麾兵渉水踰城而入盡戮其黨生擒暉及其僞命都監姚鳯等送于行在丗宗召見之暉曰臣力備矣欲暫坐及坐又曰臣欲暫卧不俟命而卧神色自􅀂丗宗亦復容之乃言曰臣非不盡忠於本國實以甲兵勇怯不敵臣早事晉朝累將兵與契丹相持未如大朝此日甲馬之盛昨者退守滁州不謂天兵便能踰城攻取如履平地臣力所不加故就擒耳因盛稱太祖之武勇丗宗命釋之賜衣服帶鞍馬後數日暉以金瘡㝷卒于洛陽暉本驍將唐莊宗之基業因暉而敗焉故暉有名於天}
