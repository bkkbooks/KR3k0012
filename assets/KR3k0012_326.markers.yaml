  - {type: variant, offset: 28, length: 30, content: 東門襄仲臧文如楚乞師襄仲居東門故以為氏臧文為襄仲副使故不書又, SBCK: 天賛我也躬先士卒掃壁而出遲明覆之生擒伊餘悉俘其衆二石僞事}
  - {type: variant, offset: 28, length: 1, content: 東, WYG: 北齊平任城王湝音諧據冀州與廣寧王孝珩召募得四萬餘人以拒我軍齊王憲率衆討之仍請太上皇手書與湝曰朝廷遇緯甚厚諸王無恙叔若釋甲則無所憂湝不納及大開賞募多出金帛沙}
  - {type: page-break, offset: 28, content: '', id: KR3k0012_WYG_326-2b, image: WYG0895/WYG0895-0796b.png}
  - {type: variant, offset: 28, length: 30, content: 東門襄仲臧文如楚乞師襄仲居東門故以為氏臧文為襄仲副使故不書又, krp: 天賛我也躬先士卒掃壁而出遲明覆之生擒伊餘悉俘其衆二石僞事}
  - {type: variant, offset: 30, length: 5, content: 襄仲臧文如, WYG: 求為戰者亦數千人候騎執湝間謀二人以白于憲乃集齊之舊將遍示之曰吾所争者大不在汝等今放還可即充我使乃與湝書曰一木不維大厦三諫可以逃身㣲子去商侯服周代項伯背}
  - {type: punctuation, offset: 32, content: 、, id: KR3k0012_CHANT_326-bkkpn12}
  - {type: variant, offset: 36, length: 6, content: 乞師襄仲居東, WYG: 賜姓漢朝兵交命使古今通典不俟終日所望知幾湝得書沉之於井憲至信都湝陣於城南憲登張耳冡以望之俄而湝領軍尉相顧遂以衆降湝大怒殺其妻子明日復戰憲遂破之俘斬三萬人湝被擒見憲不拜呼之為弟北史曰後魏元遥遷左光禄大夫仍領䕶軍時冀州沙}
  - {type: page-break, offset: 36, content: '', id: KR3k0012_WYG_326-3a, image: WYG0895/WYG0895-0796c.png}
