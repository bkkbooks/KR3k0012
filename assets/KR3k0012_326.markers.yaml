  - {type: variant, offset: 2721, length: 317, content: 是日非光顏救度幾陷又曰辛讜性慷慨重然諾專務賑人之急年五十不求茍進有濟時匡難之志咸通十年龐勛亂徐泗時杜慆守泗州賊以郡當江淮要害極力攻之時兩淮郡縣皆陷獨慆守臨淮久之援軍雖集賊未解圍時讜寓居廣陵乃仗劍挐小艇趍泗口貫賊柵入城見慆慆素聞有義而不相面喜讜至握手謝曰判官李延樞方話子為人何遽至耶吾無憂矣時賊三面攻城王師結壘于洪源驛相顧不前讜夜以小舟穿賊壘至洪源驛見監軍郭厚本論泗州危急且宜速救厚本然之淮南都將王公弁謂厚本曰賊軍眾我寡無宜輕舉當俟可行讜坐中拔劍瞋目謂公弁曰賊百道攻城陷在旦夕公等奉詔赴援而逗留不進心欲何為不唯有負國恩丈夫氣義亦宜感發假如臨淮陷賊淮南即是寇場公何獨存耶即欲揮刃向公弁厚本持之讜望泗州大哭者經日帳下為之流涕厚本義其心選甲士, SBCK: 太平御覽卷第}
