  - {type: variant, offset: 546, length: 546, content: 將軍將軍若欲有為起乘其弊可也救援春秋後齊語曰秦攻趙長平齊楚救之趙人無食請粟於齊齊欲勿與周子曰不如與之以退秦兵不與則秦兵不却是秦之計中而齊楚之計過也且趙之於齊楚捍蔽也猶齒之於脣脣亡則齒寒今日亡趙明日患及齊楚是故趙之務宜若奉漏甕沃燋釜也夫救趙高義也却秦兵顯名也義救亡國威却強秦之兵不務為此而務愛粟為國計者過矣齊王不聽秦破趙於長平遂圍邯鄲焉又韓語曰襄王十二年楚圍雍氏韓令使者求救於秦冠盖相望秦師不出使靳尚如秦謂秦王曰韓之於秦居為隱蔽出為鴈行令韓病矣秦師不出脣亡齒寒願大王計之也史記曰趙平原君使者冠盖相屬讓信陵君以請救曰勝所結為婚姻者以公子高義今縱輕勝獨不憐公子之姉耶公子說王不可乃將車騎欲與趙俱死行過夷門見侯嬴坐而去公子曰侯生無一言半辭送我哉乃復見之生曰知公子之必來乃謂曰嬴聞晉鄙之兵符常在王臥內而如姬最幸可為如姬復父之讎求其虎符奪晉鄙軍此五霸之伐也然恐鄙有所疑臣客朱亥可與俱行至軍亥以四十斤鐵椎殺晉鄙引兵救趙却秦軍趙王再拜曰自古賢人未有及公子公子懼不歸趙以五城封之魏志曰太祖征張繡荀攸言於太祖曰繡與劉表相恃為強然繡以遠軍仰食於表不能供勢必離不如緩軍以待之若急之其勢必相救太祖不從遂進軍至襄繡戰急表果救之軍不利太祖謂攸曰不用君言至是矣魏略曰臧洪太祖為族弟興平末太祖嘗與洪出為寇劫失馬追者在後洪下馬與, WYG: ''}
