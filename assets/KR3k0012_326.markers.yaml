  - {type: variant, offset: 1540, length: 387, content: 伯之防甚固永去二千餘里牽舡上汝南岸以水牛挽之直南趣淮下舡便渡適上岸賊軍追及會時已夜永乃潛進時曉逵壽春城下勰衍聞外有軍共上門樓觀望然不意永至永免冑乃信之遂引永上勰謂永曰北望以久恐洛陽難復再見不意卿能至也勰令永引軍入城永曰埶兵被甲固敵是求若如教旨便共殿下同被圍守豈是救援之意遂孤軍城外與勰并勢以擊伯之頻有克捷又曰辛淵私署涼王李暠騎將軍暠子欽亦厚遇之欽與沮渠蒙遊戰於蓼泉軍敗失馬淵以所乘馬授欽而身死於難以義烈見稱西土又曰裴駿蓋吳作亂於闕中汾陰人薛永宗聚眾應之殘破諸縣來襲聞憙縣中先無兵杖人情駭動縣令憂惶計無所出駿在家聞之便率厲鄉豪曰在禮君父危臣子致命府君今為賊所逼是吾等徇節之秋諸君可不免乎諸豪皆奮激請行駿乃簡騎驍勇數百人奔赴賊聞救至引兵退走刺史嘉之以狀表聞會世祖親討盖吳引見駿駿陳敘事宜甚會機理世祖大悅顧謂崔浩曰裴駿有當世才是且忠義可嘉補中書愽士浩亦深器駿目為三河領袖轉中書侍郎, WYG: ''}
  - {type: variant, offset: 1544, length: 148, content: 固永去二千餘里牽舡上汝南岸以水牛挽之直南趣淮下舡便渡適上岸賊軍追及會時已夜永乃潛進時曉逵壽春城下勰衍聞外有軍共上門樓觀望然不意永至永免冑乃信之遂引永上勰謂永曰北望以久恐洛陽難復再見不意卿能至也勰令永引軍入城永曰埶兵被甲固敵是求若如教旨便共殿下同被圍守豈是救援之意遂孤軍城外與勰并勢以擊伯之頻有克捷, SBCK: 多}
