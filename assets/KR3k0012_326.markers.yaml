  - {type: page-break, offset: 1694, content: '', id: KR3k0012_SBCK_326-7b}
  - {type: variant, offset: 1694, length: 8, content: 辛淵私署涼王李暠, krp: 天水梁㑹守東城謀欲逃遁先是封勑文掘重塹於東城之外斷賊走路夜中㑹乃陣飛梯騰塹而走勑文先嚴兵於塹外拒鬪從夜至旦勑文謀於衆曰困獸猶鬪而況於人賊衆知無生路人自致死必傷士衆未易可平若開其生路賊必上下離心尅之易矣衆咸以爲然勑文以白虎幡宣告賊衆曰若能歸降原其生命應時降者六百餘人㑹知人心沮壞於是分遁勑文縱}
