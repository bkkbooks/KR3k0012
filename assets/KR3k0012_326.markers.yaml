  - {type: variant, offset: 1379, length: 2, content: 第四, SBCK: 寛舉止詳於占對文襄甚賞異之謂寛司卿三河冠盖材識如此我必使卿富貴􅀜中貧狹何足可依勿懷異圖也因解鎻付館厚加其禮寛乃裁所卧氊夜縱縋而出因得遁還見於太祖太祖頋謂諸公曰􅀍堅執銳或有其人疾風勁草歳寒方驗裴寛爲髙澄如此厚遇乃能冒死歸我雖古之竹帛所載何以加之又曰太祖時梁元帝遣使請舊圖以定疆界又連結於齊言辭悖慢太祖曰古人有言天之所弃誰能興之其蕭繹之謂乎冬十月壬戍遣柱國于謹中山公護大將軍楊忠韋孝寛等歩􅀐五萬討之十一月癸未師濟於漢中公護與楊忠率銳􅀐先屯其城下據江津以備其逸甲申謹至江陵列營圍守辛亥進攻城其日克之擒梁元帝殺之并虜其百官及士民以歸没爲奴婢者十餘萬其免者二百餘􅃁立蕭􅊫爲梁主居江陵爲魏附庸又曰侯莫陳崇隨賀拔岳征討以功除建威將軍從岳入􅀜破萬俟醜奴崇與輕􅀐逐北至涇長坈及之賊未成列崇單􅀐入賊中於馬上生擒醜奴於是大呼衆悉披靡莫敢當之後􅀐集遂破之岳以醜奴所乗馬及寳劒金帶賞之又曰李廣㑹稽人早事􅊫以敢勇聞汑口之役先􅊫力戰及華皎軍敗爲呉明徹所擒將降之廣辭色不屈遂􅀍害又曰柳檜除魏興華陽二郡守安康人黄衆寳謀反連結黨與將圍州城乃相謂曰常聞柳君勇悍其鋒不可當今旣在外方爲吾徒膓心之病也不如先擊之遂圍檜郡郡城卑下士衆寡弱人無守御之備連戰積十餘日士卒僅有存者於是力屈城䧟身􅀍十數瘡遂爲賊所獲旣而衆寳等進圍東梁州乃􅅞檜置城下欲令誘􅀃城中檜乃大呼曰群賊烏合粮食巳罄行即退散各冝勉之衆寳大怒乃臨檜以兵曰速更汝辭不尓便就戮矣檜守節不變遂害之弃屍水中人皆爲之流涕隋書曰漢王諒之作亂也煬帝將發幽州兵以討之時竇杭爲幽州惣管帝恐其有貳心問可任者於楊素素進李}
