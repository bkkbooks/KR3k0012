  - {type: variant, offset: 3264, length: 215, content: 姪名謂慆曰志之得嗣為幸慆益感之賊平授讜泗州團練判官侍御史繁欽丘儁碑曰故右扶風都尉主簿有丘儁者從都尉討叛胡官兵敗績卒伍奔散都尉臨陣墜馬儁於是下馬援甲以身禦寇遂致死戰場都尉乘雋馬得免擒獲上左傳曰鄭將公子歸生伐宋戰于大棘宋師敗績宋將狂狡輅鄭人鄭人入於井輅迎也五駕切倒戟而出獲狂狡君子曰失禮違命宜其擒也戎昭果毅以聽之謂禮聽謂常在放身著於心想聞其政令殺敵為果致果為毅穀梁曰宋華元帥師及鄭公子歸生戰于大棘宋師敗績獲宋華元獲者不與之辭也史記曰漢, SBCK: 十}
