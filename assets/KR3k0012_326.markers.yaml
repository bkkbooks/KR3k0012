  - {type: variant, offset: 3480, length: 611, content: 年人有告楚王韓信反高帝以陳平計發使告諸侯會陳偽游雲夢實欲襲信信不知謁高祖於陳上令武士縛信載後車信曰狡兔死良狗烹天下已定我固當烹遂械繫信至洛陽赦信罪以為淮陰侯後漢書曰龜茲王攻破䟽勒殺其王而立龜茲人兜題為䟽勒王明年春班超從間道至䟽勒去兜題所居槃橐城九十里逆遣吏田慮光往降之勑慮曰兜題本非䟽勒種國人必不用命若不即降便可執之慮既至兜題見慮輕弱殊無降意慮因其無備遂前劫縛兜題左右出其不意皆警而立定慮馳報超超即赴之悉召䟽勒將吏說以龜茲無道之狀因立其故王兄子忠為王王兄子榆勒立之更名曰忠也國人大悅蜀志曰先主入益州還攻劉璋張飛等泝流而上分定郡縣破璋將巴郡嚴顏先獲顏飛呵顏曰大軍至何以不降而敢距戰顏曰卿等無狀侵奪我州我州有斷頭將軍無降將軍也飛怒令斫頭顏曰斫頭便斫何為怒耶飛壯而釋之引為賓客晉書載記曰慕容皝將乘海討慕容仁群下咸諫以海道危阻宜從陸路皝曰舊海水無凌自仁反已來凍合者三矣昔漢光武因滹沱之冰以濟大業天其或者欲吾乘此而剋之乎吾計決矣有沮謀者斬乃率三軍從昌黎踐凌而進仁不虞皝之至也軍去平郭七里候騎乃告仁狼狽出戰為皝所擒殺仁而還又曰王凌遣督護王昌等率疾陸眷及第文鴦從弟末杯攻石勒於襄國勒敗還壘末杯追入壘門為勒所獲勒質末杯遺使求和於疾陸眷疾陸眷將許之文鴦諫曰受命討勒寧以末杯一人故縱成擒之寇既失凌意且有後憂必不可許疾陸眷不聽以鎧馬二百五十疋金銀各一簏贖末杯勒歸之呂氏春秋曰湯以良車七十乘必死六十人戊子戰於郕遂擒推移大犧桀多力能推移大犧因以為號, SBCK: ''}
