  - {type: variant, offset: 178, length: 275, content: 郄錡傳也又曰晉侯使士魴來乞師又曰郄犨如衛遂如齊皆乞師焉欒黶來乞師孟獻子曰晉有勝矣卑讓有禮故知其將勝楚也又曰秋齊侯聞將有晉師使陳無宇從薳啟彊如楚辭且乞師辭有晉師未得相見也穀梁曰師出不必反戰不必勝故言乞也戰國策曰楚圍雍氏韓使求救於秦秦師不下殽令斳尚使謂秦王曰今韓已病矣秦師不下脣竭齒寒願大王熟計之宣太后召尚曰妾事先王也先王以髀如妾身妾困弗支也盡身妾上而弗重也何以其少有利焉夫救韓日費千金獨不使妾少有利耶靳尚歸韓襄王賂於太后復使張翠至甘茂曰韓急翠曰未也茂曰先生言不急可乎翠曰韓急則折而入楚矣臣安敢來茂曰先生勿復言也乃言於秦王曰今雍氏圍而秦兵不下是無韓也楚韓, WYG: 一人者}
