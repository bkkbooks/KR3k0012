  - {type: 'tls:seg', offset: 43, content: '', id: KR3k0012_CHANT_326-1a.11}
  - {type: variant, offset: 43, length: 1, content: 故, WYG: 法慶既為妖幻遂説渤海人李歸伯合家從之歸伯招率郷人推法慶為主法慶}
  - {type: variant, offset: 45, length: 127, content: 為氏臧文為襄仲副使故不書又曰夏公使如楚乞師以伐齊公不事齊與晉盟故懼而乞師於楚又曰晉侯使荀罃來乞師又十三年晉侯使郗錡來乞師將事不敬將事敬君命也孟獻子曰郄氏亡乎禮身之幹也敬身之階也郄子無階且先君之嗣卿受命以求師將社稷是衛而惰棄君命也不亡何為郄錡郄克子故曰嗣卿, WYG: 歸伯}
