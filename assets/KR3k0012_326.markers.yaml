  - {type: variant, offset: 1366, length: 0, content: '', SBCK: 後魏元遥遷左光禄大夫仍領護軍時兾州沙門法慶旣爲妖幻遂􅀃㴾海人李歸伯合家從之歸伯招率郷人推法慶爲王法慶以歸伯爲十住菩薩平魔軍司定漢王自号大乗殺一人者爲一住菩薩殺十人者爲十住菩薩又合狂藥令人服之父子兄弟不相知識唯以殺害爲事於是聚衆殺阜城令破渤海郡殺害吏人刺史蕭寳京遣兼長史崔伯驎討之敗於煑􅀥城伯驎戰没㐫衆遂盛所在屠滅寺舎斬戮尼僧樊燒經像云新佛出丗除去衆魔詔以遥爲使持節督北征諸軍事率歩􅀐十万以討之法慶相率攻遥遥並擊破之遥遣輔國將軍張虬等擒法慶并尼惠暉等斬之傳首京師後擒歸伯戮於都市後周書曰裴寛與東魏將彭樂恂戰於新城因傷􅀍擒至河隂見}
