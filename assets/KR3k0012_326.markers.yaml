  - {type: variant, offset: 1388, length: 0, content: '', SBCK: 馳至幽州止傳舎召募得千餘人杭恃素貴不時相見子雄遣人諭之後二日抗從鐵􅀐二千來詣子雄所子雄伏甲請與相見因擒抗遂發幽州兵歩􅀐三万自陘以討諒時諒遣大將軍劉建略地燕趙正攻井陘相遇於抱犢山下力戰破之遷幽州惣管又曰獨􅀌揩字脩則不知何許人也夲姓李氏父屯從齊神武帝與周師戰于沙苑齊師敗績因爲柱國獨􅀌信所擒配爲士伍給使信家漸得親近因賜姓獨􅀌氏揩少謹厚便弄馬槊爲宇文護執刀累轉車􅀐將軍其後數從征伐賜爵廣阿縣公邑千戸唐書曰長平王叔良遣驃􅀐劉感擊薛仁果却爲所敗感殁於賊感不知何許人初以夲官鎭涇州爲仁果所圍感拒戰乆之城中糧盡無可食感殺馬以分士卒感一無所噉唯煑馬骨取汁和木屑而自食之城垂䧟者數矣㑹長平王叔良援兵至仁果解去感與叔良復出戰因爲賊所擒又曰王行敏鎭潞州劉黒闥來攻行敏自歷亭出兵拒戰擊賊破之旣而憇於野不設備賊知而掩之左右皆遁因爲黒闥所擒竟不拜黒闥怒斬之臨死西向而言曰行敏大唐忠臣也願陛下知之髙祖聞而痛惜焉又曰劉丗讓檢校并州惣管時}
