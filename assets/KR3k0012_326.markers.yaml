  - {type: variant, offset: 1444, length: 1, content: 是, SBCK: 衆曰陸機將反又曰惠帝末妖賊劉栢根起於東萊王弥率家僮從之栢根死亡入長廣山爲群盗弥多權略凡有所掠必預圗成敗舉無遺䇿弓馬迅捷膂力過人青土號爲飛豹十六國春秋曰南凉秃髮傉檀伐北涼沮渠􅂪遜於姑臧至畨禾苕藋苕徙聊切藋徒弔切掠五千餘户其將窟古進曰陛下轉戰千里前無完陣徙户資財盈溢衢路冝倍道遊師早度峻嶮􅂪遊善於用兵士衆習戰􅀂輕軍卒至出吾不慮}
