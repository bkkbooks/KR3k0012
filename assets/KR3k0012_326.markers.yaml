  - {type: variant, offset: 1300, length: 0, content: '', WYG: 今既在外方為吾徒腹心之病也不如先撃之遂圍檜郡郡城卑下士衆寡弱人無守禦之備連戰積十餘日士卒僅有存者扵是力屈城陷身被十數創遂為賊所獲既而衆寳等進圍東梁州乃縛檜置城下欲令誘説城中檜乃大呼曰群賊烏合粮食已罄行即退散各宜勉之衆寳大怒乃臨檜以兵曰速更汝辭不爾便就戮矣檜守節不變遂害之棄屍水中人皆為之流涕隋書曰漢王諒之作亂也煬帝將發幽州兵以討之時竇抗為幽州總管帝怒其有貳心問可任者於楊素素進李子雄授上大將軍拜廣州刺史馳至幽州止傳舎召募得千餘人抗素恃貴不與相見子雄遣人諭之後二日抗從鐵騎二千來詣子雄所子雄伏甲}
