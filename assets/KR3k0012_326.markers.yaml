  - {type: variant, offset: 1312, length: 2, content: 姚襄, SBCK: 丁亥中軍劉􅁉悉衆攻燕衆咸諌曰今徃亡日兵家所忌􅁉曰我徃􅀍亡吉孰大焉乃命悉登遂尅之燕王慕容超走追獲焉􅁉責之不降之罪超神色自􅀂無餘言唯以母託劉敬宣而巳蕭方等曰羙哉其言也以言必已親終不忘孝可謂人之將死其言也善信乎三國典略曰侯景晝息夜行追軍漸逼使謂慕容紹宗曰景􅀂􅀍擒公復何所用紹宗乃緩之又曰北齊平任城王湝音諧據兾州與廣寜王孝珩召募得四万餘人以拒我軍齊王憲率衆討之仍令太上主手書與湝曰朝廷遇緯甚厚諸王無恙叔􅀂釋甲則無所憂湝不納及大開賞募多出金帛沙門求爲戰者亦數千人候􅀐執湝間諜二人以白于憲乃集齊之舊將遍示之曰吾所争者大不在汝等今放還可即充我使乃與湝書曰一木不維大厦三諌可以逃身微子去啇侯服周代項伯背楚賜姓漢朝兵交命使古今通典不俟終日所望知機湝得書沉之于井憲至信都湝陣於城}
