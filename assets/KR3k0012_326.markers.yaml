  - {type: variant, offset: 1465, length: 4, content: 齊將陳伯, SBCK: 濟隂王新城頗有武略庫莫奚侵擾詔新城率衆討}
  - {type: variant, offset: 1465, length: 2, content: 齊將, WYG: 濟陰王新城頗有武畧庫莫奚侵擾詔新城率衆討之新城乃多為毒酒賊漸逼使棄營而去賊至喜而競飲聊無所備遂簡輕騎因醉縱撃俘馘甚多又曰天水梁㑹守東城謀欲逃遁先是封勅文掘重塹於東城之外斷賊走路夜中㑹乃}
  - {type: variant, offset: 1465, length: 4, content: 齊將陳伯, krp: 濟隂王新城頗有武略庫莫奚侵擾詔新城率衆討}
  - {type: variant, offset: 1468, length: 1, content: 伯, WYG: 飛梯騰塹而走勅文先嚴兵於塹外拒鬬從夜至旦勅文謀於衆曰困獸猶門而况於人賊衆以無生路人自致死必傷士衆未易可干若開其生路賊必上下離心克}
  - {type: variant, offset: 1470, length: 1, content: 進, SBCK: 新城乃多爲毒酒賊漸}
  - {type: variant, offset: 1470, length: 38, content: 進逼壽春沿淮為寇時司徒彭城王勰廣陵侯衍同鎮壽春以九江初附人情未洽兼臺援不至深, WYG: 易矣衆咸}
