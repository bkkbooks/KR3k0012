  - {type: variant, offset: 1421, length: 5, content: 被圍甚急城, SBCK: 虜掠左傳曰鄭􅀕足帥師取温之麥秋又取成周之禾後漢書曰馮異謂苗萌曰今諸將皆壯士屈起多􅁀横獨有劉將軍所到不虜掠觀其言語舉止非庸人也可以歸身苗萌曰死生同命敬從子計又曰郅惲至廬江因遇積弩將軍􅀓俊東徇楊州俊素聞惲名乃禮請}
