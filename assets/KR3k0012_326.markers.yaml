  - {type: variant, offset: 1436, length: 2, content: 面乃, SBCK: 命吕氏春秋曰武王伐紂至鮪水紂使膠鬲候周問武王曰何日至武王曰將以甲子日至膠鬲行天大雨曰夜不休武王疾行不輟軍吏諌之武王曰吾疾行以救膠鬲之死也故能獲天地之應尅啇如林之旅天地之應謂夜雨止畢陳白魚入舟之􅀋尅勝也啇殷號也於旅衆也如林言衆多尚書曰武王伐紂紨率其旅􅀂林㑹於牧野將軍如何不師法文王而犯逆天地之禁多傷人害物虐及枯尸取罪神明今不謝天改政無以全命願將軍親率士卒収傷葬死哭所殘􅁀以明非將軍本意也從之百姓恱服所向皆}
