  - {type: variant, offset: 1301, length: 0, content: '', WYG: 與相見因擒抗遂發幽州兵歩騎三萬自陘以討諒時諒遣大將軍劉建略地燕趙正攻陘相遇於抱犢山下力戰破之遷幽州總管又曰獨孤楷字脩則不知何許人也本姓李氏父屯從齊神武帝與周師戰於沙苑齊師敗績因為柱國獨孤信所擒配為士伍給使信家漸得親近因賜姓獨孤氏楷少謹厚便弄馬槊為宇文䕶執刀累轉車騎將軍其後數從征伐賜爵廣阿縣公邑千户唐書曰長平王叔良遣驃騎劉感擊薛仁果却為所敗感殁於賊感不知何許人初以本官鎮涇州為仁果所圍感拒戰乆之城中粮盡無食感殺馬以分士卒感一無所啖唯煮馬肝取汁和木屑而自食之城垂䧟者數矣㑹長平王叔良援兵至仁果解之感與叔良復出戰因為賊所擒又曰王行敏鎮潞州劉黑闥來攻行敏自歴亭出兵拒戰擊賊破之既憇於野不設備賊知而掩之左右皆遁去因為黑闥所擒竟不拜黑闥怒斬之臨死西向而言曰行敏大唐忠臣也願陛下知之髙祖聞而痛惜焉又曰劉世讓檢校并州總管時突厥可汗遣俱檢特勒以所部千人居我并州甚為民患前總管李仲文不能制世讓到官以計擒之馳使以聞髙祖大悦嘉嘆乆之又曰姜寳誼武徳初拜武衛大將軍尋為井鉞將軍劉武周將黄子英往來雀䑕谷髙祖令寳誼撃之子英數以輕兵挑戰寳誼兵纔接子英輕遁如此者再三寳誼悉衆以逐之伏兵發軍遂大敗寳誼為賊所擒後得逃歸至是與裴寂拒宋金對戰始合寂棄軍而走兵遂大潰寳誼復為賊所擒髙祖初聞其沒也泣曰寳誼烈士必不生降賜其家物千叚米三百石寳誼後謀背賊事洩遇害臨死西向大言曰臣無狀負陛下被屠戮是所甘心但敗軍喪師九泉所恨及賊退高祖遣使迎其柩諡曰剛又曰恒州節度使李寳臣使人謂朱滔曰吾聞朱公貌神安得而識之願因繢事以觀可乎滔乃圖其形以示之錦衣金鈎甚偉寳臣懸於射堂命}
