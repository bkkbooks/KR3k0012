  - {type: variant, offset: 1449, length: 3, content: 共歌謠, SBCK: 勇氣自倍彼徒我􅀐勢不相及􅀂倍道遊師必􅂢棄資財示人以弱非計也俄而昬霧風雨􅂪遊軍大至傉檀大敗而還三國典略曰齊主以契丹犯塞親征至于平州取其西道直指長漸司徒潘相樂率精􅀐五千自東道趣青山向白狼城安德王韓䡄率精􅀐四千断其走路追奔至于遼水齊主露髮􅃝身晝夜不息行千餘里唯食􅁏飲水壯氣弥厲親踰山嶺爲士卒先指揮􅁬擊大破}
