  - {type: variant, offset: 1132, length: 0, content: '', WYG: 時梁元帝遣使請舊圖以定疆界又連結於齊言辭悖慢太祖曰古人有言天之所棄誰能興之其蕭繹之謂乎冬十月壬戌遣柱國于謹中山公䕶大將軍楊忠韋孝寛等歩騎五萬討之十一月癸未師濟於漢中公䕶與楊忠率鋭騎先屯其城下據江津以備其逸丙申謹至江陵列營圍守辛亥進攻城其日克之擒梁元帝殺之并虜其百官及士民以歸没}
