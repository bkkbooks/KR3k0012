  - {type: variant, offset: 3040, length: 223, content: 隨讜入泗州夜半斬賊柵大呼由水門而入賊軍大駭既知援兵入賊乃退舍人心遂固浙西觀察使杜審權遣大將翟行約率軍三千赴援屯蓮塘驛慆欲遣人勞之將吏皆憚其行讜曰杜相公以大夫宗盟急難相赴安得令使者無言而還即齎慆書幣犒其使淮南大將李湘率師五千來援受賊詐降敗於淮口湘與郭厚本皆為賊所執自是無援賊併兵急攻以鐵索斷淮流梯衡雲合凡周七月晝夜不息乘城之士不遑寢寐面目瘡生軍儲漸少分食稀粥賴讜犯難仗義求救於淮北諸軍既而馬舉以大軍至賊解圍而去讜無子猶子山僧元老等寄在廣陵每出城則書, SBCK: ''}
