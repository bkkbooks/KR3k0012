  - {type: variant, offset: 1439, length: 2, content: 弩手, SBCK: 􅀳書曰官人孟􅅼弟超並爲成都王頴所嬖寵超領萬人爲小都督未戰縱兵大掠陸機録其主者超將鐵􅀐百餘人直入機麾下奪之頋謂機曰貉奴能作督不機司馬孫極勸機}
  - {type: variant, offset: 1439, length: 2, content: 弩手, krp: 晉書曰官人孟玖弟超並爲成都王頴所嬖寵超領萬人爲小都督未戰縱兵大掠陸機録其主者超將鐵騎百餘人直入機麾下奪之頋謂機曰貉奴能作督不機司馬孫極勸機}
