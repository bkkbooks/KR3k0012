  - {type: variant, offset: 10, length: 5, content: 衛人伐齊公, SBCK: 劉曜光禄大夫游}
  - {type: variant, offset: 10, length: 0, content: '', WYG: 劉曜光禄大夫游子逺與𤣥羗伊餘戰伊餘有驕色子逺候其無備夜誓衆蓐食晨大風震霧子逺曰天贊我也躬先士卒掃壁而出遲明覆之生擒伊餘悉俘其衆二石偽事曰劉曜躬領將士二十七萬衆大舉征勒勒養子生為}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_WYG_326-1b, image: WYG0895/WYG0895-0795b.png}
  - {type: variant, offset: 10, length: 5, content: 衛人伐齊公, krp: 劉曜光禄大夫游}
  - {type: variant, offset: 11, length: 0, content: '', WYG: 將軍領三千}
  - {type: variant, offset: 12, length: 2, content: 伐齊, WYG: 鎮洛金墉城曜攻生城不能下不覺勒軍卒至天曉曜軍當攻金城勒軍入正與曜軍相遇即交戰曜軍大破登時先擒曜又三十國春秋曰丁亥中軍劉裕悉衆攻燕衆咸諫曰今往亡日兵家所忌裕曰我往彼亡吉孰大焉乃命悉登遂剋之燕王慕容超走追獲焉裕責其不降之罪超神色自若無餘言惟以母託劉敬宣而已蕭方等曰美哉其言也言必已親終不忘孝可謂人之將死其言也善信乎三國典畧曰侯景晝息夜行追軍漸逼使謂慕容紹宗曰景若被擒}
  - {type: page-break, offset: 12, content: '', id: KR3k0012_WYG_326-2a, image: WYG0895/WYG0895-0796a.png}
