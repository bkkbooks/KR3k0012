  - {type: variant, offset: 2438, length: 282, content: 兩唐書曰李晟兼左金吾大將軍涇原四鎮都知兵馬使并總遊兵無何節度使馬璘與吐蕃戰於監倉兵敗晟率所部撗擊之拔璘出於亂兵以功封合川郡王璘忌晟威名又遇之不以禮令朝京師代宗知之留宿衛上即位吐蕃寇劍南時節度使崔寧在京師三川皆恐詔晟將神策兵五百救援晟乃踰漏天攻拔飛越廊清肅寧三城絕大渡河獲虜首千餘級虜乃引去因留成都數月而還又曰裴度征蔡州計築赫連城於池口未畢役度領師及賓從往觀之導騎將及城門左右曰五溝賊至言未畢賊以突來哮謼爭進城震壞者十餘板注弩挺刃勢將及度賴李光顏決戰於前以却之時光顏先慮其來使田希以二百騎伏於溝中出賊不意交擊之方得入城希又先扼其溝中歸路賊多棄騎越溝相牽墮壓而死者千餘, SBCK: ''}
