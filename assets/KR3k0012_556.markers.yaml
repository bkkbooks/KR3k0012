  - {type: variant, offset: 3501, length: 213, content: 二當其終亡安庴先塋帛布轜車喪儀儉約執引者皆三吳令望及北人賢流虞氏家記曰潭母大夫人薨宜都府君即世五十九載改殯修構窀穸靈柩住而莫前群從咸以喪事有往無反不應遷移潭以昔文王之葬王季既定而洪水出截冢棺槨文王乃設張屋出柩三日群臣臨之然後葬此則上聖之遺令載在篇籍遂奉遷神柩權停幕屋使子孫展哀晨夕宗族相臨允合張屋之儀也天子給太夫人徘徊車謁者送喪禮儀光備合葬於舊壙衛玠別傳曰君卒丞相王公教曰衛洗馬明當改葬此君風流名士海內民望可修三牲之祭以敦舊好, SBCK: 六}
