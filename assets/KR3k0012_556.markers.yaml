  - {type: punctuation, offset: 221, content: 「, id: KR3k0012_CHANT_556-bkkpn68}
  - {type: variant, offset: 224, length: 610, content: 父冲為孫恩所殺伯父邈守吳興又為孫恩黨害之方明體素羸弱而勇決過人結邈門生討其黨悉擒手刃之時亂後吉凶禮廢方明合門遇禍資產無遺而營舉之功盡力數月葬送並畢平世備禮無以加也南史曰王思遠少無仕心宋建平王景素辟南徐州主簿深見禮景素被誅左右離散思遠親視殯葬手種松柏與盧江何昌寓上表理之宋書曰王徽少好學弟僧謙亦有才譽為太子舍人遇疾徽躬自處療而僧謙服藥失度遂卒徽深自咎恨發病不復自療哀痛僧謙不能已以書告靈僧謙卒後四旬而徽終遺令薄葬不設轜旐鼓挽之屬施五尺床為靈二宿便毀又曰范泰卒初議贈開府殷景仁曰泰素望不重不可擬議台司竟不果及葬王弘撫棺哭曰君生平重殷鐵今以此為報沈約宋書曰吳逵吳興烏程人經荒饉繼以疾病父母兄弟嫂及郡群從小功之親男女死者十三人唯逵夫妻獲全家徒四壁立冬無被袴晝則傭賃夜則伐木燒塼妻亦同逵此誠朞年中成七墓十三棺亦出中興書王韶孝子傳南史曰顧憲之仕齊為衡陽內史先是郡境連歲疾疫死者太半棺槨尤貴悉褁以葦席棄之路傍憲之下車分告屬縣求其親黨悉令殯葬其家人絕滅者憲之出公祿使綱紀營護之又土山人有病輒云先亡為禍皆開冢剖槨水洗枯骨名為除祟憲之曉諭為陳生死之別事不相由風俗遂改又曰王儉領中書監參掌選事其年疾上親視薨年三十八詔衛軍文武及臺所給兵仗悉停待葬又詔追贈太尉加羽葆鼓吹增班劍為六十人葬禮依太宰文簡公禇彥回故事齊書曰初豫章王嶷葬金牛山文惠太子葬夾石竟陵王子良臨送望祖硎山悲感歎曰北瞻吾叔前望吾兄死而有知請葬茲地及薨葬焉又曰何點哀樂過人嘗行逢葬者歎, WYG: ''}
