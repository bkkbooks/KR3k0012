  - {type: variant, offset: 3224, length: 0, content: '', WYG: 滕公夏侯嬰死公卿送塟至東郭門外四馬不行掊地悲鳴即掘馬蹄下得石椁其銘曰佳城鬱鬱三千年見白日吁嗟滕公居此室乃塟其地故謂之馬塜又曰河内淇園張公老而無子貲財累億求没入官塟園中于今供祀犧牲永昌郡傳曰建寧郡塟夷置之積薪之上以火燔之烟氣正上則大殺牛羊共相勞賀作樂若遇風烟氣旁邪爾乃悲哭也豫章記曰許子將墓在郡四里昔子將以中國大亂逺來渡江隨劉繇而卒藏于閶門裏于時漢興平二年也吴天紀中太守吴興沈季白日于㕔事上坐忽然如夢見一人着黄單衣黄巾稱汝南平輿許子將求改塟因忽不見即求其喪不知處所遂招魂塟之命文學施遐為招魂文越地傳曰禹井井者法也以為禹塟以度不煩人衆樂資九州志曰度之鹽官有奉禪山者始皇過此而美之死因塟焉有廟在平地于今民祠之述征記曰荀氏塟在彭城東岸有一丘民俗謂之荀氏塟或云斯則徐偃塟后倉者也古徐國宫人娠而生卵棄之水濵有犬名后倉銜而歸伏而成人遂為徐之嗣君純筋無骨號曰偃王偃王躬行仁義衆國附之得朱弓之瑞周穆王命楚滅之后倉將死生角九尾實黄龍也又曰魚山臨清河舊屬東阿東阿王曹植每升此山有終焉之志植之所游也臺沼溝渠悉存既塟于山西有二石柱猶存也今割并榖城鄧徳明南康記曰陽道士塟巖石室元嘉中道士過世臨終語弟子等可送吾置彼石室巾褐香罏此外無所湏也及其亡日謹奉遺命塟經數年尸猶儼然葛巾覆之如初弗朽後忽不復見今舟行者過其山渚尚聞香氣咸異焉解道䖏齊記曰魏黄初三年文}
