  - {type: variant, offset: 11, length: 1, content: 興, krp: 經十年而母喪開墓見棺妾伏棺上衣服如生就視猶暖漸漸有氣息與歸經日乃蘇云父常與之寢接恩情如生在家中范晏隂德傳曰陳翼字春卿廬江舒人也行到縣郭見道上馬傍有卧疾人呼翼與語曰吾是長安魏公卿聞廬江樂土來下道病困不能復前儻可相救翼荅云家有弊廬可俱歸乎公卿曰幸甚即扶與俱到家飬視積日旣困公卿謂翼曰馬上有金千餘餅素二十疋可賣殮餘以相謝言絶而亡翼賣素買衣衾殯殮之葬埋髙敞之地以金置棺下不使人知乗馬去公卿兄長公見翼乗馬謂必殺公卿隂告官収翼具以狀對長公迎喪發棺下得金如數叩頭謝以金投其門中翼送長安還之汝南先賢傳曰袁閎字夏甫延熹末黨事將作閎遂散髪乃築土室四周於庭潜身十八年終于土室之中臨卒勑其子曰勿設殯棺衣衾之備也但着禈衫踈布單衣幅巾襯尸於板床之上五百墼爲藏㑹稽典録曰趙曄字長君山隂人也少爲縣吏奉檄迎督郵曄甚耻之由是委吏到犍爲詣博士杜撫受韓詩撫嘉其精力盡以其道授之積二十年不還家人爲之發喪制服至撫卒曄經營葬之然後歸家又曰張䛕字彦承上虞人也與同郷丁孝正相親葬送過制謏}
