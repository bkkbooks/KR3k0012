  - {type: variant, offset: 1504, length: 1715, content: 原置二塚其大將曰旌義塚將士曰懷忠冢詔翰林學士撰二冢誌文及祭文其曰劉昌盛陳兵於葬所具牢饌祖祭之禮昌及大將皆素服臨之焚其屍及紙錢千幅又立三堠題以冢名表於道傍師人觀之莫不感泣穆天子傳曰甲辰天子南葬盛姬於樂池之南即玄池也天子乃命盛姬之喪視皇后之葬法河濟之間共事供給葬事七萃之事抗即車舉棺以就車御日月之旗七星之文今旒上畫日月及北斗星周禮日月為當旗亦通名也鼓鍾以葬山海經曰秋山帝堯葬于陽今堯冢在濟陰陽城縣也帝嚳葬于陰爰有熊文虎雕虎文王皆葬其所文王墓今在畢也案帝王冢墓有定處而山海經往往偏見之者蓋以為聖人在於其位仁化廣及恩沾鳥獸至於殂亡四海若喪考妣無思不哀故絕域殊類之聞天子崩各自立廟祭起土為冢也又曰務隅之山帝顓頊葬于陽冢在頓丘城門外廣陽里中也九殯葬于陰婦嬪又曰赤水之東蒼梧之野舜與叔均之所葬也叔均商均墓今在九疑山中也其中有九疑山舜所葬在長沙零陵界中九疑山九谿其山皆相似又曰邢天與帝爭神帝斷其首葬之常羊山乃以乳為目以臍為口玄中記又載晏子曰景公成路寢之基逢於何遭晏子再拜前曰於何之母死兆在路寢之臺牖下願請合骨晏子入白公公作色曰自古及今子亦嘗聞請葬人主之宮者乎對曰古之人君不奪生人之居不殘死人之墓故未嘗聞請葬人主之宮也嬰聞之生者不安命之曰畜憂死者不葬命之曰畜哀畜憂者怨畜哀者危君不如許之公曰諾逢於何遂葬路寢之臺牖下墨子曰古者聖人制為葬埋之法曰棺三寸足以朽體衣衾二領足以覆惡者昔堯北教八狄道死卬卬之山衣衾二領滿坎無封已葬牛馬乘之舜西教犬戎道死南紀之市既葬而市人乘之禹東教於越葬於會稽之山桐棺三寸皆下不及泉上無通臭三王者豈財用不足哉以為葬埋之法也孟子曰滕文公卒葬有日矣天大雨雪甚至牛目群臣請弛期太子不許惠公諫曰昔王季葬滑山之尾欒水齧其墓見棺前和文王曰先君欲見群臣百姓矣乃出為張三日而後葬令太子亦曰先王以留而撫社稷故使雪弛其期更為日此文王之義也太子曰善莊子曰莊子將死弟子欲厚葬之莊子曰吾以天地為棺槨日月為連璧星辰為珠璣萬物為齊送吾葬具不備耶何以加此弟子曰吾恐烏䳒之食夫子也莊子曰在上為烏䳒食在下為螻蟻食奪彼與此何偏耶又曰莊子送葬過惠子之墓顧謂從者曰郢人有漫以堊污其鼻端若蠅翼使匠石斲之運斤成風堊盡而鼻不傷自夫子之死吾無質矣吾無與言之矣韓子曰墨者之葬也冬日冬服夏日夏服桐棺三寸執喪二日世主以為儉而尤之儒者破家而葬債子而償執喪三年毀而扶杖世主以為孝而禮之也又曰齊國好厚葬布帛盡於衣衾材木盡於棺槨桓公患之以告管仲曰布帛盡則無以為幣材木盡則無以為守備而人厚葬之不休奈何管仲對曰凡人之有為也非名之則利之也乃下令曰棺槨過度者僇其尸罪夫當喪者夫僇死無名罪當喪者無利人何故為之也尸子曰禹之喪法死於陵者葬於陵死於澤者葬於澤桐棺三寸制喪三日舜西教乎七戎道死葬南巴之中衣衾三領款木之棺葛以緘之呂氏春秋曰孝子之重其親也慈親之愛其子也痛於肌骨性也所重所愛死而棄之溝壑人之情不忍為故有葬死之義葬者藏也藏淺則狐貍迫之深則及於泉故凡葬必於高陵之上以避狐貍之患水泉之濕此則善矣又曰審知生聖之要審知死聖之極也知生者不以害生養生之謂也知死者不以害死此葬死之謂也二者聖人之所獨決也凡生於天地之間其必有死所不免也淮南子曰禹之時天下水禹身執畚插當此之時死陵者葬陵死澤者葬澤節財薄葬焉又曰馬免人於難者死也葬之以帷幪為衾牛有德於人其葬之大車之箱牛馬有功猶不可忘又況人乎又曰禹有洪水之患陂塘之事陂蓄水塘池也故朝死而暮葬此皆聖人之所以應時設教見而施宜者也典略曰秦始皇十年華陽君卒與孝文王合葬壽陵襄王母夏太后別葬杜東臨死時曰東望我子西望我夫後百年旁當有萬家邑及漢有天下宣帝果起陵邑焉西京雜記曰曹敞在吳章門下往往好斥人過以為輕薄世人皆以為然章後見殺全無有敢收葬者敞乃稱吳章弟子收葬其屍方知其亮直者不見容於凡輩矣平陵人文生為碑於吳章墓側在龍首山南暮嶺上又曰何武葬北邙薄龍孤王嘉冢東北一里許又曰楊貴字王孫京兆人也生時厚自奉養死卒祼葬終南山下其孫掘土鑿石深七尺而反奢又曰安定嵩真玄莬曹元禮並明筭術皆成帝時人真常以筭自克其壽七十三真曰綏和元年正月二十五日晡時死矣書其壁以誌之至二十四日晡時死妻曰真筭時見長下一筭欲以告之慮脫其旨故不告今校一日也又曰北芒青龍隴上孤檟之西四尺所鑿之七尺吾欲筭此地也真死依言往掘得古時空槨即以, SBCK: ''}
