  - {type: variant, offset: 97, length: 295, content: 因謂子孫曰我不勞向北代葬也即可就此子孫從其言崔鴻後燕錄曰趙秋字武汲郡朝歌人也輕財好施鄰人李玄度母死家貧無以葬秋謂其兄曰赴死救不足仁之本也家有二牛以一牛與之玄度得以葬他年秋夜行見一老母遺秋金一餅曰子能葬我是以相報子五十已後當富貴不可言勿忘玄度也宋書曰謝方明父冲為孫恩所殺伯父邈守吳興又為孫恩黨害之方明體素羸弱而勇決過人結邈門生討其黨悉擒手刃之時亂後吉凶禮廢方明合門遇禍資產無遺而營舉之功盡力數月葬送並畢平世備禮無以加也南史曰王思遠少無仕心宋建平王景素辟南徐州主簿深見禮景素被誅左右離散思遠親視殯葬手種松柏與盧江何昌寓上表理之宋書曰王徽少好學弟僧謙亦有才譽為太子舍人遇疾徽躬自處療而僧謙服藥失度, SBCK: 没}
  - {type: variant, offset: 97, length: 2, content: 因謂, WYG: 没遂塟其山博物志曰澹臺}
