  - {type: variant, offset: 3224, length: 0, content: '', SBCK: 滕公夏侯嬰死公卿送葬至東郭門外四馬不行掊地悲鳴即掘馬蹄下得石椁其銘曰佳城鬰鬰三千年見白日于嗟􅅬公居此室乃葬所地故謂之馬冢焉又曰河内淇園張公老而無子貲財累億求没入官死葬園中于今供祀犧牲永昌郡傳曰建寧郡葬夷置之積薪之上以火燔之烟氣正上則大殺牛羊共相勞賀作樂􅀂遇風烟氣旁邪尓乃悲􅂘也豫章記曰許子將墓在郡南四里昔子將以中國大亂逺來渡江隨劉繇而卒藏于昌門裏于時漢興平二年也呉天紀中太守呉興沈季白日於㕔事上坐忽然如夢見一人着黄單衣黄巾􅁛汝南羊與許子將求改葬因忽不見即求其喪不知豦所遂招魂葬之命文學施遐爲招魂文越地傳曰禹井井者法也以爲禹葬以度不煩人衆樂資九州志曰渡之塩官有奉禪山昔始皇過此而美之死因葬焉有廟在平地于今民祠之􅄒征記曰荀氏葬在彭城東岸東岸有一丘民俗謂之荀氏葬或云斯則徐偃王葬后倉者也古徐國宫人娠而生􅆑弃之水濵有犬名后倉衘而歸伏而成人遂爲徐之嗣君純筯無骨號曰偃王偃王躬行仁義衆國附之得朱弓之瑞周穆王命楚滅之后倉將死生角九尾實黄龍也又曰魚山臨清河舊屬東阿東阿王曹植毎􅂛此山有終焉之志植之所遊池沼溝渠悉存旣葬于山西有二石柱猶存也地今割并榖城鄧德明南康記曰陽道士葬巖石室元嘉中道士過丗臨終語弟子等可送吾置彼石室巾􅄄香鑪此外無所須也及其亡日謹奉遺命葬經數年尸猶儼然􅁑巾覆之如􅀄弗朽後忽不復見今舟行者過其山渚尚聞香氣咸異焉解道處齊記曰魏黄􅀄三年文}
