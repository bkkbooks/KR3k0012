  - {type: variant, offset: 3225, length: 0, content: '', SBCK: 弟爕封濮陽王臨終頋命葬近蘧瑗之墓吾常想其爲人願託賢哲之靈扶南傳曰頓愻國人死或鳥葬或火葬鳥葬者病困便歌儛送郭外有鳥如鵝緑色飛來萬計啄食都盡歛骨焚之沉之於海此上行必生天鳥􅀂不食自悲傷乃就火葬取骨埋之是次行也鄴中記曰石勒陵在襄國城西南三十里名髙陵不築墻不種樹立堂皇五間安欑圗勒大臣像又於堂皇東立重樓虎陵在鄴西北角旣葬鄴中便亂其封域故未有名域云尋􅀍掘凡此二陵皆僞葬右勒虎自別於深山風俗通曰王喬爲葉令天下一玉棺於㕔事前令臣吏試入不動揺喬曰天帝獨欲召我沐浴服飾􅃦其中盖便立覆之􅀫昔葬於城東土自成墳其夕縣中牛皆流汗吐舌人無知之者皇覽曰舊漢家之葬方中百歩穿築爲方城其中開道足施六馬發三河三輔近郡卒徒十萬數復􅁟姚信士緯曰盖葬於寛平則恐後丗都邑居之葬於陵野則恐民人耕稼}
  - {type: page-break, offset: 3225, content: '', id: KR3k0012_SBCK_556-6a}
  - {type: page-break, offset: 3225, content: '', id: KR3k0012_SBCK_556-6b}
  - {type: variant, offset: 3225, length: 0, content: '', WYG: 弟燮封濮陽王臨終顧命塟近蘧瑗之墓吾常想其為人願託賢哲之靈扶南傳曰頓懸國人死或烏塟或火塟烏塟者病困便歌舞送郭外有烏如鵝緑色飛來萬計啄食都盡歛骨焚之沉之於海此上行必生天鳥若不食自悲傷乃就火塟取骨埋之是次行也鄴中記曰石勒􅁜在襄國城西南三十里名髙􅁜不築墻不種樹立堂屋五間安榜讃圖勒大臣像又於堂屋東立重樓虎􅁜在鄴西北角既塟鄴中便亂其封域故未有名或云尋被掘凡此二􅁜皆偽塟石勒虎自别塟於深山風俗通曰王喬為葉令天下一玉棺于㕔事前令臣吏試入不動揺喬曰天帝獨欲召我沐浴服飾寢其中葢便立覆之宿塟於城東土自成墳其夕縣中牛皆流汗吐舌人無知之者皇覽曰舊漢家之塟方中百歩穿築方域其中開道凡施六馬發三河三輔近郡卒徒十萬數復土姚信士緯曰葢葬於寛平則恐後世都邑居之塟於陵野則恐民人耕稼}
