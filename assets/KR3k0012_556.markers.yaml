  - {type: variant, offset: 9, length: 0, content: '', SBCK: 千餘人管仲曰今與幾何人來曰臣與三人俱曰是何對曰其一人父死無以葬我爲葬之一人母死無以葬亦爲葬之一人兄有獄我爲出之是以得三人來桓子新論曰楊子雲爲郎居長安素貧比歳亡其兩男哀痛之皆持歸葬於蜀以此困乏子雲逹聖道明於死生不下季札然而慕戀死子不能以義割恩自令多費而致困貧論衡曰儒書言孔于當泗水而葬爲之却流此言孔子德使水却不湍其墓是故儒者講論皆言孔子之後當封泗水以却流爲證殆虚言也王符潜夫論曰文帝葬於芷陽明帝葬於洛南皆不藏珠寳不起山陵今京師貴戚郡縣豪家生不極養死乃崇喪造起大冢廣樹松柏廬􅃕祠堂務崇侈僣此無益於終無益於孝徒作煩擾傷害吏民今案畢鎬之郊無文武之陵南城之東無曽晢之􅃁周公非不忠曽子非不孝也崔寔政論曰送終之家亦大無度至念親將終無以奉遣乃約其供養衣服豫脩巳没之制竭家盡業甘之不恨窮阨旣迫起爲盗賊拘執䧟罪爲丗大戮痛乎此俗之愚民也録異傳曰􅀽安葬其母逢三書生語其葬處遂至四丗五公其後公路年十八驕豪故常食宻飯諸女以絳爲地道遊行其上此葬地所致也謝綽宋拾遺曰桓温葬姑熟之青山平墳不爲封域於墓傍開􅎬立碑故謬其豦令後代不知所在襄陽􅂄舊傳曰峴山南有習家魚池者習郁之所作也郁將亡勑其兒煥曰我葬必近魚池煥爲起􅃁於池之北去池四十歩山謙之丹陽記曰}
