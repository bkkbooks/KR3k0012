  - {type: variant, offset: 642, length: 192, content: 者憲之出公祿使綱紀營護之又土山人有病輒云先亡為禍皆開冢剖槨水洗枯骨名為除祟憲之曉諭為陳生死之別事不相由風俗遂改又曰王儉領中書監參掌選事其年疾上親視薨年三十八詔衛軍文武及臺所給兵仗悉停待葬又詔追贈太尉加羽葆鼓吹增班劍為六十人葬禮依太宰文簡公禇彥回故事齊書曰初豫章王嶷葬金牛山文惠太子葬夾石竟陵王子良臨送望祖硎山悲感歎曰北瞻吾叔前望吾兄死而有知請葬茲地及薨葬焉又曰何點哀樂過人嘗行逢葬者歎, SBCK: 明}
