  - {type: variant, offset: 3225, length: 0, content: '', krp: 弟爕封濮陽王臨終頋命葬近蘧瑗之墓吾常想其爲人願託賢哲之靈扶南傳曰頓愻國人死或鳥葬或火葬鳥葬者病困便歌儛送郭外有鳥如鵝緑色飛來萬計啄食都盡歛骨焚之沉之於海此上行必生天鳥若不食自悲傷乃就火葬取骨埋之是次行也鄴中記曰石勒陵在襄國城西南三十里名髙陵不築墻不種樹立堂皇五間安欑圗勒大臣像又於堂皇東立重樓虎陵在鄴西北角旣葬鄴中便亂其封域故未有名域云尋𬒳掘凡此二陵皆僞葬右勒虎自別於深山風俗通曰王喬爲葉令天下一玉棺於㕔事前令臣吏試入不動揺喬曰天帝獨欲召我沐浴服飾寢其中盖便立覆之宿昔葬於城東土自成墳其夕縣中牛皆流汗吐舌人無知之者皇覽曰舊漢家之葬方中百歩穿築爲方城其中開道足施六馬發三河三輔近郡卒徒十萬數復土姚信士緯曰盖葬於寛平則恐後丗都邑居之葬於陵野則恐民人耕稼}
  - {type: variant, offset: 3226, length: 0, content: '', SBCK: 之厚椁大棺人所爲用下一寡材木民人率多發掘以繕其居千墳萬壙無不毀者其唯瓦棺薄葬歛以時服依于髙丘徹于􅀷穽庶乎不辱耳語林曰王太保有二兒喪一兒欲還舊塋一兒欲留葬太保乃垂涕曰不忘故郷仁也不戀夲􅁟逹也唯仁與逹吾二子有焉又曰王武子葬夕孫子荆哭之甚悲賔客莫不爲垂涕哭畢向靈曰卿常好驢鳴今爲卿作驢鳴旣作體似真聲賔客莫不大􅀏孫聞􅀏頋謂曰諸君不死令王武子死賔客莫不皆怒須􅁷之間或悲或􅀏或怒丗􅀃曰阮藉葬母蒸一肥豚飲酒二斗然後臨决直言窮矣都得一號因吐血良乆又鄧􅀳記曰籍母將死與人圍棊如故局者求止籍不肯留與決旣而飲酒三升舉聲一號吐血數升也又曰􅁃文康亡何楊州臨葬云埋王樹着􅁟中使人情何能巳文康􅁃亮謚也何掦州者何充也又曰晉明帝亦解冢宅聞郭璞爲人葬後微服徃看因問君何以葬龍角此法當滅族主人荅云郭景純云此是葬龍耳不出三年當致天子明帝復問云爲是出天子􅁘荅非能出招致天子耳相冢書曰凢葬龍耳冨貴出五侯葬龍頭􅁀得冨貴人不能見葬龍口賊子孫葬龍齒三年暴死葬龍咽死滅門葬龍腮必卒死天子葬髙山}
  - {type: page-break, offset: 3226, content: '', id: KR3k0012_SBCK_556-7a}
  - {type: variant, offset: 3226, length: 0, content: '', WYG: 之厚椁大棺人所為用下土寡材木民人率多發掘以善其居千墳萬壙無不毁者其唯瓦棺薄塟殮以時服依于高丘徹于深穽庶乎可以不辱耳語林曰王太保有二兒䘮一兒欲還舊塋一兒欲留太保乃垂涕曰不忘故鄉仁也不戀本土逹也唯仁與逹吾二子有焉又曰王武子塟夕孫子荆哭之甚悲賔客莫不為垂涕哭畢向靈曰卿常好驢鳴今為卿作之既作體似聲真賔客莫不大笑孫聞笑顧謂曰諸君不死令王武子死賔客莫不皆怒湏㬰之間或悲或笑或怒世說曰阮籍母死蒸一肥豚飲酒二斗然後臨訣直言窮矣却得一號因吐血良乆又鄧祭晉記曰籍母將死與人圍棊如故局者求止籍不肯留决既而殮舉酒三升舉聲一號吐血數升也又曰庾文康亡何楊州臨葬云埋玉樹著土中使人情何能已又曰晉明帝亦解塜宅聞郭璞為人塟微服後往㸔因問君何以葬龍角此法當滅族主人答曰郭景純云此是葬龍耳不出三年當致天子帝復問云為是出天子耶答曰非能出招致天子耳相冡書曰凡葬龍耳當富貴出五侯葬龍頭暴得富貴人不能見葬龍口賊子孫塟龍齒三年暴死葬龍咽死滅門塟龍腮必卒死天子葬高山}
