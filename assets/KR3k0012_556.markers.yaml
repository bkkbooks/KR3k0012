  - {type: variant, offset: 8, length: 0, content: '', krp: 四呉越春秋曰早平門外麋湖西城者麋王城也與越王遥戰越王殺麋王麋王無頭騎馬還武里乃死因留葬武里城中以午日死至今武里午日不舉火又曰呉王闔閭有子女怨王乃自殺闔閭痛之甚葬於昌門外鑿地爲池積土爲山文石爲椁金鼎銀鐏珠玉之寳皆以送女乃舞白鵠於呉市中令萬民隨觀還使男女與鴶俱入門因塞之又曰呉謀伐齊齊景公使子女爲質於呉呉王因爲太子聘齊女齊女少思齊日夜哭泣發病闔閭乃起北門名曰齊門令女往遊其上女思不止病日益甚至且死女曰令死有知必葬海虞山之顛以望齊國闔閭傷之甚用其言葬於虞山之嶺以瞻望齊國是時太子亦病而死說苑曰盖聞相梁并衛有罪而走齊管仲迎而問曰吾子相梁并衛之時門下使者幾何人曰門下使者}
