  - {type: variant, offset: 63, length: 0, content: '', SBCK: 年十三四亡茂婦憐之不能自逺故近臣葬之日日徃􅂘又曰秦頡者字􅀄起頡之南陽過冝城中一家東向大道住車視之曰此居處可作冢後喪還至此住處車不肯前故吏爲市此宅葬之今冝城城中大冢前有二碑是也又曰有俍子者家訾萬金而自少小不從父語臨亡意欲葬山上恐兒不從到言葬我着㶆下石磧上俍子曰我田來不奉教從今當從此一語遂盡散家財作冢積土繞之成一洲長數百歩元康中始爲水所壞俍子前漢人也譙周三巴記曰巴國有亂巴國將畢㬅子請師於楚楚人與師㬅子巳平巴國旣而楚遣使請城㬅子曰吾誠許子之君矣持頭徃謝楚王城不可得乃自刎以頭與楚子楚子歎曰吾得臣􅀂巴㬅子何以城爲乃以上卿禮葬㬅子頭巴國葬}
  - {type: page-break, offset: 63, content: '', id: KR3k0012_SBCK_556-4b}
  - {type: variant, offset: 63, length: 0, content: '', WYG: 年十三四亡茂婦憐之不能自逺故近城葬之日日徃哭又曰秦頡者字初起頡之南陽過宜城中一家東向大道住車視之曰此居處可作塜後䘮還至此住處將車不肯前故吏為市此宅塟之今宜城城中大塜前有二碑是也又曰有狼子者家貲萬金而自少小不從父語父臨亡意欲塟山上恐兒不從到言葬我着瀦下石磧上狼子曰我由來不奉教從今當從此語遂盡散家財作塜積土繞之成一洲長數百步元康中始為水所壊狼子前漢人也譙周三巴記曰巴國有亂巴國將畢曼子請師於楚楚人與師曼子已平巴國既而楚遣使請城曼子曰吾城許子之君矣持頭往謝楚王城不可得乃自刎以頭與楚使楚子歎曰吾得臣若巴曼子何以城為乃以上卿禮葬曼子頭巴國葬}
