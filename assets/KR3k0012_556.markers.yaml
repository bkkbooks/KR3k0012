  - {type: variant, offset: 8, length: 0, content: '', SBCK: 四呉越春秋曰早平門外麋湖西城者麋王城也與越王遥戰越王殺麋王麋王無頭􅀐馬還武里乃死因留葬武里城中以午日死至今武里午日不舉火又曰呉王闔閭有子女怨王乃自殺闔閭痛之甚葬於昌門外鑿地爲池積􅁟爲山文石爲椁金鼎銀鐏珠玉之寳皆以送女乃舞白鵠於呉市中令萬民隨觀還使男女與鴶俱入門因塞之又曰呉謀伐齊齊景公使子女爲質於呉呉王因爲太子聘齊女齊女少思齊日夜􅂘泣發病闔閭乃起北門名曰齊門令女往遊其上女思不止病日益甚至且死女曰令死有知必葬海虞山之顛以望齊國闔閭傷之甚用其言葬於虞山之嶺以瞻望齊國是時太子亦病而死􅀃苑曰盖聞相梁并衛有罪而走齊管仲迎而問曰吾子相梁并衛之時門下使者幾何人曰門下使者}
  - {type: page-break, offset: 8, content: '', id: KR3k0012_SBCK_556-1b}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 四吴越春秋曰昇平門外麋湖西城者麋王城也與越王遥戰越王殺麋王麋王無頭騎馬還武里乃死因留塟武里城中以午日死至今武里午日不舉火又曰吴王闔閭有子女怨王乃自殺闔閭痛之甚葬于閶門外鑿地為池積土為山文石為椁金鼎銀罇珠玉之寳皆以送女乃舞白鵠于吴市中令萬民隨觀還使男女與鵠俱入門塞之又曰吴謀伐齊齊景公使女子為質于吴吴王因為太子聘齊女齊女少思齊日夜哭泣發病闔閭乃起北門名曰齊門令女往游其上女猶思不止病日益甚至且死女曰令死有知必塟海虞山之巔以望齊國闔閭傷之甚用其言塟于虞山之巔以瞻齊國是時太子亦病而死說苑曰葢聞相梁并衞有罪而走齊管仲迎而問曰吾子相梁并衞之時門下使者幾何人曰門下使者}
