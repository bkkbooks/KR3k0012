  - {type: variant, offset: 846, length: 591, content: 悲慟不能禁梁書曰到溉臨終託子孫薄葬之禮曰氣絕便歛歛以法服歛竟便葬不須擇日凶事心存約儉孫姪不得違言便屏冢人請僧讀經囋唄及卒顏色如恒手屈二指即佛道所云得果也又曰顧憲之臨終為制勑其子曰夫出生入死理兼晝夜生即不知所從死亦安識所往延陵云精氣上歸於天骨肉下歸於地魂氣則無不知良有以也雖復茫昧難徵要若非妄百年之期迅若馳隙吾今預焉終制瞑目之後念並遵行勿違吾志也莊周澹臺達生者也王孫士安矯俗者也吾進不及達退無所矯常謂中都之制允理愜情衣周於身示不違禮棺周於衣足以蔽臭入棺之物一無所須載以輴車覆以麤布為使人勿惡也崔鴻三十國春秋夏錄曰赫連昌發二百里內民二萬五千人鑿嘉平陵七千人繕清廟於契吳初昌父勃北遊契吳昇高而歎曰美哉斯阜臨廣澤而帶清流吾行地多矣未有若斯之美昌以勃平昔之意也故立廟焉葬勃於城西十五里起行宮摸寫統萬宮殿飾以金銀珠璣葬訖楚之殺駿馬數千疋唐書曰貞觀十年葬文德皇后於昭陵因山為墳不封不樹太宗懲秦漢已來厚葬以致發掘因序平生之志刻於石以誡將來又曰高宗以頻年飢儉召雍州長史李義琛謂曰庶人之徒商賈雜類竟為厚葬違越禮度雍州列郡之首四方取則卿為嚴禁勿復使然也又曰初玄宗因拜橋陵至金粟山覩岡巒有龍盤鳳翥之勢謂左右曰吾千秋後宜葬此地群臣乃追先旨築陵此山曰泰陵又曰蘇頲葬上游咸宜宮將出獵聞頲喪出愴然曰蘇頲今日葬吾寧忍娛遊遂還宮又曰初涇原節度使劉昌之領涇州也平涼盟會所亡歿將士骸骨在焉乃令聚而坎瘞之因感夢於昌有媿謝之意, SBCK: ''}
