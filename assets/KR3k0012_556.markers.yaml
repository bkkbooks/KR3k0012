  - {type: variant, offset: 9, length: 0, content: '', WYG: 千餘人管仲曰今與幾何人來曰臣與三人俱曰是何對曰其一人父死無以塟我為塟一人母死無以塟亦為塟之一人兄有獄我為出之是以得三人來桓子新論曰揚子雲為郎居長安素貧比歲亡其兩男哀痛之皆持歸塟于蜀以此困乏雄察逹聖道明于死生宜不下季札然而慕戀死子不能以義割恩自令多費而致困貧論衡儒書言孔子當泗水而塟為之却流此言孔子徳使水却不湍其墓是故儒者講論皆言孔子之後當封泗水以却流為證殆虛言也王符潜夫論曰文帝塟于芷陽明帝塟于洛南皆不藏珠寳不起山􅁜今京師貴戚郡縣豪家生不極養死乃崇喪迨起大塜廣樹松栢廬舎祠堂務崇侈僣此無益于終無益于孝徒作煩擾傷害吏民今案畢鎬之郊無文武之陵南城之東無曽晳之墓周公非不忠曽子非不孝也崔寔政論曰送終之家亦大無度至念親將終無以奉遣乃約其供養衣服豫修已没之制竭家盡業甘之不恨窮阨既迫起為盗賊拘執䧟罪為世大戮痛乎此俗之愚民也録異傳曰袁安葬其母逢三書生語其塟處遂至四世五公其後公路年十八驕豪故常食宻飯諸女以綘為地道遊行其上此塟地所致也謝綽宋拾遺記曰桓温塟姑熟之青山平墳不為封域于墓傍開􅎬立碑故謬其處令後代不知所在襄陽耆舊傳曰峴山南有習家魚池者習郁之所作也郁將亡勑其兒煥曰我塟必近魚池煥為起塜于池之北近池四十歩山謙之丹陽記曰}
