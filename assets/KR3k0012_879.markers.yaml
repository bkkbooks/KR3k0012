  - {type: variant, offset: 1648, length: 355, content: 其出入也時今棄而不用雹之為災誰能禦之春秋考異郵曰僖公九年秋昭三年冬並大雨雹時僖公專樂齊女綺畫珠璣之好掩月光陰精凝為災異昭公事晉陰精用密故災史記曰周孝王七年厲王生冬大雹牛馬死江漢俱動及孝王崩厲王立王室大亂漢書曰宣帝太始中山陽濟陽雨雹如鷄子深二尺五寸殺飛鳥牛馬皆死七月大司馬霍禹謀反皆伏誅八月霍皇后廢成帝時四月楚國雨雹太如斧飛鳥死時王氏專政又曰王莽時雨雹殺牛羊莽殺其少子咸時天下大亂百姓窮愁起為盜賊後漢書曰安帝初元四年六月郡國三雨雹大如鷄子殺六畜時鄧太后以陰盛專於陽政又曰獻帝初平四年六月扶風雨雹大如升殺人時天下潰亂曹操專政帝臨虛器吳志曰孫權時雨雹權聽讒太子和見廢晉書曰武帝時五月雹傷禾麥壞屋時王濬有大功被陷帝不斷陰愶陽之應又曰惠帝時六月雨雹深三尺時賈氏專政遂廢愍懷太子又曰元帝時風雹殺人時王敦擁兵不朝內外戒嚴又曰, SBCK: ''}
