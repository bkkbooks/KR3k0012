  - {type: variant, offset: 3382, length: 369, content: 六國春秋曰前趙劉聰麟嘉元年時東西赤虹經天南有一岐隋書曰周武帝建德五年圍北齊後主於晉片是夜州城上有虹首南向尾入紫宮長十餘丈六月晉州陷被擒白虹詩推度災曰撓弱不立邪臣蔽主則白虹刺日為政無常天下疑則蜺逆行周禮春官眂祲曰掌十煇之法以觀妖祥七日彌鄭司農云彌白虹彌天也玄謂彌氣貫日也史記曰鄒陽上書曰荊軻慕燕丹之義白虹貫日太子畏之應邵曰燕太子丹秦始皇遇之旡禮丹亡去故厚養荊軻令刺秦王精誠感天白虹為之貫日烈士傳曰太子丹見虹貫日不徹曰吾事不成矣漢書曰成帝即位時年二十委政諸舅王鳳王愔等兄弟五人為宰相五人同拜封號五侯五侯專權賢者屏退京兆尹王章以直言被誅正月有白虹出于營室後漢書曰唐檀永建五年舉孝廉除郎中是時白虹貫日擅因上便宜三事陳其咎徵書奏乃棄官去吳志曰諸葛恪自新城出住東興有虹見其舡還拜蔣陵白虹繞其車後遂被誅崔鴻十六國春秋曰後趙石季龍建武六年大旱白虹經天建武, SBCK: ''}
