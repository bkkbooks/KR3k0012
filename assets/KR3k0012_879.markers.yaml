  - {type: variant, offset: 2942, length: 2, content: 霧著, WYG: 秋之無氷恒燠之罸也是時任㑹稽王道子縱酒宴樂不䘏政事舒緩之應也宋書曰孝武時頻年大旱人飢死者十有六七時帝造明堂又大興師徒南巡校獵盛自矜大故旱災梁書曰武帝時大旱米斗五千文人多餓死時與魏交兵前後連年百姓勞弊魏書曰静帝天平元年諸州大旱人多流散是嵗齊神武與魏戰於沙苑死者數千人又曰武定年冬春大旱西魏師入洛齊神武親帥軍大戰於北邙死者數萬隋書曰北齊文宣天保年夏大旱時大發卒築長城四百餘里乾明年春旱先是發卒數千築金鳯聖應崇光三臺窮極侈麗不恤百姓又曰後主河清二年夏大旱突厥二萬衆毁長城㓂恒州内外肅嚴又曰隋煬帝時大旱人疫死死}
