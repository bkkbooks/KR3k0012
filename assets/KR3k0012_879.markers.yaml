  - {type: variant, offset: 854, length: 195, content: 譖出為齊州刺史武平二年三月天忽降雪一尺餘時生苗已出雪覆之蓋壟禾頭後微萎而不死百姓相謂曰禾不死及壟凍長仁在齊州密遣刺客殺士開事發勑遣使於齊州賜死則隴凍之驗赤雪晉書曰武帝太康七年河陰雨赤雪二頃霜謝承後漢書曰郎顗上事曰入歲常有霜氣月不舒光日不宣耀陛下倦於萬機政有闕也抱朴子曰若霜氣有圍城或入於城則外兵得入若霜氣從內出主人出戰京房易傳曰興兵妄誅厥災夏霜殺五穀誅不原情茲謂不仁冬先雨乃隕霜有芒角賢聖遭, SBCK: 執遇}
