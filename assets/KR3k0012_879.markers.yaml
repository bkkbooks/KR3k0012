  - {type: variant, offset: 2844, length: 1, content: 後, WYG: 武帝元光六年夏大旱是年衛青李廣公孫賀等四將軍出匈奴元朔五年春大旱是嵗六將軍衆十餘萬征匈奴元狩三年夏大旱是嵗發天下吏伐棘上林穿昆明池天漢中頻大旱是年三將軍征匈奴李陵没征和元年夏大旱閉長安城門大搜治巫蟲明年衛皇后太子死又曰宣帝本始三年夏大旱東西數千里先是五將軍二十萬衆征匈奴}
  - {type: variant, offset: 2844, length: 1, content: 後, krp: 武帝元光六年夏大旱是年衛青李廣公孫賀爲四將軍出匈奴元朔五年春大旱十餘萬衆征匈奴元狩三年夏大旱是歳發天下民吏伐棘上林穿昆明池天漢中頻大旱是年李陵没征和元年夏大旱閉長安城門大搜治巫蠱明年衛皇后太子死又曰宣帝本始三年夏大旱東西數千里先是五將軍二十萬衆征匈奴}
  - {type: variant, offset: 2845, length: 6, content: 趙石勒建平四, SBCK: 主河清}
  - {type: variant, offset: 2846, length: 0, content: '', WYG: 充國等為將續漢書曰和帝時夏旱傷苗稼其年武陵蠻陬叛寇金城又曰順帝時京師旱揚州六郡賊㓂四十九縣殺其長吏又曰桓帝時京師旱郡國飢疫人相食明年皇后崩梁兾用事尤甚又曰獻帝興平元年秋三輔旱人相食白骨委積郭汜攻李傕矢及御前李傕逼乗輿幸其營壘魏志曰有白毛玠出見黥面反者其妻子沒為官婢玠曰使天不雨盖此也太祖大怒收玠付獄大理鍾繇詰玠曰急當隂霖何以反旱玠遂黜免晉書曰武帝太始八年五月旱是時帝納荀朂邪說留賈充不復西鎮上下皆蔽之應也又李熹魯芝李𦙍等並在散職又曰太始十年四月旱去年秋冬採擇卿校諸葛沖等女五十餘人入殿簡選又取小將吏女數十人母子號哭於宫中聲聞於外行人悲酸是使積陰生陽之應又曰永寧元年春夏郡國旱是年三王討趙王倫六旬之中數十戰死者十餘萬又曰懐帝永嘉初大旱河洛江漢皆可涉是年東海王越歸京都遣兵入京收中書令繆播殺之又劉元海}
  - {type: page-break, offset: 2846, content: '', id: KR3k0012_WYG_879-8a, image: WYG0900/WYG0900-0673a.png}
  - {type: page-break, offset: 2846, content: '', id: KR3k0012_WYG_879-8b, image: WYG0900/WYG0900-0673b.png}
