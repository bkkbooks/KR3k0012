  - {type: variant, offset: 2822, length: 0, content: '', SBCK: 周亞夫劉禮徐厲等岀兵又曰武帝元光六年夏大旱是年衛青李廣公孫賀爲四將軍出匈奴元朔五年春大旱十餘萬衆征匈奴元狩三年夏大旱是歳發天下民吏伐􅁄上林穿昆明池天漢中頻大旱是年李陵没征和元年夏大旱閉長安城門大搜治巫蠱明年衛皇后太子死又曰宣帝本始三年夏大旱東西數千里先是五將軍二十萬衆征匈奴趙充國范明友等爲將又曰和帝時夏旱傷苗稼其年武靈蠻陬叛宼金城又曰順帝時京師旱楊州六郡賊㓂四十九縣殺其長史又曰桓帝時京師旱郡國飢疫人相食明年皇后崩梁兾用事尤盛又曰献帝興平元年秋三輔旱人相噉食白骨委積郭汜攻李􅔸矢及御前李􅔸逼乗輿幸其營壘魏志曰有白毛玠岀見黥反者妻子靣玠曰使天不􅀨盖此也太祖大怒収玠付獄大理鍾繇詰玠曰急當隂霖何以反旱玠遂黜免晉書曰武帝太始八年五月旱是時帝納荀朂邪􅀃留賈充不復西鎮上下皆蔽之應也又李喜魯芝李㣧等並在散職又曰太始十年四月旱去年秋冬採擇卿校諸葛冲等女五十餘人入殿簡選又取小將吏女數十人母子號哭於宮中聲聞於外行人悲酸是始積隂生陽之應又曰永寕元年春夏郡國旱是年三}
