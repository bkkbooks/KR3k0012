  - {type: 'tls:seg', offset: 2829, content: '', id: KR3k0012_CHANT_879-51a.9}
  - {type: variant, offset: 2830, length: 4, content: 黃霧晝夜, SBCK: 烈宗仁恕信任㑹稽王道子亦舒緩之應又曰隆安二年冬旱且寒甚四年夏五月秋旱時孫恩作亂桓玄疑貳内外騷動兵革方興又曰太元二十年冬無雪亦猶春秋之無氷􅁪燠之罰也是時任㑹稽王道子縱酒宴樂不䘏政事舒緩之應也宋書曰孝武時頻年大旱}
  - {type: punctuation, offset: 2834, content: ，, id: KR3k0012_CHANT_879-bkkpn956}
  - {type: 'tls:seg', offset: 2834, content: '', id: KR3k0012_CHANT_879-51a.10}
  - {type: variant, offset: 2835, length: 4, content: 不相見固, SBCK: 飢死者十有六七時帝造明堂又大興徒南廵校獵盛自矜大故旱災梁書曰武帝時大旱米升五千文人多餓死時與魏交兵前後連年百姓勞弊魏書曰静帝天平年諸州大旱人多流散是歳齊武與魏戰於沙苑死者數十萬又曰武定年冬春大旱西魏師入洛齊神武親帥}
