  - {type: variant, offset: 2786, length: 3, content: 涼張茂, WYG: 秦苻堅時久陰不雨俄而姚萇廢而殺之隋書曰文帝開皇末久陰不雨是時獨孤皇后與楊素謀廢太子為庶人而後殺之立晉王廣為太子唐書曰睿宗先天二年}
  - {type: variant, offset: 2786, length: 3, content: 涼張茂, krp: 秦符堅時乆隂不雨俄爲符堅廢而殺之隋書曰文帝開皇末乆隂不雨是時獨孤皇后與楊素謀廢太子爲庶人而後殺之立晉王廣爲太子唐書曰睿宗先天二年}
  - {type: variant, offset: 2790, length: 0, content: '', SBCK: 月隂至六月一百餘日至七月三日誅竇懐貞等十七家方晴旱尚書洪範咎徴曰僣􅁪陽􅀂君行僣差常陽順之禮記檀弓下曰歳旱穆公召縣子而問然然之言焉也曰天乆不􅀨吾欲曝尫而奚􅀂尫者靣向天兾天哀而􅀨也曰天則不􅀨而曝人之疾于虐無乃不可乎錮疾人之所哀曝之是虐然則吾欲曝巫而奚􅀂曰天則不􅀨而望之愚婦人於以求之無乃巳䟽乎徙市則奚􅀂曰天子崩巷市七日諸侯薨巷市三日爲之徙市不亦可乎徙市者庻民之䘮禮也今徙市是憂戚於旱􅀂䘮也左傳僖公曰夏大旱公欲焚巫尫臧文仲曰非旱備也脩城郭貶食省用務嗇勸分嗇儉也勸分有無相濟此其務也巫尫何爲天欲殺之則如勿生􅀂能爲旱焚之滋甚公從之是歳飢而不害不傷害民又昭公時鄭大旱使屠擊有事於桑山有事􅀕也斬其木不􅀨子産曰有事於山藝山林也藝養護令繁殖而斬其木其罪大矣奪之官邑春秋考異郵曰旱之言悍也陽驕蹇所致也春秋繁露曰水干土則大旱洪範五行傳曰魯桓公五}
  - {type: page-break, offset: 2790, content: '', id: KR3k0012_SBCK_879-3a}
  - {type: variant, offset: 2790, length: 0, content: '', WYG: 月陰至六月一百餘日至七月三日誅竇懐貞等十七家方晴旱尚書洪範咎徵曰僣恒𤾉若君行僣差常陽順之禮記檀弓下曰嵗旱穆公召縣子而問然然之言焉也曰天久不雨吾欲曝尫而奚若尫者面向天兾天哀而雨也曰天則不雨而曝人之疾子虐毋乃不可乎尫疾人之所哀曝之是虐然則吾欲曝巫而奚若曰天則不雨而望之愚婦人于以求之毋乃已䟽乎徙市則奚若曰天子崩巷市七日諸侯薨巷市三日為之徙市不亦可乎徙市者庶民之䘮禮也今徙市是憂戚于旱若䘮也左𫝊僖公曰夏大旱公欲焚巫尫臧文仲曰非旱備也脩城郭貶食省用務嗇勸分嗇儉也勸分有無相濟此其務也巫尫何為天欲殺之則如勿生若能為旱焚之滋甚公從之是嵗饑而不害又昭公時鄭大旱使屠擊有事于桑山有事祭也斬其木不雨子産曰有事于山藝山林也藝養䕶令繁殖而斬其木其罪大矣奪之官邑春秋考異郵曰旱之言悍也陽驕蹇所致也春秋繁露曰水干土則大旱洪範五行𫝊曰魯桓公五}
