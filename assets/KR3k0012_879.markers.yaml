  - {type: variant, offset: 2804, length: 4, content: 前趙劉聰, SBCK: 旱所謂常陽不謂常陽而謂旱者以旱爲災也旱之爲言乾也萬物傷於乾而不得水也君持亢陽之節􅁀虐於下興師旅動衆勞民以起城邑臣下悲怨而心不從故陽氣盛而失度故旱災應也物理論曰陽盈而過故致旱家語曰哀公問孔子曰旱如之何孔子曰㓙年則乗駑馬力役不興馳道不備馳道君祈所行道祈以幣玉有王所祈請用弊及王不用牲也􅀕事不見不縣不作樂也祀以下牲當用大牢者用少牢此則賢君自貶以救民之禮也史記曰紂未年大旱俄爲武王所殺滅也又曰晉莊伯}
  - {type: page-break, offset: 2804, content: '', id: KR3k0012_SBCK_879-4a}
  - {type: variant, offset: 2804, length: 4, content: 前趙劉聰, WYG: 魯宣公十年秋大旱是時公與齊伐莱夫伐國亢陽節也師徒百姓所不欲也故應是而大旱也又曰旱所謂常陽不謂常陽而謂旱者以旱為灾也旱之為言乾也萬物傷于乾而不得水也君持亢陽之節暴虐于下興師旅動衆勞民以起城邑臣下悲怨而心不從故陽氣盛而失度故旱災應也物理論曰陽盈而過故致旱家語曰景公問孔子曰旱如之何孔子曰㐫年則乗駑馬力役不興馳道不脩馳道君祈所行道祈以幣玉君所祈請用幣及玉不用牲也祭祀不縣不縣不作樂也祀以下牲當用太牢者用少牢此賢君自貶以救民之禮也史記曰紂末年大旱俄為武王所殺滅也又曰晉莊伯}
