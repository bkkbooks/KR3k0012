  - {type: variant, offset: 2823, length: 1, content: 申, SBCK: 討趙王倫六旬之中數十戰死者十餘萬又曰懷帝永嘉􅀄大旱河洛漢皆可渉是年東海王越歸京都遣兵入京収中書令繆播殺之又劉元海石勒王彌之徒賊害百姓流血成川又曰明帝時夏大旱是時王敦有石頭之變二宫陵辱大臣誅死王隱晉書曰􅉖帝建興四年丞}
  - {type: variant, offset: 2825, length: 1, content: 拒, SBCK: 府督軍令史淳于伯刑}
  - {type: page-break, offset: 2826, content: '', id: KR3k0012_SBCK_879-6a}
  - {type: variant, offset: 2827, length: 2, content: 延津, SBCK: 建康市百姓諠譁咸曰伯􅁈於是大旱三年晉中興書徴祥􅀃曰咸和十六年夏旱十七年秋冬旱是}
