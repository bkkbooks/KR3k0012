  - {type: variant, offset: 2951, length: 0, content: '', WYG: 天果大雨隋巢子曰幽厲之}
  - {type: variant, offset: 2952, length: 0, content: '', krp: 群盗烽起}
  - {type: variant, offset: 2953, length: 0, content: '', WYG: 旱地拆尸子曰湯之救旱也素車白馬布衣身嬰白茅以身為牲當此時也絃歌鼓舞者禁之韓子曰晉平公使師曠奏清徵師曠曰清徴不如清角平公曰清角可得聞乎師曠曰君徳薄不足以聽之將恐有敗平公曰寡人老矣所好者音願遂聽之師曠不得已而鼔之一奏之有雲從西北方起再奏之大風至大雨隨之裂帷幕破俎豆坐者散走平公恐懼伏於室晉國大旱赤地三年公之身遂病焉師曠占曰嵗旱旱草先生旱草者蒺藜也京房别對灾異曰久旱何人君無施澤惠利于}
  - {type: page-break, offset: 2953, content: '', id: KR3k0012_WYG_879-12a, image: WYG0900/WYG0900-0675a.png}
  - {type: variant, offset: 2954, length: 0, content: '', SBCK: 旱百姓流亡時發四海}
  - {type: variant, offset: 2954, length: 1, content: 兵, WYG: 人則旱不救即蝗蟲害榖人君亢陽暴虐興師動衆下人悲怨陽氣盛陰氣沉故旱萬物枯死數有火災此金失其性若夏大旱則雩祠之以素車白馬布衣以身為牲或云誅讒佞之臣於市則三日之内雨降於天矣説苑曰湯之時大旱七年百川竭煎沙爛石於是使人持三足鼎祀山川教之祝曰政不節耶使民疾耶苞苴行耶讒夫昌耶宫室崇耶女謁盛耶何不雨之甚也黃帝占書曰日中三足烏見者大旱赤地寒京房易𫝊曰有徳遭險兹謂逆命厥異寒洪範五行𫝊曰聽之不聰是謂不謀厥罰恒寒史記曰秦始皇九年四月大寒人凍死時嫪毒及大臣二十人餘車裂以殉夷滅宗族遷四千餘家於房陵晉書徴祥説曰大興四年冬大寒民凍死是時王敦肆亂天子弗能禁魏書曰静帝武平年二月大寒人畜凍死疫史記曰秦始皇三年虫}
