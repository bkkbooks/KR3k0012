  - {type: variant, offset: 2986, length: 158, content: 一月王敦舉兵崔鴻十六國春秋曰前趙劉聰建元元年正月朔日黑霧四塞終日竟夜著人如墨五日而止後三年聰子粲殺其弟虹蜺易通卦驗曰虹不時見女謁亂公虹者陰陽交接之氣陽倡陰和之象今失節不見者似人君心在房內不循外事廢禮失義夫人淫恣而不制故曰女謁亂公京房易妖占曰虹出君池若飲君井其君無後春秋潛潭巴曰虹五色迭至照于宮殿有兵革之事春秋感精符曰, WYG: ''}
