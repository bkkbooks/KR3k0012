  - {type: variant, offset: 2818, length: 2, content: 車騎, SBCK: 使荀呉齊使慶封來聘是夏邾子來朝襄公自大應之又曰昭公三年八月大雩公居䘮不哀亢陽失衆六年九月雩先是莒牟夷以二邑來奔莒怒伐魯亢陽動衆之應十六年九月大雩昭公夫人薨昭公不慼又大蒐于比蒲魯有大哀君無慼容殆其失國二十五年七月大雩旱甚又劉歆以爲時君與季氏有􅂩昭公伐季氏爲季氏所敗出奔齊漢書曰惠帝五年夏大旱江河水少谿水絶先是發男女十四萬人城長安又曰文帝時秋大旱其年濟北王興居反伏誅五年春天下大旱匈奴入上郡雲中烽火通長安三}
  - {type: page-break, offset: 2818, content: '', id: KR3k0012_SBCK_879-4b}
  - {type: variant, offset: 2818, length: 2, content: 車騎, WYG: 使荀吳齊使慶封來聘是夏邾子來朝襄公有亢陽自大之應又曰昭公三年八月大雩公居䘮不哀亢陽失衆之應六年九月大雩先是莒牟夷以三邑來奔莒怒伐魯亢陽動衆之應十六年九月大雩昭公夫人薨昭公不戚又大蒐於蒲魯有大哀公無戚容殆其失國二十五年七月大雩旱甚又雩劉歆以為時君與季氏有隙昭公伐季氏為季氏所敗出奔齊又曰惠帝五年夏大旱江河水少谿谷絶先是發男女十四萬人城長安又曰文帝立是秋大旱其年濟北王興居反伏誅五年春天下大旱匈奴入上郡雲中烽火通長安三}
