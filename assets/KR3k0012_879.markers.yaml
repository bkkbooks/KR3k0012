  - {type: variant, offset: 2942, length: 2, content: 霧著, krp: 秋之無氷恒燠之罰也是時任㑹稽王道子縱酒宴樂不䘏政事舒緩之應也宋書曰孝武時頻年大旱人飢死者十有六七時帝造明堂又大興徒南廵校獵盛自矜大故旱災梁書曰武帝時大旱米升五千文人多餓死時與魏交兵前後連年百姓勞弊魏書曰静帝天平年諸州大旱人多流散是歳齊武與魏戰於沙苑死者數十萬又曰武定年冬春大旱西魏師入洛齊神武親帥軍大戰於北邙死者數萬隋書曰北齊文宣天保年夏大旱時大發卒築長城四百餘里乾明年春旱先是發卒數十數築金鳯聖應崇光三臺窮極侈麗不恤百姓又曰後主河清年夏大旱突厥二十萬衆毀長城㓂恒州内外纂嚴又曰隋煬帝時大旱人疫死死}
  - {type: variant, offset: 2946, length: 4, content: 墨連夜五, WYG: 山明年楊𤣥感反于時羣盗蜂起天下離叛之應又發卒百餘萬築長城百姓失業至八年天下旱百姓流亡時發四海兵親征髙麗六軍凍餒死者十八九至十三年天下大旱時郡縣鄉邑悉築長城男女無少長皆就役管子曰春不收枯骨朽胔伐枯木而去之則夏旱至矣晏子春秋曰齊大旱景公召羣臣問曰天不雨久矣民皆有飢色吾使人卜之祟在髙山廣澤寡人欲賦歛以祠靈山可乎羣臣皆莫對者晏子進曰不可祠此無益也夫靈山固以石為身以草木為毛髮天不雨髮將枯身將熱彼獨不欲雨乎祠之何益公曰不然吾欲祠河伯可乎晏子曰不可河伯以水為國以魚鱉為民天久旱不雨水泉將下百川將竭國亡民滅矣彼獨不欲雨乎祠之何益景公曰今為之奈何晏子曰君試避宫殿曝露與山河共憂其幸而雨景公即出曝露三}
