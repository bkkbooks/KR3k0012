  - {type: variant, offset: 2004, length: 293, content: 帝時京都大雨雹鷰雀死又曰四月大雨雹是年蘇峻為亂又曰穆帝時六月雨雹大如升後四年張祚在涼州為宋混所滅宋書曰文帝元嘉三十年五月盱眙雨雹大如鷄卵明年冬太子劭兵亂隋書曰梁武帝大通年四月雹時帝數捨身作奴為沙門所制陰愶陽之應崔鴻十六國春秋曰後趙石勒時暴風大雨雹震建德殿端門襄國市西門倒殺五行電起西河大如鷄子平地三尺洿下丈餘行人禽獸死者萬數歷千餘里樹禾催折禾稼蕩然勒問徐光光曰去年不禁寒食介推帝鄉之神也歷代所尊故有此災又曰石遵時雨雹大如盂升立百餘日為石鑒所殺鑒為冉閔殺之隋書曰陳宣帝太建二年六月大雨雹十年四月又大雨雹始興王叔陵刺後主於喪次據東府反俄而伏誅霧禮記月令曰仲冬行夏令則氣霧冥冥霜霧之氣也散相亂, SBCK: 効}
