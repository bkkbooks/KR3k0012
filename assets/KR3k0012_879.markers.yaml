  - {type: variant, offset: 2799, length: 2, content: 茂死, SBCK: 天子使大夫來聘桓上得天子之意下得大國之心則有亢陽之意以御臣下興邢丘之役以勞百姓則臣下離心而不從故應是而秋大旱又曰魯宣公十年秋大旱是時公與齊伐萊夫代國亢陽節也師旅百姓所不欲也故應是而大旱}
