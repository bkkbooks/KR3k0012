  - {type: variant, offset: 1050, length: 179, content: 其霜附木不入地毛詩曰正月繁霜我心憂傷正月夏之四月也繁多也四月建巳純陽用事霜多急恒寒苦之異傷害萬物故心憂也春秋考異郵曰魯僖公即位隕霜不殺草李梅實梅李大樹比草為貴是君不能伐也定公即位隕霜不殺菽菽者稼最強李氏之萌又曰穆公即位仲夏霜殺草日中不消春秋命曆序曰桀無道夏出霜師曠占曰春夏一日有霜者君父母治政大嚴大殺天以示之何以言之霜威殺萬草坐大殺也見變如此宜損威殺重人之命, SBCK: 隂}
