  - {type: variant, offset: 5, length: 2, content: 下鬻, SBCK: 醫曰食齊眡春時飯冝温也禮記曰飯曰諸飯也􅁰稷稻梁白􅁰黃梁稰樵熟獲曰稰生獲曰穛􅁰黄􅁰也又曰文王有疾武王不晚冠帶而養言常在側文王一飯亦一飯文王再飯亦再飯欲知氣力箴藥所勝又曰燕侍食於君子則先飯而後巳所以勸也母放飯母流歠小飯而亟之亟疾也備噦噎若見問也數噍母爲口容口容弄口論語曰}
  - {type: variant, offset: 5, length: 2, content: 下鬻, WYG: 醫曰食齊眡春時飯宜温也禮曰飯目諸飯也黍稷稻粱白黍黄粱稰穛又曰文王有疾武王不脱冠𢃄而養文王一飯亦一飯文王再飯亦再飯又曰侍食於君子則先飯而後已毋放飯毋流歠小飯而亟之數噍毋為口容論語曰}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_850-1b, image: WYG0900/WYG0900-0496d.png}
  - {type: variant, offset: 5, length: 2, content: 下鬻, krp: 醫曰食齊眡春時飯冝温也禮記曰飯曰諸飯也黍稷稻梁白黍黃梁稰樵熟獲曰稰生獲曰穛黍黄黍也又曰文王有疾武王不晚冠帶而養言常在側文王一飯亦一飯文王再飯亦再飯欲知氣力箴藥所勝又曰燕侍食於君子則先飯而後巳所以勸也母放飯母流歠小飯而亟之亟疾也備噦噎若見問也數噍母爲口容口容弄口論語曰}
