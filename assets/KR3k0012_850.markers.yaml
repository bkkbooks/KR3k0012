  - {type: variant, offset: 2062, length: 0, content: '', SBCK: 人之女爲臣炊彫胡之飯潘尼釣賦曰紅麵之飯精以菰梁五味道洽餘氣芬芳枚乗七發曰楚苗之食安胡之飯搏之不解一啜而散􅁊麟七􅀃曰香箕爲飯􅄂以粳菰散如細蚳􅅮似凝膚應璩薪詩曰竈下炊牛矢甑中莊豆飯孫子楚祀介子推祝文曰􅀥飯一盤王􅀕七釋曰西旅遊梁御􅀫素􅀕􅀲州紅麹叅糅相半軟滑膏潤入口流散傅選七誨曰孟冬香秔上秋膏梁彫胡菰子丹貝東牆濡潤細滑流澤芬芳飱釋名曰飱散也投飯於水中各散也通俗文曰水澆飯曰飱音孫春秋左氏傳曰晉公子重耳及曹曹共公聞其駢脅欲觀其祼薄而觀之薄迫也駢䝱合幹僖􅀒羈之妻曰吾觀晉公子之從者皆足以相國􅀂以相􅀂遂以爲傅相夫子必反其國反其國必得志於諸侯得志於諸侯而誅無禮曹其首也子盍早自貳焉自貳自別異於曹乃饋盤飱寘璧焉臣無境外之交故用盤藏壁飱中不欲令人見也公子受飱反璧又曰晉侯問原守於寺人勃鞮對曰昔趙衰以壷飱從徑餧而不食遂使處原韓子曰晉文岀亡箕鄭挈壷飱而從迷失道與公相失飢而道泣不敢食及公反國克原而使爲原之守曰夫經飢餧之患而必全壷飱是將不以原畔也渾軒聞而非日以不動壷飱之故其不以原畔不亦無術乎夫明主不恃其不我畔吾不可畔也不恃其不我畔恃吾不可欺也戰國䇿曰中山君走有二人隨其後曰臣父甞戯君下壷飱餔臣父故來死君也國語曰越王召范蠡而問焉曰諺有之諺俗之善語曰觥飯不及壷飱觥大也大飯盛饌也盛饌未具不能以虚待之不及壷飱之救飢疾也巳欲滅呉取快}
