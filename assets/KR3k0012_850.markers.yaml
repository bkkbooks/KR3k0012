  - {type: variant, offset: 72, length: 0, content: '', SBCK: 莽信之續漢書曰羊陟拜河南尹常食乾飯後漢書曰王郎起光武至南宫遇大風雨引車入道傍空舎溤異抱薪鄧禹􅋹火光武對竈燎衣異進麥飯兎肩謝丞後漢書曰左雄爲兾州刺史長食乾飯司馬苞爲太尉常食漉飯李固爲太尉常食麥飯王暢爲南陽太守作飯塩豉菜茹羊茂爲東郡太守常食乾飯胡劭爲淮南太守使鈐下閣外炊曝作乾飯漢舊儀曰齊法二人施案陳三十六肉食九榖飯魏書曰卞太后左右食菜粟飯魏畧曰王朗㑹稽敗太祖盛㑹啁之曰不能効君昔在㑹稽折粳米飯朗曰冝適難值如朗者未可折而折明公今日可折而不折也呉書曰􅀽術在壽春百姓飢窮以桑椹蝗蟲爲乾飯又曰是儀服不精細食不重膳家無儲稸孫權聞之幸儀舎求視􅂼飯親嘗之歎息即増俸賜晉書曰石崇家稻米飯在地經􅀫皆化爲螺時人以爲族滅之應又曰衛瓘家人炊飯墮地盡化爲螺歳餘而及禍也又曰殷仲堪自在荆州連年水旱百姓飢饉仲堪食常五椀盤餘肴飯粒落席間輙拾以噉之雖欲率物亦縁其性真素也宋書曰衡陽王義季都督荆州甞大蒐於郊者野老帶苫而耕命左右斥之老人擁來對曰昔有楚子盤遊受譏令尹今陽和扇氣播厥之始一日不作人失其時大王馳騁爲樂驅斥老夫非勸農之意義季止馬曰此賢者也命賜之食老人曰吁願大王均其賜也茍不奪人時則一時皆享王賜老人不偏其私矣斯飯也弗敢當問其名不言而退南史曰宋􅀄呉郡人陳遺少爲郡吏母好食鐺底飯遺在役恒帶一囊毎煑食輙録其焦以貽母後孫息亂聚得數斗恒帶自隨及敗逃竄多有餓死遺因此得活母晝夜泣涕目爲失明耳無所聞遺還入户再拜號咽母豁然即明梁書曰謝蘭五歳時父亡未食乳媪欲令飯蘭終不進舅阮孝緒聞之歎曰此兒在家則曽子之流事君則藺生之疋因名曰藺稍授以經史過日便能諷誦孝緒毎曰吾家陽元也􅀽淑家陽元又曰齊荀兒之役臨汝侯嘲羅研之曰卿蜀人樂禍貪亂一至於此對曰蜀中積弊實非一朝百家爲村不過數家有食窮迫之人十有八九􅅞束之使旬有二三貪亂樂禍無足多恠􅀂令家畜五母之雞一母之豕牀上有百錢布􅀍甑中有數􅂛麥飲雖􅂫張巧􅀃於前韓白按劒於後將不能使一夫爲盗况貪亂乎又曰魚私爲湘東王鎮西司馬述職西上道中乏食縁路採麥米飯給所部弘度之所後人覔一麥不得又於窮洲之上捕得數百猕猴以爲脯以供酒食又曰􅀓翽代劉􅀇明爲山隂令問􅀇明曰願以舊政造新令尹荅曰我有竒術卿家譜所不載臨別當相示旣而曰作縣唯日食一􅂛飯而莫飲酒此第一䇿也又曰裴元禮爲西豫州刺史母憂居喪唯食麥飯又曰沈衆永定二年兼兵部尚書監起太極殿恒衣布􅂁芒屩以麻繩爲帶又囊麥飯䬳以噉之朝士咸共誚其所爲陳書曰孔奐爲武康令武帝尅日决戰乃令奐多營麥飯以荷葉褁之一宿之間得數萬褁軍人食訖盡弃其餘崔鴻前􅁗録曰符堅以乞活夏􅀧爲左鎮郎胡人護磨那爲右鎮郎奄人申香爲拂蓋郎􅀧等身長一丈八尺並多力善射三人每食飯一石肉三十斤後魏書曰楊播兄弟雍睦播毎出或日斜不至不先飯待還然後食又曰盧義僖爲都官尚書性清儉不營財利雖居顯位毎至困乏麥飯􅂼食然亦甘之也又曰闞因}
