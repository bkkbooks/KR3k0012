  - {type: variant, offset: 2051, length: 5, content: 說𩥄馬啖賓, WYG: 説不大餓不在車飯謂正得一車飯不復活也或曰輔車上飯小小不足濟也案呉郡名酒杯為􅦝言大餓人得一􅦝飯無益也寕相六不守熟案蒸飯更泥謂之饀音與相似也􅅗夫論曰夫粱飯食肉有好於面目不若糲粢藜蒸之可食於口也物理論曰忿㸑之未熟覆甑而棄之所害亦多矣西京雜記曰公孫𢎞起家徒歩至丞相故人齊賀従之𢎞食以脱粟覆以布被賀怨曰何用故人富貴乎脱粟布被我自有之𢎞大慙賀乃吿人曰公孫𢎞内服貂蟬外服麻枲内厨五鼎外膳二餚豈可以示天下哉於是朝廷自此疑矯焉𢎞聞之歎曰寕逢惡賔不逄故人風土記曰精折米十取七八淅使青蒸而飯色乃紫紺于東流水飯食而除不祥通俗文曰飯臭曰饐沙入飯曰糝録異𫝊曰袁公路年十八常飯乳食蜜飯異苑曰衛士度苦行居士也其母常誦經曽出自齋空中下大鉢香飯滿中母分賦齋人皆七日不飢禰衡别𫝊曰劉表常作上事極以為快衡見之便滅敗投地曰作此筆者為食飯不孟宗别𫝊曰宗為光禄勲大會醉吐麥飯察者以聞詔問食麥飯意宗答臣家足有米麥飯是愚臣所安是以食之孔衍在窮記曰彭城王送橡飯十斛葛仙翁𫝊曰仙翁與}
