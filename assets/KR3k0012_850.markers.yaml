  - {type: variant, offset: 2063, length: 0, content: '', SBCK: 得之而巳不能待有餘力又曰敵國賔至􅀜尹以告膳宰致飱熟食日飱廪人獻餼沈約宋書曰文帝爲王􅀇謨作四時詩曰粟飱充夏飡頋和與蔡謨書曰夏侯家言食漿酪飱猶勝於羹飯耳黍釋名曰􅁰汝也相黏汝也禮記曲禮上曰飯􅁰無以箸又曲禮下曰􅀕宗廟􅁰曰薌合論語微子曰文人止子路􅀫殺雞爲􅁰食之家語曰孔子侍坐於哀公賜之桃與􅁰孔子先食􅁰而後食桃左右皆掩口而􅀏公曰􅁰者所以雪桃非爲食之也孔子對曰丘知之矣夫黍者五榖之長也郊祀宗廟以爲上盛果属有六而桃爲其下􅀕祀不登郊廟丘聞之也君子以賤雪貴不聞以貴雪賤今以五􅂖之長雪果之下者是從上雪下也臣以爲妨於教害於義故不敢公曰善謝承後漢書曰范式與張元伯爲友春別京師以秋爲期至九月十五日殺雞爲􅁰言}
