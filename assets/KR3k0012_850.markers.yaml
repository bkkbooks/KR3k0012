  - {type: variant, offset: 2062, length: 3, content: 意未盡, WYG: 人之女為臣炊彫胡之飯潘尼釣賦曰紅麯之飯糅以菰粱五味道洽餘氣芬芳枚乗七發曰楚苖之食安胡之飯摶之不解一啜而散桓驎七説曰香箕為飯雜以粳菰散如細蚳摶似凝膚應璩新詩曰竈下炊牛矢甑中莊豆飯孫子楚祀介子推祝文曰􅀥飯一盤王粲七釋曰西旅游粱御宿清穄𤓰州紅麯參揉相半軟滑膏潤入口流散傅選七誨曰孟冬香秔上秋膏粱彫胡菰子丹具東牆濡潤細滑流澤芬芳飱説文曰飱散也投飯於水中各散也通俗文曰水澆飯曰飱春秋左氏𫝊曰晉公子重耳及曹曹共公聞其駢脅}
