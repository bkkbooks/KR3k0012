  - {type: variant, offset: 2059, length: 2, content: 已闕, SBCK: 吐口中飯盡成飛蜂良乆乃張口蜂皆飛還入口中成飯安成記曰安成郡毛亭二十里田疇膏􅃾厥稻馨香飯􅀂凝脂四王起事曰惠帝還洛陽路中作飲食宫人有持􅂛餘米飯者澆以供至尊丗􅀃曰葛公曽在武帝坐上食進飯曰此是勞薪炊也帝宻遣問外云實是故車脚時鏡新書曰歳暮家家具有肴蔌謂爲􅀫歳之儲以入新年也相聚酣歌名爲送歳留宿飯至新年十二則弃於街衢以爲去故取新除貧取冨陶朱公猗頓此事無輟又留此飯湏驚蟄雷鳴擲之屋上令雷聲逺焦贛易林曰南箕無舌飯多沙糖離騷曰精瓊靡以爲飯精鑿玉屑以爲飯也宋玉風賦曰}
