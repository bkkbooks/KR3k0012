  - {type: variant, offset: 2487, length: 1209, content: 丈結構巧麗窮盡神工臺內有金机彫文備制上有百味之食四丈力神常立守護有一五通仙人來欲甘膳四神排擊遷延而退又曰河南趙良與其鄉人諸生到長安界遇霖雨糧乏相謂曰飢正爾當那得食耶應時美飯備在前兩人驚愕不敢食有人聲曰但食無嫌也明日早兩人復曰那復得美食即復在前遂至長安無他禍福祖台之志怪曰建康小吏曹著見廬山夫人夫人為設酒噉金鳥啄甖其中鏤刻奇飾異形非人所名下七子合盤盤中亦無俗中餚秦記曰符朗甚別味會稽王道子為朗設盛饌問曰關中之食孰若此荅曰皆好唯鹽味少生嵩高山記曰山下巖中有一石屋亦有自然經書自然飲食愽物志曰魏明帝時京邑有一人食噉兼十人遂肥不能動其父嘗為遠方長吏送彼往縣令故義傳食之一二年間一鄉為儉齊諧記曰江夏郡安陸縣有人姓郭名坦兄弟三人其大兒忽得時行病病後遂大能食一日食斛餘米其家供給五年乃至罄貧語曰汝當自覓食後至一家門前已得筥飯後門乞此家出語之汝已就前門得那復後門乞其人荅曰實不知君有兩門腹大饑不可忍後門有三畦韭一畦大蒜因噉兩畦便大悶極臥地須臾大吐吐一物似籠出地漸漸大及主人持飯出不復能食遂撮飯內著向所吐物上即消成水此人於此病遂得差袁准正書曰方丈之食不過一飽綈袍之繡不過一煖裴玄新言曰管仲奪伯氏駢邑三百使之飯蔬食沒齒無怨言若管氏取以營私則一邑不可奪也又曰孝子欲親之食云我已食欲親之衾云我不寒此漫孝也神仙傳曰焦先者字孝然河東太陽人鄉里累世云百七十歲常煮白石以與人熟如大芋者日日入山伐薪以布施先從村頭一家起周而復始擔薪以置人門外人見之時即鋪席與坐為設食先便就坐食亦不與人語若人不見其擔薪往時乃置薪於人門間便去連年如此結草庵於河渚或數日一食欲食則為人賃作人以衣衣之乃使限功受直足得一食輒去人欲多與終不肯取亦有數日不食時東晢發蒙記曰廉頗畢老日噉肉百斤曹植與吳季重書曰食若填溝壑飯若灌漏巵其人固難量豈非大丈夫之樂哉世說曰陳太丘詣荀朗陵貧儉無僕從迺使元方將車季方持杖從後長文尚小載著車中既至荀使叔慈應門慈明行酒餘六龍下食又曰桓公坐有參軍椅蒸薤不得解共食者又不助而掎終不放生者笑桓公曰同盤尚不相助況復危難勑令免官又曰劉真長王仲祖共行日旰未食有相識小人貽其飡者肴案甚盛真長辭焉仲祖曰聊以充虛何若真曰小人都不可作緣又曰羊曼拜丹陽尹客早者並得佳設日晏則漸罄不復及精隨客早晚不問貴賤羊固拜臨海飲食皆美雖晚至者猶獲其盛饌時論以固之豊腆乃不如曼之真率也又曰王東亭嘗之吳郡就汰公道人宿別脯許府家往瓦官寺設慢屋竟一寺東亭將夕至夜後汰公設豆藿麋汰公自噉一大甌東亭難汰公遂強進半甌須臾東亭行帳設名飲食果炙畢備汰公都無所噉俗說曰桓琙音城性噉犬每暝琙時使從兄索食黃帝八十一問曰人不食七日而死者何也然人胃中常有留穀三㪷五升水三升故平人一日再至清一行二升半日中五勝七日七五三㪷五勝而水穀盡矣故平人不食飲七日而死者水穀津液俱盡故也弘君舉食檄曰又取灄湖獨穴之鱧灄音攝赤山後陂之蒪伺漉泠豉及熱應分食畢作躁酒炙宜傳酒便清香肉則豆不㹀麞肶若披繙急火中炙脂不得董聞香者躑躅千咽者塞門羅奠椀子, SBCK: ''}
