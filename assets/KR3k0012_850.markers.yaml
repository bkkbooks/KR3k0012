  - {type: variant, offset: 2051, length: 5, content: 說𩥄馬啖賓, SBCK: 􅀃不大餓不在車飯謂正得一車飯不復活也或曰輔車上飯小小不足濟也案呉郡名酒杯爲􅦝音章言大餓人得一􅦝飯無所益也寕相六不守熟案蒸飯更泥謂之餾音與六相似也潜夫論曰夫梁飯食􅁏有好於面目不􅀂糲粢䔧蒸之可食於口也物理論曰忿㸑之未熟覆甑而弃之所害亦多矣西京雜記曰公孫弘起家徒歩爲丞相故人齊賀從之弘食以脫粟覆以布􅀍賀怨曰何用故人冨貴乎脫粟布􅀍我自有之弘大慙賀乃告人曰公孫弘内服貂蟬外衣麻枲内厨五鼎外膳二肴豈可以示天下哉於是朝廷自此疑矯焉弘聞之歎曰寧逢惡賔不逢故人風土記曰精浙米十取七八浙使香蒸而飯色乃紫紺於東流水飯食而洗除不祥通俗文曰飯臭曰沙入飯曰􅃤録異傳曰􅀽公路年十八常飯乳食蜜飯異苑曰衛士度苦行居士也其母常誦經曽出自齋空中下大鉢滿中香飯母分賦齊人皆七日不飢祢衡別傳曰劉表甞作上事極以爲快衡見之便滅投地曰作此筆者爲食飯不孟宗別傳曰宗爲光禄勲大㑹醉吐麥飯察者以聞詔問食麥飯意宗荅臣家足有米麥飯直愚臣所安是以食之孔衍在窮記曰彭城王送飯十斛􅁑仙公傳曰仙公與}
