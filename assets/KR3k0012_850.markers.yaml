  - {type: variant, offset: 1850, length: 3, content: 王子喬, SBCK: 䑕渉飯中􅂢而}
  - {type: variant, offset: 1850, length: 3, content: 王子喬, WYG: 䑕渉飯中損而}
  - {type: variant, offset: 1850, length: 3, content: 王子喬, krp: 䑕渉飯中捐而}
  - {type: variant, offset: 1855, length: 191, content: 穀壽百歲按人生稟飲食之性故形上有口齒下有孔竅以注寫口齒以進食王子喬形體與人同何以獨能度世耶夫衣以溫膚食以充腹衣溫食飽則精神明盛人之生也以食為氣草木以土為氣閉口不食拔草離土必不壽矣桓譚新論曰太原郡隆冬不火食五日雖病不敢觸犯王者宜應改易潛夫論曰何知國之將亂也以其不嗜賢也故病家之廚非無饌也乃其人弗之能食故遂至於死也亂國之官非無賢也乃其君弗能存故遂亡矣又曰欲知人且疾不嗜食欲知國將亡不嗜賢, SBCK: ''}
