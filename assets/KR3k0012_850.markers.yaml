  - {type: variant, offset: 2059, length: 2, content: 已闕, WYG: 吐口中飯盡成飛蜂良久乃張口蜂皆飛還入口中成飯安成記曰安成郡毛亭二十里田疇膏腴厥稻馨香飯若凝脂四王起事曰恵帝還洛陽路中作飯食宫人有持升餘米飯者澆以供至尊世説曰荀公曹在武帝坐上食進飯曰此是勞薪炊也帝宻遣問外云寔是故車脚時鏡新書曰歳暮家家具有餚䔩謂為宿歳之儲以入新年也相聚酣歌名為送歳留宿飯至新年十二則棄於街衢以為去故取新除貧取富陶朱公倚頓此事無輟又留此飯須驚蟄雷鳴擲之屋上令雷聲逺焦贛易林曰南箕無舌飯多沙糖離騷曰精瓊糜以為粻宋玊風賦曰}
