  - {type: variant, offset: 631, length: 362, content: 管仲束縛自魯之齊路飢而泣過綺邑乞食封人跪飧之因竊謂仲曰若用齊將何報我曰如子之言我且賢之用能之使勞之倫我何報子封人怨之又曰季孫相魯子路為都令魯以五月起眾為長溝當此時子路以其私秩粟為漿飲要溝者於五衢而飡之孔子聞之使子貢往覆其飲擊毀其器曰魯君有民子奚為乃飡之子路怒攘肱而入請曰夫子疾由之為仁義乎所學於夫子者仁義也仁義者與天下共而同其利者也今以由之秩粟而飡民其不可何也孔子曰由之野也吾以女知之女徒未及也女故如是之不知禮也女之飡之為愛之也夫禮天子愛天下諸侯愛境內大夫愛官職士愛其家過其所愛曰侵今魯君有民而子擅愛之是子侵也不亦誣乎言未畢而季孫使者至讓曰肥也起民而使之先生令弟子從役止而飡之將奪肥民耶孔子駕而去魯又曰凡人上不屬天下而不著地以筋骨為根本不食則不能活是以不免於欲利之心欲利之心不除其身之憂也故聖人衣可犯寒食足以充虛則不憂矣又曰, SBCK: ''}
