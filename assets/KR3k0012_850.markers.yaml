  - {type: variant, offset: 3, length: 1, content: 七, WYG: 八飯飱黍飯周書曰黄帝始蒸榖為飯周禮天官曰}
  - {type: variant, offset: 3, length: 1, content: 七, krp: 八飯飱黍飯周禮曰黄帝始蒸榖爲飯周禮天官}
