  - {type: variant, offset: 2197, length: 228, content: 屬但以為時味之宜不合之於五行月令服飾所食器械之制皆從五行者說所食獨不以五行已略乎曰亦嘗思之矣凡十二辰之會五時所食者必家人所畜丑牛未羊戍犬酉雞亥豕而已其餘虎以下非食也汝南先賢傳曰周舉字宣光為并州刺史太原舊俗以介子推燒死至其亡時民為絕火食老少多死舉作書置子推廟中說民不宜寒食因勒使炊食如故益部耆舊傳曰何祇字君肅為人寬厚通濟體其壯大能食飲好聲色不治節儉時人少貴之者曹毗杜蘭香傳曰蘭香戒張碩不露頭食永昌郡傳曰獠民口嚼食并以鼻飲水異苑曰新野蘇卷與婦佃於野舍每至飲時輒, SBCK: ''}
