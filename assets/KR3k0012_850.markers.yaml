  - {type: variant, offset: 3048, length: 648, content: 七十歲常煮白石以與人熟如大芋者日日入山伐薪以布施先從村頭一家起周而復始擔薪以置人門外人見之時即鋪席與坐為設食先便就坐食亦不與人語若人不見其擔薪往時乃置薪於人門間便去連年如此結草庵於河渚或數日一食欲食則為人賃作人以衣衣之乃使限功受直足得一食輒去人欲多與終不肯取亦有數日不食時東晢發蒙記曰廉頗畢老日噉肉百斤曹植與吳季重書曰食若填溝壑飯若灌漏巵其人固難量豈非大丈夫之樂哉世說曰陳太丘詣荀朗陵貧儉無僕從迺使元方將車季方持杖從後長文尚小載著車中既至荀使叔慈應門慈明行酒餘六龍下食又曰桓公坐有參軍椅蒸薤不得解共食者又不助而掎終不放生者笑桓公曰同盤尚不相助況復危難勑令免官又曰劉真長王仲祖共行日旰未食有相識小人貽其飡者肴案甚盛真長辭焉仲祖曰聊以充虛何若真曰小人都不可作緣又曰羊曼拜丹陽尹客早者並得佳設日晏則漸罄不復及精隨客早晚不問貴賤羊固拜臨海飲食皆美雖晚至者猶獲其盛饌時論以固之豊腆乃不如曼之真率也又曰王東亭嘗之吳郡就汰公道人宿別脯許府家往瓦官寺設慢屋竟一寺東亭將夕至夜後汰公設豆藿麋汰公自噉一大甌東亭難汰公遂強進半甌須臾東亭行帳設名飲食果炙畢備汰公都無所噉俗說曰桓琙音城性噉犬每暝琙時使從兄索食黃帝八十一問曰人不食七日而死者何也然人胃中常有留穀三㪷五升水三升故平人一日再至清一行二升半日中五勝七日七五三㪷五勝而水穀盡矣故平人不食飲七日而死者水穀津液俱盡故也弘君舉食檄曰又取灄湖獨穴之鱧灄音攝赤山後陂之蒪伺漉泠豉及熱應分食畢作躁酒炙宜傳酒便清香肉則豆不㹀麞肶若披繙急火中炙脂不得董聞香者躑躅千咽者塞門羅奠椀子, WYG: ''}
