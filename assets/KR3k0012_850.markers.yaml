  - {type: variant, offset: 1247, length: 395, content: 至味湯曰可得為之乎對曰君之國小不足以具之為天子然後可具三郡之蟲水居者腥肉攫者臊草食者羶臭惡猶美皆有所以凡味之本水最為始五味三材九沸九變火為之紀時其疾徐減腥去臊鼎中之變精妙微纖口不能言志不能論若射御之微陰陽之化四時之數故久而不獘又曰趙襄子攻翟勝左人中人使者來謁之下左人中人城也襄子方食搏飯有憂色左右曰一朝而下兩城此人之所喜今君有憂色何也襄子曰江河之大也不過三日焱風暴雨日中不須臾今趙氏之德行無所積一朝而下兩城亡其及我乎白虎通曰王者四食何明有四方之物食四時之功也四方不平四方不順有徹膳之法焉所以明至尊著法戒也惟王者居中央制御四方平旦食少陽之始食時大陽之始晡時食少陰之始食時大陰之始說文曰饔饍熟食也餱乾食也篡具籑也籑士眷切𩞧中食也𩞧式丈切餔日加申時食也饛盛器滿皃饛音蒙餬寄食也飫燕食也餞送去食也飪火熟也釋名曰食殖也所以自生殖也鹽鐵論曰古者燔黍而食捭豚相享賓婚相召豆羹白飯今則燔炙滿案臑豚包鼈膾鯉說, SBCK: 霧爲漿􅀃}
