  - {type: variant, offset: 72, length: 0, content: '', WYG: 莾信之續漢書曰羊陟拜河内尹常食乾飯後漢書曰王郎起光武至南宫遇大風雨引車入道傍空舎馮異抱薪鄧禹􅅡火光武對竈燎衣異進麥飯兎肩謝承後漢書曰左雄為冀州刺史長食乾飯司馬苞為太尉常食漉飯李固為太尉常食麥飯王暢為南陽太守作飯鹽豉菜茹羊茂為東郡太守常食乾飯胡劭為淮南太守使鈐下閣外炊曝作乾飯袁閎飯糠茹菜漢儀曰齋二人施案陳三十六肉食九榖飯魏書曰卞太后左右食菜粟飯魏畧曰王朗會稽敗太祖盛㑹嘲之曰不能效君昔在㑹稽折秔米飯朗曰適宜實難如朗昔者未可折而折明公今日可折而不折也吴書曰袁術在壽春百姓飢窮以桑椹蝗蟲為乾飯又曰是儀服不精細食不重膳家無儲蓄孫權聞之幸儀舍求視蔬飯親嘗之歎息即増俸賜晋書曰石崇家稻米飯在地經宿皆化為螺時人以為滅族之應又曰衛瓘家人炊飯墮地盡化為螺歳餘而及禍又曰殷仲堪自在荆州連年水旱百姓飢饉仲堪食常五碗盤無餘殽飯粒落席間輙拾以噉之雖欲率物亦緣其性真素也宋書曰衡陽王義季都督荆州嘗太獵於郊有野老𢃄苫而耕命左右斥之老人擁耒對曰昔有楚子盤逰貽譏令尹今陽和扇氣播厥之始一日不作人失其時王左右馳騁為樂驅斥老夫非勸農之意義季止馬曰此賢者也命賜之食老人曰吁願大王均其賜也苟不奪人時則一時皆享王賜老人不偏其賜矣斯飯也弗敢嘗問其名不言而退南史曰宋初呉郡人陳遺少為郡吏母好食鐺底飯遺在役恒帶嚢每煮食輙録其焦以貽母後孫恩亂聚得數升恒𢃄自随及敗逃竄多有餓死遺因此得活母晝夜泣涕目為失明耳無所聞遺還入户再拜號咽母豁然即明梁書曰謝藺五歳時父亡不食乳媪欲令飯藺終不進舅阮孝緒聞之歎曰此兒在家則曽子之流事君則藺生之匹因名曰藺稍授以經史過目便能諷誦孝緒每曰吾家陽元也袁叔字陽元又曰齊苟兒之役臨汝侯嘲羅研之曰卿蜀人樂禍貪亂一至於此對曰蜀中積弊實非一朝百家為村不過數家有食窮廹之人什有八九束縛之使旬有二三貪亂樂禍無足多怪若令家畜五母之雞一母之豕牀上有百錢布被甑中有數升麥飯雖蘇張巧説於前韓白按劍於後將不能使一夫為盗况貪亂乎又曰魚𢎞為湘東王鎮西司馬述職西上道中乏食緣路採菱米飯給所部宏度之後人覔一菱不得又於窮洲之上捕得數百獼猴以為脯以供酒食又曰傅翽代劉𤣥明為山隂令問𤣥明曰願以舊政吿新令尹答曰我有竒術卿家譜所不載臨别當相示既而曰作縣唯日食一升飯而莫飲酒此第一䇿也又曰裴元禮為西豫州刺史居䘮惟食麥飯又曰沈仲永定二年兼起部侍郎尚書監起太極殿恒卧布袍芒履以麻䋲為𢃄又囊麥飯䬳以噉之朝士咸共誚其所為陳書曰孔奐為武康令武帝尅日决戰乃令奐多營麥飯以荷葉褁之一宿之間得數萬褁軍人食訖盡棄其餘崔鴻前秦録曰苻堅以乞活夏黙為左鎮郎胡人䕶磨那為右鎮郎奄人申香為拂盖郎黙等身長一丈八尺並多力善射三人毎食飯一石肉三十斤後魏書曰楊播兄弟雍睦播每出或日斜不至不先飯待還然後食又曰盧義僖為都官尚書性清儉不營財雖居顯位每至困乏麥飯蔬食然亦甘之也又曰闞駰}
