  - {type: variant, offset: 1644, length: 202, content: 晏子所與同衣食者百人而天下之士至也又曰晏子侍景公曰朝寒請子進煖食於寡人對曰臣非廚養之臣社稷之臣也又曰子思居於衛縕袍無裏二旬九食又曰魯有儉者煮甂中之食甂必眠切小益食而美以遺孔子子受之如受犬馬之遺弟子曰先生何為受之熹如此曰非以煮甂瓦之薄也食之美故念吾親也揚子法言曰或曰食如蟻衣如華金朱煌煌無已泰乎曰由其德舜禹受天下不為太不由其德亦太矣李軌注曰蟻言精細或曰北夷被我純績帶我金犀珍膳曼餬不亦厚乎曰社稷靈也不可不厚, SBCK: 吕望行年五十賣飯􅁄津}
