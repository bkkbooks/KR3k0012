  - {type: variant, offset: 9, length: 3, content: 禹嘗據, SBCK: 飯􅂼食飲水曲肱而枕之樂亦在其中矣爾雅曰饙餾稔也今呼折飯爲饙熟爲餾稔或作餁也饙音甫云切餾力又切音脩食饙謂之餲飯穢􅆨博者謂之􅶊􅶊飯相着也米者謂之檗飯中有未熟者春秋運斗樞曰粟五變而以陽化生爲苗秀爲禾三變而􅀕謂之粟四變入臼米出甲五變而蒸飯可食􅀃文曰饙脩食飯也餾飯氣蒸也饡音賛以羹澆飯也饖}
  - {type: page-break, offset: 9, content: '', id: KR3k0012_SBCK_850-1b}
  - {type: variant, offset: 9, length: 1, content: 禹, WYG: 飯䟽食飲水曲肱而枕之樂亦在其中矣爾雅曰饙餾稔也食饐謂之餲摶者謂之􅶊米者謂之糪春秋運斗樞曰粟五變而以陽化生為苖秀為禾三變而粲謂之粟四變入臼米出甲五變而蒸飯可食説文曰饙􅀢飯也餾飯氣蒸也饡以羮澆飯也饖飯傷熱也饐飯傷濕也釋名曰飯分也使其粒各自分也乾飯而暴乾之也史記曰亷頗之奔魏也魏不能用也而趙數困於秦趙人思復得頗頗亦思復為趙用趙王因使使之魏視頗尚可用不郭開怨頗不欲令還多與使者金令毁之使者至頗為之一飯一斗米十斤肉被甲上馬以示可用使者還報曰亷將軍年雖老尚善飯然與臣少頃三遺矢矣王以為老遂不召又曰孟}
  - {type: page-break, offset: 9, content: '', id: KR3k0012_WYG_850-2a, image: WYG0900/WYG0900-0497a.png}
  - {type: page-break, offset: 9, content: '', id: KR3k0012_WYG_850-2b, image: WYG0900/WYG0900-0497b.png}
  - {type: variant, offset: 9, length: 3, content: 禹嘗據, krp: 飯𬞞食飲水曲肱而枕之樂亦在其中矣爾雅曰饙餾稔也今呼折飯爲饙熟爲餾稔或作餁也饙音甫云切餾力又切音脩食饙謂之餲飯穢臭博者謂之􅶊􅶊飯相着也米者謂之檗飯中有未熟者春秋運斗樞曰粟五變而以陽化生爲苗秀爲禾三變而祭謂之粟四變入臼米出甲五變而蒸飯可食說文曰饙脩食飯也餾飯氣蒸也饡音賛以羹澆飯也饖}
  - {type: variant, offset: 11, length: 5, content: 據一饋而七, WYG: 君待客夜食有人蔽火光客怒以為飲不等輟食辭去孟嘗君}
  - {type: variant, offset: 13, length: 1, content: 饋, SBCK: 月切飯傷熟也一􅋩切飯傷濕也釋名曰飯分也使其粒各自分也乾飯}
  - {type: variant, offset: 13, length: 1, content: 饋, krp: 月切飯傷熟也一煎切飯傷濕也釋名曰飯分也使其粒各自分也乾飯}
  - {type: variant, offset: 15, length: 1, content: 七, SBCK: 􅁀乾之也史記曰廉頗之奔魏也魏不能用也而趙數困於秦趙人思復得廉頗㢘頗亦思復爲趙用趙王因使使魏視頗尚可用不郭開怨頗郭開頗之仇也不欲令還多與使者金令毀之使者視頗爲之一飯一斗米十斤肉􅀍甲上馬以示可用使者還報曰廉將軍年雖老尚善飯然與臣少頃三遺尿矣王以爲老遂不召又曰孟甞君待客夜食有人蔽火光客怒以爲飯不等輟食辭去孟甞君}
  - {type: page-break, offset: 15, content: '', id: KR3k0012_SBCK_850-2a}
  - {type: variant, offset: 15, length: 1, content: 七, krp: 暴乾之也史記曰廉頗之奔魏也魏不能用也而趙數困於秦趙人思復得廉頗㢘頗亦思復爲趙用趙王因使使魏視頗尚可用不郭開怨頗郭開頗之仇也不欲令還多與使者金令毀之使者視頗爲之一飯一斗米十斤肉𬒳甲上馬以示可用使者還報曰廉將軍年雖老尚善飯然與臣少頃三遺尿矣王以爲老遂不召又曰孟甞君待客夜食有人蔽火光客怒以爲飯不等輟食辭去孟甞君}
