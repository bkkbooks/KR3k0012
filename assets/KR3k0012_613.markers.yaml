  - {type: variant, offset: 673, length: 0, content: '', SBCK: 莫不來宗自中興巳來崇學敦教未有如寧者也崔鴻十六國春秋後秦録曰涼州胡辯者河西大儒也前秦建元末東徙洛陽隨講受弟子千有餘人関中後進多赴之姚興勑関尉曰諸生諮訪道義修巳厲身往來出入勿拘常限於是學者}
  - {type: page-break, offset: 673, content: '', id: KR3k0012_SBCK_613-4a}
  - {type: variant, offset: 673, length: 20, content: 咸就質疑隋書曰王邵初在齊時祖孝徵魏收陽休, WYG: 莫不宗}
  - {type: variant, offset: 673, length: 0, content: '', krp: 莫不來宗自中興巳來崇學敦教未有如寧者也崔鴻十六國春秋後秦録曰涼州胡辯者河西大儒也前秦建元末東徙洛陽隨講受弟子千有餘人関中後進多赴之姚興勑関尉曰諸生諮訪道義修巳厲身往來出入勿拘常限於是學者}
  - {type: variant, offset: 674, length: 352, content: 就質疑隋書曰王邵初在齊時祖孝徵魏收陽休之等嘗論古事有遺忘討閱不能得因呼邵問之邵具論所出取書驗之一無舛誤自是大為時人所許稱其博物唐書曰李守素尤為譜學妙諳人物自晉宋以降四海士流及周魏以來諸貴勳等華戎閥閱靡不詳究時號為肉譜嘗與虞世南等六人同直學館其夜七夕內出珍饌有教賦詩因共談人物初言江左東南猶相酬對及言北臺諸姓次第如流顯其歷葉皆有據證世南但撫掌而笑不復能荅既而歎曰肉譜定可畏許敬宗因謂世南曰李倉曹以善人物乃得此名雖為美事然非雅號曰君既言成准的宜有以改之荅曰卿言是也昔任彥昇善談經籍梁代稱為五經笥今目倉曹為人物志可乎杜如晦等咸以為佳又曰蔣乂幼好學德宗嘗幸凌煙閤見左壁頹剝上有殘缺文記每行可辯三五字命錄之以問宰臣宰臣卒然無以對遽召乂訪之對曰此聖歷年侍臣圖贊也暗誦諷不失一字宰臣上奏德宗歎曰虞世南暗寫列女傳無以加也, SBCK: 勸儒業盛矣}
