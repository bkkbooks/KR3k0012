  - {type: punctuation, offset: 5, content: 《, id: KR3k0012_CHANT_613-bkkpn1}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 禮記王制曰天子命之教然後爲學小學在公宫南之左太學在郊又學記曰古之教者家有塾黨有庠術有序國有學術當爲遂周禮五百家爲黨万二千五百家爲遂也一年視離經辨志三年視敬業樂群五年視􅀶習親師七年視}
  - {type: variant, offset: 5, length: 2, content: 論語, WYG: 取友謂之小成九年知類通達强立而不返謂之大成又曰學然後知不足教然後知困知不足然後能自反也知困然後能自强也又曰君子知至學之難易而知其美惡然後能博喻能博喻然後能為師能為師然後能為長能為長然後能為君又}
  - {type: variant, offset: 5, length: 2, content: 論語, krp: 取友謂之小成九年知類通逹強立而不反謂之大成又曰學然後知不足教然後知困知不足然後能自反也知困然後能自強也又曰君子知至學之難易而知其美惡然後能博喻能博喻然後能爲師能爲師然後能爲長能爲長然後能爲君又}
  - {type: variant, offset: 6, length: 1, content: 語, SBCK: 學取友謂之小成九年知􅀋通逹強立而不反謂之大成又曰學然後知不足教然後知困知不足然後能自反也知困然後能自強也又曰君子知至學之難易而知其美惡然後能􅀶喻能􅀶喻然後能爲師能爲師然後能爲長能爲長然後能爲君又}
