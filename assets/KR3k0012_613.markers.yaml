  - {type: variant, offset: 1061, length: 17, content: 人皆知糞其田而莫知糞其心何謂糞心博, SBCK: 墨子勸弟子}
  - {type: variant, offset: 1061, length: 0, content: '', WYG: 墨子勸弟子學曰女若學吾當任女弟子學期年就墨子求休子曰女不聞魯}
