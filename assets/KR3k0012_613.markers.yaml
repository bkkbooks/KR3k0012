  - {type: variant, offset: 9, length: 4, content: 哉孔子博, SBCK: 學之法禁於未發之謂豫當其可之謂時不陵節而施之謂孫相觀而善之謂摩此四者教之所由興也發然後禁則扞格而不勝時過然後學則勤苦而難成雜施而不孫則壞亂而不修獨}
  - {type: variant, offset: 9, length: 4, content: 哉孔子博, WYG: 學之法禁於未發之謂豫當其可之謂時不陵節而施之謂遜相觀而善之謂摩此四者教之所由興也發然後禁則扞格而不能勝時過然後學則勤苦而難成雜施而不遜則壊亂而不修獨}
