  - {type: variant, offset: 1125, length: 175, content: 聚之兼聽而辯之抱朴子曰洪年十六始習孝經論語易但貪廣覽於眾書曾披涉自正經諸史百家之言近將萬卷又曰夫周公上聖而日讀百篇仲尼天縱而韋編三絕墨翟大賢載文盈車仲舒命世不窺園圃倪寬帶經以芸鋤路生截蒲以寫書黃霸桎梏以受業甯子夙夜以倍功故能究覽玄奧窮測微言典論曰孔融陳琳王粲徐幹阮禹應瑒劉楨七子者於學無所遺於文無所假文士傳曰張華窮覽古今嘗徙居有書三十乘金樓子曰丘遟出, WYG: 求}
  - {type: variant, offset: 1125, length: 935, content: 聚之兼聽而辯之抱朴子曰洪年十六始習孝經論語易但貪廣覽於眾書曾披涉自正經諸史百家之言近將萬卷又曰夫周公上聖而日讀百篇仲尼天縱而韋編三絕墨翟大賢載文盈車仲舒命世不窺園圃倪寬帶經以芸鋤路生截蒲以寫書黃霸桎梏以受業甯子夙夜以倍功故能究覽玄奧窮測微言典論曰孔融陳琳王粲徐幹阮禹應瑒劉楨七子者於學無所遺於文無所假文士傳曰張華窮覽古今嘗徙居有書三十乘金樓子曰丘遟出為永嘉郡公祖道於東都亭敬子沈隱侯俱至丘云少來搜集書史頗得諸遺書無復首尾或失名姓凡有百餘卷皆不得可知今併欲焚之二客乃謂主人云可皆取出共看之傅金紫末至二客以向諸書示之傅乃發擿剖判皆究其流出所得三分有二賓客咸所悅伏國朝傳記曰太宗嘗出行有司請載副書以從上曰不須虞世南在此行祕書又曰太宗稱虞監博聞德行書翰詞藻忠直一人而已兼是五善博物家語曰夫子曰子產於民為惠主於學為博物吾以兄事之也左傳昭元年曰晉侯有疾鄭伯使公孫僑如晉聘且問疾叔向問焉曰寡君之疾病卜人曰實沈臺駘為崇史莫之知敢問此何神也子產曰昔高辛氏有二子伯曰閼伯季曰實沈居于曠林不相能也日尋干戈以相征討后帝不臧遷閼伯于商丘主辰商人是因故辰為商星遷實沈于大夏主參唐人見因以服事夏商其季世曰唐叔虞當武王邑姜方震太叔夢帝謂己余命而子曰虞將與之唐屬諸參而蕃育其子孫及生有文在其手曰虞遂以命之及成王滅唐而封太叔焉故參為晉星由是觀之則實沈參神也昔金天氏有裔子曰昧為玄冥師生元格臺駘臺駘能業其官宣汾洮障大澤以處大原帝用嘉之封諸汾川沈姒蓐黃實守其祀四國臺駘之後今晉主汾而滅之矣由是觀之則臺駘汾神也抑此二者不及君身山川之神則水旱癘疫之災於是乎榮之日月星辰之神則雪霜風雨之不時於是乎禜之若君身則亦出入飲食哀樂之事也山川星辰之神又何為焉僑聞之君子有四時朝以聽政晝以訪問夕以修令夜以安身於是乎節宣其氣勿使有所壅閉湫底以露其體茲心不爽而昏亂百度今無乃一之同四時也得生疾矣僑又聞之內官不及同姓內官嬪御其生不殖殖長也美先盡矣則相生疾同姓之相與先美矣美極則盡盡則生疾之君子是以惡之故志曰買妾不知其姓則卜之違此二者古之慎也一四時取同姓二者古人所慎男女辨姓禮之大司也辨別也今君內實有四姬焉同姓姬四人其無乃是也乎若由是二者弗可為也已為治也四姬有省猶可無則必生疾矣據異姓去同姓故言省叔向曰善哉𦙝未之聞也晉侯聞子產之言曰博物, krp: 求爲}
