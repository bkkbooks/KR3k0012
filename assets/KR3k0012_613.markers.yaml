  - {type: variant, offset: 3447, length: 187, content: 詔問群臣莫有識者頤荅曰謹案漢文以前未有冠幘即是文帝以來所制作也臣見魏大司農盧元明撰嵩山廟記云有神人以玉為形像長數寸或出或隱出則世延長伏惟陛下應天順民定鼎嵩雒岳神自見臣敢稱慶因再拜百官畢賀天子大悅賜縑二百國語曰海鳥爰居止於魯東門之外三日臧文仲使國人祭之文仲不知以為神展禽曰越哉臧孫之為政也越迂也言其迂闊不知所要也夫祀國之大節也而節政之所成也故慎制祀以為國典今無故而加典非政之宜, SBCK: 基}
