  - {type: variant, offset: 3707, length: 439, content: 仁者講功而智者處物無功而祀之非仁也不知而不問非智也今茲海其有災乎夫廣川之鳥獸恒知而避其災也是歲也海多大風冬煖爰居所避文仲聞柳下季之言使書以為三筴筴簡書也三篋三卿卿一通也謂司馬司徒司空又曰季桓子穿井獲如土缶其中有羊焉使問之仲尼曰吾穿井而獲狗何也獲羊言狗者以孔子博物測也對曰以丘之所聞羊也丘聞之木石之怪曰夔蝄蜽水之怪曰龍罔象土之怪曰墳羊又曰吳伐越隳會稽獲骨一節專車骨一節其長專車專壇也吳子使來好聘問之仲尼仲尼曰丘聞之禹致群臣於會稽之山防風氏後至禹殺而戮之防風汪茫氏君之名建命後至故禹殺之陳尸為戮其骨專車焉此為大矣客曰敢問誰守為神仲尼曰山川之靈足以紀綱天下者其守為神紀綱天下謂名山大川龍興雲致雨以利天下社稷之守為公侯封國立社稷而山川之祀者為諸侯令守之是公侯皆屬於王者客曰防風何守仲尼曰汪茫氏之君汪芒長翟國名守封嵎山者也封封山嵎嵎山在今吳郡永安縣也為七姓柒汪芒氏之姓在虞夏商為汪茫氏於周為長翟周世其國北遷為長翟今為大人今孔子時客曰人長之極幾何仲尼曰僬僥氏長三尺短之至也僬僥西南蠶之別也長, SBCK: 學}
