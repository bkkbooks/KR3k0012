  - {type: variant, offset: 25, length: 0, content: '', SBCK: 教喻也道而弗牽強而弗抑開而弗逹道而弗牽則和強而弗抑則易開而弗逹則思和易以思可謂善喻也又曰教也者長善而救其失者也善歌者使人繼其聲善教者使人繼其志其言也約而逹微而臧罕譬而喻可謂繼志也又曰太}
  - {type: page-break, offset: 25, content: '', id: KR3k0012_SBCK_613-2a}
