  - {type: variant, offset: 2135, length: 206, content: 君之明子為大政其何厲之有昔堯殛鯀于羽山羽山在東海祝其縣西南其神化為黃熊以入于羽淵實為夏郊三代祀之鯀禹父夏家郊祭之歷殷周二代又通在群神之數并見祀晉為盟主其或者未之祀乎言周衰晉為盟主得佐天子祀群神韓子祀夏郊祀鯀晉侯有間間差也賜子產莒之二方鼎方鼎莒所貢漢書曰張安世字子孺給事尚書上幸河東亡書三篋詔問莫能知唯安世識之具作其事後求得書以相校無所遺失上奇其材擢尚書令晉書張華傳曰人有得鳥毛長三丈以示華華見慘然曰此謂海鳧毛也出, SBCK: 爲丗士}
