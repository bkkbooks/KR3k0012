  - {type: variant, offset: 2666, length: 742, content: 蜀山毀故鍾鳴尋蜀郡上其事也又曰武帝常問摯虞三日曲水之義虞對曰漢章帝時平原徐肇以三月生三女至三日俱亡材人以為怪乃招攜之水濱洗祓遂因水以泛觴其義起此帝曰必如所談便非好事束晢進白虞小生不足以知臣請言之昔周公城洛邑因流水以泛酒故逸詩云羽觴隨波流又秦昭王以三日置酒河曲見金人奉水心之劍曰令君制有西夏乃霸諸侯因此立為曲水二漢相緣皆為盛集帝大悅賜晳金五十斤時有人於嵩高山得竹簡一枚上兩行科斗書傳以相示莫有知者司空張華以問晢晢曰此漢明帝顯節陵中策文也檢驗果然時人伏其博識又曰桓溫伐蜀初諸葛亮造八陣圖於魚復下砂上壘石八行相去二丈溫見之謂此常山虵勢也文武皆莫能識之又曰荀勗嘗在帝坐進飯謂在坐人曰此是勞薪所炊咸未之信帝遣問膳夫乃云實用故車腳舉世伏其明識宋書曰何承天博見古今為一時所重張永嘗開玄武湖遇古冢冢上得一銅斗有柄文帝以訪朝士承天曰此亡新威斗王莽三公亡皆賜之一在冢外一在冢內時三台江左者唯甄邯為大司徒必邯之墓俄而又啟冢內更得一斗復有一石銘大司徒甄邯之墓蕭子顯齊書曰東海王摛亦史學博聞歷尚書左丞竟陵王子良校試學士唯摛問無不對永明中天忽黃色照地眾莫能解摛云是榮光世祖大悅梁書裴子野傳曰時西北遠邊有白題及滑國遣使由岷山道入貢此二國歷代弗賓莫知所出子野曰漢潁陰侯斬胡白題將一人服虔注曰白題胡也又漢定遠侯擊虜入滑此其後乎時人服其博識又曰樂藹為御史中丞時長沙宣武王將葬而車府忽於庫失油絡欲推主者藹曰昔晉武庫火張華以為積油萬石必燃今庫若有灰非吏罪也既而檢之果有積灰時稱其博物弘恕三國典略曰齊徐之才見有人以五色班蘭骨為刀把者之才曰此人瘤也問所得處云於塚見髑髏骨長數寸試削視有文理故用之又曰周平蜀還得樂器者皆莫之識大常少卿斛斯澂直陵切見之曰此錞于也人弗之信澂遂依干寶周禮注以芒筒捋之其聲極振眾乃歎服澂取以合樂焉隋書曰崔頤, WYG: 成}
