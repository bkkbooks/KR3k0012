  - {type: variant, offset: 2, length: 1, content: 六, WYG: 七教學禮記王制曰天子命之教然後為學小學在公宫南之左大學在郊又禮記曰古之學者家有塾黨有庠術有序國有學術當為遂周禮五百家為黨二千五百家為遂也一年視離經辨志三年視敬業樂羣五年視}
