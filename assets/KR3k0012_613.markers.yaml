  - {type: variant, offset: 408, length: 263, content: 並不能悉希鏡對曰此是司馬越女嫁茍晞兒檢訪果然由是見遇又崔慰祖傳曰國子祭酒沈約吏部郎中謝眺嘗於吏部省中賓友俱集各問慰祖地理中所不悉十餘事慰祖口吃無華辭而酬據精悉一座稱服之眺歎曰假使班馬復生無以過此蕭子顯齊書曰王儉自以博聞多識讀書過陸澄澄曰僕少小來無事唯以讀書為業其年已倍今君少便鞅掌王務雖復一覽便諳然見卷軸未必多僕儉集學士何寧等盛自商略澄待儉詩畢然後談所遺漏數百千條皆儉所未覩儉乃敬服儉在尚書省出巾箱机案新服飾令學士隸事多者與之人各得一兩物澄後來更出諸人所不知事復各數條并奪物將去梁書曰韋叡子稜字威直性恬素以書史為業博物強記當代, SBCK: 徒㓗巳志德行}
