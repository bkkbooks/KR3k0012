  - {type: variant, offset: 4158, length: 637, content: 丈則防風氏又曰仲尼在陳有隼集于陳侯之庭而死楛矢貫之石砮其長尺有咫隼鷙鳥鶚也楛木名砮鏃也石為之八寸曰咫楛矢貫之墜而死也陳惠公使以隼如仲尼之館問之惠公哀公之孫悼太子之子吳也仲尼曰隼之來也遠矣此肅慎氏之矢也肅慎北夷之國昔武王克商通道于九夷八蠻使各以其方賄來貢使無忘職業於是肅慎氏貢楛矢石砮其長尺有咫先王欲昭其令德之致遠物也故銘其栝曰肅慎氏貢楛矢以分大姬配虞胡公而封諸侯分矛也大姬武王元安胡公舜後虞遏父之子胡滿古者分同姓以寶玉所以展親也展重若夏后氏氏之璜也異姓以遠方之職貢使無忘服也故分陳以肅慎氏之貢陳偽姓君若使有司求諸故府其可得也故府舊府使求得之金櫝如之家語曰楚昭王渡江江中有一物大如斗員而赤直觸王舟舟人取之王大怪之徧問群臣莫能識使使聘於魯問孔子孔子曰此萍實也唯霸者為能獲之使者返王食之大美久之使來以告魯大夫大夫因子游問曰何以知其然曰吾昔之鄭過陳之野聞童謠曰楚王渡江得萍實大如斗赤如日剖而食之甜如蜜此是武王之應也益部耆舊傳曰蜀郡張寬漢武帝時為侍中從祀甘泉至渭橋有女子浴於渭水乳長七尺上怪其異遣問之女曰帝後第七車知我所來時寬在第七車對曰天皇主祭祀者齋戒不嚴則女人見郭璞注山海經曰漢宣帝使人上郡發盤石石室中得一人徒祼被髮反縛祴一足以問群臣莫能知劉子正對曰昔貳負之臣曰免與貳負殺窫窳帝乃括之於踈屬之山括繫縛也音適桎其右足反縛兩手繫之山上盤石之下宣帝大驚於是時人爭學山海經國朝傳記曰潤州得玉磬十二以獻張率更叩其一曰是晉某歲所造又有人於古墓中得銅物似琵琶而身正圓元行冲云此阮咸所造事並具樂部, SBCK: ''}
