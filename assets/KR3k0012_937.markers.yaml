  - {type: variant, offset: 1857, length: 0, content: '', SBCK: 共寡人憂之髠曰臣見隣人之祠田也以一篋飯與一鮒魚其祝曰下田洿邪得榖百車臣􅀏其}
  - {type: variant, offset: 1857, length: 0, content: '', WYG: 與寡人憂之髠曰臣見隣人之祠田也以一箧飯與一鮒魚具祝曰下田夸邪得榖百車因笑其}
