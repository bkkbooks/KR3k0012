  - {type: variant, offset: 1858, length: 0, content: '', SBCK: 祠者少所求者多王曰善立爲上卿神異經曰東南海中有恒洲有温湖鮒魚生焉長八尺食之冝暑而辟風寒盛弘之荆州記曰荆州有美鮒踰於洞庭温湖古樂府􅇁辭曰􅇁􅀄何得端來得鮒小者如手大者如屨孝子持歸遺我公􅁎安得此魚適與􅇁迕從今}
  - {type: page-break, offset: 1858, content: '', id: KR3k0012_SBCK_937-3b}
