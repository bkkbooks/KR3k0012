  - {type: variant, offset: 1284, length: 249, content: 太守丞侯儉貢鯉續受而懸之一歲儉復致一枚續乃以所懸枯魚以示儉終身不復食魚晉書曰王祥性至孝早喪親繼母朱氏不慈數譖之由是失愛於母父有疾衣不解帶湯藥必親嘗母欲生魚時天寒水凍祥解衣將剖冰求之冰忽自解雙鯉躍出持之而歸又曰劉聰將趙染為索綝所敗殺其長史魯徽劉曜聞之曰蹄涔不容尺鯉染之謂也齊書曰崔祖思自相國從事中郎遷齊國內史高帝既為齊王置酒為樂羹膾既至祖思曰此味故為南北所推侍中沈季文曰羹膾吳食非祖思所解祖思曰鼈鯉似非勾吳之詩文季曰千里蓴羹豈關魯衛帝甚悅曰蓴羹故應還沈南史曰梁南郡太守劉之亨嘗夢二人姓李詣之乞命未之解, SBCK: 橋}
