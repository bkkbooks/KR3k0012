  - {type: variant, offset: 3657, length: 1, content: 出, SBCK: 凢䱉魚夏岀冬蟄亦以將氣養和實時節也徐表南方草物狀曰白鱓生溪邊土穴中長五尺所大三寸里民刺取細槿二寸苦酒煑食之滋味如黃鱓味交阯九真有之劉敬叔異苑曰盧循以義􅄉五年自廣州下泊舡}
