  - {type: variant, offset: 1877, length: 127, content: 郫縣子魚黃鱗赤尾出稻田可以為醬列仙傳曰呂尚釣於磻溪三年不獲比周曰可止矣尚曰非爾所及果得大鯉有兵鈐在腹中又曰涓子齊人也好餌朮接食其精至三百年乃見於齊著天地人經四十八篇後釣於河澤得鯉魚賜中符隱於宕山能致風雨又曰琴高趙人也以鼓琴為宋康王舍人行涓彭之術浮游冀州涿, SBCK: 蒸鮎永嘉}
