  - {type: variant, offset: 3650, length: 6, content: 數百斤骨軟可, SBCK: 如五􅂛奩長一丈郭璞注爾雅云鱣長二三尺安有鸛雀能勝一者况三頭乎鱣又純􅁅色無文章也鱣魚長者不過三尺大者不過三指黃地黒文故都講云虵鱓卿大夫服之象也續漢記及搜神記亦􅀃此事皆作鱓字孫卿云魚鼈鱣鰌及韓非􅀃苑皆曰鱣似虵􅁞似蠋並作鱣字假鱣爲鱓其來乆乎周處風土記曰陽羡俗五月以薤蒸䱉而}
  - {type: variant, offset: 3650, length: 6, content: 數百斤骨軟可, WYG: 如五升奩長一丈郭璞注云鱣長二三尺安有鸛銜能勝者况三頭乎鱓又純灰色無大者此鱓魚長者不過三寸大者不過三指黄色黑文故都講云虵鱣卿大夫服之象也漢書及捜神記亦說此事皆作鱣字孫卿云魚鱉鱣鰌及韓非說苑皆曰鱣似虵蠶似蠋主作鱣字假鱣為鱓其来久乎周處風土記曰陽羨谷五月以薤薺䱉焉}
