  - {type: variant, offset: 625, length: 574, content: 異苑曰永嘉有人斷水捕魚宰牲祈祭了無所獲將棄罷之其夕夢見老公云諸君何小停夜聞㹠聲驚起共看乃是大魚剉以為鮓頓得百薄故因以百薄為瀨水述異記曰桓冲為江州遣人周行廬山見一湖中有赤鱗魚使者欲飲水魚張鬐向之乃不敢飲又曰關中有金魚神云周平王二年十旬不雨遣祭天神俄而生湧泉魚躍出而降雨幽明錄曰成彪兄喪哀悼結氣晝夜哭泣後釣於澤經所共飲處釋綸悲感有大魚跳入舡中俯視諸小魚彪仰天號慟俛而見之悉放小魚大者便自出舡去搜神記曰宮亭湖孤石有估客下都經其下見二女子云可為買兩量絲履自厚相報估客至都市好絲履并箱盛之自市一書刀亦在箱中既還以箱置廟中而去忘取書刀湖中正帆忽有鯉魚跳入舡破魚得書刀焉廣五行記曰唐儀鳳元年博州僧正滿行同凡俗買魚數頭於房作鱠食之至夜四更忽聞窗外有暴風聲乃夢一佛二佛二金剛語滿云爾是何物小兒將穢汙伽藍金剛手執棒滿閉目因而兩目不開矣又曰曹宋二州西界大劑陂村人陳君少小為捕魚業於後得患恒被眾魚所食痛苦不能自持若以魚網蓋之其痛即止後為村人盜其網去數日之間不勝痛苦而死樂府歌曰江南可採蓮蓮葉何田田魚戲蓮葉間魚戲蓮葉東魚戲蓮葉西宋玉對問曰夫鳥則有鳳魚則有鯨鯨魚朝發崑崙之墟暴於碭石夕宿於孟諸夫尺澤之鯢豈能與量江海之大哉東方朔客難曰水至清則無魚人至察則無徒曹植荅崔文始書曰臨江以釣不獲一鱗非江魚之不食其所餌之者非也是以君子慎舉擢鯉魚河圖曰黃帝遊於洛見鯉魚長三尺青身無鱗赤文成字, SBCK: 音緶}
