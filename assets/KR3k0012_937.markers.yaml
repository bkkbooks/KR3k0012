  - {type: variant, offset: 1855, length: 1, content: 必, SBCK: 其狀如鷄而赤毛三尾六足四首其音如鵲食之巳憂又圖經讃曰泊和損乎莫􅃤於憂詩詠萱草山經則鯈儔條二音何敬祖詩曰屬耳聽鳴鶯流目玩鯈魚鯋魚爾雅曰鯋鮀郭璞曰今吹沙小魚體圓而有􅀧文也沙陁二音毛詩魚麗曰魚麗于罶鱨鯋鯋鮀也廣志曰吹沙魚大如指沙中行鱨魚毛詩曰魚麗于罶鱨鯋鱨楊也音常毛詩義䟽曰鱨一名楊今黃頰魚是身形厚而長大頰骨正黄鮒魚周易井卦曰井谷射鮒王肅注曰鮒小魚也廣雅曰鯖鮒也莊子曰莊周家貧徃貸粟於􅁥何侯侯曰我將得邑今貸子二百金可乎莊周忿然曰周昨來有中道而呼者周視車轍中有鮒魚焉曰我東海之波臣也君豈有􅂛斗之水而活我哉周曰諾我且南遊呉越之王激西江之水而迎之可乎鮒魚忿然作色曰吾得􅂛斗之水可活耳君乃言此不如早索我於枯魚之肆又曰夫掲竿累趣灌竇守鯢鮒其於得大魚難矣吕氏春秋曰魚之美者有洞庭之鮒􅀃苑曰魏楚㑹於晉陽將以伐齊齊王患之使人召淳于髠曰魏楚欲伐齊願先}
  - {type: page-break, offset: 1855, content: '', id: KR3k0012_SBCK_937-2b}
  - {type: page-break, offset: 1855, content: '', id: KR3k0012_SBCK_937-3a}
  - {type: variant, offset: 1855, length: 1, content: 必, WYG: 其状如雞而赤毛三尾六足四首其音如鵲食之已憂又圖經讚曰汨和損平莫慘於憂詩詠萱草山經則鯈儔條二音何敬祖詩曰属耳聴鳴鶯流目玩鯈魚魦魚爾雅曰魦鮀郭璞曰今吹沙小魚也體圓而有㸃文也沙沱二音毛詩魚麗曰魚麗于罶鱨魦魦鮀也廣志曰吹沙魚大如指沙中行鱨魚毛詩曰魚麗于罶鱨魦鱨楊也音常毛詩義疏曰鱨一名楊今黄頬魚是身形厚而長大額骨正黄鮒魚周易井卦曰井谷射鮒王肅註曰鮒小魚也廣雅曰鯖鮒也莊子曰荘周家貧往貸粟於監河侯侯曰我将得邑今貸子三百金可乎荘周忿然曰周昨来有中道而呼者周視之車轍中有鮒魚焉曰我東海之波臣也君豈有升斗之水而活我哉周曰喏我且南逰呉越之濵吸西江之水而迎之可乎鮒魚忿然作色曰吾得升斗之水可活耳君乃言此不如早索我於枯魚之肆又曰夫揭竿累趣灌竇守鮒其於得大魚難矣石氏春秋曰魚之美者有洞庭之鮒說苑曰魏楚㑹扵晉陽將以伐齊齊王患之使人召淳于髠曰魏楚欲伐齊願先}
