  - {type: variant, offset: 3657, length: 1, content: 出, krp: 凢䱉魚夏岀冬蟄亦以將氣養和實時節也徐表南方草物狀曰白鱓生溪邊土穴中長五尺所大三寸里民刺取細槿二寸苦酒煑食之滋味如黃鱓味交阯九真有之劉敬叔異苑曰盧循以義熙五年自廣州下泊舡}
  - {type: variant, offset: 3658, length: 0, content: '', WYG: 冬蟄亦以氣將陽和實時節也徐表南方草木状曰白鱓生溪邉土穴中長五寸所在三十里民刺取細槿二寸苦酒煑食之滋味如黄鱓味交趾九真有之劉敬叔異苑曰盧循以義熈五年自廣州下泊船}
