  - {type: variant, offset: 3103, length: 0, content: '', WYG: 美味今遂問跳魚之名義曰捕魚者仲春扵髙處卓望魚魚来如陣雲濶二三百步厚亦相似者既見報漁師遂槳船争前而迎之船衝魚陣不施罟網但魚見自驚跳入船逡巡而滿以此為鯅故名之跳又云船去之時不可當魚陣之中恐魚多船沈故也即可以知其多矣鱓魚與軌同音善山海經曰大樂之野夏后啟扵此舞九伐焉女滅在其北居雨水間滅操魚䱉䱉魚属也祭操俎肉􅀈也汲冡周}
