  - {type: variant, offset: 426, length: 154, content: 二山如黛海人云去岸兩廂各六百里一旦暴風雷旦霧露皆腥雜以泥涎七日方已屬有人從山來說云大魚因鳴吼吹沬其一鰓掛山巔七日山為之折不能去鳴聲為雷氣為風涎沬為霧又曰海中所生魚唇置陰處有光初見之以為怪異土人嘗推其義蓋鹹水所生海水中遇陰晦波如燃火滿海以物擊之迸散如星嶺表錄異曰新瀧等州山田揀荒平處以鋤鍬開為町疃伺春雨丘中貯水, SBCK: 鯾}
