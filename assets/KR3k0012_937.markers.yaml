  - {type: variant, offset: 276, length: 148, content: 千丈後遂死橫於河海之間後世聖人以魚為神化之物以玄字合於魚為鯀字崔豹古今注曰水君狀如人乘馬眾魚導從一名魚伯大水有之漢末有人於河際見之人馬皆有鱗甲如大鯉魚但手足別耳目鼻與人不殊見人良久入水而沒博物志曰吳王江行食膾有餘棄於江中流化而為魚今江中有名吳王餘鱠魚者長四寸大者如箸猶作鱠形嶺南異物志曰南方嘗晴望, SBCK: 鯾居}
