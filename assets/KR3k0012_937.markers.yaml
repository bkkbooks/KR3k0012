  - {type: variant, offset: 3260, length: 377, content: 雖加至勤其非所有也水經曰漢水又東為鱣湍洪波奔盪崩浪雲頹耆舊言有鱣魚奮鰭遡流望濤直上至此則爆鰓失濟故因名湍矣又曰鱣鮪鯉也出鞏穴三月則上渡龍門得渡為龍矣否則點額而還張衡西京賦曰鱣鮪鱮鮦郭璞江賦曰魚則叔鮪王鱣孫綽望海賦曰文鯉黃鱣鮪魚爾雅曰鮥音洛鮛音叔鮪鮪鱣屬也大者名王鮪小者名鮛鮪今宜都郡自荊門以上江中通出鱏鱣之魚有一魚狀似鱣而小建平人呼鮥子即此魚也鱏音尋毛詩淇澳碩人曰施罟濊鱣鮪撥撥毛詩義䟽曰鮪魚出海三月從河上形似鯉而色青黑頭小而尖如鐵兜鍪口在頷下今東萊遼東人謂之尉魚或謂仲明魚仲明者樂浪尉溺死海中化為此魚也禮記月令曰季春薦鮪於寢廟進時羹味淮南子曰夫牛蹄之涔不生鱣鮪又曰禹決江䟽河鑿龍門辟伊闕龍門本有水門鮪魚由其中上行得上過者便為龍門禹辟而大之故言鑿抱朴子曰寸鮪汎濫啼水之中則謂天下無四海之廣也芒蜴宛轉菓核之內則謂八極之界盡於茲也博物志曰河陰岫穴出鮪魚焉䲛魚, SBCK: 按}
