  - {type: variant, offset: 2266, length: 333, content: 天下不如崔豹古今注曰兗州人謂赤鯉為玄駒白鯉為白驥黃鯉為黃雉搜神記曰宮亭孤石有估客至都因市一刀置神廟中而忘取至湖中忽有一鯉跳入舡破之得刀具魚部中續搜神記曰謝允從武當山還在桓宣武座言及左元放為曹公置鱸魚允便云此可得耳求大甕盛水朱書符投水中俄有二鯉鼓鬐在水中又曰會稽鄮音懋縣有女子姓吳字望子為蘇侯神所愛望子心有所欲輒空中下之望子嘗思鱠一雙鮮鯉應心而至幽明錄曰孫權時南方遣吏獻犀簪吏過宮亭廟請福神下教求簪而盛簪器便在神前神云臨入石頭當相還去達石頭三尺鯉魚跳入舡吏破魚得之又曰平都縣南陂上有冢行人於陂取得鯉道逢冢中人來云何敢取吾魚奪著車上而去杜寶大業拾遺錄曰四年梁郡有清冷淵水面闊二里許即衛平得大龜之處清冷水南有橫瀆東南至宕山縣西北入通濟渠是時大雨溝渠皆滿忽有大魚似鯉而頭一角, SBCK: ''}
