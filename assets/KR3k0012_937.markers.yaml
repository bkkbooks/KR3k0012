  - {type: variant, offset: 61, length: 141, content: 方之東海有大魚焉行海者一日逢魚頭七日遇尾其產則三百里水為血永嘉郡記曰青田溪冬天水熱如湯眾魚歸之名魚倉三齊記曰青城山始皇祭此山築石城入海三十里射魚水四里變赤如血于今猶爾盛弘之荊州記曰長沙湖鄉連水邊有石魚形若鯉相重沓如雲母炙之作魚腥林邑國記曰飛魚翼如蟬飛則凌雲沉泳海底王子年拾遺錄曰瀛洲, SBCK: 呼魴爲鯿}
