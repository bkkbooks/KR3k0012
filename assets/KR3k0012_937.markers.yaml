  - {type: variant, offset: 2616, length: 4, content: 橫瀆逆流, SBCK: 者文當王此國因斫如斷芻藁文心異之范㓜常使之啇賈至林邑王作宫室及兵車器械王寵任之後乃䜛言諸子咎奔餘國及王死無嗣文爲於憐國迓王子置毒於漿中殺遂䝱國人自立林邑國記曰范文得鱧魚變爲鐵斫石如斬盧世傳魚刀鲫魚水經曰青林湖有鯽魚食之肥美辟寒暑南夷志曰蒙舎地有鯽魚大者重五斤}
