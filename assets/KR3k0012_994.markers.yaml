  - {type: variant, offset: 2072, length: 7, content: 石芸出三輔甘遂, SBCK: 今蜀葵花似木槿傅玄蜀葵賦序曰蜀葵其苗如􅀲瓠甞種之一名引苗而生華經二年春乃發虞繁蜀葵賦曰惟兹珎草懷芬吐榮挺河渭之膏壤吸􅄧井之玄精繞銅爵而䟽植映昆明而羅生莵葵爾雅曰莃虚機切莵葵郭璞曰頗似葵而葉小狀如藜有毛汋啖之滑廣志曰莵葵爚之可食鳬茈爾雅曰芍都了切鳬茈也生下田苗似龍􅂡而細根如指頭黒色可食東觀漢記曰王莽末南方枯旱民多餓群入野澤掘鳬茈而食之烏韮}
