  - {type: punctuation, offset: 1792, content: 「, id: KR3k0012_CHANT_994-bkkpn756}
  - {type: variant, offset: 1792, length: 264, content: 唐蒙女蘿菟絲也廣雅曰女蘿松蘿也菟丘菟絲也史記龜策傳曰下有伏苓上有菟絲博物志曰女蘿菟絲寄草上根不著地呂氏春秋曰或謂菟絲無根非無根也其不屬也伏苓是也淮南子曰菟絲無根而生伏苓抽菟絲死抱朴子曰案仙方中自有合離草一名獨搖一名離母所以謂之合離下根如芋魁有遊子十二枚周環之大魁數尺雖相須生而實不連以氣相屬耳如菟絲之草下有茯菟之根無此菟在下則絲不得生於上又曰初生之根其形似兔掘取刻其血以和丹服之立變化在意所作吳氏本草經曰兔絲實一名玉女一名松蘿一名鳥蘿一名鴞蘿一名複實一名赤綱生山谷劉楨詩曰青青女蘿草上依高松枝幸蒙庇眷恩為惠不可訾石芸爾雅曰茢勃茢, SBCK: 孟狼尾}
