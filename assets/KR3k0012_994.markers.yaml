  - {type: variant, offset: 44, length: 3, content: 見七士, SBCK: 死者不可勝數符子曰隣人謂展禽曰魯聘夫子夫子三黜無憂色何禽曰春風皷百草敷蔚吾不知其茂秋霜降百草零落吾不知其枯人物志曰草之將精者爲英獸之將群者爲雄張良是英韓信是雄也水經曰魏興錫義山山髙谷􅀷多生薇蘅草其草有風不偃無風獨揺又曰建寜郡山生牧靡可以解毒百卉方盛鳥多悮食烏喙口中毒必急飛徃牧靡山喙牧靡以解毒也金樓子曰魯城北孔子塋中不生㓨人草木崔豹古今注曰牛亨問曰草木生􅀋也有識乎荅曰物有生而有識者有不生而無識者有不生而有識者有不生而而有識者不生無識者夫生而有識者蟲􅀋是也生而無識者草木是也不生而有識者􅀑神是也不生而無識者水土是也又曰天雨草狀如莎絞如丸無數皆名曰蓮蔞草郭子横洞􅁳記曰東方朔曰臣有􅁻雲草十頃種}
