  - {type: variant, offset: 572, length: 0, content: '', WYG: 三寸三枝五寸五枝以城西面土三家不汲井口青泥南雞欲上栖不上者并治合為丸磨其面目出户視八方矣楚辭曰春草生兮萋萋王孫遊兮不歸古詩曰廻車駕言邁悠悠渉長道四顧何芒芒東風揺百草又曰新樹蘭蕙葩雜用杜衡草終朝採其華日暮不盈抱採之欲遺誰所思在遠道又曰穆穆清風至吹我羅裳裾青袍似春草長條從風舒又曰青青陵中草傾}
