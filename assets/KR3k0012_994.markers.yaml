  - {type: 'tls:seg', offset: 924, content: '', id: KR3k0012_CHANT_994-18a.6}
  - {type: variant, offset: 924, length: 361, content: 落石本草經曰落石一名鯪石味苦溫生川谷治風熱久服輕身明潤目澤好色不老延年生太山吳氏本草經曰落石一名鱗石一名明石一名縣石一名雲華一名雲珠一名雲英一名雲丹神農苦小溫雷公苦無毒扁鵲桐君甘無毒季氏大寒云藥中君採無時鬼箭廣雅曰鬼箭神箭也本草經曰衛矛一名鬼箭味苦寒生山谷治女子崩中下血腹滿汗出除邪殺鬼毒生霍山吳氏本草經曰鬼箭一名衛與神農黃帝桐君苦無毒葉如桃如羽正月二月七月採陰乾或生野田房葵博物志曰房葵與狼毒相似本草經曰房葵一名犁蓋味辛冬生川谷久服堅骨髓益氣生臨淄吳氏本草經曰房葵一名梁蓋一名爵離一名房苑一名晨草一名利如一名方蓋神農辛小寒桐君扁鵲無毒歧伯雷公黃帝苦無毒莖葉如葵上黑黃二月生根根大如桔梗根中紅白六月花白七月八月實白三月三日採根麻黃廣雅曰龍沙麻黃也麻黃莖狗骨也本草經曰一名龍沙味苦溫生川谷治中風傷寒出汗去熱邪氣破堅積藂生晉地, SBCK: 楚薫}
