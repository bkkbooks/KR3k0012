  - {type: variant, offset: 572, length: 0, content: '', SBCK: 三寸三枚五寸五枚以城西靣士三家不汲井中青泥南鷄欲上栖不上者并治合爲丸磨其靣目出户視八方矣楚辭曰春草生兮萋萋王孫逰兮不歸古詩曰廻車駕言邁悠悠涉長道四顧何芒芒東風搖百草又曰新樹蘭蕙葩􅄂用杜衡草終朝採草榮日暮不盈抱採之欲遺誰所思在逺道又曰穆穆清風止吹我羅裳􅅂青􅂁似春草長條從風舒又曰青青陵中草傾}
