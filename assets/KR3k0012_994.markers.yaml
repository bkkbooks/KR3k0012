  - {type: variant, offset: 1491, length: 298, content: 青苑女萎本草經曰女萎一名左眄一名玉竹味辛生川谷久服輕身能老生太山蓍實本草經曰蓍實味苦酸平無毒主益氣充肌膚明目聰慧先知久服不飢不老輕身生少室山谷八月九月採實日乾地椹本草經曰地椹一名石龍芮一名食果能味苦平生川澤治風寒久服輕身明目不老生太山范子計然曰石龍芮出三輔色黃者善吳氏本草經曰石龍芮一名薑苔一名天豆神農苦平歧伯酸扁鵲李氏大寒雷公鹹無毒五月五日採黃環本草經曰黃環一名凌泉一名大就味苦生山谷主治蟲毒鬼魅邪氣欬逆寒熱生蜀郡范子計然曰黃環出魏郡黃色者善吳氏本草經曰蜀黃環一名生芻一名根韭神農黃帝歧伯桐君扁鵲辛一經味苦有毒二月生初出正赤高二尺葉黃員端大莖葉有汁黃白五月實員三月採根根黃從理如車輻解治蠱毒菟絲, SBCK: 續断狼尾}
