  - {type: variant, offset: 10, length: 3, content: 桔梗管, WYG: 彈丸續漢書五行志曰靈帝中平元年夏東郡陳留濟陽長垣濟隂諸縣界有草生莖大如手指狀似鳩爵龍虵鳥獸之形五色各如其物毛相類目足趐皆具又曰西夜國生獨白草煎以為藥傅箭所射輙死崔鴻十六國春秋西秦録曰永和二年國中地震百草皆自及晉書載記曰符堅至壽春與苻融登城而望王師見部陣齊整將士精鋭又北望八公山上草木皆類人形頋謂融曰比亦勍敵也何謂少乎憮然有懼色後周書曰宇文深字奴干性鯁正有器局年數嵗便累石為營伍并折草作旌旗布置行列皆有軍陣之勢父永遇見之乃大喜曰汝自然知此於後必為名將又曰岩昌羗俗無文字但候草榮落以記嵗時吕氏春秋曰草有華有藟獨食之則殺人合而食之則益壽淮南}
