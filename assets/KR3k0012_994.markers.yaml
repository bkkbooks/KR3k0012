  - {type: variant, offset: 2061, length: 0, content: '', SBCK: 似茅今人亦以覆屋廣志曰狼尾子可作􅁰燕夌爾雅曰籥雀夌郭璞曰即燕夌古歌曰田中莵絲何甞可絡道邊燕夌何常可穫荆葵爾雅曰荍音比婢支翹䖝切衃房左切也郭璞曰今荆葵也似葵紫色謝氏云小草多華少葉葉又翹起毛詩宛丘東門之枌曰視􅈛如荍詩義䟽曰荍}
