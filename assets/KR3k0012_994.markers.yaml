  - {type: variant, offset: 8, length: 5, content: 犁如桔梗管, SBCK: 卉草也草謂之華木謂之榮不榮而實者謂之秀榮而不實者謂之英尚書禹貢曰兖州厥草惟繇繇茂也徐州草木漸包漸進也包叢生也楊州厥草惟夭少長曰夫並出書注毛詩緇衣野有蔓草曰野有蔓草零露漙兮蔓延也􅄎漙然盛多也毛詩問荅曰國多兵役男女怨曠於是女感傷而思男故出遊於洧之外託采芬香之草而爲媱妷之行時草始生而云蔓者女情急欲以促時也周禮秋官下薙氏曰薙氏掌殺草春始生而萌之夏日至而夷之秋縄而芟之冬日至而耜之鄭玄日含實曰䋲也大戴禮曰孟春氷冸百草權輿禮記月令曰孟夏之月靡草死鄭玄曰舊􅀃靡草薺葶􅏣之屬季夏之月大雨時行燒薙行水利以殺草薙迫地芟草也薙草乾燒之至此雨水蓄水其中則草死不生也又曰霜降之日草木黄落又曰檀弓上曰曽}
  - {type: page-break, offset: 8, content: '', id: KR3k0012_SBCK_994-1b}
  - {type: variant, offset: 8, length: 1, content: 犁, WYG: 卉草也草謂之華木謂之榮不榮而實者謂之秀榮而不實者謂之英尚書禹貢曰兖州厥草惟繇繇茂也徐州草木漸包漸進也包叢生也楊州厥草惟夭少䘮曰夭毛詩鄭風野有蔓草曰野有蔓草零露漙兮蔓延也漙􅄎然盛多也毛詩問答曰國多共役男女怨曠於是女感傷而思男故出逰於洧之外託采芬香之草而為媱妷之行時草始生而云蔓者女情急欲以促時也周禮秋官下薙氏曰薙氏掌殺草春始生而萌之夏日至而夷之秋䋲而芟之冬日至而耜之鄭𤣥曰令實曰䋲也大戴禮曰孟春氷泮百草權輿禮記月令曰孟夏之月靡草死鄭元曰舊說靡薺葶歴之屬季夏之月大雨時行燒薙行水利以殺草薙廹地芟草也薙草乾燒之至此雨水畜水其中則草死不生也又曰霜䧏之日草木黄落又檀弓上曰曽子朋友之墓有宿草而不哭焉左傳曰松栢之下其草不殖又曰一薫一蕕十年尚猶有臭蕕臭草薫香草也春秋潭潜巴曰下不兼蜚亷之草為不生言瑞應之物應有上也論語曰君子之徳風小人之徳草草上之風必偃漢書五行志曰元帝永光二年天雨草葉相糺結}
