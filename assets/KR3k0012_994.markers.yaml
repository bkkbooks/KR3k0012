  - {type: variant, offset: 2057, length: 234, content: 郭璞注曰一名石共音列范子計然曰石芸出三輔甘遂廣雅曰陵旱甘遂也建康記曰建康出甘遂本草經曰甘遂味苦寒生川谷治大腹疝瘕脹滿面目浮腫除留飲宿食出中山范子計然曰甘遂出三輔吳氏本草經曰甘遂一名主田一名日澤一名重澤一名鬼醜一名陵藁一名甘藁一名苦澤神農桐君苦有毒歧伯雷公有毒須二月八月採馬刀本草經曰馬刀味辛微寒生池澤治補中漏下赤白留寒熱破石淋殺禽獸賊鼠生江海范子計然曰馬刀出河東吳氏本草經曰馬刀一名齊蛤古納切神農歧伯桐君鹹有毒扁鵲小寒大毒生池澤江海採無時也女青本草經曰女青一名雀翾味辛, WYG: 太}
