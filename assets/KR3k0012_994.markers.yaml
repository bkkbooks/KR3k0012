  - {type: variant, offset: 44, length: 2, content: 見七, WYG: 死者不可勝數符子隣人謂展禽曰魯聘夫子夫子三黜無憂色何禽曰春風鼓百草敷蔚吾不知其茂秋霜降百草零落吾不知其枯人物志曰草之將精者為英獸之將羣者為雄張良是英韓信是雄也水經曰魏興錫義山山髙谷深多生薇蘅其草有風不偃無風獨揺又曰建寕郡山生牧靡可以解毒百卉方盛烏多悮食烏啄口中毒必急飛徃牧靡山啄牧靡以解毒也金樓子曰魯城北孔塋中不生刺人草木崔豹古今注曰牛亨問曰草木生類乎有識乎答曰物有生而有識者有生而無識者有不生而有識者有不生而無識者夫生而有識者蟲類是也生而無識者草木是也不生而有識者鬼神是也不生而無識者水土是也又曰天雨草狀如莎絞如丸無數皆名曰蓮蔞草郭子横洞㝠記曰東方朔曰臣有吉雲草十種種於九景山東二千歲一花此草難種東取璋琅山表之澗以灑之臣種來一千九百九十九年矣明年應生臣走徃刈収之以秣馬馬食不飢帝許之朔平旦去至暮而返背負數束其形葉似菱金色裁長二尺剉以餉馬即不覺飢武帝曰種之生否朔曰臣至東極過吉靈之澤多生此草移於九景之山全不如吉雲之地又曰甜溪水如蜜東方朔逰此水還將數斛以獻帝帝投隂井井裏遂恒甜而寒洗肉肌理柔滑瑶琨去玊門九萬里有碧草如麥剉之以釀則味如酒而釅烈驗之則顔色如醉飲一合則三旬不醒飲甜水則隨飲隨醒異苑曰青州劉㦎元嘉初射遇一麞割五臓以草塞之䠞然起走㦎恠而㧞塞便復還倒如此三為㦎宻録此種以來其治傷痍多愈三齊畧記曰不其城東有鄭𤣥教授山山下生草如薤葉長尺餘堅紉異常}
