  - {type: variant, offset: 763, length: 160, content: 三輔色白者善吳氏本草經曰狼牙一名支蘭一名狼齒一名犬牙一名抱牙神農黃帝苦有毒桐君鹹歧伯雷公扁鵲苦無毒或生冤句葉青根黃赤六月七月華八月實黑正月八月採根香蒲本草經曰香蒲一名睢蒲味甘平生池澤治五藏心下邪氣堅齒明目聰耳久服輕身能老生南海吳氏本草曰醮一名醮石一名香蒲神農雷公甘生南海澤中爵李本草經曰郁核一名爵李腐婢本草經曰腐婢小豆花, SBCK: 覇陵}
  - {type: variant, offset: 763, length: 0, content: '', WYG: 覇陵也楚薰范子計然曰楚薫出洛陽也楚蘅范子計然曰楚蘅出楚國也秦蘅宋玊風賦曰夫風翺翔激水之上將擊芙蓉之精獵蕙草離秦蘅龍鬚山海經曰賈超之山草多龍鬚廣志曰龍鬚一名西王母簮水經曰自洮強南北}
