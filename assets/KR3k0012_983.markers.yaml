  - {type: variant, offset: 6, length: 1, content: 漢, SBCK: 魄拂除不祥大戴禮夏小正曰五月蓄蘭爲沐浴禮曰婦人或賜之􅊉蘭則受而獻諸舅姑左傳曰鄭文公有賤妾曰燕姞夢天使與巳蘭曰余爲伯儵余而祖也以是爲而子以蘭有國香人服媚之旣而文公見之與之蘭而御之辭曰妾不才幸而有子將不信敢徴蘭乎姞曰諾生穆公名之曰蘭論撰考䜟曰漸於蘭則芳漸於鮑則臭史記曰冬至短極蘭根出蜀志曰先主殺張􅁉諸葛亮救之先主曰芳蘭當門不得不鋤晉}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_SBCK_983-2a}
  - {type: variant, offset: 6, length: 1, content: 漢, WYG: 魄袚除不祥大戴禮夏小正曰五月蓄蘭為沐浴禮曰婦或賜之􅊉蘭則受而獻之舅姑左傳曰鄭文公有賤妾曰燕姞夢天使與已蘭曰余為伯鯈余而祖也以是為而子以蘭有國香人服媚之既而文公見之與之蘭而御之辭曰妾不才幸而有子將不信敢徴蘭乎公曰諾生穆公名之曰蘭論撰考䜟曰漸於蘭則芳漸於鮑則臭史記曰冬至短極蘭根生蜀志曰先主殺張裕諸葛亮救之先主曰芳蘭當門不得不鋤晉}
