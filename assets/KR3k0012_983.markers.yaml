  - {type: variant, offset: 1843, length: 0, content: '', SBCK: 子曰以㓗白爲汙辱譬猶沐浴而杼溷薫燧而􅀒􅇾燒薫自香楚人謂之薫燧也抱朴子曰常以執日取天井上土以和栢葉薫草以泥門户方一尺則盗賊不來西京􅄂記曰漢掖庭有緑熊席其席皆長一丈餘眠而擁毛自蔽望其不能見坐則没􅂰其中􅄂諸薫香一坐此席餘香百日不歇成公綏宣清賦曰哀薫草之見焚兠末香漢武故事曰西王母當降上燒兠末香兠末香兠渠}
