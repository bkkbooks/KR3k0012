  - {type: variant, offset: 1625, length: 2, content: 成時, krp: 魏武以爲香燒之楚辭曰光風轉蕙泛崇蘭又曰旣滋蘭兮九畹又樹惠之百畝司馬相}
  - {type: variant, offset: 1628, length: 3, content: 鵝毳抽, SBCK: 子虚賦曰於是乃相與撩於蕙圃盤姍㪍窣皆草間行貌姍音蘇寒切窣蘇骨切上金隄䔾車去謁切尓雅曰䔾車䒗音乞輿也郭璞曰䔾車香草也見離騷􅀃文曰䔾䒗輿也䒗音乞廣志曰䔾車黄葉白華出徐州楚辭曰畦留夷與擖車􅄂杜蘅與芳芷杜蘅山海經曰天帝之山有草焉}
