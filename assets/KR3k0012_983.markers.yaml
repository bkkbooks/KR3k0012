  - {type: 'tls:seg', offset: 77, content: '', id: KR3k0012_CHANT_983-2a.8}
  - {type: variant, offset: 78, length: 240, content: 大香也傅子曰西國胡人言蘇合香獸便也中國皆以為怪從征記曰劉表家在高平郡表子擣四方珍香數十斛置棺中蘇合消疫之香畢備永嘉中郡人發其墓表如生香聞數十里廣志曰蘇合出大秦或云蘇合國人採之筌其汁以為香膏賣滓與賈客或云合諸香草煎為蘇合非自然一種也傅玄四愁詩曰佳人贈我蘇合香何以要之翠鴛鴦班固與弟超書曰竇侍中令載雜綵七百疋市月氏蘇合香安息晉書佛圖澄傳曰石勒時襄國城水源暴竭勒問澄澄曰當勑龍取水乃坐繩床燒安息香呪願三日水微流有小龍五六尺隨水來須臾水大至唐書曰曹國出青黛安息青木等香薰陸魏略曰大秦出薰陸, WYG: 芳}
