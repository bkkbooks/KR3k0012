  body:
  - {type: variant, offset: 2, length: 3, content: 二蘇合, SBCK: 三槐香蘭香蘪蕪蕙草䔾車杜蘅白芷荃香薫香兠末香反生香驚精香白蛤狸藁本香神精香􅀛甲香槐香􅄞含槐香賦序曰余以太簇之月登於歴山之陽仰眺崇巒俯視幽坂乃覩槐香生􅂪楚之間曽見斯草殖於廣夏之庭或披帝王之圃恠其遐弃遂􅁶樹于中唐華麗則殊彩阿郍芳實則可以藏書又感其弃本髙崖委身階庭似傳􅀃顯殷四􅅱歸漢故因實制名蒙蒙緑葉揺揺弱莖蘭香易曰同心之言其臭如蘭蘭芳也易卦通驗曰冬至廣莫風至蘭始生􅀃文曰蘭香草也韓詩曰溱與洧􅀃文云詩人言溱與洧方盛流洹洹然謂三月桃花水下之時士與女方盛流秉蘭􅀆秉執也蘭簡也當此盛流之時衆姓與衆女方執蘭而拂除鄭國之俗三月上巳之日此兩水之上招魂}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_SBCK_983-1b}
  - {type: variant, offset: 2, length: 3, content: 二蘇合, WYG: 三槐香蘭香蘪蕪蕙草䔾車杜蘅白芷荃香薰香兠末香反生香驚精香白蛤狸􅢠本香神精香龜甲香槐香嵇含槐香賦序曰余以太簇之月登於歴山之陽仰眺崇巒俯視幽坂乃覩槐香生蒙楚之間曾見斯草植于廣夏之庭或披帝王之圖怪其遐棄遂遷樹於中堂華麗則殊彩阿那芳實則可以藏書又感其棄本髙崖委身階庭似傅説顯殷四叟歸漢故因實制名蒙蒙緑葉揺揺弱莖蘭香易曰同心之言其臭如蘭易卦通驗曰冬至廣莫風至蘭始生説文曰蘭香草也韓詩曰溱與洧説文云詩人言溱與洧方流洹洹然謂三月桃花水下之時士與女方盛流秉蘭兮秉執也蘭蘭也當此盛流之時衆士與衆女方執蘭而拂除鄭國之俗三月上巳之日此兩水之上拂䰟}
