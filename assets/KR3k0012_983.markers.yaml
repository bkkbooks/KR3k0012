  - {type: variant, offset: 1672, length: 2, content: 則沉, WYG: 有芬芳之蘭喻夫人之美亦異于衆人也思公子兮未敢言又曰秋蘭兮蘼蕪羅生兮堂下緑葉兮素枝芳菲菲兮襲予秋蘭兮青青緑葉兮紫莖滿堂兮美人忽獨與余兮目成又曰光風轉蕙泛崇蘭趙壹疾邪賦曰勢家多所宜咳唾自成珠被褐懐金玉蘭蕙化為芻張衡怨詩曰秋蘭嘉美人也嘉而不獲用}
  - {type: page-break, offset: 1672, content: '', id: KR3k0012_WYG_983-6a, image: WYG0901/WYG0901-0619c.png}
