  - {type: variant, offset: 25, length: 7, content: 中天竺國出蘇合, SBCK: 兩火没地哀哉秋蘭歸形街郵終爲人歎及楊駿巳死楊后􅀍廢賈后絶其膳八日而崩塟街郵亭北百姓哀之兩火武帝諱蘭楊后字也宋書曰劉湛欲􅀽淑附巳而淑不爲改意由}
  - {type: variant, offset: 25, length: 0, content: '', WYG: 兩火没地哀哉秋蘭歸形街郵終為人嘆及楊駿已死楊后被廢賈后絶其膳八日而崩葬街郵亭北百姓哀之兩火武帝諱蘭楊后字也宋書曰劉湛欲袁淑附已而淑不為改意由是大相乖失淑乃賦詩曰種蘭忌當門懐璧莫向楚楚少别玉人門非種蘭所晏子春秋曰曾子将行晏子送之曰嬰聞君子贈人以財不若以言吾請以言乎夫蘭本三年而成湛之苦酒則君子不近庻人不佩湛之麋醯而價匹馬矣非蘭本美也所湛然也願子之必求所湛蘇子曰蘭以芳自燒膏以肥自􅌊翠以羽殃身蚌以珠致破文子曰日月欲明浮雲蓋之藂蘭脩發秋風敗之又曰蘭芷不為莫服而不芳君子行道不為莫知而止范子計然曰大蘭出漢}
  - {type: page-break, offset: 25, content: '', id: KR3k0012_WYG_983-3b, image: WYG0901/WYG0901-0618b.png}
  - {type: page-break, offset: 25, content: '', id: KR3k0012_WYG_983-4a, image: WYG0901/WYG0901-0618c.png}
  - {type: variant, offset: 25, length: 5, content: 中天竺國出, krp: 兩火没地哀哉秋蘭歸形街郵終爲人歎及楊駿巳死楊后𬒳廢賈后絶其膳八日而崩塟街郵亭北百姓哀之兩火武帝諱蘭楊后字也宋書曰劉湛欲袁淑附巳而淑不爲改意由是大相乖失淑乃賦詩曰種蘭忌當門懐壁莫向楚楚少別玉人門非種蘭所晏子春秋曰曽子將行晏子送之曰嬰聞君子贈人以財不若以言吾請以言乎夫蘭夲三年而成湛之若滫則君子不近庶人不佩湛之麋而駕征馬矣非蘭夲美也願子必求所湛}
  - {type: variant, offset: 26, length: 3, content: 天竺國, WYG: 澤蘭}
  - {type: variant, offset: 30, length: 7, content: 蘇合是諸香汁煎, WYG: 河東𢎞農白者善孫卿子曰人}
  - {type: variant, offset: 31, length: 51, content: 合是諸香汁煎之非自然一物也又云大秦人採蘇合先筌其汁以為香膏乃賣其滓與諸國賈人是以展轉來達中國不大香也傅, krp: ''}
  - {type: punctuation, offset: 32, content: ，, id: KR3k0012_CHANT_983-bkkpn13}
  - {type: 'tls:seg', offset: 32, content: '', id: KR3k0012_CHANT_983-1a.9}
  - {type: variant, offset: 33, length: 4, content: 諸香汁煎, SBCK: 大相乖失淑乃賦詩曰種蘭忌當門懐壁莫向楚楚少別玉人門非種蘭所晏子春秋曰曽子將行晏子送}
  - {type: punctuation, offset: 38, content: ，, id: KR3k0012_CHANT_983-bkkpn14}
  - {type: 'tls:seg', offset: 38, content: '', id: KR3k0012_CHANT_983-1a.10}
  - {type: variant, offset: 38, length: 0, content: '', SBCK: 曰嬰聞君子贈人以財不􅀂以言吾請以言乎夫蘭夲三年而成湛之􅀂滫則君子不近庶人不佩湛之麋而駕征馬矣}
  - {type: page-break, offset: 38, content: '', id: KR3k0012_SBCK_983-2b}
  - {type: variant, offset: 38, length: 3, content: 非自然, WYG: 親我欣若父母其好我芬若椒蘭淮南子曰兩心不可以得}
  - {type: variant, offset: 39, length: 4, content: 自然一物, SBCK: 蘭夲美}
  - {type: variant, offset: 42, length: 1, content: 物, WYG: 人一心可以得百人男子樹蘭美而不芳蘭芳草女之美男子樹之蓋不芳也繼子得食肥而不澤繼子假母也情不相與往來}
