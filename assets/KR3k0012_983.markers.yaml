  - {type: variant, offset: 764, length: 715, content: 像每朔望親祭之軍人以其香也剖而分之竺法真登羅山䟽曰旃檀出外國元嘉末曾城有人於山見一大樹員蔭數畝三丈餘圍辛芳酷烈其間枯條數尺授而刃之乃白旃檀俞益期牋曰眾香共是一木木根為旃檀崔豹古今注曰紫旃木出扶南林邑色紫赤亦謂紫檀也杜寶大業拾遺錄曰薵禪師甚妙醫術作五香第一沉香飲次丁香飲次檀香飲次澤蘭飲次甘松飲皆別有法以香為法以香為主更加別藥有味而止渴兼於補益甘松廣志曰甘松出涼州諸山艾納廣志曰艾納出剽國樂府歌曰行胡從何來列國持何來毾㲪五味香迷送艾納及都梁霍香廣志曰霍香出日南諸國吳時外國傳曰都昆在扶南山有霍香南方草物狀曰霍香榛生民自種之五六月採曝之乃芳芬耳出交阯武平興古九真地名也南州異物志曰霍香生曲遜國屬扶風香形如都梁可以著衣服中劉欣期交州記曰霍香似蘇合范曄和香方曰靈霍虛燥俞益期牋曰眾香共是一木木葉為霍香楓香梁書曰任昉為新安太守嘗欲營佛齋燒調香二石始入三升便出教長奪曰與奪自己不欲貽之後人南方記曰楓香樹子如鴨卵爆乾可燒魏武令曰房室不潔聽得燒楓膠及蕙草棧香廣志曰棧香出日南諸國南方草物狀曰棧蜜香出都昆不知棧蜜香樹若為但見香耳嶺表錄異曰廣管羅州多棧香樹身似柳其花白而繁其葉如橘皮堪作紙名為香皮紙灰白色有紋如魚子牋其紙慢而弱沾水即爛遠不及楮皮者又無香氣或云沉香鷄骨黃熟棧香同是一樹而根幹枝節各有分別者也南越志曰交州有蜜香樹欲取先斷其根經年後外皮朽爛木心與節堅黑沉水者為沉香與水面平為鷄骨㝡麤者為棧香木蜜異物志曰木蜜名曰香樹生千歲根本甚大先伐僵之四五歲乃往看歲月久樹材惡者腐敗唯中節堅直芬香者獨在耳魏王花木志曰廣志木蜜樹號千歲樹根甚大伐之四五歲乃取木腐者為香其枝可食本草經曰木蜜一名蜜香味辛溫栟香南方草物狀曰栟香莖生出烏滸都梁廣志曰都梁出淮南盛弘之荊, WYG: 荆}
