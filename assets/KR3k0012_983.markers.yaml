  - {type: variant, offset: 1675, length: 0, content: '', WYG: 作是詩也猗猗秋蘭植彼中阿有馥其芳有黄其葩雖曰幽深厥美彌嘉之子之遠我勞如何酈炎詩曰靈芝生河州動揺回洪波秋蘭榮何晩嚴霜悴其柯哀哉二芳草不植太山阿琴操曰猗蘭操者孔子所作也孔子聘諸侯諸侯莫能任自衛反魯過隠谷之中見薌蘭獨茂喟然嘆曰夫蘭當為王者香今乃獨茂與衆草為伍乃止車援琴鼓之自傷不逢時託辭于香蘭云晉傅𤣥詠秋蘭詩曰秋蘭䕃玉池池水清且芳雙魚自踊躍兩鳥時徊翔王羲之蘭亭記曰永和九年嵗在癸丑暮春之初㑹于㑹稽山隂之蘭亭修禊事也蘼蕪説文曰江蘺蘼蕪也楚謂之蘺晉謂之䖀齊謂之􅊉爾雅曰蘄草蘼蕪春秋運斗樞曰維星散為蘼蕪淮南子曰亂人者若虵床之與蘼蕪山海經曰洞庭之山其草多蘼蕪廣志曰蘼蕪香草魏武帝以藏衣中吳氏夲草曰蘼蕪一}
