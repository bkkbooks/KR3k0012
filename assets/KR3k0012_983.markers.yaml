  - {type: variant, offset: 1623, length: 0, content: '', SBCK: 紉秋蘭以爲佩紉細又曰沅有芷􅀆澧有蘭言沅和中有盛茂之正禮水之中有芬芳之蘭喻湘夫美亦異於衆人也􅁒思公子未敢言又曰秋蘭􅀆蘪蕪羅生􅀆堂下緑葉􅀆素枝芳菲􅀆襲予秋蘭􅀆青青緑葉􅀆紫莖滿堂􅀆美人忽獨與余􅀆目成又曰光風轉蕙泛崇蘭趙壹疾邪賦曰勢家多所冝欬唾自成珠􅀍􅄄懷珠玉蘭蕙化爲芻張衡怨詩曰秋蘭嘉美人也嘉而不獲用故作是詩也猗猗秋蘭植彼中阿有馥}
  - {type: page-break, offset: 1623, content: '', id: KR3k0012_SBCK_983-4a}
  - {type: variant, offset: 1623, length: 11, content: 其華成時如鵝毳抽其緒紡, WYG: 紉秋蘭以為佩又曰沅有芷兮澧有蘭言沅湘中有盛茂}
  - {type: variant, offset: 1623, length: 0, content: '', krp: 紉秋蘭以爲佩紉細又曰沅有芷兮澧有蘭言沅和中有盛茂之正禮水之中有芬芳之蘭喻湘夫美亦異於衆人也𣣔思公子未敢言又曰秋蘭兮蘪蕪羅生兮堂下緑葉兮素枝芳菲兮襲予秋蘭兮青青緑葉兮紫莖滿堂兮美人忽獨與余兮目成又曰光風轉蕙泛崇蘭趙壹疾邪賦曰勢家多所冝欬唾自成珠𬒳褐懷珠玉蘭蕙化爲芻張衡怨詩曰秋蘭嘉美人也嘉而不獲用故作是詩也猗猗秋蘭植彼中阿有馥}
  - {type: variant, offset: 1624, length: 0, content: '', SBCK: 芳有黄其葩雖曰幽深厥美彌嘉之子之逺我勞如何酈炎詩曰靈芝生河洲動揺回洪波秋蘭榮何晚嚴霜害其柯哀哉之芳草不植太山阿琴操曰猗蘭操者孔子所作也孔子聘諸侯莫能任自衛反魯過億谷之中見薌蘭獨茂喟然歎曰夫蘭當爲王者香今乃獨茂與衆草爲伍乃止車援琴鼓之自傷不逢時託辭於香蘭云晉傳玄詠秋蘭詩曰秋蘭䕃玉池池水清且芳􅀟魚自踊躍兩鳥時徊翔晉王羲之蘭亭記曰永和九年􅀊在癸丑暮春之􅀄㑹于㑹稽山隂之蘭亭修禊事也蘪蕪􅀃文曰江蘺蘪蕪也楚謂之蘺晉謂之􅡖軒嬌切齊謂之􅊉尓雅曰蘄􅊉蘪蕪郭璞曰香草也葉小如萎狀淮南子曰似虵床山海經曰臭如蘪芜春秋運斗樞曰維星散爲蘪蕪淮南子曰亂人者􅀂虵床之與蘪蕪山海經曰洞庭之山其草多蘪蕪廣志曰徴蕪香草魏武帝以藏衣中吴氏夲草曰蘪蕪一名芎窮古詩曰上山採蘪蕪下山逢故夫郭璞讃曰蘪蕪善草亂之虵床不隕其貴自別以芳蕙草廣雅曰皇草蕙草也山海經曰天帝之山其下多菅蕙菅似茅􅂛山其草多蕙廣志曰蕙草緑葉紫}
  - {type: page-break, offset: 1624, content: '', id: KR3k0012_SBCK_983-4b}
  - {type: variant, offset: 1624, length: 0, content: '', krp: 芳有黄其葩雖曰幽深厥美彌嘉之子之逺我勞如何酈炎詩曰靈芝生河洲動揺回洪波秋蘭榮何晚嚴霜害其柯哀哉之芳草不植太山阿琴操曰猗蘭操者孔子所作也孔子聘諸侯莫能任自衛反魯過億谷之中見薌蘭獨茂喟然歎曰夫蘭當爲王者香今乃獨茂與衆草爲伍乃止車援琴鼓之自傷不逢時託辭於香蘭云晉傳玄詠秋蘭詩曰秋蘭䕃玉池池水清且芳雙魚自踊躍兩鳥時徊翔晉王羲之蘭亭記曰永和九年歲在癸丑暮春之𥘉㑹于㑹稽山隂之蘭亭修禊事也蘪蕪說文曰江蘺蘪蕪也楚謂之蘺晉謂之􅡖軒嬌切齊謂之茞尓雅曰蘄茞蘪蕪郭璞曰香草也葉小如萎狀淮南子曰似虵床山海經曰臭如蘪芜春秋運斗樞曰維星散爲蘪蕪淮南子曰亂人者若虵床之與蘪蕪山海經曰洞庭之山其草多蘪蕪廣志曰徴蕪香草魏武帝以藏衣中吴氏夲草曰蘪蕪一名芎窮古詩曰上山採蘪蕪下山逢故夫郭璞讃曰蘪蕪善草亂之虵床不隕其貴自別以芳蕙草廣雅曰皇草蕙草也山海經曰天帝之山其下多菅蕙菅似茅升山其草多蕙廣志曰蕙草緑葉紫}
  - {type: variant, offset: 1625, length: 2, content: 成時, SBCK: 魏武以爲香燒之楚辭曰光風轉蕙泛崇蘭又曰旣滋蘭􅀆九畹又樹惠之百􅅿司馬相}
