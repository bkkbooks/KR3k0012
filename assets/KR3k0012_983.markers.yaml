  - {type: variant, offset: 526, length: 378, content: 出都昆國在扶南南三千餘里南州異物志同廣志曰流黃香出南海邊國青木隋書曰樊子蓋為武威太守車騎駕西巡將入吐谷渾子蓋以彼多瘴氣獻青木香禦霧露唐子曰師子國出朱砂水銀薰陸鬱金蘇合青木等諸香南夷志曰崑崙國正北去蠻界西洱河八十一日程出象及青木香旃檀香紫檀香檳榔琉璃水精蠡柸又曰南詔青木香永昌所出其山名青木山在永昌南三月日程廣志曰青木出交州天竺徐裏南方記曰青木香出天竺國不知其形南州異物志曰青木香出天竺是草根狀如甘草俞益期牋曰眾香共是一木木節是青木旃檀三國典略曰周師陷江陵初梁主以白檀木為梁武之像每朔望親祭之軍人以其香也剖而分之竺法真登羅山䟽曰旃檀出外國元嘉末曾城有人於山見一大樹員蔭數畝三丈餘圍辛芳酷烈其間枯條數尺授而刃之乃白旃檀俞益期牋曰眾香共是一木木根為旃檀崔豹古今注曰紫旃木出扶南林邑色紫赤亦謂紫檀也杜寶大業拾遺錄曰薵禪師甚妙醫術作五香第一沉香飲次丁香飲次檀香飲次澤, krp: 握}
