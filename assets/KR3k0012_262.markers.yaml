  - {type: variant, offset: 75, length: 8, content: 為煩一二年間家家, SBCK: 供郡守俠曰以口腹役人吾所不爲也乃悉罷之又}
  - {type: variant, offset: 75, length: 0, content: '', WYG: 供郡太守俠曰以口腹役人吾所不為也乃悉罷之又有丁三十人供郡守役俠亦不私並收庸直為市官馬嵗時既積馬遂成羣去職之日一無所取人歌之曰肥鮮不食丁庸不取裴公清惠為世規矩北史曰宋世良為清河太守才識嫻明尤善政術在郡未幾聲問甚髙陽平郡移掩刧盜三十餘人世良訊其情狀惟送十二人餘皆放之陽平太守魏明朗大怒云輒放吾賊及推問送者皆實放者皆非明朗大服郡東南有曲堤成公一姓阻而居之羣盜多萃於此人為之語曰寧度東吳㑹稽不厯成公曲堤世良施八條之制盜奔他境人又謠曰曲堤雖險賊何益得有宋公自屏跡是冬醴泉出於境内及代至傾城祖道有老人丁金剛者泣而前謝曰老人年九十記三十五政府君非惟善政清亦徹底今失賢者人何以濟莫不攀援涕泣北齊書曰赫連子恱除林慮太守文襄徃晉陽由郡境問所不便子恱云臨水武安去郡遙逺山嶺重疊若東屬魏郡則平地路近文襄笑曰卿徒知便人不覺損幹答曰所言者人所疾苦不敢以私潤負公心文襄善之乃勑依事施行自是人屬近便行路稱之北齊書曰崔伯謙字士遜博陵安平人也除濟北太守恩信大行又改鞭用熟皮為之示恥而已北齊書曰蘇瓊字珍之長樂武強人也除南清河太守性清愼不發私書陳書曰孔奐字休文除晉陵太守自宋齊以來為大郡雖經寇擾猶為全實前後二千石多行侵暴奐清白自守妻子並不之官惟以單船臨郡所得秩俸随即分贍孤寡郡中號曰神君曲阿富人殷綺見奂居處儉素乃餉以衣氊一具奂曰太守身居美祿何為不能辦此但百姓未周不容獨享温飽勞卿厚意幸勿}
