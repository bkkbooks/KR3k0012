  - {type: variant, offset: 94, length: 8, content: 吏人啼哭遮道車馬, WYG: 安祿山逆節頗著真卿以霖雨為托脩城浚濠科丁壯儲廩食乃陽㑹多士泛舟於池飲酒賦詩或讒於禄山亦宻偵之以為書生}
  - {type: variant, offset: 96, length: 58, content: 啼哭遮道車馬不得前十餘日乃出魏志曰賈逵為弘農太守太祖召見計事大悅之謂左右曰使天下二千石皆如賈逵則吾何憂又曰杜畿為河東, SBCK: 供}
  - {type: variant, offset: 96, length: 58, content: 啼哭遮道車馬不得前十餘日乃出魏志曰賈逵為弘農太守太祖召見計事大悅之謂左右曰使天下二千石皆如賈逵則吾何憂又曰杜畿為河東, krp: 供}
