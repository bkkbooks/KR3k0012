  - {type: variant, offset: 133, length: 0, content: '', WYG: 朕不識顔真卿形狀何如所為乃如此五代史晉史曰郭延魯清泰中遷復州守延魯臨任忽驚歎曰先人曽為沁牧九年不移我得不遵其家法而}
  - {type: page-break, offset: 133, content: '', id: KR3k0012_WYG_262-5a, image: WYG0895/WYG0895-0353a.png}
  - {type: variant, offset: 134, length: 0, content: '', WYG: 政有紕繆者乎由是正奉之外未嘗斂貸庶事政理一郡賴焉及秩滿百姓上章乞畱將離境攀卧遮圍者不能去朝廷聞而嘉之華陽國志曰張翕字子陽巴郡人為平隂郡守布衣蔬食儉以化民自乗二馬之官乆之一馬死一馬病翕曰吾將步行矣夷漢甚安其惠愛在官十九年卒百姓號慕送葬者以千數}
  - {type: variant, offset: 135, length: 5, content: 下二千石皆, WYG: 子嗟歎賜錢十萬為立祠堂後太守數煩擾夷人叛亂翕子端方舉孝亷天子起家拜越嶲太守迎者}
  - {type: page-break, offset: 135, content: '', id: KR3k0012_WYG_262-5b, image: WYG0895/WYG0895-0353b.png}
