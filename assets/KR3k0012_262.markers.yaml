  - {type: variant, offset: 3095, length: 1, content: 遣, krp: 之陽平太守魏明㓪大怒云輙放吾賊及推問送者皆實放皆非明㓪大服郡東南有曲堤成公一姓阻而居之群盗多萃於此人爲之語曰寧度東呉㑹稽不歷成公曲堤良施八條制盗奔他境人又謡曰曲堤雖險賊何益但有宋公自屏跡是冬醴泉出於界内及代至傾城祖道有老人丁金剛者泣而前謝曰老人年九十記三十五政府君非唯善政清亦徹底今失賢者人何以濟莫不攀援涕泣北齊書曰赫連子恱除林慮太守文襄徃晉陽由郡境問不便恱云臨水武安去郡遥逺山嶺重疊若東屬魏郡則地平路近文襄笑曰卿徒知便人不覺損幹恱荅曰所言者又所疾苦不敢以私潤負公心文襄善之乃勑依事施行自是人屬近便行路北齊書曰崔伯謙字士遜愽陵安平人也除濟北太守恩信大行又改鞭用熟皮爲之示恥而巳北齊書曰蘇瓊字珎芝長樂武強人也除南清河太守性清慎不發私書陳書曰孔奐字休文除晉陵太守自宋齊巳來爲大郡雖經寇擾猶爲全實前後二千石多行侵暴奐清白自守妻子並不之官唯以單舡臨郡所得秩俸隨即分贍孤寡}
