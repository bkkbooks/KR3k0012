  - {type: variant, offset: 2031, length: 1019, content: 城郭安集居民墾廢田二百頃決沈湖灌溉不受禮謁民有餉其新米一斛者懷慰出所食麥飯示之曰旦食有餘幸不煩此因著廉吏論以達其意又曰虞愿為晉平太守海邊有越王石常隨雲霧相傳云清廉太守乃得見愿往觀視清徹無隱蔽後琅耶王秀之為郡與朝士書此郡承虞公之後善政猶在遺風易遵差得無事又曰王秀之為晉平太守至郡朞年謂人曰此邦豐壤祿俸常充吾山資已足豈可久留以妨賢路上表請代時人謂王晉平恐富求歸又曰裴昭明歷郡皆有善政常謂人曰人生何事須聚蓄一身之外亦復何須子孫若不才我聚彼散若能自立則不如一經故終身不治產又曰蕭介字茂鏡少頴悟有器識梁大明中武陵王紀為楊州刺史以介為府長吏在職以清白稱武帝謂何敬容曰蕭介甚貧可以處一郡復曰始興郡頻無良守可以介為之由是出焉齊春秋曰崔元祖父景真為平昌太守有惠政常懸一蒲鞭而未嘗用梁書曰褚翔為義興太守翔在政潔己省繁苛去游費百姓安之郡之西亭有古樹積年枯死翔至郡忽更生枝葉百姓咸以為善政感及秩滿吏民詣闕請之勑許焉又曰何敬容為吳郡太守為政勤恤民隱辯訟如神視事四年治為天下第一吏民詣闕請樹碑詔許之又曰劉亨字嘉會之遴弟也代之遴為南郡太守在郡有異績數年卒於官時年五十荊士至今懷之不忍其名號為大南郡小南郡又曰何胤字子季為建安太守民不忍欺伏臘放囚還家及期而至又曰傅昭遷臨海太守郡有密巖前後太守皆自封固專收其利昭以周文之囿與百姓共之大可喻小乃教勿封縣令常餉粟寘絹于簿下昭笑而還之又曰徐摛東海郯人高祖問五經大義次問歷代史及百家雜說末論釋教摛啇較縱橫荅應如響高祖寵遇日隆領軍朱異不悅謂所親曰徐叟出入兩宮漸來逼我須早為之所遂承間白高祖曰摛年老又愛泉石意在一郡以自頤養高祖謂摛欲之乃召摛曰新安大好山水任昉等並經為之卿為我臥治此郡遂出為新安守周月之中風俗便改又曰張緬出為淮南太守時年十八武帝疑其年少未閑吏事遣主書封取郡曹文案見斷決允愜甚稱賞之崔鴻十六國春秋前秦錄曰索稜字孟則燉煌人好學愽聞姚萇甚重之委以機密文章詔檄皆稜之文也後為平原太守以德化民民畏而愛之歌曰懿矣明守庶績允釐剖符作宰實獲我思又曰前涼晉昌太守陰繇卒郡人思其政化縗絰送喪至武威者千餘人後魏書曰羊敦字元禮太山平陽人為廣平太守甚有能名姦吏跼蹐秋毫無犯屬歲飢饉家饋未至使人尋陂澤拔藕而食之遇有疾苦解衣質米朝廷以其清白賜穀千斛絹百疋又曰張長年為汝南太守郡人劉崇之兄弟分拆家唯有一牛爭之不決訟于郡庭長年曰汝曹當以一牛故致此競有二牛各應得一豈有訟理即以家牛一頭賜之于是郡境之中各相誡約咸敦敬讓又曰柳崇出為河北太守崇初屆郡郡民張明失馬疑, SBCK: 刼盗三}
