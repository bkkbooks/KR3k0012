  - {type: variant, offset: 77, length: 0, content: '', WYG: 隋書曰于義遷安武太守專崇德教不尚威刑有郡民張善安王叔兒争財相訟義曰太守德薄不勝任之所致非其罪也於是取財倍與二人諭而遣去善安等各愧恥而移貫他州於是風化大治其以德化皆此類也又曰于仲文遷安固太守有任杜兩家各失牛後得}
  - {type: page-break, offset: 77, content: '', id: KR3k0012_WYG_262-3b, image: WYG0895/WYG0895-0352b.png}
  - {type: variant, offset: 78, length: 0, content: '', WYG: 牛兩家俱認州郡久不决益州長史韓伯儁曰于安固少年聰察可令决之仲文曰此易解耳於是令}
  - {type: variant, offset: 79, length: 0, content: '', WYG: 家各驅牛羣至乃放所認者遂向任氏羣中又隂使人㣲傷其牛任氏嗟惋杜家自若仲文於是訶詰杜氏服罪而去又曰栁儉煬帝特授朝散大夫拜𢎞化太守賜物一百段而遣之儉清節愈勵大業五}
  - {type: page-break, offset: 79, content: '', id: KR3k0012_WYG_262-4a, image: WYG0895/WYG0895-0352c.png}
  - {type: variant, offset: 80, length: 5, content: 間家家有丁, WYG: 入朝郡國畢集帝謂納言蘇威吏部尚書牛𢎞曰其中清名天下第一者為誰威等以儉對又問其次威以涿郡丞郭絢潁川郡丞敬肅等二人對帝賜儉帛二百疋令天下朝集使送至郡邸以旌異焉又曰}
