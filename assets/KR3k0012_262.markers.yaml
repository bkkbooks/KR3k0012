  - {type: variant, offset: 2159, length: 3, content: 王秀之, WYG: 臧厥}
  - {type: variant, offset: 2164, length: 362, content: 平太守至郡朞年謂人曰此邦豐壤祿俸常充吾山資已足豈可久留以妨賢路上表請代時人謂王晉平恐富求歸又曰裴昭明歷郡皆有善政常謂人曰人生何事須聚蓄一身之外亦復何須子孫若不才我聚彼散若能自立則不如一經故終身不治產又曰蕭介字茂鏡少頴悟有器識梁大明中武陵王紀為楊州刺史以介為府長吏在職以清白稱武帝謂何敬容曰蕭介甚貧可以處一郡復曰始興郡頻無良守可以介為之由是出焉齊春秋曰崔元祖父景真為平昌太守有惠政常懸一蒲鞭而未嘗用梁書曰褚翔為義興太守翔在政潔己省繁苛去游費百姓安之郡之西亭有古樹積年枯死翔至郡忽更生枝葉百姓咸以為善政感及秩滿吏民詣闕請之勑許焉又曰何敬容為吳郡太守為政勤恤民隱辯訟如神視事四年治為天下第一吏民詣闕請樹碑詔許之又曰劉亨字嘉會之遴弟也代之遴為南郡太守在郡有異績數年卒於官時年五十荊士至今懷之不忍其名號為大南郡小南郡又曰何胤字子季為建, WYG: ''}
