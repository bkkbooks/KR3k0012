  - {type: punctuation, offset: 86, content: 、, id: KR3k0012_CHANT_262-bkkpn17}
  - {type: variant, offset: 86, length: 3, content: 大牛遷, WYG: 駕西巡還謂武威太守樊子蓋曰人道公清定如此不子葢謝曰臣安敢言清止是小心不敢納賄耳由此賜之口味百餘斛唐書曰顔真卿}
