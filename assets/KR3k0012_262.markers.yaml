  - {type: variant, offset: 769, length: 390, content: 太守郡界下濕常患水澇百姓飢乏渾於瀟湘三縣界興陂開稻田郡人皆以為不便渾曰地勢洿下宜溉灌終成稻田經久之利此豐民之本也遂躬率吏民興立功夫一冬間皆成比年大收頃畝歲增租入倍常民賴其利刻石頌之號曰鄭陂魏略曰孟康正始中出為弘農太守康到官清平嘉善而矜不能省息獄訟緣民所欲而利之郡領吏二百餘人涉春遣休常四分遣一事無宿諾時出案行不欲煩損吏民常豫勑卒行各持鎌所在自刈馬草不止亭傳露宿樹下蜀志何祗字君肅汶山夷不安以祗為汶山太守民夷服信遷廣陵後夷反叛辭曰令得前何府君乃能安我耳時難復屈祗挾族人為之汶山復得安吳志曰顧邵字孝時年二十七起家為豫章太守下車祀先賢徐孺子之墓優待其後禁淫祀非禮之祭看相小吏資質佳者輒令就學擇其先進擢置右職學善以教風化大行又曰孫權授諸葛恪撫越將軍領丹陽太守拜畢令恪備威儀作鼓吹導引歸家恪到府乃移書四郡屬城長令各保其疆界明立部伍於是山民漸出降王隱晉書曰廣平太守𡙇宣帝謂鄭袤曰賢叔大匠垂稱於, SBCK: 未幾聲問甚髙}
