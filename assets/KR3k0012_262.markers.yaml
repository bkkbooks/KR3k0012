  - {type: variant, offset: 152, length: 0, content: '', WYG: 巴郡太守民歌之曰習習晨風動澍雨潤乎苗郡后恤時務我民以優饒及資遷去民人思資又歌曰望逺忽不見惆悵當徘徊恩澤實難忘攸攸心永懷益部耆舊傳曰張霸字伯饒為㑹稽太守舉賢士勸教講授一郡慕化但聞誦聲又野無遺冦民語曰城上烏鳴哺父母府中諸吏皆孝友鍾岏良吏傳曰王堂字敬伯廣漢郪人也為汝南太守屬城多闇弱堂簡選四部督郵奏免四十餘人以陳蕃為功曹應嗣為主簿教曰簡覈衆職委功曹拾遺補闕仰恃明俊古人有言勞於求賢逸於得士太守不敢妄有符教崔氏家傳曰崔寔除五原太守郡處邊陲不知耕桑之業民多饑寒之患於是乃勸人農種教其織絍以賑貧窮民獲濟號曰神惠焉桓階别傳曰上已平荆州引為主簿毎有深謀疑事嘗與君籌之或日暮忘食或夜坐徹旦擢為趙郡太守㑹郡寮送之上曰北邉未清以卿威能震敵德懷逺人故用相煩是亦冦恂}
