  - {type: punctuation, offset: 1163, content: ，, id: KR3k0012_CHANT_262-bkkpn290}
  - {type: 'tls:seg', offset: 1163, content: '', id: KR3k0012_CHANT_262-13a.6}
  - {type: variant, offset: 1163, length: 867, content: 並蒙惠化且盧子家王子雍繼踵此郡吾欲令郡世不乏賢故復相屈袤在郡先以德化善作條教百姓愛之又曰鄭默為東郡太守值歲荒民飢默輒開倉賑給自上待罪朝廷嘉默憂國恤人詔書襃歎比之汲黯又曰應詹為南平太守天下分崩征鎮州郡已失城邑簷獨保境外攘狂狡內除塗炭甚便百姓之情郡人歌曰亂離既普殆為灰朽僥倖之運賴茲應后潤同江海恩猶父母晉書曰范粲遷武威太守到郡選良吏立學校勸農桑是時戎夷頗侵壃場粲明設防備敵不敢侵西域流通無烽燧之警又曰劉頌為河內守郡界多公王水碓遏塞流水轉為浸害頌表罷之百姓獲其利又曰吳隱之為晉陵太守在郡清儉妻自負薪又曰鄧攸字伯道為淮南太守夢行水邊見一女子猛獸自後斷其盤囊占者以為水邊有女汝字也斷盤囊者新獸頭代故獸頭也不作汝陰當汝南也果遷汝陰太守又曰鄧攸元帝以攸為太子中庶子時吳郡闕少人多欲之帝以授攸攸載米之郡俸祿無所受唯飲吳水而已時郡中大飢攸賑貸未報乃輒開倉救之臺遣散騎常侍桓彝慰勞飢人觀聽善不乃劾攸以擅出穀俄而有詔原之攸在郡州政清明百姓歡悅為中興良守又曰鄧攸為吳郡太守稱疾去職郡常有送迎錢數百萬攸去郡不受一錢百姓數千人留牽攸舡不得進攸乃止停中夜發去吳人歌之曰紞如打五鼓雞鳴天欲曙鄧侯挽不留謝令推不去百姓詣臺乞留一歲不聽又曰陸納為吳興太守至郡不受俸祿頃之徵拜左氏尚書領州大中正將應召外白宜裝幾舡納曰私奴裝糧食來無所復須也臨發止有被幞而已其餘並封以還宮晉中興書曰王蘊字叔仁為吳興太守時郡荒民飢蘊輒開倉賑䘏主簿執諫云宜先列上蘊曰行仁義而敗者尠矣於是以米賑貸賴蘊活者十室而八然後具自表聞朝廷以違科免飢民多誦之詔特左遷晉陵太守又曰諸葛恢字道明中宗選為會稽太守臨行上為置酒謂之曰今之會稽昔關中足食足兵在於良守以君有蒞任之方是以相屈恢陳謝曰今天下喪亂之餘風俗陵遲宜尊五美屏四惡進忠實之士退浮華之黨中宗深納焉南史曰宋江秉之為臨海太守以簡約見稱卒於官所得祿秩悉散之親故妻子常飢寒人有勸其營田秉之正色荅曰食祿之家豈可與人競利在郡作書案一枚去官留以付庫齊書曰劉懷慰拜齊郡太守上謂懷慰曰齊邦是王業所基吾方以為顯任經理之事一以委卿又手勑曰有文事者必有武備今賜卿王環刀一口懷慰至郡修, SBCK: 移}
