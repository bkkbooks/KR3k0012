  - {type: variant, offset: 103, length: 0, content: '', WYG: 足虞也無幾祿山果反河朔盡陷獨平原城守具備乃使司兵叅軍李平馳奏之𤣥宗初聞祿山之變歎曰河北二十四郡豈無一忠臣乎}
