  - {type: variant, offset: 1152, length: 57, content: 賢叔大匠垂稱於陽平魏郡並蒙惠化且盧子家王子雍繼踵此郡吾欲令郡世不乏賢故復相屈袤在郡先以德化善作條教百姓愛之又曰鄭默, WYG: 涇縣洪短吳時}
