  - {type: variant, offset: 3253, length: 1, content: 劉, SBCK: 多飢寒之患於是乃勸人農種教其織絍以賑貧窮民用􅀗濟號曰神惠焉桓階別傳曰上巳平荆州引爲主簿毎有深謀疑事嘗與君籌之或日􅉴忘食或夜坐徹旦擢爲趙郡太守㑹郡寮送之上曰北邊未清以卿威能震敵德懷逺人故用相煩是亦寇恂河内之舉階在郡時俸盡食醬酻上聞之數戯之曰卿家醬頗得成不耶詔曰昔子文清儉朝不謀夕而有脯粮之秩宣子守約簞食魚飱而有加梁之賜豈况光光大魏冨有四海棟宇大臣而有􅂼食非吾所以禮賢之意也其賜射鹿師二人并給媒齊人謂麴孽爲媒江祚別傳曰祚爲安南太守民思其德生子多以江名子孟宗別傳曰宗爲豫章太守人思其惠路有行歌故時人之生子以孟爲名邵氏家傳曰邵訓字伯春爲陳留太守以君性多􅀪怒追詔勉厲之曰陳留太守講授省中六年于兹經術明篤有匡生解頥之風賜錢三十萬及刀劒衣服居家之具宣城記曰涇縣洪短吴時爲盧江太守清稱徴還舡輕皆載土時􅀊暮逐除者就乞所􅀗甚少洪乃語之逐除人見土而去􅁗子曰孔文舉爲北海相有遭父喪哭泣墓側色無憔悴文舉殺之有母病差思食新夌家無乃盗隣人熟夌而進之文舉聞特賞之盗而不罪者以爲勤飬於母也哭而見殺者以爲哀而不實也世􅀃曰周顗罷臨川郡還都未及上泊青溪渚王丞相徃看之時是夏月􅁀雨卒至舫旣狹小而又漏殆無復可坐處王曰胡威之清何以遇此即啓用焉吴興太守論衡曰淮陽鑄爲偽錢吏不能禁汲黯爲太守不壞一鑪不刑一人髙枕安卧淮陽政清風俗通曰􅁗昭王使李氷爲蜀郡太守開成都兩江漑田万頃江神􅀊取童女二人以爲婦冰自以其女與神爲㛰徑至神祠勸神酒杯但澹淡冰厲聲責之因忽不見良乆有兩倉牛闘於岸旁有間冰還流汗謂官屬曰吾闘大極不勝當相助南向􅆎中正白者我綬也主簿刺殺北面者江神遂死蜀人慕其氣决抗壯徤者因名子曰冰兒酷太守漢書曰王温舒爲廣平都尉擇郡中豪敢徃吏十餘人爲爪牙使督盗賊道不拾遺遷河内太守素居廣平時皆知河内豪姦之家以九月至郡令具私馬五十疋驛自河内至長安部吏如廣平時方略捕郡中豪滑相連坐千餘家上書請大者至族小者乃死家盡没入􅂍奏行不過二日得可事論報至流血十餘里河内皆恠其奏以爲神速盡十二月郡無犬吠之盗其頗不得失之旁郡追求㑹春温舒頓足歎曰嗟乎令冬月益展一月足吾事矣又曰嚴延年字次卿東海人爲􅃰郡太守大姓西髙氏東髙氏自郡吏巳下皆畏避之莫敢與牾咸曰寧􅀒二千石無負豪太家賔客放爲盗賊發輙入髙氏吏不敢追延年至遣􅁺蠡吾趙繡案髙氏得其死罪繍見延年爲兩劾欲先白其輕者觀延年意延年巳先知之趙􅁺至白其輕者延年索懷中得重劾即収送獄夜入晨殺吏分栲兩髙窮竟其姦誅殺各數人郡中震恐道不拾遺三􅀊遷河内太守東觀漢記曰樊曄爲天水郡其政嚴猛好申韓之術不假下以權道路不敢相盗啇人行旅以錢物於大道旁曰以付樊父後還其物如故道不拾遺凉州爲之語曰遊子常苦貧力子天所富寧見乳虎穴不入兾城寺嗟我樊府君安可再遭值晉陽秋曰廬陵太守羊冉疑郡人}
