  - {type: variant, offset: 181, length: 240, content: 若意有所不盡更來詣府鄉邑父老自相責怒曰有君如此柰何不從其教自是少辭訟詔曰昔蕭何定關中寇恂平河內卿有奇功間將授卿以納言之職顧念河東吾股肱郡充實之足以制天下故且煩卿臥而鎮之畿在河東十六年常為天下最又曰胡質字文德為常山太守遷任東莞士盧顯為人所殺質曰此士無讎而有少妻所以死乎悉見其比居年少書吏李若見問而色動遂窮詰情狀遂即自首罪人斯得每軍功賞賜皆散之於眾無入家者在郡九年吏民便安將士用命又曰倉慈字孝仁淮南人太和中遷燉煌太守郡在西陲以喪亂隔絕曠無太守二十歲大姓雄豪遂以為俗前太守尹奉等脩政而已, SBCK: 日一}
