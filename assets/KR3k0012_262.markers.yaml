  - {type: variant, offset: 3295, length: 1, content: 伯, krp: 獻皇后有屬八議帝曰此古人所無何八議之有乎未忍肆之市朝其賜命獄所琅邪王太妃山氏冉之甥也詣闕請命丞相以太妃爲言於是减死罪旣出有疾見簡良爲祟旬日而卒三國典略曰齊廣陵太守敬長瑜多受財賄刺史陸駿將啓劾之長瑜以貨求於散騎常侍和士開以畫屏風詐爲長瑜之獻齊王大恱駿啓㝷至遂}
  - {type: variant, offset: 3297, length: 3, content: 念舊惡, SBCK: 問焉梁書曰南淮侯蕭推字智進梁王第安城康王秀之子姿貌豊恱舉動可觀歷淮南宣城晉安吴郡四太守所臨之郡必赤地大旱吴人號爲旱母又曰臧厥爲晉安太守郡居山海常結聚逋逃前二千石雖募討捕而寇盗不止厥下車宣風化凢諸㓙黨皆繦􅀒而出居民復業啇旅流通然爲政嚴酷少恩吏民小事必加杖罰百姓謂之臧獸唐書曰李邕天寳􅀄爲汲郡北海二太守邕性豪侈不護細行所在縱求財貨馳獵自恣五載姦􅂍事發又嘗與左驍衛兵曹栁勣馬}
