  - {type: variant, offset: 2749, length: 301, content: 十八武帝疑其年少未閑吏事遣主書封取郡曹文案見斷決允愜甚稱賞之崔鴻十六國春秋前秦錄曰索稜字孟則燉煌人好學愽聞姚萇甚重之委以機密文章詔檄皆稜之文也後為平原太守以德化民民畏而愛之歌曰懿矣明守庶績允釐剖符作宰實獲我思又曰前涼晉昌太守陰繇卒郡人思其政化縗絰送喪至武威者千餘人後魏書曰羊敦字元禮太山平陽人為廣平太守甚有能名姦吏跼蹐秋毫無犯屬歲飢饉家饋未至使人尋陂澤拔藕而食之遇有疾苦解衣質米朝廷以其清白賜穀千斛絹百疋又曰張長年為汝南太守郡人劉崇之兄弟分拆家唯有一牛爭之不決訟于郡庭長年曰汝曹當以一牛故致此競有二牛各應得一豈有訟理即以家牛一頭賜之于是郡境之中各相誡約咸敦敬讓又曰柳崇出為河北太守崇初屆郡郡民張明失馬疑, WYG: 七}
