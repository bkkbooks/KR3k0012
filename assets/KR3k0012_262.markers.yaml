  - {type: variant, offset: 1481, length: 185, content: 攸為太子中庶子時吳郡闕少人多欲之帝以授攸攸載米之郡俸祿無所受唯飲吳水而已時郡中大飢攸賑貸未報乃輒開倉救之臺遣散騎常侍桓彝慰勞飢人觀聽善不乃劾攸以擅出穀俄而有詔原之攸在郡州政清明百姓歡悅為中興良守又曰鄧攸為吳郡太守稱疾去職郡常有送迎錢數百萬攸去郡不受一錢百姓數千人留牽攸舡不得進攸乃止停中夜發去吳人歌之曰紞如打五鼓雞鳴天欲曙鄧侯挽不留謝令推不去百姓詣臺乞留一歲不聽又曰陸納, WYG: 過此即啟用}
