  - {type: variant, offset: 3246, length: 0, content: '', SBCK: 饒爲㑹稽太守舉賢士勸教講授一郡慕化但聞誦聲又野無遺冦民語曰城上烏嗚哺父母府中諸吏皆孝子鍾岏良吏傳曰王堂字敬伯廣漢郪人也爲汝南太守屬城多闇弱堂簡選四部督郵奏免四十餘人以陳蕃爲功曹應嗣爲主簿教曰簡覈衆職委功曹拾遺􅀘闕仰恃明俊古人有言勞於求賢逸於得士太守不敢妄有符教崔氏家傳曰崔寔}
