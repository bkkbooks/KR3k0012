  - {type: variant, offset: 3295, length: 1, content: 伯, SBCK: 獻皇后有屬八議帝曰此古人所無何八議之有乎未忍肆之市朝其賜命獄所琅邪王太妃山氏冉之甥也詣闕請命丞相以太妃爲言於是减死罪旣出有疾見簡良爲祟旬日而卒三國典略曰齊廣陵太守敬長瑜多受財賄刺史陸駿將啓劾之長瑜以貨求於散􅀐常侍和士開以􅀞屏風詐爲長瑜之獻齊王大恱駿啓㝷至遂}
