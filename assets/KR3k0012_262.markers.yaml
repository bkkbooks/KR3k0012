  - {type: variant, offset: 378, length: 590, content: 人太和中遷燉煌太守郡在西陲以喪亂隔絕曠無太守二十歲大姓雄豪遂以為俗前太守尹奉等脩政而已無所匡革慈到大抑挫權右撫恤貧羸甚得其理舊大族田地有餘而小民無立錐之土慈皆隨口割賦稍稍使畢其本直先是屬城獄訟眾猥縣不能決多集治下慈躬往省閱斟酌輕重自非殊死便杖而遣之一歲決刑曾不滿十人又曰令狐邵字孔叔為弘農太守所在清如冰雪妻子希到官省舉善而教恕以待人不好獄訟與下無忌也又曰田豫字國讓遷南陽太守先時郡人侯音反眾數千人在山中為群盜大為郡患前太守收其黨與五百餘人表奏皆當死豫悉見諸繫囚慰諭開其自新之路一時破械遣之諸囚皆叩頭願自効即相告語群賊一朝解散郡內清靜具以狀聞太祖善之又曰自太祖迄于咸熙魏郡太守陳國吳璀清河太守樂安任燠京兆太守濟北顏斐弘農太守太原令狐邵濟南相魯國孔義或哀矜折獄或推誠惠愛或治身清白或擿姦發伏咸為良二千石又曰涼茂守伯方時泰山多盜賊以茂為泰山太守旬月之間繈負而至者千餘家又曰鄭渾字文公遷沛郡太守郡界下濕常患水澇百姓飢乏渾於瀟湘三縣界興陂開稻田郡人皆以為不便渾曰地勢洿下宜溉灌終成稻田經久之利此豐民之本也遂躬率吏民興立功夫一冬間皆成比年大收頃畝歲增租入倍常民賴其利刻石頌之號曰鄭陂魏略曰孟康正始中出為弘農太守康到官清平嘉善而矜不能省息獄訟緣民所欲而利之郡領吏二百餘人涉春遣休常四分遣一事無宿諾時出案行不欲煩損吏民常豫勑卒行各持鎌所在自刈馬草不止亭傳露宿樹下蜀志何祗字君肅汶山夷不安以祗為汶山, WYG: ''}
