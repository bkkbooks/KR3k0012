  - {type: variant, offset: 997, length: 157, content: 八愷高辛氏有才子八人伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍高辛帝嚳之豸號此八人稷契朱虎熊羆之倫忠肅共懿宣慈惠和天下之民謂之八元此十六族也世濟其美不隕其名以至于堯堯不能舉舜臣堯舉八愷使主后土以揆百事莫不時序地平天成舉八元使布五教于四方父義母慈兄友弟恭子孝內平外成是以堯崩而天下如一同心戴舜以為天子以其舉十六相去四凶也又襄三, SBCK: 彧}
