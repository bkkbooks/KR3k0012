  - {type: variant, offset: 2908, length: 1, content: 從, SBCK: 水作莊子讃序以示功曹後見教不常譚疑不能爲私問是廷􅁺張延所作譚即抜延薦達於部遂得升擢比譚爲廬江延亦巳爲郡譚至廬江舉寒族周訪爲孝廉訪果立功名時以譚爲知人又曰江統爲司徒左長史東海王越爲兖州牧以統爲別駕委以州事與統書曰昔王子師爲豫州未下車辟荀慈明下車辟孔文舉貴州人士有堪應者否統舉髙平郗鑒爲賢良陳留阮脩爲直言濟北程収爲方正時以爲知人徐廣晉紀曰張華少自牧羊而篤志好學􅀄爲縣史盧欽竒其才數稱薦之晉中興書曰賀循㑹稽人郡鈴下有楊方者字公迴丗爲郡威儀少好學有竒才以門役在閤下公事之暇輒讀五經郷邑未之別也内史諸􅁑恢聞方學召爲給使見而異之謂有殊常之才即解役散置左右以門人待焉由是􅀖壤敬異方始得周旋郷貴虞喜兄}
