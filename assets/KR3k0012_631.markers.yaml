  - {type: variant, offset: 2905, length: 0, content: '', SBCK: 權將甚見親重時有薦同郡盛暹於權者以爲梗槩大節有過於公績權曰但令如公績足矣後召暹夜至公績巳卧聞之攝衣出門執其手以入其愛善不害如此晉書曰桓尋字茂倫性}
