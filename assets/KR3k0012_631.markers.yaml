  - {type: variant, offset: 1614, length: 1282, content: 臣嘗遊困於齊而乞食銍人蹇叔收臣困而欲事齊君無知蹇叔止臣臣得脫齊難遂之周周王子頹好牛臣以養牛干之及頹欲用臣蹇叔止臣臣去得不誅事虞君蹇叔止臣臣知虞君不用臣臣誠私利祿爵且留再用其言得脫一不用及虞君之難是以知其賢於是繆公使人厚幣迎蹇叔以為上大夫又曰秦孝公下令曰賓客群臣有能出奇計強秦者吾且尊官與之分土衛鞅聞是令下西入秦因景監求見孝公說孝公變法脩刑內務耕稼外勸戰士明行賞罰孝公善之卒用鞅法百姓便之乃拜鞅為左庶長又曰王稽使於魏問鄭安平魏有賢人可與俱西乎安平曰臣里中有張祿先生欲見君言天下事王稽知其范睢乃載以入秦又曰趙烈侯好音謂相國公仲建曰寡人有愛可以貴之乎公仲曰富之則可貴之則否烈侯曰然夫鄭歌者槍石二人吾賜之田人萬畝公仲曰諾不與居一月烈侯問歌者曰公仲曰求未有可者有頃復問公仲終不與乃稱疾不朝番吾君謂公仲曰君實好善而未知所持今公仲相趙四年亦有進士乎曰未也番吾君曰牛畜荀欣徐越皆賢可公仲乃進三人牛畜侍烈侯以仁義約以王道明日荀欣侍以選練舉賢任宮使能明日徐越侍以節財儉用察度功德所與無不充君悅乃使使謂相國曰歌者之田且止官牛畜為師荀欣為中尉徐越為內史賜相國衣二襲史記藺相如者趙人也為趙官者令繆賢舍人趙惠文王時得楚和氏璧秦昭王聞之使人遺趙王書願以十五城請易璧趙王與諸大臣謀欲與秦恐秦城不得見欺欲勿與即患秦兵之來計未定求人可使報秦者未得官者令繆賢曰臣舍人藺相如可使王問何以知之對曰臣嘗有罪竊計欲亡走燕舍人藺相如止臣曰君何以知燕王臣語曰臣嘗從大王與燕王會境上燕王私握臣手曰願結交以此知之故欲往相如謂臣曰夫趙強而燕弱而君幸於趙王故燕王欲結交於君今君乃亡趙走燕燕畏趙其勢必不敢留君而束君歸趙矣君不如肉袒伏斧鑽請罪則幸得脫矣臣從其計大王亦幸赦臣臣竊以為其人勇士有智謀宜可使於是王召問藺相如以為賢遂使奉璧入秦又曰趙奢趙之田部吏也收租稅而平原君家不肯出趙奢以法治之殺用事者九人平原君怒將殺奢奢因說曰君於趙為貴公子今縱君家而不奉公則法削法削則國弱國弱則諸侯加兵是無趙也君安得有此富乎當以君之貴奉公如法則上下平上下平則國強國強趙固而君為貴戚豈輕於天下耶平原君以為賢言之於王王用之治國賦太平民富而府庫實卒為名將又曰陳平亡楚歸漢因魏無知求見漢王與語而說之乃拜為都尉使為參乘典護軍諸將盡讙後絳侯灌嬰等咸讒平曰臣聞平居家時盜其嫂事魏不容亡歸楚歸楚不忠又忘歸漢今日大王尊官之令護軍臣聞平受諸將金多者得善處金少者得惡處平反覆亂臣也願王察之漢王疑召讓魏無知無知曰臣所言者能也陛下所問者行也今有尾生孝己之行而無益於勝負之數陛下何暇用之乎楚漢相距臣進奇謀之士顧其計誠足以利國家不耳且盜嫂受金又何足疑乎王乃厚賜平拜為護軍中尉盡護諸將後高祖定天下與平剖符世世勿絕為戶牖侯平辭曰此非臣之功也上曰吾用先生謀計戰勝剋敵非功而何平曰非魏無知臣安得進上曰若子可謂不背本矣乃復賞魏無知漢書曰韓信投漢蕭何等已數言上不用即亡何聞信去不及以聞自追之人有言上曰丞相何亡上怒如失左右手一二日何來謁上見怒且喜罵何曰若亡何也曰臣非敢亡追亡者耳上曰亡者誰曰韓信上曰亡者十數公無所追追信詐也何曰信國士無雙王必欲長王漢中無所事信張晏曰無事用信也必欲爭天下非信無, SBCK: ''}
  - {type: variant, offset: 1614, length: 1282, content: 臣嘗遊困於齊而乞食銍人蹇叔收臣困而欲事齊君無知蹇叔止臣臣得脫齊難遂之周周王子頹好牛臣以養牛干之及頹欲用臣蹇叔止臣臣去得不誅事虞君蹇叔止臣臣知虞君不用臣臣誠私利祿爵且留再用其言得脫一不用及虞君之難是以知其賢於是繆公使人厚幣迎蹇叔以為上大夫又曰秦孝公下令曰賓客群臣有能出奇計強秦者吾且尊官與之分土衛鞅聞是令下西入秦因景監求見孝公說孝公變法脩刑內務耕稼外勸戰士明行賞罰孝公善之卒用鞅法百姓便之乃拜鞅為左庶長又曰王稽使於魏問鄭安平魏有賢人可與俱西乎安平曰臣里中有張祿先生欲見君言天下事王稽知其范睢乃載以入秦又曰趙烈侯好音謂相國公仲建曰寡人有愛可以貴之乎公仲曰富之則可貴之則否烈侯曰然夫鄭歌者槍石二人吾賜之田人萬畝公仲曰諾不與居一月烈侯問歌者曰公仲曰求未有可者有頃復問公仲終不與乃稱疾不朝番吾君謂公仲曰君實好善而未知所持今公仲相趙四年亦有進士乎曰未也番吾君曰牛畜荀欣徐越皆賢可公仲乃進三人牛畜侍烈侯以仁義約以王道明日荀欣侍以選練舉賢任宮使能明日徐越侍以節財儉用察度功德所與無不充君悅乃使使謂相國曰歌者之田且止官牛畜為師荀欣為中尉徐越為內史賜相國衣二襲史記藺相如者趙人也為趙官者令繆賢舍人趙惠文王時得楚和氏璧秦昭王聞之使人遺趙王書願以十五城請易璧趙王與諸大臣謀欲與秦恐秦城不得見欺欲勿與即患秦兵之來計未定求人可使報秦者未得官者令繆賢曰臣舍人藺相如可使王問何以知之對曰臣嘗有罪竊計欲亡走燕舍人藺相如止臣曰君何以知燕王臣語曰臣嘗從大王與燕王會境上燕王私握臣手曰願結交以此知之故欲往相如謂臣曰夫趙強而燕弱而君幸於趙王故燕王欲結交於君今君乃亡趙走燕燕畏趙其勢必不敢留君而束君歸趙矣君不如肉袒伏斧鑽請罪則幸得脫矣臣從其計大王亦幸赦臣臣竊以為其人勇士有智謀宜可使於是王召問藺相如以為賢遂使奉璧入秦又曰趙奢趙之田部吏也收租稅而平原君家不肯出趙奢以法治之殺用事者九人平原君怒將殺奢奢因說曰君於趙為貴公子今縱君家而不奉公則法削法削則國弱國弱則諸侯加兵是無趙也君安得有此富乎當以君之貴奉公如法則上下平上下平則國強國強趙固而君為貴戚豈輕於天下耶平原君以為賢言之於王王用之治國賦太平民富而府庫實卒為名將又曰陳平亡楚歸漢因魏無知求見漢王與語而說之乃拜為都尉使為參乘典護軍諸將盡讙後絳侯灌嬰等咸讒平曰臣聞平居家時盜其嫂事魏不容亡歸楚歸楚不忠又忘歸漢今日大王尊官之令護軍臣聞平受諸將金多者得善處金少者得惡處平反覆亂臣也願王察之漢王疑召讓魏無知無知曰臣所言者能也陛下所問者行也今有尾生孝己之行而無益於勝負之數陛下何暇用之乎楚漢相距臣進奇謀之士顧其計誠足以利國家不耳且盜嫂受金又何足疑乎王乃厚賜平拜為護軍中尉盡護諸將後高祖定天下與平剖符世世勿絕為戶牖侯平辭曰此非臣之功也上曰吾用先生謀計戰勝剋敵非功而何平曰非魏無知臣安得進上曰若子可謂不背本矣乃復賞魏無知漢書曰韓信投漢蕭何等已數言上不用即亡何聞信去不及以聞自追之人有言上曰丞相何亡上怒如失左右手一二日何來謁上見怒且喜罵何曰若亡何也曰臣非敢亡追亡者耳上曰亡者誰曰韓信上曰亡者十數公無所追追信詐也何曰信國士無雙王必欲長王漢中無所事信張晏曰無事用信也必欲爭天下非信無, WYG: ''}
