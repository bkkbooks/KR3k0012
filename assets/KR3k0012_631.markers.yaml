  - {type: variant, offset: 48, length: 466, content: 於君以為大夫士也管鍵也庫物所藏禮記雜記曰管仲遇盜取二人焉上以為公臣曰其所與遊僻也可人也言此人可也伹居惡人之中使之犯法又儒行曰儒有內稱不避親外舉不避怨程功積事推賢而達達之不望其報茍利國家不求富貴其舉賢援能有如此者左傳莊公曰鮑叔帥師來言曰子糺親也請君討之鮑叔乘勝而進軍志在生得管仲故言不忍之辭管召讎也請受而甘心焉管仲射桓公故曰讎甘心言欲快意戮殺之乃殺子紏于生竇召忽死之管仲請囚鮑叔受之及堂阜而稅之堂阜齊地或曰鮑叔解夷吾縛於此因以為名歸而以告曰管夷吾治於高傒高傒齊卿高敬仲也言管仲治理政事之才多於敬仲使相可也公從之又僖中曰晉侯問原守於寺人勃鞮對曰昔趙衰以壺飧從徑餒而弗食言其廉且仁不忘也徑猶行也故使處原從披言也衰雖有大功猶簡小善以進之示不遺勞又僖下曰楚子將圍宋使子文治兵於暌終朝而畢不戮一人暌楚邑自旦及食時為終朝復使子玉治兵於蒍終日而畢鞭七人貫三人耳蒍邑自旦及夕為終日國老皆賀子文子文飲之酒蒍賈尚幼後至不賀子文問之對曰不知所賀子之傳政於子玉曰以靖國也靖諸內而敗諸外所獲幾何子玉之敗子之舉也舉以敗國將何賀焉又曰初臼季使遇冀見冀缺耨其妻饁之敬, SBCK: ''}
