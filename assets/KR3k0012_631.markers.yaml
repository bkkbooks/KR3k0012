  - {type: variant, offset: 3062, length: 3, content: 能誦詩, SBCK: 爲武威將軍隨郡太守至廣設方畧斬獲數百郡境肅然又曰荀伯子好學愽覽經傳解􅄄奉朝請貟外散􅀐侍郎著作郎徐廣重其才學舉伯子及王韶之並爲佐郎同撰晉史齊}
  - {type: variant, offset: 3062, length: 0, content: '', WYG: 成功業不可令去也權即召肅與語甚悦之衆賔罷退獨引肅還相對食又曰凌統字公績呉郡人為孫權将甚見親重時有薦同郡盛暹於權者以為梗概大節有過於公績權曰但令如公績足矣後召暹夜至公績已卧聞之攝衣出門執其手以入其愛善不害如此晉書曰桓彛字茂倫性通朗早有盛名有人倫識鑒㧞才取士或出於無聞或得之孩抱時人方之許劭又曰劉恢嘗薦呉郡張憑卒為美士衆以此服其知人又曰華譚字令思廣陵人除甄城令過漢水作莊子讃序以示功曹後見功曹答教不常譚疑其不}
