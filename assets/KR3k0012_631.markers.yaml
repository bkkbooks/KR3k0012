  - {type: variant, offset: 1274, length: 196, content: 無偏無黨王道蕩蕩其祁奚之謂矣解狐得舉未得位故曰得舉祁午得位伯華得官建一官而三物成一官軍尉物事也能舉善也夫唯善故能舉其類詩云惟其有之是以似之祁奚有焉又襄六曰鄭子皮授子產政辭曰國小而偪偪近大國族大寵多不可為也子皮曰虎帥以聽誰敢犯子子善相之國無小言在治政小能事大國乃寬為大所恤故也論語子夏曰富哉言乎舜有天下選於眾舉皋陶不仁者遠矣湯有天下選於眾舉伊尹不仁者遠矣又曰仲弓為季氏宰問政子曰先有司赦小過舉賢, SBCK: 自志}
