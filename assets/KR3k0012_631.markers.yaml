  - {type: variant, offset: 2906, length: 1, content: 降, SBCK: 朗早有盛名有人倫識鑒抜才取士或出於無聞或得之孩抱時人方之許郭又曰劉恢甞薦呉郡張慿卒爲美士衆以此服其人又曰華譚字令恩廣陵人除甄城令過}
