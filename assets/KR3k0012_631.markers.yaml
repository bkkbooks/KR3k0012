  - {type: variant, offset: 2903, length: 1, content: 叔, SBCK: 張郃字儁乂河間人也郃雖武將而愛儒士嘗薦同郡畢諶經修行明詔曰昔􅀕遵爲將常置五經大夫居軍中與諸生雅歌投壷今將軍外勤戎旅内存國朝朕嘉將軍之意擢諶爲愽士又曰桓範薦徐宣曰臣聞帝王之用當丗俊才争奪之時以䇿畧爲先分定之後以忠義爲首故晉文行子犯之計而賞曰季之言髙祖用陳平之智而託後於周勃􅀼見尚書徐宣體忠厚之行秉直亮之性清雅特立不隨丗俗確然難動社稷之節今僕射􅆙宣行掌後事腹心任重莫如宣者帝遂以宣爲右僕射又曰陳群薦廣陵陳矯丹楊戴乾太祖並用之後乹以忠義死矯爲名臣蜀志曰諸􅁑亮自比管仲樂毅時人莫之許唯徐元直徐庶字元直謂爲信然時先主屯新野庶謂先主曰諸􅁑孔明者卧龍也將軍豈願見之乎先主曰君與俱來庶曰此人可就見不可屈致將軍冝枉駕頋之由是先主遂造亮凢三於是情好日宻􅀜羽張飛等不恱先主解之曰􅀌有孔明猶魚之有水也願諸君勿復言羽飛乃止呉志曰劉繇字正禮東來人兄岱字公山平原陶洪薦繇欲令舉茂才刺史曰前年舉公山柰何復舉正禮乎洪曰􅀂使君用公山於前擢正禮於後所謂御二龍於長衢騁騏􅂹於千里不亦可乎又曰周瑜薦魯肅才冝佐時當廣求其比以成功業不可令去也權即召肅與語甚恱之衆賔罷退獨引肅還合榻對食又曰凌統字公績呉郡人爲}
