  - {type: variant, offset: 805, length: 186, content: 于以采蘩于沼于沚於以用之公侯之事秦穆有焉夙夜匪解以事一人孟明有焉詒厥孫謀以燕翼子子桑有焉言子桑有舉善之謀又曰晉蒐于夷舍二軍使狐射姑將中軍趙盾佐之陽處父至自溫改蒐于董易中軍陽子成季之屬也故黨於趙氏且謂趙盾能曰使能國之利也是以上之宣子於是乎始為國政又文下曰昔高陽氏有才子八人高陽帝顓頊之號八人其苗裔蒼舒隤敳檮戭大臨尨降庭堅仲容叔達此即垂益禹皋陶之倫庭堅即皋陶字齊聖廣淵明允篤誠, SBCK: 河東􅀍山帶河當今}
