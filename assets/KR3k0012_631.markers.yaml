  - {type: variant, offset: 3515, length: 363, content: 召見韓增曰賀將軍所舉得人又曰王章奏王鳳不忠天子感悟謂章曰微京兆言吾不聞社稷計且唯賢知賢君誠為朕求可以自輔者於是章奏封事薦中山孝王舅瑯琊太守馮野王上欲以代鳳章於此為鳳所忌又曰何武為人仁厚好進士獎稱人之善為楚內史厚兩龔在沛郡厚兩唐及為公卿薦之朝廷此人顯於世者何侯之功也世以此多焉又曰大將軍王鳳用事上遂謙讓無所專左右嘗薦光祿大夫劉向少子歆通遠有異材上乃召見誦讀詩賦甚悅之欲以為中常侍召取衣冠臨當拜左右皆曰未曉大將軍又曰王鳳病天子數自臨問親執其手垂涕曰將軍病如有不諱平阿侯譚次將相矣鳳頓首泣曰譚等雖與臣至親行奢僣無以率遵百姓不如御史大夫音臣敢死保之初譚等倨不肯事鳳而音敬鳳卑恭如子故薦之又曰哀帝有詔舉太常王莽私從何武求舉武不敢舉後數月哀帝崩太后即日引莽入收大司馬董賢印綬詔有司舉可代司馬者莽故大司馬辭位辟丁傅眾庶稱以為賢又太右近親自大, SBCK: 爲}
