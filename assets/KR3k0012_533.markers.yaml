  - {type: variant, offset: 3520, length: 202, content: 名至瑒七世顯劉楨京口記曰虎社中村老故相傳云昔有虎於社中產因以為名荊州記曰葉縣東百步有縣故城西南四里名伍伯村有白榆連李樹異幹合條高四丈餘士民奉以為社世說曰阮宣子伐樹人有止之宣子曰若樹而為社伐樹則社移社而為樹伐樹則社亡矣習鑿齒逸民高士傳曰董威輦不知何許人忽見於洛陽白社中戴延之西征記曰洛陽建春門外道北有白社董威輦所住也去門二里有牛馬市嵇公臨刑處也博物志曰子路與子貢過社社樹有鳥子路搏鳥社神牽子路子貢說之乃止又, SBCK: 䇿}
