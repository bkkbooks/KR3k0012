  - {type: variant, offset: 3134, length: 172, content: 示尊五穀之長立稷而祀之稷者得陰陽和氣而為用又多故為長歲再祭之又曰祭社稷有樂乎禮記曰金石之樂用之於宗廟社稷又曰王者諸侯必有戒社何示存亡也明為善者得之為惡者失之春秋公羊傳曰亡國之社奄其上柴其下郊特牲記曰喪國之社屋之示與天地絕也蔡邕獨斷云天子太社五色土為壇皇子封為王者授之太社之土以所封之方色藉以白茅歸國以立社故為之茅社也陳留風俗傳曰東昏縣者衛地故陽, SBCK: 丗祖光}
