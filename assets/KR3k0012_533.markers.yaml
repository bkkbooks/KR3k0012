  - {type: variant, offset: 2474, length: 0, content: '', SBCK: 紹命中興依漢氏故事冝享宗明堂祀之禮江左不立明堂故闕焉齊書禮志曰案禮及孝經援神契並云明堂有五室天子每月聽朔布教􅀕五帝之神配以有功徳之君大載禮曰明堂者所以明諸侯尊卑也許慎五經異義曰布政之宫故稱明堂明堂盛貌也周官匠人職稱明堂有五官鄭玄云周人明堂五室帝一室也齊書禮志曰永明二年祠部郎蔡履議郊與明堂夲冝異曰漢東京禮儀志南郊禮畢次北郊明堂髙廟謂之五供蔡邕所據亦然近丗存省故郊堂共日來年郊􅀕冝有定准太學􅀶士王祜議來年正月上辛冝􅀕南郊次辛有事明堂後辛饗祀北郊隨書禮儀志曰明堂在國之陽梁􅀄依宋齊其祀之法猶依齊制禮有不通者武帝更與學者議之先是帝欲有改作乃下制書而與羣臣切磋其義制曰明堂准大戴禮九室八牖三十六户以茅蓋屋上圓下方鄭玄據援神契亦云上圓下方又云八䆫四逹明堂之義本是􅀕五帝神九室之數未見其理􅀂堂而言雖當五帝之數向􅀯則背汁光紀向北則背赤熛怒東向西亦如此於事殊未可安又禮儀志曰明堂後齊採周官考工記爲五室周採漢三輔黄圖爲九室各存其制而竟不立又禮儀志曰隋將作大匠宇文愷依月令文造明堂木様重檐􅃨廟五房四逹丈尺規矩皆有准慿以獻髙祖異之命有司於郭内安業里爲規兆方欲崇}
  - {type: page-break, offset: 2474, content: '', id: KR3k0012_SBCK_533-4b}
  - {type: page-break, offset: 2474, content: '', id: KR3k0012_SBCK_533-5a}
  - {type: variant, offset: 2474, length: 5, content: 建武元年又, WYG: 紹命中興}
  - {type: variant, offset: 2474, length: 0, content: '', krp: 紹命中興依漢氏故事冝享宗明堂祀之禮江左不立明堂故闕焉齊書禮志曰案禮及孝經援神契並云明堂有五室天子每月聽朔布教祭五帝之神配以有功徳之君大載禮曰明堂者所以明諸侯尊卑也許慎五經異義曰布政之宫故稱明堂明堂盛貌也周官匠人職稱明堂有五官鄭玄云周人明堂五室帝一室也齊書禮志曰永明二年祠部郎蔡履議郊與明堂夲冝異曰漢東京禮儀志南郊禮畢次北郊明堂髙廟謂之五供蔡邕所據亦然近丗存省故郊堂共日來年郊祭冝有定准太學博士王祜議來年正月上辛冝祭南郊次辛有事明堂後辛饗祀北郊隨書禮儀志曰明堂在國之陽梁𥘉依宋齊其祀之法猶依齊制禮有不通者武帝更與學者議之先是帝欲有改作乃下制書而與羣臣切磋其義制曰明堂准大戴禮九室八牖三十六户以茅蓋屋上圓下方鄭玄據援神契亦云上圓下方又云八䆫四逹明堂之義本是祭五帝神九室之數未見其理若堂而言雖當五帝之數向南則背汁光紀向北則背赤熛怒東向西亦如此於事殊未可安又禮儀志曰明堂後齊採周官考工記爲五室周採漢三輔黄圖爲九室各存其制而竟不立又禮儀志曰隋將作大匠宇文愷依月令文造明堂木様重檐複廟五房四逹丈尺規矩皆有准慿以獻髙祖異之命有司於郭内安業里爲規兆方欲崇}
  - {type: variant, offset: 2475, length: 0, content: '', SBCK: 又命詳定諸儒爭論莫之能决牛弘等又條經史正之重奏時議旣多乆而不定又議罷之及大業中愷又造明堂議及様奏之煬帝下其議但令於霍山採木而建都興役其制遂寢終隋代祀五方上帝於明堂􅁪以季秋在雩壇上而祀其用幣各於其方唐書曰永徽中詔曰朕聞合宫靈府創鴻規於上代太室緫章摽茂範於中葉雖復質文殊制奢儉異時然其立天中作人極布政施教歸之一揆朕嗣膺下}
  - {type: variant, offset: 2475, length: 0, content: '', krp: 又命詳定諸儒爭論莫之能决牛弘等又條經史正之重奏時議旣多乆而不定又議罷之及大業中愷又造明堂議及様奏之煬帝下其議但令於霍山採木而建都興役其制遂寢終隋代祀五方上帝於明堂恒以季秋在雩壇上而祀其用幣各於其方唐書曰永徽中詔曰朕聞合宫靈府創鴻規於上代太室緫章摽茂範於中葉雖復質文殊制奢儉異時然其立天中作人極布政施教歸之一揆朕嗣膺下}
  - {type: variant, offset: 2476, length: 0, content: '', SBCK: 丕承上烈思所以荅眷上靈事遵孝養而法宮曠禮明堂寢􅌟永言大禮朕甚懼焉冝令所司與禮官學士等考覈故事詳議得失於是太常􅀶士栁宣依鄭􅀇義以爲明堂之制當爲五室内直丞孔志約據大戴禮及盧植蔡邕等議以爲九室祕書郎薛文思等各造明堂圖又曰永徽中令禮官學士詳議明堂制度乆之不定上乃内出九室㨾更今損益群儒紛競各執異議于志寧等請爲九室太常􅀶士唐畛等請爲五室上令所司於觀徳殿依兩議張設親與公卿觀之上曰明堂之禮自古有之議者不同未果營建今設兩議公等以何者爲冝閻立徳對曰兩議不同俱有典故九室似闇五室似明取捨之冝斷在聖慮上亦以五室爲便議又不定由是止又曰垂拱二年毁乾元殿就其地創造明堂凢髙二百九十四尺東西南北各廣三百尺凢有三層下層象四時各隨方色中層法十二辰圎蓋蓋上盤九龍捧之上層法二十四氣亦圖蓋亭亭中有巨木十圍上下通貫刻木爲瓦紵􅃮之明堂之下施鐵渠以爲辟雍之象號爲萬象神宫又曰證聖}
  - {type: page-break, offset: 2476, content: '', id: KR3k0012_SBCK_533-5b}
