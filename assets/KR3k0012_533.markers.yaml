  - {type: variant, offset: 978, length: 296, content: 穀既登又報功也國以民為本人以食為天故建國君民先命立社地廣穀多不可徧祭故於國城之內立壇祭之親之也日用甲尊之也天有十日甲為首也周公卜洛建王都戊申社于新邑自此皆用戊日唯天子祭天地諸侯祭社稷而已又曰社樹各以其土所宜之木河東宜松周地宜栗社主用石石土中堅者天子親征則載社主行有罪者誅之於車前左傳僖公曰宋公使邾文公用鄫子於次睢之社欲以屬東夷此水有妖神東夷皆社祠之司馬子魚曰古者六畜不相為用小事不用大牲而況敢用人乎祭祀以為人也民神之主也用人其誰饗之又曰襄四君民者豈以陵民社稷是主臣君者豈為其口實社稷是養故君為社稷死則死之為社稷亡則亡之又昭七曰魏憲子問於蔡墨曰社稷五祀誰氏之五官也對曰少暭氏有四叔賈逵注曰少暭黃, SBCK: ''}
