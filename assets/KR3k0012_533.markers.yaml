  - {type: variant, offset: 2977, length: 0, content: '', SBCK: 志曰孝武帝封禪岱宗立明堂於㤗山汶上也許愼五經異義曰明堂在國之陽三里之外七里之内巳地就陽位也釋名曰明堂猶堂堂髙顯貌也三禮圖曰明堂者布政之宫周制五室東爲木室南爲火室西爲金室北爲水室土室在中􅁗爲九室十二階各有所居趙曄吴越春秋曰越王召范蠡問曰􅀌竊自志欲以今日一登上明堂布恩致令以撫百姓􅀽子正論曰明堂宗廟太學禮之大物也事義不同而論者合以爲一失之逺矣李尤明堂銘曰布政之宫上圓下方體}
