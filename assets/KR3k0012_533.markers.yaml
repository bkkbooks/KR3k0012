  - {type: variant, offset: 996, length: 395, content: 建國君民先命立社地廣穀多不可徧祭故於國城之內立壇祭之親之也日用甲尊之也天有十日甲為首也周公卜洛建王都戊申社于新邑自此皆用戊日唯天子祭天地諸侯祭社稷而已又曰社樹各以其土所宜之木河東宜松周地宜栗社主用石石土中堅者天子親征則載社主行有罪者誅之於車前左傳僖公曰宋公使邾文公用鄫子於次睢之社欲以屬東夷此水有妖神東夷皆社祠之司馬子魚曰古者六畜不相為用小事不用大牲而況敢用人乎祭祀以為人也民神之主也用人其誰饗之又曰襄四君民者豈以陵民社稷是主臣君者豈為其口實社稷是養故君為社稷死則死之為社稷亡則亡之又昭七曰魏憲子問於蔡墨曰社稷五祀誰氏之五官也對曰少暭氏有四叔賈逵注曰少暭黃帝之後金天氏也四叔四子皆叔曰重曰該曰脩曰熙實能金木水能順其成性也使重為勾芒該為蓐收脩及熙為玄冥此其三祀也顓頊氏有子曰黎祝融黎水土官黎當高辛氏之世故外傳曰黎為高辛氏火正也共工氏有子曰勾龍為后土共工大暭之後炎帝之前霸九有者也其裔子佐顓頊能, WYG: ''}
  - {type: variant, offset: 996, length: 732, content: 建國君民先命立社地廣穀多不可徧祭故於國城之內立壇祭之親之也日用甲尊之也天有十日甲為首也周公卜洛建王都戊申社于新邑自此皆用戊日唯天子祭天地諸侯祭社稷而已又曰社樹各以其土所宜之木河東宜松周地宜栗社主用石石土中堅者天子親征則載社主行有罪者誅之於車前左傳僖公曰宋公使邾文公用鄫子於次睢之社欲以屬東夷此水有妖神東夷皆社祠之司馬子魚曰古者六畜不相為用小事不用大牲而況敢用人乎祭祀以為人也民神之主也用人其誰饗之又曰襄四君民者豈以陵民社稷是主臣君者豈為其口實社稷是養故君為社稷死則死之為社稷亡則亡之又昭七曰魏憲子問於蔡墨曰社稷五祀誰氏之五官也對曰少暭氏有四叔賈逵注曰少暭黃帝之後金天氏也四叔四子皆叔曰重曰該曰脩曰熙實能金木水能順其成性也使重為勾芒該為蓐收脩及熙為玄冥此其三祀也顓頊氏有子曰黎祝融黎水土官黎當高辛氏之世故外傳曰黎為高辛氏火正也共工氏有子曰勾龍為后土共工大暭之後炎帝之前霸九有者也其裔子佐顓頊能平水土此其二祀也后土為社稷田政也掌田之官長后稷也有烈山氏之子曰柱為稷烈山炎帝之世烈山氏也自夏以上祀之周棄亦為稷周棄周祖后稷棄也為唐虞夏后稷也自商以來祀之商殷也柱之功至湯浸祀周棄以為稷也又定上曰且夫祝社稷之常隸也賤臣社稷不動祝不出境官之制也社稷動謂國遷公羊傳隱公曰宋宣公謂繆公曰以吾愛與夷則不若愛汝以為社稷宗廟主則與夷不若汝蓋終為君矣又莊公曰日有蝕之鼓用牲于社求于陰之道也以朱絲縈社或曰脅之或曰為闇恐犯故縈也又僖公曰邾婁人執鄫子用之社蓋叩其鼻以血社稷也又哀公曰毫社災毫社者何亡國之社毫社者先世亡國在魯境社者封也為封土祀社也其言災何亡國之社掩其上而柴其下故火得燒之春秋潛潭巴曰里社鳴此里有聖人生其呴百姓歸之宋均注曰鳴則教令行若湯放桀也呴鳴之怒者也論語八佾曰哀公問社於宰我宰我對曰, krp: 手㪯}
