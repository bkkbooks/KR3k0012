  - {type: variant, offset: 12, length: 10, content: 海岱及淮惟徐州厥貢惟, WYG: 帝者承天立府以尊天重象象五精之神也天有五帝集居太微降精以生聖人故帝者承天位五官之府是謂天府赤曰文祖赤帝赤熛怒之府名文祖火精光明文章之祖故謂之文周曰明堂黄曰神斗黄帝舎紐樞之府而名曰神斗斗主也}
