  - {type: variant, offset: 626, length: 141, content: 是故喪國之社屋之不受天陽也薄社北牖使陰明也絕其陽通其陰而已薄社殷之社殷始都薄社所以神地之道也地載萬物天垂象取財於地取法於天是以尊天而親地也故教民美報焉家主中霤而國主社示本也中霤亦土神也唯為社事單出里唯為社田國人畢作唯社兵乘共粢盛所以報本反始也又祭法曰王為群姓立社曰太社王自立社曰王社, SBCK: ''}
