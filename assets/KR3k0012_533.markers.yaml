  - {type: variant, offset: 1347, length: 381, content: 外傳曰黎為高辛氏火正也共工氏有子曰勾龍為后土共工大暭之後炎帝之前霸九有者也其裔子佐顓頊能平水土此其二祀也后土為社稷田政也掌田之官長后稷也有烈山氏之子曰柱為稷烈山炎帝之世烈山氏也自夏以上祀之周棄亦為稷周棄周祖后稷棄也為唐虞夏后稷也自商以來祀之商殷也柱之功至湯浸祀周棄以為稷也又定上曰且夫祝社稷之常隸也賤臣社稷不動祝不出境官之制也社稷動謂國遷公羊傳隱公曰宋宣公謂繆公曰以吾愛與夷則不若愛汝以為社稷宗廟主則與夷不若汝蓋終為君矣又莊公曰日有蝕之鼓用牲于社求于陰之道也以朱絲縈社或曰脅之或曰為闇恐犯故縈也又僖公曰邾婁人執鄫子用之社蓋叩其鼻以血社稷也又哀公曰毫社災毫社者何亡國之社毫社者先世亡國在魯境社者封也為封土祀社也其言災何亡國之社掩其上而柴其下故火得燒之春秋潛潭巴曰里社鳴此里有聖人生其呴百姓歸之宋均注曰鳴則教令行若湯放桀也呴鳴之怒者也論語八佾曰哀公問社於宰我宰我對曰, SBCK: 手㪯}
