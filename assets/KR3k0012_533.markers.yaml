  - {type: variant, offset: 3746, length: 985, content: 沐蚕種上辛乃射黑牲于帝郊以祈來年之豐二月司空開冰射桃弧棘矢五發以御其災述異記曰庾邈與女子郭凝通詣杜約不二心俱不婚娉經二年凝忽暴亡邈出見凝云前北村還遇強梁抽刀見逼懼死從之不能守節為社神所責心痛而絕人鬼異路因下泣矜之也蔡邕陳留東昏庫上里社碑曰惟斯庫上里古陽武之戶牖鄉也秦時有池子華為丞相漢興陳平由此社宰遂相高祖剋定天下為右丞相孝平之世虞延為太尉延喜中平曾孫放為尚書令以宰相繼踵咸出斯里雖有積德脩身之政亦斯社所相乃樹碑頌云魏公九鍚文曰鍚君玄土苴以白茅爰契爾龜用建冢社注言亦如天子社稷也曹植讚社文曰余前封鄄城侯轉雍丘皆遇荒土宅宇初造以府庫尚豊志在繕宮室務園圃而已農桑一所無營經離十載塊然守空飢寒備嘗聖朝愍之故封此縣田則一州之膏𦚤桑則天下之甲第故封此桑以為田社乃作頌云應璩與陰夏書曰從田來見南野之中有徒步之士怪而問之乃知郎君頃有微痾告祠社神將以祈福聞之悵然以增歎息靈社高樹能有靈應哉張華朽社賦曰高柏橋南大道傍有古社槐樹蓋數百年木也余少居近之後去行路過之則已朽株意有緬然聊為之言衰盛之理殷仲堪合社文曰夫社之為祀遠哉故大夫以成群斯禱里社之興由來尚矣自喪亂流遷舊俗隳廢今二三宗親思桑梓之遺風遵先聖之明誥潔齊牲牢庶乎自祐以來一日之澤然三人之行必有其師故復選中正立三老者惟公理以御眾稽舊章以作憲卞敬宗櫟社序讚曰余門前有一社樹盤根䟽柯似非近世所植抗秀路左流蔭庭宇莊周喻道於商丘之木匠石辯才於曲轅之櫟由斯而觀固可以悟微矣王廙春可樂曰吉辰兮上戊明靈兮唯社百室兮必集祈祭兮樹下濯卯兮葅韭齧蒜了擗鮓縹醪兮浮蟻交觴兮並坐氣和兮體適心怡兮志可何承天社頌曰社實陰祇稷唯穀元率育萬類恊贊乾坤先農禮記月令曰孟春乃擇元辰天子親載耒耜置之車右率公卿諸侯大夫躬耕籍田辰亥也謂郊後吉亥享先農於東郊先農神農也續漢書祭祀志曰光武即位於鄗為壇營於鄗之陽營神五星及中宮星雷公先農風伯雨師四海四瀆名山大川之屬漢舊儀曰春始東耕於籍田官祠先農先農即神農炎帝矣祠以一牢百官皆從大賜三輔二百里孝悌力田三老布帛漢名臣奏曰黃瓊上言先王制典籍田有曰司徒咸戒司空除壇先時五日有恊風至即齋宮饗燕載耒誠重之也先農之禮所宜躬親以迎春和以致時風沈約宋書祭祀志曰元嘉二十一年帝親耕乃立先農壇於籍田高四丈為四出陛廣五尺外加埒方十丈車駕未到司空大司農率太祝及眾執事質明以一太牢祀祭祭器用社稷器祠畢頒餘胙於奉祠者舊典先農又都列於郊祭靈星周書作雒曰設兆于南郊以祀, SBCK: 配}
