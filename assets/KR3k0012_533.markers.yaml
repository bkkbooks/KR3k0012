  - {type: variant, offset: 24, length: 1, content: 色, SBCK: 精之神也天有五帝集居太微降精以生聖人故帝者承天立五帝之府是爲天府赤曰文祖赤帝熛怒之府名文祖火精光明文章之祖故謂之文周曰明堂黄曰神斗黄帝含樞紐之府而名曰神斗斗主也士精澄静四行之主故謂之神主周曰太室白曰顯記白帝白招矩之府曰􅂋記法也金精断割万物成故記之顯記周曰總章黒曰玄矩黒帝汁光紀之府名曰玄矩矩法也水精玄昧能權輕重故謂玄矩周曰玄堂蒼曰靈府蒼帝靈威仰之府名靈府周曰青陽周書明堂曰明堂方百一十二尺髙四尺階廣六尺三寸室居中方百尺室中方六十尺東應門南庫門西臯門北雉門東方曰青陽南方曰明堂西方曰緫章北方曰玄堂中央曰太廟以左爲左个右爲右个也又程寤曰文}
