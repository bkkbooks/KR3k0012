  - {type: variant, offset: 2569, length: 0, content: '', WYG: 不立明堂故闕焉齊書禮志曰案禮及孝經援神契並云明堂有五室天子毎月聽朔布敎祭五帝之神配以功徳之君大戴禮曰明堂者所以明諸侯尊卑也許慎五經異義曰布政之宫故稱明堂明堂盛貌也周官匠人職稱明堂有五宫鄭𤣥云周人明堂五室帝一室也齊書禮志曰永明二年祠部郎蔡履議郊與明堂本宜異日漢東京禮儀志南郊禮畢次北郊明堂髙廟位之五供蔡邕所據亦然近世存省故郊堂共日来年郊祭宜有定准太學愽士王祐議来年正月上辛宜祭南郊次辛事明堂後辛饗祀北郊隋書禮儀志曰明堂在國之陽梁初依宋齊共祀之法猶依齊制禮有不通者武帝更與學者議之先是帝欲有改作乃下制書而與群臣切磋其義制曰明堂准大戴禮九室八牖三十六户以茅盖屋上圓下方鄭𤣥據援神契亦云上圓下方}
  - {type: page-break, offset: 2569, content: '', id: KR3k0012_WYG_533-7a, image: WYG0898/WYG0898-0005c.png}
  - {type: page-break, offset: 2569, content: '', id: KR3k0012_WYG_533-7b, image: WYG0898/WYG0898-0005d.png}
