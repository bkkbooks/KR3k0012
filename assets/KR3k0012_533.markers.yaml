  - {type: variant, offset: 2574, length: 0, content: '', SBCK: 永昌元年正月天后親享明堂戊午布政于明堂頒九條以記于百官巳未神皇御明堂饗羣臣賜縑練有差自明堂成後縱神都婦人及諸州老人入觀兼賜酒食至是日始止又曰開元中敕雲州置魏孝文帝}
  - {type: variant, offset: 2574, length: 3, content: 祠太社, WYG: 明堂後齊採周官考工記為五室周採漢三輔黄圖為九室各存其制而意不立又禮儀志曰隋将作大匠宇文愷依月令文造明堂木様重檐複廟五方四逹丈尺䂓矩皆有准慿以獻髙祖異之命有司於郭内安業里為䂓兆方欲崇建又命詳定諸儒争論莫之能决牛𢎞等乂條經史文重奏時議既多久而不定又議罷之及大業中愷又造明堂義及様奏之煬}
