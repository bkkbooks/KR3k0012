  - {type: variant, offset: 23, length: 0, content: '', WYG: 精澄靜四行之主故謂之神斗周曰太室白曰顯記白帝白招拒之府曰顯記法也金精斷割萬物成故謂之顯記周曰總章黒曰𤣥矩黒帝汁光紀之府名曰𤣥矩矩法也水精𤣥昧能權輕重故謂𤣥矩周曰𤣥堂蒼曰靈府蒼帝威靈仰之府名靈府周曰青陽周書明堂曰明堂方百一十二尺髙四尺階廣六尺三寸室居中方百尺室中方六十尺東應門南庫門西皋門北雉門東方曰青陽南方曰明堂西方曰總章北方曰𤣥堂中央曰太廟以左為左个右為右个也又曰文王在翟太姒夢見商之庭産棘小子發取周庭之梓樹於闕間化為松柏棫柞驚以吿文王文王曰召發于明堂拜告夢受之大命毛詩清廟我将曰我将祀文王於明堂也周禮冬官下匠人曰夏后氏世室堂脩二七廣四脩一殷人重屋堂脩七尋堂崇三尺周人明堂度九尺之筵東西九筵南北七筵堂崇一筵世室者宗廟也脩南北之深也夏度以歩令堂脩十四歩其廣益以四分脩之一則廣十七歩半也重室者王室正堂若大寝者周則其廣九尋七丈三尺也大戴禮盛徳曰凢人民疾六畜疾}
  - {type: page-break, offset: 23, content: '', id: KR3k0012_WYG_533-1b, image: WYG0898/WYG0898-0002d.png}
