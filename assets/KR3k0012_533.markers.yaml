  - {type: variant, offset: 619, length: 1, content: 雨, WYG: 於户牖間周公於前立也三公中階之前北面東上諸侯之位阼階之東西面北上諸伯之國西階之西東面北上諸子之國門東北面東上諸男之國門西北面東上九夷之國東門之外西面北上八蠻之國南門之外北面東上六戎之國西門之外東面南上五狄之國北門之外南面東上九采之國應門之外北面東上四塞世吿至此周公明堂之位也又明堂位曰明堂也者明諸侯之尊卑也朝於此所}
