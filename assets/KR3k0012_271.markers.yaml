  - {type: variant, offset: 4540, length: 301, content: 變田宅富厚足也一變不然則州黨與宗族足懷樂也三變不然則上之教訓習俗慈愛之於民也厚無所往得之也君之恩厚皆在於人無所他往故得人致死四變不然則山林澤谷之利足生也五變不然則地形險阻易守而難攻也六變不然則罰嚴而可畏也賞明而足勸也七變不然則有深怨於敵人也八變不然則有深於上也功厚則祿多故亦自為戰而不得於君九變今恃不信之人而求以利用不守之民而欲以固將不戰之卒而幸以勝此兵之三闇也尉僚子曰凡兵者羊腸亦勝鋸齒亦勝兵重者如山林輕者如燔如炮如漏如潰如堵垣壓人也雲霓覆人也又曰故兵止如堵牆動如風雨車不結轍士不旋踵此本戰之道也所以養民也又曰城所以守戰戰所以守城也故務耕者其民不飢務守者其民不危務戰者其地不圍三者先王之本務也而兵最急, SBCK: ''}
