  - {type: variant, offset: 1102, length: 1, content: 為, krp: 政之謂也善政者恤民之患除民之害故政善於内則兵彊於外也杜恕論曰天生五材民並用之廢一不可誰能去兵故兵之來也乆矣所以威不軌而昭文德所以討彊暴而除殘賊也聖人以興亂人以廢廢興存亡皆兵之由也昔五帝不能偃況衰世乎又曰濫殺無辜之民以養不義之君非兵之體也殫天下之財以贍一人之求非兵之體也怙其兵甲之器矜其變詐之謀欲以立威成名非兵之體也虜其君隷其臣遷其社易其民非兵之體也故夫霸王之用兵也始之以義終之以仁將以存亡非以亡存也將以禁暴非以爲暴也又曰兵之來也以除不義而授德克其國不傷其民廢其君而不易其政尊其俊秀顯其賢良賑其孤寡恤其窮困百姓聞之欣然簞食壷漿以迎其君奚之遲也以湯武之師用兵上也誰與交鋒而接刃哉又曰所謂善用兵者先弱敵而後戰者也若乃征之以義以責其過振之以武以威其淫懷之以德以誓其民置之以仁以救其危此四者用兵之體所謂因民之欲乗民之力也又曰治國家理境内施仁義布德惠明勸賞黜幽昧功臣附親}
  - {type: variant, offset: 1104, length: 0, content: '', SBCK: 卒和輯上下一心君臣同德指麾而響應此上兵之體也地廣民衆主賢將能國冨賞罰信未至交兵而敵人亡遁此次兵之體也知地之形因險阨之利明竒正之變審進退之冝援枹而鼓之黄塵四起乃以决勝此用兵之下非兵之體也又曰夫德義足以懷天下之民事業足以當天下之急選舉足以得賢才之用則兵之所加􅀂勁風振槁此兵之體也鹽鐵論曰兵者凶器也甲堅兵利爲天下殃其母制子故能乆長聖人法之厭而不傷蔣子萬機論曰夫虎之爲獸水牛之爲畜殆似兵矣夫虎爪牙旣鋒膽力無伍至於即豕也卑俯而下之必有扼喉之獲夫水牛不便速角又喬踈然處郊之野朋逰屯行部隊相伍及其寢􅀫因陣反禦􅀂見兕虎抵角牛全兕害矣􅀂用兵恃彊必鑒於虎居弱必誡水牛可謂攻取屠城而守必能全者矣劉向新序曰上古之時其民敦朴故三皇教而不誅無師而威故善爲國}
  - {type: page-break, offset: 1104, content: '', id: KR3k0012_SBCK_271-9a}
  - {type: variant, offset: 1104, length: 0, content: '', WYG: 卒和輯上下一心君臣同德指麾而響應此上兵之體也地廣民衆主賢將能國富賞罰信未至交兵而敵人亡遁此次兵之體也知地之形因險阸之利明竒正之變審進退之宜援枹而鼓之黄塵四起乃以决勝此用兵之下非兵之體也又曰夫德義足以懷天下之民事業足以當天下之急選舉足以得賢才之用則兵之所加若勁風振槁此兵之體也鹽鐡論曰兵者㓙器也甲堅兵利爲天下殃其母制子故能乆長聖人法之厭而不傷蔣子萬機論曰夫虎之爲獸水牛之爲畜殆其兵矣夫虎爪牙既鋒膽力無伍至於即豕也卑俯而下之必有扼喉之獲夫水牛不便速角又喬踈然處之郊野朋遊屯行部隊相伍及其寢宿因陣反禦若見虎兕抵􅠅虎兕害矣若用兵恃强必鑒於虎居弱必誡水牛可謂攻取屠城而守必能全者也劉向新序曰上古之時其民敦朴故三皇教而不誅無師而威故善爲國}
