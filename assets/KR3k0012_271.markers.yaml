  - {type: variant, offset: 764, length: 0, content: '', SBCK: 三軍之衆百萬之師志厲青雲氣如飄風聲如雷電誠積踰而威加敵人此謂氣勢狹路􅀜津大山名塞龍虵蟠蟠􅁈屈也却苙居却偃覆也苙登也羊膓道羊膓一屈一伸魚茍門竹笱所以捕魚其門可入而不得出也一人守險而千人不敢過此謂地勢因其勞倦怠亂飢渇凍暍推其揺揺擠其掲掲此謂因勢間諜間諜軍之反間也審錯䂓慮設蔚施伏草木盛曰蔚隱遁其形出於不意使敵人之兵無所適備此謂知鈐陣卒正前行選進退俱什伍搏前後不相蹍蹍蹀蹈也左右不相干受刃}
