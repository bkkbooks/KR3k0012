  - {type: variant, offset: 9, length: 3, content: 𧈪尤作, SBCK: 善黄石公記曰將所有爲威者號令也戰所以全勝者軍正也士所以輕戰者用}
  - {type: page-break, offset: 9, content: '', id: KR3k0012_SBCK_271-1b}
  - {type: variant, offset: 9, length: 1, content: 𧈪, WYG: 善黄石公記曰將所以有威者號令也戰所以全勝者軍正也士所以輕戰者用兵也故戰如風發勇如河决衆可望而不可當可下而不可勝也黄石公三畧曰聖王之制兵也非好樂之也將以誅暴也暴謂亂國賊民夫以義誅不義决江河漑螢火其剋必也商君書曰夫民情好爵禄而畏刑罰人君設此二者以御民夫民力盡而名隨之功立而賞隨之君能使其民信此明於日月則兵無敵也吕氏春秋曰古之聖王有義兵譬之若用藥良藥活人義兵爲天下之良藥也又曰古聖王有義兵而無有偃兵兵之所自來者尚矣其始與民俱兵也者威也威也者力也民之有威力性也性者所受於天者也非人之所能為也黄炎固用水火矣黄帝炎帝共工固欲作難矣與高辛氏爭為帝而亡之也五帝固相與爭矣又曰人曰蚩}
