  - {type: variant, offset: 1197, length: 522, content: 權權出於戰不出於仁也分不均求不勝謂之不獲意權錘也平輕重而為之功以死易生以危為寧反覆往來而以詐成故曰不出於仁也是故殺人殺之可也以殺止殺可以生也攻其國愛其民攻之可也除民亂去君害以戰去戰雖戰可恃也故仁見親義見悅智見恃勇見方信見信將有五材民親悅恃方而信之故內得愛焉所以守也外得威焉所以戰也利加於人則守固威加於敵人則戰勝又曰戰道不違時不歷民病所以愛吾民也春夏興師為違時春興師虜五穀夏興師傷人民故役不踰時寒暑不易服飢疫不行所以愛民也不加喪不因凶所以愛夫其人也敵有喪飢疫不加兵愛彼民如己民冬夏不興師所以兼愛彼民也大寒甚暑吏士懈倦故國雖大好戰必亡天下雖平忘戰必危又曰天下既雖平天子大凱春蒐秋獮諸侯振旅秋治兵所以不忘戰也又曰古者逐奔不過百步縱綏不過三舍是以明其禮也不窮不能而哀憐傷痛是以明其仁也成列而鼓是以明其信也爭義不爭利是以明其義也又能捨服是以明其勇也知始知終是以明其智也六德以時合散以為民紀者古之道也自古之政也仁義勇智信民之本隨時而施為民綱紀古之所傳政道也又曰先王之治順天之道設地之宜官民之德而正名治物正者正官名也名正則可治之立國辨職立國治民分守境界各任其職也以爵分祿以爵位尊卑職其祿秩也諸侯悅懷海外來服服從己也獄弭而兵寢聖德之治也又曰有虞氏不賞不罰而民可, SBCK: ''}
