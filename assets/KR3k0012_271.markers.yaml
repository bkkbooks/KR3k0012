  - {type: punctuation, offset: 1101, content: 「, id: KR3k0012_CHANT_271-bkkpn334}
  - {type: variant, offset: 1101, length: 0, content: '', SBCK: 夫兵之要在於修政修政之要在於得民心得民心在於利之也要仁以受之義以理之故六馬不和造父不能以致逺民臣不附湯武不能以立功故兵之要在得衆得衆者}
  - {type: variant, offset: 1101, length: 0, content: '', WYG: 夫兵之要在脩政脩政之要在於得民心得民心在於利之也要仁以愛之義以理之故六馬不和造父不能以致遠民臣不附湯武不能以立功故兵之要在得衆得衆者}
  - {type: variant, offset: 1101, length: 0, content: '', krp: 夫兵之要在於修政修政之要在於得民心得民心在於利之也要仁以受之義以理之故六馬不和造父不能以致逺民臣不附湯武不能以立功故兵之要在得衆得衆者}
  - {type: variant, offset: 1102, length: 1, content: 為, SBCK: 政之謂也善政者恤民之患除民之害故政善於内則兵彊於外也杜恕論曰天生五材民並用之廢一不可誰能去兵故兵之來也乆矣所以威不􅁤而昭文德所以討彊􅁀而除殘賊也聖人以興亂人以廢廢興存亡皆兵之由也昔五帝不能偃況衰世乎又曰濫殺無辜之民以養不義之君非兵之體也殫天下之財以贍一人之求非兵之體也怙其兵甲之器矜其變詐之謀欲以立威成名非兵之體也虜其君􅀠其臣遷其社易其民非兵之體也故夫霸王之用兵也始之以義終之以仁將以存亡非以亡存也將以禁􅁀非以爲􅁀也又曰兵之來也以除不義而授德克其國不傷其民廢其君而不易其政尊其俊秀顯其賢良賑其􅀌寡恤其窮困百姓聞之欣然簞食壷漿以迎其君奚之遲也以湯武之師用兵上也誰與交鋒而接刃哉又曰所謂善用兵者先弱敵而後戰者也􅀂乃征之以義以責其過振之以武以威其􅁋懷之以德以誓其民置之以仁以救其危此四者用兵之體所謂因民之欲乗民之力也又曰治國家理境内施仁義布德惠明勸賞黜幽昧功臣附親}
