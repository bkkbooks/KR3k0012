  - {type: variant, offset: 158, length: 1, content: 兼, SBCK: 於其未通也窅窅乎莫知其情此之謂至威之誠也又曰凢兵欲急疾捷先欲急疾捷先之道在於知緩徐遟後緩徐遟後急疾捷先之分也急疾捷先所以决義兵之勝也又曰雖有江河之險則凌之雖有大山之塞則蹈之并氣搏精心無有慮猶預之慮目無有視耳無有聞壹諸武而已矣又曰萬乗之國外之不可以距敵内之不得以守固其民非不可以用也不得所以用之術也不得所以用之術國雖大勢雖便卒雖衆何益也淮南子曰古之用兵者非利壤土之廣而貪金玉之賂將以存亡繼絶平天下之亂而除萬民之害也又曰凢有血氣之虫含牙戴角前爪後距有角者觸有齒者螫有蹄者趹喜而相戯怒而相害天之性也人有衣食之情而物弗能足也群居雜處分不均求不贍則争争則彊脅}
