  - {type: variant, offset: 1107, length: 0, content: '', krp: 王伐紂皆陣而不戰故善陣者不戰三王之謂也及夏后之伐有扈殷髙宗討鬼方周宣王之征熏鬻而不血刃皆仁聖之惠時化之風也至齊桓侵蔡而蔡潰伐楚而楚服而彊楚以致苞茅之貢於周室北伐山戎使奉朝覲三存亡一繼絶九合諸侯一匡天下衣裳之㑹十有一嘗有大戰亦不血刃至晉文公設虎皮之威陳曵柴之僞以破楚師而安中國故曰}
  - {type: variant, offset: 1111, length: 1, content: 怒, SBCK: 死晉文公之謂也楚昭王遭闔閭之禍國滅昭王出亡父老迎而􅀏之昭王曰寡人不仁不能守社稷父老反􅀏何無憂寡人且從此入海矣父老曰有君􅀂此其賢也及申包胥請救􅂘秦庭七日秦君憐而救之秦楚同心遂走吴師昭王反國故善死者不亡昭王之謂也是故自晉文公已下至戰國而􅁀兵始衆於是以彊并弱以大呑小故彊國務攻弱國備守合從連衡群相攻伐故戰則稱孫吴守則稱墨翟至秦而以兵并天下窮兵極武而亡及項羽尚􅁀而滅漢以寛仁而興故能掃除秦之苛􅁀矣孝武皇帝攘服四夷其後天下安然故丗之爲兵者其行事略可觀也}
  - {type: page-break, offset: 1111, content: '', id: KR3k0012_SBCK_271-10a}
  - {type: variant, offset: 1111, length: 1, content: 怒, WYG: 死晉文公之謂也楚昭王遭闔閭之禍國滅昭王岀亡父老迎而笑之昭王曰寡人不仁不能守社稷父老反笑何無憂寡人且從此入海矣父老曰有君若此其賢也及申包胥請救哭秦庭七日秦君憐而救之秦楚同心遂走吳師昭王反國故善死者不亡昭王之謂也是故自晉文公已下至戰國而暴兵始衆於是以强并弱以大吞小故强國務攻弱國備守合從連衡羣相攻伐故戰則稱孫吳守則稱墨翟至秦而以兵并天下窮兵極武而亡及項羽尚暴而滅漢以寛仁而興故能掃除秦之苛暴矣孝武皇帝攘服四夷其後天下安然故世之爲兵者其行事畧可觀也}
