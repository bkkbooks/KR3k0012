  - {type: variant, offset: 2287, length: 340, content: 實之所在也又曰軍旅以舒為主舒則人力足雖交兵致刃徒人不趍車不馳也逐奔不踰列是以不亂軍旅之固不失行列之政不絕人馬之力遲速無過誡命軍旅政為堅固也進退疾徐從金鼓之聲也又曰軍庸不入國國庸不入軍軍庸入國則民德廢國庸入軍則民德弱軍國異庸彊弱殊任故不相入入則亂也故在國言文而語溫在朝恭以遜脩己以待人不召不至不問不言難進易退此申敘國庸之宜在軍抗而立在行遂而果介者不拜兵車不軾城上不趍危事不齒此申致軍庸之宜抗者不待問也意者有慮於事而為不須令遂必也果勝也介者不拜車不軾騎不下所以遠屈而亂行也上趍為驚眾也故禮與法表裏也文與武左右也古者賢王明民之德盡民之善故無廢德無簡民賞無可生罰無可殺也民有一善處一事故能盡民之善無損德民能堪其事故賞罰無所施又曰凡從奔勿息敵或止於路則慮之追敵奔北無休懈則敵於路旁設伏當視察, WYG: 獵散}
