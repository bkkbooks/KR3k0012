  - {type: variant, offset: 2691, length: 1379, content: 不定而恐懼選良次兵是謂益民之強選良者澤取勁勇有材者為前當什伍相以接之死地及見勝則心專強之棄任節食謂開民之意自古之政也任者畜積器物焚儲畜服御之具節餘糧戰之日不餘食示必死戰也開塞生意以專民心此五帝三王用兵之道也曹公孫子兵法序曰操聞上古弧矢之刊論語足食足兵易曰師貞傳云王赫斯怒黃帝湯武咸用干戈為民也用武者滅用文者亡夫差偃王是也聖賢之於兵也戢而時動不得已而用之觀兵書戰策孫武深矣孫子者齊人也名武為吳王闔閭作兵法一十三篇試之婦人卒以為將西破強楚入郢北滅齊晉後百餘歲有孫臏是武之後也孫子曰兵者國之大事校之以計而索其情謂下五事彼我之情一曰道二曰天三曰地四曰將五曰法道者令人與上同意謂導以教令也故可與之死可與之生而人不畏危危疑也言上有仁化於下下則能致命也天者陰陽寒暑時利地者遠近險易廣狹死生言以九也形勢不同因時制度也將者智信仁勇嚴將宜五德備也法者曲幟制官道主用部曲幡幟金鼓之制官者道者糧路主用軍費用也凡此五者將莫不聞之者勝不知者不勝又曰兵者詭道故能而示之不能用而示之不用言己實能用師外示無法近而示之遠遠而示之近欲進而治去道若韓信之襲安邑陳舟臨晉而度於夏陽是也故利而誘之亂而取之實而備之敵持實須備之強而避之避其所長怒而撓之待其衰解卑而驕之引而勞之以利勞之規而離之佚而勞之以利勞之攻其無備出其不意擊其懈怠空虛也此兵之勝不可豫傳傳洩也又曰凡用兵之法全國為上破國次之夫興兵深入長驅敵舉國來服為上次兵擊破得之為次全軍為上破國次之軍四千人全卒為上破卒次之上一千人下五百人全伍為上破伍次之百人至五人也是故百戰百勝非善之善不戰而屈人之兵者善之善者也夫不戰而敵自屈服上兵伐謀敵始有謀伐之易也又曰故用兵之法十則圍之以十敵一則圍之是為智等而兵利釣而客勁操所以倍兵圍下邳而生擒呂布也倍則分之以二敵一二則為當一術音遂為奇敵則能戰已為士眾等差者猶設奇伏以勝之也少則能逃高壁壘勿與敵戰也不若則能逃之引兵避之故小敵之堅大敵之擒也小不能當大也又曰凡治眾如治寡分數是也部曲為分什伍為數也鬥眾如鬥少形名是也旌旗曰形金鼓曰名三軍之眾可使必受敵而無敗者奇正是也先出合戰為當後出為奇也兵之所加如以瑕投卵者虛實是也以實擊虛也又曰故善動敵者形之敵必從之見羸形也與之敵必取之以利動之以卒待之以利害動敵也故善戰者求之於勢專在權也不責於人故能擇人而任勢以勢者權變明也任勢者其戰人也如轉木石木石之性安則靜危則動方則止員則行任勢自然故善戰人之勢如轉員石於萬仞之山者勢也又曰凡先據戰地而待敵者佚有餘力也後據戰地而趣戰者勞故善戰者致人而不致於人能使敵人自至者利之也誘以之利能使敵人不得至者害之也出兵所必趣攻兵所必救故敵佚能勞之以利煩之飽能飢之絕其糧道安能動之出其所必趍也使敵必救又曰兵形象水水之行避高而就下兵之形避實而擊虛故水因地而制形兵因敵而制勝故兵無常勢水無常形能與敵變化而取勝者謂之神勢盛必衰形露必敗能因敵變化勝之若神故五常無常勝四時無常位日有長短月有死生兵無常勢盈縮隨敵也又曰故不知諸侯之謀者不能豫交不知敵情謀者不能結交也不知山林險阻沮澤之形者則不能行軍高而崇者為山樹木所聚者為林坑堆者為險一高一下為沮水草漸洳為沮泉水所歸不流者為澤也不用鄉導者不能得地利故兵以詐立以利動以分合為變者也兵一分一合此敵為變故兵疾如風擊虛空也徐如林不見利也侵掠如火疾如火也不動如山守山難知如陰似天陰不見外宿也動如雷霆又曰夜戰多火鼓晝戰多旌旗所以變人之, SBCK: 車爲羽翼􅀐爲}
