  - {type: variant, offset: 4072, length: 308, content: 也故三軍可奪氣將軍不可奪心左氏言一鼓作氣再而衰三而竭也是故朝氣銳晝氣惰暮氣歸故善用兵者避其銳氣擊其惰歸此治者也以治待亂以靜待譩此治心者也以近待遠以佚待勞以飽待飢此治力者也無邀正正之旗無擊堂堂之陣此治齊人者也正正高齊堂堂者大又曰用兵之法高陵勿向倍兵勿迎丘阪勿迎佯北勿從銳卒勿攻餌兵勿食歸師勿遏懷歸故能死戰不可擊也圍師勿鬭司馬法曰兵三面開其一面示生路也若敵專陸地必空一面以示其虛欲使戰守不周也此用兵之法也又曰故善用兵譬如帥然帥然者常山之虵也擊其首則尾至擊其尾則首至擊其中則首尾俱至又曰踐墨循敵以決戰事行踐規矩無常者也是故始如處女敵人開戶後如脫兔敵不及矩處女示弱兔往也吳子曰鼓鞞金鐸所以威耳旌麾旗章所以威目禁令刑罰所以威心, SBCK: ''}
