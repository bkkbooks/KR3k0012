  - {type: variant, offset: 772, length: 0, content: '', WYG: 之機固已形矣又曰兵有三勢有二鈐有氣勢有地勢有因勢將克勇而輕敵卒果敢而樂戰三軍之衆百萬之師志厲青雲氣如飄風聲如雷電誠積踰而威加敵人此謂氣勢狹路津關大山名塞龍蛇蟠蟠蜿屈也却笠居却偃覆也笠簦也羊腸道羊腸一屈一伸魚笱門竹笱所以捕魚其門可入而不得出一人守險而千人不敢過此謂地勢因其勞倦怠亂飢渴凍暍推其揺揺擠其掲掲此謂因勢間諜間諜軍之反間也審錯規慮設蔚施伏草木盛曰蔚隠遁其形岀於不慮使敵人之兵無所適備此謂知鈐陣卒正前行選進退俱什伍搏前后不相蹍蹍蹍蹈也左右不相干受刃者少傷敵者衆此謂事鈐鈐勢必形吏卒博精選良用才官得其人計定謀决明於死生舉措得時莫不振驚故攻不待隆衝雲梯而城㧞雲梯可依雲而立所以瞰敵之城中也戰不至交兵接刃而敵破明於必勝之數也}
