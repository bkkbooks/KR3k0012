  - {type: variant, offset: 557, length: 122, content: 猶立司馬之官設六軍之眾因井田而制軍賦焉天子畿方千里提封百萬井出軍賦六十四萬井戎馬四萬疋兵車萬乘故稱萬乘之主戎馬車徒干戈素具春振旅以蒐夏軷舍以苗秋治兵以獮冬大閱以狩皆以農隙以講武事焉連師比年簡車率正三年簡徒群牧五載大簡車徒此先王為國立戰足兵之大略, SBCK: 所利者多}
