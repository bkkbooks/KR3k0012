  - {type: variant, offset: 770, length: 0, content: '', WYG: 衆去之衆之所助雖弱必强衆之所去雖大必亡也又曰兵失道而弱得道而强將失道而拙得道而工國得道而存失道而亡所謂道者取員而法方背隂而抱陽左柔而右剛履幽而觀暘地方而無限故莫能窺其門天員而無形象地生長而無計量渾渾沉沉孰知其藏也又曰凡物有朕唯道無朕言萬物可朕也而道}
  - {type: variant, offset: 771, length: 1, content: 亡, SBCK: 待衝隆雲梯而城拔雲梯可依雲而立所以瞰敵之城中也戰不至交兵接刃而敵破明於必勝之數也}
  - {type: variant, offset: 771, length: 0, content: '', WYG: 可朕也所以無朕者以其常形勢也轉輪而無窮象日月之行若春秋有代謝若日月有晝夜終而復始明而復晦莫能得其紀制形而無形故政可成象萬物而不物故勝不屈形兵之極也至於無形可謂極矣又曰大兵無創與鬼神通五兵不厲天下莫之敢當建鼓不岀庫諸侯莫不慴懼沮膽故廟戰者帝神化者王所謂廟戰者法天道也神化者法四時也脩政於境内而遠方慕其德制勝於未戰而諸侯服其威也又曰民誠從令雖少無畏民不從令雖衆爲寡故下不親上下心不畏卒不畏將其形不戰守有必固而攻有必勝不待交兵接刃而存}
