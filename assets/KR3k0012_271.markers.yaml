  - {type: variant, offset: 1720, length: 354, content: 至德也夏后賞而不罰至教也殷罰而不賞至威也周以賞罰德衰也賞不踰時欲民速得為善之利也罰不遷列欲民覩不善之害也賞功不移晷罰惡不列所以勸善懲惡欲疾速者也又曰夏后正其德也未用兵之刃故其兵不雜設軍不陣敵服故不用五兵殷義也始用兵之刃矣陣而不戰周力也盡用兵之刃矣周不及虞夏之教討暴征亂戰後勝夏賞於朝貴善也以德化也殷戮於市威不善也以刑禁也周賞於朝戮於市勸君子懼小人也以賞進以罰禁三王章其德一也三王皆道德文武隨而施之其致一也又曰凡戰寬而觀其慮寬者先以卑弱示不能以示敵變化慮其利害得失所在也進退以觀其固遣輕兵至敵所在視察進退固備虛危處所也危而觀其懼詐設危事以知敵恐怖得失之勢也靜而觀而怠敵靜而不動相視吏士知懈怠動而觀其疑輕兵挑戰相見敵人知其疑否也襲而觀其治欲襲敵先視其守備外內什伍器械虛實治亂所在也又曰凡戰以輕行輕危輕兵高林疾足能, SBCK: 車}
