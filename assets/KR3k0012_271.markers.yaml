  - {type: 'tls:seg', offset: 1107, content: '', id: KR3k0012_CHANT_271-15a.12}
  - {type: variant, offset: 1107, length: 0, content: '', SBCK: 王伐紂皆陣而不戰故善陣者不戰三王之謂也及夏后之伐有扈殷髙宗討􅀑方周宣王之征熏鬻而不血刃皆仁聖之惠時化之風也至齊桓侵蔡而蔡潰伐楚而楚服而彊楚以致苞茅之貢於周室北伐山戎使奉朝覲三存亡一繼絶九合諸侯一匡天下衣裳之㑹十有一嘗有大戰亦不血刃至晉文公設虎皮之威陳曵柴之僞以破楚師而安中國故曰}
  - {type: page-break, offset: 1107, content: '', id: KR3k0012_SBCK_271-9b}
  - {type: variant, offset: 1107, length: 0, content: '', WYG: 王伐紂皆陣而不戰故善陣者不戰三王之謂也及夏后氏之伐有扈殷高宗討鬼方周宣王之征熏鬻而不血刃皆仁聖之惠時化之風也至齊桓侵蔡而蔡潰伐楚而楚服使彊楚以致苞茅之貢於周室北伐山戎使奉朝覲三存亡一繼絶九合諸侯一匡天下衣裳之㑹十有一嘗大戰亦不血刃至晉文公設虎皮之威陳曵柴之僞以破楚師而安中國故曰}
