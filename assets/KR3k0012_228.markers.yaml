  - {type: variant, offset: 1997, length: 1, content: 拂, SBCK: 以爲干齊􅁺吏扣頭争之不聽遂収送詔獄并自劾論者非其激發諺曰居代不諧爲太常妻一歳三百六十日三百五十九日齊一日不齊醉如泥旣作事復低迷漢官典職曰惠帝改太常爲奉常景帝復爲太常蓋周官宗伯也漢官解詁曰太常社稷郊祀事重職尊故在九卿之首衛宏曰太常主導賛􅂇􅀕皆平冕七旒􅀇上纁下華䖝七章漢陵屬三輔太常月一行漢書注顔師古曰太常者王之旌也􅀞日月焉王有大事則建以行禮官主奉持之故曰奉常後改曰太尊大之義也齊職儀曰太常卿一人品第三秩中二千石銀章綬進賢兩梁冠絳朝服佩水蒼玉王朗云西京太常行陵赤車千乗益部􅂄舊傳曰趙典字仲經爲太常雖身處上卿而布􅀍瓦器梁陸陲爲光禄讓太常表曰昔者楚徳方盛叔敖濯}
