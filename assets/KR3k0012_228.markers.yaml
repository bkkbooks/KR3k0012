  - {type: variant, offset: 2875, length: 2621, content: 執法剛正百寮畏憚時人呼皂鵰言其顧瞻人吏如鵰鶚之視鷰雀也又曰蘇瓌案問鄭普思其妻有寵於韋庶人特勑令對御辨折上屢抑瓌而伸普思侍御史范獻忠歷階而前曰臣請先罪蘇瓌上問其故獻忠曰蘇瓌國之大夫荷榮貴久矣不斬逆賊而後聞奏今使眩惑天聰搖動刑柄而普思反狀昭露陛下曲為申理此則王者不死今聖躬萬福豈有兩天子耶臣請先死終不能事普思上意乃解獄遂定又曰御史遭長官於途皆免帽降乘長官戢轡辭而上馬乾封中王本立為御史意氣頗高途逢長官端揖而巳自是諸人或降而立或足至地或側鞭弛𩍐輕重無恒開元以來但舉鞭聳揖而巳也又曰劉藏器為侍御史時衛卿尉遟寶琳抑人為妾藏器奏請還其父母上既可其奏寶琳私奏乞之上又從之藏器復執奏上又可之寶琳又請如是三藏器進言曰法者海內之懸衡上下之所共若刑罰不中則人無所措手足陛下若用捨恣情愛憎由巳則國之刑憲何所施陳今寶琳請陛下從之臣執奏陛下亦從之今日從之明日又改之欲令下人何以遵奉夫人無信不立疋夫疋婦尚不可失信況為天子安可戲言今陛下二三其言處分不定臣恐四海之內無所適從上竟從藏器所奏又曰王播為侍御史貞元末華臣李實為京兆尹恃恩頗橫嘗遇播於途不避故事尹避臺官播移文詆之又曰溫造拜侍御史請復置彈事朱衣豸冠於外廊大臣阻而不行李祐自真州入拜金吾違制進馬一百五十疋造正衙彈奏祐服戰汗流祐私謂人曰吾踰蔡州城擒吳元濟未嘗心動今日膽落于溫御史吁可畏哉英雄記曰袁紹辟大將軍府不得巳起從命舉高第遷侍御史弟術為尚書紹不欲為臺下告疾求退三輔決錄曰韋約字季明司徒劉愷甚敬重之謂曰君以輕去就故大位不躋今歲垂盡選御史實欲煩君約曰犬馬齒盡既無膂力又無考課所以躊躇戀慕者以明公禮遇隆崇未能自割因稱素有風疾眩冒不堪久侍遂徒跣趍出公追不及陳留耆舊傳曰楊仁字文義明帝引見問當代政治之事仁對上大奇之拜侍御史明帝崩是時諸馬貴賤各爭入宮仁被甲持戟遮勑宮門不得令入章帝既立諸馬貴更讚仁刻峻於是上善之通典曰侍御史之職四謂推推有掌推鞠彈掌彈舉公廨知公廨事雜事臺中事悉揔之定殿中監察以下職事及進名改轉臺內之事悉主之號為臺端它人稱之曰端公其知雜事者謂之雜端最為雄極食座之南設橫榻謂之南床殿中監察不得座亦謂之癡床言處其上者皆矯傲自得使人如癡故謂之癡床也凡侍御史之例不出累月則遷登南省故號為南床百日客其行止出入揖讓去就殿中巳下皆稟而隨之先後虧失者有罰又曰二漢侍御史所掌凡有五曹一曰令曹掌律令二曰印曹掌劾曰三曰供曹掌齊祀四曰尉馬曹掌廄馬五曰乘曹掌獲駕豹尾之內便為禁省又曰舊例御史臺不受訴訟有通辭狀者即於臺門候御史競往門外收採知可彈者略其姓名皆云風聞訪知永徽中崔義玄為大夫始定受事御史一日劾狀題告人姓名黃石公陰謀祕法曰熒惑火之精御史之象主禁令刑罰收捕糺正殿中侍御史六典曰殿中侍御史掌殿庭供奉之儀式凡冬至元正大朝會則具服升殿若郊祀巡省則其服從於旌門撿察視其文物之有虧闕則糺之凡兩京城內則分知左右巡各察其所巡之內有不法之事三國典略曰齊宋世良字元友魏孝莊時為殿中侍御史詣河北括戶大獲游惰至汲郡帝見有骸骨移書瘞之其夜有雨滂沱孝莊勞之曰卿所括得丁倍於本帳若官人皆如此便是更生出一天下也唐書官品志曰殿中侍御史四人掌殿中禁衛內事又曰張行成為殿中侍御史糺劾不避權戚太宗以為能房玄齡曰觀古今用人必因媒介若行成者朕自舉之無先容也又曰王無競自監察御史轉殿中侍御史舊例每日更直於殿前正班宰相宗楚客楊再思嘗離班偶語無競前曰朝禮至敬公等大臣不宜輕易以慢恒典楚客等大怒轉無競為太子舍人又曰殿中侍御史郭震劾刑部尚書趙彥照太子賓客韋嗣立青州刺史韋安石曰彥照以女巫趙五娘左道亂常託為諸姑潛相影援既因提挈遂踐台階或驅車造門施婦人之服或攜妻就謁申猶子之情同惡相濟一至於此又張易之兄弟勢傾朝野嗣立此際結為舅甥神龍之初巳合誅死天網踈漏腰領誤全與安石託附阿韋編諸屬籍中宗晏駕削太皇輔正之制定阿韋臨朝之策此時朝野危懼人神怨憤臣忝司清憲敢不糺彈彥照等並請准法處分於是並貶官山公啟事曰中書屬通事令史孫琳限滿久習內事才宜殿中侍御史須空補之不審可否詔曰可曹氏傳曰左擁起於碎吏武帝以為能擢為殿中侍御史監察御史六典曰監察御史掌分察百寮巡按郡縣糺視刑獄肅整朝廷有不肅敬及鬥失者則糺而劾之唐書曰李素立武德初為監察御史時有犯法不至死者高祖將令殺之素立諫曰三尺之法與天下共之法一動搖則人無所措手足陛下甫創鴻業遐荒尚阻柰何輦轂之下便棄刑書臣忝法司不敢奉旨高祖從之又曰張嘉貞蒲州猗氏人也坐事免歸鄉里居長安侍御史張循憲為河東採訪使薦嘉貞材堪憲官請以巳之官秩授之則天召見垂簾與之言嘉貞奏曰臣以草萊而得謁九重是千載一遇也咫尺之間如隔雲霧竟不覩日月恐君臣之道有所未盡則天遽令卷簾與語大悅擢拜監察御史又曰紀履忠為監察御史劾奏御史中丞來俊臣犯狀有五一專擅國權二謀害忠善三贓賄貪濁四失義勃禮五淫昏很戾論茲五罪合至萬誅請下獄理罪又曰蕭至忠為監察御史彈鳳閣侍郎同鳳閣鸞臺三品蘇味道贓污貶官御史大夫李承嘉嘗召諸御史責之曰近日彈事不諮大夫禮乎眾不敢對至忠進曰故事臺中無長官御史人君耳目比肩事主得各自彈事不相關或先白大夫而許彈事如彈大夫不知白誰也承嘉默然而憚其剛正又曰崔琬為監察御史彈奏宰相宗楚客紀處納等驕恣跋扈請收劾之舊制大臣有被御史彈者皆俯僂趍出待罪朝省楚客瞋目作色稱以忠鯁被誣中宗令琬與楚客約為兄弟人竊歎焉又曰齊澣定州義豐人少以詞學稱弱冠制科登第景雲二年中書令姚崇用為監察御史彈劾違犯先於風教當時以為稱職又曰開元五年監察御史杜暹往磧西覆屯會郭處瓘與史獻等不叶更相執奏詔暹案其事實史獻以金遺暹固辭左右曰公遠使絕域不可失蕃人情暹不得巳受之埋於幕下既去出境乃移牒令收取之又曰李勉拜監察御史屬朝廷右武勳臣恃寵多不知禮大將榮崇嗣於行在朝堂背闕而坐言笑自若勉劾之拘於省司肅宗特原之歎曰吾有李勉始知朝廷尊矣又曰御史臺奏准舊例監察御史從下六人各察尚書省一司又准興元元年十月勑令監察從上第一人察吏部禮部第二人察兵部工部第三人察戶部刑部第四人者伏以監察第一第二人巳充監察及館驛等使新人除出使外並無以觀其能否今請守舊制新人分察從之又曰元稹拜監察御史奉使東蜀劾奏東川節度使嚴礪違制禮擅賦入籍沒塗山甫等吏民八十八戶田宅奴婢時礪巳死七州刺史皆責罰稹雖舉職而執政有與礪厚者惡之又曰楊收兄假自浙西觀察判官入為監察御史兄弟並居憲府特為新例又曰李憕音澄太原人也宇文融為御史括田戶奏知名之士崔希逸咸廙業宇文順于孺卿李宙及憕為判官攝監察御史分路檢察以課並遷監察御史又曰柳渾拜監察御史臺中執法之地動限儀矩渾性放曠不甚檢束察長拘局忿其踈縱渾不樂乞外任執政惜其才奏為左補闕, SBCK: ''}
