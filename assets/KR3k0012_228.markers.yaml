  - {type: variant, offset: 961, length: 1, content: 爭, SBCK: 奪也該覽群籍古今詳備又百官志曰太常卿每􅀕祀先奏禮儀及行事則賛天子大射養老䘮皆奏其禮儀秩比中二千石華嶠後漢書曰劉愷爲太常論議常弘正大義諸儒爲之語曰難經伉伉劉太常魏書曰和洽字士陽汝南西平人轉爲太常清貧守約至賣田宅以自給明帝聞之加賜􅂖帛又曰常林從光禄勲爲太常晉宣王以林郷邑􅂄老每爲之拜或謂林曰司馬公貴重君冝且止之林曰司馬公自欲敦長㓜之序以爲後生之法貴非吾之所制也言者慙而蹜蹜又曰刑顒字子昇時人稱徳行堂堂刑子昇文帝以爲太常晉書曰鄭黙字思元遷太常山濤欲舉一親爲􅀶士見黙語曰卿尹翁歸令吾不敢復言謂其柔而能整也}
