  - {type: variant, offset: 1519, length: 287, content: 言公當具瞻之秋樞機何可輕發素甚奇之又曰游元為侍御史奉使於黎陽督運會楊玄感作逆乃謂元曰獨夫肆虐天下士大夫肝腦塗地以䧟身絕域之所軍糧斷絕此亦天亡之時我今親率義兵誅無道卿意如何元正色荅曰尊公荷國寵靈功參佐命高官重祿近古莫儔公之兄弟青紫交映當謂竭誠盡節上荅鴻恩豈意墳土未乾親圖反噬深為明公不取願思禍福之端僕有死而巳不敢聞命玄感怒而囚之屢脅以兵竟不屈節於是害之又曰陳孝意大業初為魯郡司法書佐郡內號為廉平太守蘇威嘗欲殺一囚孝意固諫至於再三威不許孝意因解衣請先受死良久威意乃解謝遣之漸加禮敬及威為納言奏孝意侍御史又曰獬豸冠案禮圖曰法冠也一曰柱後惠文如淳注漢官云惠蟬也細如蟬翼今御史服之禮圖, SBCK: 始}
