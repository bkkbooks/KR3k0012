  - {type: variant, offset: 6, length: 1, content: 侍, SBCK: 曰}
  - {type: variant, offset: 6, length: 3, content: 侍御史, WYG: 曰宗正六曰執金吾七曰大司農八曰少府九曰大鴻臚十曰廷尉十一曰大長秋十二曰將作大匠辨云漢正卿九一曰太常二曰光禄勲三曰衞尉四曰太僕五曰廷尉六曰鴻臚七曰宗正八曰司農九曰少府是為九卿通典曰後漢九卿而分屬三司太常光禄勲衞尉三卿並太尉所部太僕廷尉大鴻臚三卿並司徒所部宗正大司農少府三卿並司空所部尚書周官曰六卿分職各帥其屬以倡九牧阜成兆民六卿各帥其屬大夫止治所分之職倡導九州牧伯為政大成兆民之生命漢官儀曰卿秩中二千石綬青地桃花三彩又曰衣裳公侯華蟲卿大夫藻火左傳曰齊侯使敬仲為卿辭曰覉旅之臣幸若獲宥及於寛政赦其不閑於教訓而免於罪戾弛於負擔君之惠也所獲多矣敢辱髙位以速官謗請以死告以死為誓又曰卿非君命不越境又曰晉蒐于被廬命趙衰為卿讓於先軫杜預曰先軫晉下軍之佐原軫周禮曰朝士掌外朝之法左九棘孤卿大夫位焉樹棘以為位者取其赤心而外刺象赤心三刺春秋漢含孳曰故三公象五岳九卿法河海三公在天三台九卿法北斗國語曰晉悼公使張老為卿辭曰臣不如魏絳之智能治大官其人可以利公室若在卿位外内必平漢官儀曰司馬安巧宦四至公卿謝承後漢書曰李淑諫更始曰夫三公上應台宿九卿下括河海梁書曰武帝天監七年以太常為太常卿加置宗正卿以大司農為司農卿三卿是為春卿加置太府卿以少府為少府卿加置太僕卿三卿是為夏卿以衞尉為衞尉卿廷尉為廷尉卿將作大匠為大匠卿三卿是為秋卿以光禄勲為光禄卿大鴻臚為鴻臚卿都水使者為大舟卿三卿是為冬卿凡十二卿皆置丞及功曹主簿北齊書曰以太常光禄衞尉宗正太僕大理鴻臚司農太府是為九寺莊子曰楚昭王迎屠羊説以執珪之位馬彪曰諸侯三卿皆執珪説苑曰秦繆公使賈人載鹽於衞賈人買百里奚使將車至秦繆公觀鹽見百里奚牛肥公問之對曰臣牛食之以時使之不暴是以肥也公知其君子以為上卿又曰九卿者不失四時通於溝渠補隄防種樹美五穀如是舉以為九卿之事常在於德又曰齊桓公使管仲治國對曰賤不能臨貴桓公以為上卿而國不治對曰貧不能使富桓公賜之齊市租一年而國不治桓公曰何故對曰疎不能成近桓公立以為仲父國大安孔子曰管仲之貴不得此權者亦不能使其君靣南而伯矣太常卿}
