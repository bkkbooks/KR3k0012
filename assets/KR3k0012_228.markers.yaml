  - {type: variant, offset: 5124, length: 372, content: 屬朝廷右武勳臣恃寵多不知禮大將榮崇嗣於行在朝堂背闕而坐言笑自若勉劾之拘於省司肅宗特原之歎曰吾有李勉始知朝廷尊矣又曰御史臺奏准舊例監察御史從下六人各察尚書省一司又准興元元年十月勑令監察從上第一人察吏部禮部第二人察兵部工部第三人察戶部刑部第四人者伏以監察第一第二人巳充監察及館驛等使新人除出使外並無以觀其能否今請守舊制新人分察從之又曰元稹拜監察御史奉使東蜀劾奏東川節度使嚴礪違制禮擅賦入籍沒塗山甫等吏民八十八戶田宅奴婢時礪巳死七州刺史皆責罰稹雖舉職而執政有與礪厚者惡之又曰楊收兄假自浙西觀察判官入為監察御史兄弟並居憲府特為新例又曰李憕音澄太原人也宇文融為御史括田戶奏知名之士崔希逸咸廙業宇文順于孺卿李宙及憕為判官攝監察御史分路檢察以課並遷監察御史又曰柳渾拜監察御史臺中執法之地動限儀矩渾性放曠不甚檢束察長拘局忿其踈縱渾不樂乞外任執政惜其才奏為左補闕, krp: ''}
