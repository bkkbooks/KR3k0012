  body:
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 六叙卿太常卿叙卿韋昭辨釋名曰卿慶也言萬國皆慶頼之也帝王世紀曰九卿者所以叅三公也白虎通曰卿章也善明理也韋昭辨釋名曰漢置十二卿一曰太常二曰太僕三曰太衛尉四曰光禄}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 六叙卿太常卿叙卿韋昭辨釋名曰卿慶也言萬國皆慶賴之也帝王世紀曰九卿者所以叅三公也白虎通曰卿章也善明理也韋昭辨釋名曰漢置十二卿一曰太常二曰太僕三曰太衞尉四曰光禄}
