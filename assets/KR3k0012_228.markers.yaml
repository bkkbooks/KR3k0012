  - {type: variant, offset: 397, length: 913, content: 篆少者增益多者損減方者使員員者使方奏之始皇善之出為御史又曰張蒼好舊曆秦時為御史主柱下方書漢書曰江充拜直指綉衣使督三輔盜賊禁察踰侈時近臣多奢僣充皆舉劾請沒入車馬令身從北軍擊匈奴奏聞貴戚惶恐又曰王駕字翁孺武帝時為繡衣御史逐捕群盜皆縱而不誅又曰嚴延年遷御史劾霍光專廢立東觀漢記曰陳寵曾祖父咸哀平間以明律為侍御史王莽篡位父子相將歸鄉里閉門不出乃收家中律令文書壁藏之以俟聖主咸常戒子孫為人議法當依輕雖有百金之利無與人重後漢書曰桓典為侍御史執政無所避常乘驄馬京師畏之語曰行行且止避驄馬御史又曰杜詩為御史安集洛陽時將軍蕭廣放縱兵士暴橫民間百姓惶擾詩勑曉不改遂格殺廣還以狀聞世祖召見賜以棨戟焉又曰李恂拜侍御史持節使幽州宣布恩澤慰撫北狄所過皆圖寫山川屯田聚落百餘卷悉封奏上肅宗嘉之又曰光武聞杜林還三輔乃徵拜侍御史引見問以經書故舊及西州事甚悅之賜以車馬衣被又曰陳翔字子麟拜侍御史元日朝賀大將軍梁冀威儀不整翔奏請收冀理罪時人奇之又曰楊秉字叔節拜侍御史京畿咸稱其宰相之才又曰譙玄為繡衣使者持節分行天下觀覽風俗所至專行誅賞續後漢書曰种音中暠字景伯順帝時為侍御史監護太子承光宮中常侍高梵受勑迎太子不齎詔書以衣車載太子欲出太子太傅高褒不知所以力不能止開門臨去暠至橫劍當車曰御史受詔監護太子太子國之儲副人命所繫常侍來無一尺詔書安知非挾姦耶今日之事有死而巳梵不敢爭又曰張綱字文紀遷侍御史漢初遣八使巡行風俗八使同日拜謂之八彥皆宿儒要位唯綱年少官微受命各之所部而綱獨埋車輪於洛陽都亭曰豺狼當路安問狐狸遂奏大將軍梁冀兄弟罪惡京師震悚魏志曰袁紹字本初有姿皃威容能折節下士士多附之太祖少與交以大將軍掾為侍御史又曰帝嘗大會殿中御史簪白筆側階而坐上問左右此為何官何主左右不對辛毗曰謂御史舊時簪筆以奏不法今者直備官但珥耳吳志曰呂岱親近吳都徐原慷愾有才志岱知其可成賜巾褠古切衣侯丹與共言論後遂薦拔官至侍御史原性忠壯好直言岱時有得失原輒諫爭又公論之人或以告岱岱笑是我所以貴德淵德淵岱字者也及原死岱哭之甚哀曰德淵呂岱之益友今不幸岱復於何聞過談者美之又曰張紘字子綱廣陵人也孫策遣紘奏章至許宮留為侍御史少府孔融等皆與親善又曰朱據字子範吳郡人也補侍御史是時選曹尚書暨艷疾貪污在位欲沙汰之據, WYG: 怒}
