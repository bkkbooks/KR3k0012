  - {type: variant, offset: 67, length: 121, content: 夫中丞押大事則豸冠朱衣纁裳白紗中單以彈之小事常服而巳續漢書百官志曰侍御史員五人秩六百石以公府掾屬高第補之或牧守議郎郎中為之掌察非法受公卿群吏奏事有違失者舉劾之凡郊廟及大拜則一人監威儀有違失則劾奏漢官儀侍臣下曰御史秦官也案問有御史掌邦國都鄙及萬, SBCK: 成兆}
