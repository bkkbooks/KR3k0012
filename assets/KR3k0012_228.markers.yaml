  - {type: variant, offset: 2197, length: 571, content: 廷有事遼東言忠奉使往支軍糧及還高宗問以軍事言忠畫其山川地勢具陳遼東可平之狀高宗悅又問諸將優劣言忠曰李勣先朝舊臣聖鑒所悉龐同善雖非鬥將而持軍嚴整薛仁貴勇冠三軍名可振敵高侃儉素自處忠果有謀契苾何力沉毅持重有統御之才然頗有忌前之癖諸將夙夜小心忘身憂國莫逮於李勣者高宗深然之又曰劉思立宋州寧陵人也高宗時為侍御史屬河南河北旱儉遣御史中丞崔謐等分道存問賑給思立上䟽諫曰今麥序方秋蠶功未畢三時之務萬姓所先勑使撫巡人皆竦抃忘其家業冀此天恩踊躍參迎必難抑止集聚既廣妨廢亦多加以途程往還兼之晨夕停滯既緣賑給須立簿書本欲安存卻成煩擾又無驛之處騎馬稍難簡擇公私須臾追集雨後農務特切常情蹔廢須臾即虧歲計每為一馬遂勞數家從此相乘恐更滋甚望且委州縣賑給待秋後閑時出使褒貶䟽奏謐等遂不行又曰李義府恃寵用事婦人淳于氏有美色坐事繫大理乃諷丞畢正義枉法出之將納為妾會有密言其狀者上令給事中劉仲軌鞠之義府恐洩其謀逼正義自縊於獄中上知而特原義府之罪侍御史王義方奏義府擅殺寺丞陛下雖巳釋放然天子置三公九卿二十七大夫八十一元士本欲水火相濟塩梅相成然後庶績咸熙風雨交泰則知人主不得獨是非昔唐堯至聖失之於四凶漢祖深仁失之於陳狶光武聰明寬恕失之於逢萌魏武勇略英雄失之於張邈此英傑之主莫不失之於前得之於後陛下繼聖撫有萬邦蠻陬夷落猶懼刑綱况輦轂咫尺姦臣肆虐殺一六品寺丞足使忠臣抗憤縱令正義自縊此事彌, SBCK: 野}
