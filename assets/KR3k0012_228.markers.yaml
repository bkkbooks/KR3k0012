  - {type: variant, offset: 128, length: 0, content: '', WYG: 語曰難經伉伉劉太常魏志曰和洽字士陽汝南西平人轉為太常清貧守約至賣田宅以自給明帝聞之加賜穀帛又曰常林從光禄勲為太常晉宣王以林鄉邑耆老每為之拜或謂林曰司馬公貴重君宜止之林曰司馬公自欲敦長幼之序以為後生之法拜非吾之所制也言者慙而蹜蹜又曰邢顒字子昇時人稱德行堂堂邢子昇文帝以為太常晉書曰鄭黙字思元遷太常山濤欲舉一親為博士見黙語曰卿尹翁歸令吾不敢復言謂其柔而能整也又曰張華為太常以太廟屋棟折免官臧榮緒晉書曰或熙五年詔曰華表字偉容清賢履道内貞外順厯位忠恪言行不玷其以表為太常卿晉起居注曰安帝三年太常臨川王寳啓府舎窄狹不移家母鍾年髙違離靡寧乞還第攝事詔聽之晉中興書曰蔡謨字道明拜太常咸康四年臨軒門下奏非祭祀宴饗則無娛樂謨奏宜有金石顯宗納焉臨軒作樂自此始也又曰建元元年詔曰太常職典天地兼}
