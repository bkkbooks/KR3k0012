  - {type: variant, offset: 12, length: 18, content: 侍御史掌糺舉百寮推鞫訟凡有別付者則按, SBCK: 後漢九卿而分属三司太常光禄勲衛尉三卿並太常所部太卿廷尉大鴻臚三卿並司徒所部宗正大司農少府三卿並司空所部尚書周官曰六卿分職各帥}
  - {type: variant, offset: 12, length: 1, content: 侍, WYG: 太常卿之職掌邦國禮樂郊廟社稷之事以八者分而理焉一曰郊社二曰太廟三曰諸陵四曰太極五曰鼓吹六曰太醫七曰太卜八曰廩犧總其屬行其政令尚書堯典曰伯夷汝作秩宗典朕三禮周禮春官曰大宗伯一人掌天神地祗人鬼之禮史記曰髙祖滅秦登尊號羣臣飲酒爭功醉或妄呼㧞劍上患之於是叔孫通進説遂為綿蕝子悦切野外習之月餘通曰可試觀上使行禮帝輦出房百官執職傳警引諸侯王以下次奉賀莫不震恐肅敬諸侯坐殿上皆伏抑首以尊卑起上夀觴九行謁者言罷}
  - {type: page-break, offset: 12, content: '', id: KR3k0012_WYG_228-5a, image: WYG0895/WYG0895-0115a.png}
  - {type: variant, offset: 12, length: 18, content: 侍御史掌糺舉百寮推鞫訟凡有別付者則按, krp: 後漢九卿而分属三司太常光禄勲衛尉三卿並太常所部太卿廷尉大鴻臚三卿並司徒所部宗正大司農少府三卿並司空所部尚書周官曰六卿分職各帥}
