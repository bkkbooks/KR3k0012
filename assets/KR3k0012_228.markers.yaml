  - {type: variant, offset: 206, length: 0, content: '', SBCK: 禮曰朝士掌外朝之法左九􅁄􅀌卿大夫位焉樹􅁄以爲位者取其赤心而外刺象赤心三刺春秋漢含孳曰故三公象五岳九卿法河海三公在天法三台九卿法北斗國語曰晉悼公使張老爲卿辭曰臣不如魏綘之智能治大}
  - {type: variant, offset: 206, length: 2, content: 官也, WYG: 澤}
  - {type: variant, offset: 206, length: 0, content: '', krp: 禮曰朝士掌外朝之法左九棘孤卿大夫位焉樹棘以爲位者取其赤心而外刺象赤心三刺春秋漢含孳曰故三公象五岳九卿法河海三公在天法三台九卿法北斗國語曰晉悼公使張老爲卿辭曰臣不如魏綘之智能治大}
  - {type: variant, offset: 207, length: 0, content: '', SBCK: 其仁可以利公室若在卿位外内必平漢官曰司馬安巧官四至九卿謝承後漢書曰李叔諌更始曰夫三公上應台宿九卿下括河内梁書曰武帝天監七年以太常卿加置宗正卿以司農爲司農卿三卿是為春卿加置太府卿以少府爲少府卿加太僕卿三卿是爲夏卿以衛尉卿廷尉卿將作大匠卿三卿是爲秋卿以光禄勲爲光禄卿大鴻臚爲鴻臚卿都水使者爲大舟卿三卿是爲冬卿凢十三卿皆置丞及功曹主簿北齊書曰以太常光禄衛尉宗正太僕大理鴻臚司農太府是爲九寺莊子曰楚昭王迎屠羊􅀃以珪之位馬彪日諸侯三卿皆執珪􅀃苑曰􅁗繆公使賈人載塩於衛賈人買百里奚使將軍至􅁗繆公勸塩見百里奚牛肥公問之對曰臣牛食之以時使之不􅁀是以肥}
  - {type: page-break, offset: 207, content: '', id: KR3k0012_SBCK_228-2b}
  - {type: variant, offset: 207, length: 0, content: '', krp: 其仁可以利公室若在卿位外内必平漢官曰司馬安巧官四至九卿謝承後漢書曰李叔諌更始曰夫三公上應台宿九卿下括河内梁書曰武帝天監七年以太常卿加置宗正卿以司農爲司農卿三卿是為春卿加置太府卿以少府爲少府卿加太僕卿三卿是爲夏卿以衛尉卿廷尉卿將作大匠卿三卿是爲秋卿以光禄勲爲光禄卿大鴻臚爲鴻臚卿都水使者爲大舟卿三卿是爲冬卿凢十三卿皆置丞及功曹主簿北齊書曰以太常光禄衛尉宗正太僕大理鴻臚司農太府是爲九寺莊子曰楚昭王迎屠羊說以珪之位馬彪日諸侯三卿皆執珪說苑曰秦繆公使賈人載塩於衛賈人買百里奚使將軍至秦繆公勸塩見百里奚牛肥公問之對曰臣牛食之以時使之不暴是以肥}
