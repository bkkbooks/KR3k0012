  - {type: variant, offset: 1397, length: 334, content: 人自衛而不救火正色詰之彰怒曰我能截卿角也㪍然謂彰曰君何時敢恃寵作威作福天子法冠而欲截角呼命紙筆奏之彰伏不敢言眾人皆釋乃止隋書曰柳調轉侍御史左僕射楊素嘗於朝堂見調因獨言曰柳調通體弱獨搖不須風調歛板正色曰調信無取者公不當以為侍御史調信有可取不應發此言公當具瞻之秋樞機何可輕發素甚奇之又曰游元為侍御史奉使於黎陽督運會楊玄感作逆乃謂元曰獨夫肆虐天下士大夫肝腦塗地以䧟身絕域之所軍糧斷絕此亦天亡之時我今親率義兵誅無道卿意如何元正色荅曰尊公荷國寵靈功參佐命高官重祿近古莫儔公之兄弟青紫交映當謂竭誠盡節上荅鴻恩豈意墳土未乾親圖反噬深為明公不取願思禍福之端僕有死而巳不敢聞命玄感怒而囚之屢脅以兵竟不屈節於是害之又曰陳孝意大業初為魯郡司法書佐郡內號為廉平太守蘇威嘗欲殺一囚孝意固諫至於再, WYG: 六十日}
