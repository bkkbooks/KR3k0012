  - {type: variant, offset: 202, length: 3, content: 侍御史, SBCK: 卿中秩二千石綬青地桃花三彩又曰衣裳公侯華蟲卿大夫藻火左傳曰齊侯使敬仲爲卿辭曰覉旅之臣幸若獲宥宥赦及於寛政赦其不閑於教訓而免於罪戾㢮於􅀒檐君之惠也所獲多矣敢辱髙位以速官謗請以死告以死爲誓又曰卿非君命不越境又曰晉蒐于􅀍盧命趙衰爲卿讓於先軫杜預日先軫晉下軍之佐原軫}
