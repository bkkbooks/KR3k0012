  - {type: variant, offset: 3569, length: 681, content: 文義明帝引見問當代政治之事仁對上大奇之拜侍御史明帝崩是時諸馬貴賤各爭入宮仁被甲持戟遮勑宮門不得令入章帝既立諸馬貴更讚仁刻峻於是上善之通典曰侍御史之職四謂推推有掌推鞠彈掌彈舉公廨知公廨事雜事臺中事悉揔之定殿中監察以下職事及進名改轉臺內之事悉主之號為臺端它人稱之曰端公其知雜事者謂之雜端最為雄極食座之南設橫榻謂之南床殿中監察不得座亦謂之癡床言處其上者皆矯傲自得使人如癡故謂之癡床也凡侍御史之例不出累月則遷登南省故號為南床百日客其行止出入揖讓去就殿中巳下皆稟而隨之先後虧失者有罰又曰二漢侍御史所掌凡有五曹一曰令曹掌律令二曰印曹掌劾曰三曰供曹掌齊祀四曰尉馬曹掌廄馬五曰乘曹掌獲駕豹尾之內便為禁省又曰舊例御史臺不受訴訟有通辭狀者即於臺門候御史競往門外收採知可彈者略其姓名皆云風聞訪知永徽中崔義玄為大夫始定受事御史一日劾狀題告人姓名黃石公陰謀祕法曰熒惑火之精御史之象主禁令刑罰收捕糺正殿中侍御史六典曰殿中侍御史掌殿庭供奉之儀式凡冬至元正大朝會則具服升殿若郊祀巡省則其服從於旌門撿察視其文物之有虧闕則糺之凡兩京城內則分知左右巡各察其所巡之內有不法之事三國典略曰齊宋世良字元友魏孝莊時為殿中侍御史詣河北括戶大獲游惰至汲郡帝見有骸骨移書瘞之其夜有雨滂沱孝莊勞之曰卿所括得丁倍於本帳若官人皆如此便是更生出一天下也唐書官品志曰殿中侍御史四人掌殿中禁衛內事又曰張行成為殿中侍御史糺劾不避權戚太宗以為能房玄齡曰觀古今用人必因媒介若行成者朕自舉之無先容也又曰王無競自監察御史轉殿中侍御史舊例每日更直於殿前正班宰相宗楚客楊再思嘗離班偶語無競前曰朝禮至敬公等大臣不宜輕易以慢恒典楚客等大怒轉無競, WYG: 仲經}
  - {type: variant, offset: 3569, length: 0, content: '', krp: 仲經爲太常雖身處上卿而布𬒳瓦器梁陸陲爲光禄讓太常表曰昔者楚徳方盛叔敖濯衣漢道克昌王陽結綬故拜命無辭受爵不讓况宗卿清重歷選所難漢晉巳降莫非素範辭爵則桓郁張奮讓封則丁鴻劉愷潘尼音夷之}
