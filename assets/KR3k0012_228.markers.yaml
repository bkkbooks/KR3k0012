  - {type: variant, offset: 2274, length: 1109, content: 軍名可振敵高侃儉素自處忠果有謀契苾何力沉毅持重有統御之才然頗有忌前之癖諸將夙夜小心忘身憂國莫逮於李勣者高宗深然之又曰劉思立宋州寧陵人也高宗時為侍御史屬河南河北旱儉遣御史中丞崔謐等分道存問賑給思立上䟽諫曰今麥序方秋蠶功未畢三時之務萬姓所先勑使撫巡人皆竦抃忘其家業冀此天恩踊躍參迎必難抑止集聚既廣妨廢亦多加以途程往還兼之晨夕停滯既緣賑給須立簿書本欲安存卻成煩擾又無驛之處騎馬稍難簡擇公私須臾追集雨後農務特切常情蹔廢須臾即虧歲計每為一馬遂勞數家從此相乘恐更滋甚望且委州縣賑給待秋後閑時出使褒貶䟽奏謐等遂不行又曰李義府恃寵用事婦人淳于氏有美色坐事繫大理乃諷丞畢正義枉法出之將納為妾會有密言其狀者上令給事中劉仲軌鞠之義府恐洩其謀逼正義自縊於獄中上知而特原義府之罪侍御史王義方奏義府擅殺寺丞陛下雖巳釋放然天子置三公九卿二十七大夫八十一元士本欲水火相濟塩梅相成然後庶績咸熙風雨交泰則知人主不得獨是非昔唐堯至聖失之於四凶漢祖深仁失之於陳狶光武聰明寬恕失之於逢萌魏武勇略英雄失之於張邈此英傑之主莫不失之於前得之於後陛下繼聖撫有萬邦蠻陬夷落猶懼刑綱况輦轂咫尺姦臣肆虐殺一六品寺丞足使忠臣抗憤縱令正義自縊此事彌不可容便是畏義府之權勢能殺身以滅口此則生殺之威巳非主出賞罰之柄下移姦佞請乞重勘當正義死之由雪冤氣於幽泉誅姦臣於白日對仗叱義府令下義府視不退義方三叱上既無言義府趍出又曰王志愔愽州聊城人也少以進士擢第神龍年累除左臺御史執法剛正百寮畏憚時人呼皂鵰言其顧瞻人吏如鵰鶚之視鷰雀也又曰蘇瓌案問鄭普思其妻有寵於韋庶人特勑令對御辨折上屢抑瓌而伸普思侍御史范獻忠歷階而前曰臣請先罪蘇瓌上問其故獻忠曰蘇瓌國之大夫荷榮貴久矣不斬逆賊而後聞奏今使眩惑天聰搖動刑柄而普思反狀昭露陛下曲為申理此則王者不死今聖躬萬福豈有兩天子耶臣請先死終不能事普思上意乃解獄遂定又曰御史遭長官於途皆免帽降乘長官戢轡辭而上馬乾封中王本立為御史意氣頗高途逢長官端揖而巳自是諸人或降而立或足至地或側鞭弛𩍐輕重無恒開元以來但舉鞭聳揖而巳也又曰劉藏器為侍御史時衛卿尉遟寶琳抑人為妾藏器奏請還其父母上既可其奏寶琳私奏乞之上又從之藏器復執奏上又可之寶琳又請如是三藏器進言曰法者海內之懸衡上下之所共若刑罰不中則人無所措手足陛下若用捨恣情愛憎由巳則國之刑憲何所施陳今寶琳請陛下從之臣執奏陛下亦從之今日從之明日又改之欲令下人何以遵奉夫人無信不立疋夫疋婦尚不可失信況為天子安可戲言今陛下二三其言處分不定臣恐四海之內無所適從上竟從藏器所奏又曰王播為侍御史貞元末華臣李實為京兆尹恃恩頗橫嘗遇播於途不避故事尹避臺官播移文詆之又曰溫造拜侍御史請復置彈事朱衣豸冠於外廊大臣阻而不行李祐自真州入拜金吾違制進馬一, krp: ''}
