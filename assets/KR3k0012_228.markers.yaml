  - {type: punctuation, offset: 96, content: ‧, id: KR3k0012_CHANT_228-bkkpn25}
  - {type: variant, offset: 96, length: 0, content: '', WYG: 曰太常古官云伯夷秩宗典三禮欲令國家盛大社稷常存故稱太常又曰奉常官掌宗廟禮儀有丞景帝六年更名太常又曰杜業有才能選為太常數言得失不事權貴又曰宣帝地節四年任官為太常坐盗茂陵園中物免又曰武帝元鼎四年酇侯蕭夀為太常坐犧牲不如令免又曰孝武帝元朔元年孔臧為太常坐南陵橋壞衣冠道絶免東觀漢記曰周澤少修髙節耿介特立好學問治嚴氏春秋門徒數百人隐居山野不汲汲於時俗拜太常果敢數有直言朝廷嘉其清亷後漢書曰桓榮拜太常榮初遭倉卒與族人桓元卿同饑厄而榮講誦不息元卿嗤榮曰但自苦氣力何時復施用乎榮笑不應及為太常元卿嘆曰我農家子豈意學之為利乃若是哉乗輿嘗幸太常府令榮坐東靣設几杖㑹百官自驃騎將軍東平王蒼以下及榮門生數百人天子親自執業既罷悉以太官供具賜太常家其恩禮如此又曰桓榮及子郁皆為太常初榮受學章句减其煩辭後郁又刪之由是有桓君大小太常章句又曰靈帝欲以羊續為太尉時拜三公者皆輸束園禮錢十萬令中使督之名為左騶騶騎士也其所之往輒迎致禮敬厚加贈賂續乃坐使人於單席舉縕袍以示曰臣之所資惟斯而已左騶白之帝不悦以此故不豋位而徵為太常又曰楊賜以病罷居無何拜太常詔賜御府衣一襲衣單複具曰襲所服冠幘綬玉壺革𢃄金錯鈎佩金錯以金間錯其文續後漢書曰張奐字然明拜太常卿奐有清節可否之間强禦不敢奪也誦覽羣籍古今詳備又}
