  - {type: variant, offset: 5123, length: 103, content: 史屬朝廷右武勳臣恃寵多不知禮大將榮崇嗣於行在朝堂背闕而坐言笑自若勉劾之拘於省司肅宗特原之歎曰吾有李勉始知朝廷尊矣又曰御史臺奏准舊例監察御史從下六人各察尚書省一司又准興元元年十月勑令監察從上第一人察吏部禮部第, WYG: 覽卷}
