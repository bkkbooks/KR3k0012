  - {type: variant, offset: 129, length: 1, content: 察, WYG: 宗廟其為任也葢重矣是以古今選建未嘗不妙簡時望兼之儒雅㑹稽王叔履尚清虛志道無倦優游風議朕所諮仰其以王領太常本官如故又曰賀循字彦先為散騎常侍元帝以循為太常而散騎常侍如故循以九卿舊不加官唯拜太常而已中宗踐阼下令曰循氷清玉潔行為俗表加以位處下卿服物章身而已屋裁庇風雨孤常造廬特以為難其賜六尺床席褥并錢二十萬以表至德齊書曰張瓌以雍州刺史拜太常自謂閒職武帝曰卿輩未富貴謂人不與既富貴復欲委去之瓌曰陛下御臣等若養馬無事就閒廐有事復牽來帝尤怒遂以為散騎常侍北齊書曰趙彦深五歲母傅氏謂之曰家貧兒小何以能濟彦深泣而言曰若天哀矜兒大當仰天報傅感其意對之流涕及彦深拜太常卿還不退朝服先入見母跪陳幼小孤露蒙訓得至此母子相泣久之然後改服後周書曰長孫紹逺為太常廣召工人制樂器土木絲竹各得其宜唯黄鍾不調紹逺每以為意常因退朝經韓使君佛寺前過浮圖三層之上有鳴鐸焉忽聞其音雅合宫調取而配奏方始克諧又曰斛斯徵遷太常卿自魏孝武西遷雅樂廢缺徵博採遺逸稽諸典故創新改舊方始備焉又樂有錞音淳于者近代絶無此器或自蜀得之皆莫之識徵見之曰此錞于也衆弗之信徴依干寳周禮注以芒茼捋之其聲極振衆乃歎服徵乃取以合樂焉又曰建六官置大宗伯卿一人掌邦禮以佐皇帝和邦國是為春官唐書曰趙宗儒長慶初為太常有師子樂備五色之方}
