  - {type: variant, offset: 4353, length: 735, content: 嗣立此際結為舅甥神龍之初巳合誅死天網踈漏腰領誤全與安石託附阿韋編諸屬籍中宗晏駕削太皇輔正之制定阿韋臨朝之策此時朝野危懼人神怨憤臣忝司清憲敢不糺彈彥照等並請准法處分於是並貶官山公啟事曰中書屬通事令史孫琳限滿久習內事才宜殿中侍御史須空補之不審可否詔曰可曹氏傳曰左擁起於碎吏武帝以為能擢為殿中侍御史監察御史六典曰監察御史掌分察百寮巡按郡縣糺視刑獄肅整朝廷有不肅敬及鬥失者則糺而劾之唐書曰李素立武德初為監察御史時有犯法不至死者高祖將令殺之素立諫曰三尺之法與天下共之法一動搖則人無所措手足陛下甫創鴻業遐荒尚阻柰何輦轂之下便棄刑書臣忝法司不敢奉旨高祖從之又曰張嘉貞蒲州猗氏人也坐事免歸鄉里居長安侍御史張循憲為河東採訪使薦嘉貞材堪憲官請以巳之官秩授之則天召見垂簾與之言嘉貞奏曰臣以草萊而得謁九重是千載一遇也咫尺之間如隔雲霧竟不覩日月恐君臣之道有所未盡則天遽令卷簾與語大悅擢拜監察御史又曰紀履忠為監察御史劾奏御史中丞來俊臣犯狀有五一專擅國權二謀害忠善三贓賄貪濁四失義勃禮五淫昏很戾論茲五罪合至萬誅請下獄理罪又曰蕭至忠為監察御史彈鳳閣侍郎同鳳閣鸞臺三品蘇味道贓污貶官御史大夫李承嘉嘗召諸御史責之曰近日彈事不諮大夫禮乎眾不敢對至忠進曰故事臺中無長官御史人君耳目比肩事主得各自彈事不相關或先白大夫而許彈事如彈大夫不知白誰也承嘉默然而憚其剛正又曰崔琬為監察御史彈奏宰相宗楚客紀處納等驕恣跋扈請收劾之舊制大臣有被御史彈者皆俯僂趍出待罪朝省楚客瞋目作色稱以忠鯁被誣中宗令琬與楚客約為兄弟人竊歎焉又曰齊澣定州義豐人少以詞學稱弱冠制科登第景雲二年中書令姚崇用為監察御史彈劾違犯先於風教當時以為稱職又曰開元五年監察御史杜暹往磧西覆屯會郭處瓘與史獻等不叶更相執奏詔暹案其事實史獻以金遺暹固辭左右曰公遠使絕域, WYG: ''}
