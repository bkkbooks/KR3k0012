  - {type: variant, offset: 1001, length: 346, content: 微受命各之所部而綱獨埋車輪於洛陽都亭曰豺狼當路安問狐狸遂奏大將軍梁冀兄弟罪惡京師震悚魏志曰袁紹字本初有姿皃威容能折節下士士多附之太祖少與交以大將軍掾為侍御史又曰帝嘗大會殿中御史簪白筆側階而坐上問左右此為何官何主左右不對辛毗曰謂御史舊時簪筆以奏不法今者直備官但珥耳吳志曰呂岱親近吳都徐原慷愾有才志岱知其可成賜巾褠古切衣侯丹與共言論後遂薦拔官至侍御史原性忠壯好直言岱時有得失原輒諫爭又公論之人或以告岱岱笑是我所以貴德淵德淵岱字者也及原死岱哭之甚哀曰德淵呂岱之益友今不幸岱復於何聞過談者美之又曰張紘字子綱廣陵人也孫策遣紘奏章至許宮留為侍御史少府孔融等皆與親善又曰朱據字子範吳郡人也補侍御史是時選曹尚書暨艷疾貪污在位欲沙汰之據以為天下未定宜以功覆過棄瑕取用舉清勵濁足以沮勸若一時貶黜懼有後咎艷不聽卒敗, SBCK: 臧榮緒}
