  - {type: variant, offset: 1896, length: 5, content: 錄參軍高祖, SBCK: 拜太常自謂閑職武帝曰卿軰未冨貴謂人不與旣冨貴復欲委去之瓌曰陛下御臣等􅀂養馬無事就閑廐有事復牽來帝猶怒遂以爲散􅀐常侍北齊書曰趙彦深五歳母􅀓氏謂之曰家貧兒小何以能濟彦深泣而言曰􅀂天哀矜兒大當仰報􅀓感其意對之流涕及彦深拜太常卿還不脫朝服先入見母跪陳㓜小􅀌露蒙訓得至於此母子相泣乆之然後改服後周書曰長孫紹逺爲太常廣召工人制樂器土木絲竹各得其冝唯黄鍾不調紹逺每以爲意常因退朝經韓使君佛寺前過浮圖三層之上有鳴鐸焉忽聞其音雅合官調取而配奏方始克諧又曰斛斯徴遷太常卿自魏孝武西遷雅樂廢缺徴博採遺逸稽諸典故創改舊方始備焉又樂有淳音淳于者近代絶無此器或有自蜀得之皆莫之識徴見之}
