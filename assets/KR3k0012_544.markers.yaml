  - {type: variant, offset: 621, length: 984, content: 又述而曰陳司敗問昭公知禮乎孔子對曰知禮孔子退揖巫馬期而進之曰吾聞君子不黨君子亦黨乎君娶於吳為同姓謂之吳孟子君而知禮孰不知禮漢書曰沛公至高陽見酈食其入即長揖不拜曰足下必欲聚徒合兵誅無道秦不宜倨見長者史記曰郅都遷為中尉丞相條侯至貴倨也而都揖丞相漢書曰田蚡為丞相中二千石皆拜謁及黯獨揖之又曰萬章為京兆尹門下督從尹至殿中諸侯貴人爭欲揖章莫與尹言者後漢書曰崔駰上四巡頌肅宗雅愛文章自見駰頌後帝嗟歎之謂侍中竇憲曰卿寧知崔駰乎對曰班固數為臣說之然未見也帝曰公愛班固而忽崔駰此葉公之好龍也試請見之駰由此候憲憲屣履迎門笑謂駰曰亭伯吾受詔交公公何得薄我遂揖入為上客後漢袁紹傳曰董卓議欲廢立謂紹曰天下之主宜得賢明每念主上令憤毒毒恨也董侯似可今當立之紹曰今上富於春秋未有不善宣於天下若公違禮任情廢嫡立庶恐眾議未安卓案劍叱紹曰豎子敢然天下之事豈不在我我欲為之誰敢不從紹跪對曰此國之大事請出與太傅議之卓復言劉氏種不足復遺紹勃然曰天下健者豈惟董公橫刀長揖逕出懸節於上東門而奔冀州漢官典職曰尚書丞郎見尚書執板對揖稱曰明公尚書郎見左右丞對揖無敬稱曰左右君晉陽秋曰晉文帝進號為王太尉王祥獨長揖王謂祥曰今日然後知君見顧之重也後魏書曰宗愛之任勢也威振四海嘗召百司於都唑王公已下望庭畢拜高允獨昇階由此觀之汲長孺可臥見衛青何杭禮之有向之所謂風節者得不謂此乎宋書禮志曰漢世朝臣見三公並拜丞郎見八座皆持板揖事在漢儀南史曰袁憲陳武帝作相除司徒戶曹初謁遂抗禮長揖中書令王勵謂憲曰卿何矯眾不拜錄公憲曰於理不應致拜衛尉趙知禮曰袁生舉止詳中故有陳汝之風白虎通曰朝禮柰何君出居內門之外天子揖諸侯持揖卿大夫膝下至地天子特揖三公面揖卿略揖大夫士所以不拜何為其屈尊者說文曰揖讓也一曰手著胸曰揖風土記曰越俗定交有禮皆於大樹下封壇祭以白犬呪曰卿雖乘車我載笠後日相逢下車揖文士傳曰趙壹郡舉計吏至京輦是時袁陽為司徒宿間其名時延請之壹入閣揖而不拜陽問曰嘗聞下郡討吏見漢三公不為禮者乎壹曰昔酈食其高陽白衣也而揖高祖今壹關西男子其揖漢三公不亦可乎陽壯其言接之甚厚列子曰范氏門徒路遇乞兒馬醫弗敢辱也必下車而揖之尹文子曰越王勾踐謀報吳欲人之勇路逢怒鼃下車而揖之袁淮正論曰太祖破呂布袁渙在軍中陳群父子見上拜唯袁渙獨高揖不為禮上嚴敬之鐕摯虞決略錄要注曰小會殿就席皆鑽頭而後坐鐕頭伏地也欲起亦先鐕頭賀周禮春官上宗伯曰以賀慶之禮親異姓之國鄭玄注曰異姓王婚姻甥舅, SBCK: 思始}
