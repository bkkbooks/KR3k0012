  - {type: variant, offset: 152, length: 0, content: '', krp: 郷師大䘮用役則帥其民而至遂治之治謂監督其事及葬執纛以與匠師衘匶而治役匠師事官之屬其}
  - {type: variant, offset: 153, length: 2, content: 議詔, krp: 官若郷師之於司徒也郷師主役匠師主衆匠共主葬引翿羽葆折也爾雅曰纛醫也以指麾輓柩之役正其行列進退及窆執斧以涖匠師匠師主豊碑之事報執斧以難之使戒其事又地官閭胥曰凡喪紀之數聚衆庻旣比則讀法書其敬敏任恤者䘮紀大喪之䘮之事也皆㑹聚衆民因以讀法勑戒之也又地官遂師曰大喪使帥其屬以幄帟先道野役及窆抱磨共丘籠及蜃車之役使以幄帟先者太宰也其餘司徒也幄帟所爲葬窆之間先張神坐也道野役帥以至墓也丘籠之役竁復士也其器曰籠蜃車柩路也載柳四輪迫地而行似於蜃因取名焉行至壙乃脫更復載復以龍又地官委人曰喪紀共其薪蒸木材又地官土均曰禮俗喪紀祭祀皆以地媺惡爲輕重之法而行之掌其禁令君子行禮不求變俗隨其土地厚薄爲之制也又地官囿人曰䘮紀賔客共其生獸死獸之物又地官舎人曰大喪共飯米敖榖飯所以實口不忍虚也君用梁大夫用稷士用黍皆四外實者唯盈敖榖者措于一旁所以惑蚍蜉又春官大宗伯曰以凶禮哀邦國之憂朝覲㑹同則爲上相大喪亦如之又春官小宗伯曰}
  - {type: variant, offset: 156, length: 4, content: 儀南鄉見, krp: 崩大肆以秬鬯渳鄭司農云大肆大浴也秬以鬯浴尸也又春官肆師曰大喪大渳以鬯則築鬻築香草煑以爲鬯以浴尸也香草欎又春官鬱人曰大喪之渳共其肆器肆器陳尸之器及葬共其祼器遂埋之遣奠之彛瓉也埋於祖廟階間又春官鬯人曰大喪渳設斗共其釁鬯斗所以沃尸也釁尸所以鬯酒使之香美者也又春官司几筵曰凡䘮事設葦席右素几其栢席用萑黼純}
