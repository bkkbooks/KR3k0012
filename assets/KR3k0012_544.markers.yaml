  - {type: variant, offset: 64, length: 2, content: 眾揖, WYG: 貴者居倚廬疎者賤者居堊室也又天官􅈄人曰凡喪紀共其魚}
  - {type: variant, offset: 64, length: 2, content: 眾揖, krp: 貴者倚廬踈者賤者居堊室也又天官獸人曰凡喪紀賔客共其死獸生獸共其完者又天官漁人曰凡喪共其魚}
