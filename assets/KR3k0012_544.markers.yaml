  - {type: variant, offset: 109, length: 6, content: 司儀掌九儀之, WYG: 喪紀}
  - {type: variant, offset: 110, length: 4, content: 儀掌九儀, krp: 裘大喪廞裘飾皮車皮車遣車}
  - {type: variant, offset: 115, length: 4, content: 賓客擯相, krp: 革路也古書廞字爲滛鄭司農云滛裘陳裘也折謂廞興也若詩人之興云謂象似而作之又天官内小臣曰若有裘紀則儐詔后}
  - {type: variant, offset: 117, length: 1, content: 擯, WYG: 共其生獸死獸之物又地官舍人曰喪紀共飯米熬穀飯所以實口不忍虛也君用粱大夫用稷士用黍皆四升實者唯盈熬穀者錯于棺旁所以惑蚍蜉又春官大宗伯曰以㓙禮哀邦國之憂朝覲㑹同則為上}
  - {type: variant, offset: 119, length: 0, content: '', WYG: 大喪亦如}
  - {type: variant, offset: 120, length: 1, content: 禮, WYG: 又春官小宗伯曰王崩大肆}
  - {type: page-break, offset: 120, content: '', id: KR3k0012_WYG_544-4b, image: WYG0898/WYG0898-0078d.png}
