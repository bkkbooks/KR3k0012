  - {type: punctuation, offset: 597, content: 《, id: KR3k0012_CHANT_544-bkkpn195}
  - {type: variant, offset: 597, length: 2, content: 論語, SBCK: 凡有爵者之喪以國之喪禮涖其禁乃序其事國之䘮禮䘮服士䘮旣夕土虞今存者也其餘則亡事謂小歛大歛葬也凡國有司以王命有事焉則詔賛主人有事謂含遂贈之屬鄭司農云凡國諸侯國也有司謂王有司以命有事職䘮主詔賛主人凡公有司之所共職喪令之趣其事今令其當共物者給事之期也有司或言公或言國者由其君所來也居其官}
  - {type: variant, offset: 597, length: 2, content: 論語, WYG: 凡有爵者之喪以國之喪禮涖其禁序其事國之喪禮喪服士喪既夕士虞今存者也其餘則亡事謂小斂大斂𦵏也凡國有司以王命有事焉則詔贊主人有事謂含襚贈賵之屬鄭司農云凡國謂諸侯國有司謂王有司也以王命有事職喪主詔賛主人凡公有司之所共職喪令之趣其事令令其當共物者給事之期也有司或言公或言國言國者由其君所来居其官}
  - {type: variant, offset: 597, length: 2, content: 論語, krp: 凡有爵者之喪以國之喪禮涖其禁乃序其事國之䘮禮䘮服士䘮旣夕土虞今存者也其餘則亡事謂小歛大歛葬也凡國有司以王命有事焉則詔賛主人有事謂含遂贈之屬鄭司農云凡國諸侯國也有司謂王有司以命有事職䘮主詔賛主人凡公有司之所共職喪令之趣其事今令其當共物者給事之期也有司或言公或言國者由其君所來也居其官}
  - {type: punctuation, offset: 599, content: 》, id: KR3k0012_CHANT_544-bkkpn196}
