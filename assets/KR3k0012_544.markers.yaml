  - {type: 'tls:seg', offset: 121, content: '', id: KR3k0012_CHANT_544-2a.4}
  - {type: variant, offset: 121, length: 0, content: '', krp: 又天官􅕡曰喪紀之事設門燎蹕宫門廟門燎地燭也蹕行者廟在中門之外又天官寺人曰䘮紀之事則帥女宫而致於有司有司謂宫卿丗婦也又天官丗婦曰掌喪紀之事帥女宫而濯槪爲粢盛槪拭也爲猶差擇也又天官女御曰大喪掌沐浴王及后之䘮也后之喪持翣從丗婦而吊于卿大夫之喪從之數盖如使者之介也又天官典絲曰喪紀共其絲纊組文之物}
  - {type: variant, offset: 122, length: 7, content: 詔儀容辭令揖讓, WYG: 秬鬯渳鄭司農云大肆大浴也以秬鬯浴尸也又春官肆師曰大喪大渳以鬯則築䰞築香草煮以為鬯以浴尸香草鬱也又春官鬱人曰大喪}
  - {type: variant, offset: 122, length: 4, content: 詔儀容辭, krp: 給線縷著盱口綦握之屬也青與赤謂之文又天官内司服曰右之喪共其衣服凡内具之物内具紛悅線纊槃帙之属又地官大司徒曰大喪帥六郷之衆庻屬其六引而治其政}
