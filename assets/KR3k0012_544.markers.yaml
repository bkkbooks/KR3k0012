  - {type: variant, offset: 176, length: 4, content: 既祀方明, krp: 瑞玉器之羙者也禘祫及䘮陳之以華國也凡吉凶之事祖廟之中沃盥執燭吉事四時祭也凶事后王䘮朝於祖廟之奠也又春官職喪曰掌}
