  - {type: variant, offset: 67, length: 1, content: 公, WYG: 鱻薧又天官腊人曰凡喪紀共其脯腊凡乾肉之事又天官凌人曰大喪共夷盤冰夷之言尸也實氷于夷槃中置之尸牀之下所以寒尸又天官籩人曰喪事}
  - {type: variant, offset: 67, length: 1, content: 公, krp: 鱻薧周禮天官腊人曰凡喪共其脯腊凡乾肉之事又天官凌人曰大喪共夷槃水夷亦尸也實水於夷槃中置之尸牀之下所以寒尸也又天官籩人曰喪事}
  - {type: variant, offset: 69, length: 0, content: '', WYG: 賓客之事共其薦籩羞籩喪事之籩謂殷奠時又天官醢人曰凡喪紀共其薦羞之豆實又天官掌次曰凡喪紀王則張帟三重諸侯再重}
  - {type: page-break, offset: 69, content: '', id: KR3k0012_WYG_544-2a, image: WYG0898/WYG0898-0077c.png}
  - {type: variant, offset: 69, length: 0, content: '', krp: 賔客之事共其薦籩羞籩䘮事乃籩謂殷莫時又天官醢人曰凡喪紀共其薦羞之豆實又天官掌次曰凡喪紀王則張帟三重諸侯再重}
  - {type: variant, offset: 73, length: 2, content: 始入, WYG: 不重張帟柩上承塵又天官司裘曰大喪廞裘飾皮車皮車遣車之革路也故書廞為淫鄭司農云淫裘陳裘也𤣥謂廞興也若詩之興謂象似而作之又天官内小臣曰若喪紀則擯詔后之禮事又天官閽人曰喪紀之事設}
  - {type: variant, offset: 73, length: 8, content: 始入門右皆北面東, krp: 不重張帟柩}
  - {type: variant, offset: 76, length: 1, content: 右, WYG: 燎蹕宫門廟門燎地燭也蹕止行者廟在中門之外又天官寺人曰喪紀之事則帥女宫而致于有司有司謂宫卿世婦也又天官世婦曰掌喪紀之事帥女宫而濯摡為齍盛摡拭也為猶差擇也又天官女御曰大喪掌沐浴王及后之喪也后之喪持翣從世婦而弔于卿大夫之喪從之數蓋如使者之介云又天官典絲曰喪紀共其絲纊組文之物以給線縷著旰口綦握之屬也青與赤謂之文又天官内司服曰后之喪共其衣服凡内具之物内具紛帨線纊鞶袠之屬又地官大司徒曰大喪帥六鄉之衆庶屬其六引而治其政令衆庶所致役也鄭司農云六引謂引喪車索也六鄉主六引六遂主六紼若國有大故則致萬民于王門令無節者不行天下大故謂王崩及冦兵也節六節也有節乃得行防姦私也又地官鄉師曰大喪用役則帥其民而至遂治之治謂監督其事及𦵏執纛以與匠師御匶而治役及窆執斧以莅匠師執斧以莅之使戒其事又地官閭胥曰凡喪紀之數聚衆庶既比則讀灋書其敬敏任䘏者又地官遂師曰大喪使帥其屬以幄帟先道野役及窆抱磨共丘籠及蜃車之役使以幄帟先者大宰也其餘司徒也幄帟先所以為𦵏窆之間先張神坐也道野役帥以至墓也丘籠之役竁復土也其器曰籠蜃車柩路也柩路載栁四輪迫地而行有似於蜃因取名焉行至壙乃説更復載以龍輴又地官委人曰喪紀共其薪蒸木材又地官土均曰禮俗喪紀祭祀}
