  - {type: 'tls:seg', offset: 50, content: '', id: KR3k0012_CHANT_544-1a.11}
  - {type: variant, offset: 50, length: 110, content: 特揖一一揖之旅眾也大夫爵同者眾揖之公及孤卿大夫始入門右皆北面東上王揖之乃就位三揖者士有上中下王揖之皆逡巡趍復位又秋官曰司儀掌九儀之賓客擯相之禮以詔儀容辭令揖讓之節出接賓曰擯入贊禮曰相以詔者以禮告王又秋官曰司議詔王儀南鄉見, SBCK: 素几其栢席用萑黼純}
