  - {type: variant, offset: 2114, length: 709, content: 弟莫可使王齊者也上曰善賜金五百斤又曰盧綰與高祖同里綰親與高祖親太上皇相愛及生男高祖與綰同日生里中持羊酒賀兩家及高祖盧綰壯俱學書又相愛也里中嘉兩家及家親相愛也生子同日壯又相愛復賀兩家羊酒後漢書曰光武謂馮異曰我昨夜夢乘赤龍上天覺悟心中動悸異因下席再拜賀曰此天命發於精神心中動悸大三慎重之性也異遂與諸將定議上尊號東觀漢記曰上傳聞朱鮪破河內有頃寇恂檄至上大喜曰吾知寇子翼可任也諸將軍賀因上尊號謝承後漢書曰鄭弘為臨淮郡兩鹿隨車主簿拜賀曰聞三公轓盡作鹿明府必為宰相弘果為太尉漢雜事白冬至陽氣起君道長故賀夏至陰氣生君道衰故不賀魏志曰王粲為丞相掾太祖置酒漢濱粲奉觴賀曰明公定冀州之日下車即其甲卒收其豪傑而用之以橫行天下及平江漢司其賢俊而置之列位使海內廻心望風願治文武並用英雄畢力北三王之舉吳志曰顧雍迎母於吳既至孫策臨賀之親拜其母於庭公卿大臣畢會後太子又往慶焉王隱晉書曰泰始五年龍見武庫井中車駕親幸有喜色內外議咸云當賀劉毅獨表舊典無賀龍之禮詔報政德未脩慶賀之事宜詳依典義晉中興書曰武帝時甘露降公卿奏賀詔曰三代盛隆猶自戒勿休況自頃懸象告變盜賊充斥百僚司牧不能存職匪解使道有寄雖麟鳳至慶有餘矣此道未弘雖四靈在郊吾猶懼然何甘露之足賀其停之晉書禮志曰永和二年納后議賀不王彪之議云婚禮不樂不賀禮之明文傳稱子罕如晉賀夫人既無經文又禮云娶婦三日不舉樂明三日之後自當樂至於不賀無三日之斷恐三日之後故無應賀之禮會稽典錄曰盛憲字孝章嘗出逢一童容皃非常憲怪而問之是魯國孔融融時年十餘歲憲下車執融手載以歸舍與融談知其不凡便結為兄弟因昇堂見親憲自為壽以賀母母曰何賀憲曰母昔有憲憲今有弟家國所賴以是賀耳融果以英才煒豔冠世晏子曰景公探爵鷇弱故返之晏子逡巡再拜賀曰君有, SBCK: ''}
