  - {type: punctuation, offset: 600, content: 「, id: KR3k0012_CHANT_544-bkkpn198}
  - {type: variant, offset: 600, length: 0, content: '', SBCK: 公又春官司巫曰凡喪事掌巫降之禮降下也下神之禮也又春官太史曰大䘮執法以涖勸防鄭司農云􅂆防六引六紼也遣之日讀誄遣謂祖廟之庭大奠將行之時也人之道終於此累其行而讀之太師帥瞽廞之而謚瞽史知天道使共其事言王之誄謚成於天也凡䘮事考焉爲有得失又春官巾車曰掌王之䘮車五乘木車蒲蔽犬䄙尾橐䟽飾小服皆䟽木車不􅃮者也鄭司農云蒲蔽車謂嬴蘭車以蒲爲蔽也天子喪服之車也漢儀亦然犬䄙以犬皮爲覆笭也故書䟽爲揟杜子春讀揟爲沙玄謂蔽車旁禦風塵者也犬白犬皮也旣以皮爲覆笭又以其尾爲戈㦸之弢麄布飾二物之側爲縁也􅀂今攝菔云也服讀爲菔刀劒短兵衣也此始遭䘮所乗也爲君之道尚微備姦臣也書曰以虎賁百人迎子釗亦爲備焉素車棼蔽犬䄙素飾小服皆素素車以白土堊車也棼讀爲薠薠麻也以麻爲蔽也其䄙繒爲縁此卒哭所乗也爲君之道益著在車可以去戈㦸也薻車薻蔽鹿淺䄙革飾故書藻爲􅠘杜子春云折讀爲華藻之藻直謂華藻也玄謂薻水草名蒼色也以蒼土堊車以蒼繒爲蔽鹿夏皮爲覆笭也又以所治去毛者縁之此旣練所乗之車也駹車雚蔽然䄙髤飾駹車邊側有􅃮飾也雚細葦席也以爲蔽者漆則成藩即吉也然果然也髤赤多黑少之色韋也此大祥所乗之車也漆車藩蔽豻䄙雀飾􅃮車墨車也藩今時小車藩也􅃮席以爲蔽豻胡犬也雀黑多赤少之色韋也此所乗之車也大喪飾遣車遂廞之行之謂陳駕之及葬執蓋從車持旌隨柩路持盖與旌及墓呼啓􅀜陳車小䘮共匶路與其飾柩路載柩車飾柩飾又春官司常曰大喪共銘旌建廞車之旌又夏官大司馬曰大喪平士大夫鄭司農云平壹其服也玄謂平者正其職與位也喪􅀕奉詔馬牲王之喪以馬􅀕者盖遣莫也奉猶送也送之至莫告而藏之又夏官射人曰大喪與僕人遷尸作郷大夫掌事此其廬不敬者呵罰之僕人大僕與射人俱掌王之朝位也又夏官司士曰大喪作士掌事作六軍之士執披披持棺者又夏官諸子曰大䘮正羣子之服位又夏官虎賁氏曰國有大故則守王門大喪亦如之又夏官太僕曰䘮紀正王之服位詔法儀賛王牲事牲事殺割杜載之屬大䘮始崩戒鼔傳逹于四方窆亦如之戒鼔擊鼔以敬衆也又夏官司兵曰大䘮廞五兵廞興也興作明器之役器五兵也又夏官圉人曰䘮紀牽馬而入陳廞馬亦如之廞馬遣車之馬也又秋官大司冦曰凡朝覲㑹同前王大䘮亦如之大䘮所前或嗣王也又秋官士師曰諸侯爲賔則帥其属而蹕于王宫大䘮亦如之又秋官郷士曰大䘮紀帥其属夾道而蹕属中士巳下也又秋官司􅈻曰賔客䘮紀之事則役其煩辱之事煩猶劇也士䘮禮下篇曰􅈻入􅄺厠又秋官大行人曰􅀂有大䘮則詔相諸侯之禮詔相左右告敎之禮記檀弓上曰子上之母死而不䘮門人問諸子思曰昔者子之先君子䘮出母乎曰然子之不使白也䘮之何也子思曰昔者吾先}
