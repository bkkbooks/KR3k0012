  - {type: variant, offset: 9, length: 1, content: 夏, SBCK: 天官宰夫曰大喪小喪掌小官之戒令帥執事而治之大喪王后丗子也小喪夫人以下也小官士三公六卿之喪與職喪帥官有司而治之凡諸大夫之䘮使其旅帥有司而治之旅冢宰下下士也又天官宫正曰大喪則授廬舎辨其親踈貴賤之居廬􅀝廬也舎堊室也親者貴者􅀝廬踈者賤者居堊室也又天官獸人曰凡喪紀賔客共其死獸生獸共其完者又天官漁人曰凡喪共其魚之鱻薧周禮天官腊人曰凡喪共其脯腊凡乾肉之事又天官凌人曰大喪共夷槃水夷亦尸也實水於夷槃中置之尸牀之下所以寒尸也又天官籩人曰喪事及賔客之事共其薦籩羞籩䘮事乃籩謂殷莫時又天官醢人曰凡喪紀共其薦羞之豆實又天官掌次曰凡喪紀王則張帟三重諸侯再重􅀌卿大夫不重張帟柩上承塵又天}
