  - {type: variant, offset: 2003, length: 110, content: 時山東人謂關中為秦中秦形勝之國也帶河阻山懸隔千里持戟百萬秦得百二焉地勢便利其次以下兵於諸侯譬猶高屋之上建瓴水也夫齊東有瑯琊即墨之饒南有太山之固西有濁河之限北有渤海之利地方二千里持戟百萬懸隔千里之外齊得十二焉此東西秦也非親, SBCK: ''}
