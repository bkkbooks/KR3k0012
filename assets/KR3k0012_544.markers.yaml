  - {type: variant, offset: 12, length: 0, content: '', WYG: 大喪小喪掌小官之戒令帥執事而治之大喪王后世子也小喪夫人以下也小官士也三公六卿之喪與執喪帥官有}
  - {type: variant, offset: 12, length: 0, content: '', krp: 大喪小喪掌小官之戒令帥執事而治之大喪王后丗子也小喪夫人以下也小官士三公六卿之喪與職喪帥官有}
  - {type: variant, offset: 13, length: 2, content: 士擯, SBCK: 裘大喪廞裘飾皮車皮車遣車之革路也古書廞字爲滛鄭司農云滛裘陳裘也折謂廞興也􅀂詩人之興云謂象似而作之又天官内小臣曰􅀂有裘紀則儐}
  - {type: variant, offset: 13, length: 8, content: 士擯詔王出揖公卿, WYG: 而治之凡諸}
  - {type: variant, offset: 13, length: 8, content: 士擯詔王出揖公卿, krp: 而治之凡諸}
  - {type: punctuation, offset: 15, content: ：, id: KR3k0012_CHANT_544-bkkpn6}
  - {type: 'tls:seg', offset: 15, content: '', id: KR3k0012_CHANT_544-1a.5}
  - {type: variant, offset: 16, length: 0, content: '', SBCK: 后之禮又天官􅕡曰喪紀之事設門燎蹕宫門廟門燎地燭也蹕行者廟在中門之外又天官寺人曰䘮紀之事則帥女宫而致於有司有司謂宫卿丗婦也又天官丗婦曰掌喪紀之事帥女宫而濯槪爲粢盛槪拭也爲猶差擇也又天官女御曰大喪掌沐浴}
  - {type: page-break, offset: 16, content: '', id: KR3k0012_SBCK_544-2a}
  - {type: variant, offset: 17, length: 3, content: 出揖公, SBCK: 及后之䘮也后之喪持翣從丗婦而吊于}
  - {type: variant, offset: 23, length: 0, content: '', SBCK: 之喪從之數盖如使者之介也又天官典絲曰喪紀共其絲纊組文之物}
  - {type: variant, offset: 23, length: 11, content: 以下朝者孤卿特揖大夫以, WYG: 之喪使}
  - {type: variant, offset: 23, length: 11, content: 以下朝者孤卿特揖大夫以, krp: 之䘮使}
  - {type: variant, offset: 24, length: 0, content: '', SBCK: 給線縷著盱口綦握之屬也青與赤謂之文又天官内司服曰右之喪共其衣服凡内具之物内具紛悅線纊槃帙之属又地官大司徒曰大喪帥六郷之衆庻屬其六引而治其政令衆庻所致役也鄭司農云引喪車索也六郷主六引遂六主紼也􅀂國有大故則致萬民于王門令無節者不行天}
  - {type: variant, offset: 25, length: 1, content: 朝, SBCK: 大故謂王崩及冦兵也節大節也有節乃得行防姦僞也又地官曰郷師大䘮用役則帥其民而至遂治之治謂􅁥督其事及葬執纛以與匠師衘匶而治役匠師事官之屬其司官􅀂郷師之於司徒也郷師主役匠師主衆匠共主葬引翿羽葆折也爾雅曰纛醫也以指麾輓柩之役正其行列進退及窆執斧以涖匠師匠師主豊碑之事報執斧以難之使戒其事又地官閭胥曰凡喪紀之數聚衆庻旣比則讀法書其敬敏任恤}
  - {type: page-break, offset: 25, content: '', id: KR3k0012_SBCK_544-2b}
  - {type: punctuation, offset: 27, content: 。, id: KR3k0012_CHANT_544-bkkpn7}
  - {type: 'tls:seg', offset: 27, content: '', id: KR3k0012_CHANT_544-1a.6}
  - {type: variant, offset: 27, length: 4, content: 孤卿特揖, SBCK: 䘮紀大喪之䘮之事也皆㑹聚衆民因以讀法勑戒之也又地官遂師曰大喪使帥其屬以幄帟先道野役及窆抱磨共丘籠及蜃車之役使以幄帟先者太宰也其餘司徒也幄帟所爲葬窆之間先張神坐也道野役帥以至墓也丘籠之役竁復士也其器曰籠蜃車柩路也載柳四輪迫地而行似於蜃因取名焉行至壙乃脫更復載復以龍又地官委人曰喪紀共其薪蒸木材又地官土均曰禮俗喪紀􅀕祀皆以地媺惡爲輕重之法而行之掌其禁令君子行禮不求變俗隨其土地厚薄爲之制也又地官囿人曰䘮紀賔客共其生獸死獸之物又地官舎人曰大喪共飯米敖榖飯所以實口不忍虚也君用梁}
  - {type: page-break, offset: 27, content: '', id: KR3k0012_SBCK_544-3a}
  - {type: punctuation, offset: 31, content: ，, id: KR3k0012_CHANT_544-bkkpn8}
  - {type: 'tls:seg', offset: 31, content: '', id: KR3k0012_CHANT_544-1a.7}
  - {type: variant, offset: 33, length: 0, content: '', SBCK: 用稷士用􅁰皆四外實者唯盈敖榖者措于一旁所}
  - {type: variant, offset: 34, length: 0, content: '', SBCK: 惑蚍蜉又春官大宗伯曰以凶禮哀􅀖國之憂朝覲㑹同則爲上相大喪亦如之又春官小宗伯曰王崩大肆以秬鬯渳鄭司農云大肆大浴也秬以鬯浴尸也又春官肆師曰大喪大渳以鬯則築鬻築香草煑以爲鬯以浴尸也香草欎又春官鬱人曰大喪之渳共}
  - {type: variant, offset: 35, length: 14, content: 等旅揖士旁三揖王還揖門左揖門, SBCK: 肆器肆器陳尸之器及葬共其祼器遂埋之遣奠之彛瓉也埋於祖廟階間又春官鬯人曰大喪渳設斗共其釁鬯斗所以沃尸也釁尸所以鬯酒使之香美者也又春官司几筵曰凡䘮事設葦席}
  - {type: variant, offset: 35, length: 1, content: 等, WYG: ''}
  - {type: variant, offset: 35, length: 1, content: 等, krp: ''}
  - {type: variant, offset: 37, length: 18, content: 揖士旁三揖王還揖門左揖門右特揖一一揖, WYG: 帥有司而治}
