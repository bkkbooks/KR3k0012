  - {type: punctuation, offset: 127, content: 、, id: KR3k0012_CHANT_544-bkkpn36}
  - {type: variant, offset: 127, length: 3, content: 揖讓之, krp: 衆庻所致役也鄭司農云引喪車索也六郷主六引遂六主紼也若國有大故則致萬民于王門令無}
  - {type: variant, offset: 130, length: 4, content: 節出接賓, WYG: 渳共其肆器肆器陳尸之器及𦵏共其祼器遂貍之遣奠之彜瓚也貍于宗廟階間又春官鬯人}
