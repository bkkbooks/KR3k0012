  - {type: variant, offset: 1114, length: 624, content: 後魏書曰宗愛之任勢也威振四海嘗召百司於都唑王公已下望庭畢拜高允獨昇階由此觀之汲長孺可臥見衛青何杭禮之有向之所謂風節者得不謂此乎宋書禮志曰漢世朝臣見三公並拜丞郎見八座皆持板揖事在漢儀南史曰袁憲陳武帝作相除司徒戶曹初謁遂抗禮長揖中書令王勵謂憲曰卿何矯眾不拜錄公憲曰於理不應致拜衛尉趙知禮曰袁生舉止詳中故有陳汝之風白虎通曰朝禮柰何君出居內門之外天子揖諸侯持揖卿大夫膝下至地天子特揖三公面揖卿略揖大夫士所以不拜何為其屈尊者說文曰揖讓也一曰手著胸曰揖風土記曰越俗定交有禮皆於大樹下封壇祭以白犬呪曰卿雖乘車我載笠後日相逢下車揖文士傳曰趙壹郡舉計吏至京輦是時袁陽為司徒宿間其名時延請之壹入閣揖而不拜陽問曰嘗聞下郡討吏見漢三公不為禮者乎壹曰昔酈食其高陽白衣也而揖高祖今壹關西男子其揖漢三公不亦可乎陽壯其言接之甚厚列子曰范氏門徒路遇乞兒馬醫弗敢辱也必下車而揖之尹文子曰越王勾踐謀報吳欲人之勇路逢怒鼃下車而揖之袁淮正論曰太祖破呂布袁渙在軍中陳群父子見上拜唯袁渙獨高揖不為禮上嚴敬之鐕摯虞決略錄要注曰小會殿就席皆鑽頭而後坐鐕頭伏地也欲起亦先鐕頭賀周禮春官上宗伯曰以賀慶之禮親異姓之國鄭玄注曰異姓王婚姻甥舅也禮記玉藻曰有慶非君賜不賀鄭玄注曰唯君賜為榮左傳僖下曰楚子將圍宋使子文治兵於暌終朝而畢不戮一人子王復治兵於蒍終日而畢鞭七人貫三人耳國老皆賀子文子文飲之酒蒍賈尚幼後至不賀子文問之對曰不知所賀子之傳政於子玉曰以靖國也靖諸內而敗諸外所獲幾何子玉之敗子之舉也舉以敗國將何賀焉, WYG: ''}
