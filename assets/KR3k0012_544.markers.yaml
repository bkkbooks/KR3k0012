  - {type: variant, offset: 189, length: 404, content: 旂置於宮乃詔王升壇諸侯皆就其旂而立王揖之者定其位也庶姓無親者也土揖推手小下之也異姓昏姻舉之禮記曲禮上曰揖人必違其位鄭玄往曰禮以變為敬也又仲尼燕居曰兩君相見揖讓而入門入門而懸興揖讓而升堂升堂而樂闋又表記曰事君難進而易退則位有序易進而難退則亂也故君子三揖而進一辭而退以遠亂也穀梁傳昭公曰夾谷之會孔子相焉兩君就壇兩相相揖齊人鼓噪而起欲執魯君孔子歷階而上不盡一等而視歸乎齊侯左傳襄公曰齊慶封圍高唐弗克夙沙衛以叛故圍之冬十一月齊侯圍之見衛在城上號之乃下衛下與齊侯語問守備焉以無備告揖之乃登齊侯以衛告誠揖而禮之欲生之也衛志於戰死故不順齊侯之揖而還登誠也又襄公曰衛侯入書曰復歸國納之也大夫逆於竟者執其手而與之言道逆者自車揖之逆於門者貪之而已頷搖其頭言衍驕心易生又昭三曰王揖而入饋不食窮不寐數日又哀上曰衛侯遊于郊子南僕子南靈公子郢也僕御也公曰余無子將妾蒯聵無太子不對他日又謂之對曰郢不足以辱社稷君其改圖君夫人在堂三揖在下三揖, SBCK: 䘮及}
