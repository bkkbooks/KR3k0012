  - {type: 'tls:seg', offset: 2864, content: '', id: KR3k0012_CHANT_385-41a.15}
  - {type: variant, offset: 2864, length: 0, content: '', SBCK: 童子也太中大夫陳煒後至曰人小了了大或未能佳少府尋聲荅曰君子之㓜時豈當惠乎李公撫抃大􅀏頋少府曰髙明長大必爲偉器范曄後漢書云詣李膺也何晏别傳曰晏時小養魏宫七八歳便慧心大悟衆無愚智莫不貴異之魏武帝讀兵書有所未解試以問晏晏分散所疑無不氷釋邴原别傳曰原字根矩十一喪父家貧早孤隣有書舎原過其傍而泣師問曰童子何罪原曰一則願其不孤二則羡其得學師亦哀原之言而爲之曰童子苟有志我徒相教不求費也於是遂就書一歳之間誦孝經論語管輅別傳曰輅年八九􅀊便喜仰視星辰得人輙問其名夜不肯􅄰自言家雞野鵠猶尚知時况於人乎與比隣兒共戯土壤中輙書地作天及日月星辰毎荅言說事語皆不常􅀫學􅂄人不能折之時}
  - {type: page-break, offset: 2864, content: '', id: KR3k0012_SBCK_385-4a}
  - {type: variant, offset: 2864, length: 0, content: '', WYG: 童子也太中大夫陳偉後至曰人小了了大或未能佳少府尋聲荅曰君子之㓜時豈當慧乎李公撫掌大笑顧少府曰髙明長大必為偉器范曄後漢書云詣李膺也何宴别傳曰宴小時養扵魏公七八嵗天性慧悟衆無智愚莫不貴異之魏武帝讀兵書有所未觧試以問宴一一分散所疑無不氷釋邴原别傳曰原字根䂓十一喪父家貧少孤隣有書舍原過其傍而泣師乃問曰童子何悲原曰一則願其不孤二則羡其得學師亦哀原之言而謂之曰童子苟有志我徒相教不求費也扵是遂就書一嵗之間誦孝經論語管輅别傳曰輅年八九嵗便喜仰視星辰得人輙問其名夜不肯寐自言家雞野鵠猶尚知時况扵人乎與比隣兒共戯土壤中輙書地作天及日月星辰每荅言說事語皆不常宿學耆人不能及父為琅琊顧邱長時}
