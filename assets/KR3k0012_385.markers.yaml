  - {type: variant, offset: 3161, length: 0, content: '', WYG: 日千言經目輙識文帝聞而請焉賔客百餘人入奏一刺悉書其鄉邑姓氏世所謂爵里刺也示之一過而使遍談不謬一人帝深竒之漢中之敗榮年十三左右提之走不肯曰君親在難焉所逃死乃奮劒戰遂歿又曰孫盛為庾公記室叅軍從獵其第二兒齊莊俱行庾公不知忽扵獵塲見齊莊時年七八嵗謂曰君亦復來耶應聲荅曰所謂無小無大從公于邁又曰何晏年七嵗明慧若神魏武帝竒愛以晏母在宫内欲以為子晏乃}
