  - {type: variant, offset: 3898, length: 1, content: 猶, SBCK: 知禮義郷人號爲張僧子七嵗通春秋復欲進餘經父母曰汝小未能也覇曰我饒爲之故字伯饒㑹稽典録曰王充字仲任爲児童遊戯不好狎侮父誦竒之十􅀊教書數又曰餘姚伍賤字士微父爲倉監失去官􅂖薄領罪至於死賤爲執筆檢校相當由是見異􅉑爲神童江氏家傅曰江㽔字丗林年十一始知樗蒲數以爲遊祖母費爲􅀃徃事有以􅀶弈破業廢身者於是即弃五木終身不以爲戯荀氏家傅曰朂字公魯年十二能通春秋屬文從外柤鍾繇甚竒之常稱此児當繼司空又曰荀淑子爽字慈明一名諝㓜而好學年十二能通春秋論語太尉杜喬見而稱之曰可爲人師爽遂耽思經書慶吊不行徵命不應潁川爲之語曰荀氏八龍慈明無􅀟華陽國志曰童子李餘涪人兄夷殺人亡命母愼當死餘年十三詣吏代母死吏以餘年小不許因自刎死吏以白令令哀傷言郡郡上書出慎太守與令以家財葬餘圗􅀞府庭涼州記曰武王吕光字丗明以石氏建武四年生夜有光輝舉舎異之因名曰光年十􅀊與諸兄弟於里巷闕軍戯群童咸推爲主割土處中部分行伍郷黨皆称之丗􅀃曰崔駰有文才不其縣令往造之駰子瑗年九􅀊書門曰雖無于木君非文侯何爲入我里閭令見之問駰曰必児所書召瑗使書乃書曰君使臣以禮臣事君以忠又曰徐孺子年九􅀊常月下戯人語之曰􅀂令月中無物極當明矣徐曰不然譬如人眼中有瞳子無此可不暗乎又曰孔文舉有二子}
