  - {type: variant, offset: 633, length: 0, content: '', krp: 歲喪母號泣不絶聲自然之哀同於成人年十四始學疑不再問三年中誦五經皆究其義群言無不綜覧何禎别傳曰禎廬江潜人父他字文竒有儁才早卒禎在孕而孤生遇荒亂歸依舅氏齠齓乃追行喪哀泣合禮郷邑稱焉十餘歲耽志博覧研精群藉名馳淮泗杜祭酒别傳曰君在孩抱之中異於凢童舉宗竒之年六七歲在縣北郭與小兒軰爲竹馬戯有車行老公停車視之歎曰此有竒相吾恨不見徐邈别傳曰君諱邈字仙民東莞人𡵨薿朗慧聦悟七歲渉學詩賦成章趙至别傳曰至字景眞代郡人流客緱氏令新之官至年十三與母共道傍觀母曰汝先丗夲非微賤家也丗亂流離遂爲士仵耳後能至此不至荅曰可耳便求就師讀書早起聞父耕叱牛聲釋書而泣師問其故荅曰自傷不能致榮使老父不免勤苦師大異之稱其當爲竒器傳暢自叙曰暢字洪迎年四歲散騎常侍扶風曽叔虎}
  - {type: variant, offset: 634, length: 0, content: '', krp: 德量喜與余戯常解衣褶𬒳脫余金環與侍者謂余當恡惜之而經數日不索遂於此見名言論甚重孝子傳曰華光字榮祖彭城人年七歲欲見父像永畫其父形像朝夕拜謁母有病輙呼天禱祠母即瘳愈毎得珍甘置父像前劉向别傳曰楊信字子烏雄第二子㓜而明慧雄筆玄經不㑹子烏令作九數而得之雄又疑易羝羊觸藩弥日不就子烏曰大人何不云荷㦸入榛列子傳曰孔融𬒳誅𥘉女七歲男九歲以其㓜弱得寄他舎主人有遺肉汁男渴而飲之女曰今日之渴豈得乆活何頼知肉味乎兄號泣而止或言於曹操遂盡殺之及収至女謂兄曰若死者有知得見父豈非至願延頸就刑顔色不變文士傳曰張惇字子純與張儼及朱異俱童少徃見驃騎將軍朱據聞三人才名欲試之曰爲吾賦一物然後坐儼賦犬曰守則有威出則有獲韓盧宋鵲書名竹帛純賦席曰席爲冬設簟爲夏施揖讓而㘴君子攸冝異賦弩曰南嶽之幹鍾山之銅應機命中獲隼髙墉據大欣恱又曰桓驎字元鳯沛國龍亢人伯父焉知名官至太尉驎精敏年十三四在焉㘴有宿客爲詩曰甘羅十二楊烏九齡昔有二子今則桓生叅差等蹤異丗齊名驎即應聲荅曰邈矣甘羅超等絶倫卓彼楊烏命丗稱賢嗟予蠢弱殊才侔年仰慙二子俯媿過言又曰劉楨字公幹少以才學知名年八九歲能誦論語詩論及篇賦數萬言警悟辯捷所問應聲而荅當其辤氣鋒烈莫有折者又曰阮瑀少有儁才應機捷麗就蔡邕學歎曰童子竒才朗朗無雙又曰王弼字輔嗣山陽髙平人㓜聦逹年十餘歲便}
