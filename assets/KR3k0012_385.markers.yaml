  - {type: variant, offset: 3142, length: 7, content: 安道譙國人少博, SBCK: 德容爲児童郡功曹㳺殷察異之殷先歸勑家設賔饌及旣至殷妻􅀏曰張德容童昏小児何異於客哉殷曰方伯之器也殷遂與旣論覇王之略饗訖以子楚託之海内先賢傳曰童子汝南謝廣河南趙建年十二通經詔以爲二童應化而皆拜郎中汝南先賢傳曰郭亮童㓜之年則有尚義之心年十四始欲出}
