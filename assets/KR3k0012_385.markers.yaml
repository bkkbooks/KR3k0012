  - {type: variant, offset: 1418, length: 14, content: 英陳留長垣人父恢為南海太守祐, krp: 客問鍾向二童是誰鍾曰裴揩清通王戎簡要二十年此二賢當爲吏部尚書兾尓時天下無復滯才語林曰孫䇿}
  - {type: punctuation, offset: 1419, content: ，, id: KR3k0012_CHANT_385-bkkpn427}
  - {type: 'tls:seg', offset: 1419, content: '', id: KR3k0012_CHANT_385-20a.4}
  - {type: variant, offset: 1420, length: 809, content: 留長垣人父恢為南海太守祐年十二恢欲殺青簡以寫經書祐諫曰今大人逾越五嶺遠在海濱其俗舊多珍怪此書若成則載之兼兩昔馬援以薏苡興謗其陽以衣囊邀名嫌疑之間誠先賢所慎也恢乃止撫其首曰吳世不乏季子矣又曰和熹鄧后年五歲太夫人為斷髮夫人年耆目寘并中后額雖痛忍而不言左右怪問之后言曰難傷老人意故忍之又曰黃香字文強江夏安陸人年九歲失母思慕憔悴殆不免喪鄉人稱其至孝年十二博覽傳記京師號曰日下無雙江夏黃香英雄記曰曹純字子和年十四喪父業富於財僮使人僕以百數純綱紀督御之不失其理好樂學問敬愛學士學士多歸焉由是為遠近所稱年十六為黃門郎漢雜事曰陳寔字仲弓漢末太史家瞻星有德星見當有英才賢德同遊者書下諸郡縣問頴川郡上事其日有陳太丘父子四人俱共會社小兒季方御大兒元方從抱孫子長文此是也魏氏春秋曰袁氏之敗也孔融與太祖書曰武王伐紂以妲己賜周公太祖後見問之對曰以今度之想其當爾融被收二子年八歲時方弈棊端坐不起左右曰而父見執不起何也二子曰安有巢毀而卵不破者乎魏志曰鍾會字士季頴川長社人太傅繇小子也少敏惠夙成中護軍蔣濟著論曰觀其眸子足以知人會年五歲繇遣見濟濟甚異之曰非常人又曰賈逵字梁道河東襄陵人自為童戲弄常設部伍祖父習異之曰汝大必為將帥口授兵法數萬言又曰楊俊同郡王象少孤時為人樸隸年十七八見使牧羊而私讀書因獲捶楚俊美其才質即贖象著家娉娶立屋然後與別又曰劉廙字恭嗣南陽安眾人年七歲戲講堂上頴川司馬德操撫其頭曰孺子孺子黃中通理寧自知不又曰司馬朗字伯達河內溫縣人年九歲人有稱其父字者朗曰慢人者不敬其親客謝之十二試為童子郎又曰王粲為中郎蔡邕見而奇之時邕顯著貴重朝廷常車騎填巷賓客盈坐聞粲在門倒屣迎之及至年既幼弱容狀短小一坐盡驚邕曰此王公孫也有異才吾不如也吾家書籍文章盡當與之又曰陳群字長文頴川許昌人祖父寔父紀叔父諶皆有盛名群為兒時寔常奇之謂宗人父老曰此兒必興吾宗又曰常林字伯槐河內溫人年七歲父黨造門問林曰伯先在不汝何不拜林曰對子字父何拜之有於是咸共嘉之又曰曹休字文烈太祖族, SBCK: 宣帝}
