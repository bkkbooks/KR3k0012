  - {type: variant, offset: 2233, length: 1, content: 歲, SBCK: 􅀊侍宴賦詩十韻援筆便就僕射徐陵甚竒之又曰劉仁䡄尉氏人也㓜少恭謹好學遇隋末喪亂不遑專習毎行坐所在輙書空􅀞地由是􅀶渉文史又曰權德輿生四􅀊能屬詩七􅀊居父喪以孝聞十五日文數百篇編爲童蒙集集十卷名聲日大又曰蔣乂字德源吏官呉兢外孫以外舎冨墳史㓜便記覽不倦七􅀊時誦􅁃信哀江􅀯賦數遍而成誦在口以聦悟強力聞於親黨間又曰髙郢子定㓜聦警絶倫七􅀊時讀尚書湯誓問郢曰奈何以臣伐君郢曰應天順人不爲非道又問曰用命賞于祖不用命戮于社是順人乎父不能對列子曰孔子東逰}
