  - {type: variant, offset: 970, length: 2, content: 陳蕃, krp: 夏侯稱}
  - {type: variant, offset: 971, length: 448, content: 蕃字仲舉汝南平輿人年十五常閑處一室而庭宇蕪穢父友同郡薛勤來候之謂蕃曰孺子何不洒掃以待賓客蕃曰丈夫處世當除天下安事一室乎勤知其有清世志東觀漢記曰馬援字客卿幼而岐嶷年六歲能應接諸公專對賓客嘗有死罪亡命者來過客卿逃匿不令人知外若訥而沉敏兄甚奇之以為將相器故以客卿字焉又曰班固字孟堅年九歲能屬文誦詩賦及長遂博貫載籍九流百家之言無不窮究學無常師不為章句大義而已性寬和容眾不以才能高人諸儒以此慕之又曰丁鴻年十三從桓榮受歐陽尚書三年而明章句善論難為都講遂篤志精銳布衣荷檐不遠千里又曰張堪字君遊年六歲受業長安治梁丘易才美而高京師號曰聖童又曰鄧禹字仲華南陽新野人年十三能誦詩受業長安時上亦遊學京師禹年雖幼而見上知非常人遂相親附及漢兵起即策杖北渡追及上於鄴又曰承宮琅琊姑蘇人少孤年八歲為人牧豬鄉里徐子盛明春秋經授諸生數百人宮過其廬下見諸生講誦好因棄其豬而聽經豬主怪其不還來索見宮欲笞之門下生共禁止因留精舍門下樵薪又曰魯恭父建武初為甘陵太守卒官時年十二弟平年七歲晝夜號踴不絕聲郡中賻贈無所受歸服喪禮過成人又曰吳祐字季英, SBCK: 叔逹}
