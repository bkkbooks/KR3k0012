  - {type: variant, offset: 440, length: 1, content: 賈, krp: 也門者白之公曰髙明父祖常與孤遊乎跪而應曰先君孔子與明公先李老君同德比義而相師友則融與公累丗通家坐衆數十人莫不歎息咸曰異童子也太中大夫陳煒後至曰人小了了大或未能佳少府尋聲荅曰君子之㓜時豈當惠乎李公撫抃大笑頋少府曰髙明長大必爲偉器范曄後漢書云詣李膺也何晏别傳曰晏時小養魏宫七八歳便慧心大悟衆無愚智莫不貴異之魏武帝讀兵書有所未解試以問晏晏分散所疑無不氷釋邴原别傳曰原字根矩十一喪父家貧早孤隣有書舎原過其傍而泣師問曰童子何罪原曰一則願其不孤二則羡其得學師亦哀原之言而爲之曰童子苟有志我徒相教不求費也於是遂就書一歳之間誦孝經論語管輅別傳曰輅年八九歲便喜仰視星辰得人輙問其名夜不肯寐自言家雞野鵠猶尚知時况於人乎與比隣兒共戯土壤中輙書地作天及日月星辰毎荅言說事語皆不常宿學耆人不能折之時}
