  - {type: variant, offset: 2446, length: 3, content: 六歲於, WYG: 十有二次曰季彦年十嵗父友西洛人姚進先有道徴不就養志于家長彦季彦常受教焉既除䘮家有先人遺書兄弟相勉諷誦不倦于時蒲坂令許君然造其宅勸使歸魯奉以車二乘辭曰載柩而反則違父遺命舍墓而去則心所不忍君然曰以孫就祖扵禮為得願子無疑答曰若以死有知也祖猶隣宗族焉父獨留此不已劇乎吾其定矣遂還其居扵是甘貧研精墳典十餘年間㑹徒數百故時人為之語曰魯孔氏好讀經兄弟誦講可不聼學士來者有聲名不過孔氏那得成郭氏曰梁國楊氏子年}
