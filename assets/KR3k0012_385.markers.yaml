  - {type: variant, offset: 3353, length: 265, content: 蔡興宗字興宗幼為父廊所重謂有己風與親故書曰小兒四歲神氣似可不入非類室不與小人遊故以興宗為之名興宗為之字齊書曰王慈字伯寶琅耶臨沂人司空僧虔子也八歲外祖宋江夏王義恭施寶物恣聽所取慈唯取素琴石硯義恭善之又曰傳昭六歲而孤哀毀如成人為外祖所養十歲於朱雀航賣歷日雍州刺史袁顗見而奇之顗嘗來昭所昭讀書自若神色不改顗歎曰此兒神情不凡必成佳器又曰顧協從祖右光祿大夫張永嘗攜內外孫姪遊武丘山協年數歲永撫之曰兒欲何戲協曰兒正欲枕石漱流永歎息曰顧氏興於此子及長好學以精力稱又曰顧歡年六七歲父使驅田中雀遂作黃雀賦而歸雀食稻過半父怒將撻之見賦乃止梁史曰沈璞字, WYG: 劉}
