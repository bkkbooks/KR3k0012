  - {type: variant, offset: 5, length: 1, content: 五, WYG: 六}
  - {type: variant, offset: 5, length: 0, content: '', krp: 六㓜智下唐書曰李百藥字重䂓隋内史令德林子也爲童兒時多疾病祖母趙氏故以百藥爲之名七歳解屬文父友齊中書舎人陸乂馬元熈甞造德林讌集有讀徐陵文者云旣取成周之禾將刈琅耶之稲並不知其事百藥時侍立進曰傳稱鄅人藉稲杜預注云鄅國在瑯瑯開陽乂等大驚異之又曰禇亮字希明㓜聦敏好學善屬文慱覽無所不至經目必記於心喜逰名賢尤善談論年十八詣陳僕射徐陵與啇搉文章深異之陳後主聞而召見使賦詩江揔及諸詞人在坐莫不推善又曰陳叔逹陳宣帝子年十餘歲侍宴賦詩十韻援筆便就僕射徐陵甚竒之又曰劉仁䡄尉氏人也㓜少恭謹好學遇隋末喪亂不遑專習毎行坐所在輙書空畫地由是博渉文史又曰權德輿生四歲能屬詩七歲居父喪以孝聞十}
  - {type: xml-element, offset: 6, content: '', id: KR3k0012_CHANT_385-bkkxmlele1}
  - {type: 'tls:seg', offset: 6, content: '', id: KR3k0012_CHANT_385-1a.1}
  - {type: 'tls:seg', offset: 6, content: '', id: KR3k0012_CHANT_385-1a.2}
  - {type: variant, offset: 6, length: 1, content: 幼, SBCK: 㓜}
  - {type: variant, offset: 6, length: 1, content: 幼, WYG: 㓜}
  - {type: variant, offset: 6, length: 2, content: 幼智, krp: 日文數百篇編爲童蒙集集十卷名聲日大又曰蔣乂字德源吏官呉兢外孫以外舎冨墳史㓜便記覽不倦七歲時誦庾信哀江南賦數遍而成誦在口以聦悟強力聞於親黨間又曰髙郢子定㓜聦警絶倫七歲時讀尚書湯誓問郢曰奈何以臣伐君郢曰應天順人不爲非道又問曰用命賞于祖不用命戮于社是順人乎父不能對列子曰孔子東逰見兩小兒辯日問其故一小兒曰我以爲日始出去人近而日中時逺一児曰我以爲日出時逺而日中近一児曰𥘉出大如車蓋及中才如盤蓋此不爲逺者小而近者大乎一児曰日𥘉出蒼蒼凉凉及其中如探湯此不爲近者熱而逺者凉乎孔子不能決兩小児笑曰孰爲汝多知乎尸子曰蒲衣生八年舜讓以天下周王太子晉生八年而服師曠魯連子曰齊之辯士田巳辯於狙丘議於稷下毀五帝罪三王訾五伯離堅白合同異一日而服千人有徐劫者其弟子曰魯連連謂徐劫曰臣願得當田子使之必不復談可平徐劫言之巴曰余弟子年十二然千里駒也願得待議於前可乎田巴曰可魯連得見曰今楚軍南陽趙伐髙堂燕人在遼國亡在旦暮先生將奈何田巴曰無奈何魯連曰危不能爲安亡不能爲存無貴學士矣今先生之言有似梟鳴出聲人皆惡之願先生勿復談也田巴曰謹受教明日見徐劫曰先生之駒乃飛兎騕褭也豈特千里哉孔叢子曰孟子居尚㓜請見子思子思見之甚恱其志命子}
