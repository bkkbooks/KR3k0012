  - {type: variant, offset: 3096, length: 38, content: 嘗以刀傷手捧手改容人問痛耶荅曰受全之體而致毀傷不可處耳少好學手不釋卷博覽眾書, SBCK: 讀莊老}
  - {type: variant, offset: 3096, length: 1, content: 嘗, WYG: 讀莊老善通其意又曰杜育童孺竒才博學能著文章心解性逹無所不綜一時稱為舞陽杜孔子三輔决録曰張既字徳容為童兒郡功曹逰殷察異之殷先歸勅家設賔饌及既至殷妻笑曰張徳容童昏小兒何異扵客哉殷曰方伯之器也殷遂與既論覇王之畧饗訖}
  - {type: variant, offset: 3098, length: 1, content: 刀, WYG: 子楚託之海内先賢傳曰童子汝南謝廣河南趙建年十二通經詔以為二童應化而皆拜郎中汝南先賢𫝊曰郭亮童㓜之年則有尚義之心年十四始欲出學聞頴川杜周甫精黌于長杜亮造門而師學焉朝受其業夕已精講動聲則宫商清暢推義則尋理釋結周甫竒而偉之又曰黄憲字叔度世貧賤父為牛醫潁川荀淑甞至順陽遇憲扵逆旅時年十四淑悚然異之揖與語移日不能去謂曰子吾之師表也既而前至袁閬所曰子國有顔子寧識之乎閬曰君見叔度耶零陵先賢𫝊曰周不疑字文直長安人始嬰孩時已有竒異至年十三曹公聞之欲拜識既見即以女妻之不疑不受時有白雀瑞儒林並以作頌不疑見操授紙筆令復作操異而竒之廣州先賢𫝊曰董正字伯和南海人少有令姿貧寒不戚耽意術籍志在規俗年十五通毛詩三禮春秋㑹稽先賢𫝊曰淳于長通年十七説宓氏易經貫洞内事萬言兼春秋鄉黨稱曰聖童益都耆舊𫝊曰張覇字伯饒蜀郡城都人也年數嵗知禮義鄉人號為張曽子七嵗通春秋復欲進餘經父母曰汝小未能也覇曰我饒為之故字伯饒㑹稽典畧曰王充字仲仁為兒童逰戯不好狎侮父誦竒之七嵗教書數又曰餘姚伍賤字士㣲父為倉監失去官糓簿領自辛至扵死賤為執竿檢校相當由是見異號為神童江氏家𫝊曰江㽔字世林年十一始知樗蒲數以為逰祖毋費為說往事有以博奕破業廢身者扵是即棄五木終身不以為戯荀氏家𫝊曰朂字公魯年十二能通春秋屬文從外祖鍾繇甚竒之常稱此兒當繼司空又曰荀淑子爽字慈明一名諝㓜而好學年十二能通春秋論語太尉杜喬見而稱之曰可為人師爽遂耽思經書慶弔不行徴命不應潁川為之語曰荀氏八龍慈明無雙華陽國志曰童子李餘涪人兄夷殺人亡命母慎當死餘年十二詣吏代母死吏以餘年小不許因自刎死吏以白令令哀}
