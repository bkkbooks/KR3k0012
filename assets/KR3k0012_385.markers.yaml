  - {type: variant, offset: 2508, length: 37, content: 瞻今已八歲聰惠可愛嫌其早成不為重器耳晉書曰王戎幼而潁悟神彩秀徹視日不眩裴楷, WYG: 晋平公使叔譽扵周}
  - {type: variant, offset: 2512, length: 1572, content: 歲聰惠可愛嫌其早成不為重器耳晉書曰王戎幼而潁悟神彩秀徹視日不眩裴楷見而目之曰戎眼爛爛如巖下電年六七歲於宣武場觀戲猛獸在檻中虓闞震地眾皆奔走戎獨立不動神色自若魏明帝於閤上見而奇之又曰王澄字平子生而警悟雖未能言見人舉動便識其意衍妻郭性貪鄙欲令婢路上擔糞澄年十四諫郭以為不可又曰中宗太子紹幼而聰哲年數歲嘗置中宗睞上會長安使來中宗因問曰汝謂日與長安孰遠對曰日遠中宗問其故荅曰不聞人從日邊來然可知耳中宗異之明日會群臣又問之對曰日近中宗失色曰何異昨日之言對曰舉目見日不見長安由是益奇之又曰王舒字允之總角時嘗從從伯敦敦與錢鳳謀逆而允之時飲酒帳中臥悉聞其言慮敦疑之便於臥處吐涕狼藉敦果疑遣看之見吐唾以為醉又曰謝尚字仁祖豫章太守鯤之子幼有至性八歲風神夙悟鯤嘗攜之送客或曰此兒一座之顏回也尚應聲曰座無尼父焉識顏回賓客莫不歎異年十歲遭父憂丹陽尹溫嶠吊之尚號哭極哀既而收涕告訴舉止有異常童嶠甚奇之又曰韓康伯早孤家貧年數歲母為作襦子令康伯捉熨母謂曰且著尋為汝作袴伯曰已足不復煩母問其故荅曰如火在熨斗中而柄亦熱今既著襦皆當暖也母異之未有幼童若王隱晉書曰王儉字元衡內史下邳陳邵擅名徐州邵聞儉年十四善屬文請作祝文邵謂郡客曰此生為文有可觀采命為督郵主簿邵遷給事儉每為定表晉中興書曰謝安字安石年四歲桓彝見而歎曰此兒風神秀徹後當不減王東海總角神識深敏氣宇條暢丞相王導知之由是著名又曰范宣陳留人年十歲能誦詩書嘗以刀傷手捧手改容人問痛耶荅曰受全之體而致毀傷不可處耳少好學手不釋卷博覽眾書善三禮又曰戴逵字安道譙國人少博學好談論善屬文能鼓琴工書畫晝其餘巧藝靡不畢綜總角時以雞卵汁溲白瓦屑作鄭玄碑又為文手自刻字文既綺藻器亦妙絕時人莫不驚歎知其深敏宋書曰劉秀之字道寶少孤貧有志操十許歲時與諸兒戲於前渚忽有大虵來勢甚猛無不顛怖驚呼秀之猶不動眾並異焉又曰王僧達幼聰敏弘為州縣僧達六七歲遇有通訟者竊覽其辤謂為有理及入訟者亦進弘意其小留左右僧達為申理闇誦不失一句又曰徐湛之幼與弟淳之共車行牛奔車左右人馳來赴之湛之先令取弟眾咸歎其幼而有識又曰蔡興宗字興宗幼為父廊所重謂有己風與親故書曰小兒四歲神氣似可不入非類室不與小人遊故以興宗為之名興宗為之字齊書曰王慈字伯寶琅耶臨沂人司空僧虔子也八歲外祖宋江夏王義恭施寶物恣聽所取慈唯取素琴石硯義恭善之又曰傳昭六歲而孤哀毀如成人為外祖所養十歲於朱雀航賣歷日雍州刺史袁顗見而奇之顗嘗來昭所昭讀書自若神色不改顗歎曰此兒神情不凡必成佳器又曰顧協從祖右光祿大夫張永嘗攜內外孫姪遊武丘山協年數歲永撫之曰兒欲何戲協曰兒正欲枕石漱流永歎息曰顧氏興於此子及長好學以精力稱又曰顧歡年六七歲父使驅田中雀遂作黃雀賦而歸雀食稻過半父怒將撻之見賦乃止梁史曰沈璞字道真童孺神意閑審武帝召見奇璞應對謂林子曰此非常兒也初除南平王左常侍陳書曰王元規八歲而孤兄弟三人隨母依舅氏往臨海郡時年十二郡土豪劉瑱者資財巨萬欲妻以女母以其兄弟幼弱欲結強援元規泣謂曰姻不失親古人所重豈得茍安異壤輒婚非類母感其言而止崔鴻十六國春秋前涼錄曰辛攀字懷遠年七歲隨父爽在京師北地程曉爽之親友目攀而笑曰犁牛騂犢孺子之謂攀曰戲及人親非雅訓也曉及眾賓大奇異之又後趙錄曰徐光字季武頓丘人父聰以牛醫為業光幼好學有文才年十三嘉平中王陽攻頓丘掠之令主抹馬光但書柱為詩賦而不親馬事陽怒撻之啼呼終夜不止左右以白陽陽召光付紙筆光立為頌陽奇之又夏錄曰吐谷渾拾寅者虔國之弟也年數歲猶大啼笑母氏念憂其不惠父樹洛于曰此兒吾家驪肩馴駒伯樂尚不能目之而況庸人哉終成吾門戶者必在此子年六七歲而器識不恒或謂之神童後魏書曰裴駿字神駒河東聞喜人幼而聰惠親表異之稱為神駒因以為字駿從弟子安祖少而聰惠年八九歲就師講誦詩至鹿鳴篇語兄云鹿雖禽獸得食相呼而況人也自此之後未嘗獨食又曰任城王澄之子順字子和年九歲師事樂安陳豐初書王羲之小學篇數千言晝夜誦旬有五日一皆通利豐奇之白澄曰豐, krp: ''}
