  - {type: variant, offset: 1667, length: 419, content: 為黃門郎漢雜事曰陳寔字仲弓漢末太史家瞻星有德星見當有英才賢德同遊者書下諸郡縣問頴川郡上事其日有陳太丘父子四人俱共會社小兒季方御大兒元方從抱孫子長文此是也魏氏春秋曰袁氏之敗也孔融與太祖書曰武王伐紂以妲己賜周公太祖後見問之對曰以今度之想其當爾融被收二子年八歲時方弈棊端坐不起左右曰而父見執不起何也二子曰安有巢毀而卵不破者乎魏志曰鍾會字士季頴川長社人太傅繇小子也少敏惠夙成中護軍蔣濟著論曰觀其眸子足以知人會年五歲繇遣見濟濟甚異之曰非常人又曰賈逵字梁道河東襄陵人自為童戲弄常設部伍祖父習異之曰汝大必為將帥口授兵法數萬言又曰楊俊同郡王象少孤時為人樸隸年十七八見使牧羊而私讀書因獲捶楚俊美其才質即贖象著家娉娶立屋然後與別又曰劉廙字恭嗣南陽安眾人年七歲戲講堂上頴川司馬德操撫其頭曰孺子孺子黃中通理寧自知不又曰司馬朗字伯達河內溫縣人年九歲人有稱其父字者朗曰慢人者不敬其親客謝之十二試為童子郎又曰王粲為中郎蔡邕見而奇之時邕顯著貴重朝廷常車騎填巷賓客盈坐聞粲, krp: ''}
