  - {type: variant, offset: 2964, length: 1, content: 未, WYG: 稱其當為大器傅暢自叙曰暢字洪迎年四嵗散騎常侍扶風魯叔虎以徳量喜與余戯常觧衣褶被其背脫余金環與侍者謂余當懐􅀈之而經數日不索遂扵此見名言論甚重孝子𫝊曰華光字榮祖彭城人年七嵗欲見父像求畫其父形像朝夕拜謁母}
  - {type: variant, offset: 2966, length: 1, content: 幼, SBCK: 病輙呼天禱祠母即瘳愈毎得珍甘置父像前劉向别傳曰楊信字子烏雄第二子㓜而明慧雄筆玄經不㑹子烏令作九數而得之雄又疑易羝羊觸藩弥日不就子烏曰大人何不云荷㦸入榛列子傳曰孔融􅀍誅􅀄女七􅀊男九􅀊以其㓜弱得􅀉他舎主人有遺肉汁男渴而飲之女曰今日之渴豈得乆活何頼知肉味乎兄號泣而止或言於曹操遂盡殺之及収至女謂兄曰􅀂死者有知得見父豈非至願延頸就刑顔色不變文士傳曰張惇字子純與張儼及朱異俱}
  - {type: page-break, offset: 2966, content: '', id: KR3k0012_SBCK_385-6a}
  - {type: variant, offset: 2966, length: 1, content: 幼, WYG: 病輙呼天禱祠母即瘳愈每得珍甘置父像前劉向别傳曰楊信字子烏雄第二子㓜而聰慧雄笇𤣥經不㑹子令作九數而得之雄又疑易羝羊觸藩彌日不就子烏曰大人何不云荷㦸入榛列子傳曰孔融被誅㓜女七嵗男九嵗以其㓜弱得寄他舍主人有遺肉汁男渇而飲之曰今日之渇豈得久活何頼知肉味乎兄哭泣而止或言扵曹操遂盡殺之及收至女謂兄曰若死者有知得見父豈非至願延頸就刑顔色不變文士傳曰張惇字子純與張儼及朱異俱僮少往見驃騎將軍朱據聞三人才名欲試之曰為吾賦一物然後坐儼賦犬曰守則有威出則有獲韓盧宋鵲書名竹帛純賦席曰席為冬設簟為夏施揖讓而坐君子攸冝異賦弩曰南嶽之幹鍾山之銅應機命中獲隼髙墉㨿大欣悦又曰桓驎字元鳯沛國龍元人伯父焉知名官至太尉驎精好年十三四在烏坐有宿客為詩曰甘羅十二楊烏九齡昔有二子今則桓生恭羗等縱異世齊名驎即應聲荅曰邈矣甘羅超等絶倫卓彼楊烏命世稱賢嗟予蠢弱殊才侔年仰慙二子俯媿過言又曰劉楨字公幹少以才學知名年八九嵗能誦論語詩論及篇賦數萬言警悟辯㨗所問應聲而荅當其辭氣鋒烈莫有折者又曰阮瑀少有雋才應機㨗麗蔡邕學歎曰}
