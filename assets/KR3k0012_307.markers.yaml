  - {type: variant, offset: 2690, length: 0, content: '', WYG: 社也乃造于先王然後冡宰徴師于諸侯造就也就造于先祖廟也曰某國為不道征之以某月日師至于某國至于所征之國與天子㑹天子正刑刑者天子之法也刑以征不義伐不從王者之法也冡宰與伯布命于軍曰入罪人之地無殃民無獵田無有虐無毁土功無糞牆屋無伐樹木無取六畜無取禾粟無取噐械見其老幼奉歸勿傷雖遇壯者不校勿敵若傷人醫藥歸之既誅有罪王及諸侯正其國舉賢更立明主復職王者與四方諸侯伐無道之國整頓其民人舉賢良更立為君奉尊王法復百官之職事矣論衡曰師尚父為周司馬率師伐紂到孟津之上仗鉞把旄號其衆曰蒼兕蒼兕水中之獸也善覆人船因神以化欲令急渡汝不急渡蒼兕害汝河中有此怪獸時時出浮一身九頭人畏惡之未必非覆人船者也文選曰勒三軍􅊎}
