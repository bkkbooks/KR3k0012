  - {type: variant, offset: 2683, length: 1, content: 衛, WYG: 願戮力行間以報恩顧受爵明君之朝慶觴父母之室不亦美乎衆皆勇奮破釡棄粮大呼競進後周書曰太祖率李弱獨孤信等十二將東伐至潼關太祖乃誓於師曰與爾有衆奉天威誅暴亂惟爾衆士整爾甲兵戒爾戎事無貪財以輕敵無暴民以作威用命則有賞不用命則有戮爾衆士其勉之遣子讌居軍前徇地唐書曰髙祖起義兵西圗關中精甲三萬髙祖仗白旗誓衆於太原之野引師即路又曰太宗征王世充陳兵榖水之上歩騎五萬太宗舉旄誓衆曰隋室無道毒被蒼生我國家受命于天寧濟億兆世充敢抗大邦數行侵暴誅殺良善恣其淫酷國家為百姓除害事不獲已各宜整爾軍旅修爾噐械立勲自効躬行天罰敢有犯命者斬無赦又曰朱泚亂韋臯於隴州築壇於庭血牲與將士等盟曰上天不弔國家多難逆臣乘間盗據皇宫而李楚琳亦扇兇徒傾陷城邑酷虐所加咸被其毒既不事上安能恤下皋是用激心憤氣不遑底寜􅊎羣}
