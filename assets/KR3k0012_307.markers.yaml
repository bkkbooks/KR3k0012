  - {type: punctuation, offset: 2688, content: 「, id: KR3k0012_CHANT_307-bkkpn728}
  - {type: variant, offset: 2688, length: 0, content: '', SBCK: 古者逐奔不逺縱綏不及所以示君子且有禮不逺則難誘不及則難䧟以禮爲固以仁爲勝旣勝之後其敎可復是故君子貴之也有虞氏戒於國中欲人體其命也舜以農教戰以戰敎民畋獵􅰣習故民體之也夏后氏誓於軍中欲民先成其慮也禹㑹軍聚重􅃨教肆進退左右前後離合周旋也殷誓於軍門之外欲民先意待事也殷旣遵虞夏之教民又於軍門外復簡試周將交刃而誓之以致意也周用漢夏殷之敎民交和接兵又復申望誓之軍德薄民俗巧也又曰賢王制禮樂法度乃作五刑興甲兵以討不義廵狩省方㑹}
  - {type: variant, offset: 2688, length: 0, content: '', WYG: 古者逐奔不逺縱綏不及所以示君子且有禮不逺則難誘不及則難陷以禮為固以仁為勝既勝之後其教可復是故君子貴之也有虞氏戒於國中欲人體其命也舜以農隙教民以戰畋獵簡練故民安之也夏后氏誓於軍中欲民先成其慮也禹㑹軍聚衆復教以進退左右前後離合周旋之度殷􅊎于軍門之外欲民先意待事也殷既尊虞夏之教民又作於軍門外復簡試周將交刃而􅊎之以致意也周承三代之教民既已知兵又復聲望􅊎之軍徳薄民俗巧也又曰賢王制禮樂法度乃作五刑與甲兵以討不義巡狩省方㑹}
  - {type: page-break, offset: 2688, content: '', id: KR3k0012_WYG_307-9a, image: WYG0895/WYG0895-0656a.png}
  - {type: variant, offset: 2688, length: 0, content: '', krp: 古者逐奔不逺縱綏不及所以示君子且有禮不逺則難誘不及則難䧟以禮爲固以仁爲勝旣勝之後其敎可復是故君子貴之也有虞氏戒於國中欲人體其命也舜以農教戰以戰敎民畋獵􅰣習故民體之也夏后氏誓於軍中欲民先成其慮也禹㑹軍聚重複教肆進退左右前後離合周旋也殷誓於軍門之外欲民先意待事也殷旣遵虞夏之教民又於軍門外復簡試周將交刃而誓之以致意也周用漢夏殷之敎民交和接兵又復申望誓之軍德薄民俗巧也又曰賢王制禮樂法度乃作五刑興甲兵以討不義廵狩省方㑹}
  - {type: variant, offset: 2689, length: 0, content: '', SBCK: 侯考不同其有失命亂常背德逆天之時而危有功之君王者以有功德者爲君長賊臣欲篡殺之徧告于諸侯章明於有罪乃告于皇天上帝日月星辰以禱于后􅁟四海之神山川冡社冢社者天子太社也乃造于先王然後􅃁宰徴師于諸侯造就也就造干先祖廟也曰某國爲不道征之以某年月日師至于某國至于所征之國與天子㑹天子正刑刑者天子之法也刑以征不義伐不從王者之法也冢宰與伯布命于軍曰入罪人之地無暴神祗無獵田無有虐無毁二功無糞墻屋無伐樹木無取六畜無取禾粟無取器城見其老㓜奉歸勿傷雖遇壯者不校勿敵􅀂傷人醫藥歸之旣誅有罪王及諸侯正其國舉賢更立明正復職三者與四方諸侯伐無道之國整頓其民人舉賢良更立爲君奉遵王法復五官之職事矣論衡曰師尚父爲周司馬將師伐紂到孟津之上仗􅃏把旄號其衆曰倉兕食兕水中之獸也善覆人船因神以化欲令急渡汝不急渡倉兕害汝河中有此之物時時出浮一身九頭人畏惡之未必覆人􅂳者也文選曰勒三軍誓將帥元戎竟野戈鋋彗雲麾兵莊子曰市南冝僚弄丸兩家之難解孫叔敖甘寢秉羽而郢人投兵􅀳書曰張重華攻石季龍遣謝艾爲使持節軍師將軍率歩􅀐三萬進軍臨河麻秋以三萬衆拒之艾乗軺車冠白恰鳴鼔而行秋望而怒曰艾年少書生冠服如此輕我也命黒矟龍􅆖三千人馳擊之艾左右}
  - {type: page-break, offset: 2689, content: '', id: KR3k0012_SBCK_307-6a}
  - {type: page-break, offset: 2689, content: '', id: KR3k0012_SBCK_307-6b}
