  - {type: variant, offset: 2949, length: 0, content: '', krp: 毛法仁言聲壯大至於軍旅田狩唱呼處分振於山谷後周書曰李逺字萬歳㓜有器局志度恢然甞與羣兒爲戰鬪之戯指麾部分便有軍陣之法郡守見而異之召使更戯羣兒懼而散走逺持杖叱之復爲向勢意氣雄壯殆甚於前郡守曰此小兒必爲將帥非常人也又曰建德中東伐齊帝引兵發京師壬寅渡河與諸軍合十二月戊申次於晉州恐王師卒至於城南穿壍自喬山屬於汾水庚戌帝諸軍八萬人置陣東西二十餘里帝乗常御馬從數人廵陣處分所至輙呼主帥姓名以慰勉之將士感見知之恩各自奮勵隋書曰李子雄從幸江都帝以仗衛不整顧子雄歩伍之子雄立指麾六軍肅然帝大恱曰公眞武侯才也尋轉右武候大將軍唐書曰德宗時鄭權爲涇原節度使劉昌從事昌病亟請入覲度軍中必有變以權寛厚善容衆俾主留務旣而兵果爲亂權挺身於白刃中抗詞以明逆順因殺其首亂者數人士皆戢伏又曰昭宗時玉山都頭楊守信叶楊復恭稱兵闕下陣}
  - {type: variant, offset: 2950, length: 2, content: 栗磾, SBCK: 通化門上陳兵於延喜門是夜令劉崇望守度支庫明日曉入含光門未開門内禁軍列于左右俟門開即刼掠兩市及聞傳呼宰相來門方開崇望駐馬慰諭之曰聖上在街東親揔戎事公等禁軍何不樓前殺賊立取功名切不可剽掠街市圖小利以成惡名也將士唯唯從崇望至長樂門守信見兵來即遁軍士呼萬歳是日庫市􅀗全軍人不亂繄崇望之方略也五代周史曰丗宗至泗洲}
