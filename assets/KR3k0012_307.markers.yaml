  - {type: variant, offset: 994, length: 3, content: 奈何嗣, SBCK: 今大㓂旣深事藉機變請使任城王便領幽州道兵自土門入聲取并州獨􅀌永業便領洛州兵自潼關入聲取長安臣請領京畿兵岀溢只鼔行逆戰賊懸軍逺來日増疲老聞南北有兵自然應退誓衆書曰帝曰咨禹惟時有苗弗率汝徂征三苗之民數干王誅率循也徂往也不循帝道言亂逆也命禹討之禹乃㑹羣后誓于師曰濟濟有衆咸聽朕命㑹諸侯伐有苗也軍旅曰誓濟濟衆盛之貌蠢兹有苗昏迷不恭蠢動昏闇也言其所以冝討侮慢自賢反道敗德狎悔先王輕慢典教反正道敗德義}
