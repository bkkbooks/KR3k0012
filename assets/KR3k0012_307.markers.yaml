  - {type: variant, offset: 287, length: 2, content: 尹尊, SBCK: 郎起北州擾惑漢素聞光武長者獨欲歸心乃􅀃太守彭寵曰漁陽上谷突騎天下所聞也君何不合二郡精銳兵附劉公擊邯鄲此一時之功也一時言不可再遇也寵以爲然又曰朱鮪聞光武北伐而河内􅀌使討難將軍蘇茂副將賈強率兵三萬餘人渡鞏河攻温鞏温並今洛州縣也臨廣河故曰鞏河檄書至㓂恂即勒軍馳出並移告屬縣發兵㑹於温下軍吏皆諌曰今洛陽兵渡河前後不絶冝待衆軍畢集乃可出也恂曰温郡之藩蔽失温則郡不可守遂馳赴之且曰合戰而偏將軍馮異遣救}
