  - {type: variant, offset: 2674, length: 1, content: 秦, WYG: 予則孥戮汝又曰羲和湎廢時亂日往征之告于衆曰羲和尸厥官昏迷于天象以干先王之誅今予奉將天罰火炎崑岡玉石俱焚天吏逸徳烈于猛火殱厥渠魁脅從罔治嗚呼威克厥愛允濟愛克厥威允罔功爾衆士懋戒哉欽承天子威命又曰魯侯伯禽宅曲阜徐夷並興東郊不開作費誓公曰嗟人無譁聴命善糓乃甲胄敿乃干無敢不弔備乃弓矢鍛乃戈矛礪乃鋒刃無敢不善峙乃糗糧無敢不逮汝則有大刑魯人三郊三遂峙乃楨榦甲戌我惟築無敢不供汝則有無餘刑又曰惟戊午王次于河朔次止也戊午渡河而􅊎既􅊎而止于河之北羣后以師畢㑹諸侯盡㑹止也王乃徇師而􅊎曰嗚呼西土有衆咸聽朕言徇循也周在西故稱西土也今商王受力行無度行無法度播棄黎老昵比罪人鮐背之人稱黎老棄不禮敬也昵近也罪人謂天下逋逃小人也予有亂臣十人同心同徳言我治亂之臣雖少而心徳同也雖有周親不如仁人周至也紂至親雖多不若周家之多仁人也又曰武王伐紂曰今予發惟恭行天之罰今日之事不愆于六歩七歩乃止齊焉夫子朂哉不愆于四伐五伐六伐七伐乃止齊焉朂哉夫子尚桓桓如虎如貔如熊如羆于商郊弗迓克奔以役西土朂哉夫子爾所弗朂其于爾躬有戮又曰爾衆士同力王室史記曰太尉行令軍中為吕氏右袒為劉氏左袒軍中皆左袒後}
