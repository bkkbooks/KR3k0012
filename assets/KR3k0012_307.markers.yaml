  - {type: variant, offset: 2963, length: 2, content: 作橋, SBCK: 謂名士饗士左傳曰宋華元將戰殺羊食其御羊斟不與及戰曰疇昔之羊子爲政今日之事我爲政與入鄭師故敗君子謂羊斟非人也以其私憾敗國殄民刑孰大焉史記曰樂毅并護趙楚韓魏燕之兵以伐齊破之濟西諸侯罷歸而燕軍樂毅獨追至于臨輜齊昬王之敗濟而亡走保於莒樂毅獨留徇齊皆城守樂毅攻入臨淄盡取齊寳財物􅀕器輸之燕昭王大恱親至濟上勞軍行賞饗士封毅於昌國號爲昌國君東觀漢記曰上大發關東兵自將上隴隗囂衆潰走圍解於是置酒髙㑹勞賜諸將來歙班坐絶席在諸將之右賜歙縑千疋後漢書曰呉漢圍􅂫茂於廣樂劉永將周建別招聚収集得十餘萬人救廣樂漢將輕騎迎與之戰不利墮馬傷􅂰還營建等遂連兵入城諸將謂漢曰大敵在前而公傷卧衆心懼矣漢乃勃然裹瘡而起推牛饗士令軍合戰大破之又曰劉盆子旣降帝令縣厨賜食衆積困餧十餘萬人皆得飽飫又曰鄧禹至長安軍昆明池大饗士卒率諸將齊戒擇吉日脩禮謁祠髙廟収十一帝神主遣使來詣洛陽因循行園陵爲置吏士奉守焉後周書曰􅀂干惠於諸將最少早䘮父事母以孝聞太祖甞造射堂新成與諸將宴射惠竊歎曰親孝矣何時辨此乎太祖聞之即日徙堂於惠宅其見重如此淮南子曰貟中規方中矩動成戰止成文可以榆衆而不可以陳軍滌杯而食洗爵而飲盥而後饋可以養少而不可以饗衆衛又曰楚子以至于羅汭傳也羅水名呉子使其弟蹶由犒師楚人執之將以釁鼓王使問焉曰汝卜來吉}
  - {type: page-break, offset: 2963, content: '', id: KR3k0012_SBCK_307-9a}
  - {type: page-break, offset: 2963, content: '', id: KR3k0012_SBCK_307-9b}
