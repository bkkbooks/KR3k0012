  - {type: page-break, offset: 2963, content: '', id: KR3k0012_SBCK_307-11a}
  - {type: variant, offset: 2963, length: 2, content: 作橋, WYG: 謂名士饗士左傳曰宋華元將戰殺羊食士其御羊斟不與及戰曰疇昔之羊子為政今日之事我為政與入鄭師故敗君子謂羊斟非人也以其私憾敗國殄民刑孰大焉史記曰樂毅并護趙楚韓魏燕之兵以伐齊破之濟西諸侯罷歸而燕軍樂毅獨追至于臨淄齊湣王之敗濟而亡走保於莒樂毅獨畱徇齊皆城守樂毅攻入臨淄盡取齊寳財物噐輸之燕昭王大恱親至濟上勞軍行賞饗士封毅於昌國號為昌國君東觀漢記曰上大發關東兵自將上隴隗囂衆潰走圍解於是置酒髙會勞賜諸將來歙班坐絶席在諸將之右賜歙縑千疋後漢書曰吳漢圍蘇茂於廣樂劉永將周建别招聚收集得十餘萬人救廣樂漢將輕騎迎與之戰不利墮馬傷膝還營建等遂連兵入城諸將謂漢曰大敵在前而公傷卧衆心懼矣漢乃勃然裹瘡而起椎牛饗士令軍合戰破之又曰劉盆子既降帝令縣厨賜食衆積困餒十萬餘人皆得飽飫又曰鄧禹至長安軍昆明池大享士卒率諸將齋戒擇吉日修禮謁祠髙廟收十一帝神主遣使來詣洛陽因循行園林為置吏士奉守焉後周書曰若于惠於諸將最少早喪父事母以孝聞太祖嘗造射堂新成與諸將宴射恵竊歎曰親老矣何時辦此乎太祖聞之即日徙堂於惠宅其見重如此淮南子曰員中規方中矩動成戰止成文可以諭衆而不可以陳軍滌杯而食洗爵而飲盥而後饋可以養少而不可以享衆黄石公記曰動為事機舒之彌四海卷之不盈懐柔而能剛則其國彌光弱而能强則其國彌章一簞之醪投之於河令士衆迎飲三軍為其死戰如風發攻如河決軍無財士不來軍無賞士不往香餌之下必有懸魚重賞之下必有死夫犒師左傳曰夏齊師伐我北鄙公使展喜犒師使受命于展禽齊侯未入境展喜從之曰寡君聞君親舉玉趾將辱於敝邑使下臣犒執事又曰三十三年秦師過北門及滑鄭商人弦髙將市於周遇之以乘韋先牛十二犒師商行賈也乘四韋也先韋乃及牛也古者將獻饋於人者必先之曰寡君聞吾子將歩於敝邑敢犒從者不腆敝邑為從者之淹居則具一日之積腆厚也奄乆也積芻米菜薪也行則備一夕之衛又曰楚子以驛至于羅汭驛𫝊也羅水名吳子使其弟蹶由犒師楚人執之將以釁鼓王使問焉曰汝卜來􅁻}
