  - {type: variant, offset: 2682, length: 3, content: 也衛公, SBCK: 室凡我同盟一心竭力伏順除兇祖先之靈必當幽賛言誠則志合義感則心齊粉骨塵軀決無所顧有渝此志明神殛之迨於子孫亦罔遺育皇天后土當兆斯言又使通於吐蕃以求助古司馬}
