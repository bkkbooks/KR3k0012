  - {type: variant, offset: 3655, length: 1321, content: 疾丘陵隄防必處其高陽而右背也堤者積土所背當處其陽而右之戰之便也此兵之利而地之助也故用兵之法高陵勿向也敵若據山陵依附險阻陳待敵勿輕攻趣也既地勢不便有損右之衝也背丘勿迎敵背丘陵為陣無有後患則當引置平地勿迎而擊之又曰上雨水水沬至欲渡者待其定恐半渡而水便漲也絕澗過天井天牢天羅天陷天郄去逆切大害必亟去之勿近也山也深大為絕澗四方高中央下為天井深水所居朦朧者為天牢四維絕人者為天羅地形陷者為天陷山澗夾地深數尺長數尺者謂之天郄也吾遠之敵近之吾迎之敵倍之也用兵常遠六害令敵近倍則利敵凶軍旁有險阻蔣潢井生葭葦小林翳薈鳥會反者必謹覆索之此伏姦之所藏處也險者一高一下之地阻者必水草也潢者池也井生葭葦者眾草所聚也小林者眾木所居也翳薈者所以屏蔽之處也衛公兵法曰軍馬行動須知次第出先右虞候馬軍為首次右虞候步軍次右軍馬軍次右軍步次前軍馬軍次前軍步軍次右軍馬軍次中軍步軍次右軍馬軍次右軍步軍次左軍馬軍次左軍步軍次左虞候馬軍次左虞候步軍其馬軍去步軍一二里外行每有高處即令三五騎馬於上立顧以候不虞以後餘軍准前立馬四顧右虞候既先發安營踏水道路脩理泥溺橋津檢行水草左虞候排比隊仗整齊軍次使不交雜若軍廻入先左虞候馬軍次左虞候步軍次左馬軍次左步軍其次第准前却轉其虞候軍職掌初發交換諸軍營各量虞候子並使排比依軍次行如此發引卒逢寇賊部伍甚易若零疊散行牽率難就萬一賊至並非所管又曰諸軍討伐例有數營發引逢賊首尾難救行引之時須先為方陣應行之兵分為四輜重為兩道引戰鋒等隊亦為兩道引其第一分初發輜重及戰鋒分為四道行兩行戶郎切下同輜重在心雙引兩行戰鋒隊並合各在輜重外左右夾雙引其次一分戰鋒隊與前般左右行戰鋒隊相當輜重隊與前行輜重隊相當又其次一分准上最後一分亦准上初發第一分別戰鋒輜重相當如其逢賊前分四行兩行輜重抽縮兩行戰鋒橫列作前面甚易其次兩分先作四行長引其戰鋒既在外便充兩面其後分亦先作四行其輜重進前其戰鋒隊橫列相接使充後面亦易其方陣立即可成如此發引縱使狹路急緩亦得成陣每軍戰鋒等隊須過本軍輜重尾輜重稠行戰鋒等隊稠引常令輜重併近前頭戰鋒隊相去十步下一隊輜重隊相去十步下一隊輜重隊相去兩步下一隊如此即須相裏得若逢川陸平坦彌加穩便其戰鋒輜重等隊分布使均又曰諸兵馬發行或逢泥溺或阻山河其路有須填補有須開拓左右虞候軍兵先多於軍取充虞候子右虞候先將此兵脩理橋梁泥濘開拓窄路左虞候排窄路捍後收拾闌遺諸兵士每下營訖先令兩隊共掘一廁又曰軍行沙磧鹹鹵之中有野馬黃羊蹤尋之有水鳥烏所集處有水地生葭葦蘆菼吐敢反菰蒲之處下有伏泉地有蟻壤之處下有伏泉太白陰經濟水具篇曰軍行過大水河渠溝澗無津梁舟筏難以濟渡太公以天艎天舡皆質朴不便於用令隨事逐物變化而用之以濟巨川又曰木甖以木縛甕為筏甕受二石力勝一人甕間闊五寸底以繩勾聯編槍於其上形長而方前置柭頭後置梢左右置棹又曰槍茷槍十根為一束力勝一人四千一百六十六根即為一筏皆去鑽刃以束為魚鱗以橫栝而縛之可渡四百一十六人為三筏計用槍一萬二千五百根率渡一千二百五十人十渡則一軍必濟又曰蒲筏以蒲九尺圍顛倒為束十道縛之似束鎗為筏量長短多少隨蒲豐儉無蒲亦用葦筏量大小以濟人又曰挾緪以善水者繼小繩先浮渡水次引大緪於兩岸立大橛急定緪使人挾緪浮渡大軍可為數十道又曰浮囊以渾脫羊皮吹氣令滿擊其孔束於腋下而浮渡, SBCK: 七}
