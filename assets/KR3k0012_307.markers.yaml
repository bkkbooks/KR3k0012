  - {type: variant, offset: 1282, length: 1381, content: 于祖告祖受成於學充兵謀也出征執有罪反釋奠於學以訊馘告周禮曰牙璋以起軍旅又曰類祭先出師告天祭也造祭將興兵造於先祖祭也穀梁曰甲午治兵出曰治兵習戰入曰振旅習戰也後漢書曰光武起王莽徵天下能為兵法者六十三家數百人並以為軍吏選練武衛招募猛士說文云慕廣求也旌旗輜重千里不絕時有長人巨無霸王莽連率韓愽上言有奇土長一丈大十圍自謂巨無霸出於蓬萊東南五城西北昭如海濱軺車不能載三馬不能勝臥則枕鼓以鐵箸食見前書長一丈大十圍以為壘尉鄭玄注周禮六軍壁三壘崔瑗中壘校尉箴曰堂堂皇帝設為壘尉尉者主壘壁之事又驅諸猛獸猛或作獷獷猛貌音古猛反虎豹犀象之屬以助威武自奏漢出師之盛未嘗有也又曰車駕東歸勑岑彭書曰兩城若下便可將兵南擊蜀虜人若不知足既平隴復望蜀每一發兵彭頭鬚為白又曰馬嚴拜將軍長史將北軍五校士羽林禁兵三千人屯西河美稷美稷縣名衛護南單于聽置司馬從事牧守謁敬同之將軍勑嚴過武庫祭𧈪尤武庫掌兵器令一人秩六百石前書音義曰𧈪尤古夫子好五兵故合祭之見高袒紀過帝親御阿閣阿曲觀其士眾時人榮之又曰馬成拜揚武將軍督誅虜將軍劉隆振威將軍宋登射聲校尉王賞發會稽丹陽九江六安四郡兵擊李憲時帝幸壽春設壇場祖禮遣之又曰涼部叛羌搖蕩四州朝廷憂之於是詔鄧騭將左右羽林北軍五校士及諸部兵擊之車駕幸平樂餞近又曰馬援出師詔百官祖道又曰光武籌赤眉必破長安欲乘舋并入關中而方自事山東未知所寄以鄧禹沉深有大度故授以西討之略乃拜為前將軍持節中分麾下精兵二萬人遣西入關令自選偏禆以下可與俱者晉書曰何曾正始中為鎮北將軍都督河北諸軍事假節將之鎮文帝使武帝齊王攸辭送數千里曾盛為賓主備太牢之饌侍從吏騶莫不醉飽又載記曰符堅以符融為鎮東大將軍代王猛為冀州牧融將發堅祖于霸東奏樂賦詩堅母茍氏以融少子甚愛之比發王至灞上其夕又竊如融所內外莫知是夜堅寢于前殿魏延上言天市南門屏內后妃星失明左右閽守不見后妃移動之象堅推問知之驚曰天道與人何其不遠遂重星官後魏書曰車駕南伐以劉藻為征虜將軍督統軍高聰等四軍為東道別將辭於洛水之南孝文曰與卿石頭相見藻對曰臣雖才非古人度亦不留賊虜而陛下輒當釃曲阿之酒以待百官帝大笑曰今未及曲阿且以河東數石賜卿後周書曰武帝保定四年冬十月甲子詔大將軍大冢宰晉國公護率軍伐齊帝於太廟庭授以斧鉞護總大軍出潼關大將軍權景宣率山南諸軍出豫州少師楊檦出枳關丁卯幸沙苑勞師三國典略曰侯景西逼梁湘東王遣晉州刺史蕭惠正率兵援于巴陵惠正辭以不堪舉天門郡守胡僧祐以自代王以為武猛將軍令其進發僧祐謂其子玘曰汝可開兩高門一朱一白吾當以死決之不捷不歸也王聞而壯之厚撫其家謂僧祐曰景便於陸道不閑水鬥賊若水戰但以大艦臨之自當必克若其步戰自可鼓棹直就巴丘不須交鋒又曰周遣常山郡公子謹率中山公宇文護大將軍楊忠等步騎五萬南伐太祖餞於青泥谷時庾信來聘未返太祖問之曰我遣此兵馬縛取湘東關西作博士卿以為得不信曰必得之後王勿以為不忠太祖笑而頷之白虎通曰王者之伐所以皮弁素幘何服皮弁素幘也王者將出辭於禰還假禰祖言辭反之禮尊親之義王制曰王者將出類于上帝宜于社造于禰尚書曰歸假于蓻祖出以告天至告祖也先告廟後告天者示不敢留尊者之命也告天何示不敢專也非出辭反面道也與宗廟異義還不復告天者天道質無內外故不復告也尚書言歸假于祖社不見告天知不告也又曰遣將軍必於廟何示不敢自專獨於祖廟何制法度者祖也王制曰受命于祖受成于學此言於祖廟命遣之也摯虞決疑要注曰古者帝王出征以齊車載遷廟之主及社主以行故尚書甘誓曰, SBCK: ''}
