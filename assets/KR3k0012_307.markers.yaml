  - {type: variant, offset: 2690, length: 0, content: '', SBCK: 擾左戰師李偉勸艾乗馬艾不從乃下車踞胡牀指麾處分賊以爲伏兵發也懼不敢進張瑁從左南縁河而絶其後秋軍乃退艾乗奔擊遂大敗之又曰陳敏一旦據有江東刑政無常不爲英俊所服且子弟凶􅁀所在爲患周玘顧榮之徒常懼禍敗遣使宻報征東}
