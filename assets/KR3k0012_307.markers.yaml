  - {type: variant, offset: 554, length: 302, content: 至河中凡二十七日上乃下詔褒美遷光祿大夫兼侍中初德宗欲罷兵燧不可請得一月蒭糧足以平河中至是果然矣又曰德宗幸奉天詔李晟與李懷光合軍拒朱泚時每將出合戰晟必自異衣錦裘繡帽於前親自指導懷光望見之乃謂晟曰將師當持重豈宜自裘飾以啗賊耶晟曰前久在涇源軍士頗相畏服故欲令其先識以奪其心耳懷光益不悅陰有異志兵遷延不進晟因入說懷光曰寇賊偷據天子行在近縣兵柄廟略屬在於公公宜以時速進晟願以所部得奉嚴令為公前驅雖死不悔懷光益拒之又曰史敬奉靈武人少事本軍為衙將元和十四年敬奉大破吐蕃於塩州城下賜實封五千戶先是西戎頻歲犯邊敬奉白節度使杜叔良請兵三千人備一月糧深入蕃界叔良以二千五百人授之敬奉既行十餘日人莫知其所向皆謂吐蕃盡殺之矣乃由他, SBCK: ''}
