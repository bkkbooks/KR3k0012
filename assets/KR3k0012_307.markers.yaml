  - {type: variant, offset: 2674, length: 1, content: 秦, SBCK: 予則孥戮汝又曰羲和湎淫廢時亂日胤徃征之告于衆曰羲和尸厥官昬迷于天象以干先王之誅今予奉將天罰火炎崐崗王石俱焚天吏逸德烈于猛火殱厥渠魁脅從罔治嗚呼威克厥愛允濟愛克厥威允罔功爾衆士懋戒哉欽承天子休命又曰魯侯伯禽宅曲阜徐夷並興東郊不開作費誓公曰差人無譁聽命善􅂖乃甲胃備乃弓矢鍜乃戈矛無敢不善峙乃糗糧峙乃蒭茭無敢不逮汝則有大刑魯人三郊三遂峙乃楨幹甲戌我惟築無敢不恭汝則有無餘刑刑者非一也又曰惟戊午王次于河朔次止也戊午渡河而誓旣誓而止于河之北羣后以師畢㑹諸侯盡㑹次也王乃徇師而誓曰嗚呼西土有衆咸聽朕言徇循也武王在西故稱西土今啇王受力行無度行無法度播棄􅀺老昵比罪人鮐背之者稱􅀺老棄不禮敬也昵近也罪人謂天下逋逃小人也予有亂臣十人同心同德言我治理之臣雖少而心德同也雖有周親不如仁人周至也紂至親雖多不若周家之少仁人也又曰武王伐紂曰今予發惟恭行天之罰今日之事不愆于六歩七歩乃止齊焉夫子勗哉不愆于四伐五伐六伐七伐乃止齊焉勗哉夫子尚􅁊􅁊如虎如􅆛如熊如羅于商郊弗迓克奔以役西土勗哉夫子爾所弗勗其于爾躬有戮又曰爾衆士同力王室史記曰太尉行令軍中曰爲吕氏右􅃝爲劉氏左􅃝軍中皆左祖後}
