  - {type: variant, offset: 2949, length: 0, content: '', SBCK: 毛法仁言聲壯大至於軍旅田狩唱呼處分振於山谷後周書曰李逺字萬歳㓜有器局志度恢然甞與羣兒爲戰􅋐之戯指麾部分便有軍陣之法郡守見而異之召使更戯羣兒懼而散走逺持杖叱之復爲向􅀔意氣雄壯殆甚於前郡守曰此小兒必爲將帥非常人也又曰建德中東伐齊帝引兵發京師壬寅渡河與諸軍合十二月戊申次於􅀳州恐王師卒至於城南穿壍自喬山屬於汾水庚戌帝諸軍八萬人置陣東西二十餘里帝乗常御馬從數人廵陣處分所至輙呼主帥姓名以慰勉之將士感見知之恩各自􅁬勵隋書曰李子雄從幸江都帝以仗衛不整顧子雄歩伍之子雄立指麾六軍肅然帝大恱曰公眞武侯才也尋轉右武􅀱大將軍唐書曰德宗時鄭權爲涇原節度使劉昌從事昌病亟請入覲度軍中必有變以權寛厚善容衆俾主留務旣而兵果爲亂權挺身於白刃中抗詞以明逆順因殺其首亂者數人士皆戢伏又曰昭宗時玉山都頭楊守信叶楊復恭稱兵闕下陣}
  - {type: page-break, offset: 2949, content: '', id: KR3k0012_SBCK_307-8a}
  - {type: variant, offset: 2949, length: 0, content: '', WYG: 毛法仁言聲壯大至於軍旅田狩唱呼處分震於山谷後周書曰李逺字萬嵗幼有噐局志度恢然嘗與羣兒為戰鬭之戲指麾部分便有軍陣之法郡守見而異之召使更戲羣兒懼而散走逺持杖比之復為向勢意氣雄壯殆甚於前郡守曰此小兒必為將帥非常人也又曰建徳中東伐齊帝引兵發京師壬寅渡河與諸軍合十二月戊申次於晉州恐王師卒至於城南穿塹自喬山屬於汾水庚戌帝諸軍八萬人置陳東西二十餘里帝乘常御馬從數人巡陣處分所至輙呼主帥姓名以慰勉之將士感見知之恩各自思勵隋書曰李子雄從幸江都帝以仗衛不整顧子雄歩伍之容子雄立指麾六軍肅然帝大恱曰公真武侯才也尋轉右武侯大將軍唐書曰徳宗時鄭權為涇原節度使劉昌從事昌病亟請入覲度軍中必有變以權寛厚善容衆俾主留務既而兵果為亂權挺身扵白刃中抗詞以明逆順因殺其首亂者數人士皆戢伏又曰昭宗時玉山都頭楊守信楊復恭稱兵闕下陣}
