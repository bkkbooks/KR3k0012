  - {type: variant, offset: 2676, length: 0, content: '', SBCK: 書曰齊武王伯􅂛旣破甄阜軍乃陳兵誓衆焚積聚破釜甑鼔行而前􅀳書曰元帝以祖逖爲􅁬威將軍豫州刺史給千人廪布三千疋不給鎧仗使自招慕仍將夲流徙部曲百餘家渡江中流擊檝而誓曰祖逖不能清中原而復濟者有如大江辭色壯烈衆皆􅁣歎屯于淮隂起冶鑄兵器得二千餘人而後進又載記曰王猛與慕容評戰陣於渭原而誓衆曰王景略受國厚恩任兼内外令與諸君深入賊地冝各勉進不可退也願戮力行間以報恩顧受爵明君之朝慶觴父母之室不亦美乎衆皆勇􅁬破釡棄糧大呼競進後周書曰太祖率李弼獨􅀌信等十二將東伐至潼􅀜太祖乃誓於師曰與爾有衆奉天威誅􅁀亂惟爾衆士整爾甲兵戒爾戎事無貪財以輕敵無暴民以作威用命則有賞不用命則有戮爾衆士其勉之遣于謹居軍前徇地唐書曰髙祖起義兵西圖􅀜中精甲三萬髙祖杖白旗誓衆於太原之野引師即路又曰太宗征王丗充陳兵穀水之上歩􅀐五萬太宗舉麾誓衆曰隋室無道毒􅀍蒼生我國家受命于天寜濟億兆丗充敢抗大􅀖數行侵􅁀誅殺良善恣其淫酷國家爲百姓除害事不􅀗巳各冝整尓軍旅脩尓器械立勲立効龔行天罰敢有犯命者斬無赦又曰朱泚反韋臯於隴州築壇于庭血牲與將士等盟曰上天不弔國家多難逆臣乗間盗據皇宫而李楚琳亦扇兇徒傾䧟城邑酷虐所加爰}
