  - {type: variant, offset: 283, length: 3, content: 更始郾, SBCK: 章和二年護羗校尉張紆誘誅燒當種羗迷吾等由是諸羗大怒謀欲報怨朝􅋝憂之公卿舉鄧訓代紆爲校尉諸羗激忿遂相與解仇結㛰交質盟詛鄭􅀇注周禮云大事曰盟小事曰詛衆四萬餘人期冰合渡河攻訓又曰呉漢爲安樂令㑹}
