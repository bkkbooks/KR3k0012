  - {type: variant, offset: 2742, length: 2, content: 強膂, SBCK: 虞及味苦杜仲吴氏本草曰杜仲一名木綿一名思仲黄􅂄秦州記曰隴西襄武縣出黄􅂄本草經曰黄􅂄味甘微温生山谷黄連廣雅曰王連黄連也范子計然曰黄連出蜀都黄肥堅者善神仙傳曰封君逹服黄連五十餘年入鳥䑕山服練水銀百餘􅀊常􅀐青牛行民間有疾病者不問識與不識皆與藥即差又曰黒穴公服黄連得仙名山記曰扶容石草多黄連湘州記曰邵陵夫夷縣衡山岀黄連永嘉記曰松陽縣草有黄連覆地土人取者必禱祠􅀂失神意則化爲異物本草經曰黄連一名王連味苦寒生川谷治􅀬氣目痛皆傷泣岀明目生巫陽吴氏本草曰黄連神農歧伯黄帝雷公苦無毒李氏小寒或生蜀郡太山之陽防巳范子計然曰防巳岀漢中旬陽本草經曰防巳一名石解味辛平無毒治風寒温瘧熱氣通湊理利九竅生漢中呉氏本草經曰木防巳一名解離一名解燕神農辛黄帝歧伯桐君苦無毒李氏大寒如葛莖蔓延如芃白根外黄似桔梗内黒文如車輻解二月八月十月採葉根王不留行本草經曰王不留行味苦平生山谷乆服輕身能老生太山崔寔四民月令曰八月采王不留行丗􅀃曰衛江州在尋陽劉孝標注云衛展爲江州刺史有知舊人投之都不料理唯餉王不留行一斤此人得餉命駕呉氏本草經曰王不留行一名王不流行}
