  - {type: variant, offset: 1407, length: 1134, content: 同契曰冶葛巴豆一兩入喉雖周文兆著孔丘占相扁鵲操鍼巫咸叩鼓安能蘇之唐書曰袁恕己與敬暉等累被貶黜流于環州尋周利用左右逼令飲野葛汁數升不死因擊殺之恕己素服黃金故毒藥不發博物志曰魏武習啖冶葛至一尺亦多飲酖近世事相傳云又曰鉤吻草與堇菜相似南州異物志曰廣州俚賊若鄉里負其家債不時還者子弟便取冶葛一名鉤肳數寸許到債家門食鉤肳而死其家稱怨誣債家殺之債家慚懼以財物辭謝多數十倍死家便收尸去不以為恨述異記曰晉義熙中有劉遁者居江陵忽有鬼來遁宅上遁貧無竈以升鎗煮飯飯欲熟輒失之尋覔於籬下草中但得餘空鎗遁密市冶葛煮以作麋鬼復竊之於屋北得鎗仍聞吐聲從此寂絕桓譚新論曰余與劉子駿言養性無益其兄子伯玉曰天生殺人藥必有生人藥也余曰鉤吻不與人相宜故食則死非為殺人生也譬若巴豆毒魚礜石賊鼠桂害獺杏核殺狗天非故為作也論衡曰萬物含太陽者有毒在草為巴豆冶葛抱朴子曰中經曰鉤吻狼毒太陰之精氣主殺故入口令人死葛洪方曰鉤吻與食芹相似而生處無他草其莖有毛誤食之殺人本草經曰鉤吻一名野葛味辛溫生山谷主治金瘡中惡風欬逆上氣水腫殺蠱毒鬼注吳氏本草曰秦鉤吻一名毒根一名野葛神農辛雷公有毒殺人生南越山或益州葉如葛赤莖大如箭方根黃或生會稽東治正月採嶺表錄異曰野葛毒草也俗呼胡蔓草誤食之則用羊血漿解之或說此草蔓生葉如蘭香光而厚寘毒多著於生葉中不得藥解半日輒死山羊食其苗則肥而大芎藭春秋左傳宣公下曰楚師伐蕭還無社與司馬卯言號申叔展曰有山芎藭乎杜預注芎藭所以禦濕欲使無社逃泥水中說文曰芎藭香草也山海經注曰號山洞庭之山其草多芎藭郭璞注曰芎一名江籬吳錄地志曰臨海縣有江籬草海水中正青如亂髮乾獻之亦鹽藏其汁名為濡酪楚辭所云籬是也范子計然曰芎藭生洽無枯者善遊名山志曰撗山諸小草多芎藭本草經曰芎藭味辛溫治中風入頭腦痛寒痺生武功吳氏本草曰芎藭一名香果神農黃帝歧伯雷公辛無毒香扁鵲酸無毒季氏生溫中熟寒或生胡無桃山陰或斜谷西嶺或太山葉香細青黑文赤如藁本冬夏藂生五月華赤七月實黑端兩葉三月採根根有節似如馬衘狀澤瀉典術曰食澤瀉身輕日行五百里走水上可遊無窮致玉女神仙一名澤之升麻廣雅曰周升麻升麻也本草經曰升麻一名周升麻味甘辛生山谷治辟百毒殺百老殃鬼辟溫疾鄣稚毒蠱久服不夭生益州華陽國志曰牧麻縣出好升麻吳氏本草曰升麻神農甘芍藥山海經曰條谷之草多芍藥洞庭之上多芍藥毛詩溱洧曰唯士與女伊其相謔贈之以芍藥毛詩香草也詩義䟽曰今芍藥子無香氣非是也未審今何草司馬相如賦云芍藥之和揚雄賦曰甘甜之和芍藥之美然芍藥又入食也廣雅曰黑攣夷芍藥也晉宮閣名曰暉章殿前芍藥華六畦范子計然曰芍藥出三輔建康記曰建康出芍藥極精好本草經曰芍藥味苦辛生川谷主治邪氣腹痛除血痺破堅積寒熱瘕止痛吳氏本草曰一名其積一名解倉一名誕一名餘容一名白朮神農苦桐君甘無毒歧伯鹹李氏小雷公酸二月三月生澤蘭廣雅曰虎蘭澤蘭, SBCK: ''}
