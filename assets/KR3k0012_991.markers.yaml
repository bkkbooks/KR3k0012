  - {type: variant, offset: 2753, length: 0, content: '', SBCK: 苦小温無毒李氏温或生上黨葉青厚兩兩相當七月花白九月實黒七月九月十月採驢馬食仙去閭茹建康記曰建康出草盧茹范子計然曰閭茹出武都黄色者善本草經曰閭茹味辛寒生川谷治蝕惡􅁏敗瘡死肌仍殺疥蟲除大風生代郡吴氏本草經曰閭茹一名離樓一名屈居神農辛歧伯酸鹹有毒季氏大寒二月採葉貟黄高四五尺葉四四相當四月華黄五月實黒根黄有汁亦同黄三月五月採根黒頭者良漏盧本草經曰漏盧一名野蘭委萎爾雅曰熒委萎郭璞注曰藥草也葉似竹大者如箭竿有葉狹而長表自裏青根大如指長一二尺可啖吴氏本草經曰委萎一名葳㽔一名王馬一名節地一名蟲蟬一名烏萎一名熒一名玉竹神農苦一經甘桐君}
