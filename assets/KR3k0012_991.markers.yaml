  - {type: variant, offset: 2747, length: 0, content: '', SBCK: 平歧伯雷公甘三月八月採徐長卿本草經曰徐長卿一名􅀑督郵味辛温生山谷治鬼物百精蠱毒疾疫邪氣温􅀑乆服強悍輕身生太山吴氏本草曰徐長卿一名石下長卿神農雷公辛或生隴西三月採奄閭本草經曰奄閭味苦微寒生川谷治風寒濕痺身體諸痛乆服輕身不老生雍州呉氏本草經曰奄閭神農雷公}
