  - {type: variant, offset: 2684, length: 0, content: '', SBCK: 壯􅂪苦寒無毒治心腹積聚寒熱邪氣利大便通九竅生河西及􅁈句治牛病生林陽建康記曰建康縣岀紫參范子計然曰紫參出三輔赤青色者善苦參本草經曰苦參一名水槐茱茰西京雜記曰漢武帝宫人賈佩蘭云在宫時九月九日佩茱茰飲菊花酒令人長壽地理志曰九月九日爲絲茱茰嚢戴之臂上風土記曰俗上九月九日謂爲上九茱茰到此日氣烈熟色赤可折茱茰囊以挿頭云辟惡氣禦冬續齊諧記曰汝南桓景隨費長房遊學累年房謂之曰九月九日汝家有災厄冝令急去家人各作絳囊盛茱茰以繫臂上登髙飲菊花酒此禍可消景如言舉家登髙山夕還見鷄犬牛羊一時暴死房聞之曰此代矣今世人毎至此日登髙山飲酒戴茱茰囊是也唐廣古今五行記曰晉懷帝時無錫縣有四株茱茰樹生狀􅀂連理郭璞卜云延陵有鼴䑕後當有㧞樹儻有此東南數}
