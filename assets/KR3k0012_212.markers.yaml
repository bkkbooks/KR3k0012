  - {type: variant, offset: 181, length: 0, content: '', WYG: 試對政事天文道術以高第者補之由是酺對第一拜尚書又曰魏朗字少英入為尚書再升紫微謇諤禁省不屈豪右為百寮所服以黨事免朗性矜嚴閉門整法長吏希見動有禮序室家相待如賓子孫如事嚴君焉又曰蔡邕字伯喈以侍書御史遷尚書三月之間周厯三臺又曰鍾離意字子阿明帝徴為尚書交阯太守坐贜伏法以資物簿入大司農詔頒賜群臣意得珠璣悉以委地而不拜帝怪問其故對曰臣聞孔子忍渇於盗泉之水曽參囬車於勝母之鄉惡其名也贜穢之寳不敢拜帝}
  - {type: page-break, offset: 181, content: '', id: KR3k0012_WYG_212-4a, image: WYG0894/WYG0894-0835c.png}
