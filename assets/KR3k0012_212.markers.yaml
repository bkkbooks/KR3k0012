  - {type: variant, offset: 1845, length: 345, content: 榻曾經先王坐順即哽塞涕泗交流久而不能言遂令換之又曰陽平王新成之子欽字思若累遷尚書右僕射欽色黑故時人號為黑面僕射三國典略曰東魏以孫騰兼尚書左僕射府庫關鑰一以委之又曰北齊王晉明豪侈有氣俠留心經史招引賓客嘗為尚書右僕射百餘日便謝病而退告人云廢人飲酒安能作刀筆吏披故紙乎北齊書曰高隆之為尚書右僕射時初給民田貴勢皆占良美貧弱咸受塉薄隆之啟高祖悉更反易乃得均平後周書曰周惠達為右僕射自關右草創禮樂𡙇然惠達與禮官損益舊章至是儀軌稍備魏文帝因朝奏樂顧謂惠達曰此卿之功也又曰李遠除尚書左僕射遠白太祖曰遠秦隴匹夫才藝俱闕平生念望不過一郡守耳遭逢際會得奉聖明主貴臣遷以至於此今位居上列爵邁通侯受委方面生殺在手非直榮寵一時亦足光華身世但尚書僕射任居端揆今以賜授適所以重其罪責明主若欲全之乞寢此授太祖曰公勳德兼美朝廷, SBCK: 杯}
