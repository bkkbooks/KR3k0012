  - {type: variant, offset: 3390, length: 0, content: '', SBCK: 􅀇宗欲以牛仙客爲尚書張九齡諫曰不可尚書古之納言有唐已來多用舊相居之不然歷踐内外清貫之地妙有德望者充之仙客夲河湟一使典耳㧋昇清流齒班常伯此官邪也益部􅂄舊傳曰太尉李固薦楊淮累世服事臺閣旣閑練舊典且有幹用冝在機密特拜尚書固薨免官尚書令陳蕃表行􅃺復徴爲尚書會稽典録曰鄭􅀪拜尚書舊典科郎滿􅀘縣長令史爲丞尉􅀪奏以爲臺職位尊而賞薄人無樂者請使郎􅀘縣令史為長上從其議}
  - {type: page-break, offset: 3390, content: '', id: KR3k0012_SBCK_212-5b}
  - {type: variant, offset: 3390, length: 0, content: '', WYG: 𤣥宗欲以牛仙客為尚書張九齡諫曰不可尚書古之納言有唐已来多用舊相居之不然厯踐内外清貴之地妙有徳望者充之仙客本河湟一使典耳拔昇清流齒班常伯此官邪也益都耆舊傳曰太尉李固薦楊淮累世服事臺閣既嫻練舊典且有幹用宜在機密特拜尚書固薨免官尚書令陳蕃表行状復徴為尚書㑹稽典録曰鄭𢎞拜尚書舊典科郎滿補縣長令史為丞尉𢎞奏以為臺職位尊而賞薄人無樂者請使即補縣令史上從其議}
  - {type: page-break, offset: 3390, content: '', id: KR3k0012_WYG_212-9a, image: WYG0894/WYG0894-0838a.png}
  - {type: variant, offset: 3390, length: 0, content: '', krp: 玄宗欲以牛仙客爲尚書張九齡諫曰不可尚書古之納言有唐已來多用舊相居之不然歷踐内外清貫之地妙有德望者充之仙客夲河湟一使典耳㧋昇清流齒班常伯此官邪也益部耆舊傳曰太尉李固薦楊淮累世服事臺閣旣閑練舊典且有幹用冝在機密特拜尚書固薨免官尚書令陳蕃表行狀復徴爲尚書會稽典録曰鄭弘拜尚書舊典科郎滿𥙷縣長令史爲丞尉弘奏以爲臺職位尊而賞薄人無樂者請使郎𥙷縣令史為長上從其議}
