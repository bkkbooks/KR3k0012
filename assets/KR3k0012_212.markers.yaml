  - {type: variant, offset: 2657, length: 267, content: 所從來荅曰聖曆中王及善豆盧欽望同日拜文昌左右丞亦同此儀當時以說方承恩寵不敢復詰因為故事非舊典也均交結權倖而得貴位在班列嘗踰位而立御史中丞盧坦請退之均不受坦曰姚南仲為僕射例如此曰南仲何人坦曰南仲是守正而不交權倖者也尋罷坦為右庶子時人歸咎於均又曰寶歷中左僕射李絳與御史中丞王璠相遇於道璠車不為之却因上言故事云左右僕射師長庶寮開元中以為左右丞相其後雖去三事機務猶揔百司之權表狀之中不署其姓尚書巳下每月合衙上日百寮列班宰相送上中丞御史列位於庭禮數之崇中外特異所以自武德貞觀巳來聖君賢臣布政除弊不革此禮謂為合宜茍有不安尋亦合廢近年緣有才不當職恩, SBCK: 明斷厚}
