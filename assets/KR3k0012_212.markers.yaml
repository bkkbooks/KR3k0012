  - {type: variant, offset: 3480, length: 0, content: '', WYG: 摠桓子新論曰昔堯試舜於大麓麓者領録天下事如今之尚書官矣宜得大賢}
  - {type: variant, offset: 3481, length: 0, content: '', WYG: 乃可使處議持平王昶考課事曰尚書侍中考課一曰掌建六材以考官人二曰綜理萬幾以考庶績三曰進視惟允以考讜言四曰出納王命以考典}
  - {type: variant, offset: 3482, length: 1, content: 事, WYG: 五曰罰法以考典刑應璩書曰知楊生翻然遂登納言雖有所越亦其宜也傅説弃版築而為殷相吕望投竿而為周師卓茂起閭里而為漢宰若此翁者乃竒才耳璅璅尚書執憲之吏曷以為異哉太平御覽卷二百一十二}
