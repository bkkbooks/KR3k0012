  - {type: variant, offset: 2925, length: 461, content: 特拜者遂從權便不用舊儀酌於群情事實非當今或有僕射初除就中丞院門相見者即與就參何殊或中丞新授亦無見僕射之處又參賀處或僕射先至中丞後來憲度乖宜尊卑倒置儻人才忝位自合別授賢良若朝命守官豈得有虧法制伏望下百寮重詳定事體使永可遵行奉勑宜令左右常侍諫議大夫給事中中書舍人詳議聞奏元和中太常愽士韋謙舉奏削去舊儀今絳上論於體甚當然其時璠黨方盛致絳改官共寢其儀又曰李程大和中為左僕射中謝日奏曰臣所忝官上禮前後儀注不同在元和長慶中僕射數人上日不受四品巳下官拜近日再定儀注四品巳下官悉許受拜王涯竇易直巳行之於前今御史云巳聞奏太常寺定取十五日上臣進退未知所據時中丞李漢以為受四品巳下拜太重勑曰僕射上儀近巳詳定所緣拜禮皆約令文巳經施行不合更改宜准大和四年十一月十六日勑處分鍾離意別傳曰意為尚書僕射其年匈奴來降詔賜縑三百疋尚書侍郎暨酆受詔誤以三千疋賜匈奴詔大怒鞭酆欲死意獨排省閤入諫明帝以合大義恚損怒消帝謂意曰非鍾離尚書朕幾降威於此郎世說曰周伯仁過江積年恒大飲酒嘗經三日醒時人謂為三日僕射唐書官品志曰僕射為執法置二則為左右僕射皆與令同左糺彈而右不糺彈, SBCK: 勞賞焉}
