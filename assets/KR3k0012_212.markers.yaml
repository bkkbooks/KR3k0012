  - {type: variant, offset: 301, length: 346, content: 還主者奏呈文書詔曰朕省與僕射何異竟不視又曰文帝時欲以賈詡為僕射詡曰尚書僕射官之師長天下所望詡名不素重非以服人詡縱昧於榮利奈國朝何魏略曰李豐字安國為侍中僕射在臺閣常多託疾時臺制滿百日當解祿豐未滿百日蹔起巳而復臥如是數歲及太傅宣王久病曹爽攝政豐依違二公間故時人有謗書曰曹爽之勢熱如湯太傅父子冷如漿李豐兄弟如遊光其意以為豐雖外示清凈而內圖事有似遊光吳志曰諸葛恪既定山越孫權使尚書僕射薛綜勞軍曰故遣中臺近官迎致犒賜晉書曰荀顗代陳泰為僕射吏部四辭而後受又曰太康元年以山濤清虛恬簡轉為左僕射又曰魏舒太康初拜右僕射舒與衛瓘山濤張華等以六合混一宜同古典封禪東岳前後累陳其事帝謙讓不許晉起居注曰武帝太康四年詔曰吏部掌敘人倫治化之本也宜得忠正舊德尚書右僕射魏舒寬泰弘毅潛通有才識其以舒為左右僕射領選曹又曰永昌元年, SBCK: ''}
