  - {type: variant, offset: 181, length: 0, content: '', krp: 試對政事天文道術以髙第者𥙷之由是酺對第一拜尚書又曰魏朗字少英入爲尚書再升紫微謇諤禁省不屈豪右爲百寮所服以黨事免朗性矜嚴閉門整法長吏希見動有禮序室家相待如賔子孫如事嚴君焉又曰蔡邕字伯喈以持書御史遷尚書三月之間周歷三臺又曰鍾離意字子阿明帝徴爲尚書交阯太守坐贓伏法以資物簿入大司農詔頒賜羣臣意得珠璣悉以委地而不拜帝恠問其故對曰臣聞孔子忍渴於盗泉之水曾參廻車於勝母之郷惡其名也贓穢之寳不敢拜帝}
