  - {type: variant, offset: 188, length: 3, content: 履聲續, SBCK: 首歳朝梁兾帶劒入省陵叱兾令出勑虎賁奪其劒兾跪謝陵劾之詔以歳俸贖罪百寮肅然兾弟不疑曾舉陵後疾兾不疑謂曰昔舉君所以自罰也陵曰明府不以陵不肖誤見擢序令申公憲非報私恩耳不疑有慙色又曰翟酺字子廣爲侍中時尚書有缺詔將軍大夫六百石以上試對政事天文道術以髙第者􅀘之由是酺對第一拜尚書又曰魏朗字少英入爲尚書再升紫微謇諤禁省不屈豪右爲百寮所服以黨事免朗性矜嚴閉門整法長吏希見動有禮序室家相待如賔子孫如事嚴君焉又曰蔡邕字伯喈以持書御史遷尚書三月之間周歷三臺又曰鍾離意字子阿明帝徴爲尚書交阯太守坐贓伏法以資物簿入大司農詔頒賜羣臣意得珠璣悉以委地而不拜帝恠問其故對曰臣聞孔子忍渴於盗泉之水曾參廻車於勝母之郷惡其名也贓穢之寳不敢拜帝􅀏曰清乎尚書賜錢三十万又曰荀緄字伯條拜尚書緄性明亮敏於衆職以勗羣寮秉機平正直而行之是時内外公卿大夫莫不敬憚焉又曰韋彪上䟽曰欲急丗所務當先除其患其源在尚書尚書典樞機天下事一决之不可不察}
