  - {type: variant, offset: 177, length: 0, content: '', krp: 奏乆病滿百日請輙免有詔賜金帛醫藥又曰張陵字處仲爲尚書首歳朝梁兾帶劒入省陵叱兾令出勑虎賁奪其劒兾跪謝陵劾之詔以歳俸贖罪百寮肅然兾弟不疑曾舉陵後疾兾不疑謂曰昔舉君所以自罰也陵曰明府不以陵不肖誤}
  - {type: variant, offset: 178, length: 2, content: 諫諍, WYG: 擢序陵申公憲非報私恩耳不疑有慙色又曰翟酺字子廣為侍中時尚書有缺詔將軍大夫六百石以}
  - {type: variant, offset: 178, length: 2, content: 諫諍, krp: 擢序令申公憲非報私恩耳不疑有慙色又曰翟酺字子廣爲侍中時尚書有缺詔將軍大夫六百石以}
