  - {type: variant, offset: 174, length: 3, content: 僕射數, WYG: 首嵗朝梁冀帶劍入省陵叱冀令出勅虎賁奪其劔冀跪謝陵劾之詔以嵗奉贖罪百寮肅然冀弟不疑曽舉陵後疾冀不疑謂曰昔舉君所以自罰也陵曰明府不以陵不肖誤}
