  - {type: variant, offset: 1524, length: 1, content: 紫, SBCK: 梅杏羅生栢梁臺太官令曰柤}
  - {type: variant, offset: 1524, length: 0, content: '', WYG: 梅杏羅生栢梁臺太官令曰柤棃橘栗李桃梅張恊七命曰燀以秋橙酢以春梅接以商王之箸承以帝辛之盃石榴廣雅曰若榴石榴也晉隆安起居注曰武陵臨沅縣安石榴子大如椀其味不酸一蔕六實宋書曰元嘉末魏太武征彭城遣使求丼蔗安石榴張暢曰石榴出自鄴下亦當非彼所乏北史曰齊安徳王延宗納趙郡李祖收女為妃後帝幸李宅宴而妃母宋氏薦二石榴帝前問諸人莫知其意帝投之問魏收曰此竟何意收曰石榴房中多子王新婚妃母欲子孫衆多帝大喜詔收卿返将來仍賜羙錦二疋唐書曰孔紹安大業末為監察御史時髙祖為隋討賊於河東詔紹安監髙祖之軍深見遇及髙祖受禪紹安自洛陽間行奔髙祖見之甚恱拜内史舍人時夏侯端亦嘗為御史監髙祖軍先紹安歸朝授秘書監紹安因侍宴應詔詠石榴詩曰祗為來朝晚開花不及春時人稱之神仙傳曰劉馮者沛人也封桑郷侯學道於樓丘子常服石桂英及中岳石榴垂四百年如十五㓜童瀬郷記曰老子祠堂北有石榴二株鄴中記曰石虎苑中有安石榴子大如椀盞其味不酸廬山記曰香爐峰頂有大盤石可坐數百人石垂生山石榴三月中作花色似石榴而小淡紅敷}
  - {type: page-break, offset: 1524, content: '', id: KR3k0012_WYG_970-6b, image: WYG0901/WYG0901-0535d.png}
