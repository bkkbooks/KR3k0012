  - {type: variant, offset: 1529, length: 1, content: 齊, WYG: 安石榴賦曰實有嘉木名安石榴修條外暢榮幹内樛丹輝綴於朱房緗的㸃於紅鬚煌煌煒煒熠耀委累似琉璃之栖鄧林若珊瑚之暎緑水光眀燐爛含丹耀紫味滋芳神色麗瓊蘂潘尼安石榴賦曰石榴者天下之竒樹九州之名果也是以屬文之士或叙而賦之遥而望之煥若隨珠耀重淵詳而察之灼若列㝛出雲間千房同柯十子如一繽紛磊落垂光耀質左思呉}
