  - {type: variant, offset: 1793, length: 487, content: 色中高百丈敷張自輔葉長七尺五色實長九尺無核割之如凝蜜張茂先注曰柦梨述異記曰江淮南人至北見榲勃香以為柦子蓋實異耳傅玄瓜賦曰龍眼生於南極甘樝引於崑山櫻桃禮記月令曰仲夏之月天子羞以含桃先薦寢廟鄭玄注曰含桃今之櫻桃也爾雅曰楔音革黠反荊桃郭璞注曰今櫻桃廣雅曰含桃櫻桃漢書曰惠帝出離宮叔孫通曰今櫻桃熟可獻陛下宜以櫻桃獻宗廟上許之諸菓獻由此興唐書曰太宗將致櫻桃於酅公稱奉則以尊言賜又以卑問之虞監曰昔梁帝遺齊巴陵王稱餉遂從之又曰玄宗紫宸殿櫻桃熟命百官口摘之又曰蕭潁士李林甫採其名欲拔用之乃召見時潁士寓居母喪即縗麻而詣京師徑謁林甫於政事省林甫素不識遽見縗麻大惡之即令斥去潁士大忿乃為伐櫻桃賦以剌林甫云擢無庸之瑣質因本枝而自庇洎枝榦而非據專階廷之右地雖先寢而或薦豈和羹之正味其狂率不遜皆此類也又曰文宗始即位嘗因內園進新櫻桃將以賜三宮太后上曰送太后焉可以為賜因援筆易其文簿曰奉太后自是以為常拾遺錄曰漢明帝於月夜讌賜群臣櫻桃盛以赤瑛盤群臣視之月下以為空盤帝笑之呂氏春秋曰仲夏之月羞含桃高誘注曰含桃櫻桃為鳥所含故曰含桃范汪祠制曰孟夏祭用櫻桃洛陽宮殿簿曰顯陽殿前櫻桃六株明光殿前櫻桃四株徽音殿前櫻桃二株, SBCK: 緑㮏花緑}
