  - {type: variant, offset: 1524, length: 1, content: 紫, krp: 梅杏羅生栢梁臺太官令曰柤}
  - {type: variant, offset: 1525, length: 3, content: 梨津潤, WYG: 蕚輝􅁮可愛襄國記曰龍崗縣有好石榴慱物志曰張騫使西域返得安石榴廣志曰安石榴有甜酸二種陸機與弟雲書曰張騫為漢使外國十八年得塗林安石榴也李龍徳陽殿賦曰蒲桃安若曼延䝉蘢應吉甫安石榴賦曰余徃日為中書直廬上有安石榴枝葉甚荗故為之賦傳𤣥安石榴賦曰鳥㝛中而纎條結龍辰升而丹華繁其在晨也灼若旭日栖扶桑其在夕也赩若燭龍吐潜光庾儵若石榴賦曰逺而望之燠若摛繢被山阿廹而察之赫若龍輝耀緑波夏侯孝若石榴賦曰接翠蕚於緑蔕冐紅牙於丹鬚赩然含㽔璀爾散珠雪酲觧䬼怡神實氣潘岳閒居賦曰石榴蒲桃之珍磊落蔓延於其側}
  - {type: page-break, offset: 1525, content: '', id: KR3k0012_WYG_970-8a, image: WYG0901/WYG0901-0536c.png}
