  - {type: variant, offset: 1675, length: 0, content: '', krp: 成帝杜皇后崩先是三吴女子相與簮白花望之如素㮏傳言天公織女死爲之着服至是而后崩三國典略曰楊愔一門四世同居家甚隆盛昆弟就學三十餘人庭有㮏樹實落于地羣兒咸争愔獨坐不顧季父暐見之謂賔客曰此兒恬𥙿有我風蕭廣濟孝子傳曰王祥後母庭有㮏樹始着子使守視祥晝駈鳥雀夜則驚䑕時雨忽至祥抱樹至曙母見惻然紫虗南岳夫人傳曰夫人姓魏名華存性樂神仙季冬夜半有四真人並年可二十降夫人靖室因設酒饌陳玄雲紫㮏夫人還王屋}
