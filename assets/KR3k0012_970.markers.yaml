  - {type: variant, offset: 1526, length: 3, content: 津潤又, SBCK: 橘栗李桃梅張恊七命曰燀音闡以秋橙酢以春梅接以啇王之箸承以帝辛之盃石榴廣雅曰􅀂榴石榴也晉隆安起居注曰武陵臨沅縣安石榴子大如椀其味不酸一蔕六實宋書曰元嘉末魏太武征彭城遣使求甘蔗安石榴張暢曰石榴岀自鄴下亦當非彼所乏北史曰}
