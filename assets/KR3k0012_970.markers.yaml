  - {type: variant, offset: 1582, length: 1, content: 梨, krp: 蒲桃亂潰若榴竟裂張載重作石榴賦曰於是天廻節移龍火西夕流風晨激行露朝白紫房獨熟頳膚自坼剖之}
  - {type: variant, offset: 1584, length: 0, content: '', SBCK: 珠散含之則氷釋充嘉味於庖籠極酸甜之滋液上薦清廟之靈下羞玉堂之客張恊安石榴賦曰乃剖乃折金房緗隔范堅安石榴賦曰紅􅂡肉艷頳牙外摽似華燈之映翠幕􅀂丹瓊之厠碧瑶殷元安石榴賦曰余以暇日散愁翰林覩潘張􅀂榴二賦雖有其羙猶不盡善客復措辝故聊爲之賦曰或珠離於琁琬或玉碎於雕觴璘彬洒暎曄紫嬰緗璀􅀂瑶英之攅鍾巘粲􅀂靈􅑕之含珠璫徐藻妻陳氏石榴賦曰惟木之珎莫羙石榴擢鮮葩於青春結芳實於素秋王倫妻羊氏安石榴賦曰振緑葉於柔柯垂彤子之累衰張載詩曰}
