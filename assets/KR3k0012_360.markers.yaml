  - {type: variant, offset: 742, length: 128, content: 剽刃國出桐華布珂珠貝艾香雞舌香傅玄樂府豫章行曰輕裘綴孔翠明珂曜珊瑚張華輕薄篇曰文軒樹羽蓋乘馬佩玉珂韉隋書曰宇文述素好著奇服炫燿時人雲定興為製馬韉於後角上缺方三寸以露白色世輕薄者爭放學之謂為許公缺勢又遇天寒定興曰宿衛必當耳冷述曰然乃製裌頭巾令深袹音陌耳又學之, SBCK: 長沙桓王}
