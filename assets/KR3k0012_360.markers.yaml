  - {type: variant, offset: 967, length: 19, content: 千里馬生羆皮鄣泥獻于南燕燕王超大悅荅以, SBCK: 然曰其母居伊}
  - {type: variant, offset: 967, length: 0, content: '', WYG: 然曰其母居伊水之上孕夢有神告之曰臼出水而東走毋顧明日視臼水告其隣東走十里而顧其邑盡為水身因化為空桑淮南子曰孕婦見兎其子缺脣見麋其子必四目帝王世記曰庖犧氏風姓也母曰華胥燧人之代有大迹出雷澤胥履之生庖犧又曰帝堯陶唐氏祁姓也母曰慶都孕十四月而生堯於丹陵名曰放勛遁甲開山圖榮氏解曰女狄暮汲於石紐山下大祠前水中得月精如雞子愛而含之不覺而吞遂有身十四月而生夏禹括地圖曰大人國其民孕三十六年而生兒生兒長大能乘雲盖龍類去㑹稽四萬六}
