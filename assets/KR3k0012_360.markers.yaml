  - {type: variant, offset: 3870, length: 1, content: 丈, SBCK: 任者文王之母性專一及其有身目不視惡色耳不聽惡聲口不出惡言以胎教也㑹稽先賢傳曰吴侍中闞澤字德潤在母胞八月叱聲震外蜀郡記曰諸山夷獠子任七月生生時必臨水兒出便􅄬水中浮則取養沉乃弃之華他别傳曰甘陵相}
