  - {type: 'tls:seg', offset: 1010, content: '', id: KR3k0012_CHANT_360-17a.9}
  - {type: variant, offset: 1012, length: 411, content: 水終不肯渡王云此必是惜彰泥使人解去便徑度防汗東觀記曰和帝永元三年西謁園陵桓郁兼羽林中郎將從賜馬二疋并鞍勒防汗魏百官名曰黃地金鏤織成萬歲鄣泥一具又織成防汗一具桓寬鹽鐵論曰古者庶人賤騎繩控草鞮皮薦而已及其後革鞍攻成鐵鑣不飾令富者黃金琅勒罽繡弇汗弇音奄司馬彪戰略曰孟達將蜀兵數百降魏魏文帝以達為新城太守太和元年諸葛亮從成都到漢中達又欲應亮遺亮玉玦織成鄣汗蘇合香亮使郭摸詐降過魏興太守申儀與達有隙摸語儀亮言玉玦者已決織成者言謀已成蘇合香者言事已合當胸後漢書曰太守趙興署鮑永功曹時有矯稱侍中止傳舍者興欲謁之永疑其詐諫不聽出興遂駕往永乃拔佩刀截馬當胸乃止當胸以韋為之也後數日莽詔書果下捕矯稱者永由是知名鞙尾服虔通俗文曰馬鞻音樓尾曰鞙胡畎切魏百官名曰赤茸鍮石鞙尾一具鞭禮記曰獻車馬者執筴綏又曰君車將駕則僕立於馬前已駕僕展軨鄭玄曰展軨具視効駕白已駕也奮衣由右上取貳綏奮振去塵也貳副也執筴分轡驅之五步而立左傳曰晉公子重耳之及於難也及楚楚子享, SBCK: 神告}
