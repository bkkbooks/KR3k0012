  - {type: variant, offset: 1422, length: 117, content: 享之曰公子若反晉國則何以報不穀對曰若以君之靈得反晉國晉楚治兵遇於中原其避君三舍若不獲命其左執鞭弭右屬橐鞬以與君周旋又曰宋告急於晉伯宗曰不可雖鞭之長不及馬腹又曰楚靈王使圉徐以懼吳楚子次于乾谿以為之援雨雪王皮冠秦復陶翠被豹舄執鞭以出執鞭以, WYG: 賢明端正壽考所謂胎}
