  body:
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 一叙人孕叙人釋名曰人仁也生物也易下繫曰天地氤氲萬物化醇男女搆精萬物化生醇厚也又叙卦曰有天地然後有萬物有萬物然後有男女有男女然後有夫婦又􅀃卦曰立人之道曰仁與義尚書泰誓曰惟天地萬物父母惟人萬物之靈禮記禮運曰何謂人情喜怒哀懼愛惡欲七者弗學而能何謂人義父慈子孝兄良弟悌夫義婦聽長惠㓜順君仁臣忠十者謂之仁義講信脩睦謂之人利争奪相殺謂之人患故聖人所以治人七情脩十義講信脩睦尚辭讓去争奪舎禮何以治之又曰飲食男女人之大欲存焉死亡貧苦人之大惡存焉故欲惡者心之大端也人藏其心不可測度也美惡皆在其心不見其色也欲一以窮之舎禮何以哉故人者其天地之德隂陽之交􅀑神之㑹五行之秀氣也故人者天地之心也五行之端也食味別聲􅀍色而生者也此言兼氣性之効也又樂記曰人生而静天之性也感於物而動性之欲也物至知知然後好惡形焉左傳昭二年鄭子産曰人生始化曰魄魄形也旣生魄陽曰魂陽神氣也用物精多則魂魄彊物權􅀔是以有精爽至于神明爽明也春秋元命苞曰五氣之精交聚相加以迎陽道人致和五氣五行之氣又曰隂陽之性以一起人副天道故生一子又曰天人同度正法相授天垂文象人行其事謂之教教之爲言效也上爲下效道之始也又曰仁者情志好生愛人故其爲仁以人其立字二人爲仁二人言不專於巳念施與也又曰聖人一其德智者循其轍長生乆視一其德言盡得其帝之精氣也循其轍言不違其帝所尚也知是則皆得長生乆視言所行當天也不以命制則愚者悖慢智者無所施其術殘物逆道天不殺故立三命以垂䇿所以尊天一節三者法三道之術不以命制愚慢之人則賢智道術不得施行􅀔相反命者天之令也所受於帝行正不過得壽命壽命正命也起九九八十一帝天帝也八十一陽氣相乗之極有隨命隨命者隨行爲命也援神􅆻曰隨者逆天道常善之行則隨其􅁀虐行以教之有遭命遭命者行正不誤逢丗殘賊君上逆亂辜咎下流灾譴並發隂陽散忤暴氣雷至滅曰動地夭絶人命紗鹿襲邑是也忤錯也襲猶淪也河氷淪沙鹿之邑溺殺人也春秋孔演圖曰正氣爲帝間氣爲臣宫商爲姓秀氣爲人正氣謂􅀂木人則得蒼龍之形靈威仰之氣火人得朱鳥之形赤熛怒之氣以生之比也間氣則不苞一行各受一星以生􅀂蕭何感􅄧精樊噲感狼精周勃感冗精者也又繁露曰唯人獨偶天地人有三百六十節偶天之數形體骨肉偶地之厚上有耳目聦明日月之象也體有空竅理脉川谷之象也心有哀樂喜怒神氣之􅀋故小節三百六十六副日數也大節十二分副月數也内有五藏副行數也外有四胑副時數也乍視乍瞋副晝夜也乍柔乍剛副冬夏也乍哀乍樂副隂陽也樂動聲儀曰中元者人氣也氣以定萬物通於四時者也爾雅曰太平之人仁東至日所出爲太平丹穴之人智距齊州以南戴日爲太穴太蒙之人信西至日所入爲太蒙崆峒之人武孝經曰天地之性人爲貴人之行莫大於孝家語曰魯哀公問於孔子曰人之命與性何謂也孔子對曰分於道謂之命始得爲人也故下句曰命者性之始也形於一謂之性人各受隂陽剛柔之性故形於一化於隂陽象形而發謂之生化窮數盡謂之死故命者性之始也死者生之終也有始則必有終矣人始生而不具者有五焉目無見不能食不能行不能言不能化及生三月而微煦煦晴轉也然後有見八月生齒然後能食朞而生臏然後能行三年顋合然後能言十有六而精通然後能化隂窮反陽故隂以陽變陽窮反隂故陽以隂化是以男子八月生齒八歳而齓十有六而化女子七月生齒七歳而齓十有四而化一隂一陽竒偶相配陽數竒陰數偶然後道合化成性命之端形於此也又曰堅土之人剛弱土之人柔墟土之人大沙土之人細息土之人美㘪土之人醜㘪耗字也息土細緻㘪土麄䟽者也倮蟲三百六十而人爲之長又曰孔子遊太山見營啓期鹿裘帶索皷琴而歌孔子問曰先生所以爲樂者何也對曰吾樂甚多天生萬物唯人爲貴而吾得爲人是以一樂男尊女卑吾得爲男是二樂人生有不見日月不免繦緥者吾巳行年}
