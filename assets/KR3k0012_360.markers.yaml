  - {type: variant, offset: 4, length: 2, content: 羈許, WYG: 是三樂也貧者事之常死者人之終處常得終當何憂哉又曰人有五儀有庸人有士人有君子有賢人有聖人審此五者則理道畢矣漢書曰司馬遷曰凡人所以生者神也所託者形也神大用則竭形大勞則弊神離則死死者不可復生離者不可復返故聖人重之鬻子曰天地闢萬物生人為正焉人化而為善禽獸化而為惡人而不善者謂之禽獸老子曰人法地地法天天法道道法自然文子曰人之情欲平嗜慾亂之精氣為人人受天地變化而生一月而膏初形骸如膏脂二月而脉漸生筋脉三月而肧肧肢也三月如水龍壯也四月而胎如水中鰕蟆之胎五月而䈥氣積而成䈥六月成骨血化肉肉化脂脂化骨七月成形四支九竅成八月而動動作九月而躁動數如前十月而生形骸乃成五藏乃形又曰昔者中黄子曰天有五方地有五行聲有五音物有五味色有五章人有五位故天地之間有二十五人也上五有神人真人道人至人聖人次五有徳人賢人智人善人辯人中五有公人忠人信人義人禮人次五有士人工人虞人農人商人下五有衆人奴人愚人肉人小人上五之與下五猶人之與牛馬也又曰智於萬人者謂之俊百人者謂之傑十人者謂之豪列子曰戴髪含齒倚而趨謂之人管子曰人水也男女精合而水流形二月而咀咀者伍味是伍藏也酸生脾鹹生肺辛生腎苦生肝甘生心藏已具而後生伍肉脾生髓肝生骨腎生筋肺生革心生肉肉已具然後生九竅脾為鼻肝為目腎為耳肺為口心為下竅五月而成十月而生淮南子曰古未有天地之時惟象無形窈窈冥冥鴻洞莫知其間有二神經營天地二神隂陽之神也於是乃别隂陽離為八極剛柔相成萬物乃形煩氣為蟲精氣為人是故精神天之有也骨骸地之有也精神入其門而骸反其根又曰言無常是行無常宜者小人也察於一事通於技者中人也若覆而并有之技能而裁使之者聖人也裁制也度其技能而裁制使也又曰故頭之圎也象天足之方也象地有四時五行九解九解者八方中央也三百六十六日人亦有四肢五臟九竅三百六十骨節天有風雨暑寒人亦有取與喜怒故膽為雲脾為風腎為雨肝為雷以與天地相參也而心為之主是故耳目者日月也公孫尼子曰人有三百六十節當天之數形體有骨肉當地之厚也有九竅脉理當川谷也血氣者風雨也白虎通曰男女者何謂男男任也任功業也女者如也如從人也風俗通曰天地初開未有人女媧擣黄土為人力不暇乃引絙於泥中以為人富貴黄土人也貧賤凡庸絙人也人物志曰夫精欲深微質欲懿重志欲𢎞大心欲謙小精微所以入神妙也麄則失神懿重所以崇徳宇也操則失身志大所以堪物也小則不勝小心所以}
