  - {type: variant, offset: 4779, length: 292, content: 四五為將軍王陽秣馬光但書馬枊屋柱為詩頌不親馬事異苑曰丹陽甘卓字季思照鏡無頭乃見在馬枊荀氏靈鬼志曰泰元中有道人從外國來多有術法自說所受術師曰衣非沙門也嘗行見一人擔上有小籠子可受斗餘語檐人云吾步疲極欲暫寄君擔上人甚怪之慮是狂人便語君欲何許自居邪荅云君若見許正欲入君此籠子中檐人愈怪其奇君能入籠中便是神人也即入籠中籠亦不更大擔亦不覺重至國中一家大富而性慳惜不行仁義語檐人吾試為君破奴慳囊即至其家有一快馬甚惜之在枊下繫忽失去尋求不知處明日見馬在五斗甖中終不可破取不知何方得取之便往語言君作百人廚食周餉窮困者馬當得出耳主人即狼狽作之既畢馬還在柱淮南萬畢術曰馬枊生腐芽者取馬枊生芽可以為藥食煞鳧矣, WYG: ''}
