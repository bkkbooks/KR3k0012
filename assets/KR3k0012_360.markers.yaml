  - {type: variant, offset: 2724, length: 307, content: 譬之養馬秣以高櫪習以戰馭長鞭策後金勒制前折旋規矩任知進退又曰符堅引群臣議代晉太子左率石越曰今歲鎮守斗福德在吳弗可犯且國有長江之嶮朝無昏政之臣願保境養民伺其虛隙堅曰武王伐紂逆歲犯星夫差威陵上國為勾踐所滅雖有長江其能固乎吾之眾投鞭於江足斷其流吾當內斷其心矣又曰符堅時關中謠曰長鞘馬鞭擊左股太歲南行當避虜秦呼鮮卑為白虜慕容垂起關東歲在癸未崔鴻後梁錄曰咸寧二年盜發張駿墓得珠簾琉璃珊瑚馬鞭樂資春秋後傳曰魯仲連曰齊閔王將之魯夷維子為執鞭而從之袁希之漢表傳曰費禕放離切領漢節誘納降附越嶲太守張嶷牋誡禕曰昔岑彭率師來歙杖節感皆見害刺客不鎮重也今明公位尊權重宜覽前事後歲首禕持節行酒郭循以馬鞭中小刀刺禕禕數日薨魏百官名曰駝馬鞭二枚, WYG: ''}
