  - {type: variant, offset: 914, length: 4, content: 舒縣廷掾, SBCK: 孕子皆隨刄以死晉陽秋曰􅀄太宗諸子繼天諸􅁎絶孕令扈謙卜繇云後房當有女誕三男一女終大盛於是盡出後宫及諸婢悉見之織坊中有一人色黒宫人謂之崑崙相者驚曰此是也帝以大計幸之生烈宗車頻􅁗書曰符堅母苟氏浴漳水經西門豹祠歸夜夢􅀂有龍虵感巳遂懷孕而生堅三國典略曰周太祖宇文泰之母曰}
