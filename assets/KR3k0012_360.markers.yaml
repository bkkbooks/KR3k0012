  - {type: variant, offset: 4293, length: 416, content: 佯乎高樹之下乃駐馬書鞭為渦賦傅玄良馬賦曰鞭不得搖手不及動忽然增逝肉飛骨踴傅玄馳射馬賦曰佷如革戾如膠鞭裁向腹奮尾跳凥曹植表曰願得策馬執鞭首當塵路掫風后之奇接吳孫之要追慕卜商起矛左右李尤馬箠銘曰御者箠策示有威怒東野之敗督責過度溫嶠與陶公書曰奉惠赤角一具及鞉鼓馬鞭鼓角既周軍用馬鞭服以周旋玩之於乎與之偕老也偃武之日乃當藏之篋笥耳謝艾密令與楊初曰今遣舍人孔章特口論要密將軍可差腹心人旨致珊瑚馬勒香瓔於盈切一具遺王擢王擢狐疑於將軍父子事得施矣袁宏與范曾書曰四海鼎沸天轡將移杖短策以晨征登重幙以吐奇指六合以倒戈望崑崙而舉麾枊魚豢魏略曰獻帝露布益州曰馬擊枊而不暇解貫冑延頸以侍白刃枊五剛切又五浪切蜀志曰靈帝末先主從校尉鄒靖討賊有功除安喜尉督郵以公事到縣先主求謁不通乃直入傳縛督郵杖二百解綬擊其頸著馬枊棄官亡命常璩華陽國志曰建寧郡同瀨縣存馬縣雍闓反時結壘於縣山繫馬馬枊柱生成林今夷言無梁林無梁夷言馬也蕭子雲晉史草曰姚略時有賀僧者不知何人自云遊歷五郡, WYG: 類}
