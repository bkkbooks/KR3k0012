  - {type: variant, offset: 1966, length: 1824, content: 眾咸愕然既坐徐舉鞭曰願麾下威德加于四海然後以安車軟輪徵肅始當顯耳帝拊掌歡笑又曰大皇帝潛軍於睆口命陸遜為大都督假鉞大皇帝親執鞭以見之虞溥江表傳曰孫權攻合肥不能下徹軍將退兵已上道權與呂蒙蔣欽陵統等在後張慢飲食畢垂當發魏將張遼帥六七千人奄至圍遮數重權乘駿馬上津橋南已見徹丈餘無板谷利附在馬後使持鞍緩鞚利於後著鞭以助馬勢遂得超度王隱晉書曰上黨鮑瑗家多喪病貧苦淳于叔平曰君舍東北有桑樹徑至市入門數十步當有一人持新馬鞭便就買還以懸北桑樹三年當暴得財也瑗遂承其言詣市果得馬鞭懸之正三年浚井得錢數十萬銅鐵雜器復可二十餘萬於是家業用展病者亦愈干寶晉記曰晉永嘉初有神見兗州甄城民家免奴為主簿自號為樊道基有嫗號成夫人欲迎致便載車行當得此免奴主簿從行為譯以宣所宜汝南梅蹟字仲真去鄴來經兗州聞其然因結羊世茂阮士公諸賓往觀之成夫人便遣主簿出當與貴客語主簿死不肯避成夫人因大嗔索士公馬鞭脫主簿鞭之何法盛晉中興書曰祖逖與劉琨中夜而坐相謂曰若四海鼎沸豪傑並起吾與足下相避於中原後琨與親舊書曰吾枕戈待旦志梟逆虜常恐祖生先人著鞭耳沈約宋書曰胡蕃字道序義旗起桓玄戰敗將出奔藩於南掖門捉玄馬鞚曰今羽林射手猶有八百皆是義故西人一旦捨此欲歸可復得乎玄直以馬鞭指天而已於是奔散蕭方等三十國春秋曰石勒遣石虎率精騎五千掩李矩營生執矩外甥郭謂之弟元教元作書與謂說云去年東平曹嶷西賓猗廬矩如牛角何不歸命勒與謂書餉塵尾馬鞭說賓禮賢弟想同斷金往物為信矩所領將士並欲歸勒矩知眾之去己乃率眾來歸又曰城都王頴誅黃門孟玖於是東海王越高密王簡皆懼奔國琅邪王睿又將出焉而徼禁甚密穎又先下諸津禁止諸貴人王至河陽乃見拘焉宋典後至以鞭拂之曰舍長官禁貴人而爾見止耶因大笑之吏乃放遣因得奔國崔鴻前秦錄曰符堅起教武堂于渭城命太學生明陰陽兵法教為將士朱彤諫曰虎將之士受教學生強幹之術乃弱本之方夫養將之法譬之養馬秣以高櫪習以戰馭長鞭策後金勒制前折旋規矩任知進退又曰符堅引群臣議代晉太子左率石越曰今歲鎮守斗福德在吳弗可犯且國有長江之嶮朝無昏政之臣願保境養民伺其虛隙堅曰武王伐紂逆歲犯星夫差威陵上國為勾踐所滅雖有長江其能固乎吾之眾投鞭於江足斷其流吾當內斷其心矣又曰符堅時關中謠曰長鞘馬鞭擊左股太歲南行當避虜秦呼鮮卑為白虜慕容垂起關東歲在癸未崔鴻後梁錄曰咸寧二年盜發張駿墓得珠簾琉璃珊瑚馬鞭樂資春秋後傳曰魯仲連曰齊閔王將之魯夷維子為執鞭而從之袁希之漢表傳曰費禕放離切領漢節誘納降附越嶲太守張嶷牋誡禕曰昔岑彭率師來歙杖節感皆見害刺客不鎮重也今明公位尊權重宜覽前事後歲首禕持節行酒郭循以馬鞭中小刀刺禕禕數日薨魏百官名曰駝馬鞭二枚異苑曰長山張舒以元嘉九年二月二十四日奄見一人著朱衣平上幘手捉青柄馬鞭云汝何可教便隨我去見素絲繩繫長梯來下舒上梯仍造大城綺堂洞室地如黃金有一人長大不巾蹟獨坐絳紗帳中語舒曰主者誤取汝賜汝秘術卜占勿貪錢賄舒亦不覺受時劉義慶幽明錄曰餘杭人沈縱家素貧與父同入山還未至家見一人左右導從四百許前車輜重馬鞭夾道鹵簿如二千石遙見縱父子使喚住就縱手中燃火縱因問是何貴人荅曰是鬥山王在餘杭南縱知是神叩頭云願見祐助後入山得一王㹠從此如意又曰桓玄既肆無君之心使御史害太傅道子於安城玄在南州坐忽見一平上幘人持馬鞭通云蔣侯來玄驚愕然便見階下奴子御幰車見一士大夫自云是蔣子文君何以害太傅與為伯仲顧視之間便不復見又曰廣陵韓晷字興彥陳敏反時與敏弟恢戰於尋陽還營下馬覺鞭重見有綠錦囊中有短卷書著鞘皆不知所從來開視之故穀紙佛神呪經謝氏鬼神列傳曰下邳陳超為鬼君弼所逐改名何規從餘杭步道還家求福絕不敢出入五年後意漸替懈與親舊臨水戲酒酣共說往事超云不復畏此鬼也小俛首乃見鬼影在水中超驚怖時亦有乘馬者超借馬騎之下鞭奔驅此鬼去超遠近常如初微聞鬼云汝何規耶急急就死吳會分地記曰六山者勾踐於此山鑄銅銅不鑠則埋之上生馬箠勾踐遣使者移於南社種之飾治以為馬箠獻於吳劉欣期交州記曰兕出九德有一角角長二尺餘形如馬鞭柄闞駰十三州志曰山桑縣人俗貪偽好持馬鞭行邑故語曰沛國龍冗至山桑詐託旅使若奔喪道遇寇抄失資糧太公陰謀曰武王曰吾欲造起居之誡隨之以身箠書曰馬不可极民不可劇馬极則躓民劇則敗莊子曰莊子使楚見空髑髏髐然司馬彪曰髐曰骨皃撽以馬箠而問之曰夫子貪生理而為此乎將有亡國之事斧鉞之誅乎語卒援髑髏枕而寢又曰馬蹄可以踐霜雪毛可以御風寒齕草飲水翹足而陸此馬之真性也及至伯樂曰我善治之燒剔之刻之雒之連之以羈馽編之以皂棧馬之死者十二三矣飢之渴之馳之驟之齊之前有橛飾之患後有鞭策之威而馬之死者已過半矣, SBCK: ''}
