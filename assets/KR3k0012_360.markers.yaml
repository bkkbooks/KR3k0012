  - {type: variant, offset: 919, length: 8, content: 睦卒病死已呼魄家, SBCK: 氏􅀄孕五月夜夢抱子昇天􅂊不至而止窹以告德皇帝皇帝喜曰雖不至天貴亦極矣列子曰思士不妻而感思女不夫而孕后稷生乎巨跡伊尹生乎空桑莊子曰舜之治天下使民心競民孕婦十月而生子子生五月而能言教之速不至乎孩而始誰誰者別}
