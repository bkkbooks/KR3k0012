  - {type: variant, offset: 3794, length: 1, content: 昔, SBCK: 孕婦見兎其子缺脣見麋而子必四目帝王世紀曰庖犧氏風姓也母曰華胥燧人之代有大迹出雷澤胥履之生庖犧又曰帝堯陶唐氏祁姓也母曰慶都孕十四月而生堯於丹陵名曰放勛遁甲開山圖榮氏解曰女狄暮汲於石紐山下大祠前水中得月精如雞子愛而含之不覺而吞遂有身十四月而生夏禹括地圖曰大人國其民孕三十六年而生兒生兒長大能乗雲蓋龍􅀋玄㑹稽四萬六千里外國圖曰方丘之上暑濕生男子三年而死其潢水婦人入浴出則乳矣是去九疑二萬四千里列女傳曰簡狄}
