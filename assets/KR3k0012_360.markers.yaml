  - {type: variant, offset: 914, length: 4, content: 舒縣廷掾, WYG: 孕子皆隨刃以死晉陽秋曰初太宗諸子繼夭諸姬絶娠令扈謙卜繇云後房當有女誕三男一女終大盛於是盡出後宫及諸婢悉見之織坊中有一人色黒宫人謂之崑崙相者驚曰此是也帝因而召幸之生烈宗秦書曰符堅母荀氏浴漳水經西門豹祠歸夜夢若有龍蛇感已遂懐娠而生堅三國典畧曰周太祖宇文泰之母曰}
