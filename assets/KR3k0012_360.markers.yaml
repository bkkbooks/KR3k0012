  - {type: variant, offset: 1457, length: 345, content: 避君三舍若不獲命其左執鞭弭右屬橐鞬以與君周旋又曰宋告急於晉伯宗曰不可雖鞭之長不及馬腹又曰楚靈王使圉徐以懼吳楚子次于乾谿以為之援雨雪王皮冠秦復陶翠被豹舄執鞭以出執鞭以教令右尹子革夕子革鄭丹也夕暮也王見之去冠被舍鞭與之語又曰晉荀瑤帥師伐鄭鄭駟弘請救於齊陳成子救鄭及濮雨不涉成子衣製杖戈製雨衣也立於阪上馬不出者助之鞭之公羊傳曰陽虎將殺季孫于蒲圃使臨南御之至孟衢臨南投策使陽越下取策陸機毛詩草木虫魚䟽曰据枝葉似楨松爾雅曰据櫃也去匱切節似扶老即金靈壽是也今人以為馬鞭及杖孔藂子曰刑以齊民譬之於御則鞭策也漢書曰婁敬云太王以狄伐故去豳杖馬箠去居歧又曰石慶為太僕御出上問車中幾馬慶以策數馬畢舉手曰六馬又曰李廣擊匈奴匈奴兵多破廣軍生得廣廣時傷置絡間而臥行十餘里廣陽死睨其傍有一胡兒騎廣騰而上胡兒馬因鞭馬南馳數, SBCK: 隣東走}
