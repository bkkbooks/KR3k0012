  - {type: punctuation, offset: 3382, content: 》, id: KR3k0012_CHANT_360-bkkpn1005}
  - {type: variant, offset: 3382, length: 593, content: 曰下邳陳超為鬼君弼所逐改名何規從餘杭步道還家求福絕不敢出入五年後意漸替懈與親舊臨水戲酒酣共說往事超云不復畏此鬼也小俛首乃見鬼影在水中超驚怖時亦有乘馬者超借馬騎之下鞭奔驅此鬼去超遠近常如初微聞鬼云汝何規耶急急就死吳會分地記曰六山者勾踐於此山鑄銅銅不鑠則埋之上生馬箠勾踐遣使者移於南社種之飾治以為馬箠獻於吳劉欣期交州記曰兕出九德有一角角長二尺餘形如馬鞭柄闞駰十三州志曰山桑縣人俗貪偽好持馬鞭行邑故語曰沛國龍冗至山桑詐託旅使若奔喪道遇寇抄失資糧太公陰謀曰武王曰吾欲造起居之誡隨之以身箠書曰馬不可极民不可劇馬极則躓民劇則敗莊子曰莊子使楚見空髑髏髐然司馬彪曰髐曰骨皃撽以馬箠而問之曰夫子貪生理而為此乎將有亡國之事斧鉞之誅乎語卒援髑髏枕而寢又曰馬蹄可以踐霜雪毛可以御風寒齕草飲水翹足而陸此馬之真性也及至伯樂曰我善治之燒剔之刻之雒之連之以羈馽編之以皂棧馬之死者十二三矣飢之渴之馳之驟之齊之前有橛飾之患後有鞭策之威而馬之死者已過半矣淮南子曰昔者王良造父御也投足調均勞逸若一安勞樂進馳騖若滅左右若鞭周旋若環世皆以為巧然未見其貴也若夫鉗具太丙之御也除轡舍銜去鞭棄策軍車莫動而自舉馬莫使而自走又曰大丈夫恬然無思澹然無慮以天為蓋以地為輿四時為馬陰陽為騶電以為鞭策雷以為車輪鹽鐵論曰無鞭策雖造父不能以調四馬無勢位雖舜禹不能以治萬民又曰秦攝利銜以御宇內執脩箠以笞八极杜夷幽求曰召渴者以臨河不待鞭策而自至說苑曰默無過, WYG: ''}
