  - {type: variant, offset: 971, length: 9, content: 羆皮鄣泥獻于南燕燕, WYG: 男子三十而死其潼水婦人入浴出則乳矣是去九嶷二萬四千里烈女傳曰簡狄者帝嚳之次女也妃有娀氏之女與姊妹浴於𤣥丘水之上有𤣥鳥銜卵而墜五色甚好相與競取之簡狄得而吞之有姙遂生契又曰太姙者文}
