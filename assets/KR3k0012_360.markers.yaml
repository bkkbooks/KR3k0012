  - {type: variant, offset: 1048, length: 5, content: 桓郁兼羽林, WYG: 相夫人有胎六月腹痛十餘日大極請佗視脉佗曰有兩胎一已死便手摹其胎在左男也在右女也右死即為湯下之便愈洞冥記曰東方朔母田氏寡居夢太白星臨其上因有姙田氏歎曰無夫而姙人將棄我乃移向代都東方里為居五月旦生朔因以所居里為氏朔為名愽物志曰徐君宫人有娠而生卵以為不祥棄於水濵獨孤母有犬名鵠倉獵於水濵得所棄卵衘以來歸獨孤母以為異覆煖之遂􅭨成兒生時正偃故以為名徐君宫}
