  - {type: variant, offset: 994, length: 42, content: 王武子善解馬性嘗乘一馬著連乾彰泥前有水終不肯渡王云此必是惜彰泥使人解去便徑度防汗東觀, WYG: 吴侍中闞澤字徳潤在母胞八月叱聲震外蜀郡}
  - {type: punctuation, offset: 1001, content: 。, id: KR3k0012_CHANT_360-bkkpn329}
