  - {type: variant, offset: 474, length: 266, content: 書曰羈繮為相要制也夢得羈繮要約士也羈結語言繮往來也羈結韁豎結勑疆也弊絕不用難俛仰也摯虞逸驥詩曰逸驥無鑣轡騰陸從長川剪落就羈靮飛軒躡雲煙孫綽詩曰野馬閑於羈澤雉屈於樊神王自有所何為人事間傅玄馳射馬賦曰百鳥齊興六驥孔閑金銜玉羈文防鏤鞍明珂景朗華䩸采鮮傅玄良馬賦曰金羈在首發以明珂鏤鞍采䩸織防含華䩸音茸傅玄難良馬賦曰飾以金羈申以玉纓結以輕軒節以和鈴曹植遊俠篇曰白馬飾金羈連翩西北馳借問誰家子幽并遊俠兒孫惠三馬衷辭序曰余於物特所留心而所服三馬一時離羈感田子之愛遂作哀文云爾珂服虔通俗文曰勒飾曰珂郭義恭廣志曰期調國出金銀白珠硫璃水精器五色珠馬珂, SBCK: 膓繞呉閶門}
