  - {type: variant, offset: 1540, length: 1182, content: 令右尹子革夕子革鄭丹也夕暮也王見之去冠被舍鞭與之語又曰晉荀瑤帥師伐鄭鄭駟弘請救於齊陳成子救鄭及濮雨不涉成子衣製杖戈製雨衣也立於阪上馬不出者助之鞭之公羊傳曰陽虎將殺季孫于蒲圃使臨南御之至孟衢臨南投策使陽越下取策陸機毛詩草木虫魚䟽曰据枝葉似楨松爾雅曰据櫃也去匱切節似扶老即金靈壽是也今人以為馬鞭及杖孔藂子曰刑以齊民譬之於御則鞭策也漢書曰婁敬云太王以狄伐故去豳杖馬箠去居歧又曰石慶為太僕御出上問車中幾馬慶以策數馬畢舉手曰六馬又曰李廣擊匈奴匈奴兵多破廣軍生得廣廣時傷置絡間而臥行十餘里廣陽死睨其傍有一胡兒騎廣騰而上胡兒馬因鞭馬南馳數十里得其餘軍又曰大司空士夜過奉常亭亭長呵之告以官名亭長醉曰寧有符傳耶士以馬箠擊亭長漢獻帝起居注曰李𠐶性喜鬼怪左道之術又於朝廷省門為董卓設神坐數以羊祠之祠畢過省閤問帝起居求入見𠐶帶三刀手復與鞭合持一刀侍中侍郎見𠐶帶仗皆惶恐亦帶劍持刀先入在帝側張勃吳錄曰大皇帝大會飲宴下馬迎魯肅肅入拜起禮之謂言子敬孤持鞍下馬相迎足以顯未肅趨進曰未也眾咸愕然既坐徐舉鞭曰願麾下威德加于四海然後以安車軟輪徵肅始當顯耳帝拊掌歡笑又曰大皇帝潛軍於睆口命陸遜為大都督假鉞大皇帝親執鞭以見之虞溥江表傳曰孫權攻合肥不能下徹軍將退兵已上道權與呂蒙蔣欽陵統等在後張慢飲食畢垂當發魏將張遼帥六七千人奄至圍遮數重權乘駿馬上津橋南已見徹丈餘無板谷利附在馬後使持鞍緩鞚利於後著鞭以助馬勢遂得超度王隱晉書曰上黨鮑瑗家多喪病貧苦淳于叔平曰君舍東北有桑樹徑至市入門數十步當有一人持新馬鞭便就買還以懸北桑樹三年當暴得財也瑗遂承其言詣市果得馬鞭懸之正三年浚井得錢數十萬銅鐵雜器復可二十餘萬於是家業用展病者亦愈干寶晉記曰晉永嘉初有神見兗州甄城民家免奴為主簿自號為樊道基有嫗號成夫人欲迎致便載車行當得此免奴主簿從行為譯以宣所宜汝南梅蹟字仲真去鄴來經兗州聞其然因結羊世茂阮士公諸賓往觀之成夫人便遣主簿出當與貴客語主簿死不肯避成夫人因大嗔索士公馬鞭脫主簿鞭之何法盛晉中興書曰祖逖與劉琨中夜而坐相謂曰若四海鼎沸豪傑並起吾與足下相避於中原後琨與親舊書曰吾枕戈待旦志梟逆虜常恐祖生先人著鞭耳沈約宋書曰胡蕃字道序義旗起桓玄戰敗將出奔藩於南掖門捉玄馬鞚曰今羽林射手猶有八百皆是義故西人一旦捨此欲歸可復得乎玄直以馬鞭指天而已於是奔散蕭方等三十國春秋曰石勒遣石虎率精騎五千掩李矩營生執矩外甥郭謂之弟元教元作書與謂說云去年東平曹嶷西賓猗廬矩如牛角何不歸命勒與謂書餉塵尾馬鞭說賓禮賢弟想同斷金往物為信矩所領將士並欲歸勒矩知眾之去己乃率眾來歸又曰城都王頴誅黃門孟玖於是東海王越高密王簡皆懼奔國琅邪王睿又將出焉而徼禁甚密穎又先下諸津禁止諸貴人王至河陽乃見拘焉宋典後至以鞭拂之曰舍長官禁貴人而爾見止耶因大笑之吏乃放遣因得奔國崔鴻前秦錄曰符堅起教武堂于渭城命太學生明陰陽兵法教為將士朱彤諫曰虎將之士受教學生強幹之術乃弱本之方夫養將, WYG: ''}
