  - {type: variant, offset: 139, length: 0, content: '', SBCK: 司馬遷曰凡人所以生者神也所託者形也神大用則竭形大勞則弊神離則死死者不可復生離者不可復返故聖人重之鬻子曰天地闢萬物生人爲正焉人化而爲善禽獸化而爲惡人而不善者謂之禽獸老子曰人法地地法天天法道道法自然文子曰人之情欲平􅄝慾亂之精氣爲人人受天地變化而生一月而膏􅀄形骸如膏脂二月而脉漸生筋脉三月而肧肧胞也三月如水龍􅃺也四月而胎如水中蝦蟆之胎五月而䈥氣積而成䈥六月成骨血化肉􅁏化脂脂化骨七月成形四肢九竅成八月而動動作九月而躁動數如前十月而生形骸乃成五藏乃形又曰昔者中黄子曰天有五行地有五方聲有五音物有五味色有五章人有五伍五伍二十五故天地之間有二十五等人上伍有神人眞人道人至人聖人次伍有德人賢人智人善人辯人中伍有公人忠人啇人平人直人下伍有衆人奴人愚人視肉人小人上伍之與下伍猶人之與牛馬也又曰智出於萬人者謂之俊百人者謂之傑十人者謂之豪列子曰戴髮含鹵􅀝而趨謂之人管子曰人水也男女精合而水流形二月而咀咀者五味也五味是五藏酸生脾鹹生肺辛生腎苦生肝甘生心藏巳具而後生五肉脾生髓肝生骨腎生䈥肺生革心生肉肉巳具然後生九竅脾爲鼻肝爲目腎爲耳肺爲口心爲下竅五月而成十月而生淮南子曰古未有天地之時惟象無形窈窈􅁳􅁳鴻洞莫知其間有二神經營天地二神隂陽之神也於是乃別隂陽離爲八極剛柔相成萬物乃形煩氣爲蟲精氣爲人是故精神天之有也骨骸地之有也精神入其門而骸反其根又曰言無常是行無常冝者小人也察於一事通於技者中人也􅀂覆而并有之技能而裁使之者聖人也裁制也度其技能而裁制使也又曰故頭之圎也象天足之方也象地有四時五行九解九解者八方中央也三百六十六日人亦有四肢五藏九竅三百六十骨節天有風雨寒暑人亦有取與喜怒故膽爲雲脾爲風腎爲雨肝爲雷以與天地相叅也而心爲之主是故耳目者日月也公孫尼子曰人有三百六十節當天之數也形體有骨肉當地之厚也有九竅脉理當川谷也血氣者風雨也白虎通曰男女者何謂男男任也任功業也女者如也如從人也風俗通曰天地􅀄開未有人女媧擣黄土爲人力不暇乃引絙於泥中以爲人冨貴黄土人也貧賤凡庸絙人也人物志曰夫精欲深微質欲懿重志欲弘大心欲謙小精微所以入神妙也麄則失神懿重所以崇德宇也躁則失身志大所以堪任物也小則不勝小心所以慎咎悔也大則驕陵由此論之小心而志大者豪傑之俊也心大而志小者傲蕩之􅀋也心小而志大者拘愞之人也任子曰木氣人勇金氣人剛火氣人強而躁􅁟氣人智而寛水氣人急而賊傅子曰人之性如水焉置之圎則圎置之方則方澄之則淳而清動之則流而濁孕易漸卦曰鴻漸于陸夫征不復婦孕不育凶王弼注曰夫婦邪醜則非夫而孕故不育尚書泰誓曰啇王受焚炙忠良刳剔孕婦左傳僖中曰晉惠公之在梁也梁伯妻之梁嬴孕過期卜招父與其子卜之其子曰將生一男一女招曰然男爲人臣女爲人妾故名男曰圉女曰妾及子圉西質妾爲䆠女焉大戴禮曰周后任成王於身立而不跂坐而不差獨處不倨雖怒不詈胎教之謂也書之玉版藏之金匱置之宗廟爲後丗戒史記曰后稷名弃母有邰氏女曰姜嫄爲帝嚳元妃出野見巨人跡心􅀃頋之乃踐之身動如孕者居期而生后稷又曰􅁗之先顓頊之苗孫曰女脩玄烏隕􅆑脩取吞之有孕生子大業又曰昔夏氏之將衰也有二龍止於夏庭龍亡漦在櫝而藏之至周厲王發而觀之漦化爲玄􅀛入王後宫宫妾未齓而遭之旣笄而孕無夫而生子懼而弃之即褒姒也漢書曰張倉妻妾百數甞孕者不復幸又曰鈎弋夫人懷昭帝十四月乃生上以堯十四月而生}
