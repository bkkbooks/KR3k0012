  - {type: variant, offset: 4012, length: 790, content: 具設雖剛怒麤戾蹄齧之馬若足拘靽縶口銜轡勒箠策必至則躡䠱循䠱馳錄切世說曰王敦在姑熟晉帝出看敦營敦覺追帝帝以金馬鞭與客舍姥莫補切姥以水澆馬屎令追者問姥姥云去已久矣追者乃止也又曰王澄字平子從荊州下過王敦敦謀欲害之而平子左右二十八人悉捉鐵馬鞭為衛敦不敢近夢書曰鞭箠為所使有勑趨也夢得鞭箠欲有使也持以鞭馬使朋友也鞭使馬疾服諾喜也曹植九詠曰乘逸嚮兮執電鞭忽而往兮怳而旋曹植陌上桑曰望雲際有真人安得輕舉繼清塵執電鞭騁飛麟張華輕薄篇曰文軒樹羽蓋乘馬珮玉珂橫簪列瑁瑇長鞭施象牙揚雄河東賦曰奮電鞭驂雷輜鳴洪鍾建五旗魏文帝臨渦賦曰建安十八年終譙余兄弟從上拜墳墓遂乘馬遊觀經東園遵渦水相佯乎高樹之下乃駐馬書鞭為渦賦傅玄良馬賦曰鞭不得搖手不及動忽然增逝肉飛骨踴傅玄馳射馬賦曰佷如革戾如膠鞭裁向腹奮尾跳凥曹植表曰願得策馬執鞭首當塵路掫風后之奇接吳孫之要追慕卜商起矛左右李尤馬箠銘曰御者箠策示有威怒東野之敗督責過度溫嶠與陶公書曰奉惠赤角一具及鞉鼓馬鞭鼓角既周軍用馬鞭服以周旋玩之於乎與之偕老也偃武之日乃當藏之篋笥耳謝艾密令與楊初曰今遣舍人孔章特口論要密將軍可差腹心人旨致珊瑚馬勒香瓔於盈切一具遺王擢王擢狐疑於將軍父子事得施矣袁宏與范曾書曰四海鼎沸天轡將移杖短策以晨征登重幙以吐奇指六合以倒戈望崑崙而舉麾枊魚豢魏略曰獻帝露布益州曰馬擊枊而不暇解貫冑延頸以侍白刃枊五剛切又五浪切蜀志曰靈帝末先主從校尉鄒靖討賊有功除安喜尉督郵以公事到縣先主求謁不通乃直入傳縛督郵杖二百解綬擊其頸著馬枊棄官亡命常璩華陽國志曰建寧郡同瀨縣存馬縣雍闓反時結壘於縣山繫馬馬枊柱生成林今夷言無梁林無梁夷言馬也蕭子雲晉史草曰姚略時有賀僧者不知何人自云遊歷五郡時人號為賀五郡齋戒奉道為百姓說吉凶略死泓立僧謂泓曰宜絜掃一馬廄開屋設大枊有異馬其大非常自遠來天所送矣趙書曰徐光字秀武頓丘人父以牛毉為業光年十四五為將軍王陽秣馬光但書馬枊屋柱為詩頌不親馬事, SBCK: 法}
