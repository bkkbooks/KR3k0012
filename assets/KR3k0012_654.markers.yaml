  - {type: variant, offset: 773, length: 1, content: 內, WYG: 幾神等論其義僧寵及周捨殷鈞陸倕並各精解而不能屈又曰到溉少有美名家門雍睦兄弟特相友愛初與弟洽恒同居一齋洽卒後便捨宅為寺蔣山有延賢寺溉家世創立故生平公俸減以供焉因斷腥膻終身蔬食别營小室朝夕從僧徒禮誦武帝毎月三置浄饌恩禮甚篤性不好交遊及卧疾門可羅雀太清三年卒臨終勑子孫以薄葬之禮言訖便屏家人請僧讀經讃咀及卒顏色如恒手屈三指即佛道所云得果也又曰周𢎞正善𤣥理為當世所宗藏法師於開善寺講説門徒數百𢎞正年少未知名著紅禈錦絞髻踞門而聽衆人蔑之弗譴也既而乘間進難舉座傾聽法師疑非世人覘之大相賞狎又曰劉慧斐字宣文彭城人也少博學能属文起家梁安成王法曹行參軍常還都途徑尋陽遊於匡山遇處士張孝秀相得甚懽遂有終焉之志因不仕居東林寺又於山北構園一所號曰離垢園時人乃謂為離垢先生慧斐尤明釋典工篆𨽻在山手寫佛經二千餘卷常所誦者百餘卷晝夜行道孜孜不怠逺近欽慕之簡文臨江州遺以几杖論者云自逺法師没後將二百年始有張劉之盛矣又曰庾詵普通中詔以為黄門侍郞稱疾不起晩年尤遵釋}
