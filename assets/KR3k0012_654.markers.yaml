  - {type: variant, offset: 1801, length: 507, content: 豈唯釋教而已邪帝悅曰釋門有卿亦猶孔氏之有季路世說曰殷中軍見佛經云理應在阿堵上注云佛經之行東國尚焉而記傳無聞莫詳其始牟子曰漢明帝夜夢見神人身有日光飛止殿前意甚忻悅明日問群臣有通人傅毅對曰聞天笁有得道者號曰佛身有日光殆將其神於是上悟遣羽林郎秦景博士弟子等十二人之大月氏寫取佛經四十二章在蘭臺石室又曰庾公常入佛圖見臥佛曰此子疲於津梁時人以為名言涅槃經云如來背痛於雙樹間北首而臥故後之圖繪者為此像也佛地論曰佛者覺也覺一切種智復能開覺有情如睡夢覺故名為佛姓釋伽號牟尼佛普曜經曰從兜率天降神於西域迦維衛國淨飯王宮摩耶夫人剖左脅而生時多靈瑞生而能言本相經曰年十九踰城出家學道勤行精進禪定六年成道具三十二相八十種好涅槃經曰醍醐之教喻於佛性從乳出酪從酪出蘇從生蘇出熟蘇熟蘇出醍醐醍醐蘇之精也法顯記曰佛生於殷末道成於周初至成王十二年經律始到新頭河河即張騫所到之處佛國記曰佛有四牙廣半寸長半寸一牙在呵條國又一牙在天上又一牙在海龍王宮又一牙在乾陁國國王使大臣九人守保之月朝捧擎牙出牙或時放光明香花數十斛散牙上而牙不沒唐韓愈論佛骨䟽曰伏以佛者夷狄之一法耳後漢時流入中國上古未嘗有也昔黃帝在位百年年一百一十歲少昊在位八十年年一百八十歲此時天下, SBCK: 俗嗟異}
