  - {type: variant, offset: 355, length: 0, content: '', SBCK: 何充性好釋典崇修佛寺供給涉門以數百縻費臣億而不恡也親友至貧乏無所施遺以此􅀗譏於丗阮􅁉常戯之曰卿志大宇宙勇邁終古充問其故􅁉曰我圖數千户郡尚不能得卿圖作佛不亦大乎于時郗愔及弟曇奉天師道而充與弟准崇信釋氏謝萬譏之云一郗謟於道二何倿於佛丗說亦云又曰王恭性雖抗直而闇於機㑹自矜貴不閑用兵尤信佛遒臨刑猶誦經神色無懼宋書謝靈運傳曰㑹稽太守孟顗事佛精懇而爲靈運所譏甞謂顗曰得道應湏惠業丈人生天當在靈運前成佛必在靈運}
  - {type: page-break, offset: 355, content: '', id: KR3k0012_SBCK_654-1b}
  - {type: variant, offset: 355, length: 2, content: 後趙, WYG: 何充性好釋典崇修佛寺供給沙門以數}
  - {type: variant, offset: 355, length: 0, content: '', krp: 何充性好釋典崇修佛寺供給涉門以數百縻費臣億而不恡也親友至貧乏無所施遺以此獲譏於丗阮𥙿常戯之曰卿志大宇宙勇邁終古充問其故𥙿曰我圖數千户郡尚不能得卿圖作佛不亦大乎于時郗愔及弟曇奉天師道而充與弟准崇信釋氏謝萬譏之云一郗謟於道二何倿於佛丗說亦云又曰王恭性雖抗直而闇於機㑹自矜貴不閑用兵尤信佛遒臨刑猶誦經神色無懼宋書謝靈運傳曰㑹稽太守孟顗事佛精懇而爲靈運所譏甞謂顗曰得道應湏惠業丈人生天當在靈運前成佛必在靈運}
  - {type: variant, offset: 356, length: 3, content: 趙百姓, SBCK: 顗深恨此言又曰􅀽粲字景倩㓜􅀌祖哀之名曰􅉖孫孝武即位稍遷尚書吏部郎文帝諱日君臣並於中興寺八関齋中食竟􅉖孫别與黄門郎張淹更進魚肉食尚書令何尚之奉法素謹密}
  - {type: variant, offset: 356, length: 3, content: 趙百姓, krp: 顗深恨此言又曰袁粲字景倩㓜孤祖哀之名曰愍孫孝武即位稍遷尚書吏部郎文帝諱日君臣並於中興寺八関齋中食竟愍孫别與黄門郎張淹更進魚肉食尚書令何尚之奉法素謹密}
  - {type: variant, offset: 358, length: 1, content: 姓, WYG: 縻費巨億而不恡也親友至貧乏無所施遺}
  - {type: variant, offset: 360, length: 0, content: '', SBCK: 白孝武並免官又曰范泰暮年事}
  - {type: variant, offset: 360, length: 0, content: '', WYG: 此獲譏於世阮裕常戲之曰卿志大宇宙勇邁終古充問其故裕曰我圖數千户郡尚不能得卿圖作}
  - {type: variant, offset: 360, length: 0, content: '', krp: 白孝武並免官又曰范泰暮年事}
  - {type: variant, offset: 361, length: 4, content: 圖澄故多, SBCK: 甚精於宅西立祗洹精舎又曰宋明帝頗好玄理以周顒有辭義引入殿内親近􅀫直帝所爲􅃤毒之事顒不敢顯誦經中因縁罪福事帝亦爲之止顒音辭辯麗長於佛理著三宗論言空假義西涼州智林道人遺顒書深相賛美言捉塵尾來四十餘載頗見宗録唯此途白黒無一又得者爲之發病非意此音猥來入耳其見重如此齊書曰竟陵王子良甞招致名僧講論佛法造經唄新聲又文惠太子同好釋氏甚相友悌子良敬信尤篤數於邸園營齋戒大集朝臣衆僧至賦食行水或躬親其事世頗以爲失宰相躰武帝不豫子良啓進沙門於殿户前誦經武帝爲感夢見優曇鉢花于經案宣旨使御府以銅爲華插御床四角又曰晉安王子懋字雲昌武帝第七子也廉譲好學年七歳時母阮淑媛甞病危篤請僧行道有獻花供佛者衆僧以銅罌盛水漬其莖欲花不萎子懋流涕禮佛曰􅀂使阿姨因此和勝願諸佛令花竟齋不萎七日齋畢花更鮮紅視􅎆中稍有根􅂡又曰吴興有項羽神護郡㕔事太守到郡必湏祀以軛下牛李安人}
  - {type: page-break, offset: 361, content: '', id: KR3k0012_SBCK_654-2a}
