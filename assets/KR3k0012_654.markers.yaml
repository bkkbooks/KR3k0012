  - {type: variant, offset: 841, length: 0, content: '', SBCK: 佛敎而親自講說太子亦素信三寳徧覽衆經乃於宫内别立慧義殿專爲法集之所招引名僧自立三諦法義普通元年甘露降於慧義殿咸以爲至德所感又曰何㣧居虎丘西寺講經學僧徒隨之常禁殺有虞人逐鹿徑來趍㣧伏不動又有異鳥如鶴紅色集講堂馴狎如家禽􅀄開善寺藏法師與㣧遇於􅁗望山後還都卒於鍾山死曰㣧在波􅀂寺見一名僧授㣧香炉奩并凾書曰貧道發自楊都呈何居士言訖失所在開凾乃是大莊嚴論世中未有訪之香炉乃藏公所常用又於寺内立明珠柱柱乃七日夜放光昭明太子欽其徳遣舎人何思澄致手令以襃美之又曰建平王大球簡文第十七子也性明惠夙成􅀄侯景圍臺城武帝素歸心釋教毎發誓願恒云􅀂有衆生應受諸苦諱身當代時大球年甫七歳聞而驚謂母曰官家尚爾兒安敢辭乃六時禮佛亦曰凢有衆生應􅀗苦報悉大球代受其早惠如此又曰大中元年都下疫甚帝於重雲殿爲萬姓設救苦齋以身爲禱九日辛未幸同泰寺設四部無􅃒大㑹上釋服御法衣清浄大捨以便省爲房用素瓦器乗小車􅀻人執役甲午昇法座爲大衆講􅄺槃經癸卯群臣以億萬奉贖衆僧黙然乙酉百辟詣寺東門奉表請還宫三請乃許帝三荅書前後並稱頓首中大同元年三月幸同泰寺講三惠經乃捨身爲奴皇太子巳下群臣出錢億萬奉贖是夜同泰寺爲天火所燒畧盡二年帝昇光嚴殿講三惠經又捨身群臣以億萬奉贖僧衆嘿然百辟詣鳯莊門上表請帝帝三荅皆稱頓首丁亥服衮冕還宫髙祖自􅀄捨身後或書經坐禪盡日不食又於元光殿坐師子座講金字經又曰貞陽侯明俘執至魏魏帝引見明及諸將送晉陽渤海王髙澄禮明甚重謂曰王與梁主和好十有餘年聞彼禮佛文常云爲魏主及先王此甚是梁主厚意不謂一朝失信致使紛擾因欲與梁通和又曰􅀄武帝軍東下用不足建安王偉取襄陽寺銅佛以爲錢冨僧藏鏹多加毒害後遂􅁖疾性多恩惠尤􅉖窮之毎祁寒積雪則遣人載樵米隨乏絶者賦給之晚年崇信佛理尤精玄學著二暗義製性情幾神等論義僧寵及周捨殷鈞陸倕並名精解而不能屈又曰到漑少有美名家門雍睦兄弟特相友愛􅀄與弟洽洹同居一齋洽卒後便捨宅爲寺蔣山有延賢寺漑家世所立漑所得禄俸皆充二寺因断腥膻終身􅂼食别營小室朝夕僧徒禮誦武帝每月三致淨饌恩禮甚篤性不好交遊及卧疾門可羅雀太清二年卒臨終勒子孫薄葬之禮言訖便屏家人請僧讀經譛㖵及卒顔色如􅁪手屈二指即佛道所云得果也又曰周弘正善玄理爲當丗所宗藏法師於開善寺講說門徒數百弘正年少未知名着紅禈錦絞髻踞門而聽衆人蔑之弗譴也旣而乗間進難舉座傾聽法師疑非丗人覘知大相賞狎又曰劉慧斐字宣文彭城人也少􅀶學能属文起家梁安成王法曹行叅軍常還都途經尋陽遊於匡山遇處士張孝秀相得甚懽遂有終焉之志因不仕居東林寺又於山北構園一所號曰離垢園時人仍謂爲離垢先生慧斐先明}
