  - {type: variant, offset: 787, length: 3, content: 比來慕, WYG: 馬樞字要理扶風郿人也博極經史尤善佛經邵陵王綸為南徐州刺史素聞其名引為學士綸時自講大品經令樞講維摩老子周易同日發題道俗聽者二千人王欲極觀優劣乃謂衆曰與馬學士論義必使屈服不得空立主客於是學者各起問端樞依次剖判開其宗㫖論者拱黙聽授而已綸甚嘉之陳書曰後主沈皇后諱婺華身居儉約唯尋閲圖史及釋典為事常遇歲旱自暴而誦經應時雨降陳亡入隋及煬帝崩自廣陵過江於毘陵天静寺為尼名觀音又曰孫瑒常於山齋設講肆集𤣥儒之士冬夏資奉為學者所稱而處已率易不以名位驕物時興皇寺朗}
