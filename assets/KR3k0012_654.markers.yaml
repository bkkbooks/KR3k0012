  - {type: variant, offset: 864, length: 0, content: '', SBCK: 卷晝夜行道孜孜不怠逺近欽慕之簡文臨江州遺以几杖論者云自逺法師没後將二百年始有張劉之盛矣又曰􅁃詵普通中詔以爲黄門侍郎稱疾不起晚年尤遵釋教宅内立道塲環繞禮懴六時不輟誦法華經毎日一徧後夜中忽見一道人自稱願公容止甚異呼詵爲上行先生授香而去中大通四年因寢忽驚􅁴曰願公復來不可乆駐顔色不變言終而亡舉室咸聞空中唱上行先生巳去彌㢮浄域矣武帝聞而下詔謚節處士以顯髙烈又曰張孝秀字文􅇣長六尺餘白晳羙􅂡眉仕州中從事史後歸山居東林寺有田數十頃部曲數百人率以力田盡供山衆􅀶渉群書專精釋典僧有􅃜戒律者集衆佛前作羯磨而笞之多能改過又曰馬樞字理要扶風郿人也􅀶極經史尤善佛教邵陵王綸爲南徐州刺史素聞其名引爲學士綸時自講大品經令樞講維摩老子周易同日發題道俗聽者二千人王欲極觀優劣乃謂衆曰與馬學士論議必使屈服不得空立主客於是學者各起問端樞依次剖判開其宗㫖論者拱黙聽授而巳綸甚佳之陳書曰後主沈皇后諱婺華身居儉約唯尋閱圖史及釋典爲事常遇歳旱自􅁀而誦佛經應時雨降陳亡入隋及煬帝崩自廣陵過江於毗陵天静寺爲尼名觀音又曰孫瑒常於山齋設講肆集玄儒之士冬夏資奉爲學者}
