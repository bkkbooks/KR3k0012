  - {type: variant, offset: 495, length: 267, content: 天笁維衛國國王夫人名曰淨妙老子因其晝寢乘日精入淨妙口中後年四月八日夜半時剖左腋而生墜地即行七步於是佛道由此而始興焉又玄妙內篇佛經云釋迦成佛有塵劫之數出法華無量壽然二經所說如合符契道則佛也佛則道也其聖則符其跡則反歡雖同二注而意黨道教司徒袁祭託為道人以駮之後魏書釋老志曰凡說教大抵言生生之類皆因行業而起有過去當今未來歷三世識神不滅凡為善惡必有報應漸積勝業陶冶麤鄙經無數形澡練神明乃致無生而得佛道其門階次二行等級非一皆緣淺以致深藉微而為著率在於積仁順蠲嗜欲習虛靜而成通照也其始修心則依佛法僧謂之三歸又有五誡去殺盜媱妄言飲酒大意與仁義禮智信同, SBCK: ''}
