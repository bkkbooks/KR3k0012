  - {type: variant, offset: 770, length: 68, content: 帝溺情內教朝政弛縱輿櫬詣闕上封事曰比來慕法普天信向家家齋戒人人懺禮不事農業空談彼岸夫農業者今日濟育功德者將來勝因豈可惰本勤末置近効賖也時, SBCK: ''}
