  - {type: variant, offset: 771, length: 1, content: 溺, WYG: 大宏佛教而親自講説太子亦素信三寶徧覽衆經乃於宫内别立惠義殿專為法集之所招引名僧自立三諦法義普通元年甘露降於惠義殿咸以為至德所感又曰何𦙍居虎丘西寺講經學僧徒隨之常禁殺有虞人逐鹿鹿徑來趨𦙍伏而不動又有異鳥如鶴紅色集講堂馴狎如家禽初開善寺藏法師與𦙍遇於秦望山後還都卒於鍾山死日𦙍在般若寺見一名僧授𦙍香奩并函書曰貧道發自楊都呈何居士言訖失所在開函乃是大莊嚴論世中未有訪之香奩乃藏公所常用又於寺内立明珠柱乃七日七夜放光昭明太子欽其德遣舍人何思澄致手令以褒美之又曰建平王大球簡文帝十七子也性明慧夙成初侯景圍京城武帝素歸心釋教每發誓願恒云若有衆生應受諸苦悉請身代當時大球年甫七歲聞而驚謂母曰官家尚爾兒安敢辭乃不時禮佛亦曰乃有衆生應獲苦報悉大球代受其早慧如此又曰中大通元年都下疫甚帝於重雲殿為萬姓設救苦齋以身為禱九月癸巳幸同㤗寺設四部無碍大㑹上釋服披法衣清浄大捨以便省為房用素瓦器乘小車私人執役甲午昇法座為大衆講湼槃經癸卯羣臣以億萬奉贖衆僧黙然乙酉百辟詣寺東門奉表請還宫三請乃許帝三答書前後並稱頓首中大同元年二月幸同㤗寺講三慧經乃捨身為奴皇太子已下羣臣出錢億萬奉贖是夜同㤗寺為天火所燒畧盡二年帝昇光嚴殿講三慧經又捨身羣臣以億萬奉贖僧衆嘿然百辟詣鳳莊門上表請帝帝三答皆稱頓首丁亥服袞冕還宫髙祖自初捨身後或書經坐禪盡日不食又於元光殿坐師子座講金字經云又曰貞陽侯明俘執至魏魏帝引見明及諸將晉陽渤海王髙澄禮明甚重謂曰王與梁主和好十有餘年聞彼禮佛文常云為魏主及先王此甚是梁主厚意不謂一朝失信致使紛擾因欲與梁通和又曰初武帝軍東下用不足建安王偉取襄陽寺銅佛以為錢富僧藏鏹多加毒害後遂惡疾王性多恩惠尤愍窮乏每祁寒積雪則遣人載樵米隨乏絶者即賦給之晩年崇信佛理尤精𤣥學著二暗義又製性}
