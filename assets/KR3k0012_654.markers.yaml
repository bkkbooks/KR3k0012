  - {type: variant, offset: 2347, length: 406, content: 九年書史不言其年壽考所極蓋亦非因事佛而致然漢明帝時始有佛法明帝在位纔十八年耳其後亂亡相繼運祚不長宋齊梁陳元魏已下事佛漸謹年代尤促唯梁武帝在位三十八年前後三度捨身施佛宗廟之祭不用牲牢盡日一食止於菜菓其後竟為侯景所逼餓死臺城國亦尋滅事佛求福乃更為禍由此觀之佛不足信也亦可知矣高祖始受隋禪則議除之當時群臣才識不遠不審知先王之道古今之宜推闡聖明以正斯弊其事遂止陛下神聖睿武數百年已來未有倫比即位之初不許度人為僧尼道士又不許創立寺觀臣愚以為高祖之志必行於陛下之身縱未能行豈可恣之轉令盛矣今聞陛下令群僧迎佛骨於鳳翔樓以舁入內又令諸寺送迎供養臣雖至愚必知陛下不惑於佛以祈福也直以年豊人樂徇人之心為京都士庶設詭異之觀戲翫之具耳然百姓愚冥易惑難曉茍見陛下如此將謂真心信佛皆云天子大聖猶一心敬信百姓何人更惜身命以至焚頂燒指百十為群解衣散錢自朝至暮轉相倣傚唯恐後時老少奔波棄其業次若不明加禁遏更歷諸寺必有斷臂臠身以為供養者傷風敗俗傳笑, SBCK: ''}
