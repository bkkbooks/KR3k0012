  - {type: variant, offset: 2754, length: 231, content: 方非細事也夫佛本夷狄之人與中國言語不通衣服殊制口不言先王之法言身不服先王之法服不知君臣之義父子之恩假如其身至今尚在奉其國命來朝京師陛下容而接之不過宣政一見禮賓一設賜衣一襲衛而出境不令惑眾也況其身死已久枯朽之骨凶穢之餘豈令入宮禁孔子曰敬鬼神而遠之古之諸侯行宜於國尚令巫祝以桃茢拂除不祥然後進弔今無故取朽穢之物親臨視之巫祝不先桃茢不用群臣不定其非御史不舉其失臣實恥之乞以此骨付有司投水火永絕根本斷天下之疑絕後代之惑使天下之人知大聖之作為出於尋常萬萬也豈不盛哉豈不快哉, SBCK: ''}
