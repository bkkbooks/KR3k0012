  - {type: variant, offset: 1466, length: 212, content: 子得佛道以來良有益否牟子曰吾自得佛道來如開浮雲見白日如執火炬入冥室矣建康實錄曰吳赤烏十年胡人康僧會入境置經行所朝夕禮念有司以聞帝曰昔漢明帝感夢金人使往西方求之得摩騰笁法蘭來中國立經行教今無乃是遺類乎因引見僧會其言佛教滅度已久唯有舍利可以求請遂於大內立壇結靜三七日得之帝崇佛道以是江東初有佛法高僧傳曰釋惠嚴宋高祖素所知重文帝在位情好尤密先是帝未甚崇信京尹蕭摹之上啟請制起寺及鑄像帝迺與侍中何尚之吏部郎羊玄保等議之謂尚之曰謝靈運, SBCK: 崔光}
