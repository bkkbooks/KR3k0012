  - {type: variant, offset: 141, length: 294, content: 養之似山狗多力獷惡也魋爾雅曰魋如小熊竊毛而黃蜼爾雅曰卬鼻而長尾郭璞注曰似彌猴而大黃黑色長數尺鼻露上面雨則自懸於樹以尾塞鼻或以兩指也鼰爾雅曰鼰鼠身長鬚而賊秦人謂之小驢郭璞曰鼰而鼠而馬喙一歲千斤為物殘賤也豦爾雅曰豦迅頭郭璞注曰今建平山中有豦如狗似獼猴多髯能舉石摘人驨爾雅曰驨音攜如馬而一角不角者騏也㚟說文曰㚟獸似兔青色而大頭與兔同足與鹿同山海經曰湪光之山獸名㚟郭璞曰㚟似兔而鹿腳青色也石穀說文曰穀大木切類犬腰以上黃腰以下黑食母猴或曰穀似䍧羊風土記曰石穀似狢而形短常捕敢猴猨司馬相如上林賦曰獑音讒猢穀䝈音厄猶說文曰猶玃屬一曰隴西謂犬子為猶爾雅曰猶如麂善登木㹠魯連子曰北方有獸名為㹠生而角當心俯厲, SBCK: 􅀲}
