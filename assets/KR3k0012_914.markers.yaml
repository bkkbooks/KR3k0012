  - {type: variant, offset: 15, length: 3, content: 匈奴畜, SBCK: 秦仲知百鳥之音與之語皆應焉又曰楚莊王即位三年不出號令日夜爲樂令國中曰有敢諌者死無赦伍舉入諌莊王左抱鄭􅁎右抱越女坐鍾鼓之間伍舉曰願有進隱隱爲隱藏其意曰有鳥在於阜三年不蜚不鳴是何鳥也莊王曰三年不蜚蜚將冲天三年不鳴鳴將驚人舉退矣吾知之矣又曰楚湏襄王十八年人有好以弱弓微繳加歸鴈之上者王聞而召之問焉對曰小臣之好射鶀音其鴈羅鸗徐廣曰鸗野鳥也音龍小矢之發也何足爲大王道哉且稱楚之國大王之賢所弋非特此也昔者三王以弋道德五伯以弋戰國故􅁗魏燕趙者其鴈也齊魯韓衛者青首也青首小鳬有青者邹費郯邳者羅鸗也外}
