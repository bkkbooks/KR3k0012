  - {type: variant, offset: 7, length: 4, content: 驒騱野馬, SBCK: 獻鳥者佛其首又曰執禽者左首又曰大羅氏天子之掌鳥獸者也又曰鳥皫色而沙鳴鬰皫普表切又曰凢生天地之間者有血氣之}
  - {type: variant, offset: 7, length: 4, content: 驒騱野馬, WYG: 獻鳥者佛其首畜鳥者則勿佛也又曰執禽者左手又曰大羅氏天子之掌鳥獸者也又曰鳥皫色而沙鳴鬱皫普表切又曰凡生天地之間者有血氣之}
