  - {type: variant, offset: 892, length: 1144, content: 臥名曰幽頞或作妭也其鳴自呼也山海經圖讚曰幽頞似猴俾愚作智觸物則笑見人佯睡足訾山海經曰蔓聯之山有獸狀如禺而有鬣牛尾文臂馬蹄見人則笑名曰足訾其鳴自呼也那父山海經曰灌題之山有獸狀如牛而白尾音如叫如人叫喚名曰那父天馬山海經曰馬成之山有獸如白犬而黑頭見人則飛其名天馬其鳴自呼也㔮山海經曰甘棗之山有獸狀如數鼠而文題數鼠未詳名曰那食之治癭朏山海經曰霍山有獸如狸白尾有驪名朏畜之亡憂文山海經曰放皋之山有獸狀如蜂枝尾而反舌善呼名文開明山海經曰開明獸身類虎而九首皆人面東鄉立崑崙窮奇山海經曰封山有獸狀如牛而蝟毛名曰窮奇食人或云窮奇聞人鬭斗乃助不直者文王出獵所獲張揖注上林賦曰窮奇其音如狗嗥神異記曰西北有獸狀如虎有翼名窮奇𥚷褱山海經曰堯光之山有獸如人而彘尻冬蟄名𥚷褱音如斲木如人斫木聲見則其縣有役彘山海經曰浮玉之山有獸狀如虎而牛尾音如犬名曰彘羬羊山海經曰華山之首曰錢來之山有獸狀如羊而馬尾名曰羬羊其胎可以已腊治體腊也囂山海經曰羭次之一山有獸狀如禺而長臂其名曰囂長古山海經曰長古之山有獸狀如禺而四耳名長古因其山名音如吟見則郡縣大水谿邊山海經曰天帝之山有獸狀如狗名谿邊或作遺席其皮者不蠱𤣓山海經曰皋塗之山有獸狀如鹿白尾馬足人手前兩腳似人手而四角名曰玃犰狳山海經曰餘我之山有獸狀如兔鳥喙鴟目虵尾見人則眼言陽死也其名曰犰狳其鳴自叫見則蟲蝗為敗渾沌東方朔神異經曰崑崙西有獸其狀如犬有兩目而不見兩耳而不聞有腹而無五藏有腸直而不旋食而徑過人有德行而往抵𧢻音觸之人有凶惡而往依憑之天使其然名曰渾沌一名無耳一名無心所居無常咋尾回轉向天而笑檮杌東方朔神異經曰西方荒中有獸焉狀如虎而身大虎毛長尺張華注曰言此獸毛皆如豪猪毛也人面虎足口有豬牙尾長一丈八尺名曰檮杌此獸食㺊東方朔神異經曰北方有獸焉其狀如師子食虎食人吹人則病口中吹人名曰㺊恒近人村里入人居室中百姓患苦天帝徙之北方荒中也無損神異經曰南方有獸其狀如鹿豕頭有牙鹿尾善依人求五穀名曰無損其肉可作鮮使瀋呂審也肥美而鮮肉懷吞不入瀋盡更添肉使復以作鮮如初愈久而乃美名曰不盡鮮綢神異經曰西方深山有獸鳥面目手足毛色如猴體大如驢善緣高木皆雌無雄名曰綢須人三合而有子要路強牽男人將上絕冢之上取菓并竊五穀食更合三畢而定十月乃生齧鐵神異經曰南方有獸角足大小狀如水牛其毛黑如漆食鐵而飲水其糞可為兵器其利如鋼名齧鐵飛駭獸洞冥記曰漢武帝時翕韓國獻飛骸獸狀如鹿青色以寒青之絲為繩繫之獸死帝愛而不埋掛之於苑門皮毛皆爛朽唯骨色猶青時人咸知其神更以繩繫其足閉於重觀後數月往觀唯見繩之所繫處頭尾背皆飛去有野人於草間得其斥脊皆能飛起取還以獻帝乃以野人所獻骨脊及頭尾之骨舂為粉以蝙蝠和為丸以療百疾其丸夜視之有光服之體有光明破鏡漢書郊祀志曰古者天子常以春解祠黃帝用破鏡孟康曰獸名食父如黃帝欲絕其類使祠用之破鏡如貙而虎眼也貒, SBCK: 詐}
