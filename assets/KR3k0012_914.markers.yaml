  - {type: variant, offset: 12, length: 0, content: '', SBCK: 必有知之屬莫不知愛其􅀋今是夫鳥獸則失䘮其群匹越月踰時焉則必反廵過其故郷翔廻焉鳴號焉蹢䠱焉踟蹰焉然後乃能去之小者至於䴏雀獨有啁噍之頃焉然後乃能去之故有血氣之屬者莫智於人故人於其親也至死不窮傳曰或叫于宋大廟曰譆譆出岀鳥于毫社如曰譆譆又曰郯子來朝公與之宴叔孫昭子問焉曰少皡氏以鳥名官何郯子曰我髙祖少皡摯之立也鳯鳥適至故紀於鳥爲鳥師而鳥名又曰鳥則擇木木豈能擇鳥詩曰伐木丁丁鳥鳴嚶嚶嚶其鳴矣求其友聲易曰比王用三駈失前禽邑人不誡吉又曰井泥不食舊井無禽又曰旅鳥焚其巢又小過曰有飛鳥之象焉飛鳥遺之音不冝上冝下大􅁻上逆而下順也書曰日中星鳥以殷仲春厥民析鳥獸孳尾孔安國曰乳化曰孳交接曰尾日永星火以正仲夏厥民因鳥獸希革夏時鳥獸毛羽希少改揚革改宵中星虚以殷仲秋厥民夷鳥獸毛毨兟理也毛更生生整理也日短星夘以正仲冬厥民燠鳥獸氄毛鳥獸皆生毳細毛也周書旅􅋙曰珎禽竒獸弗育于國論語曰鳥之將死其鳴也哀又曰鳥獸不可與同羣爾雅曰鳥之雌雄不可别者以翼右掩左雄左掩右雌鳥之美長醜爲鶹􅝎二足而羽謂之禽春秋孔演圖曰鳥化爲書孔子奉以告天赤爵集書上化爲黄玉刻曰孔提命仰應法爲赤制又曰黒帝治生五角之禽以觸民宋均注曰陽數玉也春秋考異郵曰鳥魚者隂中陽陽中隂皆􅆑生以􅀋翔故魚從水鳥從陽凢飛翔羽翮柔良之獸皆爲陽陽氣仁故鳥哺公鳥飛於風魚浮之水是故陽氣輕勁也含二氣故生吞齕者八竅而􅆑生鳥雞􅀋也序命暦羲皇燧人始名物蟲鳥獸之名尚書考靈曜曰鳥爲春􅀱歸藏啓筮曰金水之子其名曰羽蒙乃占之曰羽民是生百鳥}
