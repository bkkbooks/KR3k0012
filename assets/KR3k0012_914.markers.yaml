  - {type: variant, offset: 2111, length: 63, content: 尾端分為兩條天雨便以插鼻孔中水不入性畏人見人則顛倒投擲或墮地奔走無所迴避觸樹衝石或至破頭折脛俗人罵恃力人云癡如蜼張揖注上林賦曰, krp: 毛落紛紛雷息電滅鳥亦髙}
  - {type: variant, offset: 2115, length: 305, content: 兩條天雨便以插鼻孔中水不入性畏人見人則顛倒投擲或墮地奔走無所迴避觸樹衝石或至破頭折脛俗人罵恃力人云癡如蜼張揖注上林賦曰飛蜼飛鼠也其狀如兔而鼠首以其髯飛郭璞曰鼯鼠也毛紫赤色一名飛生麡狼異物志曰麡狼狀似鹿而角前向入林挂角故恒在平淺草中肉肥脆香美逐入林則得之皮可作履襪角正西據南人因以作路床兩頭獸盛弘之荊州記曰武陵郡西有陽山山有獸如鹿前後有頭常以一頭食一頭行山中有時見之者獑猢蜀地志曰獑猢獸似獼猴為獸奇捷常在樹上歘然騰躍百步五十步若鳥黃要蜀地志曰黃要獸一名墠微一名虔已鼬身狐首生子長大自活群逐其母令不得飲食將有所求而先見此獸則不得矣含利張衡西京賦曰含利呀呀化為仙車鄭氏婚禮謁文讚曰含利為獸廉而能謙禮義乃食口無譏愆茲白, WYG: 患}
