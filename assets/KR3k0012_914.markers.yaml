  - {type: variant, offset: 2068, length: 2, content: 多狖, SBCK: 官禁民不得殺傷此鳥犯者刑之無赦㑹稽典録曰夏方字文昌家遭癘父母伯叔一時死九十三喪方年十四晝則􅀒土哀號暮則扶棺哭泣比葬年十七烏鳥集聚猛獸乳其側幽明録曰符堅時有射師經嵩山望見松樹上有一􅀟白鳥}
