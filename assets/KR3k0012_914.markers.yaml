  front:
  - {type: variant, offset: 0, length: 1, content: 雜, SBCK: 太平御覽卷第九百一十四羽族部一鳥周禮曰庖人供六禽辯其名物六禽鴈鶉鷃雉鳩鴿又曰中秋献良裘王乃行羽物行羽物以飛鳥賜群吏中秋鳩化爲鷹順其始殺大班羽物又曰射鳥氏掌射鳥􅀕祀以弓矢歐烏鳶凢賔客㑹同軍旅亦如之又曰羅氏掌羅烏鳥蜡則作羅􅃭天子大蜡謂十二月合取万物而素饗之􅃭細宻之羅又曰中春羅春鳥獻鳩以養國老行羽物春鳥蟄而始出是時鴈化爲鳩折春鳥變舊爲新冝以養老生氣行謂賦物又曰掌畜掌養鳥而阜蕃教擾之鳥之可養盛大蕃息􅀕祀供夘鳥其夘丙薦之鳥四時貢鳥物鴞鴈之属以四時來共膳獻之鳥雉及鶉駕之属又曰翨氏翨音翼掌攻猛鳥各以其物爲媒而掎之猛鳥鴈隼之属置其所養之物於絹中鳥未下則掎其脚以時獻其羽翮又曰硩簇氏硩音摘又他歴切簇音蒼獨切掌覆夭鳥之巢覆毀也夭鳥惡鳴之鳥若鴞鵩以方書十日之號十有二辰之號十有二月之號十有一歳之號又曰庭氏掌射國中之夭鳥􅀂不見其鳥}
