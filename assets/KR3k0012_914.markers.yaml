  - {type: variant, offset: 2053, length: 9, content: 鼠狖屬善旋吳錄地里, krp: 景公好弋使顔涿主聚鳥而亡公召吏殺之晏子曰諸侯聞之以君重鳥輕士公曰勿殺春秋後語淳于髠曰夫鳥同翼者聚飛而獸同足者俱行各有儔也又曰魏有更羸脉者與王處廪下仰見飛鳥引弓虚發而鳥墮下魏王恠而問曰何以得至此羸脉曰此孽生也生曰先生何以知之對曰其飛徐其鳴悲其飛徐者故瘡痛也其鳴悲者乆失群也故瘡未息而驚心未去聞弦音烈而髙飛故隕也孽餘也先𬒳傷而餘瘡未差故聞弦聲而奮驚而隕也五違切創與瘡同又曰燕王使騎刼代樂毅奔趙王卒離心田單乃令城中食者先祭先祖於庭中飛鳥悉飛舞其上或下啄其食燕人皆恠之穆天子傳曰曠原之野飛鳥之所解羽春之山飛鳥之所拪㫪山之澤清水温泉飛鳥百獸之所飲食家語曰孔子在衛顔回侍側聞哭聲甚哀子曰回汝知此何哭對曰此哭非但爲死又爲生離回聞桓山之鳥生四子焉羽翼旣成將分于四海其母悲鳴而送之哀聲有似於此謂其往而不返也回竊以音類而知之又曰蒼鳥群飛熟使萃之蒼鳥蒼鴈又曰稷帝投之水上鳥何燠投弃燠温鳥以羽翼覆薦温之白虎通曰鳥所以飛何鳥者陽也飄輕故飛也禽者何鳥獸之揔名明爲人所禽制蔡邕月令章句曰天官五獸前有朱雀鶉火之體凢鳥生於水衝波傳曰顔淵子路於洙泗見五鳥色由熒熒之鳥也見色分明故曰熒熒廣}
