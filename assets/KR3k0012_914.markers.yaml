  - {type: variant, offset: 43, length: 2, content: 昆蹄, SBCK: 九戲多端何急彈此鳥自空中翔飛何關人事無趣殺此生左右感其言遂不復彈鳥梁書曰何胤退居吴武丘寺講經論常禁殺有異鳥如鶴紅色集講堂馴狎如家禽南史曰海中浮鵠山去地千餘里上有女人年三百歳有女道士百四五人年並出百俱在山中學道遣使獻紅席梁武帝方捨身時其使適至此草常有紅鳥居下故以名觀其圖狀則鸞鳥也又曰梁武帝捨身時有男子不知何許人於衆中自割身以飴飢鳥血流遍體而顔色不變開講日有三足鳥集殿開講日有三足鳥集殿}
  - {type: page-break, offset: 43, content: '', id: KR3k0012_SBCK_914-4b}
  - {type: variant, offset: 43, length: 2, content: 昆蹄, WYG: 凡戱多端何急弹此鳥自空中翔飛何闗人事左右感其言遂不復弹鳥梁書曰何𦙍居獸丘西寺講經論學徒隨}
  - {type: variant, offset: 43, length: 2, content: 昆蹄, krp: 九戲多端何急彈此鳥自空中翔飛何關人事無趣殺此生左右感其言遂不復彈鳥梁書曰何胤退居吴武丘寺講經論常禁殺有異鳥如鶴紅色集講堂馴狎如家禽南史曰海中浮鵠山去地千餘里上有女人年三百歳有女道士百四五人年並出百俱在山中學道遣使獻紅席梁武帝方捨身時其使適至此草常有紅鳥居下故以名觀其圖狀則鸞鳥也又曰梁武帝捨身時有男子不知何許人於衆中自割身以飴飢鳥血流遍體而顔色不變開講日有三足鳥集殿開講日有三足鳥集殿}
  - {type: variant, offset: 46, length: 0, content: '', SBCK: 東户自戸適于西南懸楣三飛三集白雀一見于重雲閣前連李樹後魏書曰波斯國有鳥形如橐駞有羽翼飛而不能髙食草與肉亦能噉火馳走甚疾一日能七百里也又曰彭城王􅎰從􅃆北除使持節都督南征諸軍事正中軍大將軍府􅎰於是親勒大衆湏􅁷有二大鳥從南而來一向行宫一向府幕各爲所獲􅎰言於帝曰始有一鳥望旗顛仆臣謂大􅁻帝戲之曰鳥之畏威豈獨中軍之略也吾亦分其一耳此乃大善北史曰周豆盧勣爲渭州刺史鳥䑕山絶壁千仞由來乏水諸羗苦之勣}
  - {type: page-break, offset: 46, content: '', id: KR3k0012_SBCK_914-5a}
  - {type: variant, offset: 46, length: 0, content: '', WYG: 有異鳥如鶴集講堂馴狎如家禽南史曰海中浮鵠山去地千餘里上有女人年三百歳有女道士百四十五人年並出百俱在學道遣士獻紅席梁武帝方捨身時其使適至云其草常有紅鳥居下故以為名觀其圖狀則鸞鳥也又曰梁武帝捨身時有男子不知何許人於衆中自割身以飼饑鳥血流遍體而顔色不變開講日有三足鳥集殿之東户自户適於西南縁楣三飛三集白雀一見於重雲閣前李樹後魏書曰波斯國有鳥形如槖駞有羽翼飛而不能髙食草與肉亦能噉火又曰彭城王􅎰従沔北除使持莭都督南征諸軍事立中軍大將軍府􅎰於是親勒大衆須臾有二大鳥従南而来一向行宫一向府幕各為所獲􅎰言於帝曰始有一鳥望旗顛仆臣謂大吉帝戲之曰鳥之畏威豈獨中軍之略也吾亦分其一耳此乃大善北史曰后周盧勣為渭州刺史鳥䑕山絶壁千仞由来乏水諸羌苦之勣}
