  - {type: variant, offset: 511, length: 310, content: 天狗山海經曰陰山濁谷之水出焉有狩狀如狸或作狗白首名曰天狗可以禦凶獜山海經曰依軲之山有狩焉狀如虎有瓜甲名曰獜言體有鮮甲也食之不畏風𤡷獀山海經曰𤡷獸食猛獸鹿蜀山海經曰杻陽之山有獸狀如馬而白文頭如虎而長尾其音如謠如人歌其名曰鹿蜀佩之宜子孫山海經圖讚曰鹿蜀之獸馬質虎文驤首吟鳴矯矯騰群佩其皮毛子孫如雲類山海經曰亶受之山有獸狀如狸而有髮其名曰類自為牝牡食者不妒猼訑山海經曰基山有獸其狀如羊九尾四目其目在背名曰猼訑佩之不畏山海經圖讚曰猼訑似羊眼乃在背視之則奇推之無怪欲不恐懼厥皮可佩狸力山海經曰拒山有獸狀如豚有距其音如狗吠其名曰狸力見則其縣多土功土螻山海經曰崑崙之丘有獸焉其狀如羊而四角名曰土螻讙讙山海經曰翼望之山或作王翠有獸狀如狸, SBCK: 今爲}
