  - {type: variant, offset: 34, length: 3, content: 昆蹄研, SBCK: 六􅀟唯王何取王何不以聖人爲弓勇士爲繳時張而射之此六􅀟者可得而囊載也其樂非特朝夕之樂也其獲非特鳬鴈之實也漢武故事曰武帝作玉堂以玉壁薄椽頭鑄爲太鳥黄金􅂗長五丈拪屋上續漢書曰楊震將葬大鳥來止亭樹下地安行到柩前正立低頭淚出衆人更共摩牧抱特終不驚駭其鳥五色髙丈餘兩翼長二丈三尺人莫知其名也魏志曰髙唐隆臨終上䟽諌明帝臣觀黄􅀄之際天兆其戒異􅀋之鳥育長鷰巢口􅀲俱赤此魏室之大異也晉書曰趙王倫篡位時於殿上得異鳥問皆不知名其日向夕宫西有素衣小皃言是服劉鳥倫使録小兒并鳥閉置空室明旦開視户如故並失人鳥所在倫目上有廇以爲妖焉南史曰甄恬字彦約中山無極人也居江陵數歳喪父哀感有􅀂成人家貧養母常得珎羞及居喪廬於墓側􅁪有鳥􅀇黄雜色集於廬樹恬􅂘則鳴􅂘止則止齊書曰曲江公蕭遥欣年七歳出齊時有一左右小兒}
  - {type: page-break, offset: 34, content: '', id: KR3k0012_SBCK_914-4a}
  - {type: variant, offset: 34, length: 3, content: 昆蹄研, WYG: 髙唐隆臨終上疏諫明帝臣觀黄初之際天兆其戒異類之鳥育長鷰巢口爪俱赤此魏室之大異也晉書曰趙王倫篡位時有異鳥行於殿上問羣下皆不知名其日向夕宫西有素衣小兒言是服劉鳥倫使録小兒并鳥閉置空室明旦開視户如故並失人鳥所在倫目上有瘤以為妖焉南史曰甄括字彦約中山無極人也居江陵數歳䘮父哀感有若成人家貧養母常得珎羞及居䘮廬於墓側恒有鳥𤣥黄雜色集於廬樹括哭則鳴括止則止齊書曰曲江公蕭欣年七歳出齋時有一左右小兒}
