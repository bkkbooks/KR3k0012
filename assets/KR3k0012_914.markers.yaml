  - {type: variant, offset: 0, length: 1, content: 雜, WYG: 欽定四庫全書太平御覽卷九百十四宋李昉等撰羽族部一鳥周禮曰庖人供六禽辨其名物六禽雁鶉鷃雉鳩鴿又曰中秋獻良裘王乃行羽物行羽物以飛鳥賜羣吏中秋鳩化為鷹順始殺大班羽物又曰射鳥氏掌射鳥祭祀以弓矢敺鳥鳶凡賔客㑹同軍旅亦如之又曰羅氏掌羅烏鳥蜡則作羅襦大蜡歲十二月合取萬物而索饗之襦細宻之羅又曰仲春羅春鳥獻鳩以養國老行羽物春鳥蟄而始出是時鷹化為鳩與春鳥變舊為新宜以養老生氣行謂賜物又曰掌畜掌養鳥而阜蕃教擾之阜猶盛也蕃蕃息也祭祀供卵鳥其卵可薦之鳥歲時貢鳥物鴞鴈之屬以四時来共膳獻之鳥雉及鶉鴽之屬又曰翨氏翨音翼掌攻猛鳥各以其物為媒而掎之猛鳥鷹隼之屬置其所食之物於絹中鳥來下則掎其脚以時獻其羽翮又曰哲簇氏哲音摘又他歴切簇音倉獨切掌覆夭鳥之巢覆毁也夭鳥惡鳴之鳥若鴞鵩以方書十日之號十有二辰之號十有二月之號十有二歳之號又曰庭氏掌射國之夭鳥若不見其鳥}
