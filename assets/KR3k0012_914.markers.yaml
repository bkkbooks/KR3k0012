  - {type: variant, offset: 2424, length: 1, content: 茲, WYG: 子路與子貢過鄭神社社樹有鳥子路捕鳥神社牽攣子路子貢説之乃止又曰稽山之隂禹塟焉聖人化感鳥獸故象為民佃春耕鳥啣㧞草根秋啄除其穢故縣官禁民不得殺傷此鳥犯者刑之無赦會稽典録曰夏方字文玉家遭癘父母伯叔一時死凡十三䘮方年十四晝則負土哀號暮則撫棺哭泣比葬年十七烏鳥集聚猛獸乳其側幽明録曰苻堅時有射師經嵩山望見松上有一䨇}
