  - {type: variant, offset: 19, length: 5, content: 駃古穴切騠, SBCK: 其餘不足射也見鳥六􅀟以喻}
  - {type: variant, offset: 19, length: 5, content: 駃古穴切騠, WYG: 不足射也見鳥六䨇以喻上文秦趙等十二國故曰六雙唯王所取王何不以聖人為弓勇士為繳時張而射之此六雙者可得而囊載也其樂非特朝夕之樂也其獲非特鳬雁之實也漢武故事曰武帝作玊堂以玉璧薄椽頭鑄為大鳥黄金塗長五丈栖屋上續漢書曰楊震将􅌾大鳥来止亭樹}
