  - {type: page-break, offset: 12, content: '', id: KR3k0012_SBCK_914-2b}
  - {type: page-break, offset: 12, content: '', id: KR3k0012_SBCK_914-3a}
  - {type: variant, offset: 12, length: 0, content: '', WYG: 必有知有知之屬莫不知愛其類今是大鳥獸則失喪其羣匹越月踰時焉則必反巡過其故鄉翔回焉鳴號焉蹢躅焉踟蹰焉然後乃能去之小者至扵燕雀猶有啁噍之頃焉然後乃能去之凡有血氣之屬者莫知扵人故人扵其親也至死不窮左傳曰郯子來朝公與之晏叔孫昭子問焉曰少皥氏以鳥名官何郯子曰我髙祖少皥氏之立也鳯鳥適至故紀扵鳥為鳥師而鳥名詩曰伐木丁丁鳥鳴嚶嚶嚶其鳴矣求其友聲易曰比王用三驅失前禽邑人不誡吉又曰井泥不食舊井無禽又曰旅鳥焚其巢又曰小過有飛鳥之象焉飛鳥遺之音不宜上宜下大吉上逆而下順也書曰日中星鳥以殷仲春厥民析鳥獸孳尾孔安國曰乳化曰孳交接曰尾日永星火以正仲夏厥民因鳥獸希革夏時鳥獸毛羽希少改易改革也宵中星虛以殷仲秋厥民夷鳥獸毛毨毨理也毛更生整理也日短星昴以正仲冬厥民隩鳥獸氄毛鳥獸皆生耎毳細毛也周書旅獒曰珍禽竒獸不育于國論語曰鳥之將死其鳴也哀又曰鳥獸不可與同羣爾雅曰鳥之雌雄不可别者以翼右掩左雄左掩右雌鳥少美長醜為鶹鷅二足而羽謂之禽春秋孔演圖曰鳥化為書孔子奉以告天赤鵲集書上化為黄玉刻曰孔提命仰應法為赤制又曰黑帝治五角之禽以觸民宋灼注曰陽數五也瑞應帝王世紀曰禹葬㑹稽有羣鳥為民田春耕則銜去草根秋則啄除其蕪穢謂之鳥社禽經曰山禽之咮多短水禽之咮多長山禽之尾多修水禽之尾多促林鳥以朝嘲水鳥以夜㖡序命厯曰羲皇燧人始名物蟲鳥獸尚書考靈曜曰鳥為春候歸蔵啓筮曰金水之子其名曰羽蒙乃之羽民是生百鳥}
