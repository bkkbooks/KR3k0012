  - {type: variant, offset: 2040, length: 1, content: 貒, SBCK: 鳥排空而飛獸蹶石而走又曰射者扞鳥號之弓彎綦衛之箭重之羽蓬蒙子之巧以要飛鳥猶不能與羅者競多何則以所持之小也張天下以爲之籠因江海以爲􅅈又何亡魚失鳥之有乎又曰一目之羅不可以得鳥無餌之鈎不可以得魚遇士無禮不可以得賢德又曰毛羽者飛行之􅀋也故屬於陽又曰繫舟水中鳥聞之髙翔魚聞之沉淵又曰鳥不于防者雖近弗䠶鳥燕之属是也其當道者雖逺弗釋當道謂作防客者故曰不釋也又曰夫飛鳥主巢狐狸主穴巢者巢成而得􅀫焉趍捨行義亦人之所捿􅀫也又曰鳥魚皆生於陰屬於陽故鳥魚皆夘魚游於水鳥翔於雲又曰羽嘉生飛龍羽加羽蟲之先也蜚龍龍之有羽者飛龍生鳯皇鳯皇生鸞鳥鸞鳥生庻鳥九羽者生於庻鳥也又曰蒲且之連鳥於百仞之上而詹何之鶩魚於大淵之中此皆得清浄之道也又曰羽者嫗伏毛者孕育淮南萬畢術曰人靣擊地飛鳥自下取蘗木爲人形似鳥而血塗人面以擊地飛鳥自下抱朴子軍術曰衆鳥群飛徘徊軍上不過三日有􅁀兵至焉鳥聚軍中將當賞功増秩鳥集將軍之旗將軍増官鳥集軍中莫}
