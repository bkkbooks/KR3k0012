  - {type: variant, offset: 2326, length: 354, content: 步若鳥黃要蜀地志曰黃要獸一名墠微一名虔已鼬身狐首生子長大自活群逐其母令不得飲食將有所求而先見此獸則不得矣含利張衡西京賦曰含利呀呀化為仙車鄭氏婚禮謁文讚曰含利為獸廉而能謙禮義乃食口無譏愆茲白博物志曰茲白若白馬踞牙食虎豹其狀如昔耳身若虎豹尾長參其身虎豹博物志曰逢伯雲所說有獸緣木綠文似豹名虎僕毛可為筆聆鼠博物志曰丹裏之山有獸焉狀如鼠名曰聆鼠以其尾飛也𡐨羊張揖注上林賦曰𡐨羊麢羊也似羊而青猛氏孟康注上林賦曰蝦蛤猛氏皆獸名郭璞曰今蜀中有獸狀如熊而小毛淺有光澤名猛氏飛遽張揖注上林賦曰飛遽天上神獸鹿頭而龍身射干郭璞注子虛賦曰騰遠射干張揖注曰騰遠獸也射干似緣狐能木獌狿郭璞注子虛賦曰獌狿大獸似狸長百尋蒲勞李善注東都賦曰海畔獸名蒲勞性畏鯨每食於海畔鯨輕躍擊之蒲勞則鳴聲如鍾今人多鑄蒲勞之形於鍾上斲撞作鯨形以擊鍾天子出則擊之, SBCK: 四}
