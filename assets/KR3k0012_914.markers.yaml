  - {type: variant, offset: 2053, length: 9, content: 鼠狖屬善旋吳錄地里, WYG: 景公好弋使顔涿聚主鳥而亡公召欲殺之晏子曰涿聚有三罪為君主鳥而亡之一也使君以鳥殺人二也諸侯聞之以君重鳥輕士三也公曰勿殺之春秋後語淳于髠曰夫鳥同翼者聚飛而獸同足者俱行各有儔也又曰魏有吏羸脉者與王處廩下仰見飛鳥引弓虛發而鳥墮下魏王怪而問曰何以得致此羸脉曰此蘗生也王曰先生何以知之對曰其飛徐其鳴悲其飛徐者故瘡痛也其鳴悲者久失羣也故瘡未息而驚心未去聞弦音烈而髙飛故隕也蘗餘也先被傷而餘瘡未差故聞弦聲而舊瘡驚而隕也羸五違切瘡與創同又曰燕王使騎刼代將樂毅奔趙士卒離心田單乃令城中食者先祭先祖於庭中飛鳥悉飛舞其上啄其食燕人皆怪之穆天子傳曰曠原之野飛鳥之所觧羽春山飛鳥之所栖息清水温泉飛鳥百獸之所飲食家語曰孔子在衛顔回侍側聞哭聲甚哀子曰回汝知此何哭對曰此哭非但為死又為生離回聞桓山之鳥生四子焉羽翼既成将分於四海其母悲鳴而送之哀聲有似於此謂其往而不返也回竊以音類而知之又曰蒼鳥羣飛孰使萃之蒼鳥蒼鷹楚辭曰稷維元子帝何笁之投之于氷上鳥何燠之笁厚也篤也一曰笁字當為天祝予之祝投棄也燠温也鳥以羽翼覆温之白虎通曰鳥能飛何鳥者陽也飄輕故飛也禽者何鳥獸之摠名明為人所禽制蔡邕月令章句曰天官五獸前有朱雀鶉火之體凡鳥生於水衝波傳曰顔淵子路於洙泗見五鳥色曰焚巢之鳥也廣}
