  - {type: variant, offset: 37, length: 5, content: 使愛而不能, WYG: 亂及莅汴州解其酷法以仁惠為治去其太甚軍民感恱翕然從化後竟為善地又曰柳公綽鎮鄂州時吴元濟叛公綽請討之鄂軍既在行營公綽時}
