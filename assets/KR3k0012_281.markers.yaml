  - {type: variant, offset: 452, length: 3, content: 田橫據, SBCK: 昔􅁗繆公乗馬而車爲敗右服失而野人取之四馬車兩馬在中爲服詩曰兩服上襄兩在邊爲驂繆公自徃求焉見野人方將食之於歧山之陽繆公􅀏曰食駿馬之肉不還飲酒余恐其傷汝也偏飲而去之處一年爲韓原之戰晉人巳環繆公之車矣晉梁由靡巳扣繆公之左驂矣扣持晋惠公之右路右奮役而擊繆公其甲之抎者巳六扎矣抎者配隕也文}
