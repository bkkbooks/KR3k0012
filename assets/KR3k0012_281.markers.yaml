  - {type: 'tls:seg', offset: 15, content: '', id: KR3k0012_CHANT_281-1a.5}
  - {type: variant, offset: 18, length: 0, content: '', WYG: 逆賊同生日月下今戰卒数萬皆棄妻子蹈白刃光顔奈何獨以女色為樂言訖涕泣嗚咽堂下兵十数萬皆感激流涕乃厚以縑帛酬來使俾令領其妓自席上而廽乃謂使者曰為光顔多謝令公光顔事君許國}
  - {type: variant, offset: 19, length: 0, content: '', WYG: 心死無貳矣明日遂大戰兵士無不一當百終殄蔡孽光顔功最居多又曰令狐楚為汴州刺史汴軍素驕累逐主帥前使韓𢎞兄弟率以峻法䋲之人皆偷生未能革志楚長於撫理前鎮河陽代烏重𦙍重𦙍移鎮滄州以河陽軍三千人為牙卒咸不願從中路而歸又不敢歸州聚於境上楚初}
  - {type: page-break, offset: 19, content: '', id: KR3k0012_WYG_281-4a, image: WYG0895/WYG0895-0483c.png}
  - {type: variant, offset: 20, length: 3, content: 深谿視, WYG: 任聞之乃疾驅赴懐州潰}
