  - {type: variant, offset: 566, length: 4, content: 見我面貌, krp: 臣常在前五合五獲首却敵卒得勝之莊王怪而問曰寡人德薄又未嘗異子子何故出死不疑如是對曰臣當死徃者醉失禮王隱忍不暴而誅也臣終不敢以䕃蔽之德而不顯報王也常願肝腦塗地用頸血濺敵乆矣臣乃夜絶纓者也遂斥晉軍楚得以強此有隂德者必有陽報也又曰平原君旣歸趙楚使春申君將兵救趙魏信陵君亦矯奪晉鄙軍徃救趙未至秦急圍邯鄲邯鄲急且降平原君患之甚邯鄲傳舎吏子李談謂平原君曰君不憂趙亡乎平原君曰趙亡即勝虜何爲不憂李談曰邯鄲之民炊骨易子而食之可謂至因而君之後宫百數婦妾荷綺縠厨粮餘梁肉士民兵盡或剡木爲矛㦸而君之器物鍾磬自恣若使秦破趙君安得有此使趙而全君誠能令夫人以下徧於士卒間分功作之家所有盡散以饗士方其危苦時易惠}
