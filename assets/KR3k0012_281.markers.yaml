  - {type: variant, offset: 57, length: 0, content: '', SBCK: 衣衫乎將士聞之無不感涕至五月諸道財賦稍至先令給將士衣服而後御衫又曰李光顔爲陳許節度使㑹討呉元濟詔光顔以夲軍獨當一靣光顔性忠義善撫養士卒士卒樂爲用毎戰甚苦及賊將鄧懷金以郾城兵三千人降光顔益堅平賊之志時韓弘爲汴帥驕矜倔強常恃賊􅀔索朝􅋝姑息且惡光顔力戰隂圖撓屈計無所施遂舉大梁城求得一美婦人教以歌舞􅃶管六愽之藝飾之以珠翠金玉衣服之具計費凢數百萬命使者送遺光顔兾光顏一見恱惑而怠於軍政也使者即賫書先造光顔戰壘曰夲使令公德公私愛憂公暴露欲進一妓以慰公征役之思謹以候命光顔曰今日巳暮明旦納焉詰朝光顔乃大宴軍士三軍咸集命使者進妓妓至則容止端麗殆非人間所有一座皆驚光顔乃於座上謂來使曰令公憐光顔離家室乆捨美妓見贈誠有以荷德也然光顔受國恩􅀷誓不與逆賊同生日月下今戰卒數萬皆弃妻子蹈白刃光顔奈何獨以女色爲樂言訖涕泣嗚咽堂下兵士數萬皆感激流涕乃厚以縑帛酬來使俾令領其妓自席上而迴仍謂使者曰爲光顔多謝令公光顔事君許國之心死無貳矣明日遂大戰兵士無不一當百終殄蔡孽光顔功㝡居多又曰令狐楚爲汴州刺史汴軍素驕累逐主帥前使韓弘兄弟率以峻法繩之人皆偷生未能革志楚長於撫理前鎭河陽代烏重胤重胤移鎮滄州以河陽軍三千人爲牙卒咸不願從中路叛歸又不敢歸州聚於境上楚􅀄赴任聞之乃疾驅赴懷州潰卒亦至楚單􅀐喻之咸令櫜弓解甲用爲前驅卒不敢亂及蒞汴州解其酷法以仁惠爲治去其太甚軍民感恱翕然從化後竟爲善地又曰栁公綽鎭鄂州時呉元濟叛公綽請討之鄂軍旣}
  - {type: page-break, offset: 57, content: '', id: KR3k0012_SBCK_281-2a}
  - {type: page-break, offset: 57, content: '', id: KR3k0012_SBCK_281-2b}
