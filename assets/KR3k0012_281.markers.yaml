  - {type: variant, offset: 11, length: 44, content: 卒如嬰兒故可與之赴深谿視卒如愛子故可與之俱死厚而不能使愛而不能令亂而不能理恩不可專用罰不, SBCK: 朝左右請御衫上曰將士從我者冬服未易我豈}
  - {type: variant, offset: 11, length: 0, content: '', WYG: 朝左右請御衫上曰將士從我者冬服未易我豈可獨衣衫乎將士聞之無不感涕至五月諸道財賦稍至先令給將士衣服而後御衫又曰李光顔為陳許節度使㑹討吴元濟詔光顔以本軍獨當一靣光顔性忠義善撫養士}
  - {type: variant, offset: 11, length: 44, content: 卒如嬰兒故可與之赴深谿視卒如愛子故可與之俱死厚而不能使愛而不能令亂而不能理恩不可專用罰不, krp: 朝左右請御衫上曰將士從我者冬服未易我豈}
  - {type: variant, offset: 12, length: 5, content: 如嬰兒故可, WYG: 士卒樂為用每戰甚苦及賊將鄧懐金以郾城兵三千人降光顔益堅平賊之志時韓𢎞為汴師驕矜崛强常恃賊勢索朝廷姑息且惡光顔力戰隂圖撓屈計無所施遂舉大梁城求得一美婦人教以歌舞絃管六博之藝飾之以珠翠金玉衣服之具計費凢數百萬命使者送遣光顔冀光顔一見恱惑而怠於軍政也使者即賫書先造光顔戰壘曰本使令公徳公私愛憂公暴露欲進一妓以慰公征役之思謹以候命光顔曰今日已暮明旦納焉詰朝光顔乃大宴軍士三軍咸集命使者進妓妓至則容止端䴡殆非人間所有一座皆驚光顔乃於座上謂來使曰令公憐光顔離家室久以美妓見贈誠有以荷徳也然光顔受國深恩誓不}
  - {type: page-break, offset: 12, content: '', id: KR3k0012_WYG_281-3a, image: WYG0895/WYG0895-0483a.png}
  - {type: page-break, offset: 12, content: '', id: KR3k0012_WYG_281-3b, image: WYG0895/WYG0895-0483b.png}
