  - {type: 'tls:seg', offset: 562, content: '', id: KR3k0012_CHANT_281-6a.33}
  - {type: variant, offset: 563, length: 1, content: 過, SBCK: 難爲之死下事上如兄則不難爲之亡是故父子兄弟之宼不可與􅃲者積恩先施也故四馬不調造父不能以致逺弓矢不調羿不能以必中君臣乖心則孫子不能以應敵孫子名武呉王闔閭之將也是故内脩其政以積其德外塞其醜以服其威察其勞佚以知其飽飢故戰日有期視死􅀂歸故將必與卒同甘苦共飢寒故其死可得而盡也􅀃苑曰楚莊王賜羣臣酒多燈燭滅乃有人引美人衣者美人援絶其冠纓吿王曰今者燭滅有引妾衣者妾援得其冠纓持之趣火來上視絶纓者曰賜人酒使醉失禮奈何}
  - {type: page-break, offset: 563, content: '', id: KR3k0012_SBCK_281-5b}
  - {type: variant, offset: 563, length: 1, content: 過, WYG: 難為之死下事上如兄則不難為之亡是故父子兄弟之冦不可與鬬者積恩先施也故四馬不調造父不能以致逺弓矢不調羿不能以必中君臣乖心則孫子不能以應敵孫子名武吴王闔閭之將也是故内脩其政以積其徳外塞其醜以服其威察其勞佚以知其飽飢故戰日有期視死若歸故將必與卒同甘苦俟飢寒故其死可得而盡也說苑曰楚荘王賜羣臣酒多燈燭滅乃有人引美人衣者美人援絶其冠纓告王曰今者燭滅有引妾衣者妾援得其冠纓持之趣火來上視絶纓者曰賜人酒使醉失禮奈何}
