  - {type: variant, offset: 6, length: 0, content: '', SBCK: 下唐書曰太宗征遼車駕次遼澤下詔曰日者隋師渡遼時非天賛從軍士卒骸骨相望遍於原野良可哀歎掩骼之義抑惟先典其令並收葬之又曰建中二年田恱攻臨洺守將張伾以軍事連戰巳苦府藏巳竭私産亦罄而賞之不賙乃飾其愛女出示於衆曰室家所有一女而巳請估而給焉軍中感之曰願以一死􅃲不敢言賞遂大破之又曰馬燧旣敗田恱以功加右僕射先戰燧誓於軍中戰勝請以家財行賞旣戰盡其私積以頒將士}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 下撫士下唐書曰太宗征遼車駕次遼澤下詔曰日者隋師渡遼時非天賛從軍士卒骸骨相望遍於原野良可哀歎掩骼之義仰惟先典其令並收𦵏之又曰建中十年田悅攻臨淄守將張伾以軍士連戰已苦府藏已竭私産亦罄而賞之不周乃飾其愛女出示於衆曰室家所有一女而已請估而給焉軍中感之曰願以一死鬬不敢言賞遂大破悅又曰馬燧既敗田悅以功加右僕射先戰燧誓於軍中戰勝請以家財行賞既戰盡其私積以頒將士}
