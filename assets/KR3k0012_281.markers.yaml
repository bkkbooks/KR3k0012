  - {type: variant, offset: 555, length: 1, content: 陛, SBCK: 􅁗穆公伐晉及河將勞師而醪唯飲一鍾蹇叔曰一米可投河而釀也穆公乃以一醪投河三軍醉矣三略曰夫將之爲帥者必同滋味共安危人有遺一簞之醪者使投諸河令士衆向流而挹之夫一簞之醪不能味一河然而三軍之士思爲之死者何也以滋味及巳也又曰用兵之要在於崇禮而重禄崇髙也禄廪食也崇禮則賢士至重禄則戎士輕死賢士至謂􅀂燕禮郭隗而樂毅之徒鱗集也故曰重賞之下必有死夫又曰良將之統軍也恕巳活人推惠施恩士力日親戰如風發攻如河決淮南子曰古人善將者必以其身先之暑不張蓋寒不􅀍裘所以均寒暑也隂陽不乗上陵必}
  - {type: page-break, offset: 555, content: '', id: KR3k0012_SBCK_281-4b}
  - {type: variant, offset: 555, length: 1, content: 陛, WYG: 秦穆公伐晉及河將勞師而醪唯餘一鍾蹇叔曰一米可投河而釀也穆公乃以一醪投河三軍醉矣三略曰夫將之為帥者必同滋味共安危人有遺一簞之醪者使投諸河令士衆向流而挹之夫一簞之醪不能味一河然而三軍之士思為之死者以滋味及已也又曰用兵之要在於崇禮而重禄崇髙也禄廪食也崇禮則賢士至重禄則戎士輕死賢士至謂若燕禮郭隗而樂毅之徒鱗集也故曰重賞之下必有死夫又曰良將之統軍也恕已活人推惠施恩力士日新戰如風發攻如河决淮南子曰古之善將者必以其身先之暑不張盖寒不被裘所以程寒暑也隂陽不乗上陵必}
