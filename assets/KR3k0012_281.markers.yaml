  - {type: variant, offset: 452, length: 3, content: 田橫據, WYG: 昔秦穆公乗馬而車為敗右服失而野人取之四馬兩馬在中為服詩曰兩服上襄是也馬在旁為驂詩曰兩驂如舞是也繆公自徃求焉見野人方將食之於岐山之陽繆公笑曰食駿馬之肉而不還飲酒余恐其傷汝也徧飲而去之處一年為韓原之戰晉人已環繆公之車矣晉梁由靡已扣繆公之左驂矣扣持晉惠公之右路石奮投而擊繆公之甲中之者已六札矣甲鎧也陥之六札野人之嘗食馬肉者三百}
