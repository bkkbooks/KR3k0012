  - {type: variant, offset: 106, length: 0, content: '', SBCK: 妻冶容不謹者沉之于江行卒相感曰中丞爲我軰知家事何以報效故鄂人戰毎剋捷又曰鄭從讜爲北都留守舊府城都虞􅃸張彦球者前帥令率兵三千逐沙陁於百井中路而還縱兵破鑰殺故帥康傅圭及從讜至搜索其魁誅之知彦球善有方略召之開喻坦然無疑悉以兵柄委之又曰烏重㣧爲長帥赤心奉上能與下同甘苦}
