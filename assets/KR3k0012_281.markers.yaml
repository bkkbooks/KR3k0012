  - {type: variant, offset: 205, length: 211, content: 忘寒又曰聲子詣楚謂令尹屈建曰雍子奔晉以為謀主彭城之役晉楚遇於靡角之谷雍子曰歸老幼返孤疾二人役歸一人簡兵蒐乘簡擇蒐閱秣馬蓐食師陣楚次次舍也焚舍示必死明日將戰行歸者而逸楚囚欲使楚知楚師宵潰晉降彭城而歸諸宋楚失東夷子辛死之則雍子之為也史記曰楚人有饋一簞醪者楚莊王投之於河令將士迎流而飲之三軍皆醉又曰趙括為將母上書曰始妾事其父王所賞賜者盡與軍吏今括一日為將所賜金視便田宅買之父子異心不可用王不聽遂請曰有所不稱妾得無隨乎王許諾又曰吳, SBCK: 呉}
