  - {type: variant, offset: 606, length: 2197, content: 馳奏之高祖以王者禮葬橫既葬二客穿其冢旁皆自剄餘尚五百人在海中聞橫死亦皆自殺於是乃知田橫兄弟能得士也漢書曰李廣歷七郡太守前後四十餘年得賞賜輒分其麾下飲食與士卒共之家無餘財終不言生產事將兵之處見水士卒不盡飲不近水士卒不盡飡不嘗食士以此愛樂為用也又曰竇嬰拜大將軍賜金千斤嬰以所賜金陳廊廡下軍吏輒令取為用金無入家者又曰司馬遷與任少卿書曰愚以為李陵與士大夫絕甘分少能得人之死力雖古名將不過也又曰袁盎字絲為中郎以數上諫為隴西都尉仁而愛士士卒皆為致死後漢書曰桓帝以叚頴為破羗將軍征羗每行軍仁愛士卒疾者親自瞻省手為裹瘡在邊十餘年未嘗一日蓐寢與將士同勤苦故皆樂為死戰又曰皇甫規延熹中為中郎將持節監討零吾等羗會軍中大疫死者十三四規親入菴廬巡視將士三軍感悅東羗遂遣使乞降又曰皇甫嵩平黃巾卹士卒甚得眾情每軍行頓止須營幔修立然後就舍帳軍士皆食爾乃嘗飯吏有因事受賂者嵩更以錢物賜之吏懷慚或至自殺又曰馬援討西羗中流矢貫脛帝以璽書勞之賜牛羊數千頭援盡班諸賓客又曰董卓擊漢陽叛羗破之拜郎中賜縑九千疋卓曰為者則已有者則士為功者雖已共有者乃士乃悉分吏兵無所留又曰王霸常與臧宮傅俊共營霸獨善撫士卒死者脫衣以斂之傷者躬親以養之又曰光武遣太中大夫賜征西吏士死傷者醫藥棺殮大司馬已下親弔死問疾以崇謙讓又曰耿恭在䟽勒遣軍吏范羗至燉煌迎兵士寒服又曰袁紹攻臧洪糧盡主簿啟內廚米三斗稍為饘粥洪曰何能獨此耶使為薄粥遍班士眾又殺其愛妾以食兵將咸流涕無能仰視魏書曹公令曰趙奢竇嬰之為將也受賜千金一朝散之故能濟大功永代流聲吾讀其文未嘗不慕其為人也魏志曹真傳曰真每征行與將士同勞苦軍賞不足輒以家財頒賜士卒皆願為用又曰諸葛誕守壽春以司馬氏累世擅權遂舉兵稱匡輔魏室為辭司馬文王率師討之壽春城陷誕死文王招其徒不降且招且戰數百人拱手為列每斬一人輒遣降之皆云為諸葛公死無恨以至于盡無一人降時人比之田橫吳戍將于詮曰大丈夫受命其主以兵救人既不能剋又束手於敵吾不取乃免冑冒陣而死其得士心如此吳志曰陸瑁字子璋丞相遜弟也少好學篤義先是陳留濮陽逸沛郡朱纂廣陵袁迪等皆單食有志就瑁遊處瑁割少分甘與共豊約蜀志曰鄧艾為大將二十餘年賞罰明善卹卒伍身之衣食資仰於官素儉終不治私妻子不免飢寒晉書曰祖逖居丹徒之京口賓客義徒皆豪桀勇士逖遇之如子弟時楊土大飢此輩多為盜竊攻剽富室逖慰撫問之曰比復南塘一出不或為吏所繩逖輒擁護救解之談者以此少逖自若也又曰祖逖據太丘樊雅攻之陳留太守陳川使李頭救之頭力戰有勳逖時獲雅駿馬李頭甚欲之而不敢言逖知其意遂與之頭感逖恩遇每歎曰若得此人為主吾死無恨又載記曰劉曜將陳安善於撫納吉凶夷險與眾同之及其死隴上歌之曰隴上壯士有陳安軀幹雖小腹中寬愛養將士同心肝騄驄父馬鐵瑕鞍七尺大刀奮如湍丈八虵矛左右槃十盪十決無當前戰始三交失虵矛棄我騄驄竄巖幽為我外援而懸頭西流之水東流河一去不還柰子何曜聞而嘉傷命樂府歌之又曰叚灼追理鄧艾表曰留屯上邽承官軍大敗之後士卒破膽將吏無氣倉庫空虛器械殫盡艾欲積榖強兵以待有事是歲少雨又為區種之法手執耒耜率先將士所統萬數而身不避僕虜之勞親執士卒之役又曰周訪練兵簡卒欲宣力中原與李矩郭默相結慨然有平河洛之志善於撫納晉眾皆為致死續晉陽秋曰盧循為廣州州無麵每得分餉未周遍文武則不食也其仁如此北史曰西魏將梁椿性果毅善撫納所獲賞物分賜麾下故每踐敵場咸得其死力北齊書曰蘭陵武王長恭其為將也躬勤細事每得甘美乃至一瓜數果必與將士共之又曰趙郡王琛薨子叡嗣為定州刺史詔領山東兵數萬監築長城于時盛夏先有冰每歲藏冰長史宗欽道以叡冒犯暑熱遂遣與冰追送正值日中炎赫叡乃對之歎息云三軍皆飲溫水吾以何義獨進寒冰遂至消液竟不一嘗兵人感悅遐邇稱歎後漢書曰司馬楚之少有英氣能折節待士及宋受禪規欲報復收眾據長社歸之者常萬餘人劉裕深憚之遣刺客沐謙圖害楚之楚之待謙甚厚謙夜詐疾知楚之必來欲因殺之楚之聞謙疾果自齎湯藥往省之謙感其意乃出匕首於席下以狀告之楚之歎曰若如來言雖有所防恐有所失謙遂委身事之其推誠信物得士心皆此類也後周書曰侯莫陳順於渭橋與賊戰頻破之魏文帝還親執順手曰魏橋之戰卿有殊力便解所服金鏤玉梁帶賜之又曰史寧為涼州刺史遣使詣太祖請事太祖即以所服冠履衣被及弓箭甲矟等賜寧謂其使人曰為我謝涼州孤解衣以衣公推心以委公公其善始令終無損功名也又曰武帝勝齊出齊宮中金銀寶器珠翠麗服及宮人二千人班賜將士又曰武帝勞謙接下自強不息以海內未康銳情教習至於治兵閱武步行山谷履涉勤苦皆人所不堪平齊之役見軍士有跣而行者帝親脫鞾以賜之又曰武帝善於撫下每宴會將士必自執杯勸酒或手付賜物至於征伐之處躬在行陣性又果決能斷大事故能得士卒死力以弱制強又曰太祖平侯莫陳悅整兵入上邽收悅府庫財物山積皆以賞士卒毫釐無所取左右竊一銀鏤甕以歸太祖知而罪之即剖賜將士眾大悅又曰武帝大舉伐齊次於晉州初齊攻晉州恐周師卒至於城南穿塹自喬山屬於汾水帝率諸軍八萬人置陣東西二十餘里帝常御馬從數人巡陣處分之至輒呼主帥姓名以慰勉之將士感見知之恩各思自勵將戰有司請換馬帝曰朕獨乘良馬欲何所之齊主亦於此塹列陣帝欲薄之以礙塹遂止自旦至申相持不決申後齊人乃填塹南引帝大喜勒諸軍擊之兵纔合齊人便逐北斬首萬餘級齊主與其麾下數十騎走還并州於是齊眾大潰隋書曰楊玄感反吳人朱爕晉陵人管崇起兵江南以應之自稱將軍擁眾十餘萬帝遣將軍吐萬緒魚俱羅討之不能剋王充募江都萬餘人擊頻破之每有剋捷必歸功於下所獲軍實皆推與士卒身無所受由此人爭為用功最居多又曰煬帝在藩時嘗觀獵遇雨左右進油衣上, SBCK: ''}
