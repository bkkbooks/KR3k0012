  - {type: variant, offset: 450, length: 0, content: '', SBCK: 或謂之曰母子卒也而將軍自吮其疽何哭矣母曰非然也往年呉公吮其父父戰不旋踵遂死於敵今又吮此子妾不知其所死處矣是以哭之於是擊􅁗拔其五城吕氏春秋曰勾踐苦㑹稽之耻欲􅀷得民心必致死於呉有酒流之江與人同有甘肥不分不敢食}
  - {type: variant, offset: 450, length: 0, content: '', WYG: 或謂之曰母子卒也而将自吮其疽何哭矣母曰非然也徃年吴公吮其父父戰不旋踵遂死於敵今又吮此子妾不知其所死處矣是以哭之於是擊秦㧞其五城吕氏春秋曰勾踐苦㑹稽之耻欲深得民心必致死於吴有酒流之江與人同有甘肥不分不敢食}
