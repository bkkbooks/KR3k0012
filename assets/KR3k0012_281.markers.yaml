  - {type: variant, offset: 10, length: 0, content: '', SBCK: 乗輿何在而敢言乎泚又間日使人至晟軍則晟小吏王無忌之婿也因無忌以謁晟且曰公家無恙城中有書問以此誘晟晟怒曰尒敢爲賊傳命􅁘立斬之時轉輸不至盛夏軍士或衣裘􅄄晟必同勞苦毎以大義奮激士皆涕流感恱卒無離叛者於是軍士皆角力馳騎超踰爲戲晟知可用又曰德宗在梁州山南地偏及夏􅀹􅀬將士未給春服上亦御裌服以}
  - {type: variant, offset: 10, length: 0, content: '', WYG: 乗輿何在而敢言乎泚又間日使人至晟軍則晟小吏王無忌之姻也因無忌以謁晟且曰公家無恙城中有書問以此誘晟晟怒曰爾敢為賊𫝊命耶立斬之時轉輸不至盛夏軍士或衣裘褐晟必同勞苦每以大義奮激士皆涕流感恱卒無離叛者於是軍士皆角力馳騎超踰為戯晟知可用又曰徳宗在梁州山南地偏及夏尤熱將士未給春服上亦御裌服以}
