  - {type: variant, offset: 2883, length: 304, content: 女玉帛皆分賜將士又曰貞觀中太宗親征高麗駕次定州兵士到者幸定州城北門親慰撫之有從卒一人病不能起太宗招至床前問其疾苦仍勑州縣厚加供給凡在征人欣然縱有病者悅以忘疾師次白巖城將軍李思摩中弩矢太宗親為之吮血從行文武競思奮勵及軍廻行次柳城詔集戰亡人骸骨設太牢以祭之太宗慟哭盡哀軍人無不灑泣兵士觀者歸家以言其父母曰吾兒之死天子哭之死無所恨又曰司空李勣每將兵在軍識其臧否聞人片善扼腕而從事捷之日多推功於下前後在軍所得金帛皆散之將士於是人皆為用所向多剋捷及薨哭之或有嘔血者也又曰秦叔寶隨太宗戰於美良川破尉遲敬德功最多高祖遣使賜以金瓶而勞之曰卿不顧妻子遠投於我又立功效能朕肉可為卿用者割以賜卿耳况子女玉帛乎卿當勉之尋授秦王右統軍, SBCK: 獨}
