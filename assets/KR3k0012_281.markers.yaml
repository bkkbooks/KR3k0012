  - {type: variant, offset: 555, length: 1, content: 陛, krp: 秦穆公伐晉及河將勞師而醪唯飲一鍾蹇叔曰一米可投河而釀也穆公乃以一醪投河三軍醉矣三略曰夫將之爲帥者必同滋味共安危人有遺一簞之醪者使投諸河令士衆向流而挹之夫一簞之醪不能味一河然而三軍之士思爲之死者何也以滋味及巳也又曰用兵之要在於崇禮而重禄崇髙也禄廪食也崇禮則賢士至重禄則戎士輕死賢士至謂若燕禮郭隗而樂毅之徒鱗集也故曰重賞之下必有死夫又曰良將之統軍也恕巳活人推惠施恩士力日親戰如風發攻如河決淮南子曰古人善將者必以其身先之暑不張蓋寒不𬒳裘所以均寒暑也隂陽不乗上陵必}
  - {type: variant, offset: 559, length: 0, content: '', SBCK: 齊勞佚也軍食熟然後敢食軍井通然後敢飲所以同飢渇也合戰必立矢射之所及以其安危也故良將之用兵也常以積德擊積怨以積愛擊積憎何故而不勝主之所求於民者二求民爲之勞也}
  - {type: variant, offset: 559, length: 0, content: '', WYG: 齊勞佚也軍食熟然後敢食軍井通然後敢飲所以同飢渴也合戰必立矢射之所及以共安危也故良將之用兵也常以積徳擊積怨以積愛擊積憎何故而不勝主之所責於民者二求民為之勞也}
  - {type: page-break, offset: 559, content: '', id: KR3k0012_WYG_281-7b, image: WYG0895/WYG0895-0485b.png}
  - {type: variant, offset: 559, length: 0, content: '', krp: 齊勞佚也軍食熟然後敢食軍井通然後敢飲所以同飢渇也合戰必立矢射之所及以其安危也故良將之用兵也常以積德擊積怨以積愛擊積憎何故而不勝主之所求於民者二求民爲之勞也}
  - {type: variant, offset: 560, length: 2, content: 見我, SBCK: 民爲之死也民之所望於主者三飢者能食之勞者能息之有功者能德之民巳償其二責而失其三望國雖大兵猶且弱也又曰苦者必得其樂勞者必得其利斬首之功必全死事之後必賞死事以軍事死賞其後子孫也四者旣信於民矣主雖射雲中之鳥而釣深淵之魚彈琴瑟聲鍾竿敦六􅀶敦致也投髙嗇兵猶且強令猶且行也是故上足仰則下可用也德足慕則威可立也又曰上視下如子則下事上如父上視下如弟則下事上如兄夫上視下如子則必王四海下事上如父則必正天下上視下如弟則}
  - {type: page-break, offset: 560, content: '', id: KR3k0012_SBCK_281-5a}
  - {type: variant, offset: 560, length: 2, content: 見我, WYG: 民為之死也民之所望於主者三飢者能食之勞者能息之有功者能徳之民已償其二責而失其三望國雖大兵猶且弱也又曰苦者必得其樂勞者必得其利斬首之功必全死事之後必賞死事死其軍事也賞賞其後子孫也四者既信於民矣主雖射雲中之鳥而釣深淵之魚彈琴瑟聲鐘竽敦六博敦致也投髙塞兵猶且强令猶且行也是故上足仰則下可用也徳足慕則威可立也又曰上視下如子則下事上如父上視下如弟則下事上如兄夫上視下如子則必王四海下事上如父則必正天下上視下如弟則}
