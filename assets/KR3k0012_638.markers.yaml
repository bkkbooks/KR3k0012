  - {type: variant, offset: 522, length: 0, content: '', SBCK: 乃還走避舎露􅀫三日北面再拜請罪又曰夫人臣之侵其主也如地形焉即漸以徃使人主失端東西易面而不自知故先王立教司南以端朝夕明王使其群臣不遊意於法之外不爲惠於法之内虎所以能服狗者爪牙也使虎釋其爪牙使狗用之則虎反服於狗矣人主者以形德制臣也今}
  - {type: variant, offset: 522, length: 0, content: '', WYG: 乃還走避舎露宿三日北面再拜請罪又曰夫臣之侵其主也如地形焉即漸以徃使人主失端東西易面而不自知故先王立教司南以端朝夕明王使其羣臣不逰意於法之外不為恵於法之内虎所以能服狗者爪牙也使虎釋其爪牙使狗用之則虎反服於狗矣人主者以刑徳制臣也今}
