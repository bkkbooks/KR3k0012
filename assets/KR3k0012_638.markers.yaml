  - {type: variant, offset: 9, length: 0, content: '', SBCK: 臣聞夫今之律者乃有千餘條近有隋之姦臣將弄其法故著律曰犯罪而律無正條者應出罪則舉重以明輕應入罪即舉輕以明重立夫一言而廢其數百條自是迄今竟無刋革遂使死生冈由乎法律輕重必因乎愛憎受罰者不知其然舉事者不知其犯臣恐賈􅁩見之必爲之慟􅂘矣又曰時所用舊律其文起自魏文侯師李悝悝撰攻諸國法著經以爲王者之政莫急於盗賊盗賊湏刻捕故著囚捕二篇其輕狡越城愽戯借假不廉􅁋多踰制以爲􅄂律一篇又以具其加减是故所著六篇而已然皆罪名之制也六韜曰文王問太公曰願聞治國之所貴太公曰貴法令必行法令必行則治道通治道通則民大利民大利則君德彰文}
  - {type: page-break, offset: 9, content: '', id: KR3k0012_SBCK_638-2b}
  - {type: variant, offset: 9, length: 0, content: '', WYG: 臣聞夫今之律者乃具千條餘近有隋之弊姦臣將弄其法故著律曰犯罪而律無正條者應出罪則舉重以明輕應入罪則舉輕以明重立夫一言而發其數百條自是迄今竟無刋革遂使死生必因乎法律輕重必因乎愛憎受罪者不知其然舉事者不知其犯臣恐賈誼見之必為之慟哭矣又曰時所用舊律其文起自魏文侯師李悝悝撰攻諸國法著經以為王者之政莫急於盗賊須劾捕故著囚捕二篇其輕狡越城慱戯借假不亷侈淫踰制以為雜律一篇又以具其加減是故所著六篇而已然皆罪名之制也六韜曰文王問太公曰願聞治國之所貴太公曰貴法令必行法令行則治道通治道通則民大利民大利則君徳彰矣文}
