  - {type: variant, offset: 6, length: 0, content: '', SBCK: 下科附齊書曰􅀄江左用晉丗張杜律二十卷孔稚珪刪注修改與竟陵王議務從輕曰仲尼有言古之聽獄者求所以生之今之聽獄者求所以殺之與殺不辜寧殺有罪則斷獄之職古所難矣冩律上國學置律􅂇敎依五經例䇿試上髙第便擢用之北齊書曰武成帝河清中有司奏上齊律其不可爲定法者別制權令三卷與之並行後平􅁗王髙歸彦謀反湏有約罪律無正條於是遂有別條權令與律並行大理明法上下比附欲出則附依輕議欲入則附從重法姦吏因之舞文出没至于後主權倖用事有不附之者隂中以法綱紀紊亂卒至於亡三國典略曰齊封􅄒渤海蓨人廷尉卿軌之子也乆爲法官明解律令議断乎允時人稱之隋書曰李德林開皇元年勑令與太尉任國公于翼髙頴等同脩律令事訖別賜九環金帶一駿馬一疋賞損益之多也又曰劉行本爲侍御史雍州別駕元肇言於上曰有一州吏受人餽錢二百文依律令合杖一百然臣下車之始與其爲約此吏故違請加徒一年行夲駮之曰律令之行並發明詔與民約束今肇乃敢重其教命輕忽憲章欲申乞言之必行忌朝廷之大信􅃜法取罪非人臣之禮上嘉之唐書曰髙祖入關除隋苛政爲約法十二條唯制殺人刼盗背軍叛逆餘並蠲除之及受禪又用開皇律令除其苛細五十三條格務存寛簡取便於時仍遣裴寂殷開山郎楚之沈叔安崔善爲之徒撰定律令太宗即位命長孫無忌房玄齡與當朝通議之士更加􅁵改戴胃魏徴又言舊律太重於是議絞刑之五十條断其右趾焉應死者多蒙全活得罪者咸稱頼之又曰太宗問大理卿劉德威曰近來刑網稍宻何也對曰誠在君上不由臣下主好寛則寛好急則急律文失入減三等失出减五等今則反是失入則無辜失出則􅀗大罪所以吏各自愛競執深文畏罪之所致耳太宗然其言又曰神龍元年趙冬曦}
