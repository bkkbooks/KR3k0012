  - {type: variant, offset: 2610, length: 277, content: 之君使人不畏吏吏不取人今我畏吏是以遺之吏既卒受故來言耳茂曰汝為弊人矣凡人所以貴於禽獸者以有仁愛知相敬事也今鄰里長老尚致饋遺此乃人道所以相親況吏與民乎吏顧不當乘威力強請求耳凡人之生群居雜處故有經紀禮義以相交接汝獨不欲修之寧能高飛遠走不在人間邪亭長素善吏歲時遺之禮也人曰茍如此律何故禁之茂笑曰律設大法禮順人情今我以禮教汝汝必無怨惡以律治汝何所措其手足乎一門之內小者可論大者可殺也且歸念之於是人納其訓吏懷其恩又曰獻帝初應劭又刪定律令撰具律本章句尚書舊事廷尉板令決事比例司徒都目五曹詔書及春秋獄凡二百五十篇又集議駮三千篇以類相從凡八十二事於是舊事在焉又曰鄭弘建初, WYG: ''}
