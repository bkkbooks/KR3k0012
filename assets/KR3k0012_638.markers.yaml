  - {type: variant, offset: 3609, length: 245, content: 朕每監其用心常慨然嘉之今法律既成始班天下刑寬禁簡足以克當先旨昔蕭何以定律受封叔孫通以制儀為奉常賜金五百斤子弟皆為郎夫立功立事古之所重自太傅車騎以下皆加祿賞其詳依故典又曰杜預與車騎將軍賈充等定律令既成預為之注解乃奏之曰法者蓋繩墨之斷例非窮理盡性之書故文約而例直聽省而禁簡例直則易見禁簡則難犯易見則民知所避難犯則幾於刑措古之刑書銘之鐘鼎鑄之金石以塞異端絕異理也然後人知恒禁吏無淫巧也今所注皆網羅法意格之以名分使用之者執名例以審趣舍伸繩墨之直去析薪之理也晉朝雜事曰秦始四年歲在戊子正月二十日晉律成, SBCK: ''}
