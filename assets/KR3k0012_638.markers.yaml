  - {type: variant, offset: 581, length: 1, content: 後, SBCK: 平孟問昆夲學律令所師爲誰昆對事荀季卿孟曰史與刺史同師孟又問昆從何職爲獄史松具以實對孟歎曰刺史學律猶不及昆召之署文學杜預律序曰律以正罪名令以存事制張斐律序曰張湯制越官律趙禹作朝㑹正見律塩鐡論曰夫善言天者合之於人善言古者考之於今二尺四寸之律古今一也又曰昔􅁗法䌓於秋荼而網宻於凝脂然而上下相趍姦僞萌生崔寔政論曰君以審令爲明臣以奉令爲忠故背制而行賞謂之作福背令而行罪謂之作威作威則人畏之作福則人歸之夫威福者人主之神器也譬之操莫耶矣執其柄則}
