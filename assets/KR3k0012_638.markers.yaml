  - {type: variant, offset: 1346, length: 234, content: 又曰朱博遷瑯琊太守文學儒吏時有奏稱說云云博見謂曰如太守漢吏奉三尺律令以從事耳亡柰生所言聖人道何也言不能用也且持此道歸堯舜君出為陳說之遷廷尉職典決疑當讞平天下獄博恐為官屬所誣視事召見正監典法掾史謂曰廷尉本起於武吏不通法律幸有眾賢亦何憂然廷尉治郡斷獄以來且二十年三尺律令人事出其中言可以人情知人掾史試與正監共撰前世決事吏議難知者數十事持以問廷尉得為諸覆意之如淳曰但欲用意覆之也正監以為博敬強意未必能然即共條白焉博皆召掾史並坐而問為平處其輕重十中八九官屬咸服博之踈略才過人也, SBCK: 科}
