  - {type: variant, offset: 11, length: 4, content: 嗚呼凡我, SBCK: 法令必行大利人民柰何太公曰法令必行則民俗利民俗利則利天下是法令必行大利人也又曰願聞爲國之大失太公曰爲國之大失者爲上作事不法君不􅁴悟是大失也文王曰願聞不法公曰不法法則令不行則主威傷不法法則邪不正邪不正則禍亂起不法法則刑妄行刑妄行則賞無功不法法則國昏亂國昏亂則臣爲變君不悟則兵革起兵革起則失天下文王曰誡哉管子曰法者所以興功懼􅁀律者所以定分止事又曰凢國無法則衆不知爲無度則事無儀}
