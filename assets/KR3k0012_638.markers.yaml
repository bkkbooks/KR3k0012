  - {type: variant, offset: 694, length: 463, content: 幸死者吏為衣衾棺歛轉送其家四方歸心焉又曰元帝為太子壯好經書寬博謹慎初居桂宮上嘗急召太子出龍樓門張晏曰門樓上有銅龍若曰鶴飛廉者也不敢絕馳道應邵曰馳道天子道若中道然古禁甚重西至真城門晉灼曰黃圖西出南頭第二門得絕乃度之還入作室門上遲之問其故以狀對上大悅乃著令令太子得絕馳道又曰元帝柔仁好儒見宣帝多用文法吏以刑名繩下大臣楊惲蓋寬饒等坐剌譏語而誅嘗侍燕從容言陛下持刑太深宜用儒生宣帝作色曰漢家自有制度本以霸王道雜之奈何純任德教用周政乎姬周之政且俗儒不達時宜好是古非今使人眩於名實眩亂視也音胡亂反切不知所守何足委任乃歎曰亂我家者太子也及即位下詔曰法令者欲其難犯而易避也今律令煩多典文者不能分明是欲罪元元之不逮豈中刑之意哉中常也其議律令可蠲除輕減又曰成帝河平中詔曰甫刑云五刑之屬三千大辟之罰其屬二百今大辟罪千有餘條律令煩多百有餘萬言奇請他比日以益滋奇請謂常文外主者別有所請以定罪也它比謂引它類以附之稍增律條也奇音居宜反其與中二千石博士及明習律令者議減死刑及可蠲除者令較然易知又曰杜周南陽杜衍人也義縱為南陽太守以周為爪牙薦之張湯為廷尉史使按邊, SBCK: ''}
