  - {type: variant, offset: 1158, length: 185, content: 亡所論殺甚多奏事中意任用與減宣更為中丞者十餘歲周少言重遲內深次骨宣為左內史周為廷尉其治大抵放張湯而善候伺上所欲擠音若齊切者因而陷之上所欲釋久繫待問而微見其冤狀客有謂周曰君為天下決平不循三尺法周曰三尺法安出哉前主所是著為律後主所是䟽為令當時為是何古之法乎又曰主父偃以諸侯莫足遊者乃入關見衛將軍衛將軍數言上上不省資用乏留久諸公賓客多厭之乃上書闕下朝奏暮召入見所言九事其八者為, SBCK: ''}
