  - {type: variant, offset: 117, length: 5, content: 乘車乘車皆, SBCK: 過過者不得不及名分不定而欲天下之治也是猶欲無飢而去食欲無寒而去衣也欲至東而西行其不幾亦明矣一􅇠走而百人逐之非􅇠一可以分百也由名之未定也夫賣􅇠在市盗不敢取分之定也今法令不明其名不定天下之人得議之也慎子曰法之功莫大使私不行君之功莫大使民不争今立法而行私是私與法争其亂甚於無法立君而尊賢是與君争其亂甚於無君故}
