  - {type: variant, offset: 178, length: 0, content: '', SBCK: 勢位足以屈賢申子曰君必有明法正義􅀂懸權衡以稱輕重所以一群臣也又曰堯之治也盖明法察令而巳聖君任法而不任智任數而不任說黄帝之治天下置法而不變使民安樂其法也又曰昔七十九代之君法制不一號令不同然而俱王天下何也必國冨而粟多也韓子曰魯燒積澤天北風火南向恐燒國哀公自將衆趍救火人盡逐獸而火不救乃召仲尼仲尼下令曰不救火而逐獸者比入禁之罪令下未徧火遂救矣又曰治大國而數變法則民苦之是以有道之君貴虚静重變法也又曰釋法術而爲治堯不能正一國使中正守法術拙匠執䂓矩尺寸則萬不失一也又曰董安于爲趙上地之守行石阜山中見深澗峭如墻深百仭因問其郷左右曰人甞有入此者乎對曰無有曰嬰兒癡聾狂亂人甞有入此者乎對曰無有馬羊牛甞有入此乎對曰無有安于喟然嘆曰吾能治矣使吾法之無赦猶入澗之必死也則}
