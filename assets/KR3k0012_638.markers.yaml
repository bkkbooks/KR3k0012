  - {type: variant, offset: 1750, length: 1512, content: 蠲除故條如此天下知方而獄無怨濫矣又曰馬援在南條越律與漢律駮者十餘事駮乖事也與越人申明舊制以約束之自後南越奏行馬將軍故事又曰王符論明帝時公車反支日不受章奏凡反支日用月朔為正戍亥朔四日反支申酉朔二日反支午未朔三日反支辰巳朔四日反支寅卯朔五日反支子丑朔六日反支見陰陽書也帝聞而怪曰人廢農桑遠來詣闕而復拘以禁忌豈為政之意乎於是遂蠲其制令又曰建初中有人侮辱人父者而其子殺之肅宗貰其死刑而降宥之自後因以為比是時遂定其議以為輕侮法張敏駮議曰夫輕侮之法先帝一切之恩不有成科班之律令也夫死生之決宜從上下猶天之四時有生有殺若開相容恕著為定法者則是故設姦萌生長罪隙又輕侮之比浸以繁滋至有四五百科轉相顧望彌復堪甚難以垂之萬載臣聞師言救文莫如質故高帝去煩苛之法為三章之約建初詔書有改於古者可下三公廷尉蠲除其弊又曰有兄弟共殺人者明帝以兄不訓弟故報兄重報論也重死制而減弟死中常侍孫章宣詔言兩報重尚書奏章矯制罪當腰斬帝問郭躬躬曰法今有故誤章傳命之謬於事為誤誤者其文則輕當罰金帝曰章與囚同縣疑其故躬曰周道如砥其直如矢詩小雅如砥貢賦平如矢賞罰中君子不逆詐君王法天刑不可以委曲生意帝善之遷躬廷尉躬家代掌法務在寬平及典理官決獄斷刑多依矜恕乃條諸重又可從輕者四十一事奏之事皆施行著於令又曰陳寵鉤校律令條法溢於甫刑者奏除之鉤猶勘也前書曰鉤校得其姦賊鉤音工侯切溢出也孔安國注尚書曰呂侯後為甫侯故或稱甫刑也曰臣聞禮經三百威儀三千故甫刑太辟二百五刑之屬三千禮之所去刑之所取去禮之人刑以加之故曰取也失禮則入刑相為表裏者也今律令死刑六百一十耐罪千六百九十八耐者輕刑之名也贖罪以下二千六百八十一溢於甫刑者千九百八十九其四百一十大辟千五百耐罪七十九贖罪春秋保乾圖曰王者三百年一蠲法漢興以來三百二年憲令稍增科條無限又律有三家其說各異宜令三公廷尉平定律令應經合義者可使大辟二百而耐罪贖罪二千八百并為三千悉刪除其餘令與禮相應又曰卓茂為密令人常有言部亭長受其米肉遺者部謂所部也茂辟左右問之曰亭長為從汝求乎為汝有事囑之而受乎將平居自以恩意遺之乎人曰往遺之耳茂曰遺之而受何故言邪人曰竊聞賢明之君使人不畏吏吏不取人今我畏吏是以遺之吏既卒受故來言耳茂曰汝為弊人矣凡人所以貴於禽獸者以有仁愛知相敬事也今鄰里長老尚致饋遺此乃人道所以相親況吏與民乎吏顧不當乘威力強請求耳凡人之生群居雜處故有經紀禮義以相交接汝獨不欲修之寧能高飛遠走不在人間邪亭長素善吏歲時遺之禮也人曰茍如此律何故禁之茂笑曰律設大法禮順人情今我以禮教汝汝必無怨惡以律治汝何所措其手足乎一門之內小者可論大者可殺也且歸念之於是人納其訓吏懷其恩又曰獻帝初應劭又刪定律令撰具律本章句尚書舊事廷尉板令決事比例司徒都目五曹詔書及春秋獄凡二百五十篇又集議駮三千篇以類相從凡八十二事於是舊事在焉又曰鄭弘建初中為尚書令舊制尚書郎限滿補縣長令史補承尉弘奏以為臺職雖尊而酬賞甚薄請使郎補二千石令史為長帝從其議弘前後所陳有補益王政者皆著之南宮以為故事東觀漢記曰陳寵曾祖父咸成哀間以明律令為侍御史王莽篡位父子相將歸鄉里閉門不出入乃收家中律令文書璧藏之以俟聖主咸常勑戒子孫為人議法當依輕者雖有百金之利無與人重故世謂陳氏持法寬魏書曰司馬景王輔政時犯大逆者其法誅乃己出之女毋丘儉之誅其子甸妻荀氏應坐死其族兄顗通表魏帝以乞其命詔聽離婚荀氏所生女芝為頴川太守劉子元妻亦坐死以懷妊繫獄荀氏辭詣司隸校尉何曾乞恩求沒為官婢以贖之命曾哀之使主簿程盛上議曰臣以為女人有三從之義無自專之道出適他族降父母之服所以明外成之節也而父母有罪則追刑夫黨見誅又隨戮一人之身內外受辟女既產育則它族之母無辜受戮傷孝子之心且男既不得罪於他族而女獨嬰戮於二門臣以為在室宜從父之誅既醮可隨夫之罰於是有詔改定律令, SBCK: ''}
