  - {type: variant, offset: 531, length: 2, content: 傅公, SBCK: 體􅀍濡衣赴火者左三千人右三千人始知必勝之􅀔也又曰吴起爲魏武侯西河之守秦有小亭臨境起欲攻之乃􅀝一車轅於北門之外而令曰有能徙北南門之外賜之上田上宅民莫之徙也及有徙之者遂賜之如令俄又置一石赤􅁰東門之外而令之曰有能徙之於西門之外者賜之如􅀄民則争徙之乃下令大夫曰攻亭有能先登者仕之國大夫賜之上田宅民争上於是攻亭一朝而拔之阮}
  - {type: variant, offset: 531, length: 2, content: 傅公, WYG: 體被濡衣赴火者左三千人右三千人始知必勝之勢也又曰吴起為魏武侯西河之守秦有小亭臨境起欲攻之乃倚一車轅於北門之外而令曰有能徙此南門之外賜之上田上宅民莫之徙也及有徙之者遂賜之如令俄又置一石赤黍東門之外而令之曰有能徙之於西門之外者賜之如初民則争徙之乃下令大夫曰攻亭有能先登者仕之國大夫賜之上田宅民争上於是攻亭一朝而拔之阮}
