  - {type: variant, offset: 575, length: 2, content: 盡遷, SBCK: 天以秋殺猶君之有威令也故仁令之發天下樂之威令之發天下畏之樂之故樂從其令畏之故不敢違其令􅀂寛令發而人不樂無以稱仁矣威令發而下不畏無以言威矣無仁可樂無威可畏而能保國致治者未之有也㑹稽典録曰董昆字文通餘姚人也少遊學師事頴川荀季卿受春秋治律令明逹法理又才能撥煩縣長潘松署功曹史刺史盧孟行部垂念􅁈結松以孟明察}
