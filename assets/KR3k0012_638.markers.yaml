  - {type: variant, offset: 18, length: 8, content: 子欽乃攸司慎乃出, SBCK: 國之重器莫重乎}
  - {type: variant, offset: 18, length: 6, content: 子欽乃攸司慎, WYG: 尊君尊則國安令􅁿則君卑君卑則國危故安國存乎尊君尊君存乎行令行令存乎嚴罰嚴罰令行則百吏皆恐罰不嚴令不行則百吏皆喜故明君察於治人之本本莫要乎令故曰虧令者死益令者死増益令者殺無赦不行令者死又曰凡牧民者欲民之可御也欲民之可御則法不可不重也法者将立朝廷立朝廷則爵服不可不貴也爵服加於不義則民賤其爵服民賤其爵服則人主不尊令不行矣又曰夫法者法天地之象四時之行所以治天下也四時之行有寒有暑聖人法之故有文有武天地之位有有前有後有左有右聖人法之以建經紀春生於左秋殺於右夏長於前冬藏於後生長之事文也收藏之事武也是故文事在左武事在右聖人法之以行法令又曰正月之朔百吏在朝君}
