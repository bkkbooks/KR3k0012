  - {type: 'tls:seg', offset: 2894, content: '', id: KR3k0012_CHANT_638-23a.13}
  - {type: variant, offset: 2897, length: 435, content: 限滿補縣長令史補承尉弘奏以為臺職雖尊而酬賞甚薄請使郎補二千石令史為長帝從其議弘前後所陳有補益王政者皆著之南宮以為故事東觀漢記曰陳寵曾祖父咸成哀間以明律令為侍御史王莽篡位父子相將歸鄉里閉門不出入乃收家中律令文書璧藏之以俟聖主咸常勑戒子孫為人議法當依輕者雖有百金之利無與人重故世謂陳氏持法寬魏書曰司馬景王輔政時犯大逆者其法誅乃己出之女毋丘儉之誅其子甸妻荀氏應坐死其族兄顗通表魏帝以乞其命詔聽離婚荀氏所生女芝為頴川太守劉子元妻亦坐死以懷妊繫獄荀氏辭詣司隸校尉何曾乞恩求沒為官婢以贖之命曾哀之使主簿程盛上議曰臣以為女人有三從之義無自專之道出適他族降父母之服所以明外成之節也而父母有罪則追刑夫黨見誅又隨戮一人之身內外受辟女既產育則它族之母無辜受戮傷孝子之心且男既不得罪於他族而女獨嬰戮於二門臣以為在室宜從父之誅既醮可隨夫之罰於是有詔改定律令魏志曰公軍進令曰吾起義兵為天下除暴亂舊土人民死喪略盡國中終日行不見所識使吾悽愴傷懷其舉義兵已來將士絕無後者求親戚以後之授上田官給耕牛置學師教, WYG: 先深}
