  - {type: variant, offset: 525, length: 0, content: '', krp: 安則智廉生危則鄙争起又曰越王問於大夫種曰吾欲伐呉可乎對曰可以吾賞厚而信罰嚴而必君必欲知之何}
  - {type: variant, offset: 526, length: 4, content: 可施刑刑, SBCK: 試焚於是遂焚宫室民莫救火乃下令曰民之救火而死者比死敵者之賞勝火而死者比勝敵之賞不救火者比降北之罪民之塗}
  - {type: variant, offset: 526, length: 4, content: 可施刑刑, WYG: 試焚宫室於是遂焚宫室民莫救火乃下令曰民之救火而死者比死敵者之賞勝火而死比勝敵之賞不救火者比降北之罪民之塗}
