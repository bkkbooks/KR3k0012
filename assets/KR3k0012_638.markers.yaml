  - {type: variant, offset: 6, length: 0, content: '', WYG: 科附齊書曰初江左用晉世張杜律二十卷孔稚珪刪注修改與竟陵王議務從輕曰仲尼有言古之聴獄者求所以生之今之聽獄者求所以殺之與殺不辜寧失不經則斷獄之職古所難矣寫律上國學置律助教依五經例策試上髙第便擢用之北齊書曰武帝河清中有司奏上齊律其不可為定法者别制權令二卷與之並行後平秦王髙歸彦謀反預有約罪無正條於是遂有别除權令與律並行大理明法上下比附欲出則附依輕議欲入則附從重法姦吏因之舞文出没至於後主權幸用事有不附之者隂中以法綱紀紊亂卒至於亡三國典略曰齊封述渤海脩人廷尉卿軌之子也久為法官明解律令議斷平允時人稱之隋書曰李徳林開皇元年勅令與太尉任國公于翼髙熲等同修律令事訖别賜九環金帶一腰駿馬一疋賞損益之多也又曰劉行本為侍御史雍州別駕元肇言於上曰有一州受人餽錢二百文依律令合杖一百然臣下車之始與其為約此吏故違請加徒一年行本駁之曰律令之行已發明詔與民約束今肇乃敢重其教命輕忽憲章欲申乞言之必行忌朝廷之大信虧法取威非人臣之體上嘉之唐書曰髙祖入闗除隋苛政為約法十二條唯制殺人刼盗背軍叛逆者餘並蠲除之及受禪又用開皇律令除其苛細五十三條格務從寛簡取便於時仍遣裴寂殷開山郎楚之沈叔安崔善之徒撰定律令太宗即位命長孫無忌房𤣥齡與當朝通議之士更加釐改戴胄魏徵又言舊律太重於是議絞刑之屬五十條免死斷其右趾焉應死者多䝉全活得罪者咸稱頼之又曰太宗問大理卿劉徳威曰近来刑網稍宻何也對曰誠在君上不由臣下主好寛則寛好急則急律文失入減三等失出減五等今則反是失入則無辜失出則獲大罪所以吏各自愛競執深文畏罪之所致耳太宗然其言又曰神龍元年趙冬曦}
