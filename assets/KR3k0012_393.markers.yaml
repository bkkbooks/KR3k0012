  - {type: variant, offset: 2075, length: 3, content: 猷嘗寄, SBCK: 敬在齋中卧偷入齋取物幞裝一室之内略無不盡子敬卧而不動偷遂復登床欲有所覔子敬因呼曰偷兒青氊是我家舊物可特置不於是羣賊始知其不眠悉置物驚走睡左傳宣上曰趙宣子諌靈公患之使鉏麑賊之鉏麑晉力士也晨徃將朝尚早坐而假寐不解衣冠而睡麑退而歎曰不忘恭敬民之主也賊民之主不忠弃君之命不信有一於此不如死也觸槐而死漢書禮樂志曰魏文侯最爲好音而謂子夏曰聽古樂則欲􅄰及聞鄭衛之音子不知倦焉又曰陳咸字子康父萬年甞病召咸敎戒於床下語至夜半咸睡頭觸屏風萬年大怒欲杖之咸叩頭謝曰具䁱所言大}
  - {type: page-break, offset: 2075, content: '', id: KR3k0012_SBCK_393-8a}
  - {type: variant, offset: 2075, length: 1, content: 猷, WYG: 敬在齋中卧偷入齋取物幞装一室之内畧無不盡子敬卧而不動偷遂復登厨欲有所覔子敬因呼曰偷兒青氊是我家舊物可特置不於是羣賦始知其不眠悉置物驚走睡左傳宣上曰趙宣子諌靈公患之使鉏麑賊之晨徃将朝尚早坐而假寐不觧衣冠而睡麑退而嘆曰不忘恭敬民之主也賊民之主不忠棄君之命不信有一於此不如死也觸槐而死漢書禮樂志曰魏文侯最為好音而謂子夏曰聽古樂則欲寐及聞鄭衛之音予不知倦焉又曰陳咸字子康父萬年}
