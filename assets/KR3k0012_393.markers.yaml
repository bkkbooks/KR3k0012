  - {type: variant, offset: 42, length: 4, content: 吟詠情性, SBCK: 旣見君子並坐鼔瑟禮記曲禮上曰夫爲人子者坐不中席又曰離坐離立無徃叅焉又曰男女不離坐又曰立母跛坐無箕又曰有憂者側席而坐有䘮者專席而坐又曰虚坐盡後食坐盡前左傳襄五曰伍舉奔晉聲子遇之郊班荆相與食班布荆坐又襄二十六年曰衛子鮮奔晉公使止之不可及河又使止之止使者而盟于河託於木門木門青向不向衛國而坐怨之深也又定上曰申包胥如􅁗乞師勺飲不入口七日􅁗哀公爲之賦無衣九頓首而坐􅁗師乃岀春秋演孔圖曰孔子長十尺大九圍坐如蹲龍立如牽牛爾雅曰妥安坐也漢書曰單父人吕公善沛令避仇從之客因家焉沛中豪桀吏聞令有重客皆徃賀蕭何爲主吏主進進者㑹禮之財也主賦歛禮進爲之師也令諸大夫曰進不滿千錢坐之堂下髙祖爲亭長乃紿爲謁曰賀錢萬實不持一錢謁入吕公大驚起迎之門吕公者好相人見髙祖􅃺皃因重敬之引入坐上坐又曰上幸上林皇后愼夫人從其在禁中常同坐及坐郎署􅀽盎却慎夫人坐慎夫人怒不肯坐上亦怒起盎曰陛下旣巳立后慎夫人乃妾妾主豈可}
