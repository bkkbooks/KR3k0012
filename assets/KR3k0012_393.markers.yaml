  - {type: variant, offset: 1021, length: 5, content: 販洛陽倚嘯, SBCK: 必舉歩坐必儼然郭子曰何次道充字次道徃王丞相許丞相以麈尾礭床呼何共坐云來來此是君位丗􅀃曰魏明帝使后弟毛曽與夏侯太􅀄共坐時人謂之蒹葭􅀝玉樹語林曰馬融笇渾天不合召鄭玄令笇一笇便决及玄業成辭歸融心忌焉玄亦疑有追者乃坐橋下在水}
