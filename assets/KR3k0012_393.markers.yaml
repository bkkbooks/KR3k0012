  - {type: variant, offset: 2098, length: 132, content: 此君又曰謝萬北征嘗以嘯詠自高未嘗撫慰眾士謝公謂曰汝為元帥宜數喚諸將慰勞之萬都無其說直以如意指四座曰諸公皆是勁卒諸將甚怨之搜神記曰趙炳嘗臨水從舡人乞渡舡人不許炳乃張蓋坐其中長嘯呼風亂流而濟潯陽記曰桓宣穆使人尋廬山見一人謂之曰君過前嶺必逢二年少相隨長嘯試要問之若不與言, SBCK: 敢復欺}
