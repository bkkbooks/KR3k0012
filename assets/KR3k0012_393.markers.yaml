  - {type: variant, offset: 990, length: 0, content: '', WYG: 何晏别傳曰晏小時武帝雅竒之欲以為子每挟将逰觀命與諸子長幼相次晏㣲覺於是坐則専席止則獨立或問其故答曰禮異族不相貫坐孟嘉别傳曰庾亮領江州嘉為従事禇裒為豫章出朝亮正旦大㑹時彦悉集嘉坐次第甚逺裒問亮曰聞有孟嘉其人何在亮曰在坐卿但自覔裒覩衆人指嘉謂亮曰將無是乎亮欣然笑嘉為裒所得乃益重嘉焉皇甫謐髙士傳曰管寧常坐一木榻五十餘年榻上當膝處皆穿六韜曰文王出見吕尚坐茅而漁乃再拜與歸又曰紂之時婦女坐綺之席晏子曰景公}
