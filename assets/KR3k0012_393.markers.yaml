  - {type: variant, offset: 771, length: 7, content: 陽太守成瑨委功, SBCK: 薛悙字子禮爲北海長家貧坐無完席妻曰白居無俸禄給子孫復無完席耶悙以善席與自坐敗者又曰鄭敬字次都釣於大澤折芰而坐以荷薦肉瓠瓢盛酒琴書自娱范曄後漢書曰􅀽術僣號人情離叛欲北至青州從􅀽譚}
  - {type: variant, offset: 771, length: 7, content: 陽太守成瑨委功, WYG: 薛惇字子禮為北海長家貧坐無完席妻曰白居無俸禄給子孫復無完席耶惇以善席與自坐敗者又曰鄭敬字次都釣於大澤折芰而坐以荷薦肉瓠瓢盛酒琴書自娱范􅁮後漢書曰袁術僣號人情離叛欲北至青州従袁譚}
  - {type: variant, offset: 771, length: 7, content: 陽太守成瑨委功, krp: 薛悙字子禮爲北海長家貧坐無完席妻曰白居無俸禄給子孫復無完席耶悙以善席與自坐敗者又曰鄭敬字次都釣於大澤折芰而坐以荷薦肉瓠瓢盛酒琴書自娱范曄後漢書曰袁術僣號人情離叛欲北至青州從袁譚}
  - {type: variant, offset: 779, length: 2, content: 岑晊, SBCK: 操使劉備邀之還壽春至江亭坐簀床而歎曰􅀽術乃至於是乎歐血而死又曰孔融性寛容少忌好士喜誘益後進及退閑職賔客日盈其門常歎曰坐上賔恒滿罇中酒不空吾無憂矣與蔡邕素善邕卒後有虎賁士皃􅀋於邕融毎酒酣引與同坐又曰鄭公業諌董卓曰張孟卓東平長者坐不闚堂言不妄視也吴書曰孫權遣干禁還羣臣送禁虞翻謂禁曰卿勿謂吴無人吾謀適不用耳禁雖爲翻所惡然猶盛歎翻魏文帝爲翻設虚坐蜀志曰費禕爲諸葛亮司馬值軍帥魏延與長史楊儀相憎每並坐論延或舉刃擬儀儀泣涕横集禕常入坐其間諌喻分別終亮之丗各盡延儀之用也又曰王平字子均西宕渠人生長戎旅手不能書所識不過十字而占授作書皆有意理使人讀史漢書記傳聽之備知其義從朝至夕端坐儼然也吴志曰歩騭字子山與廣陵衛旍俱以種􅀲自給㑹稽焦征羗}
