  - {type: variant, offset: 1103, length: 1, content: 徽, SBCK: 莽軍師外破大臣内叛憂懣不能食但飲酒㗖鰒歩角切魚讀軍書倦因慿凡寢不復就床後漢書曰彭寵自立爲燕王其妻數惡夢又多見變恠五年春寵齋獨在便室倉頭子宻等三人因寵卧寢寐共縳寵着床告外吏云大王齋禁皆使吏休東觀漢記曰吴漢擊冨平獲索二賊於平原明年春賊率五萬餘人夜攻漢營軍中驚亂堅卧不動又曰上在邯鄲宫晝卧温明殿耿弇入造床下請問因􅀃曰今更始失政天下可馳檄而定又曰楊政常過楊虚侯馬武稱疾卧欲令政拜床下政入户徑上床坐武恨語言不懌政因曰蕃臣不思求賢報國而驕天下英俊今日摇動者刀入脅左右大驚蜀志曰先主旣定益州廣漢太守夏纂請􅁗宻爲師友􅀕酒領五官􅁺稱曰仲父宻稱疾卧在茅舎纂將功曹石祐主簿王並即宻第宴談宻卧如故沈約宋書曰羊欣字敬元從父不疑爲烏程令年十二時王獻}
