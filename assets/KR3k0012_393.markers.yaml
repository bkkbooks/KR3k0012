  - {type: variant, offset: 1731, length: 170, content: 拾遺記曰太始二年南方有因霄之國人皆善嘯大丈夫嘯聞百里婦人嘯聞五十里如笙竽之音秋冬則聲清高春夏則聲沉下人舌尖處倒向喉內亦云有兩舌重沓以爪徐徐刮之則嘯聲踰遠故呂氏春秋云反舌殊鄉之國即此之謂也列女傳曰魯漆室之女者過時未適人當穆公之時君老太子幼女倚柱而嘯鄰人婦從謂曰何嘯之悲也子欲嫁乎女曰吾憂魯君老而太子少也西京雜記曰東方生善嘯每一曼聲長嘯塵落瓦飛, SBCK: 卒}
