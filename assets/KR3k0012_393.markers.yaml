  - {type: variant, offset: 2077, length: 1, content: 寄, WYG: 病召咸敎戒扵床下語至夜半咸睡頭觸屏風萬年大怒欲杖之咸叩頭謝曰具曉所言大}
  - {type: variant, offset: 2079, length: 0, content: '', SBCK: 敎咸謟也萬年乃不復言晏子曰景公田於梧丘夜猶早公坐睡而夢有五大夫北面稱無罪公覺召晏子晏子對曰昔君靈公田五大夫駭獸故断其頭而葬之命之曰五大夫之丘命人掘而葬之丗􅀃曰魏武云我眠中不可妄近近便斫人亦不覺左右冝深慎此後佯睡所幸人􅀼以􅀍覆之因便斫殺自後安眠人莫敢近者郭子曰許侍中頋司}
  - {type: page-break, offset: 2079, content: '', id: KR3k0012_SBCK_393-8b}
