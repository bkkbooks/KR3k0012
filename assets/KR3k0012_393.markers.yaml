  - {type: variant, offset: 1039, length: 3, content: 向胡鶵, SBCK: 玄在土下水上據木此必死矣遂罷追俗􅀃曰王僧敬神明俊徹爲一時之摽桓玄時集聚賔客莫有岀其右者王在坐都不復覺有餘人坐無王便覺殷仲文謝益壽爲佳王僧敬兄弟列坐齋中見之若神小人從户前過皆肅然毛竪􅄞康絶交書曰危坐一時痺不得揺卧􅀃文曰眠翕目也􅃦病卧也卧休也釋名曰卧化也其精神變化不與覺時同也􅄰謐也謐静無聲也寢侵也損事功也瞑泯也無知泯泯也禮記玉藻曰君子寢恒東首鄭玄注日首生氣也又樂記曰魏文侯問於子夏曰}
