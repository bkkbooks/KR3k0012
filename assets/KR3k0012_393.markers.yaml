  - {type: variant, offset: 1020, length: 0, content: '', SBCK: 共何晏別傳曰晏小時武帝雅竒之欲以爲子毎挾將遊觀命與諸子長㓜相次晏微覺於是坐則專席止則獨立或問其故荅曰禮異族不相貫坐位孟嘉別傳曰􅁃亮領江州嘉爲從事禇褒爲豫章出朝亮正旦大㑹時彦悉集嘉坐次第甚逺褒問亮曰聞有孟嘉其人何在亮曰在坐卿但自覔褒觀衆人指嘉謂亮曰將無是乎亮欣然􅀏嘉爲褒所得乃益重嘉焉皇甫謐髙士傳曰管寧常坐一木榻五十餘年榻上當􅂰皆穿六韜曰文王出田見吕尚坐茅而漁乃再拜與歸又曰紂之時婦女坐之綺席晏子曰景公獵休坐地食晏子後至滅葭而席公不恱曰子席何也對曰臣聞介胄坐陣不席獄訟不席獄户不席三者皆憂也臣不敢以憂侍坐孟子曰晉平公之於亥唐也入云則入坐云則坐食云則食雖􅂼食菜羹未甞不飽莊子曰原憲處魯居環堵之室匡坐而弦歌風俗通曰延嘉中常侍坐單超左悺音貫徐璜具瑗唐衡在帝左右縱其姦慝時人謂之語曰左廻天徐轉日具獨坐言其信用甚於圎轉又曰汝南陳伯敬}
