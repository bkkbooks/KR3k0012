  - {type: variant, offset: 2682, length: 486, content: 曰阮氏逸韻阮籍所作也十四曰正章深遠極大非常聲也十五曰畢音五音之極而大道畢矣晉成公綏嘯賦曰逸群公子體奇好異傲世忘榮絕棄人事於是延友生集同好精性命之至機研道德之玄奧邈跨俗而遺身乃慷慨而長嘯發妙聲於丹脣激哀音於皓齒響抑揚而潛轉氣衝鬱而熛起協黃宮於清角雜商羽於流徵飄遊雲於泰清集長風乎萬里諒自然之至音非絲竹之所擬桓玄與袁宜都書論嘯曰讀卿歌賦序詠音聲皆有清味然以嘯為髣髴有限不足以致幽旨將未至耶夫契神之音既不俟多瞻而通其致茍一音足以究清和之極阮公之言不動蘇門之聽而微嘯一鼓玄默為之解顏若人之興逸響惟深也哉袁山松荅書曰嘯有清浮之美而無控引之深歌窮淵根之致用之彌覺其遠至乎吐辭送意曲究其奧豈脣吻之切發一往之清吟而已若夫阮公之嘯蘇門之和蓋感其一奇何為徵此一至大疑嘯歌所拘邪嚬韓子曰韓昭侯使人藏弊袴或曰君亦不仁矣弊袴不以賜左右而藏之昭侯曰吾聞明君嚬有為嚬笑有為笑袴之與嚬笑相去遠矣吾必待有功故藏之未有與也莊子曰西施病心而嚬其里之醜人見而美之歸亦捧心而嚬其里之富人見之堅閉門而不出貧人見之挈妻子而走之夫彼知美嚬而不知嚬之所以美嵇康高士傳曰於陵仲子齊人常歸省母人饋其兄鵝仲子嚬蹙曰惡用是鶂鶂者哉, SBCK: ''}
