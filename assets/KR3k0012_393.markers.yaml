  - {type: variant, offset: 331, length: 435, content: 之所共害故官塗不進作遊山九吟辭曰蓋人生天地之間若流電之過戶牖輕塵之棲弱草矣湘中記曰涉湘千里但聞漁父吟中流相和其聲綿邈也盛弘之荊州記曰新城郡瀙初覲切水別有一溪其傍有白馬塞孟達登之歎曰金城千里遂為上瀙吟彼方人猶傳此聲韻悽激其哀思之音乎西京雜記曰相如將娉茂陵人為妾文君作白頭吟鹽鐵論曰曾子倚山而吟山鳥下翔世說曰韓壽美姿容賈公辟為掾充每藂會其女於青璅中看見壽心甚悅之乃問其婢識此人不婢說是其先主女內懷存想發於吟詠婢後往壽家具說如此并言女色麗壽聞之心動乃因婢通意婢以白女女大喜乃期往宿壽趫捷絕人乃踰墻而入家中莫知自是賈公覺女悅暢有異於常陳武別傳曰陳武字國本休屠胡人常騎驢牧羊諸家牧豎十數人或有知歌謠者武遂學太山梁父幽州馬客吟及行路難之屬阮籍樂論曰漢順帝上恭陵過樊濯聞鳴鳥而悲泣下橫流曰善哉鳥鳴使左右吟之使聲若是豈不佳乎此謂以悲為樂也王粲登樓賦曰鍾儀幽而楚奏莊寫顯而越吟嘯說文曰嘯吟也雜字解詁曰嘯吹聲也毛詩江有汜曰之子歸不我過不我過其嘯也歌箋大嘯蹙口而出聲也又白華曰嘯歌傷懷念彼碩人, SBCK: 謝承}
