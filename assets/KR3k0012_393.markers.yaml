  - {type: variant, offset: 2410, length: 125, content: 上道君授於西王母西王母授於南極真人南極真人授於廣成子廣成子授於嘯父嘯父授於務光務光授於舜舜演之為琴以授禹自後而廢續有晉太行山仙君孫公得之乃得道而無所授焉阮嗣宗所得少分其後堙滅不復聞矣又曰嘯有一十五章一曰權輿嘯之始也二曰流雲乃古之善嘯者聽韓娥之聲而寫之, SBCK: 平御覽卷第}
