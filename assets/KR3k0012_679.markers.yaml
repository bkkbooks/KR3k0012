  - {type: variant, offset: 1197, length: 3, content: 西母攜, SBCK: 紫陽眞人受􅂫君三一玄丹之道又曰有北海公㳙子受守一玄丹之道又曰東宫中候眞夫人受桐􅁊眞人飛解脫綱之道又曰昔周君學道常山中積年精思忽見老人知是神異乃叩頭請道老人出素書七篇令誦之周君仙去又曰趙叔期學道王屋山時出民間聞有卜者在市肆叔期曰欲入天門調三關存朱衣正崑崙叔期知神人因拜乞要訣因出一書與之是胎精中記拜此書入山誦之後合神丹服而􅂛天}
