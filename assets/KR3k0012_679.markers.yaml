  - {type: variant, offset: 14, length: 4, content: 若道士得, SBCK: 黄帝受襄城小童歩六紀之法又曰黄累小童受歩三經之法也又曰廣成受東中元童歩六官之法也文始内傳曰太上遣繡衣使者傳命尹喜玉帝七聖玄紀曰七聖撰上玄之章以付五老上眞仙都左公藏於紫蘂玉笈封以啓命之章西􅀛定籙東華校名三天正法曰太眞靈籙}
  - {type: variant, offset: 14, length: 5, content: 若道士得祕, WYG: 黄帝受襄城小童步六犯之法又曰黄累小童受步三經之法也又曰廣成受東中元童步六官之法也文始内傳曰太上遣綉衣使者𫝊命尹喜玉帝七}
