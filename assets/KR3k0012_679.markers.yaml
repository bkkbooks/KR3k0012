  - {type: variant, offset: 1766, length: 153, content: 者吳倫齎黃金五十斤置于茅三君廟下四時祠以太牢至明帝永平二年詔丹陽句容茅真人廟使營護脩守時邑人通呼此廟為白鵠廟句曲之洞宮有五門石階曲山以水其門令得往來上下也句曲洞天東通林屋北通岱宗西通峨嵋南通羅浮皆大道也其間小徑新路阡陌沙澮非一處也漢建安之未左慈聞江東有此山故尋之齊戒三月而登山乃得其門入洞虛造陰宮二茅君授以, SBCK: 羣}
