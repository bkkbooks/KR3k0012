  - {type: variant, offset: 196, length: 232, content: 彌布無外三皇經曰百萬人中或有一人應得此文者皆有仙籙宿命者也欲有所授當擇其人入諸名山八極周流天下鬼神無敢犯之者太清元始天中之王母初學道之師也又曰皇人者太帝所使在峨嵋山黃帝往授真一五牙法抱朴子曰黃帝東至青丘過風山見紫府先生受三皇內文以劫召萬神南至圓壠蔭建木觀百靈西至中黃子受九加之方過崆峒從廣成子授自然之經北至洪隄上具茨見大隗君黃蓋童子受神芝圖還陟王屋得神丹注記至峨嵋山見黃人於玉堂問真一之道曰夫長生仙方惟有金液守形卻惡獨有真一之道古人尤重也黃帝自然體道者也猶復陟王屋, SBCK: 祕}
