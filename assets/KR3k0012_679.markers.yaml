  - {type: variant, offset: 3560, length: 288, content: 遣繡衣使者孟六奇授九色之節雙珠月明神虎之符錦旂虎旌使位主群神以威六天太素三元君遣保禁仙都衷文堅右嬪元姬趙約羅授夫人西華玉女三百八景飛輿玄景九龍使侍衛執巾上詣三清扶桑太帝君遣八玄仙伯柯原首五方天帝君簡肅正等授夫人玉札金文位為紫虛元君領上真司命使主諸學道死生圖籍攝御之官關校罪考金關後聖君命仙伯牙叔平授夫人青瓊之板丹綠為文位為南岳夫人比秩仙公給曲晨飛蓋以遊九宮使治天台大霍山洞臺之中主下訓奉道教授當為真仙者令一月再登玉清三登太素四謁玉晨宮宴扶桑之高臺於是夫人授王母之命且還王屋山小有之中更齋戒三月九微元君龜山王母西城真人王方平太虛真人赤松子桐柏真人王子喬並降小有清虛上宮絳房之中各, SBCK: 即}
