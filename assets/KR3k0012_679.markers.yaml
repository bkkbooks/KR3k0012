  - {type: variant, offset: 2932, length: 0, content: '', SBCK: 常置經於几格㓗浄處法輪經曰夫欲授經皆當齎金寳之信詣師請受道貴法重道非言不行輕傳則爲非寳空修則爲賤道衆篇經曰古人非心不仙末世非財不度所以尓者末世貴財賤道也以黄金万斤仙經一部施于窮山末世乃取金弃經黄金刻爲身患仙經刻得長生公知如此不能免貪也非道弘人此之謂也大有經曰大上寳章傳太帝君太帝君傳天帝君天帝君傳太微天帝太微天帝傳金闕帝君金闕帝君傳東海青受之以金爲盟長九寸廣四寸厚三分刻而書之以封山川五岳之真精也三元真一經曰盟誓三官委帛血壇割革大約乃得授付受者盟者保神以堅心故萬物不能犯天地不能違以素絲一兩齋百日或五十日或三十日或二十日十日也法以四十年得傳一受玄丹玉經曰青布三十二尺朱帛三十二尺明鏡二枚告誓爲不泄之約}
  - {type: page-break, offset: 2932, content: '', id: KR3k0012_SBCK_679-6a}
