  - {type: variant, offset: 2149, length: 423, content: 紫微元靈白玉龜臺九靈太真元君即西王母也上宰揔真王君東卿司命茅君之師右莢紫微夫人之母也居崑崙墉臺別治白玉龜山青琳之宮朱紫之房首戴華勝腰帶虎章葆蓋沓暎羽旌廕庭以漢平帝時來降句曲華陽宮授司命茅君玉佩金璫經又獎教中小二君至晉成帝時與金闕聖君同降陽洛隱元臺授魏夫人玉清隱書四卷又穆天子傳所載詣西王母及降漢武者皆是也別有傳紀名靈鏡洞玄上經或曰大有妙經即今所存中元輔卿手執者是未顯于世主訓教天下學真之人又曰西極揔真君者茅司命之師也生於商末服青精䭀飯九轉丹用曲晨劍解之道治西城山宮年三十著繡衣芙蓉冠把鈴帶劍一漢元帝時降陽洛山授玉清虛上經三十一卷晉時又降魏夫人於陽洛臺每以三月十二月亦同來句曲推校學仙別有傳未顯於世神仙傳云降蔡經家者是此君也又曰清虛王真人揔真王君弟子南岳魏夫人師漢元帝時辭家人華陰山九年太極真人降授二法後入地胏山終南山一名地胏又登陽洛山平帝時南極夫人西城王君同降授上經三十一卷王君共詣玄洲請書真名乃還西城修行道成於是乘飛飆車遊行天下後登白空山詣紫清, SBCK: ''}
