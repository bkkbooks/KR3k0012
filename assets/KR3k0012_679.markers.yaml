  - {type: variant, offset: 1920, length: 227, content: 芝三種慈周旋洞室經年制度甚肅歎曰不圖天下復有如此之異乎至于地中洞天有三十六所王屋委羽西城西玄青城赤城羅浮句曲林屋括蒼崑崙蓬萊瀛州方丈滄浪白山八停之屬也五岳及諸名山皆有洞室或三十里二十里十里岳洞方百里也句曲山秦時名為句金壇以洞天內有金壇百丈因以致名也漢靈帝時勑郡縣採句曲之金以充武庫孫權時又遣宿衛人採金常輸官句曲山每至三月十八日十二月二日東卿司命茅君當是日請揔真玉君大虛真人東海青童君會于句曲之上好道者欲求神仙宜先齋戒俟此日登山陳乞也茅君即授以要道得入洞門, SBCK: ''}
