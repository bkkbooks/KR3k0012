  - {type: variant, offset: 2923, length: 2, content: 蘊開, SBCK: 錦之囊上清變化七十四方解形之道三元布經以授於元君道學傳曰王母云此靈光生經聽四千年得傳一人无其人聽八千年頓傳二人授非其人是爲泄天道可傳而不授是爲閇天寳不計限而妄授之是爲輕天老受而不敬是爲慢天藻泄閇輕慢四者延禍之事也同道謂之天親同心謂之地愛傳授當相親愛共均榮辱又曰漢武帝自撰西王母所􅀃集爲一卷及所與經圖之屬盛以黄金之几封以白}
