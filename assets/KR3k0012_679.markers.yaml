  - {type: variant, offset: 1205, length: 396, content: 詣固衷之宮固衷盈二弟也西母撫背告之曰汝道雖成所聞未足我有所授汝乃遣侍女郭密香與上元夫人相聞云但不相見四千餘年天事勞我致以罕面可暫來否當此相待上元夫人遣一侍女荅曰阿環再拜上問起居遠隔絳河擾以官事遂違顏色近五千年仰戀光潤情係無違密香至奉信承降尊於茅固處聞命之際即當飾駕先被太常君勑使詣希林校定三元之籙正爾暫往如是當還還便束帶願暫少留茅固因問王母不審上元夫人何真也曰三天真皇之母上元之高真統領十方玉女之名籙者也及上元夫人來聞雲中簫鼓聲龍馬嘶鳴既至從者甚眾皆女子齊年十六七容色明逸多服青綾之衣光彩奪目上元年未笄天姿絕艷服赤霜之袍柀青錦裘頭作三角髻餘髮散於腰戴九晨夜月之冠鳴六山火藻之佩曳鳳文琳華大綬執流黃揮精劍入室向王母拜王母坐止呼之與同座北向上元夫人設廚王君勑茅盈二弟固衷起拜稽首而立命坐復席上元乃勑侍女出紫錦囊開綠金之笈三元流珠經丹景道精經隱地八術經太極綠景經凡四部以傳固衷西王母勑侍女李方明出丹, SBCK: ''}
