  - {type: variant, offset: 3876, length: 18, content: 地傾嘉會絳阿內相與樂未央歌畢須臾司命, SBCK: 賜菜食長齋專務修道朱性嚴厲入室者惟暄人也隱虞山雖居幽寂逺近歸向林谷常滿又曰􅁃承仙字崇光潁川􅋣陵人也㓜聦悟􅀶極羣書時處士劉弘碩學尤明老莊隱于荆州之沙洲承仙師之講習多所該究家貧無書每事假借一覧便誦又曰孫遊岳字玄逹東陽永康人也宋泰始中陸元德自廬岳下都闡揚至教遊岳乃出京師問道親侍惟席預入室之流其宏言奥旨非遊岳不傳太一記曰裴君精思五年五帝曰君登八極城明真靈臺授揮神九有之術玉皇譜籙曰元始丈人登玉虚之壇受九天譜籙葛洪}
