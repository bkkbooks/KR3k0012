  - {type: variant, offset: 52, length: 4, content: 但當必得, SBCK: 上皇玉慧玉清之隠書金玄隱玄之羽書經者皆五老校圗太一式觀又曰上皇玉帝命太老眞人開瓊珠之篋出玉清隠書玄羽玉經以傳太微天帝君二十四生圗曰元始天帝於長桑碧林園中聞帝尊普告元聖尊神洞玄天文靈寳玉奥也又曰依舊典府仰之格付度道君女青律云太眞玉帝上宫府仰之格舊經億刼不傳也又曰帝尊在恊晨靈觀登白玉座具宣祕要開闡妙門太玄經曰老子傳授經戒籙儀注訣曰以局脚小案置經綵巾覆上明眞經曰元始尊在香林園中􅀃明眞經太清中經曰道曰愼無賣吾以求寳也愼無傳吾非}
  - {type: page-break, offset: 52, content: '', id: KR3k0012_SBCK_679-2a}
  - {type: variant, offset: 52, length: 4, content: 但當必得, WYG: 上皇玉惠玉清之隱書金𤣥隱𤣥之羽書經者皆五老校圖太一式觀又曰上皇玉帝命太老真人開瓊珠之篋出玉清隱書𤣥羽玉經以傳太㣲天帝君二十四生圖曰元始天帝於長桑碧林園中聞帝尊普告元聖尊神洞𤣥天文靈寳玉奥也又曰依舊典府仰之格付度道君女青律云太真玉帝上宫府仰之格舊經億刼不傳也又曰帝尊在恊晨靈觀登白玉座具宣秘要開闡妙門太𤣥經曰老子傳授經戒籙儀註訣曰以局脚小案置經綵巾覆上明真經曰元始尊在香林園中説明真經太清中經曰道曰慎無賣吾以求寳也慎無傳吾非}
