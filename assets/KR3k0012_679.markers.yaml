  - {type: variant, offset: 429, length: 764, content: 受丹經登崆峒而問廣成往具茨而事大隗適東岱而奉中黃入金谷而咨子心論道養而證玄素精推步而授雷岐窮神姦記而白澤相地理而書青烏救傷殘而綴金冶故能畢該秘要窮盡道真按神仙經云昔黃帝老子奉事元君元君以受要訣況乎不建彼二君者安能自得仙度世者乎按荊山經及龍首記皆云黃帝服神丹又曰彭祖八百年安期千年斯其壽之過人遠矣若果有不死之道彼何不遂仙乎豈非稟命受氣偶得其多者乎按彭祖經云佐堯曆夏至商為大夫商王從受還年之術行之有効欲殺彭祖以絕其術祖覺而逃去去時年八百又曰紫微玄宮玉飛天真書太清元始授西母佩之位登仙宗真人衛從又曰玄洲仙伯關天萬仙真書東海小童授以得道人佩之一名仙人道籙一名鳳真籙太玄登仙盟文又崑崙墉臺靈飛太真大上丈人以授得道者佩之周行五岳山神授職一名五岳兵符佩之金石為開又曰蓬來高上真書成青天上皇以傳甯封佩此真符橫行江海一名蓬萊太玄玉札一名九流真書北陵文人授以馬師皇致龍來又天帝丈人黃上真書佩之知吉凶未兆之事上清經曰上清真人登大帝滄浪山諸太極真人授以丹青玉鑪鍊雲根經三元布經曰昔甯玄甫受此經於皇上真人九年祕藏白空山齋戒百日忽見其巖有王文銀簡今封一通於白空山中本行經曰丹靈真人遇玄和先生受靈寶赤書五氣玄文黑帝真文一篇高玄經曰昔上元以隱文授太和玉女玉女授幼陽君以文封於九疑洞室登真隱訣曰太極帝君寶章者東海青童君授涓子以封掌名山涓子剖鯉所獲是太上召三一守形也以朱書素佩之左肘勿經履汙穢佩之八年而三一俱見矣三一者三元真一君也授其封掌之教又曰李翼字仲甫以七變法傳左慈慈修之以變化萬端此經在茅真人傳後道士以還丹方殊祕故略出別為一卷茅君傳曰太真元君西母授說明堂玄真經云太上立玄雙神四明玄真內映明堂外清吞息二暉長生神精上補司命監御萬靈六華充溢撤視黃寧此四十字即玄真之本經也其後王母惣真更演說行事之法猶如九真中經惟以龍書為主也太上刻於鳳臺南軒非惣真弟子不教非司命之玄挺, SBCK: ''}
