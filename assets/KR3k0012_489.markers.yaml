  - {type: variant, offset: 3018, length: 1, content: 喪, SBCK: 所重今可謂致身命之日兄其勉之乃扶將老母轉至豫章而洛城失守璪没焉沈約宋書曰王弘字方平家貧而性好山水求爲烏傷令尋以病歸桓謙以爲衛軍叅軍時殷仲文還姑熟祖送傾朝謙要弘之同行荅曰凡祖離送别必在有情下官與殷風馬不接無縁陪從謙貴其言又曰張敷音儀詳緩與人別執手曰念相聞後魏書曰南安王禎復封南安王後爲鎭北大將軍相州刺史帝餞禎華林都亭詔左右賦詩不能者並可聽射當使武士彎弓文人下筆帝送禎下堦流涕而別續齊諧記曰京兆田眞三人分財堂前有紫荆花葉茂異共議破爲三分明截之爾夕樹即枯死眞見之驚謂弟曰花本同株當分析枯悴况人兄弟孔懷而少離異是不如樹也兄弟相感更合呉録曰朱桓還屯濡湏權祖之桓奉觴曰臣當逺去願一捋陛下􅂡無所復恨權憑几前席桓進持􅂡日臣今日眞可謂捋虎􅂡者權大􅀏呉越春秋曰越王勾踐伐吳將與大夫范蠡}
