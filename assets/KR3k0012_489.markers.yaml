  - {type: variant, offset: 3373, length: 1, content: 亦, SBCK: 操曰商陵牧子娶妻五年無子父兄將欲與改娶妻聞中夜驚起􅀝户悲嘯牧子聞援琴鼔之痛恩愛永離歎别鶴以舒情故曰別鶴操古詩曰行行重行行與君生別離相去萬餘里各在天一涯道路阻且長㑹靣安可期胡馬嘶北風越鳥巢南枝相去日巳逺衣帶日巳緩棄􅂢勿復道弩力加飡飯李陵贈􅂫武詩曰携手上河梁遊子暮何之徘徊歧路間恨恨不}
