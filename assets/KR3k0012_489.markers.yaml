  - {type: variant, offset: 317, length: 1532, content: 飲於燕市酒酣漸離擊筑軻和而歌之於市中相樂已而相泣傍若無人又曰戚姬愛幸生趙王如意嘗從高祖於關東日夜啼泣欲立如意為太子又曰竇皇后兄長君弟曰竇廣國字少君年五歲時家貧為人所略賣之長安聞皇后新立廣國上書自陳后言之文帝召見具言其故於是后持之而涕泣交橫下侍御左右皆伏地泣助皇后悲哀又曰漢高帝欲自擊陳狶蒯成侯周緤泣曰始滅秦定天下未嘗自行是為無人可使者乎漢書曰上朝東宮趙談參乘袁盎伏車前曰聞天子所共六尺輿皆天下豪英今漢雖乏人陛下獨柰何與刀鋸之餘載於是上遣下談泣下車又曰李陵與蘇武別置酒起舞歌曰萬里兮度沙漠為君將兮奮匈奴路窮絕兮矢刃摧士眾滅兮名已頹老母已死雖欲報恩將安歸陵泣下數行因與武決又曰高祖破黥布軍還過沛置酒沛宮酒酣上慷慨傷懷泣下數行東觀漢記曰更始害齊武王光武飲食語笑如平常獨居輒不御酒肉枕席有涕泣處又曰來歙與蓋延攻公孫述將王元破之蜀人大懼使剌歙歙未死馳告蓋延延見歙伏悲不能仰視歙叱曰故呼卿欲屬以軍事而返效兒女子泣涕乎延收淚強起受所誡歙自書表投筆抽刃而死又曰章帝東巡狩祠泰山還幸東平王宮涕泣沾襟楚漢春秋曰惠帝崩呂太后欲為高墳使從未央宮坐而見之諸將諫不許東陽侯垂泣曰陛下日夜見惠帝塚悲哀流涕無已是傷生也臣竊哀之於是太后乃止吳志曰孟宗為驃騎朱據軍吏將母在營既不得志又夜雨屋漏因起涕泣以謝母母曰但當自勉之何足泣也晉書曰羊祜卒南州人罷市哭聲相接吳守邊將士亦為之泣隋書曰李穆從太祖擊齊師於邙山太祖臨陣墮馬穆突圍而進以馬策擊太祖而詈之授以從騎潰圍俱出賊見其輕侮謂太祖非貴人遂緩之以故免既而與穆相對泣顧謂左右曰成我事者其此人乎又曰李崇守永隆英果有籌筭膽力過人初以父賢勳封廻樂縣侯時年尚小拜爵之日親族相賀崇獨泣賢怪而問之對曰無勳於國而幼少封侯當報主恩不得終於孝養是以悲耳賢由此大奇之孔藂子曰費子陽謂子思曰吾念周室將滅涕泣不可禁也子思曰然今以一人之身憂世之不治而涕泣不禁是憂河水之濁而以泣清之也其為無益莫大焉又曰子高曰泣有二焉大奸之人以泣自信婦人懦夫以泣著愛尸子曰曾子每讀喪禮泣沾襟呂氏春秋曰吳起治西河之外王錯譖於魏武侯使人召之吳起至於岸門岸門邑名止車而望西河泣數行而下其僕謂吳起曰竊觀公之意釋天下若釋躧今去西河而泣何也吳起曰今君聽讒人之言而不知我西河之為秦不久矣魏國從此削乎起果去入楚有間西河入秦說苑曰聖人於天下也譬猶一堂之上今滿堂飲酒有一人向隅而泣則一堂之人皆不樂矣又曰禹出見辜人問而泣之左右問其故禹曰堯舜之民皆以堯舜之心為心今吾為君百姓皆以其心為心是以痛之又曰蔡威公閉門而哭三日泣盡繼以血其鄰窺牆問曰何故哭悲荅曰吾國且亡吾聞病之將死不可為良醫國之將亡不可為計謀吾數諫吾君不用是知將亡續晉陽秋曰司馬文王問劉禪曰頗思蜀不禪曰此間樂不思蜀也郄正見禪曰若王後問宜泣有以荅會王復問禪曰先人墳墓遠在隴蜀乃心西望無日不思因閉眼王曰何乃似郄正語耶禪驚視曰如尊命汝南先賢傳曰蔡順母畏雷後卒每有雷震順輒環塚泣曰順在此王充論衡曰昔周人有仕不遇年老白首涕泣於塗者人或問何為泣乎對曰吾仕數不遇自傷年老失時是以泣又曰蘇秦張儀學從橫之術於鬼谷先生先生曰能說我泣出則能分人主之地矣秦說鬼谷先生泣沾襟劉向新序曰周舍事趙簡子居無幾舍死簡子與諸大夫飲酒酣泣曰百羊之皮不如一狐之腑眾人之唯唯不如周舍之諤諤自舍死未嘗聞吾非也吾國幾亡乎是以垂泣也文士傳曰張叔序字彥真遇黨錮去官道逢其友人相與語天下云嫉害忠良豈但道之不行恐將不免二人相向而泣有老人過嗟曰二大夫何泣之悲哉龍不隱鱗鳳不藏羽羅網高懸憂在機後泣將何及二人欲與之語不顧而去梁江淹泣賦曰秋日之光流子以傷露離披而殺草風清冷而繞堂慮尺折而寸斷魂一逝而九傷欷潺湲兮沬袖泣嗚咽兮染裳尋夫景君齊山荊公燕市孟嘗聞琴馬遷廢史少卿悼躬夷甫傷子皆泣緒如絲詎能仰視後漢張奐與張公超書曰下筆愴恨泣先言流悲, SBCK: ''}
