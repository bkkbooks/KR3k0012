  - {type: variant, offset: 3062, length: 0, content: '', WYG: 謙貴其言又曰張敷音儀詳緩與人别執手曰念相聞後魏書曰南安王禎復封南安王後為鎮北大將軍相州刺史帝餞禎華林都亭詔左右賦詩不能者並可聴射當使武士彎弓文人下筆帝送禎下堦流涕而别續齊諧記曰京兆田真三人分財堂前有紫荆花葉茂異共議破為三分明截之爾夕樹即枯死真見之驚謂弟曰花本同株當分折枯悴况人兄弟孔懐而可離異是不如樹}
