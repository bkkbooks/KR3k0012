  - {type: variant, offset: 7, length: 309, content: 九泣說文曰泣無聲出涕也易曰乘馬班如泣血漣如詩曰瞻望弗及佇立以泣又曰不見復關泣涕漣漣禮記曰高子羔執親之喪泣血三年未嘗見齒君子以為難又曰弁人有其母死而孺子泣者孔子曰哀則哀矣而難為繼也左傳曰楚令尹子元欲蠱文夫人為館於其宮側而振萬焉夫人聞之泣曰先君以是舞也習戎備也今令尹不尋諸仇讎而置館於未亡人之側不亦異乎又曰叔孫婼聘于宋宋公與之宴飲酒樂宋公使昭子右坐右相泣樂祁佐退而告人曰今茲君與叔孫其皆死乎吾聞之哀樂而樂哀皆喪心也何以能久又曰宋公子地有白馬四公嬖向魋魋欲之公取而朱其尾鬣以與之地怒使其徒奪之魋懼將走公閉門而泣之目盡腫國語曰叔向見司馬侯之子撫之而泣曰自其父死也吾蔑與比而事君也昔者其父始之我終之我始之夫子終之史記曰荊軻與高漸, SBCK: 别}
