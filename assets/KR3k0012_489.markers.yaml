  - {type: variant, offset: 2145, length: 273, content: 我與卿者多矣皆湮滅無聞使人悲傷如歲後有知魂魄猶應登此也湛曰公德冠四海道嗣前哲令望必與此山俱傳至若湛輩乃當如公言耳莊子曰宋桓侯築蘇宮使蔡謳為土唱也觀者數百倍去之無有悲色君乃賞蔡呂氏春秋曰周有申喜亡其母聞乞人歌於門下而悲之動於顏色謂門者內乞人歌者自見而問焉與之語是其母也淮南子曰木葉落而長年悲列女傳曰魯七室邑之四者一邑七宮也過時未適人當穆公之時君老太子幼女倚柱而嘯傍人聞之心莫不為之慘慘者鄰人婦謂曰何嘯之悲欲嫁乎吾為子求偶七室女曰豈為嫁之故不樂而悲哉吾憂魯君老而太子少也秦州記曰隴西郡東一百六十里得隴山山東人西役升此而顧瞻者莫不悲思楚辭曰悲者秋之為氣, SBCK: 三月}
