  - {type: variant, offset: 3066, length: 0, content: '', WYG: 送歸之所江表𫝊曰孫權乗飛雲大船與張昭秦松魯肅十餘人共送周瑜大宴㑹叙别昭等皆出權獨與劉備留語因言次歎瑜曰公瑾文武籌畧萬人之英顧其器量廣大恐不乆為人臣耳李陵别𫝊曰陵與蘇武書曰男兒生不成名死必葬蠻夷中耳誰復能屈伸稽顙還向北闕使刀筆吏弄其文墨邪願足下勿復望陵嗟乎子卿知復何言相去萬里人絶路殊生為别離之人死為異域之鬼文士𫝊曰張翰到京師時齊王冏擅權翰謂同郡人顧榮曰天下紛紛未已夫有四海之名者求退難吾本山林間人無望於時去矣子善以明防前以智慮後榮捉其手愴然歎曰吾亦思汝採南山蕨飲三江水耳翰遂稱疾徑歸府以翰輙去除吏名世說曰杜預屯荆州頓七星橋朝士悉祖}
