  - {type: variant, offset: 3371, length: 1, content: 鼓, SBCK: 將何以治西河對曰以忠以信以仁以義武侯曰四者足矣郭子曰周叔治爲晉陵謨子叔治光禄大夫西平貞侯顗弟周侯仲智送之周侯名顗字伯仁仲智名嵩次弟也叔治將泣涕不止仲智恚之曰困人及婦人別惟知啼便捨去周侯獨留與飲酒言語臨別流涕撫其背曰阿孥自愛孔藂子曰子髙遊趙平原君客有鄒文李節者與相友善及將還魯諸故人訣旣畢文節送行三􅀫臨別文節流涕交頥子髙徒握手而巳分背就路其徒問先生與彼二子善彼有戀戀之心而先生厲聲髙揖無乃非親之謂乎髙曰始吾謂此二子丈夫耳乃今知其婦人人生其有四方之志豈鹿豕哉而常羣聚乎其徒曰若此二子泣非耶吾荅曰斯二子良人也有不忍之心其於斷必不足矣又曰竇皇后弟廣國曰姉去我西時與我訣於傳舎中沐我而去又曰成帝遣定陶王之國王辭去上與相對涕泣而訣}
  - {type: page-break, offset: 3371, content: '', id: KR3k0012_SBCK_489-6a}
  - {type: page-break, offset: 3371, content: '', id: KR3k0012_SBCK_489-6b}
  - {type: variant, offset: 3371, length: 0, content: '', WYG: 將何以治西河對曰以忠以信以仁以義武侯曰四者足矣郭子曰周叔治為晉陵謨子叔治光祿大夫西平貞侯頴弟周侯仲智送之周侯名顗字伯仁仲智名嵩次弟也叔治將泣涕不止仲智恚之曰困人及婦人别惟知啼便捨去周侯獨留與飲酒言語臨别流涕撫其背曰阿奴自愛孔藂子曰子髙逰趙平原君客有鄒文李節者與相友善及將還魯諸故人訣既畢文節送行三宿臨别文節流涕交頤子髙徒握手而已分背就路其徒問先生與彼二子善彼有戀戀之心而先生厲聲髙揖無乃非親之謂乎髙曰始吾謂此二子丈夫耳乃今其婦人人生其有四方之志豈鹿豕哉而常羣聚乎其徒曰若此二子泣非耶髙答曰斯二子良人也有不忍之心其於斷必不足矣又曰竇皇后弟廣國曰姊去我西時與我訣於𫝊舎中沐我而去又曰成帝遣定陶王之國王辭去上與相對涕泣而訣琴操曰商陵牧子娶妻五年無子父兄將欲與改娶妻聞中夜驚起倚户悲嘯牧子聞援琴}
