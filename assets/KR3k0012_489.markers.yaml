  - {type: variant, offset: 3375, length: 2, content: 令文, SBCK: 辭行人難乆留客言長相思安知非日月弦望自有時弩力崇明德皓首以爲期又曰仰視浮雲馳奄忽互相踰風波一失路各在天一涯又曰昔爲鴛與鴦今爲參與商又曰二鳬俱北飛一鳬獨南翔子當留斯土我獨歸故郷􅂫武贈李陵詩云黄鵠一逺別千里影徘徊古詩曰客從逺方來遺我一書劄上有長相思下言乆離别置書懷䄂中三歲字不滅江淹别賦曰黯然消魂者唯别而巳矣楚辭序曰離别也騷愁也經徑也言巳放逐離别中心愁思猶陳道徑以諷諌君又曰草木揺落而變衰憭栗兮􅀂在逺行登山臨水送將歸又曰}
