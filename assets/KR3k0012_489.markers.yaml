  - {type: variant, offset: 2680, length: 269, content: 父母以遼恐之晉書曰桓溫字元子宣城太守彝之子也生未朞而太原溫嶠見之曰此兒有奇骨可試使啼及聞其聲曰真英物也蔡琰別傳曰琰在胡中十三年有二男捨之而歸作詩云家既迎兮當歸寧兒呼母兮啼失聲我掩耳兮不忍聽風俗通曰桓帝元嘉中婦人作啼粧者薄拭目下作啼處起梁冀家天下皆效之天戒若曰冀婦女將收啼也語林曰董昭為魏武帝重臣後失勢文明世入為衛尉昭乃厚加意於侏儒正朝大會侏儒作董衛尉啼面言昔太祖時事舉坐大笑明帝悵然不怡月中為司徒又曰胡廣本姓黃五月生父母置諸甕中投之于江胡翁見甕流下聞有小兒啼聲往取因以為子遂登三司涕說文曰涕鼻液也易曰齎咨涕洟無咎毛詩曰眷言顧之潸焉出涕又曰, SBCK: 羽}
