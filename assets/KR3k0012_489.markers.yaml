  - {type: variant, offset: 2968, length: 0, content: '', SBCK: 嫁女之家三夜不息燭思相離也左傳昭四年鄭六卿餞宣子於郊宣子曰二三子請賦詩起亦以知鄭志子􅚖賦野有蔓草子産賦羔裘子太叔賦褰裳子㳺賦風雨子旗賦有女同車子柳賦籜兮宣子喜曰二三子以命貺起賦不出鄭志二三君子皆數丗之主也家語曰}
