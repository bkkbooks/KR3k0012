  - {type: variant, offset: 3011, length: 0, content: '', SBCK: 在衛晨興顔淵侍有哭者甚哀回曰此哭非獨哀死又悲生離也孔子曰何以知}
  - {type: variant, offset: 3011, length: 0, content: '', WYG: 在衛晨興顔淵侍有哭者甚哀囘曰此哭非獨哀死又悲生離也孔子曰何以知}
  - {type: variant, offset: 3011, length: 0, content: '', krp: 在衛晨興顔淵侍有哭者甚哀回曰此哭非獨哀死又悲生離也孔子曰何以知}
  - {type: variant, offset: 3012, length: 0, content: '', SBCK: 對曰回聞􅁪山之鳥生四子焉羽翼旣成將分離悲鳴以相送哀有􅀋於此矣史記曰魯人或惡呉起曰起之爲人猜忍人也其少時家累千金將仕不遂遂破其家郷黨􅀏之起殺其謗巳者三十餘人而東出}
  - {type: page-break, offset: 3012, content: '', id: KR3k0012_SBCK_489-2a}
  - {type: variant, offset: 3012, length: 0, content: '', WYG: 對曰囘聞恒山之鳥生四子焉羽翼既成將分離悲鳴以相送哀有類於此矣史記曰魯人或惡吳起曰起之為人猜忍人也其少時家累千金將仕不遂遂破其家鄉黨笑之起殺其謗己者三十餘人而東出}
  - {type: variant, offset: 3012, length: 0, content: '', krp: 對曰回聞恒山之鳥生四子焉羽翼旣成將分離悲鳴以相送哀有類於此矣史記曰魯人或惡呉起曰起之爲人猜忍人也其少時家累千金將仕不遂遂破其家郷黨笑之起殺其謗巳者三十餘人而東出}
  - {type: punctuation, offset: 3013, content: ，, id: KR3k0012_CHANT_489-bkkpn984}
  - {type: 'tls:seg', offset: 3013, content: '', id: KR3k0012_CHANT_489-48a.4}
  - {type: variant, offset: 3013, length: 3, content: 遇舊館, SBCK: 郭門外與其母訣齧臂而盟曰起不爲卿相不復入衛又曰貳師將軍李廣利將兵擊匈奴丞相劉屈􅈊爲祖道送渭橋與廣利別又曰踈廣踈受父子並爲皇太子師􅀓朝廷以爲榮在位歳乆廣謂受曰吾聞知足不辱知止不殆功遂身退天之道也今仕宦至二千石䆠成名立如此不去懼有後悔即日父子俱稱病乞骸骨上以其年篤老皆許之加賜黄金二十斤皇太子賜以五十斤公卿大夫故人邑子爲設祖道供帳東都門外蘇林注曰長安東郭門也送者車數百兩辭訣而去及道路觀者皆曰賢哉二大夫或歎息爲之下泣又曰肅宗遣諸王歸國帝特留東平王蒼賜以秘書列仙圖道術秘方至八月飲酎畢有司復奏遣蒼乃許之手詔賜蒼曰骨肉天性誠不以逺近親踈然數見顔色情重昔時中心戀戀惻然不能言於是車駕祖送流涕而訣復賜乗輿服御珎寳與馬錢布以億萬計又曰赤眉兵盛乃拜鄧禹前將軍持節西征自選可與俱者於是凡將六將軍吏二萬人禹辭訣上自從輕􅀐數百送至野鄧禹不能定赤眉乃遣馮異代禹討之車駕送至河南賜以乗輿七尺劒勑異曰諸將非不能徤闘然好虜掠卿本能御吏念自修飭無爲郡縣所苦異頓首受命又曰東平王蒼朝京師月餘還國帝臨送歸宫悽然懷思乃詔遣使詣國辭别之後獨坐不樂因就車歸伏軾而吟誦及採菽以増歎息又曰第五倫年少諸家惟令詣郡尹鮮于裒見而異之署爲吏後裒坐事徴臨去握倫臂訣曰恨相知之晚又曰申徒蟠爲太尉黄瓊所辟不就及瓊卒歸葬江東四方名豪會帳下六七千人談論莫有及蟠者唯南郡一生與相酬對旣别執蟠手曰君非聘則徴如是相見於上京矣蟠勃然作色曰始吾以子爲可與言何乃相教榮貴之徒􅁘因振手而去魏志曰夏侯惇薨以曹休爲鎭南將軍假節都督諸軍事車駕臨送下輿執手而別呉志曰魯肅代周瑜過吕蒙酒酣蒙問肅曰君受重任與關羽爲隣將何計略以備不虞肅應曰臨時施冝蒙因爲畫五䇿肅於是越席就之拊其背曰吕子明吾不知卿才略所及至於此也遂拜蒙母結友而別又曰劉繇亡於豫章孫䇿命太史慈徃撫安之左右皆曰慈必北去不還䇿曰子義舎我尚復與誰餞送昌門把腕別曰何時能還荅曰不過六十日果如期而反􅀳中興書曰王澄甞之荆州送者傾邑所別處樹上有鵲巢澄便脫衣着犢鼻上樹探鵲􅑹而弄之傍若無人􅀳中興書曰衛玠兄璪時爲散􅀐侍郎内侍懷帝玠以天下將亂移家南行母曰我不能捨仲寳而去也玠啓喻深至爲門户大計母涕泣從之臨別玠謂璪曰在三之義}
