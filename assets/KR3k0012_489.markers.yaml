  - {type: variant, offset: 1891, length: 217, content: 項王軍垓下兵少食盡漢四面皆楚歌項王乃大驚曰漢已盡得楚矣乃悲歌慷慨范曄後漢書曰明帝嘗謁原陵夜夢先帝太后如平生忻對既寤悲不能寤明旦遂率百官上陵帝徒步前伏御床視太后鏡奩中物感慟悲泣左右皆泣莫能仰視也吳錄曰張武父業為郡門下掾還家遇賊鬭死武時幼不識父每至節日輒持父遺劍到亡處設祭悲動路人吳志曰顧雍為相十九年年七十六卒初疾微時權令醫趙泉視之拜其少子濟為騎都尉雍間悲曰泉善別死生吾必不起故上欲及吾自見濟拜也晉書曰羊祜樂山水每因風景必造峴山置酒言詠終, SBCK: 挑兮撻兮在城闕兮一}
