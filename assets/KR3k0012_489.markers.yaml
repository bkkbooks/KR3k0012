  - {type: variant, offset: 3013, length: 3, content: 遇舊館, WYG: 郭門與其母訣齧臂而盟曰起不為卿相不復入衛又曰貳師將軍李廣利將兵擊匈奴丞相劉屈氂為祖道送渭橋與廣利别又曰疏廣疏受父子並為皇太子師傅朝廷以為榮在位歲乆廣謂受曰吾聞知足不辱知止不殆功遂身退天之道也今仕宦至二千石宦成名立如此不去懼有後悔即日父子俱稱病乞骸骨上以其年篤老皆許之加賜黄金二十斤皇太子賜以五十斤公卿大夫故人邑子為設祖道供帳東都門外蘇林注曰長安東郭門外送者車數百輛辭訣而去及道路觀者皆曰賢哉二大夫或歎息為之下泣又曰肅宗遣諸王歸國帝特留東平王蒼賜以秘書列圖道術秘方至八月飲酎畢有司復奏遣蒼乃許之手詔賜蒼曰骨肉天性誠不以逺近親疎然數見顔色情重昔時中心戀戀惻然不能言於是車駕祖送流涕而訣復賜乗輿服御珍寳輿馬錢布以億萬計又曰赤眉兵盛乃拜鄧禹前將軍持節西征自選可與俱者於是凡將六將軍吏二萬人禹辭訣上自従輕騎數百送至野鄧禹不能定赤眉乃遣馮異代禹討之車駕送至河南賜以乗輿七尺劒勅異曰諸將非不能健鬭然好虜掠卿本能御吏念自修飭無為郡縣所苦異頓首受命又曰東平王蒼朝京師月餘還國帝臨送歸宫悽然懷思乃詔遣使詣國辭别之後獨坐不樂因就車歸伏軾而吟誦及採菽以增歎息又曰第五倫年少諸家惟令詣郡尹鮮于裒見而異之署為吏後裒坐事徵臨去握倫臂訣曰恨相知之晚又曰申徒蟠為太尉黄瓊所辟不就及瓊卒歸葬江東四方名豪㑹帳下六七千人談論莫有及蟠者惟南郡一生與相酬對既别執蟠手曰君非聘則徵如是相見於上京矣蟠勃然作色曰始吾以子為可與言何乃拘教樂貴之徒耶因振手而去魏志曰夏侯惇薨以曹休為鎮南將軍假節都督諸軍事車駕臨送下輿執手而别吳志曰魯肅代周瑜過吕蒙酒酣蒙問肅曰君受重任與蜀兵為鄰將何計畧以備不虞肅應曰臨時施宜蒙因為畫五策肅於是越席就之拊其背曰吕子明吾不知卿才畧所及至于此也遂拜蒙母結友而别又曰劉繇亡於豫章孫策命太史慈徃撫安之左右皆曰慈必北去不還策曰子義舎我尚復與誰餞送昌門把腕别曰何時能還答曰不過六十日果如期而返晉中興書曰王澄嘗之荆州送者傾邑所别處樹上有鵲巢澄便脫衣著犢鼻上樹探鵲􅑹而弄之傍若無人晉中興書曰衛玠兄璪時為散騎侍郎内侍懐帝玠以天下將亂移家南行母曰我不能舎仲寳而去也玠啓喻深至為門户大計母涕泣従之臨别玠謂璪曰在三之義}
