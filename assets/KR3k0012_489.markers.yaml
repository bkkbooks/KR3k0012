  - {type: variant, offset: 3372, length: 2, content: 琴亦, WYG: 之痛恩愛永離歎别鶴以舒情故曰别鶴操古詩曰行行重行行與君生别離相去萬餘里各在天一涯道路阻且長㑹面安可期胡馬嘶北風越鳥巢南枝相去日已逺衣𢃄日已緩棄捐勿復道努力加飡飯李陵贈蘇武詩曰携手上河梁逰子暮何之徘徊岐路間悵悵不}
