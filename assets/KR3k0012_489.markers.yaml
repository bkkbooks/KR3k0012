  - {type: variant, offset: 3063, length: 1, content: 小, WYG: 兄弟相感更合吳錄曰朱桓還屯濡須權祖之桓奉觴曰臣當逺去願一捋陛下鬚無所復恨權憑几前席桓進捋鬚曰臣今日真可謂捋虎鬚者權大笑吳越春秋曰越王勾踐伐吳將與大夫范蠡入臣於吳羣臣皆送浙江大夫文種前為祝其辭曰皇天佑助先沉後揚禍為徳根憂為福堂許邁别𫝊曰邁好養生遣妾歸家東逰採藥於桐廬山欲斷榖以山近人不得専一移入臨安自以無復返期乃改名逺逰書與婦别管輅别傳曰諸葛樂與輅别戒以二言卿性樂酒雖温克然不可保寧當節卿相有水鏡之才所見者妙福如膏火不可不慎持節散才逰於雲漢之間不受富貴也輅言酒不可極才不可盡吾欲持酒以禮持才以愚何患之有耶穆天}
