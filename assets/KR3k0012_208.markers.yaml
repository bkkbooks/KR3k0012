  - {type: 'tls:seg', offset: 3345, content: '', id: KR3k0012_CHANT_208-49a.5}
  - {type: variant, offset: 3345, length: 0, content: '', SBCK: 司空並􅆙散􅀐侍郎孟康曰夫宰相者天下之所瞻效誠冝得秉忠履正夲德伏義之士足爲海內所師表者竊見司􅀠校尉崔林禀自然之正性體髙雅之􅀪量論其所長以比古之人忠直不回則史魚之儔也清儉守約則季文之疋也遂爲司空封安陽亭侯三公封列侯自林始也又曰徐邈拜司空歎曰三公論道之官無其人則􅆙豈可以老病忝之哉固辭不受晉書曰裴秀爲司空刪定官制損益多善當禪代之際揔納言之要其所裁當禮無違者又案禹貢山川地名古有今無者皆隨事注列作禹貢地域圖十八篇事成奏上藏於祕府秀在位四年爲當丗名公又曰鄭袤字林叔爲司空天子臨軒遣就第拜授袤謂使曰魏以徐景山爲司空徐公曰三公上應天心苟非其人實傷和氣固辭見許晉起居注曰武帝太始七年詔光禄大夫鄭袤體行純正履道冲粹退有清和之風進有素絲之節冝齊三階之曜􅀘衮職之闕明弼朕躬匡其不逮其以袤爲司空晉中興書虞玩字士瑶王道郄鑒􅁃亮相繼薨遷玩爲司空給羽林四十人玩比陳讓不聽旣拜歎息謂賔客曰以我爲三公是天下無人矣談者以玩爲知言齊職儀曰司空品秩官服同太宰舜以禹爲司空成王以毛公爲司空宋以武公之諱改司空爲莫敖秦置}
