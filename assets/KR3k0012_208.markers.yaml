  - {type: variant, offset: 1226, length: 182, content: 繆襲奉詔諭旨曰朕新蒞庶事一日萬機懼聽斷之不明賴有德之臣左右朕躬君其力疾就會以惠予一人將立几筵命百官揔巳以須君到然後御坐又曰鄧艾字士載既平劉禪詔曰艾曜威奮武深入虜庭斬將搴旗梟斬鯨鯢使僣號之主稽首係頸歷世逋誅一朝而平兵不踰時戰不終日雲徹席卷蕩定巴蜀雖白起破強楚韓信克勁趙吳漢擒子陽亞夫滅七國計功論美不足比勳其以艾為太尉增邑二萬戶又曰王祥字休徵為太尉司馬文王進爵為王祥與, WYG: 中領}
