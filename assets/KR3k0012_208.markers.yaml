  - {type: variant, offset: 2169, length: 1, content: 徒, SBCK: 空初改爲司空議者又以縣道官有獄司空故復加爲大司空亦所以别大小}
  - {type: variant, offset: 2169, length: 215, content: 徒之職凡建邦國以土圭土其地而制其域土其地猶言度其地也又曰大司徒之職以五禮防萬民之偽而教之中禮所以節止民之侈偽使其行得中以六樂防萬民之情而教之和樂所以蕩正民之情思使其心應和也又地官曰大司徒之職以保息六養萬民一曰慈幼保息謂安之也慈幼謂愛幼少也二曰養老三曰振窮四曰恤貧五曰寬疾六曰安富安富謂平其徭役不專取春秋傳曰祝鳩氏司徒也尚書大傳曰百姓不親五品不訓則責司徒韓詩外傳曰君臣不正人道不和國多盜賊人怨其上則責之司徒論語摘輔像曰仲尼為素王顏淵, WYG: 空初改}
