  - {type: variant, offset: 280, length: 0, content: '', SBCK: 漢哀帝從朱愽議始置三司改丞相爲大司徒以孔光爲之魏以華歆爲之北齊書曰孫騰初北境亂騰亡一女及貴推訪不得疑其爲人婢及爲司徒婢訴良者皆免之願免千人兾得其女神武知之大怒遂解司徒隋書曰王􅁩爲大司徒􅂫威立議以爲户口滋多民田不贍欲減功臣之地以給民􅁩奏曰百官者歷丗勲賢方蒙爵土一旦削之未見其可如臣所慮正恐朝臣功徳不建何患民田有不足上然之竟寢威議唐書曰大和四年守司徒裴度上表辭􅁽命言臣此官巳三度受􅁽有靦顔目從之九州春秋曰靈帝賣官廷尉崔烈入錢五百万以買司徒烈子均亦有時名烈問曰吾作公天下人謂何如對曰大人少有髙名不謂不當爲公今登其位海内嫌其銅臭烈舉杖擊之均走烈曰子授父撾而走可謂孝乎均曰舜之事父小杖則受大杖而走不䧟父於不義烈曰尓以吾爲瞽叟耶華陽國志曰自建武之後羣儒修業開案圖緯漢之宰相當出坤郷於是司徒李公屢登七政太傅于堅弈代論道荀氏家傳曰組字大章中宗爲晉王時將徴爲司徒問太常賀循循曰組舊望清重勤勞顯著遷訓五品以統人倫實充人望詔以組爲司徒江氏家傳曰江統字應元時太􅀓從事中郎􅁃子嵩以風韻見重亦雅敬君德每云當今可以居司徒允民望者江生其人也管子曰昔者黃帝得祝融辨南方故使爲司徒符子曰魯侯欲以孔子爲司徒將召三桓而議之乃謂左丘明曰寡人欲以孔丘爲司徒而授以魯政焉寡人將欲詢諸三子左丘明曰孔丘聖人與夫聖人在政過者離位焉君雖欲謀其罪弗合乎魯侯曰吾子奚以知之丘明曰周人有愛裘而好珍羞欲爲千金之裘而與狐謀其皮欲具少牢之珍而與羊謀其羞言未卒狐相率逃於重丘之下羊相呼藏於􅀷林之中故周人十年不制一裘五年不具一牢何者周人之謀失之矣今君欲以孔丘爲司徒召三桓而議之亦以狐謀裘與羊謀羞哉於是魯侯遂不與三桓謀而召孔丘爲司徒典略曰契爲司徒百姓和親夔主賔客逺人畢至蔡邕中鼎銘序曰惟建寜四年春三月進公登于王前廷乃制詔曰其以司空橋􅀇爲司徒公拜稽首三讓然後受命曹植輔臣論曰辨􅀶通幽見􅀓異度德實充塞于內知謀從横於外解疑釋滯剖散盤結者主司徒荀朂荅詔曰咸寜四年司徒何曽遷太宰詔問勗司徒處當得人副逺近之望并治事見才誰可也朂表三公具瞻之望誠不可用非其人昔魏文帝用賈詡爲公孫權􅀏之尚書令李胤忠亮髙㓗應處台輔朱謝莊爲北中郎謝兼司徒章曰臣聞爕理隂陽夤亮天地弗惟其官無人則闕司徒掌敷五典職擾兆民豈悟乾靈罔遺光渥方闡不次之任殊絶蕃岳豈可權尸三事假備六符慙震周廻顧歩交悸司空尚書曰舜曰咨四岳有能􅁬庸熈帝之載奮明也載成也僉曰伯禹作司空帝曰俞咨禹女平水土惟時懋哉帝曰然嗟禹女有平水災之功惟是勉之哉遂委以政也}
