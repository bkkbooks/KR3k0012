  - {type: variant, offset: 224, length: 201, content: 晚暮而震勵志踰篤後有鸛雀御三鱣魚飛集講堂前都講取魚進曰凡鱣者卿大夫之服象也數三者法三台也先生自此昇矣後果位至太尉又曰劉寬為太尉靈帝頗好學藝每引見寬令講經寬嘗於坐被酒睡伏被加也為酒所加也帝問太尉醉耶寬仰對曰臣不敢醉但任重責大憂心如醉又曰張禹為太尉時連歲災荒府藏空虛禹上䟽求入三歲租稅以助郡國廩假廩給也假貸也許之又曰楊震代劉愷為太尉帝舅大鴻臚耿寶薦中常侍李閏兄於震震不從寶乃自往候震曰李常侍國家所重欲令公辟, WYG: 制宜遣掾屬循行皆當均}
