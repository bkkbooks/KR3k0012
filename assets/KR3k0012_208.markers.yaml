  - {type: variant, offset: 550, length: 51, content: 王龔為太尉在位恭慎自非公事不通州郡書記其所辟命皆海內長者謝承後漢書曰鄭弘為臨淮太守行春有二白鹿隨車夾轂, SBCK: 危東六星兩兩}
  - {type: variant, offset: 550, length: 3, content: 王龔為, WYG: 何曽字穎考以}
  - {type: variant, offset: 550, length: 51, content: 王龔為太尉在位恭慎自非公事不通州郡書記其所辟命皆海內長者謝承後漢書曰鄭弘為臨淮太守行春有二白鹿隨車夾轂, krp: 危東六星兩兩}
  - {type: variant, offset: 554, length: 671, content: 尉在位恭慎自非公事不通州郡書記其所辟命皆海內長者謝承後漢書曰鄭弘為臨淮太守行春有二白鹿隨車夾轂而行弘怪問主簿黃國鹿為吉凶賀曰聞三公車轓畫作鹿明府當為宰相弘後果為太尉又曰陳蕃拜太尉臨朝歎曰黃憲若在不敢先佩印綬又曰鄭弘字巨君為太尉舉將第五倫為司空班位在下每正朝見弘曲躬自卑帝知遂置雲母屏風分隔之由此以為故事又曰京兆朱寵字仲威為太尉家貧食脫粟飯臥布被朝廷賜錦被梁肉皆不敢當華嶠後漢書曰安帝即位太尉徐防以災異寇賊策免就國凡三公以災免自防始也袁山松後漢書曰太尉劉虞讓位於羊續靈帝時為三公者皆輸禮錢千萬續舉褞袍以示之曰臣之所有唯此而巳遂不代虞張璠漢記曰楊秉字叔卿為太尉常曰我有三不惑酒色財也天下稱為名公漢書百官表曰太尉秦官金印紫綬掌武事周勃灌嬰周亞夫等為之又百官表注曰太尉古官也自上安下曰尉故官以為號應劭漢官儀曰章帝詔曰司空牟融典職六年勤勞不怠其以融為太尉錄尚書事又曰沖帝冊書曰太尉趙峻貳掌樞衡有匪石不貳之心又曰三公國之楨幹朝廷取正以成斷金大司農李固公族之苗忠正不撓有史魚之風其以固為太尉又曰河間相張衡說明帝以為司徒司空府巳榮欲更治太尉府府公南陽趙喜也西曹掾安眾鄭均素好名節以為朝廷新造北宮整飭宮寺今府本館陶公主第舍員職鮮少自足相授喜表陳之即見聽許其冬帝幸辟雍歷二府光觀壯麗而太尉府獨卑陋顯宗東顧歎息曰屠牛縱酒勿令乞兒為宰漢官典職曰太尉孝文三年置七年省武帝建元二年置五年復省更名大司馬建武二十七年復置太尉魏志曰文帝踐祚鍾繇遷太尉時華歆王朗並先世名臣帝罷朝謂左右曰此三公者乃一代之偉人也後日殆難繼矣又曰華歆拜太尉歆疾乞退讓位於管寧文帝不許臨當大會乃遣散騎常, WYG: 保}
