  - {type: variant, offset: 3494, length: 3, content: 腹上謂, krp: 前鳴笳鳯管疊其後鄧禹若不遭漢光則南陽之掾史微臣若不逢明聖則孤城之戍客豈可加以正台之席登以論道之寄啓黃扉而爕五緯躡青帷而調四序梁劉孝儀爲臨川王解司空表曰臣以庸薄謬竊隆重職班三事任揔六條衣衮坐槐旣闕論道駝傳憇棠尤慙爲政而俯司土地仰爕隂陽折撓之譏巳彰愆伏之咎爰著今水蜧不躍旱魃爲灾山無薈蔚雲成煙火陛下曲私未垂䇿免臣職是當於何逃責乞責降兹台歩恊此天}
  - {type: punctuation, offset: 3496, content: ，, id: KR3k0012_CHANT_208-bkkpn1059}
  - {type: 'tls:seg', offset: 3496, content: '', id: KR3k0012_CHANT_208-51a.6}
  - {type: variant, offset: 3496, length: 1, content: 謂, WYG: 樓就斬之齊孔稚珪為王敬則讓司空表曰故李通豪贍以親寵登用王基才勇以聲華入選先帝擢臣以榮華陛下申臣以富貴得北帯五州東跨六郡内亞三鼎外齊四岳蟬佩之映則左右交暉龜組之華則縱横吐曜輕輪徐動則劒騎如雲飛盖暫停則歌鍾成列摐金龍吹􅊊其前鳴笳鳯管疊其後鄧禹若不遭漢光則南陽之掾吏㣲臣若不逢明聖則孤城之戍客豈可加以正台之席登以論道之寄啓黄扉而燮五緯躡青帷而調四序梁劉孝儀為臨州王解司空表曰臣以庸薄謬竊隆重職班三事任緫六條衣衮坐槐既闕論道駝𫝊憇棠尤慙為政而俯司土地仰燮隂陽折撓之機已彰愆伏之咎爰著今水蜧不擢旱魃為災山無薈蔚雲成煙火陛下曲私未垂䇿免臣職是當於何迯責降兹台歩恊此天}
