  - {type: variant, offset: 3484, length: 9, content: 徒初為尚書夢松樹生, SBCK: 空表曰故李通豪贍以親寵登用王基才勇以聲華入選先帝擢臣以榮華陛下申臣以富貴遂得北帶五州東跨六郡内亞三鼎外齊四岳蟬佩之映則左右交暉􅀛組之華則縱横吐曜輕輪徐動則劒􅀐如雲飛蓋暫停則歌鍾成列樅金龍吹鬱}
  - {type: variant, offset: 3484, length: 9, content: 徒初為尚書夢松樹生, krp: 空表曰故李通豪贍以親寵登用王基才勇以聲華入選先帝擢臣以榮華陛下申臣以富貴遂得北帶五州東跨六郡内亞三鼎外齊四岳蟬佩之映則左右交暉龜組之華則縱横吐曜輕輪徐動則劒騎如雲飛蓋暫停則歌鍾成列樅金龍吹鬱}
