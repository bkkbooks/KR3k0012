  - {type: variant, offset: 2583, length: 123, content: 司徒在職清儉匪懈茂初在廣漢夢在大殿之極上有三穗禾茂跳取之得其中穗輒復失之主簿郭賀離席慶曰大殿者官府之形像也極而有禾人臣之上祿也取其中穗中台之位也於字禾失為秩雖曰失之乃以得祿秩也袞職有闕君其補之旬月而茂徵焉辟賀為掾又曰光武即位高邑使使者持節拜鄧禹為, WYG: 野王令世祖議選}
