  - {type: variant, offset: 104, length: 5, content: 高祖言周勃, SBCK: 石苞爲司徒奏州郡農桑未有賞罰之制冝遣􅁺屬循行皆當均其土冝舉其殿最然後黜陟焉詔曰農殖者爲政之夲有國之大務也雖欲安民興化不先冨而教之其道無由而至今四海多事軍國用廣加承征役之後屬有水旱之患倉庫不充百姓無積稼穡樹藝司徒掌之今雖登論道然經國立政唯時所急故陶唐之丗稷官爲}
