  - {type: variant, offset: 2916, length: 43, content: 三公多見罪退帝賢勤欲令以善自終因讌見從容戒之曰朱浮上不忠於君下陵轢同列竟以中傷至今朱浮, WYG: 擢拜梁}
  - {type: variant, offset: 2917, length: 270, content: 公多見罪退帝賢勤欲令以善自終因讌見從容戒之曰朱浮上不忠於君下陵轢同列竟以中傷至今朱浮為大司空坐賣弄國恩免又為陵轢同列帝銜之惜其功不忍加罪死生吉凶未可知豈不惜哉人臣放逐受誅雖復追加賞賜賻祭不足以償不訾之身訾量也言無量可比之貴重之極也訾與資同忠臣孝子覽照前代以為鑑誡能盡忠於國事君無二則爵賞光乎當代功名列於不朽可不勉哉勤愈恭約盡忠號稱任職又曰宣秉字巨公拜大司徒所得俸祿以收養親族自無檐石之儲又曰鮑昱代王敏為司徒賜錢帛什器帷帳又曰司徒公一人掌人民事凡教民孝悌遜順謙儉養生送死事則議其制建其度凡四方民事功課歲盡則奉其殿最而行罰凡郊祀之事掌牲視濯謝承, SBCK: 日華嶠}
