  - {type: variant, offset: 3341, length: 1, content: 國, WYG: 者天下之所瞻效誠宜得秉忠履正本徳服義之士足為海内所師表者竊見司𨽻校尉崔林禀自然之正性體髙雅之宏量論其所長以比古之人忠直不偽則史魚之儔也清儉守約則季文之匹也遂}
  - {type: variant, offset: 3344, length: 1, content: 徒, WYG: 空封安陽亭侯三公封列侯自林始也又曰徐邈拜司空歎曰三公論道之官無其人則缺豈可以老疾忝之哉固辭不受晉書曰裴秀為司空刪定國制損益多善當禪代之際緫納言之要其所裁當禮無違者又案禹貢山川地名古有今無者皆隨事注列作禹貢地域圖十八篇事成奏上蔵於秘府秀在位四年為當世名公又曰鄭袤字林叔為司空天子臨軒遣就第拜受袤謂使曰宜以徐景山為司空徐公曰三公上應天心苟非其人實傷和氣固辭見許晉起居注曰武帝太始七年詔光禄大夫鄭袤體行純正履道冲粹退有清和之風進有素絲之節宜齊三階之曜補衮職之闕明弼朕躬以匡不逮其以袤為司空晉中興書曰虞玩字士瑶王導郄鍳庾亮相繼薨遷玩為司空給羽林四十人玩比陳讓不聽既拜歎息謂賔客曰以我為三公是天下無人矣談者以玩為知言齊職儀曰司空品秩官服同太宰舜以禹為司空成王以毛公為司空以宋武公之諱改司空為莫敖秦置}
