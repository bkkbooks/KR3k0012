  - {type: variant, offset: 3485, length: 1, content: 初, WYG: 蘇禹珪}
  - {type: variant, offset: 3487, length: 0, content: '', WYG: 司空遂以為例議者不復有云華陽國志曰趙瑶字元珪拜扶風太守未之郡司空張温謂第五伯魚從蜀郡為司空今掃吾第以待足下荀氏家𫝊曰荀爽字慈明董卓徴公到府三日䇿拜司空爽起巖穴九十九日而為台司世號為白衣登三公又曰晉袁愷為司空文帝平蜀議復五等表魏朝使公定禮儀中䕶軍賈充正法律}
  - {type: page-break, offset: 3487, content: '', id: KR3k0012_WYG_208-13a, image: WYG0894/WYG0894-0813c.png}
  - {type: punctuation, offset: 3489, content: ，, id: KR3k0012_CHANT_208-bkkpn1058}
  - {type: 'tls:seg', offset: 3489, content: '', id: KR3k0012_CHANT_208-51a.5}
  - {type: variant, offset: 3489, length: 4, content: 夢松樹生, WYG: 僕射裴秀議官制公遂刪定舊文行正式為一代之典書成入藏於秘府}
  - {type: variant, offset: 3494, length: 3, content: 腹上謂, SBCK: 前鳴笳鳯管疊其後鄧禹若不遭漢光則南陽之􅁺史微臣若不逢明聖則􅀌城之戍客豈可加以正台之席登以論道之􅀉啓黃扉而爕五緯躡青帷而調四序梁劉孝儀爲臨川王解司空表曰臣以庸薄謬竊隆重職班三事任揔六條衣衮坐槐旣闕論道駝傳憇棠尤慙爲政而俯司土地仰爕隂陽折撓之譏巳彰愆伏之咎爰著今水蜧不躍旱魃爲灾山無薈蔚雲成煙火陛下曲􅀻未垂䇿免臣職是當於何逃責乞責降兹台歩恊此天}
  - {type: page-break, offset: 3494, content: '', id: KR3k0012_SBCK_208-9b}
  - {type: variant, offset: 3494, length: 1, content: 腹, WYG: 服色旗熾法駕之式禮樂犧牲柴燎之典祫禘遷毁配食之制及於明堂辟雍之儀皆所議定朝廷歸其美公既為台輔徳望清重加以㽞心禮教以年耆多疾不便朝見詔使侍中任愷諮問政化所宜行否又曰荀蕃字大堅為司空劉崑表於太子曰司空荀蕃朝廷之舊臣奕世忠勤乃心皇家具瞻之望唯蕃而已宜增位號授分陜之重永令臣等有所憑凖白虎通曰司空主土不言土而言空空尚主之况於實乎環濟要畧曰冬官司空掌邦事營城郭都邑立社稷宗廟造宫宅器械監百工典畧曰禹為司空陂九山通九澤决九川定九州使各以其職来貢傅子曰荀仲預稱禹十二為司空世論曰諸葛誕為鎮東将軍都督揚州司馬文王秉政徴誕為司空書至誕曰我當在文王書後今便為司空不貴使者出齎書使以兵付樂綝此必綝所為乃将左右數百人至揚州人欲閉門誕叱之曰卿非我故吏耶逕入綝逃}
