  - {type: variant, offset: 1908, length: 2, content: 汝作, WYG: 管子曰昔者黄帝得祝融辨南方故使為司徒符子曰魯侯欲以孔子為司徒将召三桓而議之乃謂左丘明曰寡人欲以孔丘為}
  - {type: variant, offset: 1913, length: 1, content: 敬, WYG: 授以魯政焉寡人将欲詢諸三子左丘明曰孔丘聖人與夫聖人任政過在離位焉君雖欲謀其選弗合乎魯侯曰吾子奚以知之丘明曰周人有愛裘而好珎羞欲為千金之裘而與狐謀其皮欲具少牢之珎而與羊謀其羞言未卒狐相率逃於重丘之下羊相呼藏於深林之中故周人十年不制一裘五年不具一牢何者周人之謀失之矣今君欲以孔丘為司徒召三桓而議之亦與狐謀裘與羊謀羞哉於是魯侯遂不共三桓謀而召孔丘為司徒典畧曰契為司徒百姓和親䕫主賔客逺人畢至蔡邕申鼎銘序曰惟建寧四年春三月進公登士王前廷乃制詔曰其以司空橋𤣥為司徒公拜稽首三讓然後受命曹植輔臣論曰辯博通幽見𫝊異度徳實充塞于内知謀縱横於外解疑釋滯剖散盤結者主司徒荀朂荅詔曰咸寧四年司徒何曽遷太宰詔問朂司徒䖏當得人副逺近之望并治事見才誰可也朂表三公具瞻之望誠不可用非其人昔魏文帝用賈詡為公孫權笑之尚書令李允忠亮髙潔應䖏台輔宋謝荘為北中郎謝兼司徒章曰臣聞燮理隂陽寅亮天地弗惟其官無人則闕司徒掌}
