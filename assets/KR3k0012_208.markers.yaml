  - {type: variant, offset: 1132, length: 981, content: 年復省更名大司馬建武二十七年復置太尉魏志曰文帝踐祚鍾繇遷太尉時華歆王朗並先世名臣帝罷朝謂左右曰此三公者乃一代之偉人也後日殆難繼矣又曰華歆拜太尉歆疾乞退讓位於管寧文帝不許臨當大會乃遣散騎常侍繆襲奉詔諭旨曰朕新蒞庶事一日萬機懼聽斷之不明賴有德之臣左右朕躬君其力疾就會以惠予一人將立几筵命百官揔巳以須君到然後御坐又曰鄧艾字士載既平劉禪詔曰艾曜威奮武深入虜庭斬將搴旗梟斬鯨鯢使僣號之主稽首係頸歷世逋誅一朝而平兵不踰時戰不終日雲徹席卷蕩定巴蜀雖白起破強楚韓信克勁趙吳漢擒子陽亞夫滅七國計功論美不足比勳其以艾為太尉增邑二萬戶又曰王祥字休徵為太尉司馬文王進爵為王祥與司徒何曾司空荀顗並詣王顗曰相王尊重今可相率而拜祥曰相國勢位誠為尊貴然乃是魏之宰相吾等魏之三公公王相去一階而已班列大同安有天子三司可輒拜人者耶損魏朝之美虧晉王之德君子愛人以禮吾不為也及入荀顗遂拜祥獨長揖文王謂祥曰然後知君子見顧之重吳志曰孫皓詔曰范慎勳德俱茂朕所敬憑宜登上公以副眾望可為太尉晉中興書曰郄鑒為太尉雖在公位沖心愈約勞謙日庂誦翫墳索自少及長身無擇行家本書生後因喪亂解巾從戎非其本願常懷慨然咸康五年秋寢疾上䟽遜位優詔不許又曰桓溫授侍中太尉固讓不受旬月之中使者八至軺軒相望於道溫遂親職謝靈運晉書曰秦有太尉掌兵漢仍修之或置或省是故司馬之官主九伐之職齊職儀曰魏文黃初二年日蝕奏免太尉賈詡詔天地災害責在朕躬勿貶三公遂為永制五代史後唐書莊宗御文明殿冊齊王張全義為守太尉如常儀禮畢全義於尚書都省領事宰臣群官在列左諫議竇專不降階為御史所劾專援引舊典以對時宰臣不記故事無能詰責寢而不行汝南先賢傳曰陳蕃拜太尉讓曰齊七政訓五兵臣不如議郎王暢天文錄曰三公星在北斗杓南主宣德化和陰陽若今之太尉司空之象也摯虞冊隴王太尉文曰朕惟君行為時表親則宗臣論道經邦保乂皇家是用進登上台司徒上尚書舜典帝曰契百姓不親五品不遜五品五常遜順也汝作司徒而敬敷五教在寬五常之教務在寬也禮記王制曰司徒脩六禮以節民性明七教以興民德齊八政以防民淫一道德以同俗養耆老以致孝恤孤獨以逮不足上賢以崇德簡不肖以黜惡司徒地官卿掌邦教也又月令曰孟夏之月司徒行縣鄙蔡邕月令章句曰司徒教官也又曰契為司徒而民成謂知五教之禮也毛詩緇衣曰緇衣美武公也父子並為周司徒善於其職國人宜之故美其德以明有國善善之功焉周禮曰乃立地官司徒使帥其屬而掌邦教以佐王安擾邦國擾亦安也又曰大司徒之職掌建邦之, SBCK: ''}
