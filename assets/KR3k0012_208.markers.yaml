  - {type: variant, offset: 227, length: 4, content: 震勵志踰, SBCK: 無居宅乃漸以俸秩之餘爲第一所舒素爲人先行而後言故未曾語親踈言當遜位九年正月整法服入殿朝㑹罷逕還奉送章綬内外莫有知舒此情者曹嘉之晉紀曰王戎再至司徒委事􅁺屬乗小馬從便門出見者不知是台司也晉諸公讃曰司徒􅀓祗疾遜位不許板轝上殿晉中興書曰劉隗從兄疇字王喬有重名司空蔡謨每歎曰若使劉王喬得南渡司徒公之羙選也又曰蔡謨字道明遷司徒謨固讓曰若我作司徒將爲後代哂義不敢拜詔數十下謨章表十餘上陳以疾}
