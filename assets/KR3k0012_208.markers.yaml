  - {type: variant, offset: 1537, length: 4, content: 敬憑宜登, WYG: 聞也又曰魏舒為司徒不持激厲不課人短陳留周震為諸府所辟書既下公輙亡僉號震曰殺公掾舒辟之果無患又曰王戎代王渾為司徒髙選長史西曹掾委任責成戎形状短陋而目明徹威儀不足常畜馬轝無日不出親類之亡無不吊也常以象牙笇晝夜笇計家財逺及田牧性又至儉不能善自奉飬財不出外天下之人謂之膏肓之病又曰魏舒字陽元為司徒年過致仕有遜讓意而無居宅乃漸以奉秩之餘為第一所舒素為人先行而後言故未曽語親踈言當遜位九年正月整法服入殿朝㑹罷逕還奉送章綬内外莫有知舒此情者曹家之晉記曰王戎再至司徒委事掾屬乗小馬從便門出見者不知是台司也晉諸公讃曰司徒博祗疾遜位不許板轝}
