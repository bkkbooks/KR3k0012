  - {type: variant, offset: 1195, length: 406, content: 祭禽之禮謂所獵得禽獸以供䄍祭又曰十二月中氣日在婺女大寒為十二月中氣昏婁中曉氐中斗建丑位之中大寒之日雞始乳後五日鷙鳥厲病後五日水澤腹堅天子親往嘗魚時魚潔美冰方盛取而藏之春秋傳曰月在北陸而藏冰計耦耕修耒耜寒氣過農事將興出土牛以示農耕之早晚若立春在十二月望則策牛人近前示其農早也立春在十二月晦及正月朔則策牛人當中示其農平也立春近正月朔則策牛人近後示其農晚也天子乃與公卿大夫共飭國典論時令以待來歲之宜周官建寅之月懸法於象魏以示人四時之令皆以此為準故以建丑之月與公卿先飭之命有司大儺旁磔以送寒氣大難為歲終逐除陰疫以送寒氣故周官命方相氏率百隸索室驅疫以逐之旁謂磔犬於門春磔九門冬禮大故徧磔於十二門所以扶陽抑陰之義犬屬金冬盡春興春為木故殺金以助木氣禮曰季冬之月命告人出五種命農計耦耕修耒耜具田器又曰是月也日窮于次月窮于紀星迴于天數將幾終歲且更始專其農人無有所使又曰孟冬之月天子乃祈來年于天宗注云天宗日月星辰也又曰孟冬命有司循行, SBCK: ''}
