  - {type: variant, offset: 1848, length: 349, content: 祀司民獻民數於王王拜受之以圖國用而進退之司民星謂軒轅角也又曰凌人掌冰正歲十有二月斬冰三其凌正歲季冬火星中大寒冰方盛之時春秋傳曰火星中而寒暑退凌冰室也三之者為消釋度也三其凌三倍其冰又曰占夢季冬聘王夢獻吉夢于王王拜而受之聘問也夢者事之祥吉凶之占在日月星辰季冬日窮于紀星廻于天數將幾終於是發弊而問焉若休慶之云爾獻群臣之吉夢於王婦美焉詩云牧人乃夢眾維魚矣旐維旟矣此所獻吉凶又曰天府掌季冬陳王以貞來歲之美惡鄭玄注曰問事之正曰貞問歲美惡謂問於龜又曰大呂丑之氣十二月建丑而辰在玄枵又曰冬官其屬六十掌邦事又曰以玉作六器以禮天地四方以玄璜禮北方注曰禮北方謂黑精之帝顓頊玄冥配食焉半璧曰璜象冬閉藏地上無物唯天半見又曰冬見曰遇遇者偶也義取不期而偶至大行人云冬遇以協諸侯之慮傳曰公叔定叔出奔衛三年而復之曰不可使共叔無後使以, SBCK: ''}
