  - {type: variant, offset: 2303, length: 417, content: 祥風名又曰冬獵為狩狩守也冬物畢成圍守取無簡擇易通卦驗曰大雪魚負冰鄭玄曰魚冰上近冰也易通統圖曰日冬行北方黑道曰北陸京房易曰冬至坎王廣莫風用事人君決大刑斷獄訟繕宮殿尚書大傳曰殷以季冬為正月又曰周以仲冬為正又曰北方者何也伏方也伏方也者萬物之方伏物之方伏則何以為之冬冬者中也中也者物方藏於中也故曰北方冬也陽盛則吁荼萬物而養之外也陰盛則吁吸萬物而藏之內也吁荼氣出而溫吁吸氣入則寒溫則生寒則殺也故曰吁吸者也陰陽之交接萬物之終始尚書大傳曰冬者昴昏中可以收歛蓋藏田獵斷伐當告乎天子而天子賦之民故天子南面而視四星之中知民之緩急急則不賦籍不舉力役籍公家之常徭故曰敬授民時此之謂也又曰辯在朔易曰短朔始也傳曰天子以冬命三公謹蓋藏閉門閭固封境入山澤日臘以順天道以佐冬固藏也詩含神霧曰魏地處季冬之位土地平夷又曰唐地處孟冬之位得常山太岳之風音中羽其地磽确上苦交切下苦角切而收故其民儉而好畜此唐堯之所起三禮義宗曰冬日壬癸者壬任也癸揆也言萬物更任生於黃泉皆有法度也又曰, SBCK: 御覽卷第二}
