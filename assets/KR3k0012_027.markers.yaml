  - {type: variant, offset: 123, length: 521, content: 常上揔言羲和敬順昊天此分別仲叔各有所掌也日短星昴以正仲冬日短冬至之日也昴白虎中星以七星並見正冬之三節厥民奧鳥獸氄毛奧室也民改歲入此室處以避風寒鳥獸皆生耎毛細毛以自溫之又曰冬祁寒小民亦惟曰怨咨詩曰我有旨蓄亦以禦冬又曰豊年之冬必有積雪又曰十月納禾稼黍稷穜稑上音童下音陸禾麻菽麥又曰二之日鑿冰沖沖冰盛水腹堅命取冰於山林中沖沖鑿冰之音二之日夏之十二月也又曰冬日烈烈飄風發發箋云烈烈猶栗烈也發發疾貌言王為酷虐慘毒之政如冬之日烈烈矣又曰坎其擊鼓宛丘之下無冬無夏值其鷺羽值特也鷺鳥之羽可以為翳箋云翳舞者所持以指麾坎其擊缶宛丘之道無冬無夏值其鷺翿翿亦翳也禮月令曰十月之節日在房立冬為十月節昏虛中曉張中斗建亥位之初其日壬癸壬癸屬水主冬其帝顓頊其神玄冥昔顓頊氏以水德繼天而王故為冬帝水正日玄冥故玄冥為水神佐顓頊於冬其蟲介北方玄武介蟲之長凡有甲之類皆屬於水故曰其蟲介介甲也其音羽三分啇去一以生羽羽數四十八屬水以為最清物之象也冬氣和則羽聲調樂記曰羽亂則危其財匱律中應鍾十月氣至則應鍾之律應應鍾者姑洗之所生三分去一管長四寸七分其味鹹其臭杇凡臭味鹹杇者皆屬於水其祀行祭先腎冬陰氣盛寒於外祀之於行從辟除之類行謂道也祭先腎者陰謂在下腎亦在下凡祀行俎先進腎立冬之月水始冰後五日, SBCK: ''}
