  - {type: variant, offset: 26, length: 0, content: '', SBCK: 申群禁固閉藏修障塞繕􅀜梁禁外徙斷罰刑守門閭大捜客止交遊禁夜樂早閉晏開以索姦人巳得報之必固天節巳幾刑殺無赦雖有盛尊之親斷以法度母發藏毋釋罪應隂殺也又曰十月失政四月草木不實實長也語林曰羊稚舒冬日釀酒令人抱甕湏􅁷復易人速成而味好說苑曰衛靈公天寒鑿池宛春諌曰天寒起役恐怠民也公曰寒乎春曰公衣狐裘坐熊席是以不寒民寒甚矣公乃罷役世􅀃曰石崇爲客冬天設萍虀王愷乃宻賄崇帳下都督及御車人問所以對曰萍虀是搗韭根􅄂以麥苗耳殷芸小􅀃曰晉孝武帝即位時年十三四冬天晝日不着􅃨衣但着單絹裙衫五六重夜則累茵褥謝公云體冝令有常陸下晝過冷夜過􅀬非攝養之術帝曰夜静故也謝公歎曰上理不減先帝崔鴻前趙録曰王延九歳事母母冬月思生魚杖延流血延㝷汾河扣凌而􅂘得魚而饋母山海經曰鍾山之神名曰燭隂燭龍也是燭九月因名云視爲晝暝爲夜吹爲冬呼爲夏不飲不食不息息則爲風息氣息也身長千里地鏡經曰十二月中草木獨有枝葉垂者下有美玉蔡邕月令章句曰冬終也萬物於是終也崔寔四人月令曰十月農事畢五􅂖旣登家備儲畜乃順時令也祠令曰季冬藏冰仲春開冰並用黒牡秬􅁰祭司寒之神於冰室其開冰加以桃弧􅁄矢設於神座又曰七祀祀行以冬漢桓譚新論曰太原民以隆冬不火食五月雖有疾病急緩猶不敢犯爲介之推故也漢崔寔政論曰僕前爲五原太守土地不知緝績冬積草伏卧其中􅀂見吏以草􅆞身令人酸􅈹吾乃賣儲峙得二十餘萬詣鴈門廣武迎織師使巧手作機乃紡以教民織漢書于定國飲酒至數石不亂冬月治獄請讞飲酒益精明後漢書虞詡祖父經爲郡縣獄吏案法平正務存寛恕毎冬月上􅃺􅁪流涕隨之甞稱曰東海于公髙爲里門而其子定國卒至丞相吾决獄六十年矣雖不及于公其庻乎子孫何必不爲九卿耶故字詡昇卿晉皇甫謐􅀇晏春秋曰余家貧晝則愍於作勞夜則甘於寢寐以三時之務卷帙生塵篋不解緘唯季冬末􅂊得一旬學尓晉􅄞康集序曰孫登於汲郡北山土窟中住夏則編草爲裳冬則􅀍髪自覆論衡曰夫雲出於丘山降散則爲􅀨矣人見從上則謂之天􅀨水冬日天寒則􅀨凝爲雪皆由雲氣發於丘山不從天降集於地明矣瑞應圖曰芝草常以六月生春夏紫秋白冬黒暦義䟽曰小寒月之􅀄氣也小極故曰小寒大寒月之中氣也言十二月巳半隂氣大極故曰大寒三輔决録曰孫辰字允公家貧不仕居杜城中織箕爲業明詩書爲郡公曹冬月無􅀍有槀一束暮卧其中旦收之㑹稽典録曰盛􅁻爲廷尉毎至冬月罪囚當断其妻執燭吉持丹筆相向垂泣齊民要術曰孟冬之月}
