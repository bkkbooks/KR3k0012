  - {type: variant, offset: 23, length: 0, content: '', krp: 治宫室繕修邊城備冦難也廣莫風至則閉關梁斷罰刑象冬閉藏不通關梁也罰刑之凝者於是順時而决之又曰古之君人者其慘怛於民也國有飢者食不重味民有寒者而冬不𬒳裘與同飢寒冬伐薪蒸大者日薪小者日蒸以爲民資資用又曰北方水也其帝顓頊顓頊黄帝之孫以水德王天下號曰髙陽氏死託祀北方也其佐玄冥執權而治冬又曰冬行春令泄象春氣布散發泄也行夏令旱旱象陽炎行秋令霧秋氣隂故亂霧又曰太隂理秋則欲修備繕兵金德斷剛故修兵也太隂理冬則欲猛毅剛強純陽閉固水澤冰故剛強又曰北方之極自九澤窮夏晦之極北至令正之谷九澤北方之澤夏大也晦暝也有凍寒積冰雪雹霜霰漂潤群水之野顓頊玄冥之所司者萬二千里顓頊黄帝之孫也以水徳王天下號爲髙陽氏死爲北方水㯖之帝其神玄冥者金天氏有適子曰昧爲玄冥師死祀爲主水之神也}
