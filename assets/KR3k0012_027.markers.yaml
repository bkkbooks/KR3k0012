  - {type: variant, offset: 1609, length: 1, content: 又, SBCK: 修鍵閉愼管籥固封疆備邊境防要害謹􅀜梁塞蹊徑飾䘮紀不爲􅁋泆命伏藏之處講武習射御角力戰事省婦事則辰星順行矣人君淫泆非道縱恣不禁近習不䘏刑獄起衆發徴開池藏氣則辰星失行伏見不常而有芒角則民多疾疫隨之以喪亡國不昌也人君以冬時行春令則歳星之氣干之色青而君憂刑獄變動生死不當地踈不宻人乃流亡虫蝗爲災水泉咸竭民多疥癘胎夭多傷國多固疾斷獄官凶以冬行夏令則熒惑之氣干之色赤而小昧刑禍並起兵旱荐臻國多􅁀風方冬不雪不寒氛霧􅁳昧雷迺發聲以冬行秋令則太白之氣干之色白而必有野戰並作獄訟軍旅同時而興霜雪不時小兵時起土地侵削四鄙入堡輦下歳時記}
  - {type: page-break, offset: 1609, content: '', id: KR3k0012_SBCK_027-7b}
  - {type: variant, offset: 1609, length: 1, content: 又, WYG: 修鍵閉慎管籥固封疆備邊境完要塞謹關梁塞蹊徑飭喪紀不為淫泆命伏藏之處講武習射御角力戰省婦事則辰星順行矣人君淫泆非道縱恣不禁近習不恤刑獄起衆徴發開泄藏氣則辰星失行伏見不常而有芒角則民多疾疫隨之以喪亡國不昌也人君以冬時行春令則歲星之氣干之色青而君憂刑獄變動生死不當地踈不宻人多流亡蟲蝗為灾水泉咸竭民多疥癘胎夭多傷國多固疾斷獄官凶以冬時行夏令則熒惑之氣干之色赤而小昩刑禍並起兵旱薦臻國多暴風方冬不寒氣霧𠖇昧雷廼發聲以冬時行秋令則太白之氣干之色白而有芒野戰並作獄訟軍旅同時而興雪霜不時小兵時起土地侵削四鄙入保輦下歲時記}
