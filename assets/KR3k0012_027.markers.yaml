  - {type: variant, offset: 14, length: 0, content: '', SBCK: 風曰寒風勁風嚴風厲風哀風隂風景曰冬景寒景時曰寒辰節曰嚴節鳥曰寒鳥寒禽草曰寒卉黄草木曰寒木寒柯素木寒條又曰十月孟冬亦曰上冬亦曰陽月此時純隂用事嫌}
