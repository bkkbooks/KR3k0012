  - {type: variant, offset: 2721, length: 1951, content: 二月小寒為節者亦刑於大寒故為之小言時寒氣猶未是極也大寒為中者上刑於小故謂之大自十一月一陽交初起至此始徹陰氣出地方盡寒氣併在上寒氣之逆極故謂大寒也逸禮曰冬則衣黑衣佩玄玉乘玄輅駕鐵驪載玄旗以迎冬于北郊其祭先豕居明堂後廟啟北戶春秋繁露曰冬氣衰故藏又曰木有變春凋冬榮此傜役眾賦歛重也春秋考異郵曰冬風曰廣莫風春秋感精符曰天統十一月建子天始施之端也謂之天統紀者周以為正漢書記律黃鍾為天統史記曰漢高祖既定天下叔孫通定朝儀群臣朝十月儀於長樂宮執戟尊卑次序諸侯王以下莫不震恐帝曰吾乃今日知為皇帝之貴也前漢書曰魏相上書曰北方之神顓頊乘坎執權司冬張晏曰水為智智者謀謀為重故為權又曰東方朔上書云臣朔年十三讀三冬文史足用又曰冬民既入婦人同巷相從夜績女工一曰四十五日必相從者所以省費燎火同巧拙而習俗也又曰龔遂為渤海太守勸民冬益收果實菱芡民皆賴之續漢書曰嚴延年字次卿為河內太守冬月傳屬縣囚會府下流血數里河南號為屠伯又曰宋均為九江守五日一聽事冬以日中夏以平旦後漢書律曆志曰日行北陸謂之冬又曰季冬之月星廻歲終陰陽以交勞農大臘先臘一日大儺謂之逐疫漢舊儀曰顓頊有三子而去為疫鬼一居江水是為虎一居苦水為罔虺蜮一居人宮室區隅善驚小兒月令章句曰日行北方之宿北方大陰恐為所抑故命有司大儺所以扶陽抑陰也盧植注禮記曰所以逐衰而迎新也又曰是月也立土牛六頭於國都郡縣城外丑地送大寒月令章句曰是月之會建丑丑牛寒將極是故出其物類形象以示送達之旦以升陽者也後漢書曰鍾離意辟大司徒侯霸掾詔曰部送徒詣河內時冬寒徒病不能行路過弘農輒移屬縣使作徒衣縣不得已與之上書言狀意亦具以聞光武得奏以見霸曰君所使掾何乃仁於用心誠良吏也又曰汝南舊俗十月饗會百里內縣皆齎牛酒到府讌飲又曰叚熲對桓帝討先零東羗術略曰三冬兩夏足以破之又曰黃香父兄為郡五官貧無奴僕香身執勤苦冬無袴而親極滋味魏略曰顏斐字文林為京兆尹課民當輸租時車各因便致薪兩束為冬寒冰炙筆硯風化大行又曰賈逵世為著姓少孤貧冬常無袴又曰吉茂字叔暢從少至長冬則披裘夏則短褐臣役妻子室如懸磬又曰邴原就師學一冬講孝經論語自在齠齓有異及長金玉其行又曰董遇好學人從學遇不肯教曰當先讀書百遍義自見從者云苦難得暇日遇曰當以三餘冬歲之餘夜陰日之餘吳志曰左臺御史孟宗有孝道母性嗜筍及母亡冬節至宗入林哀泣而筍生得以供祭祀晉書曰王敦素憚周顗每見輒面熱雖復冬月扇面不得休又曰吳隱之冬月無被常澣衣乃披絮勤苦同於貧庶隱之時為牧守又曰公孫鳳字子鸞隱昌黎之九城冬夜草布寢處山林彈琴吟詠陶然自得又曰劉殷母王氏盛冬思堇而不言食不飽者一旬矣殷怪而問之母言其故殷時年九歲乃於澤中慟哭聲不絕者半日於是忽若有人云止聲殷收淚視地便有董生焉因得斛餘而歸宋書曰朱百年與孔凱友善百年家室素貧母以冬月亡衣並無絮自此不衣綿帛嘗寒時就凱宿衣悉裌布飲酒眠凱以臥具覆之百年不覺也既覺引臥具去體謂凱曰綿定奇溫因流涕悲慟凱亦為之傷感也齊書曰沈瑀為揚州從事湖熟縣方山埭高峻冬月公私行旅以為艱明帝使瑀循行乃開四港斷行客就作三日便辦又齊孝子王虛之庭中楊梅樹隆冬三實又每夜所居白光如燭墓左樹柰一冬再實時人咸以為孝感所致梁安城王蕭秀為郢州刺史務行德義每冬月常作袴襦以賜貧凍者又任昉素清貧卒後其子西華冬月著葛帔練裙道逢平原劉孝摽泫然矜之謂曰我當為卿作計乃著廣絕交論以譏其舊交也吳越春秋曰越王念復吳怨非一旦也苦身勞心夜以接日臥則切之以蓼足漬之以水冬則抱冰韓詩外傳曰冬不浴非惡水清有餘也穆天子傳曰季冬甲戍天子東遊飲于留祁射于麗虎讀書于菞丘君舉必書也菞音犁獻酒于天子奏廣樂天子遺其靈鼓乃化為黃虵周禮曰靈鼓四面洪範所謂鼓妖嵇康高士傳曰善卷古之賢人也舜以天下讓之善巷曰予子立宇宙之中冬則衣皮毛夏則衣絺葛何以天下為哉汝南先賢傳曰周舉為并州刺史太原一郡舊俗以介子推焚骨有龍忌之禁至其亡月咸言神靈不樂舉火由是土人每至冬中輒一月寒食莫敢煙爨老少不堪歲多死者舉既到乃作弔書以置子推之廟言盛冬止火殘損人命非賢者之意以宣示愚民使還溫食於是眾惑稍解風俗頗革列士傳曰孟常君食客三千人齊市有乞食馮煖經冬無袴面有饑色皇甫謐高士傳曰焦先字孝然冬夏不著衣臥不設席禰衡別傳曰十月朝黃祖於艨衝舟上會設黍臛衡年少在坐黍臛至先自飽食畢搏弄戲擲其輕慢如此列仙傳曰丁次都不知何許人為遼東丁氏作人丁氏嘗置葵問曰冬何有葵云從月南買來神仙傳曰王仲都漢中人少修道術元帝時常以隆冬單衣載駟馬車於上林昆明池環水而馳御者狐裘猶寒振欲死而都無變色背上蒸氣休休然休休氣盛貌師覺孝子傳曰王祥少有德行早失母後母憎而譖之祥孝彌謹盛寒河水堅冰網罟不施母欲得生魚祥解褐扣冰求之忽冰小開有雙魚出游祥垂綸而獲之時人謂之至孝所致也宗躬孝子傳曰何子平事母至孝母喪年六十有孺子之慕夏避清涼冬不衣絮盛弘之荊州記曰宜都銀山有風穴大數尺名風井夏則風出冬則風入樵人有冬過者置笠穴口風吸之經日還長陽溪而得笠, SBCK: 七}
  - {type: variant, offset: 2721, length: 1951, content: 二月小寒為節者亦刑於大寒故為之小言時寒氣猶未是極也大寒為中者上刑於小故謂之大自十一月一陽交初起至此始徹陰氣出地方盡寒氣併在上寒氣之逆極故謂大寒也逸禮曰冬則衣黑衣佩玄玉乘玄輅駕鐵驪載玄旗以迎冬于北郊其祭先豕居明堂後廟啟北戶春秋繁露曰冬氣衰故藏又曰木有變春凋冬榮此傜役眾賦歛重也春秋考異郵曰冬風曰廣莫風春秋感精符曰天統十一月建子天始施之端也謂之天統紀者周以為正漢書記律黃鍾為天統史記曰漢高祖既定天下叔孫通定朝儀群臣朝十月儀於長樂宮執戟尊卑次序諸侯王以下莫不震恐帝曰吾乃今日知為皇帝之貴也前漢書曰魏相上書曰北方之神顓頊乘坎執權司冬張晏曰水為智智者謀謀為重故為權又曰東方朔上書云臣朔年十三讀三冬文史足用又曰冬民既入婦人同巷相從夜績女工一曰四十五日必相從者所以省費燎火同巧拙而習俗也又曰龔遂為渤海太守勸民冬益收果實菱芡民皆賴之續漢書曰嚴延年字次卿為河內太守冬月傳屬縣囚會府下流血數里河南號為屠伯又曰宋均為九江守五日一聽事冬以日中夏以平旦後漢書律曆志曰日行北陸謂之冬又曰季冬之月星廻歲終陰陽以交勞農大臘先臘一日大儺謂之逐疫漢舊儀曰顓頊有三子而去為疫鬼一居江水是為虎一居苦水為罔虺蜮一居人宮室區隅善驚小兒月令章句曰日行北方之宿北方大陰恐為所抑故命有司大儺所以扶陽抑陰也盧植注禮記曰所以逐衰而迎新也又曰是月也立土牛六頭於國都郡縣城外丑地送大寒月令章句曰是月之會建丑丑牛寒將極是故出其物類形象以示送達之旦以升陽者也後漢書曰鍾離意辟大司徒侯霸掾詔曰部送徒詣河內時冬寒徒病不能行路過弘農輒移屬縣使作徒衣縣不得已與之上書言狀意亦具以聞光武得奏以見霸曰君所使掾何乃仁於用心誠良吏也又曰汝南舊俗十月饗會百里內縣皆齎牛酒到府讌飲又曰叚熲對桓帝討先零東羗術略曰三冬兩夏足以破之又曰黃香父兄為郡五官貧無奴僕香身執勤苦冬無袴而親極滋味魏略曰顏斐字文林為京兆尹課民當輸租時車各因便致薪兩束為冬寒冰炙筆硯風化大行又曰賈逵世為著姓少孤貧冬常無袴又曰吉茂字叔暢從少至長冬則披裘夏則短褐臣役妻子室如懸磬又曰邴原就師學一冬講孝經論語自在齠齓有異及長金玉其行又曰董遇好學人從學遇不肯教曰當先讀書百遍義自見從者云苦難得暇日遇曰當以三餘冬歲之餘夜陰日之餘吳志曰左臺御史孟宗有孝道母性嗜筍及母亡冬節至宗入林哀泣而筍生得以供祭祀晉書曰王敦素憚周顗每見輒面熱雖復冬月扇面不得休又曰吳隱之冬月無被常澣衣乃披絮勤苦同於貧庶隱之時為牧守又曰公孫鳳字子鸞隱昌黎之九城冬夜草布寢處山林彈琴吟詠陶然自得又曰劉殷母王氏盛冬思堇而不言食不飽者一旬矣殷怪而問之母言其故殷時年九歲乃於澤中慟哭聲不絕者半日於是忽若有人云止聲殷收淚視地便有董生焉因得斛餘而歸宋書曰朱百年與孔凱友善百年家室素貧母以冬月亡衣並無絮自此不衣綿帛嘗寒時就凱宿衣悉裌布飲酒眠凱以臥具覆之百年不覺也既覺引臥具去體謂凱曰綿定奇溫因流涕悲慟凱亦為之傷感也齊書曰沈瑀為揚州從事湖熟縣方山埭高峻冬月公私行旅以為艱明帝使瑀循行乃開四港斷行客就作三日便辦又齊孝子王虛之庭中楊梅樹隆冬三實又每夜所居白光如燭墓左樹柰一冬再實時人咸以為孝感所致梁安城王蕭秀為郢州刺史務行德義每冬月常作袴襦以賜貧凍者又任昉素清貧卒後其子西華冬月著葛帔練裙道逢平原劉孝摽泫然矜之謂曰我當為卿作計乃著廣絕交論以譏其舊交也吳越春秋曰越王念復吳怨非一旦也苦身勞心夜以接日臥則切之以蓼足漬之以水冬則抱冰韓詩外傳曰冬不浴非惡水清有餘也穆天子傳曰季冬甲戍天子東遊飲于留祁射于麗虎讀書于菞丘君舉必書也菞音犁獻酒于天子奏廣樂天子遺其靈鼓乃化為黃虵周禮曰靈鼓四面洪範所謂鼓妖嵇康高士傳曰善卷古之賢人也舜以天下讓之善巷曰予子立宇宙之中冬則衣皮毛夏則衣絺葛何以天下為哉汝南先賢傳曰周舉為并州刺史太原一郡舊俗以介子推焚骨有龍忌之禁至其亡月咸言神靈不樂舉火由是土人每至冬中輒一月寒食莫敢煙爨老少不堪歲多死者舉既到乃作弔書以置子推之廟言盛冬止火殘損人命非賢者之意以宣示愚民使還溫食於是眾惑稍解風俗頗革列士傳曰孟常君食客三千人齊市有乞食馮煖經冬無袴面有饑色皇甫謐高士傳曰焦先字孝然冬夏不著衣臥不設席禰衡別傳曰十月朝黃祖於艨衝舟上會設黍臛衡年少在坐黍臛至先自飽食畢搏弄戲擲其輕慢如此列仙傳曰丁次都不知何許人為遼東丁氏作人丁氏嘗置葵問曰冬何有葵云從月南買來神仙傳曰王仲都漢中人少修道術元帝時常以隆冬單衣載駟馬車於上林昆明池環水而馳御者狐裘猶寒振欲死而都無變色背上蒸氣休休然休休氣盛貌師覺孝子傳曰王祥少有德行早失母後母憎而譖之祥孝彌謹盛寒河水堅冰網罟不施母欲得生魚祥解褐扣冰求之忽冰小開有雙魚出游祥垂綸而獲之時人謂之至孝所致也宗躬孝子傳曰何子平事母至孝母喪年六十有孺子之慕夏避清涼冬不衣絮盛弘之荊州記曰宜都銀山有風穴大數尺名風井夏則風出冬則風入樵人有冬過者置笠穴口風吸之經日還長陽溪而得笠, WYG: 七}
