  - {type: variant, offset: 22, length: 0, content: '', krp: 或以封或不免於洴澼絖則所用之異也按絖古纊字絮也洴澼浣溧斫絮於水中也洴扶經切澼普歴切太公金匱曰夏桀之時有芩山之水桀常以十月發民鑿山穿陵通於河民諌曰孟冬鑿山穿陵是泄天氣發地之藏天子失道後必有敗桀殺之朞年芩山崩爲大澤湯率諸侯伐之文子曰冬冰可折夏條可結又曰國有飢者食不重味民有寒者冬不𬒳裘與民同苦樂即天下無哀民列子曰瓠巴學琴於師襄當冬而叩徴絃以激㽔賔陽光熾烈堅冰立散孟子曰子産聽治國之政以其乗輿濟人於溱洧孟子曰子産惠而不知爲政歳十一月徒杠音江成十二月輿梁成民未病渉也徒杠獨木小橋可通徒行與梁通車之橋十一月夏九月十二月夏十月鶡冠子曰斗柄北指天下皆冬鄧析子曰爲君自當若冬日之陽夏日之隂萬物自歸莫之使也恬卧而功自成優游而政自治豈在振目搤腕手操鞭朴而後爲治歟管子曰冬作土功發地藏則夏多暴雨秋霖不止鄒子曰冬取槐檀之火尸子曰冬爲信北方爲冬冬終也北方伏方也是萬物冬皆伏貴賤若一美惡不伐信之至也傳子曰夏令披裘冬令披褐雖有嚴令終不肯從者逆時也韓子曰帝堯之王天下冬月鹿裘又曰管仲隰朋從桓公而伐孤竹春往冬返迷惑失道管仲曰老馬可用也乃放老馬而隨之遂得道行山中無水隰朋曰蟻冬居山之陽夏居山之隂蟻壤一寸而仞有水乃掘地遂得水荀卿子曰天不爲人之惡寒而輟其冬淮南子曰以冬鑠膠以夏造冰天道無私就也無私去也能者有餘拙者不足言以非時鑠膠造氷難也成天道無私就無私去能行道者有餘不能者不足又曰貧人冬則羊裘蔽體短褐不掩形而煬竈口冬日之陽夏日之隂萬物歸之而莫使之然冬日仁物歸陽夏日猛物歸隂非使之然自如是之也又曰稷辟土墾草以爲百姓力農然不能使禾冬生豈其人事不至哉其勢不可也又曰孟冬之月招摇指亥㸑松燧火改火也又曰冬爲權權者所以權萬物也又曰閶闔風四十五日不周風至四十五日廣莫風至坎卦之風不周風至則修宫室繕邊城立冬節土功其始}
  - {type: punctuation, offset: 23, content: 《, id: KR3k0012_CHANT_027-bkkpn9}
  - {type: variant, offset: 23, length: 0, content: '', SBCK: 治宫室繕修邊城備冦難也廣莫風至則閉􅀜梁斷罰刑象冬閉藏不通􅀜梁也罰刑之凝者於是順時而决之又曰古之君人者其慘怛於民也國有飢者食不重味民有寒者而冬不􅀍裘與同飢寒冬伐薪蒸大者日薪小者日蒸以爲民資資用又曰北方水也其帝顓頊顓頊黄帝之孫以水德王天下號曰髙陽氏死託祀北方也其佐􅀇􅁳執權而治冬又曰冬行春令泄象春氣布散發泄也行夏令旱旱象陽炎行秋令霧秋氣隂故亂霧又曰太隂理秋則欲修備繕兵金德斷剛故修兵也太隂理冬則欲猛毅剛強純陽閉固水澤冰故剛強又曰北方之極自九澤窮夏晦之極北至令正之谷九澤北方之澤夏大也晦暝也有凍寒積冰雪雹霜霰漂潤群水之野顓頊􅀇􅁳之所司者萬二千里顓頊黄帝之孫也以水徳王天下號爲髙陽氏死爲北方水㯖之帝其神􅀇􅁳者金天氏有適子曰昧爲􅀇􅁳師死祀爲主水之神也}
  - {type: page-break, offset: 23, content: '', id: KR3k0012_SBCK_027-4a}
  - {type: variant, offset: 23, length: 0, content: '', WYG: 萬物冬皆伏貴賤若一美惡不惑信之至也傅子曰夏令披裘冬令披葛雖有嚴令終不肯從者逆時也韓子曰帝堯之王天下冬月鹿裘又曰管仲隰朋從桓公而伐孤竹春往冬返迷惑失道管仲曰老馬可用也乃放老馬而隨之遂得道行山中無水隰朋曰蟻冬居山之陽夏居山之隂蟻壤一寸而仞有水乃掘地遂得水荀卿子曰天不為人惡寒而輟其冬淮南子曰以冬鑠膠以夏造氷天道無私就也無私去也能者有餘拙者不足言以非時鑠膠造氷難成也天道無私就無私去能行道者有餘不能者不足又曰貧人冬則羊裘不蔽體短褐不掩形而煬竈口冬日之陽夏日之隂萬物歸之而莫使之然冬日人物歸陽夏日人物歸隂非使之然自有如是也又曰稷闢土墾草以為百姓力農然不能使禾冬生豈其人事不至哉其勢不可也又曰孟冬之月招搖指亥爨松燧火改火也又曰冬為權權者所以權萬物也又曰閶闔風四十五日不周風至四十五日廣莫風至坎卦之風不周風至則修宮室繕邉城立冬節土功其始故治宮室繕修邉城偹寇難也廣莫風至則閉關梁斷刑罰冬象閉藏不通關梁也罰刑之疑者於是順時而决之又曰古之君人者其慘怛於民也凡國有飢者食不重味民有寒者冬不披裘蓋與同其飢寒冬伐薪蒸大者曰薪小者曰蒸以為民資資用又曰北方水也其帝顓頊顓頊黄帝之孫以水德王號曰髙陽氏死而祀北方也其佐𤣥𠖇執權而治冬又曰冬行春令泄象春氣有散發泄也行夏令旱旱象陽炎行秋令霧秋氣隂故霧亂又曰太隂理秋則欲修備繕兵金德斷剛故修兵也太隂理冬則欲猛毅剛强純陽閉故水澤氷故剛强又曰北方之極有九澤窮夏晦之極北至令正之谷九澤北方之澤夏大也晦暝也有凍寒積氷雪雹霜霰漂潤羣水之野顓頊𤣥𠖇之所司者萬二千里顓頊黄帝之孫也以水德王天下號為髙陽氏死為北方水徳之帝其神𤣥㝠金天氏有適子曰昧為𤣥𡨕臨死祀為主水之神也}
