  - {type: variant, offset: 20, length: 1, content: 絕, SBCK: 而封能不􅀛手一}
  - {type: variant, offset: 20, length: 1, content: 絕, WYG: 而封能不龜手一也或以封或不免於洴澼絖則所用之異也按絖古纊字絮也洴澼絖漂吹絮於水中也洴扶經切澼普厯切太公金匱曰夏桀之時有芩山之水桀常以十月發民鑿山穿陵通於河民諫曰孟冬鑿山穿陵是泄天氣發地之藏天子失道後必有敗桀殺之期年芩山崩為大澤湯率諸侯伐之文子曰冬氷可折夏條可結又曰民有飢者食不重味民有寒者冬不被裘與民同苦樂即天下無哀民列子曰瓠巴學琴於師襄當冬而叩徴絃以激蕤賔陽光熾烈堅氷立散孟子子産聽鄭國之政以其乘輿濟人於溱洧孟子曰子産惠而不知為政歳十一月徒杠音江成十二月輿梁成民未病涉也徒杠獨木小橋可通徒行輿梁通車橋十一月夏九月十二月夏十月鶡冠子曰斗柄北指天下皆冬鄧析子曰為君自當若冬日之陽夏月之隂萬物自歸莫之使也恬卧而功自成優游而政自治豈在振目搤腕手操鞭朴而後為治歟管子曰冬作土功發地藏則夏多暴雨秋霖不止鄒子曰冬取槐檀之火尹子曰冬為信北方為冬冬終也北伏方}
