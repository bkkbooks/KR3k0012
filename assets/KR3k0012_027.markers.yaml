  - {type: variant, offset: 1635, length: 6, content: 國子冬夏教以, SBCK: 淪重陽於潜户徴積隂於司寒􅀽宏北征賦曰于時天髙地涸木落水凝繁霜夜灑勁風晨興日曖曖其巳頽月亭亭而虚昇鮑昭舞鶴賦曰窮隂殺節急景凋年涼沙振野箕風動天巖巖苦霧皎皎悲泉冰塞長河雪滿群山旣而昬雰夜歇景物澄廓星飜漢迴曉月將落感寒雞之早晨憐霜鴈之違漠臨驚風之蕭條對流光之照灼傳􅀇}
