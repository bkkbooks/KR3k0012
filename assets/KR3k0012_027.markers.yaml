  - {type: variant, offset: 22, length: 0, content: '', SBCK: 或以封或不免於洴澼絖則所用之異也按絖古纊字絮也洴澼浣溧斫絮於水中也洴扶經切澼普歴切太公金匱曰夏桀之時有芩山之水桀常以十月發民鑿山穿陵通於河民諌曰孟冬鑿山穿陵是泄天氣發地之藏天子失道後必有敗桀殺之朞年芩山崩爲大澤湯率諸侯伐之文子曰冬冰可折夏條可結又曰國有飢者食不重味民有寒者冬不􅀍裘與民同苦樂即天下無哀民列子曰瓠巴學琴於師襄當冬而叩徴􅃶以激㽔賔陽光熾烈堅冰立散孟子曰子産聽治國之政以其乗輿濟人於溱洧孟子曰子産惠而不知爲政歳十一月徒杠音江成十二月輿梁成民未病渉也徒杠獨木小橋可通徒行與梁通車之橋十一月夏九月十二月夏十月鶡冠子曰斗柄北指天下皆冬鄧析子曰爲君自當􅀂冬日之陽夏日之隂萬物自歸莫之使也恬卧而功自成優游而政自治豈在振目搤腕手操鞭朴而後爲治歟管子曰冬作土功發地藏則夏多􅁀􅀨秋霖不止鄒子曰冬取槐檀之火尸子曰冬爲信北方爲冬冬終也北方伏方也是萬物冬皆伏貴賤􅀂一美惡不伐信之至也傳子曰夏令披裘冬令披􅄄雖有嚴令終不肯從者逆時也韓子曰帝堯之王天下冬月鹿裘又曰管仲隰朋從桓公而伐􅀌竹春往冬返迷惑失道管仲曰老馬可用也乃放老馬而隨之遂得道行山中無水隰朋曰蟻冬居山之陽夏居山之隂蟻壤一寸而仞有水乃掘地遂得水荀卿子曰天不爲人之惡寒而輟其冬淮南子曰以冬鑠膠以夏造冰天道無私就也無私去也能者有餘拙者不足言以非時鑠膠造氷難也成天道無私就無私去能行道者有餘不能者不足又曰貧人冬則羊裘蔽體短􅄄不掩形而煬竈口冬日之陽夏日之隂萬物歸之而莫使之然冬日仁物歸陽夏日猛物歸隂非使之然自如是之也又曰稷辟土墾草以爲百姓力農然不能使禾冬生豈其人事不至哉其勢不可也又曰孟冬之月招摇指亥㸑松燧火改火也又曰冬爲權權者所以權萬物也又曰閶闔風四十五日不周風至四十五日廣莫風至坎卦之風不周風至則修宫室繕邊城立冬節土功其始}
