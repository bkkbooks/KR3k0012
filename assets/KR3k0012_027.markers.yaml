  - {type: variant, offset: 14, length: 0, content: '', WYG: 風曰寒風勁風嚴風厲風衰風隂風景曰冬景寒景時曰寒辰節曰𤣥節鳥曰寒鳥寒禽草曰寒卉黄草木曰寒木寒柯素木寒條又曰十月孟冬亦曰上冬亦曰陽月此時純隂用事嫌}
  - {type: page-break, offset: 14, content: '', id: KR3k0012_WYG_027-2a, image: WYG0893/WYG0893-0234c.png}
  - {type: variant, offset: 14, length: 0, content: '', krp: 風曰寒風勁風嚴風厲風哀風隂風景曰冬景寒景時曰寒辰節曰嚴節鳥曰寒鳥寒禽草曰寒卉黄草木曰寒木寒柯素木寒條又曰十月孟冬亦曰上冬亦曰陽月此時純隂用事嫌}
  - {type: variant, offset: 15, length: 0, content: '', SBCK: 無陽故日陽月十二月季冬亦曰暮冬杪冬餘月暮節暮歳風俗通曰夏宫冬律􅀨雹必降冬宫夏律雷必發聲夫音樂至重所感者大故曰知禮樂之情者能作識禮樂之文者能述又曰趙仲讓爲梁兾從事中郎冬月坐庭中向日解衣捕虱又曰十月之應鍾何應者應也鍾者動也言萬物應陽而動不藏也論衡曰隂}
  - {type: variant, offset: 15, length: 0, content: '', WYG: 無陽故曰陽月十二月季冬亦曰暮冬秒冬餘月暮莭暮歲風俗通曰夏宮冬律雨雹必降冬宮夏律雷必發聲夫音樂至重所感者天故曰知禮樂之情者能作識禮樂之文者能述又曰趙仲讓為梁冀從事中郎冬月坐庭中向日觧衣捕虱白虎通曰十月律謂之應鍾何鍾者動也言萬物應陽而動下藏也論衡曰陽}
  - {type: page-break, offset: 15, content: '', id: KR3k0012_WYG_027-2b, image: WYG0893/WYG0893-0234d.png}
  - {type: variant, offset: 15, length: 0, content: '', krp: 無陽故日陽月十二月季冬亦曰暮冬杪冬餘月暮節暮歳風俗通曰夏宫冬律雨雹必降冬宫夏律雷必發聲夫音樂至重所感者大故曰知禮樂之情者能作識禮樂之文者能述又曰趙仲讓爲梁兾從事中郎冬月坐庭中向日解衣捕虱又曰十月之應鍾何應者應也鍾者動也言萬物應陽而動不藏也論衡曰隂}
  - {type: variant, offset: 16, length: 2, content: 上騰, SBCK: 動於下而隂氣應之也又曰十二月律謂之大吕何大者太也吕拒也言陽氣欲出其隂不許也吕之言拒也依即拒難之也太􅀇經曰岡北方也冬也未有形也岡無也未有形故爲岡也言冬萬物􅀷藏黄泉莊子曰魯遽弟子曰我得夫子之道吾能冬㸑鼎而夏造冰矣魯遽曰是直以陽召陽以隂召隂非吾所謂道也又曰古者民不知衣服夏多積薪冬則焬之故命之曰知生之民又曰宋人有善爲不􅀛手之藥者世世以洴澼絖爲事吴人有百金買不􅀛手之藥以􅀃吴王越有難吴王使之將令}
  - {type: page-break, offset: 16, content: '', id: KR3k0012_SBCK_027-2a}
  - {type: variant, offset: 16, length: 2, content: 上騰, WYG: 動於下而隂氣應之也又曰十二月律謂之大呂何大者太也呂者拒也言陽氣欲出隂不許也呂之言拒者旅抑拒難之也太𤣥經曰㒺北方也冬也未有形也㒺無也未有形故為㒺也言冬萬物深藏黄泉也莊子曰魯遽弟子曰我得夫子之道吾能冬爨鼎而夏造氷矣魯遽曰是直以陽召隂非吾所謂道也又曰古者民不知衣服夏多積薪冬則煬之故命之曰知生之民又曰宋人有善為不龜手之藥者世世以洴澼絖為事吳人有百金買不龜手之藥以說吳王越有難吳王使之將令}
  - {type: page-break, offset: 16, content: '', id: KR3k0012_WYG_027-3a, image: WYG0893/WYG0893-0235a.png}
  - {type: variant, offset: 16, length: 2, content: 上騰, krp: 動於下而隂氣應之也又曰十二月律謂之大吕何大者太也吕拒也言陽氣欲出其隂不許也吕之言拒也依即拒難之也太玄經曰岡北方也冬也未有形也岡無也未有形故爲岡也言冬萬物深藏黄泉莊子曰魯遽弟子曰我得夫子之道吾能冬㸑鼎而夏造冰矣魯遽曰是直以陽召陽以隂召隂非吾所謂道也又曰古者民不知衣服夏多積薪冬則焬之故命之曰知生之民又曰宋人有善爲不龜手之藥者世世以洴澼絖爲事吴人有百金買不龜手之藥以說吴王越有難吴王使之將令}
