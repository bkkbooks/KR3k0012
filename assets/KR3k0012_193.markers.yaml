  - {type: variant, offset: 1893, length: 1, content: 靖, krp: 内謂之城外謂之}
  - {type: variant, offset: 1895, length: 543, content: 君城薜容諫靖郭君曰君失齊國雖薜城至於天猶無益也靖郭君乃不城薛博物志曰處士東里塊責禹亂天下禹退作三城強者攻弱者守敵者戰城郭禹始也又曰代城始築立版幹一旦亡西南五十里於澤中自立結葦為門因就營築焉其城圓周三十七里為九門故城處呼曰東城崔豹古今注曰秦所築長城土色紫漢塞亦然故稱紫塞韓詩外傳曰趙簡子薨未葬中牟叛之既葬五日襄子興兵而攻之圍未匝而城自壞襄子擊金而退軍吏曰誅中牟之罪而城自壞天助也何為退襄子曰吾聞君子不乘人於利不阨人於險使其城成然後攻之述異志曰廬山上北嶺有城號康王城天雨聞鼓角之聲傳云周康王好音累巡名山故有康王之號又曰尋陽柴桑縣城晉永和中有童謠呼為平石城時人僉謂平滅石之徵也後桓玄篡位晉帝為平固王恭帝為石陽公俱遷於此城又曰尋陽張允家在本郡郡南有古城張少貧約屢往遊憩忽有一老公來與張言因問之此城何名荅曰吾不知為南郡城耳言訖便去不知所之張既出官仕進累遷位登元凱後為南郡太守即以城號以志老父之言焉又曰安陽有金城城皆如金色堅勁不崩摧先儒云上古時天雨黃金也酈元水經注曰魯陽開水歷衡山西南經皇后城建武元年光武遣侍中傅俊持節迎光烈皇后於濟陽後發兵三百餘人宿衛皇后道路歸京師蓋稅舍所在故得其名矣又曰漢水東合甲水南流經金井城又曰漢水東經方石城在高原上高十餘丈四面臨平形若覆盆其城宿是流雜聚居故世亦謂流雜城又曰, SBCK: 焦貢}
