  - {type: variant, offset: 33, length: 2, content: 上垣, SBCK: 呉時爲烽火之所太康地記曰梁孝王築睢陽城十二里以鼔唱節杵而下和者稱睢陽因以爲縣又曰鴈門馬邑縣􅁗時建此城輒崩不成有馬周旋馳走反覆父老異之因以築城遂名馬邑云搜神記亦載也述征記曰思子城漢武帝延和二年衛太子遇江充之亂奔湖自縊壷􅀜三老太廟令田千秋訴太子之􅁈築思子宫於湖其城存焉續述征記曰廣固城有大澗甚廣阻之爲固}
