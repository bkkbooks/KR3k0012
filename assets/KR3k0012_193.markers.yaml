  - {type: variant, offset: 130, length: 1, content: 制, SBCK: 相望又曰廣州万人城即尉佗故城也又曰張掖郡竇融築千秋城万歳城又曰洛陽澠池縣有秦趙二王城號爲俱利城又曰定州博陵縣樂羊城魏文侯使樂羊取中山造又曰重泉城漢武爲李夫人所築又曰藍田有青維􅅺城亦曰柳城又曰賀州蕪城池隍中頗岀珠玉寳器即尉佗拒防之所也又曰曹州漆園城莊周爲吏處又曰曹州白鴈城即衛侯伐鄭至于鳴鴈是此也又曰洛州王城宫城西入􅁐故郟鄏城也周武王伐殷遷九鼎此地也夏至之影尺有五寸謂之土中}
