  - {type: variant, offset: 108, length: 0, content: '', krp: 西南半里許實中俗說囚堯城羊頭山記邯鄲城邯山名鄲盡也邯山至此而盡也又曰曲阜城城内有曲阜逶迤長八九里東方朔十洲記曰崑崙山有積金爲天城四面千里關中記曰長安城其形似北斗其土夲皆黒壤今城赤如火堅如金父老所傳鑿龍首山土以爲城也幽明録曰始興縣有臯天子廟因山﨑嶇十有餘里坑塹數重阡陌交通城内堂基碎瓦柱穿猶存東有臯天子冢臯天子未之聞也劉植京口記曰有小昇城鄧徳明南康記曰歸美山下有石城髙數丈有一門門外有二石夾左右髙數百丈逺望嵯峨雲}
  - {type: variant, offset: 109, length: 1, content: 壞, SBCK: 騰空故老謂之神仙游焉江寧圖曰石頭城呉之金陵城爲石城郡國誌曰兖州兩觀城即仲尼爲魯司㓂誅少正卯之處又曰陜州魏城即芮伯萬母惡芮伯逐之出居于魏此也晉獻公滅之以賜畢萬山河之間土地迫隘故魏周著十畒之詩又曰雲中府快馬城有綾羅泉即塞上翁所居之邑有快馬亭塞上翁六國前人姓李也又曰雍州霸陵城在通化門東二十里􅁗襄王葬於其坂謂之霸上又曰汴之髙陵城即髙陽之墟也繁陽城漢云外黄縣有繁陽亭張耳爲外黄令有夏后祠神井能興􅀨雹又曰徐州薛城髙厚無比多出暴桀子弟蓋孟甞君餘風也又曰六壁府後魏太平眞君五年討胡於六壁即此城俗以城有六面因以爲名焉又有虢城虞城相傳云晉旣滅虞虢遷其人於此築城以居之又曰幽州無終縣西平城即李廣射石虎之處又曰復州竟陵城雲夢城城西大澤即古雲夢澤也却月城在河口魏將黄祖所守處又曰嬀州􅃰鹿城即黄帝擒􅃖􅀹處黄帝泉今枯而不流即古之版泉也又曰涼州昌松縣有鸞鳥城魏改爲神鳥城張􅁤時有五色鳥集於其處築城}
