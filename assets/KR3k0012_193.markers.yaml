  - {type: variant, offset: 122, length: 6, content: 市而建宮室得, WYG: 俗號青牛城又曰箕子城石勒每破一州必簡别衣冠號為君子城洎平幽州擢荀綽裴憲等還襄國路經此後俗訛為箕子城又曰平州孤竹城即孤竹國也漢靈帝時遼西守㢘翻夣人云吾孤竹君之子也今遼海漂吾棺明日見浮棺因葬之又曰雲中府齊柳牙舘城有道人城初築時有仙人㳺}
