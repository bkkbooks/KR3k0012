  - {type: variant, offset: 1183, length: 466, content: 北二十餘里名凌城居於其中又夏錄曰赫連勃勃下書曰古人制起城邑或因山水或以義立名今都城巳建萬堵斯作克成弗遠宜有美名朕方統一天下君臨萬國可以統萬為名焉燕書曰太祖皝八年使唐柱等築龍城立門闕宮殿廟園籍田後遂改為龍城縣北齊書曰唐邕字道和為給事黃門中書舍人文宣出塞邕必陪從文宣嘗登并州童子佛寺望并州曰此何等城也或曰金城湯池天府之國也文宣曰我謂唐邕是金城此非也唐書曰景雲二年三月張仁愿於河北築三受降城先是朔方與突厥以河為界北有佛雲祠突厥每入寇必禱祠候冰合而入時默啜西擊仁愿乘虛奪取漠南之地築三城首尾相應以拂雲祠為中城東西相去各四百里皆據津濟遙相應接北拓三百餘里於牛頭胡那山北置烽候百八十自是突厥不得度山放牧朔方更無寇掠減鎮兵數萬人又曰天寶二年正月二十八日築神都羅城號曰金城又曰天寶六載十二月築會昌城於陽所置百司及公卿邸第又曰建中元年五月築奉天城四年十月上避難于奉天初術士桑道茂奏請城奉天為王者之居至是方驗又曰貞元九年二月詔復築鹽州先是貞元三年城為吐蕃所壞自後塞外無堡障犬戎入寇既城之後邊患頓息五經異義曰天子之城高九仞公侯七仞伯五仞子男三仞白虎通曰天, SBCK: ''}
