  - {type: variant, offset: 683, length: 0, content: '', SBCK: 百一十歩陸門二有樓水門八南面十四里四十二歩西面七里百一十二歩北面八里二百六十歩東面一十里七十九歩闔閭所造也呉郭周六十八里六十歩呉小城周一十二里其下廣二丈七尺髙四丈門三皆有樓東宫周一里二百歩路西宫在長秋門周一里二百二十六歩􅁗始皇帝二十一年守宫者照鷰失火燒之呉越春秋曰鯀築城以衛君造郭以居人此城郭之始也又曰范蠡觀天文法於紫宫築作小城周}
