  - {type: variant, offset: 114, length: 0, content: '', SBCK: 登縣有不夜城尚書城有石橋即􅁗始皇造欲􅀚日處文登山始皇召文士而登此山又曰齊有士郷城鄭玄云齊有士郷城越有君子軍又曰同州韓城即韓原也詩所謂韓侯受命是此韓地春秋時秦擒晉惠}
