  - {type: variant, offset: 129, length: 0, content: '', SBCK: 地遂名城焉又曰成都郡城秦惠王二十七年張儀築以象咸陽沃野千里號曰陸海有萬歳池即築城取土之處也又曰定州博陵縣唐城堯爲唐侯國於此又曰陽翟縣舊屬汝州有鷄鳴城又曰隨州博望城即張騫封侯之國也又曰許州雍城即黄帝臣雍父始作杵臼處又曰朔州太平城後魏穆帝治也太極殿琉璃臺瓦及鴟尾悉以琉璃爲之又曰鄭州博浪城即張良爲韓報仇擊秦王處又曰雍州杜城在安仙門南七里春秋范宣子云在周爲唐杜氏即是此也又曰益陽城魯肅築也云登之望見長沙城邑人馬形色宛然相去三百里故老云長沙益陽一}
  - {type: page-break, offset: 129, content: '', id: KR3k0012_SBCK_193-4a}
