  - {type: variant, offset: 108, length: 0, content: '', SBCK: 西南半里許實中俗說囚堯城羊頭山記邯鄲城邯山名鄲盡也邯山至此而盡也又曰曲阜城城内有曲阜逶迤長八九里東方朔十洲記曰崑崙山有積金爲天城四面千里􅀜中記曰長安城其形似北斗其􅁟夲皆黒壤今城赤如火堅如金父老所傳鑿龍首山土以爲城也幽明録曰始興縣有臯天子廟因山﨑嶇十有餘里坑塹數重阡陌交通城内堂基碎瓦柱穿猶存東有臯天子冢臯天子未之聞也劉植京口記曰有小昇城鄧徳明南康記曰歸美山下有石城髙數丈有一門門外有二石夾左右髙數百丈逺望嵯峨雲}
  - {type: page-break, offset: 108, content: '', id: KR3k0012_SBCK_193-2a}
