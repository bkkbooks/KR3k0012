  - {type: substitution, offset: 2929, original: 逕, replacement: 徑, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-16737}}
  - {type: variant, offset: 2932, length: 837, content: 城馬鞍城白鹿城白沙城郡晉咸康中張魴甚有惠政白鹿群游取一而獻之故因以為名袁山松宜都記曰限山縣有山名下魚城四面絕崖兩道可上皆險山周廻可二十里上有林木池水里民種於山下晉永嘉亂土人登此避賊賊守之經年食魚擲下與賊以示不窮賊遂退散因以此為下魚城吳地記曰咠門外越城者越來伐吳吳王在姑蘇築此城以逼之又有越來溪又曰越來溪西魚城者吳王既遊姑蘇築此城以養魚又曰魚城之西有故城長老云築以釀酒今俗人呼之為苦酒城又曰匠門外鴨城者吳王築此城以養鴨又曰婁門外雞陂者吳王養雞城又曰海渚有吳王闔閭與越結怨相伐築城名曰南武城以禦越盛弘之荊州記曰馬牧城東三里有蜂城故老相傳云飢年民結侶拾蜂止憩其中故因為城又云城隨門勢上大下尖其形似蜂故有蜂號二稱莫知所附故並載焉又曰當陽縣東南有麥城城東有驢磨城掎角城傳云伍員造此二城以攻麥城故假驢磨之名又曰樊城西北有鄾城即春秋所稱鄾子之國光武云宛最強鄾次之即謂此鄾城西北行十餘里鄧侯吳離之國為楚文王所滅今為鄧縣登城西百餘里有榖城伯綏之國城門有石人焉刊其腹云摩鞬慎莫言疑此亦周太廟金人緘口銘背之流也又曰秭歸縣西有楊城周廻十餘里即熊繹所居荊州圖記曰江夏郡所治夏口城其西南角因磯為高崇墉枕流上則過眺山川下則激浪崎嶇是曰黃鵠磯寔舟人之所艱也又曰白帝城西臨大江東南高二百丈西北高一千丈又曰鄧城有樊城是樊仲山甫所封也又曰沌陽縣有卻月城西一里有馬城也又曰夷陽縣南對岸有陸抗故城即山為墉西面天險上有步闡故城又曰新野郡魏三公城左右傳漢時三公餞離處也伏滔北征記曰梁國名故宋國微子所封城再重大城梁孝王所築孟粵北征記曰許昌在洛水之西城方圓二十里有三重城南北東西士門金城西南員實中臺高六丈餘方圓二畝上有廟城門有鐵鑊關中記曰長安地皆黑壤城今赤如火堅如石父老所傳鑿龍首山土為城又諸臺關亦爾益州記曰益州城張儀所築錦城在州南蜀時故宮也其處號錦里成都記曰府城本呼為錦城秦滅蜀張儀所築也每面各三里周廻十二里高七文屢皆傾側忽有大龜周行隨其所躡而築之功果就焉故亦號為龜城三輔黃圖曰長安城西南頭第二門名直城王莽改曰端路今名直城, SBCK: ''}
