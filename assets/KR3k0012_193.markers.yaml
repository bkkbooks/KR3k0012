  - {type: variant, offset: 684, length: 9, content: 與虜戰虜兵壞散死傷, SBCK: 一百二十二歩一貟三方西北立飛翼之樓以象天門東南服漏石竇以象地户陵門四逹以象八風外郭築城而缺西北示服事呉也不敢壅塞内以取呉故缺西北而呉不知也又曰伍子胥爲呉相土甞水象天法地造築大城周廻四十七里陸門八以象天之八風水門八以象地之八牎築小城十里陸門三東面}
