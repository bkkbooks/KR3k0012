  - {type: variant, offset: 853, length: 257, content: 水灌之一夜可立從之乃多作縑囊以盛土堰水夜渡兵作城比明城立公軍於是盡得渡干寶晉紀曰魏文帝之在廣陵吳人大駭乃臨江為疑城自石頭城至于江乘以木為枝衣以葦席加彩飾焉一夕而成晉書云涼州城有龍形故名臥龍城本匈奴所築也又曰朱序遷梁州刺史鎮襄陽符堅遣軍圍序序母韓氏自行城謂西北角當先弊遂領百餘婢及城中女丁築二十餘丈賊攻新築不敗遂引退襄陽謂之夫人城晉載記曰赫連勃勃以叱于呵利領將作大匠乃蒸土築城以錐刺之錐入一寸即殺作者不入即殺行錐者勃勃以為忠沈約宋書曰檀道濟見收脫幘投地曰乃壞汝萬里長城又曰氐師楊難當寇漢中魏興太守薛健據黃金城崔鴻十六, SBCK: 爲}
