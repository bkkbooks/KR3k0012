  - {type: variant, offset: 2439, length: 202, content: 水西山寬中谷東經五大夫城昔北平侯王潭所居王莽之亂生五子並避亂隱居北山故其後居世以為五大夫城河北記云易縣有五公城王潭不從王莽潭子興生五子避隱於此世祖並封為侯元才北平侯顯才蒲平侯益才安嘉侯季才唐侯所謂中山五侯其西三十里有五大夫城說與此同說苑曰中行穆子圍鼓鼓人有以城叛來降者穆子不許軍吏曰師徒不勤得城何故不受穆子曰有以吾城叛者吾所惡也人以城來獨何賞秦州記曰天水郡治上邽城前有湖中冬夏中停無增減天水取名由此湖也又, SBCK: 林}
