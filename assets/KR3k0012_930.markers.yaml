  - {type: variant, offset: 702, length: 719, content: 夏得木德青龍止於郊漢書曰惠帝二年正月兩龍見蘭陵人家井中又曰文帝時公孫臣以為漢土德黃龍見張蒼以為水德至十五年黃龍見成紀下詔召臣為博士東觀漢記曰公孫述有龍出其府殿中夜有光耀述以為符瑞因稱尊號改元曰龍興後漢書曰哀牢夷其先有婦人捕魚水中觸沉木有孕生男子十人沉木化為龍出水上九男驚走一兒不去背龍因舐之後諸兒推為哀牢主魏志曰華歆邴原管寧三人為友號曰一龍歆為龍頭原為龍腹寧為龍尾魏略曰文帝欲受禪郡國奏黃龍十三見明帝鑄銅黃龍高四丈置殿前晉書曰劉毅為尚書左僕射時龍見武庫井中帝親觀之有喜色百官將賀毅獨曰昔龍降鄭時門之外子產不賀龍降夏庭沬流不禁卜藏其漦至周幽王禍釁乃發易稱潛龍勿用陽在下也證據舊典無賀龍之禮又曰陸機嘗餉張華鮓于時賓客滿座華發器便曰此龍肉也眾未之信華曰試以苦酒濯之必有異既而五色光起機還問鮓主果云園中茅積下得一白魚質狀殊常以作鮓過美故以相獻崔鴻十六國春秋前燕錄曰慕容晃十二年夏四月黑龍一白龍一見於龍山晃親帥群僚觀龍二百餘步祭之以太牢二龍交首嬉翔解角而去晃大悅還宮殿赦其境內號新宮曰和龍宮晉書曰符生初夢大魚食蒲又長安謠曰東海大魚化作龍男便為王女為公問在何所洛城東時符堅為龍驤將軍第在洛門之東其後果驗又曰呂光伐龜茲軍其城南營外夜有一黑物大如斷堤搖動有頭角目光若電及明而雲霧四周遂不復見旦視其處南北五里東西三十餘步鱗甲隱地之所昭然猶在光嘆曰黑黑龍也俄而雲起西北暴雨滅其跡杜進言於光曰龍者獸之君大人利見之象易曰見龍在田德施普也斯誠明將軍道合靈和德符幽契願將軍勉之以成大慶光有喜色又曰馮跋弟素弗與從兄萬泥及諸少年遊于水濱有一金龍浮水而下素弗謂萬泥曰頗有見不萬泥等皆曰無所見也乃取龍而示之咸以為非常之瑞又曰雷奐子華度襄水劍躍入水化為龍又曰初桓溫南州起齋悉畫, SBCK: 蛟}
