  - {type: variant, offset: 113, length: 144, content: 寫竟去星經曰東方七宿為蒼龍凡有鱗之類皆屬於木故龍為鱗蟲之長歸藏明夷曰昔夏后啟土乘龍飛以登于天睪皋陶口之曰吉周易乾卦曰雲行雨施品物流形時乘六龍又曰坤卦龍戰于野其血玄黃又文言曰雲從龍又說卦曰震為龍易通卦驗曰立夏清風至而龍昇天尚書中候曰黃龍負卷舒圖又曰青龍衘玄圖大戴禮冠曰鱗蟲三百六十而龍為之長, WYG: 所哉蛟}
