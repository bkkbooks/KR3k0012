  - {type: variant, offset: 2624, length: 0, content: '', SBCK: 璧渡河河伯欲之陽􅀱波起兩蛟夾舩子羽左操璧右操劒擊蛟皆死旣濟三投璧於河河伯三躍而歸之子羽毀璧而去又曰荆佽飛渡江兩蛟夾其舩佽飛下劒盡斷其頭而風波静又曰東海上有勇士菑丘訢者過神淵強使飲馬馬沉訢朝服拔劒入水三日三夜殺二蛟一龍而出雷電隨而擊之七日七夜眇其左目韓詩外傳同又曰燕太子丹質於􅁗見遣而爲機橋於渭將殺之蛟龍夾舉機不得發又曰人食鷰􅁏者不可入水爲蛟龍所吞王子年拾遺録曰漢昭帝常遊渭水使羣臣漁釣爲樂時有大夫任緒釣得白蛟長三丈􅀂大虵無鱗甲頭有一角長二尺軟如􅁏焉牙如脣外帝曰此魚䱉之􅀋非珎祥也乃命太官爲鮓骨青􅁏紫味甚美帝後思之使􅊻者復覔終不得也郭子横洞􅁳記曰文犀國去長安萬里在日南之南人長七尺􅀍髮至踵乗犀象以爲車舩乗象入海底取寳􅀫蛟人之舎夕得淚珠則蛟人所泣淚而成珠也亦曰泣珠續齊諧記曰屈原五月五日投汨羅而死楚人哀之毎至此日以竹筒貯粉米􅀕之漢武建中長沙區回白日怱見一士人自稱三閭大夫謂曰聞君常見􅀕甚善但常年所遺爲蛟龍所􅀼􅀂今有惠可以練葉塞其上五色絲􅅞之此二物是蛟龍所憚說文曰蛟龍屬也魚滿三千六百歳蛟爲之長率魚而飛去㓜童傳曰魏太祖年十歳浴於譙水蛟來逼自􅁬水擊蛟乃退畢浴而還王韶之始興記曰雲水源有湯泉下流多蛟害厲濟者遇之必􅀏而没盛弘之荆州記曰襄城北汚水極深有蛟爲害太守鄧遐勇果時人方樊噲抜劒入水蛟遶其足遐自揮劒截蛟數叚流血丹水自此無害劉敬叔異􅁐曰承陽人李増行經大溪見兩蛟在川引弓射之中一即死増歸因復出市有一女子素服衘涕捉所射箭増怪之問焉荅曰何用問爲􅀂是君箭便以相還授矢而滅増惡而驟返未逹}
