  - {type: variant, offset: 2625, length: 0, content: '', SBCK: 暴死於路劉義慶幽明録曰晉安帝隆安􅀄曲阿民謝盛乗舩入湖採菱見一蛟來向舩舩廻避蛟又從其後盛便以义殺之懼而還家經年無患至元興中普天亢旱盛與同旅數人歩至湖中見先义在地拾取之云是我义人問其故具以實對行數歩乃得心痛還家一􅀫便死續捜神記曰長沙有人忘其姓名家住邊江有女子渚次澣紗覺身中有異復不以爲患遂妊身生三物皆如鮧夷提二音魚甚憐異之乃着藻槃水中養之經三月此物遂大乃是蛟子字大者爲當洪次者名破祖小者名揉岸天暴雨水三蛟一時俱出遂失所在後天欲雨此物輙來女亦知當來便岀望之蛟子亦出頭望母良乆方復去經年後女亡三蛟子至其墓所哭之經日乃去聞其哭聲狀如狗號又曰安城平都縣尹氏居在郡東十里日黄屯尹佃舎在焉元嘉二十}
  - {type: page-break, offset: 2625, content: '', id: KR3k0012_SBCK_930-6b}
  - {type: variant, offset: 2625, length: 0, content: '', WYG: 經年無患至元興中普天亢旱盛與同旅數人步至湖中見先义在地拾取之云是我义人問其故具以實對行數步乃得心痛還家一宿便死續捜神記曰長沙有人忘其姓名家住邉江有女子渚次澣沙覺身中有異復不以為患遂姙身生三物皆如鮧音提魚甚憐異之乃着藻槃水中飬之經三月此物遂大乃是蛟子字大者為當洪次者名被祖小者名揉岸天暴雨水三蛟一時俱出遂失所在後天欲雨此物輙來女亦知當來便出望之蛟子亦出頭望母良久方復去經年後女亡三蛟子至其墓所哭之經日乃去聞其哭聲狀如狗號又曰安城平都縣尹氏居在郡東十里日黄屯尹佃舍在焉元嘉二十}
