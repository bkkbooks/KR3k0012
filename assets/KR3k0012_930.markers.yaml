  - {type: variant, offset: 2624, length: 0, content: '', WYG: 璧渡河河伯欲之陽侯波起兩蛟夾舩子羽左操劍擊蛟皆死既濟三投璧於河河伯三躍而歸之子羽毁璧而去又曰荆佽飛度江兩蛟夾其舩佽飛下劒盡斷其頭而風波静又曰東海有勇士菑邱訴者過神淵飲馬馬沉訴脱服㧞劍入水三日三夜殺二蛟一龍而出雷電隨而擊之七日七夜𦕈其左目又曰燕太子丹質於秦見遣而為機橋於渭將殺之蛟龍夾舉機不得發又曰人食鷰肉者不可入水為蛟龍所吞王子年拾遺錄曰漢昭帝常遊渭水使羣臣漁釣為樂時有大夫任緒釣得白蛟長三丈若天蛇無鱗甲首有一角長二尺軟如肉焉牙在脣外帝曰此魚䱉之類非禎祥也乃命太官為鮓骨青紫肉味甚美帝後思之使罾者復覔終不得也郭子横洞冥記曰文犀國去長安萬里在日南之南人七尺被髪至踵乗犀象以為車舡乗象入海底取寶宿蛟人之舍夕得淚珠則蛟人所泣淚而珠也亦曰泣珠續齊諧曰屈原五月五日投泊􅚒而死楚人哀之每至此日以竹桐貯粉米祭之漢武建中長沙區回白日忽見一士人自稱三閭大夫謂曰聞君常見祭甚善但常年所遺為蛟龍所竊若今有惠可以練葉塞其上五色絲縛之此二物是蛟龍所憚說文曰蛟龍屬也魚滿三千六百歲蛟為之長率魚而飛去㓜童傳曰魏太祖年十歳浴於譙水蛟來逼自奮水擊蛟乃退畢浴而還王韶之始興記曰雲水源自湯泉下流多蛟害厲濟者遇之必笑而沒盛宏之荆州記曰襄城北沔水極深有蛟為害太守鄧遐勇果時人方之樊噲㧞劍入水蛟遶其足遐自揮劍截蛟數叚流血成丹水自此無害劉敬叔異苑曰承陽人李増行經大溪見兩蛟在川引弓射之中一即死増歸因復出市有一女子素服銜涕捉所射箭増怪之問焉荅曰何用問為若是君箭便以相還授矢而滅増惡而驟返未達暴死於路劉義慶幽明錄曰晉安帝隆安初曲阿民謝盛乗舩入湖採菱見一蛟來向舩舩廻避蛟又從其後盛便以义殺之懼而還}
