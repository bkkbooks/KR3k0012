  - {type: 'tls:seg', offset: 361, content: '', id: KR3k0012_CHANT_930-8a.4}
  - {type: variant, offset: 361, length: 283, content: 龍見於絳郊魏獻子問於蔡墨曰吾聞之蟲莫智於龍以其不生得也謂之智信乎對曰人實不智非龍實智言人實不智而謂之智非龍智也乃不智也古者畜龍故國有豢龍氏有御龍氏豢養也昔有飂叔安飂古國也安其君名也有裔子曰董父裔遠也玄孫之後為裔也實甚好龍能求其嗜欲以飲食之龍多歸之乃擾畜龍以服事帝舜帝賜之姓曰董氏曰豢龍故帝舜氏世有畜龍氏及有夏孔甲擾于有帝帝賜之乘龍河漢各二各有雌雄孔甲不能食而未獲豢龍氏有陶唐氏既衰其後有劉累學擾龍于豢龍氏以事孔甲能飲食之夏后嘉之賜氏曰御龍以更豕韋之後龍一雌死潛醢以食夏后嘉之既而使求之懼而遷于魯縣龍水物也水官棄矣故龍不生得春秋元命苞曰龍之言萌也陰中之陽故言龍舉而雲興, SBCK: 伐蛟取鼉}
