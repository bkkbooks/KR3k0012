  - {type: variant, offset: 3376, length: 150, content: 蠋化成之龍又曰夏時龍生於太廟之中說苑曰吳王欲從民飲酒伍子胥諫曰不可昔白龍下清冷之淵化為魚漁且豫且射中其目白龍上訴天帝天帝曰當是之時若安置而形白龍對曰我下清冷之淵化為魚天帝曰魚固人之所射也若罪豫且何罪夫白龍天帝貴畜也豫且宋國之賤臣也白龍不化豫且不射今棄萬乘之位而從布衣之士飲酒臣恐其有豫且之患矣王乃止呂, SBCK: 吕}
