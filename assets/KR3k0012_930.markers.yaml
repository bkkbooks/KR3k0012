  - {type: variant, offset: 9, length: 1, content: 舜, WYG: 黄龍者神之精四龍之長也王者不漉池而魚得達深淵則應氣而游池沼酈善長水經注曰佛圖澄别傳曰石虎時自正月不雨至六月澄詣滏口祠稽首曝露即日二白龍降於祠下於是雨遍千里又曰石勒時天旱沙門佛圖澄於石井崗掘得死龍長尺餘漬之}
  - {type: page-break, offset: 9, content: '', id: KR3k0012_WYG_930-1b, image: WYG0901/WYG0901-0270d.png}
  - {type: variant, offset: 11, length: 2, content: 太尉, WYG: 水良久乃蘇呪而祭之龍騰空而上天}
  - {type: variant, offset: 14, length: 0, content: '', WYG: 雨降因名龍崗又曰交州丹淵有神龍每旱村人以崗草置淵上流魚則多死龍怒即時大雨豫章記曰吳猛坐郭璞事被收寄載往南令舡勾開户船主聞船下有聲如在樹杪試窺之有二龍負船一宿至宫亭湖還豫章三秦記曰河津一名龍門巨靈跡猶存去長安九百里水懸船而行旁有山水陸不通龜魚之屬莫能上江海大魚集門下數千不得上上即為龍故云􅜣鰓龍門垂耳河津又曰龍首山長六十里頭入於渭尾達樊川頭高二十丈尾漸下髙五六尺土赤不毛云昔有黒龍從山南出飲渭其行道因成王山故以名也西河記曰張駿立謙光殿成後池水中有五龍晝日見移時乃滅水通變紅色駿即為銅龍以厭之駿卒不御此殿廣雅曰有鱗曰蛟龍有翼曰應龍有角曰虬龍無角曰螭龍方言曰龍未升天曰蟠龍齊諧記曰蛟龍畏棟樹葉五色絲漢武帝内傳曰王母乗紫雲之輦又駕九色之斑龍葛洪神仙傳曰費長房與壺公俱去后壺公謝而遣之長房憂不能到家公與所用竹杖騎之忽然而睡已到家擲所騎竹杖葛陂中顧之乃青龍也管輅别傳曰龍者陽精以潛於隂幽靈上通和氣感神二物相扶故能興楚國先賢傳宋玉對楚王曰神龍朝發崑崙之墟暮宿於孟諸超騰雲漢之表婉轉四瀆之裏夫尺澤之鯤豈能料江海之大哉王子年拾遺録曰方丈山一名蠻雉山東有龍場方千里有龍皮骨如山阜膏血如流水燕昭王時以龍膏為燈光清澄若水光熖五色人以為瑞沈懐逺南越志曰蟠龍身長四丈赤黑色赤帶如錦文常隨水而下入於海有毒傷人即死人物志曰神龍不處網罟之水鳳凰不翔罻羅之鄉愽物志曰昔禹平天下㑹羣臣於㑹稽之野防風氏後至殺之夏徳之盛二龍降之禹使范成光御之以行域外既周而還至南海經防風防風之神見禹使怒而射之有迅雷風雨二龍昇去二臣恐以刃自貫其心而死禹哀之乃㧞其刃療以不死之草而皆活是為穿匈民又曰龍肉已􅊽漬之則文章異苑曰陶偘嘗捕魚得一織梭還挂于壁有頃雷雨梭變成赤龍從屋騰躍而去任昉述異記曰漢和帝元年大雨有一青龍墮於宫中帝命烹之賜羣臣龍羮各一杯故李尤七命曰味兼龍羮楊衒之洛陽伽藍記曰西方烏埸國西有池龍王居之池邊有一寺五十餘僧龍王每作神變國王祈請以金玉珍寳投之池中後皆涌出令僧取之此寺衣食恃龍而濟世人名曰龍王寺又曰西方不可依山甚寒冬夏積雪山中有池毒龍居之昔五百商人止宿池側值龍忿怒汎殺商人槃陀王聞之捨}
