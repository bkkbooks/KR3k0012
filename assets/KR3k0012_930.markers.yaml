  - {type: variant, offset: 2607, length: 1, content: 莊, SBCK: 吕氏春秋曰前有佽飛者得寳劒於干將遂還及渉江至於中流有兩蛟夾繞其舩佽飛仗寳劒曰此中腐骨朽􅁏也赴江刺蛟殺之荆王聞之仕以執珪馬明生別傳曰明生捕賊爲賊所傷道間見神女以肘後管中一丸藥與服即愈隨女入岱宗山石室金床玉几安期生從六七仙人見神女稱下官請陽九百六之數神女曰自頃四海水減溟湖成山連城之鯨萬丈之蛟不逹斯運之度唯叩天索水辭訟紛紜有於上府三反煩於省察司隂亦疲於謹案矣西京雜記曰瓠}
  - {type: page-break, offset: 2607, content: '', id: KR3k0012_SBCK_930-4b}
