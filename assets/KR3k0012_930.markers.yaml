  - {type: variant, offset: 1467, length: 212, content: 俱泛海忽值大風驚懼俯視舩下見有二白龍挾舩既而至一山峰崿聳秀林樹繁密意甚悅之宋書曰徐羨之嘗從兄履之為臨海樂安縣嘗行經山中見黑龍長丈餘頭有角前兩足皆具無後足曳尾而行後文帝立羨之竟以凶終又曰傅亮率行臺迎宜都王王舟輿發自江陵中流有黑龍躍出負王舟左右失色王顧長史王曇首曰此大禹所以受天命吾何德以堪之齊書曰建武中荊大風雨龍入柏齋中柱壁上有爪足處刺史蕭遙欣恐畏不敢居也又曰初武帝夢金翅鳥下殿庭搏食小龍無數乃飛上天明帝初宗室多遇害其夢竟驗梁, SBCK: 漢}
