  - {type: variant, offset: 1997, length: 494, content: 行人設祭乃得過不祭多遇風雪又曰正元元年有黑龍如狗南走宣陽門躍穿門樓下而出此魏衰之徵也後周書曰大象中榮州有黑龍見與赤龍鬭於汴水之側黑龍死隋書曰源師初在齊遷在外兵郎中又攝祠部屬孟夏以龍見請雩時高阿郍肱為相謂真龍出大驚喜問龍所在師整容報曰此是龍星初見依禮當雩祭郊壇非謂真龍也唐書曰貞觀中汾州言青龍白龍見白龍吐物初在空中有光如火至地陷入二尺掘之則玄金也形圓斜廣尺餘高六七寸又曰先天中玄宗以旱親往龍首池祈禱有赤虵自池中而出雲霧四布應時澍雨又曰褚無量字弘度杭州鹽官人幼孤貧勵志好學家近臨平湖湖中有龍鬭傾里閭就觀之無量時年十三讀書晏然不動及長精三禮及史記又曰文宗太和二年五龍會於密州禆產山之北次第而至五方之色具焉自申及戍而沒後唐史曰莊宗時五臺僧誠惠自號降龍師帝雅重之每屈膝施敬諸王嬪御皆為之拜誠惠悉倨坐而受之初自臺山謁帝鎮州王鎔不為之禮誠惠恚怒曰吾有毒龍五百豈勞于命一龍揭片石常山其為沼乎踰年而滹川大溢敗鎮之郛或聞其言益以為神繇是帝敬之愈篤周史曰徐州豐縣民單興井中龍出民有子母三人同覩之即時皆卒龍既出澍雨漂沬城內居民濟之以栰登城以避水管子曰龍被五色而遊故神欲小則如蠶蠋欲大則函天地欲上則陵雲欲沉則伏泉又, SBCK: ''}
