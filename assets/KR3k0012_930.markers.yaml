  - {type: variant, offset: 2968, length: 322, content: 治鬼不益世用故以御馬治人為務矣又曰伯益作井而龍登玄雲神棲崑崙伯益夏禹之佐也初鑿井泄地氣以後必漉池而渙故龍登玄雲神棲崑崙一日龍在黃泉下恐害及故去之知愈多而德愈薄矣又曰夫騰虵游霧而騰龍乘雲而舉又曰虎嘯而谷風生虎陰中陽獸也與風同類龍舉而景雲屬龍陽中陰蟲也與雲同類又曰人不見龍之飛舉而能高者風雨之奉也奉助也又曰燭龍在鴈門北蔽于委羽之山不見日其神人面龍身而無足不見日故龍以目照之蓋長千里視為晝瞑為夜吹為冬呼為夏新言曰漢祖驂三龍而乘雲路振長策而驅天下三龍人傑又曰龍潛之水乘雲躍鱗虎嘯之聲因風奮烈達則振纓朝堂窮則身親南畝抱朴子曰山中辰日稱雨師者龍也又曰西域方士能神祝者臨淵禹步吹氣龍即出浮其初出乃長十數丈於是方士更吹之一吹則龍輒一縮至長數寸萬士乃掇取著壺中或, SBCK: ''}
