  - {type: variant, offset: 3653, length: 529, content: 而龍為長水之怪龍罔象夏食而冬蟄皇甫謐帝王世紀曰太昊包犧氏風姓有景龍之瑞故以龍紀官又曰黃帝采首山銅鑄鼎荊山下有龍垂胡髯而下迎黃帝群臣欲從持龍髯髯拔遂墮說文曰龍鱗蟲之長能幽能明能小能大能短能長春分而登天秋分而入淵山海經曰夏后啟乘兩龍雲蓋三層左手操翳右手操環又曰鍾山之神名曰燭龍視為晝瞑為夜身長三千里括地圖曰龍池之山四方高中央有池方七百里群龍居之多五花樹群龍食之去會稽四千里論衡曰龍少魚眾少者為神列仙傳曰騎龍鴻者於池中求得龍子狀如守宮十餘頭結草廬而守飬之龍大稍稍去後五十餘年水壞其廬一旦騎龍來語云吾馮伯昌孫也此間人不去百里當皆死信之者皆去不信者以為妖言至八月水出死者以萬計又曰陵陽子明者好釣釣得白龍子明解釣拜謝放之後數十年得白魚魚腹中有書教子明服食遂上黃山採五石脂石肺服之三年白龍來迎止陵陽山上百餘年又曰馬師皇者黃帝馬毉有龍下垂耳張口師皇針其唇飲以甘草湯而愈後一旦負之而去又曰陶安公者六安鑄冶師也數行火一旦散上紫色衝天安公伏冶下求哀須臾朱雀止冶上曰安公冶與天通七月七日迎汝以赤龍至期赤龍來安公騎之大雨東南上而去又曰呼子先者漢中關下卜師也老壽百餘年臨去呼酒家老嫗曰急裝常與汝俱夜有仙人持二茅狗來呼子先子先持一與嫗嫗得而俱騎騎乃龍也上華陰山嘗於山上大呼言子先酒母在此耳, SBCK: 卷}
