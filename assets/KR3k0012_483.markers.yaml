  - {type: variant, offset: 936, length: 222, content: 行路書生牽止之僅而得免後父壽終湯乃殺少年斷其頭以謝父墓焉師覺授孝子傳曰仲子崔者仲由之子也初子路仕衛赴蒯聵之亂衛人狐黶時守門殺子路子崔既長告孔子欲報父讎夫子曰行矣子崔即行黶知之於城西決戰其日黶持蒲弓木戟與子崔戰而死皇甫謐列女後傳曰衛義姬者其夫有先人之讎讎家來報壻避之仇家得義姬問壻所在乃積薪燎之遂不言而燒死又曰郃陽友娣者郃陽邑任延壽之妻也字季兒有三子季兒兄弟季宗與延壽爭葬父之事延壽與其友陰殺季宗季兒曰殺夫不義事兄之讎亦不義何面目以生而戴天履地乎, SBCK: ''}
