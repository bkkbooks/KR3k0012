  - {type: variant, offset: 1222, length: 392, content: 使要其女為中間父呼其女而告之計念不聽則殺父不孝聽之則殺夫不義不孝不義雖生不可以行於代欲以身當之且曰諾夜在樓上新沐頭東首臥則是矣妾請開戶而夜半仇家果至斷頭持去明視之乃其妻之頭也仇家痛以為義遂釋不殺其父越統書曰伍子胥入吳居三年闔閭將為之報讎子胥曰不可臣聞諸侯不為匹夫興師於是止其後荊將伐蔡子胥言之闔閭即使子胥救蔡而伐荊十五戰十五勝荊平王已死子胥棰笞平王之墓而數之曰昔者吾先人無罪而子殺之今以此報子也趙曄吳越春秋曰越王念吳欲復怨非一旦也冬寒則抱冰夏熱則握火愁心苦思懸膽於戶出入嘗之不絕於口乃中夜抱柱而哭哭訖復承之以嘯於是群臣聞之咸曰夫復讎謀敵非君王之憂自臣下之急務也二十一年興師滅吳檀道鸞續晉陽春秋曰王談年十許歲父為鄰人竇度所殺談陰有復讎之志年十八密買市利插刃陽若以耕耘者度常乘船出入經一橋下談伺度行還於橋上以插斬之應手而死既而歸罪有司太守孔巖義其孝勇列上宥之搜神記曰丁蘭河內野王人年十五喪, SBCK: ''}
