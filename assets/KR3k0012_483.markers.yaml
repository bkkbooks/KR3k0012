  - {type: variant, offset: 36, length: 0, content: '', WYG: 后泣請得歸國入宿衛比韓嫣太后比銜嫣嫣時出入永巷不禁以奸聞皇太后怒使使賜嫣死上為謝終不得嫣遂死東觀漢記曰更始韓夫人尤嗜酒每侍飲見常侍奏事輙怒曰帝方對我飲正用此時持事來乎起抵破書案又曰龎萌為平狄將軍與盖延共擊董憲詔書獨下延而不及萌萌以為延譖已自疑遂反上聞之大怒乃自將兵討萌與諸將書曰吾常以龎萌為社稷臣將軍得無笑其言乎又曰鄧晨南陽人與上起兵新野吏乃燒晨先祖祠堂汚池室宅焚其冢墓宗族皆怒曰家自富足何故隨婦家入湯鑊中晨終無恨色又曰有詔㑹議靈臺所上謂桓譚曰天下事吾欲䜟決之何如譚黙然良久曰臣不讀䜟上問其故譚復極言䜟之非經上大怒曰桓譚非聖無法將下斬之譚叩頭流血良久得觧出為六安郡丞又曰戴憑為侍中數進見問得失上謂憑曰侍中當輔國政勿有𨼆情憑曰太尉西曹掾蔣遵清亮忠孝學通古今陛下納膚受之譖遂致禁錮世以是為嚴上怒曰汝南}
