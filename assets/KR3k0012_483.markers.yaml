  - {type: variant, offset: 57, length: 2, content: 黑卵, SBCK: 公子無忌無忌不行使朱亥奉璧一􅀟􅁗王大怒將朱亥著虎圏中亥瞋目視虎眥裂血出濺虎虎不敢動怨尚書曰商王受自絶于天結怨于民崇信姧回放黜師保又曰怨豈在明不見是圗毛詩曰亂丗之音怨}
  - {type: variant, offset: 57, length: 2, content: 黑卵, WYG: 公子無忌無忌不行使朱亥奉璧一雙秦王大怒將朱亥著虎圈中亥瞋目視虎皆裂血出濺虎虎不敢動怨尚書曰商王受自絶于天結怨于民崇信奸回放黜師保又曰怨豈在明不見是圗毛詩曰亂世之音怨而怒其政乖又曰角弓父兄刺幽王也不親九族而好讒佞骨肉相怨故作是詩又曰民之無良相怨一方左傳曰宋華元將與楚戰殺羊食士其御羊斟不與及戰曰疇昔之羊子為政今日之事我為政輿入鄭師故敗君子謂羊斟非人也}
