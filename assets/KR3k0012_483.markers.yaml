  - {type: variant, offset: 68, length: 0, content: '', SBCK: 爲政今日之事我爲政與入鄭師故敗君子謂羊斟非人也以其私怨敗國殄民又曰晉侯賞從亡者介之推不言禄禄亦弗及其母曰盍亦求之以死誰懟對曰尤而効之罪又甚焉且出怨言不食其食又曰季郈之雞􅋐季平子郈昭伯季氏芥其雞郈氏爲之金距平子怒益室於郈且譲之故郈昭伯怨平子又曰晉郗至獻楚捷于周與單襄公語驟稱其伐單子語諸大夫曰温季其亡乎位於七人之下而求掩其上怨之所聚亂之本也多怨而階亂何以在位又曰呉公子札}
