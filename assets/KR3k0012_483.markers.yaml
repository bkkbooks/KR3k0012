  - {type: variant, offset: 37, length: 0, content: '', WYG: 復欲黨乎憑出自繫廷尉詔引見憑謝曰臣無謇諤之節而有狂瞽之言上即勑尚書觧遵禁錮又曰韓歆字翁君南陽人以從征伐有功封扶陽侯好直言}
