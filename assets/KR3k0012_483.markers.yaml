  - {type: variant, offset: 35, length: 0, content: '', krp: 夫人請之吾舎之矣先軫怒曰武夫力而拘諸原婦人暫而免諸國隳軍實而長宼讎亡無日矣不顧而唾公使陽處父追之及諸河則在舟中矣又曰楚子使申舟聘于齊曰無假道於宋及宋華元曰過我而不假道鄙我也鄙我亡也殺其使者必伐我伐我必亡亡一也乃殺之楚子聞之投𬒮而起屨及於窒皇劒及於寢門之外車及於蒲胥之市秋九月楚子圍宋又曰衆怒不可犯又曰衛獻公戒孫文子寗惠子食皆服而朝日肝不召而射鴻於囿二子從之不釋皮冠而與之言二子怒而逐獻公又曰邾莊公與夷射姑飲酒私岀閽乞肉焉奪之杖以敲之公在門臺臨庭閽以缾水沃庭邾子望見之怒閽曰夷射姑旋焉旋小便也命執之弗得滋怒自投于牀論語曰哀公問弟子孰爲好學孔子對曰有顔囬者好學不遷怒不貳過不幸短命死矣今也則亡國語曰晉郄獻子如齊聘齊傾公使婦人觀而笑之獻子怒歸請伐齊范武子退自朝曰郄子之怒甚矣不逞於齊必發諸晉國逞觧不得政何以逞怒余將致政焉以成其怒也史記曰孟甞君客于趙平原君趙人聞孟嘗賢出觀皆笑曰始以薛公爲魁梧也今視之乃眇小丈夫耳孟甞聞之怒客與俱者下斫撃數百人遂滅一縣以去又曰韓信使人言漢王曰齊反覆之國南邊呉楚不爲假王鎮之其勢不定漢王大怒罵曰吾困於此旦暮望若佐我張良陳平躡漢王足因附耳曰漢方不利寕能禁信乎不如因而立之漢王復罵曰大丈夫定諸侯即爲真王何以假爲又曰趙使藺相如賚璧西入秦秦王坐章臺見相如相如奉璧秦王大喜傳璧以示美人及左右左右皆呼萬歳相如視秦王無意償趙城乃前曰璧有瑕請指示王王授璧相如因持璧却立倚柱怒髪衝冠謂秦王曰趙王齋戒五日使臣奉璧拜送於庭何者嚴大國之威以脩好也今臣至大王見臣列觀禮節甚倨得璧傳之以示美人以戯弄臣臣觀大王無償城意故臣復取璧大王必撃臣臣頭今與璧俱碎於柱矣持璧睨柱秦王恐其破乃辭謝固請又曰鄒陽上書於梁王曰蘇秦相燕燕人惡之於王王按劒而怒食以駃騠漢書音義曰駃騠馬也生七日而超其母漢書曰項羽令壯士出挑戰漢有善騎射曰樓煩應劭曰樓煩胡也今有樓煩縣楚戰三合樓煩輙射殺之羽大怒自𬒳甲持㦸挑戰樓煩欲射羽羽瞋目叱之樓煩目不能視手不能發走還璧中不敢復岀又曰沛公從百餘騎見項羽於鴻門沛公起如厠招樊噲出獨騎噲與靳強滕公紀成晉灼曰紀通父歩從間道赴軍使良留謝羽羽問沛公安在良曰聞將軍有意督過之脫身去至軍矣故使臣獻璧羽受又獻玉斗於范増范増怒撞其斗起曰吾属今爲沛公虜矣又曰黥布反上自征望布軍置陣如項籍軍上惡之與布相見謂布何苦而反曰欲爲帝耳怒罵之遂戰破布軍又曰文帝曰吾獨不得廉頗李牧爲將豈憂匈奴哉馮唐曰陛下雖得廉頗李牧不能用也上怒起入禁中又曰上獵上林中車駕未行先使韓嫣乗副車從數百騎馳視獸江都王望見以爲天子辟從者伏謁道旁嫣驅而不見旣過江都王怒爲皇}
  - {type: variant, offset: 36, length: 0, content: '', SBCK: 后泣請得歸國入􅀫衛比韓嫣太后比銜嫣嫣侍出入永巷不禁以姧聞皇太后怒使使賜嫣死上爲謝終不得嫣遂死東觀漢記曰更始韓夫人尤􅄝酒毎侍飲見常侍奏事輙怒曰帝方對我用此時事來􅁘起手抵破書案又曰龐萌爲平狄將軍與盖延共擊董憲昭詔書獨下延而不及萌萌以爲延譛巳自疑遂反上聞之大怒乃自將兵討萌與諸將書曰吾常以龐萌爲社稷臣將軍得無􅀏其言乎又曰鄧晨南陽人與上起兵新野吏乃燒晨先祖祠堂汚池室宅焚其􅃁墓宗族皆怒曰家自冨足何故隨婦家入湯鑊中晨終無恨色又曰有詔㑹議靈臺所上謂桓譚曰天下事吾欲䜟决之何如譚黙然良乆曰臣不讀䜟上問其故譚復極言䜟之非經上大怒曰桓譚非聖無法將下斬之譚叩頭流血良乆得解出爲六安郡丞又曰戴慿爲侍中數進見門得失上謂慿曰侍中當輔國政勿有隱情慿曰太尉西曹􅁺蔣遵清亮忠孝學通古今陛下納膚受之譛遂禁錮丗以是爲嚴上怒曰}
