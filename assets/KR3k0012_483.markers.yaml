  - {type: variant, offset: 3402, length: 208, content: 伺季重等酣醼密刃剌季仲而死并亦見害季重臨死歎曰吾不料審言有此孝子邪若訥誤我至此審言由是免官歸東都自為祭文以祭并士友咸哀并孝烈蘇頲為墓誌劉充濟為祭文則天召見審言甚嘉歎之又曰衢州人余長安父與叔共二人為同郡衣金所殺長安八歲自誓十七乃復讎大理斷死刺史元錫奏言臣見余氏一家橫遭死者實二平人蒙顯戮者乃一孝子引公羊傳父不受誅子復讎之義請下百僚集議時裴垍當國李鄘為有司事竟不行老儒薛伯皋與錫書曰大司寇是俗吏執人柄老小生余氏子宜其死矣, SBCK: ''}
