  - {type: variant, offset: 53, length: 0, content: '', SBCK: 愔後果哀悼成疾門生依旨呈之則悉與温徃反宻計愔於是大怒曰小子死恨晚矣又曰周訪爲荆州王敦以訪名將勲業隆重有疑色其從事中郎郭舒􅀃敦曰荆州雖遇宼難荒􅁦實爲用武之國􅀂以假人將有尾大之患公冝自領以爲梁州足矣敦從之訪大怒敦手書譬釋并遺玉環玉椀以申厚意訪投椀於地曰吾豈賈竪可以寳恱乎又曰陶侃甞出遊見人持一把未熟稻問用此何爲人云行道所見聊取之耳侃大怒曰汝旣不佃而戯賊人稻執而鞭之齊書曰􅀽􅂏性剛甞以微言忤丗祖又與王晏不恊丗祖在便殿用金柄刀子治爪晏在側曰外聞有金刀之言恐不冝用此物丗祖愕然窮問所以晏曰􅀽􅂏爲臣􅀃之上銜怒良乆􅂏到郡坐逆用禄錢免官崔鴻後趙録曰冉閔爲慕容恪所擒慕容雋立問閔曰汝奴僕下才何自妄稱天子閔曰尔曹人靣獸心欲􅆲逆我一時英雄何爲不作帝王耶雋怒鞭之三百後魏書曰李彪之入京也􅀌微寡援而自立不群以李沖好士傾心宗附冲亦重其噐學禮而納焉毎言之髙祖公􅀻共相援益及彪爲中尉兼尚書爲髙祖知待便謂非復籍冲而更相輕背唯公歛􅃑而巳冲時震怒數責彪前􅄽瞋目大呼投折几案詈辱肆口冲素温柔而一旦暴急遂發病荒悸言語亂錯猶扼腕叫詈稱李彪小人然醫藥所不能療或謂肝藏傷裂旬有餘日而卒}
  - {type: page-break, offset: 53, content: '', id: KR3k0012_SBCK_483-6b}
  - {type: page-break, offset: 53, content: '', id: KR3k0012_SBCK_483-7a}
  - {type: variant, offset: 53, length: 0, content: '', WYG: 愔後果哀悼成疾門生依言呈之則悉與温往反密計愔於是大怒曰小子死恨晚矣又曰周訪為荆州王敦以訪名將勲業隆重有疑色其從事中郎郭舒說敦曰荆州雖冦難荒弊實為用武之國若以假大將有尾大之患公宜自領以為梁州足矣敦從之訪大怒敦手書譬釋并遺玉環玉椀以申厚意訪投椀於地曰吾豈賈豎可以寳恱乎又曰陶侃嘗出遊見人持一把未熟稻問用此何為人云行道所見聊取之耳侃大怒曰汝既不佃而戯賊人稻執而鞭之齊書曰袁彖性剛嘗以㣲言忤世祖又與王晏不恊世祖在便殿用金柄刀子治𤓰晏在側曰外間有金刀之言恐不宜用此物世祖愕然窮問所以晏曰袁彖為臣說之上銜怒良久彖到郡坐匿用禄錢免官崔鴻後趙録曰冉閔為慕容恪所擒慕容儁立問閔曰汝奴僕下才何自妄稱天子閔曰爾曹人面獸心欲簒逆我一時英雄何為不作帝王耶儁怒鞭之三百後魏書曰李彪之入京也孤微寡援而自立不羣以李冲好士傾心宗附冲亦重其器學禮而納焉每言之髙祖公私共相援益及彪為中尉兼尚書為髙祖知待便謂非復籍冲而更相輕背惟公坐斂袵而已冲時震怒數責彪愆背瞋目大呼投斫几案詈辱肆口冲素温柔而一旦暴急遂發病荒悸言語亂錯猶扼腕呌詈稱李彪小人為醫藥所不能療或謂肝臟傷裂旬有餘日而卒}
