  - {type: variant, offset: 56, length: 0, content: '', SBCK: 宋有蘭子能以伎干宋元君􅀟杖屬其腦弄七劒而躡之元君立賜金帛又有蘭子能䴏戯聞之復以干元君元君大怒曰昔有異􅇊􅃴值寡人有忻心故賜金帛彼必聞此復望吾賜拘而戮之莊子曰孔子徃見盗跖下車而前謁者通之盗跖聞之忿怒目如明星髪上指冠孔子趍而進避席反走再拜盗跖大怒而展其足按劒嗔目其聲如吼虎韓子曰孟孫獵得麑使􅁗巴持之其母隨而呼􅁗巴不忍而與其母孟孫適至求麑不得大怒逐之居三月復召使爲子􅀓燕丹子曰田光荅太子曰􅀼觀太子客皆無可用者夏扶血勇之人怒而面赤宋意脉勇之人怒而色青武陽骨勇之人怒而色白荆軻神勇之人怒而色不變呉越春秋曰呉王伐齊請公孫聖告之聖諌願大王勿伐齊王大怒曰吾天之所生神之所助使力士石畨撃以鐵槌身絶爲五呉越春秋曰子胥諌呉王王怒賜以钃鏤之劒盛以鴟夷之噐投之于江􅀃􅁐曰􅁗王以五十里封􅋣陵君􅋣陵君辭不受使唐且謝􅁗王􅁗王怒曰甞見天子之怒乎一怒伏尸百萬流血千里唐且曰大王甞聞布衣韋帶之士怒乎伏尸二人流血五歩即按其匕首起視􅁗王曰今將是矣王變色長跪曰先生就坐寡人諭矣列士傳曰􅁗召}
