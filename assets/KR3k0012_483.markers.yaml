  - {type: variant, offset: 56, length: 0, content: '', WYG: 宋有蘭子能以伎干宋元君雙杖屬其腦弄七劒而躡之元君立賜金帛又有蘭子能鷰戯聞之復以干元君元君大怒曰昔有異伎適值寡人有忻心故賜金帛彼必聞此復望吾賜拘而戮之莊子曰孔子往見盜跖下車而前謁者通之盜跖聞之忿怒目如明星髪上指冠孔子趨而進避席反走再拜盜跖大怒而展其足按劒瞋目其聲如豺虎韓子曰孟孫獵得麑使秦巴持之其母隨而呼秦巴不忍而與其母孟孫適至求麑不得大怒逐之居三月復召使為子傅燕丹子曰田光答太子曰竊觀太子客皆無可用者夏扶血勇之人怒而靣赤宋意脉勇之人怒而色青武陽骨勇之人怒而色白荆軻神勇之人怒而色不變呉越春秋曰呉王伐齊請公孫聖告之聖諌願大王勿伐齊王大怒曰吾天之所生神之所助使力士石畨擊以鐵槌身絶為五呉越春秋曰子胥諌吳王王怒賜以屬鏤之劒盛以鴟夷之器投之于江說苑曰秦王以五十里封鄢陵君鄢陵君辭不受使唐且謝秦王秦王怒曰嘗見天子之怒乎一怒伏尸百萬流血千里唐且曰大王嘗聞布衣韋帶之士怒乎伏尸二人流血五歩即按其匕首視秦王曰今將是矣王變色長跪曰先生就坐寡人諭矣列士傳曰秦召}
