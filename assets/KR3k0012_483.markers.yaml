  - {type: variant, offset: 36, length: 0, content: '', krp: 后泣請得歸國入宿衛比韓嫣太后比銜嫣嫣侍出入永巷不禁以姧聞皇太后怒使使賜嫣死上爲謝終不得嫣遂死東觀漢記曰更始韓夫人尤嗜酒毎侍飲見常侍奏事輙怒曰帝方對我用此時事來耶起手抵破書案又曰龐萌爲平狄將軍與盖延共擊董憲昭詔書獨下延而不及萌萌以爲延譛巳自疑遂反上聞之大怒乃自將兵討萌與諸將書曰吾常以龐萌爲社稷臣將軍得無笑其言乎又曰鄧晨南陽人與上起兵新野吏乃燒晨先祖祠堂汚池室宅焚其冡墓宗族皆怒曰家自冨足何故隨婦家入湯鑊中晨終無恨色又曰有詔㑹議靈臺所上謂桓譚曰天下事吾欲䜟决之何如譚黙然良乆曰臣不讀䜟上問其故譚復極言䜟之非經上大怒曰桓譚非聖無法將下斬之譚叩頭流血良乆得解出爲六安郡丞又曰戴慿爲侍中數進見門得失上謂慿曰侍中當輔國政勿有隱情慿曰太尉西曹掾蔣遵清亮忠孝學通古今陛下納膚受之譛遂禁錮丗以是爲嚴上怒曰}
  - {type: variant, offset: 37, length: 1, content: 為, SBCK: 復欲黨乎慿出自繫廷尉詔出引見慿謝曰臣無謇諤之節而有狂瞽之言上即勑尚書解遵禁錮又曰韓歆字翁君南陽人以從征伐有功封扶陽侯好直言爲司徒甞因朝㑹帝讀隗􅅝公孫述相與書歆曰亡國之君皆有才桀紂亦有才上大怒以爲激發免歸田里上猶不釋復詔就責歆及子嬰皆自殺又曰竇憲恃宫掖聲􅀔遂以賤直奪沁園公主不敢訴後肅宗駕出過園指以問憲憲隂嗚不得對發覺帝大怒召憲切責曰今貴主尚見枉奪何况小臣乎又曰杜根和熹鄧后臨朝根以安帝年長冝親政事乃上書直諌太后大怒收根嚢盛撲殺之執法者私語行事人使不加力旣而載出城外根詐死三日目中生蛆因逃竄及鄧氏誅根方歸徴拜侍御史魏志曰太祖討張魯東還時有將軍許遊擁部曲不附太祖大怒先欲討之羣臣多諌可招懷遊共討強敵太祖橫刀於􅂰作色不聽繆襲欲諌太祖逆謂之曰吾計巳定卿勿復言襲曰若殿下計是耶臣方助殿下成之􅀂殿下計非􅁘雖成冝敗之殿下逆令臣勿言何待下之不闡乎方今豺狼當路而狐狸是先人將謂殿下避強攻弱進不爲勇退不爲仁臣聞千石之弩不爲鼷䑕發機萬鈞之鍾不以筳橦起音今區區之遊何足以勞神哉太祖曰善遂厚撫遊遊即歸服又曰夏侯惇從征吕布爲流矢所中傷左目時夏侯淵與悙俱爲將軍軍中號悙爲盲夏侯悙惡之每覧照恚怒輙撲照着地又曰諸􅁑亮旣屢遣使交書於司馬宣王又致巾幗婦人之飾以怒宣王將出戰辛毗仗節勒軍吏以下乃止呉志曰吕蒙字子明少依姉夫鄧當當爲孫䇿將數討山越蒙年十五六隨當擊賊顧見呵不能禁歸告其母恚怒欲罰之蒙曰貧賊難居設有功冨貴可致且不探虎穴安得虎子母哀而舎之又曰孫權爲呉王忻宴之未自起酒虞翻伏地佯醉不持權去翻起坐權大怒手劒欲擊之侍坐者莫不惶遽唯大農劉基起抱權諌曰大王以三爵後殺善士翻雖有罪天下孰知之權曰曹孟德殺孔文舉􅀌於虞翻何有哉蜀志曰姜維爲鄧艾所摧還隂平㝷􅀍後主勑命乃投甲詣㑹於涪軍將士咸怒拔刀斫石􅀳書曰王導妻曹氏妬導憚之乃宻營别館以處衆妾曹氏知而將徃焉導恐遲之以所執麈尾柄驅牛而進司徒蔡謨聞之戯導曰朝廷欲加公九錫導弗之覺但謙退而巳謨曰不聞餘物唯有短轅犢車長柄塵尾導大怒謂人曰吾徃與群賢共遊洛邑日何曽聞有蔡克死又曰郗超實黨栢氏以}
