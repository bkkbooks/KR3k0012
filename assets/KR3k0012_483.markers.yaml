  - {type: variant, offset: 397, length: 538, content: 也又曰聶政父為韓王治劍過期不成王殺之時政未生及壯問母知之乃入山遇仙人學鼓琴漆身吞炭七年琴成入韓逢妻從買櫛對而笑妻泣曰君似政齒政曰天下人齒盡相似耳乃入山援石擊落其齒以刀內琴中剌韓王國語曰吳敗越於會稽勾踐說國人曰寡人不知其力之不足也與大國報仇以暴露百姓之骨於中原此則寡人之罪也親為夫差洗馬而歸乃致其眾而誓之寡人聞古之賢君不患其眾之不足也而患其志行之少恥今夫差衣水犀之甲者億有三千人水犀如牛其甲有朱鑿以為甲士不患其志行之少恥而患其眾之不足也韓詩外傳曰魏文侯問解狐曰寡人將定西河之守誰可用對曰荊伯柳賢人殆可文侯曰是非子之讎也對曰君問可非問讎也於是將以伯枊為西河守伯柳見解狐而謝之解狐曰言子者公也怨子者私也虞溥江表傳曰孫策殺許貢貢客為貢報讎射策中頰陸胤廣州先賢傳曰尹牙字猛德太守南陽寵下車牙以德進幹任喉舌寵雖當國厚祿而懷愧戚見於顏色牙常用怪焉曰伏見明府四節悲歎有慘瘁之思何也寵謂牙曰父為豪周張所害重仇未報並與戴天非孝子雖官尊祿重而塵恥未判是以長愧而無恥也聞好馬牙與校圉交通遂充騶馬之職乃先醉張近侍以夜解縱諸馬令之亂駭知張必將驚起伏側階下張果出問其故牙因手刃張首而還孝子傳曰魏湯少失其母獨與父居邑飬蒸蒸盡於孝道父有所服刀戟市南少年欲得之湯曰此孝父所愛不敢相許於是少年歐檛湯父湯叩頭拜謝之不, SBCK: 復}
