  - {type: variant, offset: 1967, length: 1433, content: 寸雄姿魁桀羗虜憚之號曰項羽性俶儻不群慷慨謂群下曰大丈夫生不在中國當高皇光武之代與韓彭吳鄧並驅中原定天下決雌雄使名垂竹帛而潛竄窮山隔閉殊俗不聞聖教於上宗不得策名於天府生與麋鹿同群死作氈裘之鬼雖偷觀日月獨不愧於心乎負其智勇猜忍不恤下為帛城羗酋姜聰所剌殺長子業年十歲常縛草人號曰姜聰哭而射之大號而泣不中瞋目大呼要中乃止其母謂之曰姜聰諸將已屠膾之矣汝何如此業泣曰誠知射草人無益於先公所以申罔極之心耳陳留志曰韓卓父嘗為吏所辱卓執兵伏道欲候殺之而長子暴病將死卓乃歎曰道家有信報讎不欲過今長子病豈為是乎於是乃投刃援杖復恥而止常璩華陽國志曰陳網字仲卿少與同郡張宗受學南陽以母喪歸宗為安眾至元所殺網終喪往復之自拘有司會赦免應劭風俗通曰汝南陳公思為五官掾王子祐為兵曹行會食下亭子祐曾以縣官事考殺公思叔父斌斌無子父思欲為報仇不能得卒見子祐不勝憤怒便格殺之還府歸死時大守太傅胡廣以為公思追念叔父仁勇憤發手刃仇敵自歸司敗便原遣之梁祚魏國統曰崔周平者漢太尉烈之孫也兄曰元平為議郎以忠直稱董卓之亂烈為卓所害元平常思有報復之心會病卒魏文帝雜詔曰喪亂以來兵革從橫天下之人多相殺害昔賈復寇恂私相怨憾至懷手劍之忿光武召而和之卒共同輿而載崔鴻後燕錄曰秦滅燕慕容桓阻兵遼東為秦所殺子鳳泣血不言年十一告其母曰昔張良養士以擊秦王復君之仇也先王之事豈可一日忘之虞預會稽典錄曰朱朗字恭明父為道士淫祀不法遊在諸縣為烏傷長陳頵所殺朗陰圖報怨而未有便會頵以病亡朗乃剌殺頵子事發亡命奔魏魏聞其孝勇擢以為將又曰董黯字孝治家貧採薪供養母甚肥悅憐人家富有子不孝母甚瘦不孝子疾黯母肥嘗苦之黯不報及母終負土成墳竟殺不孝子置冢前以祭詣獄自繫會赦免廣德神異錄曰賈氏女不知何許人年十五父為宗人所害其弟強仁年幼賈氏撫育之及強仁長乃共殺讎者自列其罪高祖嘉之又曰王君操父大業中為鄉人李君則歐死貞觀初君則以運代遷革不懼憲網又以君操孤微謂無復讎之志遂仕州府操密袖白刃剌殺之刳其心肝咀食立盡詣州自陳刺史以其擅殺問之曰殺人當死律有明文何方自理以求生路君操對曰亡父被殺二十餘載聞諸典禮父讎不可同天早願圖之久而未遂常懼滅亡不展冤情今大恥既雪甘從刑憲太宗特原之又曰張琇蒲州解縣人父審素為嶲州都督在邊累載有糺其軍中贓罪勑監察御史楊汪馳傳就軍按之汪在路為審素黨與所劫對汪殺告事者脅汪令審素無罪俄曰州人翻殺審素之黨汪始得還至益州奏稱審素謀反因深按審素構成其罪斬之籍沒其家琇與兄瑝以年幼坐徙嶺外尋各逃歸累年隱匿汪後累遷殿中侍御史改名萬頃是年瑝琇候萬頃於東都城挺刀殺之瑝雖年長其發意及手刃皆琇為之既殺萬頃繫表於斧刃自言報讎之狀便逃奔就江外殺萬頃同謀搆父罪者行至汜水為捕者所獲時都城士女皆矜琇等幼稚義烈能復父讎多言其合矜恕者中書令張九齡又欲活之裴耀卿李林甫固言國法不可縱讎上以為然因謂九齡等曰復讎雖禮法所許殺人亦格律具存孝子之情義不顧命國家設法焉得容斯殺人成復讎之志赦之虧格律之條然道路諠議故須告示乃下勑曰張琇等兄弟同殺推問疑承律有正條須合至死近聞士庶頗有諠詞矜其為父報讎或言本罪冤濫但國家設法事存經久蓋以濟人期於止殺各申為子之志誰非徇孝之夫展轉相讎殺傷何限咎陶作士法在必行曾參殺人亦不可恕不能加以刑戮肆諸市朝宜付河南府決殺瑝琇既死士庶咸傷憫之為作哀誅牓於衢路中市人歛錢於死所造義井並葬瑝琇於北邙又恐萬頃家人發之并作疑冢數所其為時人所傷如此唐新語曰杜并父審言善五言尤攻書翰恃才蹇傲深為時輩所嫉自洛陽丞貶吉州司戶又與群寮不叶司馬周季重與司戶郭若訥共構之審言繫獄將因事殺之并年, SBCK: ''}
