  - {type: variant, offset: 13, length: 8, content: 六韜云武王伐殷乘, SBCK: 孫閼與頴考叔争車頴考叔挾輈以走輈車轅也子都拔􅁄以逐之子都公孫閼也及大逵弗及子都怒又曰齊侯遊于姑焚遂田于貝丘姑焚具丘皆齊地也見大豕從者曰公子彭生也怒曰彭生敢見射之豕人立而啼公懼墜于車傷足䘮屨又曰齊侯蔡􅁎乗}
  - {type: variant, offset: 13, length: 8, content: 六韜云武王伐殷乘, WYG: 孫閼與頴考叔争車頴考叔挾輈以走輈車轅也子都抜棘以逐之子都公孫閼也及大逵弗及子都怒又曰齊侯遊于姑棼遂田于貝丘姑棼貝丘皆齊地也見大豕從者曰公子彭生也怒曰彭生敢見射之豕人立而啼公懼墜于車傷足喪屨又曰齊侯與蔡姬乗}
