  - {type: variant, offset: 572, length: 690, content: 故云常有好婦來美麗非凡問者曰必是鬼物不可不殺之婦人後往不即前止戶外繇問何以曰公有相殺意繇曰無此勤勤呼之乃入繇有不忍心然猶斬之傷胛婦人即出以新綿拭血竟路明日使人尋跡至一大塜木中有好婦人形體如生人著白練丹兩繡當傷一腳以兩當中綿拭血酈善長水經注曰房子城西出白土細滑如膏可用濯綿霜鮮雪曜異於常綿世俗言房子之纊也抑亦類蜀郡之錦得江津矣故歲貢其綿以充御府絮史記曰人有上書告周勃反下廷尉薄太后以為無反事文帝朝太后以冒絮提文帝曰絳侯綰皇帝璽將兵北軍此時不反今居一小縣顧欲反也帝乃出之又貨殖傳曰絮千乘家漢書曰帝以公主為老上單于閼氏使官者燕人中行說傅公主說既至因降單于單于愛幸之其得漢之繒絮以馳草棘中衣袴皆裂弊以示不如旃裘堅善也司馬彪續漢書曰光武建武二年野蠶成繭民收其絮東觀漢記曰建初二年詔齊相其止勿復送冰紈方空縠吹綸絮也漢舊儀曰皇后親蠶還獻繭凡蠶絲絮織室作祭服其皇帝得以作縷縫衣皇后間以作巾絮而已魏志曰曹公定鄴臨祠袁紹墓哭之流涕慰勞紹妻還其家人寶物賜雜繒絮廩食之吳書曰顧悌字子通父亡孫權作布衣一襲皆擘絮著之強令悌釋服晉中興書曰王敦害周顗籍其家政見素簏數枚中有故絮也晉書曰佛圖澄腹傍有一孔常以絮塞之每夜讀書則披絮孔中出光照于一室宋書曰顏竣丁父憂起為丹陽尹遣中書舍人戴明寶抱竣登車載之郡舍賜以布衣一襲絮以綵綸遣主衣就衣諸體又曰阮長之元嘉十一年除臨海太守在官常擁敗絮齊書曰江革補國子生王融謝朓嘗行還過候革時大寒雪見革弊絮單席而躭學不倦唴歎久之又曰卞彬蚤虱賦序曰余之多病起居甚踈縈寢敗絮不能自釋莊子曰宋人有善為不龜手之藥者世世以洴澼絖為事客聞之請買其方百金聚族而謀曰我世世洴澼絖不過數金今一朝鬻伎百金請與之, SBCK: 機}
