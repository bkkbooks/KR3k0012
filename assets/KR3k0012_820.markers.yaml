  - {type: variant, offset: 1829, length: 1242, content: 禮記檀弓上曰有子蓋既祥而絲屨組纓禮記玉藻曰玄冠朱組纓天子之冠也玄冠丹組纓諸侯之冠也又曰弟子縞帶并細約用組又曰天子佩白玉而玄組綬公侯佩山玄玉而朱組綬大夫佩水蒼玉而緇組綬世子佩璆玉而綦組綬士佩瓀珉而縕組綬孔子佩象環五寸而綦綬又少儀曰國家靡弊則車不雕幾甲不組縢幾附纏為沂鄂也組滕以飾左傳襄三年楚子重伐吳為簡之師克鳩茲至于衡山使鄧廖帥組甲三百被練三千史記曰秦王子嬰係頸以組降沛公軹道旁漢書曰錦繡纂組害女工穆天子傳曰天子見西王母好獻錦組百純又曰盛姬之喪叔㛗贈用茵組茵褥也叔姓穆王女墨子曰昔楚莊王鮮冠組纓絳衣愽袞以治其國韓子曰吳起示其妻以組曰子為我織組令如是組妻織組果善吳起曰非戒也使之衣而歸妻兄請之起曰起家無虛言呂氏春秋曰邾之為甲常以帛公息忌謂邾君曰凡甲所以為固者以滿竅也今竅滿矣而任力者半組則不然竅滿則盡任力矣邾君以為然曰將何所得組公息忌對曰上用之則民為之矣邾君曰善下令令官為甲必以組公息忌知說之行也令其家皆為組人有傷之者曰公息忌之所以欲用組者其家多為組也邾君不悅於是乎止官無以組邾君有所尤也為甲以組而便公息忌雖多為組何損以組不便公息忌雖無為組亦何益為組與不為組不足以累公息忌之說用組之心不可不察劉梁七舉曰華組之組從風紛絃應璩報燕中尉樊彥皇書曰登輿北踐燕路方當化銀龜以為黃變青組以為紫又報平陸長賁瑋伯書曰從此辭矣何敢復飛蟬於惠文鳴玉於緺組哉納魏武令曰吾衣皆十歲也歲歲解浣補納之耳魏志曰太祖幃帳壞即補納汲太子妻李氏與夫書曰并緻納一端宋書曰徐逵之尚會稽長公主初武帝微時貧過甚常自新洲伐荻有納布衣襖等皆是敬皇后手自作武帝既貴以此衣付主曰後世若有驕奢不節者可以此衣示之主子湛之為大將軍彭城王義康所愛與劉湛之等頗相附及劉湛之得罪事連主子文帝大怒將致大辟湛之憂懼無計以告公主公主即日入宮及見文帝因號哭下床不復施臣妾之禮以錦囊盛武帝納衣擲地以示上曰汝家本貧賤此是我母為汝父作此納衣今日有一頓飽食便欲殘害我兒子上亦號哭湛之由此得全南史曰齊張欣泰為直閣步兵校尉領羽林監欣泰通涉雅俗交結多是名素下直輒著鹿皮冠納衣錫杖挾素琴有以啟武帝帝曰將家兒何作此舉止又曰沙門寶志在建康寶亮欲以納被遺之未及有言寶志忽來牽被而去陳書曰大軍侵魏造陝城魏兵大合輕騎挑戰侯安都瞋目橫矛單騎突陣四向奮擊左右皆披靡殺傷不可勝數於是眾並鼓噪俱前魏多縱突騎眾軍患之安都怒甚乃脫兜鍪解所帶鎧唯著絳衲兩襠衫馬亦去具裝馳入賊陣猛氣咆勃所向無當其鋒者莫不應刃而倒綸釋名曰綸倫也作之有倫理也說文曰綸紏青絲綬也禮記曰王言如絲其出如綸王言如綸其出如綍後漢書仲長統書曰井田之變豪人貨殖館舍布於州郡田畝連於方國身無半通青綸之命而切三辰龍章之服續漢書輿服志曰百石青紺綸一采宛轉繆織長丈二尺東觀漢記曰建初二年詔齊相其上勿復送吹綸絮鄭玄注禮記曰綸今有秩嗇夫所佩也鄴中記曰石虎皇后出女騎一千冬月皆著紫綸巾齊書曰徐龍駒常住含章殿著黃綸帽被貂裘南面向案代帝書勑世說曰謝萬詣簡文無衣幘可前簡文曰但前不須衣幘即呼使入萬著白綸布而前既見共談移日孟達與諸葛亮書曰貢白綸帽一以示微意縞, WYG: 紵}
