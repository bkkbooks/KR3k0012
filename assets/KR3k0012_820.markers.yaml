  - {type: variant, offset: 1481, length: 0, content: '', WYG: 周穆王大征西戎西戎獻崑吾劔火浣布其劒長尺有咫錬鋼赤刃用之切玉如泥焉其布浣之必投火中布則火色出而振之皜然疑乎雪也抱朴子曰海中蕭丘常有自生火常以夏起而秋㓕丘方十里當火起滿洲洲上純生}
  - {type: variant, offset: 1482, length: 2, content: 日案, WYG: 種木正著此木雖為火所焚而不麋但小燋黑人或得為薪者火之俱如常薪但不成灰炊熟則以水灌㓕之后復更用如此不窮夷人取此木華績以為布其木皮亦剥以灰煑治以為布但麤不及華俱可以火浣又有白䑕毛長三寸許亦居此洲上空水中入火中不燒灼也其毛又可績以為布故火浣有三種薄子曰長老說漢桓帝時大將軍梁冀作火浣布单衣㑹賔客}
