  - {type: variant, offset: 1471, length: 3, content: 通微心, WYG: 報之流黄素楊雄蜀都賦曰細絺弱折綿繭成袵筒中黄潤一端數金魏武遺令曰銅雀臺上安六尺牀施繐帳月旦十五日向帳作妓女等時時登銅雀臺望吾西陵墓田曹植表曰欲遣人到鄴市上黨布五十疋作車上小帳帷謁者不聽}
  - {type: page-break, offset: 1471, content: '', id: KR3k0012_WYG_820-12b, image: WYG0900/WYG0900-0267d.png}
  - {type: variant, offset: 1471, length: 1, content: 通, krp: 報之流黄素楊雄蜀都賦曰細絺弱折緜繭成衽筩中黄潤一端數金魏武遺令曰銅雀臺上安六尺牀施繐帳月旦十五日向帳作妓汝等時時登銅雀臺望吾西陵墓田曹植表曰欲遣人到鄴市上黨布五十疋作車上小帳帷謁者不聽陸機弔魏武文曰悼繐帳之冥漠怨西陵之芒芒火浣布魏志曰青龍三年西域重譯獻火浣布詔大將軍太尉臨試以示百僚呉録曰日南比景縣有火䑕取毛爲布燒之而精名火浣布崔鴻十六國春秋前秦録曰天笁國獻火浣布南史曰南海諸簿國東千餘里至自然火洲其上有樹生火中洲左近人剥取其皮紡績作布以爲手巾與蕉麻無異而色}
  - {type: variant, offset: 1473, length: 3, content: 心陸雲, SBCK: 青黒􅀂小垢洿則投火中復更精潔或作燈炷用之不知盡列子曰周穆王大征西戎西戎獻崑吾劒火浣布其劒長尺有咫錬銅赤刃用之切玉如泥焉其布浣之必投火中布則火色出而振之皜然疑乎雪也抱朴子曰海中肅丘有自生火常以春起而秋滅丘方十里當火起滿洲洲上純生一種木正暑此木雖爲火所焚而不䴢但小燋黒人或得爲薪者火之俱如常薪但不成􅁅炊熟則以水灌㓕之後復更用如此不窮夷人取此木華績以爲布其木皮赤剥以􅁅煑治以爲布但麤不及華俱可以火浣又有白䑕毛長三寸許亦居此洲上空木中入火中不燒灼也其毛又可績以爲布故火浣有三種傳子曰長老􅀃漢桓帝時大將軍梁兾作火浣布單衣㑹賔客行酒公卿朝臣前佯爭酒失杯而汙之僞怒解衣而燒之布得火煒燁赫然而熾如燒凡布垢盡火滅粲然㓗白如氷澣之東方朔神異經曰南荒之外有火山長四十里廣五十里其中皆生不燼之木晝夜火燒得􅁀風不猛雨不滅火中有䑕重百斤毛長二尺餘細如絲可以作布􅁪居火中色洞赤時時出外而色白以水逐而沃之即死織以爲布捜神記曰崑崙之墟有炎火之山山上有鳥獸草木皆生長於炎火之中故有火浣布非此山草木之皮枲則其鳥獸之毛也漢世西域舊獻此布中間乆絶至魏􅀄時人疑其有文無實文帝以爲火性酷烈無含育之氣著之典論明其不然曰不然之事絶智者之聽及明帝立詔三公曰先帝昔著典論不朽之格言其利刋石于廟門之外及太學}
