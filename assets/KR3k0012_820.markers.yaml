  - {type: variant, offset: 1791, length: 0, content: '', SBCK: 羽山之民獻火浣布其國人稱羽山之上有文石生火煙色似隨四時而見也名爲淨火有不㓗之衣投於石火之中雖滯汙淄􅄺如新浣矣當虞舜時其國獻黃布漢末獻赤布梁兾製爲衣謂之丹衣而史家云單衣則今縫掖也字異聲同未知孰是又曰方丈山東有龍塲地方千里王}
  - {type: variant, offset: 1791, length: 3, content: 瑤几覆, WYG: 羽山之民獻火浣布其國人稱羽山之上有文石生火煙色似隨四時而見也名為凈火有不潔之衣投於石火之中雖滯汗淄湼如新浣矣當虞舜時其國獻黄布漢末獻赤布梁兾製為衣謂之丹衣而史家云單衣則今縫掖也字異聲同未知孰是又曰方丈山東有龍塲地方千里玉瑶為林或云龍常闘此處膏血如水流著物如淳漆燕昭王二年海人乘霞舟}
