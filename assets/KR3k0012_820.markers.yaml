  - {type: variant, offset: 1411, length: 3, content: 自刎愽, SBCK: 用之先賢行狀曰王烈字彦考通識逹道人皆慕之州閭成風咸競爲善時國中有盗牛者牛主得之盗者曰我邂逅迷惑從今巳後將改過子旣巳見宥幸無使王烈聞之人有以告烈者烈以布一端遺之廣州先賢傳曰丁密蒼梧廣信人也清貧爲節非家織布不衣竹林亡賢論曰王戎爲侍中南郡太守劉肇遺戎筩中布五十端戎不受而厚報其書議者以爲譏世祖患之爲發詔議者乃息越絶書曰􅁑山者勾踐種􅁑使越女織治􅁑布獻於呉玄中記曰玄菟北有山山有花人取紡績􅁑布南越志曰桂州豐水縣有古終藤俚人以爲布南州異}
