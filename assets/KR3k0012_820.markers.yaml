  - {type: variant, offset: 3190, length: 484, content: 史記曰新城三老董公說漢王以義帝死故漢王遂發喪臨三日告諸侯曰天下共立義帝北面事之今項羽攻殺大逆無道寡人親發喪諸侯皆縞素歸漢韓子曰魯人身善織屨為履之也而越人跣縞欲冠之也而越人被髮欲無窮可得乎淮南子曰鈞之縞也一端以為冠一端以為絑冠則戴之絑則履之司馬相如子虛賦曰被阿緆緰紵縞阿細繒緆細練也緆音錫緰音臾也曹洪與魏文帝書云我軍入漢中若駭鯨之決細網奔兕之觸魯縞未足以喻其易也絺綌說文曰綌粗葛也絺細葛也縐絺之細者也尚書禹貢曰海岱惟青州厥貢鹽絺周禮地官下曰掌葛掌以時徵絺綌之材于山農禮記月令曰孟夏之月天子始絺又曲禮上曰為天子削瓜者副之巾以絺副析也既削又四折乃撗斷而巾覆之為國君者華之巾以綌華中列之不回折也又曲禮下曰縝絺綌不入公門縝單也必表而出為其褻也浴用二巾上絺下綌也又檀弓縣子曰綌衰繐裳非吉也非時尚輕涼慢禮毛詩關睢葛覃曰葛之覃兮施于中谷維葉莫莫是刈是穫為絺為綌服之無斁又綠衣曰絺兮綌兮凄其以風凄寒風也箋云絺綌所以當暑也以待寒喻失所我思古人實獲我心又君子偕老曰蒙被縐絺是紲袢父蕃反也絺之美者為縐是當暑紲袢之服也論語鄉黨曰當暑縝絺綌必表而出之縝單也暑月單衣葛為其彤褻也必有以表之若今單衣也, SBCK: ''}
