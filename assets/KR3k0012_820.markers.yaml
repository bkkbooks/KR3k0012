  - {type: variant, offset: 3876, length: 2, content: 任昉, SBCK: 其帛絮細布千鈞紋綵千疋荅布白疊也皮革千石比千乗之家􅀳令曰士}
  - {type: variant, offset: 3879, length: 348, content: 後子西華冬月著葛帔練裙道逢平原劉孝標泫然矜之謂曰我當為卿作計後周書曰賀蘭祥梁雍州刺史岳陽王蕭詧欽其節儉乃以竹屏風絺綌之屬及經史贈之祥難違其意取而付諸所司太祖後聞之並以賜祥隋書曰袁充少警悟年十餘歲其父黨至門時冬初充尚衣葛衫客戲充曰袁郎子絺兮綌兮凄其以風充應聲荅曰唯絺與綌服之無斁以是大見嗟賞穆天子傳曰天子筮獵苹澤其卦遇訟逢公占之賜之駿馬十六絺紵三十篋帝王世紀曰堯見舜於二宮設饗禮逆為賓主南面而問政然後賜以絺衣琴瑟必築宮室封之於虞韓詩外傳曰孔子南遊楚至阿谷有處女珮璜而浣孔子曰彼婦人可與言矣抽絺綌五兩以授子貢曰善為之辭以觀其辭子貢曰吾北鄙之人也將南適楚於此有絺綌五兩吾不敢置之水浦婦人對曰行客之行唴然永久分其資財棄之野鄙吾年甚少何敢取之子不早去竊有狂夫守之者矣說苑曰綿綿之蔓在於曠野良工得之以為絺綌良, SBCK: 百}
