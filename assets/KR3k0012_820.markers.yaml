  - {type: variant, offset: 1471, length: 1, content: 通, SBCK: 報之流黄素楊雄蜀都賦曰細絺弱折緜繭成衽筩中黄潤一端數金魏武遺令曰銅雀臺上安六尺牀施繐帳月旦十五日向帳作妓汝等時時登銅雀臺望吾西陵墓田曹植表曰欲遣人到鄴市上黨布五十疋作車上小帳帷謁者不聽陸機弔魏武文曰悼繐帳之􅁳漠怨西陵之芒芒火浣布魏志曰青龍三年西域重譯獻火浣布詔大將軍太尉臨試以示百僚呉録曰日南比景縣有火䑕取毛爲布燒之而精名火浣布崔鴻十六國春秋前秦録曰天笁國獻火浣布南史曰南海諸簿國東千餘里至自然火洲其上有樹生火中洲左近人剥取其皮紡績作布以爲手巾與蕉麻無異而色}
