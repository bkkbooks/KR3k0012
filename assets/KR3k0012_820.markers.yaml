  - {type: variant, offset: 1281, length: 0, content: '', WYG: 指麻而示之怒曰此權權何以為莾莾權權由飬治也莾莾長貌也說苑墨子曰古有用無文者禹是也土階三等衣裳細布當此時黼黻無所用務在完堅王子年拾遺記曰周成王六年然丘國遺貢獻使者衣云霞之布如今之朝霞布也列女傳曰}
  - {type: page-break, offset: 1281, content: '', id: KR3k0012_WYG_820-9b, image: WYG0900/WYG0900-0266b.png}
  - {type: variant, offset: 1282, length: 0, content: '', WYG: 江乙母者當恭王之時乙為大夫有入王宫盗者令尹以罪乙請於王而黜之處家無幾其母亡布八尋言令尹盗之王曰令尹在上冦盗在下尹令不知有何罪焉母曰昔日妾子為郢大夫}
  - {type: variant, offset: 1283, length: 7, content: 謂藡又讀音敵古, WYG: 盗王宫中之物妾子坐之而黜令尹獨何不以是為過也王曰善令吏償母之布因賜金十鎰母讓金布曰妾豈貪貨而干王哉怒令尹之治也遂不肯受王曰母智若此其子必不愚乃復召江乙而用之先賢行狀曰王烈字彦方通識達道人皆慕之州閭成風咸竟為善時國中有盗牛者牛主得知盗者曰我邂逅迷惑從}
