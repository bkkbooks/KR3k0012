  - {type: variant, offset: 1475, length: 1, content: 雲, WYG: 機吊魏武文曰悼繐帳之𠖇漠怨陵西之芒芒火浣布魏志曰青龍三年西域重譯獻火浣布詔大將軍太尉臨試以示百僚呉録曰日南北景縣有火鼠取毛為布燒之而精名火浣布崔鴻十六國春秋前秦録曰天竺國獻火浣布南史曰南海諸簿國東千餘里至自然火洲其上有樹生火中洲左近人剥取其皮紡績作布以為手布}
