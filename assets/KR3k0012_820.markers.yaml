  - {type: variant, offset: 297, length: 4, content: 郭原平孝, SBCK: 王玄謨侵魏爲前鋒好營貨利一疋布責人八百梨以此倍失人心梁書曰蕭恢爲郢州刺史境内大寧時有進筒中布者恢以竒貨異服即命焚之於是百姓仰德陳書曰姚察自居顯要一不交通嘗有􅀻門生不敢厚餉送南布一端花練一疋察謂曰吾所衣著止是麻布蒲練此物於吾無用旣欲相接欵幸不煩爾此人遜請察厲色驅出自是莫敢饋遺南史曰林邑國出古貝古貝者樹名也其華盛時如鵝毳抽其緒紡之以作布布與紵布不殊亦染成五色織爲班布又曰東夷扶桒國其土多扶桒木故以爲名扶桒爲桐􅀄生如荀國人食之實如梨而赤績其皮爲布以爲衣亦以爲錦燕書曰宋該字宣孔爲右長史太祖㑹羣僚以該性貪故賜布百餘疋令􅀒而歸重不能致乃至僵頓以愧辱之後魏書曰楊大眼爲荆州刺史常􅅞膏爲人衣以青布而射之召諸蠻渠指示之曰卿等作賊吾正如此相殺也又曰楊椿歸老臨}
  - {type: page-break, offset: 297, content: '', id: KR3k0012_SBCK_820-4b}
  - {type: variant, offset: 297, length: 4, content: 郭原平孝, WYG: 王𤣥謨侵魏為前鋒好營貨利一疋布責人八百梨以此倍失人心梁書曰蕭恢為郢州刺史境内大寧時有進筒中布者恢以竒貨異服即命焚之於是百姓仰徳陳書曰姚察自居顯要一不交通常有私門生不敢厚餉送南布一端花練一疋察謂曰吾所衣者止是麻衣蒲練此物於吾無用既欲相接欵幸不煩爾此人遜讓察厲色驅出自是莫敢饋送南史曰林邑國出古貝古貝古樹名也其華盛時如鵝毳抽其緒紡之以作布布與紵布不殊亦染成五色織為班布又曰東夷扶桑國其土多扶桑木故以為名扶桑如桐初生如筍國人食之實如棃而赤績其皮為布以為衣亦以為錦燕書曰宋該字宣孔為長史太祖㑹群僚以該性貪故賜布百餘疋令負而歸重不能致乃至僵頓以愧辱之後魏書曰楊大眼為荆州刺史常縳藁為人衣以青布而射之召諸蠻渠指示之曰卿等作賊吾正如此相殺也又曰楊椿歸老臨}
