  - {type: variant, offset: 1272, length: 1, content: 可, WYG: 如布或善為新或善為故善由宜也抱朴子曰寸裂之錦黻未若堅光之韋布郭子曰劉道貞常為徒扶風王以五疋布贖之既而用為從事郎中當時}
  - {type: variant, offset: 1272, length: 1, content: 可, krp: 如布或善爲新或善爲故美由冝也抱朴子曰寸裂之錦黻未若堅完之韋布郭子曰劉道眞嘗爲徒扶風王}
  - {type: variant, offset: 1274, length: 52, content: 為絮藡苗藿秀也楚人謂藡又讀音敵古今注曰元帝永光四年東萊郡東牟山有野蠶為蠒蠒生娥蛾生卵卵著石收得萬餘石民人, SBCK: 五百疋布贖之旣而用爲從事中郎當時}
