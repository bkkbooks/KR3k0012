  - {type: variant, offset: 46, length: 1, content: 喪, SBCK: 襄二十八年齊子尾曰且夫冨如布帛之有幅焉爲之制度使無遷也遷移也夫民生厚而用利於是乎正德以幅之言厚利皆人之所欲唯正德可以爲之幅使無黜嫚黜猶放也謂之幅利利過則爲敗吾不敢貪多所謂幅也周易􅀃卦曰坤爲布論語郷黨曰齊必有明衣布史記張騫傳曰臣在}
  - {type: variant, offset: 46, length: 1, content: 喪, WYG: 襄二十八年齊子尾曰且夫冨如布帛之有幅焉為之制度使無遷也夫民生厚而用利於是乎正徳以幅之言厚利皆人之所欲惟正德可以為之幅無黜嫚黜猶放也謂之幅利利過則為敗吾不敢貪多所謂幅也周易說卦曰坤為布論語鄉黨曰齊必有明衣布史記張騫傳曰臣在}
