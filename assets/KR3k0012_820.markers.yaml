  - {type: variant, offset: 48, length: 0, content: '', SBCK: 夏時見卭竹杖蜀布問安得此大夏國人曰吾賈人徃市身毒在大夏東南可數千里又曰伏靈在莵絲之下燭之火滅即記其數以新布四尺環置之明即掘取漢書曰太山以布爲貨廣二尺二寸爲幅長四丈爲疋又曰髙帝曰吾􅁬布衣而取天下又曰文帝徙淮南王長道死時民謡曰一斗粟尚可舂一尺布尚可縫兄弟二人不相容又曰公孫弘爲丞相而卧布􅀍又曰張敞爲京兆尹長安游徼受臧布罪名巳定其母年八十守遺腹子詣敞自陳願乞一生之命敞多其母守節而出教更量所受布狹幅短度中䟽虧二尺賈直五百由此得不死東觀漢}
