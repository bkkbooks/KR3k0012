  - {type: variant, offset: 320, length: 0, content: '', SBCK: 綵帛百疋巳上用爲冨也北史曰齊鄭述祖爲光州刺史有人入市盗布其父怒曰何惡仁君執之以歸首述祖特原之自是境内無盗唐書曰貞觀十八年命將征遼東安州人彭逋請出布五千叚以資征人上喜之比漢之卜式拜宣義郎晏子春秋曰景公謂晏子曰東海中有水而赤中有􅀥華而不實何也晏子曰者秦繆公乗龍治天下以黄布褁蒸􅀥至海而淬其布於波黃布故水赤蒸􅀥故華而不實公曰吾佯問晏子對曰嬰聞佯問者亦佯對之莊子曰魯君聞顔闔得道之人使人以弊先焉顔闔守門麤布之衣而自飯牛使者致幣顔闔對曰恐聽謬而}
  - {type: page-break, offset: 320, content: '', id: KR3k0012_SBCK_820-5a}
  - {type: variant, offset: 320, length: 0, content: '', WYG: 綵帛百疋已上用為冨也北史曰齊鄭述祖為光州刺史有人入市盗布其父怒曰何汚仁君執之以歸首述祖特原之自是境内無盗唐書曰真觀十八年命將征遼東安州人彭通請出布五千疋以資征人上喜之比漢之卜式拜宣議郎晏子春秋曰景公謂晏子曰東海中有水而赤中有􅀥華而不實何也晏子曰昔秦穆公乗龍治天下以黄布裹蒸􅀥至海而淬其布於波黄布故水赤蒸􅀥故華而不實公曰吾佯問晏子對曰佯問者亦佯對之莊子曰魯君聞顔闔得道之人使人以幣先焉顔闔守門麤布之衣而自飯牛使者致幣顔闔對曰恐聼繆而}
  - {type: page-break, offset: 320, content: '', id: KR3k0012_WYG_820-8a, image: WYG0900/WYG0900-0265c.png}
