  - {type: variant, offset: 208, length: 1, content: 前, SBCK: 爲天下母而身服大練食不求甘左右但著布布無香薫之飾者欲身率下也又曰元和二年詔令天下大酺五日賜公卿以下錢帛各有差及洛陽民當酺者布户一疋外三户共一疋賜􅀶土弟子見在太學者布人三疋典略曰􅂫秦如趙逢其隣子於易水之上從貸布一疋約價千金鄰子不與魏略曰大秦國在安息條支西出細布布織成言用水羊毳名曰海西布又曰大秦國出金塗布緋持竹布發隆火浣布阿羅得布巴則布鹿代布温􅀫布五色枕布魏文帝詔曰夫珍翫所生皆中國及西域他方物比不如也代郡黃布爲細樂浪練爲精江東太未布爲白故不如白疊故鮮皮也魏略曰皇甫隆爲燉煌太守燉煌婦人作裙率縮如羊膓用布一疋隆禁止之所省復不訾􅀳書曰王戎性慳從子將㛰遺一單布衣㛰畢却収之又曰􅂫峻平}
  - {type: page-break, offset: 208, content: '', id: KR3k0012_SBCK_820-3b}
  - {type: variant, offset: 208, length: 4, content: 前後仕進, WYG: 為天下母而身服大練食不求甘左右但着帛布無香薰之飾者欲身率下也又曰元和二年詔令天下大酺五日賜公卿以下錢帛各有差及洛陽民當酺者布户一疋外三户共一疋賜博士弟子見在太學者布人三疋典略曰蘇秦如趙逄其隣子于易水之上從貸布一疋約價千金隣子不與魏畧曰大秦國在安息條支西出細布有織成紬布言用水羊毳名曰海西布又曰大秦國出金塗布緋持竹布發隆火浣布阿羅得布巴則布鹿代布温宿布五色枕布魏文帝詔曰夫珍翫所生皆中國及西域他方物比不如也代郡黄布為細樂浪練為精江東太木布為白故不如白疊布鮮潔也魏畧曰皇甫隆為燉煌太守燉煌婦人作裙率縮如羊腸用布一疋隆禁止之所省復不貲晉書曰王戎性慳從子將婚遺一單布衣婚畢却收之又曰蘇峻平后帑藏空竭庫中唯練數千端鬻之不售而國用不給導患之乃與朝賢俱制練布單衣於是人士歙然競服之練遂踴貴乃令主者出賣端至一金又曰謝尚書江夏相府以布四}
