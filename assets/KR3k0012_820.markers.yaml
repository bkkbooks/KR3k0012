  - {type: variant, offset: 321, length: 0, content: '', SBCK: 使者罪不􅀂審之使者還反復來求即不得孫卿子曰與人善言煖􅀂布帛與人惡言深於矛㦸韓子曰衛人有夫妻禱而祝曰使我無故得百束布其夫曰何少也妻曰益則子將取妾又曰齊國好厚葬布帛盡於衣衾林木盡於棺椁桓公患之以告管仲曰布帛盡則無以爲幣林木盡則無以爲守備而人厚葬}
