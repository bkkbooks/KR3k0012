  - {type: variant, offset: 1485, length: 2, content: 視曹, WYG: 酒}
  - {type: variant, offset: 1488, length: 1, content: 器, WYG: 卿朝臣前佯爭酒失杯而汚之偽怒解衣而燒之布得火煒華赫然而熾如燒凡布垢盡火滅粲然潔白如水澣之東方朔神異經曰南荒之外有火山長四十里廣五十里其中皆生不燼之木晝夜火燒得暴風猛雨不得㓕火中有䑕重千斤毛長二尺餘細如絲可以作布恒居火中色洞赤時時出外而色白以水逐而沃之即死織以為布搜神記曰崑崙之墟有炎火之山山中有鳥獸草木皆生長於炎火之中故有火浣布非此山草木之皮枲則其鳥獸之毛也漢世西域舊献此布中間久絶至魏初時人疑其有文無實文帝以為帝火酷烈無含育之氣著之典論明其不然曰不然之事絶智者之聽及明帝立詔三公曰先帝昔著典論不朽之格言其刋石於廟門之外及太學與石經並以為永示後世至此西域使至始獻火浣布焉於是刋㓕此論而天下笑之臣松之昔從征西洛陽歴觀舊}
