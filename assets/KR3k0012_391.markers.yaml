  - {type: variant, offset: 1845, length: 1, content: 昔, WYG: 大丈夫遭魏太祖不封萬户侯位上將者非丈夫也時類笑之豹罵言爾䑕子軰安知君子豹變之志乎従起中原豹}
  - {type: variant, offset: 1847, length: 1, content: 汝, WYG: 十八騎之雄事勒甚恭又南燕録曰慕容徳建平四年妖賊王始聚衆扵太山莱蕪谷自稱太平皇帝置署公卿父固為太上皇兄林為征東弟為征西討擒之將刑焉市人皆罵之曰何為妖妄自貽族㓕父兄今並何在始曰太上皇䝉塵扵外征東征西為亂兵所害朕躬雖存復何聊賴其妻趙氏怒之曰君正坐口過以至扵此如何臨死猶有狂言始曰皇后何不達天命自古及今豈有不亡之}
