  - {type: variant, offset: 1673, length: 5, content: 哀吾慷慨大, WYG: 元卿来候榮諸子謂曰平生笑君盡氣今何如元卿曰我農民安能預知此又曰桓榮為博士入㑹庭中詔賜竒菓受者皆懐之榮獨舉手奉以拜帝笑止之曰此真儒生也愈見敬厚魏}
