  - {type: variant, offset: 1680, length: 7, content: 士生一世乘下澤, WYG: 賈詡字文叔文帝為五官将而臨淄侯植才名方盛各有黨有奪宗之議太祖因問詡黙然不對太祖曰與卿言而不答何也曰思袁本初劉景㫒父子也太祖大笑扵是太子遂定又曰明悼毛皇后父嘉本典虞}
