  - {type: variant, offset: 1754, length: 2, content: 龐統, WYG: 馬忠為人寛濟有度量但談啁大笑忿怒不形扵顔色王隠晉書曰杜預伐吴軍入城至都督孫歆帳下生將歆詣預王濬先列得歆頭而預生送歆洛中大笑晉中興書曰石勒與李陽相近陽性剛愎每嵗與争漚麻池共相打撲互有勝負勒貴召陽引入言及平生酒酣宣陽肘曰卿年老臂中故有力不頗復與人鬭耶孤徃數得卿尊拳卿亦數遭孤毒手因大笑賞賜甚厚即日拜陽奉車都尉除始興太守時有醉胡乗馬徑入府門勒問門吏馮翥向走馬入門為是何人而不彈翥見問惶遽誤對忘諱曰向有醉胡乗馬馳来即以呵問胡人難與語非小吏所制勒笑曰胡正自難與言其後章武太守樊坦入辭居貧衣服甚陋曰樊章武貧耶朝服何以壊惡坦性踈謬對曰頃遇羯胡資財蕩盡是以窮弊勒大笑曰羯賊乃爾大惡取君物盡坦汗流而不敢謝勒賜坦衣恕而不問蕭子顯齊書曰徴張敬兒為護軍將軍常侍如故敬兒武將不習朝儀聞當内遷乃扵宻室中屏人學揖讓答對空中俯仰如此竟曰妾侍竊窺笑焉崔鴻十六國春秋後趙録曰桃豹}
