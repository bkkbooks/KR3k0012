  - {type: punctuation, offset: 2655, content: 「, id: KR3k0012_CHANT_391-bkkpn937}
  - {type: variant, offset: 2655, length: 0, content: '', SBCK: 王淳與婦鍾氏共坐見武子從庭前過淳謂婦曰生兒如是足慰人意婦􅀏曰若使新婦得配叅軍生兒故可不翅如此叅軍是渾中弟名淪字太冲爲晉文王大將軍從征壽春遇疾亡時人惜焉丗說曰二陸入洛而士龍不詣張公公問士衡雲何以不來機曰有疾􅂲公不悉故未敢自見俄而雲詣華華爲人多姿質又好帛􅆞䰅雲見而大􅀏不能自巳士龍甞着縗幘上舡因水中自見其影便大􅀏不能巳幾落水中又曰王大將軍尚主如厠見􅃮箱中盛乾􅀥以塞鼻王言厠上菓食遂爲之盡旣還婢擎金􅃮盤盛水琉璃椀盛澡豆王因倒豆着水中飮之謂是乾飯羣婢莫不􅀏又曰殷荆州有所識作賦示之殷甚以爲有才語王恭適見新文甚可觀便於手中亟出之王旣讀殷􅀏不自勝王看竟旣不􅀏亦不言好惡但以如意􅀧之而巳殷悵然自失語林曰吊王武子客正􅂘見}
  - {type: page-break, offset: 2655, content: '', id: KR3k0012_SBCK_391-7b}
  - {type: variant, offset: 2655, length: 3, content: 孫安國, WYG: 王渾與婦鍾氏共坐見武子從庭前過渾謂婦曰生兒如是足慰人意婦笑曰若使新婦得配叅軍生兒故可不翅如此叅軍是渾中弟名淪字太冲為晉文王大将軍從征夀春遇疾亡時人惜焉世說曰二陸入洛而士龍不詣張公公問士衡雲何以不来機曰有疾恐公不悉故未敢自見俄而雲詣華華為人多姿制又好帛纒鬚雲見而大笑不能自已士龍嘗着纕幘上船因水中自見其影便大笑不能已幾落水中又曰王大將軍尚主如厠見漆箱中}
  - {type: page-break, offset: 2655, content: '', id: KR3k0012_WYG_391-12b, image: WYG0896/WYG0896-0469b.png}
  - {type: variant, offset: 2655, length: 0, content: '', krp: 王淳與婦鍾氏共坐見武子從庭前過淳謂婦曰生兒如是足慰人意婦笑曰若使新婦得配叅軍生兒故可不翅如此叅軍是渾中弟名淪字太冲爲晉文王大將軍從征壽春遇疾亡時人惜焉丗說曰二陸入洛而士龍不詣張公公問士衡雲何以不來機曰有疾恐公不悉故未敢自見俄而雲詣華華爲人多姿質又好帛纏䰅雲見而大笑不能自巳士龍甞着縗幘上舡因水中自見其影便大笑不能巳幾落水中又曰王大將軍尚主如厠見􅃮箱中盛乾棗以塞鼻王言厠上菓食遂爲之盡旣還婢擎金􅃮盤盛水琉璃椀盛澡豆王因倒豆着水中飮之謂是乾飯羣婢莫不笑又曰殷荆州有所識作賦示之殷甚以爲有才語王恭適見新文甚可觀便於手中亟出之王旣讀殷笑不自勝王看竟旣不笑亦不言好惡但以如意點之而巳殷悵然自失語林曰吊王武子客正哭見}
  - {type: variant, offset: 2656, length: 8, content: 安國盛字安國往殷, SBCK: 子荆驢鳴變聲成􅀏又曰董昭失􅀔乆爲衛尉昭乃厚加意於侏儒正朝大㑹侏儒作董衞尉啼面叙太祖時事舉坐大􅀏明帝悵然不怡月}
  - {type: page-break, offset: 2656, content: '', id: KR3k0012_SBCK_391-8a}
  - {type: variant, offset: 2656, length: 8, content: 安國盛字安國往殷, krp: 子荆驢鳴變聲成笑又曰董昭失勢乆爲衛尉昭乃厚加意於侏儒正朝大㑹侏儒作董衞尉啼面叙太祖時事舉坐大笑明帝悵然不怡月}
