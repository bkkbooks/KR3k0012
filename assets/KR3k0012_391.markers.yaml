  - {type: variant, offset: 308, length: 355, content: 小弁曰君子母易由言耳屬于垣箋云猶用也王母輕用讒人之言將有屬耳于垣壁聽也又巧言曰巧言如簧顏之厚矣又魚藻都人士曰彼都人士狐裘黃黃其容不改出言有章又蕩之什曰白珪之玷尚可磨也斯言之玷不可為也禮記玉藻曰動則左史書之言則右史書之又少儀曰言語之美穆穆皇皇又中庸曰故君子語大天下莫能載焉語小天下莫能破焉君子言顧行行顧言也又表記曰天下無道則言有枝葉又曰子曰事君大言入則望大利小言入則望小利大言可以立大事小言可以立小事立謂君受故君子不以小言受大祿不以大言受小祿又緇衣曰子曰王言如絲其出如綸王言如綸其出如綍故大人不倡遊言遊浮也不可用之浮也可行也不可言也君子弗言也可言也不可行也君子弗行也則民言不危行而行不危言也左傳僖中曰介子推曰言身之文也身將隱矣焉用文之求顯也又襄四年曰仲尼曰言以足志文以足言足猶成也不言誰知其志言之無文行而不遠左傳, SBCK: ''}
