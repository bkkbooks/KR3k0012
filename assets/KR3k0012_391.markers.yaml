  - {type: variant, offset: 3224, length: 254, content: 千里投公始得蠻府參軍那得不作蠻語又曰裴僕射時人謂言談之林藪又曰殷中軍浩嘗至劉尹所惔字真長殷理屈而遊詞不已劉亦不復荅殷去乃言曰田舍兒學人作爾馨語又曰陸士龍荀鳴鶴未相識俱會張茂先座張介令共語以其並有大才可勿作常談陸抗手曰雲間陸士龍荀曰日下荀鳴鶴陸曰既開青雲覩白雉何不張爾弓挾爾矢荀曰本謂雲龍騤騤乃是山鹿野麋獸微弩強是以發遲張乃拊手大笑又曰王武子孫子荊各言鄉里土地人物之美王云其地坦而平其水澹而清其人廉且貞孫云其山崔嵬以嵯峨其水㳌渫而揚波其人礧砢而英多又曰宋處宗甚有思理才常買得一長鳴雞愛養之甚至恒籠盛著窗間雞遂作, SBCK: ''}
