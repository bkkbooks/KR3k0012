  - {type: variant, offset: 2888, length: 215, content: 精神清發至昏不暇寐自此已下殆白日欲寢陵零先賢傳曰張飛嘗就劉巴宿巴不與語遂忿恚諸葛亮謂巴曰張飛雖實武人敬慕足下足下雖天素高亮宜少降意曰丈夫處世當交四海英雄如何與兵子語備聞之怒曰孤欲定天下而子初專亂之括地圖曰太極山採華之草一日服之通萬里語世說曰晉文王稱阮嗣宗天下之至慎每與之言言及玄遠未嘗臧否人物又曰諸葛瑾為豫州遣別駕到臺語云小兒知談卿可與語於張輔吳座中相遇別駕呼恪咄咄郎君恪因嘲之曰豫州亂矣何咄咄有荅曰君明臣賢未聞有亂恪復云昔唐堯在, WYG: 亟屈被榜}
