  - {type: variant, offset: 2665, length: 115, content: 軍許共語別名浩也往返精苦客主無間左右進食冷而復煖者數四彼我奮擲塵尾毛悉隨落滿飡飯中賓主遂至暮忘飡殷方語孫卿曰公勿作強口馬我當併卿控孫亦曰卿勿作穴鼻牛我當穿卿頰尸子曰言美則響美言惡則響惡五帝本紀曰黃帝弱而能言神仙傳曰老子生而能語衛玠, SBCK: 以爲司徒曹暪}
