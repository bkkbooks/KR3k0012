  - {type: variant, offset: 1150, length: 2, content: 察也, SBCK: 誡又曰李義府貌狀温恭與人語必嬉怡微􅀏而􅄶忌隂賊旣處權要欲人附巳微忓意者輙加傾䧟故時人言義府􅀏中有刀戰國䇿曰楚王遊于雲夢有狂兕觸車徑輪彎弓而射應發而殪仰天而􅀏曰樂矣今日之遊萬歳千秋之後誰與此同樂乎安陵君泣涕數行而進曰臣入則侍綸席出則陪萬乗萬歳千秋之後願得身滅黄泉先辱螻蟻王大恱晏}
