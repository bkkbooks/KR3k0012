  - {type: variant, offset: 3507, length: 217, content: 生語未嘗誤每共說退後敘說向言皆得次第後忽一悞自知當必死其年而薨又曰恒南郡與殷荊州語次因作了語顧愷曰火燒平原無遺燎桓曰白布纏棺樹旒旐殷曰投魚深淵放飛鳥次復作危語桓曰矛頭浙米劍頭炊殷曰百歲老翁攀枯枝顧曰井上轆轤安嬰兒殷有一參軍在坐云盲人騎瞎馬臨深池殷曰咄咄逼人仲堪眇目故也蘇彥語箴曰利輕春露害重冬霜蘧蒢充室戚施滿堂孫楚反金人銘曰晉太廟左偕前有石人焉大張其口而書其胸曰我古之多言人也無少言少言少事則後生何述焉夫唯立言名乃長久胡為塊然唑緘其口, SBCK: ''}
