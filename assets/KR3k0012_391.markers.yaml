  - {type: variant, offset: 2362, length: 2, content: 明君, SBCK: 晉文公出㑹欲伐衛公子鉏仰而􅀏公問何􅀏曰臣之隣人有送其妻適私家者道見桑婦悅而與言然頋視其妻亦有招之者臣􅀼􅀏之公悟其言乃引師還未至而有伐其北鄙者矣莊子曰齊桓公田於澤見􅀑焉公反誒昔熈詒音怡爲病數日不出齊士有皇子告敖者曰臣聞野有委虵惡聞雷車之聲則捧其首而立見者殆乎霸公輾然􅀏曰此寡人所見也不終日而病去又曰造適不及􅀏獻􅀏不及排所造皆適則忘適矣故不及􅀏排者推移之謂也夫禮􅂘必哀獻􅀏必樂哀樂存懷則不能與適推移矣又曰盗跖謂孔子曰人上壽百􅀊中壽八十下壽六十除病瘦死䘮憂患其中開口而􅀏者一月之中不過四五日而巳矣鄧析子曰故體痛者口不能不呼心悅者顔不能不􅀏孟子曰曽子曰脇肩謟􅀏病乎夏畦脇肩踈體也謟􅀏強􅀏也此言其言勞苦甚於仲夏之月}
  - {type: page-break, offset: 2362, content: '', id: KR3k0012_SBCK_391-6a}
  - {type: page-break, offset: 2362, content: '', id: KR3k0012_SBCK_391-6b}
  - {type: variant, offset: 2362, length: 2, content: 明君, WYG: 晉文公出㑹欲伐衛公子鋤仰而笑公問何笑曰臣之隣人有送其妻適私家者道見桑婦恱而與言然頋視其妻亦有招之者臣竊笑之公悟其言乃引師還未至而有伐其北鄙者矣荘子曰齊桓公田扵澤見鬼焉公反誒詒為病數日不出齊士有皇子告敖者曰臣聞野有委虵惡聞雷車之聲則捧其首而立見者殆乎覇公囅然笑曰此寡人所見也不終日而病去又曰造適不及笑獻笑不及排所造皆適則忘適矣故不及笑排者推移之謂也夫禮笑不哀獻笑必樂哀樂存懐則不能與適推移矣又曰盗跖謂孔子曰人上夀百嵗中夀八十下夀六十除病瘦死䘮憂患其中開口而笑者一月之中不過四五日而已矣鄧析子曰故體痛者口不能不呼心恱者顔不能不笑孟子曰曾子曰脇肩謟笑病于夏畦脇肩竦體也謟笑强笑也此言其意勞苦甚扵仲夏之月}
