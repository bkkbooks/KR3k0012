  - {type: variant, offset: 950, length: 0, content: '', SBCK: 仲多殿上羣臣皆呼萬歳大􅀏爲樂又曰孟嘗君}
  - {type: variant, offset: 950, length: 27, content: 之言而不與言失人不可與言而與之言失言智者不失人亦不失言, WYG: 仲多殿上群臣皆呼萬嵗大笑為樂}
  - {type: variant, offset: 950, length: 0, content: '', krp: 仲多殿上羣臣皆呼萬歳大笑爲樂又曰孟嘗君}
  - {type: variant, offset: 951, length: 0, content: '', SBCK: 趙趙平原君客之趙人聞孟嘗君賢皆出觀之皆􅀏曰始以薛公爲魁然也今視之􅆌小丈夫耳漢書曰公孫弘爲人談􅀏多聞師古曰善於談􅀏而又多聞也又曰匡衡字稚圭好學諸儒爲之語曰無說詩匡鼎來匡􅀃詩解人頥如淳曰使人􅀏不能止東觀漢記曰光武微時與鄧晨觀䜟云劉秀當爲天子或言國師公劉秀當之光武曰安知非僕乎建武三年上徴鄧晨還京師數讌見說故舊平生爲忻樂晨從容謂帝曰僕竟辨之帝大􅀏又曰􅀄桓榮遭倉卒困厄時嘗與族人桓元卿俱捃拾投閑輙誦詩元卿謂榮曰卿但盡氣爾當空復施用時乎榮􅀏而不應後榮爲太常元卿來􅀱榮諸子謂曰平生􅀏君盡氣今何如元卿曰我農民安能預知此又曰桓榮爲􅀶士入㑹庭中詔賜竒菓受者皆懐之榮獨舉手奉以拜帝􅀏止之曰此真儒生也愈見敬厚魏志曰賈詡字文和文帝爲五官將而臨淄侯植才名方盛各有黨有奪宗之議太祖又問詡嘿然不對太祖曰與卿}
  - {type: page-break, offset: 951, content: '', id: KR3k0012_SBCK_391-3b}
  - {type: variant, offset: 951, length: 0, content: '', krp: 趙趙平原君客之趙人聞孟嘗君賢皆出觀之皆笑曰始以薛公爲魁然也今視之眇小丈夫耳漢書曰公孫弘爲人談笑多聞師古曰善於談笑而又多聞也又曰匡衡字稚圭好學諸儒爲之語曰無說詩匡鼎來匡說詩解人頥如淳曰使人笑不能止東觀漢記曰光武微時與鄧晨觀䜟云劉秀當爲天子或言國師公劉秀當之光武曰安知非僕乎建武三年上徴鄧晨還京師數讌見說故舊平生爲忻樂晨從容謂帝曰僕竟辨之帝大笑又曰𥘉桓榮遭倉卒困厄時嘗與族人桓元卿俱捃拾投閑輙誦詩元卿謂榮曰卿但盡氣爾當空復施用時乎榮笑而不應後榮爲太常元卿來候榮諸子謂曰平生笑君盡氣今何如元卿曰我農民安能預知此又曰桓榮爲博士入㑹庭中詔賜竒菓受者皆懐之榮獨舉手奉以拜帝笑止之曰此真儒生也愈見敬厚魏志曰賈詡字文和文帝爲五官將而臨淄侯植才名方盛各有黨有奪宗之議太祖又問詡嘿然不對太祖曰與卿}
  - {type: variant, offset: 954, length: 0, content: '', SBCK: 荅何也曰思􅀽夲􅀄劉景昇父子也太祖大􅀏於是太子遂定又曰明悼毛皇后父嘉夲典虞車工卒􅁀富貴明帝令朝臣㑹其家飲宴其容止舉動甚癡騃語輒自謂侯身時人以爲􅀏蜀志曰馬忠爲人寛濟有度量伹談啁張流切大􅀏忿怒不形於顔色王隱晉書曰杜預伐吴軍入城至都督孫歆帳下生將歆詣預王濬先列得歆頭而預生送歆洛中大􅀏晉中興書曰石勒與李陽相近陽性剛愎毎􅀊與爭漚麻池共相打撲互有勝負勒貴召陽引入言及平生酒醋宣陽肘曰卿年老臂中故有力不頗復與人􅋐耶孤徃昔數􅀍卿尊拳卿亦數遭􅀌毒手因大􅀏賞賜甚厚即日拜陽奉車都尉除始興太守時有酔胡乗馬徑入府門勒問門吏馮翥向走馬入門爲是何人而不彈白翥見問惶遽誤對忘諱向有醉胡乘馬馳來即以呵問胡人難與語非小吏所制勒􅀏曰胡正自難}
  - {type: page-break, offset: 954, content: '', id: KR3k0012_SBCK_391-4a}
  - {type: variant, offset: 954, length: 0, content: '', krp: 荅何也曰思袁夲𥘉劉景昇父子也太祖大笑於是太子遂定又曰明悼毛皇后父嘉夲典虞車工卒暴富貴明帝令朝臣㑹其家飲宴其容止舉動甚癡騃語輒自謂侯身時人以爲笑蜀志曰馬忠爲人寛濟有度量伹談啁張流切大笑忿怒不形於顔色王隱晉書曰杜預伐吴軍入城至都督孫歆帳下生將歆詣預王濬先列得歆頭而預生送歆洛中大笑晉中興書曰石勒與李陽相近陽性剛愎毎歲與爭漚麻池共相打撲互有勝負勒貴召陽引入言及平生酒醋宣陽肘曰卿年老臂中故有力不頗復與人鬪耶孤徃昔數𬒳卿尊拳卿亦數遭孤毒手因大笑賞賜甚厚即日拜陽奉車都尉除始興太守時有酔胡乗馬徑入府門勒問門吏馮翥向走馬入門爲是何人而不彈白翥見問惶遽誤對忘諱向有醉胡乘馬馳來即以呵問胡人難與語非小吏所制勒笑曰胡正自難}
