  - {type: variant, offset: 1189, length: 1101, content: 二三子各言爾志子路進曰由願得白羽若月赤羽若日鍾鼓之音上振于天旌旗紛紛下蟠於地由當一隊而敵之必也攘地千里搴旗執馘使二子者從我焉夫子曰勇哉子貢復進曰賜願使齊楚合戰兩壘相當旗鼓相望埃塵連接挺刃交兵賜縞衣白冠陳說其間推論利害使二國釋患唯賜能之使夫二子者從我焉夫子曰辯哉回曰願得明王聖主而相之敷其五教導以禮樂使城郭不修溝池不越鑄劍戟為農器放牛馬於原藪室家無離曠之思千載無鬭戰之患使由無所施其勇賜無所用其辯孔子曰美哉德之大也史記曰孔子適周問禮於老子老子曰子所言者其人與骨皆已朽矣獨其言在耳辭去而老子送之曰吾聞富貴者送人以財仁人者送人以言吾不能富貴竊仁人之號送子以言曰聰明深察而近於死者好議人之非也博辯宏大而危其身者發人之惡者也為人子者無以有己也家語同又曰沛公至灞上召秦父老曰秦苛法誹謗者族偶語棄市漢書曰漢王與項羽臨廣武間而語又曰太尉周勃迎代王請間宋昌曰所言公公言之所言私王者無私又曰石建奏事於上前即有可言屏人乃極切至庭見如不能言上以是親而禮之又曰袁盎求見丞相申屠嘉良久乃見因跪曰願請間丞相曰使君所言公事之曹與長史掾議之吾且奏之則私吾不受私語盎即起東觀漢記曰馬援謂官屬曰吾從弟少遊常哀吾慷慨大志曰士生一世乘下澤車御款段馬為郡掾史守墳墓鄉曲稱善人斯可矣當吾在浪泊里間虜未滅之時下潦上霧毒氣熏蒸仰視烏鳶跕丁愜切跕墮水中臥念少遊平生時語何可得也蜀志曰龐統字士元襄陽人少時朴鈍未有識者頴川司馬徽清雅有人倫鑒統弱冠往見徽徽採桑樹上統桑下共自晝達夜徽甚異之稱統當為南州士之冠冕由是顯名晉書曰武帝問孫皓曰聞南人好汝語頗為不皓因舉觴奉帝而言曰昔為汝國鄰今為汝國臣勸汝一杯酒願汝壽萬春帝悔之沈約宋書曰謝莊孝建元年遷左衛將軍初世祖嘗賜莊寶劍以與豫州刺史魯爽別後叛世祖因宴集問劍所在荅曰昔與魯爽別竊為陛下杜郵之賜上甚悅也當時以為知言鄧析書曰一言而非駟馬不能追一言而急駟馬不能及晏子曰曾子將行晏子送之曰君子贈人以軒不若贈人以言老子曰多言數窮不如守中善言無瑕讁又曰信言不美美言不信又曰天之道不言而善應墨子曰子禽問曰多言有益乎墨子曰蝦蟆蛙黽日夜而鳴舌乾擗然而不聽今鶴雞時夜而鳴天下振動多言何益唯其言之時也孫卿子曰贈人以言重於金石珠玉傷人以言重於刀戟觀人以言美於黼黻文章聽人以言樂於鐘鼓琴瑟又曰金人銘曰周大廟右階之前有金人焉三緘其口而銘其背曰我古之慎言人也戒之哉無多言無多事多言多敗多事多害皇覽云出太公金頤家語說苑又載莊子曰言者所以在意也得意而忘言吾安得忘言之人與之言哉說苑曰梁君出獵見白鴈群梁君下車彀弓欲射之道有行者觀勸梁君止鴈群駭梁君怒欲殺行者其御公孫龍下車對曰昔者齊景公之時天旱三年卜之曰必以人祠乃雨景公曰吾昔所以求雨者為吾民也今以人祠乃雨, SBCK: ''}
