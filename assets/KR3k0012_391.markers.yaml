  - {type: variant, offset: 3104, length: 283, content: 四凶在下荅曰非唯四凶亦有丹朱又曰或問王濟云昨遊有何語議濟曰張華善說史漢裴逸民敘前言往行袞袞可聽王戎道子房季扎之間陶然玄著又曰郝隆為桓公南蠻參軍三月三日作詩不能者罰酒隆攬筆作一句云娵隅躍清池桓曰娵隅是何物荅曰蠻名魚為娵隅桓曰作詩何以作蠻語隆曰千里投公始得蠻府參軍那得不作蠻語又曰裴僕射時人謂言談之林藪又曰殷中軍浩嘗至劉尹所惔字真長殷理屈而遊詞不已劉亦不復荅殷去乃言曰田舍兒學人作爾馨語又曰陸士龍荀鳴鶴未相識俱會張茂先座張介令共語以其並有大才可勿作常談陸抗手曰雲間陸士龍荀曰日下荀鳴鶴陸曰既開青雲覩白雉何不張爾弓挾爾矢荀曰本謂雲龍騤騤乃是山鹿野麋獸微弩強是以發遲張乃拊手, WYG: 輙}
