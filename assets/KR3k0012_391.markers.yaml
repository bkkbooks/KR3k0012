  - {type: variant, offset: 956, length: 1, content: 失, SBCK: 其後章武太守樊坦入辭居貧衣服甚陋曰樊章武貧耶朝服何以壞惡坦性踈謬對曰頃遇羯胡姿財蕩盡是以窮弊勒大􅀏曰羯胡賊乃爾大惡取君物盡坦汗流而不敢謝勒賜坦衣恕而不問蕭子顯齊書曰徵張敬児爲護軍將軍常侍如故敬兒武將不習朝儀聞當内遷乃於宻室中屏}
