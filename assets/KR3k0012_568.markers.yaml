  - {type: variant, offset: 3358, length: 0, content: '', WYG: 太平樂舞抃以從之服飾皆作崑崙象上元樂髙宗所造舞者百八十一人五雲衣備五色以象元氣故曰上元鳥歌萬嵗樂武太后所造時宫中飬鳥能人言又常稱萬嵗為樂以象之舞三人緋大袖並畫鸜鵒冠作鳥象今嶺南有鳥似鸜鵒飬之乆則能言名吉了了音料先聖造𤣥宗所造也舞八十人鳥冠五彩畫衣兼似上元聖夀之容以歌王業所興自安樂以後皆雷大鼓雜以龜兹樂聲振百里並立奏之其大定樂加金鉦唯慶善樂獨用西涼樂最為閑雅舊破陣上元慶善三舞皆易其衣冠合之鐘磬以享郊廟自武太后革命此禮遂廢自安樂部謂之立部伎也大唐平髙昌盡收其樂又造讌樂而去禮畢}
