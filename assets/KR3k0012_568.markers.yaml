  - {type: variant, offset: 1784, length: 1476, content: 簫鼓聲俄而帝至仲舉異之乃深自結託北史爾朱榮少時父新興曾與榮遊池上忽聞簫鼓音謂榮曰古老相傳聞此聲皆至公輔吾年老當為汝耳隋書鼓吹車上施層樓四角金龍銜流蘇羽葆凡鼓吹陸則樓車水則樓舡在殿庭則畫筍簴為樓上有翔鷺棲烏或為鵠形又曰蔡徵拜吏部尚書啟後主借鼓吹後主謂所司曰鼓吹軍樂有功乃授蔡徵不自量揆紊我朝章然其父景歷既有締構之功宜且如啟唐書平陽公主葬特給鼓吹太常議婦人無鼓吹高祖曰往者公主於司竹園舉兵應義親執金鼓有克定之功宜特加之又曰中宗時皇后上言自妃主及五品以上母妻請從婚葬之日特進鼓吹宮官亦准此左臺御史唐紹上䟽諫曰竊聞鼓吹之作本為軍容昔黃帝涿鹿有功以為警衛故鉦鼓有靈夔孔雀雕鶚爭石墜崖壯士怒之類自昔功臣備禮適得用之假如郊祀天地唯有宮懸而無案架故知軍樂之用尚不給於神祀豈容接於閨閫哉鄧德明南康記曰雩都縣君山絕峰高崿遠望似舟舡上有玉臺方廣數丈周廻盡是白石柱上自然石覆如屋形風雨之後景氣明淨頗聞山上有鼓吹之聲吳質別傳曰質為北中郎將朝京師喜遟其到詔列鹵簿作鼓吹至闕而止江表傳曰孫策賜周瑜鼓吹為治館舍策令曰周公瑾英俊異才與孤有惣角之好骨肉之分前在丹陽發眾及舡糧以濟大事論德酬功此未足報也鄴中記曰石虎正會置三十步鼓吹三十步輒置一部十二人皆在平閣上去地丈餘又有女鼓吹贄虞新禮儀志曰漠魏故事將葬設吉凶鹵簿皆鼓吹新禮以禮吉事無凶事無樂宜除吉鹵簿凶服鼓吹虞按禮葬有客車郎吉駕之明文也徐廣車服注曰中朝公主有鼓吹幽明錄曰晉臨川太守謝摛夜中聞鼓吹聲兄澡曰夜者陰間不及存將在身後及死贈長水校尉加鼓吹世說曰三都二京五經鼓吹俗說曰桓公作詩思不來輒作鼓吹既而得思云鳴鵠響長阜歡曰鼓吹固自來人思語林曰陸士衡為河北督日已被間搆內懷憂懣聞眾軍警角鼓吹曰我今聞此不如華亭鵠戾魏武帝令曰孤所以能常以少兵敵眾者常念增戰士忽餘事是以往者有鼓吹而使步行為戰士愛馬也不樂多署吏為戰士愛糧也王渾表曰吳國臨戰牙門將張秦黃辰騎督綦母倪勇揵效武破賊制勝此三人之所致也秦辰已亡今倪獨在昔伐蜀有小戰功牙門數人便加鼓吹至於滅吳一國而有未得鼓吹者臣愚昧謂聖詔賜倪鼓吹存錄猛將以盡武人之力也陸機鼓吹賦曰原鼓吹之所始蓋稟命於黃軒四夷樂毛詩谷風鼓鍾曰以雅以南以籥不僣為雅為南舞四夷之樂大德德廣所及也東夷之樂曰昧北夷之樂曰禁西夷之樂曰離南夷之樂曰任以為籥舞若是和而不僣矣周禮春官鞮鞻曰鞮氏掌四夷之樂與其歌聲又曰旄人掌散樂舞夷樂夷樂四夷之樂散樂野人為之善者又曰春官𩎟師曰𩎟師掌教𩎟樂祭祀則帥其屬而儛之舞東夷之舞也周禮春官鞮鞻掌四夷之樂鄭玄注曰東方曰昧南方曰任西方曰朱離北方曰禁禮記明堂位曰昧東夷之樂也任南蠻之樂也納蠻夷之樂於太廟言廣魯於天下也後漢書曰永寧初年西南夷禪國王獻樂及幼人明年元會作之於庭安帝與群臣共大奇之又曰陳禪字紀山為諫議大夫西南禪國王獻樂及幼人能吐火自支解易牛馬頭大會作之庭禪離席舉手曰帝王之庭不宜作夷狄之樂五經通義曰東夷之樂持矛舞助時之生南夷之樂持羽舞助時之養又舞四夷之樂明澤廣被四表也東夷之樂曰侏離南夷之樂曰任西夷之樂曰禁北夷之樂曰昧東方所謂侏離者何陽始通萬物之屬離地而生故謂之侏離南方所以謂任者何陽氣盛用事萬物懷任故謂之任西方所以謂之禁者何西方陰氣用事禁止萬物不得長大故謂之禁北方所以謂之昧者何北方陰氣盛用萬物暗昧不見故謂之昧四夷之樂何以作之於廟陳於戶王子年拾遺記曰成王之時南垂之南有扶婁夷國或於掌中備百蓋之樂婉轉屈曲於指間人形或長數分神怪歙忽樂府傳此末代猶在焉風土記曰越俗飲讌即鼓拌以為樂取大素圜柈以廣尺五六者抱以著腹以右手五指更彈之以為節舞者蹀地擊掌以應柈節而舞樂部樂志曰龜茲起自呂光滅龜茲因得其聲樂記有豎箜篌琵琶五絃, SBCK: ''}
