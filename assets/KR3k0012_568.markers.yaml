  - {type: variant, offset: 4799, length: 7, content: 骨鹿舞胡旋俱於, SBCK: 聲樂之事己輙豫焉而耻不解妓人奏讃之已亦學人仰讃和同時人士令巳作主人并使喚妓客妓客未集召妓具問曲吹}
  - {type: variant, offset: 4799, length: 2, content: 骨鹿, WYG: 入其室者盧植字子幹侍講數年未嘗盼融以是嘉之也魏志曰夏侯惇從太祖征孫權還使惇都督二十六軍留居巢賜妓樂名倡令曰魏絳以和戎之功猶受金石之樂况將軍乎又曰曹爽飲食車服擬於乗輿又私取先帝才人七人將吏師工鼓吹良家子三十三人皆以為妓詐作詔書發才人五十七送鄴臺使先帝婕妤教習為妓擅取太樂樂器武庫禁兵作窟室綺䟽四周數與何晏等㑹其中縱酒作樂又曰楊阜為武都太守㑹馬超来冦曹洪置酒大㑹女倡着羅縠衣蹋鼔一座皆笑楊阜厲聲責洪曰男女有别遂奮衣出洪立罷女樂請阜還座肅然憚之陳書曰章昭逹毎飲㑹必盛設女伎雜樂偹羌胡之聲音律姿容並一時之妙雖臨敵弗之廢也隋書曰房暉逺傳髙祖嘗謂羣臣曰自古天子有女樂乎楊素以莫知所出遂言無女樂暉逺進曰臣聞窈窕淑女鐘鼔樂之此即王者房中之樂著於雅頌不得言無髙祖大説又曰牛𢎞修皇后房内之樂文帝龍潜時頗好音樂嘗倚琵琶作歌二首名曰地厚天髙託言夫妻之義因即取之為房内曲命婦人並登歌上夀並用職在宫内女人教習之唐書曰先天元年正月皇太子令宫臣就率更寺閲女樂太子舎人賈曽諌曰臣聞作樂崇徳以感神人韶夏有容咸英有節婦人媟黷無厠其間昔魯用孔子㡬致於覇齊人懼之饋以女樂魯君既受孔子遂行戎有由餘兵强國富秦人反間遺之女妓戎王耽悦由餘乃奔斯則大聖名賢疾之已乆矣良以婦人為樂必務冶容哇滛動心蠱惑喪志上行下效滛俗將成敗國亂人實由兹起殿下監撫餘閑宴私多適後庭伎樂古或有之至於所司教習彰示羣僚慢伎滛聲實虧睿化伏願並令禁㫁墨子曰秦繆公之時戎强公大繆公遺之女樂二八與良宰戎王大喜以其故數飲食日夜不休左右有言秦㓂之至者因扞弓而射之扞引秦㓂畢至戎王醉而卧於尊下卒生縳之未禽則不登山而視牛若羊視羊若豚牛之性不若羊羊之性不若豚所自視之勢道也而因怒於牛羊之性也此狂者也狂而以行賞罰此戴氏之所以絶韓子曰晉獻公欲伐虞虢乃遺之屈産之乗垂棘之璧女樂二八以熒其心亂其政郭子曰謝公在東山畜妓簡文曰安石必出與人同樂亦不得不與人同憂石虎鄴中記曰虎大㑹禮樂既陳虎繳西閣上牕幌宫人數千陪列看坐悉服飾金銀熠熠又於閣上作女妓數百衣皆絡以珠璣鼓}
