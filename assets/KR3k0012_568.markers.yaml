  - {type: variant, offset: 4269, length: 490, content: 國盡得其樂至天后時高麗樂猶二十五曲貞元末唯能習一曲衣服亦漸變其土風矣其百濟至中宗時工人死散開元中歧王範為太常卿復奏置焉又曰踈勒樂工人皂絲布頭巾白絲布袍錦𥘞褾白絲布袴舞二人白襖錦袖赤皮靴赤皮帶樂用豎箜篌琵琶五絃琵琶橫笛簫觱篥荅臘鼓腰鼓雞樓鼓康國樂工人皂絲布頭巾緋布袍錦領舞二人緋襖錦袖綠綾淩渾襠褲赤皮鞾白袴帑舞急轉如風俗之胡旋乞寒者本西國外蕃之樂也神龍二年三月并州清源縣尉呂無泰上曰臣謹按洪範八政曰謀時寒若能謀事則時寒順之何必倮露形體澆灌衢路鼓舞跳躍而索寒也禮曰立秋之月行夏令寒暑不節陰陽不調政令之失也休咎之應君臣之感也理均影響可不戒哉至景雲二年左拾遺朝曰宗諫傳曰辛有適伊川見被髮於野祭者曰不及百年此其戎乎其禮先亡矣後秦晉遷陸渾之戎於伊川以其中國之人習戎狄之事一言以貫百代可知今之乞寒濫觴胡俗伏願三思籌其所至先天二年十月中書令張說諫曰韓宣適魯見周禮而歎孔子會齊數倡優之罪列國如此況天朝乎今外國請和選使朝謁所望接以禮樂示以兵威雖曰戎狄不可輕易焉知無駒支之辯由余之賢哉且乞寒潑胡未聞典故倮體跳足盛德何觀揮水投泥失容斯甚法殊魯禮襲比齊優恐非干羽柔遠之義罇俎折衝之道願擇芻言特罷此戲至開元元, SBCK: ''}
