  - {type: variant, offset: 35, length: 1, content: 漢, SBCK: 篤敬佛法作善哉天樂大歡天道仙道神王龍王滅過􅁖除愛水斷苦輪十篇名爲正樂陳後主尤重樂聲遣宫女於清樂中造黄鶴留玉樹後庭花金􅁫兩臂垂歌詞綺艶極於輕薄又造無愁曲音韻窈窕極於􅂨思隋􅌆帝不解音律大製艶曲令樂正白明逹造新聲納刑樂萬歳樂藏釣樂七夕相逢樂投壷樂玉女行觴神仙客闘百草汎龍舟還舊宫長樂花等曲皆掩抑摧藏哀音断絶後髙聲獻望明樂曲􅌆帝令知音者於館所聽之歸而肆習及客方獻先於前奏之胡夷皆驚焉又隋開皇􅀄定令置七部樂曲一曰國伎二日清啇伎三曰髙麗伎四曰天笁伎五曰安國伎六曰􅀛兹伎七曰文康使其後牛弘請存鞞鐸巾拂等四舞因稱四舞又焬帝更定清樂爲九部歌}
  - {type: page-break, offset: 35, content: '', id: KR3k0012_SBCK_568-1b}
  - {type: variant, offset: 35, length: 1, content: 漢, WYG: 篤敬佛法作善哉天樂大歡天道仙道神王龍王滅過惡除愛水㫁苦輪十篇名為正樂陳後主尤重樂聲遣宫女於清樂中造黄鶴留玉樹後庭花金釵兩股垂歌詞綺艶極於輕薄又造無愁曲音韻窈窕極於哀思隋煬帝不解音律大製艶曲令樂正白明逹造新聲納形樂萬嵗樂藏鈎樂七夕相逢樂投壺樂玉女行觴神仙客闘百草泛龍舟還舊宫長樂花等曲皆掩抑摧藏哀音㫁絶後髙麗獻望明樂曲煬帝令知音者於舘所聼之歸而肄習及方客獻先於前奏之胡夷皆驚焉又隋開皇中定令置七部樂曲一曰國伎二曰清商伎三曰髙麗伎四曰天竺伎五曰安國伎六曰龜兹伎七曰文康伎其後牛𢎞請存鞞鐸巾拂等四舞因稱四舞又煬帝更定清樂為九部歌}
