  - {type: variant, offset: 4763, length: 0, content: '', SBCK: 昭義節度使王䖍休獻繼天誕聖樂表曰臣伏見開元中天長節度日四海歡娯万年献夀竊以陛下降誕之日有惟新之曲適過之音臣遣成継天誕聖樂一曲天扺官爲調表五音之奉君也以上爲徳知五運之居中也凢二十四遍法二十四氣西成一歳之功也不聞沾懘之音以作中和之樂其曲譜同進上先太常人劉玠流落至潞州䖍休因令造此曲以進今中和樂起於此中又曰顯慶二年上以琴中雅曲古人歌之近代巳來此聲頓絶令所司修習舊典至三年十月八曰太常丞吕才奏按張華􅀶物志白雪是天帝使素女鼓五絃曲名以其調髙人和遂寡自宋玉巳來迄今千祀未有能歌白雪曲者臣今准}
  - {type: page-break, offset: 4763, content: '', id: KR3k0012_SBCK_568-5a}
  - {type: variant, offset: 4763, length: 2, content: 勑臘, WYG: 昭義節度使王䖍休獻繼天誕聖樂表曰臣伏見開元中天長節誕日四海歡娱萬年獻夀竊以陛下降誕之日有惟新之曲適遇知音臣遣成繼天誕聖樂一曲大抵宫為調表五音之本君也以土為徳如五運之居中也凡二十四遍法二十四氣西成一嵗之功也不聞沾滯之音以作中和之樂其曲譜同進上先大常人劉价流落至潞州䖍休因令造此曲以進今中和樂起於此又曰顯慶二年上以琴中樂曲古人歌之近代已来此聲頓絶令所司修習舊典至三年十}
  - {type: page-break, offset: 4763, content: '', id: KR3k0012_WYG_568-7b, image: WYG0898/WYG0898-0236d.png}
  - {type: variant, offset: 4763, length: 0, content: '', krp: 昭義節度使王䖍休獻繼天誕聖樂表曰臣伏見開元中天長節度日四海歡娯万年献夀竊以陛下降誕之日有惟新之曲適過之音臣遣成継天誕聖樂一曲天扺官爲調表五音之奉君也以上爲徳知五運之居中也凢二十四遍法二十四氣西成一歳之功也不聞沾懘之音以作中和之樂其曲譜同進上先太常人劉玠流落至潞州䖍休因令造此曲以進今中和樂起於此中又曰顯慶二年上以琴中雅曲古人歌之近代巳來此聲頓絶令所司修習舊典至三年十月八曰太常丞吕才奏按張華博物志白雪是天帝使素女鼓五絃曲名以其調髙人和遂寡自宋玉巳來迄今千祀未有能歌白雪曲者臣今准}
  - {type: variant, offset: 4764, length: 1, content: 臘, SBCK: 依琴中舊曲定爲宫啇然後教習並合於歌輙以御製雪詩爲白雪歌詞又樂府奏正典之後皆有送聲君唱臣和事彰前史觀取侍中許敬宗等奉和雪詩十六首以爲送聲各十六節上善之仍付太常編於樂府樂府􅄂録曰雨淋鈴者因唐明皇駕廻至駱谷聞雨淋鑾鈴因令張野狐撰爲曲名又曰夜半樂者因唐玄宗自潞州入定内難進軍斬長樂門開時正當夜半平韋庶人後乃命樂人撰此曲又曰黄騘疊者唐太宗􅀄定中原時所䇿黄騘馬後因征遼北馬忽斃上嘆惜乆之因命樂人製此曲又曰得宝子者唐明皇􅀄納太真妃喜甚謂諸嬪御云朕得楊氏如􅀗至宝也因撰此曲又曰文溆子者唐長慶􅀄有俗講僧文淑善吟經兼念四聲觀丗音菩薩其音諧暢感動時人樂工黄米飯依其念菩薩四聲乃撰成曲也又曰楊柳枝曲者白傳典杭州時所撰尋進入教坊也又曰還京樂者唐明皇自蜀返正樂官張野􅀌撰此曲又曰道調子曲者因唐懿皇后樂工史敬約吹觱篥􅀄吹道調懿皇后謂是曲子誤拍敬約乃隨拍便撰此曲也又曰新傾盃樂唐宣宗善吹籚管自撰此曲内有數拍不均上􅀄捻管命樂工辛骨咄拍不中上瞋目視之骨咄憂懼一夕而殞又曰望江南者因朱崖李太尉鎮浙而日爲亡􅁎謝秋娘所撰後進入教坊遂改名一名夢江南曲也又曰康老子者夲長安冨室家子酷好聲樂落托不事生計常與國樂遊處一旦家産蕩盡因詣西鄽遇一媪持舊錦茵貨鬻次康乃酬半千􅀗得之尋有波斯見大驚謂康老曰何處得此至寳此是冰蚕所織􅀂暑}
  - {type: page-break, offset: 4764, content: '', id: KR3k0012_SBCK_568-5b}
  - {type: page-break, offset: 4764, content: '', id: KR3k0012_SBCK_568-6a}
  - {type: variant, offset: 4764, length: 19, content: 臘月乞塞外蕃所出漸浸成俗因循已久自今已, krp: 依琴中舊曲定爲宫啇然}
  - {type: variant, offset: 4766, length: 2, content: 乞塞, SBCK: 陳於榻上可致一室清凉因酬價千萬鬻之康老􅀗此厚價復與國樂追歡不三數年間費用又盡康老尋殁樂嗟歎之乃撰此曲也又曰大郎神者天后朝有一士人䧟􅁈獄仍籍􅃿家族其妻配入掖庭夲􅀄善吹觱篥因撰此曲􅀉其哀情始名大郎神盖取其良人行第也畏人知遂三易其名悲切子離別難終名怨廻鶻羯鼓録曰宋開府孫沇有音律之學貞元中進樂書三卷德宗覽而嘉之知是開府之孫遂召對命坐與論音樂甚喜數曰又召至宣徽張樂使觀焉曰有舛誤乖濫悉可言沇曰容臣與樂官啇摧講論具狀條奏上宣教坊使與樂官叅議數日二使奏樂多言沇曽不解聲調不審節拍又聵疾不可議樂上頗異之又召沇對沇曰臣老年多病耳實失聦􅀂迫於聲律不至無業上又使作樂曲罷問其得失要務舒遟衆工多􅀏之忽忿然作色奏曰曲雖妙其間有不可者上驚問之即指一琵琶云此人逆而忍兼即抵法不冝在至尊前又指一笙云此人神魂巳遊墟墓不可更令供奉上令主者潜伺察之旋而琵琶者爲同儕告訐稱六七年前其父自縊不得端由即令按鞫遂伏其罪笙者憂恐不食旬日而卒上益加知遇面賜章綬累累召對毎令察樂樂工見之悉喘恐脅不敢正視沇懼禍辝病而退女樂部左傳襄二曰鄭人賂晉侯以女樂晉侯以樂之半賜魏絳史記曰孔子爲政齊人懼梨鉏乃選齊國中女樂好音八十人皆衣文而舞康樂文馬三十駟遺魯君陳女樂文馬魯城南臯門}
  - {type: page-break, offset: 4766, content: '', id: KR3k0012_SBCK_568-6b}
  - {type: page-break, offset: 4766, content: '', id: KR3k0012_SBCK_568-7a}
  - {type: variant, offset: 4766, length: 14, content: 乞塞外蕃所出漸浸成俗因循已久, WYG: 八日太常丞吕才奏按張華慱物志曰白雪是天帝使素女鼓五絃曲名以其調髙人和遂寡}
  - {type: variant, offset: 4769, length: 1, content: 蕃, SBCK: 季桓子微服徃觀再三將受乃語魯君徃觀終日怠於政事子路曰夫子可以行矣桓子卒受齊女樂三日不聽政孔子遂行論語曰齊人歸女樂季桓子受之三日不朝孔子遂行後漢書曰馬融字季長違生任性不拘儒者之節常坐髙堂施絳帳前授生徒後列女樂弟子以次相傳鮮有入其室者盧植字子幹侍講數年未甞眄融以是嘉之也魏志曰夏侯惇從太祖征孫權還使惇都督二十六軍留居巢賜妓樂名倡令曰魏絳以和戎之功猶受金石之樂况將軍乎又曰曹爽飲食車服擬於乗輿又私取先帝才人七八將吏師工鼓吹良家子女三十三人皆以爲妓詐作詔書發才人五十七送鄴䑓使先帝婕妤教習爲妓擅取太樂樂器武庫禁兵作窟室綺䟽四周數與何晏等㑹其中縱酒作樂又曰楊阜爲武都太守㑹馬超來寇曹洪置酒大㑹女倡着羅縠衣蹋皷一座皆􅀏楊阜厲聲責洪曰男女有别遂􅁬衣出洪立罷女樂請阜還座肅然憚之陳書章昭逹毎飲㑹必盛設女􅇊􅄂樂俻羗胡之聲音律姿容並一時之妙雖臨敵弗之廢也隋書房暉逺傳髙祖甞謂群臣曰自古天子有女樂乎楊素以莫知}
  - {type: page-break, offset: 4769, content: '', id: KR3k0012_SBCK_568-7b}
  - {type: punctuation, offset: 4772, content: ，, id: KR3k0012_CHANT_568-bkkpn1499}
  - {type: 'tls:seg', offset: 4772, content: '', id: KR3k0012_CHANT_568-40a.81}
  - {type: variant, offset: 4772, length: 2, content: 漸浸, SBCK: 遂言無女樂暉逺進曰臣聞窈窕淑女鍾皷樂之此即王者房中之樂著於雅頌不得言無髙祖大􅀃又曰牛弘修皇后房内之樂文帝龍潜時頗好音樂甞􅀝琵琶作歌二首名曰地厚天髙託言夫妻之義因即取之爲房内曲命婦人並登歌上壽並用之職在宮内女人教習之唐書曰先天元年正月皇太子令宮臣就率更寺閱女樂太子舎之賈曽諌曰臣聞作樂崇德以感神人韶夏有容威英有節婦人媟黷無厠其間昔魯用孔子幾致於覇齊人懼之饋以女樂魯君旣受孔子遂行戎有由余兵強國冨􅁗人反間遺之女妓戎王躭恱由余乃奔斯則大聖名賢疾之巳乆矣良以婦人爲樂必務冶容哇咬動心蠱惑䘮志上行下效􅁋俗將}
  - {type: page-break, offset: 4772, content: '', id: KR3k0012_SBCK_568-8a}
  - {type: variant, offset: 4775, length: 8, content: 俗因循已久自今已, SBCK: 敗國亂人實由兹起殿下􅁥撫餘閑宴私多適}
