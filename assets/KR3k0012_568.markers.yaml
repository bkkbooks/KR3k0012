  - {type: variant, offset: 930, length: 143, content: 前跪具官臣某奏事諸奏凱樂恊律郎學麾鼓吹大振作遍奏破陣樂等四曲樂闋恊律郎偃麾太常卿又跪奏樂畢兵部尚書太常卿退樂工等並於門外立訖然後引俘馘入獻及稱賀如別儀晉書曰衛瓘領太子少傳加千兵百騎鼓吹之府又曰汝南王亮母伏太妃常有小疾祓於洛水亮兄弟三人侍從並持節鼓吹震耀洛濱武帝登凌雲臺望見曰伏妃可謂富貴, WYG: 而已}
