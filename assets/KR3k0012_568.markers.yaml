  - {type: variant, offset: 4798, length: 0, content: '', WYG: 康樂文馬三十駟遺魯君陳女樂文馬魯城南皋門外季桓子㣲服往觀再三將受乃語魯君往觀終日怠於政事子路曰夫子可以行矣桓子卒受齊女樂三日不聼政孔子遂行論語曰齊人歸女樂季桓子受之三日不朝孔子遂行後漢書曰馬融字季長逹生任性不拘儒者之節嘗坐髙堂施絳帳前授生徒後列女樂弟子以次相傳鮮}
  - {type: variant, offset: 4798, length: 0, content: '', krp: 康樂文馬三十駟遺魯君陳女樂文馬魯城南臯門外季桓子微服徃觀再三將受乃語魯君徃觀終日怠於政事子路曰夫子可以行矣桓子卒受齊女樂三日不聽政孔子遂行論語曰齊人歸女樂季桓子受之三日不朝孔子遂行後漢書曰馬融字季長違生任性不拘儒者之節常坐髙堂施絳帳前授生徒後列女樂弟子以次相傳鮮}
