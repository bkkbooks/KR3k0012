  - {type: variant, offset: 4802, length: 2, content: 胡旋, WYG: 連列琴瑟細妓畢偹漢晉陽秋曰晉文王與劉禪宴為之作蜀舊樂傍人皆代禪感而襌語笑自若王謂賈充曰人之無情乃至是乎雖使諸葛亮在不能輔之久全况姜維耶充曰不如是何由併之哉夏仲御别傳曰仲御從父家女巫章丹陳殊二人妍姿冶媚清歌妙舞状若飛仙又曰仲御當正㑹宗弟承問御曰黄帳之裏西施之孫鄭袖之子膚如凝脂顔如桃李徘徊容與載進載止彈琴而奏清角翔風至而𤣥雲起若乃擕手交舞流盼頡頏足踰鞞鼓口銜笙簧丹裙赫以四序素耀煥以揚光赴急絃而折倒應緩節以相羊逺望而雲近視而雪舒紅顔而㣲笑啓朱唇而揚聲世説曰魏武有一妓聲最清高而酷惡性情欲殺則愛其才欲置則不堪於是選百人一時}
  - {type: page-break, offset: 4802, content: '', id: KR3k0012_WYG_568-15a, image: WYG0898/WYG0898-0240c.png}
  - {type: page-break, offset: 4802, content: '', id: KR3k0012_WYG_568-15b, image: WYG0898/WYG0898-0240d.png}
  - {type: variant, offset: 4802, length: 2, content: 胡旋, krp: 連倒琴瑟細伎畢俻漢晉陽秋曰晉文王與劉禪宴爲之作蜀伎樂傍人皆代禪感而禪語笑自若謂賈充曰人之無情乃至是乎雖使葛亮在不能輔之乆全况姜維耶充曰不如是何由併之哉夏仲御別傳曰仲御從父家女巫章丹陳珠二女妍姿冶媚清歌妙舞狀若飛仙又曰仲御當正㑹宗弟承問御曰黄帳之裏西施之孫鄭䄂之子膚如凝脂顔如桃李徘徊容與載進載止彈琴而奏清角翔風至而玄雲起若乃携手交舞流盻頡頑足踰鞞皷口衘笙黄丹裙赫以四序素耀煥以楊光赴急絃而折倒應緩節以相佯逺望而雲近視而雪舒紅顔而微笑啓朱唇而揚聲丗說曰魏武有一伎聲最清髙而酷悪性情欲殺則愛其才欲置則不堪於是選百人一時}
