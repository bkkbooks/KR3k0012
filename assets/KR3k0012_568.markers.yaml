  - {type: variant, offset: 30, length: 0, content: '', WYG: 也楊叛兒齊隆昌時有楊旻母為師巫旻小隨母入宫及長為后所幸童謡曰楊婆兒共戯来語訛為叛兒西烏飛宋州刺史沈攸之舉兵思歸所作詞云白日落西山還去来上震樂梁武帝所作有七曲鳳臺桐栢方寸諸玉龜金丹等築地樂梁孝王築睢陽城方七十里唱聲相杵}
