  - {type: variant, offset: 97, length: 1, content: 為, SBCK: 明君雅歌各二首四時四首合三十七首又七曲有聲無詞上林鳯雛平調清調瑟調平折命嘯通前四十四篇在焉見通典當江南}
  - {type: variant, offset: 97, length: 0, content: '', WYG: 明君雅歌各二首四時四首合三十七首又七曲有聲無詞上林鳳雛平調清調瑟調平折命嘯通前四十四篇在焉見通典當江南之中舞白紵巴渝等衣服各異至梁武改省之宋以江左諸曲哇滛然而縱容雅緩猶有士君子之風焉自長安年以後朝廷不重古典工伎漸缺能合於管絃者唯明君楊叛兒驍壺春歌白雲堂堂春江花月夜八曲舊樂多或數百言明君尚能四十言今所傳二十六言漸訛失與吳音轉逺宜取於吳人使之傳習開元中有歌工李郎子北人也調聲已失云學於前才生郎子亡後清樂唯歌一曲詞典詞典而音雅自周隋已末多用西涼樂鼔舞曲多同龜詞樂其典度皆時俗所知也唯琴家獨傳椘漢聲及清調瑟調蔡邕五弄謂之九筭獨聲獨存非朝廷郊廟所用故不載自唐虞迄三代舞用國子樂用瞽師漢魏已後皆以賤𨽻}
