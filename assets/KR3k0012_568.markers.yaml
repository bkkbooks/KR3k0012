  - {type: variant, offset: 4799, length: 2, content: 骨鹿, krp: 入其室者盧植字子幹侍講數年未甞眄融以是嘉之也魏志曰夏侯惇從太祖征孫權還使惇都督二十六軍留居巢賜妓樂名倡令曰魏絳以和戎之功猶受金石之樂况將軍乎又曰曹爽飲食車服擬於乗輿又私取先帝才人七八將吏師工鼓吹良家子女三十三人皆以爲妓詐作詔書發才人五十七送鄴䑓使先帝婕妤教習爲妓擅取太樂樂器武庫禁兵作窟室綺䟽四周數與何晏等㑹其中縱酒作樂又曰楊阜爲武都太守㑹馬超來寇曹洪置酒大㑹女倡着羅縠衣蹋皷一座皆笑楊阜厲聲責洪曰男女有别遂奮衣出洪立罷女樂請阜還座肅然憚之陳書章昭逹毎飲㑹必盛設女伎雜樂俻羗胡之聲音律姿容並一時之妙雖臨敵弗之廢也隋書房暉逺傳髙祖甞謂群臣曰自古天子有女樂乎楊素以莫知所出遂言無女樂暉逺進曰臣聞窈窕淑女鍾皷樂之此即王者房中之樂著於雅頌不得言無髙祖大說又曰牛弘修皇后房内之樂文帝龍潜時頗好音樂甞倚琵琶作歌二首名曰地厚天髙託言夫妻之義因即取之爲房内曲命婦人並登歌上壽並用之職在宮内女人教習之唐書曰先天元年正月皇太子令宮臣就率更寺閱女樂太子舎之賈曽諌曰臣聞作樂崇德以感神人韶夏有容威英有節婦人媟黷無厠其間昔魯用孔子幾致於覇齊人懼之饋以女樂魯君旣受孔子遂行戎有由余兵強國冨秦人反間遺之女妓戎王躭恱由余乃奔斯則大聖名賢疾之巳乆矣良以婦人爲樂必務冶容哇咬動心蠱惑䘮志上行下效淫俗將成敗國亂人實由兹起殿下監撫餘閑宴私多適後庭妓樂古或有之至於所司教習彰示群僚慢妓淫聲實虧睿化伏願並令禁斷墨子曰秦繆公之時戎強大繆公遺之女樂二八與良宰戎王大喜以其故數飲食日夜不休左右有言秦冦之至者因扞弓而射之扞引秦冦果至戎王醉而卧於尊下卒生縛之未禽則不知登山而視牛若羊視羊若豚牛之性不若羊羊之徃不若豚所自視之勢逆也而因怒於牛羊之性也此狂者也狂而以行賞罰此戴氏之所以絶韓子曰晉韓公欲伐虞􅉑乃遺之屈産之乗垂棘之璧女樂二八以熒其心亂其政郭子曰謝公在東山畜妓簡文曰安石必出與人同樂不與人同憂注曰謝以安石也石虎鄴中記曰虎大㑹禮樂旣陳虎繳兩閣上䆫幌宮人數千陪列看坐悉服飾金銀熠熠又於閣上作女妓數百衣皆絡珠璣皷}
