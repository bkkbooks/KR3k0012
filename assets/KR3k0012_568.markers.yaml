  - {type: 'tls:seg', offset: 4804, content: '', id: KR3k0012_CHANT_568-41a.4}
  - {type: variant, offset: 4805, length: 0, content: '', WYG: 教少時百人中果有一人聲及之便殺向惡性者俗説曰宋禕是石崇妓緑珠弟子有國色善吹笛後在晉明帝所帝疾患危篤羣臣進諌請出宋禕時朝賢悉見帝曰卿諸人誰欲得之者衆人無言阮遥集時為吏部尚書對曰願以賜臣即與之鹽鐡論曰貴人之家中山素女撫流徴}
  - {type: page-break, offset: 4805, content: '', id: KR3k0012_WYG_568-16a, image: WYG0898/WYG0898-0241a.png}
  - {type: variant, offset: 4805, length: 0, content: '', krp: 教少時百人中果有一人聲及之便殺向惡性者俗說曰宋椲是石崇伎緑朱弟子有國色善吹笛後在晉明帝聞帝疾患危篤群臣進諌請出宋禕時朝賢悉見帝曰卿諸人誰欲得之者衆人無言阮遥集時爲吏部尚書對曰願以賜臣即與之􅐭鐵論曰貴人之家中山素女撫流徴}
  - {type: variant, offset: 4806, length: 0, content: '', WYG: 堂上鳴鼓巴俞交作於堂下婦人被羅紈婢妾曵絺紵賢良曰古者彈筝鼔缶而已無妙要之音今富者鳴筝調琴鄭舞趙謳續捜神記曰袁真在豫州遣女妓紀陵阿薛阿郭阿馬三奴與桓宣武既至經時三人共出庭前觀忽有}
  - {type: variant, offset: 4806, length: 0, content: '', krp: 堂上鳴皷巴俞交作於堂下婦人𬒳羅紈婢妾曳絺紵賢良曰古者彈筝鼓缶而巳無妙要之音今冨者鳴筝調琴鄭舞趙謳續捜神記曰袁真在豫州遣女伎紀陵阿薛阿郭阿馬三妓與桓宣武旣至經時三人共出庭前觀忽有}
  - {type: variant, offset: 4807, length: 3, content: 小圓毯, SBCK: 一䟽着手巾箱下先有藥方客旣集因問命曲先取所䟽者誤得藥方便言是䟽方有附}
  - {type: variant, offset: 4807, length: 3, content: 小圓毯, WYG: 流星直堕盆池烱然明净薛郭二人更以瓢酌取皆不得阿馬最後取正入瓢中便飲之即覺有娠遂生桓𤣥世説曰王導作女妓蔡謨在坐不悦而去導知亦不止之笑林曰某甲者為覇府佐為人都不解每至集㑹有聲樂之事已輙豫焉而耻不解妓人奏讃之已亦學人仰讃和同時人士令已作主人并使喚妓客妓客未集召妓具問曲吹一一疏着手巾箱下先有藥方客既集因問命曲先取所疏者誤得藥方便言是疏方有附}
  - {type: page-break, offset: 4807, content: '', id: KR3k0012_WYG_568-16b, image: WYG0898/WYG0898-0241b.png}
  - {type: variant, offset: 4807, length: 3, content: 小圓毯, krp: 流星直墮盆池冏然明浄薛郭二人更以瓢酌取皆不得阿馬最後取正入瓢中便飲之即覺有娠遂生桓温丗說曰王導作女伎蔡謨在坐不恱而去導知亦不止之笑林曰某甲者爲覇府佐爲人都不解每至集㑹有聲樂之事己輙豫焉而耻不解妓人奏讃之已亦學人仰讃和同時人士令巳作主人并使喚妓客妓客未集召妓具問曲吹一一䟽着手巾箱下先有藥方客旣集因問命曲先取所䟽者誤得藥方便言是䟽方有附}
