  - {type: variant, offset: 47, length: 4, content: 回擁離戰, SBCK: 遺聲其始即清啇三調是也並漢氏巳來舊典樂噐製度并諸歌章古調與魏三祖作者皆􅀍史籍自晉氏播遷其音分散不復存於内地符堅滅梁得之于前後二􅁗及宋武定􅀜中收之入江南及隋平陳後􅀗之隋文聽之善其節奏曰此華夏正聲也因更損益去其哀怨考而􅀘之乃置清署啇揔謂之清樂西倞等爲九部隋室䘮乱日益淪缺矣后朝猶有六十三曲今其詞存者有白雲公莫巴渝明君之君鐸舞曰鳩子夜吴聲四時歌前溪阿子歡聞圑扇懊惱白紵玉樹後庭花春江花春江月夜長史變丁督護讀曲烏夜啼石}
