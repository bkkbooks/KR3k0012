  - {type: variant, offset: 4792, length: 0, content: '', SBCK: 墨子曰秦繆公之時戎強大繆公遺之女}
  - {type: variant, offset: 4793, length: 0, content: '', SBCK: 二八與良宰戎王大喜以其故數飲食日夜不休左右有言􅁗冦之至者因扞弓而射之扞引􅁗冦果至戎王醉而卧於尊下卒生􅅞之未禽則不知登山而視牛􅀂羊視羊􅀂豚牛之性不􅀂羊羊之徃不􅀂豚所自視之􅀔逆也而因怒於牛羊之性也此狂者也狂而以行賞罰此戴氏之所以絶韓子曰晉韓公欲伐虞􅉑乃遺之屈産之乗垂􅁄之璧女樂二八以熒其心亂其政郭子曰謝公在東山畜妓簡文曰安石必出與人同樂不與人同憂注曰謝以安石也石虎鄴中記曰虎大㑹禮樂旣陳虎繳兩閣上䆫幌宮人數千陪列看坐悉服飾金銀熠熠又於閣上作女妓數百衣皆絡珠璣皷舞連倒琴瑟細􅇊畢俻漢晉陽秋曰晉文王與劉禪宴爲之作蜀􅇊樂傍人皆代禪感而禪語􅀏自􅀂謂賈充曰人之無情乃至是乎雖使葛亮在不能輔之乆全况姜維耶充曰不如是何由併之哉夏仲御別傳曰仲御從父家女巫章丹陳珠二女妍姿冶媚清歌妙舞狀􅀂飛仙又曰仲御當正㑹宗弟承問御曰黄帳之裏西施之孫鄭䄂之子膚如凝脂顔如桃李徘徊容與載進載止彈琴而奏清角翔風至而玄雲起􅀂乃携手交舞流盻頡頑足踰鞞皷口衘笙黄丹裙赫以四序素耀煥以楊光赴急絃而折倒應緩節以相佯逺望而雲近視而雪舒紅顔而微􅀏啓朱唇而􅀭聲丗􅀃曰魏武有一伎聲最清髙而酷􅁖性情欲殺則愛其才欲置則不堪於是選百人一時俱教少時百人中果有一人聲及之便殺向惡性者俗􅀃曰宋椲是石崇伎緑朱弟子有國色善吹笛後在晉明帝聞帝疾患危篤群臣進諌請出宋禕時朝賢悉見帝曰卿諸人誰欲得之者衆人無言阮遥集時爲吏部尚書對曰願以賜臣即與之􅐭鐵論曰貴人之家中山素女撫流徴於堂上鳴皷巴俞交作於堂下婦人􅀍羅紈婢妾曳絺紵賢良曰古者彈筝鼓􅇲而巳無妙要之音今冨者鳴筝調琴鄭舞趙謳續捜神記曰􅀽真在豫州遣女伎紀陵阿薛阿郭阿馬三妓與桓宣武旣至經時三人共出庭前觀忽有一流星直墮盆池冏然明浄薛郭二人更以瓢酌取皆不得阿馬最後取正入瓢中便飲之即􅁴有娠遂生桓温丗􅀃曰王導作女伎蔡謨在坐不恱而去導知亦不止之􅀏林曰某甲者爲覇}
