  - {type: variant, offset: 4797, length: 0, content: '', WYG: 雨淋鈴者因唐明皇駕囬至駱谷聞雨淋鈴因令張野狐撰為曲名又曰夜半樂者因唐𤣥宗自潞州入定内難進軍斬長樂門時正當夜半平韋庶人後乃命樂人撰此曲又曰黄驄叠者唐太宗初定中原時所策黄驄馬後因征遼北馬忽斃上嘆惜乆之因命樂人製此曲又曰得寳子者唐明皇初納太真妃喜甚謂諸嬪御云朕得楊氏如獲至寳也因撰此曲又曰文淑子者唐長慶初有俗講僧文淑善吟經兼念四聲觀世音菩薩其音諧暢感動時人樂工黄米飯依其念菩薩四聲乃撰成曲也又曰楊柳枝曲者白傳典杭州時所撰尋進入教坊也又曰還京樂者唐明皇自蜀反正樂官張野狐撰此曲又曰道調子曲者因唐懿皇后樂工史敬約吹觱篥初吹道調懿皇后謂是曲子誤拍敬約乃隨拍便撰此曲也又曰新傾盃樂唐宣宗善吹蘆管自撰此曲内有數拍不均上初捻管命樂工辛骨咄拍不中上瞋目視之骨咄憂懼一夕而殞又曰望江南者因朱崖李太尉鎮浙西日為亡姬謝秋娘所撰後進入教坊遂改名一名夢江南曲也又曰康老子者本長安富室家子酷好聲樂落托不事生訃常與國樂遊處一旦家産蕩盡因詣西廊遇一娼持舊錦茵貨鬻次康乃酧半千獲得之尋有波斯見大驚謂康老曰何處得此至寳此是冰蠶所織若暑月陳於榻上可致一室清凉因酧價千萬鬻之康老獲此厚價復與國樂追歡不三數年間費用又盡康老尋歿國樂嗟嘆之乃撰此曲也又曰大郎神者天后朝有一士人陥寃獄仍籍沒家族其妻配入掖庭本初善吹觱篥因撰此曲寄其哀情始名大郎神盖取其良人行第也畏人知遂三易其名悲切子離别難終名怨廻鶻羯鼔録曰宋開府孫沆有音律之樂貞元中進樂書三卷徳宗覽而嘉之知是開府之孫遂召對命坐與論音樂甚喜數日又召至宣徽張樂使觀焉曰有舛誤乖濫悉可言沆曰容臣與樂官商確講論具状條奏上宣教坊使與樂官叅議數日二使奏樂多言沆曾不解聲調不審節拍又聵疾不可議樂上頗異之又召沆對沆曰臣老年多病耳實失聰若迨於聲律不至無業上又使作樂曲罷問其得失禀務舒遲衆工多笑之忽忿然作色奏曰曲雖妙其間有不可者上驚問之即指一琵琶云此人逆而忍兼即抵法不宜在至尊前又指一笙云此人神魂已遊墟墓不可更令供奉上令主者潛伺察之旋而琵琶者為同儕告訐稱六七年前其父自縊不得端由即令按鞫遂伏其罪笙者憂恐不食旬日而卒上益加知遇面賜章綬累累召對每令察樂樂工見之悉喘恐脇不敢正視沆懼禍辭病而退女樂左傳襄二年鄭人賂晉侯以女樂晉侯以樂之半賜魏絳史記曰孔子為政齊人懼犂鉏乃選齊國中女樂好音八十人皆衣文采而}
