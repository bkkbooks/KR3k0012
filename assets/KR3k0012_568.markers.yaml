  - {type: variant, offset: 3546, length: 288, content: 種為一部工十八人歌曲有歌芝栖舞曲有舞芝栖北狄樂皆馬上樂也鼓吹本軍旅之音馬上奏之故自漢以來北狄樂揔歸鼓吹署後魏樂府始有北歌即魏史所謂真人歌是也代都時命掖庭宮女晨夕歌之周隋代興西涼樂雜奏今存者五十三章其名因可解者六章慕容可汗吐谷渾部落稽鉅鹿公主白淨王太子企俞也其餘不可解或可汗之詞按今大角即後魏代箕邏逈是也其曲亦多可汗之詞北虜之俗皆呼主為可汗吐谷渾又慕容別種知此歌是燕魏之際鮮卑歌詞虜音不可曉梁有鉅鹿公主歌似是姚萇時歌詞華音與此歌不同梁樂府鼓改又有大白淨皇太子小白淨皇太子企俞等曲隋鼓吹有白淨王太子曲與北歌校之其音皆異唐書樂志曰安樂後周武帝平齊所作也行列方正象城郭周代謂之城舞者八, SBCK: ''}
