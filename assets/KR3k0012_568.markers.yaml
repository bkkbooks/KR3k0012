  - {type: variant, offset: 958, length: 802, content: 四曲樂闋恊律郎偃麾太常卿又跪奏樂畢兵部尚書太常卿退樂工等並於門外立訖然後引俘馘入獻及稱賀如別儀晉書曰衛瓘領太子少傳加千兵百騎鼓吹之府又曰汝南王亮母伏太妃常有小疾祓於洛水亮兄弟三人侍從並持節鼓吹震耀洛濱武帝登凌雲臺望見曰伏妃可謂富貴矣又曰劉毅字仲雄轉司隸校尉皇太子朝鼓吹將入東掖門毅以為不敬止於門外奏劾保傅以下詔赦之然後得入又曰謝尚累位江夏義陽隨三郡太守往諮事安西將軍庾翼於武昌翼呼共射曰君若破的當以鼓吹相賞尚應聲中之翼即以副鼓吹給之王隱晉書曰陶侃平蘇峻除侍中太尉加羽葆鼓吹晉中興書曰漢武時南平百越始置交阯九真日南合浦南海鬱林蒼梧凡七郡立交趾剌史以州邊遠山越不賓宜加威重故剌史輒假節七郡皆加鼓吹齊書武帝時壽昌畫殿南閣置白鷺鼓吹二部乾光殿東西頭置鍾磬兩箱皆宴樂處也又曰王敬則臨淮射陽人也僑居晉陵南沙縣母為女巫常謂人云敬則生時胞衣紫色後應得鳴鼓角人笑之曰汝子得為人吹角可矣又曰張敬兒將拜三司謂其妻嫂曰我拜後應開黃閤因口自為鼓吹聲初得鼓吹羞便奏之南史綦母珍之貴倖珍之母隨弟欽之作暨楊令欽之罷縣還珍之迎母至湖孰輒將青氅百人自隨鼓角橫吹都下當人追從者百數又曰桓崇祖初於淮陰見高帝便自比韓白唯上獨許之後為豫州剌史建元二年魏攻壽春崇祖破之啟至上謂朝臣曰崇祖恒自擬韓白今真人也進為都督崇祖聞陳顯達李安人皆增給軍儀乃啟求鼓吹上勑曰韓白何可不與眾異給鼓吹一部又曰張興世致位給事中興世父嘗謂興世曰我雖田舍老公樂聞鼓角汝可送一部竹田時欲吹之興世素恭謹畏法譬之曰此是天子鼓角非田舍公所吹梁典曰高祖衍生秣陵三樓橋宅生日有異光頂有五岳骨當還宅范雲聞鼓吹之聲蒙被出視乃高祖也雲乃深自結託梁書侯景即位乃以廣抑車載鼓吹橐駞馬負犧牲輦上置筌蹄垂腳坐焉又曰胡僧祐字顯果為天水天門二郡太守性好葺綴文詞又多鄙拙多被戲謔自矜尤甚後隨伐侯景廻拜領將軍常以所加鼓部置齋中對之人或獻言此乃羽儀公望隆重不當如此荅曰我愛之人莫不笑之陳書劉仲舉字德言為長安令政號廉, SBCK: 隋}
