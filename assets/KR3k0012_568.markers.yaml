  - {type: variant, offset: 1286, length: 474, content: 處也又曰王敬則臨淮射陽人也僑居晉陵南沙縣母為女巫常謂人云敬則生時胞衣紫色後應得鳴鼓角人笑之曰汝子得為人吹角可矣又曰張敬兒將拜三司謂其妻嫂曰我拜後應開黃閤因口自為鼓吹聲初得鼓吹羞便奏之南史綦母珍之貴倖珍之母隨弟欽之作暨楊令欽之罷縣還珍之迎母至湖孰輒將青氅百人自隨鼓角橫吹都下當人追從者百數又曰桓崇祖初於淮陰見高帝便自比韓白唯上獨許之後為豫州剌史建元二年魏攻壽春崇祖破之啟至上謂朝臣曰崇祖恒自擬韓白今真人也進為都督崇祖聞陳顯達李安人皆增給軍儀乃啟求鼓吹上勑曰韓白何可不與眾異給鼓吹一部又曰張興世致位給事中興世父嘗謂興世曰我雖田舍老公樂聞鼓角汝可送一部竹田時欲吹之興世素恭謹畏法譬之曰此是天子鼓角非田舍公所吹梁典曰高祖衍生秣陵三樓橋宅生日有異光頂有五岳骨當還宅范雲聞鼓吹之聲蒙被出視乃高祖也雲乃深自結託梁書侯景即位乃以廣抑車載鼓吹橐駞馬負犧牲輦上置筌蹄垂腳坐焉又曰胡僧祐字顯果為天水天門二郡太守性好葺綴文詞又多鄙拙多被戲謔自矜尤甚後隨伐侯景廻拜領將軍常以所加鼓部置齋中對之人或獻言此乃羽儀公望隆重不當如此荅曰我愛之人莫不笑之陳書劉仲舉字德言為長安令政號廉, WYG: 等隋}
