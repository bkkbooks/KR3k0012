  - {type: variant, offset: 2615, length: 458, content: 至於寒蟬才齊其美獨未之思而莫斯述夫頭上有幘則其文也含氣飲露則其清也黍稷不享則其廉也處不巢居則其儉也應候守常則其信也加以冠冕則其容也君子則其操可以事君可以立身豈非至德之蟲哉且攀木寒鳴貪士所歎余昔僑處竊有感焉公侯常伯乃身紆紫黻手執龍淵俯鳴佩玉仰撫貂蟬於上盧之多士光帝皇之侍人騰儀像於雲闥望景曜乎通天邁休聲之五德豈烏雞之獨珍傅玄蟬賦曰美茲蟬之純潔稟陰陽之微靈傅咸粘蟬賦曰櫻桃其為樹則多蔭其為果則先熟故種之於廳所之前時以盛暑逍遙其下有蟬鳴仰而見之故命粘取以弄小兒退惟當蟬之得意於富貴而不虞禍之將來也蠅韓詩曰雞鳴讒人也匪雞則鳴蒼蠅之聲薛君曰雞遠鳴蠅聲相似也毛詩甫田曰青蠅大夫剌幽王也營營青蠅止于樊蠅之為蟲汙白使黑汙黑使白喻佞人變亂善惡也豈弟君子無信讒言營營青蠅止于棘讒人罔極交亂四國漢書曰成帝建始元年六月青蠅萬數集未央宮殿中朝者坐服虔曰公卿以下朝會坐也又曰昌邑王賀夢青蠅矢積西階可五六石以屋版瓦覆發視之青蠅矢也以問龔遂遂曰陛下之側讒人眾多願皆放逐之賀不用其言卒至於廢也東觀漢記曰光武與隗囂書曰蒼蠅之飛不過三數步托驥之尾得以絕群, SBCK: ''}
