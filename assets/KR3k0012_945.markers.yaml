  - {type: variant, offset: 237, length: 165, content: 化風列波激故其命從蟲蟲之為言屈申也東觀漢記曰永平三年春有司奏立長秋宮以率八妾上未有所言皇太后曰馬貴人德冠後宮遂登至尊先之數日夢有小飛蟲萬數隨著身入皮膚中復飛去魏書華佗傳曰廣陵太守陳元龍得疾所苦胸中煩滿面赤不能飯佗持其脈曰府君胃蟲有數升欲成內蝕病食腥物所為也今可去也即作湯二升先飲一升須臾復一升食頃吐出數升蟲長一二寸赤頭皆搖半軀皆是, SBCK: ''}
