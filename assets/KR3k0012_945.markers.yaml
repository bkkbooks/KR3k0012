  - {type: variant, offset: 2075, length: 1373, content: 有少孺子者欲諫不敢則懷九操彈於後園露沾其衣如是者三旦吳王曰子來何若沾衣如此對曰園中有樹其上有蟬蟬高居悲鳴飲露不知螳蜋在其後也螳蜋委身曲附欲取蟬而不知黃雀在其旁也黃雀延頸欲啄螳蜋而不知彈丸在其下也此三者皆務欲得其前利而不顧其後之有患也吳王曰善哉乃罷其兵論衡曰王充建武三年生為小兒不妄狎儕倫不掩雀捕蟬鹽鐵論曰以所不覩不信人若蟬之不知雪揚雄方言曰蟬楚謂之蜩宋衛之間謂之螗蜩江南呼為螗蛦也陳鄭之間謂之蜋蜩蜋音良秦晉之間謂之蟬海岱之間謂之𦭶齊人呼為巨𦭶音枝其大者謂之蟧或謂之蝒音綿馬按爾雅蝒者馬蜩非別名蝒馬也此方言誤耳其小者謂之陵蚻如蟬而小青色今關西呼為凌蠽也有文者謂之蜻蜻爾雅云蚻蜻蜻即夌蚻也其雌謂之疋必一切大而黑者謂之踐音棧黑而赤者謂之蜺雲霓蜩蟧謂之芽蜩江東呼為茅蠽𧕄謂之寒蜩闇蜩按爾雅以蜺為寒蜩月令亦曰寒蟬鳴則寒蟬非瘖者此諸蟬名通出爾雅而多駮錯未可詳據也寒蟬寒螿也似蟬而小𧕄音應崔豹古今註曰牛亨問董仲舒曰蟬為齊女何荅曰昔齊王后怨王而死尸變為蟬登庭樹嘒唳而鳴王悔恨之故曰齊女又曰貂蟬胡服也貂者取其有文而不煥外柔而易內剛而勁也蟬者取其清虛而識時變也在位者有文而自耀有武而不示人清虛自牧識時而動也曹大家蟬賦曰吸清露於丹園抗喬枝而理翮崇皇朝之輝光映豹豹而灼灼陸雲寒蟬賦曰昔人稱雞有五德而作賦焉至於寒蟬才齊其美獨未之思而莫斯述夫頭上有幘則其文也含氣飲露則其清也黍稷不享則其廉也處不巢居則其儉也應候守常則其信也加以冠冕則其容也君子則其操可以事君可以立身豈非至德之蟲哉且攀木寒鳴貪士所歎余昔僑處竊有感焉公侯常伯乃身紆紫黻手執龍淵俯鳴佩玉仰撫貂蟬於上盧之多士光帝皇之侍人騰儀像於雲闥望景曜乎通天邁休聲之五德豈烏雞之獨珍傅玄蟬賦曰美茲蟬之純潔稟陰陽之微靈傅咸粘蟬賦曰櫻桃其為樹則多蔭其為果則先熟故種之於廳所之前時以盛暑逍遙其下有蟬鳴仰而見之故命粘取以弄小兒退惟當蟬之得意於富貴而不虞禍之將來也蠅韓詩曰雞鳴讒人也匪雞則鳴蒼蠅之聲薛君曰雞遠鳴蠅聲相似也毛詩甫田曰青蠅大夫剌幽王也營營青蠅止于樊蠅之為蟲汙白使黑汙黑使白喻佞人變亂善惡也豈弟君子無信讒言營營青蠅止于棘讒人罔極交亂四國漢書曰成帝建始元年六月青蠅萬數集未央宮殿中朝者坐服虔曰公卿以下朝會坐也又曰昌邑王賀夢青蠅矢積西階可五六石以屋版瓦覆發視之青蠅矢也以問龔遂遂曰陛下之側讒人眾多願皆放逐之賀不用其言卒至於廢也東觀漢記曰光武與隗囂書曰蒼蠅之飛不過三數步托驥之尾得以絕群後漢書曰楊章為杜喬李固薦為平原令後喬固被刑章行赴洛見喬固暴屍坐其旁驅逐蠅蟲魏略曰王思正始中為大司農性急嘗執筆作書蠅集筆端驅去復來如是再三思怒自趁逐蠅不能得還取筆擲地踏壞之張勃吳錄曰曹不興帝使畫屏風筆落素便點為蠅帝疑生乃彈之前秦書曰符堅欲赦與王猛符融議甘露堂悉屏左右堅親為赦文有大蒼蠅集于筆端驅而復來俄而長安街巷人相告曰官今大赦有司以聞堅驚曰禁中無屬耳之垣事何從泄也勑窮之咸言有一小兒衣青衣大呼于市曰官令大赦須臾不見堅歎曰其向蒼蠅乎梁書曰昭明太子食中頻得蠅蟲之類密置拌邊恐廚人獲罪不令人知見北史曰庫狄伏連居室患蠅杖門者曰何故聽入唐書曰武儒衡為中書舍人元稹知制誥儒衡一日因會食公堂有蠅集瓜上忽發怒命繫去之曰適從何所夾而遽集此淮南子曰夫江河之腐胔不可勝數也然祭者汲焉大也一盃酒蠅漬其中匹夫弗嘗小也朝子曰以火去蛾蛾愈多以魚毆蠅蠅愈至呂氏春秋曰以狸致鼠以冰致蠅, WYG: ''}
