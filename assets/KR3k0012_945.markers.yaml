  - {type: variant, offset: 850, length: 5, content: 毒粥陳則旁, SBCK: 蠓蟈之育於醢酢芝檽之産於木石蛣􅔒之滋於洿游翠蘿之老於松枝非彼四物所創造也字書曰蠛蠓小虫三風舂􅀨磑者也蝴蝶北齊書曰魏収甞在洛京輕薄尤甚人號云魏収驚蛺蝶文襄曽遊東山令給事黃門侍郎等宴文襄曰魏収􅀶才無冝適湏出其短徃復數畨収忽大唱曰楊遵彦理屈巳倒遵彦從容曰我綽}
