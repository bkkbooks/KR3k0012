  - {type: variant, offset: 13, length: 3, content: 無足謂, SBCK: 有角大如指長三四寸甲下有翅能飛夏月隂􅀨時地中出令人􅏫炙噉}
  - {type: variant, offset: 13, length: 0, content: '', WYG: 有角大如指長三四寸甲下有翅能飛夏月隂雨時地中出今人燒炙噉之美於蟬也樊光曰是糞中蝎蟲隨時而出朝生而夕死淮南子曰龜三千嵗蜉蝣不飲食三日而死以蜉蝣為龜憂養生之具必失之廣志曰蜉蝣可燒啖美於蟬蜉蝣在水中翕然生覆水上尋死隨流而去傅咸蜉蝣賦曰讀詩至蜉蝣感其雖朝生暮死而能修其翼可以有興遂賦之王褒聖主得賢臣頌曰蟋蟀候秋吟蜉蝣出以隂蠛蠓爾雅曰蠓蠛蠓小虫似蚋喜亂飛漢實録曰周太祖軍至北郊時慕容彦超自負沉勇謂上曰北來部將臣盡諳知以臣觀之蜉蝣蠛蠓耳列子曰朽壤之土春夏之月蠛蠓者因雨而生見陽而死莊子曰孔子聞老􅔶之言出告顔回曰丘之於道也其猶醯雞歟淮南子曰衰世則聚䖝蒲野許質曰飛虫蠛蠓抱朴子曰蠓蟈之育於􅀈酢芝檽之産於木石螛􅔒之滋於洿翠蘿之老於松枝非彼四物所創造也字書曰蠛蠓小蟲雨如舂風如磑者也蝴蝶北齊書曰魏收嘗在洛京輕薄尤甚人號云魏収驚蛺蝶文襄曾遊東山令給事黄門侍郎等宴文襄曰魏収博才}
