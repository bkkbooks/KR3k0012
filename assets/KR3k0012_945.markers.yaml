  - {type: variant, offset: 1750, length: 293, content: 仲尼曰巧乎有道耶曰我有道也五六月累丸二而不墜則失者錙銖累二九於竿頭是用手足亭審也累三而不墜則失者十一所失愈少也累五而不墜猶掇之也吾處身也若厥株拘吾執臂也若槁木之枝雖天地之大萬物之多而唯蜩翼之知吾不反不側不以萬物易蜩之翼何為不得遺彼故得此也又曰鵬之飛其翼若垂天之雲搏扶搖而上者九萬里去以六月一息者也蜩與鷽鳩笑之曰我決處而飛槍榆枋而止時則不至而空於地而已奚以九萬里而圖南為也孫卿子曰曜蟬者務明其火振其樹若火不明雖振樹無益人有明德則天下歸之若蟬歸明火也又見呂氏春秋淮南子曰孟秋涼風至白露降寒蟬鳴寒蟬青蟬也蟲陰類感氣鳴也又曰虵不足而行魚無耳而聽蟬無口而鳴有然之者也然如是也又曰蠶食而不飲二十二日, WYG: 取螟蛉}
