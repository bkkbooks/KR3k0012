  - {type: variant, offset: 8, length: 0, content: '', krp: 蜉蝣渠略似蛣蜣身狹而長角黄黑色叢生糞土中朝生暮死猪好啖之說文曰秦晉之間謂蜉蝣爲渠略郭璞注曰似天牛而小}
