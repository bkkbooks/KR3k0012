  - {type: variant, offset: 5, length: 0, content: '', WYG: 焉目明者見之每生九卵復成九子蜚而俱出蚊初不知論衡曰蚊䖟不如牛馬之力牛馬困於蚊䖟蚊䖟有勢也搜神記曰呉猛性至孝小兒時在父母邉卧夏時多蚊蚋而終不揺扇恐蚊䖟去已而及父母嶺南異物志曰嶺表有樹如冬青實在枝間形如枇把子每熟即拆裂蚊子羣飛唯皮殻而已士人謂之蚊子樹嶺表録異曰蚊母鳥形如青鷁觜大而長於池塘捕魚而食每呌一聲則有蚊蚋飛出其口俗云採其翎為扇可辟蚊子亦呼為吐蚊鳥䖟晉書曰惠帝時洛陽南山有虻作聲曰韓屍識者以為韓氏將屍戮俄而韓謐被誅淮南子曰䖟戢精血以類推之也許慎曰䖟食血又曰䖟附驥致千里而不飛無糗糧之資而不饑又曰上古之時冬日則不勝霜雪霧露夏日則不勝暑熱􅀢䖟蚋梁書曰梁武丁貴嬪諱令光譙國人也初貴嬪少時與鄰女月下紡績諸女病患蚊蚋而貴嬪弗之覺也又曰孫謙居身儉素牀施籧篨屛風冬則布被筦席夏曰無帷帳而夜卧未嘗有蚊蚋人多異焉列子曰目將𦕈者先睹秋毫耳將聾者先聞蚋飛淮南子曰函牛之鼎沸而蠅蚋弗敢入函牛受一牛之鼎也崑山之玉􅀈崑山崑崙也􅀈式也而塵垢弗能汙也又曰羊肉不慕蟻蟻慕於羊肉羶也醯酸不慕蚋而蚋慕於醯酸也吕氏春秋曰􅇲醢黄蚋聚之有酸黄猶言美也徒水則必不可以狸致鼠以氷致蠅雖上聖不能以茹魚去蠅蠅愈至茹女居反臭也不可禁以致之之道去之也蜉蝣毛詩曹蜉蝣曰刺奢也蜉蝣之羽衣裳楚楚蜉蝣渠畧也朝生夕死猶有羽翼以自修飭楚楚鮮明貌}
