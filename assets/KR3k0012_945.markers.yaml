  - {type: variant, offset: 4, length: 0, content: '', WYG: 過也毁譽之於己也猶蚊䖟之一過也又曰蜂蠆螫指而神不能掞音淡􅀢音文䖟噆膚噆齧也而性不能平令憂患之來嬰人心也非直蜂蠆之螫毒而􅀢䖟之㦧音悛怛也而欲静莫虛無柰何哉牟子曰昔公明儀有牛彈清角之操伏食如故轉為􅀢䖟聲則翹尾而躡蹀夏侯子曰一螘之行一蚊之飛聖人皆知之金樓子曰荆州髙齋盛夏之月無白鳥余至寢處於其中及移餘齋則聚蚊之聲如雷矣數丈之間如此之異吁可怪哉又曰白鳥蚊也齊桓公卧於柏寢謂仲父曰吾國富民殷無餘憂矣一物失所寡人猶為之於邑白鳥營營饑而求飽寡人因之開翠紗之帳進蚊子焉其蚊有知禮者不食公之肉而退其蚊有知足者㗱子立切公之肉而退其蚊有不知足者遂長噓短吸而食之及其飽也腹腸為之破潰公曰嗟乎民生亦猶是也孝子傳曰呉猛年七嵗時夏日伏於母牀下恐蚊䖟及父母蕭廣濟孝子傳曰鄧展父母在牖下卧多蚊展伏牀下以自當神異經曰南方蚊翼下有小蜚}
