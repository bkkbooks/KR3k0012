  - {type: variant, offset: 3579, length: 1, content: 雄, SBCK: 灼如隨珠熠爚􅀂丹蘂之􅀄葩彯頴􅀂流金之在沙傳咸螢火賦曰余曽獨處夜不能寐顧見螢火意遂有感於是執以自炤而爲之賦其辭曰感詩人之攸懷􅀆覽熠耀於前庭不以姿質之鄙薄􅀆欲増輝乎太清雖無􅀘於日月期自竭於陋形􅑺蛉毛詩節小宛曰􅑺蛉有子蜾蠃􅀒之螟蛉桑蟲也蜾蠃蒲盧也負持也箋云蒲盧取桑蟲之子􅀒持而云煦嫗餋之以成子毛詩義䟽曰􅑺蛉似歩屈其色青細小或在草葉上土蜂取之置木穴中或書卷間筆筒中七日而成其子里語曰呪云象我象我陸機毛詩義䟽曰􅑺蛉犍爲文學舎人曰桑上小青蟲也似歩屈郭璞注}
