  - {type: variant, offset: 577, length: 530, content: 式以為慢己立棒殺之莊子曰井蛙不可以語於海者拘於墟也夏蟲不可以語於冰者篤於時也魯連子曰百足之蟲斷而不蹶持之眾也淮南子曰凡有血氣之蟲含牙戴角前爪後距有角者觸有齒者噬有毒者蠚有蹄者趹喜而相戲怒而相害天之性也又曰故草食之獸不疾易藪疾患水居之蟲不疾易水行小變而不失常小變易水易草食故食草水居故水中故曰不疾失其常也又曰太陰所在蟄蟲首穴處鵲巢以鄉為戶又曰水食者善游能寒魚鼈之屬是也土食者無心不惠蚯蚓之屬是也又曰介蟲之動以固介甲龜鼈之屬動行也貞蟲之動以毒螫貞蟲細腰蜂蟲蜾嬴之屬無牝牡之合曰貞而有毒故能螯又曰山有猛獸林木為之不斬園有螫蟲藜藿為之不採言人畏也抱朴子曰毒粥陳則旁有爛腸之鼠明膏舉則下有藂死之蟲又曰慕惡者猶宵蟲之赴明燭學惡者猶輕埃之應飄風也孫卿子曰肉腐出蟲魚枯生蠹論衡適蟲篇曰變復之家謂蟲食穀者吏貪狼所致也蟲頭赤者武官黑者文吏按蟲頭赤身白頭黑身黃復應何官耶今蟲食五穀則為災桂蠹桑蝎不怪何也桂中藥桑給蠶何可不怪書卷不舒衣襞不懸皆生蟲也此復關何吏耶又曰司南之杓投於地其柄南指魚肉之蟲集地北行自然之性也世本曰廩君乘土船至鹽場鹽水神女子止廩君廩君不聽鹽神為飛蟲諸神從而飛蔽日為之晦廩君不知東西所當七日七夜使人以青縷遺鹽神曰纓此與爾俱生鹽神受縷而纓之廩君應青縷所射鹽神死天則大開, WYG: 光遍巖谷}
