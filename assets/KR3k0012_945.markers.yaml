  - {type: variant, offset: 25, length: 5, content: 外骨內骨卻, WYG: 嘗有人浮南海泊於孤岸忽有物如蒲帆飛過海將到舟竟以物繋之如帆者盡破碎墜地視之乃蛺蝶也海人去其翅足稱之得肉八十觔噉之極肥美嶺表録異曰鶴子草蔓上春生雙虫只食其葉越女収於粧奩中養之如蠶摘其葉飼之蟲老不食而蛻為蝶蝶赤黄色婦女収而帶之謂媚蝶螢毛詩豳七月曰町畽鹿塲熠燿宵}
