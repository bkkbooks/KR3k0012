  - {type: variant, offset: 3249, length: 299, content: 垣事何從泄也勑窮之咸言有一小兒衣青衣大呼于市曰官令大赦須臾不見堅歎曰其向蒼蠅乎梁書曰昭明太子食中頻得蠅蟲之類密置拌邊恐廚人獲罪不令人知見北史曰庫狄伏連居室患蠅杖門者曰何故聽入唐書曰武儒衡為中書舍人元稹知制誥儒衡一日因會食公堂有蠅集瓜上忽發怒命繫去之曰適從何所夾而遽集此淮南子曰夫江河之腐胔不可勝數也然祭者汲焉大也一盃酒蠅漬其中匹夫弗嘗小也朝子曰以火去蛾蛾愈多以魚毆蠅蠅愈至呂氏春秋曰以狸致鼠以冰致蠅揚子法言曰或問蒼蠅紅紫蒼蠅間乎白黑紅紫似朱而非朱也論衡曰清受塵白受垢青蠅所污常在練素邑犬群吠吠所怪也虞翻別傳曰翻放棄南方自恨䟽節骨體不媚犯上獲罪當長沒海隅生無可與語死以青蠅為弔客天下一人知己者足以不恨, SBCK: 光遍巖谷}
