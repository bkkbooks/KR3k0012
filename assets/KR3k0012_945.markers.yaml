  - {type: variant, offset: 13, length: 3, content: 無足謂, krp: 有角大如指長三四寸甲下有翅能飛夏月隂雨時地中出令人慘炙噉}
  - {type: variant, offset: 14, length: 0, content: '', WYG: 宜適須出其短往復數番収忽大唱曰楊遵彦理窟已倒遵彦從容曰我綽有餘暇山立不動若遇當塗恐翩翩遂遊當塗者魏翩翩者蝶也文襄先知之大笑稱善南史曰沈麟士年過八十耳目猶聰明以反故抄冩火下細書復成二三千卷滿數十篋時人以為養身靜嘿所致仍製黒蝶賦以寄意漢實録曰右監門街大將軍許􅁶言臣奉命博州至博平縣東村有塜彌亘數里一夕言並化蝶飛去列子曰烏}
  - {type: page-break, offset: 14, content: '', id: KR3k0012_WYG_945-8a, image: WYG0901/WYG0901-0375a.png}
  - {type: variant, offset: 15, length: 0, content: '', WYG: 以根為躋螬其葉為蝴蝶莊子曰昔周夢為蝴蝶栩栩然蝴蝶也不知周也俄覺則蘧蘧然周也不知周之夢為蝴蝶與蝴蝶之夢為周與周與蝴蝶則必有分也此謂物化抱朴子曰髻孺背千金而逐蛺蝶越人棄八珍而甘龜蛇金樓子曰陳思之文羣才之俊而武帝誄云尊靈永蟄明帝頌云聖體浮輕夫浮輕有似於蝴蝶永蟄頗擬於昆蟲施之尊德不其謬乎崔豹古今註曰蛺蝶一名野娥一名風蝶江東}
