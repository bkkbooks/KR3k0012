  - {type: variant, offset: 679, length: 167, content: 故草食之獸不疾易藪疾患水居之蟲不疾易水行小變而不失常小變易水易草食故食草水居故水中故曰不疾失其常也又曰太陰所在蟄蟲首穴處鵲巢以鄉為戶又曰水食者善游能寒魚鼈之屬是也土食者無心不惠蚯蚓之屬是也又曰介蟲之動以固介甲龜鼈之屬動行也貞蟲之動以毒螫貞蟲細腰蜂蟲蜾嬴之屬無牝牡之合曰貞而有毒故能螯又曰山有猛獸林木為之不斬園有螫蟲藜藿為之不採言人畏也, SBCK: 飛虫蠛蠓}
