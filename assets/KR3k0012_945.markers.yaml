  - {type: variant, offset: 3, length: 0, content: '', krp: 二蚊䖟蚋蜉蝣蠛蠓蝴蝶螢螟蛉蠮螉蚊說文曰秦謂之蚋楚謂之蚊大戴禮夏小正曰丹鳥羞白鳥白鳥蚊也漢書曰中山靖王朝天子置酒聞樂聲而泣問其故靖王對曰臣聞衆喣漂山聚蚊成雷後漢書曰趙炳有道術人服從者如歸章安令惡其惑衆収殺之人爲立祠室於永康至今蚊蚋不敢入也晉書曰道安曰猛虎當道食不覺蚊䖟來唐史曰江東有吐蚊鳥夏夜鳴吐紋於蘆荻中湖湘尤甚晏子曰東海有蟲巢蚊睫乳而不飛蚊不驚名曰焦冥列子曰江浦之間生麽蟲麽細也名曰焦螟羣飛而集於蚊睫弗相觸也又曰焦螟生於蚊睫離珠子羽拭眼而望弗能見也莊子曰夫愛馬者以筐盛屎以蜄盛溺適有蚊䖟撲縁而拊之不時則鈌御毀首碎胸又曰肩吾見狂接輿狂接輿曰日中始何以語汝肩吾曰告我君人者以已出經式義度民孰敢不聽而化接輿曰是欺德也其於治天下也猶渉海鑿河而使蚊負山也又曰孔子見老𥅆而語仁義老聃曰夫播糠眯目則天地四方易位矣蚊䖟噆音匝膚則通宵不寐矣淮南子曰夫貴賤之於身也猶條風之時麗也時麗忽}
  - {type: xml-element, offset: 4, content: '', id: KR3k0012_CHANT_945-bkkxmlele1}
