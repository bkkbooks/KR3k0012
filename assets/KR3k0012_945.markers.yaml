  - {type: variant, offset: 2043, length: 571, content: 而化蟬飲而不食三十日而蛻說苑曰吳王欲伐荊告其左右曰敢有諫者死舍人有少孺子者欲諫不敢則懷九操彈於後園露沾其衣如是者三旦吳王曰子來何若沾衣如此對曰園中有樹其上有蟬蟬高居悲鳴飲露不知螳蜋在其後也螳蜋委身曲附欲取蟬而不知黃雀在其旁也黃雀延頸欲啄螳蜋而不知彈丸在其下也此三者皆務欲得其前利而不顧其後之有患也吳王曰善哉乃罷其兵論衡曰王充建武三年生為小兒不妄狎儕倫不掩雀捕蟬鹽鐵論曰以所不覩不信人若蟬之不知雪揚雄方言曰蟬楚謂之蜩宋衛之間謂之螗蜩江南呼為螗蛦也陳鄭之間謂之蜋蜩蜋音良秦晉之間謂之蟬海岱之間謂之𦭶齊人呼為巨𦭶音枝其大者謂之蟧或謂之蝒音綿馬按爾雅蝒者馬蜩非別名蝒馬也此方言誤耳其小者謂之陵蚻如蟬而小青色今關西呼為凌蠽也有文者謂之蜻蜻爾雅云蚻蜻蜻即夌蚻也其雌謂之疋必一切大而黑者謂之踐音棧黑而赤者謂之蜺雲霓蜩蟧謂之芽蜩江東呼為茅蠽𧕄謂之寒蜩闇蜩按爾雅以蜺為寒蜩月令亦曰寒蟬鳴則寒蟬非瘖者此諸蟬名通出爾雅而多駮錯未可詳據也寒蟬寒螿也似蟬而小𧕄音應崔豹古今註曰牛亨問董仲舒曰蟬為齊女何荅曰昔齊王后怨王而死尸變為蟬登庭樹嘒唳而鳴王悔恨之故曰齊女又曰貂蟬胡服也貂者取其有文而不煥外柔而易內剛而勁也蟬者取其清虛而識時變也在位者有文而自耀有武而不示人清虛自牧識時而動也曹大家蟬賦曰吸清露於丹園抗喬枝而理翮崇皇朝之輝光映豹豹而灼灼陸雲寒蟬賦曰昔人稱雞有五德而作賦, SBCK: ''}
