  - {type: variant, offset: 3576, length: 2, content: 蠅豹, SBCK: 景輝天一名熠燿一名燐一名丹良一名夜光一名宵燭腐草爲之食蚊蚋焉月令曰丹鳥羞白鳥白鳥即蚊也丹鳥螢也􅀃文云􅁗人謂蚊曰蚋淮南萬畢術曰螢火却馬注云取螢火裹以羊皮置土中馬見之鳴却不敢行祖台之志怪曰昔懷帝永嘉中譙國丁祚渡江至隂陵界時天昏霧在道北有社見一物如人到立兩眼垂血從額下聚地兩處各有升餘祚與從弟齊喝之滅而不見立處聚血皆化爲螢火數千枚縱橫飛起夲草經曰螢一夕夜光一名即照一名熠燿潘岳螢火賦曰爛􅀂飛景之霄遊音衛如移星之雲流動集飄}
