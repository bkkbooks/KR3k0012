  - {type: variant, offset: 1529, length: 448, content: 似蟬而小青赤月令曰寒蟬鳴孝經援神契曰蟬無力故不食周書曰夏至又五日蜩始鳴不鳴貴臣放逸立秋之日寒蜩鳴不鳴人臣不力爭梁書曰朱異為通事舍人後除中書郎時秋日始拜有飛蟬正集異武冠上時咸謂蟬珥之兆又曰何戢為吳興太守頗好畫扇宋孝武賜戢蟬雀扇善畫者顧景秀所畫時吳郡陸探微顧寶先皆能畫歎其巧絕戢因王晏獻之上令晏厚酬其意後周書曰宣帝汰侈既自比上帝不欲令人同己嘗自帶綬及通天冠加金附蟬顧見侍臣武弁上有金蟬及王公有綬者並令去之莊子曰仲尼適楚出遊林中見痀僂者承蜩猶掇之也仲尼曰巧乎有道耶曰我有道也五六月累丸二而不墜則失者錙銖累二九於竿頭是用手足亭審也累三而不墜則失者十一所失愈少也累五而不墜猶掇之也吾處身也若厥株拘吾執臂也若槁木之枝雖天地之大萬物之多而唯蜩翼之知吾不反不側不以萬物易蜩之翼何為不得遺彼故得此也又曰鵬之飛其翼若垂天之雲搏扶搖而上者九萬里去以六月一息者也蜩與鷽鳩笑之曰我決處而飛槍榆枋而止時則不至而空於地而已奚以九萬里而圖南為也孫卿子曰曜蟬者務明其火振其樹若火不明雖振樹無益人有明德則天下歸之若蟬歸明火也又見呂氏, SBCK: 續晉陽}
