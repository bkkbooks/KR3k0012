  - {type: variant, offset: 4, length: 1, content: 蟲, krp: 過也毀譽之於巳也猶蚊䖟之一過也又曰蜂蠆螫指而神不能掞音淡蟁音文䖟噆膚噆齧也而性不能平今憂患之來嬰人心也非直蜂蠆之螫毒而蟁䖟之㦧音惨怛也而欲静漠虚無奈何哉牟子曰昔公明儀爲牛彈清角之操伏食如故轉爲蟁䖟聲則翹尾而躡蹀夏侯子曰一螘之行一蚊之飛聖人皆知之金樓子曰荆州髙齊盛夏之月無白鳥余亟寢處於其中及移餘齋則聚蚊之聲如雷矣數丈之間如此之異吁可恠哉又曰白鳥蚊也齊桓公卧於柏寢謂仲父曰吾國冨民殷無餘憂矣一物失所寡人猶爲之於邑白鳥營飢而求飽寡人因之開翠紗之帳進蚊子焉其蚊有知禮者不食公毎熟即拆裂蚊子羣飛唯皮殻而巳士人謂之蚊子樹嶺表録異曰蚊母鳥形如青鷁觜大而長於池塘捕魚而食毎呌一聲則有蚊蚋飛出其口俗云採其翎爲扇可辟蚊子亦呼為吐蚊鳥䖟晉書曰惠帝時洛陽南山有䖟作聲曰韓屍識者以爲韓氏将屍戮俄而韓謐𬒳誅淮南子曰䖟戢精血以類推之也許慎曰䖟食血又曰䖟與驥致千里而不飛無糗糧之資而不飢又曰上古之時冬日則不勝霜雪霧露夏日則不勝暑熱蟁䖟蚋梁書曰梁武丁貴嬪諱令光譙國人也𥘉貴嬪少時與鄰女月下紡績諸女並患蚊蚋而貴嬪弗之覺也又曰孫謙居身儉素牀施蘧蒢屏風冬則布𬒳莞席夏日無幬帳而夜卧未甞有蚊蚋人多異焉列子曰目将眇者先睹秋毫耳将聾者先聞蚋飛淮南子曰􅉼牛之鼎沸而蝇蚋弗敢入􅉼牛受一牛之鼎也崑山之玉瑱崑山崑崙也瑱式也而塵垢弗能汙也又曰羊肉不慕蟻蟻慕於羊肉羶也醯酸不慕蚋蚋慕於醯酸也吕氏春秋曰缶黄蚋聚之有酸也美羮徒水則必不可以狸致䑕以冰致蠅雖上聖不能以茹魚致蠅蠅愈至茹女居反臭也以致之之道不去也蜉蝣毛詩曹蜉蝣曰刺奢也蜉蝣之羽衣裳楚楚蜉蝣渠略也朝生夕死猶有羽翼以自脩飾楚楚鮮明貌}
