  - {type: variant, offset: 16, length: 1, content: 過, WYG: 志曰孫堅至錢塘㑹海賊掠賈人堅行操刀上肆以手東西指麾若分部人以兵以還遮收賊賊望見為官兵捕之即委財物散走又曰孫權以公孫淵稱蕃遣張彌許晏至遼東拜淵為燕王張昭諫切權不能堪按刀而怒曰吳國士人入宫則拜孤出宫則拜君孤之敬君亦為至矣而數}
  - {type: variant, offset: 17, length: 0, content: '', SBCK: 人好節俠襄邑劉氏與睢陽李禮爲讎韋爲報之禮故冨春長備怨甚謹韋乗車載雞酒僞爲候者門開懷匕首入殺禮并殺其妻徐出取車上刀㦸歩去禮居近市一市盡駭追者數百莫敢近之魏武帝令曰往歳作百辟刀五枚適成先以一與五官將其餘四吾諸子中有不好武而文學將以次與之呉志曰孫堅至錢塘㑹海賊掠賈人堅行操刀上岸以手東西指麾􅀂分部人兵以邏遮収賊賊望見以爲官兵捕之即委財物散走又曰孫權以公孫淵稱蕃遣張彌許晏至遼東拜淵爲燕王張昭諌切權不能堪按刀而怒曰吴國士人入宫則拜孤出宫則拜君􅀌之敬君亦爲至矣而數}
  - {type: page-break, offset: 17, content: '', id: KR3k0012_SBCK_345-4a}
  - {type: variant, offset: 17, length: 0, content: '', krp: 人好節俠襄邑劉氏與睢陽李禮爲讎韋爲報之禮故冨春長備怨甚謹韋乗車載雞酒僞爲候者門開懷匕首入殺禮并殺其妻徐出取車上刀㦸歩去禮居近市一市盡駭追者數百莫敢近之魏武帝令曰往歳作百辟刀五枚適成先以一與五官將其餘四吾諸子中有不好武而文學將以次與之呉志曰孫堅至錢塘㑹海賊掠賈人堅行操刀上岸以手東西指麾若分部人兵以邏遮収賊賊望見以爲官兵捕之即委財物散走又曰孫權以公孫淵稱蕃遣張彌許晏至遼東拜淵爲燕王張昭諌切權不能堪按刀而怒曰吴國士人入宫則拜孤出宫則拜君孤之敬君亦爲至矣而數}
  - {type: variant, offset: 18, length: 1, content: 荊, SBCK: 衆折􅀌􅀌常恐失計昭熟視權曰臣雖知言不見用而毎竭愚忠者誠以太后臨崩呼老臣於床下遺詔頋命之言故耳因泣涕撗流權擲刀置地與昭對泣吴書曰凌統怨甘寜殺其父操寕常備統不得讎之嘗於吕䝉舎㑹酒酣統乃以刀儛寕起曰寕能􅀟㦸儛蒙曰寕雖能未􅀂䝉之巧也因操刀持楯以身分之後權知統意因令寕將兵徙屯江表傳曰孫權抜刀斫前奏案曰諸將吏敢復有言當迎曹操者與此案同蜀志曰􅀄孫權以妹妻先主妹才捷剛猛有諸兄風侍婢百餘人皆親執刀侍立先主毎入心常懔懔王隱晉書曰衛瓘􅁥軍護軍鍾㑹素與瓘}
