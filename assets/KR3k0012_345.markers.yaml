  - {type: variant, offset: 9, length: 0, content: '', WYG: 家屬入宛城道遇賊欲奪婦女衣暉㧞刀曰錢物可得諸母衣不可奪今日朱暉死也賊義之笑曰童子内刀遂放遣又曰賜鄧遵金對鮮卑緄帶一具金錯刀五十辟把刀墨再屈環横刀金錯屈尺八佩刀各一又曰祭遵襲畧陽遣護軍王忠皆持鹵刀斧伐樹開道至畧陽襲隗囂又曰班超曰臣乗聖威神出萬死之志冀立鈆刀一割之用又曰馬嚴為陳㽞太守建初中嚴病遣功曹吏李龔奉章詣闕上親召見龔問疾病形狀以黄金十斤佩刀書刀革帶付龔賜嚴遣太監送方藥又曰張歩攻耿弇營飛矢中弇股以佩刀截之左右無知者獻帝}
