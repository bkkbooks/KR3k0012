  - {type: variant, offset: 2523, length: 855, content: 人非人類也其視來丹猶雛鷇也來丹之友申抱曰子怨黑卯至矣黑卯之易子過矣將奚謀焉來丹垂涕曰願子為我謀申抱曰吾聞衛孔周其祖得殷之寶劍三僮子服之却三軍之眾奚不請為來丹適衛見孔周執僕禮請先納妻子後言所欲周曰吾有三劍唯子所擇而皆不能殺人且先言其狀一曰含光視之不可見運之不知其所觸泯然無際經物而不覺二曰承影將旦昧爽之交日夕昏明之際北面察之淡淡焉若有物存莫有其狀其觸物也竊然有聲經物而物不疾三曰霄練晝則見影而不見光夜方見光而不見形其觸物騞然而過騞音休蘖隨過隨合覺疾而不血刃此三寶劍傳之十三世矣而無施於事不能害物匣而藏之未嘗啟封來丹請其下者孔周乃歸其妻子跪而授其下劍丹再拜受之執劍從黑卯醉偃臥牖下自頸至腰三斬黑卯不覺丹以黑卯死趣而退遇卯子於門又擊之三下如接虛卯子方笑丹知劍不能煞人也歎而歸卯醒怒妻子醉而覆我使我嗌疾而腰急其子曰丹之來過於門三招我亦使我體疾而支強彼其厭我哉又曰宋有蘭子者以數干宋元君弄七劍迭躍之五劍常在空中元君大驚立賜金帛又曰周穆王征西戎戎獻昆吾之劍赤刀切玉如切泥管子曰昔葛大盧之山發而出金𧈪尤受而制之以為劍鎧此劍之始也又曰羽劍珠飾者斬生之斧也墨子曰良劍期乎利不期乎莫耶孫卿子曰干將莫耶巨闕辟閭皆古之良劍也尉繚子曰吳越臨戰左右進劍吳子曰夫提鼓揮捊臨難決疑接兵用刃此將軍也一劍之任非將軍事也又曰一賊鋏劍擊於市萬人無不觸辟者臣以為非一人獨勇一市萬人皆不肖尸子曰水試斷鵠鴈陸試斷牛馬所以觀良劍也燕丹子曰荊軻左手把秦王袖右手椹音砧其胸秦王曰今日之事從子計耳乞聽琴聲而死召姬人鼓琴聲曰羅縠單衣可裂司德狀拜二而絕八尺屏風可超而越鹿盧之劍可負而拔王於是奮袖超屏風而走荊軻擲劍中銅柱焉淮南萬畢術曰拔劍倚戶兒不夜驚又曰夫淳劍魚腸之始下夫擊則不能斷刺則不能入高誘注曰魚腸文繞屈譬若魚膓又曰劍工或劍之似莫耶者唯歐治能名其種歐治良工也玉工眩玉之似碧盧者唯猗頓不失其情碧盧或作武夫猗頓魯之富人能知玉理不失其情也抱朴子曰歐治不能鑄鈆錫為干將符朗子曰符朗棄千金之劍抱朴子趨曰何夫子棄大而存小乎符朗不應賈子曰古者天子二十而冠帶劍諸侯三十而冠帶劍大夫, SBCK: ''}
