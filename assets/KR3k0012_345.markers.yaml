  - {type: variant, offset: 7, length: 1, content: 呂, WYG: 飾也天子以玉諸侯以金㻫佩刀飾也太公兵法曰刀之神名曰脫光尚書曰赤刀大訓𢎞璧琬琰在西序孔安國注曰寳刀赤刀削也大訓虞書也詩曰執其鸞刀又曰何以舟之維玉及瑶鞞琫容刀舟帶也禮記曰割刀之用鸞刀之貴貴其義也左傳曰子皮欲使尹何為宰子産曰猶未能操刀而使割也榖梁曰孟勞魯之寳刀也論語曰子之武城聞弦歌之聲夫子莞爾而笑曰割雞焉用牛刀春秋繁露曰禮之所為興也刀之在右白虎之象也春秋演孔圖曰八政不中則天雨刀史記曰郭觧姊子負觧之勢與人飲使之釂子曜切非其任强灌之人怒㧞刀刺殺解姊子亡去漢書曰昭帝遣李陵故人隴西任立政等三人俱至匈奴招陵立政等至單于置酒賜漢使者李陵衛律皆侍坐立政等見陵未得私語即目視陵而數自循其刀環握其足隂諭之言可歸漢也又曰龔遂為渤海太守民有帶持刀劒者使賣劒買牛賣刀買犢何為帶牛而佩犢者也又曰蓋寛饒奏事上以為怨謗下吏寛饒引佩刀自剄北闕下衆莫不憐之又曰李廣利為貳師將軍征大宛軍中無水㧞佩刀刺山飛泉涌出又曰王尊為東平王相王曰願觀相國佩刀尊前引刀視王後漢書班固與弟超書曰竇侍中遺仲升楚騰陵錯横刀􅀈皂削一枚金錯半垂刀一枚又曰河南尹朱雋董卓陳軍事卓折雋曰我百戰百勝决之於心卿勿妄說且汚我刀續漢書輿服志曰佩刀乗輿黄金通身貂錯半蛟魚鱗金漆錯雌黄室五色諸侯黄金錯環挾半杖墨室公卿百官皆淳墨不半杖小黄門郎雌黄室中黄門郎朱室童子皆虎𤓰文虎賁黄室虎文其將白虎文皆以白珠蛟為標口之飾乗輿者加翡翠山紆嬰其側謝承後漢書曰丹陽方儲為郎中章帝使文郎居左武郎居右儲正住中曰臣文武兼備在所用施上嘉其才以繁亂絲付儲使理之儲㧞佩刀三斷之對曰反經任勢臨事冝然又曰應奉得賜金錯把刀東觀漢記曰朱暉字文季年十三與外}
