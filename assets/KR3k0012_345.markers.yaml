  - {type: variant, offset: 15, length: 0, content: '', WYG: 此不早相語今禍至告我不亦大劇乎引刀向忠曰今斷卿頭誠不足以解忿亦耻大丈夫臨别復殺卿輩也魏志曰王祥事後母至孝後母嫉之伺祥卧以刀斫之值祥出外持刀斫着被祥知不言如故又曰許禇從討袁紹於官渡時常從士徐他等謀為逆以禇常侍左右憚之不敢發伺禇休下日他等懐刀入禇至下舎心動即還侍他等不知入帳見禇大驚愕他色變禇覺之即撃殺他等太祖益親信之出入同行不離左右又曰典韋陳㽞人形貎魁梧膂力過人好莭俠襄邑劉氏與睢陽李禮為讎韋為報之禮故富春長備怨甚謹韋乗車載鷄酒偽為候者門開懐匕首入殺禮并殺其妻徐出取車上刀㦸歩去禮居近市一市盡駭追者數百莫敢近之魏武帝令曰往歳作百辟刀五枚􅃴成先以一與五官將其餘四吾諸子中有不好武而文學將以次與之}
