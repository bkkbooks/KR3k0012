  - {type: variant, offset: 1010, length: 369, content: 曰滅魂扶以之夜行不遇魑魅七曰却邪有妖魅見之則止八曰真剛以之切玉斷金如刻削土木矣以應八方之氣也雷次宗豫章記曰吳未亡恒有紫氣見於牛斗之間占者以為吳方興唯張華以為不然及平此氣逾明張華聞雷孔章妙達緯象乃要宿屏人問天文將來吉凶孔章曰無他象唯牛斗之間有異氣是寶物之精上徹於天耳此氣自正始嘉平至今日眾咸謂孫氏之祥唯吾識其不然今聞子言乃玄與吾同今在何郡曰在豫章豐城張遂以孔章為豐城令至縣移獄掘深二丈得玉匣長八九尺開之得二劍一龍淵二即太阿其夕牛斗氣不復見孔章乃留其一匣龍淵而進之劍至張公於密發之光焰鞾韡煥若電發後張遇害此劍飛入襄城水中孔章臨亡誡其子恒以劍自隨後其子為建安從事經淺瀨劍忽於腰中躍出初出猶是劍入水乃變為龍逐而視之見二龍相隨而逝焉孔章曾孫穆之猶有張公與其祖書反覆桑根紙古字縣後有掘劍窟方廣七八尺搜神記曰東越門中有嶺高數十里下北隰中有大蛇長七八丈大, SBCK: ''}
