  - {type: variant, offset: 13, length: 1, content: 員, SBCK: 孚忿董卓無道欲身自殺之挾佩刀詣卓孚語畢辭出卓至閤執手孚因引刀刺卓卓多力却不中即殺孚英雄記曰董卓謂􅀽紹曰劉氏種不足復遺紹勃然曰天下徤者豈唯董公撗刀長揖徑出懸節於上東門而奔兾州漢魏春秋曰劉琮乞降不敢告備備亦不知乆而覺之遣所親問琮琮令宋忠詣備宣白是時曹公在宛備乃驚駭謂忠曰卿諸人作事}
  - {type: variant, offset: 13, length: 1, content: 員, WYG: 孚忿董卓無道欲身自殺之挾佩刀詣卓孚語畢辟出卓至閤執手孚因引刀刺卓卓多力却不中即殺孚英雄記曰董卓謂袁紹曰劉氏種不足復遺紹勃然曰天下徤者豈唯董公横刀長揖徑出懸莭於上東門而奔冀州漢魏春秋曰劉琮乞降不告𤣥徳遂亦不知久而覺之遣所親問琮琮令宋忠詣之宣白是時曹公在宛𤣥徳驚駭謂忠曰卿諸人作事}
