  - {type: variant, offset: 729, length: 2, content: 流星, WYG: 帝解鳴鴻刀賜東方朔朔曰此刀黄帝時採首陽之金鑄為此刀雄者已飛雌者獨在一出洞㝠記林邑記曰林邑王范文先是夷奴初牧牛洞中得鯉魚私將還欲食之其主檢求文恐因曰將礪石還非魚也主往看果是石文知異看石有鐵鑄石為兩刀呪曰魚為刀若斫石入者文當為此國王斫石即入人情漸附之裴淵廣州記曰石林竹勁利削為刀切象皮如纎茅楊泉物理論曰古有阮師之刀天下之所寳貴也阮之作刀受法於金精之虛七月庚辛見金神於冶監之門其人光色煒耀向神再拜神執其手曰子可教也阮致之閒宴設􅄿而問焉神教以水火之齊}
