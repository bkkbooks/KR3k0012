  - {type: variant, offset: 76, length: 1, content: 荊, SBCK: 元帝以劉琨爲侍中太尉其餘如故并贈名刀琨荅曰謹當躬自執佩馘截二虜又載記曰慕容翰北􅄬宇文歸旣而逃還歸乃遣勁􅀐百餘追之翰遥謂追者曰吾旣思戀而歸理無反靣吾之弓矢汝曹足知無爲相逼自取死也汝可百歩竪刀吾射中者汝便冝反不者可來前也歸􅀐解刀竪之翰一發便中刀鐶追􅀐乃散又曰赫連勃勃以叱干阿利領將作大匠發嶺北夷夏十萬人於朔方之北黒水之南營起都城勃勃自言朕方統一天下君臨萬􅀖可以統萬爲名阿利性尤工巧然殘忍刻􅁀乃蒸土築城錐入一寸即殺作者而并築之勃勃以爲忠故委營繕之任又造五兵之器精銳尤甚旣成呈之工匠必有死者射甲不入即斬弓人如其入也便斬鎧匠又造百錬剛刀爲龍雀大環號曰大夏龍雀銘其背曰古之利器吴楚湛盧大夏龍雀名冠神都可以懷逺可以柔逋如風靡草威服九區丗甚珎之復鑄銅爲大皷飛廉翁仲銅駞龍獸之属皆以黄金飭之列於宫殿之前凡殺工匠數千以是器物莫不精麗蕭子顯齊書曰丗祖武皇帝諱􅄨字宣逺不豫徙御延昌殿乗輿始登階而殿屋鳴咤上惡之詔曰我識滅之後身上着􅀞天衣純烏犀導常所服身刀長短二口鐵環者隨我入梓宫北齊書曰綦母懷文造􅀫鐡刀其法燒生鐵精以重柔鋌數􅀫則成鋼以柔鋌爲刀以五特之脂斬甲三十札今㐮}
  - {type: page-break, offset: 76, content: '', id: KR3k0012_SBCK_345-6a}
  - {type: variant, offset: 76, length: 2, content: 荊國, WYG: 元帝以劉琨為侍中太尉其餘如故并贈名刀琨荅曰謹當躬自執佩馘截二虜又載記曰慕容翰北投宇文歸既而逃還歸乃遣勁騎百餘追}
  - {type: variant, offset: 76, length: 1, content: 荊, krp: 元帝以劉琨爲侍中太尉其餘如故并贈名刀琨荅曰謹當躬自執佩馘截二虜又載記曰慕容翰北投宇文歸旣而逃還歸乃遣勁騎百餘追之翰遥謂追者曰吾旣思戀而歸理無反靣吾之弓矢汝曹足知無爲相逼自取死也汝可百歩竪刀吾射中者汝便冝反不者可來前也歸騎解刀竪之翰一發便中刀鐶追騎乃散又曰赫連勃勃以叱干阿利領將作大匠發嶺北夷夏十萬人於朔方之北黒水之南營起都城勃勃自言朕方統一天下君臨萬邦可以統萬爲名阿利性尤工巧然殘忍刻暴乃蒸土築城錐入一寸即殺作者而并築之勃勃以爲忠故委營繕之任又造五兵之器精銳尤甚旣成呈之工匠必有死者射甲不入即斬弓人如其入也便斬鎧匠又造百錬剛刀爲龍雀大環號曰大夏龍雀銘其背曰古之利器吴楚湛盧大夏龍雀名冠神都可以懷逺可以柔逋如風靡草威服九區丗甚珎之復鑄銅爲大皷飛廉翁仲銅駞龍獸之属皆以黄金飭之列於宫殿之前凡殺工匠數千以是器物莫不精麗蕭子顯齊書曰丗祖武皇帝諱賾字宣逺不豫徙御延昌殿乗輿始登階而殿屋鳴咤上惡之詔曰我識滅之後身上着畫天衣純烏犀導常所服身刀長短二口鐵環者隨我入梓宫北齊書曰綦母懷文造宿鐡刀其法燒生鐵精以重柔鋌數宿則成鋼以柔鋌爲刀以五特之脂斬甲三十札今㐮}
  - {type: variant, offset: 78, length: 0, content: '', SBCK: 治家所鑄􅀫鐡柔鋌是其遺法也刀猶甚快利但不能截札耳梁書曰席闡文爲西中郎中兵叅軍領城扄梁武帝}
  - {type: page-break, offset: 78, content: '', id: KR3k0012_SBCK_345-6b}
  - {type: variant, offset: 78, length: 0, content: '', krp: 治家所鑄宿鐡柔鋌是其遺法也刀猶甚快利但不能截札耳梁書曰席闡文爲西中郎中兵叅軍領城扄梁武帝}
  - {type: variant, offset: 79, length: 0, content: '', SBCK: 將起兵闡文勸頴曹同焉仍遣客田祖恭私報帝并獻銀裝刀帝報以金如意南史曰韓子髙㑹稽山隂人也家本微賤侯景之亂寓都下景平陳文帝出守呉興子髙年十六爲揔角容㒵美麗􅃺似婦人於淮渚附部伍􅀉載還郷里文帝見而問曰能事我乎子髙許諾子髙本名蠻子帝改名之性恭謹􅁪執備身刀唐書曰李嗣業京兆髙陵人也身長七尺壯勇絶倫天寳􅀄隨募至安西頻經戰􅃲于時諸軍􅀄用陌刀業善用之毎爲隊頭所向必䧟又曰王及善􅀄除右千牛衛將軍髙宗曰朕以卿忠謹故與卿三品要職他人非捜辟不得至朕所卿佩大撗刀在朕側知此官貴否河圗曰恠目勇敢重瞳天􅀨刀楚之􅀖宋均注曰項羽遁甲開山圖曰神芝五色生於名山之隂五色雲氣覆之其味甘苦以銅刀收之又曰霍山有玉石芝生大石上萬人牽終不拔以竹刀割之即断太公六韜曰大擼刀重一斤長四尺三百枚傳咸奏事曰尚書舊奏給介士二百人人給大銅口刀各一枚博物志曰周書云西域獻火浣布昆吾氏獻切玉刀浣布汙燒之則絜切玉刀切玉如泥一云切玉如䗶蜜布漢魏丗有獻者刀則未聞崔豹輿服注曰吴大皇帝有寳刀三一曰百錬二曰青犢三曰漏影拾遺記曰帝解鳴鴻刀賜東方朔朔曰此刀黄帝時採首陽之金鑄爲此刀雄者巳飛雌者獨在一出洞􅁳記林邑記曰林邑王范文先是夷奴􅀄收牛洞中得鱧魚私將還欲食之其主撿求文恐因曰將礪石還非魚也主往看果是石文知異看石有鐵鑄石爲兩刀呪曰魚爲刀􅀂斫石入者文當爲此國王斫石即入人情漸附之裴淵廣州記曰石林竹勁利削爲刀切象皮如纎茅楊泉物理論曰古有阮師之刀天下之所寳貴也阮之作刀受}
