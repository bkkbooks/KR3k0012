  - {type: variant, offset: 7, length: 2, content: 呂氏, SBCK: 飾也天子以玉諸侯以金㻫佩刀飾也太公兵法曰刀之神名曰脫光尚書曰赤刀大訓􅀪壁琬琰在西序孔安國注曰寳刀赤刀削也大訓虞書也詩曰執其鸞刀又曰何以舟之維玉及瑶鞞琫容刀舟帶也禮記曰割刀之用鸞刀之貴貴其義也左傳曰子皮欲使尹何爲宰子産曰猶未能操刀而使割也榖梁曰孟勞魯之寳刀也論語曰孔子之武城聞弦歌之聲夫子莞爾而􅀏曰割雞焉用牛刀春秋繁露曰禮之所爲興也刀之在右白虎之象也春秋演孔圖曰八政不中則天雨刀史記曰郭解姊子􅀒解之􅀔與人飲使之釂子削切非其任強灌之人怒拔刀刺殺解姉子亡去漢書曰昭帝遣李陵故人隴西任立政等三人俱至匈奴招陵立政等至單于置酒賜漢使者李陵衛律皆侍坐立政等見陵未得私語即目視陵而數自循其刀環握其足隂諭之言可歸漢也又曰龔遂爲渤海太守民有帶持刀劒者使賣劒買牛賣刀買犢可爲帶牛而佩犢者也又曰盖寛饒奏事上以爲怨謗下吏寛饒引佩刀自剄北闕下衆莫不憐之又曰李廣利爲貳師將軍征大宛軍中無水㧞佩刀刺山飛泉涌出又曰王尊爲東平王相王曰願觀相國佩刀尊前引刀視冝然又曰應奉得賜金錯把刀東觀漢記曰朱暉字文季年十三與舅母家属入宛城道遇賊欲奪婦女衣暉抜刀曰錢物可得諸母衣不可奪今日朱暉死也賊義之􅀏曰童子内刀遂放遣又曰賜鄧遵金對鮮卑緄帶一具金錯刀五十辟把刀墨再屈環撗刀金錯屈尺八佩刀各一又曰􅀕遵襲略陽遣護軍王忠皆持鹵刀斧伐樹開道至略陽襲隗囂又曰班超曰臣乗聖威神出萬死之志兾立鈆刀一割之用又曰馬嚴爲陳留太守建􅀄中嚴病遣㓛曹史李襲奉章詣闕上親召見襲問疾病形􅃺以黄金十斤佩刀書刀革帶付龔賜嚴遣太醫送方藥又曰張歩攻耿弇營飛矢中弇股以佩刀截之左右無知者獻帝}
