  - {type: variant, offset: 3380, length: 409, content: 而冠帶劍隸人不得冠庶人不帶劍亢蒼子曰蜚景之劍威集白日氣成紫蜺以之封穫則與劂俱衛切刃也無擇蜚景神劍也剛鎌也神劍雖利以之穫陷猶司於鎌刀者也及夫凶邪流毒沸渭不靖加之運掌之上千里之內不留行矣凶邪流毒溫疫之氣也此神劍之能辟凶邪故威光所行千里之內未嘗留止者也宋玉大言賦曰長劍倚天外班固幽通賦注曰衛靈公太子剻聵為無道好帶長劍長一丈公鍊乃作短者長一尺公知不可以傳國乃逐之魏都賦曰劍則流彩之珍素質之寶或虹蔚波映或龜文龍藻服之可以威百蠻指麾可以開昏擾古詩曰腰中鹿盧劍可直千萬餘博物志曰劍後擊鹿盧名曰屬鏤又曰何意百鍊鋼化為繞指柔班固詩曰寶劍直千金又曰延陵輕寶劍曹子建詩曰拊劍西南望江文通詩曰倚劍臨八荒宋鮑昭詩曰雙劍將別離先在匣中鳴雌沈吳江裏雄飛入楚城吳江深無底楚闕有崇扃一為天地別豈直限幽明神物終不隔千祀儻還并梁吳均詠寶劍詩曰我有一寶劍出自昆吾溪照人如照水切玉如切泥鍔邊霜凜凜匣上風凄凄寄語張公子何當來見攜梁崔鴻詠劍詩曰寶劍出昆吾龜龍夾采珠, SBCK: ''}
