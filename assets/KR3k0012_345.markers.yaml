  - {type: variant, offset: 13, length: 1, content: 員, krp: 孚忿董卓無道欲身自殺之挾佩刀詣卓孚語畢辭出卓至閤執手孚因引刀刺卓卓多力却不中即殺孚英雄記曰董卓謂袁紹曰劉氏種不足復遺紹勃然曰天下徤者豈唯董公撗刀長揖徑出懸節於上東門而奔兾州漢魏春秋曰劉琮乞降不敢告備備亦不知乆而覺之遣所親問琮琮令宋忠詣備宣白是時曹公在宛備乃驚駭謂忠曰卿諸人作事}
  - {type: variant, offset: 15, length: 1, content: 吳, SBCK: 此不早相語今禍至告我不亦大劇乎引刀向忠曰今斷卿頭誠不足以􅄙忿亦耻大丈夫臨别復殺卿軰也魏志曰王祥事後母至孝後母嫉之伺祥卧以刀斫之值祥出外持刀斫着􅀍祥知不言如故又曰許禇從討􅀽紹於官渡時常從士徐他等謀爲逆以禇常侍左右憚之不敢發伺禇休下日他等懷刀入禇至下舎心動即還侍他等不知入帳見禇大驚愕他色變禇􅁴之即擊殺他等太祖益親信之出入同行不離左右又曰典韋陳留人形皃魁梧旅力}
