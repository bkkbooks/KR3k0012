  - {type: variant, offset: 3790, length: 621, content: 精初獻術千戶竟論都匣氣衝牛斗山形轉鹿盧欲知天下貴持此問風胡曹植七啟曰步光之劍越劍名華藻繁縟飾以文犀彫以翠綠綴以驪龍之珠錯以荊山之玉陸斷犀象未足稱雋隨波截鴻水不漸刃張景陽七命曰楚之陽劍歐冶所營陽劍名也耶谿之挺赤山之精銷踰羊頭羊頭骨銷之也鏷以鍜成乃鍊乃鑠萬辟千灌皆銷鍊名豐隆奮椎飛廉扇炭神氣化成陽文陰縵既亦流綺星連浮綵艷發光如散電質如曜雪霜鍔冰凝水刃霜洯形冠豪曹名珍巨闕指鄭則三軍白首麾晉則千里流血豈徒水截蛟鴻陸灑奔駟斷浮翮以為三絕重甲而稱利又曰若其形震薛燭光駭風胡價兼三鄉聲貴兩都或馳名傾秦或夜飛去吳功冠萬載威曜無窮揮之者無前擁之者身雄可以從服九國橫制八戎爪牙景附亟夏承風此盖希代之神兵也楚詞曰執棠溪棠溪劍名以拂蓬秉干將以割肉又曰撫長劍兮玉珥珥劍也鐔又曰余幼好此奇服年既老而不衰帶長鋏之陸離冠青雲之崔巍高皃後漢公孫瑞劍銘曰天生五才金德惟剛從革作辛含景吐商辨物利用勳伐彌彰暨彼良工歐治干將爰造寶劍巨闕墨陽精通皓靈獲茲休祥剖山竭川虹蜺消亡昭威耀武震動遐荒楚以定霸越以取強晉裴景聲文身劍銘曰器以利顯實以名舉長劍耿介體文經武陸斷玄犀水截輕羽九功斯像七德是輔晉張協太阿劍銘曰太阿之劍世載其美淬以清波歛以越砥如玉斯曜若景在水不運自肅率土從軌梁簡文帝謝勑賚方諸劍等啟曰纔發玉函雕奇溢目始開牙撿麗飾交陳已疋丹霞之暉乍比青雲之制身文且貴器用惟宜寒暑兼華左右相照梁沈約為東宮謝勑賜孟嘗君劍啟曰田文重氣殉名四豪莫及寶劍雄身故能威陵秦楚人高事遠遺物足奇謹加玩服以深存古, SBCK: ''}
