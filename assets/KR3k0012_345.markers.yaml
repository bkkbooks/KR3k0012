  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第三百四十五}
  body:
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 六刀上釋名曰刀到也以斬伐到其所乃擊之也其末曰鋒言􅀂蜂刺之毒利也其本曰環形似環也其室曰削削峭也其形峭殻褁刀躰也室口之飾曰琫琫捧也捧來口也下末之飾曰㻫㻫卑也在下之言也短刀曰拍髀帶時拍躰旁也又曰露拍言露見也佩刀在佩旁之刀也或曰容刀爲刀形而幾刃備容儀而巳剪刀剪進前也書刀給書簡札有所刋削之刀也封刀鉸刀皆隨時名之也􅀃文曰刀兵也象形也㓵}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 六刀上釋名曰刀到也以斬伐到其所乃撃之也其末曰鋒言若鋒刺之毒利也其本曰環形似環也其室曰削削峭也其形峭殻裹刀體也室口之飾曰琫琫捧也捧來口也下末之飾曰㻫㻫卑也在下之言也巨刀曰拍俾帶時拍體旁也又曰露拍言露見也佩刀在佩旁之刀也或曰容刀為刀形而㡬刃備容儀而已剪刀剪進前也書刀給書簡札有所刋削之刀也封刀鉸刀皆隨時名之也說文曰刀兵也象形㓵}
