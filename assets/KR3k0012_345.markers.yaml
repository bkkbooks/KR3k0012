  - {type: variant, offset: 1703, length: 2, content: 厭如, SBCK: 欺佩刀當生毛欺則無毛也視之刀有毛長寸乃不燔列士傳曰專諸持一剛刀置魚腹中以刺王僚列女傳曰龐娥親者酒泉龐子夏妻趙君安女君安爲同縣李壽所殺三子遭疫而死壽大喜娥親聞曰李壽汝莫喜焉知娥親不手刃汝耶乃隂市刀志在殺壽後於都亭奮刀斫壽刀折抜壽佩刀断壽頭詣獄求死詔赦之吴時外國傳曰扶南諸王殺其國人以刀斫刺往往有不入者以汗露塗刀刃斫之乃入國人名之曰蟬也蒲元傳曰君性多竒思得之天然􅀋之事出􅀂神不嘗見鍜功忽於斜谷爲諸􅁑亮鑄刀三千口鎔金造器特異常法刀成白言漢水鈍弱不任淬用蜀江爽烈}
