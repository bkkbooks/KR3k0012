  - {type: variant, offset: 1962, length: 1, content: 方, krp: 十始渉師門朝聞道夕殞聖人所貴足下之年甫在不惑如以學藝何晚之有若能上迨南榮忘食之樂下踵寧子黒夜之勤窮文盡義無微不綜規冨貴之榮取金紫之爵是夏侯勝拾芥之謂也好學論語曰子曰十室之邑必有忠信如丘者焉不如丘之好學也巳矣又曰有顔淵者好學不遷怒不貳過不幸短命死矣今也則亡未聞好學者也又曰孔文子何以謂之文也子曰敏而好學不恥下問是以謂之文又曰我非生而知之者好古敏以求之也又曰子夏曰日知其所亡月無亡其所能可謂好學也巳禮記檀弓上曰孔子與門人立拱而尚右二三子亦皆尚右孔子曰二三子之嗜學我則有姉之喪故也二三子皆尚左新序曰葉公諸梁問樂王鮒曰晉大夫趙文子爲人何若對曰好學而受規諌仁也江出岷山其源若甕口至楚國其廣十里無它故其下流多也好學受規諌冝乎立哉漢}
  - {type: variant, offset: 1964, length: 1, content: 計, SBCK: 曰陳平少時家貧好讀書治黄帝老子之術兄伯常耕田縱平遊學東觀漢記曰馮豹字仲文好儒學以詩傳教授郷里爲之語曰道德斌斌馮仲文又曰和熹鄧后七歳讀論語志在書傳母常非之曰當習女工今不是務寧當學􅀶士耶后重違母意晝則縫紉夜􅀻買脂燭讀經傳宗族外内皆號曰諸生范曄後漢書曰荀爽㓜好學太尉杜喬見而稱之曰可爲人師爽遂躭思經書慶弔不行徴命不應張璠漢記曰朱穆字公叔好學專精每一思至中食失飡行墜坑坎亡失冠履其父常言穆大專幾不知馬之幾足後漢書曰張覇就樊儵受嚴氏公羊春秋遂􅀶覽五經諸生孫綝劉固等慕之各市宅其傍以就學耶魏書曰􅁻茂字叔暢好書不耻惡衣惡食而耻一物之不知建安􅀄與扶風􅂫則共入武功南山精思數歳北齊書曰劉逖字子長少而聦敏在遊宴之中卷不離手值有文籍所未見者則終日諷誦或通夜不歸其好學如此也文士傳曰李庸字蕭逺篤志好學善屬文詞藻清美常燃柴草火以讀之南史曰梁劉峻字孝摽平原人也永明中從桑乾還自謂所見不􅀶更求異書聞京師有者必往祈借清河崔蔚祖謂之書􅁋北史曰隨劉臻爲儀同性怳忽躭經史經日覃思至於丗事多所遺忘有劉訥者亦任儀同俱爲太子學士情好甚宻臻住南訥住東臻甞欲㝷訥謂從者曰汝知劉儀同家乎從者不知㝷訥謂還家因荅曰知於是引之而去旣扣門臻尚未悟謂至訥家乃據鞌大呼曰劉儀同可出矣其子迎門臻驚曰汝亦來耶其子荅曰是大人家於是顧盻乆之乃悟叱從者汝大無意吾欲造劉訥耳杜預自叙曰少而好學在官則勤於吏治在家則滋味典籍􅀇晏春秋曰余家素貧窘晝則務作於勞夜則甘疲寐及二時之務書卷生塵篋不解緘唯季冬裁得一旬學或兼夜寐或戲獨否或對食忘飡或不􅁴日夕是以遊出}
