  - {type: variant, offset: 1666, length: 237, content: 此六者得其學則邪僻之道塞矣楊子曰博學者所以求為君子也求而不得鮮矣未有不求而得之者也夫觀書者譬猶登東岳而知丘陵之嵔㠥也浮滄海而知江河之不廣也見日月而知眾星之照微也仰聖人而知眾說之少觀也尸子曰學不倦所以治己也教不厭所以治人也夫蠒舍而不治則腐蠹使上女繰之為美錦大君朝而服之身者蠒也舍而不治則知行腐蠹使賢者教之以為世士則天下諸侯莫敢不敬任子曰學所以治己教所以治人不勤學則無以為智不勤教無以為仁郭林宗別傳曰泰以有道君子徵同邑宋子俊勸使往泰遂辭以疾闔門教授鍾會母傳曰夫人明於教訓會雖童稚, SBCK: ''}
