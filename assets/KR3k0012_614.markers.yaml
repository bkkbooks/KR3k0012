  - {type: variant, offset: 1960, length: 1, content: 甲, krp: 十去離本土營求粮資不得專業結童入學白首空歸長委農野永絶榮望朕甚愍焉其依科罷者聽爲太子舎人劉艾獻帝紀曰時長安中謡曰頭白皓然食不充粮褁衣褰裳當還故郷聖主愍念悉用𥙷郎舎是布衣𬒳服玄黄齊書曰張充字延符少好逸遊父緒甞告歸至吴始入西郭逢充獵右臂鷹左牽狗遇舡至便放紲脫韝拜於水次父緒曰一身兩役無乃勞乎充曰充聞三十而立今充二十九矣請至來年緒曰過而能改顔氏子焉延明年便改多所該通唐書曰姚元崇玄宗獵于渭濵上曰卿頗知獵乎元崇曰臣少居廣城大澤不知書唯以射獵爲事年四十方遇張憬藏謂臣當以文學備位將相無爲自弃尓來折節讀書今雖官位過忝至於馳射老而猶能於是乎驅鷹放犬遟速稱旨上大恱曰乆不見卿思有顧問卿可於宰相行中行常後上縱轡乆顧之曰卿行何後公曰臣官踈賤不合叅宰相行上曰可兵部尚書平章事桓子新論曰髙君孟頗知律令常自伏冩書署郎哀其老欲代之不肯云我躬自冩乃當十遍讀魏應璩荅韓文憲書曰昔公孫引皓首入學顔涿聚}
  - {type: variant, offset: 1962, length: 1, content: 方, SBCK: 十始渉師門朝聞道夕殞聖人所貴足下之年甫在不惑如以學藝何晚之有􅀂能上迨南榮忘食之樂下踵寧子黒夜之勤窮文盡義無微不綜規冨貴之榮取金紫之爵是夏侯勝拾芥之謂也好學論語曰子曰十室之邑必有忠信如丘者焉不如丘之好學也巳矣又曰有顔淵者好學不遷怒不貳過不幸短命死矣今也則亡未聞好學者也又曰孔文子何以謂之文也子曰敏而好學不恥下問是以謂之文又曰我非生而知之者好古敏以求之也又曰子夏曰日知其所亡月無亡其所能可謂好學也巳禮記檀弓上曰孔子與門人立拱而尚右二三子亦皆尚右孔子曰二三子之嗜學我則有姉之喪故也二三子皆尚左新序曰葉公諸梁問樂王鮒曰晉大夫趙文子爲人何􅀂對曰好學而受規諌仁也江出岷山其源􅀂甕口至楚國其廣十里無它故其下流多也好學受規諌冝乎立哉漢}
  - {type: page-break, offset: 1962, content: '', id: KR3k0012_SBCK_614-4b}
  - {type: variant, offset: 1962, length: 1, content: 方, WYG: 始涉師門朝聞道夕殞聖人所貴足下之年甫在不惑加以學藝何晚之有若能上迨南榮忘食之樂下踵寜子黑夜之勤窮文盡義無微不綜規冨貴之榮取金紫之爵是夏侯勝拾芥之謂也好學論語曰十室之邑必有忠信如丘者焉不如丘之好學也又曰有顔囘者好學不遷怒不貳過不幸短命死矣今也則亡未聞好學者也又曰孔文子何以謂之文也子曰敏而好學不恥下問是以謂之文也又曰我非生而知之者好古敏以求之者也又曰子夏曰日知其所亡月無忘其所能可謂好學也已禮記檀弓上曰孔子與門人立拉而尚右二三子亦皆尚右孔子曰二三子之嗜學我則有姊之䘮也二三子皆尚左新序曰葉公詣梁問樂王鮒曰晉大夫趙文子為人若何對曰好學而受規諫好學智也受規諫仁也江出岷山其源若甕口至楚國其廣十里無他故其下流多也好學受規諫宜哉其立也漢}
