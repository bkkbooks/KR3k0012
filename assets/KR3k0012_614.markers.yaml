  - {type: variant, offset: 2005, length: 1, content: 流, SBCK: 聚書津曰吾甞令道士上章驅􅀑安用此􅀑名耶隋書曰宇文慶沉深有器局少以聦敏見知周􅀄受業東觀頗渉經史旣而謂人曰書足記姓名而巳安能乆事筆硯爲腐儒之業于時文州民夷相聚爲亂慶應募從征賊保據巖谷徑路懸絶慶束馬而進襲破之以功授都督唐書曰馬燧少甞與諸兄讀書乃輟卷歎曰天下將有事矣丈夫當立功征伐以濟四海安能矻矻爲一儒也西京雜記曰􅀓介子}
  - {type: variant, offset: 2005, length: 0, content: '', WYG: 不以賓主之禮相接東觀漢記曰班超字仲升家貧為官傭書常輟業歎曰大丈夫當效傅介子張騫立功異域以取封侯安能久事筆硯乎三國典略曰齊許惇無學術與邢劭魏收等同列諸人談說經史惇隠几而睡深為勝}
