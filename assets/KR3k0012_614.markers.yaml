  - {type: variant, offset: 1074, length: 591, content: 至孝牧豕大澤中賣之以奉供養遠方人從遊學者皆執經追於澤畔又曰歐陽歙為司徒坐在汝南贓下獄中濟陰曹重字伯山從歙受尚書門徒三千人又曰丁恭字子然學義精明遷少府諸生自遠方至者數千人當世稱為大儒又曰杜撫字叔和少有高才定韓詩章句後歸鄉里教授沉靜樂道弟子千餘人又曰劉昆王莽世教授弟子恒五百餘人每春秋饗射常備列典儀以素木瓠葉之為俎豆桑弧蒿矢以射莬首又曰馬融常在高堂施綘疑紗帳前授生徒列女樂弟子相次傳授鮮有入其室者晉中興書曰范寧字武子解褐為餘抗令興學校養生徒潔己志德行之士莫不來宗自中興已來崇學敦教未有如寧者也崔鴻十六國春秋後秦錄曰涼州胡辯者河西大儒也前秦建元未東徙洛陽隨講受弟子千有餘人關中後進多赴之姚興勑關尉曰諸生諮訪道義修己厲身往來出入勿拘常限於是學者咸勸儒業盛矣國語曰晉文公學讀書於臼季三日臼季臣曰吾不能行也咫咫咫尺間聞則多矣對曰然而多聞以待能者不猶愈乎使能者行之猶愈於不學尚書大傳曰古之帝王者必立大學小學使公卿之太子大夫元士之適子十有三年始入小學見小節焉踐小義焉年十五入太學見大節焉踐大義焉入小學知父子之道長幼之序入太學知君臣之義上下之位墨子曰墨子勸弟子學曰汝若學吾當仕汝弟子學朞年就墨子求仕墨子曰汝不聞魯人乎昆弟五人父死長子嗜酒不肯預葬其四弟曰爾若送葬吾當為汝沽酒葬訖就弟求酒四弟曰子葬子父豈獨吾父乎吾恐人笑子故欺子以酒耳今子不學人自笑子故勸子也孫卿子曰達師之教使弟子安焉樂焉往焉游焉肅焉藏焉, SBCK: 性矜}
