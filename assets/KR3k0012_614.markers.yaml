  - {type: variant, offset: 2005, length: 1, content: 流, krp: 聚書津曰吾甞令道士上章驅鬼安用此鬼名耶隋書曰宇文慶沉深有器局少以聦敏見知周𥘉受業東觀頗渉經史旣而謂人曰書足記姓名而巳安能乆事筆硯爲腐儒之業于時文州民夷相聚爲亂慶應募從征賊保據巖谷徑路懸絶慶束馬而進襲破之以功授都督唐書曰馬燧少甞與諸兄讀書乃輟卷歎曰天下將有事矣丈夫當立功征伐以濟四海安能矻矻爲一儒也西京雜記曰傳介子}
