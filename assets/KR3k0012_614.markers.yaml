  - {type: variant, offset: 1967, length: 0, content: '', SBCK: 􅁻凶略絶冨陽男數以全生之道誨予方之好色號子爲書帙廢學毛詩緇衣曰子衿刺學校廢也丗亂則學校不脩焉青青子衿悠悠我心縱我不往子寧不嗣音尚書曰不學牆面涖事惟煩論語曰德之不修學之不講是吾憂也左傳曰學者植也不學將落也史記曰周道旣廢焚燒詩書故明堂石室金匱玉板圖籍散亂也又曰始皇諸生到者拜爲郎七百人宻種􅀲於驪山山温成實令諸生就視􅀃之人人不同乃爲伏機方難未定機發從上土填之其坈在陽西南三望里今爲閔儒郷也又曰秦始皇令天下有藏詩書百家語者悉詣守尉燒之敢偶詩書者棄市以古非今者族之漢書曰夫子没而微言絶七}
  - {type: page-break, offset: 1967, content: '', id: KR3k0012_SBCK_614-6b}
  - {type: variant, offset: 1967, length: 0, content: '', WYG: 吉凶略絶冨陽男數以全生之道誨予方之好色號余為書帙廢學毛詩緇衣曰子衿刺學校廢也世亂則學校不脩焉青青子衿悠悠我心縱我不往子寜不嗣音尚書曰不學牆面蒞事惟煩論語曰徳之不修學之不講是吾憂也左傳曰學者植也不學將落也史記曰周道既廢焚燒詩書故明堂石室金匱玉版圖籍散亂也又曰始皇時諸生到者拜為郎七百人宻種瓜於驪山温處實成令諸生就視說之人人不同乃為伏機方難未定機發從上填之以土其坑在咸陽西南三望里今為閔儒卿也又曰秦始皇令天下有藏詩書百家語者悉詣守尉雜燒之敢偶詩書者棄市以古非今者族之漢書曰夫子沒而微言絶七}
