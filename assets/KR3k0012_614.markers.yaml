  - {type: 'tls:seg', offset: 1958, content: '', id: KR3k0012_CHANT_614-29a.4}
  - {type: variant, offset: 1958, length: 0, content: '', SBCK: 篇數千言晝書夜誦旬有五日一皆通利豊竒之白澄曰豊十五從師迄于白首耳目所經未見此比江夏黄童不得無􅀟也澄􅀏曰藍田生玉何容不尓十六通杜氏春秋􅁪集門生討論同異三國典略曰齊王紘字師羅太安狄郡人北豫州刺史基之子也年十三楊州刺史郭元貞撫其背曰汝讀何書對曰誦孝經元貞曰孝經云何曰在上不驕爲下不亂元貞曰吾作刺史豈其驕乎紘曰雖不驕君子防未萌亦願留意梁書曰西陽王大鈞性厚重不妄戲弄年七歳武帝問讀何書對曰}
  - {type: page-break, offset: 1958, content: '', id: KR3k0012_SBCK_614-2b}
  - {type: variant, offset: 1958, length: 0, content: '', WYG: 篇數千言晝書夜誦旬有五日一皆通徹豐竒之白澄曰豐十五從師迄於白首耳目所經未見此比江夏黄童不得無雙也澄笑曰藍田生玉何容不爾十六通杜氏春秋恒集門生討論同異三國典略曰齊王紘字師羅太安狄那人北豫州刺史基之子也年十三揚州刺史郭元貞撫其背曰汝讀何書對曰誦孝經元貞曰孝經云何曰在上不驕為下不亂元貞曰吾作刺史豈其驕乎紘曰雖不驕君子防未萌亦願留意梁書曰西陽王大鈞性厚重不妄戯㺯年七嵗武帝問讀何書對曰}
  - {type: page-break, offset: 1958, content: '', id: KR3k0012_WYG_614-3b, image: WYG0898/WYG0898-0547b.png}
  - {type: variant, offset: 1958, length: 0, content: '', krp: 篇數千言晝書夜誦旬有五日一皆通利豊竒之白澄曰豊十五從師迄于白首耳目所經未見此比江夏黄童不得無雙也澄笑曰藍田生玉何容不尓十六通杜氏春秋恒集門生討論同異三國典略曰齊王紘字師羅太安狄郡人北豫州刺史基之子也年十三楊州刺史郭元貞撫其背曰汝讀何書對曰誦孝經元貞曰孝經云何曰在上不驕爲下不亂元貞曰吾作刺史豈其驕乎紘曰雖不驕君子防未萌亦願留意梁書曰西陽王大鈞性厚重不妄戲弄年七歳武帝問讀何書對曰}
  - {type: variant, offset: 1959, length: 0, content: '', SBCK: 詩因令諷誦即誦周南音韻清雅帝重之因賜王羲之書一卷三國典略曰梁孝元字丗誠􅀄年五歳梁武問曰讀何書對曰能讀曲禮梁武曰汝試言之孝元即誦上篇左右莫不驚歎及長精神爽儁殷興通語曰殷禮字往嗣幼而郷里異之七歳就官學書在師未甞戲弄諷誦􅁪不爲聲潜識而巳師殺雞詣禮父穎曰賀此子能興君門行在舟車手不釋卷從曲阿往返遂不知隄瀆廣狹及行旅喧閙未甞視之時人語曰竒才強記殷往嗣後與張温使蜀至荆州虎牙遭水衆人失色往嗣見之無異諸􅁑亮見之歎曰東吴菰蘆中乃有此竒偉晚學國語曰晉文公問元帥於趙衰元帥上卿對曰郄縠可行年五十矣縠晉大夫守學弥惇夫先王之法德義之府也志記德義生民之本也能惇篤者不忘百姓也請使郄縠公從之􅀃苑曰晉平公問師曠曰吾年七十欲學恐晚如何對曰少年如日出之光二十而學如日中之光老學如炳燭之明孰與夜行乎公曰善哉後漢書曰獻帝詔曰孔子歎學之不講講者習也不講則所識日忘今􅂄儒年踰}
  - {type: page-break, offset: 1959, content: '', id: KR3k0012_SBCK_614-3a}
  - {type: variant, offset: 1959, length: 0, content: '', WYG: 詩因令諷誦即誦周南音韻清雅帝重之因賜王羲之書一卷三國典略曰梁孝元字世誠初年五嵗梁武問曰讀何書對曰能曲禮梁武曰汝試言之孝元即誦上篇左右莫不驚及長精神爽雋殷典通語曰殷禮字徳嗣幼而鄉里異之七嵗就官學書在師未嘗戯㺯諷誦恒不為聲潛識而已師殺雞詣禮父穎曰賀此子能興君門行在舟車手不釋卷從曲阿往返遂不知隄瀆廣狹及行旅喧閙未嘗視之時人語曰竒才強記殷徳嗣後與張温使蜀至荆州虎牙遭水衆人失色徳嗣見之無異諸葛亮見之嘆曰東吳菰蘆中乃有此竒偉晚學國語曰晉文公問元帥於趙衰元帥上卿對曰郤縠可行年五十矣縠晉大夫守學彌惇夫先王之法徳義之府也志記徳義生能之本也能惇篤者不忘百姓也請從郤縠從之說苑曰晉平公問師曠曰吾年七十欲學恐晚如何對曰少年而學如日出之光二十而學如日中之光老學如炳燭之明孰與夜行乎公曰善哉後漢書曰獻帝詔曰孔子歎學之不講講者習也不講則所識日忘今耆儒年踰}
  - {type: page-break, offset: 1959, content: '', id: KR3k0012_WYG_614-4a, image: WYG0898/WYG0898-0547c.png}
