  - {type: variant, offset: 1959, length: 0, content: '', krp: 詩因令諷誦即誦周南音韻清雅帝重之因賜王羲之書一卷三國典略曰梁孝元字丗誠𥘉年五歳梁武問曰讀何書對曰能讀曲禮梁武曰汝試言之孝元即誦上篇左右莫不驚歎及長精神爽儁殷興通語曰殷禮字往嗣幼而郷里異之七歳就官學書在師未甞戲弄諷誦恒不爲聲潜識而巳師殺雞詣禮父穎曰賀此子能興君門行在舟車手不釋卷從曲阿往返遂不知隄瀆廣狹及行旅喧閙未甞視之時人語曰竒才強記殷往嗣後與張温使蜀至荆州虎牙遭水衆人失色往嗣見之無異諸葛亮見之歎曰東吴菰蘆中乃有此竒偉晚學國語曰晉文公問元帥於趙衰元帥上卿對曰郄縠可行年五十矣縠晉大夫守學弥惇夫先王之法德義之府也志記德義生民之本也能惇篤者不忘百姓也請使郄縠公從之說苑曰晉平公問師曠曰吾年七十欲學恐晚如何對曰少年如日出之光二十而學如日中之光老學如炳燭之明孰與夜行乎公曰善哉後漢書曰獻帝詔曰孔子歎學之不講講者習也不講則所識日忘今耆儒年踰}
  - {type: variant, offset: 1960, length: 1, content: 甲, SBCK: 十去離本土營求粮資不得專業結童入學白首空歸長委農野永絶榮望朕甚􅉖焉其依科罷者聽爲太子舎人劉艾獻帝紀曰時長安中謡曰頭白皓然食不充粮褁衣褰裳當還故郷聖主愍念悉用􅀘郎舎是布衣􅀍服􅀇黄齊書曰張充字延符少好逸遊父緒甞告歸至吴始入西郭逢充獵右臂鷹左牽狗遇舡至便放紲脫韝拜於水次父緒曰一身兩役無乃勞乎充曰充聞三十而立今充二十九矣請至來年緒曰過而能改顔氏子焉延明年便改多所該通唐書曰姚元崇􅀇宗獵于渭濵上曰卿頗知獵乎元崇曰臣少居廣城大澤不知書唯以射獵爲事年四十方遇張憬藏謂臣當以文學備位將相無爲自弃尓來折節讀書今雖官位過忝至於馳射老而猶能於是乎驅鷹放犬遟速稱旨上大恱曰乆不見卿思有顧問卿可於宰相行中行常後上縱轡乆顧之曰卿行何後公曰臣官踈賤不合叅宰相行上曰可兵部尚書平章事桓子新論曰髙君孟頗知律令常自伏冩書署郎哀其老欲代之不肯云我躬自冩乃當十遍讀魏應璩荅韓文憲書曰昔公孫引皓首入學顔􅃰聚}
  - {type: page-break, offset: 1960, content: '', id: KR3k0012_SBCK_614-3b}
  - {type: page-break, offset: 1960, content: '', id: KR3k0012_SBCK_614-4a}
  - {type: variant, offset: 1960, length: 1, content: 甲, WYG: 十去離本土營求粮資不得專業幼童入學白首空歸長委農野永絶冀望朕甚憫焉其依科罷者聽為太子舍人劉文獻帝紀曰時長安中謡曰頭白皓然食不充粮裹衣褰裳當返故鄉聖主愍念悉用補郎舍是布衣被服𤣥黄齊書曰張充字延符少好逸遊父緒嘗告歸至呉始入西郭逢充獵右臂鷹左牽狗遇緒船至便放紲脫韝拜於水次父緒曰一身兩役無乃勞乎充曰充聞三十而立今充二十九矣請至来年緒曰過而能改顔氏子有焉及明年便修改多所該通唐書曰姚元崇從𤣥宗獵於渭濵上曰卿頗知獵乎元崇曰臣少居廣城澤不知書唯以射獵事年四十方遇張憬藏謂臣當以文學備位宰相無為自棄邇来折節讀書今雖官位過忝至於馳射老而猶能於是薦於犬遲速稱㫖上大恱曰久不見卿思有顧問卿可於宰相行中行常後後縱轡久顧之卿行何後公曰臣官疎賤不合參宰相行上曰可兵部尚書平章事桓子新論曰髙君孟頗知律令嘗自伏冩書郎署哀其老欲代之不肯云我躬自寫乃當十遍讀魏應璩答韓文憲書曰昔公孫𢎞皓首入學顔涿聚十}
  - {type: page-break, offset: 1960, content: '', id: KR3k0012_WYG_614-5b, image: WYG0898/WYG0898-0548b.png}
