  - {type: variant, offset: 35, length: 466, content: 古之教者家有塾黨有庠術有序國有學術當為遂周禮五百家為黨萬二千五百家為遂也一年視離經辨志三年視敬業樂群五年視博習親師七年視論學取友謂之小成九年知類通達強立而不反謂之大成又曰學然後知不足教然後知困知不足然後能自反也知困然後能自強也又曰君子知至學之難易而知其美惡然後能博喻能博喻然後能為師能為師然後能為長能為長然後能為君又曰大學之法禁於未發之謂豫當其可之謂時不陵節而施之謂孫相觀而善之謂摩此四者教之所由興也發然後禁則扞格而不勝時過然後學則勤苦而難成雜施而不孫則壞亂而不修獨學而無友則孤陋而寡聞燕朋逆其師燕譬廢其學此六者教之所由廢也又曰學者有四失教者必知之人之學也或失則多或失則寡或失則易或失則止此四者心之莫同也知其心然後能救其失也又曰君子之教喻也道而弗牽強而弗抑開而弗達道而弗牽則和強而弗抑則易開而弗達則思和易以思可謂善喻也又曰教也者長善而救其失者也善歌者使人繼其聲善教者使人繼其志其言也約而達微而臧罕譬而喻可謂繼志也又曰太學始教皮弁祭菜示敬道也宵音小雅隸三官其始也入學鼓篋遜其業也檟楚二物收其威也未卜禘不視學游其志也時觀而不語存其心也幼, SBCK: 糿}
