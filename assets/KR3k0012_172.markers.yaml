  - {type: variant, offset: 2842, length: 0, content: '', SBCK: 在鬰林之西南交趾之北隋大將軍劉方始開此路爲鎮守㝷又不通唐貞觀二年清平公李弘節遣欽州首領􅇞師宗招慰開拓㝷劉方舊路得逹交州爲州在瀼水之東故以爲名瀼音而章反籠州十道志曰籠州扶南郡古越地在南越之西界唐貞觀十二年大使清平公李弘節招降獠置籠州以籠洞爲名環州十道志曰環州正平郡禹貢荆州之分州􅈻桂州貞觀二年李弘節招尉欵附環落洞故以名州州在遊盧水南整水北古州方輿志曰古州樂古郡􅁟地同臨潭郡唐置古州或爲樂古郡崖州方輿志曰崖州朱崖郡郡地海中之洲也洲方千里與今海康郡之徐聞縣對自徐聞徑度便風揚帆一日一夕即至梁置崖州}
