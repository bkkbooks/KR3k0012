  - {type: variant, offset: 45, length: 189, content: 越王勾踐其先禹之苗裔夏后少康之庶子也封於會稽以奉守禹之祀文身斷髮披草萊而邑焉吳志曰會稽南面連山萬重北帶滄海千里輿地志曰順帝時陽羨人周嘉上書請分浙江以西為吳郡東為會稽郡宋略曰會稽山陰編戶三萬號為天下繁劇王羲之云每行山陰道上如鏡中遊王獻之望鏡湖澄澈清流瀉注乃云山川之美使人應接不暇郡國志曰越王北面以事吴後終滅吳漢志曰會稽郡秦置高帝六年為荊國十二年更名吳景帝四年屬江都領曲阿等縣三十六, WYG: ''}
