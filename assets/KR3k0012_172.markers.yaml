  - {type: variant, offset: 2920, length: 266, content: 禹貢荊州之域春秋時屬楚其地即古蠻夷之地秦昭王使白起伐楚略取蠻夷置黔中郡漢改黔中為武陵郡隋開皇平陳改為辰州沅陵記曰五溪十洞頗為邊患自馬伏波征南之後雖為郡縣其民叛擾代或有之蓋恃山險所致十道志曰壺頭山後漢馬援征五溪蠻取壺頭山賊乘高守險水迅舡不得進士卒多疫死援亦中病穿岸為室以避炎氣遂卒于此武陵記曰山邊有石窟即馬援所穿室也室內有大虵如舡云是援之餘靈十道志曰故老云楚子滅巴巴子兄弟五人流入黔中漢有天下名曰酉辰巫武沅等五溪為一溪之長故號五溪錦州十道志曰錦州盧陽郡歷代土地與辰州同唐武德初以辰州之地析置錦州溪州十道志曰溪州靈溪郡禹貢荊州之域歷代土, SBCK: 􅁟}
