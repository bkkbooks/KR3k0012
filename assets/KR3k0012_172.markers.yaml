  - {type: variant, offset: 3802, length: 1, content: 葉, SBCK: 漢書張晏注曰儋耳其俗鏤其頰皮上連耳匡分爲數支狀似雞膓因名焉山海經海内南經曰有離耳郭景純注曰鎪其耳分令下垂爲飾即儋耳也振}
  - {type: variant, offset: 3802, length: 1, content: 葉, WYG: 八年改為潘州嶺表記曰潘州昔有方士潘茂於此昇仙遂以名容州方輿志曰容州晉寧郡古越地屬象郡二漢屬合浦郡宋太始七年分合浦縣於此立南流郡齊梁陳不改隋廢唐武德四年置銅州貞觀八年改為容州因容山為名十道志曰鬼門闗在北流縣南三十里兩石相對狀若闗形闊三十餘丈昔馬援討林邑經此立碑石碣尚存昔時趨交趾皆由此闗已南尤多瘴厲去者罕得生還故諺曰鬼門闗十人去九不還郡國志曰斯地瘴氣春為青草瘴秋為黄茅瘴有江水辯}
