  - {type: variant, offset: 17, length: 1, content: 楊, WYG: 揚州之域春秋戰國皆楚地秦屬南海郡二漢屬桂陽郡吳置始興郡晉因之宋改為廣興齊復為始興隋平陳為韶州以韶石為名郡國志曰韶州科斗勞水間有韶石二狀雙闕永和二年有飛仙衣冠遊二石上昔舜遊登此石奏韶樂因以名之岡州十道志曰岡州義寧郡禹貢揚州之域秦漢並屬南海郡東晉末分置新㑹郡宋齊並因之隋平陳置封州後改為亢州後改為岡州郡國志曰岡州地近大海晴少雨多時遇甚風林宇悉㧞俗織竹為釡以蠣殻屑泥之煑鹽轉久彌密循州十道志曰循州海豐郡春秋時為百粤之地戰國時屬楚秦二漢南海郡地晉亦然隋平陳置循州南粤志曰郡東水道一十里趙陀昔為龍州尉所莅於此潮州十道志曰潮州潮陽郡亦古閩粤地秦時屬南海郡秦末屬尉陀漢初屬南粤後亦屬南海郡後漢因之晉置東官郡隋平陳置潮州郡國志曰稻得再熟蠶亦五收煑海為鹽十道志曰海陽縣本漢揭陽縣地南粤志曰潮陽縣窮海之北故曰潮陽恩州十道志曰恩州恩平郡秦屬南海郡二漢為合浦郡唐貞觀中置恩州春州十道志曰春州南陵郡古百粤地秦屬南海象郡漢合浦郡之髙涼縣地晉分恩平縣唐武德四年討平蕭銑置春州賀州十道志曰賀州臨賀郡秦屬南海郡二漢屬蒼梧郡吳分置臨賀郡晉因之宋為臨慶國齊復為臨賀郡陳因之隋平陳置賀州因賀水為名端州十道志曰端州髙要郡秦屬南海郡兩漢並屬蒼梧郡晉亦然宋齊並屬南海郡陳置髙要郡隋平陳置端州南粤志曰石室山傍洞雲霧自生風烟有二石門以為仙之下都藤州十道志曰藤州感義郡秦屬南海郡二漢並屬蒼梧郡晉屬永明郡隋平陳置藤州煬帝初州廢置永平郡唐復為藤州新州十道志曰新州新興郡古越地秦始皇畧取陸梁地置象郡今州即其地也漢為合浦郡之臨元縣晉穆永和七年分蒼梧郡於此置新寧郡梁隋唐為新州勤州十道志曰勤州銅陵郡秦屬南海郡二漢屬合浦縣隋屬信安郡唐置勤州為銅陵郡竇州十道志曰竇州懷德郡禹貢揚州之域古越地漢蒼梧郡之端溪縣先管羅竇洞因為名唐武德五年置南扶州貞觀八年改為竇州郡國志曰竇州悉以髙欄為居號曰干欄三日一市焉又曰特亮縣在河涸水北昔有白牛夜出光影照村村人見此牛光號為特亮也桂州十道志曰桂州始安郡禹貢揚}
