  - {type: variant, offset: 1297, length: 2, content: 東陽, SBCK: 象郡􅁗屬桂林郡二漢爲鬰林郡吴又分置桂林郡晉宋齊因之隋平陳置象州因象山以爲名􅁗之象郡今合浦郡非此象州也栁州十道志曰栁州龍城郡􅁗漢􅁟地與象州同晉以後屬桂林郡隋屬始安郡唐平蕭銑置昆州貞觀八年改爲栁融州十道志曰融州融水郡歷代􅁟地與栁州同唐置融州邕州十道志曰邕州㓪寜郡古越地􅁗爲桂林郡漢鬱林郡之嶺方縣地晉置晉興郡于此隋爲鬱林郡之宣化縣武德四年置南晉州貞觀六年改爲邕州圖經曰人俗恡嗇澆薄内險外憃椎髻跣足尚雞卜􅆑卜貴州十道志曰貴州懷澤郡虞舜曁周並爲荒裔秦爲桂林郡自漢以下與鬱林郡同唐置貴州黨州十道志曰黨州寜仁郡􅁗桂林郡地唐置黨州南越志曰黨州隆仁縣有京觀即古征黨洞殺俘虜處撗州十道志曰撗州寧浦郡古越地􅁗象郡地漢爲合浦郡之髙涼縣地隋於此置簡州又改爲縁州唐改爲撗州田州十道志曰田州撗山郡􅁟地與㓪寧郡同唐爲田州嚴州十道志曰嚴州脩徳郡禹貢荆州之域漢武平南越即象郡地唐乾封二年置嚴州地在嚴崗之側因爲名圖經曰州門有長河水深八十丈從䍧牱流下山州方輿志曰山州龍池郡􅁟地與嚴州同唐爲山州或爲龍池郡淳州方輿志曰淳州永定縣􅁗屬桂林郡地唐武德四年置至永貞以犯憲宗廟諱改爲巒州以巒山爲名羅州十道志曰羅州招義}
