  - {type: variant, offset: 10, length: 0, content: '', SBCK: 廣州南海郡􅁗置南海郡二漢因之兼置交州吴因之分置廣州宋齊皆因之梁陳並置都督府隋平陳又置畨州􅌆帝初復置南海郡唐爲廣州又曰南海縣本漢畨禺縣地山海經曰桂林八樹在賁禺東注云賁禺即畨禺也吴録曰畨禺縣有禺山尉佗所葬南}
  - {type: variant, offset: 10, length: 1, content: 越, WYG: 廣}
  - {type: variant, offset: 10, length: 0, content: '', krp: 廣州南海郡秦置南海郡二漢因之兼置交州吴因之分置廣州宋齊皆因之梁陳並置都督府隋平陳又置畨州煬帝初復置南海郡唐爲廣州又曰南海縣本漢畨禺縣地山海經曰桂林八樹在賁禺東注云賁禺即畨禺也吴録曰畨禺縣有禺山尉佗所葬南}
  - {type: variant, offset: 11, length: 0, content: '', SBCK: 志曰肅連山西十里有靈}
  - {type: variant, offset: 11, length: 0, content: '', krp: 志曰肅連山西十里有靈}
