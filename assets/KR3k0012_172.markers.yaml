  - {type: variant, offset: 3839, length: 0, content: '', WYG: 越地秦象郡地漢為合浦郡唐武德四年置南州六年改為白州嶺表録曰州有一派水出自雙水山合容州江呼為緑珠井在雙角山下昔梁氏之女有容貌石季倫為交趾採訪使以真珠三斛買之梁氏之居舊井存焉牢州十道志曰牢州定州郡本巴蜀西南徼外夷秦屬象郡漢屬牂牱郡唐置義州改為智州貞觀十一年改為牢州以牢石為名欽州十道志曰欽州寧越郡厯代土地與白州同宋齊以來置宋壽郡梁又置安州隋平陳改為欽州南安都䕶府方輿志曰南安府今理宋平縣古越地禹貢揚州之域號為百粤在周為越裳重譯之地秦屬象漢為交趾日南二郡界後漢因之唐為交州又曰人俗雜}
