  - {type: variant, offset: 1473, length: 1, content: 信, krp: 南潘郡古甌駱越地秦平百越爲桂林郡地漢爲合浦縣地屬合浦郡唐武徳四年置南宕州八年改爲潘州嶺表記曰潘州昔有方士潘茂於此昇仙遂以名郡容州方輿志曰容州普寜郡古越地秦屬象郡二漢屬合浦郡宋太始七年分合浦縣於此立南流郡齊梁陳不改隋廢唐武德四年置銅州貞觀八年改爲容州因容山爲名十道志曰鬼門關在北流縣南三十里兩石相對狀若關形闊三十餘歩昔馬援討林邑經此立碑石碣尚存昔時趨交趾皆由此關巳南尤多瘴癘去者罕得生還故諺曰鬼門關十人去九人還郡國志曰斯地瘴氣春謂青草瘴秋謂黄苑瘴有瘴江水辯州十道志曰辯州陵水郡古越地秦象郡地二漢屬合浦郡唐置辯州郡國志曰辯州在陵羅二水之間白州十道志曰白州南昌郡古越地秦象郡地漢爲合浦郡唐武徳四年置南州六年改爲白州嶺表録曰州有一派水出自雙角山合容州江呼爲緑珠江又緑珠井在雙角山下昔梁氏之女有容皃石季倫爲交趾採訪使以眞珠三斛買之梁氏之居舊井存焉牢州十道志曰牢州定川郡本巴蜀西南徼外夷秦屬象郡漢屬牂牁郡唐置義州改爲智州貞觀十一年改爲牢州以牢石爲名欽州十道志曰欽州寧越郡歷代土地與白州同宋齊巳來置宋壽郡梁又置}
