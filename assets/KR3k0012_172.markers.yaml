  - {type: variant, offset: 772, length: 0, content: '', SBCK: 潮陽郡亦古閩越地􅁗屬南海郡􅁗末屬尉佗漢􅀄屬南越後亦屬南海郡後漢因之晉置東官郡隋平陳置潮州郡國志曰稻得再熟蠶亦五収煑海爲鹽十道志曰海陽縣本漢掲陽縣地南越志曰潮陽縣窮海之北故曰潮陽恩州十道志曰恩州恩平郡􅁗屬南海郡二漢爲合浦郡唐貞觀中置恩州春州十道志曰春州南陵郡}
