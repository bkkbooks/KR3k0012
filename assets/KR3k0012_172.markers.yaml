  - {type: variant, offset: 3843, length: 0, content: '', SBCK: 與朱崖郡同}
  - {type: variant, offset: 3843, length: 0, content: '', WYG: 與南安都䕶府同唐置武峩州粤州方輿志曰粤州龍水郡土地與南安府同唐為粤州或為龍水郡芝州方輿志曰芝州忻城郡土地與南安府同唐為芝州或為忻城郡愛州方輿志曰愛州九真郡秦象郡地漢武置九真郡後漢亦同晉屬九真郡宋齊因之梁置愛州隋為九真郡唐又為愛州福禄州方輿志曰福禄州福禄郡土地與九真同唐為福禄州長州方輿志曰長州文陽郡土地與九真同唐為長州驩州方輿志曰驩州日南郡古越裳氏國九譯所通者也秦屬象郡二漢屬九真郡吳分置九德郡晉宋齊因之隋置驩州後為日南郡唐為驩州郡國志曰龎山口洞人朱其兩齒為飾刻青作花文中山立市十日一㑹鑄銅為器火盤名勞勞以為財市峯州方輿志曰峯州承化郡古文郎國有文郎水亦陸梁地秦屬象郡二漢屬交趾郡吳分置新興郡晉改為新昌陳置興州隋平陳改為峯州煬帝初廢唐復置峯州林邑記曰蒼梧以南有文郎野人居無室宅依樹上宿食生肉採桑為業與人交易若上古之人陸州方輿志曰陸州玉山郡秦象郡地漢以來屬交趾郡梁分置南州及寧海郡隋平陳郡廢改南州為玉州煬帝初州廢唐復置玉州上元二年改為陸州州有陸水廉州方輿志曰廉州合浦縣秦象郡地漢置合浦郡後漢同吳改為珠官晉又為合浦郡宋因之兼置臨瘴郡及越州齊又因之隋改為禄州尋改合州唐置廉州後漢書曰孟嘗字伯周㑹稽上虞人為合浦太守先是太守多貪珠遂徙向交趾嘗到革前弊珠遂還稱為神明桓帝徵之巖州方輿志曰巖州安樂郡土地與合浦郡同唐為巖州或為安樂郡雷州方輿志曰雷州海康郡秦屬象郡地二漢以後並屬合浦郡梁分置合州大同末為南合州隋煬帝初廢唐為雷州投荒録曰雷州南濵大海多雷雷之聲近在簷宇之上雷州之北髙州之南數鄉亦多雷雷聲似在尋常之外俗俟雷時具酒肴設奠畏雷法甚嚴謹有以彘肉與鷄肉食者霹靂即止禺州十道志曰禺州溫水郡古百粤地婺女之分野秦屬象郡本巖昌之邊邑唐置巖州又改為禺州以南方番禺之地因名州湯州方輿志曰湯州湯泉郡秦屬象郡地唐置湯州或為湯泉郡瀼州十道志曰瀼州臨潭郡禹貢揚州之域春秋屬楚在鬱林之西南交趾之北隋大將軍劉方始開此路為鎮守尋又不通}
