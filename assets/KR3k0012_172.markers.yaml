  - {type: variant, offset: 783, length: 0, content: '', SBCK: 州之分古越地漢蒼梧郡之端溪縣先管羅竇洞因爲名唐武徳五年置南扶州貞觀八年改爲竇州郡國志曰竇州悉以髙欄爲居號曰千蘭三日一市又曰特亮縣在河洞水北昔有白牛夜出光影照村村人見此牛光號爲特亮也桂州十道志曰桂州始安郡禹貢荆}
