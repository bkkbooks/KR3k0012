  - {type: variant, offset: 961, length: 0, content: '', SBCK: 臨桂縣荔水水源多生桂桂生處不生􅄂樹昭州十道志曰昭州平樂郡􅁗桂林郡地二漢屬蒼梧郡宋屬始建國齊屬始安郡隋亦然唐武徳四年置樂州貞觀八年改爲昭州取昭潭爲名盛弘之荆州記曰平樂縣西南數十里有山間有兩目如人眼極大瞳子白黒分明􅂪州十道志曰􅂪州􅂪山郡漢武平南越置蒼梧郡今州即蒼梧之荔浦縣也隋置隋化縣唐置蒙州州有山號曰蒙山山下人皆姓蒙因爲州名冨州十道志曰冨州開江郡􅁗桂林郡地二漢屬蒼梧郡梁爲開江武城二郡地陳置静州改開江武城二郡爲逍遥郡隋平陳並廢唐又置静州貞觀八年改爲冨州因冨水爲名梧州十道志曰梧州蒼梧郡􅁗屬桂林郡二漢爲蒼梧晉以後並因之梁屬成州隋平陳改爲封州唐爲梧州漢書曰武帝元始六年開蒼梧郡禮記曰舜葬蒼梧之野潯州十道志曰潯州潯江郡􅁗屬桂林郡二漢以後並屬鬰林郡隋屬永平鬰林二郡地唐置潯州郡國志曰大賔縣漢布山縣地有糖牛與虵同穴牛􅄝􅐭俚人以皮褁手塗鹽入穴探之牛舐之出外則不得入取其角爲器一曰糖牛龔州十道志曰龔州臨江郡􅁗屬桂林郡漢平南越置蒼梧郡今州即郡之孟陵縣地也唐置龔州鬰林州十道志曰鬰林州鬰林郡􅁗爲桂林郡漢改爲鬰林郡後漢亦同梁置定州後改爲南定州隋平陳改爲尹州􅌆帝􅀄爲鬰林州唐爲鬰林州平琴州十道志曰平琴州平琴郡舊鬰林郡地唐置平琴州或爲平琴郡賔州十道志曰賔州安城郡古越地􅁗桂林郡地漢爲鬰林郡又爲鬰林郡之嶺方縣自漢迄隋並爲嶺方縣地唐貞觀五年置賔州澄州十道志曰澄州賀水郡古越地􅁗爲桂林郡漢爲鬰林郡之嶺方縣}
