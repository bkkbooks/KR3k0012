  - {type: variant, offset: 1498, length: 1307, content: 西有三衢山因以為名輿地志曰後漢獻帝初平三年分太末縣立新安縣晉太康元年以弘農有新安改名為信安左傳曰越伐吳王孫彌庸觀越見姑蔑之旗杜注云今東陽太蔑縣是輿地志曰太蔑秦漢為太末縣今龍丘乃春秋東陽太末縣也潭州十道志曰潭州長沙郡禹貢荊州之域春秋及戰國時為黔中地之南境晉懷帝永嘉元年分荊州置湘州隋平陳改湘州為潭州史記天官書曰翼軫為楚分傍一小星為長沙星漢書曰高帝封番君吳芮為長沙王又曰長沙定王發景帝二年立以母微無寵故王卑濕貧國應劭注曰景帝後二年諸王來朝有詔更前稱壽歌儛定王但張袖小舉手左右笑其拙怪問之對曰臣國小地狹不足廻旋帝乃以武陵零陵桂陽屬焉郡國志曰炎帝神農氏葬於長沙長沙之尾東至江夏謂之沙羨是其地十三州志曰西自湘江至東萊萬里故曰長沙湘州記曰始皇二十五年併天下分黔中以南之沙鄉為長沙郡以統湘川蓋取星以名焉遁甲經曰長沙之地雲陽之墟可以長生可以避世湘中記曰其地有舜之遺風人多純朴今故老猶彈五絃琴好為漁父吟湖南風土記曰長沙下濕丈夫多夭折俗信鬼好淫祀第廬為室頗雜越風岳州十道志曰岳州巴陵郡禹貢荊州之域古三苗國地春秋及戰國時屬楚秦屬長沙郡晉分長沙之巴陵置建昌郡在巴陵齊武封子倫為巴陵王梁封齊明帝子寶義為巴陵王奉齊後以備三恪隋平陳改為岳州尋江記曰羿屠巴虵於洞庭其骨若陵故曰巴陵淮南子曰斬脩蛇于洞庭十道志曰巴陵縣本漢下雋縣之巴丘地漢書地理志曰下雋縣屬長沙郡十道志曰華容縣本漢孱陵縣衡州十道志曰衡州衡陽郡春秋時屬楚秦屬長沙郡漢為酃縣地屬長沙國吳分長沙之東部立為湘東郡隋平陳罷郡為衡州因衡山以取名尚書禹貢曰荊及衡陽惟荊州甄烈湘州記曰宋大明中望氣者云湘東有天子氣遣日者巡視斬崗以厭之尋乃湘東王為天子即明帝也圖經曰荼陵縣者所謂陵谷生茶茗焉永州十道志曰永州零陵縣禹貢荊州之域春秋及戰國時楚之南境秦屬長沙郡漢屬長沙國晉以零陵屬湘州隋平陳置永州因永水為名梁書曰孫謙字長遜為零陵太守有善績吏人安之先是部多猛獸謙至絕跡及去官之夜猛獸即害居人甄烈湘州記曰石鷰山石形似鷰大小如一山明凈即頡頑飛翔羅含合湘中記曰石鷰在泉陵縣雷風則群飛然其土人稀有見者按十道志曰零陵縣本漢泉陵縣道州十道志曰道州江華郡禹貢荊州之域春秋及戰國時屬楚漢屬長沙國唐貞觀八年為道州圖經曰昔舜封象有鼻國即其地郴州十道志曰郴州桂陵郡禹貢荊州之域春秋及戰國時屬楚秦屬長沙郡漢高祖二年分長沙南境立桂陽郡屬荊州部居郴梁元帝為盧陽郡屬衡州隋平陳改為郴州史記曰項羽徙義帝於長沙都郴連州十道志曰連州連山郡春秋時楚地秦為長沙郡之南境二漢為桂陽郡之桂陽縣吳屬始興郡晉因之宋於此立宋安郡後省齊如之梁為陽山郡唐武德四年改為連州以郡南黃連嶺為名邵州十道志曰邵州邵陽郡禹貢荊州之域春秋時屬楚秦為長沙郡漢為昭陵縣屬零陵郡吳分零陵北部為邵陵郡屬荊州即今州也晉武改昭陽為邵陽唐貞觀十年改為邵州又曰邵陽縣本漢昭陵縣地屬長沙國黔州十道志曰黔州黔中郡禹貢荊州之域戰國為楚黔中地秦昭王伐楚置黔中郡其地又屬焉漢武陵郡之酉陽縣地武陵五溪蠻之西界也周武帝保定四年蠻帥田思鶴以地內附置奉州建德三年改為黔州吳錄曰黔陽屬武陵郡黔陽今辰州三亭縣西故城是也思州十道志曰思州寧夷郡禹貢荊州之域春秋楚地隋開皇十八年始置務川縣屬庸州唐武德元年以務川當䍧牁要路置務, SBCK: 銅}
