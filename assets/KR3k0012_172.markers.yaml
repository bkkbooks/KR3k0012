  - {type: variant, offset: 780, length: 0, content: '', SBCK: 晉分置恩平縣唐武徳四年討平蕭銑置春州賀州十道志曰賀州臨賀郡􅁗屬南海郡二漢屬蒼梧郡吴置臨賀郡晉因之宋爲臨慶國齊復爲臨賀郡陳因之隋平陳置賀州因賀水爲名端州十道志曰端州髙要郡􅁗屬南海郡兩漢並屬蒼梧郡晉亦然宋齊並屬南海郡陳置髙要郡隋平陳置端州南越志曰石室山傍洞雲霧自生風煙有二石門以爲仙之下都藤州十道志曰藤州感義郡􅁗屬南海郡二漢並屬蒼梧郡晉屬永平郡隋平陳置藤州􅌆帝􅀄州廢置永平郡唐復爲藤州郡國志曰俗以青石爲刀劔如銅鐵法婦人亦爲環玦代珠玉也夷人徃徃化爲􅓔貙小虎也康州十道志曰康州晉康郡􅁗屬南海郡二漢屬蒼梧郡晉分置晉康郡宋齊因之隋平陳廢晉康併入信安郡今髙要郡也唐復置康州封州十道志曰封州臨封郡土地所屬自􅁗巳上與康州同今州即漢蒼梧郡之廣信縣也梁置信郡兼置成州隋平陳廢郡改成州爲封州瀧州十道志曰瀧州開陽郡瀧數江切土地所屬自漢巳上與康州同晉分端溪置龍郷縣今州即其地南越志龍郷縣屬廣熈郡梁分廣熈置建州又分建州之􅀟頭洞立􅀟州即此是髙州十道志曰髙州髙涼郡􅁗以前土地與晉康郡同二漢屬合浦郡吴置髙涼郡晉因之梁置髙州隋平陳郡廢而髙州如故唐爲髙州南越志曰髙涼本合浦縣也吴建安十六年衡毅錢博拒歩騭於髙安峽毅投水死博與其屬亡于髙涼吕岱爲刺史博旣請降制以博爲髙涼都尉於是置郡焉義州十道志曰義州連城郡土地所屬􅁗巳上與潘州同漢置蒼梧郡今州即蒼梧郡之孟陵縣唐武徳四年江表厎定於此置南義州貞觀二年於此置義州新州十道志曰新州新興郡古越地􅁗始皇略取陸梁地置象郡今州即其地也漢爲合浦縣之臨元縣晉穆永和七年分蒼梧郡於此置新寜郡梁隋唐爲新州勤州十道志曰勤州銅陵郡􅁗屬南海郡二漢屬合浦郡隋屬信安郡唐置勤州或爲銅陵郡竇州十道志曰竇州懷徳郡}
