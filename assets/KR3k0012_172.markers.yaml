  - {type: variant, offset: 3561, length: 232, content: 播州以其池有播川因名焉漢書曰唐蒙上書說武帝曰聞夜郎國有精兵可十餘萬浮舟䍧牁出其不意以制越此一奇也珍州十道志曰珍州夜郎郡古山獠夜郎國之地晉永嘉五年分䍧牁置夜郎郡兼置充州唐貞觀十七年廓闢邊夷置播川鎮後因川中有降珍山因以鎮為珍州取山名郡也九州志曰夜郎自古非臣伏州郡之地漢武開拓南邊始置夜郎縣屬䍧牁郡即䍧牁都尉居之後漢書曰夜郎者臨䍧牁江江廣百餘步足以行舡十三州志曰䍧牁者江中山名也夷州十道志曰夷州義泉縣古徼外蠻夷之地漢置䍧牁郡歷代恃險不聞臣附隨大業七年始招慰置綏陽縣屬明陽, SBCK: 儋耳}
