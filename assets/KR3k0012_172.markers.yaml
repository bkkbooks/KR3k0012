  - {type: variant, offset: 2830, length: 0, content: '', SBCK: 郡本巴蜀西南徼外夷秦屬象郡漢屬牂牁郡唐置義州改爲智州貞觀十一年改爲牢州以牢石爲名欽州十道志曰欽州寧越郡歷代土地與白州同宋齊巳來置宋壽郡梁又置安州隋平陳改爲欽州安南都護府方輿志曰安南府今理宋平縣古越地禹貢楊州之地號爲百越在周爲越裳重譯之地􅁗屬象郡漢爲交阯日南二郡界後漢因之唐爲交州又曰人俗􅄂蠻夷之風其人皆服布如單􅀍穿中央以貫其首男子耕農女子織絍兵則矛楯長刀木弓竹矢或骨爲鏃交州記曰南定縣人足骨無節身有毛卧者更扶始得起故山海經云交脛人國脚脛曲戾相交所以謂之交趾南越志曰龍編縣州之始有蛟龍編於津之間因以爲瑞而名邑武峩州方輿志曰武峩州武峩郡土地與安南府同唐置武峩州粤州方輿志曰粤州龍水郡土地與安南府同唐爲粤州或爲龍水郡芝州方輿志曰芝州忻城郡土地與安南府同唐爲芝州或爲忻城郡愛州方輿志曰愛州九眞郡􅁗象郡地漢武置九眞郡後漢亦同晉亦屬九眞郡宋齊因之梁置愛州隋爲九眞郡唐又爲愛州福禄州方輿志曰福禄州福禄郡土地與九眞郡同唐爲福禄州長州方輿志曰長州文陽郡􅁟地與九眞同唐爲長州驩州方輿志曰驩州日南郡古越裳氐國九譯所通者也秦屬象郡二漢屬九眞郡吴分置九徳郡晉宋齊因之隋置驩州後爲日南郡唐爲驩州郡國志曰龐山洞人去其兩齒爲飾刻􅎍作花文中山立市十日一㑹鑄銅爲器大如盤名旁旁以爲財市峯州方輿志曰峯州承化郡古文郎國有文郎水亦陸梁地􅁗屬象郡二漢屬交趾郡吴分置新興郡晉改爲新昌陳置興州隋平陳改爲峯州焬帝初廢唐復置峯州林邑記曰蒼梧以南有文郎野人居無室宅依樹止宿食生􅁏採香爲業與人交易􅀂上皇之人陸州方輿志曰陸州玉山郡􅁗象郡地漢以來屬交趾郡梁分置黄州及寧海郡隋平陳郡廢改黄州爲玉州煬帝􅀄州廢唐復置玉州上元二年改爲陸州州有陸水廉州方輿志曰廉州合浦郡􅁗象郡地漢置合浦郡後漢同吴改爲珠官晉又爲合浦郡宋因之兼置臨瘴郡及越州齊又因之隋改爲禄州㝷又改爲合州置廉州後漢書曰孟甞字伯周㑹稽上虞人爲合浦太守先時太守多貪珠遂徙向交趾甞到革理前弊珠遂還稱爲神明桓帝徴之巖州方輿志曰巖州安樂郡土地與合浦郡同唐爲巖州或爲安樂郡雷州方輿志曰雷州海康郡秦象郡地二漢以後並屬合浦郡梁分置合州大同末爲南合州隋􅌆帝􅀄廢唐爲雷州投荒録云雷州南濵大海多雷雷之聲近在􅉉宇之上雷州之北髙州之南數郷亦多雷雷聲似在㝷常之外俗俟雷時具酒肴設奠畏雷法甚嚴謹有以􅇾􅁏與雞􅁏食者霹靂即至禺州十道志曰禺州温水郡古百越地㜈女之分野􅁗屬象郡本宕昌之邊邑唐置宕州又改爲禺州以南方畨禺之地因名州湯州方輿志曰湯州湯泉縣􅁗屬象郡唐置湯州或爲湯泉州瀼州十道志曰瀼州臨潭}
