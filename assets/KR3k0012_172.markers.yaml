  - {type: variant, offset: 3860, length: 5, content: 多貢象牙後, WYG: 所屬與朱崖同漢元鼎六年定越地置儋耳郡唐武德四年置儋州漢書張晏註曰儋耳其俗鏤其頰皮上連耳匡分為數支狀似鷄腸因名焉海内南經曰有離耳郭景純註曰鎪其耳分令下垂為飾即儋耳也振州方輿志曰振州延德郡土地與朱崖郡同隋置臨振郡唐置振州瓊州方輿志曰瓊州瓊山郡土地與朱崖郡同唐貞觀六年割崖州置瓊州萬安州方輿志曰萬安州萬安郡土地與朱崖郡同唐置萬安州}
