  - {type: variant, offset: 2849, length: 710, content: 通䍧牁道置䍧牁郡其地屬焉江山阻陰遠為俚獠所居多不臣附周宣政元年獠王元殊多質等歸國遂立州取費水為名九州要記曰九丘之外有費州辰州十道志曰辰州盧溪郡禹貢荊州之域春秋時屬楚其地即古蠻夷之地秦昭王使白起伐楚略取蠻夷置黔中郡漢改黔中為武陵郡隋開皇平陳改為辰州沅陵記曰五溪十洞頗為邊患自馬伏波征南之後雖為郡縣其民叛擾代或有之蓋恃山險所致十道志曰壺頭山後漢馬援征五溪蠻取壺頭山賊乘高守險水迅舡不得進士卒多疫死援亦中病穿岸為室以避炎氣遂卒于此武陵記曰山邊有石窟即馬援所穿室也室內有大虵如舡云是援之餘靈十道志曰故老云楚子滅巴巴子兄弟五人流入黔中漢有天下名曰酉辰巫武沅等五溪為一溪之長故號五溪錦州十道志曰錦州盧陽郡歷代土地與辰州同唐武德初以辰州之地析置錦州溪州十道志曰溪州靈溪郡禹貢荊州之域歷代土地所屬與辰州同唐武德中立溪州蓋取五溪相會於此又曰大鄉縣本漢沅陵零陵二縣地屬武陵郡梁分立大鄉縣三亭縣本漢靈陽縣地屬武陵郡唐分大鄉縣縣有小酉山黔山大酉山敘州十道志曰敘州潭陽郡古蠻夷之地戰國時為楚黔中地唐貞觀八年為巫州天授三年以巫山不在州界改為沅州以沅江水為郡名開元十三年仍舊為巫州至大曆五年為敘州五溪記曰民多射生而鼻飲噉虵鼠捕鰕蟹朝營夕用故無宿給施州十道志曰施州清江郡禹貢荊州之域春秋時巴國七國時為楚巫郡地秦昭王伐楚置黔中郡巫地屬焉周武帝建德二年酋長向鄒兄弟四人相率內附置施州又曰清江縣本漢巫縣地屬南郡巫縣今夔州巫山縣是也吳晉及周為沙渠之地隋於此置清江縣播州十道志曰播州播川郡秦夜郎縣之西南隅惠王十四年欲得楚黔中地以武關之外易之今隸黔府即總謂黔中地漢武元鼎六年平西南夷置䍧牁郡其地屬焉以且蘭有掾舡䍧牁因此立郡以名焉貞觀九年於北界置郎州後省十三年又於其, krp: 定越}
