  - {type: variant, offset: 3846, length: 1, content: 八, WYG: 二年清平公李𢎞節遣欽州首領甯師宗招慰開拓尋劉方舊路得達交州為州在瀼水之東故以為名瀼音向章反籠州十道志曰籠州扶南郡古越地在南粤之西界唐貞觀十二年大使清平公李𢎞節招降獠置籠州以洞為名環州十道志曰環州整平郡禹貢揚州之域分𨽻桂州貞觀十二年李𢎞節招慰欵討環落洞故以名州州在遊盧水南整水北古州方輿志曰古州樂興郡土地同臨潭郡唐置古州或為樂興郡崖州方輿志曰崖州朱崖郡郡地海中之洲也洲方千里與今海康郡之徐聞縣對自徐聞徑度便風揚帆一日一夕即至梁置崖州漢書曰武帝元鼎六}
