  - {type: variant, offset: 2828, length: 1, content: 涪, SBCK: 陵水郡古越地􅁗象郡地二漢屬合浦郡唐置辯州郡國志曰辯州在陵羅二水之間白州十道志曰白州南昌郡古越地􅁗象郡地漢爲合浦郡唐武徳四年置南州六年改爲白州嶺表録曰州有一􅂀水出自􅀟角山合容州江呼爲緑珠江又緑珠井在􅀟角山下昔梁氏之女有容皃石季倫爲交趾採訪使以眞珠三斛買之梁氏之居舊井存焉牢州十道志曰牢州定}
