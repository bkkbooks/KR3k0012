  - {type: variant, offset: 12, length: 2, content: 會稽, SBCK: 山焉其山平原弥望曽野極目郭景純云南海之間有衣冠之氣者斯其地也又曰􅁗占氣者以南方有黄氣紫雲之異使繡衣使者鑿之二十餘文乃流血數日以爲鑿龍之効今所鑿之處形似馬鞍謂之馬鞍崗又曰石門之水舊曰貪泉俗云經大􅁃則清穢之氣分飲石門則淄素之質變廣州記曰尉佗築朝臺以朝天子南越志曰朝臺下有趙佗城朝臺西三十里即崗旁江構越華館以送陸賈因稱朝亭十道志曰畨禺北津水今名廉平水韶州十道志曰韶州始興}
  - {type: page-break, offset: 12, content: '', id: KR3k0012_SBCK_172-2a}
  - {type: variant, offset: 12, length: 2, content: 會稽, WYG: 南海郡秦置南海郡二漢因之兼置交州吳因之分置廣州宋齊皆因之梁陳並置都督府隋平陳又置潘州煬帝初復置南海郡唐為廣州山海經曰桂林八樹在賁禺東註云賁禺即番禺也吳錄曰番禺縣有禺山尉陀所葬南粤志曰肅連山西十里有靈州山焉其山平原彌望四野極目郭景純云南海之間有衣冠之氣者斯其地也廣州記曰尉陀築朝臺以朝天子南粤志曰朝臺下有趙陀城朝臺西三十里即崗旁江構粤華館以送陸賈因稱朝臺十道志曰番禺北津水今名廉平水韶州十道志曰韶州始興}
