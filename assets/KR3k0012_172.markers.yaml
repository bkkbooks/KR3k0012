  - {type: punctuation, offset: 368, content: 《, id: KR3k0012_CHANT_172-bkkpn146}
  - {type: variant, offset: 368, length: 593, content: 禹貢楊州之域春秋時屬越秦屬丹陽郡漢志曰歙都尉治屬丹陽郡漢志曰黝縣屬丹陽郡浙江水出焉成帝鴻嘉二年為廣德國王莽曰愬虜師古曰黝音伊字與黟同晉書曰孔愉字敬康會稽人永嘉之亂避地入新安山谷中以稼穡讀書為業信著鄉里後奄忽而去人皆以為神為之立廟孔靈村梁書曰任昉為新安太守調楓香二石始入三兩便止不欲遺之後人及下任唯有桃花米二十石圖經曰續溪縣以界內乳溪與徽溪相去一里廻轉屈曲並流離而復合謂之續溪縣因名焉圖經曰任昉為新安太守因行春至此愛其玄溪緣源尋幽累日不返百姓因名其溪為昉溪村名昉村又曰新安貢柿心墨木黝之字縣職此之由又曰祈門縣本名閶門著於秦漢之代縣有巨石夾流水兩相對其狀似門故號閶門又曰婺源縣本晉休寧縣東陽記曰上應婺女故名之明州十道志曰明州余姚郡古舜為餘姚之墟史記曰越王勾踐平吳徙夫差於甬東漢志曰餘姚屬會稽郡本鄮縣之地風土記曰舜支庶所封故曰餘姚輿地志曰邑人以其海中物產於山下鄮易因名鄮縣圖經曰鄮縣有甬東及句章故城台州十道志曰台州古越州會稽郡之地禹貢楊州之域春秋時越國秦屬閩中郡後越王無疆七代孫閩君搖率越人佐漢伐秦惠帝錄其功封姚為東越王都於甌山海經曰甌在海中郭璞注云今臨海永寧縣即東甌故地也若在南海中鬱林郡為西甌吳地記曰漢書閩越圍東甌東甌告急於天子天子遣太中大夫嚴助發兵往救未至閩越止兵東甌乃舉國徙中國處之江淮間而後遺人往往漸出乃以東甌地為回浦縣漢志曰回浦東部都尉理屬會稽郡揚雄解嘲曰東南一尉西北一候十道志曰, WYG: 隋亦然}
