  - {type: variant, offset: 525, length: 3, content: 制則未, WYG: 自奉養極為鮮明而遷徙所載不過嚢衣天下服其亷而怪其奢世傳陽能作黄金後漢書曰更始時授官爵皆羣小賈豎膳夫庖人多着繡而衣錦袴襜褕諸于罵詈道中時智者見之以為服之不中身之災也漢書音義曰諸于大掖衣也如婦人之袿衣揚雄方言曰襜褕其短者自閔而西謂之裗郭璞注曰俗名裾掖㨿此即是諸于上加繡裙如今之手臂也裗音充䘿音屈又曰光武見来歙大歡即觧衣以衣之又曰祭遵為人儉約家無私財常衣韋袴寢布被夫人裳不加縁又曰祭彤在遼東幾三十年衣無兼副顯宗美其清約賜之衣被什物無不悉備又曰耿恭自䟽勒廽衣屨穿決形容枯槁又曰東平憲王蒼侍肅宗饗衞士於南宫因從皇太后周行掖庭池閲隂太后舊時器服愴然動容乃衆留五時衣各一襲五時衣謂春青夏朱季夏黄秋白冬黑也衣單􅃨其曰襲及常所御衣合五十篋餘悉分布諸王王及子孫在京師者各}
