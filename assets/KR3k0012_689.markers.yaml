  - {type: variant, offset: 1594, length: 0, content: '', WYG: 尋若經此木下皆不死不病或有泛海繩山来㑹其國綴草毛為繩結網為衣如今之羅紈也至元狩六年獻網衣一襲帝焚於九逹之道恐後人徴求此物故燒之烟如金}
