  - {type: variant, offset: 720, length: 1, content: 資, SBCK: 家甚貧不營財利餉饋盈門一無所受無兼衣餘食嘗爲上所召遇澣衣稱疾經日衣成然後起又曰謝超宗爲義興太守昇明二年公事免詣東府門自通其日風寒髙帝謂四座曰此客至使人不衣自暖矣齊書曰宋元嘉制諸主入齋閤得自服􅅂㡌見人主唯出太極西廟乃備朝衣車駕幸其第乃白服烏紗㡌以侍宴焉至於衣服制度動皆陳啓事無專制又曰髙帝即位後手詔賜張融衣曰見卿衣服麄故誠乃素懷有本交爾藍縷亦虧朝望今送一通故衣意謂雖故乃勝新也是吾所著巳令裁减稱卿之體并履一量又曰陶弘景永明十年脫朝服挂神武門上表辭禄詔許之又曰王思逺立身簡㓗諸客詣巳者覘知衣服垢穢不前形儀新楚乃}
