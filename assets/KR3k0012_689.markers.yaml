  - {type: variant, offset: 1528, length: 8, content: 太皇太后入朝服紺, SBCK: ''}
  - {type: variant, offset: 1528, length: 0, content: '', WYG: 上古冗居衣毛未有制度後聖人易之以絲麻觀乎翬翟之文榮華之色乃染帛以效之始作五采成以為服凡十二章莊子曰莊子衣大布之衣而過魏王魏王曰何先生之憊耶莊子曰士有道徳不能行憊也衣弊履穿而貧非憊也商君書曰上世之人衣不暖膚食不滿腹孫卿子曰子夏家貧衣若懸鶉人曰子何不仕曰諸侯之驕我者吾不為臣大夫驕我者吾不復見尹文子曰昔晉國苦奢文公以儉矯之乃衣不重帛食不兼肉無幾時國人皆大布之衣脱粟之飯韓子曰晏嬰相齊妾不衣帛馬不食粟又曰齊桓公好服紫國人盡服之公患之管仲曰君謂左右甚惡紫臭於是三日境内莫有紫衣者又曰楊朱之弟楊布衣素衣而出天雨緇衣而反其狗吠之布恐將擊之朱曰使汝狗白而往黑而來能不怪哉墨子曰古之人未知衣服之制故聖人作之冬則絹帛輕且温夏則絺綌清且涼所以􅃴身體和肌膚也又曰晉文公好士之惡衣者故文公之臣皆牂羊之裳韋以為帶吕氏春秋曰戎夷違齊如魯天大寒而後與門弟子一人宿於郭外寒逾急謂其弟子曰子與我衣我活我與子衣子活我國士也為天下惜死子不肖也不足愛子與我衣弟子曰夫不肖之人安能與國士衣哉戎夷觧衣與弟子夜半而死弟子遂活淮南子曰林類榮啓期衣若懸蓑說􅁐曰齊林既者衣葦朝景公公曰何乃服小人衣耶林既曰衣狗裘者不必狗吠令君衣狐裘能不狐鳴乎又曰魏文侯封}
