  - {type: variant, offset: 1597, length: 447, content: 紺繒幗黃金龍首銜白珠魚須長尺為簪江表傳曰魏文帝遣使於吳求通犀簪群臣曰貢有常典魏所求非法宜勿與孫權曰彼在諒闇之中而所求若此寧可復與言禮備以付使韓詩外傳曰孔子遊少原之野有婦人央澤而哭夫子怪之使弟子問焉婦人對曰向看刈蓍薪而忘簪是以哀孔子曰刈蓍而忘簪有何悲焉婦人曰非傷忘簪吾所悲者不忘故也淮南子曰楚將子發好伎道之士有善為偷者往見子發子發禮之無幾何齊伐楚子發將師當之兵三卻齊師逾強於是善偷則夜出取幘明夕取枕明夕又取簪悉歸之齊師大駭謀曰今夕不去楚軍恐取吾首還師而去之故伎無細能無薄在人君用之也鹽鐵論曰禹理水過門不入當此之時墮簪不顧郭子橫洞冥記曰帝好微行於長安城西夜見一玉螭遊於路董謁曰昔桀媚末嬉於膝上以金簪貫玉螭腹為戲弄今螭腹有金穿痕安知非此耶神仙傳曰左慈能分盃飲酒曹公聞試之慈拔簪以畫盃即斷其間相去數寸幽明錄曰孫權時南方遣吏獻簪吏過宮亭湖廬山君廟請福下教求簪吏叩頭曰簪獻天子必乞哀念神云臨入石頭當相還吏遂去達石頭有三尺鯉魚跳入舡吏破腹得之吳均續齊諧記曰東海蔣潛嘗至不其縣於林野中見一死人鳥來食之輒見一小兒, WYG: ''}
