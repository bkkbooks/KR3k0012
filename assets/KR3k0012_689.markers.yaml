  - {type: variant, offset: 1026, length: 2, content: 神龜, SBCK: 樂浪王万壽孫忠明帝時位太常少卿孝武帝汎舟天泉池命宗室諸王陪宴忠愚而無智性好衣服着紅羅􅃭繡作領碧納袴錦爲縁帝謂曰朝廷衣冠應有常式何爲着百戯衣忠曰臣少來所愛情存綺羅歌衣儛服是臣所願帝曰人之無良乃至此乎又曰胡􅅱於髙允館見中書侍郞李璨􅀍服華靡􅅱貧老衣􅄄璨頗忽之􅅱謂曰老子今􅀂相脫體上袴褶衣㡌君欲作何許也譏其唯假盛服璨惕然失色又曰文宣囚}
