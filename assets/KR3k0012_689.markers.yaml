  - {type: variant, offset: 525, length: 3, content: 制則未, SBCK: 自奉養極爲鮮明而遷徙所載不過囊衣天下服其廉而怪其奢丗傳子陽能作黄金後漢書曰更始時授官爵皆群小賈竪膳夫庖人多著繡而衣錦袴䄡䄖諸于罵詈道中時智者見之以爲服之不中身之災也漢書音義曰諸于大掖衣也如婦人之袿衣楊雄方言曰襜䄖其短者自􅀜之西謂之裗䘿郭璞注曰俗名䘿䘸據此即是諸子上加繡䘿如今之半臂也䘪音充䘿音屈又曰光武見來歙大歡即解衣以衣之又曰􅀕遵爲人廉約家無􅀻財常衣韋袴寢布􅀍夫人裳不加縁又曰􅀕彤在遼東幾三十年衣無兼副顯宗美其清約賜之衣􅀍什物無不悉備又曰耿恭自䟽勒廻衣屨穿决形容枯槁又曰東平憲王蒼侍肅宗饗衛士於南宫因從皇太后周行掖庭池閲隂太后舊時器服愴然動容乃命留五時衣各一襲五時衣謂春青夏朱季夏黄秋白冬黒也衣單􅃨其曰襲及常所御衣合五十篋餘悉分布諸王公主及子孫在京師者各}
