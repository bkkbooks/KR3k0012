  - {type: variant, offset: 533, length: 0, content: '', SBCK: 間饗衛士於南宮因閲視舊時衣物惟王有孝友之德今送光烈皇后假髻帛各一及衣一篋可時奉瞻以慰凱風寒泉之思又欲令後生子孫得見先后衣服之製又曰明德馬后身長七尺二寸方口美髮能誦易好讀春秋常衣大練􅅂不加縁大練大帛也杜預注左傳曰大帛厚繒也朔望諸􅁎主朝請望見后􅂁衣踈麄反以爲綺􅜄就視乃􅀏后辭曰此繒特冝􅀷色故用之耳六宫莫不歎息謝承後}
  - {type: variant, offset: 533, length: 0, content: '', WYG: 間饗衛士於南宫因閱視舊時衣物惟王孝友之徳今送光烈皇后假髻帛各一及衣一篋可時奉瞻以慰凱風寒泉之思又欲令後生子孫得見先后衣服之製又曰明徳馬后身長七尺二寸方口羙髪能誦易好讀春秋常衣大練裾不加縁大練大帛也杜預注左傳曰大帛厚繒也朔望諸王朝請望見后袍衣麄疎或以為綺縠就視乃笑后辭曰此繒特宜深色故用之耳六宫莫不嘆息謝承後}
