  - {type: variant, offset: 21, length: 0, content: '', SBCK: 如子之衣安且􅁻兮豈曰無衣六兮不如子之衣安且燠兮又豈曰無衣與子同袍豈曰無衣與子同澤澤褻衣豈曰無衣與子同裳又曰君子至止黻衣繡裳又曰七月流火九月授衣一之日觱發二之日栗烈無衣無􅄄何以卒歳史記曰文帝衣弋綈所幸愼夫人令衣不得曵地漢書曰齊國有三服之官奉獻冠幘縱爲首服紈素爲冬服輕綃爲夏服又曰韓信旣平齊項羽使武渉􅀃信背漢歸楚信曰臣事項王官不過郎中位不過執㦸漢王予我上將軍印授我兵數萬解衣衣我推}
  - {type: page-break, offset: 21, content: '', id: KR3k0012_SBCK_689-3a}
  - {type: variant, offset: 21, length: 0, content: '', WYG: 如子之衣安且吉兮豈曰無衣六兮不如子之衣安且燠兮又曰豈曰無衣與子同袍豈曰無衣與子同澤澤䙝衣豈曰無衣與子同裳又曰君子至止黻衣繡裳又曰七月流火九月授衣一之日觱發二之日栗烈無衣無褐何以卒嵗史記曰文帝衣弋綈所幸慎夫人令衣不得曳地漢書曰齊國有三服之官春獻冠幘縱為首服紈素為冬服輕綃為夏服又曰韓信既平齊項羽使武渉說信背漢歸楚信曰臣事項王官不過郎中位不過執㦸漢王與我上將軍印授我兵數萬觧衣衣我推}
