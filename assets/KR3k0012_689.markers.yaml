  - {type: variant, offset: 15, length: 2, content: 清高, krp: 諸乾坤上衣下裳乾坤之象又曰訟卦上九或錫之鞶帶終朝三禠之象曰以訟受服亦不足敬也書曰予欲觀古人之象日月星辰山龍華蟲作㑹宗彞藻火粉米黼黻絺繡以五采彰施于五色作服汝明又說命曰唯衣裳在笥禮曰夫爲人子者父母存衣冠不純素孤子當室衣冠不純采純縁又曰季康之母死陳褻衣褻衣非上服敬姜曰婦人不飾不敢見舅姑將有四方之賔來褻衣何爲陳於斯命撤之又曰孔子曰昔先王未有火化食草木之實鳥獸之肉}
  - {type: variant, offset: 18, length: 1, content: 露, SBCK: 其血茹其毛未有絲麻衣其羽皮後聖有作治其􅁝麻以爲布帛又曰朝玄端夕深衣􅀷衣三祛謂大夫士也祛尺二寸􅒌齊倍要祍當旁袂可以回肘長中繼揜尺祫二寸祛尺二寸縁廣寸半以帛裏布非禮也士不衣織無君者不貳采衣正色裳閒色非列采不入公門振絺􅗽不入公門振裘不入公門襲裘不入公門纊爲繭緼爲􅂁禪爲網帛爲褶又緇衣曰子曰長民者衣服不貳從容有常以齊其民則民德歸一左傳曰衮冕黻珽黻韋􅔖以敝膝也珽丑笏也帶裳幅舄帶革帶也衣下曰裳幅今之行􅂰者舃􅃨履衡紞紘綖衡持冠者紞冠之垂者紘纓從下}
  - {type: page-break, offset: 18, content: '', id: KR3k0012_SBCK_689-2a}
  - {type: variant, offset: 18, length: 1, content: 露, WYG: 其血茹其毛未有絲麻衣其羽皮後聖有作治其絲麻以為布帛又曰朝𤣥端夕深衣深衣三袪謂大夫士也縫齊倍要衽當旁袂可以回肘長中繼揜尺袷二寸袪尺二寸縁廣寸半以帛裏布非禮也士不衣織無君者不貳采衣正色裳閒色非列采不入公門袗絺綌不入公門表裘不入公門襲裘不入公門纊為繭緼為袍禪為綗帛為褶又緇衣曰子曰長民者衣服不貳從容有常以齊其民則民徳壹左傳曰衮冕黻珽黻􅅊􅔖以敝膝也珽玉笏也帶裳幅舄帶革帶也衣下曰裳幅若今行縢者舄複履衡紞紘綖衡持冠者紞冠之垂者紘纓從下}
  - {type: page-break, offset: 18, content: '', id: KR3k0012_WYG_689-3a, image: WYG0899/WYG0899-0179a.png}
  - {type: variant, offset: 18, length: 1, content: 露, krp: 其血茹其毛未有絲麻衣其羽皮後聖有作治其絲麻以爲布帛又曰朝玄端夕深衣深衣三祛謂大夫士也祛尺二寸縫齊倍要祍當旁袂可以回肘長中繼揜尺祫二寸祛尺二寸縁廣寸半以帛裏布非禮也士不衣織無君者不貳采衣正色裳閒色非列采不入公門振絺絺巾不入公門振裘不入公門襲裘不入公門纊爲繭緼爲𫀆禪爲網帛爲褶又緇衣曰子曰長民者衣服不貳從容有常以齊其民則民德歸一左傳曰衮冕黻珽黻韋􅔖以敝膝也珽丑笏也帶裳幅舄帶革帶也衣下曰裳幅今之行膝者舃複履衡紞紘綖衡持冠者紞冠之垂者紘纓從下}
  - {type: variant, offset: 20, length: 0, content: '', SBCK: 上者綖冠上覆昭其度也藻率鞞鞛藻率以韋爲之所以籍王鞞佩刀削上飾鞛下飾鞶厲游纓鞶紳帶也一名大帶厲大􅅁之垂者游旌旗之游纓在馬膺前昭其文也又曰狄人伐衛衛懿公與石祁子玦與寗莊子矢使守曰以此賛國擇利而爲之與夫人繡衣曰聽於二子取其文章順序又曰欒武子曰􅀂敖蚡冐篳路藍縷以啓山林若敖蚡冒皆楚之先君蓽路柴車一藍縷􅁦衣也又曰呉季札聘於鄭見子産如舊相識與之縞帶子産獻紵衣焉詩曰碩人其頎衣錦褧衣褧單也尚以禪衣謂其文之大著又曰縞衣綦巾􅂓樂我貟又曰蜉蝣之羽衣裳楚楚蜉蝣之翼采采衣服蜉蝣掘閲麻衣如雪又曰靑青子衿悠悠我心青衿青領也學子之所服又曰山有樞隰有榆子有衣裳弗曵弗婁又曰緇衣美鄭武公也緇衣之冝兮敝予又改爲兮緇衣之好兮敝予又改造兮緇衣之蓆兮敝予又改作兮蓆大也又曰衣錦褧衣裳錦褧裳又豈曰無衣七兮}
  - {type: page-break, offset: 20, content: '', id: KR3k0012_SBCK_689-2b}
  - {type: variant, offset: 20, length: 0, content: '', WYG: 上者綖冠上覆昭其度也藻率鞞鞛藻以􅅊為之所以籍王鞞佩刀削上飾鞛下飾鞶厲游纓鞶紳帶也一名大帶厲大帶之垂者游旌旗之游纓在馬膺前昭其文也又曰狄人伐衞衞懿公與石祁子玦與寗莊子矢使守曰以此賛國擇利而為之與夫人繡衣曰聽於二子取其文章順序又曰欒武子曰若敖蚡冐篳路藍縷以啓山林若敖蚡冐皆楚之先君蓽路柴車一藍縷弊衣也又曰吳季札聘於鄭見子産如舊相識與之縞帶子産獻紵衣焉詩曰碩人其頎衣錦褧衣褧單也尚以禪衣謂其文之大著又曰縞衣綦巾聊樂我員又曰蜉蝣之羽衣裳楚楚蜉蝣之翼采采衣服蜉蝣掘閲麻衣如雪又曰青青子衿悠悠我心青衿青領也孝子之所服又曰山有樞隰有榆子有衣裳弗曳弗婁又曰緇衣美鄭武公也緇衣之冝兮敝予又改為兮緇衣之好兮敝予又改造兮緇衣之蓆兮敝予又改作兮蓆大也又曰衣錦褧衣裳錦褧裳又曰豈曰無衣七兮}
