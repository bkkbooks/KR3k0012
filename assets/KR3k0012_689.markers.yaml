  - {type: variant, offset: 2564, length: 176, content: 鹽水上有石室民駱都到室邊採蜜見一仙人裙衫白帢坐見都凝瞻不轉傅子曰漢末魏太祖以天下凶荒資財乏匱擬古皮弁裁縑帛以為帢合乎簡易隨時之義以色別貴賤于今施行可謂軍容非國容也世說曰陸雲好笑著帢暎水見影笑不能止高惠文婦與惠文書曰今奉總帢拾枚幍傅子云幍先未有岐荀文若巾觸樹成岐時人慕之因而弗改今通為慶弔之服白紗為之或單或裌初婚冠送餞亦服之後魏書曰太和中文明太后崩齊遣其, krp: 王昌字公伯爲東平相}
