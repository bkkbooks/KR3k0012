  - {type: variant, offset: 3022, length: 149, content: 穀皮幓頭待見尚書欲令更服黨曰朝廷本以是故徵之安可復更遂以見自陳願守之所志上聽之後漢書曰向栩河內朝歌人少為書生性卓詭不倫恒讀老子狀如學道又似狂生好被髮著絳幓頭吳越春秋曰勾踐與妻入臣吳王衣獨鼻幓頭夫人衣無緣衣裳左開之𥜗以養馬古詩曰羅敷好養蠶採桑城南隅少年見羅敷脫巾著綃頭繁欽定情詩曰何以結相於金薄畫幓頭, WYG: 太平御覽卷六百八十九}
