  - {type: variant, offset: 2278, length: 261, content: 雜注曰古者貴賤皆執笏有事則書之常簪筆今之白筆是其遺象帢服虔通俗文曰帛幘曰帢王隱晉書曰陳舒議至尊臨溫公夫人喪議曰今白帢深衣當古弔服至尊臨弔謂深衣而已崔鴻十六國春秋西涼錄曰燉煌父老令狐熾夢白頭公衣帢謂熾曰南風動吹長木胡桐椎不中轂言訖忽然不見李歆小字桐椎至期而亡南史曰何胤夢見神女二十許人並衣帢行列在前俱拜床下覺又見之便命營凶具既而疾困不復瘳後魏書曰宋遊道與頓丘李獎一面便善獎曰我年位已高會用弟為佐史令弟北面於我足矣遊道曰不能既而獎為河南尹辟遊道為中正使者相屬以衣帢待之握手歡謔謔潘京別傳曰陳躭初為州主簿司空何次道帢偏岸嘲躭頓帢, WYG: ''}
