  - {type: variant, offset: 722, length: 7, content: 戢相似領選職方, SBCK: 促膝雖然及去之後猶令二人交帚拂其坐處又曰王琨性儉約景和中討義陽王昶六軍誡嚴應湏紫服左右欲營辦琨曰元嘉􅀄征謝晦有紫服在匣不湏更製檢取果得焉梁書曰到漑性率儉不好聲色庭室單牀傍無􅁎侍冠履十年一易朝服或至穿􅀘又曰波斯國婚姻法一聘財訖女壻將數十人迎婦壻着金綖錦袴戴天冠婦亦如之又曰新羅呼其冠曰遺子禮􅃭曰尉解袴曰柯半靴曰洗百濟呼㡌曰冠􅃭曰􅃨衫袴曰禈又曰張􅌘音盛稷之子也稷􅀄爲剡令至嵊亭生之因名􅌘字四山少敦孝行年三十餘猶班衣受稷杖動至數百収淚歡然又曰胡緭胡貴切隨陳伯之入魏時元㑹緭戯爲詩曰㡌上着籠冠袴上着朱衣不知是今是不知非}
