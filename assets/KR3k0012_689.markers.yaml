  body:
  - {type: variant, offset: 3, length: 8, content: 五貂蟬徐廣車服雜, SBCK: 六衣白虎通曰衣者隱也裳者鄣也所以隱形自鄣蔽也釋名曰衣者依也人所依以疪寒暑也爾雅曰衣裗音旒謂之䘽音霓衣䄛也齊人謂之褗或曰袿衣之飾也黼領謂之襮繡刺黼文以褗領也襮音博之縁謂之純衣縁飾也袕謂之褮衣開孔也孔袕音穴褮音褮衣皆謂之􅁭交領衱居業切謂之􅅂衣後􅅂也衿謂之袸辭見切衣小帶也佩衿謂之禐佩玉之帶上屬執衽謂之結持衣上祍扱衽謂之襭音襭扱衣上衽於帶衣蔽前謂之䄡今黻膝也婦人之禕謂之縭緌也即今之香纓也禕邪交絡帶繫於體因名爲禕緌繫也裳削幅謂之纀蒲木切削殺其幅深衣衣裳世夲曰胡曹作衣宗􅇆}
  - {type: variant, offset: 3, length: 8, content: 五貂蟬徐廣車服雜, WYG: 六衣白虎通曰衣者隐也裳者鄣也所以隐引行自鄣蔽也釋名曰衣者依也人所依以芘寒暑也爾雅曰衣裗音旒謂之䘽音霓衣縷也齊人謂之攣或曰袿衣之飾也黼領謂之襮繡刺黼文以褗領也襮音􅀶縁謂之純衣縁飾也袕謂之褮衣開孔也袕胡汱反褮音滎衣皆謂之襟交領衱居業切謂之裾衣後裾也衿謂之袸辭見切衣小帶也佩衿謂之褑佩玉之𢃄上屬執袵謂之袺掎衣上袵扱衽謂之襭音襭扱衣丄衽於𢃄衣蔽前謂之襜今蔽膝也婦人之褘謂之縭縭緌也即今之香纓也褘邪交絡帶繁於體因名為褘裳削幅謂之纀滿木切削取其幅深衣之裳世本曰胡曹作衣宗𠂻}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_WYG_689-1b, image: WYG0899/WYG0899-0178b.png}
  - {type: variant, offset: 3, length: 8, content: 五貂蟬徐廣車服雜, krp: 六衣白虎通曰衣者隱也裳者鄣也所以隱形自鄣蔽也釋名曰衣者依也人所依以疪寒暑也爾雅曰衣裗音旒謂之䘽音霓衣䄛也齊人謂之褗或曰袿衣之飾也黼領謂之襮繡刺黼文以褗領也襮音博之縁謂之純衣縁飾也袕謂之褮衣開孔也孔袕音穴褮音褮衣皆謂之襟交領衱居業切謂之𥚑衣後𥚑也衿謂之袸辭見切衣小帶也佩衿謂之禐佩玉之帶上屬執衽謂之結持衣上祍扱衽謂之襭音襭扱衣上衽於帶衣蔽前謂之䄡今黻膝也婦人之禕謂之縭緌也即今之香纓也禕邪交絡帶繫於體因名爲禕緌繫也裳削幅謂之纀蒲木切削殺其幅深衣衣裳世夲曰胡曹作衣宗衷}
