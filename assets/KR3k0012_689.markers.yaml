  - {type: variant, offset: 1103, length: 0, content: '', SBCK: 服飾未爲差等於是三品巳上服紫四品巳上服緋六品七品以緑八品九品以青婦人從夫之色仍通服黄又曰楊妃寵愛特甚宫中主貴妃刺繡者七百人楊益及諸戚里每歲進衣服布之於庭光奪人目又曰肅宗性節儉嘗出衣䄂示近臣曰此衣巳三浣矣又曰貞元六年德宗􅀄賜節度觀察使新製時服尚方織作呈閱所冝上曰頃來賜衣文綵不􅁪非制也朕今思之節度使以鵰銜綬帶取武毅以靖封内觀察使以鴈銜威}
  - {type: variant, offset: 1103, length: 0, content: '', WYG: 服飾未為差等於是三品已上服紫四品已上服緋六品七品以緑八品九品以青婦人從夫之色仍通服又曰楊妃寵愛特甚宫中主貴妃刺繡者七百人楊益及諸戚里每嵗進衣服布之於庭光奪人目又曰肅宗世節儉嘗出衣袖示近臣曰此衣已三浣矣又曰貞元六年徳宗初賜節度觀察使新製時服尚方織作呈閱所宜上曰須来賜衣文綵不恒非制也朕今思之節度使以雕銜綬帶取武毅以靖封内觀察使以㕍銜威}
