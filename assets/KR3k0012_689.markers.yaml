  - {type: variant, offset: 15, length: 2, content: 清高, SBCK: 諸乾坤上衣下裳乾坤之象又曰訟卦上九或錫之鞶帶終朝三禠之象曰以訟受服亦不足敬也書曰予欲觀古人之象日月星辰山龍華蟲作㑹宗彞藻火粉米黼黻絺繡以五采彰施于五色作服汝明又􅀃命曰唯衣裳在笥禮曰夫爲人子者父母存衣冠不純素􅀌子當室衣冠不純采純縁又曰季康之母死陳褻衣褻衣非上服敬姜曰婦人不飾不敢見舅姑將有四方之賔來褻衣何爲陳於斯命撤之又曰孔子曰昔先王未有火化食草木之實鳥獸之􅁏}
  - {type: page-break, offset: 15, content: '', id: KR3k0012_SBCK_689-1b}
  - {type: variant, offset: 15, length: 2, content: 清高, WYG: 諸乾坤上衣下裳乾坤之象又曰訟卦上九錫之鞶𢃄終朝三裭之象曰以訟受服亦不足敬也書曰予欲觀古人之象日月星辰山龍華蟲作㑹宗彛藻火粉米黼黻絺綉以五采彰施于五色作服汝明又說命曰唯衣裳在笥禮曰夫為人子者父母存冠衣不純素孤子當室冠衣不純采又曰季康之母死陳䙝衣䙝衣上服敬姜曰婦人不飾不敢見舅姑將有四方之賔來䙝衣何為陳於斯衆徹之又曰孔子曰昔先王未有大化食草木之實鳥獸之肉}
