  - {type: variant, offset: 1587, length: 5, content: 公卿列侯中, WYG: 禮敬國其俗人年百歲而織芳茅以為衣盖尚書云島夷卉服之類也又曰任末年十四好學觀書有合意處則題其衣裳及掌記以記其事門徒恱其勤學更以静物衣易之又曰太始元年魏帝為陳留王之歲有頻斯國人来朝以五色玊為衣如今之鎧又曰天漢}
