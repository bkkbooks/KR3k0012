  - {type: variant, offset: 2354, length: 817, content: 六國春秋西涼錄曰燉煌父老令狐熾夢白頭公衣帢謂熾曰南風動吹長木胡桐椎不中轂言訖忽然不見李歆小字桐椎至期而亡南史曰何胤夢見神女二十許人並衣帢行列在前俱拜床下覺又見之便命營凶具既而疾困不復瘳後魏書曰宋遊道與頓丘李獎一面便善獎曰我年位已高會用弟為佐史令弟北面於我足矣遊道曰不能既而獎為河南尹辟遊道為中正使者相屬以衣帢待之握手歡謔謔潘京別傳曰陳躭初為州主簿司空何次道帢偏岸嘲躭頓帢有所蔽也應聲報曰躭頓以蔽有明府岸以示無宜都山川記曰鹽水上有石室民駱都到室邊採蜜見一仙人裙衫白帢坐見都凝瞻不轉傅子曰漢末魏太祖以天下凶荒資財乏匱擬古皮弁裁縑帛以為帢合乎簡易隨時之義以色別貴賤于今施行可謂軍容非國容也世說曰陸雲好笑著帢暎水見影笑不能止高惠文婦與惠文書曰今奉總帢拾枚幍傅子云幍先未有岐荀文若巾觸樹成岐時人慕之因而弗改今通為慶弔之服白紗為之或單或裌初婚冠送餞亦服之後魏書曰太和中文明太后崩齊遣其散騎常侍裴昭明謝峻等弔欲以朝服行事主客不許昭明等執志不移孝文勑尚書李冲選一與識者更與論執冲奏遣成淹昭明言不聽朝服行禮議出何典淹言玄冠不弔童孺共聞昔季孫將行請遭喪之禮千載之下猶共稱之卿方謂議出何典何其異哉昭明言唯齎袴褶不可以弔幸借衣幍以申國命敕送衣幍給昭明等明旦引入皆令文武盡哀後魏書裴植傳曰植母夏侯道遷姊也性甚剛峻於諸子皆如嚴君長成後非衣幍不見小有罪過必束帶伏門經五三日乃引見之督以嚴訓唯少子衍得以常服見之幓頭釋名曰幓鈔也鈔髮使上或謂之陌頭言其從橫陌而前也齊人謂之奄髮使上也禮記玉藻曰士練帶率下辟士以下皆禪不合而繂積如今作澡頭為之東觀漢記曰建武中徵周黨黨著短布單衣穀皮幓頭待見尚書欲令更服黨曰朝廷本以是故徵之安可復更遂以見自陳願守之所志上聽之後漢書曰向栩河內朝歌人少為書生性卓詭不倫恒讀老子狀如學道又似狂生好被髮著絳幓頭吳越春秋曰勾踐與妻入臣吳王衣獨鼻幓頭夫人衣無緣衣裳左開之𥜗以養馬古詩曰羅敷好養蠶採桑城南隅少年見羅敷脫巾著綃頭繁欽定情詩曰何以結相於金薄畫幓頭, SBCK: 九}
