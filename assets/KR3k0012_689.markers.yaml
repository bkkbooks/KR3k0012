  - {type: variant, offset: 1852, length: 2, content: 墮簪, krp: 懸四時衣春夏以珠玉爲飾秋冬以翡翠爲温又曰禮敬國其俗人年三百歳而織芳茅以爲衣盖尚書云島夷卉服之類也又曰任未年十四好學觀書有合意䖏則題其衣裳及掌裏以記其事門徒恱其勤學更以靜衣易之又曰太始元年魏帝以陳留王之歳有頻斯國人來朝以五色玉爲衣如今之鎧又曰天漢三渠捜國之西有折淪國其俗淳和人壽三百歳有大木一樹千㝷若經此木下皆}
  - {type: variant, offset: 1855, length: 2, content: 顧郭, SBCK: 死不病或有泛海繩山來㑹其國綴草毛爲繩網其衣如今之羅紈也至元狩六年獻網衣一襲帝焚於九逵之道恐後人徴求此物故燒之煙如金石之氣又曰貟嶠山南有池移國人長三尺壽萬歳茅爲衣衣服皆長􅅂大䄂因風以昇烟霞若鳥用羽毛也鍾㑹母傳曰夫人㓜少衣不過青紺世說曰齊王冏爲大司馬輔政嵇紹爲侍中詣冏諮事冏召􅁑旟董艾等共論時冝旟等白冏曰嵇侍中善於􅁝竹公可能操之遂進樂器紹推却不受冏曰今共爲歡何爲却耶紹曰公恊輔皇室令作事可法紹雖職卑忝備常伯豈可以先王之服爲伶人之業今逼髙命不敢有辭當釋冠冕襲􅀻服此紹之心旟等不自得而退又曰桓車􅀐不好着新衣浴訖婦故送新衣車􅀐大怒催使將去婦便持還冲妻王恬女也傳語云衣不經新何由而故桓大􅀏而著之又阮宣}
  - {type: page-break, offset: 1855, content: '', id: KR3k0012_SBCK_689-12b}
  - {type: variant, offset: 1855, length: 7, content: 顧郭子橫洞冥記, krp: 死不病或有泛海繩山來㑹其國綴草毛爲繩網其衣如今之羅紈也至元狩六年獻網衣一襲帝焚於九逵之道恐後人徴求此物故燒之煙如金石之氣又}
