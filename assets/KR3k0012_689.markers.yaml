  - {type: variant, offset: 554, length: 5, content: 都賦云藹藹, SBCK: 略曰文昭甄后以漢光和五年十二月丁酉生毎寢寐家中髣髴見有人持玉衣覆其上者常共怪之魏氏春秋曰王允爲吏部郎中選郡守明帝疑其所用非次召入將加罪允妻阮出謂曰明主可以理奪難以情求允頷之而入帝怒詰之允對曰某郡太守雖限滿文書先至年限在後月限在前帝取事視之乃釋遣出望其衣敗曰清吏也呉書曰孫權毎賜周瑜衣寒暑皆白領諸將皆不及晉書曰石崇以奢豪矜物厠常有十餘婢}
