  - {type: variant, offset: 1852, length: 2, content: 墮簪, SBCK: 懸四時衣春夏以珠玉爲飾秋冬以翡翠爲温又曰禮敬國其俗人年三百歳而織芳茅以爲衣盖尚書云島夷卉服之􅀋也又曰任未年十四好學觀書有合意䖏則題其衣裳及掌裏以記其事門徒恱其勤學更以靜衣易之又曰太始元年魏帝以陳留王之歳有頻斯國人來朝以五色玉爲衣如今之鎧又曰天漢三渠捜國之西有折淪國其俗淳和人壽三百歳有大木一樹千㝷􅀂經此木下皆}
