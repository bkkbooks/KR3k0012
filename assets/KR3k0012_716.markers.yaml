  - {type: variant, offset: 365, length: 225, content: 各一衣一篋遺王可時瞻視以慰凱風寒泉之思晉中興書微祥說曰太元中公主婦女緩鬢假髻以為盛飾用髮豐多不可恒戴乃先於籠上扶之名曰假髻或名假頭至於貧人不能自辦自號無頭就人借髻後孫恩桓玄之亂死者萬計被戮之家多亡頭首至大歛時皆以藤縛菰草為頭是假髻之應也晉令曰士卒百工不得著假髻髲釋名曰髲被也髲少者得以被助其髲也詩曰鬒髮如雲不屑髢也髢髮也音弟傳曰衛莊公自城上見戎州巳氏之妻髮美使髡之以為呂姜髢後為巳氏所殺也吳志薛綜上事云漢時朱崖叛以長吏覩其人好髮髡取為髲故百姓怨叛南越, SBCK: 博物}
