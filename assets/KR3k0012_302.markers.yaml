  - {type: variant, offset: 9, length: 6, content: 武王與紂癸亥, SBCK: 􅀕彤拜遼東太守至則厲兵馬廣斥候彤有勇力能貫三百斤弓虜毎犯塞常爲士卒前鋒數破走之東觀漢記曰賈復以偏將軍從上杖邯鄲擊青犢大戰日中賊}
  - {type: variant, offset: 9, length: 6, content: 武王與紂癸亥, krp: 祭彤拜遼東太守至則厲兵馬廣斥候彤有勇力能貫三百斤弓虜毎犯塞常爲士卒前鋒數破走之東觀漢記曰賈復以偏將軍從上杖邯鄲擊青犢大戰日中賊}
  - {type: variant, offset: 10, length: 1, content: 王, WYG: 帝北伐廣固田子領偏師}
  - {type: variant, offset: 12, length: 11, content: 紂癸亥陣于商郊左傳曰晉, WYG: 龍驤}
  - {type: variant, offset: 16, length: 4, content: 于商郊左, SBCK: 堅不却上傳召復曰吏士飢且可朝食復曰先破之然後食耳於是􅀍羽先登所向皆靡諸將皆服其勇魏志曰張遼字文逺爲征東將軍征孫權􅀍甲戰先䧟陣銜壘入至麾下􅀳書劉牢之}
  - {type: variant, offset: 16, length: 4, content: 于商郊左, krp: 堅不却上傳召復曰吏士飢且可朝食復曰先破之然後食耳於是𬒳羽先登所向皆靡諸將皆服其勇魏志曰張遼字文逺爲征東將軍征孫權𬒳甲戰先䧟陣銜壘入至麾下晉書劉牢之}
