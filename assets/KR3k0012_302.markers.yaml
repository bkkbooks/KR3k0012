  - {type: variant, offset: 4, length: 3, content: 二陣尚, SBCK: 三先鋒殿郷導伏兵先鋒後漢}
  - {type: variant, offset: 4, length: 3, content: 二陣尚, krp: 三先鋒殿郷導伏兵先鋒後漢}
