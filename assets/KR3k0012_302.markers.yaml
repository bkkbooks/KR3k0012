  - {type: variant, offset: 1960, length: 0, content: '', krp: 齊領軍叚暢直進至橋隔水招暢與語語畢憲問暢曰若何姓名暢曰領軍叚暢也公復爲誰憲曰我虞候大都督耳暢曰觀公言語不是凡人今日相見何用隱其名位陳王純梁公侯莫陳芮内史王誼等並在憲側暢固問不巳憲乃曰我天子大弟齊王也指陳王巳下並以名位告之暢鞭馬而去憲即命旋軍而齊人遽追之戈甲甚銳憲與開府宇文忻各統精卒百騎爲殿以拒之斬其驍將賀蘭豹子山褥瓌等百餘人齊衆乃退又曰楊寛從天穆引軍趣成臯令寛與爾朱兆爲後拒㝷以衆議不可乃廻赴石濟寛夜行失道後期諸將咸言寛少與北海周旋今不來矣天穆荅曰楊寛非輕於去就者也其所逗留必}
