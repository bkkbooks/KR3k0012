  - {type: variant, offset: 2833, length: 7, content: 徒恃固阻山布陣, SBCK: 若突圍必從此岀但簡精兵專守自是成摛光乃令壯士千餘人設伏於東澗口其夜果如所䇿賊遂出城伏兵擊之大潰範等面􅅞盡獲其衆後魏書曰万俟醜奴作亂關中魏將賀㧞岳率兵討之岳以輕􅀐八百北渡渭殺略其民以桃之醜奴大將遲菩薩果率歩􅀐三萬至渭北岳以輕􅀐數千餘菩薩隔水交言岳稱楊國威菩薩自言強盛徃復數返時巳逼暮於是各還兵宻於渭南傍水分精􅀐數十爲一處隨地形便置之明日自將百餘􅀐隔水與賊相見岳漸前進先所置􅀐隨岳而集􅀐旣漸増賊不復測其多少行二十許里至水淺可濟之處岳便馳馬東岀以示奔遁賊謂岳走乃棄歩兵南渡渭之輕􅀐追兵東行十餘里依横崗設伏待之賊以路險}
  - {type: variant, offset: 2833, length: 7, content: 徒恃固阻山布陣, WYG: 若突圍必從此出但簡精兵專守自是成擒光乃令壯士千餘人設伏於東澗口其夜果如所䇿賊遂出城伏兵擊之大潰範等面縛盡獲其衆後魏書曰万俟醜奴作亂闗中魏將賀㧞岳率兵討之岳以輕騎八百北渡渭殺畧其民以挑之醜奴大將尉遲菩薩果率歩騎三萬至渭北岳以輕騎數十與菩薩隔水交言岳稱揚國威菩薩自言强盛徃復數返時已逼暮於是各還岳宻於渭南傍水分精騎數十為一處隨地形便置之明日自將百餘騎隔水與賊相見岳漸前進先所置騎隨岳而集騎既漸増賊不復測其多少行二十許里至水淺可濟之處岳便騎馬東出似奔遁賊謂岳走乃棄歩兵南渡渭水輕騎追岳東行十餘里依横岡設伏待之賊以路險}
