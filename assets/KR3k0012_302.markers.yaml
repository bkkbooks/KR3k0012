  - {type: variant, offset: 2832, length: 0, content: '', SBCK: 將咸欲攻其新城韶曰此城一面阻河三面地險不可攻縱令得之一城地耳不如更作一城壅其要路破服秦城併加以圖定陽計之長者將士咸以爲然遂圍定陽其城主楊範固守不下韶登山以觀城勢乃縱兵急攻之七月屠其外城韶謂光曰此城三面重澗險阻並無走路唯慮東南一處耳}
