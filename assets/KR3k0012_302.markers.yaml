  - {type: variant, offset: 2799, length: 2, content: 致損, WYG: 伏兵随歆}
  - {type: variant, offset: 2802, length: 1, content: 旅, WYG: 入歆不覺直至帳下於是進逼江陵吳督將伍延偽請降而列兵登陴晉師攻尅之十六國春秋曰後晉石季龍攻晉將劉演于廩丘晉將邵續使文鴦救演季龍退止盧開津以避之鴦文弗進屯于景亭又兖川豪右張平起兵救演季龍夜棄營設伏于外揚聲將歸河北張平以為信然入于空營季龍迴擊敗之遂䧟廩丘又曰夏赫連勃勃進屯依力川後秦姚興來伐至三城勃勃騎禦之興遣}
