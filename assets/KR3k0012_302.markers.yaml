  - {type: 'tls:seg', offset: 5, content: '', id: KR3k0012_CHANT_302-1a.2}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 先鋒殿鄉導伏兵先鋒後漢書曰祭彤拜遼東太守至則厲兵馬廣斥候彤有勇力能挽三百斤弓虜毎犯塞常為士卒前鋒數破走之東觀漢記曰賈復以偏將軍從上㧞邯鄲繫青犢大戰日中賊}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_302-1b, image: WYG0895/WYG0895-0615b.png}
