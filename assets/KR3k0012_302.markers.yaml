  - {type: variant, offset: 759, length: 4, content: 事則嘗聞, SBCK: 拜􅁗州刺史從太祖平竇泰先鋒䧟敵太祖以所乗騅賜}
  - {type: variant, offset: 759, length: 733, content: 事則嘗聞之軍旅之事未之學也周書曰春為牝陣弓為前行夏為方陣戟為前行季夏為圓陣矛為前行秋為牡陣劍為前行冬為伏陣楯為前行是為五陣史記曰黃帝有𣵠鹿之戰以定火災顓頊有共工之陣以平水害漢書陳湯傳曰湯伐西域置揚威白虎合騎三校張晏曰西域陣名又曰韓信為相國擊齊齊王走高密信追至高密西楚使龍且將號二十萬救齊齊王使龍且并軍與信戰夾濰水陣信乃夜令人為萬餘囊盛沙以壅水上流引軍半渡擊龍且佯不勝還走龍且果追渡水信使人決壅囊水大至龍且軍太半不得渡即擊殺龍且虜齊王廣遂平齊又曰李陵至峻稽山與單于相值騎可三萬圍陵陵軍居山間以大車為營陵引士出營外為陣前行持戟楯後行持弓弩令曰聞鼓聲而縱聞金聲而止虜見漢軍少直前就營陵搏戰攻之千弩俱發應弦而倒虜還走上山漢軍追殺千人又曰衛青軍出塞千餘里見單于兵陣而待於是青令武剛車自環為營張晏曰兵車也而從五千騎往當匈奴晉書曰卞壺字望之子眕及盱同沒陣母撫二子尸哭曰父為忠臣汝為孝子夫何恨乎徵士翟陽曰父死於君子死於父忠孝之道萃於一門王隱晉書曰馬隆擊涼州惡虜斷道隆作八陣圖車營並追狹則木屋施輪並前智謀縱橫出其不意故能成功後魏書曰文成帝和平二年制戰陣之法十有餘條因大儺曜兵有飛龍騰蛇魚麗之變以示威武隋書曰周法尚為定襄太守時帝幸榆林法尚朝于行宮內史令元壽言於帝曰漢武出塞旍旗千里今御營之外請分為二十四軍日別遣一軍發相去三十里旗幟相望鉦鼓相聞首尾連注千里不絕此亦出師之盛者也法尚曰不然兵亘千里動間山川卒有不虞四分五裂腹心有事首尾未知道阻且長難以相救雖是故事此乃取敗之道也帝不懌曰卿意以為如何法尚曰結為方陣四面外拒六宮及百官家口並住其間若有變起當頭分抗內引奇兵出外奮擊車為壁壘重設鉤陳此與據城理亦何異苦戰而捷抽騎追奔或戰不利此屯營自守臣謂牢固萬全之策也帝曰善因拜左武衛將軍良馬一疋絹三百疋, WYG: ''}
