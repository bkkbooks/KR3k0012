  - {type: variant, offset: 2186, length: 346, content: 兵者譬如常山之虵也擊其首則尾至擊其尾則首至擊其腹則首尾俱至傅子曰兵法云內精八陣之變外盡九成之宜然可以用奇也盛弘之荊州記曰魚復縣鹽井以西石磧平曠聘望四遠諸葛孔明積細石為壘方可數百步壘西郭又聚石為八行相去二丈許謂之八陣圖曰八陣既成自今行師庶不復敗自後深識見者並莫能了桓宣武伐蜀經之以為常山虵勢六韜曰武王問太公曰凡用兵為天陣奈何為地陣奈何為人陣奈何太公曰星辰日月斗杓一左一右一迎一背謂之天陣丘陵水泉亦有左右前後之利此謂地陣用車用馬用人用文用武謂之人陣武王曰善又曰武王問曰引兵入諸侯之地高山盤石其避無草木四面受敵士卒惑迷為之柰何太公曰當為雲象之陣兵鈐曰有運衡陣洞當陣龍騰陣鳥翔陣握機陣虎翼陣兵書要決曰孫子稱無要正正之旗無擊堂堂之陣正正之旗者謂行軍也前後正治故不可要而擊之也堂堂之陣者謂營軍也堂堂不冒亂, SBCK: 郷導}
