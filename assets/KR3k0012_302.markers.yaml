  - {type: variant, offset: 1964, length: 131, content: 勇為本國語曰吳王之軍為方陣白裳白旗素甲白羽望之如荼茅也左軍赤裳赤旟望之如火右軍玄裳玄旗望之如墨莊子曰徐無鬼謂武侯曰軍無盛鶴列於麗譙之間鶴列陣名麗譙樓也鬻子曰武王伐紂虎旅百萬陳於商郊起自黃鳥訖于赤甫走如疾風聲如震霆武王乃使太公把旄以麾之紂軍反走尉繚子曰梁惠王問尉繚, SBCK: 􅀏}
