  - {type: variant, offset: 22, length: 6, content: 晉將荀吳敗燕, SBCK: 太元􅀄謝玄北鎭廣陵時符堅方盛玄多募牢之與東海何謙琅琊諸葛偘樂安髙衡東平劉􅁤西河田洛􅀳陵孫}
  - {type: page-break, offset: 22, content: '', id: KR3k0012_SBCK_302-1b}
  - {type: variant, offset: 22, length: 0, content: '', krp: 太元𥘉謝玄北鎭廣陵時符堅方盛玄多募牢之與東海何謙琅琊諸葛偘樂安髙衡東平劉軌西河田洛}
  - {type: variant, offset: 23, length: 5, content: 將荀吳敗燕, krp: 陵孫}
  - {type: variant, offset: 24, length: 160, content: 荀吳敗燕無終及群狄于太原崇卒也無終山戎初將戰魏舒曰彼徒我車所遇又阨地險不便也阨烏介反以什共車必克更增十人當一車之用困諸阨又克車每用於阨道今去車故為必克也請皆卒去馬為步卒自我始乃毀車以為行魏舒先自毀其屬車為步陣行戶郎反五乘為三五乘車者車三人五乘十五人今改去車更以五人為五分為五三也為五陣以相離兩於前伍於後專為右角參為左角偏, WYG: 軍孟龍符}
  - {type: variant, offset: 30, length: 15, content: 及群狄于太原崇卒也無終山戎初將, SBCK: 等以驍猛應選􅀇以牢之爲叅軍領精銳爲前鋒百}
  - {type: variant, offset: 30, length: 15, content: 及群狄于太原崇卒也無終山戎初將, krp: 等以驍猛應選玄以牢之爲叅軍領精銳爲前鋒百}
