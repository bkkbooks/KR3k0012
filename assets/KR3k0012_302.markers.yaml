  - {type: variant, offset: 2804, length: 20, content: 收軍還營却抽左虞候見入即左軍後軍中軍前軍, SBCK: 右提彌明知之}
  - {type: variant, offset: 2804, length: 5, content: 收軍還營却, WYG: 將姚文宗拒戰勃勃偽退設伏以待之興將榆生等追之伏兵夾撃皆擒之北齊書曰叚韶與右丞相斛律光率師伐周五月攻服秦城周人於姚襄城南更起二鎮東接定陽又作深塹㫁絶行道韶乃宻}
