  - {type: variant, offset: 2827, length: 3, content: 虞候次, SBCK: 也趍登曰臣將侍宴過三爵非禮也遂扶跣以下公嗾􅋙焉明摶而殺之􅋐且出提彌死之又曰衛侯在平壽平壽衛下邑公孟有事於蓋􅀗之門外有事􅀕也蓋􅀗衛郭門也齊氏惟於門外而伏甲焉齊豹之家後漢書曰馮異招集諸營保數萬人與賊約期㑹戰使壯士變服與赤眉同伏於道側且曰赤眉使萬人攻異前部異裁岀兵以救之裁小出兵所以示弱也賊見勢弱遂悉衆攻異乃縱兵大戰日􅉴賊氣衰伏兵卒起衣服相亂赤眉不復識别衆遂驚潰追擊大破於崤底降男女八萬人通典曰後漢末荆州牧劉表遣劉備北侵至鄴曹公遣將李典與夏侯惇距之備一旦燒屯去惇率諸軍追擊之典曰賊無故退疑必有伏南道穿狹草木深不可追也惇不聽與將于禁追之典與惇等果入賊伏􅂨戰不利典徃救備救至乃退又曰後漢末吕布從東緡與陳宫將萬餘人來與曹公戰時兵皆出取麥在者不數千人屯營不固曹公乃令婦人守陳悉將兵距之屯西有大堤其南樹木幽􅀷布疑有伏乃相謂曰曹操多詐勿入伏中引軍南七十餘里明日復來曹公隱兵堤裏岀半兵堤外布益進乃令輕兵挑戰旣合伏兵乗堤歩卒並進遂大破之􅀳書曰鎭南將軍杜元凱伐呉樂郷城􅀳牙門管定周旨等伏兵樂郷城外呉都督孫歆先遣車岀拒􅀳將王濬於上流大敗而還旨等發伏兵隨歆軍入歆不覺直至帳下虜歆於是進逼江陵呉都督將伍延僞請降而列兵登陴􅀳師攻剋之十六國春秋曰後􅀳石季龍攻􅀳將劉演于廪丘􅀳將邵續使文鴦救演季龍退止盧􅀜津以避之文鴦弗能進屯于景亭兖州豪右張平等起兵救演季龍夜弃營設伏于外􅀭聲將歸河北張平以爲信然入于空營季龍迴擊敗之遂䧟廪丘又曰夏赫連勃進屯依力川後秦姚興來伐至三城勃勃率騎禦之興遣其將姚文宗拒戰勃勃僞退設伏以待之興將姚榆生等追之伏兵夾擊皆擒之北齊書曰叚韶與右丞相斛律光率師伐後周五月攻服秦城周人於姚襄城南更起城鎭東接定陽又作深塹斷絶行道韶乃宻抽壯士從襲之又遣潜渡河告姚襄城中令内外相應度者千有餘人周人始覺於是合戰大破}
