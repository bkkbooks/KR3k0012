  - {type: variant, offset: 1958, length: 1, content: 戰, SBCK: 孟之反奔而殿將入門䇿其馬曰非敢後也馬不進也史記絳侯丗家曰周勃沛人也髙祖之爲沛公以中㳙從攻胡陵勃擊章邯車􅀐殿如淳注云殿不進吕瓉云在軍復曰殿也後漢書曰岺彭圍隗囂於西城囂將行廵周宗將蜀救兵到囂得出還兾漢軍食盡燒輜重引兵下隴延弇亦相隨而退囂出兵尾擊諸營彭殿爲後拒尾謂异其後也凡軍在前曰啓在後曰殿後周書曰髙祖伐齊還以齊王憲爲後拒齊主自率衆來追至於髙梁橋憲以精􅀐二千阻水爲}
  - {type: page-break, offset: 1958, content: '', id: KR3k0012_SBCK_302-4a}
  - {type: variant, offset: 1958, length: 1, content: 戰, WYG: 孟之反奔而殿将入門䇿其馬曰非敢後也馬不進也史記綘侯世家曰周勃沛人也髙祖之為沛公以中涓從攻胡陵勃擊章邯車騎殿後漢書曰岑彭圍隗囂於西城囂將行巡周宗將蜀救兵到囂得出還冀漢軍食盡燒輜重引兵下隴耿弇亦相隨而退囂出兵尾擊諸營彭殿為後拒尾謂尾其後也凡軍在前曰啓在後曰殿後周書曰髙祖伐齊還以齊王憲為後拒齊主自率衆來追至於髙梁橋憲以精騎二千阻水為}
  - {type: page-break, offset: 1958, content: '', id: KR3k0012_WYG_302-6b, image: WYG0895/WYG0895-0617d.png}
  - {type: variant, offset: 1958, length: 1, content: 戰, krp: 孟之反奔而殿將入門䇿其馬曰非敢後也馬不進也史記絳侯丗家曰周勃沛人也髙祖之爲沛公以中㳙從攻胡陵勃擊章邯車騎殿如淳注云殿不進吕瓉云在軍復曰殿也後漢書曰岺彭圍隗囂於西城囂將行廵周宗將蜀救兵到囂得出還兾漢軍食盡燒輜重引兵下隴延弇亦相隨而退囂出兵尾擊諸營彭殿爲後拒尾謂异其後也凡軍在前曰啓在後曰殿後周書曰髙祖伐齊還以齊王憲爲後拒齊主自率衆來追至於髙梁橋憲以精騎二千阻水爲}
  - {type: variant, offset: 1960, length: 0, content: '', SBCK: 齊領軍叚暢直進至橋隔水招暢與語語畢憲問暢曰􅀂何姓名暢曰領軍叚暢也公復爲誰憲曰我虞􅀱大都督耳暢曰觀公言語不是凡人今日相見何用隱其名位陳王純梁公侯莫陳芮内史王􅁩等並在憲側暢固問不巳憲乃曰我天子大弟齊王也指陳王巳下並以名位告之暢鞭馬而去憲即命旋軍而齊人遽追之戈甲甚銳憲與開府宇文忻各統精卒百􅀐爲殿以拒之斬其驍將賀蘭豹子山褥瓌等百餘人齊衆乃退又曰楊寛從天穆引軍趣成臯令寛與爾朱兆爲後拒㝷以衆議不可乃廻赴石濟寛夜行失道後期諸將咸言寛少與北海周旋今不來矣天穆荅曰楊寛非輕於去就者也其所逗留必}
  - {type: page-break, offset: 1960, content: '', id: KR3k0012_SBCK_302-4b}
  - {type: variant, offset: 1960, length: 0, content: '', WYG: 齊領軍叚暢直進至橋隔水招暢與語語畢憲問暢曰若何姓名暢曰領軍叚暢也公復為誰憲曰我虞候大都督耳暢曰觀公言語不是凡人今日相見何用隱其名位陳王紳梁公侯莫陳苪内史王誼等並在憲側暢固問不已憲曰我天子太弟齊王也指陳王已下並以名位告之暢鞭馬而去憲即命旋軍而齊人遽追之戈甲甚銳憲與開府宇文忻各統精兵百騎為殿以拒之斬其驍將賀蘭豹子出褥環等百餘人齊衆乃退又曰楊寛從天穆引軍趣成皋令寛與爾朱兆為後拒尋以衆議不可乃迴赴石濟寛夜行失道後期諸將咸言寛少與北海周旋今不來矣天穆答曰楊寛非輕於去就者也其所逗遛必}
