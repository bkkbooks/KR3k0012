  - {type: variant, offset: 2798, length: 5, content: 發致損軍旅, SBCK: 戎還走祝聃返遂遂之戎前後及中三處受敵故曰􅂨戎師殪死􅂨丁仲切又曰呉侵楚楚將養由基奔命楚司馬子庚以師繼之養由基曰呉乗我喪謂我不能師也必易我而不戒戒備子爲三覆以待我我請誘之子庚從之戰于庸浦庸浦楚地大敗呉師又曰秋九月􅀳侯飲趙盾酒伏兵甲將攻之}
  - {type: variant, offset: 2798, length: 0, content: '', WYG: 戎還走祝􅅨返逐之戎前後及中三處受敵故曰𠂻戎師殪死𠂻丁仲反戎師大奔十一月甲寅鄭人大敗戎師又曰吳侵楚楚將養由基奔命楚司馬子庚以師繼之養由基曰呉乘我喪謂我不能師也必易我而不戒戒備也子為三覆以待我我請誘之子庚從之戰于庸浦庸浦楚地大敗吳師又曰秋九月晉侯飲趙盾酒伏兵甲將攻之其右提彌明知之右車右也趨登曰臣侍君宴過三爵非禮也遂扶以下公嗾夫獒焉明搏而殺之鬭且出提彌明死之又曰衛侯在平夀平夀衛下邑公孟有事於蓋獲之門外有事祭也蓋獲衛郭門也齊氏帷於門外而伏甲焉齊豹之家後漢書曰馮異招集諸營保數萬人與賊約期㑹戰使壯士變服與赤眉同伏於道側旦日赤眉使萬人攻異前部異裁出兵以救之裁小出兵所示弱也賊見勢弱遂悉衆攻異乃縱兵大戰日昃賊氣衰伏兵卒起衣服相亂赤眉不復識别衆遂驚潰追擊大破於崤底降男女八萬人通典曰後漢末荆川牧劉表遣𤣥德北侵至鄴曹公遣將李典夏侯惇拒之𤣥德一旦燒屯去惇率諸軍追擊之典曰賊無故退疑必有伏南道窄狹草木深不可追也惇不聽與將于禁追之典留守惇等果入賊伏裏戰不利典往救𤣥德覩見救至乃退又曰後漢末吕布與陳宫等將萬餘人來與曹公戰時兵皆四出在者不數千人屯營不固曹公乃令婦人守陳餘悉令將持兵拒之屯西有大堤其南樹木幽深布疑有伏乃相謂曰曹操多詐勿入伏中引軍南七十餘里明日復來曹公隱兵堤裏出半兵堤外布益進乃令輕兵挑戰既合伏兵乘堤歩卒並進遂大破之晉書曰鎮南將軍杜元凱伐吳樂鄉城晉牙門管定周㫖等伏兵樂鄉城外吳都督孫歆先遣車出拒晉將王濬於上流大敗而還㫖等}
