  - {type: variant, offset: 2674, length: 3, content: 右虞候, WYG: 視敵國道路逺近水潦山林路徑險阨城邑大小溝渠深淺蓄積多少兵車之數豪傑姓名審而知之用兵之要也伏兵易曰伏戎于莽三嵗不興左傳曰北戎侵鄭鄭伯患之曰彼徒我車懼其侵軼我也徒歩兵也軼突也公子突曰使勇而無剛者嘗冦而速去之嘗試也勇則能往無剛則不恥退也君}
