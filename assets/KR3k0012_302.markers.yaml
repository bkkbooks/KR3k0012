  - {type: punctuation, offset: 6, content: 《, id: KR3k0012_CHANT_302-bkkpn1}
  - {type: variant, offset: 6, length: 1, content: 尚, WYG: 堅不却上傳召復曰吏士飢且可朝食復曰先破之然後食耳於是被羽先登所向皆靡諸將皆服其勇魏志曰張遼字文逺為征東將軍征孫權被甲戰先䧟陣御壘入至麾下晉書劉牢之𫝊曰太元初謝𤣥北鎮廣陵時苻堅方盛𤣥召募牢之與東海何謙瑯琊諸葛樂安髙衡東平劉軌西河田洛晉陵孫無終等以驍猛應選𤣥以牢之為叅軍領精銳為前鋒百戰百勝號為北府兵敵人畏之又曰元興初㑹稽王道子將討桓𤣥詔司馬柔之兼侍中以騶虞幡宣告江荆二州至姑熟為𤣥前鋒所害又載記曰髙句麗及宇文叚國等謀滅廆以分其地太興初二國伐廆廆曰彼軍初來鋒甚銳若逆擊之落其計矣又曰吕隆載記曰宜曜勁鋒示其威武彼以我逺來必决死拒戰可一舉而平宋書曰劉懐慎彭城人也少謹慎質直始叅髙祖鎮軍車騎將軍事振威將軍彭城内史從征鮮卑毎戰必先士卒及尅廣固懷慎率所領先登髙祖距盧循於石頭屢戰尅㨗又張暢傳曰虜攻彭城南門并放火暢躬自前戰身先士卒宋}
