  - {type: variant, offset: 76, length: 471, content: 當一車之用困諸阨又克車每用於阨道今去車故為必克也請皆卒去馬為步卒自我始乃毀車以為行魏舒先自毀其屬車為步陣行戶郎反五乘為三五乘車者車三人五乘十五人今改去車更以五人為五分為五三也為五陣以相離兩於前伍於後專為右角參為左角偏為前拒皆臨時處置之名也以誘之狄人笑之笑其失常未陣而薄之大敗又曰王以諸侯伐鄭鄭伯禦之原繁高渠彌奉公為魚麗之陣先偏後伍伍承彌縫杜預注曰此魚麗之法又曰宋為乘丘之役故侵我公禦之宋師未陣而薄之敗諸鄑凡師敵未陣曰敗某師皆陣曰戰大崩曰敗績得儁曰克覆而敗之曰取某師京師敗曰王師敗績于某又曰宋公及楚人戰于泓司馬子魚曰彼眾我寡及其未濟請擊之公曰不可既陣而後擊之宋師敗績公傷股門官殲焉門官守門者也國人皆咎公公曰古之軍也不以阻隘寡人雖亡國之餘宋商紂之後不鼓不成列恥以詐勝也又曰晉楚將戰晉欒書曰楚師輕窕固壘而待之三日必退退而擊之必獲候勝焉郄至曰楚有六間不可失也其二卿相惡子重子反也王卒以舊罷老不代鄭陣而不整蠻軍而不陣蠻夷從楚不結陣也陣不違晦晦月終陰之盡故兵家以為忌在陣而囂囂喧嘩也合而加囂陣合宜靖而益有聲各顧其後莫有鬥心人恤其所底舊必不良以犯天忌我必克, SBCK: 畏}
