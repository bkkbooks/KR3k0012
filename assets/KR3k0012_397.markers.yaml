  - {type: variant, offset: 325, length: 4, content: 管輅族兄, krp: 周宣字孔和爲太史甞有問宣者曰吾夜夢見芻狗其占何也宣荅曰君欲得羙食耳有頃出行果遇豐膳後又問昨夜復夢見芻狗何也宣曰欲墮車折脚冝戒慎之頃之果如宣言後又問曰昨夜夢見芻狗何也宣對曰君家欲失火當護之俄遂火起巳而語宣曰前後三時皆不夢也聊試君耳何以皆驗耶宣對曰此神靈動君使言故與真夢無異也又問三夢芻狗而其占不同何也宣曰芻狗者祭神之物故君始夢當得飲食也祭祀訖則芻狗爲車所轢故中夢當墮車脚也芻狗旣車轢之後必載以爲樵故後夢憂失火也宣之叙夢凡此類也後魏書曰莊帝永安中北海王顥入洛莊帝北廵城陽王徽投前洛陽令宼祖仁祖仁聞尔朱兆捕徽乃斬首送之兆夢徽曰我有金二百斤馬一百疋在祖仁家卿可取之兆於是懸祖仁首於樹以石墜足鞭之求金馬祖仁死時人以爲立報崔鴻十六國春秋前凉録曰索紞字叔徹善數術占夢}
  - {type: variant, offset: 330, length: 0, content: '', SBCK: 廉令狐䇿夢立氷上與氷下人語紞曰氷上爲陽氷下爲隂隂陽事也士如歸妻迨氷未泮婚姻事也君在上與氷下人語爲隂陽介事君當爲人媒氷泮而婚成䇿曰老夫耄矣不爲媒也㑹太守田邈因䇿爲子求張公徴女仲春而婚郡主簿張宅夢走馬上山還舎三周但見松栢不知門處紞曰馬爲離離爲火禍也人上山爲凶字但見松栢墓門像也不知門處爲無門也三周三朞也後三年必有大禍宅果與賈摹等謀反伏誅馬興平問紞曰我昨夜夢舎馬舞數十人向馬拍手何也紞曰馬者火也舞爲火起向馬拍手救火人也平未歸而火起郡功曹張邈甞奉使詣州夜夢狼噉一脚紞曰脚肉􅀍噉爲却字㑹東虜反遂不行張斌當舉孝廉夢竪竿中天紞曰此未字也斌果停凡所占夢莫不中驗皇甫謐帝王丗紀曰黄帝夢大風吹天下之塵垢皆去又夢人執千鈞之弩驅羊數萬羣帝寤而歎曰風爲號令執政者垢去土解清治者天下豈有姓風名后者也哉夫千鈞之弩異力能逺者也驅羊數萬羣是能善牧者也天下豈有姓力名牧者也於是依二夢之占而求之得風后于海隅登以爲相得力牧于大澤進以爲將又曰湯思賢夢見有人􅀒鼎抗爼對已而􅀏寤而占曰鼎爲和味爼者割截天下豈有人爲吾宰者哉􅀄力牧之後曰伊摯耕於有莘之野湯聞以幣聘有莘之君留而不進湯乃求婚於有莘之君有莘之君遂嫁女於湯以摯爲媵臣至毫乃􅀒鼎抱爼見湯也列子曰覺有八徴夢有六􅀱奚謂六􅀱一曰正夢二曰噩夢三曰思夢四曰寤夢五曰喜夢六曰懼夢此六者神所交也一體之􅄹虚消息皆通於天地應於物􅀋故隂氣壯則夢渉大水而恐懼陽氣壯則夢涉大火而燔􅌊隂陽俱壯則夢生殺以浮虚爲疾者則夢􅀭以沉實爲疾者則夢溺藉帶而寢則夢蛇飛鳥衘髪則夢飛將隂夢火將疾夢食飲酒者憂歌舞者哭故神遇爲夢形接爲事古之眞人其覺自忘其寢不夢又曰西極之南隅有}
  - {type: page-break, offset: 330, content: '', id: KR3k0012_SBCK_397-3a}
