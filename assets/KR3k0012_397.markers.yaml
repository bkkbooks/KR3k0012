  - {type: variant, offset: 3395, length: 712, content: 里以為范蠡地春秋後語曰秦欲攻安邑恐齊救之則以宋委於齊曰宋王無道為木人以像寡人射其面寡人地絕兵遠不能攻也王茍能破宋有之寡人如自得之戰國策曰孟嘗君將入秦蘇秦謂曰今臣經緇上有土偶人與桃梗人相與語桃梗謂土偶人曰子西岸土也八月雨降淄水至則子殘矣曰吾殘則復西岸子東園梗也刻削為人淄水至而去漂然將何所之矣孟嘗乃止漢書曰匈奴畏郅都之威刻木像都之狀交弓射之莫能中魏志曰鮑信與太祖擊黃巾信乃鬭死太祖購求信喪不得乃刻木如信形祭而哭之魏略曰時苗字德胄鉅鹿人少清白為人疾惡出為壽春令令行風靡楊州治在其縣時蔣濟為治中苗以初至任欲謁濟濟素好酒適會其醉不能見苗苗怨恨還刻木為人署曰酒徒蔣濟立之於壇旦夕射之江表傳曰孫權使朱雋往喻關羽令降羽乃作像人於城上而潛遁又曰孫皓以張布女為美人棒殺之後思其顏色使工巧刻作美人形恒置坐側隋書曰柳誓字顧言本河東人也拜祕書監封漢南縣公帝退朝之後命入閣言宴諷讀終日而罷恩若朋友帝猶恨不能夜召於是命匠刻木偶人施機關能坐起拜伏似於誓帝每在月下對酒輒令宮人運之於坐與相酬酢而為歡笑唐書曰丘行恭從太宗討王世充會戰於邙山之上太宗與諸騎相失唯行恭獨從尋有騎數人追及太宗矢中御馬行恭乃廻騎射之賊不敢復前然後下馬拔箭以其所乘馬進太宗貞觀中有詔刻石為人馬以像行恭拔箭之狀立於昭陵闕前又曰侯君集滅高昌國拜麴智盛為左武衛將軍及太宗崩刊石像智盛之形列於昭陵玄闕之下又曰天寶中天下州郡皆鑄銅為玄宗真容擬佛像之制又曰天寶五年於太清宮刻石為李林甫陳希烈像侍於聖容之側孝子傳曰丁蘭早孤不識其母乃刻木作母而事之車頻秦書曰姚萇為符堅神像戰求有利軍中士眾出入並驚恐皆云畏符主像萇嚴鼓斬之以首送符登抱朴子曰張華作博物志曰黃帝仙去其臣左徹者削木為黃帝像帥諸侯奉之亦見汲冢書, SBCK: 九十七}
