  - {type: variant, offset: 592, length: 0, content: '', SBCK: 夢􅁴遂召太公三日果有􅁀風疾雨過其灌壇也始興記曰林水源裏有石室室前盤石上行羅十瓮中悉是鉼銀採伐過之不得取之取必迷悶晉孝武太元􅀄封驅之家奴竊三鉼歸發㸔有蛇螫之而死其夜驅之夢神語之曰君奴不謹盗銀三餅即日顯戮覺奴已死銀由在復還之矣論衡曰趙簡子夢見天帝也以夢占之知樓䑓山陵官位之象也人夢上樓􅂛山陵輙得官位實樓䑓山陵非官位也則知簡子夢見帝非天帝也丗􅀃曰衛玠惣角時甞問樂廣夢樂云是想衛曰神形}
  - {type: page-break, offset: 592, content: '', id: KR3k0012_SBCK_397-5b}
