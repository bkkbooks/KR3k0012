  body:
  - {type: variant, offset: 5, length: 2, content: 七溺, SBCK: 八叙夢吉夢上叙夢毛詩雞鳴曰蟲飛薨薨甘與子同夢箋云蟲飛薨薨東方旦明之時我猶樂與君子卧而同夢言親受之也又節正月曰召彼故老訊之占夢笺云君臣在朝侮元老召之不問政事但問占夢而已不尚道德而信徴祥也尚書㤗誓曰朕夢叶朕卜襲于休祥戎啇必克周禮春官下曰太卜掌三夢之法一曰致夢二曰觭夢三曰咸陟夢者人之精神所窹可占者也致夢言夢之所至也夏后氏作焉咸皆也陟之言得也周人作焉觭讀如諸戎掎之掎亦德也亦言夢所得殷人作焉又春官占夢曰掌其歳時觀天地之㑹辯隂陽之氣以日月星辰占六夢之􅁻凶一曰正夢無所感動平安自夢二曰噩夢謂驚愕而夢也三曰思夢􅁴時所思念之而夢四曰寤夢覺時道之而夢五曰喜夢喜恱而夢六曰懼夢恐懼而夢季冬聘王夢獻􅁻夢于王王拜受之聘問也夢者事之祥吉凶之占在日月星辰季冬日窮于次月窮于紀星迴于天數將幾終於是發弊而問焉若休慶之云尔因獻羣臣之吉夢於王歸羙焉左傳昭元曰鄭子産如晉晉侯有疾韓宣子曰寡君􅃦疾於今三月矣並走羣望晉望祀山川走徃祈禱有加而無瘳今夢黄熊入於寢門其何厲􅀑也對曰以君之明子爲}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_397-1b}
  - {type: variant, offset: 5, length: 2, content: 七溺, WYG: 八叙夢吉夢上叙夢毛詩鷄鳴曰蟲飛薨薨甘與子同夢箋云䖝飛薨薨東方旦明之時我猶樂與君子而卧同夢言親愛之也又正月曰召彼故老訊之占夢箋云君臣在朝侮元老召之不問政事但問占夢而已不尚道徳而信徴祥也尚書泰誓曰朕夢叶朕卜襲于休祥戎商必克周禮春官下曰}
