  - {type: variant, offset: 761, length: 271, content: 循表而夜涉溺死者千有餘人淮南子曰與溺者金玉不如與之一尋常之纏又曰父溺則攬父髮而整之非敢憍侮以救死也說苑曰梁相死惠子欲之梁渡河而遽墮水中舩人救之曰居舩楫之間而溺無我則子死矣子何能相梁乎惠子曰居廣艘長楫之間則不如子至安國家全社稷子之比我蒙蒙如未視之駒曹毗神女杜蘭香傳曰神女姓杜字蘭香自云家昔在青草湖風溺大小盡沒香時年三歲西王母接而養之於崑崙之山於今千歲矣異苑曰蜀郡張貞行舡覆溺死貞婦黃因投江就之積十四日執夫手俱浮出又曰河內荀儒字君林乘冰省舅氏陷河而死兄倫求尸積日不得設祭冰側牋與河伯投牋一宿岸側冰開尸首執牋浮出倫又牋謝又曰頴川荀茂遠景平中至南康夜, SBCK: 禍福吉}
