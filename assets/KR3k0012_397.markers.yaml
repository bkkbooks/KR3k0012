  - {type: variant, offset: 82, length: 107, content: 乘橋舡又緇衣曰子曰小人溺於水君子溺於口大人溺於人皆在其所褻也夫水近於人而溺人德易狎而難親也易以溺人左傳哀下曰越圍吳晉趙孟使楚隆問吳王王曰勾踐將生憂寡人寡人死之不得矣王曰溺人必笑吾將有問也史黯何以得為君子對曰黯也進不, SBCK: 復夢}
