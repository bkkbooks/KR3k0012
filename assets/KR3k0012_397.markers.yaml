  - {type: variant, offset: 1410, length: 1730, content: 郡縣表上為雄立碑圖像其形焉博物志曰澹臺子羽渡水子溺死將葬之滅明日此命也吾豈與螻蟻為親戚魚鼈為仇讎遂以葬之又曰南郡宜城王子山到太山從鮑子真學筭到魯賦靈光殿歸渡湘水溺死時年二十許其弟子玉親見之樂府解曰公無渡河朝鮮津卒霍里子高妻麗玉所作子高晨起剌舡有一白首狂夫被髮提壺亂流而渡其妻呼而止之乃遂溺死於是援箜篌而歌曰公無渡河相似春秋曆命序洛書曰人皇出於提地之日九男九兄弟相似別長九國家語曰孔子適鄭與弟子相失獨立東郭門或謂子貢曰東門有一人焉其形長九尺有六寸河目而隆顙其頭似堯其項似皋陶其肩似子產而腰已下不及禹三寸孔叢子曰萇弘語周文公曰吾觀仲尼有聖人之表其狀河目而隆顙是黃帝之形也脩肱而龜背其長九尺有六寸是成湯之容體也然言稱先王躬履謙讓洽聞強記博物不群抑亦聖人之興者也史記曰孔子既沒弟子思慕有若狀似孔子相與共立為師如夫子時又曰楚相孫叔敖臨死屬其子貧困往見優孟乃為叔敖衣冠振掌談語歲餘像叔敖王與左右不能別欲以為相優孟曰孫叔敖盡忠為楚令尹死其子負薪楚相不足為也王乃封敖子漢書曰夏陽人姓成名方遂居湖以卜筮為事有故太子舍人嘗從方遂卜謂曰子狀貌甚似衛太子方遂心利其言幾得以富貴即詐自稱詣闕廷尉建召鄉里識知者張宗祿等遂坐誣罔不道要斬東市又曰馮立字聖卿遷西河上郡守立居職公廉治行略與兄野王相似而多知有恩貸好為條教吏民嘉美野王與立相代為太守歌之曰大馮君小馮君兄弟繼踵相因循聰明賢智惠吏民政如魯衛德化鈞周公康叔猶二君漢獻帝春秋曰孝靈皇帝王美人生皇子協協生十餘日何皇后妒殺美人靈帝母永樂董太后攝養協號曰董侯董侯八歲能讀詩書魏志曰初高勾麗王生能開目視國人惡之及長果凶虐數寇鈔曾孫位生亦能開目視國人惡之勾麗呼相似為位以似其曾祖故名曰位晉書曰桓玄聞義軍起憂懼曰何無忌劉牢之外生酷似其舅共舉大事何慮不成又曰蜀人王富作亂郡縣討平之初諸葛孔明有盛德于蜀土子瞻又身死王事蜀人思之為瞻不死故將謂王富曰君狀貌甚似諸葛亮君因此思剋復以霸巴蜀晉中興書曰王允之字淵猷年在總角從伯敦知之謂為似己入則共寢檀道鸞晉陽秋曰初議以吳隱之為黃門郎而隱之皃似太宗上不忍見故攻焉齊書曰謝弘微性嚴正舉止必脩禮度時有蔡湛之者及見謝安兄弟謂人曰弘微皃類中郎而性似文靖梁書曰王筠字元禮琅琊人年十六為芍藥賦沈約曰王郎非唯額似袁公見人輒矜王郎見人必悞笑唯此條不能酷似耳袁粲即筠外祖也唐書曰王孝傑雍州新豐人高宗末西討吐蕃戰於大非川為賊所獲吐蕃贊普見孝傑垂泣曰貌類吾父厚加敬禮孟子曰昔者孔子夏子歿子夏子游子張以有若似聖人欲以所事孔子事之強曾子曾子曰不可江漢以濯之秋陽以暴之皜皜乎不可尚已劉昭幼童傳曰漢孝昭帝諱弗陵武帝少子也年五六歲壯大武帝云類我甚奇之江表傳曰孫皓夫人死皓哀愍葬於苑中皓治喪於內半年不出國人見葬太奢麗皆謂皓已死所葬者是也皓舅子何都顏狀似皓云都代立也孔融別傳曰融為太中大夫虎賁士皃似蔡邕每酒酣輒引與同坐曰雖無老成人尚有典刑續搜神記曰吳興施續為吳尋陽督能言論有門生亦有意理常秉無鬼論門生後渡江忽有一單衣白帢客來因共言語遂及鬼神客辭屈乃語曰僕便是鬼何以云無受使來取君門生請乞酸苦鬼問有似君者不云施續下都督與僕相似鬼許之便與俱歸與都督對坐鬼手中出一鐵鑿可長尺餘正自打之放鑿便去顧語門生慎勿道俄而都督云頭痛還所住至食時便亡說苑曰孔子之匡簡子將殺陽虎孔子似之甲士以圍孔子之舍子路怒奮戟將下斗孔子止之曰夫歌予和汝子路歌孔子和之三終而甲罷風俗通曰陳國張伯喈弟仲喈婦炊於灶下至井上謂喈曰我今日粧好不伯喈曰我伯喈也婦大慚愧其夕時伯喈到更衣婦復逐牽其背曰今旦大誤謂伯喈為卿荅曰我故伯喈也蓋親密無過夫婦然尚如此況於初未相見而責先識之乎世說曰桓豹奴是王混外生形似舅桓甚諱之宣武云不恒似時似耳恒似則形時似是神桓愈不悅又曰魏黃初末吳人發長沙王吳芮冢容皃如故吳卒發者見淮南吳綱曰君何類長沙王綱曰先祖也去綱近五百年語林曰張衡死蔡邕母始懷孕此二子才皃甚相類時人云邕是衡之後身又曰桓溫自以雄姿風氣是司馬宣王劉越石一輩器有以叱王大將軍者意大不平征符健還於北方得一巧作老婢乃是劉越石妓女一見溫入潸然而泣溫問其故荅曰官家甚似劉司空溫大悅即出外脩整衣冠又入呼問我何處似司空婢荅曰眼甚似恨小面甚似恨薄鬚甚似恨赤形甚似恨短聲甚似恨雌宣武於是弛冠解帶不覺惛然而睡不怡者數日偶像說文曰偶人也, SBCK: ''}
