  - {type: variant, offset: 333, length: 4, content: 斥丘輅往, SBCK: 弇州西台州北不知距齊國幾千萬里也非舟車足力之所及彼中無師長無􅄝欲不知樂生不知惡死無夭殤不知親巳不知踈物帝寤怡然而召輔相而告之曰朕思有以養身治物之道弗􅀗疲而睡􅀂此知至道不可以情求朕得之矣莊子曰夢者隂陽之精也心所喜怒則精氣}
