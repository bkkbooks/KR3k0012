  - {type: variant, offset: 595, length: 2, content: 白素, SBCK: 接而夢豈是想樂曰因也衛思因不得遂成病樂聞故命駕爲剖折之衛病即小差樂歎曰此賢􅅐中當必無膏肓夢書曰夢者像也精氣動也䰟􅅎離身神來徃也隂陽感成吉凶驗也夢者語其人預見過失如其賢者知之自改革也夢者告也告其形也目無所見耳無所聞鼻不喘嗅口不言也魂出遊身獨在心所思念忘身也受天神戒還告人也受戒不精忘神言也名之爲寤告符臻也古有夢官丗相傳也又曰昔聖帝明王之時神氣炤然先見故尭夢乗龍上太山舜夢擊天鼓禹夢其手長湯夢布令天下後皆有天下桀夢疾風壤其宫紂夢大雷擊其手齊桓夢爲大禽所中􅁗二丗夢虎齧其馬王者夢之皆失天下黃帝鍼經曰歧伯曰正邪外襲内而未有定舎也反􅁋於藏榮衛俱行而與魂魄飛􅀭使人卧不得安而喜夢氣􅁋於府則有餘於外不足於内氣􅁋於藏則有餘於内不足於外隂氣盛則夢渉大水而恐懼陽氣盛則夢渉大火而燔灼隂陽俱盛則夢相殺毀傷上盛則夢飛下盛則夢堕}
