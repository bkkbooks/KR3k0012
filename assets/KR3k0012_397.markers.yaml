  - {type: variant, offset: 11, length: 4, content: 武王踐祚, SBCK: 楚子成章華之䑓願與諸侯落之􅀕之爲落䑓今在華容城内太􅌠薳啓疆來召公公將徃夢襄公祖祖􅀕道神梓慎}
  - {type: variant, offset: 11, length: 1, content: 武, WYG: 致夢二曰觭夢三曰咸陟夢者人之精神所窹可占者也致夢信夢之所至也夏后氏作焉咸皆也陟之言得也周人作焉觭讀如諸戎椅之椅亦得也亦言夢所得殷人作焉又春官占夢曰掌其嵗時觀天地之㑹辨隂陽之氣以日月星辰占六夢之吉㓙一曰正夢無所感動平安自夢二曰噩夢謂驚愕而夢也三曰思夢覺之所思念之而夢四曰窹夢覺時道之而夢五曰喜夢喜悦而夢六曰懼夢恐懼而夢季冬聘}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_WYG_397-2a, image: WYG0896/WYG0896-0503c.png}
  - {type: variant, offset: 11, length: 4, content: 武王踐祚, krp: 楚子成章華之䑓願與諸侯落之祭之爲落䑓今在華容城内太宰薳啓疆來召公公將徃夢襄公祖祖祭道神梓慎}
  - {type: variant, offset: 13, length: 2, content: 踐祚, WYG: 夢獻吉夢于王王拜受之聘問也夢者事之祥吉㓙之占在日月星辰季冬日窮于次月窮于紀星迴于天數將㡬終於是發幣而問焉若休慶之云爾因獻群臣之吉夢於王歸美焉左傳昭二}
