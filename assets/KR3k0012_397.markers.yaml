  - {type: variant, offset: 331, length: 1, content: 居, SBCK: 名古莽隂陽之氣所不交寒暑亡辯日月之光所不照晝夜亡辯其民不食不衣而多眠五旬一覺以夢中所爲者實覺之所見者妄又曰周之尹氏大治産其下趣役者侵晨昏而弗息有老役夫筯力竭矣夜則昏憊而熟寐而昔昔夢爲國君遊醼宫觀恣意所欲其樂無比覺則復役人有慰喻其勤者役夫曰人生百年晝夜各分吾晝爲僕夫苦則苦矣夜爲人君其樂無比何所怨哉尹氏盧鍾家業心形俱疲昏憊而寐昔昔夢爲人僕趨走作役無不爲也數罵杖撻無不至也尹氏病之以訪其友其友曰􅀂夜夢爲僕夫苦逸之復數之常也􅀂欲覺夢兼之豈可得耶又曰黄帝十有五年晝夢遊於華胥氏之國其國}
