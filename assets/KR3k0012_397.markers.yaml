  - {type: variant, offset: 1033, length: 376, content: 一人頭有一角為遠筮云君若至都必得官問是何職荅曰官生于林於是而寤未解所況因復寐又夢部伍至楊州水門墮水而死作棺既成遠入中自試恨小即見殯瘞葬渚次悵然驚以告母兄舩至水門果落江而殞喪儀一如其夢幽明錄曰蔡廓作豫章郡未發大兒始迎婦在渚次兒欲渡婦舡衣挂舡頭遂墮水即沒徐羨之作楊州登勑兩岸厚賞漁人及昆崙共尋覔至二更不得婦哀泣之間髣髴如夢聞聲告之曰吾今在卿舡下以告婢婢白之令水工沒覔果見坐在舡下初出水顏色如平生三輔決錄曰文帝竇后名猗清河觀津人也父遭秦之亂隱身漁釣墜淵而卒景帝即位后登尊號遣使者更填父所墜淵而筑起大墳觀津城南青山是也益部耆舊傳曰孝女叔光雄者犍為人也父泥和永建初為縣功曹乘舡墮水物故尸喪不歸號泣晝夜心不圖存所生男女二人並數歲雄乃各為囊盛珠環以繫兒數為訣別之辭家人每防閑之後稍懈因乘小舡於父墮處慟哭遂自投水死弟賢其夕夢雄告之卻後六日當共父同出至期伺之果與父相持江, SBCK: ''}
