  - {type: variant, offset: 16, length: 2, content: 盥盤, WYG: 鄭子産如晉晉侯有疾韓宣子逆客私焉曰寡君寢疾於今三月矣並走群望晉望祀山川走往祈禱有加而無瘳今夢黄熊入于寢門其何厲鬼也對曰以君}
