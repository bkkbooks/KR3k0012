  - {type: page-break, offset: 330, content: '', id: KR3k0012_SBCK_397-4a}
  - {type: variant, offset: 330, length: 0, content: '', WYG: 㢘令狐策夢立氷上與氷下之人語紞曰氷上有陽氷下為隂隂陽事也士如歸妻迨氷未泮婚姻事也君在上與氷下人語為隂陽介事君當為人媒氷泮而婚成策曰老夫耄矣不為媒也㑹太守田邈因策為子求張公徴女也仲春而婚郡主簿張宅夢走馬上山還舍三周但見松栢不知門䖏紞曰馬為離為火禍也人上山為凶字但見松栢墓門像也不知門䖏為無門也三周三朞也後三年必有大禍宅果與賈摹等謀反伏誅馬興平問紞曰我昨夜夢舍馬舞人向馬拍手何也紞曰馬者火也舞火起向馬拍手救火人也平未歸而火起郡功曹張邈嘗奉使諧州夜夢狼噉一脚紞曰脚月被噉為却字㑹東虜反遂不行張斌當舉孝㢘夢竪竿中天紞曰此未字也斌果停凡所占夢莫不中驗皇甫謐帝王世紀曰黄帝夢大風吹天之塵垢皆去又夢人執千鈞之弩驅羊數萬羣帝寤而歎曰風為號令執政者也垢去土后在也天下豈有姓風名后者哉夫千鈞之弩異力能運者也驅羊數萬羣是為善牧者也天下豈有姓力名牧者哉於是依二夢之占而求之得風后于海隅登以為相得力牧於大澤進以為將又曰湯思賢夢見有人負鼎抗爼對已而笑窹而占曰鼎為和味爼者割截天下豈有人為吾宰者哉初力牧之後曰伊摯耕於有莘之野湯聞以幣聘有莘之君留而不進湯乃求婚於有莘之君有莘之君遂嫁女於湯以摯為媵臣至亳乃負鼎抱爼見湯也列子曰覺有八徴夢有六條奚謂六條一曰正夢二曰噩夢三曰思夢四曰寤夢五曰喜夢六曰懼夢此六者神所交也一體之盈虛消息皆通於天地應於物類故隂氣壯則夢涉大水而恐懼陽氣壯則夢涉大火而燔焫隂陽俱壯則夢生殺以浮虛為疾者則夢揚以沉實為疾者則夢溺藉帶而寢則夢蛇飛鳥銜髪則夢飛將隂夢火將疾夢食飲酒者憂歌舞者哭故神遇為夢形接為事古之真人其覺自忘其􅃦不夢又曰西極之南隅有}
