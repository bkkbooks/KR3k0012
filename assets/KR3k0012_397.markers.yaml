  - {type: variant, offset: 8, length: 2, content: 戴禮, SBCK: 政其何厲之有昔堯殛鯀于羽山其神化爲黄熊入于羽淵實爲夏郊三代祀之晉爲盟主其或者未之祀也韓子祀夏郊晉侯有間間差也又昭二}
