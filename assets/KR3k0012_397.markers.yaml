  - {type: variant, offset: 3255, length: 0, content: '', SBCK: 左傳僖下曰晉侯夢與楚子摶􅅮手􅅮也楚子伏巳而盬其腦􅐭啑也子犯曰我得天楚伏其罪吾且柔之矣晉侯上向故得天楚子下向地故伏其罪也腦所以柔物又宣上曰鄭文公有賤妾曰燕結夢天使與巳蘭曰余爲伯鯈余而祖也以是爲而子以蘭有國香人服媚之如是旣而文公見之與之蘭而御之生穆公名之曰蘭又昭元曰昔武王邑姜方震大叔邑姜武王后齊太公之女也懐胎爲震大叔成王之弟虞夢帝爲巳曰餘命而子曰虞帝天也將與之唐属諸叅而蕃育其子孫又哀下曰宋景公無子取公孫周之子得與啓畜諸公宮未有立焉公卒得夢啓北首而寢於盧門盧門宋東門也北首死處在門外失國之象也巳爲烏而集於上咮加於南門尾加於桐門桐門北至曰余夢羙必立乃立得春秋元命苞曰堯爲天子夢白帝遺吾馬喙子其母爲扶始􅂛丘睹白帝上有雲虎感巳生臯陶此盡夢所見告之辭也雲虎有雲􅃺如虎堯聘索􅃺如問之如尭言徴與語明於刑法周書曰文王去啇在程正月旣生魄大姒夢見啇之庭産􅁄小子發取周庭之梓樹乎闕間梓化爲松栢棫柞寤驚以告文王王及太子發並拜􅁻夢受啇之大命于皇天上帝}
  - {type: page-break, offset: 3255, content: '', id: KR3k0012_SBCK_397-7b}
  - {type: variant, offset: 3255, length: 0, content: '', WYG: 左傳僖下曰晉侯夢與楚子搏搏手搏也楚子伏已而盬其腦子犯曰我得天楚伏其罪吾且柔之矣晉侯上向故得天楚子下向地故伏其罪也腦所以柔物又宣上曰鄭文公有賤妾曰燕姞夢天使與已蘭曰余為伯鯈余而祖也以是為爾子以蘭有國香人服媚之如是既而文公見之與之蘭而御之生穆公名之曰蘭又昭元曰昔武王邑姜方震大叔邑姜武王后齊太公之女也懷胎為震大叔成王之弟虞夢帝為己曰余命而子曰虞帝天也將與之唐屬諸㕘而蕃育其子孫又哀下曰宋景公無子取公孫周之子得與啓畜諸公宫未有立焉公卒得夢啓北首而寢於盧門之外盧門宋東門也北首死䖏在門外失國之象也已為烏集於上咮加於南門尾加於桐門桐門北門曰余夢美必立乃得立春秋元命苞曰尭為天子夢白帝遺吾馬喙子其母為扶始升邱暏白帝上有雲虎感生已生臯陶此盡夢所見告之辭也雲虎有雲状如虎尭聘索狀始問之如尭言徴與語明於刑法周書曰文王去商在程正月既生魄太姒夢見商之庭産棘小子發取周庭之梓樹乎闕間梓化為松栢棫作寤驚以告文王王及太子發並拜告夢受商之大命于皇天上帝}
