  - {type: variant, offset: 325, length: 4, content: 管輅族兄, SBCK: 周宣字孔和爲太史甞有問宣者曰吾夜夢見芻狗其占何也宣荅曰君欲得羙食耳有頃出行果遇豐膳後又問昨夜復夢見芻狗何也宣曰欲墮車折脚冝戒慎之頃之果如宣言後又問曰昨夜夢見芻狗何也宣對曰君家欲失火當護之俄遂火起巳而語宣曰前後三時皆不夢也聊試君耳何以皆驗耶宣對曰此神靈動君使言故與真夢無異也又問三夢芻狗而其占不同何也宣曰芻狗者􅀕神之物故君始夢當得飲食也􅀕祀訖則芻狗爲車所轢故中夢當墮車脚也芻狗旣車轢之後必載以爲樵故後夢憂失火也宣之叙夢凡此類也後魏書曰莊帝永安中北海王顥入洛莊帝北廵城陽王徽投前洛陽令宼祖仁祖仁聞尔朱兆捕徽乃斬首送之兆夢徽曰我有金二百斤馬一百疋在祖仁家卿可取之兆於是懸祖仁首於樹以石墜足鞭之求金馬祖仁死時人以爲立報崔鴻十六國春秋前凉録曰索紞字叔徹善數術占夢}
