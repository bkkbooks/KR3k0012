  - {type: variant, offset: 1202, length: 2288, content: 俱集宋書曰齊高帝鎮淮陰為宋明帝所疑被徵為黃門郎深懷憂慮見平澤有群鶴仍命筆詠之曰八風舞遙翮九野弄清音一摧雲門志為君死中禽梁書曰庾域母好鶴唳域在位營求孜孜不怠一旦雙鶴來下論者以為孝感所致莊子曰鳧脛雖短續之則憂鶴脛雖長斷之則悲又曰老子謂孔子曰夫鶴不日浴而白烏不日黔而黑列子曰詹何曰聞先大夫之言捕旦子之弋弱纖乘風振之連雙鶴於青雲之際用心專動手均也墨子曰子禽問曰多言有益乎對曰蝦蟆日夜鳴口乾而人不聽之鶴雞時夜而鳴天下振動多言何益抱朴子曰周穆王南征一軍盡化君子為猨為鶴小人為蟲為沙神異經曰西海之外有鶴國男女皆長七寸為人自然有禮經論跪拜壽三百歲人行如飛日千里百物不敢犯之唯畏海鵠鵠遇吞之亦壽三百歲人在鶴腹中不死琴操曰高陵牧子取妻五年無子父兄欲為改娶妻聞中夜驚起倚戶悲嘯牧子聞之援琴鼓之乙痛恩愛之永離歎別鶴以舒情故曰別鶴操論衡曰藝增篇鶴鳴九折之澤聲聞於天此增益也按鶴鳴參天人則不聞鳴在于澤云何謂乎八王故事曰陸機為成都王所誅顧左右歎曰今欲聞華亭鶴唳不可復得陶侃別傳曰侃丁母艱在墓下忽有二客來弔不哭而退儀形鮮異知非常人遣看之但見雙鶴飛而冲天世說曰劉尊祖少為殷中軍所稱之於庾公庾公甚欣便取為佐引見坐獨榻上與語劉爾日殊不稱庾小失望遂名之為羊公鶴昔羊叔子有鶴能舞嘗向客稱之客至試使驅來氃氋而不能舞故稱之又曰僧支道林好鶴時有遺其雙鶴者翅長欲飛林意惜之乃鎩其翮鶴軒翥不能復起乃舒翼反顧視之如似懊喪意林公曰既有凌霄之姿何肯為人作耳目近翫乎養令翮成遂放飛去述異記曰宋元嘉初鎮北將軍王仲德鎮彭城左右出獵遇一鶴將二子悉禽之歸以獻王王使養之其小者口為人所裂遂不能飲食大者輒含粟哺之飲輒含水飲之先令其飽未曾亡也王甚愛之令精加養視大者羽翮先成每翥冲天小者尚未能飛大者終不先去留飲飴之又於庭中蹇躍教其飛颺六十餘日小者能飛乃與俱去風土記曰鳴鶴戒露此鳥性警至八月白露降流於草上滴滴有聲因即高鳴相警移徙所宿處淮南八公相鶴經曰鶴者陽鳥也而遊於陽因金氣依火精以自養金數九火數七故七年小變十六年大變百六十年變止千六百年形定體尚潔故其色白聲聞天故頭赤食於水故其喙長軒於前故後指短栖於陸故足高而尾凋翔於雲故毛豐而肉踈大喉以吐故脩頸以納新故生天壽不可量所以體無青黃二色者木土之氣內養故不表於外是以行必依洲嶼止不集林木蓋羽族之宗長仙人之騏驥也鶴之上相瘦頭朱頂露眼黑精高鼻短喙䯓音故列切頰音德宅切耳長頸促身鷰膺鳳翼雀尾龜背鼈腹軒前垂後高麤節洪髀纖指此相之備者也鳴則聞於天飛則一舉千里鶴二年落子毛易黑點三年產伏復七年羽翮具復七年飛薄雲漢復七年舞應節復七年晝夜十二時鳴聲中律復百六十年不食生物復大毛落茸毛生雪白或純黑泥水污復百六十年雄雌相見目精不轉而孕千六百年飲而不食鸞鳳同為群聖人在位則與鳳皇翔於甸穆天子傳曰至于巨蒐氏巨蒐之人乃獻白鶴之血以飲天子又曰天子飲於孟氏爰舞白鶴二八吳越春秋曰吳王闔閭有女王伐楚與夫人及女會食蒸魚王嘗半以與女女怨曰王食我殘魚辱我不忍久生乃自殺闔閭痛之葬於邦西昌門鑿地為女墳積土為山文石為郭金鼎玉柸銀樽株襦之寶皆以送女乃儛白鶴於吳市中令萬民隨觀之遂使與鶴俱入羨門因塞之以送死漢武帝內傳曰宣帝即位尊孝武廟為世宗行所巡狩郡國皆立廟告祠世宗廟曰有白鶴集後庭東觀漢記曰章帝至岱宗柴望畢白鵠三十從西南來經祀壇上列仙傳曰王子喬見桓良曰待我緱氏山頭至期果乘白鶴住山顛望之不得到又曰簫史善吹簫能致白鶴神仙傳曰介象死吳先帝思之以象所住屋為廟時時往祭之有白鶴來止李尊太元真人茅君內傳曰茅盈留句曲山告二弟曰吾去有局任不復得數相往來父老歌曰茅山連金陵江湖據下流三神乘白鶴各在一山頭佳雨灌旱稻陸田亦復周妻子保堂室使我無百憂白鶴翔金穴何時復來遊邴原別傳曰邴君所謂雲中白鶴非鶉鷃之網能羅矣永嘉郡記曰沐溪野青田中有雙白鶴年年生伏我長大便去只伯餘父母一雙在耳精白可愛多云神仙所養荊州記曰衡山有三峰極秀一峰名紫蓋峰清天明景輒有一雙白鶴廻翔其上清響亮徹焦贛易林曰白鶴衘珠王韶之神境記曰滎陽郡南百餘里有蘭巖常有雙鶴素羽皦然日夕偶影翔集傳云昔夫婦俱隱此年數百歲化成此鶴臨海記曰郡西北有白鶴山周迴六十里高三百丈有泄水懸注遙望如倒挂白鶴因以為名古老相傳云此山昔有晨飛鶴入會稽雷門鼓中於是雷門鼓鳴洛陽聞之孫恩時斫此鼓見白鶴飛出高翔入雲此後鼓無復遠聲古歌辭曰飛來白鶴從西北來十十五五羅列成行妻卒被病不能相隨五里還顧六里徘徊吾欲衘汝去口噤不能開吾欲負汝去毛羽日摧頹唐書曰天寶中華陰郡奏白鶴見于西嶽五福峰又曰至德中肅宗降誕之辰有慶雲屬天白鶴飛舞於上所居殿宇翱翔二十餘匝而去戰國策曰莊辛謂楚襄王曰黃鶴生江海俯喙鰋鯉仰斷菱藕奮其六翮自以為無患與人無爭不知夫射者方脩弧矢治矰繳將加己者萬仞之上故晝遊江湖夕調鼎俎韓詩外傳曰田饒事魯哀公而不見察謂哀公曰夫雞有五德君猶瀹而食之者以其所從來近也未若黃鶴一舉千里止君園池喙君稻梁君猶貴之以其所從來遠也故臣將去君黃鶴舉矣離騷曰黃鶴之一舉兮知山川之紆曲再舉兮知天地之圓方述異傳曰荀瑰字叔瑋潛栖卻粒嘗東遊憩江夏黃鶴樓上望西南有物飄然降自霄漢俄頃已至乃駕鶴之賓也鶴止戶側仙者就席羽衣虹裳賓主歡對已而辭去跨鶴騰空眇然煙滅韓子曰師曠鼓新聲平公問師曠此何聲也曰清商公最悲乎師曠曰不如清徵公曰可得聞乎師曠曰古之得聽清徵者皆有德義之君公曰得試之乎師曠不得已援琴一奏有玄鶴二八從南方來集於廓門之危再而列三奏延頸而鳴舒翼而儛音中宮商公大悅提觴起為師曠壽其後大旱孫氏瑞應圖曰玄鶴者知音樂之節至又曰黃帝習崑崙以儛眾神玄鶴二八翔其右伏侯古今注曰鶴千歲則變蒼又千歲黑所謂玄鶴也王子年拾遺記曰周昭王時塗脩國獻青鳳丹鶴各一雄一雌以潭皋之粟餧之以溶溪之水飲之左思吳都賦曰青鶴鶖鶬鴻, SBCK: ''}
