  - {type: variant, offset: 3621, length: 2, content: 美宣, SBCK: 來鴻鴈不來逺人背畔小寒之日鴈北郷鴈不北郷民不懷至史記曰􅂫武在匈奴中昭帝遣使通和常惠夜見漢使使謂單于曰天子射上林中得鴈足有係帛書言武等在某澤中使者如其言單于大驚乃使武還漢書曰梁孝}
  - {type: page-break, offset: 3621, content: '', id: KR3k0012_SBCK_917-2a}
