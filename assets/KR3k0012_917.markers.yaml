  - {type: variant, offset: 4554, length: 146, content: 而飛去吾欲剌腹絞頸而絕恐人議吾君以鳥故令士自殺鵠毛物多相類者吾欲買而代之是不信而欺吾王欲赴他國奔亡痛吾兩主使不通故來受罪楚王曰善說苑曰魏文侯使舍人無檡獻鴻於齊其事同宋書曰桓榮祖善彈為東海太守登西樓見翔鵠雲中謂左右曰當生取之於是彈其兩翅毛脫盡墜地無傷養毛生乃去南史孝義傳曰謝昌寓陳郡人也為劉悛廣, SBCK: 荆}
