  - {type: variant, offset: 5124, length: 0, content: '', SBCK: 林有集惟鷮毛詩義䟽曰林應山下人語曰四足之美有鹿兩足之美有鷮周易鼎卦九三曰鼎耳革其行塞雉膏不食方􅀨􅃜悔終􅁻又旅卦六五曰射雉一矢亡終以譽命又曰離爲雉尚書曰日月星辰山龍華蟲華虫鷩雉也五色故謂華也又曰髙宗祭成湯有飛雉升鼎耳而雊論語曰山梁雌雉時哉時哉子路拱之三嗅而作爾雅曰鸕諸雉命雉鷂雉責質五色鷮雉長尾走且鳴鳴雉黄色鳴自呼鷩雉似山雞而小冠背毛黄腹赤頂縁色鮮明秩秩海雉如雉而黒出海中山鸐山雉尾長者也翰雉鵫雉今白鵫江東呼白翰亦名白雉伊洛而南素質五采皆備成章曰翬翬亦雉属言其毛色光鮮江淮而南青質五采皆備成章曰鷂即鷂雉也南方曰􅔧句東方曰緇音緇衣之緇北方曰鵗音希西方曰鷷􅀃四方雉之名也音所旬切雉之暮子爲鷚晚生者也今呼}
  - {type: page-break, offset: 5124, content: '', id: KR3k0012_SBCK_917-5b}
  - {type: variant, offset: 5124, length: 0, content: '', WYG: 林有集惟鷮毛詩義疏曰林慮山下人語曰四足之美有鹿兩足之美有鷮周易鼎卦九三曰鼎耳革其行塞雉膏不食方雨虧悔終吉又旅卦六五曰射雉一矢亡終以譽命又曰離為雉尚書曰日月星辰山龍華蟲華蟲雉也五色故曰華也又曰髙宗祭成湯有飛雉升鼎耳而雊論語曰山梁雌雉時哉時哉子路拱之三臭而作爾雅曰鸕諸雉即雉鷂雉青質五色鷮雉長尾走且鳴鳪雉黄色鳴自呼鷩雉似山雞而小冠背毛黄腹赤頂緑色鮮明秩秩海雉如雉而黒出海中山鸐山雉尾長者也雗雉鵫雉今曰翰江東呼白翰亦名白雉伊洛而南素質五采皆備成章曰翬翬亦雉屬言其毛色光鮮江淮而南青質五采皆備成章曰鷂即鷂雉也南方曰􅔧東方曰鶅音緇衣之緇北方曰鵗音希西方曰鷷說四方之雉也也音所旬切雉之暮子為鷚晚生者也呼}
