  - {type: variant, offset: 5357, length: 12, content: 漢惠五年七月黃鵠二集蕭池, SBCK: 野火焚山林中有一雉入水漬羽飛以滅火往來疲乏不以爲苦白雉春秋感精符曰王者徳流四表則白雉見孝經援神契曰王者德至鳥獸故雉白首妃房不徧故白雉應又曰周成王時越裳獻白雉去京師三萬里王者􅀕祀不相踰宴食衣服有節則至抱朴子曰白雉自有種􅀯越尤多案地域圖今之九德則古之越裳也盖白雉之所出周成王所以爲瑞者貴其所自來之逺明其德化所􅀍廣非謂此爲竒楚辭曰昭后成遊南土爰厎爰於也厎至也言昭王背成王之制而出逰􅀯至楚楚人沉之南遂不返之厥利惟何逢彼白雉厥其也逢迎也言昭王南遊何利於楚乎也爲越裳氏献白雉昭王徳不能致親往迎也}
  - {type: page-break, offset: 5357, content: '', id: KR3k0012_SBCK_917-9a}
  - {type: variant, offset: 5357, length: 12, content: 漢惠五年七月黃鵠二集蕭池, WYG: 野火焚山林中有一雉入水濆羽飛故滅火往來疲乏不以為苦白雉春秋感精符曰王者旁流四表則白雉見孝經援神契曰王者徳至鳥獸故雉白首妃房不徧故曰雉應又曰周成王時越裳獻白雉去京師三萬里王者祭祀不相踰宴食衣服有節則止抱朴子曰白雉自有雉種南越尤多按地域圖今之九徳則古之越裳也盖白雉之所出周成王所以為瑞者貴其所自來之逺明其徳化所被之廣非謂此為竒楚辭曰昭后成逰南土愛底厥利惟何逢彼白雉}
