  - {type: variant, offset: 3812, length: 149, content: 有二鴻飛過桓公歎曰仲父令彼鴻鵠有時而南有時而北四方無遠所欲至而至焉唯有羽翼之故是能通其意於天下乎寡人有仲父猶飛鴻之有羽翼也魯連子曰展母所為魯君遺濟襄君鴻至黽浴鴻鴻失其裝在御者曰鴻毛物可使若一結紿置鴻耶荅曰吾非不能買鴻是上隱君下蔽罪也尸子曰虎豹未成文而有食牛之氣鴻鵠之羽翼未合而有四海之心賢者之生亦然, SBCK: ''}
