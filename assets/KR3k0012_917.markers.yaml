  - {type: variant, offset: 630, length: 327, content: 者鵠今此鳥多青者乃鸞非鳳也上善其言三公聞之咸遜位避繕繕不起車頻秦書曰符堅時關隴人安百姓豐樂民歌曰長安大街兩邊種槐下走朱輪上有鸞栖崔駰七言詩曰鸞鳥高翔時來儀應治歸得合望規啄食揀實飲華池范太鸞鳥詩序曰罽賓王結置峻祁之山獲一鸞鳥王甚愛之欲其鳴而不能致乃飾以金樊饗以珍羞對之逾戚三年不鳴夫人曰聞鳥見其類而後鳴可懸鏡以映之王從言鸞覩影感慨焉悲鳴哀響中宵一奮而絕鶴韻集曰鶴善鳴鳥春秋說題辭曰鶴知夜半鶴水鳥也夜半水位感其生氣則益喜而鳴易通卦驗曰立夏清風至而鶴鳴周易曰鳴鶴在陰其子和之左傳曰狄人伐衛懿公好鶴鶴有乘軒者將戰國人受甲者皆曰使鶴鶴實有祿位余焉能戰毛詩曰鶴鳴誨宣王也鶴鳴于九皋聲聞于天興也皋署也言身隱而名著詩義䟽曰鶴大如鵝長三尺腳青黑高三尺餘赤頰赤目喙長四寸多純, SBCK: 鴈雉}
