  - {type: variant, offset: 4701, length: 295, content: 參軍孝性甚至嘗養一鵠昌寓病二旬而鵠二旬不食昌寓亡而鵠遂飛去韓詩外傳曰晉平公遊於河而樂曰安得賢士與之樂此也舩人蓋胥跪而對曰夫珠出江海玉出崑山無足而至者猶主君好之士有足而至者猶主君好之士有足而不著者蓋主君無好士之意耳何患無士乎平公曰吾食客門左千人門右千人朝食不足夕收市賦暮食不足朝收市賦吾何謂不好士乎對曰夫鴻鵠一舉千里所恃者六翮耳背上之毛腹下之毳益一把飛不為加高損一把飛不為加下今君之食客門左門右各千人亦有六翮在其中矣將皆背上之毛腹下之毳也新序曰晉文公遊西河舟人固桑樹說苑曰趙簡子遊於河舟人古對几書二語同離騷曰緣鵠飾玉后帝是饗后帝謂殷湯也言伊尹始仕緣亨鵠鳥之美脩王鼎以事於湯湯賢之遂以為相也錄異, SBCK: ''}
