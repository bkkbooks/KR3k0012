  - {type: variant, offset: 5136, length: 0, content: '', SBCK: 至或歳數來來常以夜光若流星從東南集於祠城則􅀂雄雞如淳注曰野雞雉也吕后名雉故曰野雞漢書曰成帝鴻嘉二年有飛雉集于殿庭歴階升堂而雊東觀漢記曰魯恭字仲康爲中牟令蛉螟不入中牟河南尹􅀽安疑其不實遣仁恕􅁺肥親驗之恭隨親行阡陌坐樹下雉過止其側旁有小兒親曰兒何不捕之兒言雉將鶵親嘿然有頃與恭訣曰本來考君界有無蟲耳今蟲不犯境一異也化}
