  - {type: variant, offset: 5337, length: 6, content: 寧與黃鵠比翼, SBCK: 彭鏗斟雉帝何饗鏗彭祖也好和滋味斟白雉羮以事堯堯美而饗食之列異傳曰秦穆公時陳倉人掘地得物􅀂羊非羊􅀂猪非猪牽以獻諸公道逢二童子童子曰此名爲媪常在地食死人腦􅀂欲殺之以栢捶其首媪復曰彼二童名爲陳寳得雄者王得雌者霸陳倉人捨媪逐二童子童化爲雉飛入}
  - {type: variant, offset: 5337, length: 12, content: 寧與黃鵠比翼乎將與鷄騖爭, WYG: 彭鏗斟雉帝何饗鏗彭祖也好和滋味斟白雉羮以事堯堯羮而饗}
