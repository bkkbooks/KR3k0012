  - {type: variant, offset: 5117, length: 6, content: 盧躭仕州為治, SBCK: 白鴈百餘集于馬道南季龍命射之無所獲雉春秋運斗樞曰機星散爲雉周禮春官太宗伯曰士執雉鄭􅀇注曰取其守介不失節儀禮士相見曰士相見之贄各用雉士䞇用雉者取其耿介交有時别其倫也禮記曲禮下曰􅀕宗廟雉曰䟽趾又月令曰孟冬雉入水爲蜃又曰季冬之月雉雊雞乳左傳昭四曰郯子云丹鳥氏司閉五雉爲五工正杜預注曰丹鳥鷩雉者立秋來立冬去入水爲蜃五雉雉有五種也又曰叔孫豹奔齊齊􅁃宗婦人献以雉問其姓曰予子長矣能捧雉而從我矣毛詩邶柏舟曰雄雉刺衛宣公也􅁋亂不恤國政雄雉于飛泄泄其羽我之懷矣自貽伊阻雄雉于飛下上其音展矣君子實勞我心又曰有㳽濟盈有鷕雉鳴鷕雌雉聲又曰如翬斯飛君子攸躋又節小弁曰雉之朝雊尚求其雌又甫田車轄曰瞻彼}
