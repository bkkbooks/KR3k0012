  body:
  - {type: variant, offset: 3, length: 149, content: 三鸞春秋元命苞曰火離為鸞春秋孔演圖曰天子官守以賢舉則鸞在野春秋運斗樞曰天樞得則鸞鳥集詩含神霧曰王者德化充塞照洞八冥則鸞臻尚書中候曰昔者軒提象鸞鳥來儀又曰周公歸政於成王太平制禮鸞鳥見孝經援神契曰德至鳥獸則鸞鳥舞謝承後漢書曰方儲字聖明幼喪父事母母終日自負土成墳種奇樹千株鸞鳥栖其上白兔遊其下又曰靈帝建寧, SBCK: ''}
