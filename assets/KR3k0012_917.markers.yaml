  - {type: variant, offset: 5122, length: 1, content: 治, WYG: 雉周禮春官大宗伯曰士執雉鄭𤣥注曰取其守介不失節儀禮士相見曰士相見之禮贄用雉禮記曲禮下曰祭宗廟雉曰疏趾又月令曰孟冬雉入水為蜃又曰季冬之月雉雊雞乳左傳昭四曰郯子云丹烏氏司閉五雉為五工正杜預注曰丹烏驚雉者立秋來立冬去入水為蜃五雉今有五種也又曰叔孫豹奔齊齊庾宗婦人獻以雉問其姓曰予子長矣能奉雉而從我矣毛詩􅆁柏舟曰雄雉刺衛宣公滛亂不恤國政也雄雉于飛泄泄其羽我之懷矣自貽伊阻雄雉于飛下上其音展矣君子實勞我心又曰有瀰濟盈有鷕雉鳴又曰如翬斯飛君子攸躋又節小弁曰雉之朝雊尚求其雌又甫田車牽曰瞻彼}
