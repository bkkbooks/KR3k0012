  - {type: variant, offset: 153, length: 413, content: 年河南上言二鳳凰二鸞鳥集原縣東觀漢記曰王阜為重泉令鸞鳥止學宮闕阜使掾沙疊為張雅樂擊磬鳥舉足垂翼應聲而舞止縣庭留十餘日去北史後魏柳楷對蕭寶寅曰大王齊明帝子天下所屬且謠言曰鸞生十子九子毈一子不毈關中亂武王有亂臣十人亂者理也大王當理關中何所疑慮山海經曰軒轅之國清沃之野鸞鳥自歌海內經云廣都之野鸞自歌又曰女床之山有鳥言其狀如翟而五采以文名曰鸞鳥見則天下安寧說文曰鸞者神靈之精也赤色五采鷄形鳴中五音頌聲作則至周書王會曰成王時氐羗獻鸞鳥孫氏瑞應圖曰鸞鳥赤神之精鳳皇之佐鳴中五音肅肅雍雍喜則鳴舞人君行步有容進退有度祭祀宰人咸有敬讓禮節親踈有序則至一本曰心識鍾律律調則至鳴舞以和之漢武內傳曰西王母曰仙之次藥有靈丘倉鸞之血焦贛易林曰溫山松柏常茂不落鸞鳳以庇得其歡樂括地圖曰羽民有羽飛不遠多鸞鳥食其卵去九疑四萬二千里抱朴子曰崑崙圖曰鸞鳥似鳳而白纓聞樂則蹈節而舞至則國安樂決錄注曰辛繕字公文治春秋讖緯隱居華陰光武徵不至者有大鳥高五尺鷄首鷰頷虵頸魚尾, SBCK: 鴈}
  - {type: variant, offset: 153, length: 413, content: 年河南上言二鳳凰二鸞鳥集原縣東觀漢記曰王阜為重泉令鸞鳥止學宮闕阜使掾沙疊為張雅樂擊磬鳥舉足垂翼應聲而舞止縣庭留十餘日去北史後魏柳楷對蕭寶寅曰大王齊明帝子天下所屬且謠言曰鸞生十子九子毈一子不毈關中亂武王有亂臣十人亂者理也大王當理關中何所疑慮山海經曰軒轅之國清沃之野鸞鳥自歌海內經云廣都之野鸞自歌又曰女床之山有鳥言其狀如翟而五采以文名曰鸞鳥見則天下安寧說文曰鸞者神靈之精也赤色五采鷄形鳴中五音頌聲作則至周書王會曰成王時氐羗獻鸞鳥孫氏瑞應圖曰鸞鳥赤神之精鳳皇之佐鳴中五音肅肅雍雍喜則鳴舞人君行步有容進退有度祭祀宰人咸有敬讓禮節親踈有序則至一本曰心識鍾律律調則至鳴舞以和之漢武內傳曰西王母曰仙之次藥有靈丘倉鸞之血焦贛易林曰溫山松柏常茂不落鸞鳳以庇得其歡樂括地圖曰羽民有羽飛不遠多鸞鳥食其卵去九疑四萬二千里抱朴子曰崑崙圖曰鸞鳥似鳳而白纓聞樂則蹈節而舞至則國安樂決錄注曰辛繕字公文治春秋讖緯隱居華陰光武徵不至者有大鳥高五尺鷄首鷰頷虵頸魚尾, WYG: 鴈}
