  - {type: variant, offset: 5190, length: 0, content: '', SBCK: 雉雊張華曰此必虵化也開視之雉側有虵蛻焉又曰涼武昭王暠卒子歆嗣立春有􅀟雉飛出宫内北史曰後魏裴安祖閑居養志不出城邑曽天􅀬舎於樹下有鷙鳥逐雉雉急投之}
