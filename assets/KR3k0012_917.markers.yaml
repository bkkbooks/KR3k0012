  - {type: variant, offset: 5450, length: 0, content: '', SBCK: 夜還唯此時捨書宋書曰孝武帝常岀射雉值雨侍中沈懷文諌曰非止千乘失容亦乃聖躬櫛沐沈約宋書曰明帝與晉平王休祐於岩山射雉有一雉不肯入埸日暮將反留休祐射之語云不得雉勿歸因遣壽寂之等諸壯士追之日巳欲闇與休祐相及遂拉殺之又曰到撝與蕭道成同從宋明帝射雉郊野渴倦撝得早青􅀲與上對割食之齊書曰武帝好射雉竟陵王子良啓諌先是左衛殿中將軍邯鄲超諌射雉武帝爲止乆之永明末上將射雉子良復諌又曰蕭景先轉中領軍車駕躬射雉郊外景先常申仗從廉察左右又曰蕭敏爲新安太守好射雉未甞在郡辭􅀃者遷於畋焉後張弩損􅆎而卒又曰桓僖伯少􅀒氣豪俠妙解射雉尤爲武帝所重又日張欣㤗爲河}
  - {type: page-break, offset: 5450, content: '', id: KR3k0012_SBCK_917-10a}
  - {type: variant, offset: 5450, length: 0, content: '', WYG: 耳不復如往日濬曰天下未定萬機多務射雉非急弦絶括破皆能為害濬乃手自撤壞雉翳權由是遂絶不復射雉呉志曰孫休銳意於典籍欲畢覽百家之言大好射雉春夏之間常出夜還唯此時捨書宋書曰孝武帝常出射雉值雨侍中沈懐文諌曰非止千乗失容亦乃聖躬櫛沐沈約宋書曰明帝與晉平王休祐於岩山射雉有一雉不肯入場日暮將反留休祐射之語云不得雉勿歸因遣夀寂之等諸壮士逐之日已欲闇與休祐相及遂拉殺之又曰劉撝與蕭道成同從宋明帝射雉郊野渇倦撝得早青𤓰與上對剖食之齊書曰武帝好射雉竟陵王子良啟諫先是左衛殿中将軍郎鄲超諫射雉武帝為止久之承明末上将射雉子良復諫又曰蕭景先轉中領軍車駕射雉郊外景先帶甲杖從廉察左右又曰蕭敏為新安太守好射雉未嘗在郡辭訟者遷於畋焉後張弩損腰而卒又曰桓僖伯少負氣豪俠妙解射雉尤為武帝所重又曰張欣泰為阿}
  - {type: page-break, offset: 5450, content: '', id: KR3k0012_WYG_917-15b, image: WYG0901/WYG0901-0170b.png}
