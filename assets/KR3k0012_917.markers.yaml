  - {type: variant, offset: 5350, length: 2, content: 乎伏, WYG: 之列異傳曰秦穆公時陳倉人掘地得物若羊非羊若猪非猪牽以獻諸公道逢二童子童子曰此名為媪常在地食死人腦若欲殺之以柏捶其首媪復曰彼二童名為陳寳得雄者王得雌者覇陳倉人捨媪逐二童子童化為雉飛入平林陳倉人吿穆公穆公發徒大獵果得其雉又化為石置之汧渭之間至文公為立祠名陳寳雄雉飛南集今南陽雉縣其地也秦欲表其符故以名縣每陳倉祠時有赤光長十餘丈從雉縣來入祠中有有聲如雄雉揚雄琴清英曰雉朝飛操者衛女傅母所作也衛}
