  - {type: variant, offset: 3633, length: 1, content: 鴻, SBCK: 武帝太始三年幸東海獲赤鴈作朱鴈之歌後漢書曰度遼將軍皇甫䂓解官歸安定郷人有以貨買鴈門太守者亦去職還家書刺謁卧不迎旣入而問卿前在郡食鴈美乎北史曰齊斛律光從文襄出野見􅀟鴈}
  - {type: variant, offset: 3633, length: 1, content: 鴻, WYG: 武帝太始三年幸東海獲赤鴈作朱鴈之歌後漢書曰度遼将軍皇甫規解官歸安定鄉人有以貨買鴈門太守者亦去職還家書刺謁卧不迎既入而問卿前在郡食鴈美乎北史曰齊斛律光從文襄出野見鴈雙}
  - {type: page-break, offset: 3633, content: '', id: KR3k0012_WYG_917-3a, image: WYG0901/WYG0901-0164a.png}
  - {type: variant, offset: 3633, length: 1, content: 鴻, krp: 武帝太始三年幸東海獲赤鴈作朱鴈之歌後漢書曰度遼將軍皇甫䂓解官歸安定郷人有以貨買鴈門太守者亦去職還家書刺謁卧不迎旣入而問卿前在郡食鴈美乎北史曰齊斛律光從文襄出野見雙鴈}
  - {type: variant, offset: 3635, length: 4, content: 遵渚公歸, SBCK: 來文襄使明月馳射之以二矢俱落焉又曰尉遟逈之亂也隋將史万歳從梁士彦擊之軍次馮翊見羣鴈飛來万歳謂士彦曰請射行中第三者射之應􅁌而落三軍莫不恱服三國典略曰徐思王壽陽人家夲寒微以捕鴈爲業晉史曰朱漢賔少時善射甞因與同軰出獵指一飛鴈隨矢而落其鏃正中其臆臆上貫一金錢有􅂐文示其郡之碩學皆無識者人甚異之由是人皆号之朱落鴈莊子曰莊子行於山中見大木伐木者止其傍而不取問其故曰}
  - {type: page-break, offset: 3635, content: '', id: KR3k0012_SBCK_917-2b}
  - {type: variant, offset: 3635, length: 4, content: 遵渚公歸, WYG: 來文襄使明月馳射之以二矢俱落焉又曰尉遲迥之亂也隋将史萬歳從梁士彦擊之軍次馮翊見羣鴈飛來萬歳謂士彦曰請射行中第三者射之應弦而落三軍莫不恱服三國典畧曰徐思王夀陽人家本寒㣲以捕鴈為業晉史曰朱漢賔少時善射嘗因與同輩出獵指一飛鴈隨矢而落其鏃正中其臆臆上貫一金錢有篆文示其郡之碩學皆無識者人甚異之由是人皆號為朱落鴈莊子曰荘子行於山中見大木伐木者止其傍而不伐問其故曰}
  - {type: page-break, offset: 3635, content: '', id: KR3k0012_WYG_917-3b, image: WYG0901/WYG0901-0164b.png}
