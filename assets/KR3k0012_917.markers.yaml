  - {type: variant, offset: 3968, length: 4, content: 容鴻卵淮, SBCK: 在孔子孔子乃逝賈􅁩書曰鄒穆公令食邊鴈必以秕無敢以粟􅀃苑曰􅁗穆公得百里奚公孫友歸取鴈以賀曰吾得社稷之臣敢賀社稷之福公不辭再拜而受又曰齊晏子對景公曰君之鳬鴈食以菽粟又曰大夫以鴈爲贄鴈者有長㓜之禮士以雉雉者取其不可狎服庻人以䳱䳱以其無他心也白虎通曰贄用鴈者取隨時}
