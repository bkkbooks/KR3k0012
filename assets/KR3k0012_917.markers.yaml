  - {type: variant, offset: 5405, length: 2, content: 黃鵠, SBCK: 四月饒安縣言白雉見北史曰後魏南安王禎孝文時爲雍州刺史性忠謹其母疾篤憂毀異常遂有白雉遊其庭前帝聞其致感賜帛千疋以褒美之三國典略曰渤海王髙歡攻鄴時瑞物無歳不有令史焚連里木煑白雉而食之射雉左傳曰賈大夫賈大夫大夫也娶妻而美三年不言不􅀏衘以如臯爲妻御也之臯澤也射雉而獲之其妻始􅀏而言魏書曰太祖才力絶人於南皮一日射雉獲六十三頭江表傳曰孫權數射雉潘濬諌權權曰時時暫出耳不復如往日濬曰天}
