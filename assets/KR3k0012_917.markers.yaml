  - {type: variant, offset: 4325, length: 183, content: 懷抱也攝生舛和有少氣之病分符坐嘯作守東原洪河之湄沃野彌望囂務既屏魚鳥為鄰有離群之鴻為羅者所獲野人馴養貢之於余置諸池庭朝夕賞翫既用銷憂兼以輕疾大易稱鴻漸於陸羽儀盛也楊子曰鴻飛冥冥騫翥高也淮南子云東歸碣石違溽暑也平子賦曰南寓衡陽避祁寒也若其雅步清音遠心高韻鵷鸞已降罕見其儔而鍜翮牆陰偶影獨立唼喋粃粺雞鶩為伍不亦傷乎余五十之年忽焉已至永言身事慨然其多緒乃為之賦聊以自慰鵠史, SBCK: 梁州}
