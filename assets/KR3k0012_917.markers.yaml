  - {type: variant, offset: 5344, length: 5, content: 將與鷄騖爭, SBCK: 林陳倉人告穆公穆公發徒大獵果得其雉又化爲石置之汧渭之間至文公爲立祠名陳寳今南陽雉縣其地也􅁗欲表其符故以名縣毎陳寳祠時有赤光長十餘丈從雉縣來入陳祠中有聲如雄雉楊雄琴清英曰雉朝飛操者衛女傅母所作也衛侯女嫁於齊太子中道太子死問傅母曰何如傳母曰且往當喪喪畢不肯歸終之以死傅母悔之取女所自操琴於􅃁上鼓之忽有二雉俱出墓中傳母撫雌雉曰女果爲雉耶言未卒俱飛而起忽然不見傳母悲痛援琴作操故曰雉朝飛琴操曰齊獨沐子年七十無妻出見飛雉雌雄相隨感之撫琴而歌曰雉朝飛鳴相和雌雄羣遊於山阿蕭廣濟孝子傳曰蕭芝忠孝除尚書郎有雉數十頭飲啄􅀫止當上直送至歧路下直及門飛鳴車側璅語曰有鳥從飛西方來白質五色皆備集平公之庭相見如讓公召叔嚮問之叔嚮曰吾聞師曠曰西方有白質鳥五色皆備其名曰翬南方赤質五色備其名曰揺其來爲吾君臣其祥先至矣􅀶物志曰翟雉長􅀨雪惜其毛栖髙樹之上不敢下}
