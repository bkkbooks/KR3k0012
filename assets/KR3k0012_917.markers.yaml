  - {type: variant, offset: 5188, length: 1, content: 列, SBCK: 白安魏志曰管輅至王􅀪直許有雄雉飛來登直内柱頭大不安令輅作卦輅曰五月必遷時三月也至期果爲渤海太守晉咸寜起居注曰太醫司馬程據上雉頭裘一領詔於殿前燒之晉書曰武庫封閉甚宻其中忽}
