  - {type: variant, offset: 5116, length: 0, content: '', SBCK: 衛文公時大旱三年卜云必湏人祀文公曰求􅀨者爲民也今殺之不仁吾自當之言未卒􅀨下今君重鴈殺人何異虎狼梁君引龍登車入郭呼萬歳曰善哉今曰獵得善言晉書曰載記建元􅀄石季龍饗群臣于太武殿前}
