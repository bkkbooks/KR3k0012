  - {type: variant, offset: 1032, length: 169, content: 的山南有白鶴為仙人取箭弘嘗採薪得一遺箭頃有人覔弘還之問何所欲弘識其神人也曰常患若耶溪載薪為難願旦南風暮北風移後果然故若耶溪風至今呼為鄭公風也晉書曰嵇紹始入洛或謂王戎曰昨於稠人中始見嵇紹昂昂然若野鶴之在鷄群戎曰君復未見其父耳又曰吳隱之年十餘歲丁父憂每號泣行人為之流涕事母孝謹及其執喪哀毀過禮家貧無人鳴鼓每至哭臨之時常有雙鶴唳及祥練之夕復有群, SBCK: 雉}
