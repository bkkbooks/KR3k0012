  - {type: variant, offset: 5115, length: 0, content: '', SBCK: 平固縣有覆笥山上有湖周廻十里有一石鴈浮岀湖中毎至秋天石鴈飛鳴如􅀱時也十三州記曰上虞縣有鴈爲民田春衘抜草根秋喙除其穢是以縣官禁民不得妄害此鳥犯則有刑無赦荆州圖記曰沮陽縣西北有鴈浮山是山經所謂景山也髙三十餘里周迴三百里脩巖遐亘擢幹干霄鴈南翔北歸偏經其上士人由兹改山名焉五色鴈漢書郊祀志宣帝於西河築丗宗廟告祀有五色鴈集殿前唐書曰貞元十年同州獻五色鴈白鴈左傳曰哀上曹伯陽即位好田弋曹鄙人公孫疆好弋獲白鴈獻之且言田弋之􅀃因訪政事大􅀃之有寵使爲司城以聽政新語曰梁君出獵見白鴈而欲自射之道上有驚鴈飛者梁王怒命以射此人其御公孫龍諌曰}
