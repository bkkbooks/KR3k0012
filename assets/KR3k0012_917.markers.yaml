  - {type: variant, offset: 3619, length: 0, content: '', krp: 雍雍鳴鴈旭日始旦尚書舜典曰修五禮五玉三帛二牲一死贄孔傳曰大夫執鴈爾雅曰鳬鴈醜其足蹼郭璞曰脚指間有幕蹼属相著春秋說題辭曰鴈之言鴈鴈起聖以招期知晚蚤故鴈南北以陽動也鴈鴈音聲皃也聖王聞鴈鴈有音聲知爲府節鴈鳥隨日南以常動春秋繁露曰凡贄大夫用鴈有類長者在民上必有先後鴈有行列故以爲贄廣雅曰􅕯鵝㑹􅕯鴈也周書曰白露之日}
