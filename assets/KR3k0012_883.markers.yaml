  - {type: variant, offset: 846, length: 0, content: '', WYG: 昆吾之觀被髮北面而譟曰登此昆吾之虛綿綿生之𤓰余為渾良夫呌天無辜論語曰樊遲問知子曰敬鬼神而逺之可謂知矣爾雅曰鬼之為言歸也史記始皇本紀曰使者從闗東夜過華陰平舒道有人持璧遮使者曰為吾遺滈池君因言曰今年祖龍死使者問其故因忽不見置其璧去使者奉璧具以聞始皇黙然良久曰山鬼固不過知一嵗事也漢書郊祀志曰既滅兩粤粤人勇之乃言粤人俗鬼而其祠皆見鬼數有效昔東甌王敬鬼壽百六十嵗後世怠慢故衰耗廼命粤巫立粤祠安臺無壇亦祠天神帝百鬼漢書曰田蚡疾一身盡痛若有擊者呼服謝罪上使視鬼者瞻之曰魏其侯與灌夫共守笞欲殺之竟死後漢書曰第五倫為會稽太守俗好淫祀人常以牛祭神百姓財産以之困匱其自食牛肉而不以薦祠者發病且死先為牛鳴倫到官移書屬縣曉告百姓其巫祝有依託鬼神詐怖愚民皆按論之後遂斷絶又曰宋均為辰陽長其俗少學者而信巫鬼均為立學校禁絶淫祀人皆安之又曰劉根有神術太守史祈以為妖乃執而數之曰若有神可顯一驗根曰頗能使鬼乃左顧而嘯祈之亡父近親數十皆反縳在祈前向根叩頭曰小兒無狀分當萬死叱祈曰汝子孫不能光榮先祖而辱如此何不叩頭謝之祈哀驚悲泣頓首請罪根黙然忽去不知所之王隐晉書曰鎮南劉𢎞以故刺史王毅子衡陽太守矩為廣州矩至長沙見一人長大著布单衣自持奏在岸上矩省奏云京兆杜靈之仍入船共語稱叙稀濶矩問君京兆人何時發來答曰朝發矩恠問京兆去此數千里那得朝發今到杜答京兆去此乃數萬何止數千乎晉書曰鄒湛字潤甫嘗見一人自稱甄仲舒餘無所言如此非一久之乃悟曰宅西有積土敗瓦其中有死人甄仲舒者予舍西土瓦中人也檢之果然厚加歛葬葬畢遂夢此人來謝又曰蘇韶字孝先安平人仕至中牟令卒韶伯父第九子節在市上晝日韶自外入乗馬黃䟽单衣白襪絲履憑節車轅節謂兄弟曰中牟在此兄弟皆愕視無所見問韶君何由來韶曰吾欲改葬即求去數日又來兄弟遂與韶坐節曰若必改葬别自勅兒韶曰吾將為書節授筆韶不肯曰死者書與生者異為節作其字像畨書也乃笑喚節為書曰昔魏武侯浮於西河而下中流顧謂呉起曰美哉河}
