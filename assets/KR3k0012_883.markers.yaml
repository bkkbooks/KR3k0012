  - {type: variant, offset: 144, length: 195, content: 牛死安人尋卒世以神為祟梁書曰王神念為青州刺史性剛正所更州郡必禁止淫祠時東北有石鹿山臨海先有神廟神念至便令毀撤神影壞屋舍坐棟上有一大虵長丈餘入海水時陰子春為東莞太守夢人通名詣子春云有人見苦被壞宅舍既無所託欽君厚德欲憩此境子春心密記之經二日而知之甚驚以為前所夢神因辦牲醑請召安致一處數日復夢一朱衣人相聞辭謝云得君厚惠當以一州相報子春心喜供事彌勤經月餘魏欲襲朐山間諜前知子春設伏摧破之授南青州刺史, SBCK: 福謙}
