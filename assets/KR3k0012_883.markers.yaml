  - {type: variant, offset: 846, length: 0, content: '', krp: 昆吾之觀𬒳髪北靣而譟曰登此昆吾之虚綿綿生之瓜余爲渾良夫呌天無辜大當免三死并數一時之事爲盟三罪殺之故自謂無辜也論語曰樊遲問知子曰敬鬼神而逺之可謂知矣敬鬼神而不賣尓雅曰鬼之爲言歸也史記始皇夲紀曰使者從關東夜過華隂平野道有人持壁遮使者曰爲吾遺滈池君因言曰今年祖龍死使者問其故忽不見遂迺置其壁去使者奉璧具以聞始皇黙然良乆曰山鬼固不過知一歳事也漢書郊祀志曰旣滅兩粤人勇之乃言粤人俗鬼言其土俗尚鬼神之事而其祠皆見鬼數有効昔東甌王敬鬼壽百六十歳後丗怠慢故衰耗迺命粤巫立粤祠安臺無壇亦祠天神帝百鬼漢書曰田蚡疾一身盡痛若有擊者呼服謝罪上使視鬼者瞻之曰魏其侯與灌夫共守笞欲殺之竟死後漢書曰第五倫爲㑹稽太守俗好淫祀人常以牛祭神百姓財産以之困匱其自食牛肉而不以薦祠者發病且死先爲牛鳴倫到官移書屬縣暁告百姓其巫祝有依託鬼神詐怖愚民皆按論之後遂断絶又曰宋均爲辰陽長其俗少學者而信巫鬼均爲立學校禁絶淫祀人皆安之又曰劉根有神術太守史祈以爲妖乃執而數之曰若有神可願一驗根曰頗能使鬼乃左頋右嘯祈之亡父近親數十皆反縛在祈前向根叩頭曰小兒無狀分當万死叱祈曰汝子孫不能光榮先祖而辱如此何不叩頭謝之祈哀驚悲泣頓首請罪根黙然忽去不知所之王隱晉書曰鎮南劉弘以故刺史王毅子衡陽太守矩爲廣州矩至長沙見一人長大著布單衣自持奏左岸上矩省奏云京兆杜靈之仍入舡共語稱叙稀闊矩問君京兆人何時發來荅曰朝發矩恠問京兆去此數千那得朝發今到杜荅曰僕曰天上在京兆去此乃數萬何止數千乎晉書曰鄒湛字潤甫嘗見一人自稱甄仲舒餘無所言如此非一乆之乃悟曰宅西有積土敗瓦其中有死人甄仲舒者予舎西土瓦中人也撿之果然厚加歛葬葬畢遂夢此人來謝又曰蘇韶字孝先安平人也仕至中牟令卒韶伯父第九子節在車上晝日韶自外入乗馬日黒又介黄䟽單衣白襪絲履慿節車轅節謂兄弟曰中牟在此兄弟皆愕視無所見問韶君何由來韶曰吾欲改葬即求去數日又來兄弟遂與韶坐節曰若必改葬別自勑兒韶曰吾將爲書節授筆韶不肯曰死者書與生者異爲節作其字像胡書也乃笑喚節爲書曰昔魏武侯浮於西河而下中流頋謂吴起曰羙哉河}
  - {type: variant, offset: 848, length: 0, content: '', SBCK: 固此魏國之寳也吾性愛好京洛毎徃來出入瞻視邙山樂哉萬丗之基也北背孟津洋洋之河南望天邑濟濟之盛此志雖未言銘之於心矣不圖􅍕忽所懷未果前去十月便速改葬買數􅅿地便足矣節延韶入室設坐祀之不肯坐又無所饗謂韶曰中牟平生好酒可少飲韶手執盃飲盡曰佳酒也節視杯空旣去杯酒乃如故前後三十餘來兄弟狎翫節問所疑韶言天上及地下事亦不能悉知也顔淵卜啇今見在爲脩文郎凡有八人􅀑之聖者梁成賢者吴季子節問死何如生韶曰無異耳死者虚生者實此其異也節曰死者何不歸屍骸韶曰譬如斷卿一臂以投地就剥削之於卿有患乎死之去屍骸如此也節曰厚葬羙墳死者樂乎韶曰無在也節曰􅀂無在何改葬韶曰今我誠無所在但欲述生時意耳韶欲去節留之閇門下鏁鑰韶爲之少住韶去節見門故閇韶巳去矣韶與節別曰吾今見爲脩文郎守職不下得來也節執手乃別自是遂絶續晉陽春秋曰襄陽羅友在桓温府屢以貧乞禄温以其誕肆許而不用同府人有得郡者温爲坐別友亦􅀍命至􅀹晚温問之曰出門於中路遇一􅀑大見耶榆曰見汝送人作郡不見人送汝作郡友始怖終慙不􅁴淹緩温􅀏而用之􅀳書曰周訪􅀫宫亭湖廟晨起如厠見一老父訪執之化爲雄鴨晉陽春秋曰符堅未敗長安市􅀑夜􅂘一月止前趙録曰麟嘉三年螽斯則百堂灾自此􅀑􅂘二宫夜夜不絶崔鴻十六國春秋後趙録曰魏豹字叔虎范陽人也遷中山太守所在有治名豹嬖妾先死豹後守于廪丘南妾形見與豹言翌日而卒後魏書曰先是河邊人夢}
  - {type: page-break, offset: 848, content: '', id: KR3k0012_SBCK_883-4b}
  - {type: page-break, offset: 848, content: '', id: KR3k0012_SBCK_883-5a}
  - {type: variant, offset: 848, length: 0, content: '', WYG: 固此魏國之寳也吾性愛好京洛每往來出入瞻視邙山樂哉萬世之基也北背孟津洋洋之河南望天邑濟濟之盛此志雖未言銘之於心矣不圖奄忽所懐未果前去十月便速改葬買數畆地便足矣節延韶入室設坐祀之不肯坐又無所饗謂韶曰中牟平生好酒可少飲韶手執盃飲盡曰佳酒也節視盃空既去盃酒乃如故前後三十餘來兄弟狎翫節問所疑韶言天上及地下事亦不能悉知也顔淵卜商今見在為脩文郎凡有八人鬼之聖者梁成賢者呉季子節問死何如生韶曰無異耳死者虛生者實此其異也節曰死者何不歸屍骸韶曰譬如㫁卿一臂以投地就剥削之於卿有患乎死之去屍骸如此也節曰厚葬美墳死者樂乎韶曰無在也節曰若無在何改葬韶曰今我誠無所在但欲述生時意耳韶欲去留之閉門下鎻鑰韶為之少住韶去節見門閉韶已去矣韶與節别曰吾今見為脩文郎官職不暇得來也節執手乃别自是遂絶續晉陽春秋曰㐮陽羅友在桓温府屢以貧乞禄温以其誕肆許而不用同府人有得郡者温為饑别友亦被命至獨晚温問之曰出門於中路遇見一鬼謂余曰見汝送人作郡不見人送汝作郡友始怖終慙不覺淹緩温笑而用之晉書曰周訪宿宫亭湖廟晨起如厠見一老父訪執之化為雄鴨晉陽春秋曰苻堅未敗長安市鬼夜哭一月止前趙録曰麟嘉三年螽斯則百堂灾自此鬼哭二宫夜夜不絶崔鴻十六國春秋後趙録曰魏豹字叔虎范陽人也遷中山太守所在有治名豹嬖妾先死豹後于廪丘南妾形見與豹言翌日而卒後魏書曰先是河邊人夢}
