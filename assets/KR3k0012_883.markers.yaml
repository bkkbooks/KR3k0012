  - {type: variant, offset: 3265, length: 214, content: 姓妻女羸弱疾病之家懷憂憤憤易為恐懼至使奔走便時去離正宅增重禍祟至於死亡而不知巫所敗誤反恨事神之晚陳思王洛神賦曰覩一麗人于巖之畔乃援御者而告之曰爾有覩於彼者乎彼何人斯若此之艷也御者對曰臣聞河洛之神名曰宓妃則君王所見無乃是乎其狀若何臣願聞之曰其形也翩若驚鴻宛若遊龍榮耀秋菊華茂春松髣髴兮若輕雲之蔽月飄揚兮若流風之迴雪遠而望之皎若太陽升朝霞迫而察之灼若芙蓉出綠波余情悅其淑美心振蕩而不怡無良媒以接欣託微波而通辭願誠素之先達解玉珮以要之, SBCK: 八十三}
