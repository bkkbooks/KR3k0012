  - {type: variant, offset: 845, length: 0, content: '', WYG: 之神不歆非類民不祀非族君祀無乃殄乎且民何罪失刑乏祀君其圖之君曰諾吾將復請七日新城西偏將有巫者而見我焉許之遂不見及期而往告之曰帝許我罰有罪矣弊於韓又文公曰有事於太廟躋僖公逆祀也於是夏父弗忌為宗伯曰吾見新鬼大故鬼小先大後小順也君子以為失禮又宣公曰楚司馬子良生子越椒子文曰是必滅若敖氏矣及將死泣曰鬼猶求食若敖氏之鬼不其餒而又宣公曰初魏武子有嬖妾無子武子疾命顆曰必嫁是疾病則曰必以為殉及卒顆嫁之及輔氏之役顆見老人結草以亢杜回杜回躓而顛故獲之夜夢之曰余而所嫁婦人之父也爾用先人之治命余是以報又成公曰晉侯夢大厲被髮及地摶膺而踊曰殺余孫不義余得請於帝矣壊大門及寢門而入公懼入于室又壊户公覺召桑田巫巫言如夢又昭公曰鄭子産聘于晉晉侯有疾韓宣子逆客私焉曰寡君寢疾於今三月矣並走羣望有加而無瘳今夢黄熊入於寢門其何厲鬼也對曰昔堯殛鯀于羽山其神化為黃熊以入于羽淵實為夏郊三代祀之晉為盟主其或者未之祀也乎宣子祀夏郊晉侯有間又昭公曰鄭人相驚以伯有曰伯有至矣則皆走不知所往鑄刑書之嵗二月或夢伯有介而行曰壬子余將殺帶也明年壬寅余又將殺段也及壬子駟帶卒國人益懼齊燕平之月壬寅公孫段卒國人愈懼其明月子産立公孫泄及良止以撫之乃止子太叔問其故子産曰鬼有所歸乃不為厲吾為之歸也又哀上曰初曹人或夢衆君子立于社宫而謀亡曹曹叔振鐸請待公孫疆許之旦而求之曹無之戒其子曰我死爾聞公孫疆為政必去之又哀下曰衞侯夢于北宫見人}
