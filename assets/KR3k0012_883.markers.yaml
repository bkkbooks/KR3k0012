  - {type: variant, offset: 845, length: 0, content: '', krp: 之神不歆非類民不祀非族君祀無乃殄乎且民何罪失刑乏祀君其圖之君曰諾吾將復請七日新城西偏將有巫者而見我焉許之遂不見及期而往告之曰帝許我罰有罪矣斃於韓又文上曰有事於太廟躋僖公逆祀也於是夏父弗忌爲宗伯曰吾見新鬼大故鬼小先大後小順也君子以爲失禮又宣公曰楚司馬子良生子越椒子文曰是必㓕若敖氏矣及將死泣曰鬼猶求食若敖氏之鬼不其餒而又宣公曰𥘉魏武子有嬖妾無子武子疾命顆曰必嫁是疾病則曰必以爲殉及卒顆嫁之及輔氏之役顆見老人結草以亢杜囬杜囬躓而顛故獲之夜夢之曰余而所嫁婦人之父也爾用先人之治命余是以報又成公曰晉侯夢大厲𬒳髪及地搏膺而踊曰殺余孫不義厲鬼也趙氏之先祖也八年晉侯殺趙同趙括故怒余得請於帝矣壞大門及寢門而入公懼入于室又壞户公覺召桑田巫巫言如夢巫云鬼怒如公所夢又昭二曰鄭子産聘于晉晉侯有疾韓宣子逆客私焉曰寡君寢疾於今三月矣並走群望有加而無瘳今夢黄熊入於寢門何厲鬼也對曰昔堯殛鯀于羽山其神化爲黄熊以入于羽淵實爲夏郊三代祀之晉爲盟主其或者未之祀也乎宣子祀夏郊晉侯有間又昭二曰鄭人相驚以伯有至矣曰伯有至矣則皆走不知所徃鄭人殺伯有言其鬼至鑄刑書之歳二月或夢伯有介而行曰壬子余將殺帶也明年壬寅余又將殺叚也及壬子駟帶卒國人益懼齊及燕平之月壬寅公孫叚卒國人愈懼其明月子産立公孫泄及良止以撫之乃止子太叔問其故子産曰鬼有所歸乃不爲厲吾爲之歸也又哀上曰𥘉曹人或夢衆君子立于社宫而謀亡曹曹叔鐸請待公孫疆許之旦而求之曹無之戒其子曰我死爾振聞公孫疆爲政必去之又哀下曰衛侯夢于北宫見人}
  - {type: variant, offset: 846, length: 0, content: '', SBCK: 昆吾之觀􅀍髪北靣而譟曰登此昆吾之虚綿綿生之􅀲余爲渾良夫呌天無辜大當免三死并數一時之事爲盟三罪殺之故自謂無辜也論語曰樊遲問知子曰敬􅀑神而逺之可謂知矣敬􅀑神而不賣尓雅曰􅀑之爲言歸也史記始皇夲紀曰使者從􅀜東夜過華隂平野道有人持壁遮使者曰爲吾遺滈池君因言曰今年祖龍死使者問其故忽不見遂迺置其壁去使者奉璧具以聞始皇黙然良乆曰山􅀑固不過知一歳事也漢書郊祀志曰旣滅兩粤人勇之乃言粤人俗􅀑言其土俗尚􅀑神之事而其祠皆見􅀑數有効昔東甌王敬􅀑壽百六十歳後丗怠慢故衰耗迺命粤巫立粤祠安臺無壇亦祠天神帝百􅀑漢書曰田蚡疾一身盡痛􅀂有擊者呼服謝罪上使視􅀑者瞻之曰魏其侯與灌夫共守笞欲殺之竟死後漢書曰第五倫爲㑹稽太守俗好􅁋祀人常以牛􅀕神百姓財産以之困匱其自食牛􅁏而不以薦祠者發病且死先爲牛鳴倫到官移書屬縣暁告百姓其巫祝有依託􅀑神詐怖愚民皆按論之後遂断絶又曰宋均爲辰陽長其俗少學者而信巫鬼均爲立學校禁絶􅁋祀人皆安之又曰劉根有神術太守史祈以爲妖乃執而數之曰􅀂有神可願一驗根曰頗能使􅀑乃左頋右嘯祈之亡父近親數十皆反􅅞在祈前向根叩頭曰小兒無狀分當万死叱祈曰汝子孫不能光榮先祖而辱如此何不叩頭謝之祈哀驚悲泣頓首請罪根黙然忽去不知所之王隱晉書曰鎮南劉弘以故刺史王毅子衡陽太守矩爲廣州矩至長沙見一人長大著布單衣自持奏左岸上矩省奏云京兆杜靈之仍入舡共語稱叙稀闊矩問君京兆人何時發來荅曰朝發矩恠問京兆去此數千那得朝發今到杜荅曰僕曰天上在京兆去此乃數萬何止數千乎晉書曰鄒湛字􅃳甫嘗見一人自稱甄仲舒餘無所言如此非一乆之乃悟曰宅西有積􅁟敗瓦其中有死人甄仲舒者予舎西土瓦中人也撿之果然厚加歛葬葬畢遂夢此人來謝又曰􅂫韶字孝先安平人也仕至中牟令卒韶伯父第九子節在車上晝日韶自外入乗馬日黒又介黄䟽單衣白襪絲履慿節車轅節謂兄弟曰中牟在此兄弟皆􅕎視無所見問韶君何由來韶曰吾欲改葬即求去數日又來兄弟遂與韶坐節曰􅀂必改葬別自勑兒韶曰吾將爲書節授筆韶不肯曰死者書與生者異爲節作其字像胡書也乃􅀏喚節爲書曰昔魏武侯浮於西河而下中流頋謂吴起曰羙哉河}
