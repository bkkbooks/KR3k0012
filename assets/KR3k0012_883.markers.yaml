  - {type: variant, offset: 850, length: 2, content: 俞兒, SBCK: 行人自言知水淺深以草往往表挿而導焉忽失所在兆遂䇿馬渉渡宋書曰劉伯龍少而貧薄及長歷位尚書左丞武陵太守貧窶尤甚嘗在家􅁣然召左右將營十一之方忽見一􅀑在傍撫掌大􅀏伯龍歎曰貧窮固有命乃復爲􅀑所􅀏也遂止梁書曰范雲嘗與梁武同􅀫頋暠之舎妻方産􅀑在外曰此中有王有相雲起曰王當仰属相以見歸因是盡心推事老子曰以道蒞天下}
