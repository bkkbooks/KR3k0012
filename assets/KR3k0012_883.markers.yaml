  - {type: variant, offset: 1663, length: 0, content: '', SBCK: 汝南周翁仲􅀄爲太尉椽婦産男及爲北海相吏周先能見􅀑書署爲主簿使還致敬於本郡縣因告之曰事訖臘日可與小男俱侍祠主簿事還翁仲問之對曰但見屠人弊衣蠡髻而踞神座持刀割􅁏有衣冠青墨綬數人彷徨堂東西不進不知何故翁仲問妻曰何以養此子嫗大怒曰君常言兒體質聲氣喜學似我公欲死爲作狂語翁仲具告之祠􅀕如此不具服子母立截嫗泣涕言昔以年長無男不自安實以女易屠者之男禆錢一萬此子年巳十八遣歸其家迎其女女嫁爲賣餅者妻後適隴西李文思文思官至南陽太守抱朴子曰按九鼎記及青靈經言人物之死俱有鬼也馬􅀑常以晦夜出行􅃺如炎火􅀇中記曰姑獲鳥夜飛晝藏盖鬼神􅀋衣毛爲飛鳥脫毛爲女人名爲帝少女一名夜遊一名鈎星一名隱飛鳥無子喜取人子養爲子人養小兒不可露其衣此鳥度即取兒也荆州爲多昔豫章男子見田中有六七女人不知是鳥匍匐徃先得其毛藏之徃就諸鳥諸鳥各走就毛衣衣之飛去一鳥獨不得去男子以爲婦生三女其女母後令問父知衣在積稻下得衣飛去後以衣迎三女三女得衣亦飛去神異經曰東北方有鬼星石室三百户而}
  - {type: page-break, offset: 1663, content: '', id: KR3k0012_SBCK_883-7a}
  - {type: variant, offset: 1663, length: 2, content: 共工, WYG: 汝南周翁仲初為太尉掾婦産男及為北海相吏周先能見鬼署為主簿使還致敬於本郡縣因告}
  - {type: variant, offset: 1663, length: 0, content: '', krp: 汝南周翁仲𥘉爲太尉椽婦産男及爲北海相吏周先能見鬼書署爲主簿使還致敬於本郡縣因告之曰事訖臘日可與小男俱侍祠主簿事還翁仲問之對曰但見屠人弊衣蠡髻而踞神座持刀割肉有衣冠青墨綬數人彷徨堂東西不進不知何故翁仲問妻曰何以養此子嫗大怒曰君常言兒體質聲氣喜學似我公欲死爲作狂語翁仲具告之祠祭如此不具服子母立截嫗泣涕言昔以年長無男不自安實以女易屠者之男禆錢一萬此子年巳十八遣歸其家迎其女女嫁爲賣餅者妻後適隴西李文思文思官至南陽太守抱朴子曰按九鼎記及青靈經言人物之死俱有鬼也馬鬼常以晦夜出行狀如炎火玄中記曰姑獲鳥夜飛晝藏盖鬼神類衣毛爲飛鳥脫毛爲女人名爲帝少女一名夜遊一名鈎星一名隱飛鳥無子喜取人子養爲子人養小兒不可露其衣此鳥度即取兒也荆州爲多昔豫章男子見田中有六七女人不知是鳥匍匐徃先得其毛藏之徃就諸鳥諸鳥各走就毛衣衣之飛去一鳥獨不得去男子以爲婦生三女其女母後令問父知衣在積稻下得衣飛去後以衣迎三女三女得衣亦飛去神異經曰東北方有鬼星石室三百户而}
  - {type: variant, offset: 1664, length: 10, content: 工之子好遠遊死為祖神, SBCK: 一門石牓題曰􅀑門晝日不開至暮即有人語有火青色}
