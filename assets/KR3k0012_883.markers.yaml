  - {type: variant, offset: 2555, length: 370, content: 白布單衣高冠冠似魚頭度索君曰昔慮山共食白李未久已三千年日月易得使人悵然去後度索君曰此南海君也搜神記曰蔣子文者廣陵人也嗜酒好色常自謂己骨青死當為神漢末為秣陵尉逐賊至於鍾山之下賊擊傷額因解綬以縛之有頃遂死及吳先主之初其吏見子文於道乘白馬執白羽侍從如平生文曰我當為此土神也為吾立祠不爾使蟲入耳為災吳主為妖言後果有蟲入人耳皆死醫不能治又云不祠我將有大火是歲數有火災吳主患之封為中都侯加印綬立廟改鍾山為蔣山以表其靈幽明錄曰晉孝武帝於殿北䆫下清暑忽見一人著白夾黃練單衣舉身沾濕自稱華林池中水之神名曰淋涔君也若善見待當相福祐時帝飲已醉取常所佩刀擲之刀空過無礙神忿曰不以佳事垂接當令知所以居少時而暴崩皆呼此靈為禍也列異傳曰費長房能使神後東海君見葛陂君淫其夫人於是房勑繫三年而東海大旱長房至東海見其請雨乃勑葛陂君出之即大雨異苑曰陶侃如廁見數十人悉持大杖有一人, WYG: 皂}
