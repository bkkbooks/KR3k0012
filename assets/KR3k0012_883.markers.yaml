  - {type: variant, offset: 5, length: 138, content: 下北齊書曰神武以高昂為西道大都督徑趣商洛昂渡河祭河伯曰河伯水中之神高敖曹地上之虎齊書曰義鄉縣長風廟神姓鄧先經為縣令死遂發靈周山圖啟乞加神位輔國將軍上曰足狗肉便了事何用階級齊書曰李安人為吳興太守郡有項羽神護郡廳事太守到郡必須祀以軛下牛安人奉佛法不與神牛著履上廳事又於上設八關齋俄, SBCK: 害􅄹}
