  - {type: variant, offset: 1166, length: 493, content: 雨風是謁能請風雨是燭九陰是謂燭龍詩含神務曰天不是西北無陰陽消息故有龍銜火精照天門中又曰蚩尤作兵犯黃帝乃令應龍攻於冀州之野蚩尤請風伯所從大風雨黃帝乃下天女魃止雨遂殺蚩尤魃不得復上故所居不雨黃庭內景經曰至道不煩決存真泥九百節皆有神髮神蒼華字太元腦神精根字泥丸眼神明上字英玄鼻神玉壟字靈堅耳神空閑字幽田舌神通命字正倫齒神崿鋒字羅千一面之神宗泥丸又曰心神丹元字守靈肺神皓華字虛成肝神龍煙字含明腎神玄冥字育嬰脾神嘗在字魂停膽神龍曜字威明皆在心內運天經晝夜存之自長生太公金匱曰武王都洛邑未成陰寒雨雪十餘日深丈餘甲子旦有五丈夫乘車馬從兩騎止王門外欲謁武王武王將不出見太公曰不可雪深丈餘而車騎無跡恐是聖人太公乃持一器粥出開門而進五車兩騎曰王在內未有出意時天寒故進熱粥以御寒未知長幼從何起兩騎曰先進南海君次東海君次西海君次北海君次河伯雨師粥既畢使者具告太公太公謂武王曰前可見矣五車兩騎四海之神與河伯雨師耳南海之神曰祝融東海之神曰勾芒北海之神曰玄冥西海之神曰蓐收請使謁者各以其名召之武王乃於殿上謁者於殿下門內引祝融進五神皆驚相視而歎祝融拜武王曰天陰乃遠來何以教之皆曰天伐殷立周謹來受命願勑風伯雨師各使奉其職, SBCK: 哭}
