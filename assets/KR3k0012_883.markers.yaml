  - {type: variant, offset: 1958, length: 593, content: 海中作石橋海神為之豎柱始皇感其惠求與相見海神荅云我形醜約莫圖我乃從石塘三十里相見左右巧人以腳畫其狀神怒曰帝負我約速去始皇轉馬還馬腳獨立後腳隨崩僅得登岸腳畫者溺於海死王韶之始興記曰㴩水內有一處曰龍口甚神明經過莫敢裾視舡載什物置之不守可經月人及鳥獸無犯者淮地記曰按古嶽瀆經云禹治水止桐柏山乃獲淮渦水神名曰無支祁善應對言語辨淮之淺深源之遠近形若獼猴縮鼻高額青軀白首金目雪牙頸伸百尺力逾九象禹授之庚申遂頸鎖大鐵鼻穿金鈴從淮之陰鎖龜山之足淮水乃安流注于海華陽國志曰周滅後秦孝文王以李冰為蜀守冰能知天文地理謂汶山為天彭門髣若見神遂冰上立祠三所壅江作塴穿郫江以行舟舡又溉灌三郡於是蜀沃野千里號為陸海天下謂之天府也冰又作石犀五頭以厭水精時青衣有深水出蒙山下伏行地中會江至南安觸山崖水脈漂蕩破害舟舡冰乃發卒鑿平崖時水神怒冰乃操刀入水與神鬥迄今蒙福漢武故事曰上祀太畤祭常有光明照長安城如月光上以問東方朔此何神也朔曰此司命之神揔鬼神者也上曰祠之能令益壽乎對曰皇者壽命懸於天司命無能為也郡國志曰陵州仁壽縣有陵井出鹽井有玉女祠初玉女無夫後每年取一少年人擲置井中若不送水即竭又蜀郡西山有大蟒虵吸人上有祠號曰西山神每歲土人莊嚴一女置祠旁以為神妻虵輒吸將不爾即亂傷人周氏平蜀許國公宇文貴為益州總管乃致書為神媒合婚姻擇日設樂送玉女像以配西山自邇之後無復此害魏文帝列異傳曰袁本初時有神出河東號度索君人共立廟兗州蘇士母莊往禱, SBCK: 厠}
  - {type: variant, offset: 1958, length: 593, content: 海中作石橋海神為之豎柱始皇感其惠求與相見海神荅云我形醜約莫圖我乃從石塘三十里相見左右巧人以腳畫其狀神怒曰帝負我約速去始皇轉馬還馬腳獨立後腳隨崩僅得登岸腳畫者溺於海死王韶之始興記曰㴩水內有一處曰龍口甚神明經過莫敢裾視舡載什物置之不守可經月人及鳥獸無犯者淮地記曰按古嶽瀆經云禹治水止桐柏山乃獲淮渦水神名曰無支祁善應對言語辨淮之淺深源之遠近形若獼猴縮鼻高額青軀白首金目雪牙頸伸百尺力逾九象禹授之庚申遂頸鎖大鐵鼻穿金鈴從淮之陰鎖龜山之足淮水乃安流注于海華陽國志曰周滅後秦孝文王以李冰為蜀守冰能知天文地理謂汶山為天彭門髣若見神遂冰上立祠三所壅江作塴穿郫江以行舟舡又溉灌三郡於是蜀沃野千里號為陸海天下謂之天府也冰又作石犀五頭以厭水精時青衣有深水出蒙山下伏行地中會江至南安觸山崖水脈漂蕩破害舟舡冰乃發卒鑿平崖時水神怒冰乃操刀入水與神鬥迄今蒙福漢武故事曰上祀太畤祭常有光明照長安城如月光上以問東方朔此何神也朔曰此司命之神揔鬼神者也上曰祠之能令益壽乎對曰皇者壽命懸於天司命無能為也郡國志曰陵州仁壽縣有陵井出鹽井有玉女祠初玉女無夫後每年取一少年人擲置井中若不送水即竭又蜀郡西山有大蟒虵吸人上有祠號曰西山神每歲土人莊嚴一女置祠旁以為神妻虵輒吸將不爾即亂傷人周氏平蜀許國公宇文貴為益州總管乃致書為神媒合婚姻擇日設樂送玉女像以配西山自邇之後無復此害魏文帝列異傳曰袁本初時有神出河東號度索君人共立廟兗州蘇士母莊往禱, WYG: 厠}
