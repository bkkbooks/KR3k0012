  - {type: variant, offset: 845, length: 0, content: '', SBCK: 之神不歆非􅀋民不祀非族君祀無乃殄乎且民何罪失刑乏祀君其圖之君曰諾吾將復請七日新城西偏將有巫者而見我焉許之遂不見及期而往告之曰帝許我罰有罪矣斃於韓又文上曰有事於太廟躋僖公逆祀也於是夏父弗忌爲宗伯曰吾見新鬼大故鬼小先大後小順也君子以爲失禮又宣公曰楚司馬子良生子越椒子文曰是必㓕􅀂敖氏矣及將死泣曰鬼猶求食􅀂敖氏之􅀑不其餒而又宣公曰􅀄魏武子有嬖妾無子武子疾命顆曰必嫁是疾病則曰必以爲殉及卒顆嫁之及輔氏之役顆見老人結草以亢杜囬杜囬躓而顛故􅀗之夜夢之曰余而所嫁婦人之父也爾用先人之治命余是以報又成公曰晉侯夢大厲􅀍髪及地􅅮膺而踊曰殺余孫不義厲􅀑也趙氏之先祖也八年􅀳侯殺趙同趙括故怒余得請於帝矣壞大門及􅃦門而入公懼入于室又壞户公􅁴召桑田巫巫言如夢巫云􅀑怒如公所夢又昭二曰鄭子産聘于晉晉侯有疾韓宣子逆客私焉曰寡君寢疾於今三月矣並走群望有加而無瘳今夢黄熊入於􅃦門何厲􅀑也對曰昔堯殛鯀于羽山其神化爲黄熊以入于羽淵實爲夏郊三代祀之􅀳爲盟主其或者未之祀也乎宣子祀夏郊􅀳侯有間又昭二曰鄭人相驚以伯有至矣曰伯有至矣則皆走不知所徃鄭人殺伯有言其􅀑至鑄刑書之歳二月或夢伯有介而行曰壬子余將殺帶也明年壬寅余又將殺叚也及壬子駟帶卒國人益懼齊及燕平之月壬寅公孫叚卒國人愈懼其明月子産立公孫泄及良止以撫之乃止子太叔問其故子産曰鬼有所歸乃不爲厲吾爲之歸也又哀上曰􅀄曹人或夢衆君子立于社宫而謀亡曹曹叔鐸請待公孫􅆠許之旦而求之曹無之戒其子曰我死爾振聞公孫疆爲政必去之又哀下曰衛侯夢于北宫見人}
