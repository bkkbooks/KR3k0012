  - {type: variant, offset: 2726, length: 199, content: 火是歲數有火災吳主患之封為中都侯加印綬立廟改鍾山為蔣山以表其靈幽明錄曰晉孝武帝於殿北䆫下清暑忽見一人著白夾黃練單衣舉身沾濕自稱華林池中水之神名曰淋涔君也若善見待當相福祐時帝飲已醉取常所佩刀擲之刀空過無礙神忿曰不以佳事垂接當令知所以居少時而暴崩皆呼此靈為禍也列異傳曰費長房能使神後東海君見葛陂君淫其夫人於是房勑繫三年而東海大旱長房至東海見其請雨乃勑葛陂君出之即大雨異苑曰陶侃如廁見數十人悉持大杖有一人, SBCK: 着皂}
