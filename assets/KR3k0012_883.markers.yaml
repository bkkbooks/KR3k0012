  - {type: variant, offset: 485, length: 219, content: 侍衛土偶皆泥濕如汗者是日猷大破苟兒唐書曰高祖義師次靈石縣隨將宋老生屯霍邑以拒義師會霖雨積旬餽運不繼有白衣老父詣軍門曰余為霍山神使謁唐皇帝曰八月雨止路出霍邑東南吾當濟師高祖曰此神不欺趙無恤豈負我哉又曰初薛延陁之將敗也有一客乞食於主人主人引入帳令妻具饌其妻顧視客乃狼頭人也妻告鄰人共視之狼頭人已食主人而去相與逐之止鬱督軍山見二人追者告其故二人曰我則神人也薛延陁當滅我來取之追者懼而退走延陁竟敗於鬱督軍山老子曰神得一以靈神無以靈將恐歇莊子曰藐姑, SBCK: ''}
