  - {type: variant, offset: 38, length: 0, content: '', SBCK: 着首將身不正遺爲德咎書履曰行必慮正無懷僥倖書劒曰常以服兵而行道德行則福廢則覆書鏡曰以鏡自昭則知􅁻凶書車曰自致者急載人者緩取欲無度自致而反皇覽記隂謀黄帝金人器銘曰武王問尚父曰五帝之誡可得聞乎尚父曰黄帝之戒曰吾之居民上也揺揺恐夕不至朝故爲金人三封其口曰古之愼言堯之居民上也振振如臨􅀷淵舜之居民上也慄慄恐夕不見旦武王曰吾并殷民居其上也翼翼懼不敢息尚父曰德盛者守之以謙威彊者守之以恭武王曰欲如尚父言吾因是爲誡隨之身孔子家語曰孔子觀周遂入太祖后稷之廟廟當右階之前有金人焉三緘其口而銘其背曰古之愼言人也誡之哉無多言無多事多言多敗多事多害安樂必誡無所行悔勿謂何傷其禍將長勿謂何害其禍將大勿謂不聞神將伺人熖熖弗滅炎炎􅀂何㳙㳙不壅終爲江河綿綿不絶或成網羅綿綿微細􅀂不絶則有成網羅者也豪末不札如豪之未言微者札拔也將㝷斧柯誠能愼之福之垠也口是何傷禍之門也強梁者不得其死好勝者必遇其敵盗憎主人民怨其上君子知天下之不可上也故下之知衆人之不可先也故後之温㳟愼德使人慕之執雌持下人莫踰之人皆趨彼我獨守此人皆惑之我獨不徙内藏乃智不示人技我雖尊髙人弗我害唯能於此也江海雖左長於百川以其卑也天道無親甞與善人誡之哉戒之哉孔子旣讀斯文也頋謂弟子曰小子志之此言實而中情而信詩云戰戰兢兢戰戰恐也兢兢戒也如臨深淵恐墮如履薄冰恐䧟行身如此豈口過患哉孫卿子􅀃苑又載也又孫楚反金人銘曰昔太廟左階之前有石人焉大張其口而}
