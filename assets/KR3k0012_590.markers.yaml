  - {type: variant, offset: 11, length: 2, content: 本葬, krp: 三者君子之所恥也周禮夏官上司勲職曰司勲掌六卿賞地之法以等其功賞地賞田也在逺郊之内屬六卿馬等由羌也以功大小爲差王功曰勲成王業若周公者也國功曰功保全國家若伊尹也民功曰庸施法於民若后稷也事功曰勞以勞定國若禹者也民功曰力制法成治若咎繇也戰功曰多克敵出竒若韓信陳平者也司馬法曰上多前虜也凢有功者銘於王之太常祭於大烝司勲詔之銘之言名也生則書於王旌以識其人與其功也死則於烝先王祭之詔謂告其神以辭也般庚告其卿大夫曰兹予大享于先王爾祖其從與饗之是也今漢祭功臣於廟庭周禮冬官考工記曰鬴銘曰}
  - {type: variant, offset: 14, length: 0, content: '', SBCK: 文思索允臻其極銘刻之也時是也允信也瑧至也極中也言是文德之君思求可以爲民立法者而作此量信至於道之中嘉量旣成以觀四國以觀示四方使放象之永啓厥後兹器維則永長也厥其也兹此也又長啓道其子孫使法則此器長用之王隱晋書曰張載字孟陽隨父牧在蜀作劒閣銘刺史張敏表之天子命刻石於劒閣崔鴻十六國春秋後趙録曰勒徙洛陽晷影於褒國銘佐命功臣三十九人于函置于建德前殿劉璠梁典曰天監六年帝以舊國漏刻乖舛乃勑貟外郎祖暅治漏成命太子舎人陸倕爲文其序曰乃詔臣爲銘按倕集曰銘一字至尊}
  - {type: variant, offset: 14, length: 0, content: '', WYG: 文思索允臻其極銘刻之也時是也允信也臻至也極中也言是文徳之君思求可以為民立法者而作此量信至於道之中嘉量既成以觀四國以觀示四方使放象之永啓厥後茲器維則永長也厥其也茲此也又長啓其子孫使法則此器長用之王隠晉書曰張載字孟陽隨父在蜀作劒閣銘刺史張敏表之命刻石於劒閣崔鴻十六國春秋後趙録曰勒徙洛陽晷影於襄國銘佐命功臣三十九人于上置于建德前殿劉璠梁典曰天監六年帝以舊國漏刻乖舛乃敕員外郎祖暅治之漏成命太子舍人陸倕為文其序曰乃詔臣為銘按倕集曰銘一字至尊}
