  - {type: variant, offset: 43, length: 1, content: 因, WYG: 慕之也執雌持下人莫踰之人皆趨彼我獨守此人皆惑之我獨不處内藏乃智不示人技我雖尊高人弗我害唯能如此也江海雖左長於百川以其卑也天道無親當與善人誡之哉誡之哉孔子既讀斯文也顧謂弟子曰小子志之此言實而中情而信詩云戰戰兢兢戰戰恐也兢兢戒也如臨深淵恐墮如履薄氷恐陷行身如此豈曰過患哉孫卿子說苑文載也孔子家語曰孔子觀於魯桓公之廟有欹器焉欹傾也孔子問於守廟者曰此何器曰此}
