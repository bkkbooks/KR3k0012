  - {type: variant, offset: 463, length: 1, content: 既, krp: 典正末丗之羙者也後世以來器銘之佳者有王莽鼎銘崔瑗机銘朱公叔鼎銘王粲硯銘咸以表顯功德天子銘嘉量諸侯大夫銘太常勒鍾鼎之義所言雖殊}
  - {type: variant, offset: 464, length: 0, content: '', WYG: 説此辭以顯明去就之路}
  - {type: variant, offset: 465, length: 0, content: '', SBCK: 令德一也李尤爲銘自山河都邑至于刀筆符契無不有銘而文多􅁾病討而潤色言可采録三輔决録曰何敞字文髙爲汝南太守帝南廵過郡郡有刻鏤屏風帝命侍中黃香銘之曰古典務農彫鏤傷民忠在竭節義在脩身事見黃香集銘志附西京雜記杜子夏葬長安北四里臨終作文曰魏郡杜鄴立志忠欵犬馬未陳奄先朝露骨肉歸於后􅁟魂氣無所不之何必古丘然後即化封於北郭山焉晏然處死乃命刋名埋於墓前種松栢五株至今茂盛西京雜記滕公駕至陳都門馬鳴跪不肯前以足跑地乆之滕公懼使卒掘其所跪之地深二尺得石槨滕公以燭照之有銘乃以水洗之其文字古異左右莫能知問叔孫通通曰科斗書也以今文冩之曰佳城鬰鬰三千年見白日呼嗟滕公居此室滕公曰嗟乎天也吾死其葬此乎於是終葬此焉􅀶物志曰魯閹里蔡伯公死求葬庭中有二人行頃還葬二人復出掘􅁟得石槨有銘曰四體不勤孰爲作生不遭遇長附託頼得二人發吾宅閭里祠之又曰衛靈公葬得石槨銘云不逢箕子靈公奪之我里七辭傳􅀇七謨序曰昔枚乗作七發而屬文之士􅀂􅀓毅劉廣崔駰李尤桓麟崔􅄾劉梁桓彬之徒承其流而作之者紛焉七激七依七􅀃七觸七舉七誤之篇於通儒大才馬季長張平子亦引其源而廣之馬作七廣張造七辨或以恢大道而導幽滯或以􅀧瑰麥而託調咏楊暉播烈垂於後丗者凢十有餘篇自大魏英賢迭作有陳王七啓王氏七釋楊氏七訓劉氏七華從父侍中七誨並陵前而邈後􅀭清風於儒林亦數篇焉丗之賢明多稱七激工余以爲未盡善也七辨似也非張氏至思比之七激未爲劣也七釋僉曰妙焉吾無間矣􅀂七依之卓轢一致七辨之纒綿精巧七啓之奔逸壯麗七釋之精宻閑理亦近代之所希也摯虞文章流別論曰七發造於枚乗借呉楚以爲客主先言出輿入輦蹙痿之損深宫洞房寒暑之疾靡漫羙色宴安之毒厚味暖服􅁋曜之害冝聽世之君子要言妙道以䟽神導體蠲淹滯之累旣設此辭以顯明去就之路而後􅀃以聲色逸遊之樂其􅀃不入乃陳聖人辨士講論之娛而霍然疾瘳此因膏梁之常疾以爲匡勸雖有甚泰之辭而不没其諷喻之義也其流遂廣其義遂變率辭人淫麗之尤矣崔駰旣作七依而假非有先生之言嗚呼楊雄有言童子雕蟲􅂐刻俄而曰壯夫不爲也孔子疾小言破道斯文之族豈不}
