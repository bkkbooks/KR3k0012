  - {type: variant, offset: 1105, length: 2245, content: 陸雲吳郡吳人曾製太伯廟碑吳興太守張纘罷郡經途讀其文歎美之曰今之蔡伯喈也至都言於高祖高祖召兼尚書議郎頃之即真後魏書曰衛操桓帝以為輔相任以國事劉石之亂勸桓帝匡助晉氏東瀛公司馬騰聞而善之表加右軍封定襄侯桓帝崩後操立碑於邗城南以頌功德云魏軒轅之苗裔桓穆二帝馳名域外九譯宗焉有德無祿大命不延背棄華殿雲中名都遠近齊軌奔赴梓廬時晉光熙元年秋也皇興初雍州別駕鴈門段榮於大邗掘得此碑又曰爾朱榮字天寶美容貌幼而明決長好射獵葛榮之叛也榮列圍大獵有雙兔超於馬前榮乃彎弓而誓曰中之則擒葛榮應弦而殪三軍咸悅破賊之後即命立碑於其所號曰雙兔碑唐書曰賈敦實宛昫人也貞觀中累除饒陽令時制大功已下不得聯職敦實兄敦頤復為瀛州剌史甚有惠政百姓共樹碑于大市通衢及敦實去職復刻石頌其政德立於兄碑之側故時人呼為棠棣之碑焉又曰貞觀中議封禪又議立碑曰勒石紀號垂𥙿後昆美盛德之形容闡后王之休烈其義遠矣又曰高宗御製慈恩寺碑文及自書鐫刻既畢戍申上御安福門樓觀僧玄奘等迎碑向寺諸寺皆造幢蓋飾以金寶窮極瓌麗太常及京城音樂車數百兩僧尼執幡兩行導從士女觀者填噎街衢自魏晉已來崇事釋教未有如此之盛者也又曰文苑傳曰李邕尤長碑頌雖貶職在外中朝衣冠及天下寺觀多齎持金帛往求其文前後所製凡數百首受納饋運亦至鉅萬時議以為自古鬻文獲財未有如邕者有文集七十卷其張幹公行狀洪州放生碑批韋巨源謚議文士推重之後恩思例贈秘書監又曰長平中源寂使新羅國見有國人傳寫諷念馮定所為黑水碑畫鶴記韋休符之使西蕃也見其國人寫定商山記以代屏障其文名馳於戎夷如此又曰李華嘗為魯山令元德季墓碑顏真卿書李陽冰篆額後人爭摸寫之號為三絕碑又曰裴度平淮西詔韓愈撰平淮西碑其辭多敘裴度事時先入蔡州擒吳元濟李愬功第一愬不平之愬妻出入禁中因訴碑辭不實詔令磨之憲宗命翰林學士段文昌重撰文勒石又曰蕭俛在相位時穆宗詔撰故成德軍節度使王士真神道碑對曰臣器褊狹比不能強王承宗先朝阻命事無可觀如臣秉筆不能溢美又撰進之後例行貺遺臣若公然阻絕則違陛下撫納之宜僶俛受之則非微臣平生之志臣不願為之秉筆帝嘉而從之又曰李絳憲宗時中官吐突承瓘自藩邸承恩寵既為神策軍護軍中尉嘗欲於安國佛寺建立聖德碑大興工作絳即上言陛下布惟新之政剗積習之獘四海延頸日望德音今忽立聖德碑以示天下不廣大易稱大人者與天地合德與日月合明執契垂拱勵精求理豈可以文字而盡聖德又安可以碑表而贊皇猷若可敘述是有分限乃反虧損盛德豈謂敷揚至道哉故自堯舜禹湯文武並無建碑之事至秦始皇荒逸之君煩酷之政然有之罘嶧山之碑揚誅伐之功紀巡幸之跡適足為百王所笑萬代所譏至今稱為失道亡國之主豈可擬議於此陛下嗣高祖太宗之業舉貞觀開元之政思理不遑食從諫如順流固可與堯舜禹湯文武方駕而行安得追秦皇暴虐不經之事而自損聖政近者閻巨源請立紀聖德碑嚴勵請立紀聖功碑陛下詳盡事宜皆不允許今忽令立此與前事頗乖況此碑既在安國寺即不得不敘載遊觀崇飾之事述遊觀且乖理要敘崇飾又匪政經固非哲王所宜行也上納之後唐史曰魏帥楊師厚於黎陽山採巨石將紀德政制度甚大以鐵為車方任負載驅牛數百不由道路所經之處或壞人廬舍或發人丘墓百姓瞻望曰碑來碑石纔至而卒魏人以為應碑來之兆禰衡別傳曰黃祖太子射作章陵太守與衡有所之見蔡伯喈所作石碑正平一過視之歎之言好後日各歸章陵自恨不令吏寫之正平曰吾雖一遇皆識其中央第四行中石書磨滅兩字不分明當是某字恐不諦耳因援筆書之初無所遺唯兩字不著耳章陵雖知其才明猶嫌有所脫失故遣往寫還以校正平所書尺寸皆得初無脫誤所疑兩字故如正平所遺字也於是章陵敬服世說曰魏武嘗過曹娥碑下楊脩讀碑背上題云黃絹幼婦外孫齏臼魏武謂脩曰卿解不荅云解魏武曰卿未可言待我思之行三十里乃曰吾已得令脩別記所知脩曰黃絹色絲也於字為絕幼婦少女也於字為妙外孫女子也於字為好齏臼受辛也於字為辭所謂絕妙好辭魏武亦記之與脩同乃歎曰我才不如卿乃覺三十里王肅荅詔問為瑞表曰太和六年上將幸許昌過繁昌詔問受禪碑生黃金白玉應瑞不肅奏以始改之元年嘉瑞見乎于踐祚之壇宜矣晉令曰諸葬者皆不得立祠堂石碑石表石獸語林曰孫興公作永嘉郡郡人甚輕之桓公後遣傅教令作敬夫人碑郡人云故當有才不爾桓公那得令作碑於此重之荊州圖記曰羊叔子與鄒潤甫嘗登峴山泣曰自有宇宙便有此山由來賢達登此望如我與卿者多矣皆湮滅無聞念此使人悲傷潤甫曰公德冠四海道嗣前哲令問令望當與此山俱傳若潤甫輩乃當如公語耳後參佐為立碑著故望處百姓每行望碑莫不悲感杜預名為墮淚碑盛弘之荊州記曰冠軍縣有張詹墓七世孝廉刻其碑背曰白楸之棺易朽之衣銅鐵不入瓦器不藏嗟矣後人幸勿見傷及胡石之亂舊墓莫不夷毀而此墓儼然至元嘉六年民飢始發說者云初開金銀銅錫之器未裝雕刻之飾爛然畢備齊道記曰琅邪城始皇東遊至此立碑銘紀秦功德云是李斯所刻西征記曰國子堂前有列碑南北行三十五枚刻之表裏書春秋經尚書二部大篆隸科斗三種字碑長八尺今有十八枚存餘皆崩太學堂前石碑四十枚亦表裏隸書尚書周易公羊傳禮記四部本石塶相連多崩敗又太學讚碑一所漢建武中立時草創未備永建六年詔下三府繕治有魏文典論立碑今四存二敗述征記曰下相城西北漢太尉陳球墓有三碑近墓一碑記弟子盧植鄭玄管寧華歆等六十人其一碑陳登碑文並蔡邕所作酈善長水經注曰昔大禹導河積石踈決梁山所謂龍門矣孟津河口廣八十步巖際鐫跡遺功尚存岸上並有廟祠祠前有石碑三所碑字紊滅不可識也一碑是太和中立述異記曰崆峒山中有堯碑禹碣皆籀文焉伏滔述帝功德銘曰堯碑禹碣磨古不昧虞喜志林曰贛榆縣有始皇碑潮水至則加其上三丈去則見三尺行有十二字異苑曰吳郡岑淵碑在江乘湖西太元村人見龜從田中出還其元處萍藻猶著腹下金樓子曰銘頌所稱興公而已夫披文相質博約溫潤, SBCK: ''}
