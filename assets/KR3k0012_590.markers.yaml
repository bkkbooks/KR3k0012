  - {type: variant, offset: 463, length: 1, content: 既, SBCK: 典正末丗之羙者也後世以來器銘之佳者有王莽鼎銘崔瑗机銘朱公叔鼎銘王粲硯銘咸以表顯功德天子銘嘉量諸侯大夫銘太常勒鍾鼎之義所言雖殊}
  - {type: variant, offset: 463, length: 0, content: '', WYG: 典正末世之美者也後世以來器銘之嘉者有王莽鼎銘崔瑗機銘朱公叔鼎銘王粲研銘咸以表顯功德天子銘嘉量諸侯大夫銘太常勒鐘鼎之義所言雖殊而令徳一也李尤為銘自山河都邑至於刀筆笇契無不有銘而文多穢病討論潤色亦可采録三輔决録曰何敞字文高為汝南太守帝南巡過郡郡有刻鏤屏風帝命侍中黄香銘之曰古典務農彫鏤傷民忠在竭節義在修身事見黄香集銘志附西京雜記杜子夏葬長安北四里臨終作文曰魏郡杜鄴立志忠欵犬馬未陳奄先朝露骨肉歸於后土魂氣無所不之何必故丘然後即化封於長安北郭此焉晏息及死乃命刻銘埋於墓側墓前種松栢五株至今茂盛西京雜記滕公駕至東都門馬鳴跪不肯前以足跑地久之而滕公懼使卒掘其跑之地深二尺得石槨滕公以燭照之有銘乃以水洗之寫其文字古異左右莫能知問叔孫通通曰科斗書也以今文寫之曰佳城鬱鬱三千年見白日吁嗟滕公居此室滕公曰嗟乎天也吾死其葬此乎於是終葬此焉博物志曰魯閹里蔡伯公死求葬庭中有二人行頃還葬二人復出掘土得石槨有銘曰四體不勤孰為作生不遭遇長附記賴二人發吾宅閭里祠之又曰衞靈公葬得石槨銘云不逢箕子公奪我里七辭傅𤣥七謨序曰昔枚乘作七發而屬文之士若傅毅劉廣崔駰李尤桓麟崔琦劉梁桓彬之徒承其流而作之者紛焉七激七依七説七蠲七舉七興之篇於通儒大才馬季長張平子亦引其源而廣之馬作七厲張造七辨或以恢大道而導幽滯或以黜瑰奓而託諷詠揚暉播烈垂於後世者凡十有餘篇自大魏英賢迭作有陳王七啓王氏七釋楊氏七訓劉氏七華從父侍中七誨並陵前而邈後揚清風於儒林亦數篇焉世之賢明多稱七激為工余以為未盡善也七辨似也非張氏至思比之七激未為劣也七釋僉曰妙哉吾無間矣若七依之卓轢一致七辨之纒綿精巧七啓之奔逸壯麗七釋之精密閑理亦近代之所希也摯虞文章流别論曰七發造於枚乘借呉楚以為客主先言出輿入輦蹷痿之損深宫洞房寒暑之疾靡漫美色晏安之毒厚味暖服淫曜之害宜聴世之君子要言妙道以䟽神導引蠲淹滯之累}
