  - {type: variant, offset: 64, length: 0, content: '', SBCK: 昔軒轅帝刻輿以弼違太禹勒筍􅒶以招諌成湯盤盂著日新之規武王户席題必誡之訓周公愼言於金人仲尼革容於欹器列聖鑒戒其來乆矣故銘者名也觀器必也正名審用貴乎愼德盖臧武仲之論銘也曰天子令德諸侯計功大夫稱伐夏鑄九牧之金周勒肅愼之楛令德之事也吕望銘功於昆吾仲山鏤績於庸器計功之義也魏顆紀勳於景鍾孔悝表勤於衛鼎稱伐之􅀋也􅀂乃飛廉有石槨之錫雲公有奪里之謚銘發幽石噫可恠也趙靈勒跡於潘吾􅁗昭刻傳於華山夸誕示後吁可􅀏也詳觀衆例銘義見矣至於始皇勒岳政暴而文澤亦有踈通之羙焉􅀂乃班固燕然之勒張旭華隂之碣序亦成矣蔡邕之銘思燭古全橘公之鍼則吐納典譽朱穆之鼎全成}
  - {type: page-break, offset: 64, content: '', id: KR3k0012_SBCK_590-4b}
  - {type: variant, offset: 64, length: 0, content: '', WYG: 昔軒帝刻輿几以弼違大禹勒筍簴以招諫成湯盤盂著日新之規武王戸席題必誡之訓周公慎言於金人仲尼革容於欹器列聖鑒誡其來久矣故銘者名也觀器必也正名審用貴乎慎徳葢臧武仲之論銘也曰天子令德諸侯計功大夫稱伐夏鑄九牧之金周勒肅慎之楛令德之事也吕望銘功於昆吾仲山鏤績於庸器計功之義也魏顆紀勲於景鐘孔悝表勤於衞鼎稱伐之類也若乃飛廉有石槨之錫靈公有蒿里之諡銘發幽石噫可怪也趙靈勒跡於番吾秦昭刻博於華山誇誕示後吁可笑也詳觀衆例銘義見矣至於始皇勒岳政暴而文澤亦有䟽通之美焉若乃班固燕然之勒張昶華隂之碣序亦盛矣蔡邕銘思獨冠古今橋公之鉞則吐納典謨朱穆之鼎全成}
