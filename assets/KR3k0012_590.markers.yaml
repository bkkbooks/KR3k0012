  - {type: variant, offset: 64, length: 0, content: '', krp: 昔軒轅帝刻輿以弼違太禹勒筍􅒶以招諌成湯盤盂著日新之規武王户席題必誡之訓周公愼言於金人仲尼革容於欹器列聖鑒戒其來乆矣故銘者名也觀器必也正名審用貴乎愼德盖臧武仲之論銘也曰天子令德諸侯計功大夫稱伐夏鑄九牧之金周勒肅愼之楛令德之事也吕望銘功於昆吾仲山鏤績於庸器計功之義也魏顆紀勳於景鍾孔悝表勤於衛鼎稱伐之類也若乃飛廉有石槨之錫雲公有奪里之謚銘發幽石噫可恠也趙靈勒跡於潘吾秦昭刻傳於華山夸誕示後吁可笑也詳觀衆例銘義見矣至於始皇勒岳政暴而文澤亦有踈通之羙焉若乃班固燕然之勒張旭華隂之碣序亦成矣蔡邕之銘思燭古全橘公之鍼則吐納典譽朱穆之鼎全成}
