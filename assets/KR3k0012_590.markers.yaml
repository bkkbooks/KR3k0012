  - {type: variant, offset: 28, length: 0, content: '', krp: 陳盛德穆天子傳曰天子觀舂山之上乃爲銘䟽於玄圃之上以貽後丗謂勒石銘功德大戴禮曰武王踐祚三日召士大夫而問焉曰惡有藏之約行之萬丗可以爲子孫者乎師尚父曰在丹書王欲聞之則齋矣三日端冕師尚父端冕奉書而入則負屏而立王}
  - {type: variant, offset: 29, length: 4, content: 棺追述君, SBCK: 堂南面而立父曰先王之道不北面王行西折而東面而立師尚父西面道書之言曰敬勝怠者􅁻怠勝敬者滅義勝欲者從欲勝義者凶以仁得之以仁守之其量百丗以不仁得之以仁守之其量十丗以不仁得之以不仁守之必及其丗王聞書之言􅅥然􅀂恐懼而爲誡書於席之四端爲銘焉太公金匱曰武王曰吾隨師尚}
  - {type: variant, offset: 29, length: 4, content: 棺追述君, WYG: 堂南面而立尚父曰先王之道不北靣王行西折而南東靣而立師尚父西面道書之言曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶以仁得之以仁守之其量百世以不仁得之以仁守之其量十世以不仁得之以不仁守之必及其世王聞書惕若恐懼退而為誡書于席之四端為銘焉太公金匱曰武王曰吾受師尚}
