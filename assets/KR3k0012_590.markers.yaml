  - {type: variant, offset: 28, length: 0, content: '', SBCK: 陳盛德穆天子傳曰天子觀舂山之上乃爲銘䟽於􅀇圃之上以貽後丗謂勒石銘功德大戴禮曰武王踐祚三日召士大夫而問焉曰惡有藏之約行之萬丗可以爲子孫者乎師尚父曰在丹書王欲聞之則齋矣三日端冕師尚父端冕奉書而入則􅀒屏而立王}
  - {type: page-break, offset: 28, content: '', id: KR3k0012_SBCK_590-2b}
  - {type: variant, offset: 28, length: 0, content: '', WYG: 陳盛徳穆天子傳曰天子觀舂山之上乃為銘迹於縣圃之上以詔後世謂勒石銘功德大戴禮曰武王踐祚三日召士大夫而問焉曰惡有藏之約行之萬世可以為子孫常者乎師尚父曰在丹書王欲聞之則齋矣三日王端冕師尚父亦端冕奉書而入則負屏而立王}
