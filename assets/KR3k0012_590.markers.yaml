  - {type: variant, offset: 7, length: 2, content: 碑被, SBCK: 銘者述其功羙可稱名也禮記􅀕統曰銘者論譔其先祖之有德善功烈勲勞慶賞聲名列於天下而酌之􅀕器自成其名焉以祀其先祖者也顯楊先祖所以崇孝也身比爲順也明示後丗教也夫銘者一稱而上下皆得焉耳矣是故君子之觀於銘也旣羙其所稱又羙其所爲爲之者明足以見之仁足以與之智足以利之可謂賢矣賢而勿伐可謂㳟矣故衛孔悝之鼎銘曰六月丁亥公假於太廟公曰叔舅乃祖莊叔左右成公成公乃命莊叔隨難於漢陽即宫于宗周奔走無射啓右獻公獻公乃命成叔纂乃祖服乃考文叔興舊􅄝欲作率慶士躬恤衛國其勤公家夙夜不解民咸曰休哉公曰叙舅子汝銘􅀂纂乃考服悝拜稽首曰對􅀭以辟之勤大命施于蒸彛鼎此衛孔悝之鼎銘也古之君子論撰其先祖之羙而明著之後丗者也以比其身以重其國家如此子孫之守宗廟社稷者其先祖無羙而稱之是誣也有善而弗知不明也知而弗傳不仁}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_SBCK_590-1b}
  - {type: variant, offset: 7, length: 2, content: 碑被, WYG: 銘者述其功美可稱名也禮記祭統曰銘者論撰其先祖之有德善功烈勲勞慶賞聲名烈于天下而酌之祭器自成其名焉以祀其先祖者也顯揚先祖所以崇孝也身比焉順也明示後世教也夫銘者一稱而上下皆得焉耳矣是故君子之觀於銘也既美其所稱又美其所為為之者明足以見之仁足以興之智足以利之可為賢矣賢而勿伐可謂恭矣故衞孔悝之鼎銘曰六月丁亥公假于太廟公曰叔舅乃祖莊叔左右成公成公乃命莊叔隨難于漢陽即宫于宗周奔走無射啓佑獻公乃命成叔纂乃祖服乃考文叔興舊嗜欲作率慶士躬恤衞國其勤公家夙夜不解民咸曰休哉公曰叔舅予汝銘若纂乃考服悝拜稽首曰對揚以辟之勤大命施于烝彛鼎此衞孔悝之鼎銘也古之君子論撰其先祖之美而明著之後世者也以比其身以重其國家如此子孫之守宗廟社稷者其先祖無美而稱之是誣也有善而弗知不明也知而弗傳不仁}
