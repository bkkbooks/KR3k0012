  - {type: variant, offset: 11, length: 2, content: 本葬, SBCK: 三者君子之所恥也周禮夏官上司勲職曰司勲掌六卿賞地之法以等其功賞地賞田也在逺郊之内屬六卿馬等由羌也以功大小爲差王功曰勲成王業若周公者也國功曰功保全國家􅀂伊尹也民功曰庸施法於民􅀂后稷也事功曰勞以勞定國􅀂禹者也民功曰力制法成治􅀂咎繇也戰功曰多克敵出竒􅀂韓信陳平者也司馬法曰上多前虜也凢有功者銘於王之太常􅀕於大烝司勲詔之銘之言名也生則書於王旌以識其人與其功也死則於烝先王􅀕之詔謂告其神以辭也般庚告其卿大夫曰兹予大享于先王爾祖其從與饗之是也今漢􅀕功臣於廟庭周禮冬官考工記曰鬴銘曰}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_SBCK_590-2a}
  - {type: variant, offset: 11, length: 2, content: 本葬, WYG: 三者君子之所恥也周禮夏官上司勲職曰司勲掌六卿賞地之法以等其功賞地賞田也在逺郊之内屬六鄉焉等猶差也以功大小為差王功曰勲成王業若周公者也國功曰功保全國家若伊尹也民功曰庸施法於民若后稷也事功曰勞以勞定國若大禹也治功曰力制法成治若咎繇也戰功曰多克敵出竒若韓信陳平者也司馬法曰上多前虜也凡有功者銘於王之太常祭於大烝司勲詔之銘之言名也生則書於王旌以識其人與其功也死則於烝先王祭之詔謂告其神以辭也盤庚告其卿大夫曰茲予大享於先王爾祖其從與饗之是也周禮冬官考工記曰鬴銘曰}
