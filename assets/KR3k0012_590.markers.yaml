  - {type: variant, offset: 41, length: 0, content: '', WYG: 也翼翼懼不敢息尚父曰德盛者守之以謙守之以恭武王曰欲如尚父言吾因是為誡隨之身孔子家語曰孔子觀周遂入太祖后稷之廟廟當右階之前有金人焉三緘其口而銘其背曰古之慎言人也誡之哉無多言無多事多言多敗多事多害安樂必誡無行所悔勿謂何傷其禍將長勿謂何害其禍將大勿謂不聞神將伺人焰焰弗滅炎炎若何涓涓不壅終為江河綿綿不絶或成網羅綿綿微細若不絶則有成網羅者也豪末不札如豪之末言微也札拔也將尋斧柯誠能慎之福之根也曰是何傷禍之門也强梁者不得其死好勝者必遇其敵盜憎主人民怨其上君子知天下之不可上也故下之知衆人之不可先也故}
