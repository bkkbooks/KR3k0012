  - {type: variant, offset: 106, length: 351, content: 兩楹事止麗壯未勒勳績而庸器漸闕故後代用碑以石代金同乎不朽自廟徂墳猶封墓也自後漢已來碑碣雲起才鋒所斷莫高蔡邕觀楊賜之碑骨鯁訓典陳郭二文詞無擇言周胡眾碑莫不精允其序事也該而要其綴采已雅而澤清辭轉而不窮巧義出而卓立察其為才自然至矣孔融所創有慕伯喈張陳兩文辭洽之來亦其亞也及孫綽為文志在於碑溫王郗庾詞多枝離桓彝一篇最為辨裁矣屬碑之恥資乎史才其序則傳其文則銘摽序盛德必見清風之華照紀鴻懿必見峻偉之烈此碑之致也夫碑實銘器銘實碑文因器立名事光於誄是以勒器讚勳者入銘之域樹碑述亡者同誄之區焉禮記喪大記曰君葬用輴四紼二碑御柩用羽葆大夫葬用輴二紼二碑御柩用茅士喪用國車二紼無碑又祭義曰祭之日尸牽牲入廟門麗于碑麗猶擊也東觀漢記曰竇章女順帝初入掖庭為貴人早卒帝追思之詔史官樹碑頌德章自為之辭范曄後漢書曰郭林宗卒同志者乃共刻石立, SBCK: ''}
