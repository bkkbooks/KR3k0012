  - {type: variant, offset: 39, length: 0, content: '', WYG: 履曰行必慮正無懷僥倖書劍曰常以服兵而行道德行則病廢則覆書鏡曰以鏡自照則知吉凶書車曰自致者急載人者緩取欲無度自致而反皇覽記隂謀黄帝金人器銘曰武王問尚父曰五帝之誡可得聞乎尚父曰黄帝之誡曰吾之居民上也揺揺恐多故為金人三封其口曰古之慎言堯之居民上也振振如臨深淵舜之居民上也慄慄恐夕不旦武王曰吾并殷民居}
