  - {type: page-break, offset: 2809, content: '', id: KR3k0012_WYG_663-14a, image: WYG0898/WYG0898-0869a.png}
  - {type: variant, offset: 2810, length: 329, content: 公又曰魯妙典者九疑山女道士也生而好道忽謂母曰人之上壽所傳得者稀喜樂悲哀日以相害況埋沒真性混于流浴乎有道士過其門授以大洞黃庭經謂曰所患人不能知知不能修修不能精精不能久不惟有玄科之責亦將苦報無窮也妙典奉其言入九疑山累有魔試介特不撓山上一石盆中有泉用之不竭又有大鐵臼不知何虛來今並在山中石壇上宛然有仙履跡及古鏡一廣三尺古鍾一形如偃月在無為觀中妙典後仙去又曰謝自然女道士也果州人詞氣高異其家在大方山下頂有古像老君其形自然因拜禮不願下山母從之乃遷居山頂自此常誦道德經黃庭內篇於開元觀受紫虛寶籙於金泉山居之山有石壇煙籮脩竹一十三年晝夜不寐兩膝上忽有印似小於人閒官印四壖若朱有古篆六字粲如白玉忽於金泉道塲有雲氣遮匝一川散漫彌久仙去其金泉碑略曰天上有白玉堂壁上列高仙真仙之名, SBCK: 曹}
  - {type: page-break, offset: 2810, content: '', id: KR3k0012_SBCK_663-8b}
