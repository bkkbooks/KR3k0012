  - {type: variant, offset: 652, length: 1, content: 遠, SBCK: 仲都西漢人也少修道德孝文以積寒之日令仲都單衣載四馬於上林昆明環水而馳御者原衣狐裘而寒慄垂死仲都色曾不變體和氣溢如焰及盛暑闈以烈火體亦不汙後不知所之又曰有稷丘公者太山下道士也漢武帝東巡狩至泰山稷丘公乃冠章甫衣黃擁琴來迎上曰陛下勿上也恐傷足帝必欲上及數里果如言但諱之故但祠而還爲稷丘公立祠復百戸使奉承之也又曰戴孟本姓燕名濟}
