  - {type: variant, offset: 98, length: 0, content: '', SBCK: 赤城按茅君傳云霍林司命治赤城丹山玉洞之府齊永明中忽有大羣鵠從西北來下集霍門溪溪谷塡塞彌漫數里多所蹹籍狀如爲物所驚一夕還飛向西北計是赤城上都泉湖中物也羅浮山山洞周五百里眞誥呼爲層城葛洪交州逺停此解化茅君傳曰句曲山洞周一百五十里秦時名爲句金之壇漢時三茅君得道來治此山五符曰林屋山周四百里一名苞山在太湖中下有洞濳通五岳號天后别宫夏禹治水平後藏五符於此吳王闔閭使龍威丈人入山所得是也眞誥云包山下有石室銀房方圎百里又有白芝隱泉泉水紫色又曰城玉山洞周三千里周司命先在􅁪山中太􅀇玉女語令往西城師王君於是往焉即此山也又曰厚載之中有洞天三十六所又八海中諸山亦有洞宫或方千里五百里非三十六洞天之例也五岳名山皆有洞宫或三十里二十里並舎神}
  - {type: page-break, offset: 98, content: '', id: KR3k0012_SBCK_663-2a}
  - {type: page-break, offset: 98, content: '', id: KR3k0012_SBCK_663-2b}
  - {type: variant, offset: 98, length: 8, content: 仙堂差次職署則度, WYG: 赤城按茅君傳云霍林司命治赤城丹山玉洞之府齊永明之忽有大羣鵠從西北來下集霍門溪溪谷填塞彌漫數里多所蹹藉狀如為物所驚一夕還飛向西北計是赤城上都泉胡中物也羅浮山山洞周五百里真誥呼為層城葛洪至交州遂停此煉丹茅君傳曰句曲山洞周一百五十里秦時}
  - {type: variant, offset: 98, length: 0, content: '', krp: 赤城按茅君傳云霍林司命治赤城丹山玉洞之府齊永明中忽有大羣鵠從西北來下集霍門溪溪谷塡塞彌漫數里多所蹹籍狀如爲物所驚一夕還飛向西北計是赤城上都泉湖中物也羅浮山山洞周五百里眞誥呼爲層城葛洪交州逺停此解化茅君傳曰句曲山洞周一百五十里秦時名爲句金之壇漢時三茅君得道來治此山五符曰林屋山周四百里一名苞山在太湖中下有洞濳通五岳號天后别宫夏禹治水平後藏五符於此吳王闔閭使龍威丈人入山所得是也眞誥云包山下有石室銀房方圎百里又有白芝隱泉泉水紫色又曰城玉山洞周三千里周司命先在恒山中太玄玉女語令往西城師王君於是往焉即此山也又曰厚載之中有洞天三十六所又八海中諸山亦有洞宫或方千里五百里非三十六洞天之例也五岳名山皆有洞宫或三十里二十里並舎神}
  - {type: variant, offset: 99, length: 0, content: '', SBCK: 又非小天之數也名山記曰岳洞方百里在終南太一閒或名桂陽宫多諸靈異王屋山洞周迴萬里名曰小有淸虚天按王君内傳云在河内沁水縣界濟水所出之源也北有太行東南有北邙嵩山内洞天日月星辰雲氣草木萬􅀋無異矣宫闕相映金玉鏤飾皆地仙所處即淸虚王君所居也眞誥云此諸天所謂陽臺也諸得道者皆詣焉委羽山在海中司馬季主所處也又曰括蒼山洞周三百里東缶佐命也在㑹稽東南群帝之所遊山多神異又有縉雲}
