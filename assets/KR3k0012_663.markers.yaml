  - {type: variant, offset: 1115, length: 0, content: '', SBCK: 術餌丹年四百餘歲又曰王烈字長休邯鄲人也常黃精及鈆二百餘歲行歩若飛愽極群書嵇甚重之數數就學共入太行山見山裂有靑石髓流出烈取髓丸之成石氣如米飯嚼之亦然烈因擕少歸欲遺康康取而視之已成靑石擊之錚錚康即與往視斷山山已如故烈入河東抱犢山見一石室室中有石架架上有素書兩卷莫識其字暗記數十字以示康康盡識之烈喜乃與康共往讀之至其所失其石室烈私語弟子曰叔夜來合得}
