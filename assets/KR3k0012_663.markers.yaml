  - {type: variant, offset: 1814, length: 0, content: '', SBCK: 授以仙方得道因遣恭去曰可視卿里及孫吕習者作道士民多奉事之恭傳言到習家扣門問訊奴出問}
  - {type: variant, offset: 1814, length: 0, content: '', WYG: 授以仙方得道因遣恭去曰可視鄊里及孫吕習者作道士民多奉視之恭傳言到習家扣門問訊奴出問}
  - {type: variant, offset: 1814, length: 0, content: '', krp: 授以仙方得道因遣恭去曰可視卿里及孫吕習者作道士民多奉事之恭傳言到習家扣門問訊奴出問}
  - {type: variant, offset: 1815, length: 0, content: '', SBCK: 從何來恭曰此是家習聞驚喜出拜恭乃以神方授習而去習時已年八十服之還少至二百歲乃入山中子孫世不復老又曰沈建丹陽人世爲長吏建好道不仕學服餌之術能治病飛行或去還如此三百餘年乃絕跡不知所之又曰許逺遊第三男名翽字道翔小名王斧糠粃世務居雷平山下修業精勤常願早遊洞室不欲乆停人丗遂詣北洞以梁太和六年於茅山舊宅年三十而告終卽居方隅山洞方園館中常去來四平方臺}
  - {type: page-break, offset: 1815, content: '', id: KR3k0012_SBCK_663-8a}
  - {type: variant, offset: 1815, length: 0, content: '', WYG: 從何來恭曰吾來家習聞驚喜出迎恭乃以神方授習而去時已年八十服之還少至二百歳乃入山中子孫世不復見又曰沈建丹陽人世為長吏建好道不仕不學服餌之術能治病飛行或去還如此三百餘年乃絶跡不知所之又曰許逺遊第三男名翽字道翔小名玉斧糠粃世務居雷平山下修業精勤常願早遊洞室不欲久停人世遂詣北洞以梁太和六年於茅山舊宅年三十而告終即居方遇山洞方園館中常去來四平方臺}
