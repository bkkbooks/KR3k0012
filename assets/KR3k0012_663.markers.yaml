  - {type: variant, offset: 1805, length: 1, content: 讀, SBCK: 劉憑沛人也學道於稷丘子常服石英年三百餘歲有少容嘗到長安諸貴人聞憑有道乃往拜見之又有百餘人隨憑語賊曰汝輩作人何犲狼其心相教斷道危人利己}
  - {type: variant, offset: 1805, length: 1, content: 讀, WYG: 劉慿沛人也學道於稷丘子常服石英年三百餘歳有少容嘗到長安諸貴人問慿有道術往拜見之又有賊隨人入慿語賊曰汝軰作人何豺狼}
  - {type: variant, offset: 1805, length: 1, content: 讀, krp: 劉憑沛人也學道於稷丘子常服石英年三百餘歲有少容嘗到長安諸貴人聞憑有道乃往拜見之又有百餘人隨憑語賊曰汝輩作人何犲狼其心相教斷道危人利己}
  - {type: variant, offset: 1807, length: 4, content: 析疑勿示, SBCK: 是伏尸都市肉饗烏鳶之法賊忽頓伏駭去憑後入太白山數十年歸鄕里顔色更少又曰尹思字少龍安定人晉元康五年正月十五日夜坐屋中遣兒視月中有異物否兒曰今當有大水月中有一人披蓑帶劒思自視之日月中人乃帶劒伏矛當大亂三十年復當小淸思後不知所之又曰皇初平者丹谿人年十五家使牧羊有道士見其良謹便將至金華山石室中四十餘年不復念家其兄初起尋索厯年後見市中一道士言其處初起即隨去得見語畢問羊何在曰近在東耳初起住視之但見白石初平乃往叱石爲羊數萬頭初起知得仙道便弃家共服松脂茯苓至五百歲初平改字爲赤松子初起改字爲赤魯班又曰吕恭字文敬}
  - {type: page-break, offset: 1807, content: '', id: KR3k0012_SBCK_663-7b}
  - {type: variant, offset: 1807, length: 4, content: 析疑勿示, WYG: 心相教新道危人利己此是伏尸都市肉饗鳥鳶之法賊忽頓伏駭矣慿後入太白山數十年歸鄉里顔色更少又曰尹思字少龍安定人晋元康五年正月十五日夜坐屋中遣児視月中有異物否曰目今當有大水月中有人披蘘帶劔思自視之曰月中人乃帶扶仗子當大亂三十年復當小靖思後不知所之又曰皇初平者丹谿人年十五家使牧羊有道士見其良謹便将至金華石室山中四十餘年不復念家其兄初起尋索歴年後見市中一道士言其䖏初起即隨去得見語畢問羊何在曰近在東耳初起徃視之但見白石初平叱之石皆化羊數萬頭初起知得仙道便棄家共服松脂茯苓至五百歳初平改字為赤松子初起改字為赤魯班又曰吕恭字文敬}
