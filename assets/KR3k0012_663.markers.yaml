  - {type: variant, offset: 693, length: 310, content: 桓帝嗣位聞之連詔不出使郡國逼載以至京師但低頭閉口不荅詔乃題宮門板四百餘字皆說方來帝惡之歸鄉里同郡故太尉公陳躭為方平駕道室旦夕事之方平在躭家四十餘年後語躭云吾當去明日日中發至明日果卒躭知仙去曰先生捨我矣又曰嚴青會稽人家貧常於山中作炭忽有一人與青語不知其異人也臨別以一卷書與青曰汝得長生故以相授當以潔器盛之置于高處青受之後得其術入霍山仙去又曰張陵字輔漢沛國豐人也本大儒晚學長生之道得九鼎丹經聞蜀中多名山乃入嗚鵠山著道書二十餘篇仙去又曰趙廣信陽城人魏末來渡江入剡小白山中學道受左慈玄中之道并徹視法如此積年周行郡國或賣藥人莫知也多來都下市丹砂作九華丹仙去又曰郭景世晉初學道於廬江灊山中受孟德然口訣兼服胡麻玄丹仙去矣又曰趙伯威東郡, WYG: ''}
