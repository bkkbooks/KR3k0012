  - {type: variant, offset: 126, length: 1, content: 皆, SBCK: 昔東海靑童君乗風颷飛輪車按行洞天曾來於此劉向列仙傳曰赤松子神農時雨師服水玉至崑崙山上常止西王母石室隨風雨上下仙去又曰渥佺槐山採藥父也好食松實體生毛目方瞳能飛行又曰廣成子古仙也居崆峒山石室中黃帝聞而造焉問其道要廣成子曰帝治天下雲不待族而飛草木不待黃而落何足語至道黃帝退居三日順風再拜廣成子日至也之精杳杳冥冥無視無聽抱神以靜形將自正必靖必淸吾將去無窮之門遊無極之野又曰白石先生者中黃道人弟子也常煑白石爲粮因就白石山居亦食脯飲酒食穀日行三四百里容貌不衰又日黃山君者脩彭祖之術百餘歲}
