  - {type: punctuation, offset: 1820, content: 「, id: KR3k0012_CHANT_663-bkkpn506}
  - {type: variant, offset: 1820, length: 280, content: 黃子陽少知長生之道隱博落山中九十餘年伹食桃飲石泉後逢司馬季主季主以導仙八方與之遂度世仙去又曰王生陽城人居壺谷中不知時漢武帝登嵩山東方朔等從忽見一神人長丈餘帝禮面問之曰某九疑山人也聞中岳有石菖蒲一寸九節食可長生故來採之忽失神人帝遂採服之帝性熱煩悶不快從官皆服皆能遟久惟王生聞神人教服遂採食之仙去又曰劉根字君安京兆長安人少明五經漢成帝時人也入嵩山石室峻絕之處嘗曰上藥有九轉還丹太一金液次有雲母雄黃之屬亦可長生次乃草木之藥能治病益氣上可數百歲下即全其所稟而已必欲長生即先定心志除嗜慾乃可授神方五色篇根後入雞頭山仙去又曰陰長生新野人後漢陰皇后之屬籍也少居富貴不好榮利知, SBCK: ''}
