  - {type: variant, offset: 2290, length: 512, content: 珠囊曰壺公謝元歷陽人賣藥於市不二價治病皆愈語人曰服此藥必吐某物某日當愈事無不効日收錢數萬施市內貧乏飢凍者費長房為市令知其人後詣公公攜長房去授以治病之術令還壺公後仙去戴公柏有太微黃書十餘卷即壺公之師也又曰樂子長齊人也少好道到霍林山服巨勝赤松散方去仙又曰衛叔卿中山人服雲母子度世入山見父叔卿語曰吾齊書室西北墉大柱下有玉函中有書取而按合服之度世歸果如言餌五色雲母仙去又曰魏伯陽者吳人也好道不仕封己養高後入山餌神丹仙去撰參同契其說以周易爻象論作丹之意而世不知神丹之事多作陰陽注之殊失其旨又曰尹軌字公度太原人博極群書晚乃學道常服黃精年百餘歲言天下盛衰安危吉凶未嘗不効入太和山仙去又曰東郭延年者山陽人也服靈飛散能在暗室中夜書又身生光遠照小物見其采色一旦數十人乘虎豹來迎之延年遂詣崑崙山仙去又曰王真上黨人七十九乃學道徐行若飛有兼人之力郤元節事真十餘年真以蒸丹小餌法授之容常不衰鄉人計真之年以四百餘歲後登女几山仙去又曰平中節河東人晉以羯胡亂華遂隱蒼梧山受宋君存心之道積四十五年精思不懈體有真氣後仙去又曰葛玄善於變幻拙於用身初在長山近入蓋竹亦能乘虎使鬼但未得受職耳常與謝稚堅黃子陽郭聲子相隨也葛玄是抱朴子從祖即鄭思遠之師也時人莫測所處傳言東海, SBCK: ''}
