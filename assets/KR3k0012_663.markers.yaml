  - {type: variant, offset: 1049, length: 0, content: '', WYG: 顔色甚好又曰王遥字伯遼鄱陽人也頗行治病皆愈遥有篋長數尺一弟子姓錢隨遥十數年未嘗見開之一夕天雨晦𠖇遥使錢以九節杖負此箧錢將出行取道非所㑹經度行十里登一小山入石室中先有二人遥見既至取箧發之中有數寸截竹簧三枚三人各吹一簧良久復内箧中辭石室中人乃還家著舊葛单衣及日中負竹箧而去遂不復還後三年弟子見遥在馬蹄山下頗更少蓋地仙也又曰陳子皇濟隂人也得餌术方服之絶榖初年七十餘已衰及服餌反少在民間積年入霍山去又曰葛洪字稚川琅琊人不好榮爵閉門却掃好神仙道術嘗求交遊於餘杭山見何多道郭文舉目擊而已各無所言後從吳𤣥時學道得成以其練丹術}
