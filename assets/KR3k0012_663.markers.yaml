  - {type: variant, offset: 1329, length: 271, content: 沈文泰者九疑人得紅泉神丹法去土符還年之道服之甚効欲之崑崙留息積年以傳李文淵曰土符不去服藥行道無益也文淵遂受其祕要後亦仙去令以竹根汁煮丹及黃神去三尸法又曰沉羲吳郡人學道於蜀能治病救人甚有恩德後遇羽衣持節人以白玉版青玉丹書授羲羲不能讀須臾大霧霧解失其人羲還後仙去又曰陳安世京兆人為灌叔本傭稟性慈仁叔本好道有二道人託為書生從叔本遊以觀試之叔本不知其異人也久而益怠書生乃問安世曰爾好道否曰無緣知之曰審好道明日早會道北大樹下安世承言早往無所見曰書生詐我哉三期安世輒早至乃以藥授安世後仙去又曰吳睦長安人少為縣吏掌局枉剋人民訟之睦逃去入山林飢累日行至石室遇, SBCK: ''}
