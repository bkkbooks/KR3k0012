  - {type: variant, offset: 1335, length: 610, content: 闇闇無所見火乃光耳故曰在於闇中當今之時世暗甚矣人主有能明其德者天下之士歸之也若蟬之赴明火也又曰子之於父母也一體而兩分同氣而異息若草莽之有華實也樹木之有根心也又曰樹木盛則飛鳥歸之芻草美則禽獸歸之人主賢則豪桀歸之韓子曰待自直之箭則百世無矢矣待自圓之木則千歲無輪矣又曰君者壤地臣者草木商子曰蠹眾則木拆隙大則牆壞文子曰葉落者風搖之水濁者物撓之也又曰甘泉必竭良木必伐符子曰木生蝎蝎盛而木枯石生金金曜而石流又曰水生於石未有居石而溺火生於木未有抱木而燋淮南子曰草木洪者為本而殺者為末禽獸之性大者為首而小者為尾末大於本則折尾大於腰則不掉故食其口而百節肥灌其本而枝葉美又曰夫樹木灌以潦水疇以肥壤千人養之一人拔之則必無餘孽況以一國同伐之雖欲久豈可得哉又曰山生金反自刻木生蠹反自食人生事反自賊賊敗也又曰今夫徙樹者失其陰陽之性則莫不枯槁失猶易也故橘之江北則化而為枳鸜鵒不過濟洛度汶而死又曰馮生陽閼自馮之先也陽閼生鱗鮐音台鱗鮐生幹木幹木生庶木凡根枝者生庶木根枝木名也又曰高山深林非為虎豹也大木茂枝非為飛鳥也又曰天有明不憂民之晦也百姓穿戶鑿牖自取炤焉地有財不憂民之貧也百姓伐木艾草自取富焉又曰郢人有買屋棟者求大三圍之木而人予車轂跪而度之巨雖可而長不足巨大云長不足言其短也又曰食木者多力而惡熊犀之屬是也食草者善走而愚麋鹿之屬是也又曰良匠不能斷金巧治不能鑠木金之勢不可斷而木之性不可鑠也又曰高陽魋或曰高陽魋宋大夫也將為室問匠人匠人對曰未可也木尚生加塗其, SBCK: ''}
