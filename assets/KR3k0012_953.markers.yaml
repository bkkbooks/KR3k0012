  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_953-1a, image: WYG0901/WYG0901-0425a.png}
  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第九百五十三}
  body:
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 二木下松木下郭子撗洞􅁳記曰太􅀄三年東方朔從西郍國還漢得聲風木枝十枚九尺大如指直可愛縉雲封禪之時許貢其木爲車輦之用此木生因洹之水則禹貢所謂因洹也其洹出甜波樹上有紫鷰黄鵠集其間實如細珠風吹枝如玉聲因以爲名春夏馨香秋冬聲清有武事則如金革之響有文章則如琴瑟之響上以枝遍賜羣臣百歳者皆以此枝頒賜人有疾者枝則汗出死者枝則折昔老聃在於周丗言七百年枝未汗偓佺生於堯時巳年三千歳植此竟未析上乃以枝賜朔朔曰臣巳見枝三遍枯死死而復何啻於汗折而巳哉里語曰年未半枝不汗此木五千歳}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_SBCK_953-1b}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 二木下松木下郭子横洞㝠記曰太初三年東方朔從西國還漢得聲風木十枝枝皆九尺大如指眞可愛縉雲封禪之時許貢其木為車輦之用此木樹上有紫鷰黄鵠集其間實如細珠風吹如玉磬因以為名春夏馨香秋冬聲清有武士則如金革之響有文章則如琴瑟之音上以枝遍賜羣臣百嵗皆以枝頒賜人有疾者枝則汁出死者枝則折昔老聃在於周世年七百枝未汁偓佺生於堯時已年三千嵗植此竟未折上乃以枝賜東方朔朔曰臣已見枝三遍枯死死而復生何啻于汁折而已哉里語曰年未半枝不汁此木五千嵗}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_WYG_953-1b, image: WYG0901/WYG0901-0425b.png}
  - {type: variant, offset: 2, length: 0, content: '', krp: 二木下松木下郭子撗洞冥記曰太𥘉三年東方朔從西郍國還漢得聲風木枝十枚九尺大如指直可愛縉雲封禪之時許貢其木爲車輦之用此木生因洹之水則禹貢所謂因洹也其洹出甜波樹上有紫鷰黄鵠集其間實如細珠風吹枝如玉聲因以爲名春夏馨香秋冬聲清有武事則如金革之響有文章則如琴瑟之響上以枝遍賜羣臣百歳者皆以此枝頒賜人有疾者枝則汗出死者枝則折昔老聃在於周丗言七百年枝未汗偓佺生於堯時巳年三千歳植此竟未析上乃以枝賜朔朔曰臣巳見枝三遍枯死死而復何啻於汗折而巳哉里語曰年未半枝不汗此木五千歳}
