  - {type: variant, offset: 13, length: 140, content: 木也為堅多心艮其於木也為堅多節離其於木也為科上槁堅多心為剛中也山木堅心也多其節令陰氣故曰科空也為日所乾故上槁也又升卦曰地中生木升君子以順德積小以高大書曰兗州厥木惟喬厥貢惟木孔安國曰喬高又洪範五行三曰木木曰曲直曲直作酸又說命曰木從繩則正后從諫則聖詩曰黃鳥于飛集于灌木其鳴喈二灌木叢木, SBCK: 阿閣間}
