  - {type: variant, offset: 371, length: 1, content: 草, WYG: 松為長生論語哀公問社於宰我宰我對曰夏后氏以松殷人以栢周人以栗又曰嵗寒然後知松栢之後彫也史記曰松栢為百}
  - {type: variant, offset: 371, length: 1, content: 草, krp: 松爲常生論語曰哀公問社於宰我宰我對曰夏后氏以松殷人以柏周人以栗又曰歳寒然後知松柏之後彫也史記曰松柏爲百}
  - {type: variant, offset: 373, length: 4, content: 豐茂左傳, SBCK: 長也而守宫闕也漢書曰賈山言治亂曰􅁗爲馳道五十歩三丈而樹厚築其外隱以金椎服䖍曰作壁通道􅀮築也以鐵椎築之樹以青松爲馳道之麗使其後丗曽不得斜遥而託足焉應劭漢官儀曰􅁗始皇上封泰山逢疾風􅁀雨頼得抱樹因封其樹爲五大夫松㤗山云岱宗小天門猶有秦時五大夫松張勃吴録曰丁固字子賤㑹稽人寳鼎中拜司徒􅀄爲尚書夢松樹生腹上謂人曰松字十八公也後十八年爲公遂如夢王隱晉書}
