  - {type: variant, offset: 2395, length: 0, content: '', WYG: 年既數百化為䨇鵠一者失之尋為人所害一者獨棲此松㷀立哀哭𤣥中記曰松脂淪入地中千嵗為茯苓博物志曰荒亂不得食可細切松栢葉水送令下隨能否以不飢為度粥清送為佳當用栢葉五合松葉三合不可過度嵩髙山記曰嵩髙上有}
