  - {type: variant, offset: 2393, length: 0, content: '', SBCK: 松三千歳者皮中有聚芝如龍形名曰飛節芝又曰玉榮記稱千歳松樹邊枝起上杪不長望而視之有如偃蓋其中有物或如青牛青羊青犬或如人服之皆壽萬歳又曰天陵偃蓋之松大谷倒生之栢几此諸木皆與天齊其長地等其乆也又曰謂夏必長而齊麥枯謂冬必彫而松柏茂符子曰符子與子登乎太}
  - {type: variant, offset: 2393, length: 0, content: '', WYG: 松三千嵗者皮中有聚芝如龍形名曰飛節芝又曰玊策記稱千嵗松樹四邊披起上抄不長望而視之有如偃蓋其中有物或如青牛青羊青犬或如人服之皆壽萬嵗又曰天陵偃蓋之松大谷倒生之栢凡此諸木皆與天地齊其長乆也又謂夏必長而薺麥枯謂冬必彫而松栢茂符子曰符子登乎泰}
  - {type: page-break, offset: 2393, content: '', id: KR3k0012_WYG_953-8a, image: WYG0901/WYG0901-0428c.png}
  - {type: variant, offset: 2393, length: 0, content: '', krp: 松三千歳者皮中有聚芝如龍形名曰飛節芝又曰玉榮記稱千歳松樹邊枝起上杪不長望而視之有如偃蓋其中有物或如青牛青羊青犬或如人服之皆壽萬歳又曰天陵偃蓋之松大谷倒生之栢几此諸木皆與天齊其長地等其乆也又曰謂夏必長而齊麥枯謂冬必彫而松柏茂符子曰符子與子登乎太}
  - {type: variant, offset: 2394, length: 0, content: '', SBCK: 下臨千仞之淵上䕃百丈之松蕭蕭然神王乎一丘矣言不出乎耒耜心不過乎俗人其猶木犬守户瓦雞伺晨矣先聖本記曰許由欲觀帝意曰帝坐華堂面􅀟闕君之榮顧亦得矣余坐華堂森然有松生於牖雖面􅀟闕無異乎囬鸞之榮崑崙余安知其一所以取榮哉帝羙由師之列仙傳曰伏生者當湯時爲木正常食松脂自作石室周武王祠之偓佺好食松實能飛行逮走馬以松子遺堯不能服異苑曰漢末大亂宫人小黃門上墓樹上避兵食松柏實遂不復飢舉體生毛長尺許亂離旣平魏武聞而始牧飬還食榖米齒落頭白少神境記曰滎陽南有石室室後有􅀌松千丈常有䨥鵠晨必接翮夕輙偶影傳云昔有夫婦二人俱隱此室}
  - {type: page-break, offset: 2394, content: '', id: KR3k0012_SBCK_953-5b}
  - {type: variant, offset: 2394, length: 0, content: '', WYG: 下臨千仞之淵上䕃百丈之松蕭蕭然神徃乎一丘矣言不出乎耒耜心不過乎俗人其猶木犬守户瓦鷄司晨矣先聖本記曰許由欲觀帝意曰帝坐華堂面雙闕榮顧亦得矣余坐華堂森然有松生於戸雲生於牖雖面雙闕異乎鸞之榮崑崙余安知其所以取榮哉帝美由師之列仙傳曰仇生赤當湯時為木正常食松脂自作石室周武王祠之偓佺好食松實能飛行速如走馬以松子遺尭不能服異苑曰漢末大亂宮人小黄門上墓樹上避兵食松栢實遂不復飢舉體生毛長尺許亂離既平魏武聞而始收養還食穀米齒落頭白神境記曰榮陽南有石室室後有孤松千丈常有䨇鵠晨必接翮夕輒偶影傳云昔有夫婦二人俱隐此室}
  - {type: page-break, offset: 2394, content: '', id: KR3k0012_WYG_953-8b, image: WYG0901/WYG0901-0428d.png}
  - {type: page-break, offset: 2394, content: '', id: KR3k0012_WYG_953-9a, image: WYG0901/WYG0901-0429a.png}
  - {type: variant, offset: 2394, length: 0, content: '', krp: 下臨千仞之淵上䕃百丈之松蕭蕭然神王乎一丘矣言不出乎耒耜心不過乎俗人其猶木犬守户瓦雞伺晨矣先聖本記曰許由欲觀帝意曰帝坐華堂面雙闕君之榮顧亦得矣余坐華堂森然有松生於牖雖面雙闕無異乎囬鸞之榮崑崙余安知其一所以取榮哉帝羙由師之列仙傳曰伏生者當湯時爲木正常食松脂自作石室周武王祠之偓佺好食松實能飛行逮走馬以松子遺堯不能服異苑曰漢末大亂宫人小黃門上墓樹上避兵食松柏實遂不復飢舉體生毛長尺許亂離旣平魏武聞而始牧飬還食榖米齒落頭白少神境記曰滎陽南有石室室後有孤松千丈常有䨥鵠晨必接翮夕輙偶影傳云昔有夫婦二人俱隱此室}
  - {type: variant, offset: 2395, length: 0, content: '', SBCK: 年旣數百化爲􅀟鵠一者失之㝷爲人所害一者獨捿此松煢立哀唳玄中記曰松脂淪入地中千歳爲伏神茯苓愽物志曰荒亂不得食可細切松柏葉水送令下隨能否以不飢爲度粥清送爲佳當用柏葉五合松葉三合不可過度嵩髙山記曰嵩髙丘有}
