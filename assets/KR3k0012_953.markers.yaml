  - {type: variant, offset: 164, length: 1, content: 往, SBCK: 魚墜一鱗崑崙之木落一葉聖人皆能知王韶之始興記曰漢將滅越王築城伐木將運之一夜木數千件頓亡越亡之徴方言曰木細枝謂之杪江淮楊楚之間謂之蔑􅐭鐵論曰茂木之下無豐草大塊之間無羙苗搜神記曰廬江舒縣陵亭有流水邊有大樹常有黄鳥數千枚巢其頭而有故祠後見一婦人着繡衣自􅁛黄祖能興雲􅀨地鏡圖曰財在丘墟者爲木變故木有折枯者其旁有財折所向在焉其在南方去木八尺其在東方去木六尺離騷曰一夫九首抜木九千又云嫋嫋兮秋風洞庭波兮木葉下又云􅊻何爲兮木上又云搴芙蓉於木末又曰樹輪囷以相糺􅀆林木跃骫音委枝葉盤紆也左思蜀都賦曰其樹則擢脩榦竦長條扇飛雲拂輕霄羲和假於道峻岐陽烏囬翼乎髙標王彪之閩中賦曰木則騰虹籠採於峻藂流星麗光於髙林松書曰青州厥貢􅃮絲鈆松怪石詩曰徂}
