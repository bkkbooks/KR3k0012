  - {type: variant, offset: 4162, length: 0, content: '', SBCK: 康中每語郷里曰李仲儁有大貴之表終爲人主也車頻􅁗書曰符堅時四夷賔服湊集關中四方種人皆竒貌異色晉人爲之題目謂胡人爲側鼻東夷爲廣面闊頞北狄爲匡脚面南蠻爲腫蹄方方以􅀋名也呉均齊春秋曰太祖神容魁梧天表英特體有龍文寛雅沉深喜怒不形於人隋書曰髙祖文帝龍顔額有五柱入頂目光外射晏子春秋曰伊尹倨身湯傴孫卿子非曰衛靈公有臣公孫吕長七尺面居三尺廣三寸鼻目取具名振天下管子曰子産日角晏平仲月角尾生犀角栁下惠史魚反角丈子曰人頭之圎以法天足之方以象地天有四時五行九解三百六十日人亦復有四支五藏九竅三百六十節天有風雨寒暑人亦有取與喜怒膽爲雲肺爲雨脾爲風腎爲電肝爲雷以與天地相􅀋而心爲之主耳目者日月也而血氣者風雨也日月失行而薄蝕無光風雨非時毀折生災五星失行州土受其殃天地之道愛其神明人之耳目何能乆勤而不愛精神何能乆馳而不止是故聖人内而不失也孔叢子曰魏安􅁵王欲以馬回爲相問子順曰回爲人便便亮直之丈夫也順曰聞諸孫卿其爲人長目而豕視必體方而心圎臣見其面非不偉其體幹而疑其目王卒用之果以謟得罪莊子曰老萊子弟子出薪遇仲尼反以告曰有人於彼修上而趣下末僂而後耳耳却近後而上僂也視􅀂營四海不知其誰氏之子老萊子曰是丘也淮南子曰形者生之舎也又曰夫神者所受於天也而形體者所禀於地也故曰一生二二生三三生萬物故曰一月而氣二月而血三月而胎四月而胞五月而筋六月而骨七月而成八月而動九月而躁十月而生形體以成五藏乃形是以肺主目腎主鼻膽主口肝主耳又地形篇曰東方川谷之所主日月之所生其人銳形小頭隆鼻大口鳶肩企行竅通於目筋氣屬焉倉色主肝長大早知而不壽南方陽氣之所浹暑温居之其人墮形銳上大口决眦竅通於耳血脉屬焉赤色主心早壯而夭西方髙土川谷出焉日月入焉其人皆方面脩頸卬行竅通於鼻皮革屬焉白色主肺而勇敢不仁北方幽晦不明天之所閉者也寒冰之所積者也其人翕形短頸大肩下凥竅通於隂骨幹屬焉黒色主賢其人惷愚而壽中央四逹風氣之所通􅀨露之所㑹也其人大面短頥美鬚竅通於口膚肉屬焉黄色主胃而惠聖博物志曰東方少陽日月所岀山谷清㓪其人姣好西方少隂日月所入其土窈􅄀其人髙鼻深目多毛南方太陽􅁟下水沃其人大口北方太隂土平廣深其人廣面縮頸中央四抄風􅀨交山谷峻其人端立神仙傳曰玉札金䇶内經皆云老子黄色美􅂡廣顙長耳大目踈齒方口厚脣有叅午逹理魚目虎鼻純骨􅀟柱耳有三門足蹈二五手把十丈列女傳曰叔􅁎之生叔魚也生而視之曰是虎目而豕啄鳶肩而牛腹谿壑可滿是不可猒也李邰别傳曰公長七尺八寸多􅂡髯八眉左耳有竒表項枕如鼎足手握三公之字管寧別傳曰寧身長八尺龍顔秀眉論衡曰蒼頡四目而佐帝公子重耳駢脅爲諸侯霸蘇􅁗骨鼻爲六國相張儀仳脅相􅁗魏頭上􅀃文曰首頭也顝口瓦切碩顒大頭也顆小頭也釋名曰頭獨也處體髙而獨尊也首}
