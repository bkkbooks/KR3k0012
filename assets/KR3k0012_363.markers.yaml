  - {type: variant, offset: 2141, length: 416, content: 以畜牲則廢祀以器幣則廢禮晉以僖侯廢司徒僖侯名司徒廢為中軍也宋以武公廢司空武公名司空廢為司城也先君獻武廢二山二山具敖也魯獻公名具武公名敖是以大物不可以命公曰是其生也與吾同物命之曰同物類也謂同日也又閔公曰成季之將生也桓公使卜楚丘之父卜之曰男也其名曰友及生有文在其手曰友遂以命之遂以為名又文下曰鄋瞞侵齊鄋瞞狄國名遂伐我公卜使叔孫得臣追之吉冬十月敗狄于鹹獲長狄僑如僑如鄋瞞國之君以命宣伯得臣待事而名其三三子因名宣伯曰僑如以旌其功也又宣上曰楚鬭伯比淫於䢵子之女生子文立諸夢中虎乳之䢵子畋見之使收之楚人謂乳為穀謂虎為於菟故命曰鬭穀谷於菟又宣上曰鄭文公有賤妾曰燕姞夢天使與己蘭曰予為伯儵余爾祖也以是為而子以蘭有國香人服媚之如是既而文公見之與之蘭而御之辭曰妾不才幸而有子將不信敢徵蘭乎公曰諾生穆公名之曰蘭又定下曰魯苫越生子將待事而名之陽州之役獲焉名之曰陽州欲自比僑如漢書曰司馬相如小名犬子及長慕蘭相如為人更名相如後漢書曰趙歧字臺卿生於御史臺因字臺卿, SBCK: 鍵􅐬}
