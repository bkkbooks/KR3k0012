  - {type: variant, offset: 4169, length: 1, content: 仕, krp: 儀曰頭容耳不傾頋也頭頸必中頭容直也樂汁圖曰赤帝銳頭黒帝大頭宋均注曰銳頭像朱鳥也左傳昭二年曰豎牛奔齊孟仲之子殺諸塞關之外投其首於寧風之棘上春秋元命苞曰頭者神所居上貟象天氣之府也歳必十二故人頭長一尺二寸爾雅曰元首也左傳曰狄人歸先軫之元孝經援神契曰頭圎象天足方法地史記曰藺相如爲趙使秦持璧却立倚柱謂秦王曰趙王齋戒五日使臣奉璧今大王見臣禮節甚倨得璧傳之美人以爲戯弄臣故復取璧大王必欲急臣臣頭今與璧俱碎於柱矣又曰須賈使秦見范睢睢數之曰爲我告魏王急持魏齊頭來不者我屠大梁賈歸告齊亡匿趙平原君所齊遂自頸趙王取頭與秦又曰欒布爲梁大夫使於齊未還漢誅彭越梟頭雒陽下詔曰有敢收視者捕之欒布從齊還奏事於彭越頭下戰國䇿曰三}
  - {type: variant, offset: 4171, length: 4, content: 臺為倉部, SBCK: 分智氏趙襄子最怨智伯􅃮其頭以爲飲器史記同又曰白頭如新傾蓋如舊漢書曰項籍顧見漢􅀐司馬吕馬童曰􅀂非吾故人乎馬童面之指王翳曰此項王也羽曰吾聞漢購我頭千金邑萬户吾爲公得乃自剄王翳取其頭又曰髙祖招田横横至尸郷厩謂從者曰陛下欲一見我面耳今斬吾頭馳三十里形猶未敗遂自剄}
  - {type: variant, offset: 4171, length: 4, content: 臺為倉部, krp: 分智氏趙襄子最怨智伯􅃮其頭以爲飲器史記同又曰白頭如新傾蓋如舊漢書曰項籍顧見漢騎司馬吕馬童曰若非吾故人乎馬童面之指王翳曰此項王也羽曰吾聞漢購我頭千金邑萬户吾爲公得乃自剄王翳取其頭又曰髙祖招田横横至尸郷厩謂從者曰陛下欲一見我面耳今斬吾頭馳三十里形猶未敗遂自剄}
