  - {type: variant, offset: 3401, length: 747, content: 子而大司馬江夏王義恭諸子為元凶所殺至是並各產男上自為制名名義恭子為伯禽以比魯公伯禽周公旦之子也名竣子為辟彊以比漢侍中張辟彊張良之子也宋書曰謝莊五子䬅力計切朏顥嵷音揔𤅢音藥世謂莊名子以風月景山水梁書曰張嵊字四山初嵊父稷為剡令至嵊亭生之因名嵊字四山少敦孝行年三十餘猶班衣受稷杖動至數百收淚歡然三國典略曰周陸逞字季明綏德郡公通之弟也初名彥字世雄魏文帝嘗從容謂之曰爾既溫裕何乃字世雄且為世之雄非所宜也於爾兄弟又復不類遂改焉南史曰陳文帝嘗謂宣帝曰我諸子皆以伯為名汝諸子宜用叔為稱宣帝因以訪毛喜喜即條自古名賢杜叔英虞叔卿等二十餘人以啟之文帝稱善白虎通曰人必有姓名何以吐情自紀尊事人者也論語曰名不正則言不順三月名之何天道一時物有其變人生三月目煦亦能咳笑與人相荅故因其始有知而名之故禮傳曰子生三月則父名之名之於祖廟者謂子之親廟也明當為宗祖子也一說名之於燕寢名者幼小卑賤之稱也質略故於燕寢殷以日名子何殷家質直故以生日名也尚書言太甲帝乙武丁也於名臣亦得以甲乙生日名子不使亦不止也以尚書道殷臣有巫咸有祖己也何以諸侯不象王者以生日名子也以大王名亶甫王季名歷此殷之諸侯也不以子丑為名何曰甲乙者幹也子丑者枝也幹者本本貫故以甲乙為名也名或兼或單何名子非一或聽其聲律定其名或依其事旁於形故或兼或單也依其事者若后稷是也棄之因名為棄旁其形者孔子首類魯尼丘山故以為之名也風俗通曰袁賀字元服祖父京為侍中安帝始加元服京入賀而賀始生因名之曰賀而字元服鄭玄別傳曰玄一子名益字益思年二十三相國孔府君舉孝廉府君以多寇屯都昌為賊管亥所圍乃令從家將兵奔救遇賊見害時年二十七也妻有遺體生男玄以太歲在丁卯生此男以丁卯日生生又手理與玄相似故名曰小同孟宗別傳曰孟宗為豫章太守民思其惠路有行歌故時之生子者多以孟為名江祚別傳曰祚為南安太守民思其德生子多以為名字, SBCK: 精曜}
