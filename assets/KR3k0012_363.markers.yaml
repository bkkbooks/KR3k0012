  - {type: variant, offset: 1538, length: 186, content: 堯母字慶都配高辛氏而生堯因主人伊長孺為姓謂之伊陳留風俗傳曰侯氏氏侯爵周微官失其守故以侯爵為姓又曰秦之先曰伯翳佐舜擾馴鳥獸錫姓曰嬴氏其後分封以國為姓有徐氏郯氏黃氏江氏文士傳曰束晳字廣微踈廣後也王莽末廣曾孫孟造自東海避難歸蕪城改姓去踈之足為束氏世說曰諸葛令恢與王丞相共爭姓族前後王曰何不言葛王而言王葛諸葛曰譬言驢馬不言馬驢驢寧勝馬耶論衡曰孔子推律自知殷之苗也名禮記曲禮上曰名子, SBCK: 學}
