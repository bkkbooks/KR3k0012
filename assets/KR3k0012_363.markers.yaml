  - {type: variant, offset: 4173, length: 2, content: 倉部, WYG: 趙使秦持璧却立倚柱謂秦王曰趙王齋戒五日使臣奉璧今大王見臣禮節甚倨得璧傳之美人以為戲弄臣故復取璧大王必欲急臣臣頭今與璧俱碎於柱矣又曰湏賈使秦見范睢睢數之曰為我告魏王急持魏齊頭來不者我屠大梁賈歸告齊亡匿趙平原君所齊遂自頸趙王取頭與秦又曰欒布為梁大夫使於齊未還漢誅彭越梟頭雒陽下詔曰有敢收視者捕之欒布從齊還奏事彭越頭下戰國策曰三晋分智氏趙襄子最怨智伯漆其頭以為飲器史記同又曰白頭如新傾盖如舊漢書曰項藉頋見漢騎司馬吕馬童曰若非吾故人乎馬童面之指王翳曰此項王也羽曰吾聞漢購我頭千金邑萬户吾為公得乃自剄王翳取其頭又曰高祖招田横横至尸鄉廐謂從者曰陛下欲一見我面耳今斬吾頭馳三十里形猶未敗遂自頸}
