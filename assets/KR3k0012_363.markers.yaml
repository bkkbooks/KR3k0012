  - {type: variant, offset: 2940, length: 370, content: 童謠云誰謂爾堅石打破故桓豁以石名子以邀其功晉中興書曰咸和元年當徵蘇峻司徒導欲出王舒為外授及更拜撫軍將軍會稽內史秩中三千石舒上䟽以父名會不得作會稽朝議以字同音異於禮無嫌舒陳音雖異而字同乞換他郡於是改會字為鄶古會切舒不得已親職崔鴻十六國春秋前涼錄曰李弇字子隴西狄道人也弇本名良又妻姓梁張駿戲之曰卿名良妻姓梁夫妻相同稱子孫將何以目其舅氏昔耿弇以少年立功立事吾今賴卿有同於耿氏乃賜名曰弇又曰陳安成紀平莊人也少慷慨讀書見許褚而慕之乃自字虎侯後魏書曰游肇字伯始高祖賜名尚書令高肇世宗之舅為百寮懾憚以肇名與己同欲令改易肇以高祖所賜秉志不許高肇甚銜之世宗嘉其剛梗又曰太和初宋弁為殿中郎中高祖嘗因朝會之次歷訪治道弁年少官微自下而對聲姿清亮進止可觀高祖稱善者久之因是大被知遇賜名為弁意取弁和獻玉楚王不知寶也宋書曰廢帝諱昱字德融小字惠震明帝長子也大明七年正月辛丑, SBCK: 白毫}
