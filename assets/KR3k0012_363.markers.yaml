  - {type: variant, offset: 4169, length: 1, content: 仕, SBCK: 儀曰頭容耳不傾頋也頭頸必中頭容直也樂汁圖曰赤帝銳頭黒帝大頭宋均注曰銳頭像朱鳥也左傳昭二年曰豎牛奔齊孟仲之子殺諸塞􅀜之外投其首於寧風之􅁄上春秋元命苞曰頭者神所居上貟象天氣之府也歳必十二故人頭長一尺二寸爾雅曰元首也左傳曰狄人歸先軫之元孝經援神契曰頭圎象天足方法地史記曰藺相如爲趙使􅁗持璧却立􅀝柱謂􅁗王曰趙王齋戒五日使臣奉璧今大王見臣禮節甚倨得璧傳之美人以爲戯弄臣故復取璧大王必欲急臣臣頭今與璧俱碎於柱矣又曰須賈使􅁗見范睢睢數之曰爲我告魏王急持魏齊頭來不者我屠大梁賈歸告齊亡匿趙平原君所齊遂自頸趙王取頭與􅁗又曰欒布爲梁大夫使於齊未還漢誅彭越梟頭雒陽下詔曰有敢收視者捕之欒布從齊還奏事於彭越頭下戰國䇿曰三}
  - {type: page-break, offset: 4169, content: '', id: KR3k0012_SBCK_363-6b}
  - {type: variant, offset: 4169, length: 3, content: 仕晉臺, WYG: 儀曰頭容直不傾顧也頭頸必中頭容直也樂汁圖曰赤帝鋭頭黒帝大頭宋均注曰鋭頭象朱鳥也左傳昭二年曰竪牛奔齊孟仲之子殺諸塞關之外投其首于寕風之棘上春秋元命苞曰頭者神所居上員象天氣之府也嵗必十二故人頭長一尺二寸爾雅曰元首也左傳曰狄人歸先軫之元孝經援神契曰頭圓象天足方法地史記曰藺相如}
