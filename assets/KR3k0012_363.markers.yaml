  - {type: variant, offset: 1997, length: 143, content: 以類為象若孔子首象尼丘山取於物為假若伯魚生人有饋之魚因名之曰鯉取於父為類若子同生有與父同者也不以國國君之子不自以本國為名也不以官不以山川不以隱疾不以畜牲不以器幣周人以諱事神名終將諱之君父之名固非臣子所斥然禮既卒器以木鐸徇曰舍故而諱新謂舍親盡之祖而諱親死者故以國則廢名以官則廢職以山川則廢, SBCK: ''}
