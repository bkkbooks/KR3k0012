  - {type: variant, offset: 4287, length: 1, content: 人, SBCK: 凶甚矣延後果誅楊儀蹋延頭曰庸能復作惡又曰先主與張飛趙雲等泝流而上分定郡縣時巴郡嚴顔率衆守城不降及城䧟縛顔至飛呵顔曰汝見大軍至何以不降而敢拒戰顔荅曰我州但有斷頭將軍無降將軍也飛怒命左右牽去斫頭大􅀏曰斫頭便斫頭何爲怒耶於是飛壯而釋}
  - {type: variant, offset: 4287, length: 1, content: 人, WYG: 㐫甚矣延後果誅楊儀蹋延頭曰庸能復作惡又曰先主與張飛趙雲等沂流而上分定郡縣時巴郡嚴顔率衆守城不降及城䧟縛顔至飛呵顔曰汝見大軍至何以不降而敢拒戰顔答曰我州但有断頭将軍無降将軍也飛怒命左右牽去砍頭大笑曰斫頭便斫頭何為怒耶於是飛壮而釋}
  - {type: variant, offset: 4287, length: 1, content: 人, krp: 凶甚矣延後果誅楊儀蹋延頭曰庸能復作惡又曰先主與張飛趙雲等泝流而上分定郡縣時巴郡嚴顔率衆守城不降及城䧟縛顔至飛呵顔曰汝見大軍至何以不降而敢拒戰顔荅曰我州但有斷頭將軍無降將軍也飛怒命左右牽去斫頭大笑曰斫頭便斫頭何爲怒耶於是飛壯而釋}
  - {type: variant, offset: 4289, length: 234, content: 名不如其字尊乃謂為人所字則近乎見尊為人所名則近乎見卑也古之君子之名子也必以信義而擇淑令所以祥其名也不以官職所以殊其名也不以畜幣所以重其名也不以隱疾所以顯其名也遍告內外所以昭其名也書而藏之所以寶其名也賤者避焉所以貴其名也冠而有字所以尊其名也名成乎禮字依乎名名字之本字名之末也為本故尊為末故卑尊故其禮詳卑故其事略也且婦人無名故賤於丈夫野人無名故賤於學士名者己之所以事尊尊者之所以命己字則己之所以接卑卑者之所以稱己未有用之於尊而為卑用之於卑而為尊者也搜神記曰齊惠之妾蕭桐子見, SBCK: 引爲上客太平}
