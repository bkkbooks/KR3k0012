  - {type: variant, offset: 13, length: 24, content: 古之神聖人母感天而生子故稱天子因生以從女生生亦聲, WYG: 春秋説曰字者餙}
  - {type: page-break, offset: 13, content: '', id: KR3k0012_WYG_363-1b, image: WYG0896/WYG0896-0237d.png}
  - {type: variant, offset: 13, length: 538, content: 古之神聖人母感天而生子故稱天子因生以從女生生亦聲也易類謀曰黃帝吹律以定姓左傳隱八年曰無駭卒羽父請謚與族公問族於眾仲眾仲對曰天子建德因生以賜姓因其所由生以賜姓謂若舜由媯汭故謂陳為媯姓胙之土而命之氏諸侯以字諸侯位卑不得賜姓故其臣因氏其王父字為謚因以為族官有世功則有官族邑亦如之公命以字為展氏無駭公子展之孫故為展氏也又襄四年曰穆叔如晉范宣子逆之問焉曰古人有言曰死而不朽何謂也穆叔未對宣子曰昔匄之祖自虞以上為陶唐氏在夏為御龍氏在啇為豕韋氏在周為唐杜氏晉主夏盟為范氏其是之謂乎穆叔曰以豹所聞此之謂世祿非不朽也史記曰太公望呂尚者東海上人其先祖嘗為四嶽佐禹平水土甚有功虞夏之際封於呂本姓姜氏從其封姓故曰呂尚漢書曰夏侯嬰為滕令故號滕公及曾孫頗尚主主隨外家姓號孫公故滕公子孫更為孫氏又曰戍卒婁敬求見說上曰陛下取天下與周異而都雒陽不便不如入關據秦之固上以問張良良因勸上是日車駕西都長安拜婁敬為奉春君賜姓劉氏又曰灌夫潁陰人也父張孟嘗為潁陰侯灌嬰舍人因得幸進之至二千石故蒙灌氏姓為灌孟師古曰蒙冒也又曰衛青字仲卿其父鄭季河東平陽人也以縣吏給事侯家平陽侯曹壽尚武帝姊陽信長公主季與主家僮衛嫗通生青青有同產兄衛長君及子夫子夫自平陽公主家得幸武帝故青冒姓衛氏漢書曰京房字君明東郡頓丘人也房本姓李推律自定為京氏, krp: 謝承}
