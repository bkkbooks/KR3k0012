  - {type: variant, offset: 1409, length: 128, content: 語貶昭公娶於吳諱同姓也蓋姓有九或氏於號或氏於謚或氏於爵或氏於國或氏於官或氏於字或氏於居或氏於事或氏於職典號唐虞夏殷也以謚戴武宣穆也以爵王公侯伯也以國曹魯宋衛也以官司馬司徒司寇司空司城也以字伯仲叔季也以居城郭園池也以事巫卜陶丘也以職三馬五鹿青牛白馬也三輔舊事, SBCK: ''}
