  - {type: variant, offset: 4524, length: 173, content: 有身以其賤不敢言也取薪而生頃公於野又不敢舉也貍乳鸇覆之人見而收之因名無野何槙玄壽賜名敘曰新婦荀氏所生女以歲在丁丑四月五日日始出時生此月斗建巳其日又巳其時加卯甲乙卯皆東南春夏天地動發萬物滋生今月吉月之善時也又於易卦震位在卯巽位在巳震為長男巽為長女而此女孫正用茲日斯時始瞻日月豈伊先祖之靈寔臨祐之玄髮素顏婦人之上姿也壽考無疆生民之至願也故賜名曰玄壽焉, SBCK: 覽卷第三百六十三}
