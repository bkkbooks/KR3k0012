  - {type: variant, offset: 2982, length: 59, content: 餘並如故及王僧辯率眾征陸納於湘州承制命高祖代鎮楊州十一月湘東王即位于江陵改承聖元年明年湘州平高祖旋鎮京口三年三月進高祖, WYG: ''}
  - {type: variant, offset: 2982, length: 4, content: 餘並如故, krp: 司空安成王頊爲尚書令夏四月乙卯皇孫至澤生在位文武賜絹帛各有差爲父後者賜爵一級癸酉丗祖疾甚是日崩于有覺殿遺詔曰朕疾苦彌留遂至不救脩短有命夫復何言但王業艱難頻歲軍旅生民多弊無忘愧惕今方隅乃定俗教未弘便}
