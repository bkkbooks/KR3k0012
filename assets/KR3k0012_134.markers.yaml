  - {type: variant, offset: 2265, length: 373, content: 資之仍頓巴丘會侯景廢簡文帝立豫章嗣王楝高祖遣兼長史沈袞奉表于江陵勸進十一月承制授高祖使持節都督會稽東陽新安臨海永嘉五郡諸軍事平東將軍楊州刺史領會稽太守豫章內史餘並如故三年正月高祖率甲士三萬人強弩五千張舟艦二千乘發自豫章二月次桑落洲遣中記室參軍江元禮以事表江陵承制加高祖鼓吹一部是時僧辯已發湓城會高祖于白茅灣乃登岸結壇刑牲盟約進軍次蕪湖侯景城主張黑棄城走三月高祖與諸軍進剋姑熟仍次蔡州侯景登石頭城觀望形勢意甚不悅謂左右曰此軍上有紫氣不易可當乃以船䑰貯石沉塞淮口緣淮作城自石頭迄青溪十餘里中樓雉相接諸將未有所決僧辯遣杜崱問計於高祖高祖曰前柳仲禮數十萬兵隔水而坐韋粲之在清溪竟不渡岸賊乃登高望之表裏俱盡肆其凶虐覆我王師今圍石頭須渡北岸諸將若不能當鋒請先往立柵高祖即於石頭西橫隴築柵眾軍次連八城直出東北賊恐西州路斷亦於東北果林作五城以遏大路景率眾萬餘人鐵, WYG: 驃}
