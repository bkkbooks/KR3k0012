  - {type: variant, offset: 30, length: 0, content: '', SBCK: 少沉敏有識量羙容儀留意經史舉動方雅造次必遵禮法髙祖甚愛之常稱此兒吾宗之英秀也梁}
  - {type: variant, offset: 30, length: 0, content: '', krp: 少沉敏有識量羙容儀留意經史舉動方雅造次必遵禮法髙祖甚愛之常稱此兒吾宗之英秀也梁}
  - {type: variant, offset: 32, length: 0, content: '', SBCK: 􅀄帝夢兩日闘一大一小大者光滅墜地色正黄其大如斗丗祖因三分取一而懐之侯景之亂郷人多依山湖冦抄丗祖獨保家無所犯時亂日甚乃避地臨安及髙祖舉義兵侯景遣使収丗祖及衡陽獻王丗祖乃宻裏小刀冀因入見而害景至便屬吏故其事不行髙祖大軍圍石頭景欲加害者數矣㑹景敗丗祖乃得出赴髙祖營起家爲呉興太守髙祖受禪立爲臨川郡王邑二千户拜侍中安東將軍及周文育侯安都敗於沌口髙祖詔丗祖入衛軍儲戎備皆以委焉尋命率兵城南晥户板切永定}
  - {type: page-break, offset: 32, content: '', id: KR3k0012_SBCK_134-1b}
  - {type: variant, offset: 32, length: 0, content: '', krp: 𥘉帝夢兩日闘一大一小大者光滅墜地色正黄其大如斗丗祖因}
  - {type: variant, offset: 33, length: 4, content: 年封興梁, krp: 分取一而懐之}
  - {type: punctuation, offset: 34, content: ，, id: KR3k0012_CHANT_134-bkkpn9}
  - {type: 'tls:seg', offset: 34, content: '', id: KR3k0012_CHANT_134-1a.9}
  - {type: variant, offset: 34, length: 6, content: 封興梁侯承聖, SBCK: 六月景午髙祖崩遺詔徴丗祖入􅆲皇統甲寅至自南晥入居中書省其日即皇帝位於太極前殿詔曰上天降禍奄集􅀖家大行皇帝背離萬國率土崩心􅀂䘮考妣龍圗寳暦眇屬朕躬運鍾擾攘事務機務南靣須主西讓禮輕今便式膺景命光宅四海可大赦天下改永定四年爲天嘉}
  - {type: punctuation, offset: 38, content: 。, id: KR3k0012_CHANT_134-bkkpn10}
  - {type: 'tls:seg', offset: 38, content: '', id: KR3k0012_CHANT_134-1a.10}
  - {type: variant, offset: 38, length: 6, content: 承聖元年封晉, krp: 景之亂郷人多依山湖冦抄丗祖獨保家無所犯時亂日甚乃避地臨}
  - {type: punctuation, offset: 42, content: ，, id: KR3k0012_CHANT_134-bkkpn11}
  - {type: 'tls:seg', offset: 42, content: '', id: KR3k0012_CHANT_134-1a.11}
  - {type: variant, offset: 42, length: 5, content: 封晉安郡王, SBCK: 鰥寡􅀌獨不能自存立者賜榖人五斛孝悌力田殊行異等加爵一級甲寅分遣使者宣勞四方辛酉輿駕親祠南郊}
  - {type: variant, offset: 45, length: 1, content: 郡, krp: 及髙祖舉義兵侯景遣使収丗祖及衡陽獻}
  - {type: punctuation, offset: 47, content: 。, id: KR3k0012_CHANT_134-bkkpn12}
  - {type: 'tls:seg', offset: 47, content: '', id: KR3k0012_CHANT_134-1a.12}
  - {type: variant, offset: 47, length: 2, content: 二年, krp: 丗祖乃宻裏小刀冀因入見而害景至便屬吏故其事不行髙祖大軍圍石頭景欲加害者數矣㑹景敗丗祖乃得}
  - {type: punctuation, offset: 49, content: ，, id: KR3k0012_CHANT_134-bkkpn13}
  - {type: 'tls:seg', offset: 49, content: '', id: KR3k0012_CHANT_134-1a.13}
  - {type: variant, offset: 49, length: 3, content: 出為平, SBCK: 春正月庚戌大赦天下十二月立始興國廟於京師用王者之禮太子中庶子虞荔御史中丞孔奐以國用不足奏立煑海鹽及搉酤之稅並施行三年春正月庚戌設帷宫於}
  - {type: page-break, offset: 49, content: '', id: KR3k0012_SBCK_134-2a}
  - {type: variant, offset: 50, length: 123, content: 為平南將軍江州刺史三年十一月江陵陷太尉楊州刺史王僧辯司空南徐州刺史陳霸先定議以帝為太宰承制奉迎還京師四年二月至自潯陽入居朝堂以太尉王僧辯為中書監錄尚書驃騎將軍都督中外諸軍事加司空陳霸先班劍二十人三月齊遣其上黨主高渙送貞陽侯蕭淵明來主梁嗣至東關遣吳, krp: 赴髙祖營起家爲呉}
  - {type: variant, offset: 53, length: 0, content: '', SBCK: 郊幣告胡公以配天辛亥輿駕親祠南郊二月甲子改鑄五銖錢三月景子安成王頊至自周詔授侍中中書監中衛}
  - {type: punctuation, offset: 55, content: 、, id: KR3k0012_CHANT_134-bkkpn14}
  - {type: variant, offset: 55, length: 1, content: 江, SBCK: 置佐吏是􅀊周所立梁王蕭􅊫死子巋丘軌切代立天康元年春二月景子詔曰朕以寡德纂承洪緒日􅉴劬勞思弘景業而政道多昩􅀺庶未康兼疾患淹時元陽累月百姓何咎寔由朕躬念兹在兹痛加疾首可大赦天下改天嘉七年爲天康元年三月巳卯以驃􅀐將軍開府儀同三司楊}
  - {type: punctuation, offset: 59, content: 。, id: KR3k0012_CHANT_134-bkkpn15}
  - {type: 'tls:seg', offset: 59, content: '', id: KR3k0012_CHANT_134-1a.14}
  - {type: variant, offset: 59, length: 0, content: '', SBCK: 司空安成王頊爲尚書令夏四月乙卯皇孫至澤生在位文武賜絹帛各有差爲父後者賜爵一級癸酉丗祖疾甚是日崩于有覺殿遺詔曰朕疾苦彌留遂至不救脩短有命夫復何言但王業艱難頻􅀊軍旅生民多弊無忘愧􅅥今方隅乃定俗教未弘便及大漸以爲遺恨社稷任重太子可即君臨王侯將相善相輔翊内外叶和勿違朕意山陵務存儉速大斂竟羣臣}
  - {type: page-break, offset: 59, content: '', id: KR3k0012_SBCK_134-2b}
  - {type: variant, offset: 60, length: 0, content: '', SBCK: 日一臨公除之制率依舊典六月甲子羣臣上謚曰文皇帝廟號丗祖葬永寧陵陳伯宗陳書曰廢帝諱伯宗字奉業小字藥王丗祖嫡長子也永定二年拜臨川王丗子丗祖嗣位立爲皇太子天康元年四月世祖崩即皇帝位二年春詔大赦天下改光大元年孝悌力田賜爵一級輿駕祠南郊二}
  - {type: punctuation, offset: 64, content: ，, id: KR3k0012_CHANT_134-bkkpn16}
  - {type: 'tls:seg', offset: 64, content: '', id: KR3k0012_CHANT_134-1a.15}
  - {type: variant, offset: 64, length: 0, content: '', SBCK: 慈訓大后集群臣於朝堂令降爲臨海王送還藩邸是日出居别第太建二年薨時年十九陳頊陳書曰髙宗孝宣皇帝諱頊字紹丗小字師利始興昭烈王第二子也梁大通二年生有赤光滿室少寛大多智略及長羙容儀身長八尺三寸垂手過􅂰有勇力善􅀐射髙祖平侯景鎮京口梁元帝徴髙祖子姪入侍髙祖遣髙宗赴}
  - {type: page-break, offset: 64, content: '', id: KR3k0012_SBCK_134-3a}
  - {type: variant, offset: 66, length: 3, content: 陷太尉, SBCK: 累官爲直閣將軍中書侍郎時有馬軍主李㧾與髙宗有舊毎同遊處髙宗嘗夜􅀍酒張燈而寐揔􅃴出尋返乃見髙宗身是大龍揔便驚走時在􅀜右永定元年遙襲封始興郡王邑二千户三年丗祖嗣位改封安成王天嘉三年自周還授侍中中書監中衛將軍置佐吏尋授使持節都督楊南徐東楊南豫北江五州諸軍事}
  - {type: punctuation, offset: 67, content: ，, id: KR3k0012_CHANT_134-bkkpn17}
  - {type: 'tls:seg', offset: 67, content: '', id: KR3k0012_CHANT_134-1a.16}
  - {type: variant, offset: 73, length: 3, content: 王僧辯, SBCK: 進號驃􅀐將軍餘如故四年加開府儀同三司六年遷}
  - {type: punctuation, offset: 76, content: 、, id: KR3k0012_CHANT_134-bkkpn18}
