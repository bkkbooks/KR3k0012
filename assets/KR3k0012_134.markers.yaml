  - {type: variant, offset: 3478, length: 2, content: 詔授, WYG: 也梁大通二年生有赤光滿室少寛大多智略及長美容儀身長八尺三寸手垂過膝有勇刀善騎射}
  - {type: variant, offset: 3480, length: 4, content: 高祖侍中, krp: 尚書令廢帝即位拜司徒進號驃騎}
  - {type: variant, offset: 3482, length: 0, content: '', WYG: 平侯景鎮京口梁元帝徴高祖子姪入侍高祖遣高宗赴江陵累官為直閣將軍中書侍郎時有馬軍主李總與高宗有舊每同遊處高宗嘗夜被酒張燈而寐總適出尋返乃見高宗身是大龍總便驚走時在關右永定元年遥襲封始興郡王邑二千戸三年世祖嗣位改封安成王天嘉三年自周還授}
  - {type: punctuation, offset: 3484, content: 、, id: KR3k0012_CHANT_134-bkkpn682}
  - {type: variant, offset: 3484, length: 700, content: 大都督中外諸軍事車騎將軍楊南徐二州刺史持節司空班劍鼓吹並如故仍詔高祖甲仗百人出入殿省震州刺史杜龕據吳興與義興太守韋載同舉兵反高祖命周文育眾攻載于義興龕遣其從弟北叟將兵拒戰北叟敗歸義興二年正月癸未誅杜龕于吳興龕從弟北叟司馬沈孝敦並賜死二月庚申高祖遣侯安都周鐵武率舸艦備江川仍頓梁山起柵二月戊戍齊遣水軍儀同蕭軌庫狄伏連堯難宇東方老侍中裴英起東廣州刺史獨孤辟惡洛州刺史李希光并任約徐嗣徽等率眾十萬出柵口向梁山帳內盪主黃叢逆擊敗之燒其前軍船艦齊頓軍保蕪湖高祖遣定州刺史沈泰吳郡太守裴忌就侯安都共據梁山以禦之四月丁巳高祖詣梁山軍巡撫五月甲申齊兵發自蕪湖景申至𥞊陵故治高祖遣周文育屯方山徐度頓馬牧杜稜頓大航南已高祖率宗室王侯及朝臣將帥於大司馬門外白獸闕下刑牲告天以齊人背約發言慷慨涕泗交流同盟皆莫能仰視士卒觀者益奮辛丑齊軍於秣陵故縣跨淮立橋柵引渡兵馬其夜至方山侯安都周文育徐度等各引兵還京師癸未齊兵自方山進及兒塘游騎至臺周文育侯安都頓白土崗旗鼓相望都邑震駭高祖潛撤精卒三千配沈泰渡江襲齊行臺趙彥深於瓜步獲舟艦百餘艘陳粟萬斛六月壬辰齊兵潛至鍾山龍尾丁未進至幕府山高祖命眾軍秣馬蓐食遲明攻之乙卯旦自率帳內麾下出幕附山南吳明徹沈泰等眾軍首尾齊舉縱兵大戰侯安都自白下自引兵橫出其後齊師大潰斬獲數千相蹂藉而死者不可勝計生執徐嗣宗斬之以徇追奔至于臨沂其江乘攝山鍾山等諸軍相次克捷七月景子詔授高祖中書監司徒楊州刺史進爵為公增邑并前五千戶并給油幢皂輸車是月侯瑱他甸切以江州入附遣侯安都鎮上流定南中諸郡八月癸卯太府卿何敳五耒切新州刺史華志各上玉璽一高祖表以送臺詔歸之高祖是日詔高祖食安吉武康二縣合五千戶九月進高祖位丞相錄尚書事鎮衛, SBCK: 護}
