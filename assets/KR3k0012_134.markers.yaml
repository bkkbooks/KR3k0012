  - {type: variant, offset: 3258, length: 215, content: 下宅心竟有何辜坐致廢黜遠求夷狄假立非次觀其此情亦可知矣乃密具袍數千領及錦綵金銀以為賞賜之具九月壬寅高祖召徐度侯安都周文育等謀之仍部列將士分賞金帛水陸俱進是夜發南徐州討王僧辯甲辰高祖步軍至石頭前進遣勇士自城北踰入時僧辯方視事外白有兵俄而兵自內出僧辯遽走與其弟三子頠相遇俱出閤左右尚數十人苦戰高祖大兵尋至僧辯眾寡不敵走登城南門樓高祖因風縱火僧辯窮迫乃就擒是夜縊僧辯及頠景午貞陽侯遜位百僚奉晉安王上表勸進十月己酉晉安王即位改承聖四年為紹, WYG: ''}
