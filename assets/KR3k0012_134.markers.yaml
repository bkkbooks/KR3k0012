  - {type: variant, offset: 3719, length: 353, content: 守裴忌就侯安都共據梁山以禦之四月丁巳高祖詣梁山軍巡撫五月甲申齊兵發自蕪湖景申至𥞊陵故治高祖遣周文育屯方山徐度頓馬牧杜稜頓大航南已高祖率宗室王侯及朝臣將帥於大司馬門外白獸闕下刑牲告天以齊人背約發言慷慨涕泗交流同盟皆莫能仰視士卒觀者益奮辛丑齊軍於秣陵故縣跨淮立橋柵引渡兵馬其夜至方山侯安都周文育徐度等各引兵還京師癸未齊兵自方山進及兒塘游騎至臺周文育侯安都頓白土崗旗鼓相望都邑震駭高祖潛撤精卒三千配沈泰渡江襲齊行臺趙彥深於瓜步獲舟艦百餘艘陳粟萬斛六月壬辰齊兵潛至鍾山龍尾丁未進至幕府山高祖命眾軍秣馬蓐食遲明攻之乙卯旦自率帳內麾下出幕附山南吳明徹沈泰等眾軍首尾齊舉縱兵大戰侯安都自白下自引兵橫出其後齊師大潰斬獲數千相蹂藉而死者不可勝計生執徐嗣宗斬之以徇追奔至于臨沂其江乘攝山鍾山等諸軍相次克捷七月景子詔授高祖中書監, WYG: 傅領}
