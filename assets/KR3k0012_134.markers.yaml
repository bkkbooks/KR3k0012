  - {type: variant, offset: 5120, length: 0, content: '', SBCK: 成王丗子太建十四年正月髙宗崩即皇帝位于太極前殿詔大赦尊皇后爲皇太后宫曰弘範立妃沈氏爲皇后七月辛未大赦是月江水赤色如血自京師至于荆州九月設無㝵五漑切大㑹於太極殿捨身及乗輿服御至德元年正月詔大赦改太建十五年爲至德元年二年十二月夜天開自西北至東南其内有靑黄雜色隱隱若雷聲後主在東宫好學有文藝及即位耽於酒色常在後庭不恤政事又於光昭殿前起臨春結綺望仙三閣閣髙數丈竝數十間其牎牖欄檻之􅀋悉以沈檀香木爲之飾以金玉間以珠翠微風暫至香聞數里瑰寳竒麗近古未有其下積石爲山引水爲池植以竒樹雜以花藥後主自居臨春閣孔貴人居望仙閣張貴妃居結綺閣並􅃨道徃來婦人麗質巧態以從者常千餘人張貴妃孔貴人等八人侍㘴尚書令江揔孔範等十人侍宴號曰狎客上令八婦人制五言詩十客一時繼和遲則罰酒君臣酣飲從夕逹曙所司皆因閹人奏事主者由此擅作威福軍旅警備並皆不修任用沈客卿施文慶等以苛刻爲忠於是文武離心莫肯用命隋文帝謂髙頴曰我爲百姓父母豈可限一衣帶水不拯之乎命大作戰船人請宻之隋文曰吾將行天討何宻之有使投梀於江彼􅀂能改吾又何求乃遣晉王廣爲元帥以討之及聞隋軍臨江孔範曰必無渡理但恣妓樂縱酒作詩不輟明日隋軍濟江}
  - {type: page-break, offset: 5120, content: '', id: KR3k0012_SBCK_134-5b}
  - {type: page-break, offset: 5120, content: '', id: KR3k0012_SBCK_134-6a}
  - {type: variant, offset: 5120, length: 1, content: 陵, WYG: 成王世子太建十四年正月高宗崩即皇帝位於太極前殿詔大赦尊皇后為皇太后宫曰𢎞範立妃沈氏為皇后七月辛未大赦是月江水色赤如血自京師至於荆州九月設無碍大㑹於太極殿捨身及乗輿服御至徳元年正月詔大赦改太建十五年為至徳元年十二月夜天開自西北至東南其内有青黄雜色隱隱若雷聲後主在東宫好學有文藝及即位躭於酒色常在後庭不恤政事又於光昭殿前起臨春結綺望仙三閣閣高數丈並數十間其牕牖欄檻之類悉以沈檀香木為之飾以金玉間以珠翠微風暫至香聞數里瑰竒珍麗近古未有其下積石為山引水為池植以竒樹雜以花藥後主自居臨春閣孔貴人居望仙閣張貴妃居結綺閣並複道往來婦人麗質巧態以從者常千餘人張貴妃孔貴人等八人侍坐尚書令江總孔範等十人侍宴號曰狎客上令八婦人製五言詩十客一時繼和遲則罰酒君臣酣飲從夕達曙所司皆因閹人奏事主者由此擅作威福軍旅警備並皆不修任用沈客卿施文慶等以苛刻為忠於是文武離心莫肯用命隋文帝謂高熲曰我為百姓父母豈可限一衣帶水不拯之乎命大作戰船人請密之隋文曰吾將行天討何密之有使投柹於江彼若能改吾又何求乃遣晉王廣為元帥以討之及聞隋軍臨江孔範曰必無渡理但恣妓樂縱酒作詩不輟明日隋軍濟江凡文武百寮皆潛出唯尚書僕射袁憲侍側憲勸端坐殿上正色以待之後主曰鋒刃之下未可當之吾自有計乃逃於井既軍人窺井呼之後主不應欲下石乃呌以繩引之驚其太重及出與張貴妃孔貴人三人同束而上賀若弼呼後主視之惶懼汗流股慄再拜弼謂之曰大國之卿當小國之君拜禮也入朝不失作歸命侯亦無勞恐懼三月後主與王公百司發自建鄴至長安後主已下大小在路五百餘里累累不絶隋文宣詔讓後主後主伏地不能對乃宥之給賜甚厚每侍宴恐致傷心為不奏吳音後監守者言叔寳願得官號隋文曰叔寳絶無心肝監守又言叔寳日飲一石少有醒時隋文曰不爾何以過日及從東巡狩邙山賦詩曰日月光天徳山河壯帝居太平無以報願上東封書並上表請封禪隋文謙讓不許後從至仁夀宫嘗侍宴及出隋文目之曰此敗豈不由作詩飲酒將此工夫何如思安邊計䇿當賀若弼度京口彼人密啟告急叔寳為飲酒遂不發高熲至猶見啟在牀下未開封豈能不亡也後主以隋仁夀四年十一月終洛陽在位七年年五十二歳史臣曰後主生深宫之中長婦人之手既屬邦國殄瘁不知稼穡艱難初懼阽危屢有哀矜之詔後稍安集復扇淫侈之風賔禮諸公惟寄情於文酒昵近羣小皆委之以衡軸謨謀所及遂無骨鯁之臣權要所在莫非侵漁之吏刑政日紊尸素盈朝躭荒為長夜之飲嬖寵同豔妻之孽危亡弗恤上下相蒙衆叛親離臨機不悟自投於井冀以茍生視其以此求全抑亦民斯下矣遐觀列辟纂武嗣興其始也皆欲齊明日月合徳天地高視五帝俯協三王然而靡不有初鮮克有終其故何哉並以中庸之材懐可移之性口存於仁義心怵於嗜慾仁義利物而道逺嗜慾遂性而便身便身不可久違道逺難以固志佞諂之倫承顔候色因其所好以恱導之若下坂走丸順流決壅非天感靈辰象降生明徳孰能遺其所樂而以百姓為心哉此所以成康文景千載而罕遇也太平御覽巻一百三十四}
