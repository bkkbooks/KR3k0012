  - {type: variant, offset: 4832, length: 1, content: 青, SBCK: 以尚書右僕射領大著作徐陵爲尚書僕射辛酉輿駕親祠南郊辛未親耕藉田三月丁丑大赦天下自天康元年訖大建元年逋餘軍糧禄秩夏調未入者悉原之五年三月討大都督呉明徹統衆十萬發自白下夏四月癸卯前巴州刺史魯廣逹尅齊大峴城辛亥呉明徹尅􅁗州水柵庚申齊遣兵十萬援歷陽儀同黄法􅉤破之辛酉齊軍救􅁗州呉明徹又破之癸亥詔北伐衆軍所殺齊兵令埋掩甲子南譙太守徐槾尅石梁城六年春正月壬戌朔詔曰王者以四海爲家萬姓爲子一物乖方夕􅅥猶厲六合未混旰食弥憂朕嗣纂鴻基思弘經略上符景􅀫下叶人謀命將興師大拯淪溺灰琯未周凱捷相繼拓地數千連城將百蠢彼餘黎毒兹異境江淮年少猶有剽掠郷閭無賴擿他歴切出陰私將帥軍人罔顧刑典今使符法蠲除仁聲載路且肇元告慶邊服來荒始覩皇風冝覃曲澤可赦江右淮北南司霍光歴陽臨江等郡士民罪無輕重悉皆原宥七年春正月辛未輿駕親祠南郊四月乙末陳桃根表上織成羅文錦􅀍表各二首詔於雲龍門外焚之八月周遣使來聘是月甘露頻降樂遊􅁐丁未輿駕幸樂遊苑採甘露宴羣臣詔於􅁐龍舟山立甘露亭十一年春正月丁酉}
