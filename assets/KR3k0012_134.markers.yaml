姑熟仍次蔡州侯景登石頭城觀望形勢意甚不悅謂左右曰此軍上有紫氣不易可當乃以船䑰貯石沉塞淮口緣淮作城自石頭迄青溪十餘里中樓雉相接諸將未有所決僧辯遣杜崱問計於高祖高祖曰前柳仲禮數十萬兵隔水而坐韋粲之在清溪竟不渡岸賊乃登高望之表裏俱盡肆其凶虐覆我王師今圍石頭須渡北岸諸將若不能當鋒請先往立柵高祖即於石頭西橫隴築柵眾軍次連八城直出東北賊恐西州路斷亦於東北果林作五城以遏大路景率眾萬餘人鐵騎八百餘匹結陣而進乃命諸將分處置兵賊直衝王僧志僧志小縮高祖遣徐度領弩手二千橫截其後賊乃却高祖與王琳杜龕等以鐵騎悉力乘之賊退據其柵景儀同盧輝略開石頭北門來降盪主戴晃曹宣等攻拔果林一城眾軍又剋其四城賊復還殊死戰又盡奪所得城柵高祖大怒親率攻之士卒騰柵而入賊復散走景與百餘騎棄矟執刀左右衝陣陣不動景眾大潰遂北至西明門景至闕下不敢入臺遣腹心取其二子而遁高祖率眾出廣陵應接景將郭元建會元建奔齊高祖納其部曲三千人而還僧辯啟高祖鎮京口五月齊遣辛術圍嚴超達於秦郡高祖命徐度領兵助其固守齊眾七萬填壍起土山穿地道攻之甚急高祖乃自率萬人解其圍縱兵四面擊齊軍弓弩亂發齊平秦王中流矢死斬首數百級齊人收兵而退高祖振旅南歸遣記室參軍劉本仁獻捷于江陵承制授高祖使持節散騎常侍都督南徐州諸軍事征北, SBCK: ''}
