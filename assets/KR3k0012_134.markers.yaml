  - {type: variant, offset: 4, length: 6, content: 七梁蕭方智梁, SBCK: 八陳陳蒨陳伯宗陳頊陳叔寳陳蒨陳}
  - {type: variant, offset: 4, length: 385, content: 七梁蕭方智梁書曰敬帝諱方智字慧相小字法真世祖第九子也太清三年封興梁侯承聖元年封晉安郡王二年出為平南將軍江州刺史三年十一月江陵陷太尉楊州刺史王僧辯司空南徐州刺史陳霸先定議以帝為太宰承制奉迎還京師四年二月至自潯陽入居朝堂以太尉王僧辯為中書監錄尚書驃騎將軍都督中外諸軍事加司空陳霸先班劍二十人三月齊遣其上黨主高渙送貞陽侯蕭淵明來主梁嗣至東關遣吳興太守裴之橫與戰敗績之橫死王僧辯率眾出屯姑熟七月王僧辯納貞陽侯蕭淵明自採石濟江入于京師以帝為皇太子九月司空陳霸先舉義襲殺王僧辯默蕭淵明丙午帝即皇帝位十月詔改承聖四年為紹泰元年大赦以貞陽侯淵明為司徒封建安郡公以司空陳霸先為尚書令尊所生夏貴妃為皇太后立妃王氏為皇后太平元年正月大赦四月齊軍水步入丹陽縣至秣陵故治六月齊潛軍至蔣山北至玄武湖司空陳霸先授眾軍節度大破之七月陳霸先進位司徒九月改元大赦除司徒陳霸先為丞相錄尚書事二年四月齊遣使請和, WYG: ''}
