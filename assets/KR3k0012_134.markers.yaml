  - {type: variant, offset: 5121, length: 0, content: '', krp: 文武百寮皆遁出唯尚書僕射袁憲侍側憲勸端坐殿上正色以待之後主曰鋒刃之下未可當之吾自有計乃逃于井旣軍人窺井呼之後主不應欲下石乃叫以繩引之驚其太重及出與張貴妃孔貴人三人同束而上賀若弼呼後主視之惶懼汗流股慄再拜弼謂之曰大國之卿當小國之君拜禮也入朝不失作歸命侯亦無勞恐懼三月後主與王公百司發自建鄴至長安後主巳下大小在路五百里累累不絶隋文宣詔讓後主後主伏地不能對乃宥之給賜甚厚毎侍宴恐致傷心爲不奏呉音後監守者言叔寳願得官號隋文曰叔寳絶無心肝監守又言叔寳日飲一石少有醒時隋文曰不爾何以過日及從東廵狩印山賦詩曰日月光天德山河壯帝居太平何以報願上封禪書并上表請封禪隋文謙讓不許後從至仁壽宫嘗侍宴及出隋文目之曰此敗豈不由飲酒作詩將此功夫何如思安邊計䇿𥘉賀若弼度京口彼人密啓告急叔寳爲飲酒遂不省髙潁至猶見啓在牀下未開封豈天亡也後主以隋仁壽四年十一月終於洛陽在位七年年五十二歲史臣曰後主生深宫之中長婦人之手旣屬邦國殄瘁不知稼穡艱難𥘉懼阽音簷危屢有哀矜之詔後稍安集復扇淫侈之風賔禮諸公唯寄情於文酒胒近羣小皆委之以衡軸謀謨所及遂無骨鯁之臣權要所在莫匪侵漁之吏政刑日紊尸素盈朝耽荒爲長夜之飲嬖寵同豔妻之孽危亡弗恤上下相蒙衆叛親離臨機不悟自投於井冀以苟生視其以此求全抑亦民斯下矣遐觀列辟纂武嗣興其始也皆欲齊明日月合德天地髙視五帝俯恊三王然而靡不有𥘉鮮克有終其故何哉並以中庸之材懷可移之性口存於仁義心怵音黜於嗜慾仁義利物而道逺嗜慾遂性而便身便身不可乆違道逺難以固志佞謟之倫承顔候色因其所好以恱導之若下坂走丸順流決壅非夫感靈辰象降生明德孰能遺其所樂而以百姓爲心哉此所以成康文景千載而罕遇也太平御覽卷第一百三十四}
