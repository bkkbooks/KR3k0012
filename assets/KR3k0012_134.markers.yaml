  - {type: variant, offset: 2988, length: 2, content: 僧辯, krp: 侯將相善相輔翊内外叶和勿違朕意山陵務存儉速大斂竟羣臣三日一臨公除之制}
  - {type: variant, offset: 2991, length: 11, content: 眾征陸納於湘州承制命高, krp: 依舊典六月甲子羣臣上謚曰文皇帝廟號丗}
  - {type: variant, offset: 2996, length: 487, content: 湘州承制命高祖代鎮楊州十一月湘東王即位于江陵改承聖元年明年湘州平高祖旋鎮京口三年三月進高祖司空餘如故十一月西魏攻陷江陵高祖與王僧辯等進啟江州請晉安王以太宰承制又遣長史謝哲奉牋勸進十二月晉安王至自潯陽入居朝堂給高祖班劍二十人四年五月齊送貞陽侯淵明還主社稷王僧辯納之即位改元曰天成以晉安王為皇太子初齊之請納貞陽侯也高祖以為不可遣使詣僧辯苦爭之往返數四僧辯竟不從高祖居常憤艱密謂所親曰武皇雖盤石之宗遠布四海至于剋雪讎恥寧濟艱難唯孝元而已功業懋盛前代未聞我與王公俱受重寄語未絕音聲猶在耳豈期一旦便有異圖嗣主高祖之孫元皇之子海內屬目天下宅心竟有何辜坐致廢黜遠求夷狄假立非次觀其此情亦可知矣乃密具袍數千領及錦綵金銀以為賞賜之具九月壬寅高祖召徐度侯安都周文育等謀之仍部列將士分賞金帛水陸俱進是夜發南徐州討王僧辯甲辰高祖步軍至石頭前進遣勇士自城北踰入時僧辯方視事外白有兵俄而兵自內出僧辯遽走與其弟三子頠相遇俱出閤左右尚數十人苦戰高祖大兵尋至僧辯眾寡不敵走登城南門樓高祖因風縱火僧辯窮迫乃就擒是夜縊僧辯及頠景午貞陽侯遜位百僚奉晉安王上表勸進十月己酉晉安王即位改承聖四年為紹康元年壬子詔授高祖侍, SBCK: 切爲}
