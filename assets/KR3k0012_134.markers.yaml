  - {type: variant, offset: 3476, length: 1, content: 壬, WYG: 四月世祖崩即皇帝位二年春詔大赦天下改光大元年孝悌力田賜爵一級輿駕祠南郊二年十一月慈訓太后集羣臣於朝堂令降為臨海王送還藩邸是日出居別第太建二年薨時年十九陳頊陳書曰高宗孝宣皇帝諱頊字紹世小字師利始興昭烈王第二}
