  - {type: variant, offset: 311, length: 1487, content: 四月齊軍水步入丹陽縣至秣陵故治六月齊潛軍至蔣山北至玄武湖司空陳霸先授眾軍節度大破之七月陳霸先進位司徒九月改元大赦除司徒陳霸先為丞相錄尚書事二年四月齊遣使請和八月加丞相黃鉞領太傅劍履上殿九月為相國揔百揆封十郡為陳公備九錫之禮十月禪位于陳奉帝為江陰王薨于外邸時年十六追謚敬皇帝史臣曰梁季橫潰喪亂屢臻當此之時天曆去梁敬皇高讓將同釋負焉後梁蕭詧後梁宣帝諱詧昭明太子第三子也封岳陽王授雍州刺史孝元被西魏所害詧遂為魏附庸稱大定元年以蔡大寶為相時人比劉備過孔明詧性不好酒尤惡見婦人酷信佛法謂尚書宋如周曰卿可謗經如周踧踖上子六切下音跡自陳懼而出以告蔡大寶寶曰卿當不謗餘經不信法華耳如周乃悟經云隨喜面不狹長如周面狹且長故戲之耳詧居處殘毀干戈日用在位八年憤惋而殂年四十子巋立蕭巋明帝諱巋宣帝第三子也聰明有器識大定元年為太子宣帝崩太子即位號天保元年十五年周武帝平北齊得傳國璽巋入周賀武帝大會群臣及諸蕃客周武自彈琵琶令故齊主高緯起舞達摩支故安德王延宗悲不自勝緯舞訖勸巋巋乃起舞周武曰梁主乃能為朕舞乎巋曰陛下既自彈五絃臣何敢不同百獸周武大悅周武指齊氏故臣吒列長義謂巋曰是登陴罵朕者巋曰長義未能抱樂翻敢吠堯周武大笑初雖禮接巋未深知之至是巋承聞乃陳父荷太祖拯救之恩并敘二國艱虞腐齒掎角之事辭理辯暢因涕泗交流周武亦為歔欷自是禮遇日深賜雜繒百叚馬五匹并賜齊宮伎女遣歸國執巋手曰待破突厥必送梁王歸江東巋途經古跡莫不駐馬賦詩以敘其懷至于江陵凡三十首女為秦晉王廣妃在位十四年而殂蕭琮琮明帝太子也既立赦其封內改元寬運琮性廣仁有大度愽學有文義兼善弓馬明年隋文徵琮入朝琮率其臣二百餘人朝于長安群臣辭于送客堂琮下馬一一執別莫不殆涕既至隋文帝留之使崔弘度將兵攻江陵江陵不守於是國廢陳陳霸先陳書曰高祖武皇帝諱霸先字興國小字法生吳長興城下若里人漢太丘長陳寔之後也世居頴川寔玄孫準晉太尉準生匡匡生達永嘉南遷為丞相掾歷太子洗馬出為長城令悅其山水遂家焉嘗謂所親曰此地山川秀麗當有王者興二百年後我子孫必鍾斯運高祖以梁天監二年癸未歲生少倜儻有大志不治生產既長讀兵書多武藝明達果斷為當時所推服嘗遊義興館於許氏夜夢天開數丈有四人朱衣捧日而至令高祖開口納焉及覺腹中猶熱高祖心獨負之大同初新喻侯蕭映為吳興太守甚重高祖謂僚佐曰此人方將遠大及映為廣州刺史高祖為中兵參軍隨之鎮映令高祖招集士馬眾至千人仍命高祖監宋隆郡所部安化二縣元不賓高祖討平之尋監西江督護高要郡守先是武林侯蕭諮為交州刺史以裒刻失眾心士人李賁連結數州豪傑同時反遣高州刺史孫新州刺史盧子雄將兵擊之等不時而進皆敗於廣州伏誅子雄弟子略與子姪及其主帥杜天合杜僧明共舉兵執江南督護沈覬進寇廣賊晝夜苦攻州中震恐高祖率精兵三千卷甲兼行以救之頻戰屢捷天合中流矢死賊眾大潰僧明遂降梁武帝深歎異焉授直閤將軍封新安子邑三百戶仍遣畫工圖高祖而觀之其年冬蕭映卒明年高祖送喪還都至大庾領會有詔高祖為交州司馬領武平太守與刺史楊瞟匹妙切南討十一年六月軍至交州賁眾數萬於蘇歷江口立城柵以拒官軍瞟推高祖為前鋒所向摧陷賁走典澈湖於屈獠界立砦音寨大造船艦充塞湖中眾軍憚之頓湖口不敢進夜江水暴起七丈注湖中奔流迅激高祖勒所部兵乘流先進眾軍鼓譟俱前賊眾大潰賁竄入屈獠洞中屈獠斬賁傳首京師是歲太清元年也除振遠將軍西江督護高要太守督七郡諸軍事二年冬侯景冠京師高祖將率兵赴援廣州刺史元景仲陰有異志將圖高祖高祖知其計與成州刺史王懷明行臺選郎殷外臣等密議誡嚴三年七月集義兵於南海馳檄以討景仲景仲窮蹙縊于閤下高祖迎蕭勃鎮廣州十一月高祖遣杜僧明胡頴將二千人頓于嶺上并厚結始興豪傑同謀義舉侯安都張偲音倩等率千餘人來附蕭勃聞之遣鍾休悅說高祖曰侯景驍雄, krp: ''}
