  - {type: variant, offset: 2639, length: 330, content: 八百餘匹結陣而進乃命諸將分處置兵賊直衝王僧志僧志小縮高祖遣徐度領弩手二千橫截其後賊乃却高祖與王琳杜龕等以鐵騎悉力乘之賊退據其柵景儀同盧輝略開石頭北門來降盪主戴晃曹宣等攻拔果林一城眾軍又剋其四城賊復還殊死戰又盡奪所得城柵高祖大怒親率攻之士卒騰柵而入賊復散走景與百餘騎棄矟執刀左右衝陣陣不動景眾大潰遂北至西明門景至闕下不敢入臺遣腹心取其二子而遁高祖率眾出廣陵應接景將郭元建會元建奔齊高祖納其部曲三千人而還僧辯啟高祖鎮京口五月齊遣辛術圍嚴超達於秦郡高祖命徐度領兵助其固守齊眾七萬填壍起土山穿地道攻之甚急高祖乃自率萬人解其圍縱兵四面擊齊軍弓弩亂發齊平秦王中流矢死斬首數百級齊人收兵而退高祖振旅南歸遣記室參軍劉本仁獻捷于江陵承制授高祖使持節散騎常侍都督南徐州諸軍事征北大, WYG: ''}
