  - {type: variant, offset: 2026, length: 0, content: '', SBCK: 不從重廢父命欲從之心又不忍乃往見王孫友人祁侯祁侯與王孫書王孫報曰盖聞古之聖王縁人不忍其親故爲制禮今則越之吾是以倮葬將以矯丗吾聞之神精者天之有形骸者地之有精神離形各歸其眞故謂之􅀑􅀑之爲言歸也屍塊然獨處豈有知哉褁以幣帛隔以棺椁支體結束口含玉石欲化不得鬰爲枯腊千載之後棺椁朽腐廼得歸土就其眞宅祁侯曰善遂倮葬又曰朱雲年七十餘終於家病不呼醫藥遺言以身服斂棺周於身土爲椁韋昭曰燒土爲椁也爲丈五墳葬平陵東郭外又曰韋玄成爲相病且}
