  - {type: variant, offset: 31, length: 0, content: '', SBCK: 樂樂其所自生禮不忘其本古之人有言曰狐死正丘首仁也正丘首正首丘也仁思也又曰舜葬於蒼梧之野盖三妃未之從也古不合葬又曰葬於北方北首三代之逹禮也之幽之故也北方北首國北也又曰子栁之母死子碩請具具䘮之器用也子栁魯叔仲皮之子子碩兄子栁曰何以哉言無其財子碩曰請粥庶弟之母粥謂嫁之也妾賤取之曰買之也子栁曰如之何其粥人之母以葬其母也不可又曰公叔文子􅂛於瑕丘蘧伯玉從二子衛大夫也文子獻公之孫名㧞也文子曰樂哉斯丘也死則我欲葬焉伯玉曰吾子樂之則瑗請前刺其欲害人良田瑗伯玉名也又曰成子髙寢疾成子髙齊大夫國成伯髙慶遺入請曰夫子病革矣如至大病則如之何觀其意也革急也慶遺封之族子髙曰吾聞之也生有益於人死不害於人吾縱生無益於人吾可以死害於人哉我死則擇不食之地而葬我焉不食謂不墾耕又曰國子髙曰葬也者藏也藏也者欲人弗得見也是故衣足以􅅚身棺周於衣土周於椁反壤樹之哉又曰孔子之䘮有自燕來觀者舎於子夏氏子夏曰聖人之葬人與人之葬聖人也子何觀焉}
