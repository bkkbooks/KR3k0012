  - {type: variant, offset: 2139, length: 0, content: '', WYG: 郭娣子負解之勢與人飲强灌之人怒㧞刀刺殺解娣子亡去解娣怒曰以翁伯之義人殺吾子賊不得棄其尸于道不葬欲以辱解解使人微知賊處賊窘自歸具以實告解解曰殺之固當吾兒不直遂去其辜其娣乃收而葬之諸}
  - {type: variant, offset: 2139, length: 0, content: '', krp: 郭解姊子負解之勢與人飲強灌之人怒抜刀刺殺解姊子去云解姊怒曰以翁伯之義人殺吾子賊不得弃其尸於道不葬欲以辱解解使人徴知賊處賊窘自歸具以實告解解曰殺之固當吾兒不直遂去其罪其姨乃収而葬之諸}
  - {type: variant, offset: 2140, length: 3, content: 卿已下, WYG: 聞之皆多解之義戰國策曰秦宣太后愛魏餘病且死令曰我死必以魏}
