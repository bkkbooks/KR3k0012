  - {type: variant, offset: 2006, length: 1, content: 緒, SBCK: 良始所見下邳圯上老父與書者後十三歳從髙帝過濟北果得􅂖城山下黃石取而寳祠之及良死并葬黃石毎上冢伏臈祠黄石又曰衛青貴而平陽侯曹壽有惡疾就國長公主問列侯賢者左右皆言大將軍主嘆曰此岀吾家常從我奈何左右曰於今尊貴無比於是主諷皇后言之上廼詔青尚平陽主合葬起􅃁又曰二長史害張湯自殺昆弟欲厚葬湯母曰湯爲天子大臣􅀍惡言而死何厚葬爲載以牛車有棺而無椁上聞之曰非此母不生此子廼盡誅三長史又曰王父偃方貴幸時客以千數及死無一人視獨孔車収葬焉上聞之以車爲長者又曰霍光薨上及皇后太后親臨光䘮太中大夫任宣與侍御史五人持節護䘮事賜金錢繒絮繡􅀍百領衣五十篋璧珠璣王衣如淳曰漢儀注以王爲孺如鎧狀連綴之以黄金爲縷腰以下王爲禮長尺廣二寸半押下至足亦綴以金縷也便房黃膓題湊各一具蘇林日以栢木黄心致累棺外曰黄膓木頭皆􅁏向故曰題湊如淳曰便房􅃁壙中室也漢儀天子陵中明中髙丈二尺四周二丈二丈内梓宫次楩椁栢黃膓題湊也東園温明服䖍曰東園處此器象如棺折一端漆􅀞之以鏡置其中以尸上大斂并盖之矣皆如乗輿制度載光尸柩以輼輬車黃屋左纛發材官輕車北軍五校士軍陳至茂陵以送其葬謚曰宣成侯發三河}
