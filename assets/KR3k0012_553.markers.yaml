  - {type: variant, offset: 156, length: 760, content: 而過之從者曰子未可以已乎夫子曰丘聞之親者無失其為親也故者無失其為故也又喪大記曰君松椁大夫柏槨士雜木槨槨謂周棺者也天子柏槨以端長六尺夫子制於中都使庶人之槨五寸五寸謂端方也棺槨之間君容祝大夫容壺士容甒問可以藏物因以為節左傳定上曰魏獻子屬役於韓簡子原壽過簡子韓起豫不信也壽過周大夫也而田於大陸焚焉還卒於甯甯今脩武魏也范獻子去其柏槨以其未復命而田也范獻子伐魏子為政去其柏槨是貶廣雅曰槨廓也史記曰始皇葬驪山發北山石為槨又曰慎夫人鼓瑟上自倚瑟而歌意悽愴悲懷顧謂群臣曰嗟乎北山石為槨用紵絮斮一作錯陳漆其間紵絮以漆著其間豈可動哉左右曰善張釋之前曰使其中有可欲者雖錮南山猶有郤使其中無可欲者雖無石槨又何慼焉文帝稱善古史考曰禹作土堲以周棺湯作水槨易土堲漢書曰始皇石槨中為遊又劉向上書曰棺槨之作自黃帝始也臣瓚注曰殷人作棺槨也始皇葬於驪山後牧兒亡羊羊入其藏牧者持火照求羊失火燒其藏及槨續漢禮儀志曰侯王公主將軍特進薨使者治喪作柏槨東觀漢記曰明帝自制石槨廣丈二尺長二丈五魏志曰夫餘國厚葬有槨無棺東沃沮其葬作大木槨長十餘丈開一頭作戶舉家皆共槨刻木為數魚豢魏略曰高麗其死葬有槨無棺停喪百日也越絕書曰闔閭葬銅槨三重二石偽事曰佛圖澄死時眾官皆殯歛以生所服錫杖缽終內著棺中為其理石作槨葬畢經年冉閔後故發槨開棺視之了不見體骨處所唯見杖缽存焉莊子曰衛靈公死卜葬沙丘而吉掘之數仞得石槨焉有銘曰不馮其子靈公奪而埋之郭緣生述征記曰桓魋石槨在九里山之東北也槨有二重門間隱起青石方淨如鏡門扇數四博物志曰漢滕公薨公卿送至東都門四馬悲鳴掊地不行於蹄下得石槨有銘曰佳城鬱鬱三千年見白日吁嗟滕公居此室豫章記曰艾縣有一塚鑿青石以為槨制度非常號曰楊柳塚歷代久遠莫知其誰欑禮記喪大記曰君殯用輴欑至于上畢塗屋大夫殯以幬欑置于西序塗不塈於棺士殯見衽塗上帷之鄭玄注云欑猶藂也釋名曰塗曰欑欑木於, SBCK: 矣防形旁殺平}
