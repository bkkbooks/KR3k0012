  - {type: variant, offset: 1205, length: 700, content: 曾子曰既曰明器矣而又實之言名之為明器與祭器皆實之是亂鬼器與人器也又曰既殯旬而布材與明器木工宜乾暗且預成材槨材也又曰之死而致死之不仁而不可為也之死而致生之不知而不可為也之往也死之生之謂無知與有知也為猶行也是故竹不成用瓦不成沫木不成斲成猶善也竹不可善用謂邊無滕味當作沫沫靧也琴瑟張而不平竽笙備而不和無宮商之調有鍾磬而無簨簴不縣之也橫曰簨植曰簴其曰明器神明之也言神一死之也神明者非人所知折其器如此又曰仲憲言於曾子曰夏后氏用明器示民無知也所謂致死之仲憲孔子弟子原憲殷人用祭器示民有知也所謂致生之周人兼用之示民疑也言使民疑於無知與有知曾子曰其不然乎其不然乎非其說之非也夫明器鬼器也祭器人器也夫古之人胡為而死其親乎言仲憲之言三者皆非此或用鬼器或用人器又檀弓下曰孔子謂明器者知喪道矣備物而不可用也哀哉死者而用生者之器不殆於用殉乎哉其曰明器神明之也神明死者異於生人也釋名曰送死之器曰明器神明之器異於人鹽鐵論曰古者明器有形無實示人不用也今厚資多藏器用如生人並衣綈紈江逌表曰宣皇帝顧命終制山陵不設明器以貽後則景帝奉遵遺勑逮文明皇后崩武皇帝亦承前無所設施唯酺醢之奠瓦器而已昔康皇帝玄宮內寶奩鳥粥此蓋太妃因己之情實違先志累世之法今永欲以為故事用此二物明衣說文曰褮鬼衣也褮讀如葛壘褮之縈穆天子傳曰贈用文錦明衣祖載周禮春官喪祝曰掌大喪及朝御柩乃奠朝將葬朝於祖考廟及祖飭棺及載遂御之祖將葬祖於庭禮記檀弓曰殯於客位祖於庭所以即遠也儀禮既夕曰既夕哭請啟期告于殯宿興設盥于祖廟門外祖王父也下土𥘵稱共廟有司請祖期將行而飲食曰祖祖始也白虎通曰祖於庭何奪孝子之恩也祖始始載於庭也乘車辭祖禰故為祖載也翣周禮夏官曰御僕大喪持翣翣棺飾也持之者夾蜃車, SBCK: ''}
