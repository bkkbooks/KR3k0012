  - {type: variant, offset: 2028, length: 0, content: '', SBCK: 自白曰不勝父子􅀻願乞體骨歸葬父墓上許焉又曰朱邑病且死囑}
  - {type: variant, offset: 2029, length: 0, content: '', SBCK: 子曰我故爲桐郷吏其民愛我必葬桐郷後世子孫奉我不如桐郷民及死其子葬之桐郷西郭外民果共爲邑起􅃁立祠歳祠􅀕至今不絶又曰孔光薨王莽白太后使九卿䇿贈以太師􅀶山侯印綬賜乗輿秘器金錢雜帛少府供帳公卿百官㑹弔送葬載以乗輿及副各一乗羽林􅀌兒諸生合四百}
  - {type: variant, offset: 2030, length: 22, content: 之葬也不以翣資翣者武之所資也戰而死者無武也翣, SBCK: 輓送車萬餘兩}
