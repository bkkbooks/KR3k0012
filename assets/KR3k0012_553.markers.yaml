  - {type: variant, offset: 2005, length: 0, content: '', SBCK: 韓信淮隂人家貧無行不得推擇爲吏又不能治生爲啇賈常從人􅀉食其母死無以葬乃行營髙燥也傍可置萬家者爲冢又曰}
