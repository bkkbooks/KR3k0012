  - {type: variant, offset: 2428, length: 0, content: '', krp: 太后親臨光䘮太中大夫任宣與侍御史五人持節護䘮事賜金錢繒絮繡𬒳百領衣五十篋璧珠璣王衣如淳曰漢儀注以王爲孺如鎧狀連綴之以黄金爲縷腰以下王爲禮長尺廣二寸半押下至足亦綴以金縷也便房黃膓題湊各一具蘇林日以栢木黄心致累棺外曰黄膓木頭皆肉向故曰題湊如淳曰便房冡壙中室也漢儀天子陵中明中髙丈二尺四周二丈二丈内梓宫次楩椁栢黃膓題湊也東園温明服䖍曰東園處}
  - {type: variant, offset: 2429, length: 0, content: '', WYG: 器形如漆桶開一面畵之以鏡置其中以懸尸上大斂并葢之也皆如乗輿制度載光尸柩以輼輬車黄屋左纛發材官輕車北軍伍校軍士陳之茂陵以送其葬諡曰宣城侯發三河卒穿土起塜祠堂置園邑三百家又曰金日磾薨賜葬其塜地送以輕車介士軍至茂陵諡曰敬侯又曰楊王孫者孝武時人也學黄老之術家累千金厚自奉養生亡所不至及病且終先令其子曰吾欲倮葬以反吾真必亡易吾意死則為囊盛尸尸入地七尺即下從足引脱其囊以身親土其子欲黙而不從重廢父命􅁒從之心又不忍}
  - {type: page-break, offset: 2429, content: '', id: KR3k0012_WYG_553-11a, image: WYG0898/WYG0898-0136c.png}
  - {type: variant, offset: 2429, length: 0, content: '', krp: 器象如棺折一端漆畫之以鏡置其中以尸上大斂并盖之矣皆如乗輿制度載光尸柩以輼輬車黃屋左纛發材官輕車北軍五校士軍陳至茂陵以送其葬謚曰宣成侯發三河卒穿土起冢祠堂置園邑三百家又曰金日殫薨賜葬其冢地送以輕車介士軍至茂陵謚曰敬侯又曰楊王孫者孝武時人也學黃老之術家業千金厚自奉養生亡所不致及病且終先令其子曰吾欲倮葬以反吾眞必亡昜吾意死則爲囊盛尸尸入地七尺旣下從足引脫其囊以身櫬土其子欲黙而不從重廢父命欲從之心又不忍}
