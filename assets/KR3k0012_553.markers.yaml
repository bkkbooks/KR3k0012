  - {type: variant, offset: 2143, length: 109, content: 子弟凡三百人執紼白素幘委貌冠杜預要集曰凡挽天子六紼諸侯四大夫二士一旅旒賀循葬禮曰大夫五旒吉韋車之所建也通而已下不為龍畫旐周禮春官曰司常大喪供銘旌建廞車之旌銘旌王則太常也禮記檀弓上曰銘明旌也以死者為不可別也故以其旗識之續, SBCK: 郡國范曄後}
