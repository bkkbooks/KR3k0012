  - {type: variant, offset: 1930, length: 1, content: 器, SBCK: 者也徃而觀其葬焉其坎深不至於泉以生恕死其歛以時服旣葬封廣輪掩坎其髙可隱也輪從也隱據也旣封左祖右還其封且號者三曰骨肉歸復於土命也􅀂魂氣則無不之也無不之也還廻而遂行孔子曰延陵季子之於禮其合矣乎又曰子路曰傷哉貧也生無以爲養死無以爲禮也孔子曰啜菽飲水盡其歡斯之謂孝斂手足形還葬而無椁稱其財斯之謂禮還猶疾也禮記王制曰天子七日而殯七月而葬諸侯五日而殯五月而葬大夫士庶人三日而殯三月而葬尊者舒卑者速春秋傳}
