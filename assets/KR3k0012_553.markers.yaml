  - {type: variant, offset: 3886, length: 283, content: 河卒容衛儼未歸空山照秋月又樂平長公主挽歌辭曰粧樓對馳道吹臺臨景舍風入上春朝月滿涼秋夜未言歌笑畢已覺先榮謝何時洛水湄芝田解龍駕方相周禮夏官曰方相氏掌蒙熊皮黃金四目玄衣朱裳執戈楊揗帥百隸大喪先柩及墓入壙以戈擊四隅歐方良壙穿中也方良罔兩也蔡質漢官儀曰陰太后崩前有方相及鳳皇車晉公卿禮秩曰上公薨者給方相車一乘安平王孚薨方相車駕馬幽明錄曰廣陵露白村人每夜輒見鬼怪或有異形醜惡怯弱者莫敢過村人怪如此疑必有故相率得十人一時發掘入地尺許得一朽爛方相頭訪之故老咸云嘗有人冒雨葬至此遇劫一時散走方相頭陷沒泥中風俗通曰俗說亡人魂氣浮揚故作魌頭以存之言頭體魌魌然盛大也或謂魌頭為觸壙殊方語也, SBCK: ''}
