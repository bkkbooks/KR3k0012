  - {type: variant, offset: 3315, length: 373, content: 可妄求魏繆襲挽歌辭曰生時遊國都死沒棄中野朝發高堂上墓宿黃泉下白日入虞淵縣車息駟馬造化雖神明安能復存我形容稍歌滅齒髮行當墮自古皆有然誰能離此者陸機挽歌辭曰魂衣何盈盈旟旐何習習父母拊棺號兄弟扶筵泣靈轜動轇龍首矯崔嵬挽歌挾轂唱嘈嘈一何悲浮雲中容與飄風不能廻淵魚仰失梁征烏俯墜飛又曰中闈且勿諠聽我薤露詩生死各異倫祖載當有時舍爵兩楹位啟殯進靈轜餞飯觴莫舉出宿歸無期又曰重阜何崔嵬玄廬竄其間磅礡云四極穹崇効蒼天側聽陰溝涌臥觀天井懸壙霄何遼廓大暮安可晨人往有返歲我行無歸年昔居四人宅今為萬鬼鄰昔為七尺體今成灰與塵金王昔所佩鴻毛今不振豐肌享螻蟻形體永夷泯壽堂延魑魅虛無自相賓螻蟻爾何怨魑魅我何親撫心痛茶毒永歎莫為陳晉陶潛挽歌辭曰荒草何茫茫白楊亦蕭蕭嚴霜九月中送我出遠郊四面無人居高墳正嶕嶢馬為仰天鳴風日自蕭條幽室一已閉千年不復朝千年不復朝賢達無奈何向來相送人各亦, SBCK: ''}
