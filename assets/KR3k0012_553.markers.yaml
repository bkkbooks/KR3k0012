  - {type: variant, offset: 2927, length: 365, content: 弟司徒祭酒廣夜中酣飲開北牖聽挽歌為樂彭城王義康大怒左遷宜城太守梁書曰謝幾卿普通六年詔西昌侯藻督眾軍北侵幾卿啟求行擢為藻軍師長史軍至渦陽退敗幾卿坐免官居自揚石井宅中交好者載酒從之客恒滿坐時左丞庚仲容亦免歸二人意相得並肆情誕縱或乘露車歷遊郊野醉則執鐸挽歌不屑物議莊子曰紼謳所生必於斥苦司馬彪注云紼引柩索也斥踈緩若用力也引紼所有謳者為人用力慢緩不齊促急之也風俗通曰京師賓婚嘉會酒酣之後續以挽歌譙周法訓曰挽歌者高帝召田橫至尸鄉自斃從者不敢哭而不勝其哀故作此歌以寄哀音焉干寶搜神記曰挽歌者喪家之樂執紼者相和之聲也挽歌詞有薤露蒿里二章出田橫門人橫自殺門人傷之為悲歌言人如薤上露易晞滅也亦謂人死精魂於蒿里古辭曰薤露朝露何易晞明朝更復露人死一去何時歸二章曰蒿里誰家地聚斂精魂無賢愚鬼伯一何相催促人命不得少踟躕至李延年乃分為二曲薤露送王公貴人蒿里送, SBCK: 㑹稽}
