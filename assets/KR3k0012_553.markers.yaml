  - {type: variant, offset: 2088, length: 6, content: 諸侯喪執紼五, WYG: 項王已死楚地皆降漢獨魯不下漢乃引天下共欲屠之為其守禮義為王守節乃持項王頭示魯魯父兄乃降始懐楚王初封項籍魯公及其死魯最後下故以魯公禮葬項籍榖城史記曰臨江閔王榮以孝景前四年為太子四歲廢為臨江王四年坐侵廟壖為宫上徴榮詣中尉府中尉郅都責訊王王恐自殺葬藍田鷰數萬銜土置塜上}
