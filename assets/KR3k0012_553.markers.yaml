  - {type: variant, offset: 2000, length: 3, content: 作翣齊, SBCK: 以王禮葬何以爲周公踐祚理政與天同志原天之意子愛周公與文武不異故以王禮爾雅曰葬藏謂之壙宅兆塋域地也􅀃文曰窆葬下棺也史記曰項王巳死楚地皆降漢獨魯不下漢乃引天下兵欲屠之爲其守禮義爲主死節乃持項王頭示魯魯父兄乃降始楚懷王􅀄封項籍爲魯公及其死魯最後下故以魯公禮葬項籍彭城史記曰臨江閔王榮以孝景前四年爲太子四歳廢爲臨江王四年坐侵廟壖爲宫上徴榮詣中尉府中尉郅都責訊王王恐自殺葬藍田鷰數萬衘土置冢上百姓憐之又曰郭解姊子􅀒解之􅀔與人飲強灌之人怒抜刀刺殺解姊子去云解姊怒曰以翁伯之義人殺吾子賊不得弃其尸於道不葬欲以辱解解使人徴知賊處賊窘自歸具以實告解解曰殺之固當吾兒不直遂去其罪其姨乃収而葬之諸公聞之皆多解之義戰國䇿曰秦宣太后愛魏餘病且死令曰我死必以魏子爲殉庸芮爲之􅀃后曰以死者爲有知乎曰無知芮曰何乃空以生之所愛葬無知之死人哉􅀂死者有知先王之積怒乆矣太后救過不暇何得􅀻魏子乎太后乃止漢}
