  - {type: variant, offset: 1958, length: 1, content: 再, SBCK: 丘問之曰夫柩不可以反也日有食之不知其巳之遲也則豈如行哉巳止也數讀爲速老聃曰夫柩不早出不暮宿侵晨夜則近姧宼也見星而行者唯罪人與奔父母之䘮者乎日有食之安知其不見星也爲無日而慝祚豫止且君子行禮不以人之親痁患痁患病也以人之父母行禮而恐懼其有患害不爲也禮記曽子問曰並有䘮如之何何先何後並謂父母􅀂親同者同月死孔子曰葬先輕而後}
