  - {type: variant, offset: 2096, length: 7, content: 四紼皆衘枚紼引, SBCK: 起墳如大將軍王鳯制度又曰董賢死見廢倮診其尸因埋獄中賢所厚吏沛人朱詡自劾去大司馬府備棺衣収賢尸葬之王莽聞之大怒以他罪繫殺詡又曰楚王戊女解憂妻烏孫公主上書言年老思願得歸骸骨葬漢地天子愍而迎之公主與孫男女三人俱來後二歳卒三孫因留守墳墓又曰樓護字君卿結交士大夫無所不傾甚交士長者尤見親敬母死送葬者致}
