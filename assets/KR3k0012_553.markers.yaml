  - {type: variant, offset: 2024, length: 1, content: 戰, SBCK: 吾欲倮葬以反吾眞必亡昜吾意死則爲囊盛尸尸入地七尺旣下從足引脫其囊以身櫬土其子欲黙}
  - {type: variant, offset: 2024, length: 7, content: 戰而死者其人之, WYG: 窆}
