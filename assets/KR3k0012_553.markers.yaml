  - {type: variant, offset: 1956, length: 0, content: '', SBCK: 同位至士踰月外姻至三年之䘮自天子逹庶人縣封葬不爲􅀨止不封不樹䘮不貳事禮記曽子問曰葬引至于堩日有食之則有變乎且不乎堩道也變謂異禮孔子曰昔吾從老聃助葬於巷黨及堩曰有食之老聃曰丘止柩就道右止哭以聽變旣明反}
