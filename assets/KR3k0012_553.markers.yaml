  - {type: variant, offset: 1994, length: 3, content: 古史考, SBCK: 綍無碑比岀宫御棺用功布大夫廢輴此言輴非也禮記中庸曰父爲大夫子爲士葬以大夫􅀕以士父爲士子爲大夫葬以士􅀕以大夫左傳隱公曰公將如棠觀魚者􅆇僖伯諌不從冬臧僖伯卒公曰叔父有憾於寡人叔父有諌觀魚不聽也寡人弗敢忘葬之加一等又曰元年冬十月庚申改葬惠公公弗臨賈逹曰改葬改備禮也葬嗣君之事公不臨言無恩禮曰改葬細北故不書惠公之薨也有宋師太子少葬故有闕是以改葬言是以明禮闕故也又曰天子七月而葬同􅁤畢至諸侯五月同盟至大夫三月同位至士踰月外姻至左傳僖上曰許穆公卒于師葬之以侯禮也男而侯禮加一等凡諸侯薨于朝㑹加一等諸侯命有三等公爲上等侯伯爲中等子男爲下等死王事加二等於是有以衮斂死王事謂朝天子以命用師衮斂者上公九命服衮也左傳宣上曰葬敬羸旱無麻始用􅁑茀記禮變之所由第所以引柩殯則有之以備火葬則以下柩􅀨不克葬禮也禮卜葬先逺日辟不懷也懷思也左傳成上曰宋文公卒始厚葬用蜃炭益車馬始用殉重器備椁有四阿棺有翰檜君子謂華元樂莒於是乎不臣臣治煩去惑者也今二子者君生則縱其惑死又益其侈是弃君於惡何臣之爲左傳昭二曰叔孫卒杜􅂥將以路葬且盡卿禮路王所賜欵孫車南遺謂季孫曰叔孫未乗路葬焉用之且冢卿無路介卿以葬不亦左乎左傳昭三曰鄭簡公卒將爲葬除除葬道及㳺氏之廟㳺氏子太叔族將毀焉子太叔使其除徒執用以立而無庸毀用毀廟具曰子産過女而問何故不毀乃曰不忍廟也諾將毀矣教毀廟者之辭旣如是子産乃使辟之毀之則朝堋弗毀則曰中而堋春秋􅀃題辭曰葬尸下藏也人生於隂含陽充死入地歸所與也宋均注人生隂謂在胞胎中論語先進曰顔淵死門人欲厚葬之子曰不可門人厚葬之子曰回也視予猶父也予不得視猶子也非我也夫二三子也言顔路在聽門人厚葬之白虎通}
