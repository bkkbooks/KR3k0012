  - {type: variant, offset: 2444, length: 1, content: 叔, krp: 士不耻人如此受中牟之功則中牟之士終身慙矣遂襁負其母南徙於楚楚王髙其義待以司馬新序曰白公勝拔劒而屬之於屈盧曰子與栽將捨之不與我將殺之屈盧曰吾聞之知命之士見利不動臨死不恐爲人臣者時生則生時死則死是謂之禮故人知天命下知人臣之道其有可刼乎子不推之白公勝乃入其劒汝南先賢傳曰王恢字仲通太守郭紆同爲主簿詔書發筋角紆親里竟辜較之恢諌紆曰明府爲藩屏大臣事當從公聽恣私曲何以爲治紆不從有告言之者詔書案問事當傳考紆見恢曰太守負君今當何以圖之恢曰明府不湏爲憂明府年六十恢年七十先明府生十有餘年不於今日効命將復何有遣詣考所自引受罪言太守不知之因欎氣不食而死郡以無事廣州先賢傳曰尹牙字猛德合浦人太守南陽終寵憂見顔色常用怪焉牙造膝伏見明府四節悲歎有慘瘁之思者何也寵曰父爲周張所害重仇未報是以長愧也牙乃傭僕自貶吏役而至于宛陵與張校圉交通竭節於張伺其間隙出入三年乃先醉張左右近侍以夜解縱諸馬令之亂駭張果出問其故牙因手刃張首而還楚國先賢傳曰應余字子正爲郡公曹是時呉蜀不賔山民背叛余與太守東里衮逃竄得出賊便射衮余以身當箭𬒳七瘡因謂賊曰我以身代君巳𬒳重瘡若身死君全殞殁無恨因仰天號泣涕血俱下如雨賊見其義烈釋衮不害㑹稽典録曰張京從戎西州軍罷還歸各給車牛京同里寡母與三子從軍子各物故見京還不能自致悲傷歔欷京以載之牛羸道死京入轅引軛妻子單歩又曰孟英字公房上虞人爲郡掾史王慿坐罪未應死太守下縣殺慿慿家詣闕稱冤詔書下州撿栲英岀定文書悉着英名楚毒慘至辭色不變言太守病不関衆事英以冬至日入占病因竊印以封文書下縣殺慿非太守意也繫歷冬夏肉皆消爛遂不食而死豫章志曰龔碩字顯先爲下江督郵太守㑹稽謝斐獲罪於時大皇帝幸尋陽碩乃具作章陳斐事候大駕於道叩頭流血時大風寒雪之後血流成冰上乃爲之住駕省章斐事見理繁欽丘儁碑曰故右扶風都尉主簿有者從都尉討叛胡官兵敗績卒伍奔散都尉臨陣墮馬儁於是下馬授甲以身禦宼遂致死戰塲都尉乗儁馬得免桂陽先賢畫讃曰朱陽羅陵果而好義郡汲府君爲州章陵𬒳掠栲叅加五毒援刀截舌以着盤中獻之廷尉群公義之事得清理㑹稽先賢傳曰陳業字文理郡守蕭府君卒業與書佐魯雙率禮送喪雙道溺于水業因掘泥楊波摇出其尸又業兄}
