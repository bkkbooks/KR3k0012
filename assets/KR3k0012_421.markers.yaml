  - {type: variant, offset: 2446, length: 0, content: '', SBCK: 海復見傾命時同依止者乃五六人骨肉消爛而不可記別業仰皇天誓后土曰聞親戚者必有異焉因割臂流血以洒骨上應時得血住餘皆流去續齊諧記曰田真兄弟三人家巨冨而殊不睦忽共議分財金銀􅎇物各以斛量田業生貲平均如一唯堂前一株紫荆樹花葉美茂共議欲破爲三人各一分待明就截之尔夕樹即枯死狀火燃葉萎枝摧根莖燋焠真至擕門而往之大驚謂語弟曰樹夲同株聞當分析所以憔悴是人不如樹木也因悲不自勝便不復解樹樹應聲遂更青翠華色繁美兄弟相感更合財産遂成純孝之門真以漢成帝時爲太中大夫西京􅄂記曹敞在呉章門下時輩謂敞}
