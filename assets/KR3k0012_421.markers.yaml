  - {type: variant, offset: 922, length: 0, content: '', WYG: 白公勝拔劍而屬之于屈盧曰子與我將捨之不與我將殺之屈盧曰吾聞之知命之士見利不動臨死不恐為人臣者時生則生時死則死是謂人臣之禮故人上知天命下知臣道其有可刼乎子不推之白公勝乃入其劍汝南先賢傳曰王恢字仲通太守郭紆用為主簿詔書發筯角紆親里競辜較之恢諫紆曰明府為藩屏大}
  - {type: page-break, offset: 922, content: '', id: KR3k0012_WYG_421-12b, image: WYG0896/WYG0896-0684b.png}
  - {type: variant, offset: 924, length: 3, content: 昭王猶, WYG: 當從公聴恣私曲何以為治紆不從有告言之者詔書案問}
  - {type: variant, offset: 928, length: 2, content: 大王, WYG: 當傳考紆見恢曰太守負君今當何以圖之恢曰明府不須為憂明府年六十恢年七十先明府生十有餘年不於今日効命將復何有遣詣考所自引受罪言太守不知之因欝氣不食而死郡以無事廣州先賢傳曰尹牙字猛德合浦人太守南陽終寵憂見顔色常用怪焉牙造膝伏見明府四節悲歎有慘瘁之思者何也寵曰父為周張所害重仇未報是以長愧也牙乃傭僕自貶吏役而至於宛陵與張校圉交通竭節于張伺其間隙出入三年乃先醉張左右近侍以夜解縱諸馬令之亂駭張果出問其故牙因手刃張首而還楚國先賢傳曰應余字子正為郡功曹是時吳蜀不賔山民背叛余與太守東里衮迸竄得出賊便射衮余以身當箭被七瘡因謂賊曰我以身代君已被重瘡}
