  - {type: variant, offset: 960, length: 392, content: 彭越為家人時常與布游及漢誅彭越夷三族梟首雒陽下詔有收視者輒捕之布時為越使齊還奏事彭越頭下祠而哭之吏捕以聞上召罵布若與彭越反耶吾禁人勿收若獨祠而哭之與反明矣趣烹之方提趣湯顧曰願一言而死上曰何言布曰方上之困彭城敗滎陽成皋間項王所以不能遂西徒以彭王居梁地與漢合從苦楚也當是之時彭王一顧與楚則漢破與漢則楚破且垓下之會微彭王項氏不亡天下已定彭王剖符受封亦欲傳之萬世今漢一徵兵於梁彭王病不得從而疑以為反反形未見以苛細誅之臣恐功臣人人自危今彭王已死臣生不如死請就烹上乃釋布拜為都尉漢書曰樓護有故人呂公無子歸護託身護與呂公及妻呂嫗同食護妻子頗厭呂公護聞之流涕責子曰呂公以窮老託身於我義所當奉遂養呂公終身又曰衛青日衰而霍去病日貴青故人門下多事去病輒得官爵唯獨任安不去又曰卜式河南人初以田畜為事弟奇忽請於式欲分財異居式便脫身出唯取羊百頭遂入山放牧經十餘年十倍於初卻買田宅居焉弟奇悉破其產矣式輒復分與之續漢, SBCK: 唐}
  - {type: variant, offset: 960, length: 89, content: 彭越為家人時常與布游及漢誅彭越夷三族梟首雒陽下詔有收視者輒捕之布時為越使齊還奏事彭越頭下祠而哭之吏捕以聞上召罵布若與彭越反耶吾禁人勿收若獨祠而哭之與反明矣趣烹之方提趣湯顧曰願一言, WYG: 繫厯冬夏肉皆消爛遂不食}
