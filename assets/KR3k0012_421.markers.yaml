  - {type: variant, offset: 122, length: 0, content: '', WYG: 至公門三廢車中其僕曰子懼矣何不及乎莊善曰懼者吾私也死義吾公也吾聞君子不以私害公遂刎頸而死風俗通曰巴郡太守太山但望字伯門為司徒掾同産弟子殺人繫獄望自劾去星行電征數日歸趣詣府露首肉袒辭謝太守太尉李固請與相見望頓頭流血自說弟薄命早亡以遺孤為託望失義方之教自陷罪惡自男穿既豫知情幸有㣲𦙍乞以代之言甚哀切李公逹于原度即活出之}
