  - {type: variant, offset: 2426, length: 1, content: 知, SBCK: 出境公曰然則燕君畏而失禮也寡人恐後丗以寡人爲能存燕而欺之也乃令燕君旋車割燕君所至而與之諸侯聞桓公之義而皆服之淮南子曰君子非義無以生失義則失其所以生小人非􅄝欲無以活失􅄝欲則失則所以活故君子懼失義小人懼失利􅁥鐵論曰阻險不如阻義也􅀃苑新序曰白公勝旣殺令尹司}
  - {type: variant, offset: 2426, length: 1, content: 知, krp: 出境公曰然則燕君畏而失禮也寡人恐後丗以寡人爲能存燕而欺之也乃令燕君旋車割燕君所至而與之諸侯聞桓公之義而皆服之淮南子曰君子非義無以生失義則失其所以生小人非嗜欲無以活失嗜欲則失則所以活故君子懼失義小人懼失利監鐵論曰阻險不如阻義也說苑新序曰白公勝旣殺令尹司}
  - {type: variant, offset: 2428, length: 0, content: '', SBCK: 欲立王子閭以爲王王子閭不肯刧之刃王子閭曰見國滅而志王不仁刼白刃而失義不勇吾雖死不子從也白公強之不可遂縊而殺之新序曰白公之難楚人有莊善者辭其母曰弃其親而死其君可謂義乎莊善曰吾聞事君者内其禄而外其身今}
