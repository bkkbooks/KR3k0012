  - {type: variant, offset: 2422, length: 1, content: 麟, SBCK: 老子曰大道廢有仁義又曰失道而後德失德而後仁失仁而後義失義而後禮文子曰丗治則以義衛身丗亂則以身衛義又曰體君臣正上下明親踈存危國繼絶丗立無後者義也墨子曰墨子之齊遇故人故人曰今天下莫爲義獨子爲義不若巳墨子曰今有子十人一人耕九人處耕者不可以不急何則食者衆而耕者寡也今天下莫爲義子冝勸何以止我又曰丗俗君子視義士不􅀂視􅀒粟者今有人􅀒粟息於路側欲起而不能君子見之無長少貴賤必起之何也曰義也今爲義之君子奉承王之道以語之縱不恱而行又從而非毁之則是丗俗之君子之視義士也不若視􅀒粟者列子曰桀紂唯重利而輕道是以亡人而無義唯食而巳是雞狗也強食磨角勝者爲利是禽獸也爲雞狗禽獸而欲人之尊巳不可得也孟子曰魚我所欲熊掌亦我所欲二者不可兼舎魚取熊掌生亦我所欲義亦我所欲二者不可得兼舎生取義孫卿子曰仁義礼善之於人也譬之貨財粟米之於家也多有之者冨少有之者貧至無有者窮六韜曰義之所在天下歸之尸子曰賢者之於義曰貴乎義乎曰義是故堯以天下與舜曰冨乎義乎曰義是故子罕以不受玉爲寳曰生乎義乎曰義故務光投水而殪三者人之所重而不足以易義又曰十萬之軍無將軍必大亂夫義萬}
