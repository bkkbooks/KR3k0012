  - {type: variant, offset: 112, length: 0, content: '', WYG: 曰貴乎義乎曰義是故堯以天下與舜曰富乎義乎曰義是故子罕以不受玉為寳曰生乎義乎曰義是故務光投水而沒三者人之所重而不足以易義又曰十萬之軍}
