  - {type: variant, offset: 118, length: 0, content: '', WYG: 夫}
  - {type: variant, offset: 120, length: 0, content: '', WYG: 為焦原也亦高矣是故賢者之于義也必且劑踵焉所以服一世也韓子曰義者君臣上下之禮父子貴賤之差也賈誼書曰齊桓公之始霸翟人伐燕桓公為燕北伐翟至孤竹桓公歸燕君送入齊地百六十里問於管仲曰禮諸侯相送固出境乎管仲曰非天子不出境公曰然則燕君畏而失禮也寡人恐後世以寡人為能存燕而欺之也乃令燕君旋車割燕君所至而}
  - {type: page-break, offset: 120, content: '', id: KR3k0012_WYG_421-9a, image: WYG0896/WYG0896-0682c.png}
  - {type: variant, offset: 121, length: 0, content: '', WYG: 之諸侯聞桓公之義而皆服之淮南子曰君子非義無以生失義則失其所以生小人非嗜欲無以活失嗜欲則失其所以活故君子懼失義小人懼失利鹽鐵論曰阻險不如阻義也說苑新序曰白公勝既殺令尹司馬欲立王子閭以為王王子閭不肯刼之刃王子閭曰見國滅而王不仁刼白刃而失義不勇吾雖死不子從也白公强之不可遂縊而殺之新序曰白公之難楚人有莊善者辭其母其母曰棄其親而死其君可謂義乎莊善曰吾聞事君者内其禄而外其身今所以養母者君之禄也身安得無死乎遂辭而行}
  - {type: page-break, offset: 121, content: '', id: KR3k0012_WYG_421-9b, image: WYG0896/WYG0896-0682d.png}
