  - {type: punctuation, offset: 23, content: 《, id: KR3k0012_CHANT_421-bkkpn9}
  - {type: variant, offset: 23, length: 2, content: 說又, WYG: 為雞狗禽獸而欲人之尊已不可得也孟子曰魚我所欲熊掌亦我所欲二者不可得兼舍魚取熊掌生亦我所欲義亦我所欲二者不可得兼舍生取義孫卿子曰仁義禮智之于人也譬之貨財粟米之於家也多有之者富少有之者貧至無有者窮六韜}
