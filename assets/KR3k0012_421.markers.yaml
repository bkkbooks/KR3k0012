  - {type: variant, offset: 348, length: 348, content: 索不得後必索之奈何杵臼曰立孤與死孰難程嬰曰立孤難耳杵臼曰趙氏先君遇子厚子為其難者吾為其易者請先死乃謀取他人嬰兒負之衣以文葆匿山中程嬰出謬謂諸將曰嬰不肖不能立趙孤孰子我千金吾告其處諸將皆喜許之發師隨程嬰攻公孫杵臼殺之諸將以為趙氏孤兒已死皆喜然趙氏真孤乃反在程嬰卒與俱匿山中居十五年晉景公疾卜之大蔡不遂者為崇景公問韓厥知趙孤在乃曰大業之後絕祀者其趙氏乎夫自中衍者皆嬴姓也中衍人面鳥噣降佐殷帝大戊及周天子皆有明德下及幽厲無道而叔帶去周適晉事先君文侯至于成公世有功德未嘗絕祀今吾君獨滅趙宗國人哀之故見龜策唯君圖之景公問趙向有後乎韓厥具以實告景公乃與韓厥謀立趙孤兒召而匿之宮中諸將入問疾景公因韓厥之眾以脅諸見趙孤名武諸將不得已乃曰昔下宮之難屠岸賈為之矯以君命非然孰敢作難微君之疾群臣固且請立趙後今君有令群臣, SBCK: 介}
