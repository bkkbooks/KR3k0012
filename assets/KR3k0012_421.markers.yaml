  - {type: variant, offset: 4684, length: 361, content: 州之士愧之漢晉春秋曰文王誅鍾會為功曹向雄收葬王召而責之雄曰昔先王掩骸埋胔仁流枯骨當時豈先卜其功罪而後葬哉今王誅既加於法已備雄感義收葬法教無闕法立於上教弘於下以此訓物雄曰可矣何必使雄背死違生以立於時殿下讎忿枯骨捐之中野百歲之後為臧獲所笑豈仁賢所掩哉王悅與宴談而遣之三十國春秋曰成都王穎禦長沙王乂於建春門陸機敗遁走穎誅機及弟雲夷三族機吳人而在寵族之上人多惡之成都王嬖人孟玖素不快於雲及機建門之敗機眾多喪牽秀譖之於穎言機持兩端孟玖復構之於內使牽秀斬機初機之專征請孫承為後軍司馬至是收承下獄考捶數百兩髁骨見終言機冤吏知承義烈謂承曰二陸之痛誰不知枉君何不愛身承仰天曰陸君兄弟世之奇士有顧於吾吾危不能濟死復相誣非吾徒也乃夷三族承門人費慈自詣穎明承之冤承喻之曰吾唯不負二陸死自吾分卿何為爾邪慈曰僕又安負君而求生乎固明承冤玖又疾之亦并見害, SBCK: ''}
