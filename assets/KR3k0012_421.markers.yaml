  - {type: variant, offset: 75, length: 0, content: '', SBCK: 死復何恨岱依事表上孝武帝詔特原罪又曰蔡廓字子度事兄䡄如事父家内大小諮而後行公私賞賜一皆納䡄有所諮湏就典者請之曽從武帝在彭城妻郗氏書求夏服時􅁤爲給事􅀰中廓荅曰知湏夏服給事自應相供無庸別􅀉崔鴻十六國春秋前趙録曰江都王延年年十五喪二親奉叔父孝聞子良孫及弟從子爲噉人賊所掠延年追而請之賊以良孫歸延年延年拜請曰我以少􅀌爲叔父所飬此叔父之􅀌孫也願以子易之賊曰君義士也免之又後趙録}
