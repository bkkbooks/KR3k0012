  - {type: variant, offset: 3538, length: 1145, content: 四人為黨儉得亡命止李篤家外黃令毛欽操兵到門篤引欽謂曰張儉知名天下而亡非其罪縱儉可得寧忍執之乎欽因起撫篤曰籧伯玉恥獨為君子足下如何自專仁義篤曰篤雖好義明延今日載其半矣欽歎息而去又曰彭修州辟從事時賊張子林等數百人作亂修與太守俱出討賊賊望見車馬競交射之飛矢雨集修以身障扞太守而為流矢所中死太守得全賊素聞其恩信即殺弩中修者餘悉皆降散言曰自為彭君故降不為太守服也魏志曰閻溫字伯儉天水西城人守上邿令馬超奔上邽郡人任養等舉眾迎之溫止之不能禁乃馳還州超復圍州甚急乃遣溫密出告急於夏侯淵賊圍數重溫夜從水中潛出明日賊見其跡遣追逐得之執溫還詣超解其縛謂曰今成敗可見若從吾言反謂城中東方無救此轉禍為福之計也不然今為戮矣溫偽許之超乃載溫詣城下溫向城大呼曰大軍不過三日至勉之超怒數之曰足下不為命計耶溫曰夫事君有死無貳而公乃欲令長者出不義之名吾豈茍生者乎超遂殺之又曰董卓遷帝長安幽州牧劉虞署田疇為從事奉使得報馳還未至虞已為公孫瓚所害疇至謁祭虞墓陳發章表哭泣而去瓚聞之大怒購求獲疇謂曰汝何哭劉虞墓而不送章報於我疇荅曰漢室衰頹人懷異心唯劉公不失忠節音報所言於將軍未美恐非所樂聞故不進也且將軍方舉大事以求所欲既滅無罪之君又讎守義之臣誠行此事則燕趙之士將皆東海而死豈忍從將軍者瓚壯其對不誅又曰初濟陰王思與梁習俱為西曹令史思直日白事失太祖旨太祖大怒教召主者將加重辟時思近出習代往對已被收執思乃馳還自陳己罪罪應受死太祖歎息之不言唴思之識分曰何意吾軍中有義士二人乎又曰牽招字子經袁紹辟招為督軍從事紹卒又事子尚後遼東送袁尚首懸在馬市牽招覩之悲感設祭頭下太祖義之又曰龐濟字子異初以涼州刺史從事守破羗長會武威太守張猛反殺刺史邯鄲商猛令敢有臨喪死不赦濟聞之棄官晝夜奔走號哭喪所訖詣猛門懷匕首欲因見以殺猛猛知其義士勑遣不殺由是以忠烈聞魏略下脂習除大醫令與孔融親善會融被誅當時許中與融善者莫敢收恤而習獨往撫而哭之曰文舉卿捨我而死復當與語者哀歎無已大祖收習欲理之尋以其事直見原蜀志曰曹公東征擒關羽以歸拜為偏將軍禮之甚渥曹公壯羽為人而察其無久留意謂張遼曰卿試以情問之遼以問羽羽歎曰吾極知曹公待我厚然吾受劉將軍恩誓以共死不可背之吾終不留吾要當立効以報曹公而後乃歸遼以羽言報曹公公曰事君不忘其本天下義士也度何時去遼曰受公恩必效力而後去也及羽殺顏良曹公知其必去重加賞賜羽拜書告辭而奔先主左右欲追之曹公曰彼為其主勿追也吳志曰陸瑁同郡徐愿居會稽素不相識臨死遺瑁書託孤瑁為起墳收導其子養之王隱晉書曰鄧攸遭石勒亂負母妻行入草遇賊失牛馬攸語其妻吾弟早亡唯有遺民今當步擔兩兒便當盡死不如自棄兒抱遺民吾後猶當有兒婦乃從之又曰趙王倫害張華之時洛中震悚唯閻績詣東市號哭弔屍而撫之曰早語君遜位而不肯去今果不免禍干寶晉紀曰宣王討王陵發令狐遇冢暴屍兗州武吏東平馬隆託廬三年種植松柏, SBCK: ''}
