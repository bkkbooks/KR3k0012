  - {type: variant, offset: 2424, length: 1, content: 畢, SBCK: 之將也國之所以立者義也人之所以生者亦義也又曰莒有石焦原廣數㝷長五十歩臨百仭之谿有以勇見莒公者却行劑踵焉莒國莫之敢近巳獨劑踵焉所以服莒國也夫義之爲焦原也亦髙矣是故賢者之於義也必且劑踵焉所以一丗也韓子曰義者君臣上下之禮父子貴賤之差也賈􅁩書曰齊桓公之始覇翟人伐燕桓公爲燕北伐翟至􅀌竹桓公歸燕君送入齊地百六十里問於管仲曰禮諸侯相送固出境乎管仲曰非天子}
