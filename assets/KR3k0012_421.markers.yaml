  - {type: variant, offset: 0, length: 0, content: '', SBCK: 太平御覽卷第四百二十一}
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_421-1a}
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書太平御覽卷四百二十一宋李昉等撰}
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_421-1a, image: WYG0896/WYG0896-0678c.png}
  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第四百二十一}
  body:
  - {type: variant, offset: 5, length: 1, content: 一, SBCK: 二}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 二義中晉書曰郗鑒字道徽高平金鄉人漢御史大夫慮之𤣥孫初鑒值永嘉喪亂在鄉里窮餒鄉人以鑒名德傳共飴之時兄子邁外甥周翼並小常擕之就食鄉人曰各自饑困以君賢欲共相濟耳恐不能兼存鑒於是獨徃食訖以飯着兩頰邊還吐與二兒後並得存同過江邁位至䕶軍翼為剡縣令鑒之終也翼追撫育之恩解職而歸席苫心喪三年又曰顔含有孝行兄㡬服藥多死於醫家含迎歸開棺復生母妻家人日益勤倦含棄官侍兄疾十三年曾無勞怠又顔含嫂病困須蚺蛇膽不能得含憂歎累日忽有}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_421-1b, image: WYG0896/WYG0896-0678d.png}
  - {type: variant, offset: 5, length: 1, content: 一, krp: 二}
  - {type: xml-element, offset: 6, content: '', id: KR3k0012_CHANT_421-bkkxmlele1}
  - {type: 'tls:seg', offset: 6, content: '', id: KR3k0012_CHANT_421-1a.1}
  - {type: 'tls:seg', offset: 6, content: '', id: KR3k0012_CHANT_421-1a.2}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 童子持青囊授含乃虵膽也童子忽化為青鳥飛去何法盛晉中興書曰紀瞻字思逺歴陽太守沛國武嘏臨亡以家後不立遂手書寄託瞻悉迎接為居宅衣食取足有若骨肉少與陸機兄弟親善機一門被誅瞻復相營恤機女為嫁之由是士稱其篤}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_WYG_421-2a, image: WYG0896/WYG0896-0679a.png}
  - {type: variant, offset: 7, length: 2, content: 上釋, SBCK: 中晉書曰郗鑒字道徽髙平金郷人漢御史大夫慮之玄孫􅀄鑒值永嘉喪乱在郷里窮餒郷人以鑒}
  - {type: variant, offset: 7, length: 0, content: '', WYG: 宋書龔穎遂寧人也少好學益州刺史毛璩辟為勸學從事璩為譙縱所殺故佐吏並逃亡穎哭號奔赴殯送以禮縱後設宴延穎不獲已而至樂奏穎流涕起曰北面事人亡不能死何忍舉觴聞樂蹈跡逆亂乎縱大将譙道福引出将斬之道福母即穎姑也跣出救之得免及縱僭號備禮徵又不至乃脅以兵刃執志無迴改至于蜀平遂不屈節又曰張進之永嘉安固人也為郡中大族少有志行歴五官主簿永寧安固二縣領校尉家世富足經荒年散財救贍鄉里遂以貧罄全濟者甚多太守王味之有罪當見收逃避進之供奉經時盡其誠力味之嘗避地墮水沉沒進之投水拯救相與沉淪危而得免時刼掠充斥每入村抄暴至進之門輒相約勒不得侵犯其義信所感如此又曰孫棘大明五年發三五丁弟薩應充行坐違期不至棘自詣郡辭列棘為家長令弟不行罪當百死乞以身代薩薩又辭列自引太守張岱疑其不實以棘薩各置一處報云聽其相代顔色莊悅甘赴死焉棘妻許氏又寄語囑夫曰君當門戸豈可委罪小郎且大家臨亡以小郎囑君今竟未婚娶家道不立君已有二子死復何恨岱依事表}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_WYG_421-2b, image: WYG0896/WYG0896-0679b.png}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_WYG_421-3a, image: WYG0896/WYG0896-0679c.png}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_WYG_421-3b, image: WYG0896/WYG0896-0679d.png}
  - {type: variant, offset: 7, length: 2, content: 上釋, krp: 中晉書曰郗鑒字道徽髙平金郷人漢御史大夫慮之玄孫𥘉鑒值永嘉喪乱在郷里窮餒郷人以鑒}
  - {type: xml-element, offset: 8, content: '', id: KR3k0012_CHANT_421-bkkxmlele2}
  - {type: xml-element, offset: 8, content: '', id: KR3k0012_CHANT_421-bkkxmlele3}
  - {type: 'tls:seg', offset: 8, content: '', id: KR3k0012_CHANT_421-1a.3}
  - {type: punctuation, offset: 8, content: 《, id: KR3k0012_CHANT_421-bkkpn1}
  - {type: variant, offset: 8, length: 1, content: 釋, WYG: 孝武帝詔特原罪又曰蔡廓字子度事兄軌如事父家事大小諮而後行公祿賞賜一皆納軌有所資須就典者請之曾從武帝在彭城妻郗氏書求夏服時軌為給事中廓荅曰知須夏服給事自應相供無庸别寄崔鴻十六國春秋前趙錄曰江都王延年年十五喪二親奉叔父以孝聞子良孫及弟從子為賊所掠延年追而請之賊以良孫歸延年延年拜請曰我以少孤為叔父所養此叔父之孤孫也願以子易之賊曰君義士也乃俱免之又後趙錄曰石勒謂右長史張賔曰鄴魏之舊都吾將營建誰可任也賔曰晉故東萊太守趙彭忠亮篤敏將軍若任之以鄴必能允副神規勒于是徵拜彭為魏郡太守彭至泣而辭曰臣徃曾策}
  - {type: page-break, offset: 8, content: '', id: KR3k0012_WYG_421-4a, image: WYG0896/WYG0896-0680a.png}
  - {type: punctuation, offset: 10, content: 》, id: KR3k0012_CHANT_421-bkkpn2}
  - {type: variant, offset: 10, length: 0, content: '', SBCK: 德傳共飴之時兄子邁外生周翼並小常携之就食郷人}
  - {type: variant, offset: 10, length: 0, content: '', WYG: 晉室食其祿矣夫受人榮寵復事二姓者臣志所不為且豈惟愚臣之狷志恐亦明公之所不許有死而已未敢聞命若賜臣餘年全臣一介之願者則明公大造也於是賜安車駟馬養以卿秩又蜀錄曰李安字武龍少養外家羅氏元康元年避地入蜀從李特征伐以勇烈聞李驤引為帳下督䕶數有戰功甚信愛之羅尚之遣隗伯攻郫也驤逆戰不利被傷落馬卧未能起士衆皆散唯安與任囬在左右伯從數千騎來叱安曰武龍吾所取有人卿宜避我安瞋目呵之曰吾不相與因躍馬直前刺之伯逡巡而退又前凉錄曰張世度燉煌人幼以孝讓著稱遊學京師遇中州大疫鄉人宗族死于京師十餘人世度年十六收恤殯塟識者嘉之呉均齊春秋曰上不豫南康王綝於第賜死獨江泌守尸晝夜號泣悲動路人于時諸王並見誅剪故舊無敢瞻看唯泌及衡陽王子浚侍讀嚴植各為營理喪事時人高其節泌字士清濟陽人也後魏書曰陽固字敬安北平無終人性俶儻不拘小節博覽篇籍有文才清河王懌辟太尉從事中郎懌為元乂所害朝野震悚懌諸子及門生僚吏莫不慮禍隱避不出固獨詣喪所盡哀慟哭良久乃還僕射遊肇聞而嘆曰雖欒布王修何以尚也唐書曰李密既降徐勣尚守黎陽倉謂長史郭恪曰魏公既歸于唐我士衆土地皆魏公之有也吾若上表獻之即是自邀富貴吾所耻也今宜具錄以啓魏公聽公自獻則魏公之功也及使者至高祖無表甚怪之使者具以聞高祖大悅曰徐勣感德推功真忠臣也即授黎州總管賜姓李氏又曰李綱孫安仁永徽中為太子左庶子屬太子被廢歸于陳邸宫寮皆逃散無敢辭送者安仁獨涕泣拜辭而去朝野義之後卒於恒州刺史又曰王義方泗州漣水人也少孤貧事母甚謹博通五經而蹇慠獨行初舉明經因詣京師中路逢徙步者自云父為穎上令聞病篤倍道將徃焉徒步不前計無所出義方以所乘馬與之不吿姓名而去老子曰大道廢有仁義又曰失道而後德失德而後仁失仁而後義失義而後禮文子曰世治則以義衛身世亂則以身衛義又曰體君臣正上下明親踈存危國繼絶世立無後者義也墨子曰墨子之齊遇故人故人曰今天下莫為義獨子為義不若已墨子曰今有子十人一人耕九人處耕者不可以不急何則食者衆而耕者寡也今天下莫為義子宜勸我何以止我又曰世俗君子視義士不若視負粟者今有人負粟息于路側欲起而不能君子見之無長少貴賤必起之何也}
