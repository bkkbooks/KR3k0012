  - {type: variant, offset: 908, length: 47, content: 樂毅去燕之趙趙王欲圖燕毅泣曰臣事昭王猶事大王若獲戾施在他國終身不敢謀趙之徒隸況燕昭王後嗣乎又曰, SBCK: 雖}
  - {type: variant, offset: 908, length: 4, content: 樂毅去燕, WYG: 左儒友於杜伯皆臣周宣王宣王將殺杜伯而非其罪也左儒争之於王九復之而王不許也王曰别君而異友斯汝也左儒對曰臣聞之君道友逆則順君以誅友友道君逆則率友以違君王怒曰易而言則生不易而言則死左儒對曰臣聞古之士不枉義以從死不易言以求生故臣能明君之過以死杜伯之無罪王殺杜伯左儒死之說苑曰佛肹以中牟縣叛設祿邑炊鼎曰與我者受邑不與我者烹中牟之士皆與之城北餘子田基獨後至袪衣將入鼎曰田基之義軒冕在前非義不乘斧鉞于後義死不避遂袪衣將入鼎佛肹止}
