  - {type: variant, offset: 2140, length: 275, content: 字仲翁為尚書郎同時郎坐事當居刑義默自表取罪論免同臺郎覺之委位白上乞贖義罪順帝皆除其罪東觀漢記曰杜林弟成物故隗囂乃聽林持喪東歸既遣而悔追令剌客楊賢於隴底遮殺之賢見林身推鹿車載致弟喪乃歎曰當今之世誰能行義雖小人何忍殺義士乃亡去又曰鮑永字君長為司隸校尉行縣到京兆灞陵過更始冢引車入陌欲下從事諫止之永曰親北面事人過其墓雖以獲罪司隸不辭也遂下車哭盡哀西至右扶風推牛上茍諫冢上問公卿曰奉使如此何如時太中大夫張堪對曰仁者百行之宗忠者禮義之至也仁不遣舊忠不忘君行之高者也上悅又曰肅宗崩廉范奔赴敬陵時廬江郡嚴麟奉章弔國俱會於路麟乘小車塗深馬死不能自進范見而愍然命從騎下, SBCK: 方所乗}
