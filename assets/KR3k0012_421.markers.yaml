  - {type: variant, offset: 2970, length: 541, content: 字公子楚郡人更始時天下亂平弟仲為賊所殺其後賊忽然而至平扶侍其母奔走逃難抱仲遺腹女而棄其子母欲還取之平不聽曰力不能兩活仲不可以絕類遂去不顧與母俱匿野澤中平朝出求食逢餓賊將烹之叩頭曰今旦為老母求菜老母待歸為命願得歸食母畢還就因涕泣賊哀而遣之平還食母訖因白曰屬與賊期義不可欺遂還詣賊眾皆大驚相謂曰常聞烈士今乃見之去矣吾不忍食子於是得全又曰汝南王琳字巨尉年十餘歲弟季出遇赤眉賊將為所哺琳自縛請先季死賊矜而放遣謝承後漢書曰天下亂人相食趙孝弟禮為餓賊所得孝聞之即自縛詣賊曰禮久饑羸瘦不如孝肥飽賊大驚放之謂曰可歸更持米糒來孝求不能得復往報賊願就烹眾異之遂不害又曰姜肱字伯淮彭城人肱與二弟仲海季江俱以孝著聞肱常與季江謁郡夜於道遇盜欲殺之兄弟爭死賊遂兩釋但奪衣資既至郡中見肱無衣怪問肱託以他辭終不言盜聞而感悔後乃就精廬求見徵君肱與相見皆叩頭謝罪而還所略物肱不受勞以酒食而遣之又曰劉翊字子相陳國人也張季禮嘗弔師喪大冰寒車毀牛病不能進罷曳道路翊行於汝南界中逢之素與䟽闊下馬與語便推所乘牢車強牛與之供其資糧不告姓名又曰梁國車章為縣功曹令黃拳為人所誣章證其無罪當下筆立辭乃以斧斫右手五指閉口死獄中又曰會稽戴就為郡倉曹掾太守為州所奏見收持吏以鐵針剌手爪中使以把土就十爪皆墮地終無撓辭又曰張儉為東部督郵時中嘗侍侯, SBCK: 御}
