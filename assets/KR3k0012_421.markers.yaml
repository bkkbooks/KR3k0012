  - {type: variant, offset: 1200, length: 1112, content: 人呂公無子歸護託身護與呂公及妻呂嫗同食護妻子頗厭呂公護聞之流涕責子曰呂公以窮老託身於我義所當奉遂養呂公終身又曰衛青日衰而霍去病日貴青故人門下多事去病輒得官爵唯獨任安不去又曰卜式河南人初以田畜為事弟奇忽請於式欲分財異居式便脫身出唯取羊百頭遂入山放牧經十餘年十倍於初卻買田宅居焉弟奇悉破其產矣式輒復分與之續漢書曰李固被誅梁冀乃露固屍於四衢令有敢臨者加其罪固弟子汝南郭亮年始成童左提章鉞右秉鈇鑕詣聞上書乞收固屍不許因往臨哭陳辭於其前遂守喪不去夏門亭長呵之亮曰含陰陽氣以生戴乾履坤義之所重豈知生命何為以死相懼太后聞而不誅乃聽得襚斂歸葬之又曰梁冀諷有司劾杜喬遂執繫之死獄中與李固俱暴屍於城北故人莫敢視者喬故掾陳留楊匡聞之號哭星行到洛託為夏門亭吏守衛屍喪驅護蠅蟲都官從事執之以聞太后義而不罪使於是帶鈇鑕上書詣闕乞杜李二公骸骨太后許之成禮殯殮送喬喪還家葬送行服隱匿又曰袁忠子秘為郡門下議生黃巾起祕從太守趙謙擊之軍敗祕與功曹封觀等七人以身扞刃皆死於陣謙以得詔復祕等門閭號曰七賢又曰陳蕃既被害友人陳留朱震時為銍令聞而棄官哭之收葬蕃屍匿其子逸於甘陵界中事覺繫獄合門桎梏震受栲掠誓死不言故逸其得免又曰史弼遷河東太守斷絕書屬中常侍侯覽遣諸生齎書請之并求假鹽稅弼大怒乃付安邑獄栲殺之覽遂詐作飛章下司隸誣弼誹謗檻車徵前孝廉魏劭毀變形服詐為家僮瞻護於弼弼遂受誣事當棄市劭與同郡人賣郡邸行賂於覽得減死罪一等論輸左校時人或譏曰平原行貨免君無乃甚乎陶丘洪曰文王羑里閎散懷金史弼遭患義夫獻寶亦何疑焉議者乃息又曰李燮字德公初李固既策罷知不免禍乃遣三子歸鄉里時爕年十三有頃難作下郡收固三子二兄受害爕姊文姬乃告父門生王成曰今委君以六尺之孤李氏存滅其在君矣成乃將爕入徐州界中變名姓為酒家傭而成賣卜於市陰相往來梁冀既誅而災眚屢見明年史官上言宜有赦令又當存錄大臣冤死者子孫於是求固後燮乃以本末告酒家酒家具車重厚遣之後王成卒爕以禮葬之感傷舊恩每四節為設上賓之位而祠焉又曰李膺門生皆禁錮侍御史景毅子寔為膺門徒未有錄牒故不譴毅慨然曰本謂膺賢遣子師之豈可以漏脫名籍茍安而已遂自表免歸時人義之後漢段潁討羗涼州刺史郭閎貪其功稽留潁軍義從者日役久戀鄉悉反叛於閎罪歸潁潁坐徵輸左校羗涼覆沒營場吏人守門訟潁詔問狀潁謝罪不敢枉京師稱之為長者焉又曰雷義字仲翁為尚書郎同時郎坐事當居刑義默自表取罪論免同臺郎覺之委位白上乞贖義罪順帝皆除其罪東觀漢記曰杜林弟成物故隗囂乃聽林持喪東歸既遣而悔追令剌客楊賢於隴底遮殺之賢見林身推鹿車載致弟喪乃歎曰當今之世誰能行義雖小人何忍殺義士乃亡去又曰鮑永字君長為司隸校尉行縣到京兆灞陵過更始冢引車入陌欲下從事諫止之永曰親北面事人過其墓雖以獲罪司隸不辭也遂下車哭盡哀西至, WYG: ''}
