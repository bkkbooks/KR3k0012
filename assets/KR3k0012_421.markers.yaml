  - {type: variant, offset: 68, length: 4, content: 左傳隱公, SBCK: 璩爲譙縱所殺故佐吏並逃亡頴號哭奔赴殯送以禮縱後設宴延頴不􅀗已而至樂奏頴流涕起曰北靣事人云不能死何忍舉觴聞樂蹈跡逆亂乎縱大將譙道福引岀將斬之道福母即頴姑也跌出救之得免及縱僣號備禮徴又不至乃脅以兵刃執志無迴改至于蜀平遂不屈節又曰張進之永嘉安固人也爲郡中大族少有志行歴五官主簿永寜安固二縣領校尉家丗冨足經荒年散財救贍郷里遂以貧罄全濟者多太守王味之有罪當見収逃避進之供奉經時盡其誠力味之甞避地墮水沉没進之投水拯救相與沉淪危而得免時劫掠充斥每入村抄􅁀至進之門輙相約勒不得侵犯其義信所感如此又曰孫􅁄大明五年發三五丁弟薩應充行坐違期不至􅁄自詣郡辭引巳爲家長令弟不行罪當在巳乞以身代薩應又辭自引太守張岱疑其不實以􅁄薩各置一處報云聽其相代顔色莊恱甘赴死焉􅁄妻許氏又􅀉語囑夫}
