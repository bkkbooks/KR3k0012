  - {type: variant, offset: 11, length: 3, content: 義者宜, SBCK: 各自饑困以君賢欲共相濟耳恐不能兼有存鑒於是獨徃食訖以飯着兩頰邊還吐與二兒後並得存同過江邁位至護軍翼爲剡縣令鑒之終}
  - {type: variant, offset: 11, length: 3, content: 義者宜, krp: 各自饑困以君賢欲共相濟耳恐不能兼有存鑒於是獨徃食訖以飯着兩頰邊還吐與二兒後並得存同過江邁位至護軍翼爲剡縣令鑒之終}
  - {type: variant, offset: 12, length: 0, content: '', WYG: 也今為義之君子奉承先王之道以語之縱不悅而行又從而非毁之則是世俗之君子之視義士也不若視負粟}
  - {type: page-break, offset: 12, content: '', id: KR3k0012_WYG_421-7b, image: WYG0896/WYG0896-0681d.png}
