  - {type: variant, offset: 2315, length: 2, content: 推牛, WYG: 都尉主簿有丘雋者從都尉討叛胡官兵敗績卒伍奔散都尉臨陣墮馬雋於是下馬授甲以身禦寇遂死戰塲都尉乘雋馬得免桂陽先賢畫讚曰朱陽羅陵果而好義郡汲府君為州章陵被掠拷參加五毒援刀截舌以着盤中獻之廷尉羣公義之事得清理㑹稽先賢傳曰陳業字文理郡守蕭府君卒業與書佐魯雙率禮送喪雙道溺于水業因掘泥揚波援出其尸又業兄度海復見傾命時同依止者乃五六人骨肉消爛而不可記别業仰皇天誓后土曰聞親戚者必有異焉因割臂流血以洒骨}
