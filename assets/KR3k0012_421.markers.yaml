  - {type: variant, offset: 1552, length: 282, content: 二公骸骨太后許之成禮殯殮送喬喪還家葬送行服隱匿又曰袁忠子秘為郡門下議生黃巾起祕從太守趙謙擊之軍敗祕與功曹封觀等七人以身扞刃皆死於陣謙以得詔復祕等門閭號曰七賢又曰陳蕃既被害友人陳留朱震時為銍令聞而棄官哭之收葬蕃屍匿其子逸於甘陵界中事覺繫獄合門桎梏震受栲掠誓死不言故逸其得免又曰史弼遷河東太守斷絕書屬中常侍侯覽遣諸生齎書請之并求假鹽稅弼大怒乃付安邑獄栲殺之覽遂詐作飛章下司隸誣弼誹謗檻車徵前孝廉魏劭毀變形服詐為家僮瞻護於弼弼遂受誣事當棄市劭與同郡人賣郡邸行賂於覽得減死罪一等論輸左校時人或譏曰平原行貨免君無乃甚乎陶丘洪曰文王羑里閎散懷金史弼遭患義夫獻寶亦何疑焉議者乃息, SBCK: 氏}
