  - {type: 'tls:seg', offset: 13, content: '', id: KR3k0012_CHANT_421-1a.5}
  - {type: variant, offset: 13, length: 1, content: 宜, WYG: 列子曰桀紂唯重利而輕道是以亡人而無義唯食而已是雞狗}
  - {type: punctuation, offset: 15, content: 。, id: KR3k0012_CHANT_421-bkkpn6}
  - {type: 'tls:seg', offset: 15, content: '', id: KR3k0012_CHANT_421-1a.6}
  - {type: variant, offset: 15, length: 9, content: 裁制事物使合宜也說, SBCK: 翼追撫育之恩解職而歸席占心喪三年}
  - {type: variant, offset: 15, length: 1, content: 裁, WYG: 强食靡角勝者為}
  - {type: variant, offset: 15, length: 9, content: 裁制事物使合宜也說, krp: 翼追撫育之恩解職而歸席占心喪三年}
  - {type: variant, offset: 17, length: 5, content: 事物使合宜, WYG: 是禽獸}
