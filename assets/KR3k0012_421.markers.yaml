  - {type: variant, offset: 2443, length: 0, content: '', SBCK: 太山任望字伯闓爲司徒􅁺同産弟子殺人繫獄望自劾去星行電征便道詣府露首􅁏袓辭謝太守李固請與相見望頓頭流血自􅀃弟薄命早亡以遺􅀌爲託望失義方之教自䧟罪惡息男國旣豫知情幸有微㣧乞以代之言甚哀切李公於是原活出之又曰俗􅀃齊人有空車行魯人有􅀒釡者便持釡置車中行二百里臨別取釡不相問亦不謝後車家繫獄當死釡主徑往簒之穿壁未逹曰極哉車者怒不肯出釡主慙欲俱死明日主者以事白齊君齊君義而原之􅀃苑曰子路曰不能甘勤苦不能恬貧窮不能輕死亡而曰我行義吾弗信也又曰燕昭王使樂毅伐齊閔王亡燕之􅀄入齊也聞盖邑人王歜賢令軍曰環盖邑三十里母入以歜之故巳而使人謂歜曰齊人多髙子之義吾以子爲將封子萬家歜固謝燕人曰子不聽吾引三軍而屠盖邑王歜曰忠臣不事二君貞女不更二夫齊王不聽吾諌故退而耕於野國旣亡吾不能存今又刼之以兵爲君將是助桀爲􅁀也生而無義固不如烹遂懸其脰樹枝自􅁬絶脰而死齊士大夫聞之曰王歜布衣猶不皆齊向燕况在位食禄者乎乃相聚如莒求諸公子立爲襄王又曰左儒友於杜伯皆臣周宣王宣王將殺杜伯而非其罪也左儒爭之于王九復之而王不許也王曰別君而異友斯汝也左儒對曰臣聞之君道友逆則順君以誅友友道君逆則率友以違君王怒曰易而言則死左儒對曰臣聞古之士不枉義以從邪不易言以求生故臣能明君之過以死杜伯之無罪王殺杜伯左儒死之􅀃苑曰佛􅆄以中牟縣叛設禄邑炊鼎曰與我者受邑不與我者烹中牟之士皆與之城北餘子田基獨後至祛衣將入鼎曰田基之義軒冕在前非義不乗斧􅃏於後義死不避遂祛衣將入鼎佛􅆄止之趙簡子屠中牟得而取之論有功者用田基爲始基曰吾聞}
