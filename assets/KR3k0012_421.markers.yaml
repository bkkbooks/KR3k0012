  - {type: variant, offset: 2721, length: 248, content: 又曰魏譚字少聞王莽末政亂盜賊起人民相食譚為夷所得等輩數十皆縛束當稍就噉見譚貌謹勑獨放令主炊養有夷長公哀譚謂曰汝曹皆當以次死哀縱汝急宜去譚不肯去叩頭曰我常為諸君主炊養食馨肉肌香餘皆菜食羸瘦肉腥臊不可食願先等輩死長公義之即相謂此兒有義可哀縱也賊遂皆放之數十人皆得脫又曰更始即位舞陰大姓李氏擁城不下更始遣柱天將軍李寶降之不肯云聞宛之趙氏有孤孫喜信義著聞願得降之更始徵喜使詣舞陰李氏遂降又曰桓典字公雅舉孝廉為郎中居無幾國相王吉以罪被誅故人親戚莫敢至者典獨棄官收歛歸葬服喪三年負土成墳為立祠堂盡禮而去又曰劉, SBCK: 太}
