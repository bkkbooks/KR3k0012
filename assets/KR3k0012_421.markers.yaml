  - {type: variant, offset: 2575, length: 0, content: '', SBCK: 償之敞曰吾窮老何明當有用故君之財􅁘道通當送飢寒何損常舉門遭疫妻子皆死常病臨困唯有􅀌孫年九􅀊常謂之曰吾􅀉故五官􅁺平與闞敞錢三十萬氣遂絶後孫年年長大歩擔至汝南問敞敞見之悲喜與共臨發穽錢乃百三十萬孤孫曰亡祖臨終言有三十萬耳今乃百三十萬不敢當也敞曰府君病困氣索言􅍝誤耳郎無疑也􅀓子曰太祖旣誅􅀽譚梟其首令曰敢有􅂘之者戮及妻子於是王叔治田子泰相謂曰生受辟命亡而不􅂘非義也畏死亡義何以立丗遂告其首而􅂘之哀動三軍軍正白}
  - {type: page-break, offset: 2575, content: '', id: KR3k0012_SBCK_421-10a}
  - {type: variant, offset: 2575, length: 0, content: '', WYG: 償之敞曰吾窮老何明當有用故君之財耶道通當送饑寒何損常舉門遭疫妻子皆死常病臨困唯有孤孫年九嵗常謂之曰吾寄故五官掾平輿闞敞錢三十萬氣遂絶後孫年長大步擔至汝南問敞敞見之悲喜與共臨發穽錢乃百三十萬孤孫曰亡祖臨終言有三十萬耳今乃百三十萬不敢當也敞曰府君病困氣索言謬誤耳郎無疑也傅子曰太祖既誅袁譚梟其首令曰敢有哭之者戮及妻子於是王叔治田子泰相謂曰生受辟命亡而不哭非義也畏死亡義何以立世遂告其首而哭之哀動三軍軍正白}
