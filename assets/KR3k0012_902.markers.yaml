  - {type: variant, offset: 2879, length: 2, content: 燉煌, SBCK: 胡蕙蜀中夲無也洛中人有驅羊入蜀其子着羊毛蜀人取種因名禾羊負來又曰隂夷山有􅁋羊一日百遍脯不可食但着床席間巳自驚人又有作􅁋羊脯法取羖􅳶各一别繫令裁相近而不使相接食之以地黄竹葉飲以麥汁未潘百餘日後解放之欲交未成便牽兩殺之􅈩以爲脯男食􅗑女食􅳶則並如狂好醜亦無所避其勢數日乃歇治之方煑茱茰菖蒲汁飲之又以水銀宫脂塗隂男子即痿宫脂鹿脂也杜預奏事曰臣前在南聞魏興北山有野羊大者數百十斤試令固求今者各得一枚并頭角蹄案其形不與土羊相似然是野獸土所希有新言曰􅀄年懸羊頭磔鷄頭以求冨余以問河南服君服君曰是月草木萌羊能嚙草雞啄五榖故懸二物助陽氣今人殺羊鷄自作不祥凉州異物志曰有小羊稱若斥頗熱峭山如壁上下無跌又曰有羊大尾車推乃行用累其身又曰封羊其背如駞宋永􅀄山川記曰九真都龍縣有麢羊大如牛春秋後語曰張儀謂楚王曰夫爲從者無異驅群羊而攻生虎虎之與羊不格亦明矣格􅃲也羊不能與虎明矣今王不與虎而與羊臣竊以爲大王之計過衛玠别傳曰玠少時乗白羊車於洛陽市共觀咸曰誰家璧人述異記曰羊而不角呼蛟羊一名胡髯郎一名青烏又曰周成王時東夷進六角羊周厲王元年外國貢三角羊尹喜内傳曰老子與喜别曰尋吾於成都市青羊之肆喜後求而得之􅁑洪神仙傳曰皇􅀄平年十五家使牧羊有道士見其良謹將至華山石室中四十年不誤念其家其兄􅀄起行索􅀄平見道士引至山與弟語畢問平羊何在平曰近東􅀄起視不見羊但見白石却謂平曰山東無羊平曰兄自不見尔與兄俱徃平乃叱之白石一時皆起成羊數萬頭􅀄起曰弟得仙道以如此遂弃妻子服松栢伏苓五萬日遂得仙易姓爲赤松子又曰曹公収左慈慈走入群羊失慈之所在追者疑化爲羊乃令人數羊羊夲千口簡之長一口知化爲羊乃謂曰􅀂是左公者但出無苦也有一羊跪言詎如許追者欲執之於是群羊皆長跪曰詎如許追者乃去搜神記曰宣帝時隂子方者至孝有仁恩正當臘日晨炊而竈神形見子方再拜家有黃羊因以祠之又曰南陽宗定伯少年夜行忽逢一􅀑􅀑問爲誰定伯乃欺之曰我亦􅀑也遂相與爲侣向逺行極困相檐問􅀑曰􅀑何所畏曰唯不喜人唾欲至宛便檐􅀑着頂上徑詣宛市化爲羊恐其變亟唾之賣之得錢千五百買者繫之明視之但繩在時人名宗定伯賣􅀑得千五百列仙傳曰􅁑由者羗人周成王時好刻木作羊賣之一旦􅀐羊而入蜀中王侯貴人追之上綏山在峨嵋山}
