  - {type: variant, offset: 1810, length: 6, content: 大將軍衛青圍, SBCK: 武王克殷微子持其􅀕器肉袒面􅅞左牽羊把茅膝行而前又曰卜式者河南人式入牧百餘羊十餘嵗羊致千餘上曰吾有羊在上林中欲令子牧之乃拜式爲郎布衣草蹻而牧羊蹻音脚􅀊餘羊悉肥上過其羊善之式曰非獨羊也治民亦如是也拜緱氏令又曰􅁗襄公始用羝羊祠西畤漢書曰楚懷王孫心在人間爲人牧羊項梁立爲懷王又曰蘇武使}
  - {type: page-break, offset: 1810, content: '', id: KR3k0012_SBCK_902-3b}
  - {type: variant, offset: 1810, length: 6, content: 大將軍衛青圍, WYG: 武王克殷微子持其祭器肉袒面縳見牽羊把茅膝行而前又曰卜式者河南人式入牧百餘羊十餘嵗羊致千餘上曰吾有羊在上林中欲令一牧之及拜式為郎布衣蹻而牧羊蹻音脚嵗餘羊悉肥上過其羊善之式曰非獨羊也治民亦如是也拜緱氏令又曰秦襄公始用羝羊祀西疇漢書蘇武使}
