  - {type: variant, offset: 1828, length: 375, content: 數百冒圍去追之不及漢書曰高昌性難伏乃作歌曰驢非驢馬非馬言高昌似騾也三國典略曰齊陽休之嘗乘騾遊於公卿門略無慚色又曰侯莫陳悅既敗與其子弟及麾下數十騎遁走至牽屯山不知所趣乃棄馬山谷乘騾而去唐書曰吳元濟叛其將有董重質者守洄曲其部下乘騾即戰號騾子部最為勁悍官軍恒警備之呂氏春秋曰趙簡子有兩白騾而甚愛之陽城胥渠豦黃門之官夜款門而謁曰主君之臣胥渠有疾醫教之曰得白騾肝病則止不得則死謁者入通董安于御於側慍曰譆胥渠也欺君請即刑焉簡子曰夫殺人以活畜不亦不仁乎殺畜以活人不亦仁乎於是令庖人殺白騾取其肝以與陽城胥渠豦無幾何趙興兵而攻翟黃門之官左七百人右七百人皆先登而獲甲首人主胡可以不好士抱朴子曰世不信騾乃驢馬所生云各自有種況乎仙者難知之事哉魯女生別傳曰李少君死後百餘日後人有見少君在河東蒲坂乘青騾帝聞之發棺無所有洞冥記曰脩彌國多神馬騾驢驢高十丈毛色皎然能行朮上有兩翼或飛於, SBCK: 降使北}
  - {type: variant, offset: 1828, length: 6, content: 數百冒圍去追, WYG: 降使北海上無人處牧羊曰羝乳乃得歸武在海上廪食不致掘野䑕草荄而食}
