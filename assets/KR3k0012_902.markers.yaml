  - {type: variant, offset: 2039, length: 230, content: 以活畜不亦不仁乎殺畜以活人不亦仁乎於是令庖人殺白騾取其肝以與陽城胥渠豦無幾何趙興兵而攻翟黃門之官左七百人右七百人皆先登而獲甲首人主胡可以不好士抱朴子曰世不信騾乃驢馬所生云各自有種況乎仙者難知之事哉魯女生別傳曰李少君死後百餘日後人有見少君在河東蒲坂乘青騾帝聞之發棺無所有洞冥記曰脩彌國多神馬騾驢驢高十丈毛色皎然能行朮上有兩翼或飛於海上常與牝馬合則生神騾又曰元封四年脩彌國獻駮騾高一丈毛色赤班皆山毛旋成日月之象常以金寶物器盛芻以飼之置於黃門廄東方朔曰此六畜之下者無, WYG: 牧羊項梁立}
