  - {type: variant, offset: 2702, length: 2, content: 南單, SBCK: 更始二年至長安尤嗜酒不聽政事所任皆賈竪膳夫庖人長安爲之語曰竈下飬中郎將爛羊胃􅀐都尉爛羊頭􅀜内侯又曰廣陵思王荆傳曰光武崩大行在殿荆哭不哀而作飛書令蒼頭詐􅁛東海王彊舅况書與彊􅌟爲大逆其辝曰當秋霜無爲檻羊秋霜肅殺於物檻羊受制於人崔鴻十六國春秋後録曰羌抑摩獻羊六角二口四角八口北史曰隋漢王諒爲并州揔管潞州有官羊生二角相背以爲諒之咎徴帝王丗紀曰湯問􅁑伯何故不祀曰無以供犧牲湯遺之以羊穆天子傳曰犬戎胡觴天子}
