  - {type: variant, offset: 2241, length: 402, content: 象常以金寶物器盛芻以飼之置於黃門廄東方朔曰此六畜之下者無為深愛昔夏侯淫于原獸以亡其國況戎翟獻其鄙獸費財毀德非所以示天下也楚莊好馬叔敖知其失政願陛下省物全國家之機事騾鄙獸宜置之於負乘不用則棄之於野上乃放之後野人見有赤虵自天屬地有雲氣來繞地及雲除虵復變為赤龍騎之入雲有人來告上曰滑稽兒使我失龍矣朔曰龍何難值恐陛下費金寶終化為驢騾耳帝納其言而深忌之吳曆曰朱據討沓中獲驢騾二千餘頭晉書曰乘傳使者賣官出使遭周親喪以上皆自表聞聽得白服乘騾車晉諸公讚曰劉禪降乘騾車詣鄧艾神仙傳曰葪子訓齊人也到京師諸貴人欲見之子訓曰我非有重曈八采欲見我我亦無所道遂去諸貴人皆逐之問人云適去東陌上乘騾者是乃各走馬逐之望見子訓騾徐行而名馬逐之不及乃各罷歸橐駞淮南子曰橐駞之本出泉渠廣志曰天笁以北多馲駞山海經曰號山陽之光山獸多橐駞善行流沙中日三百里負千斤史記匈奴傳曰其奇畜則橐駞又蘇秦傳曰蘇秦說楚威王曰大王誠能用臣之愚計則燕代橐駞良馬必實外廄, SBCK: 杖}
