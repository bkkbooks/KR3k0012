  - {type: variant, offset: 86, length: 1342, content: 白訓訓曰無苦遂往驢邊舉杖驢忽走起又曰永平中更用驢輦歲省億萬計全活徒士數千人又曰戴良字叔鸞其母喜驢鳴常學之以娛樂晉書曰王濟卒將葬時賢無不畢至孫楚雅敬濟而後來哭之甚悲客莫不垂涕哭畢向靈床曰卿嘗好我作驢鳴我為卿作之體似聲真賓客皆笑楚顧曰諸君不死而令王濟死乎世說曰王仲宣好驢鳴既葬魏文帝臨其喪顧語同遊曰王好驢鳴可各作一聲以送之赴客皆作驢鳴吳志曰諸葛恪父瑾長面似驢孫權大會群臣使人牽一驢入長檢其面題曰諸葛子瑜也恪對跪乞請筆益兩字續其下曰之驢舉坐欣笑以驢賜恪晉陽春秋曰晉文帝親阮籍恒與譚戲任其所欲不迫以職事籍從容嘗言曰平生曾遊東平樂其士風願得為東平太守文帝大悅即從其意籍便騎驢徑到郡至皆壞府舍諸壁鄣使內外相望然籍教令清整常留十餘日便乘驢去又曰胡威字伯虎父質為荊州威自京都省之家貧無車馬僮僕威自驅驢單行拜見告歸每至客舍自放驢取樵食畢復隨侶而進晉書曰石苞既定壽春以威惠服物淮南監軍王環輕苞素微又聞童謠曰官中大馬幾作驢大石壓之不得舒因是密表苞與吳人交通又曰王導諸葛恢曰人言王葛不言葛王恢曰人言驢馬不言馬驢豈驢勝馬也沈約宋書曰後廢帝昱於耀靈殿上養驢數十又曰吏部尚書庾仲文荀萬秋嘗詣仲文逢一客姓夏侯主人問有好牛不言無問有好馬不又言無正有佳驢耳仲文便荅云甚是所欲客出門遂與相問索之齊書曰劉祥博才慠物常謂一驢曰汝弩力如汝人才俱為令僕矣又曰謝超宗為人仗才使酒齊高帝問以北方事超宗對失儀出為南郡王中軍司馬人或問曰聞有朝命定是何府荅曰不知是司馬為復是司驢既是驢府正應是司驢為有司所奏以怨望免後魏書曰元坦慠很凶粗安豊王延明每切責之曰昔宋有東海王禕志性凡劣人號曰驢王我熟觀汝所作亦恐不免驢當時聞者號為驢王三國典略曰東魏靜帝遷都鄴尚書郎已下盡令乘驢又曰齊蕭愨為太子洗馬愨字仁祖常患腰痛眩不堪馳馬齊主令乘驢以從見者笑之北史曰公孫軌拜尚書賜爵郡公出為武牢鎮將初太武將北征發驢以運糧使軌部調雍州軌令驢主皆加絹一百疋乃與受之百姓語曰驢無弱負絹自壯眾共嗤之又曰後魏車駕往征蠕蠕司馬楚之與濟陰公盧中山等督運以繼大軍時鎮北將軍封沓亡入蠕蠕說令擊之以絕運蠕蠕乃潛遣覘楚之軍截驢耳而去有告失驢耳者楚之曰必覘賊截之為驗耳賊將至矣乃伐柳為城水灌令凍城立而賊至不可攻逼乃走散太武聞而嘉之唐書曰郭英乂鎮劍南取女人令乘驢擊毬以寶鈿為驢鈿賞賜巨萬以為笑樂風俗通曰靈帝於宮中西園駕四白驢躬自操轡驅馳周旋以為大樂於是公卿貴戚轉相倣至乘軿以為騎從價與馬齊又曰凡人相罵曰死驢醜惡之稱也董卓陵虐王室執政皆如死驢漢志曰靈帝駕四驢親自操轡驢者服重征遠上下山谷野人之所用耳何有帝王君子而驂駕之乎天意若曰國且大亂賢愚倒植凡執政者皆如驢焉金樓子云漢靈帝養驢數百頭常自騎之驅馳遍京師有時駕四驢入市符子曰有驢仙者享五百歲負乘而不輟歷無定主大驛於天下世說曰孝武帝未嘗見驢謝太傅問陛下遙想其形當何所似孝武掩口而笑荅曰頭當似豬續搜神記曰石虎中有一胡道人知呪術乘驢作賈客於外國深山中行下有絕澗窅然無底忽有惡鬼偷牽此道人驢下入澗道人尋跡呪誓呼諸鬼王須臾即驢物如故國朝傳記曰武后初稱周恐下心不安乃令人自舉供奉官正員外多置裏行拾遺補闕御史至有車載斗量之詠有御史臺令史將入室值裏行御史數人藂立門內令史不下驢衝過其間諸御史大怒將杖之令史云今日之過實在此驢乞先數之然後受罰御史許之謂驢曰汝伎藝可知, SBCK: 樹}
  - {type: variant, offset: 86, length: 100, content: 白訓訓曰無苦遂往驢邊舉杖驢忽走起又曰永平中更用驢輦歲省億萬計全活徒士數千人又曰戴良字叔鸞其母喜驢鳴常學之以娛樂晉書曰王濟卒將葬時賢無不畢至孫楚雅敬濟而後來哭之甚悲客莫不垂涕哭畢向靈床曰卿嘗好我作驢鳴我, WYG: 樹精}
