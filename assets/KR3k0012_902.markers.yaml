  - {type: variant, offset: 1647, length: 135, content: 脊綘身長頰廣額脩尾後垂巨耳雙礫斯又爾之形也嘉麥既熟寔須精面負磨廻衡迅若轉電惠我眾庶神祗獲薦斯又爾之能也爾有濟師旅之勳而加之以眾能是用遣中大夫廬丘加廬爾使銜勒大鴻臚班腳大將軍宮亭侯以楊州之廬江江州之廬陵吳國之桐廬冷浦之朱廬封爾為中驢公騾廣志云騾北方或曰罔說文曰騾驢父馬母也, SBCK: 羊}
