  - {type: variant, offset: 2882, length: 1, content: 渡, SBCK: 南髙無極隨之者不得還皆得仙道山上有桃故里諺曰得綏山一桃雖不得仙亦足以豪又曰昔有攘羊者以羊遺叔嚮叔嚮母埋之不食後三年攘羊事發追捕嚮家檢羊骨肉都盡唯有舌在國人異之遂以羊舌爲族矣續搜神記曰頋霈者呉之豪士送客於昇平亭時有一沙門在坐是}
