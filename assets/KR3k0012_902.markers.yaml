  - {type: variant, offset: 8, length: 1, content: 驢, SBCK: 羊祥也象四足角尾之形孔子曰牛羊之字以形舉又曰羔羊子也羜五月生羔也􅧌亡具六月生羔也羍七月生羊也䍮雉矯羊未卒嵗也䍧牝羊也羒扶分壯羊也羠音夷乗羊也羳扶貟黄腹羊也羥揩間羊名也廣雅曰呉羊牝一􅀊曰䍮三􅀊曰羝其一􅀊曰㹀三􅀊曰䍧呉羊犗居八切曰䍸蒲各羖羊搳曰羯羍􅧌􅳶䍻思䆓羔也爾雅曰麢大羊}
