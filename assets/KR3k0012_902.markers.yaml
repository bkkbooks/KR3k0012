  - {type: variant, offset: 1788, length: 19, content: 驢為牡馬為牝即生騾馬為牡驢為牝即生騰𩥔, SBCK: 羊一名羙髯􅂡主簿禮記曲禮下曰􅀕廟羊曰柔毛又曰大夫無故不殺羊又月令曰孟春天子食麥與羊又内則曰羊泠毛而毳羶詩小雅無羊曰誰謂爾無羊三百維群之羊子爲政今日之事我爲政與入鄭師故敗又宣下曰楚子圍鄭鄭伯肉􅃝牽羊論語曰子貢欲去告朔之餼羊子曰賜也爾愛其羊我愛其禮又曰葉公語孔子曰吾黨有直躬者其父攘羊而子證之攘盗}
  - {type: page-break, offset: 1788, content: '', id: KR3k0012_SBCK_902-2a}
  - {type: page-break, offset: 1788, content: '', id: KR3k0012_SBCK_902-3a}
  - {type: variant, offset: 1788, length: 1, content: 驢, WYG: 羊一名髯鬚主簿禮記曲禮下曰祭廟羊曰柔毛又曰大夫無故不殺羊又月令曰孟春天子食麥無羊又内則曰羊冷毛而毳羶詩小雅無羊曰誰謂爾無羊三百}
  - {type: page-break, offset: 1788, content: '', id: KR3k0012_WYG_902-2b, image: WYG0901/WYG0901-0061d.png}
  - {type: variant, offset: 1788, length: 19, content: 驢為牡馬為牝即生騾馬為牡驢為牝即生騰𩥔, krp: 羊一名羙髯鬚主簿禮記曲禮下曰祭廟羊曰柔毛又曰大夫無故不殺羊又月令曰孟春天子食麥與羊又内則曰羊泠毛而毳羶詩小雅無羊曰誰謂爾無羊三百維群之羊子爲政今日之事我爲政與入鄭師故敗又宣下曰楚子圍鄭鄭伯肉袒牽羊論語曰子貢欲去告朔之餼羊子曰賜也爾愛其羊我愛其禮又曰葉公語孔子曰吾黨有直躬者其父攘羊而子證之攘盗}
  - {type: variant, offset: 1790, length: 2, content: 牡馬, WYG: 羣又曰爾羊來思其角戢戢又曰羔羊鵲巢之致也召南之政在位皆節儉正直德如羔羊也羔羊之皮素絲五紽又曰䍧羊羵首三星在霤鄭𤣥注曰羊牝曰䍧羵大也易説卦曰兌}
  - {type: punctuation, offset: 1791, content: 、, id: KR3k0012_CHANT_902-bkkpn562}
  - {type: variant, offset: 1793, length: 5, content: 牝即生騾馬, WYG: 羊又大壯曰九三小人用壯君子用罔貞厲羝羊觸藩羸其角周禮夏官下曰羊人掌羊牲凡祭祀飾羔羔小羊詩曰四之日其早獻羔祭韭祭祀割羊牲登其首登昇也凡祈珥共其羊牲共猶給也賓客共其􅂒羊􅂒羊飡饔積膳之羊凡沈辜候穰釁積共其羊牲周禮天官食醫曰凡㑹膳食羊宜黍左傳宣上曰華元殺羊食士其御羊斟不與及戰曰疇昔之羊子}
  - {type: page-break, offset: 1793, content: '', id: KR3k0012_WYG_902-3a, image: WYG0901/WYG0901-0062a.png}
