  - {type: variant, offset: 1429, length: 217, content: 神極鈍何物驢畜敢於御史裏行於是羞赦而止楚辭曰驥垂兩耳中阪蹉𧿶蹇驢服駕無用日多又曰駕蹇驢而無策又何路之能極臧彥吊驢文曰爰有奇人西州之馳驅者體質強直稟性沉難聰敏寬詳高音遠暢真驢氏之名駒也宋袁淑俳諧文曰驢山公九錫曰若乃三軍陸邁糧運艱難謀臣停筭武夫吟歎爾乃長鳴上黨忼慨應官崎嶇千里荷囊致飧用捷大勳萬世不刊斯實爾之功也音隨時興晨夜不默仰契玄象俯叶漏刻應更長鳴毫分不卻雖挈壺著稱未足比德斯復爾之智也若乃六合昏晦三辰幽冥猶憶天時用不應聲斯又爾之鳴也, SBCK: 爲}
