  - {type: variant, offset: 2879, length: 2, content: 燉煌, WYG: 胡蕙蜀中本無羊洛中人有驅羊入蜀者胡蕙子著羊毛蜀人取種又曰隂夷山有淫羊一日百遍脯不可食但著床席間已自驚人又有作淫羊脯法取羖􅳶各一别繫令裁相近而不使相接食之以地黄竹葉飲以汁百餘日後解放之欲交未成便牽兩殺之膊以為脯男食􅗑女食􅳶則並如狂好色亦無所避其勢數日乃歇治之方煮茱萸菖蒲汁飲之以水銀宫脂塗隂男子即痿宫脂鹿脂也杜預奏事曰臣前在南聞魏興北山有野羊大者數百十斤試令曰求今者各得一牧并頭角蹄案其形不與土羊相似然是野獸世所希有新言曰初年懸羊頭磔雞頭以求富余以問河南服君服君曰是月草木胡羊能嚙草雞啄五糓故懸二物助陽氣今人殺羊雞自作不祥凉州異物志曰有小羊稱若斤頞黝峭如山壁上下如跌又曰有羊大尼車推乃行用累其身又曰封羊其背如駝宋永初山川記曰九真都龍縣有電廬羊大如􅀈牛春秋後語曰張儀謂楚王曰夫為従者無異驅羣羊而攻生虎虎之與羊不格亦明矣格鬭也今王不與虎而與羊臣竊以為大王之計過衞玠别傳曰玠少時乗白羊車於洛陽市共觀咸曰誰家璧人述異記曰蛟羊無角啖之毒又曰羊一名胡髯郎又名青鳥又曰周成王時東夷進六角羊周康王元年外國貢三角羊尹喜内傳曰老子與喜别曰尋吾於成都市青羊之肆喜後求而得之葛洪神仙傳曰皇初平年十五家使牧羊有道士見其良謹將至華山石壁中四十年不誤念其家其兄初起行索初平見道士引至山與弟語畢問平羊何在平曰近東初起視不見羊但見白石却謂平曰山東無羊平曰兄自無見耳與兄徃平乃叱之白石一時皆起成羊數萬頭初起曰弟得仙道已如此遂棄妻子服松柏茯苓五萬日遂得仙易姓為赤松子又曰曹公収左慈慈走入羣羊失慈之所在追者疑化為羊乃令人數羊羊本千口簡之長一口知化為羊乃謂曰若是左公者但出無苦也有一言羊跪言遽如許追者欲執之於是羣羊皆長跪曰遽如許追者乃去捜神記曰宣帝時隂子方者至孝有仁恩正當臘日晨炊而竈神形見子方再拜家有黄羊因以祀之又曰南陽宋定伯年少夜行忽逢一鬼問為誰定伯乃欺之曰我亦鬼也遂遞相擔負而行定伯曰我新鬼不知鬼何所惡曰惟不喜人唾欲至宛便擔鬼著肩上徑詣宛市化為羊恐其變亟唾之賣之得錢千五百買者繫之明視之繩在時人有言定伯賣鬼得錢千五列仙傳曰葛由者羗人周成王時好刻木作羊賣之一旦騎羊而入蜀中王侯貴人追之上綏山在峨嵋山}
