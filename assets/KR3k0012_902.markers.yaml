  - {type: variant, offset: 1802, length: 5, content: 牝即生騰𩥔, WYG: 政與入鄭師故敗又宣下曰楚子圍鄭伯肉袒牽羊論語曰子貢欲去吿朔之餼羊子曰賜也爾愛其羊我愛其禮又曰葉公語孔子曰吾黨有直躬者其父攘羊而子證之}
