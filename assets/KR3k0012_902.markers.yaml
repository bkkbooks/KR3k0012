  - {type: variant, offset: 2746, length: 0, content: '', SBCK: 同其亡羊均也又曰善飬生者如牧羊後者鞭之墨子曰齊莊公之臣王國卑中里撽者訟三年而獄不断恐失有罪使二人共一羊盟齊之社二子相從以羊血灑社讀王國卑之祠巳盡終里撽之辭未半􅀕羊起而觸中里撽齊人以爲有神驗列子傳曰楊朱見梁王言治天下如運諸掌王曰先生有一妻一妾而不能治三畒之園而不能芸言治天下何也曰君見夫牧羊者乎百羊而群使五尺童子荷箠而隨之欲東而東欲西而西使堯牽一羊舜荷箠而隨之則不能前矣孫卿子曰仲尼爲魯司㓂沈猶氏不敢朝}
