  - {type: variant, offset: 2818, length: 1, content: 候, WYG: 有神騐列子傳曰楊朱見梁王言治天下如運諸掌王曰先生有一妻一妾而不能治三畆之園而不能芸言治天下何也曰君見夫牧羊者乎百羊而羣使五尺童子荷菙而隨之欲東而東欲西而西使堯牽一羊舜荷菙而隨之則不能前矣孫卿子曰仲尼為魯司冦沈猶氏不敢朝飲其羊尸子曰羊不任駕鹽車椽不可為楣棟龍魚河圖曰羊有一角食之殺人周書曰夏桀衰夷羊在牧飛蛤滿野史記又云飛鳥滿野韓詩外傳曰魯哀公使人穿井三月不得泉得一生羊焉公以為玉羊使祝鼓舞之欲上於天羊不能上孔子見曰水之精為玉土之精為羊願無怪之此羊肝土也公使殺之視肝}
