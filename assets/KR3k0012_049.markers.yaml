  - {type: variant, offset: 826, length: 358, content: 樊山孫權常獵於下見一姥問獵得何物荅曰只獵得一豹曰何不堅其尾言訖忽然不見權於後立廟祀之西塞山江夏風俗記曰西塞山高一百六十丈周廻三十七里峻崿橫江危峰斷岸長波所以東注高浪為之西翻袁宏東征賦云沿西塞之峻崿是也又江表傳云劉勳敗於彭澤走之入楚江聞晥已沒遂投西塞白雉山江夏圖經曰白雉山其山上有芙蓉峰前有師子嶺後有金雞石西金南出銅鉚自晉宋梁陳以來常置立爐治烹煉鳳栖山江夏圖經曰鳳栖山西北陸路去州二百二十五里吳建興年中鳳皇降此山因以為名山有石鼓鼓鳴則雨降神人山曆帝記曰神人山吳建衡二年有神人乘白鹿從此山出因名神人山南昌山豫章圖經曰南昌山者昔吳王濞鑄錢之山時有夜光遙望如火以為銅之精光梁氏十道志云以豫章有銅山山中有洪井飛流懸注其深無底是也山有洪崖先生鍊藥之井亦號洪崖山有石臼存焉松門山豫章圖經曰松門山者以其山多松遂以為名北臨大江及彭蠡湖, WYG: 耒陽文斤}
