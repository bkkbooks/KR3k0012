  - {type: variant, offset: 1280, length: 298, content: 釣磯山異苑曰釣磯山者陶侃嘗釣於此山下水中得織梭一枚還掛壁上後化成赤龍從室而去其山石上猶有侃跡存焉雞籠山郡國志曰江州雞籠山山上有石雞冠距如生有道士李鎮住此山下常賞翫之雞一旦自毀鎮曰雞既如此吾其終乎果卒五女山郡國志曰江州五女山始皇死五女葬此山天昏每聞箏笛之聲射的山郡國志曰射的山者古老相傳云上有玉在石壁內南面遙望似有白處曾有胡人來取上山後遇風雨不果得今遠望頗似射侯故名射的焉石印山吳志曰天璽元年鄱陽郡言歷陵山石有文理成字巫言石印神有三郎皓遣使以大牢祭并印綬拜三郎為王又按江氏記云歷陵有石印山臨水高百丈有七穿駢羅穿中色黃赤相續因謂之石印山龍虎山信州圖經曰龍虎山在貴谿縣二山相對谿流其間乃張天師得道之山羊, WYG: 足也昭}
