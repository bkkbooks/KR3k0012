  - {type: variant, offset: 1783, length: 0, content: '', WYG: 聞風吹若簫管之聲馬嶺山郡國志曰郴州馬嶺山本名牛脾山山上有仙人蘇躭壇即郴人也為兒童時與衆童牧更直守牛毎躭守牛牛不敢散嘗與衆兒獵即乗鹿人笑之曰龍也去郡百二十里母臨食晚往買鮓湏㬰即還一日有衆賔來躭啓母曰受性當仙仙人合招躭去今年疾疫甚飲家中井水即無恙又種藥於園梅樹下可治百病買此水及藥過於供飬便去母遽視之衆賔皆白鶴也}
