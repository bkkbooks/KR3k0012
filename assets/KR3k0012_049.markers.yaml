  - {type: variant, offset: 1846, length: 165, content: 舊名傷山周廻連延一十八里袁江流於其間巨石枕崎潺激舟人上下多傾覆故名傷山顧野王輿地記云時人以傷為非善徵乃改為昌山石室山宜春記曰郡有石室山山有數石室相連高十餘丈皆相似素壁若雪萬像森羅於其所因以為名黃唐山輿地志曰贛縣黃唐山有石室如數千間屋上通天䆫下有方榻者二石人巾櫛而坐傍有小石室七所相通悉有石人室前時有車馬跡春夏草不生無諸毒蟲林木繁茂, SBCK: 灕}
