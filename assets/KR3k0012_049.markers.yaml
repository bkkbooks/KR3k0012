  - {type: variant, offset: 128, length: 0, content: '', WYG: 焉佷山宜都山川記曰佷山山谷之内有石穴穴出清泉有神魚大者二尺小者一尺釣者先請多少拜而請之數滿便止水側有異花欲摘之者亦如魚請又有異木名千嵗木葉似棗冬夏常青宜陽山宜都記曰宜陽山有風井穴大如甕夏出冬入有樵人置笠穴口風噏之入後於長楊溪口得笠則知潛通焉丹山宜都記曰丹山時有赤氣籠井如丹故有此名小酉山盛宏之荆州記曰小酉上石穴中有書千卷相傳秦人於此講學因留之}
