  - {type: variant, offset: 2607, length: 277, content: 南康記曰峽山上時有夜光飛熖遙見若火炤燎于原從峽泝流數十里有石臨水名曰蛟窟天寶六載勑改名夜光山梓潭山南康記曰梓潭山有大梓樹吳王令都尉蕭武伐為龍舟槽斫成而牽引不動占云須童男女數十人為歌樂乃當得遂依其言以童男女牽拽糟沒于潭中男女皆溺其後天晴朗淨髣髴若見人舡焉夜宿潭邊或聞歌唱之聲因號梓潭焉柴侯峽南康記曰柴侯峽山漢靈帝時有劉叔喬避地於茲死葬村側自云柴侯墓晉末喪亂有發其塚者忽有大風雨棺及松柏悉飛渡水移上此峰其棺乃化為石因是而名之官山南康記曰官山者天寶六年改名珠玉山其山高峻有善鳥香草嘗有人於此山見大珠玉相傳謂之官山君山南康記曰君山翠麗鮮明遙若臺榭名曰媧宮亦曰女姥, SBCK: 也浮}
