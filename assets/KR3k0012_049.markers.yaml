  - {type: variant, offset: 11, length: 1, content: 靜, SBCK: 荆山首曰景山金玉是岀此即卞和抱璞之處南連青山北接鴈塞通林交麓峭峙相望雖群峯競起而荆山獨秀卞和得玉於此山獻厲王王使玉人相之曰石也刖其左足厲王薨獻之武王玉人相之又曰石也刖其右足和抱其璞哭荆山之下河圖括地象曰荆山爲地雌上爲軒星荆門山􅀽山松冝都山川記曰南崖有山名荆門北對崖有山名虎牙二山相對其荆門}
