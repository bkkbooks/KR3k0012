  - {type: variant, offset: 1585, length: 3, content: 曰啇安, SBCK: 云昭山下有旋潭深無底是湘水最深之處昔有人舟覆於此潭其槽并甑有名題號後於洞庭㝷得即知暗通也五溪山長沙圖經云五溪山在}
  - {type: variant, offset: 1585, length: 3, content: 曰啇安, krp: 云昭山下有旋潭深無底是湘水最深之處昔有人舟覆於此潭其槽并甑有名題號後於洞庭㝷得即知暗通也五溪山長沙圖經云五溪山在}
