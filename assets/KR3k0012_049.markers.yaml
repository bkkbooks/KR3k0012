  - {type: variant, offset: 3030, length: 556, content: 丈周廻三百步又有石峽左右高五六十丈勢若雙闕其狀入雲復有古石室色如黃金號為金室有鸀鳥形色鮮絜自愛毛羽其隻者或鑒水向影悲鳴自絕方知孤鸞對鏡為不虛矣山頂有杉枋數百片高危懸絕非人力所及焉莫巨山荀伯子臨川記曰巖內有石人坐盤石上體有塵穢則興風雨洗訖晴日遍體絜朗如玉瑩淨民以為準焉五章山荀伯子臨川記曰五章山絕巖嶮峭有密蜂依之為房其形如笠採者皆懸磴數十丈然後獲之麻山荀伯子臨川記曰麻山或有登之者望廬岳彭蠡皆在其下有黃連厚朴恒生焉又有楓樹及數千年者如人形眼鼻口全而無臂腳入山往往見之或斫之者皆出血人以籃冠其頭明日看輒失籃俗名楓子鬼其山竹木稠密如麻因名麻山天寶六年職方奏改名豊材山焉鄧公山信州圖經曰鄧公山在縣北本名銀山因鄧遠為鄧公場儀鳳二年祭山山頹陷焉按開山記云揔章二年邑人鄧遠經刺史豆廬公陳開山之便尋為山隱後人立鄧公廟焉明府山信州圖經曰明府山在縣東其山久晴不雨山或自鳴必有大雨久雨不晴欲晴自有煙霧蓋其頭古老相傳祈請有驗鶴嶺山信州圖經曰鶴嶺山自貴溪縣界崗阜鱗次北入縣境嶺上多松樹有鶴窠因得名為鶴嶺山石虹山鄱陽記曰虹山有石室中有石砥平如床可容置數百人旁列石鄣如屏風篆書為八十三字有橫石跨水而渡文彩青赤若虹蜺因名為石虹山洪崖山豫章記曰按舊經云古老相傳昔有洪崖先生者居此山上故以為名又列仙傳云洪崖山者山之陽有洪唐寺山中有洪崖壇每亢旱禱於此, SBCK: 九}
