  - {type: variant, offset: 2903, length: 126, content: 有自然石室形風雨之後景氣明靜頗聞山有鼓吹之聲盤固山南康記曰盤固山有石井井側有大銅人常守之按此石井五百年水一湧起高數丈銅人以手掩之其水即止其山盤紆峻嶒因號為盤固山焉歸美山南康記曰歸美山高數百丈遠望嵯峨靈闕騰空故老謂之神闕其山有水出焉西面嶮峻自然有石城高數, WYG: 太平御覽卷四}
