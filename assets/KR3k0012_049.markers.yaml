  - {type: variant, offset: 160, length: 0, content: '', SBCK: 馬援所穿室也室内有蛇如百斛舡云是援之餘靈天門山武陵記曰天門山上有葱如人所種畦壟成行人欲取之先禱山神乃取氣味甚美不然者不可得巖中有書數千卷人見而不可取黃聞山武陵記曰昔有臨沅黃道眞在黄聞山側釣魚因入桃花源陶潜有桃花源記今山下有潭立名黄聞此蓋聞道眞所􅀃遂爲其名也風門山武陵記曰風門山有石門去地百餘丈每將欲風起此門先有黒氣􅀂煙隱隱而上斯須風起竟人石㠶山武陵記曰石㠶山石危起若數百幅㠶形虎齒山武陵記曰虎齒山形如虎齒民嘗六月祭之不然即輙有虎害移山武陵記曰移山在汧陽界本在江北岸因風雨之勢一夕移渡江南岸後以此名之淳于山武陵記曰淳于山與白雉山相近在辰州武陵二郡界絶壑之半有一白雉逺望首尾可二丈申足翔翼若虛中翻飛即上視之乃有一石雉舒翅綴着石上山下有石室數畒望室裏雖闇猶見銅鍾髙丈餘數十枚其色甚光明武陵山武陵記曰武陵山中有秦避世人居之㝷水號曰桃花源敞陶潜有桃花源記又云山上有神母祠平都山神仙傳云後漢延光元年隂長生於馬明生邊求仙法乃將長生入青天山中煑黃􅁟爲金以示之立壇唼血取太清神丹經授之乃別去長生後於平都山白日昇天即此山是也山在南賔縣北二里陽歧山荆南記云石首縣陽歧山山無所岀不足可書本屬南平界范􅀇平記云故老相承云胡伯始以本縣境無山此山上計偕簿髙都山江源記云楚辭所謂巫山之陽髙丘之阻髙丘蓋髙都山也君山博物志云君山洞庭之山是也帝之二女居之曰湘夫人帝女遣精衛至王母取西山之玉印印東海北山􅁃穆之湘州記云昔秦皇欲入湘觀衡山而遇風浪溺敗至此山而免因號爲君山又荆州圖副云湘君所遊故曰君山有神祈之則利渉山下有道與呉包山濳通上有美酒數斗得飲者不死漢武帝故事云帝齋七日遣欒賔將男女數十人至君山得酒欲飲之東方朔曰臣識此酒請視之因即便飲帝欲殺之朔曰殺朔􅀂死此爲不驗如其有驗殺亦不死帝赦之小廬山衡山圖經曰小廬山一名浮丘山在縣西一百八里髙六里三十歩東西二十里南}
