  - {type: variant, offset: 1755, length: 1, content: 鍾, WYG: 在益水之陽水出縣北流入資口在縣門橋下皆五溪之下口也又關雲長屯軍資水北按即一名茱茰江也吴甘寧拒之云聞吾咳唾彼即不敢過江是此處今號為雲長瀬錢石}
  - {type: variant, offset: 1757, length: 0, content: '', WYG: 湘川記曰曲江縣東有錢石山其状四方有石臺其石三面壁立其上碎石如錢故謂之錢石山采玉山湘川記曰曲江縣有采玉山卉木滋茂泉石澄徹相傳云採玉於此因以得名玉山湘川記曰玉山下有廟曾有人得玉瑛於此有銀山白石山越王山又浮山其地躡一處則百餘步地動}
