  - {type: variant, offset: 6, length: 3, content: 江夏圖, SBCK: 荆山荆門山勾將山虎牙山􅀌山髙筐山佷山冝陽山丹山小酉山芋山嵩梁山崇山武山壷頭山天門山黃聞山風門山石忛山虎齒山移山淳于山武陵山平都山陽歧山髙都山君山小廬山静福山方臺山攸縣雲陽山烏龍白􅀐山文斤山石鷰山萬歳山黃箱山麓山昭山五溪山錢石山采玉山玉山臨賀山馬嶺山彈丸山百丈山灕山􅀮山獨秀山南溪山龍蟠山堯山雲母山馬鞍山慮山火山浮石山景山盛弘之荆州記曰景山在上洛縣西南二百里東與荆山連接有沮水源岀焉其山一名鴈浮山荆山之首曰景山鴈南翔北歸徧經其上土人由兹改名爲鴈山又爲鴈塞山荆山山海}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_SBCK_049-1b}
  - {type: variant, offset: 6, length: 3, content: 江夏圖, WYG: 荆山荆門山勾將山虎牙山孤山髙筐山佷山宜陽山丹山小酉山芋山嵩梁山崇山武山壺頭山天門山黄聞山風門山石帆山虎齒山移山淳于山武陵山平都山陽岐山高都山原闕君山小廬山静福山方臺山攸縣雲陽山烏龍白騎山文斤山石燕山萬嵗山黄箱山麓山昭山五溪山錢石山采玉山玉山臨賀山馬嶺山彈丸山百丈山灕山隠山獨秀山南溪山龍蟠山堯山雲母山馬鞍山慮山火山浮石山景山盛宏之荆州記曰景山在上洛縣西南二百里東與荆山連接有沮水源出焉其山一名雁浮山荆山之首曰景山雁南翔北歸偏經其上土人由兹改名雁山又為雁塞山荆山山海}
