  - {type: variant, offset: 2106, length: 1, content: 以, SBCK: 號隱山獨秀山桂林風土記曰獨秀山在城西北一百歩直聳五百餘尺周廻一里平地􅀌抜秀異下有洞穴凝垂乳竇路通山北傍廻百餘丈豁然明朗宋光禄卿顔延年牧此郡常於北石室中讀書遺跡猶存嘗賦詩云未􅀂獨秀者嵯峨郭邑開是也南溪山桂林風􅁟記曰南溪山在縣之南五里餘其山聳抜千尺煙翠凝空古今所遺其溪東注與桂江合龍蟠山桂林風土記曰龍蟠山本}
