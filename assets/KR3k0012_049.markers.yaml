  - {type: variant, offset: 926, length: 652, content: 又江表傳云劉勳敗於彭澤走之入楚江聞晥已沒遂投西塞白雉山江夏圖經曰白雉山其山上有芙蓉峰前有師子嶺後有金雞石西金南出銅鉚自晉宋梁陳以來常置立爐治烹煉鳳栖山江夏圖經曰鳳栖山西北陸路去州二百二十五里吳建興年中鳳皇降此山因以為名山有石鼓鼓鳴則雨降神人山曆帝記曰神人山吳建衡二年有神人乘白鹿從此山出因名神人山南昌山豫章圖經曰南昌山者昔吳王濞鑄錢之山時有夜光遙望如火以為銅之精光梁氏十道志云以豫章有銅山山中有洪井飛流懸注其深無底是也山有洪崖先生鍊藥之井亦號洪崖山有石臼存焉松門山豫章圖經曰松門山者以其山多松遂以為名北臨大江及彭蠡湖山上有石境光明照人謝靈運入彭蠡湖口詩云攀崖照石境牽葉入松門是也馬當山九江記曰馬當山高八十丈周廻四里在古彭澤縣北一百二十里其山橫枕大江山象馬形廻風急擊波浪涌沸舟舡上下多懷憂恐山際立馬當山廟以祠之釣磯山異苑曰釣磯山者陶侃嘗釣於此山下水中得織梭一枚還掛壁上後化成赤龍從室而去其山石上猶有侃跡存焉雞籠山郡國志曰江州雞籠山山上有石雞冠距如生有道士李鎮住此山下常賞翫之雞一旦自毀鎮曰雞既如此吾其終乎果卒五女山郡國志曰江州五女山始皇死五女葬此山天昏每聞箏笛之聲射的山郡國志曰射的山者古老相傳云上有玉在石壁內南面遙望似有白處曾有胡人來取上山後遇風雨不果得今遠望頗似射侯故名射的焉石印山吳志曰天璽元年鄱陽郡言歷陵山石有文理成字巫言石印神有三郎皓遣使以大牢祭并印綬拜三郎為王又按江氏記云歷陵有石印山臨水高百丈有七穿駢羅穿中色黃赤相續因謂之石印山龍虎山信州圖經曰龍虎山在貴谿縣二山相對谿流其間乃張天師得道之山羊, SBCK: 昭}
