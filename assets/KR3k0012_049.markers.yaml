  - {type: variant, offset: 2184, length: 303, content: 南康記曰赤石山大石連聳粲若舒霞山角多赤石有玉房瓊室耆舊相傳云宋元嘉年中有人自稱安道士者不知何許人披服巾褐棲於此山中數十年忽失所在其後有人時復見者天寶六年勑改為玉房山螺亭石山南康記曰螺亭山有大石臨水號曰螺亭云昔有貧女暮宿於亭採螺忽夜中見眾螺張口亂噉其肉貧女乃死其伴因殞水傍其冢化為巨石螺殼無數號曰螺亭石山上洛山輿地志曰虔州上洛山多木客乃鬼類也形似人語亦如人遙見分明近則藏隱能斫杉枋聚於高峻之上與人交市以木易人刀斧交關者前置物枋下卻走避之木客尋來取物下枋與人隨物多少甚信直而不欺有死者亦哭泣殯葬嘗有山行人遇其葬日出酒食以設人山中有石墨可書空山南康圖經云空山晉咸康五年太守庾恪於山西麓中建立神廟歷代祈雨最有靈應按, SBCK: ''}
