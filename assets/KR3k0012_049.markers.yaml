  - {type: variant, offset: 1586, length: 2, content: 啇安, WYG: 昭山下有泉潭深無底是湘水最深之處昔有舟人覆於此潭其槽并甑有名題號後於洞庭尋得即知暗通也五溪山長沙圗經曰五溪山在}
  - {type: variant, offset: 1590, length: 0, content: '', SBCK: 北五十八里髙二里北入朗州界昔吴黃龍三年潘濬將兵五萬討武陵五溪蠻在此山下立營截除徒黨因以爲名按溪水自邵州武剛縣東北流至岳州沅江縣合益水益陽城記云在益水之陽水岀縣北流入資口在縣門橋下皆五溪之下口也又按􅀜羽屯軍資水北岸即一名茱茰江也吴甘寧拒之云聞吾咳唾羽即不敢過江是此處今號爲􅀜羽瀬錢石山湘川記云曲江縣東}
  - {type: page-break, offset: 1590, content: '', id: KR3k0012_SBCK_049-8a}
  - {type: variant, offset: 1590, length: 2, content: 有羊, WYG: 北五十八里髙二里北入朗州界吳黄龍三年潘濬將軍五萬討武陵五溪蠻在此}
  - {type: page-break, offset: 1590, content: '', id: KR3k0012_WYG_049-13a, image: WYG0893/WYG0893-0425c.png}
  - {type: variant, offset: 1590, length: 0, content: '', krp: 北五十八里髙二里北入朗州界昔吴黃龍三年潘濬將兵五萬討武陵五溪蠻在此山下立營截除徒黨因以爲名按溪水自邵州武剛縣東北流至岳州沅江縣合益水益陽城記云在益水之陽水岀縣北流入資口在縣門橋下皆五溪之下口也又按關羽屯軍資水北岸即一名茱茰江也吴甘寧拒之云聞吾咳唾羽即不敢過江是此處今號爲關羽瀬錢石山湘川記云曲江縣東}
  - {type: variant, offset: 1591, length: 1, content: 羊, SBCK: 錢石山其狀四方有􅀂臺其石三面壁立其上碎石如錢故謂之錢石山采玉山湘川記曰曲江縣有採玉山卉木滋茂泉石澄澈相傳云古採玉於此得名玉山湘川記曰玉山下有廟曽有人得玉瑛於此有銀山白石山越玉山又浮山其地躡一處則百餘歩地動臨賀山盛弘之荆州記曰臨賀山東山中有二竹大數十圍有盤石俓四五丈極方正青如彈棊局兩竹屈垂拂掃石上絶無塵穢未至數十里間風吹簫管之音馬嶺山郡國志郴州馬嶺山本名牛脾}
  - {type: page-break, offset: 1591, content: '', id: KR3k0012_SBCK_049-8b}
  - {type: variant, offset: 1591, length: 1, content: 羊, krp: 錢石山其狀四方有若臺其石三面壁立其上碎石如錢故謂之錢石山采玉山湘川記曰曲江縣有採玉山卉木滋茂泉石澄澈相傳云古採玉於此得名玉山湘川記曰玉山下有廟曽有人得玉瑛於此有銀山白石山越玉山又浮山其地躡一處則百餘歩地動臨賀山盛弘之荆州記曰臨賀山東山中有二竹大數十圍有盤石俓四五丈極方正青如彈棊局兩竹屈垂拂掃石上絶無塵穢未至數十里間風吹簫管之音馬嶺山郡國志郴州馬嶺山本名牛脾}
  - {type: punctuation, offset: 1593, content: ，, id: KR3k0012_CHANT_049-bkkpn471}
  - {type: 'tls:seg', offset: 1593, content: '', id: KR3k0012_CHANT_049-31a.4}
  - {type: variant, offset: 1593, length: 153, content: 山有燃石黃白而理麤以水灌之便熱若石炭以鼎置之烹煮可熟羅霄山王孚安成記曰萍鄉羅霄山澤水所出水傍出石乳天旱吏人禱之因以大木長三四丈投井中即雨水懸湊井溢輒令木涌出而雨止蓋潛龍之穴也以陽居陰神精上通故扣之而必有玄感則蜀都賦云應鳴鼓而興雨者也鍾山裴子野宋略曰永嘉元年鍾山因洪水有鍾從山流出時人得之送上驗銘云是秦時樂器, WYG: 立營截住徒黨}
  - {type: variant, offset: 1594, length: 0, content: '', SBCK: 上}
  - {type: variant, offset: 1594, length: 0, content: '', krp: 上}
  - {type: variant, offset: 1595, length: 1, content: 燃, SBCK: 仙人􅂫躭壇即郴人也爲兒童時與衆童牧更直守牛毎躭守牛牛不敢散嘗與衆兒獵即乗鹿人􅀏之曰龍也去郡百二十里母臨食晩往買鮓須􅁷即還一旦有衆賔來躭啓母曰受性當仙仙人合召躭去今年疾疫甚飲家中井水即無恙又種藥於園梅樹下可治百病賣此水及藥過於供養便去母遽視之衆賔皆白鶴也以躭常乗白馬故號馬嶺山彈丸山水經注曰臨桂彈丸山有湧泉奔流迅激東注于灕水山龕及溪中有}
