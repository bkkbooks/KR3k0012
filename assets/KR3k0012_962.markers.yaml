  - {type: variant, offset: 6, length: 3, content: 魏諸州, SBCK: 夫也又曰東南之羙者有㑹稽之竹箭焉會稽山名今在山隂縣竹箭篠也孝經河圖曰少室之山大竹堪爲釡甑此竹亦㸑器也安思縣多苦竹竹之醜有四有青苦有白苦有紫苦有黄苦汲冢周書王㑹曰成王時路人獻大竹史}
