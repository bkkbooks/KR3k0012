  - {type: variant, offset: 1475, length: 254, content: 管承之汁滴則成也槲齊書曰樂預為永世令人懷其德卒官時有一媼年可六七十檐槲蔌葉造市貨之聞預卒人泣棄溪中曰失樂令我輩孤獨老姥故應就死爾市人皆泣其惠化如此三國典略曰齊斛律光之入寇也周將韋孝寬忌之孝寬參軍曲巖頗知卜筮謂孝寬曰來年東朝必大相殺孝寬因令巖作謠言曰百升飛上天明月耀長安又曰高山不推自崩槲樹不扶自豎乃間諜遺其文於鄴中齊人用是而殺斛律光明月光字也隋書曰倭國草木冬青土地膏腴水多陸少以小環挂鸕鶿項令入水捕魚得百餘頭俗無盤俎藉以槲葉食用手餔之性質直有雅風唐書曰萬歲登封元年春封嵩山御朝覲壇受朝賀登封壇南有槲樹大赦日於, WYG: 豐美髙危}
