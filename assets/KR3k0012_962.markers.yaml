  - {type: variant, offset: 1831, length: 729, content: 牛耳一頭尖其華赤黃子不可食柟木細理於豫樟無子赤者材堅白者脆荊州人曰梅多江南及魏興新城上庸蜀皆多樟柟三國典略曰初陳文帝以湘州出杉柟使營造大艦金翅等二百許艘并諸水戰之具石南魏王花木志曰南方記石南樹野生二月花仍連著實實如鷰子八月熟民採之取核乾取皮作魚羹和之尤美出九真任昉述異記曰曲阜古城有顏回墓墓上石楠二株可三四十圍土人云顏回手植之木婆郍娑隋書曰真臘國土俗與日南九真相類異者有婆郍娑樹無花葉似冬瓜菴羅樹花葉似棗實似李毗野樹花似木瓜葉似杏實似楮婆田羅樹花葉實並似棗而小異歌畢他樹花似李葉似榆而厚大實似李其大如升自餘多同九真枹嶺表錄異曰枹木產江溪中葉細如檜身堅類柏唯根軟不勝刀鋸今潮循人多用其根刳而為履當木濕時刻削易如割瓜木乾之後柔刀不可理也或油畫或漆其輕如通草暑月著之隔卑濕地氣力如杉木今廣州賓從諸郡牧守初到任皆有油畫枹木履也牧婆羅南夷志曰南詔多牧婆羅樹子破其殼中白如柳絮紉為絲織為方幅裁之為籠段男子婦人通服之驃國彌臣諾亦皆披婆羅籠段青田崔豹古今注曰烏孫國有青田核莫測其樹之形實至中國者得其核取將漬水則成酒其味淳美核大如五六升瓠空之以盛水俄而成酒味劉璋時得兩核集賓客設之常供二十人飲之一核所盛方盡一核所盛者得中飲盡隨便注水隨成即飲不可久置久置則苦不堪飲名曰青田壺亦曰青田酒都念杜寶大業拾遺錄曰十二年四月南海郡送都念子樹一百株勑付西苑十六院內種此樹高一丈許葉如白楊枝柯長細花心金色花葉正赤似蜀葵而大其子小於柿子甘酸至美蜜漬為粽益佳嶺表錄異曰倒捻子窠叢不大葉如苦李花似蜀葵小而深紫南中婦女得以染色有子如軟柿頭上有四葉如柿蔕食者必捻其蔕故謂之倒捻子或呼為都念子蓋語訛也其子外紫肉赤無核食之甜軟甚暖腹藏兼益肌肉娑羅魏王花木志曰娑羅樹緗葉子似椒味如羅勒嶺北人呼為大娑羅盛弘之荊, WYG: 掃荆}
