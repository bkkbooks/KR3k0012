  - {type: variant, offset: 15, length: 1, content: 郡, SBCK: 阜皆未之用僧珎獨悟其㫖因私具櫓數百張及兵起悉取檀溪林竹裝爲舡艦葺之以茅並立辦衆軍將發患諸將須櫓甚多僧珎乃出先所具毎舡付二張爭者乃息隋書曰明克讓字弘道}
