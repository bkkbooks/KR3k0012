  - {type: variant, offset: 2871, length: 3, content: 制木湖, SBCK: 牛亨問曰籍者何也荅曰籍者尺二竹牒記人之年名字物色懸之宫門按省相應乃得入也劉敬叔異苑曰吴郡桐廬人甞伐竹見一竹竿雉頭虵身猶未變此亦竹爲虵虵爲雉也任昉述異記曰湘水去岸三十許里有相思宫望帝䑓舜南廵不返殁葬於蒼梧之野堯之二女娥皇女英追之不及相思慟哭淚下沾竹文悉爲之班班然又曰衛有淇園出竹在淇水之上詩云瞻彼淇澳緑竹猗猗又曰南中生子母竹今慈竹是也漢章帝三年子母竹笋生白虎殿前謂之孝竹羣臣作孝竹頌又曰東海畔􅀌竹生焉斬而復生中爲管周武王時􅀌竹人獻笋一株楊泉物理論曰冝陽金門竹爲律管河内葭爲􅁅可謂同氣冝陽洛}
