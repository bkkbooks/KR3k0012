  - {type: variant, offset: 2566, length: 3, content: 僧寺床, SBCK: 有文竹山上有石牀四面緑竹扶踈常隨風委拂此牀永嘉記曰陽嶼仙山有平石方十餘丈名仙壇有一䈥竹垂壇旁風來輙掃拂壇上東陽記曰崑山去蕪城山十里峯嶺髙峻故老傳云嶺上有圎池魚鼈具有池邊有竹極大風至垂屈掃地􅁪㓗如人掃之丹陽記曰江寜縣南二十里慈姥山積石臨江生筲管竹王子淵洞蕭賦所稱即此也其竹圎緻音稚異於他處自伶倫採竹嶰谷其後唯此簳見珎故歴代常給樂府而俗呼曰皷吹山風􅁟記曰陽羡縣有􅀽君冢壇邊有數枚大竹髙二三丈枝皆兩兩枝}
