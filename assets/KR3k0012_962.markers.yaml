  - {type: variant, offset: 17, length: 1, content: 康, SBCK: 原鬲人也父山賔梁侍中克讓少好儒善談論愽渉書史所覽將萬卷三禮禮論尤所研精􅀛筴曆象咸得其妙年十四釋􅄄湘東王法曹叅軍時舎人朱异在儀賢堂講老子克讓預焉堂邊有脩竹异令克讓詠之克讓􅄃筆􅂺成其卒章曰非君多愛賞誰貴此貞心异甚竒之唐書曰南詔理無刑名桎梏之其罪以竹五夲束之伏犯者撻其背又曰開成四年襄陽三}
