  - {type: page-break, offset: 13, content: '', id: KR3k0012_SBCK_962-3a}
  - {type: variant, offset: 13, length: 1, content: 汶, WYG: 刺史出行郡童子乗竹馬相待又曰㓂恂為河内太守移書屬縣講兵肄射伐淇園之竹為矢百餘萬養馬二千匹收租四百餘萬斛轉以給軍晉書曰杜預討呉州郡多望風歸附集諸軍㑹議或曰百年之㓂未可盡尅今向暑水潦方降疾疫將起候來冬更為大舉預曰昔樂毅藉濟西一戰以併强齊今兵威已振譬如破竹數節之後皆迎刄而解無復着手處也又曰武帝平呉之後復納孫皓宫人數千自此掖庭殆將萬餘人而並寵者甚衆帝莫知所適乗羊車恣其所之至便晏寢宫人乃取竹葉挿户以塩汁灑地而引帝車又曰王徽之所居宅空地便令種竹聞其聲徽之嘯咏指竹曰不可一日無此君謝靈運晉書曰元康二年巴西界竹花紫色結實如麥晉書載記曰長安謡曰鳯凰鳯凰止阿房符堅以鳯凰非梧桐不棲非竹實不食乃植梧竹數十萬株于阿房宫城以待之慕容冲小字鳯凰至是終為堅賊入止阿房城焉宋書曰卜天興弟天生少為隊將十人同火房後有一坑廣二丈餘十人共跳之皆度唯天生隊不跳天生乃取實中苦竹削其端使利交橫布坑内更呼等類共跳並惧不敢天生乃復跳之往反十餘曾無留礙衆歎服齊書曰南海王子罕字云華武帝第十一子也頗有學問母尚容華有寵故武帝留心母常寢疾子罕晝夜祈禱于時以竹為燈纉照夜此纉宿昔枝葉大茂母病亦愈以為孝感所致又曰徐伯珎少孤貧學書無紙常以竹葉箭箬甘䉀及地上學書南史隐逸傳曰沈麟字雲正居貧織簾誦書鄉里號為織簾先生嘗為人作竹誤傷手便流淚而還同作者謂曰此不足損何涕零答曰此本不痛但遺體毁傷感而悲耳梁書曰武帝臨雍州命吕僧珎為中兵叅將委以心膂僧珍陰養死士歸之者甚衆武帝頗招武猛士庶從㑹者萬餘人因命接行城西空地將起數千間屋為士舍多伐林竹沉於檀溪積茅盖若}
