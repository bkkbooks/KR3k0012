  - {type: variant, offset: 1123, length: 188, content: 月吐穗成有鹽梅粉可以酢羹瑯玕山海經曰崑崙山有瑯玕樹盧頭南越志曰南海江岸間有盧頭木葉如甘蔗織以為帆以其踈暢懷風故帆不以布櫰山海經曰中曲山有櫰音瓌木如棠而圓葉赤實如木瓜食之多力桬棠山海經曰桬棠木出崑崙山黃色赤實味如李食之使不溺山海經曰前山其木多似柞子可食冬夏恒青作柱難腐帝屋山海經曰講山有木名帝屋葉如椒反陽赤實反陽剌不勾也可以禦凶六駮陸機毛詩䟽義曰六駮馬梓其樹皮青白駮犖遙視似馬故, SBCK: 圍節長一二尺}
