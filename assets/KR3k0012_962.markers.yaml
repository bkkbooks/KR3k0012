  - {type: variant, offset: 11, length: 1, content: 益, SBCK: 智伯率韓魏攻趙襄子襄子奔晉陽原過後至見三人自帶以上可見自帶以下不可見與原過竹三節莫通曰我以是遺趙无卹襄子自割竹有朱書又貨殖傳曰渭川千畒竹其人與千戸侯等漢書曰髙祖爲亭長乃以竹皮爲冠應劭注曰以竹始生皮作冠今鵲尾冠也又曰上使發卒數萬人塞瓠子河下淇園之竹以爲楗又曰竹大者一節受一斛小者數斗以爲柙音匣榼又曰梁孝王脩兎園多植竹又地理志曰􅁗地有鄠杜竹林南山檀柘号陸海後漢書曰郭伋爲并}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_SBCK_962-2a}
  - {type: variant, offset: 11, length: 1, content: 益, WYG: 智伯率韓魏攻趙㐮子㐮子奔晉陽原過從後至見三人自帶以上可見自帶以下不可見與原過竹三節莫通曰我以是遺趙無䘏㐮子自剖竹有朱書又貨殖傳曰渭川千畆竹其人與千户侯等漢書曰髙祖為亭長乃以竹皮為冠應邵注曰以竹始生皮作冠今鵲尾冠也又曰上使發卒數萬人塞瓠子河下淇園之竹以為楗又曰竹大者一節受一斛小者數升以為椑榼又曰梁孝王兎園多植竹中有修竹園又地理志曰秦地有鄠杜竹林南山檀柘號陸海後漢書曰郭伋為并}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_WYG_962-2b, image: WYG0901/WYG0901-0484b.png}
  - {type: variant, offset: 11, length: 1, content: 益, krp: 智伯率韓魏攻趙襄子襄子奔晉陽原過後至見三人自帶以上可見自帶以下不可見與原過竹三節莫通曰我以是遺趙无卹襄子自割竹有朱書又貨殖傳曰渭川千畒竹其人與千戸侯等漢書曰髙祖爲亭長乃以竹皮爲冠應劭注曰以竹始生皮作冠今鵲尾冠也又曰上使發卒數萬人塞瓠子河下淇園之竹以爲楗又曰竹大者一節受一斛小者數斗以爲柙音匣榼又曰梁孝王脩兎園多植竹又地理志曰秦地有鄠杜竹林南山檀柘号陸海後漢書曰郭伋爲并}
  - {type: variant, offset: 13, length: 1, content: 汶, SBCK: 刺史出行郡童子乗竹馬相待又曰冦恂爲河内太守移書屬縣講兵肆射伐淇園之竹爲矢百餘萬前書音義曰淇園衛之苑多竹篠也養馬二千疋収租四百萬斛轉以給軍晉書曰杜預討吴州郡多望風歸命衆軍㑹議或曰百年之冦未可盡剋今向暑水潦方降疾疫將起候來冬更爲大舉預曰昔樂毅籍濟西一戰以併強齊今兵威巳振譬如破竹數節之後皆迎刃而解無復著手豦也又曰武帝平呉之後復納孫皓宫人數千自此掖庭殆將萬餘人而並寵者甚衆帝莫知所適乗羊車恣其所之至便宴寢宫人乃取竹葉挿户以塩汁灑地而引帝車又曰王徽之常居空宅中便令種竹聞其聲徽之嘯詠指竹曰不可一日無此君謝靈運􅀳書曰元康二年巴西界竹花紫色結實如麥晉書載記曰長安謡曰鳯皇鳯皇止阿房符堅以鳯皇非梧桐不棲非竹實不食乃植桐竹數十萬株于阿房宫城以待之慕容冲小字鳯皇至是終爲堅賊入止阿城焉宋書曰卜天興弟天生少爲隊將十人同火屋後有一坑廣二丈餘十人共跳之皆度唯天生墜天生乃取實中苦竹削其端使利交横布坑内更呼等􅀋共跳並懼不敢天生乃復跳之徃反十餘曽無留礙衆並歎服齊書曰南海王子罕字雲華武帝第十一子也頗有學問母尚容華有寵故武帝留心母常寢疾子罕晝夜祈禱于時以竹爲燈纉照夜北纉􅀫昔枝葉大茂母病亦愈咸以爲孝感所致又曰徐伯珎少􅀌貧學書無􅁓常以竹華箭箬音􅀂甘庻及地上學書南史隱逸傳曰沈麟士字雲禎居貧織簾誦書郷里号爲織簾先生甞爲人作竹誤傷手便流淚而還同作者謂曰此不足損何至涕零荅曰此本不痛但遺體毀傷感而悲耳梁書曰武帝臨雍州命吕僧珎爲中兵叅軍委以心膂僧珎隂養死士歸之者甚衆武帝頗招武猛士庻饗從㑹者萬餘人因命按行城西空地將起數千間屋爲止舎多伐林竹沉於檀溪積茅蓋􅀂}
