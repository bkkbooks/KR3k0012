  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書太平御覧卷九百六十二宋李昉等撰竹部一竹上易曰震為蒼筤竹尚書禹貢曰荆州厥貢惟菌簵楛又禹貢楊州曰篠簜既敷厥貢瑶琨篠簜毛詩斯干曰如竹苞矣如松茂矣又竹竿曰竹竿衛女思歸也適異國而不見答思而能以禮者也籊籊竹竿以釣于淇韓詩外傳曰黄帝時鳯凰栖帝梧桐食帝竹實周禮春官曰孤竹之管孫竹之管陰竹之管禮記月令曰仲冬日長至則伐}
