  front:
  - {type: variant, offset: 0, length: 0, content: '', SBCK: 太平御覽卷第九百六十二竹部一竹上易曰震爲蒼琅竹尚書禹貢曰荆州厥貢惟箘簵楛箘簵羙竹又禹貢楊州曰篠簜旣敷篠竹箭簜大竹禹治水敷布也厥貢瑶琨篠簜毛詩斯干曰如竹苞矣如松茂矣又竹竿曰竹竿衛女思歸也適異國而不見荅思而能以禮者也籊籊竹竿以釣于淇韓詩外傳曰黄帝時鳯皇栖帝梧桐食帝竹實周禮春官曰􅀌竹之管孫竹之管隂竹之管鄭玄注曰􅀌竹竹特生孫竹杖根之未生者隂竹生山北者禮記月令曰仲冬日長至則伐}
