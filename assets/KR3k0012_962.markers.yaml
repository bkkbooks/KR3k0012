  - {type: variant, offset: 52, length: 6, content: 交讓所植建木, SBCK: 槁竹有火弗鑚不㸐音然土中有水弗掘無泉掘猶窮也梅子曰弘農冝陽縣金門山竹爲律管河内葭莩以爲􅁅可以候氣取􅁅實管端置之􅀷宫覆以緹幕勿令見風日節至則􅁅飛管通矣唐子曰希見食笋歸煑竹根家語曰子路見孔子孔子曰君子不可學子路曰南山有竹不揉自直斬而爲用射逹於犀革以此言之何學之爲孔子曰括而羽之鏃而礪之其入不益􅀷乎吕氏春秋曰昔黄帝命伶倫作爲律伶倫自大厦之西西方山名乃之沅渝之隂山名取竹谿之谷以生空竅厚釣者斷兩節間竹生谿谷者取其釣厚以爲律谿或作嶰其長三寸九分而吹之}
