  - {type: variant, offset: 1313, length: 577, content: 駮馬下章云山有苞棣隰有樹檖皆山隰木相配不宜謂獸崔豹古今注曰六駮山中有木葉似豫章皮多癬駮名六駮木漆淮南子曰䖟散積血斲木愈齲驅主切此類之推者也推行膏之殺鱉鵲矢中蝟中亦殺矣爛灰生蠅爛腐漆見蟹而不乾又曰染者先青而後黑則可先黑而後青則不可工人下漆而上丹則可下丹而上漆則不可萬事由此也所先後上下不可不審也崔豹古今注曰漆樹以剛斧其皮關以竹管承之汁滴則成也槲齊書曰樂預為永世令人懷其德卒官時有一媼年可六七十檐槲蔌葉造市貨之聞預卒人泣棄溪中曰失樂令我輩孤獨老姥故應就死爾市人皆泣其惠化如此三國典略曰齊斛律光之入寇也周將韋孝寬忌之孝寬參軍曲巖頗知卜筮謂孝寬曰來年東朝必大相殺孝寬因令巖作謠言曰百升飛上天明月耀長安又曰高山不推自崩槲樹不扶自豎乃間諜遺其文於鄴中齊人用是而殺斛律光明月光字也隋書曰倭國草木冬青土地膏腴水多陸少以小環挂鸕鶿項令入水捕魚得百餘頭俗無盤俎藉以槲葉食用手餔之性質直有雅風唐書曰萬歲登封元年春封嵩山御朝覲壇受朝賀登封壇南有槲樹大赦日於其杪置金鷄改名為金鷄樹樺隋書曰缽室韋衣胡布山而住人眾多比室韋不知為幾部落用樺皮蓋屋杜寶大業拾遺錄曰二年汾州起汾陽宮宮南外平林率是大樺木高百餘尺行從文武皆剝取皮覆菴舍柟陸機毛詩䟽義曰梅柟其樹及葉似豫樟葉大如牛耳一頭尖其華赤黃子不可食柟木細理於豫樟無子赤者材堅白者脆荊州人曰梅多江南及魏興新城上庸蜀皆多樟柟三國典略曰初陳文帝以, SBCK: 鍾龍}
