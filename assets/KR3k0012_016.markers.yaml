  - {type: variant, offset: 651, length: 1086, content: 條中都官詔獄繫者亡輕重皆殺之內者令郭穰夜至郡邸獄吉閉門拒使者不得入曾孫賴吉得全應劭漢官儀曰世祖封禪夕有青氣上與天屬遙望不見山巔又曰高祖在沛隱芒碭山每遊上輒不欲令呂后知常在深僻處后亦常知其處高祖問曰何以知之后曰君所居處上有紫氣又曰孝靈熹平年八月辛未白氣如疋練衝北斗第四星為大獸狀明年楊州刺史臧旻攻盜賊斬首數千級東觀漢記曰和帝永和十二年癸酋夜白氣長三丈起國東北指揮市十日是月西域蒙奇踈勒二國歸義謝承後漢書曰郎顗上書曰去年閏月白氣從天苑入玉井西將有叛戾之患金精之變太尉所掌宜責以災異漢書五行志曰永興二年光祿勳舍壁下有青氣視之得玉鉤玦漢光武封禪儀曰元年封禪晝有白氣夜有赤光又曰建武三十二年二月十九日之山虞此日山上雲氣成宮闕百官皆見之二十一日夕牲時有白氣廣一丈東南極望二十二日禮畢正直壇所有氣與天屬遙望不復見山楚漢春秋曰亞父謀曰吾望沛公其氣衝天五色相摎或似龍或似虵或似虎或似雲或似人此非人臣之氣也王隱晉書曰武帝咸寧元年洛陽太祖廟中有青氣占者云以為東莞音官王后當有天子後改封瑯邪江東之應也又曰魯勝字叔時以歲日望氣乃長歎知將來多故便稱疾去官中書令張華敬之欲用之遣二子諭意遂不動又曰張華察牛斗間有紫氣乃豐城之劍氣也吳志曰朝宮井上旦有五色氣孫堅令浚之得漢傳國璽又曰孫堅葬富春城東塚有光上屬天下蔓數里皆曰非凡氣也孫氏其興乎蜀志曰劉毅向攀等上言建安二十二年數有氣必有天子出其方南中八郡志曰永昌郡有禁水水有惡毒氣中去聲物則有聲中樹木則折名曰鬼彈中人則奄然青爛宋永初山川記曰寧州瘴氣𦱌露四時不絕西升記曰老子西出關關令尹喜占氣知神仙過荊州記曰夷道縣有望州山山下有泉欲雨泉中有赤氣騰上于天莊子曰若夫乘天地之正而御六氣之辨以遊無窮者彼惡乎待哉郭象曰御六氣之辨即是遊變化之塗也又曰人之生氣聚則為生散則為死列子曰太初者氣之始也又曰天積氣之成者也孫卿子曰水火有氣而無生草木有生而無知抱朴子曰軍上氣黑如樓將軍移軍必敗其將勇則氣如火火勢如張弩雲如日月赤氣繞之所見之地大勝不可攻也又曰或問登陟之道曰或用棗心為飛車存念則五虵六龍而乘之上升三十里名為太清其氣甚剛勝人也師言鳶飛漸高直舒兩翅而自進漸乘剛氣也淮南子曰土地各以類生人是故山氣多男澤氣多女水氣多瘖於金風氣多聾林氣多癃木氣多傴高誘曰自此上至山氣多男皆生子乃有此疾也下氣多尰岸下下濕腫足日尰石氣多力象石也險阻氣多癭暑氣多殀音夭寒氣多壽谷氣多痺丘氣多狂廣氣多仁下而平者為廣陵氣多貪象陵積聚也輕土多利利疾也重土多遲清水音小濁水音大湍水人重湍急流悍水也中土多聖人皆應其類也又曰太清之始世天覆以德地載以樂四時不失其序風雨不降其虐日月淑清而楊光五星循軌而不失其行此時玄元氣至休, SBCK: ''}
