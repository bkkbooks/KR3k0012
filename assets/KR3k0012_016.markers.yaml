  - {type: variant, offset: 3558, length: 8, content: 騰虵遊霧困於蝍蛆, WYG: 黄帝造厯元起辛邜而顓頊用乙邜虞用戊午夏用丙寅殷用甲寅周用丁巳魯用庚子漢初用乙邜至武帝中元以丁丑王莽之際劉歆作三綂追太初前世一元得五星㑹庚戌之嵗以為上元太初厯到章帝元和旋復踈濶徵能術者課劾諸厯定朔稽元追漢四十五年庚辰之嵗退朔一日乃與天合以為四分厯}
