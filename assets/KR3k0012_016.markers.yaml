  - {type: variant, offset: 56, length: 189, content: 成物聚極則散而遊魂為變又曰天地定位山澤通氣禮曰仲春行秋令則其國大水寒氣惣總至又曰三月之節是月也生氣方盛陽氣發洩勾者畢出萌者盡達又曰三月之節是月也命國儺九門磔攘以畢春氣又曰季春行冬令則寒氣時發草木皆肅又曰孟秋行冬令則陰氣大勝行春令則其國乃旱陽氣復還又曰八月之節是月也天子乃儺以達秋氣又曰九月之節霜始降則百工休乃命有司曰寒氣惣至人力不堪又曰季秋行春令則煖風來至人氣懈惰又曰小雪之日後, WYG: 無傲詩言志歌永言聲依永律和聲聲謂}
