  - {type: variant, offset: 2722, length: 465, content: 天大霧三日帝遊洛水之上見大魚殺五牲以醮之天乃甚雨七日七夜魚流始得圖書今河圖也世傳大霧三日必有甚雨自此始也漢武內傳曰東方朔乘雲飛去仰望天霧覆之不知所在劉向列女傳曰陶荅子妻者陶大夫荅子之妻也荅子仕陶三年名譽不興家富三倍其妻數諫曰夫子能薄而官大是謂嬰害無功而家昌是謂積殃昔楚令尹子文之仕家貧而國富福結於子孫名垂於后代今夫子貪富務大不顧後害妾聞南山有玄豹霧雨七日不下食者何也欲以澤其衣毛而成其文章故藏以遠害今君與此背不無後患乎葛洪神仙傳曰欒巴為尚書郎一旦天大霧對坐不相見失巴所在後問其故乃是巴還成都與親故別也又曰淮南王聞有道術之士必卑辭厚幣以致之於是八公乃往一人能坐致風雨立起雲霧王試之無不效李先生傳曰先生名廣字祖和本南陽人劉備遣軍欲取先生先生起霧半天備騎自相殺先生因此乃入吳宜都山川記曰郡西北三十里有丹山天晴山嶺忽有霧起迴轉如煙不過再朝雨必降王烈之安成記曰縣人有謝廩者行田歸路中忽遇雲霧霧中有一人乘龜而行廩知神人拜請求隨去父曰汝無仙骨不得去也湘州記曰曲江縣有銀山山常多素霧嵩高山記曰有獵師在山見浮圖奇妙異常有金像比來尋求白霧忽起不知寺處, SBCK: 物}
