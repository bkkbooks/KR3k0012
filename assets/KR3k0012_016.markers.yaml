  - {type: variant, offset: 3212, length: 211, content: 出生崑崙或生玄圃食氣飲霧解人語當其神也立起風雲吐嗽霧露百邪迸走因名猛獸王粲英雄記曰曹公赤壁敗行至雲夢大澤中遇大霧迷失道路王子年拾遣記曰平沙千里色如金細如粉風吹起如霧亦曰金霧西京雜記曰太平之代霧不塞望浸淫被薄而已又曰東海人黃公立興雲霧坐成山河叚龜龍涼州記曰呂光幸天淵池時天清朗忽然起霧有五色雲在光上陳留風俗記曰雍丘縣有祠名夏后公祠有神井龍能致霧雹愽物志曰王爾張衡馬均者昔俱冒霧行一人無恙一人病一人死無恙者飲酒病者食死者空腹莊, SBCK: 君矣孟}
