  - {type: variant, offset: 2427, length: 4, content: 廣為尚書, SBCK: 揔章鼓吹八音與律吕乖錯始知後漢至魏度漸長於古四分餘而􅇪依爲律吕故致不韻不和部佐著作劉㳟依周禮制尺所謂古尺也依古尺作新律吕以調聲韻以律量􅁰以尺度古器皆與本銘尺寸無差又故􅃁得古玉律鍾聲亦與新律闇合遂班下太常使太樂㹅章鼓吹清啇施用朂遂典知樂事晉諸公讃曰丗祖時以荀朂所造律班示朝臣散􅀐侍郎阮咸唱議謂朂所造聲髙必由古今尺有長短所致然朂亦依案經典笇而制之又求古器得周時玉律比校正同荀朂奏曰中所出御府銅竹律二十五具部太常樂郎正劉秀等校試其三具與杜􅇪左延年法同其二十二具視其銘題尺寸是笛律也問恊律中郎將列和云昔魏明帝時}
