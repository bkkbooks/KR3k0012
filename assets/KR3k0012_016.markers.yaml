  - {type: variant, offset: 3555, length: 1, content: 外, WYG: 所厯也姓等奏不能為算願募治厯者更造宻度各自增减以造漢太初厯乃選治厯鄧平及長樂司馬可酒泉候宜君侍郎尊與民間治厯者凡二十餘人方士唐都巴郡洛下閎與焉晋灼曰史記厯書云唐都分天部而巴郡洛下閎運算推厯也都分天部謂分二十八宿為躔度也而閎運算轉厯罷廢尤踈者淳于陵渠復覆太初厯晦朔弦望皆最宻日月如合璧五星如連珠謂太初上元甲子夜半朔立冬至時七曜皆㑹聚斗牽牛中如合璧連珠也陵渠奏狀遂用鄧平厯以平為太史丞後二十七年元鳯三年大史令張夀王上書言厯者天地之大紀上帝所為傳黄帝調律厯漢元年以來用之今隂陽不調宜更厯之過也詔下主厯使者鮮于妄人請與治厯大司農中丞麻光等二十餘人雜候月日晦朔弦望八莭二十四氣鈞校諸厯用狀奏可詔與丞相御史大將軍右將軍史各一人雜候上林清臺諸厯踈宻凡十一家以元鳯三年十一月朔旦冬至盡五年十二月各有第夀王課踈逺按漢元年不用黄帝調厯夀王非漢厯逆天道非所宜言大不敬有詔勿劾復候盡六年太初厯第一即墨徐萬且長安徐禹治太初厯亦第一夀王及待詔李信治黄帝調厯課皆踈濶壽王厯廼太史官殷厯也至孝成世劉向總六厯列是非作五紀論向子歆究其㣲𦕈作三統厯及譜又路温舒從祖父受厯數天文以為漢厄三七之間張字曰三七二百一十嵗也自漢初至哀帝元年二百一十年也至平帝崩二百一十一嵗也上封事以豫戒成帝時谷永亦言如此又王莽傳曰莽見盗賊多乃令太史推三萬六千嵗厯紀布天下書曰紫閣圗曰太一黄帝皆仙而上天張樂崑崙處山之上後世聖主得瑞者當張樂秦終南山上長安南山詩所謂終南以故秦地故言秦予之不敏奉行未明乃今諭矣又孝武紀曰夏五月正厯以正月為嵗首鄭𤣥曰先是以十月為嵗首色上黄數用五張晏曰漢據土徳土數五定官名恊音律又厯譜有序四時之位正分至之節以㑹日月五星之辰以考寒暑殺生之實故聖王必正厯以深知五星日月之㑹凶阨之患其術皆出焉此聖人知命之術也續漢律厯志曰自太初元年始用三統厯施行百餘年厯稍後天朔先于厯朔或在晦月或朔見建武八年中太僕朱浮大中大夫許叔等數上書言朔厯不正宜當改更時分度覺差尚㣲上以天下初定未遑考正至永平五年官厯署七月十六日月蝕待詔楊岑見時月蝕多先厯即縮用算因上言月當十五日蝕官厯不中詔書令岑普候與官厯課起七月盡十一月弦望凡五官厯皆失岑皆中庚寅詔書令岑署弦望月蝕官復令待詔張盛景防鮑業等六四分法與岑課嵗餘盛等所中多岑六事}
