  - {type: variant, offset: 3558, length: 5, content: 騰虵遊霧困, SBCK: 天之曆數在爾躬又曰叶用五紀其五曰曆數易乾鑿度曰堯以甲子天元爲推術注云甲子爲蔀首起十月朔又曰曆原名握先紀曰甲子握先爲曆始之名始言無前者也七十六歳爲一紀二十紀而一蔀首易是􅀋謀曰其觸耀而出師曠曆推音筭以度知旦觸耀而出謂師曠得聖人之一體故觸耀而生其人能曆數樞機之事又能推五音知將來之事漢書律曆志曰曆數之起上矣傳述顓頊命木正重司天火正􅀺司地其後三苗亂德二官咸廢而閏餘乖次孟陬殄滅攝提失方攝提星名隨斗柄所指建十二月􅀂曆誤春三月當指辰乃指巳是爲失方也堯復育重􅀺之後使纂其業後以授舜舜亦以命禹至周武王訪箕子箕子言大法九章而五紀明曆法歳月日星辰爲五紀也五伯之末史官喪記疇人子弟分散如淳曰家業丗相傳爲疇律年三十三傳之疇官各從父學或在夷狄故其所記有黃帝顓頊夏殷周及魯曆戰國擾攘􅁗兼天下未遑暇也亦頗推五勝五行相勝秦以周爲火周水勝之也而自以爲􅀗水德迺以十月爲正色尚黒漢興方綱紀大基庶事草創襲􅁗正朔以北平侯張蒼言用顓頊曆比}
