  - {type: variant, offset: 3555, length: 1, content: 外, krp: 其法以天清静無霧雨風雲夜遣輕騎徃至敵人之壘九百歩偏持律管横管當耳大呼驚之有聲應管其來甚微角管聲應當以白虎徴管聲應當以朱雀羽管聲應當以勾陳五管盡不應無有應聲當以青龍此五行之符佐勝之徴成敗之機也白虎通曰十一月律謂之黃鍾何黃中和之氣鍾者動也言陽於黃泉之下動養萬物也十二月律謂之大吕何大者太也吕者距也言陽氣欲出隂不許也正月謂之太蔟何太者大也蔟者湊也言萬物始大湊地而出也二月謂之夾鍾何夾者物孚夾言萬物孚夾種類分也三月謂之沽洗何沽者故也洗者鮮也言萬物去故就新莫不鮮明也四月謂之中吕何言陽氣將極故復中難之也五月謂之蕤賔何蕤者下也賔者敬也言陽氣上極隂氣始起故賔敬之六月謂之林鍾何林者衆也萬物成熟其類衆多也七月謂之夷則何夷傷則法也言萬物始傷𬒳刑法也八月謂之南吕何吕任也言陽氣尚有任也生孳長也故隂之也九月謂之無射何射終也言萬物隨陽而終也當復隨隂起無有終也十月謂之應鍾何應者動也言萬物應陽而動下藏也蔡邕月令章句曰鍾以斤兩尺寸中所容受升之數爲法律亦以寸分大小長短爲法故也黃鍾之管長九寸孔徑三分圍九分其餘皆稍短唯大小圍數無増減以度量者可以文載口傳與衆共知然不如耳决之明也周官曰太師掌六律六吕文以五聲播以五教以六詩六德爲之本以六律爲之音也劉向別録曰鄒子在燕燕有黍谷地美而寒不生五榖鄒子居之吹律而温氣至今名黍谷論衡曰孔子推律自知殷之苗裔楊泉物理論曰聽清濁五聲之和然後制爲鍾律取弘農冝陽縣金門山竹爲管夏侯玄辯樂論曰阮生云律吕恊則隂陽和音聲適則萬物類天下無樂而欲隂陽和調灾害不生亦以難矣此言律吕音聲非徒化治人物乃可以調和隂陽蕩除灾害也夫天地定位剛弱相摩盈虚有時堯遭九年之水憂民阻飢湯遭七年之旱欲遷其社豈律吕不和音聲不通哉此乃天然之數非人道所招也楊雄太玄經曰調律者度竹爲管蘆莩爲灰列之九閉之中漠然無動寂然無聲微風不起纎塵不形冬至夜半黃鍾以應矣曆丗本曰容成作暦容成黃帝之臣易曰君子以治暦明時書曰乃命羲和欽若昊天曆象日月星辰敬授民時}
