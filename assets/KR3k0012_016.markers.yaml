  - {type: variant, offset: 2206, length: 2, content: 霧陰, SBCK: 律之爲言率也所以率氣令逹也率猶導也春秋孔演圖曰孔子曰丘援律吹命隂得羽之宫孝經援神契曰聖王吹律有姓漢書張蒼傳曰蒼乃自秦時爲柱下御史明習天下圖書計籍又善用笇律曆故令蒼以列侯居相府領王郡國上計又曰張蒼代灌嬰爲丞相漢興二十餘年天下定公卿皆軍吏蒼爲計吏時正緒律曆故漢家言律曆者法張蒼蒼好書無所不通而尤􅃉律曆􅃉深又京房傳曰房字君明東都頓丘人好鍾律知音聲房夲姓李推律自定爲京氏又曰夫五音生於夲姓分爲十二律轉生六十二律皆所以紀升氣効物􅀋也天効以影地効以響響即律也隂}
