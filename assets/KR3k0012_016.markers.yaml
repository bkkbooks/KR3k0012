  - {type: variant, offset: 3551, length: 2, content: 望尋, SBCK: 文載口傳也故鑄金作鍾以正十二月之聲然後以効升降之氣而鍾不可用乃截竹爲管曰律爲清濁之率也以律長短爲制正月之律與太蔟相中也言出於鍾乃置􅀷室葭莩爲􅁅以實其端其月氣旣至則􅁅飛管通古以鍾律齊其聲後人不能則數以正其度度正則音亦正矣仲春中夾鍾仲春夾鍾也管長七寸四分強夾鍾􅀋分也季春中姑洗管長七寸一分強故鮮也言萬物去故就新莫不鮮明也孟夏中仲吕長六寸二分陽氣將極後中難仲夏中蕤賔六寸一分小二分陽氣上極隂始起故賔敬之㽔下也季夏中林鍾長六寸九分物成熟鍾􅀋也林鍾衆也孟秋中夷則長五寸六分二分夷傷則法也萬物始傷仲秋中南吕長四寸三分小三分南任也言陽氣尚有任也生孶長也季秋中無射長四寸八分小三分射終也言万物隨陽終也孟冬中應鍾長四寸八分言万物􅀿陽而動下藏仲冬中黃鍾長九寸律之始言陽於黄泉下動也鍾動也季冬中大吕長八寸吕距也言陽氣欲出隂不許也京氏律術曰律難以度調故作准以代之准之狀如瑟長丈而十三􅁌隱間九尺中共一􅁌下盡分寸均中其􅁌使應黃鍾之聲然案分寸以求諸律則稍皆如盡而應矣然則上古有鍾其次有律近古有准皆稍簡易之意其相生也黃鍾下生林鍾林鍾上生太蔟太蔟下生南吕南吕上生沽洗沽洗下生應鍾應鍾上生㽔賔蕤賔下生大吕大吕下生夷則夷則上生夾鍾夾鍾下生無射無射上生中吕中吕上生黃鍾上下相生終六十執始以下四十八律文多不載孟春之月則太蔟爲宫沽洗爲啇蕤賔爲角南吕爲徴應鍾爲羽大吕爲變宫夷則爲變徴他月効此也六韜曰武王問太公曰聽律之音聲何以知三軍之消息勝􅀒之决乎公曰􅀷哉王之問也夫律管十二其要以五宫啇角徴羽此其正聲也萬物不易五行之神道之}
