  - {type: variant, offset: 3547, length: 1, content: 書, SBCK: 也四時之間氣微細三間中吕宣中氣也四間林鍾和展百事㑭莫不任肅純恪也五間南吕賛陽季也六間應鍾均利器用俾應復也律吕不易無姦物也蔡邕月令曰律率也聲之管也中應也太蔟鍾名上古本隂陽別風聲審清濁別風聲}
  - {type: variant, offset: 3547, length: 1, content: 書, WYG: 也四時之間氣微細者三間中吕宣中氣也四間林鍾和展百事俾莫不任肅純恪也五間南吕賛陽秀也六間應鍾均利器用俾應復也律吕不易無姦物也蔡邕月令曰律率也聲之管也中應也太蔟鍾名上古本隂陽别風聲清濁别風聲}
