  - {type: variant, offset: 3694, length: 0, content: '', WYG: 孫權黄武二年改四分厯用乾象厯王隠晋書曰張載弟前烏程令元依蔡邕注明堂月令中台要綴諸説厯數而為厯讃秘書監茍菘見讃異之謂可該羅厯義唐書曰王勃聰警絶衆於推步厯笇尤精嘗作}
  - {type: variant, offset: 3695, length: 1, content: 霧, SBCK: 旨云以土王者五十代而一千年金王者四十九代而九百年水王者二十代而六百年木王者}
  - {type: variant, offset: 3695, length: 1, content: 霧, WYG: 唐千嵗厯言唐徳靈長千年合承周漢運厯不合承周隋短祚其論大㫖云以土王者五十代而一千年金王者四十九代而九百年水王者二十代而六百年木王者}
