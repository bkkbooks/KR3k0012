  - {type: variant, offset: 2209, length: 0, content: '', SBCK: 和則影至以律氣應則􅁅除是故天子常以冬夏至御前殿合八能之士陳八音聽樂均度晷影候鍾律權土􅁅校隂陽冬至陽氣應則均清景長極黃鍾通土􅁅輕而衡仰夏至隂氣應則均濁景短極㽔賔通土􅁅重而衡低進退於先後五日之中八音能各以候狀聞大史合封上效則和否則占􅀱氣之法爲室三重户開塗舋必周宻布緹㦥室中以木爲案毎律各一内庫外髙從其加律其上以葭莩􅁅抑其内端案曆而􅀱}
