  - {type: variant, offset: 3546, length: 0, content: '', SBCK: 斗運提月徙一辰復反其所正月指寅十一月指子一嵗而匝終而復始寅則萬物螾螾也螾虫也律受太蔟蔟者湊而未出也太蔟正月律指卯卯則茂茂然律受夾鍾夾鍾者鍾始夾也夾鍾二月律指辰辰則振振之也律受沽洗沽洗者陳去而新來也沽洗三月律指巳巳則生巳定也律受中吕中吕者中充大也中吕四月也指午午者忤也律受㽔賓㽔賔者安而服也蕤賔五月律指未未者味也律受林鍾林鍾者引而止之也林鍾六月律指申申者呻也律受夷則夷則易其則也德去矣夷則七月律也德以去生氣尽也指酉酉者飽也律受南吕南吕者任苞大也南吕八月律指戍戍者滅也律受無射無射者人之無厭也無射九月律指亥亥者閡也律受應鍾應鍾者應其鍾也應鍾十月律指子子者兹也律受黃鍾黃鍾者巳鍾也黄鍾十一月律指丑丑者紐也律受大吕大吕者旅旅而去也大吕十二月律也又曰一律而生五音十二律而爲六十音因而六之六六三十六故三百六十音以當一歳之日故律曆之數天地之道國語曰天王將鑄無射王景王也問律於伶州鳩律鍾律也對曰律所以立均出度也律謂六吕六律也均鍾木長七尺有􅁌擊之以均鍾者度鍾大小清濁也漢大予樂官有之也紀之以三三天地人也平之以六平之以六律成以十二十二律吕也天之道也天之大數不過十二夫六中之色也故名之曰黃鍾六者天地之中天有六氣降生五味天有六甲地有五子十一而天地畢矣而六爲中故六律六吕而成天道也所以宣養六氣九德也宣徧也六氣隂陽風雨晦明也九德九功之徳水火金木土榖政德利用厚生之者也由是第之由從也弟次也次其日也二曰太蔟所以金奏賛陽出滯也三曰沽洗所以脩潔百物考神納賔也四曰㽔賔所以安靖神人獻酬交酢也五曰夷則所以詠歌九則平民無二也六曰無射所以宣布哲人之令徳示民軌儀也爲之六間以楊沉伏而黜散越也六間六吕在陽律之間沉滯也黜去也越楊也吕隂律所以吕間陽成其功發楊滯伏之氣而去越散者也元間大吕􅂇宣物也二間夾鍾出隟之}
