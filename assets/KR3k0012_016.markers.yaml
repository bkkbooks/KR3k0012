  - {type: variant, offset: 1249, length: 1938, content: 則有聲中樹木則折名曰鬼彈中人則奄然青爛宋永初山川記曰寧州瘴氣𦱌露四時不絕西升記曰老子西出關關令尹喜占氣知神仙過荊州記曰夷道縣有望州山山下有泉欲雨泉中有赤氣騰上于天莊子曰若夫乘天地之正而御六氣之辨以遊無窮者彼惡乎待哉郭象曰御六氣之辨即是遊變化之塗也又曰人之生氣聚則為生散則為死列子曰太初者氣之始也又曰天積氣之成者也孫卿子曰水火有氣而無生草木有生而無知抱朴子曰軍上氣黑如樓將軍移軍必敗其將勇則氣如火火勢如張弩雲如日月赤氣繞之所見之地大勝不可攻也又曰或問登陟之道曰或用棗心為飛車存念則五虵六龍而乘之上升三十里名為太清其氣甚剛勝人也師言鳶飛漸高直舒兩翅而自進漸乘剛氣也淮南子曰土地各以類生人是故山氣多男澤氣多女水氣多瘖於金風氣多聾林氣多癃木氣多傴高誘曰自此上至山氣多男皆生子乃有此疾也下氣多尰岸下下濕腫足日尰石氣多力象石也險阻氣多癭暑氣多殀音夭寒氣多壽谷氣多痺丘氣多狂廣氣多仁下而平者為廣陵氣多貪象陵積聚也輕土多利利疾也重土多遲清水音小濁水音大湍水人重湍急流悍水也中土多聖人皆應其類也又曰太清之始世天覆以德地載以樂四時不失其序風雨不降其虐日月淑清而楊光五星循軌而不失其行此時玄元氣至休氣者也呂氏春秋曰天圓為精氣圓通周復無雜故曰圓魏子曰北夷之氣象群羊南夷之氣類船山海之氣象樓臺宮闕都邑之氣象林木家語曰食氣者神明而壽洛書曰有氣象人青衣無手在日西天子之氣也遁甲開山圖曰巨靈者偏得元氣之道故以元氣一時生混沌又曰自老子生周青氣凌遲俗儒道士無所通驗河圖曰崑崙山有水水氣上蒸為霞地鏡圖曰望百姓家黃氣者糵梔子樹也山有白氣而鬱鬱中有神龍三輔舊事曰漢作靈臺以四孟月登而觀黃氣為疾病赤兵黑水荊州圖曰宜都郡望州山袁山松宜都記曰武鍾山山根有涌泉成溪溪注丹水天陰欲雨輒有赤氣故名丹溪論衡曰陳留虞延字君人夜生母見其上氣如一疋絹徑上天以問人人曰吉氣與天通后仕至司徒楚辭曰飡六氣而飲沆瀣兮漱正陽而含朝霞王逸曰飡吞日精食元符也陵陽子明經曰春食朝霞朝霞者日始出赤氣也秋食淪漢淪漢者日沒後赤黃氣也冬食沆瀣沆瀣者北方夜半氣也夏食正陽正陽者南方日中氣也又天問曰伯強安處惠氣安在注曰伯強是大疫鬼也所至恣惡氣傷和氣霧釋名曰霧冒也氣蒙冒覆地物也昏暗之時則為妖災明王聖主則為祥瑞禮記月令曰仲冬行夏令則其國乃旱氛霧冥冥爾雅曰地氣發天不應曰霧尚書中候曰桀無道地吐黃霧春秋元命包曰霧陰陽之氣也陰陽怒而為風亂而為霧漢書曰爰盎諫文帝勿遷淮南王恐其逢霧露病死又曰王氏五侯同日俱封其日黃霧四塞又曰漢高祖至平城匈奴圍上七日天大霧漢使人還往胡不覺後得免平城之難又曰孝成帝建始元年夏四月黃霧四塞上問楊興等對曰陰盛侵陽之氣也東觀漢記曰馬援謂官屬曰吾在浪泊西里間下潦上霧毒氣薰蒸仰視烏鳶跕跕都葉吐葉二音墮水中謝承後漢書曰河南張楷字公超性好道術能作五里霧於華陰時關西人裴優亦能作三里霧魏略曰劉雄鳴每出雲霧中識道不迷惑時人因謂為雲霧王隱晉書曰樂廣為尚書令衛瓘見而奇之令諸子造焉曰此人之水鏡也每見瑩然若開霧覩青天又曰大寧元年黃霧四塞王敦之應也宋元嘉起居注曰盱眙民王彭先丁母艱居喪至孝元嘉之始父又喪亡彭兄弟二人土功未就鄉人助彭作塼塼事須水濟值天旱穿井盡力不得水彭號窮無計一旦天霧霧消之後於塼竈前自然水生沈約宋書曰後漢正月朝天子臨德陽殿受朝賀舍利從南方來戲於殿前激水化成比目跳躍嗽水作霧翳日燕書烈祖後記曰無璽六年蔣幹遣侍中繆高太子詹事劉猗齎傳國璽詣晉求救猗負引行數百里黃霧四塞迷荒不得進乃還易取行璽始得去帝王世紀曰凡重霧三日必大雨雨未降霧不可冒行又曰帝沃丁八年伊尹卒年百有餘歲天霧三日沃丁葬以天子之禮祀以太牢親自臨喪三年以報大德焉又曰黃帝時天大霧三日帝遊洛水之上見大魚殺五牲以醮之天乃甚雨七日七夜魚流始得圖書今河圖也世傳大霧三日必有甚雨自此始也漢武內傳曰東方朔乘雲飛去仰望天霧覆之不知所在劉向列女傳曰陶荅子妻者陶大夫荅子之妻也荅子仕陶三年名譽不興家富三倍其妻數諫曰夫子能薄而官大是謂嬰害無功而家昌是謂積殃昔楚令尹子文之仕家貧而國富福結於子孫名垂於后代今夫子貪富務大不顧後害妾聞南山有玄豹霧雨七日不下食者何也欲以澤其衣毛而成其文章故藏以遠害今君與此背不無後患乎葛洪神仙傳曰欒巴為尚書郎一旦天大霧對坐不相見失巴所在後問其故乃是巴還成都與親故別也又曰淮南王聞有道術之士必卑辭厚幣以致之於是八公乃往一人能坐致風雨立起雲霧王試之無不效李先生傳曰先生名廣字祖和本南陽人劉備遣軍欲取先生先生起霧半天備騎自相殺先生因此乃入吳宜都山川記曰郡西北三十里有丹山天晴山嶺忽有霧起迴轉如煙不過再朝雨必降王烈之安成記曰縣人有謝廩者行田歸路中忽遇雲霧霧中有一人乘龜而行廩知神人拜請求隨去父曰汝無仙骨不得去也湘州記曰曲江縣有銀山山常多素霧嵩高山記曰有獵師在山見浮圖奇妙異常有金像比來尋求白霧忽起不知寺處, WYG: ''}
