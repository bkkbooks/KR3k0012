  - {type: variant, offset: 3564, length: 2, content: 蝍蛆, SBCK: 六曆踈闊中最爲微近然正朔服色未暏其眞而朔晦􅁌望多虧矣至武帝元封七年漢興百二歳矣太中大夫公孫卿壷遂太史令司馬遷等言曆紀壞廢冝改正朔遂詔卿遂遷與侍郎尊大典星射姓等師古曰姓射名姓也議造漢曆迺定東西立晷儀下漏刻以進二十八􅀫相距於四方舉終以定朔晦分至􅾳離􅁌望應劭􅾳俓也離逺臣瓉案籬曆也日月之曆也姓等奏不能爲筭願募治歷者更造宻度各自増減以造漢太􅀄歷迺選治歷鄧平及長樂司馬可酒泉侯冝君侍郎尊及與民間治歷者凡二十餘人方士唐都巴郡洛下閎與焉晉灼日史記曆書云唐部分天部而巴郡洛下閎運笇推歷也都分天部謂分部二十八􅀫爲距度也而閎運筭轉曆與鄧平所造八十一分律歷律昏明踈逺者十七家使校歷律昏明官者淳于陵渠復覆太􅀄歷晦朔􅁌望皆最宻日月如合璧五星如連珠謂太􅀄上元甲子夜半朔旦冬至時七曜皆會聚斗牽牛中如合璧連珠也陵渠奏狀遂用鄧平歷以平爲太史丞後二十七年元鳯三年太史令張壽王上書言曆者天地之大紀上帝所爲傳黃帝調律歷漢元年以來用之今隂陽不調冝更歷之過也詔下主歷使者鮮干妄人請與治歷大司農中丞麻光等二十餘人雜候日月晦朔􅁌望八節二十四氣鈞校諸歷用狀奏可詔與丞相御史大將軍右將軍史各一人雜候上林青臺諸曆踈宻凡十一家以元鳯三年十一月朔旦冬至盡五年十二月各有第壽王課踈逺案漢元年不用黃帝調歷壽王非漢歷逆天道非所冝言大不敬有詔勿劾復􅀱盡六年太􅀄歷第一即墨徐萬旦長安徐禹治太􅀄歷亦第一壽王及待詔李信治黃帝調歷課皆踈闊壽王歷迺太史官殷歷也定至孝成世劉向緫六歷列是非作五紀論向子歆究其微眇作三統歷及譜又曰路温舒從祖父受曆數天文以爲漢阨三七之間張宴曰三七二百一十歳也自漢􅀄至哀帝元年二百一年也至平帝崩二百一十一歳也上封事以豫戒成帝時谷永亦言如此又王莽傳曰莽見盗賊多乃令太史推三萬六千歳曆紀布天下書曰紫閣圖昌太一萬帝皆仙而上天張樂崑崙處山之上後丗聖主得瑞者當張樂􅁗終南山上長安南山詩所謂終南南故􅁗地故言􅁗予之不敏奉行未明乃今諭矣又孝武紀曰夏五月正歷以正月爲嵗首鄭􅀇曰先是以十月爲􅀊首色上黃數用五張晏曰漢據土德土數五定官名恊音律又曰曆譜有序四時之位正分至之節以㑹日月五星之辰以考寒暑殺生之實故聖王必正曆以􅀷知五星日月之㑹凶阨之患其術皆出焉此聖人知命之術也續漢律曆志曰自太􅀄元年始用三統曆施行百餘年曆稍後天朔先於曆朔或在晦月或朔見建武八年中太僕朱浮太中大夫許叔等數上書言朔曆不正冝當改更時分度覺差尚微上以天下􅀄定未遑考正至永平五年官曆署七月十六日日蝕待詔楊岑見時月食多先曆即縮用筭因上言月當十五日食官曆不中詔書令岑普􅀱與官曆課起七月盡十一月􅁌望凡五官曆皆失岑皆中庚寅詔書令岑署􅁌望月食官復令待詔張盛景防鮑業等六四分法與岑課歳餘盛等所中多岑六事又曰黃帝造曆元起辛卯而顓頊用乙卯虞用戊午夏用丙寅殷用甲寅周用丁巳魯用庚子漢􅀄用乙卯至武帝元年以丁丑王莽之際劉歆作三統追太􅀄前世一九得五星㑹庚戌之嵗以爲上元太􅀄曆到章帝元和施復踈闊徴能術者課効諸曆定朔稽元追漢四十五年庚辰之歳退朔一日乃與天合以爲四分曆}
