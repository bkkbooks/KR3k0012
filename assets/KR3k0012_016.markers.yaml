  - {type: variant, offset: 3698, length: 19, content: 日群猾起上下相蒙上少下多故群猾起志林曰, SBCK: 代而八百年火王者二十代而七百年此天地之常期符曆之大數也自}
  - {type: variant, offset: 3698, length: 5, content: 日群猾起上, WYG: 代而八百年火王者二十代而七百年此天地之長期符厯之大數也自黄帝至漢并是五運貞主五行之匝土運復歸唐徳承之宜矣魏晋至于周隋咸非正統五行之沴氣也故不可承之大率如此洪範五行傳曰聖人所以揆天行而紀萬國也孔子作春秋正春正秋所以重厯也五家之厯多踈闊惟顓頊厯為㣲近故張蒼用顓頊厯元封中立太初厯測弦望皆最宻益都耆舊傳曰巴郡洛}
