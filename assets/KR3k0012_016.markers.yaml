  - {type: variant, offset: 3551, length: 0, content: '', WYG: 文載口傳也故鑄金作鍾以正十二月之聲然後以效升䧏之氣而鍾不可用乃截竹為管曰律為清濁之率也以律長短為制正月律與太蔟相中也言皆出於黄鍾之律乃置深室葭莩為灰以實其端其月氣既至則灰飛管通古以鍾律齊其聲後人不能則數以正其度度正則音亦正仲春中夾鍾管長七寸四分夾孚甲也言孚甲類分也季春中姑洗管長七寸一分強姑故也洗鮮也言萬物去故就新莫不鮮明也孟夏中中吕管長六寸二分陽氣將極故復中難之也仲夏中蕤賔管長六寸三分小分二强蕤下也賔敬也陽氣上極隂氣始賔敬之季夏中林鍾管長六寸九分林衆也萬物成熟種類衆多孟秋中夷則管長五寸六分夷傷也則法也萬物始被刑法也中秋中南吕管長五寸三分小分三强南任也言陽氣尚有任也季秋中無射管長四寸八分小分三强射終也言萬物随陽終也孟冬中應鍾管長四寸八分鍾動也言萬物應陽而動下藏也中冬中黄鍾管長九寸鍾動也言陽氣于黄泉下動季冬中大吕管長八寸吕距也言陽氣欲出隂不許也京氏律術曰律難以度調故作准以代之准之狀如瑟長丈而十三弦隱間九尺中共一弦下畫分寸均中其弦使應黄鍾之聲苐按分寸以求諸律則皆如畫而應矣然自上古有鍾其次有律近古有准皆稍簡易之意其相生也黄鍾下生林鍾林鍾上生太蔟太蔟下生南吕南吕土生姑洗姑洗下生應鍾應鍾上生􅅋賔􅅋賔下生大吕大吕下生夷則夷則上生夾鍾夾鍾下生無射無射上生中吕中吕上生黄鍾上下相生終六十執始以下四十八律文多不載孟春之月則太蔟為宫姑洗為商􅅋賔為角南吕為徵應鍾為羽大吕為變宫夷則為變徵他月倣此也六韜曰武王問太公曰辨律之音聲何以知三軍之消息勝負之决乎公曰深哉王之問也夫律管十二其音以五宫商角徴羽此其正聲也萬代不易五行之神道之常也金木水火土可以其勝攻之其法以天清凈無隂雲風雨夜遣輕騎往至敵人之壘去九百步外徧持律管當耳大呼驚之有聲應管其來甚微角聲應管當以白虎徴聲應管當以𤣥武商聲應管當以朱雀羽聲應管當以勾陳五管聲皆不應者宫也當以青龍此五行之符佐勝之徴咸則之也白虎通曰十一月律謂之黄鍾何黄中和之色鍾者動也言陽于黄泉之下動養萬物也十二月律謂之大吕何大者太也吕者距也言陽氣欲出隂不許也正月律謂之太蔟何太者大也蔟者湊也言萬物始大湊地而出也二月律謂之夾鐘何夾孚甲也言萬物孚甲種類分三月律謂之姑洗何姑者故也洗者鮮也言萬物去故就新莫不鮮明也四月律謂之中吕何言陽氣將極故復中難之也五月律謂之􅅋賔何􅅋者下也賔者敬也言陽氣上極隂氣始起故賔敬之六月律謂之林鍾何林者衆也萬物成熟其類衆多也七月律謂之夷則何夷傷也則法也言萬物始傷被刑法也八月律謂之南吕何南任也言陽氣尚有任也九月律謂之無射何射終也言萬物隨陽而終也當復隨隂起無有終也十月律謂之應鍾何鍾者動也言萬物應陽而動下藏也蔡邕月令章句曰鍾以觔両尺寸中所容受升之數為法律亦以寸分大小長短為法故也黄鍾之管長九寸孔徑三分圍九分其餘皆稍短為大小圍數無增减以度量者可以文載口傳與衆共知然不如耳决之明也周官曰太師掌六律六吕文以五聲播以五敎以六詩六徳為之本以六律為之音也劉向别録曰鄒子在燕燕國有谷地美而寒不生五榖鄒子居之吹律而温氣至今名黍谷論衡曰孔子吹律自知殷之苗裔楊泉物理論曰聽清濁五音之和然後制為鍾律取𢎞農宜陽縣金門山竹為管夏侯𤣥辨樂論曰阮生云律吕協則隂陽和音聲適則萬物類天下無樂而欲隂陽和調灾害不生亦已難矣此言律吕音聲非徒化治人物乃可以調和隂陽蕩除災害也夫天地定位剛柔相摩盈虛有時堯遭九年之水憂民阻飢湯遭七年之旱欲遷其社豈律吕不和音聲不通哉此乃天然之數非人道所協也揚雄太𤣥經曰調律者度竹為管蘆莩為灰列之九則之中漠然無動寂然無聲㣲風不起纎塵不形冬至半夜黄鍾以應矣厯世本曰容成作厯容成黄帝之臣易曰君子以治厯明時書曰乃命羲和欽若昊天厯象日月星辰敬授人時又天之厯數在汝躬又協用五紀又五曰厯數易乾鑿度曰堯以甲子天元為推術注云甲子為蔀首起十一月朔又厯原名握先紀曰甲子握先為厯始之名始言無前者也七十六嵗為一紀而一蔀首易是類謀曰師曠觸耀而出厯推首算以知將來觸耀而出謂師曠得聖人之一體故觸耀而生其人能厯數樞機之事又能推五音知將來之事漢書律厯志曰厯數之起上矣傳述顓頊命南正重司天火正黎司地其後三苗亂徳二官咸廢而閏餘乖次孟陬殄滅攝提失方攝提星名随斗杓所指建十二月若厯悮春三月當指辰乃指已是為失方也堯復育重黎之後使纂其業後以授舜舜亦以命禹至周武王訪箕子言大法九章而五紀明厯法併嵗月日星辰為五紀也五覇之末史官䘮紀疇人子弟分散李竒曰同類之人俱明厯者也如淳曰家業世世相傳為疇或在夷狄故其所記有黄帝顓頊夏殷周及魯厯戰國擾攘秦兼天下未遑暇也亦頗推五勝五行相勝秦以周為火用水勝之也而自以為獲水徳乃以十月為正色尚黑漢興方紀綱大基庶事草創襲秦正朔以北平侯張蒼言用顓頊厯比於六厯踈濶中最為㣲近然正朔服色未睹其真而朔晦月見弦}
