  - {type: punctuation, offset: 1820, content: 《, id: KR3k0012_CHANT_016-bkkpn607}
  - {type: variant, offset: 1820, length: 380, content: 遁甲開山圖曰巨靈者偏得元氣之道故以元氣一時生混沌又曰自老子生周青氣凌遲俗儒道士無所通驗河圖曰崑崙山有水水氣上蒸為霞地鏡圖曰望百姓家黃氣者糵梔子樹也山有白氣而鬱鬱中有神龍三輔舊事曰漢作靈臺以四孟月登而觀黃氣為疾病赤兵黑水荊州圖曰宜都郡望州山袁山松宜都記曰武鍾山山根有涌泉成溪溪注丹水天陰欲雨輒有赤氣故名丹溪論衡曰陳留虞延字君人夜生母見其上氣如一疋絹徑上天以問人人曰吉氣與天通后仕至司徒楚辭曰飡六氣而飲沆瀣兮漱正陽而含朝霞王逸曰飡吞日精食元符也陵陽子明經曰春食朝霞朝霞者日始出赤氣也秋食淪漢淪漢者日沒後赤黃氣也冬食沆瀣沆瀣者北方夜半氣也夏食正陽正陽者南方日中氣也又天問曰伯強安處惠氣安在注曰伯強是大疫鬼也所至恣惡氣傷和氣霧釋名曰霧冒也氣蒙冒覆地物也昏暗之時則為妖災明王聖主則為祥瑞禮記月令曰仲冬行夏令則其國乃旱氛霧冥冥爾雅曰地氣發天不應曰霧尚書中候曰桀無道地吐黃霧, SBCK: ''}
