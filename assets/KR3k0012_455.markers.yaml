  - {type: variant, offset: 15, length: 2, content: 劉聰, SBCK: 鍾又曰楚處莊姪者楚縣邑之女也頃襄王好遊觀之樂焉王左右謂王曰南遊於唐五百里有樂焉王}
  - {type: variant, offset: 15, length: 1, content: 劉, WYG: 鍾又曰楚處莊姪者楚縣邑之女也頃襄王好遊觀之樂焉王左右謂王曰南遊於唐五百里有樂焉王將行姪年十二王旣見姪操幟伏於南郊道傍王車至姪舉其幟王使人問之姪曰願謁隠事於王王召之子何以成寡人對曰大魚失水有龍無尾墻欲内崩而王不視王曰不知對曰大魚失水者離國五百里也有龍無尾者年三十無太子墻欲内崩王不視者禍亂且成而王不改王曰何對曰王好臺榭而不恤衆庻出入不時耳目不}
  - {type: page-break, offset: 15, content: '', id: KR3k0012_WYG_455-2b, image: WYG0897/WYG0897-0172d.png}
  - {type: variant, offset: 15, length: 2, content: 劉聰, krp: 鍾又曰楚處莊姪者楚縣邑之女也頃襄王好遊觀之樂焉王左右謂王曰南遊於唐五百里有樂焉王}
  - {type: variant, offset: 17, length: 5, content: 將起鳳儀殿, WYG: 強奏聞王左右使王日以滋甚王不亟反且及禍雖悔無逮王曰善命後車載之立反國比至國門已閉反者已定王乃發鄢郢之師以擊之僅而得勝乃立姪為夫人說苑曰齊晏子復}
  - {type: variant, offset: 18, length: 4, content: 起鳳儀殿, SBCK: 行姪年十二王旣見出操幟伏}
  - {type: variant, offset: 18, length: 4, content: 起鳳儀殿, krp: 行姪年十二王旣見出操幟伏}
  - {type: variant, offset: 23, length: 0, content: '', SBCK: 南郊道傍王車至姪舉其幟王使人問之姪曰願謁隱事於王王召之子何以成寡人對曰大魚失水有龍無尾牆欲内崩而王不視王曰不知對曰大魚失水者離國五百里也有龍無尾者年三十無太子牆欲内崩王不視者禍亂且成而王不改王曰何對曰王好臺榭而不恤衆庶出入不時耳目不聦強奏聞王左右使王日以滋甚王不亟反且及禍雖悔無逮三曰善命}
  - {type: page-break, offset: 23, content: '', id: KR3k0012_SBCK_455-2a}
  - {type: variant, offset: 23, length: 0, content: '', WYG: 景公曰朝居嚴乎公曰朝居嚴則曷害於治國哉晏子對曰朝居嚴則下無言下無言則上無聞矣下無言則謂之喑上無聞則謂之聾聾喑則非害治國家而何且㤗山之髙非一石也累卑然}
  - {type: page-break, offset: 23, content: '', id: KR3k0012_WYG_455-3a, image: WYG0897/WYG0897-0173a.png}
  - {type: variant, offset: 23, length: 0, content: '', krp: 南郊道傍王車至姪舉其幟王使人問之姪曰願謁隱事於王王召之子何以成寡人對曰大魚失水有龍無尾牆欲内崩而王不視王曰不知對曰大魚失水者離國五百里也有龍無尾者年三十無太子牆欲内崩王不視者禍亂且成而王不改王曰何對曰王好臺榭而不恤衆庶出入不時耳目不聦強奏聞王左右使王日以滋甚王不亟反且及禍雖悔無逮三曰善命}
  - {type: variant, offset: 24, length: 6, content: 庭廷尉陳元達, SBCK: 車載之立反國比至國門巳閇反者巳定王乃發鄢郢之師以擊之僅而得勝乃立姪爲夫人􅀃苑曰齊晏子復於景公曰朝居嚴平公曰朝居嚴則曷害於治國哉晏子對曰朝居嚴則下無言下無言則上無聞矣下無言則謂之喑上無聞則謂之聾聾喑則非害治國家如何且泰山之髙非一石也累卑然後髙也夫治天下者非用一士之言也又曰􅁗始皇時侯生}
  - {type: variant, offset: 24, length: 6, content: 庭廷尉陳元達, WYG: 高也夫治天下者非用一士之言也又曰秦始皇時侯生}
