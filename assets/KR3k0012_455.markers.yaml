  - {type: variant, offset: 3907, length: 6, content: 股慄公權詞氣, SBCK: 故父子之道天性也忠臣不敢避誅以直諫故事無廢業而功流於萬丗也臣乗願披膓心而效愚忠恐大王不能用也臣乗願大王聽臣乗之言夫一縷之任係千鈞之重上懸之無極之髙下垂之不測之淵雖甚愚之人且猶知哀其絶也馬方駭而重驚之係方絶而重鎭之係絶於天}
