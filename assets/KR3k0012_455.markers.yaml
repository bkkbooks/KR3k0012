  - {type: variant, offset: 1047, length: 616, content: 盧愷武帝在雲陽宮勑諸屯簡老牛欲以享士愷進諫曰昔田子方贖老馬君子以為美談向奉明勑欲以老牛享士有虧仁政帝美其言而止又曰劉行本沛人累遷黃門侍郎高祖常怒一郎於殿前笞之行本進諫曰此人素清其過又小上不顧行本又曰陛下不以臣不肖置在左右臣言若是陛下安得不聽臣所言非當致之大理安得輕臣而不顧臣所言非私因置笏於地而退上於是歛容謝之又曰蘇威見宮中以銀為幔鉤因盛陳節儉之美以諭上上為之改容彫飾舊物悉命除毀上嘗怒一人將殺之威入閤進諫不納上怒甚將自出斬之威當上前不去避之而出威又遮止上拂衣而入良久乃召威謝曰公能若是吾無憂矣於是賜馬二疋錢十餘萬又曰趙綽為刑部侍郎治梁士彥等獄賜物三百段奴婢十口馬二十疋每有奏讞正色侃然上嘉之漸見親重上以盜賊不禁將重其法綽進諫曰陛下行堯舜之道多存寬宥況律者天下之大信其可失乎上忻然納之因謂綽曰若更有聞見宜數陳之也上禁行惡錢有二人在市以惡錢易好者武候執以聞上令悉斬之綽進諫曰此人坐當杖殺之非法上曰不關卿事綽曰陛下不以臣愚暗置在法司欲妄殺人豈得不關臣事上曰撼大木不動者當退對曰臣望感天心何為動木上復曰啜羹者熱則置之天子之欲相挫耶綽拜而益前訶之不肯退上遂入治書侍御史柳彧復上奏切諫上乃止唐書曰虞世南雖容貌懦懦若不勝衣而志性抗烈論及古先帝王為政得失必存規諷多所補益太宗常謂侍臣曰朕因暇日與虞世南商略古今有一言之失未嘗不悵恨其懇誠若此朕用嘉言群臣皆若世南天下何憂不理又曰孔頴達數進忠言益見親待太宗嘗問曰論語云以能問於不能以多問於寡有若無實若虛, WYG: ''}
