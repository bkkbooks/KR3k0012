  - {type: variant, offset: 4095, length: 396, content: 警急即支用無闕免令有司重歛百姓實天下幸甚帝初不悅其言顧宰相蕭俛曰此輩何人俛對曰諫官也帝意稍解又曰劉栖楚敬宗即位畋遊稍多坐朝常晚栖楚出班以額叩龍墀出血苦諫曰臣歷觀前王嗣位之初莫不躬勤庶政坐以待旦陛下即位已來放情嗜寢樂色忘憂安臥宮闈日晏方起西宮密邇未過山陵鼓吹之聲日喧於外伏以憲宗皇帝大行皇帝皆是長君恪勤庶政四方猶有叛亂陛下運當少主即位未幾惡德布聞臣恐福祚之不長也臣忝諫官致陛下有此請碎首以謝遂以額叩龍墀久之不已宰相李逢吉出位宣曰劉栖楚休叩頭候進旨栖楚捧首而起因便陳論搕頭見血上為之動容以袖連揮令出栖楚又云不可臣奏臣即碎首死中書侍郎牛僧孺從宣示而出敬宗為之動容無何遷起居郎又曰李程為相敬宗冲幼好治宮室畋遊無度欲於宮中營新殿程諫曰自古聖帝明王以慈儉化天下陛下在諒闇之中不宜興作願以瓦木迴奉園陵上忻然從之又曰文宗時魏謨為起居舍人紫宸中謝召誡之曰事有不當即須奏論謨曰言臣頃為諫官合伸規諷今居史職職在記言, SBCK: ''}
