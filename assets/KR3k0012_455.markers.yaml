  - {type: variant, offset: 1666, length: 221, content: 頴達對曰聖人設教欲以謙光己雖有能不自矜大仍就不能之人求訪能事己之才藝雖多猶以為少仍就寡小之人更求所益己之雖有其狀若無己之雖實其容若虛非唯疋庶帝王之德亦當如此夫帝王內蘊神明外須玄默深不可測度不可知易稱以蒙養正以明夷蒞眾若其位居尊極炫耀聰明以才凌人飾非拒諫則上下情隔君臣道乖自古滅亡莫不由此也太宗深善其對又曰劉洎太宗嘗謂侍臣曰夫人臣之對帝王皆順旨而不逆甘言以取容朕今發問欲聞己過卿等須言朕愆失長孫無忌李勣楊師道等咸云陛下聖人化致太平臣等不見其失洎, SBCK: 茅焦}
