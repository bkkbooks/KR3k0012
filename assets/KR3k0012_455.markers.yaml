  - {type: variant, offset: 4759, length: 168, content: 常楊頴上䟽諫呂纂飲酒過度出入無恒纂曰不有直亮之臣誰匡邪僻之君也纂雖有此言終不能改又曰呂光龍飛二年太常黁反叛黁以箋書招誘楊軌推為盟主軌性直不慮黁之傾危西河太守程肇諫軌曰將軍之與呂主可謂臭味是同今欲釋同心託異類背龍頭尋虵尾非將軍之高筭也梁祚魏國統曰吳丞相顧雍諫孫權曰公孫泉未可信後必悔也權入禁中雍後隨之頓首曰此國之大事臣以死爭之權使左右扶出, SBCK: 平御覽卷第四百五十五}
