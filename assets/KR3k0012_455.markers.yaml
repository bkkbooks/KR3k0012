  - {type: variant, offset: 3340, length: 6, content: 他日南面亦須, SBCK: 􅀂臣者䛕臣也願大王殺臣之軀罰臣之家而禄司馬子綦王曰􅀂我能止聽公子獨能禁我游後丗游之無有極時奈何乎令尹子西曰欲禁後丗易耳願大王山陵崩陁爲陵於荆臺未嘗有持鍾皷管弦之樂而游於父之墓上者也於是王還車卒不游於荆臺令罷先置孔子從魯聞之曰悲哉令尹子西諫之十里之前而催之於百丗之後者也又曰荆文王得}
