  - {type: variant, offset: 2180, length: 2, content: 時政, SBCK: 耶諸御巳曰君有義之用有法之行且巳聞之土負水者平木負繩者正君受諫者聖君築層臺延石千里延壤百里民之釁咎血成通於塗然且未敢諫也巳何敢諌乎頋臣愚竊以虞不用宫之竒而晉并之陳不用子家羈而楚并之曹不用僖負羈而宋并之萊不用子猛而齊并之呉不用子胥而越并之􅁗不用蹇叔之言而􅁗國危桀殺􅀜龍逢而湯}
