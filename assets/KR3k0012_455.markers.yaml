  - {type: variant, offset: 943, length: 0, content: '', SBCK: 諫又曰􅁗始皇帝太后不謹幸郎嫪毒封以爲長信侯爲生兩子毒專國事浸益驕奢與侍中左右貴臣俱􅀶飲酒醉爭言而􅃲瞋目大叱曰吾乃皇帝之假父也窶人子何敢乃與我抗所與􅃲者走行白皇帝皇帝太怒毒懼誅因作亂戰咸陽宫敗始皇乃取毒四支車裂之取其兩弟囊撲殺之諌而死者二十七人矣齊客茅蕉乃徃上謁曰齊客茅蕉願上諫皇帝皇帝使使者出問客得無以太后事諌也茅蕉曰然使者還白曰果以太后事諌皇帝曰走徃告之􅀂不見闕下積死人耶使者問茅焦茅焦曰臣聞之天有二十八􅀫今死者巳有二十七人矣臣所以來者欲滿其數耳臣非畏死人也走入白之茅焦邑子同食者盡負其衣物行亡使者入白之皇帝}
  - {type: page-break, offset: 943, content: '', id: KR3k0012_SBCK_455-3a}
  - {type: variant, offset: 943, length: 0, content: '', WYG: 諫又曰秦始皇帝太后不謹幸郎嫪毒封以為長信侯為生兩子毒專國事浸益驕奢與侍中左右貴臣俱博飲酒醉爭言而鬭瞋目大叱曰吾乃皇帝之假父也窶人子何敢乃與我抗所與鬭者走行白皇帝皇帝}
  - {type: variant, offset: 943, length: 0, content: '', krp: 諫又曰秦始皇帝太后不謹幸郎嫪毒封以爲長信侯爲生兩子毒專國事浸益驕奢與侍中左右貴臣俱博飲酒醉爭言而鬪瞋目大叱曰吾乃皇帝之假父也窶人子何敢乃與我抗所與鬪者走行白皇帝皇帝太怒毒懼誅因作亂戰咸陽宫敗始皇乃取毒四支車裂之取其兩弟囊撲殺之諌而死者二十七人矣齊客茅蕉乃徃上謁曰齊客茅蕉願上諫皇帝皇帝使使者出問客得無以太后事諌也茅蕉曰然使者還白曰果以太后事諌皇帝曰走徃告之若不見闕下積死人耶使者問茅焦茅焦曰臣聞之天有二十八宿今死者巳有二十七人矣臣所以來者欲滿其數耳臣非畏死人也走入白之茅焦邑子同食者盡負其衣物行亡使者入白之皇帝}
