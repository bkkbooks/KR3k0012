  - {type: variant, offset: 8, length: 0, content: '', SBCK: 五鍾離意別傳曰孝明帝作北宫意復諫曰頃天旱不􅀨陛下躬自勑責避正殿之榮今日􅀨而不濡豈政有改耶是天威未消也愚以爲可命大匠止功作諸室減省不急以助時氣奏聞有詔曰朕之不德敢不如教即日中沛然大􅀨列女傳曰魏曲沃負者魏曲沃大夫如耳之母也曲沃邑也魏哀王爲太子納妃而將自納焉負謂如耳曰王亂於不別何故不匡之如耳未遇閑會使於齊未值王之清閑而受使行也負因詣王門請見曰妾聞男女之別國之大節也婦人脆於志窳於心不可以邪開脆窳不堅固不冝以邪事開誘也是故十五而笄二十而嫁早成其號謚所以就之號謚笄嫁之名聘則爲妻奔則爲妾所以開善遏􅁋也節成然後許嫁親迎而後隨貞女之義也今大王爲太子求妃匹而自納之此毀貞女之行而亂男女之別妾恐王之國危也王曰然寡人不知也遂與太子而賜負粟三十鍾六石}
  - {type: page-break, offset: 8, content: '', id: KR3k0012_SBCK_455-1b}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 五鍾離意别傳曰孝明帝作北宫意復諫曰頃天旱不雨陛下躬自勅責避正殿之榮今日雨而不濡豈政有改耶是天威未消也愚以為可命大匠止工作諸室減省不急以助時氣奏聞有詔曰朕之不徳敢不如教即日沛然大雨列女傳曰魏曲沃負者魏曲沃大夫如耳之母也曲沃邑也魏哀王為太子納妃而將自納焉負謂如耳曰王亂於不别何故不匡之如耳未遇閒㑹使於齊未值王之清閒而受使行也負因詣王門請見曰妾聞男女之别國之大節也婦人脆於志窳於心不可以邪開脆窳不堅固不宜以邪事開誘也是故十五而笄二十而嫁早成其號諡所以就之號諡笄嫁之名聘則為妻奔則為妾所以開善遏淫也節成然後許嫁親迎而後隨貞女之義也今大王為太子求配匹而自納之此毁貞女之行而亂男女之别妾恐王之國危也王曰然寡人不知也遂與太子而賜負粟三十鍾六石}
