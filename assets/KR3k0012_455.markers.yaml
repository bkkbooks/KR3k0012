  - {type: variant, offset: 493, length: 306, content: 忘返伶人王洛叩馬諫曰若禍起須臾變在不測者其如宗廟何其如太后何堅曰善哉昔文公悟愆於虞人朕聞罪於王洛吾過也崔鴻前涼錄曰張天錫元日與嬖褻飲既不受群寮朝賀又不朝於永訓宮從事郎中張慮輿櫬切諫不納又曰張駿讌群臣于閑豫堂議欲嚴刑峻制眾咸以為宜參軍黃斌進曰臣未見其可若尊親犯令不行矣駿性嚴猛乃棄几改容曰微黃生吾不聞過矣黃生可謂忠之至也後魏書曰高允為中書令武帝禁封良田人無農多游者允上䟽諫曰臣少也賤所知唯田請以農事言之夫地方十里為田三頃六十畝百里為田三萬六十頃若勤之則畝增三斗墯之則畝減三斗百里之內損益之率為粟可知矣況天下之廣乎若戶有私儲則國無陰陽之眚上從之三年而國霸又曰元昭業為諫議大夫莊帝將畋洛南昭業叩馬諫止帝避之而過後詔勞勉, SBCK: 儒死}
