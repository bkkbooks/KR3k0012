  - {type: variant, offset: 3920, length: 0, content: '', SBCK: 夀弊無窮之樂保萬乗之􅀔不出反掌之易以居泰山之安乃欲乗累􅆑之危走上天之難此愚臣之所大惑也人生有畏其影而惡其迹者乃背而走無益也不如就隂而止影㓕迹絶欲人勿聞莫􅀂勿言欲人勿知莫􅀂勿爲欲湯之冷令一人炊之百人􅀭之無益也不如絶薪止火而巳不絶之於彼而救之於此譬猶抱薪救火也故武王諤諤而昌紂嘿嘿而亡君無諤諤之臣父無諤諤之子兄無諤諤之弟夫無諤諤之婦士無諤諤之友其亡可待故}
  - {type: variant, offset: 3920, length: 0, content: '', WYG: 夀弊無窮之樂保萬乘之勢不出反掌之易以居㤗山之安乃欲乘累卵之危走上天之難此愚臣之所大惑也人生有畏其影而惡其迹者乃背而走無益也不如就隂而止影滅迹絶欲人勿聞莫若勿言欲人勿知莫若勿為欲湯之冷令一人炊之百人揚之無益也不如絶薪止火而已不絶之於彼而救之於此譬猶抱薪救火也故武王諤諤而昌紂嘿嘿而亡君無諤諤之臣父無諤諤之子兄無諤諤之弟夫無諤諤之婦士無諤諤之友其亡可待故}
