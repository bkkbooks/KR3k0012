  - {type: variant, offset: 2832, length: 463, content: 左授陵州刺史又曰德宗嘗泛舟魚藻宮張水戲命皇太子昇舟舟具皆飾以金碧丹青使婦人盛飾操篙楫行舟光彩映燭絲竹歌謳俱發德宗顧謂上曰今日如何上對曰極盛退因以奢為諫德宗不悅又曰杜希全積功至朔方軍節度使嘗獻體要八章多所規諫德宗深納之乃著君臣箴以賜之又曰憲宗元和中有五坊使犯法上將宥之裴度懇論不已時方征鄆冀上曰五坊是小事今日與卿要商量用兵度奏曰山東叛逆不過亂數州五坊使橫暴將亂輦下上怒起入見諸中人曰使我羞見宰相遂殺五坊使京師肅然天下望風而理又曰鎮州王承宗之叛憲宗將以吐突承瓘為招討處置使呂元靖與給事中穆質兵部侍郎許孟容等八人抗論不可且曰承瓘雖貴寵然內臣也若為師總兵恐不為諸將所伏指喻明切憲宗納之為改使號然猶專戎柄又曰李絳嘗因浴堂北廊奏對違忤上旨指切時病及論中官縱恣方鎮進獻事宜上怒甚厲聲曰卿所論事何太過耶絳前論不已曰臣所陳豈臣身之利是國家之利陛下不以臣愚使處腹心之地豈可見事虧聖德致損清時而惜身不言仰屋竊歎是臣負陛下也若不顧患禍盡誠奏論旁忤倖臣上犯聖旨以此獲罪是陛下負臣也且臣與內官素不相識又無嫌隙只是威福大盛上損聖明臣所以不敢不論耳使臣緘默非, SBCK: ''}
