  - {type: variant, offset: 698, length: 0, content: '', SBCK: 德率户四萬三千車二萬七千乗自鄴徙滑臺􅀺陽魏軍垂至三軍危懼欲堡據􅀺陽昬日流澌冰合是夜濟訖冰亦㝷消德大恱改􅀺陽津爲天橋津德入滑臺趙王}
  - {type: variant, offset: 698, length: 0, content: '', krp: 德率户四萬三千車二萬七千乗自鄴徙滑臺黎陽魏軍垂至三軍危懼欲堡據黎陽昬日流澌冰合是夜濟訖冰亦㝷消德大恱改黎陽津爲天橋津德入滑臺趙王}
  - {type: variant, offset: 699, length: 0, content: '', SBCK: 等九十八人上言今中山傾䧟龍都蕭條趙魏遺􅀺鵠企皇澤伏願仰承俯順以安宗廟謹上皇帝尊號德許之令曰今假順來議且依燕元故事統符行帝制奏詔而巳改永康三年爲元年大赦殊死巳下置百官封進有差寳自龍城南奔至􅀺陽城西數里伏于河西遣中黃門趙思告北地王鍾曰上以去二月得丞相表即自南征叚速骨作逆于乙連今失據來此呼丞相奉迎鍾馳使白狀寳遣思之後}
