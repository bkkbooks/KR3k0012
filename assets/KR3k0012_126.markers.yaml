  - {type: variant, offset: 707, length: 0, content: '', SBCK: 乞活壍至是復叛稱􅁗王德留撫軍魯陽王和守滑臺德率衆攻廣斬之和長史李辨殺和以滑臺降魏德曰符廣雖平撫軍失據進有強敵退無所託計將安出尚書潘聦曰滑臺四通八逹非帝王之居青齊沃壤號曰東􅁗地方二千里戸餘十萬四塞之固可謂用武之國德猶預未決}
