  - {type: variant, offset: 46, length: 0, content: '', SBCK: 武公四年六月􅁗遣授河右諸軍事涼州刺史鎮姑臧七月醼羣寮于宣德堂仰視而歎曰古人言作者不居居者不作信矣前昌松太守孟禕進曰張文王築城􅁐繕宫廟構此堂爲貽厥之資萬丗之業􅁗師濟河漼然瓦解此堂之建年垂百載十有三主唯信順可以乆安仁義可以永固願大王勉之檀曰非君無以聞讜言也八月以鎮南大將軍文攴鎮姑臧檀遷于樂都雖受制於􅁗車服禮制一如王者十一月遷于姑臧嘉}
