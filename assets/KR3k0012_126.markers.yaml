  - {type: variant, offset: 1635, length: 102, content: 名內實惡而改之尋以讖記之文去夬以垂為名稱尊號封吳王建熙十年以車騎大將軍敗桓溫於枋頭威名大震太傅上庸王評深忌之垂遂出奔秦符堅聞垂至大悅郊迎執手禮之甚重王猛惡垂雄略勸堅殺之堅不從以為冠軍將軍封賓都侯歷京兆尹符, WYG: 副}
