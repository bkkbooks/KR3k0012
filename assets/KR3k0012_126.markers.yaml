  - {type: 'tls:seg', offset: 74, content: '', id: KR3k0012_CHANT_126-1a.17}
  - {type: variant, offset: 76, length: 1, content: 歲, SBCK: 一月僣即涼王位於南郊大赦改年嘉平置百官立丗子虎臺爲太子二年正月以子明德歸爲南中郎將領昌松太守歸儁爽聦悟檀甚寵之年始十三命爲昌髙殿賦援筆即成影不移漏檀覽而善之擬之曹子建七年傉檀議欲西征乙弗孟愷諌曰連年不収上下飢􅁦南逼熾盤北迫􅂪遜今逺征雖尅後患必􅀷傉檀曰􅀌將略地卿無沮衆謂其太子武臺曰今不種多年内俱窘事宜西行以拯此􅁦蒙逰近去不能卒來旦夕所慮唯在熾盤彼名微衆寡易以討禦吾不過一月自足周旋汝謹守樂都無使失墜傉檀乃率􅀐七千西襲乙弗大破之􅀗牛馬羊四十餘萬熾盤乗虗來襲一旦而城潰安西樊尼自西平奔告傉檀傉檀謂衆曰今樂都爲熾盤所䧟卿等能}
  - {type: page-break, offset: 76, content: '', id: KR3k0012_SBCK_126-3a}
  - {type: variant, offset: 76, length: 0, content: '', krp: 一月僣即涼王位於南郊大赦改年嘉平置百官立丗子虎臺爲太子二年正月以子明德歸爲南中郎將領昌松太守歸儁爽聦悟檀甚寵之年始十三命爲昌髙殿賦援筆即成影不移漏檀覽而善之擬之曹子建七年傉檀議欲西征乙弗孟愷諌曰連年不収上下飢弊南逼熾盤北迫蒙遜今逺征雖尅後患必深傉檀曰孤將略地卿無沮衆謂其太子武臺曰今不種多年内俱窘事宜西行以拯此弊蒙逰近去不能卒來旦夕所慮唯在熾盤彼名微衆寡易以討禦吾不過一月自足周旋汝謹守樂都無使失墜傉檀乃率騎七千西襲乙弗大破之獲牛馬羊四十餘萬熾盤乗虗來襲一旦而城潰安西樊尼自西平奔告傉檀傉檀謂衆曰今樂都爲熾盤所䧟卿等能與吾藉乙弗之資取契汗以贖妻子者所望也遂引師而西衆多逃反遣鎮北叚荀追之荀亦不還於是將士皆散傉檀曰熾盤昔委質於吾今而歸之不亦鄙乎四海之廣無所容其身何其痛哉吾老矣寧見妻子而死遂歸熾盤六月至西平盤遣使郊迎以上賔之禮}
