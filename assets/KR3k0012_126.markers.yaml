  - {type: variant, offset: 19, length: 1, content: 呂, WYG: 秃髪烏孤河西鮮卑人也八世祖疋孤率其部自塞北遷于河西疋孤卒子夀闐立夀闐卒孫樹機能立壮果多謀畧太始中殺秦州刺史胡列于萬斛堆敗凉州刺史蘇愉于金山又殺凉州刺史楊欣于舟嶺盡有凉州之地武帝為之旰食能死從弟務丸立丸死丸孫推斤立斤死子思復鞬立部衆轉盛遂據凉土鞬卒子烏孤襲位養民務農循結隣好吕}
