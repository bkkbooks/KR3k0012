  - {type: variant, offset: 4293, length: 218, content: 國春秋後燕錄曰慕容雲字子雨寶之養子祖父和高勾麗之支庶自云高陽氏之苗裔故以高為氏寶之為太子雲以武藝給侍東宮永康初拜侍御郎以疾去官及熙葬后馮躍詣之告以大謀雲懼躍等強之四月即天王位復姓高氏大赦改建始元年為正始元年國仍號大燕以馬躍為侍中中外都督錄尚書事武邑公二年慕容歸為遼東公主燕之宗祀三年冬十月雲臨東堂幸臣離班桃仁懷劍執紙而入稱有啟抽劍擊雲雲以几拒班桃仁進而殺之推立馮氏為主躍即位謚為懿惠皇帝始垂以丙戍之歲建號中山馮躍即位之歲歲在己酉二十四年, SBCK: ''}
