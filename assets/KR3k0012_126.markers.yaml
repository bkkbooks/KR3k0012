  - {type: variant, offset: 59, length: 109, content: 武中生於方頭夜有神光之異故名焉年十歲與諸童兒遊戲邑里為戰陣之法童兒咸推為主長而身長八尺四寸目重童子左肘有肉印沉粹疑重寬簡有大量人莫之知唯王猛異之曰此非常人言之符堅舉賢良除美陽令民夷憚愛鄰境肅清遷鷹揚將軍以功賜爵關內侯建, WYG: 和}
