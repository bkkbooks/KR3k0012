  - {type: variant, offset: 21, length: 6, content: 字世明略陽人, SBCK: 進封􅀌廣武郡公益州牧左賢王太􅀄元年正月改元自稱大將軍大單于西平王以弟鹿􅀌爲驃􅀐將軍傉擅爲車􅀐將軍二年改稱武威王三年正月徙治樂都八月􅀌因酒走馬馬倒傷脇􅀏曰幾使吕光父子大喜俄而患甚頋謂羣臣曰方難未靖冝立長君言終而薨謚武王廟號烈祖晉書曰秃髪烏􅀌}
  - {type: variant, offset: 21, length: 6, content: 字世明略陽人, WYG: 封烏孤廣武郡公益州牧左賢王太初元年正月改元自稱大将軍大單于西平王以弟利鹿孤為驃騎将軍傉檀為車騎将軍二年改稱武威王三年正月徙于樂都八月孤因酒走馬馬倒傷脇笑曰幾使吕光父子大喜俄而患甚顧謂羣臣曰方難未靖宜立長君言終而薨在王位三年偽諡武王廟號烈祖晉書曰秃髪烏孤}
