  - {type: variant, offset: 32, length: 0, content: '', krp: 于河西其地東至麥田牽屯西至顯羅南至澆河北接大漠疋孤子壽闐之在孕母胡掖氏因寢而産於𬒳中鮮卑謂𬒳爲秃髪因而氏焉秃髪利鹿孤崔鴻十六國春秋南涼録曰利鹿孤烏孤弟太𥘉三年八月即位大赦改治西平建和元年正月大赦改年延耆老訪政治二年羣臣固請即尊號不許乃僣稱河西王三年三月寢疾令曰昔我諸兄弟傳位非子者蓋以泰伯三讓周道以興故也武王創踐寳暦垂諸樊之試終能克昌家業者其在車騎乎吾寢疾惙頓是將不濟内外多虞國機務廣其令車騎經惣百揆以成先王之志薨謚康王葬西平陵秃髪傉檀崔鴻十六國春秋南涼録曰傉檀利鹿孤弟也少機警有才}
