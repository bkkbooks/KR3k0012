  - {type: variant, offset: 832, length: 1, content: 紹, WYG: 武臺曰今不種多年内外俱窘事宜西行以拯此弊蒙遜近去不能卒來旦夕所慮唯在熾磐彼名㣲衆寡易以討禦吾不過一月自足周旋汝謹守樂都無使失墜傉檀乃率騎七千西襲乙弗大破之獲牛馬羊四十餘萬熾磐乘虛來襲一旬而城潰安西樊泥自西平奔告傉檀傉檀謂衆曰今樂都}
