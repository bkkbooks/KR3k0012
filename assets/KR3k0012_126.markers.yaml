  - {type: variant, offset: 169, length: 316, content: 十九年以光為使持節西討諸軍率將軍姜飛彭晃杜進等步騎七萬討西域十二月至龜茲龜茲王帛純捍命不降光軍其城南五里為一營深溝高壘廣設疑兵為木被甲羅之壘上以為持久之計二十年五月帛純乃傾財寶請救於獪胡獪胡王遣弟率二十餘萬救之胡便弓馬善矛槊鎧如連鏁射不可入乃以革索為骨策馬擲人多有中者眾甚憚之姑默宿尉頭等國及諸胡外內七十萬人光遷營相接陣為勾鏁之法精騎為遊軍彌縫其闕秋七月戰于城西大敗之帛純逃奔王侯降者三十餘國進入其城城有三重廣輪與長安地等城中塔廟千數帛純宮室壯麗煥若神居胡人奢侈富於生養家有蒲桃酒至千斛經十年不敗士卒淪沒酒藏者相繼諸國貢款屬路立帛純弟震為王以安之光撫寧西域威恩甚著秦以光為使持節散騎常侍王門巴西諸軍事安西將軍西域校尉進封順鄉侯二十一, WYG: ''}
