  - {type: variant, offset: 747, length: 0, content: '', SBCK: 三月德如齊城登營丘望見晏嬰塜頋左右曰禮大夫不逼城葬平仲古之一賢人逹者而生居近市死葬近城豈有意乎青州秀才晏謨對曰孔子稱臣先人平仲賢矣豈不知髙其梁豐其禮蓋政在家門故儉以矯丗存居湫隘卒豈擇地而葬乎所以不逺門者猶冀悟平生意也德恱之三月以太牢祀漢城陽景王廟遂北登社首山東望鼎足因目牛山問謨以齊之山川賢哲故事謨暦對詳辨畫地成圖德􅀷嘉之拜尚書郎五年二月夜地震在栖之雞皆驚擾飛散三月德疾動經旬幾於不振㑹前尚書右丞曹黙自冀州來奔以白酒解之乃瘳以黙爲御史中丞封永熈侯六年正月兄子超自􅁗還}
