  - {type: variant, offset: 2248, length: 383, content: 寶為燕王太子攻拔鄴郛丕固守中城垂壍而圍之於魏郡肥鄉築新興以置輜重進師攻鄴開其西奔之路二年三月丕棄鄴奔并州以魯陽王和為南中郎將鎮鄴十二年垂定都中山建興元年正月群寮勸垂正尊號辛卯僭即皇帝位於南郊大赦改元立子寶為皇太子十年五月太子寶率眾八萬伐魏范陽王德為之後繼魏聞寶將至徙于河西寶臨河不敢濟引師還次於參合俄而魏軍大至三軍奔潰寶與德等數千騎奔免十一年三月垂大眾出參合太子寶出天門垂至參合見積骸如山設祭吊之死者父兄各皆號哭軍中哀慟垂慚憤嘔血因而寢疾築燕昌城而還寶等至雲中聞垂疾皆引歸及垂于平城夏四月薨于上谷俎陽年七十一謚武成皇帝廟號世祖晉書曰垂以太元二十一年死在位十三年墓曰宣平陵慕容寶崔鴻十六國春秋後燕錄曰慕容寶字道祐垂第四子元璽四年生于信都少輕果無志操好人佞己叚后謂垂曰太子姿質雍容柔而不斷非濟世之雄遼西高陽陛下兒之賢者宜擇一樹之垂不納謂曰汝謂我為晉獻公乎建興十一年四月僭, SBCK: 巳未僣}
