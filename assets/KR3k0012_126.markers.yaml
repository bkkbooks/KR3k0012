  - {type: variant, offset: 1476, length: 730, content: 萬隨難東遷既至長安秦以隆為散騎常侍尚書公如故超為安定太守其後坐與兆興少子廣平公弼謀反誅呂光以乙酉歲據涼州至于是歲歲在癸卯凡一十九年後燕慕容垂崔鴻十六國春秋後燕錄曰慕容垂字道明皝第五子小字阿六敦母蘭淑儀垂少有器度長七尺七寸手垂過膝皝甚寵之常曰此兒闊達好奇終能破人家或能成人家故名霸字道業因墜馬傷前二齒後改名𡙇外以慕郤𡙇為名內實惡而改之尋以讖記之文去夬以垂為名稱尊號封吳王建熙十年以車騎大將軍敗桓溫於枋頭威名大震太傅上庸王評深忌之垂遂出奔秦符堅聞垂至大悅郊迎執手禮之甚重王猛惡垂雄略勸堅殺之堅不從以為冠軍將軍封賓都侯歷京兆尹符堅敗於淮南垂軍獨全堅以千餘騎奔之世子言於垂曰家國傾喪皇綱廢弛當隆中興之業建少康之功宜恭承皇天之意因而取之垂曰彼悉心投命若何害之乃以兵屬垂垂至澠池言於堅曰王師不利北境之民或因此輕動臣請奉詔輯寧朔裔且龍鄴舊都陵廟所在乞過展拜以申罔極堅許之權翼諫曰垂瓜牙名將今之韓白且世豪東夏志不為人下頃避禍歸誠非慕義也而恐冠軍之號不飽其志列地百里未滿其心且垂猶鷹也飢則附人飽便高颺遇風塵之會必有凌霄之志堅曰卿言是也但朕已許之匹夫猶重信況萬乘之主乎翼曰陛下重小信而輕忽社稷臣見其往不見其還關東之變垂其首乎自涼馬臺結草筏而渡至安陽脩牋於長樂公丕垂至館之於鄴西會符暉告丁零翟斌聚眾四千謀逼洛陽丕於是配垂兵二千遣廣武將軍符飛龍率氏騎一千為垂之副貳戒飛龍曰垂為三軍之統卿為垂之謀主符暉告急簡書相尋垂方圖飛龍停河內不進悉誅氐兵命左右殺飛龍濟河焚橋眾三萬至洛陽符暉閉門拒守不與交通翟斌率眾會垂勸稱尊號垂曰新興侯國之正統孤之君也若以諸君之力得平關東當以大義喻秦奉迎反正誣上自尊非孤心也乃自稱大將軍燕王承制行事翟斌為建義將軍封河南王弟德為范陽王眾至二十萬濟自石門長驅攻鄴元年正, SBCK: ''}
