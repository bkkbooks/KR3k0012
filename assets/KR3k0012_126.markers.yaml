  - {type: variant, offset: 1670, length: 369, content: 敗桓溫於枋頭威名大震太傅上庸王評深忌之垂遂出奔秦符堅聞垂至大悅郊迎執手禮之甚重王猛惡垂雄略勸堅殺之堅不從以為冠軍將軍封賓都侯歷京兆尹符堅敗於淮南垂軍獨全堅以千餘騎奔之世子言於垂曰家國傾喪皇綱廢弛當隆中興之業建少康之功宜恭承皇天之意因而取之垂曰彼悉心投命若何害之乃以兵屬垂垂至澠池言於堅曰王師不利北境之民或因此輕動臣請奉詔輯寧朔裔且龍鄴舊都陵廟所在乞過展拜以申罔極堅許之權翼諫曰垂瓜牙名將今之韓白且世豪東夏志不為人下頃避禍歸誠非慕義也而恐冠軍之號不飽其志列地百里未滿其心且垂猶鷹也飢則附人飽便高颺遇風塵之會必有凌霄之志堅曰卿言是也但朕已許之匹夫猶重信況萬乘之主乎翼曰陛下重小信而輕忽社稷臣見其往不見其還關東之變垂其首乎自涼馬臺結草筏而渡至安陽脩牋於長樂公丕垂至館之於鄴西會符暉告丁零翟斌聚眾四千謀逼洛陽丕於是配垂兵二千遣廣武將軍符飛龍率氏騎, krp: 司隷校尉開府置佐十}
