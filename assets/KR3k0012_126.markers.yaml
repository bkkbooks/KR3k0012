  - {type: variant, offset: 3543, length: 735, content: 也慕容熙崔鴻十六國春秋後燕錄曰慕容熙字道文一名長生垂之少子燕元二年生于常山建興八年封河間王永康初隨寶奔龍城拜司隸校尉長樂元年遷僕射中外督領昌黎尹盛薨遂僭即皇帝位大赦改長樂三年為光始元年二年正月熙引見州郡耆舊于東宮問以民所疾苦司隸部民劉瓚對問稱旨拜帶方太守是春大治宮室四月立符貴人為昭儀五月築龍騰苑廣十里餘役徒二萬起景雲山于苑內又起逍遙宮甘露殿連房數百觀閣相交鑿天河渠引水入宮又為符昭儀鑿曲光海清涼池季夏暑熱士卒不得休息𣎅死者半四年二月昭儀符氏卒符貴嬪為皇后九月符后遊畋熙從之北登白鹿山東過青嶺南臨滄海冬十一月乃還百姓苦之士卒為虎狼所害及凍死者五十餘人五年十月擬鄴之鳳陽作弘光門累級三層建始元年正月大赦天下三月太史丞梁延年夢月化為五白龍夢中占之曰月臣也龍君也月化為龍當有臣為君寤而告人曰國祚其將盡乎是日符后起承華殿高承光一倍負土於北門土與穀同價典軍杜靜載棺詣闕上書諫熙大怒斬之后嘗季夏思凍魚鱠冬須生地黃皆下有司切責不得加以大辟四月符后卒熙悲號躃踊若喪考妣擁其尸而撫之曰體已就冷命遂斷矣於是僵仆絕息久而乃蘇服斬縗食粥百寮宮內設位哭臨有司桉檢哭者有淚則不無淚則加罪群臣振懼莫不含辛以為淚高陽王妃張氏熙之嫂也美姿容熙欲以為殉乃毀其禭鞾中有弊氈遂賜死三女叩頭求哀熙弗許營陵周輪數里下固三泉內圖畫尚書八座之像熙曰善為之朕將隨后入此陵轜車高大毀北門而出中衛將軍馮躍左衛將軍張興先皆坐事亡奔以熙政之虐也與躍從兄萬泥等三十二人結盟推夕陽公慕容雲為主發尚方徒五千人分屯四門入宮授甲閉門拒守中黃門趙洛生奔告熙熙曰此鼠盜耳朕還當誅之乃收髮貫甲馳還赴難夜至龍城攻北門不剋遂入龍騰苑左右潰散熙微服逃于林中為人執送雲等殺之年二十三雲葬之徽平陵謚曰昭文皇帝晉書曰垂以孝武帝太元八年僭立至熙四世凡二十四年, SBCK: 􅀄德}
  - {type: variant, offset: 3543, length: 47, content: 也慕容熙崔鴻十六國春秋後燕錄曰慕容熙字道文一名長生垂之少子燕元二年生于常山建興八年封河間王永康, WYG: ''}
