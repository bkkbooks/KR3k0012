  - {type: variant, offset: 2860, length: 393, content: 年二月寶發龍城以撫軍慕容騰為前軍步騎三萬將南伐次于乙連長上叚速骨宋赤眉因民之憚遠役殺司空樂浪王宙眾既幸亂投伏奔走寶馳還龍城又與長樂王盛等南奔尚書蘭汗殺速骨等十餘人奉太子榮承制大赦遣迎寶還于薊寶欲北還盛等咸以汗忠款虛實未明宜就范陽王德寶從之乃自薊而南四月寶至鄴鄴中遺民固請留之寶不從南至黎陽城西聞范陽王德稱制懼而退乃還龍城次于廣都蘭汗又遣左將軍蘇超迎寶具申款誠忠節無差寶於是命發汗遣弟難率五百騎逆寶至龍城難引寶入于外邸殺之年四十四殺太子榮及王公卿士百餘人汗自稱大將軍大單于昌黎王號年青龍七月長樂王盛襲誅汗盛即位偽謚寶惠愍皇帝廟號列宗慕容盛崔鴻十六國春秋後燕錄曰慕容盛字道運寶之庶長子秦建元十年生于長安二十年符堅誅慕容氏盛奔東歸至垂問以西事畫地成圖垂笑謂之曰昔魏撫明帝之首遂乃侯之祖之愛孫有由來矣於是封長樂公建興六年領北中郎鎮薊進爵為王及寶為蘭難所殺盛馳赴哀盛潛結大眾謀討難及汗等斬之建平元, SBCK: ''}
