  - {type: variant, offset: 882, length: 491, content: 趙王使廉頗禦之頗固壁不戰趙王惑秦之間以趙奢之子代頗趙師大敗後漢書曰光武遣馮異代鄧禹車駕送之河南賜以乘輿七尺具劍具謂以寶玉裝飾之東觀記作玉具劍晉書曰石苞為淮北監軍王琛所奏與吳人交通先時望氣者云東南有大兵起及琛表至帝甚疑之會荊州刺史胡烈表吳人欲大出為寇苞亦聞吳師將入至乃築壘遏水以自固帝聞之謂羊祜曰吳人每來常東西相應豈石苞果有不順乎祜深明之而帝猶疑焉命苞子喬為尚書郎上召之經日不至帝謂為必叛欲封而隱其事遂下詔以苞不料賊勢築壘遏水勞擾百姓策免其官遣太尉義陽王望率其大軍徵之以備非常又勑鎮東將軍琅邪王伷自下邳會壽春苞用掾孫鑠計放兵步出住都亭待罪帝聞之意解及苞詣闕以公還第苞自恥受任無効而無怨色又曰鎮南將軍杜元凱都督荊州諸軍事襲吳西陵督張政西陵今夷陵郡大破之政吳之名將據要害之地恥無備取敗不以實聞于孫皓元凱欲間吳邊將乃請還其所獲之眾於皓皓果召政遣武昌監劉憲代之故晉軍將至使將帥移易成傾蕩之勢竟殄滅焉北史曰後周末隋文帝作相尉遲逈據相州舉兵隋文遣鄖公韋孝寬鄖音云為東道元帥師次沁水水漲兵未得渡吏李詢上密啟云大將梁士彥宇文欣崔弘度等並受尉遲逈饟金軍中慅慅人情大異文帝以為憂欲代此三人李德林獨進計云公, SBCK: 行}
