  - {type: variant, offset: 639, length: 242, content: 避罪唯民是保利合於主上將之道也如此則智者為之慮勇者為之鬭氣厲青雲疾如馳騖是故兵未交接而敵人恐懼若戰勝敵奔賞吏遷官顧反於國効旗以入乃縞素辟舍請罪於君君曰赦之大勝三年反舍大勝敵者還三年乃反故舍中勝二年不勝期年兵之所加者必無道之國也故能戰勝而不報取地而不反民不疾疫將不夭死五榖豐風雨時節戰勝於外福生於內是故名必成而後無餘害矣任彥昇奏彈曹景宗曰昔漢光命將坐知千里魏武置法案以從事陳孔璋檄吳將校部曲文曰朝為仇虜夕為上將馮衍與田邑書曰今以一節之任建三軍之威豈特寵其八尺之竹氂牛之尾也易將史記曰秦師, SBCK: ''}
