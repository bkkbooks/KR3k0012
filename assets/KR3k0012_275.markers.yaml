  - {type: variant, offset: 1656, length: 282, content: 李將軍果斷壯勇其言是也王翦因謝疾歸老於潁陽李信攻鄢郢破之於是引兵而西與蒙恬會城父荊人因隨之三日三夜不得頓舍大破李信軍始皇聞之大怒自馳如潁陽謝翦曰不用將軍計李信果辱秦將軍獨忍棄寡人乎翦謝曰老臣罷病悖亂唯大王更擇賢將始皇謝曰已矣將軍勿復言王翦曰大王必不得已用臣非六十萬人不可始皇曰聽將軍計耳於是王翦將六十萬人始皇自送灞上王翦行請美田宅園池甚眾始皇曰將軍行矣何憂貧乎翦曰為大王將有功不得封侯故及大王之向臣臣亦及時以請園池為子孫業耳始皇大笑或曰將軍乞貸亦已甚矣翦曰今空秦國甲士專委我我不多請田宅為子孫業以自堅固令秦王坐而疑我耶翦東代信擊荊大破荊軍虜荊王負芻竟平荊地為郡縣漢, SBCK: 􅀽折崧}
