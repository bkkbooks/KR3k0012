  - {type: variant, offset: 2333, length: 1, content: 臣, SBCK: 朱伺字仲文安陸人少爲吴牙門將陶丹給使吴平徙江夏伺有武勇訥口不知書爲郡將督見郷里士大夫揖稱名而已及爲將遂以謙恭稱又曰鄧遐字應逺勇力絶人氣蓋當時人方之樊噲桓温以爲叅軍數從温征伐歴冠軍將軍數郡太守號爲名將襄陽城北􅃆有蛟常爲人害遐拔劒入水蛟繞其足遐揮劒截蛟數叚而岀又曰劉牢之面紫赤色􅂡目驚人而沉毅多計畫于寳晉紀曰文淑字次騫小名鴦有武力筭䇿楊休胡烈爲虜所害武帝西憂遣淑出征所向摧靡秦涼遂平名震天下爲東夷校尉姿器膂力萬人之雄慕容盛載記曰}
  - {type: page-break, offset: 2333, content: '', id: KR3k0012_SBCK_275-6a}
  - {type: variant, offset: 2333, length: 1, content: 臣, WYG: 朱伺字仲文安陸人少爲呉牙門將陶丹給使呉平徙江夏伺有武勇訥言不知書爲郡將督見郷里士大夫揖稱名而已及爲將遂以謙恭稱又曰鄧遐字應遠勇力絶人氣蓋當時人方擬之樊噲桓溫以爲叅軍數從溫征伐厯冠軍將軍數郡太守號爲名將襄陽城北池有蛟常爲人害遐㧞劔入水蛟繞其足遐揮劔截蛟數段而出又曰劉牢之靣紫赤色赤目驚人而沈毅多計畫干寳晉紀曰文淑字次騫小名鴦有武力籌䇿楊休胡烈爲虜所害武帝西憂遣淑出征所向摧靡秦凉遂平名震天下爲東夷校尉姿器膂力萬人之雄慕容盛載紀曰}
