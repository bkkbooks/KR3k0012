  - {type: variant, offset: 2477, length: 0, content: '', SBCK: 衆輕舸掩襲巴陵晨至城下驃􅀐始命諸將㑹議乃出自壘門坐胡床以望之賊乗水來攻矢下如􅀨人情搔擾莫不震懼而驃􅀐方食甘蔗曽無遽色又曰齊遣其將竇太趂潼􅀜太祖將襲秦衆咸難之太祖問䇿於宇文深深對曰竇氏歡之驍將也歡毎伏之以爲禦侮北齊書曰劉豊本出河間樂城豊有雄姿壯氣果毅絶人有口辯好􅀃兵事又曰辛術字懷哲隴西狄道人也清儉寡欲及平楚定淮}
