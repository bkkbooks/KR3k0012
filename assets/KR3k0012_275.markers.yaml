  - {type: variant, offset: 427, length: 210, content: 從此上至天者將軍制之又復操斧持頭授將軍柄曰從此下至淵者將軍制之將以授斧鉞荅曰國不可從外治也軍不可從中御也二心不可以事君疑志不可以應敵臣既以受制於前矣鼓旗斧鉞之威臣無還願君亦無垂一言之命於臣也君若不許臣不敢將君若許之詞而行乃剪爪前長鬋爪送終之禮去其手足爪也設明衣明衣喪衣也在於闇賓故言明鑿凶門而出凶門北出門也將軍之出以喪禮樂之以必死也乘將軍車載旍旗斧鉞其臨敵決戰不顧必死無有二心是故無天於上無地於下無敵於前無主於後進不求名, SBCK: 馮異字公孫爲人謙}
