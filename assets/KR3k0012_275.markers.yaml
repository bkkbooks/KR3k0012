  - {type: variant, offset: 2941, length: 167, content: 十鎮諸軍事搖修鄣塞謹斥堠邊民以安後六載徙為壽州初自以年老乞骸骨上召之既引見上勞之曰公積行累仁歷仕三代克終富貴保茲遐壽良足善也賜坐褥歸於第歲餘終于家又曰賀若誼為涇州刺史時突厥屢為邊患朝廷以誼素有威名拜靈州刺史進位柱國誼時年老而筋力不衰猶能重鎧上馬為北夷所憚數載上表乞骸骨優詔許之誼家富於財郊外搆一別廬多植果木每邀賓客列女樂遊集其間卒于家, SBCK: ''}
