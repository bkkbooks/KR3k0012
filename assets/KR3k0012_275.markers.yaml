  - {type: variant, offset: 2333, length: 1, content: 臣, krp: 朱伺字仲文安陸人少爲吴牙門將陶丹給使吴平徙江夏伺有武勇訥口不知書爲郡將督見郷里士大夫揖稱名而已及爲將遂以謙恭稱又曰鄧遐字應逺勇力絶人氣蓋當時人方之樊噲桓温以爲叅軍數從温征伐歴冠軍將軍數郡太守號爲名將襄陽城北沔有蛟常爲人害遐拔劒入水蛟繞其足遐揮劒截蛟數叚而岀又曰劉牢之面紫赤色鬚目驚人而沉毅多計畫于寳晉紀曰文淑字次騫小名鴦有武力筭䇿楊休胡烈爲虜所害武帝西憂遣淑出征所向摧靡秦涼遂平名震天下爲東夷校尉姿器膂力萬人之雄慕容盛載記曰}
  - {type: variant, offset: 2335, length: 0, content: '', SBCK: 書左僕射領中軍熈從征句驪契丹皆勇冠諸將又曰皇甫真字楚季弱冠以高才隨慕容評攻鄴都􅈿貨充溢眞一無所取唯存恤人物收圖籍而已二石僞事曰郭權降石虎虎問權曰卿􅀂得吾者當殺不權曰􅀂登時得至尊必殺不疑也虎曰卿徤將也因與共言事崔鴻前燕録曰張蚝夲姓弓上黨人也膂力過人}
