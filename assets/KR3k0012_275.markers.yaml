  - {type: variant, offset: 2284, length: 0, content: '', SBCK: 上自征隗􅅝至􅃮諸侯多以王師之重不冝逺入險阻計未决㑹召}
  - {type: variant, offset: 2284, length: 0, content: '', WYG: 上自征隗囂至漆諸將多以王師之重不宜遠入險阻計未决㑹召援援因說隗囂將帥土崩之勢兵進必破之狀於上前聚米爲山指畫形勢又曰呉漢當出師朝受詔夕即引道初無辦嚴之日故能常任職以功名終又曰漢方整厲器械激揚士吏上時令人視呉公何為還言曰方修攻具上曰呉公隱若一敵國矣魏志曰諸葛亮軍出斜谷至武功司}
  - {type: page-break, offset: 2284, content: '', id: KR3k0012_WYG_275-6a, image: WYG0895/WYG0895-0444c.png}
  - {type: variant, offset: 2284, length: 0, content: '', krp: 上自征隗囂至􅃮諸侯多以王師之重不冝逺入險阻計未决㑹召}
  - {type: variant, offset: 2285, length: 1, content: 援, WYG: 宣王禦之亮挑戰宣王不出亮遺之婦人巾幗宣王怒表請决戰天子不許遣辛毗仗節立於軍門以制之㑹亮病卒歸宣王不敢追之而退百姓爲之語曰死諸葛走生仲逹宣王曰吾能料生不能料死故也宣王案行亮營壘處曰天下竒才也又曰李典}
  - {type: page-break, offset: 2285, content: '', id: KR3k0012_WYG_275-6b, image: WYG0895/WYG0895-0444d.png}
  - {type: punctuation, offset: 2286, content: ，, id: KR3k0012_CHANT_275-bkkpn607}
  - {type: 'tls:seg', offset: 2286, content: '', id: KR3k0012_CHANT_275-15a.4}
  - {type: variant, offset: 2286, length: 0, content: '', SBCK: 因􅀃隗􅅝將帥􅁟崩之勢兵進必破之狀於上前聚米爲山指畫􅅝衆大潰又曰吴漢當出師朝受詔夕即引道􅀄無辦嚴之日故能常任職以功名終又曰吴漢常屬吏士治兵事上時令人視吴公何爲還言曰方脩攻具上曰吴公隱􅀂一敵國矣魏志曰諸􅁑亮斜谷出軍至武功司馬宣王禦之亮挑戰宣王不出亮遺之婦人巾幗宣王怒表請决戰天子不許遣辛毗杖節立於軍門以制之㑹亮病卒歸宣王不敢追之而退百姓爲之語曰死諸􅁑走生仲達宣王曰吾便料死故也宣王案幸亮營壘處曰天下竒才也又曰趙典}
  - {type: page-break, offset: 2286, content: '', id: KR3k0012_SBCK_275-4a}
  - {type: variant, offset: 2286, length: 0, content: '', krp: 因說隗囂將帥土崩之勢兵進必破之狀於上前聚米爲山指畫囂衆大潰又曰吴漢當出師朝受詔夕即引道𥘉無辦嚴之日故能常任職以功名終又曰吴漢常屬吏士治兵事上時令人視吴公何爲還言曰方脩攻具上曰吴公隱若一敵國矣魏志曰諸葛亮斜谷出軍至武功司馬宣王禦之亮挑戰宣王不出亮遺之婦人巾幗宣王怒表請决戰天子不許遣辛毗杖節立於軍門以制之㑹亮病卒歸宣王不敢追之而退百姓爲之語曰死諸葛走生仲達宣王曰吾便料死故也宣王案幸亮營壘處曰天下竒才也又曰趙典}
  - {type: variant, offset: 2287, length: 4, content: 文淵建武, SBCK: 曼成好學問貴儒不與諸將争功敬賢士大夫􅀂不及又任城王傳曰太祖問諸子所好便各言其志至彰曰好爲將又曰劉曄謂太祖曰諸􅁑亮明於治而爲相􅀜羽張飛勇冠三軍而爲將蜀人旣定據險守要則不可犯矣又曰賈逵字梁道河東人自爲兒童戯弄常設部伍祖父習異之曰汝大必爲將率口授兵法數萬言蜀志曰鄧芝爲大將}
  - {type: page-break, offset: 2287, content: '', id: KR3k0012_SBCK_275-4b}
