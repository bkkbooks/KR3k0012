  - {type: variant, offset: 2295, length: 2, content: 威武, SBCK: 賞罰明善䘏卒伍身之衣食資仰於官然終不治私産妻子不免飢寒死之日家無餘財又曰􅀜羽字雲長亡命奔􅃰先主於郷里合徒衆而羽與張飛爲之禦侮晉書曰應詹遷南平太守鎮南}
  - {type: variant, offset: 2295, length: 2, content: 威武, WYG: 賞罰明善恤卒伍身之衣食資仰於官然終不治私産妻子不免饑寒死之日家無餘財又曰關雲長亡命奔涿先主於郷里合徒衆而雲長與張飛爲之禦侮晉書曰應詹遷南平太守鎭南}
  - {type: variant, offset: 2295, length: 2, content: 威武, krp: 賞罰明善䘏卒伍身之衣食資仰於官然終不治私産妻子不免飢寒死之日家無餘財又曰關羽字雲長亡命奔涿先主於郷里合徒衆而羽與張飛爲之禦侮晉書曰應詹遷南平太守鎮南}
  - {type: variant, offset: 2299, length: 3, content: 劉向擊, SBCK: 山簡復假詹督五郡軍事蜀賊杜疇作亂金寳溢目詹一無所取唯􅀵圖書莫不難之又曰周訪威風旣著逺近恱服智勇過人爲中興名將性謙虚未嘗論功伐或問訪曰人有小善鮮不自稱卿功勲如此􅀄無一言何也訪曰朝廷威靈將士用命訪何功之有又曰􅂫峻平論功顧衆推功於蔡謨謨衆唱謨非巳之力俱表相讓論者美之又曰符堅衆號百萬次于淝水謝􅀇入問計謝安無懼色方與􅀇圍碁遊渉至夜乃還指受將帥各當其任􅀇等破堅驛書至安對客圍碁看書便攝放床上了無喜色客問徐荅小兒輩破賊旣罷還内過户限心喜甚不􅁴屐齒之折其矯情鎮物如此也又曰帝謂紀瞻曰卿雖疾病爲朕卧護六軍所益多矣又羊祜傳曰吴人冦戈陽江夏略户口語遣侍臣移書詰祜不追討之意并欲移州復舊之冝祜曰江夏去襄陽八百里皆知賊去亦巳經日矣歩軍方往安能救之哉勞師以免責恐非事冝也昔魏}
  - {type: page-break, offset: 2299, content: '', id: KR3k0012_SBCK_275-5a}
  - {type: variant, offset: 2299, length: 3, content: 劉向擊, WYG: 山簡復假詹督五郡軍事蜀賊杜疇作亂金寳溢目詹一無所取惟收圖書莫不歎之又曰周訪威風既著遠近悅服智勇過人爲中興名將性謙虛未嘗論功伐或問訪曰人有小善鮮不自稱卿功勲如此初無一言何也訪曰朝廷威靈將士用命訪何功之有又曰蘇峻平論功顧衆推功於蔡謨謨以衆唱謀非己之力俱表相讓論者美之又曰苻堅衆號百萬次於淝水謝𤣥入問計謝安無懼色方與𤣥圍棋遊渉至夜乃還指授將帥各當其任𤣥等破堅驛書至謝安對客圍碁看書便擲放床上了無喜色客問徐荅小兒輩破賊既罷還内過戸限心喜甚不覺屐齒之折其矯情鎭物如此也又曰帝謂紀瞻曰卿雖疾病爲朕卧䕶六軍所益多矣又羊祜傳曰呉人宼弋陽江夏畧戸口詔遣侍臣移書詰祜不追討之意並欲移州復舊之宜祜曰江夏去襄陽八百里比知賊去亦已經日矣歩軍方徃安能救之哉勞師以免責恐非事宜也昔魏}
