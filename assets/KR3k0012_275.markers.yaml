  - {type: variant, offset: 5, length: 1, content: 禮, SBCK: 上論語曰子曰孟之反不伐孔注曰魯大夫孟之側也與齊戰軍大敗不伐者不自伐其功也孝經左契曰將軍順虎衘珠大夫正海出魚抱朴子曰良將剛則法天可望而不可干柔則象淵可觀而不可入去如收電可見而不可得留如山岳可瞻而不可量唐子曰良將如泉如山不知其歡戚也史}
