  - {type: page-break, offset: 2299, content: '', id: KR3k0012_WYG_275-8a, image: WYG0895/WYG0895-0445c.png}
  - {type: variant, offset: 2299, length: 3, content: 劉向擊, krp: 山簡復假詹督五郡軍事蜀賊杜疇作亂金寳溢目詹一無所取唯收圖書莫不難之又曰周訪威風旣著逺近恱服智勇過人爲中興名將性謙虚未嘗論功伐或問訪曰人有小善鮮不自稱卿功勲如此𥘉無一言何也訪曰朝廷威靈將士用命訪何功之有又曰蘇峻平論功顧衆推功於蔡謨謨衆唱謨非巳之力俱表相讓論者美之又曰符堅衆號百萬次于淝水謝玄入問計謝安無懼色方與玄圍碁遊渉至夜乃還指受將帥各當其任玄等破堅驛書至安對客圍碁看書便攝放床上了無喜色客問徐荅小兒輩破賊旣罷還内過户限心喜甚不覺屐齒之折其矯情鎮物如此也又曰帝謂紀瞻曰卿雖疾病爲朕卧護六軍所益多矣又羊祜傳曰吴人冦戈陽江夏略户口語遣侍臣移書詰祜不追討之意并欲移州復舊之冝祜曰江夏去襄陽八百里皆知賊去亦巳經日矣歩軍方往安能救之哉勞師以免責恐非事冝也昔魏}
  - {type: variant, offset: 2303, length: 0, content: '', SBCK: 帝置都督皆與州相近以兵勢好合惡離疆􅂣之間一彼一此愼守而已古之善教也􅀂輙徙州賊出無常亦未知之所冝據者使者不能詰又曰羊祜入朝武帝遣中書令張華問其籌䇿祜曰今主上有禪代之美而功徳未著吴人虐政巳甚可不戰而尅混一六合以興文教則主齊堯舜臣同稷契爲百代之盛􅀂孫皓不幸而殘吴人更立令主雖百萬之衆長江未可而越也將爲患乎華深讃成其計祜謂華曰成吾志者子也帝欲使祜卧護諸將祜曰取吴不必湏臣自行但旣平之後勞聖慮耳功名之際臣所不敢居事當有所付授願審擇其人疾漸篤乃舉杜預自代㝷卒又曰毛穆之鎮廣}
  - {type: page-break, offset: 2303, content: '', id: KR3k0012_SBCK_275-5b}
  - {type: variant, offset: 2303, length: 0, content: '', WYG: 帝署都督皆與州相近以兵勢好合惡離疆埸之間一彼一此偵守而已古之善教也若輙徙州賊出無常亦未知所宜據者使者不能詰又曰羊祜入朝武帝遣中書令張華問其籌䇿祜曰今主上有禪代之美而功德未著呉人虐政已甚可不戰而尅混一六合以興文教則主齊堯舜臣同稷契爲百代之盛若孫皓不幸而殘呉人更立令主雖百萬之衆長江未可越也將爲患乎華深讃成其計祜謂華曰成吾志者子也帝欲使祜卧䕶諸將祜曰取呉不必須臣自行但既平之後勞聖慮耳功名之際臣所不敢居事當有所付受願審擇其人疾漸篤乃舉杜預自代尋卒又曰毛穆之鎭廣}
