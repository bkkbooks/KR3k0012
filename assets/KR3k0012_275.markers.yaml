  - {type: variant, offset: 8, length: 1, content: 諸, SBCK: 吴起者衛人也好用兵事魯君齊人攻魯魯欲將起起取齊女爲妻而疑之起遂殺妻明不爲齊也魯卒以爲將大破齊後之魏又曰陳勝之反秦使王離擊趙王及張耳鉅鹿城或曰王離秦之名將也又曰魏文}
  - {type: page-break, offset: 8, content: '', id: KR3k0012_SBCK_275-1b}
  - {type: variant, offset: 8, length: 1, content: 諸, WYG: 呉起者衛人也好用兵事魯君齊人攻魯魯欲將起起娶齊女爲妻而疑之起遂殺妻明不爲齊也魯卒以爲將大破齊後之魏又曰陳勝之反秦使王離擊趙王及張耳鉅鹿城或曰王離秦之名將也又曰魏文}
  - {type: page-break, offset: 8, content: '', id: KR3k0012_WYG_275-2a, image: WYG0895/WYG0895-0442c.png}
  - {type: variant, offset: 8, length: 1, content: 諸, krp: 吴起者衛人也好用兵事魯君齊人攻魯魯欲將起起取齊女爲妻而疑之起遂殺妻明不爲齊也魯卒以爲將大破齊後之魏又曰陳勝之反秦使王離擊趙王及張耳鉅鹿城或曰王離秦之名將也又曰魏文}
  - {type: variant, offset: 10, length: 0, content: '', SBCK: 問吴起何如人李克曰其用兵司馬穰苴弗能過也於是魏文侯以爲將擊秦拔五城又曰杜業曰􅀼見朱愽忠信勇猛材略不丗出誠國家雄俊之寳臣也冝徴愽左右以塡天下此人在朝則陛下可髙卧矣又谷永傳曰平阿侯譚位持進領城門兵永聞與譚書曰君侯躬周召之德執管晏之操敬賢下士樂善不倦冝在上將乆矣屬聞以特進領城門兵屬之欲切愚􅀼不爲君侯喜冝深辭職自陳淺薄不足以固城門守收太伯之讓保謙謙之路闔門髙枕爲智者譚得書大感遂辭讓不受領城門職又曰霍去病爲驃􅀐將軍上甞欲教之孫吴兵法對曰顧方略何如耳不至學古兵法上爲治第令視之對曰匈奴不滅無以家爲又曰李廣爲右北平匈奴號曰漢飛將軍廣歴七郡太守前後三十餘年得賞}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_SBCK_275-2a}
  - {type: variant, offset: 10, length: 0, content: '', WYG: 問呉起何如人李克曰其用兵司馬穰苴勿能過也於是魏文侯以爲將擊秦㧞五城漢書杜業曰竊見朱博忠信勇猛材畧不世出誠國家雄俊之寶臣也宜徴博左右以鎭天下此人在朝則陛下可高卧矣又谷永傳曰平阿侯譚位特進領城門兵永聞與譚書曰君侯躬周召之德執管晏之操敬賢下士樂善不倦宜在上將久矣屬聞以特進領城門兵屬之欲反愚竊不爲君侯喜宜深辭職自陳淺薄不足以固城門守收大伯之讓保謙謙之路闔門高枕爲智者譚得書大感遂辭讓不受領城門職又曰霍去病爲驃騎將軍上嘗欲教之孫呉兵法對曰顧方畧何如耳不至學古兵法上爲治第令視之對曰匈奴未滅無以家爲也又曰李廣爲右北平匈奴號曰漢飛將軍廣厯七郡太守前後三十餘年得賞}
