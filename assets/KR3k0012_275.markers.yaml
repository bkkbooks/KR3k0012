  - {type: variant, offset: 2731, length: 209, content: 餘矣三軍莫不壯之又曰畢眾敬爵為東平公善自奉養食膳豐華必致他方遠味年已七十鬢髮皓白而氣力未衰據鞍馳騁有若少壯篤於姻親深有國士之風大和中高祖賓禮舊老眾敬咸陽公高允引至方山雖文武奢儉好尚不同然與允甚相愛敬接膝談款有若平生後以篤老乞還桑梓朝廷許之眾敬臨還獻真珠璫四具銀裝劍一口刺虎矛一枚後周書曰梁臺不過識千餘字口占書啟詞意可觀年過六十猶能被甲跨馬足不躡蹬馳射弋獵矢不虛發隋書曰開皇初突厥寇邊燕薊多被其患前總管李崇至拜為幽州六州, SBCK: ''}
