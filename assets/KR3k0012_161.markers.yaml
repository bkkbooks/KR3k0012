  - {type: variant, offset: 10, length: 1, content: 滑, SBCK: 脩武本寗邑也韓詩外傳曰武王伐紂勒兵於寗故改曰脩武韓非書曰􅁗昭王敗趙長平西伐脩武漢書曰漢武帝將幸緱氏至汲縣之新中郷得南越相吕嘉首因立爲􅀗嘉縣孟}
