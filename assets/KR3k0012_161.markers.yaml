  - {type: variant, offset: 2396, length: 6, content: 宋滕薛小邾偪, SBCK: 鮮虞白狄之國後改爲中山國張曜中山記曰郡理中山以其城中有山故謂之中山又云郡治中人城漢志曰盧奴縣屬中山國盧水出焉圖經曰安喜縣即古盧奴縣也有黒水故池深而不流俗謂黒水爲盧不流爲奴漢書外戚傳曰宣帝母王夫人微時與父泣别於栁􅀫城在豐義縣十道志曰唐縣本春秋時鮮虞邑也漢爲唐縣地漢志曰唐縣屬中山國王莽曰和親故堯國也堯爲唐侯邑於此堯山在唐東北望都界孟康曰晉荀吴伐鮮虞入中人今中人亭是應劭風俗通曰中人城北四十里有左人亭鮮虞故邑左人亭即唐縣也漢書曰望都屬中山國莽曰順調堯山在北堯母慶都山在南登堯山見都山故以爲名圖經曰陘邑縣本七國時中山國之苦陘縣也史記曰李克爲中山相苦陘之吏上計入多於前克曰苦陘上無山林之饒下無藪澤牛馬之息而入多於前是擾亂吾民也於是免之十道志曰鼔城縣春秋鼔子之邑漢下曲}
