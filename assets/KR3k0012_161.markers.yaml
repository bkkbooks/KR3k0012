  - {type: variant, offset: 2972, length: 188, content: 將三十六軍擊之亞夫至淮陽問客鄧都尉策安出客曰莫若引兵東北壁昌邑以梁委吳使輕兵絕淮泗口塞吳饟道使吳梁相弊乃以全制其極破吳必矣亞夫從之乃破吳今金鄉縣有昌邑故城魏志曰太祖欲征陶謙時呂布在兗州荀彧或說太祖曰昔高祖居關中光武據河內皆深根固蔕以制天下進足以勝敵退足以自守故雖有困敗而終濟大業將軍本以兗州首事平山東之難百姓無不歸心悅服且濟河天下之要地是亦將軍之關中河內也不可不先定乃從之海州, SBCK: 人}
