  body:
  - {type: variant, offset: 1, length: 0, content: '', SBCK: 北道上懷孟衛相洺邢冀趙鎭定瀛懷州元和郡縣圖曰懷州河内郡禹貢冀州之域覃懷之地周爲畿内及衛䢴雍三國春秋時屬􅀳七國時屬韓魏二國􅁗兼天下滅衛爲三川郡禹貢曰覃懷底績至于衡漳後漢書曰光武定河内而難其守問於鄧禹曰諸將誰可使守河内者禹曰昔髙祖任蕭何於􅀜中無復西顧之憂今河内帶河爲固戸口殷實北通上黨}
  - {type: variant, offset: 1, length: 0, content: '', WYG: 北道上懐州孟州衛州相州洛州邢州冀州趙州鎮州定州瀛州懷州元和郡縣圖曰懷州河内郡禹貢冀州之域覃懷之地周為畿内及衛邦雍三國春秋時屬晉七國時屬韓魏二國秦兼天下滅衛為三川郡後漢書曰光武既定河内於是拜㓂恂為河内太守恂移書屬縣講兵肄射伐湛園之竹以爲矢養馬收租以給軍左傳曰周與鄭人蘇忿生之田州陘隤懐地今河内縣又曰襄王賜晉文公以陽樊温原攢茅之田晉於是始啓}
  - {type: page-break, offset: 1, content: '', id: KR3k0012_WYG_161-1b, image: WYG0894/WYG0894-0460d.png}
  - {type: page-break, offset: 1, content: '', id: KR3k0012_WYG_161-2a, image: WYG0894/WYG0894-0461a.png}
  - {type: variant, offset: 1, length: 0, content: '', krp: 北道上懷孟衛相洺邢冀趙鎭定瀛懷州元和郡縣圖曰懷州河内郡禹貢冀州之域覃懷之地周爲畿内及衛䢴雍三國春秋時屬晉七國時屬韓魏二國秦兼天下滅衛爲三川郡禹貢曰覃懷底績至于衡漳後漢書曰光武定河内而難其守問於鄧禹曰諸將誰可使守河内者禹曰昔髙祖任蕭何於關中無復西顧之憂今河内帶河爲固戸口殷實北通上黨}
  - {type: variant, offset: 2, length: 1, content: 道, SBCK: 迫洛陽宼恂文武備足非此子不可也乃拜恂爲河内太守恂移書屬縣講兵肄射伐湛園之竹以爲矢養馬收租以給軍左傳曰周與鄭人蘇忿生之田州陘隤懷州今河内縣又曰襄王賜􅀳文公以陽樊温原攅茅之田晉於是始啓南陽在􅀳山之南河之北故曰南陽元和郡縣圖曰河内縣春秋野王邑也左傳曰􅀳人執晏弱于野王漢志曰武德縣屬河内始皇東巡自以武德定天}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_SBCK_161-1b}
  - {type: variant, offset: 2, length: 1, content: 道, WYG: 陽在晉山之南河之北故曰南陽元和郡縣圖曰河内縣春秋野王邑也左傳曰晉人執晏弱于野王漢志曰武德縣屬河内始皇東巡自以武德定天}
