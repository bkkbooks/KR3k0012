  - {type: variant, offset: 668, length: 905, content: 兗州之域春秋時屬宋即魯附庸須句國句音劬戰國時其地屬魏秦為薛郡地漢為東平國左傳曰晉人執季文子於苕丘公還待於鄆杜注云鄆魯西邑又僖二十二年伐邾須句僖公時也又哀十四年西狩于大野叔孫氏之車子鉏商獲麟賜虞人大野即鉅野縣青州十道志曰青州北海郡置在益都縣元和郡縣志曰少昊之墟古青州之地舜時以青州越海遼遠分為營州武王克商封師尚父於齊營丘周成王少時命太公東至于海西至于河南至于穆陵女至于無棣五侯九伯實得征之後子孫為秦所滅分齊地置齊瑯琊二郡漢為臨淄郡圖經曰少昊之代爽鳩氏虞夏則有季萴仕則反湯有逢公伯陵逢音蒲江反殷末有蒲姑皆為諸侯國於此地周成王時蒲姑與四國作亂成王滅之以封太公史記曰齊有清濟濁河可以為固長城鉅防足以為塞又曰蘇秦東說齊宣王曰齊南有泰山東有瑯琊西有清河北有渤海此所謂四塞之國也齊地方二千餘里齊軍之良進如鋒矢戰如雷霆解如風雨即有軍役未嘗倍泰山絕清河涉渤海也臨淄甚富其民無不吹簫鼓彈琴瑟擊筑鬭雞走狗臨菑之塗車轂相擊人肩相摩連袂成帷舉袂成幕揮汗成雨家給人足志氣高揚又曰齊所以名齊者有天齊祠也又封禪書曰始皇遊海上祠名山大川及八神求羨門之屬八神一曰天主祠天齊天齊池名在臨淄南郊山下漢書曰夫齊東有瑯琊即墨之饒南有泰山之固西有濁河之限北有渤海之利地方二千里持戟百萬懸隔千里之外齊得十二焉又曰齊有三服之官縱為春服紈素為冬服輕綃為夏服韓詩外傳曰齊景公遊於牛山之上北望齊國曰美哉國乎鬱鬱蔥蔥使古人無死者則寡人將何去此俯而泣下沾襟國子高子曰然臣賴君之賜蔬食惡衣可得而食也駑馬柴車可得而乘也且猶不欲死而況君乎又俯而泣晏子笑曰樂哉今日之遊宴也見怯君一諛臣二使古而無死則太公丁公至今猶存吾君方將被萊笠而立畎畝惟農事之恤何暇念死乎公慚乃引觴自罰韓子曰景公與晏子遊於少海登柏寢之臺而望其國曰美哉堂堂乎後代孰有此晏子曰其田氏乎公曰寡人有國而田氏有之奈何對曰君欲奪之則近賢遠不肖振窮卹孤雖十田氏其如君何齊記曰晉永嘉五年東萊牟平曹嶷為刺史所築城有大澗甚廣因之為固謂之廣固城城側有五龍口崔鴻十六國春秋南燕錄曰慕容德初議所都尚書潘聽曰青齊沃壤號曰東秦土方二千里四塞之固負海之饒可謂用武之國廣固者曹嶷之所營山川險峻足為王者之都從之齊州十道志曰齊州濟南郡置在歷城縣古兗, SBCK: 冀}
