  - {type: variant, offset: 1714, length: 676, content: 為幽州之境春秋及戰國時屬齊秦為齊郡漢為濟南郡之般陽縣漢志曰般陽屬濟南郡應劭曰在般水之陽王莽曰濟南亭圖經曰長山縣本漢於陵縣也隋改焉以界內長白山為名漢志曰於陵屬濟南郡王莽曰於陸郡國志曰長山於陵城散宜生得瑞獸之地萊州十道志曰萊州東萊郡置在掖縣禹貢青州之域周之九州為幽州之境秦置三十六郡屬齊郡漢志高祖置東萊以其在齊國之東故云東萊尚書禹貢曰萊夷作牧左傳曰齊侯伐萊萊人使正輿子賂夙沙衛以索馬牛皆百疋齊師乃還後齊人復入萊萊恭公俘柔奔堂晏弱圍堂滅之遷萊子於郳史記曰周武王封太公於營丘萊侯聞之遂與太公爭營丘左傳曰聊攝以東姑尢以西其為人也多矣聊攝齊西界姑尢齊東界謂聊城攝城姑水尢水也水在即墨縣漢書郊祀志曰武帝元封元年大旱禱萬里沙孟康云沙長三百里沙在郡界地里志曰長廣縣有奚養澤周禮職方氏曰幽州之藪曰奚養長廣今昌陽縣登州十道志曰登州文登郡漢牟平縣屬東萊郡文帝封齊悼惠王子將閭為牟平侯此即將閭邑也圖經曰古萊子國也戰國及秦屬齊郡漢已下屬東萊郡又曰文登漢腄縣有之罘山漢書曰腄有之罘山丹水所出師古曰腄直睡切史記曰始皇二十八年行郡縣上泰山過黃腄經成山後二十九年又東遊登成山升之罘勒石紀功密州十道志曰密州高密郡置在諸城縣禹貢青州之域兼得徐州之地秦為瑯琊郡漢屬齊文帝分齊立膠西國封齊悼惠王子卬為膠西王都高密齊記曰密州本東武縣樂府東武吟即是也秦本紀曰始皇二十六年齊遂登瑯琊層臺於山上秦王樂之因留三月乃徙黔首二萬戶於瑯琊山吳越春秋曰越王勾踐二十五年徙都瑯琊立觀臺周旋七里以望東海史記曰齊湣王為燕師所敗唯聊莒即墨三城不下立湣王之子法章於莒是為襄王徐州十道志曰徐州彭城郡置在彭城縣元和郡縣圖曰禹貢徐, SBCK: 蓋并}
