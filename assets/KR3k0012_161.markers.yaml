  - {type: variant, offset: 10, length: 1, content: 滑, WYG: 修武本寗邑也韓詩外傳曰武王伐紂勒兵於寗故改曰修武韓非書曰秦昭王敗趙長平西伐修武漢書曰漢武帝將幸緱氏至汲縣之新中鄉得南越相吕嘉首因立爲獲嘉縣孟}
