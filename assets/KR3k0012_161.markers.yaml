  - {type: variant, offset: 393, length: 1, content: 兗, SBCK: 冀州之域秦併天下於此置信都縣屬鉅鹿郡左傳曰凡蔣邢茅周公之胤也又成十五年楚大夫申公奔􅀳􅀳以爲邢大夫東陽􅀳之山東魏郡廣平是郡國志曰邢州尚書坊東平地周百餘歩其所鳴響人馬行上轟轟有聲掘之即火出十三州志曰鉅鹿唐虞時大麓之地尚書堯試舜百揆納于大麓麓則林之大者堯之禪舜欲使天下皆見之故合羣臣與百姓納之大麓之野然後授受以明巳禪也張耳傳曰髙祖從平城還過趙趙王自上食禮甚卑髙祖箕踞趙相貫髙等乃壁人栢人要之上過欲􅀫心動問縣名爲何曰栢人上曰栢人者迫於人也不宿而去栢人今堯山縣冀州十道志曰冀州信都郡元和郡縣圖曰春秋時屬􅀳七國時屬趙在秦屬鉅鹿郡李公緒趙記曰趙孝成王造壇臺之宫爲趙都朝諸侯故曰信都史記曰秦時有客􅀃張耳曰兩君羈旅難以獨立立趙後扶以義可以就功乃求趙歇立爲趙王居信都漢書曰項羽分趙立張耳爲常山王居信都改曰襄國􅀳書曰張賔􅀃石勒曰襄國因山慿險實形勢之國可都之遂都於此晉書曰初童謡云古在左月在右讓去言或入口古在左月在右胡字也讓去言爲襄也或入口爲國也㝷爲石勒所都後漢書曰王郎僣號河北悉應光武自薊南行至下􅀶惶惑不知所之有白頭父在道傍指曰努力信都爲長安守光武即馳赴信都太守任光開門出迎魏志曰韓馥爲冀州牧公孫瓉欲襲之􅀽紹使髙幹諷馥令以冀州讓紹馥素恇怯因然其計馥長史耿武諌曰冀州雖鄙帶甲百萬榖支十年􅀽紹􅀌客窮軍譬如嬰兒在股掌之上絶其乳哺立可餓殺柰何以州與之馥不從以州與紹盧植冀州風􅁟記曰冀州聖賢之泉藪帝王之舊地十三州志曰冀州之地古京也人患剽悍故語曰仕宦不偶值冀部後漢書曰王郎起光武自薊南馳及至南宫遇大風雨光武引車入道傍空舎馮異抱薪鄧禹􅋹火光武對竈燎衣異進麥飯兎肩魏志曰太祖拔鄴領冀州收或􅀃太祖冝復古置九州冀州所制者廣天下服矣太祖將從之荀彧曰􅀂是則冀州當得河東馮翊扶風西河幽井之地所奪者衆今分冀州將皆動心一旦生變天下未昜圖也公從之趙州元和郡縣圗曰趙州趙郡禹貢冀}
