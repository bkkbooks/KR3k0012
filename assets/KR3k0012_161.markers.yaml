  - {type: variant, offset: 2387, length: 0, content: '', WYG: 靈壽縣本中山國都也十三州志曰中山武公本周之同姓其後桓公不恤國政晉太史餘見周王王問之諸侯孰先亡對曰中山之俗以晝爲夜以臣觀之中山其先亡乎其後魏樂羊爲文侯將拔中山封之靈壽戰國䇿曰九門縣本爲九室而名趙武靈王改爲九門縣史記曰趙惠王三十八年藺相如城九門大城定州十道志曰定州博陵郡}
