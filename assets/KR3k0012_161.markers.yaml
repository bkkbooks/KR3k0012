  - {type: variant, offset: 22, length: 1, content: 兗, SBCK: 冀豫二州之境則武王伐紂㑹盟津是也周爲畿内蘇忿生之邑後爲􅀳邑左傳曰􅀳侯召王以諸侯見且使王狩仲尼曰以臣召君不可以訓故書曰天王狩于河陽北齊書曰神武使潘岳鎭北城又使髙永樂守南城以備西魏又東魏所築中潬城仍置河陽􅀜故有河陽三城侯使冀州圖經曰河陽在河内郡南六十四里有宫有􅀜􅀳書曰潘岳才名冠丗爲衆所嫉出爲河陽令左傳隱三年曰鄭􅀕足帥師取温之麥秋又取成周之禾又僖十年狄滅温今河内温縣温子奔衛周襄王以地賜􅀳文公衛州元和郡縣圖曰衛州汲郡禹貢冀州之域後爲殷都衛縣界朝歌是也戰國時屬魏􅁗屬河東郡漢爲汲縣地地理志曰河内殷之舊都周旣滅殷分其畿内爲三國詩風邶庸衛是也邶以封紂子武庚鄘管叔尹之衛蔡叔尹之以監殷人謂之三監史記曰周旦以成王命興師殺武庚禄父殺管叔放蔡叔以殷餘民封康叔爲衛君居河淇之間故商墟漢志曰朝歌屬河内紂所都周武王弟康叔所封更名衛王莽曰雅歌劉子曰邑號朝歌墨子廽車後漢書曰虞詡爲朝歌令多盗連年不解親舊多勞弔之曰得朝歌何衰也詡􅀏曰難者不避易者必從臣之節也詡謁河内太守馬稜稜曰君儒者乃在朝歌甚爲君憂之詡曰賊犬羊相聚以求飽暖耳去敖倉不過百里不知取以爲粮青冀流民不知掠以爲衆守其阨塞此爲斷天下之右臂也今則不然此無大計之効也詡悉平之春秋後序曰太康五年呉宼始平余自江陵還襄陽解甲休兵乃申予舊意修成春秋釋例及經傳集解始訖㑹汲郡汲縣有發其界内舊塚者得古書皆簡編科斗文字發塚者不以爲意徃徃散亂科斗書乆廢推㝷不能盡通始者藏在祕府余晚得見之劉澄之山川古今記曰􅀺陽古􅀺國也詩曰􅀺侯寓于衛是也相州元和郡縣圖曰相州鄴郡禹貢冀}
  - {type: page-break, offset: 22, content: '', id: KR3k0012_SBCK_161-2b}
  - {type: page-break, offset: 22, content: '', id: KR3k0012_SBCK_161-3a}
  - {type: variant, offset: 22, length: 1, content: 兗, WYG: 冀豫二州之境周武王伐紂會孟津是也周爲畿内蘇忿生之邑後爲晉邑左傳曰晉侯召王以諸侯見且使王狩仲尼曰以臣召君不可以訓故書曰天王狩于河陽北齊書曰神武使潘樂鎭北城又使高永樂守南城以備西魏於東魏所築中渾城仍置河陽關故有河陽三城冀州圖經曰河陽在河内郡南六十四里有宫有關晉書曰潘岳才名冠世爲衆所嫉出爲河陽令左傳隱三年曰鄭祭足帥師取温之麥秋又取成周之禾又僖十年秋滅温今河内温縣温子奔衛周襄王以地賜晉文公衛州元和郡縣圖曰衛州汲郡禹貢冀州之域後爲殷都衛縣界朝歌是也戰國時屬魏秦屬河東郡漢爲汲縣地地理志河内殷之舊都周既滅殷分其畿内爲三國詩風􅆁鄘衛是也􅆁以封紂子武庚鄘管叔尹之衛蔡叔尹之以監殷人謂之三監史記曰周公以成王命興師殺武庚祿父殺管叔放蔡叔以殷餘民封康叔爲衛君居河淇之間故商墟漢志曰朝歌屬河内紂所都周武王弟康叔所封更名衛王莽曰雅歌劉子曰邑號朝歌墨子迴車續漢書曰虞詡爲朝歌令多盗連年不解親舊多勞弔之曰得朝歌何衰也詡笑曰難者不避易者必從臣之節也詡謁河内太守馬稜稜曰君儒者乃在朝歌甚爲君憂之詡曰賊犬羊相聚以求飽暖耳去敖倉不過百里不如取以爲根青冀州民不知掠以爲衆守其阨塞此謂斷天下之右臂也今則不然此謂大計之効也詡悉平之春秋後序曰太康五年吳冦始平余自江陵還襄陽解甲休兵乃申予舊意修成春秋釋例及經傳集解始訖㑹汲郡汲縣有發其界内舊塚者得古書皆簡編科斗文字發塚者不以爲意徃徃散亂科斗書乆廢推尋不能盡通始者藏在秘府余晩得見之劉登之山川古今記曰黎陽國也詩曰黎侯寓于衛是也相州元和郡縣圖曰相州鄴郡禹貢冀}
