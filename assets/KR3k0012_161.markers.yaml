  - {type: variant, offset: 2637, length: 146, content: 因之以凌諸夏泗州元和郡縣圖曰泗州臨淮郡理臨淮縣禹貢徐州之域春秋屬魯又為徐子之國後秦滅楚為泗水郡漢分置臨淮郡漢書地理志曰厹猶屬臨淮郡王莽曰康義厹音仇即連水也都城記曰周穆王末徐君偃好行仁義東夷歸之者四十餘國穆王西巡聞徐君威德日遠遣楚襲其不備大破之殺偃王其子遂北徙彭城百姓從之者數萬徐國今徐城是也兗, SBCK: 善改爲蒲隂瀛}
