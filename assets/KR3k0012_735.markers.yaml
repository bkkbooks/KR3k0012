  - {type: variant, offset: 413, length: 0, content: '', SBCK: 見尙書郎鄭默冢發之得銘誌符驗棺柩尚在并有瓦木雜器鄭氏子孫相率改葬厭蠱史記曰江充見上年老恐晏駕後爲太子所誅因奏上言日疾祟在巫蠱以充爲使者治巫蠱充將胡巫掘地求木偶至遂掘得蠱於太子宫得桐木人太子懼不能自明收充自臨斬之宋書曰文帝時使宫内皆蠶欲以諷厲天下有女巫嚴道育夫爲劫坐沒入奚官元凶劭姉東陽公主應閤婢王鸚鵡白公主嚴道育通靈主乃白上託云善􅁞求召入道育云所奉天神當賜符應時主夕卧見流光相隨狀如螢火遂入巾箱化爲􅀟鳬圎青可愛於是主及劭並信惑之始興王濬素佞事劭並多過失慮上知使道育祈請欲令過不上聞歌舞呪詛不捨晝夜道育輒云自上天陳請必不泄露邵等敬事號日天師後遂巫蠱刻玉爲上形像埋於含章殿前初東陽公主有奴陳天興鸚鵡餋以爲子}
  - {type: page-break, offset: 413, content: '', id: KR3k0012_SBCK_735-6b}
  - {type: variant, offset: 413, length: 59, content: 而見我乎許之遂不見又曰夏大旱公欲焚巫尫臧文仲曰非旱備也脩城郭貶食省用務牆勸分杜預注曰勸分有無相濟也此其務也巫尪何為天欲, WYG: 以告則}
  - {type: variant, offset: 413, length: 0, content: '', krp: 見尙書郎鄭默冢發之得銘誌符驗棺柩尚在并有瓦木雜器鄭氏子孫相率改葬厭蠱史記曰江充見上年老恐晏駕後爲太子所誅因奏上言日疾祟在巫蠱以充爲使者治巫蠱充將胡巫掘地求木偶至遂掘得蠱於太子宫得桐木人太子懼不能自明收充自臨斬之宋書曰文帝時使宫内皆蠶欲以諷厲天下有女巫嚴道育夫爲劫坐沒入奚官元凶劭姉東陽公主應閤婢王鸚鵡白公主嚴道育通靈主乃白上託云善𧖟求召入道育云所奉天神當賜符應時主夕卧見流光相隨狀如螢火遂入巾箱化爲雙鳬圎青可愛於是主及劭並信惑之始興王濬素佞事劭並多過失慮上知使道育祈請欲令過不上聞歌舞呪詛不捨晝夜道育輒云自上天陳請必不泄露邵等敬事號日天師後遂巫蠱刻玉爲上形像埋於含章殿前初東陽公主有奴陳天興鸚鵡餋以爲子}
  - {type: variant, offset: 414, length: 0, content: '', SBCK: 與之淫通鸚鵡天興及寧州所獻黄門慶國並與巫蠱事邵以天興􅀘隊主東陽主薨鸚鵡嫁吳興沈懷遠爲妾鸚鵡旣適懷遠慮與天興私通事泄請劭殺之劭密使人害天而慶國謂往來唯有二人天興旣死慮將}
  - {type: page-break, offset: 414, content: '', id: KR3k0012_SBCK_735-7a}
  - {type: variant, offset: 414, length: 0, content: '', krp: 與之淫通鸚鵡天興及寧州所獻黄門慶國並與巫蠱事邵以天興𥙷隊主東陽主薨鸚鵡嫁吳興沈懷遠爲妾鸚鵡旣適懷遠慮與天興私通事泄請劭殺之劭密使人害天而慶國謂往來唯有二人天興旣死慮將}
  - {type: variant, offset: 415, length: 0, content: '', SBCK: 及乃以白上上驚惋卽收鸚鵡家得劭濬手書皆呪詛巫蠱之言得所埋上形像於宫內道育叛亡捕之不得上誥責劭濬劭濬唯陳謝而已道育變服爲尼逃匿東宫濬往京口又以自隨或出止親人張旿家後濬當鎭江陵復載道育還東宫欲將西上有吿上云京口張旿家有一尼服食出入征止内似嚴道育上使掩得二婢云道育隨征北還都上惆悵驚惋劭弑逆後李武平亂不見傳國璽問劭云在嚴道育處就取得之道育鸚鵡並都街鞭殺於石頭四望山焚其尸揚􅁅于江梁書曰蕭紀舉岷蜀之衆由外水而下湘東王命方士伯人於長州苑板上畫紀形像親下䥫符釘于支體以厭之陳書日後主陰令人告長沙王叔堅厭魅刻木爲偊人衣以道士衣施機關能拜跪晝夜於星月下醮之祝詛於上又令上書告其事案驗令實後主召叔堅囚于西省後赦之免所居官北齊書曰初立太子􅁪母􅀪德夫人穆氏爲左皇后大赦國內初斛律后之廢也陸令萱欲以穆氏代之祖挺請立胡昭儀爲后胡太后亦卑辭􅌋禮以求令萱以胡氏寵幸方隆不得已而白齊主立之然意在穆氏毎私謂齊主云豈有男爲太子而身爲婢妾乃求左道行厭蠱之術旬朔之閒胡氏遂即精神恍愡言􅀏無􅁪齊主漸畏惡之於是立穆氏隋書曰獨􅀌陁性好左道其外祖母高氏先事猫􅀑已殺其男郭沙羅因轉入其家上微聞而不信㑹獻皇后及楊素妻鄭氏俱有疾召醫視之皆曰此猫􅀑疾上以陁后之異母弟陁妻楊素之異母妹由是意陁所爲陰令其兄穆以情喻之上又避左右諷陁陁言無有上不恱左遷出怨言上令高熲蘇威大理正皇甫孝緒大埋丞楊遠等推案之陁婢徐阿尼言本從陁母家來常事猫􅀑毎以子日夜祀之言子者鼠也其猫􅀑每殺人者所死家財物潛移於蓄猫􅀑家陁嘗從家中索酒其妻日無錢可酤陁因謂阿尼曰可令猫􅀑向越公家使}
