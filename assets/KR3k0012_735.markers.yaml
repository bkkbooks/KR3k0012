  - {type: variant, offset: 4501, length: 9, content: 齊高緯夜夢黑衣貴人, WYG: 秦王俊好内妃崔氏性妬甚不平之遂於瓜中進毒由是遇疾疾篤含銀色變以為遇蠱未能遣使奉表陳謝帝責以失德薨帝哭之數聲而已曰晉王前}
  - {type: variant, offset: 4511, length: 5, content: 相驅逐乃向, WYG: 一鹿我令作脯擬賜秦王王亡可置}
  - {type: punctuation, offset: 4514, content: ，, id: KR3k0012_CHANT_735-bkkpn1211}
  - {type: 'tls:seg', offset: 4514, content: '', id: KR3k0012_CHANT_735-42a.4}
  - {type: variant, offset: 4517, length: 4, content: 拜巫者烏, WYG: 靈前心已許之不可虧信帝及后徃視見}
  - {type: punctuation, offset: 4518, content: 。, id: KR3k0012_CHANT_735-bkkpn1212}
  - {type: 'tls:seg', offset: 4518, content: '', id: KR3k0012_CHANT_735-42a.5}
  - {type: variant, offset: 4522, length: 2, content: 以厭, WYG: 蜘蛛大蛷螋從枕頭出求之不見窮之知妃所為也又曰蜀王秀漸奢侈違法度及太子勇廢秀甚不平皇太子恐終為後患隂令楊素求其罪狀而譛}
  - {type: page-break, offset: 4522, content: '', id: KR3k0012_WYG_735-14b, image: WYG0899/WYG0899-0484b.png}
  - {type: punctuation, offset: 4525, content: 。, id: KR3k0012_CHANT_735-bkkpn1213}
  - {type: 'tls:seg', offset: 4525, content: '', id: KR3k0012_CHANT_735-42a.6}
  - {type: variant, offset: 4526, length: 0, content: '', WYG: 令楊素蘇威牛𢎞柳述趙綽推太子隂作偶人書帝及漢王姓字縛手釘心令人埋華山下楊素發之又作檄文故逆臣賊子專弄威柄陛下惟守虛器一無所知帝乃下詔數其罪曰漢王}
  - {type: variant, offset: 4527, length: 8, content: 芳林園自著破衣裳, WYG: 汝親則弟也乃畫其形像題其姓名縛手釘心枷鏁杻械仍云請西岳華山慈父聖母收楊諒神魂在華山下勿令散蕩我之於汝親則父也仍云請西岳華山慈父聖母賜}
  - {type: page-break, offset: 4527, content: '', id: KR3k0012_WYG_735-15a, image: WYG0899/WYG0899-0484c.png}
  - {type: variant, offset: 4536, length: 2, content: 窮兒, WYG: 開化楊堅夫妻回心歡喜又畫我形像縛手撮頭仍云西岳神兵收楊堅魂神如此形狀我今不知楊諒楊堅汝何親也㓕天理逆人倫皆為之不祥也欲免患禍長守富貴其可得乎搜神記曰鄱趙壽有犬蠱有陳岑詣壽忽有大黄犬六七羣出吠岑後余相伯歸與夀婦食吐血幾死乃屑桔梗以飲之乃愈兩京記曰楊素有羙妾姿色絶倫時有千牛桑和有蠱異術常云一見婦人便即能致煬帝嘗宻使人竊之素宅深􅃉和朝奉詔其夜便竊以匿煬帝竒其能便詔素賜之唐書曰髙駢傳云畢師鐸}
  - {type: page-break, offset: 4536, content: '', id: KR3k0012_WYG_735-15b, image: WYG0899/WYG0899-0484d.png}
