  - {type: variant, offset: 4050, length: 1, content: 許, WYG: 嚴道育夫為刼坐没入煖宫元凶劭姉東陽公主應閤婢王鸚鵡白公主嚴道育通靈主乃白上託云善蠶求召入道育云所奉天降當賜符應時主夕卧見流光}
  - {type: page-break, offset: 4050, content: '', id: KR3k0012_WYG_735-10b, image: WYG0899/WYG0899-0482b.png}
  - {type: variant, offset: 4052, length: 0, content: '', WYG: 随狀如熒火遂入巾箱化為雙石圎青可愛於是主及劭並信惑之始興王濬素佞事劭並多過失慮上知使道育祈請欲令過不上聞歌舞呪詛􅐍捨晝夜道育輙云自上天陳請必不泄露劭等敬事號曰天師}
  - {type: variant, offset: 4053, length: 0, content: '', WYG: 遂巫蠱刻玉為上形象埋於含章殿前初東陽公主有奴陳天興鸚鵡養以為子而與之滛通鸚鵡天興及寧州所獻黄門慶國並預巫蠱事劭以天興補隊主東陽主薨鸚鵡嫁吳興沈懐遠為妾鸚鵡既適懐遠慮與天興私通事泄請劭殺之劭宻使人害天興既而慶國謂徃來惟有二人天興既死慮將見及乃以白上上驚惋即収鸚鵡家得劭濬手書皆呪詛巫蠱之言得所埋上形像於宫内道育叛亡捕之不得上詰責劭濬劭濬惟陳謝而已道育變服為尼逃匿東宫濬徃京口又以自随或出止親人張旿家後濬}
  - {type: page-break, offset: 4053, content: '', id: KR3k0012_WYG_735-11a, image: WYG0899/WYG0899-0482c.png}
  - {type: variant, offset: 4054, length: 10, content: 富貴祚涉歷經史習崔浩, WYG: 鎮江陵復載道育還東宫欲將西上有告上云京口張旿家有一尼服食出入征北内似嚴道育上使掩得二婢云道育随征北還都上惆悵驚惋劭殺逆後孝武平亂不見𫝊國璽問劭云在嚴道育處就取得}
  - {type: page-break, offset: 4054, content: '', id: KR3k0012_WYG_735-11b, image: WYG0899/WYG0899-0482d.png}
