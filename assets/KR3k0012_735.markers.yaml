  - {type: variant, offset: 15, length: 2, content: 事無, SBCK: 占骨法吉凶之氣故見其兆徵徵應也告列子列子行泣報壺子列子鄭之隱士也壺子弟子報白者也壺子持以天壤言精神天之有也}
