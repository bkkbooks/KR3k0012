  - {type: variant, offset: 2107, length: 1274, content: 代廷尉為法名家又曰宋均為九江太守陵道縣有虞后二山人共祠之眾巫遂取百姓男女以為公嫗以男為山公以女為山嫗猶祭之尸主也歲歲改易既而不敢嫁娶前後守令莫敢禁均乃下書曰自今以後為山娶者娶巫家勿擾良人於是遂絕又曰安丘望之字仲都京兆長陵人少時學老子經恬靜不求進官號曰安丘丈人成帝聞欲見望之辭不肯見為巫醫於人閒也獻帝起居注曰李儒性喜鬼怪左道之術常有道人女巫繫下神祭六丁符劾厭勝之具無不為又於朝廷省門外為董卓作神坐數以牛羊祠之天子使左中郎將李國持節拜𠐶為大司馬在三公之右𠐶自為得鬼神之助乃厚賜諸巫東觀漢記曰高鳳年老執志不倦名聲著聞太守連召請恐不得免自言本巫家不應為吏又曰班超使西域于闐王廣德超至禮意甚踈其俗信巫言神怒何故向漢漢使有驪馬急求取以祠我廣德就超請馬超許之而令巫自來取馬有頃巫至超即斬其首送廣德因辭讓之吳志曰景帝有疾求視鬼者得一人景帝欲試之乃殺鵝而埋之於中架小屋施床机以婦人紙履服物著其上乃使覡視之告曰若能說此冢中鬼形狀者即信當厚賜加賞矣竟日盡夕無言帝問之急乃曰實不見有鬼但見一白鵝立墓上所以不即白之者疑是鬼神變化作此想當候其真形而定無復移易不知何故不敢不以實上聞景帝乃厚賜之晉書曰夏統字仲御從父敬寧祠先人迎女巫章丹陳珠二人並有國邑裝服甚麗善歌舞又能隱形匿景甲夜之初撞鍾擊鼓閒以絲竹丹珠乃大破舌吞刀吐火雲霧杳冥流火電發統諸從兄弟欲往觀之難統於是共紿之曰從父閒疾病得瘳大小以為喜欲因其祭祀並往賀之卿可俱行乎統從之入門忽見丹珠在中庭輕步徊舞靈談鬼笑飛觴挑柈酬酢翩翻統驚愕而走不由門破藩直出又曰武悼楊后既為賈后所幽死賈后又信妖巫謂太后必訢冤先帝乃覆而殯之施諸厭劾符書藥物李矩屯于榮陽劉聰遣從弟暢步騎三萬討矩屯于韓王故壘時暢卒至城東未暇為備遣使奉牛酒許降于暢暢大饗渠帥人皆醉飽知矩謀夜襲之兵士以賊眾皆有懼色矩令郭誦禱鄭子產曰君昔相鄭惡鳥不鳴凶胡臭羯何得過庭使巫揚言東里有教當遣神兵相助將士聞之昔踊躍爭進又載記曰石虎太子邃保母劉芝初以巫術進及養邃有深寵通賄賂豫言論權傾朝廷親貴多出其門封芝為宜城君又曰李雄母羅氏雄信巫覡之言多有忌諱至欲不葬其母司空趙肅諫之宋書曰前廢帝子業好遊華林園竹林堂使婦人倮身相逐有一婦人不從命斬之後經少時夜夢遊後堂有一女子罵曰爾悖虐不道明年不及熟矣帝怒遂於宮中求得似所夢者戮之其夕復夢所戮女罵曰汝枉殺我以訴上帝至是巫云此堂有鬼帝日與陰山公主及六宮綵女數百人隨群巫捕鬼屏除侍衛帝親自射之又曰王僧綽豫參朝政從兄微懼其太盛勸令損抑僧綽乃求吳郡及廣州會巫蠱事泄上先召儈綽具以言之又曰明帝選王儉尚陽羨公主拜駙馬都尉帝以儉嫡母武康主因太初巫蠱事不可以為婦姑欲開冢離葬儉因人自陳密以死請故事不行齊書曰鬱林王在西州令女巫揚氏禱祝速求大位及文惠薨謂由楊氏之力倍加敬信呼揚婆宋氏己來人閒有揚婆兒歌蓋此徵也武帝有疾又命揚氏日夜祈禱又曰明帝身衣絳衣服飾皆赤以為厭勝巫覡云後湖水頭經過宮內致帝有疾帝乃自至太官水溝左右啟太官無水則不立決意塞之欲南引淮流會崩事寢又曰東昏侯偏信蔣侯迎來入宮晝夜祈禱左右朱光尚詐云見神動輒諮啟並云降福遂加位國朱又為靈帝車服羽儀一依王者又曲信小祠日有, SBCK: ''}
