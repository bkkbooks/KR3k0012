  - {type: variant, offset: 2503, length: 1364, content: 能說此冢中鬼形狀者即信當厚賜加賞矣竟日盡夕無言帝問之急乃曰實不見有鬼但見一白鵝立墓上所以不即白之者疑是鬼神變化作此想當候其真形而定無復移易不知何故不敢不以實上聞景帝乃厚賜之晉書曰夏統字仲御從父敬寧祠先人迎女巫章丹陳珠二人並有國邑裝服甚麗善歌舞又能隱形匿景甲夜之初撞鍾擊鼓閒以絲竹丹珠乃大破舌吞刀吐火雲霧杳冥流火電發統諸從兄弟欲往觀之難統於是共紿之曰從父閒疾病得瘳大小以為喜欲因其祭祀並往賀之卿可俱行乎統從之入門忽見丹珠在中庭輕步徊舞靈談鬼笑飛觴挑柈酬酢翩翻統驚愕而走不由門破藩直出又曰武悼楊后既為賈后所幽死賈后又信妖巫謂太后必訢冤先帝乃覆而殯之施諸厭劾符書藥物李矩屯于榮陽劉聰遣從弟暢步騎三萬討矩屯于韓王故壘時暢卒至城東未暇為備遣使奉牛酒許降于暢暢大饗渠帥人皆醉飽知矩謀夜襲之兵士以賊眾皆有懼色矩令郭誦禱鄭子產曰君昔相鄭惡鳥不鳴凶胡臭羯何得過庭使巫揚言東里有教當遣神兵相助將士聞之昔踊躍爭進又載記曰石虎太子邃保母劉芝初以巫術進及養邃有深寵通賄賂豫言論權傾朝廷親貴多出其門封芝為宜城君又曰李雄母羅氏雄信巫覡之言多有忌諱至欲不葬其母司空趙肅諫之宋書曰前廢帝子業好遊華林園竹林堂使婦人倮身相逐有一婦人不從命斬之後經少時夜夢遊後堂有一女子罵曰爾悖虐不道明年不及熟矣帝怒遂於宮中求得似所夢者戮之其夕復夢所戮女罵曰汝枉殺我以訴上帝至是巫云此堂有鬼帝日與陰山公主及六宮綵女數百人隨群巫捕鬼屏除侍衛帝親自射之又曰王僧綽豫參朝政從兄微懼其太盛勸令損抑僧綽乃求吳郡及廣州會巫蠱事泄上先召儈綽具以言之又曰明帝選王儉尚陽羨公主拜駙馬都尉帝以儉嫡母武康主因太初巫蠱事不可以為婦姑欲開冢離葬儉因人自陳密以死請故事不行齊書曰鬱林王在西州令女巫揚氏禱祝速求大位及文惠薨謂由楊氏之力倍加敬信呼揚婆宋氏己來人閒有揚婆兒歌蓋此徵也武帝有疾又命揚氏日夜祈禱又曰明帝身衣絳衣服飾皆赤以為厭勝巫覡云後湖水頭經過宮內致帝有疾帝乃自至太官水溝左右啟太官無水則不立決意塞之欲南引淮流會崩事寢又曰東昏侯偏信蔣侯迎來入宮晝夜祈禱左右朱光尚詐云見神動輒諮啟並云降福遂加位國朱又為靈帝車服羽儀一依王者又曲信小祠日有十數巫師魔媼迎送紛紜光尚輒託云神意范雲謂光尚曰君是天子要人當思百全計光尚曰至尊不可諫止當託神鬼以達意耳後東入樂遊人馬忽驚以問光尚光尚曰先帝大瞋不許數出帝大怒拔刀與光尚尋覔既不見處乃縛菰為明帝形北面斬之又曰諸暨東洿里屠氏女父失明母有痼病疾親戚相棄鄉里不容女移父母遠住紵舍晝採樵夜紡績以供養父母俱卒親營殯葬負土成墳忽空中聲云汝性可重山神欲相驅使汝可為人療病必得大富女謂是魃魅弗敢從遂得病積時鄰舍人有溪蜮毒者女試療之自覺病便差遂以巫道為人療病無不愈家產日益鄉里多欲娶之女以無兄弟誓守墳墓不嫁又曰武陵王曅為祠部尚書巫覡或言曅有非常之相以此自負武帝聞之故無寵未常處方岳焉又曰王敬則母為女巫常謂人云敬則生時胞衣紫色後應得嗚鼓角人笑之曰汝子得為人吹角可矣後果封侯給鼓吹又曰袁君政字世忠為豫章內史性不信巫邪有師世榮稱道術為一郡巫長君政在郡小疾主簿熊丘薦之師云須疾者衣為信命君政以所著襦與之事竟取襦云神將送與北斗君政使檢諸身於衣裏獲之以為亂政即刑於市而焚神一郡無敢行巫梁書曰沈約病夢齊和帝劍斷其舌令巫視之言如夢乃呼道士奏赤章於天稱禪代之事不由己出又曰元帝背生黑子巫媼見曰此大貴不可言又曰蔡撙, WYG: 雷庾楷}
