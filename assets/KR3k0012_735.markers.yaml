  - {type: variant, offset: 1547, length: 233, content: 曰起巫立越祀而以雞卜上信之漢書曰音義曰持雞雞卜如鼠卜矣又曰孝武帝天漢二年秋上禁巫祠道中者文頴曰始漢家於道中祠排禍咎移之於行人百姓以其不經今止之也後漢書曰樊崇等至弘農與更始諸將連戰剋勝眾遂大集乃分萬人為一營凡三十營置三老從事各一人進至華陰軍中常有齊巫鼓舞祠城陽景王以求福助以其定諸呂安社稷故郡國多為立祠焉盆子承其後故軍中祠之也巫言景王大怒曰當為縣官何故作賊縣官謂天子也有笑巫者輒病軍中驚動時方望弟陽怨更始殺其兄乃逆說崇等曰更始荒亂令不行故使將軍得至於此今將軍擁百萬之眾, SBCK: 畫我形像縛手掫頭仍云}
