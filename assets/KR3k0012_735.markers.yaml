  - {type: 'tls:seg', offset: 13, content: '', id: KR3k0012_CHANT_735-1a.6}
  - {type: variant, offset: 13, length: 0, content: '', SBCK: 竟依仁㑹所奏又日李德􅁉爲浙西觀察使德􅁉壯年得位銳於報政凡舊俗之害民者悉革其弊江嶺之閒信巫祝惑􅀑怪有父母兄弟厲疾者舉室弃之而去德裕欲變其風擇鄉人之有識者諭之以言繩之以法數年之閒弊風頓革屬郡祠廟按方志前代名臣賢后則祠之四郡之内除淫祠一二千所又罷私邑山房一千四百六十以淸宼盜人樂其政優詔嘉之又日劉禹錫貶朗州司馬比居西南夷土風僻陋舉目殊俗無與言者禹錫在郞十年唯以文章吟詠陶冶情性蠻俗好巫毎淫祠舞皷必歌俚辭禹錫或從事於其閒乃依騷人之作爲新辭以教巫祝故武陵谿洞閒夷歌率多禹錫之辭也荘子日鄭有神巫日季咸知人生死鄭人見之皆弃走列子見之而心醉歸又日小巫見大巫拔茅而弃此其所以終身弗如也淮南子日鄭之神巫相壺子林見其徵在男日覡在}
  - {type: page-break, offset: 13, content: '', id: KR3k0012_SBCK_735-3a}
  - {type: variant, offset: 13, length: 2, content: 女能, WYG: 竟依仁㑹所奏又曰李德裕為浙西觀察使徳裕壯年得位銳於報政凡舊俗之害民者悉革其弊江嶺之間信巫祝惑鬼怪有父母兄弟厲疾者舉室棄之而去德裕欲變其風擇鄉人之有識者諭之以言繩之以法數月之間弊風頓革屬郡祠廟按方志前代名臣賢后則祠之四郡之内除滛祠一二千所又罷私邑山房一千四百六十以清冦盗人樂其政優詔嘉之又曰劉禹錫貶朗州司馬比居西南夷土風僻陋舉目殊俗無與言者禹錫在朗十年惟以文章吟詠陶冶情性蠻俗好巫每滛祠舞鼓必歌俚辭禹錫或從}
  - {type: page-break, offset: 13, content: '', id: KR3k0012_WYG_735-4b, image: WYG0899/WYG0899-0479b.png}
  - {type: variant, offset: 13, length: 0, content: '', krp: 竟依仁㑹所奏又日李德𥙿爲浙西觀察使德𥙿壯年得位銳於報政凡舊俗之害民者悉革其弊江嶺之閒信巫祝惑鬼怪有父母兄弟厲疾者舉室弃之而去德裕欲變其風擇鄉人之有識者諭之以言繩之以法數年之閒弊風頓革屬郡祠廟按方志前代名臣賢后則祠之四郡之内除淫祠一二千所又罷私邑山房一千四百六十以淸宼盜人樂其政優詔嘉之又日劉禹錫貶朗州司馬比居西南夷土風僻陋舉目殊俗無與言者禹錫在郞十年唯以文章吟詠陶冶情性蠻俗好巫毎淫祠舞皷必歌俚辭禹錫或從事於其閒乃依騷人之作爲新辭以教巫祝故武陵谿洞閒夷歌率多禹錫之辭也荘子日鄭有神巫日季咸知人生死鄭人見之皆弃走列子見之而心醉歸又日小巫見大巫拔茅而弃此其所以終身弗如也淮南子日鄭之神巫相壺子林見其徵在男日覡在}
