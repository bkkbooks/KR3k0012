  - {type: variant, offset: 319, length: 0, content: '', SBCK: 武帝時有神雀下丞相御史中丞二千石諫議臣􅀶士皆上壽東方朔獨不賀帝曰群臣皆賀而獨不賀何也對曰恐後有巫爲國害者朔因謝疾去其後卒有巫蠱之事不知朔竟所終也􅁊子新論曰皆楚靈王驕逸輕下信巫祝之道躬儛壇前吳人來攻其國人告急而靈王鼓舞自若異苑曰曹娥父能􅃶歌爲巫五月五日於西江泝濤迎婆娑神溺死不得屍娥年十四縁江號哭七日遂投江求之而死幽明錄曰董卓信巫軍中常有巫都言禱求福利言從卓求布倉卒無布有手巾言曰可用耳取便書巾上如作兩口一口大一口小相累以舉謂卓日愼此也卓後爲吕布所殺後人則知況吕布也又曰大元年中臨海有巫李不知所由來能卜相作水符治病多愈亦禮佛讀經語人云明年天下當大疫此境尢劇又二紀之後此􅀖之西北大郡殭尸横路時汝南周叔道罷臨海令權停家巫云周令今去不冝南行必當暴死便指北山曰後二十日此山應有異則其事彰也後十餘日大石夜頽落百丈碎磕若雷􅁃揩爲臨海太守過詣周殷饌作伎至夜􅁃還舫中天曉􅁃自披屏風呼叔道何癡不起左右撫看氣絕乆矣到明年縣内病死者數千又曰巴丘縣有巫師舒禮}
