  - {type: variant, offset: 790, length: 666, content: 則可逞獻子許諾晉伐齊又曰公在楚楚人使公親襚公患之穆叔曰祝殯而襚則布幣也先使巫祝除殯之凶邪而行襚禮與朝而布幣無異乃使巫以桃茢先袨殯茢黍穰楚人弗禁既而悔之書曰敢有恒舞于宮酣歌于室時謂巫風諭語曰人而無恒不可以作巫醫史記曰魏文侯時西門豹為鄴令往到鄴會長老問民之疾苦長老云苦於河伯娶婦以故貧豹問其故對曰鄴三老廷掾常歲歛百姓取其錢數百萬用其二三十萬為河伯娶婦與巫共分其餘錢持歸當其時巫行視小家女好者云是當為河伯婦即娉取洗沐為治新繒綺縠之衣閒居齋戒為治齊宮河上張緹絳帳帷女居其中為具牛酒飯食十餘日共粉飾之如嫁女床席令女居其上浮之河中始浮行數十里乃沒其人家有好女者恐大巫祝為河伯取之以故多持女遠逃亡以故城中益空無人又貧困所從來久遠矣民人俗語曰即不為河伯娶婦水來漂溺人民西門豹曰至為河伯娶婦時願與三老巫祝父老送女河上幸來告語之吾欲往送女皆曰諾至其時西門豹往會之河上三老者官屬豪長父老皆會與人民觀之者三二千人其巫老女子也年七十從弟子女十人所衣皆繒單衣立大巫旁西門豹曰呼河伯婦來視其好醜即將女出帷中來至前豹視之顧謂三老巫祝父老女子曰是女不好煩大巫嫗為入報河伯更求好女後日送之即使卒共抱女巫嫗投之河中有頃曰巫嫗何久也弟子趨之復以弟子一人投河中有頃曰弟子何久也復使一人趨之復投一弟子河中凡三弟子西門豹曰巫嫗弟子女也不能白事煩三老入白之復投三老河中西門豹簪筆罄折嚮河立待良久長老吏旁觀者皆為驚恐西門豹顧曰巫嫗三老不來還奈之何復使廷掾與豪長一人趨之皆叩頭且破額血流地色若死灰西門豹曰諾且留待之須臾豹曰廷掾起矣河伯留之久也皆罷去歸鄴吏民大驚恐是後不敢復言河伯娶婦又, WYG: 朔𫝊}
