  - {type: variant, offset: 319, length: 0, content: '', krp: 武帝時有神雀下丞相御史中丞二千石諫議臣博士皆上壽東方朔獨不賀帝曰群臣皆賀而獨不賀何也對曰恐後有巫爲國害者朔因謝疾去其後卒有巫蠱之事不知朔竟所終也桓子新論曰皆楚靈王驕逸輕下信巫祝之道躬儛壇前吳人來攻其國人告急而靈王鼓舞自若異苑曰曹娥父能絃歌爲巫五月五日於西江泝濤迎婆娑神溺死不得屍娥年十四縁江號哭七日遂投江求之而死幽明錄曰董卓信巫軍中常有巫都言禱求福利言從卓求布倉卒無布有手巾言曰可用耳取便書巾上如作兩口一口大一口小相累以舉謂卓日愼此也卓後爲吕布所殺後人則知況吕布也又曰大元年中臨海有巫李不知所由來能卜相作水符治病多愈亦禮佛讀經語人云明年天下當大疫此境尢劇又二紀之後此邦之西北大郡殭尸横路時汝南周叔道罷臨海令權停家巫云周令今去不冝南行必當暴死便指北山曰後二十日此山應有異則其事彰也後十餘日大石夜頽落百丈碎磕若雷庾揩爲臨海太守過詣周殷饌作伎至夜庾還舫中天曉庾自披屏風呼叔道何癡不起左右撫看氣絕乆矣到明年縣内病死者數千又曰巴丘縣有巫師舒禮}
  - {type: variant, offset: 320, length: 1, content: 侯, SBCK: 永昌元年病死土地神將送詣太山俗人謂巫師爲道人也人過禮舎門前土地神問吏此是何等舎門吏曰道人舎土地神曰是人亦是道人便以相付禮入門見閒瓦皆縣竹簾自然床榻男女異處有誦經者唱偈者然飲食快樂不可言禮文書名己至太山門而又身不到推入土地神云道見數千閒瓦屋卽問吏言女道人卽以付之於是遣神卽録取禮觀未遍見有一人八手四眼捉金杵遂欲撞之便怖走還出門神己在門迎捉送太山太山府君問禮卿在世閒昔何所爲禮日事一萬六千神爲人解除祠祀或殺牛犢猪羊鷄鴨府君日汝罪應上􅀬􅆈便牽著熬所見一物牛頭人身捉鐵叉义禮著熬上宛轉身體燋爛求死不死一宿二日府君問主者禮壽命應盡爲頓奪其命校録籍餘筭八年乃命將録來牛頭復以鐵义义著熬邊府君日今遣􅀸歸終畢餘笇勿後殺生淫祠禮乃還活不復爲巫師江氏家傳日江統爲太子洗馬諫愍懷太子日臣聞土者民之主用播殖築室營都建邑皆有明制著在經典而無禁忌犯害之文唯末俗小巫乃有此言巫書乃禁入地三尺有四時方面不皆禁也竊見禁土令不得繕治壇垣動移屋瓦臣等以爲此違典義不可爲永制兩京記曰宜政門内日宣政殿初成毎見數十騎馳突岀沒髙宗使巫祝劉門奴問其所以鬼云我漢楚王戊太子死葬於此門奴日按漢書戊與七國反誅死無後焉得葬此􅀑日我當時入朝以路遠不隨後坐病死天子於此葬我漢書自遺誤耳門奴因宣詔欲爲}
