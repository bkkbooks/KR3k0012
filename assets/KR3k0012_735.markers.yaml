  - {type: variant, offset: 59, length: 0, content: '', SBCK: 狗入室果呼之日富出巫日不祥也家果大禍長子死哭曰樂乎而不似悲也吕氏春秋曰管仲病􅁊公問焉仲曰願君遠易牙竪刁常之巫公子啓方公日常之巫能審於死生子痾猶疑耶仲日死生命也病是天也君不守其本而恃巫彼將以此無不爲也及公病常之巫曰公以某日薨易牙等作亂公嘆曰死若有知何面目以見仲父蒙面而死山海經曰大荒中有靈山巫咸巫卽巫朌巫彭巫姑巫眞巫禮巫搥巫謝坐羅十人從此升降百樂爰在}
  - {type: variant, offset: 59, length: 0, content: '', WYG: 狗入室果呼之曰富出巫曰不祥也家果大禍長子死哭曰樂乎而不似悲也吕氏春秋曰管仲病桓公問焉仲願君遠易牙􅆆刁常之巫公子啓方公曰常之巫能審於死生子疴猶疑耶仲曰死生命也病是天也君不守其本而侍晉彼將以此無不為也及公病常之巫曰公以某日薨易牙等作亂公嘆曰死若有知何面目以見仲父䝉面而死山海經曰火龍中有靈山巫咸巫即巫眠巫彭巫姑巫真巫禮巫搥巫謝巫羅十人從此升降百樂爰在}
