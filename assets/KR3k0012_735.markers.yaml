  - {type: punctuation, offset: 10, content: 「, id: KR3k0012_CHANT_735-bkkpn4}
  - {type: variant, offset: 10, length: 0, content: '', SBCK: 初發本部來日將巫師兩人來云此行大安穩然不與唐家兵馬􅃲見一大人卽歸今日領兵見令公令公不爲疑脫去衣甲單騎相見誰有此心膽是不戰􅃲見一大人巫師有徵矣歡躍乆之子儀撫其背首領等分纆頭綵以賞巫師又日朔方先鋒兵馬使南陽郡王白元光與迴紇合兵於涇州靈臺縣西共破吐蕃等十萬餘衆初白元光等到靈臺縣西探知賊勢爲月明思少陰晦迴紇使巫師便致風雪及遲明戰吐蕃盡寒凍弓矢皆廢披氊徐進元光與廻紇隨而殺之又日大暦九年七月乆旱是日澍雨豐霈初京兆尹黎幹以旱故祈雨於朱雀街造土龍悉召城中巫覡更舞觀者駭􅀏又日房孺復故太尉琯之孽子年二十淮南陳少由辟爲從事多招陰陽巫覡令楊言已身過三十必爲宰相又日貞元中昭義節度使李抱眞以乆疾爲}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_SBCK_735-2a}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_SBCK_735-2b}
  - {type: variant, offset: 10, length: 0, content: '', WYG: 永太中廻紇首領羅達干等率其衆詣涇陽請降郭子儀許之因去甲胄與之相見既而子儀先執杯合胡禄都督請呪子儀呪曰大唐天子萬萬嵗廻紇可汗亦萬嵗兩國將相亦萬萬嵗若起負心違背盟約者身死陣前家口屠戮合胡禄都督等失色及杯至即譯曰如令公盟約皆喜曰初發本部來日將巫師兩人來云此行大安穏然不與唐家兵馬閗見一大人即歸今日領兵見令公令公不為疑脱去衣甲單騎相見誰有此心膽是不戰闘見一大人巫師有徵矣歡躍久之子儀撫其背首領等分纒頭彩以賞巫師又曰朔方先鋒兵馬使南陽郡王白元光與廻紇合兵於涇州靈臺縣西共破吐蕃等十萬餘衆初白元光等到靈臺縣西探知賊勢為月明思少隂晦廻紇使巫師便致風雪及遲明戰吐蕃盡寒凍弓矢皆廢披氊徐進元光與廻紇随而殺之又曰大厯九年七月久旱是日㴻雨豐霈初京兆尹黎幹以旱故祈雨於朱雀街造玉龍悉召城中巫覡更舞觀者駭笑又曰房儒復故太尉琯之孽子年二十淮南陳少由辟為從事多招隂陽巫覡令揚言已身過三十必為宰相又曰貞元中昭義節度使李抱真以久病為}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_WYG_735-2b, image: WYG0899/WYG0899-0478b.png}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_WYG_735-3a, image: WYG0899/WYG0899-0478c.png}
