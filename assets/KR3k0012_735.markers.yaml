  - {type: variant, offset: 3382, length: 1258, content: 數巫師魔媼迎送紛紜光尚輒託云神意范雲謂光尚曰君是天子要人當思百全計光尚曰至尊不可諫止當託神鬼以達意耳後東入樂遊人馬忽驚以問光尚光尚曰先帝大瞋不許數出帝大怒拔刀與光尚尋覔既不見處乃縛菰為明帝形北面斬之又曰諸暨東洿里屠氏女父失明母有痼病疾親戚相棄鄉里不容女移父母遠住紵舍晝採樵夜紡績以供養父母俱卒親營殯葬負土成墳忽空中聲云汝性可重山神欲相驅使汝可為人療病必得大富女謂是魃魅弗敢從遂得病積時鄰舍人有溪蜮毒者女試療之自覺病便差遂以巫道為人療病無不愈家產日益鄉里多欲娶之女以無兄弟誓守墳墓不嫁又曰武陵王曅為祠部尚書巫覡或言曅有非常之相以此自負武帝聞之故無寵未常處方岳焉又曰王敬則母為女巫常謂人云敬則生時胞衣紫色後應得嗚鼓角人笑之曰汝子得為人吹角可矣後果封侯給鼓吹又曰袁君政字世忠為豫章內史性不信巫邪有師世榮稱道術為一郡巫長君政在郡小疾主簿熊丘薦之師云須疾者衣為信命君政以所著襦與之事竟取襦云神將送與北斗君政使檢諸身於衣裏獲之以為亂政即刑於市而焚神一郡無敢行巫梁書曰沈約病夢齊和帝劍斷其舌令巫視之言如夢乃呼道士奏赤章於天稱禪代之事不由己出又曰元帝背生黑子巫媼見曰此大貴不可言又曰蔡撙為臨海太守有百姓楊元孫以婢採蘭貼與同里正黃權約生子酬乳哺直權死後元孫就權妻吳氏贖婢吳背約不還元孫訴樽判還本主吳能為巫出入撙內以金釧賂撙妾遂改判與吳元孫撾登聞鼓訟之為有司劾時撙已去郡雖不坐而常以為恥又曰王神念為青冀二州剌史性剛正所更州郡必禁止淫祠時東北有石鹿山臨海有神廟祅巫欺惑百姓遠近祈禱縻費極多及神念至便令毀拆風俗遂改後魏書曰郭祚少而孤貧姿貌不偉鄉人莫之識也有女巫許相後當富貴祚涉歷經史習崔浩之書尺牘文章見稱於世舉秀才對策上第拜中書士累遷黃門侍郎又曰定州流人解思安其兄慶賓懼後追責規絕名貫乃認城外死屍詐稱其弟為人所殺迎歸殯葬頗類思安見者莫辨又有女巫揚氏自云見鬼說思安被害之苦飢渴之意慶賓又誣疑同軍兵蘇顯甫李蓋等所害經州訟之二人不勝楚毒各自款引獄將決竟李崇疑而停之密遣二人非州內所識者偽從外來詣慶賓告曰僕往在北州去此三百有一人見過寄宿夜中共語疑其有異便即詰問跡其由緒乃云是流兵背役逃走姓解字思安時欲送官苦見求及稱有兄慶賓今住楊州相國城內更姓徐君脫矜愍為往告報見申委曲家兄聞此必重相報所有資才當不愛惜今但見質若往不獲送官何晚是故相造伸此意君欲見雇幾何當放賢弟若其不信可見隨看之慶賓帳然失色求其少停當備財物此人具以報崇攝慶賓問曰爾弟逃亡何故妄認他屍慶賓伏引更問蓋等乃云自誣數日之間思安亦為人糺送崇召女巫視之鞭笞一百崇斷獄精審皆此類也三國典略曰初齊神武之克鄴城於北臺上建立神祠盍布衣時所事也每祠之日唯與巫潘嫗及數人行事親自神宰割外無見者至是齊主焚除此廟并擲巫於火令燒殺之又曰齊高緯夜夢黑衣貴人送相驅逐乃向之拜巫者烏大以厭之又於芳林園自著破衣裳為窮兒入市躬自交易焉築西鄙諸城為羌兵鼓譟凌之多作黑衣人共相執縛親率內參臨拒或實彎弓射人自晉陽東巡單馬馳騖前不得有人解髮散而歸又曰崔季舒未遇害家池蓮莖化為人面著鮮卑帽妻晝魘魘寤云見人長一丈遍體黑毛欲來逼己巫曰此是, SBCK: ''}
