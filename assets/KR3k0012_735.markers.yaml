  - {type: variant, offset: 77, length: 223, content: 禮男巫掌望祀望衍授號旁招以茅女巫掌歲時祓除釁浴旱暵則舞雩若王后弔則與祝前凡邦之大烖歌哭而請禮曰君臨臣喪以巫祝桃茢執弋惡之為有凶邪之氣在側君聞大夫之喪去樂卒事而往未襲也其己襲則止巫去祧茢鬼所惡茢萑苕可掃不祥所以異於生也又曰襄公朝于荊康王卒荊人曰必請襲欲使襄之公依魯人曰非禮也荊人強之巫先桃茢荊人悔之巫祝桃茢君臨臣喪之禮又曰歲旱穆公召縣子而問然曰天久不雨吾欲暴巫而奚若曰天則不雨而望之愚婦人於以求之母乃已䟽乎已猶甚也巫主接神亦覡天哀而雨之春秋傳說巫曰, SBCK: ''}
