  - {type: variant, offset: 4091, length: 407, content: 又曰定州流人解思安其兄慶賓懼後追責規絕名貫乃認城外死屍詐稱其弟為人所殺迎歸殯葬頗類思安見者莫辨又有女巫揚氏自云見鬼說思安被害之苦飢渴之意慶賓又誣疑同軍兵蘇顯甫李蓋等所害經州訟之二人不勝楚毒各自款引獄將決竟李崇疑而停之密遣二人非州內所識者偽從外來詣慶賓告曰僕往在北州去此三百有一人見過寄宿夜中共語疑其有異便即詰問跡其由緒乃云是流兵背役逃走姓解字思安時欲送官苦見求及稱有兄慶賓今住楊州相國城內更姓徐君脫矜愍為往告報見申委曲家兄聞此必重相報所有資才當不愛惜今但見質若往不獲送官何晚是故相造伸此意君欲見雇幾何當放賢弟若其不信可見隨看之慶賓帳然失色求其少停當備財物此人具以報崇攝慶賓問曰爾弟逃亡何故妄認他屍慶賓伏引更問蓋等乃云自誣數日之間思安亦為人糺送崇召女巫視之鞭笞一百崇斷獄精審皆此類也三國典略曰初齊神武之克鄴城於北臺上建立神祠盍布衣時所事也每祠之日唯與巫潘嫗及數人行事親自神宰割外無見者至是齊主焚除此廟并擲巫於火令燒殺, WYG: 牛宏窮騐}
