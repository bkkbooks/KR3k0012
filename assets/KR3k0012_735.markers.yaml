  - {type: variant, offset: 5, length: 0, content: '', WYG: 里不得採樵又曰肅宗重隂陽鬼神之事或命}
  - {type: variant, offset: 5, length: 0, content: '', krp: 里不得採樵又日肅宗重陰陽鬼神之事或命}
  - {type: variant, offset: 6, length: 3, content: 上說文, SBCK: 媪乘駟行郡縣爲厭勝之術有祅人王璵遂以左道爲相代宗亦篤信之凡所脩築動牽禁忌而姧人黎幹得以左道尹京又内集衆工編刺珠繡爲御衣旣成而焚之爲穰除法且無虛月又日永太中迴紇首領羅達干等率其衆詣涇陽謂降郭子儀許之因去甲冑與之相見旣而子儀先執杯合胡禄都督請呪子儀呪日大唐天子萬萬歲迴紇可汗亦萬萬歳兩國將相亦萬萬歲若起􅀒心違背盟約者身死陣前家口屠戮合胡禄都督等失色及杯至卽譯日如令公盟約皆喜}
  - {type: variant, offset: 6, length: 3, content: 上說文, WYG: 媪乘駟行郡縣為厭勝之術有祓人王璵遂以左道為相代宗亦篤信之凡所修築動牽禁忌而奸人黎幹得以左道尹京又内集衆工編刺珠綉為御衣既成而焚之為穰除法且無虛月又}
  - {type: variant, offset: 6, length: 3, content: 上說文, krp: 媪乘駟行郡縣爲厭勝之術有祅人王璵遂以左道爲相代宗亦篤信之凡所脩築動牽禁忌而姧人黎幹得以左道尹京又内集衆工編刺珠繡爲御衣旣成而焚之爲穰除法且無虛月又日永太中迴紇首領羅達干等率其衆詣涇陽謂降郭子儀許之因去甲冑與之相見旣而子儀先執杯合胡禄都督請呪子儀呪日大唐天子萬萬歲迴紇可汗亦萬萬歳兩國將相亦萬萬歲若起負心違背盟約者身死陣前家口屠戮合胡禄都督等失色及杯至卽譯日如令公盟約皆喜}
