  - {type: variant, offset: 10, length: 0, content: '', krp: 初發本部來日將巫師兩人來云此行大安穩然不與唐家兵馬鬪見一大人卽歸今日領兵見令公令公不爲疑脫去衣甲單騎相見誰有此心膽是不戰鬪見一大人巫師有徵矣歡躍乆之子儀撫其背首領等分纆頭綵以賞巫師又日朔方先鋒兵馬使南陽郡王白元光與迴紇合兵於涇州靈臺縣西共破吐蕃等十萬餘衆初白元光等到靈臺縣西探知賊勢爲月明思少陰晦迴紇使巫師便致風雪及遲明戰吐蕃盡寒凍弓矢皆廢披氊徐進元光與廻紇隨而殺之又日大暦九年七月乆旱是日澍雨豐霈初京兆尹黎幹以旱故祈雨於朱雀街造土龍悉召城中巫覡更舞觀者駭笑又日房孺復故太尉琯之孽子年二十淮南陳少由辟爲從事多招陰陽巫覡令楊言已身過三十必爲宰相又日貞元中昭義節度使李抱眞以乆疾爲}
