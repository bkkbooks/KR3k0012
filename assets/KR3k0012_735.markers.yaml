  - {type: variant, offset: 4066, length: 2, content: 尺牘, WYG: 曰蕭紀舉岷蜀之衆由外水而下湘東王命方士伯人於長州苑板上畫紀形像親下鐡符釘于支體以厭之陳書曰後主隂令人告長沙王叔堅厭魅刻木偶人衣以道士衣施機關能拜跪畫夜於星月下醮之呪詛於上又令上書告其事案騐令實後主召叔堅内於西省後赦之免所居官北齊書曰初立太子恒母𢎞德夫人穆氏為后大赦國内初斛律后之廢也陸令萱欲以穆氏代之祖班請立胡昭儀為后胡太后亦卑辭厚禮以求令萱以胡氏寵幸方睦不得已而白齊主立之然意在穆氏每私謂齊主云豈有男為太子而身婢妾乃求左道行厭蠱之術旬朔之間胡后遂即精神恍惚言笑無恒齊主漸畏惡之於是立穆氏隋書曰獨孤陁性好左道其外祖母髙氏先事猫鬼已殺其男郭沙羅因入其家上㣲聞而不信㑹獻皇后及楊素妻鄭氏俱有疾召醫視之皆曰此猫鬼疾上以陁后之異母弟陁妻楊素之異母妹由是意陁所為隂令其兄穆以情喻之上又避左右諷陁陁言無有上不悅左遷出怨言上令髙碩蘇威大理正皇甫孝緒大理丞楊遠等推案陁婢徐阿尼言本從陁母家來常事猫鬼每以子日夜祀之言子者䑕也其猫鬼每殺人者所死家財物潜移於蓄猫鬼家陁常從家中索酒其妻曰無錢可酤陁因謂阿尼曰可令猫鬼向越公家使我足錢阿尼便呪之居數日猫鬼向素家後上初從并州還陁於園中謂阿尼曰可令猫鬼向皇后所使賜吾物阿尼復呪之遂入宫中楊逺乃於門下外省遣阿尼呼猫鬼阿尼於是夜中置香粥一盆以匙扣而呼曰猫女可來無住宫中久之阿尼色正青若被牽曳者云猫鬼已至上以事下公卿奇章公牛𢎞曰妖由人興殺其人可以絶矣令以犢車載陁夫妻將賜死於其家陁弟整詣闕求哀於是免陁死除名以其妻楊氏為尼先是人訟其母為人猫鬼所殺者上以為妖妄怒而遣之及此詔追行猫鬼家陁未幾而卒又曰滕王瓉子綸當}
