  - {type: variant, offset: 3872, length: 0, content: '', WYG: 過詣周設饌作伎至夜庾還舫中天曉庾自披屏風呼叔道何癡不起左右撫看氣絶久矣到明年縣内病死者數千餘又曰巴丘縣}
