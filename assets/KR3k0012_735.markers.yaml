  body:
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 六巫下厭蠱巫下唐書日薛舉寇幽􅄮之地太宗征之劉文靜殷開山與舉戰於高墌音隻城西南爲舉所敗衛尉郝璦勸舉秉勝直指長安舉然之臨發而遇疾召巫視之巫言唐兵爲崇舉惡之未幾而死又日劉文靜性嗜酒與其弟文起酣飲岀怨言拔刀斫柱日會當斬裴寂頭耳家中妖怪數見文起憂之遂召巫者於星月之下被髮銜刀爲厭勝之法其愛妾失寵以告其兄妾兄上變高祖以之屬吏又日武后將如洛陽至閿鄕縣界騎忽不進召巫者問之巫言晉龍驤將軍王濬云臣墓在道南毎爲採樵者所害聞大駕今至故來哀告后勑去墓}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_735-1b}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 六巫下厭蠱巫下唐書曰薛舉㓂豳岐之地太宗惡之劉文静殷開山與舉戰齊髙墌城西臣為舉衛尉郝􅀈􅂆舉乘勝直指長安舉然之臨發而遇疾召巫視之巫言唐兵為祟舉惡之未幾而死又曰劉文静性嗜酒與其弟文起酣飲出怨言拔刀斫柱曰㑹當斬裴寂頭耳家中妖恠數見文起憂之遂召巫者於星月之下被髮銜刀為厭勝之法其愛妾失寵以告其兄妾兄上變髙祖以之屬吏又曰武后將如洛陽至閿鄉縣界騎忽不進召巫者問之巫言晉龍􅋮將軍王濬云臣墓在道南每為採樵者所害聞聖駕今至故來哀告后勅去墓}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_WYG_735-1b, image: WYG0899/WYG0899-0477d.png}
