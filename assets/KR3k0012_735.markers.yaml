  - {type: variant, offset: 3925, length: 0, content: '', WYG: 師江氏家𫝊曰江統為太子洗馬諫愍懷太子曰臣聞土者民之主用播殖築室營都建邑皆有明制著在經典而無禁忌犯害之文惟末俗小巫乃有言巫書乃禁入地三尺有四時方面不皆禁也竊見禁土令不得繕治壇垣動移屋瓦臣等以為此違典義不可為永制兩京記曰宣政門内曰宣政殿初成每見數十騎馳突出髙宗使巫祝為門奴問其所鬼云我漢楚王戊太子死葬於此門奴曰案漢書戊與七國反誅死無後焉得葬此鬼曰我當時入朝以路遠不随坐病死天子於此葬我漢書自遺誤耳門奴因宣詔欲為改葬鬼曰}
