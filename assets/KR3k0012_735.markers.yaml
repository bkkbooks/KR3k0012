  - {type: variant, offset: 12, length: 0, content: '', SBCK: 所惑請降官爵以穰之章奏凡七上詞甚切至上難違之故自司空而授僕射又日田仁㑹爲右金吾將軍所得禄俸估外有餘輒以納官時人譏其邀名仁會强力病惡晝夜巡警絲亳越法無不立發躬自閲罰略無寛者京城貴賤咸畏憚之時有女巫蔡娘子以鬼道惑衆自云能令死者復生市里以爲神明仁㑹驗其假妄奏請徙邊上日若死者不活便是妖妄若死者得生更是罪過不可容}
  - {type: variant, offset: 12, length: 0, content: '', WYG: 所惑請降官爵以禳之章奏凡七上詞甚切至上難違之故自司空而授僕射又曰田仁㑹為右金吾將軍所得禄俸佑外有餘輙以納官時人譏其邀名仁㑹強力病惡晝夜廵警絲毫越法無不立發躬自閲罰略無寛者京城貴賤咸畏憚之出有女巫蔡娘子以鬼道惑衆自云能令死者復生市里以為神明仁㑹騐其假妄奏請徙邊上曰若死者不活便是妖妾若死者得生更是罪過不可容}
