  - {type: variant, offset: 3873, length: 3, content: 百姓楊, WYG: 巫師舒禮晉永昌}
  - {type: variant, offset: 3877, length: 1, content: 孫, WYG: 年病死土地神將送詣太山俗人謂巫師為道路人也過禮舎門前土地神問吏此是何等舎門吏曰道人舎土地神曰是人亦是道人便}
  - {type: variant, offset: 3879, length: 11, content: 婢採蘭貼與同里正黃權約, WYG: 相付禮入門見數千戸皆懸竹簾自然􅇃塌男女異處有誦經者唱偈者然飲食快樂不可言禮文書名已至太山門而又身不到推入土地神云道見數千間瓦屋即問吏言道人即以付之於是遣神即録取禮觀未遍見有一人八手四眼捉金杵遂欲撞之便怖走還出門神已在門迎捉送太山太山府君問禮卿在世間皆何所為禮曰事三萬六千神為人觧除祠祀或殺牛犢猪羊雞鴨府君曰汝罪應上熱熬便牽著熬所見一物牛頭人身捉鐡叉禮著熬上宛轉身體燋爛求死不死一宿二日府君問主者禮壽命應盡為頓奪其命校録籍餘筭八年乃命將録求牛頭復以鐡叉叉著熬邉府君曰今遣卿歸終其餘筭勿復殺}
