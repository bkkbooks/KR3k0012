  - {type: variant, offset: 4641, length: 515, content: 道將軍入宅者不祥又曰侯景之首至于江陵梟之於市然後煮而漆之以付武庫先是謠曰苦竹町市南有好井荊州軍殺侯景及首至湖東付諮議參軍宗季長季長宅東有苦竹町以景首置其中用市南井水煮之先是巫言有鬼萬計斷頭折頸入宅去來云季長大懼設齋迎佛又有數萬烏自江津飛噪集其家焉北史曰齊琅邪王儼之未獲罪鄴北城有白馬佛塔是石季龍時為澄公所作儼將脩之巫曰若動此浮圖北城失主不從破至弟二級得白虵長數丈迴旋失之數旬而敗又曰竇泰母初夢風雷暴起若有雨狀出庭觀之見雷光奪目驟雨霑灑寤而驚汗遂有娠朞月而不產大懼有巫曰渡河湔裙裾產子必易便向水所忽見一人曰當生貴子生可從而南泰母從之俄而生泰隋書曰衛昭王爽討突厥明年徵為納言高祖甚重之未幾爽寢疾上使巫者薛榮宗視之云眾鬼為厲爽令左右驅逐之居數目有鬼物來擊榮宗榮宗走下而死其日爽薨又曰李景為代州惣管先是府內井中甃上生花如蓮并有龍見時變鐵為馬甲士又有神人長數丈見於城下其跡長四尺五寸景問巫對曰此是不祥之物來食人血耳景大怒推出之旬日而兵至死者數萬焉又曰李密破宇文化及化及還其勁兵良馬多戰死士卒皆倦王世充欲乘其弊而擊之恐人不一乃假託鬼神言夢見周公乃立祠於洛水上遣巫宣言周公欲令僕射急討李密當有大功不則兵皆疫死兵多楚人俗信妖妄故出言以惑之眾皆請戰, SBCK: ''}
