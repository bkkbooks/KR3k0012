  - {type: variant, offset: 1546, length: 703, content: 幼季與班彪相厚每相興談常對案不食晝至暝夜即徹具又曰朱暉同縣張堪有名德每與相見常接以友道暉以堪宿望盛名未敢安之堪至把暉臂曰欲以妻子託朱生暉舉手不敢荅堪後仕為漁陽太守暉自為臨淮太守絕相聞見時南陽饑堪妻子貧窮暉乃自往候視其困分所有以賑給之又曰郅惲友人董子張者父先為鄉人所害及子張病將終惲往候之子張病涕視惲不能言惲曰吾知子不悲天命而痛讎不復也子張但目擊而已惲即起將客遮仇人取其頭以示子張見而氣絕又曰趙喜為赤眉兵所圍迫急乃亡走與友人韓仲伯等數十人攜小弱越山出武關仲伯以婦色美慮有強暴者而己受其害欲棄之於道喜怒不聽以泥塗仲婦面載以鹿車身推之每逢賊欲逼奪喜輒言病以此得免又曰閔仲叔恬靜養神弗役於物與周黨相友黨每過仲叔共含菽飲水又曰應順字仲華汝南人少與同郡許敬善敬家貧親老無子為敬去妻更娶魏志曰荀攸彧從弟也太祖令曰孤與荀公達周旋二十餘年無毫毛可非者又曰公達賢人也所謂溫良恭儉讓以得之孔子稱晏平仲善與人交久而敬之公達即其人也又曰曹真字子丹太祖族子也真少與宗人曹遵鄉人朱讚並事太祖遵讚早亡真愍之乞分所食邑封遵讚子詔曰大司馬有叔向撫孤之仁篤晏嬰久要之分君子成人之美聽分真邑賜遵讚子爵關內侯各五百戶又曰崔琰字季珪清河東武成人也少撲訥好繫劍尚武事琰友人公孫方早卒琰撫其孤息若己子又曰陳矯字季弼為郡功曹過太山太山守薛悌異之結為親友戲矯曰以郡吏交二千石不亦可乎悌後為魏郡及尚書令皆代矯魏略曰趙歧字臺卿藏匿避難賣餅市中孫嵩見歧非常人呼而問之遂與俱歸嵩先入白母曰出行乃得死友迎上堂享之極欣藏歧複壁中又曰華歆字子魚平原人靈帝時與北海邴原管寧俱遊學三人相善故時人號三人為龍謂原為龍腹寧為龍尾歆為龍頭魏氏春秋曰嵇康寓居河內與之遊者未嘗見其喜慍之色, WYG: 彦度}
