  - {type: variant, offset: 808, length: 266, content: 往見之屆暢門投剌欲不肯見使從者拒之云行歷未旋寔留連日日往伺之謂從者曰夫孝子事親行不踰日而至今不歸非孝子也欲待與相見如凶於路往而不友哭之以為死交暢聞其言歎息壯志因執其手揖引與入美談畢請入見母飲宴定好而別寔臨退執暢手訣曰太上立德其次立功幸俱生盛明之世免塼瓦之姿託為丈夫當建名後載不可為空生徒死之物穢天壤之間又曰雷義字仲公豫章人舉茂才讓友人陳重字景公刺史不聽義遂陽狂被髮走不應命鄉里為之語曰膠漆自謂堅不如雷與陳又曰范式字巨卿山陽金鄉人少遊太學與汝南張劭為友劭字元伯二人並告歸鄉里式謂元伯曰後二年當還將過拜尊親見孺子焉乃共剋期至日巨卿果至升, SBCK: 及是李方尚在鎭惡昇}
