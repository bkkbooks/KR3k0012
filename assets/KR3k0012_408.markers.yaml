  - {type: variant, offset: 3283, length: 412, content: 林皆文義冠世共相友昵又曰魯公賈謐參管朝政京洛人士無不傾心渤海石崇之徒年皆長謐並以文才降節事謐共相朋昵號曰二十四友又曰羊曼字祖延頹縱宏狂飲酒誕節與溫嶠庾亮阮放桓彝同志友善並中興名臣時州里稱陳留阮放為宏伯高平郗鑒為方伯太山胡母輔之為達伯濟陰卞壺為裁伯陳留蔡謨為朗伯陳留阮孚為誕伯高平劉綏為秀伯而曼為黠伯凡八伯蓋擬古之八雋又曰薛兼與同郡紀瞻廣楊閔鴻吳郡顧榮會稽賀循同志友善初入洛司空張華見而歎息曰南金也又曰華譚所友人袁甫者字公胄歷陽人少能言議與譚齊名友善太安中入洛譚與甫書曰誠以枯澤非應龍之淵棘林非鸞鳳之窟昔食其自匿監門非高祖不長揖孔明躬稼南陽非劉氏不馳驅望雲霄而遇翮見鴻漸之輕羽瞻長塗而高鳴知騏驥之迅足又曰王濛少而不羈不為鄉閭所齒晚節剋修遂有風流美譽與沛國劉恢齊名友善時人以濛比袁耀卿恢比茍奉倩何法盛晉中興書曰庾翼字雉恭時京兆杜乂陳郡商浩並才名冠世而翼弗之重每語人曰此輩宜束之高閤俟天下平然後議其所任耳唯與桓友善在總角之中便相期, SBCK: ''}
