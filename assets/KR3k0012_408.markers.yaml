  - {type: variant, offset: 2795, length: 1, content: 恭, WYG: 素為莫逆之交又曰張軌濟隂臨邑人也少好學志識開朗初在洛陽家貧與樂安孫仁為莫逆之交每易衣而出以此見稱又曰黎景希字季明河間鄚音莫人也好占𤣥象頗知術數而落魄音託不事生業與范陽盧道源為莫逆之交又曰韋夐躰政功字𢎞逺志尚夷蕑澹於荣利周𢎞正乃造夐談謔盡日恨相遇之晩也後請夐至賔舘夐未赴𢎞正乃贈詩曰徳星猶未動真車詎肯来當時所欽如此南史曰謝𢎞㣲性寛愽無喜愠末年嘗與友人棊友人西南棊有死勢復一客曰西風急或有覆舟者友人悟乃救之𢎞㣲大怒投扄於地識者知其暮年之事果以此嵗終北史曰盧懐仁有行檢善與人交與瑯琊王衍隴西李壽之情好相得嘗語衍云昔郭大道廣許邵知而不顧嵇生􅀈立鍾㑹遇而絶言吾處季孟之間去其太甚衍曰然三國春秋曰燉煌太守李暠古老切表於段業暠稱盡忠不貳横為李嗣所讒請業殺嗣暠自歸司敗業乃殺嗣遣使謝暠初嗣與暠結刎頸之交嗣常以宗族託暠曰我身猶子身勿為疑也及是暠反為嗣所構暠乃恨之又曰姚萇單騎度淮見豫州刺史謝尚于壽陽幅巾以待之一面如舊相識又曰王鎮惡随宋髙祖入闗中初鎮惡流寓崤澠崤澠人李方厚待之鎮惡曰待吾佇英雄主取萬户侯乃厚相報方笑曰本縣足矣鎮惡力不絶人不嫺弓馬畧通諸子兵書縱横有智計以此成名及是李方尚在鎮惡昇堂拜母板方澠池令陳書曰江總聰敏篤學有文范陽張纉瑯琊王筠南陽劉遴之並髙才碩學總時少有名纉等雅相推重為忘年友又曰陸景文字叔辯少有膽畧武勇與陳武帝有布衣之舊隋書曰李宻與楊𤣥感為刎頸之交尤好兵書常皆在口唐書曰武徳中元敬為秘書郎太宗召為天䇿府叅軍兼直記室薛收與元敬俱為文學舘學士時房杜等處心腹之寄深相友託元敬畏於權勢竟不之狎如晦常云小記室不可得而親不可得而踈又曰于休烈河南人也貞觀中任左僕射為十八學士心性貞慤機鍳敏悟自㓜好學善屬文與㑹稽賀朝萬齊融延陵包融為文詞之友齊名一時又曰王琚懐州河内人也少孤而聰敏有才畧好𤣥象合鍊之學神龍初嘗謁駙馬王同皎甚器之及謀刺武三思事琚義許之與同璟張仲之為忘年之友又曰蕭昕河南人也開元中首舉愽學宏詞授陽武簿後廷佐拾遺昕嘗與布衣張鎬}
