  - {type: variant, offset: 2204, length: 696, content: 善故時人號三人為龍謂原為龍腹寧為龍尾歆為龍頭魏氏春秋曰嵇康寓居河內與之遊者未嘗見其喜慍之色與陳留阮籍河內山濤向秀籍兄子瑯琊王戎沛人劉伶相與友善遊於竹林號曰七賢吳志曰孫策創業命張昭為長史撫軍中郎將升堂拜母如比肩之舊文武之事一以委昭又曰吳範字文則與親故接有終始素與魏滕同邑相善為交滕嘗有罪吳王權責怒甚敢有諫者處死範謂滕曰與汝偕死滕曰死而無益何死範曰安能慮此坐觀汝耶乃髡頭自縛詣門下使鈴下以聞鈴下不敢曰必死不可範曰汝有子耶曰有曰使汝為吳範死子以屬我鈴下諾乃排閤入言未卒權大怒欲投以戟逡巡出走範因突入叩頭流血言與涕并良久權意釋免滕又曰周瑜長壯有姿皃孫堅議興兵討董卓徙家於舒堅子策與同年獨相友善瑜推道南宅以舍策升堂拜母有無共通又曰魯肅字子恭臨淮東城人周瑜知其奇也遂相親結定喬札之分又曰魯肅代周瑜之當陸口過呂蒙屯下肅意尚輕蒙或說肅曰呂將軍功日顯不可以故意待也君宜順之肅遂往詣蒙酒酣蒙問肅曰君受重任與關羽為鄰將何計略以備不虞因為畫五策肅於是越席就之拊其背曰呂子明吾不知卿才略所及乃至於此遂拜蒙母結友而別吳錄曰張溫字惠怒英才瓌偉遂以禮躬延見召對詞雅淹潤帝改容前席拜中郎聘蜀與諸葛全結金蘭之好焉蜀志曰馬謖音縮字幼常才氣過人好論軍計謖臨終與諸葛亮書曰明公視謖猶子謖視明公猶父願深殛鯀興禹之義使平生之交不虧此謖雖死無恨於黃泉也于時十萬之眾為之流涕亮自臨祭待其孤遺若平生又曰張裔字君嗣蜀郡成都人也少與犍為楊恭友善恭早死孤遺未數歲裔分居事恭母如恭息長大為之娶妻買宅產業使立門戶又曰楊戲字文然為人篤於舊故與巴西韓儼黎韜童幼相親後儼痼疾廢頓韜無行見損戲經紀振卹恩好如初晉書曰王龔字孝伯清操過人才地自負恒有宰相之望與王沉齊名, SBCK: ''}
