  - {type: variant, offset: 547, length: 0, content: '', SBCK: 有籌畫智略文帝器之爲布衣之交後魏書曰眭夸一名昶趙郡髙邑人也少與崔浩爲莫逆之交北齊書曰崔瞻與趙郡李槩爲莫逆之交槩將東還瞻與之書曰仗氣使酒我之􅁪弊詆訶指切在卿尤甚足下告歸吾於何聞過也又曰􅀽聿修歷任清華郎署之日值趙彦深爲水部郎中同在一院因成交友彦深後􅀍沙汰停私門生藜藋聿修猶以故情存問往來又曰裴讞魚列切之字士}
  - {type: page-break, offset: 547, content: '', id: KR3k0012_SBCK_408-2b}
  - {type: variant, offset: 547, length: 0, content: '', krp: 有籌畫智略文帝器之爲布衣之交後魏書曰眭夸一名昶趙郡髙邑人也少與崔浩爲莫逆之交北齊書曰崔瞻與趙郡李槩爲莫逆之交槩將東還瞻與之書曰仗氣使酒我之恒弊詆訶指切在卿尤甚足下告歸吾於何聞過也又曰袁聿修歷任清華郎署之日值趙彦深爲水部郎中同在一院因成交友彦深後𬒳沙汰停私門生藜藋聿修猶以故情存問往來又曰裴讞魚列切之字士}
