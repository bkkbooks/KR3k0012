  - {type: 'tls:seg', offset: 548, content: '', id: KR3k0012_CHANT_408-7a.8}
  - {type: variant, offset: 548, length: 0, content: '', SBCK: 不妄交遊唯與隴西辛術趙郡李繪頓丘李構淸河崔瞻爲忘年之友後周書曰柳弘字光道河東解縣人少聦潁工草􅀠􅀶涉群書詞彩豐贍與弘農楊素爲莫逆之交又曰張􅁤濟隂臨邑人也少好學志識開㓪初在洛陽家貧與樂安孫仁爲莫逆之交毎易衣而出以此見稱又曰􅀺景希字季明河間鄚音莫人也好占玄象頗知術數而落魄音託不事生業與范陽盧道源爲莫逆之交又曰韋夐休政切字弘逺志尚夷簡澹於榮利周弘正乃造夐談謔盡日恨相遇之晚也後請夐至賔館夐未赴弘正乃贈詩曰徳星猶未動真車詎肯來當時所欽如此南史曰謝弘微性寛􅀶無喜愠末年甞與友人棊友人西南棊有死􅀔復一客曰西風急或有覆舟者友人悟乃救之弘微大怒投扃於地識者知其暮年之事果以此歳終北史曰盧懷仁有行撿善與人交與瑯瑯王衍隴西李壽之情好相得甞語衍云昔太丘道廣許劭知而不顧嵇生峭立鍾㑹遇而絶言語處季孟之間去其太甚衍曰然三十國春秋曰憞煌}
  - {type: page-break, offset: 548, content: '', id: KR3k0012_SBCK_408-3a}
