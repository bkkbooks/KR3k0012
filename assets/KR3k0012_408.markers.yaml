  - {type: variant, offset: 1077, length: 3, content: 飲盡懽, SBCK: 衣方澠池令陳書曰江揔聡敏篤學有文范陽張纉瑯琊王筠南陽劉之遴並髙才碩學揔時少有名纉等雅相推重爲忘年友又曰陸景文字叔辯少有膽略武勇與陳武帝有布衣之舊隋書曰李宻與楊玄感爲刎頸之交尢好兵書常皆在口唐書曰武徳中元敬爲秘書郎太宗召爲天䇿府叅軍兼直記室薛收與元敬俱爲文學館學士時房杜等處心腹之􅀉深相友託元敬畏於權􅀔竟不之狎如晦常去小記室不可得}
