  - {type: variant, offset: 1039, length: 279, content: 並告歸鄉里式謂元伯曰後二年當還將過拜尊親見孺子焉乃共剋期至日巨卿果至升堂拜母飲盡懽而別後元伯寢疾篤同郡郅君章商子微晨夜省視元伯臨盡曰恨不見死友尋卒式夢元伯玄冕垂纓而呼曰吾死當以某日葬子豈能相及式覺而悲赴之便服朋友之服投其葬日未屆而喪已發引至壙將定而柩不肯進其母撫之曰元伯豈有望也停柩移時見有素車白馬哭而來母曰必巨卿也既至叩喪言曰行矣元伯死生異路永從此辭會葬者千人皆揮涕式執紼引柩乃前進式留止塚次修墳樹而退又曰范式嘗至京師受業太學時諸生長沙陳平子同在學與式未相見而平子被病曰山陽范式列士也可託死吾歿但以尸埋巨卿戶前乃裂素為書遺巨卿既終妻從其言式行適還有書見瘞愴, WYG: 惠開忻}
