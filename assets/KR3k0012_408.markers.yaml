  - {type: variant, offset: 1422, length: 0, content: '', WYG: 交齊書曰劉悛字士操彭城安上里人也從駕登蒋山上數歡曰貧賤之交不可忘顧悛曰此况卿也今日與卿盡布衣之交􅃴悛拜謝又曰桞世隆字彦緒河東解人宋大尉元景弟也當時名士張緒王延之沈淡之徒雅相欽慕以為君子之交又曰劉善明素與崔思祖}
