  - {type: variant, offset: 69, length: 10, content: 子孫膺乃召見問父祖嘗, SBCK: 徴時外戚耳何以一爵髙人惠開欣然更爲刎剄之交齊書曰劉悛字士操彭城安上里人也從駕登蔣山上數歎曰貧賤之交不可忘頋悛曰此况卿也今日}
