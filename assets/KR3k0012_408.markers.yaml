  - {type: 'tls:seg', offset: 540, content: '', id: KR3k0012_CHANT_408-7a.6}
  - {type: variant, offset: 540, length: 6, content: 守姑臧長治貴, SBCK: 早立名譽當時名士陸惠曉謝瀹張融何􅀧沈淵相與爲君子之交梁書曰何遜字仲言東郡郯人也弱冠舉秀才南郷范雲見其荅策大相稱賞因結忘年交好自是一文一詠雲輙嗟賞又曰張緬弟纉遷尚書吏部河東裴子野曰張吏部有喉舌之任子野性曠逺自云年出三十不復詣人􅀄未與纉遇便相推重因爲忘年交又曰蕭介性髙簡少交遊唯與族兄琛從兄音素子洽從弟俶等文酒賞㑹時人以比謝氏烏衣之遊又曰髙祖性不好聲色頗慕髙名與裴子野劉顯蕭子雲張纉及當時才秀爲布衣交何玄之梁典曰劉許字彦度與陳留阮藉李緒申金蘭之契築室鍾阜之傍共聽内義鑚尋奥典魏書曰夏侯尚字伯}
