  - {type: variant, offset: 557, length: 0, content: '', SBCK: 貳横爲李嗣所䜛請業殺嗣暠自歸司敗業乃殺嗣遣使謝暠􅀄嗣與暠結刎頸之交嗣常}
  - {type: variant, offset: 557, length: 451, content: 以官屬禮之常迎於大門引入見母又曰李爕字德公所交皆捨短取長好成人之美潁川荀爽賈彪雖俱知名而不相能爕並交二子情無適莫世稱其正又曰王允字子師同郡郭林宗一見奇之曰王生一日千里王佐才也遂定交謝承後漢書曰范式為荊州刺史友人南陽孔嵩貧有親老乃變名姓傭於新野縣縣吏遣嵩為式導騶式見而識之呼嵩把臂謂曰子非孔仲山耶對之歎息式勑縣代嵩嵩以傭未竟不肯去又曰陳蕃既被害友人陳留朱震時為銍令聞而棄官哭而收葬又曰許敬字鴻卿汝南人與同郡周伯靈為交友伯靈早亡卿育養其子又曰馬寔字伯騫勤結英雄所欲友接負笈荷檐不遠萬里山陽王暢未仕時寔慕嵩名往見之屆暢門投剌欲不肯見使從者拒之云行歷未旋寔留連日日往伺之謂從者曰夫孝子事親行不踰日而至今不歸非孝子也欲待與相見如凶於路往而不友哭之以為死交暢聞其言歎息壯志因執其手揖引與入美談畢請入見母飲宴定好而別寔臨退執暢手訣曰太上立德其次立功幸俱生盛明之世免塼瓦之姿託為丈夫當建名後載不可為空生徒死之物穢天壤之間又曰雷義字仲公豫章人舉茂才讓友人陳重字景公刺史不聽義遂陽狂被髮走不應命鄉里為之語曰膠漆自謂堅不如雷, WYG: 就}
