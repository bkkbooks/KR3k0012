  - {type: variant, offset: 54, length: 8, content: 得進融故造其門云, SBCK: 以地􅀔推之謂惠開曰}
  - {type: variant, offset: 54, length: 8, content: 得進融故造其門云, krp: 以地勢推之謂惠開曰}
  - {type: variant, offset: 55, length: 470, content: 進融故造其門云我與公積代通家子孫膺乃召見問父祖嘗與僕有恩舊曰然吾先君孔子與君先人李老君同德比義而相師友融與君豈非積代通家也眾奇之又曰第五倫始以營長詣郡尹鮮于褒見而異之署為吏後褒坐事左轉高唐令臨去握臂訣曰恨相知晚又曰肅宗始脩古禮巡狩方岳崔駰上四巡頌帝歎之謂侍中竇憲曰知崔駰乎對曰班固數為臣說之然未見帝曰公愛班固而忽崔駰葉公之好龍也可試見駰候憲憲倒屣迎笑謂駰曰吾受詔交公何得薄我哉遂揖入也又曰鍾皓字季明穎川長社人皓少以篤行稱同郡陳寔年不及皓皓引與為友又曰張叔升字彥真陳留尉氏人也有大志歎曰人生於世白駒過隙耳安能曲道媚世俗哉守外黃令遇黨錮去官道逢友人班荊而語曰今闕下閹宦專權因相向而泣有老父過之曰嗟乎二大夫何泣之悲龍不隱鮮鳳不藏翼一世網羅泣將何及二人欲與之言不顧而退升竟以黨錮下獄死又曰任末字叔本遊京師教授友人董奉德於洛陽病亡末躬推車載奉德致於墓所由是知名也又曰梁鴻友人高恢字伯達少好老子隱華陰山及鴻東遊思恢作詩遠不復相見恢亦高抗終身不仕又曰陳蕃李膺之敗何顒與蕃膺善遂為官者所陷乃改名姓亡匿汝南間所至皆親其豪傑有聲荊豫之域袁紹慕之私與往來結為奔走, WYG: 意}
