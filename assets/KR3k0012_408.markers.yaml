  - {type: variant, offset: 1423, length: 0, content: '', WYG: 善聞死慟哭仍得病卒又曰孔稚珪字徳璋㑹稽人也早立名譽當時名士陸惠曉謝􅀈張融何㸃沈相淵與為君子之交梁書曰何遜字仲言陳郡剡人也弱冠舉秀才南鄉范雲見其荅策大相稱賞因結㤀年交好自是一文一詠雲輙嗟賞又曰張􅃡弟纉遷尚書吏部河東裴子野曰張吏部有喉舌之任子性曠遠自云年出三十不復詣人初未與纉遇便相推重因為忘年交又曰蕭介性髙蕳少髙遊唯與族兄琛從兄􅀈音􅀈素子洽從弟俶等文酒賞㑹}
