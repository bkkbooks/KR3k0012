  - {type: variant, offset: 1081, length: 1, content: 別, SBCK: 親不可得而踈又曰于休烈河南人也貞觀中任左僕射爲十八學士心性貞慤機鑒敏悟自㓜好學善属文與㑹稽賀朝萬齊融延陵包融爲文詞之友齊名一時又曰王琚懷州河内人也少􅀌而聦敏有才略好玄象合錬之學神龍􅀄甞謁駙馬王同皎甚器之及謀刺武三思事琚義許之與周璟張仲之爲忘年之友又曰蕭昕河南人也開元中首舉􅀶學宏詞授陽武簿}
