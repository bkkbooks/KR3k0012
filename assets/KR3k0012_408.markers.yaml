  - {type: variant, offset: 2794, length: 0, content: '', WYG: 莫逆之交北齊書曰崔聸與趙郡李槩為莫逆之交槩将東還聸與之書曰仗氣使酒我之恆弊詆阿指切在卿尤甚足下告歸吾於何聞過也又曰袁聿修歴任清華郎署之日值趙彦梁為水部郎中同在一院因成交友彦深後被沙汰停私門生藜藿聿修猶以故情存問徃来又曰裴讞謙劉之字士平不妄交遊唯與隴西辛術趙郡李繪頓丘李搆清河崔聸為妄年之友後周書曰桞𢎞字光道河東解縣人少聰頴工草𨽻愽渉羣書詞私豐贍與𢎞農}
  - {type: page-break, offset: 2794, content: '', id: KR3k0012_WYG_408-3b, image: WYG0896/WYG0896-0587b.png}
