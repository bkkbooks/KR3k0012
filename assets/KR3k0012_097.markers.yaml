  - {type: variant, offset: 3780, length: 2, content: 世祖, SBCK: 可惜此坐和嶠亦以爲言曰皇太子有淳古風而季代多僞恐不了陞下家事武帝黙然不荅後武帝欲廢太子楊后曰立嫡以長不以賢豈可動乎太子遂定及居大位政岀群下紀綱大壤貨賂公行天下爲之市賈焉帝又甞幸華林園聞蛙聲謂左右曰此鳴者爲官乎爲私乎或對曰在官地者爲官在私地者爲私及天下荒亂百姓餒甚帝曰何不食内糜其蒙蔽皆此􅀋也王隠􅀳書曰髙堂隆尅鄴宫屋材云後􅀂干年當有天子居此宫惠帝止鄴宫治屋者土剥更泥始見刻字計年正合趙王倫晉書曰趙王倫字子彛宣帝弟九子也母曰栢夫人魏嘉平􅀄封安樂亭侯五等建改封東安子拜諌議大夫武帝}
