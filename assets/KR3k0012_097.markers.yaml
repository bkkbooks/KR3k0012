  - {type: variant, offset: 20, length: 165, content: 元宣帝長子也雅有風彩沉毅多大略少流美譽與夏侯玄何晏齊名晏常稱曰惟幾也能成天下之務司馬子元是也魏景初中拜散騎常侍累遷中護軍為選用之法舉不越功吏無私焉宣帝之將誅曹爽深謀祕策獨與帝潛畫文帝弗知之也將夕乃告之既而使人覘之帝寢如常而文帝不能安席晨會兵司馬門鎮靜內外置陣甚整宣帝曰此子竟可也初帝陰養死士三千散在人間至是一朝而集眾莫知其所出也事, SBCK: 太傅永}
