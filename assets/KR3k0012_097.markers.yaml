  - {type: variant, offset: 1194, length: 201, content: 洛陽典農中郎將值魏明奢侈之後帝蠲除苛碎不奪農時百姓大悅轉散騎常侍大將軍曹爽之伐蜀也以帝為征蜀將軍副夏侯玄出駱谷次于興勢蜀將王林夜襲帝營帝堅臥不動林退帝謂玄曰費禕以據險拒守進不獲戰攻之不可宜亟旋軍以為後圖爽等引還禕果馳兵趣三嶺爭險刀得過還拜議郎及誅曹爽帥眾衛二宮以功增邑千戶高貴鄉公之立也以參定策進封高都侯邑二千戶母丘儉文欽之亂大軍東征帝兼中領軍留鎮洛陽及景帝疾篤帝自京都省疾拜衛將軍景帝崩天子命帝鎮許昌, WYG: 庶人司空張華}
