  - {type: variant, offset: 3803, length: 1, content: 彰, SBCK: 立功豈徒免禍而巳倫從之秀乃微泄其謀使謐黨頗聞之倫秀因勸謐等早害太子以絶衆望太子旣過害倫秀之謀益甚而超雅懼後難欲悔其謀乃辭疾秀復告右衛佽飛督閭和和從之期四月三日景夜一籌以鼔聲爲應至期乃矯詔勑三部司馬曰中宫與賈謐等殺害太子今使車􅀐入廢中宫汝等皆當從命賜爵􅀜中侯不從誅三族於是衆皆從之倫又矯詔開門夜入陳兵道南遣翊軍校尉齊王同將三部司馬百人排閣入華林令駱休爲内應迎帝幸東堂遂廢賈后爲庶人幽之于建始殿中書監侍中黄門侍郎八座皆夜入殿執張華裴頠解紹杜斌等於殿前殺之尚書始疑詔有詐郎師景露板奏請手詔倫等以爲沮衆斬之以殉明日倫坐端門屯兵北向遣尚書和郁送賈庶人于金墉㝷矯詔自爲使持節大都督中外諸軍事相國侍中王如故一依宣文輔魏故事以其丗子散􅀐常侍拲音拱領冗從僕射子馥前將軍封濟陽王䖍黄門郎封汝隂王詡况羽反散􅀐侍郎霸城侯孫秀等皆封大郡並據兵權文武官侯封者數千人百官㹅巳聽於倫倫素庸下無智䇿復受制於秀秀之威權振於朝廷}
  - {type: page-break, offset: 3803, content: '', id: KR3k0012_SBCK_097-8b}
  - {type: variant, offset: 3803, length: 1, content: 彰, WYG: 立功豈徒免禍而已倫從之秀乃微泄其謀使謐黨頗聞之倫秀因勸謐等早害太子以絶衆望太子既遇害倫秀之謀益甚而超雅懼後難欲悔其謀乃辭疾秀復告右衛佽飛督閭和和從之期四月三日丙夜一籌以鼓聲為應至期乃矯詔勅三部司馬曰中宫與賈謐等殺害太子今使車騎入廢中宫汝等皆當從命賜爵關中侯不從誅三族於是衆皆從之倫又矯詔開門夜入陳兵道南遣翊軍校尉齊王冏將三部司馬百人排閣入華林令駱休為内應迎帝幸東堂遂廢賈后為庶人幽之于建始殿中書監侍黄門侍郎八座皆夜入殿執張華裴頠解紹杜斌等於殿前殺之尚書始疑詔有詐郎師景露板奏請手詔倫等以為沮衆斬之以狥明日倫坐端門屯兵北向遣尚書和郁送賈庶人于金墉尋矯詔自為使持節大都督中外諸軍事相國侍中王如故一依宣文輔魏故事以其世子散騎常侍荂音敷領冗從僕射子馥前將軍封濟陽王虔黄門郎封汝陰王詡况羽反散騎侍郎霸城侯孫秀等皆封大郡並據兵權文武官侯封者數千人百官總已聽於倫倫素庸下無智䇿復受制於秀秀之威權振於朝廷}
