  - {type: variant, offset: 2510, length: 0, content: '', WYG: 秋七月中書令卞粹侍中馮蓀河南尹李含等貳於長沙王乂乂疑而害之八月河間王顒成都王穎舉兵討長沙王乂帝以乂為大都督帥軍拒之庚申劉𢎞及張昌戰於清水斬之顒遣其將張方穎遣其將陸機牽秀石超等來逼京師乙丑帝幸十三里橋遣將軍皇甫商拒方於宜陽己巳帝旋軍于宣武場庚午舍于石樓天中裂無雲而雷九月丁丑帝次于河橋壬午皇甫商為張方所敗甲申帝軍於芒山丁亥幸偃師辛夘舍于豆田癸巳帝旋于城東丙申進軍緱氏擊牽秀走之大赦張方入京城燒清明開陽二門死者萬計石超逼乗輿于緱氏冬十月壬寅帝旋于宫石超焚緱氏服御無遺丁未破牽秀范陽王虓于東陽門外戊申破陸機于建春門石超走斬其將軍賈崇等十六人懸首銅駝街張方退屯十三里橋十一月辛巳星晝隕聲如雷王師攻方壘不利方決千金堨水碓皆涸音鶴乃發王公奴婢手舂給兵廩一品已下不從征者男子十三以上皆從役又發奴助兵號為四部司馬公私窮踧子六反米石萬錢詔命所至一城而已壬寅夜赤氣竟天隱隱有聲丙辰地震癸亥東海王越執長沙王乂幽於金墉城尋為張方所害甲子大赦永興元年春正月成都王穎自鄴諷于帝乃大赦改元為永安帝逼于河間王顒密詔雍州刺史劉沈秦州刺史皇甫重以討之沈舉兵攻長安為顒所敗張方大掠洛中還長安於是軍中大餒人相食以成都王穎為丞相穎遣從事中郎成䕫等以兵}
