  - {type: variant, offset: 947, length: 191, content: 定請登城鼓譟擊之可破也既謀而行三譟而欽不能應鴦退相與引而東帝謂諸將曰欽走矣三鼓而欽不應其勢已屈不走何待欽將遁鴦曰不先折其勢不得去也乃與驍騎十餘摧鋒陷陣所向皆披靡遂引去帝遣左長史司馬璉督騎驍八千翼而追之欽父子與麾下走保項城儉聞欽敗棄眾霄遁淮南安風津都尉儉斬之傳首京都欽遂奔吳淮南平初帝目有瘤疾使醫割之鴦之來攻也驚而目出六軍大恐蒙之以被痛甚齧被敗而左右莫知焉閏月疾篤使文帝總統諸軍辛亥崩, SBCK: 賈后矯詔害庶人遹}
