  - {type: variant, offset: 623, length: 199, content: 儉欽帥眾六萬渡淮而西帝會公卿謀征討計朝議多謂可遣諸將擊之王肅及尚書傅嘏中書侍郎鍾會勸帝自行戊午帝統中軍步騎十餘萬以征之倍道兼行召三萬兵大會于陳許之郊甲申次于隱橋儉將史招李績相次來降儉欽移入項城帝遣荊州刺史王基進據南頓以逼之帝深壁高壘以待東軍之集諸將請進軍攻其城帝曰淮南將士本無反志且儉欽欲蹈縱橫之跡習秦儀之說謂遠近必應而事起之日淮北不從史招李績前後瓦解內乖外叛自知必敗困獸思鬥速戰便合其志雖云必剋傷, SBCK: 壬戌廢皇太子遹爲庶}
