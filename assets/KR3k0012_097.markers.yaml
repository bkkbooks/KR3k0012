  - {type: variant, offset: 1599, length: 103, content: 青徐荊豫分取關中遊軍皆會淮北師次于項城假廷尉何禎節度淮南宣慰將士申明逆順示以誅賞甲戍帝進軍丘頭因命合圍三年春正月諸葛誕文欽等出攻長圍諸軍逆擊走之初誕欽內不相協及至窮蹙轉相疑貳欽計事於誕忤誕手刃殺欽欽子鴦攻誕, WYG: 討趙王倫}
