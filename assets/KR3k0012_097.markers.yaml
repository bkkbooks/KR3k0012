  - {type: variant, offset: 4420, length: 2, content: 全也, SBCK: 書白倫倫以示秀秀勸倫誅林倫請宗室㑹於華林園召林秀及王輿入因收林殺之誅三族及三王起兵討倫檄至倫秀始大懼遣其中堅孫輔爲上將軍督諸軍以拒義師倫復受太子詹事劉琨節督河北將軍率歩􅀐千人催諸軍與義軍戰于激水大敗退保河上劉琨燒斷河橋自義兵之起百官將士咸欲誅倫秀以謝天下秀知衆怒難犯不敢岀省及聞河北軍悉敗憂懣音悶不知所爲義陽王威勸秀至尚書省與八座議征戰之備秀從之使京城西四品以下子弟十五以上皆詣司􅀠從倫出戰内外諸軍悉欲刧殺秀秀懼自崇禮闥走還下舎衛將軍趙泉斬秀等以徇使倫爲詔曰吾爲孫秀等所誤以怒三王今巳誅秀其迎太上復位吾歸老于農􅅿傳詔以騶音鄒虞幡勑將士解兵文武官皆奔走莫敢有居者黄門將倫自華林東門出及拲皆還汶陽里弟於}
