  - {type: variant, offset: 4404, length: 6, content: 忠則國亂亂國, SBCK: 平秀等亦􅀷忌焉乃岀冏鎮許奪允護軍允發起兵討倫允旣敗滅倫加九􅃬増封五萬户倫無學不知書秀亦以狡􅃛胡八反小才貪􅁋昩利所共立事者皆邪佞之徒唯競榮利無深謀逺略倫秀並惑巫􅀑聽妖邪之􅀃秀使牙門趙奉詐爲宣帝神語令倫早入西宫又言宣帝於北邙爲趙王佐助於是別立宣帝廟於邙山謂逆謀可成秀等部分諸軍分布腹心使散􅀐常侍義陽王威兼侍中出納詔命矯作禪讓之詔使持節尚書令滿􅁬僕射崔隨爲副奉皇帝璽綬以禪位于倫倫僞讓不受於是宗室諸王群公卿士咸假稱符瑞天文以勸進倫乃許之左衛王與前軍司馬雅等率甲士入殿譬諭三部司馬示以威賞皆莫敢違其夜使張林等屯守諸門義陽王威及駱休逼奪天子璽綬夜漏未盡内外百官以乗輿法駕迎倫恵帝乗雲母車鹵簿數百人自華林西門出居金墉城尚書和郁兼侍中散􅀐常侍琅耶王􅐶中書侍郎陸機從到城下而反使張衡衛帝實幽之也倫從兵五千人自端門登太殿滿􅁬崔隨樂廣進璽綬於倫乃僣即帝位大赦改元建始諸黨皆登卿將並列大封其餘同謀者咸超階越次}
