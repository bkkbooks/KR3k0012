  - {type: variant, offset: 3912, length: 284, content: 徽猷史氏所不敢蔽也唐太宗晉武帝紀論曰武皇承基誕膺天命握圖御寓敷化弘道民以佚而代勞世以治而易亂絕縑綸之貢去雕琢之飾制奢俗以變約俾澆風而反淳雅好直言留心採擢劉毅裴楷以質直而見容嵇紹許奇雖仇讎而不棄仁以御物寬而得眾宏略大度有帝王之量焉于時民和俗靜家給民足聿脩武用思啟封疆次神筭於深衷斷雄圖於議表馬隆西伐王濬南征師不延時獯虜削跡兵無血刃揚越為墟通近代之不通服前王之不服禎祥顯應風教肅清天地之功成矣霸王之業大矣雖登封之禮讓而不為而驕泰之心因斯以起見土地之廣謂萬葉而無虞都天下之安謂千年而永治不知處廣以思狹則廣可長存居治而忘危則治無常治加之建立非所委寄失才志欲就于升平行先迎於禍亂, SBCK: ''}
