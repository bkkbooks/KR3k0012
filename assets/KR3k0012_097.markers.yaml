  - {type: variant, offset: 3791, length: 2, content: 作萬, SBCK: 可又求尚書令華頠復不許敏懐太子之廢也使倫領右軍將軍時左衛司馬督司馬雅及常徙督許超並常給事東宫二人傷太子無罪與殿中中郎士猗節謀廢賈后復太子以華頠不可移難與圖權倫執兵之要性貧冒可假以濟事乃􅀃倫嬖人孫秀曰中宫凶妒音蠧無道與賈謐等共廢太子今}
