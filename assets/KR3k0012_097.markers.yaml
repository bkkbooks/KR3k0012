  - {type: variant, offset: 4197, length: 198, content: 猶將適越者指沙漠而遵途欲登山者涉舟航而覔路所趣逾遠所向轉難南北倍殊高下相反求其至也不亦難乎況以新習易動之基而無久安難拔之慮故賈充兇堅懷奸志而擁權楊駿豺狼包禍心以專輔及乎宮車晚出諒闇未周藩翰變親以成踈連兵競滅其本棟梁廻忠而起偽擁眾各舉其威曾未數年綱紀大亂以至海內版蕩宗廟播遷帝道王猷反居文身之俗神州赤縣翻成被髮之鄉棄所大以資人掩其小而自託為天下笑其故何哉良由失慎於前所以貽患於後且知子者賢父知臣者明, SBCK: 京邑}
