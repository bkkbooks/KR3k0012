  - {type: variant, offset: 4404, length: 6, content: 忠則國亂亂國, WYG: 平秀等亦深忌焉乃出冏鎭許奪允護軍允憤起兵討倫允既敗滅倫加九錫增封五萬户倫無學不知書秀亦以狡黠胡八反小才貪淫昧利所共立事者皆邪佞之徒唯競榮利無深謀逺畧倫秀並惑巫兒聽妖邪之説秀使牙門趙奉詐為先帝神語令倫早入西宫又言先帝於北邙為趙王佐助於是别立先帝廟於邙山謂逆謀可成秀等部分諸軍分布腹心使散騎常侍義陽王威兼侍中出納詔命矯作禪讓之詔使持節尚書令滿奮僕射崔隨為副奉皇帝璽綬以禪位于倫倫偽讓不受於是宗室諸王羣公卿士咸假稱符瑞天文以勸進倫乃許之左衞王與前軍司馬推等率甲士入殿譬諭三部司馬示以威賞皆莫敢違其夜使張林等屯守諸門義陽王威及駱休逼奪天子璽綬夜漏未盡内外百官以乗輿法駕迎倫惠帝乗雲母車鹵簿數百人自華林西門出居金墉城尚書和郁兼侍中散騎常侍琅琊王睿中書侍郎陸機從到城下而反使張衡衞帝實幽之也倫從兵五千自端門登太極殿滿奮崔隨樂廣進璽綬於倫乃僭即帝位大赦改元建始諸黨皆登卿將並列大封其餘同謀者咸超階越次}
