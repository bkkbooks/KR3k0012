  - {type: variant, offset: 4431, length: 147, content: 閉其端而世祖惑荀勗之奸謀迷王渾之偽策心屢移於眾口事不定於己圖元海當除而不除卒令擾亂區夏惠帝可廢而不廢終使傾覆洪基夫全一人者德之輕極天下者功之重棄一子者忍之小安社稷者孝之大況乎資二世而成業延三孽以喪身所謂取輕德而捨重功畏小忍而忘大孝聖賢之道豈若斯乎雖則善始於初而乖令終於末所以殷勤史策不能無慷慨焉, SBCK: 太平御覽卷第九十七}
