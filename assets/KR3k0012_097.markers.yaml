  - {type: variant, offset: 1610, length: 807, content: 會淮北師次于項城假廷尉何禎節度淮南宣慰將士申明逆順示以誅賞甲戍帝進軍丘頭因命合圍三年春正月諸葛誕文欽等出攻長圍諸軍逆擊走之初誕欽內不相協及至窮蹙轉相疑貳欽計事於誕忤誕手刃殺欽欽子鴦攻誕不克踰城降以為將軍封侯使鴦巡城市而呼帝見城上持弓者不發謂諸將曰可攻矣二月乙酉攻而拔之斬誕夷三族四月歸于京師魏帝令改丘頭為武丘以旌武功五月天子以并州太原上黨西河樂平新興鴈門司洲之河東平陽八郡地方七百里封帝為晉公加九錫進位相國九讓乃止景元元年夏四月天子既以帝三世宰輔政非己出情不能安又慮廢辱將臨軒召百僚而行放黜五月戊子夜使冗從僕射李昭等發甲於陵雲臺召侍中王沉散騎常侍王業尚書王經出懷中黃素詔示之戒嚴俟旦沉業馳告于帝召護軍賈充等為之備天子知事泄帥左右攻相府稱有所討敢有動者族誅相府兵將止不敢戰賈充叱諸將曰公畜養汝輩正為今日耳太子舍人成濟抽戈犯蹕天子崩于車中帝召百僚謀故僕射陳泰不至帝遣其舅荀顗輿致之定于曲室謂曰玄伯天下其如我何泰曰唯腰斬賈充徵以謝天下帝曰卿更思其次泰曰但見其上不見其次於是歸罪成濟而斬之與公卿議立燕王宇之子常道鄉公璜音黃為帝二年秋八月甲寅天子使太尉高柔授帝相國印綬司鄭冲致晉公茅土九錫固辭三年夏四月肅慎來獻楛矢石砮弓甲貂皮等天子命歸大將軍府四年夏帝將伐蜀徵四方之兵十八萬使鄧艾自秋道攻姜維於沓中雍州刺史諸葛緒自祁山軍于武街絕維歸路鎮西將軍鍾會帥前將軍李輔征蜀護軍胡烈等自駱谷襲漢中秋八月軍發洛陽大賚將士陳師誓眾將軍鄧敦謂蜀未可討帝斬以徇九月使天水太守王頎攻維營隴西太守牽𢎪邀其前金城太守楊欣趣其後鍾會分為二隊入自斜谷使李輔圍王含於樂城又使部將易愷攻蔣斌於漢城會直指陽安護軍胡烈攻陷關城姜維聞之引還王頎追敗維於強川維典張翼廖化合軍守劍閣鍾會攻之冬十月天子以諸侯獻捷交至詔加九錫帝乃受命十一月鄧艾帥萬餘人自陰平踰絕險至于江由破蜀將葛贍於綿竹斬贍首傅道進軍雒縣劉禪降天子命晉公以相國總百揆於是上節傅去侍中大都督錄尚書之號焉咸熙, SBCK: 遇害永寜}
