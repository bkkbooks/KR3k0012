  - {type: variant, offset: 3794, length: 7, content: 欣戴遠至邇安德, SBCK: 無適嗣社稷將危大臣將起大事而公名奉中宫與賈郭親善太子之廢皆云預知一朝事起禍必相及何不先謀之乎秀許諾言於倫倫納焉事將起而秀知太子聦明􅀂還東宫將與賢人圖政量巳必不得志更􅀃倫曰太子剛猛不可私請明公素事賈后時議皆以公爲賈氏之黨今雖欲建大功於太子太子含􅀫怒必不加賞於明公矣當謂逼百姓之望翻覆以免罪耳此乃所以速禍也今且緩其事賈后必害大子然後廢后爲太子報讎亦}
