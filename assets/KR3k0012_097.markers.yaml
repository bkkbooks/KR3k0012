  - {type: variant, offset: 4418, length: 0, content: '', SBCK: 足狗尾續而以茍且之惠取恱人情府庫之儲不充於賜金銀冶鑄不給於印故有白板之侯君子恥服其章百姓亦知其不終矣倫親祠太廟還遇大風飄折麾蓋孫秀旣立非常之事倫敬重焉秀任文帝爲相國時所居内府事無巨細必諮而行倫之詔令秀改革有所與奪自書青􅁓爲詔或朝令夕改者數四百官轉昜如流矣時齊王冏河間王顒成都王頴並擁强兵各據一方秀知冏等必有異圖乃選親黨及倫故吏爲三王叅佐及郡守秀本異與張林有􅂩雖外相推崇内實忌之及林爲衛將軍􅀷怨不得開府潜與拲牋具􅀃秀專權動違衆心而功臣皆小人撓亂朝廷}
  - {type: page-break, offset: 4418, content: '', id: KR3k0012_SBCK_097-10a}
