  - {type: variant, offset: 3322, length: 2, content: 墮地, SBCK: 飯函也淅箕廣雅曰淅䉴音箱㔯音旋䉛音郁纂文曰䉛浙箕也一曰􅞉魯人謂之淅䉴方言曰箕陳魏宋楚文間謂之籮炊䉛謂之縮漉米䉛也或謂之㔯江東呼淅籖也筐方言曰箄必弭切簍音縷籅音餘䈱音叨筐也音筥江􅃆之間謂之籅趙代之間謂之䈱淇衛之間謂之牛筐處其通語也小者南楚謂之筐􅀜而西秦晉之郊謂之箄今江東亦名小籠爲箄􅀃文曰筐飯筐也飴牛筐也方曰筐圎曰三禮圖曰大筐以竹受五斛大夫以盛米致饋於聘賔小筐以竹受五升以盛米}
