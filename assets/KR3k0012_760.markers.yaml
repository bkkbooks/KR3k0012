  - {type: variant, offset: 800, length: 218, content: 四足而已嶡之言蹶也謂中足為橫距之象周禮謂之距相之言積椇也謂曲橈之也房謂足下跗也上下兩間有似於堂房魯頌曰邊豆大房也夏后氏以楬苦戛切豆殷玉豆周獻息列切豆揭無異物之飾也獻䟽剖之又曰禮有以多為貴者天子之豆二十有六諸公十有六諸侯十有二上大夫八下大夫六又曰子云觴酒豆肉讓而受惡民猶犯齒傳曰鳥獸之肉不登於俎皮革齒牙骨角毛羽不登於器則公不射古之制也論語曰衛靈公問陳音陣於孔子孔子曰俎豆之事則嘗聞之矣軍旅之事未之學也史記曰孔子為小兒時常陳俎豆以為戲國語曰, WYG: ''}
