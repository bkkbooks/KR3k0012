  - {type: variant, offset: 3301, length: 9, content: 杯擲屋棟杯懸著屋棟, SBCK: 載牲醴又葉愽三寸長八寸柄長二尺四寸丹􅃮兩頭詩曰有捄天畢載施之行箋云畢所以助載鼎實儀禮曰宗人執畢鄭􅀇曰畢狀如文也禮曰畢用桑長三尺刋其柄與末畢所以助主人者刋猶削也飯帚􅀃文曰陳留以飯帚爲䈾䈾巢切亦盛箸籠又作筲也炙函東宫舊事曰􅃮㹮炙大函一具飯函列異傳曰景􅀄中城陽縣吏王巨嘗作倦枕机卧聞竈下呼曰文納何以在人頭下應曰我見枕不得}
