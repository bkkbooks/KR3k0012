  - {type: variant, offset: 2053, length: 0, content: '', SBCK: 知之晉四王起事曰惠帝還洛陽黄門以瓦盂盛茶上至尊韓子曰爲人君者猶盂也人猶水也盂圎水圎盂方水方凉州異物志曰琥珀作盂瓶東方朔荅客難曰安於覆盂􅂫鉝音立吕靜云胡食器也林邑記曰林邑王范明逹獻琉璃􅂫鉝二口安哉李尤安哉銘曰安哉令名甘旨是盛埏埴之巧甄陶所成食彼美珎思此鹿鳴匕方言曰匕}
