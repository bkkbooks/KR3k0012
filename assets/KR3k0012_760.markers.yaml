  - {type: variant, offset: 1900, length: 101, content: 口異苑曰司州衛士度苦行居士也其母常誦經長齋堂眾僧未食俱望見空中有一物下既落其前乃是大鉢滿中香飯度以晉惠懷之際得道齊王融謝安陸王賜銀鉢啟曰素金之貴有訪山經鐫刻可奇見符神鼎撤膳器於珍羞之席降寶於簞瓢之門窪俗, WYG: 枚世}
