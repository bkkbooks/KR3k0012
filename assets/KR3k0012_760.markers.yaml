  - {type: variant, offset: 363, length: 655, content: 如簋而平下璉受一升漆赤中蓋亦龜形大夫飾口以白金制度云如簋而兌下禮曰夏后氏之四璉殷之六瑚皆黍稷器論語曰子貢問賜也何如曰汝器也曰何器也曰瑚璉也盛黍稷之器夏曰瑚殷曰璉敦牟三禮圖曰敦有足其形如今酒罇法牟受一斗如敦形古牟受一升平下漆赤中飾口以白金蓋亦龜形周禮曰若合諸侯則共珠盤玉敦敦盤類也珠玉以為飾也古以盤盛血以敦盛食也禮曰敦牟危匜音移非餕莫敢用敦牟黍稷器也又曰有虞氏之兩敦黍稷器儀禮曰主婦設兩敦黍稷于俎南俎豆說文曰豆古食肉器也爾雅曰木豆謂之豆豆禮器也瓦豆謂之登即高登也三禮圖曰豆以木為之受四升高尺二寸漆赤中大夫以上亦雲畫諸侯加象飾口之天子玉飾登以几盛湆音泣受斗二升口徑尺二寸足徑八寸高二尺四寸小身有蓋似豆狀詩曰卬盛於豆于豆于登又曰邊豆大房大房飾俎周禮曰上公豆四十侯伯豆三十有二子男豆十有四儀禮曰宰夫自東房薦豆六設千醬東又曰太羹湆不加實于登也大戴禮曰武王踐祚於觴豆為銘焉禮曰魯季夏六月以禘禮祀周公於太廟俎用梡嶡梡音丸嶡居衛切又曰俎有虞氏以梡夏后氏以嶡殷以椇音矩周以房俎鄭玄曰梡斷木為之四足而已嶡之言蹶也謂中足為橫距之象周禮謂之距相之言積椇也謂曲橈之也房謂足下跗也上下兩間有似於堂房魯頌曰邊豆大房也夏后氏以楬苦戛切豆殷玉豆周獻息列切豆揭無異物之飾也獻䟽剖之又曰禮有以多為貴者天子之豆二十有六諸公十有六諸侯十有二上大夫八下大夫六又曰子云觴酒豆肉讓而受惡民猶犯齒傳曰鳥獸之肉不登於俎皮革齒牙骨角毛羽不登於器則公不射古之制也論語曰衛靈公問陳音陣於孔子孔子曰俎豆之事則嘗聞之矣軍旅之事未之學也史記曰孔子為小兒時常陳俎豆以為戲國語曰, SBCK: ''}
