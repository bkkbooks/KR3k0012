  - {type: variant, offset: 2063, length: 2, content: 㼵抱, SBCK: 震驚百里不喪匕鬯詩曰有饛簋飱有捄􅁄匕箋云􅎅所以載鼎實也周禮曰大喪共角角折角匕也礼䘮大記曰楔齒用角也儀禮曰主人執匕禮曰杜蕢苦怪切謂晉平公曰蕢也宰夫也非切是供又曰匕以桑長三尺或曰五尺刋其柄與末匕所以載牲字者此謂䘮􅀕也吉􅀕􅎅用􅁄三禮圖曰匕以載牲體長二尺四寸葉􅀶三寸長八寸􅃮丹柄頭䟽匕形如飯操以􅁄心爲之英雄記曰董常大㑹賔客誘降反者以鑊之㑹者戰慄亡失匕箸與筯字同蜀志曰曹公謂先主曰天下英雄唯使君與操耳先主方食失匕箸王隱晉書曰石勒時有謡云一杯食有兩匙石勒死人不知沈約宋書曰太子妃上丗祖金縷匕箸上以賜沈慶之枹}
  - {type: page-break, offset: 2063, content: '', id: KR3k0012_SBCK_760-3b}
  - {type: page-break, offset: 2063, content: '', id: KR3k0012_SBCK_760-4a}
  - {type: variant, offset: 2063, length: 1, content: 㼵, WYG: 震驚百里不喪匕鬯詩曰有饛簋飱有捄棘匕周禮曰大喪共角􅀈角􅀈角匕也禮喪大記曰楔齒用角􅀈也儀禮曰主人執匕禮曰杜蕢謂晉平公曰蕢也宰夫也非刀匕是供又曰匕以桑長三尺或曰五尺刋其柄與末匕所以載牲體者此謂喪祭也吉祭匕用棘三禮圖曰匕以載牲體長二尺四寸愽三寸漆丹柄頭䟽匕形如飯操以棘心為之英雄記曰董常大㑹賔客誘降反者以鑊烹之㑹者戰慄亡失匕箸蜀志曰曹公謂先主曰天下英雄唯使君與操耳先主方食失匕箸王隱晉書曰石勒時有謠云一杯食有兩匙石勒死人不知沈約宋書曰太子妃上世祖金縷匕箸上以賜沈慶之}
