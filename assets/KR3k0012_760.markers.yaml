  - {type: variant, offset: 233, length: 104, content: 以象天子飾之以玉君子以為濫矣又曰周之八簋黍稷器也傳曰衛孔文子之攻太叔也訪於仲尼仲尼曰簠簋之事則嘗聞之矣甲兵之事未之學也孝經曰陳其簠簋鄭玄曰方曰簠圓曰簋而哀慼之墨子曰堯飯土簋啜土鉶賈誼書曰古者大臣有坐不廉而廢者, krp: 䀁}
