  - {type: variant, offset: 1622, length: 171, content: 諸侯以白金飾天子以黃金飾周禮曰上公鉶四十有二侯伯鉶二十有八子男鉶十有八鉶羹器也禮曰實其簠簋籩豆鉶羹墨子曰堯飯土軌啜尺劣切土鉶如淳曰鉶器之屬以土為之瓦器也鉢沈約宋書曰廬江王禕以銅鉢二枚餉宋祖珍齊書曰竟陵王子良與丘令楷江珙音拱等共打銅鉢立韻響滅則詩成可以觀覽北齊書曰元韶魏室奇寶多入韶家有三鉢相盛可轉而不可出二石偽事曰佛圖澄死以生所服金杖銀鉢送終, SBCK: 盌忽浪起水長便失盌此人}
