  - {type: variant, offset: 3277, length: 8, content: 左慈能分杯飲酒曹, SBCK: 􅁑􅀇嘗與客食玄以口中飯盡化爲蜂數百集於客身客皆投匕箸驚懼􅀇乃張口其蜂悉入葛洪治噎方曰與對食之人當以手捉箸問噎人曰此何等物噎人當荅曰箸即復曰咽下去即愈語林曰王藍田食鷄子以箸刺之不得便大怒王述也投于地相書曰人三指用箸者自如四指用箸貴五指用箸大富貴也机方言曰爼机也西南蜀漢之郊曰杫音賜史記曰項王爲髙爼置太}
