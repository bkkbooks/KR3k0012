  - {type: variant, offset: 239, length: 324, content: 以玉君子以為濫矣又曰周之八簋黍稷器也傳曰衛孔文子之攻太叔也訪於仲尼仲尼曰簠簋之事則嘗聞之矣甲兵之事未之學也孝經曰陳其簠簋鄭玄曰方曰簠圓曰簋而哀慼之墨子曰堯飯土簋啜土鉶賈誼書曰古者大臣有坐不廉而廢者不謂不廉曰簠簋不飾瑚璉三禮圖曰瑚受一升形制未聞制度云如簋而平下璉受一升漆赤中蓋亦龜形大夫飾口以白金制度云如簋而兌下禮曰夏后氏之四璉殷之六瑚皆黍稷器論語曰子貢問賜也何如曰汝器也曰何器也曰瑚璉也盛黍稷之器夏曰瑚殷曰璉敦牟三禮圖曰敦有足其形如今酒罇法牟受一斗如敦形古牟受一升平下漆赤中飾口以白金蓋亦龜形周禮曰若合諸侯則共珠盤玉敦敦盤類也珠玉以為飾也古以盤盛血以敦盛食也禮曰敦牟危匜音移非餕莫敢用敦牟黍稷器也又曰有虞氏之兩敦黍稷器儀禮曰主婦設兩敦黍稷于俎南俎豆, WYG: 涓􅃑}
