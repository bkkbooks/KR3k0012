  - {type: variant, offset: 3016, length: 28, content: 項曼都好道學仙去家三年而反曰有仙人將我上天離月數里而止月, SBCK: 以箸撞鍾以筭擊鼔鍾鼔不能鳴者用橦}
  - {type: variant, offset: 3016, length: 0, content: '', WYG: 以箸撞鐘以筭擊鼓鐘鼓不能鳴者用撞之者小也神仙傳曰葛𤣥嘗與客食𤣥以口中飯盡化為蜂數百集於客身客皆投匕箸驚懼𤣥乃張口其蜂悉入葛洪治噎方曰與對食之人當以手捉箸問噎人曰此何等物噎人當吞曰箸即復曰咽下去即愈語林曰王藍田食雞子以箸刺之不得便大怒王述也投於地相書曰人三指用箸自如四指用箸貴五指用箸大冨貴也机方言曰爼机也西南蜀漢之郊曰杫音賜史記曰}
  - {type: page-break, offset: 3016, content: '', id: KR3k0012_WYG_760-9a, image: WYG0899/WYG0899-0660c.png}
  - {type: variant, offset: 3016, length: 28, content: 項曼都好道學仙去家三年而反曰有仙人將我上天離月數里而止月, krp: 以箸撞鍾以筭擊鼔鍾鼔不能鳴者用橦}
  - {type: variant, offset: 3017, length: 7, content: 曼都好道學仙去, WYG: 王為高爼置太公其上如淳曰髙爼机上也後漢書曰樂松者河内人天性朴忠}
