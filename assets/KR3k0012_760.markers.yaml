  - {type: variant, offset: 10, length: 1, content: 簠, SBCK: 盌謂之盂或謂之銚銳或謂之櫂椀謂之䀁不謂之㳙抉蠲玦兩音􅀃文曰盌小盂也呉志曰曹公出濡湏甘寜爲前部督}
  - {type: variant, offset: 10, length: 191, content: 簠受一升下足高一寸中方外圓漆丹中蓋龜形諸侯飾以象天子玉飾盛黍稷簋受一升足高一寸中圓外方挫其四角漆赤中蓋亦龜形其飾如簠盛稻梁易曰樽酒簋貳用缶鄭玄曰唯北有斗不可以挹酒漿斗上有建星建星形似簋貳副也建星上星又似缶也納約自牖無咎詩曰權輿刺康公與賢人有始無終也於我乎每食四簋今也每食不飽于嗟乎不承權與又曰於粲灑掃陳饋八簋周禮曰瓬音放人為簋實一觳音夫崇尺厚半寸脣寸儀禮曰佐食分簋士用敦言簋者客同姓, WYG: 盌謂}
  - {type: variant, offset: 10, length: 191, content: 簠受一升下足高一寸中方外圓漆丹中蓋龜形諸侯飾以象天子玉飾盛黍稷簋受一升足高一寸中圓外方挫其四角漆赤中蓋亦龜形其飾如簠盛稻梁易曰樽酒簋貳用缶鄭玄曰唯北有斗不可以挹酒漿斗上有建星建星形似簋貳副也建星上星又似缶也納約自牖無咎詩曰權輿刺康公與賢人有始無終也於我乎每食四簋今也每食不飽于嗟乎不承權與又曰於粲灑掃陳饋八簋周禮曰瓬音放人為簋實一觳音夫崇尺厚半寸脣寸儀禮曰佐食分簋士用敦言簋者客同姓, krp: 盌謂}
