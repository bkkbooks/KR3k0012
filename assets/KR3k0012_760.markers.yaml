  - {type: variant, offset: 3187, length: 402, content: 洲記曰周穆王時西胡獻夜光常滿杯杯容三升是白玉之精光明照室夕以杯於庭中仰向天比明水便滿杯中水甘香異美斯實神靈之器葛仙公別傳曰仙公為客設酒不令人傳之見杯自至人前若不盡者則杯不去神仙傳曰左慈能分杯飲酒曹公聞試之慈拔簪以畫杯杯即斷飲畢以杯擲屋棟杯懸著屋棟動搖似飛鳥欲落不落良久乃墮地又曰劉剛未仙時姮娥降共語如人語不解其章又曰劉剛未仙時姮娥降共向留一明月杯云以示世人南州異物志曰鸚鵡螺狀以覆杯形如鳥頭向其腹視似鸚鵡故以為名南越志曰南海以鰕頭為長杯頭長數尺金銀鏤之晉廣州刺史嘗以杯獻簡文簡文用以盛藥未及飲無故酒躍於外時廬江太守曲安遠頗解術數即命筮之安遠曰卻三旬後庭將有告慶者永嘉郡記曰君鄣山袁君廟神降於祝史以神前杯灌地以大羹杯覆之有頃發杯而菌芝生於杯下後漢馮敬通杯銘曰樂則思舊燕則思歡民之失德乾餱以愆束晢貧家賦曰持缺耳之破杯班彪上啟事曰官吏二千石布襦羊裘以白木杯飲酒飾虛欲以求名采譽魏武帝上雜物䟽曰有銀畫象牙杯盤五具, WYG: 枚}
