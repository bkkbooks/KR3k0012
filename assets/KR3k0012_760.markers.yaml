  - {type: variant, offset: 3084, length: 189, content: 晉咸康起居注曰詔送遼東使叚遼等鸚鵡杯東宮舊事曰漆四升杯四十漆杯子三百漢武故事曰上崩後鄠縣有一人於市貨玉杯吏欲捕之因忽不見縣送其器推問茂陵中物霍光呼問說市人形貌如先帝又曰武帝作承露盤仙人象擎玉杯以取雲表之露十洲記曰周穆王時西胡獻夜光常滿杯杯容三升是白玉之精光明照室夕以杯於庭中仰向天比明水便滿杯中水甘香異美斯實神靈之器葛仙公別傳曰仙公為客設酒不令人傳之見杯自至人前若不盡者則杯不去, SBCK: ''}
