  - {type: variant, offset: 3108, length: 0, content: '', WYG: 貊灸大函一具飯函列異傳曰景初中城陽縣吏王臣嘗作倦枕機卧聞竈下呼曰文納何以在人頭下應曰我見枕不得動汝来就我至乃飯函也淅箕廣雅曰淅䉴音箱㔯音旋䉛音郁篡文曰䉛淅箕也一曰􅀢魯人謂之淅䉴方言曰箕陳魏宋楚間謂之籮炊䉛謂之縮漉米籔也或謂之㔯河東呼淅􅀢也筐方言曰箄必弭切篓音缕籅音䈱音叨筐􅀢也􅀢音筥江沔之間謂之籅趙岱之間謂之䈱淇衞之間謂之牛筐􅀢其通語也處小者南楚謂之簍闗而西秦晉之郊謂之箄今江東名小籠亦為箄說文曰筐飯筐也􅀢飯牛筐也方曰筐圓曰􅀢三禮圖曰大筐以竹受五斛大夫以盛米致饋於聘賔小筐以竹受五升以盛米又曰筐以盛熬熬榖}
  - {type: page-break, offset: 3108, content: '', id: KR3k0012_WYG_760-10b, image: WYG0899/WYG0899-0661b.png}
