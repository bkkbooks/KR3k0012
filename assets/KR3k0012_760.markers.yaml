  - {type: variant, offset: 3679, length: 1, content: 為, SBCK: 爲將拯巳於水火之中也簞食壷漿以迎王師􅀂殺其父兄係累其子弟如之何其可又曰非其道則一簞食不可受於人如其道則舜受堯之天下不以爲泰又曰啇之君子實􅀇黄于篚以迎其君子其小人簞食壷漿以迎其小人黄石公三略曰良將用兵有饋一簞醪者使投之於河令士卒迎流而飲之爵觶散用歛􅀃文曰爵禮器也象爵之形觶音枝受四升詩曰赫如渥赭公言錫爵周禮曰享先王賛玉爵宗廟献用玉爵大朝覲㑹同賛獻玉爵王爵王禮諸侯之酢爵也又曰梓人爲飲酒器爵一升觚三升獻以爵而酬以觚禮曰執玉爵者弗揮爲其寳而脆也又曰知音智悼子卒未葬晉平公飲酒師曠李調侍鼔鍾杜蕢自外來聞鍾聲曰安在寢杜簣入寢歴階而升酌曰曠飲斯又酌曰調飲斯又酌堂上北面坐而飲之降趨而岀平公呼而進之曰簣曩者爾心或開予是以不與爾言飲曠何也曰子卯不樂紂以甲子死桀以乙夘亡王者謂之疾日不舉樂爲事所以自戒懼也知悼子䘮在堂未葬斯其爲子卯也大矣曠也太師也不以詔是以飲之也尓飲調何也曰調也君之䙝臣也爲一飲一食忘君之疾是以飲之也尓飲何也曰蕢宰夫也非刀匕是供又敢與知防是以飲之也平公曰寡人亦有過焉酌而飲寡人社蕢洗而揚觶公謂侍者曰如我死則必無廢斯爵也至于今旣畢獻斯楊觶謂之社舉又曰宗廟之􅀕貴者獻以爵賤者獻以散尊者舉觶卑者舉角凡觴一升曰爵二􅂛曰飢三􅂛曰觶四升曰角五升曰散也又曰魯祀周公於太廟爵用玉琖仍彫加以壁角爵君所進於尸也仍因也因爵之形爲稱也加加爵也散角皆以璧飾其口也又曰孔子射於矍相之圃蓋觀者如堵牆使公罔之裘序􅀧楊觶而語公罔之裘楊觶而語曰㓜壯孝弟􅂄耋好禮不從流俗修身以俟死者不在此位也蓋去者半處者半序􅀧又楊觶而語曰好學不倦好禮不變旄期稱道不乱者不在此位也蓋僅有存者三禮圖曰爵受一升尾長六寸博二寸傅翼兊音銳下方足􅃮赤雲氣又曰散受五升左傳曰凡公行告于宗廟反則飲至舎爵䇿勲焉爵飲酒器也旣飲置爵則書勲勞又曰􅉑公請器王賜之爵玉爵也爵人䝿石也後趙書曰石虎子韜以琉璃爵螺}
