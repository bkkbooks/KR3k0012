  - {type: variant, offset: 3109, length: 0, content: '', WYG: 種八筐大夫三種六筐士二種四筐易曰女承筐無實書曰厥篚織文又曰厥篚檿絲厥篚𤣥纎縞厥篚織貝厥篚𤣥纁璣組厥篚纎纊又曰惟其士女篚厥𤣥黄紹我周王詩曰采采卷耳不盈頃筐又曰于以采蘋南澗之濵于以盛之維筐及筥方曰筐圓曰筥又曰摽有梅頃筐塈之又曰女執懿筐遵彼㣲行爰求柔桑禮曰蠶則績而蠏有筐左傳曰筐筥錡釡之器潢汙行潦之水可薦於鬼神可羞於王公又曰晉侯筮嫁伯􅁎於秦遇歸妹之暌其繇曰士刲羊亦無􅎺也女承筐亦無貺也西京雜記曰元后在家日䴏衘白石大如指墮績筐中后取之石自剖為二其中文曰母天下遂復還合後為皇后常致璽中莊子曰愛馬者以筐盛屎吕氏春秋曰有娀氏二女為九成之臺上帝令鷰徃遺二卵争搏之覆以玉筐北飛遂不反簡狄吞之生契􅞊音吕方言曰􅞊南楚謂之筲趙魏之郊謂之􅞊說文曰􅞊飯筥也受五}
