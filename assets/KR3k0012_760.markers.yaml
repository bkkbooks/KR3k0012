  - {type: variant, offset: 1019, length: 453, content: 侯使聘周王召士季曰汝今我王室之一二兄弟以相見將和恊典禮以示民訓奉其犧息奇切象出其尊彝陳其俎豆漢書曰韓延壽為潁川太守令文學諸生皮弁執俎豆為吏民行喪娶之禮又曰劉向說上曰有司定法筆削救時務也至於禮樂則曰不敢是敢於殺人不敢於養人為其俎豆管絃之間小不備因絕不為是去小不備而就大不備東觀漢記曰劉昆教授弟子恒五百餘人每春秋饗射常備列典儀以素木瓠葉為俎豆莊子曰祝宗人說彘曰汝奚惡死吾將加汝肩尻乎彫俎之上賈誼新書曰昔周文王使太公望傅太子發嗜鮑步巧切魚而公弗與文王曰發嗜鮑魚何為弗與太公曰禮鮑魚不登乎俎豆豈有非禮而可以養太子乎籩說文曰籩竹豆也爾雅曰竹豆謂之籩禮器也書曰祀於周廟邦甸侯衛駿奔走執豆籩詩曰儐爾籩豆飲酒之飫又曰籩豆有楚殽核維旅禮曰鼎俎奇而籩豆偶陰陽之義也左傳曰楚子入享於鄭加籩豆六品又曰鄭伯饗趙孟為客具五獻籩豆幕下語曰籩豆之事則有司存焉韓子曰晉文公反國至河令籩豆捐之手足胼胝者後之咎犯聞之而哭公問之對曰籩豆所以食也而君捐之手足胼胝有功者也而君後之今臣與在後中不勝其哀故哭神異經曰西北荒中有玉饋之酒其上有玉樽玉籩樏晉太, SBCK: 咸}
