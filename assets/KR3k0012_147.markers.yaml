  - {type: variant, offset: 437, length: 1, content: 下, WYG: 子無冠禮而諸侯有冠禮故以為問也孔子曰君薨而世子主䘮是亦冠己君子無所殊諸侯亦人君與天子無異孔叢子曰穆公問於子思曰立太子有常乎荅曰有}
  - {type: variant, offset: 438, length: 7, content: 之民各得其所也, krp: 無生而貴者}
