  - {type: variant, offset: 6053, length: 0, content: '', WYG: 壯大柔仁好儒見宣帝所用多文法吏以刑名繩下大臣楊惲盖寛饒等坐刺議辭語為罪而誅嘗侍讌從容言陛下持刑太深宜用儒生宣帝作色曰漢家自有制度本以覇王道雜之奈何純任德教害政乎且俗儒不達時宜好是古非今使人眩於名實不知所守何足委任乃歎曰亂我家者太子也繇是踈太子而愛淮陽王曰淮陽王明察好法宜為吾子而王母張媫妤尤幸上有意欲用淮陽王代太子然以少依許氏俱從微起故終不背焉又曰孝宣帝王后宣帝即位召入後宮稍進為婕妤霍皇后廢上憐許太子早失母幾為霍氏所害於是乃選後宮素謹慎而無子者遂立王婕妤為皇后令母養太子又曰孝成皇帝元帝太子也母曰王皇后元帝在太子宫生甲觀畫室如淳曰甲觀觀名畫室室名三輔黄圖云太子宫有甲觀師古曰甲者甲乙丙丁之次也為世嫡皇孫宣帝愛之字曰太孫常置左右年三嵗而宣帝崩元帝即位帝為太子壯好經書寛博謹慎初居桂宫上嘗急召太子出龍樓門張晏曰門樓上有銅龍若白鶴飛廉之為名也不敢絶馳道應劭曰馳道天子所行道也葢若今之中道師古曰絶横度也西至直城門晉灼曰黄圗西出南頭第二門得絶乃度還入作室門上遲之問其故以狀對上大恱乃著令令太子得絶馳道云其後幸酒樂燕樂幸酒好酒樂燕沈讌上不以為亂既而定陶恭王有才藝母傅昭儀又愛幸上以故常有意欲以恭王為嗣頼侍中史丹護太子家輔助有力上亦以先帝尤愛太子故得無廢又曰孝哀皇帝元帝庻孫定陶㳟王子也嗣立為王好文辭法律元延四年入朝盡從傅相中尉時成帝少弟中山孝王亦來朝獨從傅上以問定陶王對曰令諸侯王朝得從其國二千石傅相中尉皆國二千石故盡從之上令誦詩通習能說他日問中山王獨從傅何法令不能對帝由此賢定陶王數稱其才為加元服而遣之時年十七矣明年徴立為皇太子謝曰臣幸得繼父守藩為諸侯王材質不足以假充太子之宫太平御覽巻一百四十七}
