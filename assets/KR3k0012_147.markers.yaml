  - {type: variant, offset: 5620, length: 433, content: 二年春郕伯卒郕人立君立君改立君不周太子者太子以夫鍾與郕邽來奔郕邽亦邑名也一曰郟邦之寶圭太子父在自安於夫鍾國人以為不順故郕伯卒而更立君太子以其國寶與地夫鍾來奔也又曰齊高厚相太子光以會諸侯於鍾離不敬士莊伯曰高厚相太子會諸侯將社稷是衛而皆不敬高厚與光俱不敬棄社稷也其將不免乎免脫也言將不脫罪禍不以壽終也傳舉此者為十九年齊殺其大夫高厚二十五年崔杼弒君光起本也又曰齊侯娶於魯曰顏懿姬無子其姪鬷聲姬兄子曰姪懿姬所從也顏鬷皆其母姓懿聲謚也傳家從後言之故舉謚也生光以為太子諸子諸子妾生子氏仲子戎子子嬖二子宋女仲子生牙公子牙也屬諸戎子戎子取牙養之戎子請以為太子許之齊侯許之仲子曰不可廢常不祥立長為常而廢之為不祥也間諸侯難間犯謂光已列於諸侯難成光之立也列於諸侯矣謂上數從諸侯北伐盟會今無故而廢之是專黜諸侯也專獨也光比與諸侯列於盟不可黜也而以難犯不祥以難成之事犯不善君必悔之公曰在我而已遂東太子光東徙之東垂也使高厚傅牙以為太子夙沙衛為少傅齊侯疾崔杼微逆光微隱匿也疾病而立之疾困也而立為太子, SBCK: 七}
