  - {type: variant, offset: 1661, length: 0, content: '', WYG: 餘鬚眉皓白衣冠甚偉上怪之問曰彼何為者四人前對各言名姓曰東園公甪里先生綺里季夏黄公上乃大驚曰吾求公數嵗公避逃我今公何自從吾兒遊乎四人皆曰陛下輕士善罵臣等義不為辱故恐而亡匿竊聞太子為人仁孝恭敬愛士天下莫不延頸欲為太子死者故臣等來耳上曰煩公幸卒調䕶太子如淳曰調䕶猶營䕶也四人為壽已畢趨去上目送之召戚夫人指示四人者曰我欲易之彼四人輔之羽翼已成難動矣呂后真而主矣漢書外戚傳曰孝景王皇后武帝母也入太子宮太子幸愛之生}
