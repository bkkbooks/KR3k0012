  - {type: variant, offset: 13, length: 20, content: 黃离元吉离南方之卦离為火土記位焉土色黃火, SBCK: 二三子聞於憂虞則有疾疹亦姑謀樂何憂於無君言二三子聞於隣國憂虞則疾疢在其間今無疾疹何爲不自謀自樂何憂無君乎公疾使國惠子髙昭子立荼國惠子國景}
