  - {type: variant, offset: 55, length: 526, content: 慎成其業故吉矣象曰明兩作离大人以繼明照于四方王肅曰兩离相續維明之義也周易鼎卦曰初六鼎顛趾利出否得妾以其子旡咎鄭玄曰顛踣也趾足也無事曰趾設陳曰足爻體選為服初爻在服之下足象也足所以承正鼎也初陰爻而柔與乾同體以否正承乾乾為君以喻君夫人事君若失正禮踣其為足之道情無怨則當以和義出之然如否者嫁於天子雖失禮無出道遠之而已遠之子廢坤為順又為子母牛在后妃之旁側妾之例也有順德子必賢賢而立以為世子又何咎也周易震卦曰震驚百里不喪匕鬯彖曰震驚百里遠而懼邇也出可以守宗廟社稷以為祭主王肅曰在有靈而尊者莫若於天有靈而貴者莫若於王有聲而威者莫若於雷有政而嚴者莫若於侯是以天子當乾諸侯用震地不過一同雷不過百里政行百里則匕鬯亦不喪祭祀國家大事不喪宗廟安矣處則諸侯執其政出則長子掌其祀周易說卦曰震一索而得男故謂之長男又曰震為長子易經曰震下乾上旡妄天精起鄭玄注曰起猶立也乾為天文震為長子聖人立為天子天下之民各得其所也又曰主器者莫若長子故受之以震尚書大傳曰唯四月太子發上祭于畢下至於盟津之上乃告于司馬司徒司空諸節亢才予無知以先祖先父之有德之臣左右小子予受先公戰力賞罰以定厥功明于先祖之遺鄭玄注曰四月者周四月也發周武王也卒父業故稱太子也太子發升于舟中流白魚入于舟王跪取出俟以燎群公咸曰休哉尚書, SBCK: ''}
