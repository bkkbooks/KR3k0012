  - {type: variant, offset: 4463, length: 329, content: 以歸是以師婚也民其謂我何遂辭諸鄭伯又曰九月乙卯子同生服虔注曰桓太子莊公同以太子生之禮舉之接以太牢接者子初生接見於父卜士負之士妻食之公與文姜宗婦命之又曰曹太子來朝曹太子桓公子莊公射姑賓之上卿之禮曹伯有故使其太子攝而朝曲禮曰諸侯之嫡子攝其君未誓於天子則以皮帛繼子男如諸侯之上卿禮也上卿出入三積食三牢牽二年一享一食宴之也饗曹太子初獻樂奏而歎初獻酒如獻爵樂奏人上堂也初獻爵奏樂太子歎而哀歎也施父曰曹太子其有憂乎非歎所也施父魯大夫古之享食所以觀威儀省禍福無喪而感憂必及焉曹太子臨樂而歎故曰其有憂乎父將死兆先見之也又曰晉侯使太子申生伐東山皋落氏里克諫曰太子奉冢祀社稷之粢盛以朝夕視君膳者故曰冢子君行則守有守則從從曰撫軍守曰監國古之制也夫帥師專行謀誓軍旅君與國政之所圖也非, WYG: 自經後車千秋言}
