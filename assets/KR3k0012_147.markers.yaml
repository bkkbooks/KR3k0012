  - {type: variant, offset: 4384, length: 1, content: 忽, SBCK: 將兵事危矣乃􅀃建成侯曰太子將兵有功則位不益太子無功還則從此受禍矣且太子所與俱諸將皆甞與上定天下驍將也今使太子將之此無異使羊將狼也皆不肯爲盡力其無功必矣臣聞母愛者子抱今戚夫人日夜侍御趙王如意常抱居前上曰終不使不肖子居愛子之上明乎其代太子位必矣君何不急請吕后承間爲上泣言黥布天下猛將也善用兵今諸將皆陛下故等夷夷猶儕也乃令太子將此屬無異使羊將狼也莫肯爲用且使布聞之則鼓行而西耳晋灼曰鼓行而西言無所畏上雖病強載輜車卧而護之諸將不敢不盡力上雖苦爲妻子自強於是吕澤立夜見吕后吕后承間爲上泣涕而言如四人意上曰吾惟竪子固不足遣而公自行耳於是上自將兵而東羣臣居守皆送至灞上留侯病自強起至曲郵長安縣有曲郵聚見上曰臣冝從病甚楚人剽疾願上無與楚人爭鋒因􅀃上曰令太子爲將軍監􅀜中兵上曰子房雖疾強卧而傅太子是時叔孫通爲太傅留侯行少傅事漢十二年上從擊破布歸疾益甚愈欲易太子留侯諌不聽因疾不視事叔孫太傅稱􅀃引古今以死爭太子上佯許之猶欲易之及讌置酒太子侍四人者從太子年皆八十有餘􅂡眉皓白衣冠甚偉上恠之問曰彼何爲者四人前對各言名姓東園公角里先生綺里季夏黄公上乃大驚曰吾求公數歳公避逃我今公何自從吾兒遊乎四人皆曰陛下輕士善罵臣等義不爲辱故恐亡匿竊聞太子爲人仁孝恭敬愛士天下莫不延頸欲爲太子死者故臣等來耳上曰煩公幸卒調護太子如淳曰調護猶營護也四人爲壽巳畢起去上目送之召戚夫人指示四人者曰我欲易之彼四人輔之羽翼巳成難動矣吕后子眞而主矣漢書外戚傳曰孝景王皇后武帝母也入太子宫太子幸愛之生三女一男男方在身時王夫人夢日入其懷以告太子太子曰此貴徴也未生文帝崩景帝即位王夫人生男是時薄皇后無子後數歳景帝立齊栗􅁎男爲太子而王夫人男爲膠東王長公主嫖有女欲與太子爲妃栗􅁎妬而景帝諸美人皆因長公主見得貴幸栗􅁎日怨怒謝長主長主不許長主欲與王夫人夫人許之㑹薄皇后廢長公主日􅉲栗􅁎景帝嘗囑諸􅁎子曰吾百歳後善視之栗􅁎怒不肯應言不遜景帝心銜之而未發也長公主日譽王夫人男之美帝亦自賢之又以曩者所夢日符計未有所定王夫人又隂使人趣大臣立栗􅁎爲皇后大行奏事文曰子以母貴母以子貴今太子母號冝爲皇后帝怒曰是乃所當言耶遂按誅大行廢太子爲臨江王栗􅁎愈恚不得見以憂死卒立王夫人爲皇后男爲太子漢武故事曰武帝生猗蘭殿四歳立爲膠東王七歳立爲皇太子漢書曰衛皇后生戾太子據元狩元年立爲皇太子年七歳矣􅀄上年二十九乃得太子甚喜爲立禖張晏曰禖者求子月令曰祀于髙禖是使東方朔枚臯作禖祝及壯詔受公羊春秋又從瑕丘江公受榖梁及冠就宫上爲立􅀶望􅁐使通賔客從其所好故多以異端進者元鼎四年納史良娣韋昭曰良娣官也太子有妃有良娣有孺子凡三等産子男進號曰史皇孫張晏曰皆以舅氏姓爲氏以相别也武帝末衛后寵衰江充用事充與太子及衛氏有􅂩恐上晏駕後太子所誅㑹巫蠱事起充因此爲姦是時上春秋髙意多所惡以爲左右皆爲蠱道祝詛窮治其事充典治巫蠱遂至太子宫掘蠱得桐木人太子召問少傅石德德懼爲師傅并誅因謂太子曰姧臣如此太子將不念􅁗扶􅂫事耶太子急乃收捕充斬以聞遂部賔客爲將率與丞相劉屈釐等戰太子兵敗亡不得上怒甚羣下憂懼不知所出壷􅀜三老茂上書云子弄父兵罪當笞尓書奏天子感寤太子之亡也東至湖藏匿泉鳩里主人家貧常賣屨以給太子太子有故人在湖聞其冨贍使人呼之而發覺吏圍捕太子太子自度不得脫即入室自經後車千秋言太子之􅁈上遂擢千秋爲丞相而族滅江充家上憐太子無辜乃作思子宫爲歸來望思之臺於湖天下聞而悲之宣帝即位有司奉謚曰戾置奉邑三百家又曰孝元皇帝爲太子也母曰哀許皇后宣帝微時生民間年二歳宣帝即位八歳立爲太子壯大柔仁好儒見宣帝所用多文法吏以刑名繩下大臣楊惲蓋寛饒等坐刺譏}
