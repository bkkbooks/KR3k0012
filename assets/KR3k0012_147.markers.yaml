  - {type: variant, offset: 4614, length: 1005, content: 享一食宴之也饗曹太子初獻樂奏而歎初獻酒如獻爵樂奏人上堂也初獻爵奏樂太子歎而哀歎也施父曰曹太子其有憂乎非歎所也施父魯大夫古之享食所以觀威儀省禍福無喪而感憂必及焉曹太子臨樂而歎故曰其有憂乎父將死兆先見之也又曰晉侯使太子申生伐東山皋落氏里克諫曰太子奉冢祀社稷之粢盛以朝夕視君膳者故曰冢子君行則守有守則從從曰撫軍守曰監國古之制也夫帥師專行謀誓軍旅君與國政之所圖也非太子之事師在制命而已稟命則不威專命則不孝故君之嫡嗣不可以帥師君失其官帥師不威將焉用之且臣聞皋落氏將戰君其舍之舍置置申生勿使將兵也公曰寡人有子未知其誰立焉不對而退里克不對太子帥師公衣之偏衣佩之金玦偏衣偏裝之衣偏異色駁不純裝在中左右各異故曰偏金玦以金為玦太子將戰狐突諫曰不可昔辛伯諗周桓公曰內寵並后外寵貳政嬖子配嫡大都耦國亂之本也周公弗從故及於難今亂本成矣立可必乎孝而安民子其圖之與其危身以速罪也速召也疾也言太子不去身必危疾召罪狐突知其雖本既成而太子拘於一節不達至孝之義與皋落戰雖勝而歸猶不能免於難而使父有悖感殺子之罪故傳曰儲眾賢之言以迹太子所以死也經在僖信公五年晉侯殺其世子申生又曰會于首止會王太子鄭謀寧周也惠王以惠后故將廢太子鄭而立王子帶故齊桓帥諸侯會王太子以定其位又曰盟會於甯母謀鄭故也鄭伯使太子華聽命于會言於齊侯曰泄氏孔氏子人氏三族實違君命君若去之以為成我以鄭為內臣君亦無所不利焉齊侯將許之管仲曰君以禮與信屬諸侯而以姦終之無乃不可乎子華由是得罪於鄭鄭伯罪之也又曰初鄭公子蘭出奔晉公子蘭鄭文公賤妾燕姞之子穆公也鄭逐群公子故奔晉也從於晉侯伐鄭請無與圍鄭許之晉善蘭不忘本國故也故使待命於東待命於鄭東也鄭石甲父侯宣多逆以為太子以求成於晉晉人許之又曰秦康公送公子雍於晉也康公秦穆公太子罃晉出也曰文公之入也無衛故有呂郤之難呂甥郤芮欲焚公害也乃多與之徒衛衛徒兵也穆嬴日抱太子穆嬴襄公夫人太子靈公以啼于朝曰先君何罪其嗣亦何罪舍嫡嗣不立而外求君將焉置此實置也此太子出朝則抱以適趙氏頓首於宣子之門曰先君奉此子而屬諸子曰此子若才吾受子之賜如子為吾教誨此子使之有賢才知人君之道也明吾受子之賜賜猶惠不才吾唯子之怨才而受賜美其教也不才怨子惡其教不至也今君雖終言猶在耳君沒未久其言聲言氣尚在耳而棄之若何宣子與諸大夫皆患穆嬴且畏偪言諸大夫患釐嬴之言以君顏命之言責己也畏逼迫無置靈公一曰畏他公干徒來相逼迫矣乃背先蔑而立靈公以禦秦師又曰郕太子朱儒自安夫鍾自安猶處也夫鍾郎邑國人弗徇徇順也, SBCK: 百四}
