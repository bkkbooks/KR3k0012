  - {type: variant, offset: 5125, length: 924, content: 又曰盟會於甯母謀鄭故也鄭伯使太子華聽命于會言於齊侯曰泄氏孔氏子人氏三族實違君命君若去之以為成我以鄭為內臣君亦無所不利焉齊侯將許之管仲曰君以禮與信屬諸侯而以姦終之無乃不可乎子華由是得罪於鄭鄭伯罪之也又曰初鄭公子蘭出奔晉公子蘭鄭文公賤妾燕姞之子穆公也鄭逐群公子故奔晉也從於晉侯伐鄭請無與圍鄭許之晉善蘭不忘本國故也故使待命於東待命於鄭東也鄭石甲父侯宣多逆以為太子以求成於晉晉人許之又曰秦康公送公子雍於晉也康公秦穆公太子罃晉出也曰文公之入也無衛故有呂郤之難呂甥郤芮欲焚公害也乃多與之徒衛衛徒兵也穆嬴日抱太子穆嬴襄公夫人太子靈公以啼于朝曰先君何罪其嗣亦何罪舍嫡嗣不立而外求君將焉置此實置也此太子出朝則抱以適趙氏頓首於宣子之門曰先君奉此子而屬諸子曰此子若才吾受子之賜如子為吾教誨此子使之有賢才知人君之道也明吾受子之賜賜猶惠不才吾唯子之怨才而受賜美其教也不才怨子惡其教不至也今君雖終言猶在耳君沒未久其言聲言氣尚在耳而棄之若何宣子與諸大夫皆患穆嬴且畏偪言諸大夫患釐嬴之言以君顏命之言責己也畏逼迫無置靈公一曰畏他公干徒來相逼迫矣乃背先蔑而立靈公以禦秦師又曰郕太子朱儒自安夫鍾自安猶處也夫鍾郎邑國人弗徇徇順也十二年春郕伯卒郕人立君立君改立君不周太子者太子以夫鍾與郕邽來奔郕邽亦邑名也一曰郟邦之寶圭太子父在自安於夫鍾國人以為不順故郕伯卒而更立君太子以其國寶與地夫鍾來奔也又曰齊高厚相太子光以會諸侯於鍾離不敬士莊伯曰高厚相太子會諸侯將社稷是衛而皆不敬高厚與光俱不敬棄社稷也其將不免乎免脫也言將不脫罪禍不以壽終也傳舉此者為十九年齊殺其大夫高厚二十五年崔杼弒君光起本也又曰齊侯娶於魯曰顏懿姬無子其姪鬷聲姬兄子曰姪懿姬所從也顏鬷皆其母姓懿聲謚也傳家從後言之故舉謚也生光以為太子諸子諸子妾生子氏仲子戎子子嬖二子宋女仲子生牙公子牙也屬諸戎子戎子取牙養之戎子請以為太子許之齊侯許之仲子曰不可廢常不祥立長為常而廢之為不祥也間諸侯難間犯謂光已列於諸侯難成光之立也列於諸侯矣謂上數從諸侯北伐盟會今無故而廢之是專黜諸侯也專獨也光比與諸侯列於盟不可黜也而以難犯不祥以難成之事犯不善君必悔之公曰在我而已遂東太子光東徙之東垂也使高厚傅牙以為太子夙沙衛為少傅齊侯疾崔杼微逆光微隱匿也疾病而立之疾困也而, WYG: 八嵗}
