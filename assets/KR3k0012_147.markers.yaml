  - {type: variant, offset: 37, length: 0, content: '', SBCK: 髙張也寘羣公子於菜寘置菜齊東鄙邑欲使逺齊公羊傳曰子般卒卒云子卒此其稱子般卒何何休注曰据子赤不言子赤卒君存稱丗子明當丗父位爲君也君薨稱子某縁民臣之心不可一日無君故稱子某継父也名者尸柩尚在以君前㠯名踰年稱公不曠年無君也又曰公孫慈如牟公及齊侯宋公陳侯衛侯鄭伯許男曹伯㑹王丗子于首止戴􅂚爲殊㑹王丗子據宰周公不殊别也丗子貴也丗子猶丗丗子也觧貴意也言當丗父位儲君副主不可以諸侯㑹之爲文故殊之使􅀂諸侯爲丗子所會也自王者言之屈逺丗子在三公下禮䘮服斬衰曰公士大夫之衆臣是也自諸侯言之丗子尊於三公此禮之威儀各}
