  - {type: variant, offset: 1662, length: 0, content: '', WYG: 女一男男方在身時王夫人夢日入其懐以告太子太子曰此貴徴也未生而文帝崩景帝即位王夫人生男是時薄皇后無子後數嵗景帝立齊栗姬男為太子而王夫人男為膠東王長公主嫖有女欲與太子為妃栗姬妬而景帝諸美人皆因長公主見得貴幸栗姬日怨怒謝長主不許長主欲與王夫人王夫人許之㑹薄皇后廢長公主日譛栗姬短景帝常属諸姬子曰吾百嵗後善視之栗姬怒不肯應言不遜景帝心銜之而未發也長公主日譽王夫人男之美帝亦自賢之又以曩者所夢日符計未有所定王夫人又隂使人趣大臣立栗姬為皇后大行奏事文曰子以母貴母以子貴今太子母號宜為皇后帝怒曰是乃所當言耶遂按誅大行廢太子為臨江王栗姬愈恚不得見以憂死卒立王夫人為皇后男為太子漢武帝故事曰武帝生猗蘭殿四嵗立為膠東王七嵗立為皇太子漢書曰衛皇后生戾太子據元狩元}
