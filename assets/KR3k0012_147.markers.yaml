  - {type: variant, offset: 3568, length: 251, content: 傅少傅以養之欲其知父子君臣之道也仲尼曰昔者周公攝政踐阼而治抗世子法於伯禽所以善成王也聞之曰為人臣者殺其身有益於君則為之況于其身以善其君乎周公優為之于讀曰迂迂猶廣也是故知為人子然後可以為人父知為人臣然后可以為人君知事人然後能使人成王幼不能蒞阼以為世子則無為也以為世子若為世子時也是故抗世子法於伯禽使之與成王居亦學此禮於成王側欲令成王之知父子君臣長幼之義也君之於世子也親則父也尊則君也有父之親有君之尊然後兼天下而有之是故養世子不可不慎處君父之位覽海內之士而近不能以教其子則其餘不足觀也行一物而三善皆得者唯世, SBCK: ''}
