  - {type: variant, offset: 3211, length: 356, content: 日中又至亦如之又復及暮又至亦如之暮夕其有不安節則內豎以告文王文王色憂行不能正履節謂居處故事履蹈地王季復膳飲食安也然後亦復初憂解食上必在視寒煖之節在察食下問所膳所食命膳宰曰末有原應曰諾然後退末猶勿也原再進也勿有所再進為失飪臭味惡也退反其寢武王帥而行之不敢有加焉庶幾程式之帥循也又曰樂正司業父師司成一有元良萬國以貞世子之謂也又曰成王幼不能蒞阼周公相踐阼而治踐履也代成王履阼階攝王位治天下抗世子法於伯禽欲令成王之知父子君臣長幼之道抗猶舉也謂舉世子之法使與成王居而學之也成王有過則撻伯令所以示成王世子之道以成王之過擊伯禽則足以感喻焉凡學世子及學士必時四時各有宜學士謂司徒論俊選所升於學者春夏學干戈秋冬學羽籥皆於東序又曰凡三王教世子必以禮樂樂所以脩內禮所以脩外也禮樂交錯於中發形於外是故其成也懌恭敬而溫文中心中也懌悅懌也立, SBCK: ''}
