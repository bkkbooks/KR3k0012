  - {type: variant, offset: 2297, length: 2083, content: 為后而放宜咎將殺之箋云穀養也于日也罹憂也天下之人無不父子相養者我太子獨不然日以憂也又曰懷德維寧宗子維城無俾城壞無獨斯畏懷和也箋云斯離也和女德無行酷虐之政以安女國是以為宗子之城使免於難遂行酷虐則禍及宗子是謂城壞城壞則乖離而散女獨居而畏矣宗子嫡子也周禮曰惟王建國辨方正位干寶注曰辨方謂別東西南北之名以衰陰陽也正位謂若君南面當陽臣北面即陰居於北宮以體太陰居太子於東宮以位少陽之類又曰膳夫掌王之食飲膳羞以養王及后世子歲終則會唯王及后世子之膳不會不會計多少優尊者其頒賜諸臣則計之又曰凡其死生鮮槁之物以供王之膳與其薦之物及后世子之膳羞鄭司農云鮮謂生肉槁謂乾肉也又曰內饔掌王及后世子膳羞之割烹煎和之事選百羞醬物珍異以俟饋供后及世子之膳羞又曰籩人為王及后世子供其內羞於其飲食以供房中之羞又曰醯人供后及世子之醬齏葅又曰外府掌邦布之出供王及后世子之衣服之用又曰國君過市則刑人赦夫人過市罰一幕世子過市罰一弈市者人之所交利而行刑之處君子無故不遊觀焉若遊觀則施惠以為說也又曰王之諸子國有大事則帥國子而致於太子唯所用之若有甲兵之事則授之車甲合其卒伍置其有司以軍法治之司馬弗正軍法百人為卒五人為伍弗不也國子屬太子司馬雖有軍事不賦之也凡國之政事國子存遊倅使之脩德學道春合諸學秋合諸射以考其藝而進退之遊倅之未仕者學太學也射名也王制曰春秋教以禮樂冬夏教以詩書王太子群子卿大夫元士之適子國之後選皆造焉儀禮聘禮曰遭夫人世子之喪君不受使大夫受於廟其他如遭君喪夫人世子死君為喪主使大夫受聘禮不以凶接吉也其他謂禮所降大戴禮曰古之王者太子生因舉之禮使士負之有司參夙興端冕見之南郊見之天也過闕則下過廟則趨孝子之道也故自為赤子則教固以行矣又曰太子既冠免於保傅之嚴則有司過之史有虧膳之宰太子有過史必書史之義不得不書過不書過則死過書而宰徹其膳宰之義不得不徹膳不徹膳則死於是有進善之旌誹謗之木敢諫之鼓禮記曰大夫士之子不敢與世子同名鄭玄注曰避僭邪也其先生則亦弗改世或為太又曰王太子王子群后之太子卿大夫元士之適子凡入學以齒皆以長幼受學尊卑不同又曰文王之為世子朝於王季日三雞初鳴而衣服至於寢門之外問內豎之御者曰今日安不何如內豎小臣之屬掌內外之通令也如今小史直日矣內豎曰安文王乃喜孝子恒兢兢也及日中又至亦如之又復及暮又至亦如之暮夕其有不安節則內豎以告文王文王色憂行不能正履節謂居處故事履蹈地王季復膳飲食安也然後亦復初憂解食上必在視寒煖之節在察食下問所膳所食命膳宰曰末有原應曰諾然後退末猶勿也原再進也勿有所再進為失飪臭味惡也退反其寢武王帥而行之不敢有加焉庶幾程式之帥循也又曰樂正司業父師司成一有元良萬國以貞世子之謂也又曰成王幼不能蒞阼周公相踐阼而治踐履也代成王履阼階攝王位治天下抗世子法於伯禽欲令成王之知父子君臣長幼之道抗猶舉也謂舉世子之法使與成王居而學之也成王有過則撻伯令所以示成王世子之道以成王之過擊伯禽則足以感喻焉凡學世子及學士必時四時各有宜學士謂司徒論俊選所升於學者春夏學干戈秋冬學羽籥皆於東序又曰凡三王教世子必以禮樂樂所以脩內禮所以脩外也禮樂交錯於中發形於外是故其成也懌恭敬而溫文中心中也懌悅懌也立太傅少傅以養之欲其知父子君臣之道也仲尼曰昔者周公攝政踐阼而治抗世子法於伯禽所以善成王也聞之曰為人臣者殺其身有益於君則為之況于其身以善其君乎周公優為之于讀曰迂迂猶廣也是故知為人子然後可以為人父知為人臣然后可以為人君知事人然後能使人成王幼不能蒞阼以為世子則無為也以為世子若為世子時也是故抗世子法於伯禽使之與成王居亦學此禮於成王側欲令成王之知父子君臣長幼之義也君之於世子也親則父也尊則君也有父之親有君之尊然後兼天下而有之是故養世子不可不慎處君父之位覽海內之士而近不能以教其子則其餘不足觀也行一物而三善皆得者唯世子而已其齒於學之謂也物猶事也又世子之記曰朝夕至于大寢之門外問內豎曰今日安否何如朝夕朝朝暮夕也日中又朝文王為世子也非禮之制世子之禮亡此存其記內豎曰今日安世子乃有喜色其有不安節則內豎以告世子世子色憂不蒲容色憂憂淺不及文王不能正履也內豎言復初然後亦復初朝夕之食上世子必在視寒煖之節食下問所膳羞必知所進以命膳宰然後退羞必知所進必知親所食若內豎言疾則世子親齊玄冠而養親猶自也養疾者玄冠玄端膳宰之饌必敬視之疾者之食齊和所欲或異疾之藥必親嘗之試毒味也嘗饌善則世子亦能食善謂多於前也嘗饌寡世子亦不能飽又不及武王一飯再飯以至于復初然後亦復初也復常所厥禮記曰國君世子生告於君接以太牢宰掌具接續如捷捷勝也謂食其母使之補虛強氣也凡接子擇吉日雖三日之內尊卑皆必選其吉日也冢子則太牢冢大也庶人特豚士特豕大夫少牢國君世子太牢皆謂長子又曰世子生則君沐浴朝服夫人亦如之皆立于阼階西鄉世婦抱子升自西階君名之乃降子升自西階則人君見世子於露寢也適子庶子見於外寢比適子謂世子弟庶子妾子也冢子未食而見必執其右手適子庶子已食而見必循其手未食己食急正緩庶之義也又曰世子佩瑜玉而綦組綬左傳桓公曰北戎伐齊齊侯使乞師於鄭鄭太子忽帥師救齊六月大敗戎師獲其二帥大良少良甲首三百以獻于齊於是諸侯之大夫戍齊齊人饋之餼使魯為其班後鄭鄭忽以其功也怒故有郎之師公之未婚於齊也齊侯欲以文姜妻鄭, WYG: 給}
