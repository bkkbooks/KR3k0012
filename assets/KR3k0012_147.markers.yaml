  - {type: variant, offset: 4336, length: 0, content: '', krp: 共立故幽王太子宜咎是爲平生紀年曰幽王八年立襃姒}
  - {type: variant, offset: 4337, length: 0, content: '', SBCK: 子曰伯服爲太子史記燕丗家曰燕見􅁗且滅六國􅁗兵臨易水禍且至太子丹隂養壯士二十人使荆軻獻督亢地圖於􅁗王􅁗覺殺軻使將軍王剪擊燕二十年􅁗拔薊燕王亡徙居遼東斬丹以獻􅁗燕丹子曰太子丹質於􅁗􅁗王遇之無禮不得意欲歸􅁗王不聽謬言令烏白頭馬生角乃可丹仰天而歎烏即白頭馬生角秦不得巳而遣之爲機發之橋欲䧟丹丹過之橋爲不發夜到関丹爲鷄鳴遂得逃歸故怨於􅁗欲報之養勇士無所不至丹與其􅀓麹武書曰丹不肖生於僻陋之國長於不毛之地未曾得覩君子雅訓欲有所陳幸垂覽之丹聞丈夫之通義節恥受辱以生也貞正所羞之見却以虧其節故有刎喉不顧據鼎不過者斯豈樂死而忘生哉其心所守也今􅁗王反戾天常虎狼其行遇丹無禮諸侯最甚毎念之痛入骨髓計燕國之衆不能敵之曠年相守力固不足欲收天下勇士集海内英雄破國空藏以奉養之重幣甘辭以市於􅁗􅁗貪我賂而信我辭則一劒之任當千萬之師須􅁷之間可解丹萬丗之恥􅀂其不然令丹生無目於天地死懷恨於九泉必令諸侯無以爲歎易水之北未知誰有此蓋亦}
  - {type: page-break, offset: 4337, content: '', id: KR3k0012_SBCK_147-6a}
  - {type: variant, offset: 4337, length: 0, content: '', krp: 子曰伯服爲太子史記燕丗家曰燕見秦且滅六國秦兵臨易水禍且至太子丹隂養壯士二十人使荆軻獻督亢地圖於秦王秦覺殺軻使將軍王剪擊燕二十年秦拔薊燕王亡徙居遼東斬丹以獻秦燕丹子曰太子丹質於秦秦王遇之無禮不得意欲歸秦王不聽謬言令烏白頭馬生角乃可丹仰天而歎烏即白頭馬生角秦不得巳而遣之爲機發之橋欲䧟丹丹過之橋爲不發夜到関丹爲鷄鳴遂得逃歸故怨於秦欲報之養勇士無所不至丹與其傳麹武書曰丹不肖生於僻陋之國長於不毛之地未曾得覩君子雅訓欲有所陳幸垂覽之丹聞丈夫之通義節恥受辱以生也貞正所羞之見却以虧其節故有刎喉不顧據鼎不過者斯豈樂死而忘生哉其心所守也今秦王反戾天常虎狼其行遇丹無禮諸侯最甚毎念之痛入骨髓計燕國之衆不能敵之曠年相守力固不足欲收天下勇士集海内英雄破國空藏以奉養之重幣甘辭以市於秦秦貪我賂而信我辭則一劒之任當千萬之師須臾之間可解丹萬丗之恥若其不然令丹生無目於天地死懷恨於九泉必令諸侯無以爲歎易水之北未知誰有此蓋亦}
