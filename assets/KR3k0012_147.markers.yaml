  - {type: variant, offset: 697, length: 272, content: 予稱太子發明慎父以名卒考予我也父死曰考文王命武王我終之後恒稱太子者明慎文王之命也君存稱世子薨稱太子既葬稱子踰年稱公今踰年而稱太子發若父業有不成者而將軍周書曰文王受命九年時維暮春在鄗召太子發曰嗚呼吾語女所保所守之哉厚德廣惠忠信志愛人君之行四者君德不為驕侈不為太靡不淫於美括柱茅茨為民愛費言務儉也因就木枚曰括也春秋演孔圖曰聖人在後曰望陽苞懷至德據少陽文王子也故曰在後嗣文王矣賈誼書曰文王使太公望傅太子發嗜鮑魚不登于俎豈有非禮而可養太子哉帝王世記曰武王納太公之女曰邑姜脩教于內生太子誦尚書顧命曰爾尚明時朕言用敬保元子釗時是也元子釗康王名也弘濟于艱難穆, SBCK: ''}
