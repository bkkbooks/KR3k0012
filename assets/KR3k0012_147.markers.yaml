  - {type: variant, offset: 5, length: 0, content: '', SBCK: 左傳曰􅀄宋芮司徒生女子芮司徒宋大夫赤而毛棄諸堤下其身色赤而生毛也恭􅁎之妾取以入名之曰棄長而美恭姫宋伯􅁎也平公入夕視夕也平公恭姫子也恭􅁎與之食公見棄也而視之尤右過也意恱之故視之過乆􅁎納諸御納之平公之御嬖生佐公嬖棄而生佐佐立爲宋元公惡而婉婉順也佐貌惡心順太子痤美而很太子貌美戾而心很很戾不從教合左師畏而惡之合左師向戍也寺人惠牆伊戾爲太子内師而無寵寺人宋閹士惠牆皆發聲實爲伊戾名以公寺人爲太子内師長掌内官秋楚客聘于晉過宋楚客過使太子知之請野饗之公使徃伊戾請從之公曰夫不惡女乎夫謂太子伊戾無寵於太子故曰夫不惡汝對曰小人之事君子也惡之不敢逺好之不敢近敬以待命敢有貳心乎有縱供其外莫供其内言我内師也當爲内師供内使也臣請往也遣之至則欿用牲加書徴之以書爲之徴驗也書盟書而騁告公騁馳曰太子將爲亂旣與楚客盟矣公曰爲我子又何求對曰欲速速疾也欲疾代公得位故與楚客謀共弑公也公使視之則信有焉有盟也問諸夫人夫人佐母棄也與左師則皆曰固聞之固乆也乆聞太子欲爲亂公囚太子太子曰唯佐也能免我召而使請曰日中不來吾知死矣左師聞之聞太子與佐期日中聒而與之語聒讙也欲使失期佐過期乃縊而死經書宋公殺其丗子痤平公用伊戾之􅉲聽夫人左師而之言丗子折師之言丗子無罪而死故􅁛宋公殺罪之地佐爲太子公徐聞其無罪也乃烹伊戾又曰許悼公瘧許悼公靈公之子許男買瘧寒疾也五月戊辰飲太子止之藥卒經書夏五月戊辰許丗子弑其君買止焯公子襄太子也公疾不瘳止進藥雖甞而不由醫太子奔晉書曰弑其君禮醫不三丗不使君有疾飲藥臣先甞之親有疾飲藥子先甞之公疾未瘳而進藥雖甞而不由醫而卒故國罪之書弑告於諸侯也君子曰盡心力以事君舎藥物可也原止之無惡藥物不害醫無以加壽命有終故曰舎藥物可也一日罪止非也刺無良史物讀爲勿止實孝能盡心事君舎藥勿以罪之又曰楚平王卒令尹子常欲立子西子西平王之長庶子冝申也曰太子任弱其母非嫡太子任昭王也秦嬴也太子建實娉之子西長而好善立長則順建善則治王順國治可不務乎子西怒曰是亂國而惡君王也謂夫人故太子建娉之廢而不立是謂亂國追惡君王也國有外援不可黷也外援謂太子任秦外孫黷易也秦爲任外援不可易王有嫡嗣不可亂也敗親速讎亂嗣不祥我受其名賂吾以天下吾滋不從楚國何爲必殺令尹令尹懼乃立昭王又曰齊燕姬生子不成而死燕􅁎齊景公嫡夫人昭七年燕人所歸不成未冠諸子鬻姒之子荼荼嬖諸子諸公子鬻姒景公妾也淳于人所納女荼安孺子諸大夫恐其爲子也言於公曰君之齒長矣未有太子􅀂之何爲子爲太子也荼少故恐立之言君年長未有}
