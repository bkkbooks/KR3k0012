  - {type: variant, offset: 2886, length: 1, content: 世, SBCK: 無子有遺腹待其産而立之何尊適重正也曾子問云立適以長不以賢賢不肖未可知也尚書曰知人則哲唯帝難之立子以貴不以長者塞愛憎也故春秋公羊傳曰立適以長不以賢立子以貴不以長列女傳曰魯􅃮室女􅀝柱而嘯隣婦謂之曰何嘯之悲也子欲嫁乎吾爲子求偶女曰吾豈嫁哉吾憂魯君老而太子少也隣婦曰此乃魯大夫之憂也且魯國雖有事婦人何與女曰子知其一不知其二也昔者晉客舎吾家繫馬馬佚馳踐吾園葵使我終歳不厭菜隣人女奔亡借吾兄追之溺流而死令吾終身無兄今魯君老老必將悖太子少少必愚愚悖之間姧僞玄起夫魯國有事禍及衆庶婦人獨安所避之隣婦謝曰}
