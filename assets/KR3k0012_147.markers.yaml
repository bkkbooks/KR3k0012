  - {type: variant, offset: 1657, length: 79, content: 嫡子十有三年始入小學見小節焉踐小義焉年二十入太學見大節焉踐大義焉故入小學知父子之道長幼之序入太學知君臣之儀上下之位小師取小學之賢者登之天子天子以為左右天子當為, SBCK: ''}
  - {type: variant, offset: 1657, length: 79, content: 嫡子十有三年始入小學見小節焉踐小義焉年二十入太學見大節焉踐大義焉故入小學知父子之道長幼之序入太學知君臣之儀上下之位小師取小學之賢者登之天子天子以為左右天子當為, krp: ''}
  - {type: variant, offset: 1659, length: 0, content: '', WYG: 皆造小學小學經藝之宫大學辟雍鄉射之宫紀年曰幽王八年立褒姒之子伯服為太子史記曰諸侯共立故幽王太子宜臼是為平王史記燕世家曰燕見秦且滅六國秦兵臨易水禍且至太子丹隂飬壯士二十人使荆軻獻督亢地圗於秦王秦王覺之殺軻使將軍王翦擊燕二十九年秦㧞我薊燕王亡徙居遼東斬丹以獻秦燕丹子曰太子丹質於秦秦王遇之無禮不得意欲歸秦王不聽謬言令烏白頭馬生角乃可丹仰天而歎烏即白頭馬生角秦不得已而遣之為機發之橋欲䧟丹丹過之橋為不發夜到關丹為鷄鳴遂得逃歸故怨於秦欲報之養勇士無所不至丹與其傅麴武書曰丹不肖生於僻陋之國長於不毛之地未曽得覩君子雅訓欲有所陳幸垂覽之丹聞丈夫之道節義亷恥不却以虧其莭受辱以生正直之所羞也故有刎喉不顧據鼎不避者斯豈樂死而忘生哉其心所守也今秦王反戾天常虎狼其行遇丹無禮諸侯最甚毎念之痛入骨髓計燕國之衆不能敵之曠年相守力固不足欲收天下勇士集海内英雄破國空藏以奉養之重幣甘辭以市於秦秦貪我賂而信我辭則一劒之任當千萬之師須更之間可觧丹萬世之恥若其不然令丹生無日於天地死懐恨於九泉必令諸侯無以為歎易水之北未知誰有此盖以大夫恥也謹遺書願熟思之史記呂后本紀曰太后髙祖微時妃也生孝惠帝為人仁弱髙祖以為不類我常欲廢太子立戚姬子如意如意類我幾代太子者數矣頼大臣争之及用留侯策太子得不廢又張良世家曰上欲廢太子立戚夫人子趙王如意大臣多諌争未能得堅决者也呂后恐不知所為人或謂呂后曰留侯善畫策上信用之呂后乃使建成侯呂澤刼留侯曰君常為上謀臣今上欲易太子君安得髙枕而卧乎留侯曰始上數在困急之中幸用臣策今天下安定以愛欲易太子此骨肉之間雖臣等百餘人何益呂澤强要曰為我畫計留侯曰此難以口舌争也顧上有不能致者天下有四人四人者年老矣皆以為上慢侮人顧逃匿山中義不為漢臣然上髙此四人今公誠能無愛金玉璧帛令太子為書卑辭安車因使辯士請之來以為客時時從入朝令上見之則必異而問之上知此四人賢則一助也於是呂后令呂澤使人奉天子書卑辭厚禮迎四人四人至客建成侯所漢髙十一年黥布反上病欲使太子將徃擊之四人相謂曰凡來者以將存太子太子將兵事危矣乃說建成侯曰太子將兵有功則位不益太子無功還則從此受禍矣且太子所與俱諸將皆嘗與上定天下驍將也今使太子將之此無異使羊將狼也皆不肯為盡力其無功必矣臣聞母愛者子抱今戚夫人日夜侍御趙王如意常抱居前上曰終不使不肖子居愛子之上明乎其代太子位必矣君何不急請呂后承間為上泣言黥布天下猛將也善用兵今諸將皆陛下故等夷夷猶儕也乃令太子將此属無異使羊將狼也莫肯為用且使布聞之則鼓行而西耳晉灼曰鼔行而西言無所畏上雖病强載輜車卧而護之諸將不敢不盡力上雖苦為妻子自强於是呂澤立夜見呂后呂后承間為上泣涕而言如四人意上曰吾惟豎子固不足遣而公自行耳於是上自將兵而東群臣居守皆送至覇上留侯病自强起至曲郵長安縣有曲郵聚見上曰臣宜從病甚楚人剽疾願上無與楚人争鋒因說上曰令太子為將軍監關中兵上曰子房雖疾强卧而傅太子是時叔孫通為太傅留侯行少傅事漢十二年上從擊破布歸疾益甚愈欲易太子留侯諫不聽因疾不視事叔孫太傅稱說引古今以死争太子上佯許之猶欲易之及讌置酒太子侍四人者從太子年皆八}
