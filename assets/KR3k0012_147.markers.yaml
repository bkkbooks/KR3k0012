  - {type: variant, offset: 48, length: 0, content: '', SBCK: 待人之子以内爲失正矣内魯内失正曹伯失正言二者俱失之丗子可以已矣則是放命也放違也言丗子違命而正是當不義則爭之又曰陳侯之弟招殺陳丗子偃師招成公子偃師哀公子所謂悼太子者也哀公愛其丗子留託之招哀公之招哀公有疾招殺太子偃師而立留嚮曰陳公子招招發於十年矣今曰陳侯之弟招何也曰盡其親所以惡招也盡其親謂稱公子又稱弟招先君之公子今君之母弟也兩下相殺不志乎春秋此其志何也丗子者唯君之貳也貳副云可以重之存焉志之也諸侯之尊弟兄不得以屬通其弟云者親而殺之惡也惡衷公使招至放殺之孝經曰昔者明王之以孝治天下不敢遺小國之臣而況於公侯伯子男乎鄭􅀇注曰古者諸侯五年一朝天子使丗子郊迎芻米百車以客禮待之盡坐正殿夜設庭燎思與相見問其勞苦也孔子家語曰邾隱公旣即位將冠使大夫因孟懿子問於孔子孔子曰其禮如丗子之冠冠於阼階所以著代王肅注曰主人之位以明代交也醮於客位加其成冠於阼階􅀂不醴則用酒於客位敬而成之户西爲客也三加彌尊喻其志喻其志使彌知尊冝敬戒加緇布皮及爵弁冠而字之敬其名雖天子之元子猶士也其禮變天下無生而貴者又曰孔子曰古者王丗子雖㓜其即位則尊爲人君治成人之事者也何冠之有孟懿子曰然則諸侯之冠異天子與恠天子無冠禮而諸侯之冠如子之冠問之也孔子曰君薨而丗子主䘮是亦冠巳君人無所殊諸侯亦人君與天子無異孔􅓜子曰穆公問於子思曰立太子有常乎荅曰有之在周公之典曰}
  - {type: page-break, offset: 48, content: '', id: KR3k0012_SBCK_147-3b}
  - {type: variant, offset: 48, length: 2, content: 文王, WYG: 待人之子以内為失正矣内失正曹伯失正葢言二者俱失之世子可以己矣則是放命也放違也言世子違命而止是當不義則争之又曰陳侯之弟招殺世子姬師招成公子姬師襄公子所謂悼}
  - {type: variant, offset: 48, length: 2, content: 文王, krp: 待人之子以内爲失正矣内魯内失正曹伯失正言二者俱失之丗子可以已矣則是放命也放違也言丗子違命而正是當不義則爭之又曰陳侯之弟招殺陳丗子偃師招成公子偃師哀公子所謂悼}
  - {type: variant, offset: 50, length: 0, content: '', SBCK: 舎適而立次微子舎孫而立其弟是何法也子思曰殷人質而尊故立其弟周人文而親其親故立其子亦各有禮也文質不同其禮則異文王舎適立次權也漢舊儀曰皇后太子各食三十縣曰湯沐邑白虎通曰何以知天子之子稱丗子春秋傳星曰王丗子㑹于首止是也何以知天子之稱太子尚書曰}
