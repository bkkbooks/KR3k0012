  - {type: variant, offset: 5, length: 0, content: '', WYG: 左傳曰初宋芮司徒生女子芮司徒宋大夫赤而毛棄諸堤下其身色赤而生毛也恭姬之妾取以入名之曰棄長而美恭姬宋伯姬也平公入夕視夕也平公恭姬子也恭姬與之食公見棄而視之尤尤過也意悅之視之遇乆也姬納諸御納之平公之御嬖生佐公嬖棄而生佐佐立為宋元公惡而婉婉順也佐貌惡心順太子痤美而狠太子貌美而心狠戾不從教合左師畏而惡之合左師向戌也寺人惠墻伊戾為太子内師而無寵寺人宋閹士惠墻氏伊戾名以公寺人為太子内師掌内官秋楚客聘於晉過宋楚客道遇宋太子知之請野饗之公使往伊戾請從之公曰夫不惡女乎夫謂太子伊戾無寵於太子故曰夫不恶汝對曰小人之事君子也惡之不敢逺好之不敢近敬以待命敢有二心乎縱有供其外莫供其内言我内師也當為内師供内使也臣請往也遣之至則欿用牲加書徵之伊戾詐為盟書以為太子反徵而騁告公曰太子將為亂既與楚客盟矣公曰為我子又何求對曰欲速速疾也欲疾代公得位故與楚客謀共弑父也公使視之則信有焉有盟也問諸夫人夫人佐母弃也與左師則皆曰固聞之固久也乆聞太子欲為亂公囚太子太子曰唯佐也能免我召而使請曰日中不來吾知死矣左師聞之聞太子與佐期日中聒而與之語聒讙也欲使失期於佐過期乃縊而死經書宋公殺其世子痤平公用伊戾之譖聽夫人左師之言使世子無罪而死直書宋公殺之者所以深罪之也佐為太子公徐聞其無罪也乃烹伊戾又曰許悼公瘧許悼公靈公之子名買瘧寒疾也五月戊辰飲太子止之藥卒經書夏五月戊辰許世子弑其君買止悼公子襄太子也公疾不瘳止獨進藥雖嘗而不由醫以至於卒太子奔晉書曰弑其君禮君有疾飲藥臣先嘗之親有疾飲藥子先嘗之醫不三世不服其藥止進藥而不由醫故書弑告於諸侯君子曰盡心以事君言事君之道但當盡其忠心與其實力舍藥物可也藥物有毒當由醫非凡人所知譏止不舍藥物所以加弑君之名又曰楚平王卒令尹子常欲立子西子西平王之長庶子公子申也曰太子任弱其母非嫡太子任即昭王也其母謂秦嬴也太子建實聘之子西長而好善立長則順建善則治王順國治可不務乎子西怒曰是亂國而惡君王也謂夫人太子故嘗聘之廢而不立是為亂國迫惡君王也國有外援不可不黷也外援謂太子任泰之外孫黷易也秦為任外援不可易王有嫡嗣可亂也敗親速讐亂嗣不祥我受其名賂吾以天下吾滋不從楚國何為不殺令尹懼乃立昭王又曰齊燕姬生子不成而死燕姬齊景公夫人昭十一年燕人所歸不成未冠也諸子鬻姒之子荼荼嬖諸子諸公子鬻姒景公妾也淳于人所納女荼安孺子諸大夫恐其為子也言於公曰君之齒長矣未有太子若之何為子為太子也荼少故恐立之言君長未有}
