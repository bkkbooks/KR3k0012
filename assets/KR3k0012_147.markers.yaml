  - {type: variant, offset: 1743, length: 1120, content: 居攝踐祚而治亢世子法於伯禽使之為成王居欲使成王之知父子君臣長幼之義所以善成王也尚書洪範五行傳曰心之大星天王也其前星太子也後星庶子也荊州星占曰少微星一名處士星儲君副主之宮韓詩外傳曰五帝官天下三王家天下家以傳子官以傳賢故自唐虞已上經傳無太子稱號夏殷之王雖則傳嗣其文略矣至周始見文王世子之制又曰趙簡子太子名伯魯小子名無恤簡子自為二書牘親自表之書曰節用聽聰敬賢勿慢使能勿賤與二子使誦之居三年簡子坐清臺之上問二書所在伯魯忘其表令誦不能得無恤出其書於袖令誦習焉乃黜伯魯而立無恤又曰魏文侯封太子擊於中山三年不往來趙倉唐曰君何不遣人使大國太子曰願之久矣未得可使者對曰臣願奉使侯何好太子曰侯嗜晨鳧好北犬於是遣倉緤北犬奉晨鳧獻之侯曰擊愛我知我所嗜好說苑又載事具奉使部說苑曰經侯過魏太子左帶羽玉具劍右帶環珮左光照右右光照左太子不視經侯曰魏國有寶乎太子曰主信臣忠百姓戴上此魏國之寶也毛詩曰渭陽康公念母也康公之母晉獻公之女文公遭驪姬之難未返而秦姬卒穆公納文公康公時為太子贈送文公於渭之陽念母之不見也毛詩曰小弁刺幽王也太子之傅作焉弁彼鸒斯歸飛提提興也弁樂也鸒卑居卑居雅鳥也提提群飛貌箋云樂乎伎雅鳥出食在野其飽群飛而歸提提然興者喻凡人父子兄弟出入宮庭相與飲食亦提提然樂傷今太子獨不然民莫不穀我獨于罹幽王取申女生太子宜咎又悅褒姒生子伯服立以為后而放宜咎將殺之箋云穀養也于日也罹憂也天下之人無不父子相養者我太子獨不然日以憂也又曰懷德維寧宗子維城無俾城壞無獨斯畏懷和也箋云斯離也和女德無行酷虐之政以安女國是以為宗子之城使免於難遂行酷虐則禍及宗子是謂城壞城壞則乖離而散女獨居而畏矣宗子嫡子也周禮曰惟王建國辨方正位干寶注曰辨方謂別東西南北之名以衰陰陽也正位謂若君南面當陽臣北面即陰居於北宮以體太陰居太子於東宮以位少陽之類又曰膳夫掌王之食飲膳羞以養王及后世子歲終則會唯王及后世子之膳不會不會計多少優尊者其頒賜諸臣則計之又曰凡其死生鮮槁之物以供王之膳與其薦之物及后世子之膳羞鄭司農云鮮謂生肉槁謂乾肉也又曰內饔掌王及后世子膳羞之割烹煎和之事選百羞醬物珍異以俟饋供后及世子之膳羞又曰籩人為王及后世子供其內羞於其飲食以供房中之羞又曰醯人供后及世子之醬齏葅又曰外府掌邦布之出供王及后世子之衣服之用又曰國君過市則刑人赦夫人過市罰一幕世子過市罰一弈市者人之所交利而行刑之處君子無故不遊觀焉若遊觀則施惠以為說也又曰王之諸子國有大事則帥國子而致於太子唯所用之若有甲兵之事則授之車甲合其卒伍置其有司以軍法治之司馬弗正軍法百人為卒五人為伍弗不也國子屬太子司馬雖有軍事不賦之也凡國之政事國子存遊倅使之脩德學道春合諸學秋合諸射以考其藝而進退之遊倅之未仕者學太學也射名也王制曰春秋教以禮樂冬夏教以詩書王太子群子, SBCK: ''}
