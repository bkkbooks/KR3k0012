  - {type: variant, offset: 4387, length: 0, content: '', krp: 眩於名實不知所守何足委任乃嘆曰亂我家者太子也繇是踈太子而愛淮陽王曰淮陽王明察好法冝爲吾子而王母張婕妤尤幸上有意欲用淮陽王代太子然以少依許氏俱從微起故終不背焉又曰孝宣王皇后宣帝即位召入後宫稍進爲婕妤霍皇后廢後上憐許太子早失母幾爲霍氏所害於是乃選後宫素謹愼而無子者遂立王婕妤爲皇后令母養太子又曰孝成皇帝元帝太子也母曰王皇后元帝在太子家生甲觀畫堂如淳曰甲觀觀名畫堂堂名三輔黄圗云太子宫有甲觀又别外不在未夾宫中爲丗嫡皇孫宣帝愛之字曰太孫常置左右年三歳而宣帝崩元帝即位帝爲太子壯好經書寛愽謹愼𥘉居桂宫上常急召太子出龍樓門張晏曰門樓上有銅龍黄白鶴飛廉之爲名也不敢絶道應劭曰馳道天子道也若今之中道然古甚重也西至直城門晉灼曰黄圖西出南頭第二門得絶乃度還入作室門上遟之}
