  - {type: variant, offset: 2029, length: 131, content: 於衣衾林木盡於棺槨桓公患之以告管仲曰布帛盡則無以為幣林木盡則無以為守備而人厚葬之不休禁之奈何管仲對曰凡人之有為也非名之則利之也於是乃下令曰棺槨過度者僇其戶罪夫當喪者夫僇死無名罪當喪者無利人何故為之也又曰公儀休相魯其妻織布休曰汝豈與世人爭利哉遂燔其機淮南子曰布之新, SBCK: 天時}
