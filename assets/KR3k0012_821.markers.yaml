  - {type: variant, offset: 2684, length: 5, content: 取紡績葛布, SBCK: 其人即入穴何亦隨之􅀄入甚急前輙開廣便失人見良田數十頃何遂墾作以爲世業子孫于今頼之崔寔政論曰昔者聖王立井田之制分口耦地各相副適使人饑飽不偏勞逸齊均冨者不足僣差貧者無所企慕王㓪上求賑貸民表曰昔在西京有鄠杜膏􅃾之饒池陽谷口之利涇渭二川之水鄭國白渠之漑雲􅀨年成糞與灌並􅅿貨一金號爲陸海應璩書曰是以忽此蘇子帶郭之業求彼孫叔寢丘之地故求遠田在􅀜之西}
