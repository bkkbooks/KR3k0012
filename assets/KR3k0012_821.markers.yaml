  - {type: variant, offset: 38, length: 1, content: 齊, SBCK: 五稼塡滿其中心也尚書禹貢曰冀州厥田惟中中孔安國曰田之高下肥瘠九州之中爲第五兖州厥田惟中下第六青州厥田惟上下第三徐州厥田惟上中第二楊州厥田惟下下第九荆州厥田惟下中第八豫州厥田惟中上第四梁州厥田惟下上第七雍州厥田惟上下第一周禮春官下籥章曰凡國祈年於田祖歌􅃎雅擊􅁟鼓以樂田畯祁年祁豐年也田祖始耕田者謂神農也田畯古先教田者爾雅曰畯農夫也又地官司徒之職曰均􅁟地以稽其}
