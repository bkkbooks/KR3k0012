  - {type: variant, offset: 2235, length: 1, content: 戎, krp: 魏襄王與羣臣飲酒酣王爲羣臣祝令羣臣皆得志史起對曰羣臣不肖者得志則不可王曰如西門豹之爲}
  - {type: variant, offset: 2237, length: 3, content: 見暴布, SBCK: 臣也史起對曰魏氏之田也漳水存其傍西門豹不知用是過也明日召史起問漳水猶可以灌鄴田乎對曰臣爲之民必大怨臣臣雖死願王使他人遂之王使之爲鄴令史起因徃爲之鄴民大怨欲籍史起史起不敢出避之乃使他人遂爲之水巳行民大得其利相與歌之曰鄴有聖令號爲史公決漳水兮灌鄴旁終古斥鹵生稻梁春秋後語曰趙列侯謂其相公仲建曰寡人所愛可以貴之乎曰富可也貴之則不列侯乃命以田萬􅅿賜善歌}
  - {type: variant, offset: 2237, length: 3, content: 見暴布, WYG: 臣也史起對曰魏時之田也漳水存其傍西門豹不知用是過也明日召起問漳水猶可以灌鄴田乎對曰臣為之民必大怨臣臣雖死願王使他人遂之王使之為鄴令史起因徃為之鄴民大怨欲籍史起史起不敢出避之乃使他人遂為之水已行民大得其利相與歌之曰鄴有聖令號為史公决漳水􅀆灌旁終古斥鹵生稲梁梁春秋後語曰趙列侯謂其相公仲建曰寡人所愛可以貴之乎曰富可也貴之則不列侯乃命以田萬畆賜善歌}
