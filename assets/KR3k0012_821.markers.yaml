  - {type: variant, offset: 3324, length: 234, content: 有樹生火中洲左近人剝取其皮紡績作布以為手巾與蕉麻無異而色微青黑若小垢洿則投火中復更精潔或作燈炷用之不知盡列子曰周穆王大征西戎西戎獻崑吾劍火浣布其劍長尺有咫鍊銅赤刃用之切玉如泥焉其布浣之必投火中布則火色出而振之皜然疑乎雪也抱朴子曰海中肅丘有自生火常以春起而秋滅丘方十里當火起滿洲洲上純生一種木正暑此木雖為火所焚而不䴢但小燋黑人或得為薪者火之俱如常薪但不成灰炊熟則以水灌滅之後復更用如此不窮夷人取此木華績以為布其木皮赤剝以灰煮治以為布但麤不及華俱可以火浣又有白鼠毛長三寸許, SBCK: ''}
