  - {type: variant, offset: 3213, length: 128, content: 不聽陸機弔魏武文曰悼繐帳之冥漠怨西陵之芒芒火浣布魏志曰青龍三年西域重譯獻火浣布詔大將軍太尉臨試以示百僚吳錄曰日南比景縣有火鼠取毛為布燒之而精名火浣布崔鴻十六國春秋前秦錄曰天笁國獻火浣布南史曰南海諸簿國東千餘里至自然火洲其上有樹生火中洲左近人剝取其皮紡績作布, WYG: 必加誣譖宻奏}
