  - {type: variant, offset: 2697, length: 138, content: 縣有古終藤俚人以為布南州異物志曰五色班布以絲布古貝木所作此木熟時狀如鵝毳中有核如珠玽公後切細過絲緜人將用之則治出其核但紡不績在意小抽相牽引無有斷絕欲為班布則染之五色織以為布弱輭厚緻上毳毛外徼人以班布文最煩縟多巧者名曰城城其次小麤者名曰文辱又次麤者名曰烏驎顧微廣州記曰阿林縣有勾, SBCK: 北據}
