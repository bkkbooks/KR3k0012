  - {type: page-break, offset: 3875, content: '', id: KR3k0012_SBCK_821-11a}
  - {type: variant, offset: 3876, length: 237, content: 學與石經並以為永示後世至此西域使至始獻火浣布焉於是刊滅此論而天下笑之臣松之昔從征西洛陽歷觀舊物見典論石在太學者尚存而廟外廡之間諸長老云晉初受禪即用魏廟移此石於太學非兩處立也竊謂此言為然王子年拾遺記曰晉太康中有羽山之民獻火浣布其國人稱羽山之上有文石生火煙色似隨四時而見也名為淨火有不潔之衣投於石火之中雖滯汙淄涅如新浣矣當虞舜時其國獻黃布漢末獻赤布梁冀製為衣謂之丹衣而史家云單衣則今縫掖也字異聲同未知孰是又曰方丈山東有龍塲地方千里王瑤為林或云龍常鬥此處膏血如水流著物如淳漆燕昭王, SBCK: 平御覽卷第八百}
