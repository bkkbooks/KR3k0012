  - {type: variant, offset: 2679, length: 0, content: '', SBCK: 温泉其下流有田􅁪資以浸灌常十二月種至明年三月新榖便登温液所周正可數􅅿過此水氣輙冷不復生苗豫章記曰郡江之西岸有槃石下多良田極膏􅃾者一􅅿二十斛稻米之精者如玉暎澈於器中續搜神記曰陽人姓何忘其名隱遁養志常至田舎人収穫在場上忽有一人長一丈黃踈單衣角巾來詣之翩翻舉其兩手並儛而來語何云君常見韶舞不足舞也便去何㝷逐遥向一}
