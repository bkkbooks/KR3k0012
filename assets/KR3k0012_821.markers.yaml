  - {type: variant, offset: 4198, length: 510, content: 是積鼠毛所作以誥商人具如杰公所說因問木鼠之異公曰木堅毛柔是可別也以陽燧火山陰柘木爇之木皮改常試之果驗異物志曰斯調國有大洲在南海中其上有野火春夏自生秋冬自死有木生於其中而不消也枝皮更滑秋冬火死則皆枯瘁其俗常以冬採其毛以為布色小青黑若塵垢汙之便投著火中則更鮮明也紵尚書禹貢曰荊河惟豫州西南至荊山北雖河厥貢漆枲絺紵毛詩宛丘東門之池曰東門之池可以漚紵彼美淑姬可與晤語左傳襄六曰季札聘鄭見子產如舊相識與之縞帶子產獻紵衣焉漢書曰賈人不得衣錦繡綺縠絺綌紵罽宋書曰戴法興會稽之山人家貧父子以販紵為業華陽國志曰獠人賈言紵為蘭朱崖傳曰朱崖俗行來出入著布或細紵布巾巾四幅其中內頭如領巾象說苑曰吳赤巾使於智氏假道於衛甯文子具紵絺三百製將以送大夫懇曰吳雖大國也亦不壤交假之道則亦敬矣又何禮焉文子不聽遂致之古樂府曰白紵歌盛稱舞好宜及芳時作樂其辭曰白紵質如月輕如雲色如銀製以為袍餘作巾本吳舞也白疊漢書曰其帛絮細布千鈞紋綵千疋荅布白疊也皮革千石比千乘之家晉令曰士卒百工不得服越疊吳時外國傳曰諸簿國安子織作白疊花布南史曰高昌國有草實如繭繭中絲如細纑名為白疊子國人取織以為布布甚輭白交布用焉吳篤趙書曰石勒建平二年大宛獻珊瑚琉璃毾㲪白疊廣志曰白疊毛織出諸薄洲, SBCK: ''}
