  - {type: variant, offset: 93, length: 2, content: 仲夏, SBCK: 方一里者爲田九百􅅿一里方三百步方十里者爲方一里者百爲田九萬􅅿方百里者爲方十里者百爲田九十億􅅿億今十萬方千里者爲方百里者百爲田九萬億􅅿萬億今萬萬也自􅁪山至於南河千里而近冀州域自南河至於江千里而近豫州域自江至於衡山千里而遥荆州域自東河至於東海千里而遥徐州域自東河至於西河千里而近亦冀州域自西河至於流沙千里而遥雍州域西不盡流沙南不盡衡山東不盡東海北不盡􅁪山凡四海}
  - {type: variant, offset: 93, length: 2, content: 仲夏, WYG: 方一里者為田九百畆方十里者為方一里者百為田九萬畆方百里者為方十里者百為田九十億畆方千里者為方百里者百為田九萬億畆自恒山至於南河千里而近冀州域自南河至於江千里而近豫州域自江至於衡山千里而遥荆州域自東河至於東海千里而遥徐州域自東河至於西河千里而近亦冀州域自西河至於流沙千里而遥雍州域西不盡流沙南不盡衡山東不盡東海北不盡恒山凡四海}
