  - {type: variant, offset: 1621, length: 5, content: 楊大眼為荊, krp: 髙允爲著作郎太武引見因問允萬機何者爲先時多禁封良田又京師逰食者衆允因曰臣少也賤所知唯田請言農事古人云地方一里則爲田三頃七十畝萬里則田三萬七千頃若勸之則畝益三升不勸則畝損亦如之損益之率爲粟二百二十二萬斛况以天下之廣乎若公私有儲雖遇饑年復何憂哉帝善之除田禁悉以授百姓又曰裴延儁遷幽}
