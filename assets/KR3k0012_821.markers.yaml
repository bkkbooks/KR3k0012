  - {type: variant, offset: 2679, length: 0, content: '', WYG: 温泉其下流有田恒資以浸灌常十二月種至明年三月新榖便登温液所周正可數畆過此水氣輒冷不復生苖豫章記曰郡江之西岸有磐石下多良田極髙腴者一畆二十斛稲米之精者如玊映澈於器中續捜神記曰陽人姓何忘其名隐遁養志常至田舍人收獲在場忽有一人長一丈黄踈單衣角巾來詣之翩翻舉其兩手並儛而来語何云君常見韶舞不足舞也便去何尋逐遥向一}
