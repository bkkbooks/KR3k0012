  - {type: variant, offset: 2457, length: 193, content: 溢母讓金布曰妾豈貪貨而干王哉怨令尹之治也遂不肯受王曰母智若此其子必不愚乃復召江乙而用之先賢行狀曰王烈字彥考通識達道人皆慕之州閭成風咸競為善時國中有盜牛者牛主得之盜者曰我邂逅迷惑從今已後將改過予既已見宥幸無使王烈聞之人有以告烈者烈以布一端遺之廣州先賢傳曰丁密蒼梧廣信人也清貧為節非家織布不衣竹林七賢論曰王戎為侍中南郡太守劉肇遺戎筒中布五十端戎不受而厚報其書議者以為譏世祖患之為發詔議者乃息, SBCK: 石}
