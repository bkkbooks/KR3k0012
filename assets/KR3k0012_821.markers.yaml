  - {type: variant, offset: 276, length: 2, content: 度使, SBCK: 一歳屯戍萬計力役三十倍於古田租口賦塩鐵之利二十倍於古如淳曰秦賣塩鐵貴故下民受其困或耕豪民之田稅十五如淳曰稅其五故貧民常衣馬牛衣而食犬􅇾之食又董仲舒說上曰秦用啇鞅之法改帝王之制除井田人得賣買冨者田連阡陌貧}
