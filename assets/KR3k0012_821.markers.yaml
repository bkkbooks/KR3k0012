  - {type: punctuation, offset: 259, content: 「, id: KR3k0012_CHANT_821-bkkpn106}
  - {type: variant, offset: 259, length: 0, content: '', SBCK: 􅀳文討曹分其地境界未定至是乃以賜諸侯使臧文仲徃􅀫於重館高平方與縣西北有重郷城重館人告曰晉新得諸侯必親其共不速行將無及也從之分曹地自洮以東􅀓于濟盡曹地也文仲不書請田而巳非聘享㑹同也襄仲如􅀳拜曹田也又宣公下十五年曰初稅􅅿非禮也榖出不過籍周法民耕百􅅿公田十􅅿借民力而治之稅不過此以豐財也又襄公六曰子産治鄭使田有卦洫封界洫溝從政一年輿人誦曰取我衣冠而禇之取我田疇而伍之孰殺子産吾其與之及三年民又誦之曰我有子弟子産誨之我有田疇子産闢之子産而死誰其嗣之又哀公上曰季孫欲以田賦兵賦之法因其田財通出馬一疋牛三頭今欲别其田及家財各爲一賦故言田賦使冉有訪諸仲尼仲尼曰丘不識也三發三發問卒曰卒終也子爲國老待子而行􅀂之何子之不言也仲尼不對不公荅而􅀻於冉有曰君子之行也行政事度於禮施取其厚事舉其中斂從其薄如是則以丘亦足矣丘十六井出戎馬一疋牛三頭是賦之常法􅀂不度於禮而貪冒無厭則雖以田賦將又不足且子季孫􅀂欲行而法則周公之典在􅀂欲苟而行又何訪焉弗聽爲明年用田賦傳又哀公上曰子胥曰得志於}
  - {type: page-break, offset: 259, content: '', id: KR3k0012_SBCK_821-2b}
  - {type: variant, offset: 259, length: 0, content: '', WYG: 晉文討曹分其地境界未定至是乃以賜諸侯使臧文仲徃宿於重館重館人告曰晉新得諸侯必親其共不速行将無及也從之分曹地自洮以南東傅於濟盡曹地也文仲不書請田而已非聘享會同也襄仲如晉拜曹田也又宣公下十五年曰初稅畆非禮也榖出不過藉周法民耕百畆公田十畆借民力而治之稅不過此以豐財也又襄公三十曰子産治鄭使田有封洫從政一年輿人誦曰取我衣冠而禇之取我田疇而伍之孰殺子産吾其與之及三年民又誦之曰我有子弟子産誨之我有田疇子産殖之子産而死誰其嗣之又哀公上曰季孫欲以田賦丘賦之法因其田財通出馬一匹牛三頭今欲别其田及家財各為一賦故言田賦使冉有訪諸仲尼仲尼曰丘不識也三發三發問卒曰卒終也子為國老待子而行若之何子之不言也仲尼不對不公答而私于冉有曰君子之行也行政事度于禮施取其厚事舉其中歛從其薄如是則以丘亦足矣丘十六井出戎馬一匹牛三頭是賦之常法若不度于禮而貪冒無厭則雖以田賦将又不足且子季孫若欲行而法則周公之典在若欲苟而行又何訪焉弗聴為明年用田賦𫝊又哀公上曰子胥曰得志于}
