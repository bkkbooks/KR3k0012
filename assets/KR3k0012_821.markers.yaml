  - {type: variant, offset: 263, length: 3, content: 且夫富, SBCK: 􅀄稅􅅿宣公履􅅿擇而税之也古者田什一而籍言借民力十井而爲公耕一謂之什一而税也􅀄稅非正也毛詩小雅白華曰滮池北流浸彼稻田滮流貌箋云池澤浸􅃳稻田使之生殖又甫田曰倬彼甫田歳取十千倬明貌甫田謂天下田也十千言多也又大雅崧髙曰王命召伯徹申伯􅁟田徹治也箋云治者正其井牧定其賦稅爾雅曰田一歳曰菑今江東呼􅀄耕地反草爲菑二歳曰新田詩日于彼新田三歳曰畬易日不菑畬史記曰魏文侯使李悝作盡地力之教悝苦回反以爲地方百里提封九萬􅅿理田勤謹則􅅿益三斗不勤則損亦}
  - {type: page-break, offset: 263, content: '', id: KR3k0012_SBCK_821-3a}
  - {type: variant, offset: 263, length: 2, content: 且夫, WYG: 滮池北流浸彼稲田滮流貌箋云池澤浸潤稲田之生殖又甫田曰倬彼甫田歳取十千倬明貌甫田謂大田也十千年多也又大雅嵩髙曰王命召伯徹申伯土田徹治也箋云治者正其井牧定其賦税爾雅曰田一歳曰菑今江東呼初耕地菑二歳曰新田詩曰于彼新田三歳曰畬易曰不菑畬史記曰魏文侯使李悝作盡田地力之教悝苦回反以為地方百里提封九萬畆理田勤謹則畆三斗不勤則損亦如之地方百里之増減輒為粟百八十萬石矣必雜五種以偹灾害力耕數耘收獲如寇盗之至謂促迫之甚恐為風雨損也又曰秦孝公任商鞅人以三晉地狭人貧三晉謂韓魏趙三鄉今河東道之地秦地廣人寡故草不盡墾地利不盡出於是日誘三晉之人利其田宅復三代無兵事而務本于内而使秦人應敵于外故廢井田制阡陌任其所耕不限多少數年之間國}
  - {type: page-break, offset: 263, content: '', id: KR3k0012_WYG_821-5a, image: WYG0900/WYG0900-0273a.png}
  - {type: page-break, offset: 263, content: '', id: KR3k0012_WYG_821-5b, image: WYG0900/WYG0900-0273b.png}
  - {type: variant, offset: 263, length: 3, content: 且夫富, krp: 𥘉稅畝宣公履畝擇而税之也古者田什一而籍言借民力十井而爲公耕一謂之什一而税也𥘉稅非正也毛詩小雅白華曰滮池北流浸彼稻田滮流貌箋云池澤浸潤稻田使之生殖又甫田曰倬彼甫田歳取十千倬明貌甫田謂天下田也十千言多也又大雅崧髙曰王命召伯徹申伯土田徹治也箋云治者正其井牧定其賦稅爾雅曰田一歳曰菑今江東呼𥘉耕地反草爲菑二歳曰新田詩日于彼新田三歳曰畬易日不菑畬史記曰魏文侯使李悝作盡地力之教悝苦回反以爲地方百里提封九萬畝理田勤謹則畝益三斗不勤則損亦}
  - {type: variant, offset: 266, length: 3, content: 如布帛, WYG: 兵彊天下無敵其後韓聞秦之好興事欲疲之乃使水工鄭國說秦令鑿涇水自仲出西抵瓠口為渠並北山東注洛三百餘里欲以溉田中作而覺秦欲殺國國曰始臣為間然渠成亦秦之利也秦以為然卒使就渠用注慎閼之水溉澤鹵之地四萬頃収皆畆一鍾於是関中為沃野無凶年命曰鄭國渠又曰王翦将行請善田宅園池甚衆始皇曰将行矣何憂貧乎戰國策曰魏公叔痤為將攻韓趙勝之魏王賞田百痤曰使士卒不崩直而不倚撓㨂不辟者此吴起餘教也鼓之不敢怠倦者臣也王特為臣右手之倦賞臣可也若以有功臣何力}
  - {type: page-break, offset: 266, content: '', id: KR3k0012_WYG_821-6a, image: WYG0900/WYG0900-0273c.png}
  - {type: variant, offset: 267, length: 2, content: 布帛, SBCK: 之地方百里之増減輙爲粟百八十萬碩矣必􅄂五種以備災害力耕數耘収獲如宼盗之至謂促遽之甚恐爲風􅀨損也又曰秦孝公任啇鞅鞅以三􅀳地狹人貧三􅀳謂韓魏趙三卿今河東道之地秦地廣人寡故草不盡墾地利不盡出於是誘三􅀳之人利其田宅復三代無知兵事而務夲於内而使秦人應敵於外故廢井田制阡陌任其所耕不限多少數年之間國冨兵强天下無敵其後韓聞秦之好興事欲疲之乃使水工鄭國聞說秦令鑿涇水自中山西抵瓠口爲渠並北山東注洛三百餘里欲以漑田中作而覺秦欲殺國國曰始臣爲間然渠成亦秦之利也秦以爲然卒使就渠用注愼閼之水漑澤鹵之地四萬頃収背􅅿一種於是􅀜中爲沃野無凶年命曰鄭國渠閼音於據切又曰王翦將行請善田宅園池甚衆始皇曰將行矣何憂貧乎戰國䇿曰魏叔座爲將攻韓趙勝之魏王賞田百万座曰使士卒不崩直而不􅀝撓㨂不辟者此呉起餘教也鼔之不敢怠倦者臣也王特爲臣右手之倦賞臣可也􅀂以有功臣何力}
