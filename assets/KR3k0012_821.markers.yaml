  - {type: variant, offset: 93, length: 2, content: 仲夏, krp: 方一里者爲田九百畝一里方三百步方十里者爲方一里者百爲田九萬畝方百里者爲方十里者百爲田九十億畝億今十萬方千里者爲方百里者百爲田九萬億畝萬億今萬萬也自恒山至於南河千里而近冀州域自南河至於江千里而近豫州域自江至於衡山千里而遥荆州域自東河至於東海千里而遥徐州域自東河至於西河千里而近亦冀州域自西河至於流沙千里而遥雍州域西不盡流沙南不盡衡山東不盡東海北不盡恒山凡四海}
  - {type: variant, offset: 96, length: 7, content: 月母暴布鄭玄注, SBCK: 内斷長􅀘短方三千里爲田八十萬億一萬億􅅿九州之大計方百里者爲田九十億􅅿山陵林麓川澤溝瀆城郭宫室塗巷三分去一其餘六十億􅅿以一大囯爲率其餘所以授民也又}
