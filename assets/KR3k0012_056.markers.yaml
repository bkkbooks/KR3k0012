  - {type: variant, offset: 106, length: 187, content: 中專諸擘魚因以刺王僚王僚立死戰國策曰馮煖謂孟嘗君曰兔有三窟僅得免死君始一窟未得高枕而臥也請為君復鑿二窟乃西遊於梁謂梁惠王曰齊於其臣孟嘗君諸侯先迎者國富兵強梁王乃聘以為相齊王聞之懼乃請反國馮煖使請先致祭器立宗廟於薛三窟已就煖之力也晉書曰王衍用弟澄為荊州從弟敦為青州曰荊有漢江之固青有負海之險吾留於此足為三窟王隱晉書曰魏末有孫登字公和汲郡共人也無家屬時人於汲縣北山土窟中得之崔鴻, SBCK: 爲培塿矣太平御覽卷第五}
