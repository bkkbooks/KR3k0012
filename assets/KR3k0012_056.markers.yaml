  - {type: variant, offset: 19, length: 2, content: 橧巢, SBCK: 故啇墟漢書曰元城郭東有五鹿之墟即沙麓之地也越絶書曰千里墟者闔廬以鑄干將劒處又曰呉門外鷄坡墟故呉王所畜鷄處也新序曰齊􅁊公出見遺墟問諸野人野人曰是􅉑之墟公曰􅉑氏何爲亡對曰善不能行惡不能去所以爲墟矣風俗通曰謹案尚書舜生姚墟又曰姚墟在濟隂城陽縣帝顓頊之墟閼伯之墟是也培塿􅀃文曰附婁小􅁟山}
