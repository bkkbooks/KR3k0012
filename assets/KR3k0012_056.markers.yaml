  - {type: variant, offset: 6, length: 0, content: '', SBCK: 曰作車以行陸作舟以行水此皆聖人之作樂動聲儀曰土肥饒原陸隘狹斯生奢侈之俗也漢書曰禹陸行載車又曰秦地有鄠杜竹林號曰陸海又曰鄒陽奏書呉王曰髙皇帝水攻則章邯以亡其城陸擊則荆王以失其地魏名臣奏曰執金吾龐延秦其山居林澤有火耕畬種而平地平陸雖有往古耒耜區種之法就其収者􅃴可䟽食不足實食也􅀜令内傳曰􅀜令尹喜生時其家堂陸地自生蓮華光色鮮盛文子曰却走馬以糞車􅁤不接於逺方之外是謂坐馳陸汎老子曰蓋聞善攝生者河上公曰攝養也陸行不遇兕虎自然逺避害不干也入軍不􅀍甲兵莊子曰泉涸魚相與處陸相煦以濕相濡以洙不􅀂相忘于江湖王充論衡曰夫知古不知今謂之陸沉然則儒生所謂陸沉者也應劭風俗通曰荆鱉令死亡隨水上荆人求之不得也鱉令至岷山下邑起見蜀望帝使鱉令鑿巠山然後蜀得陸處望帝自以德不如以國禪與鱉令爲蜀王號曰開明傳傳子曰堯遭洪水而貴陸湯大旱而重水又曰陸田命懸於天人力雖脩苟水旱不時則一年之功棄矣六韜曰天下之人陸沉於殷乆矣傳咸扇賦曰水不䇿􅂹陸不乗舟世無爲而爼豆設時有虞而干戈脩夏侯湛春可樂曰春可樂􅀆樂崇陸之可娱登夷岡以逈眺􅀆超矯駕乎山嵎又秋可哀曰秋可哀􅀆哀南畒之菜荒旣採蕭於大陸􅀆又刈蘭乎崇岡又梁田賦曰嬉于夷寕之廣陸歩于大野之長京察田疇之疆畔􅀆􅀚遊雉之逸形京􅀃文曰京人所爲絶髙丘也毛詩曰升彼墟矣以望楚矣望楚與堂景山與京毛萇曰京髙丘也又曰曽孫之稼如茨如梁曽孫之􅁃如玹如京又曰依其在京侵自阮疆陟彼髙岡無矢我陵爾雅曰丘之髙絶者曰京張揖廣雅曰四起曰京應劭風俗通曰京謂非人力所能成天地性自然也京師義亦取此阿􅀃文曰大陵曰阿一曰阿曲阜也毛詩曰無矢我陵我陵我阿無飲我泉我泉我池鄭􅀇曰文王侵阮國阮之兵無敢當其陵及阿又無敢飲於泉及池者也又曰有卷者阿飃風自南毛萇曰惡人􅀍化而消猶飃風之入曲阿也愷悌君子來游來歌以矢其音又曰誰謂爾無羊三百維群誰謂爾無牛九十其犉或降于阿或飲于池又曰陟彼中阿言採其䖟又曰考盤在阿碩人之薖又曰菁菁者莪在彼中阿又曰綿蠻黃鳥止于丘阿張揖廣雅曰曲陵曰阿史}
