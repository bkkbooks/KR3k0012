  - {type: variant, offset: 2589, length: 3, content: 自朝歌, WYG: 緱氏山仙者昇焉言王子晉控鶴斯阜靈王望而不得近舉手謝而去其處得遺屣焉俗謂為父堆又曰函關直北隔河有層阜巍然獨秀孤峙河陽世謂之風陵戴延之所謂風堆者也又曰瞿堆南絶壁峭峙孤險雲髙望之形若覆唾壺髙二十餘丈羊膓蟠道三十六廻開山圖謂之仇夷所謂積石嵳峩嶔岑隱阿者也上有平田百頃煮土成鹽因}
