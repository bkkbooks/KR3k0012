  - {type: variant, offset: 11, length: 3, content: 宮室冬, SBCK: 山峴逺而峻今名半車峴白淵之齊道記曰黃丘北十里有鸑鷟峴下帶長澗東北流經牛山山去此水八十餘里今號曰牛頭水是齊景公所登而歎處劉楨京口記曰去城九里有白在峴江乗地記曰城東四十五里竹里山王途所經途甚傾嶮行者號爲飜車峴也武昌記曰城東南有金牛崗崗西有石鼔峴上有三石鼔鼔鳴天必雨隴方言曰秦晉之間冢謂之隴􅀃文曰隴天水天坂也廣志曰泳沙在玉門􅀜外東西數百里有三断名曰三隴也三秦記曰隴西開其坂九廽不知髙幾里欲上者七日乃越髙處可容百餘家下處數十萬户上有清水四注俗􅁔曰隴頭流水鳴聲幽咽遥望秦川心肝断絶去長安千里望秦川如帶又􅀜中人上隴者還望故郷悲思而歌則有絶死者秦州記曰隴西郡東一百六十里得隴山南北亘接不知逺近東西廣百八十里其髙處可三四里登此嶺東望秦川四五百里極目茫然墟宇桒梓與雲霞一色東人西役升此而頋瞻者無不悲思其上懸巖吐霤於嶺中淵停名曰萬石淵溢流散下皆注於渭故北人升此而歌始興記曰盧水合武水甚險名曰新隴有太守周昕廟即始開此隴者行者放雞散米以祈福而忌着濕衣入廟堆爾雅郭璞注曰江東呼地髙堆者爲敦􅀃文曰阜小阜也又曰巴蜀山岸脅之堆傍欲落者曰坁坁崩聲聞數百里漢書曰楊雄上書曰往者圖西域豈爲康}
