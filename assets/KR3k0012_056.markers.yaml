  - {type: variant, offset: 60, length: 7, content: 史記曰吳公子光, SBCK: 今齊魯}
  - {type: variant, offset: 60, length: 901, content: 史記曰吳公子光之謀王僚也專諸謂曰王僚可殺也公子光乃伏士於窟室中而具酒請王僚使專諸置匕首魚炙之中專諸擘魚因以刺王僚王僚立死戰國策曰馮煖謂孟嘗君曰兔有三窟僅得免死君始一窟未得高枕而臥也請為君復鑿二窟乃西遊於梁謂梁惠王曰齊於其臣孟嘗君諸侯先迎者國富兵強梁王乃聘以為相齊王聞之懼乃請反國馮煖使請先致祭器立宗廟於薛三窟已就煖之力也晉書曰王衍用弟澄為荊州從弟敦為青州曰荊有漢江之固青有負海之險吾留於此足為三窟王隱晉書曰魏末有孫登字公和汲郡共人也無家屬時人於汲縣北山土窟中得之崔鴻十六國春秋前秦錄曰張忠字巨和中山人也永嘉之亂隱於秦山端拱若尸無琴書之適不脩經典勸教但以至道虛無為宗其居也依崇巖幽谷鑿地為窟室弟子亦窟居去忠六十餘步五日一朝其教也以形不以言弟子受業觀形而退淮南子曰鳥飛反鄉兔走歸窟典略曰蘇秦與張儀始俱東學於齊鬼谷先生皆通經藝百家之言鬼谷弟子五百餘人為作窟深二丈曰有能獨下在窟中說使泣者則能分人主之地矣秦下說之鬼谷泣下沾𥘞秦與儀記一體也又曰董卓雖親愛呂布然時醉則罵以刀劍擊之不中而後止布恐終被害乃私與司徒王允及尚書今孫端謀養死士於窟室三年四月天子疾瘳卓詣宮賀布先置死士以邀之卓嚴駕出馬躓不肯行心怪之欲還布勸使行到宮門入掖門死士交戟刺卓墮車顧布所在布下馬曰有詔遂殺之列仙傳曰歷陽有彭祖仙窟請雨輒得也神仙傳曰李意其蜀人於成都角作一土窟居之冬夏單衣髮長剪去之皆使長五寸或百日二百日三百日不出窟郡國志曰相州隆慮山有一洞去地千仞俗謂聖人窟下有小山孤竦謂之玉女樓仙人臺亦曰香爐峰也又曰馬邑白道齊坂有土穴出泉即琴操謂飲馬長城窟也秦州記曰河崖傍有二窟一曰唐術窟深四十餘丈高四十餘丈中有三佛寺流泉浴池鑿石作丈六像三百餘區其西二里則曰時亮窟高百丈廣二十丈深三十丈亦有泉水藏古書五卷唐術時亮皆古之孝行士也又曰州圖經曰唐術窟在郡西龍支谷彼人亦罕有至者其窟內有物若似今書卷因謂之精巖巖內時見神人往還蓋古仙所居耳羗胡懼而莫敢近又謂鬼為唐術故指此為唐術窟豫章記曰豐城縣有雷孔章掘神劍窟方廣七八丈王韶之南康記曰神源下流百里有峽兩岸皆高山峽下數十里有蛟龍窟時時有霧氣耆宿云此通南康縣去此穴由百餘里嘗有宿其口者夜遇暴雨水器物乃流出彼此如其然野說, WYG: 説}
