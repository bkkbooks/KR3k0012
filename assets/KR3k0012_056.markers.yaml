  - {type: variant, offset: 4, length: 1, content: 窟, SBCK: 一陸京阿峴隴堆墟培塿陸釋名曰髙平曰陸陸漉也川流漉而去也􅀃文曰陸髙平地也周易曰鴻漸于陸夫征不復婦孕不育㓙利禦寇王弼曰陸髙之頂也進而之陸與四相得不能復反者也又曰莧陸夬夬中行無咎易坤靈圖曰聖人受命瑞應先於河瑞應之至聖人殺龍龍不可殺皆感氣也君子得衆人之助瑞應先見於陸瑞應之至君子殺虵虵不如龍陸不如河焦贑易林曰山没丘浮陸爲水魚燕雀無巢民無室廬又曰鳬池水廉髙陸爲海江河橫流魚鱉成市尚書曰􅁪衛旣從大陸旣作孔安國曰二水巳治從其故道大陸之地巳可耕作也毛詩曰考盤在陸碩人之軸又曰鴻飛遵陸公歸不復於女信宿毛萇曰陸非鴻所冝處也周}
