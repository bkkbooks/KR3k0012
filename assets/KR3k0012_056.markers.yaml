  - {type: variant, offset: 2393, length: 2, content: 黃帝, WYG: 蚩尤氏強}
  - {type: variant, offset: 2396, length: 0, content: '', WYG: 榆㒺爭王於涿鹿之阿穆天子傳曰天子西征升于九阿郭璞曰今新安縣十里九坂也嵇康聖賢髙士傳讚曰許由養}
  - {type: variant, offset: 2397, length: 3, content: 農氏戰, WYG: 宅于箕阿德眞體全擇日登遐樂資春秋後傳曰阿房宮未成成更欲擇令名名之作宫阿旁故天下謂之阿房宮漢武内傳曰西王母命侍女歌云仰上升絳庭下遊日窟阿顧盼八落外逺指九宫遐董覽吳地志曰曲阿秦時名雲陽太史云東南有天子氣在雲陽之間故鑿北岡令曲而阿因名曲阿桓寛鹽鐵論曰晉有河華九阿而奪}
  - {type: page-break, offset: 2397, content: '', id: KR3k0012_WYG_056-6b, image: WYG0893/WYG0893-0473b.png}
  - {type: variant, offset: 2401, length: 2, content: 阪泉, WYG: 六卿齊有泰山巨海而脅於田單孫楚王驃騎誄曰逍遙芒阿闔門下帷研精六藝探賾鈎微湛方生詩曰發鞍踞平陸秣馬青山阿濁酒沽魚鼎是食何必過袁宏採菊詩曰息足廻阿圍坐長林披榛即澗藉草依陰酈炎詩曰靈芝生河洲動揺困洪波秋蘭榮何晚嚴霜瘁其柯哀哉二芳草不植太山阿摯虞遷宅誥曰惟大始三年九月上旬涉自洛川周于原阿乃卜昌水東黄水西背山面隰惟此良宅陸機逸民賦曰相黄土而卜居兮度山阿而考室緩齊歌行曰遨山聚靈族髙讌會城阿長風萬里舉慶雲鬱嵯峩峴從征記曰青峴一名小峴木多櫨杏續述征記曰莵頭峴雖無峭嶮然連林修坂數十里中行者固亦密勿矣伏琛齊地記曰萊蕪谷有銅冶峴古鑄銅處朱虛城西有山峴遠而峻今名半車峴白淵}
  - {type: page-break, offset: 2401, content: '', id: KR3k0012_WYG_056-7a, image: WYG0893/WYG0893-0473c.png}
  - {type: page-break, offset: 2401, content: '', id: KR3k0012_WYG_056-7b, image: WYG0893/WYG0893-0473d.png}
  - {type: variant, offset: 2404, length: 1, content: 野, WYG: 齊道記曰黄丘北十里有鸑鷟峴下帶長澗東北流經牛山山去此水八十餘里今號曰牛頭水是齊景公所登而歎處劉慎京口記曰去城九十里有白峴在東山白石也江乘地記曰城東四十五里竹里山王途所經途甚傾嶮行者號為翻車峴也武昌記曰城東南有金牛崗崗西有石鼔峴上有三石鼔鼓鳴天必雨隴方言曰秦晉之間冢謂之隴説文曰隴天水大坂也廣志曰泳沙在玉門關外東西數百里有三斷名曰三隴也三秦記曰隴西關其坂九廻不知髙㡬里欲上者七日乃越髙處可容百餘家下處數十萬户上有清水奔流四注俗歌曰隴頭流水鳴聲幽咽遙望秦川心肝斷絶去長安千里望秦川如帶又關中人上隴者還望故鄉悲思而歌則有絶死者秦州記曰隴西郡東一百六十里得隴山南北亘接不知逺近東西廣百八十里其髙處可三四里登此嶺東望秦川四五百里極目茫然墟宇桑梓與雲霞一色東人西役升此而顧瞻者無不悲思其上懸巖吐􅋼於嶺中淵停名曰萬石淵溢流散下皆注於渭故北人升此而歌始興記曰盧水合武水甚險名曰新隴有太守周昕廟即始開此隴者行者放鷄散米以祈福而忌著濕衣入廟堆爾雅郭璞注曰江東呼地髙堆者為墩説文曰堆小阜也}
