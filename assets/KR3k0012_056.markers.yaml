  - {type: variant, offset: 8, length: 0, content: '', SBCK: 黃帝披山通道而邑于􅃰鹿之阿帝王丗紀曰􅃖尤氏強與榆岡爭王於涿鹿之阿穆天子傳曰天子西征升于九阿郭璞曰今新安縣十里九坂也嵆康聖賢髙士傳讃曰許由養神宅于箕阿德眞體全擇日登遐樂資春秋後傳曰阿旁宫未成成更欲擇令名名之作宫阿旁故天下謂之阿旁宫漢武内傳曰西王母命侍女􅁔云仰上升絳庭下遊日窟阿頋盻八落外逺指九空遐董覽呉地志曰曲阿秦時名雲陽太史云東南有天子氣在雲陽之間故鑿北岡令曲而阿因名曲阿桓寛鹽鐵論曰晉有河華九阿而奪於六卿齊有㤗山巨海而脅於田常孫楚王驃􅀐誄曰逍遥芒阿闔門下帷研精六藝採頥鈎微湛方生詩曰發鞌踞平陸秣馬青山阿濁酒炙枯魚鼎食何必過􅀽宏採菊詩曰息足廻阿圎坐長林披榛即澗藉草依隂酈炎詩曰靈芝生河洲動揺困洪波秋蘭榮河晚嚴霜瘁其柯哀哉二芳草不殖太山阿摰虞遷宅誥曰惟大始三年九月上旬渉自洛川周于原阿乃卜昌水東黃水西背山靣隰惟此良陸機逸民賦曰相荒土而卜居􅀆度山阿而考室又緩齊歌行曰遨仙聚靈族髙讌曽城阿長風萬里舉􅂟雲欝嵯峨峴從征記曰青峴沙峴一名小峴木多櫨杏續述征記曰莵頭峴雖無峭嶮然連林脩坂數十里中行者固亦宻勿矣伏琛齊地記曰萊蕪谷有銅冶峴}
