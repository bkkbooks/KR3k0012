  - {type: variant, offset: 1700, length: 688, content: 法皆有地域溝樹之入野職野賦于王府又曰野廬氏掌達國道路至于四畿比國郊野之道路宿息井樹又曰大司寇之職以五刑糺萬民一曰野刑上功糺力刑亦法也功農功力勤力又曰縣士掌野合掌其縣之民數糺其戍令而聽其獄訟左傳曰辛有適伊川見被髮祭於野者曰不及百年此其戎乎其禮先亡矣又曰鄭伯亨趙孟于垂隴伯有賦鶉之賁賁趙孟曰床第之言不踰閾況在野乎非使人之所得聞又曰崔氏之亂申鮮虞僕賃於野以喪莊公楚人召之遂如楚為右尹又曰子產之從政也擇能而使之禆諶能謀謀於野則獲謀於邑則否鄭國將有諸侯之事子產乃令禆諶乘以適野使謀可否而告馮簡子使斷之又曰鸜鵒之羽公在外野往饋之焉又曰齊悼公使朱毛遷安孺子於駘不至殺諸野幕之下爾雅曰邑外謂之牧牧外謂之野春秋合成圖曰堯母慶都蓋大帝之女生於斗維之野常三河東南天大雷電有血流潤大石之中生慶都管子曰萬乘之國兵不可以無主地博大野不可以無吏野無吏則無蓄積野無田夫則人墮本業故無蓄積又曰行其田野視其耕耘計其農事而飢飽之國可知也其耕之不深耘之不謹地宜不任草田多穢耕者不必肥荒者不必墝其野草田多而闢田少者雖不水旱飢國之野淮南子曰孔子行於東野馬食農夫之稼野人怒取其馬而擊之使子貢往說之畢辭而弗能得乃使馬圉往說之野人大喜解馬而與之又曰上遊乎霄雿之野下出乎無垠鄂之門高誘曰霄雿高峻之貌也垠鄂無形之貌也霄讀縓綃雿讀若翟氏之翟也國語曰臼季使舍於冀野賈逵曰臼季晉臣冀野晉地冀缺耨其妻饁之敬相待如賓從而問之曰冀芮之子也與之歸家語曰叔孫氏之車士曰鉏啇車士將車者啇子姓也鉏啇名也採薪於大野獲麟焉折前左足載歸叔孫以為不祥棄郭外告孔子曰麇而角者何也孔子往觀曰麟也孰為來哉孰為來哉呂氏春秋曰禹東至搏木之地青差之野高誘曰青差東方之野也, WYG: 阿}
