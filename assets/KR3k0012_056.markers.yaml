  - {type: variant, offset: 11, length: 3, content: 宮室冬, krp: 山峴逺而峻今名半車峴白淵之齊道記曰黃丘北十里有鸑鷟峴下帶長澗東北流經牛山山去此水八十餘里今號曰牛頭水是齊景公所登而歎處劉楨京口記曰去城九里有白在峴江乗地記曰城東四十五里竹里山王途所經途甚傾嶮行者號爲飜車峴也武昌記曰城東南有金牛崗崗西有石鼔峴上有三石鼔鼔鳴天必雨隴方言曰秦晉之間冢謂之隴說文曰隴天水天坂也廣志曰泳沙在玉門關外東西數百里有三断名曰三隴也三秦記曰隴西開其坂九廽不知髙幾里欲上者七日乃越髙處可容百餘家下處數十萬户上有清水四注俗歌曰隴頭流水鳴聲幽咽遥望秦川心肝断絶去長安千里望秦川如帶又關中人上隴者還望故郷悲思而歌則有絶死者秦州記曰隴西郡東一百六十里得隴山南北亘接不知逺近東西廣百八十里其髙處可三四里登此嶺東望秦川四五百里極目茫然墟宇桒梓與雲霞一色東人西役升此而頋瞻者無不悲思其上懸巖吐霤於嶺中淵停名曰萬石淵溢流散下皆注於渭故北人升此而歌始興記曰盧水合武水甚險名曰新隴有太守周昕廟即始開此隴者行者放雞散米以祈福而忌着濕衣入廟堆爾雅郭璞注曰江東呼地髙堆者爲敦說文曰阜小阜也又曰巴蜀山岸脅之堆傍欲落者曰坁坁崩聲聞數百里漢書曰楊雄上書曰往者圖西域豈爲康}
  - {type: punctuation, offset: 13, content: ，, id: KR3k0012_CHANT_056-bkkpn5}
  - {type: 'tls:seg', offset: 13, content: '', id: KR3k0012_CHANT_056-1a.5}
  - {type: variant, offset: 15, length: 3, content: 營窟夏, SBCK: 烏孫踰白堆而寇西邊哉乃以制匈奴也堆形如􅁟龍無頭尾髙者二三丈水經注曰緱氏山仙者昇焉言王子晉控鶴斯阜靈王望而不得近舉手謝而去其處得遺屣焉俗謂爲父堆又曰凾􅀜直北隔河有層阜巍然獨秀􅀌峙河陽世謂之風陵戴延之所謂風埏者也又曰瞿堆南絶壁峭峙􅀌嶮雲髙望之形􅀂覆唾壷髙二十餘里羊腸蟠道三十六廻開山圖謂之仇夷所謂積石嵯峨嶔岑隱阿者也上有平田百頃煑􅁟成塩因以百頃爲號山上豊水泉所謂清泉湧沸潤氣上流者也漢武帝元狩六年開以爲武都郡天地大澤在西故以都爲目矣長安圖曰髙望堆在延興門南八里潘岳西征賦曰慿髙望之陽隈梁州記曰南鄭城泝漢上五十里水邊有漢武堆漢武嘗遊此以爲鈎臺後人覩其崇基謂之漢武堆述異記曰當陽縣南有龍川鳯川云漢帝時八龍五鳯常遊於此亦呼爲五鳯堆安定圖經曰振履堆者故老云夸父逐日振履於此故名之墟􅀃文曰墟大丘也崐崘謂之㠊史記曰成王伐管蔡以殷餘人封康叔爲衛君}
