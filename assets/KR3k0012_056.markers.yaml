  - {type: variant, offset: 1095, length: 3, content: 高宗夢, WYG: 鴻飛遵陸公歸不復於女信宿毛萇曰陸非鴻所宜處也周禮曰作車以行陸作舟以行水皆聖人之作樂動聲儀曰土肥原陸饒隘狹斯生奢侈之俗也漢書曰禹陸行載車又曰秦地有鄠杜竹林號曰陸海又曰鄒陽上吳王書曰髙皇帝水攻則章邯以亡其城陸撃則荆王以失其地魏名臣奏曰執金吾龎延奏其山居林澤有火耕畬種而平地平陸雖有往古耒耜區種之法就其收者適可蔬食不足寳也關令内傳曰關令尹喜生時其家堂陸地自生蓮華光色鮮盛文子曰却走馬以糞車軌不接於逺方之外是謂坐馳陸汛老子曰蓋聞善攝生者河上公攝養也陸行不遇兕虎自然逺害不必避也入軍不被甲兵莊子曰泉涸魚相與處陸相煦以濕相濡以沫不若相忘於江湖王充論衡曰夫知古不知今謂之陸沉然則儒生所謂陸沉者也應劭風俗通曰荆鼈令死亡隨水上荆人求之不}
