  - {type: variant, offset: 1143, length: 1, content: 傅, SBCK: 十時廷尉監隱蕃結交豪傑自衛將軍全琮等皆傾心敬待惟衜及宣詔郎楊迪拒絶不與通時人怪之而蕃後叛逆衆乃服之晉書曰安平王孚􅀄爲魏太子中庶子魏武帝崩太子號哭過甚孚諌曰大行晏駕天下恃殿下爲命當上爲宗廟下爲萬國奈何効疋夫之孝太子良乆乃止曰卿言}
