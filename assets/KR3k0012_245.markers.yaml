  - {type: variant, offset: 1142, length: 0, content: '', SBCK: 少詹事唐書曰張行成轉太子少詹事太宗東征皇太子於定州監國即行成夲邑也太子謂行成曰今者送公衣錦還郷於是令有司祀其先人墓太子中庶子漢書百官表曰太子中庶子職侍中漢書曰王啇字子威􅃰郡蠡吾人啇少爲太子中庶子以肅敬見稱又曰歐陽地餘字長賔爲中庶子授皇太子經又曰馮野王通詩以父任爲太子中庶子魏志曰鮑勛字叔業清白有髙節知名當丗爲中庶子在東宫正色不撓蜀志曰後主立太子璿以霍弋爲中庶子璿好馳射出入無度弋援引古事盡言䂓諌甚得切磋之體吴志曰孫登爲太子時太􅀓張温言於權曰夫中庶子官㝡親密切問近對冝用俊彦於是乃用陳表等爲中庶子後又以庶子禮拘復令勑中侍坐又曰羊衜音道􅀄爲中庶子年}
  - {type: page-break, offset: 1142, content: '', id: KR3k0012_SBCK_245-3a}
