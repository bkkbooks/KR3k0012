  - {type: variant, offset: 1984, length: 346, content: 少好學家貧傭力以供資用東觀漢記曰建興二十八年以桓榮為少傅賜以輜車乘馬榮大會諸生陳車馬印綬曰今日所蒙稽古之力也可不勉乎後漢書曰徵王丹為太子少傅時大司徒侯霸欲與交友及丹被徵遣子昱候於道昱迎拜車下丹下荅之昱曰家公欲與君結交何為見拜丹曰君房有是言丹未之許也續漢書王丹字仲回為太子少傅謇諤正直名德重於時魏志曰邢顒字子昂初太子未定而臨淄侯植有寵丁儀等並讚翼其美太祖問顒顒對曰以庶代宗先世之戒也願殿下深重察之太祖識其意後遂以為太子少傅吳志曰薛綜綜子瑩瑩子兼三世並為太子少傅談者美之晉書曰山濤轉太子少傅在東宮年已七十病疾求退手詔不聽尋講武於宣武塲有詔濤乘步輦導皇太子入時尚書僕射盧欽與濤言及孫武用兵本意武帝欣然而言曰山少傅故是天下談士也舉坐傾心又曰何曾議太子少傅當稱臣拜荀顗曰太之與少自二傅之名次耳非於太子有, WYG: 知委任}
