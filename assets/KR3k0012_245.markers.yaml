  - {type: variant, offset: 1491, length: 2, content: 師曾, SBCK: 知名爲太子庶子吴志曰華融字德􅵿廣陵江都人祖父避亂居山隂時皇象亦寓居山隂吴郡張温來就象學欲得所舎或告温曰有華徳蕤者雖年少美有令志可舎也温遂止融家朝夕談講俄而温爲選部尚書乃推擢融爲太子庶子遂知名顯逹晉書曰鄭黙武帝時太原郭弈俱爲庶子朝廷以太子官屬冝􅁛陪臣黙上言皇太子體皇極之尊無私於天下宫臣皆受命天朝不同藩國事遂不施行晉起居注曰太康十年詔尚書郎王琛每所陳論意在忠讜其以爲太子庶子隋書曰劉行夲爲太子左庶子時左衛率長史夏侯福爲太子所昵甞於閤内與太子戲福大􅀏声聞於外行夲時在閤下聞之待其出行夲數之曰殿下寛容賜汝顔色汝何物小人敢爲褻慢付執法者治之數日太子為福致請乃釋之隋書曰劉行夲爲左庶子太子甞得良馬令夏侯福乗而觀之太子甚恱因欲令行夲乗行夲不}
