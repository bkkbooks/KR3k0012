  - {type: variant, offset: 1474, length: 6, content: 少師少保並晉, SBCK: 中庶子東宫顯職加侍接左右誠冝得篤粹有行檢之人必允衆望太子左右庶子六典曰左庶子之職掌侍從賛相駮正啓奏中允爲之二凡皇太子從祀朝㑹則版奏外辦中嚴入則解嚴焉凡令書下左春坊則與中允司議郎等覆啓以畫諾右庶子之職掌侍從左右献納啓奏中舎人爲之二凡皇太子監國於宫内下令書太子親畫日至春坊則宣􅀓之禮記曰古者天子有庶子之官職諸侯卿大夫之庶子掌其戒令與其教理別其等正其位國有大事則帥國子而致於太子唯所用之􅀂有甲兵事則授之車甲合其卒伍}
  - {type: page-break, offset: 1474, content: '', id: KR3k0012_SBCK_245-5a}
  - {type: variant, offset: 1474, length: 6, content: 少師少保並晉, WYG: 中庶子東宫顯職侍接左右誠宜得篤粹有行檢之人必允衆望太子左右庶子六典曰左庶子之職掌侍從贊相駮正啟奏中允為之貳凡皇太子從祀朝㑹則版奏外辯中嚴入則觧嚴焉凡令書下左春坊則與中允司議郎等覆啓以畫諾右庶子之職掌侍従左右獻納啟奏中舍人為之貳凡皇太子監國於宫内下令書太子親書日至春坊則宣𫝊之禮記曰古者天子有庶子之官職諸侯卿大夫之庶子掌其戒令與其教理别其等正其位國有大事則帥國子而致於太子唯所用之若有甲兵事則授之車甲合其卒伍}
