  - {type: variant, offset: 1540, length: 9, content: 為桃弓僕射黃㼐少師, krp: 正道何有嬖昵房帷之間哉令則甚慙而不能改又曰劉行夲爲左庶子卒後而太子勇廢文帝曰若使劉行夲在勇當不及於此}
  - {type: variant, offset: 1541, length: 8, content: 桃弓僕射黃㼐少師, WYG: 太子庶子隋書曰劉行本為太子左庶子時左衛率長史夏侯福為太子所暱嘗與閣内與太子戯福大笑聲聞於外行本時在閣下聞之待其出行本數之曰殿下寛容賜汝顔色汝何物小人敢爾福致請乃釋之隋書曰劉行本為左庶子太子嘗得良馬令夏侯福乘而觀之太子甚恱因欲令行本行本不從正色而進曰至尊置臣於庶子之位者欲令輔導殿下以正道非為殿下作㺯臣也太子慚而止又曰劉行本拜太子左庶子領治書如故皇太子虛衿敬憚時唐令則亦為左庶子太子昵狎之每令以絃歌教内人行本責之曰庶子當匡太子以正道何有嬖昵房帷之間哉令則甚慚而不能改又曰劉行本為左庶子卒後而太子勇廢文帝曰若使劉行本在勇當不及於此}
