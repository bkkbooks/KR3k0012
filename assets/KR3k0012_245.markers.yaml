  - {type: variant, offset: 1134, length: 0, content: '', SBCK: 以王㳟丹陽尹領詹事㳟讓表曰今皇儲始建四方是式捴司之任崇替所由冝妙簡才賢盡一時之勝豈臣最庸所可叨忝晉公卿禮秩曰}
  - {type: variant, offset: 1134, length: 0, content: '', WYG: 以王恭丹陽尹領詹事恭譲表曰今皇儲始建四方是式總司之任崇替所由宜妙簡才賢盡一時之勝豈臣最庸所可叨忝晉公卿禮秩曰}
  - {type: page-break, offset: 1134, content: '', id: KR3k0012_WYG_245-3a, image: WYG0895/WYG0895-0238c.png}
  - {type: variant, offset: 1134, length: 0, content: '', krp: 以王㳟丹陽尹領詹事㳟讓表曰今皇儲始建四方是式捴司之任崇替所由冝妙簡才賢盡一時之勝豈臣最庸所可叨忝晉公卿禮秩曰}
  - {type: variant, offset: 1136, length: 0, content: '', SBCK: 中立詹事掌宫事沈約宋書曰詹事一人􅀄領官属成帝時悉属少傅魏氏置詹事揔衆職晉􅀄又属二􅀓咸寕復置詹事齊職儀曰詹事品第三茂陵書秩二千石銀章青綬􅈰擬尚書令位視領護將軍陳書曰後主欲以江揔爲太子詹事令管記陸瑜言之於孔奐奐謂瑜曰江有潘陸之華而無園綺之實輔弼儲宫竊有所難瑜具以白後主後深以爲恨乃自言於髙宗髙宗將許之奂乃奏曰江揔文華之人今皇太子文華不少無藉於揔如臣愚見頋􅃟敦重之才以居輔導帝曰即如卿言誰當居此奐曰都官尚書王廊丗有懿德識性敦敏可以居太子詹事奐又奏曰宋朝范瞱即范㤗之子亦爲太子詹事前代不疑後主固争之帝卒以揔爲詹事唐書曰蘇弁改太子詹事弁􅀄入朝班位失序殿中侍御史鄒儒立對仗彈之弁於金吾待罪數刻特釋放舊制太子詹事班次太常宗正卿之下貞元}
  - {type: page-break, offset: 1136, content: '', id: KR3k0012_SBCK_245-2b}
  - {type: variant, offset: 1136, length: 0, content: '', WYG: 中立詹事掌宫事沈約宋書曰詹事一人初領官屬成帝時悉屬少傅魏氏置詹事總衆職晉初又屬二傅咸寧復置詹事齊職儀曰詹事品第三茂陵書秩二千石銀章青綬局擬尚書令位視領䕶将軍陳書曰後主欲以江總為太子詹事令管記陸瑜言之於孔奐謂瑜曰江有潘陸之華而無園綺之實輔弼儲宫竊有所難瑜具以白後主後主深以為恨乃自言於髙宗将許之奐乃奏曰江總文華之人今皇太子文華不少無藉於總如臣愚見願選端重之才以居輔導帝曰即如卿言誰當居此奐曰都官尚書王廊世有懿徳賦性敦敏可以居太子詹事奐又奏曰宋朝范曄即范泰之子亦為太子詹事前代不疑後主固爭之帝卒以總為詹事唐書曰蘇弁改太子詹事弁初入朝班位失序殿中侍御史鄒儒立對仗彈之弁於金吾待罪數刻特釋放舊制太子詹事班次太常宗正卿之下貞元}
  - {type: page-break, offset: 1136, content: '', id: KR3k0012_WYG_245-3b, image: WYG0895/WYG0895-0238d.png}
  - {type: page-break, offset: 1136, content: '', id: KR3k0012_WYG_245-4a, image: WYG0895/WYG0895-0239a.png}
  - {type: variant, offset: 1136, length: 0, content: '', krp: 中立詹事掌宫事沈約宋書曰詹事一人𥘉領官属成帝時悉属少傅魏氏置詹事揔衆職晉𥘉又属二傳咸寕復置詹事齊職儀曰詹事品第三茂陵書秩二千石銀章青綬局擬尚書令位視領護將軍陳書曰後主欲以江揔爲太子詹事令管記陸瑜言之於孔奐奐謂瑜曰江有潘陸之華而無園綺之實輔弼儲宫竊有所難瑜具以白後主後深以爲恨乃自言於髙宗髙宗將許之奂乃奏曰江揔文華之人今皇太子文華不少無藉於揔如臣愚見頋選敦重之才以居輔導帝曰即如卿言誰當居此奐曰都官尚書王廊丗有懿德識性敦敏可以居太子詹事奐又奏曰宋朝范瞱即范㤗之子亦爲太子詹事前代不疑後主固争之帝卒以揔爲詹事唐書曰蘇弁改太子詹事弁𥘉入朝班位失序殿中侍御史鄒儒立對仗彈之弁於金吾待罪數刻特釋放舊制太子詹事班次太常宗正卿之下貞元}
  - {type: variant, offset: 1138, length: 2, content: 始置, SBCK: 御史中丞竇叅叙定班位移詹事在河南太原尹之下弁乃引舊班制立臺官詰之仍紿云巳白宰相請依舊故爲儒立彈之又曰龍朔二年改詹事爲端尹詹事府爲端尹府王珉荅徐邈書曰詹事彈一官如尚書左丞矣}
  - {type: variant, offset: 1138, length: 2, content: 始置, WYG: 御史中丞竇參敘定班位移詹事在河南太原尹之下弁乃引舊班制立臺官詰之乃紿曰已白宰相請依舊故儒立弹之又曰龍朔二年改詹事為端尹詹事府為端尹府王珉答徐邈曰詹事彈一宫官如尚書奏丞矣}
  - {type: variant, offset: 1138, length: 2, content: 始置, krp: 御史中丞竇叅叙定班位移詹事在河南太原尹之下弁乃引舊班制立臺官詰之仍紿云巳白宰相請依舊故爲儒立彈之又曰龍朔二年改詹事爲端尹詹事府爲端尹府王珉荅徐邈書曰詹事彈一官如尚書左丞矣}
