  - {type: variant, offset: 774, length: 353, content: 魏志曰何夔代涼茂為太子太傅每月朔太傅入見太子正法服而禮焉吳志曰吳粲遷太子太傅遭二宮之變抗言執正明嫡庶之分欲使魯王出住夏口遣楊笁不得令在都邑又數以消息語陸遜遜時駐武昌連表諫爭由此為笁等所譖害又曰孫權寢疾徵大將軍諸葛恪為太子太傅會稽太守滕胤為太常並受詔輔太子又曰闞澤字德閏會稽山陰人拜太子太傅領中書孫權嘗問書傳篇賦何者為美澤欲諷諭以明治亂因對賈誼過秦論最美權覽讀焉又曰程秉字德樞汝南南頓人也秉事鄭玄避亂交州與劉熙考論大義遂愽通五經士爕命為長史權聞其名儒以禮徵秉既到拜太子太傅又曰張溫字惠恕吳郡吳人也溫少脩節操容貌奇偉權聞之以問公卿曰溫當今與誰為比大司農劉基曰可與全琮為輩大常顧雍曰基未詳其為人也今無輩權曰如是張允不死也徵到延見文辭占對觀者傾竦權改容加禮罷出張昭執其手曰老夫託意君宜明之拜議郎選曹尚書尋遷太子太傅, SBCK: ''}
