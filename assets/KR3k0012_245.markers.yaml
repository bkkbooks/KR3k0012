  - {type: variant, offset: 164, length: 319, content: 立太傅少傅以養之太傅在前少傅在後史記曰萬石君姓石名奮無文學恭謹無比遷為太子太傅又曰夏侯勝為太子太傅受業詔撰尚書論語賜黃金百斤年九十卒官賜冢塋葬平陵太子賜錢二百萬為勝素服五日以報師傅之恩儒者以為榮漢書曰景帝栗太子以竇嬰為太傅十年栗太子廢嬰爭不能得謝病屏居藍田山下數月諸竇賓客辯士說請遂起朝又曰蕭望之字長倩為太子太傅以論語授太子又曰叔孫通為太傅高帝欲立趙王廢太子通諫曰昔晉獻公以驪姬故廢立太子晉國亂者數十年秦不早定扶蘇終使滅祀今太子仁孝陛下必廢嫡立庶臣願先伏誅以頸血汙地上曰公罷吾戲耳通曰太子天下本本一搖天下振動奈何以天下戲乎又曰踈廣字仲翁為太傅弟受為少傅朝廷以為榮皆請免歸鄉里公卿祖餞東都門外百姓觀者歎曰賢哉二大夫初太子外祖許伯以太子少請使, SBCK: 恐夷非}
