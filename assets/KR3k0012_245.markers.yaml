  - {type: variant, offset: 750, length: 0, content: '', SBCK: 詹事􅁗官詹省也給也秩比二千石漢書曰竇嬰字王孫孝景即位爲詹事帝弟梁孝王母竇太后愛之孝王朝酒酣上從容曰千秋萬歳後傳王太后歡嬰引巵酒進上曰天下者髙帝天下父子相傳漢之約也上何以得傳梁王太后由是憎嬰又曰孔光父覇字次孺宣帝時以授}
  - {type: variant, offset: 750, length: 0, content: '', WYG: 詹事秦官詹省也給也秩比二千石漢書曰竇嬰字王孫景帝即位為詹事帝弟梁孝王母竇太后愛之孝王朝酒酣上從容曰千秋萬嵗後𫝊王太后歡嬰引巵酒進上曰天下者髙帝天下父子相傳漢之約也上何以得𫝊梁王太后由是憎嬰又曰孔光父霸字次孺宣帝時以授}
