  - {type: variant, offset: 1701, length: 555, content: 太子師保古難其選若成王幼小以周公為傅左右皆賢日聞雅訓自幼及長便為聖君秦之胡亥趙高傅之教以刑法及其立也誅功臣殺親族酷烈不已旋踵而亡以此言之善惡由於習近又曰唐休璟年力雖衰進取彌銳時宮人賀婁氏用事而休璟為男取其養女因以自達拜太子少師時議譏之又曰長慶中以兼太常卿趙宗儒為太子少師太常有師子樂備五方之色非會朝聘享不作焉至是中人掌教坊之樂者移牒取之宗儒不敢違以狀白宰相以為事在有司執守不合關白而宗儒憂恐不已宰相責以懦怯不任事故換此散秩陶氏職官錄曰三少舊視左僕射冠服同三太也太子少傅漢書曰上謂張良曰子房雖疾強起傅太子時叔孫通已為太傅以良行少傅事又曰匡衡字稚圭為太子少傅數上書陳便宜少好學家貧傭力以供資用東觀漢記曰建興二十八年以桓榮為少傅賜以輜車乘馬榮大會諸生陳車馬印綬曰今日所蒙稽古之力也可不勉乎後漢書曰徵王丹為太子少傅時大司徒侯霸欲與交友及丹被徵遣子昱候於道昱迎拜車下丹下荅之昱曰家公欲與君結交何為見拜丹曰君房有是言丹未之許也續漢書王丹字仲回為太子少傅謇諤正直名德重於時魏志曰邢顒字子昂初太子未定而臨淄侯植有寵丁儀等並讚翼其美太祖問顒顒對曰以庶代宗先世之戒也願殿下深重察之太祖識其意後遂以為太子少傅吳志曰薛綜綜子瑩瑩子兼三世並為太子少傅談者美之晉書曰山濤轉太子少傅在東宮年已七十病疾求退手詔不聽尋講武於宣武塲有詔濤乘步輦導, SBCK: ''}
