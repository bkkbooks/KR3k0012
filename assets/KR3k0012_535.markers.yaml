  - {type: variant, offset: 608, length: 1187, content: 外象四海也桓譚新論曰王者作圓池如璧形實水其中以圜壅之故曰辟雍言其上承天地以班教令流轉王道終而復始說苑曰辟雍天子鄉飲之處戴延之西征記曰洛城南有平昌門道東辟雍壇去靈臺三里俱是魏武帝所立高七丈班固東都賦辟雍詩曰乃流辟雍辟雍湯湯聖皇莅止造舟為梁皤皤國老乃父乃兄抑抑皇儀孝友光明於赫太上示我漢行洪化惟神永觀厥成李尤辟雍賦曰卓矣煌煌永元之隆含弘該要周建大中蓄純和之優渥兮化盛溢而茲豐李尤辟雍銘曰惟王所建方中圓外清流四匝蕩滌濁穢傅玄帝幸辟雍鄉飲酒賦曰時皇帝枉萬乘之尊兮以幸辟雍鹵簿齊列群官正容侍衛參差階戟百重乃延鄉七乃命王公是日也定小會之常儀兮饗殊俗而見遠邦連三朝以考學兮覽先賢之異同靈臺毛詩文王靈臺曰靈臺民始附也文王受命而民樂其有靈德以及鳥獸昆蟲焉天子有靈臺所以觀祲象察氣妖祥經始靈臺經之營之庶民攻之不日成之詩汜曆樞曰靈臺候天意也經營靈臺天下附也禮含文嘉曰禮天子靈臺以考觀天人之際陰陽之會也揆星度之驗徵氣朔之瑞應原神明之變化為萬姓獲福於天禮統曰所以制靈臺何以尊天重民備災御害豫防未然也夫王者當承順天地節禦陰陽也夏所以為清臺何明明相承太平相續故為清臺殷為神臺周為靈臺何質者據天而王天者稱神文者據地而王地者稱靈是其異也孝經援神契曰靈臺考符居高顯聖王所以宣德察微五經通義曰王者受命而起所以立靈臺靈臺何以為在於野中國之南附近辟雍依仁宮也靈臺制度奈何師說之積土崇增其高九仞上平無屋高九仞者極陽之數上平無屋望氣顯著續漢書祭祀志曰明帝即位郊祀五帝於明堂卒事遂升靈臺以望雲物崔鴻十六國春秋後趙錄曰建武二年置女大史靈臺仰觀災祥以考中外太史驗察虛實唐書曰乾元元年於永寧坊張守珪宅置司天臺制曰建設邦都必稽玄象分列曹局皆應物宜靈臺二星主觀察雲物天文位在太微西南今興慶宮上帝延也考符之所合置靈臺三輔故事曰漢作靈臺於城東周作靈臺在灃水永東常以四孟之月登臺而觀述征記曰長安宮南有靈臺高十仞上有銅渾天儀又相風銅鳥或云此鳥遇千里風乃動六韜曰文王既出羑里召周公旦築為靈臺新序曰周文作靈臺及池沼掘得死人骨吏以聞於文王文王曰更葬之天下聞之皆曰文王賢矣澤及朽骨而況於人乎班固東都賦靈臺詩曰乃經靈臺靈臺既崇帝勤時登爰考休徵三光宣精五行布序習習祥風祁祁甘雨百穀蓁蓁庶草蕃廡屢惟豐年於皇樂胥潘岳閑居賦曰靈臺傑其高跱闚天文之祕奧究人事之終始學校毛詩國風曰子衿剌學校廢也亂世則學校不脩焉青青子衿悠悠我心青矜青領也學子之所服縱我不往子寧不嗣音尚書大傳曰耰鉏已藏歲事欲畢餘子皆入學十五始入小學見小節踐小義十八始入大學見大節踐大義周禮地官下師氏曰師氏以三德教國子一曰至德以為道本二曰敏德以為行本三曰孝德以知逆惡又教三行一曰孝行以親父母二曰友行以尊賢良三曰順行以事師長鄭玄注曰德行外內之言也在心為德施之為行居虎門之左司王朝凡國之貴遊子弟學焉禮記學記曰君子如欲化民成俗其必由學乎所學聖人之道在方策玉不琢不成器人不學不知道是故古之王者建國君民教學為先, SBCK: 虞庠}
