  - {type: variant, offset: 447, length: 160, content: 五更于辟雍行大射之禮魏志曰明帝幸辟雍于會命群臣賦詩宋書禮志曰晉武帝太始六年帝臨辟雍行鄉飲酒之禮詔曰禮儀之廢久矣乃今復講肆舊典賜太常絹百疋丞博士及學生酒咸寧三年惠帝復行其禮白虎通曰天子立辟雍者何所以行禮樂宣德化也辟者象璧以法天雍者何雍之以水象教化流行五經通義曰諸侯不得觀四方故缺以東南半天子之學故曰頖宮三輔決錄曰辟雍水四周, SBCK: ''}
