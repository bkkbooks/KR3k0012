  - {type: variant, offset: 2681, length: 231, content: 七年立太學堂永建六年制下府繕治并立諸生房舍千餘間陽嘉元年畢刊子碑有太尉龐參司徒劉崎太常孔扶將作大匠胡廣荅記制黃圖曰禮小學在公宮之南太學在城南就陽位也去城七里王莽為宰衡起靈臺作長門宮南去堤三百步起國學於郭內之西南為博士之宮寺門北出王於其中央為射宮門西出殿堂南嚮為牆選士肆射於北中北之外為博士舍三十區周環之此之東為常滿倉之北為會市但列槐樹數百行為隧無牆屋諸生朔望會此市各持其郡所出貨物及經書傳記笙磬樂相與買賣邕邕揖讓或論議槐下其東為太學宮寺門南出置令丞吏詰姦究理辭訟, SBCK: ''}
