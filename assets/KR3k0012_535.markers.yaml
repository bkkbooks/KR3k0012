  - {type: variant, offset: 2913, length: 312, content: 博士領弟子員三百六十六經三十博士弟子萬八百人主事高弟侍講各二十四人學士司舍行無遠近皆隨檐雨不塗足暑不暴首決疑要注曰漢初置博士而無弟子後置弟子五十人又增滿五百漢未至數千人魏之務學者始詣太學為門人二歲通二經者補文學掌故滿三歲通三經者櫂為太子舍人摯虞駮宜立學事曰河內太守魯夔使民二百家共立一學未成而司隸奏以違法尚書郎中騎都尉臣摯虞駮夔為近畿大都朝所委任親臨民物足識事宜累表仍上求二百家立一學是其留心學校必欲有成也崔瑗南陽文學頌曰昔聖人制禮作樂也將以統天理物經國序民立均出度因其可利而利之俾不失性也故觀禮則體敬聽樂則心和然後知反其性而正其身也梁元帝召學生教曰閣下昔楚王好詩沛王傳易猶且傳之不朽以為盛美吾親承天旨聞方欲化行南國被于西楚, SBCK: ''}
