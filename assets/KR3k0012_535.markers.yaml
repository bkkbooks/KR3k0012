  - {type: variant, offset: 2186, length: 0, content: '', SBCK: 太子釋奠採晉故事官有其注祭畢太祖親臨學宴㑹太子以下悉預唐六典曰仲春上丁釋奠于孔宣父以顔回配焉其七十二弟子及先儒並從祀仲秋之月亦如之仲春上戊釋奠于齊太公以留侯張良配焉仲秋之月亦如之凡州縣皆置孔宣父廟以顔回配仲春上丁州縣官行釋奠之禮仲秋上丁亦如之唐書曰開元七年十一月以貢舉人將謁先師質問疑義敕曰皇太子及諸子雖年未志學而道在尊師冝行齒胄禮又曰開元七年皇太子入國學行齒胄禮謁先聖皇太子􅀄献其亞献終献並以胄子常侍禇无量開講孝經及禮記文王太子篇又曰歸崇敬議春秋釋奠文宣王祝板御署北面揖以爲其禮太重按大戴禮師尚父授周武王丹書武王東面而立今置祝板請准武王東面之禮輕重庶得其中晉愽士成洽議曰釋奠奉先師唯皇太子業終乃禮不然則廢晉尚書大事曰尚書符太常曰按洛陽圖宫南自有太學國子辟雍不相預也捨辟雍以太學辟雍便爲無事虚誕漢}
