  - {type: variant, offset: 2441, length: 2, content: 宋時, SBCK: 孝文帝以前司徒尉元爲三老前鴻臚卿游明根爲五更皇帝再拜肅拜五更乞言畢乃賜歩輓一乗詔曰三老可給上公之禄五更可食九卿之俸後周書曰髙祖保定三年乃下詔集太保燕公爲三老又曰武帝以太傅燕國公于謹爲三老賜延年杖太師宇文護設几司㓂豆盧寧正舄又曰孝閔踐祚于謹以年老乞骸骨詔報不許有司冝斷表啓遂詔謹爲三老有司具禮擇日又賜延年杖髙祖幸太學以食之三老入門皇帝迎拜門屏之間三老荅拜有司設三老席於中楹南向太師晉公護升階設几於席三老升席南面憑几而坐以師道自居大司㓂楚公寜升階正舄皇帝升立於斧扆之前西面有可進饌皇帝跪設醬豆親祖割三老食訖皇帝又親跪受爵以酳有司徹訖皇帝北面立訪道三老乃起立於席後皇帝曰猥當天下重任自惟不才不知政治之要公其誨之三老荅曰木受繩則正后從諌則聖自古明王聖主皆虗心納諌以知得失天下乃安惟陛下念之又曰爲國之夲在守忠信是以古人云去食去兵信不可失國家興廢莫不由之願陛下守而勿失又曰治國之道必湏有法法者國之綱紀綱紀不可不正在於賞罰􅀂有功必賞有罪必罰則爲善者日益爲惡者日止􅀂有功不賞有罪不罰則天下善惡不分人無所措手足矣三老言畢皇帝再拜受之三老荅拜焉禮成而出隋書曰後齊仲春令辰陳養老禮先一日三老五更齊於}
