  - {type: variant, offset: 2006, length: 2, content: 續漢, SBCK: 又儒林傳曰三代之道郷里有教夏曰校殷曰庠周曰序所以勸善懲惡也南史曰梁武帝脩建庠序別開五館其一館在􅀽憲宅西憲常招引諸生與之談論新義出人意表同軰咸嗟服焉釋奠立廟附禮記月令仲春曰是月也命樂正習舞爲將釋奠上丁釋奠於國學釋謂置也謂置牲幣之奠於文宣王天子及公卿諸侯大夫親徃視之觀其禮也命有司上戊釋奠於太公廟亦用牲幣之奠又月令仲秋曰是月也命樂正習吹春夏尚舞秋冬尚吹習之爲將釋奠上丁釋奠於國學天子乃率公卿諸侯大夫親徃視之禮儀同仲春是月也命有司上戊釋奠於太公廟禮儀同仲春又文王丗子曰凡始立學必先釋奠于先聖先師及行事必用幣天子親學大昕鼓懲所以警衆也晉}
  - {type: page-break, offset: 2006, content: '', id: KR3k0012_SBCK_535-2a}
  - {type: variant, offset: 2006, length: 2, content: 續漢, WYG: 又儒林傳曰三代之道鄉里有教夏曰校殷曰庠周曰序所以勸善懲惡也南史曰梁武帝修建庠序别立五館其一館在袁憲宅西憲常招引諸生與之談論新義出人意表同輩咸嗟服焉釋奠禮記月令仲春曰是月也樂正習舞為将釋奠上丁釋奠於國學釋謂治也謂治牲幣之奠於文宣王天子及公卿諸侯大夫親往視之觀其禮也命有司上戊釋奠於太公廟亦用牲幣之奠又月令仲秋曰是月也命樂正習吹春夏尚舞秋冬尚吹習之為将釋奠上丁釋奠於國學天子乃率公卿諸侯大夫親往視之禮儀同春是月也命有司上戊釋奠於太公廟禮儀同仲春又文王世子曰凡始立學必先釋奠於先聖先師及行事必用幣天子親學大昕皷懲所以警衆也晉}
