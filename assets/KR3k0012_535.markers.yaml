  - {type: variant, offset: 2433, length: 1, content: 省, SBCK: 􅁣不覺涕流旣逵京輦表求興復聖祀脩建講學至十四年奉􅀍明詔採臣鄙議勑兖州魯郡准舊營飾北齊書曰天保元年詔封崇聖侯邑一百户以奉孔子之祀并下魯郡以時脩治廟宇務盡襃崇之至唐書曰武德中制祠典釋奠於太學以周公爲先聖孔丘配饗房􅀇齡及朱子奢議云公旦尼父俱是聖人庠序置奠夲縁夫子故魯宋至於梁陳爰及隋大業故事皆以孔丘爲先聖顔回爲先師歷代所行古今通允請停祭周公升夫子爲先聖以顔回配饗又曰上元中制曰定禍亂者必先於武德極生靈者諒在於師貞周武創業克寜區夏惟師尚父實佐興王况德有可師義當禁􅁀稽諸古昔爰崇典禮太公望可追封爲武成王有司依文宣王置廟擇古今名將置亞聖及十哲享祭之典一同文宣又曰開元十九年始於兩京置齊太公廟以張良配上元􅀄特加封太公爲武成王以歷代名將從其祀然有其制而未之行祠宇日荒至是宰臣盧􅂎京兆尹盧甚以盧者齊之裔乃鳩其裔孫􅀂盧崔丁吕之族合錢以崇飾之請復舊典兼擇自古名將如孔門十哲皆配饗詔下史官乃定張良穰苴孫武吴起樂毅白起韓信諸葛亮李靖李勣配焉養老禮記祭義曰食三老五更於太學天子祖而割牲執醬而饋執爵而酳所以教諸侯之悌也蔡邕月令章句曰五更當爲五􅅱􅅱長老之稱也其字似更書有轉誤嫂字女傍叟今皆以爲更矣孝經援神契曰天子親臨辟雍尊事三老兄事五更三者道成於三五者訓於五品言其}
