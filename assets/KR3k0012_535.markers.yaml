  - {type: variant, offset: 71, length: 222, content: 天子曰辟雍諸侯曰泮宮尊卑學異名辟明雍和也所以明和天下也泮之言恤政教也禮記禮統曰所以制辟雍何教化天下也辟雍之制奈何王制曰辟雍圓如璧雍以水內如覆外如偃盤也諸侯泮宮半有水半有宮也諸侯所化者少故半有宮焉三王之制奈何夏天子曰重屋諸侯曰廣宗殷天子曰廟諸侯曰世室周天子曰辟雍諸侯曰泮宮鄉曰庠里曰序是其制也禮記外傳曰學者覺也人生也皆稟五常之正性故聖人脩道以教之使其發覺不失其性也小人學道則易使也不從教則凶人也天子諸侯皆有大學小學小學在東少陽之地公宮之左太學在西, SBCK: ''}
