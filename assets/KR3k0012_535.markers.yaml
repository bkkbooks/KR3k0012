  - {type: variant, offset: 2436, length: 2, content: 歎慨, SBCK: 噎之鳥欲老人之不噎也華嶠後漢書曰熈平中天子引􅀽逢爲三老賜玉杖應劭漢書曰天子父事三老兄事五更天子親割三公設几九卿正履魏志髙貴郷公詔曰夫養老興教三代所以􅀣風化垂不朽也必有三老五更以崇至敬乞言納誨着在惇史然後六合承流下觀而化冝妙㨂德行以充其選關内侯王祥履仁秉義雅志淳固􅀜内侯鄭小同温恭孝友師禮不忒其以祥爲三老小同爲五更車駕親率群司躬行古禮焉王隠晉書曰王祥字休徴魏帝髙貴郷公入學命祥爲三老祥}
