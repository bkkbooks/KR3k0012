  - {type: variant, offset: 2662, length: 3, content: 學東二, SBCK: 生黒介幘青衿單衣乗馬從之至皇帝釋劒執班迎於門内三老至門五更去門十步則降車以入皇帝拜三老五更攝齋荅拜皇帝揖進三老在前五更在後升自右階就筵三老坐五更立皇帝升堂北面公卿升自左階北面三公授几杖卿正履國老庶老各就位皇帝拜三老羣臣皆拜不拜五更乃坐皇帝西向肅拜五更進珍羞酒食親祖割執醬以饋執爵以酳以次進五更又設酒醴於國老庶老皇帝升御坐三老乃論五孝六順典訓大綱皇帝虚躬請受禮畢而還又都下及外州人年七十巳上賜鳩杖黄帽太平御覽卷第五}
