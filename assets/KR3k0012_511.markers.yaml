  - {type: punctuation, offset: 134, content: 「, id: KR3k0012_CHANT_511-bkkpn32}
  - {type: variant, offset: 134, length: 2, content: 顏歜, SBCK: 李宻字令伯父早亡母改醮祖母劉撫飬宻奉事以孝謹聞有暇則講學亡疲師事譙周門人方之遊夏太始􅀄徴爲太子洗馬密以祖母老上表云臣無祖母難以至於今日祖母無以終餘年母孫二人更相爲命臣宻今年四十四祖母年九十六是臣盡節於陛下之日長而恭事於劉之日短劉終後復爲太子洗馬又曰王爽字季明強正有志歴侍中嘗與㑹稽王道子飲道子醉呼爽爲小子爽曰亡祖長史與簡文帝爲布衣之交亡姑亡姉伉儷二宫何小子之有又曰符生字長生徤第二子㓜而無頼祖洪甚惡之生而無一目爲童兒洪戯之曰吾聞瞎児一淚信乎生怒引佩刀自刺出血曰此亦一淚洪大驚鞭之生曰性耐刀槊不堪杖箠洪曰吾將以爾爲奴生曰可不如石勒也洪懼跣而掩其口陳留志曰范喬字伯山年二􅀊祖父馨臨終執其手曰恨不見汝成人因以所用硯與之至五􅀊祖母以告喬喬便執硯流涕江蕤别傳曰蕤年十一始樗蒲祖母費爲􅀃徃事有􅀶弈破業廢身於是弃五木終身不以爲戯父母爾雅曰父爲考母爲妣毛詩陟岵曰孝子行􅃥思念父母也陟彼岵􅀆瞻望父􅀆陟彼屺􅀆瞻望母􅀆又蓼莪曰蓼蓼}
