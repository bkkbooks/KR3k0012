  - {type: variant, offset: 1411, length: 1, content: 伍, SBCK: 呉司徒孟宗少從南陽李肅學母爲作厚褥大􅀍或問其故曰小兒無德可容而學者多貧故爲廣􅀍可得氣􅀋相接也列女傳曰鄒氏孟軻之母見孟子少而學歸母方織問之曰子之廢學􅀂吾斷織孟子懼因更勤不息遂爲大儒丗􅀃曰華歆遇子弟甚整雖闇室之内儼然􅀂}
