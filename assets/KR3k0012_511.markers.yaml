  - {type: variant, offset: 144, length: 0, content: '', SBCK: 母妬叔虎之母羙而不使視寢其子皆諌其母母曰深山大澤實生龍蛇彼羙余懼其生龍蛇以禍汝汝􅁦族也余何愛焉使徃視寢生叔虎羙而有勇欒盈嬖之故羊舌氏之族及於難公羊傳曰惠公者何隠之考也仲子者何桓之母也史記曰趙括奢之子趙孝成王欲以括爲將母曰不可使也}
