  - {type: variant, offset: 1513, length: 6, content: 文舉河內軹縣, SBCK: 林宗吊而見之謂曰卿海内之俊四方是則如何當喪以錦􅀍焉孔子曰衣夫錦食夫稻於汝安乎吾不取也因􅁬衣而去自後賔客絶數百日繼母儀禮子夏傳曰繼母如母何以如母繼母之配父與因母同故孝子不敢殊也東觀漢記曰應愼字仲華爲東平相事後母至孝精誠感應梓樹生廳前屋上徙置府庭繁茂長大後漢書曰鮑永字君長上黨}
