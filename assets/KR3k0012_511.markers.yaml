  - {type: variant, offset: 786, length: 2, content: 蔣詡, SBCK: 郄詵濟隂人對䇿髙第拜議郎母憂去職母在日苦病車及亡不欲車載家貧無以市馬乃於住堂北壁外假葬朝夕拜哭飬雞種䔉竭其方術喪過三年得馬八疋輿棺至􅊘􅀒􅁟成墳又曰韓康伯潁川長社人母殷氏髙明有行家􅁪貧伯年數􅀊大寒母爲作布􅃭令伯捉熨斗而謂之曰且着布􅃭㝷復作袴伯曰不湏母問故曰火在斗中柄􅀬今上着􅃭下亦當暖矣又曰羊躭妻辛氏隴西人侍中毗之女有才鑒鍾㑹爲鎭西請其子琇爲叅軍母曰吾爲國憂今日難至吾家行矣戒之軍旅之間可以濟者惟仁恕乎古之君子入則致孝于親出則盡忠於國在職思其所司在義思其所立無貽父母憂患而己後㑹至蜀果反琇竟以道全身又曰桑虞}
  - {type: page-break, offset: 786, content: '', id: KR3k0012_SBCK_511-6b}
  - {type: variant, offset: 786, length: 2, content: 蔣詡, WYG: 郄詵濟隂人對䇿高第拜議郎母憂去職母在日苦病不欲車載家貧無以市馬乃於住堂北壁外假塟朝夕拜哭養雞種麻竭其方術䘮過三年得馬八匹輿棺至塚負土成壙又曰韓康伯潁川長社人母殷氏高明有行家恒貧伯年數嵗大寒母作布襦令伯捉熨斗而謂之曰且著布襦尋復作袴伯曰不須母問故曰火在斗中柄熱今上著襦下亦暖矣又曰羊耽妻辛氏隴西人侍中毗之女有才鑒鍾㑹為鎮西請其子琇為恭軍母曰吾為國家今日難至吾家矣行矣戒之軍旅之間可以濟者惟仁恕乎古之君子入則致孝於親出則盡忠於國在職思其所司在義思其所立無貽父母憂患而已後㑹至蜀果反琇竟以道全身又曰桑虞}
