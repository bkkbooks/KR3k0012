  - {type: variant, offset: 134, length: 2, content: 顏歜, WYG: 李宻字令伯父早亡母改醮祖母劉撫養宻奉事以孝謹聞有暇則講學亡度師事譙周門人方之㳺夏大始初徴為太子洗馬宻以祖母老上表云臣無祖母難以至於今日祖母無臣難以終餘年母孫二人更相為命臣宻今年四十四祖母年九十六是臣盡節於陛下之日長而恭事於劉氏之日短劉終後復為太子洗馬又曰王爽字季明强正有志厯侍中嘗與㑹稽王道子飲道子醉呼為小子爽曰亡祖長史與簡文帝為布衣之交亡姑亡婦伉儷二宫何子之有又曰苻生字長生健第二子幼而無賴祖洪甚惡之生而無禮一目為童兒洪戯之曰吾聞瞎兒一淚信乎生怒引佩刀自刺出血曰此一淚洪大驚鞭之生曰性耐刀槊不堪杖箠洪曰吾以爾為奴生曰可不如石勒也洪懼跣而掩其口陳留志曰范喬字伯山年二嵗祖父馨臨終執其手曰恨不見汝成人因以所用硯與之至五嵗祖母以告喬喬便執硯流涕江㽔别傳曰㽔年十一始樗蒲祖母費為説往事有博奕破業廢身於是棄五木終身不以為戯父母爾雅曰父為考母為妣毛詩陟岵曰孝子行役思念父母也陟彼岵兮瞻望父兮陟彼屺兮瞻望母兮又蓼莪曰蓼蓼}
