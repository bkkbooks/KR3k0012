  - {type: variant, offset: 137, length: 0, content: '', SBCK: 莪匪莪伊蒿哀哀父母生我劬勞蓼蓼者莪匪莪伊蔚哀哀父母生我勞瘁無父何怙無母何恃出則銜恤入則靡至父􅀆生我母􅀆鞠我撫我畜我長我育我顧我復我出入腹我欲報之德昊天罔極禮記曲禮曰生曰父曰母死曰妣曰考左傳隱公曰鄭莊公母弟共叔叚以母之寵請邑居之京叚遂以京叛公伐京叚出奔遂寘母姜氏於城潁而誓之曰不及黄泉無相見也旣而悔之頴考叔曰􅀂闕地及泉隧而相見其誰曰不然公從之遂爲母子如􅀄又莊公曰宋南宫長萬作亂奔陳以乗車輦其母一日而至又成上曰晉敗􅁗師于鞍}
