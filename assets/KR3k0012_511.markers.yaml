  - {type: variant, offset: 780, length: 2, content: 遂終, SBCK: 如何又曰汜毓字稚春濟北盧人奕丗儒素敦睦九族時人号之兒無常父衣無常主又曰荀羡字令則清和有準􅂊年七􅀊遇􅂫峻難隨父在石頭峻甚愛之惜置羡於􅂰上羡乃隂白其母曰得一利刀子足以殺賊母掩其口又曰虞譚母孫氏訓子以節義朝廷嘉之拜武昌太守丞相巳下皆拜之年九十五譚立飬堂}
