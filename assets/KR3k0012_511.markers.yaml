  - {type: variant, offset: 1375, length: 1, content: 兆, SBCK: 琨爲并州刺史母謂之曰汝能弘濟經略駈駕豪傑専欲除於勝巳以自安當何以濟禍必及我也後父母並爲劉聦所害又曰朱序字次倫義陽人鎮襄陽符堅令符丕圍序序母韓氏自登城履行謂西北角必先破受􅁦遂領百餘婢及城中女同丁築三十餘丈後賊果從西北角攻衆潰城破遂固新築丕用引退得免城破襄陽人謂此城爲夫人城宋書曰張興丗字文德竟陵人以平江陵功轉右將軍父仲字子由興丗致位給事中欲徃襄陽又愛戀郷里不肯去嘗謂興丗曰雖田舎翁樂聞鼔角汝可送一部與吾行田時吹之興丗素儉謹畏去白父曰此乃天子鼔角非田舎翁所吹乃止興丗欲拜墓仲子曰汝衛從甚多恐先人驚怖興丗減撤而行又曰朱脩之義陽人加建武將軍留戍滑臺爲索虜所攻母悲憂一旦乳汁驚出因號慟告家人曰我老非有乳汁之時今忽如此我兒必殁矣後數日㐫問至脩之果其日䧟殁梁書曰王僧孺㓜貧其母鬻紗布以自業常携孺於市道途中逢中丞鹵簿駈迫落溝中及孺拜中丞日引孺清道悲不自勝劉璠梁典曰張充}
