  - {type: variant, offset: 1375, length: 1, content: 兆, WYG: 琨為并州刺史母謂之曰汝能𢎞濟經畧驅駕豪傑專欲除勝己以自安當何以濟禍必及我也後父母并為劉聰所害又曰朱序字次倫義陽人鎮㐮陽苻堅令苻丕圗序序母韓氏自登城履行謂西北角必先破受弊遂領百餘婢及城中女同丁築城三十餘丈後賊果從西北角攻衆潰城破遂固新築丕用引退得免城破㐮陽人謂此城為夫人城宋書曰張興世字文徳竟陵人以平江陵功轉右将軍父仲字子由興世致位給事中欲往襄陽又愛戀鄉里不肯去嘗謂興世曰雖田舎翁樂聞鼓角汝可送一部與吾行田時吹之興世素儉謹畏法白父曰此乃天子鼓角非田舎翁所吹乃止興世欲拜墓仲曰汝衛從甚多恐先人驚怖興世减撤而行又曰朱脩之義陽人加建武将軍留戍滑臺為索虜所攻母悲憂一旦乳汁驚出因號慟告家人曰我老非有乳汁之時今忽如此我兒必殁矣後數日㐫問至脩之果其日陷殁梁書曰王僧孺幼貧其母鬻紗布以自業嘗擕孺於市道塗中逢中丞鹵簿驅廹落溝中及孺拜中丞日引騶清道悲不自勝劉璠梁典曰張充}
