  - {type: variant, offset: 802, length: 344, content: 宰衡詡奏事到灞上稱病不進歸杜陵荊棘塞門舍中三徑終身不出時人諺曰楚國二龔不如杜陵蔣翁又曰王真字叔平杜陵人李邵公上郡人真世二千石王莽辟不至嘗為杜陵門下掾終身不窺長安城但閉門讀書未嘗問政不過農田之事邵公王莽時避地河西違武中竇融欲薦之固辭乃止家累百金優遊自樂又曰薛方齊人養德不仕王莽安居迎方因謝曰堯舜在上下有巢許今明王方欲隆唐虞之德亦由小臣欲守箕山之志莽悅其言遂終於家又曰龔勝楚人王莽時遣使徵聘義不事二姓遂不食而死有老父來吊甚哀既而曰嗟乎薰以香自燒膏以明自消龔先生竟夭天年非吾徒也趨而出終莫知其誰也張顯逸民傳曰曹子臧者曹宣公之子也宣公卒負芻殺太子留而自立是為曹成公其後晉執成公將見子臧於周而立之子臧辭曰前志有之聖達節次守節下失節為君非吾節也遂亡命奔宋晉侯請子臧反國而歸成公子臧以國致成公為君見左傳, WYG: 榮}
