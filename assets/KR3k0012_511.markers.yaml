  - {type: variant, offset: 2036, length: 437, content: 名因服成號著書言道家事馬煖常師事之煖後顯於趙鶡冠子懼其薦己也乃與煖絕又曰楚人有獻魚於楚王曰今日漁獲食之不盡賣之不售棄之又可惜是故來獻左右曰鄙哉辭也楚王曰漁者仁人將以誨我也乃恤鰥寡而存孤獨出倉粟發幣帛去後宮楚國大治又曰河上丈人家貧編蕭自給其子沒泉得千金之珠丈人曰取石來鍜之夫千金之珠必在九重之泉驪龍頷下子能得其珠者遇其睡也使龍而寤子其齏粉矣又曰孫叔敖遇孤丘先生曰僕聞人有三利必有三患子知之乎夫爵高者人妒之官大者主惡之祿厚者怨處之叔敖曰不然吾爵高而志益下官大而志益小祿厚而施益溥丈人曰善哉言乎堯舜其猶病諸又見列子又曰客有候孔子者顏淵問曰客何人也孔子曰窅兮泛兮吾不測也夫良玉徑尺雖有十仞之土不能掩其光明珠度寸雖有函丈之石不能戢其曜茍蘊美自厚容止可知矣說苑曰衛有丈夫負缶入井灌韭終一日一區鄧析下車教之為機後重前輕命曰槁終日灌韭百區不倦衛丈夫曰吾師言有機智之心我非不知不欲為也雜記事曰徐稚忽榮祿陳蕃欽其高行以禮招請署為功曹及師友祭酒又特為設東面之坐重席佩巾几以候之稚辭疾不到王僧虔吳地, SBCK: 妻捜神}
