  - {type: variant, offset: 2887, length: 224, content: 圍蕭欣為郡伐之言有大虵從樹腹中墜下大數十圍長三丈小虵數十隨之入南山聲如風雨伐樹之前見夢於欣欣不以厝意及伐之少日果死又曰漢水又東合洛水水有二源合注壑於神虵戍西左右山溪多五色虵性馴良不為物毒又曰交州山多大虵名曰蚺虵長十丈圍七八尺常在樹上伺鹿獸鹿獸過便低頭繞之有頃鹿死先濡令濕訖便合頭角噉之骨皆鑽皮出山夷始見虵不動時便以大竹籤籤虵頭至尾殺而食之以為珍異故楊氏南裔異物志曰蚺唯大虵既洪且長采色駮犖其文錦章食灰吞鹿腴成養創賓享嘉宴是豆是𨢩言其養創之時昉腴甚肥, SBCK: 四}
