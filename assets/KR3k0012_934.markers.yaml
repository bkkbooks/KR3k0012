  - {type: variant, offset: 2202, length: 382, content: 曰巳日山中稱寡人者社中虵也又曰或問隱居山澤治虵蝮之道曰昔員丘多大虵又生好藥黃帝將登焉廣成子教之佩雄黃而虵去也今帶武都雄黃色如鷄冠者五兩以入山林則不畏虵虵若中人以少許雄黃末傳之瘡中登愈又曰虵類雖多唯有虵蝮中人至急一日不治則殺人若不曉方術而為此虵所中者但以刀割瘡肉投地其肉沸如火須臾燋盡而人得活也山海經曰泰華山有虵名曰肥遺六足四翼見則天下大旱又曰巴虵吞象三歲而出骨君子服之已心腹之疾今南方蚺虵吞鹿已爛自絞於樹腹中骨皆穿鱗甲間出此類也又曰大同之山有虵名曰長虵其毛如彘豪其音如鼓柝如鼓人擊柝身音吒又曰鱗山多鳴虵其狀如虵四翼音如磬見則大旱又曰黑齒人為人黑齒有虵一赤一青在其傍又曰雨師為人黑手各操一虵星經曰騰虵二十二星在室北近河主蟲虵說苑曰齊景公獵上山見虎下澤見虵問晏子曰此不祥耶曰有賢不知知而不用用而不任此不祥耶山是虎室澤是虵窟何不祥乎新序曰太子申生至靈臺虵遶左輪御曰速得國, WYG: ''}
