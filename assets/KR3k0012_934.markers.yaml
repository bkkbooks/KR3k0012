  - {type: variant, offset: 12, length: 0, content: '', WYG: 昭靈夫人雷次宗豫章記曰永嘉末有大虵長十餘丈斷道經過者輒以氣吸引取之吞噬已百數行旅斷絶道士吳猛與弟子數人往欲殺虵虵蔵深穴不肯出猛符南昌社公虵乃出穴頭數丈猛扵尾縁背而以足按虵頭著地弟子於後以斧殺之裴淵廣州記曰晉興郡蚺虵嶺去路側五十里忽有一物大百圍長數十丈行者過視則往而不返積年如此失人甚多董奉從交州出由此橋見之大驚云此虵也佳逆旅施符勅經宿往看虵已死矣左右白骨聚積成邱鄧明德南康記曰南野巘山有漢太傅陳蕃塜墓西㟁有廟今曰宫渚昔值軍亂聞墓有寶玉軍人爭掘指麾必啟忽大虵圍繞墓前崩雷晦雨當時竟不得發宋永初山川記曰始興郡有大虵名青葱有大虵名赤頸又曰柴桑縣有飛虵外國圖曰圓邱有不死樹食之多夀有赤泉飲之不老有大虵多為人害不可得居帝逰圓邱以雄黄精厭大虵郭子横洞冥記曰虵璣出塗風國有青靈虵產珠色光白又曰地三年種蜀黍其後七年有虵廣志曰永昌郡有岐尾虵又曰蝮虵與土色相亂長三四}
