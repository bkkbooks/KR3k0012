  - {type: variant, offset: 4, length: 0, content: '', WYG: 千里官以東為名後五年為大将軍南征此吉祥也蜀王本紀曰秦王知蜀王好色乃獻美女五人蜀王遣五丁迎女還梓橦見一大蛇入山穴中一丁引其尾不能出五丁共引}
