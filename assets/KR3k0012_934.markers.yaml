  - {type: variant, offset: 1080, length: 306, content: 忽然不見時咸異之既而壽終於四十二六七之言於是驗矣又曰李密據偃師王世充領兵討之夜有班虵長丈餘向寢屋作聲如牛吼執伏者斬之明日戰大潰疋馬歸國唐書曰太宗屯桓壁常欲覘敵潛軍遠抄騎皆四散太宗與一甲士登丘而睡俄然賊兵四面雲合不之覺也會有虵逐鼠觸甲士驚起因見賊至遽白太宗而俱上馬馳百餘步為賊所及發大羽箭射之殪其驍將賊騎乃退當時以為神異焉又曰建中三年趙州寧晉縣仁孝里沙北有棠樹甚茂百姓禱之為神忽有群虵數千自東南來趨北岸集棠樹下為二積留居南岸者為一積俄有三龜徑寸繞行積傍積虵盡死而後各登其積野人以告虵腹皆有瘡若矢所中又曰元和中五坊小使每群藂於賣酒食家肆情飲啖將去留虵一篋誡之曰吾以此虵致供奉鳥雀可善飼之無使飢渴主人賂而謝之方肯攜虵篋, SBCK: 良乆}
