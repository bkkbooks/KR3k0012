  - {type: variant, offset: 544, length: 0, content: '', WYG: 看所入之處了不見有一孔日暮還家楷病口瘂不復得語又曰東光人東方飛龍病甚夢化為大黑虵以吿其妻既死遂有大黑虵入室上棟間飛龍諸子将殺之其母曰此是爾父諸子不用母言遂殺之即日暴雨諸子皆震死柩前唐景龍文館記曰興慶池者長安城東隅形勢之地也}
  - {type: page-break, offset: 544, content: '', id: KR3k0012_WYG_934-8a, image: WYG0901/WYG0901-0304a.png}
  - {type: variant, offset: 545, length: 0, content: '', WYG: 多王侯第宅天后初有居人王純掘地獲黄金百斤致富官司聞之宻加搜獲純懼投於井中縣官窺之見雙赤虵仰首張吻遂不敢入純以此金當為已得復入取之還見赤虵赫然蟠屈純懼}
