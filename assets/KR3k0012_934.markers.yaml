  - {type: variant, offset: 190, length: 0, content: '', WYG: 瞻居曲阿彭王野忽有物如虵􅊳入其腦中虵来先聞臰臰氣便於鼻中入盤其頭中覺哄哄僅聞其腦間食聲咂咂數日而出去尋復来取手巾縳口鼻亦被入積年無他病唯患頭重異苑曰太原中汝南人伐竹見一竹中央虵形已成上枝葉如故吳郡桐廬民常伐餘遺竹見一竹竿成雉頭頸盡就身猶未成此亦竹為虵為雉也又曰薪野蘇卷常與奴婢居野舍毎至飯時輒有一物来其状似虵長七八尺五色光鱗卷異而飴之遂經數載產業加焉奴後宻打殺即得能食病日進三斛飯猶不為飽少時而死又曰丹陽鍾忠以元嘉冬月晨行有一虵長二尺許}
