  - {type: variant, offset: 378, length: 0, content: '', SBCK: 墓有三寶軍人爭掘指麾必啓忽大虵圍繞墳前崩雷晦􅀨當時竟不得發宋永􅀄山川記曰興古郡有大蛇名青葱有大蛇名赤頸又曰柴􅄑縣有飛蛇外國圖曰圎丘有不死樹食之乃壽有赤泉飲之不老有大蛇多爲人害不可得居帝遊圎丘以雌黃精厭大虵郭子橫洞􅁳記曰虵璣出塗云國有青靈虵産珠色光白如瓊琰之􅀋愽物志曰蝮虵秋月毒盛無所齧草木以泄其氣草木即死樵採設爲此草木所傷刺}
  - {type: variant, offset: 378, length: 0, content: '', krp: 墓有三寶軍人爭掘指麾必啓忽大虵圍繞墳前崩雷晦雨當時竟不得發宋永𥘉山川記曰興古郡有大蛇名青葱有大蛇名赤頸又曰柴幸縣有飛蛇外國圖曰圎丘有不死樹食之乃壽有赤泉飲之不老有大蛇多爲人害不可得居帝遊圎丘以雌黃精厭大虵郭子橫洞冥記曰虵璣出塗云國有青靈虵産珠色光白如瓊琰之類愽物志曰蝮虵秋月毒盛無所齧草木以泄其氣草木即死樵採設爲此草木所傷刺}
  - {type: variant, offset: 379, length: 0, content: '', SBCK: 亦殺人又曰地三年種蜀􅁰其後七年多虵廣志曰永昌郡有歧尾虵又蝮虵與土色相亂長三四尺其中人以牙歷之裁斷皮出血則身盡痛九竅血出而死列}
  - {type: page-break, offset: 379, content: '', id: KR3k0012_SBCK_934-2b}
  - {type: variant, offset: 379, length: 0, content: '', krp: 亦殺人又曰地三年種蜀黍其後七年多虵廣志曰永昌郡有歧尾虵又蝮虵與土色相亂長三四尺其中人以牙歷之裁斷皮出血則身盡痛九竅血出而死列}
  - {type: variant, offset: 380, length: 0, content: '', SBCK: 傳曰壽光侯者漢章帝時人劾百􅀑衆魅有婦爲魅所病侯劾得大虵又有大樹人止之者死鳥過亦死侯劾樹夏枯有虵長七八丈懸而死捜神記曰魯定公元年有九虵繞柱占以爲九世廟不祀乃立煬宫又曰隋侯行見大虵傷救而治之其後虵銜珠以報}
