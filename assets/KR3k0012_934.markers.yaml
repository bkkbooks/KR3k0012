  - {type: variant, offset: 774, length: 305, content: 駕夾膝前金龍頭上見人走逐之不及梁書曰倭國有獸如牛名山鼠又有大虵吞此獸虵皮堅不可斫其上有孔乍開乍閉時或有光射中之虵則死矣陳書曰後主末年昏淫政亂秘書監傅縡上書諫諍後主逼令自盡死後有惡虵上屋來靈床當前受祭酹而去復來百有餘日時有彈指聲俄而陳滅後魏書曰東魏孝靜帝武定中有大虵見武牢城上時北豫州刺史高仲蜜以孝牢叛死者數千人後武消難之任武牢虵又見消難亦叛土人謂之雌龍隋書曰煬帝大業末年翟讓初見李密衣在格上密腰帶化為赤虵讓心異之竟為密所殺又曰薛濬初為童兒時與宗中諸兒遊戲于澗濱見一黃虵有角及足召群兒共視了無見者濬以為不祥歸而憂悴母逼而問之濬以賓對時有胡僧詣宅乞食濬母怖而告之僧曰此乃兒之吉應且是兒也早有名位然壽不過六七耳言終而, SBCK: 打柩目血淚俱}
