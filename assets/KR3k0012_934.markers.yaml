  - {type: variant, offset: 373, length: 1, content: 垂, SBCK: 入山穴中一丁引其尾不能出五丁共引虵山崩壓五丁玄中記曰東海有虵丘之地衆虵居之無人民多神虵或人}
  - {type: variant, offset: 373, length: 2, content: 垂頭, WYG: 隱在床脚酒臭重便斬虵寸斷擲於後溝經數日}
  - {type: variant, offset: 373, length: 1, content: 垂, krp: 入山穴中一丁引其尾不能出五丁共引虵山崩壓五丁玄中記曰東海有虵丘之地衆虵居之無人民多神虵或人}
  - {type: variant, offset: 376, length: 1, content: 吐, SBCK: 虵身又曰崑崙西北有山周廻三萬里巨虵長萬里虵常居此山飲食滄海陳留風俗傳曰小黃縣者宋地故陽武東黃郷也因黃水以名縣沛公起兵野戰䘮皇妣于黃郷天下平定乃使者以梓宮招魂幽野於是丹虵在水自洗濯入于梓宫其浴有遺髮故謚曰昭靈夫人雷次宗豫章記曰永嘉末有大虵長十餘丈斷道經過者輙以氣吸引取之吞噬巳百數行旅斷道道士呉猛與弟子數人徃欲殺虵虵藏深穴不肯出猛符南昌社公虵乃出穴頭髙數丈猛於尾縁背而以足按虵頭着地弟子於後以斧殺之裴淵廣州記曰晉興郡蚺虵嶺去路側五六里忽有一物大百圍長數十丈行者過視則徃而不返積年如此失人甚多董奉從交州出由此嶠見之大驚云此虵也住行旅施符勑經􅀫徃看虵巳死矣左右白骨積聚成丘鄧德明南康記曰南野巘山有漢太傅陳蕃塜墓西岸有廟名曰宫渚昔值軍亂}
  - {type: page-break, offset: 376, content: '', id: KR3k0012_SBCK_934-1b}
  - {type: page-break, offset: 376, content: '', id: KR3k0012_SBCK_934-2a}
  - {type: variant, offset: 376, length: 4, content: 吐聞者異, WYG: 婦死又數日而重卒死經三日復生說始死時有人拮将重到一官府見官寮問何以殺人重曰寔不曾行㓙曰寸㫁擲在後溝此是何物重曰此是虵非人府君愕然而悟曰我常用為神而敢淫人}
