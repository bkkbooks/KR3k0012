  - {type: punctuation, offset: 549, content: 「, id: KR3k0012_CHANT_934-bkkpn193}
  - {type: variant, offset: 549, length: 1493, content: 沮渠蒙遜攻浩舋而虵盤於帳前蒙遜笑曰前為一騰虵今盤在吾帳天意欲吾回師先定酒泉燒攻具而還沈約宋書曰劉秀之少孤貧有志操十許歲時與諸兒戲於前渚忽有大虵來勢甚猛莫不顛沛驚呼秀之獨不動眾並異焉南史曰梁主衣庫見黑虵長丈許數十小虵隨之舉頭高丈餘南望俄失所在帝又與宮人幸玄州苑復見大虵盤屈於道群小虵遶之並黑色帝惡之宮人曰此非怪也恐是錢龍帝勑所司即日取數十萬錢鎮於虵處以厭之因設法會赦囚徒賑窮乏退居栖心省又有虵從屋墜落帝帽上忽然便失又龍光殿上所御肩輿復見小虵縈屈輿中以頭駕夾膝前金龍頭上見人走逐之不及梁書曰倭國有獸如牛名山鼠又有大虵吞此獸虵皮堅不可斫其上有孔乍開乍閉時或有光射中之虵則死矣陳書曰後主末年昏淫政亂秘書監傅縡上書諫諍後主逼令自盡死後有惡虵上屋來靈床當前受祭酹而去復來百有餘日時有彈指聲俄而陳滅後魏書曰東魏孝靜帝武定中有大虵見武牢城上時北豫州刺史高仲蜜以孝牢叛死者數千人後武消難之任武牢虵又見消難亦叛土人謂之雌龍隋書曰煬帝大業末年翟讓初見李密衣在格上密腰帶化為赤虵讓心異之竟為密所殺又曰薛濬初為童兒時與宗中諸兒遊戲于澗濱見一黃虵有角及足召群兒共視了無見者濬以為不祥歸而憂悴母逼而問之濬以賓對時有胡僧詣宅乞食濬母怖而告之僧曰此乃兒之吉應且是兒也早有名位然壽不過六七耳言終而出忽然不見時咸異之既而壽終於四十二六七之言於是驗矣又曰李密據偃師王世充領兵討之夜有班虵長丈餘向寢屋作聲如牛吼執伏者斬之明日戰大潰疋馬歸國唐書曰太宗屯桓壁常欲覘敵潛軍遠抄騎皆四散太宗與一甲士登丘而睡俄然賊兵四面雲合不之覺也會有虵逐鼠觸甲士驚起因見賊至遽白太宗而俱上馬馳百餘步為賊所及發大羽箭射之殪其驍將賊騎乃退當時以為神異焉又曰建中三年趙州寧晉縣仁孝里沙北有棠樹甚茂百姓禱之為神忽有群虵數千自東南來趨北岸集棠樹下為二積留居南岸者為一積俄有三龜徑寸繞行積傍積虵盡死而後各登其積野人以告虵腹皆有瘡若矢所中又曰元和中五坊小使每群藂於賣酒食家肆情飲啖將去留虵一篋誡之曰吾以此虵致供奉鳥雀可善飼之無使飢渴主人賂而謝之方肯攜虵篋而去又曰李朝晟為邠州刺史城方渠無水師徒囂然遽有青虵乘高而下視其跡水隨而流朝晟令築防環之遂為停泉軍人仰飲以足圖其事上聞詔致祠焉又曰罽賓國有鼠喙尖而尾赤能食虵有被虵螫者鼠輒嗅而尿之其瘡立愈後唐史曰清泰三年春有虵鼠鬭于師子門外而鼠殺虵晉史曰高祖即位之前一年歲在乙未鄴西李固橋下鼠與虵鬭鬭及日之中虵不勝而死行人觀者志之後唐果滅於申周史曰太祖常寢柴后見五色小虵入顴鼻間心異之知其必貴敬奉愈厚戰國策曰昭陽為楚伐魏覆軍殺將移師攻齊陳軫為齊王使見昭陽曰楚有祠者賜其舍人酒一巵巵酒器也受四升巵章移切舍人相謂曰數人飲之不足一人飲之有餘請各畫地為虵虵先成者飲酒一人先成引酒且飲之乃左手持巵右手畫虵曰吾能為之足為足未成一人虵後成奪其巵曰虵故無足子安能為之足遂飲其酒為虵足者終亡其酒今公攻魏破軍殺將又將移師攻齊齊畏公甚戰勝不知止猶為虵足昭陽解軍而歸孫子兵法曰善用兵者譬如率然率然常山之虵也擊其首則尾至擊其尾則首至擊其中身則首尾俱至慎子曰騰虵游霧飛龍乘雲雲罷霧散與蚯蚓同韓子曰昔黃帝合鬼神於西太山作為青角虎狼在前蟲虵伏後又曰蟺似虵而蠶似蠋音屬人見虵則驚駭見蠋則毛起漁者持蟺婦人拾蠶利之所在皆為賁諸又曰鴟夷子皮事田成子成子去齊亡之燕鴟夷子皮負傳而從至望邑曰子獨不聞涸澤之虵乎澤涸將徙有小虵謂大虵曰大虵行而小虵隨之人以為虵之行者耳必有殺子子不如相衘負我以行人必以我為神也乃相負越公道而行人皆避之今子美而我惡以子為我上客一乘之君也以子為我使者萬乘之卿也不如為我舍人田成子負傳而隨之至逆旅君待之甚敬因獻酒肉淮南子曰越人得蚺虵以為上肴中國得而棄之無用, WYG: ''}
