  - {type: variant, offset: 2680, length: 170, content: 今我有失行而天戒以妖我若攻之是逆天令也乃歸齋宿而請於廟退而脩政居三日夢天誅虵曰爾何敢當聖君之路文公覺令人視之虵已魚爛矣新序同又曰孫叔敖之為兒出遊還憂而不食其母問其故泣而對曰今旦見兩頭之虵恐死母問曰今虵安在曰聞見兩頭虵者死恐他人復見之已殺而埋之母曰無憂汝不死矣吾聞之有陰德者天報以福新序同列仙傳曰玄俗者自言河間人餌巴豆雲母賣藥於都市七丸一錢治, SBCK: 太平御覽卷第九}
