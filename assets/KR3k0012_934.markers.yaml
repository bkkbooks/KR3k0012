  - {type: variant, offset: 3, length: 0, content: '', SBCK: 六虵下虺虵下風俗通曰車􅀐將軍巴郡馮緄字鴻卿爲議郎發綬笥有二赤虵可長三尺分南北走大用憂怖許李山孫憲得先人秘要緄請使卜云君後三歳當爲邊將東地四}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 六虵虺虵下風俗通曰車騎将軍巴郡馮鯤字鴻卿為議郎發綬笥有二赤蛇可長三尺分南北走大用憂怖許季山孫憲得仙人祕要鯤請使卜云君後三歳當為邉将控地四}
