  - {type: variant, offset: 1646, length: 2, content: 蘇秦, SBCK: 鍾繇嬖庻子㑹之母黜嫡夫人文帝命復焉繇恚忿飡椒致噤帝乃止齊書曰建武中王敬則於㑹稽反奉子恪爲名而子恪奔走未知所}
  - {type: variant, offset: 1646, length: 1, content: 蘇, WYG: 鍾繇嬖庶子㑹之母出嫡夫人文帝命復焉繇恚忽飡椒致噤帝乃止齊書曰建武中王敬則於㑹嵇反奉子恪為名而子恪奔走未知所在始安王遥光勸上併誅高武諸子孫於是並勅竟陵王昭胄等六十餘人入永福省令太醫煮椒二斛并命辦數十具棺材謂舍人沈徽孚曰椒熟則一時賜死期三更當殺之㑹上暫卧主書單携啟依㫖斃之徽孚堅執曰事湏更審爾及三更子恪徒跣奔至建陽門上驚覺曰故當未賜諸侯命耶徽孚以答上撫床曰遥光幾悞人事及見子恪顧問流涕諸侯悉賜供饌世説曰石崇以椒為泥泥屋王愷以赤石脂泥壁崔寔四民月令曰正月之旦進酒降神畢室家無大小次坐先祖之前子孫各上椒酒於家長稱觴舉白范子計然曰蜀椒出武都赤色者善}
  - {type: page-break, offset: 1646, content: '', id: KR3k0012_WYG_958-10a, image: WYG0901/WYG0901-0461c.png}
  - {type: variant, offset: 1646, length: 1, content: 蘇, krp: 鍾繇嬖庻子㑹之母黜嫡夫人文帝命復焉繇恚忿飡椒致噤帝乃止齊書曰建武中王敬則於㑹稽反奉子恪爲名而子恪奔走未知所在始安王遥光勸上併誅髙武諸子孫於是並敕竟陵王昭胃等六十餘人入永福省令太醫煑椒二斛并命辦數十具棺材謂舎人沈徽孚曰椒熟則一時賜死期三更當殺之㑹上暫卧主書單携啓依旨斃之徽孚堅執曰事湏更審爾夕三更子恪徒跣奔至建陽門上聞驚覺曰故當未賜諸侯命耶徽孚以荅上撫床曰遥光㡬誤人事及見子恪顧問流涕諸侯悉賜供饌丗說曰石崇以椒爲泥泥屋三君夫以赤石脂泥壁崔寔四民月令曰正月之旦進酒降神畢室家無大小次坐先祖之前子孫各上椒酒於家長稱觴舉白范子計然曰蜀椒出武都赤色者善}
