  - {type: variant, offset: 1917, length: 162, content: 長生不死淮南子曰月中有桂樹郭子橫洞冥記曰武帝使董謁乘琅霞之輦以昇壇至三更西王母駕玄鸞之輿至壇之四面列種軟條青桂風至枝自拂階上遊塵尋陽記曰廬山上有三石梁長數十丈廣不盈尺杳然無底吳猛將弟子登山過此梁見一翁坐桂樹下以玉杯承甘露漿與猛廣志曰桂出合浦而生必以高山之顛冬夏常青類自為林間無雜樹交阯置桂園列仙傳曰范蠡好食桂賣藥世人往往見之, WYG: ''}
