  - {type: variant, offset: 1179, length: 148, content: 堪為箭孔氏志怪曰會稽盛逸嘗晨興路未有行人見門內柳樹上有一人長二尺餘朱衣冠冕俯以舌舐樹葉上露良久忽見逸神意如有驚遽即隱不見世說曰顧悅之與晉簡文帝同年悅之早白帝問卿何以先老對曰蒲柳之姿望秋而落松柏之質隆冬轉茂廣五行記曰周宣帝大定二年永州得白石剖而為兩段中有楊樹之形黃根紫葉廣志曰白楊一名高飛木葉大於柳, SBCK: 放快}
