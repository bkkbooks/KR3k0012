  - {type: variant, offset: 1605, length: 3, content: 臨乎西, SBCK: 其木多椒景山多􅁗椒毛詩椒聊曰椒聊刺晉昭公也君子見沃之盛彊能脩其政知其蕃衍盛大子孫將有晉國焉椒聊之實蕃衍盈􅂛役巳之子碩大無朋椒聊椒也陸機毛詩䟽義曰椒聊聊語助也椒樹似茱茰有針刺葉堅而滑澤蜀人作茶吴人作茗皆煑其葉以爲香今成臯諸近山間謂竹葉椒樹亦如蜀椒小毒熱不中合藥也可着飲食中用蒸雞豚佳香東}
