  - {type: variant, offset: 1948, length: 310, content: 昇壇至三更西王母駕玄鸞之輿至壇之四面列種軟條青桂風至枝自拂階上遊塵尋陽記曰廬山上有三石梁長數十丈廣不盈尺杳然無底吳猛將弟子登山過此梁見一翁坐桂樹下以玉杯承甘露漿與猛廣志曰桂出合浦而生必以高山之顛冬夏常青類自為林間無雜樹交阯置桂園列仙傳曰范蠡好食桂賣藥世人往往見之神仙傳曰離婁公服竹汁餌桂得仙許由巢父箕山得石丹沙石桂英服之闞子曰魯人有好釣者以桂為餌黃金為鉤拾遺記曰岱輿一名浮折北有玉梁千丈駕玄流之上岸旁有丹桂黑紫白可為舟世說曰客問陳季方曰君家有何功德而荷天下重名曰吾家君譬如桂樹生泰山之阿上有萬仞之高下有不測之深上為甘露所霑下為川泉所潤當斯之時樹焉知太山之高川泉之深不知有功德歟金樓子曰夫翠飾羽而體分象美牙而身喪懷珠而致剖, SBCK: 木}
