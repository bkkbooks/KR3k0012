  - {type: variant, offset: 1521, length: 0, content: '', SBCK: 周書曰太姒夢太子發取周庭之梓樹於啇闕間化爲松􅂎史記曰子胥將死告舎人曰必樹吾墓上以梓梓可爲器而抉吾眼於吴之東門上以觀越兵入吴也漢書曰元帝􅀄元四年皇后曽祖父濟南平陵王伯墓門梓柱卒生枝葉上出劉向以爲王氏代漢之象後漢書曰應順爲兾州刺史廉直無私遷東平相賞罰必信吏不敢犯有梓樹生於聽事室上事後母至孝衆以爲孝感之應􅀃苑曰伯禽與康叔封朝于成王見周公三見而三笞康叔有駭色謂伯禽曰有啇子者賢人也與子見之康叔封與伯禽見啇子曰吾二子者朝乎成王見周公三見而三笞其􅀃何也啇子曰二子盍相與觀乎南山之陽有木焉名曰橋二子者徃觀乎南山之陽見橋竦焉實而仰反以告乎啇子啇子曰橋者父道也啇子曰二子盍相與觀乎南山之隂有木焉名曰梓二子者徃觀乎南山之隂見梓勃焉實而俯反以告啇子曰梓者子道也二子者明日見乎周公入門而趍登堂而跪周公拂其首勞而食之曰安見君子二子對曰見啇子周公曰君子哉啇子也樂資春秋後傳曰使者鄭客入凾谷至平舒見素車白馬曰吾華山君願以一牘致滈池君子之咸陽過滈池見一大梓樹有文石取以扣樹當有應者以書與之鄭客如其言見宫闕如王者居謁者出受書入有頃云今年祖龍死山海經曰玉山碧山多梓木雞山羙梓孟子曰拱把之桐梓人欲生之皆知所以養之者至於身不知所以養之者豈愛身不􅀂桐梓哉漢武故事曰衛子夫入宫上曰吾昨夜夢子夫庭中生梓樹數株豈非天乎是日幸之有娠郭氏􅀇中記曰􅁗文公造長安宫面四百里南至終南山山有梓樹大數百圍䕃宫中公惡而伐之連日不剋輙大風􅀨夜有􅀑問梓樹樹曰豈奈吾何􅀑曰􅀂使三百人披頭以絲繞樹豈不敗汝樹黙然不應明日人上言􅁗王依此言伐之中有青牛逐之入澧水豫章記曰松陽門内有大梓樹大四十五圍樹先枯永嘉中一旦忽更榮華太興中元帝果継大業楸爾雅曰槄音滔山榎今之山楸楸小葉曰榎音賈大而皵音􅍎楸老乃皮麄散者爲楸也小而皵榎小而皮麄皵者爲榎漢書曰淮北滎南河濟之間千樹楸與千户侯等任昉述異記曰吴中有陸家白蓮種顧家班竹趙有韓氏酸􅀥中山有楸尸掌楸木者楸可爲什器漢書貨殖志有千樹楸樅七容反爾雅曰樅松葉松身郭璞注云今太廟梁用此木尸子所謂松栢之䑕不知堂室之有羙樅魯連子曰松樅髙千仞而無枝非憂王室無柱椒}
