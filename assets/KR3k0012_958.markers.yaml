  - {type: variant, offset: 2259, length: 402, content: 含香而遭焚膏以明而遂煎桂以蠹而成疾羅浮山記曰羅山頂有桂山海經所謂賁隅之桂賁隅番隅也臨海記曰白石之山望之如雪山有湖傳云金鵝之所集八桂之所植說文曰桂江南之木百藥之長地理記曰桂陽郡有桂嶺放花遍白林嶺盡香又曰天台山有八桂嶺襟漢武帝悼李夫人賦曰氣沉潛以悽戾兮桂枝落而銷亡漢淮南王安好道感八公共登山攀桂樹安作詩曰攀桂樹兮聊淹留唐景龍文館記曰薰風殿其材木皆用青桂白檀香氣氛氳盈於四遠杉爾雅曰披音彼煔煔或作杉似松生江南可以為舡及棺材作桂理之不腐也晉咸康起居注曰侍御史秦武奏平陵前道東杉樹一株萎死以柏栽補之請收陵令推劾西京雜記曰太液池中有小池名孤樹池池中有一洲洲上有煔樹一株十餘圍望之如車蓋故取名之鄧德明南康記曰巘山有漢太傳陳蕃墓遙望兩杉樹聳柯出嶺垂陰覆谷劉欣期交州記曰合浦東二百里有一杉樹葉落隨風入洛陽城內漢時善相者云此休徵當出王者故遣千人伐樹役夫多死三百人坐斷株上食過足相容名山志曰華子崗上杉千仞被在崖側楓爾雅曰楓攝攝, SBCK: ''}
