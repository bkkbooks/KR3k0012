  - {type: variant, offset: 107, length: 3, content: 夏侯亶, SBCK: 鄭弘爲太尉舉第五倫爲司空班次在下每正朔朝見弘曲躬自卑上問知其故遂聽置雲母屏風分隔其間由此爲故事呉志曰景帝時紀亮爲尚書令子騭爲中書令毎朝㑹詔以御屏風隔其座焉或曰隔以雲母屏風又曰曹不興善􅀞孫權使􅀞屏風誤筆落􅀧素因就以作蠅權以爲生蝇舉手彈之魏書曰太祖雅}
  - {type: page-break, offset: 107, content: '', id: KR3k0012_SBCK_701-2b}
  - {type: variant, offset: 107, length: 3, content: 夏侯亶, WYG: 鄭𢎞為太尉舉第五倫為司空班次在下每正朔朝見𢎞曲躬自卑上問知其故遂聽置雲母屏風分隔其間由此為故事吴志曰景帝時紀亮為尚書令子隲為中書令每朝㑹詔以御屏風隔其坐焉又曰曹不興善畫孫權使畫屏風誤筆落㸃素因就以作蠅權以為生蠅舉手彈之魏書曰太祖雅}
