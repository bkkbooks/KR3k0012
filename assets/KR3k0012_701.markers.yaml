  - {type: variant, offset: 1168, length: 149, content: 眾連袵成帷又曰高祖曰運籌帷幄之中決勝千里之外子房功也又曰文帝幃帳不得文繡又曰董仲舒為博士下帷講誦弟子以次相授或莫見其面三年不窺舍園漢書曰秦起咸陽而至西雍離宮三百帷帳不移而具又曰成都侯王商弟內大池以行舡立羽蓋張周帷又曰東方朔上䟽云文帝集上書囊為殿帷後漢書曰更始委於趙萌日夜與婦人飲宴後庭群臣欲言事輒醉, SBCK: 前議客}
