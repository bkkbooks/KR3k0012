  - {type: variant, offset: 1916, length: 16, content: 裹梁下幃一紺絹青布䆫戶幃各一夢書, WYG: 褁步障三十漆竿銅鈎拾遺記}
  - {type: page-break, offset: 1916, content: '', id: KR3k0012_WYG_701-10b, image: WYG0899/WYG0899-0269b.png}
  - {type: variant, offset: 1917, length: 144, content: 梁下幃一紺絹青布䆫戶幃各一夢書曰夢見帷帳憂陰事離騷曰紐薛荔而為帷楚詞曰翡翠幬飾高堂張衡南都賦曰暮春之禊元巳之辰朱帷連綱曜野映雲左太冲吳都賦曰藹藹翠帷嫋嫋素女潘岳寡婦賦曰入空室兮望靈座帷飄飄兮燈熒熒庚闡楊都賦曰皇帝迺坐路寢御組帷阮藉詩曰薄帷鑒明月清風吹我𥘞幄爾雅曰以覆帷謂之幄說文曰幄木帳也, SBCK: 歩障}
