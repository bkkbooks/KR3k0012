  - {type: variant, offset: 788, length: 308, content: 自障圍也禮記曲禮曰帷簿之外不趨又曰弊帷不棄為埋馬也又曰路馬死埋之以帷周禮春官下曰掌舍掌王之會同之舍帷宮設旌門謂王行晝止有所展肆若食息張帳為官樹旌表門左傳曰齊歸公孫敖之喪為孟氏且國故也為惠叔毀請且國之之族故聽其歸殯而書之葬視共仲制如慶父皆以罪降聲已不視帷堂而哭聲已蕙叔母怨敖從莒女故帷堂又曰公孫歸父以襄仲之立也有寵欲去三桓以張公室與公謀而聘于晉欲以晉人去之冬公薨季子言於朝曰使我殺適立庶以失大援者仲也夫遂逐東門氏襄仲居東門子家還及笙子家歸父壇帷復命於介除地為壇而張帷介副也使副反命於君又曰閭丘嬰以帷縛音篆其妻而載之與申鮮虞乘而出仁子莊公倍臣也鮮虞推而下之下嬰妻也曰君昏不能匡危不能救死不能死而知匿其眤匿藏也眤親也其誰納, SBCK: 敵}
