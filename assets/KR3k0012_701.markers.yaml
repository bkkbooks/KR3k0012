  - {type: variant, offset: 541, length: 0, content: '', SBCK: 録曰董偃嘗卧延清之室設紫瑠璃屏風列麻油燈於戸外視屏風若無屏風矣侍人唯見燈明以言無礙乃於屏風外扇偃曰玉石豈湏扇而後清涼也侍者乃屏風扇以手摸之方知有屏風之礙矣又曰孫亮作瑠璃屏風甚薄而徹毎於月下淸夜舒之常愛寵四􅁎使坐屏風中外望之乃如無隔唯香氣不通於外劉向七畧別傳曰臣與黄門侍郎歆以列女傳種􅀋相從爲七篇以著禍福榮辱之効是非得失之分􅀞之於屏風四堵桓任別傳曰任子亡􅉖念之爲作象著屏風置座邊古今注曰孫亮作瑠璃屏風鏤作瑞應圖一百二十種鄴中}
