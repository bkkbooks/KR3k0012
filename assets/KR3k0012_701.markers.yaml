  - {type: variant, offset: 86, length: 2, content: 筮卜, krp: 定陵侯張放淳于長等始愛幸出爲微行行則同輿執轡入則侍中設宴飲之㑹及趙李諸侍中皆引滿舉白時乗輿幄坐帳畫屏風師古曰坐音才卧反畫紂醉踞姐巳作長夜之樂上以伯新起數目禮之因顧指畫而問伯紂爲無道至於是虖伯對曰書云迺用婦女之言何有踞肆於朝所謂衆惡歸之不如是之甚者也上曰苟不居此此圖何戒伯曰沉湎于酒微子所以告去也式號式謼大雅所以留連也師古曰大雅蕩之詩云式號式謼俾晝作夜醉號謼以晝爲夜流連作詩之歡而泣涕流連也而諸書乃以留連荒亡盖失之矣大雅以流連不謂飲酒之人也謼音大故反詩書淫亂之戒其厚皆在於酒上迺喟然歎曰吾乆不見班生今日復聞讜言放等不懌又曰}
  - {type: variant, offset: 89, length: 9, content: 都市日得百錢則閉肆, SBCK: 帝省减椒房掖庭用度許皇后上疏曰設妾欲作某屏風張於某所必䋲妾以詔書矣又曰王莽常翳雲母屏風東􅀚漢記曰宋弘嘗燕見御座新施屏風圖􅀞列女帝數顧視之弘正容言曰未見好德如好色者上即爲撤之上姉湖陽公主新寡上與共論朝臣微觀其意主曰宋公威容德器群臣莫及上曰方圖之後弘見上令主坐屏風後因謂弘曰諺言貴易交冨易妻人情乎弘曰臣聞貧賤之交不可忘糟糠之妻不}
