  - {type: variant, offset: 113, length: 0, content: '', SBCK: 帷帳屏風壞則􅀘納魏志曰太祖平栁城班所􅀗器物特以素屏風素慿几賜毛玠曰以君有古人之風故賜君以古人之服晉書曰呉隱之字處黙清貧劉􅁉拜太常􅀸以竹蓬爲屏風坐無氊席續晉陽秋曰何無忌母劉牢之姉無忌與宋髙祖謀夜於屏風中製檄文母登屏風窺之大喜曰汝能如此吾讎雪矣宋書曰顔延之愛􅁎死以冬日臨􅂘忽見妾排屏風以壓延之延之懼墜地因病又曰王琨儉於財用設酒}
  - {type: page-break, offset: 113, content: '', id: KR3k0012_SBCK_701-3a}
  - {type: variant, offset: 113, length: 0, content: '', WYG: 帷帳屏風壞則補紉魏志曰太祖平柳城班所獲器物特以素屏風素憑几賜毛玠曰以君有古人之風故賜君以古人之服晉書曰吳隠之字處黙清貧劉裕拜太常卿以竹蓬為屏風坐無氊席續晉陽秋曰何毋忌母劉牢之姊無忌與宋髙祖謀夜於屏風中製檄文母登屏風窺之喜曰汝能如此吾讎雪矣宋書曰顔延之愛姬死以冬日臨哭妾見姬排屏風以壓延之延之懼墜地因病又曰王琨儉於財用設酒}
