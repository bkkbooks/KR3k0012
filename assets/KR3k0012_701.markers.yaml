  - {type: variant, offset: 83, length: 2, content: 嚴君, krp: 班伯以侍中光禄大夫養疾乆之成帝出過臨侯伯伯乃再視事自大將軍薨後師古曰主鳯也富}
  - {type: variant, offset: 86, length: 2, content: 筮卜, SBCK: 定陵侯張放淳于長等始愛幸出爲微行行則同輿執轡入則侍中設宴飲之㑹及趙李諸侍中皆引滿舉白時乗輿幄坐帳􅀞屏風師古曰坐音才卧反􅀞紂醉踞姐巳作長夜之樂上以伯新起數目禮之因顧指􅀞而問伯紂爲無道至於是虖伯對曰書云迺用婦女之言何有踞肆於朝所謂衆惡歸之不如是之甚者也上曰苟不居此此圖何戒伯曰沉湎于酒微子所以告去也式號式謼大雅所以留連也師古曰大雅蕩之詩云式號式謼俾晝作夜醉號謼以晝爲夜流連作詩之歡而泣涕流連也而諸書乃以留連荒亡盖失之矣大雅以流連不謂飲酒之人也謼音大故反詩書淫亂之戒其厚皆在於酒上迺喟然歎曰吾乆不見班生今日復聞讜言放等不懌又曰}
  - {type: page-break, offset: 86, content: '', id: KR3k0012_SBCK_701-2a}
  - {type: variant, offset: 86, length: 2, content: 筮卜, WYG: 定陵侯張放淳于長等始愛幸出為微行行則同輿執轡入則侍中設晏飲之㑹及趙李諸侍中皆引滿舉白時乘轡幄坐帳畫屏風師古曰坐音才卧反畫紂醉踞妲己作長夜之樂上以伯新起數日禮之因顧指畫而問伯紂為無道至於是乎伯對曰書云乃用婦女之言何有踞肆於朝所謂衆惡歸之不如是之甚者也上曰苟不居此此圖何戒伯曰沉湎於酒微子所以告去也式號式謼大雅所以留連也師古曰大雅蕩之詩云式號式謼俾晝作夜流連醉號謼以為晝夜流連作詩之人所以泣涕也而諸書乃以流連荒亡葢失之矣大雅以流連不謂飲酒之人也謼音大故反詩書滛亂之戒其原皆在於酒上迺喟然嘆曰吾久不見班生今日復聞讜言放等不懌又曰}
