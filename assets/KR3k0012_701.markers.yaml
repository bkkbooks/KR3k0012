  - {type: variant, offset: 107, length: 3, content: 夏侯亶, krp: 鄭弘爲太尉舉第五倫爲司空班次在下每正朔朝見弘曲躬自卑上問知其故遂聽置雲母屏風分隔其間由此爲故事呉志曰景帝時紀亮爲尚書令子騭爲中書令毎朝㑹詔以御屏風隔其座焉或曰隔以雲母屏風又曰曹不興善畫孫權使畫屏風誤筆落點素因就以作蠅權以爲生蝇舉手彈之魏書曰太祖雅}
