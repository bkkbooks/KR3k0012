  - {type: variant, offset: 151, length: 3, content: 沈麟士, SBCK: 冝都王鏗年十􅀊時與吉景曜啇略先言徃行左右誤排抩瘤屏風倒壓其背顔色不異言談無輟亦不顧視又皇太子在雍有發古得玉屏風遣將還都又劉悛傳武帝常在東宫毎幸悛坊閑言至夕賜屏風帷帳南史曰王逺}
