  - {type: variant, offset: 2023, length: 2, content: 死由, SBCK: 洒掃請坐徽之不頋將去主人乃閉門徽之盡歡而去又曰謝鯤隣家髙氏有女常徃挑之女方織以梭投折鯤齒旣歸微然長嘯曰猶不廢我嘯也趙書曰石勒屯葛陂值天雨不息勒長史刀應勸勒降晉勒愀然而嘯張賔勸勒還北勒攘臂曰賔計是也應冝斬吴越春秋曰越王念吴欲復之乃中夜抱拄而􅂘􅂘訖承之以嘯於是羣臣咸曰君王何愁心之甚也夫復讎誅敵非君王之憂自是臣下之急務又曰吴王闔閭將欲伐楚登臺南向而嘯有頃而歎羣臣莫有暁王意者子胥乃薦孫子孫子者吴人名武善爲兵法僻隱幽居丗人莫知其能英雄記曰向栩爲性卓詭不凢好讀老子狀如學道又復似}
  - {type: page-break, offset: 2023, content: '', id: KR3k0012_SBCK_392-4a}
  - {type: variant, offset: 2023, length: 1, content: 死, WYG: 洒}
  - {type: variant, offset: 2023, length: 2, content: 死由, krp: 洒掃請坐徽之不頋將去主人乃閉門徽之盡歡而去又曰謝鯤隣家髙氏有女常徃挑之女方織以梭投折鯤齒旣歸微然長嘯曰猶不廢我嘯也趙書曰石勒屯葛陂值天雨不息勒長史刀應勸勒降晉勒愀然而嘯張賔勸勒還北勒攘臂曰賔計是也應冝斬吴越春秋曰越王念吴欲復之乃中夜抱拄而哭哭訖承之以嘯於是羣臣咸曰君王何愁心之甚也夫復讎誅敵非君王之憂自是臣下之急務又曰吴王闔閭將欲伐楚登臺南向而嘯有頃而歎羣臣莫有暁王意者子胥乃薦孫子孫子者吴人名武善爲兵法僻隱幽居丗人莫知其能英雄記曰向栩爲性卓詭不凢好讀老子狀如學道又復似}
