  - {type: substitution, offset: 103, original: 咥, replacement: 嘻, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-3617}}
  - {type: variant, offset: 105, length: 677, content: 笑矣咥咥然笑總角之宴言笑晏晏信誓旦旦晏晏和柔也又蓼蕭曰燕笑語兮禮記檀弓曰魯人有朝祥而暮歌者子路笑之笑其為樂速也夫子曰由爾責於人終無已夫三年之喪亦已久矣禮斗威儀曰君乘土而王其民好大笑樂動聲儀曰人情喜則笑左傳宣下曰晉侯使郄克徵會于齊齊頃公帷婦人使觀之郄子將登婦人笑於房又昭四曰晉韓起聘于鄭鄭伯享之子產戒曰茍有位於朝無有不共恪孔張後至立於客間執政禦之適客後又禦之適縣間客從而笑之事畢富子諫曰夫大國之人不可不慎也幾為之笑而不陵我言數見笑則心陵侮我也又昭六曰晉士彌牟逆叔孫于箕叔孫使梁其踁待于門內曰餘左顧而欬乃殺之右願而笑乃止又昭七曰昔賈大夫貌惡娶妻而美三年不言不笑御以如皋射雉獲之其妻始笑而言賈大夫曰才之不可以已我不能射女遂不言不笑穀梁傳曰成公曰季孫行父禿晉郄克耿衛孫良夫跛曹公子首傴同聘於齊齊使禿者御禿者耿者御耿者跛者御跛者傴者御傴者蕭同叔子處臺笑之客不悅相與立胥閭而語移日不解齊有知者曰齊患必在此始也又昭公曰楚靈王圍吳朱方執齊慶封將殺之使人令於軍中曰有若齊慶封殺其君者乎封曰子一息我亦且一言曰有楚公子圍殺其兄之子麇而代之為君者乎軍人粲然皆笑論語憲問恥曰子問公叔文子於公明賈曰信乎夫子不言不笑不取乎公明賈對曰以告者過也夫子時然後言人不厭其言樂然後笑人不厭其笑義然後取人不厭其取又陽貨曰子之武城聞弦歌之聲夫子莞爾而笑曰割雞焉牛刀莞爾小笑皃史記曰吳王問孫子兵法孫子曰願得大王寵姬二人以為軍陣長吳王曰諾使二夫人為軍隊長各將一隊令宮女三百被甲而立告以兵法令隨鼓進退令曰聞一鼓皆莊二鼓操兵三鼓皆為戰形於是宮女皆掩口而笑孫子操枹擊鼓三令五申其笑如故孫子怒目如明星聲如駭虎髮, SBCK: ''}
