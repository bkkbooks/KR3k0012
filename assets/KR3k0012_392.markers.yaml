  - {type: variant, offset: 1433, length: 3, content: 至都督, WYG: 百姓莫不觀有一老父獨耕不輟議郎張温使問焉父嘯而不答魏略曰諸葛亮在荆州逰學毎晨夜常抱膝長嘯魏氏春秋曰阮籍少時嘗逰蘇門山山有隠者莫知其姓名有竹實數斛臼杵而已籍從之與談太古無為之道論五帝三王之義翛然曽不盼之籍乃嘐然長嘯音韻響亮蘇門生逌爾而笑籍既降蘇門生嘯若鸞鳯之音晉陽春秋曰嵇康見}
