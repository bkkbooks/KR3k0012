  - {type: variant, offset: 2557, length: 140, content: 及笑獻笑不及排所造皆適則志適矣故不及笑排者推移之謂也夫禮哭必哀獻笑必樂哀樂存懷則不能與適推移矣又曰盜跖謂孔子曰人上壽百歲中壽八十下壽六十除病瘦死喪憂患其中開口而笑者一月之中不過四五日而已矣鄧析子曰故體痛者口不能不呼心悅者顏不能不笑孟子曰曾子曰脇肩諂笑病乎夏畦脇肩竦體也諂笑強笑也此, WYG: ''}
