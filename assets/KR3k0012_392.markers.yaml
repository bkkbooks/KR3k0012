  - {type: variant, offset: 1426, length: 35, content: 杜預伐吳軍入城至都督孫歆帳下生將歆詣預王濬先列得歆頭而預生送歆洛中大笑, SBCK: 惜哉}
  - {type: variant, offset: 1426, length: 5, content: 杜預伐吳軍, WYG: 蔡允恭荆州江陵人有風彩觧綴文雅善吟咏煬帝所屬詞賦多令諷誦之荘子曰北門成問黄帝曰帝張咸池之樂扵洞庭之野吾聞之藹藹黙黙乃不自得帝曰吾奏以隂陽之和燭以日月之明其聲能長慮之不知望之不見矘然立扵四墟之通倚槁梧而吟又曰荘子謂恵子曰今子外乎子之神勞乎子之精依樹而吟處槁梧而瞑文士傳曰李康清廉有志節不能和俗為鄉里豪右之所共害故官塗不進作逰山九吟辭曰盖人生天地之間若流電之過户牖輕塵之棲弱草矣湘中記曰渉湘千里但聞漁父吟中流相和其聲綿邈也盛𢎞之荆州記曰新城郡瀙音初勤切水别有一溪其傍有白馬塞孟達登之嘆曰金城千里遂為上瀙吟彼方人猶傳此聲韻悽激其哀思之音乎西京雜記曰相如将聘茂陵人為妾文君作白頭吟鹽鐵論曰曽子倚山而吟山鳥下翔世說曰韓夀美姿容賈公辟為掾充每聚會其女扵青璅中看見夀心甚恱之乃問其婢識此人不婢說是其先主女内懐存想發於吟咏婢後徃夀家具說如此并言女色麗夀聞之心動乃因婢通意婢以白女女大喜乃期徃宿夀趫健絶人乃踰墻而}
