  - {type: variant, offset: 1432, length: 0, content: '', WYG: 家中莫知自是賈公覺女恱暢有異扵常陳武别傳曰陳武字國本休屠胡人常騎驢牧羊諸家牧䜿十數人或有知歌謡者武遂學太山梁父幽州馬客吟及行路難之屬阮籍樂論曰漢順帝上恭陵過樊濯聞鳥鳴而悲泣下横流曰善哉鳥鳴使左右吟之使聲若是豈不佳乎此謂以悲為樂也王粲登樓賦曰鍾儀幽而楚奏莊舄顯而越吟嘯說文曰嘯吟也雜字觧詁曰嘯吹聲也毛詩江有汜曰之子歸不我過不我過其嘯也歌歌人哨口而出聲也又白華曰嘯歌傷懐念彼碩人後漢書曰南陽太守成瑨委功曹岑晊郡中謡曰南陽太守岑公孝𢎞農成瑨但坐嘯漢晉春秋曰桓帝幸樊}
  - {type: page-break, offset: 1432, content: '', id: KR3k0012_WYG_392-4a, image: WYG0896/WYG0896-0472c.png}
