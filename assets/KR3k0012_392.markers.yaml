  - {type: variant, offset: 2029, length: 0, content: '', SBCK: 一日無此君又曰謝萬北征甞以嘯詠自髙未甞撫慰衆士謝公謂曰汝爲元帥冝數喚諸將慰勞之萬都無其說直以如意指四座曰諸公皆是勁卒諸將甚怨之捜神記曰趙炳甞臨水從舡人乞渡舡人}
  - {type: variant, offset: 2029, length: 0, content: '', krp: 一日無此君又曰謝萬北征甞以嘯詠自髙未甞撫慰衆士謝公謂曰汝爲元帥冝數喚諸將慰勞之萬都無其說直以如意指四座曰諸公皆是勁卒諸將甚怨之捜神記曰趙炳甞臨水從舡人乞渡舡人}
  - {type: variant, offset: 2030, length: 1, content: 殺, SBCK: 許炳乃張盖坐其中長嘯呼風亂流而濟潯陽記曰桓宣穆使人尋廬山見一人謂之曰君過前嶺必逢二年少相隨長嘯試要問之若不與言者可速去此人過嶺果見二年少以􅃑掩鼻長嘯狀如惡獸呼不與言神境記曰營道郡西有靈源山有石髓紫芝者有採藥此山聞林谷間有長嘯者今樵人徃徃猶聞焉異苑曰潯陽姑石在江之坻􅀄桓玄西下令人登之中嶺便聞長嘯聲甚清徹至峯頂見一人踑踞石上嘯旨曰嘯者其氣激於喉中而濁謂之言激於舌端而清謂之嘯言之濁可以通人事逹情性嘯之清可以感􅀑神致不死出其言善千里應之出其嘯清萬靈授職故古之學道者重矣又曰太上道君授於西王母西王母授於}
