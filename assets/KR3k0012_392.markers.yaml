  - {type: punctuation, offset: 3698, content: 「, id: KR3k0012_CHANT_392-bkkpn1166}
  - {type: variant, offset: 3698, length: 0, content: '', WYG: 趙炳嘗臨水従船人乞渡船人不許炳乃張盖坐其中長嘯呼風亂流而濟潯陽記曰桓宣穆使人尋廬山見一人謂之曰君過前嶺必逢二年少相随長嘯試要問之若不語言者可速去此人過嶺果見二年少以袂掩鼻長嘯状如惡獸呼不與言神境記曰營道郡西靈源山有石髓紫芝昔有採藥此山聞林谷間有長嘯者今樵人徃徃猶聞焉異苑曰潯陽姑石在江之坻初桓𤣥西下令人登之中嶺便聞長嘯聲甚清徹至峰頂見一人蹊踞石上嘯㫖曰其氣激扵喉中而濁謂之言激扵舌端而清謂之嘯言之濁可以通人事達情性嘯之清可以感鬼神致不死出其言善千里應之出其嘯清萬靈授職故古之學道者重矣又曰太上道君授扵西王母西王母授扵南極真人南極真人授扵廣成子廣成子授扵嘯父嘯父授扵務光務光授扵舜演之為琴以授禹自後而廢續晉太行山仙君}
  - {type: page-break, offset: 3698, content: '', id: KR3k0012_WYG_392-9b, image: WYG0896/WYG0896-0475b.png}
  - {type: page-break, offset: 3698, content: '', id: KR3k0012_WYG_392-10a, image: WYG0896/WYG0896-0475c.png}
  - {type: variant, offset: 3699, length: 4, content: 琳殺徐光, WYG: 公得之乃得道}
  - {type: variant, offset: 3705, length: 1, content: 血, WYG: 所授焉阮嗣宗所得少分其}
  - {type: punctuation, offset: 3706, content: 。, id: KR3k0012_CHANT_392-bkkpn1167}
  - {type: 'tls:seg', offset: 3706, content: '', id: KR3k0012_CHANT_392-47a.4}
  - {type: variant, offset: 3707, length: 4, content: 綝上蔣陵, WYG: 酒嘯不復聞矣又曰嘯}
  - {type: punctuation, offset: 3711, content: ，, id: KR3k0012_CHANT_392-bkkpn1168}
  - {type: 'tls:seg', offset: 3711, content: '', id: KR3k0012_CHANT_392-47a.5}
  - {type: variant, offset: 3712, length: 0, content: '', WYG: 一十五章一曰權輿嘯之始也二曰流雲乃古之善嘯者聴韓俄之聲而冩之三曰深溪虎古之善嘯者聴溪中虎聲而冩之四曰髙栁蟬古之善嘯者聴而冩之五曰空林夜鬼古之善嘯者夜過空林聞而冩之六曰巫峽猿古之善嘯者聞而冩之七曰下鴻鵠出扵師曠演清角之音善嘯者冩之八曰古木鳶九曰龍吟善嘯者聞而冩之十曰動地出於孫公其音亦師曠清徴也十一曰蘇門孫公隠蘇門山之作也十二曰劉公命鬼仙人劉根之所為也十三曰阮氏逸韻阮籍所作也十四曰正章深逺極}
  - {type: page-break, offset: 3712, content: '', id: KR3k0012_WYG_392-10b, image: WYG0896/WYG0896-0475d.png}
  - {type: page-break, offset: 3712, content: '', id: KR3k0012_WYG_392-11a, image: WYG0896/WYG0896-0476a.png}
  - {type: variant, offset: 3713, length: 0, content: '', WYG: 非常聲也十五曰畢者五音之極而大道畢矣晉成公綏嘯賦曰逸羣公子體竒好異傲世忘榮絶棄人事扵是延友生集同好精性命之至機研道徳之𤣥奥邈跨俗而遺身乃慷慨而長嘯發妙聲扵丹脣激哀音於嗒齒響抑揚而潜轉氣衝欝而熛起恊黄宫扵清角雜商羽扵流徴飄逰雲於泰清集長}
  - {type: variant, offset: 3714, length: 7, content: 盪綝車顧見光在, WYG: 乎萬里諒自然之至音非絲竹之所擬桓𤣥與袁宜都書論嘯曰讀卿歌賦序詠音聲皆有清味然以嘯為髣髴有限不足以致幽者將未至耶夫契神之音既不俟多瞻而通其致苟一音足以究中和之極阮公之言不動蘇門之聽而㣲嘯一鼔𤣥黙為之觧顔若人之興逸響惟深也哉袁山}
  - {type: page-break, offset: 3714, content: '', id: KR3k0012_WYG_392-11b, image: WYG0896/WYG0896-0476b.png}
