  - {type: variant, offset: 1278, length: 0, content: '', SBCK: 管輅隨軍而行過母丘儉墓下􅀝樹哀吟精神不樂人問其故輅曰林木雖茂無形可乆碑誄雖羙無後可守玄武臧頭蒼龍無足白虎衘尸朱雀悲哭四危以備法當㓕族不過二載應至矣卒如其言蜀志曰諸葛亮字孔明早􅀌躬耕壠畒好爲梁甫吟毎自比於管樂唐書曰蔡允㳟荆州江陵人有風彩解綴文雅善吟詠煬帝所屬詞賦多令諷誦之莊子曰北門成問黄帝曰帝張咸池之樂於洞庭之野吾聞之藹藹黙黙乃不自得帝曰吾奏以隂陽之和燭以日月之明其聲能長慮之不知望之不見曭然立於四虛之通􅀝槁梧而吟又曰莊子謂惠子曰今子外乎子之神勞乎子之精依樹而吟處槁梧而瞑文士傳曰李康清廉有志節不能和俗爲卿里豪右之所共害故官塗不進作遊山九吟辭曰蓋人生天地之間􅀂流電之過户牖輕塵之捿弱草矣湘中記曰渉湘千里但聞漁父吟中流相和其聲綿邈也盛弘之荆州記曰新城郡瀙􅀄覲切水别有一溪其傍有白馬塞孟逹登之歎曰金城千里遂爲上瀙吟彼方人猶傳此聲韻悽激其哀思之音乎西京􅄂記曰相如將娉茂陵人爲妄文君作白頭吟鹽鐡論曰曽子􅀝山而吟山鳥下翔丗說曰韓壽羙姿容}
