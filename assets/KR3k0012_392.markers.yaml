  - {type: variant, offset: 2025, length: 1, content: 狂, WYG: 施}
  - {type: variant, offset: 2026, length: 1, content: 語, SBCK: 居甞竈北坐􅀍髮喜長嘯人客從就輙伏不視人有於栩前獨拜栩不荅山海經曰玉山者是西王母所居也西王母其狀如人豹尾虎齒而善嘯蓬髮戴勝蓬髮亂髪勝玉勝也莊子曰童子夜嘯􅀑數若齒孫登列傳曰孫登字公和汲郡共縣人清静無爲其情志悄如也好讀易彈琴頽然自得觀其風神􅀂遊六合之外當魏末共處北山中以石室爲宇編草自覆阮嗣宗聞登而徃焉適見公和苫蓋􅀍髮端坐巖下鼓琴嗣宗自下趨進旣坐莫得與言嗣宗乃嘹嘈長嘯與琴音諧㑹雍雍然登乃逌尓而􅀏因嘯和之妙響動林壑風氣清太玄竹林七賢論曰阮籍字嗣宗性樂酒善嘯聲聞百歩箕踞嘯歌酣放自若時􅂫門山中忽有真人在焉籍親徃尋其人於巖巔遂登嶺從之箕坐相對籍乃啇略終古以問之仡然不應籍因對之長嘯有頃彼乃斷然嘆曰可更作籍又嘯意盡退還半嶺聞嶺巓然有聲若數部鼓吹頋瞻乃向人之嘯也丗說同王廙別傳曰王道與􅁃亮遊于石頭㑹遇廙至是日迅風飛㠶廙􅀝樓而長嘯神氣甚􅇣王子年拾遺記曰太始二年南方有囙霄之國人皆善嘯大丈夫嘯聞百里婦人嘯聞五十里如笙竽之音秋冬則聲清髙春夏則聲沉下人舌尖處倒向喉内亦云有兩舌重沓以爪徐徐刮之則嘯聲踰逺故吕氏春秋云反舌殊郷之國即此之謂也列女傳曰魯􅃮室之女者過時未適人當穆公之時君老太子㓜女􅀝柱而嘯隣人婦從謂曰何嘯之悲也子欲嫁乎女曰吾憂魯君老而太子少也西京􅄂記曰東方生善嘯毎一曼聲長嘯塵落瓦飛郭子曰劉道眞少時劉寳字道眞髙平人安北將軍漁釣而憊於草澤善歌嘯聞之者無不留連有一老嫗識其非常人甚樂歌嘯乃殺豚進道眞食豚盡了不謝丗說曰晉文王徳盛功大坐席嚴敬擬於王者惟阮籍在坐箕踞嘯歌酣飲自􅀂又曰劉越石爲胡􅀐所圍數重窘迫無計劉依夕乗月登樓清嘯胡賊聞之皆悽悲長歎又曰謝太傅盤桓東山時與孫興公諸人泛海戲風起浪湧諸人色動並唱使還太傅神情方雅王􅇣少吟嘯不言又曰王子猷嘗􅀉人空宅便令種竹嘯詠良乆直指竹曰}
