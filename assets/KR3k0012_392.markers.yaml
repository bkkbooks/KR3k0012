  - {type: variant, offset: 3527, length: 285, content: 晉平公鼓瑟輟而笑曰齊君與其嬖人戲墜於床而傷其臂平公命人書之曰某年某月齊君戲而傷問之於齊侯笑曰然有之東方朔別傳曰朔於上前射覆中之郭舍人亟屈被榜上輒大笑又曰南山有木名曰柘良工材之可以射射中人情如掩兔舍人數窮何不早謝上乃搏髀大笑也荀勗別傳曰司徒鈌帝問其人勗曰魏文用賈詡為公孫權笑之神異經曰東方有人不妄語恒笑倉卒見之如癡張華注曰今人癡好笑本此搜神記曰孫琳殺徐光而無血後綝上蔣陵有大風盪綝車顧見光在松樹上附手笑之俄而綝誅蜀記曰譙周字允南巴西人體皃素朴無造次辯論之才諸葛亮領益州牧命周為勸學從事初見左右皆笑既出有司請推笑者亮曰孤猶不能忍況左右乎黃義仲父廣記曰合浦尹牙為郡主簿太守到官, SBCK: 覽卷第}
