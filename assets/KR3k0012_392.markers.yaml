  - {type: variant, offset: 1084, length: 120, content: 光武微時與鄧晨觀讖云劉秀當為天子或言國師公劉秀當之光武曰安知非僕乎建武三年上徵鄧晨還京師數讌見說故舊平生為忻樂晨從容謂帝曰僕竟辨之帝大笑又曰初桓榮遭倉卒困厄時嘗與族人桓元卿俱捃拾投閑輒誦詩元卿謂榮曰卿但盡氣爾當安復施用時乎榮笑而不應後榮為太, SBCK: 梁鴻}
