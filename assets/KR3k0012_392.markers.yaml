  - {type: variant, offset: 1279, length: 1, content: 詡, SBCK: 公辟爲􅁺充毎聚㑹其女於青璅中看見壽心甚恱之乃問其婢識此人不婢說是其先主女内懷存想發於吟咏婢後往壽家具說如此并言女色麗壽聞之心動乃因婢通意婢以白女女大喜乃期徃􅀫壽趫捷絶人乃踰墻而入家中莫知自是賈公覺女恱暢有異於常陳武別傳曰陳武}
  - {type: variant, offset: 1279, length: 1, content: 詡, krp: 公辟爲掾充毎聚㑹其女於青璅中看見壽心甚恱之乃問其婢識此人不婢說是其先主女内懷存想發於吟咏婢後往壽家具說如此并言女色麗壽聞之心動乃因婢通意婢以白女女大喜乃期徃宿壽趫捷絶人乃踰墻而入家中莫知自是賈公覺女恱暢有異於常陳武別傳曰陳武}
  - {type: variant, offset: 1281, length: 0, content: '', SBCK: 國夲休屠胡人常􅀐驢牧羊諸家牧竪十數人或有知歌謡者武遂學太山梁父幽州馬客吟及行路難之屬阮籍樂論曰漢順帝上恭陵過樊濯聞鳴鳥而悲泣下横流曰善哉鳥鳴使左右吟之使聲􅀂是豈不佳乎此謂以悲爲樂也王粲登樓賦曰鍾儀幽而楚奏莊舄顯而越吟嘯說}
