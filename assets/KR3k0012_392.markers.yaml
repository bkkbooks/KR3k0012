  - {type: variant, offset: 783, length: 296, content: 衝冠鬢旁絕纓顧謂執法曰取鈇鑕引夫人斬之又曰有躄者盤散行汲趙平原君美人居樓上臨見大笑之明日躄者到門曰臣不幸癃病而君之後宮臨而笑臣臣願得笑臣者頭應曰諸居歲餘賓客門下舍人稍稍引去者過半平原怪之一人前對曰以君之不殺笑躄者君為愛色而賤士即去耳平原乃斬美人頭自造門進躄者因謝焉其後門下乃復稍稍來又曰高祖奉玉卮為太上皇壽曰始大人常以臣無賴不能治產業不如仲力今某之業所就孰與仲多殿上群臣皆呼萬歲大笑為樂又曰孟嘗君之趙趙平原君客之趙人聞孟嘗君賢皆出觀之皆笑曰始以薛公為魁然也今視之眇小丈夫耳漢書曰公孫弘為人談笑多聞師古曰善於談笑而又多聞也又曰匡衡字稚圭好學諸儒為之語曰無說詩匡鼎來匡說詩解人頤如淳曰使人笑不能止, SBCK: ''}
