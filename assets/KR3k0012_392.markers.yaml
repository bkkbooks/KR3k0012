  - {type: variant, offset: 3197, length: 281, content: 龍不詣張公公問士衡雲何以不來機曰有疾恐公不悉故未敢自見俄而雲詣華華為人多姿質又好帛纏鬚雲見而大笑不能自己士龍嘗著纕幘上舡因水中自見其影便大笑不能已幾落水中又曰王大將軍尚主如廁見漆箱中盛乾棗以塞鼻王言廁上菓食遂為之盡既還婢擎金漆盤盛水琉璃椀盛澡豆王因倒豆著水中飲之謂是乾飯群婢莫不笑又曰殷荊州有所識作賦示之殷甚以為有才語王恭適見新文甚可觀便於手中亟出之王既讀殷笑不自勝王看竟既不笑亦不言好惡但以如意點之而已殷悵然自失語林曰吊王武子客正哭見孫子荊驢鳴變聲成笑又曰董昭失勢久為衛尉昭乃厚加意於侏儒正朝大會侏儒作董衛尉啼面敘太祖時事舉坐大笑明帝悵然不怡月中以為司徒曹瞞別, SBCK: ''}
