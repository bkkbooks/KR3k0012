  - {type: variant, offset: 2584, length: 281, content: 禮哭必哀獻笑必樂哀樂存懷則不能與適推移矣又曰盜跖謂孔子曰人上壽百歲中壽八十下壽六十除病瘦死喪憂患其中開口而笑者一月之中不過四五日而已矣鄧析子曰故體痛者口不能不呼心悅者顏不能不笑孟子曰曾子曰脇肩諂笑病乎夏畦脇肩竦體也諂笑強笑也此言其言勞苦甚於仲夏之月治畦灌園者勤也呂氏春秋曰戎嘗寇周幽王擊鼓諸侯皆至褒姒大悅而笑王欲褒姒之笑數數擊鼓諸侯至無寇及真寇至擊鼓而諸侯不來遂為戎所滅又曰強令之笑則不樂強令之哭則不悲不由中心也淮南子曰強哭者雖疾不哀強歡者雖笑不樂戴哀者見歌而泣戴樂者見哭而笑說苑曰楚魏會於晉陽將以伐齊齊王患之使人召淳于髡曰楚魏謀欲伐齊願先生與寡人共之淳于髡大笑, SBCK: 彼知羙嚬}
