  - {type: variant, offset: 2698, length: 576, content: 其言勞苦甚於仲夏之月治畦灌園者勤也呂氏春秋曰戎嘗寇周幽王擊鼓諸侯皆至褒姒大悅而笑王欲褒姒之笑數數擊鼓諸侯至無寇及真寇至擊鼓而諸侯不來遂為戎所滅又曰強令之笑則不樂強令之哭則不悲不由中心也淮南子曰強哭者雖疾不哀強歡者雖笑不樂戴哀者見歌而泣戴樂者見哭而笑說苑曰楚魏會於晉陽將以伐齊齊王患之使人召淳于髡曰楚魏謀欲伐齊願先生與寡人共之淳于髡大笑而不應王怫然作色曰先生以寡人國為戲乎淳于髡對曰臣不敢以王國為戲也臣憐之祠田也以篋飲與一鮒魚其祝曰下田洿耶得穀百車洿耶下田也雞堁者宜禾雞堁雞肝黑土臣笑其所以祠者少而所求者多王曰善賜之千金革車百乘立為上卿又曰趙簡子舉兵伐齊有被甲而笑者簡子曰子何笑對曰臣乃有宿笑簡子曰有以說之則可無則死對曰當桑之時臣鄰家父與妻俱之見桑中女因追之不能及其妻怒而去之臣笑其曠也簡子曰今吾伐國失國是吾曠也還師而歸論衡曰天怒則隆隆雷聲天喜應啞啞而笑郍不聞笑也桓子新論曰關東語曰人聞長安樂則出門西向笑知肉美味則對屠門而大嚼郭子曰王淳與婦鐘氏共坐見武子從庭前過淳謂婦曰生兒如是足慰人意婦笑曰若使新婦得配參軍生兒故可不翅如此參軍是渾中弟名淪字太冲為晉文王大將軍從征壽春遇疾亡時人惜焉世說曰二陸入洛而士龍不詣張公公問士衡雲何以不來機曰有疾恐公不悉故未敢自見俄而雲詣華華為人多姿質又好帛纏鬚雲見而大笑不能自己士龍嘗著纕幘上舡因水中自見其影便大笑不能已幾落水中, WYG: ''}
