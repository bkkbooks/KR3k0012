  - {type: variant, offset: 1584, length: 233, content: 不彈白翥見問惶遽誤對忘諱向有醉胡乘馬馳來即以呵問胡人難與語非小吏所制勒笑曰胡正自難與言其後章武太守樊坦入辭居貧衣服甚陋曰樊章武貧耶朝服何以壞惡坦性踈謬對曰頃遇羯胡資財蕩盡是以窮弊勒大笑曰羯胡賊乃爾大惡取君物盡坦汗流而不敢謝勒賜坦衣恕而不問蕭子顯齊書曰徵張敬兒為護軍將軍常侍如故敬兒武將不習朝儀聞當內遷乃於密室中屏人學揖讓荅對空中俯仰如此竟日妾待竊窺笑焉崔鴻十六國春秋後趙錄曰桃豹字安步范陽人少時以膽勇騎射稱嘗攘臂大言曰大丈夫遭遇魏太祖不封萬戶侯位上將者非丈夫也時類笑, SBCK: 異}
