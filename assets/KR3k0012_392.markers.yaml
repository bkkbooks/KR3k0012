  - {type: variant, offset: 2217, length: 181, content: 狂兕觸車徑輪彎弓而射應發而殪仰天而笑曰樂矣今日之遊萬歲千秋之後誰與此同樂乎安陵君泣涕數行而進曰臣入則侍綸席出則陪萬乘萬歲千秋之後願得身滅黃泉先辱螻蟻王大悅晏子曰景公置酒太山之上酒酣公四面望喟然歎曰寡人將去此堂堂國而死耶左右泣者三人曰臣細人也猶將難死而況公乎晏子搏髀仰天大笑曰樂哉今日之飲也公怒曰笑何也對曰臣見怯君一諛臣三是以大笑公慚而更辭老子曰下士聞道大笑之不笑, SBCK: 限}
