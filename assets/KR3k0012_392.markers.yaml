  - {type: variant, offset: 3397, length: 297, content: 而已殷悵然自失語林曰吊王武子客正哭見孫子荊驢鳴變聲成笑又曰董昭失勢久為衛尉昭乃厚加意於侏儒正朝大會侏儒作董衛尉啼面敘太祖時事舉坐大笑明帝悵然不怡月中以為司徒曹瞞別傳曰太祖為人佻易無威儀每與人談論戲弄言確盡無所隱及歡悅大笑至以頭投諸案中肴膳皆沾污巾幘璅語曰師曠御晉平公鼓瑟輟而笑曰齊君與其嬖人戲墜於床而傷其臂平公命人書之曰某年某月齊君戲而傷問之於齊侯笑曰然有之東方朔別傳曰朔於上前射覆中之郭舍人亟屈被榜上輒大笑又曰南山有木名曰柘良工材之可以射射中人情如掩兔舍人數窮何不早謝上乃搏髀大笑也荀勗別傳曰司徒鈌帝問其人勗曰魏文用賈詡為公孫權笑之神異經曰東方有人不妄語恒笑倉卒見之如癡張華注曰今人癡好笑本此, WYG: ''}
