  - {type: punctuation, offset: 9, content: 《, id: KR3k0012_CHANT_380-bkkpn1}
  - {type: variant, offset: 9, length: 367, content: 尚書洪範曰二五事一曰貌容儀毛詩曰云誰之思西方美人箋云思問室之賢者彼美人兮西方之人兮箋云彼美人謂碩人也又曰叔于田巷無居人叔大叔段也田取禽也豈無居人不如叔也洵美且仁洵信也又淇奧曰有匪君子如金如錫如圭如璧寬兮綽兮猗童較兮又猗嗟曰猗嗟昌兮頎而長兮昌盛也頎長貌也抑若揚兮抑美色揚廣揚美目揚兮好目揚眉巧趨蹌兮射則臧兮又小戎曰文茵暢穀駕我騏馵言念君子溫其如玉又盧令曰盧令令其人美且仁盧重環其人美且鬈鬈好貌讀當為權權勇壯也盧重鋂其人美且偲偲才也又汾沮洳曰彼其之子美如英美如英殊異乎公行又曰彼其之子美如玉美如玉殊異乎公族左傳曰宋公子鮑美而艷又曰子太叔美秀而文又曰冉豎射陳武子中手冉豎季氏臣失弓而罵武子罵詈以告平子曰有君子白晢鬒鬚眉甚口平子曰必子彊也子彊武子字爾雅曰美士為彥論語曰堂堂乎張也言子張容貌盛難與並為仁矣孝經曰容止可觀進退可度家語曰息土之民美漢, SBCK: 羙丈夫下唐}
  - {type: variant, offset: 9, length: 22, content: 尚書洪範曰二五事一曰貌容儀毛詩曰云誰之思西方, WYG: ''}
  - {type: variant, offset: 9, length: 367, content: 尚書洪範曰二五事一曰貌容儀毛詩曰云誰之思西方美人箋云思問室之賢者彼美人兮西方之人兮箋云彼美人謂碩人也又曰叔于田巷無居人叔大叔段也田取禽也豈無居人不如叔也洵美且仁洵信也又淇奧曰有匪君子如金如錫如圭如璧寬兮綽兮猗童較兮又猗嗟曰猗嗟昌兮頎而長兮昌盛也頎長貌也抑若揚兮抑美色揚廣揚美目揚兮好目揚眉巧趨蹌兮射則臧兮又小戎曰文茵暢穀駕我騏馵言念君子溫其如玉又盧令曰盧令令其人美且仁盧重環其人美且鬈鬈好貌讀當為權權勇壯也盧重鋂其人美且偲偲才也又汾沮洳曰彼其之子美如英美如英殊異乎公行又曰彼其之子美如玉美如玉殊異乎公族左傳曰宋公子鮑美而艷又曰子太叔美秀而文又曰冉豎射陳武子中手冉豎季氏臣失弓而罵武子罵詈以告平子曰有君子白晢鬒鬚眉甚口平子曰必子彊也子彊武子字爾雅曰美士為彥論語曰堂堂乎張也言子張容貌盛難與並為仁矣孝經曰容止可觀進退可度家語曰息土之民美漢, krp: 羙丈夫下唐}
