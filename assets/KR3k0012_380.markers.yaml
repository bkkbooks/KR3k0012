  - {type: variant, offset: 3349, length: 0, content: '', SBCK: 令則七歳隨父在石頭􅂫峻愛其姿神數喚之年十五擬國婚之選不欲連姻帝室乃遁長沙監司追尋不得巳遂尚潯陽公主風氣英秀明䰅眉俯仰眄睞容止可則皇甫謐􅇣士傳曰或問許子將荀靖與荀爽孰賢子將曰二人皆玉也慈明外朗}
  - {type: variant, offset: 3349, length: 0, content: '', WYG: 令則七嵗隨父在石頭蘇峻愛其姿神數喚之年十五擬因壻之不欲連姻帝室乃遁長沙監司追尋不得已遂尚潯陽公主風氣英秀明鬚眉俯仰眄睞容止可則皇甫謐逸士傳曰或問許子將荀靖與荀爽孰賢子將曰二人皆玉也慈明外朗}
