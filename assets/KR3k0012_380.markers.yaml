  - {type: variant, offset: 3584, length: 2, content: 鄢陽, WYG: 裴叔則有雋彩容儀脱冠麤服亂頭皆好有人見之曰裴叔則如玉山行光映照人也又曰時人目李宣國如玉山之將摧又曰衛伯玉為尚書令見樂廣與朝中名士談議竒之命子弟造之曰此人人之水鏡也瑩然若披雲霧而覩青天又曰撫軍問孫興公劉真長何如曰清簡令淑王仲祖何如曰温潤泊和又曰范豫章謂王荆州范㝤王忱曰卿風流雋望真後來之秀王曰不有此舅焉有此甥又曰庾子嵩目和矯森如千丈之松雖磊砢有節目施之大厦有棟梁之用也楊松玠談藪曰張緒字思曼少而閒雅風流吐納觀者忘倦永明主見靈和殿前桞條嫩弱披靡可愛嗟賞曰此楊桞風流可愛似張緒少年宋玉風賦曰楚襄王時宋玉休歸唐勒讒之扵王王謂玉曰體貌容冶口多㣲辭不亦薄乎玉謂王曰身體容冶受之二親口多㣲辭聞之聖人}
