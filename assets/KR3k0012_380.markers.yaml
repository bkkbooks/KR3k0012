  - {type: variant, offset: 1723, length: 1591, content: 人遂號為璧人王武子玠之舅也嘗與同遊語人曰昨日與吾外甥並坐若珠玉在側朗然映人覺我形穢及長好言玄理武子每聞玠言歎息絕倒故時人語曰衛玠談道武子絕倒玠妻父樂廣有重名議者以為婦公冰清女壻玉潤為太子洗馬以國亂至江夏玠亡其妻征南將軍山簡以女妻之至豫章大將軍王敦謂長史謝鯤曰昔王輔嗣吐金聲於中朝此子復玉振於江表後求往建鄴敦遣之京師人聞其姿容觀者如堵不見者輒嘆之又曰王衍字夷甫有美貌幼清辯仕至太尉嘗執玉柄塵尾與手無別人為之義口中雌黃為世間之一龍義理有所不安者即隨改之妻郭氏賈后之親籍宮中勢藂歛無猒夷甫患之口不言錢妻試之令婢以錢遶床夷甫曰好舉阿堵物又曰石苞字仲容渤海南皮人也雅曠有智容儀偉麗不脩小節故時人為之語曰石仲容姣無雙又曰嵇康長七尺八寸美音氣好容色土木形骸不自藻飾人以為龍章鳳姿天質自然又曰王戎字濬沖幼頴悟神彩秀徹視日不昡裴楷目之曰戎眼爛爛如巖下電又曰王蒙字仲祖美姿容嘗覽鏡自照稱其父字曰王文開生如此兒耶嘗帽破入市買之群嫗悅之爭遺其帽又曰謝尚論中朝人物劉琰云杜又膚清衛叔寶神清為有識所重如此又曰韓壽武帝時為掾有姿容太尉賈充有室女見壽美心悅之充有異香女竊與壽帶之充怪以問婢婢以告充乃以女妻之又曰王戎謂王衍神姿高徹如瑤林瓊樹自是風塵外物又曰文帝器重魏舒每朝會坐罷目送曰魏舒堂堂人之領袖也又曰桓溫字元子宣城太守彝之子也生未朞而大原溫嶠見之曰此兒有奇骨可試使啼及聞聲曰真英物也年長豪爽有氣慨姿貌甚偉又曰王衍神情明秀王澄曰兄形似道而神鋒大俊晉中興書曰王矩字令式美容貌每出行觀者盈路宋書曰謝莊字希逸美容儀善談論屬文好玄理為文帝所賞帝一見之輒歎曰藍田出美玉豈虛也哉又曰蓋道風姿貌端雅容止可觀中書郎范述見而奇之曰此荊楚仙人也又曰謝晦美風姿善言笑眉目分明鬢髮如墨涉獵文義朗贍多通時人以方楊德祖微將不及晦聞猶以為恨齊春秋曰世祖嘗於華林園宴集使群臣各出所能王儉曰臣少為書生請誦封禪書跪前誦之容止可觀音吐蘊藉上大悅曰樂哉梁書曰陶洪景字通明特愛松風每聞其響欣然為樂有時獨遊泉石望見者以為仙人又曰王茂字休遠太原祁人也身長八尺美容觀武帝布衣時見之歎曰王茂年少堂堂如此必為公輔之器崔鴻十六國春秋前涼錄曰辛綝弟理美姿貌張駿欲奪其妻以寡妹妻之理割鼻自誓駿大怒徙理燉煌遂以憂死又曰前趙錄曰遊子遠幼姿貌聰亮好學年十五至洛陽張華見而奇之曰此兒雅潔洪方精公才也又曰後趙錄曰張謐美姿貌幼有逸氣太守陸雲見而異之謂傅喜曰吾聞冀州多名童故不虛也又曰劉光弱冠美姿儀自稱佛太子從大秦來當至小秦國易姓名為季子轉相扇惑藂千人於南山僣稱號鎮西石廣擊斬之于鄠頸無血十餘日面猶如生北齊書曰崔陵子瞻字彥通聰明有文情善容止神彩凝然楊愔曰昔裴瓚在晉也為中書郎情高邁每於禁門出入宿衛者肅然動容崔生堂堂之貌亦當無愧裴子又曰王昕字元景北海劇人也生九子并風流蘊藉世號王氏九龍又曰劉禕五子並有志行為世所稱璿字祖玉聰敏機悟美姿儀為其舅北海王昕所愛顧座曰可謂珠玉在傍覺我質穢又曰李繪字恭文儀貌端偉河間邢晏即繪第五舅也與繪清言歎其高遠每稱曰若披雲霧如對珠玉又曰北平陽貞字仁堅世祖第五子沉審寬恕太祖稱之曰此兒得我鳳毛又曰陸郎字雲駒洛陽人也昆弟六人並魏藍田公主元氏所生故邢邵嘗謂人云藍田生美玉豈虛也十二國史曰鄒忌為齊相身長八尺餘體肥麗朝服衣冠窺照自視謂其妻曰我與城北徐公孰美妻曰君美徐公齊之美者也忌不信復問妾妾曰君美旦日客從外來忌復問之客亦曰徐公不如君及徐公來忌孰視之自以為不如因思之曰吾妻之美我私我也妾之美我畏我也客之美我有求於我也於是入朝見威王曰臣誠不如徐公而臣妻妾及客皆言臣美或私畏於臣或有求於臣今齊地千里宮女左右莫不私王朝廷之臣莫不畏王四境之內莫不有求於王由此觀之王蔽甚矣王曰善乃下群臣吏民能面剌寡人過者受上賞又曰美男破老美女破居北史後魏書曰咸陽王禧弟樹字秀和一字君立美姿貌有將略位宗正卿後奔梁梁武尤器之封為魏郡王陳書曰韓子高會稽山陰人本家微賤年十六猶總角才敏過人容貌美麗狀似婦人, SBCK: ''}
