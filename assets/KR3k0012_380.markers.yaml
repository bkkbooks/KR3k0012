  - {type: variant, offset: 557, length: 191, content: 陳平少時家貧好讀書長大美色而肥或譖平於漢王曰平雖貧美丈夫如冠玉耳注曰此王比平又曰董偃始與母賣珠為事年十三隨母至館陶公主家左右言其姣好主召見曰吾為母養之因留第中教書射御年十八乃冠出則執轡入則侍內甚溫軟以主故諸公接之名稱城中號曰董君又曰車千秋姓田為高寢郎戾太子敗千秋訟太子冤上頗知太子無他意乃召見千秋千秋長八尺餘體貌甚麗帝悅之曰此高廟神靈使公公當遂留輔我後年老乘小車上殿故號車氏又曰董賢, SBCK: 蒯躬}
