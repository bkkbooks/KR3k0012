  - {type: variant, offset: 3584, length: 1, content: 鄢, SBCK: 宋華父督見孔父之妻於路目逆而送之曰羙而艷色羙曰艷又曰衛侯自城上見巳氏之妻髪羙使髠之以爲吕姜髢又曰鄭有徐吾犯之妹甚羙公孫楚與公孫黒爭聘之公羊傳曰驪􅁎者國色也其顔色一囯之選又曰邾婁顔夫人者嫗􅄹女國色也爾雅曰羙女爲媛國語曰恭王遊於涇上密康公從三女奔之其母曰必致之於王夫獸三爲羣人三爲衆女三爲燦今以羙物歸汝而何徳以堪之康公弗獻一年王滅密賈逵注曰燦羙也戰國䇿曰晉文公得南威三日不朝遂推南威而逺之曰後代必有以色亡國者又曰隂􅁎與江􅁎爭爲后司馬喜爲隂􅁎乃謂趙王曰臣聞趙佳麗之所出也今至境入都邑殊無羙者臣未甞見人如中山隂􅁎者其眉目准額權衡偃月乃帝王之后非諸侯􅁎也趙王大恱欲請之司馬喜歸謂中山君曰趙王非賢主也乃欲請隂􅁎王冝立以爲后以絶趙王之意中山君遂立爲后又曰張儀之楚見楚王曰彼周鄭之女粉白黛黒立於衢閭之間非知而見之者以爲神王曰楚僻陋之國寡人未見中國之女如此之羙乃資以珠玉使行后鄭䄂聞之大恐令人謂張子曰聞君將之晉有千金斤請供蒭秣張子請王􅜠之王召鄭䄂而􅜠之張子再拜曰儀有死罪儀行天地遍矣未甞見人如此之羙也而儀言得羙人是欺王也王曰吾固知天下無兩人矣史記曰紂囚西伯而閎夭之徒以有莘氏美女獻紂紂大恱乃放西伯又曰漢武帝時尹夫人與邢夫人同時幸武帝有詔不得相見尹夫人自請武帝願見邢夫人帝令他夫人飾從者數十人來前尹夫人見之曰非邢夫人帝曰何以知之對曰觀其體貌形狀不足以當人主有詔邢夫人邢夫人故衣獨身來尹夫人望見曰眞是矣於是乃伭頭而泣自痛其不如也諺曰羙女入室惡女之仇漢書曰孝武李夫人夲以倡進􅀄夫人兄延年性知音律善歌舞侍上起舞歌曰北方有佳人絶丗而獨立一顧傾人城再顧傾人國寜不知傾城與傾國佳人不可得上歎息曰善丗豈有此人乎平}
