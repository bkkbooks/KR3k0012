  - {type: variant, offset: 3344, length: 0, content: '', SBCK: 郭林宗別傳曰林宗遊洛陽見河南尹李膺膺大竒之於是名震京師復歸郷里衣冠諸儒送至河上車數千兩林宗唯與膺同舟而齊衆賔望之以爲神仙焉晉謝安別傳曰王珣以疾辭職歳餘卒桓玄與㑹稽王導子書曰珣神情朗悟經史明徹風流之羙公私所􅀉忽尓喪失歎悼之􅀷豈但風流相悼而巳荀氏家傳曰荀恱字仲豫儉之子儉早卒恱年十二能說春秋家貧無書毎之人間所見篇讀一覽多能誦記性靜羙姿容}
  - {type: page-break, offset: 3344, content: '', id: KR3k0012_SBCK_380-2a}
  - {type: variant, offset: 3344, length: 0, content: '', WYG: 郭林宗别傳曰宗逰洛陽見河南尹李膺膺大竒之扵是名震京師復歸鄉里衣冠諸儒送至河上車數千輛宗唯與膺同舟而濟衆賔望之以為神仙焉晋謝安别傳曰王珣以疾辭職嵗餘辛桓𤣥與㑹稽王道子書曰珣神清朗悟經史明徹風流之美公私所寄忽爾䘮失歎悼之深豈但風流相悼而已荀氏家傳曰荀恱字仲豫儉之子儉早卒恱年十二能説春秋家貧無書每借人讀所見篇牘一覽多能誦記性靜美姿容}
  - {type: page-break, offset: 3344, content: '', id: KR3k0012_WYG_380-3a, image: WYG0896/WYG0896-0378c.png}
