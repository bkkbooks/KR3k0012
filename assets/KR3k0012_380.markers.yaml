  - {type: variant, offset: 3350, length: 0, content: '', SBCK: 慈内潤何晏別傳曰何晏南陽人大將軍進之孫遇害魏武納晏母晏小養於魏宫至七八歳惠心天悟形貌絶羙武帝欲以爲子毎扶將游觀令與諸子長㓜相次晏微􅁴之坐則專席止則獨立或問其故荅曰禮異姓不相貫管輅別傳曰諸􅁑原與管輅別戒二事言卿樂酒量温克}
