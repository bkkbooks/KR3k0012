  - {type: variant, offset: 3590, length: 2, content: 豐鄰, SBCK: 櫻桃晉冗從僕射鄭丗逹家妓也在中猥妓中虎數歎其貌於太妃太妃給之又曰前􅁗􅀄符堅滅燕慕容冲妺年十四有殊色堅納之車頻􅁗書曰符堅時新羅獻羙女國在百濟國東三十國春秋曰後梁吕超殺其君纂后楊氏國色超將妻焉謂其父􅁪曰后􅀂自殺禍必及宗􅁪以此言吿后后曰大}
