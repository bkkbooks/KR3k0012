  - {type: variant, offset: 3597, length: 0, content: '', WYG: 一人清揚婉兮又曰齊侯之子衛侯之妻東宫之妹邢侯之姨譚公惟私手如柔荑膚如凝脂領如蝤蠐齒如瓠犀螓首蛾眉巧笑倩兮美目盼兮又曰彼美淑姬可以晤歌又曰有女如玉又曰有女如雲又曰孌彼諸姬孌好貌左傳曰叔向欲娶申公巫臣氏其母曰吾聞甚美必有甚惡而天鍾美扵是將必以是大有敗也昔有仍氏生女黰黒光可以鑑名曰𤣥妻樂正后䕫娶之生伯封實有豕心夫有尤物足以移人苟非徳義則必有禍尤異也又曰宋華督見孔父之妻扵路目逆而送之曰美而艷色美曰艷又曰衛侯自城上見巳氏之妻髪美使秃之以為吕姜髢又曰稱鄭有徐吾犯之妹甚美公孫楚與公孫黒爭聘之公羊傳曰驪姬者國色也其顔色一國之選又曰邾婁顔夫人者姬盈女國色也爾雅曰美女為媛國語曰恭王逰扵涇上宻康公從三女奔之其母曰必致之扵王夫獸三為羣人三為衆女三為燦今以美物歸汝而何徳以堪之康公弗獻一年王滅宻賈逵注日燦美也戰國策曰晋文公得南威三日不朝遂推南威而逺之曰後代必有以色亡國者又曰隂姬與江姬争為后司馬喜為隂姬乃謂趙王曰臣聞趙佳麗之所出也今至境入都邑殊無美者臣未甞見人如中山隂姬者其眉目凖額權衡偃月乃帝王之后非諸侯姬也趙王大悦欲請之司馬喜歸謂中山君曰趙王非賢主也乃欲請隂姬王冝立以為后以絶趙王之意中山君遂立為后又曰張儀之楚見楚王曰彼周鄭之女粉白黛緑立扵衢閭之間非知而見之者以為神王曰楚僻陋之國寡人未見中國之女如此之美乃資以珠玉南后鄭䄂聞之大恐令人謂張子曰聞君將之晋有金千斤請供芻秣張子請王􅜠之王召鄭袖而􅜠之張子再拜曰儀有死罪儀行天地遍矣未甞見人如此之美也而儀言得美人是欺王也王曰吾固知天下無兩人矣史記曰紂囚西伯而閎夭之徒以有莘氏美女獻紂紂大悦乃放西伯又曰漢武帝時尹夫人與邢夫人同時武帝有詔不得見尹夫人自請武帝願見邢夫人帝令他夫人餙從者數十人來前尹夫人見之曰非邢夫人帝曰何以知之對曰觀其體貌形狀不足以當人主有詔邢夫人邢夫人故衣獨身來尹夫人望見曰真是矣扵是乃低頭而泣自痛其不如也諺曰美女入室惡女之仇漢書曰武帝李夫人本以倡進初夫人兄延年性知音律善歌舞侍立起舞歌曰北方有佳人絶世而獨立一顧傾人城再顧傾人國寧不知傾城與傾國佳人不可得帝歎息曰善世豈有此人乎平陽因言延年有女弟帝乃召見之實妙麗善舞李夫人少而早卒上憐愍焉圖畫其形扵甘泉宫華嶠後漢書曰梁冀妻孫夀色美而善為妖態作愁眉啼粧墮馬髻折腰歩齲齒笑以為媚惑東觀漢記曰趙喜與友人韓仲伯欲入武闗仲伯以其婦有色恐有强暴者而已受其害欲棄之怒責仲伯遂以泥塗其婦面載以鹿車身自推每逢賊輙為求哀言其病遂脱又曰初光武聞隂麗華美而悦歎曰娶妻當得隂麗華後為皇后漢武故事曰帝起明光宫發燕趙美女三千人以充之率取十五以上二十以下年滿四十者出嫁凡諸宫美人可七八十帝從行郡國載之後車與上同輩者十六人員數恒使滿皆自然美麗不施粉白黛黑衣軒者亦如之魏畧曰初袁紹子熙納甄后熙出奔幽州后留侍姑及鄴破紹妻及后坐于堂上紹妻自縳文帝語袁夫人令新婦舉頭姑乃捧后令仰帝就視見其顔色非凡稱歎之太祖為迎焉呉志曰周瑜從孫策攻皖城得喬公兩女國色也䇿自納大喬瑜納小喬又曰孫權歩夫人以美麗得幸寵冠後庭王隠晋書曰阮籍隣家處女有才色籍不與親生不相知未嫁而死籍往哭盡哀乃去晋陽春秋曰荀燦字奉倩常曰婦人者才智不足論自以容色為主驃騎將軍曹洪女有美色燦扵是聘焉容服帷帳甚麗専房宴寢厯數年後婦偶疾亡未殯傅嘏往唁燦大哭神傷曰佳人難再得痛悼不已嵗餘亦亡東燦晋記曰杜弢至長沙掠前始興太守尹虞二女皆國色也將妻之曰我父二千石終不為賊作婦遂自殺焉又曰謝鯤隣家有美女鯤挑之女織梭投之折其兩齒干寳晋記曰石崇有妓曰緑珠美如玉善舞孫秀使人求焉崇方登凉觀臨清水婦人侍側使者以告崇崇盡出婦妾數十人以示之皆藴蘭麝而披羅縠使者曰君侯服御美麗然本受㫖索緑珠崇勃然曰緑珠為吾所愛不可得也使者曰願加三思崇曰不然使者還以告故秀勸趙王倫殺之崔鴻十六國春秋前趙録曰劉聰使大鴻臚李宏往聘太保劉殷女謂宏曰此女輩皆}
