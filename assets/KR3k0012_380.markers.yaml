  - {type: variant, offset: 3351, length: 2, content: 蘭陵, SBCK: 不可保寜當節之即卿有水鑒之才所見者妙仰觀如神禍如膏火不可不愼也呉地記曰陸閎字子春暢子也姿容如玉威儀秀異光武􅂛臺而見偉之􅀏曰南方故多佳人三國典略曰李繪儀貌端偉神情朗㑺舅河間邢晏毎與之言歎其髙逺稱之曰􅀂披煙霧如對珠玉宅相之竒良在此甥文襄嗣業晉代山東諸郡其特降書徴者唯繪清河太守辛術二人而巳又曰梁楊白花字長茂武都仇池人大眼之子也少有勇力容貌瓌偉又曰山公目嵆叔夜之爲}
