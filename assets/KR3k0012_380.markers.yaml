  - {type: variant, offset: 3581, length: 0, content: '', SBCK: 又曰裴叔則有儁彩容儀脫冠麤服亂頭皆好有人見之曰裴叔則如玉山行光映照人也又曰時人目李宣國如玉山之將摧又曰衛伯玉爲尚書令見樂廣與朝中名士談義竒之曰自昔諸子弟造之曰此人水鑒也􅉷然􅀂披雲霧而覩青天又曰撫軍問孫興公劉眞長何如曰清簡令淑王仲祖何如曰温潤怡和又曰范豫章謂王荆州范寗王悅曰卿風流儁望真後來之秀王曰不有此舅焉有此甥王氏譜曰坦之娶陽范注女姉姉生悅又曰􅁃子嵩目和嶠森森如千丈之松雖磊砢有節目施之大厦有棟梁之用也楊松玠談藪曰張緒字思㬅少而閑雅風流吐納觀者忘疲永明主見靈和殿前栁條嫰弱披靡可愛嗟賞曰此楊栁風流可愛似張緒少年宋玉風賦曰楚襄王時宋玉休歸唐勒䜛之於王王謂玉曰體貌容冶口多微辭不亦薄乎王謂王曰身體容冶受之二親口多微辭聞之聖人陳沈烱長安少年行曰長安羙少年􅍡馬鐵連錢陳王裝腦勒晉帝鑄金鞭歩摇如飛鷰劒鍔似舒蓮去來新市北遨遊大道邊也羙婦人上周昜曰冶容誨淫毛詩曰窈窕淑女君子好逑又曰靜女其姝俟我於城隅匪女之爲羙羙人之貽妹羙色也又曰云誰之思羙孟姜矣又曰彼羙孟姜詢羙且都有女同行顔如舜英舜英不槿也又曰野有􅕃草零露漙兮有羙一人清揚婉兮又曰齊侯之子衛侯之妻東宫之妹邢侯之姨譚公惟􅀻手如柔荑膚如凝脂領如蝤蠐齒如瓠犀􅁗首娥眉巧􅀏倩兮羙目眄兮又曰彼羙淑􅁎可以晤歌又曰有女如玉又曰有女如雲又曰孌彼諸􅁎孌好貌左傳曰叔向欲娶申公巫臣氏其母曰吾聞甚羙必有甚惡而天鍾羙於是將必是以有敗也昔有仍氏生女鬒黒光可以鑑名曰玄妻樂正后􅇪娶之生伯封古諸侯髪羙曰鬒實有豕心䕫舜典樂夫有尤物足以移人苟非徳義必有禍尤}
