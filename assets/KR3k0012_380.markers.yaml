  - {type: variant, offset: 3589, length: 0, content: '', SBCK: 弟上乃召見之實妙麗善舞李夫人少而早卒上憐􅉖焉圖􅀞其形於甘泉宫華嶠後漢書曰梁兾妻孫壽色羙而善爲妖態作愁眉啼粧墮馬髻折􅆎歩齲齒􅀏以爲媚惑東觀漢記曰趙喜與友人韓仲伯欲出武關仲伯以其婦有色恐有強􅁀者而巳受其害欲棄之喜責怒仲伯以泥塗其婦面載以鹿車身自推毎逢賊輙爲求哀言其病遂脫又曰􅀄光武聞隂麗華羙心恱歎曰娶妻當得隂麗華後爲皇后漢武故事曰又起明光宫發燕趙羙女二千人充之率取十五以上二十以下年滿四十者出嫁凡諸宫羙人可七八千帝從行郡國載之後車與上同輦者十六人貟數􅁪使滿皆自然羙麗不使粉白黛黒侍衣軒者亦如之魏略曰􅀄􅀽紹子熈納甄后熈出奔幽州后留侍姑及鄴破紹妻及后坐堂皇上紹妻自􅅮文帝語􅀽夫人令新婦舉頭姑乃捧后令仰帝就視見其顔色非凢稱歎之太祖爲迎也呉志曰周瑜從孫䇿攻皖城得喬公兩女國色也䇿自納大喬瑜納小喬又曰孫權歩夫人以羙麗得幸寵冠後庭王隠晉書曰阮籍隣家處女有才色籍不與親生不相知未嫁而死籍徃哭盡哀乃去晉陽春秋曰荀燦字奉倩常曰婦人者才智不足論自冝以色爲主驃􅀐將軍曹洪女有羙色燦於是聘焉容服帷帳甚麗專房宴寢歴數年後婦偶病亡未殯傳嘏徃唁燦不哭神傷曰佳人難再得痛悼不巳歳餘亦亡鄧粲晉紀曰杜弢至長沙掠前始興太守尹虞二女皆國色也將妻之曰我父二千石終不爲賊作婦遂自殺焉又曰謝鯤隣家有羙女鯤挑之女織梭投之折其兩齒于寳晉紀曰石崇有妓曰緑珠羙如玉善舞孫秀使人求焉崇方登凉觀臨清水婦人侍側使者以吿崇崇盡出婦妾數十人以示之皆藴蘭麝而披羅縠使者曰君侯服御麗矣然本受命旨索緑珠崇勃然曰緑珠吾所愛不可得也使者曰願加三思崇曰不然使者還以告故秀勸趙王倫殺之崔鴻十六國春秋前趙録曰劉聦使大鴻臚李􅁪聘太保劉啇女謂􅁪曰此女軰皆姿色超丗且太保於朕實自不同􅁪曰太保􅒨自有周與聖源實別聦大恱賜金六十斤又曰崔後趙石虎鄭后}
