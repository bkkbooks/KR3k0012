  - {type: variant, offset: 1007, length: 551, content: 未嘗加禮又曰蔡邕字伯喈謂從弟谷曰董卓性剛難濟吾且遁逃山東以待如何谷曰君狀異恒人每行觀者盈集以此自匿不亦難乎乃止謝承後漢書曰楊喬為尚書容儀偉麗數上言政事桓帝愛其才貌詔妻以公主喬固辭不聽還閉口不食七日而死東觀漢記曰杜詩薦伏湛曰儀貌堂堂國之輝光智略謀慮朝之淵藪又曰馬援自還京師數被進見為人明白眉目如畫閑進對尤善述前事每言及三輔長者至閭里少年皆可觀皇太子諸王聞者莫不屬耳忘倦又曰虞延字子大陳留人也上東巡路過小黃高帝母昭靈后園陵在焉時延為督郵詔呼見問園陵事延進止從容跪拜可觀其陵樹株蘖皆諳其數帝善之魏志曰邢顒字子昂時人稱德行堂堂邢子昂文帝以為太常吳志曰諸葛恪宇元遜江表傳曰恪辯論應機莫與為對孫權見而奇之謂父瑾曰藍田出美玉真不虛也又曰朱據字子範吳郡人有姿貌膂力又能論難黃武初徵拜五官中郎將權遷建鄴徵尚公主拜左將軍封雲陽侯謙虛接士輕財好施又曰孫韶字公禮為邊將不進見十餘年權還建鄴乃得朝覲問諸要害遠近人馬眾寡將卒名字具識之所問咸對身長八尺儀貌都雅權悅曰吾久不見公禮又曰呂範字子衡汝南人有姿貌邑人劉氏家富女美範求之母嫌欲勿與範親劉氏曰觀呂子衡寧當久貧者耶遂與之婚又曰孫桓儀容端正聰明博學能論議應對孫權常稱為宗室顏淵又曰張純少厲操行學博才秀切問捷對容止可觀拜郎中晉書曰裴揩字叔則為吏部侍郎風神高邁容儀俊爽博涉群書特精義理時, SBCK: ''}
