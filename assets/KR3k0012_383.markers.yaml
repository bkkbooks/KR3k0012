  - {type: variant, offset: 4340, length: 5, content: 俗固將愁苦, WYG: 事臣不能道引無所服餌也譚以為少盲恒逸樂所以益性命也神仙傳曰淮南王安好道術八公乃詣門門者見其垂白不進公皆化成童子色如桃花門吏白王王迎之登思仙之臺張錦綺之帷設象牙之床燔百和之香進邊玉之几執弟子禮八公還成老人授之要道及郎中雷被譛安安與八公昇天所踐石皆䧟今人馬之跡在焉王子年拾遺録曰昔老􅅨當周之末居返景日室之山與世人絶跡惟有黄髪老叟五人或乘虎豹或乘鴻鵠衣毛羽之服眉覆扵目耳垂至肩兩眸子皆黒方面玉㓗手握青筠之杖出入于日室之中與老子談天文之數述異記曰尹雄年九十頭生角半寸世説曰顧恱與簡文同年}
