  - {type: variant, offset: 2315, length: 53, content: 安知此非神仙余曰道必形體如此無以道焉風俗通曰齊有一女二家求之其家語其女曰汝欲東家則左袒欲西家則右袒其女兩袒, WYG: 年十三失明}
