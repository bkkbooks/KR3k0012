  - {type: variant, offset: 45, length: 0, content: '', krp: 之辤曰臣之壯也猶不如人今老矣無能爲也又襄公六曰晉悼夫人食與人之城𣏌者綘縣人或年長矣無子而往興於食有與疑年使之年使言其年曰臣小人也不知紀年臣生之歲正月甲子朔四百有四十五甲子矣其季於今三之}
  - {type: variant, offset: 46, length: 0, content: '', SBCK: 也吏走問諸朝師曠曰魯叔仲惠伯㑹郤成子于承匡之􅀊也七十三年矣又曰穆叔至自㑹見孟孝伯語之曰趙孟將死矣其語偷不似民主且年未盈五十而諄諄焉如八十九十者弗能乆矣又昭元曰天王使劉定公勞趙孟於潁館於洛汭劉子曰羙哉禹功子盍亦逺績禹功而}
  - {type: variant, offset: 46, length: 0, content: '', WYG: 也吏走問諸朝師曠曰魯叔仲惠伯㑹郤成子扵承匡之嵗也七十三年矣又曰穆叔至自㑹見孟孝伯語之曰趙孟將死矣其語偷不似民主且年未盈五十而諄諄焉如八十九十者不能久矣又昭元曰天王使劉定公勞趙孟扵潁館扵洛汭劉子曰美哉禹功子盍亦逺續禹功而}
  - {type: page-break, offset: 46, content: '', id: KR3k0012_WYG_383-5a, image: WYG0896/WYG0896-0402c.png}
  - {type: variant, offset: 46, length: 0, content: '', krp: 也吏走問諸朝師曠曰魯叔仲惠伯㑹郤成子于承匡之歲也七十三年矣又曰穆叔至自㑹見孟孝伯語之曰趙孟將死矣其語偷不似民主且年未盈五十而諄諄焉如八十九十者弗能乆矣又昭元曰天王使劉定公勞趙孟於潁館於洛汭劉子曰羙哉禹功子盍亦逺績禹功而}
