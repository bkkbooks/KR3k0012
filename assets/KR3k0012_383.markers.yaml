  - {type: variant, offset: 1517, length: 1, content: 厲, SBCK: 王賜臣田田不租倉廪虛賜臣無役則官無所使非所望也王曰賜先生爲相可乎先生曰臣得三願足矣安用爲相又曰子竒年八十齊君任爲東阿旣行而君悔焉使}
