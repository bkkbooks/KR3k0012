  - {type: variant, offset: 3512, length: 665, content: 出遊得一聖女及至諸夫人見者皆大笑王曰未飭耳飭與不飭相去十百女曰飭與不飭相去千萬不足言何獨十百也王曰何以對曰昔者堯舜桀紂俱為天子堯舜安於節儉茅茨不剪採椽不斲後宮衣不曳地食不重味至今數千歲天下歸善桀紂不自飭仁義為高臺榭深池澤後宮蹈綺縠弄珠玉身死國亡為天下笑至今千餘歲天下歸惡由是觀之飭與不飭相去千萬閔王大感立以為后朞月之間化行鄰國諸侯朝之侵三晉懼秦楚立帝號及女死燕遂屠齊又曰齊鍾離春者齊無鹽邑之女鍾離姓春名也其為人極醜醜無雙曰頭深目長壯大節卬鼻結喉頂上少髮折腰出胸皮膚若漆行年三十無所容入行嫁不售流棄莫執於是乃拂拭短褐自詣宣王願乞一見謁者曰晏齊之不售女也聞大王之聖願備後宮之掃除頓首司馬門外謁者以聞宣王方置酒於漸臺左右聞之莫不掩口而笑王曰此天下強顏女子也乃召見之謂曰昔先王為寡人娶妃疋皆以備有列位者今夫人不容鄉里布衣而欲千萬乘之主有何異乎鍾離春曰竊慕大王之美義耳王曰然何善曰嘗隱善王曰試一行之言未卒忽不見王大驚立發隱書而讀之久不能解明日復召之但揚目御齒舉手拊膝曰殆哉如此者四矣王曰願聞命對曰今大王之國西有橫秦之患南有強楚之讟外有二國之難內藂奸臣眾人不附春秋四十年壯男不立故不務眾子而務眾婦尊所好而忽所恃一旦山陵崩墜社稷不定此一殆也漸臺五層黃金白玉琅玕翡翠萬人疲極比二殆也賢者伏匿於山林諂諛強行於左右耶偽立於本朝不得通入此三殆也酒漿流湎以夜繼晝女樂俳優縱橫大笑外不脩諸侯之禮內不康國家之理此四殆也王闇然無聲喟然而歎曰痛乎無鹽君之言於是立壞漸臺罷女樂退諂諛去彫琢選兵馬實府庫闢四門招進直言卜擇吉日立太子拜無鹽君以為王后齊國大安皆醜女之力也, WYG: 講}
