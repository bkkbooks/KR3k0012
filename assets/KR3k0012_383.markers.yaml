  - {type: variant, offset: 2370, length: 1063, content: 問其故對曰願東家食而西家息以東家富而醜西家貧而美也新序曰齊有田巴先生者行脩於外王聞其賢聘之將問政焉田巴先生改製新衣拂飾冠帶顧謂其妾妾曰佼將出門問其從者從者曰佼過於淄水自照視醜惡甚焉遂見齊王齊王問政對曰今者大王召臣臣問妾妾愛臣諛臣曰佼問從者從者畏臣諛臣曰佼臣至臨淄水而觀然後知醜惡也今王察之齊國治矣會稽錄曰任弈字安和句章人也為人皃寢無威儀劉謚之龐郎賦曰其頭也則中觡而上下銳額平而承枕四起繁欽三胡賦曰莎車之胡黃目深精員耳狹頤康居之胡焦頭折頞高輔陷無眼無黑眸頰無餘肉罽賓之胡面象炙蝟頂如持囊隈目赤眥洞頞卬鼻朱彥時黑兒賦曰世有非常人實惟彼玄士稟茲至緇色內外皆相似臥如驪牛𩥇立如烏牛跱忿如鸜鵒鬭樂似鸕鶿喜醜婦人周易曰老婦士夫亦可醜也韓詩外傳曰齊王厚送女欲妻屠門肚肚辭以疾其友勸之曰子孫死腥臭之肆而已乎何以辭之肚應曰其女醜其友曰何謂也肚曰吾肉善如量而去苦少耳吾肉不善雖以他附益之尚猶不讎今厚送子子醜故耳其友下問女果醜目如擗杏齒如編蟹東觀漢記曰梁鴻同郡孟氏其女名光狀貌醜而黑力能舉石臼擇而不嫁至年三十鴻聞而聘之王隱晉書曰武帝為太子納妃謀久不決上欲娶衛瓘女楊后欲娶賈充女上曰衛公女有五可賈公女有五不可衛家種賢而多子端正而長白賈家種妒而少子醜而短黑也唐書曰張萬福典泗州時遇德宗幸奉天李希烈反陳少遊悉令管內刺史送妻子楊州以為質萬福獨不肯送謂使者曰為某白相公萬福妻老且醜不足煩相公意獨不送又曰中宗好與朝臣狎戲韋庶人微時有一乳母實蠻婢也既老且醜齒髮禿落制於後宮刻列花燭嫁為御史大夫竇懷貞妻俗謂乳母之婿曰阿遮懷貞每進表狀列其官位必曰國遮欣然有自負之色莊子曰陽子之宋宿於逆旅逆旅人有妾二人其一人美其一人惡惡者貴而美者賤陽子問其故逆旅小子對曰美者自美吾不知其美也陽子曰弟子記之行賢而去自賢之行何往而不受哉郭子曰許充婦是阮德如妹甚醜交禮竟許永無復入理桓範勸之曰阮嫁醜女與卿故當有意宜察之許便入見婦即出提裙裾停之許謂婦曰婦有四德卿有幾荅新婦所之唯容士有百行君有其幾許曰皆備婦曰君好色不好德何謂皆備許有慚色遂雅相重劉向列女傳曰齊孤逐女者其狀甚醜三逐於鄉五逐於里過時無所容乃造襄王之門而求見王輟食而起謹敬左右曰三逐於鄉者不忠五逐於里者少禮何足為遽王曰子不識也夫牛鳴而馬不應者異類故此人必有異者遂見與之語而嘉之又曰齊宿瘤者東都採桑之女閔王之后也閔王宣王子也項有大瘤故號曰宿瘤初閔王遊至東百姓盡觀宿瘤女採桑如故王召問曰寡人出遊車騎甚眾百姓無長少棄事來觀汝不視何也對曰妾受父母教採桑不受教觀大王王曰此女也惜其宿瘤女曰中心何謂宿瘤何傷王大悅曰此賢女也命後車載之女曰不受父母, WYG: 哀}
