  - {type: variant, offset: 1507, length: 0, content: '', SBCK: 故宅復累丗壽由此覺是宅所爲疑其井水殊赤乃試掘井左右得古人埋丹砂數十斛去井數尺此丹砂汁因泉水漸洿入井是以飲其水而得壽况乃持丹砂而服之乎六韜曰文王祖}
  - {type: variant, offset: 1507, length: 0, content: '', WYG: 故宅復累世夀由此覺是宅所為疑其井水殊赤乃試掘井左右得古人埋丹砂數十斛去井數尺此丹砂汁因泉水漸汚入井是以飲其水而得夀况乃持丹砂而服之乎六韜曰文王祖}
