  - {type: variant, offset: 4178, length: 159, content: 鑿齒襄陽記曰黃承產沔南名士也謂諸葛孔明曰君擇婦否有醜女黃頭黑色而才堪相配孔明許焉即載送之時人為笑樂鄉里為之嗟曰莫作孔明擇婦正得河外醜女束晢發蒙記曰醜男鬷蔑醜女鍾離春通俗文曰不媚曰㜅音畜可惡曰嬒烏會反大醜曰㚠呼交反醜稱曰娭烏在反何承天纂曰嫫母醜人也楚辭曰西施媞媞而不得見兮嫫母勃屑曰侍而又曰珪璋雜於甑室隴廉與孟陬同宮舉世, WYG: ''}
