  - {type: variant, offset: 1522, length: 0, content: '', SBCK: 文帝時爲郎上問曰何不遇也駟曰文帝好文臣好武景帝好老臣又少陛下好少臣巳老是以三丗不遇上感其言拜爲㑹稽都尉新序曰孔子見宋榮啓期年老白首衣弊服鼓琴自樂孔子問曰先生老而窮何樂也啓期曰吾有三樂天生萬物以人爲貴吾得爲人一樂也人生以男爲貴吾得爲男二樂也人生命有傷夭吾年九十餘是三樂也貧者士之常死者人之終居常以守終何不樂乎說􅁐曰楚文王伐鄭使王子革子露居二子出遊老人戴畚從而乞食焉不與摶而奪之畚}
