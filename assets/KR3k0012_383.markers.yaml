  - {type: variant, offset: 2321, length: 363, content: 余曰道必形體如此無以道焉風俗通曰齊有一女二家求之其家語其女曰汝欲東家則左袒欲西家則右袒其女兩袒父母問其故對曰願東家食而西家息以東家富而醜西家貧而美也新序曰齊有田巴先生者行脩於外王聞其賢聘之將問政焉田巴先生改製新衣拂飾冠帶顧謂其妾妾曰佼將出門問其從者從者曰佼過於淄水自照視醜惡甚焉遂見齊王齊王問政對曰今者大王召臣臣問妾妾愛臣諛臣曰佼問從者從者畏臣諛臣曰佼臣至臨淄水而觀然後知醜惡也今王察之齊國治矣會稽錄曰任弈字安和句章人也為人皃寢無威儀劉謚之龐郎賦曰其頭也則中觡而上下銳額平而承枕四起繁欽三胡賦曰莎車之胡黃目深精員耳狹頤康居之胡焦頭折頞高輔陷無眼無黑眸頰無餘肉罽賓之胡面象炙蝟頂如持囊隈目赤眥洞頞卬鼻朱彥時黑兒賦曰世有非常人實惟彼玄士稟茲至緇色內外皆相似臥如驪牛𩥇立如烏牛跱忿如鸜鵒鬭樂似鸕鶿喜醜婦人周易曰老婦士夫亦可醜也韓詩外, SBCK: ''}
