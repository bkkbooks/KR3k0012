  - {type: 'tls:seg', offset: 35, content: '', id: KR3k0012_CHANT_383-2a.5}
  - {type: variant, offset: 35, length: 0, content: '', WYG: 五十異粻六十宿肉七十貳膳八十常珍九十飲食不離寢膳飲}
  - {type: variant, offset: 36, length: 1, content: 手, SBCK: 適四方乗安車自稱曰老夫又檀弓上曰子夏喪其子}
  - {type: variant, offset: 36, length: 1, content: 手, WYG: 扵逰可也五十始衰六十非肉不飽七十非帛不煖八十非人不煖九十雖得人不煖矣又曰五十杖扵家六十杖扵鄉七十杖扵國八十杖扵朝九十者天子若有問焉則就其室以珍從導養也七十不俟朝大夫士之老者揖君則退八十月告存每月致膳九十日有秩秩常也有常膳有虞氏養國老扵上庠養庶老扵下庠夏后養國老扵東序養庶老扵西序殷人養國老扵右學養庶老扵左學周人養國老扵東膠養庶老扵西膠又曰君子耆老不徒行庶人耆老不徒食又曰文王世子曰文王謂武王曰汝何夢矣武王對曰夢帝與我九齡帝天也文王曰古者謂年齡齒亦齡也我百爾九十吾與爾三焉文王九十七}
  - {type: page-break, offset: 36, content: '', id: KR3k0012_WYG_383-3a, image: WYG0896/WYG0896-0401c.png}
