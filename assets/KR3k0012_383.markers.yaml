  - {type: variant, offset: 38, length: 2, content: 持十, SBCK: 喪其明曽子吊之子夏哭曰天乎予之無罪曽子怒曰吾與汝事夫子於洙泗之間退而老於西河之上使西河之民疑汝於夫子尓罪一}
  - {type: variant, offset: 38, length: 1, content: 持, WYG: 終武王九}
  - {type: variant, offset: 38, length: 2, content: 持十, krp: 喪其明曽子吊之子夏哭曰天乎予之無罪曽子怒曰吾與汝事夫子於洙泗之間退而老於西河之上使西河之民疑汝於夫子尓罪一}
  - {type: variant, offset: 40, length: 0, content: '', WYG: 三而終又祭儀曰先王之所以治天下者五貴有徳貴貴貴老敬長慈㓜為其近扵親}
