  - {type: variant, offset: 1519, length: 1, content: 醜, SBCK: 追之嘱使者曰未至追令還巳至勿追未至東阿使者反之齊君問故使者曰臣見子竒同載者皆白首矣夫老者之智少者之決此必能治東阿矣王曰善哉又曰昔衛武公年九十五儆於國曰苟在朝者無謂我老耋而舎我也必恭恪於朝夕以儆我聞一二之言志誦納之以訓道漢武故事曰上甞輦至郎署見一老髭􅂡皓白衣服不完上問曰公何時爲郎何其老矣對曰臣姓顔名駟江都}
