  - {type: variant, offset: 1528, length: 347, content: 仲尼衛有惡人焉曰哀駘佗大夫之與處者思不能去也婦人之請於父母曰與為人妻寧為夫子妾者十數而未止也是必有以異乎人也寡人召而觀之果以惡駭天下又曰支離䟽者頤隱於臍肩高於頂會撮指天五管在上兩髀為脅也孫卿子曰衛靈公有臣曰公孫呂身長七尺面長三尺而廣三寸名動天下孔叢子曰子高見齊王齊王問誰可為臨淄宰稱管穆焉王曰管穆容貌陋民不敬他荅曰夫見敬在德且臣所稱其能也君不聞晏子乎長不滿六尺面狀醜惡齊王上下莫不崇焉以穆體形方之猶賢之遠矣王乃以管穆為臨淄宰也尸子曰禹長頸鳥喙面目顏色亦惡矣天下猶獨賢之呂氏春秋曰陳有惡人曰敦洽犨麋椎顙色如漆也又曰列精子高德行於齊涽王所敬著布衣白縞冠會朝步堂下謂侍者曰我好醜何如侍者曰公艷出而窺井歎曰惡丈夫也人之阿齊王實不良而言良亦其我之侍者也周斐汝南先賢傳曰周燮字彥祖歛頤折頞皃甚醜母欲不舉其父, SBCK: 師曠}
