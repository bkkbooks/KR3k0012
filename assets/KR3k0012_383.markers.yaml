  - {type: variant, offset: 2095, length: 183, content: 何為猴常共遊戲西池顏問路人云二人誰似猴路人指何曰彼似猴耳君乃真獼也東晳發蒙記曰醜男鬷蔑醜女鍾離春世說曰王廣娶諸葛誕女入室言語始交王語婦曰神色卑下殊不似公休婦曰犬丈夫令婦人比蹤人英傑崔駰博徒論曰博徒見農夫戴笠持耨以芸蓼荼面目驪黑手足胼肱膚如桑朴足如熊蹄蒲伏壟敏汗出調泥乃謂曰子觸熱耕芸背上生鹽脛如燒椽皮如領革錐不能穿行步狼跋腳戾脛酸謂子草木支體屈伸謂子禽獸形容似人何受, SBCK: 盡}
