  - {type: variant, offset: 22, length: 5, content: 音𧈪酉反可, SBCK: 黄耇􅁂髮變黄也耇垢也皮色驪悴恒如有垢也或曰胡耇皮如雞胡也或曰凍梨皮有班黒如凍梨色也或曰􅄦齒大齒落盡更生細齒如小兒齒也百年曰期頥頣飬也老惛不復知服味善}
  - {type: variant, offset: 22, length: 5, content: 音𧈪酉反可, WYG: 黄耈鬂髪變黄也耈垢也皮色驪悴恒如有垢也或曰胡耈皮如鷄胡也或曰凍梨皮有班㸃如凍梨色也或曰鬼齒大齒落盡更生細齒如小兒齒也百年曰期頤頤養也老惽不復知服味善}
  - {type: variant, offset: 22, length: 5, content: 音𧈪酉反可, krp: 黄耇鬢髮變黄也耇垢也皮色驪悴恒如有垢也或曰胡耇皮如雞胡也或曰凍梨皮有班黒如凍梨色也或曰鬼齒大齒落盡更生細齒如小兒齒也百年曰期頥頣飬也老惛不復知服味善}
