  - {type: punctuation, offset: 43, content: 「, id: KR3k0012_CHANT_383-bkkpn23}
  - {type: variant, offset: 43, length: 0, content: '', SBCK: 王制曰飬􅂄老以致孝又曰凢飬老有虞氏以燕禮夏后氏以饗禮殷人以食禮周人脩而兼用之五十飬於郷六十養於國七十養於學逹於諸侯天子諸侯養老同也五十異糧六十􅀫肉七十貳膳八十常珍九十飲食不離􅃦膳飲從於遊可也五十始衰六十非肉不飽七十非帛不煖八十非人不煖九十雖得人不煖矣又曰五十杖於家六十杖於郷七十杖於國八十杖於朝九十者天子欲有問焉則就其室以珍從尊養之七十不俟朝二}
  - {type: page-break, offset: 43, content: '', id: KR3k0012_SBCK_383-2a}
  - {type: variant, offset: 43, length: 0, content: '', WYG: 虞夏殷周天下之盛王也未有遺年者年之貴乎天下久矣次乎事親也又曰天子廵狩諸侯待于境天子先見百年者問其國君以百年者所在而往見之左傳隠公曰石碏使告于陳曰衛國􅄶小老}
  - {type: page-break, offset: 43, content: '', id: KR3k0012_WYG_383-4a, image: WYG0896/WYG0896-0402a.png}
  - {type: variant, offset: 43, length: 0, content: '', krp: 王制曰飬耆老以致孝又曰凢飬老有虞氏以燕禮夏后氏以饗禮殷人以食禮周人脩而兼用之五十飬於郷六十養於國七十養於學逹於諸侯天子諸侯養老同也五十異糧六十宿肉七十貳膳八十常珍九十飲食不離寢膳飲從於遊可也五十始衰六十非肉不飽七十非帛不煖八十非人不煖九十雖得人不煖矣又曰五十杖於家六十杖於郷七十杖於國八十杖於朝九十者天子欲有問焉則就其室以珍從尊養之七十不俟朝二}
  - {type: punctuation, offset: 44, content: ，, id: KR3k0012_CHANT_383-bkkpn24}
  - {type: 'tls:seg', offset: 44, content: '', id: KR3k0012_CHANT_383-2a.8}
  - {type: variant, offset: 44, length: 0, content: '', SBCK: 士之差者揖君則退八十曰告存每月致膳九十曰有秩秩常也有常膳有虞氏養國老於上庠養庶老於下庠夏后養國老於東序養庶老於西序殷人養國老於右學養庶老於左學周人養國老於東膠養庶老於西膠又曰君子􅂄老不徒行庶人􅂄老不徒食矣又曰文王丗子曰文王謂武王曰汝何夢矣武王對曰夢帝與我九齡帝天也文王曰古者謂年齡齒亦齡也我百爾九十吾與爾三焉文王九十七而終武王九十三而終又􅀕義曰先王之所以治天下者五貴有德貫貫貴老仁長慈㓜爲其近於親也又曰虞夏殷周天下之盛王也未有遺年者年之貴乎天下乆矣次乎事親也又曰天子廵守諸侯待于竟天子先見百年者左傳隱公曰石碏使告于陳曰衛國􅄶小老夫耄矣無能爲也又僖公上曰王使宰孔賜齊侯胙將下拜孔曰且有後命天子使孔曰以伯舅耋老加勞賜一級無下拜又僖公下曰􅁗晉圍鄭佚之狐言於鄭伯曰國危矣􅀂使燭之武見􅁗君師必退公}
  - {type: page-break, offset: 44, content: '', id: KR3k0012_SBCK_383-2b}
  - {type: variant, offset: 44, length: 0, content: '', WYG: 耄矣無能為也又僖公上曰王使宰孔賜齊侯將下拜孔曰且有後命天子使孔曰以伯舅耄老加勞賜一級無下拜又僖公下曰秦晉圍鄭佚之狐言扵鄭伯曰國危矣若使燭之武見秦君師必退公}
  - {type: variant, offset: 44, length: 0, content: '', krp: 士之差者揖君則退八十曰告存每月致膳九十曰有秩秩常也有常膳有虞氏養國老於上庠養庶老於下庠夏后養國老於東序養庶老於西序殷人養國老於右學養庶老於左學周人養國老於東膠養庶老於西膠又曰君子耆老不徒行庶人耆老不徒食矣又曰文王丗子曰文王謂武王曰汝何夢矣武王對曰夢帝與我九齡帝天也文王曰古者謂年齡齒亦齡也我百爾九十吾與爾三焉文王九十七而終武王九十三而終又祭義曰先王之所以治天下者五貴有德貫貫貴老仁長慈㓜爲其近於親也又曰虞夏殷周天下之盛王也未有遺年者年之貴乎天下乆矣次乎事親也又曰天子廵守諸侯待于竟天子先見百年者左傳隱公曰石碏使告于陳曰衛國𥚹小老夫耄矣無能爲也又僖公上曰王使宰孔賜齊侯胙將下拜孔曰且有後命天子使孔曰以伯舅耋老加勞賜一級無下拜又僖公下曰秦晉圍鄭佚之狐言於鄭伯曰國危矣若使燭之武見秦君師必退公}
  - {type: variant, offset: 45, length: 0, content: '', SBCK: 之辤曰臣之壯也猶不如人今老矣無能爲也又襄公六曰晉悼夫人食與人之城􅂎者綘縣人或年長矣無子而往興於食有與疑年使之年使言其年曰臣小人也不知紀年臣生之􅀊正月甲子朔四百有四十五甲子矣其季於今三之}
  - {type: page-break, offset: 45, content: '', id: KR3k0012_SBCK_383-3a}
  - {type: variant, offset: 45, length: 0, content: '', WYG: 之辭曰臣之壯也猶不如人今老矣無能為也又㐮公六曰晋悼夫人食與人之城祀者絳縣人或年長矣無子而往與扵食有與疑年使之年使言其年曰臣小人也不知紀年臣生之嵗正月甲子朔四百有四十五甲子矣其季扵今三之}
