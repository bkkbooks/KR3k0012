  - {type: variant, offset: 1502, length: 2, content: 夜半, SBCK: 上壽百􅀊中壽八十下壽六十孟子曰老吾老以及人之老又曰伯夷避紂居北海之濵太公避紂居東海之濵聞文王作興曰盍歸乎來吾聞西伯善養老者二老者天下之大老也而歸之是天下之父歸之天下之父歸之其子焉徃抱朴子内篇曰余亡祖鴻臚少卿時嘗爲臨沅令云此縣有廖氏家丗壽老或出百年或八九十徙去}
  - {type: variant, offset: 1502, length: 2, content: 夜半, WYG: 上夀百嵗中夀八十下夀六十孟子曰老吾老以及人之老又曰伯夷避紂居北海之濵太公避紂居東海之濵聞文王作興曰盍歸乎來吾聞西伯善養老者二老者天下之大老也而歸之是天下之父歸之天下之父歸之其子焉往抱朴子内篇曰余亡祖鴻臚少卿時常為臨沅令云此縣有廖氏家世夀老或出百年或八九十徙去}
