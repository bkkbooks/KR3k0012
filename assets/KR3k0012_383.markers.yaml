  - {type: variant, offset: 1512, length: 1, content: 恐, SBCK: 田衆老皆拜閭丘先生獨不拜又賜無役諸老復拜閭丘先生又不拜宣王疑而問之對曰來見大王所望者三願賜臣壽賜臣富賜臣貴王曰天命有長短非寡人所制無所壽先生倉粟雖盈備災畜無以富先生大官無闕小官卑賤無以貴先生先生曰所望願王選良吏臣少得壽焉使人以時役無煩苛此臣所以得富焉使少者敬長者長者敬老者此臣所以得}
