  - {type: variant, offset: 3749, length: 685, content: 十無所容入行嫁不售流棄莫執於是乃拂拭短褐自詣宣王願乞一見謁者曰晏齊之不售女也聞大王之聖願備後宮之掃除頓首司馬門外謁者以聞宣王方置酒於漸臺左右聞之莫不掩口而笑王曰此天下強顏女子也乃召見之謂曰昔先王為寡人娶妃疋皆以備有列位者今夫人不容鄉里布衣而欲千萬乘之主有何異乎鍾離春曰竊慕大王之美義耳王曰然何善曰嘗隱善王曰試一行之言未卒忽不見王大驚立發隱書而讀之久不能解明日復召之但揚目御齒舉手拊膝曰殆哉如此者四矣王曰願聞命對曰今大王之國西有橫秦之患南有強楚之讟外有二國之難內藂奸臣眾人不附春秋四十年壯男不立故不務眾子而務眾婦尊所好而忽所恃一旦山陵崩墜社稷不定此一殆也漸臺五層黃金白玉琅玕翡翠萬人疲極比二殆也賢者伏匿於山林諂諛強行於左右耶偽立於本朝不得通入此三殆也酒漿流湎以夜繼晝女樂俳優縱橫大笑外不脩諸侯之禮內不康國家之理此四殆也王闇然無聲喟然而歎曰痛乎無鹽君之言於是立壞漸臺罷女樂退諂諛去彫琢選兵馬實府庫闢四門招進直言卜擇吉日立太子拜無鹽君以為王后齊國大安皆醜女之力也習鑿齒襄陽記曰黃承產沔南名士也謂諸葛孔明曰君擇婦否有醜女黃頭黑色而才堪相配孔明許焉即載送之時人為笑樂鄉里為之嗟曰莫作孔明擇婦正得河外醜女束晢發蒙記曰醜男鬷蔑醜女鍾離春通俗文曰不媚曰㜅音畜可惡曰嬒烏會反大醜曰㚠呼交反醜稱曰娭烏在反何承天纂曰嫫母醜人也楚辭曰西施媞媞而不得見兮嫫母勃屑曰侍而又曰珪璋雜於甑室隴廉與孟陬同宮舉世以為常俗固將愁苦而終窮劉思真醜婦賦曰才質陋且儉姿容劇嫫母鹿頭獼猴面椎額復出口折頞靨樓鼻兩眼䫜一交切如臼膚如老桑皮耳如側兩手宋玉登徒子好色賦曰登徒子妻蓬頭攣耳攣牛善反齞牛美反脣歷齒旁行傴僂又疥且痔, SBCK: ''}
