  - {type: variant, offset: 28, length: 0, content: '', SBCK: 孝子期於盡飬道也老朽也老不死曰仙仙遷也遷入山也周禮夏官司馬曰中春羅春鳥獻鳩以飬國老是時鷹化爲鳩鳩與春鳥變舊爲新以冝養左助生氣也禮記曲禮上曰六十曰􅂄指使七十曰老而傳八十曰耋九十曰耄百年曰期頥鄭􅀇注日耄昏忘也期要也頤養不知衣服食味孝子盡飬之道}
  - {type: page-break, offset: 28, content: '', id: KR3k0012_SBCK_383-1b}
  - {type: variant, offset: 28, length: 0, content: '', WYG: 孝子期扵盡養道也老朽也老不死曰仙仙遷也遷入山也周禮夏官司馬曰中春羅春鳥獻鳩以養國老是時鷹化為鳩鳩與春鳥變舊為新以冝養佐助生氣也禮記曲禮上曰六十曰耆指使七十曰老而傳八十曰耋九十曰耄百年曰期頤鄭元注曰耄昬忘也期要也頤養也不知衣服食味孝子養親期於盡道又曰大夫七十而致仕若不得謝則必賜之几杖行役以婦人適四方乘安車自稱曰老夫又檀弓上曰子夏哀其子而喪其明曽子弔之子夏哭曰天乎予之無罪曽子怒曰吾與汝事夫子扵洙泗之間退而老扵西河之上使西河之民疑汝扵夫子爾罪一}
