  - {type: variant, offset: 49, length: 1, content: 形, SBCK: 之愛其子}
  - {type: variant, offset: 49, length: 1, content: 形, WYG: 之愛其子也亦如予乎侍者曰甚焉小人老而無子知擠于溝壑矣尚書盤庚曰汝無侮老成人無弱孤有㓜又洪範曰五福一曰夀百二十年又無逸曰自時厥後立王生則逸生則逸不知稼穡之艱難不聞小人之勞惟躭樂之從自時厥後亦罔或克夀以耽樂之故從是其後亦無有能夀考又吕刑曰惟吕命王享國百年耄荒度作刑以詰起一切四方言吕侯見命為卿時穆王以享國百年耄荒亂忽雖老而能用賢以揚名論語里仁曰父母之年不可不知}
