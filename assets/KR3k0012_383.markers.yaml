  - {type: variant, offset: 47, length: 1, content: 象, SBCK: 庇民乎對曰老夫罪戾是懼焉能恤逺吾儕偷食朝不謀夕何其長也劉子歸以語王曰諺所謂老將至而耄及之者其趙孟之謂也又曰齊侯田於莒蘆蒱嫳見泣且請曰余髮如此種種余奚能爲種種短也自言衰老不能復爲害又昭公四曰楚靈王至乾溪聞羣公子之死也自投于車下曰}
