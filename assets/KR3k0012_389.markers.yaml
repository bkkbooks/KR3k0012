  - {type: variant, offset: 1545, length: 222, content: 曰此人行必為亂後果為亂階色說文曰晢人色白也皤老人色也韓詩外傳曰閔子始見夫子有菜色後有芻豢之色子貢問其故閔子曰吾出蒹葭之中入夫子之門聞夫子切磋之教竊樂之出見羽盍龍旂又樂之二者相攻胸中是以有菜色今被夫子之文出見羽蓋龍旂視如冀土是以有芻豢之色尚書大傳曰撞鐘蕤賓在外者皆金聲在內者皆玉色禮記表記曰是故君子縗絰則有哀色端冕則有敬色甲胄則有不可辱之色又曰君子不失色於人不失口於人又曰玉藻曰立容德色容莊又曰盛氣闐實陽休玉色言身中氣盛闐蒲若陽氣之休物玉色言不變, SBCK: ''}
