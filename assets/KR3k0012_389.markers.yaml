  - {type: variant, offset: 2569, length: 765, content: 公山上草木皆類人形憮然有懼色後趙錄曰延熙元年石虎遣丞相郭殷持節入廢弘為海陽王弘安步就車容色自若百官莫不流涕春秋後語曰魏文侯謀事而當群臣莫之逮者逮及也朝而喜色吳起進曰昔楚莊王朝而有憂色申公巫臣問曰君有憂色何也莊王曰吾聞諸侯擇師王者擇友霸者自足而群臣莫之若者亡今以不穀之不肖而議於朝群臣莫能逮吾國其幾於亡乎幾近吾是以憂色山海經曰不死民為人黑色壽考不死郭子別傳曰林宗秀立高跱詹然淵渟蔡伯喈告盧子幹馬日磾曰為天下作碑銘多矣未嘗不有慚色唯郭先生碑頌無愧色耳列仙傳曰桂父象林人色時白時黃時赤竹林七賢論曰王戎女適裴氏用匱女為貸錢一萬久而不還女歸戎色不悅遽還錢乃懌瀨鄉記曰老子為人黃色美眉孫卿子曰皋陶之色如削瓜燕丹子曰荊軻入秦秦王陛戟而見燕使鐘鼓並發群臣皆呼萬歲秦武陽大怒面如死灰色郭子曰盧志於眾中問陸士衡陸抗是卿何物荅曰如卿於盧毓士龍失色既出戶謂兄曰何至於此彼或有不知士衡正色曰我父祖名播海內寧有不知識者疑兩陸優劣謝安以此定之世說曰石崇要王敦入學戲見顏淵像石歎曰若與之同昇孔子堂去人何必有間王曰子貢去卿差近石正色曰士處世當令身名俱泰何至以甕牗語人影尚書大禹謨曰惠迪吉從逆凶唯影響東觀漢記曰西羗祖爰劍為秦所奴隸而亡藏巖穴中見焚有影象如虎為蔽火得不死諸羗以為神推以為豪魏略曰何晏性自喜行步顧影山海經曰壽麻之國正立無影疾呼無響郭璞注曰言其形氣有異於人又曰長流山神白帝少昊居之主司反影日西入則反影東照言司察之也孫卿子曰夏首之南有人曰涓蜀梁其人愚宵行俯見其影以為伏鬼仰見其髮以為立魅倍道而走比至其家失氣而卒莊子曰有畏影惡跡而去之走者足舉逾數而跡愈多走逾疾而影不離自以為尚遟疾走不休絕力而死不知處陰以休影處靜以息跡愚亦甚矣又曰岡兩問影曰曩子行今子止曩子坐今子起何其無特操與影曰吾有待而然者耶岡兩影外之微陰也太玄經曰老子行則滅跡立則隱影風俗通曰陳留有富室公年, SBCK: 十}
