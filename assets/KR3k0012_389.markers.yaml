  - {type: variant, offset: 640, length: 0, content: '', WYG: 遂肆志遊遨遍厯諸縣動逾旬朔又曰劉邕所噉食毎異於人性嗜瘡痂以為味似蝮魚常詣孟靈休靈休先患瘡灸痂落床上邕因取食之靈休大驚邕荅云性之所嗜靈休瘡痂未落者悉禠取以貽邕邕既去靈休與何朂書曰邕向顧見噉遂舉體流血南康内史二百許人不問有罪無罪遞與鞭鞭痂常給邕膳齊書曰何脩之字士威廬江人也性好潔一日之中洗滌者十餘過猶恨不足時人稱為水滛于時又有遂安令劉為性彌净潔洒掃縣郭邑無横草漉水湔穢百姓不堪命遂免官又曰王思逺瑯琊臨沂人也好潔衣服垢穢方便不前形儀新楚乃與促膝然既去之後猶令二人交箒掃其坐處又曰眀帝好食逐夷以銀鉢盛蜜漬之一飡數鉢謂王景文曰此味卿頗足不景文曰臣夙好此味貧素致之甚難帝甚悦食逐夷積多胷腹不息氣將絶疾大困一食漬汁猶至三斗終以此卒管子曰吳王好劍而國士輕死墨子曰昔文公好士之惡服大夫䍧羊之裘韋以帶劍大帛之冠越王好士勇自焚其室曰越國之寳悉在此中王自皷蹈火而死者百餘人孟子曰曽晳嗜羊棗而曽子不忍食羊棗莊子曰子張見魯哀公哀公不理曰臣聞君好士不逺千里以見今見公之好士也有似葉公子髙之好龍葉公好龍室屋彫文以畫龍於是天龍聞而歸之見頭於牖拖尾於堂葉公見之棄而還走失其魂魄五神無主是葉公非好龍也好夫似龍而非龍也今君非好士也好夫似士而非士也尹文子曰昔齊桓公好紫闔境不鬻異綵又曰齊宣王好射所用弓不過三石以示左右左右引之皆曰此不下九石而宣王終身自以為用九石韓子曰齊桓公好服紫一國盡服紫當時十素不得一紫公患之管仲曰君欲止之何不試勿衣也謂左右曰甚惡紫臭公曰諾於是三日境内莫不知之又曰楚王與晉厲公戰於鄢陵楚師敗恭王傷目其戰之時司馬子反渇而求飲穀陽䜿操觴酒而進之子反曰此酒也䜿曰非也飲之子反謂之嗜酒弗能絶口又曰公儀休相魯而嗜魚一邦皆買魚而獻之公儀子不受又曰鄒君好服長纓左右皆服纓甚貴鄒君患之問左右對曰君服之百姓亦多服是故貴也鄒君因先自斷其纓而出國皆不服長纓賈誼曰文王使吕望傅太子發嗜鮑魚公不與曰鮑魚不登於俎豈有非禮而可養太子哉説苑曰魏文侯封太子擊於中山三年不往来趙倉唐曰君何不遣人使大國太子曰願之久矣未得可使者對曰臣願奉使於是遣倉唐緤北犬奉晨鳬獻之文侯曰擊愛我知我所嗜好風俗通曰趙王好大眉民間闊半額楚王好廣領國人没頸文士傳曰嵇康性絶巧好鍜家有盛栁樹乃汲水圜之夏天甚凉恒居其下自鍜有人就之康不受其直孝子傳曰隗通字君相犍為僰道人母好飲江脊水常乗船捷致漂浚辛苦忽然有横石特起直江脊後取水無復勞劇又曰陳遺為郡主簿母好食鐺底焦飯常持一囊盛之懸腰下郭子曰陸士衡初入雒張公云宜詣劉道真於是二陸既往劉尚在哀制性嗜酒禮畢初無他言唯問東吳有長柄葫蘆卿得種不陸兄弟殊失望乃云悔往世説曰謝𤣥年少好著紫羅香囊太傅患之而不欲傷其意賭得而焚之又曰林公好鶴往剡東時有人遺其雙鶴少時翅長欲飛林公意甚惜之乃鎩其翮鶴騫翥不能復起乃舒翼反頸視之殊似懊惱意林公曰既有凌霄之姿何肯為人作耳目近翫令翮成遂飛去又曰王武子好驢鳴既葬文帝臨其䘮顧語同遊曰王子好驢鳴可各作聲以送赴客皆一時作驢鳴語林曰王武子死孫子荆哭之甚悲賔客莫不垂涕哭畢向靈座曰卿常好我作驢鳴今我為君作體似聲其賔客皆笑孫聞之曰諸君不死而令王武子死賔客皆怒焉又戴叔鸞母好驢鳴叔鸞毎為驢鳴以樂其母又曰祖約少好財阮遥集好屐並常自經營同是一累而未判其得失有詣祖見料視財物客至拼擋不盡兩小簏以置背後傾身障之意未能平或有詣阮正見自蠟屐因嘆曰未知一生當著㡬兩屐神甚閒暢於是勝負始分也又曰王子猷嘗暫寄人空宅住使令種竹或問暫住何煩爾嘯詠良久直指竹曰何可一日無此君語林曰張湛好於齋前種松柏袁山松出遊好令左右挽歌時人謂張屋下陳尸袁道上行殯曹植求祭先王表曰先王喜鰒魚臣前以表徐州臧覇遺鰒魚二百枚足以供事容止毛詩曰臣工振鷺二王之後来助祭也二王夏殷也其後把宋也振鷺于飛于彼西雍我客戾止亦有斯容箋云有鳥集於西雍之津言所集得其處也亦有斯容言威儀之若鷺然也禮記玊藻曰君子之容舒遲足容重舉欲遲也手容恭髙且正也目容端不睇視也口容止不妄動也聲容静不噦咳也頭容直不傾顧也氣容肅似不息也立容徳如有予也色容莊勃如戰也坐如尸尸居神位敬慎也燕居告温温告謂教使詩云温温恭人凡祭容貌顔色如見所祭䘮容纍纍嬴備貌也色容㒹㒹憂思貌也視容瞿瞿梅梅不審貌也言容繭繭聲氣㣲也戎容暨暨果毅貌也言容詻詻教令嚴也色容厲肅儀刑貌視容清眀察於事立容辨卑毋讇辨讀為貶自貶卑謂磬折也又表記曰容貌以文之衣服以移之是故君子服其服則文以君子之容有其容則文以君子之辭左傳定下曰邾隠公来朝子貢觀焉邾子執玉髙其容仰公受玊卑其容俯子貢曰以禮觀之二君皆有死亡焉論語子張篇曽子曰堂堂乎張也難與並為仁矣言子張容儀盛於仁道薄難勉進漢書曰薛宣好威儀容甚可觀又曰息夫躬河南南陽人也少受春秋通覽詩書容貌壯麗為衆所異又曰江充召見大臺宫自請以所常被服見上上許之充衣紗單衣冠步揺冠為人魁岸容貌甚壯帝望見而異之謂左右曰燕趙固多竒士又曰武帝即位徴天下賢良待以不次之位自􅃷鬻者以千數東方朔上書曰臣朔年二十二長九尺三寸目若懸珠齒若編貝又曰王商為丞相河平四年單于来朝引見丞相坐未央庭中單于前拜謁商商起離席與言單于仰視商貌大畏之遷延却退天子聞而嘆曰此真漢相矣又曰司馬相如字長卿蜀郡成都人也至臨邛富人卓王孫請之相如時從車騎雍容閑雅甚都都美也詩曰不見子都王孫有女文君新寡竊從户窺心説而好之遂夜奔相如又曰雋不疑字曼倩渤海人也暴勝之為直指使者至東海素聞不疑賢請與相見望見不疑容貌尊嚴衣冠甚偉勝之躧履起迎續漢書曰侯覇字君房河南人為人矜嚴有威容家累千金不事産業篤志詩書師事房元常為都講東觀漢記曰上過潁陽祭遵以縣吏數進見上愛其容儀署為門下吏又曰虞延字子太陳留人為督都郵世祖聞而竒之二十年東廵路過小黄髙帝母召陵后園陵在焉時延為都督郵詔呼引見問園陵之事延進止從容跪拜可觀其陵樹株柏皆諳其數爼豆犧牲頗曉其禮帝善之勅延從駕西盡郡界賜錢及劍帶珮刀還郡又曰杜詩薦伏湛䟽曰容貌堂堂國之光輝智畧謀慮朝之淵藪齠齕勵志白首不衰實足以先後王室名足以光示逺人柱石之臣宜居輔弼英䧺記曰袁紹生而孤㓜為郎容貌端正威儀進止動見倣効弱冠除服長有清能名吳書曰張純字元基少厲操行學博才秀切問捷對容止可觀拜郎中補廣徳令治有異績擢為太子輔義都尉吳録曰滕允年十二孤單㡬獨為人白晳威儀可觀毎正朔朝㑹脩覲在位大臣見者莫不歎賞魏志曰延康元年蜀將孟達率衆降達有容止可觀文帝甚器愛之使達為新城太守加散騎常侍蜀志曰魏文帝察黄權有局量試欲驚之遣左右請權未至之間累催相屬焉使奔馳交錯於道官屬莫不禠魄而權舉止顔色自若後領益州刺史大將軍司馬宣王深器之問權曰蜀中有卿軰㡬人權笑而不荅曰不圖眀公見顧之重蜀志曰彭永年廣漢人}
