  - {type: variant, offset: 639, length: 0, content: '', SBCK: 夫造之者去未出户輒令拭席枕床時陳郡殷沖亦好净小人非淨浴新衣不得近左右士大夫小㓗每容接之炳好㓗反是冲每以此譏焉又曰謝靈運出爲永嘉太守郡有名山水靈運素所愛好出守旣不得}
