  - {type: variant, offset: 1769, length: 694, content: 文王世子曰文王之為世子也朝於王季日三其有不安節則內豎以告文王文王色憂行不能正履也左傳僖上曰齊桓公與蔡姬乘舟於囿蕩舟公懼變色又定上曰衛太子蒯聵謂戲陽速曰從我而朝少君少君見我我顧乃殺之速曰諾乃朝夫人夫人見太子太子三顧速不進夫人見其色啼而走曰蒯聵將殺余見太子色變知其欲殺己又哀上曰肉食者無墨墨氣色下公羊傳桓公曰宋督殺其君與夷及其大夫孔父孔父存則殤公不可得殺於是先攻孔父殺之皆死孔父正色立于朝則人莫敢過而致難于其君孔父可謂義形于色矣論語公冶長曰巧言令色足恭左丘明恥之丘亦恥之又陽貨曰巧言令色鮮矣仁又曰子張問令尹子文三仕為令尹無喜色三已之無慍色何如子曰忠矣又鄉黨曰立不中門行不履閾過位色勃如也屏氣似不息者出降一等逞顏色怡怡如也上如揖下如授勃如戰足縮縮如有循享禮有容色私覿愉愉如也愉愉顏色和又曰色思溫貌思恭又曰車中不內顧不疾言不親指色斯舉矣顏色不善則失之又陽貨曰色厲而內荏譬諸小人其猶穿窬之盜也與又顏淵曰子張問士何如斯可謂之達矣子曰何哉爾所謂達者子張對曰在邦必聞在家必聞子曰是聞也非達也夫達也者質直而好義察言而觀色慮以下人夫聞也者色取仁而行違居之不疑又憲問曰賢者辟世世主莫得而臣其次辟地去亂國適理邦其次辟色色斯舉矣其次辟言有惡言乃去漢書曰李廣出右北平胡急擊矢下如雨漢兵死者過半會暮吏士無人色言懼甚也又曰李陵降邊塞以聞上欲陵戰死召陵母及婦使相者視之無死喪色又曰汲黯好游俠任氣節行脩潔其諫犯主之顏色常慕袁盎之為人上方招文學儒者黯曰陛下內多欲而外施仁義奈何欲效唐虞之治乎上怒變色而罷朝公卿皆為黯懼魏氏春秋曰嵇康寓居河內與之遊者未嘗見其喜慍之色世說同魏志曰夏侯玄格量弘濟臨斬顏色不變舉動自若續晉陽秋曰劉毅至黑, SBCK: ''}
