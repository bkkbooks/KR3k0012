  - {type: variant, offset: 3335, length: 406, content: 十無子取田家為婦一交接而死後生男其女誣其淫佚有兒爭財數年不能決丞相邴吉曰吾聞老公子不耐寒又無影時歲八月取同歲小兒解衣裸之此兒獨言寒文曰中獨無影大小歎息因與其財抱朴子曰韓終丹久服立日中無影列仙傳曰河間王家老舍人自言父世見玄俗玄俗無影王呼著日中實無影地鏡圖曰人行日月中無影者神仙人也與虛合體故居日月中無影履霜無跡火中無影也跡史記曰姜嫄為帝嚳元妃出野見巨人跡心欣然踐之而身動如孕朞月而生后稷故詩曰履帝武敏歆武跡也王子年拾遺曰石崇節沉水之香如麋末布置席上使所愛者踐之無跡者即賜真珠百琲若有跡者便節其飲食令體輕弱故中國相戲曰爾非細骨輕軀那得百琲真珠又曰燕王時廣延之國獻善舞者二人王設麟文之席散荃蕪之香使二人舞其上彌日無跡體輕故也述征記曰齊有龍盤山上有大腳姜嫄所履跡盛弘之荊州記曰零陵縣上石有夸父跡又曰湘東陰山縣北數十里有武陽龍靡二山上悉生松柏美木龍靡山有盤石石上有仙人跡及龍跡傳云昔仙人遊此二山常稅駕此石又於其所得仙人遺詠, SBCK: ''}
