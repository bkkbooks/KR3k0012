  - {type: variant, offset: 1334, length: 3, content: 多慷慨, SBCK: 􅀏容皃矜整有珪璋威重未常失色於物非其人或終日不言顔含别傳曰顔髦字居道含之子也少慕家業惇於孝行儀狀嚴整風皃端羙桓公見而歎曰顔侍中廊廟之望也桓邵别傳曰邵字敬倫丞相之第五子清貴簡素風姿甚羙而善治容儀雖家人近習莫見其怠墮之皃温見而稱之曰可謂鳯鶵郭子同三輔決録曰竇叔髙名􅀇爲上郡計吏朝㑹數百人儀狀絶衆天子異之詔以公主妻之出同軰調􅀏焉叔髙時巳自有妻不敢以聞方欲迎婦與訣未發而詔召叔髙就第成婚益部􅂄舊傳曰張肅有威儀容貌甚偉弟松爲人短小不持節操然識逹精果有材幹劉璋乃遣詣曹公曹公不甚禮楊修深器之脩以所撰兵書示松飲讌之間一省即便闇誦修以此異之㑹稽典録曰賀邵善容止正其衣􅃣尊其瞻視動静有常與人交乆益敬之至於官府左右莫見其跣坐常着韈希見其足荀氏家傳曰荀羡風器英秀識准摽貴明􅂡眉羙音氣俯仰頋盻容止可則丗說曰太尉揔角時常造公司徒王衍神情明秀風姿詳雅山公嗟嘆者良乆旣去目之而言曰何物老嫗生此寧馨児然􅂲誤天下生民者未必非此人}
  - {type: page-break, offset: 1334, content: '', id: KR3k0012_SBCK_389-10a}
  - {type: variant, offset: 1334, length: 3, content: 多慷慨, WYG: 笑容貌矜整有圭璋威重未嘗失色於物非其人或終日不言顔含别傳曰顔髦字居道含之子也少慕家業惇於孝行儀狀嚴整風貌端美桓公見而歎曰顔侍中廊廟之望也桓邵别傳曰邵字敬倫丞相之第五子清貴簡素風姿甚美而善治容儀雖家人近習莫見其怠惰之貌温稱之曰可謂鳯雛三輔决録曰竇叔髙名元為上郡計吏朝㑹數百人儀狀絶衆天子異之詔以公主妻之出同軰調笑焉叔髙時已自有妻不敢以聞方欲迎婦與訣未發而詔召叔髙就第成婚益部耆舊傳曰張肅有威儀容貌甚偉弟松為人短小不持節操然識達精果有材幹劉璋乃遣詣曹公曹公不甚禮楊脩深器之脩以所撰兵書示松飲讌之間一省即便闇誦脩以此異之㑹稽典録曰賀邵善姿容正其衣冠尊其瞻視動静有常與人交久益敬之至於官府左右莫見其跣坐常着韈希見其足荀氏家傳曰荀羡風器英秀識雅標貴眀鬚眉俊音氣俯仰顧盻容止可則世説曰太尉總角時嘗造山司徒王神情眀秀風姿詳雅山公嗟嘆者良久既去目之而言曰何物老嫗生爾寧馨児然恐誤天下生民者未必非此人}
