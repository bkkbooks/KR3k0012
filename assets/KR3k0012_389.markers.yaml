  - {type: variant, offset: 640, length: 0, content: '', krp: 遂肆志遊遨遍歷諸縣動逾旬朔又曰劉邕所噉食毎異於人性嗜瘡痂以爲味似蝮魚常詣孟靈休靈休先患炙瘡瘡痂落床上邕因取食之靈休大驚邕荅云性之所嗜靈休瘡痂未落者悉禠取以貽邕邕旣去靈休與何朂書曰邕向見噉遂舉體流血南康囚史二百許人不問有罪無罪逓㸦與鞭鞭痂常給邕膳齊書曰何修之字士威廬江人也性好㓗一日之中洗滌者十餘過猶恨不足時人稱爲水淫于時又有遂安令劉爲性弥浄㓗縣中洒掃郭邑無撗草水湔塵穢百姓不堪命㘴免官又曰王思逺瑯瑘臨沂人也好簡㓗衣服垢穢方便不前形像新楚乃與促膝雖然旣去之後猶令二人交箒掃其㘴處又曰明帝好食逐夷以銀鉢盛宻漬之一飡數鉢謂王景文曰此味卿頗足不景文曰臣夙好此味貧素致之甚難帝甚恱食逐夷積多胸腹不息氣將絶疾大困一食漬汁猶至三㪷終以此卒管子曰呉王好劒而國士輕死墨子曰晉文公好士之惡服大夫䍧羊之裘韋以帶劒大帛之冠越王好士勇自焚其室曰越國之寳悉在此中王自鼓蹈火而死者百餘人孟子曰曽晢嗜羊棗而曽子不忍食羊棗羊棗大棗也莊子曰子張見魯哀公哀公不禮曰臣聞君好士不逺千里以見公今見公之好士也有似葉公子髙之好龍葉公好龍室中彫文盡以爲龍於是天龍聞而下之窺頭於牖拖尾於堂葉公見之弃而還走失其魂魄五神無主是葉公非好龍也夫似龍而非龍也今君非好士也夫似士而非士也新序同尹文子曰昔齊桓公好紫闔境不鬻異綵又曰齊宣王好射所用弓不過三石以示左右左右引之皆曰此不下九石而宣王終身自以爲用九石韓子曰齊桓公好服紫一國盡服紫當時十素不得一紫公患之管仲曰君欲止之何不試勿衣也謂左右曰甚惡紫臭公曰諾於是三日境内莫有衣紫又曰楚恭王與晉厲公戰于鄢陵楚師敗恭王傷目其戰之時司馬子反渴而求飲榖陽竪操觴酒而進之子反曰此酒也竪曰非也飲之子反謂之嗜酒弗能絶口又曰公儀休相魯而嗜魚一邦皆爭買魚而獻之公儀子不愛又曰鄒君好服長纓左右皆服纓纓甚貴鄒君患之問左右對曰君服之百姓亦多服是故貴也鄒君因先自斷其纓而出國中皆不服長纓賈誼曰文王使吕望傅太子發發嗜鮑魚公不與曰鮑魚不登於爼豈有非禮而可養太子哉說苑曰魏文侯封太子擊於中山三年不徃來趙倉唐曰君何不遣人使大國太子曰願之乆矣未得可使者對曰臣願奉使於是遣倉唐緤北大奉晨鳬獻之文侯曰擊愛我知我所嗜好韓詩外傳同風俗通曰趙王好大眉民闊半額楚王好廣領國人没頸文士傳曰嵆康性絶巧好鍜家有盛栁樹乃激水圜之夏天甚凉恒居其下自鍜有人就者康不受其直孝子傳曰隗通字君相犍爲𤏡道人母好飲江脊水常乗舡捷致漂浚辛苦忽然有撗石特起直江脊後取水無復勞劇又曰陳遺爲郡主簿母好食鐺底焦飯常持一囊盛之懸案下郭子曰陸士衡𥘉入雒張公云冝詣劉道眞於是二陸旣徃劉尚在哀制性嗜酒禮畢𥘉無他言唯問東吴有長柄胡盧卿得種不陸兄弟珠失望乃云悔徃丗說曰謝遏年少玄也好着紫羅香囊太傅患之而不欲傷其意賭得而焚之又曰林公好鶴徃剡東時有人遺其雙鶴少時翅長欲飛林公意甚惜之乃鎩其翮鶴騫翥不能復起乃舒翼反頭視之如似懊惱意林公曰旣有凌霄之姿何肯爲人作耳目近翫養令翮成遂飛去又曰王武子好驢鳴旣葬文帝臨其喪顧語同遊曰王子好驢鳴可各作聲以送赴客皆一時作驢鳴語林曰王武子死孫子荆哭之甚悲賔客莫不垂涕哭畢向靈座曰卿嘗好我作驢鳴令我爲君作驢鳴聲似真賔客皆笑孫聞之曰諸君不死而令王武子死賔客皆怒焉又戴叔鸞母好驢鳴叔鸞毎爲驢鳴以樂其母又曰祖約少好財阮遥集好屐並常自經營同是一累而未判其得失有詣祖見料視財物客至併當不盡餘兩小􅼣以置背後傾身障之意未能平或有詣阮正見自蠟屐因歎曰未知一生當着幾緉屐神甚閑暢於是勝負始分也又曰王子猷嘗暫寄人空宅住使令種竹或問暫住何煩尓嘯詠良夕直指竹曰何可一日無此君語林曰張湛好於齋前種松栢袁山松出遊好令左右挽歌時人謂張屋下陳尸袁道上行殯曹植永祭先王表曰先王喜鰒魚臣前以表徐州臧霸遺鰒魚二百枚足自供事容止毛詩曰臣工振鷺二王之後來助祭也二王夏殷也其後𣏌宋也振鷺于飛于彼西雍我客戾止亦有斯容箋云自鳥集於西雍之澤言所集得其有斯容言威儀之若鷺然也禮記玉藻曰君子之容舒遲足容重舉欲遲也手容恭髙且正也目容端不睇視也口容止不妄動也聲容静不􅎪咳也頭容直不傾顧也氣容肅似不息也立容德如有予也色容莊勃如戰色㘴如尸尸居神位敬慎也燕居告温温告謂教使也詩云温温恭人凡祭容貌顔色如見所祭者喪容纍纍嬴憊貌也色容顚顚憂思貌也視容瞿瞿梅梅不審貌也言容繭繭聲氣微也戎容曁曁果毅貌也言容詻詻教令嚴也色容厲肅儀形貌也視容清明察於事也立容辨卑母讇辯讀爲貶自貶卑謂聲磬折也又表記曰容貌以文之衣服以移之是故君子服其服則文以君子之容有其容則文以君子之辭左傳定下曰邾隱公來朝子貢觀焉邾子執玉髙其容仰公受玉卑其容俯子貢曰以禮觀之二君者皆有死亡焉論語子張曰曽子曰堂堂乎張也難與並爲仁矣言子張容儀盛而於仁道薄難勉進漢書曰薛宣好威儀容止甚可觀又曰息夫躬河内陽人也少受春秋通覽詩書容貌壯麗爲衆所異又曰江充召見大臺宫自請以所常𬒳服見上上許之充衣紗縠單衣冠歩摇冠爲人魁岸容貌甚壯帝望見而異之謂左右曰燕趙固多竒士又曰武帝即位徵天下賢良待以不次之位自衒鬻者以千數東方朔上書曰臣朔年二十二長九尺三寸目若懸珠齒若編貝又曰王商爲丞相河平四年單于來朝引見丞相㘴未央庭中單于前拜謁商商起離席與言單于仰視商貌大畏之遷延却退天子聞而歎曰此眞漢相矣又曰司馬相如字長卿蜀郡成都人也至臨卭富人卓王孫請之相如時從車騎雍容閑雅甚都羙也詩曰不見子都都王孫有女文君新寡竊從户窺心說而好之遂夜奔相如又曰雋不疑字曼倩渤海人也暴勝之爲直指使者至東海素聞不疑賢請與相見望見不疑容皃尊嚴衣冠甚偉勝之躧履起迎續漢書曰侯霸字君房河南人爲人矜嚴有威容家累千金不事産業篤志詩書師事房元常爲都講東觀漢記曰上過頴陽祭遵以縣吏數進見上愛其容儀署爲門下吏又曰虞延字子太陳留人爲都督郵丗祖聞而竒之二十年東廵路過小黄髙帝母昭陵后園陵在焉時延爲都督郵詔呼引見問園陵之事延進旨從容跪拜可觀其陵樹株栢皆諳其數爼豆犠牲頗曉其禮帝善之勑延從駕西盡郡界賜錢及劒帶佩刀還郡又曰杜詩薦伏湛䟽曰容皃堂堂國之光輝智略謀慮朝之淵藪齠齓勵志白首不衰實足以先後王室名足以光示逺人柱石之臣宜居輔弼英雄記曰袁紹生而孤㓜爲郎容皃端正威儀進止動見倣効弱冠除復陽長有清能名呉書曰張純字元基少厲操行學博才秀切問捷對容止可觀拜郎中𥙷廣德令治有異績擢爲太子輔義都尉呉録曰滕胤年十二孤單焭獨爲人白晢威儀可觀毎正朔朝㑹脩覲在位大臣見者莫不歎賞魏志曰延康元年蜀將孟逹率衆降逹有容止可觀文帝甚器愛之使逹爲新城太守加散騎常侍蜀志曰魏文帝察黄權有局量試欲驚之遣左右請權未至之間累催相屬馬使奔馳交錯於道官屬莫不禠魄而權舉止顔色自若後領益州刺史大將軍司馬宣王深器之問權曰蜀中有卿軰幾人權笑而不荅曰不圗明公見頋之重蜀志曰彭永年廣漢人}
