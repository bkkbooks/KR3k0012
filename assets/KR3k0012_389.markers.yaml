  - {type: variant, offset: 3, length: 0, content: '', WYG: 三十嗜好容止嗜好禮記檀弓上曰孔子與門人立拱而尚右}
  - {type: variant, offset: 3, length: 0, content: '', krp: 三十嗜好容止嗜好禮記檀弓上曰孔子與門人立拱而尚右}
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 三子亦皆尚右孔子曰二三子之嗜學也我則有姉之䘮故也二三子皆尚左喪上右隂也􅁻上左陽也又􅀕義曰先王之孝也心志嗜欲不忘乎心又􅀕統曰不齊則於物無防也嗜欲無止也及其將齋也防其邪物訖其嗜欲耳不聽樂左傳閔公曰衛懿公好鶴鶴有乗軒者及有狄人之難國人皆曰鶴實有禄位余焉能戰遂敗又僖中曰齊侯好内多内寵内嬖如夫人者六人左傳襄公曰鄭伯有好田而嗜酒爲窟室而夜飲酒擊鍾焉朝至未巳朝者曰公焉在家臣故謂伯有爲公其人曰吾公在壑谷壑谷窟室又昭公曰莒子􅁃輿虐而好劒苟鑄劒必試諸人又哀上曰曹伯陽即位好田弋曹鄙人公孫彊好弋獲白鴈獻之公羊傳僖公曰虞公貪而好寳及爲晉所滅抱寳牽馬而出國語曰屈到嗜艾有疾召其宗老而屬之􅀕我必以艾子木曰夫子不以私欲奸國之典言不犯常法遂不用論語公冶長曰子曰}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_389-1b}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 三子亦皆尚右孔子曰二三子之嗜學也我則有姊之䘮故也二三子皆尚左䘮尚右隂也吉尚左陽也又祭義曰先王之孝也心志嗜欲不忘乎心又祭統曰不齋則於物無防也嗜欲無止也及其將齋也防其邪物訖其嗜欲耳不聽樂左傳閔公曰衛懿公好鶴鶴有乗軒者及有狄人之難國人皆曰鶴實有禄位余焉能戰遂敗又僖中曰齊侯好内多内寵内嬖如夫人者六人左傳襄公曰鄭伯有好田而嗜酒為窟室而夜飲酒擊鐘焉朝至未已朝者曰公焉在家臣故謂伯有為公其人曰吾公在壑谷壑谷窟室又昭公曰莒子庚輿虐而好劍苟鑄劍必試諸人又哀上曰曹伯陽即位好田弋曹鄙人公孫疆好弋獲白鴈獻之公羊傳僖公曰虞公貪而好寳及為晉所滅抱寳牽馬而出國語曰屈到嗜芰有疾召其宗老而屬之祭我必以芰子木曰夫子不以私欲奸國之典言不犯常法遂不用論語公冶長子曰}
