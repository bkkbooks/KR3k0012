  - {type: variant, offset: 634, length: 2, content: 孟孫, SBCK: 子張南陽人爲人好酒豁逹敢直言時在御前靣折同列以爲􅀏樂典略曰荆州牧劉表跨有南土子弟驕貴並好酒設大針於杖端客有醉寢伏輒以劖鋤衘切刺驗其醒醉晉書曰王濟好弓馬嘗乗一馬着連乾鄣泥前有水終不肯渡濟云此必是惜鄣泥使人解去便渡故杜預謂濟有馬癖晉中興書曰郭璞性輕易不持威儀嗜酒好色或過度其友人于寳常誡之曰此非適性爾璞曰吾所受有夲限用之􅁪恐不盡乃憂爲害乎後魏書曰辛少雍字季仲}
