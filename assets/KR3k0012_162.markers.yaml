  - {type: variant, offset: 3384, length: 2, content: 河間, SBCK: 宻雲郡禹貢冀州之域春秋戰國時並爲燕地秦爲漁陽郡在漢領白檀等十二縣又曰夲漢虒奚縣漁陽屬郡漢志曰虒奚屬漁陽郡莽曰敦德虒音題又曰燕東有漁陽郡漢書曰漢李廣弭節白檀魏書曰曹公越北塞歷白檀破烏丸於柳城續漢書曰白檀縣即右北平嬀州十道志曰嬀州嬀川郡禹貢冀州之域舜曁周爲幽州之域春秋戰國並屬燕國秦併天下爲上谷郡爲潘縣也漢志曰燕西有上谷郡又曰上谷郡秦置莽曰朔調属幽州領縣十五又曰潘縣屬上谷郡莽曰樹武潘曰普半反晉太康地里志曰潘縣更屬廣􅇞郡史記曰軒轅黄帝戰於阪泉之野十道志曰阪泉在懷戎縣周書曰黄帝殺􅃖尤於中冀名曰絶轡之野亦其地史記曰燕築長城自造陽至襄平造陽即嬀州之地名也平州十道志曰平州北平}
