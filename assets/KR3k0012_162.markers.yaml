  - {type: variant, offset: 60, length: 982, content: 禹貢曰覃懷底績至于衡漳後漢書曰光武定河內而難其守問於鄧禹曰諸將誰可使守河內者禹曰昔高祖任蕭何於關中無復西顧之憂今河內帶河為固戶口殷實北通上黨南迫洛陽寇恂文武備足非此子不可也乃拜恂為河內太守恂移書屬縣講兵肄射伐湛園之竹以為矢養馬收租以給軍左傳曰周與鄭人蘇仇生之田州陘隤懷州今河內縣又曰襄王賜晉文公以陽樊溫原攢茅之田晉於是始啟南陽在晉山之南河之北故曰南陽元和郡縣圖曰河內縣春秋野王邑也左傳曰晉人執晏弱于野王漢志曰武德縣屬河內始皇東巡自以武德定天下故名之也十道志曰脩武本甯邑也韓詩外傳曰武王伐紂勒兵於甯故改曰脩武韓非書曰秦昭王敗趟長平西伐脩武漢書曰漢武帝將幸緱氏至汲縣之新中鄉得南越相呂嘉首因立為獲嘉縣孟州圖經曰孟州河陽郡禹貢冀豫二州之境則武王伐紂會盟津是也周為畿內蘇忿生之邑後為晉邑左傳曰晉侯召王以諸侯見且使王狩仲尼曰以臣召君不可以訓故書曰天王狩于河陽北齊書曰神武使潘岳鎮北城又使高永樂守南城以備西魏又東魏所築中潬城仍置河陽關故有河陽三城侯使冀州圖經曰河陽在河內郡南六十四里有宮有關晉書曰潘岳才名冠世為眾所嫉出為河陽令左傳隱三年曰鄭祭足帥師取溫之麥秋又取成周之禾又僖十年狄滅溫今河內溫縣溫子奔衛周襄王以地賜晉文公衛州元和郡縣圖曰衛州汲郡禹貢冀州之域後為殷都衛縣界朝歌是也戰國時屬魏秦屬河東郡漢為汲縣地地理志曰河內殷之舊都周既滅殷分其畿內為三國詩風邶庸衛是也邶以封紂子武庚鄘管叔尹之衛蔡叔尹之以監殷人謂之三監史記曰周旦以成王命興師殺武庚祿父殺管叔放蔡叔以殷余民封康叔為衛君居河淇之間故商墟漢志曰朝歌屬河內紂所都周武王弟康叔所封更名衛王莽曰雅歌劉子曰邑號朝歌墨子迴車後漢書曰虞詡為朝歌令多盜連年不解親舊多勞弔之曰得朝歌何衰也詡笑曰難者不避易者必從臣之節也詡謁河內太守馬稜稜曰君儒者乃在朝歌甚為君憂之詡曰賊犬羊相聚以求飽暖耳去敖倉不過百里不知取以為糧青冀流民不知掠以為眾守其阨塞此為斷天下之右臂也今則不然此無大計之效也詡悉平之春秋後序曰太康五年吳寇始平余自江陵還襄陽解甲休兵乃申予舊意修成春秋釋例及經傳集解始訖會汲郡汲縣有發其界內舊塚者得古書皆簡編科斗文字發塚者不以為意往往散亂科斗書久廢推尋不能盡通始者藏在祕府余晚得見之劉澄之山川古今記曰黎陽古黎國也詩曰黎侯寓于衛是也相州元和郡縣圖曰相州鄴郡禹貢冀州之域春秋時地屬晉戰國時屬魏魏文侯使西門豹守鄴是也秦併天下為邯鄲上黨二郡之, SBCK: ''}
