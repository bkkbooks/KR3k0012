  body:
  - {type: variant, offset: 3, length: 2, content: 上懷, SBCK: 中魏􅀶莫深昜幽順歸順􅃰薊燕檀嬀平營德棣滄貝魏州元和郡縣圖志曰魏州魏郡禹貢兖冀二州之域在夏即觀扈之國春秋時爲晉地戰國時爲衛魏二國之地秦滅魏置東郡滅趙置邯鄲郡漢以秦邯鄲之南部東郡之邊縣置魏郡後漢封曹操爲魏王治鄴史記曰邯鄲亦漳河之間一都㑹也北通燕􅃰南有鄭衛俗與趙相􅀋然近梁魯重義而務節漢書曰邯鄲土廣俗新大率精急髙氣􅀔輕爲姦漢􅀄分邯鄲之南部置魏郡漢志曰魏郡王莽曰魏成領鄴館陶等十八縣又曰元城屬魏郡魏武侯公子元食邑於此因而氏焉後漢書曰曹操爲魏公操分魏郡爲東西部置都尉元和郡縣志曰元城縣有沙麓山即春秋經所書沙麓崩後爲漢元后興之象也愽州元和郡縣志曰愽州􅀶平郡禹貢兖州之域春秋時齊之西界聊攝地也戰國時爲齊地秦漢爲東郡地左傳齊晏子對景公曰聊攝以東其爲人也多矣史記曰齊田單攻聊城歳餘士卒多死而聊不下魯仲連爲書約之矢以遺城中燕將得魯連書泣三日猶與不能决乃自殺史記曰齊威王伐晉至愽陵徐廣注曰東郡之􅀶平也莫州十道志曰莫州大安郡其地歷代所屬與瀛州同唐景雲二年分瀛州置漢志曰鄚縣屬􅃰郡王莽曰言符郡國志曰鄚縣有昜京城後漢末公孫瓉築京以自固圍壍十重以䥫爲門諸將家家作樓以千計並髙五六丈爲􅀽紹所攻城樓皆䧟没圖經曰清苑縣本漢樂郷縣也漢志曰樂郷屬信都王莽曰樂丘史記曰漢髙祖過趙問樂毅有後乎對曰有樂臣叔遂封樂叔於此後漢書曰獻帝􅀄公孫瓉據幽州先是有童謡曰燕南垂趙北際中間不合大如礪唯有此中可避丗瓉以易地當之乃築京以自固也深}
