  - {type: variant, offset: 1636, length: 266, content: 平是郡國志曰邢州尚書坊東平地周百餘步其所鳴響人馬行上轟轟有聲掘之即火出十三州志曰鉅鹿唐虞時大麓之地尚書堯試舜百揆納于大麓麓則林之大者堯之禪舜欲使天下皆見之故合群臣與百姓納之大麓之野然後授受以明已禪也張耳傳曰高祖從平城還過趙趙王自上食禮甚卑高祖箕踞趙相貫高等乃壁人柏人要之上過欲宿心動問縣名為何曰柏人上曰柏人者迫於人也不宿而去柏人今堯山縣冀州十道志曰冀州信都郡元和郡縣圖曰春秋時屬晉七國時屬趙在秦屬鉅鹿郡李公緒趙記曰趙孝成王造壇臺之宮為趙都朝諸侯故曰信都史記曰秦時有客說張耳曰兩君羈旅難以獨立立趙後扶以義可以就功乃求趙歇立為趙王居信都, SBCK: 望亭}
