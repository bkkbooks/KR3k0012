  - {type: variant, offset: 722, length: 801, content: 衛王莽曰雅歌劉子曰邑號朝歌墨子迴車後漢書曰虞詡為朝歌令多盜連年不解親舊多勞弔之曰得朝歌何衰也詡笑曰難者不避易者必從臣之節也詡謁河內太守馬稜稜曰君儒者乃在朝歌甚為君憂之詡曰賊犬羊相聚以求飽暖耳去敖倉不過百里不知取以為糧青冀流民不知掠以為眾守其阨塞此為斷天下之右臂也今則不然此無大計之效也詡悉平之春秋後序曰太康五年吳寇始平余自江陵還襄陽解甲休兵乃申予舊意修成春秋釋例及經傳集解始訖會汲郡汲縣有發其界內舊塚者得古書皆簡編科斗文字發塚者不以為意往往散亂科斗書久廢推尋不能盡通始者藏在祕府余晚得見之劉澄之山川古今記曰黎陽古黎國也詩曰黎侯寓于衛是也相州元和郡縣圖曰相州鄴郡禹貢冀州之域春秋時地屬晉戰國時屬魏魏文侯使西門豹守鄴是也秦併天下為邯鄲上黨二郡之地漢高帝分置魏郡治鄴尚書曰河亶甲居相後魏書曰道武幸鄴訪立州名尚書崔光對曰昔河亶甲居相宜曰相州道武從之漢志曰魏郡領鄴館陶斥丘等一十八縣後魏書曰文帝太和十八年卜遷都經鄴登銅雀臺御史崔光等曰鄴城平原千里漕運四通有西門使起舊跡可以饒富在德不在險請都之孝文曰君知其一未知其二鄴城非長久之地石虎傾於前慕容減於後國富主奢暴成速敗且西有枉人山東有列人縣北有柏人城君子不飲盜泉惡其名也遂止魏書曰黃武二年以魏郡東部為陽平郡西部為廣平郡廣平陽平魏平三郡為三魏也圖經曰安陽紂都也在淇洹二水之間本殷墟所謂北冢是也戰國策曰紂昔聚兵百萬左飲淇水使竭右飲洹水不流晉書載記曰石勒諸將佐議欲都鄴將攻三臺張賓進曰三臺險固攻守未可卒下於是進襄國漢志曰內黃屬魏郡春秋吳子晉侯會于黃池今黃澤在西陳留有外黃故加內云洺州十道志曰洺州廣平郡屬禹貢冀州之域春秋時為赤狄之地後屬晉左傳晉荀林父敗赤狄于曲梁是也七國時屬趙秦併天下為邯鄲郡漢初置廣平國禹貢曰覃懷底績至于衡漳衡漳在肥鄉縣左傳曰公會單頃公及諸侯同盟于雞澤杜注云雞澤在廣平曲梁縣漢志廣平國領縣十六武帝征和二年改為平于國宣帝復故王莽曰富昌十道志曰洺水縣本漢斥漳縣, WYG: ''}
