  - {type: variant, offset: 2616, length: 289, content: 常山郡元和郡縣圖曰禹貢冀州之域周為并州地春秋時為鮮虞國戰國時屬趙秦兼天下為鉅鹿郡十三州志曰真定本名東垣以河東有垣故此加東耳漢書曰高帝時代相陳豨反使趙利守東垣上自攻之不下卒罵帝帝怒增兵急攻城斬罵者改曰真定漢志曰井陘屬常山郡穆天子傳曰天子獵于鉶山注曰燕趙謂山脊為鉶即今井陘是史記曰秦始皇十七年改趙王剪下井陘元和郡縣圖曰靈壽縣本中山國都也十三州志曰中山武公本周之同姓其後桓公不恤國政晉太史餘見周王王問之諸侯孰先亡對曰中山之俗以晝為夜以臣觀之中山其先亡乎其後魏樂羊為文侯將拔中山封之靈壽戰國策曰九門縣本有九室而居趙武靈王改為九門縣史記曰趙惠王三十八年藺相如城九門大城定州十道志曰定州愽陵, SBCK: 范陽}
