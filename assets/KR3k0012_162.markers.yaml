  - {type: variant, offset: 3, length: 2, content: 上懷, WYG: 中魏州博州莫州深州易州幽州順州涿州薊州燕州檀州媯州平州營州徳州棣州滄州貝州魏州元和郡縣志曰魏州魏郡禹貢兖冀二州域在夏即有扈之國春秋時為晉地戰國時為衛魏二國地秦滅魏置東郡滅趙置邯鄲郡漢置魏郡後漢封曹操為魏王史記曰邯鄲亦漳河之間一都㑹也北通燕涿南有鄭衛俗與趙相類然近梁魯重義而矜節漢書曰邯鄲土廣俗雜大率精急髙氣勢輕為姦漢志曰魏郡王莽曰魏成領鄴館陶等十八縣後漢書曰曹操為魏公操分魏郡為東西部置都尉元和郡縣志曰元城縣有沙麓山即春秋經所書沙麓崩後為漢元后興之象也博州元和郡縣志曰博平郡禹貢兖州之域春秋時齊之西界聊攝地也戰國時為齊地秦漢為東郡也史記曰齊田單以聊城嵗餘士卒多死而聊城不下魯仲連為書約之矢以射城中燕將見書猶豫不决乃自殺史記曰齊威王伐晉至北陵徐廣注曰東郡之博平莫州十道志曰莫州文安郡其地厯代所屬與瀛州同唐景雲二年分瀛州置漢志曰鄚縣屬涿郡王莽曰言符郡國志曰鄚縣有易京城漢末公孫瓉築京以自固圍塹十重以鐡為門諸將家作樓以千計並髙五六丈為袁紹所攻城樓皆䧟沒圖經曰清苑縣本漢樂鄉縣也漢志曰樂鄉屬信都王莽曰樂丘史記曰漢髙祖過趙問樂毅有後世乎對曰有樂叔髙帝封之樂鄉後漢書曰獻帝初公孫瓉據幽州先是有童謡曰燕南垂趙北際中間不合大如礪惟有此中可避世瓉以易地當之乃築京以自固也深}
