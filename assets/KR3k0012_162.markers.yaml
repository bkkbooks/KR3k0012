  - {type: variant, offset: 3032, length: 225, content: 在豐義縣十道志曰唐縣本春秋時鮮虞邑也漢為唐縣地漢志曰唐縣屬中山國王莽曰和親故堯國也堯為唐侯邑於此堯山在唐東北望都界孟康曰晉荀吳伐鮮虞入中人今中人亭是應劭風俗通曰中人城北四十里有左人亭鮮虞故邑左人亭即唐縣也漢書曰望都屬中山國莽曰順調堯山在北堯母慶都山在南登堯山見都山故以為名圖經曰陘邑縣本七國時中山國之苦陘縣也史記曰李克為中山相苦陘之吏上計入多於前克曰苦陘上無山林之饒下無藪澤牛馬之息而入多於前是擾亂吾民也於是免之十道志曰鼓城縣春秋鼓子之邑漢下曲陽之地, SBCK: ''}
