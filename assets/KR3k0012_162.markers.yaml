  - {type: variant, offset: 1072, length: 451, content: 尚書崔光對曰昔河亶甲居相宜曰相州道武從之漢志曰魏郡領鄴館陶斥丘等一十八縣後魏書曰文帝太和十八年卜遷都經鄴登銅雀臺御史崔光等曰鄴城平原千里漕運四通有西門使起舊跡可以饒富在德不在險請都之孝文曰君知其一未知其二鄴城非長久之地石虎傾於前慕容減於後國富主奢暴成速敗且西有枉人山東有列人縣北有柏人城君子不飲盜泉惡其名也遂止魏書曰黃武二年以魏郡東部為陽平郡西部為廣平郡廣平陽平魏平三郡為三魏也圖經曰安陽紂都也在淇洹二水之間本殷墟所謂北冢是也戰國策曰紂昔聚兵百萬左飲淇水使竭右飲洹水不流晉書載記曰石勒諸將佐議欲都鄴將攻三臺張賓進曰三臺險固攻守未可卒下於是進襄國漢志曰內黃屬魏郡春秋吳子晉侯會于黃池今黃澤在西陳留有外黃故加內云洺州十道志曰洺州廣平郡屬禹貢冀州之域春秋時為赤狄之地後屬晉左傳晉荀林父敗赤狄于曲梁是也七國時屬趙秦併天下為邯鄲郡漢初置廣平國禹貢曰覃懷底績至于衡漳衡漳在肥鄉縣左傳曰公會單頃公及諸侯同盟于雞澤杜注云雞澤在廣平曲梁縣漢志廣平國領縣十六武帝征和二年改為平于國宣帝復故王莽曰富昌十道志曰洺水縣本漢斥漳縣, SBCK: ''}
