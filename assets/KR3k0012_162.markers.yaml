  - {type: variant, offset: 3384, length: 2, content: 河間, WYG: 宻雲郡禹貢冀州之域春秋戰國時並為燕地秦為漁陽郡在漢領白檀等十二縣又曰本漢厗奚縣屬漁陽郡漢志曰厗奚屬漁陽莽曰敦徳厗音題又曰燕東有漁陽郡漢書曰漢李廣弭節白檀魏書曰曹公越北塞厯白檀破烏丸於桞城續漢書曰白檀縣即右北平媯州十道志曰媯州媯川郡禹貢冀州之域舜暨周為幽州之域春秋戰國並屬燕國秦倂天下為上谷郡為潘縣也漢志曰燕西有上谷郡又曰上谷郡秦置莽曰朔調屬幽州領縣十五又曰潘縣屬上谷郡莽曰樹武潘音普半反晉太康地理志曰潘縣更屬廣寗郡史記曰軒轅黄帝戰於阪泉之野十道志曰阪泉在懐戎縣周書曰黄帝殺蚩尤於中冀名曰絶轡之野亦其地史記蘇秦往説燕文侯曰燕東有朝鮮遼東北有林胡樓煩西有雲中九原南有呼沲易水地方二千里帶甲數十萬史記曰燕築長城自造陽至襄平造陽即媯州之地名也平州十道志曰平州北平}
