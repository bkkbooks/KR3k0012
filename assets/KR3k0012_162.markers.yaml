  - {type: variant, offset: 3402, length: 0, content: '', krp: 周爲幽州之地春秋時爲山戎孤竹白狄肥子二國地秦兼天下爲遼西郡肥如縣地漢志曰肥如屬遼西郡肥子奔燕燕封於此史記曰齊桓公北征山戎至孤竹至卑耳之溪見一人長八尺具衣冠右祛衣走馬前桓公問於管仲對曰山之神有俞兒霸王之君興則前導祛衣示前有水右祛衣從右方渉至卑耳之溪從左方渉其深至膝巳渉桓公拜曰仲父之聖至此魏志曰曹公北征烏丸田疇自盧龍道引軍出盧龍塞塹山堙谷五百餘里經白檀歷平岡登白狼望栁城道今在盧龍縣營州十道志曰營州栁城郡禹貢冀州之域其在十二州爲營州地周爲幽州春秋爲山戎之地戰國時屬燕秦漢爲遼西郡郡國志曰地當營室故曰營州漢志曰遼西郡秦置屬幽州領縣十四後漢書曰遼西郡即烏丸鮮卑蹋頓所居十六國春秋慕容皝傳曰栁城之北龍山之南所爲福德之地也可營制䂓模築龍城構宮室改栁城爲龍城縣遂都之改曰和龍宫後漢輿地記曰舜分齊營州之域燕西置營丘郡於其城内今栁城縣有營丘城德州元和郡縣志曰德州平原郡禹貢兖州之域春秋戰國時齊地秦兼天下爲齊郡地漢分齊郡置平原郡漢志曰平原郡髙帝置王莽曰河平領縣十九十道志曰蓨縣本漢條縣也景帝封周亞夫爲條侯後改爲蓨漢志曰脩縣屬信都莽曰脩治元和郡縣志曰安德縣有鬲津枯河禹貢九河之一漢志曰鬲縣屬平原王莽曰河平棣州元和郡縣志曰棣州樂安郡禹貢青州之域又曰兖州之域春秋時爲齊地秦併天下爲齊郡漢爲平原渤海千乗三郡地左氏傳曰錫我先君履東至于海西至于河南至于穆陵北至于無棣十道志曰厭次本漢冨平縣漢志曰冨平侯國屬平原郡王莽曰樂安亭後漢明帝改爲厭次漢書東方朔傳曰朔平原厭次人也十道志曰滴河縣本漢朸縣也朸音力漢志曰朸屬平原郡莽曰張郷十道志曰蒲臺本漢濕沃縣也漢志曰濕沃屬千乗郡莽曰近亭三齊記曰蒲臺髙十八尺始皇所頓處臺下縈蒲繫馬今蒲猶縈也滄州十道志曰滄州景城郡禹貢兖州之域虞舜及周爲幽州之域}
