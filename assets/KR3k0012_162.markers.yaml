  - {type: variant, offset: 2917, length: 2, content: 蓋并, SBCK: 爲幽州夏殷省併冀周復置幽州秦爲漁陽上谷等五郡漢髙分上谷置􅃰郡武帝開東夷又置玄莬樂浪二郡釋名曰幽州北幽昧之地故曰幽州晉地道記曰幽州因幽都以爲名山海經曰北荒有幽都之山爾雅曰北方之美者幽都之䈥角焉晉地道記曰舜以冀州南北廣大分燕北地爲幽州漢志曰漁惕郡屬幽州莽曰通路史記曰顓頊都於帝丘其地北至幽陵又曰周武王之滅紂封召公於北燕世本曰居北燕宋忠曰有南燕故曰北郡國志曰箕星散爲幽州分爲燕國其氣躁急通齊趙渤海之間一都㑹也史記曰燕秦千樹栗與封侯等士馬所生有魚鹽桑􅀥之利後漢書曰公孫瓉破劉虞盡有幽州之地三國典略曰東魏薛琡甞夢山上掛􅁝以告所善張亮曰山上􅁝幽字也君必爲幽州後果如之禮記曰武王克商封黄帝之後於薊史記曰鄒子之燕昭王擁篲前驅請爲弟子受業築碣石宫以處鄒子親徃師之又曰昭王謂郭隗曰願得賢士以身事之隗曰王必欲致士先從隗始况賢於隗者豈逺千里哉於是昭王爲隗改築宮而師事之樂毅自魏徃鄒衍自齊徃劇辛自趙徃士争歸燕漢志曰安次縣屬渤海郡又續漢志曰安次屬漁陽郡圖經曰武清縣本漢之雍奴縣也酈元注水經曰雍奴藪澤之名四面有水曰雍不流曰奴魏志曰張郃傳曰從擊譚於渤海別將圍雍奴大破之順州方輿志曰順州順義郡在范陽郡唐天寳􅀄置又改爲順義歸化二郡亦曰思順州歸順州方輿志曰歸順州其地乃燕之北境燕太子丹使荆軻獻地圖即謂此也即元順州之北境唐天寳􅀄以置歸化順義二郡同領懷柔一縣復又立歸順州以理焉􅃰州圖經曰􅃰州􅃰郡古􅃰鹿之地舜十二州爲幽州地禹貢爲冀}
