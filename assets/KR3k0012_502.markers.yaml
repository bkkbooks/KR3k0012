  - {type: variant, offset: 593, length: 0, content: '', SBCK: 王符字節信安定臨涇人好學有志隱居著書度遼將軍皇甫規官歸安定郷人有貨買鴈門太守者還家謁規規卧不迎旣入而問卿在郡食鴈羙乎有頃王符在門規素聞符名乃驚遽而起衣不及帶屣履出迎援符手而還與同坐極歡時人爲之語曰徒見二千石不如一逄掖言書生道義之爲貴也又曰向栩字輔興河内朝歌人常讀老子􅃺如學道常坐竈北板床上積乆板乃有􅂰踝足指之處時賔客就之輙伏不起時人莫能測後徴拜侍中􅋲然正色百官憚之又曰梁鴻字伯鸞扶風平陵人同縣孟氏有女狀肥醜甚黒力舉石臼擇對不嫁至年三十父母問其故女曰欲得賢如梁鴻者鴻聞娉之入門七日而鴻不荅妻乃跪床下請曰􅀼聞夫子髙義簡斥數婦妾偃蹇數夫今而見擇敢不請罪鴻曰吾欲裘􅄄之人可以俱隱今乃衣綺縞傅粉墨豈鴻所願哉妻曰以觀夫子之志耳妾自有隱居之服乃爲椎髻布衣操作具而前鴻大喜曰此眞梁鴻妻也字曰德曜孟光因共入霸陵山後至呉爲人賃舂毎歸妻爲具飡舉按齊眉又曰戴良字叔鸞汝南愼陽人母卒兄伯鸞居廬啜粥非禮不行良獨食肉飲酒哀至乃􅂘二人俱有毁容}
