  - {type: variant, offset: 686, length: 351, content: 也天子所不能臣諸侯所不能友蓋伯夷叔齊不食周粟令且從師友之位林雖拘於囂終不屈節又曰趙歧初名嘉年四十有重疾臥蓐七年慮奄然乃遺令勑兄子曰大丈夫遁無箕山之操仕無伊尹之勳天不我與復何言哉可立一圓石於吾墓側前刻之曰漢有逸人姓趙名嘉有志無時命也奈何又曰樊曄字子融有俊才好黃老不肯為吏又逢萌字子廉北海都昌人也家貧給事縣為亭長時尉行過亭萌候迎拜謁既而擲楯歎曰大丈夫安能為人役哉遂去之長安學通春秋時王莽殺其子宇萌謂友人曰三綱絕矣不去禍將及人即解冠桂東都城門歸將家屬浮海客於遼東萌素明陰陽知莽將有頃乃首戴瓦盆哭於市曰新乎新乎因遂潛藏及光武即位乃之琅邪勞山養志修道人皆化其德北海太守素聞其高遣吏奉謁致禮萌不後詔書徵萌託以老耄迷路東西詔使者云朝廷所以徵我者以其有益於政尚不知方面所在安能濟時乎即便駕歸連徵不起以壽終又曰井丹字大春, SBCK: 髙卿}
