  - {type: punctuation, offset: 1220, content: 「, id: KR3k0012_CHANT_502-bkkpn397}
  - {type: variant, offset: 1220, length: 559, content: 高鳳字文通南陽葉人也少為書生家以農畝為業而專精誦讀晝夜不息妻常之田曝麥於庭令鳳護雞時天暴雨而鳳持竿誦經不覺潦水流麥妻還怪問鳳方悟之其後遂為名儒鄰里有爭財者持其兵而鬭鳳往解之不已乃脫巾叩頭固請曰仁義遜讓奈何棄之於是爭者懷感投兵謝罪鳳年老執志不倦名聲著聞太守連召請恐不得免自言本巫家不應為吏又詐與寡嫂訟田遂不仕又曰臺佟音同字孝威魏郡鄴人也隱於武安山鑿穴為居採藥自建業初中州辟不就刺史行部乃使從事致謁佟病往謝刺史曰孝威居身如是甚苦如何佟曰佟幸得保終性命存神養和如明使君奉宣詔書夕惕庶事反不苦耶遂去隱逸終不見又曰韓康字伯林京兆霸陵人常採藥名山賣於長安市口不二價三十餘年時有女子從康買藥守藥價不移女子怒曰公是韓伯林耶乃不二價乎康歎曰我本欲避名今女子皆知有我遂遁入霸陵山中博士公車連徵不至桓帝乃備玄纁之禮以安車聘使者奉詔造康不得已乃許諾辤安車自乘柴車冒晨先使者發至亭亭長以韓徵君當過方發人牛修道橋及見康柴車幅巾公為田叟也使奪其牛康即釋駕與之有頃使者至奪牛翁乃徵君也使者欲奏殺亭長康曰此自老子與之亭長何罪康因中道逃遁以壽終又曰矯慎字仲彥扶風茂陵人也少好黃老隱遁山谷因穴為屋仰慕松喬導引之術汝南吳蒼甚重之遺書以觀其志慎不荅年七十餘竟不肯娶後忽歸家自言死日及期果卒又曰馬瑤矯慎同郡人也隱於汧山以兔置為事所居俗化百姓說之號馬牧先生又曰陳留, SBCK: 漢賔}
