  - {type: variant, offset: 3035, length: 3, content: 就藪澤, SBCK: 少方直有雅重􅀶學武帝欲以􅄾爲著作郎問􅄾族人尚書郎郭彰彰素疾􅄾荅云不識帝曰􅀂如卿言即堪郎矣遂決意用之及趙王倫簒位又欲用􅄾􅄾曰我巳爲武帝吏不容復爲今丗吏終身}
  - {type: page-break, offset: 3035, content: '', id: KR3k0012_SBCK_502-5b}
  - {type: variant, offset: 3035, length: 0, content: '', WYG: 少方直有雅量博學武帝欲以琦為著作郎問琦族人尚書郎郭彰彰素疾琦答曰不識帝曰若如卿言即堪郎矣遂決意用之及趙王倫簒位又欲用琦琦曰我以為武帝吏不容復為今世吏終身處於家又曰魯褒字元道南陽人也好學多聞以貧素自居元康之後綱紀大壊褒傷時之貪鄙乃隠姓名而著錢神論以刺之褒不仕莫知所終又曰任旭字次龍臨海章安人也㓜孤兒童時勤於學及長立操清修不染流俗郷曲推而優之永康初恵帝博求清節俊秀之士太守仇馥薦旭清貞潔素學識通博詔下以禮發遣旭以朝廷多故尚志隱遁辭疾不行元帝初鎮江東聞其名辟為祭酒並不}
