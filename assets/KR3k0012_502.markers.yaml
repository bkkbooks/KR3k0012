  - {type: variant, offset: 7, length: 582, content: 一易曰上九不事王侯高尚其事最處事上而不累於位不事王侯高尚其事也象曰不事王侯志可則也蠱卦又曰六五賁于丘園束帛戔戔施飾丘園盛莫大馬故賁干束帛丘園乃落賁於丘園帛乃戔戔又曰天下有山遯君子以遠小人不惡而嚴九四好遯君子吉小人否馬融曰好遯君子告言雖身在外乃心在王室此之謂也小人則不然身在外心必怨也九五嘉遯貞吉象曰嘉遯貞吉以正志也詩曰考盤剌莊公也不能修先公之業使賢者退而窮處也考盤在澗碩人之寬獨寐寤言永矢弗諼考成盤樂也箋云有窮處成樂在此澗者又曰白駒大夫剌宣王也剌其不能留賢也皎皎白駒食我場苗縶之維之以永今朝宣王之末不能用賢賢者乘白駒而去者乘白駒而來食我場中苗我絆之縶之也禮曰季春之月聘名士禮賢者又曰儒有上不臣天子下不事諸侯慎靜而尚寬強毅以與人博學以知服近文章砥礪廉隅雖分國如錙銖不臣不仕其規為有如此者論語曰子曰賢者避世其次避地其次避色其次避言子曰作者七人矣七人謂長沮桀弱丈人石門荷蕢儀封人楚狂接輿又曰子路曰不仕無義長幼之節不可廢也君臣之義如之何其廢之欲潔其身而亂大倫君子之仕也行其義也道之不行已知之矣逸民伯夷叔齊虞仲夷逸朱張柳下惠少連子曰不降其志不辱其身伯夷叔齊與謂柳下惠少連降志辱身矣言中倫行中慮其斯而已矣謂虞仲夷逸隱居放言身中清廢中權我則異於是無可無不可漢書曰薛方字子容王莽以安車迎方因使者辤謝曰堯舜在上下有巢許今明王方崇唐虞之德亦猶小臣欲便箕山之節也使者以聞莽說方言不強致也, SBCK: 二}
