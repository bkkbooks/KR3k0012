  - {type: variant, offset: 2291, length: 4, content: 棄冠帶絕, krp: 隱居太山以耕稼爲業公車徴不應更始時任延年十九爲郡東部尉折節下士鍾離意爲主簿自請萇爲門下祭酒延教曰龍丘先生淸過夷齊志慕原憲都尉洒掃其門猶懼辱之何召之有又曰鄭敬字次卿汝南人閑居不修人倫都尉逼爲功曹㕔事前樹時有清汁以爲甘露敬曰明府政未能致甘露此木汁耳辝病去隱處精學同郡鄧敬公爲督郵過存敬敬方釣魚於大澤因折芰爲坐以荷薦肉瓠瓢盈酒言談彌日蓬廬蓽門琴書自娯丗祖公車徴不行又曰楊后字仲桓廣漢人潜身藪澤耦耕誦經司徒楊震表薦其髙操公車特徴不就益州刺史焦叅行部致謁后惡其苛暴時耕於大澤即委鉏疾逝叅志恚之収其妻子録繫欲以致后遂不知后所在乃出其妻子又曰張奉字公先弟表字公儀河内人兄弟少有髙節立精舎教授惡衣麄食太傅袁隗以女妻奉送女奢麗奴婢百人皆𬒳羅縠輜軿光路婦入門數年奉住精舎有如路人其妻待奉入朝乃徑前跪曰家公年老不以妾頑陋使侍君巾櫛自知不副雅操君如欲執梁鴻之髙節妾欲懷孟光之徴志奉無以荅妻悉徹玩飾𬒳服奴婢着縵帛執紡績具奉然後納之諸公連徴不就謂之張氏兩賢又曰符融字偉明少爲都官郎耻之委去私事少府李膺膺常貴融融幅巾褐衣振䄂清談膺捧手髙聽歎息不暇郭林宗始入京師詣融融一見與定至}
