  - {type: variant, offset: 1046, length: 107, content: 學通五經善談論故京師為之語曰五經紛紛井大春性清高未嘗修剌候人建武末沛王輔等五王居北皆好賓客更遣請丹不能致信陽候陰就光烈皇后弟也以外戚貴盛乃詭說五王求錢千萬約能致丹而別使人要劫之丹不得已既至就故為設麥飯蔥菜之食丹推去, SBCK: 守見}
