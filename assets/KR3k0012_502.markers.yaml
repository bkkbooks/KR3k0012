  - {type: variant, offset: 2356, length: 124, content: 閔叔仲代稱節士雖周黨之潔清自以弗及也黨見其含菽飲水遺之以生蒜受而不食建武中應司徒侯霸之辟既而投劾而去復徵博士不至客居安邑老病家貧不能得肉日買豬肝一斤屠者或不肯與安邑令聞勑市吏常給焉仲叔怪而問之知乃歎曰閔叔仲豈以口腹累安邑乎遂去客沛以壽卒又曰野王二老, SBCK: 董京字威輦}
