  - {type: variant, offset: 2654, length: 0, content: '', SBCK: 也避丗不仕凉州牧張天錫遣使者孟公明備禮徴瑀乃指翔鴻以示之曰此鳥也飛青雲之外翔深谷之中自東自西安可籠也遂逃入山公明乃拘其門人瑀嘆曰吾入山逃禄避罪豈謂隱其行義翻乃害平人乎乃出就徴及至姑臧值天錫母卒括髪入弔三踊而出還入其山天錫弗能強之後莫知所在又曰霍原字休明燕國廣陽人也}
