  - {type: variant, offset: 2526, length: 1, content: 向, SBCK: 戯習仲御曰能戯舡耳充因命焉仲御即登舟鼓枻爲鯆音甫䱐音浮之歌學鯆䱐之狀俄然雲霧杳冥白魚跳入其舡充甚異之因就與語仲御不對充整服謝之仲御引掉而去弗之見也充乃歎曰可謂木人石心哉􅀄仲御在郷也人或􅀃之使仕仲御㪍然作色謂之曰我安能隨俗低眉下意乎聞君之言不􅁴寒毛競竪白汗四匝顔如渥丹心如火炙舌不住齒口不能張兩耳閉塞雙眸俱􅉂也遂竟不仕又曰董飬字仲道惠帝時遷楊后于金墉有侍婢十餘人賈后奪之然後絶膳八日而崩仲道喟然嘆曰天人旣滅大亂將至傾危宗廟在其日矣顧謂謝鯤阮千里等曰時旣如斯難可保也不如深居岩洞耳乃自荷檐妻子推鹿車入于蜀山莫知所止又曰郭文字文}
