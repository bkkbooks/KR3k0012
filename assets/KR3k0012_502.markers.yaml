  - {type: variant, offset: 2677, length: 338, content: 見帝思其賢乃令以物色訪之齊國上言有一男子披羊裘釣澤中乃備安車玄纁聘之三反而後至車駕即幸其館至光臥所撫光腹曰咄咄子陵何不出相助為治耶光曰昔唐虞著德巢父洗耳士故有志何至相逼後引光入共偃臥光以足加帝腹上明日太史奏客星犯御座帝笑曰朕故人嚴子陵耳除諫議不屈耕富春山後名其釣處為嚴陵瀨范曄後漢書逸民傳序曰易稱遯之時義大矣哉是以堯稱則天不屈潁陽之高武盡美矣終全孤竹之潔自茲以降風流彌繁長往之軌未殊而感致之數匪一或隱居以求其志或廻避以全其道或靜己以鎮其躁或去危以圖其安或垢俗以動其慨或疪物以激其清然觀其甘心畎畝之中憔悴江海之上豈必親魚鳥樂林草哉亦云性所至而已京房易飛候曰以知賢人隱視四方常有火雲五色具而不雨其下賢人隱莊子曰古之所謂隱士者非伏其身而弗見也非閉其言而不出也非藏其智而不發也時命大謬, SBCK: 到}
