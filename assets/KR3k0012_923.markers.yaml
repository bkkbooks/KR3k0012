  - {type: variant, offset: 26, length: 0, content: '', SBCK: 是時􅁪在桑言降􅀂時治自天來故重之爾雅曰鵖彼及切鴒皮及切戴勝鵀也郭璞曰鵀即頭上勝也亦呼爲戴勝鴒者猶今鶝語聲鶰轉耳春秋考異郵曰孟夏戴絍降說辞曰戴絍之爲言戴勝也陽衘表以期逹蚕珥􅁝在四月故孟夏載絍出以任氣成天津也故載絍出蚕期起維而載之明趣時急也衘天表候以于期巳}
  - {type: variant, offset: 26, length: 0, content: '', WYG: 于飛集于灌木又曰綿蠻黄鳥止于丘隅又曰睨睆黄鳥載好其音又曰黄鳥哀三良也交交黄鳥止于棘誰從穆公子車奄息詩義䟽曰黄鸝留也或謂黄栗留幽州謂之黄鶯或謂之黄鳥一名倉庚一名商庚一名黎黄一名楚雀齊人謂之搏黍關西謂之黄鳥常以椹熟時來在桑間此乃應節趣時之鳥或謂之黄袍爾雅曰倉庚商庚即黎黄也黧黄楚雀即倉庚也又皇寅鳥鄭樵注曰俗呼黄黧亦名􅀶黍韓詩曰簡斤黄鳥載好其音說文曰離黄倉庚也鳴即蚕生也戴勝禮記曰季春之月戴勝降于桑鄭𤣥注曰蚕将生之候也戴勝促織之鳥當此之時恒在桑間鳴也爾雅曰鵖鴒皮及切戴鵀郭璞注曰鵀即頭上勝也今亦謂為戴勝鵖鴔者猶􅀈鶝語聲轉耳春秋考異郵曰孟夏戴絍也陽御表以期達蚕珥絲在四月故孟夏戴絍出以任氣成天津也故戴絍出蚕期起維而戴之明趨時急也衘天表候以期}
