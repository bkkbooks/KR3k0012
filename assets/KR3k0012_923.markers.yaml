  - {type: variant, offset: 2016, length: 450, content: 為雀禮記月令曰季秋鴻鴈來賓雀入大水化為蛤又內則曰雀晏蜩范鄭玄注云苑鋒又三年問曰凡生天地之間血氣之屬莫不知愛其類今失喪其疋至於鷰雀猶有啁噍之頃焉然後乃能去之詩曰誰謂雀無角何以穿我屋春秋外傳趙簡子曰雀入淮而為蛤韓詩外傳曰夫鳳凰之初起也遙遙千里籬之雀喔咿而笑之及其升少陽一詘一信𨌑羽雲間藩籬之雀超然自知不及遠矣易通卦驗曰立夏雀子飛史記曰趙武靈王自號主父廢長子章而傳國於公子何主父遊沙丘公子章作亂與何戰敗章主父主父受之成兌遂圍主父主父飢探雀𪆪而食之月餘遂餓死沙丘范曄後漢書曰楊由字襄侯蜀郡人少習易為文學椽時有雀夜集庫門上太守廉范以問由對曰此占郡內當有小兵然不為害後二十餘日廣柔縣蠻夷反殺傷長吏宋書曰蕭思話在青州常所用銅斗覆在藥廚下忽於斗下得二死雀思話歎曰斗覆而雙雀殞其不祥乎俄而被繫北史曰後魏河南王曜五歲嘗射雀於道武前中之帝驚歎焉又曰潘樂字相貴初生有一雀止其母左肩占者咸言富貴之徵因名貴相後以為字唐書曰開元二十二年秋八月甲申幽州長史張守珪渝關界內虸蚄蟲食田稼曼入平州俄頃有群雀來食此蟲一日食盡平州稼穡無有傷者, SBCK: 爲鴟}
