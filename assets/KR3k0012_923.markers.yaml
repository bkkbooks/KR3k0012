  - {type: variant, offset: 3407, length: 612, content: 百段赤雀春秋孔演圖曰鳥化為書孔子奉以告天赤雀書上化為黃玉刻曰孔提命作法為制赤雀集將受命制尚書中候曰赤雀衘丹書入豊止於昌前謝承後漢書曰琅琊董仲為不其令赤雀乳廳事前桑上民為作歌頌吳錄曰景帝永安六年赤雀見於豫章北齊書曰天保元年京師獲赤雀獻於南郊唐書曰武德中赤雀巢於殿門宴五品以上頌者十餘人極歡而罷抱朴子曰靈寶經仙術也吳王伐石治宮室而合石之中得紫文金簡之書不能讀之使使者以問仲尼曰吳王間居有赤雀衘書以置殿前不知其義故遠諮呈仲尼視之曰此乃靈寶方長生之法禹所服之禹將仙化封之名山石函之中今乃赤雀衘之殆天授也孫氏瑞應圖曰赤雀者王者動作應天時則衘書來遁甲曰赤雀不見則國無賢白雀不降則無後嗣赤雀書陽精也白雀主銜鐵券陰主衘精也不來則國主無後嗣也尚書中候曰維天降紀秦伯出狩至于咸陽天振大雷有火下化為白雀衘籙集于公車孝經援神契曰王者奉己約儉臺榭不侈尊事耆老則白雀見典略曰泰伯出獵於咸陽大雷有火流下化為白雀衘丹書集于公車書曰泰伯霸世魏略曰文帝欲授禪白雀十九見吳志曰莘覈上孫皓表曰明珠既覿白雀繼見燕書曰愍帝時有異雀素質綠頭集于端門東樹棲翔二旬而去夏四月以異雀故大赦名東園為白雀園涼州記曰呂光大安三年白雀巢陽川令郭敏室燉煌實錄曰侯瑾字子瑜解鳥語嘗出門見白雀與群雀同行慨然歎曰今天下大亂君子小人相與雜北齊書曰臨漳縣令裴鑒蒞官清苦致白雀之瑞樊遜上清德頌十首唐書曰初高祖於太原斬王威有白雀飛入高祖之懷又曰武德九年江州都督太子衛副率侯君集於納義門獻白雀一又曰開元, WYG: ''}
