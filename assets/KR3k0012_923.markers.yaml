  - {type: variant, offset: 4538, length: 196, content: 王母使臣昔使蓬萊不慎為鵄梟所搏君仁愛極救實成德濟今當受使南海不得奉侍極以悲傷以白環四枚與寶曰令君子孫潔白且位登三事當如此環矣於此遂絕寶生震震生秉秉生賜賜生彪四世名公為東京盛族袁山松後漢書曰陳弇字叔明陳留人學尚書躬自耕種常有黃雀飛來隨弇翱翔風俗記曰六月東南長風俗名黃雀風時海魚化為黃雀因以為名異苑曰永康王曠家井上有一浣衣石時時見有赤氣後有二胡人寄居忽求買石未及受錢曠子婦孫氏覩二黃雀鬭於石上疾往, SBCK: ''}
