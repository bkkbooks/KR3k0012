  - {type: variant, offset: 481, length: 421, content: 遂共推郗鑒為主與千餘家俱避難於魯國嶧山山有重險百姓飢饉野無生草時或掘野鼠蟄鷰而食之晉書載記曰慕容儁時鷰巢于儁正陽殿之西椒生三雛頂上堅毛几城獻異鳥五色成章儁謂群僚曰是何祥也咸稱鷰者燕鳥也首有毛冠者言大燕龍興冠通天冕章甫之象也巢正陽西椒者言至尊臨軒朝萬國之徵也三子者數應三統之驗也神鳥五色言聖朝將繼五行之籙以御四海者也儁覽之大悅南史曰襄陽霸城王整之姊嫁為衛敬瑜妻年十六而敬瑜亡父母舅姑咸欲嫁之誓而不許乃截耳置盤中為誓乃止所住戶有鷰巢常雙來去後忽孤飛女感其偏栖乃以縷繫腳為誌後歲此鷰果復更來猶帶前縷女復為詩曰昔年無偶去今春猶獨歸故人恩既重不忍復雙飛雍州刺史西昌侯藻嘉其美節乃起樓於門題曰真義衛婦之閭又表於臺崔鴻北錄曰昔魯人有浮海而失津者至于澶洲見仲尼及七十子遊于海中與魯人一木杖令閉目乘之使歸告魯侯築城以備寇魯人出海投杖水中乃龍也具以狀告魯侯不信俄而有群鷰數萬衘土培城魯侯信之大城曲阜訖而齊寇至攻魯不克而還韓子曰天下無道攻擊不已甲冑生蟣虱鷰雀處帷幄, WYG: 在側}
