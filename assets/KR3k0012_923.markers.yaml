  - {type: variant, offset: 28, length: 1, content: 日, SBCK: 東北朝鮮洌水之間鳲謂之鶝䲹自􅀜而東謂之戴絍東齊海岱之間謂之戴南南猶絍也或謂之紡澤或謂之輻燕之東北朝鮮洌水之間謂之􅫁􅫁郭璞注尔雅曰尸鳩布榖非戴勝也尓雅紡在戴絍下然曰案尓王鳥名尓方言依此義又失之廣雅同也扈詩曰交交桑扈率塲啄粟桑扈􅀼脂也牋云􅀼脂肉食今無􅁏自塲啄粟失其性也不能}
