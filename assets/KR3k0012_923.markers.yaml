  - {type: variant, offset: 1231, length: 0, content: '', SBCK: 鳥獸之祥乃應人事何也對曰人雖最靈而禀性含氣同於萬􅀋故􅁻凶兆於彼禍福應於此聖王受命龍鳯爲嘉瑞者和氣同也故漢髙斬蛇而驗􅁗之必亡仲尼感麟而知巳之將死夷羊在牧殷紂以滅鸜鵒來巢魯昭出奔䑕舞端門燕刺誅死大鳥飛集昌邑以敗是故}
