  - {type: variant, offset: 914, length: 1, content: 雲, SBCK: 曰舌同百鳥瞻􅀂鼷䑕遂徙合浦郭愔百舌鳥詩曰百舌鳴髙樹弄音無常則借問聲何煩永俗不尚嘿伯勞禮曰仲夏之月鷃始鳴鄭云鵙搏勞蔡邕章句鵙伯勞一日伯趙應時而鳴爲隂候也左傳曰郯子云少皥時伯趙氏司}
