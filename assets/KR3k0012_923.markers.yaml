  - {type: variant, offset: 916, length: 0, content: '', WYG: 五月無聲亦候鳥也鄭愔百舌鳥詩曰百舌鳴髙樹弄音無常則借問聲何煩末俗不尚嘿伯勞禮記曰仲夏之月鵙始鳴鄭注云伯勞蔡邕章句鵙伯趙也伯趙應時}
