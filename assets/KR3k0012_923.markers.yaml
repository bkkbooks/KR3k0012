  - {type: variant, offset: 2742, length: 2, content: 一屋, SBCK: 窮澤非有害於人也今有同盗主財而食}
  - {type: variant, offset: 2742, length: 0, content: '', WYG: 窮澤非有害之於人也今有司盗主人財而食之焉得若太山之鴟乎後魏書曰孝武即位蠕蠕諸藩並遣使朝貢帝臨軒宴之有鴟鳥飛於殿前帝素知竇熾善射因欲矜爾逺人乃給熾御箭兩隻命射應弦而落諸蕃人咸嘆異焉帝大恱列仙傳曰李仲甫夜卧牀或為鳥跱架上後至水口縣巨山上俟北風當飛度南海}
