  - {type: variant, offset: 254, length: 226, content: 玄鳥遺卵簡狄吞之生契又曰陳勝輟耕歎曰鷰雀安知鴻鵠之志哉又曰臨江閔王榮坐侵廟壖為宮上徵榮詣中尉府郅都責訊王王恐自殺葬藍田鷰數萬衘土置冢上百姓憐之漢書名臣奏曰丞相薛宣對曰茂陵寢上食日玄鳥來集吐所含大豆紫墨色翱翔殿上此陛下永與天無極天下幸甚又曰成帝和平二年秋大水有鷰生雀又曰王莽開哀帝母丁姬冢有鷰數千衘土投其穿中魏志曰館陶令諸葛原遷新興太守管輅祖餞之賓客並會自起取鷰卵蜂窠蜘蛛著器中使輅覆射卦成輅曰含氣須變依于宇堂雄雌以分趐未舒張此鷰卵也晉中興書曰中原喪亂鄉, WYG: 聲佞}
  - {type: variant, offset: 254, length: 1, content: 玄, krp: 聲侫人在側孔子明鏡曰國臣謀反有反舌}
  - {type: variant, offset: 256, length: 646, content: 遺卵簡狄吞之生契又曰陳勝輟耕歎曰鷰雀安知鴻鵠之志哉又曰臨江閔王榮坐侵廟壖為宮上徵榮詣中尉府郅都責訊王王恐自殺葬藍田鷰數萬衘土置冢上百姓憐之漢書名臣奏曰丞相薛宣對曰茂陵寢上食日玄鳥來集吐所含大豆紫墨色翱翔殿上此陛下永與天無極天下幸甚又曰成帝和平二年秋大水有鷰生雀又曰王莽開哀帝母丁姬冢有鷰數千衘土投其穿中魏志曰館陶令諸葛原遷新興太守管輅祖餞之賓客並會自起取鷰卵蜂窠蜘蛛著器中使輅覆射卦成輅曰含氣須變依于宇堂雄雌以分趐未舒張此鷰卵也晉中興書曰中原喪亂鄉人遂共推郗鑒為主與千餘家俱避難於魯國嶧山山有重險百姓飢饉野無生草時或掘野鼠蟄鷰而食之晉書載記曰慕容儁時鷰巢于儁正陽殿之西椒生三雛頂上堅毛几城獻異鳥五色成章儁謂群僚曰是何祥也咸稱鷰者燕鳥也首有毛冠者言大燕龍興冠通天冕章甫之象也巢正陽西椒者言至尊臨軒朝萬國之徵也三子者數應三統之驗也神鳥五色言聖朝將繼五行之籙以御四海者也儁覽之大悅南史曰襄陽霸城王整之姊嫁為衛敬瑜妻年十六而敬瑜亡父母舅姑咸欲嫁之誓而不許乃截耳置盤中為誓乃止所住戶有鷰巢常雙來去後忽孤飛女感其偏栖乃以縷繫腳為誌後歲此鷰果復更來猶帶前縷女復為詩曰昔年無偶去今春猶獨歸故人恩既重不忍復雙飛雍州刺史西昌侯藻嘉其美節乃起樓於門題曰真義衛婦之閭又表於臺崔鴻北錄曰昔魯人有浮海而失津者至于澶洲見仲尼及七十子遊于海中與魯人一木杖令閉目乘之使歸告魯侯築城以備寇魯人出海投杖水中乃龍也具以狀告魯侯不信俄而有群鷰數萬衘土培城魯侯信之大城曲阜訖而齊寇至攻魯不克而還韓子曰天下無道攻擊不已甲冑生蟣虱鷰雀處帷幄, SBCK: 入宫}
