  - {type: variant, offset: 944, length: 0, content: '', SBCK: 伯勞守金人不敢取取伯勞血以塗金人不敢取東方朔別傳朔與弟子偕行渴令弟子扣道邊家求飲不知姓名主人門門不與湏􅁷見伯勞飛集主人門中李樹上朔謂弟子曰此主人姓李名伯當尓但呼李伯當果有李伯當應即入取飲陳思王植貪惡鳥論曰國人以伯勞鳥獻諸庭者侍臣謂曰丗同惡伯勞之鳴何謂也王曰月令仲夏鵙始鳴詩云七月鳴鵙七月夏之五月鵙則􅀶勞也昔尹􅁻甫信後妻之䜛而殺孝子伯竒其弟伯封求而不得作􅁰離之詩俗傳云􅁻甫後悟追傷伯竒出遊于田見異鳥鳴於桑其聲噭然􅁻甫心動曰無乃伯竒乎鳥乃拊翼其聲尤切􅁻甫曰果吾子也乃頋曰伯竒勞乎是吾子栖吾輿非吾子飛勿居言未卒鳥㝷聲而栖其盖歸入門集于井幹之上向室而號􅁻甫命後妻載弩射之遂射殺後妻以謝之故俗惡伯勞鳴言所鳴之家必有尸也好事附名爲之說令俗人惡之其實否也伯勞以五月鳴應隂氣之動陽爲仁養隂爲殘賊伯勞盖賊害之鳥也屈原曰鵙鴂之先鳴使百草爲之不芳其聲鵙鵙故以音名也晉書曰慕容垂之起於􅀜東歳在癸未苻堅之分氐戸於諸鎭也趙整因侍援琴而歌曰阿得脂􅀶勞舅父是仇綏尾長翼短不能飛逺徙種人留鮮卑一旦緩急語阿誰堅􅀏而不納至是整言驗矣周書時訓曰芒種之日螳蜋生又五日鵙始鳴若不鳴号令壅逼兵書曰軍行卒見伯勞鳴軍前後賊來圍吾軍伯勞鳴軍中軍分散有所配属京房易妖占曰伯勞聚邑中􅀊}
