  - {type: variant, offset: 47, length: 1, content: 皞, SBCK: 皥摯以鳥名官九扈爲九農正扈民無􅁋者也杜預注云扈止也止民使不滛尓雅曰春扈頒扶云切鶞􅃙偷切夏扈􅀼玄秋扈􅀼藍冬扈􅀼黄桑扈􅀼脂􅁄扈􅀼丹行扈唶唶子夜切宵扈嘖嘖郭璞注曰諸扈皆因其毛色音声以名也犍爲舎人曰頒折主三士冝榖種樹也􅀼玄黒色移民去黄􅀼扈青移民収歛􅀼黄色黄氏盖藏􅀼丹色赤爲民折鳥行扈晝行鳴宵扈夜行鳴皆隨四時同依諸扈爲節候也嘖音債山海經曰崌山有鳥焉如鶚赤身白首其名􅀼脂郭璞注曰今呼責雀爲􅀼脂疑非此也又曰上申之山鳥多當扈􅃺如雉以髯飛食之不眴目上音瞬淮南子曰馬不食脂桑扈不啄粟非廉也左思齊都賦曰四扈推移春秋冬夏四時鳥也百舌禮記曰仲夏之月反舌無聲鄭玄注曰反舌百舌也又曰郯子曰少皥}
