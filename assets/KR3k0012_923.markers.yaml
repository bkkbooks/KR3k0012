  - {type: variant, offset: 2576, length: 157, content: 晏子春秋曰齊景公探雀𪆪𪆪弱反之晏子再拜賀曰吾君有聖人之道矣君探𪆪而弱故反之是長幼也禽獸若此而況人乎此聖人之道也家語曰孔子見羅者所得雀皆黃口也孔子曰黃口盡得大雀獨不得何也羅者對曰黃口從大雀者不得大雀從黃口者得孔子顧語弟子曰君子慎所從孔藂子曰邯鄲民以正月旦獻雀於趙王而綴以五采王大悅申叔告子順曰王何以為也對曰正旦放之呂, SBCK: 吕}
