  - {type: variant, offset: 2777, length: 295, content: 禍之將及為人臣免鷰雀之智者寡矣陳留耆舊傳曰圉人魏尚高帝時為大史有罪繫治獄有萬頭雀集獄棘樹上拆翼而鳴尚占曰雀爵命之祥其鳴即即復也我其復故官也有頃詔還故官說文曰雀依人小鳥也太玄經曰明珠彈雀貴不當也風俗通曰中平中懷陵上有雀萬餘亂鬭殺頭縣著樹也郭璞洞林曰丞相府有將鶵鷄雀飛集其背上驅之去復來如此再三令璞占之此晉王即祚之漸也崔豹古今注曰雀一名嘉賓言栖宿人家狀如賓客也王子年拾遺曰舜葬蒼梧之野有鳥如丹雀自來吐五色氣氛氳如雲名曰憑霄雀能群飛衘土成墳異苑曰上虞孫家奚奴多諸方術向空長嘯則群雀來萃夜呪蚊䖟悉死於側又曰任城魏肇之初生有雀飛入其手占者以為封爵之祥益部耆舊傳曰楊宣為河西太守行縣有群雀鳴桑樹上宣謂吏, SBCK: 鳶禮記}
