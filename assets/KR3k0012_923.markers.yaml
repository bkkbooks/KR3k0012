  - {type: variant, offset: 944, length: 0, content: '', krp: 伯勞守金人不敢取取伯勞血以塗金人不敢取東方朔別傳朔與弟子偕行渴令弟子扣道邊家求飲不知姓名主人門門不與湏臾見伯勞飛集主人門中李樹上朔謂弟子曰此主人姓李名伯當尓但呼李伯當果有李伯當應即入取飲陳思王植貪惡鳥論曰國人以伯勞鳥獻諸庭者侍臣謂曰丗同惡伯勞之鳴何謂也王曰月令仲夏鵙始鳴詩云七月鳴鵙七月夏之五月鵙則博勞也昔尹吉甫信後妻之䜛而殺孝子伯竒其弟伯封求而不得作黍離之詩俗傳云吉甫後悟追傷伯竒出遊于田見異鳥鳴於桑其聲噭然吉甫心動曰無乃伯竒乎鳥乃拊翼其聲尤切吉甫曰果吾子也乃頋曰伯竒勞乎是吾子栖吾輿非吾子飛勿居言未卒鳥㝷聲而栖其盖歸入門集于井幹之上向室而號吉甫命後妻載弩射之遂射殺後妻以謝之故俗惡伯勞鳴言所鳴之家必有尸也好事附名爲之說令俗人惡之其實否也伯勞以五月鳴應隂氣之動陽爲仁養隂爲殘賊伯勞盖賊害之鳥也屈原曰鵙鴂之先鳴使百草爲之不芳其聲鵙鵙故以音名也晉書曰慕容垂之起於關東歳在癸未苻堅之分氐戸於諸鎭也趙整因侍援琴而歌曰阿得脂博勞舅父是仇綏尾長翼短不能飛逺徙種人留鮮卑一旦緩急語阿誰堅笑而不納至是整言驗矣周書時訓曰芒種之日螳蜋生又五日鵙始鳴若不鳴号令壅逼兵書曰軍行卒見伯勞鳴軍前後賊來圍吾軍伯勞鳴軍中軍分散有所配属京房易妖占曰伯勞聚邑中歲}
  - {type: variant, offset: 945, length: 1, content: 廈, SBCK: 水伯勞鳴軍中師分而水且至鳴於君之宫凶夢書曰伯勞爲憂口舌聲可惡也夢見伯勞憂口舌也斵木爾雅曰鴷斵木也郭璞注曰斵木虫因名今斵木有兩三種在山中者大有赤色臨海異物志曰啄木大如雀喙足背青毛色正青翠鳥類也凡啄木異種舌長二寸抄有刺針裴諧集左氏詩曰南山有鳥自名啄木飢則縁樹暮則巢􅀫無干於人惟志所欲此盖禽獸性清者榮性濁者辱閩中名士傳曰薛令之唐開元中爲左􅀘闕兼太子侍講時東宫官冷落乆次難進令之題詩云明月夜􅇛􅇛照見先生盤盤中何所有苜蓿長䦨干飯澁匙難綰羮稀筯易寛只可謀朝夕郍能度歳寒明皇因幸春宫見之不恱命筆酬之曰啄木觜距長鳯凰毛羽短旣嫌松桂寒任逐桑榆䁔令之遂投簮謝爵徒歩東還鳭鷯爾雅曰鳭鷯剖葦郭璞注曰好剖葦皮食其中虫因名之鳲音刀又曰桃虫鷦其䳄注云䳺折桃雀俗呼爲巧好婦詩曰肇允彼桃虫翻飛惟鳥注桃虫鷦鷯是也故爾雅曰桃虫鷦也微小黄雀其鶵化爲蜩故俗語曰鷦鷯生蜩雀易林亦謂桃虫生蜩或云布榖生子鷦鷯養之方言曰自􅀜而東謂之土雀或謂之女匠今亦名巧婦以東呼希母自􅀜而西謂之􅷑鴙爾雅云􅷑鴙鵄鴞属也非寗决音自􅀜而西謂之桑死或謂之蔑雀莊子曰鷦鷯巢深林不過一枝說苑曰孟甞君􅀉客於齊王三年不見用客反見孟嘗君曰不知臣罪耶君之過也孟甞君曰縷因針而入不因針而急夫子之才必薄矣客曰不然臣見鷦鷯巢於葦之苕鴻毛著之臨危建之工女不能爲可謂完堅矣大風至則苕折􅆑破者其所託者使然也晉書曰張華素􅀌貧爲鷦鷯賦}
