  - {type: variant, offset: 3116, length: 74, content: 寒嶺去太陽川三十里便有雀鼠同穴雀亦如家雀色小白鼠亦如家鼠色如黃瓦無尾舞雀述異記曰周成王元年貝多國人獻舞雀周公命返之神雀漢武內傳曰西王母仙藥有昆丘神崔, SBCK: 鳶鳥醜其飛也翔布翅翶翔}
  - {type: variant, offset: 3116, length: 3, content: 寒嶺去, WYG: 鳶烏醜其飛也翔布翅翺翔}
  - {type: variant, offset: 3116, length: 74, content: 寒嶺去太陽川三十里便有雀鼠同穴雀亦如家雀色小白鼠亦如家鼠色如黃瓦無尾舞雀述異記曰周成王元年貝多國人獻舞雀周公命返之神雀漢武內傳曰西王母仙藥有昆丘神崔, krp: 鳶鳥醜其飛也翔布翅翶翔}
  - {type: variant, offset: 3120, length: 211, content: 陽川三十里便有雀鼠同穴雀亦如家雀色小白鼠亦如家鼠色如黃瓦無尾舞雀述異記曰周成王元年貝多國人獻舞雀周公命返之神雀漢武內傳曰西王母仙藥有昆丘神崔漢書曰宣帝元康三年詔曰前年夏神雀集雍今春五色鳥以萬數飛屬縣翱翔而舞欲集未下其令三輔母得以春夏擿巢探卵彈射飛鳥具為令東觀漢記曰永安十七年公卿以神雀五色翔集京師奉觴上壽令賈逵作神雀頌崔豹古今注曰孝哀帝太初三年泰畦殿有雀五色頭冠長寸餘始到時鳥環其旁也隋書曰開皇十六年有神雀降於含章闥高祖召, WYG: 平御覽卷九}
