  - {type: variant, offset: 24, length: 0, content: '', krp: 倉庚鳴毛詩曰春日載陽有鳴倉庚又曰倉庚于飛熠熠其羽又曰黄鳥于飛集于灌木又曰綿綿黄鳥止于丘阿又曰睍睆黄鳥載好其音又曰黄鳥哀三良也交交黄鳥止于棘誰從穆公子車奄息詩義䟽曰黄麗留也或謂黄栗留幽州謂之黄鸎或謂之黄鳥一名倉庚一名啇庚一名鵹黄一名楚雀齊人謂之搏黍關西謂之黄鳥常以椹熟時來在桑間此乃應節趣時之鳥或謂之黄𫀆爾雅曰倉庚商庚即鵹黄也鵹黄楚雀即倉庚也又曰皇黄鳥郭璞曰俗注黄離留亦呼名黍韓詩曰簡簡黄鳥載好其音說文曰離黄倉庚也鳴即蚕生也戴勝禮記曰季春之月戴勝降于桑鄭}
