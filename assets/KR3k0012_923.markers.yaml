  - {type: variant, offset: 3680, length: 814, content: 見則國無賢白雀不降則無後嗣赤雀書陽精也白雀主銜鐵券陰主衘精也不來則國主無後嗣也尚書中候曰維天降紀秦伯出狩至于咸陽天振大雷有火下化為白雀衘籙集于公車孝經援神契曰王者奉己約儉臺榭不侈尊事耆老則白雀見典略曰泰伯出獵於咸陽大雷有火流下化為白雀衘丹書集于公車書曰泰伯霸世魏略曰文帝欲授禪白雀十九見吳志曰莘覈上孫皓表曰明珠既覿白雀繼見燕書曰愍帝時有異雀素質綠頭集于端門東樹棲翔二旬而去夏四月以異雀故大赦名東園為白雀園涼州記曰呂光大安三年白雀巢陽川令郭敏室燉煌實錄曰侯瑾字子瑜解鳥語嘗出門見白雀與群雀同行慨然歎曰今天下大亂君子小人相與雜北齊書曰臨漳縣令裴鑒蒞官清苦致白雀之瑞樊遜上清德頌十首唐書曰初高祖於太原斬王威有白雀飛入高祖之懷又曰武德九年江州都督太子衛副率侯君集於納義門獻白雀一又曰開元十三年兗州奏白雀見景戍上謂宰臣曰往昔史官唯記災異將令王者懼而循得故春秋不書祥瑞唯記有年聖人之意明矣勑天下諸州府不得更奏祥瑞南越志曰魯城縣多白雀大如鳩素質凝映先賢傳曰周不疑曹公欲以為議郎不就時有白雀瑞不疑已作頌授紙筆立令復作操奇異之羅含傳曰含在家中時有白雀集堂宇此德行幽感所致豫章舊志曰太守孔笁臨郡三月白雀出南昌太守夏侯嵩臨郡六年白雀見黃雀禮稽命徵曰祭五岳四瀆得其宜則黃雀見黃雀土精春秋考異郵曰黃帝將起有黃雀赤頭占曰黃者土精赤者火榮雀者賞萌余當立古詩曰桂樹華不實黃雀巢其顛說苑曰吳王欲伐荊有諫者死舍人少孺子欲諫不敢即懷操彈於後園露沾其衣如是三旦王曰子何來沾衣如此對曰園中有樹其上有蟬蟬高居悲鳴飲露不知螳蜋在其後螳蜋委身曲附欲取蟬而不知黃雀在其旁黃雀延頸欲啄螳蜋不知彈丸在其下臣挾彈欲取黃雀不知露霑衣如此皆務欲得於前不顧於後患吳王乃罷漢武故事曰拜孫卿為郎持節候神自大室至於東萊云見一人長五丈自稱巨公牽黃犬持黃雀欲謁天子因忽不見續齊諧記曰弘農楊寶字文淵後漢名士也年九歲時至華陰北見一黃雀為鵄梟所搏墜于樹下為螻蟻所困寶見之愍然命左右取之歸致巾箱中養之唯食黃花, SBCK: 遣}
