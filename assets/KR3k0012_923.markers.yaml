  - {type: variant, offset: 945, length: 1, content: 廈, WYG: 者有赤色臨海異物志曰啄木大如雀喙足皆青毛色正青翠鳥類也凡啄木異種舌長寸杪有針刺俳諧集左氏詩曰南山有鳥自鳴啄木飢則縁樹暮則巢宿無干於人惟志所欲此盖禽鳥之性情也性清者榮性濁者辱閩中名傳曰薛令之唐開元中為左補闕兼太子侍講時冬官冷落又次難進令之題詩曰明月夜團圓照見先生盤盤中何所有苜蓿長䦨干飰澁匙難綰羮稀筯易寛只可謀朝夕那能度歳寒明皇因幸春宫見之不恱命筆酧之曰啄木觜距長鳳凰毛羽短既嫌松桂寒任逐桑榆煖令之遂投簪謝爵步東還鳭鷯爾雅曰鳭鷯剖葦郭璞注曰剖葦皮食其中蟲因名之鳭音刁又曰桃蟲鷦其䳄鴱注云鷦鷯一名鷦􅛯一名桃雀俗呼巧婦詩曰肇允彼桃蟲翻飛惟鳥爾雅曰桃蟲鷦也似小黄雀其雛化為蜩故俗語曰鷦鷯生蜩雀易林亦謂桃蟲生蜩或云布榖生子鷦鷯食之方言曰自西而東謂之雀或謂之女鴄今江東呼之曰巧婦自闗而東謂之􅀈爾雅曰鴟鴞鸋鴂陸疏云鸋鴂即巧婦闗西謂之桑飛或謂之襪雀荘子曰鷦鷯巢林不過一枝說苑曰孟嘗君寄客於齊王三年不見用客反見孟嘗君曰不知臣罪耶君之罪也孟嘗君曰縷因針而入不因針而急夫子之才必薄矣客曰不然臣見鷦鷯巢於江濵葦苕著之髪毛建之女工不能為也可謂完堅矣大風至則苕折卵破者其所託者使然也晉書曰張華素孤貧為鷦鷯賦}
