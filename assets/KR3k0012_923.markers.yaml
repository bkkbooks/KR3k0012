  - {type: variant, offset: 947, length: 0, content: '', SBCK: 阮籍見之曰王佐之才也由是聲名始著巂音携一名杜宇爾雅曰巂周也郭璞注曰巂鳥孫炎爲鷰別名風土記亦云是赤口鷰也蜀王本紀曰望帝使臣鱉靈治水去後望帝與其妻通慙愧且以德薄不及鱉靈乃委國授之去望帝去時子䳏鳴故蜀人悲子䳏鳴}
