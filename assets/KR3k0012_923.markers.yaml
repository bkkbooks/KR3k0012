  - {type: variant, offset: 984, length: 292, content: 女愛而爭搏之覆以玉筐少選高誘注曰少選須臾發而視之鷰遺二卵北飛遂不反二女作歌曰鷰往飛實始為北音北國之音也宣驗記曰程德度武昌人昔在潯陽夜見屋裏自明先有鷰窠忽有小兒長尺餘潔白從窠出至床前曰卻後三年當得長生之道尋闇而滅甚祕密之又曰沛國周氏有三子瘖並不能言有人來乞飲聞其兒聲問之具以實對客曰君可還內思過既異其言知非常人良久云都不憶有罪過客曰試更思幼時事入內食頃出曰記小兒時當床有鷰巢中有三子母還哺之輒出取食屋下舉手得及指內巢中鷰子亦出口承受乃取三蒺蔾各與之吞即死母還不見子悲鳴而去恒自悔責客變為道人之容曰君既自知悔罪今除矣便聞其兒言語周正即不見道人廣雅曰玄鳥鷰也說文曰鷰玄鳥也布翅拔尾象形也齊魯, WYG: 房幽州}
