  - {type: variant, offset: 27, length: 0, content: '', SBCK: 唯蚕是務珥吐也孝經援神契曰戴絍下蚕始生魏志曰戴絍鳥巢張臶門隂告門人曰夫戴鵀陽鳥而巢門隂此凶祥也旬日而卒楊雄方言曰燕}
