  - {type: variant, offset: 1256, length: 750, content: 玄鳥鷰也說文曰鷰玄鳥也布翅拔尾象形也齊魯謂之鳦作巢避戊巳論衡曰鷰鳥也形似非氣也安得生人且鷰之長不過五寸安能成七尺之形契母適欲懷妊遭吞鷰卵好奇因以為其生耳楊子法言曰朱鳥翾翾歸其肆矣侯苞注曰朱鳥鷰別名四海肆也博物志曰人食鷰肉不可入水為蛟龍所吞又曰鷰戊巳日不衘泥塗巢此非才智自然得之吳地記曰春申君都吳宮因加巧飾春申死吏照鷰窟失火遂焚越絕書曰吳路西宮在長秋周一里二百二十六步秦始皇十二年守宮者照鷰失火燒之蘇州塚墓記曰宋青州刺史郁泰玄字義真好黃老故老相傳泰性仁恕德感禽獸初葬之日有群鷰數千衘土於塚上今塚猶高大與他有異村鄉歲時迄今祭祀茅君內傳曰句曲山有神芝五種弟三名鷰貽芝其色紫形如葵藿葉上有鷰象如欲飛狀光明洞澈食一株拜為太清龍虎仙君崔豹古今注曰鷰一名天女一名鷙鳥廣州志曰鷰有三種乳於巖崖者為土鷰湘中記曰零陵有石鷰形似得雷風則飛鴶䲳如真鷰談藪曰王景素嘗與劉璡同在小齋有鷰集承塵飛鳴相追景素曰萬物各有性靈而獨賤於鱗羽乎若斯鳥也遊則參於雲煙之上止則隱於林木之下飢則啄渴則飲形體無累乎物得失不關於心一何樂哉九章筭術曰五雀六鷰飛集于衡適平一雀一鷰飛而易處則雀重而鷰輕白鷰宋元嘉起居注曰元年七月有白鷰集於齊郡遊翔庭宇經九日乃去眾鷰翼隨恒有數千陳書曰高士馬樞目常黃能視闇中物有白鷰一雙巢其庭樹馴狎欄廡時上几案春來秋去幾三十年抱朴子曰千歲鷰戶向北其色白而尾屈陰乾之服一頭得五百歲此肉芝也京房易占曰山見白鷰其君且得貴女今俗名為天女也續異記曰孫氏妻見一童子當前以釵擲之躍入雲中夜聞戶外歌曰昔填夏家冢輦泥頭欲禿今寄黃氏居非意傷我目尋覔巢中得一白鷰左目傷宣城記曰侍中紀昌睦初生有白鷰一雙出巢既表素質官途亦通涼州記曰呂光大安三年白鷰遊酒泉郡黑鷰列從王威別傳曰時有白鷰來翔被令為賦赤鷰田俅子曰少昊氏之時赤鷰一衘羽而飛集少昊氏之戶遺其丹書雀, SBCK: 鴟鴞鸋􅟾鴟}
