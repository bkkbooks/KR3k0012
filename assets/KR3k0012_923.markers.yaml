  body:
  - {type: variant, offset: 3, length: 2, content: 九鷰, SBCK: 十鴿鸜鵒倉庚戴勝扈百舌伯勞斵木鳭鷯嶲鵽鴞鴟茅鴟鳶鴿說文曰鴿鳩属也後魏書曰崔光魯於門下省晝讀經有鴿飛集􅂰前遂入於懹縁臂上肩乆之乃去道俗賛詠詩頌者數十人梁書曰侯景圍䑓城軍士煑弩燻䑕捕雀食之殿堂舊多鴿羣聚至是殱焉隋書曰文帝甞宴逹頭可汗使者於武德殿有鴿鳴於梁上上命崔彭射之旣發而中上大恱賜錢壹萬又曰楊秦見赤鴿映􅁄髙二尺越絶書曰蜀有花鴿狀如春花戴祚西征記曰祚至雍丘始見鴿大小如鳩色似鸚鵡戲時兩兩相對鸜鵒周禮曰鸜鵒不踰濟鄭司農注云不踰濟無妨中囯有也地氣然也禮稽命徴曰孔子謂子夏曰羣鵒至非中國之禽也左傳曰有鸜鵒來巢書所無也師巳曰異哉吾聞文成之丗童謡有之師巳魯大夫也鸜之鵒之公出辱之鸜鵒之羽公在外野徃饋之馬鸚鵒株株公在乹侯株株跳行貌徴褰與􅃭褰袴也鸜鵒之巢逺哉遥遥稠父䘮勞宋父以驕稠父昭公死故䘮勞也宋父定公代玄以驕鸜鵒鸜鵒徃歌來哭昭公生出歌也死還􅂘也童謡有是今鸜鵒來巢其將及乎公羊傳曰有鸜鵒來巢何以書記異也何異爾非中國之禽也冝穴而巢何休注曰鸜鵒猶欲此推固欲自下居上之徴}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_923-1b}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_923-2a}
  - {type: variant, offset: 3, length: 2, content: 九鷰, WYG: 十鴿鸜鵒倉庚戴勝扈百舌伯勞啄木鳭鷯巂鵽鴞鴟茅鴟鳶鴿說文曰鴿鳩屬也後魏書曰崔光曽於門下省晝讀經有鴿飛集膝前遂入于懐縁臂上肩久之乃去道俗賛詠詩頌者数十人梁書曰侯景圍臺城軍士煮弩燻鼠捕食之殿堂舊多鴿羣聚至殱隋書曰文帝嘗宴逹頭可汗使者於武德殿有鴿于梁上命崔彭射之既發而中上大恱賜錢一萬貫又曰楊奏見赤鴿映棘髙二尺越絶書曰蜀有蒼鴿狀如春蒼戴祚西征記曰祚至雍丘始見鴿大小如鳩色似鸚鵡戯時兩兩相對鸜鵒周禮曰鸜鵒不踰濟地氣然也禮稽命徵曰孔子謂子夏曰鸜鵒至非中國之禽也左傳曰鴝鵒來巢書所無也師已曰異哉吾聞文武之世童謡有之師已魯大夫也鴝之鵒之公出辱之鴝鵒之羽公在外野往饋之馬鴝鵒跦跦公在乾侯跦跦跳行貌徵褰與襦褰袴也鴝鵒之巢逺哉遥遥稠父䘮勞宋父以驕稠父昭公死故䘮勞也宋父定公代立故以驕鴝鵒鴝鵒往歌來哭昭公生出歌也死還哭也童謡有是今鴝鵒來巢其將及乎公羊傳曰有鸜鵒來巢何以書記異爾異是非中國之禽也宜穴而巢何休注曰欲自下居上之徴}
