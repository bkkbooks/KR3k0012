  - {type: variant, offset: 979, length: 137, content: 鳴若謚隘二女愛而爭搏之覆以玉筐少選高誘注曰少選須臾發而視之鷰遺二卵北飛遂不反二女作歌曰鷰往飛實始為北音北國之音也宣驗記曰程德度武昌人昔在潯陽夜見屋裏自明先有鷰窠忽有小兒長尺餘潔白從窠出至床前曰卻後三年當得長生之道尋闇而滅甚祕密之又曰沛國周氏有三子瘖並不能言有人來乞飲聞其兒聲, SBCK: 則無頭矣裴行儉}
  - {type: variant, offset: 979, length: 4, content: 鳴若謚隘, WYG: 則無頭矣裴行儉問於右史苗神荅曰鳥獸之祥乃應人事何也對曰人雖最靈而禀性含氣同於萬類故吉凶兆於彼禍福應於此聖王受命龍鳳為嘉瑞者和氣仝也故漢髙祖斬虵而騐秦之必亡仲尼感麟而知己之將死夷羊在牧殷紂以滅鸜鵒來巢魯昭出奔鼠舞端門燕刺誅死大鳥飛集昌邑以敗是故君子處恭寅畏動必以義雖在幽獨如承大事知神明之照臨懼患難之及已也雉升鼎耳殷宗側身修徳鵩止坐隅賈生作賦以無患者徳勝祥也鴞毛詩曰鴟鴞周公之辭也鴟鴞鴟鴞既取我子無毁我室詩義疏曰鴟鴞似黄雀為小喙刺如錐取茅為巢以麻紩之如刺襪然縣著樹枝或一房或}
  - {type: page-break, offset: 979, content: '', id: KR3k0012_WYG_923-14b, image: WYG0901/WYG0901-0221b.png}
