  - {type: variant, offset: 47, length: 1, content: 皞, WYG: 皥摯以鳥名官九扈為九農正扈民無滛者也杜預注云扈止也止民使不淫爾雅曰春扈鳻扶云切鶞勑偷切夏扈竊𤣥秋扈竊藍冬扈竊黄桑扈竊脂棘扈竊丹行扈唶唶音即宵扈嘖嘖音責郭璞注云諸扈皆因其毛色音聲以為名竊藍青色山海經曰崌有鳥焉如鶚赤身白首其名竊脂又曰上車之山鳥多桑扈状如鳩以髯飛食之不􅀈目上音瞬淮南子曰馬不食脂桑扈不啄粟非亷也左思吳都賦曰四扈推移百舌禮記曰仲夏之月反舌無聲又曰郯子曰少皥}
