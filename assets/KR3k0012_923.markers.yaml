  - {type: variant, offset: 4021, length: 966, content: 年兗州奏白雀見景戍上謂宰臣曰往昔史官唯記災異將令王者懼而循得故春秋不書祥瑞唯記有年聖人之意明矣勑天下諸州府不得更奏祥瑞南越志曰魯城縣多白雀大如鳩素質凝映先賢傳曰周不疑曹公欲以為議郎不就時有白雀瑞不疑已作頌授紙筆立令復作操奇異之羅含傳曰含在家中時有白雀集堂宇此德行幽感所致豫章舊志曰太守孔笁臨郡三月白雀出南昌太守夏侯嵩臨郡六年白雀見黃雀禮稽命徵曰祭五岳四瀆得其宜則黃雀見黃雀土精春秋考異郵曰黃帝將起有黃雀赤頭占曰黃者土精赤者火榮雀者賞萌余當立古詩曰桂樹華不實黃雀巢其顛說苑曰吳王欲伐荊有諫者死舍人少孺子欲諫不敢即懷操彈於後園露沾其衣如是三旦王曰子何來沾衣如此對曰園中有樹其上有蟬蟬高居悲鳴飲露不知螳蜋在其後螳蜋委身曲附欲取蟬而不知黃雀在其旁黃雀延頸欲啄螳蜋不知彈丸在其下臣挾彈欲取黃雀不知露霑衣如此皆務欲得於前不顧於後患吳王乃罷漢武故事曰拜孫卿為郎持節候神自大室至於東萊云見一人長五丈自稱巨公牽黃犬持黃雀欲謁天子因忽不見續齊諧記曰弘農楊寶字文淵後漢名士也年九歲時至華陰北見一黃雀為鵄梟所搏墜于樹下為螻蟻所困寶見之愍然命左右取之歸致巾箱中養之唯食黃花百餘日毛羽成朝去暮還後忽與群雀俱來哀鳴繞堂數日乃去及夕三更寶讀書未臥有黃衣童子向寶拜曰我王母使臣昔使蓬萊不慎為鵄梟所搏君仁愛極救實成德濟今當受使南海不得奉侍極以悲傷以白環四枚與寶曰令君子孫潔白且位登三事當如此環矣於此遂絕寶生震震生秉秉生賜賜生彪四世名公為東京盛族袁山松後漢書曰陳弇字叔明陳留人學尚書躬自耕種常有黃雀飛來隨弇翱翔風俗記曰六月東南長風俗名黃雀風時海魚化為黃雀因以為名異苑曰永康王曠家井上有一浣衣石時時見有赤氣後有二胡人寄居忽求買石未及受錢曠子婦孫氏覩二黃雀鬭於石上疾往取之變成黃金蕭廣濟孝子傳曰王祥後母病欲得黃雀炙祥思念卒難致須臾忽有數十黃雀飛入其幕臨海異物志曰黃雀魚常以八月化為黃雀到十月入海為魚廣志曰黃雀體純脂江夏竟陵常獻給大官青雀禮記曲禮曰前有水則載青旌鄭玄注載舉於旌首以驚眾青雀水鳥也劉禎詩曰翩翩野青雀栖竄茨棘蕃朝拾平田粒夕飲曲池泉猥出蔚萊中乃至丹丘邊司馬彪與山巨源詩曰翩翩野青雀受性孤且微昔生三河側鼓翼帝王畿麋元詩曰青雀西飛別鵠東翔大雀廣志曰安息大雀鴈身蹄似橐駞色蒼舉頭高八九尺張翅丈餘卵如甕東觀漢記曰永祚元年安息王獻條枝大雀曹大家集兄超為西域都護獻大雀詔大家作頌, WYG: ''}
