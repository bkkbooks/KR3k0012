  - {type: variant, offset: 11, length: 6, content: 搖光星散為鷰, SBCK: 鸜鵒者飛行属於陽夷狄之鳥穴居於隂異􅁐曰五月五日翦鸜鵒舌令學人語山海經曰衡山多青臒及鸜鵒晉書曰鎭西將軍謝尚字仁祖善鸜鵒舞幽明録曰晉司空桓豁在荆有叅軍剪五月五日鸚鵒舌教令學語遂無所不名頋叅軍善彈琵琶鸜鵒毎立聽移時又善能效人語聲司空大㑹吏佐令悉效四坐語無不絶似有生􅙄􅈹語難學學之不似因内頭於瓮中以效焉遂與􅙄者語聲不異主典人於鸜鵒前盗物叅軍如厠鸜鵒伺無人宻白主典人盗如千種一二條列衘之而未發後盜牛􅁏鸜鵒復白叅軍曰汝云盗􅁏應有驗鸜鵒曰以新荷褁着屏風後檢之果􅀗痛加治而盗者患之以􅀬湯灌殺叅軍爲之悲傷累日遂請殺此人以報其怨司空言曰原殺鸜鵒之痛誠合治殺不可以禽鳥故極之於法令止五歳刑也淮南萬畢術曰寒臯斷舌可使語取寒臯斷其舌即語寒臯一名鸜鵒唐書曰祕書少監崔行功未得五品前忽有鸜鵒衘一物入其堂置案上而去乃魚袋玦數日加大夫荆楚歳時記曰五月鸜鵒子毛羽新成俗好登巢取養之以教其語謂之花鵒倉庚}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_SBCK_923-2b}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_SBCK_923-3a}
  - {type: variant, offset: 11, length: 4, content: 搖光星散, WYG: 鴝鵒者飛行居于陽夷狄之鳥穴居于隂異苑曰五月五日翦鴝鵒舌令學人語山海經曰衡山多青臒及鸜鵒晉書曰鎮西将軍謝尚字仁祖善鴝鵒舞幽明録曰晉司空桓豁在荆州有參軍五月五日剪鸜鵒舌教令學語遂無所不言顧叅軍善彈琵琶鴝鵒每立聽移時又善能效人語聲司空大㑹吏佐令悉效四坐語無不絶似有生齆鼻語難學學之不肖納頭於瓮中以效焉遂與齆者語聲不異主典人于鴝鵒前盜物叅軍如厠鴝鵒伺無人宻白主典人盜某物參軍銜之而未發後盜牛肉鴝鵒復白叅軍曰汝云盜肉應有騐鸜鵒曰以新荷裹着屏風後檢之果然痛加治而盜者患之以熱湯灌殺叅軍}
