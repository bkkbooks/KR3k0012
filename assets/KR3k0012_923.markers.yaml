  - {type: variant, offset: 2515, length: 2, content: 千羊, SBCK: 虞氏者梁富人也登髙樓臨大路設樂陳酒􅀶於其上遊俠相隨行樓下􅀶者射中而􅀏飛鳶墮腐䑕而中遊俠俠相與語曰虞氏冨人奚有輕人之志乃辱我以腐䑕其夜乃殺虞氏大滅其家此謂􅀋非也淮南萬畢術曰鴟腦令鷄自伏取鴟腦以塗鷄自即伏}
  - {type: variant, offset: 2515, length: 2, content: 千羊, WYG: 虞氏者梁富人也登高樓臨大路設樂陳酒博於其上逰挾相隨行樓下博者射朋張中反兩而笑飛鳶墮腐鼠而中之逰俠相與語曰虞氏富人也常有輕人之志乃辱我以腐鼠其夜乃殺虞氏大滅其家此謂類而非也淮南萬畢術曰鴟腦令雞自伏收鴟腦以塗雞即伏}
