  - {type: variant, offset: 944, length: 0, content: '', WYG: 伯勞守金人不取收伯勞血以塗金人不敢取也東方朔别傳曰與弟子偕行渇令弟子如道邉家求飲不知姓名主人開門不與須臾見伯勞飛逐主人門中李樹上朔謂弟子曰此主人姓李名伯勞爾但呼李伯勞果有李伯應之即入取飲陳思王植令禽惡鳥論曰國人有以伯勞獻諸廷者侍臣曰世人同惡伯勞之鳴敢問何謂也王曰月令仲夏鵙始鳴詩云七月鳴鵙夏五月鷦則鳴博勞也昔尹吉甫信后妻之讒而殺孝子伯奇其弟伯封求而不得作黍離之詩俗傳云吉甫後悟追傷伯奇出逰於外見異鳥鳴於桑其聲噭然吉甫心動曰無乃伯奇乎鳥乃撫翼其聲尤切吉甫曰果吾子也乃顧曰伯奇勞乎是吾子栖吾輿非吾子飛勿居言未卒鳥尋而栖其蓋歸入門集于幹之上向室而號吉甫命後妻載弩射之遂射殺後妻以謝之其俗惡伯勞鳴言所鳴之家必有尸也此好事者附名為之説而今普傳惡之斯實否也伯勞以五月而鳴應陰氣之動陰為賊害盖賊害之鳥也屈原曰鶗鴂之先鳴使百草為之不芳其聲鵙故以音名也晉書曰慕容垂之起於闗東歳在癸未苻堅之分氐戸於諸鎮也趙整因侍援琴而歌曰阿得脂博勞舊父是仇綏尾長翼短不能飛逺徙種人留鮮卑一旦緩急語阿誰堅笑而不納至是整言騐矣周書時訓曰芒種之日螳螂生又五日鵙始鳴鵙不鳴令壅遏兵書曰軍卒見伯勞鳴軍前後賊來圍吾軍伯勞鳴軍中軍分散有所配屬京房易傳曰伯勞聚邑中歳天伯勞鳴軍中師分而水且至夢書曰伯勞為憂口舌聲可惡也夢見伯勞憂口舌也斲木爾雅曰鴷斲木也郭璞注曰斵木䖝因名今斵木有兩三種在山中}
