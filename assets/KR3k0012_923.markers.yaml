  - {type: variant, offset: 2745, length: 1, content: 下, SBCK: 焉得􅀂㤗山之鴟乎後魏書曰孝武即位蠕蠕諸藩並遣使朝貢帝臨軒宴之有鴟鳥飛鳴於殿前帝素知竇熾善射因欲矜示逺人乃給熾御箭兩􅃗命射鴟應􅁌而落諸蕃人咸歎異焉帝大恱列仙傳曰李仲甫夜卧床上或爲鴟鳥跱架上後至沓縣臣山上候北風當飛度南海山上有羅鷹者羅得鴟視之仲甫也後留更三年自云徃崑崙去茅鴟爾雅曰狂茅鴟郭璞注曰折鴟也似鷹而白孫炎曰大目鵀鶹也廣雅曰盧休茅鴟鳩也左傳曰叔孫穆}
  - {type: page-break, offset: 2745, content: '', id: KR3k0012_SBCK_923-10a}
