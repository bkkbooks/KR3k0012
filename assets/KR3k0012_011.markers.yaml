  - {type: variant, offset: 4080, length: 0, content: '', krp: 爾雅孫炎注曰攝木生江上有寄枝髙三四丈生毛一名楓子天旱以泥塗之即雨傅咸自叙曰太始九年自春不雨渉夏節聖皇勞慮分使祈禱余以太子洗馬兼司徒涖事三朝雨大降退作喜雨賦霽說文曰霽雨止也霋音妻雨霽也霩火郭反雨上雲罷貌魏略五行志曰延康元年大霖雨五十餘日魏有天下乃霽將受魏祚之應也晉中興徴祥記曰咸和四年隂霖五十餘日蘇峻滅乃霽長沙耆舊傳曰文度字仲儒爲郡功曹吏時霖雨廢人業太守憂悒召度𥙷户曹度奉教齊戒在社三日夜夢白頭翁謂曰爾來何遲翌旦度具白所夢於太守曰昔禹夢青繡文衣男子稱蒼水使者禹知水脉當若椽此夢將其比也明日果大霽扶南日南傳曰金陳國入四月便雨六月乃止少有晴日六月不雨常晴歲歲如此太平御覽卷第十一}
