  - {type: variant, offset: 1594, length: 1, content: 安, SBCK: 壽山山形似馬白雲出於鞍中不崇朝而􅀨盛􅀪之荆州記曰佷山縣有一山獨立峻絶西北有石穴北行百歩許二大石其間相去一丈許俗名其一爲陽石一爲隂石水旱爲灾鞭陽石則􅀨鞭隂石則晴又曰湘東有􅀨母山山有祠壇毎祈禱無不降澤以是名之又曰来陽縣有􅀨瀬此縣時旱百姓共壅塞之則甘􅀨普降􅀂一郷獨壅􅀨亦偏應隨方所祈信若符刻顧微廣州記曰鬱林郡山東南有一池池邊有一石牛人􅀕祀之若旱百姓殺牛祈􅀨以牛血和泥泥石牛背祀畢則天􅀨大注抱朴子曰}
