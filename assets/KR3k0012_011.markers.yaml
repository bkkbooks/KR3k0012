  - {type: variant, offset: 2148, length: 1904, content: 殺五牲以醮天乃甚雨七日七夜魚流始得圖書今河圖是也家語曰孔子將行遇雨不假蓋於子夏護其短也又曰齊有一足之鳥集於殿前舒翅而跳齊候異之使聘魯訪諸孔子曰此鳥名曰啇羊昔童兒有屈一腳振訊雨臂而跳且謠曰天將大雨啇羊鼓舞今齊有之其應至矣急告趣治溝渠脩隄防將有大雨水為災果大霖雨水溢泛諸國傷害人民唯齊有備不敗景公曰聖人之言信而有徵矣老子曰暴雨不終日莊子曰宋景公時大旱三年卜云以人祀乃雨公下堂頓首曰吾所求雨者為人今殺人不可將自當之言未卒天大雨方千里又曰堯讓天下於許由許由曰曰月出矣而爝火不息時雨降矣而猶浸灌不亦勞乎文子曰若與俗處猶走逃雨也無之而不濡列子曰赤松子神農時雨師也廣成子曰黃帝時雲不待族而雨尸子曰神農理天下欲雨則五日為行雨旬為谷雨旬五日為時雨萬物咸利故謂之神雨孟子曰油然作雲霈然下雨抱朴子曰軍始發大風甚雨起於後大勝之徵也軍始出雨沾衣者是謂潤兵軍有功雨不足沾衣裳是謂泣軍必敗又曰無雲而雨是謂雨血將軍當楊兵講武以應之雨軍中尤甚者將軍戰必無功也管子曰冬作土功發地藏則夏多暴雨秋霖不止又曰春發五政一曰論幼孤赦有罪二曰賦爵列授祿位三曰脩溝洫復亡人四曰治封壃正阡陌五曰無殺麑卵無絕華萼五政徇時春雨乃來淮南子曰失火遇雨禍中有福又曰人莫鑑於沬雨而鑑於止水者以其凈也沬雨雨潦上沫起覆蓋也言其濁擾不見人形也又曰朱鼈浮於水上必大雨又曰天且雨也魚已噞噞音宜撿反又曰黑蜧神虬潛泉而居將雨則躣蜧音麗鄒子曰朱買臣孜孜脩學不覺雨之流粟韓子曰荊人伐陳吳救之軍間三十里雨十日夜左史倚相謂子期曰雨十日甲輯兵聚吳人必至不如備之乃為陣未成而吳人至見荊有戒而反傅子曰昔者伯牙子遊於泰山之陰逢暴雨止於巖下援琴而鼓之為淋雨之音更造崩山之曲每奏鐘期輒窮其趣曰善哉子之聽也孔叢子曰子思荅懸子曰以子產仁愛譬夫子猶浸水之與膏雨夫浸所及則生不及則死民皆知焉膏雨之所生也廣莫大焉民之受賜也普矣莫識其由也呂氏春秋曰武王伐紂至鮪水使膠鬲候周師問武王曰西伯何時至曰將以甲子日至膠鬲行矣大雨日夜不休武王疾行不輟軍吏諫武王曰吾疾行以救膠鬲之死也楊子法言曰震風凌雨然後知夏屋之帡幪震雨凌暴也夏大也帡彰幪覆廣雅曰雨師謂之屏翳纂要曰疾雨曰驟雨徐雨曰零雨雨久曰苦雨亦曰愁霖雨晴曰啟雨水曰潦雨雲曰渰雲亦曰油雲戰國策曰文侯與虞人期獵是日天雨文侯將出左右諫止曰吾與虞人期不可失乃往魏於是始強易林變占曰雷君出裝隱隱西行霖雨不止流為江河周易集林雜占曰占天雨否外卦得陰為雨得陽不雨其爻發變得坎為雨得離不雨巽化為巽先雨后風愽物志曰太公為灌壇令武王夢婦人當道夜哭問之曰吾是東海神女嫁於西海神童今為灌壇令當道廢我行我行必有大風疾雨大風疾雨是毀君之德也武王覺召太公問之果有疾雨暴風在太公邑外而過六韜曰文王問散宜生卜伐紂吉乎曰不吉鑽龜龜不兆數蓍交加而折將行之日雨輜車至軫行之日幟折為三散宜生曰此卜四不祥不可舉事太公進曰是非子之所知也祖行之日輜車至軫是洗濯甲兵也師曠占曰候月知雨多少入月一日二日三日月色赤黃者其月少雨月色青者其月多雨常以五卯日候西北有雲如群羊者即有雨至矣冬戊巳春辰己日雨蝗蟲食禾稼立春雨傷五木立秋日雨害五穀常以戊巳日日入時出時欲雨日上有冠雲大者即雨小者少雨天文要集曰北斗之旁有氣往往而黑狀似禽獸大如皮席不出三日必雨又曰河有雲黑狀似船若一疋布維河不出十日大雨又曰辰口守心有水災一日大雨不可當又曰北斗者不欲雲覆之黑雲覆之大雨范子計然曰風為天氣雨為地氣風順時而行雨應風而下命曰天氣下地氣上陰陽交通萬物成矣劉義慶世說曰謝太傅無嗔喜曾送兄征西葬還日暮雨馭人皆醉不可處分公乃於車中手取車柱撞馭人聲色甚怒劉義慶幽明錄曰河南人趙良與其鄉人諸生之長安至新安界遇霖雨糧乏相謂曰饑郍得美食邪應時羹飯備具有人聲語云進踈食黃子發相雨書曰常以戊申日候日欲入時日上有冠雲不問大小視四方黑者大雨青者小雨候日始出日正中有雲覆日而四方有雲黑者大雨青者小雨四方有雲如羊豬雨立至四方北斗中有雲後五日大雨四方北斗中無雲唯河中有雲三枚相連狀如浴豬狶三日大雨以丙丁之辰四方無雲唯漢中有者六十日風雨和常以六甲之日平旦清明東向望日始出時日上有雲大小貫日中青者以甲乙雨赤者丙丁雨白者庚辛雨黑者壬癸雨黃者戊己日雨六甲日四方雲皆合者即雨以天方雨時視雲有五色黑赤並見者即雹黃白雜者風多雨少青黑雜者雨隨之必滂沛流潦又曰四方有濯魚雲遊疾者即日雨遊遲者雨少至說苑管仲曰吾不能以春風風人夏雨雨人吾道窮矣又曰楚莊王伐陳吳救之雨十日十夜晴左史倚相曰吳師必夜至甲裂壘壞彼必薄我何不行列鼓出待之吳師至見楚軍成陣而還又曰武王伐紂過隧則斬岸過水則析舟示人無反志也至於有戎之隧大風折斾散宜生諫曰此其妖歟武王曰非也天落兵也風霽而乘以大雨散宜生又諫曰此非妖歟王曰非也天洗兵也風俗通曰雨師為玄冥, SBCK: ''}
