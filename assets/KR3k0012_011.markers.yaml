  - {type: variant, offset: 1419, length: 2, content: 嘉元, SBCK: 即大􅀨三日蜀夲記曰秦王誅蜀侯惲後迎葬咸陽天雨三月不通因葬成都故蜀人求􅀨祠蜀侯必􅀨王隱晉書曰束晢太康中郡大旱苗稼敗晢乃命邑人躬共請􅀨三日中􅀨水三尺衆人以其有術數精誠感於神明百姓懽喜爲之歌曰束先生通神明請天三日甘􅀨零我􅁰以萌我稷以生何以疇之報束先生髙閭燕志曰太平十五}
