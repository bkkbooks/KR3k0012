  - {type: variant, offset: 20, length: 2, content: 水從, krp: 於九州之内榮氏曰不毛山不生樹木古無爲之君常處其上布􅎈}
  - {type: variant, offset: 21, length: 4, content: 從雲下也, WYG: 滂沱樂動聲儀曰焦明至爲}
  - {type: variant, offset: 23, length: 0, content: '', SBCK: 􅀨於九州之内榮氏曰不毛山不生樹木古無爲之君常處其上布􅎈雲􅀨九州之内平均河圖祕徴曰君急恚怒無雲而􅀨黄帝素問曰清陽爲天濁隂爲地地氣上爲雲天氣}
  - {type: variant, offset: 23, length: 0, content: '', krp: 雨九州之内平均河圖祕徴曰君急恚怒無雲而雨黄帝素問曰清陽爲天濁隂爲地地氣上爲雲天氣}
  - {type: variant, offset: 24, length: 341, content: 也雨者輔也言輔也言輔時而生養說文曰零徐雨也𩆵音斯小雨裁落也𩂢一林本反霖雨也南陽名霖雨曰𩂢𩆑音酸小雨也𩃔子廉反微雨也𩆃音資雨聲也溟小雨也澍時雨也滑子八反雨下也易曰密雲不雨自我西郊又曰匪寇婚媾往遇雨則吉又曰雲行雨施又曰雨以潤之書曰若歲大旱用汝作霖雨又曰洪范休徵曰肅時雨若又曰納于大麓烈風雷雨弗迷詩曰有渰淒淒興雨祁祁雨我公田遂及我私渰陰雲貌淒淒雲行之貌祁祁猶徐徐也又曰月離于畢俾滂沱矣月離陰星則雨又曰我來自東零雨其濛鸛鳴於垤婦歎於室鄭玄注曰將陰則穴處者先知之鸛好水將雨長鳴而喜也又曰習習谷風以陰以雨禮記月令曰仲春之月始雨水孟春行夏令則雨水不時行秋令則暴雨惣至行冬令則水潦為敗又曰季春行夏令則時雨不降行秋令則淫雨早降又曰時雨將降下水上騰又曰立夏命有司祀雨師又曰孟夏行秋令則苦雨數來又曰六月中, SBCK: 爲􅀨􅀨出地}
  - {type: variant, offset: 24, length: 1, content: 也, krp: 爲}
