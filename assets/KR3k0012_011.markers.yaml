  - {type: variant, offset: 1484, length: 93, content: 上以問輔輔上書曰蹇艮下為山坎上為水山雲為雨蟻穴居知雨將至故以蟻為興漢書名臣奏曰天陰雨人之病為之先動是陰相應而起也天將陰雨又使人睡臥者陰氣也魏志曰曹真伐蜀從子午道南入諸軍或從斜谷道會大霖雨, SBCK: 洽于}
  - {type: variant, offset: 1484, length: 0, content: '', krp: 六月不雨澄詣滏口祠稽首暴露即有二白龍降於祠下於是雨遍數千里干寳搜神記曰湯旣克夏大旱七年洛川竭湯乃以身禱於桑林剪其髪自以爲犧牲祈福於}
  - {type: variant, offset: 1485, length: 0, content: '', krp: 帝於是大雨惣至洽于四海又曰湘東新平縣有一龍穴穴中有黒土歲旱人則共壅水於此穴穴淹則立大雨宋永初山川記曰鄱陽長壽山山形似馬白雲出於鞍中不崇朝而雨盛弘之荆州記曰佷山縣有一山獨立峻絶西北有石穴北行百歩許二大石其間相去一丈許俗名其一爲陽石一爲隂石水旱爲灾鞭陽石則雨鞭隂石則晴又曰湘東有雨母山山有祠壇毎祈禱無不降澤}
  - {type: variant, offset: 1486, length: 5, content: 問輔輔上書, krp: 是名之又}
