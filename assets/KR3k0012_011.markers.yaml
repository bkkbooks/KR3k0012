  - {type: variant, offset: 474, length: 53, content: 作淫雨以害于粢盛若之何不吊又曰如百穀之仰膏雨又曰雨三日以往為霖又曰衛大旱卜有事於山川不吉甯莊子曰昔周饑克殷, SBCK: 者翔風起甘􅀨降霽}
  - {type: variant, offset: 474, length: 444, content: 作淫雨以害于粢盛若之何不吊又曰如百穀之仰膏雨又曰雨三日以往為霖又曰衛大旱卜有事於山川不吉甯莊子曰昔周饑克殷而年豐今邢方無道欲使衛討邢焉從之師興而雨又曰臧文仲如晉雨過御叔在其邑將飲酒御叔魯大夫曰焉用聖人武仲多知時人謂聖人也我將飲酒而已雨行何以聖為公羊傳曰觸石而出膚寸而合側手為膚案指為寸信觸石理而出無有膚寸而不合也不崇朝而遍雨天下者惟太山之雲爾穀梁傳曰春正月不雨者勤雨也欲雨之心勤也夏四月不雨言不雨者閔雨也經一時不雨民之至憂也閔憂六月雨者喜雨也爾雅曰甘雨時降萬民以喜謂之醴泉又曰暴雨謂之凍小雨謂之霡霂久雨謂之霪霪雨謂之霖易稽覽圖曰降陰為雨降陰之雨潤而不破塊京房易飛候曰凡候雨以晦朔弦望雲漢四塞者皆當雨東風曰雷雨有黑雲氣如覆船於日下當雨有黑雲氣如牛彘當雨暴有異雲如水牛不出三日大雨有黑雲如群羊奔如飛鳥五日必雨有雲如浮船皆為雨北斗獨有雲不出五日大雨四望見青白雲名曰天塞之雲雨徵也有蒼黑雲細如杼軸蔽日月五日必雨雲如兩人提鼓持桴皆為暴雨又曰太平之時十日一雨凡歲三十六雨此休徵時若之應尚書說曰淮雨淮暴, krp: 祈}
