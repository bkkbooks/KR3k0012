  - {type: variant, offset: 121, length: 1, content: 則, krp: 太公金匱曰武王師到牧野陣未畢而暴風疾雨雷電幽冥前後不見太公曰善雷電者是吾軍動應天也太公伏符隂謀曰紂常以六月獵於西土西土之老少相與謀曰君王逆人此其命固不壽也後數日而暴風大雨發屋拔木漂殺人民六畜明年諸侯謀合四海兵起又曰武王兵入啇都前歌後舞甲子進兵乙丑而雨太公兵法曰將有三禮武王曰敢問三禮太公曰將冬日不服裘夏日不操扇天雨不張幔蓋名將禮太公對敵權變逆順法曰夫軍出逢天無雲而雨此天泣也軍没不還魏武帝兵書按要曰大軍將行雨濡衣冠是謂洒兵其師有慶又曰三軍將行其旗墊然若雨是謂天露三軍失徒將陣雨甚是謂浴屍先陣者敗亡又曰大將始行雨而薄不濡衣冠是謂天泣其將大凶其卒散亡雜兵書曰諸雲氣諸變暈日月蝕風散之雲振之雨壓之皆解又曰大人之兵如虎如狼如風如雨如雷如電振振瞑暝天下盡驚又曰軍始營風雨從後來沾衣裳大}
