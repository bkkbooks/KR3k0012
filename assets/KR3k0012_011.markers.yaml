  - {type: variant, offset: 4078, length: 2, content: 甘雨, SBCK: 陽先生養於此帝王歷代養龍之處國有水旱不時即祀池請􅀨爾雅孫炎注曰攝木生江上有􅀉枝髙三四丈生毛一名楓子天旱以泥塗之即􅀨傅咸自叙曰太始九年自春不􅀨渉夏節聖皇勞慮分使祈禱余以太子洗馬兼司徒涖事三朝􅀨大降退作喜􅀨賦霽􅀃文曰霽􅀨止也霋音妻􅀨霽也霩火郭反􅀨上雲罷貌魏略五行志曰延康元年大霖􅀨五十餘日魏有天下乃霽將受魏祚之應也晉中興徴祥記曰咸和四年隂霖五十餘日􅂫峻滅乃霽長沙􅂄舊傳曰文度字仲儒爲郡功曹吏時霖􅀨廢人業太守憂悒召度􅀘户曹度奉教齊戒在社三日夜夢白頭翁謂曰爾來何遲翌旦度具白所夢於太守曰昔禹夢青繡文衣男子稱蒼水使者禹知水脉當􅀂椽此夢將其比也明日果大霽扶南日南傳曰金陳國入四月便􅀨六月乃止少有晴日六月不􅀨常晴􅀊􅀊如此太平御覽卷第十一}
