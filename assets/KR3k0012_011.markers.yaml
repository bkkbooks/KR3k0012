  - {type: variant, offset: 5, length: 12, content: 釋名曰雨羽也如鳥羽動則散, SBCK: 􅁏甘可熟而食}
  - {type: variant, offset: 5, length: 1, content: 釋, WYG: 肉甘可熟而食又鄭有不毛山上有無為之君分布雲雨於九州之内榮氏曰不毛山不生樹木古無為君常處其上布灑雲雨九州之内平均河圖秘徴曰君急恚怒無雲而雨黄帝素問曰清陽為天濁隂為地地氣上為雲天氣下為雨雨出地氣雲出天氣又天氣下而為雨太公金匱曰武王師到牧野陣未畢而暴風疾雨電雷幽㝠前後不見太公曰善雷電者是吾軍動應天也太公隂符謀曰昔紂嘗以六月獵於西土西土之老少相與謀曰君王逆天此其命固不夀也後數日而暴風大雨發屋㧞木漂殺人民六畜明年諸侯謀合四方兵起又武王兵入商郊前歌後舞甲子進兵乙丑而雨太公兵法曰將有三禮武王曰敢問三禮太公曰將冬日不服裘夏日不操扇天雨不張幔蓋名將禮太公對敵權變逆順法曰夫軍出逢天無雲而雨天泣也軍没不還魏武帝兵書按要曰大軍將行雨濡衣冠是謂灑兵其師有慶又三軍將行其旗墊然若雨是謂天露三軍失徙將軍雨甚是謂浴屍先陣者敗亡雜兵書曰諸雲氣諸變暈日月蝕風散之雲振之雨壓之皆觧又大人之兵如虎如狼如風如雨如雷如震振振暝暝天下盡驚又如軍營風雨從後來沾衣裳大吉又有大雲雨軍内滂沱甚者軍罷無功桓寛鹽鐵論曰孔子大聖也嘗居上位相魯三月不令而行不禁而止沛若時雨之灌萬物莫不興起也王充論衡曰道至天者翔風起甘雨降霽而隂曀者謂之甘雨非謂雨水味甘也又太平之時五日一風十日一雨又周公時雨不破塊風不鳴條旬而一雨雨必以夜丘陵髙下皆熟神異經曰西海上有人焉乘白馬朱鬛白衣赤冠從十二童子馳馬西海如飛}
