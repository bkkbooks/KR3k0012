  - {type: variant, offset: 4080, length: 0, content: '', WYG: 爾雅孫炎註曰攝木生江上有竒枝高三四丈生毛一名楓子天旱以泥塗之即雨傅咸自叙曰太始九年自春不雨渉夏節聖皇勞慮分使祈禱余以太子洗馬兼司徒祈越三朝雨大䧏退作喜雨賦霽說文曰霽雨止也霋雨齊也霩火節反雨止雲罷貎魏略五行志曰延康元年大霖雨五十餘日魏有天下乃霽魏將受祚之應也晉中興徴祥記曰咸和四年隂霖五十餘日蘇峻滅乃霽長沙耆舊傳曰文度字仲儒為郡功曹吏時霖雨廢人業太守憂悒占度補戸曹度奉教齋戒在社三日夜夢白頭翁謂曰爾來何遲翌旦度具白所夢於太守曰昔禹夢青繡文衣男子稱蒼水使者禹知水脉當若是椽此夢將若此也明果大霽扶南日南傳曰金陳國入四月便雨六月乃止少有晴日六月不雨常晴歲歲如此太平御覽卷十一}
