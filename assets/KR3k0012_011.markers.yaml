  - {type: variant, offset: 1810, length: 311, content: 曰陰陽二氣之初蒸也若有若無若實若虛團攢聚合其體稍重乘虛而墜風多則合速故雨大而踈風少則合遲故雨細而密湘州記曰零陵山有石鷰遇風雨即飛止還為石王采安成記曰萍鄉西津名玉女崗天當雨輒先涌五色氣於石間俗謂玉女披衣搜神記曰武王伐紂至河上雨甚疾雷晦冥揚波於河眾甚懼武王曰余在天下誰敢干余者風波立濟述異記曰廬山有康王谷北嶺上有一城號劉城天每有雨輒聞山上有鼓角笳簫之聲村人以為常候武昌記曰武昌城東南有金牛崗西有石鼓山上有三石鼓石鼓鳴天必雨羅浮山記曰山有龜淵淵有神龜龜鼻貫銅鐶若有人穢此淵即注雨周處風土記曰榆莢雨春雨黃雀風濯梅雨六月之風雨也又曰六月有大雨名濯枝雨荊楚歲時記曰六月必有三時雨田家以為甘澤邑里相賀曰嘉雨王子年拾遺記曰甘雨濛濛似露委草, SBCK: 請􅀨秋用桐}
  - {type: variant, offset: 1810, length: 764, content: 曰陰陽二氣之初蒸也若有若無若實若虛團攢聚合其體稍重乘虛而墜風多則合速故雨大而踈風少則合遲故雨細而密湘州記曰零陵山有石鷰遇風雨即飛止還為石王采安成記曰萍鄉西津名玉女崗天當雨輒先涌五色氣於石間俗謂玉女披衣搜神記曰武王伐紂至河上雨甚疾雷晦冥揚波於河眾甚懼武王曰余在天下誰敢干余者風波立濟述異記曰廬山有康王谷北嶺上有一城號劉城天每有雨輒聞山上有鼓角笳簫之聲村人以為常候武昌記曰武昌城東南有金牛崗西有石鼓山上有三石鼓石鼓鳴天必雨羅浮山記曰山有龜淵淵有神龜龜鼻貫銅鐶若有人穢此淵即注雨周處風土記曰榆莢雨春雨黃雀風濯梅雨六月之風雨也又曰六月有大雨名濯枝雨荊楚歲時記曰六月必有三時雨田家以為甘澤邑里相賀曰嘉雨王子年拾遺記曰甘雨濛濛似露委草木則滴瀝雨也又曰香雲成香雨帝王世紀曰黃帝遊洛水上見大魚殺五牲以醮天乃甚雨七日七夜魚流始得圖書今河圖是也家語曰孔子將行遇雨不假蓋於子夏護其短也又曰齊有一足之鳥集於殿前舒翅而跳齊候異之使聘魯訪諸孔子曰此鳥名曰啇羊昔童兒有屈一腳振訊雨臂而跳且謠曰天將大雨啇羊鼓舞今齊有之其應至矣急告趣治溝渠脩隄防將有大雨水為災果大霖雨水溢泛諸國傷害人民唯齊有備不敗景公曰聖人之言信而有徵矣老子曰暴雨不終日莊子曰宋景公時大旱三年卜云以人祀乃雨公下堂頓首曰吾所求雨者為人今殺人不可將自當之言未卒天大雨方千里又曰堯讓天下於許由許由曰曰月出矣而爝火不息時雨降矣而猶浸灌不亦勞乎文子曰若與俗處猶走逃雨也無之而不濡列子曰赤松子神農時雨師也廣成子曰黃帝時雲不待族而雨尸子曰神農理天下欲雨則五日為行雨旬為谷雨旬五日為時雨萬物咸利故謂之神雨孟子曰油然作雲霈然下雨抱朴子曰軍始發大風甚雨起於後大勝之徵也軍始出雨沾衣者是謂潤兵軍有功雨不足沾衣裳是謂泣軍必敗又曰無雲而雨是謂雨血將軍當楊兵講武以應之雨軍中尤甚者將軍戰必無功也管子曰冬作土功發地藏則夏多暴, krp: 請}
