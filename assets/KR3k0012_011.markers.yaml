  - {type: variant, offset: 1341, length: 1, content: 祝, SBCK: 請􅀨豐澤應澍􅀨與京師同日俱霈還拜五官中郎將又曰周暢性仁慈爲河南尹夏旱乆禱無應因収葬洛城傍客死骸骨萬餘人應時澍􅀨􅀊乃豐稔又曰章和元年有詔以鄭􅀪爲太尉時旱朝廷百僚皆暴請􅀨夏炎熱小􅀨群官即還舎􅀪彌日不旋大􅀨澍稼穡遂豐又曰汝南周􅀗善占天文爲郡門下椽鮑昱爲汝南太守時郡境天旱昱自徃問何以致􅀨􅀗曰急罷三部督郵明府當自北出到四十里亭􅀨可致也昱從之果得大􅀨毎行縣輒軾}
  - {type: page-break, offset: 1341, content: '', id: KR3k0012_SBCK_011-4a}
  - {type: variant, offset: 1341, length: 1, content: 祝, WYG: 請雨豐澤應時與京師同日俱霈還拜五官中郎將又曰周暢性仁慈為河南尹夏旱久禱無應因收葬洛城傍客死骸骨萬餘人應時澍雨歲乃豐稔又章和元年有詔以鄭宏為大尉時旱朝廷百僚皆暴請雨夏炎熱小雨郡官即還舎宏彌日不旋大雨如注稼穡遂豐又汝南周獲善占天文為郡門下椽鮑昱爲汝南太守時郡境大旱昱自往問何以致雨獲曰急罷三部督郵明府當自北出到四十里亭雨可致也昱從之果得大雨每行縣輒軾}
