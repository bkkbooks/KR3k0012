  - {type: variant, offset: 1602, length: 94, content: 樊秋大霖雨漢水溢平地水數丈六軍皆沒晉書曰詔以王雅為太子少傅將拜遇雨請以繖入王珣不許因冒雨而拜又曰樊英隱於壺山嘗有暴風從西南起英謂學者曰成都市火甚盛因含水西向漱之乃令記其時日後有從蜀郡來者云, WYG: 北苑}
