  - {type: variant, offset: 1298, length: 536, content: 學者以商丘為契封謬矣湯始居亳學者咸以亳本帝嚳之墟在禹貢豫州洛河之間今河南偃師西二十里尸鄉之陽亭是也以經考之事實甚失其正孟子稱湯居亳與葛為鄰案地理志葛今梁國寧陵之葛鄉是也湯地七十里葛又伯耳封域有制葛伯不祀湯使亳眾為之耕有童子餉食葛伯奪而殺之計寧陵至偃師八百里而使亳眾為耕童子餉食非其理也今梁自有二亳南亳在穀熟北亳在蒙非偃師也故古文仲虺之誥曰乃葛伯仇餉初征自葛即孟子之言是也湯又盟諸侯于景亳然則二亳皆在梁矣春秋會于亳是也太甲既立不明伊尹放諸桐世本又言太甲從上司馬在鄴西南案詩書太甲無遷都之文桐宮其在斯乎仲丁徙囂或曰今河南之敖倉是也故書序曰仲丁徙于囂河亶甲徙相在河北故書序曰河亶甲居相是也祖乙徙耿為河所毀故書序曰祖乙圯于耿今河東有耿鄉是也及盤庚立復南居亳之殷地故書序曰將治亳殷今偃師是也然則殷有三亳二亳在梁國一亳在河南南亳偃師即湯都也蒙為北亳即景亳湯所盟地偃師為西亳即盤庚所徙者也故立政篇曰三亳坂尹是也武丁徙朝歌於周為衛今河內縣也紂自朝歌北築沙丘臺沙丘地理志在鉅鹿東北七十里邯鄲國屬趙於禹貢在冀州大陸之野昴畢之分大梁之次至今民俗歌謠男女淫縱猶有紂之餘風世稱趙女之美是也又曰周后稷始封邰今扶風是也及公劉徙邑於豳今新平漆之東北有豳亭是也故詩稱篤公劉于豳斯館至太王避狄循漆水踰梁山徙邑, SBCK: 去止}
