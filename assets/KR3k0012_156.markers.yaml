  - {type: variant, offset: 8, length: 1, content: 釋, WYG: 説曰陛下都雒陽豈欲與周室比隆哉上曰然敬曰陛下取天下與周室異周自后稷堯封之邰積德累善十有餘世成王即位而營雒邑以為此天下中也貢職道里均有德易以王無德易以亡凡居此者欲令務以德致人不欲依險阻令後世驕奢以虐人也今陛下與項籍戰滎陽爭成臯大戰七十小戰四十使天下之人肝腦塗地暴骨中野欲與成康比隆臣以為不侔矣夫秦被山帶河四塞之固夫與人鬬不搤其喉拊其背未能全勝上疑之及留侯言之上即日車駕西都賜敬姓劉氏拜郎中號奉春君漢書曰劉敬説上都闗中上疑之左右大臣皆山東人多勸上都雒陽曰雒陽東有成臯西有崤函背河向雒其固亦足恃張良曰雒陽雖有此固其中小不過數百里田地薄四面受敵此非用武之國夫闗中左崤函右隴蜀沃野千里南有巴蜀之饒北有胡苑之利阻三面而獨守以一靣東制諸侯安定河渭漕輓天下西給京師諸侯有變順流以下足以委輸此所謂金城千里天府之國劉敬説是也上即日車駕西都闗中又曰秦中形勢之國也地勢便利以下兵於諸侯譬如髙屋之建瓴水也又曰翼奉上書曰天道有常王道亡常亡常者所以應常也必有非常之主然後能立非常之功臣願陛下徙都於成周左據成臯右阻澠池前鄉崧髙後界大河師古曰鄉讀曰嚮介隔也碍也建滎陽扶河東南北千里以為闗而入敖倉地方里者八九足以自娛東厭諸侯之權西逺胡羌之難師古曰厭抑也音一葉反逺音于萬反陛下恭已亡為按成周之居兼盤庚之德萬歳之後長為髙崇後漢書建武元年冬十月癸丑車駕入洛陽幸南宫却非殿遂定都洛陽宫南有却非殿又曰時京師修起宫室濬繕城隍而闗中耆老猶望朝廷西顧班固感前代相如壽王東方之徒造構文辭終以諷勸相如作上林子虛賦吾丘壽王作士大夫論及驃騎將軍頌東方朔作客難及非有先生論其辭以諷喻為主也乃上兩都賦盛稱洛邑制度之美以折西賔淫佚之論又黄琬傳董卓秉政以琬}
