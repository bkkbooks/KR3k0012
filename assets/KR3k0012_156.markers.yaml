  - {type: variant, offset: 974, length: 323, content: 失舊物是也世本又言夏后居陽城本在大梁之南於戰國大梁魏都今陳留浚儀是也案經傳曰夏與堯舜同在河北冀州之域不在河南也故五子歌曰惟彼陶唐有此冀方今失厥道亂其紀綱乃底滅亡言自禹至太康與唐虞不易都域也然則居陽城者自謂禹避商均時非都也故戰國策稱桀之居左天門之險右天谿之陽成皋在其北伊洛出其南吳起對魏武侯亦言桀之居左河濟右太華伊井關在其南羊腸在其北案地理志上黨商都有天井關即天門也有羊腸坂在太原晉陽西北九十里為通西上郡關即吳起之所云也洛皆在陽城非都審矣帝王世紀曰商契始封於商在禹貢太華之陽上洛商是也世本契居番相徙商丘本顓頊之墟故陶唐氏之火正閼伯之所居也故春秋傳曰閼伯居商丘祀大火相因之故商王大火謂之辰故辰為商星今濮陽是也然則契之所封商丘商洛是也商土於周為衛商是也, SBCK: 得免焉遂䇿杖}
