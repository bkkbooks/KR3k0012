  - {type: variant, offset: 3228, length: 2, content: 即今, SBCK: 頋曰此龍門耶自古何爲不建都於此僕射􅂫威對曰自古非不知以俟陛下帝大恱然其地北據山麓南望天闕水木滋茂川源形勝自古都邑莫有比也又曰太宗車駕始幸洛陽宫唯因舊宫無所改製終於貞觀永徽之間荒蕪虚耗置都之後方漸修􅀘龍朔中詔司農少卿韋機更繕造髙宗常謂機曰兩京朕}
