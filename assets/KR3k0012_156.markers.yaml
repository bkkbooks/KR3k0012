  - {type: variant, offset: 258, length: 436, content: 力所能成天地性自然也京師義亦取此帝王世紀曰宓羲為天子都陳在禹貢豫州之域西望外方東及明緒於周陣胡公所封故春秋傳曰陳太昊之墟也於漢屬淮陽今陳國是也神農氏亦都陳又營曲阜故春秋稱魯大庭氏之庫黃帝都涿鹿於周官幽州之域在漢為上谷而世本云涿鹿在彭城南然則上谷本名彭城今上谷有涿鹿縣及蚩尤城阪泉地又有黃帝祠皆黃帝戰蚩尤之處也或曰黃帝都有熊今河南新鄭是也少昊民自窮桑登位故春秋傳曰世不失職遂濟窮桑登帝位在魯北後徙曲阜於周為魯在禹貢徐州蒙羽之野奎婁之分降婁之次周以封伯禽故春秋傳曰命伯禽而封少昊之墟是以書敘稱魯公伯禽宅曲阜是也顓頊氏自窮桑徙商丘於周為衛在禹貢冀州太行之東北踰常山及兗州桑土之野營室東壁之分豕韋之次故春秋傳曰衛顓頊之墟也謂之帝丘今東郡濮陽是也帝嚳氏都宅今河南偃師是也禹貢外方之城嵩之北或言在梁非也帝堯氏始封於唐今中山唐縣是也堯山在焉唐水在西北入唐河南有望都縣山即堯母慶都之所居也相去五十里都山一名亙山北登堯山南望都山故名其縣曰望都而地理志堯山在唐南山中張晏以堯山實在唐北地理志堯, WYG: 攻}
