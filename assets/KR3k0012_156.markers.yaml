  - {type: variant, offset: 2958, length: 263, content: 潤州江寧縣宋齊梁陳並同居建康梁元帝及後梁蕭詧又別居江陵永嘉之亂有十六國各建都邑前涼張軌都燉煌後涼呂光都姑臧後涼禿髮烏孤都略陽西涼李暠都酒泉北涼沮渠蒙遜都張掖前燕慕容廆初都和龍後徙薊又徙鄴後燕慕容垂都中山南燕慕容德都廣固北燕馮跋都和龍前秦符堅後秦姚萇並都長安西秦乞伏國仁都定樂前趙劉聰都平陽從趙石勒都襄國至右季龍都鄴後蜀李特都成都夏赫連勃勃都統萬城又曰永嘉南遷後魏據中原初都代又徙洛陽至文帝遷長安孝靜帝遷都鄴號東魏西魏東魏禪北齊高洋以鄴為上都晉陽為下都西魏禪周周禪隋並都長安隋高祖營大興城后徙居之名曰長安今西京也隋煬帝遷洛陽於故, SBCK: ''}
