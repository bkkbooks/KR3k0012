  - {type: variant, offset: 3232, length: 1, content: 城, SBCK: 於此日巳營構而宮府備矣郡國誌廬山在柴桑彭澤二縣之郊疊障九成崇巖萬仭山海經所謂三天子障亦曰天子都楊雄蜀都賦曰蜀都之地古曰梁州張衡南都賦曰於顯樂都旣麗且康陪京之南居漢之陽魯都賦曰彼齊諸儒皆繪弁端衣散佩垂紳金聲玉色温故知新訪魯都之區域弔先王之遺眞左思蜀都賦曰蓋兆基於上丗開國於中古廓靈􅀜而爲門苞玉疊而爲宇又曰魏土者畢􅄧之所應夏之餘民先王之桑梓列聖之遺塵考之四奥則八紘之中測之寒暑則霜露所均後漢杜篤論都賦夫大漢之盛代藉雍土之饒得御外理内之術孰能致功􅀂斯創業於髙祖嗣傳於孝惠徳隆於太宗財衍於孝景威盛於聖武政行於宣元侈極於成哀祚缺於孝平傳代十一歷載三百髙祖至平帝十一代歷渉}
  - {type: page-break, offset: 3232, content: '', id: KR3k0012_SBCK_156-7b}
  - {type: page-break, offset: 3232, content: '', id: KR3k0012_SBCK_156-8a}
  - {type: variant, offset: 3232, length: 0, content: '', WYG: 於此日加營構而宫府備矣郡國志廬山在柴桑彭澤二縣之交疊障九成崇㘙萬仞山海經所謂天帝都揚雄蜀都賦曰蜀都之地古曰梁州張衡南都賦曰於顯樂都既麗且康陪京之南居漢之陽魯都賦曰彼齊諸儒散佩垂紳金聲玉色温故知新訪魯都之區}
  - {type: variant, offset: 3232, length: 1, content: 城, krp: 於此日巳營構而宮府備矣郡國誌廬山在柴桑彭澤二縣之郊疊障九成崇巖萬仭山海經所謂三天子障亦曰天子都楊雄蜀都賦曰蜀都之地古曰梁州張衡南都賦曰於顯樂都旣麗且康陪京之南居漢之陽魯都賦曰彼齊諸儒皆繪弁端衣散佩垂紳金聲玉色温故知新訪魯都之區域弔先王之遺眞左思蜀都賦曰蓋兆基於上丗開國於中古廓靈關而爲門苞玉疊而爲宇又曰魏土者畢昴之所應夏之餘民先王之桑梓列聖之遺塵考之四奥則八紘之中測之寒暑則霜露所均後漢杜篤論都賦夫大漢之盛代藉雍土之饒得御外理内之術孰能致功若斯創業於髙祖嗣傳於孝惠徳隆於太宗財衍於孝景威盛於聖武政行於宣元侈極於成哀祚缺於孝平傳代十一歷載三百髙祖至平帝十一代歷渉}
  - {type: variant, offset: 3233, length: 0, content: '', WYG: 弔先王之遺貞左思蜀都賦曰盖兆基於上世開國於中古廟靈闗以為門包玉壘而為宇左思魏都賦曰魏地者畢昴之所應虞夏之餘人先王之桑梓列聖之遺塵考之四隈則八紘之中測之寒暑則霜露所均後漢杜篤論都賦非夫大漢之盛代藉雍土之饒得御外理内之術孰能致功若斯故創業於髙祖嗣傳於孝惠德隆於太宗財衍於孝景威盛於聖武政行於宣元侈極於成哀阼缺於孝平傳代十一厯載三百髙祖至平帝}
