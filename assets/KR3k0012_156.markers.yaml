  - {type: variant, offset: 3225, length: 1, content: 對, SBCK: 自周敬王後漢並居於今之故都至仁壽四年隋文帝於此營建􅀄謂之東京有詣闕言事者稱一帝二京事非稽古乃改爲東都爲王充所據充平改爲洛州惣管府㝷又置陜東大行臺武德九年復爲洛州都督府貞觀六年改爲東都舊宮爲洛陽宮明慶元年復爲東都武太后虢爲神都神龍元年復舊又改爲河南府洛水貫都有河漢之象􅀄隋焬帝登北邙觀}
