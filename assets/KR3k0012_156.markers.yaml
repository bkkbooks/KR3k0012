  - {type: xml-element, offset: 3234, content: '', id: KR3k0012_CHANT_156-bkkxmlele66}
  - {type: variant, offset: 3234, length: 0, content: '', SBCK: 合二百一十曰年此言三百者謂出二百年渉三百年德衰而復盈道微而復彰謂吕氏乱而文帝興昌邑廢而宣帝中興皆莫能遷於雍州而背於咸陽宮室寢廟山陵相望髙顯􅀪麗可思可榮羲農巳來無兹著明夫雍州本帝皇所以育業周始祖后稷封邵公劉居􅃎太王居歧文王居鄷武王居鎬並在􅀜中故曰育業也霸王所以衍功戰士角難之塲也衍廣也謂秦都􅀜内也太平御覽卷第一百五十六}
  - {type: page-break, offset: 3234, content: '', id: KR3k0012_SBCK_156-8b}
  - {type: variant, offset: 3234, length: 0, content: '', WYG: 十一代厯涉合二百一十四年此言三百者謂出二百年渉三百年德衰而復盈道微而復彰謂吕氏亂而文帝興昌邑廢而宣帝中興皆莫能遷於雍州而背於咸陽宫室寢廟山陵相望髙顯𢎞麗可思可榮羲農已来無兹著明夫雍州本帝皇所以育業周始祖后稷封邵公劉居豳太王居岐文王居酆武王居鎬並在闗中故曰育業也霸王所以衍功戰士角難之塲也衍廣也謂秦都闗中也太平御覽卷一百五十六}
