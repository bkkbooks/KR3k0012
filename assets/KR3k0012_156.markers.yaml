  - {type: punctuation, offset: 1987, content: 『, id: KR3k0012_CHANT_156-bkkpn604}
  - {type: variant, offset: 1987, length: 397, content: 八方之廣周洛為中於是遂築新邑營定九鼎以為王之東都之洛邑故周書稱我乃卜澗水東瀍水西唯洛食是為王城名曰東周故公羊傳曰王城者何東周也地理志王城本郟鄏之地是以或謂之郟鄏故春秋傳曰成王定鼎于郟鄏河南是也今郟鄏東門名鼎門蓋九鼎所從入也成王既卜營洛邑建明堂朝諸侯復還酆鄗故書序曰成王既黜殷命還歸在酆至懿王徙大丘秦謂之廢丘今京兆槐里是也世本曰懿王居大丘厲王淫亂出于彘今河東永安是也平王即位徙居洛洛誥所謂新邑也國語曰幽王滅周乃東遷本殷之畿內在禹貢豫州外方之域河洛瀍澗之間周於南柳七星張之分鶉火之次也及敬王避子朝之亂東居成周故春秋經曰天王入于成周是也後六年王室定遂徙都成周是後晉又率諸侯之徒修繕其城以成周城小不受王都故壞翟泉而廣焉翟泉地在成周東北今洛陽城中有周王冢是也至赧王又徙居西周而失位又曰秦非子始封於秦故秦本紀稱周孝王曰朕分之土邑秦本隴西秦谷亭是也玄孫莊公徙廢丘周懿王之所都今槐里是也及襄公始受酆之地列為諸侯, SBCK: 隋}
