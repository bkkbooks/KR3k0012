  - {type: punctuation, offset: 11, content: 「, id: KR3k0012_CHANT_156-bkkpn4}
  - {type: variant, offset: 11, length: 0, content: '', WYG: 金陵有王者氣故掘斷連岡改名秣陵有别小江可以貯船宜為}
  - {type: variant, offset: 12, length: 0, content: '', SBCK: 雒陽豈欲與周室比隆哉上曰然敬曰陛下取天下與周室異周自后稷堯封之邰積德累善十有餘丗成王即位而營雒邑以天下中四方貢職道理均有德易以王無德易以亡凢居此}
  - {type: variant, offset: 12, length: 0, content: '', WYG: 邑遂自京口遷都吳志先是有童謡云寧飲建業水不食武昌魚寜歸建業死不就武昌居於是吳主乃遷都建業按江表傳漢建安中蜀主曽宿於秣陵覩江山之秀勸帝居之初張紘常謂帝曰秣陵都楚威王所置名為金陵其地岡阜綿連嘗訪問故老云昔秦始皇東遊㑹稽曽改名此縣望氣者云金陵地形有王者都邑之氣故掘斷東岡改名秣陵今即所見其地有其氣象天之所㑹實宜為都邑帝深善之後聞蜀主語曰智者意同按吳録蜀主曽使諸葛亮至京口覩秣陵山阜歎日鍾山龍盤石頭虎踞帝王之宅晉書成都王頴以周馥為河南尹馥觀洛陽孤危乃建策迎天子都壽春曰不圖厄運戎狄交侵畿甸危逼僉以殷人有屢遷之事周王有岐山之徙方今河朔蕭條崤函阻泄宛都屢敗江漢多虞淮陽之地北阻險山南枕靈岳名州四帶有重險之固運漕四通無屢空之艱雖聖上神聰元輔明賢居儉守約用保宗廟未若相土遷宅以保永祚也載記曰劉元海之僣太史令宣于脩之言於元海曰陛下鳳翔龍興奄受大命然皇居仄陋非可久安平陽勢有紫氣兼陶唐舊都願陛下上迎乾象下協坤祥乃遷都平陽又石勒下令曰武都吾之豐沛萬歲之後䰟魄歸之初張賔謂勒曰今天下鼎沸戰爭方始夫得地者昌失地者亡邯鄲襄國趙之舊都依山憑險形勝之國可擇此二國而都之然後命將四岀授以竒略推亡固存兼弱攻昧王業成矣遂據襄國又苻堅自臨晉登龍門願謂羣臣曰美哉山河之固婁敬有言闗中四塞之國真不虛矣權翼對曰臣聞夏殷之都非不險也周秦之衆非不多也終於身殞南巢首懸白旗軀殘於犬戎國分於項籍何也德不脩故耳吳起有云在德不在險願陛下守之以德山河之固不足恃也江表傳曰孫皓欲徙都武昌百姓沿流供給殊以為患陸凱上疏曰臣聞有道之君以樂樂人無道之君以樂樂身樂人者其樂彌長樂身者不久而亡民}
