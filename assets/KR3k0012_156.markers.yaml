  - {type: variant, offset: 799, length: 1, content: 世, SBCK: 所都本無定處其如黔首萬姓未見輿駕入建業謂是列國諸王冝順百姓之心從四海之望時江陵人士咸云弘正等皆是東人志願東下恐非良計弘正面折之曰􅀂東人勸東謂爲非計君等西人欲西豈成良䇿梁主􅀏之又於後堂大㑹文武五百人問之曰吾欲還業諸卿以爲何如衆皆愕然莫敢先對梁主曰勸吾去者左祖於是左祖者過半武昌太守朱買臣入勸梁主云建業舊都瑩陵猶在荆鎭邊疆非王者宅願陛下弗疑致後悔也臣家在荆州豈不願陛下住但恐是臣冨貴非陛下冨貴耳乃召卜者杜景豪决其去留遇兆不吉荅云未去景豪退而言曰此兆爲􅀑賊所留也五經要義曰王者受命創始建國立都必居中土所以揔天地之和據隂陽之正均統四方以制萬國者也王嬰古今通論曰崑崙東南方五千里謂之神州州中有和美郷方三千里五岳之城帝王之宅聖人所生也鹽鐵論曰燕之涿薊趙之邯鄲魏之温軹韓之滎陽齊之臨淄楚之宛陳鄭之陽翟三川之二周富􅃣海内皆爲天下之名都丗􅀃曰謝公時兵厮養逋亡多外竄在南塘下諸舡中或欲求一時捜索謝公不許云不容置此軰何以爲京師譙周法訓曰王者居中國何也順天之和而同四方之統也管子曰凢立國都非太山之下必廣州之上髙無近旱而水用足下無近水而溝防省因天材就地利故城郭不必中規矩道路不必中准繩山海經曰青要之山實惟帝之密都郭璞注曰大帝曲密之邑又曰帝之下都崑崙之􅇕又曰從極之深三百仭唯冰夷都焉冰夷河伯尸子曰舜一徙成邑再徙成都三徙成國堯聞之賢舉之草茅之中與之語禮樂而不逆與之語政至簡而易行與之語道廣大而不窮於是妻之以皇媵之以娥九子事之而託天下焉帝王丗}
