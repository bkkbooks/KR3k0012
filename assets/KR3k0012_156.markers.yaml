  - {type: variant, offset: 453, length: 205, content: 後徙曲阜於周為魯在禹貢徐州蒙羽之野奎婁之分降婁之次周以封伯禽故春秋傳曰命伯禽而封少昊之墟是以書敘稱魯公伯禽宅曲阜是也顓頊氏自窮桑徙商丘於周為衛在禹貢冀州太行之東北踰常山及兗州桑土之野營室東壁之分豕韋之次故春秋傳曰衛顓頊之墟也謂之帝丘今東郡濮陽是也帝嚳氏都宅今河南偃師是也禹貢外方之城嵩之北或言在梁非也帝堯氏始封於唐今中山唐縣是也堯山在焉唐水在西北入唐河南有望都縣山即堯母慶都之所居也相去五十里都山一名亙山北登堯, SBCK: 阻塗}
