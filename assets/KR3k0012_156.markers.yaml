  - {type: punctuation, offset: 10, content: 》, id: KR3k0012_CHANT_156-bkkpn2}
  - {type: variant, offset: 10, length: 0, content: '', WYG: 臣徴為司徒遷太尉卓議遷都長安琬與司徒楊彪同諫不從琬退而駮議之曰昔周公營洛邑以寧姬光武卜東都以隆漢天之所啟神之所安大業既定豈妄有遷動以虧四海之望也又曰杜篤以闗中表裏山河先帝舊京不宜改營洛邑乃上奏論都賦又曰王景建初七年遷徐州刺史先是杜篤上論都賦欲令車駕遷還長安耆老聞者皆動懷土之心莫不眷然佇立西望景以宫廟已立恐人情疑惑㑹時有神雀諸瑞章帝時有神雀鳳凰白鹿白鳥等瑞乃作金人論頌洛邑之美天人之符文有可採又曰陳紀遷侍中出為平原相謁董卓時欲徙都長安乃謂紀曰三輔平敞四靣險固土地肥美號為陸海今闗東兵起恐洛陽不可久居長安猶有宫室今欲遷何如紀曰天子有道守在四夷左傳之文宜修德政以懷不附遷移至尊誠計之末者愚以公宜事委公卿專精外任其有違命則威之以武今闗東兵起民不堪命若謙逺朝政率師討伐則塗炭之民庶幾可全若欲徙萬乘以自安將有累卵之危崢嶸之險也卓意甚恨而敬紀名行無所復言吳録曰張紘言於孫權曰秣陵楚武王所置名為金陵秦始皇時望氣者}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_WYG_156-4a, image: WYG0894/WYG0894-0423c.png}
