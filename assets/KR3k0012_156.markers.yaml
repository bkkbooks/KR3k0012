  - {type: variant, offset: 13, length: 1, content: 國, SBCK: 欲令務以德致人不欲依險阻令後丗驕奢以虐人也今陛下與項籍戰滎陽爭成臯大戰七十小戰四十使天下之人肝腦塗地􅁀骨中野欲與成康比隆臣以爲不侔矣夫􅁗􅀍山帶河四塞之固夫與人􅃲不搤其喉拊其背未能全勝上疑之及留侯言之上即日車駕西都賜敬姓劉氏拜郎中號奉春}
  - {type: page-break, offset: 13, content: '', id: KR3k0012_SBCK_156-1b}
  - {type: variant, offset: 13, length: 1, content: 國, krp: 欲令務以德致人不欲依險阻令後丗驕奢以虐人也今陛下與項籍戰滎陽爭成臯大戰七十小戰四十使天下之人肝腦塗地暴骨中野欲與成康比隆臣以爲不侔矣夫秦𬒳山帶河四塞之固夫與人鬪不搤其喉拊其背未能全勝上疑之及留侯言之上即日車駕西都賜敬姓劉氏拜郎中號奉春}
  - {type: variant, offset: 14, length: 0, content: '', WYG: 之根也誠宜重其食愛其命民安則}
  - {type: variant, offset: 15, length: 38, content: 所居人所都會也邑猶俋聚會之稱也左傳曰邑有先君宗廟之主曰都尚書太傳曰十邑為都尚, SBCK: 漢}
  - {type: variant, offset: 15, length: 0, content: '', WYG: 樂矣又武昌土地危險磽确非王者建都安國養民之處船泊則沈漂陵居則峻危且童謡曰寧飲建業水不食武昌魚寧還建業死不就武昌居臣聞翼星為祥熒惑作妖童謡之言發自天心也後魏書孝文太和十八年遷都鄴登銅雀䑓魏御史大夫崔吉等曰鄴城平原千里運漕四通有西門吳起舊迹可致饒富在德不在險請都之孝文曰君知其一未知其二鄴城非常久之地石虎傾於前慕容滅於後國富主奢逞暴速敗且西有枉人山東有列人縣北有柏人城君子飲盗泉惡其名也遂止乃都洛陽三國典略梁元帝在江陵即位欲還都建鄴領軍將軍胡僧祐太府卿黄羅漢吏部尚書宗懔御史中丞劉㲄等曰建鄴氣已盡與虜止隔一江若有不虞悔無及也且渚宫洲數滿百當出天子陛下龍飛是其應也梁主令朝臣議之黄門侍郎周𢎞正尚書左僕射王褒曰帝王}
  - {type: page-break, offset: 15, content: '', id: KR3k0012_WYG_156-7a, image: WYG0894/WYG0894-0425a.png}
  - {type: page-break, offset: 15, content: '', id: KR3k0012_WYG_156-7b, image: WYG0894/WYG0894-0425b.png}
  - {type: variant, offset: 15, length: 38, content: 所居人所都會也邑猶俋聚會之稱也左傳曰邑有先君宗廟之主曰都尚書太傳曰十邑為都尚, krp: 漢}
  - {type: variant, offset: 16, length: 0, content: '', WYG: 都本無定處其如黔首萬姓未見輿駕入建入建鄴謂是列國諸王宜順百姓之心從四海之望時江陵人士咸云𢎞正東人志願東下恐非良計𢎞正折之曰若東人勸東謂為非計君等欲西豈成良䇿梁王笑之於後堂㑹文武五百人曰吾欲還建鄴諸卿以為何如衆皆愕然莫敢先對梁主曰勸吾者去左袒於是左袒者過半武昌太守朱買臣入勸梁主云建鄴舊都塋陵猶在荆鎮邊疆非王者宅願陛下弗疑致後悔也臣家在荆州豈不願陛下住但恐是臣富貴非陛下富貴耳乃召卜者杜景象決其去留遇兆不吉答云未吉景象退而言曰此兆為鬼賊也五經要義曰王者受命創始建國立都必}
  - {type: page-break, offset: 16, content: '', id: KR3k0012_WYG_156-8a, image: WYG0894/WYG0894-0425c.png}
  - {type: page-break, offset: 16, content: '', id: KR3k0012_WYG_156-8b, image: WYG0894/WYG0894-0425d.png}
  - {type: punctuation, offset: 17, content: ，, id: KR3k0012_CHANT_156-bkkpn6}
  - {type: 'tls:seg', offset: 17, content: '', id: KR3k0012_CHANT_156-1a.6}
  - {type: variant, offset: 17, length: 0, content: '', WYG: 中土所以總天地之和據隂陽之正均統四方以制萬國者也王嬰古今通論曰崑崙東南方五千里謂之神州州中有和美鄉方三千里五岳之城帝王之宅聖}
  - {type: variant, offset: 19, length: 0, content: '', WYG: 生也鹽鐵論曰燕之涿薊趙之邯鄲魏之温軹韓之滎陽齊之臨淄楚之宛陳鄭之陽翟三川之二周富冠海内皆為天下之名}
  - {type: variant, offset: 20, length: 1, content: 會, WYG: 世説曰謝公時兵卒厮養逋亡多竄在南塘下諸船中或欲求一時搜索謝公不許云不容致此軰何以為京師譙周法訓曰王者居中國何}
