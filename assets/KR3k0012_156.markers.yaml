  - {type: variant, offset: 732, length: 1104, content: 周禮在并州之域及為天子都平陽於詩風為唐國武王子叔虞封焉更名唐故吳季扎聞唐之歌曰思深哉其有陶唐氏之遺氏乎帝舜其所營都或言蒲阪即河東縣帝王世紀曰夏鯀封崇伯故春秋傳曰謂之有崇伯鯀國在秦晉之間左氏傳曰趙穿侵崇是也禹受封為夏伯在禹貢豫州外方南角亢氐之分壽星之次於秦漢屬潁川本韓地今河南陽翟是也受禪都平陽或在安邑或在晉陽於漢平陽安邑皆屬河東晉陽屬太原在冀州大行恒山之西太原太嶽之野參代之分實沉之次於周為晉今司隸并州之域也相徙商丘於周為衛成公夢康叔曰相奪子享是也少康中興復還舊都故春秋傳曰復禹之跡不失舊物是也世本又言夏后居陽城本在大梁之南於戰國大梁魏都今陳留浚儀是也案經傳曰夏與堯舜同在河北冀州之域不在河南也故五子歌曰惟彼陶唐有此冀方今失厥道亂其紀綱乃底滅亡言自禹至太康與唐虞不易都域也然則居陽城者自謂禹避商均時非都也故戰國策稱桀之居左天門之險右天谿之陽成皋在其北伊洛出其南吳起對魏武侯亦言桀之居左河濟右太華伊井關在其南羊腸在其北案地理志上黨商都有天井關即天門也有羊腸坂在太原晉陽西北九十里為通西上郡關即吳起之所云也洛皆在陽城非都審矣帝王世紀曰商契始封於商在禹貢太華之陽上洛商是也世本契居番相徙商丘本顓頊之墟故陶唐氏之火正閼伯之所居也故春秋傳曰閼伯居商丘祀大火相因之故商王大火謂之辰故辰為商星今濮陽是也然則契之所封商丘商洛是也商土於周為衛商是也而學者以商丘為契封謬矣湯始居亳學者咸以亳本帝嚳之墟在禹貢豫州洛河之間今河南偃師西二十里尸鄉之陽亭是也以經考之事實甚失其正孟子稱湯居亳與葛為鄰案地理志葛今梁國寧陵之葛鄉是也湯地七十里葛又伯耳封域有制葛伯不祀湯使亳眾為之耕有童子餉食葛伯奪而殺之計寧陵至偃師八百里而使亳眾為耕童子餉食非其理也今梁自有二亳南亳在穀熟北亳在蒙非偃師也故古文仲虺之誥曰乃葛伯仇餉初征自葛即孟子之言是也湯又盟諸侯于景亳然則二亳皆在梁矣春秋會于亳是也太甲既立不明伊尹放諸桐世本又言太甲從上司馬在鄴西南案詩書太甲無遷都之文桐宮其在斯乎仲丁徙囂或曰今河南之敖倉是也故書序曰仲丁徙于囂河亶甲徙相在河北故書序曰河亶甲居相是也祖乙徙耿為河所毀故書序曰祖乙圯于耿今河東有耿鄉是也及盤庚立復南居亳之殷地故書序曰將治亳殷今偃師是也然則殷有三亳二亳在梁國一亳在河南南亳偃師即湯都也蒙為北亳即景亳湯所盟地偃師為西亳即盤庚所徙者也故立政篇曰三亳坂尹是也武丁徙朝歌於周為衛今河內縣也紂自朝歌北築沙丘臺沙丘地理志在鉅鹿東北七十里邯鄲國屬趙於禹貢在冀州大陸之野昴畢之分大梁之次至今民俗歌謠男女淫縱猶有紂之餘風世稱趙女之美是也又曰周后稷始封邰今扶風是也及公劉徙邑於豳今新平漆之東北有豳亭是也故詩稱篤公劉于豳斯館至太王避狄循漆水踰梁山徙邑於歧, WYG: 岐}
