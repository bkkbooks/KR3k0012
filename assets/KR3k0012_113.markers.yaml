  - {type: variant, offset: 930, length: 3, content: 度支副, SBCK: 大將牛名俊斬李懷光傳首闕下馬燧收復河中十月上御正殿䇿賢良方正能直言極諌等三科舉人十一月癸夘上親祀昊天上帝於圎丘禮畢御丹鳯樓大赦天下二年四月景寅淮西李希烈爲其牙將陳仙竒所酖并誅其妻子仙竒以淮西歸順九月乙巳吐蕃㓂好畤京師戒嚴李晟部將王佖擊吐蕃於汧陽城敗其中軍辛亥㓂鳯翔李晟出師禦之一夕而退冬十月李晟柭吐蕃摧沙堡十一月􅁽淑妃王氏爲皇后丁酉右崩謚曰昭德辛丑吐蕃䧟鹽州三年三月河東馬燧來朝時吐蕃相結賛}
