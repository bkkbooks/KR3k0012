  - {type: variant, offset: 1276, length: 418, content: 癸丑賊將尹子琦睢陽害張巡姚誾執許遠賊自香積之敗悉眾保陜郡廣平王統郭子儀等進攻與賊戰於陜西之新店賊眾大敗斬首十萬級橫屍三十里庚申安慶緒與其黨奔河北壬戌廣平王入東京陳兵天津橋南士庶歡呼路側陷賊官偽署侍中陳希烈等三百餘人素服待罪癸亥上自鳳翔還京仍遣太子太師韋見素入蜀迎上皇鳳翔郡給復五載京寅至望賢宮得東京捷書至上大喜丁卯入長安士庶涕泣拜抃曰不圖復見吾軍上亦為之感惻九廟為賊所焚上素服哭於廟三日入居大明宮十二月日午上皇至自蜀上至望賢宮奉迎上皇御宮南樓上望樓辟易下馬趍進樓前再拜蹈舞稱慶上皇下樓上匍匐捧上皇足涕泗嗚咽不能自勝遂扶侍上皇御殿親自進食自試御馬以進又躬攏轡而行止之後退上皇曰吾享國長久吾不知貴見吾子為天子吾知貴矣上乘馬前導自開遠門至丹鳳門旗幟燭天綵棚夾道士庶舞抃路側皆曰不圖今日再見二聖百寮班於舍元殿庭上皇御殿左相苗晉卿率百辟稱賀人人無不感咽禮畢上皇詣長樂殿謁九廟神主即日幸興慶宮上請歸東宮上皇遣高力士再三慰諭而止三載正月甲戍朔戊寅上皇, WYG: ''}
