  - {type: variant, offset: 368, length: 2, content: 前鋒, WYG: 建中元年春正月丁夘朔御含元殿改元建中羣臣上尊號曰聖神文武皇帝己巳朝太清宫庚午謁太廟辛未有事於郊丘還宫御丹鳯門大赦天下自艱難以来徴賦名目頗多今後除兩稅外輒率一錢以枉法論二年三月築汴州城初大厯中李正已有淄青齊海登萊沂宻徳棣曹濮兖鄆十五州之地李寳臣有恒定易趙深冀滄七州之地田承嗣有魏慱相衛洺貝澶七州之地梁崇義有襄鄧均房復郢六州之地各聚兵數萬始因叛亂得立雖朝廷寵待加恩心猶疑貳皆連衡盤結以自固先是汴州以城隘不容衆請廣之至是築城五月丙寅以軍興什一而稅冬十一月尚書左僕射楊炎貶崖州司馬尋賜死三年四月封朱滔為通義郡王朱滔王武俊田悅等叛十一月朱滔田恱王武俊於魏縣軍壘各相推奬僣稱王號署官名如國初親王行臺之制丁丑李希烈自稱天下都元帥太尉建興王與朱滔等四盗膠固為逆四年春正月鳯翔節度使張鎰與吐蕃宰相尚結賛同盟於清水庚寅李希烈䧟汝州執知州李元吉而去東都震駭甲午遣顔真卿宣慰李希烈軍八月丁未李希烈率衆三萬攻哥舒曜於襄城東都危急冬十月詔涇原節度使姚令言率涇原之師救哥舒曜丁未涇原軍出京城至滻水倒戈謀叛姚令言不能禁止上令載繒綵二車遣晉王徃慰諭之亂兵已陳於丹鳯闕下召神䇿軍拒之無一人至者上與太子諸王妃主百餘人出苑北門右龍武軍使令狐建方較射于軍中聞難聚射士得四百人扈従其夕至咸陽飯數匕而過戊申至奉天己酉元帥都虞候渾瑊以子弟家屬至乃以瑊為行在都虞候亂兵既剽京城屯於白華乃於晉昌里迎朱泚為帥稱太尉居含元殿上以奉天隘欲幸鳯翔壬子鳯翔軍亂殺節度使張鎰乃止癸丑李希烈䧟襄城哥舒曜走洛陽丁巳邠寕節度韓遊環與喻惟明率兵三千至纔入奉天賊軍亦至乃出拒之王師不利賊攻愈急矢石雨下死傷者衆人心危蹙上與渾瑊對泣朱泚據乾陵作樂下瞰城中辭多侮慢戊子朔方節度使李懐光遣}
