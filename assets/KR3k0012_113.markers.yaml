  - {type: variant, offset: 387, length: 0, content: '', krp: 景寅以軍興十一而稅冬十一月尚書左僕射楊炎貶崖州司馬尋賜死三年四月封朱滔爲通義郡王朱滔王武俊與田恱合從而叛十一月朱滔田恱王武俊於魏縣軍壘各相推獎僣稱王號署官名如國𥘉親王行臺之制丁丑李希烈自稱天下都元帥太尉建興王與朱滔等四盗膠固爲逆四年春正月鳯翔節度使張鎰與吐蕃宰相尚結賛同盟于清水庚寅李希烈䧟汝州執州將李元吉而去東都震駭甲午遣顔真卿宣慰李希烈軍八月丁未李希烈率衆三萬攻}
  - {type: variant, offset: 389, length: 0, content: '', SBCK: 曜於襄城東都危急冬十月詔涇原節度使姚令言率涇原之師救哥舒曜丁未涇原軍出京城至滻水倒戈謀叛姚令言不能禁止上令載繒綵二車遣普王往慰諭之亂兵已陣于丹鳯闕下促神䇿軍拒之無一人至者上與太子諸王妃主百餘人出苑北門右龍武軍使令狐建方教射於軍中聞難聚射士得四百人扈從其夕至咸陽飰數匕而過戊申至奉天己酉元帥都虞􅃸渾瑊以子弟家屬至乃以瑊爲行在都虞候亂兵旣剽京城屯於白華乃於晉昌里迎朱泚爲帥稱太尉居含元殿上以奉天隘欲幸鳯翔壬子鳯翔軍亂殺節度使張鎰乃止癸丑李希烈䧟襄城哥舒曜走洛陽丁巳邠寧節度韓遊瓌與論惟明率兵三千至􅂊入奉天賊軍亦至乃出拒之王師不利賊攻城愈急矢石雨下死傷者衆人心危蹙上與渾瑊對泣朱泚據乾陵作樂下瞰城中辭多侮慢戊子朔方節度使李懷光遣兵馬使張韶奉表言大軍將至乃令舁韶廵城叫呼歡聲動地賊不之測疑懼緩攻癸巳懷光軍次醴泉是夜賊解圍而去神䇿將李晟自定州率師赴難軍於渭橋興元元年春正月上在奉天詔曰克致興化必在推誠忘巳濟人不恡改過朕嗣服丕搆君臨萬􅀖失守宗祧越在草莽不念率德誠莫追於旣徃永言思咎期有復於將來明徴其義以示天下予小子懼德不嗣罔敢怠荒然以長於深宫之中暗於經國之務積習易溺居安忘危不知稼穡之艱難不䘏征戍之勞苦澤靡下究情不上通事旣擁隔人懷疑阻猶昧省已遂用興戎徴師四方轉餉千里賦車藉馬逺近騷然行賫居送衆庻勞止力役不息田萊多荒􅁀令峻於誅求疲民空於杼軸轉死溝壑離去郷閭邑里丘墟人煙斷絶天譴於上而朕不寤人怨於下而朕不知馴致亂階變起都邑賊臣乗釁肆逆滔天曽莫愧畏敢行凌偪萬品失序九廟震驚上累于祖宗下􅀒于蒸庻痛心􅌤靣罪實在予永言愧悼􅀂墜泉谷頼天地降祐人祗叶謀將相竭誠􅀲牙宣力羣盗斯屏皇維載張將􅀪永圖必布新令朕晨興夕惕惟省前非乃者公卿百寮用加虚美以聖神文武之號􅀍蒙暗寡昧之躬固辭不獲俯遂羣議昨因内省良所瞿然自今已後中外書奏不得言聖神文武之號今上元統暦獻歳發祥冝革紀年之號式敷在宥之澤可大赦天下改建中五年爲興元元年李希烈田恱王武俊李納咸以勲舊繼守藩條朕撫馭乖方致其疑懼皆由上失其道而下罹其灾一切並與洗滌復其爵位待之如􅀄仍即遣使宣諭朱滔以泚連坐路逺必不同謀永念舊勲務存􅀪貸如能効順亦與惟新朱泚反易天常盗竊名器􅁀犯陵寢所不忍言獲罪祖宗朕不敢赦除泚外並從原宥二月甲子加連城郡王李懷光太尉仍賜䥫劵赦三死罪懷光怒曰凢人臣反逆乃賜䥫劵恕以不死今懷光是反定矣因投之於地上聞懷光將叛令}
