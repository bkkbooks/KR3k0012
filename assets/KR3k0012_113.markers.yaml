  - {type: variant, offset: 5918, length: 2, content: 刺史, SBCK: 􅂊百餘􅀐而巳田希鑒閉門登陴泚令謂希鑒曰我與爾節度何故背恩希鑒乃使人自城上擲泚所送旌節於外續又投火焚之泚遂過數里息於逆旅泚將梁庭芬入涇州􅀃田希鑒曰我公比日殺馮河清背叛今雖歸順國家必不能乆容公他日不免受禍何如開門納朱公與共成事希鑒以爲然庭芬乃追及朱泚言之泚大恱使庭芬却往涇州庭芬請授巳尚書平章事泚不從庭芬旣求宰相不得不復往涇州從泚至寧州彭原縣西城屯與泚心腹朱惟孝共射泚泚走墜故窖中泚左右韓旻薛綸髙幽巖武震朱進卿董希芝共斬泚使宋應傳首以獻泚死時年四十三姚令言投涇州源休李子平走鳯翔尋並斬獲宋歸朝之敗武功降於李懷光送興元斬之唯不獲朱遂傳爲野人所殺或云與泚子壻爲金吾將軍馬恱潜走党項部落數月得逹幽州泚之僣逆官竪朱重曜頗親宻用事泚每呼之爲兄時賊中以臘月大雨僞星官謂泚曰當以宗中年長者禳其災變泚乃毒殺重曜以王禮葬焉及京師平出其尸而斬之順宗安皇帝唐書曰順宗安皇帝諱誦德宗長子母昭德皇后王氏上元二年正月生於長安之東内大暦}
