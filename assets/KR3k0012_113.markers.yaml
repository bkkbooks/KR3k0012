  - {type: variant, offset: 1857, length: 2010, content: 相食饑死者委骸於路二年三月甲子史朝義率眾夜襲我陜州衛伯玉逆擊敗之戊戍史思明為其子朝義所殺九月壬午制自今已後朕號唯稱皇帝其年號但稱元年去上元之號其以今年十一月為歲首便數建丑建寅每月以所建為數建卯月辛亥朔上御丹鳳門大赦以京兆府為上都河南府為東都鳳翔為西都江陵為南都太原為北都建巳月庚戍朔壬子楚州刺史崔侁表獻定國寶玉十三枚甲寅太上皇崩於西內神龍殿上自仲春不豫聞上皇登遐不勝哀悸因茲大漸乙丑詔皇太子監國又曰上天降寶獻自楚州因以體元叶乎五紀其元年宜改為寶應建巳月為四月餘月並依常數仍依舊以正月一日為歲首丁卯宣遺詔是日上崩于長生殿年五十二謚曰文明武德大聖大宣孝皇帝廟號肅宗寶應二年三月葬于建陵史思明附唐書史思明本名窣于營州寧夷州突厥雜種胡人也狹瘦少鬚鼻傴背眼目廞枯性急躁與安祿山同鄉里相校一日生思明除日生祿山歲日生及長相善俱以驍勇聞初事特進烏知義每令輕騎覘賊必生擒以歸又解六蕃語與祿山同為玄市郎張守珪為幽州節度奏為折衝天寶初頻立戰功官至將軍知平盧軍事嘗入奏玄宗賜坐與語甚奇之問其年曰四十矣玄宗撫其背曰卿貴在後勉之遷大將軍北平太守十一載祿山奏授平盧節度都知兵馬使十四載祿山反命思明討饒陽等諸郡陷之十五載正月六日思明與蔡希德圍顏杲卿於常山九日拔之又圍饒陽二十九日不能拔李光弼出土門收常山郡思明解圍而拒光弼光弼列兵於城南相持累月光弼草盡使精卒以車數乘於旁縣取草輒被擊之其後率十疋唯共得兩束草至剉蒿薦以飼之初祿山以賈循為范陽留後謀歸順為副留守向潤客所殺以思明代之又以征戰在外令向潤客代其任四月朔方節度郭子儀以朔方蕃漢二萬人自土門而至常山軍威遂振南收趙郡思明退保愽陵五月十日子儀光弼敗思明於沙河上思明以騎卒奔嘉山光弼擊之思明又敗走入愽陵郡光弼圍之城方拔屬潼關失守肅宗理兵于朔方使中官邢延恩追朔方河東兵馬光弼入土門思明隨後邀擊之思明將卒頗精銳皆平盧戰士因南收常山趙郡又攻河間平原顏真卿以兵食既盡乃渡河而南由是河北之地悉陷於思明至德二年正月思明以蔡希德合范陽上黨兵馬十萬圍李光弼於太原光弼使為地道至城陣前驍賊方戲弄城中人地道中人擒而曳之賊以為神呼為地藏菩薩思明留十月會安祿山死慶緒令歸范陽希德留百餘日竟不能拔而歸自祿山陷兩京常以駱駞運兩京御府珍寶於范陽不知紀極由是資其逆謀思明轉驕慶緒之命慶緒為王師所敗投鄴郡其下蕃漢兵五萬人初不知所從思明擊殺三千人然後降之慶緒使阿史郍承慶安守忠徵兵於思明且欲圖之判官耿仁智忠諒之士謂思明曰大夫崇重人不敢言仁智請一言而死思明曰試言之對曰大夫久事祿山祿山兵權若是誰敢不服如大夫比者逼於兇威耳固亦無罪今聞孝感皇帝聰明勇智有少康周宣之略大夫發使輸誠必開懷見納此轉禍為福之上策也思明曰善承慶等以三千騎至范陽思明悉眾介冑以逆之眾且數萬去之一里使人謂之曰相公及王遠至將士等不勝喜躍此皆邊兵怯懦頗懼相公之眾莫敢進也請弛弓以安之從之思明遂以承慶守忠入內廳飲樂之別令諸將於其所分收其甲仗其諸郡兵皆給糧恣歸之欲留者分隸諸營遂拘承慶斬守忠及李立節之首會李光弼使衙官敬俛招之思明遂令衙官竇子昂奉表以所管兵眾八萬人兼以偽河東節度高秀巖來降肅宗大悅封思明為歸義王范陽長史御史大夫河北節度使朝義以下並為列卿秀巖雲中太守以其男如嶽等七人為大官使內侍李思敬將軍烏承恩宣慰便令討殘賊明年改元乾元四月肅宗使烏承恩為副使候伺其過而殺之初承恩父知義為節度思明常事知義亦有開獎之恩以此光弼冀其無疑因謀殺之承恩至范陽數漏其情夜取婦人衣衣之詣諸將家以飜動之意諭之諸將以白思明思明甚懼無以為驗有頃承恩與思敬從上京來宣恩命畢將歸私第思明留承恩且於館中思明當有所議已令幃其所寢之床伏二人于其下承恩有小男先留范陽思明令省其父夜後私於其子曰吾受命除此逆胡便授吾節度矣床下二人叫呼而出以告思明思明令執之搜其衣囊得朝廷所與阿史郍承慶鐵券及光弼與承恩之牒云承慶事了即付鐵券不了不可付之又得簿書數百紙皆載先所從反軍將名思明語之曰我何負於汝而至是耶承恩稱死罪此太尉光弼之謀也思明集軍將官吏百姓西向大哭曰臣以十三州之地十萬眾之兵降國家赤心不負陛下何至殺臣因榜殺承恩父子囚李思敬遣使表其事朝廷又令中使慰諭云國家與光弼無此事乃承恩所為殺之善也又有使從京至執三司議罪人狀以示思明思明曰陳希烈已下皆重臣上皇棄之幸蜀既收復天下此輩當慰勞之今尚見殺况我本從祿山反乎諸將皆云烏承恩之前事情狀可知光弼尚在憂不細也大夫何不取諸將狀以誅光弼以謝河北百姓主上若不惜光弼為大夫誅之大夫乃安不然為患未已思明曰公等言是乃令耿仁智張不矜修表請誅光弼謝河北若不從臣請臣則自領兵往太原誅光弼不矜初以表示思明及封入函耿仁智盡削去之寫表者密白思明思明怒甚執二人於庭曰汝等何得負我命斬之仁智事思明頗久意欲活之卻令召入謂之曰我任使汝向三十年今日之事我不負汝仁智大叫曰人生固有一死須存忠節今大夫細邪說為反逆之計縱延旬月不如早死請速加斧鑕思明大怒亂捶亂捶殺之腦流于地十月郭子儀領九節度圍相州安慶緒偷道求救於思明思明懼軍威之盛不敢進, SBCK: ''}
