  - {type: variant, offset: 372, length: 0, content: '', WYG: 使張韶奉表言大軍將至乃令昇韶巡城呌呼歡聲動地賊不之測疑懼緩攻癸巳懐光軍次醴泉是夜賊解圍而去神䇿將李晟自定州率師赴難軍於渭橋興}
  - {type: variant, offset: 373, length: 1, content: 帥, WYG: 元年春正月上在奉天詔曰克致興化必在推誠忘已濟人不吝改過朕嗣服丕構君臨萬邦失守宗祧越在草莽不念率德誠莫追於既往永言思咎期有復於將來明徴其義以示天下予小子懼徳不嗣罔敢怠荒然以長於深宫之中暗於經國之務積習易溺居安忘危不知稼穡之艱難不恤征戍之勞苦澤靡下究情未上通事既壅隔人懐疑阻猶昧省已遂用興戎徴師四方轉餉千里賦車籍馬逺近騷然行齎居送衆庶勞止力役不息田莱多荒暴}
