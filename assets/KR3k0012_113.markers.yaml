  - {type: variant, offset: 5902, length: 1, content: 載, krp: 殿受朝賀是日上不康癸巳㑹羣臣於宣政殿宣遺詔皇太子冝於柩前即位是日崩於㑹寧殿享壽六十四謚曰神武孝文皇帝廟號德宗葬崇陵朱泚附唐書曰朱泚幽州昌平人曽祖利賛善大夫贈禮部尚書祖思明太子洗馬贈太子太師父懷珪天寳𥘉事范陽節度使裴寛爲衙前將授折衝將軍及安禄山史思明反叛累爲管兵將寳應中李懷仙歸順奏爲薊州刺史平盧軍留後栁城軍使卒贈左僕射泚以父資從軍㓜壯偉腰帶十圍騎射武藝亦不出人外若寛和中頗忍忌然輕財好施每征戰所得賞物輒分與麾下將士以是爲衆所推故得濟其兇謀𥘉隷李懷仙爲十將改經略副使朱希採旣殺李懷仙自爲節度以泚宗姓甚委信之希彩爲政苛酷人不堪命大暦七年秋竟爲孔目官李懷瑗所殺倉卒之際未有所從泚營在城北弟滔主衙内兵亦得衆心滔變詐多端潜使可餘人於衆中大言曰節度使非城北朱副使莫可衆旣無從因共推泚泚遂權知留後遣使奉表京師十月拜檢校左散騎常侍兼御史中丞幽州盧龍節度等使八年三月遷幽州盧龍節度等使幽州長史兼御史大夫其年泚上表令弟滔率兵二千五百人赴京西防秋代宗嘉之手詔褒美九年就加檢校户部尚書}
