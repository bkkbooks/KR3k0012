  - {type: variant, offset: 374, length: 3, content: 令率眾, SBCK: 改封魯王八月改封雍王廣德二年二月立爲皇太子大暦十四年五月辛酉代宗崩癸亥即位於太極殿六月巳亥朔御丹鳯樓大赦天下八月以門下侍郎平章事崔祐甫爲中書侍郎平章事以道州司馬同正楊炎爲門下侍郎平章事乙巳遣太常少卿韋倫使吐蕃以蕃俘五百人還之示修好也冬十月吐蕃合南蠻之衆號}
  - {type: variant, offset: 374, length: 3, content: 令率眾, krp: 改封魯王八月改封雍王廣德二年二月立爲皇太子大暦十四年五月辛酉代宗崩癸亥即位於太極殿六月巳亥朔御丹鳯樓大赦天下八月以門下侍郎平章事崔祐甫爲中書侍郎平章事以道州司馬同正楊炎爲門下侍郎平章事乙巳遣太常少卿韋倫使吐蕃以蕃俘五百人還之示修好也冬十月吐蕃合南蠻之衆號}
  - {type: variant, offset: 375, length: 2, content: 率眾, WYG: 峻於誅求疲民空於杼軸轉死溝壑離去鄉閭邑里丘墟人烟斷絶天譴於上而朕不寤人怨於下而朕不知馴致亂階變起都邑賊臣乗釁肆逆滔天曾莫愧畏敢行凌偪萬品失序九廟震驚上辱於祖宗下負於蒸庶痛心靦面罪實在予永言愧悼若墜泉谷頼天地降祐神人叶謀將相竭誠爪牙宣力羣盗斯屏皇維載張將𢎞永圖必布新令朕晨興夕惕惟省前非乃者公卿百寮用加虛美以聖神文武之號被蒙暗寡昧之躬固辭不獲俯遂羣議昨因内省良所瞿然自今已後中外書奏不得言聖神文武之號今上元統厯獻嵗發祥宜革紀年之號式敷在宥之澤可大赦天下改建中五年爲興元元年李希烈田恱王武俊李納咸以勲舊繼守藩鎮維撫馭􅆾方致其疑懼皆由上失其道而下罹其災一切並與洗滌復其爵位待之如初仍即遣使分道宣諭朱滔與賊泚連坐路逺必不同謀朕方推以至誠務存𢎞貸如能効順亦與維新朱泚反易天常盜竊名器暴犯陵寢所不忍言獲罪祖宗朕不敢赦除泚外並從原宥春}
