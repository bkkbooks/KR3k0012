  - {type: variant, offset: 5905, length: 2, content: 盡門, SBCK: 天寳末便爲逆亂之地李懷仙朱希彩與連境三節度名雖向順未甞朝謁至是泚率先上表請自領部􅀐三千人入覲詔修甲第以待之九月泚至京師代宗御内殿引見賜御馬兩疋戰馬十疋金銀錦綵甚厚又以器物十牀馬四十疋絹二萬疋衣一千七百襲賜其將士宴犒之盛近時未有泚又上表請留京師從之因授其弟滔兼御史大夫幽州節度留後仍以河陽永平軍防秋兵郭子儀統之决勝軍楊猷兵李抱玉統之淮西鳯翔兵馬璘統之汴宋淄青兵俾泚統焉十一年八月加拜同平章事尋令出鎮奉天行營復賜金銀繒綵并内庫弓箭以寵之十二年加檢校司空代李抱玉爲隴右節度使權知河西澤潞行營兵馬事德宗嗣位加太子太師鳯翔尹實封至三百户建中元年涇州將劉文喜阻兵爲亂加泚四鎮北庭行軍涇原節度使與諸軍討伐涇州平加泚中書令還鎮鳯翔而以舒王謨遥領涇原節度二年又加泚太尉朱滔將反叛隂使人與泚計議以帛書内蠟丸中置髪髻間河東節度馬燧捜獲之以聞并送帛書及所遣使泚惶懼頓首乞歸罪有司上勉之曰千里不同謀非卿之過三年四月以張鎰代泚爲鳯翔隴右節度留後留泚京師加實封至一千户與一子正貟官其幽州盧龍節度太尉中書令並如故四年十月涇原兵叛鑾駕幸鳯天叛卒等以泚甞統涇州知其失權廢居怏怏思亂羣㓂無帥幸泚政寛乃相與謀曰朱太尉乆囚空宅􅀂迎而爲主事必濟矣姚令言乃率百餘􅀐迎泚於進昌里第泚乗馬擁從北向燭炬星羅觀者萬計入居含元殿明日移處白華但稱太尉朝官有謁泚者悉勸奉迎鑾駕旣不合泚意皆逡廵而退源休至遂屏人移時言多悖逆又盛陳成敗稱述符命勸其僣僞泚甚恱之又李忠臣張光晟繼至咸以官閑積憤樂於禍亂鳯翔涇原大將張庭芝叚誠諌以潰卒三千餘自襄城而至賊泚自謂衆望所集僣竊之心自此而定乃以源休爲京非尹判度支李忠臣爲皇城使叚秀實乆失兵柄故推心委之遂發銳師三千言奉迎乗輿實隂有逆謀秀實與劉海賔謀誅泚且慮叛卒之震驚法駕乃潜爲賊符追所發兵至六日兵乃駱驛而廻因與海賔同入見泚爲陳逆順之理而海賔於靴中取匕首爲其所覺遂不得前秀實知不可以義動遽奪源休象笏挺而擊泚仍大呼曰反虜當斬泚舉臂衛首秀實格拉之恟恟然李忠臣馳􅂇泚泚素多力􅂊破其靣逆徒譟集秀實海賔遂併見害明日聲言以親王權主社稷士庻競往觀之八日源休姚令言李忠臣張光晟等八人導泚自白華入宣政僣即僞位自稱大秦皇帝號應天元年愚智莫不憤怒侍衛皆卒伍寮吏行列不過十餘人}
