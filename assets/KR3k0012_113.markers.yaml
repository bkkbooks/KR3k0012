  - {type: variant, offset: 5914, length: 3, content: 縉貶撫, SBCK: 太尉尚書令尋又號皇太弟十月泚自領兵侵逼奉天竊威儀輦輅闐隘道途蟻聚之衆軍􅀔頗盛以姚令言爲元帥張光晟爲副以李忠臣爲京兆皇城留守居中書省尋以蔣鎮爲門下侍郎李子平爲諌議大夫並平章事泚軍合於城下渾瑊韓遊瓌禦之泚衆大敗死者萬計泚收軍於奉天東三里下營大修攻具明日泚又分兵營於乾陵下瞰城内大震十一月三日杜布全與泚衆戰於莫谷官軍不利自是賊衆驕怠王師乗城而戰人百其勇賊多敗衂或出野戰官軍又獲利焉泚乃大驅百姓填壍夜攻城城中設竒以應之賊乃退縮西明寺僧法堅有巧思爲泚造雲梯十五日辰時梯臨城東北隅城内震駭渾瑊侯仲莊設火坑爲地道䧟之又縱火焚其梯東風起吹我軍衆頗危俄而風廻吹賊軍瑊益薪潑油鼓齊震風火俱熾湏􅁷雲梯與兇黨同爲􅁅燼城中三門悉出兵王師又捷其夜兵復出攻泚衆敗績李懷光以五萬人來援自河北至泚衆惶駭因而潰長圍遂解衆以爲懷光三日不至城則危矣二十日夜泚走至京城時姚令言於城造戰格抛樓每坊團練人心大擾泚自奉天廻乃悉令去之日攻戰吾自有計前此每三五日即使人僞自城外來周走號令曰奉天已破百姓聞之莫不飲泣道路閴寂時有入臺省吏人不過十數輩郎官六七人而亦令依常年舉選􅀄有數十人陳􅃺旬日亦皆屏退泚自號其宅曰潜龍宫悉移内庫珍寳以實之識者曰易稱潜龍勿用此敗徴也無幾百姓剽奪其珍寳泚不能禁止明年正月一日泚改僞國號曰漢稱天皇元年二月李懷光旣圖叛逆遣使與泚通和鑾駕幸梁洋自此衣冠之潜匿者出授僞官十七八焉懷光􅀄與泚徃復通好甚宻以錢榖金帛㸦相饋遺泚與書事之如兄約云削平􅀜中當割據山河永爲隣國及懷光决計背叛逼乗輿遷幸泚乃下僞詔書待懷光以臣禮仍徴兵馬懷光旣爲所賣慙怒㥽恥遂領衆遁歸河中三月李晟駱元光尚可􅀌之衆悉於城東累敗泚衆四月泚使韓旻宋歸朝張庭芝等㓂武功渾瑊以衆及吐蕃論莽羅大敗旻歸朝殺逆黨萬餘人於武亭川五月泚又使仇敬忠㓂藍田尚可􅀌擊之大破泚衆擒敬忠斬之李晟駱元光尚可􅀌悉還師齊進晟屯光㤗門逆徒拒官軍王師累捷二十八日官軍入苑收京師逆黨大潰泚與姚令言張庭芝源休李子平朱遂以數千人西走其餘黨或奔􅇡或來降泚衆縁路潰散乃奔涇}
