  - {type: variant, offset: 5914, length: 3, content: 縉貶撫, WYG: 太尉尚書令㝷又號皇太弟十月泚自領兵侵逼奉天竊威儀輦輅闐隘道途蟻聚之衆軍勢頗盛以姚令言爲元帥張光晟爲副以李忠臣爲京兆皇城畱後居中書省㝷以蔣鎮爲門下侍郎李子平爲諫議大夫並平章事泚軍舍於城下渾瑊韓遊環禦之泚衆大敗死者萬計泚收軍於奉天東三里下營大修攻具明日泚又分兵營於乾陵下瞰城内大震十一月三日杜希全與泚衆戰於莫谷官軍不利自是賊衆驕怠王師乗城而戰人百其勇賊多敗衂或出野戰官軍又獲利焉泚乃大驅百姓塡塹夜攻城城中設竒以應之賊乃退縮西明寺僧法壑有巧思爲泚造雲梯十五日辰時梯臨城東北隅城内震駭渾瑊侯仲莊設大坑爲地道陷之又縱火焚其梯東風起吹我軍衆頗危俄而風迴吹賊軍瑊益薪潑油金鼓齊震風火俱熾須臾雲梯與兇黨同爲灰燼城中三門悉出兵王師又㨗其夜兵復出攻泚衆敗績李懐光以五萬人來援自河北至泚衆惶駭因而潰長圍遂解衆以爲懐光三日不至城則危矣二十日夜泚走至京城時姚令言於城造戰格抛樓每坊團練人心大擾泚自奉天迴乃悉令去之曰攻戰吾自有計前此每三五日即使人偽自城外來周走號令曰奉天已破百姓聞之莫不涕泣道路閴寂時有入臺省吏人不過十數輩郎官六七人而亦令依常年舉選初有數十人陳狀旬日亦皆屏退泚自號其宅曰潛龍宫悉移内庫珍寳以實之識者曰易稱潛龍勿用此敗徴也無幾百姓剽奪其珍寳泚不能禁止明年正月一日泚改偽國號曰漢稱天皇元年二月李懐光既圖叛逆遣使與泚通和鑾駕幸梁洋自此衣冠之潛匿者出受偽官十七八焉懐光初與泚往復通好甚宻以錢穀金帛相餽遺泚與書事之如兄約云削平關中當割據山河永爲隣國及懐光决計背叛逼乗輿遷幸泚乃下偽詔書待懐光以臣禮仍徴兵馬懐光既為所賣慚怒憤恥遂領衆遁歸河中三月李晟駱元光尚可孤之衆悉於城東累敗泚衆四月泚使韓旻宋歸朝張庭芝等冦武功渾瑊以其衆與吐蕃論莽羅大敗旻歸朝殺逆黨萬餘人於武亭川五月又使仇敬忠冦藍田尚可孤擊之大破泚衆擒敬忠斬之李晟駱元光尚可孤悉還師齊進晟屯光泰門逆徒拒官軍王師累㨗二十八日官軍入收京師逆黨大潰泚與姚令言張庭芝源休李子平朱遂以數千人西走其餘黨或奔竄或来降泚衆緣路潰散乃奔涇}
