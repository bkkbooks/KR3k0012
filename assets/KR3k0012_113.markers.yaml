  - {type: variant, offset: 5941, length: 1, content: 監, SBCK: 貞元二十一年正月癸已德宗崩景申即位於太極殿上自二十年九月風病不能言曁德宗不豫諸王親戚皆侍醫藥獨上卧病不能侍德宗弥留思見太子涕咽乆之大行發䘮人情震懼上力疾縗服見百僚於九仙門旣即位知社稷有奉中外始安庚子羣臣上書請聽政二月以吏部郎中韋執􅁩爲尚書右丞同中書門下平章事壬寅以太子侍書翰林待詔王伾爲左散􅀐常侍充翰林學士以將仕郎前􅂫州司功參軍翰林待詔王叔文爲起居舎人充翰林學士甲子御丹鳯樓大赦天下三月癸酉詔􅁽廣陵郡王淳爲皇大子改名純赦京城繫囚以給事中陸質中書舎人崔樞並爲太子侍讀七月詔朕承九聖之列荷萬􅀖之重頋以寡德渉道未明䖍恭畏懼不克􅀒荷恐上墜祖宗之訓下貽卿士之憂夙夜祗勤如臨淵谷而積疾未復至于經時怡神保和常所不暇永惟四方之大萬務之殷不躬不親慮有曠廢加以山陵有日霖潦踰旬是用儆于朕心以荅天戒其軍}
  - {type: page-break, offset: 5941, content: '', id: KR3k0012_SBCK_113-11b}
  - {type: variant, offset: 5941, length: 1, content: 監, WYG: 貞元二十一年正月癸巳徳宗崩丙申即位於太極殿上自二十年九月風疾不能言暨徳宗不豫諸王親戚皆侍醫藥獨上卧病不能侍徳宗彌畱思見太子涕咽久之大行發喪人情震懼上力疾縗服見百寮於九仙門既即位知社稷有奉中外始安庚子羣臣上書請聽政二月以吏部郎中韋執誼爲尚書左丞同中書門下平章事壬寅以太子侍書翰林待詔王伾爲左散騎常侍充翰林學士以將仕郎前蘇州司功叅軍翰林待詔王叔文爲起居舍人充翰林學士甲子御丹鳯樓大赦天下三月癸酉詔立廣陵郡王淳爲皇太子改名純赦京城繋囚以給事中陸贄中書舍人崔樞並爲太子侍讀七月詔曰朕承九聖之烈荷萬邦之重顧以寡徳渉道未明虔恭畏懼不克負荷恐上墜祖宗之訓下貽卿士之憂夙夜祇勤如臨淵谷而積疾未復至于經時怡神保和常所不暇永惟四方之大萬務之殷不躬不親慮有曠廢加以山陵有日霖潦踰旬是用儆于朕心以答天戒其軍}
