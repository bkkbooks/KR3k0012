  - {type: variant, offset: 5944, length: 1, content: 夕, SBCK: 詔以太常卿杜黄裳爲門下侍郎左金吾衛大將軍􅀽滋爲中書侍郎並同中書門下平章事皇太子見百寮於朝堂八月庚子詔惟皇天祐命烈祖誕受方國九聖儲祉萬􅀖咸休肆予一人獲纉丕業嚴恭守位不遑暇逸而天祐不降疾恙無瘳將何以奉宗廟之靈展郊禋之禮疇兹庻尹對越}
