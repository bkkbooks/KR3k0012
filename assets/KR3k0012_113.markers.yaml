  - {type: variant, offset: 5965, length: 0, content: '', SBCK: 葬于豐陵史臣韓愈曰順宗之爲太子也留心藝術善􅀠書德宗工爲詩每賜大臣方鎮詩制必命書之性寛仁有斷禮重師傅必先致拜從幸奉天賊泚逼迫常身先禁旅乗城拒戰督勵將士無不奮激德宗在位歳乆稍不假權宰相左右倖臣如裴延齡李齊運韋渠牟等因間用事刻下取功而排䧟陸贄張滂輩人不敢言太子從容論諍故卒不任延齡渠牟爲相甞侍宴魚藻宫張水嬉綵艦雕靡宫人引舟爲櫂歌絲竹間發德宗歡甚太子引詩人好樂無荒每對於敷奏未甞以顔色假借宦官居儲位二}
  - {type: variant, offset: 5965, length: 0, content: '', WYG: 𦵏于豐陵史臣韓愈曰順宗之爲太子也留心藝術善𨽻書徳宗工為詩每賜大臣方鎮詩制必命書之性寛仁有斷禮重師傅必先致拜從幸奉天賊泚逼迫常身先禁旅乗城拒戰督勵將士無不奮激徳宗在位嵗久稍不假權宰相左右倖臣如裴延齡李齊運章渠牟等因間用事刻下取功而排陷陸䞇張滂輩人不敢言太子從容論諍故卒不任延齡渠牟爲相常侍宴魚藻宫張水嬉綵盤雕靡宫人引舟爲櫂歌絲竹間發徳宗歡甚太子引詩人好樂無荒為對每入内未嘗以顔色假借宦官居儲位二}
