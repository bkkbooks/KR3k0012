  - {type: variant, offset: 3870, length: 2024, content: 蕭華以魏州歸順詔遣崔光遠替之思明擊而拔其城光遠脫身南渡思明於魏州殺三萬人平地流血數日即乾乾元二年正月一日也思明於魏州北設壇僣稱為大聖燕王以周贄為行軍司馬三月引眾救相州官軍敗而引退思明召慶緒等殺之併有其眾四月僣稱大號以周贄為相以范陽為燕京九月寇汴州節度使許驥合於思明思明益振又陷洛陽與太尉光弼相拒思明恣行兇暴下無聊矣上元二年潛遣人反說官軍曰洛中將士皆幽朔人咸思歸魚朝恩以為然告光弼及諸節度僕固懷恩衛伯玉等可速出兵以掃殘賊光弼等然之乃出師南道齊進次榆林賊委物偽遁將士等不復設備皆入城虜掠賊伏兵在北邙山下因大下士卒咸棄甲奔散魚朝恩衛伯玉退保陜州光弼懷恩棄河陽城退居聞喜步兵散死者數千人軍資器械盡為賊有河陽懷州盡陷於賊思明至陜州為官軍所拒於姜子反戰不利退歸永寧築三角城約一日內畢以貯軍糧朝義城畢未泥思明至詬之對曰緣兵士疲乏暫歇耳又怒曰汝惜部下兵違我處分令隨身數十人立馬看泥斯須而畢又曰待收陜州斬卻此賊朝義大懼是夕思明居驛朝義在店中思明令心腹曹將軍揔中軍兵嚴衛朝義將駱悅并許驥男季常等言主上欲害王悅與王死無日矣因言廢興之事古來有之欲喚取曹將軍舉大事可乎朝義廻面不應王悅曰王若不應悅等即歸李家王亦不全矣朝義然之令許季常命曹將軍至悅等告之不敢拒其夜思明夢而驚悟據床惆悵每好伶人寢食置左右以其殘忍皆恨之及此問其故曰吾向夢見水中沙上群鹿渡水而至鹿死水乾言畢如廁伶人相謂曰鹿者祿也水者命也胡祿命俱盡矣駱悅入問思明所在未及對殺數人因指在廁思明覺變踰牆出至馬槽鞴馬騎之王悅等至令傔人周子俊射中其臂落馬曰是何事悅等告以懷王思明曰我朝來語錯合有此事然汝殺我太疾何不待我收長安終事不成矣因急呼懷王者三曰莫殺我囚我卻罵曹將軍曰這胡誤我這胡誤我悅遂令心腹手擒思明赴柳泉驛曰事已成矣朝義曰莫驚聖人否莫損聖人否悅曰無時周贄許驥統後軍在福昌朝義令許季常往告之贄聞驚欲仰倒朝義領兵廻贄等來迎因殺贄思明至柳泉驛縊殺之朝義便僣偽位寶應二年為李懷所擒梟首送闕下代宗孝武皇帝唐書曰代宗孝武皇帝諱豫肅宗長子母曰章敬皇太后吳氏以開元十四年十二月生于東都上陽宮初名俶年十五封廣平王玄宗諸孫百餘上為嫡皇孫宇量弘深寬而能斷喜怛不形於色仁孝溫恭動必由禮幼好學尤專禮易玄宗鍾愛之祿山之亂京城陷賊從肅宗蒐兵靈武以上為天下兵馬元帥時朝廷草創兵募寡弱上推心示信招懷流散比至彭原兵眾數萬及肅宗廻幸鳳翔時房琯郭子儀繼戰不利賊鋒方銳屢來寇襲上選求勇幹頻挫其鋒聖慮遑寧士心大振及帥師進討雪涕辭違步出闕門方始乘馬廻紇葉護王子率兵入助勇冠諸蕃上接以優恩結為兄弟故香積之戰賊徒大敗遂委西京而遁雖子儀嗣業之奮命由上恩信結於士心故人思自效既收京城民庶安堵秋毫不犯遺老歡迎對之歔欷聞賊殘眾猶保陜郊即日長驅東趍虢略新店之役一戰大捷慶緒之黨十殲七八數旬之間河南厎定兩都恢復二聖廻鑾統率之功推而不受肅宗還京改封楚王乾元元年三月改封成王四月庚寅立為皇太子改名豫上元末年兩宮不豫太子往來侍疾躬嘗藥膳衣不解帶者久之及承監國之命流涕從之寶應元年四月肅宗大漸所幸張皇后無子后懼上功高難制陰引越王係於宮中將圖廢立乙丑皇后矯詔召太子中官李輔國程元振素知之乃勒兵於凌霄門俟太子至即衛從太子入飛龍廄以俟其變是夕勒兵於三殿收捕越王係及內官朱光輝馬英俊等禁錮之幽皇后於別殿丁卯肅宗崩程元振等始迎上於九仙門見群臣行監國之禮己巳即皇帝位於柩前二年秋七月壬寅朔戊申群臣上尊號曰寶應元聖文武皇帝御含元殿授冊壬子御宣政殿宣制改元曰廣德大赦天下是月吐蕃大寇河隴陷秦成渭三州又大震關西陷蘭廓河鄯洮岷等州盜有隴右之地己丑吐蕃寇涇州刺史高暉以城降因為吐蕃鄉導冬十月庚午朔辛未高暉引吐蕃犯京畿寇奉天武功盭屋等縣蕃軍自司竹園渡渭循南山而東丙子車駕幸陜州戊寅吐蕃入京師立廣武王承宏為帝仍逼前翰林學士于可封為制封拜辛巳車駕至陜州子儀在商州會六軍使張知節烏崇福長孫全緒等率兵繼至軍威遂振舊將王甫誘聚京城惡少年齊擊鼓於朱雀街蕃軍震懾狼狽奔潰庚寅子儀收京城壬辰以宰臣元載判天下元帥癸巳以郭子儀為京城留守十二月丁亥車駕發陜郡還京辛卯鄂州大風火發江中焚舡三千艘焚居人廬舍二千家甲午上至自陜州二年二月己巳朔冊天下兵馬元帥尚書令雍王適為皇太子癸酉上親薦獻太清宮太廟乙亥祀昊天上帝於圓丘冬十月景寅僕固懷恩引吐蕃二萬寇邠州節度使白孝德閉城拒守丁卯寇奉天京師戒嚴先鋒將郭晞斬賊營於邠州西俘斬數百計三年春正月癸卯朔制大赦天下改為永泰元年三月庚戍吐蕃請和詔宰臣元載杜鴻漸與蕃使同盟于興唐寺辛亥大風拔木是春大旱京師米貴斛至萬錢九月丁酉僕固懷恩死于靈州之鳴沙縣時懷恩誘吐蕃數十萬寇邠州蕃將尚給思贊磨尚悉東贊等寇奉天醴泉黨功羗渾奴刺寇同州及奉天逼鳳翔府厔縣京師戒嚴九年八月辛未幽州節度使朱泚遣弟滔奉表請自入朝兼自率五千騎防秋許之詔所司築第待之十年春正月乙未朔丁酉昭義牙將裴志清逐其帥薛崿崿奔名州上章待罪志清率眾歸田承嗣乙未朱泚乞留京師西征吐蕃請以弟滔權為幽州留後許之十二年三月宰相元載王縉得罪下獄命吏部尚書劉晏訊鞫之辛巳制, SBCK: 貶}
