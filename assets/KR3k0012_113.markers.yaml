  - {type: variant, offset: 5946, length: 0, content: '', SBCK: 玄内媿于朕心上異于天命夙夜祇慄深惟永圖一日萬機不可以乆曠天工人代不可以乆違皇太子純睿哲温文寛和仁惠孝友之德愛敬之誠通乎神明格于上下是用法皇王至公之道遵父子傳歸之制付之重器以撫兆人必能宣祖宗之重光荷天地之休命奉􅀂成憲永綏四方冝今皇太子即皇帝位朕稱太上皇居興慶宫制稱誥辛丑誥有天下傳歸於子前王之制也欽􅀂大典斯爲至公式揚耿光用體文德朕獲奉宗廟臨御萬方降疾不瘳庻政多闕乃命元子代子守􅀖爰以令辰光膺􅁽禮冝以今月九日􅁽皇帝於宣政殿國有大命恩俾惟新冝因紀元之慶用覃在宥之澤冝改貞元二十一年爲永貞元年天下死罪降從流巳下遞減一等立良娣王氏爲太上皇后良媛董氏爲太上皇德妃壬寅貶王伾爲開州司馬王叔文爲渝州司户元和元年正月景寅朔皇帝率百寮上太上皇尊號曰應乾聖壽甲申太上皇}
  - {type: page-break, offset: 5946, content: '', id: KR3k0012_SBCK_113-12a}
  - {type: page-break, offset: 5946, content: '', id: KR3k0012_SBCK_113-12b}
  - {type: variant, offset: 5946, length: 0, content: '', WYG: 帝内愧于朕心上畏于天命夙夜祇慄深惟永圖一日萬幾不可以久曠天工人代不可以久違皇太子純睿哲温文寛和仁惠孝友之徳愛敬之誠通乎神明格於上下是用法皇王至公之道遵父子傳國之制付之重器以撫兆人必能宣祖宗之重光荷天地之休命奉若成憲永綏四方宜令皇太子即皇帝位朕稱太上皇居興慶宫制稱誥辛丑誥曰有天下者傳歸於子前王之制也欽若大典斯為至公式揚耿光用休文徳朕獲奉宗廟臨御萬方降疾不瘳庶政多闕乃命元子代予守邦爰以令辰光膺册禮宜以今月九日册皇帝於宣政殿國有大命思俾惟新宜因紀元之慶用覃在宥之澤宜改貞元二十一年為永貞元年天下死罪降徒流已下遞减一等立良娣王氏爲太上皇后良媛董氏爲太上皇徳妃壬寅貶王伾爲開州司馬王叔文爲渝州司户元和元年正月丙寅朔皇帝率百寮上太上皇尊號曰應乾聖夀甲申太上皇}
