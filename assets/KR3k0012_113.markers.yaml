  - {type: variant, offset: 378, length: 5, content: 十萬守潼關, WYG: 月甲子加連城郡王李懐光太尉仍賜鐡劵赦三死罪懐光怒曰凡人臣反逆乃賜鐡劵恕以不死今懐光是反定矣因投之於地上聞懐光將叛令翰林學士陸䞇往慰諭之其詞禮益倨悖李晟尋自咸陽移兵東渭橋避懐光也晟以懐光反狀已}
