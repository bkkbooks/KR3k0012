  - {type: variant, offset: 733, length: 0, content: '', SBCK: 少噐仗濫惡大爲祖煥桓撫所破寳中箭貫髀徹鞍使人蹋鞍抜箭血流滿鞾又桓玄傳曰逹枚回恬興祐之迎擊玄矢下如雨玄嬖人丁仙期萬盖等以身蔽玄並中數十箭而死崔鴻三十國春秋西􅁗録曰白蘭王吐谷渾阿柴臨卒呼子弟謂曰汝等各奉吾一􅃗箭將玩之地下俄而命母弟慕延曰取汝一􅃗箭折之延折之又曰汝取十九􅃗箭折之延}
