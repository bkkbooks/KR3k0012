  - {type: variant, offset: 1436, length: 597, content: 銅弩牙首入重法時人皆謂琇有權智世祖詔免琇官英雄記曰王匡字公節太山人以任俠聞辟大將軍何進府使匡於徐州發強弩五百西詣京師會進敗匡還鄉又曰袁紹擊公孫瓚先令麴義領精兵八百強弩千張以為前登又曰袁尚使審配守鄴城曹操進軍攻鄴生獲配謂曰吾近行圍弩何多也配曰猶恨其少日南傳曰南越王尉佗攻安陽安陽王有神人睪音高通為安陽王治神弩一張一發萬人死三發殺三萬人他退遣太子始降安陽安陽不知通神人遇無道理通去始有姿容端美安陽王女眉珠悅其貌而通之始與珠入庫盜鋸截神弩亡歸報佗佗出其非意安陽王弩折兵挫浮海奔竄華陽國志曰秦襄王時有一白虎常從群遊巴蜀傷害千餘人昭王乃重募有能殺虎者賞邑萬家閬中夷廖中能作白的之弩乃登樓射殺白虎昭王嘉之以其夷不欲封刻石盟要曰秦犯夷輸黃龍一雙夷犯秦輸清酒一鍾夷人安之又曰鄧芝征涪陵見玄猿抱子在樹上引弩射之中猿母其子為拔箭以木葉塞瘡芝乃歎息曰嘻吾違物之性其將死矣投弩水中芝後果死會稽典錄曰鍾離牧謂朱育曰大皇帝以中國多騎欲以當之然吳神鋒弩射三里貫洞三四馬騎敢近之乎南越志曰龍川有營澗嘗有銅弩牙流出水皆以銀黃雕鏤取之者祀而後得曾有取此牙逢風雨舉船淪沒父老云越王弩營處也雜記曰事吳朝鴻臚卿張儼議郎張純鎮南將軍朱異三人共詣驃騎將軍朱據據曰三賢屈顧老鄙相聞含甘須之明懷終賈之才相飢渴久矣各為賦一物然後乃坐乃各賦所見異賦弩曰南嶽之幹鍾山之銅應機命中射隼高墉吳越春秋曰陳音對越王曰弩生於弓弓生於彈彈生於古之孝子臣聞楚琴氏以, SBCK: 挾}
  - {type: variant, offset: 1436, length: 597, content: 銅弩牙首入重法時人皆謂琇有權智世祖詔免琇官英雄記曰王匡字公節太山人以任俠聞辟大將軍何進府使匡於徐州發強弩五百西詣京師會進敗匡還鄉又曰袁紹擊公孫瓚先令麴義領精兵八百強弩千張以為前登又曰袁尚使審配守鄴城曹操進軍攻鄴生獲配謂曰吾近行圍弩何多也配曰猶恨其少日南傳曰南越王尉佗攻安陽安陽王有神人睪音高通為安陽王治神弩一張一發萬人死三發殺三萬人他退遣太子始降安陽安陽不知通神人遇無道理通去始有姿容端美安陽王女眉珠悅其貌而通之始與珠入庫盜鋸截神弩亡歸報佗佗出其非意安陽王弩折兵挫浮海奔竄華陽國志曰秦襄王時有一白虎常從群遊巴蜀傷害千餘人昭王乃重募有能殺虎者賞邑萬家閬中夷廖中能作白的之弩乃登樓射殺白虎昭王嘉之以其夷不欲封刻石盟要曰秦犯夷輸黃龍一雙夷犯秦輸清酒一鍾夷人安之又曰鄧芝征涪陵見玄猿抱子在樹上引弩射之中猿母其子為拔箭以木葉塞瘡芝乃歎息曰嘻吾違物之性其將死矣投弩水中芝後果死會稽典錄曰鍾離牧謂朱育曰大皇帝以中國多騎欲以當之然吳神鋒弩射三里貫洞三四馬騎敢近之乎南越志曰龍川有營澗嘗有銅弩牙流出水皆以銀黃雕鏤取之者祀而後得曾有取此牙逢風雨舉船淪沒父老云越王弩營處也雜記曰事吳朝鴻臚卿張儼議郎張純鎮南將軍朱異三人共詣驃騎將軍朱據據曰三賢屈顧老鄙相聞含甘須之明懷終賈之才相飢渴久矣各為賦一物然後乃坐乃各賦所見異賦弩曰南嶽之幹鍾山之銅應機命中射隼高墉吳越春秋曰陳音對越王曰弩生於弓弓生於彈彈生於古之孝子臣聞楚琴氏以, WYG: 挾}
