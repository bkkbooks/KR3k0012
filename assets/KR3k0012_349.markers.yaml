  - {type: variant, offset: 769, length: 2, content: 十歲, SBCK: 從于謹圍江陵時柵內有人善用長矟戰士將登者多爲所斃謹令傑射之應弦而倒登者乃得入餘衆繼進遂拔之謹喜曰濟我大事者在此箭也又曰賀拔嶽旣遇害于河曲太祖乃率輕􅀐馳赴平凉時齊神武遣長史侯景招引嶽衆太祖至安定遇之謂景曰賀拔公雖死宇文泰尚存卿何爲也景失色對曰我猶箭耳隨人所射安能自裁景於此即還又曰􅁃信傳云信常有郷􅀜之思作哀江南賦以致其意云兩觀當㦸千門受箭白虹賁日蒼鷹擊殿又曰長孫晟傳云晟}
