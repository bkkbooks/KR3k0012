  - {type: variant, offset: 2572, length: 377, content: 建初之際去戰未久官兵勁利有蔡太僕之弩擅名天下風俗通曰汲令應郴一作余祖父郴夏至日請主簿杜宣賜酒時北壁上懸赤弩照於杯中見其形如虵宣惡之然不敢不飲因得胸腹病攻治不差郴後知之過宣家問疾之由以為虵入腹中郴遶廳事思惟良久顧懸弩曰此是乎乃扶宣來於故處設酒杯中致復有虵因謂宣曰北壁上弩影耳非有他怪宣意解病即瘳又曰臧文仲家欲炊而失釜及弓弩自行十洲記曰續弦膠或名連金泥此膠能屬連弓弩斷絃連刀劍斷折之金膠連使人挽製他處即斷此終不復脫天漢二年帝事北海祠恒山西國王使至獻膠四兩吉光毛裘武帝受以付庫不知膠裘二物之妙也以上貢不奇稽留使未遣之帝幸華林苑射虎而弩絃斷使者從駕因上膠一分使口濡以續絃帝驚乃使武士數人對掣終日不斷膠青色如碧玉吉光毛裘黃色盖神馬之類也裘入水經月不沉入火不焦帝方重之厚賂使者而遣之趙公王琚音居教射經曰弩古有黃連百竹八檐雙弓之號今有絞車弩中七百步攻城拔壘用之擘張弩中, SBCK: 御覽卷第}
