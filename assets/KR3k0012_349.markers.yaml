  - {type: variant, offset: 835, length: 599, content: 張出軍都亭置軍營於國之都亭也國人素聞王善射不敢反叛故陳獨得完百姓歸之者眾十餘萬人又曰陳愍王寵善弩射十發十中中皆同處華嶠後漢書曰陳愍王寵射善弩其秘法以天覆地載參連為奇又有三微三小三微為經三小為緯經緯相將萬勝之方然要在機牙其射至十發十中魏氏春秋曰諸葛亮損益連弩謂之元戎以鐵為矢矢長八寸一弩十矢俱發吳志曰甘寧字興霸巴郡臨江人也吳書曰寧本南陽人也招合輕薄少年為之渠帥群聚相隨挾持弓弩負眊音餌帶鈴民聞鈴聲即知是寧也吳錄曰松梁山山石開處容數十丈高竹弩不及其上在灃州晉書曰稽紹傳云齊王被誅初兵交紹奔散赴宮有持弩在東閤下者將射之遇有殿中將兵蕭隆見紹姿容長者疑非凡人趣前拔箭於此得免又曰劉聰將趙染冤殺其長史魯徽染寇北地夢魯徽大怒引弓射之染驚悸而寤旦將攻城中弩而死又曰孟幹為吳人所獲將徙之臨海幹等志北歸慮東徙轉遠以吳人愛蜀側竹弩言能作之皓留付作部後幹逃至京都又曰崔洪薦郗詵自代詵後駮奏洪曰我舉郗詵而反奏我是挽弩自射晉陽秋曰初高祖勒兵闕下經曹爽門爽悵下督嚴世引弩將射高祖孫謙止之曰未可知三注三止高祖車乃過世說又載又曰馬隆討涼州虜隆募限腰引弩四十六鈞弓限四鈞已上隆捶檦音摽懸弓弩檦側閱試自旦至中得三千五百人唐書曰李希烈既陷汴州乘勝東侵連陷陳留雍丘頓軍寧陵期下宋州會食浙西節度韓滉命王栖曜將強弩數千夜入寧陵希烈不之知晨朝弩矢及希烈坐悵希烈驚曰此江淮弩士今入矣遂不敢東希烈夜敗晉諸公讚曰都官從事程偉案狀羊琇音酉所犯狼籍琇即遣家, SBCK: ''}
