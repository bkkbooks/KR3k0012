  - {type: variant, offset: 727, length: 0, content: '', SBCK: 以毒藥􅀓矢傳語匈奴漢家箭神中其瘡者必有異因發強弩射之虜中矢者視瘡皆沸並大驚相謂曰漢兵神真可畏也遂解去魏志曰挹婁}
  - {type: variant, offset: 727, length: 0, content: '', WYG: 以毒藥傅矢傳語匈奴漢家箭神中其瘡者必有異因發强弩射之虜中矢者視瘡皆沸並大驚相謂曰漢兵神真可畏也遂觧去魏志曰挹婁}
  - {type: page-break, offset: 727, content: '', id: KR3k0012_WYG_349-7b, image: WYG0896/WYG0896-0132d.png}
  - {type: variant, offset: 727, length: 0, content: '', krp: 以毒藥傳矢傳語匈奴漢家箭神中其瘡者必有異因發強弩射之虜中矢者視瘡皆沸並大驚相謂曰漢兵神真可畏也遂解去魏志曰挹婁}
  - {type: variant, offset: 728, length: 4, content: 䟽勒城救, SBCK: 失館東北千餘里弓長四尺如弩楛長八寸青石爲鏃又曰陳琳曰矢在弦上不可不發魏略曰孫權乗大船出濡湏口來觀魏軍曹公使弓弩亂發射之矢着其船船乃偏重箭墜將傾權因廻船復以一靣受矢矢均船平乃放船而走蜀志曰􅀜羽爲流矢所中貫其左臂醫者曰矢鏃有毒當湏破臂刮骨也晉書石季龍載記曰石韜起堂于太尉府號曰宣光殿梁長九丈石宣視而大怒斬匠載梁而去韜怒增之十丈宣聞之恚甚使楊杯牟皮牟成趙生等縁猕猴梯而入殺韜置其刀箭而去又毛寳傳曰寳軍縣}
