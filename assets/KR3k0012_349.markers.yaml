  - {type: variant, offset: 162, length: 3, content: 兵精主, SBCK: 絜鏃茀痺弩所用也左傳曰魯莊公以金㒒姑射南宫長万杜預曰矢名也又曰狄人伐衛公與石祁子玦與寗莊子矢使守曰以此賛國擇利而爲之又曰祝􅅨射王中肩王亦能軍又曰楚子與莫敖氏戰于睪滸睪滸楚也伯棼射王汰輈及皷跗着於丁寕伯棼越椒也輈車轅汰過也箭過車轅上也丁寧鉦也又射汰以貫笠轂師懼退王使廵師曰吾先君文王克息獲三矢焉伯棼竊其二盡於是矣皷而進之遂滅􅀂敖氏又曰吕錡射恭王中目王召飬由基與之兩矢使射吕錡中項伏弢而死以一矢復命弢音韜又曰郄克傷流血及屨未絶皷音曰余病矣張侯曰自始合而矢貫予手及肘余折以御左輪朱殷豈敢言病吾子忍之又曰齊師遁晉州綽及之射殖綽中肩兩矢夾脰脛頸又曰楚君以鄭故親集矢於目鄢陵戰晉射中楚王目也又曰齊子淵捷從泄聲子射之中楯凡繇朐音劬汰輈匕入者三寸又曰孟之側後入以爲殿抽矢䇿馬曰馬不進也不欲伐善榖梁曰偏弓鏃矢不出境偏當爲敦鏃矢矢名皆}
