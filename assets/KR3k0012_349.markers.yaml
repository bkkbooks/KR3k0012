  - {type: variant, offset: 765, length: 3, content: 宋則子, SBCK: 陳顯逹傳云顯逹杜姥莫􅀘切宅大戰破賊矢中左眼抜箭而鏃不出地黃村潘嫗善禁先以釘釘柱嫗禹歩作氣釘即時出乃禁顯逹目中鏃出之三國典略曰梁以護軍將軍陸法和爲郢州刺史封江乗縣公法和甞軍次白帝謂人曰諸􅁑孔明可謂名將吾目見之此城旁有埋弩箭鏃一斛許因令掘之果如其言北齊書曰郎基字丗業迁海西鎮將梁吴明徹攻海西基糧仗皆盡乃削木爲箭􅁓爲羽得圍解還朝㒒射楊暗勞之曰卿夲文吏遂有武略削木箭􅁓羽皆無故事班墨之思何以過之後魏書曰丗宗幸鄴還於河內懷界帝親射矢一里五十餘歩侍中髙顯等奏伏見御弧矢臨原弋逺弦動羽馳鏃所逮三百五十餘歩臣等伏惟陛下聖武自天神藝夙荗巧會騶虞之節妙盡矍居約切圃之儀威稜攸疊甝胡甘切兕懾氣才猛所振勍憝弭心足以肅截九區赫服八宇矣盛事竒迹必冝表述勒銘射宫永彰聖藝後周書曰王傑魏恭帝元}
  - {type: page-break, offset: 765, content: '', id: KR3k0012_SBCK_349-6b}
  - {type: variant, offset: 765, length: 3, content: 宋則子, WYG: 陳顯達傳云顯達桓姥音莫補切宅大戰破賊矢中左眼㧞箭而鏃不出北黄村潘嫗善禁先以釘釘柱嫗禹歩作氣釘即時出乃禁顯逹目中鏃出之三國典畧曰梁以䕶軍將軍六法和為郢州刺史封江乗縣公法和嘗軍次白帝謂人曰諸葛孔明可謂名將吾目見之此城旁有埋弩箭鏃一斛許因令掘之果如其言北齊書曰郎基字世業遷海西鎮將梁吳明徹攻海西基糧仗皆盡乃削木為箭剪紙為羽得圍觧還朝㒒射愔勞之曰卿本文吏遂有武畧木箭紙羽皆無故事班墨之思何以過之後魏書曰世宗幸鄴還於河内懐界帝親射矢一里五十餘歩侍中高顕等奏伏見御􅋃矢臨原弋逺弦動羽馳鏃所逮三百餘歩臣等伏惟陛下聖武自天神藝夙茂巧會騶虞之節妙盡矍音居均反圃之儀威稜攸疊甝音胡甘反兕懾氣才猛所振勍憝弭心足以肅截九區赫服八宇矣盛事奇迹必宜表述勒銘射宫永彰聖藝後周書曰王傑魏恭帝元}
