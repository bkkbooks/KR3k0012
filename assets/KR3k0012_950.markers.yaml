  - {type: variant, offset: 1486, length: 0, content: '', SBCK: 宣驗記曰元嘉元年建安郡山賊百餘人掩破郡治抄掠百姓資産子女遂入佛圖搜掠財寳先是諸供養具別封置一室賊破戸忽有蜜蜂數萬頭從衣簏出同時噬螫羣賊身首腫痛兩眼盲合先諸所掠皆棄而走蜂飛邀逐噬擊彌路賊遂惶懼從便道而去時是臈日所􅅞子女各還其家}
  - {type: page-break, offset: 1486, content: '', id: KR3k0012_SBCK_950-4b}
  - {type: variant, offset: 1486, length: 0, content: '', WYG: 宣騐記曰元喜元年建安郡山賊百餘人掩破郡治抄掠百姓資産子女遂入府庫掠財寶先是諸公養蜂别置一室賊破户忽有蜜蜂數萬頭從衣簏出同時噬螫羣賊身首腫痛兩眼盲合先諸所掠皆棄而走蜂飛邀逐噬擊彌路賊遂惶懼從便道而去時是臘月所縳子女各還其家}
