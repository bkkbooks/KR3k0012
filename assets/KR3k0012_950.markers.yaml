  - {type: variant, offset: 1934, length: 1, content: 蛬, WYG: 則殺人其病似大傷寒不日皆死又曰射工䖝冬天蟄於谷間大雪時索之此䖝所生其雪不積有氣起如灼蒸當掘之不過入地一尺則得也隂乾為末帯之夏天自辟射工也𤣥中記曰水狐者視其形䖝也其氣乃鬼也長三四寸其色黑廣寸許背上有甲厚三分許其口向前如角状見人則以氣射人去三二歩即射人中十人六七人死地理書曰江}
