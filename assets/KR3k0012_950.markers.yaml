  - {type: variant, offset: 1801, length: 9, content: 宇九月在戶十月蟋蟀, krp: 皆爲賁育水馬南州異物志曰交趾海中有蟲狀如馬形因名曰水馬婦人難産者手握持此蟲或燒作屑服之則更昜如羊之産也凢物之中羊産最昜抱朴子曰以赤斑蜘蛛及水馬合馮夷水仙丸服之可以居水中徐衷南方草物狀曰海中有魚狀似馬或黄或黑海中民人名作水馬捕魚得之不可啖食暴乾熇之婦人産難使握持之亦可燒飲水蛭爾雅曰蛭蟣郭璞注曰今江東呼水中蛭蟲}
