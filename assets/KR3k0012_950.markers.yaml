  - {type: variant, offset: 1474, length: 0, content: '', WYG: 或曰蒲以其子母各置瓮中埋東行隂垣下三日後開之即相從以母血塗八十一錢亦以子血塗八十一錢以其錢更易市置子用母置母用子皆自還也蜂爾雅曰土蜂今江東曰火蜂在土中作房者為土蜂啖其子即馬蜂也今荆楚間呼為蟺音蟬木蜂似土蜂而小在樹上作房方言曰蜂燕趙之間謂之蠓螉䝉翁二音或謂之蚴蛻音幽悦其有蜜者謂之壼蜂山海經曰平逢山有神如人二首名曰嬌虫是蓋虫實惟蜜之廬又曰火蜂其狀如螽洪範五行傳曰秦昭王三十八年上郡大飢山木盡死人無所食蜂日食田苗左傳僖公曰邾人以須句故岀師公卑邾不設備而禦之臧文仲曰國無以小而易也無謂邾小蜂蠆有毒而况國乎孝經援神契曰蜂蠆垂芒蜂蠆毒在後故言垂芒謝承後漢書曰豫章嚴豐字孟侯為郡主簿太守賈萌舉兵欲誅王莾有飛蜂附萌車衡豐諫以為不祥之徴萌不從果見殺王隐晉書曰太尉陶侃表倉曹叅軍袁謙為高良太守未至百餘里浦中有蜜蜂蔽日而下謙不覺甚惡㑹得届郡文書賊欲乗虛攻郡謙欲速赴明早進西南卒遇大風飛沙天地晦合不復得還浦遂沒海中晉書曰鄒諶對武帝曰猛獸在田荷戈而出凡人能之蜂蠆懐䄂勇士為之驚駭出於意外故也淮南子曰蜂房不容鵠卵房巢也小}
