  - {type: variant, offset: 1485, length: 0, content: '', krp: 育時來過人家圍垣者捕取得三兩頭便内着器中數宿出蜂飛去㝷将伴來還或多或少經日漸溢不可復數遂停住徃來器中所滋長甚衆至夏開器取蜜蠟所得多少隨歳中所冝豐儉盧氏曰春至秋末始有蜜晩者至冬余所見今云夏未詳其故又曰諸逺方山郡僻處岀蜜蠟蜜蠟所着皆絶巖石壁非攀縁所及唯於山頂以檻轝自懸挂下遂乃得取採蜂遂去不還餘窠及蠟着石不盡者有鳥形小於雀羣飛千數來啄之至春都盡其處皆如磨洗至春蜂皆還洗處結窠如故年年如此物無錯亂者人亦各各占其平處謂之蠟塞鳥謂之靈雀捕搏終不可得}
