  - {type: variant, offset: 2239, length: 505, content: 亦靈智之攸授享神氣之么眇體形容之微陋于時微涼既戒火靈告去玄乙辭宇翔鶤音昆南顧風戾戾而動柯露零零而隕樹月轉景而西頹漢廻波而東注厲清響於長宵激悲聲以迄署王襃聖主得賢臣頌曰虎嘯而風洌龍興而致雲蟋蟀候秋吟蜉蝣出以陰楚辭曰澹容與而獨倚兮蟋蟀鳴於西堂虭蟧詩義䟽曰蝘音偃一名虭音刃蟧音勞蟪蛄也爾雅曰蜓蚞螇螰即蝭蟧也一名蟪蛄齊人呼螇題木奚鹿四音家語曰孔子謂宰子曰違山十里蟪蛄之聲猶在於耳莊子曰蟪蛄不知春秋司馬彪注曰蝭蟧春生夏死夏生秋死故不知歲之春秋也揚雄方言曰蛥蚗上音折下音夬齊謂之螇螰奚鹿兩音楚謂之蟪蛄或謂之蛉蛄上音零秦謂之蛥蚗自關而東謂之虭蟧貂料兩音或謂之蝭蟧音帝或謂之蜓蚞音廷木西楚與秦通名江東又呼為蟂蟧風土記曰秋而蟪蛄鳴於朝寒螿鳴於夜鼠負爾雅曰蟠鼠負也郭璞曰此甕器底蟲也舊說伊威鼠婦別名未詳也毛詩東山曰伊威在室伊威委黍也陸機毛詩䟽義曰伊威一名委黍一名鼠婦在壁甕底土中似白魚者也說文曰蟠蟅音柘鼠婦也蛜威委黍鼠負也干寶搜神記曰豫章有一家婢在竈下忽有人長數寸來竈間婢誤以履踐殺一人須臾遂有數百人著縗麻持棺迎喪凶儀皆備出東門入園中覆舩下就視皆是鼠婦作湯澆殺遂絕葛洪治瘧方曰取鼠婦蟲十四枚各以糟封裹之凡十四丸臨發服七丸便愈陶弘景, SBCK: 焉}
