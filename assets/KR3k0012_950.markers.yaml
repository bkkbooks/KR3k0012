  - {type: variant, offset: 1474, length: 0, content: '', SBCK: 或曰蒲以其子母各等置瓮中埋東行隂垣下三日後開之即相從以母血塗八十一錢亦以子血塗八十一錢以其錢更㸦市置子用母置母用子錢皆自還蜂爾雅曰土蜂今江東呼大蜂在土中作房中爲土蜂啖其子即馬蜂也今荆楚間呼為蟺音蟬木蜂似土蜂而小在樹上作房方言曰蜂燕趙之間謂之蠓螉蒙翁二音或謂之蚴蛻音幽悦其大有蜜謂之壷蜂即今黒蜂穿竹木作孔亦有蜜者山海經曰平逢山有神如人二首名曰嬌蟲是盤蟲實推蜜之廬郭璞注曰嬌為盤蟲之長羣蜂所舎集蜜亦蜂名也又曰大蜂其狀如螽洪範五行傳曰秦昭王三十八年上郡大飢山木盡死人無所食蜂食田苗左傳僖中曰邾人以湏句故出師公卑邾不設備而禦之臧文仲曰國無以小不可易也無備雖衆不可恃也君其無謂邾小蜂蠆有毒而况國乎孝經援神契曰蜂蠆垂芒蜂蠆毒在後故言垂芒謝承後漢書曰豫章嚴豊字孟侯爲郡主簿太守賈萌舉兵欲誅王莽有飛蜂附萌車衡豊諌以爲不祥之徴萌不從果見殺王隱晉書曰太尉陶􅋲表倉曹參軍􅀽謙爲髙凉太守未至百餘里浦中有蜜蜂蔽日而下謙舩上謙不􅁴甚惡㑹得留郡文書賊欲乗虛攻郡謙欲速赴明早進西南卒遇大風飛沙天地晦合不復得還浦遂没海中晉書曰鄒湛對武帝曰猛獸在田荷戈而出凢人能之蜂蠆作於懷䄂勇夫爲之驚駭出於意外故也淮南子曰蜂房不容鵠􅆑房巢也小}
