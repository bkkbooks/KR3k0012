  - {type: variant, offset: 1798, length: 2, content: 八月, SBCK: 桑蟲爾雅曰蚅烏蠋音蜀也郭璞注曰蟲大如指似蠶孫炎注曰蚅一名烏蠋也廣志曰藿蠋有五色者槐香蠋五采有角甚臭白澤曰蠋有角五采文長尾者龍也殺之兵死韓子曰鱓似虵而蚕似蠋人見虵則驚駭見蠋則毛起漁者持鱓婦人拾蚕利之所}
  - {type: variant, offset: 1798, length: 2, content: 八月, WYG: 爾雅曰蚅鳥蠋也郭璞注曰䖝大如指似蠶孫炎注曰蚅一名鳥蠋也廣志曰藿蠋有五色者槐香蠋五采有角甚臭白澤曰蠋有角五采文長尾者龍也殺之立死韓子曰鱓似蛇而蠶似蠋人見蛇則驚駭見蠋則毛起漁者持鱓婦人拾蠶利之所}
  - {type: variant, offset: 1798, length: 2, content: 八月, krp: 桑蟲爾雅曰蚅烏蠋音蜀也郭璞注曰蟲大如指似蠶孫炎注曰蚅一名烏蠋也廣志曰藿蠋有五色者槐香蠋五采有角甚臭白澤曰蠋有角五采文長尾者龍也殺之兵死韓子曰鱓似虵而蚕似蠋人見虵則驚駭見蠋則毛起漁者持鱓婦人拾蚕利之所}
  - {type: variant, offset: 1801, length: 9, content: 宇九月在戶十月蟋蟀, SBCK: 皆爲賁育水馬南州異物志曰交趾海中有蟲狀如馬形因名曰水馬婦人難産者手握持此蟲或燒作屑服之則更昜如羊之産也凢物之中羊産最昜抱朴子曰以赤斑蜘蛛及水馬合馮夷水仙丸服之可以居水中徐􅂨南方草物狀曰海中有魚狀似馬或黄或黑海中民人名作水馬捕魚得之不可啖食暴乾熇之婦人産難使握持之亦可燒飲水蛭爾雅曰蛭蟣郭璞注曰今江東呼水中蛭蟲}
  - {type: page-break, offset: 1801, content: '', id: KR3k0012_SBCK_950-6a}
  - {type: variant, offset: 1801, length: 3, content: 宇九月, WYG: 皆為賁育水馬南州異物志曰交阯海中有䖝狀如馬形因名曰水馬婦人難產者手握此䖝或燒作屑服之則更易如羊之產也凡物之産羊至為易抱朴子曰以黑班蜘蛛及水馬合馮夷水仙丸服之可以居水中徐穉南方草木狀曰海中有魚似馬或黄或黑海中民人名作水馬捕魚得之不可啖食暴乾熇之婦人產難使握持之亦可燒飲水蛭爾雅曰蛭蟣郭璞注曰今江東呼水中蛭䖝入人肉者為蟣音祈也齊書曰蕭季敬為廣州刺史為都統周世雄所襲軍敗奔山中為蛭所嚙肉盡而死常璩華陽國志曰南廣郡土地無稻田蠶桑多蛇蛭虎狼王充論衡曰蛭食血之䖝惠王殆有集血之疾故食啖血之䖝而病愈也不然則賢者操行豈若蠶蛭除病賢者}
