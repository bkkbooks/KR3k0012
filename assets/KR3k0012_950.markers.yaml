  - {type: variant, offset: 1466, length: 0, content: '', krp: 小而黄者曰胡離一曰胡梨小而赤者曰赤卒一曰絳騶一曰赤衣使者好集水上亦名爲赤弁丈人又曰紺蝶}
  - {type: variant, offset: 1468, length: 2, content: 懸針, SBCK: 蜻蛉似蜻蛉而色􅀇紺遼東人謂爲紺蟠亦曰童蟠好以七月羣飛闇天海邊夷貃食之謂海中青蝦化爲之青蚨廣雅曰蟱蝸青蚨也搜神記曰南方有蟲名􅝒音敦􅘿音隅形如蟬大味辛美可食其子著草葉如蠶種得其子則母飛來雖濳取必知處殺其母塗錢子塗貫用錢去貨旋則自還淮南萬畢術曰青蚨還錢青蚨}
