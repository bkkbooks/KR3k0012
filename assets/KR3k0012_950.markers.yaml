  - {type: variant, offset: 21, length: 51, content: 頭感翔感翔為妖韓詩外傳曰魚網之設鴻則離之嬿婉之求得此戚施薛君曰戚施蟾蜍喻醜惡文子曰蟾蜍辟兵壽在五月之望, SBCK: 翼蟲也}
