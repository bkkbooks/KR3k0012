  - {type: variant, offset: 3161, length: 141, content: 公娶齊淫女為夫人後漢書曰王莽地皇元年蜰蔽天至長安入未央宮緣莽發吏捕之于時天下大亂尋而莽敗見殺蜚廉本草經曰蜚廉味鹹治血瘀逐下血破積藂療喉痺生晉地山澤中二月採之吳氏本草曰蜚廉蟲神農黃帝云治婦人寒熱蠁爾雅曰國音或貉蟲蠁也音許兩切今呼蛹蟲為蠁廣雅曰土蛹蠁蟲蛷螋說文曰蛷多足蟲也廣雅曰矜蛷螋也, WYG: ''}
