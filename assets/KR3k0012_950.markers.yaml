  - {type: variant, offset: 1485, length: 0, content: '', SBCK: 育時來過人家圍垣者捕取得三兩頭便内着器中數􅀫出蜂飛去㝷􅀅伴來還或多或少經日漸溢不可復數遂停住徃來器中所滋長甚衆至夏開器取蜜蠟所得多少隨歳中所冝豐儉盧氏曰春至秋末始有蜜晩者至冬余所見今云夏未詳其故又曰諸逺方山郡僻處岀蜜蠟蜜蠟所着皆絶巖石壁非攀縁所及唯於山頂以檻轝自懸挂下遂乃得取採蜂遂去不還餘窠及蠟着石不盡者有鳥形小於雀羣飛千數來啄之至春都盡其處皆如磨洗至春蜂皆還洗處結窠如故年年如此物無錯亂者人亦各各占其平處謂之蠟塞鳥謂之靈雀捕􅅮終不可得}
  - {type: variant, offset: 1485, length: 0, content: '', WYG: 育時来過人家園垣者捕取得三兩頭便内着噐中數宿蜂出飛去尋将伴來還或少經日漸益不可復數遂停住徃來噐中所滋長甚衆至夏開噐取蜜蠟所得多少隨嵗中所獲豐儉又曰諸逺方山郡僻處出蜜蠟蜜蠟所着皆絶巗石壁蜂飛去不還餘窠乃蠟著石不盡者有鳥形小於羣雀飛千數來啄之至春都盡其處皆破如磨洗至春蜂皆還洗處結窠如故年年如此物無錯亂者人亦各各占其平處謂之蠟蜜鳥謂之靈雀捕摶終不得}
