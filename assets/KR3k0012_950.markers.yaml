  - {type: variant, offset: 1773, length: 2, content: 蟋蟀, SBCK: 阜螽蝗也今人謂之螽子兖州人謂之螣晉書載記曰石勒時河朔大蝗􅀄穿地而生二旬則化狀如蚕七八月而卧四日蜕而飛彌亘百里唯不食三豆及麻并兾尤甚唐書曰貞觀中終南等數縣蝗太宗至苑中見蝗掇數枚而呪之曰民以榖爲命而汝食之是害于百姓也百姓有過}
