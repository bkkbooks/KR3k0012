  - {type: variant, offset: 2773, length: 48, content: 今作婦字如似乖理又一名鼠姑家用此悅媚人甚多方而應少蠹韓詩外傳曰枯魚衘索于何不蠹爾雅曰蠍蛣𧌑木中蠹, SBCK: 良十二時}
  - {type: variant, offset: 2773, length: 355, content: 今作婦字如似乖理又一名鼠姑家用此悅媚人甚多方而應少蠹韓詩外傳曰枯魚衘索于何不蠹爾雅曰蠍蛣𧌑木中蠹蟲蝎葉蠹即蛣蝟也漢書曰文帝賜尉佗書衣物佗因使者獻桂蠹一器文子曰山生金反自刻木生蠹還自食穆天子傳曰天子東遊次雀梁蠹書于羽陵謂暴書蠹蟲因曰蠹書也杜寶大業拾遺錄曰七年始安郡獻桂蠹四瓶瓶別一千頭紫色香辛有味噉之去陰痰之疾強䖹爾雅曰姑䗐強蝆郭璞曰米穀中蠹小墨蟲也建平人呼焉蛢子音芊方言曰蛄䗐音施謂之強䖹郭璞注曰江東謂之蛄䗐也齧桑爾雅曰蠰音餉齧桑郭璞曰似天牛也長角體有白點喜齧桑樹作孔藏其中江東呼為齧髮守瓜爾雅曰蠸音權輿父守瓜也郭璞曰今瓜中黃小蟲喜食瓜葉故曰守瓜蚰蜒爾雅曰螾𧊔入耳蚰蜒也𧊔音衍方言曰自關而東蚰蜒謂之螾𧍢或謂之入耳或謂之䗅音長𧕯所宜切趙魏之間或謂之蚨虶音扶于北燕謂之䖡蚭廣雅同䖡奴六切蚭音尼蜰廣五行記曰春秋魯莊公, WYG: 良十}
  - {type: variant, offset: 2773, length: 48, content: 今作婦字如似乖理又一名鼠姑家用此悅媚人甚多方而應少蠹韓詩外傳曰枯魚衘索于何不蠹爾雅曰蠍蛣𧌑木中蠹, krp: 良十二時}
