  - {type: variant, offset: 771, length: 683, content: 許口便息及日晚王又曰欲其復鳴僧昭曰王歡已闌令汝鳴即便喧聒又齊書曰卞彬蝦蟆賦云紆青柂紫名為蛤魚世謂比令僕也又云蝌斗唯唯群浮暗水唯朝繼夕筆役如鬼比令史諮事也南孝義傳曰丘傑字偉跱吳興烏程人也年十四遭母喪以熟菜有味不嘗於口歲餘忽夢見母曰死亡是分別耳何事乃爾荼苦汝噉生菜遇蝦蟆毒靈床前有三丸藥可取服之傑驚起果得甌甌中有藥服之下科斗子數升三國典略曰周天和二年齊武安妖人與其徒偽云盲躄因飲泉水下得金佛其疾並愈於是遠近信之男女霧集水中有老黃蝦蟆全如金色乍出乍沒齊武成及百官已下莫不飲之隋書曰煬帝在東宮宮中數有妖變乃命衛尉少卿蕭吉禳邪氣於宣慈殿座祭神是時孟冬地久無水乃有蝦蟆從西南來入至座忽然而失文子曰禽子曰多言有益乎墨子曰蝦蟆蛙黽日夜恒鳴口乾舌擗然而不聽今觀晨雞時夜而鳴天下俱動多言何益唯其言之時也韓子曰越王勾踐伐欲伐吳欲民輕死出見鬭鼃乃下軾從者曰王何敬也曰以其有勇氣故也其後國人輕命死戰淮南子曰夫蝦蟆為鶉水蠆為蟌音聰皆生於非其類老蝦蟆化為鶉水中蠆化為蟌蟌者蜻蜓也唯聖人能知其化又曰蘭芝以芳未嘗見霜芳香也鼓造辟兵壽盡五月之望鼓造蓋謂梟一曰蝦蟆今世人五月望作梟羹亦作蝦蟆羹國語曰趙襄子以尹鐸有寬政於晉陽其心必和乃守晉陽後晉師圍而灌之沉竈生鼃民無叛意神仙傳曰葛玄指蝦蟆使舞皆應絃節使止乃止燕丹子曰太子自喜得荊軻永無秦憂日與軻之東宮臨池而觀軻拾博投鼃太子令人奉槃金以進物理論曰夫虛无之談尚其華藻此無異於春蛙秋蟬聒耳而已國俗通曰肅肅蝦蟆掉尾俗說蝦蟆一跳八尺再跳丈六從春至冬袒裸相逐無他所作掉尾肅肅謹按蝦蟆既處水中其尾又短正能使掉之豈能肅肅乎原其所以當言夏馬患蚋掉尾振擊常肅肅也蝦蟆夏馬音相似, SBCK: 匹}
