  - {type: variant, offset: 2091, length: 2, content: 崔駰, SBCK: 屠氏女晝採樵夜漬以供餋父母父母俱卒親營殯葬􅀒土成墳忽空中有聲云汝至性可重山神欲相驅使汝可爲人療病必得大冨女謂是􅀑魅弗敢從遂得病積時鄰舎人有溪蜮毒者女識毒試療之自覺病便差遂以巫道爲人療疾無不愈者家産日益抱朴子曰短狐一名蜮一名射工一名射影其實水蟲也狀似鳴蜩而如合杯有翼能飛無目利耳口中有横物如聞人聲縁口中物如角弩以氣爲矢激水而射人中身者即發瘡不暁治之者殺人其病似大傷寒不日皆死又曰射工蟲冬天蟄於谷間大雪時索之此蟲所在其雪不積留氣起如灼蒸當掘之不過入地一尺則得也隂乾未帶之夏天自辟射工也􅀇中記曰水狐者視其形蟲也見其氣乃􅀑也長三四寸其色黒廣寸許背}
  - {type: page-break, offset: 2091, content: '', id: KR3k0012_SBCK_950-7b}
  - {type: variant, offset: 2091, length: 4, content: 崔駰上書, WYG: 南中山川有鴆鳥之地必有犀牛有沙虱水弩必生可療之草又}
