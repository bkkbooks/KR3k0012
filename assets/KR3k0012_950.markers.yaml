  - {type: variant, offset: 1479, length: 5, content: 雷則尾脫腳, SBCK: 蜜氣或停不過三四來便舉羣悉至􅀶物志曰細􅆎無雌蜂􅀋也無雌取桑蚕或阜螽子所見抱而成巳子詩云􅑺蛉有子蜾蠃負之又曰逺方諸山出蜜蠟處其處人家有養蜂者其法以木爲器或十斛五斛開小孔令纔容蜂岀入以蜜蠟塗器内外令遍安着簷前或庭下春月此蜂􅀅作窠}
