  - {type: 'tls:seg', offset: 1806, content: '', id: KR3k0012_CHANT_950-32a.6}
  - {type: variant, offset: 1811, length: 8, content: 我床下箋云自七月, SBCK: 人肉者爲蟣音祈也齊書曰蕭季敞爲廣州刺史爲都護周丗雄所襲軍敗奔山中爲蛭所嚙肉盡而死常璩華陽國志曰南廣郡土地無稻田蠶桑多虵蛭虎狼賈􅁩書曰楚惠王食寒􅉁而得蛭因遂吞之腹有疾而不能食令入問疾王曰吾食􅉁而得蛭不行其罪是法廢而威不立譴而誅恐􅁥食皆死遂吞之令尹曰天道無親惟德是輔王有仁德病不爲傷王果病愈王充論衡曰蛭食血之蟲惠王殆有積血之疾故食積血之蟲而病愈也不然則賢者操行豈􅀂吞蛭除病賢者常無病也張茂先􅀶物志曰水蛭三斷而成三物本草經曰水蛭一名}
