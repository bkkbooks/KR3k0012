  - {type: variant, offset: 2822, length: 481, content: 蝎葉蠹即蛣蝟也漢書曰文帝賜尉佗書衣物佗因使者獻桂蠹一器文子曰山生金反自刻木生蠹還自食穆天子傳曰天子東遊次雀梁蠹書于羽陵謂暴書蠹蟲因曰蠹書也杜寶大業拾遺錄曰七年始安郡獻桂蠹四瓶瓶別一千頭紫色香辛有味噉之去陰痰之疾強䖹爾雅曰姑䗐強蝆郭璞曰米穀中蠹小墨蟲也建平人呼焉蛢子音芊方言曰蛄䗐音施謂之強䖹郭璞注曰江東謂之蛄䗐也齧桑爾雅曰蠰音餉齧桑郭璞曰似天牛也長角體有白點喜齧桑樹作孔藏其中江東呼為齧髮守瓜爾雅曰蠸音權輿父守瓜也郭璞曰今瓜中黃小蟲喜食瓜葉故曰守瓜蚰蜒爾雅曰螾𧊔入耳蚰蜒也𧊔音衍方言曰自關而東蚰蜒謂之螾𧍢或謂之入耳或謂之䗅音長𧕯所宜切趙魏之間或謂之蚨虶音扶于北燕謂之䖡蚭廣雅同䖡奴六切蚭音尼蜰廣五行記曰春秋魯莊公二十九年蜰劉向以為此非中國所有南越盛暑男女同川澤淫亂所生為蟲臭惡時公娶齊淫女為夫人後漢書曰王莽地皇元年蜰蔽天至長安入未央宮緣莽發吏捕之于時天下大亂尋而莽敗見殺蜚廉本草經曰蜚廉味鹹治血瘀逐下血破積藂療喉痺生晉地山澤中二月採之吳氏本草曰蜚廉蟲神農黃帝云治婦人寒熱蠁爾雅曰國音或貉蟲蠁也音許兩切今呼蛹蟲為蠁廣雅曰土蛹蠁蟲蛷螋說文曰蛷多足蟲也廣雅曰矜蛷螋也博, SBCK: 􅀶}
