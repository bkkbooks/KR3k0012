  - {type: variant, offset: 1924, length: 7, content: 蜻蛚楚謂之蟋蟀, SBCK: 射影如􅀛二足江淮水皆有人在岸影見水中投人影則殺人故曰射影也􅀯京人欲入水以瓦石投水中令濁乃入也}
  - {type: variant, offset: 1924, length: 3, content: 蜻蛚楚, WYG: 射影如龜二足江淮水濵皆有人在岸影見水中投人影則殺人或曰射影也南方人欲入水以瓦石投水中令濁乃入也或有含沙射人入人肌其病如疥魯荘公十八年秋經曰書有蜮傳言不為災也穀梁傳荘公曰秋有蜮一云亡曰有言不常有蜮射人者也今短狐射人為疾是也左傳同廣雅曰射蜮短狐也書紀年曰晉獻公二年周惠王居於鄭鄭人入王府多取玊焉玉化為蜮射人齊書曰屠氏女晝採樵夜績以供養父母父母俱卒親行殯葬負土成墳忽空中有聲云汝至性可重山神欲相驅使汝可為人療病必得大富女}
  - {type: page-break, offset: 1924, content: '', id: KR3k0012_WYG_950-11a, image: WYG0901/WYG0901-0410a.png}
  - {type: variant, offset: 1924, length: 3, content: 蜻蛚楚, krp: 射影如龜二足江淮水皆有人在岸影見水中投人影則殺人故曰射影也南京人欲入水以瓦石投水中令濁乃入也或又含沙射人入肌其瘡如疥魯莊公十八年秋經書有蜮傳稱不爲災也榖梁傳莊公曰秋有棫一有一亡曰有言不常有蜮射人者也今短狐射人爲疾是也左傳同廣雅曰射工棫短狐也書紀年曰晉獻公二年春周惠王居于鄭鄭人入王府多取玉焉玉化爲蜮射人齊書曰屠氏女晝採樵夜漬以供餋父母父母俱卒親營殯葬負土成墳忽空中有聲云汝至性可重山神欲相驅使汝可爲人療病必得大冨女}
  - {type: punctuation, offset: 1926, content: 。, id: KR3k0012_CHANT_950-bkkpn676}
