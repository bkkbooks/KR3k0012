  - {type: variant, offset: 1928, length: 0, content: '', WYG: 是鬼魅弗敢從遂得病積時鄰舍人有被蜮毒者女識毒試療}
  - {type: variant, offset: 1928, length: 0, content: '', krp: 是鬼魅弗敢從遂得病積時鄰舎人有溪蜮毒者女識毒試療}
  - {type: variant, offset: 1929, length: 4, content: 蟋蟀或謂, WYG: 自覺病便差遂以巫道為人療病無不愈者家産日益抱朴子曰短狐一名射工一名射影其實水䖝也狀似鳴啁而如合杯有翼能飛無目利耳口中有横物如聞人聲縁口中物如角弩以氣為矢激水而射人身中即發瘡不曉治}
