  - {type: variant, offset: 12, length: 106, content: 紀乖政則蟾蜍月精四頭感翔感翔為妖韓詩外傳曰魚網之設鴻則離之嬿婉之求得此戚施薛君曰戚施蟾蜍喻醜惡文子曰蟾蜍辟兵壽在五月之望淮南子曰月照天下而蝕於蟾諸騰虵游霧而殆於蝍蛆蟾諸月中蝦蟆食月故曰食於蟾諸殆猶畏也蝍蛆蟋蟀爾雅, WYG: 蜻蛉}
