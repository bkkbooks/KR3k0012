  - {type: variant, offset: 121, length: 210, content: 𧊿之大腹也上虵虵不敢動故曰殆於蝍蛆抱朴子曰蟾蜍壽三千歲又曰肉芝者謂萬歲蟾蜍頭上有角頷下有丹書八字再重以五月五日日中時取之陰乾百日以其足畫地即為流水帶其左手於身辟五兵若敵人射己者弓弩矢皆反還自向也又曰辟兵法或以月蝕時刻三歲蟾蜍喉下有八字者血以書所持之刀劍玄中記曰蟾蜍頭生角得而食之壽千歲又能食山精張衡靈憲曰羿請不死之藥於西王母姮娥竊之以奔月遂託身於月是為蟾蜍淮南子同河圖曰蟾蜍去月天下大亂西京雜記曰廣川王發晉靈公冢得玉蟾蜍, SBCK: 蛉}
