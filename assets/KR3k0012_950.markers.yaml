  - {type: variant, offset: 1475, length: 1, content: 圓, SBCK: 不足以苞大體也抱朴子曰軍行卒逢羣飛蜂及䖟蟲􅀂密蜂尤多者必大戰驚於藏伏之賊也列女傳曰尹􅁻甫子伯竒至孝事後母母取蜂去毒繫於衣上伯竒前欲去之母便大呼曰伯竒牽我􅁻甫見疑之伯竒自死葛仙公列傳曰仙公與客對食客曰當請先生作一竒戯食未竟仙公即吐口中飯盡成飛蜂滿屋或集客身莫不震肅但皆不螫人良乆仙公乃張口見蜂飛還入口中成飯永嘉地記曰七八月中常}
