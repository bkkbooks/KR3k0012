  - {type: variant, offset: 247, length: 1, content: 平, SBCK: 羲之尤善􅀠書爲古今之冠論者稱其筆􅀔以爲飄􅀂遊雲矯􅀂驚龍深爲從伯敦導之所器重晉中興書曰李充字弘度母衛氏廷尉展之妹也充少􅀌母聦明有訓又善楷書妙叅鍾索丗咸重之充從兄咸亦善書沈約宋書曰文帝善爲􅀠書又曰羊欣字敬元長􅀠書父不疑􅀄爲烏程令欣年十二時王獻之爲吴興太守甚知愛之獻之甞夏月入縣欣着新絹裙晝寢獻之書裙數幅而去欣夲工書因此弥善齊書曰王僧䖍善􅀠書宋文帝見其書素扇歎曰非唯跡逾子敬文當器雅過之齊書曰周顒少徃外氏車􅀐將軍臧質家得衛常散􅀠書法學之甚能文惠太子使顒書􅀇圃茅齋璧國子􅀕酒何胤以倒薤書求就顒換之顒􅀏曰天下有道丘不與易也三國典略曰周白石縣男趙文深以題牓之功除魏興郡守文深字德夲}
  - {type: page-break, offset: 247, content: '', id: KR3k0012_SBCK_749-3b}
  - {type: variant, offset: 249, length: 1, content: 廙, SBCK: 陽宛人也少學楷􅀠有鍾王之則當時書唯文深及兾㑺而已王褒尢善書文深慙恨形於言色後知好尚難及改習褒書竟無所成轉􅀍譏誚謂之學歩邯鄲焉至於碑榜人莫之逮褒亦推之宫殿樓問皆其迹也丗宗令至江陵書景福寺碑蕭察觀而美之陳書曰蕭引善􅀠書爲當時所重髙宗甞披奏事指引署名曰此字筆􅀔翩翩似鳥之欲飛引謝曰此乃陛下假其羽毛耳唐書曰薛稷好古愽雅尤工􅀠書自貞觀永徽之際虞丗南禇遂良時人宗其書跡自後罕能繼者稷外祖魏徵家圖籍多有虞禇舊跡稷銳精模倣筆能遒麗當時無及之者書斷曰􅀠書者􅁗下邽人程邈所作也邈字元岑始爲縣獄吏得罪始皇幽繫雲陽獄中覃思十年益小􅂐方圎而爲􅀠書三千字奏之始皇善之用爲御史以奏事煩多􅂐家難成乃用􅀠書爲􅀠人佐書故曰􅀠書又曰和帝時賈魴撰滂喜篇以蒼頡爲上篇訓纂爲中篇滂喜爲下篇所謂三蒼也皆}
  - {type: page-break, offset: 249, content: '', id: KR3k0012_SBCK_749-4a}
