  - {type: variant, offset: 1479, length: 1, content: 漢, WYG: 羊欣字敬元長𨽻書父又疑初為烏程令欣年十二}
  - {type: variant, offset: 1481, length: 0, content: '', WYG: 王獻之為吳興太守甚知愛之獻之嘗夏月入縣欣著新絹裙晝寝獻之書裙數幅而去欣本工書因此彌善也齊書曰王僧䖍善𨽻書宋文帝見其書素扇歎曰非惟跡逾子敬方當器雅過之齊書曰周顒少往外事車騎将軍臧質家得衛恒散𨽻書法學之甚能文惠太子使顒書𤣥圃茅齊壁國子祭酒何徹以倒薤書求就顒換之顒笑曰天下}
  - {type: page-break, offset: 1481, content: '', id: KR3k0012_WYG_749-5b, image: WYG0899/WYG0899-0579b.png}
