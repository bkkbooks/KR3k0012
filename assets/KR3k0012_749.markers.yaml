  - {type: variant, offset: 110, length: 225, content: 字若平直相似狀如筭子便不是書但得其點畫耳昔宋翼常作此書翼鍾繇之弟子乃咄之翼三年不敢見繇潛心改跡每畫一波常三過折筆每作一點常隱鋒而為之衛夫人筆陣圖曰若初學書先須大書不得從小善鑒者不寫善寫者不鑒多骨微肉者筋書多肉微骨者墨豬多力豐筋者聖無力無筋者病一二從其消息而用之王僧虔論書曰王平南廙是右軍之叔自過江東右之前唯廙為最畫為晉明帝師書為右軍法又曰中書令王珉筆力過於子敬書舊品云有四疋素月朝操筆三暮便竟首尾如一又無誤字子敬戲云弟書如騎騾駸駸常欲度驊騮前又曰鍾公, krp: 赴急}
