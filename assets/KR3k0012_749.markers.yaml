  - {type: variant, offset: 2822, length: 225, content: 元中新起太極殿謝安欲使子敬題牓以為萬代寶而難言之乃說韋仲題陵雲臺事子敬知其旨乃正色曰仲將魏室大臣寧有此事使其若此知魏德之不長安遂不之逼又曰齊王僧虔善書孝武欲擅書名僧虔不敢顯跡大明之世常用掘筆書以此見容梁蕭子雲字景喬小篆草行諸體兼備而刱造小篆飛白意趣飄然點畫之際有若騫舉妍妙至極難與比肩故歐陽詢云飛白鳥巾冠世其後逸少子敬又稱妙絕乃爾飛而不白蕭子雲輕濃得中蟬翼掩素遊霧崩雲可得而語其真書初學子敬晚師元常及其暮年筋骨亦備名蓋當世舉朝效之又曰梁庾肩吾云張功夫, SBCK: 平御覽卷}
