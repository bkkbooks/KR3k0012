  - {type: variant, offset: 2585, length: 0, content: '', SBCK: 索靖時並號書聖張芝善章草書崔瑗云龍驤豹變青出於藍又剏爲今草天縱尤異率意超曠無惜是非􅀂清間長源流而無限縈迴崖谷任於造化至於蛟龍駭獸奔驕拏玃之􅀔心手隨變窃􅁳不知其所如也精熟神妙冠絶古今則百丗不易之法式不可以智識不可以勤求􅀂上士游乎沉黙之郷鸞鳯翔乎大皇之野韋仲將謂之草聖豈徒言哉又曰後漢張昶}
