  - {type: variant, offset: 2705, length: 263, content: 欲使王獻之隸書題牓獻之固辭乃使劉瓌以八分書之後又使文休以大篆改八分焉或問王右軍父子書君以為如何荅曰二王自可謂能未是知書也又曰妙則筆王子敬得其筆歎為絕世又曰晉薄紹之字敬叔丹陽人也官至給事中善書憲草小王風格秀異若干將出匣光芒射人書斷曰晉太元中新起太極殿謝安欲使子敬題牓以為萬代寶而難言之乃說韋仲題陵雲臺事子敬知其旨乃正色曰仲將魏室大臣寧有此事使其若此知魏德之不長安遂不之逼又曰齊王僧虔善書孝武欲擅書名僧虔不敢顯跡大明之世常用掘筆書以此見容梁蕭子雲字景喬小篆草行諸體兼備而刱造小篆飛白意趣飄然點畫之際有若騫舉妍妙至極難與比肩故歐陽詢, WYG: ''}
