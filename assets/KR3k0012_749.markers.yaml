  - {type: variant, offset: 3037, length: 0, content: '', WYG: 書云吾昔有伯英章草十紙過江顛狽遂乃􅁯失常歎妙迹永絶忽見足下答家兄書煥若神明頓還舊觀書斷曰章草書漢黄門令史㳺所作也衛恒李誕並云初漢而有草法不知其誰蕭子良云章草者漢齊相杜操始變藁法非也王愔云漢元帝時史㳺作急就章解散𨽻體麄書之漢俗簡墮漸以行之是也}
