  - {type: variant, offset: 2971, length: 1, content: 鳥, WYG: 變楷制也本是宫殿題署勢既勁大字宜輕微不滿名為飛白王僧䖍云飛白是八分之輕者雖有此説按漢靈帝熹平年詔蔡邕作聖皇篇篇成詣鴻都門上時方修飾鴻都門伯喈待詔門下見役人以堊帚成字心有悦焉歸而為飛白之書漢末魏初並以題署宫閣其體有二剏法於八分窮微於小篆自非蔡公設妙豈能詣此可謂勝寄冥通縹緲神仙之事也法書要録曰飛白本是八分之輕者全用指法吳時張𢎞好學不仕常著烏}
