  - {type: variant, offset: 3039, length: 4, content: 梁庾肩吾, WYG: 索靖字幼安善章草出于韋誕峻險過之若山形中裂水勢懸流雪嶺孤松氷河危石其堅勁則古今不逮後漢徐幹字伯章善章草班固與弟超書稱之曰得伯章與藁知識讀之莫不歎息實亦藝由己立名自人成後有蘇班者平陵人也五嵗能書甚為伯章之所稱又曰後漢張伯英損益伯度章草迹猶逸少増减元帝真書雖潤色開華精於斷割美則美矣至若髙深之到質素之風俱不逮其師也然名為今古之獨歩又曰張伯英草書急就章字皆一筆而成合於自然可謂變化之極楊欣}
  - {type: page-break, offset: 3039, content: '', id: KR3k0012_WYG_749-14a, image: WYG0899/WYG0899-0583c.png}
