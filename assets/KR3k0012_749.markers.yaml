  - {type: variant, offset: 1085, length: 743, content: 安帝非不處尊位而都無神施吳興書如新亭傖父一往見似楊州人共語便音態出陶隱居書如吳興小兒形雖未成長而骨體甚駿快殷鈞書如膏麗使人抗浪甚有意氣滋韻終不精味袁山松書如深山道士見人便欲退縮蕭子雲書如春初望山林花無處不發如經論道人無絕不言崔子玉書如危峰阻日孤松一枝有絕望之意師宜官書如鵰羽未息翩翩自逝韋誕書如龍威虎振劍拔弩張蔡邕書骨氣風遠爽爽為神鍾司書字十二種意外殊妙實多奇邯鄲淳書應規入矩方圓乃成張伯英書如漢武帝愛道憑虛欲仙索靖書如飄風忽舉鷙鳥不飛皇象書如歌聲繞梁琴人捨揮衛常書如插花美人舞笑鏡臺孟光祿書如崩山絕崖人見可畏張芝驚奇鍾繇特絕逸少鼎能獻之冠世四英其頹洪芳不滅羊真孫草蕭竹范篆各一時妙絕鍾繇書若飛鴻戲海舞鶴遊天行間希密實亦難過蕭思話書走墨連綿字勢屈強若龍跳淵門虎臥鳳闕薄紹之書字勢蹉跎如舞妓低腰仙人嘯樹江式論書表曰秦有八體一曰大篆二曰小篆三曰符書四曰蟲書五曰摹印六曰署書七曰殳書八曰隸書又曰漢時有六書一曰古文孔子壁中書也二曰奇字即古文而異者也三曰篆書云小篆也四曰佐書秦隸書也五曰繆篆所以摹印也六曰鳥蟲所以書幡信也李嗣真書後品曰蟲篆者小學之所宗草隸者士人之所尚近代君子故多好之或時有可觀耳武平一徐氏法書記曰梁大同中武帝勑周興嗣撰千字文使溫鐵石摸次羲之之跡以賜八王徐浩論書曰初學之際宜先筋骨筋骨不立肉何所附用筆之勢特須藏鋒鋒若不藏字則有病病且未去能何有焉字不欲踈亦不欲密亦不欲大亦不欲小小長令大大蹙令小踈肥令密密瘦令踈斯其大經矣筆不欲捷亦不欲徐亦不欲平亦不欲側側豎令平峻不使傾捷則須定徐則須利如此則其大較矣徐浩古跡記曰中宗時中書令宗楚客奏事承恩乃乞大小二王真跡勑賜十二卷大小各十軸楚客遂裝作十二扇屏風以禇遂良閑居賦枯樹賦為腳大會貴要張以示之時薛稷崔湜盧藏用廢食歎美復不宴樂何延之蘭亭記曰蘭亭者, SBCK: 郄曇墓獲}
