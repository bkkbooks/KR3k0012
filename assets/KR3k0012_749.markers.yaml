  - {type: variant, offset: 254, length: 4, content: 叔自過江, SBCK: 􅀠法由兹而廣酈善長水經注曰臨淄人發古􅃁得棺前和外隱起爲􅀠字言齊太公六代孫胡公之棺也唯三字是古餘同今書證知隷字出古非始於􅁗也成公綏􅀠􅀔曰蟲􅂐旣䌓草藁近僞適之中庸莫尚於隷草書}
