  - {type: variant, offset: 2586, length: 0, content: '', SBCK: 文舒伯英季弟爲黄門侍郎尤善章草家風不墜弈葉清華書􅀋伯英時人謂之亞聖又曰後漢杜度字伯度京兆杜陵人也御史大夫延年曽孫章帝時爲齊相善章草書雖史游始草書傳不紀其能又絶其跡剏其神妙其唯杜公乎韋誕杜氏傑有骨力而字畫微瘦崔氏法之書體甚濃結字工巧時有不及張芝嘉而學焉轉精其巧可謂草聖超前絶後獨歩無􅀟矣行書書斷曰後漢頴川劉德􅂛字君嗣造行書即正書之小僞務從簡易相間流行故謂之行書王愔云晉丗以來工書者多以行書著名昔鍾}
