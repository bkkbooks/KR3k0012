  - {type: 'tls:seg', offset: 1473, content: '', id: KR3k0012_CHANT_749-10a.11}
  - {type: variant, offset: 1473, length: 0, content: '', WYG: 徴天下工書於鴻都門至數百人}
  - {type: variant, offset: 1474, length: 0, content: '', WYG: 分稱宜官為最大則一字徑丈小則方寸千言甚矜其能而性嗜酒或時空至酒家因書壁以售之觀者雲集酤酒多售𨽻書吳志}
  - {type: page-break, offset: 1474, content: '', id: KR3k0012_WYG_749-4b, image: WYG0899/WYG0899-0578d.png}
  - {type: variant, offset: 1475, length: 1, content: 隸, WYG: 張昭字子布善𨽻書晉書云王羲之尤善𨽻書為古今之冠論者稱其筆勢以為飄若遊雲矯若驚龍深為從伯敦導所器重晉中興書曰李充字𢎞度母衛氏廷尉展之妹也充少孤母聰明有訓又善楷書妙參鍾索世咸重之克從兄咸亦善書沈約宋書曰文帝善為𨽻}
