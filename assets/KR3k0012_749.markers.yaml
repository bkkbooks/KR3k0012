  - {type: variant, offset: 2558, length: 0, content: '', WYG: 自叙草書勢曰昔晉時諸侯争長簡榭相傳望烽闕馬周太宗嘗以御筆賜周公飛白書曰鸞鳯凌雲必資羽翼股肱之寄誠在忠良髙宗為飛白書以賜侍臣賜戴至徳曰泛洪源俟舟檝賜郝處俊曰飛九霄假六翮賜李𤣥敬曰資啓沃罄丹誠大業拾遺曰大業年煬帝將幸江都命越王侑留守東都宫女半不隨駕争泣留帝攀車惜别指血染鞅帝不廽因飛白題二十字留賜宫妓云我夢江都好征遼亦偶然但留顔色在離别止今年唐㑹要曰貞觀十八年五日端午日太宗為飛白書作鸞鳯虬龍蛇}
