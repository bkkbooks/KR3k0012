  - {type: variant, offset: 1509, length: 1, content: 云, WYG: 唯文深及冀擕而已王褒尤善書文深誓恨形於言色後知好當難及改習褒書竟無所成轉被􅏺議謂之學歩邯鄲焉至於碑牓人莫之逮褒亦推之宫殿樓閣皆其迹也世宗令至江陵書景福寺碑蕭察觀而美之陳書曰蕭引善𨽻書𨽻為當時所重髙宗嘗披奏事指引署名曰此字筆勢翩翩似鳥之欲飛引謝曰此乃階下假其羽毛耳唐書曰薛稷好古博雅尤工𨽻書自貞觀永徽之際虞世南禇遂良時人宗其書跡自後罕能繼者稷外祖魏徴家圗籍所有虞禇舊跡稷鋭精模倣筆勢遒麗當時无及之者書斷曰𨽻書者秦下邽人程邈所作也邈字元岑始為縣獄吏得罪始皇幽繫雲陽獄中覃思十年益大}
