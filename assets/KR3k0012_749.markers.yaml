  - {type: variant, offset: 1380, length: 237, content: 若飛鴻戲海舞鶴遊天行間希密實亦難過蕭思話書走墨連綿字勢屈強若龍跳淵門虎臥鳳闕薄紹之書字勢蹉跎如舞妓低腰仙人嘯樹江式論書表曰秦有八體一曰大篆二曰小篆三曰符書四曰蟲書五曰摹印六曰署書七曰殳書八曰隸書又曰漢時有六書一曰古文孔子壁中書也二曰奇字即古文而異者也三曰篆書云小篆也四曰佐書秦隸書也五曰繆篆所以摹印也六曰鳥蟲所以書幡信也李嗣真書後品曰蟲篆者小學之所宗草隸者士人之所尚近代君子故多好之或時有可觀耳武平一徐氏法書記曰梁大同中武帝勑周興嗣撰千字文使溫鐵石摸次羲之之跡以賜八王徐浩論, krp: 宋}
