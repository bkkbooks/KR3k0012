  - {type: variant, offset: 3045, length: 1, content: 功, WYG: 芝皇象鍾繇索靖時並號書聖張芝善章草書崔瑗云龍驤豹變青出於藍又剏為今草天縱尤異率意超曠無惜是非若清澗長源流而無限縈廽崖谷任於造化至於蛟龍駭獸奔騰挐攫之勢手隨心變窈冥不知其所如也精熟神妙冠絶古今則百世不易之法式不可以智識不可以力求若上士游乎沉黙之鄉鸞鳯翔乎大荒之野韋仲將謂之草聖豈徒言哉又曰後漢張昶字文舒伯英季弟為黄門侍郎尤善章草家風不墜奕葉清華書類伯英時人謂之亞聖又曰後漢杜度字伯度京兆杜陵人也御史大}
  - {type: page-break, offset: 3045, content: '', id: KR3k0012_WYG_749-14b, image: WYG0899/WYG0899-0583d.png}
  - {type: variant, offset: 3047, length: 5, content: 第一天然次, WYG: 延年曾孫章帝時為齊相善草書章帝云史㳺始草書傳}
  - {type: variant, offset: 3048, length: 219, content: 一天然次之鍾天然第一功夫次之王功夫不及張天然過之天然不及鍾功夫過之懷瓘以為杜度章草並無所師鬱然靈變為後世楷則此乃天然第一也及有道變杜君章體以至草聖天然所資理可度矣池水盡墨功亦至焉隨永欣寺僧知果會稽人也煬帝甚善之工書嘗謂永師云和尚得右軍肉智果得骨夫筋骨藏於膚肉山水不厭高深書斷曰唐禇遂良善書少則伏膺虞監長則祖述右軍真書甚得其媚趣若瑤堂青瑣窅映春林美人嬋娟似不任乎羅綺鈆華婥約則歐虞謝之其行草之間即居二公之後書斷曰唐高正臣善書廣平人也嘗為人書, SBCK: 七百四}
