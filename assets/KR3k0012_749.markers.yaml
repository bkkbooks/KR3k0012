  - {type: variant, offset: 1517, length: 0, content: '', WYG: 故曰𨽻書又曰和帝時賈魴撰滂喜篇以蒼頡為上篇訓纂為中篇滂喜為下篇所謂三蒼乃為三篇也皆用𨽻字冩之𨽻法由茲而廣酈善長水經注曰臨淄人發古冡得棺前和外隠起為𨽻字言齊太公六代孫胡公之棺也唯三字是古餘同今書𨽻字出古非始於}
