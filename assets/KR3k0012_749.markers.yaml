  - {type: variant, offset: 1985, length: 6, content: 及醒後他日更, SBCK: 時人號爲張顚三輔决録曰趙襲字元嗣爲燉煌太守先是杜伯度崔子玉以工草稱於前丗襲與羅暉亦能草頗自矜誇故張伯英與襲同郡太僕朱賜}
  - {type: page-break, offset: 1985, content: '', id: KR3k0012_SBCK_749-5b}
  - {type: variant, offset: 1985, length: 6, content: 及醒後他日更, WYG: 時人號為真三輔决録曰趙襲字元嗣為燉煌太守先是杜伯崔子玉以工草稱於前世襲與羅暉亦能草頗自矜誇故張伯英與襲同郡太僕朱賜}
  - {type: punctuation, offset: 1988, content: ，, id: KR3k0012_CHANT_749-bkkpn498}
  - {type: 'tls:seg', offset: 1988, content: '', id: KR3k0012_CHANT_749-15a.29}
  - {type: variant, offset: 1990, length: 498, content: 更書數百千本終無如祓褉所書之者右軍亦自珍愛寶重此書留付子孫傳掌至七代孫智永永即右軍第五子徽之之後掌其書為蕭翼紿而取之又曰右軍孫僧智永帝居永欣寺闕閣上臨書所退筆頭置之於大竹簏簏受一石餘而五簏皆蒲凡三十年於閣上臨得真草千字文好者八百餘本浙江東諸寺各施一本今有存者猶直錢數萬張懷瓘書詁曰文質相法立其三古貴賤殊品置其五等三古者篆籀為上古鍾張為中古羲獻為下古又曰崔張玉也逸少金也大賈則貴其玉小商則重其金膚淺之人多任其耳但知王書為最真草一概略無差殊張懷瓘二王等書錄曰承聖末魏師襲荊州元帝將降其夜乃聚古今圖書十四萬卷并大小二王跡遣後閣舍人高善寶焚之吳越寶劍並將斫柱乃歎曰蕭世誠遂至於此文武之道今夜窮乎歷代祕寶並為煨燼矣張懷瓘議書曰其真書逸少第一元常第二世將第三子敬第四士秀第五文靜第六茂猗第七其行書逸少第一子敬第二元常第三伯英第四伯玉第五季琰第六敬和第七茂弘第八安石第九章草子玉第一伯英第二幼安第三伯玉第四逸少第五士秀第六子敬第七休明第八其草書伯英刱立規範得物象之形歸造化之理然其法太古質不剖斷以此為少也有推輪草意之妙後學得魚獵其中宜為第一叔夜第二子敬第三處冲第四世將第五仲將第六士秀第七逸少第八張懷瓘敘書法曰, krp: 端午日}
  - {type: variant, offset: 1992, length: 10, content: 數百千本終無如祓褉所, SBCK: 曰上比崔杜不足下方羅常有餘張壹非草書曰夫草}
  - {type: variant, offset: 1992, length: 10, content: 數百千本終無如祓褉所, WYG: 曰上比崔杜不足下方羅趙有餘也趙一非草書曰夫草}
