  - {type: variant, offset: 84, length: 4, content: 靜思預想, SBCK: 大􅂐入妙書斷曰大􅂐者周宣王大史史籕所作也或云柱下史始變古文或同或異謂之爲􅂐􅂐者傳也傳其物理施之無窮鄄酆定六書三曰􅂐書八體書法一曰大􅂐又漢書藝文志史籕十五篇蓋此也又曰吕氏春秋云蒼頡造大􅂐非也􅀂蒼頡造大􅂐則置古文何地即籕􅂐蓋其子孫是也又曰小􅂐者􅁗丞相李斯所作也増損大􅂐異同籕文謂之小􅂐亦曰􅁗􅂐蔡邕􅂐􅀔曰體有六􅂐妙巧入神或象􅀛文或化龍鱗紆體放尾長翅短身延頸脅翼􅀔似凌雲八分書唐書曰張廷珪與陳州刺史李邕親善屢上表薦之邕所撰碑碣之文必請廷珪八分書之甚爲時人所重丗論曰安定梁鵠}
