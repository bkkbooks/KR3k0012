  - {type: variant, offset: 2550, length: 0, content: '', SBCK: 工王羲之書尤善飛白甞宴三品巳上於􅀇武門帝操筆作飛白字賜羣臣或乗酒爭取於帝手洎登御座引手得之皆奏曰洎登御牀罪當死請付法帝􅀏而言曰昔聞婕妤辭軰今見常侍登牀馬周太宗甞以神筆賜周飛白書曰鸞鳯凌雲必資羽翼股肱之􅀉誠在忠良髙宗爲飛白書以賜侍臣賜戴至德曰泛洪源俟舟檝賜郝處俊曰飛九霄假六翮賜李􅀇敬曰資啓沃罄丹誠大業拾遺曰大業年煬帝將幸江都命越王侑留守東都宫女半不隨駕爭泣留帝攀車借別指血染鞅帝不廻因飛白題二十字留賜宫妓云我夢江都好征遼亦偶然但留顔色在離別只今年唐㑹要曰}
  - {type: page-break, offset: 2550, content: '', id: KR3k0012_SBCK_749-7a}
  - {type: variant, offset: 2552, length: 6, content: 中搜訪王右軍, SBCK: 十八年五日端午日太宗爲飛白書作鸞鳯虬龍}
