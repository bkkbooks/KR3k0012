  - {type: variant, offset: 1586, length: 0, content: '', WYG: 北海静王睦善草書臨病明帝驛馬令作草書尺牘十首焉范曄後漢書曰張超並善於草書妙絶時人魏志曰劉廙轉五官将文學文帝器之命廙同草書晉書曰王獻之時議者以為羲之草書江右中朝莫有及者獻之骨力逺不及父而媚趣過之又曰衛瓘字伯玊與尚書郎燉煌索靖俱善草字時人號之一臺二妙漢末張芝善草書論者謂瓘得伯英之筋靖得伯英之肉北齊書曰趙仲將善草𨽻雖與子弟書字皆楷正云草不可解若放之於人即似將輕易若當家卑㓜又恐其疑三國典畧曰蕭子雲齊豫章王獻文之子有文學工草書與兄弟子顯子昭齊名少子時又善書}
