  body:
  - {type: variant, offset: 3, length: 1, content: 五, SBCK: 六}
  - {type: variant, offset: 3, length: 1, content: 五, WYG: 六}
  - {type: variant, offset: 3, length: 0, content: '', krp: 六書下古文篆書八分書隷書草書飛白書章草書行書古文王隱晉書曰荀勗領祕書監始書師鍾朗法太康二年得汲郡冡中古文竹書勗自撰次注冩以爲中經別在秘書以較經傳闕文多所證明書斷曰古文者黄帝史蒼頡所造也頡首有四目通於神明仰觀奎星圜曲之勢俯察龜文鳥跡之象採乎衆美合而爲字是曰古文孝經援神契云奎主文章蒼頡放象是也夫文宇者揔而爲言包意以名事也分而爲義則文者祖父字者子孫得之自然備其文理象形之屬則爲之文因而滋蔓母子相生形聲會意之屬則謂之字字者言孳乳浸多也題於竹帛謂之書書者如也舒也紀也又曰魏衛覬字伯儒河東安定人官至侍中尤工古文筆跡精絶魏𥘉淳古文者出於邯鄲淳伯儒冩淳古文尚書以示淳淳不能別篆書漢書曰元帝善史書史籕所作大篆籕音紂續漢書曰靈帝置鴻都門諸生能爲尺璧賦及以工書鳥篆相課試至千人焉魏略曰邯鄲淳善蒼頡蟲篆許氏宇指後魏書曰竇遵善揩篆北京諸碑及臺殿樓觀門題多其書也書斷曰秦李斯妙篆始省改之爲小篆著蒼頡篇七章雖帝王質文丗有損益終以文代質漸就澆醨則三皇結繩}
  - {type: xml-element, offset: 4, content: '', id: KR3k0012_CHANT_749-bkkxmlele1}
  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_749-1a.1}
  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_749-1a.2}
  - {type: variant, offset: 4, length: 0, content: '', krp: 帝畫象三王肉刑斯可况也古文可爲上古大篆爲中古小篆爲下古三古謂之實草隷謂之華妙極於華者羲獻精窮於寶者籕籕史籕斯始皇以和氏之壁琢而爲璽令斯}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 下古文􅂐書八分書􅀠書草書飛白書章草書行書古文王隱晉書曰荀勗領祕書􅁥始書師鍾朗法太康二年得汲郡冡}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 下古文書八分書𨽻書草書飛白書章草書行書古文王隠晉書曰荀朂領秘書監始書師鍾朗法太康二年得汲郡冡}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_749-1b, image: WYG0899/WYG0899-0577b.png}
  - {type: variant, offset: 5, length: 0, content: '', krp: 其文今㤗山繹山及秦望等碑並其遺迹謂國之偉寳百丗之法式斯小篆入神大篆入妙書斷曰大篆者周宣王大史史籕所作也或云柱下史始變古文或同或異謂之爲篆篆者傳也傳其物理施之無窮鄄酆定六書三曰篆書八體書法一曰大篆又漢書藝文志史籕十五篇蓋此也又曰吕氏春秋云蒼頡造大篆非也若蒼頡造大篆則置古文何地即籕篆蓋其子孫是也又曰小篆者秦丞相李斯所作也増損大篆異同籕文謂之小篆亦曰秦篆蔡邕篆勢曰體有六篆妙巧入神或象龜文或化龍鱗紆體放尾長翅短身延頸脅翼勢似凌雲八分書唐書曰張廷珪與陳州刺史李邕親善屢上表薦之邕所撰碑碣之文必請廷珪八分書之甚爲時人所重丗論曰安定梁鵠字孟皇善八分書太祖使書信憧宫門牓題書斷曰八分書者秦羽人上谷王次仲所作也又曰後漢師冝官南陽人也靈帝好書徵天下工書於鴻都門至數百人八分稱冝官焉最大則一字徑丈小則方寸千言甚矜其能而性嗜酒或時空至酒家因書壁以雇之觀者雲集酤酒多售隷書呉志曰張昭字布善隷書晉書曰王羲之尤善隷書爲古今之冠論者稱其筆勢以爲飄若遊雲矯若驚龍深爲從伯敦導之所器重晉}
  - {type: xml-element, offset: 6, content: '', id: KR3k0012_CHANT_749-bkkxmlele2}
  - {type: xml-element, offset: 6, content: '', id: KR3k0012_CHANT_749-bkkxmlele3}
  - {type: 'tls:seg', offset: 6, content: '', id: KR3k0012_CHANT_749-1a.3}
  - {type: variant, offset: 6, length: 11, content: 王右軍題衛夫人筆陣圖後, SBCK: 古文竹書勗自撰次注冩以爲中經別在秘書以較經傳闕文多所證明書斷}
  - {type: variant, offset: 6, length: 3, content: 王右軍, WYG: 古文竹書朂自撰次注冩以為中經别在秘書以較經傳闕文多所證明書斷曰古文者黄帝史蒼頡所造也頡首有四目通於神明仰觀奎星圜曲之勢俯察龜文鳥跡之象採乎衆形合而為字是曰古文援神契云奎主文章蒼頡倣象夫文字者總而為言包意以名事也分而為義則文者祖父字者子孫得之自然備其文理象形之屬則為之文因而滋蔓母子相生形聲㑹意之屬則謂之字字者言孶乳浸多也}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_WYG_749-2a, image: WYG0899/WYG0899-0577c.png}
  - {type: variant, offset: 6, length: 0, content: '', krp: 興書曰李充字弘度母衛氏廷尉展之妹也充少孤母聦明有訓又善楷書妙叅鍾索丗咸重之充從兄咸亦善書沈約宋書曰文帝善爲隷書又曰羊欣字敬元長隷書父不疑𥘉爲烏程令欣年十二時王獻之爲吴興太守甚知愛之獻之甞夏月入縣欣着新絹裙晝寢獻之書裙數幅而去欣夲工書因此弥善齊書曰王僧䖍善隷書宋文帝見其書素扇歎曰非唯跡逾子敬文當器雅過之齊書曰周顒少徃外氏車騎將軍臧質家得衛常散隷書法學之甚能文惠太子使顒書玄圃茅齋璧國子祭酒何胤以倒薤書求就顒換之顒笑曰天下有道丘不與易也三國典略曰周白石縣男趙文深以題牓之功除魏興郡守文深字德夲南陽宛人也少學楷隷有鍾王之則當時書唯文深及兾㑺而已王褒尢善書文深慙恨形於言色後知好尚難及改習褒書竟無所成轉𬒳譏誚謂之學歩邯鄲焉至於碑榜人莫之逮褒亦推之宫殿樓問皆其迹也丗宗令至江陵書景福寺碑蕭察觀而美之陳書曰蕭引善隷書爲當時所重髙宗甞披奏事指引署名曰此字筆勢翩翩似鳥之欲飛引謝曰此乃陛下假其羽毛耳唐書曰薛稷好古愽雅尤工隷書自貞觀永徽之際虞丗南禇遂良時人宗其書跡自後罕能繼者稷外祖魏徵家圖籍多有虞禇舊跡稷銳精模倣筆能遒麗當時無及之者書斷曰隷書者秦下邽人程邈所作也邈字元岑始爲縣獄吏得罪始皇幽繫雲陽獄中覃思十年益小篆方圎而爲隷書三千字奏之始皇善之用爲御史以奏事煩多篆家難成乃用隷書爲隷人佐書故曰隷書又曰和帝時賈魴撰滂喜篇以蒼頡爲上篇訓纂爲中篇滂喜爲下篇所謂三蒼也皆是隷字冩之隷法由兹而廣酈善長水經注曰臨淄人發古冡得棺前和外隱起爲隷字言齊太公六代孫胡公之棺也唯三字是古餘同今書證知隷字出古非始於秦也成公綏隷勢曰蟲篆旣䌓草藁近僞適之中庸莫尚於隷草書東觀漢記曰北海靜王睦善草書臨病明帝驛馬令作草書尺牘十首焉范瞱後漢書曰張超並善於草書妙絶時人魏志曰劉廙轉五官將士學文帝器之命廙通草書晉書曰王獻之時議者以爲羲之草書江左中朝莫有及者獻之骨力逺不及父而媚趣過之又曰衛瓘字伯玉與尚書郎燉煌索靖俱善草字時人號之一臺二妙漢末張芝芝字伯英善草書論者謂瓘得伯英之筋靖得伯英之肉北齊書曰趙仲舒善草隷雖與弟書字皆楷正云草不可不解若放之於人即似相輕易若當家卑㓜又恐其疑三國典略曰蕭子雲齊䂊章文獻王之子有文學工草書與兄子顯子昭齊名少子特又善書梁武帝稱之曰子敬之迹不及逸少蕭特之書遂逼其父陳書曰文帝時軍人於丹徒盗發晉郄曇墓獲晉右軍將軍王羲之書及諸名賢遺跡事覺其書並没縣官藏于祕府文帝以伯茂好古多以賜之由是伯茂大工章草甚得右軍之法伯茂始興王也唐書曰賀知章善草書好事者供其牋翰每紙不過數十字共傳寳之時有呉郡張旭亦與知章相善而好酒毎醉後號呼狂走索筆揮灑變化無窮若有神助時人號爲張顚三輔决録曰趙襲字元嗣爲燉煌太守先是杜伯度崔子玉以工草稱於前丗襲與羅暉亦能草頗自矜誇故張伯英與襲同郡太僕朱賜書曰上比崔杜不足下方羅常有餘張壹非草書曰夫草書之興也其於近古乎上非文象所垂下非河雒所吐中非聖人所造蓋秦之末官書煩冗戰攻並作軍書交馳羽檄分飛故隷草趣急速耳示簡易之指非聖人之業也今之學草者不思其簡易之旨直以爲杜崔之法龜龍所見也齓齒以上苟任渉學者廢倉頡史籕竟以杜崔爲楷私書相與庶獨就書云適迫遽故不及草草夲易而速今反難而遟失指多矣夫杜崔張子皆有超俗絶丗之才愽學餘暇遊手于斯後丗慕焉專用爲務鑚堅仰髙忘其罷勞夕惕不息昃不睱食十日一筆月數丸墨領䄂如皁脣齒常黒雖處衆坐不遑談戯展指畫地見䚡蘇來切角中骨也出血猶不休輟然其爲字無益工拙亦效嚬者之増醜學歩者之失節也}
  - {type: punctuation, offset: 9, content: 《, id: KR3k0012_CHANT_749-bkkpn1}
  - {type: variant, offset: 9, length: 8, content: 題衛夫人筆陣圖後, krp: 自叙草書勢}
  - {type: variant, offset: 10, length: 66, content: 衛夫人筆陣圖後曰夫紙者陣也筆者刀矟也墨者鍪甲也水硯者城也本領者將軍也心意者將副也結構者謀畫也颺筆者吉凶也出入者號令也屈折者殺戮也夫欲, WYG: 於竹帛謂之書}
