  - {type: variant, offset: 1442, length: 0, content: '', WYG: 李斯妙大篆始省改之為小篆著蒼頡篇七章雖帝王質文世}
  - {type: variant, offset: 1443, length: 0, content: '', WYG: 損益終以文代質漸就澆漓則三皇結繩五帝畫象三王肉刑斯可况也古文可為上古大篆為中古小篆為下古三古謂之實草𨽻為華妙極於華者羲獻精窮於實者籀斯始皇以和氏之璧琢而為璽令斯書其文今太山繹山及秦望等碑並其遺迹謂國之偉寳百世之式斯小篆入神大篆加妙書斷曰大篆者周宣王太史史籀所作也或云柱下史始變古文或同或異謂之為篆篆者傳也傳其物理施之無窮甄豐定六書三曰篆書}
