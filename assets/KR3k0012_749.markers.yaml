  - {type: variant, offset: 78, length: 5, content: 先于研墨凝, SBCK: 如也舒也紀也又曰魏衛覬字伯儒河東安定人官至侍中尤工古文筆跡精絶魏􅀄淳古文者出於邯鄲淳伯儒冩淳古文尚書以示淳淳不能別􅂐書漢書曰元帝善史書史籕所作大􅂐籕音紂續漢書曰靈帝置鴻都門諸生能爲尺璧賦及以工書鳥􅂐相課試至千人焉魏略曰邯鄲淳善蒼頡蟲􅂐許氏宇指後魏書曰竇遵善揩􅂐北京諸碑及臺殿樓觀門題多其書也書斷曰􅁗李斯妙􅂐始省改之爲小􅂐著蒼頡篇七章雖帝王質文丗有損益終以文代質漸就澆醨則三皇結繩五帝􅀞象三王肉刑斯可况也古文可爲上古大􅂐爲中古小􅂐爲下古三古謂之實草􅀠謂之華妙極於華者羲獻精窮於寶者籕籕史籕斯始皇以和氏之壁琢而爲璽令斯書其文今㤗山繹山及􅁗望等碑並其遺迹謂國之偉寳百丗之法式斯小􅂐入}
