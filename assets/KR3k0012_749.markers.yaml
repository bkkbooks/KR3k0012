  - {type: variant, offset: 970, length: 394, content: 古今書評曰王右軍書如謝家子弟縱復不端正者爽爽有一種風氣王子敬書如河洛間少年雖皆充悅而舉體蹉跎殊不可耐羊欣書如大家婢為夫人雖處其位而舉止羞澀終不似真徐淮南書如南岡士大夫徒好尚風軌終不免寒乞阮研書如貴胄失品次不能復排突英賢王儀同書如晉安帝非不處尊位而都無神施吳興書如新亭傖父一往見似楊州人共語便音態出陶隱居書如吳興小兒形雖未成長而骨體甚駿快殷鈞書如膏麗使人抗浪甚有意氣滋韻終不精味袁山松書如深山道士見人便欲退縮蕭子雲書如春初望山林花無處不發如經論道人無絕不言崔子玉書如危峰阻日孤松一枝有絕望之意師宜官書如鵰羽未息翩翩自逝韋誕書如龍威虎振劍拔弩張蔡邕書骨氣風遠爽爽為神鍾司書字十二種意外殊妙實多奇邯鄲淳書應規入矩方圓乃成張伯英書如漢武帝愛道憑虛欲仙索靖書如飄風忽舉鷙鳥不飛皇象書如歌聲繞梁琴人捨揮衛常書如插花美人舞笑鏡臺孟光祿書如崩山絕崖人見可畏張芝驚奇鍾繇特絕逸少鼎能獻之冠世四英其頹洪芳不滅, krp: 云}
