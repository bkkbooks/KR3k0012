  - {type: 'tls:seg', offset: 1996, content: '', id: KR3k0012_CHANT_749-15a.30}
  - {type: variant, offset: 2004, length: 0, content: '', SBCK: 興也其於近古乎上非文象所垂下非河雒所吐中非聖人所造蓋􅁗之末官書煩冗戰攻並作軍書交馳羽檄分飛故􅀠草趣急速耳示簡易之指非聖人之業也今之學草}
  - {type: variant, offset: 2004, length: 0, content: '', WYG: 興也其於近古乎上非天象所垂下非河洛所吐中非聖人所造盖秦之末官書煩冗戰攻並作軍書交馳羽檄分飛故𨽻草趣急速耳示簡易之指非聖人之業也今之學草}
  - {type: punctuation, offset: 2005, content: 。, id: KR3k0012_CHANT_749-bkkpn500}
  - {type: 'tls:seg', offset: 2005, content: '', id: KR3k0012_CHANT_749-15a.31}
  - {type: variant, offset: 2005, length: 0, content: '', SBCK: 不思其簡易之旨直以爲杜崔之法􅀛龍所見也齓齒以上苟任渉學者廢倉頡史籕竟以杜崔爲楷私書相與庶獨就書云適迫遽故不及草草夲易而速今反難而遟失指多矣夫杜崔張子皆有超俗絶丗之才愽學餘暇遊手于斯後丗慕焉專用爲務鑚堅仰髙忘其罷勞夕惕不息昃不睱食十日一筆月數丸墨領䄂如皁脣齒常黒雖處衆坐不遑談戯展指畫地見䚡蘇來切角中骨也出血猶不休輟然其爲字無益工拙亦效嚬者之増醜學歩者之失節也王}
  - {type: page-break, offset: 2005, content: '', id: KR3k0012_SBCK_749-6a}
  - {type: variant, offset: 2005, length: 9, content: 右軍亦自珍愛寶重此, WYG: 不思其簡易之㫖直以為杜崔之}
  - {type: variant, offset: 2007, length: 0, content: '', SBCK: 自叙草書􅀔曰昔􅁗時諸侯爭長簡檄相傳望烽走馹正以􅂐􅀠之難不救其速遂作赴急之書蓋今草書也其先岀自杜氏以張爲祖以衛爲父索范者伯叔也二王父子可謂兄弟薄爲庶息羊爲僕􅀠自而叙之}
  - {type: variant, offset: 2008, length: 5, content: 自珍愛寶重, SBCK: 不失倉公觀鳥跡之意抑體有踈宻意有倜儻或有飛走流注之􅀔驚竦峭絶之氣滔滔閑雅之容卓犖調宕之志百體千形而呈其巧豈可一槩而論哉書斷曰如淳云作起草爲藁姚察曰草猶麄書爲夲曰藁蓋剏文議出於}
  - {type: variant, offset: 2014, length: 0, content: '', SBCK: 草}
  - {type: punctuation, offset: 2015, content: ，, id: KR3k0012_CHANT_749-bkkpn501}
