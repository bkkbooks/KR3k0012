  - {type: variant, offset: 2015, length: 2, content: 留付, SBCK: 之先因於起草又曰晉王逸少妻郄氏甚工書七}
  - {type: variant, offset: 2015, length: 25, content: 留付子孫傳掌至七代孫智永永即右軍第五子徽之之後掌其, WYG: 龜龍所見也齠齓以上苟任渉學者廢蒼頡史籕竟以杜崔為楷私}
  - {type: variant, offset: 2018, length: 16, content: 孫傳掌至七代孫智永永即右軍第五子, SBCK: 獻之最知名􅀇之凝之}
