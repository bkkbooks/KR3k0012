  - {type: variant, offset: 2583, length: 0, content: '', SBCK: 飛白書者後漢左中郎蔡邕所作也王隱王愔並云飛白變楷制也夲是宫殿題署􅀔旣勁大字冝輕微不滿名爲飛白王僧䖍云飛白八分之輕者雖有此說案漢靈帝嘉平年詔蔡邕作聖皇篇篇成詣鴻都門上時方脩飾鴻都門伯喈待詔門下見役人以堊帚成字心有恱焉歸而爲飛白之書漢末魏􅀄並以題署宫閣其體有二剏法於八分窮微於小􅂐自非蔡公設妙豈能詣此可謂勝􅀉􅁳通縹緲神仙之事也法書要録曰飛白夲是宫殿八分之輕者全用揩法吴時張弘好學不仕常着烏巾時人號爲張烏巾此人特善飛白能書者鮮不好之章草書晉書曰王羲之書初不勝􅁃翼郄愔及其暮年方妙甞以章草荅􅁃亮而翼深歎伏因與羲之書云吾昔有伯英章草十紙過江顚狽遂乃亡失常歎妙迹永絶忽見足下荅家兄書煥􅀂神明頓還舊觀書斷曰章草書漢黄門令史史游所作也衛常李誕並云漢􅀄而有草法不知其誰蕭子良云章草者漢齊相杜操始變藁法非也王愔云漢元帝時史游作急就章解散􅀠體麄書之漢俗簡惰漸以行之是也又曰索靖字㓜安善章草出韋誕峻險過也有􅀂山形中裂水􅀔懸流雪嶺􅀌松冰河危石其堅勁則古今不逮後漢徐幹字伯張善章草書班固與弟超書稱之曰得伯張書藁知識讀之莫不歎息實亦藝由巳立名自人成後有蘇班者平陵人也五歳能書甚爲伯張之所稱歎又曰後漢張伯英損益伯度章草亦猶逸少增减元帝真書雖潤色開華精於斷割美則美矣至􅀂髙深之致質素之風俱不逮其師也然名爲今古之獨歩又曰張伯英章草書急就章字皆一筆而成合於自然可謂變化至極羊欣云張芝皇象}
