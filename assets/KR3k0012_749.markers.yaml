  - {type: variant, offset: 350, length: 191, content: 妙者也二曰章程書傳小學秘書教者也三曰行狎書是者也二法皆世人所善虞龢論書曰晉謝奉起廟悉用棐村右軍取柹書之滿林奉收得一大簣子敬後往謝奉為說右軍書甚佳而密已削作數十棐板請子敬書之亦甚佳奉並珍錄後履分半與桓玄用履為楊州主簿餘一半孫恩破會稽略以之海又曰晉時有一好事少年故作精白紗裓衣著詣子敬子敬便取書之草正諸體悉備兩袖及褾略同少年覺王左右有陵奪之掣裓而走左右果逐之及門外鬭爭分裂少年纔得一袖耳, SBCK: ''}
