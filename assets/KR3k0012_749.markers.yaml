  - {type: variant, offset: 18, length: 83, content: 夫紙者陣也筆者刀矟也墨者鍪甲也水硯者城也本領者將軍也心意者將副也結構者謀畫也颺筆者吉凶也出入者號令也屈折者殺戮也夫欲書者先于研墨凝神靜思預想字形大小偃仰平直振動令筋脈, krp: 昔秦時諸侯爭長簡檄}
