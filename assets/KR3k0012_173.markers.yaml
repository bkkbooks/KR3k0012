  - {type: variant, offset: 206, length: 0, content: '', WYG: 以下皆自入山督攝伐木又壞諸地大開苑囿起土山作樓觀加飾珠玉製以竒名右臨硎左彎碕又開城渠引後湖水激流入宫内巡遶堂殿窮極伎巧功費萬計又曰赤烏十年春二月適南宫三月改作大初宫詔移武昌材瓦有司奏武昌宫作已二十八年恐不堪用宜别更置帝曰大禹卑宫室為美今軍事未已所在多賦妨損農業且建業宫乃朕從京來所作府寺耳柱材率細年月久逺恐損壞今武昌宫材木自可用繕之晉書曰尚書僕射謝安石以宫室朽壞啓作新宫帝權出居㑹稽王第二月始興功内外日役六千人安與大匠毛安之決意修定皆仰模𤣥象體合辰極並新制置省閣堂宇名署時正搆太極殿欠一梁有梅木流至石頭石頭津主啓聞取用之因畫花於梁上以表瑞焉又起朱雀重樓皆繡栭藻井}
