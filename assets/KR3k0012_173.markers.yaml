  - {type: variant, offset: 67, length: 0, content: '', SBCK: 鼓鍾于宫聲聞于外易曰上古穴居而野處後丗聖人易之以宫室上㨂下宇以待風雨蓋取諸大壯左傳曰襄公作楚宫穆叔曰太誓云人之所欲天必從之君欲楚夫故作其宫􅀂君不復適楚必死是宫也六月公薨于楚宫又曰晉成虒祁之宫又成銅鞮之宫數里論語曰禹卑宫室而盡力乎溝洫禹吾無間然矣史記曰騶子之燕昭王擁彗先驅請列弟子坐而受業築碣石宫親徃師之又曰􅁗始皇造阿房宫徴發天下工匠又曰􅁗始皇所居之宫有祈年宫長信宫梁山宫又曰戎使由余於􅁗􅁗繆公示以宫室積聚由余曰使􅀑爲之則勞神矣使人爲之亦苦民矣又曰項羽屠咸陽焚其宫室三月火不㓕又曰盧生􅀃始皇曰人主爲微行所居而人知之則害於神願上居無令人知則不死之藥殆可得也乃命咸陽之旁三百里内宫觀二百七十􅃨道甬道相連帷帳鍾鼔美人充之所幸言其處者死始皇幸梁山宫望見丞相車􅀐衆不善之中人以告丞相損車􅀐始皇怒曰此中人泄吾語捕時在旁者斬之自是莫知所在决事悉於咸陽宫又曰始皇二十七年作長信宫於渭􅀯通驪山作甘泉前殿築甬道自咸陽屬之築牆垣如街巷又曰漢武帝時河決天子自臨決河沉白馬玉壁作瓠子歌於是築宫其上名曰宣房宫又曰樗里子卒葬于渭}
