  - {type: variant, offset: 360, length: 5, content: 韶州科斗勞, WYG: 武帝遊五柞宫欲廣上林令譙隆諫曰堯舜至治廣德不務苑囿帝初不悅後拜為中郎墨子曰上古之人未知為宫室就陵而居處下潤傷民故聖人作為宫室宫室之制髙足以避潤濕中足以禦寒風上足以待霜雪牆髙足以别男女故以便生不以為樂也今之為宫室必厚斂百姓暴奪民財為曲成之室青黄刻鏤之飾故國貧而人難訴也管子曰黄帝有合宫以聽政穆天子傳曰天子升於崑崙之宫以觀黄帝之宫越絶書曰美女宫周五百九十步土城者勾踐所習教美人西施鄭旦宫室方言曰吳有館娃之宫列子曰周穆王時西域國有化人來王執化人之袪騰而上天暨化人之宫構以金銀絡以珠玉出雲雨之上實為清都紫微也孟子曰齊宣王見孟子於雪宫胡氏春秋曰武王勝殷清箕子之宫也神異經曰東方有宫青石為牆髙三仞左右闕髙百丈畫以五色門有銀牓以青石碧鏤題曰天帝長男之宫西方有宫白石為牆五色𤣥黄門有金牓而銀鏤題曰天帝少女之宫中央有宫以金為牆門有金牓以銀鏤題曰天皇之宫南方有宫以赤石為牆赤銅為門闕有銀牓曰天帝中男之宫北方有宫以黒石為牆題曰天地中男之宫東南有宫以黄石為牆黄牓碧鏤題曰天帝少男之宫西北有宫以黄銅為牆題曰地皇之宫十洲記曰青丘山上有紫宫天真仙女多遊於此又曰方丈山有琉璃宫紀年曰穆王所居鄭宫春宫說苑曰楚使使聘齊齊王享之梧宫使者曰大哉梧乎王曰江海之魚吞舟况大國之樹三輔故事曰桂宫周匝十里内有光明殿走狗臺土山複道横北度從宫中西上城至神明臺三輔黄圖曰長安有夜光宫望逺宫昭臺宫葡萄宫竹宫棠棃宫扶荔宫萯陽宫長平宫五柞宫漢宫閣名曰長安有長樂宫未央宫長門宫鼔簧宫承光宫宜春宫池陽宫長平宫黄山宫望仙宫長楊宫集靈宫延壽宫祈年宫通天宫駊婆宫沛宫林梵宫甘泉宫首山宫交門宫明光宫五柞宫萬嵗宫竹宫壽宫建章宫太乙宫思子宫見漢書長樂等宫或在京師或在外郡或帝王所居或祀祠所在或因事以置夜光宫棠梨宫扶荔宫見三輔黄圖桂宫見三輔故事鼎湖宫谷口宫魏畧曰大秦國城中有五宫相去各五十里宫室皆以}
