  - {type: variant, offset: 205, length: 2, content: 石門, SBCK: 􅁗起咸陽西至雍離宫三百師古曰凡言離宫者皆謂於別處置}
  - {type: variant, offset: 205, length: 0, content: '', WYG: 後元二年幸盩厔作五柞宫張晏曰有五柞樹因以名又曰甘露二年幸萯陽宫在鄠萯音倍後漢書曰永平三年夏旱而大起北宫鍾離意詣闕免冠上疏曰伏見陛下以天時小旱憂念元元降避正殿躬自克責而比日宻雲遂無大潤豈政有未得應天心者耶昔成湯遭旱以六事自責曰政不節邪使人疾邪宫室崇邪女謁盛邪包苴行邪讒夫昌邪竊見北宫大作人失農時此所謂宫室崇也自古非苦宫室小狹但患人不安寧宜且罷止以應天心臣意以匹夫之才無有行能久食重禄擢備近臣比受厚賜喜懼相半不勝愚戅征營罪當萬死征營不自安也帝䇿詔報曰湯引六事咎在一人其冠履勿謝比上天降旱宻雲數㑹朕戚然慚懼思服嘉應故分布禱請闚候風雲北祈明堂南設雩場明堂在洛陽城南言北祈者葢時修雩場在明堂之南也今又勅大匠止作諸宫減省不急庶消災譴詔因謝公卿百僚遂應時澍雨又曰東平王蒼薨元年三月廵狩幸東平宫追念蒼謂其諸子曰思其人至其鄉其處在其人亡因泣下沾襟魏志曰帝營作許昌宫楊阜諫曰堯尚茅茨而萬國安禹卑宫室而天下樂桀作璇室象廊紂為傾宫鹿臺皆喪社稷也吳志曰後主二年六月起新宫於大初之東制度尤廣二千}
