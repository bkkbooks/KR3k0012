  - {type: variant, offset: 1526, length: 3262, content: 年嘗發逋亡人贅婚賈人略取陸梁地是為桂林郡焉二漢屬零陵蒼梧二郡吳分置始安郡晉孝武改為始建齊復為始安梁天監六年立桂州於蒼梧鬱林之境無定理處大同六年移桂州於今理隋大業三年罷州唐武德四年復置桂州始安記曰吳越之境其人好劍輕死易生火耕水耨人食魚稻無千金之家好巫鬼重淫祀十道志曰臨桂縣荔水水源多生桂桂生處不生雜樹昭州十道志曰昭州平樂郡秦桂林郡地二漢屬蒼梧郡宋屬始建國齊屬始安郡隋亦然唐武德四年置樂州貞觀八年改為昭州取昭潭為名盛弘之荊州記曰平樂縣西南數十里有山間有兩目如人眼極大瞳子白黑分明蒙州十道志曰蒙州蒙山郡漢武平南越置蒼梧郡今州即蒼梧之荔浦縣也隋置隋化縣唐置蒙州州有山號曰蒙山山下人皆姓蒙因為州名富州十道志曰富州開江郡秦桂林郡地二漢屬蒼梧郡梁為開江武城二郡地陳置靜州改開江武城二郡為逍遙郡隋平陳並廢唐又置靜州貞觀八年改為富州因富水為名梧州十道志曰梧州蒼梧郡秦屬桂林郡二漢為蒼梧晉以後並因之梁屬成州隋平陳改為封州唐為梧州漢書曰武帝元始六年開蒼梧郡禮記曰舜葬蒼梧之野潯州十道志曰潯州潯江郡秦屬桂林郡二漢以後並屬鬱林郡隋屬永平鬱林二郡地唐置潯州郡國志曰大賓縣漢布山縣地有糖牛與虵同穴牛嗜盬俚人以皮裹手塗鹽入穴探之牛舐之出外則不得入取其角為器一曰糖牛龔州十道志曰龔州臨江郡秦屬桂林郡漢平南越置蒼梧郡今州即郡之孟陵縣地也唐置龔州鬱林州十道志曰鬱林州鬱林郡秦為桂林郡漢改為鬱林郡後漢亦同梁置定州後改為南定州隋平陳改為尹州煬帝初為鬱林州唐為鬱林州平琴州十道志曰平琴州平琴郡舊鬱林郡地唐置平琴州或為平琴郡賓州十道志曰賓州安城郡古越地秦桂林郡地漢為鬱林郡又為鬱林郡之嶺方縣自漢迄隋並為嶺方縣地唐貞觀五年置賓州澄州十道志曰澄州賀水郡古越地秦為桂林郡漢為鬱林郡之嶺方縣唐武德四年置澄州繡州十道志曰繡州常林郡秦屬桂林郡二漢屬郁林郡晉以後因之唐平蕭銑置繡州象州十道志曰象州象郡秦屬桂林郡二漢為鬱林郡吳又分置桂林郡晉宋齊因之隋平陳置象州因象山以為名秦象郡今合浦郡非此象州也柳州十道志曰柳州龍城郡秦漢土地與象州同晉以後屬桂林郡隋屬始安郡唐平蕭銑置昆州貞觀八年改為柳州融州十道志曰融州融水郡歷代土地與柳州同唐置融州邕州十道志曰邕州朗寧郡古越地秦為桂林郡漢鬱林郡之嶺方縣地晉置晉興郡于此隋為鬱林郡之宣化縣武德四年置南晉州貞觀六年改為邕州圖經曰人俗怪嗇澆薄內險外惷椎髻跣足尚雞卜卵卜貴州十道志曰貴州懷澤郡虞舜暨周並為荒裔秦為桂林郡自漢以下與鬱林郡同唐置貴州黨州十道志曰黨州寧仁郡秦桂林郡地唐置黨州南越志曰黨州隆仁縣有京觀即古征黨洞殺俘虜處橫州十道志曰橫州寧浦郡古越地秦象郡地漢為合浦郡之高涼縣地隋於此置簡州又改為緣州唐改為橫州田州十道志曰田州橫山郡土地與朗寧郡同唐為田州嚴州十道志曰嚴州修德郡禹貢荊州之域漢武平南越即象郡地唐乾封二年置嚴州地在嚴崗之側因為名圖經曰州門有長河水深八十丈從䍧牁流下山州方輿志曰山州龍池郡土地與嚴州同唐為山州或為龍池郡淳州方輿志曰淳州永定縣秦屬桂林郡地唐武德四年置至永貞以犯憲宗廟諱改為巒州以巒山為名羅州十道志曰羅州招義郡禹貢楊州之地是為南越宋元嘉三年鎮南將軍檀道濟巡撫於陵羅口築城因以名之屬高涼郡唐武德五年因其地復置州南越志曰招義縣昔人流營也潘州十道志曰潘州南潘郡古甌駱越地秦平百越為桂林郡地漢為合浦縣地屬合浦郡唐武德四年置南宕州八年改為潘州嶺表記曰潘州昔有方士潘茂於此昇仙遂以名郡容州方輿志曰容州普寧郡古越地秦屬象郡二漢屬合浦郡宋太始七年分合浦縣於此立南流郡齊梁陳不改隋廢唐武德四年置銅州貞觀八年改為容州因容山為名十道志曰鬼門關在北流縣南三十里兩石相對狀若關形闊三十餘步昔馬援討林邑經此立碑石碣尚存昔時趨交趾皆由此關巳南尤多瘴癘去者罕得生還故諺曰鬼門關十人去九人還郡國志曰斯地瘴氣春謂春草瘴秋謂黃苑瘴有瘴江水辯州十道志曰辯州陵水郡古越地秦象郡地二漢屬合浦郡唐置辯州郡國志曰辯州在陵羅二水之間白州十道志曰白州南昌郡古越地秦象郡地漢為合浦郡唐武德四年置南州六年改為白州嶺表錄曰州有一泒水出自雙角山合容州江呼為綠珠井江又綠珠井在雙角山下昔梁氏之女有容兒石季倫為交趾採訪使以真珠三斛買之梁氏之居舊井存焉牢州十道志曰牢州定川郡本巴蜀西南徼外夷秦屬象郡漢屬䍧牁郡唐置義州改為智州貞觀十一年改為牢州以牢石為名欽州十道志曰欽州寧越郡歷代土地與白州同宋齊巳來置宋壽郡梁又置安州隋平陳改為欽州安南都護府方輿志曰安南府今理宋平縣古越地禹貢楊州之地號為百越在周為越裳重譯之地秦屬象郡漢為交阯日南二郡界後漢因之唐為交州又曰人俗雜蠻夷之風其人皆服布如單被穿中央以貫其首男子耕農女子織紝兵則矛楯長刀木弓竹矢或骨為鏃交州記曰南定縣人足骨無節身有毛臥者更扶始得起故山海經云交脛人國腳脛曲戾相交所以謂之交趾南越志曰龍編縣州之始有蛟龍編於津之間因以為瑞而名邑武峨州方輿志曰武峨州武峨郡土地與安南府同唐置武峨州粵州方輿志曰粵州龍水郡土地與安南府同唐為粵州或為龍水郡芝州方輿志曰芝州忻城郡土地與安南府同唐為芝州或為忻城郡愛州方輿志曰愛州九真郡秦象郡地漢武置九真郡後漢亦同晉亦屬九真郡宋齊因之梁置愛州隋為九真郡唐又為愛州福祿州方輿志曰福祿州福祿郡土地與九真郡同唐為福祿州長州方輿志曰長州文陽郡土地與九真同唐為長州驩州方輿志曰驩州日南郡古越裳氐國九譯所通者也秦屬象郡二漢屬九真郡吳分置九德郡晉宋齊因之隋置驩州後為日南郡唐為驩州郡國志曰龐山洞人去其兩齒為飾刻胸作花文中山立市十日一會鑄銅為器大如盤名旁旁以為財市峰州方輿志曰峰州承化郡古文郎國有文郎水亦陸梁地秦屬象郡二漢屬交趾郡吳分置新興郡晉改為新昌陳置興州隋平陳改為峰州煬帝初廢唐復置峰州林邑記曰蒼梧以南有文郎野人居無室宅依樹止宿食生肉采香為業與人交易若上皇之人陸州方輿志曰陸州玉山郡秦象郡地漢以來屬交趾郡梁分置黃州及寧海郡隋平陳郡廢改黃州為玉州煬帝初州廢唐復置玉州上元二年改為陸州州有陸水廉州方輿志曰廉州合浦郡秦象郡地漢置合浦郡後漢同吳改為珠官晉又為合浦郡宋因之兼置臨瘴郡及越州齊又因之隋改為祿州尋又改為合州唐置廉州後漢書曰孟嘗字伯周會稽上虞人為合浦太守先時太守多貪珠遂徙向交趾嘗到革理前弊珠遂還稱為神明桓帝徵之巖州方輿志曰巖州安樂郡土地與合浦郡同唐為巖州或為安樂郡雷州方輿志曰雷州海康郡秦象郡地二漢以後並屬合浦郡梁分置合州大同末為南合州隋煬帝初廢唐為雷州投荒錄云雷州南濱大海多雷雷之聲近在簷宇之上雷州之北高州之南數鄉亦多雷雷聲似在尋常之外俗俟雷時具酒肴設奠畏雷法甚嚴謹有以彘肉與雞肉食者霹靂即至禺州十道志曰禺州溫水郡古百越地婺女之分野秦屬象郡本宕昌之邊邑唐置宕州又改為禺州以南方番禺之地因名州湯州方輿志曰湯州湯泉縣秦屬象郡唐置湯州或為湯泉州瀼州十道志曰瀼州臨潭郡禹貢荊州之分春秋屬楚在鬱林之西南交趾之北隋大將軍劉方始開此路為鎮守尋又不通唐貞觀二年清平公李弘節遣欽州首領甯師宗招慰開拓尋劉方舊路得達交州為州在瀼水之東故以為名瀼音而韋反籠州十道志曰籠州扶南郡古越地在南越之西界唐貞觀十二年大使清平公李弘節招降獠置籠州以籠洞為名環州十道志曰環州正平郡禹貢荊州之分州隸桂州貞觀二年李弘節招尉款附環落洞故以名州州在遊廬水南整水北古州方輿志曰古州樂古郡土地同臨潭郡唐置古州或為樂古郡崖州方輿志曰崖州朱崖郡郡地海中之洲也洲方千里與今海康郡之徐聞縣對自徐聞徑度便風揚帆一日一夕即至梁置崖州漢書曰武帝元鼎六年開南海地置朱崖儋耳二郡元帝罷朱崖郡以其阻絕數反故罷之郡國志曰崖州婦人著緦緶以土為釜器用瓠瓢無水人飲唯石汁又有椒以安石榴花著瓮中經旬即成酒其味香美仍醉人交州記曰朱崖在大海中南極之外儋州十道志曰儋州昌化郡土地所屬與朱崖同漢元鼎六年定越地置儋耳郡唐武德四年置儋州漢書張晏注曰儋耳其俗鏤其頰皮上連耳其分為數支狀似雞腸因名焉山海經海內南經曰有離耳郭顥純注曰鎪其耳分令下垂為飾即儋耳也振州方輿志曰振州延德郡土地與朱崖郡同隋置臨振郡唐置振州瓊州方輿志曰瓊州瓊山郡土地與朱崖郡同唐貞觀六年割崖州置瓊州萬安州方輿志曰萬安州萬安郡土地與朱崖郡同唐置萬安州或為萬安郡, WYG: ''}
