  - {type: variant, offset: 407, length: 875, content: 岡州義寧郡禹貢楊州之域秦漢並屬南海郡東晉末分置新會郡宋齊梁並因之隋平陳置封州後改為亢州後改為岡州郡國志曰岡州地邊大海晴少雨多時遇甚風林宇悉拔俗織竹為釜以蠣殼屑泥之煮鹽轉久彌密循州十道志曰循州海豐郡春秋時為百越之地戰國屬楚秦二漢南海郡地晉亦然隋平陳置循州南越志曰郡東水道一千里趙佗昔為龍川尉所蒞於此潮州十道志曰潮州潮陽郡亦古閩越地秦屬南海郡秦末屬尉佗漢初屬南越後亦屬南海郡後漢因之晉置東官郡隋平陳置潮州郡國志曰稻得再熟蠶亦五收煮海為鹽十道志曰海陽縣本漢揭陽縣地南越志曰潮陽縣窮海之北故曰潮陽恩州十道志曰恩州恩平郡秦屬南海郡二漢為合浦郡唐貞觀中置恩州春州十道志曰春州南陵郡古越地秦屬南海象郡漢合浦郡之高涼縣地晉分置恩平縣唐武德四年討平蕭銑置春州賀州十道志曰賀州臨賀郡秦屬南海郡二漢屬蒼梧郡吳置臨賀郡晉因之宋為臨慶國齊復為臨賀郡陳因之隋平陳置賀州因賀水為名端州十道志曰端州高要郡秦屬南海郡兩漢並屬蒼梧郡晉亦然宋齊並屬南海郡陳置高要郡隋平陳置端州南越志曰石室山傍洞雲霧自生風煙有二石門以為仙之下都藤州十道志曰藤州感義郡秦屬南海郡二漢並屬蒼梧郡晉屬永平郡隋平陳置藤州煬帝初州廢置永平郡唐復為藤州郡國志曰俗以青石為刀劍如銅鐵法婦人亦為環玦代珠玉也夷人往往化為貙貙小虎也康州十道志曰康州晉康郡秦屬南海郡二漢屬蒼梧郡晉分置晉康郡宋齊因之隋平陳廢晉康併入信安郡今高要郡也唐復置康州封州十道志曰封州臨封郡土地所屬自秦巳上與康州同今州即漢蒼梧郡之廣信縣也梁置信郡兼置成州隋平陳廢郡改成州為封州瀧州十道志曰瀧州開陽郡瀧數江切土地所屬自漢巳上與康州同晉分端溪置龍鄉縣今州即其地南越志龍鄉縣屬廣熙郡梁分廣熙置建州又分建州之雙頭洞頭雙州即此是高州十道志曰高州高涼郡秦以前土地與晉康郡同二漢屬合浦郡吳置高涼郡晉因之梁置高州隋平陳郡廢而高州如故唐為高州南越志曰高涼本合浦縣也吳建安十六年衡毅錢博拒步騭於高安峽毅投水死博與其屬亡于高涼呂岱為刺史博既請降制以博為高涼都尉於是置郡焉義州十道志曰義州連城郡土地所屬秦巳上與潘州同漢置蒼梧郡今州即蒼梧郡之孟陵縣唐武德四年江表厎定於此置南義州貞觀, SBCK: 甘露}
