  - {type: variant, offset: 217, length: 1, content: 庚, SBCK: 殿之髙敞衆􅀐馳鶩無所觸建立旗旌不屈撓撓音女孝切爲宫室之麗至於此使其後世曽不得聚廬而託處焉又曰鄒陽諌吴王曰臣聞􅁗􅀝曲臺之宫應劭曰始皇帝所治處也􅀂漢家未央宫也懸衡天下服䖍曰􅀜西爲衡應劭曰衡平也如淳曰衡猶稱也言其縣法度於其上也師古曰此􅀃􅁗自以爲威力強固非論平法也下又言陳勝連從兵之據}
  - {type: variant, offset: 217, length: 1, content: 庚, krp: 殿之髙敞衆騎馳鶩無所觸建立旗旌不屈撓撓音女孝切爲宫室之麗至於此使其後世曽不得聚廬而託處焉又曰鄒陽諌吴王曰臣聞秦倚曲臺之宫應劭曰始皇帝所治處也若漢家未央宫也懸衡天下服䖍曰關西爲衡應劭曰衡平也如淳曰衡猶稱也言其縣法度於其上也師古曰此說秦自以爲威力強固非論平法也下又言陳勝連從兵之據}
