  - {type: variant, offset: 237, length: 140, content: 尉佗築朝臺以朝天子南越志曰朝臺下有趙佗城朝臺西三十里即崗帝江構越華館以送陸賈因稱朝亭十道志曰番禺北津今名廉平水韶州十道志曰韶州始興郡禹貢楊州之域春秋戰國皆楚地秦屬南海郡二漢屬桂陽郡吳置始興郡晉因之宋改為廣興齊復為始興隋平陳為韶州以韶石為名郡國志曰韶州科斗勞水間有韶石二狀若雙闕永和, SBCK: 後元}
  - {type: variant, offset: 237, length: 0, content: '', WYG: 石勒欲營鄴宫先是廷}
  - {type: variant, offset: 237, length: 140, content: 尉佗築朝臺以朝天子南越志曰朝臺下有趙佗城朝臺西三十里即崗帝江構越華館以送陸賈因稱朝亭十道志曰番禺北津今名廉平水韶州十道志曰韶州始興郡禹貢楊州之域春秋戰國皆楚地秦屬南海郡二漢屬桂陽郡吳置始興郡晉因之宋改為廣興齊復為始興隋平陳為韶州以韶石為名郡國志曰韶州科斗勞水間有韶石二狀若雙闕永和, krp: 後元}
  - {type: variant, offset: 238, length: 3, content: 佗築朝, WYG: 續咸諫止之及是霖雨中山西北暴水流漂巨木百餘萬根集于堂勒大悅謂公卿曰諸卿知否此非為災天意欲吾營都矣於是營之勒親授規模又曰劉曜命起酆明觀立西宫建凌霄樓於鎬池侍中喬豫和苞上疏曰臣聞人主之興作也上凖乾象下順人時是以衛文承亂亡之後宗廟流漂無所而猶上憲營室作為楚宫故能上興康叔武公之迹延九百之慶也今奉詔書將營酆明觀市道芻蕘咸非之曰一觀之費足以平涼州矣又奉勅㫖復欲擬阿房而建西宫模瓊樓而建凌霄以此功費亦可以吞吳蜀剪齊魏矣書奏大悅宋書曰少帝以石頭城為長樂宫東府城為未央宫齊書曰髙祖永明元年秋七月車駕幸青溪舊宫設金石樂在位者賦詩唐書曰東都平太宗入觀隋氏宫室嗟後主罄人力以逞奢侈薛收進曰峻宇雕墻殷辛以滅土階茅棟唐堯以昌秦帝増阿房之飾漢后罷露}
