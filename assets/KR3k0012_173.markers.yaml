  - {type: variant, offset: 4024, length: 1, content: 徵, SBCK: 王所居或祠祀所在或因事以置夜光宫棠梨宮扶茘宫見三輔莫圖桂宫見三輔故事鼎湖宫谷口宫魏略曰大􅁗國城中有五宫相去各十里宫室皆以水精爲梱食器亦然郡國誌曰金河府摩磷宫北二十里有石殿一飛橋向岸􅀞以古賢哲士太常卿蔣少遊制太和五年文明太后來幸釣得鯉魚一􅀟長三尺以黄金鏁穿鰓放於池中後皆長五尺沉泛相隨正光元年五月五日天清氣爽聞池内鏘鏘聲水中驚沸湏􅁷雷電晦􅁳有氣五道自池中屬於天乆}
