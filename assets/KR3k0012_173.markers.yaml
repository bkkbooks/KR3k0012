  - {type: variant, offset: 3982, length: 0, content: '', krp: 永平三年夏旱而大起北宫鍾離意詣闕免冠上䟽曰伏見陛下以天時小旱憂元元降避正殿躬自克責而皆密雲遂無大潤豈政有未得應天心者邪昔成湯曹旱以六事自責曰政不節邪使人疾邪宫室榮邪女謁盛邪苞苴行邪䜛夫昌邪竊見北宮作人失農時此所謂宫室榮也自古非患宫室小狹但患人不安寜冝且罷以應天心臣意以疋夫之才無有重能乆食重祿擢備近臣比受厚賜喜懼相半不勝愚戇征營罪當萬死征營不自安也帝䇿詔報曰湯引六事咎在一人其冠履勿謝比上天降旱宻雲數㑹朕戚然慚懼思獲善應故分布禱請闚候風雲北祈明堂南設雩塲明堂在洛陽城南言北祈者蓋時修雩塲在明堂之南也今又勑大匠上作諸宫減省不急庶消災譴詔因謝公卿百僚遂應時澍雨又曰東平王蒼薨元和三年東廵狩幸東平宫追念蒼謂其諸子曰思其人至其郷其處在其人亡因泣下沾襟魏志曰帝營作許昌宫楊阜諌曰堯尚茅茨而萬國安禹卑宫室而天下樂桀作琁室象廊紂爲傾宫鹿臺皆喪社稷也吴志曰後主二年六月起新宫於太𥘉之東制度尤廣二千石巳下皆自入山督攝伐木又壞諸地大開苑囿起土山作樓觀加飾珠玉製以竒名右臨硎左彎碕又開城北渠引後湖水激流入宫内廵遶堂殿窮極伎巧功費萬計又曰赤烏十年春二月適南宫三月改作太𥘉宫詔移武昌材瓦有司奏武昌宫作巳二十八年恐不堪用冝别更置帝曰大禹卑宫室爲美今軍事未巳所在多賦妨損農業且建業宫乃朕從京來作府舎耳材柱率細年月乆逺恐朽壞今武昌宫材木自可用繕之晉書曰尚書僕射謝安石以宫室杇壞啓作新宫帝權出居㑹稽王第二月始興功内外日役六千人安與大匠毛安之决意修定皆仰摸玄象體合辰極並新制置省閣堂宇名署時正構太極殿欠一梁有梅木流至石頭石頭津主啓聞取用之因畫花於梁上以表瑞焉又起朱雀重樓皆繡栭藻井門開三道上重名朱雀觀觀下門上有銅雀懸楣上刻木爲龍虎左右相對王隱晉書曰髙堂隆刻鄴宫屋材云後若干年當有天子居此宫惠帝止鄴宫治屋土剥更渥始見刻字計年正合時載記曰石勒欲營鄴宫先是廷尉續咸諌止之及是霖雨中山西北暴水流漂巨木百餘萬根集于堂陽勒大恱謂公卿曰諸卿知否此非爲災天意欲吾營都矣於是營之勒親定䂓模又曰劉曜命起酆明觀立西宫建凌霄樓於滈池侍中喬豫和苞上䟽曰臣聞人主之興作也上准乾坤俯順人時是以衛文承亂亡之後宗廟流漂無所而猶上憲營室作爲楚宫故能上興康叔武公之迹延九百之慶也今奉詔書將營酆明觀市道蒭蕘咸非之曰一觀之費足以平涼州矣又奉勑旨復欲擬阿房而建西宫模瓊樓而建陵霄以此功費亦可以吞吴蜀剪齊魏矣書奏曜大恱宋書曰少帝以石頭城爲長樂宫東府城爲未央宫齊書曰髙祖永明元年秋七月車駕幸青溪舊宫設金石樂在位者賦詩唐書曰東都平太宗入觀隋氏宫室嗟後主罄人力以逞奢侈薛収進曰峻宇雕牆殷辛以滅土階茅㨂唐堯以昌秦帝増阿房之飾漢后罷露臺之費故漢祚延而秦禍速自古如土崩瓦解取譏後代良以奢虐所致太宗恱其對又曰髙祖甞避暑于仁智宫又曰閻立徳受詔造翠微宫及玉華宫咸稱旨賞賜甚厚又曰太宗將幸九成宫姚思廉諌曰離宫遊幸秦皇漢武之事固非堯舜禹湯之所爲也言甚切至太宗納之西京雜記曰趙王如意年㓜未能親就外傅戚姬使舊趙内傅趙媪傳之號其室爲養徳宫又曰五柞宫有五柞樹皆連抱上枝覆䕃數十畝其西有青桐觀觀有三梧桐樹樹下石騏驎二枚刋其脇爲文字是秦始皇酈山墓上物也頭髙一丈三尺東邊者前左脚折折處有赤如血父老謂其有神皆含血而屬䈥焉帝王世紀曰紂作傾宫七年乃成大十里髙十丈又曰堯有貳宫漢武故事曰上起明光宫發燕趙羙女二千人充之取年十五巳上二十巳下滿四十者出嫁掖庭令惣其籍時有死出者隋捕之凡諸宫美人可有七八千建章未央長樂三宫皆輦道相屬懸棟飛閣不由徑路六韜曰殷君喜治宫室七十三所大宫百里宮中九市列仙傳曰鈎弋夫人齊人病六年右手拳望氣者云東方有貴人氣推而得之召到姿色甚偉帝披其手得一玉鈎而手尋展故名其宫爲鈎翼宫十洲記曰方丈山上有玄琉璃宫博物志曰夏桀之時爲長夜宫於深谷之中男女雜處三旬不岀聽政其後大風飄沙一夕填此宫谷鄴中記曰石虎在時自襄國至鄴二百里中四十里輙立一宫宫有一夫人侍婢數十黄門宿衛石虎下輦即止凡虎所起内外大小殿臺觀行宫四十四所項國志曰武帝遊五柞宫欲廣上林令譙隆諌曰堯舜至治廣徳不務苑囿帝初不恱後拜爲中郎墨子曰上古之人未知爲宫室就陵而居處下潤傷民故聖人作爲宫室宫室之法髙足以避潤濕中足以禦風寒上足以待霜雪牆髙足以別男女故以便生不以爲樂也今之爲宫室必厚歛百姓暴奪民財爲曲直之室青黄刻鏤之飾故國貧而人難訴也管子曰黄帝有合宫以聽政穆天子傳曰天子升于崑崙之丘以觀黄帝之宫越絶書曰美女宫周五百九十歩土城者句踐所習教美女西施鄭旦宮室方言曰吴有館娃之宫列子曰周穆王時西域國有化人來王執化人之祛騰而上天曁化人之宮構以金銀絡以珠玉出雲雨之上實爲清都紫微也}
  - {type: variant, offset: 3983, length: 3, content: 嘗字伯, SBCK: 子曰齊宣王見孟子於雪宫吕氏春秋曰武王勝殷靖箕子之宫也神異經曰東方有宫青石爲牆髙三仭左右闕髙百尺􅀞以五色門有銀牓以青石碧鏤題曰天地長男之宫西方有宫白石爲牆五色􅀇黄門有金牓而銀鏤題曰天地少女之宫西南有宫以金爲牆闕有金牓以銀鏤題曰天皇之宫南方有宫以赤石爲牆赤銅爲門闕有銀牓曰天地中女之宫北方有宫以黒石爲牆題曰天地中男之宫東南有宫以黄石爲牆以黄牓碧鏤題曰天地少男之宫西南有宫以黄銅爲牆題曰地皇之宫十洲記曰青丘山上有紫宫天真仙女多遊於此又曰方丈山有琉璃宫紀年曰穆王所居鄭宫春宫􅀃苑曰楚使使聘齊齊王享之梧宫使者曰大哉梧乎王曰江海之魚吞舟况大國之樹三輔故事曰桂宫}
