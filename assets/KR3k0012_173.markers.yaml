  - {type: variant, offset: 158, length: 1, content: 南, SBCK: 所常􅀍服冠見上上許之充爲人魁岸容貌甚壯帝望見而異之謂左右曰燕趙固多竒士旣至前問以當丗政事上恱之又曰武帝六年冬行幸囬中春作首山宫又曰上幸不其祠神人于交門宫􅀂有向坐拜者作交門之歌又曰幸河東之明年正月鳯皇集祋祤於所集處得玉寳起歩壽宫又曰栢梁災越巫勇之廼曰越俗有火災又起屋必以大用勝服之於是起建章宫爲千門萬户又曰梁孝王吴楚破梁最親有功又爲大國居天下膏􅃾北界泰山西至髙陽四十餘城多大縣孝王太后少子愛之賞賜不可勝道於是孝王築東苑}
  - {type: page-break, offset: 158, content: '', id: KR3k0012_SBCK_173-3a}
  - {type: variant, offset: 158, length: 1, content: 南, WYG: 所常被服冠見上上許之充為人魁岸容貎甚壯帝望見而異之謂左右曰燕趙固多竒士既至問以當世政事上悅之又曰武帝六年冬行幸囘中春作首山宫又曰上幸不其祠神人于交門宫若有向坐拜者作交門之歌又曰幸河東之明年正月鳳凰集祋祤於所集處得玉寶起步壽宫又曰柏梁災越巫勇之迺曰粤俗有火災復起屋必以大用勝服之於是起建章宫為千門萬户又曰梁孝王吳楚破梁最親有功又為大國居天下膏腴地北界㤗山西至髙陽四十餘城多大縣孝王太后少子愛之賞賜不可勝道於是孝王築東苑}
