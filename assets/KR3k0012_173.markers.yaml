  - {type: variant, offset: 243, length: 5, content: 朝天子南越, WYG: 奢所至太宗悅其對又曰髙宗嘗避暑於仁智宫又曰閻立德受詔造翠微玉華宫咸稱㫖賞賜甚厚又曰太宗將幸九成宫姚思廉諫曰離宫遊幸秦皇漢武之事固非堯舜禹湯之所為也言甚切至太宗納之西京雜記曰趙王如意年幼未能親就外傅戚姬使舊趙内傳趙媪傅之號其室為養德宫又曰五柞宫有五柞樹皆連抱上枝覆䕃數十畝其西有青桐觀觀有三梧桐樹樹下石麒麟二刋其脇為文字是秦始皇驪山墓上物也頭髙一丈三尺東邊者前左脚折處有赤如血父老謂其有神皆含血而屬筋焉帝王世紀曰紂作傾宫七年乃成大十里髙千丈又曰堯有貳宫撝宫漢武故事曰上起明光宫發燕趙美女二千人充之取年十五已上二十已下滿四十者出嫁掖庭令總其籍時有死出者隨補之凡諸宫美人可取七八千建章未央長樂三宫皆輦道相屬懸棟飛閣不由徑路六韜曰殷君喜治宫室七十三所大宫百里宫中九市列仙傳曰鉤弋夫人齊人病六年右手拳望氣者云東方有貴人氣推而得之召到姿色甚美偉帝披其手得一玉鉤而手尋展故名其宫為鉤弋宫十洲記曰方丈山有𤣥琉璃宫博物}
