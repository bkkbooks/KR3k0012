  - {type: variant, offset: 160, length: 0, content: '', SBCK: 三百餘里廣睢陽城七十里大治宫室爲􅃨道宫連屬於平臺四十餘里如淳曰在梁東北離宫所在晉灼曰或􅀃在城中東北角得賜天子旌旗從千乗萬􅀐出警入蹕擬於天子又曰孝武作建章宫爲千門萬户}
