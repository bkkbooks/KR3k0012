  - {type: variant, offset: 67, length: 0, content: '', WYG: 鼓鐘于宫聲聞于外易曰上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨左傳曰襄公作楚宫穆叔曰泰誓云民之所欲天必從之君欲楚也夫故作其宫若不復適楚必死是宫也六月公薨于楚宫又曰晉成虒祁之宫又晉銅鍉之宫數里論語曰禹卑宫室而盡力乎溝洫禹吾無閒然矣史記曰騶子之燕昭王擁彗先驅請列弟子而受業築碣石宫親往師之又曰秦始皇造阿房宫徵發天下工匠又曰秦始皇所居之宫有祈年宫長信宫梁山宫又曰戎王使由余於秦秦繆公示以宫室積聚余曰使鬼為之則勞神矣使人為之則苦民矣又曰項羽屠咸陽焚其宫室三月火不滅又曰盧生說始皇曰人主為微行以辟惡鬼惡鬼辟真人至人主所居而人臣知之則害於神願上所居宫無令人知然後不死之藥殆可得也乃命咸陽之旁三百里之内宫觀二百七十複道甬道相連帷帳美人充之所幸言其處者死始皇幸梁山宫從山上見丞相車騎衆弗善也中人以告丞相後損車騎始皇怒曰此中人泄吾語捕時在旁者斬之自是莫知行之所在決事悉於咸陽宫又曰始皇二十七年作長信宫於渭}
