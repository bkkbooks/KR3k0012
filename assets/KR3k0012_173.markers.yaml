  - {type: variant, offset: 4608, length: 180, content: 道志曰儋州昌化郡土地所屬與朱崖同漢元鼎六年定越地置儋耳郡唐武德四年置儋州漢書張晏注曰儋耳其俗鏤其頰皮上連耳其分為數支狀似雞腸因名焉山海經海內南經曰有離耳郭顥純注曰鎪其耳分令下垂為飾即儋耳也振州方輿志曰振州延德郡土地與朱崖郡同隋置臨振郡唐置振州瓊州方輿志曰瓊州瓊山郡土地與朱崖郡同唐貞觀六年割崖州置瓊州萬安州方輿志曰萬安州萬安郡土地與朱崖郡同唐置萬安州或為萬安郡, SBCK: 三}
