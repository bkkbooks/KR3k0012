  - {type: variant, offset: 178, length: 3, content: 乃流血, WYG: 中有蓬萊方丈瀛洲壺梁象海中神僊南有玉堂璧門大鳥之屬立明臺井幹樓度髙五十餘丈輦道相屬焉又曰秦起咸陽而西至雍離宫三百師古曰此言離宫者皆謂於别處置之非常所居也鐘鼔帷帳不移而具又為阿房之殿殿髙}
  - {type: variant, offset: 178, length: 9, content: 乃流血數日以為鑿龍, krp: 中有蓬萊方丈瀛洲壷梁象海中神山南有玉堂壁門大鳥}
  - {type: variant, offset: 182, length: 1, content: 日, WYG: 十仞師古曰阿房者言殿之四阿皆為房也一説大陵曰阿言其殿髙若於阿上為房也房字或作旁說云始皇作此殿初未有名以其去咸陽近且號阿旁阿近也八尺曰仞東西五里南北千步從車羅騎四馬馳騖旌旗不橈師古曰橈屈也言庭之廣大殿之髙敞衆騎馳騖無所廹觸立旌旗不屈橈橈音女孝反為宫室之麗至於此使其後世曽不得聚廬而託處焉又曰鄒陽諫吳王曰臣聞秦倚曲臺之宫應劭曰始皇帝所治處也若漢家未央宫也懸衡天下服䖍曰闗西為衡應劭曰衡平也如淳曰衡猶秤也言其懸法度於上也師古曰此說秦自}
