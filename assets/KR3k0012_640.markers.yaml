  - {type: variant, offset: 333, length: 1, content: 凡, SBCK: 寒㓪字伯竒永平中以謁者守侍御史與三府􅁺共按楚獄顔忠王平辭及隧郷侯耿建曲成侯劉建等辭未甞與忠平相見是時顯宗怒甚吏皆惶恐}
  - {type: variant, offset: 333, length: 6, content: 凡諸侯之獄訟, krp: 寒㓪字伯竒永平中}
  - {type: variant, offset: 335, length: 0, content: '', SBCK: 所連及率一切䧟入無敢以情恕者朗心傷其􅁈試以建等物色獨問忠平而二人錯愕不能對㓪知其詐乃上言建等無姦專爲忠平所誣疑天下無辜類多如此帝曰即如是四}
  - {type: variant, offset: 336, length: 0, content: '', SBCK: 無事何不早奏乆繫至今耶㓪曰臣恐海内別有發其姦者故未敢時上怒罵曰吏持兩端促提下左右方引去㓪曰願一言而死小臣不敢欺欲助國耳臣見拷囚者咸共言妖惡大故臣子所冝同嫉今出}
  - {type: variant, offset: 337, length: 0, content: '', SBCK: 不如入之可無後責是以考一連十考十連百又公卿朝㑹陛下問以得失皆言舊制大罪禍及九族陛下大恩纔上於身天下幸甚及其歸舎口雖不言而仰屋􅀼歎臣今所陳誠死無悔帝意解詔遣㓪出後二日車駕幸洛陽}
