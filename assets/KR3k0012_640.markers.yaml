  - {type: variant, offset: 2114, length: 3, content: 祥初在, SBCK: 下獄無敢繩者仲文至郡窮治遂竟其獄蜀中爲之語曰明斷無􅀟有于公不避強禦有次武未幾徴爲御正下大夫又曰梁敬眞大業之丗爲大理}
  - {type: variant, offset: 2114, length: 1, content: 祥, WYG: 下獄無敢繩者仲文至郡窮治遂竟其獄蜀中為之語曰明斷無雙有于公不避强禦有次武未㡬徴為御史大夫又曰梁敬真大業之世為大理司直時帝欲成光禄大夫魚俱羅之罪令敬真治其獄遂希㫖陥之極刑未㡬敬真有疾見俱羅為之厲數日而死唐書曰貞觀}
  - {type: page-break, offset: 2114, content: '', id: KR3k0012_WYG_640-9b, image: WYG0898/WYG0898-0714d.png}
  - {type: variant, offset: 2114, length: 3, content: 祥初在, krp: 下獄無敢繩者仲文至郡窮治遂竟其獄蜀中爲之語曰明斷無雙有于公不避強禦有次武未幾徴爲御正下大夫又曰梁敬眞大業之丗爲大理}
  - {type: variant, offset: 2116, length: 1, content: 在, WYG: 太宗謂侍臣曰死者不可再生用法務従寛恕古人云賣棺者􅂅嵗之疫非憎于人利棺之售耳今有}
  - {type: variant, offset: 2118, length: 6, content: 馬失白璧還兵, SBCK: 直時帝欲成光禄大夫魚俱羅之罪令敬真治其獄遂希旨陷之極刑未幾敬真有疾見俱羅爲之厲數日而死唐書曰貞觀􅀄太宗謂侍臣曰死者不可再生用法務從寛恕古人云賣棺者願歳之病非憎於人利棺之售耳今司覆一獄必求深刻欲成其考課作何道理令得平允侍中王珪曰但任公正善人爲法官􅀂斷獄允當則増祑賜金如此則姦僞息矣太宗曰古者斷獄必訊於三槐九􅁄之官今三公九卿是也今後大辟罪結正更取公卿議之如是四年斷死刑二十九人天下幾致刑措矣又曰吏部尚書長孫無忌甞􅀍召不解佩刀入東上閣門待罪僕射封德彛議云􅁥門校尉不之覺罪當死無忌誤帶刀入罰銅二十斤從之大理卿帶胄執奏曰校尉不覺與無忌帶入同爲誤耳臣子之於尊極不得稱悞准律云供御湯}
