  - {type: variant, offset: 2091, length: 0, content: '', SBCK: 統外移之刺史有疑亦歸臺獄必令死者不怨坐者無恨又曰沛郡相縣唐賜徃比村彭家飲酒還因得病吐蠱䖝二十餘物賜妻張從賜臨終言死後親刳腹視五藏悉縻碎以張忍行刳剖賜子副又不禁止論妻傷夫五歳刑子不孝父母弃市並非科例三公郎劉􅎰議賜妻痛徃遵言兒識謝及理孝事源存心非忍害謂冝哀矜頋覬之議以爲妻子而行忍酷不冝曲通小情謂副爲不孝張同不道詔如覬之議隋書曰裴藴授御史夫夫與裴矩虞丗基叅掌機宻善候伺人主微意􅀂欲罪者則曲法順情假成其罪所欲宥者則附從輕典因而釋之是後大小之獄皆以付藴憲部大理莫敢與奪必禀進止然後决㫁藴亦機辯所論法理言􅀂懸河或重或輕皆由其口剖析明敏時人不能致詰又曰裴政爲少司憲用法寛}
  - {type: page-break, offset: 2091, content: '', id: KR3k0012_SBCK_640-4b}
  - {type: variant, offset: 2091, length: 0, content: '', WYG: 統外移之刺史有疑亦歸臺獄必令死者不怨生者無恨又曰沛郡相縣唐賜往北村彭家飲酒還因得病吐蠱虫二十餘枚臨死語妻張死後刳腹出病後張手自破視五蔵悉糜碎以張忍行割刳賜子副又不禁止論妻傷夫五嵗刑子不孝父母棄市竝非科例三公郎劉勰議賜妻痛往遵言兒識謝及理考事原心非存忍害謂宜哀矜顧顗之議以為妻子而行忍酷不宜曲通小情謂副為不孝張同不道詔如顗之議隋書曰裴藴授御史大夫與裴矩虞世基叅掌機宻善候伺人主微意若欲罪者則曲法順情鍜成其罪所欲宥者則附從輕典因而釋之是後小大之獄皆以付藴憲部大理莫敢與奪必禀進止然後决斷藴亦機辯所論法理言若懸河或輕重皆由其口剖析明敏時人不能致詰又曰裴政為少司憲用法寛}
