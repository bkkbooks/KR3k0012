  - {type: punctuation, offset: 85, content: 《, id: KR3k0012_CHANT_640-bkkpn36}
  - {type: variant, offset: 85, length: 4, content: 行露召伯, SBCK: 于定國父于公决獄平羅文法者于公所决皆不恨郡中爲立生祠東海有孝婦少寡無子養姑甚謹姑告隣人曰孝婦養我勤苦哀其無子守寡我老乆累丁壯柰何遂自死姑女告吏婦殺我母吏捕孝婦孝婦自誣服于公以爲不殺争之弗能乃抱其獄具􅂘於府上太守竟殺婦郡中枯旱三年後太守至卜筮其故于公曰咎其殺孝婦太守殺牛􅀕孝婦墓天乃大雨後于公令髙大門閭容駟馬髙蓋車我治獄多隂德子孫必有興者至定國爲丞相于定國爲廷尉人自以不􅁈張釋之爲廷尉天下無􅁈人又曰班固云今之}
  - {type: page-break, offset: 85, content: '', id: KR3k0012_SBCK_640-2a}
  - {type: variant, offset: 85, length: 0, content: '', WYG: 張釋之為廷尉頃之上}
  - {type: variant, offset: 85, length: 4, content: 行露召伯, krp: 于定國父于公决獄平羅文法者于公所决皆不恨郡中爲立生祠東海有孝婦少寡無子養姑甚謹姑告隣人曰孝婦養我勤苦哀其無子守寡我老乆累丁壯柰何遂自死姑女告吏婦殺我母吏捕孝婦孝婦自誣服于公以爲不殺争之弗能乃抱其獄具哭於府上太守竟殺婦郡中枯旱三年後太守至卜筮其故于公曰咎其殺孝婦太守殺牛祭孝婦墓天乃大雨後于公令髙大門閭容駟馬髙蓋車我治獄多隂德子孫必有興者至定國爲丞相于定國爲廷尉人自以不冤張釋之爲廷尉天下無冤人又曰班固云今之}
  - {type: variant, offset: 86, length: 3, content: 露召伯, WYG: 出中渭橋有一人從橋下走乗輿馬驚於是使騎捕之屬廷尉釋之治問曰縣人来聞蹕匿橋下乆以為行過既出見車騎即走耳釋之奏此人犯蹕當罰金上怒曰此人親驚吾馬馬頼和柔令他馬固不敗傷我乎而廷尉云罰金釋之曰法者天子所與天下公共也今法如是更重之是法不信於民也且方其時上使使誅之則已今已下廷尉廷尉天下之平也一傾天下用法皆為之輕重民安所措其手足惟陛下察之帝良乆曰廷尉是也又曰于定國父于公斷决平羅文法者于公所决皆不恨郡中為生立祠東海有孝婦少寡無子養姑甚謹姑告隣人曰孝婦養我勤苦哀其無子守寡我老乆累壮丁奈何自經死姑女告吏婦殺我母吏捕孝婦孝婦自誣服于公以為不殺争之弗䏻乃抱其具獄哭于府上太守竟殺婦郡中枯旱三年後太守至卜筮其故于公咎其殺孝婦太守殺牛祭孝婦墓天乃大雨後于公令高大門閭容駟馬高蓋曰我治獄多隂徳子孫必有興者至定國為丞相朝廷稱之曰張釋之為廷尉天下無寃民于定國為廷尉民自以不寃又曰班固云今之}
