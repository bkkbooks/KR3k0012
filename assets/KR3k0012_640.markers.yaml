  - {type: variant, offset: 1780, length: 302, content: 混奇之以女妻之矣又曰符融仕符堅為司隸校尉京兆人董豐遊學三年而返宿妻家妻為賊所殺妻兄疑豐殺之送豐有司豐不堪楚掠自誣引殺妻融察而疑之問豐曰汝行往還頗有怪異及卜筮否豐曰初將發夜嘗夢乘馬南渡水返而北渡水馬停水中鞭策不去俯而視之見兩日在於水下馬左白而濕右黑而燥寤而心悸竊以為不祥問筮者筮者曰憂獄訟遠三枕避三沐既至妻為具沐夜授豐枕豐記筮者之言皆不從之妻乃自沐枕枕而寢融曰吾知之矣馬左而濕濕水也左水右馬馮字兩日昌字也其馮昌殺之乃獲昌詰之具首服本與其妻謀董豐期以新沐枕枕為驗乃悞中婦人也宋書曰傅琰為山陰令有賣針賣糖嫗爭絲各言己者詣琰琰掛而輕鞭之有鐵屑乃罰賣糖者又有二老爭鷄問何食一云食粟一云食豆剖之見粟罰言豆者人畏如神明, SBCK: ''}
