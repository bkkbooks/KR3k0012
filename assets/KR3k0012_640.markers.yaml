  - {type: variant, offset: 456, length: 506, content: 出言不直則煩二曰色聽觀其顏色不直則赧然三曰氣聽觀其氣息不直則喘四曰耳聽觀其聽聆不直則惑五曰目聽觀其眸子視不直則眊然又曰掌都家聽其獄訟之辭辨其死刑之罪而要之三月而上獄訟于國司寇聽其成于朝群士司刑皆在各麗其法以議獄訟成平也獄訟成士師受中書其刑殺之成與其聽獄訟者又曰掌三剌三宥三赦之法以贊司寇聽獄訟一剌曰訊群臣再剌曰訊群吏三剌曰訊萬民訊言也一宥曰不識再宥曰過失三宥曰遺忘不識謂愚民無所識則宥之過失若今時律過失殺人不坐死也玄謂識當也若令仇讎當報甲見乙識以為甲而殺之者過失若舉刃欲斫伐而誤中人者遣忘若間惟薄忌有在焉者而以兵矢投射也禮曰分爭辨訟非禮不決又曰司寇正刑明辟以聽獄訟司寇秋官卿掌刑者辟罪也必三剌以求民情斷其獄訟之中一曰訊群臣二曰訊群吏三曰訊萬民有旨無簡不聽簡誠也有其意無其誠者不論以為罪附從輕附施刑也求出之使從輕赦從重雖是罪可重猶赦之凡聽五刑之訟必厚父子之親立君臣之義以權之權平也意論輕重之序慎測淺深之量以別之意思念也淺深謂俱有罪本心有善惡悉其聰明致其忠愛以盡之盡其情也傳曰王叔陳生與伯輿爭政二子王卿士王右伯輿右助也王叔陳生怒而出奔晉侯使士丐平王室王叔與伯輿訟焉爭曲直王叔之宰與伯輿之大夫瑕禽坐獄於王庭士丐聽之范宣, SBCK: ''}
