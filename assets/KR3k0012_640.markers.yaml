  - {type: 'tls:seg', offset: 2175, content: '', id: KR3k0012_CHANT_640-19a.4}
  - {type: variant, offset: 2175, length: 0, content: '', SBCK: 竇孝諶妻龐氏爲奴誣告云夜解祈福則天令給事中薛季昶鞠之季昶斷錬成其罪龐氏坐斬侍御史徐有功執論龐氏罪不至死季昶又劾有功黨惡逆法司結刑有功當棄市方視事令史垂泣以告有功曰豈吾獨死諸人長不死耶乃徐起而歸則天覽法司所劾召有功誥之曰卿此斷獄失出何多耶對曰失岀臣下之小過好生聖人之大德願陛下捨小過弘大德則天下幸甚則天黙然龐氏竟减罪流于嶺表又曰杜景佺爲司刑丞天授年與徐有功來俊臣侯思正專理制獄時人稱云遇徐杜者必生遇來侯者必死又曰李勉爲膳部貟外時関東獻俘百人詔並處斬囚有仰天歎者勉偶過問之對曰某􅀍脅制守官非逆者勉哀而上言曰元惡未殄遭􅀧汚者半天下皆欲澡心歸化􅀂盡殺之是駈天下以資兇逆也肅宗遽令奔􅀐宥釋由是歸化日至又曰顔真卿爲􅁥察御史五原有􅁈獄乆不决眞卿至辨之天方旱獄决乃雨郡人呼之爲御史雨又曰寳曆中京兆人有姑以小過鞭婦至死者府上其獄刑部郎中竇叅斷合償死刑部尚書栁公綽議曰尊歐卑非􅋐且其子在以妻而戮其母非教也竟從公綽之議得减死又曰竇叅爲奉}
  - {type: page-break, offset: 2175, content: '', id: KR3k0012_SBCK_640-6b}
  - {type: variant, offset: 2175, length: 0, content: '', WYG: 徐有功執論龎氏罪不至死季昶又劾有功黨援惡逆法司結刑當棄市有功方視事令史垂泣以告有功曰豈吾獨死諸人長不死耶乃徐起而出則天覽法司所劾召有功詰之曰卿比斷獄失出何多耶對曰失出臣下之小過好生聖人之大徳願陛下捨小過𢎞大徳則天下幸甚則天黙然龎氏竟减罪流于嶺表又曰杜景徳為司刑丞天授中與徐有功来俊臣侯思正專理刑獄時人稱云遇徐杜者必生遇来侯者必死又曰李勉為膳部員外郎時闗東獻俘百人詔並處斬囚有仰天嘆者勉偶過問之對曰某被脅制守官非逆者勉上言曰无惡未殄遭㸃汚者半天下皆欲澡心歸化若盡殺之是驅天下以資兇逆也肅宗遽令奔騎宥釋由是歸化日至又曰顔真卿為監察御史五原有寃獄乆不决真卿至辨之天方旱獄决乃雨郡人呼之為御史雨又曰寳厯中京兆人有姑以小過鞭婦至死者府上其獄刑部郎中竇叅斷合償死刑部尚書栁公綽議曰尊毆卑非鬬且其子在以妻而戮其母非教也竟從公綽之議得减死又曰竇叅為奉}
