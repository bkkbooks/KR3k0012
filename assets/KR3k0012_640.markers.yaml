  - {type: variant, offset: 2118, length: 6, content: 馬失白璧還兵, WYG: 覆一獄必求深刻欲成其考課作何道理令得平允侍中王珪曰俱任公正善人為法官若斷獄允當則増秩賜金如此則姦偽息矣太宗曰古者斷獄必訊於三槐九棘之官今三公九卿是也今後大辟罪結正法取公卿論之如是四年斷死刑二十九人天下㡬致刑措矣又曰吏部尚書長孫無忌嘗被召不解佩刀入東上閣門待罪僕射封徳彛議云監門校尉不之覺罪當死無忌誤帯刀入罰銅二十斤従之大理卿戴胄執奏曰校尉不覺與無忌帯入同為誤耳臣子之於尊極不得稱誤准律云供御湯}
