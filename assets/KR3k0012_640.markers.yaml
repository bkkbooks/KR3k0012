  - {type: variant, offset: 90, length: 1, content: 訟, SBCK: 獄者求所以殺之古之聽獄者求所以生之與其殺不辜寕失有罪今之獄吏上下相驅以刻爲明深者􅀗功名平者多後患諺曰鬻棺者欲歳之疫非憎人欲殺之利在於人死也今治獄吏欲䧟害人亦猶此矣續漢書曰郭躬字仲孫頴川人辟公府以明法律特預朝議時有兄弟共以繩絞殺人各持一端辜不可分中常侍孫章傳詔命兄不教導弟報兄重弟減死章誤言兩報重獄巳斷尚書奏矯制當斬上問躬躬曰當罰金上曰矯殺人如何罰金躬曰法令有故有誤章不故指傳命誤即報重是故爲無所放}
