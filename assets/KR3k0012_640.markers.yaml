  - {type: variant, offset: 2086, length: 3, content: 辛祥為, SBCK: 眞君中以獄訟留滯始令中書以中經義斷諸疑事髙允據律評刑三十餘載内外稱平允獄者民之命也常嘆曰臯陶至德也其後英蓼先亡劉項之際英布黥而王經丗雖乆猶有刑餘之釁况凢人能無咎乎宋書曰謝㽵爲都官尚書奏改定刑獄曰舊官長竟囚畢郡遣督郵案驗仍就施刑督郵賤吏非能異於官長雖有案驗之名而無研窮之實愚謂此制冝革自今入重之囚縣考正畢以事言郡}
