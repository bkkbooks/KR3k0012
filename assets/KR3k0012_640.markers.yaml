  - {type: variant, offset: 2092, length: 6, content: 北府司馬會剌, SBCK: 無有􅁈濫囚徒犯極刑者乃許其妻子入獄就之至冬將行决皆曰裴大夫致我於死死無所恨其處法詳平如此又曰郎茂衛國令時有繫囚二百茂親自究審數日釋免百餘人歷年辭訟不詣州省魏州刺}
