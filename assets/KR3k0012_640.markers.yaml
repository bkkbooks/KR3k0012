  - {type: variant, offset: 436, length: 142, content: 十日乃斷之以五聲聽獄訟求民情一曰辭聽觀其出言不直則煩二曰色聽觀其顏色不直則赧然三曰氣聽觀其氣息不直則喘四曰耳聽觀其聽聆不直則惑五曰目聽觀其眸子視不直則眊然又曰掌都家聽其獄訟之辭辨其死刑之罪而要之三月而上獄訟于國司寇聽其成于朝群士司刑皆在各麗其法以議獄訟成平也獄訟成士師受中書其刑殺之成, krp: 守侍御史}
