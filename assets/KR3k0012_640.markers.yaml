  - {type: variant, offset: 3, length: 1, content: 五, SBCK: 六}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 六决獄易曰澤上有風中孚君子議獄緩死信發於中雖過可亮傳曰晉邢侯與雍子争鄐田久而無成士景伯如楚士景伯晉理官叔魚攝理攝代景伯韓宣子命斷舊獄罪在雍子雍子納其女於叔魚叔魚蔽斷也罪邢侯邢侯怒殺叔魚與雍子於朝宣子問其罪於叔向叔向曰三人同罪施生戮死可也雍子自知其罪而賂以買直鮒也鬻獄邢侯専殺其罪一也己惡而掠美為昬掠取也昏亂也貪以敗官為墨墨不㓗之稱殺人不忌為賊夏書曰昏墨賊殺臯陶之刑也請從之乃施邢侯而尸雍子與叔魚於市漢書曰高帝詔曰獄之疑者吏或不敢决有罪者久而不論無罪者久繋不决自今已後縣道官獄疑者各讞所属二千石官二千石官以其罪名當報之當謂處斷也讞平議也所不能决者皆移廷尉亦當報之廷尉所不能决謹具為奏附所當比律令以聞又曰景帝詔曰獄重事也人有智愚官有上下獄疑者讞有司有司所不能决移廷尉有令讞而後不當讞者不為失假令讞訖其理不當所讞之人不為罪失欲令理獄者務先寛自此之後獄刑益詳近於}
