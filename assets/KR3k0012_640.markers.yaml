  - {type: variant, offset: 2345, length: 1065, content: 此人兄弟明日相率謝罪州內欽服之又曰唐和為內都大官評決獄訟不加捶楚款獲實者甚多世以是稱之又曰司馬悅字慶宗歷位豫州剌史時有汝南上蔡董毛奴者齎錢五千死於道路郡縣疑人張堤為劫又堤家得錢五千堤懼掠自誣言殺至州悅觀色疑其不實引見毛奴兄靈之謂曰殺人取錢當時狼狽應有所遣得何物靈之曰唯得一刀削悅取視之曰此非里巷所為也乃召州內刀匠示之屬有郭門者前曰此刀削門手所作去歲賣與郭人董及祖悅收及祖詰之及祖款引靈之又於及祖身上得毛奴所著皂𥜗及祖伏法悅察獄多此類也後周書曰建德二年冬帝聽訟於正武殿自旦及夜繼之以燭又曰柳慶為雍州別駕有賈人持金二十斤詣京師交易寄人停止每欲出行常自執管鑰無何緘閉不異而失之謂是主人所竊郡縣訊問主人遂自誣服慶聞而歎之乃召問賈人曰卿鑰恒置何處對曰恒自帶之慶曰頗與人同宿乎與同飲乎曰日者曾與一沙門再度酣宴醉而晝寢慶曰主人以痛自誣非盜也彼沙門乃真盜耳即遣吏逮捕沙門乃懷金逃匿後捕得盡獲所失之金又曰柳慶有胡家被劫郡縣按察莫知賊所鄰近被囚繫者甚多慶以賊徒既眾似是烏合既非舊交必相疑阻可以詐求之乃作匿名書多牓官門曰我等共劫胡家徒侶混雜終恐泄露今欲首懼不免誅若聽先首免罪便欲來告慶乃復施免罪之牓居二日廣陽王欣家奴面縛自告牓下因此推窮盡獲黨與慶守正明察每歎曰昔于公斷獄無私闢高門可以待封儻斯言有驗吾斯庶幾乎又曰蘇綽為六條詔書奏施行之其一先修心其二敦教化其三盡地利其四擢賢良其五卹獄訟其六均賦役文帝甚重之常置諸座右隋書曰韋鼎為光州剌史有人客遊通主人家之妾及其還去妾盜物於夜逃亡尋於草中為人所殺主家知與妾通因告客殺之縣司鞠問具得姦狀因斷客辜獄成上於鼎覽之曰此客實姦而非殺也乃某寺僧詃妾盜物令奴殺之贓在某處即放此客遣掩僧并獲贓物自是部內肅然咸稱其有神又曰辛公義為牟州剌史下車先至獄中因露坐牢側親自驗問十餘日間決斷咸盡方還大廳受領詞訟皆不立文案遣當直佐寮一人側坐誶問事若不盡應須禁者公義即宿廳事終不還閤人或諫之曰此事有程使君何自苦也荅曰剌史無德可以導人尚令百姓係於囹圄豈有禁人在獄而心自安乎罪人聞之咸自款服後有欲諍訟者其鄉閭父老遽相曉曰此蓋小事何忍勤勞使君訟者多兩讓而止尚書大傳曰聽獄之術大治有三治必寬寬之術歸於察察之術歸於義察猶審也是故聽而不寬是亂也寬而不察是慢也古之聽獄者言不越辭辭不越情情不越義是故聽民之術怒必思兼怒小罪勿兼怒責也責因之罪必思義謂思其辭思其主思義重大罪求可以出之者也又曰孔子如衛人謂曰公甫不能聽獄公甫魯大夫子曰不知公甫之不能聽獄也荅而反之公甫之聽獄也有罪者懼無罪者恥民近禮矣春秋元命包曰樹棘槐聽訟於其下棘赤心有剌言治人者原其心不失赤實事, SBCK: 設}
