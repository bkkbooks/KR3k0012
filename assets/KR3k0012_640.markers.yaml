  - {type: variant, offset: 3469, length: 625, content: 血者乃執之會稽典錄曰郡署鍾離意北部督郵烏程男子孫常常弟烈分居各得田半頃烈死歲飢常稍以米粟給烈妻子輒追計直作券沒取其田烈兒長大訟常掾史議皆曰烈孫兒遭餓賴常升合長大成人而更爭訟非順孫也意獨曰常身為遺父當撫孤弱是人道正義稍以升合券取其田懷挾姦路貪利忘義烈妻子雖以田與常困迫之至非私義也請常田俾烈妻子於是眾議無以奪意之理又曰謝夷吾字堯卿山陰人也為荊州剌史行部到南魯縣遇孝章皇帝巡狩幸魯陽上未常見剌史班秩有詔勑夷吾入傳錄見囚徒誡長吏勿廢舊儀上林西廂南面夷吾處東分帷以其中夷吾省錄囚徒有亭長姦部民者縣言和姦上意以為吏姦民何得言和且觀剌夫決當云何頃夷吾呵之曰亭長詔書朱幘之吏職在禁姦今為惡之端何得言和切讓三老孝悌免長罪其所決正一縣三百餘事與上合章帝歎曰使諸州剌史盡如此者朕不憂天下特遷鉅鹿太守臨發陛見賜車馬劍帶勑之曰鉅鹿劇郡舊為難治以君有撥煩之才故特授任無毀前勞張斐律序曰情者心也心戚則動情動於中而形於言暢於四支發於事業是故姦人則心愧而面赤內怖而色奪賈誼新書曰梁嘗有疑獄群臣半以不當半以為當罪雖然王亦疑梁王曰陶朱公賢以而問曰梁有疑獄吏半以為不當半以為當奈何朱公曰臣鄙民也不知家有二白璧其澤相如也然有其價一者千金一者五百金王曰徑與色澤相如也一者千金一者五百金何也朱曰側而翫之一者厚倍是以千金梁王曰善故疑獄則從去賞疑則從與梁國大悅新序同也淮南子曰越王決獄不當援刀自割而戰士畢死感於恩也又曰秦始皇晝決獄夜理書說苑曰邵公述職當桑蚕時不欲變民事故不入邑中舍乎甘棠之下而聽斷焉, SBCK: 翁司}
