  - {type: variant, offset: 2169, length: 3, content: 崇為揚, SBCK: 曰知天授中遷司刑丞時用法嚴急日知獨寛平無􅁈濫甞免一死囚少卿胡元禮斷請殺之與日知徃復至于數四元禮怒曰元禮不離刑曹此囚終無生禮荅曰日知不離刑曹此囚終無死法竟以兩狀列上日知果直又曰潤}
  - {type: page-break, offset: 2169, content: '', id: KR3k0012_SBCK_640-6a}
  - {type: variant, offset: 2169, length: 1, content: 崇, WYG: 日知天授中遷司刑丞時用法嚴急日知獨寛平無寃濫嘗免一死囚少卿索元禮斷請殺之與日知往復至於數四元禮怒曰元禮不離刑曺此囚終無生理答曰日知不離刑曺此囚終無死法竟以兩状列上日知果直又曰潤州刺史竇孝諶妻龎氏}
  - {type: variant, offset: 2169, length: 3, content: 崇為揚, krp: 曰知天授中遷司刑丞時用法嚴急日知獨寛平無冤濫甞免一死囚少卿胡元禮斷請殺之與日知徃復至于數四元禮怒曰元禮不離刑曹此囚終無生禮荅曰日知不離刑曹此囚終無死法竟以兩狀列上日知果直又曰潤}
  - {type: variant, offset: 2171, length: 3, content: 揚州剌, WYG: 奴誣告云夜觧祈福則天令給事中薛季昶鞫之季昶斷錬成其罪龎氏坐斬侍御}
