  - {type: variant, offset: 111, length: 5, content: 知節也毛詩, WYG: 下車太子不悦}
  - {type: variant, offset: 112, length: 1, content: 節, SBCK: 復所以爲治於是奏送謨廷尉以正刑書謨懼率子弟素服詣闕稽顙到廷尉待罪皇太后詔可依舊制免爲庻人沈約宋書曰㑹稽太守孟顗事佛精懇而爲謝靈運所輕甞謂顗曰得道應湏慧業丈人生天當在靈運前成佛必在靈運後顗深恨此言禰衡傳曰衡字正平建安􅀄自荆州北遊許都恃才慠逸臧否過差見不如巳者不肯與言語人皆以是憎之文士傳曰阮籍從容曰平生曽遊東平縣樂其土風願得爲東平太守文帝大恱即從之籍便􅀐驢徑到郡至皆壞壁障内外相望教令清當十餘日便􅀐驢歸淮南子曰賔有見人於季子者賔出季子曰子之賔獨有三過望我而􅀏是慢}
