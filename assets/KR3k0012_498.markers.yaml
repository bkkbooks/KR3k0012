  - {type: variant, offset: 121, length: 1, content: 平, SBCK: 史奏客星犯帝坐甚急帝曰朕故人嚴子陵共卧耳語林曰羅含在宣武坐人介與他人相識含正容曰所識巳多不煩復尔丗􅀃曰王子猷作桓温車􅀐參軍桓謂王曰卿在府乆當相斷理王􅀄不荅直髙視手板拄頰云西山朝來致有爽氣應璩與崔元書曰豈有亂首抗巾以入都城衣不在體而以適人乎昔戴叔鸞箕坐見邊文祖此皆衰丗之慢行}
