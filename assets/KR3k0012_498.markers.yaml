  - {type: variant, offset: 16, length: 0, content: '', SBCK: 荒放露頭散髪祼􅃝箕踞作二千石不治官事日與鈴下共飲酒歌呼時人或以籍生在魏之交欲佯狂避時不知籍本性自然}
  - {type: variant, offset: 16, length: 2, content: 也又, WYG: 思柔彼交匪傲萬福來求禮}
