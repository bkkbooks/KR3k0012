  - {type: variant, offset: 1325, length: 1246, content: 醉不持權去飜起坐權於是大怒欲手擊之大司農劉基起抱權諫曰大王以三爵後殺善士雖飜有罪天下孰知之權曰曹孟德尚殺孔文舉孤於虞飜何有哉基曰孟德輕害名士天下非之今大王躬行仁德欲與堯舜比隆何得自喻于彼乎由是得免權因勑左右自今酒後言殺皆不得殺也又曰孫皓大會群臣王蕃沉醉頓伏皓疑而不悅蕃轝出以頃之請還酒亦小解蕃性有威嚴行止自若皓大怒呵左右於殿下斬之魏典略曰董卓雖親愛呂布然時醉酒則罵之以刀劍擊之不中布恐終被害乃先畜死士以戟剌卓卓曰布何在布曰有詔遂殺之又曰時苗字德胄出為壽春令楊州治在其縣時蔣濟為治中苗以初至往欲謁濟濟素嗜酒適會其醉不能見恚恨還刻木為人署曰酒徒蔣濟豎之於牆下旦夕射之又曰丁沖為司隸校尉後數歲過諸將飲酒美不能止醉爛腸死也晉書曰羊曇者太山人知名士也少為謝安所愛重安薨後輟樂彌年行不由西路州嘗因石頭大醉扶路唱樂不覺至州門也左右白曰此西州門曇悲感不已以馬策扣扉誦曹子詩曰生存華屋處零落歸山丘因慟哭而去又曰王恭傳會稽王道子置酒於東府尚書令謝石因醉為委巷之歌恭正色曰居端右之重集藩王之第而肆淫聲欲令群下何所取則石深衘之又曰王蘊素嗜酒末年尤甚及在會稽略少醒日然猶以和簡為百姓所悅又曰顧榮傳齊王召為大司馬主簿擅權驕恣榮懼及禍終日昏酣不綜府事以情告友人長樂馮熊熊謂長史葛旟曰以顧榮為主簿所以甄拔才望委以事機不復計南北親踈欲平海內之心也今府大事殷非酒客之政旟曰榮江南望士且居職日淺不宜輕代易之熊曰可轉為中書侍郎榮不失清顯而府更收實才旟然之白以為中書侍郎在職不復飲酒人或問之曰何前醉而後醒耶榮懼乃復更飲晉中興書曰畢卓字茂世為吏部郎比舍郎釀熟卓因醉夜至其甕間取酒飲之掌酒者縛卓郎往視之釋縛宴於甕側取醉而去又曰周顗代戴淵為護軍尚書紀瞻置酒請顗及王導等二十人顗荒醉失儀復為有司所奏檀道鸞晉書曰桓玄詣會稽王道子道子已醉對玄張目矚四座云桓溫作賊玄見此醉勢難測伏地流汗宋書曰荊州刺史王忱范太外弟也忱嗜酒醉輒累旬及醒則儼然端肅太謂忱曰酒雖會性亦所以傷生也又曰孔顗使酒仗氣每醉輒彌日不醒僚類之間多所凌忽尤不能曲意權倖莫不畏而疾之又曰陶潛嘗九月九日無酒出宅邊菊藂中坐久之值王弘送酒至便酌大醉而歸崔鴻後趙錄曰石勒制法甚嚴兼諱胡尤峻有醉胡乘馬突入止車勒大怒謂宮門小執法馮翥曰夫人君為令將使下之無犯吾尚望威行天下況於宮閤之間向馳馬入門為是何人而不彈白縱之耶翥惶懼忘諱對曰向醉胡乘馬馳入甚呵衛之而不可與語所謂互鄉難與言小人所不能制勒笑曰胡正自難與言恕而不罪崔鴻前秦錄曰建武十四年堅宴群臣於釣臺以祕書監朱肜為酒正堅曰今日之飲當以落池為限史典論曰荊州牧劉表跨有南土子弟驕貴並好酒為三爵大曰伯雅次曰仲雅小曰季雅伯受七升仲受六升季受五升又設大鍼於坐端客有醉酒寢地輒以劖音讒剌驗其醒醉是醜於趙敬侯以筒酒灌人也大駕都許使光祿大夫劉松北鎮袁紹軍與紹子弟宴飲松常以盛夏三伏之際晝夜酣飲二方化之故南荊有三雅之爵河朔有避暑之飲又曰中常侍張讓子奉為太醫令與人飲酒輒掣引衣裳發露形體以為戲樂將罷又亂其履舄使小大差踦音紀無不傾倒僵仆踒跌手足因隨而笑之踒於臥反襄陽舄耆舊記, SBCK: 秋}
