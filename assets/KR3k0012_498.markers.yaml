  - {type: variant, offset: 141, length: 0, content: '', SBCK: 劉琨謂澄曰卿形雖散朗而内實動俠以此處丗難得其死澄黙然不荅宋書曰張敷遷中書舎人與狄當周赳並管要務以敷同省名家欲詣之赳曰彼􅀂不相容便不如不往詎可輕往耶當曰吾等並巳貟外郎何憂不得共坐敷先設二牀去壁三四尺二客就席酬接甚歡旣而呼左右曰移我逺客赳等失色而去又曰陶潜有造之者設酒潜􅀂先醉便語客曰我醉欲眠卿可去宋書曰張敷永興􅀄遷祕書郎甞在省直中書令傅亮聞其好學過候之敷卧不即起亮怪而去齊書曰張欣㤗領羽林􅁥欣㤗通渉雅俗交結多是名素下直輙逰園池着鹿皮冠納衣錫杖挾素琴有以啓丗祖曰將家兒何敢作此舉止齊書丘靈鞠好}
