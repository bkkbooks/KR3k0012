  - {type: variant, offset: 133, length: 1, content: 幽, SBCK: ''}
  - {type: variant, offset: 135, length: 3, content: 荒廢褻, SBCK: 獻之甞經吴郡聞顧辟彊有名園先不相識乗平肩轝逕入時辟彊方集賔友而獻之遊歴旣畢傍􅀂無人辟彊勃然數之曰傲主人非禮也以貴驕士非道也失是二者不足齒之傖耳便驅岀門又曰王導子恬性傲誕不拘禮法謝萬甞造恬旣坐少頃恬便入内萬以爲必厚待巳殊有喜色恬乆之乃沭頭髮而出據胡床於庭中曬髮神氣慠邁竟無賔主之意萬帳然而還又曰王徽之字子猷性卓犖不覊大司馬桓温參軍蓬首散帶不綜府事又爲車􅀐桓冲􅀐兵問卿署何曹對曰似是馬曹又問管幾馬曰不知由馬何知數又問馬比死多少曰未知生焉知死甞從冲行值􅁀雨徽之因下馬排入車中謂曰公豈得獨擅一車又曰劉伶常着􅃝服乗車客有詣伶值其祼􅃝責伶伶曰吾以天爲屋以屋爲禈諸君不當入中又曰謝萬旣受任北征矜豪傲物常以嘯詠自髙未甞撫衆兄安深憂之自隊主將帥巳下安無不慰勉謂萬曰汝爲元帥諸將冝數接對以恱其心豈有慠誕若斯而能濟事也萬乃召集諸將都無所􅀃直以如意指四座云諸將皆勁卒諸將益恨之又曰周顗王導甚重之甞枕顗􅂰而指其腹曰卿此中何所有也荅曰此中空洞無物然足容卿輩數百人導亦不以爲忤又於導座慠然嘯詠導云卿欲希􅄞阮耶顗曰何敢}
