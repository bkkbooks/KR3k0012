  - {type: variant, offset: 13, length: 2, content: 酣樂, SBCK: 魏末阮籍有才而􅄝}
  - {type: variant, offset: 13, length: 2, content: 酣樂, WYG: 兕觵其觩㫖}
  - {type: variant, offset: 13, length: 127, content: 酣樂酒也又曰酒卒曰醉各卒其度量不至於亂也一曰瀆也易未濟曰有孚于飲酒無咎濡其首有孚失是飲酒有思信而無保言尤濡其首有孚失是況酒無節至濡首雖有飲酒之信失是不醉之節明飲酒不節濡首不可不戒也象曰飲酒濡首亦不知節也毛詩曰既醉告太平也既醉以酒既飽以德又曰幽王荒廢褻近小, krp: ''}
