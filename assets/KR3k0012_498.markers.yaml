  - {type: variant, offset: 17, length: 0, content: '', SBCK: 于寳晉記曰吕安友􅄞康相思則命駕千里從之或遇其行康兄喜位至方伯拭席而待弗之顧也獨􅀫車中康母設酒求康兒共戲則去鄧粲晉記曰劉伶常着􅃝服而乗鹿車客有詣伶值其祼􅃝責伶伶􅀏曰吾以天爲屋以屋爲禈諸君不當入中又何怨乎其自任􅀂此}
