  - {type: variant, offset: 2755, length: 175, content: 禕輒辭以醉退而撰次所問事條荅無所遺矣呂氏春秋曰秦繆公之時西戎強大繆公遺女樂戎王大喜以其故數飲食日夜不休左右有言秦寇之至因按弓而射之秦寇果至戎王醉而臥於樽下卒生縛而擒之博物志曰人中酒醉不解浴之以湯自漬則愈湯亦作酒氣味又曰昔有人名玄石從中山酒家酤酒酒家與之千日酒不語其節度至家而醉家以為死而葬之酒家計滿千日乃憶之往索玄石玄石家云亡來三年服已闋矣乃至家掘而, SBCK: 尤晚温}
