  - {type: variant, offset: 461, length: 524, content: 國無所變更一遵蕭何日飲淳酒卿大夫以下皆欲言來者參輒飲酒醉而後去終莫得開說又曰景帝召程姬姬有所避而飾侍者唐兒使夜進上醉不知以為程姬而幸之遂有娠及生子命曰發為長沙王漢書曰漢高祖為泗上亭長亭中吏無所不狎侮好酒及色常從王媼武負貰飲酒醉臥武負王媼見其上常有怪此兩家常折券棄債又曰高祖被酒夜經澤中令一人前前者還報曰前有大虵當徑高祖醉曰壯士何畏乃前拔劍斬虵分為兩道開行數里醉因臥又曰萬石君徙居陵里內史慶醉歸入外門不下車萬石君聞之不食慶恐肉袒請罪不許舉宗及兄建肉袒萬石君讓曰內史貴人入閭里中長老皆走匿而內史坐車中如故乃謝罷慶慶及諸子入里門趍至家又曰衛青伐匈奴右賢王當青等以為漢兵不能至飲醉漢兵夜至圍右賢王驚而夜逃又曰李廣當斬贖為庶人與故潁陰侯屏居藍田南山射獵嘗夜從一騎出從人田間飲還至亭灞陵尉醉呵止廣廣騎曰故李將軍尉曰今將軍尚不得夜行何故也宿廣亭下又曰陳遵為京兆尹嗜酒每大飲賓客滿堂輒閉門取車轄投井中雖有急終不得去有部刺史奏事過遵值其方飲刺史候遵宿醉時突入見遵母乃叩頭白當對尚書有期會乃令從後閤出去遵雖常醉然事亦不廢又曰邴吉始於官屬掾史務掩過揚善吉馭吏嗜酒數逋蕩嘗從吉出醉嘔丞相車下茵西曹主吏白欲斥之吉以醉飽之失去士使此人將復何所容西曹忍之此不過汙丞相車茵耳遂不去, krp: 耶歈}
