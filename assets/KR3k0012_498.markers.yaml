  - {type: variant, offset: 2007, length: 4, content: 甕側取醉, WYG: 庭中曬髮神氣傲邁竟無賔主之意萬悵然而還又曰王徽之字子猷性卓犖不羈為大司馬桓溫參軍蓬首散帯不綜府事又為車騎桓冲騎兵問卿署何曹對曰似是馬曹又問管幾馬曰不知馬何由知數又問馬比死多少曰未知生焉知死嘗從冲行值暴雨徽之因下馬排入車中謂曰公豈得獨擅一車又曰劉伶嘗著袒服乘車客有詣伶值其裸袒責伶伶曰吾以天為屋以屋為褌諸君不當入中又曰謝萬既受任北征矜豪傲物常以嘯詠自髙未嘗撫衆兄安身憂之自隊主將師已下安無不慰勉謂萬曰汝為元帥諸將宜數接對以悦其心豈有傲誕若斯而能濟事也萬乃召集諸將都無所説直以如意指四座云諸將皆勁卒諸將益恨之又曰周顗王導甚重之嘗枕顗膝而指其腹曰卿此中何所有也答曰此中空洞無物然足容卿輩數百人導亦不以為忤又於導座傲然嘯詠導云卿欲希嵇阮耶顗曰何敢近捨明公逺希嵇阮又曰王澄為荆州刺史澄將之鎮送者傾朝澄見樹上鵲巢便脱衣上樹探鷇而弄之神氣蕭然傍若無人劉琨謂澄曰卿形體散朗而内實動俠以此處世難得其死澄黙然不答宋書曰張敷遷中書舍人與狄當周赳並管要務以敷同省名家欲詣之赳曰彼若不相容便不如不往詎可輕往耶當曰吾等並已員外郎何憂不得共坐敷先設二牀去壁三四尺二客就席酬接甚歡既而呼左右曰移吾牀逺客赳等失色}
