  - {type: variant, offset: 19, length: 0, content: '', SBCK: 胡母輔之過河南門下將飲}
  - {type: variant, offset: 19, length: 79, content: 酒卒曰醉各卒其度量不至於亂也一曰瀆也易未濟曰有孚于飲酒無咎濡其首有孚失是飲酒有思信而無保言尤濡其首有孚失是況酒無節至濡首雖有飲酒之信失是不醉之節明飲酒不節濡首, WYG: 傲}
  - {type: variant, offset: 20, length: 0, content: '', SBCK: 河南}
  - {type: variant, offset: 21, length: 0, content: '', SBCK: 王子愽倨坐其傍輔之叱使取火子愽}
  - {type: variant, offset: 22, length: 2, content: 醉各, SBCK: 我}
  - {type: punctuation, offset: 23, content: 。, id: KR3k0012_CHANT_498-bkkpn10}
  - {type: 'tls:seg', offset: 23, content: '', id: KR3k0012_CHANT_498-1a.8}
  - {type: variant, offset: 25, length: 0, content: '', SBCK: 也唯不乏吾事安能爲人使輔之與語歎曰吾弗及也因言河南尹以爲功曹習鑿齒漢晉陽春秋曰陳蹇兄丕有名於丗與夏侯􅀇親交玄拜}
  - {type: variant, offset: 26, length: 0, content: '', SBCK: 母蹇時爲中領軍聞􅀇㑹於其家恱而歸旣入户􅀇曰相與未至於此蹇當户立良乆曰如君言乃趨而出意氣自􅀂玄大以此知之後魏書曰季栗鴈門人也性簡慢務寵不率禮}
  - {type: variant, offset: 27, length: 1, content: 量, SBCK: 每在太祖前舒放倨傲不自祗肅􅀏唾任情太祖積其􅀫過天興三年遂誅之於是威嚴始厲制勒群下盡卑謙之禮自栗始也後魏書曰元順字子和起家爲給事中時尚書令髙肇帝舅權重天下人士望塵拜伏順曽懷刺詣肇門門者以其年少荅云在座大有賔客不肯爲通順叱之曰任城王兒可是賤也及見直徃登牀捧手抗禮王公先逹莫不怪懼而順辭吐傲然􅀂無所覩謂衆曰此兒豪氣尚尔况其父耶澄聞之大怒杖之數十晉中興書曰蔡謨讓司徒李宗臨軒遣侍中璩黄門郎丁纂徴謨謨陳疾篤使主簿謝攸對自平旦至日中使者十餘反而謨}
  - {type: page-break, offset: 27, content: '', id: KR3k0012_SBCK_498-3a}
