  - {type: variant, offset: 1994, length: 2, content: 掌酒, WYG: 籍便騎驢徑到郡堂皆壊壁鄣内外相望敎令清當十餘日便騎驢歸淮南子曰賔有見人於季子}
  - {type: variant, offset: 1997, length: 4, content: 縛卓郎往, WYG: 賔出季子曰子之賔獨有三過望我而笑是慢也談語而不稱師是叛也交淺而言深是亂也賔曰望君而笑是公也談語不稱師是通也交淺而言深是忠也故季之賔客一體也或以為小人或以為君子}
