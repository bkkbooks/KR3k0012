  - {type: variant, offset: 7, length: 0, content: '', krp: 九簡傲耶歈簡傲詩曰兕觵其觩旨酒思柔彼交匪傲萬福來求禮曰傲不可長欲不可縱樂不可極春秋曰衛侯饗苦成叔寗惠子相苦成叔傲寗子曰苦成家其亡乎古之爲享食也以觀威儀省禍福也論語曰居簡而行簡無乃太簡乎韓詩外傳曰田子方之魏魏太子從車百乗迎之於郊太子再拜謁子方不下車太子不恱曰敢問何如則以驕人矣子方曰吾聞以天下驕人而亡者有矣以一國驕人而亡者有矣由此觀之則貧賤可驕人矣士志不得則授履之秦楚耳安往而不得貧賤乎於是太子再拜而後退子方遂不下車孔藂子曰子思居衛曽子謂子思曰昔吾從夫子廵於諸侯未甞失其人臣之禮而猶聖道不行今吾觀子有慠丗之心無乃不容乎子思曰時移勢異各有冝也當吾先君周制雖毀君臣固位上下相持欲行其道不勞以求之則不能入也今天下諸侯方欲力爭競招英雄以自輔翼此得士則昌失士則亡之秋也不自髙人將下吾不自貴人將賤吾舜禹揖讓湯武用師非故相詭乃時也耳華嶠後漢書曰趙壹字元淑恃才倨傲爲郷里所擯東觀漢記曰愽士范升奏曰伏見太原周黨解履升華轂陛下見帝庭偃蹇慠慢逡廵進退臣願與並論靈臺之下魏略曰丁謐少不肯交遊但愽觀書傳爲人亢毅頗有才略太和中常於鄴借人空屋其中而諸王亦欲借之不知謐巳得直開門入謐望見王交脚卧不起而呼其奴客曰此等人促呵使去王怒其無禮還具上聞之明帝收繫鄴獄以其功臣子原之蜀志簡雍字憲和涿郡人與先主有舊性簡慠跌蕩在先主座席猶箕倨傾倚威儀不肅自從適諸葛亮巳下則獨擅一榻傾枕卧語無所爲屈蜀志曰彭羕字永年廣漢人身長}
