  - {type: variant, offset: 8, length: 4, content: 酣醉說文, SBCK: 尺容貌甚偉姿性驕慠多所輕忽唯敬同郡秦子整王隱晉書}
  - {type: variant, offset: 8, length: 1, content: 酣, krp: 尺容貌甚偉姿性驕慠多所輕忽唯敬同郡秦子整王隱晉書曰魏末阮籍有才而嗜酒荒放露頭散髪祼袒箕踞作二千石不治官事日與鈴下共飲酒歌呼時人或以籍生在魏之交欲佯狂避時不知籍本性自然也于寳晉記曰吕安友嵇康相思則命駕千里從之或遇其行康兄喜位至方伯拭席而待弗之顧也獨宿車中康母設酒求康兒共戲則去鄧粲晉記曰劉伶常着袒服而乗鹿車客有詣伶值其祼袒責伶伶笑曰吾以天爲屋以屋爲禈諸君不當入中又何怨乎其自任若此又曰胡母輔之過河南門下將飲酒河南卒王子愽倨坐其傍輔之叱使取火子愽曰我卒也唯不乏吾事安能爲人使輔之與語歎曰吾弗及也因言河南尹以爲功曹習鑿齒漢晉陽春秋曰陳蹇兄丕有名於丗與夏侯玄親交玄拜其母蹇時爲中領軍聞玄㑹於其家恱而歸旣入户玄曰相與未至於此蹇當户立良乆曰如君言乃趨而出意氣自若玄大以此知之後魏書曰季栗鴈門人也性簡慢務寵不率禮度每在太祖前舒放倨傲不自祗肅笑唾任情太祖積其宿過天興三年遂誅之於是威嚴始厲制勒群下盡卑謙之禮自栗始也後魏書曰元順字子和起家爲給事中時尚書令髙肇帝舅權重天下人士望塵拜伏順曽懷刺詣肇門門者以其年少荅云在座大有賔客不肯爲通順叱之曰任城王兒可是賤也及見直徃登牀捧手抗禮王公先逹莫不怪懼而順辭吐傲然若無所覩謂衆曰此兒豪氣尚尔况其父耶澄聞之大怒杖之數十晉中興書曰蔡謨讓司徒李宗臨軒遣侍中璩黄門郎丁纂徴謨謨陳疾篤使主簿謝攸對自平旦至日中使者十餘反而謨不至孝宗時年八歳甚怪之極問左右曰所召何人何以至今不來軒臨何當竟㑹稽王曰蔡公慠違上命無人臣之禮若人主卑屈於上大義不行於下亦不知復所以爲治於是奏送謨廷尉以正刑書謨懼率子弟素服詣闕稽顙到廷尉待罪皇太后詔可依舊制免爲庻人沈約宋書曰㑹稽太守孟顗事佛精懇而爲謝靈運所輕甞謂顗曰得道應湏慧業丈人生天當在靈運前成佛必在靈運後顗深恨此言禰衡傳曰衡字正平建安𥘉自荆州北遊許都恃才慠逸臧否過差見不如巳者不肯與言語人皆以是憎之文士傳曰阮籍從容曰平生曽遊東平縣樂其土風願得爲東平太守文帝大恱即從之籍便騎驢徑到郡至皆壞壁障内外相望教令清當十餘日便騎驢歸淮南子曰賔有見人於季子者賔出季子曰子之賔獨有三過望我而笑是慢也談語而不稱師是叛也交淺而言深是亂也賔曰望君而笑是公也談語不稱師是通也交淺而言深是忠也故賔之賔客一體也或以爲小人或以爲君子視之異也物理論曰今有吕子義清賢仕爲率更令有人就之宿非其度數之内子義燃燭危坐通暁目不轉睛膝不移處㑹稽典録曰嚴光一名遵帝引入論故舊累日因共卧光以足加帝腹上明日太史奏客星犯帝坐甚急帝曰朕故人嚴子陵共卧耳語林曰羅含在宣武坐人介與他人相識含正容曰所識巳多不煩復尔丗說曰王子猷作桓温車騎參軍桓謂王曰卿在府乆當相斷理王𥘉不荅直髙視手板拄頰云西山朝來致有爽氣應璩與崔元書曰豈有亂首抗巾以入都城衣不在體而以適人乎昔戴叔鸞箕坐見邊文祖此皆衰丗之慢行也晉書曰何綏性旣輕物翰札簡傲城陽王尼見綏書䟽謂人曰伯蔚居亂而矜豪乃尓豈其免乎晉書曰謝弈與桓温善温辟爲安西司馬猶推布衣好在温坐岸幘嘯詠無異常日温指曰我方外司馬又曰王獻之甞經吴郡聞顧辟彊有名園先不相識乗平肩轝逕入時辟彊方集賔友而獻之遊歴旣畢傍若無人辟彊勃然數之曰傲主人非禮也以貴驕士非道也失是二者不足齒之傖耳便驅岀門又曰王導子恬性傲誕不拘禮法謝萬甞造恬旣坐少頃恬便入内萬以爲必厚待巳殊有喜色恬乆之乃沭頭髮而出據胡床於庭中曬髮神氣慠邁竟無賔主之意萬帳然而還又曰王徽之字子猷性卓犖不覊大司馬桓温參軍蓬首散帶不綜府事又爲車騎桓冲騎兵問卿署何曹對曰似是馬曹又問管幾馬曰不知由馬何知數又問馬比死多少曰未知生焉知死甞從冲行值暴雨徽之因下馬排入車中謂曰公豈得獨擅一車又曰劉伶常着袒服乗車客有詣伶值其祼袒責伶伶曰吾以天爲屋以屋爲禈諸君不當入中又曰謝萬旣受任北征矜豪傲物常以嘯詠自髙未甞撫衆兄安深憂之自隊主將帥巳下安無不慰勉謂萬曰汝爲元帥諸將冝數接對以恱其心豈有慠誕若斯而能濟事也萬乃召集諸將都無所說直以如意指四座云諸將皆勁卒諸將益恨之又曰周顗王導甚重之甞枕顗膝而指其腹曰卿此中何所有也荅曰此中空洞無物然足容卿輩數百人導亦不以爲忤又於導座慠然嘯詠導云卿欲希嵇阮耶顗曰何敢近捨明公逺希嵇阮又曰王澄爲荆州刺史澄將之鎮送者傾朝澄見樹上鵲巢便脫衣上樹探鷇而弄之神氣肅然傍若無人劉琨謂澄曰卿形雖散朗而内實動俠以此處丗難得其死澄黙然不荅宋書曰張敷遷中書舎人與狄當周赳並管要務以敷同省名家欲詣之赳曰彼若不相容便不如不往詎可輕往耶當曰吾等並巳貟外郎何憂不得共坐敷先設二牀去壁三四尺二客就席酬接甚歡旣而呼左右曰移我逺客赳等失色而去又曰陶潜有造之者設酒潜若先}
