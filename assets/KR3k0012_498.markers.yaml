  - {type: variant, offset: 1737, length: 4, content: 謝石因醉, WYG: 髙肇帝舅權重天下人士望塵拜伏順曾懐刺詣肇門門者以其年少答云在座大有賔客不肯}
  - {type: variant, offset: 1742, length: 206, content: 委巷之歌恭正色曰居端右之重集藩王之第而肆淫聲欲令群下何所取則石深衘之又曰王蘊素嗜酒末年尤甚及在會稽略少醒日然猶以和簡為百姓所悅又曰顧榮傳齊王召為大司馬主簿擅權驕恣榮懼及禍終日昏酣不綜府事以情告友人長樂馮熊熊謂長史葛旟曰以顧榮為主簿所以甄拔才望委以事機不復計南北親踈欲平海內之心也今府大事殷非酒客之政旟曰榮江南望士且居職日淺不宜輕代易之熊曰可轉為中書侍郎榮不失清顯而府更收實才旟然之白以為中書侍郎在職不復飲酒人或問, WYG: 通順叱}
