  - {type: variant, offset: 3690, length: 167, content: 又曰齊桓公飲酒醉遺其冠恥之三日不朝管仲曰此非有國者之恥也公胡不雪之以政公曰善因發囷倉賜貧窮論囹圄出薄罪處三日而民歌之曰公乎不復遺其冠乎淮南子曰夫醉者俛入城門以為七尺之閨超江淮以為尋常之溝酒濁其神也陶淵明詩序曰余偶有名酒無日不飲顧影獨盡忽焉復醉諸葛亮集曰亮戒子曰夫酒之設合禮致情適體歸性禮終而退此和之至也主意未殫賓有餘倦可以至醉無致迷亂, SBCK: 太平御覽卷第四百九十八}
