  - {type: punctuation, offset: 10, content: 《, id: KR3k0012_CHANT_498-bkkpn1}
  - {type: variant, offset: 10, length: 0, content: '', krp: 便語客曰我醉欲眠卿可去宋書曰張敷永興𥘉遷祕書郎甞在省直中書令傅亮聞其好學過候之敷卧不即起亮怪而去齊書曰張欣㤗領羽林監欣㤗通渉雅俗交結多是名素下直輙逰園池着鹿皮冠納衣錫杖挾素琴有以啓丗祖曰將家兒何敢作此舉止齊書丘靈鞠好飲酒臧否人物在沈淵座見王儉詩淵曰王令文章大進靈鞠曰何如我未進此言逹儉靈鞠宋丗文名甚盛入齊頗减蓬髪㢮縱無形儀不治家業王儉謂人曰丘公仕宦不進才亦退矣梁書曰何點雖不入城府而遨逰人丗不簮不帶或駕柴車躡草屩恣心所適致醉而歸士大夫多慕從之時人號爲通隱隋書曰崔儦每以讀書爲務負恃才地忽略丗人大署其户曰不讀五千卷書者無得入此室數年之間遂愽覽群言多所通渉唐書曰鄭仁表洎之子也文章尤稱俊拔然恃才傲物人士薄之自謂門地人物文章具美甞曰天瑞有五色雲人瑞有鄭仁表劉鄴少時投文於洎仁表兄弟嗤鄙之咸通末鄴爲宰相仁表竟貶死南荒又曰崔元翰入朝爲太常愽士禮部貟外郎竇叅輔政用爲知制誥詔令温雅合於典謨然性太剛𥚹簡傲不能取容於時毎發言論略無阿徇忤執政旨故掌誥二年而官不遷又曰李白甞醉令髙力士脫靴由是斥去乃浪迹江湖終日飲沉時侍御史崔宗之謫官金陵與白詩酒唱和甞月夜乗舟自採石逹金陵着白衣宫錦𫀆於舟中顧瞻嘯傲傍若無人𥘉賀知章見白賞之曰此天上謫仙人也耶歈}
