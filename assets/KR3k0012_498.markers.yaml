  - {type: variant, offset: 3311, length: 546, content: 洲記曰瀛州者玉膏如酒味名曰玉酒飲數升輒醉令人長生俗記曰宋禕死後葬在金城南山對琅琊郡門袁山松為琅琊太守每醉輒乘輿上宋禕冢作行路難歌列子曰子產相鄭有兄曰公孫朝好酒朝之室藂酒千鍾積麴成封糟糠之氣逆於人鼻方其荒醉不知世道之安危魯連子曰楚王成章華臺酌諸侯酒魯君先至悅之故醉與之大曲之弓不琢之璧已而悔之魯君懼乃歸之莊子曰醉者之墜車也希死形體與人同其悟物與人異則其神者全也屍子曰赤縣洲者寔為崑崙之墟其東則滷水島山左右蓬萊玉紅之草生焉食其一實醉臥三百歲而寤韓子曰楚共王與晉厲公戰於鄢陵楚師敗績共王傷目司馬子反渴而求飲穀陽樹操觴而進子反王欲復戰召子反議子反醉乃辭以疾王入其幕酒臭旋師而斬韓子曰紹緇昧醉而忘其裘梁君曰醉足以亡裘乎荅曰紂以酒亡天下而況裘亡乎又曰紂為長夜而失日問於左右盡弗知曰使人問箕子謂其從曰為天下王而一國皆失日天下其危矣一國皆不知而我獨知之我其危矣辭以醉而不知也又曰齊桓公飲酒醉遺其冠恥之三日不朝管仲曰此非有國者之恥也公胡不雪之以政公曰善因發囷倉賜貧窮論囹圄出薄罪處三日而民歌之曰公乎不復遺其冠乎淮南子曰夫醉者俛入城門以為七尺之閨超江淮以為尋常之溝酒濁其神也陶淵明詩序曰余偶有名酒無日不飲顧影獨盡忽焉復醉諸葛亮集曰亮戒子曰夫酒之設合禮致情適體歸性禮終而退此和之至也主意未殫賓有餘倦可以至醉無致迷亂, WYG: 八}
