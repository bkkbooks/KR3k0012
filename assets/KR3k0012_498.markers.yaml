  - {type: variant, offset: 2093, length: 4, content: 荊州刺史, WYG: 張敷永初初遷祕書郎嘗在省直中書令傅亮貴宿接要聞其好學過候之敷卧不即起亮怪而去齊書曰張欣泰領羽林監欣泰通涉雅俗交結多是名素下直輒遊園池著鹿皮冠衲衣錫杖挾素琴有以啓世祖曰將家兒何敢作此舉止齊書曰丘靈鞠好飲酒臧否人物在沈淵座見}
