  - {type: variant, offset: 491, length: 3, content: 去終莫, WYG: 退子方遂不下車孔藂子曰子思居衞曾子謂子思曰昔吾從夫子巡於諸侯未嘗失其人臣之禮而猶聖道不行今吾觀子有傲世之心無乃不容乎子思曰時移勢異各有宜也當吾先君周制雖毁君臣固位上下相持欲行其道不勞以求之則不能入也今天下諸侯方欲力爭競招英雄以自輔翼此}
