  - {type: variant, offset: 2003, length: 3, content: 釋縛宴, WYG: 異也物理論曰今有吕子義清賢仕為率更令有人就之宿非其度數之内子義燃燭危坐通曉目不轉睛膝不移處㑹稽典録曰嚴光一名遵帝引入論故舊累日因共卧光以足加帝腹上明日太史奏客星犯帝坐甚急帝曰朕故人嚴子陵共卧耳語林曰羅含在宣武坐人介與他人相識含正容曰所識已多不煩復爾世説曰王子猷作桓溫車騎參軍桓謂王曰卿在府久當相料理王初不答直髙視手板拄頰云西山朝來致有爽氣應璩與崔元書曰豈有亂首抗巾以入都城衣不在體而以適人乎昔戴叔鸞箕坐見邊文祖此皆衰世之慢行也晉書曰何綏性既輕物翰札簡傲城陽王尼見綏書疏謂人曰伯蔚居亂而矜豪乃爾豈其免乎晉書曰謝奕與桓溫善溫辟為安西司馬猶推布衣好在溫座岸幘嘯詠無異常日桓溫曰我方外司馬又曰王獻之嘗經呉郡聞顧辟疆有名園先不相識棄肩輿逕入時辟疆方集賔友而獻之遊厯既畢傍若無人辟疆勃然數之曰傲主人非禮也以貴驕士非道也失是二者不足齒之傖耳便驅出門又曰王恬字導子性傲誕不拘禮法謝萬嘗造恬既坐少頃恬便入内萬以為必厚待己殊有喜色恬久之乃沐頭髮而出據胡牀}
