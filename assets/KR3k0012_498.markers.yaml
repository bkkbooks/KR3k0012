  - {type: variant, offset: 1968, length: 2, content: 畢卓, WYG: 蔡謨讓司徒孝宗臨軒遣侍中璩黄門郎丁纂徵謨謨陳疾篤使主簿謝攸對自平旦至日中使者十餘反而謨不至孝宗時年八歲甚怪之亟問左右曰所召何人何以至今不來軒臨何當竟㑹稽王曰蔡公傲違上命無人臣之禮若人主卑屈於上大義不行於下亦不復知所以為治於是奏送謨廷尉以正刑書謨恨率子弟素服詣闕稽顙到廷尉待罪皇太后詔可依舊制免為庶人沈約宋書曰㑹稽太守孟顗事佛精懇而為謝靈運所輕嘗謂顗曰得道應須慧業文人生天當在靈運前成佛必在靈運後顗深恨此言禰衡傳曰衡}
