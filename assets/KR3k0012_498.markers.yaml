  - {type: variant, offset: 30, length: 0, content: '', SBCK: 孝宗時年八歳甚怪之極問左右曰所召何人何以至今不來軒臨何當竟㑹稽王曰蔡公慠違上命無人臣之禮若人主卑屈}
