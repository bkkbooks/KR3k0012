  - {type: variant, offset: 123, length: 8, content: 既醉以酒既飽以德, SBCK: 晉書曰何綏性旣輕物翰札簡傲城陽王尼見綏書䟽謂人曰伯蔚居亂而矜豪乃尓豈其免乎晉書曰謝弈與桓温善温辟爲安西司馬猶推布衣好在温坐岸幘嘯詠無異常日温指曰我方外司馬}
