  - {type: variant, offset: 2325, length: 241, content: 不罪崔鴻前秦錄曰建武十四年堅宴群臣於釣臺以祕書監朱肜為酒正堅曰今日之飲當以落池為限史典論曰荊州牧劉表跨有南土子弟驕貴並好酒為三爵大曰伯雅次曰仲雅小曰季雅伯受七升仲受六升季受五升又設大鍼於坐端客有醉酒寢地輒以劖音讒剌驗其醒醉是醜於趙敬侯以筒酒灌人也大駕都許使光祿大夫劉松北鎮袁紹軍與紹子弟宴飲松常以盛夏三伏之際晝夜酣飲二方化之故南荊有三雅之爵河朔有避暑之飲又曰中常侍張讓子奉為太醫令與人飲酒輒掣引衣裳發露形體以為戲樂將罷又亂其履舄使小大差踦音紀無不傾倒僵仆踒跌手足因隨而笑之踒於臥反襄, WYG: 返續晉}
