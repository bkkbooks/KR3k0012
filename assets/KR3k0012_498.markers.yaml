  - {type: variant, offset: 1292, length: 163, content: 也願主父重加察之乃不加罪吴志曰孫權為吴王遊宴之後起自行酒虞飜伏地陽醉不持權去飜起坐權於是大怒欲手擊之大司農劉基起抱權諫曰大王以三爵後殺善士雖飜有罪天下孰知之權曰曹孟德尚殺孔文舉孤於虞飜何有哉基曰孟德輕害名士天下非之今大王躬行仁德欲與堯舜比隆何得自喻于彼乎由是得免權因勑左右自今酒後言殺皆不得殺也又曰孫皓大會群臣王蕃沉醉頓伏皓疑, WYG: ''}
