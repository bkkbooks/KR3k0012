  - {type: variant, offset: 117, length: 3, content: 既醉告, SBCK: 望君而􅀏是公也談語不稱師是通也交淺而言深是忠也故賔之賔客一體也或以爲小人或以爲君子視之異也物理論曰今有吕子義清賢仕爲率更令有人就之􅀫非其度數之内子義燃燭危坐通暁目不轉睛􅂰不移處㑹稽典録曰嚴光一名遵帝引入論故舊累日因共卧光以足加帝腹上明日}
  - {type: variant, offset: 117, length: 8, content: 既醉告太平也既醉, WYG: 敢問何如則可}
