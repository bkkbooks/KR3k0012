  - {type: variant, offset: 2932, length: 683, content: 玄石起於棺中說苑曰楚莊王賜群臣酒日暮燭滅有引美人衣者美人援絕其冠纓告王王曰賜人酒使醉失禮奈何欲顯婦人之節而辱士乎乃命左右曰與寡人飲不絕冠纓者不歡群臣皆絕其冠纓乃止世說曰周伯仁有德量深達危亂過江積年恒大飲酒嘗經三日醒時人謂三日僕射又曰張華既貴有少時知識來候之華屏官事與共飲九醞酒為酣暢其夜醉眠張華嘗飲此酒醉眠輒使左右轉側至覺左右依常為張公轉側其友無轉側者至明起友人猶不寤張公曰咄此必死矣使就視之酒果穿腹流床下滂沱又曰山公曰嵇叔夜之為人也嚴然若孤松之獨立及其醉也嵬峨若玉山之將頹又曰杜預為荊州刺史鎮襄陽時有讌集大醉閉齋獨眠或見一大虵垂頭床邊吐語林曰周伯仁過江恒醉止有姊喪三日醒姑喪三日醒也又曰周伯仁在中朝能飲一斛酒過江雖日醉然未嘗飲一斛以無其對也後有舊對忽從北來相得欣然乃出二斛酒共飲之既醉伯仁得眠眠覺問共飲者何在曰西廂問得轉不荅不得轉伯仁曰異事使視之脅腐而死十洲記曰瀛州者玉膏如酒味名曰玉酒飲數升輒醉令人長生俗記曰宋禕死後葬在金城南山對琅琊郡門袁山松為琅琊太守每醉輒乘輿上宋禕冢作行路難歌列子曰子產相鄭有兄曰公孫朝好酒朝之室藂酒千鍾積麴成封糟糠之氣逆於人鼻方其荒醉不知世道之安危魯連子曰楚王成章華臺酌諸侯酒魯君先至悅之故醉與之大曲之弓不琢之璧已而悔之魯君懼乃歸之莊子曰醉者之墜車也希死形體與人同其悟物與人異則其神者全也屍子曰赤縣洲者寔為崑崙之墟其東則滷水島山左右蓬萊玉紅之草生焉食其一實醉臥三百歲而寤韓子曰楚共王與晉厲公戰於鄢陵楚師敗績共王傷目司馬子反渴而求飲穀陽樹操觴而進子反王欲復戰召子反議子反醉乃辭以疾王入其幕酒臭旋師而斬韓子曰紹緇昧醉而忘其裘梁君曰醉足以亡裘乎, SBCK: ''}
  - {type: variant, offset: 2932, length: 3, content: 玄石起, WYG: 答曰民欽道嗜味昨奉敎乃守旦出門}
