  - {type: variant, offset: 31, length: 0, content: '', SBCK: 瑛音英􅀇宗第二子也景雲元年封眞定郡王開元三年立爲皇太子母趙麗妃夲􅇊人有才貌善歌舞􅀇宗在潞州得幸及武惠妃寵幸麗妃恩乃漸㢮惠妃女咸冝公主出降於楊洄洄希惠妃}
  - {type: variant, offset: 31, length: 1, content: 之, WYG: 四}
  - {type: variant, offset: 31, length: 0, content: '', krp: 瑛音英玄宗第二子也景雲元年封眞定郡王開元三年立爲皇太子母趙麗妃夲伎人有才貌善歌舞玄宗在潞州得幸及武惠妃寵幸麗妃恩乃漸㢮惠妃女咸冝公主出降於楊洄洄希惠妃}
  - {type: variant, offset: 32, length: 1, content: 德, SBCK: 旨規利於巳日求其短􅉲於惠妃惠妃泣訴於􅀇宗以太子結黨將害於妾母子亦指斥於至尊􅀇宗惑其言震怒謀於宰相意將廢黜中書令張九齡奏曰陛下纂嗣鴻業將三十年太子巳下常不離深宫日受聖訓今天下之人皆慶陛下享國日乆子孫蕃育不聞有過陛下奈何以}
  - {type: variant, offset: 32, length: 1, content: 德, WYG: 唐}
  - {type: variant, offset: 32, length: 1, content: 德, krp: 旨規利於巳日求其短譖於惠妃惠妃泣訴於玄宗以太子結黨將害於妾母子亦指斥於至尊玄宗惑其言震怒謀於宰相意將廢黜中書令張九齡奏曰陛下纂嗣鴻業將三十年太子巳下常不離深宫日受聖訓今天下之人皆慶陛下享國日乆子孫蕃育不聞有過陛下奈何以}
