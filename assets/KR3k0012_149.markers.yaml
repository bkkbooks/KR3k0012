  - {type: variant, offset: 305, length: 709, content: 子延光三年安帝乳母王聖大長秋江京中常侍樊豐譖太子乳母王聖舅廚監邴吉殺之太子數為歎息王聖等懼有後禍遂與豐京共陷太子太子坐廢為濟陰王明年三月安帝崩北鄉侯立濟陰王以廢黜不能上殿親臨梓宮悲號不食內外群僚莫不哀之及北鄉侯薨車騎將軍閻顯及江京與中常侍劉安陳達等白太后秘不發喪而更徵立諸國王子乃閉宮門屯兵自守十一月丁亥京師及郡國十六地震是夜中黃門孫程等十九人共斬江京劉安陳達等迎濟陰王於德陽殿西鍾下即皇帝位年十一魏志曰文帝為五官將而臨淄侯植才名方盛各有黨與有奪文之議文帝使人問賈詡自固之術詡曰穎將軍恢崇德度躬素士之業朝夕孜孜不違子道如此而已文帝從之深自砥礪太祖又嘗屏除問詡默然不對太祖曰與卿言而不荅何也詡曰屬有思故不即對耳太祖曰何思詡曰袁本初劉景升父子也太祖大笑於是太子遂定魏略曰太祖不立太子太子自疑是時有高元昌者善相人乃呼問之對曰其貴乃不可言因問壽幾何元昌曰其壽至四十當有小恙過是無憂後無幾而立太子也世語曰辛毗女憲英適太常羊耽外孫夏侯湛為其傳曰憲英聰明有才鑒初文帝與陳思王爭為太子既而文帝得立抱毗頸而告之曰辛君知我喜不毗以告憲憲歎曰太子代君主宗廟社稷也代君不可以不慼主國不可以不懼宜慼而喜何以能久魏其不昌乎魏志曰明帝文帝太子也生而太祖愛之常念在左右魏書曰明帝生數歲而有歧嶷之姿武帝異之曰我基於爾三世矣每朝燕會同與侍中近臣並列帷幄好學多識特留意於法理魏略曰文帝以郭后無子詔使子明帝帝以母不以道終意甚不平後不獲已乃敬事郭后旦夕因長御問起居郭后亦自以無子遂加慈愛文帝始以帝不悅有意欲以他姬子京兆王為嗣故不拜太子魏末傳曰明帝嘗從文帝獵見子母鹿文帝射殺鹿母使帝射鹿子帝不從曰陛下殺其母臣不忍復射其子因涕泣文帝即放弓箭以此深奇之而建樹之意定也, SBCK: 弟附}
