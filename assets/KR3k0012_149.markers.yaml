  - {type: variant, offset: 2216, length: 289, content: 二年康帝疾篤左光祿大夫領司徒謨尚書令恢等上䟽曰臣聞皇義玄邈五帝攸往淳風澆散三王傳嗣欲令國有常居民有定奉關諸盛衰不易之道也伏惟皇子天挺奇表隆準豐下歧嶷之姿彰於始年大成之風顯於朞月宜建立儲宮允副民望請下太史擇吉日告宗廟備禮儀奉行奏可後魏書曰太宗明元皇帝道武之長子初帝母既賜死大祖乃召帝告曰昔漢武帝將立其子而殺其母不令婦人後與國政使外家無亂汝當繼統吾故遠同漢武為長久之計帝素純孝哀泣不能自勝太祖怒召之帝欲入左右曰孝子事父小杖則受大杖避之今陛下怒盛入或不測陷帝於不義不如且出待和解而進不晚也帝從之乃遊行於外及元紹之逆也帝還而誅之天賜六年即皇帝位又曰景穆皇帝太武皇帝之長子也母曰賀夫人延和, WYG: ''}
