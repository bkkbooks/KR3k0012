  - {type: variant, offset: 752, length: 7, content: 辛君知我喜不毗, WYG: 懿宗恭惠皇帝宣宗長子母曰元昭皇太后晁氏太和七年生於藩邸封鄆王大中十三年宣遺詔立為皇太子姿貌魁傑有異稠人藩邸時嘗被疾郭妃侍醫見黄龍出入於卧内妃}
