  - {type: variant, offset: 33, length: 1, content: 一, WYG: 書}
  - {type: variant, offset: 34, length: 0, content: '', SBCK: 日之間廢棄三子且太子國夲難於動揺昔晉獻公惑寵嬖之言太子申生憂死國乃大亂漢武威加六合受江充巫蠱之事禍及太子遂至城中流血晉惠帝有賢子爲太子容賈后之􅉲以至喪亡隋文帝取寵婦之言廢太子勇而立􅀳王廣遂失天下由此而論之不可不愼今太子旣長無過二王又賢臣待罪左右敢不詳悉􅀇宗黙然事且寢二十五年四月楊洄又構於惠妃言瑛兄弟三人與太子妃兄駙馬薛鏽常構異謀􅀇宗遽召宰相籌之李林甫}
  - {type: page-break, offset: 34, content: '', id: KR3k0012_SBCK_149-1b}
  - {type: variant, offset: 34, length: 0, content: '', krp: 日之間廢棄三子且太子國夲難於動揺昔晉獻公惑寵嬖之言太子申生憂死國乃大亂漢武威加六合受江充巫蠱之事禍及太子遂至城中流血晉惠帝有賢子爲太子容賈后之譖以至喪亡隋文帝取寵婦之言廢太子勇而立晉王廣遂失天下由此而論之不可不愼今太子旣長無過二王又賢臣待罪左右敢不詳悉玄宗黙然事且寢二十五年四月楊洄又構於惠妃言瑛兄弟三人與太子妃兄駙馬薛鏽常構異謀玄宗遽召宰相籌之李林甫}
  - {type: punctuation, offset: 35, content: 《, id: KR3k0012_CHANT_149-bkkpn7}
  - {type: variant, offset: 35, length: 0, content: '', SBCK: 此蓋陛下家事臣下不合叅知􅀇宗意乃決矣使中官宣詔於宫中並廢爲庶人天下之人不見其過咸惜之寳應元年詔贈皇太子又曰靖恭太子琬􅀇宗第六子也天寳十四年安禄山反於范陽其月制以琬爲征討元帥髙仙芝爲副令仙芝徴河隴兵募屯於陜郡以禦之數}
  - {type: variant, offset: 35, length: 3, content: 日重光, WYG: 廢太子瑛音英𤣥宗第}
  - {type: variant, offset: 35, length: 0, content: '', krp: 此蓋陛下家事臣下不合叅知玄宗意乃決矣使中官宣詔於宫中並廢爲庶人天下之人不見其過咸惜之寳應元年詔贈皇太子又曰靖恭太子琬玄宗第六子也天寳十四年安禄山反於范陽其月制以琬爲征討元帥髙仙芝爲副令仙芝徴河隴兵募屯於陜郡以禦之數}
  - {type: variant, offset: 36, length: 2, content: 重光, SBCK: 琬薨素有雅􅁛風格秀整時士庶兾琬有所成功忽然殂謝逺近咸失望焉贈靖恭太子葬於西原又承天皇帝倓音談旣爲張良娣所構粛宗怒而幽死又欲揺動代宗時代宗收復兩京遣判官李泌音秘入朝獻捷從容語及倓事泌曰臣㓜稺時念得黄臺􅋎辞陛下聞其􅀃乎髙宗大帝有子八人天后所生四子自爲行第故睿宗第四長曰孝敬皇帝􅀪爲太子監國仁明孝悌天后方圖臨朝乃鴆殺之立雍王賢毎自憂惕知必不保全與}
