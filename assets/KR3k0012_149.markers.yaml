  - {type: variant, offset: 2500, length: 0, content: '', SBCK: 閻氏帝少聦逹太武常置左右號丗嫡皇孫又曰劉尼代人也父祖皆爲方面大人少壯徤有膂力丗祖善之拜羽林中郎宗愛旣殺南安王余於東廟秘之唯尼知之尼勸愛立髙宗愛自以負罪於景穆聞而驚曰君大癡人皇孫􅀂立豈忘正平時事乎尼以狀告殿中尚書源}
  - {type: page-break, offset: 2500, content: '', id: KR3k0012_SBCK_149-4b}
  - {type: variant, offset: 2500, length: 0, content: '', krp: 閻氏帝少聦逹太武常置左右號丗嫡皇孫又曰劉尼代人也父祖皆爲方面大人少壯徤有膂力丗祖善之拜羽林中郎宗愛旣殺南安王余於東廟秘之唯尼知之尼勸愛立髙宗愛自以負罪於景穆聞而驚曰君大癡人皇孫若立豈忘正平時事乎尼以狀告殿中尚書源}
  - {type: variant, offset: 2501, length: 4, content: 夫人延和, SBCK: 仍謀於南部尚書陸麗麗曰唯有密奉皇孫耳於是賀與長孫渇侯嚴兵守衛尼與麗迎髙宗於􅁐中麗抱髙祖馬上入於京城尼馳還東廟大呼曰宗愛殺南安王大逆不道皇孫巳登大位有詔􅀫衛之士皆可還宫衆咸唱万歳後周書曰建徳二年夏六月壬子皇孫􅄛生文武官普加一陛蕭子顯齊書曰文惠太子長懋音戊字雲喬丗祖長子也丗祖年未弱冠而生太子爲太祖所愛建元元年封南郡王邑二千户江左未有嫡皇孫封王始自此也又曰鬱林王昭業字元尚文惠太子長子也小名法身文惠太子薨立昭業爲皇太孫居東宫昭業少美容止好􅀠書丗祖勑皇孫手書不得妄出以貴重之唐書貞觀十七年誕皇太孫宴宫寮於􅀪教門太宗幸東宫自殿北門入謂宫臣曰頃來生業稍可非乏酒食而唐突公等宴㑹朕有甲觀之慶故就卿爲樂耳謂太子曰尓國之儲二府藏是同金玉綺羅不足爲賜但先聖典籍可爲鏡誡耳因賜尚書毛詩孝經各一部又曰永淳}
  - {type: page-break, offset: 2501, content: '', id: KR3k0012_SBCK_149-5a}
