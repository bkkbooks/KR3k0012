  - {type: variant, offset: 4501, length: 1, content: 又, SBCK: 及諸王等妃旣是百官子女禮合避人今追就本縣及過本司未爲得所其應預妃者冝令所司具名録奏各令女及近親隨使於命婦朝堂待進止良娣附漢書曰衛太子史良娣宣帝妃祖母也太子有妻妾凡三等子皆稱皇孫史良娣家夲魯國母貞君兄恭元鼎四年入爲良娣生男進號史皇孫武帝末巫蠱事起衛太子及良娣史皇孫皆遭害沈約宋書曰大明五年上更爲太子置內職二等曰保林曰良娣納南中郎長史太山羊贍女爲良娣蕭子顯齊書曰建元三年太子宫置三內職良娣比開國侯唐書肅宗張皇后天寳中選入太子宫爲良娣唐書曰順宗莊憲皇后王氏㓜以良家子入宫爲才人順宗在藩邸時代宗以才人賜之生憲宗皇帝立爲􅐐人順宗􅂛儲􅁽爲良娣􅐐子附後魏史曰劉芳沉雅方正太子恂之在東宫髙祖欲爲納芳女芳辭以年貌非冝更勑芳舉其宗女芳乃稱其族子長文之女髙祖乃爲恂娉之與鄭懿女對爲左右􅐐子焉保林附王隱晉書曰愍懷太子廢爲庶人考竟太子母淑妃謝􅅼及太子所幸保林蔣俊及母三弟沈約宋書曰大明五年上爲太子納冝都守􅀽僧惠女爲保林蕭子顯齊書}
