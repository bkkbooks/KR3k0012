  - {type: variant, offset: 1076, length: 0, content: '', WYG: 帝詔以太常成粲為太孫太傅前城閣校尉梁柳為太孫太傅又曰惠帝使使持節兼司空任城王濟䇿命愍懷皇太子前妃為皇太孫太妃是日也以復妃告於太廟後魏書曰高宗文成皇帝景穆帝之長子也母曰閻氏帝少聰達太武常置左右號世嫡皇孫又曰劉尼代人也父祖皆為方面大人少壯健有膂力世祖善之拜羽林中郎宗愛既殺南安王餘於東廟秘之唯尼知之尼勸愛立高宗愛自以負罪於景穆聞而驚曰君大癡人皇孫若立豈忘生平時事乎尼以狀告殿中尚書賀源仍謀於南部尚書陸麗麗曰唯有密奉皇孫耳於是賀與長孫渴侯嚴兵守衞尼與麗迎高祖於苑中麗抱高祖馬上入於京城尼馳還東廟大呼曰宗愛殺南安王大逆不道皇孫已登大位有詔宿衞之士皆可還宫衆咸唱萬嵗後周書曰建德二年夏六月壬子皇孫衍生文武官普加一階蕭子顯齊書曰文惠太子長懋字雲喬世祖長子也世祖年未弱冠而生太子為太祖所愛建元元年封南郡王邑二千戸江左未有嫡皇孫封王始自此也又曰欝林王昭業字元尚文惠太子長子也小名法身文惠太子薨立昭業為太孫居東宫昭業少美容止好𨽻書世宗勅皇孫手書不得妄出以貴重之唐書曰貞觀十七年誕皇太孫宴宫寮於𢎞教門太宗幸東宫自殿北門入謂宫臣曰頃來生業稍可非乏酒食而唐突公等宴會審有甲觀之慶故就卿為樂耳謂太子曰爾國之儲貳府藏是同金玉綺羅不足為賜但先聖典籍可為鑑誡耳因賜尚書毛詩孝經各一部又曰永淳元年立皇孫重昭為太孫將置府寮土召吏部侍郎裴敬彛郎中王方慶問曰今立太孫前代故事如何方慶進曰臣按周禮有嫡孫漢魏以來皇太子在亦不立太孫但封王耳今陛下肇建皇孫創斯盛典所以彰子孫千億之盛福祚靈長之應也上悦太子妃白虎通云妃者匹也妃匹者何謂相與偶也然古者天子後宫嫡庶皆曰妃史記曰黄帝有四妃帝嚳有四妃虞舜有二妃周以天子之正嫡為王后秦稱皇帝因稱皇后以太子之正嫡稱妃漢因之漢書外戚傳曰太子妃有良娣有孺子妻妾凡三等是也魏晉以後咸尊之漢書曰孝景薄皇后孝文薄太后家女也景}
