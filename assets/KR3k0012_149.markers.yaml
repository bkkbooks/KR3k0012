  - {type: variant, offset: 1073, length: 0, content: '', SBCK: 成都河間王復廢覃爲清河王立成都爲皇太弟晉陽秋曰永興元年河間王顒表拜成都王頴爲皇太弟司空越髙密王簡平昌公模等以大駕北征廢皇太弟頴立預章王熾爲皇太弟崔鴻十六國春秋曰晉成都王頴爲皇太弟領丞相自鄴懸秉朝政事無大小皆先􅀜諮唐書曰武宗肅皇帝穆宗第五子母曰宣懿皇后韋氏長慶元年封頴王開成五年文宗疾􅀨軍中尉仇士良魚志􅀪矯詔迎頴王於十六宅曰朕自嬰疾􅐄有加無瘳懼不能躬惣万機日􅁵庶政稽于古訓謀及大臣用建親賢以貳神噐親弟頴王湹音􅆵昔在藩邸與朕甞同師訓動成儀矩性禀寛仁俾奉昌圖必諧人欲可立爲皇太弟應軍國政事便令句當百辟卿士冝竭迺心又曰昭宗景文皇帝懿宗第七子母曰惠安太后王氏帝於僖宗母弟也尤相親睦自艱難播越甞隨侍左右僖宗不豫遺詔立爲皇太弟太孫附王隱晉書曰趙王倫旣廢賈后皇帝使使持節追復皇太子拜皇孫臧爲臨淮王尚爲襄陽王又詔立臧爲皇太孫文武官屬即轉爲太孫官屬車服侍從皆愍懷之舊也趙王倫篡位太孫廢爲濮陽王薨惠帝復作立襄陽王尚爲皇太孫薨謚冲皇太孫并追謚前太孫爲哀皇太孫晉惠帝起居注曰拜皇孫臧爲臨淮王尚爲襄陽王又詔臧爲皇太孫臧廢到銅駞街宫人嚴從皆哽咽路人收淚焉桒復生於西廂長丈餘太孫廢乃枯}
