  - {type: variant, offset: 1133, length: 0, content: '', WYG: 有萬一援不朽於黄泉由是選后入太子宫時年十三吳志曰太子孫和賜死和與妃張决别張曰吉㓙當相隨終不獨生活也亦自殺蜀志曰後主敬哀皇后車騎將軍張飛女也章武元年納為太子妃建興元年立為皇后王隱晉書曰楊元后武帝娶之生惠帝謀婚乆不決上欲娶衞瓘女后欲娶賈充女賈妻酷妬宿著上曰衞公女有五可賈公女有五不可衞家種賢而多子端正而長白賈家種妬少子酷而短黒郭必欲使所生女配太子既先使人言猶輸寶於楊后固啓必成本當娶后妹午午年十二小太子一嵗定見短小未勝衣更娶南風南風時年十五大太子二嵗上乃聽之帝知太子不慧又聞衞瓘言故試之盡召東宫大小官屬為作飲食而密封詔事使太子決停信待之賈妃大懼請外人作答詔草給使張泓行還啓賈妃曰太子不學而答詔引義必致責作草主更益譴負不如直以意答賈妃大喜語泓便為我好荅得富貴與汝共之泓素有才答之過高武帝大喜於是賈妃諷㫖於外説張泓孝亷郎才語領軍舉髙第充遣語女曰衞瓘老奴幾破汝家事於是賈妃銜之又曰賈妃酷妬手斫數人或以㦸摘音擲孕妾子乃隨刃墮地上聞大怒垂廢之荀朂深救之}
