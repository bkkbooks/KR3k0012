  - {type: variant, offset: 810, length: 204, content: 子也生而太祖愛之常念在左右魏書曰明帝生數歲而有歧嶷之姿武帝異之曰我基於爾三世矣每朝燕會同與侍中近臣並列帷幄好學多識特留意於法理魏略曰文帝以郭后無子詔使子明帝帝以母不以道終意甚不平後不獲已乃敬事郭后旦夕因長御問起居郭后亦自以無子遂加慈愛文帝始以帝不悅有意欲以他姬子京兆王為嗣故不拜太子魏末傳曰明帝嘗從文帝獵見子母鹿文帝射殺鹿母使帝射鹿子帝不從曰陛下殺其母臣不忍復射其子因涕泣文帝即放弓箭以此深奇之而建樹之意定也, WYG: 弟}
