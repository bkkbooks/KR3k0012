  - {type: variant, offset: 2340, length: 146, content: 道武之長子初帝母既賜死大祖乃召帝告曰昔漢武帝將立其子而殺其母不令婦人後與國政使外家無亂汝當繼統吾故遠同漢武為長久之計帝素純孝哀泣不能自勝太祖怒召之帝欲入左右曰孝子事父小杖則受大杖避之今陛下怒盛入或不測陷帝於不義不如且出待和解而進不晚也帝從之乃遊行於外及元紹之逆也帝還而誅之天賜六年即皇帝位又曰, SBCK: ''}
