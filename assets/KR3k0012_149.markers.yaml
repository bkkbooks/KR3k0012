  - {type: variant, offset: 1132, length: 0, content: '', WYG: 妃帝即位立為皇后又曰孝武陳皇后長公主嫖之女也初武帝得立為太子長公主有力取主女為妃及帝即位立為皇后又曰元帝為太子司馬良娣死後太子悲恚發病忽忽不樂宣帝令皇后擇後宫家人子可以娛侍太子者王禁女政君預焉時預擇者五人政君獨衣絳縁諸于諸于大掖衣也使侍中杜輔送入太子宫見於丙殿得御幸有身立為太子妃又曰孝成許皇后平恩侯家女也元帝選配皇太子初入太子家上令中常侍黄門親近者侍送還白太子忻説狀元帝喜謂左右酌酒賀我左右皆稱萬嵗及成帝即位立許妃為皇后又曰孝哀帝傅皇后定陶傅太后從弟子也哀帝為定陶王時傅太后欲重親取以配王王入為太子傅氏女為妃哀帝即位立為皇后後漢書曰明帝馬皇后伏波將軍援小女也初援征五溪蠻卒於師虎賁中郎將梁松黄門侍郎竇氏等因譛之由是家益失勢又數為權貴所侵侮后從兄嚴不勝憂憤白太夫人絶竇氏婚求進女掖庭乃上書曰臣叔父援辜恩不報而妻小特獲恩全戴仰陛下為天為父竊聞太子諸王妃匹未備援有三女大者十五次者十四小者十三儀狀髪膚上中以上皆孝順小心婉順有禮願下相工簡其可否}
  - {type: page-break, offset: 1132, content: '', id: KR3k0012_WYG_149-9b, image: WYG0894/WYG0894-0377d.png}
