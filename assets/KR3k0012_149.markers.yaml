  - {type: variant, offset: 739, length: 2, content: 既而, WYG: 容賈后之譖以至喪亡隋}
  - {type: variant, offset: 743, length: 0, content: '', WYG: 取寵婦之言廢太子勇而立晉王廣遂失天下由此而論之不可不慎今太子既長無過二王又賢臣待罪左右敢不詳悉𤣥宗黙然事且寢二十五年四月楊洄又搆於惠妃言瑛兄弟三人與太子妃兄駙馬薛鏞常搆異謀𤣥宗遽召宰相籌之李林甫曰此盖陛下家事臣下不合叅知𤣥宗意乃決矣使中官宣詔於宫中廢以為庶人天下之人不見其過咸惜之寶應元年詔贈皇太子又曰靖恭太子琬𤣥宗第六子天寶十四年安禄山反於范陽其月制以琬為征討元帥高仙芝為副令仙芝募徴河隴兵屯於陕郡以禦之數日琬薨琬素有雅稱風格秀整當時士庶冀琬有所成功忽然殂謝遠近咸失望焉贈靖恭太子葬於西原又曰承天皇帝倓音談既為張良娣所搆肅宗怒而幽死又欲揺動代宗時代宗收復兩京遣判官李泌入朝獻捷從容語及倓事泌曰臣幼穉時念}
  - {type: page-break, offset: 743, content: '', id: KR3k0012_WYG_149-2b, image: WYG0894/WYG0894-0374b.png}
  - {type: page-break, offset: 743, content: '', id: KR3k0012_WYG_149-3a, image: WYG0894/WYG0894-0374c.png}
  - {type: variant, offset: 744, length: 0, content: '', WYG: 黄臺𤓰辭陛下聞其說乎高宗大帝有子八人太后所生四子自為行第故睿宗第四長曰孝敬皇帝𢎞為太子監國仁明孝悌天后方圖臨朝乃鴆殺之}
  - {type: punctuation, offset: 745, content: ，, id: KR3k0012_CHANT_149-bkkpn196}
  - {type: 'tls:seg', offset: 745, content: '', id: KR3k0012_CHANT_149-7a.10}
  - {type: variant, offset: 745, length: 0, content: '', WYG: 雍王賢每自憂惕知必不保全與二弟同侍父母之側無由敢言乃作黄臺𤓰辭令樂工歌之冀天后聞之哀愍辭曰種𤓰黄臺下𤓰熟子離離一摘使𤓰好再摘令𤓰稀三摘尚自可四摘}
  - {type: page-break, offset: 745, content: '', id: KR3k0012_WYG_149-3b, image: WYG0894/WYG0894-0374d.png}
  - {type: variant, offset: 746, length: 2, content: 毗頸, WYG: 蔓歸太子賢終為天后所逐死於黔中陛下有今日運阼已一摘矣慎無再摘上愕然曰卿安得有是言自是奪宗之計不行又曰憲宗章武皇帝順宗長子母王太后六七歲時德宗抱置膝下問曰汝誰子在吾懷對曰是第三箇天子德宗異}
  - {type: variant, offset: 749, length: 1, content: 告, WYG: 憐}
  - {type: variant, offset: 751, length: 0, content: '', WYG: 貞元四年封廣陵王順宗即位之年冊封為皇太子又}
  - {type: page-break, offset: 751, content: '', id: KR3k0012_WYG_149-4a, image: WYG0894/WYG0894-0375a.png}
