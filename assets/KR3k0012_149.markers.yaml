  - {type: variant, offset: 2709, length: 4, content: 初夢為日, SBCK: 絶竇氏㛰求進女掖庭乃上書曰臣叔父援辜恩不報而妻子特獲恩全戴仰陛下爲天爲父竊聞太子諸王妃疋未備援有三女大考十五次者十四小者十三儀狀髮膚上中以上皆孝順小心婉順有禮願下相工簡其可否如有萬一援不朽於黄泉由是選后入太子宫時年十三呉志曰太子孫和賜死和與妃張部别張曰􅁻凶當相隨終不獨生活也亦自殺蜀志曰後主敬哀皇后車􅀐將軍張飛女也章武元年納爲太子妃建興元年立爲皇后王隱晉書曰楊元后武帝娶之生惠帝謀㛰乆不決上欲娶衛瓘女后欲娶賈充女充妻郭酷妬􅀫著上曰衛公女有五可賈公女有五不可衛家種賢而多子端正而長白賈家種妬少子酷而短黒郭必欲使}
