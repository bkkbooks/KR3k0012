  - {type: variant, offset: 765, length: 0, content: '', WYG: 慎勿言又曰僖宗恭定皇帝懿宗第五子母曰惠安皇后王氏初封晉王懿宗大漸制曰朕守大器之重居兆人之上日懼一日如履如臨旰昃勞懷寢興思治涉道猶淺道化未孚而攝養乖方寒暑成厲實有慮於闕政且無暇而怡神考兹舊章謀於卿士思闡鴻業式建皇儲第五男晉王孝敬溫恭寛和博厚日新令德天假英姿言皆中規動必由禮俾崇邦本允叶人心宜立為}
