  - {type: variant, offset: 2717, length: 8, content: 床下日化為龍繞己, SBCK: 楊后固啓必成夲當娶后妹午午年十二小太子一歳定見短小未勝衣更娶南風南風時年十五大太子二歳上乃聽之帝知太子不惠又聞衛瓘言故試之盡召東宫大小官屬爲作飲食而密封詔事使太子決停信待之賈妃大懼請外人作荅詔草給使張􅇦行還啓賈妃曰太子不學而荅詔引義必致責作草主更益譴􅀒不如直以意荅賈妃大喜語􅇦便爲我好荅得冨貴與汝共之􅇦素有才荅之髙過武帝大喜於是賈妃諷旨於外􅀃張􅇦孝廉郎才語領軍舉髙弟充遣語女曰衛瓘老奴幾破汝家事於是賈妃銜之又曰賈妃酷妬手斫}
