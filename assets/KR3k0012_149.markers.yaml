  - {type: variant, offset: 2609, length: 215, content: 太子謂言者曰為人臣不實若此豈是忠乎吾初聞有疑但帝決行耳幾誤人大事言者復何面目見帝也正平元年六月薨於東宮時年二十四賜謚曰景穆皇太子高宗即位追尊為景穆皇帝廟號恭宗又曰世宗宣武皇帝孝文皇帝第二子也母曰高夫人初夢為日所逐避於床下日化為龍繞己數匝遂有娠生帝於平城宮二十一年立為皇太子又曰肅宗孝明帝諱詡世宗第二子也延昌元年立為皇太子二年世宗幸東宮召崔光與黃門甄琛廣陽王淵等並賜坐詔光曰卿是朕西臺大臣當今為太子師傅光起拜固辭詔不許即命肅宗出從者, WYG: ''}
  - {type: variant, offset: 2611, length: 2, content: 謂言, SBCK: 妃有良娣有􅐐子妻妾凡三等是也魏晉以後咸遵之漢書曰孝景薄皇后孝文薄太后家女也景帝爲太子時薄太后取以爲太子妃帝即位立爲皇后又曰孝武陳皇后長公主嫖疋妙切女也􅀄武帝得立爲太子長主有力取主女爲妃及帝即位立爲皇后又曰元帝爲太子司馬良娣死後太子悲恚發病忽忽不樂宣帝令皇后擇後宫家人子可以娱侍太子}
