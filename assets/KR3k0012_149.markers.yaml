  - {type: variant, offset: 2726, length: 2, content: 匝遂, SBCK: 人或以㦸擿音擲孕妾子乃隨刃墮地上聞大怒垂廢之荀勗深救之故得不廢晉氏后妃別傳曰武悼皇后武帝繼室也太傅楊駿女賈庶人爲太子妃時數以肆情性忌妬失帝意帝欲廢焉后爲妃陳請曰魯公有勲於王府妃親則其子妬忌婦人之常事不足以一眚而忘大德帝納焉王隱晉書曰􅀄丗祖遣才人謝􅅼給事惠帝因是}
