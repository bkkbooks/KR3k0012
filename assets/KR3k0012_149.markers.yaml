  - {type: variant, offset: 4203, length: 186, content: 時太宗功業日盛建成與齊王元吉潛謀作亂九年六月三日太宗密奏建成元吉淫亂後宮因自陳曰臣於兄弟無絲毫所負今欲殺臣似為世充建德報讎臣今枉死永違君親魂歸地下實亦恥見諸賊高祖省之愕然報曰明日當勘問汝宜早參四日太宗將左右九人至玄武門自衛高祖已召裴寂蕭瑀竇延陳叔達封倫宇文士及顏師古等欲令窮覆其事建成元吉行至臨湖殿覺變即迴馬將東歸宮府太宗隨而呼之元吉馬上張弓再三不彀太宗乃射之建成應弦而斃, SBCK: 妃}
  - {type: variant, offset: 4203, length: 0, content: '', WYG: 及諸王等妃既是百官子女禮合避人今遣就本縣及過本司未為得所其應預選者冝令所司具名録奏各令女及近親隨使於命婦朝堂待進止良娣漢書曰衞太子史良娣宣帝妃祖母也太子有妻妾凡三等子皆稱皇孫史良娣家本魯國母貞君兄恭元鼎四年入為良娣生男進號史皇孫武帝末巫蠱事起衞太子及良娣史皇孫皆遭害沈約宋書曰大明五年上更為太子置内職二等曰保林曰良娣納南中郎長史太山羊瞻女為良娣蕭子顯齊書曰建元三年太子宫置三内職良娣比開國侯唐書曰肅宗張皇后天寶中選入太子宫為良娣唐書曰順宗莊憲皇后王氏幼以良家子入宫為才人順宗在藩邸}
