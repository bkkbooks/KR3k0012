  - {type: variant, offset: 2826, length: 1164, content: 人勑以光為傅之意令肅宗拜光光又拜辭不當受太子拜復不蒙許肅宗遂南面再拜詹事王顯啟請從太子拜於是宮臣畢拜光北面立不敢荅拜唯西面拜謝而出又曰廢太子生而母死文明太后撫視之常置左右詔曰昔塗山有育美名列於夏典任姒作配昌發顯於周書故能緝熙丕緒祚延八百自元子誕育於今四載而名表未孚於四方茂實未昭於朝掖非所以憲章遠猷允光禮度者也太皇太后親發明旨為之立名依德協義名恂字元道國祚永隆儲貳有寄無窮之兆於是而始乃大赦天下太和十七年七月癸丑立恂為皇太子高祖每歲征幸常留守恂不好書學體貌肥大深忌河洛暑熱意每追樂北方庶子高道悅數苦諫恂甚銜之乃手刃道悅於禁中高祖引群臣於清徽堂議廢之為庶人置之河陽後謀逆賜死梁書曰天監十四年正月朔旦帝臨軒冠太子於太極殿舊制太子著遠遊冠金蟬翠緌纓至是詔加金愽山又曰昭明太子母丁貴嬪有疾太子還永福省侍疾衣不解帶及薨步從喪還宮至殯水漿不入口每哭慟絕武帝命中書舍人顧協宣旨曰毀不滅性聖人之制不勝喪比於不孝有我在郍得自毀如此可即強進飲粥太子奉勑乃進數合自是至葬日進麥粥一升武帝又勑曰聞汝所進過少轉羸瘦我比更無病正為汝如此胸中亦圯塞成疾應強加饘粥不使我恒爾懸心雖屢奉勸逼終喪日止一溢不嘗菜菓之味體素壯腰帶十圍至是減削過半每入朝士庶見者莫不下泣又曰昭明太子性愛山水於玄圃穿築更立亭館與朝士名素者遊其中嘗泛舟後池番禺侯軌盛稱此中宜奏女樂太子不荅詠左思招隱詩云何必絲與竹山水有清音軌慚而止又曰昭明太子好士愛文劉孝綽與陳郡殷芸吳郡陸倕琅琊王筠彭城劉洽等同見禮待太子起樂賢堂後周書曰宣帝諱贇高祖長子帝即位多過惡初帝之在東宮也高祖慮其不堪承嗣遇之甚嚴朝見進止與諸臣無異雖隆寒盛暑亦不得休息性既嗜酒高祖遂醪醴不許至東宮帝每有過輒加捶扑嘗謂之曰古來太子被廢者幾人餘兒豈不堪立邪於是遣東宮官屬錄帝言語動作每月奏聞帝憚高祖嚴矯情脩飾以是過惡遂不聞隋書曰煬帝高祖第二子也母文獻獨孤皇后上美姿儀少敏惠高祖及后於諸子中特鍾愛高祖幸上所居第見樂器絃多斷絕又有塵埃若不用者以為不好聲伎之玩上尤自矯飾當時稱為仁孝及太子勇廢立為皇太子唐書曰李綱隋開皇末為太子洗馬皇太子勇嘗以歲首宴宮臣左庶子唐令則自請奏琵琶又歌武媚娘之曲綱趨而出勇曰我欲為樂耳君勿多事及勇廢黜文帝召東宮宮屬切讓之無敢對者綱對曰今日之事乃陛下之過非太子之罪也太子才非上品性是常人若得賢明之士輔導之足堪繼嗣皇業方今多士盈朝當擇賢居任奈何以絃歌鷹犬之才日在其側致令至此乃陛下訓導不足豈太子之罪耶隋書曰元德太子昭煬帝長子也生而高祖命養宮中三歲時於玄武門弄石師子高祖與文獻后至其所高祖適患腰痛舉手憑后昭因避去如此者再三高祖歎曰天生長者誰復教乎由是大奇之高祖嘗謂曰當為爾娶婦昭應聲而泣高祖問其故對曰漢王未婚時恒在至尊所一朝娶便則出外懼將違離是以啼耳上歎其有至性特鍾愛焉煬帝即位便幸雒陽宮昭留守京師大業元年帝遣使者立為皇太子, WYG: 枚}
