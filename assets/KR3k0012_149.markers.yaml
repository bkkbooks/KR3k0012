  - {type: variant, offset: 1446, length: 308, content: 墮地又令人屠肉己自分齊手揣輕重斤兩不差云其母本屠家女也頗好遊宴或闕朝侍稍失儲副望賈后無子妬害滋甚九年正月月暈赤黃數重三月十八日榮陽河南潁川繁霜殺桑及姚李杏花尉氏雨血有聲若牛出許昌城夏桑生于東宮西廂日長尺餘數日枯日中若飛鷰者積數月漢中平中亦有此變皆為太子也賈后作頡子髻太子見頡之象也是時謠曰宮東馬子莫聾啌前至臘月纏汝鬉十一月天連大風發屋折樹十二月二十八日后遣宮婢齎書與太子云陛下昨夜不快汝可入朝太子如令請朝詔聽二十九日入朝賈后不見使婢陳儛賜棗酒強使飲辭不見聽太子醉賈后誣奏太子有悖書廢徙金墉城以千兵防送幽于許昌宮之別坊賈后與賈謐等早害太子以絕民望三月十四日矯詔使小黃門孫慮害太子賈后表以廣陵王禮殯趙王倫誅賈謐廢賈后帝乃, SBCK: ''}
