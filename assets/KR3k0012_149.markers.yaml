  - {type: variant, offset: 1434, length: 4, content: 小馬小牛, WYG: 注曰元帝大興五年上臨軒使䇿命拜晉王太子妃庾氏為皇太子妃晉孝武帝起居注曰納采聘太子妃百官朱服會於新安公主第秘書監王操之為主人晉孝武帝起居注曰上臨軒設懸而不樂遣兼司空上蔡公謝琰納太子妃王氏詔曰太子某婚禮即就仰祖宗遺烈憑道德之姿保傅將翼賢士竭誠慎行修德積善慶隆豈唯在乎天賚賜所以宣其恱情其便依舊又納左僕射王珣奏賜文武絹布百官詣止軍門上禮甲辰儀曰皇太子妃公妃夫人逢持節使者高車使者皆住車相揖妃主皆住車不揖東宫舊事曰司徒會稽王道子等啓曰皇太子係體宸極年德並茂宜簡國媛緝宣内敎故中書}
