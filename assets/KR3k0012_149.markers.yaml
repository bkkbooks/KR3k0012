  - {type: variant, offset: 1073, length: 0, content: '', WYG: 成都河間王復廢覃為清河王立成都王為皇太弟晉陽秋曰永興元年河間王顒表拜成都王穎為皇太弟司空越高密王簡平昌公模等以大駕北征廢皇太弟穎立豫章王熾為皇太弟崔鴻十六國春秋曰晉成都王穎為皇太弟領丞相自鄴懸秉朝政事無大小皆先闗咨唐書曰武宗肅皇帝穆宗第五子也母曰宣懿皇后􅅊氏長慶元年封潁王開成五年文宗疾兩軍中尉仇士良魚志𢎞矯詔迎潁王於十六宅曰朕自嬰疾疢有加無瘳懼不能躬總萬幾日釐庶政稽于古訓謀及大臣用建親賢以貳神器親弟潁王瀍昔在藩邸與朕躬同師訓動成儀矩性稟寛仁俾奉昌圖必諧人欲可立為皇太弟一應軍國政事便令勾當百辟卿士宜竭迺心又曰昭宗景文皇帝懿宗第七子母曰惠安太后王氏帝於僖宗母弟也尤相親睦自艱難播越嘗隨侍左右僖宗不豫遺詔立為皇太弟太孫王隱晉書曰趙王倫既廢賈后皇帝使使持節追復皇太子拜皇孫臧為臨淮王尚為襄陽王又詔立臧皇太孫文武官屬即轉為太孫官屬車服侍從皆愍懷之舊也趙王倫簒位太孫廢為濮陽王薨惠帝復阼立襄王尚為皇太孫薨諡冲皇太孫并追諡前太孫為哀皇太孫晉惠帝起居注曰拜皇孫臧為臨淮王尚為襄陽王又詔臧為太孫臧廢到銅駝街宫人哭侍從皆哽咽路人􅋞淚焉桑復生於西廂長丈餘太孫廢乃枯}
