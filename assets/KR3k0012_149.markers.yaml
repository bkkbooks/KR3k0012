  - {type: variant, offset: 1902, length: 420, content: 牢魂而有靈尚獲爾心文士傳曰賈謐與愍懷太子博爭道成都王厲聲曰皇太子國之儲君賈長淵何得無禮晉書曰明帝元皇帝長子也幼而聰哲為元帝所寵異年數歲常坐置膝上屬長安使來因問帝曰汝謂日與長安孰遠對曰不聞人從日邊來居然可知也元帝異之明日宴群僚又問之對曰日近元帝失色曰何乃異間者之言對曰舉目見日不見長安由是益奇之及帝即尊號立為皇太子已見明帝紀中何法盛晉中興書曰肅祖中宗長子也建武元年中宗為晉王拜王太子及踐尊號為皇太子冊曰於戲朕承天緒黍繼祖宗之洪基君臨于萬邦戰戰兢兢若涉淵水未有攸濟自古聖王敷宅四海莫不建立元子本枝百世今稽古授爾于儲宮以陪貳于朕躬欽哉爾其克念乃祖日新厥德何遠非佞何親非賢欽翼師傅以丕崇大化可不慎歟爾其敬之又曰孝宗穆皇帝諱聃康帝子也建元二年康帝疾篤左光祿大夫領司徒謨尚書令恢等上䟽曰臣聞皇義玄邈五帝攸往淳風澆散三王傳嗣欲令國有常居民有定奉關諸盛衰不易之道也伏惟皇子天挺奇表隆準豐下歧嶷之姿彰於始年大成之風顯於朞月宜建立儲宮允副民望請下太史擇吉日告宗, SBCK: ''}
