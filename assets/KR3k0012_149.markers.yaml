  - {type: variant, offset: 2732, length: 0, content: '', SBCK: 即位立爲皇太子爲娉王夷甫小女惠風賈后暴戾日甚乃表乞免爲庶人送太子妃王氏入金墉城妃父尚書令王衍見脅表離婚妃岀金墉城號哭感動左右道路爲之悲愴也又曰劉曜王弥等入洛盡將諸后妃去愍懷太子王妃抜刀向賊曰我司徒公女皇太子妃死則巳終不爲賊婦賊乃害之晉起居注曰元帝太興五年上臨軒使䇿命拜晉王太子妃􅁃氏爲皇太子妃晉孝武帝起居注曰納采聘太子妃百官朱服㑹}
  - {type: variant, offset: 2732, length: 0, content: '', krp: 即位立爲皇太子爲娉王夷甫小女惠風賈后暴戾日甚乃表乞免爲庶人送太子妃王氏入金墉城妃父尚書令王衍見脅表離婚妃岀金墉城號哭感動左右道路爲之悲愴也又曰劉曜王弥等入洛盡將諸后妃去愍懷太子王妃抜刀向賊曰我司徒公女皇太子妃死則巳終不爲賊婦賊乃害之晉起居注曰元帝太興五年上臨軒使䇿命拜晉王太子妃庾氏爲皇太子妃晉孝武帝起居注曰納采聘太子妃百官朱服㑹}
  - {type: variant, offset: 2733, length: 3, content: 平城宮, SBCK: 新安公主第秘書監王操之爲主人晉孝武帝起居注曰上臨軒設懸而不樂遣兼司空望蔡公謝琰納太子妃王氏詔曰太子諱㛰禮即就仰祖宗遺烈慿道德之資保傅將翼賢士竭誠愼行修德積善慶隆豈唯在予天賚錫所以宣其恱情其便依舊有賜左僕射王珣奏賜文武絹布百官詣止車門上禮甲辰儀曰皇太子妃公妃夫人逢持節使者髙車使者皆住車相揖妃主皆住車不揖東宫舊事曰司徒㑹稽王道子等啓曰皇太子係體宸極年德並茂冝簡國媛緝宣内教故中書令太常王獻之新安公主息女六行聿修四德光備加丗載簡正慶深積善僉曰冝作配儲宫正位中饋太元}
