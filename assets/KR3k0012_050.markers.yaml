  - {type: variant, offset: 1599, length: 641, content: 曰小廬山又古老相傳謂浮丘公上昇之所兼有道觀存焉靜福山衡山圖經曰靜福山在縣北五十里有梁廖沖者守清虛為本郡主簿西曹祭酒湘東王國常侍大同三年家於此山先天二年飛昇於此山後刺史蔣防敬慕高風刻石為碑方臺山蕭誠荊南志曰華容方臺山山出雲母土人採之先候雲所出之處於下掘取無不大獲往往有長五尺者可以為屏風當掘之時忌有聲響則所得麤惡攸縣雲陽山遁甲經云沙土之地雲陽之墟可以避時可以隱居雲陽氏古之仙人姓氏因號雲陽山在攸縣仙方記云南嶽山有福地有松膏實甘鮮可餌相傳云服食練行之人多來採此松膏而服之不苦澀與餘處松有別烏龍白騎山湘川記云汝城縣東有烏龍白騎山遠望似城有黑石如龍白石如馬羅列號曰烏龍白騎山丈斤山湘川記云耒陽文斤山上有石床方高一丈四面綠竹扶踈常隨風委拂此床天旱則禱雨時應石鷰山甄烈湘州記云石形似鷰大小如一山明雲淨即翩翩飛翔羅含湘中記云石鷰在零陵縣雷風則群飛翩翩然其土人未有見者今合藥或用萬歲山盛弘之荊州記曰桂陽萬歲山出靈壽草仙方服之不死又有話石山石有聲如人共話黃箱山盛弘之荊州記曰黃箱山一名黃岑山在東南三十里其山郴水所出即是五嶺之一從東第二騎田嶺是也又有浪井井三日一涌麓山盛弘之荊州記曰長沙西岸有麓山其下有精舍左右林嶺環廻泉澗精舍傍有礐石每至巖冬其不上停霜雪宗淵麓山記云山足曰麓蓋衡山之足也昭山宋永初山川記云昭山下有旋潭深無底是湘水最深之處昔有人舟覆於此潭其槽并甑有名題號後於洞庭尋得即知暗通也五溪山長沙圖經云五溪山在縣西北五十八里高二里北入朗州界昔吳黃龍三年潘濬將兵五萬討武陵五溪蠻在此山下立營截除徒黨因, WYG: ''}
