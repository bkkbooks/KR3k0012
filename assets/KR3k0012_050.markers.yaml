  - {type: variant, offset: 18, length: 0, content: '', WYG: 縣北七十里赫連勃勃北遊契吳而嘆曰美哉斯阜臨廣澤而帶清海吾行地多矣自嶺以北大河以南未有若斯之壯麗也可監山凉州記曰可監山一名都盧山皆涇水源與笄頭山連亘赫連定勝光二年畋于凉州登可監山望統萬城泣曰先帝若以朕承大業豈有今日在平凉縣縣接百泉界又云定據平凉登此山有羣狐繞之而鳴射之竟不得一定乃歎曰咄此亦怪事也石門山酈道元水經注灕水又東經石門口山髙嶮峻絶對岸若門故以得名疑即臯蘭山門也漢武元狩三年驃騎將軍霍去病出隴西至臯蘭謂是山之關塞矣燕然山漢書曰貳師將兵還至燕然山單于知漢軍勞倦自將五萬騎遮擊貳師軍大敗范蔚宗後漢書竇憲與單于戰於稽落山大破之降者前後二十餘萬人遂登燕然山去塞三千餘里刻石勒碑令班固作銘天山漢書曰漢使貳師將兵三萬騎出酒泉擊右賢王於天山得首數萬級而還又且西彌國王治天山東大谷去長安八千六百七十里續漢書曰竇固出塞至天山斬首千餘級水經注曰隂山故郎侯應言扵漢曰隂山東西一千餘里單于之苑囿也自武帝出師攘之於北漠匃奴過之未嘗不哭謂失此山也西河舊事曰天山髙冬夏常雪故曰白山山中有好木鐡匈奴謂之天山過之皆下馬拜在蒲海東一百里即漢貳師擊右賢王之處也山海經曰天山多金玉有雄黄莢水出焉而西流注於湯谷有神鳥状如黄囊赤如丹火六足四翼渾沌無面目是識歌舞實惟帝江九州要記曰凉州古武都有天山黄帝受金液神丹於此山山近崆峒山山頂有魏太祖馬埒焉祁連山漢書曰霍去病撃匈奴至祁連山濟居延水遂臻小月氐西河舊事曰祁連山在張掖酒泉二界焉支山在刪丹故縣東西百餘里南北二十里亦宜六畜匃奴失二山乃歌曰亡我祁連山使我六畜不蕃息失我焉支山使我婦女無顔色凉州記曰祁連山張掖酒泉二界之}
