  - {type: variant, offset: 2472, length: 1002, content: 圍有盤石俓四五丈極方正青如彈棊局兩竹屈垂拂掃石上絕無塵穢未至數十里間風吹簫管之音馬嶺山郡國志郴州馬嶺山本名牛脾山山上有仙人蘇躭壇即郴人也為兒童時與眾童牧更直守牛每躭守牛牛不敢散嘗與眾兒獵即乘鹿人笑之曰龍也去郡百二十里母臨食晚往買鮓須臾即還一旦有眾賓來躭啟母曰受性當仙仙人合召躭去今年疾疫甚飲家中井水即無恙又種藥於園梅樹下可治百病賣此水及藥過於供養便去母遽視之眾賓皆白鶴也以躭常乘白馬故號馬嶺山彈丸山水經注曰臨桂彈丸山有湧泉奔流迅激東注于灕水山龕及溪中有石如彈丸因以石名焉驗其山有石竇下深數丈洞穴深遠莫究其極百丈山桂林風土記曰百丈山在郡城東北七十五里一名把杖山疊障深重連延西南數百里四接郡界莫窮遠近自府北驛路徑穿其中俗以崎嶇險阻故以百丈名之又以林巒深邃行人皆持兵仗以防猛獸因亦名把扙山灕山桂林風土記曰灕山在城南二里灕水之陽因以名焉一名沉水山其山孤拔下有澄潭上高三百餘尺傍有洞穴其穴廣數丈南北直透上有怪石欹危藤蘿縈茂世亂民保以避寇旱或禱祀頗靈隱山桂林風土記曰隱山在州之西郊先是榛莽翳薈古莫知者寶歷初李渤出鎮遂尋其源見石門互開有水淵澈乃夷稚蕪穢踈通巖穴石林磴道若天造靈府不可根本因號隱山獨秀山桂林風土記曰獨秀山在城西北一百步直聳五百餘尺周廻一里平地孤拔秀異下有洞穴凝垂乳竇路通山北傍廻百餘丈豁然明朗宋光祿卿顏延年牧此郡常於北石室中讀書遺跡猶存嘗賦詩云未若獨秀者嵯峨郭邑開是也南溪山桂林風土記曰南溪山在縣之南五里餘其山聳拔千尺煙翠凝空古今所遺其溪東注與桂江合龍蟠山桂林風土記曰龍蟠山本名盤龍山有石洞深致洞中天然石室石床石盆洞門數重人秉燭遊常見龍跡大如椀洞有水水中有魚四足有角如龍形人殺即風雨晦冥立至也前使李渤給事改為隱山連其所也堯山郡國志云廣州堯山高四千丈自番禺交阯見之有颶風風發屋折樹翻湖焉雲母山續南越志云天后朝曾城縣有何氏女服雲母粉得道於羅浮山山因所出以名之馬鞍山南越志云始皇朝望氣者云南海有五色氣遂發卒千人鑿之以斷山之岡阜謂之鑿龍今所鑿之處形如馬鞍故名焉慮山裴關廣州記云東官縣有慮山其側有楊梅山桃只得於山中飽食不得取下如下則輒迷路火山嶺表錄云梧州對岸西火山山下水澄潭水深無極其火每三五夜一見于山頂每至一更初火起匝其頂如野花之甚者廣十丈餘食頃而息或言其下水中有寶珠光照于上如火上有荔枝四月先熟以其地熱故謂火山也浮石山交州記云海中有浮石山而峙高數十丈去永平營百餘里浮在水上昔李遜征朱崖欲審其實否牽長索於山底洞過, WYG: ''}
