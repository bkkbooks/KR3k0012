  - {type: variant, offset: 396, length: 186, content: 袁山松勾將山記曰登勾將北見高筐山嶷然半天荊州圖副云昔堯時大水此山不沒如筐因名焉佷山宜都記曰佷山山谷之內有石穴穴出清泉水有神魚大者二尺小者一尺釣者先請多少拜而請之數滿便止水側有異花欲摘如魚請又有異木名千歲葉似棗冬夏青青復有蒼范溪相近宜陽山宜都記曰宜陽山有風井穴大如甕夏出冬入有樵人置笠穴口風噏之後於長楊溪口得笠則知潛通也丹山宜都記曰丹山時有赤氣籠井如丹故有此名小酉山盛弘之荊, SBCK: 叚國沙}
