  - {type: variant, offset: 30, length: 2, content: 連接, WYG: 勿居山後魏書曰張襄從太祖破賀訥登勿居山聚石為峰以記功徳命襄為文臨松山十六國春秋曰西晋元嘉元年張掖臨松山}
