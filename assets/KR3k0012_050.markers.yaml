  - {type: variant, offset: 2675, length: 4, content: 臨桂彈丸, SBCK: 北地富平縣西河則有兩山相對水岀其間即上河峽也世謂之青山河水歴峽北注枝分東岀石崖山水經注曰塞外歷域有石崖山西去北城五百里山石上自然有文􅀞獸馬之狀粲然成著類似圖焉故亦謂之􅀞石山䟽屬山山海經曰貳􅀒之臣曰危與貳􅀒殺窫窳帝乃梏之䟽屬之山梏猶繫縛也桎其右足桎械也反縛兩手與髮約髪合縛之也繫之山上磐石之下在開題西北漢宣帝時使人鑿上郡發磐石石室中得一人徒倮􅀍髪反縛械一足時人不識乃載之於長安帝以問群臣群臣莫能知劉子政案此言之宣帝大驚於是時人争學山海經矣論者多以爲是其尸象非眞體也意識者以爲靈恠化論難以理測物禀異氣岀於不然不可以常理推之可以近較摖之矣魏時有人發故周靈王冢得殉葬女子不死至數日而有氣數月而能語狀如二十許女子人送詣京師郭太后愛養之􅁪不離左右十餘年太后崩哀思哭泣一年餘而死即此􅀋也侖山音論山海經曰侖山者其山上有金玉下多青雘有木狀如榖而赤理其汁如􅃮其味如飴食者不飢可以釋勞其名曰白􅀂或非臯蘇臯蘇一名白􅀂見廣雅可以血玉血謂可用染玉作光彩也蛇山山海經曰北海之内有虵山者虵水岀焉東入于海有五采之鳥飛蔽一郷漢宣帝元康元年五色鳥以萬數飛屬縣即此鳥五采之鳥名曰翳鳥鳯属也離騷曰駟玉風而乗翳鳥東口山山海經曰東口之}
