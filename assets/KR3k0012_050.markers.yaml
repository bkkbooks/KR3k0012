  - {type: variant, offset: 2843, length: 3, content: 孤拔下, krp: 山海經曰猥翼之山其中多恠獸水多恠魚几言恠者皆爲貌狀掘竒不常也尸子云徐偃王好恠没水而得恠魚入山得怪獸者争列於庭宻山山海經曰宻山山上多丹木貟葉赤莖黃花赤實味如飴食之不飢丹水岀焉西注于稷澤后稷神所憑山名之其中多白玉膏其源沸沸湯湯玉膏涌岀之皃也河圖云少室山}
