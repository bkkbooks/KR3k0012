  - {type: variant, offset: 45, length: 1, content: 荊, SBCK: 皆涇水源與笄頭山連亘赫連定勝光二年畋于涼州登可藍山望統萬城泣曰先帝􅀂以朕承大業豈有今日在平涼縣接百泉界又云定據平涼登此山有群狐遶之而鳴射之竟不得一定乃歎曰咄咄此亦怪事也石門山酈元水經注曰離水又東經石門口山髙險絶對岸􅀂門故以得名疑即臯蘭山門也漢武元狩三年驃􅀐將軍霍去病岀隴西至臯蘭謂是}
  - {type: variant, offset: 45, length: 1, content: 荊, WYG: 又云丹松嶺三危山河圗括地象曰三危山在鳥鼠之西南與汶山相接上為天苑星黒水出其南西河舊事曰三危山有三峯故曰三危俗亦謂昇雨山在縣南二十里尚書禹貢謂竄三苗于三危又云導黑水至于三危入于南海西山經曰三危之山青鳥居之三青鳥主西王母取食者别自栖息于此山也羊鶻山叚國沙州記曰羊鶻山多岩石少樹木甚似魯國南鄒山傍山北行三十里逺眺顧瞻百里但見峻嶺巉岩無尺木寸草西王母樗蒲山崔鴻十六國春秋曰甘松山東北又二百里有西王母樗蒲山大有神驗江水出焉叚國沙州記曰羊鶻嶺東北二百里有大山遙望甚似東岳岱山極髙大嶮峻頗有靈驗西𦍑父老傳云是西王母樗蒲山九隴山周地國記曰昔有神人坐張掖西方上山西射酒泉郡西金}
