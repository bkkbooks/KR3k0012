  - {type: variant, offset: 2762, length: 0, content: '', SBCK: 以威天下鈎吾山山海經曰鈎吾之山其上多金其下多銅有獸焉羊身人面而目在腋下虎齒人爪其音如嬰兒名曰􅭼鴞食人爲物貪婪食人未盡還害其身像在夏后鼎左傳所謂饕餮也天臺山山海經曰大荒之中有山名曰天臺海水入焉鵲山山海經曰鵲山其首曰招搔臨于西海之上在南山之西頭濵西海也多桂桂葉似杜􅂎長尺餘味辛白花叢生生間無􅄂木吕氏春秋曰招搔之桂是也多金玉有草焉其狀如韮而青花其名曰祝餘或作程茶食之不飢有木焉其狀如榖而黒理榖楮也皮作􅁓其華}
