  - {type: variant, offset: 807, length: 0, content: '', WYG: 焉東入于海入于海有五采之鳥飛蔽之漢宣帝元康元年五色鳥以萬數飛屬即此鳥五采之鳥名曰鷖鳥鳳屬也離騷曰駟玉虬以乘鷖兮東口山山海經曰東口之山君子之國其人衣冠帶劍役使虎豹好謙譲有司幽之民帝俊生星龍星龍生思幽思士不妻思女不夫言其人直思而氣通魄合而生子此莊子所}
