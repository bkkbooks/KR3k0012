  - {type: variant, offset: 3077, length: 169, content: 聳拔千尺煙翠凝空古今所遺其溪東注與桂江合龍蟠山桂林風土記曰龍蟠山本名盤龍山有石洞深致洞中天然石室石床石盆洞門數重人秉燭遊常見龍跡大如椀洞有水水中有魚四足有角如龍形人殺即風雨晦冥立至也前使李渤給事改為隱山連其所也堯山郡國志云廣州堯山高四千丈自番禺交阯見之有颶風風發屋折樹翻湖焉雲母山續南越志云天后朝曾城縣有何氏女服雲母粉得道於羅浮山山因所出, SBCK: 峰似鳥而威靈故}
