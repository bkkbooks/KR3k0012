  - {type: variant, offset: 45, length: 1, content: 荊, krp: 皆涇水源與笄頭山連亘赫連定勝光二年畋于涼州登可藍山望統萬城泣曰先帝若以朕承大業豈有今日在平涼縣接百泉界又云定據平涼登此山有群狐遶之而鳴射之竟不得一定乃歎曰咄咄此亦怪事也石門山酈元水經注曰離水又東經石門口山髙險絶對岸若門故以得名疑即臯蘭山門也漢武元狩三年驃騎將軍霍去病岀隴西至臯蘭謂是}
  - {type: variant, offset: 48, length: 0, content: '', SBCK: 􅀜塞矣燕然山漢書曰貳師引兵還至燕然山單于知漢軍勞倦自將五萬􅀐􅃒擊貳師軍大亂敗貳師降單于范曄後漢書曰竇憲與單于戰於稽范山大破之降者前後二十餘萬人憲遂登燕然山去塞三千餘里刻石勒碑令班固作名天山漢書曰漢使貳師將軍將三萬􅀐岀酒泉擊右賢王於天山得}
