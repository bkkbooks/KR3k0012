  - {type: variant, offset: 2847, length: 2, content: 澄潭, SBCK: 白玉膏服即仙矣此􅀋也音拂也黄帝是食是饗所以得登龍於鼎湖而靈化也是生􅀇玉言玉膏中又岀黑玉也玉膏所岀以灌丹木丹木五歳五色乃清言鮮光也五味乃馨言滋香也黃帝取宻山之玉榮謂玉華也而投之鍾山之隂以爲玉鍾瑾瑜之玉爲良言善玉也堅粟精宻禮記鎭玉以粟或作栗玉有栗文所謂䅽壁濁澤有光濁謂潤澤也五色發作以知柔剛天地􅀑神是食是饗玉所以祈􅀕者言能動矢地感􅄦神也君子服之以衛不祥今徼外岀金剛石金剛石似金有光采可以刻王外國人帶之云辟惡氣也亶受山山海經曰亶受之山亶音蟬多水無草木不可以}
  - {type: variant, offset: 2847, length: 2, content: 澄潭, krp: 白玉膏服即仙矣此類也音拂也黄帝是食是饗所以得登龍於鼎湖而靈化也是生玄玉言玉膏中又岀黑玉也玉膏所岀以灌丹木丹木五歳五色乃清言鮮光也五味乃馨言滋香也黃帝取宻山之玉榮謂玉華也而投之鍾山之隂以爲玉鍾瑾瑜之玉爲良言善玉也堅粟精宻禮記鎭玉以粟或作栗玉有栗文所謂䅽壁濁澤有光濁謂潤澤也五色發作以知柔剛天地鬼神是食是饗玉所以祈祭者言能動矢地感鬼神也君子服之以衛不祥今徼外岀金剛石金剛石似金有光采可以刻王外國人帶之云辟惡氣也亶受山山海經曰亶受之山亶音蟬多水無草木不可以}
