  - {type: variant, offset: 62, length: 0, content: '', WYG: 身熱之坂道狹者尺六寸長徑三十里漢書曰罽賔國厯大頭痛山有三池盤石坂道狹者尺六七寸繩索相引乃度廣志曰大頭痛山小頭痛山皆在罽賔東鐵山漢書曰莎車國有鐵山出青玉穆天子傳曰天子西征至剞居議切閭氏乃命剞閭氏供飬六師之}
