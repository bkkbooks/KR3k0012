  - {type: variant, offset: 992, length: 132, content: 上斯須風起竟人石帆山武陵記曰石帆山石危起若數百幅帆形虎齒山武陵記曰虎齒山形如虎齒民嘗六月祭之不然即輒有虎害移山武陵記曰移山在汧陽界本在江北岸因風雨之勢一夕移渡江南岸後以此名之淳于山武陵記曰淳于山與白雉山相近在辰州武陵二郡界絕壑之半有一白雉遠望首尾可二丈申足翔翼若虛, WYG: 靈化也是生𤣥玉言膏玉}
