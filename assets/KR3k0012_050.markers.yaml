  - {type: variant, offset: 999, length: 205, content: 石帆山武陵記曰石帆山石危起若數百幅帆形虎齒山武陵記曰虎齒山形如虎齒民嘗六月祭之不然即輒有虎害移山武陵記曰移山在汧陽界本在江北岸因風雨之勢一夕移渡江南岸後以此名之淳于山武陵記曰淳于山與白雉山相近在辰州武陵二郡界絕壑之半有一白雉遠望首尾可二丈申足翔翼若虛中翻飛即上視之乃有一石雉舒翅綴著石上山下有石室數畝望室裏雖闇猶見銅鍾高丈餘數十枚其色甚光明武陵山武陵記曰武陵山中有秦避世人居之尋水號曰桃花源故陶潛有桃花源記又云, SBCK: 坐張掖西方}
