  - {type: variant, offset: 11, length: 1, content: 荊, SBCK: 小隴巖嶂髙嶮不通軌轍故張衡四愁詩云我所思􅀆在漢陽欲往從之隴坂長是也周地圖記云其山髙處可三四里登山東望秦州可五百里目極泯然墟宇桑梓與雲霞一色其上有懸溜吐于山中爲澄潭名曰萬石潭流溢散下皆注於渭東人西役升此而顧莫不悲思其歌云隴頭泉水流離西下念我行役飄然曠野登髙遠望涕零􅀟墮是此山也小隴西三秦記曰小隴山一名隴坻又名分水嶺漢書楊雄解嘲云響􅀂坻頽應劭曰天水有大坂名隴山其旁有崩落者聲聞數百里故曰坻頽又曰其坂九廻上者七日乃越上有清水四注下有縣縣因此水而名朱圉山漢書地理志曰天水兾縣有朱圉山一名曰巖山在縣南梧中聚土地十三州志云朱圉有石鼓不擊自鳴則兵起契吴山涼}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_SBCK_050-2a}
  - {type: variant, offset: 11, length: 1, content: 荊, WYG: 小隴岩障髙嶮不通軌轍故張衡四愁詩云我所思兮在漢陽欲往從之隴坂長是也周地圗記云其山髙處可三四里登山東望秦州可五百里目極泯然墟宇桑梓與雲霞一色其上有懸溜吐於山中為澄潭名曰萬石潭流溢散下皆注於渭東人西役升此而望故鄉莫不悲思其歌云隴頭流水流離四下念我行役飄然曠野登髙望逺涕零雙墮是此山也小隴山三秦記曰小隴山一名隴坻又名分水嶺漢書揚雄解嘲云響若坻頽應劭曰天水有大坂名隴山其旁有崩落者聲聞數百里故曰坻頽又曰其坂九廻上者七日乃越上有清水四注下有隴縣因此水而名朱圉山漢書地理志曰天水冀縣有朱圉山一名岩山在縣城南十三洲志云朱圉有石鼓不擊自鳴則兵起契吳山凉}
