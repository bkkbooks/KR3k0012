  - {type: variant, offset: 52, length: 3, content: 鴈南翔, SBCK: 東大谷去長安八千六百七十里續漢書曰竇固岀塞至天山斬首千餘級水經注曰隂山故郎􅀱應言於漢曰隂山東西一千餘里單于之苑囿也自武帝岀師攘之於}
  - {type: variant, offset: 52, length: 1, content: 鴈, WYG: 謂此也今名為鴻鷺山以多鴻鷺所棲也沙角山三秦記曰河西沙角山峰岩危峻逾於石山其沙粒麄有如乾糒又山之陽有一泉云是沙井泉厯今古沙不填之人欲登峰必步下入穴即有鼔角之音震動人足又西山舊事云沙洲天氣晴朗沙鳴聞於城内又云人逰沙山或結侣少或不曾逰必生怖懼莫敢前沙或随人足自頓下經宿却自還山上在縣西七里亦名鳥沙山葱嶺漢書曰西域三十六國有葱嶺其河兩源一源出葱嶺山一出于闐國在}
