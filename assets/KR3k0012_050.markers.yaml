  - {type: variant, offset: 448, length: 348, content: 石穴穴出清泉水有神魚大者二尺小者一尺釣者先請多少拜而請之數滿便止水側有異花欲摘如魚請又有異木名千歲葉似棗冬夏青青復有蒼范溪相近宜陽山宜都記曰宜陽山有風井穴大如甕夏出冬入有樵人置笠穴口風噏之後於長楊溪口得笠則知潛通也丹山宜都記曰丹山時有赤氣籠井如丹故有此名小酉山盛弘之荊州記曰小酉山上石穴中有書千卷相傳秦人於此而學因留之故梁湘東王云訪酉陽之逸典是芋山盛弘之荊州記曰芋山有蹲鴟如兩斛大食之終身能不飢今民取食之嵩梁山盛弘之荊州記曰嵩梁山在澧水之陽望之如香爐之狀今名石門吳永安六年自然洞開玄朗如門三百丈門角上各生一竹倒垂下拂謂之天箒孫休以為嘉祥置縣因山為名隨文帝改曰石門山也崇山盛弘之荊州記曰崇山書云放驩兜于崇山崇山在澧陽縣南七十五里武山武陵記云武山高可萬仞山半有盤瓠石窟中有一石狗形云是盤瓠之遺像又有班, WYG: ''}
