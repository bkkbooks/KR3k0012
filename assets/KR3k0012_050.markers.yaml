  - {type: variant, offset: 61, length: 0, content: '', WYG: 生葱茂于常葱西域諸國志曰葱嶺髙十二日可至頂巫咸山西域志曰巫咸山一名覆莫山水經注曰鹽水西出經巫咸山北山海經曰巫咸山之神以右手操青蛇左手操赤蛇在葆登羣巫所從上下也又大荒西經云大荒之中有靈州巫咸即巫朌巫彭巫姑巫直巫抵巫謝巫羅十里巫從此昇峰百藥爰在郭璞註云羣巫山下靈仙採藥往來也蓋神巫所逰故以得名懸度山漢書曰烏秅國有懸度山者谿谷不通以繩索相引而度頭痛山漢書曰杜欽説大將軍王鳳曰罽賔國自知絶逺兵不可至道厯大頭痛山小頭痛山赤}
