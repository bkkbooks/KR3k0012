  - {type: variant, offset: 2134, length: 349, content: 宋永初山川記云昭山下有旋潭深無底是湘水最深之處昔有人舟覆於此潭其槽并甑有名題號後於洞庭尋得即知暗通也五溪山長沙圖經云五溪山在縣西北五十八里高二里北入朗州界昔吳黃龍三年潘濬將兵五萬討武陵五溪蠻在此山下立營截除徒黨因以為名按溪水自邵州武剛縣東北流至岳州沅江縣合益水益陽城記云在益水之陽水出縣北流入資口在縣門橋下皆五溪之下口也又按關羽屯軍資水北岸即一名茱萸江也吳甘寧拒之云聞吾咳唾羽即不敢過江是此處今號為關羽瀨錢石山湘川記云曲江縣東有錢石山其狀四方有若臺其石三面壁立其上碎石如錢故謂之錢石山采玉山湘川記曰曲江縣有採玉山卉木滋茂泉石澄澈相傳云古採玉於此得名玉山湘川記曰玉山下有廟曾有人得玉瑛於此有銀山白石山越玉山又浮山其地躡一處則百餘步地動臨賀山盛弘之荊州記曰臨賀山東山中有二竹大數十圍有盤石俓四五丈極方正, SBCK: ''}
