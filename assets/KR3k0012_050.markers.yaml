  - {type: variant, offset: 26, length: 0, content: '', WYG: 南北百餘里山中冬温夏凉宜牧牛乳酪濃好夏日酪不用器物刈草著其上不散酥特好酪一斛得升餘酥又有仙人樹行人山中飢渴者輙食之飽不得持去平居不可見焉支山漢書曰霍去病將萬騎出隴西涉孤奴水過焉支山千有餘里執渾邪王收休屠祭天金人凉州記曰焉支山在西郡界}
