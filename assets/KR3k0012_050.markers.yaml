  - {type: variant, offset: 809, length: 2, content: 武溪, WYG: 類也食黍食獸是使四鳥流波山山海經曰東海中有流波山入海七十里其上有獸状如牛蒼身而無角一足入水則必有風雨其光如日月其音如雷名曰䕫黄帝得之以其皮作鼓厥以雷獸之骨雷獸則雷神獸龍身厥擊也聲聞五百里以威天下鈎吾山山海經曰鈎吾山其上多金其下多銅有獸焉羊身人面而目在掖下虎齒人爪其音如嬰兒名曰􅭼號食人左傳所謂饕餮也天臺山山海經曰大荒之中有山名曰天臺海水入焉鵲山山海經曰鵲山其首中曰招搖臨于大海之上多桂桂葉似杜把長尺餘味辛白花叢生山間無雜木吕氏春秋曰招揺之桂}
