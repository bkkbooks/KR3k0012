  - {type: variant, offset: 2842, length: 0, content: '', krp: 陽多玉其隂多金多怪木有獸焉其狀如羊九尾四耳其目在背其名曰縛訑搏他二音有鳥焉其狀如雞而三首六目六足三翼其名曰䳤􅝐䳤􅝐憋怤兩音急性食之無卧猥翼}
  - {type: variant, offset: 2843, length: 3, content: 孤拔下, SBCK: 山海經曰猥翼之山其中多恠獸水多恠魚几言恠者皆爲貌狀掘竒不常也尸子云徐偃王好恠没水而得恠魚入山得怪獸者争列於庭宻山山海經曰宻山山上多丹木貟葉赤莖黃花赤實味如飴食之不飢丹水岀焉西注于稷澤后稷神所憑山名之其中多白玉膏其源沸沸湯湯玉膏涌岀之皃也河圖云少室山}
