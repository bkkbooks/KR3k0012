  - {type: variant, offset: 1554, length: 322, content: 衡山圖經曰小廬山一名浮丘山在縣西一百八里高六里三十步東西二十里南北四十里言其山似九江廬山故曰小廬山又古老相傳謂浮丘公上昇之所兼有道觀存焉靜福山衡山圖經曰靜福山在縣北五十里有梁廖沖者守清虛為本郡主簿西曹祭酒湘東王國常侍大同三年家於此山先天二年飛昇於此山後刺史蔣防敬慕高風刻石為碑方臺山蕭誠荊南志曰華容方臺山山出雲母土人採之先候雲所出之處於下掘取無不大獲往往有長五尺者可以為屏風當掘之時忌有聲響則所得麤惡攸縣雲陽山遁甲經云沙土之地雲陽之墟可以避時可以隱居雲陽氏古之仙人姓氏因號雲陽山在攸縣仙方記云南嶽山有福地有松膏實甘鮮可餌相傳云服食練行之人多來採此松膏而服之不苦澀與餘處松有別烏龍白騎山湘川記云汝城縣東有烏龍白騎山遠望似城有黑石如龍白石如馬羅列號, SBCK: 漢書}
