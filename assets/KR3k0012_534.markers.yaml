  - {type: variant, offset: 1047, length: 297, content: 天子孟春上幸於南郊揔受十二月之政遠藏於祖廟月取一政班於明堂也諸侯以孟春之月朝于天子受十二月之政藏於祖廟月取一政行之閏月無當處則闔門而居之禮記外傳曰明堂古者天子布政之宮在國南十里之內七里之外黃帝享百神於明廷是也南方陽明之地因為明堂路寢宮室之制同唐虞為五府府者聚也合五帝之神祭之夏謂太廟為世室世室不毀之義殷人謂路寢為重屋周人謂五府為明堂刑制同故手舉夏后氏一堂之上為五室木室東北火室東南金室西南水室西北王室中央南面三階三面兩階則九階矣五室者象地載五行也五行生於四時故每室四達達向也四戶相對一室八窗夾戶之窗象八節周人有圓屋九月大享五帝於明堂即祖廟心為天子明堂東方之宿大火謂之辰即心星也或以明堂獨以一室耳, SBCK: ''}
