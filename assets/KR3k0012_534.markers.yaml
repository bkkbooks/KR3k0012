  - {type: variant, offset: 1665, length: 0, content: '', SBCK: 太微西南今興慶宫上帝延也考符之所合置靈臺三輔故事曰漢作靈臺於城東周作靈臺在灃水永東常以四孟之月登臺而觀述征記曰長安宮南有靈臺髙十仭上有銅渾天儀又相風銅鳥或云此鳥遇千里風乃動六韜曰文王旣出羑里召周公旦築爲靈臺新序曰周文作靈臺及池沼掘得死人骨吏以聞於文王文王曰更塟之天下聞之皆曰文王賢矣澤及朽骨而况於人乎班固東都賦靈臺詩曰乃經靈臺靈臺旣崇帝勤時登爰考休徴三光宣精五行布序習習祥風祁祁甘雨百榖蓁蓁庶草蕃廡屢惟豐年於皇樂胥潘岳閑居賦曰靈臺傑其髙跱闚天文之祕奥究人事之終始學校毛詩國風曰子衿刺學校廢也亂丗則學校不脩焉}
