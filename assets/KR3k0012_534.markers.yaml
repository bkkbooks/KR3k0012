  - {type: variant, offset: 865, length: 1, content: 治, SBCK: 圜壅之故曰辟雍言其上承天地以班教令流轉王道終而復始說苑曰辟雍天子郷飲之處戴延之西征記曰洛城南有平昌門道東辟雍壇去靈臺三里俱是魏武帝所立髙七丈班固東都賦辟雍詩曰乃流辟雍辟雍湯湯聖皇莅止造舟爲梁皤皤國老乃父乃兄抑抑皇儀孝友光明於赫太上示我漢行洪化惟神永觀厥成李尤辟雍賦曰卓矣煌煌永元之隆含􅀪該要周建大中蓄純和之優渥􅀆化盛溢而兹豐李尤辟雍銘曰惟王所建方中圎外清流四匝蕩滌濁􅁾傳玄帝幸辟雍郷飲酒賦曰時皇帝枉萬乗之尊􅀆以幸辟雍鹵簿齊列群官正容侍衛參差階㦸百重乃延郷七乃命王公是日也定小㑹之常儀􅀆饗殊俗而見逺􅀖連三朝以考學􅀆覽先賢之異同靈臺毛詩文王靈臺曰靈臺民始附也文王受命而民樂其有靈德以及鳥獸昆䖝焉天子有靈䑓所以􅀚祲象察氣妖祥經始靈臺經之營之庶民攻之不日成之詩氾暦樞曰靈臺候天意也經營靈臺}
