  - {type: variant, offset: 192, length: 151, content: 府蒼帝靈威仰之府名靈府周曰青陽周書明堂曰明堂方百一十二尺高四尺階廣六尺三寸室居中方百尺室中方六十尺東應門南庫門西皋門北雉門東方曰青陽南方曰明堂西方曰總章北方曰玄堂中央曰太廟以左為左介右為右介也又程寤曰文王在翟太姒夢見商之庭產棘小子發取周庭之梓樹於闕間化為松柏棫柞驚以告文王文曰召發于明堂拜告夢受商之大命, SBCK: 臺學校辟雍}
