  - {type: variant, offset: 3426, length: 0, content: '', SBCK: 宮寺門南岀置令丞吏詰姦究理辭訟五愽士領弟子貟三百六十六經三十愽土弟子萬八百人主事髙弟侍講各二十四人學士司舍行無逺近皆隨檐雨不塗足暑不􅁀首决疑要注曰漢􅀄置愽士而無弟子後置弟子五十人又増滿五百漢未至數千人魏之務學者始詣太學爲門人二歳通二經者􅀘文學掌故滿三歳通三經者櫂爲太子舎人摰虞駮冝立學事曰河內太守魯夔使民二百家共立一學未成而司􅀠奏以違法尚書郎中􅀐都尉臣摰虞駮夔爲近畿大都朝所委任親臨民物足識事冝累表仍上求二百家立一學是其留心學校必欲有成也崔瑗南陽文學頌曰昔聖人制}
  - {type: page-break, offset: 3426, content: '', id: KR3k0012_SBCK_534-7a}
  - {type: variant, offset: 3426, length: 0, content: '', WYG: 宫寺門南出置令丞吏詰姦宄理詞訟五博士領弟子員三百六十六經三十博士弟子萬八百人主事髙弟侍講各二十四人學士同舍行無逺近皆隨檐雨不塗足暑不暴首决疑要註曰漢初置博士而無弟子後置弟子五十人又增滿五百漢末至數千人魏之初學為門人二嵗通二經者補文學掌故滿三嵗通三經者擢為太子舍人摰虞駮宜立學事曰河内太守魯䕫使民二百家共立一學未成而司𨽻奏以違法尚書郎中騎都尉臣摰虞駮䕫為近畿大都朝所委任親臨民物足識事宜累表仍上求二百家立一學是其留心學校必欲有成也崔瑗南陽文學頌曰昔聖人制}
