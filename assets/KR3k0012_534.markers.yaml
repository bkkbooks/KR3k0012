  - {type: variant, offset: 2346, length: 829, content: 遂寢終隋代祀五方上帝於明堂恒以季秋在雩壇上而杞其用幣各於其方唐書曰永徽中詔曰朕聞合宮靈府創鴻規於上代太室總章摽茂範於中葉雖復質文殊制奢儉異時然其立天中作人極布政施教歸之一揆朕嗣膺下武丕承上烈思所以荅眷上靈事遵孝養而法宮曠禮明堂寢構永言大禮朕甚懼焉宜令所司與禮官學士等考覈故事詳議得失於是太常博士柳宣依鄭玄義以為明堂之制當為五室內直丞孔志約據大戴禮及盧植蔡邕等議以為九室祕書郎薛文思等各造明堂圖又曰永徽中令禮官學士詳議明堂制度久之不定上乃內出九室樣更今損益群儒紛競各執異議于志寧等請為九室太常博士唐畛等請為五室上令所司於觀德殿依兩議張設親與公卿觀之上曰明堂之禮自古有之議者不同未果營建今設兩議公等以何者為宜閻立德對曰兩議不同俱有典故九室似闇五室似明取捨之宜斷在聖慮上亦以五室為便議又不定由是止又曰垂拱二年毀乾元殿就其地創造明堂凡高二百九十四尺東西南北各廣三百尺凡有三層下層象四時各隨方色中層法十二辰圓蓋蓋上盤九龍捧之上層法二十四氣亦圖蓋亭亭中有巨木十圍上下通貫刻木為瓦紵漆之明堂之下施鐵渠以為辟雍之象號為萬象神宮又曰證聖元年正月明堂後佛堂火延燒明堂三年又令重造如明堂高廣如舊制上施寶鳳號為通天宮也又曰永昌元年正月天后親享明堂戊午布政于明堂頒九條以記于百官巳末神皇御明堂饗群臣賜縑練有羗自明堂成後縱神都婦人及諸州老人入觀兼賜酒食至是日始止又曰開元中敕雲州置魏孝文帝祠堂一所有司以時享祭是州有魏故明堂遺跡乃置廟於其跡焉家語觀周孔子觀乎明堂覩乎四門之墉有堯舜桀紂之象而各有善惡之狀興廢之誡焉又有周公相成王抱之而負斧扆南面朝諸侯之圖焉晏子春秋曰明堂之制土事不文木事不鏤示民知節也尸子曰黃帝合宮有虞氏曰總章殷人曰陽館周人曰明堂此皆所以名休其善也淮南子曰自古者明堂之制明堂太廟正室下之潤濕弗能及也上之霧霜弗能入也四方之風弗能襲也頴容春秋釋例曰周公朝諸侯於明堂太廟與明堂一體也春秋人君將出告于宗廟反行策勳獻俘於廟禮論曰或以為明堂者文王廟周時德澤和洽蒿茂大以為宮柱名曰蒿宮三輔, SBCK: ''}
  - {type: variant, offset: 2346, length: 830, content: 遂寢終隋代祀五方上帝於明堂恒以季秋在雩壇上而杞其用幣各於其方唐書曰永徽中詔曰朕聞合宮靈府創鴻規於上代太室總章摽茂範於中葉雖復質文殊制奢儉異時然其立天中作人極布政施教歸之一揆朕嗣膺下武丕承上烈思所以荅眷上靈事遵孝養而法宮曠禮明堂寢構永言大禮朕甚懼焉宜令所司與禮官學士等考覈故事詳議得失於是太常博士柳宣依鄭玄義以為明堂之制當為五室內直丞孔志約據大戴禮及盧植蔡邕等議以為九室祕書郎薛文思等各造明堂圖又曰永徽中令禮官學士詳議明堂制度久之不定上乃內出九室樣更今損益群儒紛競各執異議于志寧等請為九室太常博士唐畛等請為五室上令所司於觀德殿依兩議張設親與公卿觀之上曰明堂之禮自古有之議者不同未果營建今設兩議公等以何者為宜閻立德對曰兩議不同俱有典故九室似闇五室似明取捨之宜斷在聖慮上亦以五室為便議又不定由是止又曰垂拱二年毀乾元殿就其地創造明堂凡高二百九十四尺東西南北各廣三百尺凡有三層下層象四時各隨方色中層法十二辰圓蓋蓋上盤九龍捧之上層法二十四氣亦圖蓋亭亭中有巨木十圍上下通貫刻木為瓦紵漆之明堂之下施鐵渠以為辟雍之象號為萬象神宮又曰證聖元年正月明堂後佛堂火延燒明堂三年又令重造如明堂高廣如舊制上施寶鳳號為通天宮也又曰永昌元年正月天后親享明堂戊午布政于明堂頒九條以記于百官巳末神皇御明堂饗群臣賜縑練有羗自明堂成後縱神都婦人及諸州老人入觀兼賜酒食至是日始止又曰開元中敕雲州置魏孝文帝祠堂一所有司以時享祭是州有魏故明堂遺跡乃置廟於其跡焉家語觀周孔子觀乎明堂覩乎四門之墉有堯舜桀紂之象而各有善惡之狀興廢之誡焉又有周公相成王抱之而負斧扆南面朝諸侯之圖焉晏子春秋曰明堂之制土事不文木事不鏤示民知節也尸子曰黃帝合宮有虞氏曰總章殷人曰陽館周人曰明堂此皆所以名休其善也淮南子曰自古者明堂之制明堂太廟正室下之潤濕弗能及也上之霧霜弗能入也四方之風弗能襲也頴容春秋釋例曰周公朝諸侯於明堂太廟與明堂一體也春秋人君將出告于宗廟反行策勳獻俘於廟禮論曰或以為明堂者文王廟周時德澤和洽蒿茂大以為宮柱名曰蒿宮三輔黃, WYG: 黄}
