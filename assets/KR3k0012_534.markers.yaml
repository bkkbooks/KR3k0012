  body:
  - {type: variant, offset: 4, length: 187, content: 二明堂尚書帝命驗曰帝者承天立府以尊天重象象五精之神也天有五帝集居太微降精以生聖人故帝者承天立五帝之府是為天府赤曰文祖赤帝熛怒之府名文祖火精光明文章之祖故謂之文周曰明堂黃曰神斗黃帝含樞紐之府而名曰神斗斗主也士精澄靜四行之主故謂之神主周曰太室白曰顯記白帝白招矩之府曰顯記法也金精斷割万物成故記之顯記周曰總章黑曰玄矩黑帝汁光紀之府名曰玄矩矩法也水精玄昧能權輕重故謂玄矩周曰玄堂蒼曰, SBCK: 三辟雍}
