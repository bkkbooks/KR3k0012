  - {type: variant, offset: 1668, length: 2, content: 南少, SBCK: 所服縱我不徃子寜不嗣音尚書大傳曰耰鉏巳藏歳事欲畢餘子皆入學十五始入小學見小節踐小義十八始入大學見大節踐大義周禮地官下師氏曰師氏以三德敎國子一曰至德以爲道夲二曰敏德以爲行夲三曰孝德以知逆惡又教三行一曰孝行以親父母二曰友行以尊賢良三曰順行以事師長鄭􅀇注曰德行外内之言也在心爲德施之爲行居虎門之左司王朝凡國之貴遊子弟學焉禮記學記曰君子如欲化民成俗其必由學乎所學聖人之道在方䇿玉不琢不成器人不學不知道是故古之王者建國君民教學爲先又學記曰古之教者家有塾黨有庠術有序國有學比年入學中年考校一年視離經辨志三年視敬業樂群五年視愽習親師七年視論學取友謂之小成九年知􅀋通逹強立而不反謂之大成左傳襄六曰鄭人遊于郷校杜預曰郷乏學校以論執政然明謂子産曰毀郷校如何􅂲於中謗議國政也子産曰何爲夫人朝夕}
  - {type: page-break, offset: 1668, content: '', id: KR3k0012_SBCK_534-4b}
  - {type: page-break, offset: 1668, content: '', id: KR3k0012_SBCK_534-5a}
  - {type: variant, offset: 1668, length: 2, content: 南少, WYG: 所服縱我不往子寧不嗣音尚書大傳曰耰鉏已藏嵗事欲畢餘子皆入學十五始入小學見小莭踐小義十八始入大學見大莭踐大義周禮地官下師氏曰師氏以三徳教國子一曰至徳以為道本二曰敏徳以為行本三曰孝徳以知逆惡又教三行一曰孝行以親父母二曰友行以尊賢良三曰順行以事師長鄭𤣥注曰徳行外内之言也在心為徳施之為行居虎門之左司王朝凢國之貴遊子弟學焉禮記學記曰君子如欲化民成俗其必由學乎所學聖人之道在方䇿玊不琢不成器人不學不知道是故古之王者建國以教民為先又學記曰古之教者家有塾黨有庠術有序國有學比年入學中年考校一年視離經辯志三年視敬業樂群五年視博習親師七年視論學取友謂之小成九年知類通逹强立而不反謂之大成左傳襄六曰鄭人遊于郷校杜預曰郷之學校以論執政然明謂子産曰毁郷學校如何恐於中謗議國政也子産曰何為夫人朝夕}
