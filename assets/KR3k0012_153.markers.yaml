  - {type: variant, offset: 120, length: 149, content: 繫其夫下王后一等猶執婦道以成肅雍之德也何彼穠矣棠棣之華曷不肅雝王姬之車何彼穠矣華如桃李平王之孫齊侯之子春秋左傳曰襄四年曰昔虞閼父為周陶正以服事我先王閼父舜之後當周之興閼父為武王陶正我先王賴其利器用也與其神明之後也舜聖故謂之神明庸以元女大姬配胡公庸用也元女武王之長女胡公閼父之子滿也而封諸陳以備三恪周, SBCK: 廻遂}
