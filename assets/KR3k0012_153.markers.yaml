  - {type: variant, offset: 569, length: 0, content: '', SBCK: 􅀄爲江夏王義恭司徒叅軍累遷尚書吏部郎叅掌大選宏識流品任舉咸盡其分又曰宋丗諸公主莫不嚴妬明帝毎疾之湖熟令􅀽慆妻以妬賜死使近臣虞通之撰妬婦記左光禄大夫江湛孫斆尚孝武帝女上乃使人爲斆作表讓婚曰伏承詔旨當以臨海公主降嬪臣寒門悴族人凡質陋閭閻有對本隔天姻如臣素流家貧業寡年近將冠皆巳有室荆􅁫布裙足得成禮自晉氏巳來配尚公主者雖累經美胄亟有名才至如王敦懾氣桓温歛威眞長佯愚以固辭子敬炙足以求免王偃無仲都之質而祼雪於北階何瑀闕龍工之姿而見投於深井謝莊迨自害於朦膄殷仲幾不免於強鉏制勒甚於僕􅀠防閑過於婢妾行來出入人理之常當待賔客朋從之義而令掃轍息駕無窺門之期廢筵抽席絶接對之理非唯交友離異仍乃兄弟踈闊姆妳爭媚相勸以嚴妮媪競前相謟以急其間又有應荅問訊卜筮師母乃至殘飲餘食詰辨與誰衣􅀍故弊必責頭領或進不獲前或入不聽出入則嫌於欲踈出則疑有别意召必以三更爲期遣必以日出爲限夕不見晚魄朝不識曙星至於夜歩月而弄琴晝拱􅃑而披卷一生之内與此長乖又聲影才聞則少婢奔迸􅅂􅃑向席則醜老叢來左右整刷以疑寵見嫌賔客未冠以少容致斥如臣門外代荷殊榮足定家聲便預提拂清宫美宦或由才􅂛一叨婚戚咸成恩假是以仰冒非冝披霧丹質非唯上陳一已規全身之願實乃廣申諸門受患之切㐲願天慈照察特賜蠲停􅀂恩制頒降披請不申便當刑膚剪髮投山竄海帝以此表遍示諸主以諷切之并爲戲􅀏梁書曰武帝}
