  - {type: variant, offset: 3662, length: 0, content: '', SBCK: 識及居喪哭泣無常因得氣疾位侍中丹陽尹卒於衛尉卿又曰栁偃字彦游年十二梁武帝引見詔問讀何書對曰尚書又問有何美句對曰德惟善政政在養民衆咸異之詔尚武帝女長城公主拜駙馬都尉又謝覽字景滌尚齊錢唐公主拜駙馬都尉武帝平建業朝士皆拜覽時年二十餘爲太子舎人長揖而巳意氣閑雅視瞻聦明武帝目送良乆謂徐勉曰覺此生芳蘭竟體想謝㽵正當如此自此乃􅀍賞味又曰謝眺及殷叡素與梁武以文章相得帝以大女永興公主􅃴叡子鈞第二女永丗公主􅃴眺子謨及帝爲雍州二女並暫隨母向州及帝即位二公主始隨内還武帝意薄謨又以門單欲更􅃴張弘䇿子弘䇿卒又以與王志子謨而謨不堪歎恨爲書狀如詩贈公主公主以呈帝甚加矜歎而婦終不得還㝷用謨爲信安縣稍遷王府諮議又曰殷叡子鈞尚武帝永興公主自宋齊巳來公主多驕淫無行永興公主加以險虐鈞形貌短小爲公主所憎每􅀍召入先滿壁爲殷叡字鈞輒流涕以出主命婢束而反之鈞不勝怒而言於帝帝以犀如意擊主碎於背然猶恨鈞又曰張纉字伯緒纉年十一}
