  - {type: variant, offset: 575, length: 362, content: 子由告歸咸陽斯置酒于家百官長皆前為壽門庭車騎以千數漢書曰單于兵強數苦北邊上問婁敬敬曰陛下誠能以嫡公主妻單于厚奉遺之彼知漢女送厚蠻夷必慕以為閼氏生子必為太子豈曾聞外孫與大父抗禮哉又曰周勃下廷尉吏侵辱之勃以千金與獄吏獄吏迺書牘背示之曰以公主為證公主孝文女也勃子勝尚之故獄吏教引為證又曰宣平侯張敖尚惠帝姊魯元公主有女惠帝即位呂太后欲為重親以公主女配帝又曰孝武衛皇后字子夫為平陽主謳者武帝即位數年無子過平陽主既飲謳者進帝獨說子夫帝起更衣子夫侍尚衣軒中得幸還坐甚忻賜平陽主金千斤子夫上車主拊其背曰行矣強飯勉之即貴願無相忘又曰烏孫以馬千疋娉女漢元封中遣江都王建女細君為公主以妻焉賜乘輿服御物為備官屬侍御數百人贈送甚盛烏孫昆莫以為右夫人公主至其國自治宮室昆莫年老言語不通公主悲愁自為作歌天子聞而憐之遣使持帷帳錦繡給遺焉又曰林慮公主子昭平君, WYG: 衡美風儀善占吐}
