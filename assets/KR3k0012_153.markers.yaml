  - {type: variant, offset: 3676, length: 0, content: '', SBCK: 號與述同徙帝大怒曰天下豈無男子欲與述同徙耶主曰先帝以妾適于桞家今有罪妾當從坐願陛下屈法申恩帝不從主憂而卒又曰南陽公主􅌆帝長女也美風儀有志節造次必以禮年十四嫁許國公宇文士及以謹肅聞及述病且卒主親調飲食手自奉上丗以此稱之及宇文化及逆弑主隨至聊城而化及爲竇建徳所敗士及自濟北西歸大唐時隋代衣冠並在其所建德引見之莫不惶懼失常唯主神色自􅀂建德與語主自陳國破家亡不能報怨雪恥淚下盈􅁭聲辭不輟情理切至建德及觀聽}
  - {type: variant, offset: 3676, length: 0, content: '', WYG: 號與述同徙帝大怒曰天下豈無男子欲與述同徙耶主曰先帝以妾適於柳家今有罪妾當從坐不願陛下屈法申恩帝不從主憂而卒又曰南陽公主煬帝長女也美風儀有志節造次必以禮年十四嫁許國公宇文述子士及以謹肅聞及述病且卒主親調飲食手自奉上世以此稱之及宇文化及弑逆主隨至聊城而化及為竇建德所敗士及自濟北西歸大唐時隋代衣冠並在其所建德引見之莫不惶懼失常唯主神色自若建德與語主自陳國破家亡不能報怨雪耻淚下盈襟聲辭不輟情理切至建德及觀聽}
