  - {type: variant, offset: 3164, length: 483, content: 亂傳賣長城民錢溫溫以送女女遇主甚酷主自告吳興太守周禮以聞於是殺溫及女適譙國曹統又曰南康宣公主興男明帝長女庾后所生初封遂安縣主適桓溫又曰新安愍公主道福簡文第三女徐淑媛所生適桓濟重適王獻之晉讚曰初衛瓘子宣尚世祖女繁昌公主宣過黃門不厚致有讒構楊駿欲專朝政諷內外奪宣公主瓘由此去位上會諸妃主議問主宣待汝薄今欲離汝意云何主素訥不能自申但泣泣是不欲離諸主因言泣是婦人重於再出故泣耳於是遂離與姑妹書稱故新婦宋書曰公主納徵虎豹皮各一又曰王偃字子游母晉孝武帝女弟鄱陽公主宋受禪封永成君偃尚宋武帝第二女吳興長公主諱榮男常倮偃縛諸庭樹時天夜雪噤凍久之偃兄恢排閤告主乃免偃謙虛恭謹不以世事關懷位右光祿大夫贈開府儀同三司子藻位東陽太守尚文帝第六女臨川長公主諱英媛公主性妬而藻別愛左右人吳崇祖景和中主讒之於廢帝藻下獄死主與王氏離婚又曰何瑀尚武帝少女豫章康長公主諱次男公主先適徐喬美容色聰敏有智數文帝世禮待特隆瑀豪競於時與平昌孟靈休東海何勗等並以輿馬相尚公主與瑀情愛隆密何氏踈戚莫不霑被恩紀又曰趙倩尚文帝第四女海鹽公主甚愛重倩嘗因言戲以手擊主事上聞文帝離婚又曰禇湛之字休玄秀之子也尚宋武第七女治安, SBCK: ''}
