  - {type: variant, offset: 3666, length: 0, content: '', krp: 四女冨陽公主拜駙馬都尉封利豪亭侯召𥙷國子生起家祕書郎時年十七身長七尺四寸眉目踈朗神采爽發武帝異之甞曰張壯武云後八丗有逮吾者其此子乎後魏書曰金根車公主封君皆乗之但右騑而巳又曰太祖甞引崔玄伯講論漢書至婁敬說漢髙祖欲以魯元公主妻匈奴善之嗟嘆良乆是以諸公主皆釐降于賔附之國又曰陸昕之風望端雅尚常山公主拜駙馬都尉公主奉姑有孝稱𥘉與穆氏瑯瑘長公主兹並爲女侍中又性不妬忌以昕之無子爲納妾媵而皆育女公主有三女無男以昕之從兄希道第四子彰爲嗣又曰蕭寳寅尚南陽長公主賜帛一千疋并給禮具公主有婦德事寳寅盡肅雍之禮好合雖積年而敬事不替寳寅每入室公主必立以待之相遇如賔自非太妃疾篤未曽歸休寳寅器性温順自處以禮奉敬公主内外諧穆清河王懌親而重之又曰馮穆尚順陽公主宋翻爲河隂令公主家奴爲劫攝而不送飜將兵圍主宅執主婿馮穆歩驅向縣時正炎暑立之日中流汗霑地又曰陳留公主寡居泰州刺史張彛意願尚主主亦許之僕射髙肇亦望尚主主意不可肇怒譛彛於丗宗停廢數年又曰髙道穆爲御史中尉莊帝姊壽陽公主行犯清路執赤棒卒河之不止穆令棒破其車公主深以爲恨泣以訴帝帝謂主曰髙中尉清貞之人彼所行者公事豈可以私責之又曰宿石元明帝時拜中壘將軍甞從獵帝親欲射虎石扣馬諌引帝上髙原上後虎騰躍殺人詔石爲忠臣切諌免虎之害賜馬一疋尚上谷公主拜駙馬都尉又曰劉昶尚武邑公主主薨更尚建興公主又尚平陽長公主及昶終與三公主同塋異穴又曰劉輝字重昌正始𥘉尚蘭陵長公主丗宗第三姊也公主頗嚴妬輝甞私幸主侍婢有身主笞殺之割其孕子節解以草裝實婢腹祼以示輝輝遂忿憾踈公主公主姊因入聽講言其故靈太后太后𥘉勑清河王懌窮其事懌與髙陽王雍廣平王懷奏其不知之狀無可爲夫婦之禮請離婚削除封位太后從之又曰嵇抜丗爲訖奚部帥其父根皇始𥘉率衆歸魏太祖嘉之拔尚華隂公主生子敬元紹之逆也公主有功超授敬大司馬封長樂王又蠕蠕曰太昌元年六月阿那瓌遣使朝貢并爲長子請尚公主孝武詔以范陽王誨之長女瑯瑘公主許之未及成婚帝入關東西魏競結阿那瓌爲婚好西魏文帝乃以孝武時舎人元翌女稱爲化政公主妻那瓌兄弟塔寒又曰阿那瓌遣使朝貢復因求㛰詔以常山王隲妹樂安公主許之改封爲蘭陵郡長公主阿那瓌奉馬千疋以爲娉禮請迎公主詔兼宗正卿元壽兼太常卿孟韶等送公主自晉陽北邁資用器物咸出豐渥阿那瓌遣迎公主於新城之南陳書沈君理美風儀博渉有識覽陳武帝鎭南徐州深見器重命尚㑹稽長公主及帝受禪拜駙馬都尉封永定亭侯爲呉郡太守時兵革未寧百姓荒弊君理揔集士卒修飾器械深以幹理見稱又曰蔡凝字子居美容止及長愽學有文詞尤工草隷累遷太子中舎人以名家子選尚信義公主拜駙馬都尉中書侍郎遷晉陵太守及將之郡更令左右修中書廨宇謂賔友曰庶來者無勞㝷授吏部侍郎凝年位未髙而才地爲時所重常端坐西齋自非素貴名流罕所交接趣時者多譏焉宣帝常謂凝曰我欲用義興主壻錢肅爲黄門郎卿意何如凝正色曰帝戚恩由聖旨則無所復問若格以僉議黄散之職故湏人門兼美帝黙然而止肅聞而不平義興公主日譖之㝷免官遷交阯後周書尉遟俟兠性弘𥙿有鑒識尚太祖姊昌樂大長公主生逈及俟兠病且卒呼二子撫其首曰汝等並有貴相但恨吾不見爾各冝勉之隋書曰文帝時蘭陵公主寡上爲之求夫選親衛栁述及蕭瑒等以示相者孫鼎鼎曰瑒當封侯而無貴妻之相述亦通顯而守位不終上曰位由我耳遂以主降述又曰蘭陵公主字阿五髙祖第}
  - {type: variant, offset: 3668, length: 3, content: 吳郡宣, SBCK: 也美姿儀性婉順好讀書髙祖於諸女中特所鍾愛􅀄嫁儀同王奉孝卒􅃴河東栁述時年十八諸姊並驕踞主獨折節遵於婦道事舅姑甚謹遇有疾病必親奉湯藥髙祖聞之大恱由是述漸見寵遇􅀄晉王廣欲以主配其妃弟蕭瑒髙祖􅀄許之後遂􅃴述晉王因不恱及述用事彌惡之髙祖旣崩述徙嶺表􅌆帝令主離絶將改嫁之}
