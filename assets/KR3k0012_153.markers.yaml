  - {type: variant, offset: 941, length: 2221, content: 夷安公主林慮病困以金千斤錢千萬為昭平君豫贖死罪帝許之林慮公主卒昭平日驕醉殺主傅母繫獄廷尉上請左右為言前入贖陛下許之帝曰吾弟老有是一子死以囑我故於是為之垂涕良久曰法令先帝所造因弟故而誣先帝之法吾何面目入高廟乎遂可其奏又曰昭帝始立年八歲帝長姊鄂邑蓋長公主居禁中共養帝蓋公主私通客河間丁外人上與大將軍聞之不絕主懽有詔外人侍長公主又曰初帝姑館陶公主號竇大主堂邑侯陳午尚之午死主寡居年五十餘矣董偃始與母以賣珠為事年十三隨母出入主家左右言其姣好召見曰吾為母養之因留第中教書計相馬御射頗讀傳記至年十八冠出則執轡入則侍內為人溫柔愛人以故諸公接之名稱城中號曰董君又曰梁王以至親故得自置相二千石出入遊戲僣於天子天子聞之心不善太后知帝弗善迺怒梁使者弗見按責王所為梁使見太長公主如淳曰景帝姊也而泣曰何梁王為人子之孝為人臣之忠太后曾不省也長公主具以告太后太后喜為帝言之帝心迺解又曰烏孫公主遣女來至京師學鼓琴漢遣侍郎樂奉送主女過龜茲龜茲前遣人至烏孫求公主女未還會女過龜茲龜茲王器留不遣復使使報公主公主許之後公主上書願令女比宗室入朝而龜茲王絳賓亦愛其夫人上書言得尚漢外孫為昆弟願與公主女俱入朝後數來朝賀樂漢衣服制度歸其國治宮室作徼道周衛出入傳呼如漢家儀外國胡人皆曰驢非驢馬非馬若龜茲王所謂騾也又曰薛宣封為侯時妻死而敬武馬公主寡居上令宣尚焉及宣免歸故郡公主留京師後宣卒公主上書願還宣葬延陵奏可其子況私從燉煌歸長安會赦因留與主私亂後漢書曰漢制皇女皆封縣公主儀服同列侯其尊崇者加號長公主儀服同蕃王諸王女皆封縣亭公主儀服同鄉亭侯肅宗唯特封東平憲王蒼瑯琊孝王京女為縣公主其後安帝桓帝妹亦封長公主同之皇女皇女封公主者所生之子襲母封為列侯皆傳國于後鄉亭之封則不傳襲又曰光武姊湖陽公主新寡帝與共論朝臣微觀其意主曰宋公威容德器群臣莫及帝曰方且圖之後宋弘被引見帝令主坐屏風後因謂弘曰喭言貴易交富易妻人情乎弘曰臣聞貧賤之交不可忘糟糠之妻不下堂帝顧主曰事不諧矣又曰董宣為洛陽令時湖陽公主蒼頭白日殺人因匿主家吏不能得及主出行而以奴驂乘宣於夏門候之乃駐車叩馬以刀畫地大言數主之失叱奴下車因杖殺之主即還宮訴帝帝大怒召宣欲箠殺之宣叩頭曰願乞一言而死帝曰欲何言宣曰陛下聖德中興而縱奴殺良民將何以治天下乎臣不須箠請得自殺即以頭擊楹血被面帝令小黃門持之使宣叩頭謝主宣不從帝強使頓之宣兩手據地終不肯俯主曰文叔為白衣時藏亡匿死吏不敢至門今為天子威不能行一令乎帝笑曰天子不與白衣同又曰鄧晨初娶世祖姊元及漢兵起晨將賓客會棘陽兵敗世祖即位封晨房子侯帝又感悼姊沒於亂兵追封謚元為新野節義長公主立廟于縣西封晨長子為吳房侯以奉公主之祀又曰竇憲字伯度女弟立為皇后憲恃宮掖聲勢遂以賤直請奪沁水公主園田主逼畏不敢計後肅宗駕出過園指以問憲憲喑嗚不能對又曰班始尚清河孝王女陰城公主順帝之姑貴驕淫亂與所嬖人居帷中召始入使伏床下始積怒永建五年遂拔刀殺主帝大怒腰斬始同產皆棄市又曰竇融長子䄓尚內黃公主子勳尚東海恭王彊女比陽公主又子固亦尚世祖女涅陽公主竇氏一公兩侯三主親戚功臣中莫與為比又曰皇女義王建武十五年封舞陽公主適延陵鄉侯大僕梁松舞陽縣屬潁川郡松梁統之子其傳云尚光武女舞陰公主又鄧訓傳舞陰公主子梁扈有罪與交通此云舞陽誤松坐誹謗誅又曰皇女中禮十五年封涅陽公主適顯親侯大鴻臚竇固涅陽屬南陽郡顯親縣屬漢陽郡固竇融子肅宗尊為長公主皇女紅夫十五年封館陶公主適駙馬都尉韓光光坐與淮陽王延謀反誅又曰館陶公主為子求郎明帝不許而賜錢千萬謂群臣曰郎官上應列宿出宰百里有非其人則民受其殃是以難之也又曰明帝永平二年少府陰就子豐殺妻酈邑公主就坐自殺續漢書曰印璽綬王公玉匣銀縷夫人貴人長公主絧縷謝承後漢書曰楊喬為尚書容儀偉麗數上書言政事桓帝愛其才貌詔妻以公主喬固讓不聽遂閉口不食七日而死魏志曰明帝愛女淑薨追封謚淑為平原公主為之立廟魏略曰初東阿王植到關自念有過宜當謝帝乃留其從官著關東將兩三人微行見清河公主欲因主以謝而關吏以聞帝使人逆之不得太后以為自殺也對帝泣下魏末傳曰何晏婦金鄉公主即晏同母妹公主賢明謂其母沛王太妃曰晏為惡日甚將不保身母笑曰汝得無妬晏耶俄而晏死有一男年五六歲宣王遣人錄之晏婦藏其子王宮中向使者搏頰乞之使者具以白宣王宣王亦聞晏婦有先見之言心常嘉之且為沛王故特原不殺吳志曰朱據字子範吳郡人有姿貌乃尚公主拜左將軍封雲陽侯謙虛接士輕財好施晉書曰王濟字武子少知名尚武帝妹常山公主公主妬忌兩目失明終無子又曰武帝勑衛瓘第四子宣尚繁昌公主瓘自以諸生之故冑婚對微素抗表固辭不許又曰孫秀子會年二十為射聲校尉尚帝女河東公主公主母喪未朞便納娉禮會形貌短陋奴僕之下者初時與富室兒於城西販馬百姓忽聞其尚主莫不駭愕又曰桓溫尚南康公主溫與庾翼友善恒相期以寧濟之事翼嘗薦溫於明帝曰桓溫少有雄略願陛下勿以常壻畜之宜委以方邵之任託其弘濟艱難翼卒以溫為都督荊梁四州諸軍事又曰武帝為晉陵主求壻王珣曰謝混雖不及劉真長不減王子敬帝曰如此便足會帝崩袁崧欲以女妻之珣曰卿莫近禁臠臧榮緒晉書曰賈后二女宣華女彥封宣華弘農郡公主女彥年八歲聰明歧嶷便能書學諷誦詩論病困賈后欲議封女彥語后曰我尚小未及成人禮不用公主及薨謚哀獻皇女以長公主禮送葬又曰孝懷詹事裴紹息猷尚滎陽長公主紹字承伯秀從兄子猷不願婚聞詔在中書即娉溫嶠妹中丞傅宣奏猷大不敬又曰帝之姑姊妹皆為長公主加綠綬晉中興書曰王敦字處冲尚武帝女襄城公主天下大亂敦將還臺悉以主嫁時侍婢百餘人配給將士金寶一時棄捐又曰臨海公主惠帝第四女羊皇后所生初封清河公主未出適值, SBCK: ''}
