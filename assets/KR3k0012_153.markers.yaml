  - {type: variant, offset: 3662, length: 0, content: '', krp: 識及居喪哭泣無常因得氣疾位侍中丹陽尹卒於衛尉卿又曰栁偃字彦游年十二梁武帝引見詔問讀何書對曰尚書又問有何美句對曰德惟善政政在養民衆咸異之詔尚武帝女長城公主拜駙馬都尉又謝覽字景滌尚齊錢唐公主拜駙馬都尉武帝平建業朝士皆拜覽時年二十餘爲太子舎人長揖而巳意氣閑雅視瞻聦明武帝目送良乆謂徐勉曰覺此生芳蘭竟體想謝㽵正當如此自此乃𬒳賞味又曰謝眺及殷叡素與梁武以文章相得帝以大女永興公主適叡子鈞第二女永丗公主適眺子謨及帝爲雍州二女並暫隨母向州及帝即位二公主始隨内還武帝意薄謨又以門單欲更適張弘䇿子弘䇿卒又以與王志子謨而謨不堪歎恨爲書狀如詩贈公主公主以呈帝甚加矜歎而婦終不得還㝷用謨爲信安縣稍遷王府諮議又曰殷叡子鈞尚武帝永興公主自宋齊巳來公主多驕淫無行永興公主加以險虐鈞形貌短小爲公主所憎每𬒳召入先滿壁爲殷叡字鈞輒流涕以出主命婢束而反之鈞不勝怒而言於帝帝以犀如意擊主碎於背然猶恨鈞又曰張纉字伯緒纉年十一}
  - {type: variant, offset: 3666, length: 0, content: '', SBCK: 四女冨陽公主拜駙馬都尉封利豪亭侯召􅀘國子生起家祕書郎時年十七身長七尺四寸眉目踈朗神采爽發武帝異之甞曰張壯武云後八丗有逮吾者其此子乎後魏書曰金根車公主封君皆乗之但右騑而巳又曰太祖甞引崔􅀇伯講論漢書至婁敬􅀃漢髙祖欲以魯元公主妻匈奴善之嗟嘆良乆是以諸公主皆􅁵降于賔附之國又曰陸昕之風望端雅尚常山公主拜駙馬都尉公主奉姑有孝稱􅀄與穆氏瑯瑘長公主兹並爲女侍中又性不妬忌以昕之無子爲納妾媵而皆育女公主有三女無男以昕之從兄希道第四子彰爲嗣又曰蕭寳寅尚南陽長公主賜帛一千疋并給禮具公主有婦德事寳寅盡肅雍之禮好合雖積年而敬事不替寳寅每入室公主必立以待之相遇如賔自非太妃疾篤未曽歸休寳寅器性温順自處以禮奉敬公主内外諧穆清河王懌親而重之又曰馮穆尚順陽公主宋翻爲河隂令公主家奴爲劫攝而不送飜將兵圍主宅執主婿馮穆歩驅向縣時正炎暑立之日中流汗霑地又曰陳留公主寡居泰州刺史張彛意願尚主主亦許之僕射髙肇亦望尚主主意不可肇怒譛彛於丗宗停廢數年又曰髙道穆爲御史中尉莊帝姊壽陽公主行犯清路執赤棒卒河之不止穆令棒破其車公主深以爲恨泣以訴帝帝謂主曰髙中尉清貞之人彼所行者公事豈可以私責之又曰􅀫石元明帝時拜中壘將軍甞從獵帝親欲射虎石扣馬諌引帝上髙原上後虎騰躍殺人詔石爲忠臣切諌免虎之害賜馬一疋尚上谷公主拜駙馬都尉又曰劉昶尚武邑公主主薨更尚建興公主又尚平陽長公主及昶終與三公主同塋異穴又曰劉輝字重昌正始􅀄尚蘭陵長公主丗宗第三姊也公主頗嚴妬輝甞私幸主侍婢有身主笞殺之割其孕子節解以草裝實婢腹祼以示輝輝遂忿憾踈公主公主姊因入聽講言其故靈太后太后􅀄勑清河王懌窮其事懌與髙陽王雍廣平王懷奏其不知之􅃺無可爲夫婦之禮請離婚削除封位太后從之又曰嵇抜丗爲訖奚部帥其父根皇始􅀄率衆歸魏太祖嘉之拔尚華隂公主生子敬元紹之逆也公主有功超授敬大司馬封長樂王又蠕蠕曰太昌元年六月阿那瓌遣使朝貢并爲長子請尚公主孝武詔以范陽王誨之長女瑯瑘公主許之未及成婚帝入􅀜東西魏競結阿那瓌爲婚好西魏文帝乃以孝武時舎人元翌女稱爲化政公主妻那瓌兄弟塔寒又曰阿那瓌遣使朝貢復因求㛰詔以常山王隲妹樂安公主許之改封爲蘭陵郡長公主阿那瓌奉馬千疋以爲娉禮請迎公主詔兼宗正卿元壽兼太常卿孟韶等送公主自晉陽北邁資用器物咸出豐渥阿那瓌遣迎公主於新城之南陳書沈君理美風儀博渉有識覽陳武帝鎭南徐州深見器重命尚㑹稽長公主及帝受禪拜駙馬都尉封永定亭侯爲呉郡太守時兵革未寧百姓荒弊君理揔集士卒修飾器械深以幹理見稱又曰蔡凝字子居美容止及長愽學有文詞尤工草􅀠累遷太子中舎人以名家子選尚信義公主拜駙馬都尉中書侍郎遷晉陵太守及將之郡更令左右修中書􅅟宇謂賔友曰庶來者無勞㝷授吏部侍郎凝年位未髙而才地爲時所重常端坐西齋自非素貴名流罕所交接趣時者多譏焉宣帝常謂凝曰我欲用義興主壻錢肅爲黄門郎卿意何如凝正色曰帝戚恩由聖旨則無所復問􅀂格以僉議黄散之職故湏人門兼美帝黙然而止肅聞而不平義興公主日􅉲之㝷免官遷交阯後周書尉遟俟兠性弘􅁉有鑒識尚太祖姊昌樂大長公主生逈及俟兠病且卒呼二子撫其首曰汝等並有貴相但恨吾不見爾各冝勉之隋書曰文帝時蘭陵公主寡上爲之求夫選親衛栁述及蕭瑒等以示相者孫鼎鼎曰瑒當封侯而無貴妻之相述亦通顯而守位不終上曰位由我耳遂以主降述又曰蘭陵公主字阿五髙祖第}
