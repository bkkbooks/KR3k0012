  - {type: variant, offset: 846, length: 0, content: '', SBCK: 陸續字智􅀄㑹稽呉人也太守尹興辟爲郡門下􅁺是時楚王英謀反隂䟽天下善士及楚事覺顯宗得其録有尹興名興詣廷尉獄續與主簿梁宏及􅁺史五百餘人詣洛陽詔獄續母逺至京師覘􅀱消息獄事持急無縁與續相聞母但作饋食付門卒以進之對食悲泣不能自勝使者恠而問其故續曰母來不得相見故但使泣耳使者大怒以爲門吏通傳意氣􅀅召案之續曰因食餉羹識母所自調和故知來耳非人告也母嘗截肉未嘗不方斷䓗以寸爲度是以知之魏志曰太祖征劉備先遣賈逵至斜谷視形勢道逢水衡載囚數十車逵以運急輒載重者一人皆放其餘太祖善之晉書曰曹攄爲臨淄令獄有死囚嵗夕攄行獄􅉖之曰卿等不幸至此非所如何新􅀊人情所重豈欲暫見家耶衆囚皆泣曰􅀂得暫歸死無恨也攄悉開獄出之剋日令還􅁺史固争咸謂不可攄曰此雖小人義不見􅀒自爲諸君任之至日相率而還並無違者一縣歎服号曰聖君北史曰後魏元麗拜雍州刺史爲政嚴酷吏人惡之其妻崔氏誕一男麗遂出州獄囚死及徒流案未由臺者一時放免宋書曰王志累遷宣城内史清謹有恩惠郡人張倪呉慶争囚經年不决志到官父老相謂曰王府君有德政吾郷里乃有如此争倪慶因相携請罪所訟地遂成閑田後爲東陽太守郡獄有重囚十餘冬至日悉遣還家過節皆反唯一人失期志曰此自太守事主者勿憂明旦果至以婦孕吏人又益歎服之又曰謝方明爲驃􅀐長史理南郡年終江陵縣獄囚事無輕重悉放歸家使過正三日還到罪重者二十餘人綱紀巳下莫不疑懼時晉陵郡送故主簿弘季咸徐夀之並隨在西固諌以爲昔人雖有事或是記籍過言且當今人情薄不可以古義相許方明不納一時遣之囚及父兄並驚喜涕泣以爲就死無恨至期有重罪二人其一醉不能歸逮二日反餘一囚十日不來五官朱千期請見自討之方明知爲囚事使左右謝五官不湏入囚當自反囚逡廵墟里不能自歸郷村責讓率領􅀅送意逃者逺近歎服焉北齊書曰梁湘東王繹遣丗子方諸出鎮郢州顔之推常管記室值侯景䧟郢之推􅀍執頻欲殺之頼其行臺郎中王則屢護救免囚送建鄴北史曰蕭撝入周爲上州刺史爲政以禮讓爲本嘗至元日獄中囚繫悉放歸家聽三日然後赴獄主者争之撝曰昔王長虞廷見稱前史吾雖寡德􅀼懷景行以之獲罪弥所甘心諸囚荷恩並依限而至吏人稱其惠化陳書曰張}
