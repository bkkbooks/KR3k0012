  - {type: variant, offset: 889, length: 8, content: 銜怒於暠華嶠後漢, WYG: 以知之魏志曰太祖征劉備先遣賈逵至斜谷視形勢道逢水衡載囚數十車逵以軍事急輙録重者一人皆放其餘太祖善之晉}
  - {type: variant, offset: 889, length: 1, content: 銜, krp: 群盗感義相引而去韓子曰温人入周周不内問之曰客耶對曰主人也問其巷而不知也史曰囚之君使人問之曰子非周人也而自謂非客何也對曰臣少也誦詩云普天之下莫非王土率土之濵莫非王臣今君天下則我天子臣也淮南子曰拘囹圄者以日爲脩當市死者以日爲短呉越春秋曰呉王拘越王勾踐與大夫范蠡於石室呉王疾越王謂太宰嚭曰囚臣請一見問疾太宰入言呉王乃見越王也列女傳曰嚴延年爲河南太守河南號曰屠伯以其刑殺爲主若屠者也其母嘗從東海來欲就延年臈到洛陽適見執囚所執決刑戮之囚也母大驚便止都亭不肯入府㑹稽典録曰盛吉拜廷尉吉性多仁恩務在哀矜每至冬月罪囚當斷夜省刑狀其妻執燭吉持筆夫妻相向垂泣妻常謂吉曰君爲天下執法不可使一人濫罪太公金匱曰文王問太公曰天下失道忠諌者死予子伯邑考爲王僕御無故烹之囚予於羑里以其羮歠予風俗通曰囚遒也言辭窮得罪誅遒也禮罪人寘諸圜土故囚字爲口中人此其象也陳留耆舊傳曰虞延除細陽令每至歲時伏臘輒什遣囚各歸家囚並感其恩應期而還韓陽天文要集曰流星入昴貴人有繫囚也論衡曰李子長爲政欲知囚情以梧桐爲人象囚之形鑿地爲塪卧木囚其中罪正者木囚不動冤侵奪者木囚動出不知囚之精神着木人耶將天神之氣動木囚也徒史記曰秦始皇至湘山逢大風不得渡上問愽士曰湘君何神對曰堯女舜妻也死而葬此始皇大}
  - {type: variant, offset: 891, length: 5, content: 於暠華嶠後, SBCK: 使刑徒三千伐湘山樹赭其山上又曰髙祖以亭長爲縣送徒驪山徒多道亡自度比至多亡之到豐西澤中止飲夜乃解縱所送徒曰公等皆去吾亦從此逝矣徒中壯士願從者十餘人}
