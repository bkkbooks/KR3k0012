  - {type: variant, offset: 3705, length: 5, content: 為字似皇故, SBCK: 嘉石平罷民凢萬民之有罪過而未麗於法而害於州里者桎梏而坐諸嘉石􅃥諸司空重罪旬有三日坐朞􅃥其次九日坐九月􅃥其次七日坐七月􅃥其次五日坐五月􅃥其下罪三日坐三月役使州里任之則宥而舎之又秋官上曰司圜掌收教罷民凢害人者弗使冠飾而加明刑焉任之以事而収教之能}
