  - {type: variant, offset: 2506, length: 517, content: 伯宗曰必伐之狄有五罪不祀一也嗜酒二也棄仲章而奪黎氏地三也仲章路賢人黎氏黎侯也虐我伯姬四也傷其君目五也怙其雋才而不以茂德滋益罪也又曰衛獻公使祝宗告亡且告無罪告宗廟也定姜曰有罪若何告無罪舍大臣而與小臣謀一罪也先君有冢卿以為師保而蔑之二罪也余以巾櫛先君而暴妾使余三罪也告亡而已無告無罪又曰吳公子札自衛過晉將宿於戚聞鍾聲焉曰異哉吾聞之辯而不德必加於戮矣夫子獲罪於君是以在此懼猶不足而又何樂又曰鄭公孫黑將作亂子產使吏數之曰伯有之亂以大國之事而未爾討也爾有亂心無厭國不汝堪專伐伯有而罪一也昆弟爭室而罪二也董隧之盟汝矯君位而罪三也有死罪三何以堪之又曰陳侯之弟招殺太子偃師罪在招也楚人執陳行人于徵師殺之罪不在行人也論語曰公冶長曰子謂公冶長可妻也雖在縲絏之中非其罪也以其兄之子妻之又堯曰曰朕躬有罪無以萬方萬方有罪罪在朕躬孝經曰五刑之屬三千而罪莫大於不孝家語曰孔子曰大罪有五而殺人為下逆天地者罪及五世誣文武者罪及四世逆人倫者罪及三世誣鬼神者罪及二世手殺人者罪止其身又曰孔子曰大夫之罪在五刑之域者聞有譴發譴讓也發始發露也則白冠𣯛纓盤水加劍造于闕而自請罪君不使有司執縛牽掣而加之也其有大罪者聞命則北面再拜跪而自裁君不使人捽引而刑殺之也大夫自取之耳吾遇子有禮矣, WYG: 徒}
