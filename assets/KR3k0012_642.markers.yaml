  - {type: variant, offset: 2214, length: 253, content: 無良韓詩外傳曰齊景公之時民有得罪於景公者景公大怒縛置之殿下召左右支解之晏子左手持頭右手磨刀仰面而問曰古者明王每支解人不審從何支始也景公離席曰縱之罪在寡人禮曰子夏喪其子而喪其明曾子弔之曰吾聞之朋友喪明則哭曾子哭子夏亦哭曰天乎予之無罪也曾子怒曰商汝何無罪吾與汝事夫子於洙泗之問退而老於西河之上使西河之民疑汝於夫子爾罪一也喪爾親使民未有聞焉爾罪二也喪爾子而喪爾明爾罪三也汝何無罪與子夏投其杖而拜之曰吾過矣吾過矣傳曰秦伯素服郊次向師而哭曰孤違蹇叔以辱二三子孤之罪也不替孟明孤之過也又曰潞子嬰兒之夫人晉景公之姊也酆舒, WYG: 長}
