  - {type: variant, offset: 2974, length: 279, content: 有司執縛牽掣而加之也其有大罪者聞命則北面再拜跪而自裁君不使人捽引而刑殺之也大夫自取之耳吾遇子有禮矣史記曰范睢盛帷帳侍者甚眾須賈賈頓首言死罪曰賈不意君能致於青雲之上惟君死生之范睢曰汝罪有幾曰擢賈之髮以續賈之罪尚未足也漢書曰惠帝二年制曰今法有誹謗訞言之罪是使眾臣不敢盡情而上無由聞過失也將何以來遠方賢良其除之又曰南越反上復欲使楊僕將為其伐前勞以書勑責之將軍非有斬將搴旗之實也焉足以驕太哉前破番禺捕降者以為虜掘死人以為獲是一過也建德呂嘉建德他孫也呂嘉他相也逆罪不容於天將軍擁精兵不窮追超然以東越為援是二過也士卒暴露連歲朕為朝會不置酒將軍不審其勳勞而造佞巧請乘傳行塞, SBCK: 斷}
