  - {type: variant, offset: 3290, length: 7, content: 荊州剌史趙凱誣, WYG: 尚書郎張俊自獄中上書訟罪而俊獄已報廷尉将出榖門臨行刑鄧太后詔馳騎以减死論俊上書謝曰孤恩負義自陷重刑清㫁竟訖無所復望廷尉鞫遣刀鋸在前棺絮在後魂魄飛揚形容已枯陛下聖澤以臣嘗在近宻識其状貌復其眼目留心曲慮特加偏覆䘮車復還白骨更肉披棺發槨起見白日天地父母能生臣俊不能使臣俊當死復生陛下徳過天地恩重父母誠非臣㑓破碎骸骨舉宗腐爛所報萬一臣㑓徒也不得上書不勝去死就生踴躍冒拜章上世皆哀其文魏畧曰人得崔琰書以裹幘籠持其籠行都道中時有與琰宿不平者遥見琰名著幘籠從而視之遂白太祖以為琰腹誹心謗乃收付獄髠刑輸徒前所白琰者又白云琰為徒虬鬚直視心似不平太祖亦以為然遂殺之又曰王凌字彦雲太原人凌為長遇事髠刑五年當道掃除時太祖車過問此何徒左右以状對太祖曰此所坐亦公耳於是選為驍騎主簿三國典畧曰太原公洋之赴晉陽也陽休之勸崔季舒從曰一日不期其間容刀季舒性好聲色心在閒放遂不請行欲恣其滛樂司馬子如等縁宿憾乃}
