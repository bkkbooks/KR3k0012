  - {type: variant, offset: 3710, length: 0, content: '', WYG: 國家嘗遣三府請詔月一案行又置南甄官使者主養病徒僅能存之語所謂洛陽豪徒韓伯宻加笞三百不中一髠頭至耳髪至膝此種刑法非國家之意徒作年數周禮秋官上大司冦曰以嘉石平罷民凡萬民之有罪過而未麗於法而害於州里者桎梏而坐諸嘉石役諸司空重罪旬有三日坐朞役其次九日坐九月役其次七日坐七月役其次五日坐五月役其下罪三日坐三月役使州里任之則宥而舎之又秋官上曰司圜掌收教罷民凡害人者弗使冠飾而加明刑焉任之以事而收教之能}
