  - {type: variant, offset: 1284, length: 0, content: '', WYG: 元麗拜雍州刺史為政嚴酷吏人患之其妻崔氏誕一男麗遂出州獄死囚及徒流案未申䑓者一時放免宋書曰王志累遷宣城内史清謹有恩恵郡人張倪吴慶争田經年不决志到官父老相謂曰王府君有徳政吾鄉里乃有如此争倪慶因相擕請罪所訟地遂成閒田後為東陽太守郡獄有罪重囚十餘人至日悉遣還家過節皆反惟一人失期志曰此自太守事主者勿憂明日果至以婦孕吏人益歎服之又曰謝方明為驃騎長史理南郡年終江陵縣獄囚事無輕重悉放歸家使過年三日還到罪重者二十餘人綱紀已下莫不疑懼時晉陵郡送故主簿𢎞季盛徐夀之並随在西固諫以為昔人雖有其事或是記籍過言且當今人情簿不可以古義相許方明不納一時遣之囚及父兄並驚喜涕泣以為}
