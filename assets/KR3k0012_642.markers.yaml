  - {type: variant, offset: 886, length: 1, content: 冀, krp: 乃來取昨所呈事視訖謂曰卿意當欲宥此囚死命昨於齋坐見其事亦有心活之但此囚罪重不可全貸旣欲加恩卿便當代任其罪因命左右収典籖付獄殺之原此囚生命唐書曰韋仁壽隋大業末爲蜀郡法司書佐獄無冤囚其有得罪者臨將就戮猶西向爲仁壽禮佛而死又曰太宗親録囚徒多所原宥見死罪者憫之放歸于家限至來秋即戮乃勑天下死囚皆放令入京並依期而集於是天下死罪囚三百九十人皆釋禁自至朝堂不勞督領一無逃散太宗感其奉法竟盡赦之又曰髙宗遵貞觀故事務在恤刑嘗問大理卿唐臨在獄繫囚之數臨對曰見囚五十餘人唯二人合死上以囚數少甚喜又曰吕元膺爲蘄州刺史頗著恩信甞歲終閱郡囚囚有自告者曰某有父母在明日元正不得相見因泣下元膺憫焉盡脫其械縱之與爲期守吏曰賊不可縱元膺曰吾以忠信待之及期無後到者}
  - {type: variant, offset: 889, length: 1, content: 銜, SBCK: 群盗感義相引而去韓子曰温人入周周不内問之曰客耶對曰主人也問其巷而不知也史曰囚之君使人問之曰子非周人也而自謂非客何也對曰臣少也誦詩云普天之下莫非王􅁟率􅁟之濵莫非王臣今君天下則我天子臣也淮南子曰拘囹圄者以日爲脩當市死者以日爲短呉越春秋曰呉王拘越王勾踐與大夫范蠡於石室呉王疾越王謂太宰嚭曰囚臣請一見問疾太宰入言呉王乃見越王也列女傳曰嚴延年爲河南太守河南號曰屠伯以其刑殺爲主􅀂屠者也其母嘗從東海來欲就延年臈到洛陽適見執囚所執決刑戮之囚也母大驚便止都亭不肯入府㑹稽典録曰盛􅁻拜廷尉􅁻性多仁恩務在哀矜每至冬月罪囚當斷夜省刑狀其妻執燭􅁻持筆夫妻相向垂泣妻常謂􅁻曰君爲天下執法不可使一人濫罪太公金匱曰文王問太公曰天下失道忠諌者死予子伯邑考爲王僕御無故烹之囚予於羑里以其羮歠予風俗通曰囚遒也言辭窮得罪誅遒也禮罪人寘諸圜土故囚字爲口中人此其象也陳留耆舊傳曰虞延除細陽令每至􅀊時伏臘輒什遣囚各歸家囚並感其恩應期而還韓陽天文要集曰流星入昴貴人有繫囚也論衡曰李子長爲政欲知囚情以梧桐爲人象囚之形鑿地爲塪卧木囚其中罪正者木囚不動􅁈侵奪者木囚動出不知囚之精神着木人耶將天神之氣動木囚也徒史記曰􅁗始皇至湘山逢大風不得渡上問愽士曰湘君何神對曰堯女舜妻也死而葬此始皇大}
