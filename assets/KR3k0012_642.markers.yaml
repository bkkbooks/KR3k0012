  - {type: variant, offset: 1300, length: 11, content: 還屬侍中穆紹與元順侍坐, WYG: 至吏人稱其恵化陳書曰張種以外戚賜無錫嘉興縣侯秩嘗於無錫見有重囚在獄天寒呼囚曝日遂失之陳文帝聞之笑而不責南史曰吉翰監豫州梁郡諸軍事時有死罪囚典籖意欲活之}
