  - {type: variant, offset: 886, length: 1, content: 冀, SBCK: 乃來取昨所呈事視訖謂曰卿意當欲宥此囚死命昨於齋坐見其事亦有心活之但此囚罪重不可全貸旣欲加恩卿便當代任其罪因命左右収典籖付獄殺之原此囚生命唐書曰韋仁壽隋大業末爲蜀郡法司書佐獄無􅁈囚其有得罪者臨將就戮猶西向爲仁壽禮佛而死又曰太宗親録囚徒多所原宥見死罪者憫之放歸于家限至來秋即戮乃勑天下死囚皆放令入京並依期而集於是天下死罪囚三百九十人皆釋禁自至朝堂不勞督領一無逃散太宗感其奉法竟盡赦之又曰髙宗遵貞觀故事務在恤刑嘗問大理卿唐臨在獄繫囚之數臨對曰見囚五十餘人唯二人合死上以囚數少甚喜又曰吕元膺爲蘄州刺史頗著恩信甞􅀊終閱郡囚囚有自告者曰某有父母在明日元正不得相見因泣下元膺憫焉盡脫其械縱之與爲期守吏曰賊不可縱元膺曰吾以忠信待之及期無後到者}
