  - {type: variant, offset: 65, length: 1, content: 貪, SBCK: 禮月令仲夏小暑至挻重囚出輕繫挻猶寛也重囚寛之至秋方决輕輕繫岀而舎之也傳荘公曰乗丘之􅃥公以金僕姑射南宫長萬公右歂孫生搏之宋人請之宋公靳之曰始吾敬子今子魯囚也吾不敬子矣又曰晉襄公縛秦囚使莱駒以戈斬之囚呼菜駒失戈狼瞫音審取戈以斬囚遂以爲右又曰鄭公子歸生受命于楚伐宋宋華元樂吕禦之戰于大􅁄宋師敗績囚華元獲樂吕又曰晉侯觀于軍府見鍾儀問之曰南冠而縶者誰也南冠楚冠也繫拘繫也有司對曰鄭人所獻楚囚也使稅之召而弔之再拜稽首問其族對曰伶人也公曰能樂乎對曰先父之職官也敢有二事使與之琴操南音公曰君王何如對曰非小}
