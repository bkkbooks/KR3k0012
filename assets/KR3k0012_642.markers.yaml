  - {type: variant, offset: 3705, length: 5, content: 為字似皇故, krp: 嘉石平罷民凢萬民之有罪過而未麗於法而害於州里者桎梏而坐諸嘉石役諸司空重罪旬有三日坐朞役其次九日坐九月役其次七日坐七月役其次五日坐五月役其下罪三日坐三月役使州里任之則宥而舎之又秋官上曰司圜掌收教罷民凢害人者弗使冠飾而加明刑焉任之以事而収教之能}
  - {type: variant, offset: 3706, length: 3, content: 字似皇, WYG: 美談孔融肉刑論曰今之洛陽道橋作徒囚於服役十死一生}
