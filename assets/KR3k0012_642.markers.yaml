  - {type: variant, offset: 983, length: 288, content: 死范曄後漢書曰歐陽歙字正思樂安千乘人為大司徒坐在汝南贓罪千餘萬發覺下獄諸生守闕為歙求哀者千餘人至有髡剃者子年十七聞獄當斷馳之京行到河內獲嘉縣自繫上書求代歙死書奏而歙已死獄中又曰李膺遷河南尹時宛陵大姓羊元群罷北海郡贓罪狼籍郡舍溷軒有奇巧乃載之以歸膺表欲治其罪元群行賂官豎膺反坐輸作左校又曰蔡衍字孟喜汝南南頓人也遷冀州剌史劾河間相曹鼎贓罪千萬鼎者中常侍騰之弟也騰使大將軍梁冀為書請之衍不荅鼎竟坐輸作左校後魏書曰鄭義為兗州性貪恡政以賄成有餉羊西門受入東門賣之又曰崔光韶遷廷尉卿時祕書監祖瑩以贓罪被劾光韶欲置之重法太尉城陽王徽吏部尚書李神雋皆為瑩求寬光韶正色曰朝賢執事於舜之功未聞有一, WYG: 此非所}
