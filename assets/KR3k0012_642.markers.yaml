  - {type: variant, offset: 3690, length: 3, content: 辠字為, SBCK: 徒不上墓說新遭刑罪原解者不可以上墓祠祀令人死亡謹案孝經身體髪膚受之父母曽子病困啓手足以歸全也今遭刑者髡首剔髮身􅀍加笞新出狴犴臭􅁾不㓗凡􅀕祀者孝子致齋貴馨香如親存也時見子􅀍刑心有惻愴縁生事死恐明不歆承當不上墓耳郭子曰劉道真嘗爲徒扶風王司馬駿以五疋布贖之旣而用爲從事中郎當時以爲羙談孔融肉刑論曰今之洛陽道橋作徒囚於厮役十死一生故國家常遣三府請詔月一案行又置南甄官使者主養病徒僅能存之語所謂洛陽豪徒韓伯宻加笞三百不中一髡頭至耳髮詣膝此}
  - {type: page-break, offset: 3690, content: '', id: KR3k0012_SBCK_642-8b}
  - {type: variant, offset: 3690, length: 2, content: 辠字, WYG: 徒不上墓説新遭刑罪原觧者不可以上墓祠祀謹案孝經身體髪膚受之父母曾子病困啟手足以歸全也遭刑者髠首剔髪身被枷笞薰染狴犴臭穢不㓗凡祭祀者孝子致齋貴馨香如親存也時見子被刑心有惻愴縁生事死恐明不歆承當不上墓耳郭子曰劉道真嘗}
