  - {type: variant, offset: 1298, length: 1, content: 敗, WYG: 方明知為囚事使左右謝五官不須入囚當自反囚逡廵墟里不能自歸鄉村責譲率領将送竟無逃者逺近歎服焉北齊書曰梁湘東王繹遣世子方諸出鎮郢州顔之推掌管記室值侯景陷郢之推被執頻欲殺之賴其行䑓郎中王則屢護救免囚送建業北史曰蕭撝入周為上州刺史為政以禮譲為本嘗至元日獄中囚繋悉放歸家聽三日然後赴獄主者争之撝曰昔王長虞延見稱前史吾雖寡徳竊懐景行以之獲罪彌所甘心諸囚荷恩並依限}
