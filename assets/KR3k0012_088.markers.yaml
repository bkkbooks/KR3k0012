  - {type: variant, offset: 317, length: 3, content: 字季媼, SBCK: 大臣共誅之使迎代王王問左右郎中令張武等議日漢大臣皆故髙帝時大將習兵多謀詐今誅諸吕新啑血京師此以迎大王爲名實不可信願大王稱疾無徃以觀其變中尉宋昌進曰夫􅁗失其政諸侯豪傑並起人人自以爲得之者以萬數然卒踐天子位者劉氏也天下絶望一矣髙帝封王子弟地犬牙相制此所謂盤石之宗也天下服其強二矣漢興除􅁗苛政約法令施德惠人人自安難動摇三也夫以吕太后之嚴立諸吕爲三王擅權專制然而太尉以節入北軍一呼士皆左􅃝爲劉氏叛諸吕卒以滅之此乃天授非人力也今髙帝子獨淮南王與大王大王又長賢聖仁孝聞於天下故大臣因天下之心而欲迎立大王大王勿疑也代王卜之􅀛兆得大横占曰大横庚庚余爲天王夏啓以光代王曰寡人固以爲王矣又何王卜人曰所謂天王者乃天子也代王乃命宋昌叅乗張武等六人乗傳詣長安至髙陵休止而使宋昌先馳之長安觀變昌至渭橋丞相巳下皆迎宋昌還報代王馳至渭橋羣臣拜謁太尉勃進曰願請間言昌曰所言公公言之所言私王者不受私太尉乃跪上天子之璽符代王謝曰至代邸而議之遂馳入代邸宗室大臣列侯吏二千石皆伏固請代王西向讓者三南向讓者再遂即天子位即日夕入未央宫三年匈奴入北地居河南爲宼帝自甘泉之髙奴因幸太原見故羣臣皆賜之舉功行賞十三年齊太倉令淳于公有罪當刑少女緹縈自傷泣迺隨其父至長安上書願没入爲官婢贖父刑罪使得自新書奏天子天子憐悲其意乃下詔曰夫刑至斷支體刻肌膚終身不息何其楚痛豈稱爲民父母之意哉其除肉刑又曰孝文皇帝從代來即位二十三年宫室苑囿狗馬服御無所増益有不便輙弛以利民}
