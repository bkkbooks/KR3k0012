  - {type: variant, offset: 4919, length: 4, content: 姉魯元公, SBCK: 又夢見髙祖謂巳曰王美人生子可名爲􅇾及生男日因名之焉武帝生於猗蘭殿年四􅀊立爲膠東王數􅀊長主抱着其膝上問曰兒欲得婦不膠東王曰欲得婦長主指左右長御百餘人皆云不用末指其女問曰阿驕好不於是乃􅀏對曰好􅀂得阿驕作婦當作金屋貯之也長主大恱乃苦要上遂定㛰焉膠東王爲皇太子時年七􅀊上曰􅇾者徹也因改曰徹丞相周亞夫宴見時太子在側亞夫失意有怨色太子視之不輟亞夫於是起帝曰爾何故視此人耶對曰此人可畏必能作賊帝􅀏曰因此怏怏非少}
