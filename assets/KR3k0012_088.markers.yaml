  - {type: variant, offset: 4984, length: 3, content: 孝惠短, SBCK: ''}
  - {type: variant, offset: 4984, length: 3, content: 孝惠短, krp: ''}
  - {type: variant, offset: 4985, length: 2, content: 惠短, WYG: 武皇帝愍中國罷勞無安寧之時乃遣大將伏波樓船之屬滅百越七郡北攘匈奴降昆邪之衆置五屬國起朔方以奪其肥饒之地東伐朝鮮起元菟樂浪以斷匈奴之左臂西伐大宛并三十六國結烏孫起燉煌酒泉張掖以隔婼羌裂匈奴之右肩單于孤特逺遁幕北四垂無事斥地逺境起十餘郡功業既定迺封丞相為富民侯以安天下富實百姓其規模可見又招集天下賢俊與協心同謀興制度改正朔易服色立天地之祠建封禪殊官號存周後定諸侯之制永無逆爭之心至今累}
