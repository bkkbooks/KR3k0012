  - {type: variant, offset: 5083, length: 1, content: 幽, WYG: 笑對曰好若得阿嬌作婦當作金屋貯之也長主大悅乃苦要上遂定婚焉膠東王為皇太子時年七歲上曰彘者徹也因改曰徹丞相周亞夫宴時太子在側亞夫失意有怨色太子視之不輟亞夫於是起帝曰爾何故視此人耶對曰此人可畏必能作賊帝笑曰因此怏怏非少主之臣也廷尉上囚防年繼母陳殺父因殺陳依律年殺母大逆論帝疑之詔問太子太子對曰夫繼母如母明其不及母也縁父之愛故比}
  - {type: variant, offset: 5086, length: 2, content: 永巷, WYG: 母耳今繼母無狀手殺其父則下手之日母恩絶矣宜與殺人者同不宜大逆論帝從之年棄市議者稱善時太子年十四帝益以竒之及即位常晨徃夜還與霍去病等十餘人皆輕服為微行且以觀戲市里察民風俗嘗至蓮勺通道}
