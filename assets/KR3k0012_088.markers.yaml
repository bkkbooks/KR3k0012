  - {type: variant, offset: 5200, length: 0, content: '', WYG: 自將懼以南越之誅彼時號為威震匈奴矣後漢班固武帝述曰世宗曄曄思𢎞祖業疇咨熙載髦俊並作厥作伊何百蠻是攘恢我疆宇外薄四荒武功既抗亦迪斯文憲章六學統一聖真封禪郊祀祭旅百神協律改正饗兹永年魏陳王曹植漢武帝賛曰世宗踐位戎狄是攘威震百蠻恢拓土疆簡定律厯辨修舊章封天禪土功超百王周庾信漢武帝聚書賛曰獻書路廣藏書府開秦儒出谷漢簡吹灰芝泥印上玉匣封來坐觀風俗不出蘭臺沈炯祭漢武帝陵文曰臣聞橋山雖掩鼎湖之靈可祠有魯遂荒大庭之跡不泯伏惟陛下降德猗蘭纂靈豐谷漢道既登神仙可望射神蛟於江浦禮日觀而稱功横中流於汾河指栢梁而髙宴何其甚樂豈不然歟既而運屬上遷道窮晏駕甲帳珠簾一朝零落茂陵玉椀遂出人間陵雲故塞與原田而膴膴别風餘趾帶陵阜而茫茫覉旅之臣豈不落淚昔者承明見厭嚴助}
