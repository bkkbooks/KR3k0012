  - {type: variant, offset: 5117, length: 0, content: '', WYG: 吏告民盜用乘輿御物者案其題乃茂陵中明噐也民别買得光疑葬日監官不謹容致盜竊乃收將作以下繫長安獄考訊居歲餘鄴縣又有一人於市貨玉杯吏疑其御物欲捕之因忽不見縣送其噐推問又茂陵中物也光自呼吏問之說市人形貌如先帝光於是黙然乃赦前所繫者歲餘上又見形謂茂陵令薛平曰吾雖失世猶為汝君奈何令吏卒上吾陵上磨刀劔乎忽然不見因推問陵旁有方石}
