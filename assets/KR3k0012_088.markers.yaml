  - {type: variant, offset: 5120, length: 0, content: '', WYG: 盜磨刀劔甘泉宫恒自然有鐘鼔聲候者時見後宫鹵簿似天子自後轉稀至宣帝世乃絶宣帝即位尊孝武廟曰世宗奏樂之日虚中有唱善者告祠之日白鵠羣飛集後庭西河立廟神光滿殿中狀如月東萊立廟有大鳥啼其上白龍夜見河東立廟告祠之日白虎啣肉置殿前又有一人騎馬馬異於常馬持捉一札賜將作丞曰聞汝績克成賜汝金一斤因忽不見札乃變為金稱之有一斤廣川告祠之明日有鐘磬音房户皆開夜有光香氣正聞二三里宣帝親祠甘泉有頃紫黃氣從西北來散於殿前肅然有風空中有妓樂聲羣鳥翔舞蔽天宣帝既親覩光怪乃疑先帝有神復招諸方士冀得仙焉帝王世紀曰孝武帝廟名淵龍幽明録曰漢武帝在甘泉宫有玉女降常與帝圍碁相娛女風姿端正帝宻悅乃逼之玉女因唾帝面而去遂病瘡經年故漢書云避暑甘泉宫此其時也劉歆七畧曰孝武皇帝勅丞相公孫𢎞廣開獻書之路百年之間書積如丘}
