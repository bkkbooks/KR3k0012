  - {type: variant, offset: 5089, length: 1, content: 群, WYG: 行行者皆奔避路上怪之使左右問之云有持㦸前呵者數十人時微行率不過二十人馬七八疋更步更騎衣如凡庶不可别也亦了無騶御而百姓咸見之又嘗至栢谷夜宿亭亭長不内乃宿於逆旅逆旅翁謂上曰汝長大多力當勤稼穡何忽帶劔衆夜行此不欲為盜則淫耳上嘿然不應因乞漿飲翁答曰吾止有溺無漿也有頃還内上使覘之見翁方與少年十餘人皆持弓矢刀劔令主人嫗出探過客嫗歸謂其翁曰吾觀此丈夫非常人也且亦有備不可圖也天寒嫗酌酒多與夫及諸少年皆醉嫗自縳其夫諸少年皆走嫗出謝客殺雞作食平旦上去是日還宫乃召逆旅夫妻見之賜嫗千金擢其夫羽林郎自是懲戒弗復㣲行上少好學招求天下遺書上親自省校使莊助司馬相如等以類分别之好詞賦每所行幸及竒獸異物輙命相如等賦之上亦自作詩賦數百篇下筆即成初不留時相如造文遲彌時而後成上每歎其工妙謂相如曰以吾之速易子之遲可乎相如曰於}
