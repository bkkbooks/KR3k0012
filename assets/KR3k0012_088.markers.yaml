  - {type: variant, offset: 3944, length: 567, content: 騎追者數千人項王自度不得脫謂其騎曰吾起兵至今八歲矣身七十餘戰所當者破所擊者服未嘗敗北遂霸有天下然今卒困於此天之亡我非戰之罪也項王乃欲東渡烏江瓚曰在牛渚也烏江亭長艤船待孟康曰艤音蟻附著岸也如淳曰南方人謂整船向岸曰艤謂項王曰江東雖小地方千里眾數十萬人亦足王也願大王急渡今獨臣有船漢軍至無以渡項王笑曰天之亡我我何渡為且籍與江東子弟八千人渡江而西今無一人還還江東父兄憐而王我我何面目見之縱彼不言籍獨不愧於心乎乃謂亭長曰吾知公長者吾騎此馬五歲所當無敵嘗一日千里吾不忍殺之以賜公乃令騎皆下馬步行持短兵接戰獨籍所殺漢軍數百人項王身亦被十餘創顧見漢騎呂馬童曰若非吾故人乎馬童面之張晏曰以故人難親斫聽之故皆面之也如淳曰面不視正也指王翳曰如淳曰指示王翳也此項王也項王乃曰吾聞漢購我頭千金邑萬戶吾為汝得徐廣曰亦可取是功德之德也乃自刎而死漢以魯公禮葬項王於穀城太史公曰吾聞之周生周時賢也曰舜重瞳子又聞項羽亦重瞳子豈其苗裔乎何其興之暴也夫秦失其政陳涉首難豪傑蜂起相與並爭不可勝數然羽非有尺寸乘勢起隴畝之中三年遂將五諸侯滅秦此時山東六國而齊趙韓魏燕五國並伐秦故云五諸侯也分裂天下而封王侯政由羽出號為霸王位雖不終近古以來未嘗有也周生烈子曰桀紂是湯武之梯秦項是大漢之階也四逆不興則三順不勝也蔣子萬機論曰項羽若聽范增之策則平步取天下也譙周法訓曰劉項方爭父戰於前子鬥於後, WYG: 道}
