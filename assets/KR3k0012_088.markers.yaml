  - {type: variant, offset: 1820, length: 2529, content: 高祖開建大業統辟元功度量規矩不可尚矣是時天下初定而庶事草創故韶夏之音未有聞焉楚漢春秋曰項王在鴻門而亞父諫曰吾使人望沛公其氣衝天五彩相糺或似雲或似龍或似人此非人臣之氣也不若殺之帝王世紀曰豐公家于沛之豐沛邑之陽里其妻夢赤馬若龍戲已而生執嘉是為太公即太上皇也太上皇之妃曰媼是為昭靈后名含始遊於洛池有玉雞衘赤珠出刻曰玉英吞此者王含始吞之生邦字季又曰玄晏先王曰禮稱至道以王義道以霸觀漢祖之取天下也遭秦世暴亂不偕尺土之資不權將相之柄發跡泗亭奮其智謀羈勒英雄鞭驅天下或以威服或以德致或以義成或以權斷逆順不常霸王之道雜焉是以聖君帝王之位而無一定之制三代之美固難及矣後漢班叔皮王命論曰在昔帝堯之禪曰咨爾舜天之曆數在爾躬舜亦命禹暨于稷契咸佐唐堯光濟四海弈世載德至于湯武而有天下雖其遭遇異時禪代不同至于應天順民其揆一也是故劉氏承堯之祚氏族之世著于春秋唐據火德而漢紹之始起沛澤則神母夜號以彰赤帝之符由是言之帝王之作必有明聖顯懿之德豐功厚利積累之業然後精誠通于神明流澤加於生人故能為鬼神所福饗天下所歸往未見運世無本功德不能紀而得堀然在此位者世俗見高祖興於布衣不達其故以為適遭暴亂得奮其劍遊說之士至比天下於逐鹿幸捷而得之不知神器有命不可智力求悲夫此世之所以多亂臣賊子者項籍河圖曰怪目勇敢重瞳大力楚之邦尚書中候曰自號之王霸姓有工項羽為西楚霸王工項字之側史記曰項籍者下相人也地里志云臨淮浪有下相縣字羽初起時年二十四季父項梁梁父即楚將項燕為秦將王剪所戮項氏世世為楚將封於項故姓項氏籍少時學書不成去學劍又不成項梁怒之籍曰書足以記名姓而已劍一人敵不足學學萬人敵於是項梁乃教籍兵法籍大喜梁殺人與籍避仇於吳秦始皇帝遊會稽渡浙江梁與籍俱觀籍曰彼可取而代也梁掩其口曰無妄言族矣梁以此奇之籍身長八尺餘力能扛鼎韋昭曰扛舉也才氣過人秦二世元年九月會稽守徐廣曰爾時未云太守也通謂梁曰楚漢春秋曰會稽假守適通也吾欲發兵使公及桓楚為將是時桓楚亡在澤中梁曰桓楚亡人莫知其處獨籍知召籍使授命召桓楚守曰諾梁召籍入須臾梁眴籍曰可行矣於是籍遂拔劍斬守頭遂舉吳中兵使人收下縣得精兵八千人項梁乃渡江而西凡六七萬人軍下邳此時沛公亦起沛往焉乃求楚懷王孫立以為楚懷王王召宋義以為上將軍項羽為魯公次將范增為末將諸別將皆屬宋義號為卿子冠軍項羽晨朝上將軍宋義即其帳中斬宋義頭出令軍中曰宋義與齊謀反楚楚王陰令羽誅之當是時諸將皆懾服莫敢枝梧如淳曰梧當枝猶枝桿也臣瓚曰小杜為枝邪柱為梧今屋梧邪柱是也皆曰首立楚者將軍家也今將軍誅亂乃相與共立羽為假上將軍懷王因使羽為上將軍乃悉引兵渡河皆沉船破釜甑燒廬舍持三日糧以示士必死無一還心於是至則圍王離與秦軍遇九戰絕其甬道大破之虜王離諸將皆從壁觀楚戰士無不一當十呼聲動天地項羽召見諸侯諸侯入轅門張晏注曰軍行以車為陣轅相倚為門曰轅門無不膝行而前莫敢仰視項羽引兵西屠咸陽殺秦降王子嬰燒秦宮室火三月不滅收其寶貨婦女而東人或說項王曰關中阻山河四塞地肥饒可都以霸項王見秦宮室皆以燒殘破又心懷思欲東歸曰富貴不歸故鄉如衣繡夜行誰知之者說者曰人言楚人沐猴而冠耳果然張晏曰沐猴獮猴也項王自立為西楚霸王王九部都彭城漢之二年漢王伐楚皆已入彭城收其寶貨項王乃從蕭晨擊漢軍而東至彭城大破漢軍漢軍皆走相隨入穀泗水二水皆在沛郡彭城殺漢卒十餘萬人漢卒皆南走山楚又追擊之靈壁東徐廣曰在彭城睢水上徐廣曰睢水彭城西水入泗水漢軍卻為楚所擠擠排也多殺漢卒十餘萬皆入睢水睢水為之不流圍漢王三匝於是大風從西北起折木發屋揚沙石窈冥晝晦逢迎楚軍楚軍大亂壞散而漢王乃得與數十騎遁去漢之四年項王西與漢俱臨廣武而軍孟康注曰築兩城相對在廣武敖倉西三皇山山上相守數月當此時彭越數反梁也絕楚糧道項王患之楚漢久相持未決丁壯苦軍旅老弱罷轉漕項王謂漢王曰天下匈匈數歲者徒以吾兩人耳願與漢王挑戰李奇曰桃身獨戰不須眾也挑音茶了反瓚曰挑戰擿趟撓敵求戰古謂之致師決雌雄無徒苦天下之民父子為也漢王笑謝曰吾寧鬥智不能鬥力項王命壯士出挑戰漢王有善騎射者樓煩應劭曰樓煩今樓煩縣楚挑戰三合樓煩輒射殺之項王大怒乃自被甲持戟挑戰樓煩欲射之項王瞋目叱之樓煩目不敢視手不敢發遂走還入壁不敢復出漢王使人間問之乃項王也漢王大驚於是項王乃即漢王相與臨廣武間而語漢王數之項王怒甚欲一戰漢王不聽項王伏弩射中漢王漢王傷走入成皋項王乃與約中分天下割鴻溝以西者為漢文頴曰於滎陽下引河東為鴻溝以通宋鄭陳蔡曹衛兵濟汝淮泗會於楚即今官渡水也鴻溝而東者為楚項王已約乃引兵解而東歸漢欲西歸張良陳平說曰楚兵疲食盡此天亡楚之時也漢王乃追項王至垓下項王軍壁垓下兵少食盡漢軍及諸侯兵圍之數重夜聞漢軍四面皆楚歌應劭曰楚歌者雞鳴歌也漢已略得其地楚歌者多也項王乃大驚曰漢皆已得楚乎是何楚人之多也項王乃夜起飲於帳中有美人名虞徐廣曰云虞氏常幸從駿馬名騅常騎之於是項王乃悲歌慷慨自為詩曰力拔山兮氣蓋世時不利兮騅不逝騅不逝兮可奈何虞兮虞兮奈若何歌數闋美人和之項王泣下數行左右皆泣莫能仰視於是項王乃上馬騎麾下壯士騎從者八百餘人直夜潰圍南出馳走平明漢軍乃覺之令騎將灌嬰以五千騎追之項王渡淮騎能屬者百餘人耳項王至陰陵徐廣曰在淮南迷失道問一田父田父紿曰左文頴曰紿欺也欺令左也左乃陷大澤中以故漢追及之項王乃復引兵而東至東城漢書音義曰縣名屬臨淮乃有二十八騎漢騎追者數千人項王自度不得脫謂其騎曰吾起兵至今八歲矣身七十餘戰所當者破所擊者服未嘗敗北遂霸有天下然今卒困於此天之亡我非戰之罪也項王乃欲東渡烏江瓚曰在牛渚也烏江亭長艤船待孟康曰艤音蟻附著岸也如淳曰南方人謂整船向岸曰艤謂項王曰江東雖小地方千里眾數十萬人亦足王也願大王急渡今獨臣有船漢軍至無以渡項王笑曰天之亡我我何渡為且籍與江東子弟八千人渡江而西今無一人還還江東父兄憐而王我我何面目見之縱彼不言籍獨不愧於心乎乃謂亭長曰吾知公長者吾騎此馬五歲所當無敵嘗一日千里吾不忍殺之以賜公乃令騎皆下馬步行持短兵接戰獨籍所殺漢軍數百人項王身亦被十餘創顧見漢騎呂馬童曰若非吾故人乎馬童面之張晏曰以故人難親斫聽之故皆面之也如淳曰面不視正也指王翳曰如淳曰指示王翳也此項王也項王乃曰吾聞漢購我頭千金邑萬戶吾為汝得徐廣曰亦可取是功德之德也乃自刎而死漢以魯公禮葬項王於穀城太史公曰吾聞之周生周時賢也曰舜重瞳子又聞項羽亦重瞳子豈其苗裔乎何其興之暴也, krp: ''}
