  - {type: 'tls:seg', offset: 4988, content: '', id: KR3k0012_CHANT_088-23a.4}
  - {type: variant, offset: 4988, length: 1, content: 高, SBCK: 宗曄曄思􅀪祖業疇咨熈載髦俊並作厥作伊何百蠻是攘恢我疆宇外􅀶四荒武功旣抗亦迪斯文憲章六學統一聖眞封禪郊祀􅀕旅百神恊律改正饗兹永年魏陳王曹植漢武帝賛曰世宗光光文帝是攘威震百蠻恢拓土疆簡定律曆辨修舊章封天禪土功超百王周􅁃信漢武帝聚書賛曰獻書路廣藏書柱開􅁗儒出谷漢簡吹􅁅芝􅅺即􅁟玉匣封來坐觀風俗不岀蘭臺陳沈烱􅀕漢武帝陵文曰臣聞橋山雖掩鼎湖之靈可祠有魯遂荒大庭之跡不泯伏惟陛下降德猗蘭纂靈豐谷漢道旣登神仙可望射之杲於海浦禮曰觀而稱功撗中流於汾河指栢梁而髙宴何其甚樂豈不然歟旣而運屬上僊道窮晏駕甲帳珠簾一朝零落茂陵玉椀遂岀人間陵雲故基與原田而膴膴別風餘趾帶陵阜而茫茫覉旅纆臣豈不落淚昔者承明見猒嚴助東歸駟馬可乗長卿西返㳟聞故實竊有愚􅂨􅁰稷非馨敢望徼福爵臺之薦空愴魏君痽丘之祠未光夏}
  - {type: page-break, offset: 4988, content: '', id: KR3k0012_SBCK_088-12a}
  - {type: variant, offset: 4988, length: 1, content: 高, WYG: 賴之單于守蕃百蠻服從萬世之基也中興之功未有髙焉者也漢武故事曰漢景皇帝}
  - {type: variant, offset: 4988, length: 1, content: 高, krp: 宗曄曄思弘祖業疇咨熈載髦俊並作厥作伊何百蠻是攘恢我疆宇外博四荒武功旣抗亦迪斯文憲章六學統一聖眞封禪郊祀祭旅百神恊律改正饗兹永年魏陳王曹植漢武帝賛曰世宗光光文帝是攘威震百蠻恢拓土疆簡定律曆辨修舊章封天禪土功超百王周庾信漢武帝聚書賛曰獻書路廣藏書柱開秦儒出谷漢簡吹灰芝泥即土玉匣封來坐觀風俗不岀蘭臺陳沈烱祭漢武帝陵文曰臣聞橋山雖掩鼎湖之靈可祠有魯遂荒大庭之跡不泯伏惟陛下降德猗蘭纂靈豐谷漢道旣登神仙可望射之杲於海浦禮曰觀而稱功撗中流於汾河指栢梁而髙宴何其甚樂豈不然歟旣而運屬上僊道窮晏駕甲帳珠簾一朝零落茂陵玉椀遂岀人間陵雲故基與原田而膴膴別風餘趾帶陵阜而茫茫覉旅纆臣豈不落淚昔者承明見猒嚴助東歸駟馬可乗長卿西返㳟聞故實竊有愚衷黍稷非馨敢望徼福爵臺之薦空愴魏君痽丘之祠未光夏}
