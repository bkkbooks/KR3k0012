  - {type: variant, offset: 5101, length: 1, content: 后, WYG: 陛下愛才樂士求之無倦比得人勞苦神明未盡其用輙殺之以有限之士資無已之誅臣恐天下賢才將盡陛下欲與誰為治乎黯言之甚怒上笑而諭之行幸河汾中流與羣臣飲醼乃自作秋風辭顧謂羣臣曰漢有六七之厄法應再受命宗室子孫誰當應此者六七四十二代漢者當塗髙也羣臣進曰漢應天受命祚踰周殷子子孫孫萬世不絶陛下安得此亡國之言過聽於臣妾乎上曰吾醉言耳然自古以來不聞一姓遂長王天下者但使失之非吾父子可矣行幸五柞宫謂霍光曰朕且死矣可立鈎弋子公善輔之三月丙寅上晝卧不覺顔色不異而身冷無氣明日色漸變閉目乃發哀告喪未央前殿朝晡上祭若有食之者常所幸御葬畢悉居茂陵園上自婕妤以下二百餘人上幸之如平生而傍人不見也光聞之乃更出宫人增為五百人因此遂絶始}
