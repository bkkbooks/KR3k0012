  - {type: variant, offset: 511, length: 642, content: 蛇當徑願還高祖醉曰壯士行何畏乃前拔劍斬虵虵分為兩道開行數里醉困臥後人來至虵所有一老嫗夜哭人問何哭嫗曰人殺吾子人曰嫗子何為見殺嫗曰吾子白帝子也化為虵當道今為赤帝子斬之因忽不見後人至告高祖高祖乃心獨喜秦始皇帝曰東南有天子氣於是東遊以厭當之高祖隱於芒碭山間呂后與人俱來常得之高祖怪問呂后曰季所居上常有雲氣故從往常得季高祖又喜沛中子弟或聞之多欲附者秦二世元年秋陳勝等起沛令欲以沛應勝沛父老皆曰生平所聞劉季奇怪當貴且卜筮之莫如劉季最吉乃立為沛公祠黃帝祭蚩尤於沛庭而釁鼓旗熾皆赤漢元年冬十月五星聚於東井沛公兵先諸侯至霸上秦王子嬰降軹道旁遂西入咸陽召諸縣豪桀曰父老苦秦苛法久矣誹謗者族偶語者棄市吾與諸侯約先入關者王之吾當王關中與父老約法三章耳殺人者死傷人及盜抵罪餘悉除去秦民大喜五年項羽滅諸侯尊漢王為皇帝天下大定高祖都雒陽置酒南宮高祖曰通侯諸將無敢隱朕皆言其情吾所以有天下者何項氏之所以失天下者何高起孟康曰姓高名起也王陵對曰陛下慢而侮人攻城略地降下者因以予之與天下同利也項羽妬賢嫉能有功者害之賢者疑之戰勝而不與人功得地而不與人利此所以失天下者也高祖曰公知其一未知其二運籌策於帷帳之中決勝於千里之外吾不如子房鎮國家撫百姓給餉饋不絕糧道吾不如蕭何連百萬之眾戰必勝攻必取吾不如韓信此三人者皆人傑也吾能用之此所以取天下也戍卒婁敬說高祖曰都雒陽不便不如入關據秦之國上以問張良因勸上即日車駕西都長安九年高祖大朝諸侯群臣置酒未央前殿上奉玉巵起為太上皇壽曰始大人嘗以臣無賴不能治產業不如仲力今某之業所就與仲力孰多群, krp: ''}
