  - {type: variant, offset: 3507, length: 420, content: 是項王乃即漢王相與臨廣武間而語漢王數之項王怒甚欲一戰漢王不聽項王伏弩射中漢王漢王傷走入成皋項王乃與約中分天下割鴻溝以西者為漢文頴曰於滎陽下引河東為鴻溝以通宋鄭陳蔡曹衛兵濟汝淮泗會於楚即今官渡水也鴻溝而東者為楚項王已約乃引兵解而東歸漢欲西歸張良陳平說曰楚兵疲食盡此天亡楚之時也漢王乃追項王至垓下項王軍壁垓下兵少食盡漢軍及諸侯兵圍之數重夜聞漢軍四面皆楚歌應劭曰楚歌者雞鳴歌也漢已略得其地楚歌者多也項王乃大驚曰漢皆已得楚乎是何楚人之多也項王乃夜起飲於帳中有美人名虞徐廣曰云虞氏常幸從駿馬名騅常騎之於是項王乃悲歌慷慨自為詩曰力拔山兮氣蓋世時不利兮騅不逝騅不逝兮可奈何虞兮虞兮奈若何歌數闋美人和之項王泣下數行左右皆泣莫能仰視於是項王乃上馬騎麾下壯士騎從者八百餘人直夜潰圍南出馳走平明漢軍乃覺之令騎將灌嬰以五千騎追之項王渡淮騎能屬者百餘人耳項王至陰陵徐廣曰在淮南迷失道問一田父田父紿曰左文頴曰紿欺也欺令左也左乃陷大澤中以故漢追及之項王乃復引兵而東至東城, WYG: 順流班固}
