  - {type: variant, offset: 4978, length: 0, content: '', SBCK: 光聞之乃更出宫人増爲五百人因是遂絶始元二年吏吿民盗用乗輿御服者案其題乃茂陵中明器也民別買得光疑葬日􅁥官不謹容致盗竊乃収將作以下繫長安獄考訊居􅀊餘鄴縣又有一人於市貨玉杯吏疑其御物欲捕之因忽不見縣送其器推問又茂陵中物也光自呼吏問之􅀃市人形貌如先帝光於是嘿然乃赦前所繫者􅀊餘上又見形謂陵令薛平曰吾雖失世猶爲汝君奈何令吏卒上吾陵上磨刀劒乎忽然不見因推問陵旁有方石以爲礪吏卒常盗磨刀劒甘泉宫恒自然有鍾鼓聲􅃸者時見從官鹵簿似天子自後轉稀至宣帝世乃絶宣帝即位尊孝武廟奏樂之曰虚中有唱善者吿祠之曰白鵠羣飛集後庭西河立廟神光滿殿中􅃺如月東萊立廟有大鳥跡意路白龍夜見河東立廟告祠之日白虎銜􅁏置殿前又有一人騎馬馬異於常馬持捉一札賜將作丞曰聞汝績尅成賜汝金一斤因忽不見札乃變爲金稱之有一斤廣川告祠之明日有鍾磬音房户皆開夜有光香氣聞二三里宣帝親祠甘泉有頃紫黃氣從西北來散於殿前肅然有風空中有妓樂聲群鳥翔儛蔽天宣帝旣親覩光恠乃疑先帝有神復招諸方士兾得仙焉帝王世紀曰孝武皇帝廟名淵龍幽明録曰漢武帝在甘泉宫有玉女降常與帝圍碁相娱女風姿端正帝密恱乃逼之玉女因唾帝靣而去遂病瘡經年故漢書云避暑甘泉宫此其時也劉歆七略曰孝武皇帝勑丞相公孫􅀪廣開獻書之路百年之間書積如丘山故外有太常太史􅀶士之藏内有延閣廣内祕室之府桓子新論曰漢武帝材質尚妙有崇先廣統之規故即位而開發大志考合古今獲前聖代事建正朔制度招選俊傑􅁬楊威怒武義四加所征者服興起六藝廣進儒術自開闢以來唯漢家最爲盛圖故顯爲世宗可謂悼尓絶世之主矣然上乃多過差旣欲斥境廣土又乃貪利爭物之無益者聞西夷大宛國有馬即大發軍兵攻取歷年士衆多死但得數十疋耳又歌兒衛子夫因幸愛重乃隂求陳皇后過惡而廢退之即立子夫其男爲太子後聽邪臣之􅉲衛后以憂死太子出走滅亡不知其處信其巫蠱多徵㑹邪僻求不急之方大起宫室内竭府庫外罷天下百姓之死亡不可勝數此可謂通而蔽者典論曰孝武帝承累世之遺業遇中國之殷阜府庫餘錢帛倉􅅒畜腐粟因此有意平滅匈奴而得清邊境矣故即位之􅀄從王恢之書設馬邑之謀自元光以迄征和四五十載之間征匈奴四十餘與踰廣漢絶梓嶺封狼居禪姑幕梁北河觀兵瀚海刈單于之旗勦閼氏之首採符離之窟掃五王之庭納休屠昆耶之附獲􅀕天金人之寳斬名王以千數馘首虜以萬計旣窮追其散亡又摧破其積聚虜不暇於救死扶傷疲於孕重墮殰元封􅀄躬執武節告以天子自將懼以兩越之誅彼時號爲威震匈奴矣後漢}
