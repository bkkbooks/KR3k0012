  - {type: variant, offset: 5201, length: 0, content: '', WYG: 歸駟馬可乘長卿西返恭聞故實竊有愚衷黍稷非馨敢望徼福爵臺之薦空愴魏君雍丘之祠未光夏后瞻仰徽猷伏增悽懼太}
  - {type: page-break, offset: 5201, content: '', id: KR3k0012_WYG_088-20b, image: WYG0893/WYG0893-0715d.png}
  - {type: variant, offset: 5202, length: 81, content: 侯興居曰誅呂氏吾無功請得除宮乃與太僕汝陰侯滕公入宮前謂少帝曰足下非劉氏不當立乃召乘輿載少帝出少帝曰欲將我安之乎代王遂入而聽政夜有司分部誅滅梁淮陽常山王及少帝於帝邸, WYG: 御覽卷八十八}
