  - {type: variant, offset: 4857, length: 0, content: '', SBCK: 六月文帝崩丁未太子即皇帝位又曰孔子稱斯民三代之所以直道而行也信哉周􅁗之弊綱宻文峻而姦䡄不勝漢興掃除煩苛與民休息至于孝文加之以恭儉孝景遵業五六十載之間移風易俗􅀺民醇厚周言成康漢言文景美矣又曰孝景即帝位竇嬰爲太子詹事帝弟梁孝王母竇太后愛之孝王朝因醼昆弟飲是時上未立太子酒酣上於是從容曰千秋萬􅀊後傳王太后大欣嬰引巵酒進於上曰天下者髙祖天下也父子相傳漢之約也何以得與梁王太后由此憎嬰帝王世紀曰孝景帝即位十六年年四十八葬陽陵廟名德陽班固漢書述曰孝景莅政諸侯放命尚書放命圯族鯀之惡懐其族􅀋吴楚七國亦然也克伐七國王室以定非怠非荒務在農桑著于甲令民用寜康魏陳王曹植漢景帝賛曰景帝明徳繼文之則肅清王室克滅七國省役薄賦百姓殷昌風移俗易齊美成康孝武皇帝史記本紀曰考武皇帝漢書音義曰諱撤也孝景帝中子也母曰王太后孝景四年以皇子爲膠東王七年栗太子廢爲臨江王以膠東王爲太子孝景十六年崩太子即位爲孝武皇帝漢書武帝紀曰後三年正月景帝崩甲子太子即位元朔四年冬行幸甘泉元狩元年冬十月行幸雍祠五畤獲白麟乃作白麟之歌元鼎四年冬十月行自夏陽東幸汾隂十一月甲子后􅁟祠于汾隂睢之上􅂫林曰睢音雖如淳曰睢者河之東岸也元封元年應劭曰始封太山故政年也行自雲陽北歷上郡西河五原出長城山登單于臺至于朔方臨北河勒兵十八萬􅀐旌旗徑千餘里威震匈奴還祠黄帝于橋山乃歸甘泉遂東廵於海上夏四月上還登封太山王者功成治定告成功於天封岱宗也助天髙也刻石記號有金䇿石函金􅅺玉檢之封焉降明堂案郊祠志曰􅀄天子封太山太山東北趾古時有明堂也行自太山復東廵於海上至碣石文􅀠曰在遼西絫縣絫縣今罷屬臨榆此石着海旁韋昭地理曰在古北平􅆠城西南也二年冬十月行幸雍祠五畤春幸緱氏遂至東萊夏四月還祠太山至􅉚子服䖍曰瓠子隄名也蘇林曰在甄城以南濮陽以西黄百歩􅀷五丈臨決河命從臣將軍以下皆負薪塞河隄作瓠子之歌四年冬十月幸雍祠五畤通回中道應劭曰回中在安定髙平有險阻蕭􅀜在其北通至長安也孟康曰回中在北池山險有武帝故宫如淳曰三輔黄圖云回中宫在汧也遂北廵蕭􅀜如淳曰匈奴傳匈奴入朝郍蕭􅀜在安定朝郍縣也五年冬南廵狩至于盛唐如淳曰縣名也韋昭曰南郡也望祀虞舜于九疑應劭曰舜葬蒼梧九疑山今在零陵營道也􅀕􅈞天柱山應劭曰􅏦音潜南嶽霍山􅏦縣名屬廬江文頴曰天柱山􅏦縣南有祠自㝷陽浮江親射蛟江中獲之舳艫千里太􅀄元年應劭曰用夏正以正月爲􅀊首故改年爲太􅀄行幸太山十一月甲子朔旦冬至祀上帝于明堂天漢三年應劭曰時頻年苦旱故改年爲天漢以祈甘雨晉灼曰取雲漢之詩求􅀨之意也􅀄􅅦酒酤三月行幸泰山修封祀明堂還幸北地祠常山瘞􅀇玉夏四月赦天下行所過母出田租太始三年行幸甘泉宮饗外國客二月令天下大酺五月行幸東海獲赤鴈作朱鴈之歌幸琅耶禮日成山孟康曰禮日祠日也韋昭曰成山在東萊界還幸建章宫後元二年朝諸侯王于甘泉宫賜宗室立皇子弗陵爲皇太子張晏曰昭帝也後但名弗以多難諱丁夘}
