  - {type: variant, offset: 2710, length: 7, content: 楚懷王王召宋義, WYG: 然世之毁譽莫能得實審形者少隨聲者多然文帝之節儉約身}
  - {type: punctuation, offset: 2713, content: ，, id: KR3k0012_CHANT_088-bkkpn761}
  - {type: 'tls:seg', offset: 2713, content: '', id: KR3k0012_CHANT_088-16a.81}
  - {type: variant, offset: 2718, length: 617, content: 為上將軍項羽為魯公次將范增為末將諸別將皆屬宋義號為卿子冠軍項羽晨朝上將軍宋義即其帳中斬宋義頭出令軍中曰宋義與齊謀反楚楚王陰令羽誅之當是時諸將皆懾服莫敢枝梧如淳曰梧當枝猶枝桿也臣瓚曰小杜為枝邪柱為梧今屋梧邪柱是也皆曰首立楚者將軍家也今將軍誅亂乃相與共立羽為假上將軍懷王因使羽為上將軍乃悉引兵渡河皆沉船破釜甑燒廬舍持三日糧以示士必死無一還心於是至則圍王離與秦軍遇九戰絕其甬道大破之虜王離諸將皆從壁觀楚戰士無不一當十呼聲動天地項羽召見諸侯諸侯入轅門張晏注曰軍行以車為陣轅相倚為門曰轅門無不膝行而前莫敢仰視項羽引兵西屠咸陽殺秦降王子嬰燒秦宮室火三月不滅收其寶貨婦女而東人或說項王曰關中阻山河四塞地肥饒可都以霸項王見秦宮室皆以燒殘破又心懷思欲東歸曰富貴不歸故鄉如衣繡夜行誰知之者說者曰人言楚人沐猴而冠耳果然張晏曰沐猴獮猴也項王自立為西楚霸王王九部都彭城漢之二年漢王伐楚皆已入彭城收其寶貨項王乃從蕭晨擊漢軍而東至彭城大破漢軍漢軍皆走相隨入穀泗水二水皆在沛郡彭城殺漢卒十餘萬人漢卒皆南走山楚又追擊之靈壁東徐廣曰在彭城睢水上徐廣曰睢水彭城西水入泗水漢軍卻為楚所擠擠排也多殺漢卒十餘萬皆入睢水睢水為之不流圍漢王三匝於是大風從西北起折木發屋揚沙石窈冥晝晦逢迎楚軍楚軍大亂壞散而漢王乃得與數十騎遁去漢之四年項王西與漢俱臨廣武而軍孟康注曰築兩城相對在廣武敖倉西三皇山山上相守數月當此時彭越數反梁也絕楚糧道項王患之楚漢久相持未決丁壯苦軍旅老弱罷轉漕項王謂漢王曰, WYG: 變}
