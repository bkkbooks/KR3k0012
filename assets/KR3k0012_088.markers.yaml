  - {type: variant, offset: 4362, length: 0, content: '', krp: 人人自以爲得之者以萬數然卒踐天子位者劉氏也天下絶望一矣髙帝封王子弟地犬牙相制此所謂盤石之宗也天下服其強二矣漢興除秦苛政約法令施德惠人人自安難動摇三也夫以吕太后之嚴立諸吕爲三王擅權專制然而太尉以節入北軍一呼士皆左袒爲劉氏叛諸吕卒以滅之此乃天授非人力也今髙帝子獨淮南王與大王大王又長賢聖仁孝聞於天下故大臣因天下之心而欲迎立大王大王勿疑也代王卜之龜兆得大横占曰大横庚庚余爲天王夏啓以光代王曰寡人固以爲王矣又何王卜人曰所謂天王者乃天子也代王乃命宋昌叅乗張武等六人乗傳詣長安至髙陵休止而使宋昌先馳之長安觀變昌至渭橋丞相巳下皆迎宋昌還報代王馳至渭橋羣臣拜謁太尉勃進曰願請間言昌曰所言公公言之所言私王者不受私太尉乃跪上天子之璽符代王謝曰至代邸而議之遂馳入代邸宗室大臣列侯吏二千石皆伏固請代王西向讓者三南向讓者再遂即天子位即日夕入未央宫三年匈奴入北地居河南爲宼帝自甘泉之髙奴因幸太原見故羣臣皆賜之舉功行賞十三年齊太倉令淳于公有罪當刑少女緹縈自傷泣迺隨其父至長安上書願没入爲官婢贖父刑罪使得自新書奏天子天子憐悲其意乃下詔曰夫刑至斷支體刻肌膚終身不息何其楚痛豈稱爲民父母之意哉其除肉刑又曰孝文皇帝從代來即位二十三年宫室苑囿狗馬服御無所増益有不便輙弛以利民嘗欲作露臺召匠計之直百金上曰百金中民十家之産吾奉先帝宫室常恐羞之何以臺爲上常衣綈衣所幸慎夫人令衣不得曵地幃帳不得文繍以示敦朴爲天下先治霸陵皆以瓦器不得以金銀銅錫爲飾呉王詐病不朝就賜几杖羣臣如袁盎等稱說雖切常假借用之羣臣如張武等受賂遺金錢覺上乃發御府金錢賜之以愧其心弗下吏專務以德化民是以海内殷冨興於禮義後七年六月帝崩於未央宫遺詔無發民男女哭臨服大功十五日小功十四纎七日釋服史記太史公曰孔子言必世然後仁善人之治國百年亦可以勝殘去殺誠哉是言也漢興至孝文四十有餘載德至盛也漢書曰張蒼免相文帝以皇后弟竇廣國賢有行欲相之曰恐天下以吾私廣國乃以御史大夫申徒嘉爲丞相又曰武帝從容問東方朔曰吾欲化民豈有道乎朔對曰願近述孝文皇帝之時當丗耆老皆聞見之貴爲天子冨有四海身衣弋綈足履革舄以韋帶劒雚爲席兵木爲刃服度曰兵器如木而無刃衣緼無文集上書囊以爲殿帷以道德爲麗以義爲准於是天下望風成俗昭然化之又曰賈捐之曰孝文皇帝閔中國未安偃武行文時有獻千里馬者詔曰鸞旗在前屬車在後吉行日五十里朕乗千里之馬獨先安之於是還馬與道里費荀恱漢紀曰韓信爲左丞}
  - {type: variant, offset: 4364, length: 2, content: 並爭, krp: 曹叅灌嬰擊魏王豹豹姬曰薄姬許負相之當生天子豹猜此言而反豹敗漢王納薄姬實生文帝又曰以孝文之明大朝之治百寮之賢而賈誼見排逐張釋之十年不見省馮唐首白屈於郎豈不惜哉夫以絳侯之忠功存社稷而猶見疑不亦痛乎帝主丗紀曰孝文即位二十三年年四十七葬霸陵因山爲體廟名頋城桓子新論曰漢太宗文帝有仁智通明之徳承漢𥘉定躬儉省約以惠休百姓救贍困乏除肉刑滅律法薄葬埋損輿服所謂逹於養生送終之實者也及始從代徵時謀議狐疑能從宋昌之䇿應聲馳來即位而偃武行文施布大恩欲息兵革與匈奴和親揔撮綱紀故遂襃増隆爲太宗也而溺於俗儀斥逐材臣又不勝私恩使嬖妾慎夫人與皇后同席以亂尊卑之倫所通而蔽也風俗通曰孝成皇帝問劉向丗俗多傳道文皇帝少生於軍不知父所在日祭於代城東門外髙帝數夢見一兒祭巳使使至代求之果得文帝立爲代王後徴到後期不得立日爲再中遂即位爲天子躬行至儉集上書囊以爲前殿帷常居明光宮聽政爲皇太子治三年服天下平米升一錢有此事不向對曰文帝生而爲王者子常居宫闕内不棄捐軍中祭代東門外也髙后八年九月巳酉夕即位時巳昬夜日不再中也文帝雖節儉未央前殿至奢雕文及五彩畫華欀壁墻軒檻皆飾以黄金其勢}
