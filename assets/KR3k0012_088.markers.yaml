  - {type: variant, offset: 4857, length: 0, content: '', WYG: 六月文帝崩丁未太子即皇帝位又曰孔子稱斯民三代之所以直道而行也信哉周秦之弊網宻文峻而姦宄不勝漢興掃除煩苛與民休息至于孝文加之以恭儉孝景遵業五六載之間移風易俗黎民醇厚周云成康漢言文景美矣又曰孝景即帝位竇嬰為太子詹事帝弟梁孝王母竇太后愛之孝王朝因燕昆弟飲是時上未立太子酒酣上從容曰千秋萬歲後傳王太后大欣嬰引巵酒進上曰天下者髙祖天下也父子相傳漢之約也何以得傳梁王太后由此憎嬰帝王世紀曰孝景帝即位十六年年四十八葬陽陵廟名徳陽班固漢書述曰孝景蒞政諸侯方命尚書方命圯族鯀之惡壞其族類吳楚七國亦然也克伐七國王室以定匪怠匪荒務在農桑著于甲令民用寧康魏陳王曹植漢景帝贊曰景帝明德繼文之則肅清王室克滅七國省役薄賦百姓殷昌風移俗易齊美成康孝武皇帝史記本紀曰孝武皇帝漢書音義曰諱徹也孝景帝中子也母曰王太后孝景四年以皇子為膠東王七年栗太子廢為臨江王以膠東王為太子孝景十六年崩太子即位為孝武皇帝漢書武帝紀曰後三年正月景帝崩甲子太子即位元朔四年冬行幸甘泉元狩元年冬十月行幸雍祠五畤獲白麟乃作白麟之歌元鼎四年冬十月行自夏陽東幸汾隂十一月甲子后土祠於汾隂睢之上蘇林曰睢音雖如淳曰睢者河之東岸也元封元年應邵曰始封太山改年也行自雲陽北厯上郡西河五源出長城登單于臺至朔方臨河北勒兵十八萬騎旌旗經千餘里威震匈奴還祠黄帝于橋山乃歸甘泉遂東巡於河上夏四月上還登封太山王者功成治定告成功於天封岱宗也助天髙也刻石紀號有金䇿石函金泥玉檢之封焉降明堂案郊祠志曰初天子封太山太山東北址古時有明堂也行自太山復東巡於海上至碣石文穎曰在遼西絫縣今改屬臨榆此石著海旁師古曰碣然特立之貎也音其列反二年冬十月行幸雍祠五畤春幸緱氏遂至東萊夏四月還祠太山至瓠子服虔曰瓠子堤名也蘇林曰在鄄城南濮陽北地廣百步深五丈臨決河命從臣將軍以下皆負薪塞河隄作瓠子之歌四年冬十月幸雍祠五畤通回中道應劭曰回中在安定髙平有險阻肖關在其北通至長安也孟康曰回中在北地山險武帝故宫如淳曰三輔黃圖曰回中宫在汧也遂北巡肖關如淳曰匈奴傳匈奴入朝那肖關在安定朝那縣也五年冬南巡狩至于盛宫如淳曰縣名也韋昭曰南郡也望祠虞舜于九疑應劭曰舜葬蒼梧九疑山今零陵營道也祭灊天柱山應劭曰灊音潛南嶽霍山灊縣屬名廬江文穎曰天柱山灊縣南有祠自尋陽浮江親射蛟江中獲之舳艫千里天漢三年應劭曰時頻年苦旱故改年為天漢以祈甘雨晉灼曰取雲漢之詩求雨之意也初榷酒酤三月行幸太山修封祀明堂還幸北地祠常山瘞𤣥玉夏四月赦天下行所過毋出田租太始三年行幸甘泉宫饗外國客二月令天下大酺五月行幸東海獲赤鴈作朱鴈之歌幸琅邪禮日成山孟康曰禮日祠日也韋昭曰成山在東萊界四年夏五月還幸建章宫後元二年朝諸侯王于甘泉宫賜宗室乙丑立皇子弗陵為皇太子張晏曰昭帝也後但名弗以多難諱丁卯}
