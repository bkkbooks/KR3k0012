  - {type: variant, offset: 4562, length: 269, content: 其子代太子呂后年長常留守希見上益䟽高祖崩太子襲號為惠皇帝呂后最怨戚夫人及其子趙王惠帝慈仁知太后怒自挾與趙王起居飲食太后欲殺之不得間孝惠元年十二月帝晨出射雉趙王少不能早起太后聞其獨居使人特鴆而飲之犂明孝惠還趙王已死徐廣曰犂猶比太后遂斷戚夫人手足去眼燻耳使居廁中命曰人彘居數日乃召孝惠帝來觀人彘孝惠見問乃知是戚夫人也乃哭因歲餘不能起使人請太后曰此非人之所為臣太后子終不能治天下孝惠以此日飲為淫樂不聽政故有疾又曰太史公曰孝惠皇帝高后之時黎民得離戰國之苦君臣俱欲休息乎無為故惠帝垂拱高后女主稱制政不出閨房天下晏然刑罰罕用罪人是希民務稼穡衣食滋殖矣, WYG: ''}
