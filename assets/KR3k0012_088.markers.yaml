  - {type: variant, offset: 2013, length: 530, content: 遭秦世暴亂不偕尺土之資不權將相之柄發跡泗亭奮其智謀羈勒英雄鞭驅天下或以威服或以德致或以義成或以權斷逆順不常霸王之道雜焉是以聖君帝王之位而無一定之制三代之美固難及矣後漢班叔皮王命論曰在昔帝堯之禪曰咨爾舜天之曆數在爾躬舜亦命禹暨于稷契咸佐唐堯光濟四海弈世載德至于湯武而有天下雖其遭遇異時禪代不同至于應天順民其揆一也是故劉氏承堯之祚氏族之世著于春秋唐據火德而漢紹之始起沛澤則神母夜號以彰赤帝之符由是言之帝王之作必有明聖顯懿之德豐功厚利積累之業然後精誠通于神明流澤加於生人故能為鬼神所福饗天下所歸往未見運世無本功德不能紀而得堀然在此位者世俗見高祖興於布衣不達其故以為適遭暴亂得奮其劍遊說之士至比天下於逐鹿幸捷而得之不知神器有命不可智力求悲夫此世之所以多亂臣賊子者項籍河圖曰怪目勇敢重瞳大力楚之邦尚書中候曰自號之王霸姓有工項羽為西楚霸王工項字之側史記曰項籍者下相人也地里志云臨淮浪有下相縣字羽初起時年二十四季父項梁梁父即楚將項燕為秦將王剪所戮項氏世世為楚將封於項故姓項氏籍少時學書不成去學劍又不成項梁怒之籍曰書足以記名姓而已劍一人敵不足學學萬人敵於是項梁乃教籍兵法籍大喜梁殺人與籍避仇於吳秦始皇帝遊會稽渡浙江梁與籍俱觀籍曰彼可取而代也梁掩其口曰無妄言族矣梁以此奇之籍身長, WYG: 髙后}
