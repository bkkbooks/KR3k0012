  - {type: variant, offset: 5027, length: 125, content: 侯女為孝惠皇后時無子佯有娠取美人子名之殺其母死非真皇后之子乃出言曰后安能殺吾母而名我太后聞而患之恐其後為亂於是乃幽之於永巷中群臣奉旨廢帝後少帝史記曰后元年立孝惠後宮子弘為襄成侯二年以為常山王更名義四年廢少帝立常王義為帝更名私不稱元年者以太后制天下事也, SBCK: 御覽卷第}
