  - {type: variant, offset: 43, length: 0, content: '', krp: 闑右不踐閾又曰入門而問諱又曰孔子負手曵杖逍遥於門又曰天子諸侯臺門此以髙爲貴者又月令曰孟秋其祀門祭先肺隂氣出祀之於門外順隂也又曰孟冬戒門閭修閉左傳啓塞從時門户橋道謂之啓城郭牆塹爲之塞皆啓閇之急不可一日而闕也又襄二年王叔宰曰蓽門圭竇之人而皆陵其上難爲上矣蓽門柴門閨竇小户穿壁上銳下方狀如圭又曰新作南門書不時也注本名稷門公吏高之改高門也又曰鄭大水龍鬪于時門之外洧淵又曰公及邾師戰敗績邾人獲公胄懸諸魚門杜預曰魚門邾城門又曰楚子嚢圍宋門于桐門又曰楚子爲陳夏氏亂遂入陳殺夏徴舒轘諸栗門轘車裂也栗門陳城門也論語憲問曰子擊磬於衛有荷蕢而過孔氏之門者曰有心哉擊磬乎又曰邦君樹塞門管氏亦樹塞門又郷黨曰入公門鞠躬如也史記曰金馬門者宦者署門也門旁有銅馬故謂之曰金馬門又曰太史公曰余過大梁求所謂夷門者大梁城東門也又曰夫以汲鄭之賢有勢則賔客十倍無勢則否况衆人乎下邽翟公有言始翟公爲廷尉賔客闐門及廢也門外可設爵羅翟公復爲廷尉客欲往翟公乃大署門曰一死一生乃知交情一貧一冨乃知交態一貴一賤交情乃見又曰萬石君子慶爲内史慶歸入門不下車萬石君聞之不食慶恐肉袒請罪不許舉宗及兄建肉袒萬石君讓曰内史貴人入閭里里中長老皆走匿而内史坐車中自如固當乃謝罷慶慶及諸子入}
