  - {type: variant, offset: 30, length: 0, content: '', SBCK: 虎門路寢門也王曰視朝於路寢門外也􅀞虎焉以明勇猛於守冝也尚書曰舜賔于四門四門穆穆又曰闢四門詩曰迺立臯門臯門}
  - {type: variant, offset: 30, length: 0, content: '', WYG: 虎門路寢門也王日視朝於路寢門外畫虎焉以明勇猛於守宜也尚書曰舜賔于四門四門穆穆又曰闢四門詩曰迺立臯門臯門}
