  - {type: variant, offset: 31, length: 4, content: 甲乙次第, SBCK: 伉迺立應門應門鏘鏘又曰北門篇名刺士不得其志也言衛之忠臣不得其志耳出自北門憂心殷殷又曰髙門有閌又曰衡門篇名誘僖公也愿而無立志}
