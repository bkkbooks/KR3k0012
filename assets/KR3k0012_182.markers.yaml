  - {type: variant, offset: 1442, length: 496, content: 又曰武帝四歲封膠東王長主抱膝上問曰兒欲得婦長主指左右長御百餘人皆云不用因指其女問曰阿驕好不笑對云好若得阿嬌作婦當作金屋貯之長主大悅乃苦要上遂定婚漢官典職曰南北宮相去七里中間作大屋複道三行天子案行中央臺官從左右崔凱喪服節曰禮人君宮室之制為殷屋殷屋四夏屋也卿大夫為夏屋隔半以北為正室中半以南為堂正室齋室也神異經曰西北金闕北荒有百屋齊長四十丈畫以五色戴延之西征記曰洛陽城有鬱金屋廣志曰大秦國以青水精為屋郡國誌秦州俗尚氣力不恥寇盜弓馬射獵以為工能其居八板為屋故詩云在其板屋脩我甲兵及車轔轔四鐵小戎皆言田狩之事論衡曰豐屋知名家喬木知舊都鴻文在國聖世之驗又工伎之書起宅蓋屋必擇吉日夫屋覆人形宅居人體何患害於歲月而必擇之亦如以彰蔽人身者神要之則夫裝車治船亦當擇日世說曰蔡司徒說在洛陸機兄弟住參佐廨中數間瓦屋士龍住東頭士衡住西頭又曰庾闡作楊都賦成以示庾亮亮云可三二京四三都謝安云不得爾此是屋下架屋耳事事擬學而無不儉狹景陽詩蜘蟵網四屋七啟曰雲屋皓旰音旱閑宮顯敝陶潛集少無適俗韻性本愛丘山方宅十餘畝草屋八九間劉義恭啟事曰洪恩潭被賜臣息伯龠檉屋二間楚詞九歌曰魚鱗屋兮龍堂家說文牖戶之間謂之扆其內謂之家易家人有嚴君焉, SBCK: ''}
