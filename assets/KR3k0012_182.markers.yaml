  - {type: variant, offset: 1027, length: 282, content: 帥卒欒氏退又昭六年傳曰叔孫婼聘於晉一日必葺其墻屋去如始至東觀漢記曰鍾離意為堂邑令初到無屋意乃出俸錢作屋民齎柱趣作浹日而成畢為民士祝曰興功役者令也如有禍崇令當之民大悅又曰王霸建武初連徵不至霸安貧賤居常茅屋蓬戶藜藿不厭然樂道不怠以壽終吳志曰吳儀字子羽為人不治產業造屋舍纔容足鄰家起大宅孫權出望見起屋左右曰昊儀家權曰昊子羽儉必非也令人親至果是鄰舍又曰魚宗為將軍朱據史將母在營夜雨屋漏宗起涕泣謝母母曰但當勉之何足泣也晉記曰左將軍王廙中宗姨弟也為母起屋違制上流涕責廙皇甫謐列女傳曰衛農與妻宿客舍遇雷雨妻夢虎齧其足驚起相謂曰我此行未宜天欲戮我夫妻出中夜叩頭屋壞壓殺數十人家語曰, WYG: 廣敬}
