  - {type: variant, offset: 2404, length: 2, content: 拜太, SBCK: 權自出過其門呼昭辭疾篤權使燒其門欲恐之昭更閇户權使滅火住門良乆昭諸子共扶昭起權載以還宫又曰􅀄平}
  - {type: variant, offset: 2404, length: 1, content: 拜, WYG: 權自出過其門呼昭辭疾篤權使燒其門欲恐之昭更閉門權使滅火住門良久昭諸子共持昭起權載以還宫又曰初平中謡曰黄金車斑闌耳閶闔門出天子閶闔吳西郭門夫差所作又曰諸葛恪有遷都意更起武昌宫是月武昌門災改作端門晉書曰王衍既有盛才美貌明悟若神嘗自比子貢聲名藉甚傾動當世以善𤣥理唯談莊老每捉玉柄麈尾與手同色義理有所不安隨即更改世號口中雌黄朝野翕然謂之一世龍門又曰賀循時廷尉張闓住在小市將奪左右近宅以廣其居乃私作都門早閉晏開人多患之訟于州府皆不見省㑹卜循出至破崗連名詣循質之循曰見張廷尉當為及之闓聞而遽毁其門詣循致謝其為世所敬服如此又曰陳頵字延思陳國苦人也少好學有文義父訢立宅起門頵曰當使容駟馬車訢笑而從之又曰嵇含自號即丘子門曰歸原之門崔鴻十六國春秋夏錄曰赫連勃勃宫殿大成乃刻石都南頌其功徳其南門曰朝宋門東門曰招魏門西門曰服凉門北門曰平朔門又起沖天臺於南山欲登之望長安又後趙錄曰建武十年白虹出自}
