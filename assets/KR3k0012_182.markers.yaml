  - {type: variant, offset: 162, length: 262, content: 近我以尊異之注云第以北為尊又曰平恩侯許伯入第司隸校尉蓋寬饒往賀酒酣仰視屋曰美哉富貴無常忽則易人此如傅舍所閱多矣唯謹慎為得久居侯可不誡哉晉書青溪橋東南臨淮水周三里九十步太宗舊第後為會稽文孝王道子宅謝安薨後道子領楊州刺史於此理事時人呼為東府至是築城以東府為名其城東北角有靈秀山即道子宅內山嬖臣趙牙所築也齊書劉瓛姿狀鑯小而儒學冠於當朝京師貴遊士子莫不下席受業瓛性謙下不以高名自居住檀橋有屋數間上皆穿漏學徒不敢斥呼為青溪焉竟陵王子良親往謁表世祖為瓛立館以楊烈橋故主第給之生徒皆賀瓛曰室美豈為人哉華宇豈吾宅哉未及徙居遇疾卒唐書叚綸兵部, SBCK: 祚遷}
