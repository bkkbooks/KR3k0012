  - {type: variant, offset: 47, length: 1, content: 道, WYG: 子之門子楚笑曰盖自大子之門顧乃大吾門不韋曰吾門待子門而大耳漢書曰太液池有璧門又曰陳平家貧負郭窮巷以席為門然門外多長者車轍又曰魏勃家貧欲見齊相曹參無以自逹常早起掃其門人問故勃曰欲見相君無因故為子掃其門乃見參參用為舍人又曰梅福居家常以讀書飬性為事至元始中王莽顓政福一朝棄妻子去九江至今傳以為仙其後人有見福於㑹稽者變姓名為呉市門卒云又曰于定國父于公其閭門壊父老方共治之于公謂曰少髙大閭門令容駟馬髙車我治獄多隂徳未曽有寃子孫必有興者至于定國為丞相永為御史大夫封侯又曰張釋之為公車令頃之太子與梁王共車入朝不下司馬門如淳曰宫衞令諸出入殿門公車司馬門皆下不如令罰金四兩於是釋之追止太子梁王毋入殿門遂劾不下公門不敬奏之薄太后聞之文帝免冠謝曰教兒子不謹太后使使承詔赦太子梁王然後得入文帝繇是竒釋之拜為中大夫又曰鄭崇為尚書上謂曰君門如市人何以欲禁切主上師古曰言請求者多交通賔客崇對曰臣門如市臣心如水又曰鄒陽諫呉王曰今臣盡智畢議易精極慮則無國不可奸飾固陋之心則何王之門不可曳長裾乎又曰王尊為東平相是時東平王以至親驕奢不奉法度傅相連坐師古曰前任傅相者頻坐王得罪及尊視事奉璽書至庭中王未及出受詔尊持璽書歸舎食已乃還致詔後謁見王太傅在前説相鼠之詩師古曰詩鄘篇名刺無禮之詩也其辭曰相䑕有皮人而無儀人而無儀不死何為相視也言視䑕有皮雖處髙顕之地偷食茍得不知亷耻人而無禮儀亦與䑕同不如速死也尊曰毋持布鼔過雷門師古曰雷門㑹稽城門有鼔越擊此鼓聲聞洛陽故尊引之也布鼔謂以布為鼓故無聲王怒起入後宫尊亦直趨出就舍又曰盖寛饒字次公為諫議大夫行郎中户將事師古曰百官公卿表郎中令属官有郎中車户騎三将盖各以所主為名户将者主户衞劾奏衞將軍張安世子侍中陽都侯彭祖不下殿門師古曰過殿門不下車也并連及安世居位無補彭祖時實下殿門寛饒坐舉奏大臣非是左遷為衛司馬又曰蕭望之署小苑東門候時王仲翁出入從倉頭廬兒顧謂望之曰不肯錄錄反抱關為師古曰錄錄謂循常也言望之不能隨例捜索以為牾執政不得大官而守門望之曰各從其志又曰鉤弋夫人大有寵有娠十四月乃産是為昭帝武帝曰昔堯十四月而生今鉤弋亦然乃命其門曰堯母門范曄後漢書曰孔融云鄭君里門四方所由觀禮其廣令容髙車結駟馬名為通徳之門又曰郅惲字君章為上東門候帝常獵夜還惲拒門不開帝乃廻從中東門入賜惲布貶中東門候又曰李膺傳曰是時朝廷日亂綱紀頽壊膺獨持風裁以聲名自髙士有被其容接}
