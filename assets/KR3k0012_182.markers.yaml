  - {type: variant, offset: 1313, length: 128, content: 陳蔡從者七日不食子貢以貨竊犯圍出糴於野人得米一石焉顏回仲由炊之壞屋之下有埃塵墨墮飯中顏回取而食之子貢自井望見之不悅以為竊食呂氏春秋亦載又曰周公居家宰之尊而猶下白屋之士日見百七十人新語堯舜之人可比屋而封桀紂之人可比屋而誅漢武故事曰上起神屋九間雖崑崙玄圃不之過, SBCK: 郷黨恂恂如}
