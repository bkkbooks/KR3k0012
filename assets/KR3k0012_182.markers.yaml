  - {type: variant, offset: 43, length: 0, content: '', WYG: 闑右不踐閾又曰入門而問諱又曰孔子負手曳杖逍遥於門又曰天子諸侯臺門此以髙為貴者又月令曰孟秋之月其祀門祭先肺秋隂氣出故祀之於門所以順隂氣也又月令曰孟冬之月戒門閭修鍵閉左傳啓塞從時門户橋道謂之啓城郭墻塹謂之塞皆開閉之急不可一日而闕也又襄二年王叔之宰曰蓽門圭竇之人而皆陵其上難為上矣蓽門柴門圭竇小户穿壁上銳下方狀如圭也又曰新作髙門書不時也注本名稷門公更髙之改髙門也又曰鄭大水龍鬬於時門之外洧淵又曰公及邾師戰敗績邾人獲公胄懸諸魚門杜預曰魚門乃邾城門也又曰楚子囊圍宋門于桐門又曰楚子為陳夏氏亂遂入陳殺夏徵舒轘諸栗門轘車裂也栗門陳城門也論語曰子擊磬於衞有荷蕢而過孔氏之門者曰有心哉擊磬乎又曰邦君樹塞門管氏亦樹塞門又鄉黨曰入公門鞠躬如也史記曰金馬門者署門也門旁有銅馬故謂之曰金馬門又曰太史公曰余過大梁求所謂夷門者乃大梁城東門也又曰下邽翟公有言始翟公為廷尉賔客闐門及廢也門外可設爵羅翟公復為廷尉客欲往交公乃大署門曰一死一生乃知交情一貧一富乃知交態一貴一賤交情乃見又曰萬石君子慶為内史慶歸入外門不下車萬石君聞之不食慶恐肉袒請罪不許舉宗及兄建肉袒萬石君譲之曰内史貴人入閭里里中長老皆走匿而内史坐車中自如固當乃謝罷慶慶及諸子弟入}
