  - {type: variant, offset: 47, length: 1, content: 道, SBCK: 子之門子楚􅀏曰盍自大子之門顧乃大吾門不韋曰吾門待子門而大耳漢書曰太液池有壁門又曰陳平家貧􅀒郭窮巷以席爲門然門外多長者車轍又曰魏勃家貧欲見齊相曹叅無以自逹常早起掃其門人問故勃曰欲見相君無因故爲子掃門乃見叅叅用爲舎人又曰梅福居家常以讀書養性爲事至元始中王莽顓政師古曰顓與專同福一朝棄妻子去九江至今傳以爲仙其後人有見福於會稽者變名姓爲吴市門卒云又曰于定國父于公其閭門壞父老方共治之于公謂曰以髙大閭門令容駟馬髙盖車我治獄多隂徳未曽有􅁈子孫必有興者至定國爲丞相永爲御史大夫封侯丗傳云又曰張釋之爲公車令頃之太子與梁王共車入朝不下司馬門如淳曰官衛令諸岀入殿門公車司門者皆下不如令罰金四兩於是釋之追止太子梁王母入殿門遂劾不下公門不敬奏之薄太后聞之文帝免冠謝曰教兒不謹薄太后使丞詔赦太子梁王然後得入文帝繇是竒釋之拜爲中大夫又曰鄭崇爲尚書上謂曰君門如市何以欲禁切主上師古曰言請求者多交通賔客者也崇對曰臣門如市臣心如水又曰鄒陽諌吴王曰今臣盡智畢義易精極慮則無國不可姧飾固陋之資則何王之門不可曵長􅅂乎又曰王尊爲東平相是時東平王以至親驕不奉法度傳相連坐師古曰前任傅相者頻坐王得罪及尊視事奉璽書至庭中王未及出受詔尊持璽書歸舎食巳及還致詔尊持後謁者王傅在前說相䑕之詩師古曰鼠􅅠風篇名刺無禮之詩也其辝曰相鼠有皮人而無儀人而無儀不死何爲相視也言視鼠有皮雖處髙顯之地偷食苟得不知廉耻人無禮儀亦與䑕同不如速无也尊曰母持布鼔過雷門師古曰雷門會稽城門也有大鼔越摯此鼔聲聞洛陽故尊引之也布鼔謂以布爲鼔故無聲王怒起入後宫尊亦直趨岀就舎又曰蓋寛饒字次公爲諌議大夫行郎中户將軍師古曰百官公卿表郎中令屬官有郎中事户􅀐三將盖各以所主爲名也將者主户衛也劾奏衛將軍張安世子侍中陽都侯彭祖不下殿門師古曰過殿門不下車也并連及安世居位無􅀘彭祖時實下門寛饒坐舉奏大臣非是左遷爲衛司馬又曰蕭望之署小苑東門􅀱時王仲翁出入從倉頭盧兒顧謂望之不肯録録反抱關爲師古曰録錄謂循常也言望之不能隨例捜索以忤執政不得大官而守門望之曰各從其志又曰鉤弋夫人大有寵有娠十四月乃産是爲昭帝武帝曰昔堯十四月而生今鉤弋亦然乃命其門曰堯母門范曄後漢書曰孔融云鄭君里門四方所由觀禮其廣令容髙車結駟名爲通徳之門又曰郅惲字君章爲上東門􅀱帝常獵夜還惲拒門不開帝乃逥從中東門入賜惲布貶中東門候又曰李膺傳曰是時朝廷日亂綱紀頽弛膺獨持風裁以聲名自髙士有􅀍其容接}
