  - {type: variant, offset: 581, length: 268, content: 起大第於鄴諸將各以功次受居地太祖親游之笑曰此亦周禮六勳之差也文選蜀都亦有甲第當衢向術音隧西京賦北闕甲第當道直啟邸史記曰代王馳入北邸史記封禪書曰方士多言古帝王有都甘泉者其後天子又朝諸侯甘泉甘泉作諸侯邸陸機洛陽記曰百郡邸在洛城中東城下步廣里中屋說文曰屋居也釋名曰大屋曰廡廡撫也覆也亦謂之正也屋之正大者通俗文曰客堂曰庌五下反聲類曰廡堂下周也釋名曰屋奧也其中溫奧易豐卦曰豐其屋蔀其家闚其戶闃其無人王弼注云屋藏蔭物也以蔭處極而冣在外際自藏蔭者也既豐其屋又覆其家闇之甚也棄其所處而深自藏闚戶無人詩鵲巢行露曰誰謂雀無角何以穿我屋又曰於我乎夏屋渠渠注夏, SBCK: 門軾輅馬輅}
