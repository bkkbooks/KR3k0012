  - {type: variant, offset: 2404, length: 2, content: 拜太, krp: 權自出過其門呼昭辭疾篤權使燒其門欲恐之昭更閇户權使滅火住門良乆昭諸子共扶昭起權載以還宫又曰𥘉平}
  - {type: variant, offset: 2406, length: 4, content: 中大夫居, WYG: 社經鳯陽門東南連天十餘刻乃滅于是閉鳯陽門唯元日乃開又後秦錄曰姚興從朝門逰于文武苑及昏而還將自平朔門入前驅既至城門校尉王滿聰被甲持杖閉門拒之乃廻從朝門而入旦而召聰謂之曰卿社稷之臣也朕有嘉焉于是進位二等隋書曰髙祖初為定州總管先是定州城西門乆閉不行齊文宣帝時或謂開之以便行路帝不許曰當有聖人來開之及髙祖至而開焉莫不驚異陳書曰髙祖七年改作雲龍神虎二門案宫殿簿雲龍門第二重宫墻東西門晉本名}
