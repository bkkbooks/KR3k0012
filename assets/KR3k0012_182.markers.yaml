  body:
  - {type: variant, offset: 3, length: 2, content: 九第, SBCK: 十門上說文曰門捫也在外爲人所捫摸也從二户象形也閶闔天門也闔門扉也門􅐬也䦳門嚮也闤闠市門也閽門堅也閽昏也門常昏閉故曰閽即守門􅀠人也閻里中之門也易說卦曰艮爲門爾雅曰閍謂之門注詩曰祝􅀕於祊是也又曰正門謂之應門宫中之門謂之闈謂相通小門也韓楊天文要集角天門也風俗通曰閈城外郭内里門也禮記注云天子五門臯門雉門庫門應門路門魯有庫雉路三門則諸侯三門也漢制内至禁省爲殿門外出大道爲掖門應劭注}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_182-1b}
  - {type: variant, offset: 3, length: 2, content: 九第, WYG: 十門門上説文曰門捫也在外為人所捫摸也從二户象形也閶闔天門也闔門扉也閈門也䦳門嚮也闤闠市門也閽門豎也閽昏也門常昏閉故曰閽即守門𨽻人也閻里中之門也易說卦曰艮為門爾雅曰閍謂之門注詩祝祭於祊是也又曰正門謂之應門宫中之門謂之闈謂相通小門也韓陽天文要集角天門也風俗通曰閈城外郭内里門也禮記注云天子五門臯門雉門庫門應門路門魯有庫雉路三門則諸侯三門也漢制内至禁省為殿門外出大道為掖門應劭注}
