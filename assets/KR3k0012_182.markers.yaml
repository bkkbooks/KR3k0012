  - {type: variant, offset: 2767, length: 266, content: 頃分牛廬居止其中魏志曰管寧至遼東乃廬於山谷時避難者多居郡南而寧居北示無遷志晉書征虜將軍石崇河南金谷澗中有別廬冠絕時輩引致賓客日以賦詩諸葛亮表先帝不以臣卑鄙三顧臣於草廬之中諮臣以當世之事郡國誌廬山周武王時有俗先生字君孝兄弟七人皆有道術結廬於此仙去空廬尚存故曰廬山皇甫謐高士傳曰世莫知焦先所出或言生漢末無父母兄弟見漢衰乃不言常結草為廬冬夏袒露垢汙如泥後野火燒其廬先因露寢遭冬雪大至先袒臥不移人以為死就視如故洛陽故宮名曰侍中廬在南宮中屠蘇通俗文曰屋平曰屠蘇廣雅曰屠蘇庵也魏略曰李勝為河南尹廳事前屠蘇懷令人治之庵釋名曰圜屋曰庵庵掩也自覆掩也, WYG: ''}
