  - {type: variant, offset: 8, length: 2, content: 高祖, SBCK: 掖者言在司馬門之旁掖王者行幸設車宫轅門帷宫旌門無宫則供人門鄭注周官云次車爲藩則仰車轅以表門張帷爲宮則樹旌以表門陳列周衛則立長人以表門周禮曰掌舎掌王㑹同之舎設陛枑再重設車宫轅門爲壇㙺宫􅁄門爲帷宫設旌門無宫則供人門轅門謂次以爲藩卽車以爲門人門謂以人爲衛立長人以爲門又曰師氏掌}
  - {type: variant, offset: 8, length: 2, content: 高祖, WYG: 掖者言在司馬門之旁掖王者行幸設車宫轅門周禮曰帷宫旌門無宫則供人門鄭注周官云次車為藩則仰車轅以表門張帷為宫則樹旌以表門陳列周衛則立長人以表門又曰掌舍掌王門之舍設梐枑再重設車宫轅門為壇壝宫棘門為帷宫則供人門轅門為次以為藩仰車以為門人門謂以人為衞立長人以為門又曰師氏掌以媺}
