  - {type: variant, offset: 1021, length: 1252, content: 曹氏導甚憚之乃密營別館以處眾妾曹氏知將往焉道恐妾被辱遽令命駕猶遟之以所執塵尾柄驅牛以進司徒蔡謨聞之戲導曰朝廷欲加公九錫導弗之覺但謙退而已謨曰不聞餘物唯有短轅犢車長柄塵尾導大怒晉令曰百工不得服大綘紫襈音巽假髻真珠璫珥文犀瑇瑁越疊以飾路張乘犢車羊車釋名曰羊車以羊所駕名車也晉書曰武帝平吳之後復納孫皓宮人數千自此掖庭殆將萬人而並寵者甚眾帝莫知所適常乘羊車恣其所之至便宴寢宮人乃取竹葉插戶以鹽汁洒地以引帝車又曰衛玠字叔寶五歲風神秀異惣角乘羊車入市見者以為玉人觀者傾都晉太元起居注曰司隸校尉劉毅秦護軍羊琇私角弩四張又乘羊車請免官罪詔曰羊雖無制非素所乘者可如所奏鹿車後漢書曰更始拜趙憙為五威偏將軍使諸將於昆陽憙被瘡有戰勞還拜中郎將更始敗憙為赤眉所圍迫急乃踰屋亡走與所友善韓仲伯等數十人攜小弱越山阻僅出武關仲伯以婦色美慮為強暴者欲棄之於道憙責怒不聽因以泥塗仲伯婦面載以鹿車身推之或前逢賊憙輒言其病狀以得免東觀漢記曰杜林寄隗囂終不降志辱身乃出令曰杜伯山天子所不能臣至簪蒿蓆草不食其粟諸侯所不能支蓋伯夷叔齊恥食周粟令且從師友之位須道開通使順其志林雖拘於囂而終不屈節建武六年第成物故囂乃聽林持喪東歸既遣而悔追令刺客楊賢於隴抵遮殺之賢見林身推鹿車載致弟喪乃歎曰當今之世誰能行義我雖小人何忍殺義士因亡去列女傳曰渤海鮑宣妻者桓氏之女也字少君宣嘗就少君父學父奇其清苦故以女妻之裝送資賄甚盛宣不說謂妻曰少君生尊寵習美飾而吾貧賤不敢當禮妻曰大人以先生修德守約故使妾侍執巾櫛唯命是從宣笑曰然如是吾志也妻乃悉歸車馬侍御服飾更著短衣裳挽鹿車歸鄉里拜姑禮畢提瓶出汲循行婦道禮節恭備鄉邦稱之宣哀帝時為司隸挍尉子永中興初為魯郡太守永之子昱嘗從容問曰太夫人寧復識挽車時不曰先姑有言存不亡安安不忘危吾焉敢忘乎晉書曰劉伶不以家產有無介意常乘鹿車攜一壺酒使人荷鍤而隨之謂曰死便埋我其遺形骸如此風俗通曰鹿車窄小裁容一鹿也或云樂車乘牛馬者剉軒飲飼達曙今乘此雖為勞極然入傳舍偃臥無憂故曰樂車無牛馬而能行者獨一人所致耳露車晉陽秋曰平原王幹陰雨出則犢車而內露車或問其故曰露者宜內也晉中興書曰王尼洛陽傾覆避亂江夏王澄時為荊州刺史見尼欣然厚供給之尼常歎滄海橫流無安處早喪婦止有一息不用居宅唯畜露車牛一乘每行輒使兒御詣人暮則宿車上無有定處少時澄卒荊土飢荒居求食不能得乃殺車牛煮之遂父子餧死晉王公百官志曰蜀劉主得賜露車七十乘孫主賜露車三十乘道元與天公牋曰有露車一乘轅復摧折以犁轅續之左崎右嚙五結切彊弱相負傍行斫轅乘輿雜車鹵簿令曰記里曰白鷺鸞旗等三車並駕四馬正道匠各一人駕士各十四人皆平巾幘緋衫大口袴又曰辟惡車太卜令一人在車執弩箭平巾幘緋裲襠大口袴皮軒車左右金吾隊正一人在車執弩服同太卜其令行正道駕馬數駕士服色人數儀並同記里等車又曰安車四望車並駕四馬駕士各二十四人服同上又曰羊車駕果下馬一小吏十四人並青絲布褶紫碧腰襟青耳屩辨髮又曰屬車十二乘並駕牛駕士各八人服同記里等車又曰王鉞車或曰金鉞車在武衛隊正一人在車次豹尾車右武衛隊正一人在車皆執武弁朱衣革帶並駕三馬駕士各十二人服同上轅, WYG: 反目}
