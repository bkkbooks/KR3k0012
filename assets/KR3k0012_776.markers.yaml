  - {type: variant, offset: 2823, length: 1, content: 為, SBCK: 爲直指也望其輻欲其揱音消爾而纎也進而胝音視之欲其肉稱也參分其轂長二在外一在内以置其輻凢輻量其鑿深以爲輻廣而鑿淺則是以大枕雖有良工莫之能固鑿深輻小則是固有餘而強不足故竑音宏其輻廣以爲之弱則雖有重任轂不折參分其輻之長而殺音其一則雖有深泥亦弗溓讀如漢書曰李陵擊匈奴矢盡斬車軸而持之輞釋名曰輞羅也周輪其外周禮曰輪人爲輪斬三材必以其時三村}
