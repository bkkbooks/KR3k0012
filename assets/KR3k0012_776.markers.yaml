  - {type: variant, offset: 2275, length: 532, content: 曰輈轅人為輈輈車轅也輈有三度國馬之輈深四尺有七寸田馬之輈深四尺駑馬之輈深三尺有三寸唯轅直且無橈也左傳宣下曰軍行右轅左追蓐又曰改乘轅而北之又曰公孫閼與潁考叔爭車潁考叔挾輈以走子都拔棘以逐之弗及又曰師及齊師戰于次皋齊子淵捷從洩聲子射之中楯瓦繇朐汰輈七入者三寸東觀漢記曰江革母年八十革不欲搖動之常自居轅輓車不用牛馬晉儀注曰皇后乘油畫雲母安車駕驂馬油畫雲母安兩轅趙書曰後石造獵車千乘轅長三丈韓子曰吳起為西河守秦有小亭臨境欲攻之不足以徵卒乃取車轅倚於北門外令曰有能徙至南門外者賜上宅民莫之徙也有徙者賜之如令又置一石亦令曰有能徙者賜之如初民爭徙之乃令曰明旦攻城有先登者賜之上田上宅民爭上一朝而拔之夢書曰賈人夢車轅折敗者憂亡遺衣物何以言之轅字去衣故知亡衣物方言曰楚衛之間轅謂之輈司馬長卿諫獵書曰轝不及還轅人不暇施功潘正叔迎大駕傳云狐狸夾兩轅豺狼當路立輪釋名曰輪彌綸也周匠之言或曰較言揔入輻中也易曰既濟初九曳其輪濡其尾無咎禮曰古者貴賤皆杖叔孫武叔朝見輪人以其杖關轂而輠音禍輪者於是有爵而后杖也記庶人失禮所由始也叔孫武叔魯大夫叔孫州仇也輪人作車輪之官也又曰御婦車而壻授綏御輪三周先俟于門外周禮曰凡察車之道必自載於地者始也是故察車自輪始凡察車之道欲其樸音朴屬而微至不樸屬無以為完久也又, WYG: ''}
