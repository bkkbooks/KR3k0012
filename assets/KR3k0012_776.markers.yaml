  - {type: variant, offset: 2961, length: 0, content: '', WYG: 六分其輪崇以其一為之牙圍三分其牙圍而漆其二軛續漢書曰文虎伏軾龍道衡軛齊書曰呉興有項羽神䕶郡㕔事太守不得止太守到郡必須祀以軛下牛李安民奉佛法為太守到郡不與神牛着屐上㕔事又於㕔上人闗齋俄而牛死𦵏廟側今呼為李公牛冢韓詩外傳曰武王伐紂到邢丘軛折為三天雨三日不休武王召太公而問之曰未可伐乎太公曰不然軛折為三軍當分為三也天雨三日欲洗吾兵也韓子曰鄭縣人得車軛不知其名問人曰此車軛也俄得一人復問對曰此車軛也問者大怒曰曩者車軛今又車軛是何衆也輾釋名曰輾似人履輨説文曰輨軨轂上􅀈也枕釋名曰枕横在前若卧床之有枕方言曰軫謂之枕周禮曰車軫四尺謂之一等戈柲音必六尺有六寸既建而迤崇於軫四尺謂之二等六分其廣以一為之軫圍參分軫圍去一以為式圍五分其軫間以其一為之軸圍}
