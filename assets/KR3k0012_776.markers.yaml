  - {type: variant, offset: 3531, length: 3, content: 同衡律, krp: 重輪貳轄䟽轂展軨潘正叔贈陸機詩云星陳夙駕載脂載轄鍊釋名曰錬簡也錬釭軸之間使不相忘輠胡果切釋名曰輠褁也褁軹也軹指見於轂頭禮曰叔孫武叔朝見輪人以杖關轂}
  - {type: variant, offset: 3535, length: 0, content: '', SBCK: 輠輪者以是有爵而后讀如前後之後也餘具輪事注中史記曰淳于髠齊人也愽聞彊學其諌說慕晏嬰之爲人然而秉意觀色爲務故齊人謂之炙輠輠者之盛膏者炙之不盡猶有餘流言髠之智不盡如炙輠當通俗文曰車當謂箳歩輕切篂郭林宗別傳曰􅀫仲琰爲部從事嘗柴車駕牛編荆爲當蓋周禮曰輪人爲蓋逹常圍二寸達常盍斗杠入丘中也上欲尊而宇半下庇軹五尺謂庇輪四尺謂之庇軫參分弓長而揉其}
  - {type: page-break, offset: 3535, content: '', id: KR3k0012_SBCK_776-8a}
  - {type: page-break, offset: 3535, content: '', id: KR3k0012_SBCK_776-9a}
  - {type: variant, offset: 3535, length: 0, content: '', WYG: 輠輪者以是有爵而后杖也史記曰淳于髠齊人也博聞强學其諫説慕晏嬰之為人然而乗意觀色為務故齊人謂之炙輠輠車之盛膏者炙之不盡猶有餘流言髠之智不盡如炙輠當通俗文曰車當謂箳篁郭林宗别傳曰昔仲琰為從事嘗柴車駕牛編荆為當盖周禮曰輪人為蓋達常圍三寸上欲尊而宇欲卑上近部平者也隤下曰宇上尊而宇卑則吐水疾而霤逺蓋者主為雨設者也盖巳崇則難為門也盖巳卑是蔽目也是故盖崇十尺良盖弗冐弗紘殷畆而馳不隊謂之國工盖之圜也以象天也盖弓二十有八以象星也蔡邕獨斷曰乗輿車皆黄盖者並以黄為裏也方言曰盖在上如屋舎之覆盖董卓别傳曰卓諷朝廷使光禄宣璠持莭拜卓為太師位諸侯上引還長安百官迎路拜揖卓遂僣擬車服乗金華青盖畫兩轓時人號為竿摩車轑音老釋名曰轑似弓曲也説文曰轑盖弓也淮陽名車穹周禮曰弓鑿廣四枚鑿上二枚鑿下四枚鑿深二寸有半下直二枚鑿端}
  - {type: page-break, offset: 3535, content: '', id: KR3k0012_WYG_776-12a, image: WYG0899/WYG0899-0774c.png}
  - {type: page-break, offset: 3535, content: '', id: KR3k0012_WYG_776-12b, image: WYG0899/WYG0899-0774d.png}
  - {type: page-break, offset: 3535, content: '', id: KR3k0012_WYG_776-13a, image: WYG0899/WYG0899-0775a.png}
  - {type: variant, offset: 3535, length: 0, content: '', krp: 輠輪者以是有爵而后讀如前後之後也餘具輪事注中史記曰淳于髠齊人也愽聞彊學其諌說慕晏嬰之爲人然而秉意觀色爲務故齊人謂之炙輠輠者之盛膏者炙之不盡猶有餘流言髠之智不盡如炙輠當通俗文曰車當謂箳歩輕切篂郭林宗別傳曰宿仲琰爲部從事嘗柴車駕牛編荆爲當蓋周禮曰輪人爲蓋逹常圍二寸達常盍斗杠入丘中也上欲尊而宇半下庇軹五尺謂庇輪四尺謂之庇軫參分弓長而揉其}
  - {type: variant, offset: 3536, length: 10, content: 軌量齊急舒於寒燠吳李, SBCK: 以爲尊之蓋之二十有八以象星也杠周禮曰輪人爲盖逹常圍三寸桯音楹盖杠也信其桯圍以爲部廣六寸部長二尺桯長倍之四尺者二杠長八尺謂逹常以下也加逹常二尺則盖髙一丈也覆笭音岑釋名曰笭撗在車前在織竹作之空笭笭也廣雅曰覆笭謂之辟枸心廣雅曰從下枸軸也通俗文曰軸限者謂之枸較周禮曰參分式圍去一以爲較圍去一以爲軹圍釋名曰其較}
  - {type: page-break, offset: 3536, content: '', id: KR3k0012_SBCK_776-9b}
  - {type: variant, offset: 3536, length: 10, content: 軌量齊急舒於寒燠吳李, WYG: 枚弓長六尺謂之庇軹五尺謂之庇輪四尺謂之庇軫參分弓長而操其一參分弓長以其一為之尊杠周禮曰輪人為盖逹常圍三寸桯音楹盖杠也圍倍之六寸信其桯圍以為部廣部廣六寸部長二尺桯長倍之四尺者二覆笭釋名曰笭横在車前者織竹作之空笭笭也廣雅曰覆笭謂之辟枸心廣雅曰從下枸軸也通俗文曰軸限者謂之枸較周禮曰參分式圍去一以為較圍參分較圍去一以為軹圍釋名曰}
