  - {type: variant, offset: 3531, length: 3, content: 同衡律, SBCK: 重輪貳轄䟽轂展軨潘正叔贈陸機詩云星陳夙駕載脂載轄鍊釋名曰錬簡也錬釭軸之間使不相忘輠胡果切釋名曰輠褁也褁軹也軹指見於轂頭禮曰叔孫武叔朝見輪人以杖􅀜轂}
  - {type: page-break, offset: 3531, content: '', id: KR3k0012_SBCK_776-7b}
  - {type: variant, offset: 3531, length: 3, content: 同衡律, WYG: 重輪貳轄疏轂展軨潘正叔贈陸機詩云星陳夙駕載脂載轄鍊釋名曰鍊簡也錬釭軸之間使不相忘輠釋名曰輠裹也裹軹頭也禮曰叔孫武叔朝見輪人以杖闗轂}
