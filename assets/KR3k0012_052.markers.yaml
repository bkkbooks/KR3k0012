  - {type: variant, offset: 305, length: 2, content: 解散, SBCK: 時見赤氣後有二胡人􅀉宿忽求買之曠恠所以未及度錢子婦孫氏覩二黃鳥闘於石上疾往掩取變成黃金胡人不知索市逾急旣得橦破内止有二鳥處劉敬叔異苑曰晉武帝時呉郡臨平岸崩岀一石鼓打之無聲以問張華華曰可取蜀中桐材刻作魚形扣之則鳴於是如言之聲聞數十里異物志曰夷州􅁟無銅鐵磨礪青石以作弓矢此石砮楛矢之􅁼物理論曰􅁟精爲石石氣之核也氣之生石猶人筋絡之生􅀲牙也博物志曰桃林在弘農湖縣休牛之山有石焉曰帝臺之棊也五色而文狀鶉􅆑焉遊名山志曰芙蓉渚有聳石頭如初生芙蓉色皆青白山海經曰燕山多嬰石言似玉有采嬰帶所謂燕石}
