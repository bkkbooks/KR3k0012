  - {type: variant, offset: 1538, length: 410, content: 白石數點赤詣闕輒進諸宰相詰之對曰此石赤心所以來進李昭德叱曰此石赤心洛水中餘石豈能盡反耶左右皆笑又曰薛元超道衡孫也為中書舍人省有盤石初道衡為內史侍郎嘗踞而草制元超每見此石未嘗不泫然流涕又曰甘露事敗王璠舉家無少長皆死初璠在浙西繕城壕役人掘得方石上有十二字云山有石石有玉玉有瑕即休璠視莫知其旨京口老人講之曰此石非尚書之吉兆也尚書祖名崟崟生礎是山有石也礎生尚書是石有玉也尚書之子名遐休休絕也庸非吉徵果赤族老子曰落落如石列子曰昔者女媧練五色之石以補天淮南子又載又曰趙襄子率徒十萬狩於山中藉芿燔林煽赫百里有一人從石壁中出隨煙燼上下眾謂鬼物察之人也孫卿子曰以桀詐桀猶有巧拙以桀詐堯若卵投石又曰負石而走赴河行之難為者也而申徒狄能之闕子曰宋之愚人得燕石於梧臺之東歸西藏之以為大寶周客聞而觀焉主人端冕玄服以發寶華匱十重緹巾十襲客見之廬胡而笑曰此燕石也與瓦甓不異主人大怒藏之愈固符子曰水生石未有居山而溺者火生木未有抱樹而焦者呂氏春秋曰石可破也, SBCK: 開􅀚}
