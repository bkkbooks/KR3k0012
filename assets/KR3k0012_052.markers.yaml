  - {type: variant, offset: 3, length: 1, content: 六, WYG: 七石下石下西京雜記曰竇太后在家嘗有白燕銜石大如指墮后績筐中取石剖為二其中有文曰母天地后乃合之遂不復開後為皇后帝并置璽中為天璽又曰五鹿充宗受學於彌成子彌成子少時常有人遇己授以文石大如鷄卵成子吞之遂大明悟為天下通儒成子後病吐出此石授充宗充宗復吞又為明學又曰漢武昆明池養魚往往飛去後刻石為鯨魚致水中乃不飛去每至雷雨鯨魚鳴吼潯陽記曰石鏡山東一圓石懸崖明净照人微細必察幽明録曰宫亭湖邊傍石間有石數枚形圓若鏡明可鑑人謂之石鏡後人過以火燎一枚今不復明其人眼遂失明庾仲雍湘州記曰應陽縣蔡子池南有石臼云是蔡倫造紙臼也王歆之南康記曰歸美山出石紅丹赫若采繪峩峩秀上九霄隣景明曰女媧石大風雨後天澄氣靜聞管絃聲拾遺記曰員嶠山東有雲石廣五百里駮落如錦扣之片片蓊然雲起又曰魏明帝時太山下有連理文石髙十二丈狀如枯樹其文色彪發似人雕鏤自下及上對峙百餘步及魏明帝之始稍覺相近如雙闕也土石陰類魏為土徳斯為靈異交州記曰有浮石山在海中虛輕可以磨脚煮飲之止渴洞㝠記曰元鼎中條支國貢馬肝石以和九轉丹有髮白者以此拭之應手而黑顧野王瑞應圖曰石華者石生華也劉澄之江州記曰興平縣蔡子池南有石穴深二百許産文石堪為書硯蜀中記曰隗叔通棘人也性至孝母每食必須江水通每汲江中石為之出今江中有石號孝子石十洲記曰流洲在西海中上多積石名為昆吾石治其石成鐵作劍光明照洞如水晶狀割玉物如切泥土焉益州記龍盤山有一石長四十丈髙五丈當中有户及扉若人掩閉故老相傳玉女房石虎鄴中記曰孟津河東去鄴城五里有濟北郡榖城縣有榖城山是黄石公所葬處有人登此山見崩土中有文石石文鮮明虎使採取以治宫殿又免榖城令不奏聞故也潯陽記曰落星石在宮亭湖中周廻百餘步髙五丈上有竹林武昌記曰陶太尉廟東有盤龍石舊傳云龍盤於此石梁州記曰沔陽城泝漢上十五里有諸葛武侯所鎮在漢水南背山向水門前累石以為陣荆州圖經曰宜都有穴穴有二大石相去一丈俗云其一為陽石一為陰石水旱為災鞭陽石則雨鞭陰石則晴即禀君石是也但鞭者不壽人頗畏之不肯治也丹陽記曰石頭城西有唐頺石王敦害周伯仁之所又曰姑熟縣晉惠帝永寧三年湖中有大石去渚二百步浮來登岸百姓驚觀咸曰石來有水明年果有水入揚州裴淵廣州記曰甘泉縣平野中孤石挺起峯秀入雲連石相接無異棟宇安城記曰石室中有素石數斛狀如雀頭甘潤虛脆殆可噉曹叔雅異物志曰豫章有石黄色白色而理疎以水灌之便熱以鼎加其上炊足以熟冷則灌水雷煥以問張華華曰然石也漢官儀曰馬伯登泰山見石二枚其一是武帝時石用五車載不能上因置山中為屋號五車石一是刻號記功徳立壇上始興記曰營口北有逃石一名靈石晉永和中有三飛仙衣冠自來憇此石旬日乃去之盛宏之荆州記曰臨賀郡有青}
