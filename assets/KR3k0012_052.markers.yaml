  - {type: variant, offset: 1965, length: 11, content: 在嵩山下方生啟曰歸我子, SBCK: 乃堯之神人以破}
  - {type: variant, offset: 1965, length: 0, content: '', WYG: 又曰武都丈夫化為女子顔色美好蓋山之精也蜀王娶以為妻無㡬物故於成都郭中葬之以石鏡一枚徑丈髙五尺鄧析書曰譬猶拯溺而硾之以石救火而投之以薪世説曰武昌陽新縣北山上有望夫石狀若人立者傳云昔有貞婦其夫從役逺赴國難擕弱子餞送此山立望而化為石兵書曰軍中地生石將可以久居史記曰以石投水莫之逆也雜五行書曰婦姑鬬爭取石重十六斤埋門外即罷荀伯子臨川記曰石廪狀似倉廪其内可容千斛廪口開則嵗儉閉則年豐又曰石龍山有巖其下有石形隱起似龍尾長一丈二尺地理記曰有鱗甲因號為石龍又云石鼓}
