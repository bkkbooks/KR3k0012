  - {type: variant, offset: 298, length: 0, content: '', SBCK: 一枚其形似人而舉體青黄隱起而謂之石人可以祈雨小舉則雨小大舉則雨大又曰貴州}
  - {type: variant, offset: 298, length: 0, content: '', WYG: 一枚其形似人而舉體青黄隱起俗謂之石神可以祈雨小舉則小雨大舉則大雨郡國志曰馬嶺嶠上多虺蛇毒殺人}
  - {type: variant, offset: 298, length: 0, content: '', krp: 一枚其形似人而舉體青黄隱起而謂之石人可以祈雨小舉則雨小大舉則雨大又曰貴州}
  - {type: variant, offset: 299, length: 0, content: '', SBCK: 洞池周十數丈下有石牛}
  - {type: variant, offset: 299, length: 0, content: '', WYG: 冷石可以解之屑著瘡内即愈又曰梁州女郎山張魯女浣衣石上女便懷孕魯謂邪滛乃放之後生二龍及女死將殯柩車忽騰躍昇此山遂葬焉其水傍浣衣石猶在謂之女郎山又曰栁州城北七十里有話山孤石特竦仙人於此處談話輿地志曰南陵縣有女觀山俗傳云昔有婦人夫官於蜀屢愆秋期憂思感傷登此盼望因化為石如人之形所牽狗亦為石今狗形獨存博物志曰鸛水鳥也伏卵}
  - {type: page-break, offset: 299, content: '', id: KR3k0012_WYG_052-7b, image: WYG0893/WYG0893-0446b.png}
  - {type: variant, offset: 299, length: 0, content: '', krp: 洞池周十數丈下有石牛}
  - {type: variant, offset: 300, length: 0, content: '', SBCK: 出池間歳旱民殺牛祈雨以血和泥塗牛即雨盡即晴以爲恒馬嶺山嶠多虺蛇毒殺人有泠石可以解之屑着瘡内即活又曰梁州女郎山張魯女浣衣石上女便懷孕魯謂邪􅁋乃放之後生二龍及女死將殯柩車忽騰躍昇此山遂葬焉其水旁浣衣石猶在謂之女郎山又曰郴州城北七十里有話石山􅀌石特竦仙人於此處談話輿地志曰南陵縣有女觀山俗傳云昔有婦人夫官於蜀屢愆秋期憂思感傷登此騁望因化爲石如人之形所牽狗亦爲石今狗形猶存愽物志曰鸛水鳥也伏􅆑時數入水􅆑冷取礜周圍繞􅆑以助暖氣華陽國志汶山有鹹石煎之得塩異苑曰勝滕放太元􅀄枕文石枕卧忽暴雨震其所枕傍人莫不懾}
  - {type: page-break, offset: 300, content: '', id: KR3k0012_SBCK_052-5a}
  - {type: variant, offset: 300, length: 0, content: '', WYG: 數入水卵冷取礜石周圍繞卵以助暖氣故方術家以鸛巢中礜為藥華陽國志曰汶山有鹽石煎之得鹽異苑曰滕放太元初枕文石枕卧忽暴雨震其所枕傍人莫不懾}
  - {type: page-break, offset: 300, content: '', id: KR3k0012_WYG_052-8a, image: WYG0893/WYG0893-0446c.png}
  - {type: variant, offset: 300, length: 0, content: '', krp: 出池間歳旱民殺牛祈雨以血和泥塗牛即雨盡即晴以爲恒馬嶺山嶠多虺蛇毒殺人有泠石可以解之屑着瘡内即活又曰梁州女郎山張魯女浣衣石上女便懷孕魯謂邪淫乃放之後生二龍及女死將殯柩車忽騰躍昇此山遂葬焉其水旁浣衣石猶在謂之女郎山又曰郴州城北七十里有話石山孤石特竦仙人於此處談話輿地志曰南陵縣有女觀山俗傳云昔有婦人夫官於蜀屢愆秋期憂思感傷登此騁望因化爲石如人之形所牽狗亦爲石今狗形猶存愽物志曰鸛水鳥也伏卵時數入水卵冷取礜周圍繞卵以助暖氣華陽國志汶山有鹹石煎之得塩異苑曰勝滕放太元𥘉枕文石枕卧忽暴雨震其所枕傍人莫不懾}
