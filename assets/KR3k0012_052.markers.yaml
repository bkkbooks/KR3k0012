  body:
  - {type: variant, offset: 3, length: 1, content: 六, SBCK: 七石下西京雜記曰竇太后在家嘗有白鷰䘖石大如指墮后績筐中后取石剖爲二其中有文曰母天地后乃合之遂不復開後爲皇后常并置璽中爲天璽又曰五鹿充宗受學於弥成子弥成子少時常有人遇巳授以文石大如鷄􅆑成子吞之遂大明悟爲天下通儒成子後病吐出此石授充宗充宗復吞又爲明學又曰漢武昆明池養魚往往飛去後刻石爲鯨魚致水中乃不飛去毎至當雨魚當鳴吼顧凱之啓蒙記曰零陵郡有石鷰得風雨則飛如眞鷰潯陽記曰石鏡山東一圓石懸崖明浄照人毫細必察幽明録曰宫亭湖邊傍石間有石數枚形圎􅀂鏡明可鑑人謂之石鏡後人過以火燎一枚今不復明其人眼遂失明􅁃仲雍湘州記云應陽縣蔡子池南有石臼云是蔡倫􅁓臼王歆之南康記曰歸美山山石紅丹赫􅀂采繪峩峩秀上切霄隣景名曰女媧石大風雨後天澄氣靜聞絃管聲拾遺記曰貟嶠山東有雲石廣五百里駮落如錦扣之片片蓊然雲起又曰魏明帝時太山下有連理文石髙十二丈狀如枯樹其文色彪發似人雕鏤自下及上皆合百餘歩及魏明帝之始稍􅁴相近如􅀟闕也土石隂􅀋魏爲土德斯爲靈交州記曰有浮石山在海中虛輕可以磨脚煑飲之止渇洞􅄀記元鼎中條支國貢馬石以和九轉丹有髪白者以此石拭之應手而黒顧野王瑞應圖曰石華者石生華也劉澄之江州記曰興平縣蔡子池南有石穴深二百許丈石青色堪爲書硯蜀中記云隗叔通􅁄人也性至孝母毎食必湏江水通每汲江中石爲之出今江中有石號孝子石十洲記曰流洲在西海中上多積石名爲昆吾石治其石成䥫作釰光明照洞如水精狀割玉物如切泥􅁟焉益州記龍盤山有一石長四十丈髙五丈當中有户及扉􅀂人掩閇古老相傳爲玉女房石虎鄴中記曰孟津河東去鄴城五百里有濟北郡榖城縣有􅂖城山是黄石公所葬處有人登此山見崩土中有文石石文鮮明虎使採取以治宫殿又免榖城令不奏聞故也㝷陽記曰落星石在宫亭湖中周廻百餘歩髙五丈上生竹木武昌記曰陶太尉廟東有盤龍石舊傳云龍盤於此石梁州記􅃆陽城泝漢上十五里有諸􅁑武侯所鎭在漢水南背山向水門前累石以爲陣荆州圖曰冝都有穴穴有二大石相去一丈俗云其一爲陽石一爲隂石水旱爲災鞭陽石則雨鞭隂石則晴即廪君石是也但鞭者不壽人頗畏之不肯治也丹陽記曰石頭城西有唐頽石王敦害周伯仁之所又曰湖熟縣晉惠帝永寧二年湖中有大石去渚二百歩浮來登岸百姓驚觀咸曰石來明年果有石氷入楊州裴淵廣州記曰甘泉縣平野中􅀌石挺起峯秀入雲連石相接無異棟宇安城記曰石室中有素石數斛狀如雀頭甘􅃳虚脆殆可噉曹叔邪異物志曰豫章有石黃白色而理踈以水灌之便熱以鼎加其上炊足以熟冷則灌之雷煥以問張華華曰然石也漢官儀曰馬伯苐登泰山見石二枚一是武帝時石用五車載不能上因置山中爲屋號五車石一是刻號記功德立壇上王昭之始興記曰勞口北有逃石一名靈石晉水和中有二飛仙衣冠自來憩此石旬日乃去之盛弘之荆州記曰臨賀郡有青}
