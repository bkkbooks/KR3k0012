  - {type: variant, offset: 590, length: 1068, content: 久之翦使人問軍中戲乎對曰方投石超距翦曰士卒可用矣又曰張良見老人出一篇書讀是則為王者師後十三年見我濟北穀城山下黃石即我也良後果得黃石寶而祠之及死并葬黃石伏臈祠之又曰李廣出獵見草中石以為虎而射之中石沒鏃視之石也因復更射之終不能復入石矣後漢書曰梁鴻妻孟光有力能舉石臼又趙歧曰吾死後置一圓石墓前刻曰漢有逸人姓趙名歧有志無時命也奈何謝承後漢書曰吳郡媯皓父為南郡太守坐事繫獄皓懷小石至公卿門輒出石叩頭流血覆面父遂得免東觀漢記曰涿郡太守張豐舉兵反初豐好方術有道士言豐當為天子以五綵囊盛石繫豐肘云石中有玉璽豐信之遂以反既當斬猶曰肘有玉璽椎破之豐乃知被詐仰天歎曰當死無所恨魏略曰梁州柳谷有石無故自崩石有文如率馬之狀後司馬氏得天下之應又曰太秦國石為城郭山出九色玉石魏志曰魏明帝增崇宮殿雕鏤觀閣鑿太行之石英採穀城之文石起景陽山於芳林園建昭陽殿於太極之北又曰辰韓在馬韓之東兒生便以石押頭欲其扁今辰韓人頭皆扁又曰公孫度為遼東太守時生大石長丈餘下有三小石為足魏武帝末年鄴中雨五色石王隱晉書曰永康元年襄陽郡上言得鳴石鍾聞七八里又石勒傳曰初勒鄉里所居原上地中石生日長類鐵之象又曰陳總遷殿中侍御史詔遣詣終南山請石總先除小石祠唯存大石一所而祁之上文曰峨峨大石佐岳通理合滋吐潤惠我四海又曰孫子荊謂王武子曰當枕流漱石曰石非可漱流非可枕孫曰所以枕流洗其耳漱石礪其齒晉陽秋曰董威輦遁去莫知所之於其寢所得一石及竹子并詩二首齊書曰虞愿為晉平太守海邊有越王石常隱雲霧相傳云清廉太守乃得見愿往觀視清澈無隱蔽南史曰到溉山池有奇礓石長一丈六尺梁武覩之輸焉即迎置華林宴居殿前移石之日都下傾城縱觀所謂到公石趙書曰劉耀築建德殿取土城西得圓石狀若水碓其銘曰律推石重四釗同律度量衡有辛氏造議者未之詳或以為瑞參軍續咸曰王莽時物後周書曰高琳母嘗祓禊泗濱遇見一石光彩朗潤遂持以歸是夜夢見一人衣冠有若仙者謂其母曰夫人向所將來之石是浮磬之精能寶持必生令子其母驚寤便舉體流汗俄而有妊及生子因名琳字季珉也隋書曰帝令江都郡丞王世充發淮南兵擊劉元進有大流星墜於江都未及地而南逝磨拂竹木皆有聲至吳郡而落于地元進惡之令掘地入二丈得一石徑丈餘後數日失石所在唐書曰車騎將軍劉山濤上言祖龍潛時數往來落郊之莊舍嘗踐子石靴跡見於石中至今猶在高祖令鑿之深寸餘餘其跡逾明乃止又曰則天時有人於洛水中得白石數點赤詣闕輒進諸宰相詰之對曰此石赤心所以來進李昭德叱曰此石赤心洛水中餘石豈能盡反耶左右皆笑又曰薛元超道衡孫也為中書舍人省有盤石初道衡為內史侍郎嘗踞而草制元超每見此石未嘗不泫然流涕又曰甘露事敗王璠舉家無少長皆死初璠在浙西繕城壕役人掘得方石, WYG: ''}
