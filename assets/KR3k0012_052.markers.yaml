  - {type: variant, offset: 1344, length: 187, content: 夜夢見一人衣冠有若仙者謂其母曰夫人向所將來之石是浮磬之精能寶持必生令子其母驚寤便舉體流汗俄而有妊及生子因名琳字季珉也隋書曰帝令江都郡丞王世充發淮南兵擊劉元進有大流星墜於江都未及地而南逝磨拂竹木皆有聲至吳郡而落于地元進惡之令掘地入二丈得一石徑丈餘後數日失石所在唐書曰車騎將軍劉山濤上言祖龍潛時數往來落郊之莊舍嘗踐子石靴跡見於石中至今猶在高祖令鑿之深寸餘餘其跡逾明乃止又曰則天時, SBCK: 銀製}
