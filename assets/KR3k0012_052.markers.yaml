  - {type: variant, offset: 1977, length: 181, content: 破北方而生啟又畢萬術曰埋石四隅家無鬼取蒼石四枚及桃七枚以桃弧射之乃取併埋弓矢四隅故無鬼殃抱朴子曰白石似玉姦佞似賢又曰磁石引針又曰浮磬息音未別於眾石又曰燒泥為瓦燔木為炭蜂窠為蠟水沬為浮石隋巢子曰禹產於䃂石啟生於石王韶之云啟生即母化為石六韜曰武王伐殷得二大夫而問之曰殷國將亡亦有妖乎其一人對曰殷國常雨血雨灰雨石小者如雞子大者如箕武王曰大哉妖也樂資春秋傳曰秦始皇使鄭容, SBCK: 推}
