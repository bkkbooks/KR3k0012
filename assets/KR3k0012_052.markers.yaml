  - {type: 'tls:seg', offset: 2175, content: '', id: KR3k0012_CHANT_052-37a.6}
  - {type: variant, offset: 2175, length: 545, content: 熟視稍近問鄭容曰安之荅曰之咸陽素車上人曰吾華山使願託一牘書致鎬池君所子之咸陽道過鎬池見一大梓樹有文石以款樹當有應者即以書與之鄭容如其言以石款梓樹果有人來取書吳越春秋曰禹案黃帝中經見聖人所記曰在乎九疑上東南號曰宛委承以文玉覆以盤石其書金簡玉字禹乃退齋三日發石取書荊楚歲時記曰張騫尋河源得一石示東方朔朔曰此石是天上織女支機何至於此神仙傳曰壺公內費長房於石室中頭上有大石方數丈以茅繩懸之諸虵競齧且斷長房不移公撫之曰子可教矣又曰介象字元則會稽人入山求神仙見谷有石子皆紫色大如雞子象取二枚見一美女被服五采象叩頭乞長生女曰急送汝手中物還著故處象送石還女授以還丹方一首列異傳曰豫寧女子戴氏久疾出見小石曰爾有神能差我疾者當事汝夜夢人告之吾將祐汝後漸差遂為立祠名石侯祠益部耆舊傅曰公孫述時蜀武檐山石折任文公曰西州智士死我將死矣後三月果卒韓詩外傳曰楚渠子夜行見寢石以為伏虎彎弓而射之沒金飲羽下視知其石也因復射之矢摧無跡漢書載李廣亦如之文士傳曰魏文帝之在東宮也宴諸文學酒酣命甄后拜坐者坐者咸伏惟劉楨平仰觀之太祖以為不敬送徙隸簿後太祖乘步牽車乘城降閱簿作諸徒咸敬而楨坐磨石不動太祖曰此非劉楨也石如何性楨曰石出荊山玄巖之下外炳五色之章內秉堅貞之志彫之不增文磨之不加瑩氣質貞正稟性自然太祖曰名豈虛哉神仙傳曰白生者常煮白, WYG: 破}
