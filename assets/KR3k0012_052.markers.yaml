  - {type: variant, offset: 351, length: 1, content: 嘉, SBCK: 象林郡功曹姓區有子名連攻縣殺令自號爲王值世亂離林邑遂立後乃襲代傳位子孫三國鼎争未有所附呉有交􅁟與之隣接進侵夀泠以爲壃界自區連以後國無文史先其纂代世數難詳宗胤滅絶無復種裔外孫范熊代立人情樂推後熊死子逸立有范文曰南西捲縣夷帥稚夷奴也文爲奴時山邊牧羊於澗水中得兩鯉魚隱藏持歸䂓欲私食郎知檢其魚大慙懼詐云將礪}
