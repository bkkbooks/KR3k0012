  - {type: variant, offset: 2413, length: 546, content: 枚見一美女被服五采象叩頭乞長生女曰急送汝手中物還著故處象送石還女授以還丹方一首列異傳曰豫寧女子戴氏久疾出見小石曰爾有神能差我疾者當事汝夜夢人告之吾將祐汝後漸差遂為立祠名石侯祠益部耆舊傅曰公孫述時蜀武檐山石折任文公曰西州智士死我將死矣後三月果卒韓詩外傳曰楚渠子夜行見寢石以為伏虎彎弓而射之沒金飲羽下視知其石也因復射之矢摧無跡漢書載李廣亦如之文士傳曰魏文帝之在東宮也宴諸文學酒酣命甄后拜坐者坐者咸伏惟劉楨平仰觀之太祖以為不敬送徙隸簿後太祖乘步牽車乘城降閱簿作諸徒咸敬而楨坐磨石不動太祖曰此非劉楨也石如何性楨曰石出荊山玄巖之下外炳五色之章內秉堅貞之志彫之不增文磨之不加瑩氣質貞正稟性自然太祖曰名豈虛哉神仙傳曰白生者常煮白石為糧就白石山居故號曰白石先生穆天子傳曰天子升子采石之山於是取采石鑄以成器于黑水之山三齊略記曰始皇作石塘欲過海看日出處時有神人驅石下海石去不速神輒鞭之皆流血至今石悉赤陽城山盡起立嶷嶷東傾狀如相隨行事具神部盛弘之荊州記曰興安縣水邊有平石其上有石櫛石履各一具俗云越王渡溪脫履墮櫛於此郭緣生述征記曰秦梁圯名也或云秦始皇東巡弗行舊道過此水率百官已下人提一石以填之俄而梁成今覩所累石無造之處也搜神記曰常山張顥為梁相天新雨後有鳥如山鵲飛翔入市人擲之墯地人爭取化為圓石顥椎得一金印文曰忠孝侯印, SBCK: ''}
