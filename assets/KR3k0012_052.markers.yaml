  - {type: variant, offset: 1966, length: 10, content: 嵩山下方生啟曰歸我子, WYG: 宜黄水邊狀如鼓形濶九尺長一丈四尺四寸又云圓淨如鼔因以鼓為名焉又云鼔石髙五尺在宜黄水邊又云有女人入水次浣濯為蛟所牽入石中經數日雷擊}
