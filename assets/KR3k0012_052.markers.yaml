  - {type: variant, offset: 968, length: 375, content: 石押頭欲其扁今辰韓人頭皆扁又曰公孫度為遼東太守時生大石長丈餘下有三小石為足魏武帝末年鄴中雨五色石王隱晉書曰永康元年襄陽郡上言得鳴石鍾聞七八里又石勒傳曰初勒鄉里所居原上地中石生日長類鐵之象又曰陳總遷殿中侍御史詔遣詣終南山請石總先除小石祠唯存大石一所而祁之上文曰峨峨大石佐岳通理合滋吐潤惠我四海又曰孫子荊謂王武子曰當枕流漱石曰石非可漱流非可枕孫曰所以枕流洗其耳漱石礪其齒晉陽秋曰董威輦遁去莫知所之於其寢所得一石及竹子并詩二首齊書曰虞愿為晉平太守海邊有越王石常隱雲霧相傳云清廉太守乃得見愿往觀視清澈無隱蔽南史曰到溉山池有奇礓石長一丈六尺梁武覩之輸焉即迎置華林宴居殿前移石之日都下傾城縱觀所謂到公石趙書曰劉耀築建德殿取土城西得圓石狀若水碓其銘曰律推石重四釗同律度量衡有辛氏造議者未之詳或以為瑞參軍續咸曰王莽時物後周書曰高琳母嘗祓禊泗濱遇見一石光彩朗潤遂持以歸, SBCK: 青盆悉}
