  - {type: variant, offset: 576, length: 7, content: 翦代李信擊荊州, SBCK: 獻五美女於蜀王蜀王遣五丁迎五女見大虵入山空中五丁引虵山崩五女上山化爲石又曰武都丈夫化爲女子顔色美好盖山之精也蜀王娶以爲妻無幾物故於成都郭中葬之以石鏡一枚徑一丈髙五尺鄧析書曰譬猶拯溺而硾之以石救火而投之以薪世􅀃曰武昌陽新縣北山上有望夫石狀􅀂人立者傳云昔有貞婦其夫從役遠赴國難携弱子餞送此山立望而化爲石}
