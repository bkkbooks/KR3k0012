  - {type: variant, offset: 4506, length: 0, content: '', krp: 殊禮齊王如故魏帝遣兼太尉彭城王韶奉皇帝璽綬禪位于帝戊午乃即皇帝位於南郊升壇柴燎告天事畢還宫御太極前殿詔大赦天下改武定八年爲天保元年辛酉尊王太后爲皇太后辛未遣大使於四方觀察風俗問民疾苦嚴勒長吏厲以廉平興利除害務存安静六月詔吉凶車服制度各爲等差具立條式使儉而獲中又詔兾州}
  - {type: variant, offset: 4507, length: 0, content: '', SBCK: 勃海長樂二郡先帝始封之國義旗􅀄起之地并州之太原青州之齊郡霸業所在王命是基君子所作貴不忘夲思申恩洽蠲復田租丁亥詔立王子殷爲皇太子王后李氏爲皇后八月詔曰有能直言正諌不避罪辜謇謇􅀂朱雲諤諤􅀂周舎開朕意沃朕心弼予一人利兼百姓者必當寵以榮禄待以不次又諸牧民之官仰專意農桑勸課廣収天地之利以備水旱之災庚寅詔曰朕以虚寡嗣弘王業思所以賛􅀭盛績播之萬古雖史官執筆有聞無墜猶恐緒言遺羙時或未書在位王公文武大小降及民庶爰至僧徒或親奉音旨或承傳旁􅀃凡可載之文籍悉宜條録封上冬十月巳卯備法駕御金輅入晉陽宫朝皇太后於内殿十一月周文帝率衆至陜城分􅀐北渡至建州景寅帝親戎出次城東周文帝聞帝軍嚴盛歎曰髙歡不死矣遂退明年征契丹帝親踰山嶺爲士卒先露頭祖身晝夜兼行千餘里唯食肉飲水壯氣弥厲竟大破契丹􅀗十餘万口􅄂畜數十萬頭嘗於東山遊宴以􅀜隴未平投盃震怒將侯西伐西人爲之震恐帝素沉敏有逺亮􅀄文襄崩祕不發喪其後漸露魏帝􅀼謂左右曰大將軍此殂似是天意威權當歸王室矣及帝將幸晉陽親入辭謁於昭陽殿從者千人居前持劒者十餘輩帝在殿下數十歩立而衛士昇階巳二百許皆攘􅃑扣刃􅀂對嚴敵帝令主者傳奏須詣晉陽言訖再拜而出魏帝失色目送帝曰此人似不能見容吾不知死在何日洎受禪之後留心政術御下肅清六七年後以天下無事便留連飲宴通日竟夜躬自鼓舞􅃝露形體􅀓粉塗黛乗駞牛驢不施鞍勒親戚貴臣雜錯侍從徴集媱嫗分付從官親看無}
