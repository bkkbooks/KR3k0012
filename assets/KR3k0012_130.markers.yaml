  - {type: variant, offset: 23, length: 0, content: '', SBCK: 南數有赤光紫氣之異隣人以爲怪勸徙居以避之皇考曰安知非􅁻居之自若及神武生而皇妣韓氏殂飬於同産姊婿鎮嶽隊尉景家神武旣累丗北邊故習其俗遂同鮮卑長而深沉有大度輕財重士爲豪俠所宗目有精光長頭髙權齒白如玉少有人傑素家貧及娉武明皇后始有馬得給鎮將遼西叚長常竒神武貌謂曰君有康濟之才終不徒然便以子孫爲託神武自隊主轉輪爲函使嘗乗驛過建興雲霧晝晦雷聲隨之半日乃絶􅀂有神應者毎行道路徃來無風塵之色又嘗夢履衆星而行􅁴而内喜爲函使六年毎至洛陽給令史麻祥使祥嘗以肉㗖神武神武性不立食㘴而進之祥以爲慢巳笞神武四十及自洛陽還傾産以結客親故恠問之荅曰吾至洛陽􅀫衛羽林相率焚領軍張彛宅朝廷懼其亂而不問爲政􅀂此事可知也財物豈可常守耶自是乃有澄清天下之志與懷朔省事雲中司馬子如及秀容人劉貴中山人賈顯智爲奔走之友懷朔户曹史孫騰外兵史侯景亦相友結孝昌元年歸尓朱榮於秀容先是劉貴事榮盛言神武羙至是始得見以憔悴故未之竒也貴乃爲神武更衣復求見焉因隨榮之廐廐有惡馬榮命剪之神武乃不加羈絆而剪竟不蹄齧巳而起曰御惡人亦如此馬矣榮遂㘴神武於床下屏左右而訪時事神武曰聞公有馬十二谷色别爲群將此竟何用也榮曰但言尓意神武曰方今天子愚弱太后􅁋亂孽寵擅命朝政不行以明公雄武乗時奮發討鄭儼徐紇而清帝側霸業可舉鞭而}
