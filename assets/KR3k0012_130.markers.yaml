  - {type: 'tls:seg', offset: 27, content: '', id: KR3k0012_CHANT_130-1a.6}
  - {type: variant, offset: 27, length: 3, content: 小字鬥, SBCK: 榮嘗問左右曰一日無我誰可主軍皆稱尓朱兆榮曰此正可統三千􅀐以還堪代我主衆者唯賀六渾耳因誡兆曰尓非其匹終當爲其子穿鼻乃以神武爲晉州刺史於是大聚斂因劉貴貨榮下要人盡得其意州庫角無故自鳴神武異之無幾而孝莊誅榮及尓朱兆自晉陽}
  - {type: page-break, offset: 27, content: '', id: KR3k0012_SBCK_130-2b}
  - {type: variant, offset: 27, length: 3, content: 小字鬥, WYG: 榮嘗問左右曰一日無我誰可主軍皆稱爾朱兆榮曰此正可統三千騎以還堪代我主衆者惟賀六渾耳因誡兆曰爾非其匹終當為其子穿鼻乃以神武為晉州刺史於是大聚斂因劉貴貨榮下要人盡得其意時州庫角無故自鳴神武異之無幾而孝莊誅榮及爾朱兆自晉陽}
