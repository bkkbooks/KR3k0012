  - {type: variant, offset: 3209, length: 425, content: 太子左率李居士揔督西討諸軍事屯新亭九月義軍至南州輔國將軍申曹軍二萬人於姑熟奔歸丙辰李居士與義軍戰于新亭敗績十月冀青二州刺史桓和入衛屯東宮已卯以眾降光祿大夫張瓌先守石頭棄城奔還於是閉宮城自守李居士以新亭降軍築長圍守宮城十二月王珍國侍中張謏等帥兵入殿廢帝帝在東宮便好弄不喜書學及即位性重澀少言不與朝士接唯親信閹人日夜於後堂戲馬五更方臥至晡乃起漸出遊走屏逐居民從萬春門遊東宮以東至於郊外數十百里皆空家靜室巷陌懸幔為高障置仗防之謂之屏除夜出晨反火光照天拜愛姬潘氏為貴妃仍以金蓮帖地使妃行於其上曰此步步蓮花耶每出妃乘臥輿帝騎馬從後著織成袴褶金薄帽執七寶纏矟戎服急裝不變寒暑凌冒雨雪不避坑阱馳騁渴乏輒下馬解取腰邊蠡器酌水飲之復上馬馳去選無賴小兒善走者為逐馬左右百人常以自隨置射雉場二百九十六處翳中帷帳及步障皆祫緣以紅錦金銀鏤弩牙瑇瑁帖箭郊郭四民樵蘇路絕吉凶失時舉疾棄屍不得殯葬後宮遭火之後更起仙華神仙玉壽諸殿刻畫彫彩麝香塗壁錦幔珠簾窮極綺麗又信鬼神崔惠景事時蔣子, SBCK: ''}
