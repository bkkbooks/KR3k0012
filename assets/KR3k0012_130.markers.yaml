  - {type: variant, offset: 4507, length: 2, content: 禮遠, WYG: 渤海長樂二郡先帝始封之國義旗初起之地并州之太原青州之齊郡霸業所在王命是基君子有作貴不忘本也申恩宜洽蠲復田租丁亥詔立王子殷為皇太子王后李氏為皇后八月詔曰有能直言正諫不避罪辜謇謇若朱雲諤諤若周舍開朕意沃朕心弼于一人利兼百姓者必當寵以榮禄待以不次又曰諸牧民之官須仰承尊意勸課農桑廣收天地之利以備水旱之災庚寅詔曰朕以虚寡嗣𢎞王業思所以贊揚盛績播之萬古雖史官執筆有聞無墜猶恐緒言遺美時或未書在位王公文武大小降及民庶爰至僧徒或親奉音旨或承傳旁說凡可載之文籍悉宜條録封上冬十月己夘備法駕御金輅入晉陽宫朝皇太后於内殿十一月周文帝率衆至陜城分騎北渡至建州丙寅帝親戎出次城東周文帝聞帝軍嚴盛嘆曰高歡不死矣遂退四年征契丹帝親踰山嶺為士卒先露頭袒身晝夜兼行千餘里唯食肉飲水壯氣彌厲竟大破契丹獲畜十數萬頭七年秋自河西摠秦戍築長城東至於海前後所築東西凡三千餘里六十里一戍要害置州鎮凡二十五所八年春帝在城東馬射勅京城婦女悉赴觀不赴者罪以軍法七日乃止初於長城内築重城自庫洛拔而東四百餘里先是發丁匠三十餘萬營三臺於鄴下因其舊基而髙博之大起宫室及}
