  - {type: variant, offset: 4485, length: 2, content: 殊禮, WYG: 大行臺渤海王文襄啟辭願停王爵壬寅魏帝詔太原公洋攝理軍國遣中使敦喻八月戊辰文襄啟申神武遺令請減國邑分封將督各有差辛未朝於鄴固辭丞相魏帝詔曰既朝野攸慿安危所繫不得令遂本懐須有權奪可復前大將軍餘如故七年五月文襄帥師赴潁川六月尅之獲西魏大將軍王思政八月文襄遇盜崩初梁將蘭欽子京見虜文襄以配廚欽求贖之不許京與其黨六人謀作亂時京將進食文襄却之謂人曰昨夜夢此奴殺我宜殺却京聞之置刃於盤下冒言進食文襄怒曰我未索食何遽來京揮刀曰將殺汝文襄自投傷足入床下賊黨至去床遇殺時年二十九追諡文襄皇帝高洋北齊書曰顯祖文宣皇帝諱洋字子進高祖第二子世宗之母弟后初孕每夜有赤光照室后私嘗怪之初高祖之歸爾朱榮時經危亂家徒壁立后與親姻相對共憂寒餒帝時尚未能言欻然應曰得活太后及左右大驚而不敢言鱗身重踝不好戲弄深沈有大度晉陽曾有沙門乍愚乍智時人不測呼為阿秃師帝曾與諸童共見之厯問禄位至帝舉手再三指天而已口無所言見者異之高祖嘗試觀諸子意識各使治亂絲帝獨拔刀斬之曰亂者須斬高祖是之又各配兵四出而使甲騎偽攻之世宗等怖撓帝乃勒衆與彭樂敵樂免胄言情猶擒之以獻後從世宗行過遼陽山獨見天門開餘人無見者内雖明敏外若不足世宗毎嗤之云此人亦得富貴相法亦何由可解唯高祖異之天平二年授驃騎大將軍儀同三司武定元年加侍中五年授尚書令中書監京畿大都督七年八月世宗遇害事出倉卒内外震駭帝神色不變指麾部分自若臠斬羣賊而漆其頭徐宣言曰奴反大將軍被傷無大苦也當時内外莫不驚異焉乃赴晉陽親總庻政務從寛厚事有不便者咸蠲省焉八年正月戊辰魏帝詔進帝位使持節丞相都督中外諸軍録尚書事大行臺齊郡王食邑一萬户三月辛酉又進封齊王食邑十萬户自居晉陽寢室夜有光如晝既為王夢人以筆㸃已額旦以告館客王曇哲曰吾其退乎曇哲再拜賀曰王上加㸃便成主字乃當進也夏五月辛亥帝如鄴甲寅}
