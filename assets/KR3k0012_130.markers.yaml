  - {type: 'tls:seg', offset: 31, content: '', id: KR3k0012_CHANT_130-1a.7}
  - {type: variant, offset: 31, length: 0, content: '', SBCK: 舉兵赴洛召神武使長史孫騰辭以蜀汾胡欲反不可委去兆恨焉騰命神武曰兆舉兵犯上此大賊也吾不能乆事之自是始有圗兆計及兆入洛執莊帝以北神武聞之大驚又使孫騰僞賀兆因密覘孝莊所在將刧以舉義不果乃以書喻之言不冝執天子以受惡名於海内兆不納殺帝而與尓朱丗隆等立長廣王曄改元建明封神武爲平陽郡公魏普泰元年二月神武自領軍次信都髙乾封隆之開門以待遂據冀州是月尓朱度律廢元曄而立節閔帝欲羈縻神武三月乃白節閔帝封神武爲勃海王徴使入覲神武辭四月癸巳又加授東道大行臺第一鎭人酋長龐蒼鷹自太原來奔神武以爲行臺郎㝷以爲安州刺史神武自向山東飬士繕甲禁兵侵掠百姓歸心乃詐爲書云尓朱兆將以六鎮人配契胡爲部曲衆皆愁爲并州符徴兵討歩落稽發萬人將遣之孫騰尉景爲請留如此者再神武親送之郊雪涕執别人號慟􅂘聲動地神武乃喻之曰與尓俱失郷客義同一家不意在上乃尓徴召直向西巳當死後軍期又當死配國人又當死柰何衆曰唯有反耳神武曰反急計湏推一人爲主衆願奉神武神武曰尓郷里難制不見􅁑榮乎雖百萬衆無刑法終自灰滅今以吾爲主當與前異不得欺}
  - {type: page-break, offset: 31, content: '', id: KR3k0012_SBCK_130-3a}
  - {type: variant, offset: 31, length: 0, content: '', WYG: 舉兵赴洛召神武神武使長史孫騰辭以絳蜀汾胡欲反不可委去兆恨焉騰復命神武曰兆舉兵犯上此大賊也吾不能久事之自是始有圖兆計及兆入洛執莊帝以北神武聞之大驚又使孫騰偽賀兆因密覘孝莊所在將刼以舉義不果乃以書喻之言不宜執天子以受惡名於海内兆不納殺帝而與爾朱世隆等立長廣王曄改元建明封神武為平陽郡公魏普泰元年二月神武自領軍次信都高乾封隆之開門以待遂據冀州是月爾朱度律廢元曄而立節閔帝欲羈縻神武三月乃白節閔帝封神武為渤海王徴使入覲神武辭四月癸巳又加授東道大行臺第一鎮人酋長龎蒼鷹自太原來奔神武以為行臺郎尋以為安州刺史神武自向山東養士繕甲禁兵侵掠百姓歸心乃詐為書云爾朱兆將以六鎮人配契胡為部曲衆皆愁怨又為并州符徴兵討步落稽發萬人將遣之孫騰尉景為請留五日如此者再神武親送之郊雪涕執别人皆號慟哭聲動地神武乃喻之曰與汝俱失鄉客義同一家不意在上乃爾徴召直向西已當死後軍期又當死配國人又當死奈何衆曰唯有反耳神武曰反是急計須推一人為主衆願奉神武神武曰爾鄉里難制不見葛榮乎雖百萬衆無刑法終自灰滅今以吾為主當與前異不得欺}
