  - {type: variant, offset: 37, length: 0, content: '', WYG: 面赴擊之爾朱兆責神武以背已神武曰本戮力共輔王室今帝何在兆曰永安枉害天柱我報讎耳神武曰我昔日親聞天柱計汝在户前立豈得言不反耶且以君殺臣何報之有今日義絶矣乃合戰大敗之四月斛斯椿執天光度律以送洛陽長孫承業遣都督賈顯智張歡入洛陽執}
