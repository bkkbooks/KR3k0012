  - {type: variant, offset: 3644, length: 834, content: 國太宰大將軍楊州牧鍾山王以至尊為皇帝迎神像及諸廟雜神皆入後宮禱祀祈福及聞兵入趨出戶閹人黃大刀傷其膝仆地曰奴反耶直後張齊斬首送梁王稱宣德皇后令依漢海昏侯故事追封東昏侯唐祕書監虞世南公子先生論云公子曰宋齊二代廢主有五並驕淫狂暴前後如一或身被殺戮或傾墜宗社豈厥性頑兇自貽非命將天之所棄用傾代業者乎先生曰夫木之性直匠者揉以為輪金之性剛工人理以成器豈人事也唯上智下愚特稟異氣中庸之才全由訓習自宋齊以來東宮師傅備員而已貴賤禮隔規獻無由且多以位昇罕由德進善乎哉賈生之言昔者成王幼在襁褓之中召公為太保周公為太傅太公為太師保則保其身體傅則傅以德義師則導之教訓此三公之職也又置三少曰少保少傅少師是與太子宴者也故乃孩提有職三公三少同明者孝仁義禮以導習之遂去邪人不使見惡行選天下之儒士孝悌愽聞有道術者以翼衛之使與太子居處故太子生乃見正事聞正言行正道左右前後皆正人也習與正人居不能無正猶生長齊地不能不齊言習與不正人居猶生長楚地不能不楚言也秦使趙高傅胡亥教之獄訟所習者非斬劓人則夷人之三族也故胡亥今日即位明日射人有忠諫者謂之誹謗深計者為之妖言視殺人如刈草菅然豈胡亥之性惡哉彼其導之者非其理也故選左右禆教之最急此五君者稟凡庸之性無周召之師遠益友之箴規狎不尚之近習以斯下質生而楚言覆國忘身理數然也蕭寶融蕭子顯齊書曰和帝諱寶融字智昭高宗第八子建武元年封隨郡王永元元年改封南康王出為荊州寧益梁南北秦七州諸軍事西平郎將荊州刺史蕭穎胄殺巴西梓潼二郡太守劉山陽奉王舉兵以雍州刺史蕭衍為使持節都督諸軍事左將軍以蕭穎胄為右將軍督行諸軍事夏侯亶自京師至江陵稱宣德太后令南康王宜纂成國祚光臨億兆方俟清宮未即大號可且封十郡為宣城王加相國荊州牧又加黃鉞蕭穎胄為左長史進號鎮軍蕭衍進號征東將軍己巳群僚上尊號中興元年正月乙巳即皇帝位大赦改元以相國左長史蕭穎胄為尚書令冠軍將軍蕭衍為雍州刺史十二月建康平皇太后令以蕭衍為大司馬錄尚書事驃騎大將軍楊州刺史封建安郡公依晉武陵王遵承制故事百僚致敬二年正月皇太后臨朝入居內殿以大司馬蕭衍為, SBCK: ''}
