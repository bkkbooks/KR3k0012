  - {type: variant, offset: 37, length: 1, content: 世, SBCK: 面合擊之尓朱兆責神武以背巳神武曰夲勠力者共輔王室今帝何在兆曰永安枉害天柱我報讎耳神武曰我昔日親聞天柱計汝在户前立豈得言不反耶且以君殺臣何報之有今日義絶矣乃合戰大敗之四月斛斯椿執天光度律以送洛陽長}
