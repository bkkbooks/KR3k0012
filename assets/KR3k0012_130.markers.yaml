  - {type: variant, offset: 114, length: 7, content: 員外侍郎直閣中, SBCK: 祖營賛焉詔下三日車駕便發户四十萬狼狽就道神武留洛陽部分事畢還晉陽自是軍國政務皆歸相府二年正月魏帝褒詔以神武爲相國假黄􅃏劒履上殿入朝不趨神武固辭四年十一月壬辰神武西討自蒲津濟衆二十萬周文軍於沙􅁐神武以地阨少却西人鼓噪而進軍大亂弃器甲十有八萬神武跨橐駞候船以歸元象元年三月辛酉神武固請解丞相魏帝許之四月庚寅神武朝于鄴壬辰還晉陽興和元年七月丁丑魏帝進神武爲相國録尚}
