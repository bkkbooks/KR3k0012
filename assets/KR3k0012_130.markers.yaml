  - {type: 'tls:seg', offset: 24, content: '', id: KR3k0012_CHANT_130-1a.5}
  - {type: variant, offset: 24, length: 2, content: 字邵, SBCK: 此賀六渾之意也榮大恱語自日中至夜半乃出自是毎參軍謀旣而榮以神武爲親信都督于時魏明帝銜鄭儼徐紇逼靈太后未敢制私使榮舉兵内向榮以神武爲前鋒至上黨明帝又私詔停之及帝􅁀崩榮遂入洛邑將簒位神武諌恐不聽請鑄像卜之鑄不成乃止孝莊帝立以定䇿勲封銅鞮}
  - {type: variant, offset: 24, length: 2, content: 字邵, WYG: 此賀六渾之意也榮大恱語自日中至夜半乃出自是毎參軍謀既而榮以神武為親信都督於時魏明帝銜鄭儼徐紇逼靈太后未敢制私使榮舉兵内向榮以神武為前鋒至上黨明帝又私詔停之及帝暴崩榮遂入洛因將簒位神武諫恐不聽請鑄像卜之鑄不成乃止孝莊帝立以定䇿勲封銅鞮}
