  - {type: variant, offset: 2840, length: 803, content: 位群臣三請乃受命建武元年十月癸亥即皇帝位大赦改元戊子立皇太子寶卷賜天下為父後者爵一級二年十月丁卯詔曰軌世去奢事殷哲后訓物以儉理鏡前書朕思所以遷淳改俗反古移民可罷東田毀興光樓并敕水衡量省御乘永太元年四月甲寅改元大赦五月以太子中庶子梁王為雍州刺史己酉崩于正福殿年四十七帝明審有吏才持法無所借大存儉約罷世祖所起新林苑以地還百姓廢文帝所起太子東田賣之永明中輿輦舟乘剔去金銀還主衣庫太官進食有裹蒸帝曰可四片破之餘充晚食世祖掖庭中宮殿服御一無所改蕭寶卷蕭子顯齊書曰東昏侯諱寶卷字智藏高宗第二子建武元年立為皇太子高宗崩太子即位永元元年正月大赦改元辛卯祀南郊詔二品清官以上應食祿者有二親或祖父母年登七十並給見錢二千貫二年八月甲申夜宮內失火十二月雍州刺史梁王起義兵於襄陽三年正月丙申合朔事畢與宮人於閱武堂元會皇后正位帝戎服臨視三月南康王寶融即皇帝位於江陵以太子左率李居士揔督西討諸軍事屯新亭九月義軍至南州輔國將軍申曹軍二萬人於姑熟奔歸丙辰李居士與義軍戰于新亭敗績十月冀青二州刺史桓和入衛屯東宮已卯以眾降光祿大夫張瓌先守石頭棄城奔還於是閉宮城自守李居士以新亭降軍築長圍守宮城十二月王珍國侍中張謏等帥兵入殿廢帝帝在東宮便好弄不喜書學及即位性重澀少言不與朝士接唯親信閹人日夜於後堂戲馬五更方臥至晡乃起漸出遊走屏逐居民從萬春門遊東宮以東至於郊外數十百里皆空家靜室巷陌懸幔為高障置仗防之謂之屏除夜出晨反火光照天拜愛姬潘氏為貴妃仍以金蓮帖地使妃行於其上曰此步步蓮花耶每出妃乘臥輿帝騎馬從後著織成袴褶金薄帽執七寶纏矟戎服急裝不變寒暑凌冒雨雪不避坑阱馳騁渴乏輒下馬解取腰邊蠡器酌水飲之復上馬馳去選無賴小兒善走者為逐馬左右百人常以自隨置射雉場二百九十六處翳中帷帳及步障皆祫緣以紅錦金銀鏤弩牙瑇瑁帖箭郊郭四民樵蘇路絕吉凶失時舉疾棄屍不得殯葬後宮遭火之後更起仙華神仙玉壽諸殿刻畫彫彩麝香塗壁錦幔珠簾窮極綺麗又信鬼神崔惠景事時蔣子文神為假黃鉞使持節, WYG: 丞}
