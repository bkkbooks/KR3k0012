  - {type: variant, offset: 38, length: 4, content: 孫也何孫, WYG: 隆彦伯斬之兆奔荆州仲逺奔梁州遂死焉時凶蠧既除朝廷慶恱既而神武至洛陽廢節閔及中興主而立孝武孝武既即位授神武大丞相天柱大將軍太師世襲定州刺史増封并前十五萬户神武辭天柱減户五萬壬辰還鄴魏帝餞於乾脯山執手而別七月壬寅神武帥師北伐爾朱兆封隆之言}
