  - {type: variant, offset: 1380, length: 1214, content: 正月辛亥藉田禮畢甲寅幸閱武堂營酒小會十一年正月皇太子長懋薨甲午立太孫昭業為皇太孫七月上不豫徙居迎昌殿始登階而屋鳴咤甚惡之戊寅大漸詔曰始終大期聖賢不免吾行年六十亦復何恨但皇業艱難萬機事重不能無遺慮耳太孫進德日茂社稷有寄子良善相毗輔思弘治道百辟庶條各奉爾職謹事大孫勿有懈怠知復何言又詔曰我識滅之後身著夏衣畫天衣純烏犀導路器服悉不得用寶物及織成常所服身刀長短二口鐵環者隨我入梓宮靈上勿以牲牢為祭祭唯設䴵茶飲乾飯酒脯而已喪禮每存省約不須煩民百官六時入臨又顯陽殿玉像諸佛及供養具如別牒可盡心禮拜供養自今公私皆不得出家為道及起立塔寺以宅為精舍並嚴斷之唯年六十必有道心者聽朝賢選序已有別詔是日崩年五十四九月丙寅葬景安陵帝剛毅有斷為治總大體以富國為先頗不喜遊宴彫綺之事言常恨之未能頓遣詔凡諸遊煩宜從休息自今遠近薦獻務存節儉珠玉玩好傷工尤重嚴加禁絕蕭昭業蕭子顯齊書曰鬱林王昭業字元尚小名法身文惠太子長子也世祖即位封南郡王文惠太子薨立為皇太孫即位追尊文惠太子為世宗文皇帝隆昌元年正月大赦改元加太傅竟陵王子良殊禮閏月丁卯以鎮軍大將軍西昌侯鸞即本號開府儀同三司七月癸巳太后令嗣主特鍾濔氣爰表弱齡自入纂鴻業長惡滋甚居喪無一日之哀衰絰為忻宴之服昏酣長夜萬機斯壅社稷危殆有過綴旒鎮軍居正體道家國是賴伊霍之舉實寄淵謨便可依舊典以禮廢黜中軍新安王體自文皇叡哲天秀宜入嗣洪業永寧四海外即以禮奉迎昭業少美容止好隸書世祖敕皇孫手書不得妄出以貴重之進對音吐甚有令譽王侯五日一問訊世祖帝獨呼昭業至幄座別加撫問呼為法身重愛甚文惠太子崩昭業每臨哭輒號咷不自勝俄爾還內歡笑極樂在世祖喪泣竟入後宮常列故伎二部入閣迎奏為南郡王時文惠太子禁其起居節其用度昭業謂豫章王妃庾氏曰阿婆佛法言有福德生帝王家今日見作天子便是大罪左右主師動見拘執不如作市邊屠沽富兒百倍矣及即位極意賞賜動百數十萬每見錢曰昔時思汝一箇不得今用汝未朞年之間所出諸庫儲錢數億垂盡開主衣庫與不逞群小又給閹人豎子各數人隨其所欲恣意輦取諸寶器以相剖擊破碎之以為笑樂好鬥雞密買雞至數千價世祖御物甘草杖宮人寸斷用之毀世祖招婉殿以封賜閹人徐龍駒為齋龍駒尤親幸為後閤舍人曰夜在宮房內昭業與文帝幸姬霍氏淫通龍駒勸長留內聲言度霍氏為尼以餘人代之皇后亦淫亂齋閤通夜洞開內外淆雜無復分別壬辰使肅鸞等率兵自尚書入雲龍門戎服加朱衣於上帝在壽昌殿聞外有變使閉內殿諸閹人登興光樓望報云見一人戎服從數百人在西鍾下須臾蕭鸞領兵先入帝走向愛姬徐氏房拔劍自刺不中以帛纏出殺之餘黨亦見誅卒時年二十二葬以王禮蕭昭文蕭子顯齊書曰海陵恭王昭文字季尚文惠太子第二子也封臨汝公鬱林王即位改封新安王及鬱林王廢尚書令西昌侯鸞奉帝纂統延興元年七月丁酉即位以尚書令鎮軍大將軍西昌侯鸞錄尚書事楊州刺史封宣城郡公十月進為太傅楊州牧如殊禮進爵為王輔政帝起居皆諮而後行思食蒸魚菜太官令以無錄公命不與辛亥皇太后令曰嗣主幼冲庶政多昧早膺尫疾弗克負荷太傅宣城公宜入承寶命式寧宗祏帝可降封海陵王, SBCK: ''}
