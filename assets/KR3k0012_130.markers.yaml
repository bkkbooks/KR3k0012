  - {type: variant, offset: 4508, length: 1, content: 遠, SBCK: 以爲戯樂貴妃薛氏甚􅀍愛寵忽憶其經與清河王岳私通命支解之弄其髀以爲琵琶歎曰佳人難再得後又以刀子劃楊愔腹崔季舒託俳優言曰老公子惡戯因掣刀子而去之又置愔於棺中載以轜車幾下釘者數焉發丁匠三十萬人營三臺於鄴構木髙二十七丈兩棟相去二百餘歩工匠危怯皆繫䋲自防帝登脊疾走無怖畏時復雅舞折旋中節傍人見者莫不寒心帝沉􅊺日甚婁太后舉杖擊之曰如此父生如此兒帝曰天子母豈不如共壻眠時即當嫁老母與胡太后大怒自此不復開顔帝免冠辭謝乃設席於地脫背就罰苦請笞脚五十因此戒酒一旬還復如􅀄又令元黄頭與諸國自金鳯臺各乗紙鴟以飛黄頭至紫陌乃墯於地凡所殺害或支解或火燒或投水蓋以萬數又誅元氏或父母爲主或身常貴盛皆斬於東市凡七百餘人悉投屍漳水剖魚者多􅀗爪甲都下爲之乆不食魚七年秋自河西揔􅁗戍築長城東至於海前後所築東西凡三千餘里率十里一戍其要害置州鎮凡二十五所八年春帝在城東馬射勑京城婦女悉赴觀不赴者罪以軍法七日乃止是年於長城内築重城自庫洛拔而東至於塢紇戍凡四百餘里先是發丁匠三十餘萬營三臺於鄴下因其舊基而髙􅀶之大起宫室及}
