  - {type: variant, offset: 23, length: 0, content: '', WYG: 南數有赤光紫氣之異隣人以為怪勸徙居以避之皇考曰安知非吉居之自若及神武生而皇妣韓氏殂養於同産姊婿鎮獄隊尉景家神武既累世北邊故習其俗遂同鮮卑長而深沈有大度輕財重士為豪俠所宗目有精光長頭高顴齒白如玉少有人傑表家貧及聘武明皇后始有馬得給鎮為隊主鎮將遼西段長常竒神武貌謂曰君有康濟之才終不徒然便以子孫為託神武自隊主轉為函使嘗乗驛過建興雲霧晝晦雷聲隨之半日乃絶若有神應者每行道路往來無風塵之色又嘗夢履衆星而行覺而内喜為函使六年毎至洛陽給令史麻祥使祥嘗以肉啗神武神武性不立食坐而進之祥以為慢已笞神武四十及自洛陽還傾産以結客親故怪問之答曰吾至洛陽宿衞羽林相率焚領軍張彞宅朝廷懼其亂而不問為政若此事可知也財物豈可常守邪自是乃有澄清天下之志與懐朔省事雲中司馬子如及秀容人劉貴中山人賈顯智為奔走之友懐朔户曹史孫騰外兵史侯景亦相友結孝昌元年歸爾朱榮先是劉貴事榮盛言神武英毅至是始得見以憔悴故未之竒也貴乃為神武更衣復求見焉因隨榮之廐廐有惡馬榮命翦之神武乃不加羈絆而翦竟不蹄齧已而起曰御惡人亦如此馬矣榮遂坐神武於床下屏左右而訪時事神武曰聞公有馬十二各色別為羣將此竟何用也榮曰但言爾意神武曰方今天子愚弱太后淫亂孽寵擅命朝政不行以明公雄武乗時奮發討鄭儼徐紇而清帝側霸業可舉鞭而}
