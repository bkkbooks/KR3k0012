  - {type: variant, offset: 4506, length: 0, content: '', SBCK: 殊禮齊王如故魏帝遣兼太尉彭城王韶奉皇帝璽綬禪位于帝戊午乃即皇帝位於南郊􅂛壇柴燎告天事畢還宫御太極前殿詔大赦天下改武定八年爲天保元年辛酉尊王太后爲皇太后辛未遣大使於四方觀察風俗問民疾苦嚴勒長吏厲以廉平興利除害務存安静六月詔吉凶車服制度各爲等差具立條式使儉而獲中又詔兾州}
  - {type: variant, offset: 4506, length: 0, content: '', WYG: 殊禮齊王如故魏帝遣兼太尉彭城王韶奉皇帝璽綬禪位於帝戊午乃即皇帝位於南郊升壇柴燎告天事畢還宫御太極前殿詔大赦天下改武定八年為天保元年辛酉尊王太后為皇太后辛未遣大使於四方觀察風俗問民疾苦嚴勒長吏厲以廉平興利除害務存安靜六月詔吉凶車服制度各為等差具立條式使儉而獲中又詔冀州}
