  - {type: variant, offset: 4485, length: 2, content: 殊禮, SBCK: 大行臺㴾海王文襄啓辭願停王爵壬寅魏帝詔太原公洋攝理軍國遣中使敦喻八月戊辰文襄啓申神武遺令請減國邑分封將督各有差辛未朝于鄴固辭丞相魏帝詔曰旣朝野攸慿安危所繫不得令遂夲懷須有權奪可復前大將軍餘如故七年五月文襄帥師赴頴川六月尅之獲西魏大將王思政等八月文襄遇盗崩􅀄梁將蘭欽子京見虜文襄以配厨欽求贖之不許京與其黨六人謀作亂時京將進食文襄却之謂人曰昨夜夢此奴殺我又曰急殺却京聞之寘刃於盤下冒言進食文襄怒曰我未索食何遽來京揮刀曰將殺汝文襄自投傷足入床下賊黨至去床遇弑時年二十九追謚文襄皇帝髙洋北齊書曰顯祖文宣皇帝諱洋字子進髙祖第二子丗宗之母弟后􅀄孕毎夜有赤光照室后私常怪之􅀄髙祖之歸尓朱榮時經危亂家徒壁立后與親姻相對共憂寒餒帝時尚未能言欻然應曰得活太后及左右大驚而不敢言鱗身重踝不好戯弄􅀷沉有大度晉陽曽有沙門乍愚乍智時人不測呼爲阿秃師帝曽與諸童共見之歴問禄位至帝舉手再三指天而巳口無所言見者異之髙祖嘗試觀諸子意識各使治亂􅁝帝獨抽刀軿之曰亂者須斬髙祖是之又各配兵四出而使甲􅀐僞攻之丗宗等怖撓帝乃勒衆與彭樂敵樂免胄言情猶擒之以獻後從丗宗行過遼陽山獨見天門開餘人無見者内雖明敏貌若不足丗宗毎嗤之云此人亦得冨貴相法亦何由可解唯髙祖異之天平二年授驃􅀐大將軍儀同三司武定元年加侍中五年授尚書令中書監京畿大都督七年八月丗宗遇害事出倉卒内外震駭帝神色不變指麾部分自􅀂臠斬群賊而􅃮其頭徐宣言曰奴反大將軍􅀍傷無大苦也當時内外莫不驚異焉乃赴晉陽親揔庶政務從寛厚事有不便者咸蠲省焉八年正月戊辰魏帝詔進帝位使持節丞相都督中外諸軍録尚書事大行臺齊郡王食邑一萬户三月辛酉又進封齊王邑十萬户自居晉陽寢室夜有光如晝旣爲王夢人以筆點巳額旦以告館客王曇哲曰吾其退乎曇哲再拜賀曰王上加􅀧成主字乃當進也夏五月辛亥帝如鄴甲寅}
