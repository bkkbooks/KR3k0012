  - {type: variant, offset: 1767, length: 1019, content: 惠太子長子也世祖即位封南郡王文惠太子薨立為皇太孫即位追尊文惠太子為世宗文皇帝隆昌元年正月大赦改元加太傅竟陵王子良殊禮閏月丁卯以鎮軍大將軍西昌侯鸞即本號開府儀同三司七月癸巳太后令嗣主特鍾濔氣爰表弱齡自入纂鴻業長惡滋甚居喪無一日之哀衰絰為忻宴之服昏酣長夜萬機斯壅社稷危殆有過綴旒鎮軍居正體道家國是賴伊霍之舉實寄淵謨便可依舊典以禮廢黜中軍新安王體自文皇叡哲天秀宜入嗣洪業永寧四海外即以禮奉迎昭業少美容止好隸書世祖敕皇孫手書不得妄出以貴重之進對音吐甚有令譽王侯五日一問訊世祖帝獨呼昭業至幄座別加撫問呼為法身重愛甚文惠太子崩昭業每臨哭輒號咷不自勝俄爾還內歡笑極樂在世祖喪泣竟入後宮常列故伎二部入閣迎奏為南郡王時文惠太子禁其起居節其用度昭業謂豫章王妃庾氏曰阿婆佛法言有福德生帝王家今日見作天子便是大罪左右主師動見拘執不如作市邊屠沽富兒百倍矣及即位極意賞賜動百數十萬每見錢曰昔時思汝一箇不得今用汝未朞年之間所出諸庫儲錢數億垂盡開主衣庫與不逞群小又給閹人豎子各數人隨其所欲恣意輦取諸寶器以相剖擊破碎之以為笑樂好鬥雞密買雞至數千價世祖御物甘草杖宮人寸斷用之毀世祖招婉殿以封賜閹人徐龍駒為齋龍駒尤親幸為後閤舍人曰夜在宮房內昭業與文帝幸姬霍氏淫通龍駒勸長留內聲言度霍氏為尼以餘人代之皇后亦淫亂齋閤通夜洞開內外淆雜無復分別壬辰使肅鸞等率兵自尚書入雲龍門戎服加朱衣於上帝在壽昌殿聞外有變使閉內殿諸閹人登興光樓望報云見一人戎服從數百人在西鍾下須臾蕭鸞領兵先入帝走向愛姬徐氏房拔劍自刺不中以帛纏出殺之餘黨亦見誅卒時年二十二葬以王禮蕭昭文蕭子顯齊書曰海陵恭王昭文字季尚文惠太子第二子也封臨汝公鬱林王即位改封新安王及鬱林王廢尚書令西昌侯鸞奉帝纂統延興元年七月丁酉即位以尚書令鎮軍大將軍西昌侯鸞錄尚書事楊州刺史封宣城郡公十月進為太傅楊州牧如殊禮進爵為王輔政帝起居皆諮而後行思食蒸魚菜太官令以無錄公命不與辛亥皇太后令曰嗣主幼冲庶政多昧早膺尫疾弗克負荷太傅宣城公宜入承寶命式寧宗祏帝可降封海陵王十一月稱王有疾數遣御師占視乃殞之時年十五謚曰恭王蕭鸞蕭子顯齊書曰高宗明皇帝諱鸞字景栖始安貞王道生子也少孤太祖撫育恩過諸子宋世為安吉令有嚴能之名遷寧朔將軍淮南宣城二郡太守太祖踐祚遷侍中封西昌侯建武元年持節冠軍將軍郢州刺史世祖即位轉度支尚書侍中領驍騎將軍王子侯舊乘纏帷車高宗獨乘下帷儀從如素士遷中領軍左衛將軍豫州刺史尚書左僕射領右衛將軍武帝遺詔為侍中尚書令加鎮軍中書監開府儀同三司海陵即位, WYG: 襄}
