  - {type: variant, offset: 2614, length: 553, content: 謚曰恭王蕭鸞蕭子顯齊書曰高宗明皇帝諱鸞字景栖始安貞王道生子也少孤太祖撫育恩過諸子宋世為安吉令有嚴能之名遷寧朔將軍淮南宣城二郡太守太祖踐祚遷侍中封西昌侯建武元年持節冠軍將軍郢州刺史世祖即位轉度支尚書侍中領驍騎將軍王子侯舊乘纏帷車高宗獨乘下帷儀從如素士遷中領軍左衛將軍豫州刺史尚書左僕射領右衛將軍武帝遺詔為侍中尚書令加鎮軍中書監開府儀同三司海陵即位為使持節都督楊南徐三州諸軍事楊州刺史鎮東城給五千人錄尚書假黃鉞中外都督加殊禮進爵為王太后令廢海陵王以上入纂大位群臣三請乃受命建武元年十月癸亥即皇帝位大赦改元戊子立皇太子寶卷賜天下為父後者爵一級二年十月丁卯詔曰軌世去奢事殷哲后訓物以儉理鏡前書朕思所以遷淳改俗反古移民可罷東田毀興光樓并敕水衡量省御乘永太元年四月甲寅改元大赦五月以太子中庶子梁王為雍州刺史己酉崩于正福殿年四十七帝明審有吏才持法無所借大存儉約罷世祖所起新林苑以地還百姓廢文帝所起太子東田賣之永明中輿輦舟乘剔去金銀還主衣庫太官進食有裹蒸帝曰可四片破之餘充晚食世祖掖庭中宮殿服御一無所改蕭寶卷蕭子顯齊書曰東昏侯諱寶卷字智藏高宗第二子建武元年立為皇太子高宗崩太子即位永元元年正月大赦改元辛卯祀南郊詔二品清官以上應食祿者有二親或祖父母年登七十並給見錢二千貫二年八月甲申夜宮內失火十二月雍州刺史梁王起義兵於襄陽三, SBCK: ''}
