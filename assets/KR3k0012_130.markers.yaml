  - {type: variant, offset: 33, length: 1, content: 何, SBCK: 州刺史劉誕嬰城固守神武起土山爲地道往往建大柱一時焚之城䧟入地永熈元年正月壬午拔鄴城據之廢帝進神武大丞相柱國大將軍太師是時青州建義大都督崔靈珍大都督耿翔皆遣使歸附行汾州事劉貴弃城來降閏三月尓朱天光自長安兆自并州度律自洛陽仲逺自東郡同㑹鄴衆號}
