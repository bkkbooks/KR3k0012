  - {type: variant, offset: 444, length: 327, content: 衣高臥以安眾心索白虎幡登西垣使寧朔將軍高道慶羽林監陳顯達員外郎王敬則浮舸與賊水戰自新林至赤岸大破之賊平振旅旋凱入百姓緣道聚觀曰全國者此公也遷散騎常侍中領軍都督二兗徐青冀五州鎮東將軍南兗州刺史進爵為公增邑二千戶與袁粲禇淵劉秉更日入直號為四貴四年加尚書左僕射威名既重蒼梧王深相猜忌幾加大禍陳太妃罵之曰蕭道成有功於國今若害之後誰復為汝著力者乃止楊玉夫等殺蒼梧王迎立順帝太祖移鎮東府進侍中司空錄尚書事封竟陵郡公進太尉十二州諸軍事自大明太始已來相承奢侈百姓成俗太祖輔政罷御省尚方諸飾玩至是又上表禁人間華偽雜物不得以金銀為薄馬乘具不得作金銀渡不得作織成繡裙衣道路不得著錦履不得用紅色為幡蓋衣服不得剪綵帛為雜花不以七寶飾樂器不得以金銀為花獸不得輒鑄金銀為像又進假黃鉞鐵, SBCK: ''}
