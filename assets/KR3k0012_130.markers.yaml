  - {type: variant, offset: 31, length: 0, content: '', krp: 舉兵赴洛召神武使長史孫騰辭以蜀汾胡欲反不可委去兆恨焉騰命神武曰兆舉兵犯上此大賊也吾不能乆事之自是始有圗兆計及兆入洛執莊帝以北神武聞之大驚又使孫騰僞賀兆因密覘孝莊所在將刧以舉義不果乃以書喻之言不冝執天子以受惡名於海内兆不納殺帝而與尓朱丗隆等立長廣王曄改元建明封神武爲平陽郡公魏普泰元年二月神武自領軍次信都髙乾封隆之開門以待遂據冀州是月尓朱度律廢元曄而立節閔帝欲羈縻神武三月乃白節閔帝封神武爲勃海王徴使入覲神武辭四月癸巳又加授東道大行臺第一鎭人酋長龐蒼鷹自太原來奔神武以爲行臺郎㝷以爲安州刺史神武自向山東飬士繕甲禁兵侵掠百姓歸心乃詐爲書云尓朱兆將以六鎮人配契胡爲部曲衆皆愁爲并州符徴兵討歩落稽發萬人將遣之孫騰尉景爲請留如此者再神武親送之郊雪涕執别人號慟哭聲動地神武乃喻之曰與尓俱失郷客義同一家不意在上乃尓徴召直向西巳當死後軍期又當死配國人又當死柰何衆曰唯有反耳神武曰反急計湏推一人爲主衆願奉神武神武曰尓郷里難制不見葛榮乎雖百萬衆無刑法終自灰滅今以吾爲主當與前異不得欺}
  - {type: variant, offset: 32, length: 0, content: '', SBCK: 兒不得犯軍令生死任吾則可不尓不能爲取􅀏天下衆皆頓顙死生唯命神武曰􅀂不得巳明日推牛饗士喻以討尓朱兆之意封隆之進曰千載一時普天幸甚神武曰討賊大順也極時大業也吾雖不武以死繼之何敢讓焉六月庚子建義於信都乃抗表罪狀尓朱氏丗隆等祕表不通八月尓朱兆攻䧟殷州李元忠來奔孫騰以爲朝廷隔絶不權立天子則衆望無所係十月壬寅奉章武王融子渤海太守㓪爲皇帝年號中興是爲廢帝十一月攻鄴}
  - {type: page-break, offset: 32, content: '', id: KR3k0012_SBCK_130-3b}
  - {type: variant, offset: 32, length: 0, content: '', WYG: 兒不得犯軍令生死任吾則可不爾不能為取笑天下衆皆頓顙死生唯命神武曰若不得已明日椎牛饗士喻以討爾朱兆之意封隆之進曰千載一時普天幸甚神武曰討賊大順也拯時大業也吾雖不武以死繼之何敢讓焉六月庚子建義於信都乃抗表罪狀爾朱氏世隆等秘表不通八月爾朱兆攻陷殷州李元忠來奔孫騰以為朝廷隔絶不權立天子則衆望無所係十月壬寅奉章武王融子渤海太守朗為皇帝年號中興是為廢帝十一月攻鄴}
