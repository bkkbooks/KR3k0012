  - {type: variant, offset: 172, length: 0, content: '', SBCK: 僖中曰晉侯圍原命三日之粮原不降命去之諜出曰原將降矣軍吏曰請待之公曰信國之寳也民之所庇也得原失信何以庇民所亡滋多退一舎而原降吕氏春秋云七日期原不下去之也明年復伐與土期必得而反原聞之乃下衛人曰}
  - {type: variant, offset: 172, length: 0, content: '', WYG: 僖中曰晉侯圍原命三日之粮不降命去之諜出曰原将降矣軍吏曰請待之公曰信國之寶也民之所庇也得原失信何以庇民所亡滋多退一舍原降吕氏春秋云七日期原不下去之也明年復伐與士期必得而反原聞之乃下衛人曰}
  - {type: variant, offset: 172, length: 0, content: '', krp: 僖中曰晉侯圍原命三日之粮原不降命去之諜出曰原將降矣軍吏曰請待之公曰信國之寳也民之所庇也得原失信何以庇民所亡滋多退一舎而原降吕氏春秋云七日期原不下去之也明年復伐與土期必得而反原聞之乃下衛人曰}
