  - {type: variant, offset: 12, length: 16, content: 無偏無黨王道蕩蕩無黨無偏王道平平, SBCK: 信申也相申束使不相違也易中孚卦曰信及豚魚豚魚喻卜民也又乾文言曰君子忠信所以進德也韓詩外傳曰受命之主正其衣冠而立儼然人望而信之其次聞言而信次見其行而信旣聞其言旣見其行衆皆不信民之下也又曰孟子少時東家甞殺猪孟子問其母曰東家猪何爲其母曰欲啖汝母悔失言曰吾懷是子席不正不坐割不正不食胎敎之也今適有知而欺之是敎之不信乃買東家猪肉以食之明不欺也}
