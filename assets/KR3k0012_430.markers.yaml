  - {type: variant, offset: 1298, length: 2, content: 舉正, SBCK: 與啇丘開俱乗髙臺於衆中澷言曰有能自投下者賞百金衆皆競應啇丘開以爲信然遂并投之形􅀂飛鳥楊於地巳骨無傷因復指河曲之隈曰波中有寳珠泳可得也啇丘開復從而泳之水底潜行曰泳旣出果􅀗珠焉衆始同疑俄而范氏之藏失火子華曰􅀂能入火取錦者從所得多少賞焉啇丘開徃無難色入火徃還埃不漫身不燋范氏之徒乃}
