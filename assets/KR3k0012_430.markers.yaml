  - {type: variant, offset: 2142, length: 161, content: 宋書曰張邵有佐命功元嘉五年為征虜將軍領寧蠻校尉初王華與邵不和及華參要親舊為之危心邵曰子陵方弘至公豈以私隙害正義是任也華實舉之唐書曰房玄齡為尚書左僕射既任總百司虔恭夙夜盡心竭節不欲一物失所聞人之善若己有之明達吏事而緣飾以文雅審定法令意在寬平不以求備取人不以己長格物隨能收敘無隔卑賤論者稱為良相焉又曰張文瓘為大理卿旬日決遣疑事, SBCK: 御覽卷第}
