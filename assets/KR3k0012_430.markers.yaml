  - {type: variant, offset: 1752, length: 254, content: 子明嘗以部曲事為江夏太守蔡遺所白蒙無恨意及豫章太守顧邵卒權問所用蒙因薦遺奉職佳吏權笑曰君欲為祁奚耶於是用之甘寧麤暴好殺既嘗失蒙意又時達權令權怒之蒙輒陳請曰天下未定鬭將如寧者難得宜容忍之權遂原寧卒得其用徐廣晉紀曰劉弘字和季在襄陽帝在西京命弘選良才乃稱守宰徵士武陵五朝字世朗高尚荊王牙門將魯國皮初有勳江漢弘上言朝為零陵太守初為襄陽內史詔以襄陽顯郡初資名未允以弘壻前東平太守夏侯陟為襄陽弘曰夫總天下者當與天下同心治一國者當與一國推實吾總荊州十郡安得十女壻然後為治乃表陟婚親舊制不得相臨燕書曰梁琛使秦琛從兄弈先在秦為, SBCK: 文髙爲}
