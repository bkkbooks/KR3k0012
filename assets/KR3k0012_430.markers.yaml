  - {type: variant, offset: 2009, length: 5, content: 會罷秦主欲, SBCK: 毎當直事常晨駐馬待漏雖在閑署冠劔不解於身毎齊祠恐失時乃張燈俯伏又曰隂識爲執金吾居位數十年與賔客語不及國家其重愼如此又曰蔡倫字敬仲爲中常侍有才學盡忠重愼毎至休下輙閉門絶賔客曝體田野又曰樊宏字靡卿拜光禄大夫位特進宏爲人謙愼毎當朝㑹先到俯伏待事時至乃起上聞之勑騶臨朝乃告勿}
