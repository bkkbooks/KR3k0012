  - {type: variant, offset: 1305, length: 2, content: 荀彧, SBCK: 吾不知子之有道而紿子吾不知子之有神而辱子敢問其道啇丘開曰吾亡道雖吾之心亦不知其所以然有一於此試與子言之􅇮子二客之􅀫吾舎也聞譽范氏子之􅀔能使存者亡亡者存冨者貧貧者冨吾誠之無二心故逺而來及來以子黨之言皆實也唯恐誠之不至行之不及不知形體之所措利害之所著也心一而巳物無迕者如斯巳矣今昉知子黨之紿我我内藏猜慮外矜觀聽追無昔日之不燋溺也坦然内􅀬愓然震悸矣水火豈復可近哉自此之後范氏門徒路遇乞兒馬醫弗敢辱也必下車而揖之宰我聞之以告仲尼仲尼曰汝不知乎夫至信也動天地感􅀑神撗六合而無逆豈但履危嶮入火水而已哉孫卿子曰君者治之源也源清則流長}
  - {type: page-break, offset: 1305, content: '', id: KR3k0012_SBCK_430-5a}
