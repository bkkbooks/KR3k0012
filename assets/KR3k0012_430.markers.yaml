  - {type: variant, offset: 1337, length: 0, content: '', WYG: 疾風故失信遂犯風徃戰國䇿同又曰齊索讒鼎於魯以其偽徃齊曰使樂正子来将聴魯君謂樂正子樂正子曰君胡不以真徃曰我愛之答曰臣亦愛臣之信又曰吴子示其妻以組曰子為我織組合如是組妻織組異善吴起曰非詔也使衣之而歸妻徃請之起曰家無虛言吕氏春秋曰吴起治西河欲諭其信於民乃置表於南門之外令於邑中曰有能僨此表者仕長大夫民相謂曰此必不信有一人曰試徃僨表還来謁之吴起見而仕大夫又復立表令於邑中如前邑人守門争表又曰晉文公伐原示信明年復伐之與士期必得原然後返原人聞之乃下衛人聞之以信為至矣乃歸晉故曰攻原得衞者此之謂也始文公非不欲原也不信得之不若勿得必誠以得之歸之者非獨衞也文公可謂知本矣又曰人主必信信之為政大矣信立則虛言可以賞矣虛言可以賞則六合之内皆為己府天行不信不能成嵗地安不信草木不大春風不信其華不盛夏暑不信其土不肥秋雨不信其榖不堅冬寒不信其地不閉天地之大四時之化而猶不能以不信成物也又况乎人事君不信則百姓誹謗社稷不寜處官不信則少不畏長貴賤相輕賞罰不信則民易犯法不可使令交友不信則離散欝怨不能相親百工不信則器械苦偽丹漆不真夫可與為始可與為終可與尊通可與卑窮者其唯信乎信而又信重襲於身乃通於天以此君人則膏雨甘露降寒暑四時當矣又曰齊桓公伐魯魯人不敢戰去魯國五十里而封之魯請比闗内侯以聴桓公許之曹劌謂荘公請從於是明日将盟荘公與劌皆懐劒至於壇上曰魯國去境數百里今去境五十里亦無生矣均其死也戮於君前管仲鮑叔進曹劌案劒當兩陛之間曰君將改圖毋或進者莊公曰封於汶陽可不則請死管仲曰以地衛君非以君衛地君其許之乃遂封汶南與之盟歸而欲勿予管仲曰不可人将刼君而不知不可謂智臨難而不能勿聽不可謂勇許之而不予不可謂信不智不勇不信有此三者不可以立功名予之雖亡地亦得信也以四百里之地見信於天下君猶得也荘公仇也曹劌賊也信於仇賊又况於非仇賊者乎夫九合而從之一匡而聽之乃從此生矣賈誼書曰禹與士民同務故不自言其信諭矣淮南子曰管子以小辱成大榮蘇秦以百誕成一信又曰胡人彈骨胡人盟約置酒人頭骨中飲以相誼越人齧臂中國唼盟所由各異其於信一也說苑曰魏太子謂經侯曰主信臣忠此魏國之寶也列女傳曰魯之母師者九子之寡母也臘日祀畢悉召諸子謂曰婦人之義非有大故不出夫家然吾父母家多㓜稚嵗時禮不理吾從汝謁徃監之謁請也監視也諸子皆稽首唯諾又召諸婦曰婦人有三從之義無專制之行少繫於父母長繫於夫老繫於子今諸子許我視私家願與少子俱以備婦人出入之制諸婦其慎房户之守吾夕而反於是使少子僕歸辦事天隂還失早至閭外而止待夕而入魯大夫從臺上見而恠之召而問之曰母從北来至閭外而止良乆乃入吾不知其故是以召母也對曰妾不幸早失夫獨與九子處臘日從諸子謁歸視私家與諸婦孺子期夕而反妾恐其酺醵醉飽酺醵合聚飲酒也人情所有也妾反失早故止閭外盡期而入大夫美之言於穆公穆公賜母尊號曰母師使朝謁夫人夫人諸姬皆師之會稽典録曰卓恕字公行上虞人恕為人篤信言不宿諾與人期約雖遭暴風疾雨雷電氷雪無不必至嘗從建業還家辭太𫝊諸葛恪恪問何當復来恕對曰}
