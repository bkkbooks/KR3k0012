  - {type: variant, offset: 1588, length: 163, content: 諸葛亮為人公直表廢立徙汶山立聞亮卒泣曰吾其左袵矣又李嚴傳曰亮表廢平徙梓潼平聞亮卒乃發病死習鑿齒曰夫水至平而邪者取法鏡至公而醜者怒水鏡之所以能窮物而不怨者以其無私也水鏡無私猶以免謗況大人君子懷樂生之心流矜恕之德爵之而非私誅之而非怒天下豈有不服也哉故蜀志評曰諸葛亮之為國開誠心布公道其盡忠益時者雖讎必賞犯法怠慢者雖親必罰吳志曰呂蒙, SBCK: 樊楚}
