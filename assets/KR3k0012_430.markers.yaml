  - {type: 'tls:seg', offset: 179, content: '', id: KR3k0012_CHANT_430-3a.7}
  - {type: variant, offset: 181, length: 0, content: '', SBCK: 虎盟諸侯于王庭要言曰皆奬王室無相害也君子謂是盟也信公羊傳曰莊公㑹齊侯盟于柯莊公將㑹曹子進曰君之意何如莊公曰寡人之生則不􅀂死自傷與齊侯讎不能復也曹子曰然則君請當其君臣請當其臣莊公曰諾於是㑹莊公升壇曹子手劔而從之管子進曰君何求曹子曰城壞􅎹境齊數取魯邑以渝信君不圖歟君爲齊桓公也不當許侵魯地太甚願請汶陽之田管仲顧曰君許諾桓公曰諾曹子請盟巳曹子摽劔而去之要盟可犯而桓公不欺曹氏可讎而桓公不怨桓公之信著乎天下自柯之盟始也又僖公曰晉獻公死奚齊立里克謂荀息曰君殺正廢長而立㓜如之何願與子慮之荀息曰君甞訊臣問臣對曰}
