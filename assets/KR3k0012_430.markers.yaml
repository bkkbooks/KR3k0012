  - {type: variant, offset: 1345, length: 0, content: '', SBCK: 魏明帝自征蜀幸長安遣宣帝督張郃諸軍勁卒三十餘萬潜軍宻向劔閣亮有戰士十萬十二更下在者八萬時魏軍始陳番兵適交亮叅佐咸以敵衆強多非力所制冝權停下兵以并聲􅀔亮曰吾聞用武行師以大信爲夲得原失信古人所惜去者束裝以待期妻子鶴望以計日皆勑速遣於是去者感恱願留一戰住者憤勇咸思致命臨戰之日莫不抜刄爭先以一當十殺張郃却宣帝一戰大尅此之由也王符論曰夫十歩之間必有茂草十室之邑必有忠信謹愼易頥卦曰君子以愼言語節飲食尚書堯典曰愼徽五典五典克從毛詩蕩抑曰敬愼威儀惟民之則周禮地}
