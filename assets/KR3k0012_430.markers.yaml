  - {type: variant, offset: 1289, length: 4, content: 刺史案事, SBCK: 名士以信義爲先終不欺䇿明日大㑹諸將豫設酒食立竿視影日中而慈果至晉陽秋曰陸抗羊祜推信礼之好抗甞遺祜酒祜飲之不疑抗有疾祜饋之藥抗亦推心服之唐書曰蕭至忠年少時與友人期於路隅㑹風雪凍冽諸人皆奔避就宇下至忠曰寧有與人期而求安失信乎獨不去衆咸歎服鬻子曰上下相親謂之和不永而得謂之信子思曰同言而信信在言前同令而化化在令外聖人在上民遷如化列子曰子華有寵於晉不仕而居三卿之右禾生子伯范氏之上客也出行坰外􅀫於田􅅱商丘開之舎中夜禾生子伯二人相與言子華之名􅀔能使存}
