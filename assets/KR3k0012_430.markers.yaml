  - {type: variant, offset: 1337, length: 0, content: '', SBCK: 疾風故失信遂犯風而徃戰國䇿同又曰齊索讒鼎於魯以其僞徃齊曰使樂正子來將聽魯君謂樂正子樂正子曰君胡不以眞徃曰我愛之荅曰臣亦愛臣之信又曰呉起示其妻以組曰子爲我織組合如是組妻織組異善呉起曰非詔也使衣之而歸妻徃請之起曰家無虚言吕氏春秋曰呉起治西河欲諭其信於民乃置表於南門之外令於邑中曰有能僨此表者仕長大夫民相謂曰此必不信有一人曰試徃僨表還來謁之呉起見而仕大夫又復立表令於邑中如前邑人守門争表又曰晉文公伐原示信明年復伐之與士期必得原然後返原人聞之乃下衛人聞之以信爲至矣乃歸晉故曰攻原得衛者此之謂也始文公非不欲原也不信得之不􅀂勿得必誠以得之歸之者非獨衛也文公可謂知求矣又曰人主必信信之爲政大矣信立則虚言可以賞矣虚言可以賞則六合之内皆爲巳府天行不信不能成歳地安不信草木不大春風不信其華不盛夏暑不信其土不肥秋雨不信其􅂖不堅冬寒不信其地不閇天地之大四時之化而猶不能以不信成物也又况乎人事君不信則百姓誹謗社禝不寧處官不信則少不畏長貴賤相輕賞罰不信則民易犯法不可使令交友不信則離散鬱怨不能相親百工不信則器械苦僞丹􅃮不眞夫可與爲始可與爲終可與尊通可與卑窮者其唯信乎信而又信重襲於身乃通於天以此君人則膏雨甘露降寒暑四時當矣又曰齊桓公伐魯魯人不敢戰去魯國五十里而封之魯請比􅀜内侯以聽桓公許之曹劌謂莊公請從於是明日將盟莊公與劌皆懷劔至於壇上曰魯國去境數百今去境五十亦無生矣均其死也戮於君前管仲鮑叔進曹劌案劔當兩陛下間曰君將改圗母或進者荘公曰封於汶則可不則請死管仲曰以地衛君非以君衛地君其許之乃遂封汶南與之盟歸而欲勿予管仲曰不可人將刼君而不知不可謂智臨難而不能勿聽不可謂勇許之而不予不可謂信不智不勇不信有此三者不可以立功名子之雖亡地亦得信也以四百里之地見信於天下君猶得也莊公仇也曹劌賊也信於仇賊又况於非仇賊者乎夫九合而之合一匡而之聽乃從此生矣賈􅁩書曰禹與士民同務故不自言其信諭矣淮南子曰管子以小辱成大榮􅂫􅁗以百誕成一信又曰胡人彈骨胡人盟約置酒人頭骨中飲以相􅁩越人齧臂中國唼盟所由各異其於信一也􅀃苑曰魏太子謂經侯曰主信臣忠此魏國之寶也列女傳曰魯之母師者九子之寡母也臘日祀畢悉召諸子謂曰婦人之義非有大故不出夫家然吾父母家多㓜稚歳時禮不理吾從汝謁徃􅁥之謁請也􅁥視也諸子皆稽首唯諾又召請婦曰婦人有三從之義無專制之行少繋於父母長繫於夫老繋於子今諸子許我視私家願與少子俱以備婦人出入之制諸婦其愼房户之守吾夕而反於是使少子僕歸辦家事天隂還失早至閭外而止待夕而入魯大夫從臺上見而恠之召而問之曰母從北來至閭外而止良乆乃入吾不知其故是以召母也對曰妾不幸早失夫獨與九子處臘日從諸子謁歸視私家與諸婦孺子期夕而反妾恐其酺醵醉飽酺醵合聚飲酒也人情所有也妾反失早故止閭外盡期而入大夫美之言於穆公穆公賜母尊號曰母師使朝謁夫人夫人諸􅁎皆師之㑹稽典録曰卓恕字公行上虞人恕爲人篤信言不􅀫諾與人期約雖遭􅁀風疾雨雷電冰雪無不必至甞從建業還家辝太傅諸􅁑恪恪問何當復來恕對曰}
