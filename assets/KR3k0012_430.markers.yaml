  - {type: variant, offset: 2391, length: 2231, content: 餘載銓敘人倫稱為允當然而抑文雅進黠吏觀時任數頗為時論所譏尸子曰自井中窺星所見不過數星自丘上望之則見其始出也夫私心井中公正丘上也慎子曰有權衡者不可欺以輕重有尺寸者不可差以長短有法度者不可巧以詐偽又曰夫投鉤分財投策分馬非以鉤策為均也使得美者不知所以德得惡者不知所以怨故耆龜所以立公識也權衡所以立公正也書契所以立公信也度量所以立公審也法制禮籍所以立公義也凡立公所以棄私也國語曰趙宣子言韓獻子於靈公以為司馬宣子趙孟獻子韓厥河曲之役趙孟使人以其乘車奸行獻子執而戮之眾咸曰韓厥必不役矣其主朝登之而夕戮其車車車僕也宣子召禮之告諸大夫曰可賀我矣吾舉厥而忠吾乃今知免於罪矣家語曰澹臺滅明公正無私韓詩外傳曰直者順道而行順理而言公平無私不為安肆志不為危易行又曰楚有白公之難有壯之善者辭其母將死君難其母曰棄母死君何乎壯之善曰聞事君者內其祿而外其身今之所養母者君之祿也請往死之比至朝三廢車中其僕曰子懼如是何不返也壯之善曰懼吾私也死吾公也吾聞君子不以私害公遂往死之韓子曰古之全大體者則天地觀江海不以智累心不以私累己寄治亂於法術託是非於賞罰屬輕重於權衡不逆天理不傷情性不引繩之外不推繩之內不急法之外不緩法之內守成理因自然禍福主乎道法而不出乎愛惡榮辱之責在己而不在乎人故名成於前德垂於後治之至也又曰解狐與荊伯柳為怨趙簡主問於解狐曰孰可以為上黨守對曰荊伯柳可趙簡主曰非子之讎乎對曰臣聞忠臣舉賢不避仇讎其廢也不阿親近簡主曰善遂以荊伯柳為守韓詩外傳曰魏文侯問解狐曰寡人將立西河之守誰可用解狐舉其讎荊伯柳文侯乃用又曰為人臣者北面委質有口不以私言有目不以私視又曰解狐薦其讎以為相其讎往拜謝解狐引弓迎而射之呂氏春秋曰堯有子十人不予其子而授舜舜有子九人不予其子而授禹至公也周語曰舜有商均此曰九子不知出何書墨者鉅子腹𪏆居秦鉅姓子男子通稱𪏆續大車啍啍之啍也其子殺人秦惠王曰先生之年長矣非有他子寡人已令吏弗誅對曰墨者之法殺人者死傷人者刑此所以禁殺傷天下義也王雖為之賜賜受而令吏弗誅腹𪏆不可不行墨者之法遂殺之子人之所私也忍所以行大義鉅子可謂公矣又曰晉平公問祁黃羊曰南陽無令其誰可乃舉其讎解狐又問國無尉其誰可乃舉其子午孔子聞之曰祁黃羊可謂至公也又曰天無私覆地無私載日月無私燭四時無私為又曰昔先聖王之治天下必先公公正也公則天下乎矣其得之必以公其失之必以偏偏私下正又曰荊人有遺弓者弗肯索曰荊人遺之荊人得之又何求焉孔子聞之曰去其荊而可矣老聃聞之曰去其人而可矣故老聃則至公得矣又曰天下非一人之天下也天下之天下也書云皇天無親惟德是輔故天下之天下陰陽之和不私長一類甘露時雨不私長一物私猶異也萬民之主不阿一人又曰夏不衣裘非愛裘也煖有餘也冬不用翣翣扇也非愛翣也清有餘也清寒聖人不為私非愛費也節乎己也說苑曰人臣之公治官事則不營私處公門則不言貨當公法則不阿親奉公舉則不避仇讎忠於事君謂之公又曰楚令尹虞丘子言於莊王曰臣聞奉公行法可以得榮能淺行薄無望上位臣為令尹十年國不加治竊選俊士孫叔敖秀才多能其性無欲君舉而授之政則國可寧莊王從之賜虞丘子田三百號曰國老以孫叔敖為令尹少焉而虞丘子之家干法孫叔敖執而戮之虞丘子喜入見於王言孫叔敖果可使持政奉國法而不黨施刑戮而不亂可謂公平莊王曰夫子之賜也又曰楚令尹子文之族有奸法者廷理拘之聞其令尹族也釋之子文召廷理而責之曰今立廷理者將以伺犯王令察觸國法者也於犯法甚明而使廷理緣吾私心釋之是吾不公之心明著於國執一國之柄而以私聞吾生無義吾不若死遂致其族人於廷理曰不是刑也吾將死廷理懼遂刑其族人又曰晉文侯問於咎犯誰可使為西河守者對曰盧子羔可曰子羔非汝之仇歟曰君問可為守者非問臣之仇也子羔見咎犯謝之曰君幸赦臣之過薦於君得為西河守咎犯曰薦子者公也吾不以私事害公義子其去矣顧吾射之矣周生列子曰天下所以平者政平也政所以平者心平也心所以平者衡平也衡所以平者銖兩平也銖兩所以平者毫釐平也無所不均也無所不平也謂之太平夫天之於物無所偏阿君之散恩無所外內任子曰以義事主不私其己以仁接人不謀其欲火佚焚家家不罪火食過傷人人不罪食以其積之於仁義無私害也伊尹放太甲太甲無怨心管仲黜伯氏伯氏無怨言以其積之於公正無私惡也抱朴子曰君人者必脩諸己以先四海去偏黨以平王道遣私情以標至公魏武令曰今壽春漢中長安先欲使一兒各往督領之欲擇慈孝不違吾令亦未知用誰也兒雖小時見愛而長大能善必用之吾非有二言也不但不私臣吏兒子亦不欲有所私諸葛亮書曰吾心如秤不能為人作輕重應享與州將牋曰夫公正治化之本德教之基公則無私正則無邪無邪無私而患政教不行未之有也昔叔向論叔魚之罪石碏討石厚之亂祁奚稱解狐之賢臧紇思孟孫之愛春秋嘉之敦崇世教經乎百王厝乎盛衰其義不傾公正之德弘矣重矣明君之所以總天下賢臣之所以奉上民庶之所以繫仰德化之所以美盛公正之可不勉哉曹羲至公論曰夫世人所謂掩惡揚善者君子之大義保明同好朋友之至交斯旨之作蓋閭閻之白談所以救愛憎之相謗崇居厚之大分耳篤正之至理折中之公議也世士不料其數而係其故善惡不分以覆過為弘朋友忽義以雷同為美善惡不分亂實由之朋友雷同敗必從焉談論以當實為清不以過難為貴相知者以等分為交不以雷同為固是以達者存其義不察於文識其心不求於言嵇康釋私論曰不知冒陰之可以無景而患景之不匿不知無情之可以無患而恨情之不巧豈不哀哉未有抱偽而身立清世藏情而信著明君者也是以君子既有其質又覩其鑒貴夫亮達希而存之惡夫矜恡棄而遠之言無茍諱而行不茍隱不也愛之而茍善不以惡之而茍非心無所矜而情無所擊體清神立而是非允當忠感明天子而信篤乎萬民寄胸懷於八荒垂坦蕩於永日斯非賢人君子高行之美者乎, SBCK: ''}
