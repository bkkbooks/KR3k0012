  - {type: variant, offset: 2033, length: 0, content: '', SBCK: 長史俱見臨辭出上曰爲官長當愼當勤當清脩此三者何患不治乎上問臣曰必不得巳於斯三者何先吾對曰愼乃爲先夫清者不必愼愼必自淸上曰卿言得之矣晉書曰羊祜多所進逹而人不知所由或謂祜愼宻太過者枯曰是何言歟夫入則造􅂰出則詭辭君臣不宻之誡吾惟懼其不及不能舉賢取異豈得不愧知人之難哉且拜爵公朝謝恩私門吾所不取晉起居注曰太康四年制曰選曹銓管人才冝得恪謹寡欲栁華崇夲尚書朱整周愼敬讓以自居是其人也後魏書曰􅁃岳代人也置相州即拜岳爲刺史公廉平當百姓稱之鄴舊有園池時菓􅀄熟丞吏送之岳不受曰菓未進御吾何得先食其謹愼如此北齊書曰封隆之字祖􅒨渤海脩人也性寛和有度量義旗始建首叅經略竒謀妙䇿宻以啓聞上書削藁罕聞於外髙祖嘉其忠謹毎多從之隋書曰髙頴字昭􅀇渤海蓨人也少明敏尤善詞令所出竒䇿宻謀及損益時政皆丗無知者又曰李德林字公輔􅀶陵平安人也從入官巳後典機務甚宻慎常云古不言温樹何足稱也唐書曰温彦􅀶自掌知機務即杜絶賔客}
  - {type: page-break, offset: 2033, content: '', id: KR3k0012_SBCK_430-10b}
  - {type: variant, offset: 2033, length: 0, content: '', WYG: 長史俱見臨辭出上曰為官長當慎當勤當清修此三者何患不治乎上問臣曰必不得已於斯三者何先吾對曰慎乃為先夫清者不必慎慎者自清上曰卿言得之矣晉書曰羊祜多所進逹而人不知所由或謂祜慎宻太過者祜曰是何言與夫入則造膝出則詭辭君臣不宻之誡吾惟懼其不及不能舉賢取異豈得不愧知人之難哉且拜爵公朝謝恩私門吾所不取晉起居注曰太康四年制曰選曹銓簡人才宜得恪謹寡欲抑華崇本尚書朱整周慎敬讓以自居是其人也後魏書曰庾岳代人也置相州即拜岳為刺史公亷平當百姓稱之鄴舊有園池時菓初熟丞吏送之岳不受曰菓未進御吾何得先食其謹慎如此北齊書曰封隆之字祖裔渤海脩人也性寛和有度量義旗始建首叅經畧竒謀妙䇿宻以啓聞上書削槀罕聞於外髙祖嘉其忠謹毎多從之隋書曰髙熲字昭元渤海脩人也少明敏尤善詞令所出竒䇿宻謀及損益時政世皆無知之者又曰李徳林字公輔博陵平安人也從入官已後典機務甚宻慎常云古不言温樹何足稱也唐書曰温彦博自掌知機務即杜絶賔客}
