  - {type: variant, offset: 3445, length: 7, content: 雖廉者弗釋琬琰, SBCK: 記曰石虎正㑹御食遊槃兩重皆金銀叅帶百二十醆彫飾並同其叅帶之間茱茰盡微如破髮近㸔乃得見動遊槃則圎轉也又曰石虎皇后浴室中􅀟長生樹又安玉槃受十斛於二樹之間交州雜事曰太康四年刺史陶璜表送林邑王范熊所獻縹紺水精槃各一枚述征記曰逍遥宫門裏有銅浴槃面徑丈二尺魏景􅀄中所鑄妬記曰武歷陽女嫁阮宣子無道妬忌禁婢甌覆槃蓋不得相合神仙傳曰沈義爲人所迎見老君以金案玉槃賜之俗􅀃曰桓􅀇寵丁牛期食畢便廻槃與之母丘儉承露槃賦曰偉神槃之殊異邈迢逓以秀峙古樂府曰琉璃琥珀象牙槃張衡四愁詩曰}
