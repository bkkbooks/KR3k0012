  - {type: variant, offset: 3376, length: 0, content: '', SBCK: 古者抱缾而汲唐子曰猛將之發觀于虎而覽于鷹故攻如擊電避如收霧閇之如在缾開之如散星西域記曰踈勒王致魏文帝金胡缾二枚銀胡缾二枚􅄂五行書曰懸缾井中除邪􅀑楚辭曰缾甌登於}
  - {type: page-break, offset: 3376, content: '', id: KR3k0012_SBCK_758-5b}
  - {type: variant, offset: 3376, length: 0, content: '', krp: 古者抱缾而汲唐子曰猛將之發觀于虎而覽于鷹故攻如擊電避如收霧閇之如在缾開之如散星西域記曰踈勒王致魏文帝金胡缾二枚銀胡缾二枚雜五行書曰懸缾井中除邪鬼楚辭曰缾甌登於}
  - {type: variant, offset: 3377, length: 4, content: 鏡可鑑形, SBCK: 堂缾甌瓦器也周鼎濳乎深泉古樂府詞曰淮南王自言尊百尺髙樓與天連後園鑿井銀作牀金缾素綆汲寒漿甒方言曰甒瓮甖也禮曰君尊瓦甒此以小爲貴也瓦甒五斗儀禮曰東方之饌兩瓦甒三禮圖曰醴甒以瓦爲之受五斗口髙二寸徑一尺六寸中身瓮下平有蓋魁易洞林曰太子洗馬荀子􅂹家中以龍銅魁作食歘鳴東宫舊事曰一升銅魁一􅃮二升魁三􅃮注醤五升魁二李尤羮魁銘曰羊羮不徧駟馬長驅槃􅀃文曰槃承槃也椃音竒盤也周禮曰􅀂合諸侯則共珠槃玉敦合諸侯者必割牛耳取其血歃之以盟珠槃以盛牛耳大戴禮曰隨武子槃之銘曰與其溺於人也寕溺於淵禮曰湯之槃銘曰苟日新日日新又日新左傳曰晉文公及曹僖􅀒羈之妻曰吾觀晉公子之從者皆足以相國􅀂以相國公子必反其國反其國必得志於諸侯得志於諸侯而誅無禮曹其首也子盍蚤音早與早同自貳焉乃饋槃飱寘璧焉又曰莒人伐我東鄙圍台季武子救台遂入鄆取其鍾以爲公槃史記曰平原君與楚王合從音蹤言利害毛遂謂楚王之左右曰取鷄狗馬之血來毛遂捧銅槃血跪進曰當啑血盟而定之又曰武帝作栢梁銅柱承露槃仙人掌蘇林曰仙人以手掌檠槃承甘露也後漢書曰左慈有術於銅槃鈞鯔魚漢官儀曰封禪壇南有玉槃槃中有玉􅀛焉晉陽秋曰武帝時御府令蕭譚承徐循儀䟽作􅃮畫銀槃詔殺之晉四王起事曰惠帝還洛陽道中有老公}
