  - {type: variant, offset: 3436, length: 2, content: 琬琰, SBCK: 窺面於槃水則圎於杯水則脩面形不變其故有所圓脩者皆所自窺之異也抱朴子曰以丹金爲槃盌食其中令人長生郭子曰王光禄曰正得殘槃冷炙脩復山陵故事曰武帝悼后玄宫􅃮烏瓦槃一枚東宫舊事曰長槃五􅃮尺槃三十􅃮柏炙拌二拌音與槃同漢武内傳曰西王母以玉槃盛桃神異經曰西北荒有金山上有金銀槃廣五十丈搜神記曰髙辛氏有老婦人得耳疾醫爲挑治得􅆑大如蠒盛以瓠離覆之以槃俄而􅆑化犬因名槃瓠王子年拾遺録曰董偃以玉精爲槃承冰而進則冰玉等色侍者謂冰無柈必融濕席上乃拂}
  - {type: page-break, offset: 3436, content: '', id: KR3k0012_SBCK_758-7b}
