  - {type: variant, offset: 1054, length: 139, content: 薪火為省黃門郎賈彝於世祖前面質預曰釜之尖下以備沃洗今若平底無以去水預亦不能折之前秦錄曰處士張忠隱于太山鑿石為釜容六斗四升河圖曰漢高祖觀汶水見一黃釜驚卻反化為一翁責言曰劉季何不受河圖莊子曰曾子再仕而心再化曰吾及親仕三釜而心樂仕三十鍾不洎親吾心悲韓子曰智伯圍襄子於晉陽決晉水以灌之城, SBCK: 其}
