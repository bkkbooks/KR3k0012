  - {type: variant, offset: 2534, length: 365, content: 命執之弗得滋怒自投于床廢廢墮也于鑪炭爛遂卒魏略曰孫權上書稱臣稱說天命太祖以權書示外曰是兒欲路吾著爐炭上耶崔豹古今注曰漢成帝顧成廟有二真金爐拾遺錄曰周靈王出於宣昭之臺望東方雲氣蓊鬱俄而有二人乘飛遊之輦上帝酣其一人能為霜雪坐者皆禁乃命青金洪鑪青金洪者出青零淵石色皆如紺中有金鑄為大鑪異苑曰龐猗義熙中為宜都太守御人牧馬於野見一銅鑪上焰帶鏁而行持歸以呈猗遂檻盛送下荊州至郡北界夜忽風雨有叫聲光火燭天徑來趨舡失鑪所在鹽鐵論曰歐冶能因國君之銅鐵以為金鑪大鍾而自不能為壺鼎盤盂無其用也桓譚新論曰元帝求方士漢中送人王仲都大暑日使暴坐又環以十鑪不言熱論衡曰當風鼓箑向日燃爐而天終不為冬夏易氣又曰推無益之能納無補之說似以夏進鑪以冬奏扇賈誼鵬鳥賦曰且夫天地為鑪兮造化為工陰陽為炭兮萬物為銅甑說文曰窐戶圭切甑空也古史考曰黃帝始作甑方言曰甑自關而東謂之獻魚, SBCK: 建音}
