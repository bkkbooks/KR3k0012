  - {type: variant, offset: 384, length: 205, content: 為貨南越志曰龍川縣營崗北有巨鑊恒有懸泉注之終歲不滿嘗有採薪者欲推動之忽然震電迷失路十許日乃至家湘州記曰伍子胥廟中有大銅器元嘉中沙門釋亮啟乞此廟器鑄丈六金像始廟所有大銅鑊可容三百斛許即陷入地中僧亮夢神語云今捨此器相與發願免此神形殷斌當山記曰魏興反照山上有三公鐵鑊常有數十斛雖大旱而不減長老云有天子女欲來此山愁思而死三公衛送故於此烹之羅浮山記曰有名鑊容千餘斛溢為瀑布墨子守死曰二十五步一竈竈有鐵鑊容二石以上為湯釜說, SBCK: 酌酃甕􅀃}
