  - {type: variant, offset: 846, length: 5, content: 鄧遵破匈奴, SBCK: 畢卓爲吏部郞性􅄝酒比舎郞酒熟卓因醉夜至其甕間盗飲之爲掌酒者所􅅞旦視之乃畢吏部也墨子曰備城百歩一井井十甕莊子曰子貢過漢隂見一丈夫方將爲圃畦鑿隧而入井抱甕而出灌志恠曰建康小史曹著爲廬山府君所迎見門有一丈甕可受數百斛但見風雲岀其中鍾離意别傳曰意爲魯相孔子堂有甕皆有丹書自夫子亡後無敢發者意乃發甕}
