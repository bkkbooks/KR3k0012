  - {type: variant, offset: 3198, length: 3, content: 任文公, WYG: 長槃五漆尺槃三十漆栢炙柈二神異經曰西北荒有金樓上有銀槃廣五十丈搜神記曰髙辛氏有老婦人得耳疾醫為挑治得卵大如繭盛以瓠離之以槃俄而卵化犬因名槃瓠王子年拾遺記曰董偃以玉精為槃承氷而進又曰漢明帝夜讌群臣於華林園詔大官進櫻桃以赤瑕瑛為槃賜羣臣而去其葉月下視槃與櫻桃共一色衆臣笑云是空槃時帝使坐於廷中欲以承露詔使舉燭復照衆乃}
