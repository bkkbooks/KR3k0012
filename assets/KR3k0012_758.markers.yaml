  - {type: variant, offset: 2297, length: 204, content: 民閒之急用也江逌表曰昔康皇帝玄宮內金烏育銚廣雅曰鋗血涓切謂之銚說文曰銚溫器也嵩高山記曰岳左右有古人住處銅銚器物猶存衡山記曰有人採藥暮宿石室中見一銅銚是煮藥處蠻人聞之取銚還用舉村盡病送返乃己夢書曰夢見得新銚鋗取婦好也魏武上獻帝表曰臣祖騰有順帝賜器今上四石銅鋗四枚五石銅鋗一枚御物有純銀粉銚一枚束晳貧家賦曰執偏隳之漏鋗鑪說文曰鑪方鑪也鏇似絹反圜鑪也周禮曰宮人掌王之六寢凡寢中之事掃除執燭共鑪炭凡勞事勞事勞褻之事也, WYG: 未繘井羸其缾㐫}
