  - {type: variant, offset: 61, length: 0, content: '', SBCK: 不懌爲一擊缻趙御書曰某年某月􅁗王爲趙王擊缻又曰王惲書云醉後仰天撫􅇲而歌又曰司馬遷書云僕以爲戴盆何以望天續晉陽秋曰桓宣武與妻妾坐月下流星墜下銅盆水中光如二寸珠熲然妾酌飲之生玄晏子春秋曰景公飲酒自鼔盆甕也莊子曰莊子妻死惠子吊之莊子箕踞鼔盆而歌淮南子}
  - {type: variant, offset: 61, length: 0, content: '', WYG: 善爲秦聲請奏盆缻音缶皆瓦器竹以盛酒奏大鼓之以節歌於是秦王不懌爲一擊缻趙御史書曰某年某月秦王爲趙王擊缻又曰惲書云醉後仰天撫缶而歌又曰司馬遷書云僕以為戴盆何以望天續晋陽秋曰桓宣武與妻妾坐月下流星墜下銅盆水中光如二寸珠妾酌飲之生𤣥晏子春秋曰景公飲酒鼔盆莊子曰莊子妻死惠子弔之莊子箕踞鼔盆而歌淮南子}
