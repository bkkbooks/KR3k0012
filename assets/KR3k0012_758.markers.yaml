  - {type: variant, offset: 3440, length: 2, content: 汙泥, SBCK: 盤落於階上冰玉皆碎偃更以爲樂玉精干塗國獻也武帝以此器賜董偃又曰漢明帝夜讌羣臣於華昭園詔太官進櫻桃以赤瑕瑛爲槃賜羣臣而去其葉月下視槃與櫻桃共一色衆臣皆􅀏云是空槃時帝夜坐於庭中欲以承露詔使舉燭復照衆坐乃知槃中不空也皆起拜謝爲樂風}
