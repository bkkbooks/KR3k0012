  - {type: variant, offset: 1625, length: 585, content: 又曰薛願家有虹飲釜中水盡以酒灌之便吐金滿釜而願因之豐富離騷曰黃鍾毀棄瓦釜雷鳴鬲爾雅曰鼎疑足者謂之鬲郭璞曰曲腳也或曰疑定也犍為舍人曰鼎足相去䟽闊曰鬲方言曰鍑或謂之鏤吳楊之間謂之鬲周禮曰鬲實五觳苦角切厚半寸脣寸漢書曰空足之間蘇林曰足中空不實家語曰魯有儉者瓦鬲煮食祀之自謂甚美盛之土鉶之器以進孔子孔子受之欣然有悅如受大牢子路曰瓦甂音邊陋器也夫子何喜如此乎孔子曰夫食美者念其親以其食美者而念其我思也盛弘之荊州記曰湘東陰山縣西有鬲口溪昔有大鬲容百斛出於此水故因為名鐺通俗文曰鬴音輔有足曰鐺齊書曰明帝每存儉約鑄壞太官元日上壽銀酒鐺尚書令王晏等咸稱盛德蕭頴曹曰朝庭盛禮莫過三元此一路器既是舊物不足為侈帝不悅預曲宴銀器蒲席頴曹曰陛下前欲壞酒鐺恐宜移在此器也帝甚慚唐書曰薛大鼎為滄州太守政化大行百姓利之賈敦頤為瀛州刺史鄭德本為冀州刺史俱有異政時人號曰鎗腳刺史東宮舊事曰皇太子初拜給銅龍頭鎗孝子傳曰陳遵母好食鐺底焦飯孔氏志怪曰有人苦心腹病死後剖視之得銅鐺一枚容數合許疾病部廢門中備云其事述異記曰諸葛景亡後宅上常聞語聲當酤酒還而無溫鎗鬼云卿無溫鎗那得飲酒即見一銅鎗從空中來續齊諧記曰王敬伯夜見一女子命婢取酒須臾持一銀酒鎗笑林曰太原人夜失火欲出銅鎗設得熨斗便大驚怪曰異事火未至已被燒失腳梁王筠以服散鎗贈殷鈞別詩曰玉鉉布交文金丹煥仙說九沸翻成緩七輔良為切執以代踈麻長貽故人別鎢錥廣雅曰鎢錥謂之銼𨰠, SBCK: 缾}
