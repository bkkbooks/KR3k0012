  - {type: page-break, offset: 1, content: '', id: KR3k0012_SBCK_680-8a}
  - {type: variant, offset: 1, length: 1, content: 部, WYG: 改易禎陳成敗苦勸之充不納率兵臨發謂妻子曰男兒不竪豹尾約不還也齊書曰髙昭劉皇后年十七裴方明爲子求婚酬許已定后夢見先有迎車至猶如常家迎法后不肯去次有迎至龍旂豹尾有異於常后喜而從之既而與裴氏不成婚竟嬪於上武昌記曰樊口南百歩有樊山孫權獵於山下依夕見一姥問權獵何所得對云正得一豹姥曰何不􅆆其尾語竟忽然不見因爲立廟以其處樊山神故名爲樊山大姥蔡邕獨斷曰大駕屬車七十一乗最後一車懸豹尾豹尾已前皆省中警蹕周禮曰夏官𨽻僕掌蹕宫中之事蹕止行者又曰師氏掌以媺詔王告王以善道也使其屬帥四夷之𨽻各以其兵服守王門之外旦蹕蹕止行人使不得近王宫又曰鄉士掌大賓客率其屬夾道而蹕史記曰文帝過渭橋有一人橋下走出乗輿馬驚捕屬之廷尉曰縣人聞蹕聲匿橋下乆之出見車騎即走爾廷尉張釋之奏此人犯蹕當罰金事具刑法門漢書曰梁孝王竇太后少子愛之得賜天子旌旗從千乗萬騎出稱警入言蹕擬於天子又曰上官桀與燕王詐上書奏霍光道上稱蹕續漢書曰建安}
