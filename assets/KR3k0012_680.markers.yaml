  - {type: variant, offset: 1533, length: 1731, content: 三遇青谷先生降於寢室授其杖解法入太華山行九息服氣及授以爐丹方修之道成在洞中作童初府上師至始學者又曰劉少翁數入太華山中遇西岳丈人授其仙道又曰黃景華司空黃瓊女韓眾授以岷山丹服得仙法又曰趙威伯東郡人少好道師邯鄲張先生晚在中岳受玉珮金璫經於丘林乃漢樓舡將軍衛行道婦也遂受行挹日月之景又服九靈明鏡華遂得道在華陽內為保命承主仙籍并記學道者并主暴雨水領五芝金玉章又曰張玄賓魏武帝時人也遇真人樊子明於少室授以道變隱景之道在天柱山靈寶經曰迦羅山樹下有三天人講元陽經明真科曰元始尊在香林園中與眾教化諸法內音玉字經曰大梵隱語西母以上皇元年七月丙午於洞室下教以授清虛真人王君傳於夏禹封文於南浮洞室石匱故五符經云九天靈書猶封於石匱是也玉訣下云五老真人封題玉匱亦其例也孔靈符云會稽山南有宛委山其上石俗呼為石匱壁立于雲累梯然後至焉昔禹治洪水其功未就乃齋於此山發石匱得金簡玉字以知山河體勢於是䟽導百川各盡其宜上清經曰元始天帝與南極元君登太空瓊臺五老上真仙都公開鬱林之笈雲錦之囊上清變化七十四方解形之道三元布經以授於元君道學傳曰王母云此靈光生經聽四千年得傳一人旡其人聽八千年頓傳二人授非其人是為泄天道可傳而不授是為閉天寶不計限而妄授之是為輕天老受而不敬是為慢天藻泄閉輕慢四者延禍之事也同道謂之天親同心謂之地愛傳授當相親愛共均榮辱又曰漢武帝自撰西王母所說集為一卷及所與經圖之屬盛以黃金之几封以白玉之函安著柏梁臺上像名經曰東方上尊憑七寶鳳文之曲几敷說道要真經太上黃素經曰凡修受太洞真經雌一奇文常置經於几格潔淨處法輪經曰夫欲授經皆當齎金寶之信詣師請受道貴法重道非言不行輕傳則為非寶空修則為賤道眾篇經曰古人非心不仙末世非財不度所以爾者末世貴財賤道也以黃金萬斤仙經一部施于窮山末世乃取金棄經黃金刻為身患仙經刻得長生公知如此不能免貪也非道弘人此之謂也大有經曰大上寶章傳太帝君太帝君傳天帝君天帝君傳太微天帝太微天帝傳金闕帝君金闕帝君傳東海青受之以金為盟長九寸廣四寸厚三分刻而書之以封山川五岳之真精也三元真一經曰盟誓三官委帛血壇割革大約乃得授付受者盟者保神以堅心故萬物不能犯天地不能違以素絲一兩齋百日或五十日或三十日或二十日十日也法以四十年得傳一受玄丹玉經曰青布三十二尺朱帛三十二尺明鏡二枚告誓為不泄之約八術神虎隱文曰欲受八術隱文者齎金龍玉魚盟誓而受之受大洞真經亦用此又曰上金十兩以為神真之信也錦九十尺以誓九天青繒四十尺以盟其文好道樂真勤心注玄輕物貴道者始可與言又曰受三天虎書者齎金虎玉鈐素錦玄羅各四十尺以為金真之誓盟于天地不宜之約也太一洞真玄經曰古者傳經盟誓皆歃血斷髮立壇盟天今自可以金青代髮膚之體又云違此者失兩明玄母八門經曰琅玕華丹五石玄腴之法皆結盟真一修檢經曰受太一法二十四年得傳又曰東海玉華妃停文期青童君之妹降授張微子服霧之方又曰主仙道君即命侍女范運華趙峻珠王抱臺等發瓊笈披綠蘊出上清隱書龍文八靈真經二卷授范襄平太行經曰仁安遠遊山林於寒靈洞穴遇玄和先生授靈寶黑帝真文又曰西方有九光靈童以白帝真文授皇妃又曰央有無生童子於色之國授元君信然靈寶赤帝真文三元經曰元始於明霞觀以上真玉撿下授三天玉童馬明生內傳曰龔仲陽受嵩高小童步紀之法珠囊曰陸元德吳興東遷人宋文帝召入內服膺尊異時太后王氏雅信黃老降母后之尊執門徒之禮又曰陶弘景字通明魏郡平陽人也自云華陽隱居梁高祖太子從而受道梁簡文邵陵諸王謝覽沈約阮忻虞權並服膺師事之又曰劉法先彭城人也為宋明帝崇靈館主帝先師陸元德元德卒又師事法先盡北面之禮又曰薛彪之晉陵人也煙爐神鼎之法旡不辯其精麤究其難易門人有所請益必誨示勤懇隨量而退又曰謝暄字元映陳郡陽夏人也年十二辭親入高壽山師朱天賜菜食長齋專務修道朱性嚴厲入室者惟暄一人也隱虞山雖居幽寂遠近歸向林谷常滿又曰庾承仙字崇光潁川𨻳陵人也幼聰悟博極群書時處士劉弘碩學尤明老莊隱于荊州之沙洲承仙師之講習多所該究家貧無書每事假借一覽便誦又曰孫遊岳字玄達東陽永康人也宋泰始中陸元德自廬岳下都闡揚至教遊岳乃出京師問道親侍惟席預入室之流其宏言奧旨非遊岳不傳太一記曰裴君精思五年五帝曰君登八極城明真靈臺授揮神九有之術玉皇譜籙曰元始丈人登玉虛之壇受九天譜籙葛洪神仙傳曰嚴青者會稽人也居貧常於山逢一人與青語臨別贈素書一軸但以潔器盛之置高處并教青服石腦法, SBCK: ''}
