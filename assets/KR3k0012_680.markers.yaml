  - {type: variant, offset: 1254, length: 278, content: 術服五星之華而今度名東華來在洞中為定籙府右理中監又曰淳于斟字叔通會稽人漢桓帝時為徐縣令好道術數服餌胡麻黃精後入吳烏目山中隱居人授以虹景丹經修行得道在洞中為典柏執法郎主誠有道者又曰桃俊錢塘人少為郡吏漢末入增城山中學道遇東郭幼平幼平秦時人久隱增城得道者也幼平授俊服九精練氣輔星存心之術俊修之道戒在東華宮中為北河司命又曰張奉字公先河內人也太傅袁隗常歎其高操後入剡山遇山圖公子授奉九雲水強梁鍊桂法在東華宮為太極仙侯又曰夏馥字子治陳留人也少好道服術餌和雲母後入吳山從赤須先生受鍊魂法又遇桐柏真人授以黃水雲漿法得道在洞中為明晨侍郎又曰後漢劉寬字文饒少好道為司徒太尉年七, SBCK: ''}
