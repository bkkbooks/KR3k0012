  - {type: variant, offset: 247, length: 1647, content: 傳授上皇玉慧玉清之隱書金玄隱玄之羽書經者皆五老校圖太一式觀又曰上皇玉帝命太老真人開瓊珠之篋出玉清隱書玄羽玉經以傳太微天帝君二十四生圖曰元始天帝於長桑碧林園中聞帝尊普告元聖尊神洞玄天文靈寶玉奧也又曰依舊典府仰之格付度道君女青律云太真玉帝上宮府仰之格舊經億劫不傳也又曰帝尊在恊晨靈觀登白玉座具宣祕要開闡妙門太玄經曰老子傳授經戒籙儀注訣曰以局腳小案置經綵巾覆上明真經曰元始尊在香林園中說明真經太清中經曰道曰慎無賣吾以求寶也慎無傳吾非其人也慎無閉吾絕吾學也又曰太真經曰師之傳授選其上有仙相中有仁孝下有才能篤志者然後授之太上真經曰太上曰成道歸本混同無初出三界外濟九天中接生與善授記德人玄羽經曰元嬦金為簡刻玉篇授葛玄金根經曰太上以大洞真經付上相青童君掌錄於東華青宮使傳後聖應為真人者此金簡玉札出自太上靈都之宮刻玉為札結金為簡書以朱文編以朱繩之結太真科曰太上告張陵天師曰內外法契與天地水三官折石飲丹為誓也張陵受命為天師命弟子扶翼為嗣師上崇虛之堂登白虛之壇醮奏太一傳授口訣傳命嗣師承代基業行教天人真誥曰裴君曰大洞真經讀之者輕舉昔中央黃君隱祕此經世不知也若知之祕而不傳又曰紫陽真人受蘇君三一玄丹之道又曰有北海公涓子受守一玄丹之道又曰東宮中候真夫人受桐柏真人飛解脫綱之道又曰昔周君學道常山中積年精思忽見老人知是神異乃叩頭請道老人出素書七篇令誦之周君仙去又曰趙叔期學道王屋山時出民間聞有卜者在市肆叔期曰欲入天門調三關存朱衣正崑崙叔期知神人因拜乞要訣因出一書與之是胎精中記拜此書入山誦之後合神丹服而升天王君內傳曰王子登得太上丈人授以瓊蘊隱書并雲碧陽水飛丹法君服之絕見遠物坐在立亡役使群神又曰太素三元君遣西華靈妃甄幽簫齎成命之書以雲瓊為板紫金刻之以授王君子登後聖道君列紀曰道君命五老上真開紫蘂玉笈雲錦囊出靈書紫文上經以付青童君八素真經曰若精勤皆當書以蘂簡刻以瓊文位為上清左真公昇玄經曰張道陵曰不敢以身傳此教太上曰何得顧難廢不通法汝當建意無謂不可傳若世有道士得此仙經披尋首尾知是真要無師可授便得奉行天戒經曰葛玄告弟子鄭隱云吾昔所授善道太上所貴今為師友是以相授吾去世也將有樂道慈心居士來生吾門者子當以今道業事一通付之法應世世傳授也子以一通依科傳付弟子佳者也若無其人一通封五岳名山可也又曰劉翊字子朔潁川人有道德家世子仁感濟於人遇師皇先生告翊曰子仁感天地陰德鬼神太上嘉子之用心使我授汝以長生之道吾仙官也爾能從我去否翊曰願從教乃特入桐柏山中授以隱地八術服五星之華而今度名東華來在洞中為定籙府右理中監又曰淳于斟字叔通會稽人漢桓帝時為徐縣令好道術數服餌胡麻黃精後入吳烏目山中隱居人授以虹景丹經修行得道在洞中為典柏執法郎主誠有道者又曰桃俊錢塘人少為郡吏漢末入增城山中學道遇東郭幼平幼平秦時人久隱增城得道者也幼平授俊服九精練氣輔星存心之術俊修之道戒在東華宮中為北河司命又曰張奉字公先河內人也太傅袁隗常歎其高操後入剡山遇山圖公子授奉九雲水強梁鍊桂法在東華宮為太極仙侯又曰夏馥字子治陳留人也少好道服術餌和雲母後入吳山從赤須先生受鍊魂法又遇桐柏真人授以黃水雲漿法得道在洞中為明晨侍郎又曰後漢劉寬字文饒少好道為司徒太尉年七十三遇青谷先生降於寢室授其杖解法入太華山行九息服氣及授以爐丹方修之道成在洞中作童初府上師至始學者又曰劉少翁數入太華山中遇西岳丈人授其仙道又曰黃景華司空黃瓊女韓眾授以岷山丹服得仙法又曰趙威伯東郡人少好道師邯鄲張先生晚在中岳受玉珮金璫經於丘林乃漢樓舡將軍衛行道婦也遂受行挹日月之景又服九靈明鏡華遂得道在華陽內為保命承主仙籍并記學道者并主暴雨水領五芝金玉章又曰張玄賓魏武帝時人也遇真人樊子明於少室授以道變隱景之道在天柱山靈寶經曰迦羅山樹下有三天人講元陽經明真科曰元始尊在香林園中與眾教化諸法內音玉字經曰大梵隱語西母以上皇元年七月丙午於洞室下教以授清虛真人王君傳於夏禹封文於南浮洞室石匱故五符經云九天靈書猶封於石匱是也玉訣下云五老真人封題玉匱亦其例也孔靈符云會稽山南有宛委山其上石俗呼為石匱壁立于雲累梯然後至焉昔禹治洪水其功未就乃齋, WYG: 備}
