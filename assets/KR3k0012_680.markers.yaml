  - {type: variant, offset: 263, length: 790, content: 羽書經者皆五老校圖太一式觀又曰上皇玉帝命太老真人開瓊珠之篋出玉清隱書玄羽玉經以傳太微天帝君二十四生圖曰元始天帝於長桑碧林園中聞帝尊普告元聖尊神洞玄天文靈寶玉奧也又曰依舊典府仰之格付度道君女青律云太真玉帝上宮府仰之格舊經億劫不傳也又曰帝尊在恊晨靈觀登白玉座具宣祕要開闡妙門太玄經曰老子傳授經戒籙儀注訣曰以局腳小案置經綵巾覆上明真經曰元始尊在香林園中說明真經太清中經曰道曰慎無賣吾以求寶也慎無傳吾非其人也慎無閉吾絕吾學也又曰太真經曰師之傳授選其上有仙相中有仁孝下有才能篤志者然後授之太上真經曰太上曰成道歸本混同無初出三界外濟九天中接生與善授記德人玄羽經曰元嬦金為簡刻玉篇授葛玄金根經曰太上以大洞真經付上相青童君掌錄於東華青宮使傳後聖應為真人者此金簡玉札出自太上靈都之宮刻玉為札結金為簡書以朱文編以朱繩之結太真科曰太上告張陵天師曰內外法契與天地水三官折石飲丹為誓也張陵受命為天師命弟子扶翼為嗣師上崇虛之堂登白虛之壇醮奏太一傳授口訣傳命嗣師承代基業行教天人真誥曰裴君曰大洞真經讀之者輕舉昔中央黃君隱祕此經世不知也若知之祕而不傳又曰紫陽真人受蘇君三一玄丹之道又曰有北海公涓子受守一玄丹之道又曰東宮中候真夫人受桐柏真人飛解脫綱之道又曰昔周君學道常山中積年精思忽見老人知是神異乃叩頭請道老人出素書七篇令誦之周君仙去又曰趙叔期學道王屋山時出民間聞有卜者在市肆叔期曰欲入天門調三關存朱衣正崑崙叔期知神人因拜乞要訣因出一書與之是胎精中記拜此書入山誦之後合神丹服而升天王君內傳曰王子登得太上丈人授以瓊蘊隱書并雲碧陽水飛丹法君服之絕見遠物坐在立亡役使群神又曰太素三元君遣西華靈妃甄幽簫齎成命之書以雲瓊為板紫金刻之以授王君子登後聖道君列紀曰道君命五老上真開紫蘂玉笈雲錦囊出靈書紫文上經以付青童君八素真經曰若精勤皆當書以蘂簡刻以瓊文位為上清左真公昇玄經曰張道陵曰不敢以身傳此教太上曰何得顧難廢不通法汝當建意無, SBCK: ''}
