  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第六百八十儀式部一太常旂旌斾旟旐幡麾旄頭雲䍐黄鉞豹尾警蹕太常釋名曰九旗之名日月爲常畫日月於其端天子所建言常明周禮曰司常掌九旗之物名日月爲常又曰節服氏掌祭祀朝覲衮冕六人維王之太常禮記曰成王封周公於曲阜命魯公世世祀周公以天子之禮樂是以魯君乗大路載弧韣旂十有二旈日月之章又曰旂十有二旒龍章而設日月以象天也旂釋名曰交龍爲旂旂依倚也通以一赤色爲之無文采諸侯所建也爾雅曰有鈴曰旂懸鈴於竿頭畫交龍於旒也詩曰載見辟王曰永厥章龍旂陽陽又曰魯侯戾止言觀其旂其旂茷茷鸞聲噦噦周禮曰龍旂九斿以象大火也傳曰臧哀伯諫曰三辰旂旗昭其明也三辰日月星也於旂旗象天之明又曰子魚曰以先王觀之則尚德也昔武王克啇成王定之選建明德以藩屏周故周公相王室以尹天下所同爲睦分魯公以大路大旂交龍爲旂周禮同姓以封旌釋名曰折羽爲旌旌精也有精光也爾雅曰注旄首曰旌載旌於竿頭也周禮曰析羽爲旄凢軍士建旌旗甸亦如之凢射共獲旌歳時共更旌取舊與新禮記曰武車綏旌綏垂舒之德車結旌不盡飾結謂収歛之也左傳曰𥘉衛宣公烝於夷姜生伋子屬諸右公子爲之娶於齊而羙公取之生壽及朔屬壽於左公子夷姜縊宣姜與公子朔搆伋子公使諸齊將殺之壽子吿之使行不可曰弃父之命惡用子矣有無父之國則可也及行飲以酒壽子載其旌以先盗殺之伋子至曰我之求也彼何罪請殺我乎又殺之又曰楚許伯御樂伯攝叔爲右以致晉師許伯曰吾聞致師者御靡旌摩壘而還又曰宋公享晉侯于楚丘請以桑林舞師題以旌夏旌夏大旌也以大旌表識其行列晉侯懼退入于房去旌卒享而還詩曰子子干旌在浚之城史記曰蘇秦說楚合從楚王曰寡人自料以楚當秦不見勝也内與羣臣謀不足恃也寡人卧不安席食不甘味心揺揺然如懸旌而無所終薄今主君欲一天下収諸侯存危國寡人謹奉社稷以從斾釋名曰雜帛爲斾以新色綴其邊爲翅尾也將帥所建象物雜色也爾雅曰継旐曰斾續旐未爲燕尾詩曰蕭蕭馬鳴悠悠斾旌又曰織文鳥章白斾央央鳥章鳥折之文章也央央鮮明皃左傳曰晉或以廣隊不能進楚人惎之脫局少進馬還又惎甚教之之拔斾投衡乃出又曰晉侯伐齊齊登巫山以皇晉師晉人使司馬斥山澤之險雖所不至必斾而踈陳之使乗車者左實右僞以斾先輿曵柴而從之齊侯見之其衆也乃脫歸又曰八月辛未治兵建而不斾建立旌旗不曵其斾游也壬申復斾之諸侯畏之旟爾雅曰錯革鳥曰旟釋名曰鳥隼爲旟旟舉也軍吏所建急疾走事則有稱舉矣周禮曰鳥旟七斿以象鶉火也詩曰衆維魚矣旐維旟矣太人占之衆維魚矣實維豊年旐維旟矣室家溱溱旐釋名曰龜蛇爲旐旐兆也龜知氣兆之吉凶建之於後察事冝之形兆也爾雅曰緇廣充幅長㝷曰旐周禮曰龜虵四游以象宫室詩曰我出我車于彼郊矣設此旐矣建彼旄矣彼旟旐斯胡不斾斾斾斾旒垂皃又曰出車彭彭旂旐央央幡釋名曰幡幡也其皃旛旛然也魏志曰陶謙字恭袒少孤以不覊聞年十四猶綴帛爲旛乗竹馬戯邑中宋書曰髙祖討盧循戰于左里髙祖麾之竿折幡沉于水衆咸懼髙祖笑曰昔覆舟之役亦如之今勝必矣果破賊麾蔡邕月令章句曰麾鳥翼以爲旌幢麾也魏志曰張遼從征袁尚於柳城卒與虜遇遼勸火戰氣甚奮太祖壯之自以所持麾授遼遂擊大破之斬單于蹋頓旄頭史記曰昴星曰旄頭漢書曰梁丘賀字長翁宣帝祠孝昭廟先驅旄頭劒挺墮音地首垂臿泥中挺引也劒自然引挺出也刃嚮乗輿車馬驚於是召賀筮之有兵謀不吉上還使有司侍祠是時霍氏外孫任宣坐逆謀反宣子章夜玄服入廟執㦸欲爲逆發覺伏誅東觀漢記曰東海王強置虎賁旄頭應劭漢官儀曰舊曰羽林郞爲旄頭放髮駈今但用營士玄中記曰秦始皇時終南公有梓樹大數百圍䕃宫中始皇惡之興兵伐之天輙大風雨飛沙石人皆疾走至夜瘡合有一人中風雨傷寒不能去留宿夜聞有鬼來問樹言秦王㐫暴相伐得不困耶樹曰來即作風雨擊之其柰吾何鬼又曰秦王使三百人𬒳頭以赤絲繞樹伐汝得無敗乎樹漠然無言疾人報秦皇案言伐斷中央有一青牛出逐之入水秦王因立旄頭騎摰虞决疑録要注曰世祖武皇帝因㑹問侍臣曰旄頭之義何謂耶侍中彭權對曰秦記云國有竒恠觸山截水無不崩潰唯畏旄頭故使虎士服之衛至尊也中書令張華曰有是言而事不經臣以爲壯士之怒髮踴衝冠義取於此也徐爰釋疑畧曰乗與黄麾内羽林班弓箭左罼右䍐者熊皮謂之旄頭魏武表曰不悟陛下復加後命命置旄頭以比東海雲䍐徐廣車服注曰雲䍐罼䍐也司馬相如上林賦曰弋玄鵠弄干鏚載雲䍐掩羣雅雅鳥張衡東京賦曰雲䍐九游闟㦸膠葛潘岳籍田賦曰五輅鳴鑾九旗楊斾瓊鉞入蘂雲䍐晻藹黄鉞說文曰鉞大斧也夏執玄戈殷執白戚周左仗黄鉞字林曰鉞斧也書曰武王左仗黄鉞右秉白旄周書曰武王陳牧野旣誓以馳啇師大崩啇辛自燔于火王斬之以黄鉞懸諸大白左傳曰楚王將戮齊慶封負之斧鉞以徇於諸侯曰無或如齊慶封殺其君弱其孤以盟其大夫封反曰無或如楚恭王之子圍殺其君之子而自立以盟諸侯漢書曰王莽使司徒王㝷鎮洛陽𥘉發長安宿覇昌厩亡其黄鉞㝷士房楊素狂直乃哭曰此經所謂喪其資斧者也莽聞乃殺之呉志曰假陸遜黄鉞呉王親執鞭以見之晉公卿禮秩曰太尉賈充河間王顒梁王􅊮司徒王衍汝南王亮太傳楊駿東海王越義陽王望齊王攸琅瑘王伷東平公茍晞皆假黄鉞晉書曰石勒王弥㓂京師以王衍都督征諸軍持節假黄鉞以伐之齊書曰髙帝輔政王儉議加黄鉞任遐曰此大事應報禇公彦回也帝曰禇脫不與卿將何計遐曰彦回保妻子愛性命非有竒才異節遐能制之果無違異崔豹古今注曰今斧黄鉞䥫斧玄鉞三代通用之以断斬今以黄鉞爲乗輿之飾玄鉞諸公王得建之武王以黄鉞斷紂頭故王者以爲戒太公以玄鉞斬妲己故婦人以爲戒漢制諸公建玄鉞以太公助武王斷斬故爲諸公之飾大將出征持加黄鉞者以銅爲之黄金塗刃及柄不得純金也淮南子曰至精之感無所不通昔武王渡孟津而陽侯之波逆流而擊疾風晦冥武王舉黄鉞瞋目麾之曰予在天下誰敢害吾意者於是風去而波罷遂得濟又曰國有難召將詔之曰社稷之命在將軍身今國有難願子將而應之將軍受命乃令祝史太卜齋三日之太廟鑚靈龜卜吉曰以受旗鼓君入廟門西面而趍至堂下北面立王親操鉞持頭授將軍柄曰從此上至天者將軍制之又復操斧持頭授將軍其柄曰從此下至淵者將軍制之丗說曰諸葛亮之次渭濵也魏明帝遣辛毗爲軍司宣王旣與亮對渭而陣亮設誘譎萬方宣王果大怒憤將應以重兵亮遣間謀視之還曰有一老夫毅然仗黄鉞當軍門立軍不得出亮曰此辛毗也徐爰釋疑略注曰豹尾黄鉞金鉦舊載馬車晉江左乗馬執之宋元嘉中復舊典豹尾崔豹古今注曰豹尾車周制也象君子豹變尾言謙也古軍正建之今唯乗輿焉漢書曰成帝趙昭儀方大幸每上甘泉嘗從在屬車豹尾中晉中興書徴祥說曰海西公𥘉即位忘設豹尾亦服妖也豹尾儀服之主大人所以豹變也西海凢庸不可以主社稷故志其豹尾示不能終晉書曰王敦謀逆以沆充錢鳯爲謀主明帝討之使充郷人沈禎徃呉興喻充以爲司空曰丈夫共事終始當同寧可中}
  body:
  - {type: variant, offset: 1, length: 1, content: 部, SBCK: 改易禎陳成敗苦勸之充不納率兵臨發謂妻子曰男兒不竪豹尾約不還也齊書曰髙昭劉皇后年十七裴方明爲子求㛰酬許巳定后夢見先有迎車至猶如常家迎法后不肯去次有迎至龍旂豹尾有異於常后喜而從之旣而與裴氏不成㛰竟嬪于上武昌記曰樊口南百歩有樊山孫權獵于山下依夕見一姥周權獵何所得對云正得一豹姥曰何不竪其尾語竟忽然不見因爲立廟以其處楚山神故名爲樊山大姥蔡邕獨斷曰大駕屬車八十一乗最後一車懸豹尾豹尾巳前皆省中警蹕周禮曰夏官隷僕掌蹕宮中之事蹕止行者又曰師氏掌以媺詔王告王以善道也使其屬師四夷之隷各以其兵服守王之門外且蹕蹕止行人使不得近王宮又曰卿士掌大賔客率其屬夾道而蹕史記曰文帝過渭橋有一人橋下走出乗輿馬驚捕屬之廷尉曰縣人來聞蹕聲匿橋下乆之出見車􅀐即走尓廷尉張釋之奏此人犯蹕當罰金事見刑法門漢書曰梁孝王竇太君少子愛之得賜天子旌旗從千車萬􅀐出稱蹕入言警擬於天子又曰上官桀與燕王詐上書奏霍光道上稱蹕續漢書曰建安}
