  - {type: variant, offset: 2411, length: 853, content: 日或三十日或二十日十日也法以四十年得傳一受玄丹玉經曰青布三十二尺朱帛三十二尺明鏡二枚告誓為不泄之約八術神虎隱文曰欲受八術隱文者齎金龍玉魚盟誓而受之受大洞真經亦用此又曰上金十兩以為神真之信也錦九十尺以誓九天青繒四十尺以盟其文好道樂真勤心注玄輕物貴道者始可與言又曰受三天虎書者齎金虎玉鈐素錦玄羅各四十尺以為金真之誓盟于天地不宜之約也太一洞真玄經曰古者傳經盟誓皆歃血斷髮立壇盟天今自可以金青代髮膚之體又云違此者失兩明玄母八門經曰琅玕華丹五石玄腴之法皆結盟真一修檢經曰受太一法二十四年得傳又曰東海玉華妃停文期青童君之妹降授張微子服霧之方又曰主仙道君即命侍女范運華趙峻珠王抱臺等發瓊笈披綠蘊出上清隱書龍文八靈真經二卷授范襄平太行經曰仁安遠遊山林於寒靈洞穴遇玄和先生授靈寶黑帝真文又曰西方有九光靈童以白帝真文授皇妃又曰央有無生童子於色之國授元君信然靈寶赤帝真文三元經曰元始於明霞觀以上真玉撿下授三天玉童馬明生內傳曰龔仲陽受嵩高小童步紀之法珠囊曰陸元德吳興東遷人宋文帝召入內服膺尊異時太后王氏雅信黃老降母后之尊執門徒之禮又曰陶弘景字通明魏郡平陽人也自云華陽隱居梁高祖太子從而受道梁簡文邵陵諸王謝覽沈約阮忻虞權並服膺師事之又曰劉法先彭城人也為宋明帝崇靈館主帝先師陸元德元德卒又師事法先盡北面之禮又曰薛彪之晉陵人也煙爐神鼎之法旡不辯其精麤究其難易門人有所請益必誨示勤懇隨量而退又曰謝暄字元映陳郡陽夏人也年十二辭親入高壽山師朱天賜菜食長齋專務修道朱性嚴厲入室者惟暄一人也隱虞山雖居幽寂遠近歸向林谷常滿又曰庾承仙字崇光潁川𨻳陵人也幼聰悟博極群書時處士劉弘碩學尤明老莊隱于荊州之沙洲承仙師之講習多所該究家貧無書每事假借一覽便誦又曰孫遊岳字玄達東陽永康人也宋泰始中陸元德自廬岳下都闡揚至教遊岳乃出京師問道親侍惟席預入室之流其宏言奧旨非遊岳不傳太一記曰裴君精思五年五帝曰君登八極城明真靈臺授揮神九有之術玉皇譜籙曰元始丈人登玉虛之壇受九天譜籙葛洪神仙傳曰嚴青者會稽人也居貧常於山逢一人與青語臨別贈素書一軸但以潔器盛之置高處并教青服石腦法, WYG: ''}
