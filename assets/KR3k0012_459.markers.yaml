  - {type: variant, offset: 141, length: 2, content: 矜細, WYG: 知臣不肖使臣受吏民之垢人盡來賀子獨來弔豈有說乎父曰有說身已貴而驕人者民去之位已髙而擅權者君惡之禄已厚而不足者患處之孫叔敖再拜曰謹受命願聞餘教父曰位已髙而意益下官益大而心益小禄已厚而慎不取君守此三者足以治楚矣説苑曰魏公子牟東}
