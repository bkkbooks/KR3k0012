  - {type: variant, offset: 94, length: 0, content: '', SBCK: 以此思則勞至焉君岀魯之四門以望四郊亡國之墟則必有􅀋焉君以此思則懼至焉且丘聞之君者舟也民者水也水能載舟亦能覆舟君以此思則危至焉又曰慶封爲亂於齊而將之越其族人曰晉近奚不之慶封曰越逺利以避難族人曰變是心也居晉而安不變是心雖越其可以安乎又曰桓公徃問管仲曰仲父有病即有不幸政將遷誰竪刁何如曰不可人情莫不愛其身竪刁自宫而爲君治内身之不愛何能愛君公曰衛公子開封何如管仲曰齊衛之間不過十日之行開封事君十年不歸不見父母非人心也父母之不親安能親君公曰易牙何如曰夫易牙爲君主味君之所未嘗食唯人肉而易牙蒸首子而進之其子不愛焉能愛君公曰孰可管仲曰隰朋可其爲人堅中而廉外少欲而多信堅中足以爲表廉外可與大任少欲則能臨其衆多信則能親隣國此霸王之佐也君其用之管仲死桓公不用隰朋而用豎刁三年桓公南遊堂邑竪刁易牙衛公子開封及大臣爲亂桓公餒而死荀子曰伯禽將歸於魯周公謂伯禽曰君子力如牛不與牛爭力走如馬不與馬爭走智如士不與士爭智韓子曰西門豹性急佩韋以自緩董安于心緩佩弦以自急故能以有餘􅀘不足以長續短之謂明至淮南子曰奔車之上無仲尼覆舟之下無伯夷韓子曰天下有至貴而非勢位也有至冨而非金玉也有至壽而非千歳也愿恕反性則貴矣適情知足則冨矣明生死之分則壽矣韓子曰􅁗昭王謂左右曰今時韓與魏孰強對曰魏強􅁗昭王曰其無奈寡人何左右皆然中旗伏瑟而對曰王之料天下過矣當六晉之時智氏最強滅范中行氏又率韓魏之兵以圍趙襄子於晉陽决晉水以灌晉陽之城城不没者三板智伯行水魏宣子御韓康子驂乗智伯曰吾始不知水可以亡國也乃今知之汾水可以灌安邑絳水可以灌平陽魏宣子肘韓康子韓康子履魏宣}
