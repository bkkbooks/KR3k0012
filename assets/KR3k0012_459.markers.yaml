  - {type: variant, offset: 842, length: 513, content: 其禍將長勿謂何害其禍將大勿謂莫聞神將伺人熒熒不滅炎炎奈何涓涓不壅終為江河緜緜不絕將成網羅毫末不札將尋斧柯誠能慎之福之垠也口是何傷禍之門也彊梁者不得其死好勝者必遇其敵盜憎主人民怨其上君子知天下之不可上也故下之知眾之不可先也故後之溫恭慎德使人慕之執雌持下人莫踰之人皆趨彼我獨守此孔子顧謂弟子曰此言雖鄙而中事情又孔子觀於周廟而有欹器焉孔子問守廟者曰此謂何器對曰蓋謂右坐之器孔子曰吾聞右坐之器滿則覆虛則欹中則正有之乎對曰然孔子使子路取水而試之滿則覆中則正虛則歌孔子喟然而歎曰嗚呼惡有滿而不覆者哉子路曰敢問持滿有道乎孔子曰持滿之道挹而損之子路曰損之有道乎孔子曰高而能下滿而能虛富而能儉貴而能卑智而能愚勇而能怯辯而能訥博而能淺明而能闇是謂損而不極能行此道唯至德者及之易曰不損而益之自損而終益故也家語曰孔子行遊中路聞哭者聲甚悲孔子驅之前有異人者少進見之吾丘子也擁鏁帶索而哭孔子辟車而下問曰夫子有喪也何哭之悲也吾丘子對曰吾有三失孔子曰願聞三失吾丘子曰吾少好學問周通天下還後吾親亡一失也事君驕奢諫不遂是二失也厚交友而後絕三失也樹欲靜而風不止子欲養而親不待往而不來者年也不可得再見者親也請從此辭則自刎而死孔子曰弟子記之此足以為戒矣於是弟子歸養親者, SBCK: 太平御覽卷第四百五}
