  - {type: variant, offset: 1356, length: 2401, content: 三人又曰曾子曰狎甚則簡莊甚則不親是故君子之狎足以交情莊足以成禮而已孔子聞斯言也曰二三子志之孰為參也而不知禮者乎又曰衛孫文子得罪於獻公居戚公卒未葬文子擊鐘焉延陵季子適晉過聞之曰異哉夫子之在此也猶鷰之巢于幕懼猶未也又何樂焉君又在殯可乎文子於是終身不聽琴瑟孔子聞之曰季子能以義正人文子能克己復義可謂善譏善改矣國語曰智襄子為室美士窋夕焉智伯曰室美夫對曰美則美矣抑臣亦有懼也曰何懼對曰臣以秉筆事君記有之曰夫高山峻原不生草木松柏之地其土不肥今土木勝臣懼其不安人也室成三年而智氏亡漢書張安世曾孫勃嗣每登閣殿常曰桑霍為我誡豈不厚哉又曰雋不疑字曼倩渤海人也為郡文學進退必以禮名聞州郡武帝末郡國盜賊群起暴勝之為直指使者繡衣持斧捕盜素聞不疑賢至渤海遣吏請與相見躧履迎之坐定不疑據地曰竊伏海瀕聞暴公子舊矣迺今承顏接辭凡為吏太剛則折太軟則廢威行施之以恩然後樹功揚名永終天祿勝之納其誡深接以禮又曰楊惲失爵位居處治產業起室宅其友人安定守孫會宗與書誡之曰大臣廢退當闔門惶恐為可憐之意不當通賓客有譽稱也惲內懷不服驕奢不悔坐腰斬前列曰元帝時京房以言災異數召見又為吏考課事奏之因問上曰幽厲之君何以危所任者何人也上曰主不明而任巧佞房曰知巧佞而任之邪將以為賢而任之耶上曰賢之房曰然則何以知其不賢也曰以其時亂而君危知之房曰今治乎亂乎上曰亂房曰然則有所任乎上曰幸其未至於彼也房曰臣恐後世之視今猶今之視古也元帝嘿然矣又曰韓延壽善為政坐法棄市吏民數千人送至渭城老小扶持車轂爭奉酒炙延壽不忍拒逆為飲酒石餘使掾吏分謝吏民百姓莫不流涕延壽三子皆為郎吏臨死屬其子勿為吏以己為戒子皆以父言去官東觀漢記曰馮勤遷司徒是時三公多見罪退上欲令以善自終乃因讌見從容戒之曰朱浮上不忠於君下陵轢同列終以中傷放逐受誅雖復追加賞賜不足以償不訾之身忠臣孝子鑒照前世以為鑒戒能盡忠於國事君無二則爵賞先乎當世名列於不朽可不勉哉又曰樊宏為人謙慎常戒其子曰富貴盈溢未有能終者天道惡滿而好謙前世貴戚明戒也保身全己豈不樂哉後漢書曰班超為都護以任尚代超尚謂超曰君在外國三十餘年而小人猥承君後宜以誨之超曰塞外吏士本非孝子順孫皆以罪過徒補邊而蠻夷懷鳥獸之心難養易敗今君情嚴急水清無大魚察政不得下宜陽為簡易寬小過繩大罪而已又曰馬援出屯襄國詔百官祖道援謂黃門侍郎梁松竇固曰凡人貴富當使可賤如卿等欲不可復賤居高自持勉思鄙言松後果貴滿致災固亦幾不免後漢書曰馬援兄子嚴敦並喜通輕俠援前在交趾遺書戒之曰吾欲汝曹聞人過失如聞父母之名耳可得聞而口不可得言也好論議人長短是非正法此吾所大惡也甯死不願聞子孫有此行又曰徐詓嘗為太尉黃瓊所辟不就及瓊卒歸葬詓乃負糧徒步到江夏赴之設鷄酒薄祭哭卒而不告姓名時會者四方名士郭林宗等數千人聞之疑其詓也乃選能言生茅容輕騎追之及於塗容為設飯共言稼穡之事臨決去謂曰為我謝郭林宗大廈將顛非一繩所維何為栖栖不遑甯處也魏志曰傳嘏與鍾會從平母丘儉後會有自矜色嘏戒之曰子志大量小而勳業難為也可不慎哉又曰吏部尚書何晏詣管輅問曰連夢青繩數頭來在鼻上驅之不肯去有何意故輅曰今君侯位重山岳勢若雷霆而懷德者鮮畏威者眾殆非小心翼翼多福之人又鼻者艮此天中之山高而不危所以長守富也今有蠅而集焉位峻者顛輕豪者亡不可不慎又曰曹爽飲食衣服擬於乘輿擅取武庫禁兵曹羲深以為憂數諫止之又著書三篇陳驕淫盈溢之致禍敗辭旨甚切不敢斥爽託戒諸子以示爽爽知其為己發也甚不悅羲或時以諫喻不納涕泗而起吳志曰孫權每田獵常乘馬射虎虎嘗突前攀持馬鞍張昭變色而前曰將軍何用不當爾夫為人君謂能駕禦英雄驅使群賢豈謂馳逐於原野校勇於猛獸者孚江表傳曰孫權征合肥還為張遼所襲幾至危殆賀齊時率三千兵在南津迎權權既就大船會諸將飲宴齊下席涕泣而言曰至尊人主當持重今日之事幾致禍敗群下震悕若無天地願以此為終身戒權自前拭其淚曰大慚謹以刻心非伹書紳也王隱晉書曰庾袞兄女芳將嫁美服具矣袞刈荊苕為箕箒焉召諸子集之于堂男女以班而命芳來汝少孤汝逸汝豫不汝疵瑕今汝將適人事舅姑灑掃庭內婦人道也故賜汝以匪器之美欲汝之溫恭朝夕雖休勿休也晉書曰趙王倫篡位嵇紹為侍中惠帝復祚紹居本職上疏諫曰願陛下無志金傭大司馬無忘潁上大將無忘黃橋則禍亂之萌無由而兆隋書曰賀若弼父敦以武烈知名仕周為金州總管宇文護忌而害之臨刑呼弼謂之曰吾必欲平江南然此心不果汝當成吾志且吾以舌死汝不可不思因引錐剌弼舌出血誡以慎口唐書曰太宗嘗謂長孫無忌等曰朕聞主賢則臣直人不自知公直面論攻朕得失無忌奏言陛下武功文德跨絕古今發號施令事皆利物孝經云將順其美臣順之不暇實不見陛下有所愆失太宗曰朕冀聞己過公乃妄相諛悅朕今面談公等得失以為鑒誡言之者無過聞之者可以自改因目無忌曰善避嫌疑應對敏速求之古人亦當無比而總兵攻戰非所長也高士廉涉獵古今心術聰悟臨難既不改節為官亦無朋黨所少者骨鯁規諫耳唐儉言辭俊利善和解人酒杯流行發言啟齒事朕三十載遂無一言論國家得失楊師道性行絕善自無愆過無情實怯懦未甚更事急緩不可得力岑文本性過敦厚文章自其所長而持論恒據經遠自當不負於物劉洎性最堅貞言多利益然其意尚然諾於朋友能自補闕亦何以尚馬周見事敏速性甚貞正於論量人物直道而行朕比任使多所稱意禇遂良學問稍長性亦堅正既寫忠誠甚親附於朕譬飛烏依人自加憐愛又曰閻立本雖有應務之才而尤善圖畫工於寫真秦府十八學士圖及貞觀中淩煙閣功臣圖並立本之跡也時人咸稱其妙太宗嘗與侍臣學士泛舟於春苑池中有異烏隨波容與太宗擊賞數賜詔座者為詠召立本令寫焉時閣外傳呼云畫師閻立本時以為主爵郎中奔走流汗俛伏池側手揮丹粉瞻望座賓不勝媿赧退戒其子曰吾少好讀書幸免牆面緣情染翰頗及儕流唯以丹青見知躬廝役之務辱莫大焉汝宜深戒勿習此末伎立本為性所好欲罷不能也及為右相與左相姜恪對掌樞密恪既歷任將軍立功塞外立本唯善於圖畫非宰輔之器故時人以千字文為語曰左相宣威沙漠右相馳譽丹青唐書曰房玄齡嘗誡諸子以驕奢沈溺必不可以地望陵人集古今聖賢家戒書於屏風令各取一具謂曰若能留意足以保身成名又云袁家累葉忠節是吾所向汝即宜師之, SBCK: 九}
