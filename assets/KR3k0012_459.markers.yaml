  - {type: variant, offset: 90, length: 2, content: 言行, SBCK: 人之將疾必先不甘梁肉之味國之將亡必先思忠臣之語列子曰狐丘文人謂孫叔敖曰人有三怨子知之乎孫叔敖曰何謂也對曰爵髙者人妬之官大者主惡之禄厚者患處之孫叔敖曰吾爵益髙志益下吾官益大吾心益小吾禄益厚吾施益􅀶以是免三怨可乎莊子曰夫畏途十殺一人則父子兄弟相戒必盛從卒而後敢出祍席之上飲食之間而不知爲之戒過也文子曰其文好者身必剥其角羙者身見殺甘泉先竭直木必伐荀子曰魯哀公問政於孔子曰寡人生於深宫之中長於婦人之手未甞知哀未嘗知憂未甞知勞未嘗知懼未嘗知危孔子曰君之問也丘小人也何以知之曰無吾子無所聞之孔子曰君入廟門而右登自胙階仰見榱棟俯察机筵其器存其人亡君以此思則哀至焉昧爽而櫛冠未明而聽朝一物失所亂之端也君以此思則憂至焉君平明而聽朝日昗而退諸侯之子孫必有在君之庭}
