  - {type: variant, offset: 101, length: 1, content: 發, SBCK: 下也此方其用肘足之時願王勿易也於是􅁗王恐又曰呉鐸以聲自毀膏燭以明自鑠又曰魏武侯浮西河而下中流謂呉起曰羙哉山河之固魏國之寳也對曰在德不在險昔三苗氏左洞庭而右彭蠡德義不修而禹滅之夏桀之居左河濟而右太華伊闕在其南羊膓在其北修政不仁湯放之啇紂之國左孟門右太行常山在其北大河經其南修行不德而武王滅之王恃儉而不修德舟中之人盡敵國也武侯曰善􅀃苑曰昔成王封周公周公辭不受乃封周公子伯禽於魯將辭去周公戒之曰去矣子其無以魯國驕士矣我文王之子也武王之弟也今王之叔父也又相天子吾於天下亦不輕矣嘗一沐而三握髮一食而三吐哺猶恐失天下之士吾聞之曰德行廣大而守以恭者}
  - {type: page-break, offset: 101, content: '', id: KR3k0012_SBCK_459-3b}
  - {type: variant, offset: 101, length: 1, content: 發, WYG: 下也此方其用肘足之時願王勿易也於是秦王恐又曰吳鐸以聲自毁髙燭以明自鑠又曰魏武侯浮西河而下中流謂吳起曰美哉山河之固魏國之寶也對曰在德不在險昔三苗氏左洞庭右彭蠡德義不修而禹㓕之夏桀之居左河濟而右太華伊闕在其南羊膓在其北修政不仁湯放之商紂之國左孟門右太行常山在其北大河經其南修行不德而武王㓕之王恃險而不修德舟中之人盡敵國也武侯曰善説苑曰昔成王封周公周公辭不受乃封周公子伯禽於魯將辭去周公戒之曰去矣子其無以魯國驕士矣我文王之子也武王之弟也今王之叔父也又相天子吾於天下亦不輕矣嘗一沐而三握髪一食而三吐哺猶恐失天下之士吾聞之曰德行廣大而守以恭者}
