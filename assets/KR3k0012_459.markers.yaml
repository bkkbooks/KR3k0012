  - {type: variant, offset: 252, length: 0, content: '', SBCK: 出則以車入則以輦務以自逸命之曰招蹷之機肥肉厚酒務以自強命之曰爛膓之食靡曼皓齒鄭衛之音務以自樂命之曰伐性之斧三者冨貴之所致者也新序曰楚恭王有疾召令尹曰常侍􅁐蘇與我處忠我以義吾與其處不見不思也雖然吾有以得也其功不細必爵之申侯伯與我處吾所樂者勸吾爲之吾所好者勸吾服之吾與處不見思之雖然吾終}
  - {type: variant, offset: 252, length: 0, content: '', WYG: 出則以車入則以輦務以自逸命之曰招蹶之機肥肉厚酒務以自强命之曰爛腸之食靡曼皓齒鄭衞之音務以自樂命之曰伐性之斧三者富貴之所致者也新序曰楚恭王有疾召令尹曰常侍苑蘇與我處忠我以義吾與其處不見不思也雖然吾有以得也其功不細必爵之申伯與我處吾所樂者勸吾為之吾所好者勸吾服之嘗與處不見思之雖然吾終}
  - {type: page-break, offset: 252, content: '', id: KR3k0012_WYG_459-10b, image: WYG0897/WYG0897-0207b.png}
  - {type: variant, offset: 252, length: 0, content: '', krp: 出則以車入則以輦務以自逸命之曰招蹷之機肥肉厚酒務以自強命之曰爛膓之食靡曼皓齒鄭衛之音務以自樂命之曰伐性之斧三者冨貴之所致者也新序曰楚恭王有疾召令尹曰常侍苑蘇與我處忠我以義吾與其處不見不思也雖然吾有以得也其功不細必爵之申侯伯與我處吾所樂者勸吾爲之吾所好者勸吾服之吾與處不見思之雖然吾終}
  - {type: variant, offset: 253, length: 6, content: 念爾祖聿脩厥, SBCK: 得也其過也不細必亟遣之令尹曰諾明日王薨令尹即拜苑􅂫爲上卿而逐申伯出於國諸葛亮集先主遺詔勑後主曰勿以惡小而爲之勿以善小而不爲唯賢唯}
  - {type: page-break, offset: 253, content: '', id: KR3k0012_SBCK_459-6b}
  - {type: variant, offset: 253, length: 1, content: 念, WYG: 得也其過也不細必亟遣之令尹曰諾明日王薨令尹即拜苑蘇為上卿而逐申伯出於國諸葛亮集先主遺詔勅后主曰勿以惡小而為之勿以善小而不為唯賢唯德能服於人汝父德薄勿效之讀傳必可讀漢書禮記閒暇厯視諸子及六韜商君書益人意知吾終之后汝兄弟父事丞相鄭𤣥别傳曰𤣥病困戒子益恩曰吾家舊貧為父母郡所容去厮役之吏遊周秦之都徃來幽并兖豫之役候覲通人大儒得意者咸從奉手有所受焉遂博稽六韜究覽傳記今我告}
