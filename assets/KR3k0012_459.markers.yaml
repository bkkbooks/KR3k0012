  - {type: variant, offset: 147, length: 1, content: 德, WYG: 臣具酒期以日中管仲后至桓公舉觴以飲之管仲半棄酒桓公曰期而后至飲而棄酒於禮可乎管仲對曰臣聞酒入舌出舌出者言失言失者身棄臣計棄身不如棄酒桓公笑曰仲父起就坐說苑曰常樅有疾老子徃問焉曰先生疾甚矣無遺教可以語諸弟子者乎常樅曰子雖不問吾將語子曰過故鄉而下車子知之乎老子曰過故鄉而下車非謂其不忘故鄉耶常樅曰嘻是矣常樅曰過喬木而趨子知之乎老子曰過喬木而趨非謂其敬老耶常樅曰嘻是矣張其口而示老子曰吾舌存乎老子曰然吾齒存乎老子曰亡常樅曰子知之乎老子曰夫舌之存也豈非以其柔耶齒之亡也豈非以其剛耶常樅曰嘻是矣天下之事已盡矣無以復語子哉説苑曰桓公曰金剛則折革剛則裂人君剛則國家㓕人臣剛則交友絶夫剛不和不和則不可用是故四馬不和取道不長父子不和其世破亡兄弟不和不能乆同夫妻不和家室大凶易曰二人同心其利斷金因不剛也}
