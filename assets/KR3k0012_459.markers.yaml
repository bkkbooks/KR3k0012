  - {type: variant, offset: 103, length: 3, content: 辱之主, SBCK: 土地􅀶􅁉而守以儉者安禄位尊盛而守以卑者貴人衆兵彊而守以畏者勝聦明睿智而守以愚者益􅀶聞多記而守以淺者廣此六守者謙徳也夫貴爲天子冨有四海不謙者先天下亡其身桀紂是}
