  - {type: variant, offset: 111, length: 0, content: '', SBCK: 故易曰天道虧盈而益謙地道變盈而流謙􅀑神害􅄹而福謙人道惡盈而好謙誡之哉子其無以魯國驕士矣又曰春秋有忽然而足以亡者國君不可以不愼也妬妾不一足以亡公族不親足以亡大臣不任足以亡國爵不用足以亡親佞近讒足以亡舉百事不時足以亡使民不節足以亡刑罰不中足以亡内失衆心足以亡外嫚大國足以亡􅀃苑曰田子方侍魏文侯坐太子擊趨而入見賔客羣臣皆趨田子獨不起文侯有不􅀃之色太子亦然田子方稱曰爲子起與無如禮何不爲子起與無如罪何請爲子誦楚恭王之爲太子也將出之雲夢遇大夫工尹工尹遂趨避家人之門中太子下車從之家人之門中曰子大夫何爲其􅀂是吾聞之尊其父者不兼其子兼其子者不祥莫大焉子大夫何爲其􅀂是工尹曰向吾望見子之面今而後記子之心文侯曰善太子擊前誦㳟王之言而習之又曰孫叔敖爲楚令尹一國吏民皆來賀有一父衣鹿衣冠白冠後來弔孫叔敖正衣冠而出見之謂老父曰楚王不知臣不肖使臣受吏民之垢人盡來賀子獨來弔豈有說乎父曰有􅀃身已貴而驕人者民去之位巳髙而檀權者君惡之禄巳厚而不足者患處之孫叔敖再拜曰謹受命願聞餘教父曰位巳髙而意益下官益大而心益小禄巳厚而愼不取君守此三者足以治楚矣說苑曰魏公子牟東行穰侯送之曰先生將去之山東矣獨無一言以教冉乎魏公子曰微君言之牟幾忘語君君知夫官不與勢期而勢自至乎勢不與冨期而冨自至乎冨不與貴期而貴自至乎貴不與驕期而驕自至乎驕不與罪期而罪自至乎罪不與死期而死自至乎穰侯曰善謹受明教􅀃苑曰髙上尊貴無以驕人聦明聖智無以窮人資給疾速無以先人剛毅勇猛無以勝人不知則問不能則學雖知必質然後辯之雖能必讓然後爲之故士雖聦明聖智自守以愚功􅀍天下自守以讓勇力距丗自守以怯冨有四海自守以廉此謂髙而不危滿而不溢者也􅀃苑曰齊桓公爲大臣具酒期以日中管仲後至桓公舉觴以飲之管仲半弃酒桓公曰期而後至飲而弃酒於禮可乎管仲對曰臣聞酒入舌出舌出者言失言失者身弃臣計弃身不如弃酒桓公􅀏曰仲父起就坐􅀃􅁐曰常樅有疾者老子徃問焉曰先生疾甚矣無遺教可以語諸弟子者乎常樅曰子雖不問吾將語子曰過故郷而下車子知之乎老子曰過故郷而下車非謂其不忘故郷耶常樅曰嘻是巳常樅曰過喬木而趨子知之乎老子曰過喬木而趨非謂其敬老耶常樅曰嘻是以張其口而示老子曰吾舌存乎老子曰然吾齒存乎老子曰亡常樅曰子知之乎老子曰夫舌之存也豈非以其柔耶齒之亡也豈非以其剛耶常樅曰嘻是以天下之事巳盡矣無以復語子哉􅀃􅁐曰桓公曰金剛則折革剛則裂人君剛則國家滅人臣剛則交友絶夫剛不和不和則不可用是故四馬不和取道不長父子不和其丗破亡兄弟不和不能乆同夫妻不和家室大凶易曰二人同心其利斷金因不剛也又曰老子曰得其所利必慮其害樂其所樂必頋其敗人爲善者天報以福人爲不善者天報以禍也故曰禍兮福所􅀝福兮禍所伏戒之愼之君子不務何以備之夫上知天則不失時下知地則不失財日夜愼之則無害矣太公金匱曰武王問師}
