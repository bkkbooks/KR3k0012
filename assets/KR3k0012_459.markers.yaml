  - {type: variant, offset: 253, length: 6, content: 念爾祖聿脩厥, krp: 得也其過也不細必亟遣之令尹曰諾明日王薨令尹即拜苑蘇爲上卿而逐申伯出於國諸葛亮集先主遺詔勑後主曰勿以惡小而爲之勿以善小而不爲唯賢唯}
  - {type: variant, offset: 255, length: 0, content: '', WYG: 以事將閒居以安性覃思以終業自非國君之命問親族之憂慶展孝墳墓觀省野物曷常扶杖出門乎家事大小汝一承之吾㷀㷀一夫曾無同生相依其朂求君子之道研鑚勿替恭慎威儀以近有德顯譽成於僚友德行立於巳志若致聲稱亦有榮於所生耳曹植别傳曰植博學有髙才年十餘歳誦詩論及賦十萬言性簡易不事華麗太}
