  - {type: variant, offset: 305, length: 2, content: 及此, SBCK: 報董生有云弔者在門賀者在閭有憂則恐懼愼事愼事則必有善功而遺福也蔡邕女誡曰心猶首面也是以甚致飾焉面一旦不脩則塵垢穢之心一朝不思善則邪惡入之咸知飾其面不脩其心夫面之不飾愚者謂之醜心之不脩賢者謂之惡愚者謂之醜猶可賢者謂之惡將何容焉故覽照拭面則思其心之㓗也傳脂則思其心之軟也加粉則思其心之鮮也澤髪則思其心之順也用櫛則思其心之理也立髻則思其心之正也攝􅁂則思其心之整也蔡邕廣連珠曰臣聞目瞤耳鳴近夫小戒也狐鳴犬嘷家人小祅也猶忌愼動作封鎮書符以防其禍是故}
