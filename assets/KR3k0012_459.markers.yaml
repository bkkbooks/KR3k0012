  - {type: variant, offset: 289, length: 0, content: '', SBCK: 益恩曰吾家舊貧爲父母羣弟所容去厮役之吏遊周􅁗之都徃來幽并兖豫之役􅀱覲通人大儒得意者咸從捧手有所受焉遂愽稽六藝究覽傳記今我告尔以事將閑居以安性覃思以終業自非國君之命問親族之憂展孝墳墓觀省野物曷常扶杖出門乎家事大小汝一承之吾焭焭一夫曾無同生相依其朂求君子之道研鑚勿替㳟愼威儀以近有德顯譽成於僚友德行}
