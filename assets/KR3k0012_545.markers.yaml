  - {type: variant, offset: 1365, length: 312, content: 其質謂無飾又春官天府曰凡國之玉鎮大寶器藏焉若有大祭大喪則出陳之既事藏之玉鎮大寶器玉瑞玉器之美者也禘祫及喪陳之以華國也凡吉凶之事祖廟之中沃盥執燭吉事四時祭也凶事后王喪朝於祖廟之奠也又春官職喪曰掌諸侯之喪及卿大夫士凡有爵者之喪以國之喪禮涖其禁乃序其事國之喪禮喪服土喪既夕土虞今存者也其餘則亡事謂小歛大斂葬也凡國有司以王命有事焉則詔贊主人有事謂含遂贈之屬鄭司農云凡國諸侯國也有司謂王有司以命有事職喪主詔贊主人凡公有司之所共職喪令之趣其事今令其當共物者給事之期也有司或言公或言國者由其君所來也居其官曰公又春官司巫曰凡喪事掌巫降之禮降下也下神之禮也又春官太史曰大喪執法以涖勸防鄭司農云勸防六引六沸也遣之日讀誄遣謂祖廟之庭大奠將行之時也, WYG: 聖}
