  - {type: variant, offset: 2396, length: 289, content: 敬眾也又夏官司兵曰大喪廞五兵廞興也興作明器之役器五兵也又夏官圉人曰喪紀牽馬而入陳廞馬亦如之廞馬遣車之馬也又秋官大司寇曰凡朝覲會同前王大喪亦如之大喪所前或嗣王也又秋官士師曰諸侯為賓則帥其屬而蹕于王宮大喪亦如之又秋官鄉士曰大喪紀帥其屬夾道而蹕屬中士已下也又秋官司隸曰賓客喪紀之事則役其煩辱之事煩猶劇也士喪禮下篇曰隸入涅廁又秋官大行人曰若有大喪則詔相諸侯之禮詔相左右告教之禮記檀弓上曰子上之母死而不喪門人問諸子思曰昔者子之先君子喪出母乎曰然子之不使白也喪之何也子思曰昔者吾先君子無所失道道隆則從而隆道汙則從而汙伋則安能為伋也妻者是為白也母不為伋也妻者是不為白也母孔氏之不喪出母自子思始, SBCK: 􅂼米三具􅂼米粳米}
