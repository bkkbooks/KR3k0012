  - {type: variant, offset: 969, length: 4, content: 土地厚薄, WYG: 質而已矣又曰孔子之喪公西赤掌𦵏焉含以蔬米三俱蔬米粳米也禮記曰嘉蔬襲衣十有一稱加朝服一冠章服之冠佩象環徑五寸而綦組綬綦雜同色也棺四寸栢椁五寸飾棺廧置翣設披周也設崇殷也綢練設旐夏也按柩行加夹司官者也崇牙旗上色也綢練旌旗之扛𦵏乗車所建也旌旗之疏終緇布廣充幅長尋曰疏也兼用三王之禮所以尊師且備古也後漢書禮儀志曰登遐皇后詔三公與喪事百官皆衣白單衣白幘不冠閉城門宫門近臣中黄門持兵虎賁羽林中郎署皆嚴宿衛百官哭臨殿下是日夜下竹使符吿郡國二千石諸侯王竹使符到皆伏哭盡哀小斂如禮東園匠考工令奏東園秘器表裏洞赤虡文畫日月鳥龜龍虎連璧偃月牙檜梓宫如故事大斂於兩楹之間干寳晉記曰大鴻臚鄭黙有母喪既喪有司依常使還攝職黙固陳執久乃許之於是定令聴大臣得終喪焉宋書禮志曰鄭𤣥喪制二十七月而終學者多云得禮晉初用王肅議祥禫共月遂以}
  - {type: page-break, offset: 969, content: '', id: KR3k0012_WYG_545-7b, image: WYG0898/WYG0898-0085b.png}
