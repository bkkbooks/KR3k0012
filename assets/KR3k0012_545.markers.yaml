  - {type: variant, offset: 1376, length: 948, content: 凡國之玉鎮大寶器藏焉若有大祭大喪則出陳之既事藏之玉鎮大寶器玉瑞玉器之美者也禘祫及喪陳之以華國也凡吉凶之事祖廟之中沃盥執燭吉事四時祭也凶事后王喪朝於祖廟之奠也又春官職喪曰掌諸侯之喪及卿大夫士凡有爵者之喪以國之喪禮涖其禁乃序其事國之喪禮喪服土喪既夕土虞今存者也其餘則亡事謂小歛大斂葬也凡國有司以王命有事焉則詔贊主人有事謂含遂贈之屬鄭司農云凡國諸侯國也有司謂王有司以命有事職喪主詔贊主人凡公有司之所共職喪令之趣其事今令其當共物者給事之期也有司或言公或言國者由其君所來也居其官曰公又春官司巫曰凡喪事掌巫降之禮降下也下神之禮也又春官太史曰大喪執法以涖勸防鄭司農云勸防六引六沸也遣之日讀誄遣謂祖廟之庭大奠將行之時也人之道終於此累其行而讀之太師帥瞽廞之而謚瞽史知天道使共其事言王之誄謚成於天也凡喪事考焉為有得失又春官巾車曰掌王之喪車五乘木車蒲蔽犬䄙尾橐䟽飾小服皆䟽木車不漆者也鄭司農云蒲蔽車謂嬴蘭車以蒲為蔽也天子喪服之車也漢儀亦然犬䄙以犬皮為覆笭也故書䟽為揟杜子春讀揟為沙玄謂蔽車旁禦風塵者也犬白犬皮也既以皮為覆笭又以其尾為戈戟之弢麤布飾二物之側為緣也若今攝菔云也服讀為菔刀劍短兵衣也此始遭喪所乘也為君之道尚微備姦臣也書曰以虎賁百人迎子釗亦為備焉素車棼蔽犬䄙素飾小服皆素素車以白土堊車也棼讀為薠薠麻也以麻為蔽也其䄙繒為緣此卒哭所乘也為君之道益著在車可以去戈戟也薻車薻蔽鹿淺䄙革飾故書藻為𨎮杜子春云𨎮讀為華藻之藻直謂華藻也玄謂藻水草名蒼色也以蒼土堊車以蒼繒為蔽鹿夏皮為覆笭也又以所治去毛者緣之此既練所乘之車也駹車雚蔽然䄙髤飾駹車邊側有漆飾也雚細葦席也以為蔽者漆則成藩即吉也然果然也髤赤多黑少之色韋也此大祥所乘之車也漆車藩蔽豻䄙雀飾漆車墨車也藩今時小車藩也漆席以為蔽豻胡犬也雀黑多赤少之色韋也此禫所乘之車也大喪飾遣車遂廞之行之謂陳駕之及葬執蓋從車持旌隨柩路持蓋與旌及墓呼啟關陳車小喪共柩路與其飾柩路載柩車飾柩飾又春官司常曰大喪共銘旌建廞車之旌又夏官大司馬曰大喪平士大夫鄭司農云平壹其服也玄謂平者正其職與位也喪祭奉詔馬牲王之喪以馬祭者蓋遣莫也奉猶送也送之至莫告而藏之又夏官射人曰大喪與僕人遷尸作鄉大夫掌事此其廬不敬者呵罰之僕人大僕與射人俱掌王之朝位也又夏官司士曰大喪作士掌事作六軍之士執披披持棺者又夏官諸子曰大喪正群, SBCK: 孔}
