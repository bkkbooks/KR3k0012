  - {type: variant, offset: 20, length: 3, content: 掌小官, WYG: 則廢外喪則冠而不醴徹饌而埽即位而哭如冠者未至則廢又曰昏禮既納幣有吉日女之父母死則如之何吉日有娶女之日也孔子曰壻使人弔如壻之父母死則女之家亦使人弔父喪稱父母喪稱母各以其正嫡自相弔問禮之宜父母不在則稱伯父世母弔禮不廢也壻已𦵏壻之伯父致命女氏曰某之子有父母之喪不得嗣為兄弟嗣繼也使某致命女氏許諾而弗敢嫁禮也壻免喪女之父母使人請壻弗取而後嫁之禮也又曰大夫士有私喪可以除之矣而有君服焉其除之也如之何孔子曰有君喪服于身不敢私服又何除焉於是乎有過時而弗除也君之喪服除而後殷祭禮也謂主人也支子則否又曰君薨既殯而臣有父母之喪則如之何孔子曰歸居于家有殷事則之君所朝夕否曰君既啓而臣有父母之喪則如之何孔子曰歸哭而反送君曰君未殯而臣有父母之喪則如之何孔子曰歸殯反于君所有殷事則歸朝夕否又曰君出疆以三年}
