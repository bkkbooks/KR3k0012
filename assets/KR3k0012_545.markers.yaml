  - {type: variant, offset: 995, length: 277, content: 又地官舍人曰大喪共飯米敖穀飯所以實口不忍虛也君用梁大夫用稷士用黍皆四升實者唯盈敖穀者措于一旁所以惑蚍蜉又春官大宗伯曰以凶禮哀邦國之憂朝覲會同則為上相大喪亦如之又春官小宗伯曰王崩大肆以秬鬯渳鄭司農云大肆大浴也秬以鬯浴尸也又春官肆師曰大喪大渳以鬯則築鬻築香草煮以為鬯以浴尸也香草鬱又春官鬱人曰大喪之渳共其肆器肆器陳尸之器及葬共其祼器遂埋之遣奠之彝瓚也埋於祖廟階間又春官鬯人曰大喪渳設斗共其釁鬯斗所以沃尸也釁尸所以鬯酒使之香美者也又春官司几筵曰凡喪事設葦席右素几其柏席用萑黼純諸侯則紛純每敦一几喪事諸几奠也萑如葦而細者也鄭司農云柏席迫地之席也葦居其上或曰柏席載, WYG: 既易}
