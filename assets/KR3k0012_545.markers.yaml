  - {type: variant, offset: 221, length: 1, content: 喪, SBCK: 衛國鄙俗不習䘮禮煩吾子辱相焉孔子許之掘中霤而浴中霤室中毀竈以綴足襲屍於牀及葬毀宗􅺺行明不復有}
  - {type: variant, offset: 221, length: 1, content: 喪, krp: 衛國鄙俗不習䘮禮煩吾子辱相焉孔子許之掘中霤而浴中霤室中毀竈以綴足襲屍於牀及葬毀宗􅺺行明不復有}
  - {type: variant, offset: 222, length: 0, content: '', WYG: 不過三年以期増倍五五二十五月義斷仁期十二月也再期二十五月也言期増倍則可矣復云二十五月者容有閏故曰期而復云二十五月也春秋曰閏月𦵏齊景公者數閏也示民有中緣喪絶惰再期萬物再終喪者惰逺逺追慕故因殺以絶家語曰孔子在衛司徒敬子卒夫子弔焉主人不哀夫子哭不盡聲而退蘧伯玉謂孔子曰衛國鄙俗不習喪禮煩我子辱相焉孔子許之掘中霤而浴中霤室中毁竈以綴足籠屍於牀及𦵏毁宗蠟行明不復有}
