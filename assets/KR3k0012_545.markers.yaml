  - {type: variant, offset: 974, length: 0, content: '', WYG: 制江左以来唯晉朝施用縉紳之士猶多遵𤣥議齊書曰皇太子妃薨左衛將軍沈文季經為宫僚未詳服不正僉議曰漢魏已来宫僚先備臣隸之節具體在三既盡王豈無服昔庾翼喪妻王允猶勝府吏宜有小君之服況臣節之重宜依舊君之妻齊衰三月而除後周書曰𦵏文宣后妃奴氏於永固陵帝􅃝跣至陵所詔曰齊斬之情經籍垂訓近代沿革遂亡斯禮伏奉遺令既𦵏使除攀慕几筵情實未忍三年之喪達於天子古今無易之道王者之所常行但時有未諧不得全制軍國務重庶目聴朝縗之節居廬之禮率遵前典以申罔極百寮以下宜依遺令公卿上表固請俯就權制過𦵏即吉帝不許引古禮答之羣臣乃止於是遂申三年}
