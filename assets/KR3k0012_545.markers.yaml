  - {type: variant, offset: 17, length: 6, content: 喪小喪掌小官, SBCK: 夫士有私䘮可以除之矣而有君服焉其除之也如之何孔子曰有君䘮服於身不敢􅀻服又何除焉於是乎有過時而弗除也君之䘮服除而後殷祭禮也謂主人也支子則否又曰君薨旣殯而臣有父母之䘮則如之何孔子曰歸居於家有殷事則之君所朝夕否曰君旣啓而臣有父母之䘮則如之何孔子曰歸哭而反送君曰君未殯而臣有父母之䘮則如之何孔子曰歸殯反于君所有殷事則歸朝夕否又曰君出疆以三年}
