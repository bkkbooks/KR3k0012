  - {type: variant, offset: 1066, length: 299, content: 為上相大喪亦如之又春官小宗伯曰王崩大肆以秬鬯渳鄭司農云大肆大浴也秬以鬯浴尸也又春官肆師曰大喪大渳以鬯則築鬻築香草煮以為鬯以浴尸也香草鬱又春官鬱人曰大喪之渳共其肆器肆器陳尸之器及葬共其祼器遂埋之遣奠之彝瓚也埋於祖廟階間又春官鬯人曰大喪渳設斗共其釁鬯斗所以沃尸也釁尸所以鬯酒使之香美者也又春官司几筵曰凡喪事設葦席右素几其柏席用萑黼純諸侯則紛純每敦一几喪事諸几奠也萑如葦而細者也鄭司農云柏席迫地之席也葦居其上或曰柏席載黍稷之席也玄謂柏槨字磨減之餘也槨席藏中神坐之席也敦謂曰燾燾覆也棺在殯則槨敦既窆則加見皆謂覆之周禮雖合葬及周時在殯皆異几體實不同也祭於廟同几精氣合凡吉事變凡凶事仍几古書仍為鄭司農云變几變更, SBCK: 從}
