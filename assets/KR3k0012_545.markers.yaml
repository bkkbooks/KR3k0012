  - {type: variant, offset: 2700, length: 2, content: 叔朱, SBCK: 典䘮事百官皆衣白單衣白幘冠閉城門宫門近臣中黃門持兵虎賁羽林郎中署皆嚴宿衛官府各警北軍五校繞宮屯兵黃門令尚書御史謁者晝夜行陳三公所手足色膚如禮皇后皇太子􅂘踴如禮沐浴如禮守宮令兼東園匠將女執事黃綿緹繒金縷玉押如故事飯含珠玉如禮氷槃如禮百官哭臨殿下是日夜下竹使符到皆伏哭盡哀小歛如禮東園匠考工今東園秘器表裏洞赤文盡日月烏􅀛龍虎連璧偃明如故事大歛于兩楹之間于寳晋紀曰大鴻臚鄭黙}
