  - {type: variant, offset: 1884, length: 501, content: 人迎子釗亦為備焉素車棼蔽犬䄙素飾小服皆素素車以白土堊車也棼讀為薠薠麻也以麻為蔽也其䄙繒為緣此卒哭所乘也為君之道益著在車可以去戈戟也薻車薻蔽鹿淺䄙革飾故書藻為𨎮杜子春云𨎮讀為華藻之藻直謂華藻也玄謂藻水草名蒼色也以蒼土堊車以蒼繒為蔽鹿夏皮為覆笭也又以所治去毛者緣之此既練所乘之車也駹車雚蔽然䄙髤飾駹車邊側有漆飾也雚細葦席也以為蔽者漆則成藩即吉也然果然也髤赤多黑少之色韋也此大祥所乘之車也漆車藩蔽豻䄙雀飾漆車墨車也藩今時小車藩也漆席以為蔽豻胡犬也雀黑多赤少之色韋也此禫所乘之車也大喪飾遣車遂廞之行之謂陳駕之及葬執蓋從車持旌隨柩路持蓋與旌及墓呼啟關陳車小喪共柩路與其飾柩路載柩車飾柩飾又春官司常曰大喪共銘旌建廞車之旌又夏官大司馬曰大喪平士大夫鄭司農云平壹其服也玄謂平者正其職與位也喪祭奉詔馬牲王之喪以馬祭者蓋遣莫也奉猶送也送之至莫告而藏之又夏官射人曰大喪與僕人遷尸作鄉大夫掌事此其廬不敬者呵罰之僕人大僕與射人俱掌王之朝位也又夏官司士曰大喪作士掌事作六軍之士執披披持棺者又夏官諸子曰大喪正群子之服位又夏官虎賁氏曰國有大故則守王門大喪亦如之又夏官太僕曰喪紀正王之服位詔法儀贊王牲事牲事殺割杜載之屬大喪始崩戒鼓傳達于, WYG: ''}
