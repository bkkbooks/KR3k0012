  - {type: 'tls:seg', offset: 215, content: '', id: KR3k0012_CHANT_545-5a.1}
  - {type: 'tls:seg', offset: 215, content: '', id: KR3k0012_CHANT_545-5a.2}
  - {type: variant, offset: 215, length: 0, content: '', SBCK: 自三年以至緦皆歳時之數也言旣象天地}
  - {type: variant, offset: 215, length: 0, content: '', WYG: 然則何以三年也言法此變易可以期也何乃三年為曰加隆焉爾也焉使倍之故再期也言於父母加隆其恩使倍期也焉語辭猶云所以也由九月以下何也曰焉使弗及也焉使其恩不若父母故三年以為隆緦小功以為殺期九月以為間上取象於天下取法於地中取則於人人之所以羣居和壹之理盡矣取象於天地謂法其變易也自三年以至緦皆嵗時之數也言既象天地}
  - {type: page-break, offset: 215, content: '', id: KR3k0012_WYG_545-5b, image: WYG0898/WYG0898-0083d.png}
  - {type: variant, offset: 215, length: 0, content: '', krp: 自三年以至緦皆歳時之數也言旣象天地}
  - {type: punctuation, offset: 216, content: 《, id: KR3k0012_CHANT_545-bkkpn89}
  - {type: variant, offset: 216, length: 0, content: '', SBCK: 足以盡人聚居純厚之恩也左傳哀下曰越圍呉趙孟降於䘮食趙孟襄子無恤時有父簡子䘮楚隆曰三年之䘮親暱之極也主又降之無乃有故乎楚隆襄子家臣趙孟曰黄池之役先主與呉王有質曰好惡同之今越圍呉嗣子不廢舊業而敵之嗣子襄子自謂欲敵越救呉非􅀳之所能及也吾是以爲降論語陽貨曰宰我問三年之䘮期巳乆矣君子三年不爲禮禮必壞三年不爲樂樂必崩舊榖旣没新榖旣􅂛鑚燧改火期可巳矣子曰食夫稻衣夫錦於女安乎曰安女安則爲之夫君子之居䘮食旨不甘聞樂不樂居處不安故不爲也今女安則爲之宰我出子曰予之不仁也子生三年然後免於父母之懷夫三年之䘮}
  - {type: page-break, offset: 216, content: '', id: KR3k0012_SBCK_545-3b}
  - {type: variant, offset: 216, length: 0, content: '', WYG: 足以盡人聚居純厚之恩也左傳哀下曰越圍吳趙孟降於喪食趙孟襄子無恤時有父簡子之喪楚隆曰三年之喪親䁥之極也主又降之無乃有故乎楚隆襄子家臣趙孟曰黄池之役先主與吳王有質曰好惡同之今越圍吳嗣子不廢舊業而敵之嗣子襄子自謂欲敵越救吳非晉之所能及也吾是以為降論語陽貨曰宰我問三年之喪期已久矣君子三年不為禮禮必壞三年不為樂樂必崩舊穀既没新穀既升鑚燧改火期可已矣子曰食夫稻衣夫錦於女安乎曰安女安則為之夫君子之居喪食㫖不甘聞樂不樂居處不安故不為也今女安則為之宰我出子曰予之不仁也子生三年然後免於父母之懷夫三年之喪}
  - {type: page-break, offset: 216, content: '', id: KR3k0012_WYG_545-6a, image: WYG0898/WYG0898-0084a.png}
  - {type: variant, offset: 216, length: 0, content: '', krp: 足以盡人聚居純厚之恩也左傳哀下曰越圍呉趙孟降於䘮食趙孟襄子無恤時有父簡子䘮楚隆曰三年之䘮親暱之極也主又降之無乃有故乎楚隆襄子家臣趙孟曰黄池之役先主與呉王有質曰好惡同之今越圍呉嗣子不廢舊業而敵之嗣子襄子自謂欲敵越救呉非晉之所能及也吾是以爲降論語陽貨曰宰我問三年之䘮期巳乆矣君子三年不爲禮禮必壞三年不爲樂樂必崩舊榖旣没新榖旣升鑚燧改火期可巳矣子曰食夫稻衣夫錦於女安乎曰安女安則爲之夫君子之居䘮食旨不甘聞樂不樂居處不安故不爲也今女安則爲之宰我出子曰予之不仁也子生三年然後免於父母之懷夫三年之䘮}
  - {type: variant, offset: 217, length: 2, content: 官籩, SBCK: 下之通䘮也予也有三年之愛於其父母乎言子之於父母欲報之恩昊天罔極而予也有三年之愛乎孝經援神契曰䘮不過三年以期増倍五五二十五月義斷仁期十二月也再期二十五月也言期増倍則可矣復云二十五月者容有閏故曰期而後三十五月也春秋曰閏月葬齋景公看數閏也示民有終縁䘮絶情再期萬物再終䘮者弥逺逺追慕殺故因殺以絶家語曰孔子在衛司徒敬子卒夫子弔焉主}
  - {type: variant, offset: 217, length: 3, content: 官籩人, WYG: 下之通喪也予也有三年之愛於其父母乎言子之於父母欲報之恩昊天罔極而予也有三年之愛乎孝經援神契}
  - {type: page-break, offset: 217, content: '', id: KR3k0012_WYG_545-6b, image: WYG0898/WYG0898-0084b.png}
