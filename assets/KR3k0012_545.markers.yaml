  - {type: variant, offset: 416, length: 537, content: 又天官世婦曰掌喪紀之事帥女宮而濯概為栥盛概拭也為猶差擇也又天官女御曰大喪掌沐浴王及后之喪也后之喪持翣從世婦而吊于卿大夫之喪從之數蓋如使者之介也又天官典絲曰喪紀共其絲纊組文之物以給線縷著盱口綦握之屬也青與赤謂之文又天官內司服曰右之喪共其衣服凡內具之物內具紛悅線纊槃帙之屬又地官大司徒曰大喪帥六鄉之眾庶屬其六引而治其政令眾庶所致役也鄭司農云引喪車索也六鄉主六引遂六主紼也若國有大故則致萬民于王門令無節者不行天下大故謂王崩及冠兵也節六節也有節乃得行防姦偽也又地官曰鄉師大喪用役則帥其民而至遂治之治謂監督其事及葬執纛以與匠師御柩而治役匠師事官之屬其司官若鄉師之於司徒也鄉師主役匠師主眾匠共主葬引翿羽葆幢也爾雅曰纛醫也以指麾輓柩之役正其行列進退及窆執斧以涖匠師匠師主豐碑之事報執斧以莅之使戒其事又地官閭胥曰凡喪紀之數聚眾庶既比則讀法書其敬敏任恤者喪紀大喪之喪之事也皆會聚眾民因以讀法勑戒之也又地官遂師曰大喪使帥其屬以幄帟先道野役及窆抱磨共丘籠及蜃車之役使以幄帟先者太宰也其餘司徒也幄帟所為葬窆之間先張神坐也道野役帥以至墓也丘籠之役竁復士也其器曰籠蜃車柩路也載柳四輪迫地而行似於蜃因取名焉行至壙乃脫更復載復以龍斬又地官委人曰喪紀共其薪蒸木材又地官土均曰禮俗喪紀祭祀皆以地媺惡為輕重之法而, SBCK: 孔子}
