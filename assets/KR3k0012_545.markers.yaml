  - {type: variant, offset: 2799, length: 0, content: '', SBCK: 文除周公之禮改三年之䘮不亦難哉父母者天地天崩地壞三年不亦冝乎荀氏家傳曰荀爽對䇿曰臣聞火生於木故其德孝漢之謚帝稱孝其義取此也故漢制天下皆誦孝經選吏則舉孝廉盖以孝務也夫䘮親自盡孝之終也今二千石不得行三年䘮非所以崇孝道而稱火德也頃者漢嗣數乏枝葉不繁其咎未必不由此徃者文帝勞謙自約行過于儉故有遺詔以日易月此所謂夷惠激俗當身而巳貫萬丗爲}
