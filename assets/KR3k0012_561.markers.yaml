  - {type: variant, offset: 1711, length: 2, content: 魯城, SBCK: 衰絰亦欲與徃陽虎曰子謂不然乎季氏饗士不及子禮統曰弔生曰唁弔死曰弔生謂之唁何非有喪之位哭之事但嗟嘆以言故謂之嗟弔死謂之弔何弔者毒也致有恩厚禮無服属但致傷哀痛毒故謂之弔白虎通曰檀弓記曰天子哭諸侯爵弁純衣又曰遣大夫弔辭曰皇天降災子獨遭離之嗚呼哀哉莊子曰孔子圍於陳蔡之間七日不火食太公任弔之曰幾死乎曰然子􅁖乎曰然任曰直木先伐甘井先竭子其意者飾智以驚愚修身以明汙昭昭乎􅀂掲日月而行故不免又曰莊子妻死惠子弔之則方箕踞鼓盆而歌曰察其始夲無生非徒無生也夲無形非徒無形也夲無氣變而有生今變而之死人且􅃦於巨室我噭噭隨而􅂘之自以爲不通乎命故止之又曰老聃死􅁗失弔之三號而出弟子曰非夫子之友􅁘曰然然則弔焉􅀂此可乎曰然始也吾以爲其人也而今非也向吾入而弔焉有老者􅂘之如􅂘其子少者􅂘之如哭其母彼其所以㑹之必有不蘄言而言不蘄􅂘而哭者是遁天倍情忘其所受淮南子曰}
  - {type: page-break, offset: 1711, content: '', id: KR3k0012_SBCK_561-5b}
  - {type: page-break, offset: 1711, content: '', id: KR3k0012_SBCK_561-6a}
  - {type: variant, offset: 1711, length: 2, content: 魯城, WYG: 衰絰亦欲與往陽虎曰子謂不然乎季氏饗士不及子禮統曰弔生曰唁弔死曰弔生謂之唁何非有泣哭之事但嗟嘆以言故謂之唁弔死謂之弔何弔者毒也致有恩厚禮無服屬但致傷哀痛毒故謂之弔白虎通曰檀弓記曰天子哭諸侯爵弁純衣又曰遣大夫弔辭曰皇天降災子獨離之嗚呼哀哉莊子曰孔子圍於陳蔡之間七日不火食太公任弔之曰饑乎曰然子惡乎曰然任曰直木先伐甘井先竭子其意者飾智以驚愚修身以明汚昭昭乎若揭日月而行故不免又曰莊子妻死惠子弔之則方箕踞皷盆而歌曰察其始本無生非徒無生也本無形非徒無形也本無氣變而有生今變而之死人且寢於巨室我嗷嗷隨而哭之自以為不通乎命故止之又曰老耼死秦侯弔之三號而出弟子曰非夫子之友耶曰然然則弔焉若此可乎曰然始也吾以為其人也而今非也向吾入而弔焉有老者哭之如哭其子少者哭之如哭其父彼其所以會之必有不蘄言而言不蘄哭而哭者是遁天倍情忘其所受淮南子曰}
