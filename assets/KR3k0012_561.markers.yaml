  - {type: variant, offset: 2136, length: 239, content: 制於張說曰長安神龍之祭有黃州僧泓者能通鬼神之意而以人事參之僕嘗聞其言猶記其要墓欲深而狹深者取其幽狹者取其固平地之下一丈二尺為土界又一丈二尺為水界各有龍守之土龍六年而一暴水龍十二年而一暴當其隧者神道不安故深二丈四尺之下可以設窀穸墓之四維謂之折壁欲下闊而上歛其中項謂之中樵中樵欲俯嶔而傍煞墓中末粉為飾以代石堊不置瓴甋瓷瓦以其近於火不置黃金以其久而為怪不置朱丹雄黃譽石以其氣燥而烈使墳上草木枯而不潤不置羽毛其近於屍也鑄鐵為牛豕之像可以禦二龍王潤而潔能和百神寘之墓內以助神道僧泓之說如此, SBCK: ''}
