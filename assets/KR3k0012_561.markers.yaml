  - {type: 'tls:seg', offset: 25, content: '', id: KR3k0012_CHANT_561-1a.7}
  - {type: variant, offset: 25, length: 2, content: 將若, SBCK: 非之曽子曰我弔也與哉於朋友哀痛甚而徃􅂘之非􅀂凡弔又曰晉獻公之喪秦穆公使人弔公子重耳獻公殺其子申生重耳避難出奔是時在翟就弔之且曰寡人聞之亡國􅁪於斯得國􅁪於斯言在喪代之際雖吾子儼然在憂服之中喪亦}
  - {type: variant, offset: 25, length: 1, content: 將, WYG: 非禮曽子曰我弔也與哉於朋友哀痛甚而往哭之非}
  - {type: variant, offset: 25, length: 1, content: 將, krp: 非之曽子曰我弔也與哉於朋友哀痛甚而徃哭之非}
  - {type: variant, offset: 27, length: 0, content: '', WYG: 凡弔又曰晉獻公之喪秦穆公使人弔公子重耳獻公殺其子申生重耳避難出亡是時在翟就弔之且曰寡人聞之亡國恒於斯得國恒於斯言在喪代之際雖吾子儼然憂服之中喪亦}
  - {type: page-break, offset: 27, content: '', id: KR3k0012_WYG_561-4a, image: WYG0898/WYG0898-0182a.png}
  - {type: variant, offset: 27, length: 0, content: '', krp: 凡弔又曰晉獻公之喪秦穆公使人弔公子重耳獻公殺其子申生重耳避難出奔是時在翟就弔之且曰寡人聞之亡國恒於斯得國恒於斯言在喪代之際雖吾子儼然在憂服之中喪亦}
  - {type: variant, offset: 28, length: 1, content: 哭, SBCK: 可乆也時亦不可失也孺子其圗之勸其反國意欲納之喪亡失位孺穉也以告舅犯舅犯是重耳之舅狐偃也字子犯舅犯曰孺子其辭焉喪人無寳仁親以爲寳寳謂善道可守者仁親親行仁義父死之謂何又因以爲利欲反國求爲後是利父死而天下其孰能􅀃之孺子其辭焉說猶解也又曰羔裘􅀇冠夫子不以弔不以􅁻服弔喪也又曰衛司徒敬子死子夏弔焉}
  - {type: page-break, offset: 28, content: '', id: KR3k0012_SBCK_561-3a}
  - {type: variant, offset: 28, length: 1, content: 哭, WYG: 可乆也時亦不可失也孺子其圖之勸其反國亦欲納之喪亡失位孺孺穉也以告舅犯舅犯重耳之舅狐偃也子犯字也舅犯曰孺子其辭焉喪人無寳仁親以為寳寳謂善者道可守者仁親親仁義也父死之謂何又因為利欲反國求為後是利父死而天下其孰能說之孺子其辭焉又曰羔裘𤣥冠夫子不以弔不以吉服弔喪也又曰衞司徒敬子死子夏弔焉}
