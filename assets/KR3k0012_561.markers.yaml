  - {type: punctuation, offset: 217, content: 「, id: KR3k0012_CHANT_561-bkkpn58}
  - {type: variant, offset: 218, length: 1, content: 桓, SBCK: 侯歸遇􅂎梁之妻於郊梁戰死妻行迎䘮使弔之辭曰殖之有罪何辱命焉言􅀂有罪不足弔􅀂免於罪則有先人之敝廬在下妾不得與郊弔婦人无外事故下猶賤也齊侯弔諸其室傳善婦人有礼又曰㳺􅁻相鄭伯以如晉亦賀虒祁也史趙見子太叔曰甚哉其相蒙也􅂪欺也可弔也而又賀之子太叔曰􅀂何弔也豈特唯我賀將天下實賀又曰琴張聞宗魯死琴張孔子弟子字子開名牢將徃弔之仲尼曰齊豹之盗而孟縶之賊女何弔焉言齊豹所以爲盗孟縶所以見賊背由宗魯又曰晉頃}
  - {type: page-break, offset: 218, content: '', id: KR3k0012_SBCK_561-4a}
  - {type: variant, offset: 218, length: 1, content: 桓, WYG: 侯歸遇杞梁之妻於郊梁戰死妻行迎喪使弔之辭曰殖之有罪何辱命焉故若有罪不足弔若免於罪有先人之敝廬在下妾不得與郊弔婦人無外事故不得與也齊侯弔諸其室傳謂婦人有禮又曰游吉相鄭伯以如晉亦賀虒祈也使趙子見太叔曰甚哉其相蒙也䝉欺也可弔也而又賀之子太叔曰若何弔也其唯我賀將天下實賀又曰琴張開宗魯死琴張孔子弟子字子開名牢將往弔之仲尼曰齊豹之盗而孟勢之賊又何弔焉言齊豹所以為盗孟勢所以見賊皆由宗魯又曰晉頃}
  - {type: page-break, offset: 218, content: '', id: KR3k0012_WYG_561-6b, image: WYG0898/WYG0898-0183b.png}
