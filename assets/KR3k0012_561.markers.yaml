  - {type: variant, offset: 2539, length: 595, content: 高一下小頓則大起出公卿若三重之山望之似城郭多諸支別者亦出公卿如新月形在腹中葬冢之所若至日沒見日光者出封侯又曰凡相山陵之法山望如龜狀葬之出公卿封侯代代不絕山望如龍狀有頭尾蜲虵者葬之出二千石凡依山作冢皆當立在山東為利得山之形力也山如龜形又巍巍直上如𨵗狀出二千石又曰欲知貧富堽陵肥薄狀如肥馬草木茂盛色黃紫皆富也堽陵多傷𡙇土色赤白地瘠草木黃赤不茂或多細石皆貧相冢書曰冢欲得見郡縣城郭欲得連屬長長無極冢青氣鬱鬱出二千石赤氣出公卿白氣出刑戮黃氣出封侯欲得雌龍地多子孫不用雄龍堽武子堽又曰凡葬於龍耳貴出侯青烏子稱山三重相連名傘山葬之出二千石張載七哀詩曰北邙何纍纍高陵有四五借問誰家冢皆云漢世主魏武帝遺令曰汝等時時登銅雀臺望吾西陵墓田魏文帝為漢帝置守冢詔曰朕承符運受終革命其敬事山陽公如舜之宗堯有始有卒傳之無窮前群司奏處正朔欲使一皆從魏制意所不安其令山陽公於其國中正朔服色祭祀禮樂自如漢又為武昭宣明帝置守冢各三百家宋孝武置自古帝王守冢戶詔曰先代帝王因時創業君人建國禮尊南面而歷運推移年代久遠丘壠殘毀樵牧相趍塋兆堙蕪封樹莫辨自古以來帝王陵墓可隨近十戶蠲其役以供守視宋高祖脩楚元王墓詔曰夫褒賢崇德千載彌尊敦本敬始義隆自遠楚元王積仁基德啟藩斯境素風道隆作範後昆本支之祚實隆鄙宗遺芳餘烈奮于百代而丘封依然墳塋莫翦感遠存往慨焉永懷夫愛人懷樹甘棠且猶勿翦追甄墟墓信陵尚或不絕況瓜瓞所興開源自本者乎可蠲復近墓五家長給灑掃, SBCK: ''}
