  - {type: variant, offset: 531, length: 751, content: 三十里有延陵兒冢本云其高可隱今乃二丈餘似是後人陪之伍輯之從征記曰齊襄王墓在汝水西墓西有僖公墓東有四田墓傳云倨榮廣布也墓皆方墓圓墳戴延之西征記曰彭城南有亞父范曾冢冢高四十餘丈東北有隧道其城北三里有劉向墓泗水東三里漢大夫龔勝冢石碣猶存恥登王莽之朝不食而死又曰金鄉焦氏山北數里有漢司隸校尉魯峻冢前有古石祠堂堂壁皆青石隱起自書契以來忠臣孝子貞婦孔子及弟子七十二人形像皆刻石記之伏滔北征記曰姑熟九井山北十里有吳大將諸葛瑾墓墓墻猶存西北十八里直瀆前墓是吳將甘寧墓也相者云此墓有王氣孫皓鑿其後計里名為直瀆續述征記曰太公冢在堯山北五里平地為墳高十丈曾有發之者冢深數十仞得一銅槨金玉甚多尚父五世葬周斯寔田和冢也和遷齊居於海上而別為諸侯亦稱太公也又曰宿預縣水南大徐城古之徐國城北徐君墓季子解劍墳樹則斯地也又曰城陽縣城二里小城二里小城南九里有堯陽自漢迄于晉二千石及丞尉刊名堯即位至永嘉三年二千七百有二十一載記于堯碑城東南六里堯母慶都墓稱曰靈臺堯陵北二里仲山甫墓墓前祠堂石室儼然若新皇覽冢墓記曰顓頊冢在東郡濮陽縣頓丘城外廣陽里中王莽時使使者祠顓頊冢又曰秦始皇冢在驪山古之驪戎國今之所豐也晉獻公伐驪戎獲二女其山陰多黃金其陽多美玉謂藍田是也故貪而葬焉并天下徒七十餘萬穿入地洞三泉而致槨宮觀奇器珍怪諸物藏之令一匠人作機弩人有近穴輒射之以水銀為百川江河大海金銀為鳧鶴機關轉相斡終而復始上具畫天文以人魚膏為燈度久不滅後宮無子者皆殉從死者甚眾恐工匠知之殺工匠於藏中因閉羨門復土樹草木以像山墳高五十餘丈周廻五里餘後項籍燒其宮觀關東賊發之後牧羊兒亡羊羊入藏中持火炤羊燔其槨後賊遂取其銅又曰太上皇葬萬年高帝父也高帝葬長陵孝惠帝霸陵諸陵皆用瓦器不為墳王莽之亂天下無道獨無災害孝景帝葬陽陵孝武皇帝葬茂陵孝昭皇帝葬平陵孝宣皇帝葬杜陵孝元帝葬渭陵元帝下, SBCK: ''}
