  - {type: variant, offset: 2378, length: 2, content: 理卿, SBCK: 夫弔於大夫始死而徃朝服禓裘如􅁻時也當歛之時而至則弁絰服皮弁之服以襲裘也主人成服而徃則皮弁絰而加􅃬衰也大夫於士有朋友之恩乃得弃絰謝兹喪服圗曰天王弔三公及三􅀌弁絰􅃬衰弔六郷弁絰􅃬衰弔大夫弁絰疑衰弔士弁絰緦衰弔畿内諸侯弁絰緦衰郭太別傳曰賈淑字子厚林亭郷人雖丗有冠冕而性險害邑里患之林宗遭母憂淑來弔之而鉅鹿孫咸直亦至咸直以林宗賢而受􅁖人弔心恠之不進而去林宗遽追而謝曰賈子厚誠㓙德然洗心同善仲尼不逆互郷故許其進也淑聞之改過自厲終成善士又林宗有母喪}
  - {type: variant, offset: 2378, length: 1, content: 理, WYG: 夫弔於大夫始死而往服朝服裘如吉時也當斂之時而至則弁絰服皮弁之服以襲裘也主人成服而往則皮弁絰而加錫衰也大夫於士有朋友之恩乃得弁絰謝茲喪服圖曰天王弔三公及三孤弁絰錫衰弔六}
  - {type: variant, offset: 2378, length: 2, content: 理卿, krp: 夫弔於大夫始死而徃朝服禓裘如吉時也當歛之時而至則弁絰服皮弁之服以襲裘也主人成服而徃則皮弁絰而加錫衰也大夫於士有朋友之恩乃得弃絰謝兹喪服圗曰天王弔三公及三孤弁絰錫衰弔六郷弁絰錫衰弔大夫弁絰疑衰弔士弁絰緦衰弔畿内諸侯弁絰緦衰郭太別傳曰賈淑字子厚林亭郷人雖丗有冠冕而性險害邑里患之林宗遭母憂淑來弔之而鉅鹿孫咸直亦至咸直以林宗賢而受悪人弔心恠之不進而去林宗遽追而謝曰賈子厚誠㓙德然洗心同善仲尼不逆互郷故許其進也淑聞之改過自厲終成善士又林宗有母喪}
