  - {type: variant, offset: 19, length: 0, content: '', SBCK: 深衣練冠待于廟垂涕洟子游觀之曰將軍文氏之子其庶幾乎亡於禮者之禮也其動也中中禮之變也又曰死而不弔者三謂輕身亡孝也畏人或時以非罪攻巳不能有以􅀃之死之者孔子畏於國是也猒行止危險之下溺不乗橋舡又曰曽子弔於負夏􅀒夏衛也主人旣祖填池祖謂移柩車去載處爲行始也填池當爲奠徹聲之誤奠遣奠設祖奠推柩而反之反於載處荣曽子弔欲更始降婦人而后行禮禮旣祖而婦人降今反柩婦人辟之復升堂矣柩無反而反之又降婦人盖欲矜賔於此婦人皆非也從者曰禮與怪之曽子曰夫祖者且也且未定之辝且胡爲其不可以反􅀫也曽子襲裘而弔子游禓裘而弔曽子指子㳺而示人曰夫夫也爲習於禮者如之何其禓裘而弔也又曰哀公使人弔蕢尚遇諸道辟於路􅀞宫而受弔焉哀公魯君也􅀞地爲宫象曽子曰蕢尚不如􅂎梁之妻知禮也齊莊公襲莒于奪􅂎梁死焉其妻迎其柩於路而哭之哀莊公使人弔之對曰君之臣不免於罪則將肆諸市朝而妻妾執肆陳尸也大夫以上於朝士以下於市執拘也君之臣免於罪則有}
  - {type: page-break, offset: 19, content: '', id: KR3k0012_SBCK_561-1b}
  - {type: variant, offset: 19, length: 0, content: '', WYG: 深衣練冠待于廟垂涕洟子游觀之曰將軍文氏之子其庶幾乎亡於禮者之禮也其動也中中禮之變也又曰死而不弔者三謂輕身亡孝也畏人或時以非罪攻已不能有以脫而死之者孔子畏於匡是也厭行止危險之下溺不乗橋船又曰曽子弔於負夏負夏衞也主人既祖填池祖謂移柩車去載處為行始也填池當為奠徹聲之誤奠趣遣奠設祖奠降婦人而後行禮禮既祖而婦人降於及柩婦人辟之復升堂矣柩無反而反之又降婦人葢欲矜賓於此婦人皆非也從者曰禮與怪之曽子曰夫祖者且也且未定之辭且胡為其不可以反宿也曽子襲裘而弔子游裼裘而弔曽子指子游曰夫夫也為習於禮如之何其裼裘而弔也又曰哀公使人弔蕢尚遇諸道辟於路畫宫而受弔焉哀公魯君也畫地為宫象曽子曰蕢尚不如杞梁妻之知禮也齊莊公襲莒于奪杞梁死焉其妻迎其柩於路而哭之哀莊公使人弔之對曰君之臣不免於罪則將肆諸市朝而妻妾執肆陳尸也大夫以上於朝士以下於市執拘也君之臣免於罪則有}
  - {type: page-break, offset: 19, content: '', id: KR3k0012_WYG_561-2a, image: WYG0898/WYG0898-0181a.png}
  - {type: page-break, offset: 19, content: '', id: KR3k0012_WYG_561-2b, image: WYG0898/WYG0898-0181b.png}
  - {type: variant, offset: 19, length: 0, content: '', krp: 深衣練冠待于廟垂涕洟子游觀之曰將軍文氏之子其庶幾乎亡於禮者之禮也其動也中中禮之變也又曰死而不弔者三謂輕身亡孝也畏人或時以非罪攻巳不能有以說之死之者孔子畏於國是也猒行止危險之下溺不乗橋舡又曰曽子弔於負夏負夏衛也主人旣祖填池祖謂移柩車去載處爲行始也填池當爲奠徹聲之誤奠遣奠設祖奠推柩而反之反於載處荣曽子弔欲更始降婦人而后行禮禮旣祖而婦人降今反柩婦人辟之復升堂矣柩無反而反之又降婦人盖欲矜賔於此婦人皆非也從者曰禮與怪之曽子曰夫祖者且也且未定之辝且胡爲其不可以反宿也曽子襲裘而弔子游禓裘而弔曽子指子㳺而示人曰夫夫也爲習於禮者如之何其禓裘而弔也又曰哀公使人弔蕢尚遇諸道辟於路畫宫而受弔焉哀公魯君也畫地爲宫象曽子曰蕢尚不如𣏌梁之妻知禮也齊莊公襲莒于奪𣏌梁死焉其妻迎其柩於路而哭之哀莊公使人弔之對曰君之臣不免於罪則將肆諸市朝而妻妾執肆陳尸也大夫以上於朝士以下於市執拘也君之臣免於罪則有}
  - {type: variant, offset: 20, length: 0, content: '', SBCK: 人之敝廬在君無所辱命無所辱命辝不受也春秋傳曰齊侯弔諸其室又曰季孫之母死哀公弔焉曽子與子貢弔焉閽人爲君禮弗内也閽人守門者曽子與子貢入於其厩而修容焉更鼎飾子貢先入閽人曰郷者巳告矣旣不敢止}
  - {type: page-break, offset: 20, content: '', id: KR3k0012_SBCK_561-2a}
  - {type: variant, offset: 20, length: 0, content: '', WYG: 人之敝廬在君無所辱命無所辱命辭不受春秋傳曰齊侯弔其室又曰季孫之母死哀公弔焉曽子與子貢弔焉閽人為君在弗内也閽人守門者曽子與子貢入於其厩而修容焉更履飾子貢先入閽人曰鄉者已吿矣既不敢坐}
  - {type: variant, offset: 20, length: 0, content: '', krp: 人之敝廬在君無所辱命無所辱命辝不受也春秋傳曰齊侯弔諸其室又曰季孫之母死哀公弔焉曽子與子貢弔焉閽人爲君禮弗内也閽人守門者曽子與子貢入於其厩而修容焉更鼎飾子貢先入閽人曰郷者巳告矣旣不敢止}
  - {type: variant, offset: 21, length: 2, content: 除身, SBCK: 言下之曽子後入閽人辟之見兩賢相隨彌益恭也渉内霤卿大夫皆辟位公降一等而揖之又曰殷旣封而弔周反哭而弔封當爲空􅉎下棺也孔子曰殷巳慤吾從周又曰曽子與客立於門側其徒趍而出徒謂客之旅曽子曰爾將何之曰吾父死將出哭於巷以爲不可發㓙於人館曰反哭於爾次次舎也禮館人使專之􅀂其自有然曽子北面而弔焉又曰五十無車者不越疆而弔人氣力始衰又曰婦人不越疆而弔人不通於外行弔之日不飲酒食肉焉以全哀也弔於葬者必執引􅀂從柩及壙皆執紼示助之以力車日引棺日紼喪公弔之必有拜者往謝之雖朋友州里舎人可也謂无主後弔曰寡君承事示亦爲執事來主人曰臨君辱臨其臣之喪君遇柩於路必使人弔之君於民臣有父母之恩大夫之喪庶子不受弔不以賤者爲有爵者主又曰子張死曽子有母之喪齊衰而徃􅂘之或曰齊衰不以弔以其}
  - {type: page-break, offset: 21, content: '', id: KR3k0012_SBCK_561-2b}
  - {type: variant, offset: 21, length: 2, content: 除身, WYG: 言下之曽子後入閽人辟之見兩賢相隨彌益恭也涉内霤卿大夫皆辟位公降一等而揖之又曰殷既封而弔周反哭而弔封當為空窆之棺也孔子曰殷已慤吾從周又曰曽子與客立於門側其徒趨而出徒謂客之旅曽子曰爾將何之曰吾父死將出哭於巷以為不可發㓙於人前曰反哭於爾次次舎也禮館人使専之若其自有然曽子北面而弔焉又曰五十無車者不越疆而弔人氣力始衰又曰婦人不越疆而弔人不通於外行弔之日不飲酒食肉焉以全哀也弔於葬者必執引若從柩及壙皆執紼示助之以力車曰引棺曰紼喪公弔之必有拜者往謝之雖朋友州里舎人可也謝無主後弔曰寡君丞事示亦為執事來主人曰臨君辱臨其臣之喪君遇柩於路必使人弔之君之於臣有父母之恩大夫之喪庶子不受弔不以卑者為有爵者主又曰子張死曽子有母之喪齊衰而往哭之或曰齊衰不以弔以其}
