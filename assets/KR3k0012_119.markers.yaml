  - {type: variant, offset: 2234, length: 0, content: '', SBCK: 尚書事粲荒酗酒色遊讌後庭軍國之事一決於准准遂勒兵入宮執粲數而殺之追謚靈帝劉氏無少長男子盡刑于市發掘二陵焚燒宗廟􅀑大哭聲聞百里准自號漢大王置百官遣使稱蕃于晉相國矅自長安赴難前趙録曰麟嘉元年十二月大將軍東平王約卒一􅃌猶煖遂不殯殮至甲戌乃􅂫言見淵於不周山經五日遂復從至崑崙山三日而復反於不周見諸王公卿將相死者悉在大有人民宮室甚壯麗號曰蒙珠離國淵謂約曰東北遮湏夷國無主乆待汝父爲之汝後二年當來後國中大亂相殺害吾家死亡略盡俱可永明輩十數人在耳汝伹還後年當來見汝不遟不乆約拜辭而歸道過一國曰猗尼渠餘國引約入宫與皮囊一枚曰爲吾遺漢皇帝約辭而歸謂約曰劉郎後年來必見過當以女相妻約歸置皮囊於机上俄而􅂫謂左右曰机上取囊來左右取得開有一方白玉題文曰猗尼渠餘國天王敬信遮湏夷國天王歳在攝提當相見馳使奏呈聦曰􅀂當如此吾不懼死也及聦以戊寅歳薨與此玉并葬焉劉曜崔鴻十六國春秋前趙録曰劉曜字永明淵之族子少􅀌見養於淵幼而聦惠性託落髙亮與衆不羣鐵厚一寸射而洞之身長九尺三寸手垂過􅂰生而眉白目有赤光鬚不過百餘根皆長五尺光􅀄元年十月太保呼延晏等自平陽來奔上尊號于矅僣即皇帝位十二月靳准左右車􅀐喬太王騰等殺准奉六璽來降二年夏四月徙都長安立子熈爲皇太子六月繕宗廟社稷南北郊于長安令曰蓋王者之興必禘始祖我皇家之先岀自夏后居于北夷丗跨燕朔光文以漢有天下歳乆恩德結於民庶故立漢祖宗之廟以懷民望昭武因循遂未悛革今欲除宗廟改國號御以大單于爲太祖其速議以聞於是太保呼延晏等議曰仐宜承晉母子傳號以光文本封盧奴中之属城陛下勲功懋於平洛終於中山中山分野屬大梁趙也宜革稱大趙遵以水行曜從之於是以冒頓配天淵配上帝三年五月西明門内大樹風吹折一􅀫樹撥撥變爲人形髪長一尺鬚眉三寸皆黄色白有歛手之狀亦有兩脚着履之形唯無目鼻毎夜有聲十日而生柯條遂爲大樹枝葉甚茂四年將於霸陵西南營壽陵侍中喬豫和苞上䟽諫曰伏聞􅃙旨營陵將周廻四十下深二十五丈以銅爲棺槨黄金飾之臣聞堯葬榖林市不改肆顓頊葬廣陽下不及泉聖王之終也如是秦始皇下固三泉周逾七里身亡之後毀不旋踵闇王之終也如此從喪亂巳來漢帝諸陵咸見踐辱唯霸陵獨全此雖太宗之逹至然抑亦釋之之功興亡奢儉囧然於前唯陛下覽之曜大恱終南山崩崩所得白玉一尺有字曰皇亡皇亡敗趙昌以爲己瑞羣臣咸賀中書􅁥劉均曰山崩石壞國傾民亂皇亡皇亡敗越昌者此言皇室將爲趙所敗趙因之而昌大趙都於秦雍而勒跨全趙趙昌之應當在石勒不在我也曜撫然改容五年曜后羊氏卒故晉惠后也洛陽之䧟納之六年正月天裂廣一丈餘長五十丈十一年七月石虎帥衆四萬人宼擾河東進攻蒲攻矅盡}
