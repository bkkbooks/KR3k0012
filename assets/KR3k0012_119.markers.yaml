  - {type: variant, offset: 2767, length: 0, content: '', WYG: 正月東平王約卒十一月聰校獵上林}
  - {type: variant, offset: 2768, length: 1, content: 衛, WYG: 晉帝行車駕大}
  - {type: variant, offset: 2771, length: 1, content: 濮, WYG: 戎服執㦸前導行三驅之禮觀者皆指帝曰此故長安天子聚而觀之故老亦有悲泣者十二月大饗于光極前殿聰欲觀晉臣之意使帝行酒洗爵更衣使帝執蓋多有涕泣或有失聲者尚書郎辛賔起而抱帝大哭引出斬之戊戌愍帝崩於平}
  - {type: page-break, offset: 2771, content: '', id: KR3k0012_WYG_119-9a, image: WYG0894/WYG0894-0124c.png}
  - {type: variant, offset: 2773, length: 1, content: 興, WYG: 三年聰所居螽斯則百堂灾焚其子㑹稽王康以下二十一人聰聞自投于牀下自此鬼哭宫中至于九月夜聲不絶四月尚書令王監崔懿之等極諫聰大怒收監等殺之秋七月鬼哭于光極殿聰晝見東平王約甚惡之徴秦王曜}
  - {type: punctuation, offset: 2777, content: 。, id: KR3k0012_CHANT_119-bkkpn648}
  - {type: 'tls:seg', offset: 2777, content: '', id: KR3k0012_CHANT_119-10a.60}
  - {type: variant, offset: 2777, length: 1, content: 休, WYG: 錄尚書事固辭仍}
  - {type: variant, offset: 2781, length: 98, content: 興及左將軍張布有舊恩委之以事布典宮省興關軍國休銳意於典籍欲畢覽百家之言又好射雉春夏之間常晨出夜還唯此時舍書休欲與博士祭酒韋曜博士盛冲講論藝曜冲素皆切真布恐入侍發其陰失令已不得專因妄飾說以拒遏之休荅, WYG: 領雍州牧靳準為大司空領司𨽻校尉癸亥薨于建始殿甲子粲即位大赦改元漢昌葬宣光陵諡}
