  - {type: variant, offset: 2751, length: 3, content: 公卿升, WYG: 軍國之事一决於粲立市於後庭與宫人宴戲或三日不醒秋七月河東大蝗唯不食粟豆司𨽻靳準率部民收而埋之哭聲聞於十餘里後乃鑚土飛出復食黍豆大司馬曜攻䧟長安外城九月犬與豕交于宫門有豕著進賢冠昇聰御坐大冠武冠帶綬與豕並昇俄而鬬死}
  - {type: page-break, offset: 2751, content: '', id: KR3k0012_WYG_119-8a, image: WYG0894/WYG0894-0124a.png}
  - {type: punctuation, offset: 2755, content: ，, id: KR3k0012_CHANT_119-bkkpn644}
  - {type: 'tls:seg', offset: 2755, content: '', id: KR3k0012_CHANT_119-10a.56}
  - {type: variant, offset: 2755, length: 8, content: 詔令武士縛綝即日, WYG: 上宿衞莫有見其入者長安饑甚死者過半麴允為粥以供帝膳帝泣曰今窘厄如此外無救援勢不自知乃使侍中宋敞奉牋降曜敞隨使者至帝肉袒牽羊輿櫬銜璧出降東門曜受璧焚櫬遷愍帝及司徒梁汾驃騎麴允等諸臣百餘人至于平陽聰臨光極殿帝稽顙與麴允}
  - {type: page-break, offset: 2755, content: '', id: KR3k0012_WYG_119-8b, image: WYG0894/WYG0894-0124b.png}
