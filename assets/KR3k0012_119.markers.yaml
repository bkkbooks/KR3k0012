  - {type: variant, offset: 3942, length: 0, content: '', WYG: 十五丈以銅為棺椁黄金節之臣聞堯}
  - {type: page-break, offset: 3942, content: '', id: KR3k0012_WYG_119-12a, image: WYG0894/WYG0894-0126a.png}
  - {type: variant, offset: 3943, length: 0, content: '', WYG: 榖林市不改肆顓頊葬髙陽下不及泉聖王之於終也如是秦始皇下錮三泉周輪七里身亡之後毁不旋踵闇王之於終也如此從喪亂以来漢帝諸陵咸見踐辱唯霸陵獨全此雖太宗之達致然抑亦釋之之功興亡奢儉烱然於前唯陛下覽之曜大恱終南山崩所得白玉之尺有字曰皇王皇王敗趙昌以為己瑞羣臣咸賀中書監劉均曰山崩石壊國傾民亂皇王皇王敗趙昌者此言皇室將為趙所敗趙因之而昌大趙都於秦雍而勒跨全趙趙昌之應當在石勒不在我也曜憮然改容五年曜后羊氏卒故晉惠后也洛陽之䧟納之六年正月天裂廣一丈餘長五十丈十一年七月石虎率衆四萬人㓂擾}
  - {type: page-break, offset: 3943, content: '', id: KR3k0012_WYG_119-12b, image: WYG0894/WYG0894-0126b.png}
  - {type: variant, offset: 3944, length: 0, content: '', WYG: 東進蒲坂曜選中外精銳自潼關北濟虎懼引師而還曜追而敗之枕尸一百餘里虎奔朝歌遂攻石生於金墉分遣諸將攻討汲郡河内十二月勒自帥衆拒之陣於洛西曜性少􅒬酒末年尤甚將戰飲數斗常乗赤馬無故蹋頓乃乗小馬北出復飲斗餘至西陽門撝陣就平勒將石堪因而乗之師遂大潰曜昏醉奔退而馬䧟石渠墜於冰上為堪所執勒將還襄國喻曜使與太子毗書令速降曜但勅毗與諸臣匡維社稷勿以吾易意建平末為勒所殺十二年正月太子毗大司馬}
  - {type: page-break, offset: 3944, content: '', id: KR3k0012_WYG_119-13a, image: WYG0894/WYG0894-0126c.png}
  - {type: variant, offset: 3945, length: 2, content: 縣也, WYG: 陽王𦙍等議欲西保秦州遂相率奔上邽石虎乗勝追戰枕尸千里上邽潰虎執毗及王公已下三千餘人皆殺之自劉淵建號西河至是二十有六載晉書載記曰曜在位十年而敗始元海以懐帝永嘉四年僣立至曜三}
