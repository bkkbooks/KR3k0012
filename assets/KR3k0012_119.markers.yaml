  - {type: variant, offset: 2168, length: 1, content: 冬, SBCK: 以衞尉呼延晏爲前鋒大都督配禁兵二萬七千自宜陽入洛州命東萊弥龍驤矅鎮軍勒進軍㑹之比及河南}
