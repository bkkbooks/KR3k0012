  - {type: variant, offset: 3260, length: 9, content: 李衡為丹陽太守時休, SBCK: 曜}
  - {type: variant, offset: 3260, length: 9, content: 李衡為丹陽太守時休, krp: 曜}
  - {type: variant, offset: 3263, length: 177, content: 丹陽太守時休在郡衡數以法繩之妻習氏每諫衡衡不從會休立衡懼謂妻曰不用卿言以至於此遂欲奔魏妻曰琅邪王素好善慕名方欲自顯於天下終不以私嫌殺君明矣可自囚詣獄如此乃當逆見優饒非但直活而已衡從之果得無恙又加威遠將軍授以棨戟吳志曰休詔曰丹陽太守李衡以往事之嫌自拘有司夫射鉤斬祛在君為君遣衡還郡勿令自疑孫皓吳志曰孫皓字元宗權孫和之子也一名彭祖字皓宗孫休立封皓為烏程侯遣就, WYG: 相}
