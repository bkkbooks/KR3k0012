  - {type: 'tls:seg', offset: 2761, content: '', id: KR3k0012_CHANT_119-10a.57}
  - {type: variant, offset: 2764, length: 2, content: 誅五, WYG: 地大哭扶不能起聰大怒允自殺以帝為光禄大夫懐安侯以大司馬曜假黄鉞大都督陜西諸軍事太宰秦王二}
  - {type: punctuation, offset: 2765, content: 。, id: KR3k0012_CHANT_119-bkkpn646}
