  - {type: variant, offset: 86, length: 0, content: '', WYG: 中單于羗渠使子於扶羅將兵助漢討平黄巾㑹羌渠為國人所殺於扶羅以其衆留漢自立為單于屬董卓之亂㓂掠太原河東屯於河内於扶羅死弟呼厨泉立以於扶羅子豹為左賢王即元海之父也魏武分其衆為五部以賢王豹為左部帥其餘部帥皆以劉氏為之太康中改置都尉雖分屬五部皆家于晉陽汾澗之濵豹妻呼延氏魏嘉平中祈子於龍門有一白魚頂有一角軒鬐躍鱗而至祭所久之乃去巫覡皆異之曰此嘉祥也其夜夢所見魚變為人左手把一物大如雞子光景非常授呼延氏曰此是日精服之生貴子寤以告豹豹曰吉徴也自是十五月而生淵淵生左手有文曰淵海遂以為名㓜而好學不舍晝夜常謂同門生朱紀范隆等曰吾每觀書傳常鄙隨陸無武綘灌無文一物之不知固君子恥之也二生遇髙皇不能建封侯之業兩公屬文帝不能開庠序之美惜哉於是文學武事並皆工絶猨臂善射膂力過人身八尺四寸鬚長三尺許當心有赤毫毛三根長三尺六寸太原王渾虛襟友之命子濟拜焉咸熈中為任子在洛陽晉文帝深待之時東莱王彌等皆憑結渾又屢言之晉帝帝召見與言大恱之後謂王濟曰劉元海容貌風儀機談鑒智雖漢金日磾無以加也㑹父豹卒帝以淵代為左部帥轉寧朔将軍監五部軍事太安中惠帝失政諸王迭相殘廢州郡奸豪所在蜂起從祖北部都尉左賢王劉宣等議曰今司馬氏骨肉相殘興復此時矣左賢王淵姿器絶人幹宇超世天若不恢崇單于終不虛生此人也於是共推劉淵為大單于劉淵曰當為崇岡峻阜何能為培塿乎夫帝王豈有常哉大禹生於西戎文王生於東夷顧惟徳所授耳今見衆十餘萬皆一當晉十皷行摧亂晉猶拉枯耳上可成漢髙之業下不失為魏武何呼韓邪足道哉宣等稱善元熈}
