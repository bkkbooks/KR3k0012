  - {type: variant, offset: 102, length: 207, content: 皇甫嵩中郎將朱儁將兵討擊之儁表請堅為佐軍司馬堅又募精兵千許人與儁併力奮擊所向無前拜別部司馬中平三年司空張溫西討邊章韓遂溫表請堅參軍事溫以詔書召董卓卓良久乃詣應對不順堅數卓三罪勸溫斬之溫不忍發舉軍還拜堅議郎時長沙賊區星自稱將軍以堅為長沙太守克破星等漢朝錄前後功封堅烏程侯靈帝崩董卓專擅朝政諸州郡舉義兵討卓堅亦舉兵比至南陽眾數萬人南陽太守張咨晏然自若牽咨於軍門斬之郡中震慄無求不獲前到魯陽與袁術相見術表堅行破盧將軍領豫, SBCK: 青}
