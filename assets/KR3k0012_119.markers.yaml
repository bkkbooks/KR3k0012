  - {type: variant, offset: 3934, length: 137, content: 二月死時年四十二葬河南縣也世說曰晉武帝問孫皓聞南吳人好作女歌頗能不時正飲酒因舉觴勸帝而言曰昔與汝國鄰今為汝作臣上汝一柸酒令汝壽萬春帝悔之吳志評曰皓淫刑所濫殞斃流黜者蓋不可勝數是以群下人人惴恐虐用其民窮淫極侈宜其腰首分離以謝百姓既蒙不死之詔復加歸命之寵豈非曠蕩之恩過厚之澤也哉, SBCK: 九}
  - {type: variant, offset: 3934, length: 137, content: 二月死時年四十二葬河南縣也世說曰晉武帝問孫皓聞南吳人好作女歌頗能不時正飲酒因舉觴勸帝而言曰昔與汝國鄰今為汝作臣上汝一柸酒令汝壽萬春帝悔之吳志評曰皓淫刑所濫殞斃流黜者蓋不可勝數是以群下人人惴恐虐用其民窮淫極侈宜其腰首分離以謝百姓既蒙不死之詔復加歸命之寵豈非曠蕩之恩過厚之澤也哉, krp: 九}
  - {type: variant, offset: 3936, length: 0, content: '', WYG: 大將軍東平王約卒一指猶煖遂不殯殮至甲戌乃蘇言見淵於不周山經五日遂復從至崑崙山三日而復反於不周見諸王公卿將相}
