  - {type: variant, offset: 1295, length: 219, content: 權將如吳親乘馬射虎馬為虎所傷權投以雙戟虎卻廢常從張世擊以戈獲之二十四年關羽圍曹仁於襄陽權內憚羽外欲以為己功飛牋于曹公乞討關羽閏月權征羽遂定荊州曹公表權為驃騎將軍持節領荊州牧封南昌侯權自公安都鄂改名武昌魏文帝踐祚加權九錫為吳王初權外託事魏而誠心不款魏欲遣侍中辛毗尚書桓階往與盟誓并徵任子權辤讓不受遂改元為黃武元年臨江拒守權使太中大夫鄭泉聘劉備于白帝始復通好猶與魏文帝相往來至後年乃絕七年二月公卿百司皆勸正尊號夏四月武昌言黃龍鳳皇見丙申祭南郊, SBCK: 僣}
