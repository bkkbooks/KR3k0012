  - {type: variant, offset: 86, length: 0, content: '', SBCK: 單于羌渠使子於扶羅將兵助漢討平黄巾㑹羌渠爲國人所殺扶羅以其衆留漢立爲單于属董卓之亂宼掠太原河東屯於河内扶羅死弟呼厨泉立以於羅子豹爲左賢王即元海入朝魏武因留之爲分其衆爲五部以左賢豹爲左部帥其餘帥皆以劉氏爲之太康中改置都尉雖分属五部皆家于􅀳陽汾澗之賔豹妻呼延氏魏喜平中祈子於龍門有一大白魚以有二角軒鬐躍鱗而至􅀕所乆之乃去巫覡皆異之曰此嘉祉其夜夢所見魚變爲人左手把一物大如雞子光景非常授呼延曰此是日精服之生貴子寤以告豹豹曰􅁻徴也自是十二月而生淵淵生左手有文曰淵海遂以名焉幼而好學不捨晝夜常謂同門生朱紀范隆等曰吾毎觀書傳常鄙隨陸之無武絳灌之無文一物之不知固君子恥之也二生遇髙皇不能建封侯之業兩公属太宗不能開庠序之美惜哉於是學武事並皆工絶猨臂善射膂力過人身長八尺四寸鬚長三尺餘當心有赤毫毛三根長三尺六寸太原王渾虚衿友之命子濟拜焉咸熈中爲任子在洛陽國晉文王深待之時東萊王弥等皆慿結渾言之於晉武帝帝召見與言大恱之後謂王濟曰劉元海容皃風儀機談鑒智雖由余日磾無以加也㑹父豹卒帝以淵代爲左部帥轉寧朔將軍監五部軍事大安中惠帝失政諸王迭相殘廢州郡姧豪所在蜂起從祖北部都尉右賢宣等議曰右賢淵姿器絶人幹宇超丗天下恢崇單于終不虚生此人也於是共推淵爲大單于淵曰當爲崇崗峻阜何能爲培螻乎夫帝王豈有常哉大禹生於西戎文王生於東夷頋惟德所授耳今見衆十餘萬皆一當􅀳十鼔行摧亂晉猶拉枯耳上可成漢髙之業下不失爲魏氏何呼韓耶足道哉宣等稱善元熈}
