  - {type: variant, offset: 2170, length: 0, content: '', krp: 二敗晉師長驅圍洛陽䧟之縱兵大掠幽晉帝于端門煞晉太子及諸百官巳下二十餘人洛水北築爲京觀遷帝及太后侍中庾珉等于平陽大赦改光興爲嘉平元年二}
