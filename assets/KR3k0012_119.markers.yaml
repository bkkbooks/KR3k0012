  - {type: variant, offset: 2501, length: 757, content: 郎謝慈郎中盛冲受學太元二年正月封琅耶王居虎林四月權薨休弟亮承統諸葛恪秉政不欲諸王在濱江兵馬之處徙休於丹陽郡太守李衡數以事侵休休上書乞徙他郡詔徙會稽居數歲夢乘龍上天顧不見尾覺而異之孫亮廢孫綝使宗正孫楷與中書郎董朝迎休休初聞問意疑楷朝具述所奉迎本意留一日一夜發行至曲阿有老公于休叩頭曰事久變生天下顒顒願陛下速行休善之是日進及布塞亭武衛將軍孫恩行丞相事率百僚以乘輿法駕迎於永昌亭綝以兵千人迎拜於道側休下車荅拜即日御正殿大赦改元永安元年冬綝一門五侯皆典禁兵權傾人主休聞綝逆謀陰與張布圖計十二月戊辰臘辰百僚朝賀公卿升殿詔令武士縛綝即日伏誅五年以衛將軍濮陽興為丞相休以丞相興及左將軍張布有舊恩委之以事布典宮省興關軍國休銳意於典籍欲畢覽百家之言又好射雉春夏之間常晨出夜還唯此時舍書休欲與博士祭酒韋曜博士盛冲講論藝曜冲素皆切真布恐入侍發其陰失令已不得專因妄飾說以拒遏之休荅曰孤之涉學群書略偏所見不少也其明君闇主奸臣賊子古今賢愚成敗之事無不覽也今曜等入但欲與講論書耳不為從曜等始更受學也縱復如此亦何所損君特當以曜等恐道臣下奸變之事以此不欲令入耳如此事孤已自備之不須曜等然後乃解也此都無所損君意特有所忌故耳布得詔陳謝重自序述又言懼妨政事休荅曰書藉之事患人不好好之無傷也此無所為非而君以為不宜是以孤有所及聖王務學業其流各異不相妨也不圖君今日在事更行此於孤也良甚不敢布拜表叩頭休荅曰聊相開悟耳何至叩頭乎如君之忠誠遠近所知往者所以相感今日之巍巍也詩云靡不有初鮮克有終終之實難君其終之初休為王時布為左右將督素見信愛及至踐祚厚加寵待專擅國勢多行無禮自嫌瑕短懼曜冲言之故尤患忌休雖解此旨心不能悅更恐其疑懼竟如布意廢其講業不復使冲等入七年七月休薨時年三十謚曰景皇帝江表傳曰休寢疾日不能言乃手書呼丞相濮陽興入令子𩅦音灣出拜之休把興手而指𩅦以託之也襄陽, SBCK: 載}
