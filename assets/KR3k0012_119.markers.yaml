  - {type: variant, offset: 2731, length: 4, content: 綝逆謀陰, WYG: 其名久矣以卿所作樂府歌文示朕謂朕曰聞君善為辭賦試為看之朕時}
  - {type: punctuation, offset: 2734, content: ，, id: KR3k0012_CHANT_119-bkkpn640}
  - {type: 'tls:seg', offset: 2734, content: '', id: KR3k0012_CHANT_119-10a.52}
  - {type: variant, offset: 2736, length: 4, content: 張布圖計, WYG: 武子俱為盛德頌卿稱善久之又引朕射于皇堂朕得十二籌卿與武子俱得九籌卿贈朕柘弓銀硯頗憶否帝曰臣安敢忘之但恨爾日不早識龍顔耳聰曰卿家骨肉相殘何其甚也帝曰此殆非人事皇天之意也大漢將應乾受厯故為陛下自相驅除耳且臣家若能奉武皇之業九族敦睦陛下何由得之三年春正月宴於光極前殿逼晉帝行酒庾珉王雋等起而大哭聰惡之二月丁未懐帝崩于平陽於是誅珉等三月立貴嬪劉氏為皇后四月愍帝即位於長安車騎曜等攻長安河東地震雨于平陽建元元年正月黑霧四塞著人如墨五日而止辛未日隕于地又三日相承出於西方東行平陽地震崇明觀䧟為池水赤如血赤氣至天有赤龍奮迅而去流星起於牽牛入紫微龍形逶迤其光照地落于平陽北十里視之則肉臭聞于平陽長三十步廣二十七步肉旁常有哭聲晝夜不止聰甚惡之癸未劉后産一蛇一虎各害人而走尋之不得頃之見在隕肉之旁己丑劉氏卒乃失此肉哭聲亦止十一月以晉王粲為國相大單于搃百揆}
