  - {type: variant, offset: 3937, length: 1, content: 時, WYG: 者悉在大有人民宫室壯麗號曰蒙誅離國淵謂約曰東北遮須夷國無主久待汝父為之汝後二}
  - {type: variant, offset: 3939, length: 0, content: '', WYG: 當来後國中大亂相殺害吾家死亡畧盡但可永明軰數十人在耳汝且還後年當來見汝不久約拜辭而歸道過一國曰猗尼渠餘國引約入宫與約皮囊一枚曰為吾遺漢皇帝約辭而歸謂約曰劉郎後年来必見過當以女相妻約歸置皮囊於桁上俄而蘇謂左右曰桁上取囊来左右取得開之有方白玉題文曰猗尼渠餘國天王敬信遮湏夷國天王嵗在攝提當相見馳使奏呈聰曰若審如此吾不懼死也及聰以戊寅嵗薨與此玉并葬焉劉曜崔鴻十六國春秋前趙錄曰劉曜字永明淵之族子少孤見養於淵幼而聰慧性拓落髙亮雄武過人鉄厚一寸射而洞之身長九尺三寸手垂過膝生而眉白目有赤光鬚不過百餘根皆長三尺光初元年十月太保呼延宴等自平陽来奔上尊號於曜僣即皇帝位十二月靳準左右軍騎喬泰王騰等殺準奉六璽来降二年夏四月徙都長安立子熙為皇太子六月繕宗廟社稷南北郊于長安令曰葢聞王者之興必禘始祖我皇家之先出自夏后居于北夷世跨燕朔光文以漢有天下嵗久恩徳結于庶民故立漢祖宗之廟以懐民望昭武因循遂未悛革今欲除宗廟改國號御以大單于為太祖其議以聞於是太保呼延宴等議曰今宜承晉母子傳號以光文本封盧奴中之屬城陛下勲功茂於平洛終於中山中山分野屬大梁趙也宜革稱大趙遵以永行曜從之於是以冐頓配天淵配上帝三年五月西明門内大樹風吹折經一宿樹忽然變為人形髪長一尺鬚眉三寸皆黄白色有歛手之狀亦有兩脚著履之形唯無目鼻每夜有聲十日而生柯條遂為大樹枝葉甚茂四年將於霸陵西南營壽陵侍中喬豫和苞上疏諫曰伏聞敕㫖將營建壽陵将周圍}
