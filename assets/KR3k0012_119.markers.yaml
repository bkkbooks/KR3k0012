  - {type: 'tls:seg', offset: 2171, content: '', id: KR3k0012_CHANT_119-8a.25}
  - {type: variant, offset: 2171, length: 0, content: '', SBCK: 晉帝進號儀同三司㑹稽郡公聦引帝入讌謂曰卿爲豫章王時朕曽與王武子相造武子介朕於卿言聞其名乆矣以卿所作樂府歌文示朕謂朕曰聞君善爲辭賦試爲看之朕時與武子俱爲盛德頌卿稱善乆之又引朕射于皇堂朕得十二籌卿與武子俱得九籌卿贈朕柘弓銀硯頗憶不帝曰臣敢忘之伹恨尓曰不早識龍顔聦曰卿家骨􅁏相殘何其甚也帝曰此殆非人事皇天之意}
  - {type: variant, offset: 2171, length: 0, content: '', krp: 晉帝進號儀同三司㑹稽郡公聦引帝入讌謂曰卿爲豫章王時朕曽與王武子相造武子介朕於卿言聞其名乆矣以卿所作樂府歌文示朕謂朕曰聞君善爲辭賦試爲看之朕時與武子俱爲盛德頌卿稱善乆之又引朕射于皇堂朕得十二籌卿與武子俱得九籌卿贈朕柘弓銀硯頗憶不帝曰臣敢忘之伹恨尓曰不早識龍顔聦曰卿家骨肉相殘何其甚也帝曰此殆非人事皇天之意}
  - {type: variant, offset: 2172, length: 10, content: 傳諸葛恪率軍遏巢湖城, SBCK: 漢將應乾受暦故爲陛下自相驅除且臣家若能奉武帝之業九族敦睦者陛下何由得之三年正月醼於光極前殿逼晉帝行酒􅁃珉王隽等起而大哭聦惡之二月丁未懷帝崩于平陽於是誅珉等三月立貴嬪劉氏爲皇后四月􅉖帝即位於長安車􅀐矅等攻長安河}
  - {type: variant, offset: 2172, length: 10, content: 傳諸葛恪率軍遏巢湖城, krp: 漢將應乾受暦故爲陛下自相驅除且臣家若能奉武帝之業九族敦睦者陛下何由得之三年正月醼於光極前殿逼晉帝行酒庾珉王隽等起而大哭聦惡之二月丁未懷帝崩于平陽於是誅珉等三月立貴嬪劉氏爲皇后四月愍帝即位於長安車騎矅等攻長安河}
