  - {type: variant, offset: 2278, length: 358, content: 少有勇力者為之將帥亮曰吾立此軍欲與之俱長日於苑中習焉三年亮以綝專恣與太常全尚將軍劉承謀誅綝九月綝以兵取尚遣弟恩攻殺承於蒼龍門外召大臣會宮門黜亮為會稽王時年十六吳曆曰亮出西苑方食生梅使黃門至中藏取蜜漬梅蜜中有鼠屎召問藏吏吏叩頭亮問吏曰黃門從汝求蜜耶吏曰向求實不敢與黃問不服侍中刁玄張邠啟黃門藏吏辤語不同請付獄推亮曰此易知耳令破鼠屎屎裏燥亮大笑謂玄邠曰若久在蜜中中外當俱濕今裏燥必黃門所為黃門首服左右莫不驚悚孫休吳志曰孫休字子烈權弟六子也年十三從中書郎謝慈郎中盛冲受學太元二年正月封琅耶王居虎林四月權薨休弟亮承統諸葛恪秉政不欲諸王在濱江兵馬之處徙休於丹陽郡太守李衡數以事侵休休上書乞徙他郡詔徙會稽居數歲夢乘龍上天顧不見尾覺而異之孫亮廢孫綝使宗正孫楷與中書郎董朝迎休休初聞問意疑楷朝具述所奉迎本意留一日一夜發行至曲阿有老公, WYG: 僣即帝位}
