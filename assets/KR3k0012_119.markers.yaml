  - {type: variant, offset: 2880, length: 334, content: 孤之涉學群書略偏所見不少也其明君闇主奸臣賊子古今賢愚成敗之事無不覽也今曜等入但欲與講論書耳不為從曜等始更受學也縱復如此亦何所損君特當以曜等恐道臣下奸變之事以此不欲令入耳如此事孤已自備之不須曜等然後乃解也此都無所損君意特有所忌故耳布得詔陳謝重自序述又言懼妨政事休荅曰書藉之事患人不好好之無傷也此無所為非而君以為不宜是以孤有所及聖王務學業其流各異不相妨也不圖君今日在事更行此於孤也良甚不敢布拜表叩頭休荅曰聊相開悟耳何至叩頭乎如君之忠誠遠近所知往者所以相感今日之巍巍也詩云靡不有初鮮克有終終之實難君其終之初休為王時布為左右將督素見信愛及至踐祚厚加寵待專擅國勢多行無禮自嫌瑕短懼曜冲言之故尤患忌休雖解此旨心不能悅更恐其疑懼竟如布意廢其講業不復使冲等入七年七月休薨時年三十謚曰景, WYG: 武}
