  - {type: variant, offset: 870, length: 423, content: 策以書責而絕之曹公表策為討逆將軍封為吳侯後術死長史楊弘大將張勳等將其眾欲就策廬江太守劉勳要擊悉虜之策輕軍襲拔廬江勳眾盡降勳與數百人自歸曹公是時袁紹方強而策并江東曹公乃以弟女配策小弟匡又為子章取賁女又命楊州刺史嚴象舉權茂才建安五年曹公與袁紹相拒於官渡策陰謀襲許迎漢帝密治兵未發會為故吳郡太守許貢客所刺傷創甚謂張昭等曰中國方亂以吳越之眾三江之固足觀成敗公等善相吾弟呼權佩以印綬至夜卒時年二十六追謚長沙桓王孫權吳志曰孫權字仲謀兄策既定諸郡時權年十五以為陽羨長郡察孝廉舉茂才行奉義校尉漢以策遠脩貢職遣使者劉琬加錫命琬語人曰吾觀孫氏兄弟雖各才秀明達然皆祿祚不終唯中弟孝廉形貌奇偉骨體不恒有大貴之表年又最壽策薨以事授權權哭未及息策長史張昭謂權曰孝廉此寧哭時耶扶令上馬使出巡軍曹公表權為討虜將軍領會稽太守屯吳建安八年權西征伐黃祖破其州軍劉備表權行車騎將軍領徐州牧十六年權徙治秣陵明年城石頭改秣陵為建業二十一年冬曹公攻濡須權令都尉徐詳詣曹公報脩好誓重結婚二十三年, SBCK: ''}
  - {type: variant, offset: 870, length: 423, content: 策以書責而絕之曹公表策為討逆將軍封為吳侯後術死長史楊弘大將張勳等將其眾欲就策廬江太守劉勳要擊悉虜之策輕軍襲拔廬江勳眾盡降勳與數百人自歸曹公是時袁紹方強而策并江東曹公乃以弟女配策小弟匡又為子章取賁女又命楊州刺史嚴象舉權茂才建安五年曹公與袁紹相拒於官渡策陰謀襲許迎漢帝密治兵未發會為故吳郡太守許貢客所刺傷創甚謂張昭等曰中國方亂以吳越之眾三江之固足觀成敗公等善相吾弟呼權佩以印綬至夜卒時年二十六追謚長沙桓王孫權吳志曰孫權字仲謀兄策既定諸郡時權年十五以為陽羨長郡察孝廉舉茂才行奉義校尉漢以策遠脩貢職遣使者劉琬加錫命琬語人曰吾觀孫氏兄弟雖各才秀明達然皆祿祚不終唯中弟孝廉形貌奇偉骨體不恒有大貴之表年又最壽策薨以事授權權哭未及息策長史張昭謂權曰孝廉此寧哭時耶扶令上馬使出巡軍曹公表權為討虜將軍領會稽太守屯吳建安八年權西征伐黃祖破其州軍劉備表權行車騎將軍領徐州牧十六年權徙治秣陵明年城石頭改秣陵為建業二十一年冬曹公攻濡須權令都尉徐詳詣曹公報脩好誓重結婚二十三年, WYG: ''}
  - {type: variant, offset: 870, length: 423, content: 策以書責而絕之曹公表策為討逆將軍封為吳侯後術死長史楊弘大將張勳等將其眾欲就策廬江太守劉勳要擊悉虜之策輕軍襲拔廬江勳眾盡降勳與數百人自歸曹公是時袁紹方強而策并江東曹公乃以弟女配策小弟匡又為子章取賁女又命楊州刺史嚴象舉權茂才建安五年曹公與袁紹相拒於官渡策陰謀襲許迎漢帝密治兵未發會為故吳郡太守許貢客所刺傷創甚謂張昭等曰中國方亂以吳越之眾三江之固足觀成敗公等善相吾弟呼權佩以印綬至夜卒時年二十六追謚長沙桓王孫權吳志曰孫權字仲謀兄策既定諸郡時權年十五以為陽羨長郡察孝廉舉茂才行奉義校尉漢以策遠脩貢職遣使者劉琬加錫命琬語人曰吾觀孫氏兄弟雖各才秀明達然皆祿祚不終唯中弟孝廉形貌奇偉骨體不恒有大貴之表年又最壽策薨以事授權權哭未及息策長史張昭謂權曰孝廉此寧哭時耶扶令上馬使出巡軍曹公表權為討虜將軍領會稽太守屯吳建安八年權西征伐黃祖破其州軍劉備表權行車騎將軍領徐州牧十六年權徙治秣陵明年城石頭改秣陵為建業二十一年冬曹公攻濡須權令都尉徐詳詣曹公報脩好誓重結婚二十三年, krp: ''}
