  - {type: variant, offset: 2164, length: 1, content: 建, SBCK: 二年以大司馬梁王和爲皇太子八月淵􅃦疾以劉洋爲太傅延年爲太宰司徒聦大司馬大單于並録尚書置單于平陽西淵薨于光極殿太子和即位聦自西明門攻斬和于西室九月葬淵永陵謚曰光文皇帝廟號髙祖劉聦崔鴻十六國春秋前趙録曰劉聦字􅀇明一名載淵第四子母張夫人之孕夢日入懷寤而告淵淵曰􅁻徴也自是十五月而生聦夜有白光之異左耳一白毫長二尺餘幼而聦寤究通經史百家之言孫吴兵􅀔靡不通之猨臂善射彎弓三百斤膂力驍捷冠絶一時以永嘉四年僣即帝位于光極前殿大赦改年光}
