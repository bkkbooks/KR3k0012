  - {type: 'tls:seg', offset: 2187, content: '', id: KR3k0012_CHANT_119-8a.28}
  - {type: variant, offset: 2187, length: 1, content: 魏, SBCK: 宣光陵石人皆行數歩宫中􅀑哭麟嘉元年武庫䧟入地一丈五尺聦自去冬至是遂不復受朝賀軍國之事一决於粲立市於後庭與宮人讌戲或三日不醒七月河東大蝗唯不食栗豆司􅀠靳准率部民牧而埋之哭聞于十餘里然後鑚土飛岀復食􅁰豆大司馬矅攻䧟長安外城九月犬與豕交于宫門有豕着進賢􅃣昇聦御㘴犬􅃣帶綬與豕並昇俄而闘死殿上􅀫衛莫有見其入者長安飢甚死半麴允爲粥以供帝膳帝泣曰今窘厄如此外無救援􅀔不自支乃}
  - {type: page-break, offset: 2187, content: '', id: KR3k0012_SBCK_119-5a}
  - {type: variant, offset: 2187, length: 1, content: 魏, krp: 宣光陵石人皆行數歩宫中鬼哭麟嘉元年武庫䧟入地一丈五尺聦自去冬至是遂不復受朝賀軍國之事一决於粲立市於後庭與宮人讌戲或三日不醒七月河東大蝗唯不食栗豆司隷靳准率部民牧而埋之哭聞于十餘里然後鑚土飛岀復食黍豆大司馬矅攻䧟長安外城九月犬與豕交于宫門有豕着進賢冠昇聦御㘴犬冠帶綬與豕並昇俄而闘死殿上宿衛莫有見其入者長安飢甚死半麴允爲粥以供帝膳帝泣曰今窘厄如此外無救援勢不自支乃}
  - {type: variant, offset: 2189, length: 0, content: '', SBCK: 侍中宗敞奉牋降矅敞隨使者至帝内祖牽羊輿襯銜壁出降東門矅受璧焚櫬遷􅉖帝及司徒梁汾驃􅀐麴允等諸臣百餘人至于平陽聦臨光極殿帝稽顙于前麴允伏地大哭扶不能起聦大怒允自殺以帝爲光禄大夫懷安侯以大司馬矅假黄􅃏大都督陜西諸軍事太宰秦王二年正月東平王約卒十一月聦校獵上林以晉帝行車􅀐大}
  - {type: variant, offset: 2189, length: 0, content: '', krp: 侍中宗敞奉牋降矅敞隨使者至帝内祖牽羊輿襯銜壁出降東門矅受璧焚櫬遷愍帝及司徒梁汾驃騎麴允等諸臣百餘人至于平陽聦臨光極殿帝稽顙于前麴允伏地大哭扶不能起聦大怒允自殺以帝爲光禄大夫懷安侯以大司馬矅假黄鉞大都督陜西諸軍事太宰秦王二年正月東平王約卒十一月聦校獵上林以晉帝行車騎大}
  - {type: variant, offset: 2191, length: 3, content: 諸葛誕, SBCK: 戎服執㦸前導行三驅之禮觀者皆指帝曰此故長安天子聚而觀之故老亦有悲泣者十二月大饗于光極前殿聦欲觀晉臣之意使帝行酒洗爵更衣又使帝執蓋多有涕泣或有失聲者尚書郎辛賔起而抱帝大哭引出斬之戊戌􅉖帝崩于平陽三年聦所居螽斯則百堂灾㑹稽王康已下二十一子焚焉而卒自此􅀑哭宮至於九月夜聲不絶四月尚書令王􅁥崔懿之}
