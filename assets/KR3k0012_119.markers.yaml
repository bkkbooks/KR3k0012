  body:
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 三前趙劉元海劉淵劉恥劉曜劉元海晉書載記序曰劉元海以惠帝永興元年據離石稱漢後九年石勒據襄國稱趙張氏先據河西是歳自石勒後三十六年也重華自稱凉王後一年冉閔據鄴稱魏後一年符健據長安稱秦慕容氏先據遼東稱燕是歳自符健後一年也儁始僣號後三十一年後燕慕容垂據鄴後}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 三敘偏覇前趙劉淵劉聰劉曜敘偏覇晉書載記叙曰劉元海以惠帝永興元年據離石稱後漢九年石勒據襄國稱趙張氏先據河西是嵗自石勒後三十六年也重華自稱凉王後一年冉閔據鄴稱魏後一年苻健據長安稱秦慕容氏先據遼東稱燕是嵗自苻健後一年也儁始僣號後三十一年後燕慕容垂據鄴後}
