  - {type: variant, offset: 4, length: 1, content: 吳, SBCK: 年西燕慕容冲據阿房是歳也乞伏國仁據枹罕稱秦後一年慕容求據上黨是歳也吕光據姑臧稱凉後十二年慕容德據滑臺稱南燕是歳也秃髮烏􅀌據廉川稱南凉叚業據張掖稱北凉後三年李􅀇盛據燉煌稱西凉後一年沮渠蒙遜殺叚業自稱後凉四月譙縱據蜀稱成都王後二年赫連勃勃據朔方稱大夏後二年馮跋殺離班據和龍稱北燕堤封天下十喪其八莫不龍旌帝服建社開祊華夷咸曁人物斯在或篡通都之郷或擁數州之地雄圖内卷師旅外井窮兵凶於勝􅀒盡人命於鋒鏑其爲􅀾國者一百三十六載抑元海爲之禍首云前趙劉淵崔鴻十六國春秋前趙録曰劉淵字元海新興匈奴人先夏后氏之苗裔曰淳維丗居北狄千有餘歳至冒頓襲破東胡西走月氏北服丁零内侵燕岱控弦四十萬漢祖患之使劉敬奉公主以妻之約爲兄弟故子}
