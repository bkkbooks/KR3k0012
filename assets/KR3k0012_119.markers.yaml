  - {type: variant, offset: 2237, length: 2, content: 軍事, SBCK: 將攻討汲郡河内十二月勒自帥衆拒之陣于洛西曜性少酗酒末年尤甚將戰飲數斗常乗赤馬無故跼蝢乃乗小馬比岀復飲斗餘至于西陽門撝陣就平勒將石堪因而乗之師遂大潰曜昏醉奔退馬䧟石渠墜于水上爲堪所執勒將還襄國喻曜使與太子毗書令速降但􅃙毗與諸大臣匡維社稷勿以吾易意建平末爲勒所殺十}
