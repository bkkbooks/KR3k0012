  - {type: variant, offset: 3665, length: 266, content: 令沉醉置黃門郎十人特不與酒侍立終日為司過之史宴罷之後各奏其闕失罔有不舉大者即加威刑小者咸以為罪後宮千數而采擇無已激水入宮宮人有不合意者輒殺流之或剝人面或鑿人眼岑昏險諛貴幸致位九列好興功役眾所患苦是以上下離心莫為皓盡力蓋積惡已熟不復堪命故也晉軍所至則土崩瓦解而王濬順流司馬伷王渾皆臨近境皓用光祿勳薛瑩中書令胡冲等計分遣使奉書於濬濬先到於是受皓之降解縛焚襯延請相見伷以皓致印綬於已遣使送皓皓舉家西遷以太康元年三月丁亥就集于京邑四月詔賜號為歸命侯給衣服車乘田三十頃歲給穀五千斛錢五千萬絹五百疋綿五百斤皓太子瑾拜郎中五年皓死于洛陽吳錄曰皓以, SBCK: 和}
