  - {type: variant, offset: 1597, length: 563, content: 馬聽與交易赤烏七年步騭朱然等各上䟽云自蜀還者咸言蜀欲背盟與魏交通宜為之備權曰吾待蜀不薄無以負之人言若不可信朕為君破券保之蜀竟無謀如權所籌太元元年權祭南郊還寢疾二年四月薨時年七十一謚曰大皇帝葬蔣陵吳志評曰孫權屈身忍辱任才尚計有勾踐之奇英人之傑矣能自擅江表成鼎峙之業然性多嫌忌果於殺戮暨臻末年彌以滋甚至于讒說殄行胤嗣廢斃豈所以貽厥孫謀以宴翼者哉其後遂致覆國未必不由此也吳志曰權自陸口遂征合肥合肥未下徹軍還兵皆就路權與陵統甘寧等在津北為魏將張遼所襲統等以死捍權權乘駿馬越津渠得去獻帝春秋曰張遼問吳降人曰向紫髯將軍長上短下大便馬善射是誰降人荅曰是孫會稽耶張遼樂進相謂言早知之急追即獲舉軍嘆恨吳曆曰曹公出濡須權數挑戰公堅守不出權乃自乘舩從濡須口入公見舟舩器仗法伍整肅喟然嘆曰生子當如孫權劉景升兒若豚犬耳權為牋與曹公說春水方生公宜速去別紙言足下不死孤不得安曹公語諸將曰孫權不欺孤乃徹還江表傳曰堅為下邳丞時權生方頤大口目有精光堅異之以為有貴像及堅亡策起事江東權常隨從性度弘朗仁而多斷好俠養士始知名侔於父兄矣每參問計謀策甚奇之自以為不及也每請會賓客顧權曰此諸君之將軍也孫亮吳志曰孫亮字子明權少子權春秋高而亮最少故尤留意姊全氏公主嘗譖太子和子母心不自安因倚權意欲豫自結數稱述全尚女勸權為亮納焉赤烏十三年和廢權遂立亮為太子以全氏為妃權薨太子即尊號, SBCK: 王璽}
