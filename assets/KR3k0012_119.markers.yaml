  - {type: variant, offset: 2168, length: 1, content: 冬, krp: 以衞尉呼延晏爲前鋒大都督配禁兵二萬七千自宜陽入洛州命東萊弥龍驤矅鎮軍勒進軍㑹之比及河南}
  - {type: variant, offset: 2170, length: 0, content: '', SBCK: 二敗晉師長驅圍洛陽䧟之縱兵大掠幽晉帝于端門煞晉太子及諸百官巳下二十餘人洛水北築爲京觀遷帝及太后侍中􅁃珉等于平陽大赦改光興爲嘉平元年二}
