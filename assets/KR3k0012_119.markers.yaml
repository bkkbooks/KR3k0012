  - {type: 'tls:seg', offset: 2181, content: '', id: KR3k0012_CHANT_119-8a.26}
  - {type: variant, offset: 2183, length: 1, content: 興, SBCK: 地震雨于平陽建元元年正月黒霧四塞着人如墨五日而止辛酉庚時日落地三月相承出於西方東行平陽地震崇明觀䧟爲池水赤如血赤氣至天有赤龍􅁬迅而去流星起于牽牛入紫微龍形逶迤其光照地落于平陽北十里視之則肉臰聞于平陽長三十歩廣二十七歩􅁏旁常有哭聲晝夜不止聦甚惡之癸未劉后産一虵一虎各害人而走㝷之不得頃之見在隕􅁏旁己丑劉氏卒乃失此􅁏哭聲亦止十一月以􅀳王粲爲國相大單于㹅百揆}
  - {type: page-break, offset: 2183, content: '', id: KR3k0012_SBCK_119-4b}
  - {type: variant, offset: 2183, length: 1, content: 興, krp: 地震雨于平陽建元元年正月黒霧四塞着人如墨五日而止辛酉庚時日落地三月相承出於西方東行平陽地震崇明觀䧟爲池水赤如血赤氣至天有赤龍奮迅而去流星起于牽牛入紫微龍形逶迤其光照地落于平陽北十里視之則肉臰聞于平陽長三十歩廣二十七歩肉旁常有哭聲晝夜不止聦甚惡之癸未劉后産一虵一虎各害人而走㝷之不得頃之見在隕肉旁己丑劉氏卒乃失此肉哭聲亦止十一月以晉王粲爲國相大單于㹅百揆}
