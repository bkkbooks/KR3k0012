  - {type: variant, offset: 2725, length: 2, content: 權傾, WYG: 二萬七千自宜陽入洛川命東莱王彌劉曜及鎮軍石勒進軍㑹之晏進河南趙師前後十二敗晉師長驅圍洛陽䧟之聰兵大掠幽晉帝于端門殺晉太子及百官已下三萬餘}
  - {type: variant, offset: 2728, length: 2, content: 主休, WYG: 於洛水北築為京觀遷帝及太后侍中庾珉等于平陽大赦改元嘉平元年二月内晉帝進號儀同三司㑹稽郡公聰引帝入讌謂曰卿為豫章王時朕曾與王武子相造武子示朕於卿卿言}
