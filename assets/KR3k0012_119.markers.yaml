  - {type: variant, offset: 3300, length: 272, content: 於此遂欲奔魏妻曰琅邪王素好善慕名方欲自顯於天下終不以私嫌殺君明矣可自囚詣獄如此乃當逆見優饒非但直活而已衡從之果得無恙又加威遠將軍授以棨戟吳志曰休詔曰丹陽太守李衡以往事之嫌自拘有司夫射鉤斬祛在君為君遣衡還郡勿令自疑孫皓吳志曰孫皓字元宗權孫和之子也一名彭祖字皓宗孫休立封皓為烏程侯遣就國西湖民景養相皓當大貴皓陰喜而不敢泄休薨是時蜀初亡而交阯攜叛國內震懼貪得長君左典軍萬彧昔為烏程令與皓相善稱皓才識明斷是長沙桓王之儔又加之好學奉遵法度屢言之於丞相濮陽興左將軍張布布興說休妃太后朱欲以皓為嗣朱曰我寡婦人安和社稷之慮茍吳國無隕宗廟有賴可矣於是遂迎立皓時年, SBCK: 曜三丗凡}
