  - {type: variant, offset: 3936, length: 3, content: 作鳳臺, WYG: 廟時時往祭之有白鶴來止李尊太元貞人茅君内傳曰茅盈留句曲山告二茅曰吾去有母在不復得數相往來父老歌曰茅山連金陵江湖據下流三神乘白鶴各在一山頭時雨灌早稻陸田亦復周妻子保堂室使我無百憂白鶴翔金穴何時復來逰邴原别傳曰邴君所謂雲中白鶴非鶉鷃之網能羅矣永嘉郡記曰沭溪野青田中有雙白鶴年年生伏長大便去只餘父母一雙在耳精白可愛多云神仙所養荆州記曰衡山有三峰極秀一峯名紫盖峰清天明景輒有一雙白鶴廻翔其上清響亮徹神鏡記曰滎陽郡南百餘里有蘭巖常有雙鶴素羽皦然日夕偶影翔集傳云昔}
