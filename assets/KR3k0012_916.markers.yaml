  - {type: variant, offset: 3788, length: 4, content: 孟虧食木, WYG: 飲華池范太鸞鳥詩序曰罽賔王結屋峻卯之山獲一鸞鳥王甚愛之欲其鳴而不能致乃飾以金樊養以珍羞對之逾歳三年不鳴夫人曰聞鸞見類而後鳴可懸鏡以映之王從言鸞觀影感起慨然悲鳴哀響冲霄一奮而絶鶴集韻曰鶴善鳴鳥春秋說題辭曰鶴知夜半鶴水鳥也夜半水位感其生氣則益喜而鳴易通卦驗曰立夏清風至而鶴鳴周易曰鳴鶴在隂其子和之左傳曰狄人在衛懿公好鶴鶴有乗軒者将戰國人受節者皆曰使鶴鶴}
