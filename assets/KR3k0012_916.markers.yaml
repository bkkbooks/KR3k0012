  - {type: variant, offset: 3932, length: 1, content: 至, SBCK: 止李尊太元真人茅君内傳曰茅盈留句曲山告二弟曰吾去有局任不復得數相徃來父老歌曰茅山連金陵江湖據下流三神乗白鶴各在一山頭佳雨灌旱稻陸田亦復周妻子保堂室使我無百憂白鶴翔金穴何時復來遊邴原別傳曰邴君所謂雲中白鶴非鶉鷃之網能羅矣永嘉郡記曰沐溪野青田中有􅀟白鶴年年生伏我長大便去只伯餘父母一􅀟在耳精白可愛多云神仙所養荆州記曰衡山有三峯極秀一峯名紫盖峯清天明景輙有一􅀟白鶴廻翔}
