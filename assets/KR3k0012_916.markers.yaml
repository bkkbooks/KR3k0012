  - {type: variant, offset: 3944, length: 0, content: '', krp: 望西南有物飄然降自霄漢俄頃巳至乃駕鶴之賔也鶴止户側仙者就席羽衣虹裳賔主歡對巳而辭去跨鶴騰空眇然煙滅韓子曰師曠鼓新聲平公問師曠此何聲也曰清啇公最悲乎師曠曰不如清徵公曰可得聞乎師曠曰古之得聽清徵者皆有徳義之君公曰得試之乎師曠不得巳援琴}
  - {type: variant, offset: 3945, length: 9, content: 日一夜皆隨鳳皇飛去, SBCK: 奏有􅀇鶴二八從南方來集於廓門之危再而列三奏延頸而鳴舒翼而儛音中宫啇公大恱提觴起爲師曠夀其後大旱孫氏瑞應圖曰􅀇鶴者知音樂之節至又曰黄帝習崑崙以儛衆神􅀇鶴二八翔其右伏侯古今注曰鶴千歳則變蒼又千歳黒所謂􅀇鶴也}
  - {type: variant, offset: 3945, length: 1, content: 日, WYG: 舉兮知山川之紆曲再舉兮知天地之圓方述異傳曰荀瓌字叔瑋潛栖黄鶴樓却粒嘗東遊憇江夏西南有物飄然降自霄漢俄頃已至乃駕鶴之賔也鶴止户側仙者就席羽衣虹裳賔主歡對已而辭去跨鶴騰空渺然煙滅韓子曰師涓鼔新聲平公問師曠此何聲也曰清商公曰悲乎師曠曰不如清徵公曰可得聞乎師曠曰古之得聞清徵者皆有徳義之君公曰得試之乎師曠不得已援琴}
