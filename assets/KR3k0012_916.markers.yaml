  - {type: variant, offset: 3887, length: 2, content: 成王, SBCK: 中蹇躍教其飛颺六十餘日小者能飛}
  - {type: variant, offset: 3887, length: 1, content: 成, WYG: 中蹇躍教其飛颺六十餘日小者能飛乃與俱去風土記曰鳴鶴戒露此鳥性警至八月白露降流於草上滴滴有聲因即髙鳴相警移徙所宿處淮南八公相鶴經曰鶴者陽鳥也而逰於隂因金氣依火精以自養金數九火數七故七年小變十六年大變百六十年止千六百年形定體尚潔故其色白聲聞天故頂赤食於水故其喙長軒於前故後趾短棲於陸故足髙而尾凋翔於雲故毛豐而肉疎大喉以吐故修頸以納新故生天夀不可量所以體無青黄二色者木土之氣内養故不表於外是以行必依洲嶼止不集林木盖羽族之宗長仙人之騏驥也鶴之上相瘦頭朱頂露眼黒精髙鼻短喙䯓音故列切頰􅀈音徳宅切耳長頸促身若燕膺鳳翼雀尾龜腹軒前垂後髙足麤節洪骨纎指此相之備者也鳴則聞於天飛則一舉千里鶴二年落子毛易黒㸃三年產復七年羽翮俱復七年飛薄雲漢後七年舞應節後七年晝夜十二時鳴聲後百六十年不食生物後大毛落茸毛生雪白或純黒泥水不汚後百六十年雄雌相見目精不轉而孕千六百年飲而不食鸞鳳同為羣聖人在位則與鳳凰翔於甸穆天子傳曰至於巨蒐氏巨蒐之人乃獻白鶴之血以飲天子又曰天子飲於孟氏爰舞白鶴呉越春秋曰呉}
