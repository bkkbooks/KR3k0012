  - {type: variant, offset: 517, length: 391, content: 必弗得矣其所求者瓦孔之間隟屋之翳蔚也韓詩外傳曰黃帝即位施聖仁恩承天明命一道脩德唯仁是行宇內和平未見鳳皇乃召天老而問之曰鳳皇何如天老對曰天鳳象鴻前而麟後虵頸而魚尾龍文而龜身鷰𪁟而鷄喙首戴德頸揭義背負仁心入信翼採義足履正尾繫武小音金大音鼓延頸奮翼五光備舉食有質飲有儀住即文來則喜游必擇所飢不妄下其鳴也雄曰節節雌曰足足昏鳴曰固常晨鳴曰發明晝鳴曰保章舉鳴曰上翔集鳴曰歸昌夫唯鳳為能究萬物通天地象百物達乎道律五音成九德覽九州觀八極則有福備文武王下國故得鳳象之一則鳳過之得鳳象之二則鳳翔之得鳳象之三則鳳集之得鳳象之四則鳳春秋下就之得鳳象之五則鳳沒身居之黃帝曰於戲允哉朕何敢與焉於是黃帝乃服黃衣帶黃紳戴黃冠齊于中宮鳳乃蔽日而至黃帝降于東階西面再拜稽首皇天降祉不敢不承命鳳乃止帝東園集梧樹食竹實沒身不去尚書考靈曜曰通天文者明於明天道也審地理者昌昌猶盛也盛於萬物明者天之時也昌者地之財也明王治鳳皇下之, SBCK: 鸞臻}
