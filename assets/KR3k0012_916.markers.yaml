  - {type: variant, offset: 3944, length: 0, content: '', SBCK: 望西南有物飄然降自霄漢俄頃巳至乃駕鶴之賔也鶴止户側仙者就席羽衣虹裳賔主􅂬對巳而辭去跨鶴騰空眇然煙滅韓子曰師曠鼓新聲平公問師曠此何聲也曰清啇公最悲乎師曠曰不如清徵公曰可得聞乎師曠曰古之得聽清徵者皆有徳義之君公曰得試之乎師曠不得巳援琴}
