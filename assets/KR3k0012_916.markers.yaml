  - {type: variant, offset: 3800, length: 2, content: 十洲, SBCK: 抱朴子曰崑崙圖曰鸞鳥似鳯而白纓聞樂則蹈節而舞至則國安樂决録注曰辛繕字公文治春秋䜟緯隱居華隂光武徴不至者有大鳥髙五尺鷄首䴏頷虵頸魚尾五色備舉而多青棲繕槐樹旬時不去􅀪農太守以聞詔問百僚咸以爲鳯太史令蔡衡對曰凡象鳯者有五多赤色者鳯多黄色者鵷鶵多青者鸞多紫者鸑鷟多白者鵠今此鳥多青者乃鸞非鳯也上善其言三公聞之咸遜位避繕繕不起車頻秦書曰符堅時􅀜隴人安百姓豐樂民歌曰長安大街兩邊種槐下走朱輪上有鸞栖崔駰七言詩曰鸞鳥髙翔時來儀應治歸得合望規啄食㨂實飲華池范太鸞鳥詩序曰􅄢賔王結置峻祁之山獲一鸞鳥王甚愛之欲其鳴而不能致乃飾以金樊饗以珎羞對之逾戚三年不鳴夫人曰聞鳥見其􅀋而後鳴可懸鏡以映之王從言鸞覩影感􅆻􅁣焉悲鳴哀響中宵一奮而絶鶴韻集曰鶴善鳴鳥春秋􅀃題辭曰鶴知夜半鶴水鳥也夜半水位感其生氣則益喜而鳴易通卦驗曰立夏清風至而鶴鳴周易曰鳴鶴在隂其子和之左傳曰狄人伐衛懿公好鶴鶴有乗軒者將戰國人受甲者皆曰使鶴鶴實有禄位余焉能戰毛詩曰鶴鳴誨宣王也鶴鳴于九臯聲聞于天興也臯署也言身隱而名著詩義䟽曰鶴大如鵝長三尺脚青黒髙三尺餘赤頰赤目喙長四寸多純白亦有蒼色者今人謂之赤頰常夜半鳴髙聞八九里唯老者乃聲下今吴人園中及士大夫家皆飬之鷄鳴時亦鳴漢書曰王莽常以鶴髓瀆􅂖種學仙後漢書曰鄭􅀪傳孔靈符㑹稽}
