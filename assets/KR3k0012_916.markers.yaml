  - {type: variant, offset: 3812, length: 2, content: 四面, WYG: 不死琴操曰商陵牧子取妻五年無子父兄欲為改娶妻聞之中夜驚起倚户悲嘯牧子聞之援琴鼓之云痛㤙愛之永離因彈别鶴以舒情故曰别鶴操論衡曰藝増篇鶴鳴九折之澤聲聞于天此増益也按鶴鳴叅天人則不聞鳴在于澤云何謂乎八王故事曰陸機為成都王所誅顧左右歎曰今欲聞華亭鶴唳不可復得陶侃别傳曰侃丁母艱在墓下忽}
