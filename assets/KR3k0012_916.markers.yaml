  - {type: variant, offset: 1012, length: 222, content: 作豐一朝扶老至八十萬戶草居陋然歌即曰鳳皇下豐也尚書帝命驗曰舜授終赤鳳來儀尚書大傳曰舜好生惡殺鳳皇巢其樹論語摘襄聖曰鳳有六像九苞一曰頭像天二曰目像日三曰背像月四曰翼像鳳五曰足像地六曰尾像緯九苞一曰頭符命二曰眼合度三曰耳聰達四曰舌詘伸五曰色彩光六曰冠短周七曰距銳鉤八曰音激揚九曰腹文戶行鳴曰歸嬉上鳴曰提扶夜鳴曰善哉晨鳴曰賀世飛鳴曰即都知我者唯黃持竹實來故子欲居九夷從鳳嬉宋均注曰緯五緯也度天度數也固當作朱米色好也戶所由出入陰陽出入亦閉戶善哉應天下興, SBCK: 太}
