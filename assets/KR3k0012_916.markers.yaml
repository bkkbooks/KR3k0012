  - {type: variant, offset: 3875, length: 0, content: '', WYG: 遂放之述異記曰宋元嘉初鎮北将軍}
  - {type: variant, offset: 3875, length: 0, content: '', krp: 都}
  - {type: variant, offset: 3876, length: 0, content: '', SBCK: 所誅顧左右歎曰今欲聞華亭鶴唳不可復得陶􅋲別傳曰􅋲丁母艱在墓下忽有二客來弔不􅂘而退儀形鮮異知非常人遣看之但見􅀟鶴飛而冲天丗􅀃曰劉尊祖少爲殷中軍所稱之於􅁃公􅁃公甚欣便取爲佐引見坐獨榻上與語劉尓日殊不稱􅁃小失望遂名之爲羊公鶴昔羊叔子有鶴能舞甞向客稱之客至試使駈來氃氋而不能舞故稱之又曰僧支道林好鶴}
  - {type: variant, offset: 3876, length: 1, content: 時, WYG: 仲徳鎮彭城左右出獵遇一鶴将二子悉擒之歸以獻王王使養之其小者口為人所裂遂不能飲食大者即含粟哺之飲輒含水飲之先令其飽未曽亡也王甚愛之令精加養視大者羽翮先成每翥冲}
  - {type: page-break, offset: 3876, content: '', id: KR3k0012_WYG_916-8a, image: WYG0901/WYG0901-0155a.png}
  - {type: variant, offset: 3876, length: 0, content: '', krp: 所誅顧左右歎曰今欲聞華亭鶴唳不可復得陶侃別傳曰侃丁母艱在墓下忽有二客來弔不哭而退儀形鮮異知非常人遣看之但見雙鶴飛而冲天丗說曰劉尊祖少爲殷中軍所稱之於庾公庾公甚欣便取爲佐引見坐獨榻上與語劉尓日殊不稱庾小失望遂名之爲羊公鶴昔羊叔子有鶴能舞甞向客稱之客至試使駈來氃氋而不能舞故稱之又曰僧支道林好鶴}
  - {type: punctuation, offset: 3877, content: ，, id: KR3k0012_CHANT_916-bkkpn1380}
  - {type: 'tls:seg', offset: 3877, content: '', id: KR3k0012_CHANT_916-59a.4}
  - {type: variant, offset: 3877, length: 0, content: '', SBCK: 有遺其􅀟鶴者翅長欲飛林意惜之乃鎩其翮鶴軒翥不能復起乃舒翼反顧視之如似懊喪意林公曰旣有凌霄之姿何肯爲人作耳目近翫乎養令翮成遂放飛去述異記曰宋元嘉􅀄鎮北將軍王仲德鎮彭城左右出獵遇一鶴將二子悉禽之歸以獻王王使養之其小者口爲人所裂遂不能飲食大者輙含粟哺之飲輙含水飲之先令其飽未曽亡也王甚愛之令精加養視大者羽翮先成毎翥冲}
  - {type: page-break, offset: 3877, content: '', id: KR3k0012_SBCK_916-5a}
  - {type: variant, offset: 3877, length: 0, content: '', krp: 有遺其雙鶴者翅長欲飛林意惜之乃鎩其翮鶴軒翥不能復起乃舒翼反顧視之如似懊喪意林公曰旣有凌霄之姿何肯爲人作耳目近翫乎養令翮成遂放飛去述異記曰宋元嘉𥘉鎮北將軍王仲德鎮彭城左右出獵遇一鶴將二子悉禽之歸以獻王王使養之其小者口爲人所裂遂不能飲食大者輙含粟哺之飲輙含水飲之先令其飽未曽亡也王甚愛之令精加養視大者羽翮先成毎翥冲}
