  - {type: variant, offset: 2750, length: 430, content: 居積石千里天為生食其樹名瓊枝高百仞以璆琳瑯玕為寶天又為生離珠一人三頭起以伺琅玕鳳鳥之文戴聖嬰仁右智左賢文子曰主有積道德天與之地助之神鬼輔之則鳳皇翔其庭也孫卿子曰古之王者其政好生惡殺鳳在列樹又曰鳳鳥啾啾其翼若竿其聲若簫有皇有鳳樂帝之心此聖不蔽福也韓子曰昔者黃帝合鬼神於西大山鳳皇覆上作為清角淮南子曰鳳皇之翔至德必也過崑崙之䟽圃飲砥柱之涔瀨邅廻濛汜之渚當此之時鴻鵠蒼鶴莫不憚驚伏竄注喙江介又況鷰雀之類乎昔者二皇鳳至於庭二皇宓羲神農三代鳳至於門三代堯舜禹周室鳳至於澤德彌確所至彌遠德彌精所至彌近抱朴子曰夫木行為仁為青鳳頭上青故曰戴仁也金行為義為白鳳纓白故曰纓義也火行為禮為赤鳳赤故曰負禮也水行為智為黑鳳胸黑故曰尚智也土行為信為黃鳳足下黃故曰蹈信也古者太平之世鳳皇常居其國而生乳焉又曰夫麟鳳以形為別始食鳳卵而鳳去則鳳有種明矣又曰鸞鳳競粒於庭則授辱於鷄騖也鶡冠子曰鳳火鳥鶉火之禽陽之精也德能致之其精畢至任子曰鳳為羽族之美麟為毛類之俊龜龍為介蟲之長楩楠為眾材之最是物之貴也, SBCK: 疑慮}
