  - {type: variant, offset: 1991, length: 758, content: 如虔乃荅曰慈書比大人猶雞之比鳳又曰謝鳳子超宗有文辭盛得名譽選補新安王子鸞國常侍王母殷淑儀卒超宗作誄奏之帝大嗟賞謂謝莊曰超宗殊有鳳毛時右衛將軍劉道隆在御坐出候超宗曰聞君有異物可見乎超宗曰懸罄之室復有異物耶道隆武人無識正觸其父名曰旦恃宴至尊說君有鳳毛超宗徒跣還內道隆謂檢覔毛至闇待不得乃去又曰元嘉十四年春鳳皇二見于都下眾鳥隨之改其地曰鳳皇里又曰何承天為著作佐郎年已老而諸佐郎並名家年少頴川荀伯子嘲之常呼為妳母承天曰卿當云鳳皇生九子妳母何言耶齊書曰江夏王鋒年五歲性方整好學書高帝使學鳳尾詔一學即工高帝大悅以玉騏驎賜之曰以騏驎賞鳳尾矣梁書曰武帝初平東昏入于閱武堂是日鳳皇見又曰天監初鳳皇見建康縣同夏里又集南蘭陵崔鴻十六國春秋前秦錄曰永興三年九月鳳皇集于東闕民因歌之曰鳳皇于飛其羽翼翼淵哉聖后其齡萬億陸翽鄴中記曰石季龍與皇后在觀上為詔書五色紙著鳳口中鳳既衘詔侍人放數百文緋繩轆轤佪轉鳳皇飛下鳳以木作之五色漆畫腳皆用金又曰鳳陽門五層樓去地三十丈安金鳳皇二頭石虎將衰一頭飛入漳河會晴日見於水中一頭以鐵釘釘足今存二石偽事曰石昆降說鄴中有鳳皇將九鶵在延明門外道西後魏書曰彭城王勰與帝昇金墉顧見堂後桐竹曰鳳皇非梧桐不栖非竹實不食今桐竹並茂詎能降鳳乎勰曰鳳皇應德而來豈桐竹能降帝曰朕亦望降之唐書曰薛收從子元敬選部郎邁之子也亦有文學為收之亞初大業末薛德音及收元敬俱有才名時人謂之河東三鳳又曰武德九年海州言鳳見于城上群鳥數百隨之東北飛向蒼梧山又曰太宗時莒州言鳳皇二見群鳥隨之其聲若八音之奏又曰太宗嘗追思王業艱難佐命之臣乃作威鳳賦以賜長孫無忌其辭曰有一威鳳憩翮朝陽晨遊紫霧夕飲玄霜資長風以舉翰戾天衢而遠翔徐整正曆曰黃帝之時以鳳為雞莊子曰老子見孔子從弟子五人問曰前為誰對曰子路勇且多力其次子貢為智曾子為孝顏回為仁子張為武老子歎曰吾聞南方有鳥名為鳳, SBCK: ''}
  - {type: variant, offset: 1991, length: 1189, content: 如虔乃荅曰慈書比大人猶雞之比鳳又曰謝鳳子超宗有文辭盛得名譽選補新安王子鸞國常侍王母殷淑儀卒超宗作誄奏之帝大嗟賞謂謝莊曰超宗殊有鳳毛時右衛將軍劉道隆在御坐出候超宗曰聞君有異物可見乎超宗曰懸罄之室復有異物耶道隆武人無識正觸其父名曰旦恃宴至尊說君有鳳毛超宗徒跣還內道隆謂檢覔毛至闇待不得乃去又曰元嘉十四年春鳳皇二見于都下眾鳥隨之改其地曰鳳皇里又曰何承天為著作佐郎年已老而諸佐郎並名家年少頴川荀伯子嘲之常呼為妳母承天曰卿當云鳳皇生九子妳母何言耶齊書曰江夏王鋒年五歲性方整好學書高帝使學鳳尾詔一學即工高帝大悅以玉騏驎賜之曰以騏驎賞鳳尾矣梁書曰武帝初平東昏入于閱武堂是日鳳皇見又曰天監初鳳皇見建康縣同夏里又集南蘭陵崔鴻十六國春秋前秦錄曰永興三年九月鳳皇集于東闕民因歌之曰鳳皇于飛其羽翼翼淵哉聖后其齡萬億陸翽鄴中記曰石季龍與皇后在觀上為詔書五色紙著鳳口中鳳既衘詔侍人放數百文緋繩轆轤佪轉鳳皇飛下鳳以木作之五色漆畫腳皆用金又曰鳳陽門五層樓去地三十丈安金鳳皇二頭石虎將衰一頭飛入漳河會晴日見於水中一頭以鐵釘釘足今存二石偽事曰石昆降說鄴中有鳳皇將九鶵在延明門外道西後魏書曰彭城王勰與帝昇金墉顧見堂後桐竹曰鳳皇非梧桐不栖非竹實不食今桐竹並茂詎能降鳳乎勰曰鳳皇應德而來豈桐竹能降帝曰朕亦望降之唐書曰薛收從子元敬選部郎邁之子也亦有文學為收之亞初大業末薛德音及收元敬俱有才名時人謂之河東三鳳又曰武德九年海州言鳳見于城上群鳥數百隨之東北飛向蒼梧山又曰太宗時莒州言鳳皇二見群鳥隨之其聲若八音之奏又曰太宗嘗追思王業艱難佐命之臣乃作威鳳賦以賜長孫無忌其辭曰有一威鳳憩翮朝陽晨遊紫霧夕飲玄霜資長風以舉翰戾天衢而遠翔徐整正曆曰黃帝之時以鳳為雞莊子曰老子見孔子從弟子五人問曰前為誰對曰子路勇且多力其次子貢為智曾子為孝顏回為仁子張為武老子歎曰吾聞南方有鳥名為鳳所居積石千里天為生食其樹名瓊枝高百仞以璆琳瑯玕為寶天又為生離珠一人三頭起以伺琅玕鳳鳥之文戴聖嬰仁右智左賢文子曰主有積道德天與之地助之神鬼輔之則鳳皇翔其庭也孫卿子曰古之王者其政好生惡殺鳳在列樹又曰鳳鳥啾啾其翼若竿其聲若簫有皇有鳳樂帝之心此聖不蔽福也韓子曰昔者黃帝合鬼神於西大山鳳皇覆上作為清角淮南子曰鳳皇之翔至德必也過崑崙之䟽圃飲砥柱之涔瀨邅廻濛汜之渚當此之時鴻鵠蒼鶴莫不憚驚伏竄注喙江介又況鷰雀之類乎昔者二皇鳳至於庭二皇宓羲神農三代鳳至於門三代堯舜禹周室鳳至於澤德彌確所至彌遠德彌精所至彌近抱朴子曰夫木行為仁為青鳳頭上青故曰戴仁也金行為義為白鳳纓白故曰纓義也火行為禮為赤鳳赤故曰負禮也水行為智為黑鳳胸黑故曰尚智也土行為信為黃鳳足下黃故曰蹈信也古者太平之世鳳皇常居其國而生乳焉又曰夫麟鳳以形為別始食鳳卵而鳳去則鳳有種明矣又曰鸞鳳競粒於庭則授辱於鷄騖也鶡冠子曰鳳火鳥鶉火之禽陽之精也德能致之其精畢至任子曰鳳為羽族之美麟為毛類之俊龜龍為介蟲之長楩楠為眾材之最是物之貴也, WYG: 疑慮}
