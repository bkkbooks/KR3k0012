  - {type: variant, offset: 3804, length: 3, content: 鳳麟洲, SBCK: 射的山南有白鶴爲仙人取箭􅀪甞採薪得一遺箭頃有人覓􅀪還之問何所欲􅀪識其神人也曰常患􅀂耶溪載薪爲難願旦南風暮北風移後果然故􅀂耶溪風至今呼爲鄭公風也晉書曰􅄞紹始入洛或謂王戎曰昨於稠人中始見􅄞紹昻昻然􅀂野鶴之}
  - {type: page-break, offset: 3804, content: '', id: KR3k0012_SBCK_916-3b}
  - {type: variant, offset: 3804, length: 3, content: 鳳麟洲, WYG: 庾盛母好鶴唳盛}
  - {type: variant, offset: 3804, length: 3, content: 鳳麟洲, krp: 射的山南有白鶴爲仙人取箭弘甞採薪得一遺箭頃有人覓弘還之問何所欲弘識其神人也曰常患若耶溪載薪爲難願旦南風暮北風移後果然故若耶溪風至今呼爲鄭公風也晉書曰嵇紹始入洛或謂王戎曰昨於稠人中始見嵇紹昻昻然若野鶴之}
  - {type: variant, offset: 3808, length: 0, content: '', SBCK: 鷄群戎曰君復未見其父耳又曰吴隱之年十餘歳丁父憂每號泣行人爲之流涕事母孝謹及其執喪哀毀過禮家貧無人鳴鼔毎至􅂘臨之時常有􅀟鶴唳及祥練之夕復有群鴈俱集宋書曰齊髙帝鎮淮隂爲宋明帝所疑􅀍徴爲黃門郎深懷憂慮見平澤有群鶴仍命筆詠之曰八風舞遥翮九野弄清音一摧雲門志爲君死中禽梁書曰􅁃域母好鶴唳域在位營求孜孜不怠一旦􅀟鶴來下論者以爲孝感所致莊子曰鳬脛雖短續之則憂鶴脛雖長斷之則悲又曰老子謂孔子曰夫鶴不日浴而白烏不日黔而黒列子曰詹何曰聞先大夫之言捕旦子之弋弱纎乗風振之連􅀟鶴於青雲之際用心專動手均也墨子曰子禽問曰多言有益乎對曰蝦蟇日夜鳴口乾而人不聽之鶴雞時夜而鳴天下振動多言何益抱朴子曰周穆王南征一軍盡化君子爲猨爲鶴小人爲蟲爲沙神異經曰}
  - {type: page-break, offset: 3808, content: '', id: KR3k0012_SBCK_916-4a}
  - {type: variant, offset: 3808, length: 0, content: '', WYG: 位營求孜孜不怠一旦雙鶴來下論者以為孝感所致荘子曰鳬脛雖短續之則憂鶴頸雖長斷之則悲又曰老子謂孔子曰夫鶴不日浴而白烏不日黔而黒列子曰詹何曰聞先大夫之言蒲且子之弋弱弓纎繳乗風振之連雙鶴於青雲之際用心專動手均也墨子曰子禽問曰多言有益乎對曰蝦蟇日夜鳴口乾而人不聽之鶴雖時夜而鳴天下震動多言何益乎抱朴子曰周穆王南征一軍盡化君子為猿為鶴小人為蟲為沙神異經曰}
