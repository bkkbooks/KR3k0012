  - {type: variant, offset: 3522, length: 165, content: 脯白虎通曰鳳皇禽之長上有明王太平乃來西京雜記曰揚雄讀書有語之曰無為自若苦玄故難傳忽不見雄著太玄經夢吐白鳳皇集其項上而滅楊子法言曰鳳鳥蹌蹌匪堯之庭或問君子在治曰若鳳治則見亂則隱太元經曰鸞鳳不遷甘於竹實騶虞不移於生物醜婦以明鏡為害無所逃其陋論衡曰瑞指篇鳳皇麒麟為聖人來即是聖人之禽也按聖人遊於人間麟鳳亦應與眾鳥同何故遠去中國處於邊外崔, SBCK: 血焦}
