  - {type: variant, offset: 3941, length: 0, content: '', SBCK: 俱隱此年數百歳化成此鶴臨海記曰郡西北有白鶴山周逥六十里髙三百丈有泄水懸注遥望如倒挂白鶴因以爲名古老相傳云此山昔有晨飛鶴入㑹稽雷門鼓中於是雷門鼓鳴洛陽聞之孫恩時斫此鼓見白鶴飛出髙翔入雲此後鼓無復逺聲古歌辭曰飛來白鶴從西北來十十五五羅列成行妻卒􅀍病不能相隨五里還顧六里徘􅆦吾欲衘汝去口噤不能開吾欲􅀒汝去毛羽日摧頽唐書曰天寳中華隂郡奏白鶴見于西嶽五福峯又曰至德中肅宗降誕之辰有慶雲属天白鶴飛舞於上所居殿宇翶翔二十餘匝而去戰國䇿曰莊辛謂楚襄王曰黄鶴生江海俯喙鰋鯉仰斷菱藕奮其六翮自以爲無患與人無争不知夫射者方脩弧矢治矰繳將加巳者萬仞之上故晝遊江湖夕調鼎俎韓詩外傳曰田饒事魯哀公而不見察謂哀公曰夫雞有五徳君猶瀹而食之者以其所從來近也未􅀂黄鸖一舉千里}
