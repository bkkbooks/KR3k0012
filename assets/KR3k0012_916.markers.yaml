  - {type: variant, offset: 3966, length: 1, content: 鳳, SBCK: 鶴鶖鶬鴻禮記曰前有車􅀐則載飛鴻取其飛有行列舉於旗首以警衆又曰孟春之月鴻鴈來鴻自􅀯方來將北反其居也季秋之月鴻鴈來賔來賔言客止來去也左傳曰衛獻公戒孫文子寗惠子食皆服而朝日旰不召勑戒二子欲共宴食皆服朝衣待命旰宴而射鴻於囿二子從之公不釋皮冠而與之言二子怒如􅀫宿孫文子邑毛詩曰鴻鴈美宣王也大曰鴻小曰鴈又曰鴻飛遵渚公歸無所毛詩義䟽曰鴻鵠羽毛光澤純白似鶴而大長頸肉羙如鴈又有小鴻大小如鳬色亦白今人直謂鴻也周易漸曰􅀄六鴻漸于干上九鴻漸于陸其羽可用爲威儀吉鴻水鳥也適進之義治於下而升故以鴻爲喻儀可貴也韓詩外傳曰齊使獻鴻渴使者於道飲鴻而失之使者至楚曰臣欲亡去爲兩使不通欲拔頸而死將以吾君賤士貴鴻也楚王賢之以爲上客史記陳渉歎曰䴏雀安知鴻鵠之志哉管子曰桓公在位管仲隰朋見立有間有二鴻飛過桓公歎曰仲父令彼鴻鵠有時而南有時而北四方無逺所欲至而至焉唯有羽翼之故是能通其意於天下乎寡人有仲父猶飛鴻之有羽翼也魯連子曰展母所爲魯君遺齊襄君鴻至黽浴鴻鴻失其裝在御者曰鴻毛物可使􅀂一結紿置鴻耶荅曰吾非不能買鴻是上隱君下蔽罪也尸子曰虎豹未成文而有食牛之氣鴻鵠之鷇羽翼未合而有四海之心賢者之生亦然淮南子曰蜂房不容鴻􅆑淮南万畢術曰鴻毛之囊可以渡江盛鴻毛於縑囊可以渡江不弱也楊子法言曰鴻飛􅁳􅁳弋人何慕焉新論微子操微子傷殷之將亡終不可柰何見鴻鵠髙飛援琴作操其聲清以淳傳子曰鴻不學飛飛則冲天􅂹不學行行則千里二丗脩驪山陵採玉者傾山採珠者蔽海又曰丈夫重義如太山輕利如鴻毛可謂仁義也諺曰巳是而彼非不當與非争彼是而巳非不當與是平也􅀶物志曰鴻鵠壽千歳背胎産也晉書隱逸傳曰郭瑀燉煌人也張天錫使盖公明徴之瑀翔鴻以示之曰此鳥也安可籠哉遂深逃絶迹公明拘其門人瑀歎曰吾逃禄非避罪也豈得隱居行義害及門人乃出就徵隋書曰盧思道遷武陽太守非其好也爲􅀌鴻賦以􅀉其情曰命志學之歳自郷里遊京便見識知音歴受群公之眷年登弱冠甫就朝列談者過誤遂􅀼虚名通人楊令君邢特進巳下皆分庭致禮倒屣相接翦拂吹嘘長其光價而才夲駑拙性實踈􅂴􅀔利貨殖淡然不營雖籠絆朝市且三十載而獨往之心未始去懷抱也攝生舛和有少氣之病分符坐嘯作守東原洪河之湄沃野弥望嚻務旣屏魚鳥爲隣有離群之鴻爲羅者所獲野人馴養貢之於余置諸池庭朝夕賞翫旣用銷憂兼以輕疾大易稱鴻漸於陸羽儀盛也楊子曰鴻飛􅁳􅁳騫翥髙也淮南子云東歸碣石違溽暑也平子賦曰南寓衡陽避祁寒也􅀂其雅歩清音逺心髙韻鵷鸞巳降罕見其儔而鍜翮牆隂偶影獨立唼􅱷粃粺雞鶩爲伍不亦傷乎余五十之年忽焉巳至永言身事􅁣然其多緒乃爲之賦聊以自慰鵠史記曰齊王使淳于髠獻鵠於楚岀邑門道飛其鵠徒掲空籠以見楚王曰齊王使臣獻鵠過於水上不忍鵠渇出而飲之而飛去吾欲刺腹絞頸而絶恐人議吾君以鳥故令士自殺鵠毛物多相􅀋者吾欲買而代之是不信而欺吾王欲赴他國奔亡痛吾兩主使不通故來受罪楚王曰善􅀃苑曰魏文侯使舎人無擇獻鴻於齊其事同宋書曰桓榮祖善彈爲東海太守登西樓見翔鵠雲中謂左右曰當生取之於是彈其兩翅毛脫盡墜地無傷養毛生乃去􅀯史孝義傳曰謝昌寓陳郡人也爲劉悛廣州參軍孝性甚至甞養一鵠昌寓病二旬而鵠二旬不食昌寓亡而鵠遂飛去韓詩外傳曰晉平公遊於河而樂曰安得賢士與之樂此也舩人盖胥跪而對曰夫珠出江海玉出崑山無足而至者猶主君好之士有足而至者猶主君好之士有足而不著者盖主君無好士之意耳何患無士乎平公曰吾食客門左千人門右千人朝食不足夕收市賦暮食不足朝收市賦吾何謂不好士乎對曰夫鴻鵠一舉千里所恃者六翮耳背上}
