  - {type: variant, offset: 3889, length: 0, content: '', WYG: 闔閭有女王伐楚與夫人及女㑹食蒸魚王嘗半以與女女怨曰王食我殘魚辱我不忍久生}
  - {type: variant, offset: 3890, length: 2, content: 援琴, SBCK: 與俱去風􅁟記曰鳴鶴戒露此鳥性警至八月白露降流於草上滴滴有聲因即髙鳴相警移徙所􅀫處淮南八公相鶴經曰鶴者陽鳥也}
  - {type: variant, offset: 3890, length: 4, content: 援琴而歌, WYG: 自殺闔閭痛之塟於西昌門鑿地為女墳積玉為山丈石為椁金鼎玉牀銀樽珠襦之寳皆以送女乃舞白鶴於呉市中令萬民隨觀之遂使與鶴俱入墓門因塞之以送死漢武帝内傳}
