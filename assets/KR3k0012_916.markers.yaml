  - {type: punctuation, offset: 20, content: 「, id: KR3k0012_CHANT_916-bkkpn11}
  - {type: variant, offset: 22, length: 317, content: 為鳳禮運曰鳳以為畜故鳥不獝況必切又曰升中于天而鳳皇降龜龍假又曰四靈為畜何謂四靈麟鳳龜龍之謂又曰無水旱昆蟲之災凶飢妭孽之疾故天不愛其道地不愛其寶人不愛其情則鳳凰在郊藪其餘鳥獸卵胎皆可俯而窺也左傳曰陳大夫卜妻敬仲妻占之曰吉鳳皇于飛和鳴鏘鏘有媯之後將育于姜又曰我高祖少皞摯之立也鳳鳥適至故紀於鳥為鳥師而鳥名鳳鳥氏司曆者也杜預注曰鳳知時故以名曆官詩曰鳳皇于飛翽翽其羽亦傳於天鳳皇鳴矣於彼高崗梧桐生矣于彼朝陽又䟽曰鳳鳥一名鸑鷟非梧桐不栖非竹實不食書曰蕭韶九成鳳皇來儀論語曰鳳鳥不至河不出圖吾已矣夫又曰鳳兮鳳兮何德之衰爾雅曰鶠鳳其雌皇郭璞注瑞應鳥雞頭虵頸燕領龜背魚彩色高六尺大戴禮曰羽蟲三百六十而鳳皇為之長禮斗威儀曰君乘土而王其政太平則鳳集於林菀, SBCK: 爲鸞}
