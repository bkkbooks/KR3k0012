  - {type: variant, offset: 3222, length: 230, content: 首文曰德翼文曰順背文曰義膺文曰仁腹文曰信是鳥也飲食自歌自舞見則天下大安楚辭曰鳧鴈皆唼夫梁藻兮鳳逾翱而高舉眾鳥皆有所登棲兮鳳獨皇皇而無所集欲衘枚而亡言兮嘗君之渥洽驥不驟進而求服兮鳳亦不貪餧而忘食又曰為鳳皇作鶉籠雖歙翼而不容又曰獨不見鸞鳳之高翔大皇之野循四極而周回見盛德而後下宋玉對曰聞鳳鳥上九千里絕雲霓負蒼天呼窈冥之中藩籬之鷃豈能與之料天地之高哉說文曰鳳神鳥也天老曰鳳像麟前鹿後虵頸魚尾龍文龜背燕頷鷄喙五色備舉出東方君子之國翱翔四海之外過崑崙砥柱濯羽弱水暮宿丹穴, SBCK: ''}
