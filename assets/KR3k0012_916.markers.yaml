  - {type: variant, offset: 3793, length: 1, content: 去, WYG: 有禄位余焉能戰毛詩曰鶴鳴誨宣王也鶴鳴於}
  - {type: variant, offset: 3795, length: 0, content: '', WYG: 臯聲聞余天臯署也言身隠而名著詩義疏曰鶴大如鵝長三尺脚青黑髙三尺餘赤頂赤目喙長四寸多純白亦有蒼色者今人謂之赤頰常夜半髙鳴聞八九里唯老者乃聲下今呉人園中及士大夫家養之雞鳴時亦鳴漢書曰王莾以鶴髓漬榖種學仙㑹稽志曰射的山南有白鶴山此鶴為仙人取箭漢太尉鄭𢎞嘗採薪得一遺箭頃有人來覔𢎞還之問何所欲𢎞識其仙人也曰常患若耶溪載為難願旦南風暮北風後果然故若耶溪風至今呼為鄭公風也晉書曰嵇紹始入洛或謂王戎曰昨於稠人中始見嵇紹昂昻然若野鶴之在雞羣戎曰君復未見其父耶又曰呉隠之年十餘歳丁父憂每號泣行人為之流涕事母孝謹及其執喪哀毁過禮家貧無人鳴鼓每至哭臨之時常有雙鶴到及祥練之夕復有羣雁俱集宋書曰齊髙帝鎮淮隂為明帝所}
