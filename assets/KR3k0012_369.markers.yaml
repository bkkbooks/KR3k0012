  - {type: variant, offset: 1079, length: 1, content: 卒, SBCK: 崩東觀漢記曰江革爲五官中郎將將朝㑹詔使虎賁迎送扶腋寵遇甚厚孔融上書曰先帝褒厚老臣懼其殞越是故扶接助其氣力三公刺腋近爲憂之非警戒也云備大臣非其􅀋也神仙傳曰老子母感大流星而娠懷之七十歳乃生剖母左腋而出肘釋名曰肘注也可隱注也傳曰師陣于鞌郄克傷於矢曰余病矣張侯曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病吾子忍之又曰欒􅄹之亂范鞅遇欒樂曰樂免之死將訟汝於天樂射之不中又注則乗槐本而覆或以㦸鈎之斷肘而死春秋後語曰智伯率韓魏之兵以伐趙襄子於􅀳陽决晉水以灌晉陽之城不没者三板智伯行水魏桓子御韓康叅乗智伯曰吾不知水之可以亡人國乃今知之然汾水可以灌安邑綘水可以灌平陽魏􅁊子肘韓康子韓康子履桓子之足接於車上而智伯地分身死國亡爲天下􅀏}
  - {type: page-break, offset: 1079, content: '', id: KR3k0012_SBCK_369-8a}
  - {type: variant, offset: 1079, length: 1, content: 卒, WYG: 崩東觀漢記曰江革為五官中郎将将朝會詔使虎賁迎送扶腋寵遇甚厚孔融上書曰先帝褒厚老臣懼其殞越是故扶接助其氣力三公刺腋近為憂之非警戒也云備大臣非其類也神仙傳曰老子母感大流星而娠懐之七十嵗乃生剖母左腋而出肘釋名曰肘注也可隠注也傳曰師陳於鞌郄克傷於矢曰余病矣張侯曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病吾子忍之又曰欒盈之亂范鞅遇欒樂曰樂勉之死將訟汝於天樂射之不中又注則乗槐本而復或以㦸鈎之斷肘而死春秋後語曰智仲率韓魏之兵以伐趙襄子於晉陽决晉水以灌晉陽之城不没者三板智伯行水魏桓子御韓康㕘乗智伯曰吾不知水之可以亡人國乃今知之然汾水可以灌安邑絳水可以灌平陽魏桓子肘韓康子韓康子履桓子之足接於車上而智伯地分身死國亡為天下笑}
