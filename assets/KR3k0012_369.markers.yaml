  - {type: variant, offset: 1117, length: 316, content: 滂流齒皆墮地太守獲免晉書曰溫嶠先有齒疾疾因拔齒中風而卒又曰成帝杜皇右少有姿色長猶無齒有求昏者輒中止及帝納采一夜齒盡生又曰謝鯤鄰家有美女鯤調之女以梭投鯤折其兩齒世俗為之謠曰任達不已幼輿折齒幼輿鯤字也山海經曰黑齒國為人黑齒河圖矩起曰帝嚳駢齒宋均曰所以駢齒齒星位白虎通曰帝嚳駢齒上法曰參秉度成紀以埋陰陽抱朴子內篇曰或問堅齒之道荅曰養以華池漱以濃液永不動次則服靈非散既脫更生楊泉物理論曰夫齒者年也身之寶也藏之斧鑿所以調諧五味以安性氣者也神仙傳曰老君䟽齒神仙服經曰服神丹三百歲齒化為石王閎本事曰閎為琅琊太守張步欲誅之閎出東武城門馬奔墮車折齒閎心惡移病歸府前得免字林曰䶜牛於切齒不相值也楚初舉齒切齒傷酢也齩午校切齧噬也齨老人齒如臼也齨音舅段國沙, SBCK: 肘叚􅀛龍凉}
