  - {type: variant, offset: 1067, length: 0, content: '', SBCK: 李廣隴西人援臂善􅀐射又曰陳湯擊郅支時中寒病臂不屈伸湯入有詔無拜又王莽傳曰甄豐子尋作符命而誅尋手理有天子字莽解其臂入視曰此一太子也或曰一六子也明尋子父當戮死也又曰劉歆上議曰武帝立五廟國伐朝鮮起玄莬樂浪以斷匈奴左臂西伐大宛結烏孫以裂匈奴左臂續漢書曰單超河南人梁兾振動天下延熹二年皇后崩帝呼單超等入謀誅兾及更召徐璜具瑗等五人遂定其議帝嚙超臂出血以爲盟兾及宗親黨與悉誅之後漢書曰楊璇平蒼梧桂陽猾賊荆州刺史趙凱誣奏璇實非身破賊而妄有其功遂檻車徴璇防禁嚴宻無由自訟乃嚙臂出血以書衣爲章具陳破賊形勢以付子弟詣闕通之詔原璇更拜議郎凱受誣人之罪魏志曰太祖所乗馬名絶影流矢所中并中太祖右臂吴志曰太史慈字子義東來人也長七尺美􅂡髯猿臂善射蜀志曰先主長七尺五寸自顧見耳垂臂下膝又曰關羽爲流矢所中貫在左臂隂雨常痛伸臂與醫刮骨去毒血流盤器而羽割炙引酒自􅀂晉書曰都官從事濟南劉享奏何曽綺麗華飾瑩牛蹄角後曽辟享爲􅁺因小事杖享破臂晉中興書曰交州刺史王諒爲州人梁碩所圍城䧟碩逼奪諒節諒不與碩遂斷諒右臂諒正色曰死不畏臂斷何有哉崔鴻十六國春秋後趙録曰石勒引李陽懽酣陽臂笑視之曰卿雖老臂中由有力頗復與人􅃲不􅀌徃日懕卿老拳卿亦飽􅀌毒手後秦記曰姚襄垂臂過膝三國典略曰陸法和進於巴陵見王僧辯謂之曰貧道巳却侯景一臂更何能爲檀越冝即逐取侯景三國典略曰髙歡營主尉景欲執爾朱兆歡嚙臂止之唐書曰髙宗幸東都太子於京師􅁥國因留薛元超以侍太子臨行謂元超曰朕之留卿如去一臂􅀜西之事悉以委卿列子曰甘蠅古之善射者飛衛學射於甘蝇紀昌學射於飛衛盡飛之術計天下之敵巳一人而巳乃謀殺飛衛相遇於野二人交射矢鋒觸而墜於地飛矢先窮紀昌唯一旣發飛衛以􅁄刺之端扞之而無差於是二子泣而投弓相拜於途請爲父子剋臂以誓不得告術於人也莊子曰仲尼謂顔淵曰吾終身與汝交臂而失之可不哀與又曰浸假而化子之左臂以爲鷄予因以求時夜浸假而化予之右臂以爲彈予因以求鷄炙又曰韓魏相争侵地子華子見昭僖侯昭僖有憂色子華子曰今使天下書銘於君之前曰左手攫之則右手廢右手攫之則左手廢然而攫之必有天下君攫之乎僖侯曰寡人不攫也子華子曰自是觀之兩臂重於天下也身又重兩臂韓之輕於天下逺矣燕丹子曰荆軻拾瓦投鼃音圭太子令人奏奉盤金軻用竭復進軻曰非爲太子愛金也但臂痛耳淮南子曰羿右臂長而善射新序曰崔杼殺莊公申蒯漁於海將入死之門者以告崔杼令勿内蒯曰汝疑我乎乃斷其左臂以與門者以示杼陳八列令其入蒯拔劒呼天而􅃲殺七列不及崔杼一列而死白虎通曰湯臂二肘是謂抑翼攘去不義萬民蕃息璅語曰晉師曠晝侍平公鼓瑟輟而􅀏曰齊君與嬖人戲墜床傷臂公書記之使問齊侯果如其言山海經曰長臂國人捕魚水中兩手各操一魚又曰竒肱之國其人唯有一臂劉欣期交州記曰儋耳之東人臂一骨外國事曰大拳國人援臂長脇西京雜記曰宣帝􅀍􅀵繫郡邸獄臂上猶帶史良娣合綏宛轉繩係寳鏡一枚幽明録曰有人相羊叔子父墓有帝王之氣叔子於是乃自掘斷墓後相者又云此墓由當出折臂三公叔子工􅀐乗及爲襄陽縣督盤馬落地遂折臂論衡曰書傳稱曽子孝與母同氣曽子出薪於野客至而欲去曽子母以右手搤左臂曽子左臂立痛即馳至此虚也臂痛曽子臂亦痛母死曽子亦死乎搤於革切俗􅀃曰釋道安生便左臂上一肉廣一寸許着臂如釧將可上下時人謂之印手菩薩楚辭曰九折臂而成醫腕釋名曰腕者言宛屈也左傳定下曰晉師將盟衛侯于鄟澤鄟音專趙簡子曰羣臣誰敢盟衛君者渉佗成何曰我能盟之將㰱渉佗捘衛侯之手及腕捘子對切捘擠也血至於腕衛侯怒腋釋名曰腋繹也言可}
