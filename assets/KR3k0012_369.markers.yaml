  - {type: variant, offset: 931, length: 1, content: 武, SBCK: 文}
  - {type: variant, offset: 931, length: 0, content: '', WYG: 文王龍顔阜肩左傳昭二十年曰衛公孟縶狎齊豹初齊豹見宗魯於公孟薦逹也為驂乗焉將作亂而謂之曰公孟之不若子所知也勿與乗吾將殺之對曰吾由子事公孟今聞難而逃是僣子也使子言不信子行事乎吾將死之公孟有事於盖獲之門外宗魯驂乗齊氏用戈擊公孟宗魯以背蔽之斷肱以中公孟之肩皆殺之又昭二十六年成大夫公孫朝告于齊曰孟氏魯之敝室也敝壊也用成已甚弗能忍也請息肩于齊齊師圍成又定上曰楚子渉睢濟江入于雲中雲夢澤也王寢盗攻之以戈擊王王孫由于以背受之中肩爾雅曰北方有比肩民焉迭食而迭望此即半體之人各有一目一鼻一孔一臂一脚亦猶魚鳥之相合也崔鴻十六國春秋後趙録曰初太}
  - {type: page-break, offset: 931, content: '', id: KR3k0012_WYG_369-4b, image: WYG0896/WYG0896-0286d.png}
  - {type: page-break, offset: 931, content: '', id: KR3k0012_WYG_369-5a, image: WYG0896/WYG0896-0287a.png}
  - {type: variant, offset: 931, length: 1, content: 武, krp: 文}
  - {type: variant, offset: 932, length: 0, content: '', WYG: 殿既成圖畫自古賢聖忠臣烈士是月皆變為胡状旬餘頭悉入肩中喉冠㠹髣髴㣲出石虎大惡之國語曰叔魚鳶肩其母曰是必為賄死荘子曰支离䟽肩髙於頂又曰盧敖見若士深目鳶肩淮南子曰東方之人鳶肩文北方人大肩梁冀别傳曰冀鳶肩文士傳曰趙益肩髙二尺髙自抗竦為鄉黨所擯車頻秦書曰苻堅生肩背有赤色隠起状如篆文洛神賦曰肩若削成胛釋名曰胛闔也與胷脇背相㑹闔說文曰􅈩肩胛也春秋元命苞曰胛之為言附着也如龍蟠虎伏合附着也吴越春秋曰専諸刺}
  - {type: page-break, offset: 932, content: '', id: KR3k0012_WYG_369-5b, image: WYG0896/WYG0896-0287b.png}
  - {type: page-break, offset: 932, content: '', id: KR3k0012_WYG_369-6a, image: WYG0896/WYG0896-0287c.png}
  - {type: variant, offset: 933, length: 2, content: 駢齒, SBCK: 龍顔阜肩左傳昭二十年曰衛公孟縶狎齊豹􅀄齊豹見宗魯於公孟薦逹也爲􅆖乗焉將作亂而謂之曰公孟之不􅀂子所知也勿與乗吾將殺之對曰吾由子事公孟今聞難而逃是僣子也使子言不信子行事乎吾將死之公孟有事於蓋獲之門外宗魯􅆖乗齊氏用戈擊公孟宗魯以背蔽之斷肱以中公孟之肩皆殺之又昭二十六年成大夫公孫朝告于齊曰孟氏魯之敝室也敝壞也用成巳甚弗能忍也請息肩於齊齊師圍成又定上曰楚子渉睢七余切濟江入于雲中雲夢澤也王寢盗攻之以戈擊王王孫由于以背受之中肩爾雅曰北方有比肩民焉迭食而迭望此即半躰之人各有一目一鼻一孔一臂一脚亦由魚鳥之相舎也崔鴻十六國春秋後趙録曰􅀄太式殿旣成圖􅀞自古賢聖忠臣烈士是月皆變爲胡􅃺旬餘頭悉入肩中喉冠忦音介髣髴微出石虎大惡之國語曰叔魚鳶肩其母曰是必爲賄死莊子曰支離䟽肩髙於頂又曰盧敖見􅀂士深目鳶肩淮南子曰東方之人鳶肩北方人大肩梁兾別傳曰兾鳶肩文傳曰趙壹肩髙二尺髙自抗竦爲郷黨所擯車頻秦書曰符堅生肩背有赤色隱起􅃺如􅂐文洛神賦曰肩􅀂削成胛釋名曰胛闔也與􅇩脇背相㑹闔􅀃文曰髆肩胛也春秋元命苞曰胛之爲言附着也如龍蟠虎伏合附着也吴越春秋曰專諸刺王僚貫胛逹背臂釋名曰臂禆也在傍曰禆也左傳莊公􅀄公築臺臨黨氏見孟任從之閟而以夫人言許之割臂盟公生子般焉又襄公公孫丁射尹公佗貫臂春秋元命苞曰湯臂四肘}
