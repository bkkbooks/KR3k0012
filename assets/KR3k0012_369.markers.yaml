  - {type: variant, offset: 730, length: 195, content: 以齒食多者長食少者幼也禮曰母剌齒口口容止也又曰濡肉齒決決猶斷也乾肉不齒決壑宜用乎又曰高子皋之執親之喪也泣血三年未嘗見齒言笑之微君子以為難左傳曰陳僖子使召公子陽生立之將盟遂誣鮑子曰之命也鮑子曰汝忘君之為孺子牛而折其齒乎孺子荼也景公常銜繩為牛使荼牽之荼頓地折其齒也詩碩人曰齒如瓠犀又閟宮曰既受多祉黃髮兒齒公羊傳莊公曰仇牧聞閔公弒趨而至遇之于門手劍而叱之宋萬臂樧仇牧碎其首齒著乎門闔側手曰假袁葛切, SBCK: ''}
