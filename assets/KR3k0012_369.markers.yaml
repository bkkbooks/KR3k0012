  - {type: variant, offset: 1455, length: 1479, content: 異物志曰屠移在海外以草染齒因號黑齒袁子正書曰山梁氏泥於西屠而染其齒世說曰孫子荊少時欲隱語王武子曰吾當枕石漱流誤云漱石枕流王曰流非可枕石非可漱孫曰所以枕流欲洗其耳所以漱石欲礪其齒又曰王子猷詣謝玄林公先在坐王曰若林公髮鬢並全神情當復勝此不謝曰脣齒相須不可偏亡琴操曰聶政父為韓王冶劍過期不成王殺之時政未生及長入太山遇仙人學鼓琴漆身為厲吞炭變音七年琴成入韓逢其妻從買櫛對妻而笑妻泣曰君何以似政齒政乃入山援石擊落其齒楚辭曰美人皓齒嫮以姱臨海水土志曰夷州人俗女曰已嫁皆缺去前上一齒宋玉登徒子賦曰腰如束素齒如含貝司馬相如上林賦曰皓齒粲爛張協褉賦曰清哇發於素齒牙釋名曰牙植牙也隨形言之也干寶晉紀曰賈庶人未害慜懷太子時有謠曰南風烈烈吹白沙千歲髑髏生齒牙南風庶人名愍懷小名沙門三國典略曰齊太上主生齻音顛牙問於尚藥典御鄧宣以對太上主怒而撻之中書監徐之才拜賀曰此智牙生者聰明長壽太上悅而賞之喉咽說文曰咽嗌也喉嚨也釋名曰咽咽物也青徐謂之脰音豆物投其中受而下之也又謂之嗌音益氣所通流阨要之處也傳曰敗狄于鹹獲長狄僑如富父終生舂其喉以戈殺之孝經鉤命決曰夫子輔喉史記曰孫子曰夫救鬭者不搏撠音戟批亢擣虛形格勢禁則自為解耳亢音剛又音抗人喉也又曰貫高聞赦張王乃曰所以不死者白張王不反今王已出吾責已塞死不恨矣且人臣有篡弒之名何面目復事上哉縱上不殺我不媿心乎乃仰絕亢而死韋昭曰亢咽也漢書曰人有上書言息夫躬懷怨恨非笑朝廷所進候星宿視天子吉凶與巫共祝詛上遣侍御史廷尉監逮躬繫雒陽詔獄欲掠問躬仰天大謼火故反因僵仆吏就問云咽已絕師古曰咽喉嚨也音一千反後漢書曰霍諿音緝為舅宋光被誣上書曰譬猶療飢於附子止渴於酖毒未入腸胃已絕喉咽豈可為哉又曰王青字公然青父隆建武初為都尉功曹青為小吏與父俱從都尉行縣道遇賊隆以身衛全都尉遂死於難青亦被矢貫咽音聲流喝又曰李固對詔曰陛下有尚書猶天之有北斗北斗天之喉舌尚書陛下之喉舌魏志曰樂陵王茂兄東平王薨茂稱咽病不肯發哀詔削戶蜀志曰彭羕與葛亮書曰先民有言左手據天下之圖右手扼其喉愚夫不為也僕頗別菽麥哉唐書曰幽州朱融鎮州王庭湊叛東川節度王涯獻書曰臣聞用兵若鬭先扼其喉今瀛莫易定兩賊之咽喉也誠宜假之威柄戍以重兵俾其死生不相知間諜無所入而以大軍先進冀趙次臨井陘此一舉萬全之勢也抱朴子曰焦喉之渴遙指滄海列女傳曰齊鍾離春者宣王后也極醜邛鼻結喉益部耆舊傳曰犍為楊鳳珪者其妻陳姬珪早亡兄弟欲嫁之姬於是列刀割咽流血幾死九族驚異乃從其節又曰蜀郡史賢妻張昭儀賢既犯罪被誅儀取刀自割咽喉而死物理論曰咽喉生之要孔黃帝素問曰喉主天氣咽主地氣頤頷釋名曰頤或曰輔車其骨強所以輔持其口或曰牙車牙所載也或曰頷車頷含也韓詩曰有美一人碩大且媕薛君曰媕重頤也五檢切周易噬嗑卦曰頤中有物曰噬嗑又頤卦曰頤貞吉觀頤自求口實春秋元命苞曰后稷歧頤自求是謂好農蓋象角元載土食穀宋均注曰面皮有二象也頤面為下部下部為地巧於利也戰國策曰靜郭君善昆辨昆辯多疵門下不悅孟嘗君以諫靜郭君大怒舍之上舍令長子御旦暮進食威王薨宣王立太子不善靜郭君辭之薛昆辯至齊見宣王王曰子靜郭君所聽愛者乎曰愛即有之聽即無有王之為太子辯謂靜郭君曰太子相不仁過頤豕眎若是法背父不若廢太子更立衛姬子嬰兒郭師靜郭君泣而曰不可吾弗忍為聽辨而為之必無今患矣宣王曰寡人殊不知此乃迎靜郭君史記曰黃歇上書秦王曰本國殘社稷壞刳腹結膓折頸摺頤摺盧合切又曰蔡澤顩頤顩五撿切漢書曰王莽蹙頤范曄後漢書曰班超字仲升為人大志不脩小節嘗行詣相者相者曰祭酒布衣諸生而當封侯萬里之外超問其狀相者曰生燕頷虎頭飛而肉食此萬里侯相也江表傳曰孫權方頤大口三國略曰徐之才年十三劉孝綽見之言曰徐郎鷰頷班超之相也帝系曰帝嚳方頤, SBCK: ''}
