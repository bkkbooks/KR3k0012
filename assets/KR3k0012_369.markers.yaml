  - {type: variant, offset: 240, length: 2, content: 顏異, SBCK: 爲刎頸之交刎頸之交者言託契深重雖断頸絶頭無所顧也又曰周昌甞燕入奏事髙帝方擁戚􅁎昌還走髙帝逐得􅀐昌項問曰我何如主也昌仰曰陛下即桀紂主也又曰田蚡取燕王女爲夫人太后詔列侯宗室皆往賀灌夫行酒至臨汝侯灌賢賢方與程不識耳語夫無所發怒廼罵賢坐迺起更衣稍稍去竇嬰去因戲音麾招麾之令出也夫出蚡遂怒曰此吾驕灌夫罪也迺令􅀐留夫夫不得出籍福起爲謝按夫項令謝夫愈怒不肯順蚡迺戲􅀐戲亦音麾令縛夫置傳舎後漢書曰董宣旣格殺胡陽公主家蒼頭帝使宣謝公主宣不伏上使人按其項於地宣不肯起因號爲強項侯東觀漢記曰班超字仲升常行遇見相工工謂超曰䴏頷虎頭飛而食肉此萬里封侯相魏書曰文帝旣立爲嗣喜因抱辛毗頸曰辛君知吾喜不魏志曰母丘儉使王傾至海上海上人云得一破舡}
