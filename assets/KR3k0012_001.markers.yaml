  - {type: variant, offset: 4815, length: 16, content: 義訓張顯析言郭璞洞林陸氏異林劉敬, WYG: 冬至日月若懸璧五星若編珠詩紀厯樞曰箕為天口主出氣大戴禮曰放勲其仁如天其智如神就之如日望之如雲春秋感精符曰人主與日月同明四海合信故父天母地兄日姊月父天於圓丘之禮也母地於方澤之祭也兄日於東郊也姊月於西郊也春秋繁露曰天有十端天為一端地為一端陽為一端隂為一端水為一端土為一端人為一端金為一端木為一端火為一端天亦有喜怒之氣哀樂之心與人相副以類合之天人一也春喜氣故生秋怒氣故殺夏樂氣故養冬衰氣故藏四者天人同有之春秋内事曰天有十二分以日月之所躔也春秋元命苞曰天不足西北陽極於九故周天九九八十一萬里孝經援神契曰周天七衡六間相去一萬九千八百三十三里三分里之一合十一萬九千里從内衡以至中衡從中衡以至外衡各五萬九千五百里史記曰}
