  - {type: variant, offset: 1558, length: 1, content: 鬼, WYG: 曰道始于虛霩虛霩生宇宙宇宙生元氣無有涯垠清陽者薄音博劘音摩而為天又古未有天地之時唯象無形幽幽㝠㝠茫茫昧昧幕幕閔閔鴻濛澒洞莫知其門有二神混沌生高誘注曰二神經天營地之神經天營地深乎莫知其中滔乎莫知其所止息於是别為隂陽離為八極剛柔相成萬物乃形遁甲開山圖曰有巨靈者偏得元神之道故與元氣一時生混沌又南溟之山金堂玉室上含元氣實滋神化又麗山氏分布元氣各以次序産生山}
