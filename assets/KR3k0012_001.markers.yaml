  front:
  - {type: variant, offset: 0, length: 0, content: '', SBCK: 孝經左契曰元氣混沌孝在其中漢書律曆志曰黃鍾黃者中之色故陽氣施於下泉孳萌萬物爲六氣元也故以黃色名元氣焉又曰太極運三辰五星於上元氣轉三統五行於下家語曰夫禮必夲之太一太一分爲天地轉爲隂陽變爲四時列爲􅀑神太一謂元氣也淮南子曰道始生虚霩虚霩生宇宙宇宙生元氣有涯垠清陽者薄音博劘音摩而爲天又曰古未有天地之時唯象無形幽幽冥冥茫茫昧昧幕幕閔閔鴻濛澒洞莫知其門有二神混沌生髙誘注曰二神經天營地之神經地營天孔􅀷也乎莫知其終滔乎莫知其所止息於是乃别爲隂陽離爲八極剛柔相成萬物乃形遁甲開山圖曰有巨靈者徧得元神之道故與元氣一時生混沌又曰南溟之山金堂玉室上無元氣寔滋神化又曰麗山氏分布元氣各生次}
