  - {type: variant, offset: 19, length: 1, content: 資, SBCK: 太素質之始也又曰雄含物䰟號曰太素雌雄俱行故能含物魂而生物也獨言雄雌主於陽故也帝王丗紀曰形變有質謂之太素太素之前幽清寂寞不可爲象惟虚惟無蓋道之根自道旣建猶無生有太素質始萌萌而未兆謂之厖洪蓋道之幹旣育萬物成體於是剛柔始分清濁始位天成於外而體陽故圎以動蓋道之實禮斗威儀曰二十九萬一千八百四十􅀊而反太素􅁳莖蓋乃道之根也禮含文嘉曰推之以上元爲始起十一月甲子朔旦夜半冬至日月五星俱起牽牛之初鄭􅀇注上元太素巳來至所永年廣雅曰太素質之始也巳有素朴而未散也樂動聲儀曰作樂制禮時有五音始於上元戊辰夜半冬至北方子鄭􅀇注曰戊辰土位土爲宫宫爲君故作樂尚之以爲始也夜半子亦天時之始禮稽命㣲起於太素十一月閼逢之曰歳在攝提格之紀是云作樂制禮蓋作樂則有禮通其文耳張衡靈憲注曰太素之前幽清玄靜寂寞􅁳黙不可爲象厥中惟靈如是者永乆焉斯謂􅁳莖蓋乃道根旣建由無生有太素始萌萌而末兆并體同色坤屯不分坤屯音渾沌陳思王髑髏說曰昔太素氏不仁勞我以體苦我以生今也幸變而之死是反吾眞也又魏德論曰不能貫道義之清英窮混元於太素亦以明矣又魏文帝誄曰皓皓太素兩儀始分沖和産物肇有人倫又大暑賦曰壯皇居之瑰瑋兮歩八閎而爲宇節四運之常氣兮踰太素之儀矩阮籍通老論曰聖人明於天人之理達於自然之分通於}
