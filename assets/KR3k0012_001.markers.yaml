  - {type: variant, offset: 9, length: 0, content: '', SBCK: 豈一日哉楊泉物理論曰楊雄非渾天而作蓋天圓其蓋左轉日月星辰隨而東西桓譚難之雄不解此蓋天者復難知也元氣皓大則稱皓天皓天元氣也皓然而巳無他物焉楊雄檄靈賦曰自今推古至於元氣始化古不覽今名號迭毁請以詩春秋言之又解嘲曰太􅀇五千文支葉扶踈獨􅀃十餘萬言􅀷者入地底髙者出蒼天}
  - {type: page-break, offset: 9, content: '', id: KR3k0012_SBCK_001-2a}
  - {type: variant, offset: 9, length: 0, content: '', krp: 豈一日哉楊泉物理論曰楊雄非渾天而作蓋天圓其蓋左轉日月星辰隨而東西桓譚難之雄不解此蓋天者復難知也元氣皓大則稱皓天皓天元氣也皓然而巳無他物焉楊雄檄靈賦曰自今推古至於元氣始化古不覽今名號迭毁請以詩春秋言之又解嘲曰太玄五千文支葉扶踈獨說十餘萬言深者入地底髙者出蒼天}
  - {type: variant, offset: 11, length: 0, content: '', SBCK: 􅆂元氣纎者入無倫等也班固東都賦曰萬樂備百禮曁皇情浹群臣醉降烟煴調元氣又漢頌論功歌詩曰后土化育兮四時行脩靈液養兮元氣覆冬同雲兮春霡霂膏澤洽兮殖嘉榖張衡􅀇圖曰􅀇者包含道德搆掩乾坤橐籥元氣禀受無原陳思王魏德論曰元氣否塞􅀇黃漬薄星辰逆行隂陽舛錯國無完邑陵無掩槨四海歸沸蕭條沙漠又七啓曰}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_SBCK_001-2b}
  - {type: variant, offset: 11, length: 0, content: '', krp: 涵元氣纎者入無倫等也班固東都賦曰萬樂備百禮曁皇情浹群臣醉降烟煴調元氣又漢頌論功歌詩曰后土化育兮四時行脩靈液養兮元氣覆冬同雲兮春霡霂膏澤洽兮殖嘉榖張衡玄圖曰玄者包含道德搆掩乾坤橐籥元氣禀受無原陳思王魏德論曰元氣否塞玄黃漬薄星辰逆行隂陽舛錯國無完邑陵無掩槨四海歸沸蕭條沙漠又七啓曰}
  - {type: variant, offset: 12, length: 1, content: 二, SBCK: 形必杇有端必窮茫茫元氣誰知其終孫楚石人銘曰大象無形元氣爲母杳兮冥兮陶冶衆有陸機雲賦曰攄神景於八幽合洪化於烟煴充宇宙以播象恊元氣而齊勲潘岳西征賦曰古徃今來邈矣悠哉寥廓惚恍化一氣而甄三才太易老子曰有物混成先天地生易乾鑿度曰夫有形者生於無形故有太易者未見氣也帝王世紀曰天地未分謂之太易列子曰夫有形者生於無形則天地安從生自然而生故有太易太􅀄太始太素此有物之始自微至著變化自相因襲太易者未見氣也易者不窮滯之稱凝寂於太虚之域將何見乎即如易繫之太極老氏之混成太􅀄者氣之始也隂陽未判下句所謂渾淪太始者形之始也隂陽旣判品物流形太素者質之始也質性也旣爲物矣則方圎剛柔静躁各有其性氣質具未相離此直論氣之形質不復說太易爲三者宗本下句别自明之故曰渾淪渾淪者言萬物相渾淪而未相離雖渾然一氣不相離襲而三才之道實潜兆乎其中淪語助也視之不見聽之不聞循之不得故曰易也易無形畔老子曰視之不見名曰希而曰易易簡之别稱也太易之義如此而巳故能爲萬物宗性真一而不變也易變而爲一所謂易者窈􅁳忽恍不可變也一氣持之而化變故􅀉名變也一變而爲七七變而爲九九變者之究也究窮也一變而爲七九不足以次數者全舉陽數頋其都㑹也乃復變而爲一一者形變之始既渉於有形之域理數旣終乃復反而爲一反而爲一歸形變之始也此蓋明變化徃復無極太初易乾鑿度}
  - {type: page-break, offset: 12, content: '', id: KR3k0012_SBCK_001-3a}
