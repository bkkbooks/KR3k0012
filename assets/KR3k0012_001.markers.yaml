  - {type: variant, offset: 4732, length: 2, content: 班彪, WYG: 曰太極之先兩儀始分絪絪緼緼有沉而奥有浮而清陳思王七啟曰夫太極之初混沌未分萬物純純與道俱運又畵讃叙曰}
  - {type: page-break, offset: 4732, content: '', id: KR3k0012_WYG_001-11b, image: WYG0893/WYG0893-0040d.png}
  - {type: variant, offset: 4735, length: 0, content: '', WYG: 形太極混元之前却列將來未萌之}
  - {type: xml-element, offset: 4736, content: '', id: KR3k0012_CHANT_001-bkkxmlele1724}
  - {type: xml-element, offset: 4736, content: '', id: KR3k0012_CHANT_001-bkkxmlele1725}
  - {type: 'tls:seg', offset: 4736, content: '', id: KR3k0012_CHANT_001-219a.3}
  - {type: variant, offset: 4736, length: 2, content: 桓譚, WYG: 阮籍通老論曰道者法自然而為化侯王能守之萬物將自化易謂之太極春秋謂之元老子謂之道陸機雲賦曰覽太極之初化判𤣥黄於乾坤考天壤之靈變莫嫓美乎慶雲傅𤣥風賦曰嘉太極之開元美天地之定位樂雷風之相薄恱山澤之通氣張華詩曰混沌無形氣奚從生兩儀元一是能分太極焉得離𤣥為誰翁子道是誰家兒天形自西廻日月曷東馳陸士龍答士衡詩曰伊我世族太極降精昔在}
  - {type: page-break, offset: 4736, content: '', id: KR3k0012_WYG_001-12a, image: WYG0893/WYG0893-0041a.png}
  - {type: variant, offset: 4739, length: 0, content: '', WYG: 代軒虞篤生天部上釋名曰天顯也在上髙顯也天坦也坦然髙而逺也易曰天垂象見吉凶聖人則之又觀乎天文以察時變觀乎人文以化成天下又立天之道曰隂與陽又天行健君子以自強不息又本乎天者親上本乎地者親下又天地之道貞觀者也又天道虧盈而益謙又天地設位而易行乎其中又乾為天又時乗六龍以御天又天尊地卑乾坤定矣又在天成象在地成形又大哉乾元萬物資始乃統天書曰髙明柔克沉潜剛克髙明謂天也又乃命羲和欽若昊天又皇天無親惟徳是輔又皇天震怒命我文考肅將天威詩曰畏天之威于時保之又天歩艱難之子不猶又維天之命於穆不已又謂天蓋髙不敢不跼謂地蓋厚不敢不蹐跼曲也蹐累足也箋云跼蹐者天髙而有雷電地厚而有淪陷此民疾苦王政上下皆可畏怖之言禮曰天地之道博也厚也髙也明也悠也久也今夫天斯昭昭之多及其無窮也日月星辰繫焉萬物覆焉又天則不言而信天無私覆是天道也無為而物成又天秉陽垂日星秉持也又天不愛其道故天降甘露又著不息者天也聖人作樂以應天又天有四時春夏秋冬風雨霜露無非教也又燔柴於泰壇祭天也又孟冬之月天氣上騰地氣下降又祭天於南郊就陽之義也祭天掃地而祭於其質而已矣又清明象天傳曰天有六氣降生五味六氣者隂陽風雨晦明又叔孫穆子夢天壓己弗勝又公孫歸父㑹楚子於宋宋人告急於晉晉侯欲殺之伯宗曰不可天方授楚未可與爭雖晉之強能違天乎又晉侯賜畢萬魏卜偃曰畢萬之後必大萬盈數也魏大名也以是始賞天啓之矣爾雅曰穹蒼天也天形穹隆其色蒼蒼因名云春為蒼天萬物蒼蒼然生夏為昊天言氣皓旰秋為旻天旻猶愍也愍萬物凋落冬為上天言時無}
