  - {type: variant, offset: 97, length: 1, content: 獨, krp: 竦戾又詩曰太素卜令宅希微啓奥基玄冲慕懿文虚無承先師又詩曰澄神玄漠流棲心太素域弭節欣髙視俟我大夢覺頋公直荅陸機曰恢恢太素萬物初基在昔哲人觀衆濟時太極易繫辭曰易有太極是生兩儀兩儀生四象四象生八卦漢書律曆志曰太極元氣凾三爲一又曰太極中央元氣故爲黃鍾又曰元}
  - {type: variant, offset: 99, length: 1, content: 載, SBCK: 統始易太極之首也帝王世紀曰質形巳具謂之太極樂動聲儀曰神守於心遊於目窮於耳徃乎萬里而至疾故不得而不速從􅅐臆之中而徹太極援引無題人神皆感神明之應音聲相和班固典引曰太極之先兩儀始分烟烟煴煴有沉而奥有浮而清陳思王七啓曰夫太極之初混沌未分萬物純純與道俱運又􅀞讃叙曰上形太極混元之前却列將來未萌之事阮}
