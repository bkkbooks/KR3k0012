  - {type: variant, offset: 5132, length: 9, content: 軍令諸葛亮兵要范曄, WYG: 曰學者温問曰天有頭乎宓曰有詩曰乃眷西顧天若無頭何以顧之又曰有耳乎曰有詩云鶴鳴于九臯聲聞于天無耳何以聞之天有足乎曰有詩云天步艱難若無足何以步天有姓乎曰有曰何姓曰姓劉何以知之曰其子姓劉故以知之温大敬之晉書曰世祖登阼探䇿得一羣臣失色吏部郎中裴楷進曰天得一以清地得一以寧王侯得一為天下貞上大悅又惠帝末天裂為}
