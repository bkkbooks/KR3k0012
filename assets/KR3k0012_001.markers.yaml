  - {type: variant, offset: 97, length: 1, content: 獨, SBCK: 竦戾又詩曰太素􅁲令宅希微啓奥基􅀇冲慕懿文虚無承先師又詩曰澄神􅀇漠流棲心太素域弭節欣髙視俟我大夢覺頋公直荅陸機曰恢恢太素萬物初基在昔哲人觀衆濟時太極易繫辭曰易有太極是生兩儀兩儀生四象四象生八卦漢書律曆志曰太極元氣凾三爲一又曰太極中央元氣故爲黃鍾又曰元}
