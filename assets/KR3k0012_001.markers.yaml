  - {type: variant, offset: 4251, length: 0, content: '', WYG: 冶衆有陸機雲賦曰攄神景於八幽合洪化於烟煴充宇宙以播象協元氣而齊勲潘岳西征賦曰古徃今來邈矣悠哉寥廓恍惚化一氣而甄三才太易老子曰有物混成先天地生易乾鑿度曰夫有形者生於無形故有太易者未見氣也帝王世紀曰天地未分謂之太易列子曰夫有形者生於無形則天地安從生自然而生故有太易太初太始太素此有物之始自㣲至著變化自相因襲太易者未見氣也易者不窮滯之稱凝寂于太虛之域將何見乎即如易繫之太極老}
  - {type: page-break, offset: 4251, content: '', id: KR3k0012_WYG_001-5a, image: WYG0893/WYG0893-0037c.png}
  - {type: variant, offset: 4252, length: 28, content: 家傳邵氏家傳桓氏家傳殷氏家傳荀氏家傳崔氏家傳江偉家傳啇氏, WYG: 之混成太初者氣之始也隂陽未判下句所謂渾淪太始者形之始也隂陽既判品物流形太素者質之始也質性也既為物矣則方圓剛柔靜躁各有其性氣質具而未相離此直論氣之形質不復說太易太易為三者宗主下句别自明之故曰渾淪渾淪者言萬物相渾淪而未相離也雖渾然一氣不相離襲而三才之道實潛兆乎其中也視之不見聽之不聞循之不得故曰易也易無形埒老子曰視之不見名曰希而曰易希簡之别稱也太易之義如此而已故為萬物宗主冥一而不變也易變而為一所謂易者窈冥恍惚不可變也一氣持之而化變化寄名變也一變而為七隂陽五行為七七變而為九隂陽各分老少與五行合為九九變者之究也究窮也乃復變而為一一者形變之始既歸於有形之域理數既終乃復反而為一反而為一形變而始也此蓋明變化往復無極太初易乾鑿度曰太初者氣之始也帝王}
