  - {type: variant, offset: 1400, length: 2, content: 繁露, SBCK: 曰晧天其星胃昴西南朱天其星參狼南方赤天吕氏春秋廣雅皆曰炎天其星輿􅀑栁東南陽天其星張翼軫吕氏春秋曰天有九野東方曰蒼天西方曰晧天南方曰炎天其餘悉同周書曰神農之時天雨粟神農耕而種之尚書中􅃸曰天地開闢甲子冬至日月􅀂懸璧五星􅀂編珠詩記曆樞曰箕爲天口主出氣大戴禮曰放勛其仁如天其智如神就之如日望之如雲}
  - {type: page-break, offset: 1400, content: '', id: KR3k0012_SBCK_001-9b}
  - {type: variant, offset: 1400, length: 2, content: 繁露, krp: 曰晧天其星胃昴西南朱天其星參狼南方赤天吕氏春秋廣雅皆曰炎天其星輿鬼栁東南陽天其星張翼軫吕氏春秋曰天有九野東方曰蒼天西方曰晧天南方曰炎天其餘悉同周書曰神農之時天雨粟神農耕而種之尚書中候曰天地開闢甲子冬至日月若懸璧五星若編珠詩記曆樞曰箕爲天口主出氣大戴禮曰放勛其仁如天其智如神就之如日望之如雲}
