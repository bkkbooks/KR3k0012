  - {type: variant, offset: 547, length: 342, content: 餽弗可卻者姑外積焉一日大斥之募工鍥木以廣斯文之傳廷允獲與校讎凡金根亥豕皆釐正之字三萬八千有奇其義有弗可猝通而無所援据以為質者則亦傳疑弗敢臆也書一千卷蓋月琯六易而竣事蜀大夫士詫曰蓄眼未有猗歟盛哉迪功郎前閬州閬中縣尉雙流李廷兄謹跋謹按國朝會要曰太平興國二年三月詔翰林學士李昉扈蒙知制誥李穆太子詹事湯悅太子率更令徐鉉太子中允張洎左補闕李克勤左拾遺宋白太子中舍陳鄂光祿寺丞徐用賓太府寺丞吳淑國子監丞舒雅少府監丞李文仲阮思道等同以群書類集之分門編為千卷先是帝閱前代類書門目紛親先其倫次遂詔修此書以前代修文御覽藝文類聚文思博要及諸書參詳條次分定門目八年十二月書成詔曰史館新纂太平總類包羅萬象總括群書紀歷代之興亡自我朝之編纂用垂永世可改名為太平御覽帝每聽政之暇日讀御覽三卷有故或闕即追之雖隆冬短景必, SBCK: 多}
