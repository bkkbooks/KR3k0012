  - {type: variant, offset: 1, length: 3, content: 序祖宗, SBCK: 産生山谷帝系譜曰天地􅀄起溟涬濛鴻即生天皇始萬八千歳以木德王十洲記曰崑陵崑崙山也上有金臺玉闕亦元氣之所合天帝之居治處六韜曰天之爲天逺矣地之爲地乆矣萬物在其間各自利何世莫之有乎夫使世俗皆能順其有是乃溟涬濛鴻之時爲王故莫之能有七十六}
  - {type: variant, offset: 1, length: 3, content: 序祖宗, krp: 産生山谷帝系譜曰天地𥘉起溟涬濛鴻即生天皇始萬八千歳以木德王十洲記曰崑陵崑崙山也上有金臺玉闕亦元氣之所合天帝之居治處六韜曰天之爲天逺矣地之爲地乆矣萬物在其間各自利何世莫之有乎夫使世俗皆能順其有是乃溟涬濛鴻之時爲王故莫之能有七十六}
