  - {type: variant, offset: 4445, length: 7, content: 秦記李穆叔趙記, WYG: 孔子誄曰養徒三千升堂七十潜神演思因使作書考混元於無形本造化於太初又大人先生𫝊曰太初真人惟太之根専氣一志萬物以存又馳騖乎太初之中休息乎無為之宫太初何始無後無先太始易乾鑿度曰太始者形之始也又雌生戌仲號曰太始雄雌俱行三節俱行起自戌仲至亥帝王世紀曰氣形之初謂之太始楚辭天問曰䆳古之初誰傳道之王逸注曰初始也太始之元虛廓無形神物未生誰傳此道上下未形何由考之言天地未分混沌無根誰考述而知也張衡𤣥圖曰𤣥者無形之類自然之根作於太始莫之與先阮籍大人先生傳曰登乎太始之前覽乎沕漠之初慮周流於無外志浩蕩而遂舒太素易乾鑿度曰太素者質之始也又雄含物魂號曰太素雌雄行故能含物魂而生物也獨言雄雄主於陽故也帝王世紀曰形變有質謂之太素太素之前幽清寂寞不可為象惟虛惟無蓋道之根道根既建由無生有太素始萌萌而未兆謂之龎洪蓋道之幹道幹既育萬物成體於是剛柔始分清濁異位天成於外而體陽故圓以動蓋道之實禮斗威儀曰二十九萬一千八百四十嵗而反太素㝠莖蓋乃道之根也禮含文嘉曰推之以上元為始起十一月甲子朔旦夜半冬至日月五星俱起牽牛之初鄭𤣥注上元太素已來至所永年廣雅曰太素質之始也已有素朴而未散也樂動聲儀曰作樂制禮時五音始於上元戊辰夜半冬至北方子鄭𤣥注曰戊辰土位土為宫宫為君故作樂尚之以為始也夜半子為天時之始禮稽命徴起於太素十一月閼逢之月嵗在攝提格之紀是云作樂制禮蓋作樂則有禮通其反耳張衡靈憲注曰太素之前幽清𤣥靜寂寞冥黙不可為象厥中惟靈如是者永久焉斯謂冥莖蓋乃道根道根既建由旡生有太素始萌萌而未兆并體同色坤屯不分坤屯音渾沌陳思王髑髏說曰昔太素氏不仁勞我以體苦我以生今也幸變而之死是反吾真也又魏徳論曰不能貫道義之精英窮混元于太素亦以明矣又魏文帝誄曰皓皓太素兩儀始分冲和産物肇有人倫又大暑賦曰壯皇居之瑰瑋兮步八紘而為宇節四運之常氣兮踰太素之儀矩阮籍通老論曰聖人眀於天人之理達於自然之分通於治化之體審於大慎之訓故君臣垂拱完太素之樸百姓熈怡保性命之和又詩曰焉得松喬熙神太素逍遥區外登我年祚又老子讃曰隂陽不測變化無倫飄颻太素歸虛反真陸機孫權誄曰皇聖應期有命太素承亂下萌清難天步又浮雲賦曰集輕浮之衆采厠五色之藻氣貫元虛於太素薄紫㣲而竦戾又詩曰太素卜令宅希㣲啓奥基𤣥冲纂懿文虛無承先師又詩曰澄神𤣥漠流棲心太素域弭節欣髙視俟我大夢覺顧公直答陸機曰恢恢太素萬物初裁在昔哲父觀衆濟時太極易繫辭曰易有太極是生兩儀兩儀生四象四象生八卦}
