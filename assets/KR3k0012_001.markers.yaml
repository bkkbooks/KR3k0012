  - {type: variant, offset: 1393, length: 0, content: '', SBCK: 曰天之爲言顛也居髙理下爲人經也白虎通亦云羣陽精也合爲太一分爲殊名故立字一大爲天禮統曰天地者元氣之所生萬物之祖也天之爲言鎭也神也珎也施生爲夲運轉精神功効列陳其道可珎重也尚書考靈耀曰中央鈞天其星角亢東方臯天吕氏}
  - {type: variant, offset: 1393, length: 0, content: '', krp: 曰天之爲言顛也居髙理下爲人經也白虎通亦云羣陽精也合爲太一分爲殊名故立字一大爲天禮統曰天地者元氣之所生萬物之祖也天之爲言鎭也神也珎也施生爲夲運轉精神功効列陳其道可珎重也尚書考靈耀曰中央鈞天其星角亢東方臯天吕氏}
  - {type: variant, offset: 1395, length: 3, content: 考異郵, SBCK: 日蒼天廣雅曰上天其星房心東北變天其星斗箕北方􅀇天其星須女西北幽天其星奎婁西方成天吕氏}
  - {type: variant, offset: 1395, length: 3, content: 考異郵, krp: 日蒼天廣雅曰上天其星房心東北變天其星斗箕北方玄天其星須女西北幽天其星奎婁西方成天吕氏}
