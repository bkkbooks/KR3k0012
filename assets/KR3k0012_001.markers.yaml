  - {type: variant, offset: 15, length: 2, content: 平御, SBCK: 初者氣之始也帝王世紀曰元氣始萌謂之太初詩推度灾曰陽夲爲雄隂夲爲雌物夲爲魂宋均注曰本即原也變隂陽爲雄雌䰟也亦言未有形也皆無兆朕故謂之氣雄生八月仲節號曰太初行三節節猶氣也太初者氣之始也必知生八月仲者據此時薺夌生以爲驗也陽生物行三節者湏雌俱行物乃著也廣雅曰太初氣之始也清濁未分莊子曰太初有無言太古之初上下未形所有者無無有無名旣無有形人無有名一之所起有一而未形一謂道也物得以生謂之德淮南子曰稽古太初人生於無當太初天地之始人生於無形無形生有形也成形於有有形而制於物爲物所制楊雄檄靈賦曰太易之始太初之先馮馮沉沉􅁬􅅮無端王阜老子聖母碑曰老子者道也乃生於無形之先起於太初之前行於太素之元浮逰六虚岀入幽􅁳觀混合之未别窺清濁之未分陳思王魏德論曰在昔太初􅀇黃混并渾沌濛鴻兆朕未形阮籍孔子誄曰養徒三千升堂七十潜神演思因史作書考混元於無形夲造化於太初又大人先生傳曰太初眞人惟太之根專氣一志萬物以存又曰馳騖乎太初之中休息乎無爲之宫太初何始無後無先太始易乾鑿度曰太始者形之始也又曰雌生戍仲號曰太始雄雌俱行三節俱行起自戍仲至亥帝王世紀曰氣形之初謂之太始楚辭天問曰遂古之初誰傳道之王逸注曰初始也太始之元虚廓無形神物未生誰傳此道上下未形何由考之言天地未分混沌無根誰考述而知也張衡􅀇圖曰􅀇者無形之􅀋自然之根作於太始莫之與先阮籍大人先生傳曰登乎太始之前}
