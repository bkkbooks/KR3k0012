  - {type: variant, offset: 1407, length: 0, content: '', SBCK: 曰人主與日月同明四時合信故父天母地兄日姊月父天於圓丘之禮也母地於方澤之􅀕也兄日於東郊姊月於西郊也春秋繁露曰天有十端天爲一端地爲一端陽爲一端隂爲一端水爲一端土爲一端人爲一端金爲一端木爲一端火爲一端凡十端天亦有喜怒之氣哀樂之心與人相副以􅀋合之天人一也春喜氣故生秋怒氣故殺夏樂氣故養冬哀氣故藏四者天人同有之春秋内事曰天有十二分次日月之所􅄤也}
  - {type: variant, offset: 1407, length: 0, content: '', krp: 曰人主與日月同明四時合信故父天母地兄日姊月父天於圓丘之禮也母地於方澤之祭也兄日於東郊姊月於西郊也春秋繁露曰天有十端天爲一端地爲一端陽爲一端隂爲一端水爲一端土爲一端人爲一端金爲一端木爲一端火爲一端凡十端天亦有喜怒之氣哀樂之心與人相副以類合之天人一也春喜氣故生秋怒氣故殺夏樂氣故養冬哀氣故藏四者天人同有之春秋内事曰天有十二分次日月之所躔也}
  - {type: variant, offset: 1411, length: 84, content: 苞春秋演孔圖春秋合誠圖春秋保乾圖春秋握成圖春秋命曆序春秋潛潭巴春秋漢含孳春秋佐助期春秋文耀鉤春秋運斗樞國語立後土國語諷諫木國語論語論語隱義注論語撰考讖逸論語論語摘輔象孟, SBCK: 包曰天不足西北陽極於九故周天九九八十學者温問曰天有頭乎宻曰有詩曰乃眷西頋天􅀂無頭何以頋之又曰有耳乎曰有詩云鶴鳴于九臯聲聞于天無耳何以聞之天有足乎曰有詩云天歩艱難􅀂無足何以歩天有姓乎曰有曰何姓曰姓劉何以知之曰其}
