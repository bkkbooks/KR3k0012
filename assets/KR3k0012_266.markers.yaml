  - {type: variant, offset: 4036, length: 210, content: 公亦其任也郭子曰孫子荊應上品拔王武子時為大中正謂訪聞此人非卿能拔自為之目曰天才英雄亮拔不群傅子曰魏司空陳群始立九品之制郡置中正平次人才之高下各為輩目州置都而揔其議晉宣帝除九品州置大中正議曰案九品之狀諸中正既未能料究人才以為可除九制州置大中正曹羲集九品議曰伏見明論欲除九品而置州中正欲檢虛實一州闊遠略不相識訪不得知會復轉訪本郡先達者耳此為問州中正而實決於郡人孫楚集奏曰九品漢氏本無班固著漢書序先往代賢智以為九條此蓋記鬼錄次, SBCK: 御覽卷}
  - {type: variant, offset: 4036, length: 300, content: 公亦其任也郭子曰孫子荊應上品拔王武子時為大中正謂訪聞此人非卿能拔自為之目曰天才英雄亮拔不群傅子曰魏司空陳群始立九品之制郡置中正平次人才之高下各為輩目州置都而揔其議晉宣帝除九品州置大中正議曰案九品之狀諸中正既未能料究人才以為可除九制州置大中正曹羲集九品議曰伏見明論欲除九品而置州中正欲檢虛實一州闊遠略不相識訪不得知會復轉訪本郡先達者耳此為問州中正而實決於郡人孫楚集奏曰九品漢氏本無班固著漢書序先往代賢智以為九條此蓋記鬼錄次第耳而陳群依之以品生人又魏武拔奇決於胸臆收才不問階次豈賴九品而後得人今可令長守為小大中正各自品其編戶也劉毅集論九品曰臣聞用治理者以官才為本官才有三難而治亂之所由人物難知一也愛憎難防, WYG: 御覽卷}
