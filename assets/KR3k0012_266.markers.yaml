  body:
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 四令長禮記檀弓下曰季子皐葬其妻犯人之禾申詳以告曰請庚之申詳子張子也庚償也子臯曰孟氏不以是罪予朋友不以是弃予言非故也以吾爲邑長於斯也買道而葬後難繼也恃寵虐民非也左傳曰子皮欲使尹何爲邑子産曰少未知可否子皮曰使夫往而學焉夫亦愈知矣子産曰不可人之愛人求利之也今吾子愛人則以政猶未能操刀而使割也其傷實多子之愛人求傷之巳論語曰子之武城聞􅃶歌之聲子游爲武城宰夫子莞爾而􅀏曰割鷄焉用牛刀言治小何湏用大道子游對曰昔者偃也聞諸夫子曰君子學道則愛人小人學道則易使也道禮樂也樂以和人人和則易使子曰二}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_266-1b}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 四令長令長禮記檀弓下曰季子臯葬其妻犯人之禾申詳以告曰請庚之申詳子張子也庚償也子臯曰孟氏不以是罪予朋友不以是棄予言非大故也以吾為邑長於斯也買道而𦵏後難繼也左𫝊曰子皮欲使尹何為邑子産曰少未知可否子皮曰使夫往而學焉夫亦愈知治矣子産曰不可人之愛人求利之也今吾子愛人則以政猶未能操刀而使割也論語曰子之武城聞弦歌之聲子㳺為武城宰夫子莞爾而笑曰割雞焉用牛刀言治小何須用大道子游對曰昔者偃也聞諸夫子曰君子學道則愛人小人學道則易使也道禮樂也所以和人人和則易使子曰二}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_266-1b, image: WYG0895/WYG0895-0381b.png}
  - {type: variant, offset: 5, length: 0, content: '', krp: 四令長禮記檀弓下曰季子皐葬其妻犯人之禾申詳以告曰請庚之申詳子張子也庚償也子臯曰孟氏不以是罪予朋友不以是弃予言非故也以吾爲邑長於斯也買道而葬後難繼也恃寵虐民非也左傳曰子皮欲使尹何爲邑子産曰少未知可否子皮曰使夫往而學焉夫亦愈知矣子産曰不可人之愛人求利之也今吾子愛人則以政猶未能操刀而使割也其傷實多子之愛人求傷之巳論語曰子之武城聞絃歌之聲子游爲武城宰夫子莞爾而笑曰割鷄焉用牛刀言治小何湏用大道子游對曰昔者偃也聞諸夫子曰君子學道則愛人小人學道則易使也道禮樂也樂以和人人和則易使子曰二}
