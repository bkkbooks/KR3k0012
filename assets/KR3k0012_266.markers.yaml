  - {type: variant, offset: 1355, length: 295, content: 官性剛直有吏幹開元中為魏州錄事參軍振舉綱目政稱第一又曰杜暹補婺州參軍秩滿將歸州吏以紙萬餘張以贈之暹唯受一百番餘悉還之時州寮別者見而歎曰昔清吏受一大錢復何異也三輔決錄曰韋元將年十五身長八尺五寸為郡主簿楊彪稱曰韋主簿年雖少有老成之風昂昂千里之駒陳留耆舊傳曰戴斌為郡主簿送故將喪歸鄉里蠡吾里人距之孝子臣吏脫絰叩頭求哀終不見聽斌乃投絰放縗操手劍瞋目厲聲距踊而前曰哭不哀者郎君也喪車不前者戴斌也里人服其義乃內之廣陵列士傳曰劉儁為郡主簿郡將為賊所得儁知言辭不能動賊因叩頭流血乞得代之賊不聽前斫府君儁因投身投之正與刃會斫儁左肩瘡尺餘賊又欲更下刃儁號呼抱持不置賊因相謂曰此義士殺之不祥遂俱縱遣黃義仲交廣二州, WYG: 史}
