  - {type: variant, offset: 3159, length: 556, content: 故一無所問桓公奇其意而不責王丞相集教曰丹陽從事陳耽器局弘正可轉主簿吳興從事謝鸞才幹正直可轉西曹中正魏略曰時苗字德冑鉅鹿人也為太官令領其郡中正定九品至於敘人才不能寬大然紀人之短雖在久遠銜之不置吳志曰習溫為荊州太平公太平公即州都也後潘秘為尚書僕射代溫為太平公甚得其譽晉書曰楊晫陶侃共載詣顧榮州大中正溫雅責晫與小人共載晫曰江州名少風俗卿已不能養進塞儁且可不毀之楊晫代雅為大中正舉侃為鄱陽小中正又曰諸葛瞻領丹陽宣城新安三郡大中正時中州人士多寓焉又曰劉毅字仲雄年七十已告老後舉為青州大中正尚書以毅懸車致仕不宜勞以碎務孫尹曰司徒魏舒司隸嚴詢與毅年齒相近管四十萬戶州兼董司百寮揔攝機要舒所統殷廣兼執九品銓十六州議者不以為劇昔鄭武公年過八十入為司徒毅志氣聰明一州品第不足勞其思慮毅遂為州都銓正人流清濁區別其所彈貶自親貴始又曰解結問別駕治中河北白壤高良何故少人士每以三品為中正皆云不審陳頵對曰詩稱惟岳降神生甫及申英偉大賢多出山澤河北地平氣均蓬蒿裁六尺不足成林故也又曰干寶稱晉宣帝除九品置大中正晉令云大小中正為內官者聽月三會議上東門外設幔陳席又曰劉毅上表刺史初臨州大中正史若吏部選內猶下中正問人事所在父祖位狀晉起居注曰僕射諸葛恢各稱州都大中正為吏部尚書及郎司徒左長史屬掾皆為中正臣今領吏部請解大中正以為都中正職局同理不宜兼者也蕭子顯, SBCK: 哉}
