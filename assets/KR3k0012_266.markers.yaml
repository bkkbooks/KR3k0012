  - {type: variant, offset: 15, length: 3, content: 主簿主, SBCK: 子夏爲莒父宰問政子曰無欲速無見小利欲速則不達見小利則大事不成又曰子游爲武城宰子曰女得人焉耳乎曰有澹臺滅明者行不由徑非公事未甞至於偃之室也言澹臺㓕明公且方也家語曰子路治蒲請見於孔子曰由願受教於夫子子曰蒲其何如對曰邑多壯士又難治也子曰然吾語汝恭與敬可以攝勇寛而正可以懷強愛而恕可以容困言愛而恕者容困窮温而斷可以抑姦如此而加之以忠潔則政不難矣又曰子路爲蒲宰爲水備與其民修溝瀆以民之煩勞也人與一單食簞同一壷漿孔子聞之使子貢止之子路不恱曰夫子以仁教而禁行仁由不受也孔子曰尓以爲人誠何不白於君發倉廪以給之而私以汝食遺之是尓明君之無惠而見巳之德美也汝速巳則可不巳則汝之見罪必矣晏子春秋曰晏子爲阿宰三年而毀聞於國景公不恱召而免之晏子謝曰嬰知過矣請復治阿三年而譽聞於國公將賞之辭而不受公問其故對曰昔者嬰之所以當誅者當賞而今所以當賞者當誅是故不敢受史記曰齊威王即位召即墨大夫語之曰子居即墨毀日至然吾使人視即墨田野闢民人給官無留事東方以寧是子不事吾左右以求譽也封之萬家召阿大夫語曰自子之守阿譽日聞然吾使人視阿田野不闢民人貧苦是子以幣厚吾左右以求譽也乃烹阿大夫左右甞譽者皆併烹之遂起兵擊}
  - {type: page-break, offset: 15, content: '', id: KR3k0012_SBCK_266-2a}
  - {type: variant, offset: 15, length: 8, content: 主簿主諸簿書簿普, WYG: 子夏為莒父宰問政子曰無欲速無見小利欲速則不逹見小利則大事不成又曰子游為武城宰子曰汝得人焉爾乎曰有澹臺滅明者行不由徑非公事未嘗至於偃之室}
  - {type: variant, offset: 15, length: 3, content: 主簿主, krp: 子夏爲莒父宰問政子曰無欲速無見小利欲速則不達見小利則大事不成又曰子游爲武城宰子曰女得人焉耳乎曰有澹臺滅明者行不由徑非公事未甞至於偃之室也言澹臺㓕明公且方也家語曰子路治蒲請見於孔子曰由願受教於夫子子曰蒲其何如對曰邑多壯士又難治也子曰然吾語汝恭與敬可以攝勇寛而正可以懷強愛而恕可以容困言愛而恕者容困窮温而斷可以抑姦如此而加之以忠潔則政不難矣又曰子路爲蒲宰爲水備與其民修溝瀆以民之煩勞也人與一單食簞同一壷漿孔子聞之使子貢止之子路不恱曰夫子以仁教而禁行仁由不受也孔子曰尓以爲人誠何不白於君發倉廪以給之而私以汝食遺之是尓明君之無惠而見巳之德美也汝速巳則可不巳則汝之見罪必矣晏子春秋曰晏子爲阿宰三年而毀聞於國景公不恱召而免之晏子謝曰嬰知過矣請復治阿三年而譽聞於國公將賞之辭而不受公問其故對曰昔者嬰之所以當誅者當賞而今所以當賞者當誅是故不敢受史記曰齊威王即位召即墨大夫語之曰子居即墨毀日至然吾使人視即墨田野闢民人給官無留事東方以寧是子不事吾左右以求譽也封之萬家召阿大夫語曰自子之守阿譽日聞然吾使人視阿田野不闢民人貧苦是子以幣厚吾左右以求譽也乃烹阿大夫左右甞譽者皆併烹之遂起兵擊}
