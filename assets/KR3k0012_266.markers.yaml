  - {type: variant, offset: 31, length: 2, content: 王尊, SBCK: 諸令長皆秦官掌治其縣萬户巳上爲令秩一千石至六百石萬户以下爲長秩五百石至三百石皆有丞尉秩四百石至二百石又曰蕭育字次君爲茂陵令㑹課育第六召詣後曹當以職事對育徑出曹書佐隨牽育拔佩刀曰蕭育杜陵男子何詣曹也又曰薛宣子惠始爲彭城令宣從臨淮}
