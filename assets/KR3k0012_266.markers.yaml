  - {type: variant, offset: 3972, length: 0, content: '', SBCK: 平公問趙武曰中牟吾國之股肱邯鄲之肩髀也寡人欲其良令也令其空誰使而可趙武曰刑伯子可公曰伯子非子之讎對曰私讎不入公門又問中府之令空誰使而可趙武曰臣子可故曰外舉不避仇讎内舉不避子弟又曰宓子賤爲單父令見有􅀂有􅀂曰子何痩焉宓子曰憂官政也又曰晉文公出亡趙衰挈壺飱而從與文公相失飢而道寢餓而不敢食及文公反國舉兵攻原克而拔之文公曰夫輕忍餓餧之患而必全壷飡者是且不以原叛乃舉爲原令愼子曰立國君以爲國非立國以爲君也夫以立官長以爲官也非立官以爲長也風俗通曰俗􅀃孝明帝時尚書郎河東王喬遷爲葉令喬有神每月朔常詣臺}
