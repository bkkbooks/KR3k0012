  - {type: variant, offset: 1092, length: 1296, content: 不如一詣習主簿也宋書曰王思遠宋建平王景素辟南徐州主簿深見禮遇景素被誅左右離散思遠親視殯葬手種松柏與廬江何昌寓上表理之事感朝廷景素女廢為庶人思遠分衣食以相資贍年長為備笄總訪求偶對傾家送遣三國典略曰梁李膺字公胤廣漢人也西昌侯藻為益州以為主簿使至建康梁武悅之謂曰卿何如昔日李膺對曰勝問其故對曰昔事桓靈之主今逢堯舜之君梁武嘉其對以如意擊席者久之後魏書曰裴安祖弱冠州辟主簿民有兄弟爭財詣州相訟安祖召其弟兄以禮義責讓之此人兄弟明日相率謝罪郡內欽服之又曰韋朏字尊顯少有志業年十八辟州主簿時屬歲儉朏以家粟造粥以餌飢人所活甚眾唐書曰顏杲卿以蔭受官性剛直有吏幹開元中為魏州錄事參軍振舉綱目政稱第一又曰杜暹補婺州參軍秩滿將歸州吏以紙萬餘張以贈之暹唯受一百番餘悉還之時州寮別者見而歎曰昔清吏受一大錢復何異也三輔決錄曰韋元將年十五身長八尺五寸為郡主簿楊彪稱曰韋主簿年雖少有老成之風昂昂千里之駒陳留耆舊傳曰戴斌為郡主簿送故將喪歸鄉里蠡吾里人距之孝子臣吏脫絰叩頭求哀終不見聽斌乃投絰放縗操手劍瞋目厲聲距踊而前曰哭不哀者郎君也喪車不前者戴斌也里人服其義乃內之廣陵列士傳曰劉儁為郡主簿郡將為賊所得儁知言辭不能動賊因叩頭流血乞得代之賊不聽前斫府君儁因投身投之正與刃會斫儁左肩瘡尺餘賊又欲更下刃儁號呼抱持不置賊因相謂曰此義士殺之不祥遂俱縱遣黃義仲交廣二州記曰合浦之士有尹牙為郡主簿太守荅云重仇未執牙即變姓易名為執之天子奇其義因赦不問俗說曰謝景仁為豫州主簿在玄閤下桓聞其善彈箏便呼之既至取箏令彈謝即理弦撫箏因歌秋風意氣殊邁桓大以此奇之從事漢書曰邴吉字少卿為廷尉右監坐法失官歸為州從事又曰趙廣漢涿郡人為州從事以嚴絜通敏下士為名又曰揚雄數為朝廷在位賢者稱嚴君平德杜陵李強為益州牧喜謂雄曰吾真得嚴君平矣雄曰備禮以待之彼人可見而不得詘也強心以為不然及至蜀致禮與相見卒不敢言以為從事乃歎曰楊子雲誠知人也東觀漢記曰鮑永為司隸校尉矜嚴公正平陵鮑恢為從事恢亦抗直詔曰貴戚且歛手以避二鮑又曰樊準字幼陵為州從事臨職介正不發私書又曰班彪避地河南大將軍竇融以為從事深敬待後接以師友之道後漢書曰朱震字伯厚為州從事奏濟陰太守贓罪之數諺曰車如雞栖馬如狗疾惡如風朱伯厚續漢書曰楊球為幽州從事部分邊塞職事脩理謝承後漢書曰陳眾辟州從事有劇賊淳于臨等數千人攻縣殺吏光武遣司空李通率師擊之州牧惶怖恐獲罪戾眾於是自請以恩信曉喻降之乘單車駕白馬往到賊所以義告諭臨素服名德即降服民生立祠曰白馬從事華嶠後漢書曰衛羽為州從事時中常侍單超兄子匡為濟陰太守負其勢大為貪放刺史第五種欲取之聞羽素抗厲乃召羽謂曰聞公不畏強禦今欲相委以重事若何對曰願庶幾於一割羽出遂馳至定陶閉城門收匡賓客親吏四十餘人七日中起發其贓五六千萬種即舉奏一州震慄魏志曰賈洪字叔業家貧好學應州辟其時州中自參事以下百餘人唯洪與嚴苞字文通才學最高故眾為之語曰州中曅曅賈叔業辯論胸胸嚴文通又曰袁紹領冀州從事沮綬喜曰吾心也又曰張遼字文遠鴈門馬邑人本聶壹之後以辟怨變姓漢并州刺史丁原以遼武力過人召為從事又曰邢顒太祖辟為冀州從事時人稱之德行堂堂邢子昂蜀志曰張松說劉璋交通先主從事廣漢王累自倒懸於門以諫璋無所納又曰馬謖字幼常以荊州從事, SBCK: 佐}
