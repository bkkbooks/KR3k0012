  - {type: variant, offset: 488, length: 705, content: 禮聘已入門庭刑之為可殺之為重太祖曰毓之所執是也又引經典有意使孤歎息又曰龐涓字子異太守徐揖請為主簿後郡人黃昂反圍城涓棄妻子夜踰城圍告急於張掖燉煌二郡初疑未發兵涓欲伏劍二郡感其義遂興兵軍未至而郡邑以陷陣死涓乃收歛揖喪送還本郡行服三年乃還又曰崔林字德孺清河人少時晚成宗族莫知唯從兄琰異之太祖定冀州擢為州主簿蜀志曰杜微字國輔梓潼涪人丞相領益州牧以微為主簿微固辭輿而致之既至亮引而微自陳謝亮以微不聞人言於座上作書與之吳錄曰苞咸字子良為郡主簿太守黃君行春留咸守郡君緣棲採雀卵咸責數以春月不宜破卵杖之三十王隱晉書曰陶侃字士衡鄱陽人為郡主簿夫人病欲使主簿迎醫於數百里天大寒雪各辭疾召侃使行侃曰資於事父以事君夫人亦當次母安有父母之病而聞迎醫不便行也晉書曰潘京字世長武陵漢壽人也弱冠郡辟主簿太守趙廞甚器之嘗問曰貴郡何以名武陵京曰鄙郡本名義陵在辰陽縣界與夷相接數為所攻光武時移東出遂得全完共議易號傳曰止戈為武詩稱高平曰陵於是名焉州所辟因謁見問策探得不孝字刺史戲京曰辟士為不孝耶京舉板答曰今為忠臣不得復為孝子其機辯皆此類又曰易雄長沙劉陽人也仕郡為主簿張昌之亂也執太守萬嗣將斬之雄與賊爭論曲直賊怒叱使牽雄斬之雄趍出自若賊人又呼問之雄如初如此者三賊乃捨之嗣由是獲免雄遂知名又曰潘京武陵人也郡辟主簿後太廟立州郡皆遣使賀京白太守曰夫太廟立移神主應問訊不應賀遂遣京作文使詣京師以為永式又曰習鑿齒字彥威為桓溫荊州主簿親遇隆密時語曰徒三十年看儒書不如一詣習主簿也宋書曰王思遠宋建平王景素辟南徐州主簿深見禮遇景素被誅左右離散思遠親視殯葬手種松柏與廬江何昌寓上表理之事感朝廷景素女廢為庶人思遠分衣食以相資贍年長為備笄總訪求偶對傾家送遣三國典略曰梁李膺字, WYG: ''}
