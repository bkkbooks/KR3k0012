  - {type: variant, offset: 3514, length: 201, content: 結問別駕治中河北白壤高良何故少人士每以三品為中正皆云不審陳頵對曰詩稱惟岳降神生甫及申英偉大賢多出山澤河北地平氣均蓬蒿裁六尺不足成林故也又曰干寶稱晉宣帝除九品置大中正晉令云大小中正為內官者聽月三會議上東門外設幔陳席又曰劉毅上表刺史初臨州大中正史若吏部選內猶下中正問人事所在父祖位狀晉起居注曰僕射諸葛恢各稱州都大中正為吏部尚書及郎司徒左長史屬掾皆為中正臣今領吏部請解大中正以為都中正職局同理不宜兼者也蕭子顯, WYG: 印綬去賦歸去來}
