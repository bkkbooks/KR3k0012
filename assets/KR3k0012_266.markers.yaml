  - {type: variant, offset: 2599, length: 379, content: 沉深之謀為從事號曰臥虎故人謂之嶷然不語名高孝甫益部耆舊傳曰李弘字仲元為州從事揚雄稱之曰不屈其志不累其身不夷不惠可否之間見其貌肅如也觀其行穆如也聞其言戚如也又曰巴郡任文公有道術為州從事時越嶲欲反州遣五從事案虛實止傳舍食未半有風發案文公起曰當有逆變因促駕去諸從事未能發為郡兵所殺鍾離意別傳曰楊州刺史夏君三辟意九江從事三府側席夏君見意曰刺史得京師書聞從事有令問刺史何惜王家之爵不貢賢者乃表上尚書李固別傳曰益州及司隸辟皆不就門徒或稱從事掾固曰未曾受其位不宜獲其號孟嘉別傳曰庾亮辟嘉為勸學從事亮盛脩斅高選儒官正旦大會褚襃問亮嘉何在亮曰但自覓之褒歷觀之指嘉曰將無是乎亮欣然羅含別傳曰含字君章刺史庾廙以親賢之重作鎮方岳搜楊楚楚匪蘭弗刈仍辟含荊州部從事潛夫論曰孝明帝時荊州舉茂才過闕謝恩賜食既訖問何異聞對曰巫地有劇賊九人刺史不能得帝曰汝非部郡從事耶對曰是也帝乃振怒曰賊發部中, WYG: ''}
