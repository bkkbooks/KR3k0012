  - {type: variant, offset: 218, length: 0, content: '', SBCK: 爲河隂令順陽公主家奴爲刼攝而不送飜將兵圍主宅執主婿馮穆歩驅向縣時正炎暑立之日中流汙霑地於是威振京師又曰董宣字少平徴爲洛陽令擊搏豪強莫不震慄京師號爲卧虎又曰公孫述爲清水長父仁以述年少遣門下􅁺隨之官月餘􅁺辝歸白仁曰述非待教者也續漢書曰董宣爲雒陽令寜平公主乳母子白日殺人因匿主家吏不能得及主出行以奴􅆖乗宣於大夏門亭候之乃駐車叩馬以刀畫地數主之失者三叱奴下車格殺之主即馳車入宫上大怒召宣令欲死乎宣叩頭曰臣奉法之吏不敢縱法不欲死也上曰捶之宣曰願一言死無恨上曰何言宣曰陛下聖德中興而縱奴殺良民以奴殺臣臣死之後陛下何以治天下捶殺臣不如臣自殺即以頭橕楹流血􅀍面上令小黄門持之曰癡令令叩頭謝主宣不從上曰頓癡令頭兩手據地不肯低頭上勑強項令出太官賜食又曰虞詡爲朝歌長故舊皆弔曰得此何衰詡曰難者不避易者不從不遇盤根錯節何以別其利器乎華嶠後漢書曰周規除臨湘令長沙}
