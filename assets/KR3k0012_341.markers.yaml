  - {type: variant, offset: 2893, length: 1, content: 鄢, SBCK: 晉人假羽旄于齊而不歸齊人始貳漢書武紀曰征和二年更加節黄旄應邵注曰戾太子發節加其上黄以嗣之也晉書曰王珣字元琳弱冠與陳郡謝玄爲桓温􅁺俱爲温所重嘗謂之曰謝掾年四十必擁旄杖節王椽當作黒頭公皆未易才也鬻子曰武王伐紂乃命太公把旄以麾之紂軍反走列仙傳曰􅁗文公時有梓樹化爲牛以􅀐擊之􅀐不勝或墜髻解􅀍髮牛畏之入河故􅁗因致旄頭􅀐使先驅文選曰羽旄掃霓又曰羽旄楊蕤又曰素旄一麾渾一區宇洛神賦曰左􅀝彩旄右䕃桂旌楚詞曰建脩虹之采旄甘泉賦曰流星旄以電燭又曰建雄虹之采旄係綴螮蝀文紛錯也五色雜而􅋑耀衆采雜厠而明朗眊服䖍通俗文曰毛飾曰眊音餌漢魏故事曰與外國節皆二赤眊一黒眊十異於常節魏略曰諸􅁑亮見劉備備性好眊時適以旄牛尾與備者備手自結之亮曰將軍當復有逺志耶止結眊而巳備知亮非常人乃投眊而謂曰以忘憂耳吴時外國傳曰黒白眊出天笁國陶公故事曰臣􅋲奉獻金鐥白毦四枚續異記曰竟}
  - {type: page-break, offset: 2893, content: '', id: KR3k0012_SBCK_341-6a}
  - {type: variant, offset: 2893, length: 1, content: 鄢, WYG: 晉人假羽旄于齊而不歸齊人始貳漢書武紀曰征和二年更節加黄旄應劭曰時太子亦發莭以戰故加黄其上以别之晉書曰王珣字元林弱冠與陳郡謝𤣥為桓温掾俱為温所重嘗謂之曰謝掾年四十必擁旄杖節王掾當作黑頭公皆未易才也鬻子曰武王伐紂乃命太公把旄以麾之紂軍反走列仙傳曰秦文公時有梓樹化為牛以騎擊之騎不勝或墜䯻解被髮牛畏之入河故秦因置旄頭騎使先驅文選曰羽旄掃電又曰素旄一麾渾一區宇洛神賦曰左倚采旄右䕃桂旗楚詞曰建修虹之采旄甘泉賦曰流星旄以電燭又曰建雄虹之采旄綴繫之文相紛錯也五色雜而炫耀衆采雜厠而明朗毦服䖍通俗文曰毛飾曰毦漢魏故事曰與外國節皆二赤毦一黑毦十異扵常節魏畧曰孔明見𤣥德𤣥德性好毦時有以旄牛尾見與者因手自結之亮曰將軍當復有逺志耶止結毦而已𤣥德知非常人乃投毦而謂曰以忘憂耳吳時外國傳曰黑白毦出天竺國陶公故事曰臣侃奏獻金繕白毦四枚續異記曰竟}
