  - {type: variant, offset: 2896, length: 3, content: 役欒鍼, SBCK: 曰官湏髮爲矟眊覺則巳失髮矣如此者數十人俗􅀃曰謝安小兒時使有名譽流聞逺國慕容廆餉謝白狼眊一􅀟謝時年十三一作慕容垂也魏武與楊彪書曰今贈足下十鈴眊一具諸􅁑亮與瑾書曰兄嫌白帝兵非精練到所督則先主帳下白眊西方上兵也嫌其少者當復部分江州兵以廣益之􅁃翼與燕王書曰今致孔雀眊二枚諸􅁑亮與吴王書曰所送白毦薄少重}
