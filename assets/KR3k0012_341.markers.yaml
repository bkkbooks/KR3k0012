  - {type: variant, offset: 2778, length: 112, content: 城又曰悠悠斾旌禮記曰前有水則載青旌鄭玄注曰載所謂舉於旌首所以警眾者也鄭記王贊問曰舉旌於首當皆以皮邪畫之也鄭荅曰皆俱舉皮置於首不畫羽為旌也周禮曰折羽為旌游車所建游車木路也王以田也全羽折羽皆五色文也又曰掌舍為帷宮設旌門樹旌以表門, SBCK: 郊}
