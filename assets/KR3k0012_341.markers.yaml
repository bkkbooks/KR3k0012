  - {type: variant, offset: 964, length: 1645, content: 為設矢象弧星有矢象妖星有枉矢枉矢者虵行有尾田此云枉矢盖盡之也韣音獨左傳曰袀服振振取虢之旗袀音均又曰三辰旂旗昭其明也注日月星也又曰狄人伐衛衛懿于戰于滎澤衛師敗績滅衛衛侯不去旗是以甚敗又曰越伐吳王孫彌庸見姑篾之旗曰吾父之旗也不可以見讎而勿殺又曰鄭人擊簡子中肩斃于車中獲其蜂旗蜂旗旗名又曰公孫庬以徒五百人宵攻鄭師取蜂旗於子姚之幕下又曰鄭伐許頴考叔取鄭伯之旗蝥狐以先登子都自下射之顛史記曰李斯上書云今陛下建翠鳳之旗樹靈鼉之鼓漢書郊祀志曰武帝將伐南越以班荊畫幡日月北斗登龍以象太一東觀漢記曰耿弇追張步步奔平壽乃肉袒負斧鑕於軍門而弇勒兵入據其城樹下二郡旗鼓令步兵各以部人詣旗下眾向十餘萬輜重七千餘而皆罷歸鄉里沈約宋書輿服志曰五旗者五色各一旗以木牛承其下盖取負重而安隱也五旗纏竿即禮記德車結旌不畫飾也戎事乃散之又武車綏旌垂舒之也北史曰廬賁嘗事隋文乃受禪命賁清宮因典宿衛賁乃奏改周伐旗幟更為嘉名其青龍騶虞朱雀玄武千秋萬歲之旗皆賁所創也隋書曰凡旗太常畫三辰日月五星旂畫青龍皇帝外龍諸侯交龍旟畫朱鳥旌畫黃麟旗畫白獸旐畫玄武皆加雲氣其旜物在軍亦畫其事號加之以雲氣徽幟亦如通帛為旜雜帛為物在軍亦畫其人官與姓名之事號徽幟亦書之畫其所書之例旌節又畫白獸而折羽於其上又曰司常掌旗物之藏通帛之旗六以供郊丘之祀一曰蒼旗二曰青旗三曰朱旗四曰黃旗五曰白旗六曰玄旗畫繢之旗六以充王路之等一曰三辰之常二曰青龍之旗三曰朱鳥之旟四曰黃麟之旌五曰白獸之旗六曰玄武之旐皆左建旗而右建榻戟榻它臘切又曰有繼旗四以施軍旅一曰麾以供軍將二曰旞以供師帥三曰旐以供旅師四曰斾以供倅長唐書曰元和中淮南節度使馬揔進吳元濟旌旗七百三十九事家語曰子路言志云願得旌旗繽紛下蟠于地詩推度災曰上出號令而化天下震雷起而驚蟄睹旗鼓動三軍駭觀其前動化而天情可見矣戰國策曰建七星之旗天子之位也穆天子傳曰日月之旗七星之文今旒上畫日月及北斗星也周遷車服雜記曰晉元皇始制五牛之旗設青在左黃在中六韜曰武王伐紂懸紂之首於白旗古司馬兵法曰夏后氏玄首人之執也殷曰白天之義也周曰黃地之道也旌首有鈴曰旂三王所以立不失天地人之道也章夏以日月上明也殷以虎上威也周以龍上文也章畫飾也三王畫各有所法也郝萌占曰旗上有光人主大喜延年益壽黃石公三略曰欲知敵形色可勝之符先戰以二十八騎角人青衣赤旗東方七人徵人赤衣黃旗南方七人啇人白衣黑旗西方七人羽人黑衣青旗北方七人凡二十八騎象二十八宿軍令曰聞雷鼓音舉白幢綘旗大小船皆進戰不進者斬聞金音舉青旗舡皆止不止者斬王孫子曰桀紂或放南巢或頭懸赤旗斯無它不節財而暴人也孫子曰言不相聞故為鼓鐸視不相見故為旌旗夫金鼓旌旗所以一民之耳目也又曰無要正正之旗無擊堂堂之陣列子曰皇帝與炎帝戰以雕鶡鷹鳶為旗幟隋巢子曰天賜武王黃鳥之旗以代殷淮南子曰凡國有難君自宮召將詔之曰社稷之命在將軍身今國有難願子將而應之將軍受命乃令祝史太卜齋三日之太廟鑽靈龜卜吉日以受鼓旗楚辭曰駕龍輈兮乘雷輈車轅也載雲旗兮逶迤又曰乘廻風兮載雲旗又曰楊彗星以為旗又曰乘赤豹兮狐從文狸新夷車兮結旌桂旗宋玉高唐賦曰眄兮若妖姬楊袂鄣日而望所思忽兮若駕駟馬建羽旗相如上林賦曰靡魚須之撓旃以魚須為旃柄驅馳逐戰也曳明月之珠旗以明珠綴飾旃王沉餞行賦曰曳招搖之脩旗若蜿虹之垂天崔駰東巡頌曰升九龍之華旗文選曰雲旗拂霓又曰牙紛繽又曰旌旗拂天又曰揭竿為旗又曰曳彗星之飛旗又曰朱旗所拂九土破攘又曰朱旗降天又曰建祝姑祝姑旗名又曰青霞雜桂旗旟釋名曰鳥隼為旟旟譽也軍吏所建也急疾趨事則有稱譽也爾雅曰錯革鳥曰旟郭璞注曰此謂全剝鳥皮毛置之竿頭也舊說刻革鳥置竿首也孫叔敖云革急也言畫急疾之鳥於旒也周官鳥隼為旟也按禮記鄭玄云載之以示眾即此類也書云鳥戰目革詩云如載鳴鳶鳥斯革旌首鳥者自是鳥之皮毛明矣詩曰孑孑干旟在浚之都又曰彼旟旐斯胡不斾斾斾旒垂也周禮曰鳥隼為旟州里所建也州長之屬旐釋名曰龜虵為旐兆也龜知氣兆之吉凶建之於後察度事宜之形兆也爾雅曰績廣充幅長尋曰旐郭璞注曰帛全幅長八尺者也詩曰設此旐矣又曰建旐設旄薄獸于敖周宣王也周禮曰龜虵為旐四斿縣鄙之所建也旞釋名, WYG: ''}
