  - {type: page-break, offset: 3443, content: '', id: KR3k0012_SBCK_341-10b}
  - {type: variant, offset: 3443, length: 0, content: '', WYG: 將戮慶封椒舉曰臣聞無瑕者可以戮人慶封唯逆命是以在此其肯從扵戮乎播於諸侯焉用之王弗聼負之斧鉞以狥於諸侯又曰其後襄之二輅鏚鉞秬鬯彤弓虎賁文公受之以有南陽之田晉文公也史記殷本紀曰當是時桀為虐亂婬荒耽􅒬于酒不修厥政天下叛之而諸侯昆吾氏為亂湯乃興師率諸侯伊尹從湯湯自把鉞以伐昆吾遂伐桀又曰紂囚西伯於羑里西伯之臣閎夭之徒求美女竒物善馬以獻紂紂廼赦西伯西伯出而獻洛西地以請除炮烙之刑紂乃許之賜弓矢斧鉞使征伐又周本紀曰紂之嬖妾二女皆經自殺武王又射三發擊以劒斬以𤣥鉞又曰周公旦把大鉞畢公把小鉞以夾武王漢書刑法志曰大刑用甲兵其次用斧鉞中刑用刀鋸其次用鑚鑿薄刑用鞭朴後漢書郭躬傳曰竇固出擊匈奴騎都尉秦彭為副彭在别屯而輙以法斬人固奏彭専擅請誅之顯宗乃引公卿朝臣平其罪科躬以明法律召入議者皆然固奏躬獨曰扵法彭得斬之帝曰畢征校尉一統於督彭既無斧鉞何得専殺人乎躬對曰一統扵督者謂在部曲也今彭専軍别將有異於此兵事呼吸不容先關督帥且漢制棨㦸即為斧鉞於法不合罪帝從躬之議吳志陸遜傳曰遜假節鉞為大督逆曹休斬獲萬餘吳録曰假陸遜黄鉞吳主親執鞭以見之晋書天文志曰天槍三星在北斗杓東一曰天鉞蓋天之武備也又曰參十星一曰參伐一曰大辰一曰天市一曰鈇鉞主斬刈又曰青龍三年六月丁未鎮星犯井鉞占曰為兵氣也又曰甘露元年七月乙卯熒惑犯井鉞占曰並有兵事唐書曰天寳中制黄鉞古來以金為飾金者應五行之數有肅殺之威失金稱黄理或未當其鉞宜改為金鉞副鉞威武之義焉司馬法曰夏執𤣥鉞崔豹古今輿服注曰元鉞諸公主得}
