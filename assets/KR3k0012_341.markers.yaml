  - {type: punctuation, offset: 3443, content: 「, id: KR3k0012_CHANT_341-bkkpn1243}
  - {type: variant, offset: 3443, length: 0, content: '', SBCK: 將戮慶封椒舉曰臣聞無瑕者可以戮人慶封唯逆命是以在此其肯從於戮乎播於諸侯焉用之王弗聽􅀒之斧􅃏以徇於諸侯又曰其後襄之二輅鏚􅃏耟鬯􅊮弓虎賁文公受之以有南陽之田晉文公也史記殷本紀曰當是時桀爲虐亂媱荒酖酗于酒不脩厥政天下叛之而諸侯昆吾氏爲亂湯迺興師率諸侯伊尹從湯湯自把􅃏以伐昆吾遂伐桀又曰紂囚西伯於羑里西伯之臣閎天之徒求美女竒物善馬以獻紂紂廼赦西伯西伯出而獻洛之地以請除炮烙之刑紂乃許之賜弓矢斧􅃏使征伐又曰周本紀曰紂嬖妾二女皆經自殺武王又射三發擊以劒斬以玄􅃏又曰周公旦把大􅃏畢公把小􅃏以夾武王漢書刑法志曰大刑用甲兵其次用斧􅃏中刑用刀鋸其次用鑚鑿薄刑用鞭朴後漢書郭躬傳曰竇固出擊匈奴􅀐都尉􅁗彭爲副彭在別屯而輙以法斬人固奏彭專擅請誅之顯宗乃引公卿朝臣平其罪科躬以明法律召入議者皆然固奏躬獨曰於法彭得斬之帝曰畢征校尉一統於督彭旣無斧􅃏何得專殺人乎躬對曰一統於督者謂在部曲也今彭專軍別將有異於此兵事呼吸不容先關督帥且漢制棨㦸即爲斧􅃏於法不合罪帝從躬之議吴志陸遜傳曰遜假節􅃏爲大督逆曹休斬獲萬餘吴録曰假陸遜黄􅃏吴主親執鞭以見之晉書天文志曰天槍三星在北斗杓東一曰天􅃏天之武備也又曰參十里一曰參伐一曰大辰一曰天市一曰鈇􅃏主斬刈又曰青龍三年六月丁未鎮星犯井􅃏占曰爲兵氣也又曰甘露元年七月乙夘熒惑犯井􅃏占曰竝有兵事唐書曰天寳中制黄􅃏古來以金爲飾金者應五行之數有肅殺之威去金稱黄理或未當其􅃏冝改爲金􅃏副威武之義馬司馬法曰夏執玄􅃏崔豹古今輿服注曰玄􅃏諸公主得}
  - {type: page-break, offset: 3443, content: '', id: KR3k0012_SBCK_341-9b}
