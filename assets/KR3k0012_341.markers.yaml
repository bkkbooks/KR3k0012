  - {type: variant, offset: 277, length: 0, content: '', krp: 抜斾投衡乃出又曰晉楚戰子玉以若敖之六卒將中軍子玉楚令尹也子西將左子上將右子西鬪冝申子上鬪勃也胥臣蒙馬以虎皮先犯陳蔡陳蔡奔楚右師潰陳蔡属楚之右師也狐毛設二斾而退之斾大旗也又建旗而退若大將稍却也東京賦曰通帛蒨斾幟史記曰沛公祠黄帝蚩尤於沛庭旗幟皆尚赤又曰韓信代趙令輕騎二百人人持一赤幟入趙壁拔趙幟立漢幟東觀漢記曰漢兵守成都公孫述謂延岑曰事當奈何岑曰男兒當死中求生可坐窮乎財物易聚耳不冝有愛𫐠乃悉散金帛募敢死士五千餘人以配岑於市橋僞建旗幟鳴鼓挑戰而潜遣竒兵出吴漢軍後襲擊破漢漢墮水縁馬尾得出袁山松後漢書曰赤眉復入長安止桂宫逢安將千餘人攻延岑於杜陽鄧禹以赤眉精兵出在外唯盆子羸弱在長安攻之與謝禄夜戰槀街中鄧禹敗走逢安西與延牙蘇茂李寳戰於杜陽大破之寳茂降牙收散卒還戰寳茂從内抜赤眉旗自立其幟赤眉還驚亂走自投川死者十餘萬人墨子曰凡幟帛長五丈廣半幅太白經曰右一將行得水黒幡旗幟圖熊旗額白脚青右二將行得火赤幡旗幟圖鶚旗額白脚青右}
