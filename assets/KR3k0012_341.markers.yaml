  - {type: variant, offset: 2994, length: 162, content: 齊使盜待諸莘而殺之壽子載其旌旗以先盜殺之急子後往盜又殺焉又曰許伯曰吾聞致師者御靡旌摩壘而還靡旌驅疾也摩近也公羊曰楚莊王伐鄭鄭伯肉袒左執茅旌右執鸞刀以逆何休曰茅旌宋廟所用也為宋廟所用求以宋廟歸首也史記曰秦併天下以水德之始旌旄節皆尚黑漢書文帝詔曰朝有進善之旌應劭注堯設五達之道令人進善也又曰高祖使韓信與楚戰信潛伏人於楚軍之側方戰, SBCK: 侯置三麾陳三}
