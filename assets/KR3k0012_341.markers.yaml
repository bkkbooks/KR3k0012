  - {type: variant, offset: 2896, length: 3, content: 役欒鍼, WYG: 曰官湏髪為矟毦覺則已失髪矣如此者數十人俗説曰謝安小兒時便有名譽流聞逺國慕容廆餉謝白狼毦一雙謝時年十三一作慕容垂也魏武與楊彪書曰今贈足下十鈴毦一具諸葛亮與瑾書曰兄嫌白帝兵非精練到所督則先主帳下白毦西方上兵也嫌其少也當復部分江州兵以廣益之庾翼與燕王書今致孔雀毦二枚諸葛亮與吳王書曰所送白毦薄少重}
