  - {type: variant, offset: 1994, length: 753, content: 懸赤旗斯無它不節財而暴人也孫子曰言不相聞故為鼓鐸視不相見故為旌旗夫金鼓旌旗所以一民之耳目也又曰無要正正之旗無擊堂堂之陣列子曰皇帝與炎帝戰以雕鶡鷹鳶為旗幟隋巢子曰天賜武王黃鳥之旗以代殷淮南子曰凡國有難君自宮召將詔之曰社稷之命在將軍身今國有難願子將而應之將軍受命乃令祝史太卜齋三日之太廟鑽靈龜卜吉日以受鼓旗楚辭曰駕龍輈兮乘雷輈車轅也載雲旗兮逶迤又曰乘廻風兮載雲旗又曰楊彗星以為旗又曰乘赤豹兮狐從文狸新夷車兮結旌桂旗宋玉高唐賦曰眄兮若妖姬楊袂鄣日而望所思忽兮若駕駟馬建羽旗相如上林賦曰靡魚須之撓旃以魚須為旃柄驅馳逐戰也曳明月之珠旗以明珠綴飾旃王沉餞行賦曰曳招搖之脩旗若蜿虹之垂天崔駰東巡頌曰升九龍之華旗文選曰雲旗拂霓又曰牙紛繽又曰旌旗拂天又曰揭竿為旗又曰曳彗星之飛旗又曰朱旗所拂九土破攘又曰朱旗降天又曰建祝姑祝姑旗名又曰青霞雜桂旗旟釋名曰鳥隼為旟旟譽也軍吏所建也急疾趨事則有稱譽也爾雅曰錯革鳥曰旟郭璞注曰此謂全剝鳥皮毛置之竿頭也舊說刻革鳥置竿首也孫叔敖云革急也言畫急疾之鳥於旒也周官鳥隼為旟也按禮記鄭玄云載之以示眾即此類也書云鳥戰目革詩云如載鳴鳶鳥斯革旌首鳥者自是鳥之皮毛明矣詩曰孑孑干旟在浚之都又曰彼旟旐斯胡不斾斾斾旒垂也周禮曰鳥隼為旟州里所建也州長之屬旐釋名曰龜虵為旐兆也龜知氣兆之吉凶建之於後察度事宜之形兆也爾雅曰績廣充幅長尋曰旐郭璞注曰帛全幅長八尺者也詩曰設此旐矣又曰建旐設旄薄獸于敖周宣王也周禮曰龜虵為旐四斿縣鄙之所建也旞釋名曰全羽為旞旞猶也順滑貌也一作襚說文曰旞者導車所載全羽允允而進也周禮曰全羽為誶道車所進車象路也王以朝夕燕出入也旌釋名曰折羽為旌旌精光也綏有虞氏之旌也注旄竿首其形蘂蘂然也綏夏后氏之旌也其形襄也白斾殷旌也以帛繼旐末也翿陶也其皃陶陶下垂也爾雅曰旄首曰旌郭璞注曰戴旌於竿頭如令之幢亦有旄, SBCK: ''}
