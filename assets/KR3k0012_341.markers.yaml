  - {type: variant, offset: 3444, length: 3, content: 虹旍兮, SBCK: 之武王以黄􅃏斬紂故王者以爲戒太公以玄􅃏斬妲巳故婦人以爲戒博物志曰武王伐紂度河太風波武王操􅃏乗麾麾之風波立濟正部曰奔逃之士不避斧􅃏張平子西京賦曰於是􅃖尤秉􅃏􅁬鬣􅀍般禁禦不􅀂以知神姦張平子東京賦曰緫輕武於後陳奏麗皷之嘈獻戎士介而􅀭揮載金鉦而建黄􅃏又曰方相秉􅃏巫覡操茢桃弧􅁄矢所發無臬又曰我光武忿之乃龍飛白水鳯翔參墟授􅃏四七共工是除潘元茂􅁽魏公九錫文曰錫以二輅虎賁鈇􅃏陳孔章檄吴將校部曲文曰丞相秉􅃏鷹楊順風烈火元戎啓行未皷而破又曰伏鈇嬰􅃏首􅆎分離范蔚宗䆠者傳論曰梁兾受鉞迹罔公正思固主心故中外服從上下屏氣曹植王仲宣誅曰我公􅁬􅃏耀}
