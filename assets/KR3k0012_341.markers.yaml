  - {type: variant, offset: 542, length: 0, content: '', SBCK: 誅二公也守東掖門會騶虞幡出乂投弓流涕曰楚王􅀍詔是以從之宋書曰元嘉四年車駕出北堂使三更竟開廣莫門南臺云應湏白獸幡銀字􅙶不肯開尚書左丞羊玄保奏免御史中丞􅀓隆巳下曇首曰旣無異勑又闕幡􅙶雖稱上旨不異單刺元嘉元年二月雖有開門例此乃前事違}
  - {type: variant, offset: 542, length: 0, content: '', WYG: 曰朝大士衆賢能者多子何功才既獲顯榮假乃無期寵厚將何謂也得無有不信於賢主耶建長跪以青幘旛意語父父嘿然有頃}
