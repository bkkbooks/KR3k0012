  - {type: variant, offset: 9, length: 176, content: 九旗之名日月為常畫日月於其端天子所建言常名也尚書君牙曰惟乃祖乃父世篤忠貞服勞王家厥有成績紀于太常周禮曰日月為常十二旒河圖曰風后曰予告汝帝之五旗東方法青龍曰旗南方法赤鳥曰鼠西方法白虎曰典北方法玄蛇曰旂中央法黃龍曰常國語曰吳王會晉於黃池吳王白常白旂赤常赤旗文選曰建辰旒之太常又曰建太常兮裶裶旂釋名曰交龍為旂旂倚也畫作兩龍相依倚也通以一赤色為之無文采諸侯所建, SBCK: 斾者斾然垂}
