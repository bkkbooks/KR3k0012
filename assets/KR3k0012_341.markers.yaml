  - {type: variant, offset: 505, length: 2, content: 將帥, SBCK: 魏朝有青龍朱雀􅀇武白虎黄龍等五幡以詔四方詔東方郡國以青龍信南朱鳥西白虎北玄武朝廷畿甸則以黄龍亦以騏麟信幡髙貴郷公討晉文自秉黄龍幡以麾號令晉朝唯用白虎書信幡用鳥取其飛騰輕疾一曰鴻鴈有去來}
  - {type: variant, offset: 505, length: 2, content: 將帥, WYG: 守東掖門㑹騶虞旛出又投弓流涕曰楚王被詔是以從}
  - {type: variant, offset: 508, length: 2, content: 所建, SBCK: 信}
  - {type: variant, offset: 508, length: 3, content: 所建也, WYG: 宋書曰元嘉四年車駕出北堂使三更竟更開廣莫門南臺元法應湏白獸幡銀字碟不肯開尚書左丞羊𤣥保奏免御史中丞傅隆以下曇首曰既無異勅又闕幡碟雖稱上㫖不異單刺元嘉元年二月雖有開門例此乃前事違令今守舊未為非}
