  - {type: variant, offset: 3415, length: 0, content: '', krp: 張騫使月支匈奴得之留騫五六年漢節不失東觀漢記曰鄭衆謂匈奴曰不忍將大漢節對氊裘也唐書曰潁王璬爲蜀郡都督璬性儉率將渡綿州江登舟見以綵縁席爲籍者顧曰此可以爲寢處奈何踐之命徹去之璬𥘉奉命之藩卒遽不遑受節綿州司馬史賁進說曰王帝子也且爲節度大使今之藩而不持節單騎徑進人何所瞻請建大槊蒙之油囊爲}
  - {type: variant, offset: 3416, length: 2, content: 旗拂, SBCK: 節狀先駈道路足以威衆璬􅀏曰但爲眞王何用假旌節乎􅃏釋名曰􅃏豁也所司莫敢當前豁然破散也宋林曰􅃏王斧也開元文字云斧也或爲􅃏尚書牧誓曰王左杖黄􅃏右秉白旄以麾曰逖矣西土之人又顧命曰一人冕執劉立于東堂一人冕執􅃏立于西堂云冕皆大夫也􅃏属也立於東西廂之前堂詩曰武王載斾有䖍秉􅃏如火烈烈則莫我敢遏䖍固也禮記曰}
  - {type: page-break, offset: 3416, content: '', id: KR3k0012_SBCK_341-8b}
  - {type: variant, offset: 3416, length: 2, content: 旗拂, WYG: 節狀先驅道路足以威衆璬笑曰但為真王何用假旌節乎鉞釋名曰鉞豁也所司莫敢當前豁然破散也字林曰鉞玉斧也開元文字云斧也或為鉞尚書牧誓曰王左杖黄鉞右秉白旄以麾曰逖矣西土之人又顧命曰一人冕執劉立于東堂一人冕執鉞立于西堂云冕皆大夫也劉鉞屬也立於東西廂之前堂詩曰武王載斾有䖍秉鉞如火烈烈則莫我敢遏䖍固也禮記曰}
