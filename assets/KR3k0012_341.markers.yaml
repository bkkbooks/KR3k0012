  - {type: variant, offset: 3415, length: 0, content: '', SBCK: 張騫使月支匈奴得之留騫五六年漢節不失東觀漢記曰鄭衆謂匈奴曰不忍將大漢節對氊裘也唐書曰潁王璬爲蜀郡都督璬性儉率將渡綿州江登舟見以綵縁席爲籍者顧曰此可以爲寢處奈何踐之命徹去之璬􅀄奉命之藩卒遽不遑受節綿州司馬史賁進􅀃曰王帝子也且爲節度大使今之藩而不持節單􅀐徑進人何所瞻請建大槊􅂪之油囊爲}
  - {type: variant, offset: 3415, length: 0, content: '', WYG: 張騫使月支匈奴得之留騫五六年漢節不失東觀漢記曰鄭衆謂匈奴曰不忍将大漢節封氊裘也唐書曰潁王璬為蜀郡都督璬性儉率將渡綿州江登舟見以綵緣席為藉者顧曰此可以為寢處奈何踐之命徹去之璬初奉命之藩卒遽不遑受節綿州司馬史賁進説曰王帝子也且為節度大使今之藩而不持節單騎徑進人何所瞻請建大槊蒙之油囊為}
