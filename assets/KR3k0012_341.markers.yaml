  - {type: variant, offset: 516, length: 6, content: 制度為科物應, SBCK: 甘延壽出西域部勒行陣别爲校尉踰葱嶺入亦谷至郅支城望見單于城上五采幡幟又曰武帝伐南越禱太一}
  - {type: variant, offset: 516, length: 2, content: 制度, WYG: 後魏元孚持白虎旛勞阿那瓌於柔𤣥懐荒二鎮間阿那􅉞衆號三十萬隂有異意遂拘留孚載以轒音汾輼音温車日給酪一升肉一叚毎集其衆坐孚東廂稱}
  - {type: variant, offset: 516, length: 6, content: 制度為科物應, krp: 河間王伐齊王囧火燒觀閣及千秋神虎二宫門囧盗白虎幡唱云長沙王矯詔長沙更}
