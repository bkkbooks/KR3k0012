  - {type: variant, offset: 3429, length: 12, content: 筌撓兮蘭旌筌此緣切撓音饒, SBCK: 是故君子不賞而民勸不怒而民威於鈇􅃏左傳曰魏絳至授㒒人書將伏劒士魴張老止之公讀其書曰君合諸侯臣敢不敬君師不武執事不敬罪莫大焉臣懼其死以及楊干無所逃罪不能致訓至於用􅃏臣之罪重敢有不從以怒君心請歸死於司宼也}
