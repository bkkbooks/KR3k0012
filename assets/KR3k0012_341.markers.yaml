  - {type: variant, offset: 1790, length: 203, content: 人之執也殷曰白天之義也周曰黃地之道也旌首有鈴曰旂三王所以立不失天地人之道也章夏以日月上明也殷以虎上威也周以龍上文也章畫飾也三王畫各有所法也郝萌占曰旗上有光人主大喜延年益壽黃石公三略曰欲知敵形色可勝之符先戰以二十八騎角人青衣赤旗東方七人徵人赤衣黃旗南方七人啇人白衣黑旗西方七人羽人黑衣青旗北方七人凡二十八騎象二十八宿軍令曰聞雷鼓音舉白幢綘旗大小船皆進戰不進者斬聞金音舉青旗舡皆止不止者斬王孫子曰桀紂或放南巢或, SBCK: ''}
