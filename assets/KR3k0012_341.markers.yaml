  - {type: variant, offset: 491, length: 4, content: 雜帛為物, SBCK: 幡也其皃幡幡然也􅀃文曰幡幟也麟角曰信幡古之麾號也所}
  - {type: page-break, offset: 491, content: '', id: KR3k0012_SBCK_341-2b}
  - {type: variant, offset: 491, length: 2, content: 雜帛, WYG: 旛幡也其貎幡幡然也説文曰旛幟也麟角曰信旛古之麾號也所以題表官號以}
  - {type: variant, offset: 491, length: 4, content: 雜帛為物, krp: 靈旗獻帝春秋曰董卓未誅有書三尺布幡上作兩口相銜之字負之於道歌曰布乎及吕布殺卓負布者不復見吴志曰陸遜取冝都獲秭歸枝江還屯夷陵守峽口}
  - {type: variant, offset: 494, length: 1, content: 物, WYG: 符信故謂之信旛乗輿則畫為白虎取其義而有威信之徳也魏朝有青龍朱雀𤣥武白虎黄龍等五旛}
  - {type: punctuation, offset: 495, content: ，, id: KR3k0012_CHANT_341-bkkpn227}
  - {type: 'tls:seg', offset: 495, content: '', id: KR3k0012_CHANT_341-13a.8}
  - {type: variant, offset: 496, length: 3, content: 雜色綴, SBCK: 題表官號以爲符信故謂之信幡乗輿則􅀞爲白虎取}
  - {type: variant, offset: 496, length: 3, content: 雜色綴, WYG: 詔四方詔東方郡國以青龍信南朱鳥西白虎北𤣥武朝廷畿甸則以黄龍亦以麒麟信旛髙貴鄉公討晋文自秉黄龍旛以麾號今晋朝唯用白虎書信旛用鳥取}
  - {type: page-break, offset: 496, content: '', id: KR3k0012_WYG_341-4a, image: WYG0896/WYG0896-0064a.png}
  - {type: variant, offset: 496, length: 11, content: 雜色綴其邊為翅尾也將帥, krp: 備蜀關羽還當陽西保夌城權使誘}
  - {type: variant, offset: 500, length: 4, content: 邊為翅尾, SBCK: 義而有威信之德}
  - {type: variant, offset: 500, length: 1, content: 邊, WYG: 飛騰輕疾一曰鴻鴈者去來之信也漢書曰甘延夀出西域部勒行陣别}
  - {type: variant, offset: 502, length: 2, content: 翅尾, WYG: 校尉踰葱嶺入赤谷至郅支城望見單于城上五采旛幟又曰武帝伐南越禱太一以牡荆畫旛名曰靈旗獻帝春秋曰董卓未誅有書三尺布幡上作兩口相銜之字負之於道歌曰布平及吕布殺卓負布者不復見吳志曰陸遜取宜都獲秭歸枝江還屯夷陵守峽口以備蜀雲長還當陽西保麥城權使誘之雲長偽立幡旗為象置扵城上因遁走王隠晋書曰河間王伐齊王冏火燒觀閣燬千秋神虎二宫門冏盗白虎幡唱云長沙王矯詔長沙更以白旛唱稱大司馬謀反晋書曰長沙王乂攻齊王冏冏令王胡悉盗騶虞旛唱云長沙王矯詔又稱大司馬謀反助者誅五族又張華𫝊曰楚王瑋受密詔殺太宰汝南王亮太保衛瓘等内外兵擾朝廷大恐計無所出張華白帝以瑋矯詔擅害三公將士倉卒謂是國家意故從之耳今可遣騶虞旛使外軍解嚴理必風靡上從之瑋兵果散及瑋誅華以首謀有功拜右光禄大夫又曰衛瓘既誅瓘女與國臣書曰先公名謚未顯無異凡人毎恠一國蔑然旡言春秋之失其咎安在悲憤感慨故以示意於是主簿劉繇等執黄旛撾登聞鼓上言論之又曰楚王瑋之誅二公}
  - {type: page-break, offset: 502, content: '', id: KR3k0012_WYG_341-4b, image: WYG0896/WYG0896-0064b.png}
