  - {type: variant, offset: 36, length: 1, content: 神, SBCK: 者案籍畢復齒符乃引内之也其有官位得出入者令執御者各傳呼前後以相通昬至晨分部行夜夜有行者輙前曰誰誰􅀂此不懈終歳更始所以重慎􅀫衛也漢書舊儀曰衛尉寺在京内胡廣云宫闕之内衛士於周垣下爲廬者􅀂今之伏􅀫屋矣武庫令六典曰武庫令掌藏􅀖國之兵仗器械辨其名數以備國用承爲之貳漢書百官表曰執金吾属官有武庫令又曰杜欽爲大將軍武庫令職閑無事欽所好也又曰武庫令一人昔武王伐紂散牛放馬倒載干戈韜以虎皮而藏諸武庫武庫之職由來尚矣續漢書曰武庫令一人秩六百石}
  - {type: page-break, offset: 36, content: '', id: KR3k0012_SBCK_230-3a}
  - {type: variant, offset: 36, length: 1, content: 神, krp: 者案籍畢復齒符乃引内之也其有官位得出入者令執御者各傳呼前後以相通昬至晨分部行夜夜有行者輙前曰誰誰若此不懈終歳更始所以重慎宿衛也漢書舊儀曰衛尉寺在京内胡廣云宫闕之内衛士於周垣下爲廬者若今之伏宿屋矣武庫令六典曰武庫令掌藏邦國之兵仗器械辨其名數以備國用承爲之貳漢書百官表曰執金吾属官有武庫令又曰杜欽爲大將軍武庫令職閑無事欽所好也又曰武庫令一人昔武王伐紂散牛放馬倒載干戈韜以虎皮而藏諸武庫武庫之職由來尚矣續漢書曰武庫令一人秩六百石}
