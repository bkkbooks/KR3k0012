  - {type: 'tls:seg', offset: 2311, content: '', id: KR3k0012_CHANT_230-37a.10}
  - {type: variant, offset: 2312, length: 0, content: '', WYG: 經有行為宗正東觀漢記曰劉般字伯興遷宗正在朝廷竭忠盡節勤身憂國夙夜不怠數納嘉謀州郡便宜所在以聞受職修治振施宗族又曰劉平字公子以仁孝著聞永平三年為宗正卿後漢書曰劉軫字君文梁孝王𦙍為宗正率官遂代掌宗正焉續漢書曰宗正卿一人秩二千石掌序録王國嫡庶之次及諸宗室親屬逺近郡國歲計上宗室名籍晉起居注曰咸寜元年以太中大夫王覽為宗正卿又曰太始二年以侍中中書監朱整為宗正卿後魏書曰杜銓初密太后父豹䘮在濮陽世祖欲命迎葬於鄴謂司徒崔浩曰天下謂杜何處望髙浩對京兆為美世祖曰朕今方改葬外祖意欲取京兆杜中長老一人以為宗正營護凶事浩曰中書博士杜銓其家今在趙郡是杜預之後於今為諸杜最即命詔之及見銓器貌儇雅世祖感悦謂浩曰此真吾所欲}
