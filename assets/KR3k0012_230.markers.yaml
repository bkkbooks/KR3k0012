  - {type: variant, offset: 2310, length: 1, content: 光, WYG: 公車司馬令周官也秩六百石冠一梁掌殿司馬門徼夜宮天下上事及闕下凡所徵召皆摠領之李邵以公車司馬令為將宗正卿六典曰宗正卿之職掌九族六親之屬籍以别昭穆之序并領崇𤣥署少卿為之貳漢書曰宗正秦官也應劭曰周成王時彤伯入為正掌親屬又曰劉德字路叔修黄老術有智略少時數言時事召見甘泉宮武帝謂之千里駒昭帝初為宗正丞後為宗正卿德妻死大將軍欲以女妻之不敢取畏盛滿也又曰劉向字子政元帝時蕭望之周堪薦向宗室忠直}
