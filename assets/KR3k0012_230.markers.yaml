  - {type: variant, offset: 634, length: 429, content: 褒貶通典曰愽士魏宮也魏文帝初置晉因之事掌引道乘輿王公巳下應追謚者則愽士議定之晉中興書曰愽士之職端委佩玉朝之大典必於詢度當以正道克厭人望然後為可唐書曰王彥威太原人世儒家少孤貧苦學尤通三禮無由自達元和中遊京師求為太常散吏部卿知其書生補為檢討官彥威於禮閣掇拾自隋巳來朝廷沿革吉凶五禮以類區分成三十卷獻之號曰元和新禮繇是知名時授太常愽士又曰陸亘為太常愽士寺有禮生孟真久於其事凡吉凶大儀官不能達率訪真真亦賴是須姑息元和七年冊皇太子將撰儀注真亦欲參預亘笞之由是禮儀不專於胥吏郭子曰張憑舉孝廉詣劉真長還舡須臾真長至遣覔張孝廉舡同旅愕然既同載俱詣撫軍劉前進謂撫軍曰今日為公得一士太常博士之選既前撫軍與之言咨嗟嗟稱善乃曰張憑勃倅為理窟即用為太常博士太祝六典曰太祝掌出納神主于太廟之九室而奉享薦禘袷之儀周禮曰太祝掌六祝之辭以事鬼神示祈福祥求永貞一曰順祝二曰年祝三曰吉祝四曰化祝五曰瑞祝六曰筴祝鄭司農曰順祝順農年也年祝求永貞也吉祝祈福祥也化祝弭災兵也瑞祝逆時雨寧風旱也筴祝遠罪疾也, WYG: 屬}
