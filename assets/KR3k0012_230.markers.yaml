  - {type: variant, offset: 38, length: 0, content: '', SBCK: 兵器晉書曰樂廣欲㑹荆揚士人武庫令黄慶進陶侃於廣人或非之慶曰此子終當逺到復何疑也守官令六典曰守官令掌􅀖國供帳之屬辨其名物㑹其出入凢大􅀕祀大朝㑹及廵幸則設王公百官位於正殿南門外續漢書曰少府属官有守官令丞主御􅁓筆墨及財物諸用并封書泥之事魏志曰荀彧字文􅀂年少時南陽何顒異之曰王佐才也舉孝廉拜守宫令董巴漢中宫傳曰守官禁内署令秩千石在省内用中人省外士人齊職儀曰守宫周掌宫之職王行爲帷宫即其任也公車令漢書曰張釋之爲公車令續漢書曰公車司馬令掌宫南門凢吏民上書四方貢獻及徴詣公車者皆掌之又曰周垂字子居拜侍御史公車司馬令不畏強禦以是見怨於幸臣應劭漢官儀曰公車司馬令周官也秩六百石冠一梁掌殿司馬門徼夜宫中天下上事及闕下凢所徴召皆揔領之李郃以公車司馬入爲侍宗正卿六典曰宗正卿之職掌九族六親之属籍以别昭穆之序并領崇􅀇署少卿爲之貳漢書曰宗正􅁗官也應劭曰周成王時形伯入爲正掌親屬又曰劉德字路叔修黄老術有智略少時數言時事召見甘泉宫武帝謂之千里駒昭帝􅀄爲宗正丞後爲宗正卿徳妻死大}
