  - {type: variant, offset: 109, length: 159, content: 為之又曰元順為太常少卿以父憂去職哭泣歐血身自負土時年二十五便有白髮免喪抽去不復更生世人以為孝思所致三國典略曰齊太常少卿袁聿修巡省河南諸州兗州刺史刑部與聿修故舊嘗於省中盛呼聿修為清郎至是遣送白紬為信聿修不受與邵書郎曰瓜田李下古人所慎多言可畏譬之防川願表此心不貽厚責邵亦忻然報書曰一日之贈率爾不思老夫忽忽意不及此敬丞來旨吾, SBCK: 先盡皇宗}
