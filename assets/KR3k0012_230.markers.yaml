  - {type: variant, offset: 39, length: 9, content: 享則與良醞令實鐏罍, SBCK: 軍欲以女妻之德不敢畏盛滿也又曰劉向字子政元帝時蕭望之周堪薦向宗室忠直明經有行爲宗正東觀漢記曰劉般字伯興遷宗正在朝廷竭忠盡節勤身憂國夙夜不怠數納嘉謀州郡便冝清浄畏愼受職脩治振施宗族又曰劉平字公子以仁孝著聞永平三年爲宗正卿後漢書曰劉􅎮字君文梁孝王㣧爲宗正卒官遂代掌宗正焉續漢書曰宗正卿一人秩二千石掌序録王國嫡庶之次及諸宗室親屬逺近郡國歳計上宗室名籍晉起居注曰咸寧元年以太中大夫王覽爲宗正卿又曰太始二年以侍中中書監朱整爲宗正卿}
