  - {type: variant, offset: 2487, length: 582, content: 是得幸出入臥內於宮祕戲仁常在傍終無所言又曰張安世字孺子為光祿勳郎有醉小便殿上主事白行法安世曰何以知其不覆水耶郎有淫官婢婢兄自言安世怒以奴淫污衣冠告署撻奴其隱人過皆此類也東觀漢記曰孫堪字子雅為光祿勳以清廉稱與周澤相類澤字雅都京師號之為二雅又曰劉昆字桓公為光祿勳授皇太子及諸王小侯五十人經昆老退位以二千石祿終其身又曰邵訓字伯春鄉里號之曰德行恂恂邵伯春章和中為光祿勳後漢書曰杜林字伯山扶風人也林少沉審愽學多聞世稱通儒為光祿勳內奉宿衛外惣三署郎有好學者輒見引進朝夕滿堂又曰馬防字公平林風人也防貴寵最盛與九卿絕席拜光祿卿又曰張湛字子孝拜光祿勳光武臨朝或有惰容輒陳諫常乘白馬上後見湛輒曰白馬生且復諫矣又曰袁彭順帝初為光祿勳行至清為吏麤袍糲食續漢書曰荀爽字慈明為光祿勳視事三月策拜司空謝承後漢書曰楊賜字伯欽拜為光祿勳嘉德殿前有青赤氣詔特進遣中使問賜祥異禍福吉凶所在以賜愽學頭儒故密諮問其極陳其意嘗上䟽陳請案春秋讖天投蜺海內亂今妄嬖閹尹共專國朝之所致也魏志曰鄭袤為光祿勳母丘儉作亂帝自征之百官祖送時袤疾不任會上謂王肅唯不見鄭光祿為恨袤聞白輿追上上笑曰知生必來遂與同載問以計謀帝甚重之又曰王肅字子雍為光祿勳時有二魚長尺集武庫之屋有司以為吉祥肅辨之曰魚生於泉而見於屋鱗介之物失其所也邊將其殆有棄甲之變乎其後果有東關之敗又曰袁渙字曜卿為中郎令時言劉備死群臣皆賀渙以嘗為備吏獨不賀卒官太祖, WYG: 宗室}
