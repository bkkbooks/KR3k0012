  - {type: variant, offset: 1259, length: 1312, content: 宋書太廟令一人主守宗廟案行洒掃眾事領齊郎二十四人齊職儀曰周有守祧之官掌先王廟令陵令六典曰陵令掌先帝山陵率戶守衛之事丞為之貳凡朔望元正冬至寒食皆修饗於諸陵若橋陵則日獻羞焉凡功臣密戚請陪陵葬者聽之以文武分為左右而列若父祖陵陪子孫從葬者亦如之周禮曰冢人下大夫二人中士四人掌公墓之地辨其兆域先王之葬居中以昭穆為左右漢書曰太常屬官有諸陵令元光元年分諸陵邑屬三輔又曰司馬相如為茂陵令續漢書曰太常職掌先帝陵每園令各一人秩六百石掌守園陵按行掃除丞及校長各一人校長主戒賊盜齊職儀曰周有墓大夫冢人之職掌先王之墓又曰每陵令一人品第七秩四百石銅印墨綬進賢一梁冠絳朝服唐書官品志曰梁天監七年又詔以為陵監之名不出前誥且宗廟憲章既備典禮園寢職司理不容異諸正陵先立監者改為令於是陵置令矣胡廣陵令箴曰昔在黃葉葬野衣薪禮非極哀不樹不封瓦棺塈周聚夏攸謂壤不毀膚賄不害生是謂皇極百王此經故厚不可皇薄不可王乃眷西顧爰矩孝文陵臣司墓敢告守人太樂令六典曰太樂令掌教樂人詞合鍾律以供邦國之祭祀饗讌承為之貳漢書百官表曰太常屬官有太樂令丞續漢書曰明帝永平十三年曹褒奏尚書璇璣鈐曰有帝漢德合作樂名天子下詔改太樂令丞以應圖讖又曰太樂令秩六百石掌伎樂人凡國祭祀掌奏樂及大司樂掌其陳序晉起居注曰成帝咸和中詔太樂令載綏教官伎樂勤勞賜米百石布二十疋太醫令六典曰太醫令掌諸醫療之法丞為之貳其屬有四曰醫師針師按摩師呪禁師皆有愽士以教之考試登用如國子監之法漢書曰百官表曰少府屬官有太醫令丞無員多至數十人續漢書曰太醫一人秩六百石有藥丞主藥方丞魏略曰脂習字元升除太醫令與孔融親善融被誅習獨往哭之黃初中以習有欒布之節賜拜中散大夫應劭漢官注曰太醫周官也兩梁冠秩千石典論曰中常侍張讓子奉為太醫令與人飲酒輒掣引衣裳發露形體亂其舄履使小大無不傾倒崔寔太醫令箴曰動不肆勤靜不宴逸有疾歸天醫無能恤晉平好內四時是一非鬼非食惑以自失雖有秦和焉所施術太上防疾其次萌牙腠理不蠲骨髓奈何廩犧令六典曰廩犧令掌薦犧牲及粢盛之事丞為之貳凡三祀之牲牢各有名數昊天上帝以蒼地皇袛以黃神州以黝五帝之牲各以方色韋昭辨釋名曰釋云廩犧犧戲也廩養之也辨云六牲取其純毛者別養之以奉祭祀純色者少故名犧犧希也周禮曰牧人下士掌牧六牲以供祭祀漢書百官表曰內史屬官有廩犧令丞尉後屬司農齊職儀曰周牧人之職也掌六牲陽祀用騂陰祀用黝取純毛者光武中興屬河南秩六百石光祿卿六典曰光祿卿之職掌邦國醪醴膳羞之事揔太官珍羞良醞掌醢四署之官屬修其儲備謹其出納少卿為之貳有大祭祀則省牲鑊視濯溉漢官解詁曰士之權貴不過尚書其次諸吏諸吏光祿勳是也應劭漢官儀曰光明也祿爵也勳功也言光祿典郎謁諸虎賁羽林學不安得賞不失勞故曰光祿勳唐書官品志曰光祿卿位視太子中庶子掌宮尉門戶統守黃門華林園暴室等令漢書曰郎中令秦官武帝太初元年更名光祿勳掌中殿門戶秩中二千石又曰石建為郎中令奏事下建省讀驚曰書馬者與尾而五今乃不足一獲譴死矣其謹慎如此又曰周仁景帝時為郎中令為人陰重不洩服虔曰質重不泄人之陰謀也師古曰陰密也言為性密重不泄人言也以是得幸出入臥內於宮祕戲仁常在傍終無所言又曰張安世字孺子為光祿勳郎有醉小便殿上主事白行法安世曰何以知其不覆水耶郎有淫官婢婢兄自言安世怒以奴淫污衣冠告署撻奴其隱人過皆此類也, SBCK: ''}
