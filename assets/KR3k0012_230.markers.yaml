  - {type: variant, offset: 111, length: 408, content: 又曰元順為太常少卿以父憂去職哭泣歐血身自負土時年二十五便有白髮免喪抽去不復更生世人以為孝思所致三國典略曰齊太常少卿袁聿修巡省河南諸州兗州刺史刑部與聿修故舊嘗於省中盛呼聿修為清郎至是遣送白紬為信聿修不受與邵書郎曰瓜田李下古人所慎多言可畏譬之防川願表此心不貽厚責邵亦忻然報書曰一日之贈率爾不思老夫忽忽意不及此敬丞來旨吾無間然弟昔為清郎今作清卿矣唐書曰馮定為太常少卿文宗每聽樂鄙鄭衛聲詔奉常習開元中霓裳羽衣舞以雲韶樂和之舞曲成定揔樂工閱於庭定立於其間文宗以其端凝若植問其姓氏翰林學士李玨對曰此馮定也文宗喜問曰豈非能為古章句者耶乃召升階文宗自吟定送客西江詩吟罷益嘉因錫禁中瑞錦仍令大錄所著古體詩以獻太常丞六典曰太常丞二人從五品上秦有奉常丞漢因之比千石魏晉宋皆置一人漢書曰韋弘為太常職掌陵廟煩劇多過父賢勑令自免懷嫌不去官及賢疾篤果坐廟事繫獄宋百官春秋曰太常丞視尚書郎銅印黃綬一梁冠品第七掌舉陵廟非法陶氏家傳曰覆之字孫宗為太常丞, WYG: 貳}
