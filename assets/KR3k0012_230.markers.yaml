  - {type: variant, offset: 3330, length: 164, content: 清用肅勤明敏兼職古典者唐書曰柳享拜光祿少卿太宗每誡之曰與卿舊親情素兼宿卿為人交遊過多今授此職宜存簡靜亨性好射獵有饕湎之名此後頗自勗勵杜絕賓客約身節儉勤於職事太宗亦以此稱之也太官令六典曰太官令供膳食之事丞為之貳凡祭之日則白卿諸廚省牲鑊取明水於陰鑑取明火於陽燧帥宰人以鑾刀割牲取其毛血實之於豆遂烹牲焉又帥進饌者實簠簋設於饌幕之內漢書, SBCK: ''}
