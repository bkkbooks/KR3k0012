  - {type: variant, offset: 3341, length: 0, content: '', WYG: 先盡皇宗無則用庶姓宗正丞六典曰宗正丞掌判寺事太僕卿六典曰太僕卿掌邦國廐牧車輿之政令總椉黄典廐典牧章府四署及諸監牧之官屬少卿為之貳凡國有大禮及大駕行幸則供其五輅屬車之屬尚書冏命曰昔在文武聰明齊聖小大之臣咸懷忠良子命汝作大正正於羣僕侍御之臣周禮曰太僕掌正王之服位出入王之大命掌諸侯之復逆王眡朝前正位而退入亦如之建路鼓於大寢之門外而掌其政以待達窮者與遽令聞鼓聲則達逆御僕與御庻子祭祀賔客䘮紀正王之服位詔法儀賛王牲事王出入則自左馭而前驅漢書曰夏侯嬰自上初起沛常為太僕竟髙祖世以太僕事惠帝惠帝崩以太僕事髙后代王之來嬰與東牟侯入清宮以天子駕迎代王共立文帝復為太僕又曰百官表曰太僕掌輿馬屬官有大廐未央廐象馬三令又車府路軨音靈騎馬駿馬四令又龍馬閑駒槖泉騊駼承華五監長丞又邉郡六牧師苑令各三丞又邉牧槖昆蹄令丞皆屬焉東觀漢記曰祭側界切彤膂力過人常貫三百斤弓馬為太僕從帝過孔子講堂帝指子路室曰太僕吾之禦侮也後漢書曰徵祭彤為太僕彤在遼東幾三十年衣無兼副顯宗既嘉其功又美彤清約拜日賜錢一百萬馬三匹衣被刀劔下至居屋什物大小無不悉備續漢書曰趙岐字臺卿獻帝以為太僕持節安慰天下又百官志曰太僕秩中二千石掌車馬天子出奉駕則馭魏志曰國淵字子尼遷太僕居列卿位布衣疏食禄賜散之舊故宗族以恭儉自守又曰潘尼字正叔侍中為太僕造乗輿箴漢舊儀曰太僕牧師苑三十六所分布北邉以郎為苑監官奴婢三萬人分養三十萬頭擇取給六廐牛羊無數以給牲犧漢雜事曰石慶為太僕御出上問車中幾馬慶以䇿數馬畢舉手曰六馬慶於兄弟最為簡易而猶如此又曰公孫賀以太僕為丞相子敬聲代為太僕晉諸公賛曰郭展為太僕留心於養生是以廐馬充牣其後征吳得以濟事}
