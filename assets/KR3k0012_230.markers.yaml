  - {type: variant, offset: 21, length: 0, content: '', SBCK: 爲之貳凢大􅀕祀大朝㑹則供具羽儀節􅃏金㦸帷弈茵蓆之屬漢書百官表曰衛尉􅁗官也掌宫門衛屯兵漢因之景帝􅀄更名中大夫後元年改爲衛尉東觀漢記曰光武二十三年}
  - {type: variant, offset: 21, length: 88, content: 太師祝齋郎入薦香燭整拂神幄出入神主將享則與良醞令實鐏罍後魏書曰太和十五年置少卿官太常少卿一人第三品上至二十二年降為正四品又曰景明初班職令太常少卿第四品上第一清選明禮兼天文陰陽者, WYG: ''}
  - {type: variant, offset: 21, length: 0, content: '', krp: 爲之貳凢大祭祀大朝㑹則供具羽儀節鉞金㦸帷弈茵蓆之屬漢書百官表曰衛尉秦官也掌宫門衛屯兵漢因之景帝𥘉更名中大夫後元年改爲衛尉東觀漢記曰光武二十三年}
  - {type: variant, offset: 22, length: 4, content: 師祝齋郎, SBCK: 尉鮑昱兼衛尉永元三年司徒丁鴻兼衛尉後漢書曰銚音遥期字次况頴川人也拜衛尉卿期重於信義憂國憂主其有不得於心必犯顔諌諍續漢書曰隂興爲衛尉每諸將出征伐身行勞問無所愛惜又曰馬光字叔山爲衛尉卿上以光謹勑小心周宻畏慎特親異之又曰竇固字孟孫爲衛尉卿兩宫􅀫衛見重當時仁厚謙恭甚有名稱又曰趙喜字伯陽爲衛尉盡心事上夙夜匪懈母没上䟽乞守服不許遣使釋服又百官志曰衛尉卿秩中二千石掌官服衛士公車令百官衛士左右都虞候宫掖門司馬皆屬焉魏志曰辛毗爲衛尉清平與徐邈胡質皆以憂國忘私不營産業賜􅂖二千斛錢三十萬布告天下又曰田預爲并州刺史徴爲衛尉屢乞遜位司馬宣王以預克壯書諭未聽預書荅曰年過七十而以居位譬猶鐘鳴漏盡夜行不休是罪人也遂因稱疾又曰辛毗字佐治爲衛尉卿帝方修殿舎毗諌曰詩云民亦勞止汔可小康吴志曰嚴畯爲孫權立吴及稱尊號畯常爲衛尉禄賜皆散之親戚知故家常不充晉書曰石崇拜衛尉與潘岳謟事賈謐謐與之親善號二十四友廣成君每出崇降車路左望塵而拜其佞如此宋書曰南郡王義宣子恢爲侍中領衛尉晉氏過江不置衛尉世祖欲重城禁故復置衛尉自恢爲始也唐書官品志曰衛尉卿位視侍中掌宫門屯兵卿每月丞每旬行宫徼糺察不法統武庫令公車司馬令漢官解詁曰衛尉主宫闕之内衛士於垣下爲廬各有貟部凢居宫中者皆置籍於門按其姓名有毉巫僦人當}
