  - {type: variant, offset: 3077, length: 190, content: 偉字公操南郡人少好學修節不殆為獨六有不可奪之志舉茂才賢良方正皆不就孫休即位將徵偉累遷至光祿勳及皓即位朝政昏亂為乃辭老耄固疾乞身又曰薛瑩字道言以時法政多謬舉措煩苛瑩每上便宜陳緩刑簡役以濟育百姓頗或施行遷光祿勳晉中興書曰鄭默字思元轉光祿勳寬冲愽受不以聲色矜人雖卒徒厮養皆遇之以恩宋書曰王惠宋國初建當置郎中令高祖難其人謂傅亮曰今用郎中令不可令減袁曜卿也既而曰吾得其人矣乃以惠居之孟宗別傳, WYG: 氏星經}
