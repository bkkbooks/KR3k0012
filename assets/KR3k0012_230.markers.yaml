  - {type: variant, offset: 2724, length: 604, content: 林風人也防貴寵最盛與九卿絕席拜光祿卿又曰張湛字子孝拜光祿勳光武臨朝或有惰容輒陳諫常乘白馬上後見湛輒曰白馬生且復諫矣又曰袁彭順帝初為光祿勳行至清為吏麤袍糲食續漢書曰荀爽字慈明為光祿勳視事三月策拜司空謝承後漢書曰楊賜字伯欽拜為光祿勳嘉德殿前有青赤氣詔特進遣中使問賜祥異禍福吉凶所在以賜愽學頭儒故密諮問其極陳其意嘗上䟽陳請案春秋讖天投蜺海內亂今妄嬖閹尹共專國朝之所致也魏志曰鄭袤為光祿勳母丘儉作亂帝自征之百官祖送時袤疾不任會上謂王肅唯不見鄭光祿為恨袤聞白輿追上上笑曰知生必來遂與同載問以計謀帝甚重之又曰王肅字子雍為光祿勳時有二魚長尺集武庫之屋有司以為吉祥肅辨之曰魚生於泉而見於屋鱗介之物失其所也邊將其殆有棄甲之變乎其後果有東關之敗又曰袁渙字曜卿為中郎令時言劉備死群臣皆賀渙以嘗為備吏獨不賀卒官太祖為之流涕吳志曰石偉字公操南郡人少好學修節不殆為獨六有不可奪之志舉茂才賢良方正皆不就孫休即位將徵偉累遷至光祿勳及皓即位朝政昏亂為乃辭老耄固疾乞身又曰薛瑩字道言以時法政多謬舉措煩苛瑩每上便宜陳緩刑簡役以濟育百姓頗或施行遷光祿勳晉中興書曰鄭默字思元轉光祿勳寬冲愽受不以聲色矜人雖卒徒厮養皆遇之以恩宋書曰王惠宋國初建當置郎中令高祖難其人謂傅亮曰今用郎中令不可令減袁曜卿也既而曰吾得其人矣乃以惠居之孟宗別傳曰宗為光祿勳大會宗先少酒偶有強者飲一杯便吐傳詔司察宗吐麥飯察者以聞上乃歎息曰至德清純如此光祿少卿後魏職令曰光祿少卿第四品上, SBCK: 御覽卷}
