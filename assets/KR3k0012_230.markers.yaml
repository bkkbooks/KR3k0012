  - {type: variant, offset: 1879, length: 182, content: 太醫一人秩六百石有藥丞主藥方丞魏略曰脂習字元升除太醫令與孔融親善融被誅習獨往哭之黃初中以習有欒布之節賜拜中散大夫應劭漢官注曰太醫周官也兩梁冠秩千石典論曰中常侍張讓子奉為太醫令與人飲酒輒掣引衣裳發露形體亂其舄履使小大無不傾倒崔寔太醫令箴曰動不肆勤靜不宴逸有疾歸天醫無能恤晉平好內四時是一非鬼非食惑以自失雖有秦和焉所施術太上防疾其次萌牙腠理不蠲骨髓奈何廩犧令六典曰廩犧, WYG: 公車司馬}
