  - {type: variant, offset: 3536, length: 467, content: 清修聰明者光祿上名迺召拜皆秩四百石三歲為令以供養勞苦遷左丞有湯官丞掌諸甘肥有菓丞掌菓瓜菜茹薪炭漢舊儀曰太宮主飯肉湯官酒皆令丞治太官湯官奴婢各三千大置酒皆緹構音溝蔽膝緣幘又曰太官上食黃釦音口金飾器器中官私官上食用白銀釦器如祠廟器云謝承後漢書曰魯國陳政字叔方為太官令黃門郎與政有隙因進御食以髮貫炙光武見髮勑斬政政曰臣有當死者三黑山出炭增治吐炎燋膚爛肉而髮不消臣罪一也陜出佩刀砥礪五石虧肌截骨曾不能斷髮臣罪二也臣朗月書章奏側光讀經書旦臨食與丞及庖人六目齊視黃門一人臣罪三也詔赦之魏略曰時苗為壽春令遷為太官令後魏書曰毛循之能為南人飲食手自煎調多所適意世祖親侍之進太官尚書賜爵南郡公加冠軍將軍常在太官主進御膳揚雄太官令箴曰時惟膳夫實司王饔祁祁庶羞口實是供群物百品八珍清觴以御賓客以膳于王王郎集曰朗為大理時上主簿趙郡張登昔為本縣主簿值黑山賊圍郡登與縣長王攜帥吏兵七十二人俱往赴救與賊交戰吏兵散走攜殆見害登手格二賊以全攜命又守長夏逸為督郵所枉登身授拷掠理逸之罪義濟二君宜加顯異黃初詔曰登忠義彰著在職功勤名位雖卑直亮宜顯饔膳近任當得此吏今以登為太官令, SBCK: ''}
