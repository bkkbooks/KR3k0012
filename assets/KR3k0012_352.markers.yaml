  - {type: variant, offset: 1970, length: 463, content: 涉睢濟江入于夢中王寢盜攻之以戈擊王王孫由于以背受之中肩又曰吳伐越越子句踐禦之陳于檇李靈姑浮以戈擊闔閭傷將指又曰齊人輸晉范氏粟鄭子姚子般送之范吉射逆之趙鞅禦之郵無恤御簡子衛太子為右登鐵上鄭人擊趙簡子中肩斃于車中太子救之以伐鄭師北太子復伐之鄭師大敗又曰齊簡公即位與婦人飲酒于檀臺成子遷諸寢徙公使居正寢公執戈將擊之疑其欲作亂也太史子餘曰非不利也將除害也又曰晉荀瑤帥師伐鄭荀瑤智伯也鄭駟弘請救于齊弘駟顓子陳成子救鄭及濮雨不涉成子衣製杖戈製雨衣也立于阪上馬不出者助之鞭之智伯聞之乃還畏其得眾心也曰我卜伐鄭不卜敵齊又曰衛良夫與太子剻聵入舍於孔氏之外圃錯入適伯姬氏既食孔伯姬仗戈而先太子與五人分輿猳從之分械甲也迫叔悝於廁強盟之孔氏專政故劫孔埋欲令逐輒漢書曰宣帝時美陽鼎獻之張敞好古文字案鼎銘勒而上議曰今鼎出於郊東中有刻書曰王命尸臣孟康曰尸主也官此㧦邑賜爾鸞旂黻琱戈尸臣拜手稽首竊以傳記言之鼎殆周之所以褒賜大臣也又曰武帝元鼎五年南越相呂嘉反遣歸義侯嚴為戈舡將軍張晏曰嚴故越人降義歸義侯越人於水中負醫醫人舡又有蛟龍之害故置戈於下因以為名也下離水, SBCK: 隱}
  - {type: variant, offset: 1970, length: 2, content: 涉睢, WYG: 隠書曰上聞賈后酷虐以㦸摘諸孕子者皆墮已治室金墉城尋當廢之趙粲救於内荀朂救於外故不}
