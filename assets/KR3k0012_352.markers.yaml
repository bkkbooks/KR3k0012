  - {type: variant, offset: 2605, length: 0, content: '', WYG: 登見曹公言養將軍譬如養虎當飽其肉不飽則將噬人公曰不如卿言譬如養鷹飢則為用飽則颺去其言如此布意乃止王隆漢官解詁曰衛尉宫闕周廬殿掖屯陳夾道當兵交㦸應劭漢官儀曰舊制太子食湯沐十縣家合領主自有官置周衛交㦸五日一朝因坐東廂省視膳食東方朔傳曰武帝坐未央前殿天雨新止朔執㦸在殿陛遥指獨語上見呼問之朔對曰殿後栢樹上有鵲立枯枝上東向鳴上遣侍中視之如朔言上問何以知之朔曰風從東來鵲尾旁風則傾背風則蹷必當順風而立故知東向鳴也新雨生枝滑故枝澁故立枯枝上上大笑賜帛十疋又曰孝武元封三年作栢梁臺召羣}
