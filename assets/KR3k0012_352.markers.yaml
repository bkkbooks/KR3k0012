  - {type: variant, offset: 1490, length: 0, content: '', krp: 諸侯伐偪陽狄虒弥建大軍之輪蒙之以甲爲櫓左執之右拔㦸成一隊又曰欒氏乗公門范宣子謂鞅曰矢及君屋死之鞅用劒以帥卒用劒短兵接欲致死也欒氏退攝車從之遇欒樂樂盈之族曰樂射之不中又注注属矢於弦則乗槐本而覆或以㦸鉤之斷肘而死周書曰年飢上用輿曲輈不漆矛㦸縷纒羽旄不擇鳥史記曰平原君與楚合從言其利害日出而言之日中不决毛遂按劒而前曰今楚地方五千里持㦸百萬此霸王之資也又曰蘇秦說韓王曰韓之劒㦸皆出於冥山棠谿漢書曰項羽令壯士挑戰漢有善騎射曰樓煩應劭曰樓須今樓煩縣是也楚戰三合樓煩輙射殺之羽大怒自𬒳甲持㦸挑戰樓煩欲射羽瞋目叱之樓煩目不能視手不能發走還入壁不復敢出又曰田肯賀上曰秦形勝之國也帶河阻山懸隔千里持㦸百萬懸隔千里之外秦得百二馬}
  - {type: variant, offset: 1491, length: 3, content: 慶封好, SBCK: 地方二千里持㦸百萬齊得十二焉非親子弟莫可使王齊者也又曰奉天子法駕迎皇帝代邸皇帝入未央宫有謁者十人持㦸衛端門曰天子在足下何爲者不得入又曰漢七年長樂宫成於是皇帝輦出房百官執㦸傳警引諸侯王以下至吏六百石以次奉賀又曰息夫躬云諸曹以下僕遫音速不足數卒有強弩圍城長㦸指闕陛下誰與備之又曰晁錯上言曰兩陣相近平地淺草可前可後此長㦸之地也劒楯三不當一又曰灌夫字仲􅐐父孟死吴軍夫􅁬曰願取吴王􅀂將軍頭以報父仇於是夫􅀍甲持㦸募軍中壯士所善願從數十人及岀壁門莫敢前獨兩人及從奴十餘􅀐馳入吴軍至戲音麾下所殺傷數十人又曰揚雄位不過執㦸又曰八月飲酎行祠孝昭廟是時霍氏外孫代郡太守任宣坐謀反誅宣子章爲公車丞亡在渭城界中夜􅕼服入廟執㦸立廟門待上至欲爲逆發覺伏誅後漢書曰光武署銚期爲賊曹􅁺上略地向北期從徇薊時王郎檄書到薊中起兵應郎光武趍駕出百姓聚觀諠呼滿道􅃒路不得行期􅀐馬􅁬㦸嗔目大呼左右曰䟆周禮􅈻僕掌䟆宫中之事鄭衆曰止行清道也􅀂今警蹕􅀃文䟆與蹕同衆皆披靡東觀漢記曰吴漢與蘇茂周建戰漢躬􅀍甲持㦸告令諸部將曰聞皷聲皆大呼俱進後至者斬遂皷而進賊兵大破又曰建武四年隗囂遣馬援奏課京師因曰臣與公孫述同縣少小相善臣前徃蜀述陛㦸乃見臣今臣逺從異方來陛下何以知臣非刺客姧人而簡易􅀂是上大􅀏又曰}
