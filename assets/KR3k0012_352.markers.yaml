  - {type: variant, offset: 1518, length: 1, content: 何, SBCK: 康等斬江京等迎立濟隂王是爲順帝閻顯弟景爲衛尉從省中還外府收兵至盛德門尚書郭鎮率直􅀫羽林出逢景景因斫鎮不中鎮劒擊景墮車左右以㦸义其􅅐禽之送廷尉謝承後漢書曰彭循字子陽太守祕君聞循義勇多謀請循以守呉令民歌之曰時歳倉卒盗賊縱横大㦸強弩不可當賴遇賢令彭子陽司馬彪續漢書曰楊仁字文義巴郡人顯宗特詔􅀘北宫衛士及帝崩時諸馬貴盛各爭欲入宫仁􅀍甲持㦸嚴勒門衛莫敢輕進者肅宗旣立諸馬共譛仁上知其忠愈善之張瀅漢南記曰陳蕃等欲除諸黃門謀泄閽寺之黨於宫中詐稱驚云外有反者蕃奔入宫小黃門朱寓逆以㦸刺蕃魏志曰董卓恐人謀巳常以吕布自衛嘗失意拔手㦸擿布布拳捷之由是隂怨卓英雄記又載吕布詣董卓卓嘗抜㦸擲之言布亂其私室又曰􅀽術遣將紀靈等歩􅀐三萬攻劉備備求救於吕布嚴歩兵千􅀐}
  - {type: page-break, offset: 1518, content: '', id: KR3k0012_SBCK_352-4b}
  - {type: variant, offset: 1518, length: 1, content: 何, WYG: 康等斬江京等迎立濟隂王是為順帝閻顯弟景為衛尉從省中還外府收兵至盛徳門尚書郭鎮率直宿羽林出逢景景因斫鎮不中鎮劒撃景墮車左右以㦸义其胷禽之送廷尉謝承後漢書曰彭循字子陽太守祕君聞循義勇多謀請循以守吳令民歌之曰時歳倉卒盜賊縱横大㦸强弩不可當頼遇賢令彭子陽司馬彪續漢書曰楊仁字文義巴郡人顯字特詔補北宫衞士及帝崩時諸馬貴盛各爭欲入宫仁被甲持㦸嚴勒明衞莫敢輕進者肅宗既立諸馬共譛仁上知其忠愈善之張􅀈漢南記曰陳蕃等欲除諸黄門謀泄閽寺之黨於宫中詐稱驚云外有反者蕃奔入宫小黄門朱寓以㦸刺蕃魏志曰董卓恐人謀已常以吕布自衞嘗失意㧞手㦸擿布布拳截之由是隂怨卓英雄記又載呂布請董卓卓常㧞㦸擲之言布亂其私室又曰袁術遣將紀靈等歩騎三萬攻劉備備求救於吕布嚴歩兵千騎}
  - {type: page-break, offset: 1518, content: '', id: KR3k0012_WYG_352-6b, image: WYG0896/WYG0896-0152d.png}
