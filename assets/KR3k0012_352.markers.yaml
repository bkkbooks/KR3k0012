  - {type: variant, offset: 1249, length: 210, content: 童子何知焉又曰晉胥童夷羊五帥甲八百將攻郄氏長魚矯請無用眾公使清沸魋助之沸魋嬖人也抽戈結衽衽裳際也而偽訟者三郄將謀於榭榭講武堂也矯以戈殺駒伯苦成叔於其位駒伯郄錡苦成叔郄犨也溫季曰逃威也遂趍郄至本君命而死今矯等意欲稟不以君命而來故欲逃也矯及其車以戈殺之皆尸諸朝又曰晉中行獻子將伐齊夢與厲公訟弗勝厲公獻子所殺公以戈擊之首墜於前跪而戴之奉之以走見梗陽之巫皋他日見諸道與之言同巫亦夢見獻子與厲公訟巫曰今茲主必死若有事于東方則可以逞, SBCK: ''}
