  - {type: variant, offset: 1490, length: 0, content: '', SBCK: 諸侯伐偪陽狄虒弥建大軍之輪蒙之以甲爲櫓左執之右拔㦸成一隊又曰欒氏乗公門范宣子謂鞅曰矢及君屋死之鞅用劒以帥卒用劒短兵接欲致死也欒氏退攝車從之遇欒樂樂􅄹之族曰樂射之不中又注注属矢於弦則乗槐本而覆或以㦸鉤之斷肘而死周書曰年飢上用輿曲輈不漆矛㦸縷纒羽旄不擇鳥史記曰平原君與楚合從言其利害日出而言之日中不决毛遂按劒而前曰今楚地方五千里持㦸百萬此霸王之資也又曰蘇􅁗􅀃韓王曰韓之劒㦸皆出於􅁳山棠谿漢書曰項羽令壯士挑戰漢有善􅀐射曰樓煩應劭曰樓須今樓煩縣是也楚戰三合樓煩輙射殺之羽大怒自􅀍甲持㦸挑戰樓煩欲射羽瞋目叱之樓煩目不能視手不能發走還入壁不復敢出又曰田肯賀上曰􅁗形勝之國也帶河阻山懸隔千里持㦸百萬懸隔千里之外秦得百二馬}
  - {type: page-break, offset: 1490, content: '', id: KR3k0012_SBCK_352-2b}
  - {type: variant, offset: 1490, length: 0, content: '', WYG: 諸侯伐偪陽狄虒彌建大車之輪䝉之以甲為櫓左執之右㧞㦸成一隊又曰欒氏乗公門范宣子謂鞅曰矢及君屋死之鞅用劒以帥卒用劒短兵接欲致死也欒氏退攝軍從之遇欒樂欒盈之族也樂射之不中又注注屬矢於弦則乗槐本而覆或以㦸鈎之斷肘而死周書曰年飢上用與曲輈不漆矛㦸縷纒羽旄不擇烏史記曰平原君與楚合從言其利害日出而言之日中不决毛遂按劒而前曰今楚地方五千里持㦸百萬楚覇王之資也又曰蘇秦說韓王曰韓之劒㦸皆出於冥山棠谿漢書曰項羽令壯士挑戰漢有善騎射曰樓煩應劭曰樓煩今樓煩縣是也挑戰三合樓煩輙射殺之羽大怒自被甲持㦸挑戰樓煩欲射羽瞋目叱之樓煩目不能視手不能發走還入壁不復敢出又曰田肯賀上曰秦形勝之國也帶河阻山懸隔千里持㦸百萬懸南千里之外}
