  - {type: variant, offset: 1521, length: 2, content: 皆嬖, SBCK: 報讎白琧烏各切突面􅀍髮而走爲吏所得乃感激弃其刀㦸更絹巾單衣折節學問吴志曰孫權拜諸葛恪丹陽太守授􅙶㦸武􅀐作皷吹導引歸家又曰孫權乗馬射虎庱亭庱懅陵切馬爲虎所傷權投以􅀟㦸虎遂却又曰太史慈劉繇}
