  - {type: variant, offset: 1538, length: 0, content: '', WYG: 因操刀持楯以身分之張勃能録曰嚴白虎使弟輿諧長沙桓王請和許之輿請與王獨㑹面約既㑹王引白削斫席輿體動王知其無能以手㦸投之立死蜀志曰兩鑲音攘是謂閇木户持雙㦸是謂坐鐵室也常據華陽國志曰荆邯記公孫述曰昔漢祖敗而復征故能禽秦亡楚以弱為强況今地方數千杖㦸百萬晉書曰賈后字南風初為太子妃性酷虐}
