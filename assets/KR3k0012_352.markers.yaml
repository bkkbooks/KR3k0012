  - {type: variant, offset: 2707, length: 213, content: 孔子窮於陳蔡七日不食絃歌鼓琴子路仡然執戈而儛韓子曰勾踐入官於吳執戈為吳王洗馬故能殺夫差於姑蘇呂氏春秋曰趙簡子攻衛附郭自將遠立郭遠立矢石不及也又居於犀蔽犀櫓之下投枹而嘆投棄也曰烏呼士之遫音速弊盡壹若此乎遫猶化也一猶皆也言士之爕化弊惡皆如此乎行人燭過免冑橫戈而進曰亦有君不能耳士又何弊之有簡子乃去犀蔽犀櫓而立於矢石之所及矢箭也石弩也一鼓而士乘之畢盡也乘凌也簡子曰與吾得革車千乘也不如聞行人燭過之一言淮南子曰陽虎為亂於魯魯君令人閉城, WYG: 東列崇福}
