  - {type: variant, offset: 415, length: 334, content: 言及樂子曰夫樂者象成者也總干而山立武王之事也發揚而蹈厲太公之志也武亂皆坐周召之治也武王克啇濟河而西倒載干戈包以虎皮將帥之士使為諸侯名之曰建櫜又曰大夫士既殯而君往焉祝先升君即位于阼小臣二人執戈立于前一人立于後周禮曰旅賁氏掌執戈盾夾王車而趨左八人右八人車止則持輪喪紀則衰葛執戈盾軍旅則介而趨又曰節服氏掌祭祀朝覲袞冕六人維王之太常郊祀裘冕二人執戈送逆尸從車鄭玄曰裘冕者亦從尸服也從尸車送逆之往來也又曰方相氏掌蒙熊皮執戈揚盾帥百隸而時儺以索室毆疫及墓入壙以戈擊四隅毆方良方良𦉾良也又曰司戈楯掌戈楯之物而頒之祭祀授故士戈故士王族故士也與旅賁當事則衛王者也軍旅會同授貳車戈楯建乘車戈楯授旅賁及虎士戈楯乘車王所乘車也旅則草路會同則金路也又曰車謂之六等之數鄭玄曰六等之數法易之三材六童, SBCK: 不得過}
