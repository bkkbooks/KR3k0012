  - {type: variant, offset: 1518, length: 1, content: 何, krp: 康等斬江京等迎立濟隂王是爲順帝閻顯弟景爲衛尉從省中還外府收兵至盛德門尚書郭鎮率直宿羽林出逢景景因斫鎮不中鎮劒擊景墮車左右以㦸义其胸禽之送廷尉謝承後漢書曰彭循字子陽太守祕君聞循義勇多謀請循以守呉令民歌之曰時歳倉卒盗賊縱横大㦸強弩不可當賴遇賢令彭子陽司馬彪續漢書曰楊仁字文義巴郡人顯宗特詔𥙷北宫衛士及帝崩時諸馬貴盛各爭欲入宫仁𬒳甲持㦸嚴勒門衛莫敢輕進者肅宗旣立諸馬共譛仁上知其忠愈善之張瀅漢南記曰陳蕃等欲除諸黃門謀泄閽寺之黨於宫中詐稱驚云外有反者蕃奔入宫小黃門朱寓逆以㦸刺蕃魏志曰董卓恐人謀巳常以吕布自衛嘗失意拔手㦸擿布布拳捷之由是隂怨卓英雄記又載吕布詣董卓卓嘗抜㦸擲之言布亂其私室又曰袁術遣將紀靈等歩騎三萬攻劉備備求救於吕布嚴歩兵千騎}
  - {type: variant, offset: 1520, length: 0, content: '', SBCK: 百馳徃赴備布謂靈等曰布性不憙合􅋐但憙解􅋐耳布令門候於營門中舉一􅃗㦸布言諸君觀布射㦸小支一發中者諸君當解去不中可留􅋐布舉弓射㦸正中小支諸將皆驚言將軍天威也明日歡會然後各罷又曰張繡反襲太祖營太祖出戰不利典韋以長㦸左右擊之一义輙十餘音矛摧左右死傷者略盡韋􅀍數十創短兵接戰賊前搏之韋􅀟挾兩㦸擊殺之餘賊不敢前又曰典韋好持大􅀟㦸與長刀軍中爲之語曰帳下壯士有典軍持一􅀟㦸八十斤王沈魏書曰太祖討吕布於濮陽布有别屯在濮西相持太祖募隱陳典韋先占但持長矛撩㦸時西面又急韋左手持十餘㦸大呼起所抵無不應手倒者魚豢魏略曰徐庶字元直少好任俠爲}
  - {type: page-break, offset: 1520, content: '', id: KR3k0012_SBCK_352-5a}
  - {type: variant, offset: 1520, length: 0, content: '', WYG: 百馳往赴備布謂靈等曰布性不憙合鬬但憙觧鬭耳布令門侯於營門中舉一隻㦸布言諸軍觀布射㦸小支一發中者諸君當觧去不中可留鬭布舉弓射㦸正中支諸將皆驚言將軍天威也明日歡㑹然後各罷又曰張繡反襲太祖營太祖出戰不利典韋以長㦸左右撃之一义輙十餘􅀈音矛摧左右死傷者略盡韋被數十創短兵接戰賊前摶之韋雙挾兩㦸撃殺之餘賊不敢前又曰典韋好持大雙㦸與長刀軍中為之語曰帳下壯士有典軍持一雙㦸八十斤王沈魏書曰太祖討吕布於濮陽布有别屯在濮西相持太祖募隠陳典韋先占但持長矛撩㦸時西面反急韋左手持十餘㦸大呼起所抵無不應手倒者魚豢魏略曰徐庶字元直少好任俠為}
