  - {type: variant, offset: 760, length: 224, content: 八尺崇於戈四尺謂之三等殳長尋有四尺崇於人四尺謂之四等車戟常崇於殳四尺謂之五等酋矛常有四尺崇於戟四尺謂之六等又曰金有六齊四分其金而錫居一謂之戈戟之齊又曰戈廣二寸內倍之胡三之援四之鄭玄曰戈今勾子戟也或謂之雞鳴或謂之擁頸也已倨則不入已勾則不決長內則折前短內則不疾鄭玄曰戈勾兵也主於胡已倨謂胡微直而邪多以啄人則不入已勾謂胡曲多也以啄人則創不決前謂援也內長則援短援短則曲於罄折而於罄折則引之與胡並鉤內短則援長援長則倨於罄折倨於罄折則引之不疾又曰盧人為盧器戈祕, SBCK: 丈}
