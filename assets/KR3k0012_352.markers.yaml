  - {type: variant, offset: 1678, length: 282, content: 見子南欲殺之而取其妻子南知之執戈逐之及衝擊之以戈衝交道也子晢傷而歸告大夫曰我好見之不知其有異志故傷又曰晉平公有疾鄭伯使公孫僑如晉聘且問疾叔向問寡君之疾病卜人曰實沉臺駘為祟此何神也子產曰昔高辛氏有二子伯曰閼伯季曰實沈不相能也日尋干戈以相征討后帝不臧遷閼伯于啇丘主辰遷實沉于大夏主參又曰衛公孟縶狎齊豹公孟靈公兄也齊豹齊惡之子為衛司寇也奪之司寇與鄄公孟惡北宮喜禇師圃欲去之公子朝通于襄夫人宣姜懼而欲以作亂故齊豹北宮喜禇師圃公子朝作亂公孟有事於盖獲之門外有事祭也盖獲衛郭門也齊氏帷於門外而伏甲焉使祝鼃寘戈於車薪以當門華齊御公孟宗魯驂乘及閎齊氏用戈擊公孟宗魯以背蔽之中公孟肩, SBCK: 㦸}
