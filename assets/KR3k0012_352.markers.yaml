  - {type: variant, offset: 1540, length: 0, content: '', SBCK: 吕蒙舎會酒酣統乃以刀舞寧起曰能􅀟㦸舞蒙曰寧雖能未􅀂蒙之巧也因操刀持楯以身分之張勃吴録曰嚴白虎使弟輿詣長沙桓王請和許之輿請與王獨會面約旣㑹王引白削斫席輿體動王知其無能以手㦸投之立死蜀志曰兩鑲音孃是謂閇木户持􅀟㦸是謂坐鐵室也常璩華陽國志曰荆邯記公孫述曰昔漢祖敗而復征故能禽􅁗亡楚以弱爲強况今地方數千杖㦸百萬晉書曰賈后字南風􅀄爲太子妃性酷虐嘗手殺數人或以㦸擲孕妾子隨刃墮地帝聞之}
