  - {type: variant, offset: 1491, length: 3, content: 慶封好, WYG: 得十二焉非親子弟莫可使至齊者也又曰奉天子法駕迎皇帝代邸皇帝入未央宫有謁者十人持㦸衛端門曰天子在殿下何為者不得入又曰漢七年長樂宫成於是皇帝輦出房百官執㦸傳警引諸侯王以下至吏六百石以次奉駕又曰息夫躬云諸曹以下僕遬音速不足數卒有强弩圍城長㦸指闕陛下誰與備之又曰晁錯上言曰兩陣相近平地淺草可前可後此長㦸之地也劒楯三不當一又曰灌夫字仲儒父孟死吳軍夫奮曰願取吳王若將軍頭以報父仇於是夫被甲持㦸募軍中壯士所善願從數十人及出壁門莫敢前獨兩人及從奴十餘騎馳入吳軍至戲下所殺傷數十人又曰弦雄位不過執㦸又曰八月飲醻行祠孝昭廟是時霍氏外孫代郡太守任宣坐謀反誅宣子章為公車丞亡在渭城界中夜祛服入廟執㦸立廟門待上至欲為逆發覺伏誅後漢書曰光武署銚期為賊曹掾上畧地向北期從狥薊時王郎檄書到薊中起兵應郎光武趣駕出百姓聚觀諠呼滿道遮路不得行期騎馬奮㦸嗔目大呼左右曰䟆周禮𨽻僕掌䟆宫中之事鄭衆曰止行清道也若今警蹕說文䟆與蹕同衆皆披靡東觀漢記曰吳漢與蘇茂周建戰漢躬披甲持㦸告令諸部將曰聞鼓聲皆大呼俱進後至者斬遂鼔而進賊兵大破又曰建武四年隗囂遣馬援奏課京師因曰臣與公孫述同縣少小相善臣前往蜀述陛㦸乃見臣今臣逺從異方來陛下何以知臣非刺客奸人而簡易若是上大笑又曰}
