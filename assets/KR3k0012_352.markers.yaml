  - {type: variant, offset: 3100, length: 657, content: 經要義曰國君及元率戎車將在中央當鼓御者在左勇力之士執戈在後陸景典語曰戈刀雖備於執事而無所揚其鋒桓寬鹽鐵論曰匈奴處沙漠之中生不食之地如中國之麋鹿耳好事之臣求其義責之禮使中國干戈至今未息玄晏春秋曰七年春王正月乙酉予長七尺四寸矣未通史書與從姑子梁柳等擊壤于路或編荊為楯執荻為戈分陳相刺習兵共以為樂張騭文士傳摯虞荅策曰古之良臣受彤弓彫戈之錫銘之彝器貺之後昆曠世歷代以為賓榮豈無其物貴殊品地抱朴子曰虎狼見逼不揮戈奮劍而彈琴詠詩吾未見其身之可保也又曰荊卿朱亥不示小勇於怯弱之間孟賁馮婦不奮戈戟於貍豺之群山海經曰崑崙墟北有人曰太行伯把戈干寶搜神記曰有崔文子者學仙於子高子高化為白蜺而持藥文子文子驚怪引戈擊蜺中之因墮其藥俯而視之王子喬之尸也置之室中覆以弊筐須臾而化為大鳥開而視之飜飛而去梅陶在盆口與三公書蘇峻勇而無謀兵家所常弊也長廣人釋鋤犁執干戈何知戰法文選曰戈鋋彗雲又曰戈矛若林離騷曰操吳戈兮被犀甲車錯轂兮短兵接繁欽述征賦曰時三月之暮春逼干戈之急難王粲從軍詩曰摟船凌洪波尋戈刺群虜高貴鄉公詩曰干戈隨風靡武騎齊鴈行魏明帝堂上行曰武夫懷勇毅勒馬於中原干戈森若林長劍奮無前荀道雍猛虎行曰誥朝彈竹冠荷戈翦荒要應貞華覽曰萬夫決拾武騎齊足乘夷長森分行別屬弓不虛彎戈不茍撲傅毅西征頌曰慍昆夷之匪恊咸矯於戎事干戈動而後戢天將祚而隆化崔駰北征頌曰人事恊兮皇恩得金精揚兮水靈伏順天機兮把刑德戈所指兮罔不剋張協七命曰舉戈林竦揮鋒電滅仰傾雲巢俯殫地穴孔欣七誨曰攜同好命爪牙攝烏號杖雄戈緣山結網參雲張羅殷融議曰自頃多難國度屢空疋夫有重蠒之勞武王有執戈之勳, SBCK: 十二}
