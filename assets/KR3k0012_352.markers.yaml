  - {type: variant, offset: 2127, length: 374, content: 作亂也太史子餘曰非不利也將除害也又曰晉荀瑤帥師伐鄭荀瑤智伯也鄭駟弘請救于齊弘駟顓子陳成子救鄭及濮雨不涉成子衣製杖戈製雨衣也立于阪上馬不出者助之鞭之智伯聞之乃還畏其得眾心也曰我卜伐鄭不卜敵齊又曰衛良夫與太子剻聵入舍於孔氏之外圃錯入適伯姬氏既食孔伯姬仗戈而先太子與五人分輿猳從之分械甲也迫叔悝於廁強盟之孔氏專政故劫孔埋欲令逐輒漢書曰宣帝時美陽鼎獻之張敞好古文字案鼎銘勒而上議曰今鼎出於郊東中有刻書曰王命尸臣孟康曰尸主也官此㧦邑賜爾鸞旂黻琱戈尸臣拜手稽首竊以傳記言之鼎殆周之所以褒賜大臣也又曰武帝元鼎五年南越相呂嘉反遣歸義侯嚴為戈舡將軍張晏曰嚴故越人降義歸義侯越人於水中負醫醫人舡又有蛟龍之害故置戈於下因以為名也下離水晉書曰賈充傳云高貴鄉公之攻相府也充率眾拒戰於南闕軍將敗騎督成倅弟太子舍人濟問充曰今日之事當如何充謂曰公養汝等正擬今日復何疑濟於是抽戈犯蹕, WYG: 散走}
