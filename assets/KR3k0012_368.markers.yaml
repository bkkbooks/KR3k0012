  - {type: variant, offset: 1383, length: 1299, content: 梁王聞使娉焉乃授鏡操刀以割鼻曰妾所以不死者不忍幼嗣之重孤也刑餘之人殆可釋矣王高其節敬其身號曰梁高行又曰沛國孫去病妻同郡戴元世女夫死母欲嫁之操刀割鼻刀鈍不入趨於石上礪之鼻然後斷郡表其閭又曰梁郡夏文珪妻沛國劉景賓女亦割鼻自誓不嫁列女後傳曰吳孫奇妻者廣陵范慎女名姬十八配奇奇亡慎以姬少寡無子迎還其家姬不肯迎者以父命迫之姬遂操刀割鼻三輔故事曰衛太子嶽鼻太子來省疾至甘泉宮江充告太子勿入陛下有詔惡太子鼻嶽尚以紙蔽其鼻充語武帝曰太子不欲聞陛下膿臭故蔽鼻武帝怒太子太子走還崔寔政論曰秦割六國之君劓殺其民於是赭衣塞路有鼻者醜故百姓鳥驚獸駭不知所歸命王湛別傳曰王處冲身長八尺龍頰大鼻世說曰初謝安在東山居布衣時兄弟有富貴者劉夫人戲謂安曰大丈夫不當如此謝乃捉鼻曰但恐不免耳又曰石崇家造廁令婢以盤擎棗與廁人塞鼻又曰康僧淵目深而鼻高王丞每嘲之僧淵曰鼻者面之山山不高則不靈談藪曰宋廢帝常入武帝廟指其畫像曰此渠大好色不擇尊卑顧謂左右渠大鼻如何不齇即令畫工齇又曰齊世祖之征潁川也有皇甫王淵者善相人見其容止竊議曰此不作大物會是垂涕洟者謂太原公洋也崔玄瀨鄉記曰老子鼻雙柱養生經曰鼻者心之門頞說文曰頞鼻莖也頞烏葛切釋名曰頞鞍也偃折如鞍也史記曰唐舉謂蔡澤曰先生魋顏蹙齃殆不相乎後漢書曰周燮字伯彥初生顩頤折頞醜甚母欲弃之其父不聽曰吾聞賢聖多有異興我宗者乃此於是寶之顩玄撿切吴書曰諸葛恪字元遜瑾長子少知名少鬢眉折頞廣顙莊子曰髑髏深嚬蹙頞曰豈能捨南面王樂而為人生哉呂氏春秋曰文王好食昌葅孔子蹙頞而食之揚雄解嘲曰蔡澤山東匹夫也顩頤折頞涕唾流沫口說文曰口者人之所以言食釋名曰口空也禮曰曾子謂子思曰伋吾執親之喪也水漿不入於口者七日又曰晉人謂趙文子知人文子其中退然如不勝衣中身也退知柔貌其言吶吶然如不出諸其口吶吶舒小貌音如悅切又玉藻曰口容止不安動也又少儀曰燕侍食於君子數噍母為口容口容弄口噍才笑切又祭義曰惡言不出於口又緇衣曰小人溺於水君子溺於口口費而煩易出難悔易以溺人言口多空言且煩數也過言一出駟馬不能及不可得悔也口舌所覆亦如溺也傳曰鄭伯使許大夫百里奉許叔以居許東偏曰寡人有弟不能和協而使糊其口於四方其況能久有許乎又曰口不道忠信之言為囂又曰子玉使伯棼請戰曰非敢必有功也願以間執讒慝之口又曰晏子曰君民者豈以陵民社稷是主臣君者豈為口實社稷是養言君不徒居民上臣不徒求祿皆為社稷又曰正考父佐戴武宣三命滋益恭故其鼎銘云一命而僂再命而傴三命而俯饘於是粥於是以糊余口又曰費無極言於楚子曰建與伍奢將以方城之外叛王執伍奢使城父司馬奮陽殺太子未至而使遣之知太子冤故遣令去太子建奔宋王召奮陽奮陽使城父人執己以至王曰言出於余口入於爾耳誰告建也詩正月曰好言自口莠言自口莠丑也又十月之交曰無罪無辜讒口囂囂書序曰濟南伏生年過九十失其本經口以傳授又曰大禹謨曰惟口出好興戎朕言不再好謂賞善戎謂伐惡言口榮辱之主慮而言宣也戎於一也又盤庚上曰相時憸民猶胥顧于箴言其發有逸口言憸利小人尚相顧於箴悔之言恐君其發動有過口之患也又說命曰惟口起羞易說卦曰兌為口論語公冶長曰或曰雍也仁而不佞子曰禦人以口給屢憎於人又陽貨曰惡利口之覆邦家者公子翬謟于隱公謂隱公曰百姓安子諸侯說子盍終為君矣隱公曰否使脩菟裘吾將, SBCK: ''}
