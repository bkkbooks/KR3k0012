  - {type: variant, offset: 2418, length: 535, content: 至而使遣之知太子冤故遣令去太子建奔宋王召奮陽奮陽使城父人執己以至王曰言出於余口入於爾耳誰告建也詩正月曰好言自口莠言自口莠丑也又十月之交曰無罪無辜讒口囂囂書序曰濟南伏生年過九十失其本經口以傳授又曰大禹謨曰惟口出好興戎朕言不再好謂賞善戎謂伐惡言口榮辱之主慮而言宣也戎於一也又盤庚上曰相時憸民猶胥顧于箴言其發有逸口言憸利小人尚相顧於箴悔之言恐君其發動有過口之患也又說命曰惟口起羞易說卦曰兌為口論語公冶長曰或曰雍也仁而不佞子曰禦人以口給屢憎於人又陽貨曰惡利口之覆邦家者公子翬謟于隱公謂隱公曰百姓安子諸侯說子盍終為君矣隱公曰否使脩菟裘吾將老焉公子翬恐若其言聞于桓於是謂桓公曰吾為子口隱矣孝經援神契曰舜大口又曰孔子海口言若含澤論語擇輔像曰子貢斗星繞口南容升又曰太公大口鼻有伏藏史記曰周厲王得衛巫使監謗者以告則殺之其謗鮮矣王喜告召公吾能弭謗矣召公曰是障之也防民之口甚於防水水壅而潰傷人必多民亦如之民之有口也猶土之有山川也財用於是乎出猶其有原隰衍沃也衣食於是乎生口之宣言也善敗於是乎興行善而備敗所以產則用衣食者也夫民慮之於心而宣之於口成而行之若壅其口其與能幾何王不聽於是國人莫敢出言又曰季桓子受齊女樂三日不聽政又不致膰俎於大夫膰音煩孔子遂行而師己送曰夫子則非罪孔子曰吾歌可夫歌曰彼婦之口, WYG: ''}
