  - {type: variant, offset: 4333, length: 2, content: 賓就, WYG: 子陽生立之將盟遂誣曰鮑子之命也鮑子曰汝忘君之孺子牛而折其齒乎孺子荼也景公常啣䋲為牛使荼牽之恭湏地救折其齒也詩碩人曰齒如瓠犀又閟宫曰既多受祉黄髮兒齒公羊傳荘公曰仇牧聞閔公弑趨而至遇之于門手劒而比之宋萬臂殺仇牧碎其首齒著乎門闔春秋元命苞曰武王駢齒是謂剛强取象叅房誅害以従天心宋均注曰房為明堂主布政叅為大辰主}
