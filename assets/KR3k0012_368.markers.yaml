  - {type: variant, offset: 4141, length: 2, content: 平原, SBCK: 越王勾踐曰􅀌常不料力與吴戰困於㑹稽日夜焦脣乾舌徒欲與吴王接踵而死漢書曰張湯與顔異有􅂩人有告異以他議事下湯治異云異與客語客云􅀄令下有不便者異不應徴反脣湯奏異九卿見令不便不入言而腹非論死自是後有腹非之法又薛宣􅀓曰􅀶士申咸毀丞相宣家行不足宣子况賕音求客楊明斫咸宫門外申斷鼻脣況坐從宣免爲庻人王隱晉書曰寒儁傳曰劉升龍須昌人赤色文脣少言語有大志自縣小吏至雍州刺史梁書曰侯景僭位入登太極殿其徒數萬吹脣唱吼而上莊子曰孔子謂盗跖曰將軍脣如激丹淮南子􅀃山曰孕見兎而子缺脣見麋而四目物固有然不然也賈􅁩曰沸脣投塞垣之下匈奴號也通俗文曰脣不覆齒謂之齖音牙䶥祖家切廣志曰赤口濮嶃其脣以丹飾之瀬郷記李母碑曰老}
  - {type: page-break, offset: 4141, content: '', id: KR3k0012_SBCK_368-2a}
  - {type: variant, offset: 4141, length: 7, content: 平原君既已定從, WYG: 越王勾踐曰孤常不料力與吴戰困于㑹稽日夜焦唇乾舌徒欲與吴王接踵}
  - {type: variant, offset: 4141, length: 2, content: 平原, krp: 越王勾踐曰孤常不料力與吴戰困於㑹稽日夜焦脣乾舌徒欲與吴王接踵而死漢書曰張湯與顔異有隙人有告異以他議事下湯治異云異與客語客云𥘉令下有不便者異不應徴反脣湯奏異九卿見令不便不入言而腹非論死自是後有腹非之法又薛宣傳曰博士申咸毀丞相宣家行不足宣子况賕音求客楊明斫咸宫門外申斷鼻脣況坐從宣免爲庻人王隱晉書曰寒儁傳曰劉升龍須昌人赤色文脣少言語有大志自縣小吏至雍州刺史梁書曰侯景僭位入登太極殿其徒數萬吹脣唱吼而上莊子曰孔子謂盗跖曰將軍脣如激丹淮南子說山曰孕見兎而子缺脣見麋而四目物固有然不然也賈誼曰沸脣投塞垣之下匈奴號也通俗文曰脣不覆齒謂之齖音牙䶥祖家切廣志曰赤口濮嶃其脣以丹飾之瀬郷記李母碑曰老}
  - {type: variant, offset: 4144, length: 8, content: 既已定從而歸至於, SBCK: 厚脣}
