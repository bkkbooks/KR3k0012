  - {type: variant, offset: 4711, length: 0, content: '', krp: 䇿曰静郭君善昆辨昆辯多疵門下不恱孟嘗君以諌静郭君大怒舎之上舎令長子御旦暮進食威王薨宣王立太子不善静郭君辭之薛昆辯至齊見宣王王曰子静郭君所聽愛者乎曰愛即有之聽即無有王之爲太子辯謂静郭君曰太子相不仁過頥豕眎若是法背父不若廢太子更立衛姬子嬰兒郭師静郭君泣而曰不可吾弗忍爲聽辨而爲之必無今患矣宣王曰寡人殊不知此乃迎静郭君史記曰黄歇上書秦王曰本國殘社稷壞刳腹結膓折頸摺頥摺盧合切又曰蔡澤顩頥顩五撿切漢書曰王莽蹙頥范曄後漢書曰班超字仲升爲人大志不脩小節甞行詣相者相者曰祭酒布衣諸生而當封侯萬里之外超問}
  - {type: variant, offset: 4712, length: 4, content: 人反舌一, SBCK: 喉愚夫不爲也僕頗別菽麥哉唐書}
