  - {type: variant, offset: 4758, length: 0, content: '', SBCK: 蜀郡史賢妻張昭儀賢旣犯罪􅀍誅儀取刀自割咽喉而死物理論曰咽喉生之要孔黄帝素問曰喉主天氣咽主地氣頥頷釋名曰頥或曰輔車其骨強所以輔持其口或曰牙車牙所載也或曰頷車頷含也韓詩曰有美一人碩大且㜝薛君曰㜝重頥也五檢切周易噬嗑卦曰頥中有物曰噬嗑又頥卦曰頥貞􅁻觀頥自求口實春秋元命苞曰后稷歧頥自求是謂好農盖象角元載土食榖宋均注曰面皮有二象也頥面爲下部下部爲地巧於利也戰國䇿曰静郭君善昆辨昆辯多疵門下不恱孟嘗君以諌静郭君大怒舎之上舎令長子御旦暮進食威王薨宣王立太子不善静郭君辭之薛昆辯至齊見宣王王曰子静郭君所聽愛者乎曰愛即有之聽即無有王之爲太子辯謂静郭君曰太子相不仁過頥豕眎􅀂是法背父不􅀂廢太子更立衛􅁎子嬰兒郭師静郭君泣而曰不可吾弗忍爲聽辨而爲之必無今患矣宣王曰寡人殊不知此乃迎静郭君史記曰黄歇上書秦王曰本國殘社稷壞刳腹結膓折頸摺頥摺盧合切又曰蔡澤顩頥顩五撿切漢書曰王莽蹙頥范曄後漢書曰班超字仲升爲人大志不脩小節甞行詣相者相者曰􅀕酒布衣諸生而當封侯萬里之外超問其􅃺相者曰生䴏頷虎頭飛而肉食此萬里侯相也江表傳曰孫權方頥大口三國略曰徐之才年十三劉孝綽見之言曰徐郎鷰頷班超之相也帝系曰帝嚳方頥莊子曰支疏頥隠於齊又曰孔子遊緇惟之林弦歌鼓琴奏曲未半有漁父下舡而來􅂡眉交白􅀍髮揄􅃑行原而上距陸而止左手據膝右手持頥以聽之}
