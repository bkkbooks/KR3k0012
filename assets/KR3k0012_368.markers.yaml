  - {type: variant, offset: 4275, length: 0, content: '', SBCK: 荼牽之荼頓地折其齒也詩碩人曰齒如瓠犀又閟宫曰旣受多祉黄髪兒齒公羊傳莊公曰仇牧聞閔公弑趨而至遇之于門手劒而叱之宋萬臂榝仇牧碎其首齒著乎門闔側手曰假􅀽葛切春秋元命苞曰武王駢齒是謂剛強取象叅房誅害以從天心宋均注曰房爲明堂主布政參爲大辰主斬刈兼此二}
