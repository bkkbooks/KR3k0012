  - {type: variant, offset: 4712, length: 0, content: '', WYG: 状相者曰生燕頷虎頭飛而肉食此萬里侯相也江表傳曰孫權方頤大口三國畧曰徐之才年十三劉孝綽見之言曰徐郎燕頷班超之相也帝系曰帝嚳方頤荘子曰支䟽頤隠於齊又曰孔子逰緇帷之林弦歌鼓琴奏曲未半有漁父刺船而来鬚眉交白被髮揄袂行原而上距陸而止左手據膝右手持頤以聴之韓子喻老曰白公勝慮罷朝杖䇿鍜貫頤而血流至地而弗知鄭}
