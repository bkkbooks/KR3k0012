  - {type: variant, offset: 4149, length: 155, content: 歸至於趙曰今毛生以三寸之舌強於百萬之師又曰留侯曰今以三寸之舌為帝者師封萬戶位列侯此布衣之極於良足也又曰張儀常從楚相飲已而失璧門下意儀盜璧共執掠笞數百不服釋之其妻曰嘻子無讀書遊說安此辱乎儀張口謂其妻曰視吾舌尚在否妻曰君舌在也儀曰足矣又曰郭解任俠有儒生侍使者坐客譽郭解生曰郭解專以奸犯法公何謂賢解客聞之殺此生斷其舌, WYG: 死}
