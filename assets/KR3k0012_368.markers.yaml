  - {type: variant, offset: 4711, length: 0, content: '', WYG: 策曰静郭君善昆辨昆辨多疵門下不恱孟嘗君以諌静郭君大怒含之上舍令長子御旦暮進食威王薨宣王立太子不善静郭君辭之薛昆辨至齊見宣王王子曰子静郭君所聴愛者乎曰愛即有之聽即無有王之為太子辨謂静郭君曰太子相不仁過頤豕若是法背父不若廢太子更立衛姬子嬰兒杸師静君泣而曰不可吾弗忍為聽辨而為之必無今患矣宣王曰寡人殊不知此乃迎静郭君史記曰黄歇上書秦王曰本國殘社稷刳腹結膓折頸摺頤又曰蔡澤顩頤漢書曰王莽蹙頤范曄後漢書曰班超字仲升為人大志不修小節嘗行詣相者相者曰祭酒布衣諸生而當封侯萬里之外超問}
