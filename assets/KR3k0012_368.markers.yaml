  - {type: variant, offset: 4307, length: 1, content: 蒯, WYG: 張湯與顔異有隙人有告異以他議事下湯治異云異與客語客云初令下有不便者異不應㣲反唇湯奏異九卿見令不便不入言而腹非論死自是後有腹非之法又薛宣傳曰博士申咸毁丞相宣家行不足宣子况賕客楊明斫咸宫門外斷鼻唇况坐従宣免為庶人王隠晉書載寒雋傳曰列升龍湏昌人赤色文唇少言語有大志自縣小吏至雍州刺史梁書曰侯景僣位入登太極殿其徒數萬吹唇唱吼而上荘子曰孔子謂盗跖曰將軍唇如􅈭丹淮南子說山曰孕見兎而子缺唇見麋而四目物固有然有不然也賈誼曰沸唇投塞垣下匈奴號也}
