  - {type: variant, offset: 4710, length: 0, content: '', krp: 尚書陛下之喉舌魏志曰樂陵王茂兄東平王薨茂稱咽病不肯發哀詔削户蜀志曰彭與葛亮書曰先民有言左手據天下之圖右手扼其喉愚夫不爲也僕頗別菽麥哉唐書曰幽州朱融鎮州王庭湊叛東川節度王涯獻書曰臣聞用兵若鬪先扼其喉今瀛莫易定兩賊之咽喉也誠冝假之威柄戍以重兵俾其死生不相知間諜無所入而以大軍先進兾趙次臨井陘此一舉萬全之勢也抱朴子曰焦喉之渇遥指滄海列女傳曰齊鍾離春者宣王后也極醜卭鼻結喉益部耆舊傳曰犍爲楊鳯珪者其妻陳姬珪早亡兄弟欲嫁之姬於是列刀割咽流血幾死九族驚異乃從其節又曰蜀郡史賢妻張昭儀賢旣犯罪𬒳誅儀取刀自割咽喉而死物理論曰咽喉生之要孔黄帝素問曰喉主天氣咽主地氣頥頷釋名曰頥或曰輔車其骨強所以輔持其口或曰牙車牙所載也或曰頷車頷含也韓詩曰有美一人碩大且㜝薛君曰㜝重頥也五檢切周易噬嗑卦曰頥中有物曰噬嗑又頥卦曰頥貞吉觀頥自求口實春秋元命苞曰后稷歧頥自求是謂好農盖象角元載土食榖宋均注曰面皮有二象也頥面爲下部下部爲地巧於利也戰}
