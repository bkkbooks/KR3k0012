  - {type: variant, offset: 4709, length: 0, content: '', WYG: 齒不相值也齼初舉反齒傷酢也齩午交反齧噬也齨音舅老人齒如臼也叚國沙州記曰國人年五十以上四齒皆落將由地寒多障氣也冀物志曰屠移在海外以草染齒因號黒齒袁子正書曰山梁氏泥於西屠而染其齒世說曰孫子荆少時欲隠語王武子曰吾當枕石潄流誤云潄石枕流王曰流非可枕石非可潄孫曰所以枕流欲洗其耳所以潄石欲礪其齒又曰王子猷詣謝𤣥林公先在坐王曰若林公髮鬢並全神情當復勝此否謝曰唇齒相湏不可偏亡琴操曰聶政父為韓王治劍過期不成王殺之時政未生及長入太山遇仙人學鼓琴漆身為癘吞炭為啞七年琴成入韓逢其妻従買櫛對妻而笑妻泣曰君何以似政乃入山援石擊落其齒楚辭曰美人皓齒嫮以姱臨海水土志曰夷州人俗語曰已嫁皆缺去前上一齒宋玉登徒子賦曰腰如束素齒如含貝司馬相如上林賦曰皓齒粲爛張協禊賦曰清哇發於素齒牙釋名曰牙植牙也随形言之也于寳晉紀曰賈庶人未害愍懐太子時有謡曰南風烈烈吹白沙千嵗髑髏生齒牙南風庶人名愍懐小名沙門三國典畧曰齊太上主生齻牙問於尚藥典御鄧宣以對太上主怒而撻之中書監徐之才拜賀曰此智牙生者聰明長夀太上恱而賞之喉咽說文曰咽嗌也喉嚨也釋名曰咽咽物也青徐謂之脰音豆物投其中受而下之也又謂之嗌音益氣所以通流阨要之處也傳曰敗狄于鹹獲長狄僑如富父終生舂其喉以戈殺之矣孝經鈎命决曰夫子輔喉史記曰孫子曰夫救鬭者不摶擑批亢𢷬虛形格勢禁則自為觧耳亢人喉也又曰貫髙聞赦張王乃曰所以不死者白張王不反今王已出吾責已塞死不恨矣且人臣而有簒弑之名何靣目復事上哉縦上不殺我不媿心乎乃仰絶吭而死韋昭曰吭咽也漢書曰人有上書言息夫躬懐怨恨非笑朝廷所進候星視天子吉㓙與巫共祝詛上遣侍御史廷尉監棣躬擊雒陽詔獄欲掠問躬仰天大謼火故反因僵仆吏就問云咽已絶後漢書曰霍諿為舅宋光被謡上書曰譬猶療饑於附子止渇於酖毒未入膓胃已絶喉咽豈可為哉又曰王青字公然青父隆建武初為都尉功曹青為小吏與父俱従都尉行縣道遇賊隆以身衛全都尉遂死為難青亦被矢貫咽又曰李固對詔曰陛下有尚書猶天之有北斗北斗天之喉}
