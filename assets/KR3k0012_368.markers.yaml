  - {type: variant, offset: 4708, length: 0, content: '', krp: 黒齒國爲人黒齒河圖矩起曰帝嚳駢齒宋均曰所以駢齒齒星位白虎通曰帝嚳駢齒上法曰叅秉度成紀以理隂陽抱朴子内篇曰或問堅齒之道荅曰養以華池漱以濃液永不動次則服靈非散旣脫更生楊泉物理論曰夫齒者年也身之寳也藏之斧鑿所以調諧五味以安性氣者也神仙傳曰老君䟽齒神仙服經曰服神丹三百歳齒化爲石王閎本事曰閎爲琅瑘太守張歩欲誅之閎出東武城門馬奔墮車折齒閎心惡移病歸府遂得免字林曰䶜牛於切齒不相值也齼𥘉舉切齒傷酢也齩午校切齧噬也齨老人齒如臼也齨音舅叚國沙州記曰國人年五十以上四齒皆落將由地寒多障氣也異物志曰屠移在海外以草染齒因號黒齒袁子正書曰山梁氏泥於西屠而染其齒丗說曰孫子荆少時欲隠語王武子曰吾當枕石漱流誤云漱石枕流王曰流非可枕石非可漱孫曰所以枕流欲洗其耳所以漱石欲礪其齒又曰王子猷詣謝玄林公先在坐王曰若林公髮鬢並全神情當復勝此不謝曰脣齒相須不可偏亡琴操曰聶政父爲韓王冶劒過期不成王殺之時政未生及長入太山遇仙人學鼓琴􅃮身爲厲吞炭變音七年琴成入韓逢其妻從買櫛對妻而笑妻泣曰君何以似政齒政乃入山援石擊落其齒楚辭曰美人皓齒嫮以姱臨海水土志曰夷州人俗女曰巳嫁皆缺去前上一齒宋玉登徒子賦曰腰如束素齒如含貝司馬相如上林賦曰皓齒粲爛張恊禊賦曰清哇發於素齒牙釋名曰牙植牙也隨形言之也干寳晉紀曰賈庻人未害慜懷太子時有謡曰南風烈烈吹白沙千歳髑髏生齒牙南風庻人名愍懷小名沙門三國典略曰齊太上主生齻音顚牙問於尚藥典御鄧宣以對太上主怒而撻之中書監徐之才拜賀曰此智牙生者聦明長壽太上恱而賞之喉咽說文曰咽嗌也喉嚨也釋名曰咽咽物也青徐謂之脰音豆物投其中受而下之也又謂之嗌音益氣所通流阨要之處也傳曰敗狄于鹹獲長狄僑如冨父終生舂其喉以戈殺之孝經鈎命決曰夫子輔喉史記曰孫子曰夫救鬪者不搏撠音㦸批亢擣虚形格勢禁則自爲解耳亢音剛又音抗人喉也又曰貫髙聞赦張王乃曰所以不死者白張王不}
  - {type: variant, offset: 4709, length: 0, content: '', SBCK: 今王巳出吾責巳塞死不恨矣且人臣有不簒弑之名何面目復事上哉縱上不殺我不媿心乎乃仰絶亢而死韋昭曰亢咽也漢書曰人有上書言息夫躬懷怨恨非􅀏朝廷所進候星􅀫視天子吉凶與巫共祝詛上遣侍御史廷尉􅁥逮躬繫雒陽詔獄欲掠問躬仰天大謼火故反因僵仆吏就問云咽已絶師古曰咽喉嚨也音一千反後漢書曰霍諿音緝爲舅宋光􅀍誣上書曰譬猶療飢於附子止渇於酖毒未入膓胃巳絶喉咽豈可爲哉又曰王青字公然靑父隆建武􅀄爲都尉功曹青爲小吏與父俱從都尉行縣道遇賊隆以身衛全都尉遂死於難青亦􅀍矢貫咽音聲流喝又曰李固對詔曰陛下有尚書猶天之有北斗北斗天之喉}
