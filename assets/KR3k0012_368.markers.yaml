  - {type: variant, offset: 111, length: 658, content: 咸其輔頰舌騰口說也又夬卦曰壯于頄有凶頄求龜切面權也又曰艮其輔言有序施止於輔以處於中故曰無擇言史記曰漢王聞魏豹反方東憂楚未及擊謂酈生曰緩頰往說魏豹能下之吾以萬戶封若又曰武帝元鼎六年定越地以為儋耳郡張晏曰儋耳其俗鏤其頰皮上連耳匡分為數支狀若雞腸又曰朱博入守左馮翊長陵大姓尚方禁少時嘗盜人妻見斫瘡著其頰博知以他事召見視其面果有瘢博辟左右問禁是何等瘡禁叩頭服狀博笑曰大丈夫固時有是以為耳目江表傳曰孫策殺吳郡太守許貢貢奴客潛民間欲報讎策出獵卒遇三人即貢客也射策中頰後騎尋至皆剌殺之王隱晉書曰大駕北伐成都王潁統王師於蕩陰敗績上傷頰失六璽左右奔走三國典略曰梁謝荅仁聞侯景奔乃自東陽率眾候之至錢塘間趙伯超曰公得何消息而閉門見拒伯超曰汝頰邊頞有耳否侯王已死遠近悉平君將此兵欲向何處荅仁曰審如公言死無所恨淮南子曰厭𩔁音父在頰則好在顏則醜王子年拾遺錄曰孫和月下舞水精如意悞傷鄧夫人頰血流婉轉彌苦及差而滅左頰有赤點如誌迫而視之更益妍也諸嬖欲寵者皆以丹脂點頰而後進幸唐子曰人多遠見百步而不自知眉頰蔣齊萬機語曰許子將褒貶不平以拔樊子昭而抑許文休劉曄曰子昭發自賈豎年至耳順退能守靜進能不茍濟荅曰子昭誠自長幼完潔然觀其搖牙樹頰自非文休敵也世說曰郄公遭永嘉喪亂窮餒鄉人共餉之公嘗攜兄子外生周翼二小兒往食鄉人曰各自窮餒以君之賢共存君耳恐不能兼餉公於是獨往食輒含飯著兩頰還吐與二小兒後並得存過江公亡翼時為剡縣解職歸席苫於公靈床頭心喪三年鼻釋名曰鼻嘒也出氣嘒嘒也公羊傳僖公曰邾婁人執鄫子用之社蓋叩其鼻以血社也孝經援神契曰伏羲山準禹虎鼻史記范睢傳曰蔡澤遊學于, SBCK: ''}
