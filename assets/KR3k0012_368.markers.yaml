  - {type: variant, offset: 4710, length: 1, content: 國, SBCK: 尚書陛下之喉舌魏志曰樂陵王茂兄東平王薨茂稱咽病不肯發哀詔削户蜀志曰彭與􅁑亮書曰先民有言左手據天下之圖右手扼}
  - {type: variant, offset: 4710, length: 0, content: '', WYG: 尚書陛下之喉舌魏志曰樂陵王茂兄東平王薨茂稱咽病不肯發哀詔削户蜀志曰彭羕與諸葛亮書曰先民有言左手據天下之圖右手扼其喉愚夫不為唐書曰幽州朱克融鎮州王庭湊反東川節度王涯獻書曰臣聞用兵若鬭先扼其喉今瀛莫易定兩賊之咽喉也誠宜假之威柄戍以重兵俾其死生不相知間諜無所入而以大軍先進冀趙次臨井陘此一舉萬全之勢也抱朴子曰焦喉之渇遥指滄海列女傳曰齊鍾離春者宣王后也極醜卭鼻結喉益都耆舊傳曰犍為楊鳯珪者其妻陳姬珪早亡兄弟欲嫁之姬於是引刀割咽流血幾死九族驚異乃従其節又曰蜀郡史賢妻張昭儀賢既犯罪被誅儀取刀自割咽喉而死物理論曰咽喉生之要孔黄帝素問曰喉主天氣咽主地氣頥頷釋名曰頤或曰輔車其骨强所以輔持其口或曰牙車牙所載也或曰頷車頷含也韓詩曰有美一人碩大且㜝薛君曰㜝重頤也五檢反周易噬嗑卦曰頤中有物曰噬嗑又頤卦曰頤貞吉觀頤自求口食春秋元命苞曰后稷岐頤自求是謂好農盖象角元載土食榖宋均注曰靣皮二象也頤靣為下部下部為地巧于利也戰}
