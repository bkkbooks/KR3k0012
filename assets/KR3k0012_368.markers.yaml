  - {type: variant, offset: 2890, length: 1175, content: 王不聽於是國人莫敢出言又曰季桓子受齊女樂三日不聽政又不致膰俎於大夫膰音煩孔子遂行而師己送曰夫子則非罪孔子曰吾歌可夫歌曰彼婦之口可以出走彼婦之謁可以死敗言婦人之口請謂是以憂使死人敗故可以出走也又曰鄧公曰吳王為反數十年矣發怒於削地以誅晁錯為名其意非在錯也且恐天下之士噤口不敢復言漢書曰漢王擊魏豹謂酈食其曰魏大將者其人為誰曰柏直也漢王曰是口尚乳臭又曰高祖欲廢太子周昌諫曰臣口不能言心知不可又曰良藥苦口利於病又曰張蒼免相後口無齒食乳女子為乳母又曰條侯周亞夫相曰從理入口法餓死又曰揚雄口吃不能劇談又曰王莽為人哆口哆唱者切東觀漢記曰光武為人日角大口美須眉又曰明德馬后身長七尺三寸青白色方口美髮後漢書曰馬援在交阯還書戒兄子曰龍伯高敦厚周慎口無擇言謙約節儉廉公有威吾愛之重之應劭漢官曰侍中乃存年老口臭帝賜以雞舌香令含之江表傳曰孫堅為下邳丞時孫權生而方頤大口目有精光堅異之以為貴象燕書曰申弼烈祖常從容問諸侍臣曰夫口以下動乃能制物鈇鑽為用亦噬嗑之意而從上下何也弼荅曰口之下動上使下也鈇鑽之用上斬下也烈祖稱善南史曰謝朏出為吳興郡守與弟淪於征虜渚送別朏指淪口曰此中唯宜飲酒唐書曰郝處俊孫象賢垂拱中坐事伏法臨刑言多不順自此法司每將殺人也必先以木丸塞口又曰杜黃裳性雅澹寬恕心雖從長口不忤物老子曰五味令人口爽管子曰桓公與管仲謀伐莒未發已聞於國東郭郵至公問之子曰言伐莒乎東郭曰君子善謀小人善意目視二君在堂上口開不合言莒也莊子曰公孫龍口呿而不合舌舉不下鬼谷子曰口者機開也所以開閉情意也又曰口可以食不可以言周生烈子曰口者言之門河圖曰秦始皇虎口日角陸賈新語曰眾口所毀浮石沉木群邪相抑以曲為直說苑曰口者開也舌者機也出言不審駟馬不能追也吴越春秋曰越王勾踐入臣於吳吳王病大便太宰嚭奉溲惡以出勾踐嘗之後病口臭范蠡令左右食苓草以亂其氣曹瞞別傳曰操遨遊無度其叔數語其父操後行逢叔於道陽敗面為口云中暴風叔告其父父呼見之操面如故從此叔言不復入信操益得縱恣為王也杜如體論曰束脩之業其上在於不言諺曰口如鼻至老不失傅子曰擬金人銘作口銘云神以感通心由口宣福生有兆禍來有端情莫多妄口莫多言蟻孔潰河溜穴傾山病從口入禍從口出存亡之機開闔之術口與心謀安危之源樞機之發榮辱存焉王子年拾遺錄曰昔伯禹入穴乃至一室裏一人身如虵鱗於石上口吐一王簡以受禹簡長十二寸以量度天地又曰始皇二年謇消國善畫工者名烈裔口含丹墨噴壁即成龍雲之隊又曰沐胥國人年九萬歲以口噴水為雨紛漫數十里俄而口吹為風而雨皆止瀨鄉記李母碑曰老子方口養生經曰軍營之中有甘泉注云軍營口也甘泉唾也又曰口為華池相書曰大容手赤如丹貴壽又曰欲知人多舌當視其口如鳥喙言語皆藂此多舌人也談藪曰梁高祖重陳郡謝玄暉詩常曰不讀謝詩三日覺曰臭舌釋名曰舌洩也舒洩所當言也詩雨無正曰哀哉不能言匪舌是出維躬是悴又曰婦有長舌維厲之階又抑曰莫捫朕舌言不可逝矣論語顏淵曰子貢曰惜乎夫子之說君子也駟不及舌, SBCK: 爲}
