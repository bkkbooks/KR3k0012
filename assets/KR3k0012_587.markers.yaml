  - {type: variant, offset: 3263, length: 2, content: 吟詠, SBCK: 臨渦賦曰余從上拜墳乗馬過水相佯髙樹之下駐馬書鞭爲臨渦賦丗􅀃曰左思字太冲齊國臨淄人也作三都賦十年乃成門庭户席皆置筆硯遇得一句即便䟽之賦成時人皆有譏訾思意甚不愜後示張華華曰此二京可三然君又未重於丗冝以示髙名之士思乃請序皇甫謐謐見之嗟漢遂爲作序於是先相訾者莫不斂袵讃述焉陸機入洛欲爲此賦聞思作之撫掌而􅀏與第雲書此聞有傖父欲作三都賦湏其成當以覆酒瓮耳及思賦出機絶歎服以爲}
  - {type: variant, offset: 3263, length: 2, content: 吟詠, WYG: 臨渦賦序曰余從上拜墳乘馬過水相徉髙樹之下駐馬書鞭為臨渦賦世說曰左思字太冲齊國臨淄人也作三都賦十年乃成門庭户席皆置筆硯遇得一句即便䟽之賦成時人大有譏訾思意甚不愜後示張華華曰此二京可三然君文未重於世宜以示髙明之士思乃請序皇甫謐謐見之嗟嘆遂為作序於是先相訾者莫不歛袵賛述焉陸機入洛欲為此賦聞思作之拊掌而笑與弟雲書此間有傖父欲作三都賦須其成當以覆酒瓮耳及思賦出機絶歎服以為}
