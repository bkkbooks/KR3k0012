  - {type: variant, offset: 1652, length: 263, content: 奢侈殺人以立威其臣龔壯作詩七篇託言應璩以諷壽壽報曰省詩知意若今人所作時賢之話言也古人所作死鬼之常辭耳又曰桓玄既篡欲引用孟昶問其人於劉邁邁曰臣在京口不聞昶有異能但父子紛紛更相贈詩爾玄笑之而止宋書曰顏延之與陳郡謝靈運共以詞彩齊名而遟速懸絕文帝嘗各勑擬樂府北上篇延之受詔便成靈運久之乃就延之嘗問鮑昭己與靈運優劣昭曰謝五言如初發芙蓉自然可愛君詩若鋪錦列繡彫繪滿眼鍾嶸詩評云靈運詩其原出於陳思雅有景陽之體嶸謂若人學多才博寓目輒書內無文思外無遺物其繁且富宜哉然名章秀句處處間起妙曲新聲駱驛奔發類青松拔木白玉映竹未足以貶高才也又曰謝惠連方明, SBCK: 逸}
