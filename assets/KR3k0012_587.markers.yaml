  - {type: variant, offset: 871, length: 640, content: 歌永言古有採詩之官王者以知得失古詩之四言者振鷺于飛是也漢郊廟歌多用之五言者誰謂雀無角何以穿我屋是也樂府亦用之六言者我姑酌彼金罍是也樂府亦用之七言者交交黃鳥止于桑是也於俳諧倡樂世用之古詩之九言者浻酌彼行潦浥此注茲是也不入歌謠之章故世希為之夫詩雖以情志為本而以聲成為節顏延之庭誥曰荀爽云詩者古之歌章然則雅誦之樂篇全矣是以後之詩者率以歌為名及秦勒望岳漢祀郊宮辭著前史者文變之高制也雖雅聲未至弘麗難追矣逮李陵眾作揔雜不類是假託非盡陵制至其善篇有足悲者摯虞文論足稱優洽柏梁以來繼作非一纂所至七言而已九言不見者將由聲度闡誕不恊金石至於五言流靡則劉楨張華四言側密則張衡王粲若夫陳思王可謂兼之矣鍾嶸詩評曰古詩李陵班婕妤曹植劉楨王粲阮藉陸機潘岳張恊左思謝靈運等十二人詩皆上品曹植詩其原出於國風其骨氣高奇辭彩華茂情兼雅怨體備文質粲然逸古卓爾不群嗟乎陳思之文章也譬人倫之有周孔鱗羽之有龍鳳音樂之有笙竽女工之有黼黻若孔子之門用文則公幹升堂思王入室王陽潘陸自可坐於廊廡之間劉楨文體出於古詩伏氣愛奇動多震絕楨骨氣凌霜高風跨俗但氣過其文彫潤恨少然自陳思已往楨稱獨步張恊字景陽詩其原出於王粲文章華靜實少病累又巧構形似之言雄於潘岳靡於太冲風流調遠實曠代之高才其辭彩蔥蒨音韻鏗鏘使人味之亹亹不倦阮籍詩其原出於小雅雖無彫斲之巧而詠懷之作可以陶性靈發幽致言在耳目之內情寄八荒之表洋洋乎會於風雅矣陶潛詩其原出於應璩又恊左思風力文體省淨殆無長語篤意真古辭興婉媚至如歡言酌春酒日暮天無雲風華清靡豈直田家語邪古今隱逸詩之宗也漢書, krp: ''}
