  - {type: variant, offset: 4, length: 0, content: '', SBCK: 人之賦麗以則辭人之賦麗以􅁋如孔氏之門用賦也則賈􅁩登堂相如入室矣又曰上令王褒與張子僑等並待詔數從遊獵所幸宫館輙爲歌頌苐其髙下以差賜帛議者多爲滛靡不急上曰不有􅀶弈者乎爲之猶賢乎巳辭賦大者與古詩同義小者辨麗可嘉如女工有綺縠音樂有鄭衛今世俗猶皆以此娯􅀃耳目辭賦比之尚有仁義風諭鳥獸草木多聞之觀賢於倡優􅀶弈逺矣又曰武帝以安車徴枚乗孽子臯母爲小妻乗之東歸也臯母不肯隨乗乗怒留臯與母居年十七上書自陳枚乗之子上得大喜召入詔使賦平樂館善之拜爲郎臯不通經術談􅀏􅀋徘倡爲賦頌好慢戯以故得渫黷貴幸比東方朔郭舎人等武帝春秋二十九乃得皇太子群臣喜故臯與東方朔皇太子生賦臯爲文疾受詔輙成司馬相如善爲文而遟故所作少又曰上讀司馬相如子虚賦善之乃召相如相如曰此乃諸侯之事未足觀請爲天子遊獵之賦上令尚書給笔札相如以子虚虚言也爲楚烏有先生者烏有此事爲難亡是也欲明天子之義故虚籍此三人爲辭以推天子諸侯之苑囿其卒歸於節儉因以諷諌天子天子大恱時上好神仙相如又奏大人賦天子大恱飄飄有凌雲之氣游天地之間意又曰趙昭儀方大幸每上幸甘泉常從在屬車間豹尾中故楊雄盛言車􅀐之衆叅麗之駕非所以感動天地逆􅁵三神又言屏玉女却宓妃以懲齊戒之事賦成奏之天子異焉先是時蜀有司馬相如作賦甚弘麗温雅雄心壯之毎作賦常擬以爲式後漢書曰王延壽字文考少遊魯國作靈光殿賦後蔡邕亦造此賦未成及見延壽所爲甚竒之遂輟翰又曰李充字伯仁以以文章顯名賈逵薦充召詣東觀受詔作賦拜蘭臺令史魏志曰陳思王植太祖常視其文曰汝倩人耳植跪曰出言爲論下筆成篇固當面試時鄴銅雀臺新成太祖悉將諸子登使名賦植賦援筆立成太祖甚異之呉書曰張紘作柵瘤枕賦陳琳在北見之以示人曰此吾郷里張子紘所作也後紘見琳武庫賦應機論與琳書歎羙之琳荅曰自僕在河北與天下隔此間率少於文章易爲雄伯故僕受此過羙之談非其實也今景在此足下子布在彼所謂小巫見大巫神氣盡矣魏畧曰卞蘭獻賦賛述太子德羙太子報曰作者不虚其辭受者必當其實蘭此豈吾實哉昔吾丘壽王一陳寳鼎何武等徒以歌頌猶受金帛之賜蘭事雖不諒義足嘉也今賜牛一頭又曰邯鄲淳作投壷賦奏之文帝以爲工賜絹千疋晉書曰孫綽絶重張衡左思賦云三都二京六經之皷吹也甞作天台山賦辭致甚工􅀄成以示友人范榮期云卿試擲地當作金石聲也榮期曰恐此金石非中宫啇然每至佳句輙云應是我軰語又曰桓温欲經緯中國以河南粗平將移都洛陽朝廷畏温不敢爲異而北土蕭條人情危懼孫綽上䟽言不可温見綽表不恱曰致意興公何不㝷君遂􅀄賦而知人家國事耶又曰頋愷字長康晋陵無錫人也􅀶學有才氣甞爲筝賦成謂人曰吾賦之比􅄞琴不賞者必當以後出相遺深識者亦當以髙竒見貴宋書曰謝莊字希逸仕爲太子中庶子時南平王鑠獻赤鸚鵡帝詔羣臣爲賦太子左衛率􅀽淑文冠當時作賦畢示莊及見莊賦歎曰江東無我卿當獨秀我􅀂無卿亦一時之傑遂隠其賦梁書曰張率爲待詔賦奏之甚見稱賞手勑荅曰相如工而不敏枚臯速而不工卿可謂兼二子於今之丗矣又曰沈衆字仲興好學有文詞仕梁爲太子舎人時武帝制千字詩衆因注解與陳謝景同時召見于文德殿帝命衆竹賦賦成奏之手勑荅曰卿文體翩翩可謂無忝尔祖北齊書曰劉晝舉秀才入京考䇿不第乃恨不學屬文方復緝綴辭藻言甚苦拙制一首賦以六合爲名自謂絶倫吟諷不輟乃歎曰儒者勞而少工見於斯矣我讀儒書二十餘年而荅䇿不第始學作文便得如是曽以此賦呈魏収収謂人曰賦名六合其愚巳甚及見其賦又愚於名唐書曰獲嘉主簿劉知幾著思慎賦以刺時鳯閤侍郎蘇味道李嶠見文相頋而歎曰陸機豪士之所不及也當今防身要道盡在此矣又曰文苑傳李華字遐叔善屬文與蘭陵蕭頴士友善華應進士時著含元殿賦萬餘言頴士見而賞之曰景福之上靈光之下後唐書曰李琪少􅀌貧苦學尤精於文賦昭宗時李谿父子以文學知名於時琪年十八九䄂賦一軸謁谿谿覽賦驚異倒履迎門因出琪啞鍾捧日等賦指尓謂琪曰予常患近年文士辭賦皆數句之後未見賦題吾子入句見題偶屬典麗吁可畏也琪由是以益知名也摯虞文章流別論曰賦者敷陳之稱古詩之流也前世爲賦者有孫卿屈原尚頗有古之詩義至宋玉則多淫浮之病矣楚詞之賦賦之善者也故楊子稱賦莫􅀷於離騷賈􅁩之作則屈原儔也祢衡傳曰黄祖時大㑹賔客人有献鸚鵡者祖舉巵酒於衡曰願先生賦之以娯佳賔衡攬笔而作文無加􅀧辝采甚麗}
