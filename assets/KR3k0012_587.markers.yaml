  - {type: variant, offset: 964, length: 1, content: 九, SBCK: 源始命賦之厥􅀄也秦丗不文頗有雜賦漢􅀄辭人循流而作陸賈扣其端賈􅁩振其緒枚馬洞其風王楊聘其勢臯朔以下品物畢圗繁積於宣時校閱於成丗進御之賦千有餘首討其源流信興楚而盛漢矣􅀂夫京殿苑獵述行叙志並體國經野義尚光大旣履端於唱序亦歸餘於惣詞序以建}
  - {type: variant, offset: 966, length: 7, content: 者浻酌彼行潦浥, SBCK: 首引情本詞以理篇冩送文勢觀夫荀結隠語事義自懷宋發誇談實始淫麗枚乗兎園舉要以㑹新相如上林繁􅀋以成艶賈􅁩鳥致辨於情理子淵洞簫窮變於聲貌孟堅兩都明絢以贍雅張衡二京迅拔宏冨子雲甘泉搆􅀷偉之風延壽靈光含飛動之勢凢}
