  - {type: variant, offset: 130, length: 721, content: 以言詩自王澤彌竭風人輟采春秋觀志以諷誦舊章酬酢以為賓榮吐納而成聲文逮楚國諷怨則離騷為剌秦王滅典亦造仙詩漢初四言韋孟首唱匡諫之義繼軌周人孝武愛文柏梁列韻嚴馬之徒屬詞無方至成帝品錄三百餘篇朝章國采亦云周備而詞人遣翰莫見五言所以李陵班婕見擬於前代按邵南行露始肇半章孺子滄浪亦有全曲暇豫優歌遠見春秋邪淫童謠近在成世閱時取徵則五言久矣又古詩佳麗或稱放叔其孤竹一篇則傅毅之詞比采而推固兩漢之作乎觀其結體散文直而不野宛轉附物惆悵切情實五言之冠冕也至於張衡怨篇清典可味仙詩綏歌雅有新聲暨建安之初五言騰踴文帝陳思縱轡以聘節王徐應對望路而爭驅並鄰風月狎池苑述思榮序酣宴慷慨以任氣磊落以使才造懷指事不求纖密之巧驅詞逐貌唯取昭晣之能此其所用也及正始明道詩雜仙心何晏之徒率多浮淺唯嵇志清峻阮旨遙深若乃應璩百一獨立不懼詞譎義具魏之遺直也晉世群才稍入輕綺張左潘陸比肩詩衢采縟於正始力柔於建安或折文以為武或流靡以自研此其大略也江左篇製溺於玄風羞笑徇務之志崇盛忘機之談袁孫已下雖各有雕采而詞趣一揆莫與爭雄所以景純仙篇挺拔而為儁也宋初文詠體有因革嚴老告退而山水方滋儷采百家之偶爭價一句之奇情必極貌以寫物必窮力而追新此近代之所竟也故鋪觀列代而情變之數可鑒撮舉同異而綱領之要可明矣若夫四言正體則雅潤為本五言流調則清麗居宗華實異用惟才所安故平子得其雅叔夜合其潤茂先擬其清景陽振其麗若兼善則子建仲宣徧美則太冲公幹然詩有恒裁思無定位隨性適分鮮能圓通若妙識所難其易也將至忽以為易其難也方來矣至於三六雜言則出自篇什離合之發則萌於啚讖迴文所興則道原為始聯句共韻則柏梁餘製巨細或殊情理同致總歸詩囿故不繁云列子曰堯微服遊於康衢聞兒童謠曰立我蒸民莫匪爾極不識不知順帝之則堯問曰孰教爾為此言童兒曰我聞之, SBCK: 爲}
