  - {type: variant, offset: 2121, length: 257, content: 沙漠靜妖氛帝大悅曰獯獫陸梁未時款塞卿言有驗國之福也又曰齊蕭愨字仁祖為太子洗馬嘗於秋夜賦詩其兩句云芙蓉露下落楊柳月中踈曰蕭仁祖之斯文可謂雕章間出昔潘陸齊軌不襲建安之風顏謝同聲遂革太乙之氣自漢逮晉情賞猶自不諧河北江南意製本應相詭顏黃門云吾愛其蕭散宛然在目而盧思道之徒雅所不愜箕畢殊好理宜固然又曰王睎為常山王司馬睎恬憺寡欲不以世務為累時謂之方叔司馬常遊晉祠賦詩曰日落應歸去魚鳥見留連時常山王遣使召睎睎不時至明日承相西閤祭酒盧思道問睎昨已朱顏得無魚鳥致怪乎睎笑曰昨陶然以酒被責卿輩亦是留連之一物豈直魚鳥而已哉又曰辛德源嘗於, SBCK: 昇}
