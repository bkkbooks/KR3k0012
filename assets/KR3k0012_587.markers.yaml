  - {type: variant, offset: 2427, length: 290, content: 五言詩七百字贈番州剌史薛道衡詞氣宏拔風韻秀出亦為一時盛作未幾而卒道衡歎曰人之將死其言也善豈若是乎唐書文苑傳曰元萬頃乾封中從英國公李勣征高麗為遼東道管記時別帥馮本以水軍援禆將郭封舡破失期封欲作書與勣恐高麗知其救兵不至乘危迫之乃令萬頃作離合詩贈勣勣不達其意大怒曰軍機急切何用詩為必斬之萬頃解釋之乃止又曰錢起能五言詩初從鄉薦家寄江湖嘗於客舍月夜獨吟遽聞人吟於廷曰曲終人不見江上數峰青起愕然懾衣視之無所見矣以為鬼怪而志之及起就試之年李暐所試湘靈鼓瑟詩題中有青字起即以鬼謠十字為落句暐深嘉之稱為絕唱是歲登第又曰元稹聰警絕人年少有才名與太原白居易為友工為詩善狀詠當時風態物色當時言詩者稱元白焉, SBCK: 章表}
