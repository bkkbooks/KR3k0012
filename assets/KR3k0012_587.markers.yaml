  - {type: variant, offset: 2856, length: 351, content: 交爭者力敵一往一復欲罷不能一二年來日尋筆硯同和贈荅不覺滋多大和三年春已前紙墨所在者凡一百三十八首其餘乘興仗醉率然作者不在此數嘗戲微之云僕與足下二十年來為文友詩敵幸也亦不幸也吟詠情性播揚名聲其適遺形其樂忘老幸也然江南士女語才子者多云元白以子之故使僕不得獨步於吳越閭此亦不幸也今垂老復遇夢得非重不幸耶夢得文之神妙莫先於詩若妙與神則吾豈敢如夢得雪裏高山頭白早海中仙果子生遟沉舟側畔千帆過病樹前頭萬木春之句之類真謂神妙矣在在處處應有靈物護持豈止兩家子弟秘藏而已世說曰夏侯孝若作周詩成示潘岳曰此文非徒溫雅乃見孝悌之性潘因此遂作家風詩又曰孫秀收石崇潘岳先送石市潘後至石謂潘曰安仁卿亦復爾耶潘曰可謂白首同所歸潘金谷詩云投分寄石友白首同所歸乃成其詩又曰孫子荊除婦服作詩以示王武子曰未知文生於情情生於文覽之悽然憎伉儷之重, SBCK: 兒戯}
