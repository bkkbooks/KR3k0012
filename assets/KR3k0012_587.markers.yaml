  - {type: variant, offset: 3, length: 0, content: '', SBCK: 曰賦釋名曰賦敷也敷布其義謂之賦也漢書曰不歌而誦謂之賦登髙能賦可以爲大夫言感物造端材智􅀷羙可以與圖政事故可以列爲大夫也春秋之後周道寖壞聘問歌詠不行於列國歌詠之士逸在布衣賢人失志之賦作矣孫卿及楚臣屈原離䜛憂國皆作賦以風諭咸以惻隠古訓之義也其後宋玉唐勒漢興枚乗司馬相如下及揚子雲競爲侈麗閎廣之語設其風諭之義是以楊子稱之曰}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 曰賦釋名曰賦敷也布其義謂之賦也漢書曰不歌而誦謂之賦登髙能賦可以為大夫言感物造端材智深美可以與圖政事故可以列為大夫也春秋之後周道寖壊聘問歌詠不行於列國學詠之士逸在布衣賢人失志之賦作矣孫卿及楚臣屈原離讒憂國皆作賦以風諭咸有惻隱古}
