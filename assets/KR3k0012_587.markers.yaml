  - {type: variant, offset: 652, length: 0, content: '', krp: 京殿苑獵述行叙志並體國經野義尚光大旣履端於唱序亦歸餘於惣詞序以建言首引情本詞以理篇冩送文勢觀夫荀結隠語事義自懷宋發誇談實始淫麗枚乗兎園舉要以㑹新相如上林繁類以成艶賈誼鳥致辨於情理子淵洞簫窮變於聲貌孟堅兩都明絢以贍雅張衡二京迅拔宏冨子雲甘泉搆深偉之風延壽靈光含飛動之勢凢此十家並辭賦之英傑也及仲宣靡宻發篇必道偉長博通時逢壯采太冲安仁䇿勲於鴻規士衡子安底績於流製景純綺巧縟理有餘彦伯梗槩情韻不匱亦魏晉之賦首也原夫登髙之旨盖覩物興情情以物興故義必明雅物以情覩故詞必巧麗麗辭雅義符采相勝如組織之品朱紫畫繪之差玄黄文雖雜而有實色雖糅而有儀此立賦之大躰也然逐末之儔蔑棄其本雖讀千首逾惑躰要遂使繁華析枝膏腴害骨無貫風軌莫益勸戒此楊子所以追悔於雕蟲貽誚於霧縠者也宋玉大言賦序曰楚襄王旣登雲陽之臺命諸大夫景差唐勒宋玉等並造大言賦賦卒而玉受賞又有能爲小言賦者賦之雲夢之田而賦卒乃賜玉田楊子法言曰或問曰吾子少而好賦曰然童子雕蟲篆刻壯夫不爲詩人之賦麗以則辭人之賦麗以媱若孔氏之門而用賦則賈誼升堂相如入室崔鴻十六國春秋南凉録曰秃髪傉檀子歸年始十三命爲髙殿賦下笔即成影不移漏傉檀覽而善之擬之於曹子建又前秦録曰符堅宴羣臣于逍遥園將軍講武文官賦詩有洛陽年少者長不滿}
