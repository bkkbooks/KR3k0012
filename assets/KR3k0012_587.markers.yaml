  - {type: variant, offset: 750, length: 359, content: 矣至於三六雜言則出自篇什離合之發則萌於啚讖迴文所興則道原為始聯句共韻則柏梁餘製巨細或殊情理同致總歸詩囿故不繁云列子曰堯微服遊於康衢聞兒童謠曰立我蒸民莫匪爾極不識不知順帝之則堯問曰孰教爾為此言童兒曰我聞之大夫問大夫大夫曰古詩也文章流別論曰詩言志歌永言古有採詩之官王者以知得失古詩之四言者振鷺于飛是也漢郊廟歌多用之五言者誰謂雀無角何以穿我屋是也樂府亦用之六言者我姑酌彼金罍是也樂府亦用之七言者交交黃鳥止于桑是也於俳諧倡樂世用之古詩之九言者浻酌彼行潦浥此注茲是也不入歌謠之章故世希為之夫詩雖以情志為本而以聲成為節顏延之庭誥曰荀爽云詩者古之歌章然則雅誦之樂篇全矣是以後之詩者率以歌為名及秦勒望岳漢祀郊宮辭著前史者文變之高制也雖雅聲未至弘麗難追矣逮李陵眾作揔雜不類是假託非盡陵制至其善篇有足悲者摯虞文論足稱優洽柏梁以來繼作非一纂, WYG: 神化}
