  - {type: variant, offset: 1127, length: 361, content: 恊金石至於五言流靡則劉楨張華四言側密則張衡王粲若夫陳思王可謂兼之矣鍾嶸詩評曰古詩李陵班婕妤曹植劉楨王粲阮藉陸機潘岳張恊左思謝靈運等十二人詩皆上品曹植詩其原出於國風其骨氣高奇辭彩華茂情兼雅怨體備文質粲然逸古卓爾不群嗟乎陳思之文章也譬人倫之有周孔鱗羽之有龍鳳音樂之有笙竽女工之有黼黻若孔子之門用文則公幹升堂思王入室王陽潘陸自可坐於廊廡之間劉楨文體出於古詩伏氣愛奇動多震絕楨骨氣凌霜高風跨俗但氣過其文彫潤恨少然自陳思已往楨稱獨步張恊字景陽詩其原出於王粲文章華靜實少病累又巧構形似之言雄於潘岳靡於太冲風流調遠實曠代之高才其辭彩蔥蒨音韻鏗鏘使人味之亹亹不倦阮籍詩其原出於小雅雖無彫斲之巧而詠懷之作可以陶性靈發幽致言在耳目之內情寄八荒之表洋洋乎會於風雅矣陶潛詩其原出於應璩又恊左思風力文體省淨殆無長語篤意真古辭興婉媚至如歡言酌春酒日暮, WYG: 復與外相闗控引}
