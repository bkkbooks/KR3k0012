  - {type: variant, offset: 3253, length: 0, content: '', WYG: 丈夫出身不為孝子則為忠臣必欲建功立䇿為國宰輔遂作官人賦以反雲之賦桓子新論曰予少時見揚子雲麗}
  - {type: page-break, offset: 3253, content: '', id: KR3k0012_WYG_587-11b, image: WYG0898/WYG0898-0364b.png}
  - {type: variant, offset: 3254, length: 0, content: '', WYG: 髙論不量年少猥欲迨及業作小賦用思大劇而立感動發病子雲亦言成帝幸甘泉詔使作賦為之卒暴倦卧夢其五臟出地以手收之覺太少氣病一嵗余少好文見子雲工為賦頌欲從學子雲曰能讀千賦則善之矣魏文典論曰今之文人魯國孔融廣陵陳琳山陽王粲北海徐幹陳留阮瑀汝南應璩東平劉楨此七子者於學無所遺於辭無所假如粲之初征登樓槐賦幹之𤣥猨漏巵圓扇枕賦雖張蔡不過也陳琳阮瑀之}
  - {type: page-break, offset: 3254, content: '', id: KR3k0012_WYG_587-12a, image: WYG0898/WYG0898-0364c.png}
  - {type: variant, offset: 3255, length: 3, content: 斷絕物, SBCK: 才試使作許都賦成封上不得令人見禎遂造賦上甚異之又曰􅁄嵩見陸雲作逸民賦嵩以爲丈夫出身不爲孝子則爲忠臣必欲建功立䇿爲國宰輔遂作官人賦以反雲之賦桓子新論田予少時見楊子雲麗文髙論不量年少猥欲迨及業作小賦用思太劇而立感動發病子雲亦言成帝上甘泉詔使作賦爲之卒暴倦卧夢其五藏出地以手収之􅁴大少氣病一歳余少好文見子雲工爲賦頌欲從學子雲曰能讀千賦則善之矣魏文典論曰今之文人魯國孔融廣陵陳琳山陽王粲北海徐幹陳留阮瑀汝南應璩東平劉楨此七子者於學}
  - {type: variant, offset: 3255, length: 7, content: 斷絕物無異議簡, WYG: 表書記今之雋也應璩和而不壮劉楨壮而不宻孔融氣體髙妙有過人者魏}
