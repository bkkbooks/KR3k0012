  - {type: variant, offset: 652, length: 0, content: '', WYG: 京殿苑獵述行叙志並體國經野義尚光大既履端於唱序亦歸餘於總亂序以建言首引情本亂以理篇冩送文勢觀夫荀結引語事數自環宋發巧談實始淫麗枚乗兎園舉要以㑹新相如上林繁類以成艷賈誼鵩鳥致辨於情理子淵洞簫窮變於聲貌孟堅兩都明絢以贍雅張衡二京迅抜以宏富子雲甘泉搆深偉之風延夀靈光含飛動之勢凡此十家並辭賦之英傑也及仲宣靡宻發端必遒偉長通博時逢壮采太冲安仁䇿勲於鴻規士衡子安底績於流製景純綺巧縟理有餘彦伯梗槩情韻不匱亦魏晉之賦首也原夫登髙之㫖葢覩物興情情以物興故義必明雅物以情覩故辭必巧麗麗辭雅義符采相勝如組織之品朱紫畫繪之差𤣥黄文雖新而有質色雖雜而有儀此立賦之大體也然逐末之儔蔑棄其本雖讀千首逾惑體要遂使繁華折枝膏腴害骨無貴風軌莫益勸戒此揚子所以追悔於雕蟲貽誚於霧縠者也宋玉大言賦序曰楚襄王既登陽雲之臺命諸大夫景差唐勒宋玉等並造大言賦賦畢而玉受賞又有能為小言賦者賞雲夢之田賦畢遂賜玉田揚子法言曰或問曰吾子少而好賦曰然童子雕蟲篆刻壮夫不為詩人之賦麗以則辭人之賦麗以淫若孔氏之門而用賦則賈誼升堂相如入室崔鴻十六國春秋南凉錄曰秃髪傉檀子歸年始十三命為髙昌殿賦援筆立成影不移漏傉檀覽而善之擬之於曹子建又前秦錄曰苻堅宴群臣於逍遥園将軍講武文官賦詩有洛陽年少者長不滿}
