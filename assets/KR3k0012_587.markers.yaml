  - {type: variant, offset: 4, length: 0, content: '', WYG: 之義也其後宋玉唐勒漢興枚乗司馬相如下及揚雄競為侈麗閎廣之語没其風諭之義是以揚子稱之曰詩人之賦麗以則辭人之賦麗以淫如孔氏之門用賦也則賈誼登堂相如入室矣又上令王襃與張子僑等並待詔數從遊獵所幸宫館輙歌頌第其髙下以差賜帛議者多謂淫靡不急上曰不有博弈者乎為之猶賢乎已辭賦大者與古詩同義小者駢麗可喜如女工有綺縠音樂有鄭衛今世俗猶皆以娯說耳目辭賦比之尚有仁義諷諭鳥獸草木多聞之觀賢於倡優博弈逺矣又武帝安車徴枚乘孽子臯母為小妻以乘之東歸也臯母不肯隨乘乘怒留臯與母居年十七上書自陳枚乘之子上得之大喜召入詔使賦平樂館善之拜為郎臯不通經術談笑類俳倡為賦頌好嫚戯以故得媟黷貴幸比東方朔郭舍人等武帝春秋三十九乃得皇太子羣臣喜故臯與東方朔作皇太子生賦臯為文疾受詔輒成故所賦者多司馬相如善為文而遲故所作少又上讀司馬相如子虛賦善之乃召相如相如曰此乃諸侯之事未足觀請為天子遊獵之賦上令尚書給筆札相如以子虛虛言也為楚稱烏有先生者烏有此事也為齊難亡是公者亡是人也欲明天子之義故虛藉此三人為辭以推天子諸侯之苑囿其卒歸於節儉因以諷諌天子天子大説時上好神仙相如又奏大人賦天子悦飄飄有凌雲氣游天地之間意又趙昭儀方大幸毎上幸甘泉常從在属車間豹尾中故揚雄盛言車騎之衆參麗之駕非所以感動天地逆釐三神又言屏玉女却宓妃以微戒齋肅之事賦成奏之天子異焉先是蜀有司馬相如時作賦甚宏麗温雅雄心壮之毎作賦常擬以為式後漢書曰王延夀字文考少遊魯國作靈光殿賦後蔡邕亦造此賦未成及見延夀所為甚竒之遂輟翰又李充字伯仁少以文章顯名賈逵薦充召詣東觀受詔作賦拜蘭䑓令史魏志曰陳思王植太祖常視其文曰汝倩人耳植跪曰出言為論下筆成篇固當面試時鄴銅雀䑓新成太祖悉将諸子登使各賦植賦援筆立成太祖甚異之呉書曰張紘作柟榴枕賦陳琳在河北見之以示人曰此吾郷里張子綱所作也後紘見琳武庫賦應機論與琳書歎羙之琳答曰自僕在河北與足下隔此間率少於文章易為雄伯故僕受此過美之談非其實也今景興在此足下子布在彼所謂小巫見大巫神氣盡矣魏畧曰卞蘭獻賦賛述太子徳美太子報曰作者不虛其辭受者必當其實蘭此賦豈吾實哉昔吾丘夀王一陳寳鼎何武等徒以歌頌猶受金帛之賜蘭事雖不諒義足嘉也今賜牛一頭又邯鄲淳作投壺賦奏之文帝以為工賜絹十疋晉書曰孫綽絶重張衡左思賦云三都二京六經之鼓吹也嘗作天台山賦辭致甚工初成以示友人范榮期云卿試擲地當作金石聲也榮期曰恐此金石非中宫商然毎至佳句輙云應是我輩語又桓温欲經畫中國以河南粗平将移都洛陽朝廷畏温不敢為異而此土蕭條人情危懼孫綽上䟽言不可温見綽表不恱曰致意興公何不尋君遂初賦而知人家國事耶又顧愷字長康晉陵無錫人也博學有才氣嘗為筝賦成謂人曰吾賦之比嵇琴不賞者必當以後出相遺深識者亦當以髙竒見貴宋書曰謝荘字希逸仕為太子中庶子時南平王鑠獻赤鸚鵡帝詔羣臣為賦太子左衛率袁淑文冠當時作賦畢示荘及見荘賦歎曰江東無我卿當獨秀我若無卿亦一時之傑遂隠其賦梁書生張率為待詔賦奏之甚見稱賞手勅答曰相如工而不敏枚臯速而不工卿可謂兼二子於金馬矣又沈衆字仲興好學有文詞仕梁為太子舍人時武帝制千字詩衆因註解與陳謝景同時召見於文徳殿帝命作賦賦成奏之手勅答曰卿文體翩翩可謂無忝爾祖北齊書曰劉晝舉秀才入京考䇿不第乃恨不學屬文方復緝綴辭藻言甚古拙制一首賦以六合為名自謂絶倫吟諷不輟乃歎曰儒者勞而少工見於斯矣我讀儒書二十餘年而答䇿不第始學作文便得如是曽以此賦呈魏收收謂人曰賦名六合其愚已甚及見其賦又愚於名唐書曰獲嘉主簿劉知幾著思慎賦以刺時鳳閣侍郎蘇味道李嶠見文相顧而歎曰陸機豪士之所不及也當今防身要道盡在此矣又文苑傳李華字遐叔善屬文與蘭陵蕭頴士善華著含元殿賦頴士見而賞之曰景福之上靈光之下後唐書曰李琪少孤貧苦學尤精於文賦昭宗時李谿父子以文學知名於時琪年十八九袖賦一軸謁谿谿覽賦驚異倒履迎門因出琪啞鍾捧日等賦指示謂琪曰予常患近年文士辭賦皆數句之後未見其賦題吾子入句見題偶屬典麗吁可畏也琪由是益知名摰虞文章流别論曰賦者敷陳之稱古詩之流也前世為賦者有孫卿屈原尚頗有古詩之義至宋玉則多淫浮之病矣楚詞之賦賦之善者也故揚子稱賦莫深於離騷賈誼之作則屈原儔也禰衡傳曰黄祖時大㑹賓客人有獻鸚鵡者祖舉巵酒於衡曰願先生賦之以娯嘉賓衡攬筆而作文無加㸃辭采甚麗}
