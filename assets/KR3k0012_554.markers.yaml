  - {type: 'tls:seg', offset: 4003, content: '', id: KR3k0012_CHANT_554-50a.8}
  - {type: variant, offset: 4008, length: 0, content: '', WYG: 儻在於是寵惻然矜之即勅盡歛葬之自是哭遂絶華嶠後漢書曰楊震為太尉中常侍樊豐等驕恣震常切諌由是共構譖震策罷遣歸本郡遂仰鳩薨薨日有大鳥來止樹上須臾下地安行到柩前正立位頭旁人共更撫抱終不驚駭鳥蒼色頸去地五六尺舒翅廣一丈三尺莫有能名者葬畢飛去范􅁮後漢書曰范冉一名丹臨命遺勅其子曰吾生於昏闇之世值乎淫侈之俗生不得在世濟時死則何忍自同於世氣絶便歛斂以時服衣足蔽形棺足周身歛畢便穿穿畢便埋其明堂之奠盂飯寒水飲食之物勿有所下墳封高下令足自隱知我心者李子堅王子炳也今皆不在制之在爾勿令鄉人宗親有所加也范􅁮後漢書曰趙咨以病自乞徴拜議郎沈疾京師將終告其故}
  - {type: page-break, offset: 4008, content: '', id: KR3k0012_WYG_554-3a, image: WYG0898/WYG0898-0139c.png}
  - {type: variant, offset: 4009, length: 1, content: 士, WYG: 朱祗蕭建等薄斂素棺藉以黄壤欲令速朽早歸后土不聽子孫改之朱祗蕭建送䘮到家子𦙍不忍父體與土并合欲更改殯祗建譬以顧命於是奉行世稱明哲後漢書曰董宣為洛陽令卒於官詔遣使者臨視唯見布被覆屍妻子對哭有大麥數斛弊車一乗帝傷之曰董宣亷潔死乃知之以宣子綬為二千石賜文綬葬以大夫禮後漢書曰樊宏卒遺勅薄葬一無所用以為棺椁一藏不宜復見如有腐敗傷孝子之心使與夫人同墳異藏帝善其令以書示百官因曰今不順壽張侯意無以彰其德且吾萬歲之後欲以為式後漢書曰袁安父没母使安訪求葬地道逢三書生問安何之安為言其故生乃指一處云葬此地當代為上公須臾不見安異之於是遂葬所指之地故累世隆盛焉後漢書曰桓榮每疾病帝輙遣使者存問太官太醫相望於道病篤上疏謝恩讓還爵土帝親幸其家問起居下車擁經而前撫榮垂涕賜以牀茵帷帳刀劍衣被良久乃去自是諸侯卿大夫問疾者不敢復乗車到門皆拜牀下榮卒帝親自變服臨䘮送葬賜塜塋於首山之陽後漢書曰李傕重葬董卓於郿并董氏所焚尸之灰合歛一棺而葬之葬日大風雨霆震卓墓流水入藏漂其棺木後漢書曰王忳字少林忳音純廣漢新都人也忳嘗詣京師於空舍中見一書生疾困愍而視之書生謂忳曰我當到洛而被病命在須臾腰下有金十斤願以相贈死後乞藏骸骨未及問姓名而命絶忳鬻金一斤營殯葬餘金悉置棺下人無知者後歸數年縣署忳大度亭長初到之日有馬馳入亭中而止其曰大風飃一繡被復墮忳前即言之於縣縣以歸忳忳後乗馬到雒縣馬遂奔走牽忳入他舍主人見之喜曰今擒盜矣問忳所由得馬忳具説其狀并及繡被主人悵然良久乃曰被隨旋風與馬俱亡卿何隂德而致二物忳自念有葬書生事因説之并道書生形貌及埋金之處主人大驚號曰是我子也姓金名彦前往京師不知所在何意卿乃葬之大恩久不報以彰卿德耳忳悉以被馬還之彦父不取}
