  - {type: variant, offset: 4011, length: 0, content: '', WYG: 厚遺忳忳辭讓而去後漢書曰范式字巨卿與張元伯為友元伯疾篤同郡郅君章殷子徵晨夜省疾視之元伯臨盡歎曰恨不見吾死友尋而卒式忽夢見元伯𤣥冕垂纓履屣而呼曰巨卿吾以某日死當以某時葬永歸黄泉子未我忘豈能相及式怳然覺寤悲歎泣下具告太守請往奔䘮投其葬日馳往赴之式未及到而䘮已發引既至壙將窆而柩不肯進其母撫之曰元伯豈有望耶遂停柩移時乃見有素車白馬號哭而來其母望之曰是必范巨卿也即至叩䘮言曰行矣元伯死生路異永從此辭㑹葬者千人咸為揮涕式因執紼而引柩於是乃前式遂留止塜坎為脩墳樹後漢書曰繆彤汝南召陵人也太守隴西梁湛召為决曹吏安帝初湛病卒官彤送䘮還隴西始葬㑹西羌反叛湛妻子悉避亂他郡彤獨留不去為起墳塜乃潛穿井傍以為窟室晝則隱竄夜則負土及賊平而墳已立其妻子意彤已死還見大驚闗西咸稱傳之共給車馬之資彤不受而歸後漢書曰張覇蜀郡成都人也為㑹稽太守後被徴四遷為侍中卒年七十遺詔諸子曰昔延州使齊子死嬴博因坎路則遂以葬焉今蜀道阻遠不宜歸塋可止此葬足藏齒髪而已務遵速朽副我本心人生一代但當畏敬於人若不善加已直為受之諸子承命葬於河南梁縣因遂家焉後漢書曰公孫瑞理王允等事曰興平二年秋朝廷以九月九日引見公卿近臣飲宴離席前説故司徒王允故司𨽻王琬並有功於國可聽允恭等葬魏畧曰田豫病亡戒其妻子曰葬我必西門豹邊妻子難之曰西門豹古之神人那可葬其所豫曰豹所履行正與我等耳使死而有靈必與我善妻子從之魏畧曰郝昭字伯通病亡遺令戒其子凱曰吾為將知將不可為也吾數發塜取其木以為攻戰具又知厚葬無益於死者也汝必斂以時服死復何在耶今去本墓遠}
