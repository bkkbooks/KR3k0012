  - {type: punctuation, offset: 3838, content: ，, id: KR3k0012_CHANT_554-bkkpn1179}
  - {type: 'tls:seg', offset: 3838, content: '', id: KR3k0012_CHANT_554-48a.4}
  - {type: variant, offset: 3839, length: 4, content: 和四年卒, SBCK: 禄大夫數歳即拜司空固辭不受以大夫薨于家用公禮葬謚曰穆侯魏志裴潜薨贈太常子秀翩遺令葬中唯置一坐瓦器數枝其餘一無所設也王隱􅀳書曰魏舒字陽元爲冀州刺史入代山濤爲侍中舒三取妻皆先亡是歳自表乞假還本郡葬妻上曰舒當左右朝政不冝逺還郷里舒素清貧不營財産頓舉衆䘮必無以自供其賜葬地一頃錢伍拾萬王隱􅀳書曰皇甫謐篤終論曰氣絶之後便時服幅巾以遽蒢褁尸覆卷三重麻䋲約二頭置屍靈床上擇不毛之地穿坈十尺長一丈二尺廣六尺坈訖去床下屍平生之物皆無自隨唯賫孝經一卷示不忘孝道王隱􅀳書曰杜頒薨}
