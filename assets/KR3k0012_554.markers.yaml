  - {type: variant, offset: 4035, length: 187, content: 人又曰東海王彊薨追念彊雅性恭儉不欲令厚葬以違其意詔中常侍杜岑東海相傳曰王恭謙好禮以德自終勑官屬遣送務行約省茅車瓦器以成王志又曰王丹閭里有喪憂輒度其資用教之儉約因為其制日定葬其親喪不過留殯一月其下以輕重為羗又曰梁鴻病困與高伯通及會稽士大夫語曰昔延陵季子葬於羸博之間不歸其鄉慎勿聽妻子持尸柩去終後伯通等為求葬處有要離冢高燥眾人曰要離古烈士今伯鸞亦清高令相近遂葬要離家旁子孫歸扶風, SBCK: 五十四}
