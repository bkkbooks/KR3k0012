  - {type: variant, offset: 8, length: 303, content: 一易下繫曰古之葬者厚衣之以薪葬之中野衣之以薪而理之於中野不封不樹喪其無數後世聖人易之以棺槨蓋取諸大過尚書曰周公在豐致政老在豐也將沒欲葬成周周公薨成王葬于畢成王不敢臣周公故歸於武王葬畢也禮記曲禮上曰助葬必執紼紼引車索禮記檀弓上曰太公封於營丘比及五世皆反葬於周君子曰樂樂其所自生禮不忘其本古之人有言曰狐死正丘首仁也正丘首正首丘也仁思也又曰舜葬於蒼梧之野蓋三妃未之從也古不合葬又曰葬於北方北首三代之達禮也之幽之故也北方北首國北也又曰子柳之母死子碩請具具喪之器用也子柳魯叔仲皮之子子碩兄子柳曰何以哉言無其財子碩曰請粥庶弟之母粥謂嫁之也妾賤取之曰買之也子柳曰如之何其粥人之母以葬其母也不可又曰公叔文子升於瑕丘蘧伯玉從, krp: ''}
