  - {type: variant, offset: 4016, length: 0, content: '', WYG: 洛陽追賜豹北海太守魏志曰邴原字根矩北海人太祖辟司空掾原女早亡時太祖愛子倉舒亦没太祖欲令合葬原辭曰合葬非禮也原之所以自容於明公公之所以待原者以能守訓典而不易也若聽明公之命則是凡庸也明公焉以厚為太祖乃止魏志曰任城王}
