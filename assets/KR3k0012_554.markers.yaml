  - {type: variant, offset: 4038, length: 0, content: '', WYG: 徐邈為光禄大夫數歲即拜司空固不受以大夫薨于家用公禮諡曰穆侯魏志曰裴潛薨贈太常子秀遵遺令葬中唯置一坐瓦器數枝其餘一無所設也王隱晉書曰魏舒字陽元為冀州刺史入代山濤為侍中舒三取妻皆先亡是歲自表乞假還本郡葬妻上曰舒當左右朝政不宜逺還鄉里舒素漬貧不營財産頓舉衆䘮必無以自供其賜葬地一頃錢五十萬王隱晉書曰皇甫謐篤終論曰氣絶之後便時服幅巾以蘧蒢裹尸復卷三重麻繩約二頭置尸靈牀上擇不毛之地穿坑十尺長一丈二尺廣六尺坑訖去牀下屍平生之物皆無自隨唯賫孝經一卷示不忘孝道王隱晉書曰杜預薨遺令曰吾往為公使過密縣邢山之上有塜聞耕者云是鄭大夫祭仲或子産之塜也遂帥從者登而觀焉其造塜居山之嶺四望周達連山體南北之正而邪}
  - {type: page-break, offset: 4038, content: '', id: KR3k0012_WYG_554-9a, image: WYG0898/WYG0898-0142c.png}
