  - {type: variant, offset: 3814, length: 0, content: '', SBCK: 不肯進其母撫之曰元伯豈有望耶遂停柩移時乃見有素車白馬號哭而來其母望之曰是必范巨卿也即至叩䘮言曰行矣元伯死生路異永從此辭㑹葬者千人咸爲揮涕式因執紼而引柩於是乃前式遂留止􅃁次爲脩墳樹後漢書曰繆肜汝南召陵人也太守隴西梁湛召爲決曹史安帝初湛病卒官肜送䘮還隴西始葬㑹西羗反叛湛妻子悉避亂他郡肜獨留不去爲起墳塜乃潜穿并傍以爲窟室晝則隱􅇡夜則􅀒土及賊平而墳巳立其妻子意肜巳死還見大驚􅀜西咸稱傳之共給車馬衣資肜不受}
