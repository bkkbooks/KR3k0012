  - {type: variant, offset: 3779, length: 2, content: 孔僖, SBCK: 范冉一名丹臨命遺勑其子曰吾生於昬闇之世值乎􅁋侈之俗生得在世濟時死則何忍自同於世氣絶便歛歛以時服衣足蔽形棺足周身歛畢便穿穿畢便埋其明堂之奠盂飲寒水飲食之物勿有所下墳封髙下令足自隱知我心者李子堅王子炳也今皆不在制之在爾勿令郷人宗親有所加也范曄後漢書曰趙咨以病自乞徴}
  - {type: variant, offset: 3779, length: 2, content: 孔僖, krp: 范冉一名丹臨命遺勑其子曰吾生於昬闇之世值乎淫侈之俗生得在世濟時死則何忍自同於世氣絶便歛歛以時服衣足蔽形棺足周身歛畢便穿穿畢便埋其明堂之奠盂飲寒水飲食之物勿有所下墳封髙下令足自隱知我心者李子堅王子炳也今皆不在制之在爾勿令郷人宗親有所加也范曄後漢書曰趙咨以病自乞徴}
  - {type: variant, offset: 3782, length: 2, content: 臨晉, SBCK: 議郎沉疾京師將終告其故吏朱祇蕭建等薄斂素棺藉以黄壤欲令速朽早歸后土不聽子孫改之朱祇蕭建送䘮到家子㣧不忍父體與土并合欲更改殯祇建譬以顧命於是奉行世稱明哲後漢書曰董宣爲洛陽}
