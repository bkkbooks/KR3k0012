  - {type: variant, offset: 3787, length: 0, content: '', SBCK: 詔遣使者臨視唯見布􅀍覆屍妻子對哭有大麥數斛弊車一乗帝傷之曰董宣廉潔死乃知之以宣綬爲二千石賜艾綬葬以大夫禮後漢書曰樊宏卒}
  - {type: variant, offset: 3787, length: 0, content: '', krp: 詔遣使者臨視唯見布𬒳覆屍妻子對哭有大麥數斛弊車一乗帝傷之曰董宣廉潔死乃知之以宣綬爲二千石賜艾綬葬以大夫禮後漢書曰樊宏卒}
  - {type: variant, offset: 3788, length: 0, content: '', SBCK: 勑薄葬一無所用以爲棺椁一藏不冝復見如有腐敗傷孝子之心使與夫人同墳異藏帝善其}
  - {type: variant, offset: 3788, length: 0, content: '', krp: 勑薄葬一無所用以爲棺椁一藏不冝復見如有腐敗傷孝子之心使與夫人同墳異藏帝善其}
  - {type: variant, offset: 3789, length: 0, content: '', SBCK: 以書示百官因曰令不順壽張侯意無以彰其德具吾萬歳之後欲以爲式後漢書曰􅀽安父没母使安訪求葬地道逢三書生問安何之安爲言其故生乃指一處云葬此地當代爲上公須􅁷不見安異之於是遂葬其所占之地故累代隆盛焉後漢書桓榮每疾病帝輒遣使者存問太官太毉相望於道及篤上䟽謝恩讓還爵土帝親幸其家問起居下車擁經而前撫榮垂涕賜以牀茵帷帳刀劒衣􅀍良乆乃去自是諸侯將大夫問疾者不敢復乗車到問皆拜床下榮卒帝親自變服臨䘮送葬賜􅃁塋于首山之陽後漢書曰李傕重葬董卓於郿并董氏所焚尸之􅁅合斂一棺而葬之葬日大風雨霆震卓墓流水而藏漂其棺木後漢書曰王忳字少林忳音純廣漢新都人也忳嘗詣京師於空舎中一書生疾困愍而視之書生謂忳曰我當到洛而􅀍病命在湏􅁷腰下有金十斤願以相贈死後乞藏骸骨未及問姓名而命絶忳}
