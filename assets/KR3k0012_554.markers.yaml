  - {type: variant, offset: 3847, length: 0, content: '', SBCK: 徃爲公使過宻縣邢山之上有塜問耕者云是鄭大夫祭仲或子産之冡也遂師從者登而觀焉其造􅃁居山之嶺四望周達連山體南北之正而耶東北向新鄭城意不忘夲也藏無珎寳不取於重深居子尚其儉小人無利可動歷千載無毀儉之致也吾去春入朝因自營洛陽城東首陽之南爲將來兆域而所得地中有小山上無舊塜其髙顯雖未足比邢山然東奉二陵西瞻宫闕南觀伊洛北望夷叔曠然逺覽情之所安也故遂表樹開道爲一定之制取法鄭大夫欲以儉自完耳棺器小歛之事皆當稱比王隱􅀳書曰馬隆字孝興東平人也少有智勇門寒無仕路兖州刺史令狐愚坐事死舉州無敢送䘮者唯隆以武吏託稱家客殯送䘮葬種栢三年禮畢乃還舉州皆慙王隱􅀳書曰徐苗以永寧三年春亡遺令濯巾澣衣榆棺雜塼露車載柩葦席瓦器而葬矣􅀳陽秋曰荀粲亡時年二十九性簡實不能與常人交接所交者一時俊傑至葬夕赴者裁十餘人皆同時知名士也哭之感動路人漢􅀳陽秋曰司馬師葬曹髦於洛陽西北三十里屈澗之濵下車數乗不設旒旐百姓相聚而觀之曰前所殺天子也或掩靣而泣􅀳諸公讃賈后女宣華公主葬用羽葆鼓吹熊渠佽飛爲鹵簿􅀳書曰石苞以泰始八年薨預爲終制曰延陵薄葬孔子以爲達禮華元厚葬春秋以爲不臣古之明義也自今死亡者皆斂以時服不得兼重又不設床帳明器窆後復土滿坎不得起墳種樹王隱􅀳書曰庚峻遺勑子珉曰朝卒暮殯幅巾布衣葬不擇日珉奉遺命殮以時服􅀳中興書曰劉驎之少有信義去家百餘里有一獨嫗病將死歎息謂人曰誰當埋我唯有劉長史耳何由令知驎之先聞有病故徃􅀱之值其命終乃身爲治棺殯送其仁愛惻隱􅀂此也王隱􅀳書曰􅂫韶安平人也爲中牟令第九子名節畫日見韶入乗馬介黄練衣曰吾欲改葬乃授節爲書曰吾性好愛京洛每徃來瞻覩芒山上樂哉乎此萬代之基也背孟津洋洋之河南望天邑濟濟之盛此志雖未言銘之於心不啚奄忽所懷未果前至十月可速改葬買數􅅿地便自足矣􅀳書曰成都王頴死其後没桑害東羸公騰稱爲頴報讎遂出頴棺載之於軍中毎事啓靈以行軍令桑敗棄棺於故井中頴故臣収之改葬於洛陽􅀳中興書曰王導薨詔給九旒輼輬車黄屋左纛}
