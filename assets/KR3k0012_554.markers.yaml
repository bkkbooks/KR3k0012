  - {type: variant, offset: 3984, length: 3, content: 武發薊, WYG: 故事皇太后皆令黄門輓送謝承後漢書曰鄧晨尚世祖姨新野公主主為王莽兵所害及薨詔備主官屬法駕迎主魂與晨合葬於北邙謝承後漢書曰馬援卒後有人上書譖之者援妻孥惶怖不敢以䘮}
