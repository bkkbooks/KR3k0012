  - {type: variant, offset: 3773, length: 0, content: '', SBCK: 以贓奏瑗徴詣廷尉瑗上書自訟得理岀㑹病卒臨終顧命子實曰人禀天地之氣以生及其終也歸精於天還骨於地何地不可藏形骸勿歸郷里實奉遺令遂留葬洛陽􅀄崔實父卒摽賣田宅起冢塋立碑頌葬訖資産竭盡因窮困以搉酤鬻爲業時人多以此譏之實終不改亦取足而巳不致盈餘謝承後漢書曰陳寵爲廣漢太守先是洛縣城南每隂雨常有哭聲聞於府中積數十年寵問而疑其故使吏桉行還言衰亂時此下多死亡者而骨骸不得葬償儻在於是寵愴然矜之即勑縣盡収斂葬之自是哭遂絶華嶠後漢書曰楊震爲太尉中常侍樊豐等驕恣震常灱諌由是共構譛震䇿罷遣歸夲郡遂仰鴆薨薨日有大鳥來止樹上須􅁷下地安行到柩前正立伭頭旁人共更撫抱終不驚駭鳥蒼色頸去地五六尺舒翅廣一文三尺莫有能名者葬畢飛去}
  - {type: page-break, offset: 3773, content: '', id: KR3k0012_SBCK_554-2a}
