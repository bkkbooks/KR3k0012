  - {type: variant, offset: 3798, length: 12, content: 歲蒲坂令許君然勸令反魯對, SBCK: 金悉置棺下人無知者後歸數年縣署忳大度亭初到之日有馬馳入亭中而止其日大風飄一繡􅀍復墮忳前即言之於縣縣以歸忳忳後乗馬到雒縣馬遂奔走牽忳入他舎主人見之喜}
