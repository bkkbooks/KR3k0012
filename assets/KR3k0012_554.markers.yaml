  - {type: variant, offset: 3509, length: 165, content: 車萬餘兩將作穿復土河東卒五百人起墳如大將軍王鳳制度又曰董賢死見廢倮𧭉其尸因埋獄中賢所厚吏沛人朱詡自劾去大司馬府備棺衣收賢尸葬之王莽聞之大怒以他罪繫殺詡又曰楚王戊女解憂妻烏孫公主上書言年老思願得歸骸骨葬漢地天子愍而迎之公主與孫男女三人俱來後二歲卒三孫因留守墳墓又曰樓護字君卿結交士大夫無所不傾甚交士長者尤見親敬母死送葬者致車二三千兩, SBCK: 謝承}
