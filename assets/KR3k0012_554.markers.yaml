  - {type: variant, offset: 2482, length: 1025, content: 之所愛葬無知之死人哉若死者有知先王之積怒久矣太后救過不暇何得私魏子乎太后乃止漢書曰韓信淮陰人家貧無行不得推擇為吏又不能治生為商賈常從人寄食其母死無以葬乃行營高燥地傍可置萬家者為冢又曰張良始所見下邳圮上老父與書者後十三歲從高帝過濟北果得穀城山下黃石取而寶祠之及良死并葬黃石每上冢伏臈祠黃石又曰衛青貴而平陽侯曹壽有惡疾就國長公主問列侯賢者左右皆言大將軍主嘆曰此出吾家常從我奈何左右曰於今尊貴無比於是主諷皇后言之上迺詔青尚平陽主合葬起冢又曰三長史害張湯自殺昆弟欲厚葬湯母曰湯為天子大臣被惡言而死何厚葬為載以牛車有棺而無槨上聞之曰非此母不生此子迺盡誅三長史又曰王父偃方貴幸時客以千數及死無一人視獨孔車收葬焉上聞之以車為長者又曰霍光薨上及皇后太后親臨光喪太中大夫任宣與侍御史五人持節護喪事賜金錢繒絮繡被百領衣五十篋璧珠璣王衣如淳曰漢儀注以王為孺如鎧狀連綴之以黃金為縷腰以下王為禮長尺廣二寸半押下至足亦綴以金縷也便房黃膓題湊各一具蘇林曰以柏木黃心致累棺外曰黃膓木頭皆內向故曰題湊如淳曰便房冢壙中室也漢儀天子陵中明中高丈二尺四周二丈二丈內梓宮次楩槨柏黃腸題湊也東園溫明服虔曰東園處此器象如棺開一端漆畫之以鏡置其中以尸上大斂并蓋之矣皆如乘輿制度載光尸柩以轀輬車黃屋左纛發材官輕車北軍五校士軍陳至茂陵以送其葬謚曰宣成侯發三河卒穿土起冢祠堂置園邑三百家又曰金日殫薨賜葬其冢地送以輕車介士軍至茂陵謚曰敬侯又曰楊王孫者孝武時人也學黃老之術家業千金厚自奉養生亡所不致及病且終先令其子曰吾欲倮葬以反吾真必亡易吾意死則為囊盛尸尸入地七尺既下從足引脫其囊以身櫬土其子欲默而不從重廢父命欲從之心又不忍乃往見王孫友人祁侯祁侯與王孫書王孫報曰蓋聞古之聖王緣人不忍其親故為制禮今則越之吾是以倮葬將以矯世吾聞之神精者天之有形骸者地之有精神離形各歸其真故謂之鬼鬼之為言歸也屍塊然獨處豈有知哉褁以幣帛隔以棺槨支體結束口含玉石欲化不得鬱為枯腊千載之後棺槨朽腐迺得歸土就其真宅祁侯曰善遂倮葬又曰朱雲年七十餘終於家病不呼醫藥遺言以身服斂棺周於身土為槨韋昭曰燒土為槨也為丈五墳葬平陵東郭外又曰韋玄成為相病且死因使者自白曰不勝父子私願乞體骨歸葬父墓上許焉又曰朱邑病且死囑其子曰我故為桐鄉吏其民愛我必葬桐鄉後世子孫奉我不如桐鄉民及死其子葬之桐鄉西郭外民果共為邑起冢立祠歲祠祭至今不絕又曰孔光薨王莽白太后使九卿策贈以太師博山侯印綬賜乘輿秘器金錢雜帛少府供帳公卿百官會弔送葬載以乘輿及副各一乘羽林孤兒諸生合四百人, SBCK: ''}
