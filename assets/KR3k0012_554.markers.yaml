  - {type: variant, offset: 4039, length: 1, content: 海, WYG: 北向新鄭城意不忘本也藏無珎寶不取於重深君子尚其儉小人無利可動厯千載無毁儉之制也吾去春入朝因自營洛陽城東首陽之南為將來兆域而所得地中百小山上無舊塜北髙顯雖未足比邢山然東奉二陵西瞻宫闕南觀伊洛北望夷叔曠然遠覽情之所安也故遂表樹開道為一定之制取法於鄭大夫欲以儉自完耳棺器小斂之事皆當稱此}
  - {type: page-break, offset: 4039, content: '', id: KR3k0012_WYG_554-10a, image: WYG0898/WYG0898-0143a.png}
  - {type: variant, offset: 4041, length: 1, content: 彊, WYG: 隱晉書曰馬隆字孝興東平人也少有智勇門寒無仕路兖州刺史令狐愚坐事死舉州無敢送䘮者唯隆以武吏託稱家客殯送䘮葬種栢三年禮畢迺還舉州皆慚王隱晉書曰徐苗以永寧三年春亡遺令濯内巾澣衣榆棺雜塼露車載柩葦席瓦器而葬晉陽秋曰荀粲亡時年二十九性簡實不能與常人交接所交者一時俊傑至葬夕赴者裁十餘人皆同時知名士也哭之感動路人漢晉陽秋曰司馬師葬曹髦於洛陽西北三十里屈澗之濵下車數乗不設旒旐百姓相聚而觀之曰前所殺天子也或掩面而泣晉諸公讃曰賈后女宣華公主葬用羽葆鼓吹熊渠佽飛為鹵薄晉書曰石苞以泰始八年}
