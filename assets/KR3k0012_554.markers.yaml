  - {type: variant, offset: 3837, length: 1, content: 奐, SBCK: 霸蜀郡成都人也爲㑹稽太守後徴四遷爲侍中卒年七十遺詔諸子曰昔延州使齊子死嬴􅀶因坎路側遂以葬焉今蜀道阻逺不且歸塋可止此葬足藏齒髮而巳務遵速朽副我夲心人生一代但當畏敬於人􅀂不善加巳直爲受之諸子承命葬於河南梁縣因遂家焉後漢晝曰士孫瑞理王充等事曰興平二年秋朝廷以九月九日引見公卿近臣飲宴離席前􅀃故司徒王允故司􅀠黄琬並有功於國可聽允恭等葬魏略曰田豫病亡戒其妻子曰葬我必西門豹邊妻子難之曰西門豹古之神人郍可葬其所豫曰豹所履行正與我等耳使死而有靈必與我善妻子從之魏略曰郝昭字伯通病亡遺令戒其子凱曰吾爲將知將不可爲也吾數發􅃁取其木以爲攻戰具又知厚葬無益於死者也没必歛以時服死復何在耶令去夲墓逺東西南北在汝而巳矣魏略曰沐徳信年六十餘自慮無常豫作終制誡其子以儉葬至嘉平中病甚臨困又勑豫掘塪誡氣絶令二人舉户即塪絶哭泣之聲止婦女送又誡後亡者不得入藏不得封樹妻子皆遵之魏志曰征東將軍王基母卒詔秘凶問迎其父豹䘮合葬洛陽追賜豹北海太守魏志曰邴原字根矩北海人太祖辟司空椽原女早亡時太祖愛子倉舒亦没太祖欲令合葬原辭曰合葬非禮也原之所以自容明公公之所以待原者以能守訓典而不昜也􅀂聽明公之命則是凡庸也明公焉以爲哉太祖乃止魏志曰任城王章葬賜鸞路龍旂虎賁百人如漢東平王故事魏志曰徐邈爲}
