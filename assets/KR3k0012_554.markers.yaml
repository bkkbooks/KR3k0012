  - {type: variant, offset: 4056, length: 1, content: 違, WYG: 為不臣古之明義也自今死亡者皆斂以時服不得兼重又不設牀帳明器窆後復土滿坎不得起墳種樹王隱晉書曰庾峻遺勅子珉曰朝卒暮殯幅巾布衣葬不擇日珉奉遺命殮以時服晉中興書曰劉驎之少有信義去家百餘里有一獨嫗病將死歎息謂人曰誰當埋我唯有劉長史耳何由令知驎之先聞有病故往候之值}
