  - {type: variant, offset: 1597, length: 843, content: 公不臨言無恩禮曰改葬細也故不書惠公之薨也有宋師太子少葬故有闕是以改葬言是以明禮闕故也又曰天子七月而葬同軌畢至諸侯五月同盟至大夫三月同位至士踰月外姻至左傳僖上曰許穆公卒于師葬之以侯禮也男而侯禮加一等凡諸侯薨于朝會加一等諸侯命有三等公為上等侯伯為中等子男為下等死王事加二等於是有以袞斂死王事謂朝天子以命用師袞斂者上公九命服袞也左傳宣上曰葬敬羸旱無麻始用葛茀記禮變之所由第所以引柩殯則有之以備火葬則以下柩雨不克葬禮也禮卜葬先遠日辟不懷也懷思也左傳成上曰宋文公卒始厚葬用蜃炭益車馬始用殉重器備槨有四阿棺有翰檜君子謂華元樂莒於是乎不臣臣治煩去惑者也今二子者君生則縱其惑死又益其侈是棄君於惡何臣之為左傳昭二曰叔孫卒杜洩將以路葬且盡卿禮路王所賜欸孫車南遺謂季孫曰叔孫未乘路葬焉用之且冢卿無路介卿以葬不亦左乎左傳昭三曰鄭簡公卒將為葬除除葬道及游氏之廟游氏子太叔族將毀焉子太叔使其除徒執用以立而無庸毀用毀廟具曰子產過女而問何故不毀乃曰不忍廟也諾將毀矣教毀廟者之辭既如是子產乃使辟之毀之則朝堋弗毀則曰中而堋春秋說題辭曰葬尸下藏也人生於陰含陽充死入地歸所與也宋均注人生陰謂在胞胎中論語先進曰顏淵死門人欲厚葬之子曰不可門人厚葬之子曰回也視予猶父也予不得視猶子也非我也夫二三子也言顏路在聽門人厚葬之白虎通曰周公以王禮葬何以為周公踐祚理政與天同志原天之意子愛周公與文武不異故以王禮爾雅曰葬藏謂之壙宅兆塋域地也說文曰窆葬下棺也史記曰項王已死楚地皆降漢獨魯不下漢乃引天下兵欲屠之為其守禮義為主死節乃持項王頭示魯魯父兄乃降始楚懷王初封項籍為魯公及其死魯最後下故以魯公禮葬項籍彭城史記曰臨江閔王榮以孝景前四年為太子四歲廢為臨江王四年坐侵廟壖為宮上徵榮詣中尉府中尉郅都責訊王王恐自殺葬藍田鷰數萬衘土置冢上百姓憐之又曰郭解姊子負解之勢與人飲強灌之人怒拔刀剌殺解姊子去亡解姊怒曰以翁伯之義人殺吾子賊不得棄其尸於道不葬欲以辱解解使人徵知賊處賊窘自歸具以實告解解曰殺之固當吾兒不直遂去其罪其姨乃收而葬之諸公聞之皆多解之義戰國策曰秦宣, SBCK: 皇}
