  - {type: variant, offset: 399, length: 1030, content: 其意也革急也慶遺封之族子高曰吾聞之也生有益於人死不害於人吾縱生無益於人吾可以死害於人哉我死則擇不食之地而葬我焉不食謂不墾耕又曰國子高曰葬也者藏也藏也者欲人弗得見也是故衣足以飭身棺周於衣土周於槨反壤樹之哉又曰孔子之喪有自燕來觀者舍於子夏氏子夏曰聖人之葬人與人之葬聖人也子何觀焉昔者夫子言之曰吾見封之若堂者矣見若防者矣防形旁殺平上而長見若覆夏屋者矣覆謂茨瓦也夏屋今之門廡也其形傍廣而卑見若斧者矣從若斧者焉馬鬣封之謂也禮記檀弓上曰季武子成寢杜氏之葬在西階之下請合葬焉許之入宮而不敢哭武子曰合葬非古也自周公以來未之有改也吾許其大而不許其細何居命之哭又曰子游問喪具夫子曰稱家之有亡子游曰有亡惡乎齊惡乎齊問豐省之比天子曰有無過禮茍亡矣歛首足形還葬懸棺而封不設碑緯不備禮也人豈有非之者哉又曰宋襄公葬其夫人醯醢百甕禮記檀弓下曰季子皋葬其妻犯人之禾申祥以告曰請庚之申詳子張子也庚償子皋曰孟氏不以是罪予朋友不以是棄予以吾為邑長於斯也買道而葬後難繼也恃寵虐民非也又曰延陵季子適齊於其反也其長子死葬於羸博之間羸博齊地今泰山縣是也孔子曰延陵季子吳之習於禮者也往而觀其葬焉其坎深不至於泉以生恕死其歛以時服既葬封廣輪掩坎其高可隱也輪從也隱據也既封左祖右還其封且號者三曰骨肉歸復於土命也若魂氣則無不之也無不之也還廻而遂行孔子曰延陵季子之於禮其合矣乎又曰子路曰傷哉貧也生無以為養死無以為禮也孔子曰啜菽飲水盡其歡斯之謂孝斂手足形還葬而無槨稱其財斯之謂禮還猶疾也禮記王制曰天子七日而殯七月而葬諸侯五日而殯五月而葬大夫士庶人三日而殯三月而葬尊者舒卑者速春秋傳曰天子七月而葬同軌畢至諸侯五月同盟至大夫三月同位至士踰月外姻至三年之喪自天子達庶人縣封葬不為雨止不封不樹喪不貳事禮記曾子問曰葬引至于堩日有食之則有變乎且不乎堩道也變謂異禮孔子曰昔吾從老聃助葬於巷黨及堩曰有食之老聃曰丘止柩就道右止哭以聽變既明反而后行曰禮也巷黨黨名也反葬丘問之曰夫柩不可以反也日有食之不知其已之遲也則豈如行哉已止也數讀為速老聃曰夫柩不早出不暮宿侵晨夜則近奸寇也見星而行者唯罪人與奔父母之喪者乎日有食之安知其不見星也為無日而慝祚豫止且君子行禮不以人之親痁患痁患病也以人之父母行禮而恐懼其有患害不為也禮記曾子問曰並有喪如之何何先何後並謂父母若親同者同月死孔子曰葬先輕而後重其奠也先重而後輕禮也自啟及葬不奠不奠務於當葬者行葬不哀次不哀次輕於在殯者反葬奠而后辭於殯遂脩葬事殯當為賓聲之誤也辭於賓謂告將葬啟期也其虞也先重而後輕禮也禮記喪大, SBCK: 漢}
