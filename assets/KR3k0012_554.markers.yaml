  - {type: variant, offset: 3812, length: 1, content: 載, SBCK: 禽盗矣問忳所由得馬忳具􅀃其狀并及繡被主人悵然良乆乃曰􅀍隨旋風與馬俱亡卿何隂德而致此二物忳自念有葬書生事因􅀃之并道書生形皃及埋金之處主人大驚號曰是我子也姓金名彦前徃京師不知所在何意卿乃葬之大恩矣乆不報以彰卿德耳忳悉以被馬還之彦父不取又厚遺忳忳辭讓而去後漢書曰范式字巨卿與張元伯爲友元伯窮疾篤同郡郅君章殷子微晨夜省疾視之元伯臨盡歎曰恨不見吾死友㝷而卒式或夢見元伯玄冕垂纓復屣而呼曰巨卿吾以其日死當以爾時葬永歸黄泉子未我忘豈能相及式怳然覺寤悲歎泣下具告太守請徃奔䘮投其葬日馳徃赴之式末及到而䘮巳發引旣至壙將窆而}
