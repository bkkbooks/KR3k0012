  - {type: variant, offset: 3988, length: 5, content: 士眾喜樂鼓, WYG: 舊塋裁買城西數畆地槀葬已賔客故人莫敢弔㑹援妻子草索相連詣闕請罪帝乃出訟書以示之方知所坐上書訴寃前後六上辭甚哀切然後得葬謝承後漢書曰崔瑗為濟北相光禄大夫杜喬為八使循行郡國以贓奏瑗徴詣廷尉瑗乃上書自訟得理出㑹病卒臨終顧命子實曰夫禀天地之氣以生及其終也歸精於天還骨於地何地不可藏形骸勿歸鄉里實奉遺令遂留葬洛陽初崔實父卒摽賣田宅起塜塋立碑頌葬訖資産竭盡因窮困以𣙜酤鬻為業時人多以此譏之實終不改亦取足而已不致盈餘謝承後漢書曰陳寵為廣漢太守先是洛縣城南每隂雨嘗有哭}
