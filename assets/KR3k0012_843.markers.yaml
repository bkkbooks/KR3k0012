  - {type: variant, offset: 344, length: 0, content: '', SBCK: 次起上壽觴九行謁者言罷酒御史執法舉不如儀者輒引去竟朝置酒無敢失禮者髙帝乃曰吾今日知爲皇帝之貴也又曰沛公先入􅀜屯覇上項羽至沛公左司馬曹無傷使人言於羽曰沛公欲王􅀜中羽大怒欲擊之沛公因項伯見羽羽留沛公飲項王項伯東向坐亞父南向坐亞父者范増也沛公北向坐張良西向侍増數目項王舉所佩玉玦示之者三項王黙然項莊入以劒舞欲因擊沛公張良至軍門見樊噲曰甚急今項莊抜劒舞其意常在沛公也噲曰此迫矣臣請入與之同命噲即帶劒擁盾入軍門交㦸之衛士欲止不内噲側其盾以撞衛士仆地噲遂披帷西向而立瞋目視項王項王按劒而跽曰客何爲者良曰沛公叅乗樊噲也王曰壯士賜之巵酒則與斗巵酒樊噲飲之王曰賜之􅇾肩則有一生􅇾肩噲覆盾於地拔劒切而㗖之王曰壯士能復飲乎曰臣死}
