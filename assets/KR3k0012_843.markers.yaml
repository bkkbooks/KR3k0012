  - {type: variant, offset: 210, length: 2, content: 宜稷, SBCK: 爲酒非以爲禍也而獄訟益繁則酒之流生禍也以榖食犬豕曰豢爲作也言豢豕作酒本以饗祀養賢而小人飲之善醉以致獄訟是故先王因爲酒禮壹獻之禮賔主百拜終日飲酒而不得醉焉此先王之所以備酒禍也壹獻士飲酒之百拜以喻多禮又坊記曰子云觴酒豆肉讓而受惡民猶犯齒}
