  - {type: variant, offset: 254, length: 6, content: 於冰故祭其神, SBCK: 謂廟中助􅀕親事者也廟中有事者爲榮二曰昔酒乆成而色白謂舊醳之酒與無事飲之三曰清酒冬醸夏成味醇厚史記曰秦繆公亡善馬歧下野人共得而食之者三百餘人逐得欲法之公曰君子不}
  - {type: variant, offset: 254, length: 0, content: '', WYG: 二日昔酒三曰清酒史記曰秦穆公亡善馬岐下野人共得而食之者三百餘人逐得欲法之公曰君子不以畜害人吾聞食善肉不飲酒傷人乃皆賜酒而赦之又曰髙帝除秦苛法為簡易羣臣飲酒爭功帝患之叔孫通知上益厭也説上願與諸弟子共起朝儀漢七年長樂宫成羣臣皆朝十月復置法酒諸將侍坐殿上皆叙以尊卑次坐起上壽觴九行謁者言罷酒御史執法舉不如儀者輙引去竟朝置酒無敢失禮者髙帝乃曰吾今日知為皇帝之貴也又曰沛公先入闗屯㶚上項羽至沛公左司馬曹無傷使人言}
  - {type: page-break, offset: 254, content: '', id: KR3k0012_WYG_843-6b, image: WYG0900/WYG0900-0451b.png}
  - {type: variant, offset: 254, length: 3, content: 於冰故, krp: 謂廟中助}
  - {type: variant, offset: 255, length: 3, content: 冰故祭, WYG: 項羽曰沛公欲王闗中羽大怒欲擊之沛公因項伯見羽羽留沛公飲項王項伯東向坐亞父南向坐亞父者范増也沛公北向坐張良西向侍増數目項王舉所佩玉玦示之三項王黙然項莊入以劔舞欲因擊沛公張良至軍門見樊噲曰甚急今項莊㧞劔噲擁盾入軍門交㦸之衛士欲止不内噲側}
  - {type: page-break, offset: 255, content: '', id: KR3k0012_WYG_843-7a, image: WYG0900/WYG0900-0451c.png}
