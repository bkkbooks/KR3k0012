  - {type: variant, offset: 214, length: 0, content: '', SBCK: 莊公二十二年曰陳公子完奔齊桓公使爲正卿辭使爲工正飲桓公酒樂公曰以火繼之辭曰臣卜其晝未卜其夜不敢君子曰酒以成禮不繼以􅁋義也夜飲爲滛樂也以君成禮弗納於􅁋仁也又宣公上曰晉侯飲趙盾酒伏甲將攻之其右提弥明知之右車右趍曰臣侍君宴過三爵非禮也遂扶以下又成公下曰鄢陵之戰楚王召子反謀􅂖陽堅獻飲於子反子反醉而不能見糓陽子反内竪王曰天敗楚也夫余不可以待乃宵遁又襄公二十三年曰季武子無適子公彌長而愛悼子欲立之訪於臧紇曰飲我酒吾爲子立之季氏飲大夫酒臧紇爲客爲上賔旣獻巳獻酒臧孫命北面重席新樽㓗之酒㓗旣新復㓗召悼子降逆之大夫皆起臧孫下迎悼子及旅而召公鉏獻酬禮畢而通行爲旅使與之齒季孫失色又}
