  - {type: variant, offset: 214, length: 0, content: '', krp: 莊公二十二年曰陳公子完奔齊桓公使爲正卿辭使爲工正飲桓公酒樂公曰以火繼之辭曰臣卜其晝未卜其夜不敢君子曰酒以成禮不繼以淫義也夜飲爲滛樂也以君成禮弗納於淫仁也又宣公上曰晉侯飲趙盾酒伏甲將攻之其右提弥明知之右車右趍曰臣侍君宴過三爵非禮也遂扶以下又成公下曰鄢陵之戰楚王召子反謀糓陽堅獻飲於子反子反醉而不能見糓陽子反内竪王曰天敗楚也夫余不可以待乃宵遁又襄公二十三年曰季武子無適子公彌長而愛悼子欲立之訪於臧紇曰飲我酒吾爲子立之季氏飲大夫酒臧紇爲客爲上賔旣獻巳獻酒臧孫命北面重席新樽㓗之酒㓗旣新復㓗召悼子降逆之大夫皆起臧孫下迎悼子及旅而召公鉏獻酬禮畢而通行爲旅使與之齒季孫失色又}
  - {type: punctuation, offset: 216, content: 》, id: KR3k0012_CHANT_843-bkkpn109}
  - {type: variant, offset: 216, length: 0, content: '', SBCK: 十二年曰晉侯以齊侯宴中行穆子相穆子苟呉投壷晉侯先穆子曰有酒如淮有肉如坻淮水名坻山名寡君中此爲諸侯師中之齊侯舉矢曰有酒如澠有肉如陵寡人中此與君代興代更也亦中之又哀公下曰齊子我夕夕視事陳逆殺人逢之遂執以入陳氏方睦使疾而遺之潘沐備酒肉焉使詐病内潘沐并得酒􅁏潘沐可以沐頭饗守囚者醉而殺之而逃又曰衛侯占夢嬖人以能占夢見愛求酒於大叔僖子僖子大叔遺不得與卜此人比而告曰君有大臣在西南隅弗去懼害託占􅁲夢而言乃逐大叔遺遺奔􅀳毛詩國風曰十月穫稻爲此春酒以介眉夀又小雅魚藻曰王在在鎬豈樂飲酒箋云豈亦樂而天下平安萬物得其姓武王何所處乎處於鎬京樂八音之樂與群臣飲酒而巳又小雅曰伐木許許釃酒有藇以筐曰釃以數日湑藇美貌又曰有酒湑我無酒酤我湑莤之也酤一􅀫酒也箋云酤買也此族人東王之思也王有酒則沛莤之王無酒酤買之要欲厚於族人尚書酒誥曰乃穆考文王肇國在西土厥誥毖庻􅀖庻士越少正御事朝夕曰祀兹酒文王告衆國衆土朝夕勑之唯􅀕祀用此酒不常飲惟天降命肇我民惟元祀天降威我民用大亂䘮徳亦罔非酒惟行越小大􅀖用䘮亦罔非酒惟辜文王誥敎小子有正有事無彛酒越庻國飲惟祀德將無醉自成湯咸至于帝乙成王畏相惟御事厥棐有恭不敢自暇自逸矧}
