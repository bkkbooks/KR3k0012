  - {type: variant, offset: 258, length: 2, content: 其神, krp: 親事者也廟中有事者爲榮二曰昔酒乆成而色白謂舊醳之酒與無事飲之三曰清酒冬醸夏成味醇厚史記曰秦繆公亡善馬歧下野人共得而食之者三百餘人逐得欲法之公曰君子不}
