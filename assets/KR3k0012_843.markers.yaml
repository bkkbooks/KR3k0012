  - {type: variant, offset: 203, length: 1, content: 內, SBCK: 酌曰調飲斯又酌堂上北靣坐飲之降趍而岀三酌皆罰平公呼而進之曰蕢曩者爾心或開予是以不與爾言謂始來入時開謂諌争有所發爾飲曠何也曰子夘不樂紂以甲子死桀以乙夘亡王者謂之疾日不以舉樂爲吉事所以自戒懼知悼子在堂斯其爲子夘也大矣言大臣䘮重於疾日也曠也大師也不以詔是以飲之也詔告也師典奏樂爾飲調何也曰調也君之䙝臣也爲一飲一食忘君之疾是以飲之也言調貪酒食褻嬖也近臣亦當規君疾憂爾飲何也曰蕢也宰夫也非刀􅎅是共又敢與知防是以飲之也防禁放盗又玉藻曰君子之飲酒也受一爵而色洒如也洒如肅敬貌二爵而言言斯言言和敬貌禮巳三爵而油油油油􅀃敬貌以退禮飲過三爵}
  - {type: page-break, offset: 203, content: '', id: KR3k0012_SBCK_843-2b}
  - {type: variant, offset: 203, length: 1, content: 內, WYG: 酌曰調飲斯又酌堂上北靣坐飲之降趨而出三酌皆罰平公呼而進之曰蕢曩者爾心或開予是以不與爾言謂始来入時開謂諫爭有所發爾飲曠何也曰子卯不樂紂以甲子死桀以乙夘日亡王者謂之疾日不以舉樂為吉事所以自戒懼知悼子在堂其為子夘也大矣曠也太師也不以詔是以飲之也爾飲調何也曰調也君之䙝臣也為一飲一食忘君之疾是以飲之也言調飲酒食䙝嬖也近臣亦當䂓君疾憂爾飲何也曰蕢宰夫也非刀匕是供又敢與知防是以飲之也又玉藻曰君子之飲酒也受一爵而色洒如也洒如肅敬貎二爵而言言斯言言和敬也禮已三爵而油油油油説敬也以退禮飲過三爵}
