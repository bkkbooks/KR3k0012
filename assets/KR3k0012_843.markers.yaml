  - {type: variant, offset: 261, length: 0, content: '', SBCK: 畜害人乃赦之又曰髙帝除秦苛法爲簡易羣臣飲酒争功髙帝患之叔孫通知}
  - {type: variant, offset: 261, length: 4, content: 上黍春秋, WYG: 撞衛士仆地噲遂披帷西向而立瞋目視項王按劍而跽曰客何為者良曰沛公􅆖乗樊噲也王曰壯士賜之巵酒與斗巵酒樊噲飲之王曰賜之彘肩則有一生彘肩噲覆盾於地㧞劔切而㗖之王曰壯士復能飲乎曰臣死且不避巵酒焉足辭又曰曹參代蕭何為相惟遵何約束日夜飲醇酒卿大夫及賔客見參不事事皆欲言至者參輙飲醉之終莫得言丞相舎後園近吏舎吏舎日飲歌呼従吏惡之無如之何乃請參逰園中聞吏醉歌呼従吏請按之參乃取酒張坐飲亦歌呼又曰髙祖過沛置酒自擊筑為歌使沛子弟}
