  - {type: variant, offset: 213, length: 1, content: 傳, WYG: 𫝊莊公二十二年曰陳公子完奔齊桓公使為正卿辭使為工正飲桓公酒樂公曰以火繼之辭曰臣卜其晝未卜其夜不敢君子曰酒以成禮不繼以淫義也夜飲為滛樂也以君成禮弗納於滛仁也左𫝊宣公曰晉侯飲趙盾酒伏甲將攻之其右提彌明知之右君右登曰臣侍君宴過三爵非禮也遂扶以下又成公下曰鄢陵之戰楚王召子反謀榖陽豎獻飲於子反子反醉而不能見榖陽子反内豎王曰天敗楚也夫余不可以待乃宵遁又襄公二十三年曰季武子無適子公彌長而愛悼子欲立之訪於臧紇曰飲我酒吾為子立之季氏飲大夫酒臧紇為客為上賔既獻已獻酒臧孫命北面重席新樽潔之召悼子降逆之大夫皆起臧紇下迎悼子及旅而召公鉏使與之齒季孫失色又}
