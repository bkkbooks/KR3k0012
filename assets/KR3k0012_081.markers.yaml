  - {type: variant, offset: 3468, length: 297, content: 女嬰水大之怪為人之害者北狄之地有凶水者也繳大風於青丘之澤大風大鷙鳥也激以石磎繳擊矢射之青丘東方丘上射十日羿射日中曰墮中鳥羽而下殺窫音乾窳音庾窫窳狀如龍庾人齒食人也斷脩虵於洞庭洞庭南方水也其虵食象三歲而其骨出也禽封豕於桑林封豕大彘也桑林湯禱旱地萬民皆喜置堯為天子也又曰堯王天下而憂不解授舜而憂乃釋說苑曰河間獻王曰堯存心於天下有一人飢曰我飢之也有一人寒曰我寒之也一民有罪曰我陷之也仁而立德愽而化廣故不賞而人勸不罰而人治先生而後殺是堯道也楊子法言曰堯能則天者以其能臣二聖二聖舜禹也又曰堯舜之德輕於鴻毛潛夫論曰堯舜之德譬猶偶燭施明於幽室也前燭照之後燭益明非前燭昧後燭彰也乃二燭相因而成大光荀悅申鑒曰思唐, SBCK: ''}
