  - {type: variant, offset: 2277, length: 6, content: 人欣欣焉人樂, SBCK: 貢善啇周之君天下也使天下貢財公孫􅀪曰舜牧羊於黄河遇堯舉爲天子陸賈新語曰舜藏黄金於嶄巖之山􅂢珠玉於五湖之淵以塞􅁋邪之欲淮南子曰舜之時共工振滔鴻水滔漫之共工炎帝之後隨髙堙下壅百川以爲民害以薄空桑空桑地名在魯龍門未開吕梁未發江淮通流四海涬溟民皆上丘陵赴樹木舜乃使禹䟽三江五湖決伊闕導􅈆澗通溝洫注之東海鴻水漏九州乾萬民皆寜}
