  - {type: variant, offset: 3766, length: 272, content: 於上世瞻仲尼於中古乃知小道足羞也譙子法訓曰唐虞之衣裳文法禹稷之溝洫耕稼人至今被之袁子法書曰堯避舜於濟陰今定陶有堯冢信乎符子曰許由謂堯曰坐于華殿之上面雙闕之下君之榮願亦已足矣夫堯曰坐于華殿之上森然而松生于棟余立於櫺扇之內霏焉而雲生于牖雖面雙闕無異乎崔嵬之冠蓬萊雖背墉墎無異乎廻巒之縈崑崙余安知其所以不榮鄧析言曰古詩云堯舜至聖身如脯腊桀紂無道肌膚三尺夢書曰堯夢龍上天舜夢擊天鼓續述征記曰城陽縣有堯塚自漢晉二千石乃丞尉刊名甚眾堯即位至永嘉三年二千七百二十有一載記于堯碑魏陳王曹植帝堯贊曰火德統位父則高辛克流共工萬國同塵調適陰陽其惠如春巍巍成功則天之神, SBCK: ''}
