  - {type: variant, offset: 144, length: 3, content: 佐顓頊, SBCK: 使禹攝政攝五年有苗氏叛南征崩于鳴條年百歳殯以瓦棺葬蒼梧九疑山之陽是爲零陵謂之紀市在今營道縣下有群象爲之耕雒書靈准聽曰有人方靣日衡重華衡有􅇧表如日也眉上曰衡重華重童子握石椎懷神珠椎讀曰錘錘平輕重也握謂如琁璣玉衡之道懷神珠喻有聖性也西王母受益地圖西王母西荒之國也在西方得此益地之圖來獻舜受終鳯皇儀黃龍感朱草生蓂莢孳尚書舜典曰愼徽五典五典克從納于百揆百揆時序賔于四門四門穆穆納于大麓烈風雷􅀨不迷帝曰咨尓舜詢事考言乃言底可績}
