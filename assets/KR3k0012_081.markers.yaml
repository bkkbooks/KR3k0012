  - {type: variant, offset: 141, length: 0, content: '', SBCK: 執干戚而舞之有苗請服立誹謗之木申命九官十二牧及殳斨朱虎熊羆等二十五人三載一考績黜陟幽明於是俊乂在官群后德讓百僚師師以五采章施于五色之服以六律五聲八音恊治蒸民乃粒萬􅀖作乂庶績咸熈乃作大韶之樂簫韶九成鳯皇來儀擊石拊石百獸率舞故孔子稱韶盡美矣又盡善也景星曜於房群瑞畢臻德􅀍天下􅀄舜旣踐帝位而父瞽瞍尚存舜常戴天子車服而朝焉天下大之故曰大舜都乎咸陽或營蒲坂嬀汭嬪于虞故因號有虞氏有二妃元妃娥皇無子次妃女英生啇均次妃登北氏生二女霄明燭光有庶子八人皆不肖故以天下禪禹舜年八十一即真八十三而薦禹九}
