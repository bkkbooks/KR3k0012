  - {type: variant, offset: 337, length: 2, content: 高辛, SBCK: 重華好學孝友聞於四方陶家事親寛􅁉温良教而知時畏天而愛民恤逺而親親世以孝聞於天地三十在位嗣帝所五十乃死葬于蒼梧之野禮記曰舜作五絃之琴以歌南風又曰舜其大智也與德爲聖人尊爲天子冨有四海之内宗廟饗之子孫保之又曰舜其大智也與舜好問而好察邇言隱惡而􅀭善執其兩端用其中於民其斯以爲舜乎邇近也近言而善易以進人察而行之也兩端過與不及也用其中於民賢與不肖皆能行之也斯比也其德如此乃号爲舜舜之言充也又曰子曰之後丗雖有作者虞帝弗可及也矣君天下生無私死不厚其子子民如父母有􅉃怛之愛有忠利之教禮含文嘉曰舜損已以安百姓樂動聲儀曰孔子曰簫韶者舜之遺音也温潤以和似南風之至其爲音如寒暑風􅀨之動物如物之動人雷動獸含風􅀨動魚龍仁義動君子財色動小人言樂之動人也􅀷故舉見事以爲喻是以聖人務其夲春秋演孔圖曰舜目四童謂之重明承乾乾踵堯海內冨昌童童子也踵猶履也履其所行也春秋運斗樞曰舜以太尉受號即位爲天子五年二月東廵狩至于中月與三公諸侯臨觀太尉公官名也唐虞五載一廵狩中月月半也臨觀河月或爲舟以也黃龍五彩􅀒圖出置舜前圖以黃玉爲匣如櫃長三尺廣八寸厚一寸四合而連有户此含樞紐之命故龍匣黄也四合有撗道相合也有户言可開闔白玉撿黃金繩芝爲􅅺封兩端章曰天黃帝符璽五字廣袤各三寸􅀷四分鳥文文字也四或爲三舜與大司空禹臨侯望愽等三十人集發大司空公官名臨候國}
  - {type: page-break, offset: 337, content: '', id: KR3k0012_SBCK_081-3b}
