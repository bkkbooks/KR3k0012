  - {type: punctuation, offset: 2819, content: 《, id: KR3k0012_CHANT_081-bkkpn804}
  - {type: variant, offset: 2819, length: 229, content: 孟子曰堯使九男二女事舜也又曰堯以天下讓於子州支父對曰以我為天子猶之可也雖然適有幽憂之病方將治之未暇在天下也幽隱也詩曰如有隱憂天下重物也而不以天下害其生者故可託天下淮南子曰堯之治天下也舜為司徒契為司馬禹為司空后稷為大田師奚仲為工其導萬民也水處者魚山處者木谷處者牧陸處者農地宜其事事宜其械械宜其用用宜其人澤皇織罔陵阪耕田得以所有易所無以工易所拙是故離叛者寡而聽從者眾譬若播棊於地負者走室方者處高各從其所安又曰人之所以樂為天子者以窮耳目之欲而適身體之便也今高臺層榭, SBCK: 東夷}
