  - {type: variant, offset: 12, length: 0, content: '', WYG: 虞舜名重華冀州人也作什器於夀丘就時於負夏舜父頑母嚚弟象傲皆欲殺不可得即求常在側舜耕厯山厯山之人皆讓畔漁雷澤雷澤之人皆讓居陶河濵河濵器不苦窳堯乃賜舜絺衣與琴為築倉廪予牛羊舜舉八愷使主后土以揆百事舉八元使布五教于四方臯陶為大理平民各伏得其實伯夷主禮上下咸讓垂主工師百工致功益主虞山澤辟棄主稷百榖時茂契主司徒百姓親和龍主賔客逺人至四海咸戴}
