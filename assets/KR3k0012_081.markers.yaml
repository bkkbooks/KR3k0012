  - {type: variant, offset: 2287, length: 15, content: 堯治天下之民平海內之政往見四子, krp: 昔者舜耕于歴山歴山在濟隂成陽朞年而田者爭處磽硧以封畔肥饒相讓也釣}
  - {type: variant, offset: 2292, length: 291, content: 民平海內之政往見四子於姑射之山汾水之陽窅然喪其天下四子許由齧缺披衣王倪也窅然猶幽然自失之貌言堯以有事之心至於無為之人故亦無所用也又曰堯觀于華封華封人曰嘻請祝聖人使聖人壽使聖人富使聖人多男子堯曰多男子則多懼多富則多事多壽則多辱封人曰夫聖人鶉居鷇音扣食鳥行而無章天下有道則與物皆昌天下無道則脩德就間千歲厭世去而上仙乘彼白雲至于帝鄉三患莫至身常無殃又曰堯治天下伯成子高立為諸侯及堯授舜舜授禹子高辭為諸侯而耕禹往見之曰堯治天下吾子立為諸侯堯授舜舜授余吾子辭之敢問何也子高曰昔堯治天下不賞而人勸不罰而人畏子今賞罰而人且不仁德自此衰刑自此立後世之亂自此始矣無落吾事俋俋音蟄乎耕而不顧尸子曰人之言, WYG: ''}
