  - {type: variant, offset: 337, length: 2, content: 高辛, WYG: 重華好學孝友聞於四方陶稼事親寛裕温良教而知時畏天而愛民恤逺而親親世以孝聞于天下三十在位嗣帝位三十九年乃死葬于蒼梧之野禮記曰舜作五絃之琴以歌南風之詩又曰舜其大孝也與德為聖人尊為天子富有四海之内宗廟饗之子孫保之又曰舜其大智也與舜好問而好察邇言隠惡而揚善執其兩端用其中于民其斯以為舜乎邇近也近言而善易以進人察而行之也兩端過與不及也用其中于民賢與不肖皆能行之也斯此也其德如此乃號為舜而克成其志也又曰子曰後世雖有作者虞帝弗可及也矣君天下生無私死不厚其子子民如父母有惻怛之愛有忠利之教禮含文嘉曰舜損己以安百姓樂動聲儀曰孔子曰簫韶者舜之遺音也温潤以和似南風之至其為音如寒暑風雨之動物如物之動人雷動禽獸風雨動魚龍二儀動君子財色動小人言樂之動人也深故舉見事以為喻是以聖人務其本春秋演孔圖曰舜目四瞳謂之重明承乾踵堯海内富庶瞳瞳子也踵猶履也履其所行也春秋運斗樞曰舜以太尉受號即位為天子五年二月東巡狩至于中月與三公諸侯臨觀太尉公官名唐虞五載一巡狩中月月半也臨觀為舟以泛于河中也黄龍五彩負圖出置舜前圖以黄玉為匣如櫝長三尺廣八寸厚一寸四合而連有户此含樞紐之命故龍匣黄也四合百橨道相合也有户言可開闔也白玉檢黄金繩之為泥封兩端章曰天黄帝符璽五字廣袤各三寸深四分鳥文文字也四或為三舜與大司空禹臨侯望博等三十人集發大司空公官名臨侯國}
