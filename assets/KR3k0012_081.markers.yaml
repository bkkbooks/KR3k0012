  - {type: variant, offset: 346, length: 0, content: '', SBCK: 舜相堯去四凶旋四門穆穆也論語比考䜟曰堯舜等昇首山觀河渚有五老遊於河渚相謂曰河圖將來告帝期五老流星上入昴有頃赤龍􅀒玉苞舒圖出堯與大舜等共發曰帝當摳百則禪虞百年而禪與舜堯喟然歎曰咨爾舜天之歷數在爾躬孔叢子曰舜身六尺有竒靣頷無毛亦聖也朝子曰歷山農者侵畔舜徃而耕者讓河濵漁者爭坻舜徃朞年而漁者讓長東夷之陶者窳舜徃陶朞年而器以牢墨子曰堯舉舜於服澤之陽孟子曰雞鳴而起孳孳爲善者舜之徒也雞鳴而起孳孳爲利者跖之徒又曰堯之於舜使}
