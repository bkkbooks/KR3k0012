  - {type: variant, offset: 3050, length: 2, content: 所麗, krp: 生於桃丘嬀水之汭損石之東舊說言舜上虞人}
  - {type: variant, offset: 3051, length: 435, content: 麗也而堯採椽不斷斥題不枅言梁柱相斥矩不著枅櫨也珍怪奇味人之所美也堯糲梁之飯藜藿之羹文錦狐白人之所好也而堯布衣掩形鹿裘禦寒養生之具不加厚而增之以大任重之以憂故舉天下而傳之舜若解重負然非直辭讓也又曰堯治天下政教平德潤洽在位七十載乃求所屬天下之統今四嶽楊側陋四嶽舉舜而薦之堯堯乃妻以二女以觀其內任以百官以觀其外既入大麓烈風雷雨不迷林屬於山曰麓堯使舜入林麓之中遭大風雨不迷也乃屬以九子堯有九男贈以昭華之玉而傳天下焉又曰堯之有天下也非貪萬民之富也而寧人主之位也以為百姓力屈強弱相乘眾寡相暴於是堯乃身服節儉之行而明相愛之仁以和輯之是故茅茨而不剗采椽而不斷大路不畫大路天子車也越席不綠越席束蒲序也大羹不和無五味也粢飯不鑿巡狩行教勤勞天下周流五嶽豈其奉養不足樂哉舉天下以為社禝非有利焉年衰志閔舉天下之重而傳之舜也猶卻行而釋蹤也又曰堯之時十日並出燋禾穗殺草木而民無所食窫窳九嬰大風封豕鑿齒於疇華之澤疇華南方澤也鑿齒獸持戈楯羿持弓箭射殺也殺九嬰於凶水之上女嬰水大之怪為人之害者北狄之地有凶水, WYG: 謂損石}
