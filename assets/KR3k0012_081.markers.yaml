  - {type: variant, offset: 409, length: 1, content: 獲, SBCK: 後舉之加諸上位又曰舜生於諸馮遷於􅀒夏卒於鳴條東夷之人也諸馮􅀒夏鳴條皆地名也􅀒夏在海東方夷之地故曰東夷之人也又曰舜之飯糗茹草也􅀂將終身焉及其爲天子也􅀍袗衣鼔琴二女果􅀂固有之袗衣􅀞繪者也此言舜窮居之時􅀂將終身及其爲萬乗之主􅀍服繪繡􅀂固常自所有也分定使之然也又曰舜之居􅀷山之中也與木石居與鹿豕遊其所以異於􅀷山之野人者幾希舜耕歷山之時居山之間折豕近人􅀂與人遊希逺也當此之時舜與野人相去豈逺哉及其聞一善言見一善行􅀂決江河沛然莫之能禦也又曰舜流共工于幽州放驩兠于崇山殺三苗于三危殛鯀于羽山四罪而}
