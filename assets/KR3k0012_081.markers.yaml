  - {type: variant, offset: 139, length: 0, content: '', SBCK: 徳始遷於夏於頓丘責於傳虚家本冀州每徙則百姓歸之其母早死瞽瞍更娶生象象傲而父頑母嚚咸欲殺舜舜能和諧大杖則避小杖則受年二十始以孝聞堯以二女娥皇女英妻之見舜於貳宫設饗禮迭爲賔主南面而問政命爲司徒太尉試以五典有大功二十夢眉長與髮等堯乃賜受以昭華之玉老而命舜代巳攝政明年正月上日始受終于文祖太尉行事堯崩三年䘮畢以仲冬甲子月次于畢始即眞以土代火色尚黃乃詢四岳闢四門明四目逹四聦東廵狩登南山觀河渚受圖書表賜群臣尊伯禹稷契皐繇皆益地有苗氏􅀒固不服禹請征之舜曰我}
  - {type: page-break, offset: 139, content: '', id: KR3k0012_SBCK_081-2a}
  - {type: variant, offset: 139, length: 0, content: '', WYG: 徳始遷於負夏販於頓丘債於傅虚家本冀州每徙則百姓歸之其母早死瞽瞍更娶生象傲而父頑母嚚咸欲殺舜舜能和諧大杖則避小杖則受年二十始以孝聞堯以二女娥皇女英妻之見舜於貳宫設饗禮送為賔主南面而問政為司徒太尉試以五典有大功二十夢眉長與髮等堯乃賜舜以昭華之玉老而命舜代已攝政明年正月上日始受終于文祖太尉行事堯崩三年喪畢以仲冬甲子月次于畢始即真以土承火色尚黄乃詢四岳闢四門明四目達四聰東巡狩登南山觀河洛受圖書褒賜羣臣尊任伯禹稷契臯陶伯益時有苖氏負固不服禹請征之舜曰我徳不厚行武非道也吾其敷吾}
