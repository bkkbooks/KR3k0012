  - {type: variant, offset: 432, length: 314, content: 帝俈戴干是謂清明發節移蓋像招搖干楯也招搖為天戈楯相副戴之像見天中以為表古史考曰高辛氏或曰房姓以木德王張顯析言曰高辛氏初生自言其名其君民終無迷謬魏陳王曹植帝嚳贊曰祖自軒轅玄囂之裔生言其名木德帝世撫寧天地神靈察教弭四海明並日月帝摯帝王世紀曰帝摯之母於四人之中其班最下而摯年兄弟最長故得登帝位封異母弟放勛為唐侯摯在位九年政軟弱而唐侯德盛諸侯歸之摯服其義乃率其群臣造唐朝而致禪因委至心願為臣唐侯於是知有天命乃受帝禪而封摯於高辛氏事不經見漢故議郎東海衛宏所傳云爾帝堯陶唐氏帝王世紀曰帝堯陶唐氏祁姓也母曰慶都孕十四月而生堯於丹陵名曰放勛或從母姓伊祁氏年十五而佐帝摯授封於唐為諸侯身長十尺常夢攀天而上之故年二十而登帝位以火承木都平陽置敢諫之鼓, SBCK: ''}
