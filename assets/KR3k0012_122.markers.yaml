  - {type: variant, offset: 892, length: 205, content: 諺性貪賜布百匹令自負而歸以愧其心十五年八月皝因見白兔馳射馬倒輦而還宮引太子儁囑以後事謂曰今中原未平方須經建委賢任哲此其時也恪智勇兼濟方堪任重汝其委之以成吾志九月薨于承乾殿年五十二冬十月葬龍山謚文明王儁稱尊追尊曰文明皇帝廟號太祖陵曰龍平晉書曰皝嘗田于西鄙將濟河見一老父服朱衣乘白馬舉手麾皝曰此非獵所王其還也祕之不言遂濟河連日大獲後見白兔馳射之馬倒被傷乃說所見輦而還宮引儁囑以後事以永和四年死在位十五年慕容儁崔鴻十, WYG: 李昉等撰偏覇部}
