  - {type: variant, offset: 750, length: 20, content: 大將軍燕王餘如故封諸功臣百餘人九月遷都龍, krp: 配兵五萬拒冲暉師敗績堅又以尚書姜宇與符琳率衆三萬擊冲于霸上爲冲所敗宇死之琳中流矢冲遂據阿房}
