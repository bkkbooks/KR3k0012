  - {type: variant, offset: 192, length: 581, content: 儀之德繼三光之容遂以慕容為姓廆身長八尺有大度晉安北將軍張華一見奇之謂曰君後必為命世之器匡難濟時者也涉卒弟耐立將謀殺廆廆亡潛於遼東徐郁家太康元年國人殺耐迎廆立之太康十年又還于徒河之青山元康四年定都大棘城所謂紫蒙之邑也永嘉六年王沉承制以廆為散騎常侍冠軍將軍前鋒大都督大單于皆讓不授擢舉賢才官方授任魯國孔纂宿德清望請為賓友平原劉讚儒學洽通為東牟祭酒世子率國冑受業焉太興四年晉遣謁者拜廆使持節督幽平東夷諸軍事車騎將軍平州牧封遼東郡公丹書鐵券承制海東咸和元年加侍中特進八年夏五月薨于文德殿年六十五葬於青山晉遣使者贈車騎大將軍開府儀同三司謚襄公皝為燕王追謚武宣王儁稱尊追尊武宣帝廟號高祖晉書曰廆在位四十九年慕容皝崔鴻十六國春秋前燕錄曰慕容皝字元真廆第二子小字萬年長七尺八寸雄毅善權略博學多才藝晉建武元年拜振武將軍永昌初拜左賢王太寧末拜平北將軍朝鮮公咸和八年六月即遼東公位行平州刺史督攝部內九年八月晉遣謁者拜皝鎮軍大將軍平州刺史大單于遼東公承制一如廆故事二年七月立子儁為世子四年以左司馬封弈為左長史九月弈等以皝任重位輕宜稱燕王於是上議十月僣即燕王位于文德殿大赦境內改備郡司以封弈為相國追尊先公為武宣王先妣為王后起文昌殿出入警蹕立夫人叚氏為王后世子儁為太子是歲棘城黑石谷有大石自立而行八年七月晉使鴻臚郭恡持節拜皝侍中大都督河北諸軍事大將軍燕王餘如故封諸功臣百餘人九月遷都龍城宮闕, SBCK: ''}
