  - {type: variant, offset: 1093, length: 262, content: 儁崔鴻十六國春秋前燕錄曰慕容儁字宣英皝第二子小字賀賴跋十三月而生有神光之異身長八尺一寸善屬文雅長辭賦至於器服車室皆著銘讚以為勸戒皝之八年晉遣使者拜皝燕王以攜為安北將軍東夷校尉十一年進拜使持節鎮東將軍皝薨即燕王位赦其境內元年春正月儁依春秋列國故事稱元年五月聞趙亂乃嚴兵將為進取之計七月晉使謁者陳沈拜儁侍中河北諸軍事幽冀并平四州牧大將軍燕王承制封拜一如廆皝故事元璽元年正月司南車成儁大悅告于皝廟四月遣輔國恪相國弈討冉閔戰于魏昌廉臺閔師大敗擒送之閔大將軍蔣幹輔閔子智固守鄴城遣輔弼評等帥騎一萬以討之鄴北郡縣悉降輔國弈等二百一十人勸, krp: 冲僭}
