  - {type: variant, offset: 3178, length: 0, content: '', SBCK: 于阿房改年更始冲率衆登城堅身貫甲胃督戰拒之飛矢滿身流血􅀍體時雖兵冦危逼馮翊諸堡猶有負粮冒難而至者多爲賊所殺先是言天或導余留汝兼緫戎政勿與爭利吾當出隴収兵運粮}
  - {type: variant, offset: 3178, length: 0, content: '', WYG: 于阿房改年更始冲率衆登城堅身貫甲胄督戰拒之飛矢滿身流血破體時雖兵冦危逼馮翊諸堡壁猶有負粮冐難而至者多為賊所殺先是謠言堅入五將乆長得堅乃留太子宏守長安謂之曰脫如謠言天或導余留汝兼總戎政勿與賊爭利吾當出隴收兵運粮}
  - {type: variant, offset: 3178, length: 22, content: 以副四海之望洪以讖文有草付應王又孫堅之生背有, krp: 謚爲哀平皇帝}
  - {type: variant, offset: 3179, length: 1, content: 副, SBCK: 給汝自將張夫人及中山公詵率􅀐數百出如五將山六月太子宏將母妻數千􅀐出奔冲入據長安堅至五將山姚萇遣將軍呉忠圍之堅衆奔散獨侍御十數人而已神色自􅀂召宰人進食俄而忠執堅以歸新平縣幽之别室萇求傳國璽於堅曰萇次應符曆可以爲惠堅叱之曰小羗乃敢干逼天子豈以傳國璽授汝羗乎五胡次序無汝羗名違天不祥其能乆乎璽巳送晉不可得也萇遣右僕射尹偉􅀃堅求爲堯舜禪代之事堅曰姚萇叛賊柰何擬之古人因問偉曰卿於朕朝作何官對曰尚書令史堅歎曰卿宰相才也王景略之流而朕不知卿云也不亦冝乎八月縊堅於新平佛寺中時年}
  - {type: page-break, offset: 3179, content: '', id: KR3k0012_SBCK_122-8b}
  - {type: variant, offset: 3179, length: 1, content: 副, WYG: 給汝乃自將與張夫人中山公詵率騎數百出如五將山六月太子宏尋将母妻宗室男女數千騎出奔冲入據長安堅至五将山姚萇遣将軍吳忠圍之堅衆奔散獨侍御十數人而已神色自若坐而待之召宰人進食俄而忠至執堅以歸新平縣幽之别室萇求傳國璽于堅曰萇次膺符厯可以為惠堅瞋目叱之曰小羌乃敢于逼天子豈以傳國璽授汝𦍑乎五胡次序無汝羌名違天不祥其能乆乎璽已送晉不可得也萇又遣右僕射尹緯説堅求為堯舜禪代之事堅曰姚萇叛賊柰何擬之古人因問緯曰卿于朕朝作何官對曰尚書令史堅嘆曰卿宰相才王景畧之流而朕不知卿亡也不亦宜乎八月縊堅于新平佛寺中時年}
