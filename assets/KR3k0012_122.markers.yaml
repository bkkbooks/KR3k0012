  - {type: variant, offset: 3133, length: 3, content: 洪洪逆, SBCK: 南裔此行也朕與陽平公之任非諸將之事左右僕射權翼沙門道安陽平公融尚書石越等上書靣諌前後數十堅終不納十九年晉車􅀐􅁊冲率衆十萬攻襄陽遣其前將軍劉波攻河北堅大怒遣其子征南鉅鹿公叡冠軍慕容垂佐衛毛當等將歩卒五萬救襄陽堅下書曰吳人敢恃江山屢冦王境宜時進討以淸宇内便可戒嚴速脩戎備發州民則十丁遣一兵􅀂門在灼然者爲崇文義從朕將登㑹稽復禹績伐國存君義同三王其以司馬昌明爲左僕射謝安爲吏部尚書􅁊冲爲侍中勢還不逺可並爲起第八月戊午遣征南大將軍陽平公融􅀐從張蚝撫軍大將軍髙陽公符方衛軍梁成平南慕容暐冠軍慕容垂歩􅀐二十五萬爲前鋒甲子堅發長安戎卒六十餘萬􅀐二十七萬前後千里九月堅至項城涼州之兵始達咸陽蜀漢之軍順流而下幽兾之衆至于彭城東西萬里水陸齊進融等攻壽春晉遣都督謝石徐州刺史謝􅀇豫州刺史􅁊伊水陸七萬敗堅于淝水堅爲流矢所中單􅀐遁還於淮北頋謂夫人張氏曰朕用朝臣之言豈見今日之事耶何靣目復臨天下􅊄然流涕堅諸軍悉潰及慕容垂一軍獨全比至洛陽百官威儀軍容粗備未及関而垂有貳志說堅請巡撫燕代并求拜墓堅許之權翼固諌以爲不可堅不從堅至自淮南次于長安東之行宫入告罪于太廟丁零翟斌反于河南樂公符丕遣慕容垂及符飛龍討之垂南結丁零殺飛龍盡坑其衆垂引丁零烏丸之衆二十餘萬爲飛梯地道以攻鄴城慕容暐弟􅇦先爲北城長史聞垂攻鄴亡奔􅀜東收諸馬牧鮮卑衆數千還屯華隂暐乃濳使諸弟及宗人起兵于外堅遣將軍強永}
