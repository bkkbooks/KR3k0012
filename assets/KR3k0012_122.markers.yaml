  - {type: variant, offset: 3887, length: 332, content: 目七歲洪戲之問侍者曰吾聞瞎兒一淚信乎侍者曰然生怒引佩刀自刺出血曰此亦一淚耶洪大驚鞭之生曰性耐刀槊不堪鞭捶洪曰汝為爾不已吾將以汝為奴生曰可不如石勒也及長力舉千鈞走及奔馬皇始五年僣即皇帝位大赦改年群臣奏先帝晏駕甫爾不宜改號生怒不從窮推議主壽光元年七月殺右僕射叚純以太子門大天趙韶為僕射太子舍人趙誨為中護軍著作佐郎董榮為尚書竝以佞倖進也九月中書監胡文言於生昆頻有客星孛于大角榮惑入東井大角為帝坐東井秦之分野不出三年國有大喪大臣戮死願陛下遠追周文脩德以攘之生曰皇后與朕對臨天下足塞大喪之變於是殺皇后梁氏誅太傅錄尚書毛貴車騎尚書令梁楞左僕射梁安后安之女孫又誅丞相雷弱兒諸羗悉殺弱兒南安羗酋也生雖諒闇遊飲荒淫殺戮無道彎弓露刃以見朝臣錘鉗鋸鑿備置左右未幾后妃公卿已下至于僕隸誅五, krp: ''}
