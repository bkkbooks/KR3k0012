  - {type: variant, offset: 3132, length: 0, content: '', SBCK: 拒戰于赤岸涼師大潰天錫率􅀐數千奔還姑臧牋降于萇甲午大軍至姑臧天錫素車白馬靣縛舁襯降于軍門萇釋􅅞焚襯送之長安諸郡悉降涼州平九月以梁熈爲西中郎將涼州刺史鎭姑臧徒豪右七千户於􅀜中封天錫重光縣之東寜郷二百户號歸義侯拜比部尚書遷右僕射萇之征也堅爲天錫立第旣至如㱕十三年正月太史奏有星見于外國之分當有聖人之輔中國得之者昌堅聞西域有鳩摩羅什襄陽有釋道安竝遣求之十七年正月不雨至于六月徹樂減膳出宫女以迎和氣八月堅収起居注及著作所録而􅀚之見苟太后李威之事慙怒乃焚其書著作郎董朏音斐雖更書時事然十不留一八年三月徙鄴銅駞銅馬飛廉翁仲于長安十月堅引羣臣於太極殿議曰東南一隅未賔王化今欲起天下兵討之計其兵仗精卒九十七萬吾將先啓行薄}
  - {type: page-break, offset: 3132, content: '', id: KR3k0012_SBCK_122-6a}
  - {type: variant, offset: 3132, length: 0, content: '', WYG: 拒戰于赤岸凉師大潰天錫率騎數千奔還姑臧致牋請降于萇甲午大軍至姑臧天錫乘素車白馬面縳舁櫬降于軍門萇釋縛焚櫬送之長安諸郡縣悉降凉州平九月以梁熙為持節西中郎将凉州刺史鎮姑臧徙豪右七千餘户於關中封天錫重光縣之東寧鄉二百户號歸義侯拜北部尚書遷右僕射初萇等将征天錫堅為其立第於長安至是而居之十三年太史奏有星見於外國之分當有聖人入輔中國得之者昌堅聞西域有鳩摩羅什襄陽有釋道安並遣求之十七年正月不雨至于六月徹樂减膳出宫女以迎和氣八月堅收起居注及著作所録而觀之見茍太后李威之事慙怒乃焚其書著作郎董裴一作裴雖更書時事然十不留一十八年三月徙鄴銅駞銅馬飛廉翁仲于長安十月堅引羣臣於太極殿議曰東南一隅未賔王化今欲起天下兵討之計其精卒九十七萬吾将先啟行薄}
