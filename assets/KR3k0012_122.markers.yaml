  - {type: variant, offset: 2100, length: 265, content: 大赦改元建熙元年以太原王恪為太宰錄尚書行周公事專百揆上庸王評為太傅副贊朝政司空楊騖為太保吳王垂為河南大都督十州諸軍事兗州牧鎮梁國四年正月暐南郊十月太尉弈迎神王和龍初暐委政太宰恪專受經于愽士王勸助教尚鋒祕書郎杜詮竝以明經講論左右至是通諸經祀孔子于東堂以勸為國子祭酒鋒國子愽士詮散騎侍郎其執經侍講皆有拜授八年太宰恪卒九年十二月有神降于鄴自稱湘女有聲與人相接數日而去十年四月立貴妃可朱渾氏為皇后六月晉大司馬桓溫率眾五萬來伐遂至方頭吳王垂大敗之軒獲三萬餘級溫奔還淮南垂既敗溫威德彌振太傅評大不使之太后遂與評謀殺垂十二月垂出奔秦十一年六月秦, krp: ''}
