  - {type: variant, offset: 3138, length: 0, content: '', SBCK: 泓自􅁛大都督雍州牧濟北王推叔父垂爲丞相大司馬兾州牧呉王堅謂權翼曰將􅀂􅇦何翼曰慕容垂正可據山東爲亂不暇近逼今暐宗族盡在京師鮮卑}
  - {type: variant, offset: 3138, length: 0, content: '', WYG: 泓衆遂盛自稱大都督雍州牧濟北王推叔父垂為丞相大司馬冀州牧吳王堅謂權翼曰吾不從卿言使鮮卑至是關東}
