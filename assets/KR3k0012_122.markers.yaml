  - {type: variant, offset: 22, length: 9, content: 廆字弈洛瓌昌黎棘城, krp: 評眞奴才雖億兆之衆尚不足爲慮況數十萬乎今破之必矣甲戌陳於渭原猛誓衆曰王景略受國厚恩任兼内外今與諸君深入賊地冝各勉進不可退也受爵明君之朝慶觴父母之室不亦美乎衆皆勇奮破釡弃糧大呼競進猛望燕師之衆惡之謂鄧羗曰今日之事非將軍莫可以捷也成敗之機在斯一舉羗曰若以司隷見與公無以爲憂猛曰此非吾所及必以安定大守萬户侯相處羗不悅而退俄而兵交猛召羗羗寢而不應猛乃馳就許之羗於是飲與張蚝徐成等跨馬馳入傍若無}
  - {type: punctuation, offset: 23, content: ，, id: KR3k0012_CHANT_122-bkkpn6}
  - {type: 'tls:seg', offset: 23, content: '', id: KR3k0012_CHANT_122-1a.5}
  - {type: substitution, offset: 24, original: 弈, replacement: 奕, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-4140}}
