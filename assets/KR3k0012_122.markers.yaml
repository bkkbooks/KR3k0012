  - {type: variant, offset: 3041, length: 0, content: '', WYG: 旦而為壇於曲沃以授之健泣謂堅曰先王昔受此號汝父次為之今若若汝也復為神明所命可不勉之堅既殺符生永興元年六月去皇帝之號僣稱大秦天王即位太極殿誅董榮等二十餘人改夀光三年為永興元年追尊父為文桓皇帝世子宏為皇太子兄清河王法為丞相東海公從祖永安公侯為太尉從兄晋公桞為尚書令諸王皆貶爵為公封弟融為陽平公雙為河南公子丕為長樂公暉為平原公熙為廣平公叡為鉅鹿公李威為左僕射梁平老為右僕射席寶為丞相長史王猛為中書侍郎權翼為黄門侍郎諸公卿為生所誅者悉復本官十月丞相東海公法以疑忌賜死茍太后之意也堅性友愛與法訣于東堂慟哭嘔血二年四月堅如雍祀五畤音止六月如河東祀后土八月自臨晉登龍門顧謂羣臣曰美哉山河之固權翼對曰吳起有言在德不在險深愿陛下追蹤唐虞懷逺以德山河之固不足恃也堅大悦至韓原觀晉魏顆鬼結草抗秦軍之處賦詩而歸甘露元年正月起明堂禪音善南北郊六月甘露降乃大赦改元八月堅下書曰咸陽内史猛言彰出納所在著績有卧龍之才冝入賛百揆絲綸王言可徵拜侍中中書令領京兆尹丞相鄧羌性鯁直與猛協規齊志于是百僚肅整豪右屏氣風化大行堅歎曰吾今始知天下之有法也以猛為吏部尚書遷太子詹事左僕射猛辭堅曰卿允屬明哲朝野所望豈容致辭所舉融等尋别銓授以苻融等為侍中中書監右僕射任羣為光禄大夫領太子家令朱彤為中書侍郎領太子庶子三年九月鳯皇集于東閣大赦境内初将為赦與左僕射猛右僕射融密議於露堂悉屏左右堅自為赦文猛融進紙筆有一大蒼蠅入自牖間鳴聲甚大集于筆端驅而復來堅惡之乆而乃去俄而長安街巷市里民相告曰官今大赦有司以聞堅驚謂融猛曰事何從而泄於是勑外推窮之咸言有一小人衣黒大呼於市曰官今大赦湏臾不見堅嘆曰其向蒼蠅乎聲状非常吾固惡之四年七月黄龍見於成紀梁山崩五年白虎見天水六年遣鴻臚拜張天錫為大将軍凉州牧西平公建元元年正月雍州秀才段鏗對策上第拜吏部郎中孝㢘通經者十餘人皆拜令長五年六月晉大司馬桓温伐燕次于枋音方頭燕師屢敗遣散騎侍郎樂嵩乞師于堅請割虎牢以西之地八月遣将軍茍池洛州刺史邵羌帥步騎救燕温敗歸是月京兆尹王攸上書獻十畧一曰君道宜明二曰臣尚忠敬三曰子貴孝養四曰民生在勤五曰敎無偏黨六曰養民在惠七曰延聘耆賢八曰懲惡顯善九曰伐叛討逆十曰易簡𢎞大堅納之以攸為諌議大夫十一月燕車騎吳王垂來奔桓溫既走慕容暐音葦悔割河洛之地以賂秦乃曰行人失辭分灾救患理之常也堅大怒六年令輔國王猛帥鎮南楊安虎牙将軍張蚝音次建節鄧羌等步騎六萬討平燕冀八月猛攻尅壺關暐遣太傅上庸王評等帥四十萬屯於潞川猛覘丑艷切覘候也知評賣水鬻薪不撫将士有可乘之會大笑謂楊安等曰慕容評真奴才雖億兆之衆尚不足為慮况數十萬乎今破之必矣甲子陳於渭原猛誓衆曰王景畧受國厚㤙任兼内外今與諸君深入賊地宜各勉進不可退也受爵明君之朝慶觴父母之室不亦美乎衆皆勇奮破釡棄粮大呼兢進猛望評師之衆惡之謂鄧羌曰今日之事非将軍莫可以捷也成敗之機在斯一舉将軍其勉之羌曰若以司隸見與者公無以為憂猛曰此非吾所及也必以安定太守萬戸侯相處羌不悦而退俄而兵交猛召羌寝而不應猛乃馳就許之於是大飲帳中與張蚝徐成等跨馬運矛馳入評軍出入數四傍若無人搴音愆又居輦切舉也旗斬将殺傷甚衆戰及日中燕敗績進圍鄴堅帥精銳向鄴七日至安陽過舊閭引諸耆老語及祖父舊事泫然}
