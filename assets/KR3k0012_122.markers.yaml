  - {type: variant, offset: 453, length: 0, content: '', krp: 兾州牧鎭鄴封清河郡侯以僞太宰恪太傅評之第盡賜之加美妾五人上女妓十人中女妓}
  - {type: variant, offset: 454, length: 0, content: '', krp: 十八人猛辭堅曰昔魏絳和戎猶有金石絲竹之賞山甫翼周實受四牡之錫卿功超二子任過管葛安得辭也其敬受之無逆朕命以鄧羗爲散騎常侍安定太守眞定郡侯邑三千户賞潞川之功七年七月堅如洛陽下書曰士死知己猶來格模故喬公一言魏祖追慟趙}
  - {type: punctuation, offset: 455, content: ，, id: KR3k0012_CHANT_122-bkkpn87}
  - {type: 'tls:seg', offset: 455, content: '', id: KR3k0012_CHANT_122-1a.78}
  - {type: variant, offset: 455, length: 2, content: 謚襄, krp: 隷髙平徐統往在鄴都識朕於童稚毎思其殷勤之言弗敢忘也可召其子孫詣行所八年五月以髙平徐攀爲琅邪太守攀統之少子以舊恩拔之也六月兾州牧猛入爲丞相中書監司隷校尉猛固辭丞相改授司徒又固辭不拜乃停司徒之授四月天鼔鳴彗出于尾箕長十餘丈或名蚩九旗太史令張猛言於堅曰尾燕之分野而掃東井東井秦之分灾深禍大十年之後燕滅秦之象二十年之後燕當爲岱所滅慕容暐父子兄弟亡虜也而布列朝廷貴盛莫二宜除渠帥以寧皇秦若旦誅鮮卑不夕滅客彗者臣請就妖言之戮堅不納更以暐爲尚書垂爲京兆尹冲爲平陽太守十年三月侍中太尉李威卒威字伯龍漢陽人荀太后姑子少與符雄結刎頸之交符生屢欲誅堅賴威之免堅深德之事威如父誅符生及法皆威與太后潛決大謀遂有辟陽之寵雅重王猛勸堅以國事任之堅常謂猛曰李}
  - {type: substitution, offset: 455, original: 謚, replacement: 諡, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-3933}}
