  - {type: variant, offset: 4751, length: 0, content: '', SBCK: 五十二子崇奔隍中復稱尊號改年延初謚登爲髙皇帝十月崇爲乾歸所逐奔于楊定與崇帥衆二萬攻乾歸爲乾歸所敗崇定皆死之自符健皇始元年歳在辛亥晉永和七年是歳歳在甲午四十四年晉太元十九年也晉書曰登在位九年始健以穆帝永和七年僭立至登伍丗凡四十有四年以孝武帝太元十九年滅太平御覽卷第一百}
