  - {type: variant, offset: 3139, length: 0, content: '', SBCK: 衆布在畿甸實社稷之憂冝遣重將討之堅乃以廣平公符熈鎭蒲坂符叡爲都督配兵五萬姚萇爲司馬討􅇦于華陽平原太守慕容冲起兵河東有衆二萬進攻蒲堅命竇衝討之符叡勇果輕敵戰于華隂叡敗績􅀍殺堅大怒萇懼誅遂叛竇衝大破慕容冲于河東冲奔于􅇦􅇦衆至十萬餘遣使謂堅曰秦師傾敗將欲興復大燕呉王以定􅀜東可速資備大駕奉送家兄皇帝返鄴都與秦以虎牢爲界分王天下堅大怒召暐責之暐叩頭流血陳謝堅曰此自三竪之罪非卿之過復其位待之如初命暐以書招諭垂及􅇦冲使息兵暐密遣使謂之曰今秦數巳終當不能復乆吾籠中之人必無還理勉建大業以興復爲務􅇦}
  - {type: page-break, offset: 3139, content: '', id: KR3k0012_SBCK_122-7b}
  - {type: variant, offset: 3139, length: 0, content: '', WYG: 地吾不復與之爭將若泓何翼曰冦不可長慕容垂正可據山東為亂不暇近逼今暐及宗族種類盡在京師鮮卑之衆布}
  - {type: variant, offset: 3139, length: 36, content: 於是安定梁擾等並關西民望說洪曰今胡運已終中原喪亂明公神武自天必繼蹤周漢宜, krp: 送丕首于江東符登}
  - {type: variant, offset: 3140, length: 1, content: 是, WYG: 畿甸實社稷之憂宜遣重将討之堅乃以廣平公熈鎮蒲坂苻叡為都督配兵五萬姚萇為司馬討泓于華澤平陽太守慕容冲起兵河東有衆二萬進攻蒲阪堅命竇衝討之苻叡勇果輕敵戰敗于華澤被殺堅大怒萇懼誅遂叛竇衝擊慕容冲于河東大破之冲奔于泓泓衆至十萬遣使謂堅曰秦師傾敗将興復大燕吳王已定關東可速資偹大駕奉送家兄皇帝返鄴都與秦以虎牢為界分王天下堅大怒召暐責之暐叩頭流血陳謝堅乆之曰此自三豎之罪非卿之過復其位待之如初命暐以書招諭垂及泓冲使息兵還長}
  - {type: page-break, offset: 3140, content: '', id: KR3k0012_WYG_122-12b, image: WYG0894/WYG0894-0149d.png}
  - {type: variant, offset: 3141, length: 0, content: '', SBCK: 進向長}
  - {type: variant, offset: 3142, length: 6, content: 定梁擾等並關, SBCK: 堅卒歩􅀐二萬討姚萇於北地萇率衆七萬來攻堅爲萇所敗聞慕容冲去長安二百餘里退師而㱕使符方戍驪山符暉都督中外諸軍事配兵五萬拒冲暉師敗績堅又以尚書姜宇與符琳率衆三萬擊冲于霸上爲冲所敗宇死之琳中流矢冲遂據阿房城進逼長安堅登城觀之歎曰此虜從何出也吾不用王景略陽平公之言使白虜敢以至於此長樂公符丕在鄴粮竭馬又無草削松木而食之㑹丁零叛慕垂引師去鄴始具}
  - {type: page-break, offset: 3142, content: '', id: KR3k0012_SBCK_122-8a}
  - {type: variant, offset: 3142, length: 11, content: 定梁擾等並關西民望說洪, WYG: 恕其反叛之罪而暐遣使謂泓}
  - {type: variant, offset: 3149, length: 26, content: 民望說洪曰今胡運已終中原喪亂明公神武自天必繼蹤周漢宜, SBCK: 問知長安危逼遣從弟求救於謝􅀇二十一年慕容冲僭}
