  - {type: variant, offset: 3042, length: 1, content: 民, SBCK: 涕猛濳如安陽迎堅堅謂曰昔亞夫不出軍迎漢文將軍何以臨敵而背衆乎猛曰臣每覽亞夫之事常謂前却人主以此而爲名將􅀼未多之臣奉陛下神笇擊垂亡之虜􅀂摧枯拉音獵朽何足憂也戊寅尅鄴慕容暐岀奔將軍郭慶執暐於髙陽送之辛巳堅入鄴宫大赦閱其圗籍郡百五十七縣一千五百七十九戸二百四十五萬八千九百六十九以王猛爲}
  - {type: page-break, offset: 3042, content: '', id: KR3k0012_SBCK_122-4a}
  - {type: variant, offset: 3042, length: 1, content: 民, WYG: 涕乃停信宿猛潜如安陽迎堅堅謂之曰昔亞夫不出軍迎漢文将軍何以臨敵而背衆乎猛曰臣毎覽亞夫之事常謂前却人主以此而為名将竊未多之臣奉陛下神算擊垂亡之虜若摧枯拉音獵朽何足憂也戊寅剋鄴慕容暐出奔将軍郭慶執暐於高陽送之辛巳堅入鄴宫大赦閱其圖籍凡郡百五十七縣一千五百七十九户二百四十五萬八千九百六十九口九百九十八萬七千九百三十五以王猛為使持節}
