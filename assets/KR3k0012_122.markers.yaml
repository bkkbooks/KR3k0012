  - {type: variant, offset: 3099, length: 1, content: 雍, WYG: 冀州牧鎮鄴封清河郡侯以偽太宰恪太𫝊評之第盡賜之加美妾五人上女妓十人中妓人三十人猛辭堅曰昔魏絳和戎猶有金石絲竹之賞山甫翼周實受四牡之錫卿功超二子任過管葛安得辭也其敬受之無逆朕命以鄧羌為散騎常侍安定太守真定郡侯邑三千户賞潞川之功七年七月七日堅如洛陽下書曰士死知已猶來格謨故喬公一言魏祖追慟趙司𨽻高平徐統往在鄴都識朕於童稚每思其殷勤之言弗敢忘也可召其子孫詣行在所八年五月以高平徐攀為瑯琊太守攀統之少子以舊恩㧞之也六月冀州牧猛入為丞相中書監司𨽻校尉猛固辭丞相改授司徒又固辭不拜乃停司徒之授九年四月天鼓鳴彗出扵箕尾長十餘丈或名蚩尤旗經太㣲掃東井自夏及秋冬不滅太史令張猛言於堅曰尾燕之分野東井秦之分野今彗起箕尾而掃東井十年後燕滅秦之象二十年後燕當為代所滅慕容暐父子兄弟亡虜也而布列朝廷貴盛莫二宜除渠帥以寧皇秦若旦誅鮮卑不夕滅彗星者臣請就妖言之戮堅不納更以暐為尚書垂為京兆尹冲為平陽太守十年三月侍中太尉李威卒威字伯龍漢陽人茍太后姑子少與苻雄結刎頸之交苻生屢欲誅堅頼威以免堅深德之事威如父誅苻生及法皆威與太后潜決大謀遂有辟陽之寵雅重王猛勸堅以國事任之堅甞謂猛曰李公知卿猶鮑叔之於夷吾罕虎之於子産猛兄事之夏四月堅下書曰巴夷嶮逆冦亂益州招引吳軍為唇齒之勢特進鎮軍将軍䕶羌校尉鄧羌可帥甲士五萬星夜赴討五月蜀人張育楊光等起兵二萬以應巴獠音老晉威逺将軍桓石虔帥衆二萬入據墊音店江張育自號蜀王稱藩于晉八月鄧羌敗晉師于涪音浮西擊張育楊光等於綿竹皆斬之益州平羌勒銘于岷山而還十一月羌至自成都堅引見東堂謂之曰将軍之先仲華遇漢世祖於前将軍復逢朕於後何鄧氏之多幸𦍑曰臣常謂光武之遇仲華非獨仲華之遭光武堅笑曰将軍葢以自况匪直将軍之幸亦朕之遇賢也十一年正月以安車蒲輪徵隱士樂陵王勸為國子祭酒堅雅好文學英儒畢集純博之精莫如勸也終于太子少傅五月王猛寢疾堅親祈南北郊宗廟社稷分遣使臣禱河岳諸神無不周備以猛少瘳赦殊死七月堅臨省疾問以後事猛曰晉僻處吳越乃正朔相承臣殁之後願不以晉為圖鮮卑羌虜我之仇讐終為大患宜漸除之以便社稷言終而卒時年五十一堅哭之慟謂太子宏曰天不欲使吾平一六合何奪吾景畧之速也贈侍中丞相餘如故諡武侯朝野巷哭三日十二年正月癸巳高陵民穿井得龜大三尺六寸背有八卦文命太卜池養之食之以粟四月堅下書曰凉}
