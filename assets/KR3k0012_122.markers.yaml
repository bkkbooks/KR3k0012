  - {type: variant, offset: 745, length: 0, content: '', krp: 雍州牧濟北王推叔父垂爲丞相大司馬兾州牧呉王堅謂權翼曰將若泓何翼曰慕容垂正可據山東爲亂不暇近逼今暐宗族盡在京師鮮卑之衆布在畿甸實社稷之憂冝遣重將討之堅乃以廣平公符熈鎭蒲坂符叡爲都督配兵五萬姚萇爲司馬討泓于華陽平原太守慕容冲起兵}
  - {type: variant, offset: 746, length: 0, content: '', krp: 東有衆二萬進攻蒲堅命竇衝討之符叡勇果輕敵戰于華隂叡敗績𬒳殺堅大怒萇懼誅遂叛竇衝大破慕容冲于河東冲奔于泓泓衆至十萬餘遣使謂堅曰秦師傾敗將欲興復大燕呉王以定關東可速資備大駕奉送家兄皇帝返鄴都與秦以虎牢爲界分王天下堅大怒召暐責之暐叩頭流血陳謝堅曰此自三竪之罪非卿之過復其位待之如初命暐以書招諭垂及泓冲使息兵暐密遣使謂之曰今秦數巳終當不能復乆吾籠中之人必無還理勉建大業以興復爲務泓於是進向長安堅卒歩騎二萬討姚萇於}
  - {type: variant, offset: 747, length: 0, content: '', krp: 地萇率衆七萬來攻堅爲萇所敗聞慕容冲去長安二百餘里退師而㱕使符方戍驪山符暉都督中外}
