  - {type: variant, offset: 0, length: 191, content: 偏霸部五前燕慕容廆崔鴻十六國春秋前燕錄曰慕容廆字弈洛瓌昌黎棘城人昔高辛氏遊於海濱留少子厭越以君北夷世居遼左號曰東胡秦漢之際為匈奴所敗分保鮮卑山因復以為號曾祖莫護跋於魏初率其諸部入居遼西從司馬宣王討公孫淵拜率義王始建國於大棘城之北見燕代少年多冠步搖冠意甚好之遂歛髮襲冠諸部因呼之步搖其後音訛遂為慕容焉祖木延從母丘儉征高麗有功加號大都督父涉歸以全柳城勳進拜單于遷邑遼東於是漸變胡風自云慕, SBCK: 太平御覽卷第一百}
