  - {type: variant, offset: 3160, length: 4, content: 原喪亂明, WYG: 之人必無還理勉建大業以興復為務泓于是進向長安改年曰燕興堅率步騎二萬討姚萇于北地姚萇率衆七萬來攻堅為萇所敗聞慕容冲去長安二百餘里引師而歸使苻方戍驪山拜苻暉都督中外諸軍事配兵五萬拒冲暉師敗績堅又以尚書姜宇與苻琳率衆三萬撃冲于灞上為冲所敗宇死之琳中流矢冲遂據阿房城進逼長安堅登城觀之歎曰此虜何從出也吾不用王景畧陽平}
