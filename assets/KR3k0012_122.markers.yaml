  - {type: variant, offset: 4220, length: 531, content: 餘人二年正月嬖臣右僕射董榮言於生曰日蝕之災宜以貴臣應之生曰唯有大司馬國之懿戚不可其在王司空生從之誅司空王隨壬戍饗群臣于太極殿樂奏生親歌以和之命尚書令辛牢典勸生怒曰何不強酒猶有坐者引弓矢射牢殺之於是百僚大懼無不引滿昏醉汙服蓬頭僵仆生以為樂三年四月姚襄遣姚蘭等眾二萬七千進據黃洛生遣平王黃眉東海王堅建節將軍鄧羌等步騎萬五千以討之羌偽不勝引騎而退襄追之至於三原羌廻騎拒襄大戰獲襄襄有駿馬日行千里是戰也馬倒而擒之眉等振旅而歸初長安謠曰東海大魚化為龍男為王女為公問在何所洛門東東海即堅封也第在洛門東生荒暴日滋殘虐彌甚群臣朔望漏盡請見生曰知盡乎須待飲訖或日暮而不出百僚飢弊或至申酉之間方出臨朝酒怒色厲多有殺戮或連月昏醉弗堪省覽或使宮人與男子躶交於殿前引群臣臨而觀之或生剝牛羊驢馬爛雞鴨三五千為群放之殿中或生剝死囚面皮令其歌舞觀以為樂勳戚忠良殺害略盡朝士奔逃草野皆曰從虎口出左右得度一日如過十年至於截脛刳胎拉脇鋸頭殺者動有千數生夜對侍婢曰阿法兄弟亦不可信明當除之是夜清河王符法夢神告之旦將禍集汝門先覺可以免寤而心悸會侍婢來告乃與特進梁平老等帥壯士數百人潛入雲龍門東海王堅帥麾下三百人繼集宿衛將士皆捨仗歸堅生猶昏寢不悟堅眾既至生驚問左右曰此輩何等人引生置別室廢為越王俄而殺之時年, krp: ''}
