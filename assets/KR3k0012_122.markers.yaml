  - {type: variant, offset: 3328, length: 0, content: '', WYG: 永叙堅之長庶子少而聰慧好學堅與之言将畧嘉之才幹亞于苻融為将善收士卒情出鎮于鄴東夏安之堅敗歸長安丕為慕容垂所逼自鄴奔枋頭}
  - {type: variant, offset: 3328, length: 0, content: '', krp: 文髙丕之族子父敞太尉司馬登少勇有壯氣建元元年初拜殿中將遷羽林監長安令㘴事黜爲狄道長太平二年與姚萇戰於胡奴塠大破之十一月丕子渤海王懿自吉城奔登登乃具丕死問於是爲丕發喪行服爲壇于隴東僭即皇帝位改太平二年爲太初元年十二月立堅神主于軍中引師而告堅神主曰今収合義旅衆餘五萬星言電邁直造賊庭庶上報皇帝酷怨下雪民人大恥二年登次于凡亭九月進據胡空堡戎夏歸之者十有餘萬姚萇掘堅屍鞭撻無數裸剥衣裳附之以棘坎土埋之三年登次朝郍姚萇據武都相持累戰㸦有勝負萇以登戰勝謂堅神像所助亦於軍中立堅神主謂曰往年新平之禍非萇之罪陛下假臣龍驤曰朕以龍驤}
  - {type: variant, offset: 3329, length: 12, content: 業洪第三子母姜氏夢感大羆, SBCK: 元二十一年丕復入鄴城將収兵趙魏}
  - {type: variant, offset: 3329, length: 63, content: 業洪第三子母姜氏夢感大羆而生生之夜洪夢族曾氐王蒲建謂之曰是兒興家門可以吾名字之於是名羆字世健後避石虎外祖張羆之名故改焉晉永和六, WYG: 元二十一}
  - {type: punctuation, offset: 3330, content: ，, id: KR3k0012_CHANT_122-bkkpn733}
  - {type: 'tls:seg', offset: 3330, content: '', id: KR3k0012_CHANT_122-8a.5}
  - {type: variant, offset: 3330, length: 2, content: 洪第, krp: 卿其勉之明詔昭然言猶在耳豈假手符登而圖臣忘前征時言耶今爲陛下立神像可歸休于此勿計神過聽臣至誠四年正月登昇樓謂萇曰自古安有殺君反立神像大呼曰殺君賊姚萇出來與汝決之何爲枉害無辜萇憚而不應萇自立堅神像戰未有利軍毎夜驚乃斬像首送登六年}
  - {type: variant, offset: 3333, length: 11, content: 子母姜氏夢感大羆而生生, krp: 月登自雍攻長安七月登攻新平姚萇救}
