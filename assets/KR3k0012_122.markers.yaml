  - {type: variant, offset: 2405, length: 294, content: 郡盜賊大起鄴中怪異非常十月評及猛戰于潞川評師敗績單騎遁還猛乘勝追奔長驅至鄴十月符堅帥眾會猛來攻拔鄴城外亂散騎侍郎徐蔚等率扶餘句麗及上黨質民子弟五百人夜開城北門引納秦師暐與太傅評左衛將軍孟高等數十騎出奔昌黎堅遣將軍郭慶帥騎五千追之及暐于高陽秦將巨虎執暐將縛之暐曰汝何小人而敢縛天子虎曰我梁山巨虎受詔縛賊何謂天子也執暐送鄴堅問其本狀暐曰狐死首丘欲歸死于先人陵墓堅哀而釋之令還宮率文武出降堅入鄴宮昇正陽殿徙暐及王公已下并諸鮮卑四萬餘戶于長安封暐新興郡侯邑五千戶尋拜尚書堅征臺城為平南將軍別部都督淮南之敗隨堅還長安既而吳王垂攻符丕于鄴中山王冲起兵關中暐謀殺堅事發為堅所誅年三十五德稱尊號偽謚幽皇帝, krp: 刺史}
