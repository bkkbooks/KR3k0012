  - {type: variant, offset: 1098, length: 1641, content: 國春秋前燕錄曰慕容儁字宣英皝第二子小字賀賴跋十三月而生有神光之異身長八尺一寸善屬文雅長辭賦至於器服車室皆著銘讚以為勸戒皝之八年晉遣使者拜皝燕王以攜為安北將軍東夷校尉十一年進拜使持節鎮東將軍皝薨即燕王位赦其境內元年春正月儁依春秋列國故事稱元年五月聞趙亂乃嚴兵將為進取之計七月晉使謁者陳沈拜儁侍中河北諸軍事幽冀并平四州牧大將軍燕王承制封拜一如廆皝故事元璽元年正月司南車成儁大悅告于皝廟四月遣輔國恪相國弈討冉閔戰于魏昌廉臺閔師大敗擒送之閔大將軍蔣幹輔閔子智固守鄴城遣輔弼評等帥騎一萬以討之鄴北郡縣悉降輔國弈等二百一十人勸稱尊號令曰非常之事匪寡德所宜聞也八月剋鄴輔弼評等送閔后董氏太子智太尉申鍾并乘輿服物及六璽送于中山傳國璽蔣幹先已送晉儁欲神其事業言曆運在己乃詐云得之賜閔妻號奉璽君封冉智為海濱侯以輔弼評為司州刺史鎮鄴十月輔國恪等三百五人奉皇帝璽十一月僣即皇帝位于正陽前殿大赦改年時晉遣使詣儁謂之曰還白汝天子我承人乏為中國所推已為帝矣庚午書曰追崇祖考古人之令典武宣王尊為高武宣皇帝文明王為太祖文明皇帝二年正月立后可足渾氏為皇后光臺元年正月立中山王暐為皇太子赦改年初廆有駿馬曰赭白有奇相逸力石虎之伐棘城皝將出避難欲乘之馬悲鳴踶嚙人莫能近皝曰此馬見異先朝孤嘗仗之濟難今不欲出者蓋先君之旨也乃止虎尋奔退皝益奇之至是年四十九歲而駿逸不虧儁比之於鮑氏驄命鑄銅以圖其像親為銘讚鐫頌其旁置薊城東掖門是月像成而馬死十一月自薊遷鄴十二月入鄴宮大赦繕宮殿復銅雀臺以吳王垂為東夷樣尉平州刺史鎮遼東二年三月常山寺大樹自拔根出璧七十三光色精奇有異常玉以為岳神之命遣尚書郎叚勤以太牢祀之五月遼西獲黑兔三年三月儁夢石虎齧其𦜜寤而惡之命發其墓剖棺出屍踏而罵之曰死胡安敢夢生天子遣御史中尉陽約數其殘酷之罪鞭而投之漳水十二月儁寢疾謂大司馬恪曰吾患惙頓恐不濟脩短命也復何所恨但二寇未除景茂冲幼慮其未堪家國多難吾欲遠追宋宣以社稷屬汝恪曰太子雖幼天縱聰聖必能勝殘致治不可以亂正統儁怒曰兄弟之間豈虛飾乎恪曰陛下若以臣堪荷天下之任者寧不能輔少主也儁曰若汝行周公之事吾復何憂四年正月儁薨於應福前殿年五十三偽謚景昭皇帝廟號烈祖葬龍陵儁雅好文籍性嚴重未曾以慢服臨朝雖閑居宴處亦無懈怠之色晉書曰儁在位十一年自初即位至于末年講論不倦覽政之暇唯與侍臣錯綜義理凡所著述四十餘篇也慕容暐崔鴻十六國春秋前燕錄曰慕容暐字景茂儁之弟三子元璽三年封中山王尋立為皇太子光壽四年僣即帝位大赦改元建熙元年以太原王恪為太宰錄尚書行周公事專百揆上庸王評為太傅副贊朝政司空楊騖為太保吳王垂為河南大都督十州諸軍事兗州牧鎮梁國四年正月暐南郊十月太尉弈迎神王和龍初暐委政太宰恪專受經于愽士王勸助教尚鋒祕書郎杜詮竝以明經講論左右至是通諸經祀孔子于東堂以勸為國子祭酒鋒國子愽士詮散騎侍郎其執經侍講皆有拜授八年太宰恪卒九年十二月有神降于鄴自稱湘女有聲與人相接數日而去十年四月立貴妃可朱渾氏為皇后六月晉大司馬桓溫率眾五萬來伐遂至方頭吳王垂大敗之軒獲三萬餘級溫奔還淮南垂既敗溫威德彌振太傅評大不使之太后遂與評謀殺垂十二月垂出奔秦十一年六月秦輔國將軍王猛鎮南將軍楊安率眾六萬來伐以太傅評下邳王厲等帥精卒三十萬拒秦師于潞川州郡盜賊大起鄴中怪異非常十月評及猛戰于潞川評師敗績單騎遁還猛乘勝追奔長驅至鄴十月符堅帥眾會猛來攻拔鄴城外亂散騎侍郎徐蔚等率扶餘句麗及上黨質民子弟五百人夜開城北門引納秦師暐與太傅評左衛將軍孟高等數十騎出奔昌黎堅遣將軍郭慶帥騎五千追之及暐于高陽秦將巨虎執暐將縛之暐曰汝何小人而敢縛天子虎曰我梁山巨虎受詔縛賊何謂天子也執暐送鄴堅問其本狀暐曰狐死首丘欲歸死于先人陵墓堅哀而釋之令還宮率文武出降堅入鄴宮昇正陽殿徙暐及王公已下并諸鮮卑四萬餘戶于長安封暐新興郡侯邑五千戶尋拜尚書堅征臺城為平南將軍別部都督淮南之敗隨堅還長安既而吳王垂攻符丕于鄴中山王冲起兵關中暐謀殺堅事發為堅所誅年三十五德稱尊號偽謚幽皇帝晉書曰始廆以武帝太康六年稱公至暐四世暐在位十一年以海西公太和五年滅通皝凡八十五年, WYG: ''}
