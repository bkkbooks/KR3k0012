  - {type: variant, offset: 166, length: 223, content: 父涉歸以全柳城勳進拜單于遷邑遼東於是漸變胡風自云慕二儀之德繼三光之容遂以慕容為姓廆身長八尺有大度晉安北將軍張華一見奇之謂曰君後必為命世之器匡難濟時者也涉卒弟耐立將謀殺廆廆亡潛於遼東徐郁家太康元年國人殺耐迎廆立之太康十年又還于徒河之青山元康四年定都大棘城所謂紫蒙之邑也永嘉六年王沉承制以廆為散騎常侍冠軍將軍前鋒大都督大單于皆讓不授擢舉賢才官方授任魯國孔纂宿德清望請為賓友平原劉讚儒學洽通為東牟祭酒世子率國冑受業焉太興四年晉遣謁者拜廆使持節督幽平東夷, krp: ''}
