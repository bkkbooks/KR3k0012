  - {type: variant, offset: 32, length: 0, content: '', krp: 搴音愆又居輦切舉也旗斬將燕師敗績進師圍鄴猛之未至鄴也劫盗公行及猛之至逺近怗然十一月堅自帥精銳十萬攻鄴七日而至於安陽故宅引諸耆老語及祖父舊事泫然流涕猛濳如安陽迎堅堅謂曰}
  - {type: variant, offset: 33, length: 12, content: 高辛氏遊於海濱留少子厭越, krp: 亞夫不出軍迎漢文將軍何}
