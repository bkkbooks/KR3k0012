  - {type: variant, offset: 3097, length: 0, content: '', SBCK: 兾州牧鎭鄴封清河郡侯以僞太宰恪太傅評之第盡賜之加美妾五人上女妓十人中女妓}
  - {type: variant, offset: 3097, length: 2, content: 三司, krp: 南安王持節}
  - {type: variant, offset: 3098, length: 0, content: '', SBCK: 十八人猛辭堅曰昔魏絳和戎猶有金石絲竹之賞山甫翼周實受四牡之錫卿功超二子任過管葛安得辭也其敬受之無逆朕命以鄧羗爲散􅀐常侍安定太守眞定郡侯邑三千户賞潞川之功七年七月堅如洛陽下書曰士死知己猶來格模故喬公一言魏祖追慟趙}
  - {type: punctuation, offset: 3099, content: 、, id: KR3k0012_CHANT_122-bkkpn679}
  - {type: variant, offset: 3099, length: 1, content: 雍, SBCK: 􅀠髙平徐統往在鄴都識朕於童稚毎思其殷勤之言弗敢忘也可召其子孫詣行所八年五月以髙平徐攀爲琅邪太守攀統之少子以舊恩拔之也六月兾州牧猛入爲丞相中書監司􅀠校尉猛固辭丞相改授司徒又固辭不拜乃停司徒之授四月天鼔鳴彗出于尾箕長十餘丈或名􅃖九旗太史令張猛言於堅曰尾燕之分野而掃東井東井秦之分灾深禍大十年之後燕滅秦之象二十年之後燕當爲岱所滅慕容暐父子兄弟亡虜也而布列朝廷貴盛莫二宜除渠帥以寧皇秦􅀂旦誅鮮卑不夕滅客彗者臣請就妖言之戮堅不納更以暐爲尚書垂爲京兆尹冲爲平陽太守十年三月侍中太尉李威卒威字伯龍漢陽人荀太后姑子少與符雄結刎頸之交符生屢欲誅堅賴威之免堅深德之事威如父誅符生及法皆威與太后潛決大謀遂有辟陽之寵雅重王猛勸堅以國事任之堅常謂猛曰李公知卿猶鮑叔之於夷吾罕虎之於子産猛兄事之夏四月堅下書曰巴夷嶮逆宼亂益州招引呉軍爲脣齒之勢特進鎭軍將軍護羗校尉鄧羗可帥甲士五萬星言赴討五月蜀人張育楊光等起兵二萬以應巴獠音老晉威逺將軍栢石帥衆三萬入據墊音店江張育自號蜀王􅁛蕃于晉八月鄧羗敗晉師于涪音浮西擊張育楊光於綿竹皆斬之益州平羗勒銘于岷山而還十二月羗至自成都堅引見東堂謂之曰將軍之先仲華遇漢丗祖於前將軍復逢朕於後何鄧氏之多幸羌曰臣常謂光武之遇仲華非獨仲華之遭光武堅􅀏將軍蓋以自貺非直將軍之幸亦朕之遇賢十一年正月以徴士樂陵王忻爲國子􅀕酒堅雅好文學英儒畢集純博之精莫如忻也終于太子少􅀓五月猛寢疾堅親祈南北郊宗廟社稷分遣侍臣禱河岳諸神無不周備以猛少瘳赦殊死七月堅臨省疾問以後事猛曰晉僻陋呉越乃正朔相承臣没之後願不以晉爲圖鮮卑羗虜我之仇讎終爲大患宜漸除之以便社稷言終而卒時年五十一堅哭之慟謂太子宏曰天不欲使吾平一六合何奪吾景略之速也贈侍中丞相餘如故謚武侯朝野巷哭三日十二年正月癸巳髙陸民穿井得􅀛大三尺六寸背有八卦文命太卜池養之食之以粟四月堅下書曰涼}
