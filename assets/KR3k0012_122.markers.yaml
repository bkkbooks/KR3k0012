  - {type: variant, offset: 3328, length: 0, content: '', SBCK: 永叙堅之長庶子少而聦惠好學堅與之言將略嘉之才幹亞于符融爲將善収士卒時出鎭于鄴東夏安之堅敗㱕長安爲慕容垂所逼自鄴奔于枋頭堅之死也}
