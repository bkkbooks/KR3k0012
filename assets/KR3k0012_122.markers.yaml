  - {type: variant, offset: 5, length: 4, content: 燕慕容廆, krp: 秦符堅符丕符登符堅}
  - {type: xml-element, offset: 9, content: '', id: KR3k0012_CHANT_122-bkkxmlele2}
  - {type: xml-element, offset: 9, content: '', id: KR3k0012_CHANT_122-bkkxmlele3}
  - {type: 'tls:seg', offset: 9, content: '', id: KR3k0012_CHANT_122-1a.3}
  - {type: punctuation, offset: 11, content: 《, id: KR3k0012_CHANT_122-bkkpn1}
  - {type: punctuation, offset: 16, content: ‧, id: KR3k0012_CHANT_122-bkkpn2}
  - {type: variant, offset: 17, length: 0, content: '', krp: 秦録曰符堅字永固健弟雄之子趙建武中母苟氏祈西門豹祠歸而夜夢與神交遂孕十二月而生有神光之異自天屬庭背有赤文隱起成字曰艸音草付臣又土王咸陽祕而莫之傳也姿貌魁傑臂垂過膝目有紫光祖洪竒而愛之名堅頭因而謂健曰此兒頭大重身長任大足短安下非常相趙右光禄大夫司隷校尉髙平徐統有知人之鑒遇堅於路異之執其手曰符郎此官之御街小兒敢戲統頋左右曰此兒有霸王之相後復遇之統下車謂曰符郎當大貴僕不及如何堅曰若如公言不敢忘德八歳請就師學洪曰尚小未可吾年十三方欲求師時人猶以爲速成健之入關次于曲沃夢天神遣使朱衣赤冠命拜堅爲龍驤將軍旦而爲壇於曲沃拜堅泣謂曰先王昔始受此號汝父次爲之今若若汝也復爲神明所授可不勉之性至孝有器度博學多才藝年十一便有經略大志堅旣殺符生永興元年六月去皇帝之號僭稱大秦天王即位太極殿誅董龍等二十餘人改壽光三年爲永興元年追尊父爲文桓皇帝丗子宏爲皇太子兄清河王法爲丞相東海公永安公符侯爲太尉諸王皆貶爵爲公符抑爲尚書令封弟融爲陽平公雙河南公子丕爲長樂公暉爲平原公熈爲廣平公李威爲左僕射梁平老爲右僕射席寶爲丞相長史王猛爲中書令侍郎權翼爲黃門郎諸公卿爲生所誅者悉復本官十月丞相東海公法以疑忌賜死苟太后之意也堅性友愛與法訣於東堂慟哭嘔血二年四月堅如雍祀五畤音止六月如河東祀后土八月自臨晉登龍門頋謂羣臣曰美哉山河之固權翼對曰呉起有言在德不在嶮深願陛下追蹤唐虞懷逺以德山河之固不足恃也堅大悅至韓原觀晉魏顆鬼結草抗秦軍之處賦詩而歸甘露元年正月起明堂禪音善南北郊六月甘露降乃大赦改年八月堅下書曰咸陽内史猛聲彰出納所在著績有卧龍之才冝入賛百揆絲綸王言可徴拜侍中中書令領京兆尹中丞鄧羗性鯁直與猛協規齊志於是百僚肅整豪右屏氣風化大行堅歎曰吾今始知天下之有法也以猛爲吏部尚書遷太子詹事十一月以猛爲司隷侍中領選如故猛上䟽曰伏見陽平公融明德懿親光禄西河任羣忠貞淑愼處士朱彤博識聦辯竝宜左右彌綸暉賛九棘愚臣庸鄙請避賢路堅曰機務俟才允屬明哲朝野所望豈容致辭所舉融等㝷别銓授於是以融爲侍中中書監右僕射任羣爲光禄大夫領太子家令朱彤爲中書侍郎領太子庶子三年九月鳳皇集于東閣大赦天下初將爲赦與左僕射猛右僕射融議於露堂悉屏左右堅自爲文猛融進紙筆有一大蒼蠅入自牖間鳴聲甚大集于筆端駈而復來堅惡之乆而乃去俄而長安街巷市里民相告曰官今大赦有司以聞堅驚謂融曰事何從而泄勑外窮推咸言有一小人衣黒衣呼於市曰官今大赦須臾不見堅歎曰其向蒼蠅乎聲狀非常吾固惡之四年七月黃龍見於成紀梁山崩五年白虎見天水六年遣鴻臚拜張天錫爲大將軍涼州牧西平公建元元年正月雍州秀才叚鏗對䇿上第拜吏部郎中孝廉通經者十餘人皆拜令長五年六月晉大司馬桓温伐}
  - {type: variant, offset: 18, length: 1, content: 錄, krp: 次于枋音方頭燕師屢敗遣散騎侍郎樂嵩來乞師請賂秦以虎牢以西之地八月遣將軍苟也洛州刺史邵羗帥歩騎二萬救燕温敗歸是月京兆民王攸上書獻十略一曰君道宜明二曰臣尚忠敬三曰子貴孝養四曰民生在勤五曰教無偏黨六曰養民在惠七曰延聘耆賢八曰懲惡顯善九曰伐叛柔服十曰易簡弘大堅納之以攸爲諫議大夫十一月燕車騎呉王垂來奔桓温旣走慕容暐音葦悔割河洛之地以賂秦乃曰行人失辤分灾救患理之常也堅大怒六年令輔國王猛帥鎭南楊安虎牙將軍張蚝音次建節鄧羗等歩騎六萬討平燕兾八月猛攻尅壺關暐遣太傅上庸王評等帥四十萬屯於潞川猛覘丑艶切覘候也知評賣水鬻樵不撫將士大笑謂楊安等}
  - {type: substitution, offset: 18, original: 錄, replacement: 録, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-4560}}
