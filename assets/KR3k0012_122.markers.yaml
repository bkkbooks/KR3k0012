  - {type: variant, offset: 465, length: 15, content: 宣王儁稱尊追尊武宣帝廟號高祖晉, krp: 侯朝野巷哭三日十二年正月癸巳髙陸民穿井得龜大三尺六寸背有八卦文命太卜池養之食之以粟四月堅下}
