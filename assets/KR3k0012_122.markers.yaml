  - {type: variant, offset: 458, length: 3, content: 皝為燕, krp: 知卿猶鮑叔之於夷吾罕虎之於子産猛兄事之夏四月堅下書曰巴夷嶮逆宼亂益州招引呉軍爲脣齒之勢特進鎭軍將軍護羗校尉鄧羗可帥甲士五萬星言赴討五月蜀人張育楊光等起兵二萬以應巴獠音老晉威逺將軍栢石帥衆三萬入據墊音店江張育自號蜀}
  - {type: substitution, offset: 458, original: 皝, replacement: 皓, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-3715}}
  - {type: punctuation, offset: 462, content: ，, id: KR3k0012_CHANT_122-bkkpn89}
  - {type: 'tls:seg', offset: 462, content: '', id: KR3k0012_CHANT_122-1a.80}
  - {type: variant, offset: 462, length: 1, content: 追, krp: 稱蕃于晉八月鄧羗敗晉師于涪音浮西擊張育楊光於綿竹皆斬之益州平羗勒銘于岷山而還十二月羗至自成都堅引見東堂謂之曰將軍之先仲華遇漢丗祖於前將軍復逢朕於後何鄧氏之多幸羌曰臣常謂光武之遇仲華非獨仲華之遭光武堅笑將軍蓋以自貺非直將軍之幸亦朕之遇賢十一年正月以徴士樂陵王忻爲國子祭酒堅雅好文學英儒畢集純博之精莫如忻也終于太子少傳五月猛寢疾堅親祈南北郊宗廟社稷分遣侍臣禱河岳諸神無不周備以猛少瘳赦殊死七月堅臨省疾問以後事猛曰晉僻陋呉越乃正朔相承臣没之後願不以晉爲圖鮮卑羗虜我之仇讎終爲大患宜漸除之以便社稷言終而卒時年五十一堅哭之慟謂太子宏曰天不欲使吾平一六合何奪吾景略之速也贈侍中丞相餘如故}
