  - {type: variant, offset: 3133, length: 3, content: 洪洪逆, WYG: 南裔此行也朕與陽平公之任非諸将之事左右僕射權翼沙門道安陽平公融尚書石越等上書面諌前後數十堅不納十九年晉車騎桓冲率衆十萬攻襄陽遣其前将軍劉波攻沔北堅大怒遣其子征南鉅鹿公叡冠軍慕容垂左衛毛當等将步卒五萬救襄陽堅下書曰吳人敢恃江山屢寇王境宜時進討以清宇内便可戒嚴速脩戎備發公私馬人十丁遣一丁門在灼然者為崇文義從朕将登會稽復禹績伐國存君義同三王其以司馬昌明為左僕射謝安為吏部尚書桓冲為侍郎勢還不逺可並為起第八月戊午遣征南大将軍陽平公融驃騎將軍張蚝撫軍大將軍髙陽公方衛軍梁成平南慕容暐冠軍慕容垂步騎二十五萬為前鋒甲子堅發長安戎長戎卒六十餘萬騎二十七萬前後千里九月堅至項城凉州之兵始達咸陽蜀漢之軍順流而下幽冀之衆至于彭城東西萬里水陸齊進融等攻壽春晉遣都督謝石徐州刺史謝𤣥豫州刺史桓伊水陸七萬敗堅于肥水堅為流矢所中單騎遁還于淮北顧謂夫人張氏曰朕若用朝臣之言豈見今日之事耶當何面目復臨天下乎澘然流涕堅諸軍悉潰惟慕容垂一軍獨全比至洛陽百官威儀軍容粗備未及關而垂有二志説堅請巡撫燕代并求敗墓堅許之權翼固諫以為不可堅不從至自淮南次于長安東之行宫入告罪於太廟丁零翟斌反于河南長樂公苻丕遣慕容垂及苻飛龍討之垂南結丁零殺飛龍盡坑其衆垂引丁零烏丸之衆二十餘萬為飛梯地道以攻鄴城慕容暐弟泓先為北地長史聞垂攻鄴亡命奔關東收諸馬牧鮮卑衆至數千還屯華陰暐乃潜使諸弟及宗人起兵于外堅遣将軍强永率騎}
