  - {type: variant, offset: 58, length: 0, content: '', SBCK: 建御史大夫栁甫乞降請解圍面縛不許執建等皆斬之文懿復遣侍中衛演乞尅日送而守者日軍事大要有五能戰當戰不能戰當守不能守當走餘二事唯有降與死耳汝不肯面縛此爲决就死也不須送任文懿攻南圍突出帝縱兵擊敗斬于梁又作沮水上時有兵士寒凍乞􅃭帝弗之與或曰幸多故􅃭可}
