  - {type: variant, offset: 1174, length: 2430, content: 月即皇帝位二月西域重譯獻火浣布詔大將軍太尉臨試以示百僚帝加元服賜群臣各有差大將軍司馬景王將謀廢帝以聞皇太后太后令曰皇帝芳春秋已長不親萬機躭淫內寵沉漫女德日延倡優縱其醜謔延六宮家人留止內房毀人倫之敘亂男女之節恭孝日虧悖傲滋甚不可以承天敘奉宗廟遣芳歸藩于齊以避皇位是日遷居別宮時年二十三使者持節送衛營齊王宮於河內之重門制度皆如藩國之禮魏略曰景王將廢帝遣郭芝入白太后后與帝對坐芝謂帝曰大將軍欲廢陛下立彭城王據帝乃起去太后不悅芝曰太后有子不能教令太將軍意已成又勒兵在外以備非常但當從旨將復何言太后曰我欲見大將軍口有所說芝曰何可見耶但當速取璽綬太后意折乃遣傍御取璽綬著坐側芝出報景王景王甚懽又遣使者授齊王印綬當出就西宮帝受命遂載王車與太后別垂涕始從太極殿南出群臣送者數千人太尉司馬孚悲不自勝餘多流涕王出後景王又使使者請璽綬太后曰彭城王我之季也今未立我當何之且明帝當絕嗣乎吾以為高貴鄉公睿文皇帝之長孫明皇帝之弟子於禮小宗有後太宗之義其詳議之景王乃更召群臣以皇太后令示之乃定迎高貴鄉公是時太常以發二日待璽綬於溫事定又請璽綬太后令曰我見高貴鄉公小時識之明日我自欲以璽綬手授之魏世譜曰晉受禪封齊王為邵陵公年四十三太始十年薨謚曰厲公廢帝高貴鄉公魏志曰高貴鄉公諱髦字彥士文帝孫東海定王霖子也正始五年封郯縣高貴鄉公少好學夙成齊王廢公卿議立公十月公至于玄武館群臣奏請舍前殿公以先帝舊處避止西廂群臣又請以法駕迎公不聽丙寅公入于洛陽群臣迎拜西掖門南公下與將荅拜儐者請曰儀不拜公曰吾人臣也遂荅拜至止車門下輿左右曰舊乘輿入公曰吾被皇太后徵未知所為遂步至太極東堂見于太后是日即皇帝位百僚陪位者欣欣焉甘露元年夏四月帝幸太學問諸儒曰聖人幽贊神明仰觀俯察始作八卦後聖重之為六十四立爻以極數凡斯大義罔有不備而夏有連山殷有歸藏周曰周易易之書其故何也易博士淳于俊對曰庖犧因燧皇之圖而制八卦神農演之為六十四黃帝堯舜通其變三代隨時質文各繇其事故易者變易也名曰連山似山出納雲氣連天地也歸藏者萬事莫不歸藏於其中也帝又曰若使庖犧因燧皇而作易孔子何以不云燧人氏沒庖犧氏作乎俊不能荅講易畢復命講尚書帝問曰鄭玄云稽古同天言堯同於天也王肅云堯順考古道而行之二義不同何者為是博士庾峻對曰先儒所執各有乖異臣不足以定之然洪範稱三人占從二人之言賈馬及肅皆以為順考古道以洪範言之肅義為正帝曰仲尼言唯天為大唯堯則之堯之大美在乎則天順考古道非其至也今發篇開義以明聖德而舍其大更稱其細豈作者之意耶峻對曰臣奉遵師說未喻大義至於文質折中裁之聖思復命講禮記帝問曰太上立德其次務施報為治何由而教化各異皆脩何政而能致於立德施而不報乎博士馬照對曰太上立德謂三皇五帝之世以德化民其次施報謂三王之世以禮為治也帝曰二者教化薄厚不同將主有優劣耶時使之然乎照對曰誠由時有樸文故化有薄厚也帝幸辟雍會命群臣賦詩侍中和逌音由尚書陳鶱等作詩賦稽留有司奏免官詔曰吾以闇昧愛好文雅廣延詩賦以知得失而乃爾紛紜良用反側其原逌等主者宣敕自爾已後群臣皆當翫習古義脩明經典稱朕意焉魏氏春秋曰公神明爽俊德音宣朗罷朝景王私曰上何如主也鍾會對曰才同陳思武類太祖景王曰若如卿言社稷之福也甘露元年二月帝讌群臣於太極東堂與侍中荀顗尚書崔贊袁亮鍾毓中書令虞松等並講述禮典遂言帝王優劣之差帝慕顗有立因問顗等曰有夏既衰后相殆滅少康收集夏眾復禹之績漢高祖拔起壠畝驅帥豪雋芟夷秦項包舉宇內斯二主可謂殊才異略命世大賢者也考其功德誰宜為優顗等對曰夫天下重器王者天授德應期運然後能受命創業至於階緣前緒興復舊績造之與復固難易不同少康功德雖美猶為中興之君與漢世祖同流可也至如高祖臣等以為優帝曰自古帝王功德言行互有高下未必創業者皆優紹繼者咸劣也湯武高祖雖俱受命賢聖之分所覺懸殊少康殷宗中興之美夏啟周成守文之盛論德校實方諸漢祖吾見其優未聞其劣顧所遇之時殊故所名之功異爾少康生於滅亡之後降為諸侯之隸崎嶇逃難僅以身免能布其德而兆其謀卒滅過戈克復禹績祀夏配天不失舊物非至德弘仁豈濟斯勳漢祖因土崩之勢仗一時之權專任智力以成功業行事動靜多違聖撿為人子則數危其親為人君則囚繫賢相為人父則不能衛子身沒之後社稷幾傾若與少康易時而處或未能復大禹之績也推此言之宜高夏康而下漢祖矣漢晉陽秋曰帝見威權日去不勝其忿乃召侍中王沉尚書王經散騎常侍王業謂曰司馬昭之心路人所知也吾不能坐受廢辱今日當與卿自出討之王經曰昔魯昭公不忍季氏敗走失國為天下笑今權在其門久矣朝廷四方皆為之致死不顧逆順之理非一日也旦宿衛空闕兵甲寡弱陛下何所資用而一旦如此無乃欲除疾而更深之耶禍殆不測宜見重詳帝乃出懷中板投地曰行決矣正使死何所恨況不死耶於是入白太后沉業奔走告文王為之備帝遂帥僮僕數百鼓譟而出文王弟屯騎校尉伷音胄入遇帝於東止車門左右呵之伷眾奔走中護軍賈充又逆帝戰於南闕下帝自用劍揮眾欲退太子舍人成濟問充曰事急矣當云何充曰今日之事無所問也濟即前刺帝刃出於背文王聞大驚自投於地曰天下其謂我何太傅孚奔往枕帝股而哭哀甚殺陛下者臣之罪也葬高貴鄉公于洛陽西北三十里屈澗之濱下車數乘不設旌旐百姓相聚而觀之曰是前日所殺天子也或掩面而泣悲不自勝帝王世紀曰高貴卿公為太子舍人成濟所害年二十以公禮葬之陳留王魏志曰陳留王諱奐字景明武帝孫燕王宇之子也甘露三年封安次縣常道鄉公高貴鄉公卒公卿議迎立公六月入于洛陽即皇帝位於太極前殿大赦改元景元四年詔伐蜀命征西將軍鄧艾督帥諸軍趣甘松沓中雍州刺史諸葛緒督諸軍趨武都高樓首尾踧討若擒姜維便當東西並進掃滅巴蜀也又命鎮西將軍鍾會由駱谷伐蜀所至輒克十一月蜀主劉禪降巴蜀皆平咸熙二年命晉王冕十有二旒建天子旌旗進王妃為王后世子為太子八月相國晉王薨太子炎紹封襲位總攝百揆十二月禪位于晉改次于金墉城而終館于鄴時年二十在位六年帝王世紀曰陳留王即位禪晉封陳留王就國治鄴奉魏宗祀魏世譜曰晉封帝為陳留王年二十八太安元年崩謚曰元皇帝魏志評曰古者以天下為公唯賢是與後代世位立子以嫡若胤嗣不繼則宜取旁親明德若漢之文宣者斯不易之常准也明帝既不能然情繫私愛撫養嬰孩傳以大器託付不專必參枝族終於, SBCK: ''}
