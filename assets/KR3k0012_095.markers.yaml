  - {type: variant, offset: 52, length: 0, content: '', WYG: 者愼勿疑之明帝即位改封舞陽侯及孫權圍江夏遣其將諸葛瑾張霸并攻襄陽帝督諸軍討權走之進擊敗瑾斬張霸并首級千餘遷驃騎將軍太和元年六月天子詔帝屯於宛加督荆豫二州諸軍事初蜀將孟達之降也魏朝遇之甚厚帝以達言行傾巧不可任驟諫不見聽乃以達領新城太守封侯假節達於是連吳固蜀潛圖中國帝以書諭之達得書大喜猶與不決帝乃潛軍進討上庸城三面阻水達於城外為木栅自固帝渡水破其栅直造城下八道攻之旬有六日達甥鄧賢將李輔等開門出降斬達首傳京師俘獲萬餘人振旅還于宛乃勸農桑禁浮費南土悦附焉時邊郡新附多無户名魏朝欲加隱實屬帝朝於京師天子訪於帝帝對曰賊以密網束下故下棄之宜宏以大綱則自然安樂又問二虜宜討何者為先對曰吳以中國不習水戰故敢散居東關凡攻敵必先扼其喉而舂其心夏口東關賊之心喉若為陸軍以向皖音桓城引權東下為水戰軍向夏口乗其虚而擊之此神兵從天而墮破之必矣天子並然之復命帝屯于宛四年遷大將軍加大都督假黃鉞與曹真伐蜀軍次丹口遇雨班師明年諸葛亮冦天水圍將軍賈嗣魏平於祁山天子曰西方有事非君莫可付者乃使帝西屯長安都督雍梁二州諸軍事統車騎將軍張郃後將軍費曜征蜀護軍戴凌雍州刺史郭淮等討亮遂進軍隃式朱切麋亮聞大軍直至乃自帥衆將芟音衫上邽音圭之麥諸將皆懼帝曰亮慮多決少必安營自固然後芟麥吾得二日兼行足矣於是卷甲晨夜赴之亮望塵而遁進次漢陽與亮相遇帝列陣以待之使將牛金輕騎誘之兵纔接而亮退追至祁山亮屯鹵城據南北二山斷水為重圍帝攻之拔其圍亮宵遁追擊破之俘斬萬計天子使使勞軍増封邑二年亮又帥衆十餘萬出斜谷壘于郿音眉之渭水南原天子憂之遣征蜀將軍秦朗督步騎二萬受帝節度諸將欲往渭北待之帝曰百姓積聚皆在渭南此必爭之地也遂引軍而濟背水為壘因謂諸將曰亮若勇者當出武功依山而東若西上五丈原則諸軍無事矣亮果上原將北渡渭帝遣將軍周當屯陽遂以餌之數日亮不動遂遣將軍胡遵雍州刺史郭淮共備陽遂與亮㑹于積石臨原而戰亮不得進還於五丈原㑹有長星墜亮之壘帝知其必敗遣竒兵犄音已亮之後斬五百餘級獲生口千餘降者六十餘人}
