  - {type: variant, offset: 49, length: 3, content: 為齊公, SBCK: 亮又帥衆十餘萬出斜谷壘于郿音眉之渭水南原天子憂之遣征蜀將軍秦㓪督歩􅀐二萬受帝節度諸將欲住渭北待之帝曰百姓積聚皆在渭南此必爭之地也遂引軍而濟背水爲壘因謂諸將曰亮􅀂勇者當出武功依山而東􅀂西上五丈原則諸軍無事矣亮果上原將北渡渭帝遣將軍周當屯陽遂以餌之數日亮不勤遂遣將軍胡遵雍州刺史郭淮共備陽遂與亮㑹于積石臨原而戰亮不得進還于五丈原㑹有長星墜亮之壘帝知其必敗遣竒兵椅音巳亮之後斬五百餘級􅀗生口千餘降者六千餘人}
  - {type: page-break, offset: 49, content: '', id: KR3k0012_SBCK_095-3b}
  - {type: variant, offset: 49, length: 0, content: '', WYG: 督軍官罷遷侍中尚書右僕射五年天子南巡觀兵吳疆帝畱鎭許昌改封向鄉侯轉撫軍大將軍假節領兵五千以給事中録尚書事帝固辭天子曰吾於庶事以夜繼晝無須臾寧息此非以}
