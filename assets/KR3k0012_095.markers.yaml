  - {type: variant, offset: 18, length: 1, content: 叡, SBCK: 懿字仲逹河内温縣孝敬里人姓司馬氏其先出自帝髙陽之子重黎爲夏官祝融歴唐虞夏啇世序其職及周以夏官爲司馬其後程伯休父周宣王時以世官尅平徐方􅃬以官族因而爲氏楚漢間司馬昂爲趙將與諸侯伐􅁗􅁗亡立爲殷王都河内漢以其地爲郡子孫遂家焉自昂八世生征西將軍鈞字叔平鈞生豫章太守量字公度量生潁川太守儁}
  - {type: variant, offset: 18, length: 1, content: 叡, WYG: 懿字仲逹河内温縣人其先出自帝髙陽之子重黎為夏官祝融世序其職及周以夏官為司馬後程伯休父以世官平徐方錫以官族因而為氏楚漢間司馬卬為趙將與諸侯伐秦秦亡立為殷王都河内漢以其地為郡子孫遂家焉自卬八世生征西將軍鈞字叔平鈞生豫章太守量字公度量生潁川太守雋}
  - {type: page-break, offset: 18, content: '', id: KR3k0012_WYG_095-1b, image: WYG0893/WYG0893-0766b.png}
  - {type: variant, offset: 18, length: 1, content: 叡, krp: 懿字仲逹河内温縣孝敬里人姓司馬氏其先出自帝髙陽之子重黎爲夏官祝融歴唐虞夏啇世序其職及周以夏官爲司馬其後程伯休父周宣王時以世官尅平徐方錫以官族因而爲氏楚漢間司馬昂爲趙將與諸侯伐秦秦亡立爲殷王都河内漢以其地爲郡子孫遂家焉自昂八世生征西將軍鈞字叔平鈞生豫章太守量字公度量生潁川太守儁}
  - {type: substitution, offset: 18, original: 叡, replacement: 睿, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-18643}}
