  - {type: variant, offset: 59, length: 3, content: 其母誅, SBCK: 賜之帝曰􅃭者官物人臣無􅀻施也遂班師天子遣使者勞軍于薊増封食昆陽并前三縣齊王即位遷侍中持節都督中外諸軍録尚書事與曹爽各統兵三千人共執朝政更直殿中乗輿入殿爽欲使尚書奏事先由巳乃言於天子徙帝爲大司馬朝議以爲前後大司馬累薨於位乃以帝爲太傅入殿不趨賛拜不名劒履上殿如蕭何}
