充曰事急矣當云何充曰今日之事無所問也濟即前刺帝刃出於背文王聞大驚自投於地曰天下其謂我何太傅孚奔往枕帝股而哭哀甚殺陛下者臣之罪也葬高貴鄉公于洛陽西北三十里屈澗之濱下車數乘不設旌旐百姓相聚而觀之曰是前日所殺天子也或掩面而泣悲不自勝帝王世紀曰高貴卿公為太子舍人成濟所害年二十以公禮葬之陳留王魏志曰陳留王諱奐字景明武帝孫燕王宇之子也甘露三年封安次縣常道鄉公高貴鄉公卒公卿議迎立公六月入于洛陽即皇帝位於太極前殿大赦改元景元四年詔伐蜀命征西將軍鄧艾督帥諸軍趣甘松沓中雍州刺史諸葛緒督諸軍趨武都高樓首尾踧討若擒姜維便當東西並進掃滅巴蜀也又命鎮西將軍鍾會由駱谷伐蜀所至輒克十一月蜀主劉禪降巴蜀皆平咸熙二年命晉王冕十有二旒建天子旌旗進王妃為王后世子為太子八月相國晉王薨太子炎紹封襲位總攝百揆十二月禪位于晉改次于金墉城而終館于鄴時年二十在位六年帝王世紀曰陳留王即位禪晉封陳留王就國治鄴奉魏宗祀魏世譜曰晉封帝為陳留王年二十八太安元年崩謚曰元皇帝魏志評曰古者以天下為公唯賢是與後代世位立子以嫡若胤嗣不繼則宜取旁親明德若漢之文宣者斯不易之常准也明帝既不能然情繫私愛撫養嬰孩傳以大器託付不專必參枝族終於, krp: ''}
