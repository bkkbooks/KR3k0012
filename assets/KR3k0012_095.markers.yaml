  - {type: variant, offset: 737, length: 299, content: 書可附信者六人以為女尚書使典省外奏事處分當畫可自貴人已下至尚保及給掖庭洒掃習伎歌者各有千數通引穀水過九龍前玉井綺蘭蟾蠩含受神龍吐出使博士馬均作司南車水轉百戲歲首建巨獸魚龍曼延弄馬倒騎備如漢西京之制築閶闔諸門外罘音浮罳音思太子舍人張茂以吳蜀數動諸將出征而帝盛興宮室留意於玩飾賜與旡度帑藏空竭乃上書諫之魏氏春秋曰魏明帝天姿秀出立髮委地口吃少言而沉毅好斷初諸公受遺輔導帝皆以方位處之政自己出而優禮大臣開容善直雖犯顏極諫無摧戮也其君人之量如此之偉然不思建德垂風固維城之基至使大權偏據社稷無衛悲夫魏略曰明帝欲平北邙令登臺見孟津辛毗諫曰若九河溢涌洪水為害丘陵皆夷何以禦之帝乃止魏末傳曰初帝為平原王母甄后妬文帝殺, SBCK: ''}
