  - {type: variant, offset: 24, length: 0, content: '', SBCK: 即位封河津亭侯轉丞相長史魏文受漢禪以帝爲尚書頃之轉督軍御史中丞封安國郷侯黄􅀄二年督軍官罷遷侍中尚書右僕射五年天子南廵觀兵吳疆帝留鎮許昌改封向縣侯轉撫軍大將軍假節領兵五千加給事中録尚書事帝固辭天子曰吾於庶事以夜繼晝無須􅁷寜息此非以爲榮乃爲分憂耳六年天子復大興舟師征呉命帝居守臨行詔曰吾􅀷以後事爲念故以委卿曹叅雖有戰功而蕭何爲重使吾無西頋之憂不亦可乎天子自廣陵還洛陽詔帝曰吾東撫軍當㹅西事吾西撫軍當㹅東事於是留帝鎭許昌及天子疾篤帝與曹眞陳群等見於崇華殿之南堂並受頋命輔政詔}
  - {type: page-break, offset: 24, content: '', id: KR3k0012_SBCK_095-2a}
  - {type: variant, offset: 24, length: 8, content: 太子也生而太祖愛, WYG: 即位封河津亭侯轉丞相長史及魏受漢禪以帝為尚書頃}
  - {type: variant, offset: 24, length: 0, content: '', krp: 即位封河津亭侯轉丞相長史魏文受漢禪以帝爲尚書頃之轉督軍御史中丞封安國郷侯黄𥘉二年督軍官罷遷侍中尚書右僕射五年天子南廵觀兵吳疆帝留鎮許昌改封向縣侯轉撫軍大將軍假節領兵五千加給事中録尚書事帝固辭天子曰吾於庶事以夜繼晝無須臾寜息此非以爲榮乃爲分憂耳六年天子復大興舟師征呉命帝居守臨行詔曰吾深以後事爲念故以委卿曹叅雖有戰功而蕭何爲重使吾無西頋之憂不亦可乎天子自廣陵還洛陽詔帝曰吾東撫軍當㹅西事吾西撫軍當㹅東事於是留帝鎭許昌及天子疾篤帝與曹眞陳群等見於崇華殿之南堂並受頋命輔政詔}
  - {type: variant, offset: 26, length: 0, content: '', SBCK: 曰有聞此三公者慎勿疑之明帝即位改封舞陽侯及孫權圍江夏遣其將諸􅁑瑾張覇并攻襄陽帝督諸軍討權走之進擊敗瑾斬張霸并首級千餘遷驃將軍太和元年六月天子詔帝屯于宛加督荆豫二州諸軍事􅀄蜀將孟逹之降}
  - {type: page-break, offset: 26, content: '', id: KR3k0012_SBCK_095-2b}
  - {type: variant, offset: 26, length: 0, content: '', krp: 曰有聞此三公者慎勿疑之明帝即位改封舞陽侯及孫權圍江夏遣其將諸葛瑾張覇并攻襄陽帝督諸軍討權走之進擊敗瑾斬張霸并首級千餘遷驃將軍太和元年六月天子詔帝屯于宛加督荆豫二州諸軍事𥘉蜀將孟逹之降}
