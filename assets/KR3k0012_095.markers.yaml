  - {type: variant, offset: 270, length: 0, content: '', SBCK: 本意也臣雖朽邁敢忘前言昔趙髙極意􅁗是以亡吕霍早斷漢祚永延此乃陛下之殷鑒臣授命之秋也公卿群臣皆以爽有無君之心兄弟不冝典兵􅀫衛表皇太后勑如奏施行臣輙勑主者及黄門令罷爽羲訓吏兵各以本官侯就第􅀂稽留車駕以軍法從事臣輙力疾將兵詣洛水浮橋伺察非常爽不通奏留車駕􅀫伊水南伐樹爲鹿角發屯兵數千人以守桓範果勸爽奉天子幸許昌傳徼徴天下兵爽不能用而夜遣侍中許允尚書陳泰詣帝以觀望風旨帝數其過失事止免官泰還以報爽勸之通奏帝又遣爽所信殿中校尉尹大目諭爽指洛水爲誓爽意信之桓範等援引今古諌說萬端終不能從乃曰司馬公正當欲奪}
