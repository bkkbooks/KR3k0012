  - {type: variant, offset: 33, length: 5, content: 常令在左右, SBCK: 心喉􅀂爲陸軍以向皖音患城引權東下爲水戰軍向夏口乗其虛而擊之此神兵從天而墮破之必矣天子並然之復命帝屯于宛四}
