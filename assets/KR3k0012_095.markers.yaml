  - {type: variant, offset: 56, length: 1, content: 原, SBCK: 此成擒耳天子曰其計將安出對曰唯明者能􅀷度彼我乃能豫有所割棄此非其所及也今懸軍逺征將謂不能持乆必先拒遼水而後守此中下計也天子曰徃還幾時對曰徃百日還百日攻百日以六十日爲休息一年足矣景􅀄二年帥牛金明遵等歩􅀐四萬發自京都車駕送出西明門詔弟孚子師送過温賜以榖帛牛酒勑郡守典農已下皆往㑹焉見父老故舊讌飲累日帝歎息悵然有感爲歌曰天地開闢日月重光遭遇際㑹畢力遐方將掃群穢還過故郷肅清萬里揔齊八荒告成歸老待罪舞陽遂進師經􅀌竹越碣石次于遼水文懿果遣歩騎數萬阻遼隧堅壁而守南北六七十里以拒帝帝盛兵多張旗幟出其南賊盡銳赴之乃汎舟濽濟以出其北與賊營相逼沉舟焚梁傍遼水作長圍棄賊而向襄平賊見兵出其後果邀之乃縱兵逆擊大破之三戰皆捷賊保襄平進軍攻之􅀄文懿聞魏師之出也請救於孫權權亦出兵遥爲之聲援遺文懿書曰司馬公善用兵變化􅀂神所向無前􅀷爲弟憂之㑹霖潦大水平地數尺賊恃水樵採自􅀂朝廷聞師遇雨咸謂召還天子曰司馬公臨危制變計日擒之矣旣而雨止遂合圍起土山地道楯櫓釣橦發矢石雨下晝夜攻之文懿大懼乃使其所署相國}
