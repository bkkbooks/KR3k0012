  - {type: variant, offset: 564, length: 172, content: 岐嶷之姿武皇帝異之曰我基於爾三世矣每朝讌會同與待中近臣並列帷幄好學多識特留心於法理容止可觀望之儼恪即位之後容受直言聽受吏民士卒上書一月之中至數十百封雖文辭鄙陋猶覽省究意無厭倦又曰青龍三年起太極諸殿築總章觀高十餘丈建翔鳳於其上又於芳林園中起陂池楫櫂越歌又於列殿之北立八坊諸才人以次弟序處其中貴人夫人已上轉南附焉其秩名擬百官之數帝常遊宴在內乃選女子, SBCK: 神}
