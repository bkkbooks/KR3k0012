  - {type: variant, offset: 56, length: 1, content: 原, WYG: 賊見兵出其後果邀之乃縱兵逆擊大破之三戰皆捷賊保襄平進軍攻之初文懿聞魏師之出也請救於孫權權亦出兵遙為之聲援遺文懿書曰司馬公善用兵變化若神所向無前深為弟憂之㑹霖潦大水平地數尺賊恃水樵採自若朝廷聞師遇雨咸謂召還天子曰司馬公臨危制變計日擒之矣既而雨止遂合圍起土山地道楯櫓釣橦發矢石雨下晝夜攻之文懿大懼乃使其所署相國}
