  - {type: variant, offset: 49, length: 3, content: 為齊公, krp: 亮又帥衆十餘萬出斜谷壘于郿音眉之渭水南原天子憂之遣征蜀將軍秦㓪督歩騎二萬受帝節度諸將欲住渭北待之帝曰百姓積聚皆在渭南此必爭之地也遂引軍而濟背水爲壘因謂諸將曰亮若勇者當出武功依山而東若西上五丈原則諸軍無事矣亮果上原將北渡渭帝遣將軍周當屯陽遂以餌之數日亮不勤遂遣將軍胡遵雍州刺史郭淮共備陽遂與亮㑹于積石臨原而戰亮不得進還于五丈原㑹有長星墜亮之壘帝知其必敗遣竒兵椅音巳亮之後斬五百餘級獲生口千餘降者六千餘人}
  - {type: variant, offset: 50, length: 1, content: 齊, WYG: 榮乃為分憂耳六年天子復大興舟師征吳復命帝居守臨行詔曰吾深以後事為念故以委卿曹參雖有戰功而蕭何為重使吾無西顧之憂不亦可乎天子自廣陵還洛陽詔帝曰吾東撫軍當總西事吾西撫軍當總東事於是畱帝鎭許昌及天子疾篤召帝與曹眞陳羣等見於崇華殿之南堂並受顧命輔政詔太子曰有間此三}
