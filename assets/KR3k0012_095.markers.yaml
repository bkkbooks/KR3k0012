  - {type: variant, offset: 39, length: 2, content: 十五, SBCK: 遷大將軍加大都督假黄􅃏與曹真伐蜀軍次丹口遇雨班師明年諸􅁑亮㓂天水圍將軍賈嗣魏平於祁山天子曰西方有事非君莫可付者乃使帝西屯長安都督雍梁二州諸軍事統車􅀐將軍張郃後將軍費曜征蜀護軍戴凌雍州刺史郭淮等討亮遂進軍隃式朱切麋亮聞大軍直至乃自帥衆將芟音衫上邽音圭之麥諸將皆懼帝曰亮慮多決少必安營自固然後芟麥吾得二日兼行足矣於是卷甲晨夜赴之亮望塵而遁進次漢陽與亮相遇帝列陣以待之使將牛金輕􅀐誘之兵纔接而亮退追至祁山亮屯鹵城據南北二山斷水爲重圍帝攻之拔其圍亮霄遁追擊破之俘斬萬計天子使使勞軍増}
