  - {type: 'tls:seg', offset: 19, content: '', id: KR3k0012_CHANT_095-1a.5}
  - {type: variant, offset: 21, length: 1, content: 仲, SBCK: 異儁生京兆尹防字建公帝即防之弟二子也少有竒節聦眀多大略愽學洽聞伏膺儒教漢末大亂常􅁣然有憂天下心南郡太守同郡楊俊有知人鑒見帝未弱冠以爲非常之器尚書清河崔琰與帝兄㓪善亦謂㓪曰君弟聦亮明允剛斷英特非子所及也漢建安六年郡舉上計遂魏武帝爲司空聞而辟之帝知漢運方微不欲屈節曹氏辤以風痺不能起居魏武使人夜往宻刺之帝堅卧不動及魏武爲丞相又辟爲文學􅁺勑行者曰􅀂復盤桓便収之帝懼而就職於是使與太子遊處遷黄門侍郎轉議郎丞相東曹屬㝷轉主簿魏國旣建遷太子中庶子每與大謀輙有竒䇿爲太子所信重與陳群呉質朱鑠號爲四友遷爲軍司馬言於魏武曰昔箕子陳謀以食爲首今天下不耕而食者蓋二十餘萬非經國逺籌也雖戎甲未卷自冝且耕且守魏武納之於是務農積榖國用豐贍及魏武薨於洛陽朝野危懼帝綱紀䘮事内外肅然乃奉梓宫還鄴魏}
  - {type: page-break, offset: 21, content: '', id: KR3k0012_SBCK_095-1b}
  - {type: variant, offset: 21, length: 1, content: 仲, WYG: 異雋生京兆尹防字建公帝即防之第二子也少有竒節聰明多大畧博學洽聞服膺儒教漢末大亂常慨然有憂天下心南郡太守同郡楊俊有知人之鑒見帝未弱冠以為非常之噐尚書清河崔琰與帝兄朗善亦謂朗曰君弟聰亮明允剛斷英特非子所及也漢建安六年郡舉上計掾魏武帝為司空聞而辟之帝知漢運方微不欲屈節曹氏辭以風痺不能起居魏武使人夜往密刺之帝堅卧不動及魏武為丞相又辟文學掾勅行者曰若復盤桓便収之帝懼而就職於是使與太子遊處遷黄門侍郎轉議郎丞相東曹屬尋轉主簿魏國既建遷太子中庶子毎與大謀輒有竒䇿為太子所信重與陳羣吳質朱鑠號為四友遷行軍司馬言於魏武曰昔箕子陳謀以食為首今天下不耕而食者蓋二十餘萬非經國逺籌也雖戎甲未卷自宜且耕且守魏武納之於是務農積穀國用豐贍及魏武薨於洛陽朝野危懼帝綱紀喪事内外肅然乃奉梓宫還鄴魏}
