  - {type: 'tls:seg', offset: 27, content: '', id: KR3k0012_CHANT_095-1a.7}
  - {type: variant, offset: 27, length: 1, content: 生, SBCK: 魏朝遇之甚厚帝以逹言行傾巧不可任驟諫不見聽乃以逹領新城太守封侯假節逹於是連吴固蜀潜圖中國帝以書諭之逹得書大喜猶與不决帝乃潜軍進討上庸城三面阻水逹於城外爲木柵自固帝渡水破其柵直造城下八道攻之旬有六日逹甥鄧賢將李輔等開門岀降斬逹首傳京師俘􅀗萬餘人振旅還于宛乃勸農桑禁浮費南土恱附焉時邊郡新附民無名户魏朝欲知隠實屬帝朝于京師天子訪於帝帝對曰賊以密網束下故下弃之冝􅀪以大綱則自然安樂又問二虜冝討何者爲先對曰吴以中國不習水戰故敢散居東關凡攻敵必先扼其喉}
  - {type: variant, offset: 27, length: 1, content: 生, krp: 魏朝遇之甚厚帝以逹言行傾巧不可任驟諫不見聽乃以逹領新城太守封侯假節逹於是連吴固蜀潜圖中國帝以書諭之逹得書大喜猶與不决帝乃潜軍進討上庸城三面阻水逹於城外爲木柵自固帝渡水破其柵直造城下八道攻之旬有六日逹甥鄧賢將李輔等開門岀降斬逹首傳京師俘獲萬餘人振旅還于宛乃勸農桑禁浮費南土恱附焉時邊郡新附民無名户魏朝欲知隠實屬帝朝于京師天子訪於帝帝對曰賊以密網束下故下弃之冝弘以大綱則自然安樂又問二虜冝討何者爲先對曰吴以中國不習水戰故敢散居東關凡攻敵必先扼其喉}
