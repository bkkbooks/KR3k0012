  - {type: variant, offset: 54, length: 1, content: 為, SBCK: 遷太尉累増封邑蜀將馬岱入㓂帝遣將軍牛金擊走之斬千餘級四年遼東太守公孫文懿反徴帝詣京師天子曰此不足以勞君事欲必尅故以相煩耳君度其作何計對曰棄城預走上計也據遼水以拒大軍次計也坐守襄}
  - {type: variant, offset: 54, length: 0, content: '', WYG: 遷太尉累增封邑蜀將馬岱入冦帝遣將軍牛金擊走之斬千餘騎四年遼東太守公孫文懿反徵帝詣京師天子曰此不足以勞君事欲必尅故以相煩耳君度其作何計對曰棄城預走上計也據遼水以拒大軍次計也坐守襄平此成擒耳天子曰其計將安出對曰惟明者能深度彼我乃能豫有所制棄此非其所及也今懸軍逺征將謂不能持久必先拒遼水而後守此中下計也天子曰往還幾時對曰往百日還百日攻百日以六十日}
  - {type: page-break, offset: 54, content: '', id: KR3k0012_WYG_095-6a, image: WYG0893/WYG0893-0769a.png}
  - {type: variant, offset: 54, length: 1, content: 為, krp: 遷太尉累増封邑蜀將馬岱入㓂帝遣將軍牛金擊走之斬千餘級四年遼東太守公孫文懿反徴帝詣京師天子曰此不足以勞君事欲必尅故以相煩耳君度其作何計對曰棄城預走上計也據遼水以拒大軍次計也坐守襄}
  - {type: variant, offset: 55, length: 0, content: '', WYG: 休息一年足矣景初二年帥牛金胡遵等步騎四萬發自京都車駕送出西明門詔弟孚子師送過溫賜以穀帛牛酒勅郡守典農已下皆往㑹焉見父老故舊讌飲累日帝歎息悵然有感為歌曰天地開闢日月重光遭遇際㑹畢力遐方將掃羣穢還過故鄉肅清萬里總齊八荒告成歸老待罪舞陽遂進師經孤竹越碣石次于遼水文懿果遣步騎數萬阻遼水堅壁而守南北六七十里以拒帝帝盛兵多張旗幟出其南賊盡鋭赴之乃泛舟潛濟以出其北與賊營相逼沈舟焚梁傍遼水作長圍棄賊而向襄}
  - {type: page-break, offset: 55, content: '', id: KR3k0012_WYG_095-6b, image: WYG0893/WYG0893-0769b.png}
