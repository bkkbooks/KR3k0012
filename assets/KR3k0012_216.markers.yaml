  - {type: variant, offset: 2024, length: 855, content: 一主羌夷吏民一主天下戶口土田墾作一主錢帛貢獻委輸又曰尚書郎主作文書起草夜更直五日於建禮門內又曰尚書郎給青縑白綾被以錦被帷帳氈褥通中枕太官供食湯官供餅餌五熟菓實下天子一等級尚書史二人女侍史二人皆選端正從直女侍執香鑪燒薰從入臺護衣奏事明光殿省皆胡粉塗畫古賢人烈女郎握蘭含香趣走丹墀奏事黃門郎與對揖天子五時賜服若郎處曹二年賜遷二千石刺史又曰尚書郎初上詣臺稱守尚書郎滿歲稱尚書郎中三年稱侍郎續漢書百官志曰尚書郎三十六人四百石魏志曰明帝太和四年詔曰世之質文隨教而變兵亂以來經學廢絕後生進趣不由謨典豈朕訓導未洽將進用者不以德顯乎其郎吏學通一經才任牧民愽士課試擢其高第者亟用其浮華不務道本者皆罷退之又曰賈詡字文和武威姑臧人也少時人莫知唯漢陽閻忠異之謂有良平之計察孝廉為郎魏略曰韓宣字景然為尚書郎嘗以職事當受罰已縛束竟杖未行文帝輦過問是誰左右以實對帝曰是子建所道韓宣耶特原之又曰姜維字伯約郡欲表維以為將維家本衣冠不願為將郡因表拜郎中吳志曰張純字元基少厲操行學愽才秀而切問捷對容止可觀擢拜郎中又曰士爕字威彥蒼梧廣信人少遊學京師事頴川劉子奇治左氏春秋察孝廉補尚書郎又曰孫皓降晉賜號歸命侯諸子為王者皆拜郎中晉書曰魏舒字陽元為尚書郎時選郎或有非其人論者欲有沙汰之言舒曰吾即其人也乃幞被遙出同寮素無清議者咸有自愧之色談者莫不詠其高又曰索靖同郡張勃特表靖以才藝絕人宜在臺閣不宜遠出邊塞武帝納之擢為尚書郎又曰樂廣為尚書郎與何晏鄧颺等談講衛瓘見而奇之曰常恐微言將絕今復聞之命諸子造焉謂曰此人之水鏡也每見此人瑩然猶披雲霧而覩青天也又曰索靖子綝字巨秀少有逸群之量靖每曰綝廊廟之材非簡札之用州郡吏不足汙吾兒也舉秀才除郎中嘗報兄讎手殺三十七人時人壯之又曰吳隱之兄坦之為袁真功曹真敗將及禍隱之詣桓溫乞代兄命溫矜而釋之遂為溫所知賞拜奉朝請尚書郎中又曰嵇含言於長沙王乂曰昔魏武每有軍事增置掾屬尚書令陳矯以有軍事亦奏增郎況今都官中騎三曹晝出督戰夜還理事一人兩役內外廢之含謂之各有主師委之大將不宜復令臺僚雜與其門乂從之乃增郎及令史也又曰賈充改為律令以裴楷為定科, SBCK: ''}
