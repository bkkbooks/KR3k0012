  - {type: variant, offset: 277, length: 293, content: 高祖景伯至頴叔四代咸居選部時論榮之又曰韋陟為吏部侍郎常病選人冒名接腳竊授闕員既少取士良難正調者被擠偽集者冒進陟剛腸嫉惡風彩嚴正見選人疑其有瑕按聲盤詰無不首伏每歲皆贖得數百員闕以待淹滯常謂所親曰使陟知銓衡一二年則無人可選矣又曰崔群徵拜吏部侍郎穆宗召見別殿謂群曰我昇儲位知卿為羽翼群曰先帝意元在陛下頃者授陛下淮西節度使臣奉命草制且曰能辨南陽之牘允符東海之賢若不知先帝深旨臣豈敢輕言又曰崔鄲為兵部侍郎本官判吏部東銓事文宗勤於政道每苦選曹訛弊延英謂宰臣曰吏部殊不選才安得摭實無濫可釐革否李石對曰令錄可以啇量他官且宜循舊上曰循舊如配官耳賢不肖安能甄別乃召三銓謂之曰卿等比選令錄如何注擬鄲對曰資敘相, WYG: 志仕}
