  - {type: variant, offset: 56, length: 3, content: 房玄齡, WYG: 選郡守明帝疑其所用非次召入將加罪允妻阮氏跣出謂曰明主可以理奪難以情求允頷之而入帝怒詰之允對曰某郡守雖限滿文書先至年限在後某守雖後日限在前帝取事視乃釋遣出望其衣歎曰清吏也蜀志曰趙戬字叔茂京兆長陵人質而好學言稱詩書愛惜於人不論疎密辟公府入為尚書選部郎董卓欲以所私並充臺閣戬拒不聽卓怒召戬欲殺之觀者皆為戬懼而戬自若及見卓列辭正色陳説是非卓雖㓙戾屈而謝之晉書曰山濤為吏部郎文帝與書曰足下在事明雅邁時念多所乏人今致錢二十萬絲百斤榖二百斛又曰李重字茂曽遷尚書吏部郎詢朝衆而斥華競存公平而塞私謁是以群才罔不畢舉又曰吏部郎缺文帝問人於鍾㑹㑹曰裴楷清通王戎簡要皆其選也於是以楷為吏部郎又曰徐寧少知名為與縣令時廷尉桓彛稱有人倫鑒識䕶軍庾亮每屬之訪一佳吏部郎彛嘗去職至廣陵尋親舊還遇風停浦中累日憂悒因上岸見一室宇有似廨署訪之云是與縣彛乃造之寧清惠博渉相遇欣然因留數夕彛大賞之結交而别至都謂庾亮曰吾為卿得一佳吏部郎亮問所在彛曰人所應有不必有人所應無不必無徐寧真海岱清士因為叙之即遷吏部郎又曰}
