  - {type: variant, offset: 3326, length: 224, content: 免瑾之親故莫有恤者允愍焦年老保護在家積六年遵始蒙赦其篤行如此三國典略曰齊主命百司各列勤惰尚書郎皇甫亮三日不上齊主親詰其故亮對曰一日雨一日病酒齊主以其言實遂優容之令杖脛三十唐書曰韋虛舟家有禮則父子兄弟更踐郎省時稱郎官家又曰趙曄字雲卿鄧州穰人早擅高名在宦途五十年累經貶謫蹇躓備至入仕三十年方霑省官身在郎署子嘗徒步官既散曹俸祿單寡衣食不充以至亡歿撿者為之歎息三輔決錄曰田鳳字季宗為尚書郎容儀端正入奏事靈帝目送之因題柱曰堂堂乎張京兆田郎又曰陳重與其友雷義俱, WYG: 宋繇耳}
