  - {type: variant, offset: 1495, length: 7, content: 曹節女壻馮方亦, WYG: ''}
  - {type: variant, offset: 1503, length: 520, content: 郎彬厲志操與左丞劉歆右丞杜希同好交善未嘗與方共酒食之會方深怨之遂彰言彬等為酒黨事下尚書令劉猛猛雅善彬等不舉正其事節大怒劾奏猛以為阿黨請收下詔獄在朝者為之寒心猛意氣自若旬日得出免官禁錮彬遂見廢又曰王譯為尚書侍郎臺閣議奏常依義據法為三臺之表又曰陳忠䟽曰尚書為王喉舌而諸郎多文俗鮮有雅才每為詔文宣示內外轉相求請也續漢書曰胡廣字伯始舉孝廉試為天下第一旬日拜尚書郎又曰徐防為尚書郎性周密畏慎在臺閣典職十年奏事三世未嘗有過謝承後漢書曰尚書郎舊典秩滿遷令長鄭弘為僕射奏以臺職任尊而賞薄人無樂者請使郎補二千石自此始也又曰方儲為郎中章帝使文郎居左武郎居右儲正位中曰臣文武兼備在所施用上嘉其才以繁亂絲付儲使理儲拔佩刀而斷之曰反經任勢臨事宜然又曰何湯拜郎中守關陽門候上微行夜還湯閉門不納更從中東門入明旦召詣太官賜食諸門候皆奪俸華嶠後漢書曰館陶公主為子求郎不許賜錢千萬明帝謂群臣曰郎官上應列宿非其人則民受其殃又曰竇攸篤學退居舉孝廉為郎世祖會百寮於靈臺得鼠如豹文問群臣攸曰鼮鼠詔曰何以知曰見爾雅詔書如攸言賜帛三百更勑諸王子從攸受爾雅又曰明帝性褊察嘗以事怒郎樂崧崧逕入床下上怒甚疾呼曰郎出郎出崧曰天子穆穆諸侯皇皇未聞人君自起撞郎上乃舍之漢官儀曰尚書郎四人一主匈奴單于營, WYG: 吏}
