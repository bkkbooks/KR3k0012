  - {type: variant, offset: 3663, length: 311, content: 屈撓王處冲別傳曰處冲為尚書郎外望簡縱若有遺漏然事要機輒執其中中外之間亡所辨明臺閣益歸重之通典曰故事叔父兄弟不許同省為郎官格令不載亦無正勑貞觀二年十一月韋叔謹除刑部員外三年四月韋季武除主爵郎中其年七月韋叔諧除庫部都中太宗謂曰知卿兄弟近在尚書省故授卿此官欲成一家之美無辭稍屈階資也其後同省者甚多近日非特恩除拜即須相廻避抱朴子曰漢末有禰衡者年二十三孔文舉齒過知命身居九列才學冠群名位殊絕始友衡於布衣又薦之於朝以為宜使起家作臺郎世語曰青龍中石苞鬻鐵於長安得見司馬宣王知焉擢為郎又曰曹爽解印綬將出主簿楊綜止之爽不從有司奏綜導爽反宣王曰各為其主宥之為郎桓譚新論曰余年十七為奉車郎中衛殿中小苑西門魏武集選舉令曰國家舊法選尚書郎取年未五十, SBCK: 理持禄養交}
  - {type: variant, offset: 3663, length: 10, content: 屈撓王處冲別傳曰處冲, WYG: 謝嫗見其不飽又進一豚又食半餘半還之後道貞}
