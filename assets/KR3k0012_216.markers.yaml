  - {type: variant, offset: 4155, length: 4, content: 選材伎鋒, SBCK: 事復何望哉一昨陛下遊幸驪山宰相翰林學士是陛下股肱心腹冝皆知之蕭俛等不能先事未形忘軀懇諫而使陛下有忽諌之名流於史􅁽是䧟君於過也孔子曰所謂大臣者以道事君不可則止􅀂俛等言行計從不當如是􅀂言不行計不從湏奉身速退不冝尸素於化源進退戾也何所避辭其蕭俛叚文昌崔植三人并翰林學士杜元頴等並請考中下御史大夫李絳左散􅀐常侍張惟素右散􅀐常侍李益等諌幸驪山鄭覃等諌畋遊是皆恐陛下行幸不息恣情無度又恐馬有銜蹶不測之變風寒生疾之憂急奏無所詣國璽委於婦人中倖之手絳等能率御史諌官論列於朝有懇激事君之禮其李絳張惟素李益三人伏請賜上下考外特與遷官以彰陛下優忠賞諌之美其崔元略冠供奉之首合考上下縁與于翬上下考于翬以犯贓處死准令須降請賜考中中大理卿許季同任使于翬韋道冲韋正牧皆以犯贓或左降或處死合考中下然頃者䧟劉闢之亂弃家歸朝忠節明著今冝以功􅀘過請賜考中中少府監裴通職事修舉合考中上以其請追封所生母而捨嫡母是明罔於君幽欺其先請考中下伏以昔在宰夫入寢擅飯師曠李調今愚臣守官請書宰相學士中下考上愛聖運下振頺綱故臣懼不言之爲罪不懼言之爲罪也其三品官考伏縁限在今月内進輙先具如前其四品巳下官續具條流聞奏狀入留中不下議者以宰輔曠官自冝上䟽論列而渤越職釣名非盡事君之道唐新語曰李廻秀任考功貟外知貢舉有進士姓崔者文筆非佳廻秀覽之良乆謂曰清河崔郎儀貌不惡􅂡眉如㦸精彩甚髙}
