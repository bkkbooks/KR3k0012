  - {type: variant, offset: 4188, length: 1, content: 雍, WYG: 人才既自難知中人已下情偽又難吏部郎以碎事日夜相接非但當正已而已乃當能正人議郎杜㸃徳履亦佳太子庶子崔諒中郎陳淮皆有意正又其次不審有可用者不袁宏與謝僕射書曰聞見擬為吏部郎不知審爾果當至此誠相遇之過梁陸倕拜吏部郎表曰銓衡庶品歴選賓實阮咸貞素屢薦未登陸亮忠心裁居散職自非季重清識李毅恬正何以區分管庫式鑒胥吏吏部員外郎六典曰吏部員外郎二人一人掌判南曹每嵗選人有解状簿書資厯考課必由之以覆其實乃上三銓其三銓進甲則署焉一人掌判曹務凡預太廟齋郎帖試如貢舉焉唐書曰崔郾為吏部員外奸吏不敢欺孤寒无援者未嘗留滯銓叙之美為時所稱五代史後唐書曰蕭頃遷吏部員外郎先是張濬由中書出為右僕射曲為朱温判官高邵使祖廕求一子出身官省寺皆稱无例濬指揮甚急吏徒惶懼頃乃判状云僕射未集郎官未赴省上指揮吏曹公事且非南宫舊儀濬聞之慙悚致謝由是名振司封郎中司封員外郎六典曰司封郎中員外郎掌邦之封爵凡有九等一曰王正一品食邑一萬戸二曰郡王從一品食邑五千戸三曰國公從一品食邑三千戸四曰郡公正二品食邑二千戸五曰縣公從二品食邑一千五百戶六曰縣侯從三品食邑一千户七曰縣伯正四品食邑七百户八曰縣子正五品食邑五百户九曰縣男從五品食邑三百户職員令曰司封郎中掌封壐皇宗諸親内外命婦及國官邑官告身并選流外親品等第等司勲郎中司勲員外郎六典曰司勲郎中員外郎掌邦國官人之勲級凡勲十有二轉為上柱國比正二品十一轉柱國十轉為上䕶軍比正三品九轉為䕶軍比從三品八轉為上輕車都尉比正四品七轉為輕車都尉比從四品六轉為上騎都尉比正五品五轉為騎都尉比從五品四轉為驍騎尉比正六品三轉為飛騎尉比從六品二轉為雲騎尉比正七品一轉為武騎尉比從七品考功郎中六典曰考功郎中員外郎掌内外文武官吏之考課凡應考之官皆具録當年功過行能本司及本}
