  - {type: variant, offset: 83, length: 174, content: 曹吏部禮部兵部刑部民部工部各置侍郎一人以貳尚書之職唐書曰高季輔為吏部侍郎凡所銓敘時稱允當從幸翠微宮太宗賜金背鏡一面以表其清鑒焉又曰天后以許子儒為天官侍郎儒不以藻飾為意其補官悉委令史勾直時謂勾直曰平配後崔玄暐為之介然自守絕於請謁為職政者所忌轉文昌左丞選司令史乃設齋自慶武太后聞之復拜為天官侍郎又曰席豫為吏部侍郎玄宗謂之曰以卿前為考功職事平允故有此授豫, SBCK: ''}
