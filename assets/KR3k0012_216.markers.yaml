  - {type: variant, offset: 1707, length: 234, content: 過謝承後漢書曰尚書郎舊典秩滿遷令長鄭弘為僕射奏以臺職任尊而賞薄人無樂者請使郎補二千石自此始也又曰方儲為郎中章帝使文郎居左武郎居右儲正位中曰臣文武兼備在所施用上嘉其才以繁亂絲付儲使理儲拔佩刀而斷之曰反經任勢臨事宜然又曰何湯拜郎中守關陽門候上微行夜還湯閉門不納更從中東門入明旦召詣太官賜食諸門候皆奪俸華嶠後漢書曰館陶公主為子求郎不許賜錢千萬明帝謂群臣曰郎官上應列宿非其人則民受其殃又曰竇攸篤學退居舉孝廉為郎世祖會百寮於靈臺得鼠如豹文問群臣攸曰鼮鼠詔曰何以知曰見爾雅詔書如攸, SBCK: 違前}
