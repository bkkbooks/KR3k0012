  - {type: variant, offset: 3274, length: 3, content: 高允為, SBCK: 宋繇沮渠蒙遜平酒泉於繇室得書數千卷鹽米十斛而已蒙遜歎曰􅀌不喜尅李歆欣得宋繇耳拜尚書吏部郎中委以銓衡之任又曰鄧淵􅀶覽經書長於易筮太祖定中原擢爲吏部郎淵明解制度多識故事與崔􅀇伯叅定朝儀律令音樂及軍國文記詔䇿多淵所爲又曰孝文帝欲創革舊制選置百官謂羣臣曰爲朕舉一吏部郎給卿三日假尋曰朕已得之矣乃徴崔亮爲之亮字敬儒自叅選事垂將二十年廉愼明決尚書曰非崔郎中選事不辦又曰韋㻛爲吏部郎性貪婪鬻賣官吏皆有定價王藴別傳曰藴字叔仁爲吏部郎欲使時無屈滯曾下鼓急出日􅉴乃至家去臺數里髙褰車帷先後與語不得進也一官缺求者十輩藴連狀呈宰録曰某人有地某人有才不得者甘心無怨晉懷帝永嘉官名曰吏部郎太原温畿字元甫丗論以其爲人夷曠似玉郭子曰劉道眞少時漁釣草澤善歌嘯聞之者莫不留連有一老嫗識其非人甚樂其歌嘯及殺豚進之道眞食豚盡了不謝嫗見其不飽又進一豚又食半餘半還之後道眞爲吏部郎嫗兒爲小令史道眞乃超用之兒不知所由問母而後知之於是齎牛酒以詣道眞道眞􅀏曰去去無可復相報者丗􅀃曰山濤舉阮咸爲吏部郎白曰清直寡欲萬物不能移也山濤啓事曰人才旣自難知中人巳下情僞又難吏部郎以碎事日夜相接非但當正巳而巳乃當能正人議郎杜黙德履亦佳太子庶子崔諒中郎陳淮皆有意正又其次不審有可用者不􅀽宏與謝僕射書曰聞見擬爲吏部郎不知審尓果當至此誠相遇之過梁陸倕拜吏部郎表曰銓衡庶品歷選賔實阮咸眞素屢薦未登陸亮忠心裁居敗職自非季重清識李毅恬正何以區分管庫式鑒胥吏吏部貟外郎六典曰吏部貟外}
