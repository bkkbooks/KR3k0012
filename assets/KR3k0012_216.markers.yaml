  - {type: variant, offset: 3640, length: 3, content: 當五侯, SBCK: 刺史有驅迫人吏上言政績請刋石紀政者澣探得其情條責廉使巧跡遂露人服其敏識又曰李渤穆宗即位召爲考功貟外郎十一月定京官考不避權幸皆行昇黜奏曰宰臣蕭俛叚文昌崔植是陛下君臨之􅀄用爲輔弼安危理亂决在此時况陛下思天下和平敬大臣禮切固未有昵比左右侈滿自賢之心而宰相之權宰相之事陛下一以付之實君義臣行千載一遇}
