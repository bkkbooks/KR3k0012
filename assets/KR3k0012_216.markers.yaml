  - {type: variant, offset: 571, length: 588, content: 問其為治之術視可否而擬之帝曰依資合得而才劣者何授對曰與邊遠慢官帝曰如以不肖之才治邊民則疾苦可知也凡朝廷求理遠近皆須得人茍非其才人受其弊矣又曰楊纂除吏部侍郎前後典選十餘載銓敘人倫稱為允當然而抑文雅進黠吏觀時任數頗為時論所譏又曰鄧玄挺為吏部侍郎既不稱職甚為時談所鄙又時患消渴病選人因目為鄧渴牓於衢路自有唐巳來掌選之失未有如玄挺者坐此左遷灃州刺史唐新語曰裴行儉為吏部侍郎賞拔蘇味道王勵曰二公後當相次掌鈞衡之任卒如其言又曰韋陟嘗任吏部侍郎有一致仕官敘五品陟判之曰青壇展慶曾不立班朱紱承榮無宜臥拜時人推其強直又曰姜晦為吏部侍郎性聰晤識理體舊制吏曹舍宇悉布棘以防令史與選人交通及晦領選事盡除之大開銓門示無所禁私引致者晦輒知之召問莫不首伏初朝廷以晦改革前規咸以為不可竟銓綜得所賄賂不行舉朝歎伏又曰馬載為吏部侍郎時考功員外劉思立子憲為河內尉思立今日亡明日選人有索憲闕者載深咨嗟以為名教所不容乃書其無行注於集朝廷咸曰真銓綜流品之司可謂振理風俗也其人比出選門為眾目所視眾口所訐趑趄失步揔敘尚書郎漢書曰南宮二十五星應臺郎位故明帝云郎官上應列宿即此也又曰主父偃詣闕上書朝奏暮召人見所言九事其八事為律令其一事諫匈奴上謂曰公等安在何相見之晚乃拜偃為郎中又曰韓信為項羽郎中數干以策而弗用東觀漢記曰樊梵字文高為郎每嘗直事駐車待漏雖在閑署冠劍不解於身每齋祠恐失時張燈俯伏為郎二十三歲未嘗被奏三署服其慎重又曰黃香, WYG: ''}
