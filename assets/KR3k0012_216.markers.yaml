  - {type: variant, offset: 751, length: 928, content: 侍郎賞拔蘇味道王勵曰二公後當相次掌鈞衡之任卒如其言又曰韋陟嘗任吏部侍郎有一致仕官敘五品陟判之曰青壇展慶曾不立班朱紱承榮無宜臥拜時人推其強直又曰姜晦為吏部侍郎性聰晤識理體舊制吏曹舍宇悉布棘以防令史與選人交通及晦領選事盡除之大開銓門示無所禁私引致者晦輒知之召問莫不首伏初朝廷以晦改革前規咸以為不可竟銓綜得所賄賂不行舉朝歎伏又曰馬載為吏部侍郎時考功員外劉思立子憲為河內尉思立今日亡明日選人有索憲闕者載深咨嗟以為名教所不容乃書其無行注於集朝廷咸曰真銓綜流品之司可謂振理風俗也其人比出選門為眾目所視眾口所訐趑趄失步揔敘尚書郎漢書曰南宮二十五星應臺郎位故明帝云郎官上應列宿即此也又曰主父偃詣闕上書朝奏暮召人見所言九事其八事為律令其一事諫匈奴上謂曰公等安在何相見之晚乃拜偃為郎中又曰韓信為項羽郎中數干以策而弗用東觀漢記曰樊梵字文高為郎每嘗直事駐車待漏雖在閑署冠劍不解於身每齋祠恐失時張燈俯伏為郎二十三歲未嘗被奏三署服其慎重又曰黃香為尚書郎嘗獨止宿臺上晝夜不離省闥上聞善之又曰陽嘉二年汝南童子謝廉河南趙建年十二各通一經以太學初繕應化而至皆除郎中又曰黃香知古今記群書無不涉獵兼好圖讖天官星氣鍾律曆筭窮極道術京師號曰天下無雙江夏黃童京師貴戚慕其聲名更饋衣物拜尚書郎後漢書曰馮豹拜尚書郎忠勤不懈每事未報常俯伏省閤或從昏至明肅宗聞而嘉之使黃門持被覆豹勑令勿驚由是數加賞賜又曰馮勤除為郎中給事尚書以圖議軍糧在事精勤遂見親識每引進帝輒顧謂左右曰佳乎吏也由是使典諸侯封事勤善量功次輕重國土遠近地勢豐薄不相踰越莫不厭服焉自是封爵之制非勤不定帝益以為能又曰藥崧天性朴忠家貧為郎常獨直臺上無被枕杫杫思漬反謂俎几也方言云蜀漢之郊曰杫食糟糠帝每夜入臺輒見崧問其故甚嘉之自此詔太官賜尚書以下朝夕飡給帷被皂袍又曰桓彬拜尚書郎時中常侍曹節女壻馮方亦為郎彬厲志操與左丞劉歆右丞杜希同好交善未嘗與方共酒食之會方深怨之遂彰言彬等為酒黨事下尚書令劉猛猛雅善彬等不舉正其事節大怒劾奏猛以為阿黨請收下詔獄在朝者為之寒心猛意氣自若旬日得出免官禁錮彬遂見廢又曰王譯為尚書侍郎臺閣議奏常依義據法為三臺之表又曰陳忠䟽曰尚書為王喉舌而諸郎多文俗鮮有雅才每為詔文宣示內外轉相求請也續漢書曰胡廣字伯始舉孝廉試為天下第一旬日拜尚書, SBCK: ''}
