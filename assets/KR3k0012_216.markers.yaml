  - {type: variant, offset: 1683, length: 2, content: 防為, SBCK: 寧少未知名爲興縣令時廷尉桓彛稱有人倫鑒識護軍􅁃亮每屬之訪一佳吏部郎彛嘗去職至廣陵尋親舊還遇風停浦中累日憂悒因上岸見一室宇有似􅅟署訪之云是興縣彛乃造之寧清惠􅀶渉相遇欣然因留數夕彛大賞之結交而別至都謂􅁃亮曰吾爲卿得一佳吏部郎亮問所在彛曰人所應有不必有人所應無不必無徐寧眞海岱清士因爲叙之即遷吏部郎又曰杜錫字丗嘏􅀘吏部郎不敢用郷曲一人又曰王戎少頴悟二十四爲吏部郎又曰李胤爲吏部清愼選舉號爲廉平荀綽晉後略曰武含字景緯官歷中庶子遷散􅀐常侍以母在日誨云汝修其志仕當爲}
