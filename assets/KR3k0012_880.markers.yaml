  - {type: variant, offset: 298, length: 186, content: 昏暗明年為西魏所執遇害陰漢書五行志曰昭帝無嗣立昌邑王賀賀即位天陰畫夜不見日月賀欲出光祿大夫夏侯勝當車諫曰天久陰而不雨臣下有謀上者陛下欲何之賀怒縛勝以屬吏吏白大將軍霍光光時與車騎將軍張安世謀欲廢賀光讓安世以為泄語安世實不泄召問勝勝上洪範五行傳曰皇之不極厥罰常陰時則有下人伐上不敢察察言故云臣下有謀光安世讀之大驚以此益重經術士後數日卒共廢賀此常陰之明効也晉書曰吳孫亮時沉陰不雨, SBCK: 自開成井方六尺深}
