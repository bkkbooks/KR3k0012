  - {type: variant, offset: 226, length: 2, content: 超為, SBCK: 趙國易陽地裂京房易傳曰地拆裂者臣離相從也是時南單于衆乖離相從也是時南單于衆乖離漢軍追討崔鴻十六國春秋曰西􅁗乞伏乾歸太􅀄十九年苑川地裂後四年乾歸爲兄子公府所殺抱朴子曰軍中地裂急徙居不測軍敗地震心大戰或有謀反墨子曰三苗欲滅時地震泉湧地䧟今古五行記曰夏桀末年瞿山地䧟一夕爲大澤深九丈其年爲湯所放}
