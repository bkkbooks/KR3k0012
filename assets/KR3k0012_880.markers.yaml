  - {type: variant, offset: 2596, length: 460, content: 又發卒百餘萬築長城百姓失業至八年天下旱百姓流亡時發四海兵親征高麗六軍凍餧死者十八九至十三年天下大旱時郡縣鄉邑悉築長城男女無少長皆就役管子春不收枯骨朽胔伐枯木而去之則夏旱至矣晏子春秋曰齊大景公召群臣問曰天不下雨久矣民皆有飢色吾使人卜之崇在高山廣澤寡人欲賦歛以祠靈山可乎群臣皆莫對者晏子進曰不可祠此無益也夫靈山固以石為身以草木為毛髮天不雨髮將礁將熱彼獨不欲雨乎祠之何益公曰不然吾欲祠河伯可乎晏子曰不可河伯以水為國以魚鼈為民天久旱不雨水泉將下百川將竭國亡民將滅矣彼獨不欲雨乎祠之何益景公曰今為之柰何晏子曰君試避宮殿曝露與山河共憂其幸而雨景公即出曝露三日天果大雨隨巢子曰幽厲之時天旱地拆尸子曰湯之救旱也素車白馬布衣身嬰白茅以身為牲當此時也絃歌鼓舞者禁之韓子曰晉平公使師曠奏清徵師曠曰清徵不如清角平公曰清角可得聞乎師曠曰君德薄不足以聽之將恐有敗平公曰寡人老矣所好者音願遂聽之師曠不得已而鼓一奏之有雲從西北方起再奏之大風至大雨隨之裂帷幕破俎豆墮廊瓦坐者散走平公恐懼伏于室晉國大旱赤地三年公之身遂病焉師曠占曰歲欲旱旱草先生旱草者蒺藜也, SBCK: ''}
