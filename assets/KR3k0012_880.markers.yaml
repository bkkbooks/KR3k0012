  - {type: variant, offset: 35, length: 6, content: 太子喜出奔也, SBCK: 皇后陳氏廢宣帝時地震河南以東四十九北海琅邪壞祖宗廟城郭殺人千餘後又京師地震至北邊郡國三十餘壞城郭殺四百餘人後霍顯禹反誅清河王遷房陵皇后霍氏廢又曰元帝建昭四年藍田地震沙石流擁㶚水安陵岸崩擁水水逆流時石顯用事}
