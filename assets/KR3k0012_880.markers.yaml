  - {type: variant, offset: 45, length: 0, content: '', SBCK: 光武時地震裂至後年南郡蠻武陵蠻叛後詔捕王侯賔客坐死者數千人隂氣盛之應也又曰和帝時郡國十三地震時將軍竇憲謀逆伏誅後又地裂及震其年北海王威有罪自殺又曰安帝時郡國十六地震明年郡國十二地震京師人相食帝冲㓜鄧氏執政後又郡國九地震明年海賊張伯路與平原劉文何周文光等攻戰厭次殺令長後三年郡國十八地震淮南人飢明年鄧太后崩帝失政又曰順帝時京師頻地震岸崩及地䧟其年呉郡丞羊珎反郡府後二年凉州地百八十震山谷坼裂是日徐楊賊攻燒邑城殺掠民吏又曰冲帝時京師地震三郡沙湧􅁟裂時帝年二歲母后臨朝郡盗大起發掘憲陵攻燒城邑又曰桓帝時京師地震荆楊人多飢死後又震憲陵寢屋瓦宫廟瓦落盡時梁兾專政又曰靈帝時地震海水溢又震鴻都府門時閹堅專政又曰􅀄平二年并州牧董卓焚燒洛陽挾天子遷長安自爲太師號尚父京師地震卓問著作郎蔡邕邕對曰地動隂盛大臣踰制又太史上言當有大臣戮死卓遣人言太尉張温與􅀽紹交通遂殺温二年司徒王允僕射士孫瑞及卓將吕布謀誅卓殺之又曰}
  - {type: page-break, offset: 45, content: '', id: KR3k0012_SBCK_880-3a}
  - {type: variant, offset: 45, length: 0, content: '', WYG: 光武時地震裂其後武陵蠻夷反寇南郡詔捕王侯賔客死者數千人陰氣盛之應也又曰和帝時郡國十三地震時將軍竇憲專權伏誅後又地裂及震其年北海王威有罪自殺又曰安帝時郡國有十六地震明年郡國有十二地震京師人相食帝冲幼鄧氏執政後又郡國九地震明年海賊張伯路與平原劉文何周文光等叛攻殺令長後三年郡國十八地震淮南人飢明年鄧太后崩帝失政又曰順帝時京師頻地震岸崩及地䧟其年呉郡丞羊珍反郡府後二年凉州地百八十震山谷坼裂是日徐揚賊攻燒邑城殺掠民吏又曰冲帝時京師地震三郡沙湧土裂時帝年二嵗母后臨朝羣盗大起發掘憲陵攻燒城邑又曰桓帝時京師地震荆揚人多飢死後又震憲陵寢屋宫廟瓦落盡時梁兾専政又曰靈帝時地震海水溢又震鴻都府門時閹豎専政又曰初平二年井州牧董卓焚燒洛陽挾天子遷長安自為太師號尚父京師地震卓問著作郎蔡邕對曰地動陰盛大臣踰制又太史上言當有大臣戮死卓遣人言太尉張温與袁紹交通遂殺温二年司徒王允僕射士孫瑞及卓將吕布謀誅卓殺之又曰}
