  - {type: variant, offset: 9, length: 5, content: 陰而風為曀, SBCK: 地動隂有餘左傳曰南宫極震􅀯言極王子朝之卿士也萇弘謂劉文公曰君其勉之先君之力可濟也先君謂劉献公文公父也献公亦欲立子猛不欲令子朝得國今南宫極震死爲天所弃先君之功事可成也周之亡也其三川震今西王之大臣亦震天弃之也西王謂子朝也子朝居王城故爲之西王也東王必大克東王敬王居狄泉秋泉在王城之東故日東王也}
  - {type: variant, offset: 9, length: 0, content: '', WYG: 地動}
  - {type: variant, offset: 9, length: 5, content: 陰而風為曀, krp: 地動隂有餘左傳曰南宫極震南言極王子朝之卿士也萇弘謂劉文公曰君其勉之先君之力可濟也先君謂劉献公文公父也献公亦欲立子猛不欲令子朝得國今南宫極震死爲天所弃先君之功事可成也周之亡也其三川震今西王之大臣亦震天弃之也西王謂子朝也子朝居王城故爲之西王也東王必大克東王敬王居狄泉秋泉在王城之東故日東王也}
  - {type: variant, offset: 10, length: 2, content: 而風, WYG: 有餘左𫝊曰南宫極震南宫極王子朝之卿士也萇𢎞謂劉文公曰君其勉之先君之力可濟也先君謂劉獻公文公父也獻公亦欲立子猛不欲令子朝得國今南宫極震死}
