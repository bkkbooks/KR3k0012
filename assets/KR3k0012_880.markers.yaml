  - {type: variant, offset: 229, length: 1, content: 將, WYG: 書曰武帝太康八年宣帝廟地䧟其年七月殿前地䧟方五尺深數丈中有破船是時帝不用和嶠之言而信賈充之佞至十一年惠帝立王室大亂又曰惠帝時五月城中地䧟方三十丈殺人六月又地坼人家䧟死八月地裂廣三十六丈長八十四丈人大飢又上庸四處山崩地䧟廣三十六丈長百三十丈大水出殺人時賈后亂政又夜暴雷雨賈謐家屋柱䧟入地壓床帳明年謐誅天下兵亂帝室從此㣲矣又曰懷帝時洛陽步廣里地䧟出鵝三又當陽地裂廣三丈長三百步時司馬越専政王室離散死者萬計又曰安帝時山陰地䧟方四尺有聲如雷後二年西明門地穿湧水毁門太尉}
