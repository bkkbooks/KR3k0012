  - {type: variant, offset: 1715, length: 147, content: 元朔五年春大旱十餘萬眾征匈奴元狩三年夏大旱是歲發天下民吏伐棘上林穿昆明池天漢中頻大旱是年李陵沒征和元年夏大旱閉長安城門大搜治巫蠱明年衛皇后太子死又曰宣帝本始三年夏大旱東西數千里先是五將軍二十萬眾征匈奴趙充國范明友等為將又曰和帝時夏旱傷苗稼其年武靈蠻陬叛寇金城又曰順帝時京師旱楊州六郡賊寇四十九縣, SBCK: 刺}
