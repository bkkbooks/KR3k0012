  - {type: variant, offset: 211, length: 2, content: 超祠, SBCK: 所在地震前後一百五十六公卿百司抗表請罪興曰災譴之來咎在元首近代或歸罪三公甚非也朕當考躬省巳思宋景之義公等何􅄽冝悉冠履復位後魏書曰太祖道武天賜六年夏地震其年帝愛􅁎萬人與清河王紹通作亂帝􅀍紹及萬人殺之又曰宣武延昌元年沁州地震䧟殺人甚衆又累年沁州秀容敷城鴈門山鳴地震不止其年幽州沙門劉僧紹反明年胡太后臨朝後天下大兵太后少帝爲尓朱榮投於河隋書曰北齊武成清河年并州地震是時和士開專恣之應又曰隋文帝開皇二十年廢太子勇以晉王廣爲皇太子將􅁽之夜烈風大雪地震山崩人舎多壞殺人太子卒與僕射楊素弑帝吕氏春秋曰周文王寢病五日而地動東西}
  - {type: page-break, offset: 211, content: '', id: KR3k0012_SBCK_880-5b}
