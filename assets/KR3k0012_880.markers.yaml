  - {type: variant, offset: 202, length: 7, content: 南燕慕容超太上, krp: 後秦姚泓時秦州地震三十二殷殷有聲山崩舎壊識者以爲秦州泓之故郷將滅之徴後宋髙祖入長安執於建康斬之又曰姚興}
