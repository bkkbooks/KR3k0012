  - {type: variant, offset: 224, length: 0, content: '', SBCK: 泉地以告也而王不知戒何得無誅乃殺之書紀年曰夏桀末年社坼裂其年爲湯所放後漢書曰安帝時緱氏地裂後郡國地坼或泉湧越雋夷殺長吏燒城邑又曰南地坼長百八十二里廣五十六里又洛陽新城地裂又緱氏地䧟裂京師地䧟時帝㓜冲官者用事又曰建康元年隴西漢陽張掖北地武威地百八十震山谷坼裂壊城又曰冲帝􅀄即位葬順帝是日鴈門京師太原三郡地震沙湧􅁟裂又曰桓帝時河東地裂明年京師雲陽地震時閹竪用事皇后梁氏崩後八年緱氏頻年兵革又李膺等二百餘人受誣下獄又上黨地裂是時㓂賊弥盛又曰靈帝時河東地裂十二處長十里是時閹竪用事政在私門續漢書曰和帝永和}
  - {type: page-break, offset: 224, content: '', id: KR3k0012_SBCK_880-6b}
  - {type: variant, offset: 224, length: 0, content: '', WYG: 泉地以告也而王不知戒何得無誅乃殺之竹書紀年曰夏桀末年社坼裂其年為湯所放後漢書曰安帝時緱郡地裂後郡國地坼或泉湧越雋夷殺長吏燒城邑又曰南地坼長八十二里廣五十六里又洛陽新城地裂又緱氏地䧟裂京師地䧟時主幼冲宦者用事又曰建康元年隴西漢陽張掖北地武威地百八十震山谷坼裂壊城又曰冲帝初即位葬順帝是日鴈門京師太原三郡地震沙湧土裂又曰桓帝時河東地裂明年京師雲陽地裂時閹豎用事皇后梁氏崩後八年緱氏地裂是時頻年兵革又李膺等二百餘人受誣下獄又上黨地裂是時寇賊彌盛又曰靈帝時河東地裂十二處長十里是時閹豎用事政在私門續漢書曰和帝永元}
