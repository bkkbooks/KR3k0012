  - {type: variant, offset: 202, length: 7, content: 南燕慕容超太上, SBCK: 後􅁗姚泓時􅁗州地震三十二殷殷有聲山崩舎壊識者以爲􅁗州泓之故郷將滅之徴後宋髙祖入長安執於建康斬之又曰姚興}
