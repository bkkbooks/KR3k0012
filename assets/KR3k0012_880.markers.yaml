  - {type: variant, offset: 17, length: 0, content: '', SBCK: 周幽王二年三川震太史伯陽甫曰周將亡矣天地之氣不過其序亂人之兆陽伏而不能岀隂迫而不能昇於是也震陽失而在隂隂原必塞原塞必國亡昔伊雒竭而夏亡河竭而啇亡今周如二代之季其川原又塞塞必川竭山崩夫國必依山川山崩川竭國亡之徴也漢書五行志曰魯文公九年地震劉向以爲周襄王失道楚穆王啇臣殺父成王諸侯皆不肖權傾於下臣下強盛將動爲害京房曰臣事雖正專必震於水水則波於木木則揺於屋則瓦落於山則岀水湧嗣子無德臣專禄不順動丘陵水湧出又曰魯襄公十六年地震其後崔氏專齊欒盈專}
  - {type: page-break, offset: 17, content: '', id: KR3k0012_SBCK_880-1b}
  - {type: variant, offset: 17, length: 0, content: '', WYG: 周幽王二年三川震太史伯陽甫曰周將亡矣天地之氣不失其序若過其序民亂之也陽伏而不能出隂迫而不能蒸於是地震陽失而在隂原必塞原塞國必亡昔伊洛竭而夏亡河竭而商亡今周徳若二代之季矣其川原又塞塞必竭夫國必依山川山崩川竭國亡之徵漢書五行志曰魯文公九年地震劉向以為周㐮王失道楚穆王商臣殺父成王諸侯皆不肖權傾於下臣下强盛將動為害京房曰臣事雖正專則必震震於水則波於木則揺於屋則瓦落嗣子無徳專禄兹謂不順厥震動邱陵湧水出又曰魯㐮公十六年地震其後崔氏専齊欒盈専}
