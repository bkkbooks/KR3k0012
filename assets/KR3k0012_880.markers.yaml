  - {type: variant, offset: 124, length: 0, content: '', SBCK: 齊王芳時頻年地震時曹爽專政遷太后於永壽宫太后與帝相泣而别故頻震又曰蜀劉禪時地震時黄皓專政閹官無陽施猶婦人也此皓見任之應是年冬蜀亡又曰呉孫權時頻年地震時吕一專政又權信䜛廢太子和歩騭上書曰伏見按事吹毛求瑕欲䧟人成其威福故地連震又曰晉武帝時頻年地震是時賈充楊駿逓弄朝權又曰惠帝元康四年郡國地震淮南洪水出或山崩地䧟壞城府殺百餘人此賈后使楚王瑋殺汝􅀯王亮及太僕衛瓘隂道盛陽道衰微之應又曰􅉖}
  - {type: page-break, offset: 124, content: '', id: KR3k0012_SBCK_880-4a}
  - {type: variant, offset: 124, length: 1, content: 懷, WYG: 齊王芳時頻年地震時曹爽専政遷太后於永寧宫太后與帝相泣而别故頻震又曰蜀劉禅時地震時黃皓専政閹宦旡陽施猶婦人也此皓見任之應是年冬蜀亡又曰呉孫權時頻年地震時吕壹専政又權信讒廢太子和步隲上書曰伏見按事吹毛求疵欲䧟人以成其威福故地連震又曰晉武帝時頻年地震是時賈充楊駿逓掌朝權又曰惠帝元康四年郡國地震淮南洪水出或山崩地䧟壊城府殺百餘人此賈后使楚王瑋殺汝南王亮及太保衛瓘陰道盛陽道衰微之應又曰愍懐帝時頻年地震時司馬越専政石勒㓂汲郡又曰元帝太興元年頻地震或水湧山崩殺人時江南淮北有大兵劉曜石勒僣位又曰成帝時咸和四年頻年地震時蘇峻作亂又曰穆}
