  - {type: variant, offset: 585, length: 1028, content: 楊素謀廢太子為庶人而後殺之立晉王廣為太子唐書曰睿宗先天二年四月陰至六月一百餘日至七月三日誅竇懷貞等十七家方晴旱尚書洪範咎徵曰僣恒陽若君行僣差常陽順之禮記檀弓下曰歲旱穆公召縣子而問然然之言焉也曰天久不雨吾欲曝尫而奚若尫者面向天冀天哀而雨也曰天則不雨而曝人之疾子虐無乃不可乎錮疾人之所哀曝之是虐然則吾欲曝巫而奚若曰天則不雨而望之愚婦人於以求之無乃已䟽乎徙市則奚若曰天子崩巷市七日諸侯薨巷市三日為之徙市不亦可乎徙市者庶民之喪禮也今徙市是憂戚於旱若喪也左傳僖公曰夏大旱公欲焚巫尫臧文仲曰非旱備也脩城郭貶食省用務嗇勸分嗇儉也勸分有無相濟此其務也巫尫何為天欲殺之則如勿生若能為旱焚之滋甚公從之是歲飢而不害不傷害民又昭公時鄭大旱使屠擊有事於桑山有事祭也斬其木不雨子產曰有事於山藝山林也藝養護令繁殖而斬其木其罪大矣奪之官邑春秋考異郵曰旱之言悍也陽驕蹇所致也春秋繁露曰水干土則大旱洪範五行傳曰魯桓公五年大雩旱也先是殺君而立有危亡之心而下有悲懃之氣外結大國娶於齊以為夫人後比二年天子使大夫來聘桓上得天子之意下得大國之心則有亢陽之意以御臣下興邢丘之役以勞百姓則臣下離心而不從故應是而秋大旱又曰魯宣公十年秋大旱是時公與齊伐萊夫代國亢陽節也師旅百姓所不欲也故應是而大旱也又曰旱所謂常陽不謂常陽而謂旱者以旱為災也旱之為言乾也萬物傷於乾而不得水也君持亢陽之節暴虐於下興師旅動眾勞民以起城邑臣下悲怨而心不從故陽氣盛而失度故旱災應也物理論曰陽盈而過故致旱家語曰哀公問孔子曰旱如之何孔子曰凶年則乘駑馬力役不興馳道不備馳道君祈所行道祈以幣玉有王所祈請用弊及王不用牲也祭事不見不縣不作樂也祀以下牲當用大牢者用少牢此則賢君自貶以救民之禮也史記曰紂末年大旱俄為武王所殺滅也又曰晉莊伯元年不雨雪二年翟人俄代翼至于晉郊又曰共和十四年大旱火焚其屋伯和篡位立故有火旱其年周厲王莽彘而死立宣王又曰魯莊公三十年冬不雨是歲一年而三築臺于郎夏築臺于薛秋築臺于秦又曰僖公二年三月春夏不雨莊公夫人與公子慶父淫而殺二公國人攻之慶父桓公子莊公弟二公謂子般及閔公又曰襄公五年秋大雩先是宋魚石奔楚楚伐宋取彭城以封魚石八年九月大雩季氏盛二十八年八月大雩晉使荀吳齊使慶封來聘是夏邾子來朝襄公自大應之又曰昭公三年八月大雩公居喪不哀亢陽失眾六年九月雩先是莒牟夷以二邑來奔莒怒伐魯亢陽動眾之應十六年九月大雩昭公夫人薨昭公不慼又大蒐于比蒲魯有大哀君無慼容殆其失國二十五年七月大雩旱甚又劉歆以為時君與季氏有隙昭公伐季氏為季氏所敗出奔齊漢書曰惠, SBCK: ''}
