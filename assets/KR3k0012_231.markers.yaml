  - {type: variant, offset: 33, length: 1, content: 署, SBCK: 曰視聽四曰聲聽五曰詞聽三慮盡其理一曰明慎以讞疑獄二曰哀矜以雪􅁈獄三曰公平以鞫庶獄少卿爲之貳韋昭辨釋名曰廷尉縣尉皆古尉也以尉尉人也凢掌賊及司察}
  - {type: variant, offset: 33, length: 4, content: 署之官屬, WYG: 曰視聽四曰聲聽五曰詞聽三慮盡其理一曰明慎以讞疑獄二曰哀矜以雪寃獄三曰公平以鞫庶獄}
  - {type: variant, offset: 33, length: 1, content: 署, krp: 曰視聽四曰聲聽五曰詞聽三慮盡其理一曰明慎以讞疑獄二曰哀矜以雪冤獄三曰公平以鞫庶獄少卿爲之貳韋昭辨釋名曰廷尉縣尉皆古尉也以尉尉人也凢掌賊及司察}
  - {type: variant, offset: 36, length: 0, content: '', SBCK: 皆曰尉尉罰也言以罪罰姦非也尚書曰帝曰臯繇汝作士明于五刑以弼五教論語曰孟氏使陽膚爲士師士師典獄之官問於曽子曽子曰上失其道民散乆矣如得其情則哀矜而勿喜韓詩外傳曰晉文公使李離爲理過聽殺人自拘於廷請死於君君曰官有貴賤罰有輕重下吏有罪非子之罪也離曰法失則刑失刑失則在臣居爲長不與下吏譲位爵爲多不與下吏分則君以爲能聽微决疑故使臣爲理今過聽殺無罪罪當死臣不能以虚自誣遂伏劒死君子曰忠矣仁矣家語曰季羔爲衛士師刖人之足俄而衛有亂季羔逃刖者守門謂羔曰彼有􅆙羔曰君子不隧又曰此有室季羔入焉旣罷羔問曰吾親刖子之足而子逃我何也刖者曰曩者君理人以法令先君後臣欲臣之免也臣知之臨當論刑君愀然不樂見於顔色臣又知之君豈私臣哉天生君子其道故然此臣之所以脫君也孔子聞之曰善哉爲吏其用法一思仁恕則樹徳加嚴􅁀則樹怨公以行之其子羔乎史記天官書曰斗魁四星貴人之牢曰大理漢書曰廷尉􅁗官掌刑辟有正左右監景帝中六年更名大理武帝建元四年復爲廷尉又曰于定國爲廷尉爲人卑恭尤重經術其决獄平法務在哀蠲罪疑從輕加審慎之心朝廷􅁛之曰張釋之爲廷尉天下無􅁈人于定國爲廷尉人自以不􅁈又曰朱􅀶迁廷尉恐爲官}
