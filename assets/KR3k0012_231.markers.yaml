  - {type: variant, offset: 352, length: 4, content: 田預為并, SBCK: 髙柔字文惠遷廷尉時獵法甚峻而冝陽典農劉􅀛竊於禁内射兎其功曹張京詣授事言之帝匿名収􅀛付獄柔請告者名帝大怒曰劉􅀛當死乃敢獵吾禁地送􅀛廷尉廷尉便當考掠何復請告者名吾豈妄収􅀛􅁘柔曰廷尉天下之平也安得以至尊喜怒而毀法乎重復爲奏辭旨深切帝意寤乃下張京名即還訊各當其罪又曰鍾毓遷廷尉聽君父巳没臣子得爲理謗及士爲侯其妻不復改嫁毓所創也晉書曰孔坦字君平遷侍中廷尉多平正當法合人情而時􅀔要自以愛憎爲断坦意不得皆行也晉中興書曰范堅字子常爲廷尉奏主典吏邵廣盗官幔合布四十疋依律棄市廣息雲宗二人自没爲官奴婢以贖父尚書議可特聽堅駮之曰此爲施一恩於今開萬怨於後顯宗從之正廣刑又曰王彪之遷廷尉時永嘉太守謝毅赦後殺郡人周矯矯從兄球詣州訴􅁈楊}
