  - {type: variant, offset: 320, length: 1, content: 清, SBCK: 頃之護軍營士竇禮近出不還營以爲亡表言逐捕没其妻盈及男女爲官奴婢盈連至州府稱􅁈自訟莫有省者乃辭詣廷尉柔問曰汝何以知夫不亡盈垂泣對曰夫少單特養一老嫗爲母事甚恭謹又哀兒女撫視不離非是輕狡不顧室家者也柔重問曰汝夫不與人怨讎乎對曰夫良善與人無讎又曰汝夫不與人交錢財乎對曰嘗出錢與同營士焦子文乆求不得時子文適坐小事繫獄柔乃見子文問所坐言次曰汝頗曽舉人錢否子文曰自以單貧􅀄不敢舉人物也柔察子文色動遂曰汝昔舉竇禮錢何言不舉􅁘子文恠之事露應對不次柔曰汝巳殺禮便冝早服子文於是叩頭具首殺禮本末埋藏所柔便遣吏卒丞子文辭往掘即得屍詔書復盈母子爲}
  - {type: page-break, offset: 320, content: '', id: KR3k0012_SBCK_231-5a}
  - {type: variant, offset: 320, length: 1, content: 清, WYG: 柔問曰汝何以知夫不亡盈垂泣對曰夫少單特養一老嫗為母事甚恭謹又哀兒女撫視不離非是輕狡不顧家室者也柔重問曰汝夫不與人怨讎乎對曰夫良善與人無讎又曰汝夫不與人交錢財乎對曰嘗出錢與同營士焦子文久求不得時子文適坐小事繫獄柔乃見子文問所坐言次曰汝頗曾舉人錢否子文曰自以單貧初不敢舉人物也柔察子文色動遂曰汝昔舉竇禮錢何言不舉耶子文怪知事露應對不次柔曰汝已殺禮便宜早服子文於是叩頭具首殺禮本末埋藏所柔使吏卒承子文辭往掘即得屍詔書復盈母子為}
