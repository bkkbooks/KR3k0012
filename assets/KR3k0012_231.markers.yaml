  - {type: page-break, offset: 36, content: '', id: KR3k0012_SBCK_231-2a}
  - {type: variant, offset: 36, length: 4, content: 屬少卿為, krp: 皆曰尉尉罰也言以罪罰姦非也尚書曰帝曰臯繇汝作士明于五刑以弼五教論語曰孟氏使陽膚爲士師士師典獄}
  - {type: punctuation, offset: 37, content: ；, id: KR3k0012_CHANT_231-bkkpn10}
  - {type: 'tls:seg', offset: 37, content: '', id: KR3k0012_CHANT_231-1a.7}
  - {type: variant, offset: 37, length: 3, content: 少卿為, SBCK: 所輕召見正監典法􅁺吏謂曰廷尉本起於武吏不明法律幸有衆賢亦何憂然廷尉化部斷獄以來二十年亦獨耳剽目乆剽刼也疋妙反三尺律令人事岀其中試與正監共撰前代决事吏議難知者數十事持問廷尉將爲諸君覆}
  - {type: variant, offset: 41, length: 21, content: 貳凡大祭祀大朝會則供具羽儀節鉞金戟帷弈茵蓆, SBCK: 正監條目􅀶皆召􅁺吏爲平處其輕重十中八九官属咸服又曰張釋之爲廷尉文帝嘗行有人從渭橋下出乗輿馬驚捕}
  - {type: page-break, offset: 41, content: '', id: KR3k0012_SBCK_231-2b}
  - {type: variant, offset: 41, length: 2, content: 貳凡, krp: 官問於曽子曽子曰上失其道民散乆矣如得其情則哀矜而勿喜韓詩外傳曰晉文公使李離爲理過聽殺人自拘於廷請死於君君曰官有貴賤罰有輕重下吏有罪非子之罪也離曰法失則刑失刑失則在臣居爲長不與下吏譲位爵爲多不與下吏分則君以爲能聽微决疑故使臣爲理今過聽殺無罪罪當死臣不能以虚自誣遂伏劒死君子曰忠矣仁矣家語曰季羔爲衛士師刖人之足俄而衛有亂季羔逃刖者守門謂羔曰彼有缺羔曰君子不隧又曰此有室季羔入焉旣罷羔問曰吾親刖子之足而子逃我何也刖者曰曩者君理人以法令先君後臣欲臣之免也臣知之臨當論刑君愀然不樂見於顔色臣又知之君豈私臣哉天生君子其道故然此臣之所以脫君也孔子聞之曰善哉爲吏其用法一思仁恕則樹徳加嚴暴則樹怨公以行之其子羔乎史記天官書曰斗魁四星貴人之牢曰}
  - {type: punctuation, offset: 42, content: 。, id: KR3k0012_CHANT_231-bkkpn11}
  - {type: 'tls:seg', offset: 42, content: '', id: KR3k0012_CHANT_231-1a.8}
  - {type: variant, offset: 42, length: 0, content: '', WYG: 韋昭辯釋名曰廷尉縣尉皆古官也以尉尉民也}
  - {type: variant, offset: 43, length: 0, content: '', WYG: 掌賊及司察之官皆曰尉尉罰也言以罪罰姦非也尚書帝曰臯繇汝作士眀于五刑以弼五教論語曰孟氏使陽膚為士師士師典獄之官問於曾子曾子曰上失其道民散久矣如得其情則哀矜而勿喜韓詩外傳曰晉文公使李離為理過聽殺人自拘於廷請死於君君曰官有貴賤罰有輕重下吏之罪非子之罪也離曰法失則刑失刑失則死臣居官為長不與下吏讓位爵為多不與下吏分利君以為能聽微决疑故使臣為理今過聽殺無罪罪當死臣不能以虛自誣遂伏劒死君子曰忠矣仁矣家語曰季羔為衞士師刖人之足俄而有亂季羔逃刖者守門謂羔曰彼有􅆙羔曰君子不隧又曰此有室季羔入焉既罷羔問曰吾親刖子之足而子逃我何也刖者曰曩者君理人以法令先君後臣欲臣之免也臣知之臨當論刑君愀然不樂見於顔色臣又知之君豈私臣哉天生君子其道固然此臣之所以脫君也孔子聞之曰善哉為吏其用法一思仁恕則樹德加嚴暴則樹怨公以行之其子羔乎史記天官書曰斗魁四星貴人之牢曰}
