  - {type: variant, offset: 1278, length: 3, content: 智略少, WYG: 教使之然畏罪之所致耳陛下但捨所急則寧失不經復行於今日矣太宗深然之又曰髙宗問大理唐臨獄繫囚之數臨對曰見囚五十餘人唯二人合死上以為囚數不多怡然形於顔色謂臨曰昔東宫卿已事朕朕承大位卿又居近職以疇日相委故授卿此任然為國之要在於刑法急則人殘法寛則失罪務令折中稱朕意焉又曰張文瓘為大理卿旬日决遣疑獄四百餘條其得罪者皆無怨言文瓘嘗有疾繫囚相與設齋以禱焉尋拜侍中兼太子賔客大理囚一}
