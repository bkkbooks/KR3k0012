  - {type: variant, offset: 566, length: 255, content: 掌宮門屯兵卿每月丞每旬行宮徼糺察不法統武庫令公車司馬令漢官解詁曰衛尉主宮闕之內衛士於垣下為廬各有員部凡居宮中者皆置籍於門按其姓名有毉巫僦人當入者本官長吏為封啟傳審其印信然後內之人有籍者皆復有符用木長二寸以所長官兩字為鐵印分符當出入者案籍畢復齒符乃引內之也其有官位得出入者令執御者各傳呼前後以相通昏至晨分部行夜夜有行者輒前曰誰誰若此不懈終歲更始所以重慎宿衛也漢書舊儀曰衛尉寺在京內胡廣云宮闕之內衛士於周垣下為廬者若今之伏宿屋矣武庫令六典曰庫令掌藏邦國之兵仗器械辨其名數以備國用承為之貳漢書百官表曰執金吾屬官有武庫, SBCK: 陳叔逹撰定律}
