  - {type: variant, offset: 1743, length: 2, content: 參教, SBCK: 法者北齊書曰宋世䡄爲廷尉少卿時大理正蘇珎之亦以平幹知名寺中爲之語曰决定嫌疑􅂫珎之視表見裏宋世䡄謂之寺中二絶卒官廷尉御史諸囚皆􅂘曰宋廷尉死我等豈有生路也隋書曰趙綽爲大理少卿侍郎辛亶嘗衣緋裩俗云利官文帝以爲厭蠱將斬之綽曰據法不當死臣不敢奉詔上怒甚令斬綽綽解衣當斬上使人問曰竟如何綽曰執法不敢惜死上良乆釋之他日又令斬二人綽曰此人坐當杖殺之非法上曰不􅀜卿事綽曰陛下置臣法司欲誤殺人豈得不􅀜臣事上曰撼大木不動者當退綽曰臣兾感天心何論大木上乃止時薛曹爲大理卿曹斷獄以情而綽守法俱爲稱職又曰源師煬帝即位拜大理少卿帝在顯仁宫勑宫外衛士不得輙離所守有一主帥私令衛士出外帝付大理繩之師據律奏徒帝令斬之師奏曰此人罪誠難恕􅀂陛下􅀄便殺之自可不問文墨旣付有司義歸􅁪}
  - {type: page-break, offset: 1743, content: '', id: KR3k0012_SBCK_231-8b}
  - {type: variant, offset: 1743, length: 2, content: 參教, WYG: 法者北齊書曰宋世軌為廷尉少卿時大理正蘇珍之亦以平幹知名寺中為之語曰决定嫌疑蘇珍之視表見裏宋世軌謂之寺中二絶卒官廷尉御史諸囚皆哭曰宋廷尉死我等豈有生路也隋書曰趙綽為大理少卿侍郎辛亶嘗衣緋裩俗云利官文帝以為厭蠱將斬之綽曰據法不當死臣不敢奉詔上怒甚令斬綽綽解衣當斬上使人問曰竟如何綽曰執法不敢惜死上良久釋之他日又令斬二人綽曰此人坐當杖殺之非法上曰不闗卿事綽曰陛下置臣法司欲誤殺人豈得不闗臣事上曰撼大木不動者當退綽曰臣冀感天心何論大木上乃止時薛胄為大理卿胄斷獄以情而綽守法俱為稱職又曰源師煬帝即位拜大理少卿帝在顯仁宮勅宮外衞士不得輒離所守有一主帥私令衞士出外帝付大理繩之師據律奏徒帝令斬之師奏曰此人罪誠難恕若陛下初便殺之有司不闗文墨既付有司義歸恒}
