  - {type: variant, offset: 1128, length: 4, content: 周垂字子, krp: 髙宗問大理唐臨獄繫囚之數臨對曰見囚五十餘人唯二人合死上聞囚數不多怡然形於顔色謂臨曰昔東宫卿巳事朕朕承大位卿又}
