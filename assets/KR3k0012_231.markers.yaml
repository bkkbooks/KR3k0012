  - {type: variant, offset: 1133, length: 0, content: '', SBCK: 近職以疇日相委故授卿此任然爲國之要在於刑法刑急則人殘法寛則失罪務令折中稱朕意焉又曰張文瓘爲大理卿旬日決遣疑獄四百餘條其得罪者皆無怨言文瓘嘗有疾繋囚相與設齋以禱焉尋}
  - {type: variant, offset: 1133, length: 0, content: '', krp: 近職以疇日相委故授卿此任然爲國之要在於刑法刑急則人殘法寛則失罪務令折中稱朕意焉又曰張文瓘爲大理卿旬日決遣疑獄四百餘條其得罪者皆無怨言文瓘嘗有疾繋囚相與設齋以禱焉尋}
  - {type: variant, offset: 1135, length: 1, content: 御, SBCK: 中兼太子賔客大理囚一時慟哭其得人心如此又曰大理卿􅀽仁敬􅁀卒繫囚聞之皆慟􅂘悲歌曰天不恤􅁈人兮何奪我慈親兮有理無申兮痛哉安訴陳兮又曰龍朔二年改大理卿爲詳刑寺正卿唐新語曰唐臨爲大理卿初莅職斷一死囚先時坐死者十餘人皆它官所斷㑹太宗幸寺親録囚徒它官所斷囚皆稱􅁈不巳臨所斷者嘿而無言太宗怪之問其故囚對曰唐卿斷臣必不枉濫所以絶意太宗歎息乆之曰爲獄固當􅀂是囚遂見原五代}
