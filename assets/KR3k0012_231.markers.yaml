  - {type: variant, offset: 64, length: 1, content: 漢, SBCK: 廷尉釋之奏其犯蹕當罰金上怒釋之曰法者所與天下公共也方以其時誅之則巳今巳下廷尉廷尉天下之平也一傾天下用法皆爲之輕重人安所措其手足乎後有盗髙廟座前玉環者文帝令族之釋之奏當棄市上大怒釋之曰法如是也今盗宗廟器而族之如令愚人取長陵一杯土陛下何以加其法乎又曰張湯爲廷尉决大獄欲傅古義方請􅀶士弟子理尚}
  - {type: page-break, offset: 64, content: '', id: KR3k0012_WYG_231-3a, image: WYG0895/WYG0895-0135a.png}
  - {type: punctuation, offset: 66, content: ‧, id: KR3k0012_CHANT_231-bkkpn21}
  - {type: variant, offset: 66, length: 0, content: '', SBCK: 春秋􅀘廷尉史平亭疑法奏讞疑事必先爲上分別其原以楊主之明言此自天子意非由有司也奏事有善則讓曰監􅁺史某所爲也亭者平也均也又曰杜周爲廷尉其治大斆張湯而善候伺上所欲客謂周曰君爲天下决平不循三尺法以三尺竹簡書法令律專以主意爲獄獄者固如是乎周曰三尺安出哉前主所是著爲律後主所是䟽爲令當時爲是何古之法乎至周爲廷尉獄亦益多矣二千石繫者新故相因不减}
  - {type: page-break, offset: 66, content: '', id: KR3k0012_SBCK_231-3a}
  - {type: variant, offset: 66, length: 3, content: 百官表, WYG: ''}
  - {type: variant, offset: 66, length: 3, content: 百官表, krp: ''}
  - {type: variant, offset: 67, length: 0, content: '', SBCK: 餘人又曰王先生者善黄老言處士也張釋之召居廷中王生年老與釋之及公卿㑹廷中立王生襪解顧謂釋之爲我繫襪釋之前跪而繫之旣退或讓王生曰何辱張廷尉乎王生曰廷尉方爲天下名臣吾聊使繫襪欲重之諸公聞之賢王生而重張廷尉又曰下邽翟公爲廷尉賔客填門及免}
  - {type: variant, offset: 68, length: 1, content: 表, SBCK: 門外可設雀羅復爲廷尉乃署其門}
