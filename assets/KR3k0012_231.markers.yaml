  - {type: variant, offset: 89, length: 0, content: '', WYG: 大理武帝建元四年復為廷尉又曰于定國為廷尉為人卑恭尤重經術其决獄平法務在哀矜罪疑從輕加審慎之心朝廷稱之曰張釋之為廷尉天下無寃民于定國為廷尉民自以不寃又曰朱博遷廷尉恐為官屬所誣召見正監典法掾吏謂曰廷尉本起於武吏不明法律幸有衆賢亦何憂然廷尉治郡斷獄以來二十年亦獨耳剽日久剽刼也疋妙反三尺律令人事出其}
  - {type: page-break, offset: 89, content: '', id: KR3k0012_WYG_231-3b, image: WYG0895/WYG0895-0135b.png}
  - {type: variant, offset: 89, length: 0, content: '', krp: 大理武帝建元四年復爲廷尉又曰于定國爲廷尉爲人卑恭尤重經術其决獄平法務在哀蠲罪疑從輕加審慎之心朝廷稱之曰張釋之爲廷尉天下無冤人于定國爲廷尉人自以不冤又曰朱博迁廷尉恐爲官屬所輕召見正監典法掾吏謂曰廷尉本起於武吏不明法律幸有衆賢亦何憂然廷尉化部斷獄以來二十年亦獨耳剽目乆剽刼也疋妙反三尺律令人事岀其}
  - {type: variant, offset: 90, length: 0, content: '', WYG: 試與正監共撰前代决事吏議難知者數十事持問廷尉將為諸君覆之正監條白博皆召掾吏為平處其輕重十中八九官屬咸服又曰張釋之為廷尉文帝嘗行有人從渭橋下出乗輿馬驚捕之屬廷尉釋之奏其犯蹕當罰金上怒釋之曰法者所與天下公共也方以其時誅之則已今以下廷尉廷尉天下之平也一傾天下用法皆為之輕重民安所措其手足乎後有盗髙廟座前玉環者文帝令族之釋之奏當棄市上}
  - {type: page-break, offset: 90, content: '', id: KR3k0012_WYG_231-4a, image: WYG0895/WYG0895-0135c.png}
  - {type: variant, offset: 90, length: 0, content: '', krp: 試與正監共撰前代决事吏議難知者數十事持問廷尉將爲諸君覆之正監條目博皆召掾吏爲平處其輕重十中八九官属咸服又曰張釋之爲廷尉文帝嘗行有人從渭橋下出乗輿馬驚捕之屬廷尉釋之奏其犯蹕當罰金上怒釋之曰法者所與天下公共也方以其時誅之則巳今巳下廷尉廷尉天下之平也一傾天下用法皆爲之輕重人安所措其手足乎後有盗髙廟座前玉環者文帝令族之釋之奏當棄市上}
  - {type: variant, offset: 91, length: 0, content: '', WYG: 怒釋之曰法如是也今盗宗廟器而族之如令愚人取長陵一抔土陛下何以加其法乎又曰張湯為廷尉决大獄欲傅古義乃請博士弟子治尚書春秋補廷尉史平亭疑法奏讞疑事必先為上分别其原以揚主之明言此自天子意非由有司也奏事有善則讓曰監掾史所為也亭者平也均也又曰杜周為廷尉其治大斆張湯而善候伺上所欲客謂周曰君為天下决平不循三尺法以三尺竹簡書法律令專以主意為獄獄者固如是乎周曰三尺安出哉前主所是著為律後主所是疏為令當時為是何古之法乎至周為廷尉獄亦益多矣二千石繫者新故相因不减百餘人又曰王先生者善黄老言處士也張釋之召居廷中王生年老與釋之及公卿㑹廷中立王生襪解顧謂釋之為我繫襪釋之前跪而繫之既退或讓王生曰何廷辱張廷尉乎王生曰廷尉方為天下名臣吾聊使繫襪欲重之諸公聞之賢王生而重張廷尉又曰下邽翟公為廷尉賔客填門及免官門外可設雀羅復為廷尉乃署其門曰一死一生乃知交情一貴一賤交情乃見又曰文帝初立聞河南守吳公治為天下第一故與李斯同邑乃徵吳公為廷尉又曰孔光為廷尉時定陵淳于長坐大逆誅長少妻乃始等六人皆以長事未發覺時棄去或更嫁及長事發丞相翟方進等議乃始等於法無以解論光以為}
