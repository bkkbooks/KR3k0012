  - {type: variant, offset: 1615, length: 0, content: '', WYG: 夫亡時年尚少人多聘之為姊年老孤寡不能捨去遂誓不嫁以養其姊每晝營田業夜便紡績衣食所須無非阿足出者如此二十餘年及姊亡塟送以禮鄉人莫不稱其義行競令妻女求與相識}
