  - {type: variant, offset: 424, length: 0, content: '', SBCK: 問逵逵等具以情對太祖歎其至義乃表例與逵等並賜爵􅀜内侯列士傳曰羊角哀左伯桃二人相與爲死友欲仕於楚道遥山阻遇􅀨雪不得行飢寒無計自度不俱生也伯桃謂角哀曰天不我與􅀷山窮困併在一人可得生官俱死之後骸骨莫収内手捫心知不如子生恐無益而弃子之器能我樂在樹中角哀聽伯桃入樹中而死得衣粮前至楚楚平王愛角哀之賢嘉其義以上卿禮葬之竟角哀夢見伯桃曰蒙子之恩而􅀗厚葬然正苦荆將軍家相此欲役使吾吾不能聽也與連戰不勝今月十五日當大戰以决勝􅀒得子則勝否則􅀒矣角哀至期日陳}
  - {type: page-break, offset: 424, content: '', id: KR3k0012_SBCK_422-3b}
  - {type: variant, offset: 424, length: 0, content: '', WYG: 問逵逵等具以情對太祖歎其至義乃表例與逵等並賜爵關内侯列士傳曰羊角哀左伯桃二人相與為死友欲仕於楚道遙山阻遇雨雪不得行饑寒無計自度不俱生也伯桃謂角哀曰天不與我深山窮困併在一人可得生官俱死之後骸骨莫收内手捫心知不如子生恐無益而弃子之器能我樂在樹中角哀聴伯桃入樹中而死得衣糧前至楚楚平王愛角哀之賢嘉其義以上卿禮塟之竟角夜夢見伯桃曰蒙子之恩而獲厚塟然正苦荆將軍家相比欲役使吾吾不能聴也與連戰不勝今月十五日當大戰以決勝負得子則勝否則負矣角哀至期日陳}
