  - {type: variant, offset: 553, length: 229, content: 輒相約勒不得侵犯其義信所感如此又曰孫棘大明五年發三五丁弟薩應充行坐違期不至棘自詣郡辭引己為家長令弟不行罪當在己乞以身代薩又辭自引太守張岱疑其不實以棘薩各置一處報云聽其相代顏色莊悅甘赴死焉棘妻許氏又寄語囑夫曰君當門戶豈可委罪小郎且大家臨亡以小郎囑君今竟未婚娶家道不立君已有二子死復何恨岱依事表上孝武帝詔特原罪又曰蔡廓字子度事兄軌如事父家內大小諮而後行公私賞賜一皆納軌有所諮須就典者請之曾從武帝在彭城妻郗氏書求夏服時軌為給事郎中廓荅曰知須夏服給事自應相供無庸別寄, SBCK: 閭租稅}
