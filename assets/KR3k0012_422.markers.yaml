  - {type: variant, offset: 426, length: 0, content: '', WYG: 後事洩世充遂停士季侍讀貞觀初為太學博士而卒又曰畢構性至孝丁繼母憂有兩妹皆在襁褓構乳養嫁遣之及其亡也二妹初聞哀慟氣絶者久之言曰雖兄弟無三年之禮吾荷鞠養豈同常人遂行三年服朝野聞之莫不稱歎構弟栩任太府主簿留司東都聞構疾星馳赴京侍醫藥者累月既而哀毁骨立變服視事踰年未嘗言笑深為朝野所重構嘗為益州長史兼按察使多所舉正風俗一變𤣥宗降璽書慰之曰卿孤潔獨行有古人之風自臨蜀川弊化頓易覽卿前後執奏何異破柱求姦諸使之中在卿為最終戸部尚書又曰李遜為貝州刺史甘露徧於庭樹邑人曰美政所致請以聞遜謙退寢其事厯官十七政俸祿先兄弟嫂姪謂其子曰吾厚汝曹以衣食不如厚之以仁義勿辭弊也天下莫不嗟尚之又曰姚崇少不慕學年踰弱冠嘗過所親見修文殿御覽閱之甚喜遂躭文史以文華著名厯牧常揚吏人並建碑紀德再秉衡軸天下欽其公直外甥任奕任异少孤長於崇家乃與之立家産謂之曰汝與吾無間然矣惜殊宗而代踈命與其子連名冀無以别也時人美之又曰孟景休事親以孝聞丁母憂毁瘠踰禮殆至滅性弟景禕年在襁褓景休親乳之祭為之豐及塟時属祁寒跣履雪霜脚指墮而復生如初景休進士擢第厯監察御史鴻臚丞為來俊臣所搆遇害時人傷焉義婦南史孝義傳呉興乘公濟妻姚氏生二男而公濟及兄願公乾伯並卒各有一子姚養育之賣田宅為取婦自與二男寄止隣家明帝詔為其二子婚表閭復徭役又㑹稽永興呉翼之母丁氏少喪夫性仁愛遭年荒分衣食以飴里中飢餓者隣里求借未嘗違同里陳攘父母死孤單無親戚丁收養之及長為營婚娶同里王禮妻徐荒年客死丁隂為買棺器自徃斂塟元徽末大雪商旅斷行村里比室飢餓丁自出鹽米計口分賦同里在僑家露四喪無以塟丁為辦冡椁有三調不登者代為遂丁長子婦王氏守寡}
