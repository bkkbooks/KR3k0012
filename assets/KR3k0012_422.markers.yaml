  - {type: variant, offset: 148, length: 1, content: 孝, SBCK: 常不赦國雖大赦降城亡子不得預焉今縮髙不受大利以全父子之義而君曰生致之是使我􅀒襄王之詔而廢太府之憲雖死終不敢}
  - {type: variant, offset: 148, length: 1, content: 孝, WYG: 常不赦國雖大赦降城亡子不得預焉今縮高不受大利以全父子之義而君曰生致之是使我負襄王之詔而廢太府之憲雖死終不敢}
  - {type: variant, offset: 148, length: 1, content: 孝, krp: 常不赦國雖大赦降城亡子不得預焉今縮髙不受大利以全父子之義而君曰生致之是使我負襄王之詔而廢太府之憲雖死終不敢}
