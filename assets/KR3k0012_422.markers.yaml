  - {type: variant, offset: 2918, length: 138, content: 立為襄王又曰左儒友於杜伯皆臣周宣王宣王將殺杜伯而非其罪也左儒爭之于王九復之而王不許也王曰別君而異友斯汝也左儒對曰臣聞之君道友逆則順君以誅友友道君逆則率友以違君王怒曰易而言則死左儒對曰臣聞古之士不枉義以從邪不易言以求生故臣能明君之過以死杜伯之無罪王殺杜伯左儒死之說苑曰佛肸以中牟, SBCK: 入}
