  - {type: 'tls:seg', offset: 426, content: '', id: KR3k0012_CHANT_422-4a.28}
  - {type: variant, offset: 426, length: 0, content: '', SBCK: 後事洩充遂停士季侍講貞觀􅀄爲太學􅀶士而卒矣又曰畢構性至孝丁継母憂有兩妹皆在繈褓構乳飬嫁遣之及其亡也二妹􅀄聞哀慟氣絶者乆之言曰雖兄弟無三年之禮吾􅀝鞠飬豈同常人遂行三年服朝野聞之莫不稱歎構弟栩任太府主簿留司東都聞構疾星馳赴京侍毉藥者累月旣而哀毁骨立變服視事踰年未嘗言􅀏􅀷爲朝野所重構嘗爲益州長史兼按察使多所舉正風俗一變􅀇宗降璽書慰之曰卿􅀌㓗獨行有古人之風自臨蜀川弊化頓易覽卿前後執奏何異破枉求姦諸使之中在卿爲㝡終户部尚書又曰李愻爲貝州刺史甘露徧於庭樹邑人曰美政所致請以聞愻謙退寢其事歴官十七政俸禄先兄弟㛐姪謂其子曰吾厚汝曹以衣食不如厚之以仁義勿辭􅁦也天下莫不嗟尚之又曰姚崇少不慕學年踰弱冠嘗過所親見修文殿御覽閱之甚喜遂躭墳史以文華著名歴牧常楊吏人並建碑紀德再秉衡軸天下欽其公直外生任并任异少􅀌長於崇家乃與之立家産謂之曰汝與吾無間然矣惜殊宗而代踈命與其子連名兾無以別也時人美之又曰孟景休事親以孝聞丁母憂毁􅇤踰禮殆至㓕性弟景偉年在襁褓景休親乳之乳爲之豊及葬時屬祁寒跣履雪霜脚指墮而復生如􅀄景休進士擢第歴􅁥察御史鴻臚丞爲來俊臣構䧟遇害時人傷焉義婦南史孝義傳吳興秉公濟妻姚氏生二男而公濟及兄願公乾伯並卒各有一子姚飬育之賣田宅爲取婦自與二男􅀉止隣家明帝詔爲其二子婚表閭復徑役又㑹稽永興呉翼之母丁氏少喪夫性仁愛遭年荒分衣食以飴里中飢餓者隣里求借未嘗違同里陳攘父母死􅀌單無親戚丁収飬之及長爲營婚娶又同里王禮妻徐荒年客死丁隂爲買棺器自往歛葬元徽末大雪啇旅斷行村里比室飢餓丁自出鹽米計口分賦同里任僑家露四喪無以葬丁爲辦􅃁椁有三調不登者代爲遂丁長子婦王氏守寡}
