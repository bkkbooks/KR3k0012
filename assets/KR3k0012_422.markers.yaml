  - {type: variant, offset: 145, length: 2, content: 顏含, SBCK: 􅁗縮髙鄢陵人也其子仕􅁗􅁗以爲管守魏信陵君攻之不下乃使人謂鄢陵君曰遣縮髙來吾將仕之使爲持國尉鄢陵君曰小國不能必其民使者自徃請使吏導使者至縮髙曰君之命髙也將使攻管也夫父攻子守人之大􅀏也見臣而下是背主也父殺子背亦非君善敢再辭使者以報信陵君大怒遣使謂鄢陵君曰鄢陵之地亦猶魏也今吾攻管而不下則􅁗兵不返社稷必危矣願君生束縮髙而致之􅀂君弗致吾將十萬之師以造君城下鄢陵君曰吾先君成侯受詔襄王以守此地受太府之憲曰子殺父臣殺君}
  - {type: page-break, offset: 145, content: '', id: KR3k0012_SBCK_422-2a}
  - {type: variant, offset: 145, length: 2, content: 顏含, WYG: 秦縮高鄢陵人也其子仕秦秦以為管守魏信陵君攻之不下乃使人謂鄢陵君曰遣縮高來吾將仕之使為持國尉鄢陵君曰小國不能必其民使者自徃請使吏導使者至縮高曰君之命高也將使攻管也父攻子守人之大笑也見臣而下是背主也父殺子背亦非君善敢再拜辭使者以報信陵君大怒遣使謂鄢陵君曰鄢陵之地亦猶魏也今吾攻管而不下則秦兵不返社稷必危矣願君生束縮高而致之若君弗致吾將十萬之師以造君城下鄢陵君曰吾先君成侯受詔襄王以守此地受太府之憲曰子殺父臣殺君}
