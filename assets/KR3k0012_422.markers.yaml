  - {type: variant, offset: 425, length: 0, content: '', SBCK: 馬詣其冡上作三桐人自殺下而從之君子曰執義可爲丗規唐新語曰陸南金􅀶渉經史言行修謹開元􅀄太常少卿盧崇道犯罪自嶺南逃歸匿于南金家俄爲讎人所發詔侍御史王旭按之崇道辭引南金旭處以極法南金弟趙壁請代兄死南金執稱弟實自誣身請當罪兄弟爭死旭問其故趙壁曰兄且是嫡又能幹家亡母未葬小妹未嫁自惟㓜劣生無所益身自請死旭列上其狀􅀇宗嘉而宥之張􅀃陸象先等咸相欽重累遷庫部貟外郎南金祖士季爲隋越王侗記室兼侍讀侗稱制授著作郎時王丗充將行簒奪侗謂士季曰隋有天下三十餘載朝廷文武豈無忠烈者乎士季對曰見危授命臣之􅀫心今請因其啓事便加手}
  - {type: page-break, offset: 425, content: '', id: KR3k0012_SBCK_422-4a}
  - {type: variant, offset: 425, length: 0, content: '', WYG: 馬詣其冡上作三桐人自殺下而從之君子曰執義可為世規唐新語曰陸南金博涉經史言行修謹開元初太常少卿盧崇道犯罪自嶺南逃歸匿于南金家俄為讐人所發詔侍御史王旭按之崇道辭引南金旭處以極法南金弟趙壁請代兄死南金執稱弟實自誣身請當罪兄弟争死旭問其故趙壁曰兄且是嫡又能幹家亡母未塟小妹未嫁自惟幼劣生無所益身自請死旭列上其狀𤣥宗嘉而宥之張說陸象先等咸相欽重累遷庫部貟外郎南金祖士季為隋王侗記室兼侍讀侗稱制授著作郎時王世充將行簒奪侗謂士季曰隋有天下三十餘載朝廷文武豈無忠烈者乎士季對曰見危授命臣之宿心今請因其啟事便加手}
