  - {type: variant, offset: 4377, length: 325, content: 萬留付敞敞埋著堂上遂遭世倉卒道路斷絕敞年老飢羸其妻曰第五府君所寄錢可取自給然後償之敞曰吾窮老何明當有用故君之財耶道通當送飢寒何損常舉門遭疫妻子皆死常病臨困唯有孤孫年九歲常謂之曰吾寄故五官掾平與闞敞錢三十萬氣遂絕後孫年長大步擔至汝南問敞敞見之悲喜與共臨發穽錢乃百三十萬孤孫曰亡祖臨終言有三十萬耳今乃百三十萬不敢當也敞曰府君病困氣索言謬誤耳郎無疑也傅子曰太祖既誅袁譚梟其首令曰敢有哭之者戮及妻子於是王叔治田子泰相謂曰生受辟命亡而不哭非義也畏死亡義何以立世遂告其首而哭之哀動三軍軍正白行其戮太祖曰義士也赦劉彥明燉煌實錄曰童巽字文舉學有才太守京兆諒舉巽上掾歷主簿功曹諒卒官巽衰絰經送喪道遇寇虜眾皆散走巽身蔽柩哭嘔血賊欲破棺巽叩頭救請頭破流血賊義而釋之由是顯名, SBCK: 二}
