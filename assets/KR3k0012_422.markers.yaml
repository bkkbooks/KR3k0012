  - {type: variant, offset: 421, length: 0, content: '', SBCK: 又曰公孫瓉字伯珪爲上計吏部太守劉基爲事􅀍徴伯珪御重到洛陽身執徒飬基將徙日南伯珪具豚米於北邙上􅀕先人觴醊祝曰昔爲人子今爲人臣當詣日南多障氣恐或不還與先人辭於此再拜慷􅁣而起觀者莫不歔欷在道得赦俱還魏略曰郭憲字㓜簡西平人以仁篤爲一郡所歸韓約失衆從羗中還依憲衆人多欲取約以邀功而憲責之言人窮來歸我云何欲危之遂擁護厚遇之其後約病死而田樂楊逹等就斬約頭當送之逵等欲條䟽着憲名憲不肯在名中言我常不忍生圖之豈忍取死人以要功乎逵等}
