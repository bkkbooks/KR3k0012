  - {type: variant, offset: 2854, length: 0, content: '', SBCK: 心此趙盾所以書殺也叙母􅁣然勑叙從阜計遂起兵於歴城超聞之襲歴城得叙母母罵之曰􅀂背父之逆子殺君之桀賊天地豈乆容􅀂何不早死敢以面目視人超即殺之杜預女記曰王氏之母者漢丞相安國侯王陵之母漢王擊項羽陵}
