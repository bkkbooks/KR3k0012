  - {type: variant, offset: 3720, length: 397, content: 守下縣殺憑憑家詣闕稱冤詔書下州撿栲英出定文書悉著英名楚毒慘至辭色不變言太守病不關眾事英以冬至日入占病因竊印以封文書下縣殺憑非太守意也繫系歷冬夏肉皆消爛遂不食而死豫章志曰龔碩字顯先為下江督郵太守會稽謝斐獲罪於時大皇帝幸尋陽碩乃具作章陳斐事候大駕於道叩頭流血時大風寒雪之後血流成冰上乃為之住駕省章斐事見理繁欽丘儁碑曰故右扶風都尉主簿有者從都尉討叛胡官兵敗績卒伍奔散都尉臨陣墮馬儁於是下馬授甲以身禦寇遂致死戰場都尉乘儁馬得免桂陽先賢畫讚曰朱陽羅陵果而好義郡汲府君為州章陵被掠栲參加五毒援刀截舌以著盤中獻之廷尉群公義之事得清理會稽先賢傳曰陳業字文理郡守蕭府君卒業與書佐魯雙率禮送喪雙道溺于水業因掘泥楊波搖出其尸又業兄度海復見傾命時同依止者乃五六人骨肉消爛而不可記別業仰皇天誓后土曰聞親戚者必有異焉因割臂流血以洒骨上應時得血住餘皆流去續齊諧記曰田真兄弟三人家巨富而殊不睦忽共議分財金銀珍物各以斛量田業生貲, SBCK: ''}
