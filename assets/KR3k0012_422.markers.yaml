  - {type: variant, offset: 3057, length: 334, content: 叛設祿邑炊鼎曰與我者受邑不與我者烹中牟之士皆與之城北餘子田基獨後至祛衣將入鼎曰田基之義軒冕在前非義不乘斧鉞於後義死不避遂祛衣將入鼎佛肸止之趙簡子屠中牟得而取之論有功者用田基為始基曰吾聞廉士不恥人如此受中牟之功則中牟之士終身慚矣遂襁負其母南徙於楚楚王高其義待以司馬新序曰白公勝拔劍而屬之於屈盧曰子與我將捨之不與我將殺之屈盧曰吾聞之知命之士見利不動臨死不恐為人臣者時生則生時死則死是謂之禮故人知天命下知人臣之道其有可劫乎子不推之白公勝乃入其劍汝南先賢傳曰王恢字仲通太守郭紆同為主簿詔書發筋角紆親里竟辜較之恢諫紆曰明府為藩屏大臣事當從公聽恣私曲何以為治紆不從有告言之者詔書案問事當傳考紆見恢曰太守負君今當何以圖之恢曰明府不須為憂明府年六十恢年七十先明府生十有餘年不於今日効命, SBCK: ''}
