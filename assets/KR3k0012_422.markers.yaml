  - {type: variant, offset: 1253, length: 354, content: 節泌字士清濟陽人也後魏書曰陽固字敬安北平無終人性俶儻不拘小節博覽篇籍有文才清河王懌辟太尉從事中郎懌為元乂所害朝野震悚懌諸子及門生僚吏莫不慮禍隱避不出固獨詣喪所盡哀慟哭良久乃還僕射游肇聞而嘆曰雖欒布王脩何以尚也唐書曰李密既降徐勣尚守黎陽倉謂長史郭恪曰魏公既歸于唐我士眾土地皆魏公之有也吾若上表獻之即是自邀富貴吾所恥也今宜具錄以啟魏公聽公自獻則魏公之功也及使者至高祖無表甚怪之使者具以聞高祖大悅曰徐勣感德推功真忠臣也即授黎州總管賜姓李氏又曰李綱孫安仁永徽中為太子左庶子屬太子被廢歸于陳邸宮寮皆逃散無敢辭送者安仁獨泣涕拜辭而去朝野義之後卒於恒州刺史又曰王義方泗州漣水人也少孤貧事母甚謹博通五經而謇傲獨行初舉明經因詣京師中路逢徒步者自云父為頴上令聞病篤倍道將往焉徒步不前計無所出義方所乘馬與之不告姓名而去老子曰大道廢, SBCK: ''}
