  - {type: variant, offset: 980, length: 191, content: 死而已未敢聞命若賜其餘年全臣一介之願者則明公大造也於是賜安車駟馬養以卿秩又蜀志曰李安字武龍少養外家羅氏元康八年避地入蜀從李特征伐以勇烈聞李驤引為帳下督數有戰功甚信愛之羅尚之遣隗伯攻郫也驤逆戰不利被傷落馬臥未能起士眾皆散唯安與任回在左右伯從數千騎來叱安曰羅武龍吾所取有人卿宜避我嗔目呵之曰吾不相與因前馬剌之伯逡巡而退又前涼錄曰張世度燉煌人幼以孝讓著稱遊學京師遇中州大疫鄉人宗族死于京師, SBCK: 強盗}
