  - {type: variant, offset: 1714, length: 784, content: 不可以不急何則食者眾而耕者寡也今天下莫為義子宜勸何以止我又曰世俗君子視義士不若視負粟者今有人負粟息於路側欲起而不能君子見之無長少貴賤必起之何也曰義也今為義之君子奉承王之道以語之縱不悅而行又從而非毀之則是世俗之君子之視義士也不若視負粟者列子曰桀紂唯重利而輕道是以亡人而無義唯食而已是雞狗也強食磨角勝者為利是禽獸也為雞狗禽獸而欲人之尊己不可得也孟子曰魚我所欲熊掌亦我所欲二者不可兼舍魚取熊掌生亦我所欲義亦我所欲二者不可得兼舍生取義孫卿子曰仁義禮善之於人也譬之貨財粟米之於家也多有之者富少有之者貧至無有者窮六韜曰義之所在天下歸之尸子曰賢者之於義曰貴乎義乎曰義是故堯以天下與舜曰富乎義乎曰義是故子罕以不受玉為寶曰生乎義乎曰義故務光投水而殪三者人之所重而不足以易義又曰十萬之軍無將軍必大亂夫義萬事之將也國之所以立者義也人之所以生者亦義也又曰莒有石焦原廣數尋長五十步臨百仞之谿有以勇見莒公者卻行劑踵焉莒國莫之敢近已獨劑踵焉所以服莒國也夫義之為焦原也亦高矣是故賢者之於義也必且劑踵焉所以一世也韓子曰義者君臣上下之禮父子貴賤之差也賈誼書曰齊桓公之始霸翟人伐燕桓公為燕北伐翟至孤竹桓公歸燕君送入齊地百六十里問於管仲曰禮諸侯相送固出境乎管仲曰非天子不出境公曰然則燕君畏而失禮也寡人恐後世以寡人為能存燕而欺之也乃令燕君旋車割燕君所至而與之諸侯聞桓公之義而皆服之淮南子曰君子非義無以生失義則失其所以生小人非嗜欲無以活失嗜欲則失則所以活故君子懼失義小人懼失利監鐵論曰阻險不如阻義也新序曰白公勝既殺令尹司馬欲立王子閭以為王王子閭不肯劫之刃王子閭曰見國滅而忘王不仁劫白刃而失義不勇吾雖死不予從也白公強之不可遂縊而殺之新序曰白公之難楚人有莊善者辭其母曰棄其親而死其君可謂義乎莊善曰吾聞事君者內其祿而外其身今所以養母者君之祿也身安得無死乎遂辭而行比至公門三廢車中其僕曰子懼矣何不及乎莊善曰懼者吾私也死君, SBCK: ''}
