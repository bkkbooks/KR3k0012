  - {type: 'tls:seg', offset: 150, content: '', id: KR3k0012_CHANT_422-2a.4}
  - {type: variant, offset: 150, length: 2, content: 兄畿, SBCK: 也縮髙聞之曰信陵君爲人悍而自用此辭反必爲國禍吾以全巳爲人臣之義矣豈可使吾君有魏患乎乃之使者舎自刎頸而死信陵君聞之大驚縞素出舎使使者謝鄢陵君曰無忌小人也困於思慮敢再拜釋罪英雄記曰􅀽紹以臧洪爲東都太守時曹操圍張超於雍丘洪始聞超􅀍圍乃徒跣號泣並勒所領將赴其難從紹請兵而紹竟不聽之超城遂䧟張氏族滅洪由是怨紹絶不與通紹増兵急攻洪城中粮盡厨米三升使爲薄糜遍頒衆又殺其愛妾以食兵將咸流涕無能仰視男女七八千相枕而死莫有離叛城䧟生執洪紹謂曰臧洪何相􅀒􅀂是今日}
