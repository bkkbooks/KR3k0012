  - {type: variant, offset: 2718, length: 3, content: 恬貧窮, SBCK: 决言於王王曰皆赦之是縱有罪皆殺之是誅無辜也其母必知其子之善惡聽所欲殺活相召而問之其母泣而對曰殺少子相曰少子人之所愛今欲殺之何也對曰少者妾之子也長者前妻之子也雖痛乎獨謂義何泣下沾襟相言之於王王美其義皆赦二子號曰義母又曰天水姜叙母者同郡楊阜之姑也阜爲州史馬超殺刺史太守叙屯暦城阜徃見之戲欷悲甚叙曰何爲乃尓阜曰守城}
