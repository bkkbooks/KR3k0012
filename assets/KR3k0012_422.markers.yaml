  - {type: variant, offset: 7, length: 0, content: '', SBCK: 下義婦義下戰國䇿曰孟甞君出記問門下諸客誰能爲文収債於薛者馮驩曰能於是載劵契而行辭曰収債畢何市而反孟甞曰視吾家所寡有者乃爲之至薛召諸民當償債者悉來合劵遍合乃矯命以債賜諸民燒其劵民稱萬歳長驅到齊晨而求見孟甞恠其疾正衣冠而見之曰債畢收乎來何疾也何市而反驩曰君云視吾家所寡有者臣􅀼計君宫}
