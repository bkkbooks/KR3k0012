  - {type: variant, offset: 2501, length: 1, content: 吾, SBCK: 妾之子者私義也寧濟公而廢私􅁘使者帳然賢其辝即罷軍還對齊王􅀃之曰魯未可攻也匹婦之義尚如此何况朝廷之臣乎列女傳曰衛宗二順者衛宗室靈主之夫人及傳妾也􅁗滅衛君角封靈主丗家使奉其祀靈主死夫人無子而守寡傳妾有子代後夫人謂傳妾曰孺子飬我甚謹子奉􅀕祀而妾事我我不聊願出居外傳妾泣曰夫人豈欲使靈氏受三不祥􅁘公不幸蚤終是一不祥夫人無子而妾有子是二不祥今夫人將出居外妾居内是三不祥欲自殺其子止之不聽夫人懼遂終年供飬不替又曰魯孝義保者魯孝公稱之保母􅀄孝公父武公與長子恬中子戲朝周宣王宣王立戲爲魯大子武公薨戲立是爲懿公孝公于時號公子稱恬之子伯御與魯人作亂攻殺懿公而自立求稱於宫中將殺之義保聞伯御欲殺稱乃衣其子以稱之衣卧於稱之卧處伯御之義保遂抱稱以逃周天子殺伯御立稱爲孝公魯人髙義保之義故謂之義保又曰河南貞義者樂羊子之妻羊子出學將友人歸貞義截髮賣以供其費後羊子得遺金一餅以與貞義貞義曰妾}
  - {type: page-break, offset: 2501, content: '', id: KR3k0012_SBCK_422-7b}
  - {type: variant, offset: 2501, length: 1, content: 吾, WYG: 妾之子者私義也寧濟公而廢私耶使者悵然賢其辭即罷軍還對齊王說之曰魯未可攻也匹婦之義尚如此何况朝廷之臣乎列女傳曰衛宗二順者衛宗室靈王之夫人及傳妾也秦滅衛君角封靈王世家使奉其祀靈王死夫人無子而守寡𫝊妾有子傳妾事夫人八年不衰供養愈謹夫人謂𫝊妾曰孺子養我甚謹子奉祭祀而妾事我我不聊願出居外傅妾泣曰夫人豈欲使靈氏受三不祥耶公不幸蚤終是一不祥夫人無子而妾有子是二不祥今夫人將出居外妾居内是三不祥欲自殺其子止之不聴夫人懼遂終身供養不替又曰魯孝義保者魯孝公稱之保母初孝公父武公與長子括中子戯朝周宣王宣王立戯為魯太子武公薨戯立是為懿公孝公於時號公子稱括之子伯御與魯人作亂攻殺懿公而自立求稱于宫中將殺之義保聞伯御欲殺稱乃衣其子以稱之衣卧於稱之卧處伯御殺之義保遂抱稱以逃周天子殺伯御立稱為孝公魯人高義保之義故謂之義保又曰河南貞義者樂羊子之妻羊子出學將友人歸貞義截髮供其費後羊子得遺金一餅以與貞義貞義曰妾}
