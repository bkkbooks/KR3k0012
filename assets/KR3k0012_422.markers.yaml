  - {type: variant, offset: 2726, length: 121, content: 而曰我行義吾弗信也又曰燕昭王使樂毅伐齊閔王亡燕之初入齊也聞蓋邑人王歇賢令軍曰環蓋邑三十里母入以歜之故已而使人謂歜曰齊人多高子之義吾以子為將封子萬家歜固謝燕人曰子不聽吾引三軍而屠蓋邑王歜曰忠臣不事二君貞女不更二夫齊王不聽吾諫故退而耕於野國既亡吾, SBCK: ''}
