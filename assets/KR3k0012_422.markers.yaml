  - {type: variant, offset: 2713, length: 3, content: 甘勤苦, SBCK: 免乃泣曰少遭家不造兄弟單少門宗唯兄爲主而復罹此禍我有一計猶足免難將詣縣陳之兄曰其計􅀂何軍曰臨時從冝不可先言也乃請智者爲辭乞代兄遂之命因自剄縣門官嘉其義乃捨遂罪又曰齊義継母者齊二子之母也當宣王時有人闘死於道者吏視之􅀍一瘡二子立其傍吏問之兄曰我殺之弟曰非兄也我殺之朞年不决吏言之於相相}
