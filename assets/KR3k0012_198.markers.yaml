  - {type: variant, offset: 1984, length: 13, content: 孝武帝作建章宮度為千門萬戶, WYG: 高祖定天下功臣異姓王者八國張耳吴芮彭越黥布臧荼盧綰與兩韓信皆徼一時之權變以詐力成功咸得裂上南面稱孤見疑强大懐不自安事窮勢廹卒謀叛逆終於滅亡張耳以知全至子亦失國唯吳芮之起不失正道故能𫝊號五世以無嗣絶澤流支庶有以矣夫以}
