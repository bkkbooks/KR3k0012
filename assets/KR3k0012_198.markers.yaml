  - {type: variant, offset: 1618, length: 1, content: 庾, SBCK: 常漁鉅野澤中爲盗陳勝起歳餘澤間少年相聚百餘人徃從越請仲爲長乃行略地收諸侯散卒得千餘人沛公之從碭北擊昌邑越助之昌邑未下沛公引兵西越亦將其衆居鉅野澤中項籍入􅀜王諸侯還歸越衆萬餘人無所屬齊王田榮叛項王漢乃使人賜越將軍印使下濟隂以擊楚大破楚軍漢二年拜越爲魏相國將兵略定梁地漢王之敗彭城􅄙而西也越皆亡其所下城獨將其兵北居河上漢三年越常徃來爲漢游兵擊楚項王與漢王相距榮陽越攻下睢陽外黄十七城漢王追楚爲項籍所敗固陵廼謂留侯曰諸侯兵不從爲之奈何留侯曰彭越夲定梁地功多}
