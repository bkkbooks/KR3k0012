  - {type: variant, offset: 1605, length: 0, content: '', WYG: 也遂退終身誦甫田之詩風俗通曰漢武帝諱徹改曰通侯或曰列侯秦時六國未平將帥皆家闗中故稱闗内侯通侯言其功大通於王室列者言其功徳列著乃饗爵也王粲爵論曰爵自一級轉登十級而為列侯譬猶秩自百石轉遷而至於公也而近世賞人皆不由等級後無爵封無列侯原其所以爵廢故也司馬法曰賞不踰時欲民速觀為善之利也近世爵廢人有小功無以賞也乃積累焉顧事足乃封侯非所以速為而及時也上觀古事高祖功臣及白起衞鞅皆賜爵為五大夫客卿庶長以至於侯非一頃而封也夫稍稍賜爵與功大小相稱而俱登既得其義且侯次有緒使慕進者逐}
