  - {type: variant, offset: 1612, length: 3, content: 園庾襄, SBCK: 韓信平齊使人言漢王曰齊夸詐多變反覆之國南邊楚不爲假王以塡音鎭之其􅀔不定今權輕不足以安之臣請自立爲假王當是時楚方急圍漢王於滎陽使者發書漢王大怒罵曰吾困於此旦暮望而來佐我乃欲自立爲王張良陳平從後躡漢王足因附耳語曰漢方不利寧能禁信之自王乎不如因立善遇之使自爲守不然變生漢王亦寤因復罵曰大文夫定諸侯即爲眞王耳何以假爲遣張良立信爲齊王徴其兵使擊楚又曰彭越字仲昌}
