  - {type: variant, offset: 1985, length: 1, content: 武, krp: 文皇}
  - {type: variant, offset: 1987, length: 474, content: 作建章宮度為千門萬戶其西則數十里虎圈又曰李禹有寵於太子然好利亦有勇嘗與侍中貴人飲侵陵之莫敢應後愬之上上召禹使制虎懸下圈中未至地有詔引出之禹從落中以劍斫絕纍欲刺虎師古曰落與絡同謂當時繈絡而下也纍索也上壯之遂救止焉三輔故事曰師子圈在建章宮西南列士傳曰秦召公子無忌無忌不行使朱亥奉璧秦王大怒將朱亥著虎圈中亥瞋目視虎虎不敢動郡國誌曰雍州虎圈在通化門東二十五里秦王置朱亥於其中亥瞋目虎不敢動漢文帝問上林尉處及馮婕妤當熊在此漢宮殿䟽曰有彘圈有師子圈武帝造秦故虎圈周匝三十五步長二十步西去長安十五里牢說文曰牢閑養牛馬園也詩曰乃造其曹執豕于牢注云曹群也言搏豕於牢中以為飲酒之殽穆天子傳曰高奔戎獲虎畜于東虞命曰虎牢事具州郡曹子建求自試表曰如微才不試沒世無聞禽息鳥視終於白首此徒圈牢之養物非臣之所志也藩籬易曰羝羊觸藩羸其角詩曰折柳樊圃或云藩左傳曰宋向戍請弭諸侯之兵襄公二十七年諸侯之大夫會于宋以藩為軍注云示不相忌也又哀十二年衛侯會兵于鄖吳人藩衛侯之舍子服景伯謂子貢曰夫諸侯之會事既畢矣侯伯致禮地主歸餼以相辭也今吳不行禮於衛而藩其君舍以難之子盍見太宰乃請束錦以行乃免衛侯, SBCK: ''}
