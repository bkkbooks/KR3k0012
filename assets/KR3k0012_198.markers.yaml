  - {type: variant, offset: 1658, length: 0, content: '', SBCK: 而王者七人上欲王綰羣臣觖望及虜臧荼乃下詔諸將相列侯擇羣臣有功者以爲燕王羣臣知上欲王綰皆曰太尉長安侯綰常從平定天下功最多可王上乃立綰爲燕王諸侯得幸莫如燕王者漢十年陳豨反漢旣斬豨其禆將降言燕王綰使范齊通謀豨所上使使召綰綰稱病又謂其幸臣曰非劉氏而王者獨我與長沙耳今上病屬任吕后吕后婦人專欲事誅異姓王者及大功臣迺稱病不行髙祖崩遂亡入匈奴又曰呉芮􅁗時畨陽令甚得江湖間民心號曰畨君天下}
