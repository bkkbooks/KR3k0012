  - {type: variant, offset: 1652, length: 5, content: 芙蓉園本隋, SBCK: 項羽入咸陽黥布爲前鋒項王封諸將立布爲九江王後與隨何俱歸漢漢王方踞牀洗而召布入見布大怒悔來欲自殺出就舎張御飲食從官如漢王居布又大喜過望漢益分布兵而與俱北收兵至成臯四年秋七月立布爲淮南王又曰盧綰豐人也與髙祖同里及髙祖􅀄起沛綰以客從入漢中爲將軍項籍死使綰別將劉賈擊臨江王共尉還從擊燕王臧荼皆破平時諸侯非劉}
