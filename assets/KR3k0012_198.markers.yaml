  - {type: variant, offset: 45, length: 126, content: 禮曰場人掌國之場圃而樹之果蓏珍異之物以時歛而藏之凡祭祀賓客供其果蓏享亦如之注云果棗栗之屬蓏瓜瓠之屬珍異蒲桃枇杷之屬又曰大宰九職二曰園圃毓草木又曰園廛二十而一注云以利少故二十而稅一也蓏城市中空地又曰圃以樹事貢草木謂果瓜葵韭論語曰樊遟請學為圃子曰吾不如老圃, SBCK: 知天下}
