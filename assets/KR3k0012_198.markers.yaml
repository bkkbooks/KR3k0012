  - {type: variant, offset: 2116, length: 2, content: 無忌, WYG: 為客嘗亡命逰外黄外黄富人女甚美庸奴其夫亡邸其父客謂曰必欲求賢夫從張耳女聴為决計嫁之女家厚奉給耳耳故致千里客宦為外黄令高祖為布衣時嘗從耳逰秦滅魏故購求耳千金耳變姓名之陳為里監門後項羽滅秦亦聞耳賢迺分趙立耳為常山王田榮襲耳耳敗走漢漢二年遣耳與韓信擊破趙井陘斬陳餘泜水上四年夏立耳為趙王耳薨子敖立為王又曰韓信平齊使人言漢王曰齊夸詐多變反覆之國南邉楚}
