  - {type: variant, offset: 1091, length: 503, content: 知羞不為也子貢告孔子孔子曰假修渾沌之術者也雜記曰於陵子辤卿相而桔槔灌園又曰載宏為河間相自免歸而灌蔬以經教授也西京雜記曰茂陵富人袁廣藏鏹巨萬家僮八九百人於邙山下築園東西五里百步激流水注其內構石為山高十餘丈連延數里養白鸚鵡紫鴛鴦旄牛青兕奇禽怪獸委積其間聚沙為洲激水為波潮其中江鷗海鵠乳雛產鷇延漫林池奇樹異草靡不具植屋皆徘徊連屬重閣脩廊行之移晷不能徧廣有罪誅沒入為園鳥獸草木僉移上林苑中又曰樂遊園自生玟珻樹樹下多苜蓿苜蓿亦名懷風時人或謂光風風在其間常肅肅然日照其花有光彩故名苜蓿曰懷風茂陵謂之連枝草又曰梁孝王兔園有落猨巖棲龍岫鴈池鶴洲鳧渚宮觀相屬隋圖經曰史記謂梁孝王築東苑方三百里是曰兔園王褒雲陽記曰車箱阪下有黎園一頃樹數百株青翠繁密望如車蓋水經注曰睢水東南流入于竹圃水次綠竹蔭渚青青實望世人言梁王竹園也又曰玄瓠灣中地數頃有栗園栗小殊不並固安之實也然歲貢三百石以充天府水渚即栗洲樹木高茂望若屯雲中有栗堂甚閑敞牧宰英彥多所游薄魏志曰有芳林園桐園芳林後避少帝諱改為華林晉宮閣名靈芝園鄴有鳴鶴園蒲陶園華林園司馬彪續漢書曰濯龍園在洛陽西北角也郭仲產仇池記城東有苜蓿園列女傳魯漆室之女曰昔有客繫馬園中馬逸踐葵使子終歲不飽葵, WYG: 貴}
