  - {type: variant, offset: 203, length: 5, content: 始曹參微時, SBCK: 李廣}
  - {type: variant, offset: 203, length: 0, content: '', WYG: 李廣與望氣王朔語自漢擊匈奴廣未嘗不在其中而諸校尉材能不及中人以軍功取侯者十數人廣不為人後然終無封邑者何也豈吾相不當侯耶朔曰將軍自念豈有所恨者乎廣曰吾為隴西太守羗嘗反吾誘降八百餘人詐而同坑曰禍莫大於殺降此乃將軍所以不得封侯也東觀漢記曰上封功臣皆為列侯大國四縣餘各有差博士丁恭等議曰古帝王封諸侯不過百里故利以建侯取法於雷上曰古之亡國皆以無道未嘗聞封功臣地而滅也又曰馮勤為郎中給事尚書以圖議軍糧任事精勤遂見親識由是使典諸侯封事百官表注記曰王者之制公侯伯子男凡五等上大夫卿下大夫上中士下士凡五等周室興隆三聖制法立爵五等封國八百親親建國則周公宅魯康叔啟衛賢賢表徳則太公封齊九命既賜用征諸侯魯以周公之故郊祭昊天車服有裕季世陵遲僣施無度強弱相吞舊制不復循也禹貢徐州土五色王者取五色土以為社封四方諸侯各割其方色土與之皆苴以白茅皆假銅虎竹使符第五夫為諸侯受封之}
  - {type: page-break, offset: 203, content: '', id: KR3k0012_WYG_198-3a, image: WYG0894/WYG0894-0735c.png}
  - {type: page-break, offset: 203, content: '', id: KR3k0012_WYG_198-3b, image: WYG0894/WYG0894-0735d.png}
  - {type: variant, offset: 203, length: 5, content: 始曹參微時, krp: 李廣}
  - {type: variant, offset: 204, length: 2, content: 曹參, WYG: 各有采地百里之諸侯以四十里為采地七十里之諸侯以三十里為采地五十里之諸侯以二十里為采地其後子孫雖有黜而采地世世不黜漢雜事曰天子大社以五色土為壇封諸侯者取其土苴以白茅授之各以所封方之色以立社於其國故謂之受茅漢興唯皇子封為王者得茅土其他臣以戸賦租入為節不受茅土不立社王隠晉書曰元康初楊駿輔政封賞過度石崇與散騎常侍蜀郡何舉共為駿議以為陛下聖徳光被皇靈啟祚正位宣化萬國歸心今承洪基此乃天授至於班爵行賞優於太始崔鴻十六國春秋後燕録曰苻定苻紹等降慕容垂下書封紹等為侯以酧秦王之恵且擬三恪吴越春秋曰吴王聞勾踐盡心自守増之以封越王乃使大夫種賫葛布十萬甘蜜九瓽文笥七枚狐皮五雙以報増封之禮韓子曰穰侯越魏而東攻齊五年秦不益一尺之地反成其陶邑之封應侯以攻韓八年成其汝南之封自是以来諸用秦者皆應穣之類也故勝戰則大臣尊益地則私封立說苑曰鄭桓公東㑹封於鄭舎於宋東之逆旅逆旅之叟從外来曰客將焉之曰㑹封於鄭逆旅之叟曰聞之時難得而易失者也今客之寢安殆非㑹封者也鄭桓公聞之援轡自駕其僕接淅而載之袁子曰今有卿相之才居公之位循其治政以寧國家未必封侯也今軍政之法斬一牙門將者封侯夫斬一將之功孰與安寧天下者安寧天下者不爵斬一將之功者封侯失賞之意也又曰春秋鄭莊公封母弟於京祭仲曰都城過制國之害也其後卒相攻伐國内大亂故過度則有強臣之禍鄙小則有}
