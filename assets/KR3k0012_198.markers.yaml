  - {type: variant, offset: 1545, length: 3, content: 濯龍園, SBCK: 惠帝元年民有罪得賣爵三十級以免死罪應劭日一級直錢二千凡爲六萬􅀂今贖入三千疋強矣晉灼武帝一級七十萬始皇本紀入粟千斛拜爵一級時制各異者也賜民爵户一級六年令民得賣爵又曰衛青比年擊胡賦稅旣竭不足以奉戰士有司請令民得賣爵及贖禁錮免賦罪請置賞官名曰武功爵也又曰宣帝五鳯四年大司農中丞耿壽昌奏設常平倉以給北邊省轉漕爵􅀜内侯􅀽山松後漢書曰建寧二年爵乳母趙堯爲平氏君魏書曰太祖置名號侯爵十八級􅀜中侯爵十七級􅀜外侯十六級五大夫十五級與舊列侯凡六等魏氏春秋曰黄􅀄三年帝欲封太后母尚書陳羣奏曰案典籍之文無婦人分土命爵之制}
