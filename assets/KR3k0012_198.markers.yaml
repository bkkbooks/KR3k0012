  - {type: variant, offset: 1607, length: 1, content: 採, SBCK: 倦矣異姓王封漢書曰髙祖定天下功臣異姓王者八國張耳呉芮彭越黥布臧荼盧綰與兩韓信皆徼一時之權變以詐力成功咸得裂土南面稱􅀌見疑強大懷不自安事窮勢迫卒謀叛逆終於滅亡張耳以知全至子亦失國唯呉芮之起不失正道故能傳號五丗以無嗣絶澤流支庶有以矣夫以其不用詐力也漢書曰張耳大梁人也少時及魏公子母忌爲客甞亡命遊外黄外黄富人女甚美庸奴其夫亡邸父客父客謂曰必欲求賢夫從張耳女聽爲請決嫁之女家厚奉給耳耳故致千里客宦爲外黄令髙祖爲布衣時甞從耳遊􅁗滅魏故購求耳千金耳變姓名之}
  - {type: page-break, offset: 1607, content: '', id: KR3k0012_SBCK_198-7b}
  - {type: variant, offset: 1607, length: 69, content: 採陳留志曰園庾襄邑人也庾始居園中故代謂之園公天文要集曰庖瓜為天子果園又天園主果實茹蓄儲又曰芙蓉園本隋氏之離宮居地三十頃周廻十七里貞觀中賜魏, WYG: 倦矣異姓}
