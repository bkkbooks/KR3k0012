  - {type: variant, offset: 2129, length: 0, content: '', WYG: 罵曰吾困於此旦暮望而来佐我乃欲自立為王張良陳平伏後躡漢王足因附耳語曰漢方不利寧能禁信之自王乎不如因立善遇之使自為守不然變生漢王亦悟曰大丈夫定諸侯即為真王耳何以假為遣張良立信為齊王徴其兵使擊楚又曰彭越字仲昌邑人也常漁鉅野澤中為盜陳勝起嵗餘澤間少年相聚百餘人往從越請仲為長乃行畧地收諸侯散卒得千餘人沛公從碭北擊昌邑越助之昌邑未下沛公引兵西越亦}
