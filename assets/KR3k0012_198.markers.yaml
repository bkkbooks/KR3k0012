  - {type: variant, offset: 1677, length: 2, content: 泰泰, SBCK: 以芮率百越佐諸侯從入􅀜故立芮爲衡山王項籍}
  - {type: variant, offset: 1677, length: 304, content: 泰泰死又賜東宮今屬家令寺園中廣廈脩廊連豆屈曲其地延袤塏跨帶原隰又有脩竹茂林綠被岡阜東坂下有涼堂堂東有臨水亭按黃圖曲池漢武所造周廻五里池中遍生荷芰菰蒲冒間禽魚翔泳宣帝立廟曲池之北名曰樂遊廟即今昇平坊內基趾是也此在秦為宜春苑在漢為樂遊苑宇文愷營建京城以羅城東南地高不便故缺此偶頭一坊餘地穿入芙蓉池以虛之郡國志云西夷有荔支園僰僮施夷中最賢者古所謂僰僮之富多以荔支為業園植萬株樹收一百五十斛隋圖經曰司竹園在𥂕屋縣東十二里穆天子西征至玄池乃植竹即此是也史記曰渭川千畝竹漢謂鄠杜竹林故有司竹都尉西都賦所謂鄠杜濱其足竹林果園芳草甘木也圈史記曰竇太后好黃老書召袁固問老子書固曰此家人言耳太后怒曰安得司空城旦書乎乃使固入圈擊豕, WYG: 封}
  - {type: variant, offset: 1677, length: 2, content: 泰泰, krp: 以芮率百越佐諸侯從入關故立芮爲衡山王項籍}
