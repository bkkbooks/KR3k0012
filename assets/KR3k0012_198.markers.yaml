  - {type: variant, offset: 1442, length: 3, content: 玄瓠灣, SBCK: 春秋鄭莊公封母弟於京􅀕仲曰都城過制國之害也其後卒相攻伐國内大亂故過度則有強臣之禍鄙小則有微弱之􅁨􅁗以列國之􅀔而并天下自以由諸侯而起之也於是去五等之爵而致郡縣雖有親子母弟皆爲匹夫及其政衰夫一呼而天下去及至漢家見亡􅁗以􅀌特亡也於是大封子弟或連城數十廓地千里自􅀜巳東皆爲王國力多而權重故亦有七國之難白虎通曰王者即位先封賢者憂民之急也故列土分疆非爲諸侯張官設府非爲卿大夫皆爲民也封諸侯以夏何陽氣盛養故以封諸侯盛養賢也立人君陽德之盛者也又曰受命之王致太平之美羣臣上下之功故盡封之乃}
  - {type: page-break, offset: 1442, content: '', id: KR3k0012_SBCK_198-4a}
  - {type: variant, offset: 1442, length: 3, content: 玄瓠灣, krp: 春秋鄭莊公封母弟於京祭仲曰都城過制國之害也其後卒相攻伐國内大亂故過度則有強臣之禍鄙小則有微弱之憂秦以列國之勢而并天下自以由諸侯而起之也於是去五等之爵而致郡縣雖有親子母弟皆爲匹夫及其政衰夫一呼而天下去及至漢家見亡秦以孤特亡也於是大封子弟或連城數十廓地千里自關巳東皆爲王國力多而權重故亦有七國之難白虎通曰王者即位先封賢者憂民之急也故列土分疆非爲諸侯張官設府非爲卿大夫皆爲民也封諸侯以夏何陽氣盛養故以封諸侯盛養賢也立人君陽德之盛者也又曰受命之王致太平之美羣臣上下之功故盡封之乃}
  - {type: variant, offset: 1446, length: 3, content: 地數頃, SBCK: 興征伐大功皆封所以襃大功也盛德之士亦封之所以尊}
