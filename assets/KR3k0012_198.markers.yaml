  - {type: variant, offset: 1531, length: 8, content: 園蒲陶園華林園司, SBCK: 在隂其子和之我有好爵吾與爾縻之左傳襄公三年曰齊莊公爲勇爵設爵位以命勇士殖綽郭最欲與焉州綽曰東閭之役臣左􅆖迫還於門中識其枚數識門枚樓其可與乎公曰子爲晉君也對曰臣爲􅀠新然二子者譬之禽獸臣食其肉而寢其皮矣言甞射得之也白虎通曰爵五等者法五行或三等者法三光或法三或法五何質者據天故象三光文者據地故法五行禮含文嘉曰殷爵三等周爵五等各有冝也王制曰王者之制爵禄凢五等謂公侯伯子男乎此據周也所以名之爲公侯何公者公正無私之意侯者侯順逆故也孝經援神契曰二王之後稱公大國侯皆千乗象雷百里所潤雲雨同史記曰􅁗聞}
