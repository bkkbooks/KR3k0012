  - {type: variant, offset: 1598, length: 1, content: 園, SBCK: 爵禄者人臣之銜轡􅀃􅁐曰晉文公出亡周流天下舟之僑去虞而從文公文公反國擇可爵而爵之擇可禄而禄之僑獨不與焉文公酌諸大夫酒酒酣公曰二三子盍爲寡人賦乎舟之僑曰君子爲賦小人請陳其辭辭曰}
  - {type: page-break, offset: 1598, content: '', id: KR3k0012_SBCK_198-6b}
  - {type: variant, offset: 1598, length: 1, content: 園, WYG: 爵禄者人臣之銜轡說苑曰晉文公出亡周流舟之僑去虞而從文公文公反國擇可爵而爵之擇可禄而禄之僑獨不與焉文公酌諸大夫酒酣公曰二三子盍為寡人賦乎舟之僑曰君子為賦小人請陳其辭辭曰}
  - {type: variant, offset: 1598, length: 1, content: 園, krp: 爵禄者人臣之銜轡說苑曰晉文公出亡周流天下舟之僑去虞而從文公文公反國擇可爵而爵之擇可禄而禄之僑獨不與焉文公酌諸大夫酒酒酣公曰二三子盍爲寡人賦乎舟之僑曰君子爲賦小人請陳其辭辭曰}
  - {type: variant, offset: 1600, length: 5, content: 螫毒葵藿為, SBCK: 龍矯矯頓失其所一虵從之周流天下龍反其淵虵寧其處公戄然曰子欲爵也請待旦日之朝子欲禄耶請今命廪人之僑曰請而得其賞廉者不受也言盡而名至仁者不爲也遂退終身誦甫田之詩風俗通曰漢武帝諱徹改曰通侯或曰列侯􅁗時六國未平將帥皆家􅀜中故稱􅀜内侯通侯言其功大通於王室列者言其功德列著乃饗爵也王粲爵論曰爵自一級轉登十級而爲列侯譬猶秩自百石轉遷而至於公也而近丗賞人皆不由等級從無爵封無列侯原其所以爵廢故也司馬法曰賞不踰時欲民速觀爲善之利也近丗爵廢人有小功無以賞也乃積累焉頒事足乃封侯非所以速爲而及時也上觀古比髙祖功臣及白起衛鞅皆稍賜爵爲五大夫客卿庶長以至於侯非一頓而封也夫稍稍賜爵與功大小相稱而俱登旣得其義且侯次有緒使慕進者逐}
  - {type: page-break, offset: 1600, content: '', id: KR3k0012_SBCK_198-7a}
  - {type: variant, offset: 1600, length: 4, content: 螫毒葵藿, WYG: 龍矯矯頓失其所一蛇從之周流天下龍反其淵蛇寧其處公瞿然曰子欲爵也請待旦日之朝子欲禄耶請今命廪人之僑曰請而得其賞亷者不受也言盡而名至仁者不}
  - {type: variant, offset: 1600, length: 5, content: 螫毒葵藿為, krp: 龍矯矯頓失其所一虵從之周流天下龍反其淵虵寧其處公戄然曰子欲爵也請待旦日之朝子欲禄耶請今命廪人之僑曰請而得其賞廉者不受也言盡而名至仁者不爲也遂退終身誦甫田之詩風俗通曰漢武帝諱徹改曰通侯或曰列侯秦時六國未平將帥皆家關中故稱關内侯通侯言其功大通於王室列者言其功德列著乃饗爵也王粲爵論曰爵自一級轉登十級而爲列侯譬猶秩自百石轉遷而至於公也而近丗賞人皆不由等級從無爵封無列侯原其所以爵廢故也司馬法曰賞不踰時欲民速觀爲善之利也近丗爵廢人有小功無以賞也乃積累焉頒事足乃封侯非所以速爲而及時也上觀古比髙祖功臣及白起衛鞅皆稍賜爵爲五大夫客卿庶長以至於侯非一頓而封也夫稍稍賜爵與功大小相稱而俱登旣得其義且侯次有緒使慕進者逐}
