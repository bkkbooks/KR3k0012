  - {type: variant, offset: 2909, length: 3, content: 今者臣, SBCK: 郤虎公召虎曰襄言所以勝鄴鄴旣勝將賞}
  - {type: variant, offset: 2909, length: 3, content: 今者臣, krp: 郤虎公召虎曰襄言所以勝鄴鄴旣勝將賞}
  - {type: variant, offset: 2913, length: 940, content: 來逢子哲曰上士可以託邑中士可以託言下士可以託才三言者固可得託於是楚王發使追公子哲濮水之上子哲還重於楚伯玉之功也劉向新序曰楚莊王罷朝而晏樊姬問其故莊王曰與賢相語不知晏者也樊姬曰賢相為誰王曰虞丘子樊姬掩口而笑王乃問其故曰虞丘子為相數年未嘗進一賢不知賢是不智知而不進是不忠不忠不智安得為賢明日朝王以樊姬之言告虞丘子虞丘子稽首曰如姬之言於是辭位而進孫叔敖叔敖相楚而莊王霸樊姬之力海內先賢傳曰潁川鍾皓字季和為郡功曹太丘長陳寔為西門亭長皓深獨敬異歲常禮待與同分義會辟公府臨辭太守問誰可代君曰府君欲得其人西門亭長可用寔卒為海內高名之臣歸以公相之位三輔決錄曰頴陽游殷為郡功曹有童子張既為書佐殷察畏之具設賓饌以子楚託之後魏王以問既稱楚文武兼學王遂以為漢興郡管輅別傳曰趙孔耀至冀州見裴使君問顏色何以清減孔耀曰體本無藥石之疾然見清河內有一騏驥拘繫後廄歷年去王良伯樂百八十里不得聘其足以起風塵以此憔悴耳使君言騏驥今何所在孔耀言平原管輅字公明年三十六雅性寬大與世無忌觀天則能同妙甘公石申俯覽同異則能齊司馬季主遊步道術開神無窮抱荊山之璞懷衣光之寶而為清河郡所錄北黌文學可為痛心疾首者裴使君聞言悅慨曰如此便相為取之即檄召輅為文學從事一相見清論終日不覺罷倦天時大熱移床於廷前樹下乃至鷄鳴向晨復出再相見便轉為鉅鹿從事三相見轉為治中四相見轉別駕前至十月舉為秀才文士傳曰張華薦成公綏曰竊見處士東郡成公綏年二十五字子安體珪璋之質資不器之量知深慮明足以妙見研恩篤好則仲舒之精引之世貞幹足以敦風篤俗淵才達學足以弘導世教固逸倫之殊俊搢抻之檢式也荀爽與郭叔都書曰陳季方才德秀出超世逸群金相玉質文章席美終軍賈誼誠無以加宜遂貢之宰朝盛其龍光鹽車之驥自非伯樂無以顯名採光剖璞以獨見寶實為足下利之孔融薦禰衡表曰伏見處士平原禰衡淑質貞亮英才卓犖初涉蓺文登堂覩奧目所一見輒傳於口耳所一聞不忘於心性與道合思若有神若得龍躍天衢奮翼雲漢足以明近署之多士增四門之穆穆應璩薦賁伯偉文曰璩聞景雲浮則應龍翔治道明則儁乂臻是故良哉之歌興於唐堯之世多士之頌形於周文之朝竊見太子舍人賁琳字伯偉稟性純和體素清愨宜授以千里之塗任以列曹之職陸機薦賀循郭訥表曰伏見武康令賀循德量邃茂才鑒清遠丞陽令郭訥風度簡曠器識朗拔准準其才望資品循可尚書郎訥可太子洗馬又陸機薦戴若思文, SBCK: ''}
