  - {type: variant, offset: 1826, length: 0, content: '', WYG: 進賢受上賞蕭何功雖髙得鄂君乃益明於是因鄂君故所食闗内侯邑封為安平侯又曰項籍死天下定上置酒上折隨何之功謂何腐儒為天下安用腐儒隨何跪曰夫陛下引兵攻彭城楚王未去齊也陛下發歩兵卒五萬人騎五千能以取淮南乎上曰不能隨何曰陛下使何與二十人使淮南至如陛下之意是何之功賢於歩卒五萬騎五千也然而陛下謂何腐儒為天下安用腐儒何也上曰吾方圖子之功乃以隋何為䕶軍中尉又曰漢文帝初即位赦天下賜民爵一級女子百戸牛酒蘇林曰男子賜爵女子賜牛酒也皇帝曰呂産自置為相國吕禄為上將軍擅矯遣灌将軍嬰将兵擊齊欲代劉氏嬰留滎陽弗擊與諸侯合謀以誅吕氏産欲為不善丞相陳平與太尉周勃謀奪吕産等軍朱虛侯劉章首先捕吕産等太尉身率襄平侯通持節承詔入北軍典客劉掲身奪趙王吕禄印益封太尉勃萬戸賜金五千斤丞相陳平灌将軍嬰邑各三千戸金二千斤朱虛侯劉章襄平侯通東牟侯劉興居邑各二千戸金二千斤封典客掲為陽信侯賜金千斤漢書曰夏侯嬰自上初起沛常為太僕竟髙祖崩以太僕事恵帝帝及髙后徳嬰之脱孝恵魯元於下邑間也乃賜嬰北第第一師古曰北第者近北闕之第嬰最第一也又曰景帝賜衛綰劍綰曰先帝賜臣劍凡六不敢奉詔上曰劍人之所施易獨至於今乎綰曰具在上使取六劍劍常盛未嘗服也後遷為御史大夫代桃侯舍為丞相然自初官以至相終無可言上以為敦厚可相少主尊寵之賞賜甚多又曰伏日詔賜従官肉大官丞日晏不来東方朔獨㧞劍割肉謂其同官曰伏日當早歸即懐肉去大官奏之朔後入上曰昨賜肉不待詔以劍割肉去之何也朔勉冠謝上曰先生起自責也朔再拜曰朔来受賜不待詔何無禮也㧞劍割肉一何壯也割之不多一何亷也歸遺細君又何仁也上笑曰使先生自責乃反自譽復賜酒一石肉百斤歸遺細君又曰王成不知何郡人也為膠相治甚有聲宣帝先褒之地節三年下詔曰盖聞有功不賞有罪不誅雖唐虞不能化天下今膠東相成勞来不怠流民自占八萬餘口師古曰隠度名數而來附業也治有異等之效其賜成爵闗内侯秩中二千石又曰黄覇為潁川太守是時鳯凰神雀數集郡國潁川尤多天子以覇治行終長者下詔稱揚曰潁川太守覇宣布詔令百姓鄉化孝子悌弟貞婦順孫日以衆多行者讓路道不拾遺養視鰥寡贍助貧窮獄無重囚而吏民鄉於教化可謂賢人君子矣書不云乎股肱良哉其賜覇爵闗内侯黄金百斤秩中二千石而潁川孝悌有行義民三老力田皆以差賜爵及帛又曰初霍氏奢侈茂陵徐生曰霍氏必亡夫奢則不遜不遜必侮上侮上者逆道也在人之右衆必害之霍氏秉權日久衆欲害之而又行以逆道也不亡何待乃上疏言霍氏泰盛陛下即厚愛之宜此時抑制亡使至亡書三上輙不報聞其後霍氏誅㓕而告霍氏者皆封侯人為徐生上書曰臣聞客有過主人者見其竈直突傍有束薪客謂主人曰為曲突逺徙其薪不爾且有火患主人嘿然不應俄而家果失火鄰里共救之幸而得息於是殺牛置酒謝其鄰人灼爛者在於上行餘各以功次坐而不録言曲突者人謂主人曰鄉使聽客之言不費牛酒終無火患今論功而請賓曲突徙薪亡恩澤燋頭爛額為上客邪主人乃寤而請之今茂陵徐福數上書言霍氏且有變宜防絶之鄉使福説得行則國亡裂土出爵之費臣亡逆亂誅滅之敗往事既已而福獨不䝉其功唯陛下察之上乃賜福帛十疋後以為郎原闕又曰郭伋為并州牧過京師謝恩帝並召皇太子諸王宴語終日賞賜車馬衣服什物又曰肅宗納梁竦女為貴人生和帝竇皇后養以為子諸竇遂譛殺貴人而䧟竦等死獄中家屬徙九真和帝立後貴人姊南陽樊調妻嫕於計切上書自訟曰妾同産女弟貴人前充後宫蒙先帝厚恩得見寵幸誕生聖明為竇憲兄弟所譖訴使妾父竦寃死牢獄老母孤弟逺徙萬里今值陛下神聖之運親統萬幾羣物得所憲兄弟姦惡既伏辜誅妾乃敢昧死自陳所天帝覽感悟乃下掖庭令驗問之嫕辭證明審遂得引見具陳其狀乃留嬺止宫中連月乃出賞賜衣被錢帛第宅旬月之間累貲十萬嬺素行有操帝益愛之乃號梁夫人楚漢春秋曰髙帝初封侯者皆賜丹書鉄劵曰使黄河如帶太山如礪漢有宗廟爾無絶世漢魏春秋曰天子以曹公典任守外臨時之賞或宜速乃命公得承制封拜諸侯守相詔曰夫軍之大事乃兹賞罰勸善懲惡宜不旋時故司馬法曰賞不踰月者欲民速覩為善之利也昔在中興鄧禹入闗承制拜軍祭酒李文為河東太守来㪧又承制拜髙峻通路将軍察其本傳皆非先請明臨時刻印也斯則世祖明權逹變盖所用速示威懐而克成洪勲者也且春秋之義大夫出疆專命之事苟可以利社稷安國家而已况君秉任二伯師尹九有突征夷夏軍行蕃甸之外得失在於斯須之間停賞俟詔以滯時務非朕之所圖也自今已後臨事所甄當加寵號者其便刻印章假授咸使忠義得共奨勵勿有疑焉魏志曰太祖攻城邑靡麗之物則悉賜有勲功勞宜賞不惜千金無功望施分毫不與又曰袁煥卒太祖賜穀二千斛一教以太倉穀千斛賜郎中令家一教以垣下穀千斛與耀卿家煥字耀卿外不解其意教曰以太倉穀者官法也以垣下穀者親舊也又曰公令曰昔趙奢竇嬰之為将也受賜千金一朝散之故能濟成大功末世流聲吾讀其文未嘗不慕其為人也與諸将士大夫共成戎事幸賴賢人不愛其謀羣士不遺其力是以夷險平亂而吾得竊大賞戸邑三萬追思趙竇散金之義今分所受租與諸侯掾屬及故戍於陳蔡者庶以酬答衆勞不擅大恵也又曰鎮東将軍毌丘儉上言諸葛恪圍合肥新城中遣士劉整出圍傳消息為賊所得考問所傳整曰欲殺我者便速殺之終無他辭又遣士鄭像出城傳消息恪遣騎索得縛将繞城勅像大呼言大軍已還洛不如早降像不從其言更大呼城中曰大軍近在圍外壯士努力賊以刀築其口便不得語整像為兵能守義執節子弟宜有差異詔曰夫顯爵所以褒元功重賞所以寵烈士整像召募通使越六軍蹈重圍冒突白刃輕身守信不幸見獲抗節彌勵揚六軍之大勢安城守之懼心臨難不顧畢志傳命今追賜整像爵關中侯各除士名使子襲爵如部曲将死事科又曰夏侯惇從征孫權還使都督軍留居巢賜伎樂名倡令曰魏絳以和戎之功猶受金石之樂况将軍乎又曰太祖平栁城班所獲器物以素屏風素机賜毛玠曰君有古人之風故賜君古人之服玠居顯位撫育孤兄子甚篤賞賜以施貧窮家無所餘又曰文帝在東宫賜鍾繇五熟釜為之銘曰於赫有魏作漢藩輔厥相惟鍾寔榦心膂靖恭夙夜匪遑安處百僚師師楷兹度矩又曰薛䕫黄初中為秘書丞帝與之推論今古未嘗不終日帝視其衣薄賜之袍晉春秋曰清河崔祖思死家無財有書八千卷上聞嗟嘆良久乃以葛屯穀百五斛賜其家曰葛屯亦吾之垣下令後世知其見異晉書曰王沈為豫州下教曰能陳長吏可否説百姓所害者有賞言刺史得失倍賞主簿褚䂮曰上好下應今示以賞恐拘介之士憚賞不言貪昧之人慕利妄舉沈從之宋書曰謝方明為桓𤣥著作佐郎後従兄景仁舉為宋武中軍主簿方明知無不為帝謂曰愧未有瓜衍之賞且當與卿共豫章國禄屢加賞賜蕭子顯齊書曰太祖奇張融賜衣曰見卿衣服麄交爾籃縷亦虧朝望今送一通衣意謂雖故亦勝新是吾之所著已令裁减稱卿之體又曰孔靈産為光禄大夫覽止足之分不肯仕太祖以白毛扇素机遺之曰卿有古人之風故賜以古人之服當代榮之北齊書曰唐邕字道和太原人邕少明敏有治世之才斛律金啟太后云唐邕强榦一人當千顯祖常解其所著青䑕皮裘賞邕云朕意與卿共敝家語曰孔子曰自季孫之賜我千鍾也而交友益親得季孫千鍾之賜以施於衆故交友日益親也自南宫敬叔之乗我車也而道加行孔子欲見老耼西觀周室敬叔言於魯君給孔子車馬問禮於老子觀郊廟自周而還弟子四方来集也故道雖貴必有時而後動徳雖髙必有勢而後行㣲夫二子之賜則丘之道殆於廢矣太公金匱曰賞一人而千人喜者賞之賞二人而萬人喜者賞之賞三人而三軍勸者賞之管子曰明賞不費明刑不暴賞罰明徳之至也司馬法曰殷戮於市周賞於朝勸君子懼小人也鶡冠子曰進賢者受上賞則不蔽善為政賞人不多而民喜罰人不多而民畏言賞罰中尹文子曰禄薄者不可以經亂賞輕者不可以入難此處上者所宜慎者也慎子曰孔子云有虞氏不賞不罰夏后氏賞而不罰殷人罰而不賞周人賞且罰罰禁也賞使也文子曰善賞者費少而勸多故聖人賞一人天下趨之是以至賞不費也韓子曰司城子罕謂宋君曰慶賞賜與者民之所好也君自行之誅罰殺戮者民之所惡也臣請當之於是戮細而誅大君請與子罕議之居朞年人知死生之命制於子罕故一國歸焉又曰襄子圍於晉陽中出圍賞有功者四人髙赫為首張孟談曰晉陽之事赫無大功今為賞首何也襄子曰晉陽之事國危社稷殆矣羣臣無不有驕侮之意者唯赫不失君臣之禮是以先之仲尼聞之曰善賞哉襄子賞一人而天下為人臣者莫能失禮也又曰韓昭侯使人蔵蔽衿侍者曰君亦不仁矣蔽衿不以賜左右而蔵之昭侯曰非子之所知也吾聞明君之愛一嚬有為嚬一笑有為笑今夫衿豈特嚬笑哉衿之與嚬笑相去逺矣吾必待之有功故蔵之未有與也言不謬賞尹子曰范獻子遊於河顧問欒氏之子舟人捨檝對曰君不修政舟中之人皆欒氏之子君能反是欒氏之子其如君何獻子稱善乃賜舟人田百畆以田易言也淮南子曰忠臣之}
