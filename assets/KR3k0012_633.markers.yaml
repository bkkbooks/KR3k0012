  - {type: variant, offset: 650, length: 300, content: 舉內外堪為宰相者崇曰張柬之沉厚有謀能斷大事且其人年老惟陛下急用之登時召見為同鳳閻鸞臺平章事年已八十與桓彥範敬暉等誅二張興復社稷忠冠千古功格皇天又曰張嘉貞落拓有大志亦不自異亦不下人自平鄉丞免歸鄉里布衣環堵之中蕭然自得時人莫之知也張循憲以御史出使還次蒲州驛循憲方復命使務有不決者意頗病之問驛吏曰此有客乎驛吏以嘉貞對循憲召以相見咨以使事積時凝滯者嘉貞隨機應之莫不豁然乃命草表又出其意外他日則天以問循憲其以實對因請以己官讓與之則天曰卿能讓賢美朕豈無一官自進賢耶乃召見內殿隔簾與語嘉貞儀皃甚偉神彩俊傑則天甚異之因奏曰臣生居草萊目不覩朝廷之事陛下過聽引臣天庭此萬代一遇也然咫尺之間若隔雲霧臣恐君臣之道有所未盡則天, SBCK: 尹子木}
