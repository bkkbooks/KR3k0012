  - {type: variant, offset: 2903, length: 212, content: 楚而晉善用之今者臣之來逢子哲曰上士可以託邑中士可以託言下士可以託才三言者固可得託於是楚王發使追公子哲濮水之上子哲還重於楚伯玉之功也劉向新序曰楚莊王罷朝而晏樊姬問其故莊王曰與賢相語不知晏者也樊姬曰賢相為誰王曰虞丘子樊姬掩口而笑王乃問其故曰虞丘子為相數年未嘗進一賢不知賢是不智知而不進是不忠不忠不智安得為賢明日朝王以樊姬之言告虞丘子虞丘子稽首曰如姬之言於是辭位而進孫叔敖叔敖相楚而莊王霸樊姬之力海內先賢傳曰潁川鍾皓字季和為郡功曹, WYG: 義}
  - {type: punctuation, offset: 2909, content: 。, id: KR3k0012_CHANT_633-bkkpn790}
