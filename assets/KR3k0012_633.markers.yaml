  - {type: variant, offset: 2360, length: 393, content: 對曰臣之庶子鞅者願王以國聽之若不能聽勿使出境王不應出謂左右曰豈不悲哉夫以公叔之賢今謂寡人必以國聽鞅悖也公叔死公孫鞅西遊秦秦孝公聽之秦果強魏果弱又曰百里奚之未遇時至虢而虜飯牛於秦練以鬻五叛之皮公孫披得悅之獻諸繆公三日請屬事焉公曰買之五羊皮而臣之無乃為天下笑乎披曰信賢而任之君之明也讓賢而下之臣之忠也君為明臣為忠彼信賢也境內將服敬國且畏夫誰暇笑哉用之謀無不當舉必有功說苑曰田子方渡西河遇翟黃乘軫車子方曰子何以致此乎曰昔西河無守臣進吳起鄴無令臣進西門豹酌無令臣進北門可君欲攻中山臣進樂羊魏於天下難治臣進李克進此五大夫爵位於此又曰子貢問孔子曰今之臣孰賢孔子曰齊有鮑叔鄭有子皮子貢曰齊無管仲鄭無子產者乎孔子曰吾聞鮑叔之進管仲子皮之進子產未聞管仲子產有所進也又曰孟嘗君進客於齊王三年不見用故客反見曰不知臣之罪耶君之過耶孟嘗君曰寡人聞縷因鍼而入不因針而急女因媒而嫁不因媒而畜夫子之才必薄矣當怨寡人哉客, SBCK: 咎犯}
