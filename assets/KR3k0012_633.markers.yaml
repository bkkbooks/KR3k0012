  - {type: variant, offset: 1823, length: 0, content: '', WYG: 乏絶者數矣夫漢與楚相守滎陽數年軍無見糧蕭何轉漕闗中給食不乏陛下雖亡山東蕭何常全闗中以待陛下此萬世之功也今雖亡曹叅百數何缺於漢漢得之不必待以全奈何欲以一旦之功而加萬世之功也蕭何第一曹叅次之髙祖曰善於是乃令蕭何第一賜帶劍履上殿入朝不趨上}
