  - {type: variant, offset: 1823, length: 0, content: '', SBCK: 乏絶者數矣夫漢與楚相守滎陽數年軍無見粮蕭何轉漕関中給食不乏陛下雖亡山東蕭何尚全􅀜中以待陛下此萬丗之功也今雖亡曹叅等百數何缺於漢漢得之不必待以全奈何欲以一旦之功而加萬丗之功哉蕭何第一曹叅次之髙祖曰善於是乃令蕭何第一賜帶劒履上殿入朝不趍上}
