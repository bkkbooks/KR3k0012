  - {type: variant, offset: 1826, length: 0, content: '', krp: 進賢受上賞蕭何功雖髙得鄂君乃益明於是因鄂君故食関内侯邑封爲安平侯又曰項藉死天下定上置酒上折隋何之功謂何腐儒爲天下安用腐儒隋何跪曰夫陛下引兵攻彭城楚王未去齊也陛下發歩兵卒五萬人騎五千能以取淮南乎上曰不能隋何曰陛下使何與二十人使淮南至如陛下之意是何之功賢於歩卒五萬騎五千也然而陛下謂何腐儒爲天下安用腐儒何也上曰吾方圖子之功乃以隋何爲護軍中尉又曰漢文帝𥘉即位赦天下賜民爵一級女子百户牛酒蘇林曰男子賜爵女子賜牛酒也皇帝曰吕産自置爲相國吕禄爲上將軍擅矯遣灌將軍嬰將兵擊齊欲伐劉氏嬰留滎陽弗擊與諸侯合謀以誅吕氏吕産欲爲不善丞相陳平與太尉周勃謀奪吕産等將軍朱虚侯劉章首先捕吕産等太尉身率襄平侯通持節承詔入北典客劉揭身奪趙王軍宫吕禄益封太尉勃萬户賜金五千斤丞相陳平灌將軍嬰邑各三千户金二千斤朱虚侯劉章襄平侯通東牟侯劉興居邑各二千户金二千斤封典客揭爲陽信侯賜金千斤漢書曰夏侯嬰自上𥘉起沛常太僕竟髙祖以太僕事惠帝及髙后德之脫孝惠魯元於下邑間也乃賜嬰北第第一師古曰此第者近北闕之第嬰最第一也曰近我以尊異之又曰景帝賜衛綰劒綰曰先帝賜臣劒凢六不敢奉詔上曰劎人之施易獨至于今乎綰曰具在上使取六劒劒嘗盛未甞服也後遷爲御史大夫代桃侯舎爲丞相然自𥘉官以至相終無可言上以爲敦厚可相少主尊寵之賞賜甚多又曰伏日詔賜從官肉太官承日晏不來東方朔獨拔劒割肉謂其同官曰伏日當蚤歸請受賜即懷肉去太官奏之朔後入上曰昨賜肉不待詔以劒割肉而去之何也朔免冠謝上曰先生起自責也朔來受賜不待詔何無禮也抜劒割肉一何壯也割之不多一何廉也歸遺細君又何仁也上笑曰使先生自責乃反自譽復賜酒一石肉百斤歸遺細君又曰王成不知何郡人也爲膠東相治甚有聲宣帝先褒之地節三年下詔曰盖聞有功不賞有罪不誅雖唐虞不能以化天下今膠東相成勞求不息民流自占八萬餘口師古曰隱度名數而來附業也治有異等之致其賜成爵関内侯秩中二千石又曰黄霸爲頴川太守是時鳯凰神雀數集郡國頴川尢多天子以霸治行終長者下詔稱揚曰頴川太守霸宣布詔令百姓郷化孝子弟悌貞婦順孫日以衆多行者讓路道不拾遺飬視鰥寡贍助貧窮獄無重囚而吏民郷于教化可謂賢人君子矣書不云乎股肱良哉其賜覇爵関内侯黄金百斤秩中二千石而頴川孝悌有行義民三考力田皆以差賜爵及帛又曰𥘉霍氏奢侈茂陵徐生曰霍氏必亡夫奢則不遜不遜必侮上侮上者逆道也在人之石衆必害之霍氏秉權日乆衆欲害之而又行以逆道不亡何待乃上䟽言霍氏太盛陛下即愛厚之冝此時抑制無使至亡書三上輙不報間其後霍氏誅滅而告霍氏者皆封侯人爲徐生上書曰臣聞客有過主人者見其竈直突傍有束薪客謂主人更爲曲突逺徙其薪不者且有火患主人嘿然不應俄而家果失火鄰里共救之幸而得息於是殺牛置酒謝其鄰人灼爛者在於上行餘各以功次不録言曲突者人謂主人曰郷使聽客之言不費牛酒終亡失火之患今論功而請賔曲突徙薪亡恩澤燋頭爛額爲上客即主人乃寤而請之今茂陵徐福上書言霍氏且有變冝防絶之郷使福說得行則國亡裂土岀爵之費臣亡逆亂誅㓕之敗徃事旣已而福不蒙其功唯陛下察之貴徙薪曲突之䇿使居焦髪灼爛之右上乃賜福帛千疋後以爲郎後漢書曰光武召桓榮令說尚書甚善之拜爲議郎賜錢十萬使授太子每朝㑹輙令榮於公卿前敷奏經書帝稱善曰得生幾晚特加賞賜後榮入㑹廷中詔賜竒菓授者皆懷之榮獨手捧以拜帝笑之曰此真儒生也以是愈見敬厚常令上宿太子宫後拜太子少傅賜輜車乗馬榮大㑹諸生陳其車馬印綬曰今日所蒙稽古之力也可不勉乎又曰明帝𥘉即位賜天下男子爵人二級漢書音義曰男子者謂户内之長也南輙爲秦制爵二十級又賜爵者罪得贖貧者得賣與人乎三老孝悌力田人三級過公乗得移與子若同子産漢制賜爵自公士也不得上公乗故過者得移授也同産同母兄弟也及流人無名數欲自占者人一級無名數謂文薄也占謂自歸首又曰管陶公主爲子求郎不許而賜錢千萬謂群臣曰郎官上應列宿出宰百里有非其人則人受其殃是以難之又曰永平中顯宗幸宛詔諸李隨安衆宗室㑹見並受賀賜恩寵篤焉又曰郭伋爲并州牧過京師謝恩帝並召皇太子諸王讌語終日賞賜車馬衣服什物又曰肅宗納梁竦女爲貴人生和帝竇皇后養以爲子諸竇遂譛殺貴人而䧟竦等死獄中家屬徙九具和帝立後貴人姉南陽樊調妻嬺於計切上書自訟曰妾同産女弟貴人前充後宫蒙先帝厚恩得見寵幸誕生聖明爲竇憲兄弟所見譛訴使妾父竦冤死老母孤弟逺徙萬里今值陛下神聖之運親統萬機群物得所憲兄弟姦惡旣伏辜誅妾乃敢昧死自陳所丐帝覽章感悟乃下掖庭令驗問之嬺辭證明審遂得引見具陳其狀乃留嬺止宫中連月乃出賞賜衣𬒳錢帛第宅旬月之間累貲千萬嬺素有操行帝益愛之乃號梁夫人楚漢春秋曰髙帝𥘉封侯者皆賜丹書鐵劵曰使黄河如帶太山如礪漢有宗廟尓無絶丗漢魏春秋曰天子以曹公典任守外臨時之賞或冝速乎乃命公得承制拜諸侯守相曰夫軍之大事在兹賞罰勸善懲惡冝不旋時故司馬法曰賞不踰月者欲民速覩爲善之利也昔在中興鄧禹関承制拜君祭酒李文爲河東太守來歙又承制拜髙峻爲通路將軍察其夲傳皆非先請明臨時刻印也斯則丗祖神明權逹盖所用速示威懷而克成洪勲者也且春秋之義大夫岀疆專命之事荀可以利社稷安國家而巳况君秉任二伯師尹九有實征夷夏軍行蕃甸之外得失在於斯須之間停賞後許以滯時務固非朕之所圗也自今巳後臨事所甄當加寵號者其便刻印章假校咸使忠義得共奬勵勿有疑焉魏志曰太祖攻城邑靡麗之物則悉賜有勲功勞其賞不恡千金無功望施分毫不與又曰袁煥卒太祖賜榖二千斛一教以大倉榖千斛賜郎中令家一教以垣下榖千斛與耀卿家煥字耀卿外不解其意教曰以大倉榖者官法也以垣下榖者親舊也又曰公令曰昔趙奢竇嬰之爲將也受賜千金一朝散之故能濟成大功永丗流聲吾讀其文未甞不慕其爲人也與諸將士大夫共從戎事幸頼賢人不愛其謀群士不遺其力是以夷險平亂而吾得竊大賞户邑三萬追思趙竇散金之義今分所受租與諸侯掾屬及故戍於陳蔡者庻以酬荅衆勞不擅大惠也又曰鎮東將軍母丘儉上言昔諸葛恪圍合肥新城中遣士劉整岀圍傳消息爲賊所得考問所傳整曰欲殺我者便速殺之終無它辭又遣士鄭像岀城傳消息恪遣騎尋迹索得縛將繞城勑像大呼言大軍已還洛不如早降像不從其言更大呼城中曰大軍近在圍外壯士努力賊以刀築其口使不得語整像爲兵能守義執節子弟冝有差異詔曰夫顯爵所以褒元功重賞所以寵列士整像占募通使越六軍蹈重圍冒突白刃輕身守信不幸見獲抗節弥厲楊六軍之大勢安城守之懼心臨難不顧畢志傳命今追賜整像爵関中侯各除士名使子襲爵如部曲將死事科又曰夏侯惇從征孫權還使都督軍留居巢賜伎樂名倡令曰魏絳以和戎之功猶受金石之樂况將軍乎又曰太祖平柳城班所獲器物特以素屏風素机賜毛玠曰君有古人之風故賜君古人之服玠居顯位撫育孤兄子甚篤賞賜以施貧族家無所餘又曰文帝在東宫賜鍾繇五熟金爲之銘曰於赫有魏作漢藩屏厥相惟鍾寔幹心膂靖恭夙夜匪皇般耳百寮師師楷兹矩度又曰薛䕫黄𥘉中爲秘書丞帝與之推論書傳未甞不終日帝視其衣薄解𫀆賜之晉春秋曰清河崔祖思死家無餘財有書八千卷上聞嗴歎良乆之以葛屯榖五百斛賜其家曰葛屯亦吾之垣下令後丗知其見異晉書曰王沈爲豫州下教曰能陳長史可否說百姓所患者有賞言刺史得失倍賞主簿禇君曰上好下應今示以賞恐拘介之士憚賞不言貧昧之人慕利妄舉沈從之宋書曰謝方明爲桓玄著作佐郎後從兄景仁舉爲宋武中軍主簿方明知無不爲帝謂曰愧未有瓜衍之賞且當與卿共豫章國禄屢加賞死蕭子顯齊書太祖竒張融賜衣曰見卿衣服麤交尓籃縷亦虧朝望令送一通衣意謂雖故乃勝新是吾之所着巳令裁减稱卿之體又曰孔靈産爲光禄大夫覽止足之分不肯仕太祖以白毛扇素机遺之曰卿有古人之風故賜以古人之服當代榮之北齊書曰唐邕字道和太原人邕少明敏有治丗之才斛律金啓太后云唐邕強幹一人當千顯祖常解其所着青䑕皮裘賜邕云朕意與卿共幣家語曰孔子曰自季孫之賜我千鍾也而交友益親得季孫千鍾之賜以施於衆故交友日益親也自南宫敬叔之乗我車也而道加行孔子欲見老聃西觀周室敬叔言於魯君給孔子車馬問禮於老子孔子歴郊廟自周而還弟子四方來集也故道雖貴必有時而後動德雖髙必有勢而後行微夫二子之賜則丘之道殆於廢矣太公金匱曰賞一人而千人喜者賞之賞二人而萬人喜者賞之賞三人而三軍勸者賞之管子曰明賞不費明刑不暴賞罰明德之至也司馬法曰殷戮於市周賞於朝勸君子懼小人也鶡冠子曰進賢者受上賞則下不蔽善爲政賞人不多而民喜罰人不多而民畏言賞罰中尹文子曰禄薄者不可以經乱賞輕者不可以入難此處上者所冝慎者也慎子曰孔子云有虞氏不賞不罰夏后氏賞而不罰殷人罰而不賞周人賞且罰罰禁也賞使也文子曰善賞者費少而勸多故聖人賞一人而天下趍之是以至賞不費也韓子曰司城子罕謂宋君曰慶賞賜與者民之所好也君自行之誅罰教戮者民之所惡也臣請當之於是戮細而誅大君子與子罕議之居朞年知死生之命制於子罕故一國歸焉又曰襄子圍於晉陽中岀圍賞有功者四人髙赫爲賞首張孟談曰晉陽之事赫無大功今爲賞首何也襄子曰晉陽之事國危社禝殆矣群臣無不有驕侮之意者唯赫不失君臣之禮是以先之仲尼聞之曰善賞哉襄子賞一人而天下爲人臣者莫能失禮也又曰韓昭侯使人藏蔽衿侍者曰君亦不仁矣蔽衿不以賜左右而藏之昭侯曰非子之所知也吾聞明君之愛一嚬有爲嚬一笑有爲笑今夫衿豈特嚬笑哉衿之與嚬笑相去逺矣吾必待之有功故藏之末有與也言不謬賞尹子曰范獻子遊於河頋問欒氏之子舟人捨檝對曰君不修政舟中之人皆欒氏之子君能反是欒氏之子其如君何獻子稱善乃賜舟人田百畒以田易言也淮南子曰忠臣之}
