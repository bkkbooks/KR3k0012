  - {type: variant, offset: 1705, length: 0, content: '', krp: 子其受之魏絳於是始有金石之樂禮也周禮太宰以八柄馭群臣三曰予以馭其幸注云幸謂言行偶合於善則有以賜予以勸後也又曰以九式均節財用八曰匪頒之式注曰式謂財用之節度也匪分也頒賜也謂分賜群臣又曰太府以敝餘之賦以待賜予禮記曰天子賜諸侯樂則以祝將之伯子男樂則以鼗將之將謂執以致命諸侯賜弓矢然後專征賜鈇鉞然後專殺賜珪瓉然後爲鬯未賜珪瓉則資鬯於天子又曰君賜車馬乗以拜賜衣服服以拜君未有命弗即乗服凡賜君子與小人同此賞賜之義也又曰若賜之食而君客人則命之祭然後祭鄭玄曰雖見賔客猶不敢備禮也待食則不祭也君若賜之爵則越席再拜稽首受登席祭之飲卒爵而俟君卒爵然後受虚爵不敢先君盡爵詩曰陳錫哉周注云言文王能布陳大利以錫書曰德懋懋官功懋懋賞又曰用命賞于祖弗用命戮于社又曰罰弗及嗣賞延于丗又曰功多有厚賞弗迪有顯戮史記曰紂囚西伯羑里西伯之臣閎夭之徒求美女竒物以獻紂紂乃赦西伯而賜弓矢斧鉞}
  - {type: variant, offset: 1706, length: 0, content: '', SBCK: 得征伐又曰武王滅紂乃罷兵西歸封諸侯班賜宗彛作分殷之器物鄭玄曰宗彛宗廟彛樽也作分器著王之命及物也巳於是封功臣謀士而師尚父爲首封封尚父於營丘曰齊封弟周公旦於曲阜曰魯封召公奭於燕封弟叔鮮於管封叔度於蔡餘各以次受封又曰禹平水土巳成帝錫玄珪禹受曰非予能成亦大費爲輔帝舜曰咨爾費賛禹功其錫爾皂游音流爾後嗣將大出遂妻之姚姓之曰玉女皇甫謐曰賜之玄玉妻姚姓之女史記曰晉人請公賞從巳者臣壺叔曰君三行賞賞不及臣敢請罪文公報曰夫導我以仁義防我以德惠此受上賞輔我以行事卒我以成立此受次賞矢石之難汗馬之勞此復次賞􅀂以力事我而輔吾缺者此復受次賞三賞之後故及子晉人聞之皆􅀃音悅又曰晉楚戰于城濮晉侯渡河北歸國行賞}
