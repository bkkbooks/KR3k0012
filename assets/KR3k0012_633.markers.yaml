  - {type: variant, offset: 1705, length: 0, content: '', WYG: 子其受之魏絳於是始有金石之樂禮也周禮太宰以八柄馭羣臣三曰予以馭其幸注云幸謂言行偶合於善則有以賜與以勸後也又曰以九式均節財用八曰匪頒之式注曰式謂財用之節度也匪分也頒賜也謂分賜羣臣又曰太府以幣餘之賦以待賜予禮記曰天子賜諸侯樂則以柷將之賜伯子男樂則以鼗將之將謂執以致命諸侯賜弓矢然後專征賜鈇鉞然後殺賜珪瓚然後為鬯未賜珪瓚則資鬯於天子又曰君賜車馬乗以拜賜衣服服以拜賜君未有命弗敢即乗服也凡賜君子與小人不同日此賞賜之義也又曰若賜之食而君客則命之祭然後祭鄭𤣥曰雖見賔客猶不敢答禮也侍食則不祭也君若賜之爵則越席再拜稽首受登席祭之飲卒爵而候君然後受虛爵不敢先君盡爵詩曰陳錫哉周侯注云言文王能布陳大利以錫天下書曰徳懋懋官功懋懋賞又曰用命賞于祖不用命戮于社又曰罰弗及嗣賞延于世又曰功多有厚賞弗迪有顯戮史記曰紂囚西伯羑里西伯之臣閎夭之徒求美女奇物以獻紂紂乃赦西伯而賜弓矢斧鉞}
