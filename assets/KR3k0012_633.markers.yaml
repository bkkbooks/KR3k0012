  - {type: variant, offset: 1705, length: 0, content: '', SBCK: 子其受之魏絳於是始有金石之樂禮也周禮太宰以八柄馭群臣三曰予以馭其幸注云幸謂言行偶合於善則有以賜予以勸後也又曰以九式均節財用八曰匪頒之式注曰式謂財用之節度也匪分也頒賜也謂分賜群臣又曰太府以敝餘之賦以待賜予禮記曰天子賜諸侯樂則以祝將之伯子男樂則以鼗將之將謂執以致命諸侯賜弓矢然後專征賜鈇􅃏然後專殺賜珪瓉然後爲鬯未賜珪瓉則資鬯於天子又曰君賜車馬乗以拜賜衣服服以拜君未有命弗即乗服凡賜君子與小人同此賞賜之義也又曰􅀂賜之食而君客人則命之􅀕然後􅀕鄭玄曰雖見賔客猶不敢備禮也待食則不􅀕也君􅀂賜之爵則越席􅄪拜稽首受登席􅀕之飲卒爵而俟君卒爵然後受虚爵不敢先君盡爵詩曰陳錫哉周注云言文王能布陳大利以錫書曰德懋懋官功懋懋賞又曰用命賞于祖弗用命戮于社又曰罰弗及嗣賞延于丗又曰功多有厚賞弗迪有顯戮史記曰紂囚西伯羑里西伯之臣閎夭之徒求美女竒物以獻紂紂乃赦西伯而賜弓矢斧􅃏}
