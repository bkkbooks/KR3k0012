  - {type: variant, offset: 3455, length: 758, content: 相見轉為治中四相見轉別駕前至十月舉為秀才文士傳曰張華薦成公綏曰竊見處士東郡成公綏年二十五字子安體珪璋之質資不器之量知深慮明足以妙見研恩篤好則仲舒之精引之世貞幹足以敦風篤俗淵才達學足以弘導世教固逸倫之殊俊搢抻之檢式也荀爽與郭叔都書曰陳季方才德秀出超世逸群金相玉質文章席美終軍賈誼誠無以加宜遂貢之宰朝盛其龍光鹽車之驥自非伯樂無以顯名採光剖璞以獨見寶實為足下利之孔融薦禰衡表曰伏見處士平原禰衡淑質貞亮英才卓犖初涉蓺文登堂覩奧目所一見輒傳於口耳所一聞不忘於心性與道合思若有神若得龍躍天衢奮翼雲漢足以明近署之多士增四門之穆穆應璩薦賁伯偉文曰璩聞景雲浮則應龍翔治道明則儁乂臻是故良哉之歌興於唐堯之世多士之頌形於周文之朝竊見太子舍人賁琳字伯偉稟性純和體素清愨宜授以千里之塗任以列曹之職陸機薦賀循郭訥表曰伏見武康令賀循德量邃茂才鑒清遠丞陽令郭訥風度簡曠器識朗拔准準其才望資品循可尚書郎訥可太子洗馬又陸機薦戴若思文曰蓋聞繁若登御然後高墉之功顯孤竹在肆然後降神之曲成伏見處士廣陵戴淵年三十字若思心智足以研幽才鑒足以辨物固窮樂志無風塵之慕砥節立行有渫井之潔誠東南之貴寶聖朝之奇璞也楊方為虞領軍薦張道順文曰蓋聞驪龍之珠必沉紫泉之裏垂天之翼必翔青冥之表竊見處士吳國張道順天挺珪璋明達清秀下筆掩彫龍之文登言吐掞天之藻慕西道之楊生希北巷之顏回若得清水淬其鋒鉞砥礪其鍔必騰躍天路出覿聖世琴操曰史魚者衛靈公之相時蘧伯玉執清廉之節脩仁義之方史魚乃薦伯玉於靈公公曰諾其後未用史魚復入曰臣聞抱玉朝君不如貢賢夫國危者則思仁思安者則急賢公何嫌疑靈公謂史魚以庭褒虛飾良久乃應之史魚出謂其子曰我薦伯玉於公公以我言為不信將自殺以明之我死後勿厚歛也用伯玉乃歛語畢進藥自殺靈公聞之曰痛哉寡人謂史魚徒謙退欲進士者也不意乃至於身死臨喪拜伯玉代史魚公泣曰寡人負史魚悔焉無及者也, WYG: ''}
