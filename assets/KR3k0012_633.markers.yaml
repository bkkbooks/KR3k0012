  - {type: punctuation, offset: 42, content: 『, id: KR3k0012_CHANT_633-bkkpn10}
  - {type: variant, offset: 42, length: 252, content: 餘人不足惜杜如晦聰明敏達王佐之才若大王守藩無所用之必欲經營四方非此人莫可太宗乃請為秦府掾封延平縣男補文館學士貞觀初為右僕射又曰李大亮隋末為賊所獲同輩百餘人皆死賊帥張弼見而異之獨釋與語遂定交於幕下大亮既貴每懷張弼之恩貞觀末弼為將作丞自匿不言大亮遇諸途識之持弼手而泣悉推家產以遺弼弼辭不受大亮言於太宗曰臣有今日榮貴乃張弼之恩力也乞廻臣之官爵以授之太宗即日以弼為中郎將俄遷代州都督又曰岑文本初事蕭銑江陵平就授祕書郎直中書省李靖驟稱其才擢拜中書舍人漸蒙恩遇時顏師古諳練故事長於文誥時無迨者冀復用之太宗曰我自舉一人, SBCK: 蔡}
