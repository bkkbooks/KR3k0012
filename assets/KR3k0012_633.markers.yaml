  - {type: variant, offset: 2076, length: 283, content: 人將誰屬國管仲對曰昔者臣盡力竭智猶未足以知之也今病在於朝夕之中臣奚能言桓公曰此大事願仲文教之寡人也管仲敬諾曰誰欲相欲用誰相公曰鮑叔牙可乎管仲對曰不可夷吾善鮑叔牙牙之為人也清廉潔直視不己若者不比於人一聞人之過終身不忘勿已則隰朋其可乎隰朋之為人也上忘而下求醜不若黃帝而隰下己若者自醜其德不如黃帝又恕不若己也其於國也有不聞不求聞而善求在利國而已矣其於物也有不知也物事也非事職不求知知其於人也有不見也務在齊民不求見也勿已則隰朋可矣夫相大官也處大官者不欲小察不欲小智故曰大匠不斲但規模而已不復自斲削大庖不豆調和五味不復自列大虜不聞又曰魏公叔座疾惠王往問之曰公叔之病甚矣將奈社稷, SBCK: 柰}
