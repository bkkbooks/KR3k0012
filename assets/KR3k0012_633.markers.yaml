  - {type: variant, offset: 1412, length: 252, content: 昔臣嘗行臨淄市見屠商焉身長八尺鬚髯如戟面正紅白市之男女未有敬者無德之故也王曰是所謂祖龍始者也誠如先生之言於是乃以管穆為臨淄宰韓子曰趙武薦四十六人於其君及武之死也四十六人皆就賓位無私德如此武荐白屋之士六十余家戰國策曰淳于髡見七人於宣王王曰子來也寡人聞干里一士是比肩相望百世一聖若隨踵而至者也今子一日而見七士不亦眾乎髡曰不然夫鳥同翼者聚居獸同足者俱行今求茈葫桔梗於沮澤則累世不得一焉若求之梁甫之陰則連目夫物有等今髡賢者之儔王求士於髡譬如挹水於河而求火於燧也言易得也國語曰文公使原季為卿原季趙襄文公二年為原大夫, SBCK: 魏絳}
