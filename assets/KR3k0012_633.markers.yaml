  - {type: variant, offset: 3889, length: 324, content: 字若思心智足以研幽才鑒足以辨物固窮樂志無風塵之慕砥節立行有渫井之潔誠東南之貴寶聖朝之奇璞也楊方為虞領軍薦張道順文曰蓋聞驪龍之珠必沉紫泉之裏垂天之翼必翔青冥之表竊見處士吳國張道順天挺珪璋明達清秀下筆掩彫龍之文登言吐掞天之藻慕西道之楊生希北巷之顏回若得清水淬其鋒鉞砥礪其鍔必騰躍天路出覿聖世琴操曰史魚者衛靈公之相時蘧伯玉執清廉之節脩仁義之方史魚乃薦伯玉於靈公公曰諾其後未用史魚復入曰臣聞抱玉朝君不如貢賢夫國危者則思仁思安者則急賢公何嫌疑靈公謂史魚以庭褒虛飾良久乃應之史魚出謂其子曰我薦伯玉於公公以我言為不信將自殺以明之我死後勿厚歛也用伯玉乃歛語畢進藥自殺靈公聞之曰痛哉寡人謂史魚徒謙退欲進士者也不意乃至於身死臨喪拜伯玉代史魚公泣曰寡人負史魚悔焉無及者也, SBCK: 三}
