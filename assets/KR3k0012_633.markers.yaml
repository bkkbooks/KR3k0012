  - {type: variant, offset: 3856, length: 3, content: 繁若登, SBCK: 之於子請賞子虎曰言之易行之難臣言之者也公曰子母音無辭虎乃受凢行賞其愽也則多助今虎非親言者也賞猶及此䟽逺者所以盡能竭智者也晉文亡乆矣歸而因大乱之餘猶能以霸其用此歟風俗通曰俗􅀃有功得賜金者皆黄金案孫子法曰費千金百萬錢陳平間楚千金賜二踈金五十斤此真黄金也亦爲一萬錢裴氏新書曰舟㳙有一言之善晉侯賜萬頃田辭而不受晉侯曰以此田易彼言也於子猶有所亡寡人猶有所得周生列子曰行賞不洽於仁是春半半生也行罰不威是秋半半死也半生之春不洽於仁半死之秋不專於義太平}
