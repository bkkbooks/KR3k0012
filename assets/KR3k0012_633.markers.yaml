  - {type: variant, offset: 353, length: 296, content: 海曲之明珠東南之遺寶特薦之遷并州法曹又曰張柬之進士擢第為清源丞年且七十餘永昌初自免復應判策試畢有傳柬之考入下科柬之歎曰余之命也乃委歸襄陽時中書舍人劉允濟重考策自下昇甲科為天下第一擢拜監察御史累遷荊州長史長安中則天問狄仁傑曰朕要一好人任使有乎仁傑對曰陛下則何任使則天曰朕方待以將相仁傑曰料陛下若求文章資歷則今之宰相李嶠蘇味道亦足為文吏矣豈非文士齷齪思得大才以用之以成天下之務者乎則天悅曰此心也仁傑曰荊州長史張柬之其人雖老真宰相材也且久不遇若用之必盡忠於國家則天召以為洛州司馬他日又求賢仁傑曰臣前言張柬之猶未用也則天曰已遷之矣仁傑曰臣薦之請為相也今為洛州司馬非用之也乃遷秋官侍郎及姚崇將赴靈武則天, SBCK: 楚}
