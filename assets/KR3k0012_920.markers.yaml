  - {type: variant, offset: 2708, length: 243, content: 曰譬猛虎浮水不如鳧鴨騏驎登木不如猿猴太元經曰素嬰之鴨翰音之雞望視之兔白蹄之豕短喙之狗脩頸之馬君子之皃何獨異耶吳地記曰鴨城者吳王築城城以養鴨周數百里笁法真登羅山䟽曰山上有神湖湖中有白鴨嶺南異物志曰廣州浛洭縣金池黃家有養鵝鴨池嘗於鴨糞中見麩金片遂多收掏之日得一兩緣此而致富其子孫皆為使府劇職三世後池即無金黃氏力殫矣鶩說文曰鶩野鳧春秋左傳曰公膳日雙雞饔人竊更之以鶩子尾怒春秋繁露曰張湯問仲舒曰祠宗廟或以鶩當鳧可不對曰鶩非鳧鳧非鶩愚以為不可漢書王莽多事諸鬼用三牲鳥獸三千餘種後不能備乃以雞當鴈鶩, SBCK: ''}
