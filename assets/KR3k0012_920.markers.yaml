  - {type: variant, offset: 598, length: 1, content: 桂, krp: 雅烏小而多聲腹下白又曰烏鵲醜其掌縮飛縮脚復下又曰有燕白脰烏鸀山烏鸀似烏而小赤觜穴乳出西方春秋運斗樞曰飛翔羽翮爲}
  - {type: variant, offset: 600, length: 0, content: '', SBCK: 陽氣仁故烏反哺春秋元命苞曰火流爲烏烏孝鳥陽精天意烏在日中從天以照孝也尚書緯曰火者陽也烏有孝名武王卒大業故烏瑞臻漢書曰成帝時御史府中列栢樹常有野烏數千栖􅀫其上晨去暮來號曰朝夕烏又曰黄覇爲頴川太守遣吏有所伺察吏岀不敢舎郵亭食於道旁烏攫其􅁏民有欲詣府言事適見}
  - {type: variant, offset: 600, length: 0, content: '', WYG: 陽氣仁故烏反哺春秋元命苞曰火流為烏烏孝鳥何知孝烏陽精陽天}
  - {type: variant, offset: 600, length: 0, content: '', krp: 陽氣仁故烏反哺春秋元命苞曰火流爲烏烏孝鳥陽精天意烏在日中從天以照孝也尚書緯曰火者陽也烏有孝名武王卒大業故烏瑞臻漢書曰成帝時御史府中列栢樹常有野烏數千栖宿其上晨去暮來號曰朝夕烏又曰黄覇爲頴川太守遣吏有所伺察吏岀不敢舎郵亭食於道旁烏攫其肉民有欲詣府言事適見}
  - {type: variant, offset: 601, length: 2, content: 役朝, SBCK: 覇與語道此後日吏還見覇迎勞之曰甚苦食於道旁乃爲烏所盗􅁏吏大驚以覇具知其起居所問毫􅁵不敢有所隱後漢書馬援曰當吾在西黒浪泊間詔書每到腹如湯火下潦上霧毒氣上蒸仰視鳥鳶跕跕墮水中謝承後漢書曰廣漢儒叔林爲東郡太守烏巢於㕔事屋梁􅇠産於床下司馬彪續漢書曰桓帝時童謡曰城上烏尾畢逋一年生九鶵公爲吏子爲徒一徒死百乗車吴暦曰吴王爲神王表立廟蒼龍門時有烏巢朱雀門上晉書載記曰慕容沖之亂有群烏數萬翔鳴于長安城上其聲甚悲占者以爲􅃲羽不中年有甲兵入城之象梁書曰髙國有烏旦旦集王殿前爲行列不畏人日出後然後散去陳書曰司馬申短毛喜於後主使其廢錮又與施文慶李脫兒比周譛殺傅縡奪任忠部曲以配蔡徵申甞晝寢於尚書下省有烏啄其口流血及地時論以爲譛賢之効也北史曰西魏裴俠年七歳不能言後於洛城西見群烏蔽天從西來舉手指之而言遂志識聦慧甚異常童又曰齊蕭放居䘮以孝聞居廬門室前有二慈烏來集各據一樹爲巢自午以前馴}
  - {type: page-break, offset: 601, content: '', id: KR3k0012_SBCK_920-2a}
