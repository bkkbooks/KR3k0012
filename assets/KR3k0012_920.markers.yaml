  - {type: variant, offset: 3567, length: 14, content: 一發俱中因拜太祖曰使勝得奉神, SBCK: 善弗宣大惠可大赦天下文}
  - {type: variant, offset: 3567, length: 0, content: '', WYG: 使論衡曰儒者言日中有三足烏日火也烏入火中燋爛安得立然烏日氣也張衡靈憲曰日陽精之宗積而成烏烏有三趾陽之數類竒括地圗曰崑崙之弱水中非乘龍不得至有三足神烏為西王母取食孫氏瑞應圗曰三足烏王者慈被萬姓則來晉諸公贊曰世祖時西域獻三足烏遂累有赤烏來集此昌陵縣按昌字重日烏者日中之烏有託體陽精應期曜質以顯至德者也尚書中侯曰周太子發渡孟津有火自天止于王屋流為赤烏又曰有火自上覆於王屋流為烏其色赤其聲魄瑞應圗曰赤烏武王時衘糓米至屋上兵不血刃而殷服}
  - {type: page-break, offset: 3567, content: '', id: KR3k0012_WYG_920-11a, image: WYG0901/WYG0901-0193a.png}
