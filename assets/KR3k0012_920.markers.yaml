  - {type: variant, offset: 603, length: 1, content: 庭, WYG: 夕烏又曰黄霸為潁川太守遣吏有所伺察吏出不敢舎郵亭食於道旁烏攫其肉民有欲詣府言事適見之霸與語道此後日吏還見覇迎勞之曰甚苦食於道旁乃為烏攫其肉吏大驚以霸具知其起居所問毫釐不敢有所隠後漢書馬援曰當居在浪泊西里間敵未滅時腹如湯火下潦上霧毒氣重蒸仰視烏鳶跕跕墮水中謝承後漢書曰廣漢儒字叔林為東郡太守烏巢於㕔事屋梁兎産於床下司馬彪續漢書曰桓帝時童謡曰城上烏尾畢逋一年生九雛公為吏子為徒吳厯曰吳王為神主來立廟蒼龍門時有烏巢朱雀門上晉書載記曰慕容冲之亂有羣烏數萬翔鳴於長安城上其聲甚悲占者以為鬭羽不終年有甲兵入城之象梁書曰髙國有烏旦旦集王殿前為行列不畏人日出然後散去陳書曰司馬申短毛喜於後主使其廢錮又與施文慶李脫児比}
