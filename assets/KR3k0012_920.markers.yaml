  - {type: variant, offset: 3609, length: 0, content: '', SBCK: 大業四年蜀郡􅀗三足烏張掖獲玄狐各一唐書曰天授元年有進三足烏者天后以爲周室嘉應睿宗時爲皇嗣言曰烏前足僞也天后不恱湏􅁷一足墮地果如其言又曰寳應元年秋七月巳夘京兆府萬年縣􅀗三足烏獻之淮南子曰日中有踆烏月有蟾蜍踆獨蹲止不行謂三足也抱朴子曰青冷傳云熒火精生朱鳥古今注所謂赤烏者朱鳥也其所居髙逺日中三足烏之精三足烏何以三足陽數竒也以是有虞至孝三足集其庭曽叄鋤􅋎三足萃其冠司馬相如大人賦曰吾乃覩西王母皜然白母首戴勝而穴處有三足烏爲之使論衡曰儒者言日中有三足烏日火也烏入火中燋㦨安得立然烏日氣也張衡靈憲曰日陽精之宗積而成烏烏有三趾陽之􅀋數竒括地圖曰崑崙之弱水中非乗龍不得至有三足神烏爲西王母取食孫氏瑞應圖曰三足烏生王者慈孝天地則至晉諸公賛曰丗祖時西域獻三足烏遂累有赤烏來集此昌陵後縣案昌字重曰烏者日中之鳥有託體陽精應期曜質以顯至德者也尚書中􅀱曰周}
