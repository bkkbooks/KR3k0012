  - {type: variant, offset: 3563, length: 1, content: 歡, WYG: 周室嘉應睿宗時為皇嗣言曰烏前足偽也天后不恱須臾一足墮地果如其言又曰寳應元年秋七月己夘京兆府萬年縣獲三足烏獻之淮南子曰日中有踆烏月有蟾蜍抱朴子曰青泠傳云熒惑火精生朱烏古今注所謂赤烏者朱鳥也其所居高逺日中三足烏之精降而生三足烏何以三足陽數奇也是以有虞至孝三足集其庭曾參鋤𤓰三足萃其冠司馬相如大人賦曰吾乃覩西王母皜然白首母戴}
