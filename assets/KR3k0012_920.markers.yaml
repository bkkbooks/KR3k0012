  - {type: variant, offset: 30, length: 565, content: 鵱鷜鵝郭璞曰今之野鵝舒鴈鵝郭璞曰出如舒鴈今江東呼𪀉音加廣雅曰駕鵝野鵝也吳志曰景帝有疾使巫視鬼欲試之乃殺一鵝埋之於苑中架屋施床几以婦人服物著上乃使巫視之若能說此家中婦形狀者加賞此巫視日竟晝夕無所道帝催問之急乃曰實不見有鬼但見一頭白鵝在墓上所以不即白疑是神鬼變化而作定無復改易不知何故景帝乃厚賜之晉書曰永嘉中洛陽東北步廣里地陷有二鵝出焉一白一蒼白者不能飛蒼者飛去董養字仲道歎曰昔有周時盟會狄泉即此地也蒼胡白國象其可盡言乎又曰劉毅家在京口酷貧嘗與鄉曲士大夫往東堂共射時庾悅為司徒右長史要府州僚佐出東堂毅已先至遣與悅相聞曰身並貧躓營一遊甚難君如意人無處不可為適豈能以此堂見讓曰悅素豪徑前不荅時眾人並避唯毅留射如故悅廚饌甚盛不以及毅毅既不去悅甚不歡毅又相聞曰身今年未得子鵝豈能以殘炙見惠悅又不荅及毅貴奏解悅都督將軍官深相挫辱悅不得志疽發背少日而卒宋書曰胡蕃為高祖從事征廣固累月未拔忽有鳥如鵝蒼黑色飛入高祖帳裏眾皆駭愕蕃起賀曰蒼黑色者戎虜戎虜歸我大吉之祥也明旦攻城陷之又曰孔靜居山陰宋武微時往候之靜時寢夢人語曰天子在門覺寤即遣人出看而帝適至靜虛己接待乃留帝宿夜設粥無鮭新伏鵝卵令煮以為食賊平以靜為奮威將軍又曰劉暄初為江夏王寶玄郢州行事執事過刻王妃索煮肫帳下諮暄暄曰旦已煮鵝不煩復此寶玄恚曰舅殊無渭陽之情齊書曰下彬禽獸決錄目云鵝性頑而慠蓋比潘敞, SBCK: 䮸斯鵯鶋楚烏}
