  - {type: variant, offset: 2318, length: 4, content: 頭及敗同, WYG: 家令吾卜之得明夷之小過其病每欲動時輙有烏來鳴即便發作案卦中當得一獨蹄猪畜之江東名之為獨足猪後婦人始欲眠而見一丈夫衣服盡黑在户前立遥呼婦人語其來前不肯言有所避遂泣而去病始小間吾與殷化共論此事曰烏日之禽猪月畜水火相忌自然之數故取畜隂之伏物用消太陽此飛精日中三脚故以獨足者當之南越記曰烏賊魚常自浮水上烏見以為死便啄之乃卷取烏故謂烏賊魚今匹烏化為之魚地理志孤山正在江中有烏飛入船人以飲與之烏且飛且啖譙子法訓曰夫孝行之本替本而求未有得之者也如或得之君子不貴矣烏者獨有反哺之心况人而无孝心者乎孝子傳曰李陶交趾人母終陶居于墓側躬自治墓不受鄰人助羣烏銜塊助成墳劉義慶世說曰徐干木年少時嘗夢烏從天而下銜長斗􅓫樹其庭前烏復上天銜繖下凡樹三繖竟烏大鳴作}
