  - {type: variant, offset: 2354, length: 353, content: 初生草似胡麻者生取其實合之可以移形易皃西京雜記曰高祖既作新豐并移舊杜放犬羊雞鴨於通途亦競識其家傅子曰鴨足何以眅雞足何以盺眅吾不知也何況問天地乎金樓子曰海鴨大如常鴨班白文亦謂之交鳥洞冥記曰武帝昇望月臺南端有三青鴨飛俄而下帝悅之至夕鴨宿於臺端化為三小童皆著青綺文襦各執鯨文大錢五枚置帝几前風俗通曰雞伏鴨卵鶵成入水雞母隨岸呼之鶵出而隨母鴨雞異類能相隨也博物志曰中諸藥毒已死者取生鴨斷頭以鴨項內病者口中得血三兩滴入喉中即蘇也語林曰傅信貧母羸病恒驚悸信乃取雞鴨滅毛放承塵上行落地毋轉恐怖石崇金谷詩序曰吾有廬在河南金谷中去城十里有田十頃羊二百口雞豬鵝鴨之屬莫不畢備尋陽記曰周訪與商人共入宮亭廟宿明起如廁見一白頭翁訪逐之化為雄鴨還舡欲煮之商人爭看遂飛去廣志曰野鴨雄者赤頭有距蔡氏化清經曰水戰之鴨何必白纓盈俎之雞何必長鳴新, WYG: ''}
