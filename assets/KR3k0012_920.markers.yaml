  - {type: variant, offset: 598, length: 1, content: 桂, SBCK: 雅烏小而多聲腹下白又曰烏􅍎醜其掌縮飛縮脚復下又曰有燕白脰烏鸀山烏鸀似烏而小赤觜穴乳出西方春秋運斗樞曰飛翔羽翮爲}
