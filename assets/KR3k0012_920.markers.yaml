  - {type: variant, offset: 3049, length: 78, content: 群鶩成列飛翔而過此偶爾何異玄鶴二八也廣志曰鶩生百卵一日再生有露華鶩以秋冬生卵並出蜀晨鳧肥而耐寒宜為矐越地傳曰越人為競渡有輕薄少年各尚其勇為鶩沒之戲有至水底然, SBCK: 角長寸餘}
  - {type: variant, offset: 3049, length: 426, content: 群鶩成列飛翔而過此偶爾何異玄鶴二八也廣志曰鶩生百卵一日再生有露華鶩以秋冬生卵並出蜀晨鳧肥而耐寒宜為矐越地傳曰越人為競渡有輕薄少年各尚其勇為鶩沒之戲有至水底然後魚躍而出鳧毛詩曰將翱將翔弋鳧與鴈又曰鳧鷖在涇公尸來燕來寧爾酒既清爾殽既馨公尸燕飲福祿來成鳧鷖在沙公尸來燕來宜爾酒既多爾殽既嘉公尸燕飲福祿來為韓詩外傳曰趙倉唐擊為魏文侯太子擊使於外問太子曰侯何好曰嗜晨鳧好北犬於是遣唐緤北犬奉晨鳧獻之侯曰擊愛我知我所嗜好莊子曰鳧脛雖短續之則憂風俗通曰王喬者河東人為葉令喬有神術每月朔望常自縣詣臺朝帝怪其來數而不見車騎密令太史伺望之言其臨至輒有雙鳧從東南飛來於是候鳧至舉羅張之但得一雙履乃詔尚方診視則四年中所賜尚書官屬履楚辭曰寧與騏驥抗軛將與雞鶩爭食乎寧卭卭若千里之駒汎汎若水中之鳧焦贛易林曰鳧舞鼓翼嘉樂堯德李陵贈蘇武詩曰二鳧俱北飛一鳧獨南翔我當留斯館子當歸故鄉蘇武與李陵書曰乘雲附景不足以譬速晨鳧失群不足以喻疾豈可因歸鴈以運糧託景風以餉軍哉晉書張華傳曰人有得鳧鳥毛, WYG: 角}
  - {type: variant, offset: 3049, length: 78, content: 群鶩成列飛翔而過此偶爾何異玄鶴二八也廣志曰鶩生百卵一日再生有露華鶩以秋冬生卵並出蜀晨鳧肥而耐寒宜為矐越地傳曰越人為競渡有輕薄少年各尚其勇為鶩沒之戲有至水底然, krp: 角長寸餘}
