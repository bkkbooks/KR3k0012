  - {type: variant, offset: 3568, length: 2, content: 發俱, WYG: 本曰王者不貪天下而重民命則至墨子曰赤烏銜珪降周之岐社曰命周文王伐殷河出籙圖地出乘黄天鍚武王黄烏之旗帝王世紀曰豐公家于沛之豐邑}
