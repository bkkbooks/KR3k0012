  - {type: variant, offset: 1731, length: 580, content: 大臣祿東贊奉表曰聖天子定四方日月所照之國並為臣妾而高麗恃遠闕於臣禮天子自領百萬渡遼致討隳城陷陣指日凱旋奴纔聞陛下發駕少選之間已聞歸國鴈飛迅越不及陛下速疾奴忝預子婿喜百常夷夫鵝猶鴈也故作金鵝奉獻其鵝黃金鑄成高七尺中可實酒三斛淮南子曰魯般墨子以木為鵝而飛三日集而不可使為工也唐書曰高祖義兵至河東隋將堯君素城守時圍甚急君素乃為木鵝置表於頸具論事勢浮之黃河下河陽守者得之達於東都越王侗見而歎息鴨爾雅曰舒鳧鶩也郭璞曰鴨也廣雅曰鳧鶩鴨也魏氏春秋曰司馬文王鎮許昌徵還擊姜維至京師帝於平樂觀臨軍與左右小臣謀因文王辭劍之已書詔文王入帝方食粟優人雲午等唱曰青頭雞青頭雞者鴨也帝懼不敢發景王因是謀廢帝江表傳曰魏文帝遣使求鬭鴨群臣奏宜勿與權曰彼在諒闇之中所求若此豈可與言禮哉具以與使者吳志曰建昌侯孫慮於堂前作鬭鴨欄頗施小巧陸遜正色曰君侯宜勤覽經典用此何為慮即毀之南史曰齊人渡江至玄武湖西北莫府山南我軍自覆舟東移頓郊壇北與齊人對是時食盡調市人餽軍皆是麥屑為飯以荷葉裹而分給兵士皆困會文帝遣送米三千石鴨千頭帝即炊米煮鴨誓申一戰將士及防身計糧數臠人人裹飯媲以鴨肉帝命眾軍蓐食攻之齊軍大潰三國典略曰高德正相齊未誅之前家有赤鴨群行於庭犬來逐遂成碎血北史曰元善以高頴有宰相之具常言於上曰楊素粗踈蘇威怯懦元胄元昊正似鴨耳可以付社稷者唯獨高頴上初然之唐書曰齊王祐太宗第五子好養鴨未反前忽有野狸入籠中咬, SBCK: 姉適吴病}
