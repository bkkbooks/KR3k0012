  - {type: variant, offset: 1129, length: 189, content: 待之逸少既至殊喪往意歎息彌日俗記曰京下劉光祿養好鵝劉後軍從京還鎮尋陽以一雙鵝為後軍別純蒼色頸長四尺許頭似龍此一雙鵝可堪五萬自後不復見有此類張鴻傳曰鴻為慕容晃黃門初刑鴻不熟頤下生黃鬚三根長寸餘乃遣出宮看鵝鴨沈玄鵝賦序曰先大夫俞頴川者殊精意於善鵝求得駿鵝類於張猛虎亦多好者于時有綠眼黃喙折翼頳頭然經頴川之好者焦叔明以太康中得大蒼鵝從喙至足四尺有九寸體色豐麗鳴聲驚人三年而為暴犬所害惜, SBCK: 章}
