  - {type: variant, offset: 885, length: 16, content: 梁相褚大通五經為博士倪寬為弟子及, SBCK: 元和中}
  - {type: variant, offset: 885, length: 294, content: 梁相褚大通五經為博士倪寬為弟子及御史大夫缺徵褚大大自以為得御史大夫至雒陽聞寬為大夫褚大笑及至與寬議封禪於上前大不能及退而服曰誠知之漢書百官志曰御史大夫秦官位上卿銀印青綬掌副丞相事漢雜記事曰故事上書為二封其一曰副領尚書者先發之有不善屏去不奏魏相為御史大夫奏去副封以防擁蔽漢舊儀曰御史大夫寺在司馬門內門無塾門署用梓板不起郭邑題曰御史大夫寺北齊楊楞伽鄴都故事云御史臺在宮闕西南其門北開取冬殺之義也唐書曰韋挺太宗嘗謂挺曰卿之任御史大夫獨朕意耳左右大臣無為卿地者卿勉之哉又曰薛謙光拜御史大夫時僧惠範恃太平公主權勢逼奪百姓店肆州縣不能理謙光將加彈奏或請寢之謙光曰憲臺理冤滯何所廻避朝彈暮黜亦可矣遂與殿, WYG: 元和}
