  body:
  - {type: variant, offset: 5, length: 1, content: 五, SBCK: 四御史中丞下持書侍御史御史中丞下晉書曰熊逺字孝文遷御史中丞中宗每歎其公忠謂逺曰卿在朝政正色不茹柔吐剛忠亮至勁可謂王臣又曰􅁃峻字山甫爲御史中丞優而不剋又曰周處字子隱爲御史中丞奏征虜將軍石崇大將軍梁王彤等正䋲直筆權豪震肅又曰劉暾他昆切字長升兼中丞奏免尚書僕射等十餘人朝廷嘉之遂以即眞謝靈運晉書曰漢官尚書爲中臺御史爲憲臺謁者爲外臺是爲三臺自漢罷}
  - {type: variant, offset: 5, length: 1, content: 五, WYG: 四御史中丞下持書侍御史御史中丞下晉書曰熊遠字孝文遷御史中丞中宗毎嘆其公忠謂遠曰卿在朝政正色不茹柔吐剛忠亮至勁可謂王臣又曰庾峻字山甫爲御史中丞優而不尅又曰周處字子隱爲御史中丞奏征虜將軍石崇大將軍梁王肜等正繩直筆權豪震肅又曰劉暾他昆切字長升兼中丞奏免尚書僕射等十餘人朝廷嘉之遂以即真謝靈運晉書曰漢官尚書爲中臺御史爲憲臺謁者爲外臺是爲三臺自漢罷}
