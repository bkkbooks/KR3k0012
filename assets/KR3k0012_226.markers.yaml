  - {type: variant, offset: 13, length: 0, content: '', SBCK: 王恬字元逾音俞爲御史中丞值海西公廢太宗即位未解嚴大司馬􅁊温屯中堂夜吹警角恬奏劾温大不敬請理罪明日温見奏事歎曰此児乃敢彈我眞可畏也又曰熊逺遷御史中丞尚書郎盧綝入直逢尚書刀恊於大司馬門外恊醉使綝避之綝以當直不肯廻恊令人牽綝墮馬至恊車前而後釋逺奏請免恊官詔令白衣領職又曰劉瑀音􅀨遷御史中丞瑀氣尚人爲憲司甚得志彈蕭惠開云非才非望非勲非地彈王僧逺云􅄻籍髙華人品冗末朝士莫不畏其筆端又曰蕭惠開拜御史丗祖與劉季之詔曰今以蕭惠開爲憲司兾當稱職但往一服額巳自殊有所震及在任百寮畏憚之八年入爲侍中詔曰惠開前任憲奉法繩不阿權戚朕甚嘉之可更授御史中丞又曰鄭鮮之遷御史中丞明憲直繩甚得直司之體外甥毅權重當時朝廷莫不歸附鮮之盡心髙祖獨不屈意毅甚恨焉又曰荀伯子爲御史中丞莅職勤恪有匪躬之稱立朝正色内外憚之凡所奏劾莫不深相呵毀或延及祖宗其言切直又頗雜嘲戯故丗人以此非之齊書曰王僧處遷御史中丞甲族由來多不居憲職王氏分枝居烏衣者位官微咸僧處爲此官乃曰此是烏衣諸郎坐處我亦可試爲耳又曰江淹爲御史中丞明帝作相謂淹曰君昔在尚書中非公事不妄行在官寛猛能析􅂨今爲南司足以震肅百寮也曰今日之事可謂當官而行更恐不足仰稱明旨耳於是彈中書令謝朏音斐司徒左長史王綪音茜護軍長史􅁃弘逺並以託疾不預山陵公事又奏収前益州刺史劉悛梁州刺史隂智伯並􅂍貨巨萬輙収付廷尉臨海太守沈昭略永嘉太守􅁃曇隆及諸郡二千石并大縣官長多􅀍劾内外肅然明帝謂曰自宋巳來不復有嚴明中丞君今日可謂近世獨歩梁書曰樂藹遷御史中丞􅀄藹發江陵無故於舡得八車輻如中丞徤歩避道者至是果遷焉又曰王僧孺兼御史中丞僧孺㓜貧其母鬻紗布以自業擕僧孺至市道遇中丞鹵簿駈迫墜溝中及是拜日引騶清道悲感不自勝頃之即眞後魏書曰李彪爲中尉號爲嚴酷以姦欵難得乃爲木手擊其脇腋氣絶而後属者時有汾州叛胡得其􅇯渠皆鞭靣煞之及彪之病也體上瘡濆痛毒備極又曰李彪遷御史中尉彪爲髙祖所寵性又剛直遂多所彈糺逺近畏之豪右屏氣髙祖嘗呼爲李生又從容謂群臣曰吾之有李生猶漢之有汲黯北齊書曰齊王髙澄用崔暹爲御史中尉宋遊道爲尚書左丞謂之曰卿一人處南臺一人處北省當使天下肅然又曰琅邪王儼字仁威武成第三子累爲御史中丞魏氏制中丞岀清道與皇太子分路行王公皆逕住車去牛頓車於地以侍中丞過其或違遟則赤棒棒之自都鄴後此儀寢絶武成欲雄寵儼乃使一依舊制􅀄從北宫出將上宫丞凢京畿歩􅀐領軍之官屬中丞之威儀司徒之鹵簿莫不畢備時儼惣領四職帝與胡后在華林園東門外張幕隔青紗歩幛觀之遣中使驟馬趣仗不得入自言奉勑赤棒應聲碎其鞍馬驚人墜帝大􅀏以爲善更勑令駐車傳語良乆觀者傾京邑陳書曰徐陵除散􅀐常侍御史中丞時安成王爲司空以帝弟之尊􅀔傾朝野直兵鮑僧叡假王威權抑塞辝訟大臣莫敢言者陵聞之乃爲奏彈導從南臺官属引奏案而入世祖見陵服章嚴肅􅀂不可犯爲歛容正色坐陵進讀奏􅃺時安成王殿上侍立仰視世祖流汗失色陵遣殿中御史引王下殿遂劾免侍中中書監自此朝廷肅然隋書曰後魏延昌中王顯有寵於宣武御史中丞請革選衘史此後踵其事每一中尉更置御史自開皇後始自吏部選用依舊入直禁中唐書官品志曰中丞一人掌督司百僚皇太子巳下其在營門行行馬内違法者皆糺彈之雖在馬外而監司不乣亦得奏之專道而行逢尚書丞郎亦得停駐又曰張易之縱恣益撗嘗􅀻引相工李引泰占􅁻㐫言渉不順御史中丞宋璟音冏請窮究其􅃺武太后曰易之等巳上聞璟曰謀反大逆無容首免易之等分外承恩臣知言出禍從然義激於心雖死不恨太后不恱内史姚璹音孰恐忤旨遽宣勑令出璟曰天顔咫尺親奉徳音不煩宰相擅宣王命太后意解及収易之等就獄尋詔原之命就宅謝罪璟拒而不見曰公事當公言之若私見法無私也又曰御史中丞姚庭筠奏稱律令格式懸之象魏奉而行之事無不理比見諸司寮寀不能遵守章程事無大小皆悉聞奏臣聞爲君者任臣爲臣者奉法故云汝爲君目將司明也則知萬機務綜不可徧覽也所以設官分職者委任責成百工惟時以成垂拱之化比者或修一水牎或伐一枯木並皆上聞旒扆取断宸􅂨豈代天理物至公之道也自今巳後􅀂縁軍國大事及牒式無文者任奏取進旨自餘據章程合行者各令准法處分其故生疑滯致有稽失者請令御史隨事糺彈上從之又曰盧弈懷愼之少子也與兄奐音喚齊名天寳十一年爲御史中丞始懷愼及奐並爲此官父子三人爲中丞清節不易時人美之又曰齊映爲御史中丞從徳宗幸梁州每遇險映嘗執轡㑹上馬驚跳奔益甚上懼傷映令捨轡映堅執乆之乃止問其故對曰馬奔踶音弟不過傷臣如捨之或犯清塵雖臣萬死何以塞責上嘉歎無巳又曰御史中丞武元衡奏貞元二年御史中丞竇叅所奏凢諸使兼憲官者除元帥都統節度觀察都團練防禦等使餘並在本官之位其後􅂫弁音卞于䪹音頋以度支郎中兼御史中丞鄧求以易州刺史兼}
