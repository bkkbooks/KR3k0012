  - {type: variant, offset: 3053, length: 1, content: 恭, WYG: 道悦拜治書御史正己當官亡憚强禦奏舉任城王澄等免官高祖詔褒美}
  - {type: variant, offset: 3055, length: 1, content: 字, WYG: 隋書曰栁彧遷治書侍御史於時刺史多任武將類不稱職彧上表曰方今天下太平四海清謐共治百姓任其才能昔漢光武一代明哲超自布衣備知眞僞與二十八將披荆棘定天下及功成之後無所職任伏見詔書以上柱國和干子爲把州刺史其人年垂八十鐘鳴漏盡前任趙州闇於職務政由群小賄賂公行百姓吁嗟謌謡滿}
  - {type: page-break, offset: 3055, content: '', id: KR3k0012_WYG_226-13a, image: WYG0895/WYG0895-0100c.png}
  - {type: variant, offset: 3057, length: 21, content: 穆為御史中丞帝姉壽陽公主行犯清路執赤棒卒呵, SBCK: 奚顧其身身}
  - {type: variant, offset: 3057, length: 2, content: 穆為, WYG: 乃云老禾不早殺餘種穢良田古人乃云耕當問奴織當問婢此言各有所能也干子弓馬武用是其所長治民蒞職非其所解至尊思治無忘興寢如謂優老尚年自可厚賜金帛若令刺舉所損殊大臣死而後已敢不竭誠上善之干子竟免又曰梁毘爲持書侍御史時京師饑上令禁酒劉昉使妾任僦也屋當罏酤酒毘劾奏昉曰臣聞處貴則戒之以奢持滿則守之以約昉既位列群公秩高庶尹縻爵稍乆厚禄已淹正當戒滿歸盈監斯止足何乃規麴蘖之潤競錐刀之末身昵酒徒家爲逋藪若不糺繩何以肅厲有詔不治昉欝欝不得志又曰栁彧爲治書御史右僕射楊素當塗顯貴百寮慴憚無敢忤者嘗以少譴勅送南臺素恃貴坐彧牀彧從外來見素如此於階下端笏謂素曰奉勅治公之罪素遽下彧遽按而坐立素於庭辨詰事狀素由是銜之唐書曰孫伏伽初以三事上諫高祖大悦擢拜治書侍御史兼賜帛三百疋時軍國多事賦歛繁重伏伽屢奏請改革舊政高祖並納之因謂裴寂曰隋末無道上下相蒙主則驕矜臣唯謟佞上不問過下不盡忠使社稷傾危身死疋夫之手朕撥亂反正志在安人平亂任武臣官方委文吏庶得各展器能以匡不逮此毎虛心接待兾聞讜言惟李綱差盡忠欵孫伏伽可謂誠直餘人猶踵弊風俛眉而已豈朕所望哉江總贈孔中丞詩曰我行五嶺表辭卿二十年聞鸎欲動詠披霧即依然疇昔同僚寀今隨年代改借問藏書處唯君故人在故人名官高清簡肅權豪誰知懷九歎徒然泣二毛傅咸}
