  - {type: variant, offset: 903, length: 0, content: '', SBCK: 中丞王播奏監察御史舊例在任二十五月轉准具貟不加今請仍舊殿中侍御史舊例在士二月轉准具貟加至十八月今請减至十五月侍御史舊例在任六月轉准具貟加十三月今請减至十月從之又曰文宗開成􅀄中丞狄兼謩謝官上曰御史中丞朝廷紀綱一臺理則朝廷理朝廷理則天下理無曠厥職兼謩奏曰凢天下有礙法不得中道事臣盡得以彈奏上曰大抵以顧望畏忌爲心者自失職業卿梁公之後將嗣家聲不可不留意又曰文宗謂宰臣曰丁居晦作中丞何如因悉數大臣而品第之歎曰宋申錫堪任此官惜哉又曰牛僧孺可爲}
