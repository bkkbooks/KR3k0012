  - {type: variant, offset: 1064, length: 0, content: '', SBCK: 時京師饑上令禁酒劉昉使妾任任縱也屋當鑪酤酒毗劾奏昉曰臣聞處貴則戒之以奢持滿則守之以約昉旣位列郡公秩髙庶尹縻爵稍乆厚禄巳淹正當戒滿歸盈􅁥斯止足何乃規麴蘖之潤競錐刀之末身昵酒徒家爲逋藪􅀂不糺繩何以肅厲有詔不治昉鬱鬱不得志又曰柳彧爲治書御史右僕射楊素當塗顯貴百寮慴憚無敢忤者嘗以少譴勑送南}
