  - {type: variant, offset: 13, length: 0, content: '', WYG: 譙王恬字元愉音逾爲御史中丞値海西公廢太宗即位未解嚴大司馬桓温屯中堂夜吹警角恬奏劾温大不敬請理罪明日温見奏事歎曰此兒乃敢彈我真可畏也又曰熊遠遷御史中丞尚書郎盧綝入直逢尚書令刁恊大司馬門外恊醉使綝避之綝以當直不肯避恊令人牽綝墮馬至恊乘馬而後釋遠請免恊官詔令白衣領職又曰劉瑀音禹遷御史中丞瑀氣尚人爲憲司甚得志彈蕭惠開云非才非望非勲非地彈王僧遠云廕藉高華人品冗末朝士莫不畏其筆端又曰蕭惠開拜御史中丞世祖與劉季之詔曰今以蕭惠開爲憲司冀當稱職但往一服額已自殊有所震及在任百寮畏憚之八年入爲侍中詔曰惠開前任憲司奉法直繩不阿權戚朕甚嘉之可更授御史中丞又曰鄭鮮之遷御史中丞明憲直繩甚得直司之體外甥毅權重當時朝廷莫不歸附鮮之盡心高祖獨不屈毅甚恨焉又曰荀伯子爲御史中丞莅職勤恪有匪躬之稱立朝正色内外憚之凡所奏彈莫不深相呵毁或延及祖宗其言切直又頗雜嘲戯故世人以此非之齊書曰王僧䖍遷御史中丞甲族由來多不居憲職王氏分枝居烏衣者位宦微减僧䖍爲此官乃曰此乃烏衣諸郎坐處我亦可試爲耳又曰江淹爲御史中丞明帝作相謂淹曰君昔在尚書中非公事不妄行在官寛猛能折衷今爲南司足以震肅百寮也曰今日之事可謂當官而行更恐不足仰稱明旨耳於是彈中書令謝朏音斐司徒左長史王繢音回䕶軍長史庾𢎞遠並以託疾不預山陵公事又奏收前益州刺史劉悛梁州刺史隂智伯並贓貨巨萬輙収付廷尉臨海太守沈昭畧永嘉太守庾曇隆又諸郡二千石并大縣官長多被劾内外肅然明帝謂曰自宋以來不復有嚴明中丞君今日可謂近世獨歩梁書曰樂藹遷御史中丞初藹發江陵無故於舡得八車輻如中丞健歩避道者至是果遷焉又曰王僧孺兼御史中丞僧孺幼貧其母鬻紗布以自業擕僧儒至市道遇中丞鹵薄駈廹墜溝中及是拜日引騶清道悲感不自勝頃之即真後魏書曰李彪爲中尉號爲嚴酷以姦欵難得乃爲木手擊其脇腋氣絶而後屬者時有汾州叛胡得其兇渠皆鞭而煞之彪之病也體上瘡潰痛毒備極又曰李彪遷御史中尉彪爲高祖所寵性又剛直遂多所彈糺遠近畏之豪右屏氣高祖嘗呼爲李生又從容謂群臣曰吾之有李生猶漢之有汲黯北齊書曰齊王高澄用崔暹爲御史中尉宋遊道爲尚書左丞謂之曰卿一人處南臺一人處北省當使天下肅然又曰琅琊王儼字仁威武成第三子累爲御史中丞魏氏制中丞岀清道與皇太子分路行王公皆逕住車去牛頓車於地以待中丞過其或違遲則赤棒棒之自都鄴後此儀寢絶武成欲雄寵儼乃使一依舊制初從北宫岀將上宫丞凡京畿歩騎領軍之官屬中丞之威儀司徒之鹵簿莫不畢備於時儼總領四職帝與胡后在華林園東門外張幕隔青紗歩障觀之遣中使驟馬趍仗不得入自言奉勅赤棒應聲碎其鞍馬驚人墜帝大笑以爲善更勅令駐車傳語良乆觀者傾京邑陳書曰徐陵除散騎常侍御史中丞時安成王爲司空以帝弟之尊勢傾朝野直兵鮑僧叡假王威權抑塞辭訟文臣莫敢言者陵聞之乃爲奏彈道南臺官屬引奏案而入世祖見陵服章嚴肅若不可犯爲歛色正容坐陵進讀奉狀時安成王殿上侍立仰視世祖流汗失色陵遣殿中御史引王殿下遂劾免侍中中書監自此朝廷肅然隋書曰後魏延昌中王顯有寵於宣武御史中丞請革選史此後踵其事毎一殿中更置御史自開皇後始自吏部選用依舊直入禁中唐書官品志曰中丞一人掌督司百僚皇太子已下其在宫宫門行行馬内違法者皆糾彈之雖在馬外而監司不糺亦得糺之專道而行逢尚書丞郎亦得停駐又曰張易之縱恣益横嘗私引相工李引㤗占吉㓙言渉不順御史中丞宋璟音冏請窮究其狀武太后曰易之等已上聞璟曰謀反大逆無容首免易之等分外承恩臣知言岀禍從然義激於心雖死不恨太后不悦内史姚璹音孰恐忤旨遽宣勅令岀璟曰天顔咫尺親奉德音不煩宰相擅宣王命太后意解及収易之等就獄尋詔原之命就宅謝罪璟拒而不見曰公事當公言之若私見法無私也又曰御史丞姚庭筠奏稱律令格式懸之象魏奉而行之事無不理比見諸司寮寀不能遵守章程事無大小皆悉聞奏臣聞爲君者任爲臣者奉法故曰汝爲君目將司明也則知萬機務綜不可徧覽也所以設官分職者委任責成百工惟時以成垂拱之化比者或脩一水牕或伐一枯木並皆上聞旒扆取斷宸衷豈代天理物至公之道也自今已後若縁軍國大事及牒式無文者任奏取進㫖日餘據章程合行者各令准法處分其故生疑滯致有稽失者請令御史隨事糺彈上從之又曰盧奕懷慎之少子也與兄奐音喚齊名天寳十一年爲御史中丞始懷慎及奐並爲此官父子三人爲中丞清節不易時人美之又曰齊映爲御史中丞從德宗幸梁州每遇險映嘗執轡㑹上馬驚跳奔益甚上懼傷映令捨轡映堅執乆之乃止問其故對曰馬奔踶音弟不過傷臣如捨之或犯清塵雖臣萬死何以塞責上嘉歎無己又曰御史中丞武元衡奏貞元二年御史中丞竇叅所奏凡諸使亷憲官者除元帥都統節度觀察都團練防禦等使餘並在本官之位其後蘇弁音卞于碩音石以度支節中兼御史中丞鄧求以易州刺史兼}
