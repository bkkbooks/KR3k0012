  - {type: variant, offset: 3018, length: 3, content: 上特詔, WYG: 又曰孔緯爲}
  - {type: variant, offset: 3025, length: 1, content: 與, WYG: 緯器志方雅嫉惡如讐旣總憲綱中外不繩而自肅又曰盧坦爲御史中丞裴均爲僕射左班踰位請退之均不受坦曰姚南仲爲僕射例如此均曰南仲何人坦曰南仲是守正而不交權幸者尋罷爲右庶子時人歸咎於均三國典略曰梁張綰字孝卿雍州績之弟也梁主䇿其百事綰對闕其六乃號爲百六公常爲御史中丞兄績爲僕射元日朝㑹及百}
  - {type: page-break, offset: 3025, content: '', id: KR3k0012_WYG_226-10a, image: WYG0895/WYG0895-0099a.png}
  - {type: variant, offset: 3027, length: 3, content: 隸校尉, WYG: 就列兄弟並導騶兩陛前世未有時人榮之崔鴻十六國春秋趙録曰叚凱驍勇好讀書爲御史中丞明筆直繩無所阿避傅咸集奏曰司𨽻中丞得糺太子而不得糺}
  - {type: page-break, offset: 3027, content: '', id: KR3k0012_WYG_226-10b, image: WYG0895/WYG0895-0099b.png}
  - {type: variant, offset: 3032, length: 2, content: 令會, WYG: 臣所未譬朝廷無亦易之梅陶日叙曰余居丞曾以法鞭皇太子傅友莫不致諫余笑而應之堂高由陛下太子所以榮者由於吾奉王者法吾敢枉道曲媚後皇太子特見延清賜以請讌之禮如師袁淑謝中丞章曰竊惟此職昭賛實預損益必湏兼威正刺骨窮文使權家勲族不敢藉强而侮物戚門右姓不得稱雄以掩衆昔傅咸臣治僚寀戢懼孫實稱疾卿尹皆怠持書御史漢書曰宣皇帝元鳯中路温舒上書緩刑帝深采覽之季秋後請讞魚列反又音獻時帝幸宣室齋宫而决事命侍御史二人持書遂置持書御史通典曰御史中丞舊持書御史也國諱改焉後厯代皆}
  - {type: page-break, offset: 3032, content: '', id: KR3k0012_WYG_226-11a, image: WYG0895/WYG0895-0099c.png}
  - {type: variant, offset: 3035, length: 3, content: 並專席, WYG: 風俗通曰頃者廷尉多墻靣}
  - {type: variant, offset: 3039, length: 5, content: 坐故京師號, WYG: 苟充兹位持書侍御史不復平議讞當糺紛豈一事哉里語}
