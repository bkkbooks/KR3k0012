  - {type: variant, offset: 1309, length: 1162, content: 守京兆尹復兼御史大夫時峴兄峘為戶部尚書兼成都尹乾元初玄宗還京峘自蜀至又兼御史大夫兄弟俱判臺事自國初以來兄弟並拜大夫未有其比時長安士庶皆賦美之又曰崔縱勸李懷光西至奉天加右庶子充使無幾拜京兆尹兼御史大夫數奏懷光剛復反覆宜陰備之及幸梁州左右或短之曰縱素善懷光必不來矣上曰他人不知縱吾可保不數日縱至拜御史大夫又曰李元素徵拜御史大夫大夫自貞元中位缺久難其人至是元素以名望召拜中外聳聽及居位一無修舉但規求作相久之𥧲不得志見客必曰無以某官散相踈也見屬官必先拜脂韋在列大失人情又曰李景讓轉御史大夫景讓慷慨有大志事母以孝聞正色立朝言無避忌時宣宗皇舅鄭光卒詔贈司徒罷朝三日景讓曰國舅雖親朝典有素無容過越乃上言曰鄭光是陛下親舅外族之愛誠軫聖心况皇太后哀切之時理合加等而賜之粟帛降之弔問自家刑國允謂合宜今以輟朝之數比於親王公主即前例所無縱有亦不可施用何者先王制禮所貴防微大凡人情於外族則深於宗屬則薄所以先王制禮割愛厚親士庶猶然況當萬乘親王公主宗屬也舅氏外族也今朝廷公卿以至庶人據開元禮外祖父母及親舅喪止服小功五月若親伯叔親兄弟即服齊縗周年所以踈其外而密於內也有天下者尤不可使外戚強盛故西漢有呂氏之侈幾滅劉氏國朝有則天之篡殆革唐命蓋非一朝一夕其所由來漸也今鄭光輟朝日數與親王公主同設使陛下速改詔命輟朝一日或兩日示其昇降有差恩禮無僣使四方見陛下欽明之德青史傳陛下制度之文垂之百王永播芳烈臣愚不肖謬竊恩私實願陛下處於堯舜之上羲軒之列所以甘心鼎鑊伏進危言優詔報之乃罷朝兩日又曰田令孜軍沙陁逼京師移幸鳳翔邠帥朱玫引兵來迎駕令孜挾帝幸山南時中夜出幸百官不及扈從而隨駕者黃門衛士數百人而巳帝駐寶雞候館詔授孔緯御史大夫遣中使傳詔令緯率百寮赴行在時京師急變從駕官屬至盩厔並為亂兵所剽資裝殆盡緯承令見宰相論事蕭遘以田令孜在帝左右意不欲行辭疾不見緯遣臺吏促百官上路皆以袍笏不具為詞緯無如之何乃召三院御史謂之曰吾輩世荷國恩身居憲秩雖六騑奔道而咫尺天顏累詔追徵皆無承稟非臣子之義也凡布衣交舊緩急猶相救䘏况在君親策名委質安可背耶言竟泣下三院曰夫豈不懷但𥂕厔剽剝之餘丐食不給今若首途聊營一日之費俟信宿繼行可也緯拂衣而起曰吾妻危疾旦不得夕丈夫豈以妻子之故忽君父之急耶公輩善自為謀吾行決矣即日見李昌符告曰主上再有詔命令促百寮前進觀群公之意未有發期僕忝憲闈不宜居後道途多梗明公幸假五十騎送至陳倉昌符嘉之謂緯曰路無頓褁糧辦耶乃送錢五十緡令騎士援緯達散關緯知朱玫必蓄異志奏曰關城小邑不足以駐六師請速幸梁州翌日車駕離陳倉纔入關而邠歧之兵圍寶雞攻散關微緯之言幾危矣五代史後唐史曰天成元年夏六月以李琪為御史大夫自後不復除通典曰漢御史大夫副丞相事若今之同平章及參知機務之類所以漢書云薛貢韋匡迭為宰相薛宣韋賢匡衡則是丞相而貢禹但為御史大夫又曰武后時改御史臺為肅政臺凡置左右肅政二臺別置大夫中丞各一人, SBCK: ''}
