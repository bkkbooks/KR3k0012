  - {type: page-break, offset: 3045, content: '', id: KR3k0012_WYG_226-11b, image: WYG0895/WYG0895-0099d.png}
  - {type: variant, offset: 3046, length: 2, content: 獨坐, WYG: 日之間周遷三臺續漢書曰百官志曰持書御史秩百石掌選明法律者爲之天子疑獄以法律讞是非糺六品以下桓帝以後不治獄充位而已魏書曰王觀字偉臺東郡亶邱人也明帝幸許昌召觀爲治音持下同書侍御史典行臺獄時多倉卒喜怒而觀不阿音順㫖晉書曰杜預爲鎮南入辭口啟陳壽史才通博宜補黄散也黄黄門侍郎散散騎常侍上曰壽可作治書否預對曰唯在聖詔即手詔用之又曰太始四年置黄沙獄持書御史一人秩與中丞同掌詔獄及廷尉不當皆理之梁書曰謝幾卿天監初除征虜鄱陽王記室尚書三公侍郎尋爲侍御史舊郎官轉是職者世謂爲南奔幾卿失志多陳疾臺事略不復理後爲散騎侍郎}
