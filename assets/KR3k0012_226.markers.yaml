  - {type: variant, offset: 1121, length: 187, content: 御史大夫時僧惠範恃太平公主權勢逼奪百姓店肆州縣不能理謙光將加彈奏或請寢之謙光曰憲臺理冤滯何所廻避朝彈暮黜亦可矣遂與殿中慕容珣奏彈之又曰韋思謙除右肅政大夫遂坐受拜或以為言謙曰國家班列自有等差柰何以姑息為事又曰崔隱甫為大夫一切督責之事無大小悉令諮決稍有忤意列上其罪前後貶黜者過半群僚側目上常謂曰卿為大夫深副朕所委又曰肅宗幸靈武李峴應召至行在拜扶風郡太守兼御史大夫既收京師拜禮部尚, SBCK: 治}
