  - {type: variant, offset: 1049, length: 0, content: '', SBCK: 于時刺史多任武將􅀋不稱職彧上表曰方今天下太平四海清謐共治百姓任其才昔漢光武一代明哲超自布衣備知情僞與二十八將披荆􅁄定天下及功成之後無所職任伏見詔書以上柱國和干子爲􅂎州刺史其人年垂八十鐘鳴漏盡前任趙州闇於職務政由羣小賄賂公行百姓吁嗟謌謡滿道乃云老禾不早殺餘種穢良田古人有云耕當問奴織當問婢此言各有所能也干子弓馬武用是其所長治民莅職非其所解至尊思治無忘興寢如謂優老尚年自可厚賜金帛􅀂令刺舉所損殊}
  - {type: page-break, offset: 1049, content: '', id: KR3k0012_SBCK_226-8a}
  - {type: variant, offset: 1049, length: 0, content: '', krp: 于時刺史多任武將類不稱職彧上表曰方今天下太平四海清謐共治百姓任其才昔漢光武一代明哲超自布衣備知情僞與二十八將披荆棘定天下及功成之後無所職任伏見詔書以上柱國和干子爲𣏌州刺史其人年垂八十鐘鳴漏盡前任趙州闇於職務政由羣小賄賂公行百姓吁嗟謌謡滿道乃云老禾不早殺餘種穢良田古人有云耕當問奴織當問婢此言各有所能也干子弓馬武用是其所長治民莅職非其所解至尊思治無忘興寢如謂優老尚年自可厚賜金帛若令刺舉所損殊}
