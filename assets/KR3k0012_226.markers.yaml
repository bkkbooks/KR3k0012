  - {type: variant, offset: 950, length: 0, content: '', SBCK: 季秋後讞魚列反又音巘時帝幸宣室齊宫而决事命侍御史二人持書遂置持書御史通典曰御史中丞舊持書御史也國諱改焉後歴代皆同風俗通曰頃者廷尉多墻靣而苟充兹位持書侍御史不復平議讞當糺紛豈一事哉里語曰縣官漫漫􅁈死者半後漢書曰蔡邕以侍御史轉持書御史遷尚書三日之間周遷三臺續後}
