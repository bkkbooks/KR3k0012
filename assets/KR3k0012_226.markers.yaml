  - {type: variant, offset: 926, length: 1, content: 褚, SBCK: 秩崇官不常置中丞常爲憲臺之長今寺監少卿少監司業少尹並爲寺置之貳皆爲四品中丞官名至重見秩未崇望升爲從四品從之又曰薛存誠爲給事中瓊林庫使奏召工徒}
  - {type: variant, offset: 926, length: 1, content: 褚, krp: 秩崇官不常置中丞常爲憲臺之長今寺監少卿少監司業少尹並爲寺置之貳皆爲四品中丞官名至重見秩未崇望升爲從四品從之又曰薛存誠爲給事中瓊林庫使奏召工徒}
  - {type: variant, offset: 928, length: 1, content: 笑, SBCK: 廣存誠以爲此者姦人竄名以避征徭不可許咸陽尉􅀽儋都甘切與軍鎭相競軍人無理遂肆侵誣儋反受罰二勑継至存誠皆執之上聞甚恱命中使嘉勞由是選拜御史中丞又曰孔緯爲御史中丞緯器志方雅嫉惡如讎旣揔憲綱中外不繩而自肅又曰盧坦爲御史中丞裴均爲僕射左班踰位請退之均不受坦曰姚南仲爲僕射例如此均曰南仲何人坦曰南仲是守正而不交權倖者尋罷爲右庶子時人歸咎於均三國典略曰梁張綰字孝卿雍州刺史績之第也梁主䇿其百事綰對闕其六乃號爲百六公常爲御史中丞兄績爲僕射元日朝㑹}
  - {type: page-break, offset: 928, content: '', id: KR3k0012_SBCK_226-6a}
  - {type: variant, offset: 928, length: 0, content: '', krp: 廣存誠以爲此者姦人竄名以避征徭不可許咸陽尉袁儋都甘切與軍鎭相競軍人無理遂肆侵誣儋反受罰二勑継至存誠皆執之上聞甚恱命中使嘉勞由是選拜御史中丞又曰孔緯爲御史中丞緯器志方雅嫉惡如讎旣揔憲綱中外不繩而自肅又曰盧坦爲御史中丞裴均爲僕射左班踰位請退之均不受坦曰姚南仲爲僕射例如此均曰南仲何人坦曰南仲是守正而不交權倖者尋罷爲右庶子時人歸咎於均三國典略曰梁張綰字孝卿雍州刺史績之第也梁主䇿其百事綰對闕其六乃號爲百六公常爲御史中丞兄績爲僕射元日朝㑹及百司就列兄弟並導騶兩塗前世未有時人榮之崔鴻十六國春秋前録曰叚凱驍勇善射好讀書爲御史中丞明筆直繩無所阿避號曰老虎傳咸集奏曰司隷中丞得糺太子而不得糺尚書臣所未譬朝廷無以易之梅陶自叙曰余居中丞曽以法鞭皇太子傳親友莫不致諌余}
