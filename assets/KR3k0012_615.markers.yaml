  - {type: variant, offset: 1581, length: 945, content: 子曰十室之邑必有忠信如丘者焉不如丘之好學也已矣又曰有顏淵者好學不遷怒不貳過不幸短命死矣今也則亡未聞好學者也又曰孔文子何以謂之文也子曰敏而好學不恥下問是以謂之文又曰我非生而知之者好古敏以求之也又曰子夏曰日知其所亡月無亡其所能可謂好學也已禮記檀弓上曰孔子與門人立拱而尚右二三子亦皆尚右孔子曰二三子之嗜學我則有姊之喪故也二三子皆尚左新序曰葉公諸梁問樂主鮒曰晉大夫趙文子為人何若對曰好學而受規諫仁也江出岷山其源若甕口至楚國其廣十里無它故其下流多也好學受規諫宜乎立哉漢書曰陳平少時家貧好讀書治黃帝老子之術兄伯常耕田縱平遊學東觀漢記曰馮豹字仲文好儒學以詩傳教授鄉里為之語曰道德斌斌馮仲文又曰和熹鄧后七歲讀論語志在書傳母常非之曰當習女工今不是務寧當學博士耶后重違母意晝則縫紉夜私買脂燭讀經傳宗族外內皆號曰諸生范曄後漢書曰荀爽幼好學太尉杜喬見而稱之曰可為人師爽遂躭思經書慶弔不行徵命不應張璠漢記曰朱穆字公叔好學專精每一思至中食失飡行墜坑坎亡失冠履其父常言穆大專幾不知馬之幾足後漢書曰張霸就樊儵受嚴氏公羊春秋遂博覽五經諸生孫綝劉固等慕之各市宅其傍以就學耶魏書曰吉茂字叔暢好書不恥惡衣惡食而恥一物之不知建安初與扶風蘇則共入武功南山精思數歲北齊書曰劉逖字子長少而聰敏在遊宴之中卷不離手值有文籍所未見者則終日諷誦或通夜不歸其好學如此也文士傳曰李庸字蕭遠篤志好學善屬文詞藻清美常燃柴草火以讀之南史曰梁劉峻字孝摽平原人也永明中從桑乾還自謂所見不博更求異書聞有者必往祈借清河崔蔚祖謂之書淫北史曰隨劉臻為儀同性怳忽躭經史經日覃思至於世事多所遺忘有劉訥者亦任儀同俱為太子學士情好甚密臻住南訥住東臻嘗欲尋訥謂從者曰汝知劉儀同家乎從者不知尋訥謂還家因荅曰知於是引之而去既扣門臻尚未悟謂至訥家乃據鞌大呼曰劉儀同可出矣其子迎門臻驚曰汝亦來耶其子荅曰是大人家於是顧盻久之乃悟叱從者汝大無意吾欲造劉訥耳杜預自敘曰少而好學在官則勤於吏治在家則滋味典籍玄晏春秋曰余家素貧窘晝則務作於勞夜則甘疲寐及二時之務書卷生麝篋不解緘唯季冬裁得一旬學或兼夜寐或戲獨否或對食忘飡或不覺日夕是以遊出之事吉凶略絕富陽男數以全生之道誨子方之好色號子為書帙廢學毛詩緇衣曰子𥘞剌學校廢也世亂則學校不脩焉青青子𥘞悠悠我心縱我不往子寧不嗣音尚書曰不學牆面涖事惟煩論語曰德, WYG: 徳}
