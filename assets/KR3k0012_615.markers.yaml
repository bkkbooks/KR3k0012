  - {type: variant, offset: 716, length: 383, content: 防未萌亦願留意梁書曰西陽王犬鈞性厚重不妄戲弄年七歲武帝問讀何書對曰學詩因令諷誦即誦周南音韻清雅帝重之因賜王羲之書一卷三國典略曰梁孝元字世誠初年五歲梁武問曰讀何書對曰能讀曲禮梁武曰汝試言之孝元即誦上篇左右莫不驚歎及長精神爽儁殷興通語曰殷禮字往嗣幼而鄉里異之七歲就官學書在師未嘗戲弄諷誦恒不為聲潛識而已師殺雞詣禮父穎曰賀此子能興君門行在舟車手不釋卷從曲阿往返遂不知隄瀆廣狹及行旅喧鬧未嘗視之時人語曰奇才強記殷往嗣後與張溫使蜀至荊州虎牙遭水眾人失色往嗣見之無異諸葛亮見之歎曰東吳菰蘆中乃有此奇偉晚學國語曰晉文公問元帥於趙衰元帥上卿對曰郄縠可行年五十矣縠晉大夫守學彌惇夫先王之法德義之府也志記德義生民之本也能惇篤者不忘百姓也請使郤縠公從之說苑曰晉平公問師曠曰吾年七十欲學恐晚如何對曰少年如日出之光二十而學如日中之光老學如炳燭之明孰與夜行乎公曰善哉後漢書曰獻帝詔曰孔子歎學之不, SBCK: 以朋友}
