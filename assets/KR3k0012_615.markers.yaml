  - {type: variant, offset: 2742, length: 1, content: 丈, krp: 昔河間好學尓旣有之臨淄好}
  - {type: variant, offset: 2744, length: 0, content: '', SBCK: 尓亦兼之然東平爲善弥髙前載吾重之愛之尓當傚焉北史曰後魏元善遷國子􅀕酒上甞親臨釋奠令善講孝經於是敷陳義理兼之以諌上大恱曰聞江陽之􅀃更起朕心賚絹一百疋衣一襲又曰盧景􅁉􅀶通經典齊文襄入相於第開講招延時儁令景􅁉解所注昜景􅁉理義精微吐發閑雅時有問難或相詆訶大聲厲色言至不遜而景􅁉神彩儼然風調如一從容往復無際可㝷由是士君子嗟羡之後周書曰吕思禮東平壽張人也性温潤不雑交遊年十四受學於徐遵明長於論難諸生爲之語曰講書論易鋒難敵隋書曰後齊將講於天子先定經於孔父廟置執經一人侍講二人執讀一人擿句二人録義六人奉經二人講之旦皇帝服通天冠􅀇紗􅂁乗象輅至學坐廟堂上講訖還便殿改服綘紗􅂁乗象輅還宫講畢以一太牢釋奠孔父配以顔囬列軒懸樂六佾舞行三獻禮畢皇帝服通天冠綘紗􅂁升阼即座宴畢還宫皇太子每通一經亦釋奠又曰馬光爲太子􅀶士甞因釋奠髙祖親幸國子學王公巳下畢集光升座講禮啓發章句巳而諸儒生以次論難者十餘人皆當時碩學光剖析凝滯雖辭非俊辯而理義引贍論者莫測其淺深咸共推服上嘉而勞焉又曰元善通􅀶在何妥之下然以風流醖藉俯仰可觀音韻清明聽者忘倦由是爲後進所歸妥毎懷不平心欲屈善因善講春秋􅀄發題諸儒畢集善私謂妥曰名望巳定幸無相苦妥然之及就講肆妥遂引古今滯義以難善多不能對善深衘之二人由是有􅂩唐書曰太宗幸國子學視釋奠􅀕酒孔頴逹講孝經右庻子趙引智問之曰}
