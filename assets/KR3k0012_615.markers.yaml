  - {type: variant, offset: 2782, length: 193, content: 收等同列諸人談說經史惇隱几而睡深為勝流所輕梁書曰柳津字元舉性強直乏風華或勸之聚書津曰吾嘗令道士上章驅鬼安用此鬼名耶隋書曰宇文慶沉深有器局少以聰敏見知周初受業東觀頗涉經史既而謂人曰書足記姓名而已安能久事筆硯為腐儒之業于時文州民夷相聚為亂慶應募從征賊保據巖谷徑路懸絕慶束馬而進襲破之以功授都督唐書曰馬燧少嘗與諸兄讀書乃輟卷歎曰天下將有事矣丈夫當立功征伐以濟四海安能矻矻為一儒也西京雜記曰傅介, SBCK: 崔暹}
