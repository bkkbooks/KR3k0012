  - {type: variant, offset: 2733, length: 4, content: 為官傭寫, SBCK: 常往還諸曁敗粟以養母雖自執舟檝閑則習業尤精三禮年二十餘瑒之門徒稍從問道􅀄瑒於郷里聚徒教授四方受業者三千餘人瑒天􅁥中亡至是復集琛矣琛乃築室郊郭之際茅茨數間年將三十便事講授旣丗習禮學究其微精占術先儒吐言辯㓗坐之聽受終日不疲後周}
  - {type: variant, offset: 2733, length: 0, content: '', WYG: 常往還諸暨販粟以養母雖自執舟楫閒則習業尤精三禮年二十餘瑒之門徒稍從問道初瑒於鄉里聚徒教授四方受業者三千餘人瑒天監中亡至是復集琛矣琛乃築室郊郭之際茅茨數間年將三十便事講授既世習禮學究其精微占述先儒吐言辦潔坐之聽受終日不疲後周書梁晉熙郡王蕭大圜當元帝時以世多忌恐讒愬生焉乃屏絶人事門客左右不過兩三人不妄遊狎恒以講詩禮書易}
