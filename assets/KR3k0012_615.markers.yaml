  - {type: variant, offset: 2730, length: 0, content: '', krp: 先𥘉光武學長安時過朱祐祐甞留上湏講竟乃談語及車駕幸祐家問主人得無去我講乎又曰建𥘉四年詔諸儒㑹白虎觀講五經同異又曰桓榮爲博士顯宗即位乗輿幸太常府令榮坐東面設几杖㑹百官數百人天子親自執業又曰桓榮拜議郎入侍太子毎朝㑹輙令榮於公卿前敷奏經書帝稱善又曰顯宗親於辟雍自講所制五行章句巳復令桓郁說一篇上謂郁曰我爲孔子卿爲子夏起我者啇也又問郁曰子幾能傳學郁曰臣子皆未能傳覺孤兄子一人學方起上曰努力教之有起者即白之又曰楊政字子行治梁丘易與京兆祁聖元同好俱名善說京師號曰說經鏗鏗楊子行論難僠僠祁聖元又周舉字宣光姿皃短陋而博學洽聞爲儒者所宗京師語曰五經縱撗周宣光也又曰井丹字大春通五經時人謂之語曰五經紛綸井之大春又陳嚚字君期明韓詩時語曰關東說詩陳君期又曰魯平字叔陵兼通五經關東號曰五經復興魯叔陵也又曰賈逵字景伯能講左氏及五經本文以大小夏侯尚書教授諸儒爲之語曰問事不休賈長頭後漢書曰鄭玄西入關因涿郡盧植事扶風馬融融門徒四百餘人}
