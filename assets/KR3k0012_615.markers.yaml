  - {type: variant, offset: 2730, length: 0, content: '', WYG: 先光武學長安時過朱祐祐嘗留上須講竟乃談語及車駕幸祐家問主人得无留我講乎又曰建初四年詔諸儒㑹白虎觀講五經同異又曰桓榮為博士顯宗即位乗輿幸太常府令榮坐東面設几杖㑹百官及榮門生數百人天子親自執業又曰桓榮拜議郎入侍太子每朝㑹傳令榮於公卿前敷奏經書帝稱善又曰顯宗親於辟雍自講所制五行章句已後令桓郁說一篇上謂郁曰我為孔子卿為子夏起予者商也又問郁曰子幾人能傳學郁曰臣子皆未能傳學孤兄子一人學方起上曰努力教之有起者即白之又曰楊政字子行治梁丘易與京兆祁聖元俱善説經書京師語曰說經鏗鏗楊子行論難播播祁聖元又曰周舉字宣光姿貎短陋而博學洽聞為儒者所宗京師語曰五經縱横周宣光也又曰井丹字大春通五經時人語曰五經紛綸井大春又曰魯平字叔陵兼誦五經闗東號曰五經復興魯叔陵又曰陳嚚字君期韓詩語曰闗東說詩陳君期又曰賈逵字景伯能講左氏及五經本文以大小夏侯尚書教授諸儒為之語曰問事不休賈長頭後漢書曰漢鄭𤣥西入闗因涿郡盧植事扶風馬融融門徒四百餘人}
