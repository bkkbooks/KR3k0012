  - {type: variant, offset: 2733, length: 4, content: 為官傭寫, krp: 常往還諸曁敗粟以養母雖自執舟檝閑則習業尤精三禮年二十餘瑒之門徒稍從問道𥘉瑒於郷里聚徒教授四方受業者三千餘人瑒天監中亡至是復集琛矣琛乃築室郊郭之際茅茨數間年將三十便事講授旣丗習禮學究其微精占術先儒吐言辯㓗坐之聽受終日不疲後周}
  - {type: variant, offset: 2734, length: 3, content: 官傭寫, WYG: 事梁元帝嘗自問五經要事數十條大圜辭約㫖明應答無滯梁元帝甚歎美之因曰昔河間好學爾既有之臨淄好文爾亦兼之然東平為善彌髙前載吾重之愛之爾當傚焉北史曰後魏元善遷國子祭酒上嘗親臨釋奠令善講孝經于是敷陳義理兼之以諌上大恱曰聞江陽之說更起朕心賚絹一百疋衣一襲又曰盧景裕博通經典齊文襄入相於第開講招延時雋今景裕解所注易景裕理義精微吐發閑雅時有問難或相詆訶大聲厲色言至不遜而景裕神彩儼然風調如一從容往復無隙可尋由是士君子嗟美之後周}
