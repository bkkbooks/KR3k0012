  - {type: variant, offset: 2742, length: 1, content: 丈, WYG: 後齊將講于天子先定經于孔父廟置執經一人侍講二人執讀一人摘句二人錄義六人奉經二人講之旦帝服通天冠𤣥紗袍乘象輅至學坐廟堂上講訖還便殿改服絳紗袍乘象輅還宫講畢以太牢一釋奠孔父配以顔淵列軒懸樂六佾舞行三獻畢皇帝服通天冠絳紗袍又曰馬光為太子博士嘗因釋奠髙祖親幸國子學王公已下畢集光升坐講禮啓發章句已而諸儒生以次論難者十餘人皆當時碩彦光剖析疑滯雖辭非俊辨而理義𢎞贍又曰元善通博在何妥之下然以風流醖藉俯仰可觀音韻清朗聽者忘倦由是為後進所歸妥每懐不平心欲屈善因善講春秋初發題諸儒畢集善私謂妥曰名望已定幸無相苦妥然之及就講席妥遂引古今滯義以難善多不能對善深銜之二人由是有隙唐書曰太宗幸國子學視釋奠祭酒孔穎達講孝經右庶子趙𢎞智問之曰夫子門人曾閔俱稱大孝而今獨為曾說不為閔說何邪荅曰曾孝特優門人不能逮也制㫖駁曰朕聞家語云昔曾晳使曾參鋤瓜而誤斷其根晳怒援大杖以擊其背稱手仆地絶而復蘇孔子聞之語門人曰參来勿内既而曾子請焉孔子曰舜之事父也使之常在側欲殺之不可得小箠則受大杖則走參欲于父委身以待暴怒陷父於不義不孝莫大焉由斯而言孰愈于閔子騫也穎達不能對太宗又謂侍臣曰諸儒各生異意皆非聖人論孝之本㫖也夫孝者善事父母自家刑國忠於其君戰陣勇朋友信揚名顯親此之謂孝具在經典而論者多離其}
