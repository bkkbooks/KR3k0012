  - {type: variant, offset: 2731, length: 0, content: '', krp: 堂者五十餘生融素驕貴玄在門下三年不得見乃使髙業弟子傳授於玄玄日夜㝷誦未甞怠倦㑹融集諸生考論圖緯聞玄善筭乃召見於樓下玄因質諸疑義問畢辭歸融喟然謂門人曰鄭生今去吾道東矣又盧植於馬融受學融列女樂在於前植侍講積年未曽轉眄馬融是以敬之又曰大將軍袁紹緫兵兾州造使要鄭玄大㑹賔客玄最後至乃延升上座玄身八尺飲酒一斛秀眉明目容儀温偉紹客多豪俊見玄儒者未以通人許之競設異端百家玄起玄依方辯對咸出問表皆得所未聞莫不嗟服謝承後漢書曰董春字紀陽少好學究極聖旨後還歸立精舎逺方門徒學者常數百人諸生毎升講堂鳴鼓三通撗經捧手請問者百人追隨上堂難問者百餘人又曰戴馮字次仲徴拜郎中公卿大㑹群臣就席馮獨立丗祖問之對曰博士說經皆不如臣坐居臣上是以不得就席正旦朝賀帝令群臣說經義有不通輙奪其席以益通者馮重五十席京師諺曰解經不窮戴侍中後漢書曰丁鴻字孝公少好尚書十六能論難永平中引見說文侯一篇賜衣𬒳章帝㑹諸儒白虎觀上善鴻難說號之曰殿中無雙丁孝公魏書曰文帝𥘉在東宫氛癘大起時人凋傷帝深感難與素所敬者大理正郎書云人生有七尺之形死爲一捾之土唯立德揚名可以不朽其次莫如著篇籍疫癘數起士人凋落余獨何人能全其壽故論撰所著典論詩賦盖百餘篇集諸儒於肅成門内講論大義侃侃無倦晉書曰鄭玄爲散騎常侍光禄勲嘉平三年拜司空及髙貴郷公講尚書冲執經親授沈約宋書曰魏齊王毎講肆經通輙使太常釋奠先聖先師於辟雍又曰元嘉十五年徴雷次宗至京師開舘聚徒授教使丹陽尹何尚之立玄學太子率更令何承天立史學司徒叅軍謝元立文學九四學並建之梁書曰中宗於敬賢殿講老子僕射王褒執經百僚皆預講席中宗談折摙辯間以嘲謔在座者相顧解頥又曰沈峻字士嵩武康人也博通五經尤長周禮時吏部郎中陸倕與僕射徐勉書薦峻曰凢聖可講之書必以周官立義然則周官一書實爲群經源本此學不傳多歴年所唯助教沈峻特精此書比日開講群儒劉嵒沈熊之徒皆執經下座北靣受業莫不歎服人無間言也又伏曼傳曰宋明帝好周易常集朝臣於清暑殿講詔曼容執經曼容素美風采明帝恒以方嵇叔夜使吴人陸探微畫叔夜像以賜之爲尚書外兵郎甞與袁粲罷朝㑹言玄理時論以爲一臺絶又曰盧黄范陽涿人少明經有儒術天監中歸梁位歩兵校尉兼國子博士遍講五經時北來人儒學者有崔靈恩孫詳蔣顯並聚徒講說而音辭鄙拙唯廣言論清雅不類北人僕射徐勉兼通經術深相賞好後爲㝷陽太守武陵王長史卒官又曰賀琛字國寳㓜孤伯父瑒授其經業一聞便通義理瑒異之常曰此兒當以明經致貴瑒卒後琛}
