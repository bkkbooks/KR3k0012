  - {type: variant, offset: 25, length: 2, content: 十年, WYG: 講和解也易文}
  - {type: variant, offset: 28, length: 686, content: 幼學論語為政曰子曰吾十有五而志于學三十而立學成能有所立漢書曰東方朔十三學書三冬文史足用十五學擊劍十六學詩書誦二十二萬言十九學孫吳兵法鉦鼓之教亦誦二十萬言時莫之比司馬彪續漢書曰荀悅十二能讀春秋貧無書每至市間閱篇牘一見多能誦記後漢書曰張堪早孤讓先父餘財數百萬與兄子年十六受業長安志美行厲諸儒號曰聖童魏志曰鍾會母性矜嚴勤見規誨四歲授孝經七歲誦論語八歲誦詩十歲誦尚書十一誦易十二誦春秋左氏國語十三誦周禮十四誦成侯易記十五便入太學問四方奇文異訓謂會曰學猥則倦倦則意怠故以漸訓汝今可以獨學矣西晉趙至字景真年十四隨人入太學觀書時嵇康於學寫石經古文異事訖去遂逐車問康異而語之為諸生宋書曰王儉幼篤學手不釋卷賓客或相稱美僧虔曰我不患此兒無名正恐名太盛耳乃手書崔子玉坐右銘以貽之丹陽尹袁粲聞其名及見之曰宰相之門栝柏豫章雖小已有棟梁氣矣南史曰虞荔字山披會稽餘姚人也幼聰敏有志操年九歲隨從伯闡候太常陸倕問五經十事荔對無遺失倕甚異之太守衡陽王辟為主簿荔又辭以年小不就後魏書曰祖瑩字元珍范陽人年八歲能誦詩書十二為中書博學躭書以晝繼夜父母恐其成疾禁之不能止常密於灰中藏火驅逐僮僕父母寢睡後燃火讀書以衣被蔽窗戶恐漏光明為人所覺內外親戚呼為聖小兒又曰任城王澄子順字子和年九歲師事樂安陳豐初書王羲之小學篇數千言晝書夜誦旬有五日一皆通利豐奇之白澄曰豊十五從師迄于白首耳目所經未見此比江夏黃童不得無雙也澄笑曰藍田生玉何容不爾十六通杜氏春秋恒集門生討論同異三國典略曰齊王紘字師羅太安狄郡人北豫州剌史基之子也年十三楊州剌史郭元貞撫其背曰汝讀何書對曰誦孝經元貞曰孝經云何曰在上不驕為下不亂元貞曰吾作剌史豈其驕乎紘曰雖不驕, WYG: 麗澤兊}
