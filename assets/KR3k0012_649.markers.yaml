  - {type: variant, offset: 3198, length: 1, content: 五, WYG: 不召資遷怒榜書佐朱零零仰曰范滂清裁猶以利刃斷腐朽今日寧受笞死而滂不可違資乃止又曰橋𤣥再遷上谷太守又為漢陽太守時上邽令皇甫禎有贓罪𤣥収考髠笞死于冀市隋書曰劉行本為治書侍御史未幾遷黄門侍郎上嘗怒一郎於殿前笞之行本進曰此人素清其過又小願陛下少寛假之上不顧行本於是正當上前曰陛下不以臣不肖置臣左右臣言若是陛下安得不聴臣言若非當致之於理以明國法豈得輕臣而不顧也臣所言非私因置笏於地而退上斂容謝之遂原所笞者管子曰棟橈不勝任則屋覆而人不怒者其理也弱子慈母所愛也不以其理奉養則慈母笞之説苑曰韓伯瑜有過其母笞之泣其母問曰他日笞之未嘗泣今何泣對曰他日瑜得之常痛今母力之衰笞不痛是以泣之益部耆舊傳曰杜真字孟宗廣漢綿竹人也少有孝行習春秋誦百萬言兄事同郡翟酺酺後被繫獄真上檄章救酺繫獄笞}
