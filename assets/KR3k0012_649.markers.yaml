  - {type: variant, offset: 592, length: 136, content: 三百楚漢春秋曰正疆數言事而當上使參乘解玉劍以佩之天下定出以為守有告之者上曰天下方急汝何在曰亡上曰正疆沐浴霜露與我從軍而汝亡告之何也下廷尉劓臏尚書大傳曰決關梁踰城郭而略盜者其刑臏尚書刑德放曰臏者脫去人之臏也臏罰之屬五百象七精七宿昏中變易節氣之精也禮統曰臏刑法金勝木去其節目也, WYG: 拷掠髠}
