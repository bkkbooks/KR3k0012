  - {type: variant, offset: 3483, length: 265, content: 不赦復從而赦之此為刑不制罪法不勝姦民知法之不勝相聚而謀為不軌故自頃以來姦惡陵暴所在充斥漸以滋蔓日積不已弊將所歸議者不深思此故而曰肉刑於名忤聽忤聽孰與盜賊不禁聖王之制肉刑遠有深重其事可得而言非徒懲其畏剝割之痛而不為也乃去其為惡之具使夫姦民無用不復肆其志止姦絕本理之盡也亡者刖其足無所用復亡盜者截其手無所用復盜淫者割其勢理亦如之除惡塞源莫善於此又非徒然也此等已刑之後便各歸家父母妻子共相養恤瘡愈可役上准古制隨宜業作雖已刑殘不為虐也生育繁阜之道自若也今宜取死刑之限輕及三犯逃亡淫恣悉以肉刑代之其三歲刑以下宜杖罰及宜制其罰數使有常限後刑不, WYG: ''}
