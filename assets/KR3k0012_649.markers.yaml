  - {type: variant, offset: 3884, length: 0, content: '', WYG: 屬此先帝之所重也而吏未稱職以掠辜苦飢寒瘐死獄中何用心逆人道也朕甚痛之其令郡國嵗上繫囚以掠若瘐死者坐名縣爵里丞相御史課殿最以聞也後漢書曰薛安為揚州從事戴就牢墨成會稽上虞人為倉曹掾受贓穢刺史歐陽操遣安檢治拷覆取實安乃收就拷訊五毒乃以針刺就手十指甲使令爬土又燒鐵令赤使挾之肘腋肉焦爛肉墮地就乃取而食之終無疑伏安乃覆就於船燒馬糞於船兩頭薰之火滅謂就已死發船視之乃張目謂其主者曰公何不益糞添火而使絶之何也主者乃報安安大驚遂引就共坐談論乃解其事耳會稽典録又載又曰遭黨事當考實李膺等案經三府太尉陳蕃却之曰今勘所考案皆海内人譽憂國忠公之臣此等猶十代宥也豈有罪名不彰而致收掠者乎不肯平署平署猶連署也帝愈怒遂下膺等於黄門北寺獄又曰周紆遷司隸校尉六年夏旱駕自幸洛陽録囚徒二人被掠而虫生者轉騎都尉後}
