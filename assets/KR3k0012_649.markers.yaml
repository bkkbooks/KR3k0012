  body:
  - {type: variant, offset: 4, length: 126, content: 四黥尚書呂刑曰墨辟疑赦其罰百鍰孔安國曰刻其顙而涅之曰墨刑疑則赦從罰六兩曰鍰鍰黃鐵也尚書刑德放曰𣵠鹿者竿人顙也黥者馬羇竿人面也鄭玄曰𣵠鹿黥皆先次刀笠傷人墨市其中故後世謂之墨土民也尚書大傳曰非事之事入不以道義而誦不祥之辭者其刑墨注曰非事而事之今所不當得為也, SBCK: 五髠鞭笞考掠髠}
  - {type: variant, offset: 4, length: 300, content: 四黥尚書呂刑曰墨辟疑赦其罰百鍰孔安國曰刻其顙而涅之曰墨刑疑則赦從罰六兩曰鍰鍰黃鐵也尚書刑德放曰𣵠鹿者竿人顙也黥者馬羇竿人面也鄭玄曰𣵠鹿黥皆先次刀笠傷人墨市其中故後世謂之墨土民也尚書大傳曰非事之事入不以道義而誦不祥之辭者其刑墨注曰非事而事之今所不當得為也周禮秋官司刑職曰墨者使守門鄭玄曰墨黥也先刻面以墨窒之白虎通曰墨墨其額也取法火之勝金也得火亦變而墨也說文曰黥刑在面也史記曰秦太子犯法衛鞅曰法之不行自上犯之將刑太子君嗣也不可施刑刑其傅公子虔黥其師公孫賈明日秦民皆隨令行之十年秦民大悅道不拾遺山無盜賊民勇於公戰怯於私鬥又曰黥布秦時為布衣年少客相之當刑而王及壯坐黥布欣然笑曰人相我當刑而王幾是乎漢書曰文帝除, WYG: 五髠鞭論}
  - {type: variant, offset: 4, length: 126, content: 四黥尚書呂刑曰墨辟疑赦其罰百鍰孔安國曰刻其顙而涅之曰墨刑疑則赦從罰六兩曰鍰鍰黃鐵也尚書刑德放曰𣵠鹿者竿人顙也黥者馬羇竿人面也鄭玄曰𣵠鹿黥皆先次刀笠傷人墨市其中故後世謂之墨土民也尚書大傳曰非事之事入不以道義而誦不祥之辭者其刑墨注曰非事而事之今所不當得為也, krp: 五髠鞭笞考掠髠}
