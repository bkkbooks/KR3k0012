  - {type: variant, offset: 149, length: 0, content: '', SBCK: 五刑之中而髠者必王之同族不割者宫之爲剪傷其􅀋髠仍似守續也後漢書曰鄧騭子侍中鳯嘗與尚書郎張龕書屬郞中馬融冝在臺閣又中郎將任尚遺鳯馬後尚坐斷盗軍粮檻車徴詣廷尉鳯懼事􅂥}
  - {type: variant, offset: 149, length: 0, content: '', krp: 五刑之中而髠者必王之同族不割者宫之爲剪傷其類髠仍似守續也後漢書曰鄧騭子侍中鳯嘗與尚書郎張龕書屬郞中馬融冝在臺閣又中郎將任尚遺鳯馬後尚坐斷盗軍粮檻車徴詣廷尉鳯懼事洩}
