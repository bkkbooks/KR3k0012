  - {type: variant, offset: 1630, length: 254, content: 王享國百年耄荒度作刑以詰四方度時世所宜訓作贖刑以治天下四方之民王曰若古有訓蚩尤惟始作亂延及干平民罔不寇賊鴟義姦宄奪攘矯虔為鴟梟之義以宄奪攘苗民弗用靈制以刑惟作五虐之刑曰法殺戮無辜爰始淫為劓刖椓黥三苗之主頑凶苦吳敢行虐刑以殺戮無罪於是始大為截人耳鼻椓陰黥面以加無辜故曰五虐商君書曰斷人之足黥人之面非求傷民也以禁姦止過故禁姦止過莫若重刑除肉刑漢書曰齊太倉令淳于公有罪當刑詔獄還繫長安淳于公無男有五女當行會逮罵其女曰生子不生男緩急非有益也其少女緹縈自傷悲泣迺隨其父至長安上書曰妾父為吏齊中皆稱其廉平今坐法當刑妾傷夫, krp: ''}
