  - {type: variant, offset: 691, length: 0, content: '', krp: 也少有孝行習春秋誦百萬言兄事同郡翟酺酺後𬒳繫獄真上撽章救酺繫獄笞六百竟免酺難京師莫不壯}
  - {type: variant, offset: 692, length: 692, content: 臏也臏罰之屬五百象七精七宿昏中變易節氣之精也禮統曰臏刑法金勝木去其節目也周禮秋官上司刑曰刖罪五百鄭玄注曰周改臏作刖白虎通曰臏者脫其臏也取法金之刻木也風俗通曰俗說臈正祖食得兔者名之曰幸幸者善祥令人吉利也或說兔髕者令人面皃生髕露見醜惡今覺得之嘉不為己疾也謹案尚書夏禹始作肉刑則天象而慎其過故穿踰盜竊者髕去其臏骨也逮至暴秦亂獄糺紛烹俎車裂黔首窮愁飲泣永歎凡人食得兔髕以為佳瑞物類以感冀全己之臏也刖尚書呂刑曰剕辟疑赦其罰倍差孔安國曰刖足曰剕也周禮秋官司刑職曰刖罪五百鄭玄曰刖斷足也周改臏作刖也刖者使守門家語曰季羔為衛士師刖人之足俄而衛亂李羔逃刖者守門焉曰被有缺季羔曰君子不踰曰彼有竇季羔曰君子不隊曰此有室季羔入焉既而問其故刖者曰斷足固我罪也臨當刑君愀然不樂見於顏色此臣之所以脫君也史記曰孫臏與龐涓學兵法龐涓既事魏得為惠王將軍而自以為能不及孫臏陰使召孫臏臏到龐恐其賢以刑法斷其兩足而黥之欲隱而勿見齊使者如梁孫臏以刑徒陰見說齊使以為奇竊載與之齊列子曰魯施氏有二子其一好學其一好兵好學者以術干齊侯齊侯以為公子傅好兵者以法干楚王楚王以為軍政鄰人孟氏有二子所業亦同問施氏之方施氏告之一子以術干秦王秦王曰今諸侯力爭安得用仁義遂宮而放之一子以法干衛侯衛侯曰吾弱國豈可稱兵遂以刖之二人讓施氏曰子不得時也韓子曰楚人和氏得璞玉於楚山之中獻之武王武王使玉人相之曰石也王以和為慢刖其左足及文王即位和又奉其璞王又使玉人相之又曰石也文王刖其右足文王薨成王即位和乃抱其璞而哭於荊山之下三日三夜泣盡而繼之血成王問其故曰天下刖者多矣子何哭之悲也和曰吾非悲刖也夫寶玉而題之以石直士命之以慢此吾之所以悲也王乃使玉人剖其璞而得寶焉遂, SBCK: 栲掠釋}
