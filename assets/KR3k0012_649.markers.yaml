  - {type: variant, offset: 594, length: 0, content: '', SBCK: 曰二百猶尚不存至中六年又下詔曰加笞者或至死而笞未畢朕甚憐之其減笞三百曰二百笞二百曰一百又曰笞者所以教之也其定箠令箠䇿也所以擊者也丞相劉舎御史大夫衛綰請笞者箠長五尺其本大一寸其竹也末薄半寸皆平其節當笞者笞臋毋得更人畢一罪乃更人自是笞者得全又曰車千秋爲髙廟寢郎㑹断衛太子爲江充所譛敗之千秋上急言訟太子􅁈曰子弄父兵罪當笞耳天子之子過誤殺人當何罪哉臣嘗夢見一白頭翁教臣之言是時上頗知太子惶恐無他意乃大感悟焉又曰孝平后有節操自劉氏廢常稱疾不朝㑹莽敬憚傷哀欲嫁之廼更號爲皇新室主令立國將軍成新公孫建丗子豫成飾也音象飭醫徃問后疾后大怒笞鞭其傍侍御因發疾不肯起莽遂不敢強也及漢兵誅莽燔燒未央宮后曰何面目以見漢家自投火而死}
