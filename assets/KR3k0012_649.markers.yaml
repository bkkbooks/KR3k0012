  - {type: variant, offset: 599, length: 0, content: '', SBCK: 上敗彭城丁固追上上􅀍髮而顧曰丁公何相逼之甚乃廻馬而去上即位欲陳功上曰使項氏失天下是子也爲人臣用兩心非忠也使下吏笞殺之東觀漢記曰鄧禹攻赤眉曰無穀食自當來吾折箠笞之非諸將憂也後漢書曰汝南太守宗資署范滂功曹委任政事滂外甥西平李頌公族子孫而爲郷曲所棄中常侍唐衡以頌請資資用爲吏滂以非其人寢而不召資遷怒捶書佐朱零零仰曰范滂清裁猶以利刃斷腐朽今日寜受笞死而滂不可違資乃止又曰橋􅀇再遷上谷太守又爲漢陽太守時上邽令皇甫禎有􅂍罪玄收考髠笞死于兾市隋書曰劉行本爲治書侍御史未幾遷黄門侍郎上嘗怒一郎於殿前笞之行本進曰此人素清其過又小願陛下少寛假之上不頋行本於是}
