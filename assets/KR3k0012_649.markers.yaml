  - {type: variant, offset: 1772, length: 502, content: 足黥人之面非求傷民也以禁姦止過故禁姦止過莫若重刑除肉刑漢書曰齊太倉令淳于公有罪當刑詔獄還繫長安淳于公無男有五女當行會逮罵其女曰生子不生男緩急非有益也其少女緹縈自傷悲泣迺隨其父至長安上書曰妾父為吏齊中皆稱其廉平今坐法當刑妾傷夫死者不可復生刑者不可復屬雖欲改過自新其道無由天子憐悲其意遂下令曰制詔御史蓋聞有虞氏之時畫衣冠異章服以為戮而民不犯何法之至也今法有肉刑三孟康曰黥劓二左右趾合一凡三也而姦不止其咎安在無乃朕德之薄而教不明與夫刑至斷支體刻肌膚終身不息息生也何其刑之痛而不德也豈為民父母之意哉除肉刑者有以易之丞相張蒼御史大夫馮敬奏言肉刑所以禁姦所由來者久矣陛下下明詔憐萬民之一有過被刑者終身不息及罪人欲改行為善而道亡繇至於盛德臣等所不及也臣謹議請定律曰諸當完者完為城旦舂文帝除肉刑皆有以易之故以完易髡以笞代劓以左右趾代刑此言髡者完之也當黥者髡鉗為城旦舂當劓者笞三百當斬左趾者笞五百當斬右趾及殺人先自告及吏坐受賕枉法守縣官財物而即盜之已論命復有笞罪者皆棄市命者名也成其罪也趾足也當斬右足以其罪次重故從棄市也殺人先自告謂殺人而自首吏受賕枉法守縣官財物而盜之者此三罪已論名而又犯笞罪即皆棄市也罪人獄已決完為城旦舂, WYG: ''}
