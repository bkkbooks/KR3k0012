  - {type: variant, offset: 1337, length: 194, content: 子何哭之悲也和曰吾非悲刖也夫寶玉而題之以石直士命之以慢此吾之所以悲也王乃使玉人剖其璞而得寶焉遂名曰和氏之璧宮割尚書呂刑曰宮辟疑赦其罰六百鍰宮淫刑也男子割勢婦人幽閉次死之刑也尚書大傳曰男女不以義交者其刑宮尚書刑德放曰宮者女子淫亂執置宮中不得出割者丈夫淫割其勢也已周禮秋官上司刑職曰宮罪五百宮者丈夫割其勢女子閉於宮若今官男女也又掌戮曰宮者使守內也以其人道絕也今世或然禮曰文王世子曰公族無宮刑也, WYG: 後}
