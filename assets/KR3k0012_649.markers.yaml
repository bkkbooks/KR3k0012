  - {type: variant, offset: 738, length: 0, content: '', WYG: 吳王怒甚敢有諫者死範謂騰曰與汝皆死騰曰死無益何死為範曰安能在此坐觀汝耶乃髠頭自縛詣閣下使鈴下以聞鈴下不敢曰必死不可範曰汝有子邪曰有曰汝為吳範死汝子屬我鈴下曰諾乃排閣入言未卒吳王大怒欲投以㦸逡巡走出範因突入叩頭流血言與涕并良久吳主意釋乃免騰晉書曰髠鉗}
