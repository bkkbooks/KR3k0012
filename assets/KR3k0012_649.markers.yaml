  - {type: variant, offset: 160, length: 2, content: 墨墨, SBCK: 􅁗始皇遣蒙恬築長城徒士犯罪亡依鮮卑山後遂繁息今皆髠頭衣赭亡徒之明効也鞭書曰鞭作官刑爲辦治官事之刑也傳曰齊襄公田于貝丘見大豕從者曰公子彭生也公怒曰彭生敢見射之豕人立而啼公懼墜于車傷足䘮屨反誅屨於徒人費弗得鞭之見血又曰重耳過衛衛文公不禮焉出於五鹿乞食於野人與之塊公子欲鞭之子犯曰天賜也稽首受而載之又曰楚子將圍宋使子文治兵於睽終朝而畢不戮一人子玉復治兵於蔿終日而畢鞭七人貫三人耳又曰衛獻公􅀄有嬖妾使師曹誨之琴誨教也師曹鞭之公怒鞭師曹三百榖梁傳成公曰梁山崩壅河三日不流晉君召伯遵而問焉伯遵來遇輦者不辟使車右下而鞭之輦者曰所以鞭我者取道逺矣伯遵下車問焉曰子有聞乎對曰梁山崩伯遵曰君爲此召我如之何輦者曰天有山天崩之天壅之雖召伯遵}
  - {type: page-break, offset: 160, content: '', id: KR3k0012_SBCK_649-2b}
  - {type: variant, offset: 160, length: 2, content: 墨墨, krp: 秦始皇遣蒙恬築長城徒士犯罪亡依鮮卑山後遂繁息今皆髠頭衣赭亡徒之明効也鞭書曰鞭作官刑爲辦治官事之刑也傳曰齊襄公田于貝丘見大豕從者曰公子彭生也公怒曰彭生敢見射之豕人立而啼公懼墜于車傷足䘮屨反誅屨於徒人費弗得鞭之見血又曰重耳過衛衛文公不禮焉出於五鹿乞食於野人與之塊公子欲鞭之子犯曰天賜也稽首受而載之又曰楚子將圍宋使子文治兵於睽終朝而畢不戮一人子玉復治兵於蔿終日而畢鞭七人貫三人耳又曰衛獻公𥘉有嬖妾使師曹誨之琴誨教也師曹鞭之公怒鞭師曹三百榖梁傳成公曰梁山崩壅河三日不流晉君召伯遵而問焉伯遵來遇輦者不辟使車右下而鞭之輦者曰所以鞭我者取道逺矣伯遵下車問焉曰子有聞乎對曰梁山崩伯遵曰君爲此召我如之何輦者曰天有山天崩之天壅之雖召伯遵}
