  - {type: variant, offset: 306, length: 285, content: 當黥者髡為城旦舂律說曰男女論決髡鉗輸邊晝日防寇虜夜暮築長城女子無軍警之事但舂食徒者也又曰黥劓之罪不及大夫故里諺曰欲投鼠而忌器器君也大夫近於君晉令曰奴婢亡加銅青若墨黥黥兩眼後再亡黥兩頰上三亡撗點目下皆長一寸五分廣五分唐通典曰梁制劫身皆斬妻子補兵遇赦降死者黵面為劫字黵音都咸反十四年又除黵面之刑劓尚書呂刑曰劓辟疑赦其罰惟倍也孔安國曰劓截鼻者也尚書大傳曰觸易君命革與服制度姦兇攘傷人者其刑劓鄭玄曰攘竊也周禮秋官司刑職曰劓罪五百鄭玄曰劓截鼻令今東夷或以墨劓為俗古刑人亡逃者之類與劓者使守關禮統曰劓刑法木勝土決其皮革也白虎通曰劓劓其鼻也法木之穿土也去鼻亦孔見漢書曰文帝除肉刑當劓者, WYG: ''}
