  - {type: variant, offset: 3183, length: 2, content: 祖納, WYG: 衛綰請笞者箠長五尺其本大一寸其竹也末薄半寸皆平其節當笞者笞臋毋得更人畢一罪乃更人自是笞者得全又曰田千秋為髙廟寢郎會衛太子為江充所譛敗久之千秋上急變訟太子寃曰子弄父兵罪當笞耳天子之子過誤殺人當何罪哉臣嘗夢見一白頭翁教臣上言是時上頗知太子惶恐無他意乃大感悟焉又曰孝平后有節操自劉氏廢常稱疾不朝會莽敬憚傷哀欲嫁之迺更號為皇新室主令主曰将軍成新公孫建世子豫成飾也音家飾飭醫往問后疾后大怒笞鞭其傍侍御因廢疾不肯起莽遂不敢强也及}
