  - {type: variant, offset: 2442, length: 135, content: 常有千八百紂也求俗休和弗可得已且被刑之人慮不念生志在思死類多趣惡莫復歸正風沙亂齊伊戾禍宋趙高英布為世大患不能正人遂為非也故明德之君遠度深惟棄短就長不茍革其政者也朝廷善之卒不改焉魏志曰鍾繇上䟽曰大魏受命繼蹤虞夏孝文革法不合古道先帝聖德固天所縱典墳之業一以貫之是以繼世仍發明, SBCK: 􅁺陸續等􅀓考}
