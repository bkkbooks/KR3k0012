  - {type: variant, offset: 2813, length: 386, content: 議司徒王朗議以為繇欲輕減大辟之條增益刖刑之數此則起偃為豎化屍為人矣然臣之愚猶有未合微異之意夫五刑之屬著在科律科律自有減死一等之法不死即為減死施行已久不待遠假斧鑿於彼肉刑然後罪次也前世仁者不忍肉刑之慘酷是以廢而不用不用已來歷年數百今復行之恐其所減之文未彰於萬民之目而肉刑之問已宣於寇讎之耳非所以來遠人也議者百餘人與朗同者多帝以吳蜀未平且寢王隱晉書曰曹彥議云嚴刑以殺犯之者寡刑輕易犯蹈惡者多臣謂玩常茍免犯法乃眾黥刖彰刑而民甚恥且創黥刖見者知禁彰罪表惡亦足以畏所以易曰小懲犬大戒豈蹈惡者多耶假使惡多尚不至死無妨產育茍必行殺為惡縱寡而不已將至無人天無以神君無以尊矣故人寧過不殺是以為上寧寬得眾若乃于張聽訟刑以止刑可不革舊過此以往肉刑宜復肉刑於死為輕減死五百為重重不害生足以懲姦輕則知禁禁民為非所謂相濟經常之法議云不可或未知之也又曰尚書梅陶問光祿大夫祖納漢文帝故當為英雄既除肉刑而五, SBCK: 御覽卷第}
