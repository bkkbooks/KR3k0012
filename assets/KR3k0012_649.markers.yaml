  - {type: variant, offset: 3892, length: 2, content: 鍾繇, WYG: 在賀蘭部賀染干奚斤侯乞突等四逆古真知之密馳以告染于疑古真泄其謀乃執持之以兩車軸捍其頭傷其目不服乃免之梁書曰梁代舊律則囚之法曰一上起自晡鼔盡于二更及比部郎中泉剛定律令以舊法測立持久非人所堪分其刻數曰再上廷尉以為新制過輕請集八座議之尚書周𢎞正議曰凡小大之獄必應以情可恣考掠以判刑罪且測人時節本非古制近代已來方有此法起自晡鼓迄于二更豈是常人所能堪忍所以重械之下誣枉者多朝暮二時同等刻進退而求於事為衷會稽典録曰梁宏句章人也太守君興召署主簿是時楚}
