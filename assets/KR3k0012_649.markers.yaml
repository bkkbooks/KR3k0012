  - {type: variant, offset: 3389, length: 545, content: 載生各數萬斷支之後隨刑使役不失民不乏用富國強兵此之謂也又曰劉頌上書曰古者刑以止刑及今反於刑生刑以徒生徒諸重犯亡者髮過三寸輒重髡之此以刑生刑亡加作一歲此以徒生徒也亡者積多繫囚猥蓄議者因曰不可不赦復從而赦之此為刑不制罪法不勝姦民知法之不勝相聚而謀為不軌故自頃以來姦惡陵暴所在充斥漸以滋蔓日積不已弊將所歸議者不深思此故而曰肉刑於名忤聽忤聽孰與盜賊不禁聖王之制肉刑遠有深重其事可得而言非徒懲其畏剝割之痛而不為也乃去其為惡之具使夫姦民無用不復肆其志止姦絕本理之盡也亡者刖其足無所用復亡盜者截其手無所用復盜淫者割其勢理亦如之除惡塞源莫善於此又非徒然也此等已刑之後便各歸家父母妻子共相養恤瘡愈可役上准古制隨宜業作雖已刑殘不為虐也生育繁阜之道自若也今宜取死刑之限輕及三犯逃亡淫恣悉以肉刑代之其三歲刑以下宜杖罰及宜制其罰數使有常限後刑不復生刑徒不復生徒而殘體為戮終身作誡民見其痛畏而不犯必數倍於今且為惡者隨發被刑去其為惡之具豈與全其為姦之手足而戚居必死之窮地同哉而猶曰肉刑不可用臣切以為識務之甚也博物志曰肉刑明王之制荀卿每論之漢興文帝感太倉公女之言而廢之班固著論云宜復之迄漢末魏初陳紀又論宜申古制孔融謂不可復魏武帝輔漢欲申之鍾繇王朗不同遂寢夏侯玄李勝曹義達丁謐建私議各有彼此多言時未可復故遂寢崔寔政論曰高祖非, SBCK: ''}
