  - {type: 'tls:seg', offset: 165, content: '', id: KR3k0012_CHANT_649-4a.5}
  - {type: variant, offset: 165, length: 0, content: '', SBCK: 輦者曰君親素縞帥臣而哭之旣祀焉後漢書曰劉寛遷南陽太守典歴三郡温仁多恕雖在倉卒未嘗疾言遽色常以爲齊之以刑民免而無耻吏人有過但用蒲鞭罰之示辱而巳漢晉春秋曰明帝勤於吏事苛察踰甚或於殿前鞭殺尚書郎晉中興書曰謝鯤字㓜與弱冠知名值中朝大亂長沙王乂輔政親媚小人忌害君子時疾鯤名譛之乂遂執欲鞭之鯤解衣伏鑕神無遽容乂異而釋之文無喜色又曰皇帝詔飛督王饒忽上吾鴆鳥口云以辟惡此㓙物豈冝妄進於是頓鞭饒二百使殿中御史孫雲監於四衝道焚燒之後魏書曰甄琛監决趙脩鞭猶相隱惻然告人曰趙脩小人背如土牛殊耐鞭杖有識以此非之三國典略曰齊崔謙遷鉅鹿太守恩信大行改鞭用熟皮爲之不忍見血示耻而巳有貧弱未理者皆曰我自造白􅁂公不慮不决右郡七載獄無停囚齊春秋曰齊景真爲晉平太守有恵政常懸一蒲鞭未嘗用之齊書曰薛安都從弟道生以軍功爲大司馬參軍犯罪爲秣陵令􅁃淑之所鞭安都大怒乃乗馬從數十人令左右執矟欲徃殺淑之行至朱雀航逢栁元景遥問曰薛公何之安都躍馬至車後曰小子􅁃淑之鞭我從弟今往刺殺之元景慮其不可駐紿之曰小子無冝適卿往與手甚快安都旣廻馬元景復呼之令下馬入車因讓之曰卿從弟服章言論與寒細不異且人身犯罪理應加罰卿朝廷勲臣云何放恣輙於都邑殺人非唯科律所不容主上亦無辭相宥因載俱歸安都乃止南史曰禇玠爲山隂令時舎人曹義逹爲宣帝寵縣人陳信家冨謟事義逹信父顯文恃􅀔撗恣玠乃遣使執顯文鞭之一百於是吏人股慄唐書曰太宗以暇日遍閱群書因讀明堂孔穴云人五藏之系咸附背脊針灸失所皆有損害乃廢書而歎曰今律决笞者皆六髀背分受乃有邂逅致死之義撻人之背理則冝然夫箠五刑之最輕者死者人生之至重者也豈容犯最輕之刑而或鞭笞致死自古帝王由來未悟不亦悲夫即頒制决罪人不得鞭背晉令曰應得法鞭者即執以鞭過五十稱行之有所督罪皆隨過大小大過五十小過二十鞭皆用牛皮革廉成法鞭生葦去四廉常鞭用熟靻之列反柔革也不去廉作鵠頭紉長一尺一寸鞘長二尺二寸廣三分厚一分柄皆長二尺五寸搜神記曰神農以赭鞭鞭百草盡知其毒寒温臰味所主故天下号曰神農也異苑曰河内司馬惟之奴天雄死死後還其婦來善聞體有鞭瘡而却着鏁問云有何遇至如此曰曽因醉竊罵大家今受此罪列女傳曰楚野辯女者昭氏妻也鄭簡公使大夫聘於荆至於狹路有一婦人乗車與大夫遇擊折大夫車之軸大夫怒將執而鞭之女曰妾聞君子不遷怒不貳過今狹路之中妾之避巳極矣而子大夫之僕不肯少伺是以廢于大夫之車而反執妾豈非遷怒哉不怒僕而反怒妾豈不貳過哉㑹稽典録曰鍾離意爲尚書僕射時匈奴有降者詔賜縑三百疋尚書郎曁鄷誤以三千疋賜之上大怒鞭鄷殿下重痛將死意直排閣入諌曰陛下德􅀍四表恩及夷狄是以左袵之徒稽首來服愚聞刑疑從輕賞疑從重今陛下以酆賞誤發雷霆之威海内謂陛下貴微財而賤士命也又曰謝夷吾爲郡功曹吏太守第五倫妻車馬入府無所􅀜啓夷吾鞭功曹佐吏門䦨卒牽車馬出之収其人從倫爲解之良乆乃巳汝南先賢傳曰許嘉年十三父給亭治道坐不竟當得鞭嘉叩頭流血請得免由是感激讀書梅陶自叙曰余居中丞曽以鞭皇太子􅀓親友莫不致諌余􅀏而應之曰堂髙由階皇太子所以得崇於上由吾奉王憲於下也豈其枉道}
