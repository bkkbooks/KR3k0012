  - {type: variant, offset: 734, length: 0, content: '', WYG: 農曰髠當為完謂但居作三年不虧其體者也五行之中而髠者必王之同族不宫者宫之為剪其類髠之仍令守積也後漢書曰鄧隲子侍中鳳嘗與尚書郎張龕書屬郎中馬融宜在臺閣又中郎将任尚遺鳳馬後尚坐斷盜軍糧檻車徵詣廷尉鳳懼事洩先自首於隲隲畏太后遂髠妻及鳯以謝曹暪别傳曰太祖常行經麥田中令士卒犯麥者死騎士皆下馬持麥以相付時太祖馬騰入麥中勅主簿對以春秋之義罰不加於尊太祖曰制法而自犯之何以率下然孤為軍師不可殺請自}
