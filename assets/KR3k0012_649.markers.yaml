  - {type: variant, offset: 3201, length: 187, content: 歲無能復者納荅曰諸聖制肉刑而漢文擅除已來無勝漢文帝者故不能復非聖人者無法何足為英雄於是陶不能對隱白征西大將軍曰夫政未可立則思制度全育民命富國強兵叛盜之屬斷支而已是好生惡殺叛盜皆死是好殺惡生也斷支若謂之酷截頭更不謂之虐何其乖哉刑罰不中則民無所措手足也蠻夷猾夏則皋陶作士此欲善其末則先制其本也自古多人猶惜民命得以御寇況今千不遺一益宜存在以伐大賊今若得改之則歲活數萬生數亦如之若此, SBCK: 四}
