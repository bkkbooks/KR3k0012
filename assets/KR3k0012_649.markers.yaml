  - {type: variant, offset: 156, length: 2, content: 白虎, SBCK: 義罰不加於尊太祖曰制法而自犯之何以率下然􅀌爲軍師不可殺請自刑因拔劒割髪以置地㑹稽典録曰呉範與鄱陽太守魏騰少相友善騰嘗有罪呉主怒甚敢有諌者死範謂騰曰與汝皆死騰曰死無益何死爲範曰安能慮此坐汝耶乃髠頭自􅅞詣閣下使鈴下以聞鈴下不敢曰必死不可範曰汝有子曰有使汝爲呉範死汝子屬我鈴下曰諾乃排閤入呉主大怒欲􅄬以㦸逡巡走出範因突入叩頭流血言與涕并良乆呉主意釋乃免騰晉律曰髠鉗五􅀊刑張斐律序曰髠者刑之威秋彫落之像後魏書曰李訢􅀒罪得降免有旨鞭髠刑配爲厮􅃥訢之廢也平壽侯張讜見與語竒之謂人曰此佳士也終不乆屈未幾而復爲太倉尚書風俗}
  - {type: page-break, offset: 156, content: '', id: KR3k0012_SBCK_649-2a}
  - {type: variant, offset: 156, length: 2, content: 白虎, krp: 義罰不加於尊太祖曰制法而自犯之何以率下然孤爲軍師不可殺請自刑因拔劒割髪以置地㑹稽典録曰呉範與鄱陽太守魏騰少相友善騰嘗有罪呉主怒甚敢有諌者死範謂騰曰與汝皆死騰曰死無益何死爲範曰安能慮此坐汝耶乃髠頭自縛詣閣下使鈴下以聞鈴下不敢曰必死不可範曰汝有子曰有使汝爲呉範死汝子屬我鈴下曰諾乃排閤入呉主大怒欲投以㦸逡巡走出範因突入叩頭流血言與涕并良乆呉主意釋乃免騰晉律曰髠鉗五歲刑張斐律序曰髠者刑之威秋彫落之像後魏書曰李訢負罪得降免有旨鞭髠刑配爲厮役訢之廢也平壽侯張讜見與語竒之謂人曰此佳士也終不乆屈未幾而復爲太倉尚書風俗}
