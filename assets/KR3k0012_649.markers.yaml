  - {type: variant, offset: 2328, length: 0, content: '', SBCK: 薛安爲楊州從事戴就字景成㑹稽上虞人爲倉曹􅁺受􅂍穢刺史歐陽操遣安檢治栲覆取實安乃収就栲訊五毒乃以針刺就手十指甲使令爬土又燒鐵令赤使挾之肘腋内燋爛肉墮地就乃取而食之終無欵伏安乃覆就於舡下而燒馬糞於舡兩頭熏之火滅謂就巳死發舡視之乃張目謂其主者曰公何不益糞添火而使絶之何也主者乃報安安大驚遂引就共坐談論乃解其事耳㑹稽典録又載又曰遭黨事當考實李膺等案經三府太尉陳蕃却之曰今所考案皆海内人譽憂國忠公之臣此等猶十代宥也豈有罪名不彰而致收掠者乎不肯平署平署猶連署也帝愈怒遂下膺等於黄門北寺獄又曰周紆遷司􅈻校尉六年夏旱駕自幸洛陽録囚徒二人􅀍掠而䖝生者轉􅀐都尉後魏書曰盧度丗以崔浩事弃官逃於髙陽鄭羆家羆匿之使者囚羆長子將加箠楚羆戒之曰君子殺身以成仁汝雖死勿言子奉命遂􅀍考掠至于火䙝其體囚以物故卒無所言度丗後令弟娶羆妹以報其恩又曰尉古真代人也道武之在賀蘭部賀染于遣侯引乞突等將肆逆古真知之宻馳以告染于疑古真泄其謀乃執持之以兩車軸捍其頭傷其目不服乃免之梁書曰梁代舊律測囚之法曰一上起自晡鼓盡于二更及比部郎中泉刪定律令以舊法測立持乆非人所堪分其刻數曰再上廷尉以爲新制過輕請集八座議之尚書周弘正議曰凢小大之獄必應以情豈可恣考掠以制刑罪且測人}
