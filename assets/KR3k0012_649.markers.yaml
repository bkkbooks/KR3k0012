  - {type: variant, offset: 3885, length: 0, content: '', WYG: 書曰盧度世以崔浩事棄官逃於髙陽鄭羆家羆匿之使者囚羆長子將加箠楚羆戒之曰君子殺身以成仁汝雖死勿言子奉命遂被拷掠至乃火􅅡其體因以物故卒無所言度世后令弟娶羆妹以報其恩又曰尉古真代人也道}
