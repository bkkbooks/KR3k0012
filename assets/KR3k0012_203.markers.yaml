  - {type: variant, offset: 1038, length: 344, content: 春追謚后兄儼曰安成郭穆侯封儼世婦劉為東鄉君又追封逸世婦張為安嘉君又曰明元郭皇后西平人也齊王即位尊后皇太后封太后母杜為郃陽君又曰明悼毛皇后河內人黃初中以選入東宮明帝時為平原王進御有寵出入與同輿輦追封后母夏氏為野王君又曰太始三年詔曰漢文追崇靈文之號武宣有平原愽平之封咸所以奉尊尊之敬廣親親之恩宜追封故衛將軍景侯夫人羊氏為平陽君也臧榮緒晉書曰武悼楊皇后廢在金墉城與母高都君龐氏共止高都君臨刑后抱持號叫不食而崩晉中興書曰穆皇后庾氏字文君左將軍琛第三女贈琛為車騎將軍母丘氏封安陽縣君從母荀氏永宣縣君又曰簡文順皇后王氏字蘭始驃騎將軍述之再從妹追贈前夫人成氏東豐縣君後夫人成氏東興君沈約宋書曰孝穆趙皇后諱安宗下邳僮人也父裔永初二年有司奏裔命婦孫可建昌縣君又曰孝穆蕭皇后名文壽蘭陵人父卓初與裔俱贈金紫光祿, SBCK: 置八部}
  - {type: variant, offset: 1038, length: 344, content: 春追謚后兄儼曰安成郭穆侯封儼世婦劉為東鄉君又追封逸世婦張為安嘉君又曰明元郭皇后西平人也齊王即位尊后皇太后封太后母杜為郃陽君又曰明悼毛皇后河內人黃初中以選入東宮明帝時為平原王進御有寵出入與同輿輦追封后母夏氏為野王君又曰太始三年詔曰漢文追崇靈文之號武宣有平原愽平之封咸所以奉尊尊之敬廣親親之恩宜追封故衛將軍景侯夫人羊氏為平陽君也臧榮緒晉書曰武悼楊皇后廢在金墉城與母高都君龐氏共止高都君臨刑后抱持號叫不食而崩晉中興書曰穆皇后庾氏字文君左將軍琛第三女贈琛為車騎將軍母丘氏封安陽縣君從母荀氏永宣縣君又曰簡文順皇后王氏字蘭始驃騎將軍述之再從妹追贈前夫人成氏東豐縣君後夫人成氏東興君沈約宋書曰孝穆趙皇后諱安宗下邳僮人也父裔永初二年有司奏裔命婦孫可建昌縣君又曰孝穆蕭皇后名文壽蘭陵人父卓初與裔俱贈金紫光祿, krp: 置八部}
