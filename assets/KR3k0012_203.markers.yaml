  - {type: variant, offset: 176, length: 24, content: 家之言王莽寵以殊禮賜號義成夫人金印紫綬文軒丹轂顯, SBCK: 姓遭難户口耗少而官吏尚繁}
  - {type: variant, offset: 176, length: 24, content: 家之言王莽寵以殊禮賜號義成夫人金印紫綬文軒丹轂顯, krp: 姓遭難户口耗少而官吏尚繁}
  - {type: variant, offset: 178, length: 399, content: 言王莽寵以殊禮賜號義成夫人金印紫綬文軒丹轂顯於新代唐書曰魏衡妻王氏梓州郪人也武德初薛仁果舊將旁仚地侵掠梁部因獲王氏通而妻之後企地漸強盛衡謀以城應賊企地領眾將趨梁州未至數十里飲酒醉臥王氏取其佩刀斬之攜其首入城賊眾乃散高祖大悅封為崇義夫人又曰咸亨中燕山道揔管右領軍大將軍李謹行大破高麗叛徒於瓠廬河之西俘獲數千人自是平壤餘眾走投新羅時謹行妻劉氏留在代奴城高麗引靺羯攻之劉氏環甲率眾守城久之賊乃退上嘉其功特封為燕郡夫人又曰鄒保英妻奚氏不知何許人也萬歲通天年中契丹賊李盡忠來寇平州保英時任刺史領兵討擊既而城孤援寡勢將欲陷奚氏乃率家僮及城內女丁相助固守賊退所司以聞優制封為誠節夫人又曰王君㚟上嘗於廣達樓引君㚟及妻夏氏設宴賜以帛夏氏亦有戰功故特賞之封為武威郡夫人五代史晉史曰鎮州節度使安重榮妻彭城郡夫人劉氏封魯國夫人南陽郡夫人韓氏封陳國夫人重榮立二嫡妻非禮也朝廷並命之亦非制也郡君漢書曰武帝尊王太后母臧兒為平原君, WYG: ''}
