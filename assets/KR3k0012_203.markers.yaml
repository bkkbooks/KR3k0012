  - {type: variant, offset: 1384, length: 608, content: 妻下邳趙氏封吳郡壽昌縣君唐書曰古玄應妻高氏固守飛狐縣城卒免為突厥所陷下詔曰頃屬默啜攻城咸憂陷沒丈夫固守猶不能堅婦人懷忠不憚流矢由茲感激危城重安如不褒昇何以獎勸古玄應妻可封為徇忠縣君又曰衡方厚妻程氏方厚太和中任邕州都督府錄事參軍為招討使董昌齡誣枉殺之方厚妻程氏力不能免乃抑其哀如非冤者昌齡雅不疑慮聽其歸喪程氏故得以徒行詣闕截耳於右銀臺門告夫被殺之冤御史臺鞠之得實諫官亦有章䟽故昌齡再授譴逐程氏開成元年降勑曰乃者吏為不道虐殺爾夫詣闕申冤徒行萬里崎嶇偪畏濱於危亡血誠既昭幽憤果雪雖古之烈婦何以加焉如聞孤孀無依晝哭待盡俾榮祿養仍錫䟽封可武昌縣君英雄記曰董卓孫女名白時尚未笄封為渭陽君於郿城起壇從廣二丈餘高五六尺使白乘金華青蓋車都尉中郎將刺史二千石在郿者各令乘軒簪筆為白導從之壇上使兄子橫為使者授印綬也潘岳宜城宣君誄曰行成于巳名生於人考終定謚寔曰宣君祝宗蒞事卿相奉引輕車整駕介士列陣鸞輅依容轀車升襯鄉君魏志曰卞隆以后父封睢陽鄉侯隆妻王氏為顯陽君追封隆前妻劉氏為仁慎鄉君后親母故也又曰甄儼孫女為齊王皇后后父巳沒封后母為廣陽鄉君晉書曰立皇后楊氏母太原龐氏為安昌鄉君追外曾祖母故司徒王朗夫人夏氏為滎陽鄉君晉中興書曰哀靖皇后王氏字穆之司徒左長史濛之女也初為瑯琊王妃哀帝即位拜為皇后追贈父濛金紫光祿大夫封晉安縣侯母愛氏為安國鄉君也又曰元敬皇后虞氏字孟母濟陽外黃人也祖壽撫軍大將軍椽父豫太傅參軍中宗之為瑯琊王納后為妃豫妻王氏為邢陽縣君從母, SBCK: ''}
