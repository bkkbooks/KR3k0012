  - {type: variant, offset: 3730, length: 0, content: '', WYG: 賢敢於退不肖内相匡正外相揚美謂之友智足以謀國事行足以為民率仁足以合上下之忻國有法則退而守之君有難則與民死之者大臣也修身正行不愆於鄉曲言語談説不怍於朝廷智䏻不困於事業服一介之使能合兩君之歡執㦸居能舉君之過失不難以死持之者左右之臣也不貪於財不淫於色事君不敢有二心居則不敢泄君之謀君有過失雖不能正諫以其死持之而愁悴有憂色者侍御之臣也唯諛之行唯言之聼睚眦之間事君者厮役也通典曰唐開元年刋定職次著之為格盖尚書省以統㑹衆務舉持綱目門下省以侍從獻替規駮非宜中書省以獻納制册敷揚宣勞秘書省以監録圗書殿中省以供修膳服内侍省以承㫖奉引尚書門下中書秘書殿中内侍凡六省肅清僚庶九等太常光禄衛尉宗正太僕大理鴻臚司農大府為九等五監少府将作國子軍器都水為五監以分理羣司六軍左右羽林左右龍武左右神武為六軍十六衞左右衞左右驍左右武左右威左右領軍左右金吾左右監門左右千牛為十六衞以嚴禁籞太子官一詹事二春坊有左右春坊又有内坊掌聞内事三寺守令率更太僕寺十率左右衞左右司禦左右清道左右監門左右内府凡十率俾有儲宫牧守督護分臨畿服京府置牧餘府州置都督都䕶太守説苑曰應侯與賈子坐聞有鼓琴之聲應侯曰今之琴一何悲也賈子曰夫張急調下故使之悲耳急張者良材也調下者官卑也取夫良材而官卑之安䏻無悲乎應侯曰然仲長子昌言曰官之有級猶階之有等升階越等其歩也亂亂登朝級敗禮傷法是以古人之初任也雖有賢材皆以級賜進焉賈生有言治國取人務在求䏻故裁國之無利器猶鏤以鉛刀而望其切不亦疎乎楊泉物理論曰吏者理也所以理萬機平百揆也武士宰民物猶使狼牧羊鷹養雛也是以人主務在審官擇人李重集雜奏議曰古之聖王建官垂制所以體國經治而功在簡易自帝王而下世有増損舜命九官周分六職秦采古制漢仍秦舊倚丞相任九卿雖置五}
