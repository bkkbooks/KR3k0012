  - {type: variant, offset: 2176, length: 11, content: 武都子師仁年始三歲世充, krp: 之者大臣也脩身正行不愆於郷曲言語談說不怍於朝廷智能不困於事業服一介之使能合兩君之忻執㦸居前能舉君之過失不難以死持之者左右之臣也不貪於財不淫於色事君不敢有二心居則不敢泄君之謀君有過失雖不能正諌}
  - {type: variant, offset: 2182, length: 48, content: 始三歲世充以其年幼不殺使禁掌之乳母王氏號蘭英請髡鉗求入保養世充許之蘭英撫育提攜備盡筋力時喪亂年饑, WYG: 夏置六部大}
  - {type: punctuation, offset: 2185, content: ，, id: KR3k0012_CHANT_203-bkkpn555}
  - {type: 'tls:seg', offset: 2185, content: '', id: KR3k0012_CHANT_203-26a.14}
  - {type: variant, offset: 2189, length: 0, content: '', SBCK: 死持之而愁悴有憂色者侍御之臣也唯䛕之行唯言之聽以睚眦之間事君者厮役也通典曰唐開元中刋定職次著之爲格蓋尚書省以統會衆務舉持綱目門下省以侍從獻替規駮非冝中書省以獻納制􅁽敷揚宣勞祕書省以􅁥録圖書殿中省以供修膳服內侍省以承㫖奉引尚書門下中書祕書殿中内侍凡六省御史臺以肅清僚庻九等太常光禄衛尉宗正太僕大理鴻臚司農太府爲九寺五監少府將作國子軍器都水爲五監以分理羣司六軍左右羽林左右龍武左右神武爲六軍十六衛左右衛左右驍左右武左右威左右領軍左右金吾左右監門左右千牛爲十六衛以嚴其禁禦一詹事府三春坊有左右春坊又有内方掌閣内事三寺守令率更太僕等三寺十率左右衛左右司禦左右清道左右監門左右内凡十率府俾又儲宫牧守督護分臨畿服京府置牧餘府州置都督都護太守說苑曰應侯與賈子坐聞有鼓琴之聲應侯曰今之琴一何悲也賈子曰夫張急調下故使之悲耳急張者良材也調下者官卑也取夫良材而官卑之安能無悲乎應侯曰善仲長子昌言曰官之有級猶階之有等􅂛階越等其歩也亂亂登朝級敗禮傷法是以古人之初仕也雖有賢才皆以級次進焉賈生有言治國取人務在求能故裁國之無利器猶鏤以鈆刀而望其巧不亦踈乎楊泉物理論曰吏者理也所以理萬機平百揆也武士宰民物猶使狼牧羊鷹養鶵也是以人主務在審官擇人李重集􅄂奏議曰古之聖玉建官垂制所以體國經治而功在簡易自帝王而下丗有増損舜命九官周分六職􅁗采古制漢仍􅁗舊􅀝丞相任九卿雖置五曹尚書令僕之職始於掌封奏以宣内外事任尚輕而郡守牧民言故漢宣稱所與爲治唯良二千石其有殊效者輙璽書勉勵或賜爵進秩禮遇豐厚得爲治大體所以逺蹤三代也及至東京雖漸優顯令僕丗爲郡守鍾離意黄香胡廣是也郡守入爲三公虞延第五倫鮑昱是也自魏朝名守杜畿滿寵田預胡質等郡或二十}
