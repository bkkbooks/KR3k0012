  - {type: variant, offset: 2176, length: 11, content: 武都子師仁年始三歲世充, SBCK: 之者大臣也脩身正行不􅄽於郷曲言語談說不怍於朝廷智能不困於事業服一介之使能合兩君之忻執㦸居前能舉君之過失不難以死持之者左右之臣也不貪於財不􅁋於色事君不敢有二心居則不敢泄君之謀君有過失雖不能正諌}
