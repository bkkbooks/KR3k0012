  - {type: variant, offset: 70, length: 2, content: 茍君, SBCK: 無曠庶官天工人其代之位非其人爲空官言人代天理官不可以天官􅀻非其才又曰任官惟賢材左右惟其人臣爲上爲徳爲下爲民言臣奉上布德順下訓民不可官所􅀻任非其人又曰官不及􅀻昵惟其能不加􅀻昵惟能是官爵罔及惡德惟其賢非賢不爵周禮曰惟王建國辨方正位體國經野設官分職以爲民極極中也令天下之人各得其中又周官曰宗伯以九儀之命正􅀖國之位一命受職受職治職事再命受服受服受􅀕衣服爲上士三命受位列位於王臣也王之上士亦三命也四命受器受􅀕器爲上大夫也五命賜則則法也六命賜官此王六命之卿賜官者使得自置其臣治家如諸侯也七命賜國出就侯伯之國八命作牧謂侯伯有功德者加命得專征代於諸侯九命作伯上公有功德者加命爲二伯得征伐五侯九伯也鄭司農云長諸侯爲方伯也尚書大傳曰古者天子三公每一公三卿佐之每一卿三大夫佐之每一大夫三元士佐之故有三公九卿二十七大夫八十一元士所}
