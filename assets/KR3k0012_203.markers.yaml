  - {type: variant, offset: 2231, length: 764, content: 多餓死蘭英扶路乞丐捃拾遇有所得便歸與師仁蘭英唯啖土飲水而巳後詐採拾乃竊師仁歸于京師高祖嘉其義下詔曰師仁乳母王氏慈惠有聞撫鞠無倦提攜遺幼背逆歸朝宜有褒隆以錫其號可封永壽鄉君錫命尚書曰平王錫晉文侯秬鬯圭瓚作文侯之命左傳曰王命尹氏策命晉文公為侯伯錫之大路之服戎路之服彤弓一彤矢百玈弓矢千秬鬯一卣虎賁三百人左傳曰文元年天王使榮叔來錫公命杜預注曰諸侯即位天子錫以命珪合瑞為信若僖二十八年王賜晉侯命亦其比也又曰襄十四年王使劉定公賜齊靈公命曰昔伯舅太公佑我先王股肱周室師保萬民世胙太師以表東海王室之不壞繄伯舅是賴余今命汝環環齊靈公名也茲帥舅氏之典纂乃祖考無忝乃舊勳敬之哉無廢朕命纂繼也因昏而加褒顯傳言王室不能命有功國語曰襄王使邵伯過及內史過賜晉惠公命呂甥卻芮相晉侯不敬晉侯執玉卑拜不稽首內史過歸以告王曰晉不亡其君必無後且呂卻將不免王曰何故對曰夏書有之曰眾非元后何戴后非眾無以守邑邑國在湯誓曰余一人有罪無以爾萬方萬方有罪在子一人在余一人乃我教道之過在盤庚曰國之臧則維汝眾今商書盤庚是也臧善國俗之善則維汝眾歸功天下也國之不臧則維余一人是有逸罰逸過罰罪也國俗之不善則維一人是我有過其罪當在我也如是則長眾使人不可不慎人之所急在大事大事戎祀也先王知大事之必以眾濟故祓除其心以和惠人祓拂也考中度衷以蒞之蒞臨考中省巳之中必以度人之中心恕以臨之也昭明物則以訓之制義庶孚以行之義宜庶眾孚信當制立事宜為眾所信也祓除其心精也精潔考中度衷忠也忠恕也昭明物則禮也制義庶孚信也然則長眾使人之道非精不和非忠不立非禮不順非信不行今晉侯即位而背內外之賂背外不與秦也背內不與里丕田也虐其處者棄其信虐其處者殺里丕之黨不敬王命棄其禮施其所惡棄其忠已所不欲勿施於人所惡於下旡以事上今晉侯皆施之於人故曰棄其忠也以惡實心棄其精實滿四者皆棄則遠不至而近不和矣四者精忠禮信將何以守國古者先王既, WYG: 官}
