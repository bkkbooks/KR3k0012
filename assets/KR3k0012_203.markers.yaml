  - {type: variant, offset: 2997, length: 699, content: 下又崇立上帝明神而敬事之於是乎有朝日月以教人事禮天子以春分朝日以秋分夕月諸侯春秋受職于王以臨其人大夫士曰恪位著以儆其官中庭之左右曰位門屏之間曰著也庶人工商各守其業以共其上猶恐有墜失也故為車服旗章以旌之為班爵貴賤以別之為令聞嘉譽以聲之猶有散遷懈慢而著在刑辟流在裔土於是乎有蠻夷之國有斧鉞刀墨之人而況可以淫縱其身乎夫晉侯非嗣也而得其位嗣適嗣也舋亹怵愓保位戒懼猶曰未也若將廣其心而遠其鄰凌其人而卑其上將何以固守夫執玉卑替其摯拜不稽首誣其王摯替無鎮誣王無人夫天事恒蒙任重享大者必速及故晉侯誣王人亦將誣之欲替其鎮人亦將替之大臣享其祿不諫而阿之亦必及焉襄王三年而立晉侯八年而隕於韓十六年而晉人殺懷公無胄秦人殺子金子公子金呂甥子公卻苪之宇又曰襄王使太宰文公及內史興錫晉文公命上卿逆於境晉侯郊勞館諸宗廟饋九牢設庭燎及期命于武宮設桑主布机筵太宰蒞之晉侯端委以入太宰以王命冕服內史贊之三命而後即冕服既畢賓饗贈餞如公命侯伯之禮而加之以宴好內史興歸以告王曰晉不可不善也其君必霸逆王命敬奉禮義成敬王命順之道成禮義德之則德以道諸侯必歸之且禮所以觀忠信仁義忠所以分也仁所以行也信所以守也義所以節也忠分則均仁行則報信守則固義節則度分均無怨行報無匱守固不偷節度不攜若人不怨而財不匱令不偷而動不攜其何事不濟中能應外忠也施三服義仁也守法不淫信也行禮不疚義也臣入晉境四者不失臣故曰晉侯其能禮矣王其善之樹於有禮艾人必豐王從之使於晉者道相逮及惠后之難王出在鄭惠后惠王之后襄王繼母陳媯有寵生子帶將立子帶未及而卒子帶奔齊王復之又通于襄王之后隗氏王廢隗氏周大夫頹叔姚子奉子帶以翟師伐周王出適鄭處于記事在魯僖二十四年晉侯納之襄王十六年立晉文公二十一年, WYG: 地東西南北部皆}
