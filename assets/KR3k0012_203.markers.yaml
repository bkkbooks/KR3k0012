  - {type: variant, offset: 2192, length: 1, content: 殺, SBCK: 去郡或還不易方此亦古人苟善其事雖没丗不徙官之義也漢魏以來内官之貴於今最隆太始以前多以散官􅀘臺郎亦經􅀘黃門中書郎而今皆數等而後至衆職率亦如此陵遲之俗未及篤尚之風未洽百事等級遂多遷􅀘轉徙如流能否無以著黜陟不得彰此爲治之大弊也漢法官人不得眞秩京房爲魏郡太守以八百石居之魏􅀄用輕貧先亦試守不稱則繼以左遷然則儁才登進無能降退此則所謂有知必試而}
