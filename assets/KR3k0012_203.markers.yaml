  - {type: variant, offset: 4, length: 1, content: 婦, SBCK: 十夏后氏官百殷二百周三百天子立六官三公九卿二十七大夫八十一元士以聽天下之外治以明章天下之男教又王制曰天子百里之内以共官千里之内以爲御謂此地之田稅所給也千里之外設方伯五國以爲屬屬有長十國以爲連連有帥三十國以爲卒卒有正二百一十國以爲州州有伯八州八伯五十六正百六十八帥三百三十六長八伯各以其屬屬於天子之老二}
