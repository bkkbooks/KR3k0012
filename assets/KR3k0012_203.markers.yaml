  - {type: variant, offset: 2979, length: 290, content: 四者精忠禮信將何以守國古者先王既有天下又崇立上帝明神而敬事之於是乎有朝日月以教人事禮天子以春分朝日以秋分夕月諸侯春秋受職于王以臨其人大夫士曰恪位著以儆其官中庭之左右曰位門屏之間曰著也庶人工商各守其業以共其上猶恐有墜失也故為車服旗章以旌之為班爵貴賤以別之為令聞嘉譽以聲之猶有散遷懈慢而著在刑辟流在裔土於是乎有蠻夷之國有斧鉞刀墨之人而況可以淫縱其身乎夫晉侯非嗣也而得其位嗣適嗣也舋亹怵愓保位戒懼猶曰未也若將廣其心而遠其鄰凌其人而卑其上將何以固守夫執玉卑替其摯拜不稽首誣其王摯替無鎮誣王無人夫天事恒蒙任重享大者必速及故晉侯誣王人亦將誣之欲替其鎮人亦將替之大臣享其祿不諫而阿之亦必及焉襄王, SBCK: 太平御覽卷第二百}
