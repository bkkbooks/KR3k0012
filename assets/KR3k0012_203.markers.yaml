  - {type: variant, offset: 61, length: 1, content: 銳, SBCK: 成王旣黜殷命滅淮夷還歸在豐作周官王曰若昔大猷順古大道制治于未亂保􅀖于未危曰唐虞稽古建官惟百內有百揆四岳外有州牧侯伯庶政惟和萬國咸寜夏啇官倍亦克用乂湯禹建官二百亦能用治言不及唐虞之清要今予小子祗勤于徳夙夜不逮立太師太傅太保兹惟三公論道經􅀖爕理隂陽少師少傅少保曰三􅀌貳公􅀪化寅亮天地敬信天地之教冢宰掌􅀖治統百官均四海}
