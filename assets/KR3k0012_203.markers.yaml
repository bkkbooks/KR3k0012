  - {type: 'tls:seg', offset: 51, content: '', id: KR3k0012_CHANT_203-1a.14}
  - {type: variant, offset: 51, length: 1, content: 女, SBCK: 黃帝受命有雲瑞故以雲紀事百宫師長皆以雲爲名號也炎帝氏以火紀故爲火師而火名神農姜姓之祖也有火瑞故以火紀事名官也共工氏以水紀故爲水師而水名共工以諸侯覇九州者在神農前太吴後亦受水瑞以水名官也太暭氏以龍紀故爲龍師而龍名太暭伏羲氏風姓之祖也有龍瑞故以龍命官也我髙祖少暭摯之立也鳯鳥適至故紀於鳥爲鳥師而鳥名自顓頊以來不能紀逺乃紀於近爲民之師而命以民事則爲不能故也又曰國家之敗由官邪也官之失德寵賂彰也尚書堯典曰乃命羲和欽若昊天曆象日月星辰敬授人時羲氏和氏丗掌天地四時之官使敬順天時以授人也分命羲仲宅嵎夷曰晹谷羲仲居治東方之官宅居也東表之地稱嵎夷寅賔出日平秩東作使敬導出日平均次序東作之事以務農也申命羲叔宅南交羲叔居治南方之官南交言夏與春交平秩南訛敬致訛化也平序南方化育之事敬行其教以致其功分命和仲宅西曰昧谷居治西方之官寅餞納日平秩西成餞送也西方万物成平序其政助成物也申命和叔宅朔方曰幽都平在朔易都謂所聚也易謂歳改易於北方平均在察其政以順天常允􅁵百工庻績咸熈定四時成歳以告時授事則衆功皆廣又舜典曰咨四嶽有能􅁬庸熈帝之載􅁬起也有能起發其功廣堯之事也使宅百揆亮采惠疇亮信惠順也使居百揆之官信立其功順其事者誰乎僉曰伯禹作司空禹入爲天}
  - {type: page-break, offset: 51, content: '', id: KR3k0012_SBCK_203-2a}
  - {type: variant, offset: 51, length: 1, content: 女, WYG: 黄帝受命有雲瑞故以雲紀事百官師長皆以雲為名號也炎帝氏以火紀故為火師而火名神農姜姓之祖也有火瑞故以火紀事名官也共工氏以水紀故為水師而水名共工以諸侯霸九州者在神農前太昊後亦受水瑞以水名官也太皥氏以龍紀故為龍師而龍名太皥伏羲氏風姓之祖也有龍瑞故以龍名官也我高祖少皥摯之立也鳯鳥適至故紀於鳥為鳥師而鳥名自顓頊以来不能紀逺而紀於近為民師而命以民事則不能故也又曰國家之敗由官邪也官之失徳寵賂彰也尚書尭典曰乃命羲和欽若昊天厯象日月星辰敬授人時羲氏和氏世掌天地四時之官使敬順天時以授人也分命羲仲宅嵎夷曰暘谷羲仲居治東方之官也東表之地稱嵎夷寅賔出日平秩東作使敬導出日也平均次序東作之事以務農也申命羲叔宅南交羲叔居治南方之官南交言夏與春交平秩南訛敬致訛化也平序南方化育之事敬行其教以致其功分命和仲宅西曰昧谷居治西方之官寅餞納日平秩西成餞送也西方萬物成平序其政以成物也申命和叔宅朔方曰幽都平在朔易都謂所聚也易謂嵗改易於北方平均在其政以順天常允釐百工庶績咸熈定四時成嵗以告時授事則衆功廣也又舜典曰咨四嶽有能奮庸熙帝之載奮起也有能起發其功廣堯之事也使宅百揆亮采惠疇亮信惠順也使居百揆之官信立其功以順其事者也僉曰伯禹作司空伯禹為天}
