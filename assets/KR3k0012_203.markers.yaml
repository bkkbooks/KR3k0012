  - {type: variant, offset: 166, length: 9, content: 崔篆母師氏能通經學, SBCK: 建武六年詔曰}
  - {type: variant, offset: 166, length: 5, content: 崔篆母師氏, WYG: 建武六年詔曰百姓遭難户口耗少而官吏尚繁於是司𨽻州牧條奏并省有四百餘縣吏職減損十置其一漢舊儀曰古法雖聖猶試故設四科之辟一科曰徳行髙妙志節清修二科曰學通行脩經中博士三科曰明曉法令足以決疑}
