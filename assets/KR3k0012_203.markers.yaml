  - {type: variant, offset: 3270, length: 610, content: 年而立晉侯八年而隕於韓十六年而晉人殺懷公無胄秦人殺子金子公子金呂甥子公卻苪之宇又曰襄王使太宰文公及內史興錫晉文公命上卿逆於境晉侯郊勞館諸宗廟饋九牢設庭燎及期命于武宮設桑主布机筵太宰蒞之晉侯端委以入太宰以王命冕服內史贊之三命而後即冕服既畢賓饗贈餞如公命侯伯之禮而加之以宴好內史興歸以告王曰晉不可不善也其君必霸逆王命敬奉禮義成敬王命順之道成禮義德之則德以道諸侯必歸之且禮所以觀忠信仁義忠所以分也仁所以行也信所以守也義所以節也忠分則均仁行則報信守則固義節則度分均無怨行報無匱守固不偷節度不攜若人不怨而財不匱令不偷而動不攜其何事不濟中能應外忠也施三服義仁也守法不淫信也行禮不疚義也臣入晉境四者不失臣故曰晉侯其能禮矣王其善之樹於有禮艾人必豐王從之使於晉者道相逮及惠后之難王出在鄭惠后惠王之后襄王繼母陳媯有寵生子帶將立子帶未及而卒子帶奔齊王復之又通于襄王之后隗氏王廢隗氏周大夫頹叔姚子奉子帶以翟師伐周王出適鄭處于記事在魯僖二十四年晉侯納之襄王十六年立晉文公二十一年以諸侯朝于衡雍且獻楚捷遂為踐土之盟於是乎始霸范曄後漢書曰董昭等欲共進曹操爵國公九錫備物密以訪荀彧彧曰曹公本興義兵以匡振漢朝雖勳庸崇著猶稟忠貞之節君子愛人以德不宜如此事遂寢操心不能平會南征孫權彧勞軍于譙表留彧晉中興書曰烈宗冲幼桓溫威震內外人情噂沓牙生同異謝安與王坦之盡忠匡翼溫諷朝廷欲為九錫使驍騎將軍袁宏具草時溫巳病篤宏以呈安安視輒云不好更改之使彌歷旬日至于溫薨錫命遂寢, SBCK: ''}
