  - {type: variant, offset: 777, length: 260, content: 乂妹封乂妻新平君後遷馮翊君縣君漢書曰王太后微時為金王孫婦婦生在民間蓋諱之也武帝始立韓嫣白之帝曰何為不蚤言乃車駕自往迎之其家在長陵小市直至其門使左右入求之家人驚恐女逃匿床下扶持出拜帝下車立曰大姊何藏之深也載至長樂宮與俱謁太后太后垂涕女亦悲泣帝奉酒前為壽錢千萬奴婢三百人公田百頃甲第以賜姊太后謝曰為帝費因賜湯沐邑號脩成君又曰宣帝賜外祖母號為愽平君以愽平蠡吾兩縣戶萬一千為湯沐邑范曄後漢書曰靈思何皇后追封父真為車騎將軍舞陽宣德侯封后母與為舞陽君魏志曰文德郭皇后安平廣宗人也母董為郡君追改封父永為灌津敬侯世婦董為常陽君又曰青龍二, SBCK: ''}
