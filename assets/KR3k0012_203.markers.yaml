  - {type: variant, offset: 2449, length: 275, content: 公佑我先王股肱周室師保萬民世胙太師以表東海王室之不壞繄伯舅是賴余今命汝環環齊靈公名也茲帥舅氏之典纂乃祖考無忝乃舊勳敬之哉無廢朕命纂繼也因昏而加褒顯傳言王室不能命有功國語曰襄王使邵伯過及內史過賜晉惠公命呂甥卻芮相晉侯不敬晉侯執玉卑拜不稽首內史過歸以告王曰晉不亡其君必無後且呂卻將不免王曰何故對曰夏書有之曰眾非元后何戴后非眾無以守邑邑國在湯誓曰余一人有罪無以爾萬方萬方有罪在子一人在余一人乃我教道之過在盤庚曰國之臧則維汝眾今商書盤庚是也臧善國俗之善則維汝眾歸功天下也國之不臧則維余一人是有逸罰逸過罰罪也國俗之不善則維一人是我有過其罪當在我也如是則長眾使人, SBCK: 常廷尉職}
