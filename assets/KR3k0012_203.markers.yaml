  - {type: variant, offset: 720, length: 662, content: 馬氏無疾而卒肅祖迎母還宮養稱建安君追贈豫章君謚曰恭惠後魏書曰景明初世追舅氏封外祖母蓋氏為清河郡君又曰靈太后臨朝以元乂妹封乂妻新平君後遷馮翊君縣君漢書曰王太后微時為金王孫婦婦生在民間蓋諱之也武帝始立韓嫣白之帝曰何為不蚤言乃車駕自往迎之其家在長陵小市直至其門使左右入求之家人驚恐女逃匿床下扶持出拜帝下車立曰大姊何藏之深也載至長樂宮與俱謁太后太后垂涕女亦悲泣帝奉酒前為壽錢千萬奴婢三百人公田百頃甲第以賜姊太后謝曰為帝費因賜湯沐邑號脩成君又曰宣帝賜外祖母號為愽平君以愽平蠡吾兩縣戶萬一千為湯沐邑范曄後漢書曰靈思何皇后追封父真為車騎將軍舞陽宣德侯封后母與為舞陽君魏志曰文德郭皇后安平廣宗人也母董為郡君追改封父永為灌津敬侯世婦董為常陽君又曰青龍二年春追謚后兄儼曰安成郭穆侯封儼世婦劉為東鄉君又追封逸世婦張為安嘉君又曰明元郭皇后西平人也齊王即位尊后皇太后封太后母杜為郃陽君又曰明悼毛皇后河內人黃初中以選入東宮明帝時為平原王進御有寵出入與同輿輦追封后母夏氏為野王君又曰太始三年詔曰漢文追崇靈文之號武宣有平原愽平之封咸所以奉尊尊之敬廣親親之恩宜追封故衛將軍景侯夫人羊氏為平陽君也臧榮緒晉書曰武悼楊皇后廢在金墉城與母高都君龐氏共止高都君臨刑后抱持號叫不食而崩晉中興書曰穆皇后庾氏字文君左將軍琛第三女贈琛為車騎將軍母丘氏封安陽縣君從母荀氏永宣縣君又曰簡文順皇后王氏字蘭始驃騎將軍述之再從妹追贈前夫人成氏東豐縣君後夫人成氏東興君沈約宋書曰孝穆趙皇后諱安宗下邳僮人也父裔永初二年有司奏裔命婦孫可建昌縣君又曰孝穆蕭皇后名文壽蘭陵人父卓初與裔俱贈金紫光祿, WYG: 置八部}
