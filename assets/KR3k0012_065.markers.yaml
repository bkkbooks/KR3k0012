  - {type: variant, offset: 3184, length: 2, content: 金河, SBCK: 盆水也蕭子顯齊書曰丗祖治湓城得尺五刀十一口永明享曆之數也甘泉水九江圖經曰甘泉水在縣南甘泉驛之南其水味甘飲訖猶有餘香因以名焉其山即曰甘泉山按州圖經云昔山頂有船柂從頂㳂流而下土人亦名爲柂下溪􅁊伊爲江州刺史常遣左右賫粮㝷山之奥兾覩非常乃至一處見有大湖湖側有敗船當時聞有柂流下甚疑惑後聞有􅂳方驗􅁗淮水江寧圖經曰淮水北去縣一里源從宣州東南漂水縣烏刹橋西入百五十里輿地志云􅁗始皇廵㑹稽鑿断山阜此淮即所鑿也亦名􅁗淮孫盛晉春秋亦云是秦所鑿王導令郭璞筮即此淮也又稱未至方山有直瀆行三十許里以地形論之淮發源詰屈不􅀋人功則始皇所掘冝此瀆也丹陽記云建康有淮源出華山入江徐爰釋問云淮水西北貫都輿地志云淮水發源於華山在丹陽湖姑熟之界西北流經建康秣陵二縣之間縈紆京邑之内至于石頭入江懸流三百許里浙江山海經曰浙江出三天子都在率東西北入海餘曁南郭璞注云按地理浙江出黔縣南率中東入海今之浙江是也率即歙耳餘曁縣名虞喜志林注曰今錢塘江口折山正居江中潮水投山下折而曲一云江有反濤水勢折歸故云浙江史記云江水至㑹稽山隂爲浙江是也三江郡國志曰禹貢三江呉郡南松江錢塘江是也禹貢曰三江旣入震澤厎定韋昭曰三江謂呉郡南松江錢塘江浦陽江虞氏志林云江於彭蠡分爲三是即韋􅀃爲謬按江自太湖出于海屈曲七百里出鱸魚即吴左慈爲王釣者縠江輿地志曰縠江其水波瀾交錯狀似羅縠之文因以爲名􅀂下水輿地志曰南岸曰上􅀂北岸曰下􅀂乃村名也村人取􅀂下水以釀酒醇美勝於雲陽呉録曰長城􅀂下酒張恊七命云荆南烏程即此酒也霅水輿地志曰霅水亦􅀂水之異名也水深不可測俗謂之洺水又山海經云浮玉之山茗水出其隂中多鮆魚今亦謂之霅鳥水是也紫溪呉興記曰邑有文山水東南流爲紫溪輿地志云以爲水紫色也又云紫溪中央水有赤色盤石長百餘丈望之如霞名曰赤瀬水公山江水郡國志曰公山江水有橘自然泛來行人噉之恣飽則可將去則病不竭泉永嘉地記曰山北有泉衆泉旱竭此泉不乾故以名山東有瀑布長數十丈遊者云山頂有大湖中有􅀌岩獨立皆號􅀌房臨水湘州記曰臨水經臨賀縣東又南至郡左以合賀水故有臨賀之稱焉靳江湘州記曰靳江在新東縣西八里水出衡山縣界紫嘉山東流入湘江二百八十里昔楚大夫靳向所封之地因以名之資水湘州記曰資水一名茱茰江又水經云資水東北過益陽應劭曰縣在益水之陽今無益水誠資水之殊目郡國志云資水岸有石頭城即呉將周瑜築也枉水湘州記曰枉山在郡東十七里有枉水出焉山西溪溪口有小灣謂之枉渚山上有楚祠存焉沅水水經曰沅水出牂牁且蘭縣爲旁溝水東北至鐔城縣爲沅水又曰沅水之北有竒山山有秀峯上枝緑蘿濛幕頽巖臨水實釣渚漁詠之勝也其幽響􅀂鍾音信神仙之所居滄浪水永初山川記曰漢水古爲滄浪即漁父所云滄浪之水清今滄浪水合流出鐔城北界山此盖後人名之非古滄浪也湘水􅀃文曰湘水出零陵陽海山北入江湘中記曰湘水至清雖深五六丈見底了了然石子如摴蒲矣五色鮮明白沙如雪赤岸如朝霞緑竹生焉上葉甚宻下踈遼常如有風氣淮南子曰所謂樂者豈必躬釣瀟湘水經注曰湘水又經南津城西對橘洲諺曰昭潭無底橘洲浮又按郡國志云湘水邊有水魚山本名立石山髙八十丈闊十里石色黒而重疊毎發一重則有自然魚形女人多刻􅀞爲戯長數寸燒之魚膏腥汨水水經注曰汨水西經玉笥山又西爲屈潭即羅潭也屈原懷沙自沉於此故潭以屈爲名賈􅁩史遷皆甞經此弭檝㳂波投弔於潭五美水湘中記曰五美水在長沙縣東二十五里光武時有五美女居於此溪之側後因爲名灕水臨桂圖經曰灕水出縣南二十里柘山之隂西北流至縣西南合零渠五里始分爲二水昔􅁗命御史監史禄自零陵鑿渠出零陵下灕水是也郡國志稱後漢伏波將軍馬援開湘水爲渠六十里穿度城今城南流者是因􅁗舊瀆耳至寳暦􅀄渠道崩壞舟檝不通觀察使李渤遂疊石造堤分二水毎水置石斗門一使制之在人開􅐬開灕水則全入於桂江擁桂江則盡歸於湘水修仁水始興記曰修仁水西南注連水北有三楓亭五渡水齊范雲爲始興太守至修仁水酌而飲之賦詩曰三楓何習習五渡何悠悠且飲修仁水不挹階邪流慈廉江交州記曰慈廉江者昔有李祖仁居此兄弟十人並慈孝廉讓因此名江太平御覽卷第六十五}
