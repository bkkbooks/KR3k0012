  - {type: variant, offset: 711, length: 222, content: 歐水郭璞注曰金滏水在臨水縣西釜口山經鄴西北至列人縣入于漳其水熱漳水說文曰濁漳水出上黨長子鹿谷山東入清漳清漳出沾山大要谷北入河呂氏春秋曰史起引漳水灌鄴田民初大怨後轉獲利相與歌曰鄴有聖令曰史公決漳水灌鄴旁終古斥鹵生稻梁風土記云南易水本名漳水源出三門山案趙地記云六國時此水名易水埤蒼及水經云洺水之目不知誰改俗謂山之下地名洺水因經之故曰洺水案燕趙記云其分有三易漳為南易水鄴縣圖經曰濁漳水在縣西水東北津有永樂浦浦西五里俗謂為紫陌河北處即俗巫為河伯娶婦處也, SBCK: 渭}
