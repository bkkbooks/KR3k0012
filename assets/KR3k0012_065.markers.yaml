  - {type: variant, offset: 2697, length: 1, content: 決, SBCK: 渭湟河亦名樂都水也縣有土樓山無石而髙在縣南又有養女嶺􅀍羌多禱而祈女又有牛心堆皆湟水源山名江南諸水沮水水經曰沮水出漢中房陵縣淮山東南過臨沮縣至枝江縣入于江注云沮陽縣西北景山即荆山之首也山海經曰金玉是出亦沮水之所導也漳水山海經曰漳水出臨沮縣東荆山東南過蓼亭又南過章郷南至枝江縣北入于沮傳曰江漢沮漳楚之望也王仲宣登樓賦曰夾}
