  - {type: variant, offset: 2629, length: 0, content: '', SBCK: 越嶲粉水導源東流經上粉縣取此水以淘粉則晧曜鮮絜有異衆流故縣人因此取名瀘水十道記曰瀘水出蕃中入黔府歷郡界出拓州至此有瀘津􅀜􅀜上有石峯髙三千丈四時多瘴氣三四月間發人衝之立死非此時中則人多悶吐唯五月上伏即無害故諸葛武侯征越嶲上䟽云五月渡瀘深入不毛之地又按地記云今昆明道渡所見有武侯道在又按十道記云水浚急而多巉石土人以牛皮爲􅊑方渉津涘弱水􅀃文曰弱水自張掖刪丹西至酒泉合􅀺餘波入于流沙􅀇中記曰天下之弱者崑崙之弱水焉鴻毛不能起黒水張掖記曰黒水出縣界雞山亦名􅀇圃昔娀氏女簡狄浴於􅀇丘之水即黒水也}
