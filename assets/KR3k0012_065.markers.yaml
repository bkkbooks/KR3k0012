  - {type: variant, offset: 1981, length: 688, content: 南巡石門石門是晉安平獻王司馬孚之為魏野王典農中郎將之所造也案其表云臣孚言臣被明詔興河內水利臣既到檢行沁水源出銅堤山屈曲周廻水道九百自太行以西王屋以東層巖高峻天時霖雨眾谷走水小石漂迸木門杇敗稻田汎濫歲功不成臣輒案行去堰五里以外方石可得數萬餘枚臣以為累方石為門若天旱增堰進水若天霖雨陂澤充隘則閉方斷水空渠衍澇足以成河雲雨田人經國之謀暫勞永逸聖王所許願陛下特出臣表勑大司農府給人工勿使稽延詔書聽許於是狹岸累石結以為門用代木門矣鴦漿水山海經曰解縣南有壇道山山下有水潛出停而不流俗為鴦漿水發于上而潛于下厥頂方平有良藥石臼河水經注曰漢永平中治呼沱石臼河案司馬彪後漢郡國志常山南行唐縣有石臼谷蓋資承呼沱之水轉山東之費自都盧至羊腸倉將憑汾水以漕太原用實秦晉苦役連年轉運所經凡三百八十九隘死者無筭拜鄧訓為謁者監護水功訓隱括知其難立言肅宗從之全活數千人和喜鄧后之立也訓后叔父以為訓積善所致也滹沱禮曰晉人將有事於河必先有事於滹沱隋圖經曰滹沱在深澤縣界光武為赤眉所追至滹沱河欲渡導吏還乃言水深無船左右懼上使王霸前瞻水霸恐驚眾乃言冰堅可渡北至冰合囊沙布冰上乃渡未畢數車冰陷今名其豦為危渡口是也魏改曰清寧河此水常有蛟入五月恒暴遂變為人於岸上與人并行至懸岸處推之與人俱下衡水信都記曰衡水亦曰長蘆水即濁漳之下流也水有袁潭渡歷下愽城北而逶迤東北注謂之九爭曲水味鹹苦俗稱苦河亦謂之黃漳河是也白溝水信都記曰白溝水地接館陶界隋煬帝導為永濟渠亦名御河南自相州洹水縣界流入又北難河出焉蓋魏時河難所以導以利行故瀆故此瀆有難之稱矣屯氏河注水經曰大河故瀆北為屯氏河漢書溝洫志曰自塞宣坊河復北決於館陶分為屯河氏廣深與大河等鳴犢河, WYG: ''}
