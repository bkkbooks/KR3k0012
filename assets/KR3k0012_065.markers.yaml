  - {type: variant, offset: 3184, length: 2, content: 金河, WYG: 湓浦水也蕭子顯齊書曰世祖治湓城得尺五刀十一口永明享厯之數也甘泉水九江圖經曰甘泉水在縣南甘泉驛之南其水味甘飲訖又有餘香因以名焉其山即曰甘泉山按州圖經云昔山頂有船柂從頂㳂流而下土人亦名為柂下溪桓伊為九江刺史嘗遣左右齎糧尋之山奥冀覩非常乃至一處見有大湖湖側有敗船當時聞有柂流下甚疑惑後聞有船方驗秦淮水江寧圖經曰淮水北去縣一里源從宣州東南溧水縣烏刹橋西八百五十里輿地志云秦始皇廵㑹稽鑿斷山阜此淮即所鑿也故名秦淮水孫盛晉春秋亦云是秦所鑿王導令郭璞筮即此淮也又稱未至方山有直瀆行三十許里以地形論之淮發源詰屈不類人工則始皇掘宜此瀆也丹陽記云建康有淮源出華山入江徐爰釋問云淮水西北貫都輿地志云淮水發源于華山在丹陽湖姑熟之界西北流經建康秣陵二縣之間縈京邑之内至于䂖頭入江懸流三百許里浙江水山海經曰浙江水出三天子都在率東西北入海餘暨南郭璞注云按地理浙江出黟縣南率東南入海今之浙江是也率即歙耳餘暨縣名虞喜志林注曰今錢塘江口折山正居江中潮水投山下折而曲一云江有反濤水勢所歸故云浙江史記云江水至㑹稽山陰為浙江是也三江水郡國志曰禹貢三江謂松江下七十里分流東北入海者為婁江東南流者為東江並松江為三江韋昭曰三江謂吳郡南松江錢塘江浦陽江虞氏志林云江至彭蠡分為三是即韋說為謬按江自太湖出于海屈曲七百里出鱸即吳左慈為王釣者縠江水輿地志曰縠江其水波瀾交錯狀似羅縠之文因以為名若下水輿地志曰南岸曰上若北岸曰下若乃村名也村人取若下水以釀酒醇美勝于雲陽吳録曰長城若下酒張恊七命云荆南烏程即此酒也霅水輿地志曰霅水亦若水之異名也水深不可測俗謂之霅水山海經云浮玉之山苕出其陰中多鮆魚今亦謂之霅烏水是也紫溪水呉興記曰邑有文山水東南流為紫溪輿地志云以為水紫色也又云紫溪中央水有赤色盤䂖長百餘丈望之如霞名曰赤瀬水公山江水郡國志曰公山江水有橘自然泛來行人噉之恣飽則可將去則病不竭水永嘉地記曰山北有泉衆泉旱竭此泉不竭故名之山東有瀑布泉長數十丈逰者云山頂太湖中有孤巖獨立皆號為孤房臨水湘州記曰臨水經臨賀縣東又南至郡左以合賀水故有臨賀之稱焉靳江水湘州記曰靳江水在新東縣西八里水出衡山縣界紫嘉山東流湘江二百八十里昔楚大夫靳尚所封之地因以名之資水湘州記曰資水一名茱茰江水經云資水東北過益陽應劭曰縣左益水之陽今無益水誠資水之殊目郡國志云資水㟁有䂖頭城即吳將周瑜築也枉水湘州記曰枉水在郡東十七里枉水出焉山西漢溪中有小灣謂之枉渚山上有楚祠存焉沅水水經曰沅水出牂牁且蘭縣為旁溝水東北至鐔城縣為沅水又曰沅水之北有竒山山有秀䂖山上㧞縁蘿濛幕頹巗臨水實釣渚漁詠之勝也其迷響若鐘音信為神仙之所居者滄浪水永初山川記曰漢水古為滄浪即漁父所云滄浪之水清兮者今滄浪之水合流出鐔城北界山北蓋後人名之非古滄浪也湘水說文曰湘水出零陵陽海北入江湘中記曰湘水至清雖深五六尺見底了然䂖子如樗蒱又五色鮮明白沙如雪赤岸如朝霞緑竹生焉上葉甚宻下踈寥常如有風氣淮南子曰所謂樂者豈必釣射瀟湘水經注曰湘水又經南津城西對橘洲諺曰昭潭無底橘洲浮郡國志云湘水邊有水魚山本名立䂖山髙八十丈濶十里䂖色黒而重疊每發一重則有自然魚形女人多刻畫為戲長數寸燒之魚膏腥汩水水經注曰汩水西經玉笥山又西為屈潭即汨羅潭是也屈原懐沙自沉于此故潭以屈為名賈誼史遷皆嘗經此弭檝㳂波投弔于潭五美水湘中記曰五美水在長沙縣東二十五里光武時有五美女居于此溪之側後因為名灕水臨桂圖經曰灕水出縣南二十里柘山之陰西北流至縣西南合零渠五里始分為二昔秦命御史監史録自零陵若渠零陵下灕水是也郡國志曰後漢伏波將軍馬援開湘水為渠六十里穿度城今城南流者是因秦􅃇瀆耳至寳厯初渠道崩舟檝不通觀察使李渤遂疊䂖造堤分二水每水置石斗門一使制之在人開閉開灕水則全入桂江擁桂江則盡歸湘水脩仁水始興記曰脩仁水西南注連水北有三楓亭五渡水齊范雲為始興太守至脩仁水酌而飲之賦詩曰三楓何習習五渡何悠悠且飲脩仁水不酌貪泉流慈亷江水交州記曰慈亷江者昔有李祖仁居此兄弟十人並慈孝亷讓因此名江太平御覧卷六十五}
