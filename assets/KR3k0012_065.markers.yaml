  - {type: variant, offset: 965, length: 462, content: 又云漳水出麓谷山與發鳩連麓而在南淮南子謂之發苞山故異名互見也左則陽泉水注之右則散蓋水入焉三源同出一山但以南北為別耳又曰尚書所謂覃懷底績至于衡漳也孔安國曰衡橫也言漳水橫流也易水水經曰易水出涿郡故安縣閻鄉西山燕太子丹曰荊軻入秦不擇日發太子送之於易水之上荊軻起為壽歌曰風蕭蕭兮易水寒壯士一去兮不復還故安圖經曰易水又名安國河亦名北易水汾水說文云汾水出太原晉陽山西南入河山海經曰管涔之山其山無木而下多草其下多玉汾水出焉而流注于河十三州志曰出武周燕之燕京山亦管涔之異名也其山重阜脩層有草木無泉源導於南麓之下說文曰汾水出太原晉陽山西南入河莊子曰堯治天下之民平海內之政往見四子於姑射之山汾水之陽窅然喪其天下焉說苑曰智伯圍趙襄子於晉陽決晉水以灌之晉陽之城不沒者三版智伯曰吾始知水之可以士人國汾水可以灌安邑絳水可以灌平陽淮南子曰汾水濛濁而宜麻水經曰汾水南過冠爵津汾名也在介休縣之西南俗謂之雀鼠谷數十里間道隘水左右悉結編梁閣道累石就路縈帶巖側或去水一丈或高五六丈上戴山阜下臨絕澗俗謂之為魯股橋蓋通古之津隘亦在今之地嶮文水水經曰文水出大陵縣西山文谷, SBCK: ''}
