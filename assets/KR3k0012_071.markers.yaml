  - {type: variant, offset: 2078, length: 1, content: 美, SBCK: 涘波釋名風吹水成文爲瀾瀾連也波體轉流相及連也小波曰淪淪倫也水文相次有倫理也詩曰有豕白蹢烝渉波矣魏志曰魏明帝至廣陵臨江觀兵見濤波汹涌歎曰此天所以限南北也遂歸又曰徐宣從文帝於廣陵六軍乗舟風浪􅁀起帝舩廻倒宣時病在後凌波獨前群僚無至}
