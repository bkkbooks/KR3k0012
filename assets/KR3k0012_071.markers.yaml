  - {type: variant, offset: 1757, length: 0, content: '', SBCK: 腹挂流三四百丈飛湍於林峯表岀望之􅀂懸索注水處石悉成井其深不測也何尚之清暑殿賦曰深波奔上瀑布懸下孫興公天台山賦曰赤城霞起以建摽瀑布飛流而界道笁法真登羅山䟽曰増城縣有石溝深廣三丈有兩瀑布皆同注比溝相傳云是仙人流杯池水温泉華陽國志曰卭都縣南有温水冬夏常熱其源可湯鷄豚下流澡洗治􅀫病餘多􅁖水水神自司不可獩汚及沉亂髪照面使人􅁖疾幽明録曰始興靈水源有湯泉每至霜雪見其上蒸氣髙數十丈生物投之須􅁷便熟呉録曰始興縣有始興山山出温泉可以瀹鷄山海經曰温水出空峒山山在臨汾南入河逕陽北也幽明録曰艾縣輔山有温冷二泉同出一山之足兩泉發源相去數尺熱泉可以瀹鷄冷泉常􅀂冰生博物志曰不周山六川之水温如湯也辛氏三􅁗記曰始皇生時作閣道至驪山八十里人行橋上車行橋下金石柱見存}
  - {type: page-break, offset: 1757, content: '', id: KR3k0012_SBCK_071-2a}
  - {type: page-break, offset: 1757, content: '', id: KR3k0012_SBCK_071-2b}
  - {type: variant, offset: 1757, length: 0, content: '', WYG: 腹掛流三四百丈飛湍於林峯山表望之若懸索注水處石悉成井其深不測也何尚之清暑殿賦曰深波奔上瀑布懸下孫興公天台山賦曰赤城霞起以建標瀑布飛流而界道竺法真登羅山䟽曰增城縣有石溝深廣三丈有兩瀑布皆同注此溝相傳云是仙人流杯池水温泉華陽國志曰卭都縣南有温泉冬夏長熱其源可湯鷄豚下流澡洗治宿病餘多惡水水神自司不可穢汚及沉亂髪照面使人惡疾幽明録曰始興靈水源有湯泉每至霜雪見其上蒸氣髙數十丈生物投之湏㬰便熟吳録曰始興縣有始興山山出温泉可以瀹鷄山海經曰温水出空峒山山在臨汾南入河逕陽北也幽明録曰艾縣輔山有温冷二泉同出一山之庭兩泉發源相去數尺熱泉可以瀹鷄冷泉常有氷生博物志曰不周山六川之水温如湯也辛氏三秦記曰始皇生時作閣道至驪山八十里人行橋上車行橋下金石柱見存}
