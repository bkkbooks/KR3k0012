  - {type: variant, offset: 1317, length: 360, content: 常有紫黃色浮見水上出金之地也益部耆舊傳曰姜詩母好食生魚飲江水詩至誠之感一朝湧泉在於門側流引江魚以結饍羞十洲記曰瀛洲青玉膏山泉如酒味名之為玉泉也玄中記曰東方有柴渚焉在齊國山山泉如井狀深不測至春時雹從井中出出常敗五穀人常以林木柴塞則不出故名為柴渚焉魏土地記曰頌陽縣東八十里有駮牛山山下有百泉競發有一神牛駮身自山而下飲泉竭故山得其名魏記曰洛城東南六十里有涿鹿城城東一里有阪泉泉上有黃帝祠三輔舊事曰昔有犢失母哀鳴甚苦地為發泉因名鳴犢泉今天旱祭之降雨在馮翊又曰姜泉在歧山縣皇甫謚帝王世紀云炎帝神農氏母有喬氏女登為少典妃遊華陽感神而生炎帝長於姜水因以氏焉酈元注水經云炎帝長於姜女即此水是焉義興記曰國山縣有金硎硎中沙石時灼灼如金者舊名金泉時獲真金也漢水記曰漢水有泉方員數十步夏常沸涌望見白氣冲天能差百病常有數百人飲浴之宣城記曰臨城縣南, WYG: ''}
