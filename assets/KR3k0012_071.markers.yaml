  - {type: variant, offset: 2076, length: 0, content: '', SBCK: 魚潜在淵或在於渚又曰鳬鷖在渚公尸來燕來處廣雅曰渚處也晉書曰温嶠至牛渚磯水深不可測丗云其下多恠物嶠遂燬犀角而照之須􅁷見水族覆水竒形異狀或乗車馬著赤衣者嶠其夜夢人謂巳曰與君幽明異路何意相照也意甚􅁖之嶠先有齒疾至是㧞之中風至鎮未旬而卒又曰殷羡建元中爲豫章太守去郡郡人多附書一百餘封行至江西石頭渚岸以書擲水中祝曰沉者自沉浮者自浮殷洪喬非是致書郵故時人號爲投書渚吴興記曰烏程西風渚者防風氏國也幽明録曰淮南牛渚津水極深無可筭計人見一金牛形甚瑰壯以金爲鏁絆文選詩曰􅀟鷰遊蘭渚潏釋名曰潏術也堰使水鬰術也魚梁水碓之􅀋也爾雅曰人所爲曰潏爲舎人曰人力水爲居止沚釋名曰沚也小可以息其止也廣雅同詩曰遡洄從之宛在水中沚又曰菁菁者莪在彼中沚傳曰澗溪沼沚之芼潢汚行潦之水可薦於􅀑神可羞於王公坻􅀃文曰秦謂陵阜曰坻釋名曰坻遟也能小遏水使流遟也賈􅁩􅨱鳥賦曰乗流爰逝􅀆得坻則止湄神仙傳曰河上公漢景帝時結草爲菴於河之湄常讀老子帝不解老子數事遣問公不荅帝駕從之公即躍身空中矣濆􅀃文曰濆水涯也詩曰汝墳道化行也文王之化行乎汝墳之國也遵彼汝墳伐其條枚又曰彼汾沮洳言采其莫涘􅀃文曰涘水涯也詩曰綿綿葛藟在河之涘又曰所謂伊人在}
