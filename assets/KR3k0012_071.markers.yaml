  - {type: variant, offset: 1090, length: 365, content: 泉又曰橫流溪溪水甚小冬夏不乾俗亦為貧泉飲者輒冒於財賄同於廣州石門貪泉矣廉介為二千石則不飲之昔吳隱之挹而不辭豈謂能渝其真乎蓋亦惡其名也又曰汲縣城北三十里有太公泉泉上又有太公廟廟側高林秀木翹楚競茂相傳云太公之故居也又曰土穀縣故城西水源方百步百泉俱出故謂之百脈水又曰霍太山上有岳廟廟甚有靈鳥雀不栖其林猛虎常守其廷又有靈泉供祭事鼓動則泉流聲絕則水竭也又曰長城背山面澤謂之白道城北出有高坂謂之白道嶺沿路唯土穴出泉挹之不窮古詩飲馬長城窟非虛言也風土記曰陽羨縣西南有泉常有紫黃色浮見水上出金之地也益部耆舊傳曰姜詩母好食生魚飲江水詩至誠之感一朝湧泉在於門側流引江魚以結饍羞十洲記曰瀛洲青玉膏山泉如酒味名之為玉泉也玄中記曰東方有柴渚焉在齊國山山泉如井狀深不測至春時雹從井中出出常敗五穀人常以林木柴塞則不出故名為柴渚焉魏土地記曰頌陽縣東八十里有駮牛山, SBCK: ''}
