  - {type: variant, offset: 2028, length: 0, content: '', SBCK: 津澹臺子羽投璧断蛟處酈善長注水經曰舊東郡白馬縣神馬亭有神馬寺去白馬津可二十許里東南去白馬縣故城可五十里開山圖所謂白馬山也山上常有白馬群行悲鳴則河决馳走則山崩又曰吕望東海人也老而無遇以釣竿周吕望行年五十賣食􅁄津七十則屠牛朝歌行年九十身爲帝師又曰弘農郡有竇津􅀃者咸云漢武微行栢谷遇辱感其妻深識旣反厚賚賞焉賜以河津令其鬻渡今竇津是也又曰雲中定襄之間有津曰君子濟昔漢桓帝十三年西幸榆中東行代地洛陽大賈齎金貨隨帝後行夜迷失道徃投津長津長送之渡河賈人卒死津長埋之其子㝷求父䘮發塜舉尸資費一無所損其子悉以金與之津長不受事聞於帝帝曰君子也即名其津爲君子濟又曰河水東北爲長}
  - {type: page-break, offset: 2028, content: '', id: KR3k0012_SBCK_071-4a}
  - {type: variant, offset: 2028, length: 0, content: '', WYG: 津澹臺子羽投璧斷蛟處酈道元水經注曰舊東郡白馬縣神馬亭有神馬寺去白馬津可二十里許東南去白馬縣故城可五十里開山圖所謂白馬山也山上常有白馬羣行悲鳴則河决馳走則山崩又曰吕望東海人也老而無遇以釣干周吕望行年五十賣食棘津七十則屠牛朝歌行年九十身為帝師又曰𢎞農郡有竇津說者咸云漢武㣲行相谷遇辱感竇妻深識既反厚賚賞焉賜以河津令其鬻渡今竇津是也又曰雲中定襄之間有津曰君子津昔漢桓帝三十年西幸榆中東行代地洛陽大賈賫金貨隨帝後行夜迷失道往投津長津長送之渡河賈人卒死津長埋之其子尋求父䘮發塚舉尸資費一無所損其子悉以金與之津長不受事聞於帝帝曰君子也即名其津為君子津又曰河水東北為長}
