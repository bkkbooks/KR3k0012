  - {type: variant, offset: 2076, length: 0, content: '', WYG: 魚潛在淵或在於渚又曰鳬鷖在渚公尸來燕來處廣雅曰渚處也晉書曰温嶠至牛渚磯水深不可測世云其下多怪物嶠遂燬犀角而照之湏㬰見水族覆水竒形異狀或乗車馬著赤衣者嶠其夜夢人謂已曰與君幽明異路何意相照也意甚惡之嶠先有齒疾至是㧞之中風至鎮未旬而卒又曰殷羡建元中為豫章太守去郡郡人多附書一百餘封行至江西石頭渚岸以書擲水中祝曰沉者自沉浮者自浮殷洪喬非是致書郵故時人號為投書渚吳興記曰烏程西風渚者防風氏國也幽明録曰淮南牛渚津水極深無可算計人見一金牛形甚醜因名焉文選詩曰雙鷰逰蘭渚潏釋名曰潏術也堰使水鬰術也魚梁水碓之謂也爾雅曰人所為曰潏沚釋名曰沚止也水可以息其止也詩曰遡洄從之宛在水中沚又曰菁菁者莪在彼中沚傳曰澗溪沼沚之毛潢汙行潦之水可薦於鬼神可羞於王公坻說文曰秦謂陵阜曰坻釋名曰坻遲也能小遏水使流遲也賈誼鵩鳥賦曰乗流爰逝兮得坻則止湄神仙傳曰河上公漢景帝時結草為庵於河之湄常讀老子書帝不解老子數事遣問公不答帝駕從之即躍身空中矣濆說文曰濆水涯也詩曰汝墳道化行也文王之化行乎汝墳之國也遵彼汝墳伐其條枚又曰彼汾沮洳言采其莫涘說文曰涘水涯也詩曰綿綿葛藟在河之涘又曰所謂伊人在}
