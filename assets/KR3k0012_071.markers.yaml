  - {type: variant, offset: 336, length: 751, content: 壁赤柱狀若官府因名龍淵宜都山川記曰鄉下村有淵淵有神龍每旱百姓輒以菵草投淵上流魚死龍怒應時天雨齊地記曰瑯琊臺上有神淵污之則竭齋戒即出莊子曰舜以天子讓其友北人無擇無擇曰異哉欲以其辱污漫我羞之自投於清冷之淵管子曰水出於地而不流者命之曰淵隋巢子曰夏桀德襄岱淵沸尸子曰龍淵有玉英司馬相如上林賦曰舟水更其南紫淵經其北泉水說文曰泉水源也易蒙卦曰山下出泉蒙君子以果行育德詩曰泉水衛女思歸毖彼泉水亦流于淇有懷于衛靡日不思又曰爰有寒泉在浚之下又曰泉源在左淇水在右又曰莫高匪山莫浚匪泉又曰相彼泉水載清載濁又曰原隰既平泉流既清召伯有誠王心則寧又曰觱沸檻泉傳曰鄭伯寘姜氏于城潁而誓之曰不及黃泉無相見也既而悔之潁考叔問公公語其故對曰君何患焉若闕地及泉隧而相見其誰曰不然公從之論語撰考讖曰水名盜泉仲尼不漱應劭漢官儀曰酒泉城城下有金泉味如酒故曰酒泉郡三秦記曰酒泉郡中有井味如酒也晉安帝紀曰吳隱之字處默性廉操桓玄欲救嶺南之獘以隱之為刺史州界有一水父老云飲此水者廉士皆貧隱之始踐境先至水所酌而飲之因賦詩以言志清操逾厲沈約宋書曰王彭盱眙人少喪母元嘉初父又亡家貧力弱營葬鄉人助作磚須得水天旱穿井數十丈無水一旦磚灶前忽生泉用之事畢復竭助者嗟歎隋書曰豆盧勣武帝嗣位拜渭州刺史甚有惠政華夷悅服德澤流行大有祥瑞鳥鼠山谷呼為高武隴其下渭水所出其山絕壁千尋由來乏水諸羌苦之勣馬足所踐忽飛泉涌出有白鳥翔止廳前乳子而後去又有狼見於襄武民為之謠曰我有丹陽山出玉漿濟我民夷神鳥來翔百姓因號其泉為玉漿泉唐書曰安金藏京兆長安人為太常丞初喪母寓葬於都南闕口之北廬於墓側躬造石墳石塔晝夜不息原上舊無水忽有湧泉自出遁甲開山圖榮氏解曰女狄暮汲石紐山下泉水中得月精如鷄子愛而含之不覺而吞遂有娠十四月生夏禹水經注曰若耶溪東又有寒溪溪北有鄭公泉泉方數丈冬溫夏涼漢太尉鄭公弘宿居潭側, SBCK: 鵠}
