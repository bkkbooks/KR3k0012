  - {type: variant, offset: 1984, length: 1, content: 老, SBCK: 見劒但見兩龍各長數丈蟠縈其文章没者懼而返須􅁷光采照水波浪驚沸崔鴻十六國春秋曰石虎起河橋於靈昌津採石爲中濟石無大小下輙隨流用功五百餘萬而終不成虎遣散􅀐侍郎崔收沉璧中流告神巳地震水流莫不傾壞壓死者百餘人虎甚怒乃斬工匠止作而還又曰慕容德正月渡􅀺陽津流澌冰合鄴令韓􅁤言於德曰光武渡呼沲澌冰自合大王濟河天橋自成靈命所扶徴兆巳見德大恱改􅀺陽津爲天橋津}
