  body:
  - {type: variant, offset: 7, length: 0, content: '', SBCK: 五禮賢易曰賁于丘園束帛戔戔又曰康侯用錫馬蕃庶晝日三接尚書曰所寳惟賢則邇人安又曰釋箕子囚封比干墓式啇容閭毛詩曰鹿鳴燕群臣嘉賔也旣飲食之又實幣帛筐篚以將厚意我有嘉賔鼓瑟吹笙吹笙鼓簧承筐是將又曰南山有臺樂得賢也得賢則能爲􅀖家立太平之基周禮曰三年則大比考其德行道藝而興賢者以禮賔之禮記曰賢者狎而敬之又曰天子二代之後尊賢也尊賢不過二代又曰孔子曰吾食於少施氏而飽少施氏食我以禮左傳曰晉伐魯范文子謂欒武子曰季孫於魯相二君矣妾不衣帛馬不食粟可不謂忠乎信讒慝而弃忠良若諸侯何家語曰孔子之鄭遇程子於途傾盖與語盡日而別國語曰勾踐滅吴反至五湖范蠡辭於王曰君王勉之臣不復入於越國矣遂乗輕舟以浮五湖莫知所終極王命工以良金冩蠡之􅃺而朝禮之又令大夫朝之環㑹稽三百里爲蠡地史記曰周公戒伯禽曰我一沐三握髮一飯三起以待士猶恐失天下之賢人又曰子貢所至國君無不分庭與之抗禮又曰鄒奭者齊諸鄒亦頗采鄒術之術以紀文於是齊王嘉之自淳于髠以下皆命曰列大夫爲開第臨康莊之衢又曰魏有隱士曰侯羸爲大梁夷門門者公子聞之於是置酒大㑹賔客坐定公子從車騎虚左自徃迎侯生侯生攝弊衣冠直上上坐公子執轡愈恭又曰成王使由余於秦繆公示以宫室積聚由余曰使􅀑爲之則勞神矣使人爲之亦苦人矣繆公於是與由余曲席而坐傳器而食又曰百里奚曰臣友蹇叔賢而時莫知繆公使人厚幣迎蹇叔以爲上大夫又曰伊尹名阿衡或云處士湯使聘迎之五反然後肯往又曰騮子如燕昭王擁篲先驅請列弟子之坐而受業又曰越石父賢在於縲紲之中晏子出遇之途解左􅆖贖之載歸弗謝入門乆之越石父請絶晏子懼然攝衣冠謝又曰楚威王聞莊周賢使使厚幣迎之許以爲相又曰趙良􅀃啇君曰夫五羖大夫荆之鄙人也聞穆公好賢願見披􅄄食牛朞年穆公知之舉之牛口之下而加百姓之上􅁗國莫敢毀也又曰}
