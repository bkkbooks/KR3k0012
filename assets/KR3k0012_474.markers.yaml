  - {type: variant, offset: 2000, length: 12, content: 自入獄謝惲拔刃自嚮以要惲, SBCK: 師傅之才至矣誠欲興道隗請爲天下之士開路於是燕王置郭隗爲上客又曰宋司城子罕之貴子韋也人與共養出與同衣司城子罕亡子韋不從復召子韋而貴之左右曰君善子韋也亡不後來貴之君獨不愧於君之忠臣乎子罕曰吾唯不用子韋故至於亡今吾之得復尚是子韋之遺德餘教也又曰楊囬北見趙簡子曰臣居郷三逐事君五去聞君好士故走來見簡子聞之絶食而歎左右進諌曰居郷三逐是不容衆也事君五去是不忠上也簡子}
