  - {type: variant, offset: 7, length: 0, content: '', WYG: 五禮賢易曰賁于丘園束帛戔戔又曰康侯用錫馬蕃庶書日三接尚書曰所寶惟賢則邇人安又曰釋箕子囚封比干墓式商容閭毛詩曰鹿鳴燕羣臣嘉賓也既飲食之又實幣帛筐篚以將厚意我有嘉賓鼓瑟吹笙吹笙鼓簧承筐是將又曰南山有臺樂得賢也得賢則能為邦家立太平之基周禮曰三年則大比考其德行道藝而興賢者以禮賓之禮記曰賢者狎而敬之又曰天子存二代之後猶尊賢也尊賢不過二代又曰孔子曰吾食于少施氏而飽少施氏食我以禮左傳曰晉伐魯范文子謂欒武子曰季孫於魯相二君矣妾不衣帛馬不食粟可不謂忠乎信讒慝而棄忠良若諸侯何家語曰孔子之鄭遇程子於途傾葢與語三日而别國語曰勾踐滅吳及至五湖范蠡辭於王曰君王勉之臣不復入越國矣遂乗輕舟以浮五湖莫知所終極王命工以良金寫蠡之狀而朝禮之又令大夫朝之環會稽三百里為蠡邑史記曰周公戒伯禽曰我一沐三握髪一飯三起以待士猶恐失天下之賢人又曰子貢所至國無君不分庭與之抗禮又曰鄒奭者齊諸鄒亦頗采鄒衍之術以紀文於是齊王嘉之自淳于髠以下皆命曰列大夫為開第臨康莊之衢又曰魏有隱士曰侯嬴為大梁夷門監者公子聞之於是置酒大㑹賓客坐定公子從車騎虛左自往迎侯生侯生攝弊衣冠直上上坐公子執轡愈恭又曰戎王使由余於秦繆公示以宫室積聚由余曰使鬼為之則勞神矣使人為人之亦苦矣繆公於是與由余曲席而坐傳器而食又曰百里奚曰臣友蹇叔賢而時莫知繆公使人厚迎蹇叔以為上大夫又曰伊尹名阿衡或云許士湯使聘迎之三反然後肯往又曰騶子如燕昭王擁篲先驅請列弟子之坐而受業又曰越石父賢在於縲紲之中晏子出遇之途解左驂贖之載歸弗謝入門久之越石父請絶晏子瞿然攝衣冠謝又曰周威王聞莊周賢使使厚幣迎之許以為相又曰趙良說商君曰夫五羖大夫荆之鄙人也聞穆公好賢願見被褐食牛期年穆公知之舉之牛口之下而加之百姓之上秦國莫敢毁也又曰}
