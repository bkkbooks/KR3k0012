  - {type: variant, offset: 1947, length: 0, content: '', SBCK: 知之所知也駕車而往蠡知種之必來謂兄㛐曰今日有客願假衣冠有項種至抵掌而談旁人觀者聳聽􅀃苑曰鄒子􅀃梁王曰伊尹有莘氏之勝臣湯立以爲三公管仲城隂之狗盗齊桓以爲仲父百里奚乞食於路穆公委之以致寗戚叩轅行歌桓公任之以國太公望出夫朝歌之屠年七十而相周九十而封齊故詩云綿綿之􅁑在于曠野良工得之以爲絺紘良工}
  - {type: variant, offset: 1947, length: 0, content: '', WYG: 之所知也駕車而往蠡知種之必來謂兄嫂曰今日有客願假衣冠有頃種至抵掌而談旁觀者聳聽說苑曰鄒子說梁王曰伊尹有莘氏之媵臣湯立以為三公管仲城陰之狗盜齊桓以為仲父百里奚乞食於路穆公委之以政寗戚叩轅行歌桓公任之以國太公望出夫朝歌之屠年七十而相周九十而封齊故詩云綿綿之葛在於曠野良工得之以為絺綌良工}
