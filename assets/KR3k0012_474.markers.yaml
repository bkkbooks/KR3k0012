  - {type: variant, offset: 821, length: 286, content: 為人任俠有名項籍滅高祖購求布千金敢舍匿罪三族布匿濮陽周氏周氏曰漢求將軍急且至能聽臣敢進計布許之迺髡鉗布衣褐置廣柳車中而共其家僮數十人之魯朱家所賣之朱家心知其季布也置田舍乃之雒陽見汝陰侯滕公說曰季布何罪臣各為其主項氏臣豈可盡誅耶今上始得天下而以私怒求一人何示不廣且以季布之賢漢求之急如此不北走胡則南走越耳夫忌壯士資敵國此伍子胥所以鞭平王之墓也君何不從容為上言之滕公心知朱家大俠意布匿其所乃許諾侍間果言如朱家指上乃赦布又曰布弟季心氣蓋關中遇人恭謹為任俠方數千里士爭為死又曰孝文時鄭當時以任俠自喜孝景時為太子舍人每五日洗沐常置驛馬長安郊請謝賓客夜以繼日常恐不遍當時好黃老其知友皆, SBCK: 告}
