  - {type: variant, offset: 1907, length: 2, content: 郅惲, SBCK: 顯宗以張酺授皇太子經爲東郡太守元和二年東廵狩幸東郡引酺及門生并郡縣􅁺吏並㑹夜中帝先備弟子}
  - {type: variant, offset: 1907, length: 2, content: 郅惲, WYG: 顯宗張以酺授皇太子經為東郡太守元和二年東廵狩幸東郡酺引及門生并郡縣掾吏並㑹庭中帝先備弟子}
