  - {type: variant, offset: 1913, length: 0, content: '', WYG: 曰禹見耕者五耦而式過十室之邑而下見山仰之見谷俯之備有道德之人避俗之士也淮南子曰淮南王安養士數千人其中高才八人又曰一目之羅不可以得鳥無餌之鈎不可以得魚遇士無禮不可以得賢呂氏春秋曰魏文侯見叚干木立倦而不敢息及見翟璜踞於堂而與之言翟璜不悅文侯曰叚干木官之則不肻禄之則不受今汝欲官則相至欲禄則上卿既受吾爵又責吾禮無乃難乎韓詩外傳曰周公攝天子位七年布衣之士執贄所師見者十人所友見者十二人窮巷白屋所先見者四十九人時進善者百人教士者千人官朝者萬人當此之時誠使周公驕而且吝則天下賢士至者寡矣又曰楚襄王遣使者持金千斤白璧百雙聘莊子欲以為相莊子曰獨不見太廟之牲乎衣以文繡食以芻豢出則清道而行止則居帳之内此豈不貴乎乃其不免於死宰執旌居前或持在後當此之時雖欲為孤犢從雞䑕遊豈可得乎僕聞之左手據天下之國右手刎其頸愚者不為也環濟吳記曰皇太子登字子高上為選置師傅妙簡俊秀於是諸葛恪}
