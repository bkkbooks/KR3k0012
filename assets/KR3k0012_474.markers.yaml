  - {type: variant, offset: 1911, length: 0, content: '', SBCK: 諸侯豈此板謁所可光飾哉但主簿奉書致羊酒之禮又曰太祖北征柳城過􅃰郡令曰比中郎將盧植名著海内舉爲儒宗乃國之棟幹也􅀌到此州嘉其餘風春秋之義賢者之後有異於人亟遣丞􅁺修飾墳墓并致薄酹以彰厥德又曰王粲徙長安左中郎將蔡邕見而竒之時邕才學顯著貴重朝廷常車􅀐瑱巷賔客盈座聞粲在門倒屣迎之粲至年旣㓜弱容狀短小一坐盡驚邕曰此王公孫有異才吾不如也吾家書籍文章盡當與呉志曰孫䇿得張昭甚恱謂曰吾方有事於四方待子不得輕矣乃上爲校尉待以師友之禮又曰頋邵年二十起家爲豫章太守下車禮先賢徐孺子之墓優待其後又曰吕蒙疾發孫權迎置内廐欲數見又恐其勞動常穿壁瞻之又曰太守王明以虞翻爲功曹孫䇿征會稽復命爲功曹待以交友之禮蜀志曰先主得諸葛亮情好日宻􅀜羽張飛不恱先主解之曰􅀌之有孔明猶魚之有水也又曰諸葛亮表曰先帝不以臣卑鄙猥自枉屈三顧臣於草廬之中諮臣以當丗之務蕭子雲晉書曰明帝以太常桓榮爲五更躬式其閭親行養老之禮崔鴻北凉録曰且渠蒙遜令曰秘書郎中燉煌劉彦明學冠當時道先區内可授􅀇虚先生拜以三老之禮起陸沉觀於東苑以處之崔鴻前凉録曰宋纎字令文不應州郡辟命唯與隂顒齊好友善太守楊宣􅀞其象於閤出入視之崔鴻前􅁗録曰符堅要結英豪王景畧吕婆樓强汪梁平等皆有王佐之才堅並傾身禮之以爲股肱羽翼管子曰桓公在位管仲隰朋侍立有間二鴻飛而過桓公歎曰仲父今彼鴻鵠有時而南有時而北有時而往有時而來寡人之有仲父猶飛鴻之有羽翼孔藂子曰子魚居衛與張耳陳餘相善㑹陳勝呉廣自立爲王耳餘並爲之將遂言之陳王大恱遣使者齎千金加束帛以車三乗迎之子魚遂往陳王郊迎而執其手議時務孟子曰舜見帝帝館於貳室迭爲賔主是天子而交疋夫用下敬上謂之貴貴用上敬下謂之尊賢其義一也韓子曰文王伐崇與大夫謀襪係解視左又曰齊桓公時有處士小臣稷桓公三往見之不得見公曰吾聞布衣之士而輕爵禄雖萬乗無以異萬乘之主不好仁義亦無以下布衣之士於是五往乃得見}
