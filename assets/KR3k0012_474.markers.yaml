  - {type: variant, offset: 1948, length: 1, content: 悲, SBCK: 得枯死於地又曰齊桓公設庭燎爲士之欲造者朞年而士不至東野鄙人有以九九之術見者桓公曰九九足以見乎對曰臣非以九九爲足以見也臣聞主君設庭燎以待士朞年而士不至夫士之所以不至者君}
