  - {type: variant, offset: 401, length: 228, content: 報韓傫者至齊人言聶政勇敢士也避仇隱於屠肆之間嚴遂陰交於政以意厚之政母死既喪除政曰嗟乎政乃市井之人鼓刀以屠而嚴仲子乃諸侯之卿相也不遠千里枉車騎而交臣舉百金為親壽我雖不受然是深知政也至濮陽見嚴仲子曰前日所以不許子曰徒以親也親今不幸死仲子所欲報者為誰仲子具告之政獨行拔劍至韓韓適有東孟之會韓王及相皆在焉持兵戟而衛者甚眾政直入上階刺韓傫傫走而抱哀侯聶政刺之兼中哀侯左右大亂又史記曰大史公曰吾嘗過薛其俗閭里多暴桀子弟與鄒魯殊問其政曰孟常君招致天下任俠姦人薛中蓋六萬家, SBCK: 逝}
