  - {type: variant, offset: 1914, length: 2, content: 父及, SBCK: 休頋譚陳表等以選入侍誦講詩書其待接僚屬以布衣之禮與休譚等咸同輿而載或共床而􅆍劉縚先聖本紀曰伊尹耕於有莘之野王馳往見之彭氏子諌曰伊尹賤人可徒致之君無辱車乗王曰夫一草之本可巳天子病者天子難欣喜食之子誠不欲樂人病也遂黜彭氏之子皇甫士安髙士傳曰老萊子楚人耕於蒙山之陽雚葭爲牆蓬爲屋板木爲床蓍艾爲席或言楚王楚王遂至老萊子之門曰寡人愚陋獨守宗廟先生幸臨之老莱子曰僕山野之人不足以守政又曰亥唐者晉人也晉平公時朝多賢臣祁奚趙武師曠}
