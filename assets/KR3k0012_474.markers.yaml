  - {type: variant, offset: 659, length: 171, content: 甯成抵罪得脫乃詐刻傳出關歸家稱曰仕不至二千后賈不至千萬安可比人乎乃貫貸買陂田千餘頃役使數千家數年產至千金為任俠其役民重於郡守又曰列國時魏有信陵趙有平原齊有孟嘗楚有春申皆藉王公之勢悉為遊俠鷄鳴狗盜無不賓禮而趙相虞卿棄國捐君以周窮支魏齊之厄信陵無忌竊符矯命殺將專師以赴平原之急皆以取重諸侯顯名天下搤腕而遊談者以四豪為稱首又曰季布為人任俠有名項籍滅, WYG: ''}
