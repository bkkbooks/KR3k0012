  - {type: variant, offset: 1115, length: 4, content: 袁盎為楚, SBCK: 武帝􅀄即位王臧迺上書請立明堂以朝諸侯不能就其事乃言師申公於是上使使束帛加璧安車以蒲裹車輪駕四馬迎申公弟子二人乗軺傳從至見上問治亂之事申公時巳八十餘對曰爲治者不至多言頋力行何如耳以爲太中大夫舎魯邸議明堂事又曰御史大夫朱愽奏王莽爲庻人莽就國南陽太守以莽貴重選門下椽孔休守新都}
