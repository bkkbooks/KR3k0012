  - {type: variant, offset: 90, length: 309, content: 楚田仲以俠聞父事朱家田仲死而有雒陽劇孟以任俠顯吳楚反時條侯為太尉乘傳東至河南得劇喜曰吳楚舉大事而不求孟吾知其無能為也天下騷動宰相得之若一敵國而劇孟行大類朱家孟母死自遠方送喪車蓋千乘又曰郭解河內軹人字伯翁善相者許負外孫也解父以任俠孝文時誅死解為人短小精悍不飲酒少時陰賊感慨不快意身所役甚眾以軀借交報仇藏亡令作姦剽劫休乃鑄錢掘冢不可勝數年長更折節為儉以德報怨厚施薄望然其自喜為俠益甚解姊子負解之勢與人飲使之嚼徐廣曰盡酒也音子妙反非其任強灌之人怒拔刀刺殺解使人徵之賊窘自歸且以實告解解曰公殺人當吾兒不直遂去諸公聞之皆多解之義益附焉戰國策曰韓傫相韓嚴遂重於君二人相害也嚴遂正議直指舉韓傫之過韓叱之於朝嚴遂拔劍趍之於是懼亡去求人, SBCK: ''}
