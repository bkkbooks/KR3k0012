  - {type: variant, offset: 1907, length: 2, content: 郅惲, krp: 顯宗以張酺授皇太子經爲東郡太守元和二年東廵狩幸東郡引酺及門生并郡縣掾吏並㑹夜中帝先備弟子}
  - {type: variant, offset: 1910, length: 0, content: '', SBCK: 儀使酺講尚書一篇然後脩君臣之禮賞賜殊特又曰和帝永元三年詔曰髙祖功臣蕭曹爲首有傳丗不絶之義曹相國容城侯無嗣朕甚閔焉望長陵東門見二臣之墓生旣有節終不逺身可遣使者以中牢祠大鴻臚悉求近冝爲嗣者又曰永平中江革爲五官中郎將朝會帝詔使虎賁迎扶腋革每進拜上輙自禮之小有疾輙太官送食寵遇甚厚京師貴戚衛尉順陽侯馬廖侍中竇憲等各奉書致禮遺革終不發書無所當受上以此重之又曰東平憲王蒼上書表薦名士左馮翊桓虞等虚巳禮下與叅政事又曰上還幸􅀕遵營時遵病上爲重茵席覆以御盖又曰東平憲王蒼開東閤延英雄􅀽宏後漢記曰崔駰詣竇憲始及門憲倒屣迎之曰吾受詔交公公何得薄哉魏志曰文帝引故漢太尉楊彪待以客禮詔曰乃祖以來丗著名節年過七十行不踰涯可謂老成人矣所冝寵異以彰舊德其賜公延年杖又曰太祖北征烏丸未至先遣使辟田疇又命由豫喻指疇戒其門下趍治裝門人謂曰昔􅀽公慕君禮命五至君義不屈今曹公使一來而君􅀂恐弗及者何也疇嘆而應之曰此非君所識遂隨使者到軍署司空户曹􅁺引見諮談明日出令曰田子泰非吾所冝吏者即舉茂才隨軍又曰管寕遇天下亂徃遼東投公孫度度虚舘以待之又曰鉅鹿張臶字子明養志不仕廣平太守盧毓到官三日綱紀白承前致板謁致毓教曰張先生所謂上不事天子下不}
