  - {type: variant, offset: 1943, length: 1353, content: 謝莊為都官尚書奏改定刑獄曰舊官長竟囚畢郡遣督郵案驗仍就施刑督郵賤吏非能異於官長雖有案驗之名而無研窮之實愚謂此制宜革自今入重之囚縣考正畢以事言郡并送囚身委二千石親臨覆辯必收聲吞亹然後就戮若二千石不能決乃度廷尉神州統外移之剌史有疑亦歸臺獄必令死者不怨坐者無恨又曰沛郡相縣唐賜往比村彭家飲酒還因得病吐蠱䖝二十餘物賜妻張從賜臨終言死後親刳腹視五藏悉縻碎以張忍行刳剖賜子副又不禁止論妻傷夫五歲刑子不孝父母棄市並非科例三公郎劉勰議賜妻痛往遵言兒識謝及理孝事源存心非忍害謂宜哀矜顧覬之議以為妻子而行忍酷不宜曲通小情謂副為不孝張同不道詔如覬之議隋書曰裴蘊授御史夫夫與裴矩虞世基參掌機密善候伺人主微意若欲罪者則曲法順情假成其罪所欲宥者則附從輕典因而釋之是後大小之獄皆以付蘊憲部大理莫敢與奪必稟進止然後決斷蘊亦機辯所論法理言若懸河或重或輕皆由其口剖析明敏時人不能致詰又曰裴政為少司憲用法寬平無有冤濫囚徒犯極刑者乃許其妻子入獄就之至冬將行決皆曰裴大夫致我於死死無所恨其處法詳平如此又曰郎茂衛國令時有繫囚二百茂親自究審數日釋免百餘人歷年辭訟不詣州省魏州剌史元暉謂茂曰長史言衛國民不敢申訴者畏明府耳茂進曰民猶水也法令為隄防隄防不固必致奔突茍無決溢使君何患哉暉無以應之又曰于仲文字次武為安固太守始州剌史屈突尚宇文護之黨也先坐事下獄無敢繩者仲文至郡窮治遂竟其獄蜀中為之語曰明斷無雙有于公不避強禦有次武未幾徵為御正下大夫又曰梁敬真大業之世為大理司直時帝欲成光祿大夫魚俱羅之罪令敬真治其獄遂希旨陷之極刑未幾敬真有疾見俱羅為之厲數日而死唐書曰貞觀初太宗謂侍臣曰死者不可再生用法務從寬恕古人云賣棺者願歲之病非憎於人利棺之售耳今司覆一獄必求深刻欲成其考課作何道理令得平允侍中王珪曰但任公正善人為法官若斷獄允當則增祑賜金如此則姦偽息矣太宗曰古者斷獄必訊於三槐九棘之官今三公九卿是也今後大辟罪結正更取公卿議之如是四年斷死刑二十九人天下幾致刑措矣又曰吏部尚書長孫無忌嘗被召不解佩刀入東上閤門待罪僕射封德彝議云監門校尉不之覺罪當死無忌誤帶刀入罰銅二十斤從之大理卿帶胄執奏曰校尉不覺與無忌帶入同為誤耳臣子之於尊極不得稱悞准律云供御湯藥飲舟舡悞不如律者皆死陛下若錄其功非憲司所決若當據法罰銅未為得理太宗嘉之免校尉死又曰李日知天授中遷司刑丞時用法嚴急日知獨寬平無冤濫嘗免一死囚少卿胡元禮斷請殺之與日知往復至于數四元禮怒曰元禮不離刑曹此囚終無生禮荅曰日知不離刑曹此囚終無死法竟以兩狀列上日知果直又曰潤州剌史竇孝諶妻龐氏為奴誣告云夜解祈福則天令給事中薛季昶鞠之季昶斷鍊成其罪龐氏坐斬侍御史徐有功執論龐氏罪不至死季昶又劾有功黨惡逆法司結刑有功當棄市方視事令史垂泣以告有功曰豈吾獨死諸人長不死耶乃徐起而歸則天覽法司所劾召有功誥之曰卿此斷獄失出何多耶對曰失出臣下之小過好生聖人之大德願陛下捨小過弘大德則天下幸甚則天默然龐氏竟減罪流干嶺表又曰杜景佺為司刑丞天授年與徐有功來俊臣侯思正專理制獄時人稱云遇徐杜者必生遇來侯者必死又曰李勉為膳部員外時關東獻俘百人詔並處斬囚有仰天歎者勉偶過問之對曰某被脅制守官非逆者勉哀而上言曰元惡未殄遭點污者半天下皆欲澡心歸化若盡殺之是驅天下以資兇逆也肅宗遽令奔騎宥釋由是歸化日至又曰顏真卿為監察御史五原有冤獄久不決真卿至辨之天方旱獄決乃雨郡人呼, WYG: 孔琳}
