  - {type: variant, offset: 1277, length: 0, content: '', SBCK: 支解之晏子左手持頭右手磨刀仰面而問曰古者明王毎支解人不審從何支始也景公離席曰縱之罪在寡人禮曰子夏䘮其子而䘮其明曽子弔之曰吾聞之朋友䘮明則􅂘曽子􅂘子夏亦􅂘曰天乎予之無罪也曽子怒曰啇汝何無罪吾與汝事夫子於洙泗之間退而老於西河之上使西河之民疑汝於夫子尓罪一也䘮尓親使民未有聞焉尓罪二也䘮尔子而䘮尓明尓罪三也汝何無罪與子夏投其杖而拜之曰吾過矣吾過矣傳曰􅁗伯素服郊次向師而􅂘曰􅀌違蹇叔以辱二三子􅀌之罪也不替孟明􅀌之過也又曰潞子嬰兒之夫人晉景公之姊也鄷舒爲政而殺之又傷潞子之目晉侯將伐之大夫皆曰不可鄷舒有三儁才儁絶異言有藝勝人者三也伯宗曰必伐之狄有五罪不祀一也􅄝酒二也弃仲章而奪􅀺氏地三也仲章路賢人􅀺氏黎侯也虐我伯􅁎四也傷其君目五也怙其雋才而不以茂德滋益罪也又曰衛獻公使祝宗告亡且告無罪告宗廣也定姜曰有罪􅀂何告無罪舎大臣而與小臣謀一罪也先君有冢卿以爲師保而蔑之二罪也余以巾櫛先君而􅁀妾使余三罪也告亡而巳無告無罪又曰吴公子札自衛過晉將􅀫於戚聞鍾聲焉曰異哉吾聞之辯而不德必加於戮矣夫子􅀗罪於君是以在此懼猶不足而又何樂又曰鄭公孫黒將作乱子産使吏數之曰伯有之乱以大國之事而未尓討也爾有乱心無厭國不汝堪專伐伯有而罪一也昆弟争室而罪二也董隧之盟汝矯君位而罪三也有死罪三何以堪之又曰陳侯之弟招殺太子偃師罪在招也楚人執陳行人于徵師殺之罪不在行人也論語曰公冶長曰子謂公冶長可妻也雖在縲絏之中非其罪也以其兄之子妻之又堯曰曰朕躬有罪無以萬}
