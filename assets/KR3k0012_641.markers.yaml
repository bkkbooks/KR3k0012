  - {type: variant, offset: 3623, length: 217, content: 今婿自辱其父非姑所使君子之於凡庸不遷怒況所尊重乎當減死論又曰趙相汝南李統為冀牧阮況奏統耳目不聰宜免職任無幾冀州有疑獄章帝問統統處當剋厭上心帝曰君大聰明剌史不親君耳即日免況拜統侍中董仲舒決獄曰甲父乙與丙爭言相鬥丙以佩刀剌乙甲即以杖擊丙誤傷乙甲當何論或曰毆父也當梟首議曰臣愚以父子至親也聞其鬥莫不有怵悵之心扶伏而救之非所以欲詬父也春秋之義許止父病進藥於其父而卒君子原心赦而不誅甲非律所謂歐父也不當坐又曰甲夫乙將舡會海盛風舡沒溺流死亡不得葬, SBCK: 太平御覽卷第六百}
