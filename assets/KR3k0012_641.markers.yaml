  - {type: variant, offset: 1116, length: 0, content: '', SBCK: 穆紹與元順侍坐因論之同先有近宅與紹紹頗欲爲言順勃然曰盧同終將無罪太后曰何得如侍中之言順曰同好宅與要勢侍中豈有罪也紹慙不敢復言唐書曰太宗即位務止姧忒風聞諸曹案典多不受賂乃遣左右試}
  - {type: variant, offset: 1116, length: 0, content: '', krp: 穆紹與元順侍坐因論之同先有近宅與紹紹頗欲爲言順勃然曰盧同終將無罪太后曰何得如侍中之言順曰同好宅與要勢侍中豈有罪也紹慙不敢復言唐書曰太宗即位務止姧忒風聞諸曹案典多不受賂乃遣左右試}
  - {type: variant, offset: 1117, length: 1, content: 謁, SBCK: 財物遺之有司門下令吏受饋絹一疋太宗怒將殺之裴矩進諌曰此人受賂誠合重誅但陛下試之即行極法所謂䧟其入罪恐非導德齊禮之義也太宗納之又曰開元十年武強令裴景仙犯乞取􅂍積絹五千疋事發景仙逃走吏捕得之玄宗怒命集衆决殺大理卿李朝隱奏曰裴景仙縁是乞􅂍犯不至死又景仙曽祖故司空寂徃属締構首豫元勲載􅀄年中家䧟非罪凡有兄弟皆􅀍誅夷唯景仙獨存今見承嫡據􅂍未當死坐有犯猶入議條十代宥賢功多冝録一門絶祀情或可哀詔不許朝隱復奏曰有斷自天處之極法生殺之柄人主合專輕重有條臣下當守枉法}
