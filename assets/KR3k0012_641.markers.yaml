  - {type: variant, offset: 1277, length: 0, content: '', WYG: 支觧之晏子左手持頭右手磨刀仰面而問曰古者明王每支解人不審從何始也景公曰縦之罪在寡人禮曰子夏䘮其子而䘮其明曽子弔之曰吾聞之朋友䘮明則哭之曾子哭子夏亦哭曰天乎予之無罪也曾子怒曰商汝何無罪也吾與汝事夫子於洙泗之間退而老於西河之上使西河之民疑汝於夫子爾罪一也䘮爾親使民未有聞焉爾罪二也䘮爾子䘮爾明爾罪三也汝何無罪與子夏投其杖而拜曰吾過矣吾過矣傳曰秦伯素服郊次向師而哭曰孤違蹇叔以辱二三子孤之罪也不替孟明孤之過也又曰潞子嬰兒之夫人晉景公之姊也鄷舒為政而殺之又傷潞子之目晉侯将伐之大夫皆曰不可鄷舒有三雋才言其材藝勝人有三也伯宗曰必伐之狄有五罪不祀一也嗜酒二也棄仲章而奪黎氏地三也仲章狄賢人黎氏黎侯也虐我伯姬四也傷其君目五也怙其雋才而不以茂徳滋益罪也又曰衛獻公使祝宗告亡且告無罪告宗廟也定姜曰有罪若何吿無舎大臣而與小臣謀一罪也先君有冡卿以為師保而蔑之二罪也余以巾􅌨侍先君而暴妾使余三罪也告亡而已無告無罪又曰吴公子札自衛過晉将宿於戚聞鐘聲焉曰異哉吾聞之辯而不徳必加於戮夫子獲罪於君以在此懼猶不足而又何樂又曰鄭公孫黒将作亂子産使吏數之曰伯有之亂以大國之事而未爾討也爾有亂心無厭國不汝堪專伐伯有而罪一也昆弟争室而罪二也薫隧之盟汝矯君命而罪三也有死罪三何以堪之又曰陳侯之弟招殺太子偃師罪在招也楚人執陳行人于徴師殺之罪不在行人也論語曰子謂公冶長可妻也雖在縲絏之中非其罪也以其子妻之又曰朕躬有罪無以萬}
