  - {type: variant, offset: 1108, length: 7, content: 寒朗字伯奇永平, krp: 崔光韶遷廷尉卿時祕書監祖瑩以贓罪𬒳劾光韶欲置之重法太尉城陽王徽吏部尚書李神雋皆爲瑩求寛光韶正色曰朝賢執事於舜之功未聞有一如何反爲罪人言乎北史曰後魏就德於營州反使尚書盧同徃討之敗而還属侍}
