  - {type: variant, offset: 403, length: 237, content: 秩千石主倉穀物職如司農少府擬廷尉也蜀志曰譙周字尹南後主為太子以周為家令後主時頗出遊觀增廣聲樂周上諫曰昔王莽之敗豪桀並起跨州據郡欲併神器於是賢才智士思望歸未必以其勢之廣狹唯其德之薄厚也宋書曰太子家令主內茵蓐床机諸供中之物又知官奴婢月用錢內庫米塩車牛刑獄唐書官品志曰家令掌刑法食膳倉庫什物奴婢等事太子僕六典曰太子僕之職掌車輿乘騎儀仗之政令及喪葬之禮物卞其次敘與其出入而供給之皇太子之車輅三一曰金輅二曰軺輅車三曰四望凡皇太子備禮而出則率廄牧令進輅僕親馭焉後漢書太子少傅屬官有太子僕, SBCK: ''}
