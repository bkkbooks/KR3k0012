  - {type: variant, offset: 679, length: 0, content: '', SBCK: 宋國􅀄建當置郞中令髙祖難其人謂傅亮曰今用郎中令不可减􅀽曜卿也旣而曰吾得其人矣乃以王惠居之續搜神記曰㑹稽朱弼爲王國郎中令營立第舎未成而卒同郡謝子木代其事以弼死亡乃定簿書多張功費長百餘萬以其贓誣弼而實入子木子木夜寢忽聞有人道弼姓字者俄頃而到子木堂前立謂之曰卿以枯骨腐􅁏專可得誣當以某日夜更相書言終忽然不見陸機詣呉王表曰臣夲吴人靖居海隅朝廷欲抽引逺人綏慰遐外故}
  - {type: page-break, offset: 679, content: '', id: KR3k0012_SBCK_248-6b}
  - {type: variant, offset: 679, length: 0, content: '', WYG: 宋國初建當置郎中令髙祖難其人謂傅亮曰今用郎中令不可減袁耀卿也既而曰吾得其人矣乃以王惠居之續捜神記曰㑹稽朱弼為國郎中令營立第舍未成而卒同郡謝子木代其事以弼死亡乃定簿書多張功費長百餘萬以其賍誣弼而實入子木夜寝忽聞有人道弼姓字者俄而到子木堂前謂之曰卿以枯骨腐專可得誣當以某日夜更相書言終忽然不見陸機詣呉王表曰臣本吳人靖居海隅朝廷欲抽引逺人綏慰遐外故}
  - {type: page-break, offset: 679, content: '', id: KR3k0012_WYG_248-10a, image: WYG0895/WYG0895-0258a.png}
  - {type: variant, offset: 679, length: 0, content: '', krp: 宋國𥘉建當置郞中令髙祖難其人謂傅亮曰今用郎中令不可减袁曜卿也旣而曰吾得其人矣乃以王惠居之續搜神記曰㑹稽朱弼爲王國郎中令營立第舎未成而卒同郡謝子木代其事以弼死亡乃定簿書多張功費長百餘萬以其贓誣弼而實入子木子木夜寢忽聞有人道弼姓字者俄頃而到子木堂前立謂之曰卿以枯骨腐肉專可得誣當以某日夜更相書言終忽然不見陸機詣呉王表曰臣夲吴人靖居海隅朝廷欲抽引逺人綏慰遐外故}
  - {type: variant, offset: 680, length: 0, content: '', SBCK: 傅所辟殿下東到淮南發詔以臣爲郎中令國中尉史記曰魯申公弟}
