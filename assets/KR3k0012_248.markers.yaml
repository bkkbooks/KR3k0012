  - {type: variant, offset: 153, length: 180, content: 進品第五秩與中庶子左右衛率同職擬光祿勳也隋書曰明克讓轉率更令進爵為侯太子以師道處之恩禮甚厚有四方珍味輒以賜之于時東宮盛徵天下才學之士至於愽物洽聞皆出其下唐書官品志曰率更令掌伎樂漏刻也物理論曰今有呂子義清賢士也為太子率更令太子家令六典曰家令之職掌皇太子之飲膳食儲庫藏之政令揔食官典倉司藏三署之官屬皇太子備禮出入則乘軺車威儀先諸臣以導引若祭祀賓客則供酒食以為獻主漢, SBCK: 得人心如此晉}
