  - {type: variant, offset: 2409, length: 163, content: 四年以太子中舍人郄儉為太子後衛率宋起居注曰永初元年以徐佩為太子後衛率左右內率府長史六典曰左右內率府長史掌判諸曹官吏及千牛備身之二唐書曰永淳中以雍人元讓為太子右內寧府長史旌孝行也讓弱冠明經擢第以母疾遂不求仕躬親藥膳蒸蒸致養不出閭里十餘年及母終廬於墓側蓬髮不櫛沐菜食飲水而已咸亨中孝敬監國下令表其門閭至是巡察使奏讓孝悌殊異由是拜職, SBCK: 八}
