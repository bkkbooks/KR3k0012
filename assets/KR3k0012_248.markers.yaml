  - {type: variant, offset: 45, length: 1, content: 講, SBCK: 入京城時府寮駭散唯思廉侍王不離其側義師入殿門思廉謂之曰唐公舉兵夲匡王室卿等不冝無禮於王衆服其言於是布列階下湏􅁷太宗至聞而義之許其扶王至順陽閤下泣拜而去觀者咸歎曰忠烈之士也仁者有勇此之謂也太宗居藩引爲文}
  - {type: page-break, offset: 45, content: '', id: KR3k0012_SBCK_248-3a}
  - {type: variant, offset: 45, length: 1, content: 講, WYG: 入京城時府僚駭散唯思亷侍不離其側義師入殿門思亷謂之曰唐公舉兵本匡王室卿等不宜無禮于王衆服其言于是布列階下須臾太宗至聞而義之許其扶王至順陽閣下泣拜而去觀者咸歎曰忠烈之士也仁者有勇此之謂也太宗居藩引為文}
  - {type: page-break, offset: 45, content: '', id: KR3k0012_WYG_248-4b, image: WYG0895/WYG0895-0255b.png}
  - {type: variant, offset: 45, length: 1, content: 講, krp: 入京城時府寮駭散唯思廉侍王不離其側義師入殿門思廉謂之曰唐公舉兵夲匡王室卿等不冝無禮於王衆服其言於是布列階下湏臾太宗至聞而義之許其扶王至順陽閤下泣拜而去觀者咸歎曰忠烈之士也仁者有勇此之謂也太宗居藩引爲文}
  - {type: variant, offset: 47, length: 4, content: 齒冑皆揔, SBCK: 及親征徐圎朗思廉時在洛陽太宗甞從容言及隋亡之事􅁣然歎曰姚思廉不懼兵刃以明大節求諸古人亦何以加也因􅀉物百叚遺}
