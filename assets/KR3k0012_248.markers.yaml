  - {type: variant, offset: 52, length: 2, content: 儀注, SBCK: 書曰想卿節義之風故有斯􅙔王文學魏志曰中山㳟王褒毎讀書文學左右常恐以精力爲病數諌止之不能廢也文學阬輔相與言曰受詔察王舉措有過當奏及有善亦冝以聞遂共表陳褒美褒聞之大驚責讓文學曰修身自守常人之行耳}
  - {type: variant, offset: 52, length: 2, content: 儀注, WYG: 書曰想卿節義之風故有斯贈王文學魏志曰中山恭王褒每讀書文學左右常恐以精力為病數諫止之不能廢也文學防輔相與言曰受詔察王舉措有過當奏及有善亦宜以聞遂共表陳褒美褒聞之大驚責譲文學曰修身自守常人之行耳}
