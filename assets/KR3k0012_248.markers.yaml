  - {type: variant, offset: 1259, length: 243, content: 元和十二年諫議大夫韋綬罷皇太子侍讀綬好諧戲兼通小說太子因侍上或以綬所能言之上謂宰臣曰侍讀者當以經術輔導太子使深知君臣父子之教令或聞綬之談論有異於是豈所以導太子者因命罷其職又曰呂元膺為同州刺史及中謝上問時政得失元膺論奏辭氣激切上嘉之翌日謂宰臣曰呂元膺有讜言直氣宜留在左右使言得失卿等以為何如李藩裴垍賀曰陛下納諫超冠百王乃宗社無疆之休臣等不能廣求端士又不能數進忠言孤負聖心合當罪戾請留元膺給事左右尋兼皇太子侍讀五代史後唐史曰倉部郎中何澤上䟽請置太子侍讀勑旨何澤早處班行深明典制固根本而別彰憂, SBCK: 趙充}
