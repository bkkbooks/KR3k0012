  - {type: variant, offset: 970, length: 287, content: 之義不得不司過宰之義不得不徹膳今皇帝式稽前典妙簡英俊自庶子已下至諮議舍人及學士侍讀等使翼佐殿下以成聖德近者以來未甚延納談議不狎謁見尚稀三朝之後但與內人獨居何由發揮聖智使睿哲文明者乎今史雖闕官宰當奉職忝備所司不敢逃死謹守禮經輒申減膳太子荅書曰顧以庸虛早尚墳典每欲研精政術極意書林但往在幼年未閑將衛竭誠躭誦因即損心比日以來風虛更積中奉恩旨不許重勞加以趨侍含元溫清朝夕承親無自專之道遵禮以色養為先所以屢闕坐朝時乖學緒公潛申雅勗式薦忠規敬尋來請良符宿志自非情思審諭義均弼諧豈能進此藥言形於簡墨撫躬三省感愧兼深文偉自此益知名太子侍讀唐書曰玄宗在東宮張說與國子司業禇無量俱為侍讀深見親敬, SBCK: ''}
