  - {type: variant, offset: 62, length: 2, content: 子備, SBCK: 尉李公時爲荆州刺史下辟書夫採名珠求之於蚌欲得名士求之文學或割百蚌不得一珠不可捨蚌求之於魚或百文學不出竒士不可捨文學求之於斗筲也由是言之蜯乃珠之所藏文學亦士之塲矣郡國相東觀漢記曰吴祐字季英陳留人遷膠東相政唯仁簡以身率物民有相争訴者輙閉閤自責然後科其所訟以道譬之或身到閭里重相和解自是之後争隟省息吏民不欺又曰魯平字叔陵拜趙相爲政尚寛惠}
