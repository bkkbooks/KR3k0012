  - {type: variant, offset: 359, length: 0, content: '', SBCK: 少卿山陽人以明經爲官至昌邑郎中令事王賀賀動作多不正遂爲人忠厚剛毅有大節内諌諍於王外責􅀓相引經義陳禍福至於涕泣謇謇無巳面刺王過王至掩耳起走曰郎中令善媿人及國中皆畏憚之王又與騶奴宰人遊戲飲食賞賜無度遂入見王涕泣膝行左右侍御皆出涕王曰郎中令何爲哭遂曰臣痛社稷之危也又曰周勃等共誅諸吕迎代王郎中令張武等議皆曰不可信願􅁛疾無徃以觀其變中尉宋昌進曰羣臣之議皆非願大王勿疑也代王遣太后薄昭見勃勃等俱言所以迎立王者昭還報信矣王􅀏謂宋昌曰果如}
