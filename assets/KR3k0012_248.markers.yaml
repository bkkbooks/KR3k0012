  - {type: variant, offset: 2070, length: 0, content: '', SBCK: 曰和元祏爲千牛衛長史先是元祏獻詩十首其詞猥陋皆寓言嬖幸而意及兵戈韋氏命拘於大理而將戮月餘而韋氏就誅其詩言􅀂合符䜟故上聞而拜之魏武故事載令曰府長史王必是吾披荆􅁄時吏也忠能勤事心如鐵石國之長吏也蹉跌乆不辟之捨騏􅂹而不乗焉惶惶而更求哉今故教辟之陶氏家傳云猷字恭豫王導以君江東儁望請爲右軍長史君恪勤王事毎當朝日恒夙興就路及到府門輙先衆僚爲人美容止善談論亦以此見稱當丗焉府司馬諸府附左傳曰季氏以公鉏爲馬正馬正家司馬也愠而不出閔子馬見之曰閔子馬閔馬父也子無然禍福無門惟人所召爲人子者患不孝不患無所所位處也恭敬父命何常之有言廢置在父無常位公鉏然之恭敬朝夕恪居}
  - {type: page-break, offset: 2070, content: '', id: KR3k0012_SBCK_248-9b}
  - {type: variant, offset: 2070, length: 0, content: '', WYG: 曰和元祐為千牛衛長史先是元祐獻詩十首其詞雖猥陋皆寓言嬖幸而意及兵戈韋氏命拘於大理而将戮月餘而韋氏就誅其詩言若同符䜟故上聞而拜之魏武故事載令曰府長史王必是吾披荆棘時吏也忠能勤事心如鐵石國之長吏也蹉跌久不辟之捨騏驥而不乗焉惶惶而更求哉今故教辟之陶氏家𫝊曰猷字公毅王導以君江東雋望請為右軍長史君恪勤王事每當朝日恒夙興就路及到府門輒先衆僚為人美容止善談論亦以此見稱當世焉府司馬諸府附左傳曰季氏以公鉏為馬政馬正家司馬也愠而不出閔子馬見之曰閔子馬閔馬父也子無然禍福無門惟人所召為人子者患不孝不患無所所謂處也恭敬父命何常之有言廢置在父無常位公鉏然之恭敬朝夕恪居}
