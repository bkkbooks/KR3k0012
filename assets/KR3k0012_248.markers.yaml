  - {type: variant, offset: 337, length: 0, content: '', SBCK: 輔政阮籍常從容言於帝曰平生曽遊東平縣樂其風土帝大恱即拜東平相籍乗驢到郡壞府舎屏障使内外相望法令清簡旬日而還又曰阮神遷平原相時襄邑衛京自南陽太守遷於河内與神俱拜帝望而歎曰二千石皆􅀂此朕何憂乎九州春秋曰孔融爲北海相一朝殺部督郵㑹稽典録曰駱俊字孝逺烏傷人孝靈皇帝擢拜陳相汝南􅁑陂盗賊並起陳與接境四面受敵俊厲吏民爲之保鄣出倉見榖}
