  body:
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 六王師王􅀓王友王侍讀王文學郡國相國郎中令國中尉國常侍國侍郎府長史府司馬王師漢書曰王式字翁思東平人爲昌邑王師昭帝崩邑王嗣立以行􅁋亂廢昌邑群臣皆下獄治事使者責問曰師何以無諌書式對曰臣以詩三}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 六王師王傅王友王侍讀王文學郡國相國郎中令國中尉國常侍國侍郎府長史府司馬王師漢書曰王式字翁思東平人為昌邑王師昭帝崩昌邑王嗣立以行淫亂廢昌邑羣臣皆下獄治事使者責問曰師何以無諫書式對曰臣以詩三百}
