  - {type: variant, offset: 680, length: 0, content: '', krp: 傅所辟殿下東到淮南發詔以臣爲郎中令國中尉史記曰魯申公弟}
  - {type: variant, offset: 681, length: 0, content: '', SBCK: 爲􅀶士十餘人孔安國至臨淮太守徐偃爲膠西中尉其治官皆有廉節􅁛其好學漢書曰鄭當時字莊陳人也稍遷爲魯中尉又曰梁孝王招延四方豪傑齊人公孫詭多竒計􅀄見曰王賜千金官至中尉號曰公孫將軍續漢書曰清河王小心恭孝特見親愛後諸王就國鄧太后詔特清河國置中尉内史賜乗上御物焉漢舊儀曰帝子爲王王國置太傅相公尉各一人秩二千石以輔王三輔决録曰淮陽憲王宣帝愛子器異其才欲以爲嗣王恃寵自驕天子乃用韋玄成爲中尉以輔導之受詔與蕭望之等論五經同異於石渠閤邵氏家傳曰邵弘字德􅁉時景帝爲瑯邪王詔書髙選官屬請君爲中尉君爲人體素方嚴儀容甚偉雖私門接對僮}
  - {type: page-break, offset: 681, content: '', id: KR3k0012_SBCK_248-7a}
  - {type: variant, offset: 681, length: 0, content: '', WYG: 為博士十餘人孔安國至臨淮太守徐偃為膠西中尉其治官皆有亷節稱其好學漢書曰鄭當時字荘陳人也稍遷為魯中尉又曰梁孝王招延四方豪傑齊人公孫詭多竒計初見日王賜千金官至中尉號曰公孫将軍續漢書曰清河王小心恭孝特見親愛後諸王就國鄧太后詔特清河國置中尉内史賜乘上御物馬漢舊儀曰帝子為王王國置太傅相公尉各一人秩二千石以輔王三輔決録曰淮陽憲王宣帝愛子器異其才欲以為嗣王恃寵自驕天子乃用韋𤣥成為中尉以輔導受詔與蕭望之等論五經同異於石渠閣邵氏家傳曰邵𢎞字徳裕時景帝為瑯琊王詔書髙選官屬請君為中尉為人體素方嚴儀容甚偉雖私門接對僮}
