  - {type: variant, offset: 1354, length: 527, content: 及中謝上問時政得失元膺論奏辭氣激切上嘉之翌日謂宰臣曰呂元膺有讜言直氣宜留在左右使言得失卿等以為何如李藩裴垍賀曰陛下納諫超冠百王乃宗社無疆之休臣等不能廣求端士又不能數進忠言孤負聖心合當罪戾請留元膺給事左右尋兼皇太子侍讀五代史後唐史曰倉部郎中何澤上䟽請置太子侍讀勑旨何澤早處班行深明典制固根本而別彰憂國上封章而足表匡君其所敷陳實為允當特議施行太子門大夫六典曰宮門郎掌內外宮門管籥之事凡宮殿門夜漏盡擊漏鼓開夜漏上水一刻擊漏鼓閉每歲終行儺應經所由門並先一刻早開若皇太子不在則閉東宮正門其宮城使宿衛人應入宮殿者各於左右廂便門出入至皇太子還仗乃開續漢書百官志曰門大夫員二人秩六百石職比郎將漢書曰文帝晁錯為太子舍人轉太子門大夫晉書曰太子門大夫局准公車令班同中書舍人主通遠近牋表宮門禁防唐書曰龍朔二年改門大夫為宮門郎職比城門郎三輔決錄曰桓帝以平陵魯寬為太子門大夫太子左衛率六典曰左右衛率掌東宮兵仗羽衛之政令揔諸曹之事凡親勳翊府及廣濟等五府屬焉副率為之貳凡元正冬至皇太子朝宮臣及諸方使則率衛府之屬以儀仗為左右廂以衛之若皇太子備禮出入則如鹵簿之法以從續漢書百官志曰衛率四百石主門衛晉志曰凡太子出前衛率導在前廣麾外左右二率從夾導輿車後衛率從在烏皮外並帶戟執刀其服並視左右衛將軍, WYG: ''}
