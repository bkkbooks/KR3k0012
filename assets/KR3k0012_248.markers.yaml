  - {type: variant, offset: 38, length: 2, content: 釋奠, SBCK: 彊求乞自退封東海王故重選官屬以杜林爲王􅀓從駕南廵狩時諸王􅀓數􅀍引命或多交遊不得應詔唯林守慎有召必至餘人雖不見譴而林特受賞賜又辭不敢受帝益重之吴志是儀字子羽北海營陵人也南魯二宫􅀄立儀以夲職領魯王傅儀嫌二宫相近切乃上䟽曰臣􅀼以魯王天挺懿德兼資文武當今之冝冝鎮四方爲國藩輔宣揚德美廣耀威靈乃國家之良䂓海内所瞻望但臣言辭鄙野不能究盡其意愚以二宫冝有降殺正上下之序明教化之夲書三四上爲傅盡忠動輙䂓諌事上勤與人恭不治産業不受施惠爲屋舎纔足自容隣家有􅁸大宅者權出望見問起大室者誰左右對曰似是儀家也權曰儀儉必非問果他家其見知信如此唐書曰丘恱河南陸渾人亦有學業景龍中爲相王府􅁺與文學韋利器典籖裴耀卿俱爲王府直學士睿宗在藩甚重之官至歧王傅開元􅀄卒撰三國典略三十卷行}
  - {type: page-break, offset: 38, content: '', id: KR3k0012_SBCK_248-2a}
  - {type: variant, offset: 38, length: 2, content: 釋奠, WYG: 彊求乞自退封東海王故重選官屬以杜林為王傅從駕南巡狩時諸王傅數被引命或多交㳺不得應詔惟林守貞有召必至餘人雖不見譴而林特授賞賜又辭不敢受帝益重之呉志曰是儀字子羽北海營陵人也南魯二宫初立儀以本職領魯王傅儀嫌二宫相近切乃上䟽曰臣竊以魯王天挺懿徳兼資文武當今之宜宜鎮四方為國藩輔宣揚徳美廣耀威靈乃國家之良規海内所瞻望但臣言辭鄙野不能究盡其意愚以二宫宜有降殺正上下之序明教化之本書三四上為傅盡忠動輙規諌事上勤與人恭不治産業不受施恵為屋舍纔足自容隣家有起大宅者權出望見問起大宅者誰左右對曰似是儀家也權曰儀儉必非問果他家其見知信如此唐書曰丘悦河南陸渾人也亦有學業景龍中為相王府掾與文學韋利器典籖裴耀卿俱為王府直學士睿宗在藩甚重之官至岐王傅開元初卒撰三國典略三十卷行}
  - {type: page-break, offset: 38, content: '', id: KR3k0012_WYG_248-2b, image: WYG0895/WYG0895-0254b.png}
  - {type: page-break, offset: 38, content: '', id: KR3k0012_WYG_248-3a, image: WYG0895/WYG0895-0254c.png}
  - {type: variant, offset: 38, length: 2, content: 釋奠, krp: 彊求乞自退封東海王故重選官屬以杜林爲王傳從駕南廵狩時諸王傳數𬒳引命或多交遊不得應詔唯林守慎有召必至餘人雖不見譴而林特受賞賜又辭不敢受帝益重之吴志是儀字子羽北海營陵人也南魯二宫𥘉立儀以夲職領魯王傅儀嫌二宫相近切乃上䟽曰臣竊以魯王天挺懿德兼資文武當今之冝冝鎮四方爲國藩輔宣揚德美廣耀威靈乃國家之良䂓海内所瞻望但臣言辭鄙野不能究盡其意愚以二宫冝有降殺正上下之序明教化之夲書三四上爲傅盡忠動輙䂓諌事上勤與人恭不治産業不受施惠爲屋舎纔足自容隣家有𧺫大宅者權出望見問起大室者誰左右對曰似是儀家也權曰儀儉必非問果他家其見知信如此唐書曰丘恱河南陸渾人亦有學業景龍中爲相王府掾與文學韋利器典籖裴耀卿俱爲王府直學士睿宗在藩甚重之官至歧王傅開元𥘉卒撰三國典略三十卷行}
  - {type: variant, offset: 41, length: 3, content: 先聖先, SBCK: 時王友晉中興書曰謝尚字仁祖司徒左西屬爲㑹稽王友北史曰蕭大圜除􅅬王逌友逌甞問大圜曰吾聞湘東王作梁史有之乎餘傅乃可抑楊帝紀奚􅀂隱則非實記則攘羊對曰言之者妄耳如使有之亦不足恠昔漢明爲丗祖紀章帝爲顯宗紀殷鍳不逺足爲成例且君子過如日月之蝕彰於四海安得而隱之如有不彰亦安得不􅀮盖子爲父隱直在其中諱國之惡抑又禮也逌乃大􅀏殷浩別傳曰㑹稽王少著名譽友學之舉必極有德以浩爲友山公啓事曰近啓修武令劉訥􅀘南陽王友詔曰友誠冝得有益者然以長吏治民不易屢易爲疑令散人無依仰又啓今者職散中誠自有人然劉訥才志外内非􅁛臣以爲冝􅂪此者是以啓及不審固可用不詔可􅈛所啓王侍讀隋書曰楊汪字元度勤學專精左氏傳通三禮解福周冀王侍讀王甚重之每曰王侍讀德業優深􅀌之穆生也唐書曰姚思廉􅀄爲代王侍讀屬義}
  - {type: page-break, offset: 41, content: '', id: KR3k0012_SBCK_248-2b}
  - {type: variant, offset: 41, length: 3, content: 先聖先, WYG: 時王友晉中興書曰謝尚字仁祖司徒左西屬為㑹稽王友北史曰蕭大圜除滕王逌友逌嘗問大圜曰吾聞湘東王作梁史有之乎餘𫝊乃可抑揚帝紀奚若隠則非實證則攘羊對曰言之者妄耳如使有之亦不足怪昔漢明帝為世祖紀章帝為顯宗紀殷鑒不逺足為成例且君子過如日月之蝕彰於四海安得而隠之如有不彰亦安得不隠葢子為父隠直在其中諱國之惡抑又禮也逌乃大笑殷浩别𫝊曰㑹稽王少著名譽友學之奉必極有徳以浩為友山公啓事曰近啓修武令劉訥補南陽王友詔曰友誠宜得有益者然以長吏治民不宜屢易為疑令散人無依仰又啟今者職散中誠自有人然劉訥才志内外非稱臣以為宜蒙此者是以啟及不審固可用不詔可爾所啟王侍讀隋書曰楊汪字元度勤學専精左氏傳通三禮解補周冀王侍讀王甚重之每曰王侍讀徳業優深孤之穆生也唐書曰姚思亷初為代王侍讀屬義}
