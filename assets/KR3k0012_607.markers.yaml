  - {type: variant, offset: 2738, length: 0, content: '', WYG: 致之夫道之於心猶火之於目也深室幽黑無見乃設燎盛燭則百物彰矣此則火之耀也非目之光也而目假之則為明矣天地之道神明之為不可見也學問聖典心思道術則皆覩矣此則非心之明而人假之則為己知矣風俗通曰武帝廣開獻書之路立五經博士開弟子員設科射䇿勸以官禄訖於元始百有餘年書積如丘山傳業浸衆枝葉繁滋經說百萬言葢禄利之路然也徐偉長中論曰學者所以疏神逹思怡情理性也如寳在於𤣥室所求不得白日照焉則羣物斯辨矣矯首而狥飛不如循雌之必獲孤居而願知不如務學之必逹也蔣子萬機論曰諺曰學如牛毛成如麟角言}
  - {type: page-break, offset: 2738, content: '', id: KR3k0012_WYG_607-12a, image: WYG0898/WYG0898-0507a.png}
  - {type: variant, offset: 2738, length: 0, content: '', krp: 致之夫道之於心猶火之於人目也深室幽黒無見乃設燎盛燭則百物彰矣此則火之耀也非目之光也而目假之則爲明矣天地之道神明之爲不可見也學問聖典心思道術則皆覩矣此則非心之明而人假之則爲已知風俗通曰武帝廣開獻書之路立五經博士開弟子貟設科射䇿勸以官禄訖於元始百有餘年書積如丘山傳業浸衆枝葉䌓滋經說百萬言盖禄利之路然也徐偉長中論曰學者踈神逹思治情理性也𥘉學則如夜在玄室所求不得白日照焉則群物斯辯矯首而徇飛不如脩翼之必獲孤居而願知不如務學之必逹蔣子萬機論曰諺曰學如牛毛成如麟角言}
