  - {type: variant, offset: 2017, length: 1, content: 作, SBCK: 少而好學晚而聞道此以􅀶矣孫卿子曰不登髙山不知天之髙不聞先王之遺言不知學問之大也又曰君子之學入乎耳著乎心布乎四支形乎動静小人之學出乎口入乎耳口耳之間四寸耳􅂚足以美七尺之軀又曰不學不成堯學於君疇舜學於務成昭禹學於西王國文子曰上學以神聽中學以心聽下學以耳聽耳聽者學在皮膚心聽者學在肌肉神聽者學在骨髓吕氏}
