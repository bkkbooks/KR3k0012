  - {type: variant, offset: 245, length: 547, content: 宗今擁兵數千以承天威何遽其必敗乎魏略曰宣王討王陵陵面縛迎遙謂太傅曰卿直以折簡召我我當不至耶而引軍來乎太傅曰以卿非肯逐折簡者也瀨鄉記曰老子母碑曰老子把持仙錄玉簡金字編以白銀紀善綴惡楚國先賢傳曰孫敬編楊柳簡以為經本晨夜誦習劉向別傳曰孫子書以殺青簡編以縹絲繩文士傳曰人有嵩山下得竹簡一版上有兩行科斗之書中外傳示莫能知張華以問束晢晢曰此明帝顯節陵中策文也驗校果然風俗通曰劉向別錄殺青者直治竹作簡書之耳新竹有汁善折蠹凡作簡者皆於火上炙乾之陳楚間謂之汗汗者去其汁也吳越曰殺亦治也劉向為孝成皇帝典校書籍二十餘年皆先書竹改易刊定可繕寫者以上素也由是言之殺青者竹斯為明矣神仙傳曰陰長生裂黃表寫丹經一通封以文石之函著嵩高山一通黃櫨簡染之書封以青玉之函著華山一通黃金之簡刻而書之封以白銀之函著蜀綏山策廣雅曰策謂之簡釋名曰策書教令於上所以驅策諸夏也漢制約勑封侯曰策策賾也勑使整頤不犯法也史記曰百名以上則書於策春秋序曰大事書之於策小事簡牘而已後漢書曰何敞父比干字少卿為汝陰縣獄吏決曹椽平活數千人後為丹陽都尉獄無冤囚征和三年三月辛亥天大陰雨比干在家日中夢車騎滿門覺而語妻語未竟而門有老嫗求寄避雨雨甚而衣不霑雨止送至門謂此干曰公有陰德天賜君以策以廣公之子孫因出懷中符策狀如簡長九寸凡九百九十枚以授比干曰子孫佩印綬者如此數比干, SBCK: ''}
