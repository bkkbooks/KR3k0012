  - {type: variant, offset: 3728, length: 2, content: 時水, SBCK: 從器也是以聖人實之於文鑄之於學夫文學也者人倫之首大教之本也趙子聲書詣鄭康成學曰夫學之於人猶土地之有山川也珎寳於是乎出猶樹木之有枝葉也本根於是乎庇也虞􅀓厲學篇曰學之染人甚於丹青丹青吾見其乆而渝也不見乆而渝於學也􅀓子曰人之學者猶渇而飲河海也大飲則大盈小飲則小盈江表傳曰孫權謂吕蒙及蔣欽曰卿今並當途掌事冝學問以自開益蒙曰軍中}
