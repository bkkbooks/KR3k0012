  - {type: variant, offset: 1445, length: 567, content: 雲便於筆札故時人云子雲之筆札婁君卿之脣舌後漢書曰樊崇等西攻更始百萬之眾而無稱號欲立帝求軍中景王後者得七十餘人唯盆子與茂及前西安侯為最崇等議曰聞古天子將兵稱上將軍乃書札為符曰上將軍又以兩空札置笥中札簡也笥篋也遂於鄭北設壇場祠城陽景王諸三老從事皆大會陛下列盆子三人居中立以年次探札盆子最幼後探得符諸將乃皆稱臣續漢書曰賈逵字景伯時有神雀入宮章帝勑蘭臺給筆札使逵作神雀頌晉張華有文雅之才晉儀禮釐革制度勑有司給筆札多有損益晉陽秋曰梁國張惲字義元為郡吏入值太守圍棊投札於地惲曰知府君患風取以支戶太守輟棊令坐漢武故事曰上崩後有一人騎馬馬異於常馬持一尺札賜將作大匠丞文曰汝績克成賜汝金十斤因忽不見札變為金稱之重十斤抱朴子曰魏武帝以左慈為妖妄欲殺之使人收之慈故欲見而不去欲栲之而獄中有七慈形狀如一不知何者為真以白武帝帝使人盡將殺之須臾七慈盡化為札而一慈徑出走赴群羊詩云有客從南來貽我一書札上敘長相思下言久離別牒說文曰牒札也文心雕龍曰牒者葉也如葉在枝也短簡為牒議事未定故短牒諮謀牒之尤密謂之籤左傳昭六年曰趙簡子令諸侯大夫輸王粟宋樂大心曰我不輸粟我於王為客二王後為賓客晉士伯曰自踐土以來宋何役不會而何盟不同王室子焉避之右師不敢對受牒而退右師樂大心也漢書曰路溫舒字長君鉅鹿東野人父為里監門使溫舒牧羊取澤中蒲截為牒編用寫書板釋名曰板昄昄平廣也昄半旱切春秋演孔圖, SBCK: ''}
