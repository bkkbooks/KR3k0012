  - {type: variant, offset: 2642, length: 651, content: 下官剌長書中央一行而下也又有爵里剌書其官爵及郡縣鄉里也典略曰王符字節信安定人感激著書名曰潛夫論故渡遼將軍皇甫規去官歸安定或有人前以貨買鴈門太守者亦去官歸畫剌規規臥不迎使人呼入既坐問啖鴈美乎又以其剌刮髀有頃聞王節信在外規乃驚起衣不及帶倒履而出援其手而還與同席坐大設賓日暮別去人或歎曰何有二千石之賤不如諸生之貴乃如此耶魏名臣奏曰黃門侍郎荀俁奏曰今吏初除有二通爵里剌條䟽行狀夏侯榮傳曰榮宇幼權淵第五子幼聰明經目輒識文帝聞而請焉賓客百餘人一奏剌悉書其鄉邑姓名世所謂爵里剌示之一過而使之遍談不謬一人帝奇之長沙耆舊傳曰夏侯叔仁氏族單微丁母憂居喪過禮同郡徐元休弱冠知名聞而弔焉旬日之中積剌盈案吳錄曰孟宗為豫章太守謂倉掾曰君昔負太守一剌寧識之否掾曰不識宗曰吾昔家貧親老為官賃運以剌詣君感見發遣何乃久屈耶雜事曰高彪字義方吳郡人志尚甚高遊太學博覽經史善屬文嘗詣大儒馬融辭不見彪覆剌其書曰伏聞高問為日久矣冀一見龍光敘腹心之願以啟其蔽不圖辭之以疾昔周公父文王兄武王九命作相以尹華夏猶握沐吐食以接白屋之士天下歸德歷載邈矣今君不能相見宜哉融省大愧遣人辭謝追請徑去不肯還郭林宗別傳曰林宗名益顯士爭歸之載剌常盈車禰衡別傳曰衡初遊許下乃懷一剌既到而無所之適至於剌字漫滅幽明錄曰一士人姓王坐齋中有一人通剌詣之題剌云舒甄仲既去疑非人尋剌曰是予舍西士瓦中人令掘果於瓦器中得一銅人長尺餘函吳志曰張溫字惠恕使蜀謂先主曰謹奉所齎函書封晉安帝紀曰朱齡石伐蜀太尉與齡石書署函曰至白帝乃發書曰眾悉從外水取成都臧燾於中水出廣漢使嬴弱乘高艦十餘由內水向黃虎傳, SBCK: 抱朴}
  - {type: page-break, offset: 2642, content: '', id: KR3k0012_SBCK_607-6b}
  - {type: variant, offset: 2642, length: 5, content: 下官剌長書, WYG: 抱朴子曰人知藥理病不知學理身又曰夫學者所以清澄性理簸揚埃穢啓道聰明􅅚染質素察往知來博涉勸戒仰觀俯察於是乎在雖云色白匪染不麗雖云味甘匪和弗美故瑶華不琢則耀夜之景不發青萍不治則鈍鈎之勁不就故質雖在我而成之在後發閬風捫辰極然後知井谷之閇隘披七經玩百氏然後覺面牆之至困粉黛至則西施以加麗而宿瘤以飾醜經術深則髙才者洞逸而魯鈍者醒悟文梓干雲而不可名之為臺榭者未知班輸之結構也天倫朗爽而不可謂之為君子者未知人倫之臧否也鹽鐵論曰内無其質而外學其文雖有賢師良友若畫脂鏤氷費日損功論衡曰人生懷五常之性好道樂學故别於物飽食快飲腹為飯坑腸為酒囊是則物也與三百倮蟲何以異乎又曰手無錢而之市决貨貨主必不與也夫胷}
