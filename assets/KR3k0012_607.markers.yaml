  - {type: variant, offset: 2831, length: 379, content: 榮宇幼權淵第五子幼聰明經目輒識文帝聞而請焉賓客百餘人一奏剌悉書其鄉邑姓名世所謂爵里剌示之一過而使之遍談不謬一人帝奇之長沙耆舊傳曰夏侯叔仁氏族單微丁母憂居喪過禮同郡徐元休弱冠知名聞而弔焉旬日之中積剌盈案吳錄曰孟宗為豫章太守謂倉掾曰君昔負太守一剌寧識之否掾曰不識宗曰吾昔家貧親老為官賃運以剌詣君感見發遣何乃久屈耶雜事曰高彪字義方吳郡人志尚甚高遊太學博覽經史善屬文嘗詣大儒馬融辭不見彪覆剌其書曰伏聞高問為日久矣冀一見龍光敘腹心之願以啟其蔽不圖辭之以疾昔周公父文王兄武王九命作相以尹華夏猶握沐吐食以接白屋之士天下歸德歷載邈矣今君不能相見宜哉融省大愧遣人辭謝追請徑去不肯還郭林宗別傳曰林宗名益顯士爭歸之載剌常盈車禰衡別傳曰衡初遊許下乃懷一剌既到而無所之適至於剌字漫滅幽明錄曰一士人姓王坐齋中有一人通剌詣之題剌云舒甄仲既去疑非人尋剌曰是予舍西士瓦中人令掘果於瓦器中得一銅, WYG: ''}
