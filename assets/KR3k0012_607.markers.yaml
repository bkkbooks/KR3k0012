  - {type: variant, offset: 2122, length: 19, content: 二月盡三月初桑生裴雷柳葉舒荊筆楊板行詔, SBCK: 學聖王之道譬其如日静居而獨思譬其􅀂火夫舎聖王之道而静居而獨思譬其去日之明於庭而就火之光於室也淮南子曰夫明鏡之始不形也曚然未見形容也及其杚以􅀇錫摩以砥旃􅁂眉微毛可得而察也夫學亦人之砥礪也又曰夫心闇於道而強學不巳者譬聾者之歌無以自樂又曰人莫不知學之有益於巳也然而不能者嬉戲害之也人皆多以無用害有用以弋獵􅀶弈之日誦詩讀}
