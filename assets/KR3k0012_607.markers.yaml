  - {type: variant, offset: 2784, length: 3, content: 二千石, krp: 因對予流涕子心少感遂伏書史王粲荆州文學官志曰有漢荆州牧劉君稽古若時將紹厥績乃曰先王}
  - {type: variant, offset: 2785, length: 2, content: 千石, WYG: 人意性朗悟學必得}
  - {type: variant, offset: 2788, length: 1, content: 賤, WYG: 宜急讀孫子兵法六韜左傳國語及史孔子曰吾嘗終日不食終夜不寢以思無益}
  - {type: variant, offset: 2788, length: 1, content: 賤, krp: 爲丗也則象天地䡄儀憲極設教導化叙經志業明逹雍冸作爲禮樂表陳載籍以持其德上知所以臨下下知所以事上官}
