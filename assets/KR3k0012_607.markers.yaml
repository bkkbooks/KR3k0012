  - {type: variant, offset: 3295, length: 6, content: 太祖徵劉曄授, SBCK: 人知藥理病不知學理身又曰夫學者所}
  - {type: variant, offset: 3295, length: 6, content: 太祖徵劉曄授, krp: 人之學者猶渇而飲河海也大飲則大盈小飲則小盈江表傳曰孫權謂吕蒙及蔣欽曰卿今並當途掌事冝學問}
