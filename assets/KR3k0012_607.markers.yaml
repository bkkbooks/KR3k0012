  - {type: variant, offset: 3550, length: 1, content: 斷, SBCK: 人生懷五常之性好道樂學故别於物今飽食快飲腹爲飯坑膓爲酒囊是則物也與三百倮蟲何以異乎又曰手無錢而之市决貨貨主必不與也夫胷中無學亦猶手中無錢潜夫論曰天地之所貴者人也聖人之所尚者義也德義之所成者智也明智之所求者學問也雖有至聖不生而智雖有至材不生而能由待學問其智乃􅀶其德乃碩而况於凢人乎是以人之學也猶物之有治也夫瑚簋之器朝􅀕之服其始也乃山野之}
