  - {type: variant, offset: 3419, length: 254, content: 天文推步之術益部耆舊傳曰廣漢王棠妻文拯其前妻子博學好寫書拯嘗為手自作袠常過其意宋謝靈運書祑銘曰懷幽卷頤戢妙抱密用舍以道舒卷不失亮唯勤翫無或暇逸梁昭明太子詠書帙詩曰擢影免園池抽莖淇水側幸雜緗囊用聊因班女織槧說文曰槧牘牒也釋名曰槧板長三尺者也槧漸也言漸漸然長也論衡曰斷木為槧揚雄荅劉歆書曰以鈆擿松槧二十七年矣西京雜記曰揚子雲好事嘗懷鈆提槧從諸計吏訪殊方絕俗四方之語㨭後漢杜篤書㨭賦曰惟書㨭之麗容象君子之淑德載方矩而履規加文藻之修飾能屈伸以和禮惟高下而消息雖轉旋而屈橈時傾邪而返側抱六蓺而卷舒敷五經之典式封泥書春秋, WYG: 世}
