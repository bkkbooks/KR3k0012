  - {type: variant, offset: 2784, length: 0, content: '', WYG: 因對予流涕予心少感遂伏誦史書王粲荆州文學官志曰有漢荆州牧劉君稽古若時將紹厥績乃曰先王之為世也則象天地軌儀憲極設教道化叙經志業明道雍泮作為禮樂表陳載籍以持其德上知所以臨下下知所以事上官不失守民聴無悖然後太階平焉故曰物生而屯蒙將養正造昧利有攸適猶金之銷鑪水之從器也是以聖人實之於文鑄之於學夫文學也者人倫之首大教之本也趙子負書詣鄭康成學曰夫學之於人猶土地之有山川也珍寶於是乎出猶樹木之有枝葉本根於是乎庇也盧傳厲學篇曰學之染人甚於丹青丹青吾見其乆而渝也不見乆而渝於學也傅子曰人之學者猶渴而飲河海也大飲則大盈小飲則小盈江表傳曰孫權謂吕蒙及蔣欽曰卿今並當途掌事宜學問以自開益蒙曰軍中常苦多務權曰孤豈欲卿治經為博士耶但令涉獵見往事耳如卿}
