  - {type: variant, offset: 3562, length: 5, content: 鈆擿松槧二, SBCK: 致之夫道之於心猶火之於人目也深室幽黒無見乃設燎盛燭則百物彰矣此則火之耀也非目之光也而目假之則爲明矣天地之道神明之爲不可見也學問聖典心思道術則皆覩矣此則非心之明而人假之則爲已知風俗通曰武帝廣開獻書之路立五經􅀶士開弟子貟設科射䇿勸以官禄訖於元始百有餘年書積如丘山傳業浸衆枝葉䌓滋經􅀃百萬言盖禄利之路然也徐偉長中論曰學者踈神逹思治情理性也􅀄學則如夜在􅀇室所求不得白日照焉則群物斯辯矯首而徇飛不如脩翼之必獲􅀌居而願知不如務學之必逹蔣子萬機論曰諺曰學如牛毛成如麟角言其少也譙周法訓曰爲國者不患學之害農患治民者之不學􅀇晏春秋曰}
