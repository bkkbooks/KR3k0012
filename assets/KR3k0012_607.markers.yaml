  - {type: variant, offset: 2790, length: 2, content: 如諸, krp: 失守民聽無悖然後太階平焉故曰物}
  - {type: variant, offset: 2791, length: 20, content: 諸生之貴乃如此耶魏名臣奏曰黃門侍郎荀俁奏, WYG: 學也蒙等感悟遂學所博覽儒者不勝魯肅見吕蒙謂}
  - {type: variant, offset: 2793, length: 0, content: '', krp: 而蒙事屯而養造昧利有攸適猶金}
