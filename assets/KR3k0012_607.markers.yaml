  - {type: variant, offset: 2208, length: 431, content: 復召耶鬼云此人間耳且令所作是天上官也王大懼亦尋見迎官玄衣人及鵲衣小吏甚多王尋疾薨桂陽先賢畫讚曰胡滕部南陽從事遇大駕南巡求索揔猥滕表曰天子無外乘輿所幸便為京師臣請荊州剌史比司隸臣比都官從事帝奇其才悉許大將軍西曹椽亡馬召滕因作都官鵠頭板召百官敬服相板經曰板有芒角形勢上狹下廣右薄左厚光采流澤文色調達木理通直皆為吉反是凶板細理輕蹙其人性簡達周正其人寬博板有橫節為病在面內喪在背外喪板有蝎穿及節對過其人凶板中字皆令筆跡調利有形勢字欲當右行空中不用對對則多牽制又上官多憎之官字欲令故官字小新官字大有波勢墨色分明板形平通無絕傷刀跡是元吉官字無形勢點染不分明皆免官或不到官官字小它字墨散入材理中必入獄死板色欲類其姓角家板色青為吉亦不宜子白不利官屬墨不利父母黃不利妻財凡齎板來者其人姓名善為喜祥不善則否也相板時要以手持板之若手近板後則板前低而落此則左遷板有病累皆可治改治之用庚申寅曰庚更也申伸也寅引也言更引吉祥也剌釋名曰畫姓字於奏上曰畫剌作再拜起居字皆達其體使書盡邊徐引筆書之如, SBCK: 惡夫}
