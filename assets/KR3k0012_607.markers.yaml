  - {type: variant, offset: 2020, length: 0, content: '', SBCK: 曰善學者􅀂齊王善雞必食其跖數千而後足跖雞踵也喻舉者如食多而後方足也學不辯義如􅀍􅄄而出錦衣而入􅀍􅄄在外衣錦在内故不可也戎人生乎戎而戎言楚人生乎楚而楚言不知其所受也今使戎人長呼楚楚人長呼戎則楚人戎言戎人楚言也又曰聖人生於疾學而能爲魁士名人者未之聞也又曰善學者假人道之長以􅀘其短故假而又假遂有}
  - {type: variant, offset: 2020, length: 0, content: '', WYG: 曰善學者若齊王善雞必食其跖數千而後足跖雞腫也喻學者如食多而後方足也學不辨義如被褐而出錦衣而入被褐在外錦衣在内故不可也戎人生乎戎而戎言楚人生乎楚而楚言不知其所受也今使戎人長乎楚楚人長乎戎則楚人戎言戎人楚言也又曰聖人生於疾學不疾學而能為魁士名人者未之聞也又曰善學者假人道之長以補其短故假而又假遂有}
