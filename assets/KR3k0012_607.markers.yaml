  - {type: variant, offset: 950, length: 0, content: '', SBCK: 也又曰范獻子聘於魯問具敖山魯人以郷對獻子曰不爲具敖乎對曰先君獻武之諱也獻子歸徧戒其所知曰人不可以不學吾適魯而名其二諱爲􅀏焉唯不學也人之有學猶木之有枝葉猶庇䕃人而况君子乎}
  - {type: page-break, offset: 950, content: '', id: KR3k0012_SBCK_607-2a}
