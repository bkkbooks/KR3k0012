  - {type: variant, offset: 1053, length: 0, content: '', SBCK: 乎韓子曰如脂粉則嫫母進御家不潔則西施弃野學之爲脂粉亦厚矣又桓範丗要云學者人之脂粉也又曰夫耕之用力也勞而民爲之者可得而冨之也戰之爲事也危而民爲之者可得以貴也今脩文學習談論則無耕之勞而有冨之實無戰之危而有貴之尊則人孰不爲也管子曰明}
