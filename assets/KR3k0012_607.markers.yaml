  - {type: variant, offset: 1205, length: 140, content: 栲實具知姦狀夢書曰牘札為薦舉夢得牘札欲薦舉也韓詩曰趙簡子太子名伯魯小子名無恤簡子自為二牘親自表之書曰節用聽聰敬賢勿慢使能勿賤與二子使恒誦之居三年簡子坐青臺之上問二子書所在伯魯亡其表令誦不能得無恤出其書於左袂令誦習焉乃黜伯魯而嘉無恤韓詩外傳曰趙簡子有臣周舍立於門下三日三夜簡子問其故, SBCK: 何如}
