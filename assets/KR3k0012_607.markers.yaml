  - {type: variant, offset: 962, length: 0, content: '', krp: 問曰何好曰好長劒子曰以子之能加之以學豈可及乎子路曰學豈有益哉子曰狂馬不釋䇿御狂馬者不得釋箠䇿也操弓不反檠弓不反檠然後可持木受繩則正人受諌則聖受學重問孰不順成子路曰南山有竹不揉自直斬而用之逹於犀革何學之爲孔子曰括而羽之鏃而厲之其入不益深乎子路拜曰敬受命又曰孔子謂伯魚曰吾聞可以與人而不倦者其唯學焉其容體不足觀也其勇力不足憚也其先祖不足稱也其族姓不足道也然而以顯聞四方流聲後丗者非學之効夫逺而有光者飾也近而愈明者學也譬之池也水潦注焉雚葦生焉雖觀之孰知其不源乎源衆流也言益者雖從外入及其用之誰知其非從巳出也又曰孔子兄子孔蔑者與宓子賤皆仕孔子問孔蔑曰女之仕何得何亡對曰所亡者三王事若聾若聾冝爲聾相因聾之也學焉得習是學不得明也奉禄少饘粥不及親戚是骨肉益䟽也公事多急不得弔死問疾是朋友道闕也孔子不恱往過子賤而問之對曰自來仕所得者三始誦之今得行之是學益明也奉禄𬒳親戚是骨肉益親也雖有公事兼之以弔死問疾是朋友信篤也孔子曰君子哉若人魯無君子斯焉取斯大戴禮曰學不可以巳矣青取之於藍而青於藍氷水爲之而寒於水木直中繩其曲中規揉使之然也是故不登髙山不知天之髙不臨深淵不知地之厚不聞先王之道不知學問之大也孔子曰吾終日思之不如須臾之學吾甞跋而望矣不如升髙之博見也升髙而招臂非加長而見者逺順風而呼聲非加疾而聞者速蓬生麻中不扶自直積土成山風雨興焉積水成川蛟龍生焉是故不積跬歩無以致千里不積小流無以成江海莊子曰人而不學謂之視肉學而不行命之撮囊撮繫者也又曰叔文相莒三年歸其母自績謂母}
