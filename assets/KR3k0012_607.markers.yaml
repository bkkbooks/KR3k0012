  - {type: variant, offset: 3302, length: 2, content: 腹心, SBCK: 清澄性理簸􅀭埃穢啓導聦明􅅚染質素察往知來􅀶渉勸戒仰觀俯察於是乎在雖云色白匪染不麗雖云味甘匪和弗美故瑶華不􅅣則耀夜}
  - {type: variant, offset: 3302, length: 2, content: 腹心, krp: 自開益蒙曰軍中常苦多務權曰孤豈欲卿治經爲博士耶但令渉獵見往事耳如卿二人意性朗悟學必得}
  - {type: variant, offset: 3305, length: 2, content: 任每, SBCK: 景不發青萍不治則純鈞之勁不就故質雖在我而成之由彼登閬風捫辰極然後知井谷之閉隘披七經玩百氏然後覺面墻之至困粉黛至則西施以加麗而􅀫瘤以􅅚醜經術深則髙才者洞逸而魯鈍者醒悟文梓干雲而不可名之爲臺樹者未知班輸之結搆也天倫爽朗而不可謂之爲君子者未識人倫之臧否也塩鐵論曰内無其質而外學其文雖}
  - {type: variant, offset: 3305, length: 52, content: 任每有疑事輒以函令問曄乃一夜數十至袠說文曰秩書衣也晉中經簿曰盛書有縑袠青縑袠布袠絹袠後漢書曰楊春卿臨命戒, krp: 冝急讀孫}
