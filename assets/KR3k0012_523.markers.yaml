  - {type: variant, offset: 1184, length: 978, content: 也教民嚴上也鬼者精魂所歸神者引物而出謂祖廟山川五祀之屬也達於喪祭射御冠昏朝聘民知嚴上則此禮達於下故聖人以禮示之故天下國家可得而正也又禮運曰禮者君之大柄也所以別嫌明微儐鬼神考制度別仁義所以治政安君也疾今失禮如此為言禮之大義也柄所操以治事又禮運曰是故夫禮必本於太一分而為天地轉而為陰陽變而為四時列而為鬼神又禮運曰故聖人之所以治人七情脩十義講信脩睦尚辭讓去爭奪舍禮何以治之唯禮可耳飲食男女人之大欲存焉死亡貧苦人之大惡存焉故欲惡者心之大端也人藏其心不可測度也美惡皆在其心不見其色也欲一以窮之舍禮何以哉言人情之難知明禮之重又禮運曰故禮行於郊而百神受職焉禮行於社而百貨可極焉禮行於祖廟而孝慈服焉禮行於五祀而正法則焉言信得其禮則神物興人皆應之百神列宿也百貨金玉之屬又禮運曰故禮義也者人之大端也所以講信脩睦而固人之肌膚之會筋骸之束也所以養生送死事鬼神之大端也所以達天道順人情之大竇也竇孔穴也故唯聖人為知禮之不可以已也故壞國喪家亡人必先去其禮言愚者之反聖人也故禮之於人也猶酒之有蘗也君子以厚小人以薄皆得以為美味性善者醇耳又禮器曰禮器是故大備大備盛德也禮器言禮使人成器如來耒耜之為用也人情以為田脩禮以耕之此是也大備自耕至於食之而肥禮釋回增美質措則正施則行釋猶去也回邪辟也質猶性也措置其在人也如竹箭之有筠也如松柏之有心也二者居天下之大端故貫四時而不改柯易葉君子有禮則外諧而內無怨故物無不懷仁鬼神饗德先王之立禮也有本有文忠信禮之本也義理禮之文也無本不立無文不行言必外內具也又禮器曰禮也者猶體也若人身體體不備君子謂之不成人設之不當猶不備也禮有大有小有顯有微大者不可損小者不可益顯者不可揜微者不可大也故經禮三百曲禮三千其致一也致之言至也一謂誠也經禮謂周禮也周禮六篇其官有三百六十曲猶事也事禮謂今禮今禮篇多亡本數未聞其中事儀三千未有入室而不由戶者三百三千皆猶誠也又禮器曰君子曰甘受和白受采忠信之人可以學禮茍無忠信之人則禮不虛道是以得其人之為貴也又樂記曰是故先王有大事必有禮以哀之有大福必有禮以樂之哀樂之分皆以禮終大事謂死喪也又經解曰禮之於正國也猶衡之於輕重也繩墨之於曲直也規矩之於方圓也故衡誠縣不可欺以輕重繩墨誠陳不可欺以曲直規矩誠設不可欺以方圓君子審禮不可誣以姦詐衡稱也縣謂重也陳設謂彈畫也誠猶審也是故隆禮由禮謂之有方之士不隆禮不由禮謂之無方之民敬讓之道也又經解曰故朝覲之禮所以明君臣, WYG: 長}
