  - {type: variant, offset: 644, length: 212, content: 親之也文王世子曰族食世降一等大傳曰繫之以姓而弗別綴之以食而弗殊百世而婚姻不通者周道然也以昏冠之禮親成男女親其思成其性以賓射之禮親故舊朋友射禮雖王亦立賓主也王者故舊朋友為世子時共在學者天子時有友諸侯之義武王誓曰我有邦冢君是也司寇職有議故之辟議賓之辟以饗燕之禮親四方之賓客賓客謂朝聘者以脤膰之禮親兄弟之國脤膰社稷宗廟之肉以賜同姓之國同福祿也兄弟有共先王者魯定公十四年天王使石尚來歸脤以賀慶之禮親異姓之國異姓王昏姻甥舅禮記曲禮曰夫, SBCK: 迎田祖致敬􅀑神祭皆用樂此伊􅂄氏即神農别號凶}
