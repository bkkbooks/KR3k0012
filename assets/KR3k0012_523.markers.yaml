  - {type: variant, offset: 1737, length: 408, content: 下之大端故貫四時而不改柯易葉君子有禮則外諧而內無怨故物無不懷仁鬼神饗德先王之立禮也有本有文忠信禮之本也義理禮之文也無本不立無文不行言必外內具也又禮器曰禮也者猶體也若人身體體不備君子謂之不成人設之不當猶不備也禮有大有小有顯有微大者不可損小者不可益顯者不可揜微者不可大也故經禮三百曲禮三千其致一也致之言至也一謂誠也經禮謂周禮也周禮六篇其官有三百六十曲猶事也事禮謂今禮今禮篇多亡本數未聞其中事儀三千未有入室而不由戶者三百三千皆猶誠也又禮器曰君子曰甘受和白受采忠信之人可以學禮茍無忠信之人則禮不虛道是以得其人之為貴也又樂記曰是故先王有大事必有禮以哀之有大福必有禮以樂之哀樂之分皆以禮終大事謂死喪也又經解曰禮之於正國也猶衡之於輕重也繩墨之於曲直也規矩之於方圓也故衡誠縣不可欺以輕重繩墨誠陳不可欺以曲直規矩誠設不可欺以方圓君子審禮不可誣以姦詐衡稱也縣謂重也陳設謂彈畫也誠猶審也是故隆禮由禮謂之有方之士不隆禮不由禮謂之無方之民敬讓, SBCK: 天}
