  - {type: punctuation, offset: 37, content: 《, id: KR3k0012_CHANT_523-bkkpn19}
  - {type: variant, offset: 37, length: 0, content: '', WYG: 周禮盡在魯矣吾乃知周公之徳與周之所以王也又昭公四年楚靈王使問禮於左師與子産左師曰小國習之大國用之敢不薦聞獻公合諸侯之禮六其禮六儀也宋公故獻公禮子産曰小國共職敢不薦守獻伯子男㑹公之禮六鄭伯爵故獻伯子男㑹公之禮又昭五年公如晋自郊勞至於贈賄無失禮晋侯謂女叔齊曰魯侯不亦善於禮乎對曰魯侯焉知禮公曰何為自郊勞至於贈賄禮無違者何故不知對曰是儀也不可謂禮禮所以守其國行其政令無失其民者也又昭七年曰孟僖子病不能}
  - {type: page-break, offset: 37, content: '', id: KR3k0012_WYG_523-3a, image: WYG0897/WYG0897-0652c.png}
  - {type: variant, offset: 38, length: 2, content: 鼠剌, WYG: 禮乃講學之苟能禮者從之及其將死也召其大夫曰禮人之幹也}
  - {type: page-break, offset: 38, content: '', id: KR3k0012_WYG_523-3b, image: WYG0897/WYG0897-0652d.png}
