  - {type: variant, offset: 2152, length: 0, content: '', SBCK: 周禮盡在魯也吾乃今知周公之德與周之所以王也昜象春秋文王周公之制當此情儒道廢諸國多門唯魯備}
  - {type: variant, offset: 2152, length: 0, content: '', krp: 周禮盡在魯也吾乃今知周公之德與周之所以王也昜象春秋文王周公之制當此情儒道廢諸國多門唯魯備}
  - {type: variant, offset: 2153, length: 2, content: 朝覲, SBCK: 宣子適魯而􅀃}
  - {type: variant, offset: 2153, length: 2, content: 朝覲, krp: 宣子適魯而說}
  - {type: variant, offset: 2156, length: 0, content: '', SBCK: 也又昭二曰楚靈王使問禮於左師與子産左師曰小國習之大國用之敢不薦聞言所聞謙示所未行獻公合諸侯之禮六其禮六儀也宋爵公故獻公禮子産曰小國共職敢不薦守獻伯子男㑹公之禮六鄭伯爵故獻伯子男㑹公之禮又昭二曰公如晉自郊勞至于贈賄徃有郊勞去有贈賄無失禮揖讓之禮晉侯謂女叔齊曰魯侯不亦善於禮乎對曰魯侯焉知禮公曰何爲自郊勞至于贈賄禮無違者何故不知對曰是儀也不可謂禮}
  - {type: variant, offset: 2156, length: 0, content: '', krp: 也又昭二曰楚靈王使問禮於左師與子産左師曰小國習之大國用之敢不薦聞言所聞謙示所未行獻公合諸侯之禮六其禮六儀也宋爵公故獻公禮子産曰小國共職敢不薦守獻伯子男㑹公之禮六鄭伯爵故獻伯子男㑹公之禮又昭二曰公如晉自郊勞至于贈賄徃有郊勞去有贈賄無失禮揖讓之禮晉侯謂女叔齊曰魯侯不亦善於禮乎對曰魯侯焉知禮公曰何爲自郊勞至于贈賄禮無違者何故不知對曰是儀也不可謂禮}
  - {type: punctuation, offset: 2157, content: ，, id: KR3k0012_CHANT_523-bkkpn576}
  - {type: 'tls:seg', offset: 2157, content: '', id: KR3k0012_CHANT_523-16a.4}
  - {type: variant, offset: 2159, length: 3, content: 明君臣, SBCK: 守其國行其政令無失其民者也又昭二曰孟僖子病不能相禮不能相儀荅郊勞以此爲巳疾乃講學之講習也苟能禮者從之及其將死也二十四年孟僖子卒傳終言之召其大夫曰禮人之幹也無禮無以立吾聞將有逹者曰孔丘僖子卒時孔丘年三十五聖人之後也我􅀂􅀗没得以壽終必屬􅀃與何忌於夫子使事之􅀃南宫敬叔何忌孟懿子皆僖子之子也而學禮焉以定其位知禮則位安又昭六曰鄭子大叔見趙簡子簡子問揖讓周旋之禮焉對曰是儀也非禮也簡子曰敢問何謂禮對曰􅁻也聞諸先大夫子産曰夫禮天之經也經者道之常地}
  - {type: page-break, offset: 2159, content: '', id: KR3k0012_SBCK_523-2b}
  - {type: variant, offset: 2159, length: 3, content: 明君臣, krp: 守其國行其政令無失其民者也又昭二曰孟僖子病不能相禮不能相儀荅郊勞以此爲巳疾乃講學之講習也苟能禮者從之及其將死也二十四年孟僖子卒傳終言之召其大夫曰禮人之幹也無禮無以立吾聞將有逹者曰孔丘僖子卒時孔丘年三十五聖人之後也我若獲没得以壽終必屬說與何忌於夫子使事之說南宫敬叔何忌孟懿子皆僖子之子也而學禮焉以定其位知禮則位安又昭六曰鄭子大叔見趙簡子簡子問揖讓周旋之禮焉對曰是儀也非禮也簡子曰敢問何謂禮對曰吉也聞諸先大夫子産曰夫禮天之經也經者道之常地}
