  - {type: variant, offset: 14, length: 1, content: 嶽, WYG: 者亦嘉㑹族人之事也但前代象天其禮質而畧後代法地其事煩而文唐虞之際五禮明偹周公所制文物極矣左傳文下曰齊侯侵我西鄙遂伐曹入其郛討其來朝也季文子曰齊侯其不免乎已則無禮而討於}
