  - {type: variant, offset: 390, length: 0, content: '', WYG: 畢盡伏置法酒文頴曰作酒令法也蘇林曰嘗㑹酒天子中起更衣然後入置酒諸侍坐殿上皆伏抑首以尊卑次起上夀觴九行謁者言罷酒御史執法舉不如儀者輙引去竟朝置酒無敢諠譁失禮者於是髙皇帝曰吾乃今日知為皇帝之貴也拜通為太常賜金五百斤通出皆以五百金賜諸生諸生乃喜曰叔孫生聖人知當世務也又曰王者必因前王之禮而順時施宜有所損益節人之心稍稍制作又曰宣帝時諫議大夫王吉上疏願述舊禮明王制驅一代之人躋仁夀之域范􅁮後漢書曰曹褒傳曰詔召𤣥武司馬班固問改定禮制之宜固曰京師諸士多能說禮宜廣招集乃能共議得失帝曰諺言作舎道傍三年不成㑹禮之家名為聚訟互生疑異筆不得下昔堯作大章一䕫足矣章和元年正月乃召褒詣嘉徳門令小黄門持班固所上叔孫通漢儀禮十二篇敕褒曰此制散畧多不合經今宜依禮條正使可施行於南宫東觀盡心集作典畧曰孔子過宋與弟子習禮於大樹下宋司馬桓魋使㧞其樹去適鄭六韜曰太公對文王曰禮者治之粉澤也管子曰禮者因人之情縁義之理為人節文者也孟子曰惻隐之心仁之端也辭讓之心禮之端也孫卿子曰禮者人主以為羣臣尺寸尋丈檢式也禮有三本天}
