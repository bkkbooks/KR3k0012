  - {type: variant, offset: 452, length: 0, content: '', WYG: 晏子聘魯下堂則趨授立則跪子貢怪之問孔子孔子問晏子晏子對曰夫上堂之禮君行一臣行二也今君之受幣也卑臣敢不跪乎孔子曰善禮中又有禮也董生書曰理者天所為也文者人所為謂之禮禮者因人情}
