  - {type: variant, offset: 2444, length: 410, content: 知禮謙不荅曰君曰否吾子言之也孔子曰丘聞之民之所由生禮為大非禮無以節事天地之神也非禮無以辨君臣上下長幼之位也非禮無以別男女父子兄弟之親昏姻䟽數之交也君子以此之為尊敬然言君子以此故尊禮又曰仲尼燕居子張子貢言游侍縱言至於禮言游言偃子游也縱言汎說事子曰居女三人者吾語女禮使女以禮周流無不偏也居女三人者女三人且坐也使之坐凡與尊者言更端則起也子貢越席而對曰敢問何如對應也子曰敬而不中禮謂之野恭而不中禮謂之給勇而不中禮謂之逆言游進曰敢問禮也者領惡而全好者與子曰然領猶治也好善也然則何如子曰郊社之義所以仁鬼神也嘗禘之禮所以仁昭穆也饋奠之禮所以仁死喪也射鄉之禮所以仁鄉黨也食享之禮所以仁賓客也仁猶存也凡存此者所以全善之道郊社嘗禘饋奠存死之善者也射鄉食享存生之善者也郊有后稷社有勾龍子曰明乎郊社之義嘗禘之禮治國其如指諸掌而已乎是故以之居處有禮故長幼辨也以之閨門之內有禮故三族和也以之朝廷有禮故官爵序也以之田獵有禮故戎事閑也以之軍旅有禮故武功, SBCK: ''}
