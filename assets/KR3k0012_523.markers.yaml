  - {type: 'tls:seg', offset: 873, content: '', id: KR3k0012_CHANT_523-5a.5}
  - {type: variant, offset: 873, length: 671, content: 道德仁義非禮不成教訓正俗非禮不備分爭辯訟非禮不決君臣上下父子兄弟非禮不定宦學事師非禮不親班朝治軍涖官行法非禮威嚴不行禱柌祭祀供給鬼神非禮不誠不莊是以君子恭敬樽節退讓以明禮樽猶趨也曲禮曰人有禮則安無禮則危故曰禮者不可不學也夫禮者自卑而尊人雖負販者必有尊也而況富貴乎負販者尤輕佻志利宜者無禮然富貴而知好禮則不驕不淫貧賤而知好禮則志不懾懾猶也又曲禮下曰君子行禮不求變俗求猶務也又禮運曰孔子曰夫禮先王以承天之道以治人之情故失之者死得之者生詩曰相鼠有體人而無禮人而無禮胡不遄死相視也遄疾言鼠之有身體如人而無禮者矣人之無禮可僧賤如鼠不如疾死之愈是故天禮必本於天殽於地列於鬼神聖人則大之明因地之利取法度於鬼神以制禮下教令也既又禮之盡其敬也教民嚴上也鬼者精魂所歸神者引物而出謂祖廟山川五祀之屬也達於喪祭射御冠昏朝聘民知嚴上則此禮達於下故聖人以禮示之故天下國家可得而正也又禮運曰禮者君之大柄也所以別嫌明微儐鬼神考制度別仁義所以治政安君也疾今失禮如此為言禮之大義也柄所操以治事又禮運曰是故夫禮必本於太一分而為天地轉而為陰陽變而為四時列而為鬼神又禮運曰故聖人之所以治人七情脩十義講信脩睦尚辭讓去爭奪舍禮何以治之唯禮可耳飲食男女人之大欲存焉死亡貧苦人之大惡存焉故欲惡者心之大端也人藏其心不可測度也美惡皆在其心不見其色也欲一以窮之舍禮何以哉言人情之難知明禮之重又禮運曰故禮行於郊而百神受職焉禮行於社而百貨可極焉禮行於祖廟而孝慈服焉禮行於五祀而正法則焉言信得其禮則神物興人皆應之百神列宿也百貨金玉之屬又禮運曰故禮義也者人之大端也所以講信脩睦而固人之肌膚之會筋骸之束也所以, SBCK: 皇帝始}
