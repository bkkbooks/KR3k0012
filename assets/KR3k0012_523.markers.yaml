  - {type: variant, offset: 381, length: 1, content: 統, WYG: 禮節之亦不可行也子曰道之以政齊之以刑民免而無耻道之以徳齊之以禮有耻且格又子曰夏禮吾能言之杞不足徴也殷禮吾能言之宋不足徴也又子張問十世可知也子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世亦可知也又曰顔淵問仁子曰克己復禮為仁一日克己復禮天下歸仁焉為仁由己而由人乎哉顔淵曰請問其目子曰非禮勿視非禮勿聼非禮勿言非禮勿動顔淵曰囘雖不敏請事斯語矣又子曰禮云禮云玊帛云乎哉言禮非但崇此玊帛而已所貴者乃責其安上治民而已矣漢書曰漢王已并天下諸侯共尊為皇帝於定陶叔孫通就其儀號髙帝悉去秦儀法為簡易群臣飲醉爭功或妄手㧞劍撃柱上患之通知上益饜之說上曰夫儒者難與進取可與守成臣願徴魯諸生與臣弟子共起朝儀上曰可試為之令易知度吾所能行為之七年長樂宫成諸侯羣臣朝十月大行設九賔臚句傳於是皇帝輦出房}
