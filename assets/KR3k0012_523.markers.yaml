  - {type: variant, offset: 2410, length: 0, content: '', SBCK: 昭六曰齊景公曰善哉吾仐而後知禮之可以爲國也對曰禮之可以爲國也乆矣與天地並有天地則禮義興君令臣共父慈子孝兄愛弟敬夫和妻柔姑慈婦聽禮也君令而不違臣共而不貳父慈而教子孝而箴箴諌也兄愛而友弟敬而順夫和而義妻柔而正姑慈而從從不自專婦聽而婉婉順也禮之善物也又定下曰公㑹齊侯于祝其實夾谷夾谷即祝其地孔丘相相㑹儀也犂彌言於齊侯曰孔丘知禮而無勇􅀂使萊人以兵刧魯侯必得志焉又定下曰邾隱公來朝邾子益也子貢觀焉邾子執玉髙其容仰公受玉卑其容俯王朝者之贄子貢曰以禮觀之二君者皆有死亡焉夫禮死生存亡之禮也將左右周旋進退俯仰於是乎觀之今正月相朝而皆不度不合法度心巳亡矣又}
