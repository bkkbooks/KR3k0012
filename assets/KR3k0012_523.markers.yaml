  - {type: variant, offset: 12, length: 533, content: 咨四嶽有能典朕三禮三禮天神地祗人鬼之禮也毛詩國風曰相鼠剌無禮也衛文公能正其群臣而剌在位承先君之化無禮儀也相鼠有皮人而無儀相視無禮儀者雖居尊位猶為闇昧之行箋云儀威儀也視鼠有皮雖處高顯之處偷食茍得不知廉恥亦與人無威儀者同人而無儀不死何為箋云人以有威儀為貴今反無之傷化敗俗不知其死無所害也相鼠有齒人而無止止所止息箋云止容止孝經曰容止可觀人而無止不死何俟俟待也相鼠有體體支體也人而無禮人而無禮胡不遄死遄速也毛詩國風曰蒹葭剌襄公也未能用周禮將無以固其國焉秦處周之舊土其人披周之德教曰久矣今襄公親為諸侯未習周之禮法故國人未服焉蒹葭蒼蒼白露為霜興也蒹葭蘆也蒼蒼盛也白露疑戾為霜然後歲事成國家待禮然後興箋云蒹葭在眾草之中也蒼然疆至白露凝戾為霜則成而黃興者喻眾者不後襄公政令者得周禮以教之則服所謂伊人在水一方周禮天官曰太宰之職掌建邦之六典三曰禮典以和邦國以統百官以諧萬民周禮地官司徒曰司徒之職掌施十有二教焉一曰以祀禮教敬則民不茍二曰以陽禮教讓則民不爭三曰以陰禮教親則民不怨四曰以禮樂教和則民不乖五曰以儀辯等則民不越六曰以俗教安則民不愉七曰以刑教中則民不虣八曰以誓教恤則民不怠九曰以度教節則民知足十曰以世事教能則民不失職十有一曰以賢制爵則民慎德十有二曰以庸制祿則民興功周禮地官曰大司徒以, SBCK: 􅁻凶賔軍嘉即}
  - {type: variant, offset: 12, length: 1, content: 咨, WYG: 吉凶賔軍嘉即五禮之目也吉禮者祭祀郊廟社禝之事是也起自神農氏始教民種穀禮始於飲食吹葦籥擊土鼔以迎田祖致敬鬼神祭皆用樂此伊耆氏即神農别號賔禮者䘮紀之說年榖不登大夫去國之事也黄帝始養生送死也賔禮者貢獻朝聘之事是也軍禮者始黄帝與蚩尤戰於涿鹿之野嘉禮者好㑹之事也起自伏羲以儷皮焉始制嫁娶亨通者嘉㑹之事其後有冠冠者代父之事昏有繼世之道物有代謝之期悲發於中乃非純吉故為喜慰之事者也鄉飲酒郷射食耆老王燕族人之事是也}
  - {type: page-break, offset: 12, content: '', id: KR3k0012_WYG_523-1b, image: WYG0897/WYG0897-0651d.png}
