  - {type: variant, offset: 2857, length: 4, content: 仲尼燕居, SBCK: 曰子張問十丗可知也丗謂易姓之丗也問其制度變易如何子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也所損益可知也者據時篇目皆在可校數其或繼周者雖百丗可知也自周之後以爲變易損益之極極於三王亦不是過也又曰顔淵問仁子曰克巳復禮爲仁一日克巳復禮天下歸仁焉爲仁由巳而由人乎哉顔淵曰請問其目子曰非禮勿視非禮勿聽非禮勿言非禮勿動顔淵曰回雖不敏請事斯語矣又}
