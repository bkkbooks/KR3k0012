  - {type: variant, offset: 2866, length: 1, content: 何, SBCK: 乃貴其安上治民漢書曰漢王巳并天下諸侯共尊爲皇帝於定陶叔孫通就其儀號髙帝悉去秦儀法爲簡易羣臣飲争功醉或妄呼抜劒擊柱上患之通知上益饜之􅀃上曰夫儒者難與進取可與守成臣願徴魯諸生與臣弟子共起朝儀上曰可試爲之令易知度吾所能行爲之七年長樂宫成諸侯群臣朝十月大行設九賔臚句傳上傳語告下爲臚下告上爲句於是皇帝輦岀房百官執㦸傳警引諸侯王以下至吏六百石以次奉賀自諸侯王以下莫不震恐肅敬至禮畢盡伏置法酒文頴曰作酒令法}
