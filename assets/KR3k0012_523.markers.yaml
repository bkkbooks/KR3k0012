  - {type: variant, offset: 55, length: 3, content: 承先君, WYG: 又昭二十五年鄭子太叔見趙簡子問揖讓周旋}
  - {type: variant, offset: 59, length: 2, content: 化無, WYG: ''}
  - {type: variant, offset: 62, length: 0, content: '', WYG: 焉對曰是}
  - {type: punctuation, offset: 64, content: 。, id: KR3k0012_CHANT_523-bkkpn24}
  - {type: 'tls:seg', offset: 64, content: '', id: KR3k0012_CHANT_523-1a.14}
  - {type: variant, offset: 64, length: 0, content: '', WYG: 非禮也簡子曰敢問何為禮對曰吉也聞諸先大夫子産曰夫禮天之經也地之義也民之行也天地之經而民實則之簡子曰甚哉禮之大也對曰禮上下之紀天地之經緯也民之所以生也是故先王尚之又昭二十六年齊景公曰善哉吾今而後知禮之可以為國也晏子對曰禮之可以為國也久矣與天地並君令臣恭父慈子孝兄愛弟敬夫和妻柔姑慈婦聼禮也君令而不違臣恭而不二父慈而教子孝而箴兄愛而友弟敬而順夫和而義妻柔而正姑慈而從婦聼而婉禮之善物也又定下曰公㑹齊侯於祝其實夾谷夾谷即祝其地孔丘}
  - {type: page-break, offset: 64, content: '', id: KR3k0012_WYG_523-4a, image: WYG0897/WYG0897-0653a.png}
  - {type: page-break, offset: 64, content: '', id: KR3k0012_WYG_523-4b, image: WYG0897/WYG0897-0653b.png}
  - {type: variant, offset: 65, length: 4, content: 鼠有皮人, WYG: 㑹儀也犂彌言於齊侯曰孔丘知禮}
  - {type: punctuation, offset: 68, content: ，, id: KR3k0012_CHANT_523-bkkpn25}
  - {type: 'tls:seg', offset: 68, content: '', id: KR3k0012_CHANT_523-1a.15}
  - {type: variant, offset: 71, length: 59, content: 儀相視無禮儀者雖居尊位猶為闇昧之行箋云儀威儀也視鼠有皮雖處高顯之處偷食茍得不知廉恥亦與人無威儀者同人而無儀不死何為箋云, WYG: 勇若使萊}
