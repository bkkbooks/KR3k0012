  - {type: variant, offset: 446, length: 0, content: '', WYG: 而迫性命之情慎子曰禮從俗政上國有貴賤之禮無賢不肖之禮有長㓜之禮無勇怯之禮有親踈之禮無愛惡之禮也淮南子曰禮者體情而制文者也又曰夫水積}
