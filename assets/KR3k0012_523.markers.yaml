  - {type: variant, offset: 447, length: 0, content: '', WYG: 生相食之䖝言大魚食小魚土積則生食肉之獸禮飾則生偽慝之儒夫吹灰而欲無昧渉水而欲無濡不可得也說苑曰齊景公登酎晏子脩食禮以侍公曰禮寡人厭之矣吾欲得天下勇士與之圗國晏子對曰君子無禮是庶人也庶人無禮是禽獸也禮而治國所以御}
  - {type: page-break, offset: 447, content: '', id: KR3k0012_WYG_523-9b, image: WYG0897/WYG0897-0655d.png}
