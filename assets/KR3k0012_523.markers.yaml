  - {type: variant, offset: 2868, length: 2, content: 即事, SBCK: 􅂫林曰常㑹湏天子中起更衣然後入置酒諸侍坐殿上皆伏抑首如淳曰抑屈以尊卑次起上壽觴九行謁者言罷酒御史執法舉不如儀者輙引去竟朝置酒無敢讙譁失禮者於是髙帝曰吾乃今日知爲皇帝}
  - {type: variant, offset: 2868, length: 2, content: 即事, krp: 蘇林曰常㑹湏天子中起更衣然後入置酒諸侍坐殿上皆伏抑首如淳曰抑屈以尊卑次起上壽觴九行謁者言罷酒御史執法舉不如儀者輙引去竟朝置酒無敢讙譁失禮者於是髙帝曰吾乃今日知爲皇帝}
  - {type: variant, offset: 2871, length: 0, content: '', SBCK: 貴也拜通爲太常賜金五百斤通出皆以五百金賜諸生諸生乃喜曰叔孫生聖人知當丗務也又曰王者必因前王之禮而順時施冝有所損益節人之心稍稍制作又曰宣帝時諌議大夫王吉上䟽願􅄒舊禮明王制驅一代之人躋之仁壽之域范曄後漢書曹襃傳曰詔召玄武司馬班固問改定禮制之冝固曰京師諸儒多能􅀃禮冝廣招集共議失得帝曰諺言作舎道邊三年不成㑹禮之家名爲聚訟牙生疑異筆不得下昔尭作大章一夔足矣章和元年正月乃召褒詣嘉德門令小黄門持班固所上叔孫通漢儀十二篇勑襃曰此制散略多不合經今冝依禮條正使可施行於南宮東觀盡心集作典略曰孔子過宋與弟子集禮於大樹下宋司馬桓魋使抜其樹去適鄭六韜曰太公對文王曰禮者}
  - {type: page-break, offset: 2871, content: '', id: KR3k0012_SBCK_523-5a}
  - {type: variant, offset: 2871, length: 0, content: '', krp: 貴也拜通爲太常賜金五百斤通出皆以五百金賜諸生諸生乃喜曰叔孫生聖人知當丗務也又曰王者必因前王之禮而順時施冝有所損益節人之心稍稍制作又曰宣帝時諌議大夫王吉上䟽願𫐠舊禮明王制驅一代之人躋之仁壽之域范曄後漢書曹襃傳曰詔召玄武司馬班固問改定禮制之冝固曰京師諸儒多能說禮冝廣招集共議失得帝曰諺言作舎道邊三年不成㑹禮之家名爲聚訟牙生疑異筆不得下昔尭作大章一夔足矣章和元年正月乃召褒詣嘉德門令小黄門持班固所上叔孫通漢儀十二篇勑襃曰此制散略多不合經今冝依禮條正使可施行於南宮東觀盡心集作典略曰孔子過宋與弟子集禮於大樹下宋司馬桓魋使抜其樹去適鄭六韜曰太公對文王曰禮者}
