  - {type: variant, offset: 23, length: 0, content: '', WYG: 禮以順}
  - {type: variant, offset: 24, length: 3, content: 神地祗, WYG: 天之道也已則反天而又以討}
  - {type: punctuation, offset: 25, content: 、, id: KR3k0012_CHANT_523-bkkpn11}
  - {type: punctuation, offset: 27, content: 、, id: KR3k0012_CHANT_523-bkkpn12}
  - {type: variant, offset: 28, length: 1, content: 鬼, WYG: 難以免矣又文公曰先大夫臧文仲教行父事君之禮行父奉以周旋弗敢失隊曰見有禮於其君者事之如孝子之養父母也見無禮於其君者誅之如鷹鸇之逐鳥雀也又宣十六年晉侯使士㑹平王室定王享之原襄公相禮殽蒸蒸升也升殽於爼武子私問其故享當體薦而殽蒸故其怪問之武士㑹諡季字也王聞之召武子曰季氏而弗聞乎王享有體薦享則半觧其體而薦之所以示共儉宴有折爼體觧節折升之於爼物皆可食所以示慈恵也公當享卿當宴王室}
  - {type: page-break, offset: 28, content: '', id: KR3k0012_WYG_523-2b, image: WYG0897/WYG0897-0652b.png}
