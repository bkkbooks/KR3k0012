  - {type: 'tls:seg', offset: 2873, content: '', id: KR3k0012_CHANT_523-19a.6}
  - {type: variant, offset: 2873, length: 0, content: '', SBCK: 管子曰禮者因人之情縁義之理爲之節文者也孟子曰惻隠之心仁之端也辭讓之心禮之端也孫卿子曰禮者人主以爲群臣尺寸㝷文檢式也禮有三夲天地生之夲先祖􅀋之夲君師治之夲國之夲在禮也又曰人生有欲欲則求求則爭爭則亂亂則窮先王惡其亂也故制禮義以養之禮者養也稻梁五味所以養口也椒蘭芬馨所以養􅈹也雕􅅣刻鏤黼黻文章所以養自也䟽房越席沐浴机筵所以養體也莊子曰三王五帝之禮儀法度不矜於同而矜於治故譬三王五帝之禮儀法度其猶柤橘柚菓􅀲之屬耶其味反而皆可於口文予曰老子云爲禮者雕􅅣人性矯拂其情目雖欲之禁以法心雖樂之節以禮趍翔周旋屈節異儀肉凝而弗食酒敗而不飲外束其形中愁其意汨隂陽之和而迫生命之情慎子曰禮從俗政上國有貴賤之禮無賢不肖之禮有長㓜之禮無勇怯之禮有親踈之禮無愛惡之禮也淮南子曰禮者體情而制文者也又曰夫水積則生相食之􅆉言大魚食小魚士積則生食􅁏之獸禮飾則生僞慝之儒僞詐慝姦夫吹􅁅而欲無眯渉水而欲無濡不可得也􅀃苑曰齊景公登酎晏子脩食禮以待公曰禮寡人饜之矣吾欲得天下勇士與之圗國晏子對曰}
