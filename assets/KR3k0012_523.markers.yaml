  - {type: variant, offset: 2169, length: 0, content: '', SBCK: 之大也對曰禮上下之紀天地之經緯也緯經錯居以相成者民之}
  - {type: variant, offset: 2169, length: 773, content: 所以使諸侯相尊敬也喪祭之禮所以明臣子之恩也鄉飲酒之禮所以明長幼之序也婚姻之禮所以明男女之別也夫禮禁亂之所由生猶坊止水之所自來也故以舊坊為無所用而壞之者必有水敗以舊禮為無所用而去之者必有亂患春見曰朝小聘曰問昏姻謂嫁娶也壻曰昏妻曰姻自以由也故昏姻之禮廢則夫婦之道苦而淫辟之罪多矣鄉飲酒之禮廢則長幼之序失而爭鬭之獄繁矣喪祭之禮廢則臣子之恩薄而倍死忘生者眾矣聘覲之禮廢則君臣之位失諸侯之行惡而倍畔侵陵之欺起矣若謂不至不荅之屬故禮之教化也微其止邪也於未形使人日徙善遠罪而不自知也是以先王隆之又哀公問曰哀公問於孔子曰大禮何如君子之言禮何其尊也孔子曰丘也小人不足以知禮謙不荅曰君曰否吾子言之也孔子曰丘聞之民之所由生禮為大非禮無以節事天地之神也非禮無以辨君臣上下長幼之位也非禮無以別男女父子兄弟之親昏姻䟽數之交也君子以此之為尊敬然言君子以此故尊禮又曰仲尼燕居子張子貢言游侍縱言至於禮言游言偃子游也縱言汎說事子曰居女三人者吾語女禮使女以禮周流無不偏也居女三人者女三人且坐也使之坐凡與尊者言更端則起也子貢越席而對曰敢問何如對應也子曰敬而不中禮謂之野恭而不中禮謂之給勇而不中禮謂之逆言游進曰敢問禮也者領惡而全好者與子曰然領猶治也好善也然則何如子曰郊社之義所以仁鬼神也嘗禘之禮所以仁昭穆也饋奠之禮所以仁死喪也射鄉之禮所以仁鄉黨也食享之禮所以仁賓客也仁猶存也凡存此者所以全善之道郊社嘗禘饋奠存死之善者也射鄉食享存生之善者也郊有后稷社有勾龍子曰明乎郊社之義嘗禘之禮治國其如指諸掌而已乎是故以之居處有禮故長幼辨也以之閨門之內有禮故三族和也以之朝廷有禮故官爵序也以之田獵有禮故戎事閑也以之軍旅有禮故武功成也又仲尼燕居曰子曰禮者何也即事之治也君子有其事必有其治治國而無禮譬猶瞽之無相與倀倀乎其何之譬如終夜有求於幽室之中非燭何以見若無禮則手足無所錯耳目無所加進退揖讓無所制又坊記曰子, WYG: 論}
  - {type: variant, offset: 2169, length: 0, content: '', krp: 之大也對曰禮上下之紀天地之經緯也緯經錯居以相成者民之}
