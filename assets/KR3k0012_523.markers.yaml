  - {type: variant, offset: 32, length: 2, content: 毛詩, WYG: 武子歸而講求典禮以脩晉}
  - {type: punctuation, offset: 34, content: ‧, id: KR3k0012_CHANT_523-bkkpn15}
  - {type: variant, offset: 35, length: 1, content: 風, WYG: 之法又昭二年晉侯使韓宣子來聘公即位故且告為政而來見禮也觀書於太史氏見易象與魯春秋}
