  - {type: punctuation, offset: 2149, content: 《, id: KR3k0012_CHANT_523-bkkpn572}
  - {type: variant, offset: 2149, length: 0, content: '', SBCK: 以討人難以免矣又文公曰先大夫臧文仲教行父事君之禮行父奉以周旋弗敢失隊曰見有禮於其君者事之如孝子之養父母也見無禮於其君者誅之如鷹鸇之逐鳥雀也又宣十六年晉侯使士㑹平王室定王享之原襄公相禮原襄公周大夫相佐也殽烝烝升也升殽於俎武子私問其故享當體薦而殽烝怪故問之士㑹謚季其字王聞之召武子曰季氏而弗聞乎王享有體薦享則半解其體而薦之所示以共儉宴有折爼體解節折升之於爼物皆可食所以示慈惠也公當享卿當宴王室之禮也公謂諸侯武子歸而講求典禮以脩晉國之法又昭二年曰晉侯使韓宣子來聘公即位故且告爲政而來見禮也代趙武爲政雖盟主而脩好同盟故曰禮觀書於太史氏見易象與魯春秋曰周禮盡在魯矣昜象上下}
  - {type: page-break, offset: 2149, content: '', id: KR3k0012_SBCK_523-2a}
  - {type: variant, offset: 2149, length: 0, content: '', krp: 以討人難以免矣又文公曰先大夫臧文仲教行父事君之禮行父奉以周旋弗敢失隊曰見有禮於其君者事之如孝子之養父母也見無禮於其君者誅之如鷹鸇之逐鳥雀也又宣十六年晉侯使士㑹平王室定王享之原襄公相禮原襄公周大夫相佐也殽烝烝升也升殽於俎武子私問其故享當體薦而殽烝怪故問之士㑹謚季其字王聞之召武子曰季氏而弗聞乎王享有體薦享則半解其體而薦之所示以共儉宴有折爼體解節折升之於爼物皆可食所以示慈惠也公當享卿當宴王室之禮也公謂諸侯武子歸而講求典禮以脩晉國之法又昭二年曰晉侯使韓宣子來聘公即位故且告爲政而來見禮也代趙武爲政雖盟主而脩好同盟故曰禮觀書於太史氏見易象與魯春秋曰周禮盡在魯矣昜象上下}
  - {type: variant, offset: 2150, length: 1, content: 解, SBCK: 之象辝魯春秋史記之䇿書春秋遵周公之典以序事故}
