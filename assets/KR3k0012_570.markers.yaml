  - {type: variant, offset: 1281, length: 617, content: 後每大會使俳優著介幘黃絹單衣優問汝為何官在我輩中曰我本為館陶令斗數單衣曰政坐取是故入汝輩中以為笑列女傳曰夏桀既棄禮義淫於婦人求四方美人積之後宮於俳優侏儒而為奇偉戲者取之於房造爛熳之樂漢官典職曰正旦天子幸德陽殿作九賓樂舍利從東來戲於庭畢入殿門激水化成比目魚跳躍漱水作霧鄣日畢化成黃龍高丈八出水遨戲於庭炫燿日光以二丈絲繫兩柱中頭間相去數丈兩倡女對舞行於繩上又蹐局屈身藏形斗中鍾聲並唱樂畢作魚龍蔓延黃門鼓吹三通賈誼連語曰衛侯喜鶴鶴有飾以文繡而乘軒者賦歛繁多不顧其民貴優而輕大臣群臣或諫則面而叱之及翟伐衛寇挾域堞矣衛君泣而拜其臣民曰寇迫矣士民其逸之士民曰亦使君之貴優將君之愛鶴以君守戰矣我儕棄人也安能戰乃潰門而出走翟入衛君奔死遂喪其國梁元帝纂要曰古艷曲有北里靡靡激楚結風陽阿之曲又有百戲起於秦漢有魚龍蔓延假作獸以戲高絙鳳皇安息王案並石季龍所作見鄴中記都盧尋橦今之緣竿見西京賦九劍九一名鈴見西京賦戲車山車興雲動雷見李尤平樂觀賦跟挂腹旋並緣竿所作見傅玄西都賦吞刀見西京賦吐火見西京賦激水轉石漱霧杠鼎並見李尤長樂觀及傅玄西都賦象人見漢書韋昭曰今之假面怪獸含利之戲並見西京賦列子曰宋有孫子者以妓干宋元君以雙枝長倍其身屬其腫並趣並馳弄七劍迭而躍之五劍常在空中元君大驚立賜金帛又有蘭子能鷰戲者復以干元君元君大怒曰昔以異伎干寡人伎無用遇寡人歡心彼必聞此而進乃拘而戮之鷰戲若絕倒投也石虎鄴中記曰虎正會殿前作樂高絙龍魚鳳凰安息五案之屬莫不畢備有額上緣橦至上鳥飛, SBCK: ''}
