  - {type: variant, offset: 3471, length: 762, content: 萌兆襄矣樂以間山川之風輝德於廣遠也風德以廣風德者德各有風類也作樂各象其德韶夏護武之謂也風山川以遠之所樂以通山川之風類也遠其德也風物以聽之修詩以詠之修禮以節之夫德廣遠而有節是以遠服而邇不遷邇近說苑曰子路鼓瑟有北都之聲孔子聞之曰信矣由之不才也冉有侍孔子曰求來爾奚不謂由夫先王之制音也奏中聲為中節彼小人則不然執末以論本務剛以為基故其音湫厲而微末以象殺伐之氣夫殺者乃亂亡之風也冉有以告子路子路曰由之罪也後果不得其死焉淮南子曰揚鄭衛之浩樂結激楚之遺風此齊人之所以淫泳流湎列女傳曰夏桀既棄禮義淫於婦人求四方美人積之後宮造爛漫之樂呂氏春秋曰音樂之所由來遠矣故唯得道之人其可與言樂乎亡國戮民非無樂也其樂不樂溺者非不笑也溺人必笑雖笑不樂罪人非不歌也當死強歌歌不樂也亂世之樂有似於此夫樂有適心亦有過人之情欲壽而惡夭欲安而惡危欲榮而惡辱欲逸而惡勞四欲得四惡除則心適矣又曰楚之衰也作為巫音高誘注曰男曰鷡女曰巫華桓譚新論曰夫不剪之室不如阿房之宮不琢之椽不如磨龍石之桶玄酒不如蒼梧之醇控楬不如流鄭之樂樂說曰聲放散則政荒崔氏云由君上驕逸則萬物荒散商聲欹散邪官不理政壞刑罰不法而威令不行角聲憂愁為政虐民民怨故也民不安業猶君失政徵聲哀苦事煩民勞君淫佚崔氏云由君邪民苦於役羽聲傾危則國不安崔氏云賦徭重其民困財物匱梁元帝纂要云古艷曲有北里靡靡激楚流風陽阿之曲皆非正聲之樂也流風亦曰結風也唐會要曰調露元年太子使樂工於東宮新作寶慶之曲成命工者奏于太清觀始平縣令李嗣真謂道士劉概輔儼曰此樂宮商不和君臣相阻之徵也角徵失位父子不恊之兆也殺聲既多哀調又苦若國家無事太子受其咎矣數月太子廢又曰咸通中伶官李可久善音律尤能轉喉為新聲音辭曲折聽者忘倦京師屠沽少年効效之謂之拍彈時同昌公主除喪懿宗與郭淑妃悼念不已可久為歎百年舞曲舞人皆盛飾珠翠仍畫魚龍地衣以列之曲終樂闋珠翠履地詞語悽惻, SBCK: ''}
