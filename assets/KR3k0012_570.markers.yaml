  - {type: punctuation, offset: 5, content: 《, id: KR3k0012_CHANT_570-bkkpn1}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 官曰太師大祭祀師瞽登歌小師掌教絃歌教調教瞽矇出音絃謂琴瑟歌依詠詩也左傳哀二十一年八月公及齊侯邾子盟于顧齊人責稽首因歌之曰魯人之皋數年不覺使我髙蹈言魯人皋綏數年不知荅齊稽首故使我髙蹈來為此㑹唯其儒書以為二國憂又曰昭公十二年南蒯將適費飲鄉人酒鄉人或歌之曰我有圃生之祀乎從我者子乎去我者鄙乎倍其隣者恥乎已乎已乎非吾黨之士乎又曰哀五年}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_WYG_570-5a, image: WYG0898/WYG0898-0251c.png}
  - {type: variant, offset: 7, length: 1, content: 元, SBCK: 太師大􅀕祀師瞽登歌小師掌教絃歌教謂教瞽朦出音絃謂琴瑟歌依詠詩也左傳哀二十一年八月公乃齊侯邾子盟齊人責稽首因歌之曰魯人之臯數年不覺使我髙蹈言魯人臯緩數年不知荅斉稽首故使我髙蹈來爲此㑹唯其儒書以爲二國憂又曰昭十三年南蒯將適費飲郷人酒郷人或歌之曰我有圃生之􅂎乎從我者子乎去我者鄙乎倍其鄰者耻乎巳乎巳乎非吾黨之士乎巳乎巳乎言自遂不改又曰哀五年秋齊景公卒冬十月公子嘉公子駒公子黔奔衛公子鉏公子陽生來奔皆景公子在萊者萊人歌之景公死乎不與埋三軍之事乎不與謀師乎師乎何黨之乎又曰襄四年崔子稱疾不視事公問崔子遂從姜氏入于室公拊楹而歌歌以}
