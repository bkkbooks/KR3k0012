  body:
  - {type: variant, offset: 2, length: 3, content: 七優倡, SBCK: 八歌一釋名曰人聲曰歌歌柯也以聲吟詠有上下如草木有柯葉充言歌聲如柯也爾雅曰徒歌謂之謡尚書曰帝庸作歌曰勑天之命惟時惟幾用庶尹允諧故作歌以戒之安不忘危也勑正也奉天命以臨人惟在順時惟在慎微也乃歌曰股肱喜哉元首起哉百工熈哉元首君也股肱之臣喜樂盡忠君之理功乃起百王之業乃􅆳載歌曰元首明哉股肱良哉庶事康哉賡續載成也帝歌歸美股肱乃安以成其美又歌曰元首叢脞哉股肱惰哉萬事隳哉􅓜脞細碎無大畧曰君如此則臣懈萬事隳廢其功不成歌以申成也脞音倉果反又曰九功惟序九序惟歌六府三事之功次序皆可歌樂乃德政之致也勸之以九歌俾勿壞六府三事之功次壞在此三者而巳又曰禹曰於帝念哉德惟善政政在養民水火金木􅁟榖惟脩正德利用厚生惟和九功惟叙九叙惟歌又曰詩言志歌永言聲依永律和聲又五子之歌曰太康尸位以逸豫畋於有洛之表十旬不反厥弟五人御其母于洛之汭五子咸怨述大禹之戒以作歌其一曰怨豈在明不見是圖爲人上者柰何不敬其二曰内作色荒外作禽荒甘酒􅄝音峻宇雕墻有一于此未或弗亡其三曰惟彼陶唐有此兾方今失厥道乱其紀綱乃厎滅亡其四曰明明我祖萬􅀖之君有典有則貽厥子孫荒墜厥緒覆宗絶祀其五曰嗚呼􅂚歸予懷之悲萬姓仇予予將疇依􅊊陶乎予心顔厚有忸怩弗慎厥德雖悔可追毛詩曰情動於中而形於言言之不足故嗟歎之嗟歎之不足故永歌之永歌之不足故不知手之舞之足之蹈之也又􅁑屨園有桃曰心之憂矣我歌且謡又谷風四月曰君子作歌唯以告哀禮記曰子貢問師乙曰賜也聞聲歌各有冝也如賜者冝何歌也師乙曰乙賤工也何足以問其所冝請誦其所聞而吾子自執焉寛而静柔而正者冝歌頌廣大而静䟽逹而信者冝歌大雅恭儉而好禮者冝歌小雅正直而静㢘而謙者冝歌風肆直而慈愛者冝歌啇温良而能斷者冝歌齊夫歌者直巳而陳德也動巳而天地應焉四時和焉星辰理焉萬物育焉故啇者五帝之遺聲也啇人識之故謂之啇齊者三代之遺聲也齊人識之故謂之齊明乎啇之音者臨事而屢斷明乎齊之音者見利而能讓臨事而屢斷勇也見利而能讓義也有勇有義非歌孰能保此故歌者上如抗下如隊曲如折止如槁木倨中矩句中鈎纍纍乎端如貫珠故歌之爲言也長言之也􅀃之故言之言之不足故長言之長言之不足故嗟歎之嗟歎之不足故不知手之舞之足之蹈之也又檀弓曰原壤之母死登木歌曰狸首之班然執女手之卷然又樂記曰昔者舜作五絃之琴以歌南風又檀弓上曰孔子蚤作􅀒手曳杖逍遥於門歌曰太山其頽乎梁木其壞乎哲人其萎乎又曰魯人有朝祥而暮歌者子路􅀏之又曰歌者在上匏竹在下貴人聲也又曰奠酬而工􅂛歌發德音也歌者在上匏竹在下貴人聲也周禮}
