  - {type: variant, offset: 2, length: 3, content: 七優倡, WYG: 八歌一釋名曰人聲曰歌歌柯也以聲吟詠有上下如草木有柯葉充言歌聲如柯也爾雅曰徒歌謂之謡尚書曰帝庸作歌曰勅天之命惟時惟㡬因庶尹允諧故作歌以戒之安不忘危也勅正也奉天命以臨人惟在順時惟在慎㣲也乃歌曰股肱喜哉元首起哉百工熙哉元首君也股肱之臣喜樂盡忠君之理功乃起百王之業乃賡載歌曰元首明哉股肱良哉庶事康哉賡續載成也帝歌歸矣股肱乃安以成其美又歌曰元首叢脞哉股肱惰哉萬事隳哉叢脞細碎無大畧曰君如此則臣懈萬事隳廢其功不成歌以申戒也脞音倉果反又曰九功惟序九序惟歌六府三事之功次序皆可歌樂乃徳政之致也勸之以九歌俾勿壞六府三事之功决壞在此三者而已又曰禹曰於帝念哉徳惟善政政在飬民水火金木土榖惟修政徳利用厚生唯和九功惟叙九叙惟歌又曰詩言志歌永言聲依永律和聲又五子之歌曰太康尸位以逸豫畋於有洛之表十旬不反厥弟五人御其母於洛之汭五子咸怨述大禹之戒以作歌其一曰怨豈在明不見是圖為人上者奈何不敬其二曰内作色荒外作禽荒甘酒嗜音峻宇雕墻有一於此未或弗亡其三曰惟彼陶唐有此冀方今失厥道亂其紀綱乃底滅亡其四曰明明我祖萬邦之君有典有則貽厥子孫荒墜厥緒覆宗絶祀其五曰嗚呼曷歸予懷之悲萬姓仇予予將疇依欎陶乎予心顔厚有忸怩弗慎厥徳雖悔可追毛詩曰情動於中而形於言言之不足故嗟歎之嗟歎之不足故詠歌之詠歌之不足故不知手之舞之足之蹈之也又葛屨園有桃曰心之憂矣我歌且謡又谷風四月曰君子作歌惟以告哀禮記曰子貢問師乙曰賜也聞聲歌各有宜也如賜者宜何歌也師乙曰乙賤工也何足以問其所宜請誦其所聞而吾子自執焉寛而静柔而正者宜歌頌廣大而静疏逹而信者宜歌大雅恭儉而好禮者宜歌小雅正直而静亷而謙者宜歌風肆直而慈愛者宜歌商温良而能㫁者宜歌齊夫歌者直已而陳徳也動已而天地應焉四時和焉星辰理焉萬物育焉故商者五帝之遺聲也商人識之故謂之商齊者三代之遺聲也齊人識之故謂之齊明乎商之音者臨事而屢㫁明乎齊之音者見利而能讓臨事而屢㫁勇也見利而能讓義也有勇有義非歌孰能保此故歌者上如抗下如隊曲如折止如槁木倨中矩句中鈎纍纍乎端如貫珠故歌之為言也長言之也説之故言之言之不足故長言之長言之不足故嗟歎之嗟歎之不足故不知手之舞之足之蹈之也又檀弓曰原壤之母死登木歌曰狸首之班然執女手之巻然又樂記曰昔者舜作五絃之琴以歌南風又檀弓上曰孔子蚤作負手曳杖逍遥於門歌曰泰山其頺乎梁木其壞乎哲人其萎乎又曰魯人有朝祥而暮歌者子路笑之又曰歌者在上匏竹在下貴人聲也又曰奠酬而工升歌發徳音也周禮}
