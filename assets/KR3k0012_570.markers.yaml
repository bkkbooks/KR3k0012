  - {type: variant, offset: 4238, length: 0, content: '', SBCK: 曰應􅉟督南平天門武陵三郡事時政令不一諸蠻怨望並謀背叛􅉟召蠻酋破銅劵與盟由是懷􅉟數郡無虞其後天下大亂􅉟境獨全百姓歌之曰乱離旣普殆爲􅁅朽僥倖之運賴兹應后歳寒不彫􅀌境獨守拯我塗炭恵隆丘阜潤同江海恩猶父母又曰山簡慠誕好酒甞止襄陽習公池日晚醉歸自歌曰山公時一醉遥造髙陽池日暮倒載歸酩酊無所知時復能􅀐馬倒着白接籬舉頭問􅁑強何如并州兒晉陽秋曰髙祖伐公孫淵過夲縣賜牛酒􅂖帛郡守典農㑹暮次父老故舊讌飲髙祖作歌曰天地開闢日月重光今遭際㑹奉辭遐方將掃逋穢還過故郷肅清萬里㧾齊八荒告成歸老待罪舞陽鄧粲晉紀曰太子洗馬郭訥字敬言甞入洛觀伎人歌言佳石崇問其曲訥不知崇􅀏卿不識曲郍得言佳訥荅譬如見西施何必識其姓名然後知美崇無以難崔鴻十六國春秋曰􅀄符堅二十五年滅慕容冲姉清河公主年十四有姝色堅納之寵冠後庭冲時年十二亦有龍陽之美堅又幸之姉弟專寵宫人莫進長安中歌之曰一雌與一雄􅀟飛入紫宫咸懼爲亂王猛切諌乃出冲冲卒爲堅賊又前燕録日慕容廆父渉歸分户以封長庶子吐谷渾分馬以給之及廆嗣位而二部馬闘廆怒遣使讓渾曰先公分建有別柰何不相逺離而令馬有闘傷渾曰馬飲食水草闘其}
