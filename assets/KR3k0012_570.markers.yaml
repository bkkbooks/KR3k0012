  - {type: variant, offset: 2507, length: 896, content: 狀瀛洲方丈仍令小兒持鋒節出入其間而舞不輟時劉晏為秘書省正字年方小形狀獰劣而惠悟過人上召於樓上簾下貴妃置於膝為施粉黛與之巾櫛上令詠王大娘戴竿晏應聲曰樓前百戲競爭新唯有長竿妙入神誰為綺羅翻有力猶自嫌輕更著人因命牙笏及黃紋袍以賜晏時有公孫大娘者善劍舞能為鄰里曲及裴將軍士謂之春秋設大張伎樂雖小大優劣不同而劇其華侈遐方僻郡歡縱亦然樂府雜錄曰大面出於北齊齊蘭陵王長恭才武而皃美常著假面以對敵常擊周師金墉下勇冠三軍齊人壯之為此聲以効其指撝擊剌之容俗為之蘭陵王入陣曲淫樂左傳曰煩手淫聲慆堙心耳乃忘和平謂之鄭聲許真五經異義曰鄭國有溱洧之水男女聚會謳歌相感今鄭詩二十一篇婦人者十九故鄭聲淫也又云鄭重之音使人淫過也又曰惠王三年邊伯石遫蒍國出王立王頹王處干鄭三年子頹飲三大夫酒子國為客子國蒍國客上客樂及偏聲偏舞六代之樂一曰諸大夫偏舞鄭厲公見虢叔厲公鄭莊公之子厲公突也虢叔王卿士虢公林父也曰吾聞之司寇行戮君為之不舉不舉樂也而況敢樂禍乎今吾聞子頹歌舞不思憂夫出王而代其位禍孰大焉臨禍忘憂是謂樂禍禍必及之盍納王乎虢叔許諾鄭伯將王自圉門入虢叔自北門入二門王城門殺子頹及五大夫王乃入禮記曰姦聲亂色不留聰明淫樂慝禮不接心術又曰姦聲感人而逆氣應之逆氣成象而淫樂興焉又曰作奇伎淫巧以蕩上心者殺無赦又曰鄭音好濫淫志宋音燕女溺志衛音趍數煩志齊音傲僻驕志此四者淫於色而害於德論語曰惡紫之奪朱惡鄭聲之亂雅樂包曰鄭聲淫聲之哀者漢書曰王莽初獻新樂於明堂太廟群臣始冠麟韋之弁或聞其樂聲曰厲而哀非興國之聲也宋書曰廢帝元徽五年太樂雅鄭共千有餘人後堂雜伎不在其數裴子野宋略曰先王作樂崇德以格神人通天下之至和節群生之流放故天子達於士庶未曾去其樂而無非僻之心及周道襄微日失其序亂俗先之以怨怒國亡從之以哀思擾雜子女蕩悅淫志充庭廣奏則以魚龍靡漫為瓌瑋會同享覲則以吳趍楚舞為妖妍纖羅霧縠侈其衣踈金鏤玉砥其器在上班揚寵臣群下亦從風而靡王侯將相歌妓填室鴻商富賈舞女成群競相誇大玄有爭奪如恐不及莫為禁令傷物敗俗莫不在此隋書曰裴蘊煬帝徵為太常少卿初高祖不好聲妓遣牛弘定樂非正聲清商及孔部四舞之色皆罷遣從臣至是揣知帝意奏括天下周齊梁陳樂家子弟皆為樂戶其六品已下至於民庶有, SBCK: 松}
