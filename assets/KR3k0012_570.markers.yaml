  - {type: variant, offset: 1901, length: 437, content: 轉又以橦著口齒上亦如之誤馬車立木橦其車上長二丈橦頭安橦木兩伎兒各坐木一頭或鳥飛或倒掛又衣伎兒作獼候之形走馬上或在脇或在馬頭或在馬尾馬走如故名為猨騎樂府雜錄曰弄參軍始因後漢館陶令石躭有贓犯和帝惜其才免罪每宴樂即令衣白夾衫命優伶戲弄辱之經年乃放後為參軍誤也開元中有李仙鶴善此戲明皇特授韶州同正參軍以食其祿是以陸鴻漸撰詞云韶州蓋由此大周正樂曰漢武帝通西域始以善幻人至中國安帝時天笁獻伎能自斷手足刳腹胃自是歷世有之唐高宗惡其驚俗勑西域開津不令入中國唐書樂志曰睿宗時婆羅門樂人倒行而足舞極銛刀鋒植於地低因就刃以歷臉中又植於背下吹篳篥立其腹上終曲而無傷又伏伸其手足躡之旋身遶手百轉無已漢世有橦末伎又有盤舞晉世如之以柸盤舞詩云妍妯凌七盤言舞用盤七枚也梁謂之盤舞伎梁又有長蹻伎跳鈴伎擲倒跳劍伎吞劍伎今並存又有舞輪伎蓋今之戲車輪者透三峽伎蓋今之透飛梯之類高絙伎蓋今之戲繩者是也梁有獼猴幢戲今有緣竿伎又獼猴緣竽未審何者為是今又有弄椀珠伎弄丹珠伎歌舞戲有大面撥頭蹋搖娘窟儡子等戲置教坊於禁中以處之, SBCK: ''}
