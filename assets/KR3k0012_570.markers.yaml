  - {type: variant, offset: 4308, length: 246, content: 信記曰唐開元末年涼州進新曲上命諸王於便殿觀之曲終諸王皆稱萬歲獨寧王不賀玄宗徵其故憲曰此曲雖嘉臣有聞焉夫曲者始於宮散於商武於角徵羽莫不根柢囊括在於宮商也臣見此曲宮離而少徵商亂而加暴夫宮者君也商者臣也宮不勝則君體卑商有餘則臣事僣臣恐異曰臣下有悖亂之事陛下有播越之禍莫不兆於斯曲也洎祿山南犯玄宗西幸方明寧王審音之妙也大業記曰安公子是隋煬帝將幸江都宮中所撰時樂工笛中吹此曲其父疾廢於臥內聞泫然流涕問其子何得此曲對曰宮中新翻也謂其子曰宮者君也此曲雖在羽調後有一宮聲往而不返大駕東巡必不廻耳可託疾勿去其精, SBCK: 習}
