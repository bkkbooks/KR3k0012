  - {type: variant, offset: 374, length: 4, content: 禹成就弟, SBCK: 釋之爲中郎將從行至霸俊是時慎夫人從上指視慎夫人新豊道曰此是邯鄲道也使慎夫人鼓瑟上自􅀝瑟而歌又班固頌論功歌詩靈芝歌曰因露寐兮産靈芝象三德兮瑞應圖延壽命兮光此都縁上帝兮象太微叅日月兮揚光輝又曰武帝幸雍祠五畤􅀗白麟作白麟之歌又曰上幸行河東祠后土頋視帝京忻然中流歌曰秋風起兮白雲飛草木黄落兮鴈南歸蘭有秀才兮菊有芳懷佳人兮不能忘汎樓舡兮濟汾河横中流兮􅀭素波蕭鼓鳴兮發擢歌忻樂極兮哀情多少壯幾時兮柰老何又曰孝武南廵狩至于盛唐尋陽浮江親射蛟江中􅀗之舳艫千里薄樅陽而出作盛唐樅陽之歌又曰髙帝崩皇大后迺令戚夫人髠鉗衣赭春春且歌曰}
