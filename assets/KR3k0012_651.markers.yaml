  body:
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 七除名免官収贖禁錮除名何法盛晉中興書曰胡母崇爲永康令多受貨賂政治苛􅁀詔都街頓鞭一百除名爲民隋書曰賀􅀂敦􅀍除名毎岀怨言晉公護徴還令自殺臨刑呼子弼謂曰吾欲必平江南然此心不果汝當成之吾以舌死汝不可不思引錐刺弼舌出血誡以慎口又曰賀􅀂弼坐免官弼怨望愈甚後數年下弼獄上謂之曰我以髙熲楊素爲宰相汝唱言云此二人唯堪㗖飯耳是何意也弼曰熲臣之故人素臣之舅子臣並知其爲人誠有此語公卿奏弼怨望罪當死上惜其功於是除名爲民又曰髙熲得罪除名爲民潁􅀄爲僕射其母誡之曰汝冨貴巳極但有一斫頭耳尔其慎之潁由是常恐禍變及此潁歡然無恨色以爲得免於禍又曰權武爲潭州惣管晚生子與親客宴集酒酣遂擅赦所部内獄囚武帝以南越邊逺治從其俗務適便冝不依律令而每言當今法急官不可爲上令有司案其事皆驗上大怒命斬之武於獄中上書言其父爲武元皇帝戰死於馬前以此求哀由是除名爲民晉律曰吏犯不孝謀殺其國王侯伯子男官長誣偷受財枉法及掠人和賣誘藏亡奴婢雖遇赦皆除名爲民又曰除名比三嵗刑又曰其當除名而所取飲食之用之物非以爲財利者應罰金四兩以下勿除名晉潘岳閑居賦叙曰今天子諒闇之際領太􅀓主簿府誅除名爲民俄而復官免官後漢書曰梁松遷太僕數爲私書請託郡縣二年發􅁴免官遂懷怨望四年冬乃懸飛書誹謗下獄免宋書曰􅁃登之爲司徒長史南東海太守府公彭城王義康專覽政事不欲自下厝意而登之性剛毎陳己志義康不恱出爲吴郡太守以􅂍貨免官又曰謝靈運在㑹稽亦多徒衆驚動縣邑太守孟顗因靈運撗恣表其異志靈運馳詣闕上表自陳本末文帝知其見誣不罪也以爲臨川内史在郡遊放不異永嘉爲有司遣使隨州從事鄭望生収靈運興兵叛逸遂有逆志爲詩曰韓亡子房奮秦帝魯連耻本自江海人忠義感君子追討禽之送廷尉廷尉論上斬刑上愛其才欲免官而已彭城王義康堅執謂不宜恕詔以謝玄勲叅微管冝宥及後嗣降死徙廣州晉律曰免官比三􅀊刑其無真官而應免者正刑召還也又曰有罪應免官而有文武加官者皆免所居職官又曰其犯免官之罪不得減也又曰其當免官者先上免官謂不聽應収治者也収贖書曰金作贖刑又曰墨辟疑赦其罰百鍰}
