  - {type: variant, offset: 5, length: 2, content: 杖尚, SBCK: 兩曰鍰鍰黄鐵也劓辟疑赦其罰惟倍倍百爲二百也剕辟疑赦其罰倍差倍差謂俗之文半爲五百鍰宫辟疑赦其罰六百鍰大辟疑赦其罰千鍰國語曰桓公問齊國寡甲兵爲之􅀂何甲鎧兵弓矢之屬管仲對曰輕過而移諸甲兵諸之也謂輕其過使以甲兵贖罪制重罪贖以犀甲一㦸重罪死罪犀犀皮可爲甲㦸戰㦸也秘長二丈六尺輕罪贖以鞼劬位切盾一㦸輕罪劓刖之屬鞼盾綴革有文加續小罪讁以金分小罪不入五刑者以金贖分兩之差今之罪金是也}
