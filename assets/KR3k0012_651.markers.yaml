  - {type: variant, offset: 191, length: 1, content: 為, SBCK: 乗寛政多以違令得罪死者以萬計於是國落騷然其後當死者聽其家獻金馬以贖㑹稽典録曰楊矯爲右丞詣南宫取急案條閣舊事於􅃨道中逢太常羊柔不避車又下矯糺奏柔以爲知丞郎應行威儀有序九列外官而公干犯請廷尉治柔罪詔勿治以三月俸贖罪晉律曰其年老小篤癃病及女徒皆収贖又曰諸應収贖者皆月入中絹一疋老小女人半之又曰贖死金二斤也又曰失贖罪囚罰金四兩也又曰以金罰相代者率金一兩以當罰十也禁錮傳曰楚共王即位將爲陽楊橋之役使屈巫聘于齊且告師期巫臣盡室以行遂奔晉晉人使爲刑大夫子反請以重幣錮之禁錮勿令仕王曰其自爲謀也則過矣其爲吾先君謀也則忠忠社稷之固也所盖多矣盖覆也旦彼􅀂能利國家雖重幣晉將可乎言不許􅀂無益於晉晉將弃之何勞錮焉又曰㑹於商任錮欒氏也禁錮欒盈使諸侯不得受之二十二年㑹于沙隨復錮欒氏也晉知欒盈在齊故復錮也後漢書曰河内張成善說風角推占當赦遂教子殺人李膺爲河南尹督促収捕旣而逢宥獲免膺愈懷憤疾竟案殺之􅀄成以方􅇊交通䆠官帝亦頗訊其占成弟子牢循因上書誣告膺等飬太學遊士交結諸}
