  - {type: variant, offset: 51, length: 3, content: 杖則走, SBCK: 化武帝始臨天下尊賢用正開地廣境日見功大遂縱嗜欲廼行一時之變使犯法者贖罪入􅂖者􅀘吏是以官民貧盗賊並起又曰衛青爲太中大夫元光六年拜爲車􅀐將軍擊匈奴岀上谷公孫敖出代郡李廣岀鴈門敖以七千􅀐廣爲虜所得得脫歸皆當斬贖爲庶人又曰趙食其祋栩人也祋丁外切栩許羽切爲右將軍從大將軍出定襄迷失道當斬贖爲庶人又曰􅀶望侯張騫郎中令李廣俱岀右北平異道匈奴左貢王將數萬􅀐圍廣廣與戰二日騫至匈奴引兵出騫坐行留當斬贖爲庶人又曰右衛將軍蘇建亡軍獨身脫還贖爲庶人}
  - {type: page-break, offset: 51, content: '', id: KR3k0012_SBCK_651-4a}
  - {type: variant, offset: 51, length: 3, content: 杖則走, WYG: 化武帝始臨天下尊賢用士開地廣境自見功大威行遂縱嗜欲乃行一時之變使犯法者贖罪入穀者補吏是以天下奢侈官亂民貧盜賊並起又曰衛青為大中大夫元光六年拜為車騎將軍撃匈奴出上谷公孫敖出代郡李廣出鴈門敖亡七千騎廣為虜所得得脱歸皆當斬贖為庶人又曰趙食其殺栩人也殺下外切栩滸羽切為將軍從大將軍出定襄迷失道當斬贖為庶人又曰博望侯張騫郞中令李廣俱出右北平異道匈奴左賢王將數萬騎圍廣廣與戰三日騫至匈奴引兵出騫坐行留當斬贖為庶人又曰右衛將軍蘇建亡軍獨身脱還贖為庶人}
