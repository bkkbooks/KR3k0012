  - {type: variant, offset: 511, length: 611, content: 字士高潁川汝陰人也在郡清簡亦工詩詠嘗與長樂王尉粲劇飲齧粲指至骨齊文宣知之賜杖一百或問其故云我郍許當時正疑是鹿尾耳又曰齊馮翊王潤字子澤神武第十四子也廉慎方雅習於吏職神武嘗稱之曰此是吾家千里駒也初為定州剌史開府王廻洛潤督獨孤拔侵竊官田受納贈賂潤案舉其事二人上言潤出送臺使登魏文舊壇南望歎息不測其意武成宣命於州曰馮翊王少小謹慎內外所知不為非法朕信之矣登高遠望人之常情何足可道鼠輩輕相間搆理應從斬猶以舊人未忍致法廻洛決鞭二百拔宜決杖一百隋書曰高祖性猜忌素不悅學既任智而獲大位因以文法自矜明察臨下恒令左右覘視內外有小過失則加以重罪又患令史贓污因私使人以錢帛遺之得犯立斬每於殿庭打人一日之中或至數四嘗怒門事揮楚不甚即命斬之十年尚書左僕射高熲治書侍御史柳或等諫以為朝堂非殺人之所殿庭非決罰之地帝不納熲等乃盡詣朝堂請罪曰陛下子育群生務在去弊而百姓無知犯者不息致陛下決罰過嚴皆臣等不能有所禆益請自退屏以避賢路帝於是顧謂領左右都督田元曰吾杖重乎元曰重帝問其狀元舉手曰陛下杖大如指捶楚人三十者比常杖數百故多致死帝不懌乃令殿內去杖欲有決罰各付所由又曰庫狄士文拜具州剌史性清苦不受公料家無餘財其子嘗噉官廚餅士文枷之於獄累日杖一百步送還京僮隸無敢出門又曰燕榮為幽州總管按部道次見藂荊堪為笞捶命取之輒以試人人或自陳無咎榮曰後若有罪當免爾及後犯細過將撾之人曰前日被杖使君許有罪宥之榮曰無過尚爾況有過耶榜捶如舊唐書曰開元二年監察御史蔣挺有所犯勑朝堂杖之黃門, SBCK: ''}
