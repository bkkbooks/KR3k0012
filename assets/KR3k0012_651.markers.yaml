  - {type: variant, offset: 175, length: 3, content: 聞而愈, SBCK: 以宏累有功績聽以贖論又曰烈王無忌閔王承之子也承爲荆州刺史王廙所害江州刺史禇襃當之鎮無忌及丹陽尹桓景等餞於版橋時王廙子丹陽丞耆之在坐無忌志欲復讎㧞刀將手刃之襃景命左右救捍獲免御史中丞車灌奏無忌欲專殺人付廷尉科罪成帝詔曰王當以體國爲大豈可㝷繹由來以亂朝憲主者其申明法令自今已徃有犯必誅於是聽以贖論齊書曰到撝永明元年爲御史中丞車駕幸丹陽郡宴飲撝恃舊酒後狎侮同列謂􅁃景之蠢尔蠻荆其俗鄙復謂虞悰曰斷髮文身其風陋王晏旣貴雅步從容又問曰王散􅀐復可故尓晏先爲國常侍轉貟外散􅀐郎此二職清華所不爲故以此嘲之王}
