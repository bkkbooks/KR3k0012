  - {type: variant, offset: 938, length: 219, content: 如指捶楚人三十者比常杖數百故多致死帝不懌乃令殿內去杖欲有決罰各付所由又曰庫狄士文拜具州剌史性清苦不受公料家無餘財其子嘗噉官廚餅士文枷之於獄累日杖一百步送還京僮隸無敢出門又曰燕榮為幽州總管按部道次見藂荊堪為笞捶命取之輒以試人人或自陳無咎榮曰後若有罪當免爾及後犯細過將撾之人曰前日被杖使君許有罪宥之榮曰無過尚爾況有過耶榜捶如舊唐書曰開元二年監察御史蔣挺有所犯勑朝堂杖之黃門侍郎張廷珪曰御史憲司清望耳目之官有犯當殺即殺當流即流不可決杖可殺不可辱, WYG: 功小功緦麻}
