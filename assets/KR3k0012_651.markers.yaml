  - {type: variant, offset: 1124, length: 565, content: 張廷珪曰御史憲司清望耳目之官有犯當殺即殺當流即流不可決杖可殺不可辱也又曰開元中前廣州都督裴伷先下獄中書令張嘉貞奏請決杖兵部尚書張說進曰臣聞刑不上大夫以其近於君也故曰士可殺不可辱臣今秋巡邊中途聞姜皎朝堂決杖流皎是三品亦有微功不宜決廷辱以卒伍待之且律有八議勳貴在焉今伷先不可輕行決罰上然其言嘉貞不悅退而謂悅曰何言事之深也說曰宰相者時來即為豈能長據若貴臣盡當可杖但恐吾等行當及之此言非為伷先乃為天下士君子也又曰王遂為浙西觀察使每有笞撻其杖率過常制既遇禍監軍使封其杖來獻命中人出示於朝以作誡世祖曰桓宣武在荊州欲以德被江漢恥以威刑肅物令史受正從朱衣上過桓室年少從外來云向從門下過令史受杖上稍雲根下拂地足意機其不著宣武云我猶患其重傳集曰咸為左丞楊濟與咸書曰昨遣人相視受罰云大重以為恒然相念杖痕不耐風寒宜深慎護不可輕也當飲酒令體中常煖為佳蘇治瘡上急痛故寄往之咸荅違距上命稽停詔罰退思此罪在於不測纔加罰黜退用戰悸何復以杖重為劇小人不德所好唯酒宜於養瘡可數致也襄陽耆舊記曰羅尚為右丞是時左丞處事失武帝意大怒欲案入重罪事連尚於是尚為坐受杖一百時論美之益部耆舊傳曰常播字文平蜀郡江源人仕縣主簿縣長廣都朱淑以官穀割沒當論重罪播爭獄訟身受杖數千披肌割膚更歷三獄幽閑二年每將掠拷吏先驗問伏不播荅言忽得罰無所多問辭終不撓事遂見明也三輔決錄曰丁邯字叔春正直不撓舉, SBCK: 韓偏爲}
