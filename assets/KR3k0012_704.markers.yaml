  - {type: variant, offset: 2443, length: 153, content: 漆書臺香爐漢官典曰尚書郎給女史二人潔衣服執香爐燒薰從入臺中給使護衣服梁書曰侯景即位景床東邊香爐無故墮地景呼東西南北皆謂為廂景曰此東廂香爐那忽下地議者以為湘東軍下之徵南史曰陶弘景字通明丹陽株陵人也父貞孝昌令初弘景母郝氏夢天人手執香爐來至其所已而有娠又曰庾仲文貪賄何尚之奏選令史龍向臣說亦歎其受納之過言實得嫁女, SBCK: 絳綾裹幞帊五}
