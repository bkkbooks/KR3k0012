  - {type: variant, offset: 2600, length: 517, content: 人舉乃勝細葛斗帳等物不可稱數齊書曰江泌為南康王子琳侍讀建武中明帝召諸王後泌憂念子琳訪誌公道人問其禍福誌公覆香爐灰示之曰都盡無餘後子琳被害東宮舊事曰皇太子初拜有銅博山香爐一枚晉東宮舊事曰泰元中皇太子納妃王氏有銀塗博山連盤三斗香爐一西京雜記曰長安巧工丁諼作臥褥香爐一名被中香爐為機環轉四周而鑪體常平可置之褥被故取被褥以為名又作九層博山香爐鏤以奇禽怪獸魏武上雜物䟽曰御物三十種有純金香爐一枚貴人公主有純銀香爐四枚襄陽記曰劉和季性愛香上廁置香爐主簿張坦曰人名公作俗人真不虛也和季曰荀令君至人家坐處三日香君何惡我愛好也鄴中記曰石虎冬月為複帳四角安純金銀鑿鏤香爐徐先生南岳記曰衡山石室中有几及香爐盧諶祭法曰香爐四時祠坐側皆置也徐爰家儀曰婚迎車前用銅香爐二集異記曰吳郡吳泰能筮會稽盧氏失博山香爐使泰筮之泰曰此物質雖為金其象實山有樹非林有孔非泉閻闔風至時發青煙此香爐也語其主處求即得之古詩曰四坐且莫諠願聽歌一言請說銅鑪器崔嵬象南山上以植松柏下根據銅盤雕文各異類離婁自相連末火燃其中青煙颺其間順風入君懷四坐莫不歎香風難久居空令蕙草殘梁昭明太子銅博士香鑪賦曰稟至精之純質產靈嶽之幽深經般倕之妙指運公輸之巧心有蕙帶而巖隱亦霓裳而昇仙寫嵩山之巃嵸象鄧林之仟眠, SBCK: ''}
