  - {type: page-break, offset: 1229, content: '', id: KR3k0012_WYG_704-5b, image: WYG0899/WYG0899-0288b.png}
  - {type: variant, offset: 1230, length: 858, content: 絕色同幽者百餘人謂夫人為神女敬而遠之有司聞於吳主使圖其容皃夫人憂慼不食減瘦改形工人寫其真狀以進吳主吳主見圖而嘉之以虎魄如意撫案辟折嗟曰此神女也遂納之又曰孫和悅鄧夫人常置膝上和月下舞火精如意誤傷夫人頰胡綜別傳曰時有掘得銅匣長二尺七寸以琉璃為蓋布雲母於其上開之得白玉如意所執處皆刻螭虎文蠅蟬等形時人莫有識者太常以問綜綜荅曰昔秦始皇帝東遊以金陵有天子氣乃改名掘鑿江湖平諸山南處處輒理寶物以當王氣其事見於秦記石季倫本事曰崇有珊瑚如意長三尺二寸世說曰殷荊州有所識作賦示束晢慢戲之殷甚以為有才語王恭適見新文甚可觀便於手巾函出之王既讀殷笑不自勝王看竟既不笑亦不言好惡但以如意點之而已殷帳然自失又曰謝萬北征而常嘯詠自高未嘗撫慰眾士萬兄安謂萬曰汝為元帥宜數呼諸將宴以悅其心萬從之於是召集諸將帥無所說直以如意指四坐曰諸軍皆是勁卒諸將甚恨之語林曰石崇與王愷爭豪晉武帝愷之甥也每助愷以珊瑚高二尺許愷以示之崇以鐵如意擊之應手瓦碎愷聲色俱厲崇曰此不足恨乃命取珊瑚有三尺光彩溢目者六十七校愷悵然自失異苑曰太原郭澄之義熙初諸葛長民欲取為輔國諮議澄之不樂後為南康太守盧循反自廣州長民以其謀先告因騁私惡收澄之以付延尉將致大辟夜夢見一神人以烏角如意與之既覺便在其頭側可長尺餘形制甚陋澄之遂得無它後從入關齎以自隨忽失所在劉義慶啟事曰恩旨賜臣犀鏤竹節如意目所未覩拂晉書曰武帝泰康四年有司奏先帝舊物麻繩為細拂以明儉約宋書曰孝武大明中壞高祖所居陰壁於其處起玉燭殿與群臣觀之床頭有土障壁上掛葛燈籠麻繩拂侍中袁覬盛稱上儉素之德孝武曰田舍翁得此已為過矣齊書曰陳顯達子休尚為郢府主簿過九江拜別顯達謂曰凡奢侈者鮮有不敗塵尾繩拂是王謝家許汝不須捉此即取於前燒除之東宮舊事曰太子有白眊拂二秦嘉婦與嘉書曰今奉旄牛尾拂一枚可拂塵垢唾壺晉書曰王敦為荊州牧既專外任有問鼎之志引劉隗刀恊為腹心及隗用事頗間王氏敦怒䟽陳之自爾憤憤不平安每酒後詠魏武帝樂府歌曰老驥伏櫪志在千里列士暮年壯心不已以鐵如意擊唾壺為節壺邊盡鈌梁書曰天監中中天笁國奉表獻琉璃唾壺脩復山陵故事曰皇后玄宮有白瓦唾壺五枚東宮, WYG: 宫}
