  body:
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 囊帊幞囊說文曰囊謂橐也橐車上大囊也方言曰自􅀜而西食囊謂之掩囊周易坤卦六四曰括囊無咎象曰括囊無咎愼不害也焦贛易林歸妹之損曰争鷄失羊亡其金囊利得不長毛詩公劉曰廼裏餱糧于橐于囊公羊傳哀公曰齊景公死舎立陳乞迎陽生使力士舉巨大也囊而至開之則公子陽生也乞曰此君也諸大夫皆再拜稽首自是往殺舎史記曰韓信巳定臨淄楚使龍且救齊夾睢水陣韓信乃夜令人爲萬餘囊盛沙以壅水上流引軍半渡擊龍且佯不勝遂走龍沮追信信渡水使人决壅水大至急擊殺龍且戰國䇿曰荆軻逐秦王時侍醫夏無且以樂囊提軻提擊也漢書曰陸賈使尉佗佗賜賈囊中裝直千金又曰東方朔曰侏儒長三尺奉一囊粟錢二百四十朔長九尺餘亦一囊粟錢二百四十侏儒飽欲死臣朔飢欲死又曰楊王孫病且終先令其子曰吾欲臝葬以反吾真死則爲布囊盛入地七尺旣下從兄脫其囊以身親士又東方朔傳曰文帝集上書囊以爲殿帷又曰張安丗持囊簪筆事孝武數十年見謂忠謹囊挈橐也近臣􅀒也又曰邴􅁻馭吏嘗知邊塞吏岀適見驛持赤白囊邊郡發犇命書馳來至虜入雲中代郡遽歸府見􅁻白狀又曰成帝許美人乳詔使婢嚴持乳醫及藥篋至美人所後詔使嚴持緑囊書與許美人告嚴曰美人當有以予女受來置飾室中美人葦篋一合盛所生兒死緘封及緑囊報書予嚴又曰王陽好車馬衣服鮮明而遷徙轉移所載不過囊槖時人怪其奢伏其儉故俗傳王陽能作黄金東觀漢記曰岑彭與呉漢圍隗􅅝壅谷水以縑囊盛土爲堤灌西城後漢書張湛傳曰光武嘗召見諸郡計吏問前後守令能否蜀郡計􅁺樊顯曰漁陽太守張堪昔在蜀仁以惠下威能討姦前公孫述破時珎寳山積捲握之物足冨十丗而堪去職之日乗折轅車布􅀍囊而巳范曄後漢書曰楊琁爲零陵太守以緋囊盛石􅁅於車上繫布索於馬尾㑹戰從風鼓􅁅賊不得視因以火燒布布燒馬驚奔突賊陣又曰和熹鄧后臨朝杜根以安帝長冝親政事乃上書直諌太后怒収根盛以縑囊撲殺之執法者以根知名私語行事人使不加力而載出城外根得􅂫典略曰馬略爲司􅊢督軍從事討郭援爲飛矢所中乃以囊褁其足而戰斬援首詔拜徐州刺史魏略曰大􅁗國王有}
