  - {type: variant, offset: 3, length: 0, content: '', WYG: 六囊帊幞囊說文曰囊謂槖也槖車上大囊也方言曰自關而西食囊謂之䄋囊周易坤卦六四曰括囊无咎象曰括囊无咎慎不害也焦贛易林歸妹之損曰爭鷄失羊亡其金囊利得不長毛詩公劉曰迺裹餱粮于槖于囊公羊傳哀公曰齊景公死舎立陳乞迎陽生使力士舉巨囊至而開之則公子陽生也乞曰此君也諸大夫皆再拜稽首自是徃殺舎史記曰韓信已定臨淄楚使龍雎救齊夾雎水陣韓信乃夜令人為萬餘囊滿沙壅水上流引軍半渡擊龍雎佯不勝遂走龍雎追信信渡水使人決壅水大至急擊殺龍雎戰國策曰荆軻逐秦王時侍醫夏無且以藥囊提軻漢書曰陸賈使尉陀陀賜賈囊中裝直千金又曰東方朔曰侏儒長三尺奉一囊粟錢二百四十朔長九尺餘亦一囊粟錢二百四十侏儒飽欲死臣朔饑欲死又曰楊王孫病且終先令其子曰吾欲臝葬以反吾真死則為布囊盛入地七尺既下從足脫其囊以身親土又東方朔傳曰文帝集上書囊以為殿帷又曰張安世持囊簪筆事孝武數十年見謂忠謹又曰邴吉馭吏嘗知邊塞吏出適見驛持赤白囊邊郡發犇命書馳來至虜入雲中代郡遽歸府見吉白狀又曰成帝許美人乳詔使婢嚴持乳醫及藥篋至美人所後詔使嚴持緑囊書與許美人告嚴曰美人當有以予女受來置飾室中美人葦篋一盒盛所生兒死緘封及緑囊報書予嚴又曰王陽好車馬衣服鮮明而遷徙轉移所載不過囊槖時人怪其奢服其儉故俗傳王陽能作黄金東觀漢記曰岑彭與吳漢圍隗囂壅谷水以縑囊盛土為堤灌西城後漢張湛傳曰光武嘗召見諸郡計吏問前後守令能否蜀郡計掾樊顯曰漁陽太守張湛昔在蜀仁以惠下威能討奸前公孫述破時珍寶山積捲握之物足富十世而湛去職之日乗折轅車布被囊而已范􅁮後漢書曰楊璇為零陵太守以緋囊盛石灰於車上繫布索于馬尾㑹戰從風鼓灰賊不得視因以火燒布布燒馬驚奔賊陣又曰和熹鄧后臨朝杜根以安帝長宜親政事乃上書直諫太后怒收根盛以縑囊撲殺之執法者以根知名私語行事人使不加力而載出城外根得蘇典畧曰馬超為司𨽻督軍從事討郭援為飛矢所中乃以囊裹其足而戰斬援首詔拜徐州刺史魏畧曰大秦國王有}
