  - {type: variant, offset: 2247, length: 7, content: 玉唾壺一枚交州, SBCK: 也以指畫王心應手而裂王乃驚悟血濕於􅁭王復見所夢人曰本欲易王之心乃出方寸緑囊囊中有續脉石名丸􅀘血精散摩主之臆俄而即愈又曰石虎爲浴臺皆用鍮石珷玞爲隄岸或以虎魄車渠爲缾杓夏則自渠水以内池池中皆紗縠爲囊盛百}
