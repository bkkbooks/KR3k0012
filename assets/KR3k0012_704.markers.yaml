  - {type: variant, offset: 172, length: 215, content: 白鷺羽塵尾扇遺之曰此既異物以奉異人又融臨卒遺令建白旐無旒不設祭令人捉塵尾登復魂又曰張敷好讀玄言兼屬文論弱冠初父邵使與高士南陽宗少文談繫象往復數番少文欲屈握塵尾歎曰吾道東矣於是名價日重齊書曰周顒音辭辯麗長於佛理著三宗論言空假義西涼州智林道人遺顒書深相贊美言捉塵尾來四十餘載頗見宗錄唯此塗白黑無一人得者非意此音猥來入耳見重如此梁書曰廬廣有儒術為國子博士於學中講說僕射徐勉以下畢至謝舉造坐屢折廣詞理遒邁廣深歎服仍以所執塵尾贈之以況重席焉, SBCK: 貽母}
