  - {type: variant, offset: 2289, length: 0, content: '', SBCK: 昔魯哀公祖載其父孔子問曰寧設五穀囊乎哀公曰五􅂖囊者起伯夷叔齊讓國不食周粟而餓首陽之山恐魂乏飢故作五􅂖囊吾父食味含哺而死何以此爲國語曰呉王殺申胥盛以鳲鴺而投之於江鳲鴺革囊春秋後語曰趙王使平原君入楚求其從約其客有文}
  - {type: variant, offset: 2289, length: 0, content: '', WYG: 蘇秦張儀二人假食于路剥樹皮為囊以盛天下良書又曰燕昭王夢西方羽人從雲中來曰大王積智未開求恒生久視之觀不可得也以指畫王心應手而裂王乃驚悟血濕于襟王復見所夢人曰本欲易王之心乃出方寸緑囊囊中有續脉石名丸補血精散摩王之臆俄而即愈又曰石虎為浴臺皆用鍮石珷玞為隄岸或以琥珀車渠為瓶杓夏則引渠水以内池池中皆紗縠為囊盛百襍香漬于水裏王肅喪服要記曰昔魯哀公祖載其父孔子問曰寧設五榖乎哀公曰五榖囊者起伯夷叔齊讓國不食周粟而餓首陽之山恐鬼之饑故作五榖囊吾父食味含哺而死何此為國語曰吳王殺申胥盛以鴟夷而投之于江春秋後語曰趙王使平原君入楚求其從約其客有文}
  - {type: page-break, offset: 2289, content: '', id: KR3k0012_WYG_704-7a, image: WYG0899/WYG0899-0289a.png}
  - {type: page-break, offset: 2289, content: '', id: KR3k0012_WYG_704-7b, image: WYG0899/WYG0899-0289b.png}
  - {type: variant, offset: 2289, length: 0, content: '', krp: 昔魯哀公祖載其父孔子問曰寧設五穀囊乎哀公曰五糓囊者起伯夷叔齊讓國不食周粟而餓首陽之山恐魂乏飢故作五糓囊吾父食味含哺而死何以此爲國語曰呉王殺申胥盛以鳲鴺而投之於江鳲鴺革囊春秋後語曰趙王使平原君入楚求其從約其客有文}
  - {type: variant, offset: 2290, length: 1, content: 昌, SBCK: 者二十人偕得十九人未有可以備二十者毛遂請行平原君曰賢士處丗譬如錐之處囊其鋒立見今先生處勝門下三年無所聞是先生無所能也遂曰臣乃今日請處囊中耳若早處囊中乃頴脫而出非特末見也平原乃許與偕江表傳曰魏太祖與馬超單馬㑹語超􅀒其多力嘗置六斛米囊東西走馬輙製米囊以量太祖輕重太祖尋知之曰幾爲狡虜所欺漢武内傳曰帝見三母有一卷書盛以紫錦之囊母曰此吾真形圖也曹暪傳曰操性佻易自佩}
  - {type: page-break, offset: 2290, content: '', id: KR3k0012_SBCK_704-5a}
  - {type: variant, offset: 2290, length: 1, content: 昌, WYG: 者二十人偕得十九人未有可以備二十者毛遂請行平原君曰賢士處世譬如錐之處囊其鋒立見今先生處勝門下三年無所聞是先生無所能也遂曰臣乃今日請處囊中耳若早處囊中乃穎脫而出非特末見也平原乃許與偕江表傳曰魏太祖與馬超單馬㑹語超負其多力嘗置六斛米囊東西走馬輙製米囊以量太祖輕重太祖尋知之曰幾為狡虜所欺漢武内傳曰帝見王母有一卷書盛以紫錦之囊母曰此五岳真形圖也曹瞞傳曰操佻易自佩}
