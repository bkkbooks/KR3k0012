  - {type: variant, offset: 569, length: 1118, content: 視之歎曰如此人曾不得滿四十及亡劉尹臨殯以犀柄塵尾置柩中因慟哭世說曰王丞相常懸一塵尾著帳中及殷中軍來乃取之曰今當遺汝又曰客問樂令旨不至者樂亦不復剖析文句以塵尾柄敲机曰至不客曰至樂因又舉塵尾曰若至者郍得去客乃悟服語林曰康法暢造庾公捉塵尾至彼公曰塵尾過麗何以得在荅曰廉者不求貪者不與故得在耳華陽國志曰宜君山出塵尾王道塵尾銘曰誰謂質卑御於君子拂穢靜暑虛心以俟許詢白塵尾銘曰蔚蔚秀格偉偉奇姿荏弱軟潤雲散雪霏君子運之探玄理微如意齊書曰蒼梧欲害高帝帝嘗以書案下安鼻為楯以鐵為書鎮如意甚大以備不虞欲以代仗蕭子顯齊書曰明僧紹字丞烈平原聶人也隱長廣郡勞山詔徵為正員郎稱疾不就賜竹根如意笋籜冠隱者以為榮梁書曰席闡文武帝將起兵闡文勸蕭頴胄同焉仍遣客田祖恭私報帝并獻銀裝刀帝報以金如意又曰韋叡拒魏於邵陽叡乘素木輿執白角如意以麾軍一日數合又曰殷鈞字季和梁武與鈞父叡有舊以女永興公主妻鈞公主驕淫險虐鈞形皃短小為主所憎每被召入先滿壁為殷叡字鈞輒流涕以出主命婢束而反之鈞不勝怒言於帝帝以犀如意擊主碎於背然猶恨鈞自侍中出為王府諮議又曰李膺字公胤有才辯西昌侯藻為益州以為主簿使至都武帝悅之謂曰今李膺何如膺對曰今勝昔問其故對曰昔事桓靈之主今逢堯舜之君帝嘉其對以如意擊席者久之乃以為益州別駕後魏書曰高祖孝文欲試諸子志尚乃大陳寶物任其所取京兆王愉等競取寶玩宣武皇帝惟取骨如意而已帝大奇之又曰廣陵王羽為太子太保錄尚書事孝文將南討遣羽持節安撫六鎮發其突騎夷夏寧悅還領廷尉卿及車駕發羽與太尉元丕留守帝賜羽如意以表心焉拾遺記曰吳主潘夫人之父坐法夫人輸入織室夫人容態少儔為江東絕色同幽者百餘人謂夫人為神女敬而遠之有司聞於吳主使圖其容皃夫人憂慼不食減瘦改形工人寫其真狀以進吳主吳主見圖而嘉之以虎魄如意撫案辟折嗟曰此神女也遂納之又曰孫和悅鄧夫人常置膝上和月下舞火精如意誤傷夫人頰胡綜別傳曰時有掘得銅匣長二尺七寸以琉璃為蓋布雲母於其上開之得白玉如意所執處皆刻螭虎文蠅蟬等形時人莫有識者太常以問綜綜荅曰昔秦始皇帝東遊以金陵有天子氣乃改名掘鑿江湖平諸山南處處輒理寶物以當王氣其事見於秦記石季倫本事曰崇有珊瑚如意長三尺二寸世說曰殷荊州有所識作賦示束晢慢戲之殷甚以為有才語王恭適見新文甚可觀便於手巾函出之王既讀殷笑不自勝王看竟既不笑亦不言好惡但以如意點之而已殷帳然自失又曰謝萬北征而常嘯詠自高未嘗撫慰眾士萬兄安謂萬曰汝為元帥宜數呼諸將宴以悅其心萬從之於是召集諸將帥無所說直以如意指四坐曰諸軍皆是勁卒諸將甚恨之語林曰石崇與王愷爭豪晉武帝愷之甥也每助愷以珊瑚高二尺許愷以示之崇以鐵如意擊之應手瓦碎愷聲色俱厲崇曰此不足恨乃命取珊瑚有三尺光彩溢目者六十七校愷悵然自失異苑曰太原郭澄之義熙初諸葛長民欲取為輔國諮議澄, SBCK: 趨唯恐緘縢}
