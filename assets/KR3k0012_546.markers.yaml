  - {type: variant, offset: 745, length: 1, content: 或, WYG: 孔子曰少連大連善居喪三日不怠三月不懈期悲哀三年憂東夷之子也言其生于夷狄而知禮也怠惰也懈倦也又曰三年之喪言而不語對而不問廬堊室之中不與人坐焉在堊室之中非時見乎母也不入門言言己事也爲人説爲語在堊室之中以時事見乎母乃復入門則居廬時不入門也疏衰皆居堊室不廬廬嚴者也言廬哀敬之處非有其實則不居又曰縣子曰三年之喪如斬期之喪如剡言其痛之惻怛有淺深也期之喪十一月而練十三月而祥十五月而禫又曰曾申}
