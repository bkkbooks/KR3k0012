  - {type: variant, offset: 1898, length: 135, content: 哀夫子哭不盡聲而退蘧伯玉謂孔子曰衛國鄙俗不習喪禮煩吾子辱相焉孔子許之掘中霤而浴中霤室中毀竈以綴足襲屍於床及葬毀宗𨆍行明不復有事於此綴足欲令不解戾也毀宗廟之門西而出行神之位在廟門之外出于大門及墓男子西面婦人東面既封而歸殷道也孔子行之子游問曰君子行禮不求變俗夫子變之矣孔子曰, SBCK: 恭承甚}
