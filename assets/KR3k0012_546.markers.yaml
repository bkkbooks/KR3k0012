  - {type: variant, offset: 167, length: 190, content: 喪如之何冠者賓及贊也孔子曰內喪則廢外喪則冠而不醴徹饌而掃即位而哭如冠者未至則廢又曰婚禮既納幣有吉日女之父母死則如之何吉日謂娶女之日也孔子曰壻使人弔若壻之父母死則女之家亦使人弔父喪稱父母喪稱母各以其正嫡自相弔問禮之宜父母不在則稱伯父世母弔禮不廢也已葬壻之伯父致命女氏曰某之子有父母之喪不得嗣為兄弟嗣繼使某致命女氏許諾而不敢嫁禮也壻免喪女之父母使人請壻弗娶而後嫁之禮也又曰大夫士有私喪, SBCK: 䘮}
