  - {type: 'tls:seg', offset: 641, content: '', id: KR3k0012_CHANT_546-7a.6}
  - {type: variant, offset: 641, length: 0, content: '', krp: 䇿矣言䟽者如禮行之未有加也齊斬之䘮哀容之躰經不能載矣君子不奪人之䘮重䘮禮也亦不可奪䘮也不可以輕之於巳也孔子曰少連大連善居䘮三日不怠三月不懈其悲哀三年憂東夷之子也言其生於夷狄而知禮也怠惰也解倦也}
