  - {type: variant, offset: 660, length: 4, content: 無子則為, krp: 發於容體者也有大憂者面必黎黒止謂不動於喜樂}
  - {type: variant, offset: 665, length: 4, content: 置後凡主, krp: 事也枲或爲似斬衰之哭若徃而不反齊衰之哭若徃而反大功之哭三曲而偯小功緦麻哀容可也此哀之發於聲音者也三曲聲而二折斬衰唯而不對齊衰對而不言大功言而不議小功緦麻議而不及樂此哀之發於言語者也議謂陳說非時事也斬衰三日不食齊衰二日不食大功三不食小功緦麻再不食三不食爲明旦朝也再不食謂如死一不食始歛時一不食也故父母之喪旣殯食粥朝一溢米暮一溢米齊衰之䘮𬞞食水飲不食菜果大功之䘮不食醯醬小功緦麻不飲醴酒此哀之發於飲食者也父母之䘮旣虞卒哭𬞞食水飲不食菜果期而小祥食菜果又朞而大祥有醯醬中月而禫禫而飲酒始飲酒者先飲醴酒始食肉者先食乾肉父母之䘮居倚廬寢苫枕塊不脫經帯齊衰之䘮居堊室苄翦不納大功之䘮寢有席小功緦麻牀可也此哀之發於居處者也又奔䘮曰聞逺}
