  - {type: variant, offset: 643, length: 1, content: 士, WYG: 子貢問喪子曰敬爲上哀次}
  - {type: variant, offset: 643, length: 1, content: 士, krp: 三年}
  - {type: variant, offset: 645, length: 4, content: 子為大夫, WYG: 瘠爲下顔色稱其情戚容稱其服問喪問居}
  - {type: variant, offset: 645, length: 0, content: '', krp: 䘮言而不語對而不問廬堊室之中不與人坐焉在堊室之中非時見乎母也不入門言巳事也爲人說爲語在堊室之中以時事見乎母乃後入門則居廬時不入門䟽哀皆居堊室不廬廬嚴者也言廬哀敬之處非有其實則不居又雜記曰懸}
  - {type: variant, offset: 646, length: 3, content: 為大夫, krp: 曰三年之䘮如斬朞之䘮如剡言其痛之惻怛有淺深也期之䘮十一月而練十三月而祥十五月而禫曽申問於曽子曰哭}
