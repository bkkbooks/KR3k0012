  - {type: variant, offset: 1539, length: 1, content: 極, SBCK: 䘮見星而行見星而舎侵晨冒昏行者盖欲從速􅀂未得行則成服而後行過國至境哭盡哀而止哭避市朝望其國境哭至於家入門左􅂛自西階殯東西靣坐哭盡哀括髪祖奔母之䘮西靣哭盡哀括髮祖降堂東即位西卿哭皆如奔父之禮下堂東至孝子堂所住處婦人奔䘮􅂛自東階殯東西靣坐􅂘盡哀東髽即位與主人拾踊拾更}
