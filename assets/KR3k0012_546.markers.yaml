  - {type: variant, offset: 426, length: 0, content: '', krp: 望望焉如有從}
  - {type: variant, offset: 427, length: 1, content: 臣, SBCK: 不語對而不問廬堊室之中不與人坐焉在堊室之中非時見乎母也不入門言巳事也爲人􅀃爲語在堊室之中以時事見乎母乃後入門則居廬時不入門䟽哀皆居堊室不廬廬嚴者也言廬哀敬之處非}
  - {type: variant, offset: 427, length: 1, content: 臣, WYG: 息此三者子哀慕之情也又檀弓上曰孔子在衞}
  - {type: variant, offset: 427, length: 1, content: 臣, krp: 弗及旣葬慨焉如不及其返而息此三者孝子哀慕之情也又檀弓曰孔子在衛}
  - {type: variant, offset: 429, length: 0, content: '', SBCK: 其實則不居又􅄂記曰懸子曰三年之䘮如斬朞之䘮如剡言其痛之惻怛有淺􅀷也期之䘮十一月而練十三月而祥十五月而禫曽申問於曽子曰哭父母有常聲乎曰中路嬰兒失其母焉何常聲之有又間傳曰斬衰何以服苴惡貌也所以首其内而見諸外也斬衰貌􅀂苴齊衰貌􅀂枲大功貌􅀂止小功緦麻容貌可也此哀之發於容體者也有大憂者面必黎黒止謂不動於喜樂之事也枲或爲似斬衰之哭􅀂徃而不反齊衰之哭􅀂徃而反大功之哭三曲而偯小功緦麻哀容可也此哀之發於聲音者也三曲聲而二折斬衰唯而不對齊衰對而不言大功言而不議小功緦麻議而不及樂此哀之發於言語者也議謂陳􅀃非時事也斬衰三日不食齊衰二日不食大功三不食小功緦麻再不食三不食爲明旦朝也再不食謂如死一不食始歛時一不食也故}
  - {type: page-break, offset: 429, content: '', id: KR3k0012_SBCK_546-3b}
  - {type: variant, offset: 429, length: 0, content: '', WYG: 送𦵏者而夫子觀之曰善哉爲喪乎足以爲法矣小子識之子貢曰夫子何善爾也曰其往也如慕其反也如疑慕謂小兒隨父母啼呼疑然者哀親之在外如不欲返又曰孔子既祥五日彈琴而不成聲哀未㤀也十日而成笙歌踰月日異旬也祥者凶事用逺日五日彈琴十日笙歌除由外也彈琴以手笙歌以氣也又曰孔子與門人立拱而尚右二三子亦皆尚右傚孔子也孔子曰二三子之嗜學也我則有姊之喪故也二三子皆尚左又曰孟獻子禫縣而不樂比御而不入可以御婦人矣尚未復孟獻子魯大夫仲孫蔑也夫子曰獻子加於人一等矣加猶愈也又檀弓下曰樂正子春之母死五日而不食子春曾子弟子曰吾悔之自吾母而不得吾情吾惡乎用吾情惡乎猶言何也又王制曰三年之喪自天子達於庶人喪從死者祭從生者又曾子問曰}
  - {type: page-break, offset: 429, content: '', id: KR3k0012_WYG_546-3a, image: WYG0898/WYG0898-0088a.png}
  - {type: page-break, offset: 429, content: '', id: KR3k0012_WYG_546-3b, image: WYG0898/WYG0898-0088b.png}
  - {type: variant, offset: 429, length: 0, content: '', krp: 送葬者而夫子觀之曰善哉爲䘮乎足以爲法矣小子識之子貢曰夫子何善爾也曰其徃也如慕其反也如疑慕謂小兒隨父母啼呼疑者哀親之在後如不欲還然又檀弓上曰孔子旣祥五日彈琴而不成聲哀未忘也十日而成笙歌踰月且異旬也祥者凶事用逺曰五日彈琴十日笙歌除由外也彈琴以手笙歌以氣也孔子與門人立拱而尚右二三亦皆尚右効孔子也孔子曰二三子之嗜學也我則有姉之䘮故也二三子皆尚左又曰孟獻子禫縣而不樂比御而不入可以御婦人矣尚未復寑孟献子魯大夫仲孫蔑也夫子曰獻子加於人一等矣加猶踰也又檀弓下曰樂正子春之母死五日而食曰吾悔之勉強過禮子春曽子弟子自吾母死不得吾情我惡乎用吾情惡乎猶於何也又王制曰三年之䘮自天子逹下通庶人父母同也天子諸侯降其也於庶人䘮從死者祭從生者又曽子問曰}
