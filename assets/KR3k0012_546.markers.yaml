  - {type: variant, offset: 617, length: 52, content: 恤由之喪哀公使孺悲之孔子學士喪禮士喪禮於是存乎書又曰士之子為大夫父母弗能主也使其子主之無子則為之置後凡主, SBCK: 聞逺}
  - {type: variant, offset: 617, length: 2, content: 恤由, WYG: 凡喪服未畢有弔者則爲位而哭拜踊客始來主人不可以常禮待之大夫之哭大夫弁絰大夫與殯亦弁絰弁絰者大夫錫衰相弔之服也如爵弁而素如環絰曰弁絰大夫有私喪之葛則於其兄之輕喪亦弁絰又曰有父}
  - {type: page-break, offset: 617, content: '', id: KR3k0012_WYG_546-4a, image: WYG0898/WYG0898-0088c.png}
  - {type: variant, offset: 617, length: 2, content: 恤由, krp: 凡䘮服未畢有弔者則爲位而哭拜踊客始來主人不可以殺礼待}
  - {type: variant, offset: 620, length: 1, content: 喪, krp: 大夫之哭大夫弁絰大夫與殯亦弁絰弁絰者大夫錫衰相弔之服也如爵弁而素加環絰曰弁絰大夫有私䘮之葛則於其兄弟之輕䘮亦弁絰又曰有父之䘮如未没䘮而母死其除父之䘮也服卒事反䘮服沒猶竟也除服謂詳祭之服也卒事旣祭反䘮服服後死者之服雖諸父昆弟之䘮如當父母之䘮其除諸父昆弟之䘮也皆服其除䘮之服卒事反䘮服雖有視之大䘮猶爲輕服者除骨肉之恩也唯君之䘮不除私服言當者期大功之䘮或終始皆在三年之中小功緦麻則不除殤長中乃除又曰子貢問䘮子曰敬爲上}
  - {type: punctuation, offset: 621, content: ，, id: KR3k0012_CHANT_546-bkkpn216}
  - {type: 'tls:seg', offset: 621, content: '', id: KR3k0012_CHANT_546-7a.4}
  - {type: variant, offset: 621, length: 5, content: 哀公使孺悲, WYG: 如未没喪而母死其除父}
  - {type: variant, offset: 622, length: 4, content: 公使孺悲, krp: 次}
  - {type: variant, offset: 627, length: 4, content: 孔子學士, WYG: ''}
  - {type: variant, offset: 627, length: 1, content: 孔, krp: 瘠爲下顔色稱其情戚容稱其服問䘮問居父母之䘮也折䘮常哀言敬爲上者疾時尚不能敬也容威儀也孝經曰容止可觀請問兄弟之䘮}
  - {type: variant, offset: 629, length: 9, content: 學士喪禮士喪禮於是, krp: 曰兄弟之䘮則}
  - {type: punctuation, offset: 630, content: 《, id: KR3k0012_CHANT_546-bkkpn217}
  - {type: variant, offset: 632, length: 2, content: 禮士, WYG: 也服其除服卒事反}
