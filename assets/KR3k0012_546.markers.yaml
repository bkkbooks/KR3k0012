  - {type: variant, offset: 1545, length: 0, content: '', SBCK: 墓北靣哭盡哀主人之待之也即位於墓左婦人墓右成踊盡哀括髪東即主人位絰絞帶哭成踊拜賔反位成踊又曰􅀂所爲位家逺則成服而徃齊衰望郷而哭大功望門而哭小功至門而哭緦麻即位而哭奔䘮哭親䟽逺近之差也訃告禮記􅄂記上曰凡訃於其君曰君之臣某死訃或作赴赴至也臣死其子使人至君所告也父母妻長子曰君之臣某之某死此臣於其家䘮所主者君訃於他國之君曰寡君不禄敢告於執事夫人曰寡小君不禄太子之䘮曰寡君之􅃴子某死君夫人不稱薨告也國君譁也大夫訃於同國敵者曰某不禄訃於士亦曰某不禄訃於他國之君子曰君之外臣寡大夫某死訃於敵者曰吾子之外􅀻寡大夫某不禄使某實敵謂有爵者實當爲至也士訃於同國大夫曰某死訃於士亦曰某死訃於他國之君曰君之外臣某死訃於大夫曰吾子之外􅀻某死於士亦曰吾子之外􅀻某死白虎通曰天子崩訃告諸侯者何縁臣子哀痛憤滿}
  - {type: page-break, offset: 1545, content: '', id: KR3k0012_SBCK_546-6b}
  - {type: variant, offset: 1545, length: 0, content: '', WYG: 墓北面坐哭盡哀主人之待之也即位於墓左婦人墓右成踊盡哀括髪東即主人位絰絞帶哭成踊拜賓反位成踊又曰若所爲位家逺則成服而往齊衰望鄉而哭大功望門而哭小功至門而哭緦麻即位而哭奔喪哭親疎逺近之差也訃告禮記雜記上曰凡訃于其君曰君之臣某死訃或作赴赴吿也臣子使人至君所吿也父母妻長子曰君之臣某之某死此臣子其家喪所主者君訃于他國之君曰寡君不禄敢吿于執事夫人曰寡小君不禄太子之喪曰寡君之適子某死君夫人不稱薨告于國君謙也大夫訃于同國適者曰某不禄訃于士亦曰某不禄訃于他國之君曰君之外臣寡大夫某死訃于適者曰吾子之外私寡大夫某不禄使某實禄謂有爵者實當爲至也士訃于同國大夫曰某死訃于他國之君曰君之外臣某死訃于大夫曰吾子之外私某死訃于士亦曰吾子之外私某死白虎通曰天子崩訃告諸侯者何緣臣子哀痛憤懣}
