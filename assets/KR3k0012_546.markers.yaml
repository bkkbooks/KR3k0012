  - {type: variant, offset: 2052, length: 502, content: 喪公西赤掌葬焉唅以蔬米三具蔬米粳米也禮記曰嘉蔬襲衣十有一稱加朝服一冠章甫之冠佩象環徑五寸而綦組綬綦雜色也桐棺四寸柏槨五寸飾桐廧置翣設披周也設崇殷也綢練設旐夏也披柩行夾引棺者也崇牙旌旗飾也綢練旌旗之扛葬乘東所建也旌旗之旒縿緇布廣充幅長尋日旐也兼用三王之禮所以尊師且備古也續漢書禮儀志曰登遐皇后詔三公典喪事百官皆衣白單衣白幘冠閉城門宮門近臣中黃門持兵虎賁羽林郎中署皆嚴宿衛官府各警北軍五校繞宮屯兵黃門令尚書御史謁者晝夜行陳三公所手足色膚如禮皇后皇太子哭踴如禮沐浴如禮守宮令兼東園匠將女執事黃綿緹繒金縷玉押如故事飯含珠玉如禮冰槃如禮百官哭臨殿下是日夜下竹使符到皆伏哭盡哀小歛如禮東園匠考工今東園秘器表裏洞赤文畫日月烏龜龍虎連璧偃明如故事大歛于兩楹之間干寶晉紀曰大鴻臚鄭默有母喪既葬有司依常使還攝職默固陳執久乃許之於是定令聽大臣得終喪焉宋書禮志曰鄭玄喪制二十七月而終學者多云得禮晉初用王肅議祥橝共月遂以為制江左以來唯晉朝施用縉紳之士猶多遵玄議齊書曰皇太子妃薨左衛將軍沈文季經為宮臣未詳服不王儉議曰漢魏已來官僚先備臣隸之節具體在三存既盡敬亡豈無服昔庾翼喪妻王允滕猶府吏宜有小君之服況臣節之重宜依舊君之妻齊襄三月而除, SBCK: 請減宗等}
