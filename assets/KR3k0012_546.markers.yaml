  - {type: variant, offset: 1243, length: 2, content: 又曰, SBCK: 斬衰苴杖居􅀝廬食粥寢苫枕塊所以爲至痛飾也三年之䘮二十五月而畢哀痛未盡思慕未忘然而服以是斷之者豈不送死有巳復生有節也哉凡生天地之間者有血氣之屬必有知有知之屬莫不知愛其􅀋今是大鳥獸則失䘮其羣匹越月踰時則必返廵過其故郷廻翔焉鳴號焉躑䠱焉踟蹰焉然後乃能去之小者至於鷰雀猶有啁噍之頃焉然後乃能去之故有血氣之屬者莫知於人於其親也至死不窮則三年之喪二十五月而畢􅀂駟之過􅂩然而遂之則是無窮也故先王爲之立中制節壹使足以成文理則釋之矣立中制節謂服紀使有年月之限者也}
