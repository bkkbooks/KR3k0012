  - {type: variant, offset: 401, length: 0, content: '', SBCK: 子路曰吾寡兄弟而不忍也孔子曰先王制禮行道之人皆弗忍也子路聞之遂除之子思哭㛐也爲位礼雖無服為位而哭夫子善之曽子曰小功不稅追服爲稅則是逺兄弟終無服也而可乎曽子曰䘮有疾食肉飲酒必有草木之滋焉以爲薑桂之謂曽子曰所云草木之滋者薑桂也又檀弓下曰子張問曰書云髙宗三年不言言乃歡有諸時人君無行三年之䘮礼者􅂬喜恱也言乃喜恱則民臣望其言乆也仲尼曰胡爲其不然也古者天子崩王世子聽於􅃁宰三年􅃁宰大官又曰顔丁善居䘮顔丁魯人始死皇皇焉如有求而弗得及殯望望焉如有從而弗及旣葬􅁣焉如不及其返而息此三者孝子哀慕之情也又檀弓曰孔子在衛有送葬者而夫子觀之曰善哉爲䘮乎足以爲法矣小子識之子貢曰夫子何善爾也曰其徃也如慕其反也如疑慕謂小兒隨父母啼呼疑者哀親之在後如不欲還然又檀弓上曰孔子旣祥五日彈琴而不成聲哀未忘也十日而成笙歌踰月且異旬也祥者凶事用逺曰五日彈琴十日笙歌除由外也彈琴以手笙歌以氣也孔子與門人立拱而尚右二三亦皆尚右効孔子也孔子曰二三子之嗜學也我則有姉之䘮故也二三子皆尚左又曰孟獻子禫縣而不樂比御而不入可以御婦人矣尚未復寑孟献子魯大夫仲孫蔑也夫子曰獻子加於人一等矣加猶踰也又檀弓下曰樂正子春之母死五日而食曰吾悔之勉強過禮子春曽子弟子自吾母死不得吾情我惡乎用吾情惡乎猶於何也又王制曰三年之䘮自天子逹下通庶人父母同也天子諸侯降其也於庶人䘮從死者􅀕從生者又曽子問曰父母之䘮弗除可乎以其有終身之憂也孔子曰先王制禮過時不舉非禮也非不能勿除也患其過制也故君子過時不􅀕禮也又􅄂記曰凡䘮服未畢有弔者則爲位而哭拜踊客始來主人不可以殺礼待之大夫之哭大夫弁絰大夫與殯亦弁絰弁絰者大夫錫衰相弔之服也如爵弁而素加環絰曰弁絰大夫有􅀻䘮之葛則於其兄弟之輕䘮亦弁絰又曰有父之䘮如未没䘮而母死其除父之䘮也服卒事反䘮服􅃿猶竟也除服謂詳􅀕之服也卒事旣􅀕反䘮服服後死者之服雖諸父昆弟之䘮如當父母之䘮其除諸父昆弟之䘮也皆服其除䘮之服卒事反䘮服雖有視之大䘮猶爲輕服者除骨肉之恩也唯}
