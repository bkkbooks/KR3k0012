  - {type: variant, offset: 635, length: 6, content: 禮於是存乎書, WYG: 服没猶卒也除服謂祥祭之服也卒事既祭反喪服服後死者之服雖諸父昆弟之喪如當父母之喪其除諸父昆弟之喪也皆服其除喪之服卒事反喪服雖有親之大喪猶爲輕服者除骨肉之恩也惟君之喪不除私服言當者期大功之喪或終始皆在三年之中也小功緦麻則不除殤長中乃除也}
