  - {type: variant, offset: 657, length: 2, content: 子主, krp: 内而見諸外也斬衰貌若苴齊衰貌若枲大功貌若止小功緦麻容貌可也此哀}
  - {type: punctuation, offset: 660, content: 。, id: KR3k0012_CHANT_546-bkkpn228}
