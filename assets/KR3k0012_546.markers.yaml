  - {type: variant, offset: 2860, length: 120, content: 德孝漢之謚帝稱孝其義取此也故漢制天下皆誦孝經選吏則舉孝廉蓋以孝務也夫喪親自盡孝之終也今二千石不得行三年喪非所以崇孝道而稱火德也頃者漢嗣數乏枝葉不繁其咎未必不由此往者文帝勞謙自約行過于儉故有遺詔以日易月此所謂夷惠激俗當身而已貫萬世為後嗣法者也, SBCK: 門太平御覽卷第五百四十六}
