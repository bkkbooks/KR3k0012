  - {type: variant, offset: 828, length: 4, content: 所以為哀, krp: 謨也親始死去冠二日乃去笄括髪也今時始䘮者邪巾貊頭䈂纚之存象}
  - {type: variant, offset: 830, length: 1, content: 為, WYG: 首其内而見諸外也斬衰貌若苴齊衰貌若枲大功貌若止小功緦麻容貌可也此}
  - {type: variant, offset: 832, length: 0, content: '', WYG: 之發於容體者也人憂者面必黎黒止謂不動于喜樂之常也枲或作似斬衰之哭若往而不反齊衰之哭若往而反大功之喪三曲而偯小功緦麻哀容可也此哀之發於聲音者也三曲一舉聲而三折斬衰唯而不對齊衰對而不言大功言而不議小功緦麻議而不及樂此哀之發于言語者也謂陳説非時事也斬衰三日不食齊衰二日不食大功三不食小功緦麻再不食始死一不食始斂時一不食也故父母之喪既殯食粥朝一溢米莫一溢米齊衰之喪疏食水飲不食菜果大功之喪不食醯醬小功緦麻不飲醴酒此哀之發於飲食者也父母之喪既虞卒哭疏食水飲不食菜果期而小祥食菜果又期而大祥有醯醬中月而禫禫而飲醴酒始飲酒者先飲醴酒始食肉者先食乾肉父母之喪居倚廬寢苫枕塊不税絰帶齊衰之喪居堊室芐剪不納大功之喪寢有席小功緦麻牀可也此哀之發於居處者也又奔喪曰聞逺兄弟之喪既除喪而后聞喪免袒成踊拜賓則尚左手小功緦麻不税者也雖不服猶免袒尚左手吉拜也又問喪曰親始死雞斯徒跣扱上衽交手哭惻怛之心痛疾之意傷腎乾肝焦肺水漿不入口三日不舉火故鄰里爲之糜粥以飲食之親父母也雞斯當爲笄纚聲之誤也親始死去冠二日乃去笄纚括髪也今時始喪者邪巾貊頭笄纚之象}
