  - {type: variant, offset: 531, length: 3, content: 賜北宮, SBCK: 曰敢問溺音何從而出也子夏對曰鄭音好濫􅁋志宋音燕女溺志衛音趍數煩志齊音傲僻驕志四者􅁋於色而害於徳是以􅀕祀弗用也詩云肅雍和鳴先祖是聽夫肅肅敬也雍雍和也夫敬以和何事不行爲人君也謹其所好􅁖而巳矣君好之則臣爲之上行之則民從之詩云誘民孔易此之謂也然後聖人作爲鞉皷控􅄄壎箎此六者德音之音也然後鍾磬竽瑟以和之干戚旄狄以舞之此所以􅀕先王之廟也所以獻酬酳酢也所以官序貴賤各得其冝也所以示後丗有尊卑長㓜之序也鍾聲鑑鑑以立號號以立撗撗以立武君子聽鍾聲則思武臣石聲磬磬以立辦辦以致死君子聽磬聲則思死封疆之臣絲聲哀哀以立廉廉以立志君子聽琴瑟之聲則思志義之臣竹聲濫濫以立㑹㑹以聚衆君子聽竽笙簫管之聲則思畜聚之臣皷􅎏之聲懽讙以立動動以進衆君子聽皷鼙之聲則思將帥之臣君子之聽音非聽其鏗鏘而巳也彼亦有所合之也君子曰禮樂不可斯湏去身致樂以治心則易直子諒之心油然生矣易直子諒之心生則樂樂則安安則乆乆則天天則神天則不言而信神則不怒而威致樂以治心者也致猶深審也子讀如不子之子油然新生好貌也善心生則寡於利欲寡於利欲則樂矣至明行成不言而見信如天也不怒而見畏如神致禮以治躬則莊敬莊敬則嚴威心中斯湏不和不樂而鄙詐之心入之矣鄙詐入之謂利欲生外貌斯湏不莊不敬而易慢之心入之矣故樂也者動於内者也禮也者動於外者也樂極和禮極順内和而外順則民瞻其顔色而弗與爭也望其容貌而不生易慢焉極至也故德輝動於内而民莫不承聽理發諸外而民莫不承順故曰致禮樂之道舉而措之天下無難矣樂也者動於内者也禮也者動於外者也故禮主其減樂主其盈減猶倦也盈猶溢也禮減而進以進爲文樂盈而反以反爲文樂以統情禮以理行之情溢而行倦則進之隘之則使反進則自免徃反謂自損抑也文猶羡也禮減而不進則銷樂盈而不反則放故禮有報而樂有反放􅁋於聲樂不能止也報續曰褒猶進也禮得其報則樂樂得其反則安得謂曉其義知其帰禮之報樂之反其義一也夫樂者先王之所以飾}
