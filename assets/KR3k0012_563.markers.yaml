  - {type: variant, offset: 645, length: 330, content: 以為子孫基業無過三四十世也秦始皇帝曰死而以謚法是父子名號有時相襲者以一至萬則世世不相復也故死而號曰始皇帝其次曰二世皇帝欲以一至萬也張璠漢書曰范丹卒三府各遣令史奔弔累行論謚曰宜為貞節先生又曰蔡雍嘗至朱穆家寫其書及穆卒雍及門人共謚穆曰忠文璠論曰夫謚者上之所贈非丁之所造故顏冉至德不聞有謚蔡朱二子各以襄代藏否不立故私議也范曄後漢書曰夏侯恭善為文章諸儒共謚曰宣明子牙少習家業著賦頌讚凡四十篇舉孝廉早卒鄉人號曰文德先生魏書曰有司議謚以為鍾繇昔為廷尉辨理刑獄決嫌明疑民無怨者猶於張之在漢也詔曰太傳功高德茂位為師傅論行賜謚當先依此兼敘廷尉於張之德耳乃榮謚曰成侯干寶晉記曰何曾卒下禮官謚博士秦秀議曰曾資性驕奢不修軌則弈世以來宰臣輔相未有受詬辱之聲被有司之劾父子塵累而蒙恩貸若曾, SBCK: ''}
