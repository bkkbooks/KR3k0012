  - {type: variant, offset: 386, length: 3, content: 父請謚, SBCK: 翟也旄牛尾也文武所執也樂者音之所由生也其夲在人心之感於物也是故其哀心感者其聲噍以殺其樂心感者其聲嘽以緩其喜心感者其聲發以散其怒心感者其聲粗以厲其敬心感者其聲直以廉其愛心感者其聲和以柔是故先王愼所以感之者宫爲君啇爲臣角爲民徴爲事羽爲物五者不亂則無怗懘之音矣凢音濁者尊清者卑懘弊敗不和皃也宫亂則荒其君驕啇亂則卑其君壞角亂則憂其民怨徴亂則哀其事勤羽亂則危其財匱五者皆亂迭相陵謂之慢鄭衛之音亂丗之音也比於慢矣桑間濮上之音亡國之音也其政散其民流誣上行私而不可正也是故知聲而不知音者禽獸是也知音而不知樂者衆庶是也唯君子爲能知樂是故不知聲者不可}
  - {type: variant, offset: 386, length: 3, content: 父請謚, WYG: 翟也旄牛尾也文舞所執也樂者音之所由生也其本在人心之感於物也是故其哀心感者其聲噍以殺其樂心感者其聲嘽以緩其喜心感者其聲發以散其怒心感者其聲粗以厲其敬心感者其聲直以亷其愛心感者其聲和以柔是故先王慎所以感之者宫為君商為臣角為民徴為事羽為物五者不亂則無沾懘之音矣凡音濁者尊清者卑沾懘弊敗不和音也宫亂則荒其君驕商亂則卑其臣壊角亂則憂其民怨徴亂則衰其事勤羽亂則危其財匱五者皆亂迭相陵謂之慢鄭衛之音亂世之音也比於慢矣桑間濮上之音亡國之音也其政散其民流誣上行私而不可止也是故知聲而不知音者禽獸是也知音而不知樂者衆庶是也惟君子為能知樂是故不知聲者不可}
