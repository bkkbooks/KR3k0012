  - {type: variant, offset: 517, length: 1, content: 恭, SBCK: 有德德者得也樂者爲同禮者爲異同則相親異則相敬同謂齊好􅁖謂别貴賤也樂勝則流禮勝則離流謂合行不敬也離謂析居不和也樂由中出和在心也禮自外作敬在㒵也樂由中出故静禮自外作故文大樂必易大禮必簡樂至則無怨禮至則不爭揖讓而天下治者禮樂之謂也大樂與天地同和大禮與天地同節和故百物不失節故祀天􅀕地明則有禮樂幽則有􅀑神如此則四海之内合敬同愛矣故知禮樂之情者能作識禮樂之文者能述述謂訓其義也作者謂之聖述者謂之明樂者天地之和也禮者天地之序也和故百物皆化序故群物皆別化猶生也謂猶形體異也王者功成作樂治定制禮其功大者其樂備其治辯者其禮具五帝殊時不相㳂樂三王異丗不相襲禮樂極則憂禮粗則偏矣及夫敦樂而無憂禮備而不偏者其唯大聖}
  - {type: page-break, offset: 517, content: '', id: KR3k0012_SBCK_563-3b}
  - {type: variant, offset: 517, length: 1, content: 恭, WYG: 有徳徳者得也樂者為同禮者為異同則相親異則相敬同謂齊好學異為别貴賤也樂勝則流禮勝則離流謂合行不敬也離謂所居不和也樂由中出和在心也禮自外作敬在貌也樂由中出故静禮自外作故文大樂必易大禮必簡樂至則無怨禮至則不争揖讓而天下治者禮樂之謂也大樂與天地同和大禮與天地同節和故百物不失節故祀天祭地明則有禮樂幽則有鬼神如此則四海之内合敬同愛矣故知禮樂之情者能作識禮樂之文者能述述謂訓其義也作者之謂聖述者之謂明樂者天地之和也禮者天地之序也和故百物皆化序故羣物皆别化猶生也别謂形體異也王者功成作樂治定制禮其功大者其樂備其治辨者其禮具五帝殊時不相沿樂三王異世不相襲禮樂極則憂禮粗則偏矣及夫敦樂而無憂禮備而不偏者惟大聖}
