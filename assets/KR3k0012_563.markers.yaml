  - {type: variant, offset: 3351, length: 1294, content: 其事業不一謂一文不足以紀其善於是有文成景桓成之謚雖黷禮甚矣然猶褒不失人唐興參用周秦之制以魏徵為文貞簫瑀為貞褊其杜如晦封彝陳叔達溫彥博岑文本唐休璟魏知古崔日用並當時赫赫以功名居宰相者謚不過一字不聞子孫佐吏有以字少稱屈由此言之二字不必為褒一字不必為貶若褒貶果在乎字數則是堯舜禹湯文武成康不如周威烈慎靖也齊桓晉文不如趙武靈魏安釐也杜如晦王珪以下或成或明或懿或憲不如蕭瑀之貞褊也然肅者威德克就之名以諲之從政威能閑邪德可濟眾故以肅易名而忠在其中矣亦猶隨會甯俞之不稱文豈必因而重之然後為美魏晉已來賈許之籌筭賈逵之忠莊張既之政能程普之智勇顧雍之密重王渾之器量劉恢之鑒裁庾翼之志略彼八君子者方之東平宜無慚德死之日並謚曰肅當代不以為貶何嘗徵一字二字以為之升降乎諱周禮曰小史掌邦國之志奠繫世辨昭穆若有事則詔王之忌諱志謂記也先王死為忌名為諱禮曰禮不諱嫌名二名不偏諱逮事父母則諱王父母不逮事父母則不諱王父母遠不及也謂幼孤不及識父母不至於祖名也孝子聞名心瞿諱之由心也此謂庶人也適士以廟事祖雖不建父母猶諱祖也大夫之所有公諱避君諱也詩書不諱臨文不諱廟中不諱謂有事於高祖則不諱曾祖以下尊無二也大夫之諱雖質君之前臣不諱也臣於夫人之家恩遠也質獨對也婦諱不不出門婦親近於宮中言避之耳大功小功不諱入境而問禁入國而問俗入門而問諱又曰二名不偏諱夫子之母名徵在言在不稱徵言徵不稱在稱舉也又曰過而舉君之諱則起舉猶言也起立者失言而變自新與君之諱同則稱字謂諸臣之名也又曰卒哭而諱自此而鬼神事之尊而諱其名王父母兄弟世父叔父姑姊妹子與父母諱父為其親諱則子不敢不從諱也諸王父母以不之親諱是謂士也天子諸侯諱群祖母之諱宮中諱妻之諱不舉諸其側與從祖昆弟同名則諱之傳曰周人以諱事神名終將諱之君父之臣固非臣子所斥然禮既辛哭以大澤徇曰舍故而諱新曰舍親盡乏祖而諱新死者故言以大諱事神名絲將諱之自父至高祖皆不敢斥言蕭子顯齊書曰始安貞王道生字孝伯太祖次兄也子鳳字景慈卒於宋明帝贈始安靖王改華林鳳莊門為望賢門太極東堂畫鳳鳥題為神鳥而鸞鳥為神雀南史曰王琨避諱過甚父名懌母名恭心不得犯焉時咸謂矯枉過正又曰王亮王攸之子為晉陵太守在職清公有美政時有晉陵令沈瓚之性麤踈好犯亮諱亮不堪遂啟代之瓚之怏怏乃造坐云下官以犯諱被代未知明府諱若為攸字當作酋傍安大猶為大傍安酋猷若有心悠無心攸乞告示亮不及履下床跣而走瓚之拊掌大笑而去唐書曰賈曾除中書舍人固辭以父忠同音識者以為中書是曹司名又與曾父音同字異於禮無嫌曾乃就職顏氏家訓曰近世謝舉甚有聲譽聞諱必哭為世所譏世說曰桓玄呼人溫酒自道其父名既而曰英雄正自麤踈語林曰王藍田作會稽令人問諱荅曰惟祖惟考四海所知過無復諱徐邈表不諱太子名議興太守褚爽上表稱皇太子名尚書下之禮官以時議其可否禮官議疑無適準正聊率所見以論之曰禮記曰夫人之諱雖質君之前臣不諱也案夫人國之小君君之一體太子之母也而尚不諱則太子何嫌乎又禮君前臣名又周公告文王皆稱武王名可益明矣忌日禮曰君子有終身之喪忌日之謂也忌日不用非不祥也言夫忌日志有所至而不敢盡私忌日親亡之日忌日者不用舉他事如有時日之禁也祥善也志有所至至於親以此日忘其哀心如喪時續漢書曰申徒與屠字同蟠字子龍父母卒蟠思慕不飲酒食肉, SBCK: 御覽卷第五百六}
