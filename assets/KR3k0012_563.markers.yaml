  - {type: variant, offset: 2852, length: 497, content: 已非黃帝群臣之作也俗人通自不信仙寧肯追以仙謚黃帝乎穆天子傳曰為盛姬謚曰哀俶人荀氏家傳曰荀爽對象策曰臣聞火生於木故其德孝漢之謚帝稱孝者其義取此故漢制使天下皆誦孝經選吏則舉孝廉以孝為務也列女傳曰魯黔婁先生死曾子與門人往弔焉曰何以為謚其妻曰以康為謚昔先君嘗賜之粟三十鍾先生辭而不受是其餘富也君嘗欲授之以國相先生辭而弗為是其餘貴也彼先生者甘天下之淡味安天下之卑位不戚戚於貧賤不汲汲於富貴求仁而得仁求義而得義其謚為康不亦宜乎崔駰章帝謚議曰臣聞號者功之表謚者行之跡據德錄功各當其實孝經曰天地明察神明章矣唐書數堯之德曰平章百姓言天之常德也詩曰追琢其章金玉其相亹亹文王綱紀四方又曰倬彼雲漢為章於天喻文王聖德有金玉之質猶雲漢之在天也舉表拆義四方德附矣易曰先天而天弗違後天而奉天時臣愚以宜上尊號曰章唐獨孤及謚呂諲曰肅嚴郢駮曰國家故事宰臣之謚有二字以彰善旌德焉夫以呂公文能無害武能禁暴貞則幹事忠則利人盛烈宏規不可備舉傳敘八元之德曰忠肅恭懿若以美謚擬於形容請曰忠肅及重議曰謚法在懲惡勸善不在字多必稱其大而略其細故言文不言武言武不言文三代以下朴散禮壞乃有二字之謚非古也其源生於衰周漢興簫何張良霍去病霍光俱以文武大略佐漢致, SBCK: 走出}
