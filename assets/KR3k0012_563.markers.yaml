  - {type: variant, offset: 531, length: 3, content: 賜北宮, WYG: 曰敢問溺音何從而出也子夏對曰鄭音好濫滛志宋音燕女溺志衛音趍數煩志齊音傲僻驕志四者滛於色而害於徳是以祭祀弗用也詩云肅雍和鳴先祖是聴夫肅肅敬也雍雍和也夫敬以和何事不行為人君者謹其所好惡而已矣君好之則臣為之上行之則民從之詩云誘民孔易此之謂也然後聖人作為鞉皷椌楬壎箎此六者徳音之音也然後鐘磬竽瑟以和之干戚旄狄以舞之所以祭先王之廟也所以獻酬酳酢也所以官序貴賤各得其宜也所以示後世有尊卑長㓜之序也鐘聲鏗鏗以立號號以立横横以立武君子聼鐘聲則思武臣石聲磬磬以立辨辨以致死君子聼磬聲則思死封疆之臣絲聲哀哀以立亷亷以立志君子聼琴瑟之聲則思志義之臣竹聲濫濫以立㑹㑹以聚衆君子聼竽笙簫管之聲則思畜聚之臣皷鼙之聲讙讙以立動動以進衆君子聼鼓鼙之聲則思將相之臣君子之聼音非聼其鏗鏘而已也彼亦有所合之也君子曰禮樂不可斯須去身致樂以治心則易直子諒之心油然生矣易直子諒之心生則樂樂則安安則乆乆則天天則神天則不言而信神則不怒而威致樂以治心者也致猶深審也子讀如不子之子油然新生好兒也善心生則寡於利欲寡於利欲則樂矣志明行成不言而見信如天也不怒而見威如神也致禮以治躬則莊敬莊敬則威嚴心中斯須不和不樂而鄙詐之心入之矣鄙詐入之謂利欲生外貎斯須不莊不敬而易慢之心入之矣故樂也者動於内者也禮也者動於外者也樂極和禮極順内和而外順則民瞻其顔色而弗與争也望其容貌而不生慢易焉極至也故德輝動於内而民莫不承聽理發諸外而民莫不承順故曰致禮樂之道舉而措之天下無難矣樂也者動於内者也禮也者動於外者也故禮主其减樂主其盈减猶倦也盈猶益也禮减而進以進為文樂盈而取以反爲文禮减而不進則銷樂盈而不反則放故禮有報而樂有反禮得其報則樂樂得其反則安得謂曉其義禮之報樂之反其義一也夫樂者先王之所以飾}
