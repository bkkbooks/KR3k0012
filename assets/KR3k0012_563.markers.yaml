  - {type: variant, offset: 2139, length: 464, content: 謚者所以懲惡勸善激濁揚清使忠臣義士知勸亂臣賊子畏罪孔子修春秋亂臣賊子懼蓋為此也垂範如此尚不能救況又隳其典法乎大戴禮曰周公旦為太師相嗣王作謚法者行之跡也號者功之狀也服者位之章也是以大行受大名細行受小名行出於己名出於人謚慎也以人行之始終悉慎錄之以為名也禮記外傳曰古者生無爵死無謚古謂夏殷之前謚法周公所為也堯舜禹湯皆後追議其功耳謚者行之跡也累積平生所行事善惡而定其名也有大行受大名謂之景行景大也有大善若禹湯文武者小善受小名若宣若成其德狹也文經天地其德博也武定禍亂其功大也五經通義曰謚者死後之稱累生時之行而謚之生有善行死有善謚所以勸善戒惡也謚之言列其所行身雖死名常存故謚也白虎通曰謚者何謂也謚之為言引也引列行之跡也所以進勸威德使上務禮節死乃謚之詩云靡不有初鮮克有終始終不能若一故據其終後可知也今世所以臨葬而謚之何因眾會欲顯揚之也謚或一言或兩言何文者一言為謚質者兩言為謚故湯死後稱成湯是明二言為謚也謚七十二品禮謚法曰翼善傳聖曰堯仁聖盛明曰舜慈惠愛民曰文剛德理直曰武天子崩大臣至郊謚之者何以為臣子之義莫不欲褒稱其君掩惡揚美者故之郊明不得欺天, SBCK: ''}
