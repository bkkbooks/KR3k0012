  - {type: variant, offset: 522, length: 3, content: 恭大夫, SBCK: 極乎天而蟠乎地行乎隂陽而通乎􅀑神窮髙極逺而測深厚是故志微噍殺之音作而民憂思嘽諧慢易繁文簡節之音作而民康樂粗厲猛起􅁬末廣僨之音作而民剛毅廉直勁正莊誠之音作而民肅敬寛􅁉内好順成和動之音作而民慈愛流僻邪散簡成滌濫之音作而民􅁋亂故樂行而倫清耳目聦明血氣和平移風易俗天下皆寧故曰樂者樂也君子樂得其道小人樂得其欲以道制欲則樂而不亂以欲忘道則惑而不樂道謂仁義也欲謂邪􅁋也是故君子反情以和其志廣樂以成其教樂行而民嚮方可以觀德矣方猶道也德者性之端也樂者德之華也金石絲竹樂之器也詩言其志也歌詠其聲也舞動其容也三者夲於心然後樂氣}
  - {type: page-break, offset: 522, content: '', id: KR3k0012_SBCK_563-4a}
  - {type: variant, offset: 522, length: 3, content: 恭大夫, WYG: 極乎天而蟠乎地行乎隂陽而通乎鬼神窮髙極逺而測深厚是故志微噍殺之音作而民思憂啴諧慢易繁文簡節之音作而民康樂粗厲猛起奮末廣賁之音作而民剛毅亷直勁正荘誠之音作而民肅敬寛裕肉好順成和動之音作而民慈愛流僻邪散狄成滌濫之音作而民滛亂故樂行而倫清耳目聰眀血氣和平移風易俗天下皆寕故曰樂者樂也君子樂得其道小人樂得其欲以道制欲則樂而不亂以欲忘道則惑而不樂道謂仁義也欲謂邪滛也是故君子反情以和其志廣樂以成其教樂行而民嚮方可以觀徳矣方由道也德者性之端也樂者德之華也金石絲竹樂之器也詩言其志也歌永其聲也舞動其容也三者本於心然後樂器}
