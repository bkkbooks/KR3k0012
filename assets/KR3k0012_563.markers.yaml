  - {type: variant, offset: 1044, length: 1025, content: 亂大倫案謚法昏亂紀度日荒充宜謚曰荒上弗從賜謚曰武晉書曰太康八年太常上謚故太常平陽男郭弈為景侯有司奏云晉受命以來祖宗號謚群下未有同者故郭弈與景皇同不可聽宜謚曰穆晉中興書曰中宗即尊號也時賜謚多由封爵不考德行王遵上䟽曰臣聞大行受大名小行受小名名則實稱不誣而已近代以來惟爵得謚武官牙門有爵必謚卿校常伯無爵悉不賜謚甚失制謚之本今中興肇建勳德兼被宜深體前訓使行以謚彰豈可限以有爵中宗納焉自後公卿無爵而謚自遵始也沈約宋書曰江智淵出為北中郎長史初上寵姬宣貴妃殷氏卒使群臣議謚智淵上謚曰懷上以不盡嘉號甚銜之後車駕幸南山乘馬至殷氏墓群臣皆騎從上以馬鞭指石柱謂智淵曰此柱上不容有懷字智淵益懼宋書曰劉康祖出軍至壽陽數十里會魏永昌王以長安之眾八萬騎與康祖相及於尉康祖有八千人乃結車營而進魏軍四面來攻眾分為三且休且戰康祖率厲士將無不一當百魏軍死者太半流血沒踝矢中頭而死於是大敗舉軍淪覆免者纔數十人魏人傳康祖首示彭城百姓贈益州剌史謚曰壯又曰蕭眕音軫素為諸暨令到縣十餘日掛衣冠於縣門而去獨居屏事非親戚不得至其籬門妻齊太尉王儉女久與別居遂無子卒親故跡其事行謚曰貞文先生又曰曇首卒文帝臨慟歎曰王詹事所疾不救國之襄也中書舍人周赴侍側曰王家欲襄賢者先殯上曰直是我家襄耳以預誅羨之等謀追封預寧縣侯謚曰文又曰王晏為吏部尚書令王儉雖貴而踈晏既領選權行臺閣與儉頗不平儉卒禮官欲依王謚為文獻晏啟上曰乃得此謚但宋來不加素族出謂人曰平頭憲事已行矣後魏書曰孝文太和十六年改謚宣尼曰大聖尼父告謚孔廟齊書曰長沙威王晃武帝嘗幸鍾山晃從駕以馬矟剌道邊枯蘗上令左右數人引之銀纏皆卷聚而矟不出乃令晃復馳馬拔之應手便去每遠州獻駿馬上輒令晃於華林中調試之高帝常曰此我家任城也武帝緣此意故謚曰威任城即魏任城王彰也梁書曰蕭子顯卒請謚手勑曰恃才傲物宜謚曰驕又曰徐勉卒武帝聞而流涕即車駕臨殯皇太后亦舉哀朝堂有司奏謚居敬行簡曰簡執心決斷曰肅因謚簡肅公又曰蕭機字智通位湘州剌史美姿容善吐納家既多書愽學強記然而好弄尚力遠士子近小人為州專意聚歛無政績頻被案劾將葬有司請謚詔曰王好內怠政宜謚曰煬又曰蕭曄為晉陵太守曄初至郡屬旱躬自祈禱果獲甘潤郡多猛獸為害曄在政六年此暴遂息卒于郡初曄寢疾歷年官曹擁滯有司案謚法言行相違曰僣乃謚曰僣侯陳書曰袁泌為司徒左長史卒于官臨終戒其子芳華曰吾於朝廷素無功績瞑目之後斂手足旋葬無得受贈謚其子述泌遣意朝廷不許謚曰質唐書曰開元中贈左丞相程行諶謚曰貞歧王府長史裴子餘謚曰孝同時列上中書令張說省之曰程裴二謚可謂謚之無愧, SBCK: 樂}
