  - {type: variant, offset: 530, length: 0, content: '', SBCK: 之音則不知倦敢問古樂之如彼何也新樂之如此何也子夏對曰今夫古樂進旅退旅和正以廣􅃶匏笙簧㑹守拊皷始奏以文復亂以武治亂以相訊疾以雅君子於是語於是道古修身及家平均天下此古樂之發也今夫新樂進俯退俯姦聲以濫溺而不止及獶侏儒獶雜子女不知父子樂終不可以語不可以道古此新樂之發也文}
