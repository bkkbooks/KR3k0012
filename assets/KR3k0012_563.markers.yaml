  - {type: variant, offset: 4654, length: 383, content: 日不食晉書曰穆帝納后欲用九月九日是忌月范汪問王彪之荅云禮無忌月不敢以所不見便謂無之博士曹躭荀訥等並謂無忌月之文不應有妨王洽曰若有忌月當復有忌歲唐書曰萬歲通天中建安王攸宜平契丹凱旋欲詣闕獻俘內史王及善以為將軍將入城例有軍樂今屬孝明高皇帝忌月請備而不奏鸞臺侍郎王方慶奏案禮經但有忌日而無忌月晉穆帝納后用九月九日是康帝忌月于疑不定下太常禮官荀納議稱禮只有忌日無忌月語若有忌月即有忌時忌歲軍樂是軍容與常不同請振作於事無嫌孔叢子曰季節見於子順子順賜之酒辭問其故對曰今家之忌日也故子順曰飲也禮雖衰麻見於君先生君及先生與之梁肉無辭所以敬尊長而不敢遂其私也忌日方於有服輕矣蕭廣濟孝子傳王脩字叔治北海人年十歲喪母母以社日亡來年社日脩哀感悲號鄰人為之罷社世說曰前輩人忌日唯不飲酒作樂王世將以忌日送客至新亭主人須臾欲作音聲王便去時單往衛洗馬墓下彈馬語林曰桓玄不立忌日政有忌時每至日絃觴無廢, SBCK: ''}
