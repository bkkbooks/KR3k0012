  - {type: variant, offset: 2608, length: 326, content: 尺龍顏秀目每祭未嘗不伏地流涕三齊略曰鄭司農常居其城南山中教受黃巾亂乃遣生徒崔琰諸賢於此揮涕而散所居山下草如薤葉長尺餘堅紐異常時人各為康成書帶世說曰晉元帝過江飲酒王茂弘與帝有舊流涕諫之帝許之從是遂斷語林曰王太保作荊州有二兒亡一兒還葬舊塋一兒留葬太保垂涕曰不忘故鄉仁也不戀本土達也唯仁與達吾二子有焉素問曰肝液為淚欠釋名曰欠嶔也開張其口脣嶔嶔然說文曰欠張口出氣也禮記曲禮曰侍坐於君子君子欠伸撰杖屨視日之蚤暮侍坐者請出矣又內則曰在父母舅姑之所不敢欠伸跛倚睇視宋元嘉起居注曰尚書僕射孟顗於後堂勑見亢聲大欠有違儀禮被劾詔無所問嚏釋名曰嚏聲乍嚏而出也毛詩衛風曰寤言不寐願言則嚏禮記月令曰季秋行夏令則人多齀嚏又內則曰在父母舅姑之所不敢噦噫嚏咳也噦於越切噫於界切咳開代切, SBCK: 十八}
