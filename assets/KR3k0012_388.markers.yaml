  - {type: variant, offset: 11, length: 2, content: 高祖, krp: 師曠見周太子晉太子曰吾聞汝知人年壽幸以告我師曠曰汝色赤白聲火聲不壽太子曰余後三年上賔於帝汝慎無言殃將及汝三年而死毛詩關雎序曰情發於中故形於聲聲成文謂之音}
  - {type: variant, offset: 14, length: 1, content: 股, SBCK: 傳宣上曰􅀄楚司馬子良生越椒子文曰必殺之是子也熊虎之狀而犲狼之聲弗殺必滅􅀂敖氏諺曰狼子野心是乃狼也其可畜乎又襄三曰􅀳人聞}
  - {type: variant, offset: 14, length: 1, content: 股, WYG: 傳宣四年初楚司馬子良生越椒子文曰必殺之是子也熊虎之狀而豺狼之聲弗殺必滅若敖氏諺曰狼子野心是乃狼也其可畜乎又襄三年晉人聞}
  - {type: variant, offset: 14, length: 1, content: 股, krp: 傳宣上曰𥘉楚司馬子良生越椒子文曰必殺之是子也熊虎之狀而犲狼之聲弗殺必滅若敖氏諺曰狼子野心是乃狼也其可畜乎又襄三曰晉人聞}
  - {type: variant, offset: 16, length: 4, content: 七十二黑, SBCK: 楚師師曠曰不害吾驟歌北風又歌南風南風不競􅁔詠八風南風音微故曰不兢唯歌南北風者聴晉楚也多死聲楚必無功後楚師敗又昭上曰伯石始生}
  - {type: page-break, offset: 16, content: '', id: KR3k0012_SBCK_388-1b}
  - {type: variant, offset: 16, length: 4, content: 七十二黑, WYG: 楚師師曠曰不害吾驟歌北風又歌南風南風不兢歌詠八風南風音㣲故曰不兢惟歌南北風者聽晉楚也多死聲楚必無功後楚師敗又昭四曰伯石始生}
