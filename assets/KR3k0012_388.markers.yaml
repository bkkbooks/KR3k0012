  - {type: variant, offset: 419, length: 1, content: 華, SBCK: 王褒少立操尚非禮不動音聲清髙辤氣雅正漢晉春秋曰王敦爲楊州刺史潘滔曰處冲蜂目巳露但犲聲未發今樹之江外是見賊也梁書曰吕僧珎字元瑜東平范人也始童児時從師學有相工歴觀諸生指僧珎謂􅀶士曰此人有竒聲封侯相也梁大清實録曰中宗諱繹字丗諴髙祖第七子也旣長而壯聦明􅀶渉殆謂生知聲􅀂撞鍾辯如河㵼越絶書曰越栖㑹稽行成於呉引兵而去勾踐將降呉呉王許之子胥大怒聲􅀂哮虎曰此越未戰而服天以賜吳其可逆天乎臣唯君王急制之呉王不聽莊子曰曽子居衛緼􅂁無}
