  - {type: variant, offset: 22, length: 2, content: 賈誼, krp: 秦始皇丗家曰大梁人尉繚曰秦王爲人隆準長目鳥喙鷹呼犲聲少恩而虎狼心戰國䇿曰楚襄王爲太子之時爲質於齊懷王薨太子辤於齊王齊王曰與我地五百里則歸子太子曰臣今有傳請問傳}
