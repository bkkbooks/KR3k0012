  - {type: variant, offset: 580, length: 6, content: 桓玄嘗詣會稽, SBCK: 劉毅至黒時人謂之鐵色又曰􅀄太宗諸子繼夭乃令扈謙卜云後房有一女當誕二男帝乃召相者示諸寵妾皆曰非其人又示諸婦時織坊中有一人形長色黒宫人謂之崑崙至相者驚曰此其人也帝以大計幸之生烈宗也前􅁗録曰符堅舉國伐晉登城而望晉軍見部仵齊整八公山上草木皆􅀋人形憮然有懼色後趙録曰延熙元年石虎遣丞相郭殷持節入廢弘爲海陽}
  - {type: page-break, offset: 580, content: '', id: KR3k0012_SBCK_388-6b}
  - {type: variant, offset: 580, length: 6, content: 桓玄嘗詣會稽, WYG: 劉毅至黒時人謂之鐵色又曰初太宗諸繼子天乃令扈謙卜云後房有一女當誕二男其一終大盛帝乃召相者示諸寵妾皆曰非其人又示諸婦時織坊中有一人形長色黒宫人謂之崑崙相者驚曰此其人也帝以大計幸之生烈宗前秦録曰苻堅舉國伐晉登城而望晉軍見部伍齊整八公山上草木皆類人形憮然有懼色後趙録曰延熈元年石虎遣丞相郭殷持節入廢宏為海陽}
  - {type: page-break, offset: 580, content: '', id: KR3k0012_WYG_388-10b, image: WYG0896/WYG0896-0445b.png}
  - {type: variant, offset: 580, length: 6, content: 桓玄嘗詣會稽, krp: 劉毅至黒時人謂之鐵色又曰𥘉太宗諸子繼夭乃令扈謙卜云後房有一女當誕二男帝乃召相者示諸寵妾皆曰非其人又示諸婦時織坊中有一人形長色黒宫人謂之崑崙至相者驚曰此其人也帝以大計幸之生烈宗也前秦録曰符堅舉國伐晉登城而望晉軍見部仵齊整八公山上草木皆類人形憮然有懼色後趙録曰延熙元年石虎遣丞相郭殷持節入廢弘爲海陽}
  - {type: variant, offset: 587, length: 27, content: 道子道子已醉對玄張眼屬四坐云桓溫作賊玄見此辭勢難測伏席, SBCK: 弘安歩就車容色自􅀂百官莫不}
  - {type: variant, offset: 587, length: 1, content: 道, WYG: 宏安歩就車容色自若百官莫不流涕春秋後語曰魏文侯謀事而當羣臣莫之逮者朝而喜色吳起進曰昔楚莊王朝而有憂色申公巫臣問曰君有憂色何也莊王曰吾聞諸侯擇師王者擇友覇者自足而羣臣莫之若者亡今以不穀之不肖而議於朝羣臣莫能逮吾國其㡬於亡乎吾是以憂色山海經曰不死民為人黒色夀考不死郭}
  - {type: page-break, offset: 587, content: '', id: KR3k0012_WYG_388-11a, image: WYG0896/WYG0896-0445c.png}
  - {type: variant, offset: 587, length: 27, content: 道子道子已醉對玄張眼屬四坐云桓溫作賊玄見此辭勢難測伏席, krp: 弘安歩就車容色自若百官莫不}
