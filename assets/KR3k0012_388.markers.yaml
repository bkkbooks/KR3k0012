  - {type: variant, offset: 21, length: 0, content: '', SBCK: 容之母走謁諸姑曰長叔姒生男姑視之及堂聞其聲而還曰是犲狼之聲也狼子野心非是莫喪羊舌氏矣遂不視春秋演孔圖曰伊尹大而短赤色而髯好俛而下聲家語曰孔子在衛昧旦晨興顔回侍側聞哭者聲甚哀子曰回汝知此何所哭對曰非但爲生離别也子曰何以知之對曰回聞恒山之鳥生四羽翼旣成將分于四海其母悲鳴送之哀聲有似於此孔子使問哭者果曰父死家貧賣子以葬與之長訣子曰回也善於識矣史記曰􅀄楚成王將以商臣爲太子語令尹子上子上曰商臣蜂目犲聲忍人也不可立之王弗聽}
  - {type: variant, offset: 21, length: 0, content: '', WYG: 容之母走謁諸姑曰長叔姒生男姑視之及堂聞其聲而還曰是豺狼之聲也狼子野心非是莫䘮羊舌氏矣遂不視春秋演孔圖曰伊尹大而短赤色而髯好俛而下聲家語曰孔子在衛昧旦晨興顔囘侍側聞哭者聲甚哀子曰囘汝知此何所哭對曰非但為生離别也子曰何以知之對曰囘聞恒山之鳥生四子羽翼既成將分於四海其母悲鳴送之哀聲有似於此孔子使問哭者果曰父死家貧賣子以葬與之長訣子曰囘也善於識聲矣史記曰初楚成王將以商臣為太子語令尹子上子上曰商臣蜂目豺聲忍人也不可立也王勿聽}
