  - {type: variant, offset: 11, length: 2, content: 高祖, SBCK: 師曠見周太子􅀳太子曰吾聞汝知人年壽幸以告我師曠曰汝色赤白聲火聲不壽太子曰余後三年上賔於帝汝慎無言殃將及汝三年而死毛詩關雎序曰情發於中故形於聲聲成文謂之音}
  - {type: variant, offset: 11, length: 2, content: 高祖, WYG: 師曠見周太子晉太子曰吾聞汝知人年夀幸以告我師曠曰汝色青白聲大不夀太子曰余後三年上賔於帝汝慎無言殃將及汝三年而死毛詩闗雎序曰情發於中故形聲聲成文謂之音}
