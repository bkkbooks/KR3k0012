  - {type: variant, offset: 307, length: 2, content: 舊儀, WYG: 賈充等治法律楷亦㕘典其事事畢詔専讀奏平章當否楷善能諷誦音聲宣暢執刑書穆以若清詠焉異苑曰陳思王嘗登魚山臨東阿忽聞巗岫裏有誦經聲清逺嘹亮深谷流響肅然有靈氣不覺斂衿祇敬便有終焉之志即傚而則之今梵唱皆植依擬所造項氏始學篇注曰有龍淵者桓靈時善相人也於聽音聲尤妙二千石相者龍淵下床贊之令長起侍贊之自六百石以下皆坐而言之先相張濟當以財得}
  - {type: page-break, offset: 307, content: '', id: KR3k0012_WYG_388-5b, image: WYG0896/WYG0896-0442d.png}
  - {type: variant, offset: 311, length: 2, content: 領兵, WYG: 濟常依淵以觀視有相者輙往求之㑹解瀆侯往相至門當有至相憂貧乎侯去淵謂濟曰可厚事之濟遂盡居業為償債數百萬桓帝崩無嗣解瀆侯入為天子而濟遂至司空世説曰蔡司徒説在洛陽}
  - {type: punctuation, offset: 314, content: ，, id: KR3k0012_CHANT_388-bkkpn112}
