  - {type: variant, offset: 333, length: 1, content: 復, WYG: 過而致難於君孔父可謂義􅄱於色矣論語公冶長篇巧言令色足恭左丘眀恥之丘亦恥之又陽貨篇巧言令色鮮矣仁又曰子張問令尹子文三仕為令尹無喜色三已之無愠色何如子曰忠矣又鄉黨篇立不中門行不履閾過位色勃如也屏氣似不息者出降一等逞顔色怡怡如也上如揖下如授勃如戰色足蹜蹜如有循享禮有容色私覿愉愉如也又曰色思温貌思恭又曰車中不内顧不疾言不親指色斯舉矣顔色不善則去之又陽貨篇色厲而内荏譬諸小人其猶穿窬之盜也與又顔淵篇子張問士何如斯可謂之達矣子曰何哉爾所謂達者子張對曰在邦必聞在家必聞子曰是聞也非達也夫達也者質直而好義察言而觀色夫聞也者色取人而行違居之不疑又憲問篇賢者辟世世主莫得而臣其次辟地去亂國適理邦其次辟色色斯舉矣其次辟言有惡言乃去漢書曰李廣出右北平胡急擊矢下如雨漢兵死者過半㑹暮吏士無人色言懼甚也又曰李陵降邉塞以聞上欲陵戰死召陵毋及婦使相者視之無死䘮色又曰汲黯好游侠任氣節行脩潔其諫犯主之顔色常慕袁盎之為人上方招文學儒者黯曰陛下内多欲而外施仁義奈何欲効唐虞之治乎上怒變色而罷}
