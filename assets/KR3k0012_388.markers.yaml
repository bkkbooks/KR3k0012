  - {type: variant, offset: 575, length: 0, content: '', krp: 朝公卿皆爲黯懼魏氏春秋曰嵇康寓居河内與之遊者未嘗見其喜愠之色丗說同魏志曰夏侯玄格量弘濟臨斬顔色不變舉動自若}
