  - {type: variant, offset: 332, length: 0, content: '', WYG: 治本親服世以為議又曰王武子葬夕孫子荆哭之甚悲賔客莫不垂涕哭畢向靈座曰卿好我作驢鳴今為卿作驢鳴因作體似聲其賔客莫不笑孫聞笑顧謂曰諸君不死令王武子死賔客莫不皆怒又曰董仲道常在客宿與王孫隔共語同行人曰此人行必為亂後果為亂階色説文曰晳人色白也皤老人色也韓詩外𫝊曰閔子始見夫子有菜色後有芻豢之色子貢問其故閔子曰吾出蒹葭之中入夫子之門聞夫子切磋之教竊樂之出見羽盖龍旂又樂之二者相攻胷中是以有菜色今被夫子之文出見羽盖龍旂視如糞土是以有芻豢之色尚書大𫝊曰撞㽔賔在外者皆金聲在内者皆玊色禮記表記曰是故君子縗絰則有哀色端冕則有敬色甲胄則有不可辱之色又曰君子不失色於人不失口於人又曰玊藻曰立容徳色容莊又曰盛氣闐實陽休玉色言身中氣盛闐滿若陽氣之休物玊色言不變也又文王世子曰文王之為世子也朝於王季日三其有不安節則内豎以告文王文王色憂行不能正履左傳僖上曰齊桓公與蔡姬乗舟於囿蕩舟公懼變色又定上曰衛太子蒯聵謂戲陽速曰從我而朝少君少君見我我顧乃殺之速曰諾乃朝夫人夫人見太子太子三顧速不進夫人見其色啼而走曰蒯瞶將殺余見太子色變知其欲殺已又哀上曰肉食者無墨墨氣色下公羊傳桓公曰宋督殺其君與夷及其大夫孔父孔父存則殤公不可得殺於是先攻孔父殺之皆死孔父正色立於朝則人莫}
