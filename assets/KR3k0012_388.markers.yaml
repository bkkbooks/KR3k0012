  - {type: variant, offset: 300, length: 5, content: 表廉吏獻帝, WYG: 有五者繋五行也音所以有八者繫八風也新序曰原憲見子貢曳杖行歌聲若金石郭林宗别𫝊曰林宗儀貌魁岸身長八尺音聲如鍾當時以為准的裴楷别}
  - {type: page-break, offset: 300, content: '', id: KR3k0012_WYG_388-5a, image: WYG0896/WYG0896-0442c.png}
