  - {type: variant, offset: 1089, length: 519, content: 日矣不顧而唾史記曰孟嘗既廢而復用馮驩迎之未到孟嘗君太息曰文嘗好客遇客無所敢失文一日廢皆背文而莫顧文者如復見面文必唾面戰國策曰趙太后新用事秦急攻之求於齊曰必以長安君為質兵乃出大臣強諫太后謂左右曰復言長安君為質者老婦必唾其面沈約宋書曰僕射謝景仁性矜嚴整潔居宇清麗每唾左右人衣事畢即聽澣濯每欲唾左右爭來受之趙書曰石虎娉崔氏為夫人無寵所愛鄭夫人有百日女病謂崔與藥以告後石虎作威問之崔言外舍見小子以少唾其容作實非藥也後石乃射之一箭通中而死秦記曰符朗渡江嘗與朝士宴集時賢並機蓐壺席朗欲誇之唾則令小兒跪而張口就唾而含出坐者為不及之遠矣呂氏春秋曰齊莊公之時有士曰賓卑藂夢有壯士白縞之冠練布之衣素屨黑劍從而叱之唾其面惕然而寤徒夢也終坐不決明日召其友而告之曰吾少好勇無所挫辱今夜辱吾將索之得之則可不得將死每朝立于衢三日不得退而自刎又曰伍員出奔過鄭問許公許公東向唾員知所歸矣乃奔吳莊子曰蚿謂虵日子見夫唾者乎噴則大者如珠小者如霧雜而下者不可勝數也風俗通曰彭祖壽年八百歲猶恨唾遠周生列子曰人君其尊重矣音聲振於金玉咳唾甘於醴泉九州春秋曰公孫瓚曰始天下兵起吾謂其唾掌可決樊英別傳曰樊英既見陳畢西南向唾天子問其故對曰成都今日失火後蜀郡太守上火災言時雲雨從東北來故火不為害, SBCK: 愧色耳}
