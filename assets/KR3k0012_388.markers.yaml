  - {type: variant, offset: 1697, length: 0, content: '', SBCK: 老子爲人黄色羙眉孫卿子曰臯陶之色如削􅀲燕丹子曰荆軻入􅁗􅁗王陛㦸而見燕使鍾鼓並發群臣皆呼萬􅀊􅁗武陽大怒靣如死􅁅色郭子曰盧志於衆中問陸士衡陸抗是卿何物荅曰如卿於盧􅗱士龍失色旣出户謂兄曰何至於此彼或}
  - {type: variant, offset: 1697, length: 0, content: '', WYG: 老子為人黄色美眉孫卿子曰臯陶之色如削𤓰燕丹子曰荆軻入秦秦王陛㦸而見燕使鍾皷並發羣臣皆呼萬嵗秦武陽大怒面如死灰色郭子曰盧志於衆中問陸士衡陸抗是卿何物荅曰如卿於盧毓士龍失色既出户謂兄曰何至於此彼或}
  - {type: variant, offset: 1697, length: 0, content: '', krp: 老子爲人黄色羙眉孫卿子曰臯陶之色如削瓜燕丹子曰荆軻入秦秦王陛㦸而見燕使鍾鼓並發群臣皆呼萬歲秦武陽大怒靣如死灰色郭子曰盧志於衆中問陸士衡陸抗是卿何物荅曰如卿於盧毓士龍失色旣出户謂兄曰何至於此彼或}
