  - {type: variant, offset: 288, length: 11, content: 熱汗出其賜堪家雜繒百疋, WYG: 變容吞炭變聲必執襄子一夕而五易處風俗通曰聲所}
  - {type: punctuation, offset: 291, content: ，, id: KR3k0012_CHANT_388-bkkpn103}
