  - {type: variant, offset: 434, length: 2, content: 出表, SBCK: 於王季日三其有不安節則内竪以告文王文王色憂行不能正履也左傳僖上曰齊桓公與蔡􅁎乗舟於囿蕩舟公懼變色又定上曰衛太子蒯聵謂戲陽速曰從我而朝少君少君見我我頋乃殺之速曰諾乃朝夫人夫人見太子太子三頋速不進夫人見其色啼而走曰蒯聵將殺余見太子色變知其欲殺巳又哀上曰肉食者無墨墨氣色下公羊傳桓公曰宋督殺其君與夷及其大夫孔父孔父存則殤公不可得殺於是先攻孔父殺之皆死孔父正色立于朝則人莫敢過而致難于其君孔父可謂義形于色矣論語公冶長曰巧言令色足恭左丘明耻之丘亦耻之又陽貨曰巧言令色鮮矣仁又曰子張}
