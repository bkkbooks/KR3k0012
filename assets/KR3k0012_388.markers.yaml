  - {type: variant, offset: 144, length: 119, content: 千石昌乃出足示之因相持泣還為夫妻楚國先賢傳曰來陽顧紹字伯蕃年十八為郡門下幹迎太守許荊視荊蹠下而笑荊怒問之紹曰見明府蹠下有黑子紹足亦有之欣而故笑汗說文曰汗身液也釋名曰汗𣵡也出其衣𣵡𣵡然易渙卦曰渙汗其大號史記曰穌秦說齊王曰臨淄舉袂成帷揮汗成雨, SBCK: 寸音聲如鍾}
