  - {type: variant, offset: 2226, length: 5, content: 來歙蓋延攻, SBCK: 西羗祖爰劒爲􅁗所奴􅀠而亡藏巖穴中見焚有影象如虎爲蔽火得不死諸羗以爲神推以爲豪魏略曰何晏性自喜行歩頋影山海經曰壽麻之國正立無影疾呼無響郭璞注曰言其形氣有異於人又曰長流山神白帝少昊居之主司反影日西入則反影東照言司察之也孫卿子曰夏首之南有人曰㳙蜀梁其人愚宵行俯見其影以爲伏􅀑仰見其髪以爲立魅倍道而走比至其家失氣而卒莊子曰有畏影惡跡而去之走者足舉逾數而跡愈多走逾疾而影不離自以爲尚遟疾走不休絶力而死不知處隂以休影處静以息跡愚亦甚矣又曰㒺兩問影曰曩子行今子止曩子坐今子起何其無特操與影曰吾有待而然者耶罔兩影外之微隂也太􅀇經曰老子行則滅跡立則隱影風俗通曰陳留有富室}
  - {type: page-break, offset: 2226, content: '', id: KR3k0012_SBCK_388-8a}
  - {type: variant, offset: 2226, length: 5, content: 來歙蓋延攻, WYG: 西𦍑祖爰劍為秦所奴𨽻而亡藏巖穴中見焚有影象如虎為蔽火得不死諸𦍑以為神推以為豪魏畧曰何晏性自喜行歩顧影山海經曰夀麻之國正立無影疾呼無響郭璞注曰言其形氣有異於人又曰長流山神白帝少昊居之主司反影日西入則反影東照言司察之也孫卿子曰夏首之南有人曰涓蜀梁其人愚宵行俯見其影以為伏鬼仰見其髪以為立魅倍道而走比至其家失氣而卒莊子曰有畏影惡跡而去之走者足舉逾數而跡踰多走逾疾而影不離自以為尚遲疾走不休絶力而死不知處隂以休影處静以息跡愚亦甚矣又曰㒺兩問影曰曩子行今子止曩子坐今子起何其無特操與影曰吾有待而然者耶㒺兩影外之㣲隂也太𤣥經曰老子行則滅跡立則隠影風俗通曰陳留有富室}
