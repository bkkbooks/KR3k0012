  - {type: variant, offset: 2086, length: 135, content: 也小子行之又曰將軍文子之喪既除喪而後越人來吊主人深衣練冠待于廟垂涕淚又內則曰父母唾洟不見輒刷去之左傳襄四曰孟孫卒臧孫入哭甚哀多涕出其御曰孟孫之惡子也而哀如是季孫若死其若之何公羊傳哀公曰西狩獲麟孔子曰孰為來哉孰為來哉反袂拭面涕沾袍何休注曰袂衣襟史記曰蘇秦說鬼谷先生淚下沾襟, SBCK: 逆凶唯影響}
