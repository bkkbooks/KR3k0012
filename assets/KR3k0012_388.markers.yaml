  - {type: variant, offset: 589, length: 175, content: 道子已醉對玄張眼屬四坐云桓溫作賊玄見此辭勢難測伏席流汗長史謝重歛板正色曰故大司馬公廢昏立明功全社稷風塵之論宜絕聖聽唐書曰張又新等搆李紳貶端州司馬朝臣表賀又至中書賀宰相及門門者止之曰請少留緣張補闕在齋內與相公談俄而又新揮汗而出旅揖群臣曰端溪之事又新不敢多讓人皆辟易憚之淮南子曰今夫傜者揭钁鍤負籠土傜役也籠受土籠也鹽汗交流喘息薄喉白汗鹹如鹽故曰鹽風俗通曰, WYG: 别}
