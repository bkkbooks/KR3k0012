  - {type: variant, offset: 430, length: 0, content: '', SBCK: 賛之自六百石以下皆坐而言之先相張濟當以財得三公濟常依淵以觀視有相者輒徃求之㑹解瀆侯徃相至門問當有至相何憂貧乎侯去淵謂濟曰可厚事之濟遂徃盡爲償債别數百萬脩居業桓帝崩無嗣解瀆侯入爲天子而濟遂至司空丗說曰蔡司徒說在洛陽見陸機兄弟住叅佐廨}
  - {type: variant, offset: 430, length: 0, content: '', krp: 賛之自六百石以下皆坐而言之先相張濟當以財得三公濟常依淵以觀視有相者輒徃求之㑹解瀆侯徃相至門問當有至相何憂貧乎侯去淵謂濟曰可厚事之濟遂徃盡爲償債别數百萬脩居業桓帝崩無嗣解瀆侯入爲天子而濟遂至司空丗說曰蔡司徒說在洛陽見陸機兄弟住叅佐廨}
  - {type: variant, offset: 431, length: 2, content: 石苞, SBCK: 三間瓦屋士龍住東頭士衡住西頭龍爲人文弱可愛士衡長七尺餘聲作鍾聲言多慷􅁣又曰杜預爲荆州刺史鎭襄陽時有讌集大醉輒閑齋獨眠不聽人前後常醉聞齋中嘔吐其聲甚苦莫不側足悚懆有一小吏便開户看之正見床上有大虵垂頭床邊吐都不見人語林曰胡廣夲姓黄五月生父母置甕中投之于江流下聞有小児啼聲徃取因以爲子遂登三司廣後不治本親服丗以爲譏又曰王武子葬夕孫子荆哭之甚悲賔客莫不垂涕􅂘畢向靈坐曰卿好我作驢鳴今爲卿作驢鳴因作驢鳴似真聲賔客莫不􅀏孫聞哭頋謂曰諸君不死令王武子死賔客莫不皆怒又曰董仲道常在客􅀫與王孫隔共語同行人曰此人行必爲亂後果爲亂階色說文曰晢人色白也皤老人色也韓詩外􅀓曰閔子始見夫子有菜色後有蒭豢之色子賈問其故閔子曰吾出蒹葭之中入夫子之門聞夫子切磋之敎􅀼樂之出見羽盍龍旂又樂之二者相攻􅇩中是以有菜色今􅀍夫子之文出見羽盖龍旂視如糞土是以有蒭豢之色尚書大傳曰撞鍾蕤賔在外者皆金聲在内者皆玉色禮記表記曰是故君子縗絰則有哀色端冕則有敬色甲胄則有不可辱之色又曰君子不失色於人不失口於人又曰玉藻曰立容德色容莊又曰盛氣闐實陽休玉色言身中氣盛闐滿􅀂陽氣之休物玉色言不變也又文王丗子曰文王之爲丗子也}
