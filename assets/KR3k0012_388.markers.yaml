  - {type: variant, offset: 1731, length: 245, content: 舡適至岸下仍唾盤上徑上岸直入去舡主取向食器視之見盤上唾悉是黃金列異傳曰南陽宗定伯年少時夜行逢鬼問鬼所忌鬼荅云唯不喜人唾伯便擔鬼著頭上急持行之徑至市中下著地化為一羊賣之恐其變化唾之得錢五千幽明錄曰漢武帝在甘泉宮有玉女降嘗與武帝圍碁相娛女風姿端正帝密悅乃欲逼之玉女唾帝面而去遂病瘡經年故漢書云避暑甘泉宮此其時也趙壹嫉邪賦曰勢家多所宜欬唾自成珠披褐懷金玉蘭蕙化為芻洟淚說文曰洟鼻液也周易離卦曰六五出涕沱若戚嗟若吉毛詩邶柏舟曰之子于歸遠送于野瞻望弗及泣涕如雨又谷風大東曰眷言顧之潛焉出涕禮記檀弓上曰, SBCK: 同昇}
