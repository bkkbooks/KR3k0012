  - {type: variant, offset: 272, length: 4, content: 平陽丞李, SBCK: 何熈字孟孫少有大志身長八尺五寸體皃魁梧}
  - {type: variant, offset: 272, length: 0, content: '', WYG: 何熈字孟孫少有大志身長八尺五寸體貌魁梧善儀容舉孝㢘為謁者質拜殿中音動左右江表𫝊曰闗雲長襲魯肅甘寧與雲長㑹益陽瀬淺將渡寧有所約令雲長聞之曰此甘寧聲也遂不復渡王隠晉書曰王褒少立操尚非理不動音聲清髙辭氣雅正漢晋春秋曰王敦為揚州刺史潘滔曰處仲蜂目已露但豺聲未發今樹之江外是見賊也梁書曰吕僧珎字元瑜東}
  - {type: page-break, offset: 272, content: '', id: KR3k0012_WYG_388-4a, image: WYG0896/WYG0896-0442a.png}
  - {type: variant, offset: 272, length: 4, content: 平陽丞李, krp: 何熈字孟孫少有大志身長八尺五寸體皃魁梧}
  - {type: variant, offset: 273, length: 7, content: 陽丞李善稱故令, WYG: ''}
  - {type: variant, offset: 277, length: 24, content: 稱故令范遷於張堪令人面熱汗出其賜堪家雜繒百疋以表, SBCK: 儀容舉孝}
  - {type: variant, offset: 277, length: 24, content: 稱故令范遷於張堪令人面熱汗出其賜堪家雜繒百疋以表, krp: 儀容舉孝}
  - {type: variant, offset: 281, length: 1, content: 遷, WYG: 人也始童兒時從師學有相工歴觀諸生指僧珎謂博士曰此人有竒聲封侯相也梁太清實録曰中宗諱繹字世誠髙祖第七子也既長有壯畧竒悟聰敏博渉殆謂生知聲若撞鍾辯如河㵼越絶書曰越栖㑹稽行成}
  - {type: variant, offset: 283, length: 4, content: 張堪令人, WYG: 吳引兵而去勾踐將降吳呉王許之子胥大怒聲若哮虎曰此越未戰而服天以賜吳其可逆天乎臣唯君王急制之吳王不聽莊子曰曽子居衛緼袍無表三日不舉火十年不制衣正冠而纓絶捉衿而肘見納履而踵决曳屣而歌商頌聲若出金石賈誼書曰豫讓釁}
  - {type: page-break, offset: 283, content: '', id: KR3k0012_WYG_388-4b, image: WYG0896/WYG0896-0442b.png}
