  - {type: variant, offset: 735, length: 459, content: 令樂廣京州人也共談累日深歎其才謂京曰君天才過人恨不學耳若學必為一代談宗京感其言遂勤學不倦又曰王澄傳云王衍有重名於世時人許以人倫之鑒尤重澄及王敦庾敳常為天下士目曰阿平第一子嵩第二處仲第三澄嘗謂衍曰兄形似道人而神峰太俊衍曰誠不如卿落落穆穆然澄由是顯名又曰戴若思往武陵省父時同郡人潘京素有理鑒名知人其父遣若思就京與語既而稱若思有公輔之林又曰周顗傳云同郡賈嵩有清操見顗歎曰汝頴固多奇士自頃雅道陵遟今復見周伯仁將振起舊風清我邦族矣又曰劉隗伯父訥字令言有人倫鑒識初入洛見諸名士而歎曰王夷甫大鮮明樂彥輔我所敬張茂先我所不解周弘武巧於用短杜方叔拙於用長又曰周浚有人倫鑒識其鄉人史曜素微賤眾所未知浚獨引之為友遂以妹妻之曜竟有名於世又曰阮脩傳云王衍當時談宗自以論易略盡然有所未了研之終莫悟每云不知此後當見能通之者不衍族子敦謂衍曰阮宣子可與言衍曰吾亦聞之但未知其亹亹之處定何如耳及與循談言寡而旨暢衍乃歎服焉又曰桓彝字茂倫庾亮每屬彝覔一佳吏部及至都謂亮曰為卿得一吏部矣亮問安在彝曰人所應有而不必有人所應無而不必無徐寧真海岱清士因為敘之即遷吏部, SBCK: 劇曹}
