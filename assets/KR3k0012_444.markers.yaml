  - {type: variant, offset: 199, length: 0, content: '', WYG: 公叔之病甚矣将奈社稷何對曰臣之中庶子鞅也願王以國聽之若不能聽勿出境王不應出而謂左右曰豈不悲哉以叔之賢而今謂寡人以國聴鞅也公叔死公叔鞅西遊秦秦孝公聽之秦果強魏果弱竹林七賢論曰山濤與阮籍􅄞康皆一面而契若金蘭濤妻韓氏嘗以問濤濤曰當年可為友者唯此二人耳妻曰負羇之妻亦觀狐趙意欲一窺之可乎濤曰可也二人至妻勸濤留之宿具酒食夜穿牖而窺之濤入曰所見何如吾妻曰}
