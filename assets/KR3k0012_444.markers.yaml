  - {type: variant, offset: 1195, length: 376, content: 又曰謝玄時符堅強盛邊境數被侵冠朝廷求文武良將可以鎮禦北方安乃以玄應舉中書郎郗超素與玄不善聞而歎曰安違眾舉親然玄亦必不負舉時咸以為不然超曰吾嘗與玄共在桓公府見其使才雖履屐間亦得其任所以知之晉中興書曰何充字次道年在童齔伯父邃謂之曰我為兒時亡伯車騎謂我汝後當與伯父爭名汝今器宇宏深亦當名出我右由是少有名望又曰吳隱之字處默少有孝行遭母憂哀毀過禮時與太常韓康伯鄰居伯母語伯曰汝後若居銓衡之職當用如此輩人及伯為吏部尚書因進用之遂歷清顯又曰范汪字玄平少失父年六歲過江依外家虔氏荊州刺史王澄見而奇之以為興范族者必是人也又曰魏徐州刺史呂虔有佩刀工相之以為必三公可服此刀虔謂別駕王祥曰茍非其人刀或為害卿有公輔之量故以相與祥始辭之固強乃受祥死之日以刀授弟覽曰吾兒凡汝後必興足稱此故以相與又曰王珣字元琳弱冠與謝玄俱辟大司馬桓溫掾溫語人曰謝掾年三十必擁旄仗節王掾當作黑頭公皆不易, SBCK: ''}
