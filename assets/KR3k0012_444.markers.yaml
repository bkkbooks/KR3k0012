  - {type: variant, offset: 2247, length: 197, content: 世碩儒琛幼瑒授其經業一聞便通義理瑒異之常曰此兒當以明經致貴又曰臧盾幼從徵士瑯琊諸葛璩受五經通章句璩學徒常有數十百人盾處其間無所狎比璩異之歎曰此生重器王佐才也又曰賀瑒時沛國劉瓛為會稽府丞見瑒深器異之嘗與俱造吳郡張融指瑒謂融曰此生神明聰敏將來當為儒者宗又曰丘仲孚字公信吳興烏程人也少好學從祖靈鞠有人倫之鑒常稱為千里駒也陳書曰杜之偉強識俊才頗有名當世吏部尚書張瓚深知之以為廊廟器也又曰陸慶永陽王為吳郡, WYG: 荆州}
