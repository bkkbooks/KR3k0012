  - {type: variant, offset: 17, length: 7, content: 弘雅有遠識博學, SBCK: 知人乃褁粮􅀉載入洛從之未至裴家少許見一人着黄皮袴褶乗馬將獵夏問逸民家逺迩荅曰君何以問夏曰聞其名知人故從會}
  - {type: variant, offset: 17, length: 7, content: 弘雅有遠識博學, krp: 知人乃褁粮寄載入洛從之未至裴家少許見一人着黄皮袴褶乗馬將獵夏問逸民家逺迩荅曰君何以問夏曰聞其名知人故從會}
  - {type: variant, offset: 20, length: 7, content: 遠識博學稽古少, WYG: 人倫之鑒自掌選及為大總管凡遇賢俊無不甄採每制敵摧兇必先期揵日時有後進楊炯王勃盧照隣駱賔王並以文章見稱吏部侍郎李敬元盛為言譽以示行儉行儉曰才名有之爵禄盖寡楊應至令長餘並鮮能令終是時蘇味道王勮未}
