  - {type: variant, offset: 29, length: 0, content: '', SBCK: 又曰魏武將見匈奴使自以形陋不足雄逺國使崔季珪代乃自捉刀立牀頭坐旣畢使僕問曰魏王何如使荅曰魏王信自雅望非常然牀頭捉刀人此乃英雄魏王聞之馳遣殺此使丗􅀃曰王濬冲裴叔則二人於緫角時詣鍾士季湏􅁷去後客問向二童子是誰曰裴王客曰何如鍾曰裴楷清通王戎簡要湏三十年此二賢當爲吏部尚書兾尓時天下無復滯才崔鴻前燕録曰慕容廆㓜而魁岸羙姿貌身長八尺雄桀有大度晉安北張華一見竒之謂廆曰君長必爲命丗之器定難濟時者也遺廆冠簪以結慇懃崔鴻前􅁗録曰姜宇字子居天水兾人也少􅀌貧爲河北陳不識家牧羊年十五身長七尺九寸聦惠羙風儀毎夜專讀書睡則縣頭于屋梁逵旦而止不識竒之將妻以女其妻弗聽不識乃置酒引宇令女潛觀之問女曰姜宇人士才明吾欲以汝妻之汝母難曰宇家之牧人汝意云何女曰觀宇之姿才豈復爲人牧羊也遂妻之宇後歷位京兆尹}
