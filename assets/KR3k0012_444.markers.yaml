  - {type: variant, offset: 2957, length: 399, content: 二所舉杜如晦房玄齡等後皆自致公輔論者稱構有知人之鑒又曰虞世基字茂世會稽餘姚人也父荔陳太子中庶子世基幼沈靜喜慍不形於色博學有高才兼善草隸陳中書令孔奐見而歎曰南金之貴屬在斯人少傅徐陵聞其名召之世基不往後因公會一見而奇之顧謂朝士曰當今潘陸也因以弟女妻焉隋書曰李德林任城王諧為定州刺史重其才召入州館朝夕同遊殆均師友不為君民禮數嘗語德林云竊聞蔽賢蒙顯戮久令君沉滯吾獨得潤身朝廷縱不見尤亦懼明靈所譴於是舉秀才入鄴李德林幼聰敏年數歲誦左思蜀都賦十餘日便度高隆之見而嗟歎遍告朝士云若假其年必為天下偉器鄴京人士多就宅觀之月餘日中車馬不絕年十五誦五經及古今文集日數千言俄而該博墳典陰陽緯候無不通涉善屬文辭覈而理暢魏收嘗對高隆之謂其父曰賢子文筆終當繼溫子昇隆之大笑曰魏常侍殊己嫉賢何不近比老彭乃遠求溫子又曰李士謙字子約趙郡平棘人也髫齔喪父事母以孝聞母曾嘔吐疑為中毒因跪而嘗之伯父魏歧州刺史瑒琛所嗟尚每稱曰此兒吾家之顏子也, SBCK: 四}
