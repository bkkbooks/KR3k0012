  - {type: variant, offset: 49, length: 0, content: '', SBCK: 頋榮曰此吾家􅂹興衰宗必此子也頋珠亦有令問榮謂珠曰卿速歩君孝超卿矣孟嘉别傳曰􅁃亮抜孟嘉爲勸學從事禇褒爲豫章太守出朝亮正旦大㑹州府人士率嘉集坐第甚逺問亮曰江州有孟嘉其人何在亮曰在坐卿但自覔襃歷觀}
  - {type: page-break, offset: 49, content: '', id: KR3k0012_SBCK_444-6b}
