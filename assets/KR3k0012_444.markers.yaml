  - {type: variant, offset: 189, length: 0, content: '', WYG: 外桓公郊迎客夜爝火甚盛從者甚衆戚飯牛車下望見桓公而悲擊角而習商歌桓公聞之撫其僕之手曰異哉歌者非常人也命後車載之賜衣冠説苑曰楚令尹虞丘子復相荘王曰臣聞奉公行法可以得榮能淺行薄無望上位臣為令尹十年矣國政不治獄訟不息臣竊選國俊士孫叔敖秀才多能其性無欲君舉而授之政則國可使寜而士民可使附荘王從之賜虞丘子采田三頃號曰國老以孫叔敖為令尹虞丘子家干法叔敖執而戮之虞丘子喜曰叔敖果可使持政矣傅子曰昭烈襲蜀丞相椽趙㡬曰𤣥徳其不濟乎拙於用兵每戰每敗奔亡不暇何以圖人徴士傅朝曰𤣥德寛仁有度能得人死力諸葛亮逹治知變正而有謀而為之相翼德雲長勇而有義皆萬人之敵而為之将此三人者皆人傑也以𤣥德之畧三傑佐之何為而不濟也郭子曰兾州刺史楊淮字彦清二子喬髦有識俱總角為成噐淮與裴頠樂廣友善遣見之頠謂淮曰喬當及卿髦小减也廣謂淮曰喬自及卿髦尤精出淮笑曰我二兒之優劣乃裴樂之優劣議者許之又曰王仲}
