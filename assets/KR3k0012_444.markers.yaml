  - {type: variant, offset: 1573, length: 1329, content: 又曰薛兼與同郡紀瞻廣陵閔鴻吳郡顧榮會稽賀循同志友善號曰五俊初入洛司空張華見而歎曰皆南金也又曰陸曄童齔中從兄機稱之為陸氏之寶我家不世之公也又曰褚季野翼從弟弱冠譙國橋彝見而異之曰褚季野有皮裹陽秋又曰王敦為太子舍人滎陽潘滔時為洗馬見而目之曰處仲蜂目已露但豺聲未振若不噬人亦當為人所噬沈約宋書曰桓玄聞一軍起便憂悴無復計或曰劉裕等眾力微弱豈便有成陛下何慮之甚玄曰劉裕是為一世之雄劉毅家無擔石之讎樗蒱一擲百萬何無忌劉牢之甥酷似其舅共舉大事何慮無成也宋書曰謝弘微童幼時精神端審時然後言叔父混嘗異之曰此兒深衷夙敏方成佳器有子如此足矣又曰謝弘微叔父混尚晉陵公主高祖受命晉陵公主降東鄉君以混得罪前代東鄉君節義可嘉聽還謝氏自混亡至是數載而室宇脩整倉廩充盈門徒業使不異平日曰疇墾闢有如於舊東鄉君歎曰僕射平生重此子可謂知人僕射為不亡矣又曰袁淑字陽源陳郡陽夏人丹陽尹豹少子也少有風格年數歲伯湛謂家人此非凡兒齊書曰隋郡王子隆能屬文明帝謂王儉曰我家東阿也儉曰東阿重出實為皇家藩屏又曰徐孝嗣姑適東莞劉舍舍兄藏為尚書左丞孝嗣往詣之藏退語舍曰徐郎是令僕人三十餘可知矣汝宜善自結又曰江學為丹陽丞時袁粲為尹見學歎曰風流不墜正在江郎數與宴賞流連日夜蕭子顯齊書曰禇淵字彥回河南陽翟人也父卒悉推財與弟唯取書數千卷初與從弟炤同載道遇太祖淵舉手指太祖車謂炤曰此非常人將來不可測梁書曰沈瑀起家州從事奉朝請嘗詣齊尚書右丞殷濔濔與語及政事甚器之謂曰觀卿才幹當居吾此職又曰范述曾字子玄吳郡錢塘人也幼學從餘杭呂道惠受五經略通章句道惠學徒常有百數獨稱述曾曰此子必為王者師又曰賀琛字國寶會稽山陰人也伯父瑒步兵校尉為世碩儒琛幼瑒授其經業一聞便通義理瑒異之常曰此兒當以明經致貴又曰臧盾幼從徵士瑯琊諸葛璩受五經通章句璩學徒常有數十百人盾處其間無所狎比璩異之歎曰此生重器王佐才也又曰賀瑒時沛國劉瓛為會稽府丞見瑒深器異之嘗與俱造吳郡張融指瑒謂融曰此生神明聰敏將來當為儒者宗又曰丘仲孚字公信吳興烏程人也少好學從祖靈鞠有人倫之鑒常稱為千里駒也陳書曰杜之偉強識俊才頗有名當世吏部尚書張瓚深知之以為廊廟器也又曰陸慶永陽王為吳郡太守聞其欲與相見慶固辭以疾時宗人陸榮為郡五官慶嘗詣焉王乃微服往榮舍穿壁以觀之王謂榮曰觀陸慶風神凝峻殆不可測嚴君平鄭子真何以尚茲北史曰于謹南伐江陵以唐瑾為元帥府長史及軍還諸將多因虜掠大獲財物瑾一無所取唯得書兩車載之以歸或言於周文曰唐瑾大有輜重悉是梁朝珍玩周文初不之信然欲明其實密遣使檢閱唯見墳籍而已乃歎曰孤知此人來二十許年耳其不以利污義向若不令撿視恐常人有投杼之疑孤所以益明之耳凡受人委任當如此也隋書曰魏任城王諧薦李德林因遺尚書令楊遵彥書云燕趙固多奇士此言誠不為謬今歲所貢秀才李德林者文章學識固不待言觀其風神器宇終為棟梁之用至如經國大體是賈生晁錯之儔彫蟲小伎殆相如子雲之輩今雖唐虞君世俊乂盈朝然脩大廈豈厭夫良材之積也吾嘗見孔文舉薦禰衡表云洪水橫流帝思俾乂以正平比夫大禹常謂擬諭非倫今以德林言之便覺前言非大又曰楊素少落拓有大志不拘小節世人多未之知唯從叔祖魏尚書僕射寬深異之每謂子孫曰處道當逸群絕倫非常之器非汝曹所逮也又曰柳莊少有遠量博覽墳籍兼善辭令濟陽蔡大寶有重名於江左時為岳陽王蕭詧諮議見莊便歎曰襄陽水鏡在於茲矣大寶遂, SBCK: 勸習筮仕}
