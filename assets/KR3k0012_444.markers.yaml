  - {type: variant, offset: 12, length: 0, content: '', SBCK: 王珪㓜􅀌性雅澹少􅄝慾志量沉􅀷能安於貧賤體道履正交不茍人叔父頗當時通儒有人倫之鍳嘗謂所親曰門户所􅀉唯在此兒耳又曰裴行儉有人倫之鑒自掌選及爲大惣管凡遇賢俊無不甄採毎制敵摧兇必先期捷日時有後進楊烱王勃盧昭隣駱賔王並以文章見稱吏部侍郎李敬􅀇盛爲延譽引以示行儉行儉曰才名有之爵禄蓋寡楊應至令長餘並鮮能令終是時􅂫味道王勮未知名因調選行儉一見􅀷禮異之仍謂曰有晚年子息恨不見其成長二公十數年當居衡石願記識此軰其後相繼爲吏部皆如其言行儉嘗所引偏禆有程務挺張䖍朂崔智􅈯王方翼党金毗劉敬同郭待封李多祚黒齒之盡爲名將位至刺史將軍者數十人其所知賞多此􅀋也又曰狄仁傑授汴州判佐時工部尚書閻立夲爲河南道黜陟使仁傑爲吏人誣告立本見而謝曰仲尼云觀過知仁矣足下可謂海曲之明珠東南之遺寳薦授并州都督府法曹又曰張守珪儀形瓌壯善􅀐射性慷􅁣有節義時盧齊卿爲􅃎州刺史􅀷禮遇之常共榻而坐謂曰足下數年外必節度􅃎凉爲國之良將方以子孫相託豈得以寮屬常禮相期耶又曰李勉以故吏前密縣尉王晬子對切勤幹俾攝南鄭令俄有詔處死勉問其故乃爲權倖所誣勉詢將吏曰上方藉牧宰爲人父母豈以􅉲言而殺不􅇳乎即亭詔拘晬飛表上聞晬遂獲宥而勉竟爲執政所非追入爲大理少卿謁見靣陳王晬無罪政事修舉盡力吏也肅宗嘉其守正即日除太常少卿王晬後以推擇拜大理評事龍門令終有能名時稱知人又曰李晟德宗之幸山南旣入駱谷謂渾瑊曰渭橋在賊腹内兵勢懸隔李晟可辦事乎瑊對曰李晟秉義執志臨事不可奪以臣計之破賊必矣帝意始安又曰楊嗣復字繼之僕射於陵之子也􅀄於陵十九登進士第二十再登􅀶學宏詞科調􅀘潤州句容尉浙西觀察使韓滉有知人之鍳見之甚恱滉有愛女方擇佳婿謂其妻柳氏曰吾閱人多矣無如楊生貴而壽生子必爲宰相於陵秩滿寓居楊子而生嗣復後滉見之撫其首曰名位果踰於父楊門之慶也因字曰慶門竟如其言又曰于邵傳云樊澤嘗舉賢良方正邵一見之於京師謂樊將相之材也不五年擇爲節將又曰李德􅁉與牛僧孺有􅂩或以韋温厚於牛僧孺言於德􅁉􅁉曰此人堅正中立君子也又曰劉三復長慶中李德􅁉拜浙西觀察使三復以德􅁉禁密文臣以所業文詣郡干謁德􅁉閱其文倒屣迎之乃辟爲從事後魏書曰崔亮傳云崔亮字敬儒清河東武城人也時隴西李冲當朝任事亮從兄言之於冲冲與亮語因謂亮曰比見卿先人相命語使人􅅐中無復􅇶迫之念竒之延爲館客冲謂兄子竒曰大崔寛和篤雅汝冝友之小崔生峭整清徹汝冝敬之二人終將大至孔叢子曰魏安􅁵王問子順馬回之爲人雖少文然梗直有丈夫之節吾欲以爲相可乎荅曰知臣莫􅀂君何有不可至於亮直之節臣未之明也曰何故荅曰臣聞諸孫卿其爲人長目而永視者必體方而心圎毎以其法相人千百不失臣見回非不偉其體幹然甚疑其目王卒用之三月王果以謟得罪淮南子曰寗戚欲干齊桓公困窮無以自逹於是爲啇旅將牛車暮􅀫於郭門之外桓公郊迎客夜爝火甚盛從者甚衆戚飯牛車下望見桓公而悲擊角而疾啇歌桓公聞之撫其㒒之手曰異哉歌者非常人也命後車載之賜衣冠􅀃苑曰楚令尹虞丘子復相莊王曰臣聞奉公行法可以得榮能淺行薄無望上位臣爲令尹十年矣國故不治獄訟不息臣􅀼選國俊士孫叔敖秀才多能其性無欲君舉而授之政則國可使寜而士民可使附莊王從之虞丘子萊田三畒號曰國老以孫叔敖爲令尹虞丘子家干法叔敖執而戮之虞丘子喜曰叔敖果可使持正矣傳子曰劉備襲蜀丞相􅁺趙幾曰劉備其不濟乎拙於用兵毎戰毎敗奔亡不暇何以圖人徴士􅀓朝曰劉備寛仁有度能得人死力諸葛亮逹治知變正而有謀而爲之相張飛􅀜羽勇而有義皆万人之敵而爲之將此三人者皆人傑也以劉備之略三傑佐之何爲而不濟也郭子曰兾州刺史楊淮字彦清二子喬髦有識俱緫角爲成器淮與}
