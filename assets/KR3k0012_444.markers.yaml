  - {type: variant, offset: 192, length: 2, content: 請為, WYG: 自可貴要當令我見之於是武子令此兵與羣小雜處使母微察之母曰刑衣者汝可㧞乎武子曰是母曰此才足以㧞萃然地寒非}
  - {type: variant, offset: 195, length: 2, content: 史謂, WYG: 年不足展其才用觀其形骨恐不可與婚數年果死吕氏春秋曰魏公叔痤疾惠王往問}
