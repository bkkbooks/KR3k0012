  - {type: variant, offset: 2446, length: 851, content: 聞其欲與相見慶固辭以疾時宗人陸榮為郡五官慶嘗詣焉王乃微服往榮舍穿壁以觀之王謂榮曰觀陸慶風神凝峻殆不可測嚴君平鄭子真何以尚茲北史曰于謹南伐江陵以唐瑾為元帥府長史及軍還諸將多因虜掠大獲財物瑾一無所取唯得書兩車載之以歸或言於周文曰唐瑾大有輜重悉是梁朝珍玩周文初不之信然欲明其實密遣使檢閱唯見墳籍而已乃歎曰孤知此人來二十許年耳其不以利污義向若不令撿視恐常人有投杼之疑孤所以益明之耳凡受人委任當如此也隋書曰魏任城王諧薦李德林因遺尚書令楊遵彥書云燕趙固多奇士此言誠不為謬今歲所貢秀才李德林者文章學識固不待言觀其風神器宇終為棟梁之用至如經國大體是賈生晁錯之儔彫蟲小伎殆相如子雲之輩今雖唐虞君世俊乂盈朝然脩大廈豈厭夫良材之積也吾嘗見孔文舉薦禰衡表云洪水橫流帝思俾乂以正平比夫大禹常謂擬諭非倫今以德林言之便覺前言非大又曰楊素少落拓有大志不拘小節世人多未之知唯從叔祖魏尚書僕射寬深異之每謂子孫曰處道當逸群絕倫非常之器非汝曹所逮也又曰柳莊少有遠量博覽墳籍兼善辭令濟陽蔡大寶有重名於江左時為岳陽王蕭詧諮議見莊便歎曰襄陽水鏡在於茲矣大寶遂以女妻之又曰高構河東薛道衡才高當世每稱構有清鑒所為文筆必先以草呈構有所詆訶道衡未嘗不嗟伏大業七年終于家時年七十二所舉杜如晦房玄齡等後皆自致公輔論者稱構有知人之鑒又曰虞世基字茂世會稽餘姚人也父荔陳太子中庶子世基幼沈靜喜慍不形於色博學有高才兼善草隸陳中書令孔奐見而歎曰南金之貴屬在斯人少傅徐陵聞其名召之世基不往後因公會一見而奇之顧謂朝士曰當今潘陸也因以弟女妻焉隋書曰李德林任城王諧為定州刺史重其才召入州館朝夕同遊殆均師友不為君民禮數嘗語德林云竊聞蔽賢蒙顯戮久令君沉滯吾獨得潤身朝廷縱不見尤亦懼明靈所譴於是舉秀才入鄴李德林幼聰敏年數歲誦左思蜀都賦十餘日便度高隆之見而嗟歎遍告朝士云若假其年必為天下偉器鄴京人士多就宅觀之月餘日中車馬不絕年十五誦五經及古今文集日數千言俄而該博墳典陰陽緯候無不通涉善屬文辭覈而理暢魏收嘗對高隆之謂其父曰賢子文筆終當繼溫子昇隆之大笑曰魏常侍殊己嫉賢何不近比老彭乃遠求溫子, WYG: ''}
