  - {type: variant, offset: 190, length: 1, content: 舅, WYG: 云真長知我勝我自知又曰王渾妻鍾生女甚賢明令武子為妺擇嘉婿而未有其人兵家子有才欲以妻之獨與母議初不告事定乃白母曰誠是地}
