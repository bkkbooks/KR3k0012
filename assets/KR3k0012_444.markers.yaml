  - {type: variant, offset: 289, length: 0, content: '', WYG: 孤貧為河北陳不識家牧羊年十五身長七尺九寸聰慧美風儀每夜專讀書睡則懸頭于屋梁逹旦而止不識竒之将妻以女其妻弗聽不識乃置酒引宇令女潜觀之問女曰姜宇人士才明吾欲以汝妻之汝母難宇家之牧人汝意云何女曰觀宇之姿才豈復為人牧羊也遂妻之宇後厯位京兆尹御史中丞郭林宗别傳曰郭㤗字林宗入潁川則友李元禮至陳留則結符偉明之外黄則親韓子助過蒲亭則師仇季智止學舍則收魏徳功觀耕者則㧞茅季偉皆為名士至汝南見袁閎不宿而去從黄憲三日乃去過新蔡薛懃問之曰足下見袁奉髙不宿而去從黄叔度乃彌日何也㤗曰奉髙之流雖清而易挹叔度汪汪若千頃之波澄之不清撓之不濁難測量也何顒别傳曰顒字伯求}
  - {type: page-break, offset: 289, content: '', id: KR3k0012_WYG_444-9b, image: WYG0897/WYG0897-0092b.png}
  - {type: variant, offset: 290, length: 1, content: 重, WYG: 人倫鑒同郡張仲景總角造顒顒謂曰君用思精而韻不髙将為良醫卒如其言顧和别傳曰和自君孝總角時顧榮曰此吾家􅂹興衰宗必此子也顧珠亦有令聞榮謂珠曰卿速歩君孝超卿矣孟嘉别傳曰􅁃亮㧞孟嘉為勤學從事禇裒為豫章太守出朝亮正旦大㑹州府人士率嘉集坐第甚逺問亮曰江州有孟嘉其人何在亮曰在坐卿但自覔褒歴觀之乆指嘉謂亮曰此人少異将無是乎衛玠别傳曰劉真長謝仁祖並知}
