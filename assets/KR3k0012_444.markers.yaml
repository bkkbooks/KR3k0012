  - {type: variant, offset: 277, length: 2, content: 郭奕, WYG: 顧和始為揚州從事月旦當以停車州門外周侯詣丞相厯和車邉過和覔虱夷然不動周既過反還指顧心曰此中何所有顧擇虱如故徐應曰此中最是難量地周侯既入語丞相曰卿州吏有一令僕才語林曰夏少明在東國不知名聞裴逸民知人乃裹粮寄載入洛從之未至裴家少許見一人着黄皮袴褶乘馬将獵夏問逸民家逺邇荅君何以問夏曰聞其名知人故從㑹稽來投之裴曰身是逸民明可更來明往逸民果知之又嘉其志局乃用為西門侯於此遂知名又曰魏武将見匈奴使自以形陋不足雄逺國使崔季珪代乃自捉刀立牀頭坐既畢使試問曰魏王如何使荅曰魏王固自雅望非常然牀頭捉刀人此乃英雄魏王聞之追殺此使世説曰王濬冲裴叔則二人於總角時詣鍾士季湏臾去後客問向二童子是誰曰裴王客曰何如鍾曰裴楷清通王戎簡要湏三十年此二賢當為吏部尚書兾爾時天下無復滯才崔鴻前燕録曰慕容廆㓜而魁岸美姿貎身長八尺雄傑有大度晋司空張華一見竒之謂廆曰君長必為命世之器定難濟時者也遺廆冠簮以結殷勤崔鴻前秦録曰姜宇}
