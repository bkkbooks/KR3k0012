  - {type: variant, offset: 1200, length: 614, content: 符堅強盛邊境數被侵冠朝廷求文武良將可以鎮禦北方安乃以玄應舉中書郎郗超素與玄不善聞而歎曰安違眾舉親然玄亦必不負舉時咸以為不然超曰吾嘗與玄共在桓公府見其使才雖履屐間亦得其任所以知之晉中興書曰何充字次道年在童齔伯父邃謂之曰我為兒時亡伯車騎謂我汝後當與伯父爭名汝今器宇宏深亦當名出我右由是少有名望又曰吳隱之字處默少有孝行遭母憂哀毀過禮時與太常韓康伯鄰居伯母語伯曰汝後若居銓衡之職當用如此輩人及伯為吏部尚書因進用之遂歷清顯又曰范汪字玄平少失父年六歲過江依外家虔氏荊州刺史王澄見而奇之以為興范族者必是人也又曰魏徐州刺史呂虔有佩刀工相之以為必三公可服此刀虔謂別駕王祥曰茍非其人刀或為害卿有公輔之量故以相與祥始辭之固強乃受祥死之日以刀授弟覽曰吾兒凡汝後必興足稱此故以相與又曰王珣字元琳弱冠與謝玄俱辟大司馬桓溫掾溫語人曰謝掾年三十必擁旄仗節王掾當作黑頭公皆不易才也又曰薛兼與同郡紀瞻廣陵閔鴻吳郡顧榮會稽賀循同志友善號曰五俊初入洛司空張華見而歎曰皆南金也又曰陸曄童齔中從兄機稱之為陸氏之寶我家不世之公也又曰褚季野翼從弟弱冠譙國橋彝見而異之曰褚季野有皮裹陽秋又曰王敦為太子舍人滎陽潘滔時為洗馬見而目之曰處仲蜂目已露但豺聲未振若不噬人亦當為人所噬沈約宋書曰桓玄聞一軍起便憂悴無復計或曰劉裕等眾力微弱豈便有成陛下何慮之甚玄曰劉裕是為一世之雄劉毅家無擔石之讎樗蒱一擲百萬何無忌劉牢之甥酷似其舅共舉大事何慮無成也宋書曰謝弘微童幼時精神端審時然後言叔父混嘗異之, WYG: ''}
