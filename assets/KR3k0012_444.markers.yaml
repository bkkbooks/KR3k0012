  - {type: variant, offset: 29, length: 1, content: 御, WYG: 因調選行儉一見深禮異之仍謂曰有晩年子息恨不見其成長二公十數年當居衡石願記識此軰其後相繼為吏部皆如其言行儉嘗所引偏禆有程務挺張䖍朂崔之􅈯王方翼党金毘劉敬同郭待李多祚黒齒之盡為名将位至刺}
