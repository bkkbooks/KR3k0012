  - {type: variant, offset: 1817, length: 404, content: 深衷夙敏方成佳器有子如此足矣又曰謝弘微叔父混尚晉陵公主高祖受命晉陵公主降東鄉君以混得罪前代東鄉君節義可嘉聽還謝氏自混亡至是數載而室宇脩整倉廩充盈門徒業使不異平日曰疇墾闢有如於舊東鄉君歎曰僕射平生重此子可謂知人僕射為不亡矣又曰袁淑字陽源陳郡陽夏人丹陽尹豹少子也少有風格年數歲伯湛謂家人此非凡兒齊書曰隋郡王子隆能屬文明帝謂王儉曰我家東阿也儉曰東阿重出實為皇家藩屏又曰徐孝嗣姑適東莞劉舍舍兄藏為尚書左丞孝嗣往詣之藏退語舍曰徐郎是令僕人三十餘可知矣汝宜善自結又曰江學為丹陽丞時袁粲為尹見學歎曰風流不墜正在江郎數與宴賞流連日夜蕭子顯齊書曰禇淵字彥回河南陽翟人也父卒悉推財與弟唯取書數千卷初與從弟炤同載道遇太祖淵舉手指太祖車謂炤曰此非常人將來不可測梁書曰沈瑀起家州從事奉朝請嘗詣齊尚書右丞殷濔濔與語及政事甚器之謂曰觀卿才幹當居吾此職又曰范述曾字子玄吳郡錢塘人也幼學從餘杭呂道惠受五經略通章句道惠學徒常有百數獨稱述曾曰此子, WYG: 名士}
