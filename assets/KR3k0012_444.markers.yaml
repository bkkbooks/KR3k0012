  - {type: variant, offset: 178, length: 3, content: 應詹鎮, WYG: 于邵傳云樊澤嘗舉賢良方正邵一見之於京師謂樊将相之材也不五年澤為節度又曰李徳裕與牛僧孺有隙或以韋温厚於牛僧孺言於徳裕徳裕曰此人堅正中立君子也又曰劉三復長慶中李徳裕拜浙西觀察使三復以徳裕禁宻文臣以所業文詣郡干謁徳裕閲其文倒屣迎之乃辟為從事後魏書曰崔亮傳云崔亮字敬儒清河東武城人也時隴西季冲當朝任事亮從兄言之於充充與亮語因謂亮曰比見卿仙人相命語使人胸中無復促廹之念竒之延為舘客冲謂兄子竒曰大崔寛和篤雅汝冝友之小崔生峭整清徹汝冝敬之二人終将大至孔叢子曰魏安釐王問子順馬回之為人雖少文然梗直有丈夫之節吾欲以為相可乎答曰知臣莫若君何有不可至於亮直之節臣未之明也曰何故荅曰臣聞諸孫卿其為人長目而永視者必體方而心圓每以其法相人千百不失一臣見回非不偉其體幹然甚疑其目王卒用之三月回果以諂得罪淮}
