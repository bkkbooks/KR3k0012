  - {type: variant, offset: 557, length: 1, content: 戎, SBCK: 諶字子嗣􅀶學有才辨洛陽种景伯武原呉季髙未知名諶數稱二人於朱伯厚有宰輔之器退語二人曰卿必爲公而景伯至司徒季髙至司空丗以是服諶之知人也會稽典録曰盛憲字孝章嘗出行逢一童容貌非常憲恠而問之是魯國孔融融時年十餘歳憲下車執手載以歸舎與融談宴知其不凢便結爲兄弟因􅂛堂見親汝南先賢}
