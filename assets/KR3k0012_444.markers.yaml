  - {type: variant, offset: 669, length: 370, content: 士卿家雖盆可令專學必能興卿門戶也又曰曹攄字顏遠譙國人也祖肇魏將軍攄少有孝行好學善屬文太尉王衍見而器之調補臨淄令又曰潘京舉秀才到洛尚書令樂廣京州人也共談累日深歎其才謂京曰君天才過人恨不學耳若學必為一代談宗京感其言遂勤學不倦又曰王澄傳云王衍有重名於世時人許以人倫之鑒尤重澄及王敦庾敳常為天下士目曰阿平第一子嵩第二處仲第三澄嘗謂衍曰兄形似道人而神峰太俊衍曰誠不如卿落落穆穆然澄由是顯名又曰戴若思往武陵省父時同郡人潘京素有理鑒名知人其父遣若思就京與語既而稱若思有公輔之林又曰周顗傳云同郡賈嵩有清操見顗歎曰汝頴固多奇士自頃雅道陵遟今復見周伯仁將振起舊風清我邦族矣又曰劉隗伯父訥字令言有人倫鑒識初入洛見諸名士而歎曰王夷甫大鮮明樂彥輔我所敬張茂先我所不解周弘武巧於用短杜方叔拙於用長又曰周浚有人倫鑒識其鄉人史曜素微賤眾所未知浚獨引之為友遂以妹妻之曜竟有名, WYG: 並耀}
