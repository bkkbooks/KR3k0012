  - {type: variant, offset: 39, length: 9, content: 頠若武庫五兵縱橫一, SBCK: 足下見􅀽奉髙不􅀫而去從黃叔度乃弥曰何也㤗曰奉髙之流雖清而昜挹叔度汪汪􅀂千畒之陂澄之不清撓之不濁難測量也何顒別傳曰顒字伯求有人倫鍳同郡張仲景緫角造顒顒謂曰君用思精而韻不髙將爲良毉卒如其言顧和別傳曰和字君孝緫角}
