  - {type: variant, offset: 220, length: 281, content: 楊方字公回少好學有異才初為郡鈐下威儀公事之睱輒讀五經鄉邑未之知內史諸葛恢見而奇之待以門人之禮由是始得周旋貴人間又曰郭奕字大業太原陽曲人也少有重名山濤稱其高簡有雅量為野王令羊祜嘗過之奕歎曰羊叔子何必減郭大業少選復又歎曰羊叔子去人遠矣遂送祜出界數百里又曰李憙薦樂安孫璞亦以道德顯時人稱為知人又曰唐彬初受學於東海閬德德門徒甚多獨目彬有廊廟才及彬官成而德已卒乃為之立碑又曰韋忠年十二喪父哀慕毀悴杖而後起司空裴秀弔之匍匐號訴哀慟感人秀出而告人曰此子長大必為佳器歸而命子頠造焉也又曰沛國戴晞少有才智與嵇紹從子含相友善時人許以遠致紹以為必不成器晞後為司州主簿以為無行被斥州黨稱, SBCK: 生}
  - {type: variant, offset: 220, length: 5, content: 楊方字公回, WYG: 郄太尉遺門生與王丞相書求女婿曰請往東齊中選之門生歸白郄云王家諸郎亦皆可然聞覔女婿咸自矜持唯有一郎在東床上坦腹食如不聞郄云此正嘉婿既而訪焉乃逸}
