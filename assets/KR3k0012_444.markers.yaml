  - {type: variant, offset: 14, length: 1, content: 字, SBCK: 樂廣友善遣見之頠謂淮曰喬當及卿髦小減也廣謂淮曰喬自及卿髦尤精出淮􅀏曰我二兒之優劣乃裴樂之優劣議者皆許之又曰王仲祖云眞長知我勝我自知又曰王渾妻鍾生女甚賢明令武子爲妹擇嘉壻而未有其人兵家子有才欲以妻之獨與母議初不告事定乃白母曰誠是地也自可貴要當令我見之於是武子令此兵與羣小雜處使母帷察之母曰刑衣者汝可抜乎武子曰是母曰此才足以抜萃然地寒非長年不足展其才用觀其形骨恐不可與婚數年果死吕氏春秋曰魏公叔座疾惠王徃問之曰公叔之病甚矣將奈社稷何對曰臣之御庶子鞅也願王以國聽之􅀂不能聽勿使出境王不應出而謂左右曰豈不悲哉以叔之賢而今謂寡人以聽鞅悖也公叔死公叔鞅西遊􅁗􅁗孝公聽之秦果強魏果弱竹林七賢論曰山濤與阮籍􅄞康皆一靣而契􅀂金蘭濤妻韓氏嘗以問濤濤曰當年可爲友者唯此二人耳妻曰􅀒羇之妻亦觀狐趙意欲一窺之可乎濤曰可也二人至妻勸濤留之􅀫其酒食夜穿牖而窺之濤入曰所見何如吾妻曰君才殊不如也正當以識度相友濤曰然伊軰亦當謂我識度勝丗􅀃曰􅀽宏少貧常爲人傭載運謝鎭西常夜泊舟江渚清風明月聞賈客舫上有詠聲甚有清致聽所詠詩又所未嘗聞歎羙不能巳即遣人委曲訊問乃是􅀽宏自誦其詠史詩遂厚相賞重又曰郄太尉遣門生與王丞相書永女壻曰請徃東齊中選之門生歸白郄云王家諸郎亦皆可然聞覔女壻咸自矜持唯有一郎在東床上坦腹食如不聞郄云此正嘉壻旣而訪焉乃逸少也又曰顧和始爲楊州從事月旦當朝停車州門外周侯詣丞相歴和車邊過和覔虱夷然不動周旣過返還指顧心曰此中何所有頋擇虱如故徐應曰此中最是難量地周侯旣入語丞相曰卿州吏有一令僕才語林曰夏少明在陳國不知名聞裴}
