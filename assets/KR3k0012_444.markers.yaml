  - {type: variant, offset: 50, length: 2, content: 傑也, SBCK: 乆指嘉謂亮曰此君小異將無是乎衛玠別傳曰劉眞長謝仁祖並知名時人啇略中朝人士或問􅀪治可得方衛洗馬不謝曰安得相比其間可容數人三輔決録曰龐知伯名勃爲郡小吏東平衛農爲書生窮乏乃客鍜於勃家知伯知其賢尤加禮待雇直過償及去送十里過舅家復貸錢贈之農不肯受勃曰不受令勃不告農乃受曰爲馮翊乃相報後果爲馮翊太守勃子爲門下書佐}
