  - {type: variant, offset: 140, length: 18, content: 賀循少玩篇籍善屬文博覽眾書尤精禮傳雅, WYG: 李晟徳宗之幸山南既入駱谷謂渾瑊曰渭橋在賊腹内兵勢懸隔李晟可辨事乎瑊對曰李晟秉義執志臨事不可奪以臣計之破賊必矣帝意始安又曰楊嗣復字繼之僕射於陵之子也初於陵十九登進士第二十再登􅀶學宏詞科調補潤州句容尉浙西觀察使韓滉}
