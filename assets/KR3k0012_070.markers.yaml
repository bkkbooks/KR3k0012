  - {type: variant, offset: 2759, length: 5, content: 甘雨普降若, SBCK: 則竭齋戒即出莊子曰舜以天子讓其友北人無擇無擇曰異哉欲以其辱汚漫我羞之自投於清冷之淵管子曰水出於地而不流者命之曰淵隋巢子曰夏桀德衰岱淵沸尸子曰龍淵有玉英司馬相如上林賦曰丹水更其􅀯紫淵經其北泉水􅀃文曰泉水源也易蒙卦曰山下出泉蒙君子以果行育德詩曰泉水衛女思歸毖彼泉水亦流于淇有懷于衛靡日不思又曰爰有寒泉在浚之下又曰泉源在左淇水在右又曰莫髙匪山莫浚匪泉又曰相彼泉水載清載濁又曰原隰旣平泉流旣清召伯有誠王心則寧又曰觱沸檻泉傳曰鄭伯寘姜氏于城潁而誓之曰不及黄泉無相見也旣而悔之潁考叔問公公語其故對曰君何患焉􅀂闕地及泉隧而相見其誰曰不然公從之論語撰考䜟曰水名盗泉仲尼不漱應劭漢官儀曰酒泉城城下有金泉味如酒故曰酒泉郡三􅁗記曰酒泉郡中有井味如酒也􅀳安帝紀曰呉隱之字處黙性廉操桓􅀇欲救嶺南之􅁦以隱之爲刺史州界有}
