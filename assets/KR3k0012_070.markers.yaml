  - {type: variant, offset: 2924, length: 0, content: '', WYG: 榆木成林又曰肅州延壽城有山出泉注地水肥如肉汁燃之極明與膏無異但不可食此方人謂名漆得水愈熾吕氏春秋曰太公釣於滋泉又曰水之美者崐崘之井髙泉之山有涌泉焉淮南子曰正土之氣仰乎埃天正土中也其氣}
  - {type: variant, offset: 2924, length: 12, content: 上此崖乃化為石是名伏犀灘, krp: 榆木成林}
  - {type: variant, offset: 2925, length: 3, content: 此崖乃, WYG: 水埃天中央也埃天五百歲生蚗蚗石名也中央數五故五百歲而一化蚗五百歲生黄澒黄澒英水銀也黄澒五百歲生黄金黄澒英五百歲化而為黄金也黄金千歲生黄龍黄金之精為黄龍也黄龍入藏生黄泉黄泉黄龍之精汋也黄泉之埃上為黄雲其氣上至天也隂陽相薄為雷激陽為電言黄氣之相激薄也上者就下其氣遍流於天下也流水就通激而合乎黄海言水從天下則通流入于海也偏土之氣仰乎青天偏土方土也青天八百歳生青增青增青石也東方數八故八百歲而一化也增八百歲生青澒澒八百歲生青金金千歲生青龍青龍入藏生青泉青泉之埃上為青雲隂陽相薄為雷激陽為電上者就下流水就通而合乎青海壯土之氣仰於赤天壯土南方土也赤天七百歲生赤丹赤丹砂也南方數七故七百歳而一化也赤丹七百歲生赤金丹砂也}
