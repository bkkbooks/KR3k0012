  - {type: variant, offset: 9, length: 5, content: 澗者言在兩, SBCK: 淵囬水也尚書逸篇曰堯子丹朱不肖舜使居丹淵爲諸侯韓詩外傳曰東海之上有士曰菑丘訢以勇遊於天下過神淵飲馬馬果沉菑丘訢朝服㧞劒而入三日三夜殺三蛟一龍而出雷電隨而擊之十日十夜眇其左目大戴禮曰聖人有國則淵不湧傳曰鄭子産曰􅀂堯殛鯀于羽}
