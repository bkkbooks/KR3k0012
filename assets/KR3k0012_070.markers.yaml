  - {type: variant, offset: 1264, length: 1212, content: 西百餘步有棲霞樓臨川王營置清暑遊焉羅君章居之因名為羅公洲樓下洲上菓竹交蔭長楊傍映高梧前竦雖即城隍趣同丘壑盛弘之荊州記曰南江上有龍洲下有寵洲二洲之間舊云多魚而投罟揮網輒便掛絕乃有客沒而視之中水有牛二頭常為破網故魚者患之又曰江津東十餘里有中夏洲洲之首江之汜也故屈原云經夏首而西浮又二十餘里有涌口所謂閻敖遊涌而逸二水之間謂之夏洲首尾七百里又曰枝江縣西至上明東及江津其中有九十九洲楚諺曰洲不滿百故不出王者桓玄有問鼎之志乃增一為兩以充百數僣號旬時身屠宗滅及其傾覆洲亦消毀至宋文帝在藩忽生一洲果龍飛江表斯有驗矣荊州圖副曰百里洲其上平廣土沃人豐湖澤所產足穰儉歲又特宜五果甘柰梨蔗於此是出荊南志曰枝江縣界內洲大小凡三十七其十九有人居十八無人劉禎京口記曰嘉子洲西一里得貴洲周廻四十里許上多有居民昔魏文帝伐孫權至此洲南望曰彼人有焉而退因名曰貴洲述征記曰晉寧縣有龍莽洲父老云龍蛻骨於此洲其水今猶多龍骨山謙之丹陽記曰江寧縣南二十五里有列洲晉簡文帝為相時會桓溫處也郡國志白潮州白嶼洲亦自浮來後會稽人姓丁識之云曾藏銅熨斗於洲上往取果得又曰潤州長命洲梁武放生處後魏使李諧來聘武帝問曰彼國亦放生否諧曰不取亦不放帝大慚荊州圖經曰襄陽縣南八里峴山東南一里江中有蔡洲漢長水校尉蔡瑁所居宗族強盛共保蔡洲為王如所沒一宗都盡又曰武當縣西北四十里江中有滄浪洲長四里廣十三里禹貢稱漢水東流為滄浪水疑此洲是也方言曰水可居者為洲三輔謂之洲淤郭璞注曰上林賦云行於洲於之浦輿地志曰伍子胥叛楚出關於江上見漁父求渡時傍多人漁父歌曰灼灼兮侵已私與子期兮蘆之崎子胥既渡解百金之劍與漁父漁父曰楚購子粟五萬爵執圭豈百金之劍與子胥曰勿令其露漁父知意遂覆舟而死其處是𤄷洲水路去洲一百九十里江夏記曰鸚鵡洲在縣北案後漢書曰黃祖為江夏太守時黃祖與太子射賓客大會有獻鸚鵡於此洲故以為名又荊州記曰江夏郡城西臨江有黃鶴磯又有鸚鵡洲侯景令宋子仙夜襲江夏藏舡於鸚鵡洲建安記曰郡西南大溪之中有仙人洲昔梅真人上昇墜馬於此洲故後名墜馬洲鄱陽記曰蠙洲在縣西南溪中有蚌出珠貞觀年中因雨雹乃有蚌出珠百姓採之咸亦不空其水平淺可涉丹陽記曰白鷺洲在縣西三里隔江中心南邊新林浦西對白鷺洲洲在大江中多聚白鷺因名之又曰烈洲在縣西南輿地志云吳舊津所也內有小水堪泊舡啇客多停以避烈風故以名焉王濬伐吳宿於此簡文為相時會桓玄之所也亦曰溧洲洲上有山山形以栗伏滔北征賊謂之烈洲又曰吳時客館在蔡洲上以舍遠使蘇峻作逆陶侃等率所統同赴京師直指石頭次于蔡洲是又曰張公洲在縣西南梁書太清二年豫州刺史裴東之等舟師二萬次張公洲二年陳霸先擊破侯子監師至張公洲並此處又曰加子洲在縣西南三十國春秋曰晉咸和二年溫嶠與陶侃起義兵伐蘇峻帥師四万直指石頭侃泊加子洲即此處也夏月堪泊舡冬月淺涸自永昌之初其洲忽一朝崩陷數里隨其形曲折凡作九灣行者所依東西浩然矣尋陽記曰鵲洲在縣北傳曰昭公五年楚以諸侯伐吳吳敗之於鵲岸桉鵲頭與鵲尾相去八十里杜預注曰吳地也廬江舒縣東南有鵲尾渚湍廣雅曰湍瀨, SBCK: 門}
