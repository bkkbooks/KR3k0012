  - {type: variant, offset: 2483, length: 0, content: '', WYG: 山出玉漿濟我民夷神鳥來翔百姓因號其泉為玉漿泉唐書曰安金藏京兆長安人為太常丞初䘮母寓葬於都南闕口之北廬於墓側躬造石墳石塔晝夜不息原上舊無水忽有湧泉自出遁甲開山圖榮氏解曰女狄暮汲石紐山下泉水中得月精如鷄子愛而含之不覺而吞遂有娠十四月生夏禹水經注曰若耶溪東又有寒溪溪北有鄭公泉深及數丈冬温夏凉漢太尉鄭公𢎞宿居潭側因以名泉又曰横流溪溪水甚小冬夏不乾俗亦謂貪泉飲者輙冐於財賄同於廣州石門境之貪流矣為二千石則不飲之昔吳隱之挹而不亂豈謂能汩其真乎蓋亦惡其名也又曰汲城縣北三十里有太公泉泉上又有太公廟廟側髙林秀木翹楚競茂相傳曰太公之故居也又曰土糓縣故城西水源方百歩百泉俱出故謂之百脉水又曰霍太山上有岳廟廟甚有靈鳥雀不栖其林猛虎常守其庭又有靈泉供祭事鼓動則泉流聲絶則水竭也又曰長城背山面澤謂之白道城北出有髙坂謂之白道嶺㳂路唯土穴出泉挹之不窮古詩飲馬長城窟非虚言也風土記曰陽羡}
