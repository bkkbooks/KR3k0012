  - {type: variant, offset: 2481, length: 2, content: 益陽, SBCK: 白鹿淵南北三百歩東西千餘歩深三丈餘其水冬清而夏濁淡然不流九州記曰樂壽}
  - {type: variant, offset: 2481, length: 1, content: 益, WYG: 白鹿淵南北三百歩東西千餘歩深三丈餘其水冬清而夏濁淡然不流九州記曰樂夀縣有房淵方三百里石勒建安三年水忽變為赤燕慕容雋三年水忽生鹽如印形其淵一日再長再减不失其度居近者時見龍狗之狀戲於旁葉落於淵者輙有群燕銜出盛𢎞之荆州記曰新野城北有柴山山上有清泠之淵焉又曰魚復縣有神淵北有白鹽崖天旱火燃崖上推其灰燼下降淵中尋則降雨西有龍淵清深不測傳云漢祖伐秦途經於此見淵中白壁赤柱狀若官府因名龍淵宜都山川記曰鄉下村有淵淵有神龍每旱百姓輙以毒草投淵上流魚死龍怒應時大雨齊地記曰瑯琊臺上有神淵汚之則竭齋戒即出莊子曰舜以天下讓其友北人無擇無擇曰異哉欲以其國汚我我羞之自投於清泠之淵管子曰水出於地而不流者命之曰淵隨巢子曰夏桀徳衰岱淵沸尸子曰龍淵有玉英司馬相如上林賦曰丹水更其南紫淵經其北泉水說文曰泉水源也易象卦曰山下出泉蒙君子以果行育徳詩泉水衛女思歸也毖彼泉水亦流于淇有懷于衛靡日不思又曰爰有寒泉在浚之下又曰泉源在左淇水在右又曰莫髙匪山莫浚匪泉又曰相彼泉水載清載濁又曰原隰既平泉流既清召伯有成王心則寧又曰觱沸檻泉傳曰鄭伯寘姜氏于城潁而誓之曰不及黄泉無相見也既而悔之潁考叔問公公語其故對曰君何患焉若掘地及泉隧而相見其誰曰不然公從之論語撰考䜟曰水名盗泉仲尼不潄應劭漢官儀曰酒泉城城下有金泉味如酒故曰酒泉郡三秦記曰酒泉郡中有井味如酒也晉安帝紀曰吳隱之字處黙性亷操桓𤣥欲救漢南之弊以隱之為刺史州界有一水父老云飲此水者亷士皆貪隱之始踐境先至水所酌而飲之因賦詩以言志清操愈厲沈約宋書曰王彭盱眙人少䘮母元嘉初父又亡家貧力弱營葬鄉人助作塼須得水天旱穿井數十丈無水一旦塼竈前忽生泉用之事畢復竭助者嗟嘆隋書曰豆盧勣武帝嗣位拜渭州刺史甚有惠政華夷悅服徳澤流行大致祥瑞鳥鼠山谷呼為髙武隴其下渭水所出其山絶壁千尋由來乏水諸羗苦之勣馬足所踐忽飛泉涌出有白鳥翔止㕔前乳子而後去又白狼見於襄武民為之謡曰我有丹}
