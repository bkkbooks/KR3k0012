  - {type: variant, offset: 33, length: 1211, content: 于以采蘩于澗之中又曰于以采蘋南澗之濱又曰考盤在澗碩人之寬爾雅曰兩山夾水曰澗漢書曰沛公與項籍臨廣武澗而語數籍十罪東觀漢記曰耿恭以踈勒城傍有水徙居之匈奴來攻絕其澗水吏笮馬糞汁飲之水經注曰洛水東北流注于公路澗但世俗音訛號之曰光祿澗非也異苑曰符堅為慕容冲所襲堅馳騧馬墮而落澗追兵幾及計無由出馬即踟躕臨澗垂鞚與堅堅不能及馬又跪授焉堅攀之得登岸而走幽明錄曰人有山行墜澗者無出路飢餓僅死見龜虵甚多朝暮引頸向四方人因學之遂不復飢體殊輕便能登巖岸經數年後竦身舉臂遂超出澗上即得還家顏色悅澤頗更聰慧洎食穀啖滋味百日復其本質郡國志曰漢武元封二年有白羊出庸澗初出一羊野中婦人大驚拍手羊因止今俗生羊禁婦人拍手是也又水經曰吳房縣山溪有白羊淵淵水出羊又曰赤松澗在東陽赤松子遊金華山以火自燒而化故山上有赤松子之祠澗自山出故曰赤松澗十道志曰廣武澗在今滎澤縣西又西征記三皇山上有三城謂東西廣武城相去二百餘步隋河水從中東南流今無水今城東有高壇即項羽坐太公於上以示漢軍處一謂鴻溝盧氏嵩山記曰半馬澗人或云百馬澗亦曰拜馬澗故老傳王子晉得仙而馬還國人思之不見乃拜其馬於此也韓子曰董安于為趙上地守行石阜山見深澗深百仞問其御左右曰人嘗有入此乎曰無有嬰兒狂聾人入此乎曰無有牛馬犬彘入此乎曰無有安于歎曰吾能治矣使吾法之無赦猶入澗之必死則民莫之犯也洲詩曰關關睢鳩在河之洲爾雅曰水中可居者曰洲四方有水中央獨高可居也史記曰越王勾踐平吳徙夫差於甬東韋昭曰即句章東溪口外洲是也晉書曰殷仲堪為荊州刺史先是仲堪遊於江濱見流棺接而葬焉旬日間門前之溝忽起成岸其夕有人通仲堪自稱徐伯云感君之惠無以報也仲堪因間門前之岸是何祥乎對曰水中有岸其名為洲君將為州言終而沒至是果臨荊州王隱晉書曰朱崖在大海中遙望朱崖洲大如菌舉帆一日一夜至洲周匝二千里徑度七八百里可十萬家女多姣好長髮美鬢吳錄地理志曰吳富春縣有沙漲武烈為郡吏赴府鄉人餞之會於沙上父老曰此沙狹而長君後當為長沙太守後果然因名孫洲吳志曰孫權遣衛溫諸葛直將甲士萬人浮海求夷洲及亶洲在海中長老傳言秦始皇帝遣方士徐福將童男女數千人入海求蓬萊神仙及仙藥止此不還世世相承有萬家其上人民時有至會稽貨市隋圖經曰漢水逕琵琶谷至滄浪洲洲即漁父棹歌處庾仲雍記云謂之千齡洲水經注曰龍陽縣之洲洲長二十里吳丹陽太守李衡植甘橘於其上臨死勑其子曰吾洲里有木奴千頭不匱汝衣食歲絹千疋又曰崢嶸洲冠軍將軍劉毅破桓玄於此洲山海經曰郁洲一曰都洲在海中郭璞注曰即東海鬱洲山也傳此洲從倉梧徙來上有南方物扶南傳曰漲海中倒珊瑚洲洲底有盤石珊瑚生其上也西京雜記曰梁孝王兔園之中又有鴈池池有鶴洲諸宮館相連異樹怪獸靡不畢備王與宮人賓客弋釣其中吳地記曰長洲在姑蘇南大湖北岸闔閭所遊獵處也吳主遣徐祥至魏魏太祖謂祥曰孤比者願越橫江之津與孫將軍遊姑蘇之上獵長洲之苑吾志足矣詳對曰大王欲奉至順以合諸侯若越橫江而遊姑蘇是踵亡秦而躡夫差恐天下之事去矣太祖笑曰徐生得無逆詐耶湘中記曰或曰昭潭無底橘洲浮昭潭湘水至深處也橘洲每, SBCK: 鄭}
