  - {type: variant, offset: 2913, length: 0, content: '', SBCK: 炎帝長於姜女即此水是焉義興記曰國山縣有金硎硎中沙石時灼灼如金者舊名金泉時獲真金也漢水記曰漢水有泉方貟數十歩夏常沸涌望見白氣衝天能差百病常有數百人飲浴之宣城記曰臨城縣南四十里有盖山登百許歩有舒姑泉}
  - {type: page-break, offset: 2913, content: '', id: KR3k0012_SBCK_070-5a}
  - {type: variant, offset: 2913, length: 0, content: '', WYG: 炎帝長於姜水故以名也皇甫謐帝王世紀云炎帝神農氏母有喬氏女登為少典妃逰華陽感神而生炎帝長於姜水因以氏焉義興記曰國山縣有金硎硎中沙石有灼灼如金者舊名金泉時獲真金也漢水記曰漢水有泉方圓數十歩夏常沸湧望見白氣衝天能差百病常有數百人飲宣城記曰臨城縣南四十里有蓋山登百許歩有舒姑泉}
  - {type: page-break, offset: 2913, content: '', id: KR3k0012_WYG_070-7b, image: WYG0893/WYG0893-0569d.png}
  - {type: variant, offset: 2913, length: 0, content: '', krp: 炎帝長於姜女即此水是焉義興記曰國山縣有金硎硎中沙石時灼灼如金者舊名金泉時獲真金也漢水記曰漢水有泉方貟數十歩夏常沸涌望見白氣衝天能差百病常有數百人飲浴之宣城記曰臨城縣南四十里有盖山登百許歩有舒姑泉}
  - {type: variant, offset: 2915, length: 7, content: 黃牛從僰溪入溪, SBCK: 舒氏女與其父斫薪於泉處坐牽挽不動父還告家比還唯見清泉女母曰吾女本好音樂乃􅃶歌泉涌洄流見朱鯉一􅀟今作樂嬉戯泉故涌出周景式廬山記曰山西有龍泉精舍􅀄逺法師遣諸道人行卜地息此而渴法師因以杖掘地即泉出天旱法師令道人讀海龍王經泉中有物如虵而出角騰空中去須􅁷而雨括地圗記曰昆丘之上有赤泉飲之不老神宫有美泉飲之眠三百􅀊乃覺不死盛弘之荆州記曰城東北三百歩有孔子泉其水甘馨雖帝漿無以過也又曰冝都夷陸縣南勾將山下有三泉傳云夲無此泉居者苦於汲水有一女子􅀌貧忽有一乞人瘡痍竟體村人無不稱惡此女哀矜飴之乞人乃腰中出刀刺山下三處即飛泉涌出㝷陽記曰莫山有澗深丈餘朝夕輙有湧泉溢出如潮號爲潮泉外國圖曰貟丘有赤泉飲之不老郡國志曰蘭舟有梁泉昔梁暉者爲羌所圍無水暉以鞭扣地以青羊祈山神湧泉}
  - {type: page-break, offset: 2915, content: '', id: KR3k0012_SBCK_070-5b}
  - {type: variant, offset: 2915, length: 7, content: 黃牛從僰溪入溪, WYG: 舒氏女與其父斫薪於泉處坐牽挽不動父還告家比還唯見清泉女母曰吾女本好音樂及絃歌泉湧泗流見朱鯉一雙今作樂嬉戲泉故湧出周景式廬山記曰山西有龍泉精舍初遠法師遣諸道人行卜地息此而渴法師因以杖掘地即泉出天旱法師令道人讀海龍王經泉中有物如蛇而角出騰空中去須㬰而雨括地圖記曰昆丘之上有赤泉飲之不老神宫有美泉飲之眠三百歲乃覺不死盛𢎞之荆州記曰城東北三百歩有孔子泉其水甘馨雖帝漿無以過也又曰宜都夷陸縣南勾將山下有三泉傳云本無此泉居者苦於汲水有一女子孤貧忽有一乞人瘡痍竟體村人無不稱惡此女哀矜飴之乞人乃腰中出刀刺山下三處即飛泉涌出潯陽記曰莫山有澗深尺餘朝夕輙有湧泉溢出如潮號為潮泉外國圖曰貟丘有赤泉飲之不老郡國志曰蘭州有梁泉昔梁暉者為羗所圍無水暉以鞭扣地以青羊祈山神湧泉}
