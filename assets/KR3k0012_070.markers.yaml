  - {type: variant, offset: 2495, length: 185, content: 南對甘寧故壘昔關羽屯軍水北孫權令魯肅甘寧拒之於是水寧謂肅曰羽聞吾咳唾之聲不敢渡也渡則成擒矣羽夜聞其處分曰興霸聲也遂不渡又曰漢水東為鱣湍洪波奔蕩崩浪雲頹古老言有鱣魚奮鰭遡流望濤直上至此則曝鰓失濟故因名湍異苑曰永嘉郡有百簿瀨郡人斷水捕魚宰牲禱祭以祈多獲逾時了無所得眾侶忿怨棄業將罷其夕並夢見老公云諸君且可小停要思其宜夜忽聞有跳躍聲驚起共看乃是大魚剉以為頓獲百薄故因以百薄名瀨, WYG: ''}
