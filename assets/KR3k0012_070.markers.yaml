  - {type: variant, offset: 2765, length: 7, content: 鄉獨壅雨亦徧應, SBCK: 水父老云飲此水者廉士皆貪隱之始踐境先至水所酌而飲之因賦詩以言志清操逾厲沈約宋書曰王彭盱眙人少喪母元嘉􅀄父又亡家貧力弱營葬郷人助作塼湏得水天旱穿井數十丈無水一旦塼竈前忽生泉用之事畢復竭助者嗟歎隋書曰豆盧勣武帝嗣位拜渭州刺史甚有惠政華夷恱服德澤流行大有祥瑞鳥䑕山谷呼爲髙武隴其下渭水所出其山絶壁千㝷由来乏水諸羌苦之勣馬足所踐忽飛泉涌出有白鳥翔止㕔前乳子而後去又有狼見於襄武民爲之謡曰我有丹陽山出玉漿濟我民夷神鳥來翔百姓因號其泉爲玉漿泉唐書曰安金藏京兆長安人爲太常丞􅀄䘮母寓􅁙於都南闕口之北廬於墓側躬造石墳石塔晝夜不息原上舊無水忽有湧泉自出遁甲開山圖榮氏解曰女狄暮汲石紐山下泉水中得月精如鷄子愛而含之不覺而吞遂有娠十四月生夏禹水經注曰􅀂耶溪}
