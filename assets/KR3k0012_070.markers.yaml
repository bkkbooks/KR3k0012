  - {type: variant, offset: 2743, length: 4, content: 桂陽耒陽, SBCK: 新野城北有柴山山上有清冷之淵耕父楊光之處又曰魚復}
  - {type: variant, offset: 2743, length: 3, content: 桂陽耒, WYG: 瀛洲有玉膏山出泉如酒味名之為玉酒也𤣥中記曰東方有柴渚焉在齊國山山泉如井狀深不測至春時雹從井中出出常敗五穀人常以林木柴塞則不出故名為柴渚焉魏土地記曰頌}
  - {type: page-break, offset: 2743, content: '', id: KR3k0012_WYG_070-7a, image: WYG0893/WYG0893-0569c.png}
  - {type: variant, offset: 2743, length: 3, content: 桂陽耒, krp: 􅌡洲青玉膏山泉如酒味名之爲玉泉也玄中記曰東方有柴渚焉在齊國山山泉如井狀深不測至春時雹從井中出出常敗五糓人常以林木柴塞則不出故名爲柴渚焉魏土地記曰頌}
