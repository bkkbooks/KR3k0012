  - {type: variant, offset: 2938, length: 3, content: 荔枝灘, SBCK: 肅州延壽城有山出泉注地水肥如肉汁燃之極明與膏無異但不可食此方人謂石􅃮得水愈熾吕氏春秋曰太公釣於滋泉又曰水之美者崐崘之并髙泉之山有涌泉焉淮南子曰正土之氣仰乎埃天正士中也其氣上水埃天中夾也埃天五百歳生蚨蚨石名也中夾數五天故五􅀊而一化蚨五百􅀊生黄鴻黄􅐓英氷銀也黄鴻五百􅀊生黄金黄鴻英五百􅀊化而爲黄金也黄金千􅀊生黄龍黄金之精爲黄龍也黄龍入藏生黄泉黄泉黄龍之精汋也黄泉之埃上爲黄雲其氣上至天也隂陽相薄爲雷激陽爲電言黄氣之相激薄也上者就下其氣傷復於天下也流水就通而合乎黄海言水從天下則通流入於海也偏土之氣仰乎青天偏土方土也青天八百歳生青増青増青石也東方數八八故八百􅀊而一化青増八百􅀊生青澒青鴻八百􅀊生青金青金千歳生青龍青龍入藏生青泉青泉之埃爲青雲隂陽相薄爲雷激陽爲電上者就下流水就通而合乎青海壯士之氣仰於赤天壯土南方土也赤天七百􅀊生赤丹赤丹沙也南方數七故七百􅀊而一化也赤丹七百􅀊生赤金丹沙不化爲沙而可以爲金故氣赤􅐓也赤金千歳生赤龍赤龍入藏生赤泉赤泉之埃上爲赤雲隂陽相薄爲雷激陽爲電上者就下流水就通而合乎赤海弱土之氣仰乎白天弱土西方土也白天九百􅀊生白礜白礜礜石也西方数九故九百􅀊一化也白礜九百歳生白澒白澒九百歳生白金白金千歳生白龍白龍入藏生白泉白泉之埃上爲白雲隂陽相薄爲雷激陽爲電上者就下流水就通而合乎白海牝土之氣仰乎􅀇天牝土北方土也􅀇天六百􅀊生􅀇石也北方數六故六百􅀊而一化也􅀇砥六百􅀊生􅀇澒􅀇澒六百􅀊生􅀇金􅀇金千􅀊生􅀇龍􅀇龍入藏生􅀇泉玄泉之埃上爲􅀇雲隂陽相薄爲雷激陽爲電上者就下流水就通而合乎􅀇海又曰崑崙四水者帝之神泉以和百藥以潤萬物也傅咸神泉賦曰余所居庭庭前有湧泉在夏則冷渉冬而温毎夏遊之不知􅀊之有暑枹朴子曰崑崙及蓬萊其上鳥獸飲玉井泉皆長生不死也李華雲母泉詩序曰洞庭湖西􅀇石山俗謂之墨山山南有佛寺寺􅀝松嶺松嶺下有雲母泉泉出石引流分渠周遍庭宇發源如乳源末􅂀如淳漿烹茶灌園漱濯皆用之大浸不􅄹大旱不耗自墨山西北至石門}
