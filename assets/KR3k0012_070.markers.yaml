  - {type: variant, offset: 2749, length: 4, content: 兩瀨每縣, SBCK: 神淵北有白塩崖天旱火燃崖上推其􅁅燼下降淵中㝷則降雨西有龍淵清深不測傳云漢祖伐􅁗經途於此見淵中白壁赤柱􅃺􅀂官府因名龍淵冝都山川記曰卿下村有淵淵有神龍毎}
  - {type: variant, offset: 2749, length: 15, content: 兩瀨每縣旱百姓共壅之甘雨普降若, WYG: 駮牛山山下有泉泉競發有}
