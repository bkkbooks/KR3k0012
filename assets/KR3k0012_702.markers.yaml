  - {type: variant, offset: 12, length: 100, content: 屏障風也扆在後所依倚也周禮天官掌次曰王大旅上帝掌次設皇邸大旅上帝祭天於圓丘也鄭司農曰皇羽覆也玄謂後板屏風與梁羽象鳳皇色以為飾也禮記明堂位曰天子負斧扆南面而立鄭玄曰斧扆畫屏風又三禮圖曰扆縱廣八尺畫斧文今, SBCK: 扇}
