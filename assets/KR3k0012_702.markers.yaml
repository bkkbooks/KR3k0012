  - {type: variant, offset: 2186, length: 339, content: 妒恒在介子齋中客來便閉屏風有桓客者時為中兵參軍來詣荀諮事論事已訖為復作餘語桓時年少殊有姿容荀婦在屏風裏便語桓云桓參軍君知昨人不論事已訖何以不去桓狼狽便走又曰謝萬作吳興郡其兄安時隨至郡中萬眠常晏起安清朝便往床前叩屏風呼萬起淮南王屏風賦曰列在左右近君頭足不逢仁人永為杇木曹毗詩敘曰余為黃門在直多懷遂作詩書屏風李尤屏風銘曰舍則潛辟用則設張立必端直處必廉方壅閼風邪霧露是抗奉上蔽下無失其常王羲之與殷浩書曰勸令畫廉藺於屏風步障晉書曰石崇與王愷相尚愷以紫絲步障四十里崇以錦步障五十里以敵之又曰王凝之妻謝氏有才辯凝之嘗與賓談論詞理將屈謝氏遣婢白獻之曰欲與小郎解圍乃施青綾步障自蔽與客申獻之前議客不能屈齊書曰江夏王寶玄與崔惠景叛景敗寶玄逃奔數日乃出帝召入後堂以步障裹圍之令群小數十人鳴鼓角繞其外, WYG: 扇}
