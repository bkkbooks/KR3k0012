  - {type: variant, offset: 2110, length: 1, content: 屏, SBCK: 五明金薄莫難扇此一扇之名也薄打純金如蟬翼二面彩漆􅀞列仙竒鳥異獸其五明方中辟方三寸或五寸隨扇大小雲母帖其中細縷縫爲其際唯􅀞而彩色明徹看之如謂可取故名莫難也虎出時以此扇挾乗輿亦用象牙桃枝扇其上竹或緑沉色或木蘭色或作紫紺色或作鬰金色異物志曰扶南國昔但知作大扇遣人持之不知人各自用也及今􅀬時各自用也拾遺録曰周昭王時􅂗脩國獻青鳯丹鵠各一雌一雄夏至取鵠翅爲扇一名施}
  - {type: page-break, offset: 2110, content: '', id: KR3k0012_SBCK_702-5a}
  - {type: variant, offset: 2110, length: 20, content: 屏風語林曰滿奮字武秋羸惡風侍坐武帝屢顧看, WYG: 五明金箔莫難扇此一扇之名也薄打純金如蟬翼二面彩漆畫列仙竒鳥異獸其五明方中辟方三寸或五寸隨扇大小}
