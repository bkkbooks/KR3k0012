  - {type: variant, offset: 2861, length: 1, content: 宏, SBCK: 遥光傳江祐􅀍誅東昬召遥光入殿告以祐罪遥光懼還省便陽狂號􅂘自此稱疾不復入臺先是遥光行還入風飄儀繖岀城外遥光後敗梁書曰王籍爲中散大夫彌日忽忌不樂乃至徒行市道不擇交遊有時途中見相識輙以笠傘覆靣南史曰殷孝祖與賊合戰毎常以鼔蓋自隨軍中人相謂曰殷統軍可謂死將至矣今與賊交鋒而以羽儀自摽顯若此射者十手攅射欲不斃得乎是日中流矢死又曰扶南其俗􅇁古具繖文}
