  - {type: variant, offset: 2952, length: 5, content: 長安有張氏, SBCK: 湖陂吏丁􅀄忽見少婦人姿容可愛青衣戴傘呼􅀄􅀄疑而待顧視婦自投波中是大蒼􅆩衣傘皆是蓮荷異苑曰義熈中烏陽小吏見女子戴青繖姿容甚麗遂要之女至多電光乃是大狸抽刀研殺其繖乃枯荷葉事具獸部眞人周君傳曰紫陽真人周義山子通合㑹仙人在金屋銅門之内以紫雲爲蓋眞人王君傳曰太上大道君授務成君繡羽蓋􅀟明珠俗􅀃曰徐干木年少時嘗夜夢見烏從天上飛銜繖樹其廷中如此凢三過銜來作惡聲而去徐後果得繖遂以惡終青烏子葬書曰作墓發土夕夢見􅇁繖入市}
