  - {type: variant, offset: 730, length: 149, content: 卑上問知其故遂聽置雲母屏風分隔其間由此為故事吳志曰景帝時紀亮為尚書令子騭為中書令每朝會詔以御屏風隔其座焉或曰隔以雲母屏風又曰曹丕興善畫孫權使畫屏風誤筆落點素因就以作蠅權以為生蠅舉手彈之魏書曰太祖雅性節儉帷帳屏風壞則補納魏志曰太祖平柳城班所獲器物特以素屏風素憑几賜毛玠曰以君有古人之風故賜君以古人之服, SBCK: 障}
