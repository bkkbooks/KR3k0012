  - {type: variant, offset: 188, length: 142, content: 曰乃公教戒汝汝反睡不聽吾言何也咸叩頭謝曰具曉所言大要教咸謟也萬年因不復言又曰班伯以侍中光祿大夫養疾久之成帝出過臨侯伯伯乃再視事自大將軍薨後師古曰王鳳也富乎定陵侯張放淳于長等始愛幸出為微行行則同輿執轡入則侍中設宴飲之會及趙李諸侍中皆引滿舉白時乘輿幄坐帳畫屏風師古曰坐音才臥反畫紂醉踞姐已, SBCK: 制}
