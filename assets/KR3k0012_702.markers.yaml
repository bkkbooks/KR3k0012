  - {type: variant, offset: 2958, length: 217, content: 獨處一室有鳩自外入止于床張氏惡之披懷而祝曰鳩爾來為我禍耶飛上承塵上為我福也來入我懷鳩飜飛入懷乃化為一鉤從爾資產巨萬又曰博陵劉伯祖為河東太守所止承塵上有神能語京師詔書誥下消息輒豫告伯祖伯祖問其所食啖欲得羊肝於前切之臠隨刀不見盡兩羊肝有一老狸眇眇在案前持刀者舉刀欲斫之伯祖訶止自舉著承塵上須臾大笑曰向者啖肝醉忽失形與府君相見大慚愧後伯祖當為司隸復先語伯祖云某月某日書當到期如言及入司隸府神隨逐承塵上輒言省內事伯祖大恐怖謂神曰今職在剌舉左右, SBCK: 冨}
