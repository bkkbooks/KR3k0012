  - {type: variant, offset: 2758, length: 5, content: 事云謂帟在, SBCK: 襚衣也殯三加遂深禮厚之與之犀軒直盖犀軒卿車直盖髙盖家語曰孔子將行命從者持盖旣而果􅀨聖人無所不通也又曰孔子將行雨無蓋門人曰啇也有焉孔子曰啇也之爲人也甚短於財吾聞與人交者推其長者違其短者故能以乆也史記曰五羖大夫相秦也勞不坐乗暑不張蓋漢書曰上官傑少時爲羽林郎從武帝上甘泉天大風車不得行解蓋投之傑奉蓋雖風常屬車􅀨下蓋輙御上竒其材力焉又曰黄覇爲揚州刺史三年宣帝詔賜車蓋特髙一尺以彰有德又}
  - {type: page-break, offset: 2758, content: '', id: KR3k0012_SBCK_702-7a}
  - {type: variant, offset: 2758, length: 5, content: 事云謂帟在, WYG: 與之犀軒直葢家語曰孔子將行命從者持葢既而果雨又曰孔子將行雨無葢門人曰商也有焉孔子曰商也之為人也甚短于財吾聞與人交者推其長者違其短者故能以久也史記曰五羖大夫相秦也有勞不坐乘暑不張葢漢書曰上官傑少時為羽林郎從武帝上甘泉天大風車不得行解葢投之傑奉葢雖風常屬車雨下葢輒御上竒其材力焉又曰黄霸為揚州刺史三年宣帝詔賜車葢持髙一尺以彰有德又}
