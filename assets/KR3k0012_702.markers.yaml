  - {type: variant, offset: 3365, length: 0, content: '', SBCK: 登九天􅀆撫彗星又曰乗水車􅀆荷蓋駕雨龍􅀆􅆖螭宋玉髙唐賦曰蜺爲旍翠爲蓋風起雨霽千里而逝司馬相如大人賦曰屯余車其萬乗􅀆綷雲而樹華旗綷于對切阮籍清思賦曰折丹木以蔽陽竦芝蓋之三重劉植魯都賦曰蓋如飛鵠馬如游魚宋玉大言賦曰圎天爲蓋方地爲輿太平御覽卷第七百二}
