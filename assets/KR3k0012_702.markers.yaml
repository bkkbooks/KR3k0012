  - {type: variant, offset: 1589, length: 236, content: 郭子橫洞冥記曰上起神明臺上有金床象席雜玉為龜甲屏風拾遺錄曰董偃嘗臥延清之室設紫瑠璃屏風列麻油燈於戶外視屏風若無屏風矣侍人唯見燈明以言無礙乃於屏風外扇偃曰玉石豈須扇而後清涼也侍者乃屏風扇以手摸之方知有屏風之礙矣又曰孫亮作瑠璃屏風甚薄而徹每於月下清夜舒之常愛寵四姬使坐屏風中外望之乃如無隔唯香氣不通於外劉向七略別傳曰臣與黃門侍郎歆以列女傳種類相從為七篇以著禍福榮辱之効是非得失之分畫之於屏風四堵桓任別傳曰任子亡愍念之為作象著屏風置座邊古今注曰孫亮作瑠璃屏風鏤作瑞應圖一百二十種, SBCK: ''}
