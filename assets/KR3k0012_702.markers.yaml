  - {type: variant, offset: 2633, length: 2, content: 許玄, WYG: 諸葛武侯與宣王在渭濵將戰武侯乘素輿葛巾白羽扇指麾三軍三軍皆隨其進止又曰胡母彦國至湘州坐㕔事斷官事爾時三伏中傍揺扇視事其兄子光從容顧謂曰彦國復何為自貽伊戚又曰庾翼為荆州都督以毛扇上成帝帝疑是故物侍中劉劭曰栢梁雲構匠者先居其下管絃繁奏䕫牙先聆其音翼之上扇以好不以新季恭聞之曰此人宜在帝左右俗説曰顧虎頭為人畫扇作稽阮而都不㸃眼睛主問之顧荅曰那可㸃睛㸃睛便語列仙傳曰介之推隨晉重耳去國后辭禄與母入介山從伯陽游後世見在東海王治賣扇搜神記曰魯少千山陽人漢文帝微服懷金欲問其道少千執象牙扇出應門續搜神記曰吴猛好道術嘗渡江以白羽扇畫水横流直過不用舟檝也異苑曰髙平檀茂宗義熈中喪亡其母劉氏夣見宗云方永違離今以此扇奉别母流涕覺於屏風間得扇上皆如蜘蛛網絡婦人集曰没太子妻李氏為夫所遣婦與夫書并致安衆扇兩雙古詩曰綾扇如團月出自機中素畫作秦女形乘鸞入煙露班婕妤扇詩曰新裂齊紈素鮮潔如霜雪裁為合歡扇團團似明月出入君懷䄂動揺微風發魏陳王曹植九華扇賦曰昔吾先君常侍得幸漢桓帝帝特賜尚方竹扇不方不員其中結成文名曰九華其辭曰形五離而九折篾氂解而縷分效虬龍之蜿蜒法雲霓之烟煴因形致好不常厥儀方不應矩圓不中規隨皓腕以徐轉發惠風之微寒時氣清以芳厲紛飄動乎綺紈徐幹團扇賦曰惟合歡之奇扇肇伊洛之纎素仰明月以取象規圓體之儀}
