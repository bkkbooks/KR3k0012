  - {type: variant, offset: 1121, length: 1, content: 鏗, SBCK: 子良孫賁字文奐形不滿六尺神識耿介㓜好學有文才能書善􅀞於扇上圖山水咫尺之内便覺萬里爲遥又曰劉祥字顯徴輕言肆行不避髙下建元中爲正貟郎司徒禇彦回入朝以腰扇鄣日祥從側過曰作如此舉止羞面見人扇鄣何益彦回曰寒士不遜祥曰不能殺􅀽劉安得免寒士又曰蕭子顯頗􅀒才氣反掌選見九流賔客不與交言但舉扇一撝而巳衣冠竊恨梁書曰臨川王宏子正表糿不慧常執白團扇湘東王取題八字銘玩之正信不知嗤之終常摇握又曰栁惲早有令名少工篇什爲詩云亭皐木葉下隴首秋雲飛琅瑘王融見而嗟賞因書齋壁及所執白團扇南史張敷字景胤生而母亡}
  - {type: page-break, offset: 1121, content: '', id: KR3k0012_SBCK_702-3a}
  - {type: variant, offset: 1121, length: 1, content: 鏗, WYG: 子良孫賁字文奐形不滿六尺神識耿介幼好學有文才能書善畫於扇上圖山水咫尺之内便覺萬里為遥又曰劉祥字顯徴輕言肆行不避髙下建元中為正員郎司徒禇彦回入朝以腰扇障日祥從側過曰作如此舉止羞面見人扇障何益彦回曰寒士不遜祥曰不能殺袁劉安得免寒士又曰蕭子顯頗負才氣及掌選見九流賔客不與交言但舉扇一揮而已衣冠竊恨梁書曰臨川王宏子正表幼不慧常執白團扇湘東王取題八字銘玩之正表不知􅅓之終常揺握又曰栁惲早有令名少工篇什為詩云亭皋木葉下隴首秋雲飛瑯瑘王融見而嗟賞回書齋壁及所執白團扇南史張敖字景𦙍生而母亡}
