  - {type: variant, offset: 1124, length: 1, content: 歲, SBCK: 􅀊許求母遺物而散施巳盡唯得一􅀞扇乃緘録之毎至感思輙開笥流涕又曰羊欣字敬元㑹稽王丗子元顯每使書扇常不奉命元顯怒乃以爲後軍府舎人又曰何戢美容儀動止與禇彦回相慕}
