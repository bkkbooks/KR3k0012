  - {type: variant, offset: 331, length: 238, content: 長夜之樂上以伯新起數目禮之因顧指畫而問伯紂為無道至於是虖伯對曰書云迺用婦女之言何有踞肆於朝所謂眾惡歸之不如是之甚者也上曰茍不居此此圖何戒伯曰沈湎于酒微子所以告去也式號式謼大雅所以留連也師古曰大雅蕩之詩云式號式謼俾晝作夜醉號謼以晝為夜流連作詩之歡而泣涕流連也而諸書乃以留連荒亡蓋失之矣大雅以流連不謂飲酒之人也謼音大故反詩書淫亂之戒其厚皆在於酒上迺喟然歎曰吾久不見班生今日復聞讜言放等不懌又曰成帝省減椒房掖庭用度許皇后上疏曰設妾欲作某屏風張於某所必繩妾以詔書矣又曰王莽常翳雲母屏風, SBCK: 擁身扇}
