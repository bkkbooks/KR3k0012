  - {type: variant, offset: 2758, length: 5, content: 事云謂帟在, krp: 襚衣也殯三加遂深禮厚之與之犀軒直盖犀軒卿車直盖髙盖家語曰孔子將行命從者持盖旣而果雨聖人無所不通也又曰孔子將行雨無蓋門人曰啇也有焉孔子曰啇也之爲人也甚短於財吾聞與人交者推其長者違其短者故能以乆也史記曰五羖大夫相秦也勞不坐乗暑不張蓋漢書曰上官傑少時爲羽林郎從武帝上甘泉天大風車不得行解蓋投之傑奉蓋雖風常屬車雨下蓋輙御上竒其材力焉又曰黄覇爲揚州刺史三年宣帝詔賜車蓋特髙一尺以彰有德又}
