  - {type: variant, offset: 3176, length: 175, content: 人聞神在此因以相害神荅曰如府君所慮當相捨去遂無聲支僧載外國事曰斯訶調國有大富長者條三彌與佛作金薄承塵一佛作兩重承塵抱朴子曰余友人滕永叔嘗養大獼猴以鐵鏁鏁之著床間而犬忽齧殺之永叔便合鏁埋之後百許日有鬼者見獼猴走上承塵上不悟是獼猴鬼也驚指之曰獼猴何以被傷流血斷走乎永叔曰始乃今日知猴死復有鬼乎語林曰傅信忿母母羸病恒驚悸信乃取鷄鴨去毛置承塵上行落地母輒恐怖, SBCK: ''}
