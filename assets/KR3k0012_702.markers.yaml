  - {type: variant, offset: 2112, length: 0, content: '', SBCK: 一名條翮一名反影時有南歐獻二美女更摇此扇侍於王側丗說曰王大將軍在西朝時見周侯轉扇鄣靣而得住後度江左不能復尓王歎曰不知吾進伯仁退敦性强梁自少而長季倫斬妓曽無異色如斯傲恨惲於周顗斯不然之言又曰温嶠娶姑女旣婚交禮女以手披紗扇撫掌大􅀏我嫌是老奴果如所疑又曰羊孚作雪讃云資清以化乗氣以霏值象能鮮即㓗成暉桓胤遂以書扇}
