  - {type: variant, offset: 3243, length: 632, content: 藏六腑洗之還內腹中卒於鄴宮寺復有沙門從雍州來稱見澄西入關石季龍掘而觀之唯有一石而無尸季龍惡曰石者朕也葬我而去吾將死矣明年季龍死梁書曰沙門釋寶誌不知何許也於宋太始中見之出入鍾山往來都邑年已五六十矣宋齊之交稍顯靈跡被髮徒跣語嘿不論或被錦袍飲啖同於凡俗恒以鏡銅剪刀鑷屬柱杖負之好為懺記所謂志公符是也天監十三年卒將死忽移寺金剛像出置戶外語人云菩薩當去旬曰無疾而終先是瑯琊王筠至莊嚴寺寶誌遇之與交言歡飲至亡勑令筠為碑蓋先覺也洛陽伽藍記曰沙門寶公不知何許人也刑皃寢陋心識通達過去未來預覩三世發言似讖不可得解事過之後始驗其實胡太后問以世事寶公曰把粟與雞喚朱朱時人莫解建義元年后為爾朱榮所害始驗其言又曰法雲寺西域烏長國胡沙門曇摩羅所立摩羅聰惠利根學窮釋氏至中國即曉魏言及隸書凡所聞見無不通解京都沙門好胡法者皆就摩羅授持之戒行真苦秘呪神驗呪枯樹能生枝葉呪人變為驢馬見者莫不驚怖西域所齎舍利骨及佛牙經像皆在此寺高僧傳曰耆域天笁人以晉惠之末至于洛陽見洛陽宮城云髣髴似忉利天宮但自然之與人事不同耳又曰匠此宮者從忉利天來成便還天上矣又曰犍陁勒者本西域人來至洛陽積年雖敬其風操而終莫能測後謂眾僧曰洛東南有槃鴟山山有寺廟處基摭猶存可共修立眾未之信試遂撿視入山到一處四面平坦勒示云此山寺基也即掘之果得寺下石基後示講堂僧房處如言皆驗眾咸驚歎因共修立焉又曰釋曇始關中人晉孝武太元末齎經律數十部往遼東宣化顯授三乘高句驪聞道之始也義熙初復還關中始足白於面雖跣涉泥水未常沾濕天下咸稱白足和尚又曰釋法成涼州人, WYG: ''}
