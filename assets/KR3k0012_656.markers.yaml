  - {type: variant, offset: 69, length: 0, content: '', SBCK: 可更呼上客咸驚愕請髙入廟神告髙曰吾昔外國與子俱出家學道好行布施而性多瞋怒今爲宫亭廟神周廻千里並吾所治以布施故珎玩甚豐以瞋恚故墮此神報今見同學悲欣何言壽盡旦夕而醜形長大若於此捨命穢汚江湖當渡山西澤中此身滅後恐墮地獄吾有絹千疋并雜寶物可爲立法營塔使生善處也髙曰故來相度何不出形神曰形甚醜異衆人必懼髙曰但出衆不怪也神從牀後出頭乃是大蟒不知尾之長短至髙膝邊髙向之􅆊語數番賛唄數契蟒悲淚如雨須􅁷還隱髙卽取絹物辭別而去舟侣颺帆蠎復出身登山而望衆人舉手然後乃滅倐忽之頃便達豫章卽以廟物爲造東寺髙去後神卽命過暮有一少年上船長跪髙前受其呪願忽然不見髙謂船人日向之少年卽宫亭廟神也得離惡形矣又日竺曇摩羅刹此云法護其先月支人本姓支氏世居燉煌郡年八歲出家遂隨師至西域遊厯諸國遂通外國之言三十六種書亦如之以晉武之末隱居深山山有淸泉􅁪取澡漱後有採薪者穢其水側俄頃而燥護乃徘徊歎日人之無德遂使淸泉輟流水若永竭眞無以自給正當移去耳言訖而泉流滿㵎法護以世居燉煌而化道周洽時人咸謂燉煌菩薩也又日帛逺字法祖才思俊徹敏朗絶倫誦經日八九千言研味方等妙入幽微世俗墳典多所該貫晉惠之末太宰河閒王顒鎭􅀜中虚心敬重待以師友之禮毎至閑辰靜夜輒談講道德于時西府初建俊又甚盛能言之士咸伏其逺達後奄然命終群胡各起塔廟少時有一人姓李名通死而更蘇云見祖法師在閻羅王處爲王講首楞嚴經云講畢往忉利天又見祭酒王浮被鎖械求祖讖悔昔祖平素之日與浮毎爭邪正浮屢屈旣瞋不自忍乃作老子化胡經以誣謗佛法殃有所歸故死方思悔又曰佛馱跋陁羅此云覺賢本姓}
