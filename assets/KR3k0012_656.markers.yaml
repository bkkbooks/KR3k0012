  - {type: variant, offset: 4136, length: 0, content: '', SBCK: 夕見火從繩床後出燒身經二日方盡煙焰張天而房不燼弟子收遺􅁅架以塼塔又曰阿訶羅竭者多行頭陁獨宿山野晉惠帝元康元年乃西入止婁至山石室中坐禪此室水旣逺時人欲爲開澗竭日不假相勞乃自起以左腳蹍尺展反室西壁䧟沒指旣拔足水從中出淸香軟美四時不絶來飲者皆止飢渴除病又曰竺法慧本􅀜中人晉康帝建元中至襄陽止羊叔子寺不受别請每乞食輒賫繩牀自隨於閑曠之路則施之而坐時或遇雨以油帔自覆雨止唯見繩床不知慧所在訊問未息慧已在繩床每語弟子法照日汝過去時折一雞腳其殃尋至俄而照爲人所擲腳遂永疾又曰渉公西域人言未然之事驗若指掌以苻堅建元十一年至長安能以祕呪呪下神龍每旱堅常請之呪龍俄而龍下鉢中天輒大雨堅及羣臣親就鉢觀之咸歎其異又曰杯渡者不知姓名常以木杯渡水因而爲目不脩細行神力卓越世莫測其由來唯持一蘆圌子更無餘物向廣陵遇村舎有李家設八􅀜齋}
