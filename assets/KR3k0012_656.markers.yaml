  - {type: variant, offset: 374, length: 0, content: '', WYG: 所在後三日乃見西界蒙籠樹下坐李禮拜請還家供養渡不甚持齋飲酒噉肉至於牛鱠與俗不殊清旦忽云欲得一袈裟中時合辦李即經營至中時未成渡云暫出至暝不返合境聞有異香疑其為怪處處覔渡乃見在北岩下鋪敗袈裟於地卧而死也頭前脚後皆生蓮花花極鮮香邑共殯之後數日有人從北来云見渡負蘆圌行向彭城乃共開棺唯見鞋履既至彭城有白衣黄欣深信佛法見渡禮拜請還處家家貧但有麥飯而已渡甘之怡然止將半年忽語欣可覓蘆􅂒三十六枚吾湏用之答云此間正可有十枚貧無以買恐不盡辦渡曰汝但檢覔宅中應有欣即窮檢果得三十六枚列掛之庭中雖有其數亦多破損}
