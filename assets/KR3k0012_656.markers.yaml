  - {type: variant, offset: 84, length: 1, content: 還, krp: 風雨適時寒暖應節百穀滋繁桑麻鬱茂如此持齋亦以大矣不殺亦以衆矣寧在闕半日之湌全一禽之命然後方爲弘濟耶帝乃撫几歎日夫}
  - {type: variant, offset: 85, length: 0, content: '', WYG: 顯獨留山中燒香禮拜翹感舊跡如覩聖儀至夜有三黒獅子来蹲踞顯前䑛唇揺尾顯誦經不輟一心念佛獅子乃低頭下尾伏顯足前顯以手摩之咒曰若欲相害待我誦竟若見試者可便退矣獅子良乆乃去明晨乃還路窮幽梗止有一徑通行未至里餘忽逢一道人年可九十餘容服麄素而神氣儁逺顯雖覺其韻髙竟不悟是神人後又逢一少僧顯問曰向者耆年是誰耶答曰頭􅀈迦葉大弟子也顯方大恨更追至山所有横石塞于室口遂不能入顯流涕而去又曰曇無竭此云法勇至罽賔國禮拜佛鉢住嵗餘學梵書語求得觀世音受記經梵文一部復西行雖屡經危棘而恒念所賫觀世音經未嘗暫廢將至舎衛國中野逢山象一羣無竭稱名歸命即有獅子從林中出象驚惶奔走後渡恒河值野牛一羣鳴吼而来將欲害人無竭歸命如初尋有大鷲飛来野牛驚散其誠心所感在險克濟皆此類也又曰釋智嚴晋義熈十三年宋武帝西伐長安尅㨗旋斾塗出山東時與始興公王恢從駕遊觀山川至嚴精舎見其同止三僧各㘴䋲床禪法湛然恢至良乆不覺弹指三人開眼俄而還閉問不與言恢心敬精竒訪諸耆老皆云此三僧隐居求志髙潔法師也恢即啓宋武延請還都莫肯行者既屡請情至三人惟嚴随行恢道懐素䔍禮事甚勤還都即住始興寺嚴性虛靜志避諠塵恢乃於東郊起精舎即枳園寺也嚴在寺不受别請常分衛自資道化所被幽顯咸伏有見鬼者云見西州大社聞鬼相謂云嚴公至當辟易此人未之觧俄而嚴至聊問姓字果稱智嚴黙而識之宻加禮異又曰求那跋摩此云功徳鎧累世為王年十四便機見儁達深有逺度仁愛汎博崇徳務善其母嘗湏野肉令跋摩辦之跋摩曰有命之類莫不貪生夭彼之命非仁人矣母怒曰設令得罪吾當代汝跋摩他日煑油誤燒其指因謂母曰代兒忍痛母曰痛在汝身吾何能代跋摩曰眼前之苦尚不能代况三途耶母乃悔悟終身斷殺至年十八相王見而謂曰君年三十當撫臨大國南面稱尊若不樂世榮當獲聖果至年二十出家受戒乃辭師違衆林棲谷飲孤行山野遯迹人世往獅子國觀風聞教識真之衆咸謂已得初果儀刑感物見者發心元嘉初文帝知跋摩已至南海於是勅州郡令資發下京路由始興經停嵗許始興有虎市山峰嶺髙絶跋摩謂其髣髴耆闍乃改名靈鷲於山寺之外别立禪室去寺數里磬聲不聞每至鳴椎䟦摩已至或冐雨不霑或履泥不汚時道}
