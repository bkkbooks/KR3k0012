  - {type: variant, offset: 882, length: 188, content: 入境自稱沙門容服非常事應檢察權曰昔漢明帝夢神號稱為佛彼之所事豈非其遺風耶即召僧會詰問有靈驗否會曰如來遷逝忽逾千載遺骨舍利神曜無方昔阿育起塔八萬四千塔寺之興以表遺化也會乃潔齋靜室以銅瓶加几燒香禮請三七日果獲舍利權大歎服即為建塔號建初寺名其地為佛陁里又曰帛尸梨密多羅此云告攴西域人呼為高座傳云國王之子當承繼世而以國讓弟遂為沙門密天姿高朗風神超邁晉永嘉初始到中國值亂仍過江上建初寺丞, WYG: ''}
