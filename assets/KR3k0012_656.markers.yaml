  - {type: variant, offset: 98, length: 5, content: 慧琳秦郡秦, SBCK: 寶意世居天竺以宋孝建中來止京師瓦官禪房􅁪於寺中樹下坐禪又曉經律時人號爲三藏常轉側數百具子立知吉凶善能神呪以香塗掌亦見人往事宋祖施一銅唾壷髙二尺許常在牀前忽有人竊之意取竹蓆一領空卷之呪數通經于三夕唾壷還在蓆中莫測其然又日竺法崇嘗遊湘州麓山山精化爲夫人詣祟請戒捨所住山以爲寺崇居之少時化洽湘土又日釋法安一名慈欽未詳何許人善能開化愚蒙拔邪歸正晉義熈中新陽虎災}
