  - {type: variant, offset: 86, length: 3, content: 姓湯位, WYG: 莫不肅然増敬寺有寳月殿摩跋於殿北壁手自畫作羅漢像乃定光儒童布髮之形像成之後每夕放光此山夲多虎灾自䟦摩居之晝行夜徃或時値虎以杖按頭戯之而去於是山旅水賔去来無梗嘗於别室坐禅累日不出寺僧遣沙彌候之見一白獅子縁柱而立亘室彌漫生青蓮華沙彌驚恐大呼徃逐獅子豁無所見後文帝重勅觀寺等復更敦請乃泛舟下都以元嘉八年正月達于建業文帝引見因問曰弟子常欲持齋不殺廹以身殉物不獲從志法師既不逺萬里来化此國將何以教之䟦摩曰大道在心不在事法由巳非岀人且帝王與匹夫所修各異匹夫身賤名劣言令不威若不尅已苦躬將何為用帝王以四海為家萬民為子出一嘉言則士庶咸悦布一善政則神人以和刑不夭命役無勞力則使風雨適時寒煖應莭百穀滋繁桑麻欝茂如此持齋亦以大矣不殺亦以衆矣寕在闕半日之飡全一禽之命然後方為宏濟耶帝乃撫几歎曰夫俗人迷於逺理沙門滯於近敎迷逺理者謂}
