  - {type: variant, offset: 109, length: 0, content: '', WYG: 時邕見一人着单衣袷風姿端雅從者二十餘人請受五戒邕以果先夢知是神仙乃為説法受戒神贈以外國匕著禮拜辭别倐忽不見又曰釋僧苞建三七日普賢齋懴至第十七日有白鵠飛来集普賢座前至中行香畢乃去二十一日將暮有黄衣四人繞塔數匝忽然不見又曰支曇蘭晋太元中逰剡縣後憇始豐赤城山見一䖏林泉清曠而居之經數十日忽見一人長數丈呼蘭令去又見諸異形禽獸以恐蘭見蘭恬然自得乃屈膝禮拜云珠欺王是家舅今徃常鄉山就之推此處以相奉爾後三年忽聞車騎隠隠從者彌峯俄而有人著幘稱珠欺王通既前從其妻子男女等二十五人並形貎端正有逾於世既至蘭所致敬訖蘭問住在何處答曰在樂安縣常鄉山久服風聞今與家累仰投乞受歸戒蘭即為授之受法竟䞋錢一萬宻貯二噐辭别而去便聞鳴笳鼔吹响振山谷禅衆十餘共所聞見又曰釋𤣥高母梦梵僧散花滿室覺便懐胎及生男家内忽有異香光明照壁迄旦乃息母以兒生瑞兆因名靈育}
