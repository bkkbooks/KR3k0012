  - {type: variant, offset: 360, length: 169, content: 昭七尺之尸至夜而亡時人以為知命建康實錄曰沙門支遁字道林常隱跡東山不遊人事好養鷹馬而不乘放人或譏之遁曰貧道愛其神駿耳卒後戴安道常經其墓歎曰德音未遠而拱木已積蓋神理綿綿不與氣運俱盡耳支遁傳云本姓關氏陳留人或云河東林慮人幼有神理聰明秀徹初至京師太原王濛甚重之曰造微之功不減輔嗣又曰王坦之初與沙門笁法仰甚厚每共論幽冥報應使要先死者當報其事後經歲師, SBCK: 外國匕箸禮拜辭別倐}
