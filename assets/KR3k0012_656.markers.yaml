  - {type: variant, offset: 2738, length: 386, content: 獲增一阿含經果稱四河入海無復河名既懸與經符遂為永式異僧上晉書曰鳩摩羅什天笁人也世為國相父鳩摩炎聰懿有大節將嗣相位乃辭出家東度蔥領龜茲王聞其名郊迎之請為國師王有妹年十二才悟明敏諸國交聘並不許及見炎心欲當之乃逼以妻焉既而羅什在胎其母慧解倍常及年七歲母遂與俱出家羅什從師受經日誦千偈義亦自通年十二其母攜到沙勒國王甚重之遂停沙勒一年愽覽五經為性率達不拘小撿專以大乘為化諸學者共師焉年二十龜茲王迎之還國廣說諸經四遠學徒莫之能杭西域諸國咸伏羅什神雋符堅聞之乃遣呂光率兵伐龜茲謂光曰若獲羅什即馳驛送之光還至涼州聞符堅為姚萇所害於是竊號河右羅什在涼州積年姚興破呂隆乃迎羅什待以國師之禮嘗講經于草堂寺忽下高座謂興曰有二小兒登吾肩欲鄣須婦人興以宮女進之生二子焉又曰沙門曇瞿禿髮傉檀時從河南來持一鍚杖令人跪曰此是波若眼奉之可以得道或人藏其鍚杖曇瞿大哭數聲開目須臾起而取之咸奇其神異莫能測也後兵亂, WYG: 訪問竟}
