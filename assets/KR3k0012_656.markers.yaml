  - {type: page-break, offset: 69, content: '', id: KR3k0012_SBCK_656-2b}
  - {type: variant, offset: 69, length: 0, content: '', WYG: 可便呼上客咸驚愕請高入廟神告高曰昔吾外國與子俱岀家學道好行布施而性多瞋怒今為䢼亭廟神周廽千里並吾所治以布施故珍玩甚豐以瞋恚故堕此神報今見同學悲欣何言夀盡旦夕而醜形長大若於此捨命穢汚江湖當渡山西澤中此身滅後恐堕地獄吾有絹千疋并雜寳物可以立法營塔使生善處也高曰故来相度何不出形神曰形甚醜異衆人必懼高曰但岀衆不怪也神從牀後出頭乃是大蟒不知尾之長短至髙膝邉高向之梵語數畨賛咒數契蟒悲淚如雨湏臾還隠高即取絹物辭别而去舟侶颺㠶蟒復出身登山而望衆人舉手然後乃滅倐忽之頃便達豫章即以廟物為造東寺高去後神即命過暮有一少年上船長跪髙前受其咒願忽然不見高謂船人曰向之少年即䢼亭廟神也得離惡形矣又曰竺曇摩羅刹此云䕶法其先月支人夲姓文氏世居燉煌郡年八嵗出家遂随師至西域遊歴諸國遂通外國異言三十六種書亦如之以晉武之末隠居深山山有清泉恒取澡潄後有採薪者穢其水側俄頃而燥䕶乃徘徊歎曰人之無徳遂使清泉流輟流水若永竭真無以自給正當移去耳言訖而泉流滿澗其幽誠所感如此䕶世居燉煌死而化道周洽時人咸謂燉煌菩薩也又曰帛逺字法祖才思俊徹敏朗絶倫誦經日八九千言研味方等妙入幽微世俗墳典多所該貫晉惠之末太宰河澗王顒鎮關中虛心敬重待以師友之禮每至閒辰靜夜輙談講道徳于時西府初建俊乂甚盛能言之士咸服其逺達後奄然命終羣胡各起塔廟少時有一人姓李名通死而更蘇云見祖法師在閻羅王處為王首講楞嚴經云講畢往忉利天又見祭酒王浮被鎻械求祖懴悔昔祖平素之日與浮論爭邪正浮屡屈既瞋不自忍乃作老子化胡經以誣謗佛法殃有所歸故死方思悔又曰佛䭾跋跎羅此云覺賢夲姓}
