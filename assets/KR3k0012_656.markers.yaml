  - {type: variant, offset: 4140, length: 1, content: 母, SBCK: 舉不能動渡食竟提之而去􅀏曰四天王福于李家于時有一竪子窺其圌中見四小皃並長四寸面目端正衣裳鮮潔於是追覓不知所在後三日乃見西界蒙籠樹下坐李禮拜請還家供養渡不堪持齋飲酒噉肉至於辛鱠與俗不殊淸旦忽云欲得一袈裟中時令辨李卽經營至中時未成渡云暫出至冥不返合境聞有異香疑之爲怪處處覓渡乃見在北岩下敷敗袈裟於地卧之而死頭前腳後皆生蓮花花極鮮香邑共殯之後數日有人從北來云見渡負廬圌行向彭城乃共開棺唯見鞋履旣至彭城有白衣}
