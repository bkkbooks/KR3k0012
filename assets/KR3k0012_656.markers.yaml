  - {type: variant, offset: 1191, length: 1627, content: 鄴遇佛圖澄而見嗟賞與語終日因事澄為師澄講安覆疑難鋒起安挫銳解紛行有餘力後避地南杸襄陽時襄陽習鑿齒鋒辯天逸籠罩當時其先籍安高名早以致書通好及聞安至即往修造既坐稱言四海習鑿齒安曰彌天釋道安時人以為名荅安常注諸經恐不合理乃誓曰若所說不甚違理願見瑞相乃夢見胡道人頭白眉毛長語安云君所注經殊合道理我不入泥洹住在西域當相助弘通可時設食後至遠公乃知和上所夢賓頭盧也以晉太元十年卒年七十二羅什在西國聞安風謂是東方聖人恒遙禮之初安生而便左臂有一皮廣寸許著臂上可得上下之唯不得出手時人謂之為印手菩薩又曰惠遠姓賈鴈門樓煩人也屆尋陽見廬峰清靖足以息心始住龍泉精舍剌史桓伊乃為遠又於山東立房殿即東林是也絕塵清信之賓並不期而至彭城劉遺民豫章雷次宗鴈門周續之新蔡畢頴之南陽宗炳等並棄世遺榮依遠遊止著法性論羅什見而歎曰邊國未有經便闇與理合豈不妙哉遠卜居廬阜三十餘年影不出山跡不入俗每送客常以虎溪為界焉惠遠集云隆安六年桓玄遣書於惠遠言沙門令致敬王者惠遠荅書論不可致之意又言袈裟非朝廷之服鉢盂非廊廟之器軍國非沙門之像竊所未安遂著沙門不敬王者論五篇一論家二論出家三論出求宗不順化四論體不兼應五論形盡神不滅著是五論以明出家之法不合同俗以致敬於王者又曰笁道生姓魏鉅鹿人幼而頴悟聰哲若神初入廬山幽栖七年後還都止青園寺王弘范泰顏延之並挹敬風猷從之問道生曰夫象以盡意得意則忘象言以詮理入理則言息自經典東流譯人重阻多守滯文鮮見圓義若忘筌取魚始可與言道矣於是校閱真俗研思因果迺言善不受報頓誤成佛剖析經理洞入幽微迺說阿闡提人皆得成佛于時大部未傳舊學以為邪說譏憤滋甚後涅槃大本至于南京果稱闡提悉有佛性與前所說若合符契又曰釋惠觀姓崔清河人十歲便以博見馳名晚適廬山諮稟惠遠什公入關乃自南徂北訪覈異同詳辨新舊風神秀雅思入玄微時人稱之曰通情則生融上首精難則觀肇第洛陽伽藍記曰融覺寺比丘曇謨最善於釋學講涅槃花嚴僧徒千人天笁國胡沙門菩提流支見其徒禮之號為菩薩流支解佛義知名西土西土諸夷號為羅漢流支讀曇謨㝡大乘義章每彈指贊歎唱言微妙即為胡書寫之傳於西域西域沙門常東向遙禮之號為東方聖人又曰僧肇法師制四論合為一卷曾呈廬山遠大師大師歎仰不已又呈劉遺民歎曰不意方袍復有平叔方袍之語出遺民也又曰佛耶舍此云覺明日誦三萬言洞明三藏與羅什法師情好共出毗婆沙論及四分律為人髭赤時號為赤髭三藏談藪曰北齊高祖多殺戮有稠禪師者以業行著稱箴之曰陛下羅剎化臨水必自見之如其言果見群羅剎在其後於是乃禁斷鷹鷂造佛寺斷屠殺不食肉又曰汝南周捨清信士也學通內外兼有口才謂沙門法雲曰孔子不飲盜泉之水法師何以捉鍮石香鑪荅曰檀越既能載纛貧道何為不執鍮僕射徐孝嗣修緝高座寺多在被宴息法雲曰法師亦治蕭寺日夕遊此二寺鄰椄而不相往來嗣常謂法師常在高座不遊高座寺荅曰檀越既事蕭門何不至蕭寺又曰魏李恕聘梁沙門重公椄恕曰向來全無葅膎戶佳切恕父名諧以為犯諱恕曰短髮粗踈重公曰貧道短髮沙門種類以君交聘二國不辨膎諧重公常謁高祖問曰弟子聞在外有四聲何者為是重公應聲荅曰天保寺剎及出向劉孝綽道以此為能綽曰何如道天子萬福高僧傳曰三藏法師玄獎陳留人姓陳氏貞觀初肇自咸京誓往西國窮覽聖跡經六載至摩伽陁城凡十二年備歷聖君龍庭之文就嶺之祕皆研機覩奧矣又造伽葉結集之墟千聖道成之樹虔心頂禮焚香散花設大施會於是五天億眾十八國王獻氈投珠積如山岳咸稱法師為大乘也及東歸太宗詔留於弘福道塲乃召名德僧靈潤等二十人譯梵自菩薩戒至摩訶般若惣七十四部一千三百餘軸法師身長八尺眉目踈朗凡所遊歷一百二十八國長阿含經曰凡沙門衣鉢隨身譬如飛鳥四十二章經曰僧行道如牛負深泥中疲極不敢左右顧增一阿含經曰沙門皆草蓐為床又曰四河入海無復河名四姓為沙門皆稱釋種無為經曰沙門有三坐禪為上輩誦經為中輩助眾為下輩道安傳曰初魏晉沙門依師為姓故姓各不同安以為大師之本莫尊釋迦乃以釋命氏後獲增一阿含經果稱四河入海無復河名既懸與經符遂為永式異僧上晉書曰鳩摩羅什天笁人也世為國相父鳩摩炎聰懿有大節將嗣相位乃辭出家東度蔥領龜茲王聞其名郊迎之請為國師王有妹, SBCK: ''}
