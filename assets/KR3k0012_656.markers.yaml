  - {type: variant, offset: 105, length: 9, content: 姓劉氏少出家住治城, SBCK: 而至投之樹北見安如喜驚跳伏安前安爲說法授戒虎踞地不動有頃而去及旦村人追虎至樹下見安大驚謂是神人遂傳之一縣士庶莫不祟奉虎灾由此遂息因改神廟留安立}
  - {type: variant, offset: 105, length: 3, content: 姓劉氏, WYG: 而至投之樹比見安如喜如驚跳伏安前安為説法授戒虎踞地不動有頃而去及旦村人追虎至樹下見安大驚是神人遂傳之一縣士庶莫不宗奉虎灾由此遂息因改神廟留安立寺又曰釋曇邕於廬山之西南營立第宇與弟子曇果澄思禅門嘗於一時果夢山神求授五戒果曰家師在此可往諮受}
  - {type: variant, offset: 105, length: 9, content: 姓劉氏少出家住治城, krp: 而至投之樹北見安如喜驚跳伏安前安爲說法授戒虎踞地不動有頃而去及旦村人追虎至樹下見安大驚謂是神人遂傳之一縣士庶莫不祟奉虎灾由此遂息因改神廟留安立}
