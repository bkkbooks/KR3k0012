  - {type: variant, offset: 82, length: 0, content: '', SBCK: 帝西伐長安尅捷旋斾塗出山東時始興公王恢從駕遊觀山川至嚴精舎見其同止三僧各坐䋲床禪思湛然恢至良乆不覺彈指三人開眼俄而還閉不與言恢心敬其奇訪諸耆老皆云此三僧隱居求志髙潔法師也恢卽啓宋武延請還都莫肯行者旣屢請情至二人推嚴隨行恢道懐素篤禮事甚勤還都卽住始興寺嚴性虚靜志避諠塵恢乃爲於東郊起精舎卽枳園寺也嚴在寺不受別請常分衛自資道化所被幽顯咸伏有見􅀑者云見西州太社聞􅀑相謂云嚴公當至當辟易此人未之解俄而嚴至聊問姓字果稱智嚴黙而識之密加禮異又日求郍跋摩此云功德鎧累世爲王年十四便機見儁逺深有逺度仁愛汎愽崇德務善其母嘗須野肉令跋摩辨之跋摩日有}
  - {type: page-break, offset: 82, content: '', id: KR3k0012_SBCK_656-5b}
  - {type: variant, offset: 82, length: 0, content: '', WYG: 陽人也三嵗便度為沙彌十嵗遭父母憂志性過人葬事畢仍即還寺嘗與同學數十人於田中刈稻時有飢賊欲奪其穀諸沙彌悉走唯顯獨留語賊曰若欲湏穀随意所取但君等昔不布施故致飢貧今復奪人恐来世彌甚貧道預為君等憂耳言訖即還賊棄穀而去及受大戒常慨經律舛闕誓志尋求以晉隆安三年西度流沙將至天竺去王舎城三十餘里有一寺逼暝過之顯欲詣耆闍崛山寺諸僧諌曰路甚險阻多黒獅子亟經噉人何由可至顯曰逺渉數萬里誓到靈鷲身}
  - {type: page-break, offset: 82, content: '', id: KR3k0012_WYG_656-6b, image: WYG0898/WYG0898-0818b.png}
  - {type: variant, offset: 82, length: 0, content: '', krp: 帝西伐長安尅捷旋斾塗出山東時始興公王恢從駕遊觀山川至嚴精舎見其同止三僧各坐䋲床禪思湛然恢至良乆不覺彈指三人開眼俄而還閉不與言恢心敬其奇訪諸耆老皆云此三僧隱居求志髙潔法師也恢卽啓宋武延請還都莫肯行者旣屢請情至二人推嚴隨行恢道懐素篤禮事甚勤還都卽住始興寺嚴性虚靜志避諠塵恢乃爲於東郊起精舎卽枳園寺也嚴在寺不受別請常分衛自資道化所被幽顯咸伏有見鬼者云見西州太社聞鬼相謂云嚴公當至當辟易此人未之解俄而嚴至聊問姓字果稱智嚴黙而識之密加禮異又日求郍跋摩此云功德鎧累世爲王年十四便機見儁逺深有逺度仁愛汎愽崇德務善其母嘗須野肉令跋摩辨之跋摩日有}
  - {type: variant, offset: 83, length: 0, content: '', SBCK: 之􅀋莫不貪生夭彼之命非仁人矣母怒日設令得罪吾當代汝跋摩他日煑油誤澆其指因謂母日代皃忍痛母日痛在汝身吾何能代跋摩日眼前之苦尚不能代況三途耶母乃悔悟終身斷殺至年十八相工見而謂日君年三十當臨大國南面稱尊若不樂世榮當獲聖果至年二十出家受戒乃辭師違衆林棲谷飲􅀌行山野遯迹人世往師子國觀風闡教識眞之衆咸謂己得初果儀形感物見者發心元嘉初文帝知跋摩已至南海於是勑州郡令資發下京路由始興經停歲許始興有虎市山峯嶺髙絶跋摩謂其髣髴耆闍乃改名靈鷲於山寺之外別立禪室去寺數里磬音不聞每至鳴權跋摩已至或冒雨不霑或履泥不濕時道俗莫不肅然增敬寺有寶月殿跋摩於殿北壁手自畫作羅漢像乃作定光儒童有布髮之形像始成之後每夕放光此山本多虎災自跋摩居之晝行夜往或値虎者以杖按頭戲之而去於是山旅水賔去來無梗嘗於別室入禪累日不出寺僧遣沙彌候之見一白師子縁柱而立亘室彌漫生青蓮華沙彌驚恐大呼往逐師子豁無所見後文帝重勑觀寺等復更敦請乃泛舟下都以元嘉八年正月達于建業文帝引見因問曰弟子常欲持齋不殺迫以身殉物不獲從志法師旣不逺萬里來化此國將何以教之跋摩日失道在心不在事法由己非由人且帝王與匹夫所脩各異匹夫身賤名劣言令不威若不尅己苦躬將何爲則帝王以四海爲家萬民爲子出一嘉言則士庶咸悅布一善政則神人以和刑不天命役無勞力乃則}
