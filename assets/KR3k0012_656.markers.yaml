  - {type: variant, offset: 77, length: 0, content: '', SBCK: 母居五歲復喪母爲外氏所養從祖鳩婆利聞其聦敏兼悼其􅀌露乃迎還度爲沙彌至年十七與同學數人俱以習誦爲業衆皆一月賢一日誦畢其師歎日賢一日敵三十夫也及受具戒脩業精勤愽學群經多所通達少以禪律馳名常與同學僧迦達多共遊􅄢賔同處積歲達多雖伏其才明而未測其爲人也後於密室􅐬戸坐禪忽見賢來驚問何來荅云蹔至兜率致敬彌勒言訖便隱達多知是聖人未測淺深後屢見神變乃歸心祈問方知得不還果然常欲遊方􅀪化備觀風俗會有秦沙門智叡西至􅄢賔旣要請苦遂􅉖而許焉於是旣度䓤嶺路經六國國主矜其逺化並傾懷資奉至交趾乃附舶循海而行經一島下賢以手指山曰可止於此舶主曰客行惜日調風難遇不可停也行二百餘里忽風轉吹舶還向島下衆人方悟其神咸師事}
  - {type: page-break, offset: 77, content: '', id: KR3k0012_SBCK_656-3a}
  - {type: variant, offset: 77, length: 0, content: '', WYG: 母居五嵗後喪母為外氏所養從祖鳩婆刹聞其聰敏兼悼其孤露乃迎還度為沙彌至年十七與同學數人俱以習誦為業衆皆一月賢一日誦畢其師歎曰賢一日敵三十夫也及受真戒修業精勤博學羣經多所通達少以禅律馳名常與同學僧迦達多共遊􅄢賔同處積嵗達多雖服其才明而未測其為人也後於宻室閉戸坐禅忽見賢來驚問何來答云暫至兠率致敬彌勒言訖便隠達多知是聖人未測淺深後屡見賢神變乃歸心祈問方知得不還果常欲遊方𢎞化備觀風俗㑹有秦沙門智嚴西至罽賔既要請苦至愍而許焉於是既度葱嶺路經六國國王矜其逺化並傾懐賢奉至交趾乃附舶循海而行經一島下賢以手指山曰可止於此舶主曰客行惜日調風難遇不可停也行二百餘里忽風轉吹舶還向島下衆人方悟其神威師事}
