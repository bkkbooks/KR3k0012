  - {type: variant, offset: 94, length: 0, content: '', SBCK: 猛於奇沙國見佛文石唾壷又於此國見佛鉢光色紫紺四際盡然以香花供養頂戴發願鉢若有應能輕能重旣而轉重力遂不堪及下鉢時復不覺重至迦維羅衛國見佛髮佛牙及肉髻骨佛影佛迹炳然具存其所遊踐究觀靈變天梯地龍之事不可勝數又曰天竺沙門僧伽達禪學深明來遊宋境嘗在中坐禪日時將迫念欲虛齋乃有群鳥銜果飛來授之達多思惟彌猴奉密佛亦受而食之今鳥授食何爲不可於是授而進之又曰求郍跋陁羅此云功德賢中天竺人以大乘學故世號摩訶衍譙王欲請講華嚴經而跋陁自忖未善宋言有懷愧歎卽旦夕禮懺於觀世音乞求冥應遂夢有人白衣持劒擎一人首來至其前日何故憂耶跋陁具以事對荅曰無所多憂卽以劒易首更安新頭語令廻轉曰得無痛也荅曰不痛豁然便覺心神喜恱且起道義皆通備領宋言於是就講}
  - {type: page-break, offset: 94, content: '', id: KR3k0012_SBCK_656-7b}
  - {type: variant, offset: 94, length: 0, content: '', WYG: 猛于竒沙國見佛文石唾壺又于此國見佛鉢光色紫紺四際盡然以香花供飬頂戴發願鉢若有應能輕能重既而轉重力遂不堪及下鉢時復不覺重至迦維羅衛國見佛髪佛牙及肉髻骨佛影佛迹炳然具存其所逰踐究觀靈變天梯龍池之事不可勝數又曰天竺沙門僧迦達禅學深明来逰宋境學在中坐禅日時將廹念欲虛齋乃有羣鳥啣果飛来投之達多思維彌候奉宻佛亦受而食之令鳥授食而為不可於是授而進之又曰求那跋陀羅此云功徳賢中天竺人以大乗學故世號摩訶衍譙王欲講誦華嚴等經而跋陀自忖未善宋言有懐愧歎即旦夕禮懴於􅀚世音乞求㝠應遂夢有人白衣持劔擎一人首来至其前曰何故憂耶䟦陀具以事對答曰無所多憂即以劔易首更安新頭語令廽轉曰得無痛耶答曰不痛豁然便覺心神喜恱旦起語義皆通備領宋言於是就講}
