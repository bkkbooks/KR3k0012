  - {type: variant, offset: 3877, length: 492, content: 出家學經律不餌五穀唯食松脂隱居岩穴習禪為務後小疾便告眾云亡常誦寶積經於是自力誦之始得半卷氣劣不堪乃令人讀之一遍裁竟合掌而卒侍疾十餘人咸見空有紺馬負金棺昇空而逝又曰笁曇猷燉煌人少苦行習禪定遊江左止剡之石城山乞食坐禪後有神見形詣猷曰師威德既重來止此山弟子輒推室以相奉天台山懸崖峻峙峰嶺切天古老相傳云上有釋舍得道者居之雖有石橋跨澗而撗石斷之自終古以來無得至者猷行至橋所聞空中聲曰知君誠篤今未得度卻後十日自當來也猷每恨不得度石洞開度橋少許覩精舍神僧果如前所說因共燒香中食食畢神僧謂猷曰卻後十年自當來此今得住於是而返又曰釋曇諦其先康居人母黃氏晝寢夢見一僧呼黃為母寄一塵尾并鐵鏤書鎮二枚眠覺見兩物具存因而懷孕生諦諦年五歲以塵尾等示之諦曰秦王所餉母曰汝置何處荅曰不憶至年十歲出家學不從師悟自天發後見僧㗉音略法師㗉曰即先師弘覺法師㗉晚入吳居虎丘寺唐高僧傳曰萬廻姓張氏閿鄉人其形如愚蒙其跡乃神聖苦樂貴賤不關其心歌哭隱顯不恒其性剃髮褐衣遊伽藍年十歲有兄戍遼陽其母憶甚飯僧祈福師忽然裏齋餘出門徑去晚際執兄書至母驚問其由默然而無對後兄來還言是日萬廻云從家來啖齋餘取書而反始知其靈神焉中宗賜號玄通大居士封雲誨公, WYG: ''}
