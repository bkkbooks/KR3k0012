  - {type: variant, offset: 611, length: 244, content: 傳曰攝摩騰中天笁人漢明帝遣郎中蔡愔等往天笁尋訪佛法於彼見摩騰乃要還漢地明帝甚加賞接於城西門外立精舍以處之漢地有沙門之始也大法初傳未有歸信故蘊其深解無所宣述後卒於洛陽騰譯四十二章經一卷初緘在蘭臺騰所住處今雒城西白馬寺是也又曰笁法蘭亦天笁人自言誦經論數萬章為天笁學者之師時蔡愔既至蘭與摩騰共契遊化遂相隨而來昔漢武穿昆明池底得黑灰問東方朔朔云不經可問西域胡後法蘭至眾人追以問之蘭云世界終盡劫火洞燒此灰是也後卒於雒又曰康僧會其先康居人吳地初梁大法風化未全僧會欲使道振江左乃杖鍚東遊以吳赤烏十年初達, SBCK: 苞}
