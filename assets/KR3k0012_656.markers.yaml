  - {type: variant, offset: 373, length: 0, content: '', WYG: 名不修細行神力卓越世莫測其由来唯持一蘆圌子更無餘物向廣陵遇村舎有李家設八関齋先不相識乃直入齋堂而坐置蘆圌於中庭衆以其形陋無恭敬心李見蘆圌當道欲移置墻邉數人舉之莫能動渡食竟提之而去笑曰四天王李家于時有一䜿子窺其圌中見四小兒並長四寸面目端正衣裳鮮潔於是追覔不}
