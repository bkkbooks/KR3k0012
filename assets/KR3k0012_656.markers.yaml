  - {type: variant, offset: 856, length: 123, content: 業營立茆茨設像行道時吳初見沙門疑為矯異有司奏曰有胡人入境自稱沙門容服非常事應檢察權曰昔漢明帝夢神號稱為佛彼之所事豈非其遺風耶即召僧會詰問有靈驗否會曰如來遷逝忽逾千載遺骨舍利神曜無方昔阿育起塔八萬四千塔寺之興以表遺化也會乃潔齋靜室以銅瓶加几燒香禮請, SBCK: ''}
