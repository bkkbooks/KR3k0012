  - {type: variant, offset: 83, length: 0, content: '', krp: 之類莫不貪生夭彼之命非仁人矣母怒日設令得罪吾當代汝跋摩他日煑油誤澆其指因謂母日代皃忍痛母日痛在汝身吾何能代跋摩日眼前之苦尚不能代況三途耶母乃悔悟終身斷殺至年十八相工見而謂日君年三十當臨大國南面稱尊若不樂世榮當獲聖果至年二十出家受戒乃辭師違衆林棲谷飲孤行山野遯迹人世往師子國觀風闡教識眞之衆咸謂己得初果儀形感物見者發心元嘉初文帝知跋摩已至南海於是勑州郡令資發下京路由始興經停歲許始興有虎市山峯嶺髙絶跋摩謂其髣髴耆闍乃改名靈鷲於山寺之外別立禪室去寺數里磬音不聞每至鳴權跋摩已至或冒雨不霑或履泥不濕時道俗莫不肅然增敬寺有寶月殿跋摩於殿北壁手自畫作羅漢像乃作定光儒童有布髮之形像始成之後每夕放光此山本多虎災自跋摩居之晝行夜往或値虎者以杖按頭戲之而去於是山旅水賔去來無梗嘗於別室入禪累日不出寺僧遣沙彌候之見一白師子縁柱而立亘室彌漫生青蓮華沙彌驚恐大呼往逐師子豁無所見後文帝重勑觀寺等復更敦請乃泛舟下都以元嘉八年正月達于建業文帝引見因問曰弟子常欲持齋不殺迫以身殉物不獲從志法師旣不逺萬里來化此國將何以教之跋摩日失道在心不在事法由己非由人且帝王與匹夫所脩各異匹夫身賤名劣言令不威若不尅己苦躬將何爲則帝王以四海爲家萬民爲子出一嘉言則士庶咸悅布一善政則神人以和刑不天命役無勞力乃則}
  - {type: variant, offset: 84, length: 1, content: 還, SBCK: 風雨適時寒暖應節百穀滋繁桑麻鬱茂如此持齋亦以大矣不殺亦以衆矣寧在闕半日之湌全一禽之命然後方爲􅀪濟耶帝乃撫几歎日夫}
  - {type: variant, offset: 84, length: 0, content: '', WYG: 積年之誠既至而廢雖有險難吾不懼也衆莫能止乃遣兩僧送之顯既至山日將曛夕遂欲停宿兩僧懼捨之而}
