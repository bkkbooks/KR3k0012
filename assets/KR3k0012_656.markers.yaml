  - {type: 'tls:seg', offset: 80, content: '', id: KR3k0012_CHANT_656-2a.8}
  - {type: variant, offset: 80, length: 0, content: '', SBCK: 嘗告蒙遜云有􅀑入聚落必多灾疫遜不信欲躬見爲驗懺卽以術加之遜見而駭怖懺曰冝潔誠齋戒神呪以驅之乃讀呪三日謂遜曰􅀑已去矣時境首有見􅀑者云見數百疫􅀑奔驟而逝境内獲安懺之力也又日釋法顯姓龔平陽武陽人也三歲便度爲沙彌十歲遭父母憂}
  - {type: page-break, offset: 80, content: '', id: KR3k0012_SBCK_656-4a}
  - {type: variant, offset: 80, length: 1, content: 孝, WYG: 嘗告蒙遜云有鬼入聚落必多灾疫遜不信欲躬見為騐懴即以術加遜遜見而駭怖懴曰宜潔誠齋戒神咒以驅之乃讀咒三日謂遜曰鬼已去矣時境首有見鬼者云見數百疫鬼奔驟而逝境内獲安懴之力也又曰釋法顯姓龔平陽}
  - {type: variant, offset: 80, length: 0, content: '', krp: 嘗告蒙遜云有鬼入聚落必多灾疫遜不信欲躬見爲驗懺卽以術加之遜見而駭怖懺曰冝潔誠齋戒神呪以驅之乃讀呪三日謂遜曰鬼已去矣時境首有見鬼者云見數百疫鬼奔驟而逝境内獲安懺之力也又日釋法顯姓龔平陽武陽人也三歲便度爲沙彌十歲遭父母憂}
  - {type: variant, offset: 81, length: 0, content: '', SBCK: 性過人葬事畢仍卽還寺嘗與同學數十人於田中刈稻時有飢賊欲奪其穀諸沙彌悉走唯顯獨留語賊日若欲須穀隨意所取但君等昔不布施故致飢貧今復奪人􅂲來丗弥甚貧道預爲君憂耳言訖卽還賊弃穀而去及受大戒常􅁣經律舛闕誓志尋求以晉隆安三年西度流沙將至天竺去王舎城三十餘里有一寺逼暝過之顯欲詣耆闍崛山寺僧諫日路甚艱阻多黑師子亟經噉人何由可至顯日逺渉數萬里誓到靈鷲身命不期出息非保豈可使積年之誠旣至而廢雖有險難吾不懼也衆莫能止乃遣雨僧送之旣至山日將曛夕遂欲停宿雨僧色懼捨之而還顯獨留山中燒香禮拜翹感舊跡如覩聖儀至夜有三黑師子來蹲踞顯前䑛脣摇尾顯誦經不輟一心念佛師子乃低頭下尾伏顯足前顯以手摩之呪日若欲相害待我誦竟若見試者便可退矣師子良乆乃去明晨乃還路窮幽梗止有一徑通行末至里餘忽􅑮一道人年可九十餘容服麄素而神氣儁逺顯雖覺其韻髙而不悟是神人後又逢一少僧顯問日向者耆年是誰耶荅云頭陁迦葉大弟子也顯方大恨更追至山所有横石塞于室口遂不得入顯流涕而去又日曇無竭此云法勇至􅄢賔國禮拜佛鉢住歲餘學梵書語求得觀世音受記經􅆊文一部復西行雖屢經危險而繫念所賫觀世音經未嘗暫廢將至舎衛國中野逢山象一羣無竭稱名歸命卽有師子從林中出象驚惶奔走後渡􅁪河值野牛一羣鳴吼而來將欲害人無竭歸命如初尋有大鷲飛來野牛驚散其誠心所感在險克濟皆此􅀋又日釋智嚴晉義熙十三年宋}
