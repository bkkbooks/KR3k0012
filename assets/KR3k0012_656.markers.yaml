  - {type: variant, offset: 78, length: 0, content: '', SBCK: 於後闇夜之中忽令衆船俱發無肯從者賢自起收纜一舶獨發俄爾賊至留者悉被抄害頃之至青州東萊郡聞鳩摩羅什在長安卽往從之什大恱秦太子􅇦欲聞賢說法乃要命羣僧集論東宫羅什與賢數蕃往復什問法云何空荅曰衆微成色色自無性故離色常空又問旣以極微破色空微復去何破一微荅曰羣師或折一微我意謂不爾又問微是常耶荅曰以一微故衆㣲空以衆微故一微空時寶雲譯出此語不解其意道俗咸謂賢之所計微塵是常餘日長安學僧復請更釋賢曰夫法不自生縁㑹故生縁一微故有衆微微自無性則爲空矣寧可言不破一微常而不空乎此是問荅之大意也又曰曇無懺天竺人明解呪術所向皆驗西域號爲大呪師後隨王王卽天竺王也入山王渴須水不能得懺乃密呪石出水因賛曰大王聖化所感遂使枯石生泉隣國聞者皆歎王德于時雨澤甚調百姓稱詠王恱其道深加優寵後至涼涼王沮渠蒙遜聞懺名呼與相見接待}
  - {type: page-break, offset: 78, content: '', id: KR3k0012_SBCK_656-3b}
  - {type: variant, offset: 78, length: 0, content: '', WYG: 於後闇夜之中忽令衆舶俱發無肯從者賢自起取䌫一舶獨發俄爾賊至留者悉被抄害頃之至青州東莱郡聞鳩摩羅什在長安即徃從之什大悦秦太子泓欲聞賢説法乃要命羣僧集論東宫羅什與賢數畨徃復什問法云何空答曰衆微成色色自無性故唯色常空又問既以極微破色空復云何破一微答曰羣師或破析一微我意謂不爾又問微是常耶答曰以一微故衆微空以衆微故一微空時寳雲譯岀此語不觧其意道俗咸謂賢之所計微塵是常餘日長安學僧復請更釋賢曰夫法不自生縁㑹故生縁一微故有衆微微自無性則為空矣寕可言不破一微常而不空乎此是問答之大意也又曰曇無懴天竺人明觧咒術所向皆騐西域號為大咒師後随王王即天竺王也入山王渴須水不能得懴乃宻咒石岀水因賛曰大王惠澤所感遂使枯石生泉隣國聞者皆歎王徳于時雨澤甚調百姓稱詠王悦其道深加優寵至後凉王沮渠蒙遜聞懴名呼與相見接待}
