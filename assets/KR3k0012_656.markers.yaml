  - {type: variant, offset: 90, length: 1, content: 楊, SBCK: 道虚說滯近教者則拘攣篇章至如法師所言眞謂開悟明達可與言天人之際矣乃勑住祇洹寺供給隆厚又日曇摩密多此云法秀􅄢賔人也年至七歲神明瀓正每見法事輒自然欣躍其親愛而異之遂令出家􅄢賔多出聖達屢值明師博貫群經特深禪法所得門户極其微奥爲人沉􅃉有慧解儀軌詳正生而連眉故世號連眉禪師少好遊方有如毗羅神王衛送遂至􅀛兹於中路欲廻乃現形吿辭密多日汝神力通變自在遊處將不相隨共往南方語畢卽收影不現遂從至都卽於上寺圖像于壁迄今猶有聲影之驗潔誠祈福莫不響應又曰釋智猛雍}
