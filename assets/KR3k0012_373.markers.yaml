  - {type: variant, offset: 1662, length: 265, content: 復有過魏略曰北丁零有馬脛國聲似鴈鶩從膝脛以下生馬蹄走疾於馬正部曰夏禹治水腓無胈脛無毛山海經曰交脛國為人交脛郭璞注曰腳脛曲相交所謂交趾也有赤脛民赤水之東有長脛之國腓脹說文曰腨腓脹也腨市兗切腓符非切脹直良切易艮卦曰六二艮其腓又咸卦六二曰咸其腓凶居則吉東觀漢記曰馬援為隴西太守擊羗中矢貫腓脹上聞賜羊三千牛三百頭以養病山海經曰無䏿之國為人無䏿郭璞曰脹脹䏿音啟又公弟切韓子曰晉平公與唐彥坐而出叔向入公曳一足叔向問之公曰向吾侍唐子腓痛足痺而不可伸足爾雅曰趾足也說文曰足在下也釋名曰腳卻也以其坐時卻在後也易說卦曰震為足尚書說命曰若跣弗視地厥足用, SBCK: 毀}
