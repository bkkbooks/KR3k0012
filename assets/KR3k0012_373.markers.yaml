  - {type: variant, offset: 81, length: 0, content: '', WYG: 芮司徒生女子赤而毛弃諸堤下共姬之妾取以入名之曰棄長而美漢書曰宣帝身足下有毛卧居數有光耀師古曰遍身及足下有毛列子曰禽子問楊朱曰去子體一毛以濟一世為之乎楊子曰世故非一毛所濟出以語孟孫孟孫曰積一毛以成肌膚積肌膚以成一節一毛故萬分之一物奈何輕之山海經曰毛民為人身生毛郭璞注曰臨海東南海中有毛人晉永嘉四年得之也列仙傳曰偓佺食松實形體生毛長數寸又曰毛女字玉名姜在華隂山世又見之體生毛所止巖中恒有鼓琴聲自稱秦皇時宫人也神仙傳曰劉根學道入嵩髙山石室中冬夏不衣身毛長三尺神異經曰八荒中有毛人長七八尺身形頭上皆毛毛如獮猴長尺餘見人則口開吐舌名髯}
