  - {type: variant, offset: 3416, length: 0, content: '', WYG: 許逵别傳曰薊子訓齊人有神術人髪白者請子訓但與對坐共語宿昔間髮皆黒樊英别傳曰英被髪忽㧞刀斫舍中妻問故曰郄生道遇鈔郄生還云道遇賊被髪老人相救得全郄生名巡字仲信陳郡夏陽人能傳英業黄庭經曰髪神名蒼華列仙傳曰容成公黄帝善補導事髮白更黒寗先生稷邱君髮白更黒寗先生被髪鼓琴赤斧餌丹砂毛髪皆赤阮邱被髪覆耳成璜道士兒邱與老子黄庭經讀三遍通之俱入浮陽山白髪更黒髪長二尺餘神異經曰東荒山中有大石室東王公居之長一丈頭髮皓白身人形而虎尾與一玉女更投壺又曰西方有人焉不飲不食被髮東走已往復来其婦恒追擥録之不肯聽止婦頭亦被名曰狂一名顛一名覆此人夫妻與天地俱生狂走東西以投晝夜異苑曰有人誤吞髮便得病但欲咽猪脂張口時喉中有一頭出受膏乃取小鈎餌而引得一物長三尺餘其形似蛇而悉是脂縣於屋間旬日融盡唯髪在焉列女傳曰吳伯陽妻顧昭君早寡剪髮以眀志又曰樂羊學書其妻貞義截髮以供其費又曰廣漢馮季宰妻者李氏之女名珥字進早寡無嗣奉養繼姑守心純固以義自防珥母愍其孤苦隂有所許珥斷髮自眀鄉人稱之陳留風俗傳曰小黄縣者宋地陽武東黄鄉}
