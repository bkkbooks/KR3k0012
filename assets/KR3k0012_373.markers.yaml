  - {type: variant, offset: 1581, length: 1, content: 幼, SBCK: 微管仲吾其􅀍髮左袵矣孝經曰身體髮膚受之父母不敢毁傷孝之始也史記曰箕子諌紂不聽乃􅀍髮佯狂爲奴又曰范睢先事魏中大夫須賈賈使齊睢從齊王聞睢辯賜金及牛酒須賈以爲睢持隂事告齊旣歸以告魏相魏相魏齊大怒使笞擊范睢睢旣相秦號曰張禄}
  - {type: page-break, offset: 1581, content: '', id: KR3k0012_SBCK_373-3a}
  - {type: variant, offset: 1581, length: 1, content: 幼, WYG: 微管仲吾其被髪左衽矣孝經曰身體髮膚受之父母不敢毁傷孝之始也史記曰箕子諫紂不聽乃被髪佯狂為奴又曰范睢先事魏中大夫湏賈賈使齊睢從齊王聞睢辯賜金及牛湏賈以為睢持隂事告齊既歸以告魏相魏齊大怒使笞擊范睢睢既相秦號曰張禄}
  - {type: variant, offset: 1581, length: 1, content: 幼, krp: 微管仲吾其𬒳髮左袵矣孝經曰身體髮膚受之父母不敢毁傷孝之始也史記曰箕子諌紂不聽乃𬒳髮佯狂爲奴又曰范睢先事魏中大夫須賈賈使齊睢從齊王聞睢辯賜金及牛酒須賈以爲睢持隂事告齊旣歸以告魏相魏相魏齊大怒使笞擊范睢睢旣相秦號曰張禄}
  - {type: variant, offset: 1583, length: 15, content: 不遜悌長而無述焉老而不死是為賊, SBCK: 魏弗知使須賈於􅁗睢謂賈曰汝罪有幾曰擢賈之髮續賈之罪未足也又曰太伯虞仲知古公欲立季歴}
  - {type: variant, offset: 1583, length: 13, content: 不遜悌長而無述焉老而不死是, WYG: 魏弗知使湏賈於秦睢謂賈曰汝罪有㡬曰擢賈之髪續賈之罪未足也又曰太伯虞仲知古公欲立季歴以傳昌二人亡如荆蠻文身斷髮以讓季歴又曰藺相如使秦相如持璧却立倚柱怒髮上穿冠又曰衛皇后字子夫與武帝侍衣得幸頭解上見其髮鬢悦之因立}
