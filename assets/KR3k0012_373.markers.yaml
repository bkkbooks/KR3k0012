  - {type: variant, offset: 187, length: 1067, content: 公踰北方而墜折股戰國策曰蘇秦讀書欲睡引錐自剌其股血流至踵漢書曰高祖股上有七十二黑子又曰魏勃少時欲求見齊相曹參家貧無以自通乃早掃齊舍人門因得自進及灌嬰責其勸齊王反狀勃曰失火之家豈暇先言大人然後救火乎因退股戰不能言嬰曰人謂勃勇庸妄人耳何能為乎東觀漢記曰耿弇擊張步於東城飛矢中弇股以手中刀截之軍中無知者魏志曰諸葛亮軍退司馬宣主使張郃追之郃曰軍法圍城必闕歸軍勿追宣王不聽郃不得已逐之蜀軍乘高布伏弓弩亂發矢中郃髀股江表傳曰孫策攻苲融為流矢中傷股不能乘馬因自輿還九州春秋曰劉備奔荊州劉表甚敬禮之備作上客數年嘗於坐中起至廁見髀裏肉生流涕還坐表問備備曰昔年嘗身不離鞍鞞肉皆消今不復騎髀裏生肉日月若馳老將至矣而功業不立是以悲耳晉中興書曰王恭敗單馬奔曲阿不堪久騎兩髀生瘡不能復去曲阿人殷礭以舡載之為胡浦尉所得三國典略曰後周盧昌期祖英伯反宇文神舉討平之神舉以英伯壯節欲令寬赦軍人已割其髀肉如鵝卵矣英伯顏色不變遂遣誅之唐書曰李勣初平王世充獲其故人單雄信勣表稱其武藝請以官爵贖之高祖不許臨將就戮勣對之號慟割股肉以啖之曰生死永訣典略曰王符字節信安定人渡遼將軍皇甫規去官歸安定有人前以貨買鴈門太守者亦去官歸書剌從規規臥不迎使呼入既坐問啖鴈美乎又以其剌刮髀聞符至大禮之段龜龍涼州記曰隱王張美人年色壯艷出家為道呂隆逼之張自投門樓雙股頓折口誦經色自若俄而死太公金匱曰武王伐殷丁侯不朝尚父乃引畫丁侯射之丁侯病遣使請臣尚父乃以十干日別去箭丁侯病乃愈四夷聞皆懼越裳氏獻白鳥也山海經曰長股國為人常被髮一曰長腳范注方曰青龍中司徒吏顏奮女苦風一髀偏枯農犢民為穿地作坑取雞矢荊葉燃之令煙內脛坑中視䖝出長尺頭尾赤病愈臀廣雅曰臀謂之脽亦謂臎脽音誰臎音翠釋名曰臀遌也高厚有殿遌也周易困卦初六曰臀困于株木入于幽谷三歲不覿凶又姤卦曰臀無膚其行次且國語曰晉成公之生其母夢神規其臀以黑曰使有晉國故名之黑臀膝釋名曰膝申也可屈申也膝頭曰膞膞圓也因形圓而名之禮記檀弓下曰穆公問子思曰為舊君反服古歟子思曰古之君子進人以禮退人以禮今之君子進人若將加諸膝退人若將墜諸淵無為戎首不亦善乎又何反服之禮之有孝經曰故親生之膝下以養父母日嚴史記曰衛鞅復見孝公與語不自知膝之前於席也魏志曰朱建平善相文帝將出取馬入建平曰此馬之相今日死矣文帝將乘馬馬惡衣香囓帝膝帝大怒即使殺之又曰諸葛亮復出岐山詔張郃督諸將至木門與亮軍交戰飛矢中郃右膝薨又曰蘇則與董昭俱為侍中昭嘗枕則膝臥則推下之曰蘇則膝非佞人之枕又曰鍾繇有膝疾拜起不便常輿車上殿魏略曰初袁熙納甄后熙出行在幽州后留侍姑及鄴城破袁紹妻及后坐堂上文帝入紹舍后怖以頭伏姑膝上文帝謂曰袁, SBCK: ''}
