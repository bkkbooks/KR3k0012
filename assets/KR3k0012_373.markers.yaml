  - {type: variant, offset: 3751, length: 1, content: 五, WYG: 乃納於帝又曰張儀蘇秦二人共遞剪髪以相活或傭工寫書行遇聖人之文無以題記則以墨畫於掌内及服裏還更以竹寫之晉左思白髮賦曰星星白髪生於鬢垂雖非青蠅穢我光儀䇿名觀國以此見疵將拔將鑷好爵是縻白髮將拔惄然自訴禀命不幸值君年暮逼廹秋霜生而皓素始覽眀鏡惕然見惡朝生晝拔何辠之故}
  - {type: page-break, offset: 3751, content: '', id: KR3k0012_WYG_373-12a, image: WYG0896/WYG0896-0327a.png}
  - {type: variant, offset: 3753, length: 0, content: '', WYG: 觀橘柚一皜一曄貴其素華匪尚緑葉願戢子之手攝子之鑷咨爾白髪觀世之途靡不追榮貴華賤枯赫赫閶闔藹藹紫廬弱冠求仕童髫獻謨甘羅乗軫子竒剖符英英終賈髙論雲衢拔白就黒此自在吾白髮臨拔瞋目號呼何我之寃何子之誤甘羅自以辯慧見稱不以緑髪而名著賈生自以良才見異不以烏鬢而見舉聞之先民國用老成二老歸周周道肅清四皓佐漢漢徳光眀何必去我然後要榮咨爾白髪事故有以爾之所言非不有理曩貴耆老今薄舊齒皤皤榮期皓首田里雖有二毛河清難俟隨時之變見歎孔子髪}
