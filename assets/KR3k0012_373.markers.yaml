  - {type: variant, offset: 2635, length: 252, content: 三十國春秋曰王濟嘗與武帝棊濟伸腳在局下因問孫皓曰聞君生剝人面皮何也皓曰見人臣無禮於其君者則剝之武子大慚遽縮腳晉陽秋曰周顗既遇害王彬告之甚哀敦怒曰周伯仁凡人遇汝何為如此彬曰伯仁長者君之親友在朝雖無蹇諤亦無所阿黨且加之極刑何痛如之左右見敦盛怒竊勸跪謝彬曰腳痛不能跪拜敦復曰腳痛孰與頸痛咸為失色續晉陽秋曰習鑿齒以腳病廢於里巷符堅滅樊鄧素聞其名與釋道安俱舉而致焉與語大悅以其蹇疾裁堪半丁與諸鎮書曰晉氏平吳利在二陸今破漢南得士一人半耳三國典略曰侯景左足上有肉瘤其狀如龜戰應剋捷瘤則隱起如其不勝瘤則低下及奔敗瘤陷肉中, SBCK: ''}
