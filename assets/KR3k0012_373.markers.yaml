  - {type: variant, offset: 4073, length: 5, content: 向詡坐板床, SBCK: 梁鴻妻樵髺着布衣操作具而前鴻大喜曰此真梁鴻妻也能奉我矣字之曰德曜孟光又曰馬廖上表長樂宫曰長安語曰城中好髙髺四方髙一尺王隱晉書曰賈后作頡子髺太子見頡之象于寳晉紀曰􅀄賈后造首紒以繒􅅞其髺天下化之名頡子紒也紒户計切搜神記曰元康中婦人結髺者旣成以繒急束其環名曰纈子髻始自中宫天下翕然化之及其末年}
