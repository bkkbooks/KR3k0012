  - {type: variant, offset: 3678, length: 344, content: 少去鄉里孤無父母相隨於衛國因結兄弟長元重次仲重次叔仲次季仲次稚重期夕相事財三千萬於空城中見一老姥兄弟下車再拜曰願為母母許焉積二十四年母得病口不能言五子乃仰天歎願使我母語即便得語謂五子曰吾太原董陽猛女嫁同縣張文賢死亡我男兒名焉遺七歲值亂亡失心前有七星右足有黑識語未竟而卒五子送喪會朝歌長晨出亡其記囊疑五子所竊收得三重詣河內告枉具言始末太守號哭曰生不識父與母相失痛不自聊知近為五子所養馳使放三重會稽典錄曰黃昌為蜀郡太守初昌為州書佐婦寧於家遇賊遂流轉入蜀為民妻其子犯法乃詣昌昌疑不類蜀人因問所由對曰妾本會稽餘姚戴次公女州書佐黃昌妻嘗歸家為賊所略遂至於此昌驚呼前謂曰何以識黃昌左足心有黑子常言當為二千石乃出足示之相持悲泣還為夫妻楚辭卜居曰漁父鼓枻歌曰滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足踝, SBCK: ''}
