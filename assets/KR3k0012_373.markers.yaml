  - {type: variant, offset: 80, length: 33, content: 宋公及楚人戰於泓宋公既成列楚人未濟司馬曰彼眾我寡及其未濟也請擊之公, krp: 𥘉平王東遷辛有適伊川見𬒳髮而祭于野者}
  - {type: variant, offset: 81, length: 0, content: '', SBCK: 芮司徒生女子赤而毛弃諸堤下共􅁎之妾取以入名之曰弃長而美漢書曰宣帝身足下有毛卧居數有光耀師古曰遍身及足下有有毛列子曰禽子問揚朱曰去子體一毛以濟一世爲之乎揚子曰世故非一毛所濟出以語孟孫孟孫曰積一毛以成肌膚積肌膚以成一節一毛故萬分之一物柰何輕之山海經曰毛民爲人身生毛郭璞注曰臨海東南海中有毛人晉永嘉四年得之也列仙傳曰偓於角切佺此縁切食松實形體生毛長數寸又曰毛女字玉名姜在華隂山世世見之形體生毛所止巖中􅁪有鼔琴聲自稱秦皇時宫人也神仙傳曰劉根學道入嵩髙山石室中冬夏不衣身毛長三尺神異經曰八荒中有毛人長七八尺身形頭上皆毛毛如猕猴長尺餘見人則口開吐舌名髯}
