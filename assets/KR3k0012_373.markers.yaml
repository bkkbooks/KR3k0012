  - {type: variant, offset: 3645, length: 2, content: 足則, SBCK: 靡不追榮貴華賤枯赫赫閶闔藹藹紫廬弱冠來仕童髦獻謨甘羅乗軒子竒剖符英英終賈髙論雲衢拔白就黒此自在吾白髮臨拔瞋目號呼何我之􅁈何子之愚甘羅自以辯惠見稱不以髮黒而名著賈生自以良才見異不以厚􅁂而獲舉聞之先民國用老成二老歸周周道肅清四皓佐漢漢德光明何必去我然後要榮咨尔白髮事各有以尓之所言非不有理曩尊􅂄耋今薄舊齒皤皤榮期皓首田里雖有二毛河清難俟隨時之冝見歎孔子白髮辭盡誓以固窮昔臨玉顔今從}
