  - {type: variant, offset: 3643, length: 0, content: '', SBCK: 相活或傭力冩書行遇聖人之文無以題記則以墨􅀞於掌内及股裏夜還更以竹冩之晉左思白髮賦曰星星白髮生於􅁂垂雖非青蠅穢我光儀䇿名觀國以此見疵將鑷將拔好爵是縻白髮將拔惄然自訴禀命不幸值君年暮逼迫秋霜生而皓素如覽明鏡惕然見惡朝生晝拔何罪之故觀橘觀柚一皜一曄貴其素華匪尚緑葉願戢子手攝子之鑷咨亦白髮觀丗}
