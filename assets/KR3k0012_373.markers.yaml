  - {type: variant, offset: 4079, length: 0, content: '', SBCK: 􅉖懷之事唐書曰田悅旣敗謂其下曰吾不能自剄公當斬吾首以取功勲衆皆憐之曰死生以之恱曰吾雖死寜忘厚意於城下乎乃自割一髻以爲要誓於是將士各斷其髪結爲兄弟誓同生死唐書曰中天笁國人皆爲螺髺於頂餘髮剪之使拳丗說曰王曇孫年十四便歌謝公召至曇孫作}
