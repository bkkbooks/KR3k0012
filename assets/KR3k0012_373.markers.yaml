  - {type: variant, offset: 26, length: 0, content: '', krp: 表所以別形貌且以覆冒也左傳僖中曰君子不禽二毛二毛頭白有二色又襄五曰宋芮司徒生女子赤而毛弃諸堤}
  - {type: variant, offset: 27, length: 0, content: '', krp: 共姬之妾取以入名之曰弃長而美漢書曰宣帝身足下有毛卧居數有光耀師古曰遍身及足下有有毛列子曰禽子問揚朱曰去子體一毛以濟一世爲之乎揚子曰世故非一毛所濟出以語孟孫孟孫曰積一毛以成肌膚積肌膚以成一節一毛故萬分之一物柰何輕之山海經曰毛民爲人身生毛郭璞注曰臨海東南海中有毛人晉永嘉四年得之也列仙傳曰偓於角切佺此縁切食松實形體生毛長數寸又曰毛女字玉名姜在華隂山世世見之形體生毛所止巖中恒有鼔琴聲自}
  - {type: variant, offset: 28, length: 0, content: '', krp: 秦皇時宫人}
  - {type: punctuation, offset: 29, content: ；, id: KR3k0012_CHANT_373-bkkpn17}
  - {type: 'tls:seg', offset: 29, content: '', id: KR3k0012_CHANT_373-1a.13}
  - {type: variant, offset: 29, length: 46, content: 股固也為強固也易說卦曰巽為股春秋元命苞曰髀之為言跂也陰二故人兩髀尚書咎繇謨帝曰臣作朕股肱耳目, SBCK: ''}
  - {type: variant, offset: 29, length: 46, content: 股固也為強固也易說卦曰巽為股春秋元命苞曰髀之為言跂也陰二故人兩髀尚書咎繇謨帝曰臣作朕股肱耳目, WYG: ''}
  - {type: variant, offset: 29, length: 2, content: 股固, krp: 神仙傳曰劉根學道入嵩髙山石室中冬夏不衣身毛長三尺神異經曰八荒中有毛人長七八尺身形頭上皆毛毛如猕猴長尺餘見人則口開吐舌名髯公一名髯猑音昆尋陽記曰桓穆遣人尋廬山下嶺見毛人長大體悉毛語不可解山居道士亦時見此臨海異物志曰毛人洲在張嶼毛長短如熊周綽得毛人送詣秣陵髮釋名曰髮拔}
