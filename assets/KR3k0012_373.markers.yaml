  - {type: variant, offset: 49, length: 1, content: 髀, krp: 鬒髮如雲不屑髢也鬒黒髮也如雲言美長也又魚藻曰彼都人士臺笠緇撮彼君子女綢直如髮其情性密緻操行正直髪}
  - {type: variant, offset: 51, length: 1, content: 為, krp: 夲末無隆殺之彼都人士垂帶而厲彼君子女卷髮如蠆蠆螫蟲也尾赤捷然似婦人髪末曲上卷然又采緑曰終朝采緑不盈一掬予髮曲局薄}
