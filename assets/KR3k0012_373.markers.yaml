  - {type: variant, offset: 3416, length: 0, content: '', SBCK: 許逵別傳曰薊子訓齊人有神術人髮白者請子訓但與對坐共語􅀫昔間髮皆黒樊英別傳曰英􅀍髮忽拔刀斫舎中妻問故曰郄生道遇鈔郄生還云道遇賊頼􅀍髮老人相救得全郄生名廵字仲信陳郡夏陽人能傳英業黄庭經曰髮神名蒼華列仙傳曰容成公黄帝善􅀘導事髪白更黒寗先生稷丘君髮白更黒寗先生􅀍髮鼓琴赤斧餌丹砂毛髮皆赤阮丘􅀍髮覆耳成璜道士兒丘與老子黄庭經讀三遍通之俱入浮陽山白髮更黒􅂡長三尺餘神異經曰東荒山中有大石室東王公居之長一丈頭髮皓白身人形而虎尾與一玉女更投壷又曰西方有人焉不欲不食􅀍髮東走巳往覆來其婦􅁪追掔録之不肯聽止婦頭亦􅀍髮名曰狂一名㒹一名覆此人夫妻與天地俱生狂走東西以投晝夜異苑曰有人誤呑髮便得病但欲咽猪脂張口時喉中有一頭出受膏乃取小鈎餌而引之得一物長二尺餘其形似蛇而悉是脂縣於屋間旬日融盡唯髮在焉列女傳曰吴伯陽妻顧昭君早寡剪髪以明志又曰樂羊學書其妻貞義截髮以供其費又曰廣漢馮季宰妻者李氏之女名珥字進早寡無嗣奉養繼姑守心純固以義自防珥母􅉖其􅀌苦隂有所許珥斷髮自明郷人稱之陳留風俗傳曰小黄縣者宋地陽武東黄郷}
