  - {type: variant, offset: 2182, length: 135, content: 姜氏無子嬖人婤姶生孟縶孟縶之足不良能行跛也婤音周姶烏合切又哀下曰衛侯與諸大夫飲酒褚師聲子襪而登席公怒曰必斷而足事具手部穀梁傳定公會齊侯于夾谷孔子曰笑君者罪當死使司馬行法焉手足異門而出史記曰韓信使人言齊偽詐多變願為假王漢王大怒張良陳平躡漢王足因附耳語曰漢方不利寧能禁信之王, SBCK: 髮}
