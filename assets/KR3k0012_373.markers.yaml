  - {type: variant, offset: 4059, length: 4, content: 蘇秦握錐, WYG: 尹䧺年九十左鬢生角長半寸吳質表曰質已四十三矣白髪生鬢神相書曰雙眉插鬢上夀相也髻説文曰髻結髪也漢書曰尉他魋髻服雯注曰令兵椎頭結也續漢書五行志曰桓帝元嘉中京師婦女作墜馬髻者側在一邊}
