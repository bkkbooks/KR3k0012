  - {type: variant, offset: 5276, length: 0, content: '', krp: 祛㑹稽山隂人也少孤貧好學耕耘樵採常懷書自隨投閑則誦讀勤苦自勵遂通經術趙書曰東耕儀直殿中監鋪席於侍臣之南北靣解出御表跽受黄門侍中侍中釋劒擎跽以頴授尊太常讃曰皇帝親耕籍田一推一反三推三反成禮侍中跽取耒以授侍郎以授殿中監監復韜管子曰庶人好耕農而惡飲食於是財用足又曰行其㳺野視其耕耘計其農事而饑飽之國可以知也又曰耕者出入不應於父兄用力不農農不事賢行此三者有罪無赦又曰地大而不耕非其地也文子曰其耕不強者無以養生晏子春秋曰有納書景公者云吾不知晏子之忠臣也公以爲然晏子入朝公色恱晏子退而窮處東耕于海濵墨子曰魯南鄭人呉憲者冬陶夏耕自比於舜又曰墨子之齊遇故人曰今天下莫爲不若巳墨子曰今小人一人耕九人處耕者不可以不急何食者衆而耕者寡也今天下莫爲義子冝勸我何以止我何以樂曰使丈夫爲之廢丈夫耕稼樹藝之時使婦人爲之廢婦人紡織之事莊子曰堯治天下伯成子髙立爲侯堯授舜舜授禹伯成子高辭而耕禹徃見之則在野又曰堯以天下讓許由許由不受退而耕於潁水之陽終身不見尸子曰有虞氏身有南畝妻有桑田神農耕而王所以觀耕啇子曰今一人耕而百人食之此爲螟􅭈蚵胡多切蠋之欲切亦大矣雖有詩書猶無益於治孟子曰伊尹耕於有莘之野湯躬詣之伊尹囂然弗顧又曰耕者助而不稅則天下之農皆恱而願耕於其野也}
  - {type: variant, offset: 5277, length: 0, content: '', SBCK: 卿子曰子路問孔子曰有耕耘樹藝手足胼胝以養其親而無孝名何也子曰但使入則篤行出則友賢何患無孝名也韓子曰宋人有耕者田中有株兎走觸林而死因釋耕而守株冀更得兎宋人􅀏之淮􅀯子曰夫織者日以進耕者日以却事相反成功一也楊子法言曰谷口鄭子眞不屈其志而耕乎嵒石之下名振京師􅀓子曰耕根車天子親耕乗之蹋猪車畋獵乗之山海經曰后稷播百􅂖始作耕六韜曰昔帝堯之王天下不以􅀻曲之故留耕績之時國語曰古者天子籍田后稷􅁥之􅁥察太史賛玉賛導王敬從之王耕墢一墢耜之墢也王無耦以一耜耕也班三之班三次也三之下各三其上也王一墢公三􅀸九大夫二十七庶人終于千􅅿終盡耕之又曰管仲對齊桓公曰深耕而疾耰之以待時雨吕氏春秋曰匡章謂魏王曰今君行多者數百人皆不耕而食此害稼亦甚矣又曰人臣孝則事君忠臨難死士民孝則耕耘疾守戰固又曰舜耕}
  - {type: page-break, offset: 5277, content: '', id: KR3k0012_SBCK_822-9a}
  - {type: variant, offset: 5277, length: 0, content: '', WYG: 卿子曰子路問孔子曰有耕耘樹藝手足胼胝以養其親而無孝名何也子曰但使入則篤行出則有賢何患無孝名也韓子曰宋人有耕者田中有株兎走觸株而死因釋耕而守株冀更得兎宋人笑之淮南子曰夫織者日以進耕者日以却事相反成功一也揚子法言曰谷口鄭子真不屈其志而耕乎嵒石之下名振京師傅子曰金根車天子親耕乘之蹋楮車畋獵乘之山海經曰后稷播百榖始作耕六韜曰昔帝堯之王天下不以私曲之故留耕績之時國語曰古者天子籍田后稷監之太史王王敬從之王耕墢一墢耜之墢也王無耦以一耜耕之班三之班三次也三之下各三其止也王一墢公三卿九大夫二士七庻人終于千畝又曰管仲對齊桓公曰深耕而疾耰之以待時雨吕氏春秋曰匡章謂魏王曰今君行多者數百人皆不耕而食此害稼亦甚矣又曰人臣孝則事君忠臨難死士民孝則耕耘疾守戰固又曰舜耕}
