  - {type: variant, offset: 3777, length: 177, content: 曰安帝義熙九年右丞張須元議瑯瑯及湖熟界有皇后脂澤田四十餘頃參詳悉以借食民南史曰宋王惠兄鑒頗好聚歛惠意不同謂曰何用田為鑒怒曰無田何由得食惠又曰何用食為齊書曰王騫歷黃門郎司徒右長史不事產業有舊田在鍾山八十頃與諸宅及故舊共佃之常謂人曰我不如鄭公業有田四百頃而食常不周以此為愧梁書曰夏侯夔為豫州刺史率軍人於蒼陵立堨溉田千餘頃歲收穀百餘萬石以充儲備兼贍貧人境內賴之, SBCK: ''}
