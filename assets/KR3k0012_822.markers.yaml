  - {type: variant, offset: 1137, length: 144, content: 請田而已非聘享會同也襄仲如晉拜曹田也又宣公下十五年曰初稅畝非禮也穀出不過籍周法民耕百畝公田十畝借民力而治之稅不過此以豐財也又襄公六曰子產治鄭使田有封洫封界洫溝從政一年輿人誦曰取我衣冠而禇之取我田疇而伍之孰殺子產吾其與之及三年民又誦之曰我有子弟子產誨之我有田疇子產闢之子產而死誰其嗣之又哀公, SBCK: 盤庚}
