  - {type: variant, offset: 4647, length: 342, content: 史起對曰魏氏之田也漳水存其傍西門豹不知用是過也明日召史起問漳水猶可以灌鄴田乎對曰臣為之民必大怨臣臣雖死願王使他人遂之王使之為鄴令史起因往為之鄴民大怨欲籍史起史起不敢出避之乃使他人遂為之水已行民大得其利相與歌之曰鄴有聖令號為史公決漳水兮灌鄴旁終古斥鹵生稻梁春秋後語曰趙列侯謂其相公仲建曰寡人所愛可以貴之乎曰富可也貴之則不列侯乃命以田萬畝賜善歌者二人公仲建許諾而不與居一月列侯之代還問曰與之乎曰未有可者家語曰虞芮二國爭田而訟連年不決乃相謂曰西伯仁人盍往質焉入其境則耕者讓畔行者讓路入其朝則士讓為大夫大夫讓為卿虞芮之君曰嘻吾儕小人不可以入君子之朝遂自相與成以其所爭為閑田蕭廣濟孝子傳曰郭原平墓下有數十畝田不屬原平每至農月耕者恒裸袒原平不欲使慢其墳墓乃貨家資買此田三農之月輒束帶垂泣躬自耕墾之, SBCK: ''}
