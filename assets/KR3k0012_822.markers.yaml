  - {type: variant, offset: 2134, length: 253, content: 鞅之法改帝王之制一歲屯戍萬計力役三十倍於古田租口賦鹽鐵之利二十倍於古如淳曰秦賣鹽鐵貴故下民受其困或耕豪民之田稅十五如淳曰稅其五故貧民常衣馬牛衣而食犬彘之食又董仲舒說上曰秦用商鞅之法改帝王之制除井田人得賣買富者田連阡陌貧無立錐之地漢興循而未改古井田法雖難猝行宜少近古限人占田以贍不足塞兼井之路然後可善治也上不能用又曰是時富豪皆爭匿財唯卜式尤欲助費於是以式終長者乃召拜為中郎賜爵左庶長田十頃布告天下尊顯以諷百姓又曰貢禹上書曰臣禹年老貧窮家貲不滿萬錢妻子糠豆不贍短褐不完有田百三十畝陛下過意徵臣臣賣田十畝以供車馬, WYG: ''}
