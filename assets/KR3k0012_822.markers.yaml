  - {type: variant, offset: 5267, length: 0, content: '', WYG: 故以美農為名耕周禮天官上曰甸師長帥其属而耕耨王籍以時入之以共粢盛禮記月令曰正月天子率三公九卿諸侯大夫躬耕帝籍天子三推公五推諸侯九推又曰王制曰三年耕必有一年之食九年耕必有三年之食以三十年之通雖有㓙旱水溢民無菜色又少儀曰問士之子長幼長則曰能耕矣又表記曰天子親耕粢盛秬鬯以事上帝故諸侯勤以輔事於天子左𫝊襄公七年曰夏四月三卜郊不從乃免牲孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也是故啓蟄而郊郊而後耕今就耕而卜郊宜其不從也又襄公十三年吴子諸樊既除䘮将立季札季札辭曰曹宣公之卒也諸侯與曺人不善曺人将立子臧子臧去之遂弗為也以成曺君君子曰能守節義嗣也誰敢奸君有國非吾節札雖不才願附於子臧以無失節故立弃其室而耕乃舍之又昭公五曰伍員如吴言伐楚之事於州于州于吴王僚公子光曰是宗為戮而欲反其仇不可從也光吴公子闔閭也反獲也員曰彼将有他志余姑為之求士而鄙以待之乃見専諸焉専諸勇士而耕於鄙榖梁𫝊成公曰郄克曰反魯衞之侵地使耕者皆東畆欲以利其戎車論語衞靈公曰君子謀道不謀食耕也餒在其中矣學也禄在其中矣又㣲子曰長沮桀溺耦而耕論語比考䜟曰叔孫武叔毁孔子譬若堯民曰我耕田而食穿井而飲堯}
