  - {type: variant, offset: 2443, length: 171, content: 及富貴多買田至四百頃皆涇渭溉灌極膏腴上價又曰甯成曰仕不至二千石賈不至千萬安可比於人乎乃貰貸陂田千餘頃假貧民役使數千家致產數千萬為任俠持吏長短從數十騎其使民威重於郡守又溝洫志曰太始三年趙中大夫白公復奏穿渠引涇水首起谷穀口尾入櫟陽涇渭中溉四千五百餘頃田名曰白渠民歌田曰於河許池陽谷口鄭國在前白渠起後舉鍾為雲決渠為雨涇水一石其泥數斗且溉且糞長我稷黍, SBCK: ''}
  - {type: variant, offset: 2443, length: 559, content: 及富貴多買田至四百頃皆涇渭溉灌極膏腴上價又曰甯成曰仕不至二千石賈不至千萬安可比於人乎乃貰貸陂田千餘頃假貧民役使數千家致產數千萬為任俠持吏長短從數十騎其使民威重於郡守又溝洫志曰太始三年趙中大夫白公復奏穿渠引涇水首起谷穀口尾入櫟陽涇渭中溉四千五百餘頃田名曰白渠民歌田曰於河許池陽谷口鄭國在前白渠起後舉鍾為雲決渠為雨涇水一石其泥數斗且溉且糞長我稷黍後漢書曰光武時天下墾田多不以實又戶口年紀互有增減十五年詔下州郡檢覆其事而刺史太守多不平均或優饒豪右侵刻羸弱百姓嗟愁遮道號呼時諸郡各遣使奏事帝見陳留吏牘上有書視之云潁川弘農可問河南南陽不可問帝詰吏由趣吏不肯服抵言長壽街上得之抵欺也帝怒時顯宗為東海公年十二在幄後言曰吏受郡勑當欲以墾田相方耳帝曰即如此何故言河南南陽不可問對曰河南帝城多近臣南陽帝鄉多近親田宅踰制不可為准帝令虎賁將詰問吏吏乃實首服如顯宗對於是遣謁者考實具知奸狀又曰樊重開廣田土三百餘頃其所起廬舍皆有重堂高閣陂渠灌注貲至巨萬而賑贍宗族恩加鄉閭外孫何氏兄弟爭財重恥之以田貳頃解其忿訟縣中稱美推為三老又曰馬援辭兄況欲就邊郡田牧東觀記曰援以況出為河南太守次兩兄為吏京師見家用不足乃辭況欲就邊郡畜牧也況曰汝大才當晚成良工不示人以朴旦從所好後援辭隗囂歸洛陽居數月而無他職任援以三輔地曠土沃而所將賓客猥多乃上書求屯田上林苑中帝許之, WYG: ''}
