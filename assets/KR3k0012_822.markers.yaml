  - {type: variant, offset: 5268, length: 0, content: '', SBCK: 力功周書曰神農之時天雨粟神農耕而種之韓詩曰三之日于耜四之日舉趾至於四月始可舉足而耕又曰齊人青將討公孫無知辭其友其友曰耕田刈草農之力也討君之賊大夫職也史記曰趙肅侯遊大陵出於鹿門大夫扣馬曰耕事方急一日不作百日不食肅侯下車而謝之又曰伍子胥進專諸於公子光退而與故太子建之􅀌子勝耕於野又曰陳渉少時與人傭耕輟耕壠上曰富貴無相忘傭者􅀏而應曰子爲人傭耕何冨貴耶渉曰嗟乎燕雀安知鴻鵠之志哉又曰髙后立諸吕爲王擅權用事朱虚侯年二十有氣力忿劉氏不得􅀔常入侍髙后醼飲曰請爲太后歌田太后曰試爲我言田意曰深耕穊種立苗欲踈非其種者鋤而去之吕后黙然戰國䇿曰主父欲代中山使李疵觀之疵曰舉士即民務名不好本朝上賢即耕者隋而戰士懦􅀂此不亡者未之有也漢昭紀曰上耕于鈎盾弄田應劭曰昭帝九年未能親耕帝籍鈎盾有田近署故徃試耕爲戯弄也又曰江南之地火耕水耨應劭日燒草下水種稻又曰夏侯勝毎授書謂諸生曰學經不明不如歸耕後漢書曰王莽末盗賊起人皆憂移徙遁逃莫事農桑淳于恭}
