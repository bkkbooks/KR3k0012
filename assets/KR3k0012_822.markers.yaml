  - {type: variant, offset: 752, length: 322, content: 田九百畝一里方三百步方十里者為方一里者百為田九萬畝方百里者為方十里者百為田九十億畝億今十萬方千里者為方百里者百為田九萬億畝萬億今萬萬也自恒山至於南河千里而近冀州域自南河至於江千里而近豫州域自江至於衡山千里而遙荊州域自東河至於東海千里而遙徐州域自東河至於西河千里而近亦冀州域自西河至於流沙千里而遙雍州域西不盡流沙南不盡衡山東不盡東海北不盡恒山凡四海之內斷長補短方三千里為田八十萬億一萬億畝九州之大計方百里者為田九十億畝山陵林麓川澤溝瀆城郭宮室塗巷三分去一其餘六十億畝以一大國為率其餘所以授民也又曰古者公田籍而不稅籍之言借也借民力治公田美惡取於此不稅民之所自始也古者謂殷時左傳僖公三十一年曰春取濟西田分曹地也二十八年晉文討曹分其地境界未定至是乃以賜, WYG: 差}
