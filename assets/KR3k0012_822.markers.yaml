  - {type: variant, offset: 1349, length: 764, content: 待子而行若之何子之不言也仲尼不對不公荅而私於冉有曰君子之行也行政事度於禮施取其厚事舉其中斂從其薄如是則以丘亦足矣丘十六井出戎馬一疋牛三頭是賦之常法若不度於禮而貪冒無厭則雖以田賦將又不足且子季孫若欲行而法則周公之典在若欲茍而行又何訪焉弗聽為明年用田賦傳又哀公上曰子胥曰得志於齊猶獲石田也無所用之石田不可耕穀梁傳宣公五年曰初稅畝宣公履畝擇而稅之也古者田什一而籍言借民力十井而為公耕一謂之什一而稅也初稅非正也毛詩小雅白華曰滮池北流浸彼稻田滮流貌箋云池澤浸潤稻田使之生殖又甫田曰倬彼甫田歲取十千倬明貌甫田謂天下田也十千言多也又大雅崧高曰王命召伯徹申伯土田徹治也箋云治者正其井牧定其賦稅爾雅曰田一歲曰菑今江東呼初耕地反草為菑二歲曰新田詩曰于彼新田三歲曰畬易曰不菑畬史記曰魏文侯使李悝作盡地力之教悝苦回反以為地方百里提封九萬畝理田勤謹則畝益三斗不勤則損亦如之地方百里之增減輒為粟百八十萬碩矣必雜五種以備災害力耕數耘收獲如寇盜之至謂促遽之甚恐為風雨損也又曰秦孝公任商鞅鞅以三晉地狹人貧三晉謂韓魏趙三卿今河東道之地秦地廣人寡故草不盡墾地利不盡出於是誘三晉之人利其田宅復三代無知兵事而務本於內而使秦人應敵於外故廢井田制阡陌任其所耕不限多少數年之間國富兵強天下無敵其後韓聞秦之好興事欲疲之乃使水工鄭國聞說秦令鑿涇水自中山西抵瓠口為渠並北山東注洛三百餘里欲以溉田中作而覺秦欲殺國國曰始臣為間然渠成亦秦之利也秦以為然卒使就渠用注慎閼之水溉澤鹵之地四萬頃收背畝一種於是關中為沃野無凶年命曰鄭國渠閼音於據切又曰王翦將行請善田宅園池甚眾始皇曰將行矣何憂貧乎戰國策曰魏叔座為將攻韓趙勝之魏王賞田百萬座曰使士卒不崩直而不倚撓揀不辟者此吳起餘教也鼓之不敢怠倦者臣也王特為臣右手之倦賞臣可也若以有功臣何力之有焉王曰善於是索吳起之後賞田二十萬以座不掩士之跡又與田二十萬, WYG: 農}
