  - {type: variant, offset: 5267, length: 0, content: '', SBCK: 故以美農爲名耕周禮天官上曰甸師掌帥其屬而耕耨王籍以時入之以共齍盛其屬府史胥徒也耨耕耘耔也王以孟春躬耕帝籍天子三推三公五推卿諸侯九推庶人終於千􅅿庶人謂徒三百人籍之言借也王一耕之而使庶人耘耔終之齍盛􅀕祀所用榖也禮記月令曰正月天子率三公九卿諸侯大夫躬耕帝籍天子三推公五推諸侯九推鄭玄注曰帝籍爲天伸借人力所治之田也蔡邕章句曰禮成於三故天子三推卑者勞故三公五推也又曰王制曰三年耕必有一年之食九年耕必有三年之食以三十年之通雖有凶旱水溢民無菜色又少儀曰問士之子長㓜長則曰能耕矣又表記曰天子親耕粢盛秬鬯以事上帝故諸侯勤以輔事於天子言無事而居位食􅀄是不義而富且貴左傳襄公七年曰夏四月三卜郊不從乃免牲孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也郊祀后稷以配天后稷周始祖能播植者是故啓蟄而郊郊而後耕今就耕而卜郊宜其不從也啓蟄夏正建寅之月耕謂春分又襄公十三年曰呉子諸樊旣除䘮諸樊呉子桑之長子也桑卒至比舂十七月旣葬而除䘮將立季札札諸樊少弟季札辭曰曹宣公之卒也諸侯與曹人不義曹人將立子臧子臧去之遂弗爲也以戌曹君君子曰能守節君義嗣也誰敢奸君有國非吾節札雖不才願附於子臧以無失節固立之弃其室而耕乃舎之傳言季礼之讓且明呉兄弟相傳又昭公五曰伍貟如呉言伐楚之利於州于州于呉王僚公子光曰是宗爲戮而欲反其讎不可從也光呉公子闔閭也反復也貟曰彼將有他志光欲殺僚不利貟用事故破其議而貟亦知之余姑爲之求士而鄙以待之計未得用故進勇士以求入於光退居邊鄙乃見專諸焉專諸勇土而耕於鄙穀梁傳成公曰郄克曰反魯衛之侵地使耕者皆東􅅿欲以利其戎車論語衛靈公曰君子謀道不謀食耕也餒在其中矣學也禄在其中矣又微子曰長沮桀溺耦而耕論語比考䜟曰叔孫武叔毀孔子譬􅀂堯民曰我耕田而食穿井而飲堯}
  - {type: page-break, offset: 5267, content: '', id: KR3k0012_SBCK_822-4b}
