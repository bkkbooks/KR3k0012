  - {type: variant, offset: 5354, length: 216, content: 川之水鄭國白渠之溉雲雨年成糞與灌並畝貨一金號為陸海應璩書曰是以忽此蘇子帶郭之業求彼孫叔寢丘之地故求遠田在關之西南臨洛水北據芒山曹植表曰乞城內田及城邊好田盡所賜百年力者臣雖生自至尊然心甘田野性樂稼穡又籍田論曰營疇萬畝厥田上上經以大陌帶以橫阡奇柳夾路名菓被園宰農寔掌是謂公田唐明皇雜錄曰上命宇文融為招田使融方恣睢稍不己附者必加誣譖密奏以為盧從愿廣致田園有地數百頃上素器重亦倚為相者數矣而又族望官婚鼎盛於一時故上亦重言其罪但目從愿為多田翁, SBCK: 十二}
