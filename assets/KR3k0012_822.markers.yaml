  - {type: punctuation, offset: 1678, content: 》, id: KR3k0012_CHANT_822-bkkpn486}
  - {type: variant, offset: 1678, length: 709, content: 曰魏文侯使李悝作盡地力之教悝苦回反以為地方百里提封九萬畝理田勤謹則畝益三斗不勤則損亦如之地方百里之增減輒為粟百八十萬碩矣必雜五種以備災害力耕數耘收獲如寇盜之至謂促遽之甚恐為風雨損也又曰秦孝公任商鞅鞅以三晉地狹人貧三晉謂韓魏趙三卿今河東道之地秦地廣人寡故草不盡墾地利不盡出於是誘三晉之人利其田宅復三代無知兵事而務本於內而使秦人應敵於外故廢井田制阡陌任其所耕不限多少數年之間國富兵強天下無敵其後韓聞秦之好興事欲疲之乃使水工鄭國聞說秦令鑿涇水自中山西抵瓠口為渠並北山東注洛三百餘里欲以溉田中作而覺秦欲殺國國曰始臣為間然渠成亦秦之利也秦以為然卒使就渠用注慎閼之水溉澤鹵之地四萬頃收背畝一種於是關中為沃野無凶年命曰鄭國渠閼音於據切又曰王翦將行請善田宅園池甚眾始皇曰將行矣何憂貧乎戰國策曰魏叔座為將攻韓趙勝之魏王賞田百萬座曰使士卒不崩直而不倚撓揀不辟者此吳起餘教也鼓之不敢怠倦者臣也王特為臣右手之倦賞臣可也若以有功臣何力之有焉王曰善於是索吳起之後賞田二十萬以座不掩士之跡又與田二十萬漢書晁錯奏曰古者稅民不過什一至秦則不然用商鞅之法改帝王之制一歲屯戍萬計力役三十倍於古田租口賦鹽鐵之利二十倍於古如淳曰秦賣鹽鐵貴故下民受其困或耕豪民之田稅十五如淳曰稅其五故貧民常衣馬牛衣而食犬彘之食又董仲舒說上曰秦用商鞅之法改帝王之制除井田人得賣買富者田連阡陌貧無立錐之地漢興循而未改古井田法雖難猝行宜少近古限人占田以贍不足塞兼井之路然後可善治也上不能用又曰是時富豪皆爭匿財唯卜式尤欲助費於是以式終長者乃召拜為中郎賜爵左庶長田十頃布告天下尊顯以諷百姓又曰貢禹上書曰臣禹年老貧窮家貲不滿萬錢妻子糠豆不贍短褐不完有田百三十畝陛下過意徵臣臣賣田十畝以供車馬, SBCK: ''}
