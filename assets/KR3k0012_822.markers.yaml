  - {type: variant, offset: 5273, length: 0, content: '', WYG: 會稽太守免官歸田里身自耕種不交通人物魏畧曰常林少單貧自非其力不取之於人性好學漢末為諸生帶書耕鋤其妻常自擔餉餽之林雖在田野其相敬如賓吴録徴崇字子知遭亂遂於㑹稽躬耕以求其志好尚隐者從學所教不過數人輒止欲令其業必有成也吴志曰薛綜上疏云任延為九真太守乃教其耕犁使之冠履晉書曰朱冲字巨客少有志行閑静寡欲好學而貧常以耕藝為事又曰趙至字景真代郡人也寓居洛陽維氏令初到官至年十三與母同觀母曰汝先}
