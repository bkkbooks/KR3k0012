  - {type: 'tls:seg', offset: 5275, content: '', id: KR3k0012_CHANT_822-54a.36}
  - {type: variant, offset: 5275, length: 0, content: '', SBCK: 聞父耕叱牛聲投書而泣師怪問之至曰我小未榮養使老父不免勤苦師甚異之宋書曰王韶之家貧好學嘗三日絶糧而執卷不輟家人請之曰囷窮如此何不耕荅曰我自耕耳齊書曰戴僧靜爲北徐州刺史買牛給貧人令耕種梁書曰孔}
  - {type: page-break, offset: 5275, content: '', id: KR3k0012_SBCK_822-7b}
  - {type: variant, offset: 5275, length: 0, content: '', WYG: 聞父耕吒牛聲投書而泣師恠問之至曰我小未榮養使老父不免勤苦師甚異之宋書曰王韶之家貧好學嘗三日絶粮而執卷不輟家人請之曰困窮如此何不耕答曰我自耕耳齊書曰戴僧静為北徐州刺史買牛給貧人令耕種梁書曰孔}
  - {type: page-break, offset: 5275, content: '', id: KR3k0012_WYG_822-11a, image: WYG0900/WYG0900-0285a.png}
  - {type: variant, offset: 5275, length: 0, content: '', krp: 聞父耕叱牛聲投書而泣師怪問之至曰我小未榮養使老父不免勤苦師甚異之宋書曰王韶之家貧好學嘗三日絶糧而執卷不輟家人請之曰囷窮如此何不耕荅曰我自耕耳齊書曰戴僧靜爲北徐州刺史買牛給貧人令耕種梁書曰孔}
  - {type: variant, offset: 5276, length: 0, content: '', SBCK: 祛㑹稽山隂人也少􅀌貧好學耕耘樵採常懷書自隨投閑則誦讀勤苦自勵遂通經術趙書曰東耕儀直殿中􅁥鋪席於侍臣之南北靣解出御表跽受黄門侍中侍中釋劒擎跽以頴授尊太常讃曰皇帝親耕籍田一推一反三推三反成禮侍中跽取耒以授侍郎以授殿中􅁥􅁥復韜管子曰庶人好耕農而惡飲食於是財用足又曰行其㳺野視其耕耘計其農事而饑飽之國可以知也又曰耕者出入不應於父兄用力不農農不事賢行此三者有罪無赦又曰地大而不耕非其地也文子曰其耕不強者無以養生晏子春秋曰有納書景公者云吾不知晏子之忠臣也公以爲然晏子入朝公色恱晏子退而窮處東耕于海濵墨子曰魯南鄭人呉憲者冬陶夏耕自比於舜又曰墨子之齊遇故人曰今天下莫爲不􅀂巳墨子曰今小人一人耕九人處耕者不可以不急何食者衆而耕者寡也今天下莫爲義子冝勸我何以止我何以樂曰使丈夫爲之廢丈夫耕稼樹藝之時使婦人爲之廢婦人紡織之事莊子曰堯治天下伯成子髙立爲侯堯授舜舜授禹伯成子高辭而耕禹徃見之則在野又曰堯以天下讓許由許由不受退而耕於潁水之陽終身不見尸子曰有虞氏身有􅀯􅅿妻有桑田神農耕而王所以觀耕啇子曰今一人耕而百人食之此爲螟􅭈蚵胡多切蠋之欲切亦大矣雖有詩書猶無益於治孟子曰伊尹耕於有莘之野湯躬詣之伊尹囂然弗顧又曰耕者助而不稅則天下之農皆恱而願耕於其野也}
  - {type: page-break, offset: 5276, content: '', id: KR3k0012_SBCK_822-8a}
  - {type: page-break, offset: 5276, content: '', id: KR3k0012_SBCK_822-8b}
  - {type: variant, offset: 5276, length: 0, content: '', WYG: 袪會稽山隂人也少孤貧好學耕耘樵採嘗懐書自隨投閑則讀勤苦自勵遂通經術趙書曰東耕義真殿中監鋪席於侍臣之南北面觧匣出御表跽授黄門一推一反三推三反成禮侍中跽取米以授侍郎以授殿中監監復韜匣管子曰庶人好耕農而惡飲食於是財用足又曰行其遊野視其耕耘討其農事而饑飽之國可以知也又曰耕者出而不應於父兄用力不農農不事賢行此三者有罪無赦又曰地大而不耕非其地也文子曰其耕不強者無以養生晏子春秋曰有納書景公者公曰吾不知晏子之忠臣也晏子曰南鄭人吴憲者冬陶夏耕自比於舜又曰墨子之齊遇故人曰今天下莫不為若己墨子曰小人一人耕九人處耕者不可以不急何則食者衆而耕者寡也今天下莫為義子宜勸我何以止我又非樂曰使丈夫為之廢丈夫耕稼樹藝之時使婦人為之廢婦人紡績之事荘子曰堯治天下伯成子髙立為侯堯授舜舜授禹伯成子髙辭而耕禹徃見之則在野又曰堯以天下讓許由許由不受退而耕於頴水之陽終身不見尸子曰有虞氏身有南畆妻有桑田神農共耕而王所以勸耕商子曰今一人耕而百人食之此螟􅀈蚵蠋亦大矣雖有詩書猶無益於治孟子曰伊尹耕於有莘之野湯躬詣之伊尹囂然弗顧又曰耕者助而不稅則天下之農皆悅而願耕於其野也}
