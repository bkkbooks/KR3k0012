  - {type: variant, offset: 3340, length: 161, content: 盡地利宜開河渠可以大積軍糧又通運漕之道乃著濟河論以喻其指又以為昔破黃巾因為屯田積穀許都以制四方今三隅已定事在淮南每大軍征舉運兵過半功費巨億以為大役陳蔡之間土下田良可省許昌左右諸稻田并水東下今淮北二萬人淮南三萬人十二分休常有四萬人且田且守水豐常收三倍於西計除眾費歲完五百萬斛以為軍資六七年間可積三千萬斛於淮上此則十萬之眾五年, SBCK: 自}
