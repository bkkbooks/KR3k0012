  - {type: variant, offset: 5272, length: 1, content: 為, SBCK: 供衣食彈琴誦書以娯其志又曰承宫將妻之華隂山谷耕種禾黍臨熟人就認之宫悉推與去由是顯名又曰第五倫爲㑹稽太守免官歸田里身自耕種不交通人物魏略曰常林少單貧自非手力不取之於人性好學漢末爲諸生帶經耕鋤其妻常自擔餉餽之林雖在田野其相敬如賔呉録曰徴崇字子知遭亂遂隱於㑹稽躬耕以求其志好尚者從學所教不過數人輙止欲令其業必有成也呉志曰薛綜上䟽云任延爲九眞太守迺教其耕犂使之冠履􅀳書曰朱冲字巨容少有志行閑静寡欲好學而貧常以耕藝爲事又曰趙至字景眞代郡人也寓居洛陽維氏令初到官至年十三與母同觀母曰汝先}
