  - {type: variant, offset: 5286, length: 1, content: 昔, SBCK: 宣帝使蔡登校民耕相三犂共一牛一人持之下種挽摟皆取備焉一日種頃也拾遺録曰而而支夫善耕婦人善織以五色絲稍内口中兩手引而結之則成文錦丈夫多力勤稼一日耡十頃之地董正則傳曰劉恭嗣少有異才聞司馬操􅀶物多通故徃見焉遇其方耕執耒耜於壠􅅿之上於是釋耒下袵相就而言任嘏別傳曰嘏字昭先樂安人有比居}
