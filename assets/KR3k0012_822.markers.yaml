  - {type: variant, offset: 228, length: 387, content: 人可任者家一人鄭玄曰均平也周猶徧也一家男女七人以上則授上地所養者眾也男女五人以下則授之以下地所養者寡也正以七人六人五人為率者有夫有婦然後為家二人以至於十人為九等乃經土地而井牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都以任地事而令貢賦凡稅歛之事此謂造都鄙也采地制井田異於鄉遂也重立國小司徒為經之立其五溝五途之界其制似井之字因取名焉又曰載師掌任土之法以物地事授地職而待其政令任土者任其力勢所能生育旦以制貢賦也物物色之以知其所宜之事而授農牧衡虞使職之也以廛里任國中之地以場圃任園地以宅田土田賈田任近郊之地以官田牛田賞田牧田任遠郊之地以公邑之田任甸地以家邑之田任稍地以小都之田任縣地以大都之田任疆地謂廛里裏者若今邑若居之田矣廛人居之區域也里居也園樹菓蓏之屬也蓏音力果反季秋於中為場樊圃謂之園宅田者致仕者家所授之田也孟子曰卿已下必有圭田五十畝賈田在市賈人其家所受田也官田庶, WYG: ''}
