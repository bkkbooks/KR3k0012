  - {type: variant, offset: 5268, length: 0, content: '', WYG: 力焉周書曰神農之時天雨粟神農耕而種之韓詩曰三之日于耜四之日舉趾至于四月始可舉足而耕又曰齊人青将討公孫無知辭其友其友曰耕田刈草農之力也討君之賊大夫職也史記曰趙肅侯遊大陵出於鹿門大夫扣馬曰耕事方急一日不作百日不食肅侯下車而謝之又曰伍子胥進専諸於公子光退而與故太子建之孤子勝耕於野又曰陳涉少時與人傭耕輟耕壟上曰富貴無相忘傭者笑而應之子為人傭耕何富貴也涉曰嗟乎燕雀安知鴻鵠之志哉又曰髙后立諸吕為王擅權用事朱虛侯年二十有氣力忿劉氏不得職常入侍髙后醼飲曰請為太后歌田太后曰試為我言田意曰深耕溉種立苖欲疎非其種者鋤而去之吕氏黙然戰國䇿曰主父欲伐中山使李庇觀之庇曰與士即民務名不好本朝上賢即耕者惰而戰士懦若此不亡者未之有也漢昭紀曰上耕于鈎盾弄田應劭曰昭帝九年未能親耕帝籍鈎盾有田近署故徃試耕為戲弄也又曰江南之地火耕水耨又曰夏侯勝每授書謂諸生曰學經不明不如歸耕後漢書曰王莽時盗賊起人皆憂移徙遁逃莫事農桑淳于恭}
