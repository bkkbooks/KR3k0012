  - {type: variant, offset: 1648, length: 0, content: '', WYG: 亦不譴怒但絶其歳用冀以嘿愧其心耳於是親戚被服如一政教不嚴而從以躬率先之故也置織室蠶於濯龍中數來往觀視内以娛樂外以先女功太后崩合葬顯節陵東觀漢記曰后長七尺二寸青白色方口美髪為四起大髻但以髪成尚有餘繞髻三匝復出諸髪眉不施黛獨左眉角小缺補之如粟后素謹慎小感慨輒自責如平生事舅姑時新平主家御者失火及北閣後殿深以自過起居不歡至正月當上原陵言我守備不慎慙見原陵遂不上陳思王畫讚序曰昔明徳馬后美於色厚於徳帝用嘉之嘗從觀畫虞舜見娥皇女英帝指戲之曰恨不如此為妃又前見陶唐之象后指堯曰嗟夫羣臣百僚恨不戴君如是帝顧而笑}
