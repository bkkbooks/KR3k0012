  - {type: variant, offset: 4256, length: 0, content: '', SBCK: 左右以聞更以禮殯永元二年葬北陵謚曰愍皇后孝順梁皇后續漢書曰梁皇后大將軍啇女后有光景之祥及長聦叡仰承兄姊俯接弟妹恩情周悉旣有女功之巧尤好史書學問之事九􅀊能誦孝經論語遂治韓詩大義略舉女傳列圖常在左右宗族中外咸敬異焉選入掖庭相工茅通見之大驚曰此所謂日角偃月相之極貴臣所未常見於是以爲貴人恩寵日崇乃白上曰陽以􅀶施爲德隂以不專爲義蓋詩人螽斯之福則百斯男之祚所由興也願陛下思天行之普逮均貫魚之次序使小妾得免罪謗之累於是上愈善之益親顧焉陽嘉元年立爲皇后冲帝在襁褓太后攝政和平元年崩羣臣奏謚曰順烈皇后合葬憲陵孝冲母虞貴人續漢書曰孝順虞大家孝冲皇帝母也遭冲質仍夭政在梁氏故與質帝母俱抑而無號嘉平四年小黃門趙祐議郎畢正言上孝冲皇帝母虞大家質皇帝母渤海陳夫人皆誕生聖帝未有稱號今遭盛明當以母氏序載外戚朝廷之恩臣子極賤尚有追贈況二母見存而徒曰大家夫人非所示後進母以子貴之義上感其言即日拜大家爲貴人使中常侍持節就園授印綬孝質母陳妃續漢書曰樂安陳夫人孝質皇帝母也家夲魏郡少以􅇊入孝王宫得幸生質帝梁兾欲專國權令帝母不得至京都又帝短祚是以外家無他寵靈帝拜夫人爲孝王妃孝崇匽皇后續漢書曰蠡吾􅀶園匽貴人者桓皇帝母也上年十四襲父蠡吾侯翼爵即帝位追尊父爲崇皇陵曰􅀶陵匽夫人爲崇園貴人和平元年有司上言爲孝崇皇后即授印綬宫曰永樂孝桓梁皇后續漢書曰孝桓懿獻皇后順烈后之女弟也字女瑩上始即位備禮儀納綵案舊令娉后納采乗馬束帛如孝惠孝平故事娉后黃金二萬斤永初四年立爲皇后時太后秉政皇后擅寵後宫太后崩後后恩稍衰後宫姙孕􅀂産皇子后輒隨嫉害少有得全育者然終身亦無子後見御轉希至延熹}
