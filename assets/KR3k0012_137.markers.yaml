  - {type: variant, offset: 1642, length: 1, content: 據, WYG: 身衣大帛御者秃裙不緣性不喜出入遊觀未嘗臨御牕牖又不好音樂上時幸苑囿離宫以故希從輒誡言不宜晨起因陳風邪霧露之誡辭意甚備上納焉誦易經習詩論春秋畧記大義讀楚辭尤善賦頌疾其浮華聽論輒摘其要讀光武皇帝紀至有獻千里馬寳劒者上以馬駕皷車劒賜騎士手不持珠玉后未嘗不嘆息也時有楚獄連年不斷囚證相引坐繫者甚多后慮其多濫承間為上言之上惻然感動於是夜起彷徨思論所納非臣下所得聞后志在克己奉上不以私家干朝廷兄為虎賁中郎將兩弟黄門郎訖永平世不遷明帝體不安召黄門防奉參醫藥夙夜勤勞帝崩后作起居注削去防參醫藥事章帝}
