  - {type: variant, offset: 4620, length: 375, content: 寵以衰而弟絕幸為昭儀居昭儀舍其中庭彤朱而殿上髹漆切皆銅沓冒黃金塗白玉階壁帶往往為黃金釭函謂璧中之橫帶承藍田璧明珠翠羽飾之自後宮未嘗有焉孝哀丁太后漢書曰定陶丁姬哀帝母也河平四年生哀帝丁姬為太后建平三年丁太后崩起陵恭皇之園王莽秉政乃奏貶傅太后號曰定陶恭王母丁太后號曰丁姬元始五年莽復奏恭王母及丁姬葬渭陵冢高與元帝山齊禮有改葬謂發王母及丁姬冢徙歸定陶太后以為既已之事不須發莽固爭之太后詔曰因故棺為致槨作冢祠以太牢既發傅太后冢崩壓殺數百人開丁姬槨戶火出炎四五文吏卒以水沃滅乃得入燒燔槨中器物莽復奏言前恭王母生僭居桂宮皇天震怒災其正殿丁姬死莽踰制度今火焚其槨此天見變以告當改如媵妾也共王母及丁姬槨棺皆名梓宮珠玉之衣非藩妾服請更以木槨代去珠玉葬丁姬媵妾之禮奏可既開傅太后棺臭聞數里掘平恭王母丁姬故冢二旬間皆平莽又周棘其處以為時戒云時有群鷰數千御土投冢中孝哀傅皇后, SBCK: 續}
