  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_137-1a.2}
  - {type: variant, offset: 5, length: 213, content: 太上昭靈后詩含神霧曰含始吞赤珠刻曰玉英生皇刻刻漏有玉英文出後赤龍感女媼劉季興春秋握成圖曰執嘉妻含始游雒池赤珠出刻曰玉英吞此者為王客以其年生劉季為漢皇為王客者為王者所賓客史記曰高祖母媼嘗息大澤之陂夢與神遇時雷電晦冥父太公往視則見蛟龍於上已而有娠遂產高祖帝王世紀曰太上皇名執嘉妃曰媼為昭靈后陳留風俗傳曰沛公起兵野戰喪皇妣于黃鄉天下平定乃使使者以梓宮招魂於幽野於是有丹蛇在水自洒濯入于梓宮其浴處有遺髮故謚曰昭靈后黃鄉今小黃縣也高祖呂, SBCK: 光武郭}
