  - {type: variant, offset: 1830, length: 506, content: 初李夫人病篤上自臨候之夫人蒙被謝曰妾久病形貌毀壞不可以見帝願以王及兄弟為託上曰夫人病甚殆將不起一見屬託王及兄弟豈不快哉夫人曰婦人貌不脩飾不見君父妾不敢以燕墮見帝上曰夫人若一見我將加賜千金而子兄弟尊官夫人曰尊官在帝不在一見上復言欲必見之夫人遂轉向壁欷歔而不復言於是上不悅而起夫人姊讓之曰貴人獨不可見上屬託兄弟耶何為恨上如此夫人曰所以不欲見帝者乃欲以深託兄弟也我以容貌之好得從微賤愛幸於上夫以色事人者色衰則愛絕愛絕則恩絕上所以戀戀顧念我者乃以平生容貌也今見我毀壞顏色非故必且畏惡有吐棄我意尚肯復追思憫錄其兄弟哉及夫人卒上以厚禮葬焉孝昭趙太后史記曰鉤弋夫人姓趙氏河間人也得幸武帝生子一人即昭帝也武帝年七十乃生昭帝昭帝立時年五歲衛太子廢上居甘泉宮召畫工圖畫周公負成王於是左右群臣知武帝意欲立少子後數日帝譴責鉤弋夫人脫簪珥叩頭帝曰引將去送掖庭獄夫人還顧帝曰趨行女不得活夫人死雲陽宮時暴風揚塵百姓感傷使者夜持棺往葬之封識其處其後帝間居問左右曰人言何云左右對曰人言以為且立其子何為去其母乎帝曰然是非兒曹愚人所知也往古國家所以亂也由主少母壯女主獨居驕蹇淫亂自恣莫能禁也汝不聞呂后邪故諸為武帝生子者無男女其母莫不譴死豈可謂非賢聖哉, WYG: 續}
