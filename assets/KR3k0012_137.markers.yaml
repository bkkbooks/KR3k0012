  - {type: variant, offset: 4256, length: 0, content: '', krp: 左右以聞更以禮殯永元二年葬北陵謚曰愍皇后孝順梁皇后續漢書曰梁皇后大將軍啇女后有光景之祥及長聦叡仰承兄姊俯接弟妹恩情周悉旣有女功之巧尤好史書學問之事九歲能誦孝經論語遂治韓詩大義略舉女傳列圖常在左右宗族中外咸敬異焉選入掖庭相工茅通見之大驚曰此所謂日角偃月相之極貴臣所未常見於是以爲貴人恩寵日崇乃白上曰陽以博施爲德隂以不專爲義蓋詩人螽斯之福則百斯男之祚所由興也願陛下思天行之普逮均貫魚之次序使小妾得免罪謗之累於是上愈善之益親顧焉陽嘉元年立爲皇后冲帝在襁褓太后攝政和平元年崩羣臣奏謚曰順烈皇后合葬憲陵孝冲母虞貴人續漢書曰孝順虞大家孝冲皇帝母也遭冲質仍夭政在梁氏故與質帝母俱抑而無號嘉平四年小黃門趙祐議郎畢正言上孝冲皇帝母虞大家質皇帝母渤海陳夫人皆誕生聖帝未有稱號今遭盛明當以母氏序載外戚朝廷之恩臣子極賤尚有追贈況二母見存而徒曰大家夫人非所示後進母以子貴之義上感其言即日拜大家爲貴人使中常侍持節就園授印綬孝質母陳妃續漢書曰樂安陳夫人孝質皇帝母也家夲魏郡少以伎入孝王宫得幸生質帝梁兾欲專國權令帝母不得至京都又帝短祚是以外家無他寵靈帝拜夫人爲孝王妃孝崇匽皇后續漢書曰蠡吾博園匽貴人者桓皇帝母也上年十四襲父蠡吾侯翼爵即帝位追尊父爲崇皇陵曰博陵匽夫人爲崇園貴人和平元年有司上言爲孝崇皇后即授印綬宫曰永樂孝桓梁皇后續漢書曰孝桓懿獻皇后順烈后之女弟也字女瑩上始即位備禮儀納綵案舊令娉后納采乗馬束帛如孝惠孝平故事娉后黃金二萬斤永初四年立爲皇后時太后秉政皇后擅寵後宫太后崩後后恩稍衰後宫姙孕若産皇子后輒隨嫉害少有得全育者然終身亦無子後見御轉希至延熹}
  - {type: punctuation, offset: 4258, content: ，, id: KR3k0012_CHANT_137-bkkpn1024}
  - {type: 'tls:seg', offset: 4258, content: '', id: KR3k0012_CHANT_137-30a.7}
  - {type: variant, offset: 4259, length: 0, content: '', SBCK: 憂恚崩葬㦤陵孝桓鄧皇后續漢書曰孝桓鄧皇后字猛女母宣本微初適郎中鄧香生后後適梁紀故后冒姓梁氏上誅后兄冀等立猛女爲皇后惡梁姓之同改姓亳氏復姓鄧氏后特尊驕忌與上所幸郭貴人更相讃乃廢之凡立七年以憂死葬於北邙孝桓竇皇后儥漢書曰孝桓鄧皇后章帝竇后之族孫大將軍武之女也孝靈皇帝尊皇后爲皇太后臨朝武以䆠者放縱日乆謀悉誅除廢其䆠上欲獲忠節下副論者數入禁中進白太后太后以爲此皆天所生漢元以來丗丗用事國典常故何可廢耶但當誅惡耳宁常寺管覇頗聞其語結謀誅武武自殺太后歸長樂宫嘉平元年六月崩合葬宣陵孝仁董皇后續漢書曰河間愼園董貴人孝靈皇帝母也靈帝即皇帝位追尊父長爲孝仁皇帝陵曰愼陵董太夫人曰愼園貴人及竇太后歸政還長樂宫迎貴人到京都奉璽綬上尊號爲孝仁皇后稱永樂宫竇太后崩後永樂后數至前省與上相見與於政事中平六年上弃天下永樂后兄子重爲驃􅀐將軍何太后臨朝重與太后兄大將軍進權􅀔相害后每欲參于政事太后輒相禁塞后憤恚嗔罵曰汝欲怙大將軍耶勑驃􅀐斬大將軍頭來何太后以告進進収重免官爵重自殺后憂怖病還河間崩合葬愼陵孝靈宋皇后續漢書曰孝靈宋后帝敬宋貴人之從孫執金吾酆之女無寵而乆當正位後宫幸􅁎衆共讃惡誣以祝詛上信之遂䇿収璽綬后自致􅁀室獄以憂死父兄弟皆􅀍誅諸常侍少黃門在省闥者皆憐宋氏無辜共合錢収葬后及酆父子於睪門亭宋氏舊􅉷孝靈何皇后續漢書曰孝靈靈思何皇后南陽宛人也以良家子}
