  - {type: variant, offset: 1107, length: 530, content: 景帝立立薄妃為皇后無子無寵立六年薄太后崩皇后廢孝景王皇后漢書曰孝景王皇后武帝母也父仲槐里人初嫁為金王孫婦生一女矣而母臧兒卜筮曰兩女當貴欲倚兩女奪于金氏金氏怒不肯與決乃內太子宮太子幸愛之生三女一男男方在身夢日入其懷中以告太子太子曰此貴徵也景帝即位立為皇后男為太子景帝崩武帝即位為皇太后也孝武陳皇后漢書曰孝武陳皇后長公主嫖女也武帝得立為太子長公主有力取主女為妃及帝即位妃立為皇后擅寵驕貴十餘年而無子聞衛子夫得幸幾死者數焉上愈怒后又挾婦人媚道頗覺元光五年上遂窮治之女子楚服等唑為皇后巫蠱祠祭祝詛大逆無道相連及誅者三百餘人楚服梟首於市退居長門宮司馬相如長門賦序曰孝武皇帝陳皇后得幸頗為妬別在長門宮愁悶悲思聞相如天下工為文奉黃金百斤為相如文君取酒因求解悲愁之辭而相如為頌以奏主上皇后復得親幸孝武衛皇后漢書曰孝武衛皇后字子夫生微賤為平陽主謳者武帝即位數年無子平陽主求良家女子十餘人飾置家帝祓灞上祓除也於灞水上自祓除今三月上已祓禊也還過平陽主主見所侍美人帝不悅既飲謳者進帝獨悅子夫帝起更衣子夫侍尚衣軒中得幸還唑忻甚賜平陽主金千斤主因奏子夫送入宮子夫上車主拊其背曰行矣強飯勉之即貴願無相忘入宮歲餘不復幸武帝擇宮人不中用者斥出之子夫得見涕泣請出上憐之復幸遂有身尊寵元朔元年生男據, WYG: ''}
