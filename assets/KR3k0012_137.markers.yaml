  - {type: variant, offset: 3876, length: 1, content: 以, SBCK: 後竇后幸廢爲清河王至永元九年竇后崩清河王上書求上貴人家又爲外祖}
  - {type: variant, offset: 3876, length: 0, content: '', WYG: 後竇后幸廢為清河王至永元九年竇后崩清河王上書求上貴人冢又為外祖母求詣洛陽治病詔曰聽之殤帝崩清河王子立是為安帝鄧太后崩安帝追尊小貴人曰敬隠皇后孝和隂皇后續漢書曰孝和隂皇后吳房侯綱之女也后為人聰慧有才能永元四年選入掖庭為貴人}
