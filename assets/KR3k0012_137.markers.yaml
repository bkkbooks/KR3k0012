  - {type: variant, offset: 3052, length: 806, content: 日嫗聞之怒廣漢重令為媒介遂與曾孫及立為帝平君為婕妤是時霍將軍有小女與皇太后有親公卿議更立皇后皆心議霍將軍女亦未有言上乃詔求微時故劍大臣知旨白立許婕妤為皇后孝宣霍皇后漢書曰孝宣霍皇后光女也母顯既使女醫陰殺許后顯因為女成君衣補治入宮漢書曰孝宣許后起微賤登至尊從官車服甚節儉五日一朝皇太后於長樂宮親奉案上食以婦道供養及霍后立亦循許后故事而皇太后親霍后之姊子故常竦體敬而禮之皇后輿駕侍從甚盛賞賜官屬以千萬計與許后時懸絕矣孝宣王皇后漢書曰孝宣王皇后父奉光少時好鬭雞宣帝在人間數與奉光會相識奉光有女年十餘每欲適人所當適者輒死故久不行及宣帝即位召入後宮稱為婕妤霍皇后廢後上憐太子蚤失母幾為霍氏所害於是乃選後宮素謹朴而無子者遂立王婕妤為皇后令母養太子元帝即位為皇太后成帝即位為太皇太后時成帝母亦姓王氏故號太皇太后為邛城太后年七十餘崩以后父奉光封邛城侯故號之孝元王皇后漢書曰孝元王皇后王莽之姑也王賀字翁孺為武帝繡衣御史逮捕魏郡盜皆縱不誅以奉使不稱免歎曰吾聞活千人者有封吾所活者萬餘人後世其興乎翁孺既免而與東平陵終氏為怨迺徙魏郡元城委粟里為三老魏郡人德之元城建公曰元城縣建公姓名也昔春秋沙麓崩晉史卜之曰陰為陽雄土火相乘此龜繇文陰元后陽漢也王氏舜後土也漢火故曰土火相乘陰盛而沙麓崩故有沙麓崩後六百四十五年宜有聖女興其齊田乎今王翁孺徙正值其地日月當之元城郭東有五麓之墟即沙麓地也後八十年有貴女興天下云翁孺生禁字雅君禁生女政君即元后也初母李親妊政君在身夢月入其懷及壯大婉順得婦人道常許嫁未行所許者死後東平王娉政君為姬未入王薨禁獨怪之使卜數者相政君當大貴不可言禁心以為然乃教書學鼓琴五鳳中獻政君年十八矣入掖庭為家人子皇后擇後宮可以娛侍太子者政君與在其中及太子朝皇后乃見政君等五人微令旁長御問知太子所欲太子殊無意於五人者不得已於皇后強應曰此中一人可是時政君坐近太子又獨衣絳緣遂送政君於太子宮見內殿得御幸有娠甘露三年生成帝於甲館畫堂為世嫡皇孫宣, SBCK: ''}
