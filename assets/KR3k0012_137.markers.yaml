  - {type: variant, offset: 1296, length: 1755, content: 驕貴十餘年而無子聞衛子夫得幸幾死者數焉上愈怒后又挾婦人媚道頗覺元光五年上遂窮治之女子楚服等唑為皇后巫蠱祠祭祝詛大逆無道相連及誅者三百餘人楚服梟首於市退居長門宮司馬相如長門賦序曰孝武皇帝陳皇后得幸頗為妬別在長門宮愁悶悲思聞相如天下工為文奉黃金百斤為相如文君取酒因求解悲愁之辭而相如為頌以奏主上皇后復得親幸孝武衛皇后漢書曰孝武衛皇后字子夫生微賤為平陽主謳者武帝即位數年無子平陽主求良家女子十餘人飾置家帝祓灞上祓除也於灞水上自祓除今三月上已祓禊也還過平陽主主見所侍美人帝不悅既飲謳者進帝獨悅子夫帝起更衣子夫侍尚衣軒中得幸還唑忻甚賜平陽主金千斤主因奏子夫送入宮子夫上車主拊其背曰行矣強飯勉之即貴願無相忘入宮歲餘不復幸武帝擇宮人不中用者斥出之子夫得見涕泣請出上憐之復幸遂有身尊寵元朔元年生男據遂立為皇后據即戾太子也孝武李皇后漢書曰孝武李夫人本以倡進初夫人兄延年性知音善歌舞武帝愛之每為新聲曲聞者莫不感動延年侍上起舞歌曰北方有佳人絕世而獨立一顧傾人城再顧傾人國寧知傾城傾國佳人不可再得上歎息曰善世豈有此人乎平陽主因言延年有女弟上乃召見之實妙麗善舞由是得幸生一男是為昌邑哀王李夫人少而蚤卒上憐閔焉圖畫其形於甘泉宮及衛思后廢後四年武帝崩大將軍霍光緣上雅意以李夫人配食追上尊號曰孝武皇后初李夫人病篤上自臨候之夫人蒙被謝曰妾久病形貌毀壞不可以見帝願以王及兄弟為託上曰夫人病甚殆將不起一見屬託王及兄弟豈不快哉夫人曰婦人貌不脩飾不見君父妾不敢以燕墮見帝上曰夫人若一見我將加賜千金而子兄弟尊官夫人曰尊官在帝不在一見上復言欲必見之夫人遂轉向壁欷歔而不復言於是上不悅而起夫人姊讓之曰貴人獨不可見上屬託兄弟耶何為恨上如此夫人曰所以不欲見帝者乃欲以深託兄弟也我以容貌之好得從微賤愛幸於上夫以色事人者色衰則愛絕愛絕則恩絕上所以戀戀顧念我者乃以平生容貌也今見我毀壞顏色非故必且畏惡有吐棄我意尚肯復追思憫錄其兄弟哉及夫人卒上以厚禮葬焉孝昭趙太后史記曰鉤弋夫人姓趙氏河間人也得幸武帝生子一人即昭帝也武帝年七十乃生昭帝昭帝立時年五歲衛太子廢上居甘泉宮召畫工圖畫周公負成王於是左右群臣知武帝意欲立少子後數日帝譴責鉤弋夫人脫簪珥叩頭帝曰引將去送掖庭獄夫人還顧帝曰趨行女不得活夫人死雲陽宮時暴風揚塵百姓感傷使者夜持棺往葬之封識其處其後帝間居問左右曰人言何云左右對曰人言以為且立其子何為去其母乎帝曰然是非兒曹愚人所知也往古國家所以亂也由主少母壯女主獨居驕蹇淫亂自恣莫能禁也汝不聞呂后邪故諸為武帝生子者無男女其母莫不譴死豈可謂非賢聖哉漢書曰孝武鉤弋趙婕妤家在河間武帝巡狩過河間望氣者言此室有奇女天子氣使使召之既至兩手皆拳上自披之手即時伸由是得幸號曰拳夫人進為婕妤居鉤弋宮大有寵元始三年生昭帝號鉤弋子妊身十四月乃生上曰聞昔堯十四月而生今鉤弋亦然乃命其生門曰堯母門昭帝即位追尊為皇太后漢武故事曰拳夫人進為婕妤居鉤弋宮解黃帝素女之術從上至甘泉因幸告上曰妾相運正應為陛下生一男男七歲妾當死今年必死宮中多蠱氣必傷聖體言終而臥遂卒既殯香聞十餘里因葬雲陵上哀悼又疑非常人發冢室棺無尸唯履存為起通靈臺於甘泉常有一青鳥集臺上往來至宣帝時乃止列仙傳曰鉤翼夫人姓趙少好學沉靜病臥六年右手拳飲食少望氣云東方有貴人氣推而到姿色甚偉帝披其手得一鉤而手尋拳生昭帝既而帝害之殯尸不臭而香數月昭帝即位更葬之棺空但有衣履故名其宮曰鉤翼後避諱改為弋孝昭上官皇后漢書曰孝昭上官皇后隴西上邽人祖父桀因材力親近為侍中昭帝始立年八歲帝姊鄂邑長公主居禁中共養后父安因主親近丁外人聞之長公主召入為婕妤月餘為皇后年甫六歲安以后父封侯後桀謀反發覺后以少不預謀亦以霍光外孫不廢宣帝即位合葬平陵衛太子史戾后漢書曰衛太子史良娣宣帝祖母也太子有妃有良娣有孺子妻妾凡三等子皆稱皇孫史良娣生男進號史皇孫武帝末巫蠱事起衛太子及良娣史皇孫皆遭害史皇孫王悼后漢書曰史皇孫王夫人宣帝母也名公碩太始中得幸於史皇孫皇孫妻妾無號位皆稱家人子征和二年生宣帝帝生數月衛太子皇孫敗家人子皆唑誅莫有收葬者唯宣帝得全即尊母位後追尊母夫人謚曰悼后祖母史良娣曰戾后皆改葬孝宣許皇后漢書曰孝宣許皇后元帝母也父廣漢昌邑人為暴室嗇夫廣漢有女平君十四五當為內者令歐侯氏子婦臨當入門歐侯子死其母將行卜相言當大貴母獨喜張賀聞許嗇夫有女乃置酒請之酒酣為言曾孫可妻也廣漢許諾, SBCK: ''}
