  - {type: variant, offset: 3883, length: 1, content: 哀, SBCK: 續漢書曰孝和隂皇后呉房侯綱之女也后爲人聦惠有才能永元四年選入掖庭爲貴人以託先后近屬故有異寵立爲皇后自和熹鄧后入宫後隂后寵衰怨恨后外母鄧朱數出入后所有言后與朱共挾蠱賜后䇿遷于桐宫以憂死葬臨平亭部孝和鄧皇后曹大家附續漢書曰孝和和熹鄧皇后太傅髙宻侯禹之孫平壽敬侯訓之女也訓有五男三女長騭次京悝弘閶女燕次綏綏即后也次容蚤卒有子女娥甫在襁褓時后年十二傷娥早􅀌養視撫育慈恩􅀷至后七􅀊讀論語十二通詩諸兄讀經輒難問微意志在書傳母非之曰當習女工以供衣服今不是務汝當舉􅀶士耶后重違母意則縫綻極女工事暮夜􅀻買脂燭讀經傳宗族内外皆號曰諸生父訓心異之永元四年呼相工􅂫太相后大驚曰此成湯之骨法也貴不可言七年中復與諸家女俱選入宫姿容窈窕進退辭令粲然有異與衆女殊八年十一月巳夘后入掖庭爲貴人諸兄除郎中后時年十六德冠後宮后性恭肅小心承事隂氏夙夜兢兢接撫同列常尅巳下之上􅀷喜焉遂有特寵后自入宫遂􅀶覽五經傳記圖䜟内事風􅀨占候老子孟子禮記月令法言不觀浮華申韓之書上每欲官秩后諸兄弟輒爲推讓孝和世騭裁虎賁中郎將京悝弘閶黃門郎和}
  - {type: page-break, offset: 3883, content: '', id: KR3k0012_SBCK_137-5a}
