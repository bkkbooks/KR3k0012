  - {type: variant, offset: 4259, length: 0, content: '', WYG: 憂患崩葬懿陵孝桓鄧皇后續漢書曰孝桓鄧皇后字猛女母宣本微賤初適郎中鄧香生后後適梁紀故后冒姓梁氏永興中入掖庭為采女上誅后兄冀等立為皇后帝惡梁姓之同改姓薄氏復姓鄧氏后恃尊驕忌與上所幸郭貴人更相譖乃廢之凡立七年以憂死葬於北邙孝桓竇皇后續漢書曰孝桓竇皇后章徳皇后之族孫大將軍武之女也延熹八年鄧后廢立為皇后孝靈帝立尊皇后為皇太后臨朝武以宦者放縱日久謀悉誅其衆上欲獲忠節下以副輿論數入禁中進白太后太后以為此皆天所生漢興以來世世用事國故典常何可廢耶但當誅首惡耳中常侍管霸頗聞其語結謀誅武武自殺太后歸長樂宫嘉平元年六月崩合葬宣陵孝仁董皇后續漢書曰河間慎園董貴人孝靈皇帝母也靈帝即皇帝位追尊父萇為孝仁皇帝陵曰慎陵董太夫人曰慎園貴人及竇太后歸政還長樂宫迎貴人到京都奉璽綬上尊號為孝仁皇后稱永樂宫竇太后崩後永樂后數至前省與上相見與於政事中平六年上棄天下永樂后兄子重為驃騎將軍何太后臨朝重與太后兄大將軍進權勢相害后毎欲參與政事太后輒相禁塞后憤恚嗔罵曰汝輈張怙汝兄耶勅驃騎斬大將軍頭來何太后以告進進收重免官爵重自殺后憂怖病還河間崩合葬慎陵孝靈宋皇后續漢書曰孝靈宋皇后敬隐宋貴人之從孫執金吾酆之女無寵而久當正位後宫幸姬衆共譖惡誣以祝詛上信之遂䇿收璽綬后自致暴室獄以憂死父及兄弟皆被誅諸常侍小黄門在省闥者皆憐宋氏無辜共合錢物收葬后及酆父子於臯門亭宋氏舊塋孝靈何皇后續漢書曰孝靈靈思何皇后南陽宛人也以良家子}
