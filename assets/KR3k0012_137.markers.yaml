  - {type: variant, offset: 2824, length: 227, content: 稱皇孫史良娣生男進號史皇孫武帝末巫蠱事起衛太子及良娣史皇孫皆遭害史皇孫王悼后漢書曰史皇孫王夫人宣帝母也名公碩太始中得幸於史皇孫皇孫妻妾無號位皆稱家人子征和二年生宣帝帝生數月衛太子皇孫敗家人子皆唑誅莫有收葬者唯宣帝得全即尊母位後追尊母夫人謚曰悼后祖母史良娣曰戾后皆改葬孝宣許皇后漢書曰孝宣許皇后元帝母也父廣漢昌邑人為暴室嗇夫廣漢有女平君十四五當為內者令歐侯氏子婦臨當入門歐侯子死其母將行卜相言當大貴母獨喜張賀聞許嗇夫有女乃置酒請之酒酣為言曾孫可妻也廣漢許諾, WYG: 寵}
