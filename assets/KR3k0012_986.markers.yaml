  - {type: variant, offset: 2, length: 124, content: 二丹易參同契曰丹沙木精得金乃并書曰荊及衡陽惟荊州杶幹栝柏礪砥砮丹砥細於礪皆磨石也砮石中矢鏃丹朱類汲冢周書玉會曰成王時濮人獻丹沙濮人西南角之蠻丹沙所出禮儀曰君乘木而王地生丹孝經援神契曰德至山陵則陵出黑丹宋均注曰丹應五典備五色也春秋斗運樞曰搖光得陵出黑, SBCK: 三}
