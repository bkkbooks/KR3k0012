  - {type: variant, offset: 1504, length: 0, content: '', WYG: 成仙凡百二十種皆肉芝也漢武内傳曰仙芝上蕊有大虹芝五行論曰章帝時零陵生芝草五本又初稟篇曰朱草之莖如鍼紫芝之􅂒如豆如珠玉者稟氣而生亦猶此也茅君内傳曰句曲山上有神芝五種第一曰龍仙芝似蛟龍之相負服之為太極仙卿第二曰參成芝赤色有光叩之其枝葉如金石之音折而續之即如故服之為太極大夫第三曰燕胎芝其色紫形如葵葉象如燕欲飛狀光明洞徹服之拜為太清龍虎仙君第四曰夜光芝其色青實正白如李夜視其實如月光照洞一室服一株為太清仙官第五曰玉芝色白如玉剖食拜三官真御史也神仙傳曰漆飛黄子張虛字子黄遼人也行𤣥素之道年二百嵗有少容服九英葢芝石象而成道也又曰子舊服赤烏散及夜光芝仙人採芝圖曰芝生於名山食之令人乗雲能上天觀望八極通見神明鳳凰芝草生於名山之上金玉之間石上隂乾始食一年令人羽翼皆生夀千嵗能乗雲與鳳凰俱乾末服方寸能令人昇仙中者數萬嵗下者千嵗欲求芝草入名山必於三月九月此山間出神藥之月也勿以山浪日必以天輔時三竒會尤嘉三竒吉門到山須六隂之日明堂之時帶靈寳符牽白犬抱白雞以白鹽一㪷及開山符檄著大石上執吳唐草一抱以入山山神喜必得芝也又採芝欲得王相専和之日支干上下相生為佳此諸芝名山多有之但凡庸道士心不精志行穢徳薄又不暁入山之術雖得其圖不知其狀亦終不能得也山無大小皆有鬼神所䕶其鬼神不以芝與人人雖踐之而終不可見也又曰草芝有獨搖芝無風自動其莖大如手指赤如丹素葉如莧其根有大魁如斗有細者如雞子十二枚周繞大根四方似倣傚十二辰也相去丈許皆有細根如白髮以相連生高山深谷之上其所生左右無草得大魁末服之盡則千嵗服其細者一枚百嵗不可以他分也懐其大根即隠形欲見則左轉而出之又曰牛角芝生虎夀山及吳陵上狀如葱而特生如牛角長三四尺青色末服方寸七日服其三至百日則壽得百嵗矣又曰龍仙芝狀如昇龍之相負以葉為鱗其根則如龍蟠服一株得千嵗矣又曰紫珠芝其莖黄其葉赤其實如李而紫色二十四枚輒相連而垂如貫珠也又曰白符芝高四五尺似梅常以大雪而花季冬而實又曰朱草芝九曲曲有三葉三實也又曰五徳芝狀如橉莖方其葉五色各具而不雜狀如偃葢中嘗有甘露紫光}
