  - {type: variant, offset: 164, length: 239, content: 諸水有石丹者其水中皆有丹魚先夏至十日夜伺之丹魚必浮於岸側赤光上照赫然如火網而取之雖多勿盡取之也割取血以塗足下則可步行水上長居水中史記曰寡婦清先得丹穴而擅其利清寡婦能守其業始皇為女築懷清臺梁書曰陶弘景既得神符祕訣以為神丹可成而苦無藥物帝給黃金朱沙曾青雄黃等後合飛丹色如霜雪服之體輕及帝服飛丹有驗益敬重之唐書曰道士劉道合者宛丘人高宗令合還丹丹成而上之咸亨中卒唯有空皮而背上開拆有似蟬蛻高宗聞之曰劉師為我合丹自服仙去其所進者亦無異典略曰白丹者山陵之精也淮南子曰赤水宜丹黃水宜金清水宜龜, SBCK: ''}
