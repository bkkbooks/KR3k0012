  - {type: variant, offset: 1040, length: 282, content: 神液如方諸之得水也飲之令人不死又曰九丹誠為仙藥之上然合作之所用雜藥甚多若四方清通者市之可得取若九域分攝則其物或不可得也又曰葛稚川云余祖鴻臚少時曾為臨沅令云此縣有廖氏家世壽考或出百或八九十後徙去子孫多夭折他人居其故宅者復累世壽由此乃覺是宅所為而不知其何故疑其井水殊赤乃試掘井左右得古人埋丹沙數十斛山海經曰拒山英水出焉其中多丹粟又曰始州國有丹山論衡曰太公陰謀書武王伐紂食小兒以丹金身純赤長大教云殷王亡民見兒身赤以為天神說文曰丹越之赤石也臒善丹也神仙傳曰采女請問彭祖延年之法彭祖曰欲舉形登天上補仙官者當用金丹此九君太一所以白日昇天又曰馬明生從道人受太清神丹經三卷入山合藥, WYG: ''}
