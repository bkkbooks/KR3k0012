  - {type: variant, offset: 2994, length: 0, content: '', SBCK: 服至百日則得千歳矣又曰龍仙芝狀似昇龍之相􅀒也以葉爲鱗其根則如蟠龍服一株得千歳矣又曰紫珠芝其莖黄其葉赤其實如李而紫色二十四枚輙相連而垂如貫珠也又曰白符芝髙四五尺似梅常以大雪而花季冬而實又曰朱草芝九曲有三葉葉有實也又曰五德芝狀似樓殿莖方其葉五色各具而不雜狀如偃盖中甞有甘露紫光起數尺又曰龍衘芝常以仲春對生三節十二枚下根如坐人凡此草芝又有百二十種隂乾服之則令人與天地相畢或得千歳二千歳又曰􅁏芝者謂萬歳蟾蜍頭上有角頷下有丹書八宇以五月五日日中時取之隂乾百日以其足􅀞地即爲流水千歳蝙蝠色如白雪集則倒懸腦重故也此二物得而隂乾末服之令人壽四萬歳千歳􅀛五色具額上兩骨起似角以羊血浴之乃剔取服之壽千歳行山中見小人乗車馬長七八寸者􅁏芝也取服即成仙凡百二十種皆􅁏芝漢武内傳曰仙芝上蘂有大真虹芝論衡曰章帝時零陵生芝草五本又􅀄禀篇曰未草之莖如鍼紫芝之栽如豆如珠玉者禀氣而生亦猶此也茅君内傳曰勾曲山上有神芝五種第一曰龍仙芝似交龍之相􅀒服之爲太極仙卿第二曰名叅成芝赤色有光扣其枝葉如金石之音折而續之即如故服之爲太極大夫第三曰燕胎芝其色紫形如葵葉燕象如欲飛􅃺光明洞徹服一株拜爲太清龍虎仙君第四曰名夜光芝其色青實正白如李夜視其實如月光照洞一室服一株爲太清仙官第五曰玉芝色白如玉剖食拜三官正真御史也神仙傳曰漆飛黄子張虚字子黄遼人也行玄素之道年二百歳有少容服九英盖芝石象而得道也又曰刁子然服赤烏散及夜光芝仙人採芝圗曰芝生於名山食之令人乗雲能上天觀望八極通見神明鳯凰芝草生於名山之上金玉間文石上隂乾治食一年令人羽翼皆生壽千歳能乗雲與鳯凰俱又曰水芝生於名山大谷之隂治食之能入水中乗雲行通神明能使百􅀑甘露芝生於石山之隂有五彩覆之又曰車馬芝生於名山之中此尭時七車馬化爲之能得食之乗雲而行上有雲氣覆之萬年芝生於名山之中及蓬萊山又曰地芝生於名山得食之延年益壽一舉千里走越江海又曰月芝生於名山之隂金石珠玉之間隂乾治食令人有毛二尺延壽萬歳又曰土芝生於名山之隂黄雲覆之此戊巳中宫黄帝之精食之益壽八千又曰黒雲芝生於名山大谷涼泉之間黒盖赤裏莖黒味鹹苦食之一年能入火不燋入水不漬石芝生於名山之隂色黄上有不死之藥如甘露味極美取而食之令人不死赤松子所服山芝之居東西行三南北行五此爲山芝其色皆白山芝者韓終所食也與天地相極延年益壽通神明矣又曰人芝生於名山之隂青盖白莖黄龍芝生於神仙之中狀如黄龍雲氣芝生於名山之中盖白莖白裏赤天芝生於名山之隂千秋芝生於大谷中四方異色南赤西白北黒東青食之不老老者不死雷芝生於名山之隂白石之上有白雲覆之黄雲芝生於名山之中金石間上有黄雲覆之食之壽千歳令人通見神明乗雲爲車風爲馬青雲芝生於名山之隂雲母芝生於名山澤泉之旁白虎芝生於名山之隂大木下􅃺如虎盖青味辛食之令人有力又曰東方芝生於山東之隂南方芝生於神山之陽北方芝生於北海之山大谷水中􅃺異而澤西方芝生於崑崙之上金石間萬年芝牛於名山之隂又曰夜光芝生於名山之隂大谷凉泉中金石間有浮雲翔其上太一芝生於名山之陽盖黄莖赤得而食之令人不老與天地相保又曰虎芝生於名山之隂􅃺如虎食之身輕延壽八百年鳴鳥芝生於名山多林之陽􅃺如鳥五色隂乾治食令人身輕與風俱行又曰赤龍芝生於名山之隂源泉澤泉中状如龍其色赤白以秋採之便有白光食之壽與天地無極黒龍芝生於名山之中大木下黒色如龍食之便令人能入水中孫氏瑞應圖曰芝草常以六月生春青夏紫秋白冬黒十洲記曰祖州有飬神丹芝似菰苗長三四尺人死以草覆之皆活服之長生秦始皇時大疫多有死者有鳥如烏衘此草以覆死人面燈時皆活始皇聞以問北郭􅀑谷先生先生曰此不死草也生瓊田中又有鍾山仙家數十萬耕田種芝草嵩高山記曰嵩髙山上有神芝人芝者􅃺似小兒地芝者辟方一尺如黄金色覆以五色雲有神龍守之食者可以遐年崔豹古今注曰元和二年芝生沛如人冠􅃺又如章武如人抱三子􅃺成帝建初五年芝生頴川常以六月中生一葉春青夏紫秋白冬黒十月復黄氣岀上尺五寸愽物志曰名山生神芝不死之草上芝爲車馬形中芝爲人形下芝爲六畜形唐新語曰崔希嶠以孝友稱丁内憂哀毀過禮爲鄭縣丞芝草生所居堂一􅀫而葩盖盈尺杜寳大業拾遺録曰七年六月東都永康門内㑹昌門東生芝草百二十莖散在地周十歩許紫莖白頭或白莖黑頭或有枝或無枝亦有三枝如古岀宇者地内根並如綿大相連着乾陽殿東東上閣前槐樹上生芝九莖共本相扶而生中莖最長兩邊八莖相次而短有如樓閣甚㓗白武賁郎􅀅叚文操留守􅀞圖表奏本草經曰青芝一名龍芝食之身輕不老神仙生太山山谷亦生五岳地上又曰黄芝一名金芝食之神仙生嵩髙山山谷中又曰赤芝一名丹芝食之爲神仙生霍山山谷又曰黒芝一名􅀇芝生􅁪山山谷又曰紫芝一名木芝乆服延年作神仙生山岳地上色紫形如桑吴氏本草經曰紫芝一名木芝九歌曰采三秀􅀆於山門三秀芝草石磊磊􅀆葛蔓蔓繆襲神芝賛曰青龍元年五月庚辰神芝生乎長平之習陽其色紫丹其質光曜髙尺八寸五分散爲三十有六莖枝幹連屬有似􅃢瑚之形詔御府匱而藏之具}
