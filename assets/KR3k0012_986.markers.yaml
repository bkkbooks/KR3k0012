  - {type: variant, offset: 1362, length: 685, content: 十六水方又曰李少君從安期先生受神丹爐火之方家貧不得藥乃以方干漢武帝云又曰葛玄字孝先從左元放受九丹金液仙經又曰劉元鳳南陽人服芙蓉丹及鷄子丹魯女生別傳曰李少君字雲翼齊國臨淄人也少好道入山採藥修全身之術道未成而病困於山林中遇安期先生經過見少君少君叩頭求乞生活安期愍其有志乃以神樓散方與服之即起少君求隨安期奉給奴役廣志曰丹朱沙之朴也大者如米生山中出牂牁與古僂國裴淵廣州記曰鄣平縣有朱沙塘水如絳又曰鄣平縣有石膏山望之若霜雪又一嶺東為銀石南是鐵石西則丹沙北乃銅石本章曰丹砂味甘微寒生山谷養精神益氣明目鈆丹味辛微寒生平澤治吐逆胃反久服成仙生蜀都吳氏本草曰丹砂神農甘黃帝歧伯苦有毒扁鵲苦李氏大寒或生武陵採無時能化朱成水銀畏礠石惡鹹水武陵太守謝承表曰新宮成上丹砂五百斤上億萬歲壽芝上春秋運斗樞曰搖光得陵出黑芝孝經援神契曰德至草木則芝草生爾雅曰苬似由反芝也郭璞曰芝一歲三華瑞草漢書曰武帝時芝生殿內房中九莖詔赦天下作芝房歌又曰宣帝神爵元年三月詔曰金芝草九莖服虔曰色象金產于函德殿銅池中如淳曰函亦含也銅池承霤也晉灼曰以銅作池韋昭曰以銅飾池邊也東觀漢記曰明帝永平七年公卿以芝生前殿奉觴上壽桓帝建和元年芝草生中黃藏府又曰光和四年郡國上芝草英續漢書曰建初五年零陵女子傅寧宅內生紫芝五株長者尺四寸短者七八寸太守沈豐使功曹齎芝以聞帝告示天下宋書曰順帝升明二年臨城縣生紫蓋黃裏芝芝歷時質色不變唐書曰貞觀中皇太子寢室中產素芝十四莖並為龍興鳳翥之刑又曰天寶中有玉芝產于大同殿之柱礎一本兩莖神光照於殿又曰上元中延英殿御座生玉芝一莖三花御製玉靈芝詩淮南子曰巫山之上從風縱火紫芝與蕭艾俱死又曰稻生水而不能生於湍瀨之流, SBCK: ''}
