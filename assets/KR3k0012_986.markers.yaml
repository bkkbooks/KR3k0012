  - {type: variant, offset: 2735, length: 244, content: 重乃得之在大石中赤黃溶溶如鷄子之在殼中也即當飲之不飲則漸堅凝成石不復中服也法正當及未堅時啜之既凝則不得服也破一石中多者有一升少者有數合不可頓服雖不得多相繼服之其計前後所服合成三斗則千歲但欲多服唯患難得耳又曰石脛芝生滑石中亦如石中黃子狀但不皆有耳打破大滑石千許乃可得一斤初破之其在石中五色光明而自動服一升得千歲矣又曰木芝者松柏脂淪地千歲化為伏芝萬歲其上生小木狀似蓮花名曰木威喜芝夜視有光持之甚滑燒之不燋帶之辟兵以帶鷄而雜他鷄十二頭共籠之去十二步射十二箭他鷄皆傷帶威喜芝者終不傷也從生門上採之, WYG: ''}
