  - {type: variant, offset: 157, length: 56, content: 取伏丹法云天下諸水有石丹者其水中皆有丹魚先夏至十日夜伺之丹魚必浮於岸側赤光上照赫然如火網而取之雖多勿盡取之也割取, WYG: ''}
