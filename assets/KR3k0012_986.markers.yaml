  - {type: variant, offset: 1505, length: 11, content: 少君求隨安期奉給奴役廣, WYG: 數尺又曰龍御芝常以仲春時生有三節一十二枚下根如人坐又曰水芝生於名山大谷之隂治食之能入水中乗雲行通神明能使百鬼甘露芝生於石山之隂常有五綵色覆之又曰車馬芝生於名山之中此尭時有車馬化為芝能得食之乗雲而行上有雲氣覆之又曰萬年芝生於名山之中及蓬萊山又曰地芝生於名山得食之延年益夀一舉千里走越江海又曰月芝生於名山之隂金石珠玉之間隂乾治食令人有毛二尺延夀萬嵗又曰玉芝生於名山之隂黄雲覆之此戊巳中宮黄帝之精食之益夀八千又曰黒雲芝生於名山大谷凉泉之間黒葢赤莖味鹹苦食之一年能入火不焦入水不漬又曰石芝生於名山之隂色黄上有不死之藥如甘露味極美取而食之令人不死赤松子所服山芝之生東西行三南北行五此為山芝其色白山芝者韓終所服也與天地相極延年益夀通神明矣又曰人芝生於名山之隂青葢白莖黄龍芝生於神山之中狀如黄龍雲氣芝生於名山之中葢白莖白裏赤天芝生於名山之隂千秋芝生於大谷中四方異色南赤西白北黒東青食之不老老者不死雷芝生於名山之隂白石之上有白雲覆之黄雲芝生於名山之中金石間上有黄雲覆之食之夀千嵗令人通見神明乗雲為車風為馬青雲芝出於名山之隂雲母芝生於名山澤泉之旁白虎芝生於名山之隂大木下狀如虎葢色青味辛食之令人有力又東方芝生於東山之隂南方芝生於神山之陽北方芝生於北海之山大谷水中狀異而澤西方芝生於崑崙之上金石間萬年芝生於名山之隂又曰夜光芝出於名山之陰大谷源泉中金石間有浮雲翔其上又曰大乙芝生於名山之隂葢黄莖赤得而食之令人不老與天地相保又曰虎芝生於名山之隂狀如虎食之身輕延夀八百年餘又曰鳴鳥芝生於名山多林之陽狀如鳥也有五色隂乾治食令人身輕與風俱行又曰赤龍芝生於名山之隂源泉澤泉中狀如龍其色赤以秋採之便有白色如龍食之使人能入水中孫氏瑞應圖曰芝草常以六月生春青夏紫秋白冬黒十洲記曰祖洲有養神丹芝似菰苗長三四尺人死以草覆之皆活服之長生秦始皇時大疫多有死者有烏銜此草以覆死人面登時皆活始皇聞以問北郭鬼谷先生先生曰此不死草也生瓊田中有鍾山仙家數千萬耕田種芝草嵩高山記曰嵩高山有人芝人芝者狀如小兒地芝者辟方一尺如黄金色覆以五色雲有神龍守之食之者可以遐年崔豹古今注曰元和二年芝生沛如人冠狀又生章武如人抱三子狀成帝建初五年芝生賴州常以六月中生一葉春青夏紫秋白冬黒十月復黄氣出尺五寸博物}
