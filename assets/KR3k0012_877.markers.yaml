  - {type: variant, offset: 2138, length: 408, content: 震曜父墓門屋大風飄發其父寢堂于外垣五十餘步松柏眾木植已成林至是悉枯死曜竟為石勒所擒又曰劉曜末年與石季龍對軍不撫士眾專與嬖臣愽飲左右諫之以為妖言斬之大風拔木昏霧四塞須臾見擒又曰前涼張玄靜四年六月大風震雷晦冥宮中雨水深四尺時宋混兄弟擅權玄靜虛坐而已後魏書曰孝文太和中安定王禎出為湘州刺史至日暴風大雨凍死者數十是月禎發背死後宣武延昌三年章武王熙除湘州刺史七月入理其日大風雨凍死者二十餘人驢馬凍死數十熙聞祖父禎前事心甚惡之俄而舉兵反伏誅齊書曰後主天統年大風晝晦發屋拔木和士開譖趙王叡生坐死士開出入宮掖胡太后幸之琅邪王儼矯詔殺士開於南臺儼伏誅又曰後主末年安德王延宗鄴下宅被風吹其廳棟榱相連置外數百步後主敗為王二日被擒入周賜死陳書曰陳文帝天嘉三年梁永嘉王將司空王琳與陳將侯禎對軍其日東西風吹琳舟艦琳軍大敗又曰天嘉六年大風西南吹靈臺候樓倒又曰後主至德年風吹朱雀門倒又禎明年大雨風自西北激濤水入石頭城時後主昏誅諫臣沈客卿明年陳亡又曰, SBCK: 花}
