  - {type: variant, offset: 1665, length: 6, content: 徐妃初嫁夕車, SBCK: 建昭四年􅀨土梁書曰武帝大同元年􅀨土二年又􅀨黄塵如雪攬之盈掬時帝溺於佛法興造尤甚後魏書曰世宗景明四年凉州􅀨􅁟如霧時舅尚書令髙肇專政俄而􅀍殺隋書曰隋文帝開皇二年京師􅀨土四年関中亂飢諸王各謀爲逆時内營都邑後起仁壽宫丁匠死者太半􅀨沙隋書曰梁簡文時􅀨黄沙時侯景陵上其年人相食􅀨􅁅隋書曰梁武大同年􅀨􅁅色黄時帝惡人勝巳又信佛法捨身爲奴蔽賢絶道後有侯景之亂雨血戰國䇿曰齊湣王三十一年侵伐隣國窮兵極武外怨於諸侯内失於百姓燕將樂毅連五國兵以伐之湣王出走楚使淖齒救齊淖齒謂王曰夫千乗愽昌間地方數百里雨血沾衣嬴􅀶之地坼及}
