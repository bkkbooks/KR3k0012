  - {type: variant, offset: 2547, length: 302, content: 文帝開皇中宮都大風發屋拔木時獨狐皇后干預政事後宮多有濫死又楊素邪佞又曰開皇末泰州商胡乘騾遇暴風飄上空數百丈俄而墜下人騾俱碎時晉王廣矯詐取媚謀危太子勇勇竟廢死立廣為太子淮南子曰人主之精通于天故誅暴則多飄暴風京房易妖占曰獄吏暴害人臣專政暴風折木又曰暴風析柱邑大憂暴風折木吹草上屋且有急令獨祿風入宮人主死飄數相從入殿門有凶疾憂以此亡飄留君門一日一夜不去亂兵在門獨祿風者回轉風也京房別對災異曰狂風發何人君政教無法為下所逆則致狂風發泄其救也脩政教聘賢士狂風消矣又曰人君賊罰良善政教無常使命數變則致暴風折木發屋鳴瓦或害殺人其救也脩舊典任忠臣思過自改則風災消六韜曰人主好田獵畢弋則歲多大風飄牛馬發屋拔木民人飛揚數十里漢, SBCK: ''}
