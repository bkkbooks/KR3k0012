  - {type: variant, offset: 1390, length: 1, content: 建, SBCK: 時王敬則爲大司馬拜日大􅀨洪注文}
  - {type: variant, offset: 1390, length: 1, content: 建, WYG: 時王敬則為大司馬拜日大雨洪注文}
  - {type: variant, offset: 1390, length: 1, content: 建, krp: 時王敬則爲大司馬拜日大雨洪注文}
  - {type: variant, offset: 1392, length: 1, content: 末, SBCK: 失色敬則後竟􅀍誅崔鴻十六國春秋曰後趙石勒將㓂鄴霖􅀨三月不止王師敗季龍于臣靈口赴水死者五百餘人勒軍大飢相食又曰石勒元年大霖􅀨滂沱泛溢衝山䧟谷巨松僵拔東至于海原隰之間皆如山積後文騫擊勒孔萇大敗而歸後又霖􅀨中山暴水流漂巨木百萬後有季龍􅆲奪之事隋書曰魏静帝時大􅀨七十餘日後元瑾荀濟劉思逸謀殺齊文宣不遂咸􅀍誅又曰北齊武成清河年大􅀨晝夜不息數十日山東大水人多餓死是年匈奴來㓂并州又曰後主大統三年積隂大􅀨時太后􅁋亂也隋書曰文帝仁壽元年夏驟􅀨震雷}
  - {type: page-break, offset: 1392, content: '', id: KR3k0012_SBCK_877-7b}
  - {type: variant, offset: 1392, length: 1, content: 末, WYG: 失色敬則後竟被誅崔鴻十六國春秋曰後趙石勒將冦鄴霖雨二月不止王師敗季龍干匡靈赴水死者五百餘人勒軍大饑相食又曰石勒元年大霖雨滂溢衝山䧟谷巨松摧㧞東至于海原隰之間皆如山嶺後文騫擊勒姚萇大敗而歸後又霖雨中山暴水流漂巨木百萬後有季龍􅆲奪之事隋書曰魏靜帝時大雨七十餘日後元瑾荀濟劉思逸謀殺齊文宣不遂咸被誅又曰北齊武戍清河年大雨晝夜不息數十日山東大水人多饑死是年匈奴來冦荆州又曰後主天統三年積隂大雨時太后滛亂也隋書曰文帝仁夀元年夏驟電震雨}
  - {type: page-break, offset: 1392, content: '', id: KR3k0012_WYG_877-12b, image: WYG0900/WYG0900-0655d.png}
  - {type: page-break, offset: 1392, content: '', id: KR3k0012_WYG_877-13a, image: WYG0900/WYG0900-0656a.png}
  - {type: variant, offset: 1392, length: 1, content: 末, krp: 失色敬則後竟𬒳誅崔鴻十六國春秋曰後趙石勒將㓂鄴霖雨三月不止王師敗季龍于臣靈口赴水死者五百餘人勒軍大飢相食又曰石勒元年大霖雨滂沱泛溢衝山䧟谷巨松僵拔東至于海原隰之間皆如山積後文騫擊勒孔萇大敗而歸後又霖雨中山暴水流漂巨木百萬後有季龍篡奪之事隋書曰魏静帝時大雨七十餘日後元瑾荀濟劉思逸謀殺齊文宣不遂咸𬒳誅又曰北齊武成清河年大雨晝夜不息數十日山東大水人多餓死是年匈奴來㓂并州又曰後主大統三年積隂大雨時太后淫亂也隋書曰文帝仁壽元年夏驟雨震雷}
