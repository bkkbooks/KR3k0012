  - {type: variant, offset: 529, length: 2, content: 正始, SBCK: 王莽地皇中赤眉殺太師羲仲莽遣太師王匡討之莽兵出東都門外天大雨沾衣長安父老歎曰是爲軍泣時百姓飢荒莽令煑草爲酪不可食重於煩費又曰四年六月光武兵至昆陽莽使司徒王㝷司空王邑將兵百萬圍之㑹天大風飛屋瓦􅀨下如注二公兵亂敗自相殘殺滍水爲之不流後漢書曰靈帝時夏京師大􅀨水其秋中常侍曹節矯詔誅太傅陳蕃將軍竇武遷太后於北宫至後年京師又雨水暴出其年竇太后崩是苦􅀨之應也又曰獻帝􅀄平􅀄董卓逼帝入長安將入宫日大􅀨晝昬卓殺太傅􅀽隗太僕􅀽基及男女宗族五十餘人又曰獻帝時夏大􅀨水時曹操殺皇后伏氏又曰獻帝末司徒王允殺董卓卓將李􅔸郭汜攻䧟長安殺戮甚衆乃収卓尸葬於郿葬日大風􅀨雨水從藏溢漂卓棺岀於穴俄而􅔸汜皆􅀍殺續漢書曰建光}
