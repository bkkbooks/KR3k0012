  - {type: variant, offset: 1061, length: 324, content: 出遊門外飄風飛其儀蓋又曰符堅三年長安大風堅宮中樹悉拔是歲王猛死沈約宋書曰孝武帝大明七年風吹初寧陵隧口左標折鍾山通天臺新成飛倒散落山澗又曰徐羨之文帝初作楊州有摽風自西明門須臾入城直至廳前繞帽及蓆遙遠雲際尋羨之為文帝所誅又曰文帝元嘉九年壽陽驟雨有迴風雲霧廣三十步從南來至城西迴散滅當其衝者室樹木皆摧到其年晉寧太守松子反又曰元嘉三十年正月朔上會群臣於大極殿有大風拔木雷電晦瞑凍殺牛馬及人明年太子劭逆也又曰孝武時柳太尉乘車行還於庭中洗車有大風從門而入直來衝車有聲車蓋覆向天其年明帝立合門被殺又曰竟陵王誕文帝子孝武時鎮京口夜大風吹落屋瓦城門鹿床倒覆反鎮廣陵將入城衝風暴起俄而反伏誅又曰順帝昇明二年飄風起建康縣吹帛一疋入雲風止下於御道上俄而宋授禪其君為疋夫之象, SBCK: ''}
