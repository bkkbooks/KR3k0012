  - {type: variant, offset: 1738, length: 9, content: 至江陵結營夜疾風甚, WYG: 司馬宣王討平之缺崔鴻十六國春秋曰前趙劉聰時有流星起于牽牛闕宫龍形委曲蛇形光昭地落于平陽北十里視之則闕聞平陽長三十步旁常有哭聲雨毛京房曰邪進賢退前樂後憂金失其性則雨毛也漢書曰武帝時天雨白毛明年又雨之闕征役繁興戸口凋散晉書曰武帝時闕白闕益州刺史皇闕為牙門張𢎞謀害晉書曰文帝闕皇六年師雨毛如馬尾闕三尺餘六七寸其月梁仕闕宇文闕劉闕以謀反闕十萬人築長城又於塲州開山造瀆以通運衆役繁與雨毛之應}
