  - {type: variant, offset: 3946, length: 307, content: 橋同日俱震時勞役大起古今五行記曰吳孫權赤烏八年夏雷震宮門柱又擊南津橋至十三年廢太子和立子亮又曰晉惠帝永康初六月震崇陽陵標西南五百步標破時賈后陷害大臣終見殺晉中興書徵祥說曰元興三年永安王皇后至自巴防將設威儀入宮天大雷震人馬多死沈約宋書曰元嘉十四年震初寧陵標四破至地十七年廢大將軍彭城王義康後魏書曰太祖天賜六年震天安殿東序帝惡之令佐校以衝車攻殿東西兩序屋毀之唐書曰太宗貞觀十一年四月震乾元殿前槐樹冬雷京房易妖占曰天冬雷地必震教令撓則冬雷民飢漢書曰昭帝五年十一月大雷震十二月丞相王訢薨後漢書曰安帝永初六年十月郡國大雷延光四年十月郡國凡三十雷時鄧太后專政帝不親萬機晉書曰吳孫亮建興初十二月大風雷亮見廢又曰愍帝建興初十一月大, WYG: ''}
