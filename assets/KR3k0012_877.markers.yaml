  - {type: variant, offset: 3714, length: 375, content: 夏桀末年雷震殺人其年湯放之左傳曰僖公十五年九月晦震夷伯之廟董仲舒以為夷伯季氏之陪臣不當有廟明絕去僣差之類河圖曰臣僣奢下犯主則雷電擊朝京氏易五星占曰雷霆殺人何夫雷天拒難之折衝也人君承用節度即雷風以節暴行威福則雷霆殺人其救也議獄綏死則災銷矣京房別對災異曰雷鳴連而不絕者何夫雷鳴萬里懼今鳴不絕此謂人君行政事民不恐懼也故致游雷之災雷當先電而鳴今雷電俱出或鳴而後電何此謂執法者貪所致災也後漢書曰桓帝建和三年六月雷震憲陵寢屋先是太后聽兄梁冀桓殺李固杜喬魏志曰魏明帝景初中洛陽水橋同日俱震時勞役大起古今五行記曰吳孫權赤烏八年夏雷震宮門柱又擊南津橋至十三年廢太子和立子亮又曰晉惠帝永康初六月震崇陽陵標西南五百步標破時賈后陷害大臣終見殺晉中興書徵祥說曰元興三年永安王皇后至自巴防將設威儀入宮天大雷震人馬多死沈約宋書曰元嘉十四年震初寧陵標四破至地十七年廢大將軍彭城王義康, SBCK: ''}
