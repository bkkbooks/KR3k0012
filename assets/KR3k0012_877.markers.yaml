  - {type: variant, offset: 4254, length: 710, content: 雷震劉向以雷二月出八月入於此月雷電者陽不閉藏失節之異是時九州幅裂至四年帝降劉曜害之晉中興書徵祥說曰太興元年十一月京都雷震凡未應雷而雷皆恒燠也又曰升平二年十一月雷時皇太后臨朝政舒緩也崔鴻十六國春秋後趙錄曰建武十三年十二月雷大雨霖石虎問佛澄此何災也澄曰其為我耳至戊子而卒又曰前秦符登攻姚萇冬大雷姚萇營殺七人萇軍大敗霹靂春秋合誠圖曰霹靂擊於宮殿者妃后爭政春秋潛潭巴曰霹靂擊宮失君精泄下有謀起宋均曰君精泄去也春秋繁露曰王言不從革而秋多霹靂霹靂者金氣也其音商故應之續晉陽秋曰太元五年霹靂含章殿四柱殺內侍二人晉朝雜事曰元康七年霹靂破高禖石占曰賈后將殺愍懷趙書曰前石時暴風雷雨霹靂雲臺壞署婦人震死瘞之三日重霹靂出之蔡邕封事曰臣聞天降災異緣象而至霹靂數發殆刑誅繁多之所生無雲而雷洪範五行傳曰秦二世元年無雲而雷雷陽也雲陰也有雲然後有雷有臣然後有君無雲而雷示君獨處無民臣也史記曰晉莊伯八年無雲而雷十年莊伯以曲沃叛又曰幽公十二年無雲而雷至十八年晉夫人秦嬴賊君于高寢又曰秦二世時無雲而雷二世不恤天下有怨叛之心是歲陳勝起兵天下亂漢書曰武帝征和四年天清晏無雲有雷聲聞四百里至後年侍中莽何羅反又曰成帝元延元年夏無雲而雷光耀四照昏乃止是歲趙飛鷰害後宮皇子後漢書曰獻帝初平四年無雲而雷時天下大兵人民相食晉書曰惠帝太安二年四月諸將立李特子雄為王八月天中裂為二無雲而雷成都王穎舉兵逼京師又曰太安二年無雲而雷其年張方入京燒服御死者萬計石超逼帝幸于緱氏王師不利大飢人相食梁書曰大通六年十二月西南無雲有聲如雷至地是年魏分為二東西各主崔鴻十六國春秋曰張重華三十九年十月無雲而雷聲皆東南引四十一年重華死子曜靈立為叔祚篡之又曰南燕慕容超太上二年無雲而雷七年為晉將劉裕所殺, WYG: 花}
