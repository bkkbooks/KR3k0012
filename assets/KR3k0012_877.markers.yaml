  - {type: variant, offset: 3, length: 0, content: '', WYG: 四雲五色雲青雲黄雲赤雲黒雲氣白氣赤氣黒氣雨無雲而雨雨土雨沙雨灰雨血雨肉雨毛雨水雨花雨草雨榖雨魚雨螽雨錢雨水銀雨金雨續雨帛雲周禮春官曰眂祲掌十煇之法以觀妖祥四曰監八曰叙又曰保章氏以五雲之物辦吉凶水旱降豐荒之祲象京房易妖占曰天無雲雲自出且有兵出邑且有水如箒如鳥其有下兵洪範五行傳曰雲者起於山彌於天隂氣也王者失中臣下敢蔽君不明則雲隂象多蔽天光有雲如衆謂風師法有大兵吕氏春秋曰亂國之主衆邪之所積其雲狀有若火若馬若白鵠若衆軍其狀若人蒼衣赤首不動其名曰天衝有狀若懸旌而赤其名曰雲旌有狀若衆馬以鬬其名曰春秋􅅗潭記曰雲色沐沐不濁賢人去位小人得禄東觀漢記曰二公為昆陽正晝有雲直營而隕不及地而散吏皆壓佐袁山松後漢書曰中平四年雲氣如足相次重疊彌天國志厯曰晉咸和元年七月雲鬭聲如暴風雨五色雲宋書曰前廢帝景平二年有五色雲如錦其年五月司空徐羨之廢帝為榮陽正青雲河圗曰青雲闕月五榖不闕赤雲如人頭大戰月旁有白雲闕者}
