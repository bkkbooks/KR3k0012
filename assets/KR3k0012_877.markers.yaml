  body:
  - {type: variant, offset: 1, length: 1, content: 徵, SBCK: 徴部四雲五色雲青雲黄雲赤雲黒雲氣白氣赤氣黒氣雨無雲而雨􅀨土雨沙雨􅁅雨血雨􅁏􅀨毛􅀨水雨花雨草雨􅂖􅀨魚􅀨螽雨錢雨水銀雨金􅀨續􅀨帛雲周禮春官曰眂祲掌十煇之法以觀妖祥四曰􅁥八曰叙鄭司農曰􅁥雲氣臨日也叙者雲有次叙如山在日上也而散吏皆壓佐􅀽山松後漢書曰中平四年雲氣如足相次重疊彌天國志暦曰晉咸和元年七月雲闘聲如􅁀風雨五色雲宋書曰前廢帝景平二年有雲五色如錦其年五月司空徐羡之廢帝爲滎陽王青雲河圖曰靑雲刺月五􅂖不熟傍多赤雲如人頭大戰月旁有白雲如杵者三貫月六十日内有兵戰月始出有黒雲貫名激雲不出三日暴􅀨黄雲崔鴻十六國春秋曰後趙石勒建平四年有赤黄雲如幕長數十疋其年勒死又曰冉閔永興三年有雲黄赤色起東北長百餘丈是歳閔爲慕容儁所殺春秋運斗樞曰勢集於后族羣妃之黨僣黄雲四合女訛驚􅀖春秋感精符曰妻黨翔則黄雲入國候今冬至日見雲黒有水雲赤白如人頭懸鏡之狀禍流赤雲左傳曰哀公六年有雲如衆赤鳥夾日而飛三日楚昭王使問周太史太史曰其當王身乎􅀂禜之可移於令尹司馬王弗禜而卒孔子曰楚昭王知天道矣不失國冝哉黒雲趙書曰石虎建武四年東南卒有雲黒稍分爲三疋又貫日日没後分爲七枚相去數十丈其間有白雲如魚鱗虎子韜曰當有刺客後果爲太子宣所殺氣釋名曰祲祲也赤黒之氣相侵也周禮曰春官眂祲掌十煇之法以觀妖祥一曰祲鄭司農云祲隂陽氣相侵也左傳曰昭公十五年春將禘于武公戒百官梓慎曰禘之日其有咎乎吾見赤黒之祲非􅀕祥也䘮氣也其在莅事乎二月􅀕貞禘叔弓蒞事籥入而卒春秋運斗樞曰赤人刺房赤人賊氣而刺房房天王之明堂火星也吕氏春秋曰亂國之王其氣有豊上歛下有􅀂水之􅃺有􅀂山之􅃺春黄夏黒秋蒼冬赤崔鴻十六國春秋北凉録曰玄始十一年春正月饗群臣于謙光殿沮渠􅂪遜曰南方有惡氣經天􅁀兵衆也不出一旬必有㓂問命治兵東􅁐以備之西􅁗遣􅀐七千來襲至縣孫猴嶺聞有備而還三輔舊事曰漢作靈臺以四孟之月登臺而觀黄氣爲疾病赤氣爲兵黒氣爲水也白氣漢書曰哀帝建平元年有白氣從地至天出叅下貫太廟廣如疋布長十餘丈哀帝隂病候也續漢書曰孝和永元十六年四月丁未紫宫中生白氣如粉絮占爲喪又曰孝靈嘉平二年八月辛未白氣如疋練衝北斗第四星占爲大戰明年冬楊州刺史臧旻攻盗賊於建康斬首數千級蜀李書曰哀帝即位有白氣二道帶天望氣者言宫中有伏兵果爲卭都公所害也晉書曰懷帝永嘉三年十二月有白氣如帶自地昇天南北各二至五年石勒劉曜王彌皆㓂洛陽帝蒙塵于平陽劉聦封帝爲㑹稽公又曰成帝咸和元年後蜀李雄玉衡二十四年雄死太子班立有白氣如帶經天太史占有隂謀班不悟爲李期所殺宋書曰文帝元嘉二十六年十二月夜有白氣貫於北斗屬子地至明年魏太武至􅀲歩江陳書曰文帝天嘉五年六月夜有白氣兩道出于北斗東南屬子地後年四月帝崩太子伯宗立廢爲臨海王又曰宣帝太建五年二月夜有白氣貫于北斗紫宫屬于地至明年北齊兵至于江隋書曰蕭􅁻煬帝嗣位拜太府少卿行經華隂見楊素家上有白氣屬天宻言於帝帝問其故􅁻曰其後素家當兵禍絶滅之象改葬可免帝後謂玄感曰公家冝改葬玄感亦微知其故以爲􅁻祥託以遼東未滅不遑私門之事未幾玄感以反族誅赤氣漢書曰成帝永始三年二月癸未夜東方有赤白色氣大三四圍長二三丈索索如樹南方有大樹四五圍下莖十五餘丈皆不至地䜟占曰東客之變氣􅃺如樹木以此知四方欲動者明年十二月己夘尉氏男子楚並等謀反庚子山陽䜟官亡徙􅂫令等爲大賊一日有兩氣同時起而並令等同月而俱發又曰王莽建國四年夏赤氣出東南竟天明年二月元帝王皇后崩後漢書曰獻帝興平末年夜有赤氣貫紫宫明年改元建安政歸曹氏晉書曰惠帝大安二年赤氣竟天又永興二年十一月夜有赤氣竟天其年十二月成都王頴攻洛陽又曰懷帝永嘉元年正月天氣晝赤氣有聲如雷明年劉元海僣位宋書曰文帝元嘉七年十一月西北有赤氣中黒如旌旗至八年滑臺爲魏軍圍粮盡城中燻䑕而食之後魏書曰莊帝永安三年十一月己丑有赤氣如霧從顯陽殿階西南角斜屬廊髙一丈連地如絳紗自未至戍不滅帝見而惡之隋書曰周静帝大定元年有赤氣起西方東行遍天下七月隋公堅禪又曰隋大業末越王侗東都留守爲王丗充所幽丗充自立爲丞相百官㹅巳於尚書省受􅁽設樂文武陪位於㕔西有赤氣如絳慢自辰至戌而滅旬日世充乃殺朝士元文都盧楚遂簒位黒氣史記曰周靈王二十年有五黒氣如日至景王五大夫争權後漢書曰靈帝光和元年六月有黒氣墮所御温徳殿庭十月皇后宋氏廢至中平元年鉅鹿人張角稱黄巾帥}
