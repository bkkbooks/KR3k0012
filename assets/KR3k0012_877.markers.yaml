  - {type: variant, offset: 1816, length: 1918, content: 十一年二月飄風入征南大將軍上黨公姚昭宅至于司徒中山公宅而散上黨公家人問太史閔尚曰風者天之號令所以吹塵去穢除姦慝之禍至二十二年跋弟弘篡立以姚昭為大司馬昭貪暴其子肇諫曰大人不聞飄風之怪昭不納明年馮弘殺昭并諸子姪四十餘人又曰前秦符生壽光元年長安大風發屋拔樹行人顛頓宮中奔擾或稱賊至門晝閉五日乃止生推告賊者殺之刳出其心左光祿大夫強平諫曰元正盛曉日有蝕之正陽神朔風昏大起願陛下務養元元生大怒鑿其頂而殺之又曰符堅建元十八年三月大風吹壞長安西門拔宮中大樹倒根於上至二十一年堅為姚萇所殺又曰李期玉恒四年三月大風拔樹發屋四月為季壽所殺又曰蜀李壽漢興三年二月大風暴雨震端門至六年壽死子勢立三年為晉將桓溫所滅又曰前趙劉曜葬其父母費用億計發掘古冢暴骸原野哭聲盈衢大霖雨震曜父墓門屋大風飄發其父寢堂于外垣五十餘步松柏眾木植已成林至是悉枯死曜竟為石勒所擒又曰劉曜末年與石季龍對軍不撫士眾專與嬖臣愽飲左右諫之以為妖言斬之大風拔木昏霧四塞須臾見擒又曰前涼張玄靜四年六月大風震雷晦冥宮中雨水深四尺時宋混兄弟擅權玄靜虛坐而已後魏書曰孝文太和中安定王禎出為湘州刺史至日暴風大雨凍死者數十是月禎發背死後宣武延昌三年章武王熙除湘州刺史七月入理其日大風雨凍死者二十餘人驢馬凍死數十熙聞祖父禎前事心甚惡之俄而舉兵反伏誅齊書曰後主天統年大風晝晦發屋拔木和士開譖趙王叡生坐死士開出入宮掖胡太后幸之琅邪王儼矯詔殺士開於南臺儼伏誅又曰後主末年安德王延宗鄴下宅被風吹其廳棟榱相連置外數百步後主敗為王二日被擒入周賜死陳書曰陳文帝天嘉三年梁永嘉王將司空王琳與陳將侯禎對軍其日東西風吹琳舟艦琳軍大敗又曰天嘉六年大風西南吹靈臺候樓倒又曰後主至德年風吹朱雀門倒又禎明年大雨風自西北激濤水入石頭城時後主昏誅諫臣沈客卿明年陳亡又曰隋文帝開皇中宮都大風發屋拔木時獨狐皇后干預政事後宮多有濫死又楊素邪佞又曰開皇末泰州商胡乘騾遇暴風飄上空數百丈俄而墜下人騾俱碎時晉王廣矯詐取媚謀危太子勇勇竟廢死立廣為太子淮南子曰人主之精通于天故誅暴則多飄暴風京房易妖占曰獄吏暴害人臣專政暴風折木又曰暴風析柱邑大憂暴風折木吹草上屋且有急令獨祿風入宮人主死飄數相從入殿門有凶疾憂以此亡飄留君門一日一夜不去亂兵在門獨祿風者回轉風也京房別對災異曰狂風發何人君政教無法為下所逆則致狂風發泄其救也脩政教聘賢士狂風消矣又曰人君賊罰良善政教無常使命數變則致暴風折木發屋鳴瓦或害殺人其救也脩舊典任忠臣思過自改則風災消六韜曰人主好田獵畢弋則歲多大風飄牛馬發屋拔木民人飛揚數十里漢書曰文帝時吳暴風雨壞城門吳王濞反卒服誅其年楚王都彭城大風毀市門殺人後王與吳王濞謀反同誅京房曰眾逆同志暴風將起晉書曰孝武太元二年春暴風折木發屋夏又暴風揚沙石三年又暴風折木發屋時符堅強盛又曰安帝元興初夜大風雨大舡門飛落明年桓玄篡位沈約宋書曰前廢帝義符時正月朔朝暴風發殿前會席翻楊數十丈至五月帝廢為滎陽王梁書曰昭明太子孫棟簡文大寶二年八月為侯景廢棟時與妃張氏鋤菜而法駕至驚懼而泣昇輦及即位昇武德殿備陳文物於庭有暴風自東來吹旌旗悉倒又有迴風從地踊起折竿翻飛華蓋經出端門不見陪列者驚駭時人知其不終十一月景廢棟景乃篡立崔鴻十六國春秋曰南燕慕容超僣位祠南郊將登壇大風暴起天地晝昏行宮羽儀皆壞裂後超為晉將劉裕所滅斬於建康市又曰慕容盛建平元年八月暴風拔闕前七大樹其月步兵校尉馬勒謀反伏誅至長樂三年盛為叚纘于泰所殺又曰後燕慕容垂遣太子寶伐魏次參合忽大風黑氣狀若堤防臨覆軍上沙門支曇猛言於寶曰風氣暴逆魏軍將至宜遣兵禦之寶笑而不納俄黃霧四塞日月晦冥魏師至三軍奔潰其年垂死又曰石季龍死子遵立其月夜暴風拔樹震電雨雹俄而遵見殺隋書曰太子勇朝高祖於仁壽宮還至岐山妃元氏止干周大王廟因縱騎獵須臾暴風折樹雨雪深至人膝天晦暝咫尺不相見妃因心痛再宿而死勇後廢為庶人煬帝殺之又曰太子勇廢立晉王為皇太子當受冊高祖曰吾以大興公成帝業令出舍大興縣其夜烈風大雪地裂山崩民舍多壞死者百餘又曰煬帝大業十四年三月在江都蜀王秀囚於右驍勇營暴風吹塵晝昏識者大以為暴秀謂防者曰吾生年已來未見斯變亡國之禍應在旦夕其日夜宇文化及司馬德戡裴乾通反唐書曰玄宗天寶十一年潼關口女媧墓因風雨失所在後至肅宗乾元二年五月一日其墓復舊黑風後漢書曰世祖太常元年二月京師有黑風竟天廣五十餘丈其年四月沮渠蒙遜寇張掖古今五行志曰大業十三年二月李密於鞏縣南設壇刑白馬祭天稱魏公置僚佐改元升壇時有黑風從南北暴至吹密衣冠及僚屬皆匍匐於壇下沙塵暗天咫尺不相見良久息賊軍惡之俄而密敗赤風春秋潛潭巴曰天赤有大風發屋折木兵大起行千里漢書曰建元四年夏有風赤如血六月旱崔鴻十六國春秋曰張天錫十一年有赤風昏闇至十三年符堅滅之雷古今五行記曰夏桀末年雷震殺人其年湯放之左傳曰僖公十五, WYG: ''}
