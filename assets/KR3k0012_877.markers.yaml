  - {type: variant, offset: 1665, length: 6, content: 徐妃初嫁夕車, WYG: 建昭四年雨土梁書曰武帝大同元年雨土又雨黄塵如雪攬之盈掬時帝溺於佛法興造尤甚後魏書曰世宗景明四年凉州雨土如霧時舅尚書令髙肇專政俄而被殺隋書曰隋文帝開皇二年京師雨土四年闗中亂饑諸王各謀為逆時兩營都邑後闕夀宫闕匠死者大半雨沙隋書曰梁簡文時雨黄沙時侯景陵上其年人相食雨灰隋書曰梁武同太年雨灰色黄時帝惡人勝己又信佛法捨身為奴蔽賢絶道後有侯景之亂雨血戰國策曰齊湣王三十一年侵伐鄰國窮兵極武外怨於諸侯内失於百姓燕將樂毅連五國兵以伐之湣王出走楚淖齒救齊淖齒㑹王田于愽昌間地方數百里雨血沾衣羸博之地圻及}
