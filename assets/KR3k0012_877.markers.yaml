  - {type: variant, offset: 4223, length: 128, content: 機晉書曰吳孫亮建興初十二月大風雷亮見廢又曰愍帝建興初十一月大雨雷震劉向以雷二月出八月入於此月雷電者陽不閉藏失節之異是時九州幅裂至四年帝降劉曜害之晉中興書徵祥說曰太興元年十一月京都雷震凡未應雷而雷皆恒燠也又曰升平二年十一月雷時皇太后臨朝政舒緩也崔鴻十六國春秋, SBCK: 其}
