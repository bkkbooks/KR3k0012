  - {type: variant, offset: 3367, length: 148, content: 太子勇廢立晉王為皇太子當受冊高祖曰吾以大興公成帝業令出舍大興縣其夜烈風大雪地裂山崩民舍多壞死者百餘又曰煬帝大業十四年三月在江都蜀王秀囚於右驍勇營暴風吹塵晝昏識者大以為暴秀謂防者曰吾生年已來未見斯變亡國之禍應在旦夕其日夜宇文化及司馬德戡裴乾通反唐書曰玄宗天寶十一年潼關口女媧墓因風雨失所在後至肅宗乾, SBCK: 夏赫連勃勃鳯翔}
