  - {type: variant, offset: 578, length: 328, content: 吳孫權太元初大風江海湧溢平地水深八尺拔高陵樹二千株動吳城兩門瓦飛落是時賦役繁重明年權死又曰孫休永安元年十二月孫綝出屯武昌衛士施朔告綝欲反綝聞之大懼是夜大風四轉五復發屋折木揚沙石綝益恐明日臈會稱疾休強起之不得已乃至會張布丁奉自左右縛之綝叩頭請為奴不許乃斬之又曰孫皓末年狂暴丞相陸抗與大司馬大丁奉謀欲廢皓太史令陳苗奏久陰不雨風氣迴逆將有陰謀皓深驚懼抗遂寢其事又曰晉武帝咸寧三年八月大風拔木暴寒且冰其年吳將孫慎入江夏太康末京都風發屋拔木又曰惠帝永康中六月飄風吹賈謐朝衣飛數百丈明年謐誅其年十一月京都大風發屋折木十二月愍懷太子幽于金墉又曰永康元年四月張華舍颻風起折木飛繒軸六七枚是月趙王倫矯制廢賈后害張華裴頠等又曰趙王倫驀位改元建始祠太廟風暴起黃塵四合其年倫誅又曰, SBCK: ''}
