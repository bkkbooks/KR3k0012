  - {type: variant, offset: 4, length: 1, content: 風, SBCK: 十六萬同反叛宋書曰明帝太始二年二月夜有黒氣五東西經天南行隋書曰梁元帝承聖三年六月有黒氣如龍見殿内其年元帝爲西魏所擒又曰陳廢帝臨海王時十月日入時有黒氣如雲入日中其年見廢雨史記曰夏桀末年大雨水俄爲湯所放京房易妖占曰雨鳴瓦任威武大臣專擅霖􅀨壞道}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_877-5b}
  - {type: variant, offset: 4, length: 1, content: 風, WYG: 闕兵戰月始出有黑雲貫名激闕不出三日暴雨黄雲崔鴻十六國春秋曰後趙石勒建平四年有赤黄雲如幕長數十丈其年勒死又曰冉閔永興三年有雲黄赤色起東北長百餘丈是嵗閔為暴容闕所殺春秋運斗樞曰勢集於后族羣妃之黨僭黄雲四合女訛驚邦春秋感精符曰妻黨翔則黄雲入國侯今冬至日見黑雲有水雲黄白如人頭懸鏡之狀禍流赤雲左傳曰哀公六年有如衆赤鳥來日而飛三日楚昭王使問周太史曰其當王身乎若榮之可移於合尹司馬王弗榮而卒孔子曰楚昭王知天道矣不失國宜哉黒雲趙書曰石虎建武四年東南卒有雲黑稍分為三疋又貫日日没後分為七枚相去數十丈其間有白雲如魚鱗虎子韜曰常有刺客後果為太子宣所殺氣釋名曰祲侵也赤黑之氣相侵也周禮曰春官㫝祲掌十煇之法以觀妖祥一曰鄭司隂去祲陽氣象祲也左傳昭公十五年春將禘子武公戒百官梓慎曰禘之日其有咎乎吾見赤黑之祲非祭祥也喪氣也其在莅事乎二曰庚辰禘叔弓莅事簽入而卒春秋運斗樞曰赤人刺房吕氏春秋曰亂國之王其氣有豐上歛下有若水之狀有若山之狀春黄夏黑秋蒼冬赤崔鴻十六國春秋北燕錄曰𤣥始十一年春正月饗羣臣于謙光殿沮渠䝉遜曰南方有惡氣經天暴兵衆也不出一旬必有㓂問命治兵東苑以備之西秦遣騎七千來襲至縣孫侯嶺聞有備而還三護舊事曰漢作靈臺以四孟之月登臺而觀黄氣為疾病赤氣為兵黑氣為水也白氣漢書曰哀帝建平元年有白氣從地至天出㕘下貫太廟廣如疋布長十餘丈哀帝吤病候也續漢書曰孝和永和十六年四月丁未紫宫中生白氣如粉絮古為喪又曰孝靈嘉十二年八月辛未白氣如疋練衝北斗第四星占為大戰明年揚州刺史臧旻攻盗賊於建康折者數千級蜀李書曰哀帝即位有白氣一道帶天望氣者言宫中有伏兵果為卭都公所害也晉書曰懐帝永嘉三年十一月有白氣如帶自地昇天南北各一至五年石勒劉曜王皆㓂洛陽帝䝉塵于平陽劉聰封帝為侯又曰成帝咸和元年後蜀李雄王衡二十四年雄死太子班立有白氣如帶經天史占有隂謀班不悞為李竒所殺宋書曰文帝元嘉二十六年十二月夜有白氣貫於北斗属子地至明年魏太武至𤓰歩江陳書曰文帝天嘉五年六月夜有白氣四道出于北斗東南属子地後年四月帝崩太子伯宗立廢為臨海王又曰宣帝太建五年二月夜有白氣貫于北斗紫宫属子地至明年北齊闕至于江隋書曰蕭吉􅀈嗣位拜太府少卿行經華隂見楊素家家有白氣属天宻言於帝帝問其故吉曰其後素家當兵禍絶滅之象改𦵏可免後帝魏𤣥感曰公家宜改𦵏𤣥感亦徴知其故以為吉祥託以東遼來滅不是私門之事未幾𤣥感以反族誅赤氣漢書曰成帝永始三年二月癸未夜東方有赤白色氣大三四圍長二三丈索索如樹南方有大樹四五圍下莖十闕徐丈皆不至地䜟占曰東南之變氣狀如樹木以此知闕者明年十二月己卯尉氏男子楚並等謀反庚闕亡徒蘇令等為大賊一日有兩氣同時起而並闕等同月而俱發又曰王莽建國四年夏赤氣出東南竟天明年二月元帝王皇后崩後漢書曰獻帝興平末夜有赤氣貫紫宫明年改元運安政歸曹氏晉書曰惠帝大安二年赤氣竟天又永興二年十一月夜有赤氣竟天其年十二月成都王賴攻洛陽又曰懐帝永嘉元年正月天氣晝赤氣有聲如雷明年劉元海僭位宋書曰文帝元嘉七年十一月西北有赤氣中黑如旌旗至八年滑臺為魏軍圍粮盡城中燻鼠而食之後魏書曰莊帝永安三年十一月己丑有赤氣而霧從􅂋陽殿階西南角斜属廊髙一丈連地如綘紗自未至戌不滅帝見而惡之隋書曰周靜帝大定元年有赤氣起西方東行遍天下七月隋公堅襌又曰隋大業末越王伺束都留闕為王世克所幽世充自立為丞相百官摠已於晝省受冊設樂文武陪立於㕔西有赤氣如綘幔自辰至戌而滅旬日世充乃殺朝士元文都盧楚遂篡位黑氣史記曰周靈王二十年有闕黑氣如日至景王五大夫争權後漢書曰靈帝光華元年六月有黒氣堕所御温徳殿庭十月皇后宋氏廢至中平元年鉅鹿人張角稱黄巾師都三十六萬同反叛宋書曰明帝大始二年二月夜有黑氣五東西經天南行隋書曰梁元帝承聖三年六月有黑氣如龍見殿内其年元帝為西魏所擒又曰陳廢帝臨海王時十二月日入時有黒氣如雲入日中其年見廢雨史記曰夏傑末年大雨水闕為湯所放京房易妖古曰雨鳴瓦任滅武大臣專擅霖雨壊道}
