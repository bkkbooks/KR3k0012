  - {type: variant, offset: 4352, length: 223, content: 趙錄曰建武十三年十二月雷大雨霖石虎問佛澄此何災也澄曰其為我耳至戊子而卒又曰前秦符登攻姚萇冬大雷姚萇營殺七人萇軍大敗霹靂春秋合誠圖曰霹靂擊於宮殿者妃后爭政春秋潛潭巴曰霹靂擊宮失君精泄下有謀起宋均曰君精泄去也春秋繁露曰王言不從革而秋多霹靂霹靂者金氣也其音商故應之續晉陽秋曰太元五年霹靂含章殿四柱殺內侍二人晉朝雜事曰元康七年霹靂破高禖石占曰賈后將殺愍懷趙書曰前石時暴風雷雨霹靂雲臺壞署婦人震死瘞之三日重霹靂出之蔡邕封事曰臣聞天降災異緣象而至霹靂數發殆刑, SBCK: 􅀍}
