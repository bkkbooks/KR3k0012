  - {type: variant, offset: 4576, length: 388, content: 繁多之所生無雲而雷洪範五行傳曰秦二世元年無雲而雷雷陽也雲陰也有雲然後有雷有臣然後有君無雲而雷示君獨處無民臣也史記曰晉莊伯八年無雲而雷十年莊伯以曲沃叛又曰幽公十二年無雲而雷至十八年晉夫人秦嬴賊君于高寢又曰秦二世時無雲而雷二世不恤天下有怨叛之心是歲陳勝起兵天下亂漢書曰武帝征和四年天清晏無雲有雷聲聞四百里至後年侍中莽何羅反又曰成帝元延元年夏無雲而雷光耀四照昏乃止是歲趙飛鷰害後宮皇子後漢書曰獻帝初平四年無雲而雷時天下大兵人民相食晉書曰惠帝太安二年四月諸將立李特子雄為王八月天中裂為二無雲而雷成都王穎舉兵逼京師又曰太安二年無雲而雷其年張方入京燒服御死者萬計石超逼帝幸于緱氏王師不利大飢人相食梁書曰大通六年十二月西南無雲有聲如雷至地是年魏分為二東西各主崔鴻十六國春秋曰張重華三十九年十月無雲而雷聲皆東南引四十一年重華死子曜靈立為叔祚篡之又曰南燕慕容超太上二年無雲而雷七年為晉將劉裕所殺, SBCK: 􅀨水銀}
