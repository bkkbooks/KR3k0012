  - {type: variant, offset: 2523, length: 1, content: 鬣, SBCK: 鬛集又云車馬有節則見騰黃騰黃者神馬也其色黄一名乗黃亦曰飛黄或曰􅁻黃或曰翠黃一名紫黄其􅃺如狐背上有兩角出白氏之國乗之壽三千歳黃帝乗之孫氏瑞應圗曰玉馬者王者清明尊賢則至}
  - {type: variant, offset: 2523, length: 1, content: 鬣, WYG: 髦並集又云車馬有節則見騰黄者神馬也其色黄一名乘黄亦曰飛黄亦曰吉黄或曰翠黄一名紫黄其狀如狐背上有兩角出白民之國乘之夀三千嵗黄帝乘之孫氏瑞應圖曰玉馬者王者清明尊賢則至}
