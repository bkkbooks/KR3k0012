  - {type: variant, offset: 2526, length: 7, content: 貞觀中骨利幹遣, SBCK: 乗黄王者輿服有度則出騕􅙂者神馬也與飛兎同以明君有德也又曰飛兎者日行三萬里禹治水土勤勞歷年救民之害天應其德則至駃蹄者后土之獸也自能言語王者仁孝於民則出禹治水有功而來又曰龍馬者仁馬河水之精也髙八尺五寸長頸骼上有翼旁乗毛鳴聲九音有明王則見吕氏春秋曰􅁗繆公車敗失左􅆖自徃求焉見野人殺將食之繆公􅀏曰食駿馬肉而不飲酒余恐其傷性也遍飲之而去又曰伯樂學相馬所見無非馬者又曰古相馬者有寒風能相口齒麻朝能相頰女厲能相口管青能相脣吻陳裴能相股脚􅁗牙能相前賁君能相後並知其一也又曰今有千里之馬於此非得良工猶若弗取良工相馬之工良工之與馬也相得然後成譬之􅀂枹之與鼓夫士亦有千里髙節死義此士之千里也能}
  - {type: page-break, offset: 2526, content: '', id: KR3k0012_SBCK_896-7b}
  - {type: variant, offset: 2526, length: 7, content: 貞觀中骨利幹遣, WYG: 乘黄王者輿服有度則出腰褭者神馬也與飛兔同以明君有德也又曰飛兔者日行三萬里禹治水土勤勞歴年救民之害天應其德則至駃蹄者后土之獸也自能言語王者仁孝於民則出禹治水有功而來又曰龍馬者神馬河水之精也髙八尺五寸長頸骼上有翼旁垂毛鳴聲九音有明王則見吕氏春秋曰秦穆公車敗失左驂自徃求馬見野人殺將食之繆公笑曰食駿馬肉而不飲酒余恐傷其性也遍飲之而去又曰伯樂學相馬所見無非馬者又曰古相馬者有寒風能相口齒麻朝能相頰女厲能相目管青能相唇吻陳悲能相股脚秦牙能相前賛君能相後並見馬之一徵也又曰今有千里之馬於此非得良工也猶若弗取良工相馬之工良工之與馬也相得然後成譬之若枹之與鼓夫士亦有千里髙節死義此士之千里也能}
