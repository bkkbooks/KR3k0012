  - {type: variant, offset: 1088, length: 0, content: '', SBCK: 白色而兩耳黄名之爲黃耳山海經曰滑水中多水馬如馬而文臂臂前脚牛尾其音如呼又曰天帝之山有草焉􅃺如菜臭如糜蕪名曰杜蘅可以走馬帶香草令便馬或曰馬得之健走也又曰犬戎之國有文馬縞身朱鬛縞猶素也犬傳云駮身朱鬛目􅀂黃金名曰吉壃或作良乗之壽千歳又曰夸父山北有林名桃林廣圎三百里其中多馬桃林今弘農湖縣南北名饒野馬又曰大樂之野夏后啓於此舞九代馬九代馬名也莊子曰馬蹄可以踐霜雪毛可以禦風寒齕草飲水翹足而陸此馬之眞性也雖有儀臺路􅃦無所用之及至伯樂曰我善治馬燒之剔之刻之駱之連之以羈絆編之以皂棧馬之死者十二三矣飢之渴之馳之驟之整之齊之前有橛飭之患後有鞭䇿之威而馬之死者巳過半矣又徐無􅀑曰吾相馬直者中繩曲者中鈎方者中矩圎者中䂓是國馬也而未􅀂天下馬也天下馬有成材􅀂䘏若泆􅀂喪􅀂}
  - {type: page-break, offset: 1088, content: '', id: KR3k0012_SBCK_896-2a}
  - {type: page-break, offset: 1088, content: '', id: KR3k0012_SBCK_896-2b}
  - {type: variant, offset: 1088, length: 11, content: 一疋羊鬚去地九寸拜蒲長, WYG: 白色而兩耳黄名之為黄耳山海經曰滑}
  - {type: variant, offset: 1088, length: 0, content: '', krp: 白色而兩耳黄名之爲黃耳山海經曰滑水中多水馬如馬而文臂臂前脚牛尾其音如呼又曰天帝之山有草焉狀如菜臭如糜蕪名曰杜蘅可以走馬帶香草令便馬或曰馬得之健走也又曰犬戎之國有文馬縞身朱鬛縞猶素也犬傳云駮身朱鬛目若黃金名曰吉壃或作良乗之壽千歳又曰夸父山北有林名桃林廣圎三百里其中多馬桃林今弘農湖縣南北名饒野馬又曰大樂之野夏后啓於此舞九代馬九代馬名也莊子曰馬蹄可以踐霜雪毛可以禦風寒齕草飲水翹足而陸此馬之眞性也雖有儀臺路寢無所用之及至伯樂曰我善治馬燒之剔之刻之駱之連之以羈絆編之以皂棧馬之死者十二三矣飢之渴之馳之驟之整之齊之前有橛飭之患後有鞭䇿之威而馬之死者巳過半矣又徐無鬼曰吾相馬直者中繩曲者中鈎方者中矩圎者中䂓是國馬也而未若天下馬也天下馬有成材若䘏若泆若喪若}
  - {type: variant, offset: 1089, length: 5, content: 疋羊鬚去地, SBCK: 􅀂是者超軼絶塵不知其所老子曰天下有道却走馬以糞天下無道戎馬生於郊列子曰􅁗穆公謂伯樂曰子之年長矣子姓有可使求馬乎伯樂對曰良馬可以形容䈥骨相也天下之馬者若滅􅀂没若亡􅀂失臣之子皆下才也臣有所與}
  - {type: variant, offset: 1089, length: 5, content: 疋羊鬚去地, krp: 若是者超軼絶塵不知其所老子曰天下有道却走馬以糞天下無道戎馬生於郊列子曰秦穆公謂伯樂曰子之年長矣子姓有可使求馬乎伯樂對曰良馬可以形容䈥骨相也天下之馬者若滅若没若亡若失臣之子皆下才也臣有所與}
