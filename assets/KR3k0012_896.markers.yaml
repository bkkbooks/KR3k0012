  - {type: variant, offset: 2252, length: 3, content: 童謠言, WYG: 下輩於是臏謂田忌曰君第重射我能令君勝田忌然之與王及諸公子逐射千金臨質孫臏曰取君之下駟與彼上駟取君之上駟與彼中駟取君之中駟與彼下駟既馳三輩畢而田忌一不勝而再勝忌得千金於是田忌進孫臏威王王問兵法而師之韓子曰昔紂為甲百萬左飲馬於湛右飲馬於洹洹水竭湛水不流武王甲卒三千破而王之又曰延陵卓子乘蒼龍挑文之乘鈎飾在前錯綴在後馬欲進則鈎飾禁之退則綴錯貫之造父見而泣曰此猶民中立而不知所由也}
