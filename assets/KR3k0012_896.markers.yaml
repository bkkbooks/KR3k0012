  - {type: variant, offset: 2785, length: 275, content: 肋肉尾無毛又曰天寶中隴右節度皇甫惟明奏龍支縣人庫狄孝義有馬生龍駒經九旬有九日身有鱗而不生毛臣就檢視時有慶雲五色遙覆馬上久而不散伏望宣付史官以光實錄從之又曰吐火羅國有頗梨山南崖穴中有神馬國人每牧牝馬於其側時產名駒皆汗血焉又曰李懷遠雖久居榮位而弘尚簡率其園宅無所改作嘗乘款叚馬左僕射豆盧欽望謂曰公榮貴如此何不買駿乘荅曰此馬幸免驚蹶無假別求聞者莫不歎美周史曰徐台符仕晉為翰林學士中書舍人契丹之陷中原也台符從虜帳北至於薊門及戎人內潰乃竄身南歸初台符所乘馬好嘶鳴及自虜中廻常露宿於草中雖胡騎連群經其左右而台符馬若箝其口然及行至漢地即嘶鳴如故時人以為積善之所感也, SBCK: ''}
