  - {type: variant, offset: 247, length: 13, content: 符堅遣使西域稱楊堅之盛德并, WYG: 天子北征舎于珠澤}
  - {type: variant, offset: 252, length: 832, content: 域稱楊堅之盛德并以繒綵賜諸國王於是朝獻者十有餘國大宛獻天馬千里駒皆汗血朱鬣五色鳳膺麟身及諸珍異五百餘種堅曰吾思漢文之返千里馬咨嗟美詠今獻馬其悉返之庶剋念前王髣髴古人矣乃命群臣作止馬詩而遣之示無欲也又曰武昭王暠字玄盛少而好學性沉敏寬和美器度通涉經史尤善於文義及長頗習武藝誦孫吳兵法嘗與呂光太史令郭黁及其同母弟宋繇同宿黁起謂繇曰君當位極人臣李君有國土之分家有騧草馬生白額駒此其時也呂光末京兆叚業自稱涼州牧以燉煌太守趙郡孟敏為沙州刺史署玄盛效輦今敏尋卒燉煌護軍馮翊郭謙沙州治中燉煌索仙等以玄盛溫毅有惠政推為寧朔將軍燉煌太守玄盛初難之會宋繇仕於業告歸燉煌言於玄盛曰兄忘郭黁之言耶白額駒今已生矣玄盛乃從之又曰庾亮所乘馬的顱殷浩以為不利勸賣之亮曰曷有己之不安移於人乎晉中興書曰恭帝之為琅邪王好奇戲閉一疋馬於門內令人射之欲觀幾箭而死左右曰馬國姓而射之不祥甚矣乃止俄而桓玄篡位續安帝紀曰司馬休之奔廣固慕容超有欲害心而休之不知休之常以所乘騅馬於床前養飼忽連鳴不食注目視鞍休之試被之即不動也訖還床坐馬又驚跳因試騎視馬即驟出裁至門外奔而馳之走行數里休之顧望所住已有寇至乘以南奔殆而獲免後還荊州加騅馬揚武之號王隱晉書曰馬隆子咸為成都王前鋒長沙王所統冠軍司馬王湖率眾討咸於馬市咸堅不動湖乃使數十騎下馬縛戟於鞍而令向咸又使數十騎各㓨所放馬馬驚奔咸軍軍壞湖因馳逐猛戰臨陣斬咸干寶晉紀曰桓範出赴曹爽宣王謂蔣濟曰智囊往矣濟曰智則智矣駑馬戀芻豆爽必不能用也鄧粲晉紀曰王湛有隱兄弟宗族皆以為癡居墓次不交當世兄子濟性好馬所乘駿快意甚愛之湛曰此馬雖快力薄不堪苦近見督郵馬當勝此濟然之取督郵馬穀食十數日與湛試之湛未嘗乘馬卒然便騎馳騁步驟不異於濟而馬不相勝湛曰直行平路何以別馬唯當於蟻封於是就蟻封盤馬濟馬果倒躓濟乃服崔鴻十六國春秋曰驍騎將軍呂光封西域平上䟽曰唯龜茲據三十六國之中制彼王侯之命入其國城天驥龍麟腰褭丹髦萬計盈廄雖伯益更生衛賜復出不能辨也又曰太上四年高麗使至獻美女十人千里馬一疋兗州民王蒲率眾二千來降, SBCK: 卑}
