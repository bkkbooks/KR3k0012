  - {type: variant, offset: 1183, length: 1, content: 怒, WYG: 文臂牛尾其音如呼又曰天帝之山有草焉状如葵臭如蘼蕪名曰杜蘅可以走馬又曰犬戎之國有文馬縞身朱鬛目若黄金名曰吉良乘之夀千嵗又曰夸父山北有林名桃林廣員三百里其中多馬又曰大樂之野夏后啓於此舞九代馬荘子曰馬蹄可以踐霜雪毛可以禦風寒齕草飲水翹足而陸此馬之真性也雖義􅄗路寢無所用之}
