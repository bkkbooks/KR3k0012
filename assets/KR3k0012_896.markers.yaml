  - {type: variant, offset: 2248, length: 3, content: 梁普通, WYG: 北塞上之人其馬亡入他界人皆弔之其父曰此何詎知不為福居數月其馬將一駿馬而歸人皆賀之其父曰此何詎知不為禍家富馬良其子好騎墮而折髀人皆弔之其父曰此何詎知不為福居一年匈奴大出丁壯者皆控弦而戰塞上之人死者十九此子獨以跛故子父相保地鏡圖曰銅器之精見為馬孔叢子曰衞之公子交饋四乘馬於子思曰不以此求歡於先生久屈鄙土為賓主之餼耳又曰公孫龍以白馬為非馬或曰此辨而毁大道子髙適趙謂龍曰願受業久而不敢前者以白馬為非馬耳誠能去之則為弟子龍曰若使去之無以教矣凉州記曰吕光麟嘉五年疎勒王獻火浣布善舞馬春秋後語曰田忌數與齊公子馳逐重射孫臏見其馬足不甚相逺有上}
