  - {type: variant, offset: 1354, length: 891, content: 去數十步瑀蹋徒合切馬及之謂偃曰君轡何疾偃曰牛駿馭精所以疾耳偃曰君馬何遟曰騏驥羅於羈絆所以居後偃曰何不著鞭使致千里荅曰一蹙造青雲何至與駑馬爭路蕭子顯齊書曰楊玉夫殺宋蒼梧王將首與王敬則敬則送太祖太祖夜乘常所騎赤馬入殿及踐祚號此馬為龍驤將軍後魏書曰高肇字道文文昭王太后之兄也大舉征蜀以肇為大將軍都督諸軍面辭世宗於東堂親奉規略是日肇所乘駿馬停於神虎門外無故驚倒又轉臥倒渠中鞍且瓦解眾咸怪異肇辭出見而惡焉世宗崩肇還高陽王與領軍于忠遣壯士殺之後周書曰于謹嘗率騎追茹茹前後十七戰盡降其眾嘗為賊所圍謹乘駿馬一紫一騧賊所先識乃使二人各乘為突陣而出賊以為謹也皆爭逐之謹乃入塞三國典略曰西魏孝武將為齊太祖所殺孝武索所乘波斯騮馬命太宰南陽王躍之將舉其鞍馬蹶而死帝惡之日晏還宮至後門馬驚不前捶之鞭折入謂潘彌曰今日幸無他不彌曰過夜半則大吉須臾帝飲酒遇鴆而崩時年二十五謚曰孝武殯於草堂佛寺十餘年乃葬又曰高歡歸爾朱榮劉貴事榮盛言歡美榮未朱之奇也歡更衣服重求見焉因隨榮之廄廄有害馬榮命翦之歡不絆翦竟不蹄齧已而起曰凡御惡人亦如此矣榮遂坐歡於床下屏左右而訪時事歡曰聞公有馬十二各色別為群將此竟何用也榮曰且言爾意歡曰方今天子愚弱太后淫亂四方雲擾朝政不行以明公雄武乘時奮發但將討鄭儼徐紇為辭舉鞭足以定天下此是賀六渾意榮大悅曰爾意即我意也自是每參軍謀又曰齊盧潛與特進慕容儼善儼之將死謂其子曰盧尚書教我為人我死之後將吾騂馬與之其子遂以他馬與潛儼喪出得停不肯進巫祝為儼聲曰何意不與盧尚書騂馬其子遵命儼喪乃行又曰齊馮子琮被執於省內以弓弦絞殺之使內參以庫車載其尸歸人無知者子琮所乘之馬曳韁走以頭扣車狀如號哭見者異之車至其門諸子方握槊聞庫車來以為賜也大喜開視乃哭又曰齊主北伐太保領太僕安定玉賀拔仁進馬並非駿足齊王讓之仁對曰御馬超逸群下不逮齊主大怒免為庶人命之負炭輸於晉陽又曰周裴果字戎昭魏齊州刺史遵之子也從軍征討乘黃驄馬衣青袍每先登陷陳時人號為黃驄年少又曰周賀若敦與陳侯瑱相拒敦軍數有叛人乘馬投瑱者輒納之乃別取一馬牽以赴舩中人逆以鞭之如是者再三馬便畏舩不上後伏兵於岸乃遣人乘以招瑱瑱兵迎接競來牽馬敦發伏兵掩之盡殪後有亡命者猶謂為詐不復納, WYG: 憎}
