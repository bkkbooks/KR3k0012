  - {type: variant, offset: 2514, length: 6, content: 月乙巳辰廄產, SBCK: 羸也謂五駑者大頭緩耳一駑也長頸不折二駑也短上長下三駑也大骼短脅四駑也淺寛薄脾五駑也馬援銅馬相法曰水火欲明水火在鼻兩孔間上唇欲急而方口中欲紅而有光此馬千里頷下欲深下唇欲緩牙欲去齒一寸則四百里牙劒鋒則千里目欲滿而澤膓欲充膁小肋欲長懸薄欲厚而緩懸薄服股也腹下欲平滿汗溝欲深長而􅂰本欲起肘腋欲開􅂰欲方蹄欲厚三寸堅如石鬃欲戴中骨髙三寸鬃中骨也頰欲開而膺下欲廣一尺以上能乆走鞅欲方頸前􅇩欲直而岀脾骨前向鳬間欲開望視之如􅀟鳬楚辭曰却騏􅂹而不乗兮䇿駑駘而取路當丗無騏􅂹兮誠莫之能善御見執轡者非其人兮故駒跳而逺去符瑞圖曰王者貴人而賤馬則}
  - {type: page-break, offset: 2514, content: '', id: KR3k0012_SBCK_896-7a}
  - {type: variant, offset: 2514, length: 6, content: 月乙巳辰廄產, WYG: 寸千里伏龍骨欲得成頸欲得長雙扶欲得大而突蹄欲得厚腹下欲得平有八字馬頭欲得髙而成尾骨髙而埀也凡相馬之法先除三羸五駑乃相其餘大頭小頸一羸也弱脊大腹二羸也小脛大蹄三羸也其五駑者大頭緩耳一駑也長頸不折二駑也短上長下三駑也大胳短脇四駑也淺髖薄脾五駑也馬援銅馬相法曰水火欲分明水火在鼻兩孔間上唇欲急而方口中欲紅而有光此馬千里頷下欲深下唇欲緩牙欲去齒一寸則四百里牙劔鋒則千里目欲滿而澤腹欲充膁欲小肋欲長懸薄欲厚而緩懸薄股也腹下欲平滿汗溝欲深長而膝本欲起肘腋欲開膝欲方蹄欲厚三寸堅如石鬃欲戴中骨髙三寸鬃中骨也頰欲開而膺下欲廣一尺以上能久走鞅欲方頸前胷欲直而出脾骨前面鳬間欲開望視之如雙鳬楚辭曰却騏驥而不乘兮䇿駑駘而取路當世豈無騏驥兮誠莫之能善御見執轡者非其人兮故駒跳而逺去符瑞圖曰王者貴人而賤馬則}
