  - {type: variant, offset: 2666, length: 2, content: 上問, SBCK: 之爲草駒之時跳躍􅀭蹄翹尾而走人不能制齕咋足以􅏐肌碎骨蹶蹄足以破盧䧟匈􅏐罕也及至圉人擾之良御敎之掩以衡扼連以轡銜則雖歷險超塹弗敢辭也故}
  - {type: variant, offset: 2666, length: 2, content: 上問, WYG: 以此弗御之御也又曰驊騮騄耳一日千里摶兔不如狼猰也又曰戎翟之馬皆可以馳驅或近或逺唯造父能盡其力三苗之民皆可使忠信或賢或不肖唯唐虞能齊其美又曰馬齒非牛蹄檀根非猗枝故見其一本而萬物知知别也又曰季秋之日乃教於田獵以習五戎命僕及七騶咸駕載旗又曰易調良馬使人欲馳飲酒而樂使人欲歌是而行之因謂之斷非而行之必謂之亂斷猶治也又曰夫馬之為草駒之時跳躍揚蹄翹尾而走人不能制齕咋足以噆肌碎骨蹶蹄足以破盧陷匈􅏐穿也及至圉人擾之良御教之掩以衡軛連以轡衘則雖歴險超塹弗敢辭也故}
  - {type: page-break, offset: 2666, content: '', id: KR3k0012_WYG_896-13a, image: WYG0901/WYG0901-0028a.png}
  - {type: variant, offset: 2666, length: 2, content: 上問, krp: 之爲草駒之時跳躍揚蹄翹尾而走人不能制齕咋足以噆肌碎骨蹶蹄足以破盧䧟匈噆罕也及至圉人擾之良御敎之掩以衡扼連以轡銜則雖歷險超塹弗敢辭也故}
  - {type: variant, offset: 2671, length: 2, content: 種性, SBCK: 不可化其可駕御教之所爲也馬聾蟲聾蟲無知也而可以通氣志猶待教而成又况人乎又曰夫待腰䮍飛莵而駕之則丗莫乗車矣腰䮍飛莵皆行萬里其行若飛因曰飛莵也待西施落纂而爲妃則終身不蒙矣又曰日之行也不見其移也騏􅂹背日而馳草木爲靡懸峰未薄而日在其前矣懸峰馬蹄下雞舌也又曰馬免人於難者其死也葬之以帷牛有德於人者其死也葬之以大車之鹿牛馬有功猶不可忘又况人乎淮南萬畢術曰馬毛犬尾親友自絶取馬毛犬尾置朋友若夫婦衣中自相憎也􅀃􅁐曰晉平公出田見乳虎乳虎伏而不動平公還謂師曠曰聞之霸王之君岀獵猛獸伏而不敢起今者寡人出乳虎伏而不動此猛獸乎師曠}
  - {type: page-break, offset: 2671, content: '', id: KR3k0012_SBCK_896-10b}
