  - {type: page-break, offset: 2656, content: '', id: KR3k0012_SBCK_896-10a}
  - {type: variant, offset: 2656, length: 6, content: 慕容諾曷鉢遣, WYG: 良造父之御也上車攝轡投足調均勞佚若一世皆以為工然而未甚貴也若夫鉗旦大丙之御也鉗旦大丙太乙之御除轡衘去韅鞅車莫動而自舉也馬莫}
  - {type: variant, offset: 2656, length: 9, content: 慕容諾曷鉢遣使獻駿, krp: 良造父之御也上車攝轡投足調均勞佚若一丗之斷非而行之必謂之亂断猶治也又曰夫}
  - {type: variant, offset: 2663, length: 2, content: 獻駿, WYG: 而自走也日行月動星燿而𤣥運電奔而鬼駭過歸鴈於碣石軼昆雞於姑餘姑餘在呉地悲思慮之察手爪之巧也嗜欲形於胷中精神踰於六}
