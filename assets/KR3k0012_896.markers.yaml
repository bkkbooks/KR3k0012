  - {type: variant, offset: 2646, length: 2, content: 永徽, SBCK: 宋人有取道者其馬不進剄而投之􅗌水剄殺投弃又復取道其馬不進又剄而投之􅗌水如此者三雖造父之所以威馬不過此矣不得造父之道而徒得其威無益於御人主之不肖有似於此不得其道而徒多其威威逾不用又曰飢馬盈厩嗼然未見芻也飢狗盈宫嗼然未見骨也見骨與芻動則不可禁動猶争也亂丗之民嗼然未見賢者也見賢人則徃不可止又曰得十良馬不若得一伯樂得地千里不􅀂得一聖人又曰小方大方之􅀋也小馬大馬之􅀋也小知非大知之􅀋也又曰青龍之疋遺風之乗也髙誘曰皆馬名疾若遺風也非先爲天子不可得而具具備具也燕丹子曰太子有千里馬荆軻謂太子曰千里馬肝羙太子即進肝又曰丹質於􅁗􅁗王遇之無禮欲求歸􅁗王曰烏頭白馬生角乃許尔歸丹仰天而歎烏即頭白馬即生角􅁗王乃放歸淮南子曰聖人之治猶造父之御也和輯乎銜轡之際而緩急於脣吻之和正度乎􅇩臆之}
  - {type: page-break, offset: 2646, content: '', id: KR3k0012_SBCK_896-8b}
  - {type: variant, offset: 2646, length: 2, content: 永徽, WYG: 宋人有取道者其馬不進剄而投之鸂水又復取道其馬不進又剄而投之鸂水如此者三雖造父之所以威馬不過此矣不得造父之道而徒得其威無益於御人主之不肖有似於此不得其道而徒多其威威愈多民愈不用又曰飢馬盈廐瞙然未見芻也飢狗盈宫瞙然未見骨也見骨與芻動不可禁動猶争也亂世之民瞙然未見賢者也見賢人則徃不可止又曰得十良馬不若得一伯樂得地千里不若得一聖人又曰小方大方之類也小馬大馬之類也小知非大知之類也又曰青龍之疋遺風之乗也髙誘曰皆馬名疾若遺風也非先為天子不可得而具具備具也燕丹子曰太子有千里馬荆軻謂太子曰千里馬肝美太子即進肝又曰丹質於秦秦王遇之無禮欲求歸秦王曰烏頭白馬生角乃許爾歸丹仰天而嘆烏即頭白馬即生角秦王乃放歸淮南子曰聖人之治猶造父之御也和輯乎御轡之際而緩急於唇吻之和正度乎胸臆之}
