  body:
  - {type: variant, offset: 2, length: 1, content: 七, SBCK: 八馬四戰國䇿曰汙明見春申君曰夫􅂹之齒至矣服鹽車而上太行漉汁洒地白汗交流中坂遷延負轅不能上伯樂遭之下車攀而哭之解紵衣而幕之􅂹於是俯而噴仰而鳴聲造於天欣見伯樂之知已也漢書音義曰騕􅙂者神馬也赤喙黒身穆天子傳曰天子命駕八駿之乗右服華騮而左緑耳右驂赤􅂹而左白義天子主車造父爲御次車之乗右服渠黃而左踰輪右驂盗驪而左山子伯天子主車叅百爲御奔戎爲右天子乃遂東南翔行馳驅千里至于巨蒐巨蒐之人用其牛馬之湩以洗天子之足湩乳音東又曰祝沉牛馬豕羊河宗命乎皇天子加皇者尊之天子受命南面再拜柏友旣致河典乃乗黃之乗爲天子先所乗馬盡黄色爲先驅也以極西􅁟又曰天子北征舎于珠澤此澤出珠因名之也以釣于㳅水因獻食}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_SBCK_896-1b}
  - {type: variant, offset: 2, length: 1, content: 七, WYG: 八}
  - {type: variant, offset: 2, length: 1, content: 七, krp: 八馬四戰國䇿曰汙明見春申君曰夫驥之齒至矣服鹽車而上太行漉汁洒地白汗交流中坂遷延負轅不能上伯樂遭之下車攀而哭之解紵衣而幕之驥於是俯而噴仰而鳴聲造於天欣見伯樂之知已也漢書音義曰騕褭者神馬也赤喙黒身穆天子傳曰天子命駕八駿之乗右服華騮而左緑耳右驂赤驥而左白義天子主車造父爲御次車之乗右服渠黃而左踰輪右驂盗驪而左山子伯天子主車叅百爲御奔戎爲右天子乃遂東南翔行馳驅千里至于巨蒐巨蒐之人用其牛馬之湩以洗天子之足湩乳音東又曰祝沉牛馬豕羊河宗命乎皇天子加皇者尊之天子受命南面再拜柏友旣致河典乃乗黃之乗爲天子先所乗馬盡黄色爲先驅也以極西土又曰天子北征舎于珠澤此澤出珠因名之也以釣于㳅水因獻食}
