  - {type: variant, offset: 1201, length: 323, content: 西行廆悔悟深自咎責遣舊父老及長吏乙郍樓追渾令還渾曰我是卑庶理無並大今以馬致別殆天所啟諸君試擁馬令東馬若還東我當相隨去即使二千騎共遮馬令廻馬廻不盈三百步顃然悲鳴西走聲若頹山如是者十餘廻一廻一遠樓跪曰可汗此非復人事又曰劉瑀為右衛將軍年位本在何偃前孝武初偃為吏部尚書瑀圖侍中不得與偃同從郊祀時偃乘在前瑀策駟居後相去數十步瑀蹋徒合切馬及之謂偃曰君轡何疾偃曰牛駿馭精所以疾耳偃曰君馬何遟曰騏驥羅於羈絆所以居後偃曰何不著鞭使致千里荅曰一蹙造青雲何至與駑馬爭路蕭子顯齊書曰楊玉夫殺宋蒼梧王將首與王敬則敬則送太祖太祖夜乘常所騎赤馬入殿及踐祚號此馬為龍驤將軍後魏書曰高肇字道文文昭王太后之兄也大舉征蜀以肇為大將軍都督諸軍面辭世宗於東堂親奉規略是日肇所乘駿馬停於神虎, SBCK: 于魯城南髙}
