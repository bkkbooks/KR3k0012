  - {type: variant, offset: 598, length: 375, content: 於門內令人射之欲觀幾箭而死左右曰馬國姓而射之不祥甚矣乃止俄而桓玄篡位續安帝紀曰司馬休之奔廣固慕容超有欲害心而休之不知休之常以所乘騅馬於床前養飼忽連鳴不食注目視鞍休之試被之即不動也訖還床坐馬又驚跳因試騎視馬即驟出裁至門外奔而馳之走行數里休之顧望所住已有寇至乘以南奔殆而獲免後還荊州加騅馬揚武之號王隱晉書曰馬隆子咸為成都王前鋒長沙王所統冠軍司馬王湖率眾討咸於馬市咸堅不動湖乃使數十騎下馬縛戟於鞍而令向咸又使數十騎各㓨所放馬馬驚奔咸軍軍壞湖因馳逐猛戰臨陣斬咸干寶晉紀曰桓範出赴曹爽宣王謂蔣濟曰智囊往矣濟曰智則智矣駑馬戀芻豆爽必不能用也鄧粲晉紀曰王湛有隱兄弟宗族皆以為癡居墓次不交當世兄子濟性好馬所乘駿快意甚愛之湛曰此馬雖快力薄不堪苦近見督郵馬當勝此濟然之取督郵馬穀食十數日與湛試之湛未嘗乘馬卒然便騎馳騁步驟不異於濟而馬不相勝湛曰直行平路何以別馬唯當於蟻封於, WYG: ''}
