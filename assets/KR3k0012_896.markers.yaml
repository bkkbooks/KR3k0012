  - {type: variant, offset: 2649, length: 6, content: 吐谷渾河源郡, SBCK: 而執節於掌握之間内得於中心而外合於馬志故能取道致逺而氣力有餘誠得其術也是故執權者人主之車輿也大臣者人主之四馬也體離車輿之安而手失四馬之心而能無危者古今未之見也又曰天下有道飛黄服皁又曰黄帝時飛黄服皁也皁與皂同又曰}
  - {type: variant, offset: 2649, length: 6, content: 吐谷渾河源郡, WYG: 而執節於掌握之間内得於中心而外合於馬志故能取道致逺而氣力有餘誠得其術也是故權勢者人主之車輿也大臣者人主之四馬也體離車輿之安而手失四馬之心而能無危者古今未之見也又曰天下有道飛黄服皁又曰}
