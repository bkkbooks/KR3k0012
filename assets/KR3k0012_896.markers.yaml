  - {type: variant, offset: 16, length: 1, content: 一, WYG: 右服華騮而左綠耳右驂赤驥而左白􅀈天子主車造父為御次車之乘右服渠黄而左踰輪右驂盜驪而左山子伯夭主車參伯為御奔戎為右天子乃遂東南翔行馳驅千里至于巨蒐巨蒐之人用其牛}
