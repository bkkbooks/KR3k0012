  - {type: punctuation, offset: 32, content: 「, id: KR3k0012_CHANT_896-bkkpn11}
  - {type: variant, offset: 35, length: 216, content: 惜鄣泥使人解去便渡故杜預謂濟有馬癖又曰王師敗於蕩陰嵇紹被害初紹之行也侍中秦准謂曰今日向難卿有佳馬否紹正色曰大駕親征以正伐邪理必有征無戰若使乘輿失守臣節有在駿馬何為聞者莫不歎息載記曰慕容廆有駿馬曰赭白有奇相逸力石季龍之伐棘城也皝將出避難欲乘之馬悲鳴踶齧人莫能近皝曰此馬見異先朝孤常仗之濟難今不欲者蓋先君之意乎乃止季龍尋退皝益奇之至是四十九歲矣而駿逸不虧儁比之於鮑氏驄命鑄銅以為其象親為銘讚鐫其旁置之薊城東掖門是歲象成而馬死又曰符堅遣使, SBCK: 生緑耳魏時}
