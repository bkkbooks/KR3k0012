  - {type: variant, offset: 5, length: 1, content: 晉, SBCK: 百可以供厨膳者牛羊二千又曰辛丑天子渇于沙衍沙中無泉水求飲未至七萃之士曰髙奔戎刺其左驂之頸取其清血以飲天子又曰天子東遊于黃澤􅀫于曲洛洛水文廻曲曰黃之池其馬歕沙歕音普問切皇人威儀黃之澤其馬歕王皇人夀榖郭璞注穆天子傳曰竹}
