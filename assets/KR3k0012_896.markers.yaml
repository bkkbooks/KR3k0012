  - {type: variant, offset: 2429, length: 4, content: 孫晟從晉, WYG: 兄弟蒙寵于府君治馬方以報千金不傳號淮津方尋陽丞陽朱君方最良豫州従事沛國蕭跣方最良也又曰馬相嵗上下齒二十四嵗黄三十三嵗齒白口中欲紅色如日月光者行千里汙溝欲􅀷脊欲如伏龜兩邊如迴毛曰滕蛇殺主口邊有迴毛曰衘禍妨主口中有黑者烏衘馬短夀又曰素下去飛䖟四寸行千里􅕁而不起骨勞起而不振皮勞振而不噴氣勞耳欲小而促也食有三芻飲有三時也白額入口名曰榆寫一名的盧奴乘客死主乘棄市迴毛在目下名曰承涙不利人也又曰馬頭為}
