  - {type: variant, offset: 4, length: 2, content: 三晉, WYG: 四戰國䇿曰汗明見春申君曰夫驥之齒至矣服鹽車而上太行漉汁洒地白汗交流外坂遷延負棘不能上伯樂遭之下車攀而哭之解紵衣以幕之驥於是俯而噴仰而鳴聲達於天彼見伯樂之知己也漢}
