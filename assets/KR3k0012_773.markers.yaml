  - {type: variant, offset: 3446, length: 2, content: 家語, SBCK: 山藏之精與象車相似舜時盛山車有垂綏古史考異曰黄帝作車少皥時略加牛禹時奚仲駕馬仲又造車更廣其制度也神仙傳曰葛玄行過神廟乗車不下湏􅁷有大迴風逐玄埃塵張天玄怒曰小雅敢爾舉手指風風即止穆天子傳曰王欲肆其心周行天下皆有車轍馬迹焉韓詩外傳曰田子方魏太子從車百乗而送於郊太子再謁田子方不下車太子不恱曰敢問如何則可以驕人乎子方曰吾聞人而亡者有矣以一國驕人而亡者由此觀之則貧賤可以驕人矣夫志不得㨙履而適􅁗楚耳安徃而不得吾貧賤乎於是太子再拜而後退子方遂不下車漢武内傳曰内外謐寂以候仙官到夜二更之後忽見西南如白雲起蓊鬰直來遥趨宫庭湏􅁷王母或駕龍虎或乗白麟或乘白鶴或乗軿車或乗天馬羣仙數千光輝庭宇􅀜令内傳曰尹喜常登樓望見東極有紫氣西邁喜曰應有聖人過京邑果見老君乗青牛車來過神仙傳曰洗義學道於蜀中與妻共載路逢白鹿車一乘王子年拾遦記曰周成王六年然丘之國獻比翅鳥雌雄各一􅃗以玉爲樊其國使者拳頭奓陟加切􅈹衣雲霞之布經百有餘國方到京師越䥫峴泛沸海有虵洲蜂岑䥫峴峭礪車輪皆剛金爲􅡞比至京師􅡞銳幾盡沸海湧起如煎魚鼈皮骨堅強如石可以爲鎧汎沸海之時以銅薄爲底虵龍蛟不得近經虵洲度則以豹皮爲屋於屋中推車經峰岑然胡蘇之木此木煙能殺百䖝經塗五年然後至洛邑老子曰三十輹共一轂當其無有車之用莊子曰􅁗王有疾召醫破癕潰疽者得車一乗䑛痔者得車五乘管子曰奚仲之車也方圜曲直皆中規矩鈎繩故機旋相得成器堅固主猶奚仲也言辭動作皆中術數故衆理相當上下相親巧者奚仲之所以爲器也孔藂子}
