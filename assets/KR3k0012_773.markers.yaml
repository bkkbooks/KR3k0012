  - {type: variant, offset: 2633, length: 790, content: 樂師名廣車軘車淳十五乘甲兵備廣車軘車皆兵車名淳禺也凡兵車百乘他兵車及廣軘共百乘又曰魯人莒人皆請以車千乘自其鄉入又曰齊侯登巫山以望晉師晉人使司馬斥山澤之險雖所不至必斾而䟽陳之斥候也䟽建旄旗以陳為陳民眾也又曰使乘車者左實右偽以斾先輿曳柴而從之以陽塵齊侯見之畏其眾也乃脫歸又曰既食之使御廣車而行廣車兵車己皆乘乘車乘車安車又曰丁亥葬諸士孫之里士孫人姓因名其里四翣不蹕下車七乘不以兵甲下車送葬之車齊舊依上公禮九乘又有甲兵今皆降損又曰六月鄭子展子產帥車七百乘伐陳霄突陳城又曰賦車籍馬賦車兵車也兵甲士也又曰大夫逆於境者逆迎也迎衛侯執其手而與之言道逆者自車揖之逆於門者領之而已領搖其頭言衎驕心易生又曰齊慶封來聘其車美孟孫謂叔孫曰慶季之車不亦美乎季慶封之字叔孫曰豹聞之肥美不稱必以惡終美車何為又曰獻車於季武子美澤可以鑑展莊叔見之曰車甚澤人必瘁宜其亡也又曰王聞群公子之死也王楚靈也自投于車下曰人之愛其子也亦如余乎侍者曰甚焉小人老而無子知擠于溝壑矣擠墜也又曰治兵于郝南甲車四千乘三十萬人又曰叔向曰寡君有甲車四千乘在雖以無道行之必可畏也況其率道其可敵之公羊傳曰夏四月公會紀侯于郕秋八月壬午大閱大閱者何簡車徒也大簡閱兵車使任用而習之又曰宋公與楚子期以乘車之會公子目夷諫曰楚夷國也彊而無義請君以兵車之會往宋公曰不可吾與之約以乘車會自我為之自我墮之曰不可終以成乘車以會往楚人果伏兵車執宋公以伐宋又曰晉郤缺帥師革車八百乘以納接菑于邾婁力沛若有餘沛有餘貌七驂乘有車右有御者又曰秋蒐于紅蒐者何簡車徒也楚眾也穀梁傳曰兵車之會四未嘗有大戰也愛民也以兵車會而不用兵伐也論語曰升車必正立執綏車中不內顧不疾言不親指大戴禮曰王升車則聞和鸞之聲是以非僻之心無自入也在衡為鸞在軾為和馬動而鸞鳴鸞鳴而和應其聲曰和則敬此仰之節也上車以和鸞為節下車以珮玉為度禮斗威儀曰山車垂勾福草生宗廟中松柏為常山車者自然之車句者曲也不揉治而自員曲故言垂, SBCK: 固讓}
