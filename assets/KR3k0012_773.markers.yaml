  - {type: variant, offset: 1653, length: 4, content: 彫面鷖總, SBCK: 紫蓋朱裏與公侯同子皂蓋青裏晉書曰謝玄敗符堅於淝水獲堅所乗雲母車儀服等又曰和嶠爲給事黄門侍郎遷中書令帝深器遇之舊􅁥令共車入朝時荀朂爲􅁥嶠鄙朂爲人以意氣加之毎同乗髙枕專車而去㘴乃後使􅁥令異車自嶠始也晉公卿禮秩曰安平王孚齊王攸梁王肜給青蓋車垂九旒駕}
  - {type: variant, offset: 1653, length: 444, content: 彫面鷖總四曰翟車具面組總有握五曰輦車組輓有翣羽蓋王之喪車五乘一曰木車始遭喪乘也二曰素車卒哭所乘三曰薻車既練所乘四曰駹車既祥所乘五曰漆車既禫所乘其卿大夫士初喪三年者乘堊齊衰素車大功藻車小功駹車緦麻漆車又曰王后有安車翟車五乘木車素車藻車駹車服車五乘孤乘夏篆卿乘夏縵大夫乘墨車士乘棧車庶人乘役車散車其用無常又考工記曰一器而工聚者車為多傳曰太叔將襲鄭夫人將啟之公聞其期曰可矣命子封帥車三百乘以伐京又曰鄭伯之車僨于濟又曰北戎侵鄭鄭伯禦之患戎師曰彼徒我車懼其侵軼我也又曰公孫閼與潁考叔爭車潁考叔挾輈以走子都拔棘以逐之子都公孫閼也又曰秋大閱簡車馬也又曰鬭丹獲其戎車與其戎右少師又曰天王使家父來求車非禮也諸侯不貢車服天子不私求財諸侯自常職貢又曰使公子彭生乘公公薨于車公魯桓公也又曰公怒公齊襄公也曰彭生敢見射之豕人立而啼公懼墜于車傷足喪屨反誅屨於徒人費又曰南宮長萬奔陳以乘車輦其母一日而至又曰眾車入自純門及逵市又曰齊侯使公子無虧帥車三百乘甲士三千人以戍曹又曰元年革車三十乘季年乃三百乘又曰車說音脫其輹火焚其, WYG: 朱斑輪倚獸伏鹿軾旂}
