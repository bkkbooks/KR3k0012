  - {type: variant, offset: 156, length: 486, content: 朝敷奏以言明試以功車服以庸又曰武王戎車三百兩虎賁三百人與受戰于牧野作牧誓至牧地至誓眾又酒誥妹土嗣爾股肱純其藝黍稷奔走事厥考厥長肇牽車牛遠服賈用孝養厥父母農功既畢始牽車牛載其所有易求所無遠行賈賣用其所得異珍孝養其父母又蔡仲之命曰惟周公位冡宰正百工百工百官群叔流言乃致辟管叔于商囚蔡叔于郭鄰以車七乘詩曰我送舅氏曰至渭陽何以贈之路車乘黃乘黃白馬秦康公作是詩送重耳歸晉又曰何彼穠矣棠棣之華曷不肅雍王姬之車又曰公車于乘朱英綠縢又曰戎車孔愽徒御無斁又曰君子之車既庶且多又曰子有車馬弗馳弗驅又曰役車其休又曰有棧之車行彼周道又曰命彼後車謂之載之又曰我任我輦我車我牛又曰擇有車馬以居徂向鄭箋云擇民之在車馬者往居于向又曰其車既載乃棄爾輔又曰既出我車既挾我侯又曰脩爾車馬謹爾戎兵又曰間關之車舝牽兮舝音轄又曰戎車既飾徒御無繹又曰戎車既安如輊如軒輊陟利切車前重軒後重也禮曰乃擇元辰天子親載耒耜置之車右率公卿諸侯大夫躬耕籍田又曰乃教田獵以習五戎班馬政命僕夫七騶咸駕載旌旐授車以級整設于屏外有司搢朴北面以誓之又曰大夫七十而致仕若不得謝則必賜之几杖行役以婦人適四方乘安車自稱曰老夫又曰夫為人子者三賜不及車, SBCK: ''}
