  - {type: variant, offset: 3453, length: 0, content: '', SBCK: 夫子巳來􅀼見其言不離道動不遺仁貴義尚清素好儉妻不服綵妾不衣帛車器不雕馬不食粟􅀂夫觀物之麗靡窈妙之浮音夫子過之弗聽也故臣知夫子之不用車也孟子曰子産聽鄭國之政以其乗輿濟人於溱洧韓子曰啇太宰使庶子行市還云西市門多車太宰謂庶子曰汝勿言及市吏至問曰市何多牛屎耶吏恠太宰神智又曰昔彌子瑕有寵於君衛國之法􅀼駕君車罪刖彌子之母有疾告彌}
  - {type: page-break, offset: 3453, content: '', id: KR3k0012_SBCK_773-5a}
  - {type: variant, offset: 3453, length: 0, content: '', WYG: 夫子也已來竊見其言不離道動不遺仁貴義尚清素好儉妻不服絲妾不衣帛車器不雕馬不食粟若夫觀物之麗靡窈妙之浮音夫子過之弗聼也故臣知夫子之不用車也孟子曰子産聴鄭國之政以其乗輿濟人於溱洧韓子曰啇太宰使庻子行市還云西市門多車太宰謂庻子曰汝勿言及市吏至問曰市何多牛屎耶吏怪太宰神智又曰昔彌子瑕有寵於君衛國之法竊駕君車罪刖彌子之母有疾告彌}
