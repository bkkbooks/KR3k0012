  - {type: variant, offset: 3502, length: 0, content: '', SBCK: 去之也然後國人不爲又曰晏子衣緇布之衣而頳裏棧軫之車而牝馬以朝子思子曰終年爲車無一尺之軨則不可以馳尸子曰文軒六駃題無四寸之鍵則車不行小亡則大者不成也又曰寗戚爲桓公祝曰使公無忘在莒管子無忘在魯寗戚無忘車下又曰車輕}
