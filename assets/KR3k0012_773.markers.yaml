  - {type: variant, offset: 3562, length: 0, content: '', SBCK: 之水廣則魚大君明則臣忠昔有桓公乃有管仲今桓公在此則車下之臣盡管仲也又曰趙簡主乗弊車癯音衢馬衣羖羊之裘其宰進諌曰車新則安馬肥則徃來便衣狐豹之裘温且輕簡子曰吾非不知吾聞君子服羙則益恭小人服羙則益倨今我以自備恐有小人之心又曰晉平公爲馳逐之車掛之以犀錯之以羽車成立於殿下群臣得觀焉田差三過而不觀平公作色大怒差對曰臣聞桀以奢亡紂以此敗是以不敢觀也平公曰善令左右去車世說曰王武子乗車着連乾障泥前有水馬不肯渡武子曰此馬惜鄣泥使解之馬乃渡白虎通曰制車以歩故立乗}
