  - {type: variant, offset: 5, length: 0, content: '', SBCK: 下司馬彪續漢書輿服志曰奚仲爲車正具物以時六材皆良又曰輕車古之戰車也不巾不蓋孫吴兵法云車有巾有蓋謂之武剛車武剛者爲先驅又爲属車輕車爲後殿焉又曰大使車立乗駕駟赤帷持節者重道從賊曹皆兩大車伍伯璅弩十二人辟車四人從車四人從車乗元單導减半小使車不立乗有騑赤屏泥油重綘帷導無斧車近小使車蘭與赤轂白蓋赤帷從騶騎四十人此謂追捕考案有所勑取者之所乗也其送葬曰堊巳下駟車而後還公卿中二千石郊廟明堂祠陵法岀皆大車立乗駕駟他岀乗安車大行載車其飾如金根加施組組連壁交結四角金龍首㗸璧乗五彩折羽流蘇前後雲氣􅀞裳靈文􅀞曲轓長輿車等大僕御駕六希者淳白駱馬施色以黒藥灼其身爲虎文又曰諸車之文乗輿􅀝龍伏虎靈文盡輈龍首鸞衡班輪升龍飛輅皇太子諸侯􅀝虎伏鹿靈文􅀞輈陟周切􅙲􅁻陽筩朱鹿班輪文飛軨旗九斿音留降龍公列侯􅀝鹿伏熊黒􅙲朱班輪鹿文飛九斿降龍卿朱两􅙲五斿降龍二千石以下各從科品諸輻車以}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_773-1b}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 下司馬彪續漢書輿服志曰奚仲為車正具物以時六材皆良又曰輕車古之戰車也不巾不盖孫吳兵法云車有巾有盖謂之武剛車武剛者為先驅又為屬車輕車為後殿焉又曰大使車立乗駕駟赤帷持節者重道從賊曹背兩大車五百璅弩十二人辟車四人從車四人從車乗元單導減半小使車不立乗有騑赤屏泥油重絳帷導無斧車近小使車蘭輿赤轂白葢赤帷從騶騎四十人此謂追補考案有所𠡠取者之所乗也其送葬車葢已下駟馬而後還公卿中二千石郊廟明堂祠陵法出皆大車立乗駕駟他出乗安車太行載車其飾如金根加施組組連璧交結四角金龍首啣璧垂五彩析羽流蘇前後雲氣畫衣靈文畫曲轓長輿車等太僕御駕六希者淳白駱馬施也以黒藥灼其身為虎文又曰諸車之文乗輿倚龍伏虎靈文畫輈龍首鸞衡班輪升龍飛軨皇太子諸侯王倚虎伏鹿靈文畫輈陟周切轓吉陽筩朱班輪鹿文飛軨旂旗九斿音畱降龍公列侯倚鹿伏熊黒輪朱班轓鹿文飛軨九斿降龍卿朱兩轓五斿降龍二千石以下各從科品諸輻車以}
