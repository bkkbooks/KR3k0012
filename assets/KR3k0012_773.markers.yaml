  - {type: variant, offset: 9, length: 1, content: 古, SBCK: 董卓作乗輿青蓋金范􅀲􅀞兩輻者乗之時人皆號月軨磨車言近天子也後地動卓問蔡邕邕曰地動隂盛大臣踰制之所致也公乗青蓋逺近以爲非冝太師之乗白蓋車􅀞輻東觀漢記曰郭丹字少卿從師於長安買符入凾谷􅀜旣入封乞符乃􅁣然歎曰不乗使}
