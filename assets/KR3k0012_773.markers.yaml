  - {type: variant, offset: 875, length: 147, content: 不戢櫜韔丘不戢示當報以告喪之辭言之謂還告於國櫜甲衣韔弓衣又曰大夫殺則止佐車佐車止則百姓田獵佐車驅逆之車也又曰有發則命大司徒教士以車甲乘兵專衣甲之儀有發謂有軍師之發卒又曰有圭壁金璋不鬻於市命服命車不鬻於市宗廟之器不鬻於市犧牲不鬻於市戎器不鬻於市用器不中度不鬻於市兵車不中度不鬻於市鬻賣也又曰曾子問, SBCK: 九乗在輿前漢􅄂事}
