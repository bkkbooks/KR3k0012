  - {type: 'tls:seg', offset: 3518, content: '', id: KR3k0012_CHANT_773-72a.10}
  - {type: variant, offset: 3518, length: 0, content: '', SBCK: 也􅂫子曰房麗者趙之賢人立東門之外有行啇車轄忘麗告之不悟復更告之啇人怒曰吾轄自亡何湏汝告惠加於巳而反怒之吾欲比之草木草木有心矣沈約輿服志曰車服以庸著在唐典夏建旌旂辯其尊卑至于殷瑞山車者金車也故殷人制爲大輅金根之色也周人則有玉金象革木五路之制其物致巧備於考工輦車周禮王后五路之車也后居宫中從容所乗非王車也漢制乗輿御之或使人輓或駕車果下馬案女史圖班婕妤辭輦則乗之又復殷之末制後代遂行之耳陸景典語曰吴朝貴戚或犯道背理雕車麗服撗陵市路車服雖侈人不爲榮宫室雖羙士不過門又曰顯臣以車服天下莫不瞻其榮又曰飛車䇿馬撗騰超追來如霧合去􅀂雲散得志則進失意則逝也異語曰仕䆠不止車生耳長六尺法六律六隂數也今其上作簟文所以缺後者月滿則􅃜也風俗通曰車一兩謂兩兩相與爲體也厚其所以言兩者箱裝及輪兩兩而耦故稱兩耳通俗文曰車轢曰軋後重曰軒前重曰輊陟利切載喪車謂之䡜音六轊音衛車聲曰轞胡减切雇車載曰僦蔡邕獨斷曰永安七年見金根耕根諸御車皆一轅或四馬或六馬金箱四輪皆以金鑄正黄兩辟前後剋金作龍虎􅀛鳥又曰緑車名皇孫車}
  - {type: page-break, offset: 3518, content: '', id: KR3k0012_SBCK_773-6a}
  - {type: page-break, offset: 3518, content: '', id: KR3k0012_SBCK_773-6b}
  - {type: variant, offset: 3518, length: 0, content: '', WYG: 也蘇子曰房麗者趙之賢人立東門之外有行商車轄亡麗告之悟復更告商人怒曰吾轄自亡何湏汝吿惠加於己而反怒之吾欲比之草木草木有心矣沈約輿服志曰車服以庸著在唐典夏建旌旂辨其尊卑至於殷瑞山車者金車也故殷人制為大輅金根之色也周人則有玊金象革木五路之制其物致巧備於考工輦車周禮王后五路之車也后居宮中從容所乗非王車也漢制乗輿御之或使人輓或駕車果下馬案女史圖班婕妤辭輦則乗之又復殷之末制後代遂行之耳陸景典語曰吳朝貴戚或犯道背理彫車麗服横陵市路車服雖侈人不為榮宮室雖美士不過門又曰顯臣以車服天下莫不瞻其榮又曰飛車䇿馬横騰超邁來如霧合去若雲散得志則進失意則退異語曰仕官不止車生耳長六尺法六律六隂數也今其上作簟文所以缺後者月滿則虧也風俗通曰車一兩謂兩兩相與為體也厚其所以言兩者箱裝及輪兩兩如耦故稱兩耳通俗文曰車轢曰軋後後重曰軒前重曰輊陟利切載喪車謂之轆音六轊音衛車聲曰轞胡减切顧車載曰僦蔡邕獨㫁曰永安七年見金根諸御車皆一轅或四馬或六馬金箱四輪皆以金鑄正黄兩辟前後尅金作龍虎龜鳥又曰緑車名皇孫車}
