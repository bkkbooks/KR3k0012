  - {type: variant, offset: 3534, length: 0, content: '', SBCK: 一品青油纁道幰許偃切朱裏朱絲絡綱三品以上青道幰朱裏五品以上青道幰碧裏六品以下皆不得用幰括地圖曰竒肱民能爲飛車從風逺行湯時西風起竒肱車至於豫州湯破其車不以示民十年西風至乃復使作車遣歸其國去玉門四萬里董巴輿服志曰乗輿金根車五乗輪皆朱班重牙貳轂司馬法曰夏曰予車殷曰胡奴車周曰輜車三代之輦語林曰潘安仁皃羙毎行老嫗以果擲之常滿車中張孟陽至醜毎行兒以瓦礫擲之亦滿車傅暢故事曰尚書令軺車黑耳後户僕射但後户無黒耳中書􅁥令如僕射譙周法訓曰鸞車璜珮求中道心石崇奴劵曰作車當取大良白槐之輻茱茰之􅡞說苑曰齊景公伐宋至於歧隄之上登髙以望大息}
  - {type: page-break, offset: 3534, content: '', id: KR3k0012_SBCK_773-7a}
  - {type: variant, offset: 3534, length: 0, content: '', WYG: 一品青油纁道􅎻許偃切朱裏朱絲絡􅃠三品以上青道􅎻朱裏五品以上青油幰碧裏六品以下皆不得用􅎻括地圖曰竒肱民能為飛車從風逺行湯時西風乆竒肱車至於豫州湯破其車不以示民十年西風至乃復使作車遣歸其國去玉門四萬里董巴輿服志曰乗輿金根車五乗輪皆朱班重牙二轂司馬法曰夏曰予車殷曰胡奴車周曰輜車三代之輦語林曰潘安貌美毎行老嫗以果擲之常滿車中張孟陽至醜毎行兒以瓦礫擲之亦滿車𫝊暢故事曰尚書令軺車黒耳後户僕射但後户無耳中書監令如僕射譙周法訓曰鸞闕璜珮求中道心石崇奴劵曰作車當取大良白槐之輻茱茰之輞說苑曰齊景公伐宋至於政隄之上登高以望大息}
