  - {type: variant, offset: 3446, length: 2, content: 家語, WYG: 山藏之精與象車相似舜德盛山車有垂綏古史考曰黄帝作車少皥時略加牛禹時奚仲駕馬仲文造車更廣其制度也神僊傳曰葛𤣥行過神廟乗車不下湏㬰有大㢠風逐𤣥埃塵漲天𤣥怒曰小雅敢爾舉手指風風即止穆天子傳曰王欲肆其心周行天下皆有車轍馬迹焉韓詩外傳曰田子方魏太子從車百乗而送於郊太子再謁田子方不下車太子不悅曰敢問如何則可以驕人乎田子方曰吾聞以天下驕人而亡者有矣由此觀之則貧賤可以驕人矣夫志不得則授履而適秦楚耳安徃而不得吾貧賤乎於是太子再拜而後退子方遂不下車漢武内傳曰内外謐寂以候仙官到夜二更之後忽見西南如白雲起蓊欝直來遥趨宫庭須㬰王母或駕龍虎或乗白麟或乗白鶴或乗軿車或乗天馬羣仙數千光輝庭宇關令内傳曰尹喜常登樓望見東極有紫氣西邁喜曰應有聖人過京邑果見老君乗青牛車來過神仙傳曰沈義學道於蜀中與妻同載路逢白鹿車一乗王子年拾遺記曰周成王六年然邱之國獻比翅鳥雌雄各一隻以玉為樊其國使者拳頭尖鼻衣雲霞之布經百有餘國方到京師越鐡峴泛沸海有蛇洲蜂岑鐡峴峭巁車輪皆剛金為輞比至京師輞脫幾盡沸海湧起如煎魚鼈皮骨堅强如石可以為鎧汎沸海之時以銅薄舟底虵龍蛟不得近經虵洲度則以豹皮為屋於屋中推車經蜂岑然胡蘇之木此木煙能殺百蟲經塗十五餘年乃至洛邑老子曰三十輹共一轂當其無有車之用莊子曰秦王有疾召醫破癕㿉疽者得車一乗䑛痔者得車五乗管子曰奚仲之為車也方圜曲直皆中䂓矩鈎繩故機旋相得成器堅固主猶奚仲也言辭動作皆中術數故衆理相當上下相親巧者奚仲之所以為器也孔藂子}
