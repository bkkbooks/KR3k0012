  - {type: variant, offset: 2381, length: 251, content: 然子病矣又曰楚子登巢車以望晉軍巢車車上為櫓又曰叔山冉謂養由基曰雖君有命為國故子必射乃射再發盡殪叔山冉搏人以投中車折軾晉師乃止又曰狄虒彌建大車之輪而蒙之以甲以為櫓狄虒彌櫓人也蒙覆也櫓大楯又曰巳酉師于牛首鄭地初子駟與尉上有爭將禦諸侯之師黜其車禦牛首師也黜減損遂弗使獻不使獻所獲又曰子西聞盜不儆而出子西公孫夏子駟子尸而追盜先臨尸而逐賊盜入於北宮乃歸授甲臣妾多逃器用多喪子產聞盜子國子為門者置守門庀群司閉府庫完守備成列而後出兵車十七乘尸而攻盜於北宮子蟜帥國人助之殺尉止子師僕盜眾盡死又曰鄭人賂晉侯以師悝師觸師蠲, SBCK: 及賜几杖並}
