  - {type: variant, offset: 889, length: 244, content: 辭言之謂還告於國櫜甲衣韔弓衣又曰大夫殺則止佐車佐車止則百姓田獵佐車驅逆之車也又曰有發則命大司徒教士以車甲乘兵專衣甲之儀有發謂有軍師之發卒又曰有圭壁金璋不鬻於市命服命車不鬻於市宗廟之器不鬻於市犧牲不鬻於市戎器不鬻於市用器不中度不鬻於市兵車不中度不鬻於市鬻賣也又曰曾子問曰古者師行必以遷廟主行乎孔子曰天子巡狩以遷廟主行載于齊車言必有尊也今也取七廟之主以行則失之矣齊車金路也又曰曾子問曰古者師行無遷主則何主孔子曰主命問曰何謂也孔子曰天子諸侯將出必以幣帛皮圭告于祖禰遂奉以出載于齊車以行每舍奠焉而, WYG: 太}
