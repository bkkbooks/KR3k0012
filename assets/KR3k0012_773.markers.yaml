  - {type: variant, offset: 2098, length: 286, content: 不利行師敗于宗丘又曰戒爾車乘敬爾君事又曰晉車七百乘韅靷鞅靽又曰及甲車四百六十乘俘二百五十人又曰兵車百乘文馬百駟又曰趙盾為旄車之族又曰鄭人卜行成不吉卜臨于大宮且巷出車吉又曰趙旃棄車而走林屈蕩搏之又曰晉人懼二于魏錡趙旃之怒楚師也使軘車逆之又曰遂疾進師車馳卒奔又曰登諸樓車使呼宋人而告之又曰禽之而乘其車既獲其人因釋己車而載所獲者車又曰張侯曰師之耳目在吾旗鼓進退從之此車一人殿之可以集事又曰邴夏曰射其御者君子也公曰謂之君子而射之非禮也射其左越于車下射其右斃于車中又曰綦母張喪車從韓厥曰請寓乘又曰丑父使公下如華泉取飲鄭周父御佐車宛茂為石載齊侯以免又曰茍有險余必下推車子豈識之乎然子病, WYG: 九斿畫降龍}
