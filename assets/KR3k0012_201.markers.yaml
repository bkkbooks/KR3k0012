  - {type: variant, offset: 4284, length: 428, content: 龜放於餘不溪中流左顧者數過及鑄侯印而龜左顧更鑄猶然印工以聞愉悟遂佩焉又曰明帝以平錢鳳功封始興公溫嶠建寧公庾亮永昌公郗鑒南平公卞壺建興公蘇峻邵陵侯劉泉泉陵侯應詹觀寧侯卞郭益陽侯趙胤湘南侯又曰成帝以平蘇峻功封公者三人侯者八人又以討郭默功者三人穆帝以平蜀功封桓溫臨賀公又曰哀帝以平關洛功封桓冲豐城公海西公以平袁真功賜桓溫子偉為西昌公又曰安帝以興復功封劉裕等二十三人裕唱謀封豫章公萬戶劉毅南平公五千戶何無忌安成公劉道規華容公晉起居注曰太康元年詔曰張華前與故太傅創謀大計部分方算有謀謨之勳封廣武侯邑萬戶又曰惠帝追封衛瓘為郡公會稽典錄曰鄭吉既破車師降日逐威震西域日逐并護車以北道故號都護之置自吉始焉上嘉其效乃下詔日都護西域騎都尉鄭吉撫循外蠻宣明威信功效茂著其封吉為安遠侯華陽國志曰漢高帝滅秦為漢王王巴蜀閬中人范自有恩信方略為帝募發賨民西與定秦地既定封自為長安建章郡侯帝將征關東賨民皆思歸嘉其功難傷其意遂聽還謂曰富貴不歸故鄉如衣繡夜行可徙封自閬中慈鄉侯自固辤乃封度汗縣侯, SBCK: ''}
