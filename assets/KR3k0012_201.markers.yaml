  - {type: variant, offset: 1531, length: 362, content: 為義帝實不用其命二月羽自立為西楚霸王王梁楚地九郡都彭城背約更立沛公為漢王王巴蜀漢中四十一縣都南鄭三分關中立秦三將章邯為雍王都廢丘縣名今槐里是司馬欣為塞王韋昭曰在長安東名桃林塞也都櫟陽董翳為翟王文頴曰本上縣秦所置項羽更名為翟也都高奴楚將瑕丘申陽為河南王都雒陽趙將司馬卬為殷王都朝歌當陽君英布為九江王都六懷王柱國共敖為臨江王本南郡改為臨江國都江陵番君吳芮為衡山王都邾文頴曰邾音朱縣名故齊王建孫田安為濟北王徙魏王豹為西魏王都平陽徙燕王韓廣為遼王燕將臧荼為燕王都薊徙齊王田市為膠東王齊將田都為齊王趙歇為代王趙相張耳為常山王也又曰漢四年立韓信為齊王後徙為楚王五年以九江王英布為淮南王盧綰為燕王韓王信為代王彭越為梁王又曰克項八載天下乃平始論功侯者四十有三人時人民散亡大侯不過萬家封爵之誓曰使黃河如帶太山如礪於是申以丹書之信重以白馬之盟藏, WYG: ''}
