  - {type: variant, offset: 3151, length: 100, content: 關內侯又太祖令曰吾起義兵誅暴亂於今十九年所征必克豈吾功哉乃賢士大夫之力也天下雖未悉定吾要與賢士大夫共定之而專饗其勞吾何以安焉其保定功行封於是大封功臣二十餘人皆為列侯其餘各以次受封及復死事之孤輕重各有差, WYG: 土}
