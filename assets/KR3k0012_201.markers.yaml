  - {type: variant, offset: 2710, length: 0, content: '', WYG: 令不為将軍也安世乃不敢言東觀漢記曰竇融數辭爵位曰臣有一子質性頑鈍何乃當𫝊以連城廣土享諸侯之國也因㑹見詔曰公欲讓職還土今相見不宜論也又曰永元元年以定䇿功増封鄧隲三千户讓不獲遂逃避使者上疏自陳又曰劉愷字伯預以當襲父爵封居崇侯讓與弟憲有司奏之侍中賈逵上書陳之和帝詔愷致國與弟遁亡所守彌固乃拜為郎又曰丁綝拜河南太守及封功臣上令各言所樂綝曰昔孫叔敖教其子受必求磽确之地綝徳薄功微鄉亭可矣上從之封為定陵謝安鄉食千户又曰帝欲封樊興置印綬於前固讓曰臣未有先登陷陣之功一家數人並受爵土令天下觖望上嘉興之讓不奪其志又曰封朱祐為渦侯邑七千三百户自陳功薄而國大願受南陽五百户足矣上不許也又曰翟歆字敬子父于以功封臨沮侯歆當嗣爵以母年老國逺上書辭讓詔許乃賜關内侯又曰丁綝卒子鴻上書讓國與弟盛既𦵏乃挂縗絰冢廬而逃又曰大将軍竇憲封武陽侯食邑二萬户憲固辭封詔曰大将軍憲前嵗出征克滅北狄朝加封賞固辭不受舅氏舊典並䝉爵土其封憲冠軍侯邑二萬户魏志曰田疇從太祖入盧龍塞太祖猶欲侯之疇素與夏侯惇善太祖語惇曰且往以情喻之荅曰疇負義逃竄之人耳蒙}
