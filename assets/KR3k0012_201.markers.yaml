  - {type: variant, offset: 11, length: 0, content: '', WYG: 宣帝以劉徳謹重封為陽城侯又曰邴吉有隂徳於孝宣帝微時帝即位衆莫知吉亦不言吉從大將軍長史轉遷御史大夫帝聞將封之㑹吉病甚將使人加紳而封之及其生存也太子太傅夏侯勝曰此未死也臣聞有隂徳者必饗其樂以及子孫今未獲其樂而病甚非死也後愈封為博陽侯東觀漢記曰建武元年詔曰故密令卓茂束身自修執節惇固斷斷無他其心休休焉夫士誠能為人所不能為則名冠天下當受天下重賞故武王誅紂封比干之墓表商容之閭今以茂為太傅封褒徳侯賜安車一乗衣一襲金五百斤討亂定策封漢書在恩澤表漢書曰莽何羅與弟重合侯通謀逆時霍光金日磾上官桀等共誅之功未録武帝病封璽書曰帝崩發書以遺詔封金日磾為秺侯上官桀為安陽侯光為博陸侯文穎曰博大陸平取其嘉名無此縣也食邑北海之河東臣瓉案漁陽有博陸城也皆以前捕反者功封時衞尉王莽子男忽侍中揚語曰帝崩忽常在左右安得遺詔封三子事羣兒自相貴耳光聞之切讓王莽莽酖殺忽奉使封史記曰髙祖使劉敬使匈奴還報曰匈奴不可擊此必見短伏竒兵以争利上怒械繫敬必往而厄於白登七日乃得解還至廣武赦敬封千户號建信君漢書曰武帝以校尉張騫從大将軍擊匈奴知水草處軍得以無飢渴因前使外國功封博望侯又昭帝以平樂廐監傅介子誅樓蘭王封為宜陽侯又元帝以甘延夀使西域郅支單于封義成侯蜀志曰陳震字孝起使吴賀孫權踐阼及到武昌權與震昇壇㰱血還封陽亭侯尊賢繼絶封尚書大𫝊曰武王勝殷箕子走之朝鮮因以封之禮記郊特牲曰天子存二代之後尊賢不過二代又禮記曰武王克殷未及下車而封黄帝之後於薊封帝堯之後於祝封帝舜之後於陳下車而封夏后氏之後於杞投殷之後於宋史記曰武王克紂以紂子武庚禄父續殷祀使管蔡相之武王崩成王少管蔡疑周公乃與武庚作亂周公以王命誅之命微子啟為殷後奉其先祀國于宋至宋王偃立於是齊魏楚伐宋滅之而三分其地漢書曰自古受命及中興之君必興滅繼絶修廢舉逸然後天下歸仁四方之政行}
