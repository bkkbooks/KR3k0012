  - {type: variant, offset: 188, length: 0, content: '', krp: 徐盧等爲列侯亞夫因謝病免相又曰武帝時匈奴王及太子相都尉以下趙信南越王兄建德等凡三十五人來降並封侯又曰宣帝時匈奴單于先賢樿音纏等二人降並封侯魏志曰鮮卑軻比能明帝時將其部衆降拜歸義侯雜恩澤封漢書曰髙后以大謁者張澤勸王諸吕封爲建陽侯又曰孝武以方術封欒大爲樂通侯又曰宣帝掖庭令張賀有舊恩封賀子彭祖爲都陽侯又曰王莽居攝安衆侯劉崇與張紹攻宛而敗詔從兄竦崇父嘉詣闕自歸竦因嘉作奏莽莽大恱太后下紹惟嘉父子兄弟雖有屬不敢阿私以千户封嘉爲師禮侯嘉子七人皆賜爵關內侯後又封竦爲淑德侯長安人爲語曰欲求封過張伯松力戰鬪不如巧爲奏東觀漢記曰馬防子鉅爲常從小侯上欲冠之夜拜爲黃門侍郎華嶠後漢書曰元和元年遂置鴻都學畫孔子及七十二弟子像其諸生皆勑州郡三公舉用辟召或出刺太守入爲尚書侍中乃有封侯賜爵者士君子皆恥與爲列魯國先賢志曰汶陽鮑氏起於鮑吉吉字利主桓帝𥘉爲蠡吾侯吉爲書師及桓帝立歴位至河南尹詔曰吉與朕有龍潜之舊其封西郷侯宗族以吉勢力至刺史}
  - {type: variant, offset: 190, length: 0, content: '', SBCK: 石者五􅄂名號封漢書曰初髙祖微時嘗避事時與賔客過其丘嫂食應劭曰丘氏女也孟康曰西方謂上女壻立爲壻立空也上有嫂也晉灼曰丘大也大婦爲冢婦也嫂厭叔與客來佯爲羮盡鑠釡客以故去巳而視釡中有羮由是怨嫂及立齊岱等王而伯子獨不得侯太上皇以爲言髙祖曰某非敢忘封之也爲其母不長者七年十月封其子信爲頡羮侯又曰霍去病以校尉伐匈奴乃封爲冠軍侯又曰趙破奴以司馬再從驃􅀐將軍擊匈奴封爲從驃􅀐侯東觀漢記曰彭寵奴子密殺寵詣闕降封爲不義侯魏志曰初平二十年置名號侯爵十八級􅀜中侯爵十七級皆金印紫綬又置􅀜内外侯十六級銅印􅀛紐墨綬五大夫十五級銅印環紐亦墨綬皆不食租與舊列侯􅀜内侯凡六等注曰臣松之以爲今之虚封盖自此始也搜神記曰張顥爲梁相天新􅀨後有鳥如山鵲飛翔墮地市人擿之隨地化爲石顥椎破之得一金印文曰忠孝侯顥藏之祕府後校書東觀奏言曰堯舜時朝有此官今落印冝可復置宦者封漢書曰髙后大謁者寺人張澤勸王諸吕封建陽侯東觀漢託曰孫程爲中黃門安帝崩初江亰等譛誣太子廢爲濟隂王居西鍾下徴北郷侯爲嗣程等十八人殺江亰閻顯等立濟隂王爲帝以功封程爲浮陽侯万户又封中黃門王康華容侯王國爲酈侯續漢書曰吕強爲中黃門靈帝例封宦者以強爲都郷侯強辭讓懇惻帝乃聽之數上書諌諍爲中常侍趙忠等所譛死晉起居注曰惠帝永平元年詔曰中常侍董猛固讓封邑其封爲武安侯猛前求餘户封三兄今皆封爲亭侯遜讓史記曰晉丈公賞從亡者未至隱者介之推推亦不言禄使人召之則亡遂求所在聞其入緜上山中於是丈公環緜山而封之以爲介推田號曰介山且記吾過以旌善人旌表之也又曰魯連􅀃魏人新垣衍以帝􅁗之害􅁗軍爲郤平原君欲封魯連魯連辭謝者三曰吾與冨貴而屈於人寜貧賤而肆意戰國䇿曰趙王以武城封孟嘗君擇舎人以爲武城吏而進之曰鄙􅀃借車者馳之借衣者􅀍之夫所借衣車者非親即兄弟也夫馳親友之車􅀍兄弟之衣文以爲不可今趙王不以文不肖封之以武城願大夫之徃也無伐樹木無廢室屋然趙王悟而知文也僅可使全而歸之漢書曰初武帝遺詔以討莽何羅功封金日磾爲秺侯日磾以帝少不受封又曰武帝詔曰匈奴逆天理亂人倫車􅀐將軍青度西河至髙闕輕銳之卒執訊獲醜驅馬牛羊百有餘萬全甲兵而還益封三千户以千户封青三子皆爲侯青固謝云皆諸校尉之力臣青子在繦緥中未有勤勞而受之封非臣待罪行間以勸士力戰之意又曰張延壽歴位九卿國在陳留别邑在魏郡租入歳千餘萬延壽自以身無功德何以乆堪數上書減户邑天子以爲有讓迺封平原并一國户口如故而租稅减半又曰張賀爲掖庭令収飬皇曾孫恩甚密皇曾孫即位是爲宣帝而賀已死欲封其冢爲恩德侯其子彭祖小與上同席研書欲封之先賜爵􅀜内侯賀弟安丗􅀷辭讓上曰吾自爲掖庭令不爲將軍也安丗乃不敢言東觀漢記曰竇融數辭爵位曰臣有一子質性頑鈍何况乃當傳以連城廣土享諸侯之國也因㑹見詔曰公欲讓職還土今相見不冝論也又曰永元元年以定䇿功増封鄧騭三千户讓不獲遂逃避使者上䟽自陳又曰劉愷字伯預以當襲父爵封居崇侯讓與弟憲有司奏之侍中賈逵上書陳之和帝詔愷致國於弟遁亡所守弥固乃拜爲郎又曰丁綝拜河南太守及封功臣上令各言所樂綝曰昔孫敖教其子受必求磽确之地綝德薄功微郷亭可矣上從之封爲定陵謝安郷食千户又曰帝欲封樊興置印綬於前固讓曰臣未有先登䧟陣之功一家數人並受爵土令天下觖望上嘉興之讓不奪其志又曰封朱祐爲髙侯邑七千三百户祐自陳功薄而國大願受南陽}
