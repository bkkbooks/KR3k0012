  - {type: variant, offset: 11, length: 1, content: 高, SBCK: 宣帝以劉德謹重封爲陽城侯又曰邴吉有隂德於孝宣帝微時帝即位衆莫知吉亦不言吉從大將軍長史轉遷御史大夫帝聞將封之㑹吉病甚將使人加紳而封之及其生存也太子太傅夏侯勝曰左右安得遺詔封三子事羣兒自相貴耳光聞之切讓王莽莽酖殺忽奉使封史記曰髙祖使劉敬使匈奴還報曰匈奴不可擊此必見短伏竒兵以爭利上怒械繫敬必徃而厄於白登七日乃得解還至廣武赦敬封千户號建信君漢書曰武帝以校尉張騫從大將軍擊匈奴知水草處軍得以無飢渴因前使絶國功封騫愽望侯又昭帝以平樂廐監傅介子誅樓蘭王封爲冝陽侯又元帝以甘延壽使西域郅支單于封義成侯蜀志曰陳震字孝起使呉賀孫權踐祚及到武昌權與震昇壇㰱血還封陽亭侯尊賢繼絶封尚書大傳曰武王勝殷箕子走之朝鮮因以封之禮記郊特牲曰天子存二代之後由尊賢不過二代又禮記曰武王克殷未及下車而封黄帝之後於薊封帝堯之後於祝封帝舜之後於陳下車而封夏后氏之後於􅂎封殷之後於宋史記曰武王克紂以紂子武庚禄父續殷祀使管蔡相之武王崩成王少管蔡疑周公乃與武庚作亂周公以王命誅之命微子開爲殷後奉其先祀國于宋至宋王偃立於是齊魏楚伐宋滅之而三分其地漢書自古受命及中興之君必興滅繼絶脩廢舉逸然後天下歸仁四方之政行髙}
