  - {type: variant, offset: 2566, length: 0, content: '', WYG: 孝武以方術封欒大為樂成侯又曰宣帝掖庭令張賀有舊恩封賀子彭祖為都陽侯又曰王莽居攝安衆侯劉崇與張紹攻宛而敗詔從兄竦崇父嘉詣闕自歸竦因嘉作奏莽莽大悦太后下詔惟嘉父子兄弟雖有属不可阿私以千户封嘉為師禮侯嘉子七人皆賜爵關内侯後又封竦為淑徳侯長安人為語曰欲求封過張伯松力戰鬭不如巧為奏東觀漢記馬防子鉅為常從小侯上欲冠之夜拜為黄門侍郎華嶠後漢書曰元和元年遂置鴻都學畫孔子及七十二弟子像其諸生皆勅州郡三公舉用辟召或出刺太守入為尚書侍中乃有封侯賜爵者士君子皆耻與為列魯國先賢志曰汶陽鮑氏起於鮑吉吉字利主桓帝初為蠡吾侯吉為書師及桓帝立厯位至河南尹詔曰吉與朕有龍􅅗之舊其封西鄉侯宗族以吉勢力至刺史二千石者五雜名號封漢書曰初高祖微時常避事時與賔客過其丘嫂食應劭曰丘氏女也孟康曰西方謂亡女婿為丘婿丘空也空有嫂也張晏曰丘大也長嫂稱也丘嫂厭叔與客来佯為羮盡鑠釡客以故去已而視釡中有羮由是怨嫂及立齊代等王而伯子獨不得侯太上皇以為言高祖曰某非敢忘封之也為其母不長者七年十月封其子信為頡羮侯又曰霍去病以校尉伐匈奴乃封為冠軍侯又曰趙破奴以司馬再從驃騎将軍擊匈奴封為從驃騎侯東觀漢記曰彭寵奴子密殺寵詣闕降封為不義侯魏志曰初平二十年置名號爵十八級闗中侯爵十七級皆金印紫綬又置闗内外侯十六級銅印龜鈕墨綬五大夫五級銅印環紐亦墨綬皆不食租與舊列侯關内侯凢六等注曰臣松之以為今之虗爵蓋自此始也搜神記曰張顥為梁相天新雨後有鳥如山鵲飛翔堕地市人擿之堕地化為石顥椎破之得一金印}
