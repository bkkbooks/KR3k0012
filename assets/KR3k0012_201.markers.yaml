  - {type: variant, offset: 2567, length: 0, content: '', WYG: 曰忠孝侯顥蔵之秘府後行校書東觀奏言曰堯舜時朝有此官天落印宜可復置宦者封東觀漢記曰孫程為中黄門安帝崩初江京等譛誣太子廢為濟隂王居西鍾下徴北鄉侯為嗣程等十八人殺江京閆顯等立隂濟王為帝以功封程為浮陽侯萬户又封中黄門王康華容侯王國為酈侯續漢書曰吕强為中黄門靈帝例封侯者以强為都鄉侯强辭讓懇惻帝乃聼之數上書諫諍為中常侍趙忠等所譛死晉起居注曰惠帝永平元年詔曰中常侍董猛固讓封邑其封為武安侯猛前求餘户封三兄今皆封為亭侯遜讓史記曰晉文公賞從亡者未得隱者介之推推亦不言禄使人召之則亡遂求所在聞其入緜上山中於是文公環緜山而封之以為介推田號曰介山且記吾過以旌善人旌表之也又曰魯連説魏人新垣衍以帝秦之害秦軍為卻平原君欲封魯連魯連辭謝者三曰吾與富貴而屈於人寧貧賤而肆意戰國䇿曰趙王以武城封孟嘗君擇舍人以為武城吏而進之曰鄙説借車者馳之借衣者被之夫人借衣車者非親即兄弟也夫馳親友之車被兄弟之衣文以為不可今趙王不以文不肖封之以武城􅂅大夫之徃也無伐樹木無廢室屋然趙王悟而知文也僅可使全而歸之漢書曰初武帝遺詔以討莽何羅功封金日磾為秺侯日磾以帝少不受封又曰武}
