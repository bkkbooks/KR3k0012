  - {type: variant, offset: 188, length: 0, content: '', SBCK: 徐盧等爲列侯亞夫因謝病免相又曰武帝時匈奴王及太子相都尉以下趙信南越王兄建德等凡三十五人來降並封侯又曰宣帝時匈奴單于先賢樿音􅆞等二人降並封侯魏志曰鮮卑軻比能明帝時將其部衆降拜歸義侯􅄂恩澤封漢書曰髙后以大謁者張澤勸王諸吕封爲建陽侯又曰孝武以方術封欒大爲樂通侯又曰宣帝掖庭令張賀有舊恩封賀子彭祖爲都陽侯又曰王莽居攝安衆侯劉崇與張紹攻宛而敗詔從兄竦崇父嘉詣闕自歸竦因嘉作奏莽莽大恱太后下紹惟嘉父子兄弟雖有屬不敢阿􅀻以千户封嘉爲師禮侯嘉子七人皆賜爵􅀜內侯後又封竦爲淑德侯長安人爲語曰欲求封過張伯松力戰􅃲不如巧爲奏東觀漢記曰馬防子鉅爲常從小侯上欲冠之夜拜爲黃門侍郎華嶠後漢書曰元和元年遂置鴻都學􅀞孔子及七十二弟子像其諸生皆勑州郡三公舉用辟召或出刺太守入爲尚書侍中乃有封侯賜爵者士君子皆恥與爲列魯國先賢志曰汶陽鮑氏起於鮑吉吉字利主桓帝􅀄爲蠡吾侯吉爲書師及桓帝立歴位至河南尹詔曰吉與朕有龍潜之舊其封西郷侯宗族以吉􅀔力至刺史}
