  - {type: variant, offset: 641, length: 881, content: 也中興以來無有封者功臣封周禮夏官曰司勳掌六卿賞地之法以等其功王功曰勳國功曰功民功曰庸事功曰勞治功曰力戰功曰多克敵出奇若韓信陳平者凡有功者銘書於王之太常史記曰古之人功有五品以德立宗廟定社稷曰勳以言曰勞用力曰功明其等曰閥積功曰閱又曰太公望文王立以為師文王作酆邑天下三分有其二及武王克紂太公之謀居多於是武王封尚父於齊營丘成王時及管蔡作亂淮夷叛周乃使邵康公封太公東至海西至河南至穆陵北至無棣五侯九伯汝實征之齊由此得征伐為大國二十八世又曰邵公奭與周同姓武王之滅殷封邵公於燕其在成王時自陜以西邵公主之自陜以東周公主之四十三世秦始皇滅之又曰楚出自帝顓頊高陽後吳廻居火正為祝融吳廻生陸終陸終子六人少曰季連季連之苗胤曰鬻子鬻子事周文王早卒當成王之時舉文武勤勞之嗣乃封其後熊繹於楚以子男之國三十世至負芻而秦滅楚又曰魏者畢公高之後畢公高與周同姓武王封之於畢其後曰畢萬事晉獻公伐霍耿魏滅之因以魏封畢萬為大夫卜偃曰畢萬之後必大萬盈數也魏大名也以是始賞天啟之矣其後魏獻子並為晉卿至魏文侯為諸侯子武立與韓趙共滅晉而三分其地又七世至王假秦滅魏又曰韓與周同姓其後世事晉得封於韓原曰韓武子武子三世有韓厥從封姓為韓氏六世至景侯虔始列為諸侯及孫哀侯與趙魏共滅晉三分其地八世至王安而秦滅韓又曰趙氏之先與秦共祖造父事周穆王攻徐破之乃賜以趙城七世叔帶去周入晉趙氏五世而至趙夙夙生襄襄生盾並為大夫其後趙鞅是為簡子始大又四世而至列侯籍始立為諸侯三世至敬與韓魏共滅晉分其地又七世至幽王繆降秦而趙滅又曰陳完者陳厲公他之子完後奔齊為田氏齊懿氏欲妻之卜之曰是謂鳳皇于飛和鳴鏘鏘有媯之後將育于姜八世之後莫之與京卒妻之完卒謚為敬仲六世而至田常田常殺齊敬公立簡公弟平乃割齊安平以東為巳封封邑大於齊至曾孫和遂遷齊康公於海上而田和立為齊侯五世至王建為秦所滅又曰西戎與申侯伐周殺幽王驪山下為秦襄公將兵救周周避犬戎難東徙雒邑襄公以兵送周平王平王封襄公為諸侯賜之歧以西之地於是始國與諸侯通又曰樂毅并趙楚韓魏燕之兵以伐齊破之追至于臨淄齊涽王走保於莒樂毅獨留徇齊攻入臨淄盡以寶貨財物祭器輸之燕昭王大悅親至濟上勞軍行賞饗士封毅於昌國號為昌國君, WYG: ''}
