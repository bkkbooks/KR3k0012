  - {type: variant, offset: 1894, length: 259, content: 宗廟副在有司迨文景四五世間流民既歸戶口亦息列侯大者三四萬戶小國自倍其後子孫驕恣忘其先祖之艱難多陷法禁訖于孝武後元之年靡有孑遺又曰漢封功臣張良未嘗有戰鬥功高帝曰運籌策帷幄中決勝千里外子房功也乃封良為留侯與蕭何等俱封六年上巳封大功臣二十餘人其餘日夜爭功未決未得行封上在雒陽南宮從複道如淳曰上下有道故謂之複也韋昭曰間道也望見諸將往往相與坐沙中語上曰此何語留侯曰此謀反耳上曰為之奈何留侯曰上平生所憎群臣所共知誰最甚者上曰雍齒數嘗窘辱我留侯曰今急先封雍齒以示群臣於是上置酒封雍齒為什方侯皆曰雍齒且侯我屬無患矣又曰高祖以蕭何功最盛, WYG: 吕}
