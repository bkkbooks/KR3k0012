  - {type: variant, offset: 332, length: 1898, content: 何夔字叔龍為太子少傅太僕文帝踐祚封陽亭侯三百戶病乞遜位詔曰以親則君有輔弼之勳以賢則君有淳固之茂又曰劉放字子棄為中書監掌機密進封魏壽亭侯孫資為中書令封樂陽亭侯太和末資決策伐公孫淵進左鄉侯遼東平定又以參謀之功各封大縣放方城侯資中郡侯齊王即位以決定大謀並增邑子一人亭侯又曰衛覬為漢侍中勸讚禪代之義為文誥之命文帝踐祚封陽告亭侯明帝即位進閿鄉侯又曰桓楷為尚書令封亭鄉侯及病文帝自臨省謂之曰吾方託六尺之孤寄天下之命卿勉之徙封安樂鄉侯又曰胡質薨家無餘財唯賜衣書篋而巳追封陽陵亭侯又曰盧毓衛臻徐宣陳矯和洽常林杜襲裴潛韓暨高文惠王觀辛毗劉靖王基並以列卿尚書封侯又曰漢制凡人君特所寵念皆賜之封邑及丞相初拜亦錫茅土號曰恩澤出自私情非至公之封也中興以來無有封者功臣封周禮夏官曰司勳掌六卿賞地之法以等其功王功曰勳國功曰功民功曰庸事功曰勞治功曰力戰功曰多克敵出奇若韓信陳平者凡有功者銘書於王之太常史記曰古之人功有五品以德立宗廟定社稷曰勳以言曰勞用力曰功明其等曰閥積功曰閱又曰太公望文王立以為師文王作酆邑天下三分有其二及武王克紂太公之謀居多於是武王封尚父於齊營丘成王時及管蔡作亂淮夷叛周乃使邵康公封太公東至海西至河南至穆陵北至無棣五侯九伯汝實征之齊由此得征伐為大國二十八世又曰邵公奭與周同姓武王之滅殷封邵公於燕其在成王時自陜以西邵公主之自陜以東周公主之四十三世秦始皇滅之又曰楚出自帝顓頊高陽後吳廻居火正為祝融吳廻生陸終陸終子六人少曰季連季連之苗胤曰鬻子鬻子事周文王早卒當成王之時舉文武勤勞之嗣乃封其後熊繹於楚以子男之國三十世至負芻而秦滅楚又曰魏者畢公高之後畢公高與周同姓武王封之於畢其後曰畢萬事晉獻公伐霍耿魏滅之因以魏封畢萬為大夫卜偃曰畢萬之後必大萬盈數也魏大名也以是始賞天啟之矣其後魏獻子並為晉卿至魏文侯為諸侯子武立與韓趙共滅晉而三分其地又七世至王假秦滅魏又曰韓與周同姓其後世事晉得封於韓原曰韓武子武子三世有韓厥從封姓為韓氏六世至景侯虔始列為諸侯及孫哀侯與趙魏共滅晉三分其地八世至王安而秦滅韓又曰趙氏之先與秦共祖造父事周穆王攻徐破之乃賜以趙城七世叔帶去周入晉趙氏五世而至趙夙夙生襄襄生盾並為大夫其後趙鞅是為簡子始大又四世而至列侯籍始立為諸侯三世至敬與韓魏共滅晉分其地又七世至幽王繆降秦而趙滅又曰陳完者陳厲公他之子完後奔齊為田氏齊懿氏欲妻之卜之曰是謂鳳皇于飛和鳴鏘鏘有媯之後將育于姜八世之後莫之與京卒妻之完卒謚為敬仲六世而至田常田常殺齊敬公立簡公弟平乃割齊安平以東為巳封封邑大於齊至曾孫和遂遷齊康公於海上而田和立為齊侯五世至王建為秦所滅又曰西戎與申侯伐周殺幽王驪山下為秦襄公將兵救周周避犬戎難東徙雒邑襄公以兵送周平王平王封襄公為諸侯賜之歧以西之地於是始國與諸侯通又曰樂毅并趙楚韓魏燕之兵以伐齊破之追至于臨淄齊涽王走保於莒樂毅獨留徇齊攻入臨淄盡以寶貨財物祭器輸之燕昭王大悅親至濟上勞軍行賞饗士封毅於昌國號為昌國君漢書曰項羽佯尊懷王為義帝實不用其命二月羽自立為西楚霸王王梁楚地九郡都彭城背約更立沛公為漢王王巴蜀漢中四十一縣都南鄭三分關中立秦三將章邯為雍王都廢丘縣名今槐里是司馬欣為塞王韋昭曰在長安東名桃林塞也都櫟陽董翳為翟王文頴曰本上縣秦所置項羽更名為翟也都高奴楚將瑕丘申陽為河南王都雒陽趙將司馬卬為殷王都朝歌當陽君英布為九江王都六懷王柱國共敖為臨江王本南郡改為臨江國都江陵番君吳芮為衡山王都邾文頴曰邾音朱縣名故齊王建孫田安為濟北王徙魏王豹為西魏王都平陽徙燕王韓廣為遼王燕將臧荼為燕王都薊徙齊王田市為膠東王齊將田都為齊王趙歇為代王趙相張耳為常山王也又曰漢四年立韓信為齊王後徙為楚王五年以九江王英布為淮南王盧綰為燕王韓王信為代王彭越為梁王又曰克項八載天下乃平始論功侯者四十有三人時人民散亡大侯不過萬家封爵之誓曰使黃河如帶太山如礪於是申以丹書之信重以白馬之盟藏諸宗廟副在有司迨文景四五世間流民既歸戶口亦息列侯大者三四萬戶小國自倍其後子孫驕恣忘其先祖之艱難多陷法禁訖于孝武後元之年靡有孑遺又曰漢封功臣張良未嘗有戰鬥功高帝曰運籌策帷幄中決勝千里外子房功也乃封良為留侯與蕭何等俱封六年上巳封大功臣二十餘人其餘日夜爭功未決未得行封上在雒陽南宮從複道如淳曰上下有道故謂之複也韋昭曰間道也望見諸將往往相與坐沙中語上曰此何語留侯曰此謀反耳上曰為之奈何留侯曰上平生所憎群臣所共知誰最甚者上曰雍齒數嘗窘辱我留侯曰今急先封雍齒以示群臣於是上置酒封雍齒為什方侯皆曰雍齒且侯我屬無患矣又曰高祖以蕭何功最盛封為酇侯所食邑多功臣皆曰蕭何未嘗有汗馬之勞反居臣等上何也帝曰諸君知獵乎追殺獸者狗也而發蹤指示獸處者人也今諸君徒能得獸耳功狗也至如蕭何發蹤功人也且諸君獨以隨, SBCK: ''}
