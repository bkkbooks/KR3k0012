  - {type: variant, offset: 3455, length: 630, content: 執金吾封都亭侯文帝即位又封詡小子訪為列侯又曰郭嘉字奉孝冀州平封齊陽亭侯及薨太祖表曰臣策未決嘉輔成之平定天下謀功為最增邑并前千戶又曰張既字德容詔曰卿勳非但破胡乃永寧河右使吾長無西顧之念徙封西鄉侯又曰任峻字伯遠為典農中郎大興屯田軍國致饒太祖以峻功高表封都亭侯又曰張遼字文遠為盪寇將軍以功封都亭侯又討陳蘭梅成等入灊山中蘭等壁其上遼力戰平之太祖論諸將功曰登天山以取蘭成盪寇功也乃增邑文帝又分封兄汎及一子列侯帝踐祚進封晉陽侯及薨詔曰合肥之役遼以步卒八百破賊十萬自古未之有也其分遼邑賜一子爵關內侯又曰太祖表封荀攸曰前克敵皆攸之謀也於是封攸陵樹亭侯又曰太祖謂于禁曰清水之難吾焉能也將軍在亂能整雖古之名將何以加之乃錄前後功封壽亭侯又曰文帝踐祚進張郃為鄭侯明帝詔曰賊亮以巴蜀之眾將軍所向克定乃益戶并前四千三百戶郃前後有功明帝分郃戶封四子列侯又曰朱靈字文博先封鄃侯文帝詔曰將軍佐命先帝威過方邵平生所志願勿難色靈謝曰高唐宿所鎮乃更封高唐侯又曰龐惠以眾降太祖聞其驍勇封關內亭侯為關羽所得罵羽而死太祖悲之封其二子為列侯又曰徐邈字景山西域流通荒戎入貢皆邈勳也以功封都亭侯又曰王昶字文舒討諸葛誕誕誅韶曰昔孫臏佐趙直湊大梁兵驟進亦所以成兵勢也增邑四千七百戶矣吳志曰駱統字公緒初曹仁攻濡須使別將常雕等襲中洲統與嚴圭共拒破之封新陽亭侯晉書曰符堅南寇桓伊與冠軍將軍謝玄輔國將軍謝琰俱破堅於肥水以功封永循縣侯進號右軍將軍賜錢百萬袍表千端王隱晉書曰封宣帝為武平侯公孫淵平又增封舞陽昆陽二縣又曰封文帝為高, WYG: 安}
