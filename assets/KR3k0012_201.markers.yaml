  - {type: variant, offset: 2155, length: 407, content: 酇侯所食邑多功臣皆曰蕭何未嘗有汗馬之勞反居臣等上何也帝曰諸君知獵乎追殺獸者狗也而發蹤指示獸處者人也今諸君徒能得獸耳功狗也至如蕭何發蹤功人也且諸君獨以隨我多者兩三人何舉宗數十人皆隨我功不可忘也皆曰平陽侯曹參身被七十創攻城略地功最多宜第一鄂君進曰群臣議皆誤陛下雖亡山東何常全關中以待陛下此萬世之功奈何以一旦之功而加萬世之功哉蕭何第一曹參次之上曰吾聞進賢受上賞蕭何功雖高得鄂君乃益明封鄂君故所食關內侯邑封為安平侯又曰高祖封項伯等四人為列侯賜姓劉氏又曰項羽被十餘瘡顧見漢騎司馬呂馬童曰若非吾故人乎馬童面之指王翳曰此項王也羽迺曰吾聞漢購我頭千金邑萬戶吾為公得之乃自剄王翳取其頭亂相蹂蹈爭羽相殺者數十人最後楊喜呂馬童呂勝楊武各得一體故分其地以封五人皆為列侯又曰陳豨反上自至邯鄲喜曰豨不南據邯鄲北阻漳水吾知其無能為矣上令周昌選趙壯士可令將者因見四人上嫚罵曰豎子能為將乎四人慚皆伏地上封各千戶以為將又曰淮陰侯韓信舍人樂說告信反封順, WYG: 建}
