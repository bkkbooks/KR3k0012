  - {type: variant, offset: 2835, length: 196, content: 雖數縣不過櫟陽萬戶富貴不歸故鄉如衣錦夜行故以封卿又詔封竇融曰行河西五郡大將軍涼州牧張掖屬國都尉竇融執志忠孝扶微救危仇疾反虜隗囂率厲五郡精兵羌胡畢集兵不血刃而虜土崩瓦解功既大矣篤意分明斷之不疑吾甚嘉之春以六安安豐陽原蓼安凡四縣封融為安豐侯又曰三輔豪傑入長安攻未央宮杜虞殺莽於漸臺東海公賓就得其首傳詣宛封猾侯又曰申屠志以功封汝陰王上書以非劉氏還玉璽改為頳陽侯又曰班超定西域五十餘國乃詔封超為定遠侯, SBCK: 除華嶠}
