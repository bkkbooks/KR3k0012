  - {type: variant, offset: 185, length: 0, content: '', SBCK: 議郎孔羡爲崇聖侯奉孔子祀晉中興書曰元帝封孔亭爲奉聖侯不食户邑又曰元帝詔封魏後曹勵爲陳留王吕氏春秋曰武王勝殷封帝堯之後於犁丘成湯之後於宋以奉桑林死王事子孫封功封子郈音后爲新都亭侯􅀃苑曰邯鄲傳舎吏子李談􅀃平原君令盡散家財以饗士攻􅁗國平原從其計勇敢三千人皆出從談赴􅁗軍􅁗軍爲却三十里亦㑹楚魏救至􅁗軍遂罷李談死封其父爲李侯異域降封漢書曰匈奴王徐盧等五人降漢景帝欲侯之以勸後亞夫曰彼背其王降陛下陛下侯之即何以責人臣不守節者乎上曰}
