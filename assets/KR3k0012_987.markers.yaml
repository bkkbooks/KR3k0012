  - {type: variant, offset: 9, length: 5, content: 千歲之枯木, SBCK: 石流黄五岳皆有而箕山爲多}
  - {type: variant, offset: 9, length: 2, content: 千歲, WYG: 或問不寒}
  - {type: variant, offset: 9, length: 2, content: 千歲, krp: 石流黄五岳皆有而箕山爲多其方言許由就此服}
  - {type: variant, offset: 12, length: 12, content: 枯木其下根如坐人長七寸刻, WYG: 道荅曰以立冬}
  - {type: variant, offset: 12, length: 2, content: 枯木, krp: 長生故不復以冨貴累意范子計然曰石流出漢中神仙傳曰劉馮餌石流黄老而更少愽物志曰西域使至王暢說石流黄出且彌山去髙昌八百里有石流黄髙數十丈縱廣五六畒有取流黄孔穴晝視}
  - {type: punctuation, offset: 14, content: ，, id: KR3k0012_CHANT_987-bkkpn5}
  - {type: 'tls:seg', offset: 14, content: '', id: KR3k0012_CHANT_987-1a.5}
  - {type: variant, offset: 15, length: 133, content: 下根如坐人長七寸刻之有血以其血塗足下可以步行水上不沒以塗人鼻入水水為之開可以止住淵底也以塗身則隱形欲見則拭之又可以治病病在腹內則刮服一刀圭其腫痛在外者隨其所在刮一刀圭以摩之皆手下即愈假令左足有疾則刮塗人左足也又曰松樹枝三千歲者其皮中有藂脂狀如龍形名曰飛節芝大者十斤末, SBCK: 方言許由就此}
  - {type: variant, offset: 15, length: 23, content: 下根如坐人長七寸刻之有血以其血塗足下可以步行水, krp: 孔}
