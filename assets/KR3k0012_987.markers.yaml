  - {type: variant, offset: 2528, length: 6, content: 芝一名龍芝食, WYG: 石英形如白石英青端赤後者是赤石英本草經曰赤石英形如白石英赤端白後者是赤澤有光味苦補心氣黄石英本草經曰黄石英形如白石英黄色如金赤端者是黒石英本草經曰黒石英形如白石英黑澤有光石硫黄後魏書曰悅般國有火山山旁皆石燋鎔流數千里迺凝堅人取以為藥即石硫黄也淮南子曰夏至硫黄澤抱朴子曰石硫黄五岳皆有而箕山為多其方言許由就此服}
