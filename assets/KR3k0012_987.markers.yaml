  - {type: variant, offset: 1207, length: 576, content: 石之音折而續之即如故服之為太極大夫第三曰燕胎芝其色紫形如葵葉燕象如欲飛狀光明洞徹服一株拜為太清龍虎仙君第四曰夜光芝其色青實正白如李夜視其實如月光照洞一室服一株為太清仙官第五曰玉芝色白如玉剖食拜三官正真御史也神仙傳曰漆飛黃子張虛字子黃遼人也行玄素之道年二百歲有少容服九英蓋芝石象而得道也又曰刁子然服赤烏散及夜光芝仙人採芝圖曰芝生於名山食之令人乘雲能上天觀望八極通見神明鳳凰芝草生於名山之上金玉間文石上陰乾治食一年令人羽翼皆生壽千歲能乘雲與鳳凰俱又曰水芝生於名山大谷之陰治食之能入水中乘雲行通神明能使百鬼甘露芝生於石山之陰有五彩覆之又曰車馬芝生於名山之中此堯時七車馬化為之能得食之乘雲而行上有雲氣覆之萬年芝生於名山之中及蓬萊山又曰地芝生於名山得食之延年益壽一舉千里走越江海又曰月芝生於名山之陰金石珠玉之間陰乾治食令人有毛二尺延壽萬歲又曰土芝生於名山之陰黃雲覆之此戊巳中宮黃帝之精食之益壽八千又曰黑雲芝生於名山大谷涼泉之間黑蓋赤裏莖黑味鹹苦食之一年能入火不燋入水不漬石芝生於名山之陰色黃上有不死之藥如甘露味極美取而食之令人不死赤松子所服山芝之居東西行三南北行五此為山芝其色皆白山芝者韓終所食也與天地相極延年益壽通神明矣又曰人芝生於名山之陰青蓋白莖黃龍芝生於神仙之中狀如黃龍雲氣芝生於名山之中蓋白莖白裏赤天芝生於名山之陰千秋芝生於大谷中四方異色南赤西白北黑東青, SBCK: 銀練餌}
