  - {type: variant, offset: 2528, length: 1, content: 芝, SBCK: 石脂味酸平無毒主養肝膽氣赤石脂越絶書曰田鍾穹隆山赤松子所取赤石脂也永嘉記曰赤石脂出永寧赤石山荆州記曰義陽有赤石脂山本草經曰赤石脂味酸無毒養心氣范子計然曰赤石脂出河東色赤者黄石脂本草經曰黄石脂味平無毒主飬脾氣白石脂本草經曰白石脂味甘無毒主養肺氣黒石脂本草經曰黒石脂味甘無毒主餋腎氣強隂陽蝕腸泄利吴氏本草曰五石脂}
