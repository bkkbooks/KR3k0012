  body:
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 四石藥上紫石英白石英青石英赤石英黄石英黒石英石流黄石流青石龍赤石膽石肺石碑青石脂赤石脂黄石脂白石脂黒石脂凝水石陽起石石鍾乳孔公孽譽石紫石英山海經曰單􅀌之山蓬水岀焉其中多紫石英魏氏春秋曰黄􅀄元年明帝愈崇宫殿彫飾觀閣取白石英及紫石英五色文石於太行榖城之山宋書曰謝瞻字宣逺六歳能屬文爲紫石英賛爲當時才士歎異隋書曰梁彦光少歧嶷有至性七歳時父遇篤疾醫云餌五石可愈時求紫石英五色文石於太行不得彦光憂瘁不知所爲於園中見一物彦光所不識怪而持歸即紫石英也親屬咸異之抱朴子内篇曰或問不寒之道荅曰以立冬之日或服六丙六壬符或服太陽酒或服紫石英東筦縣西北二十里有襮山出紫石英舊以貢獻永嘉記曰固陶朴有小山岀紫石英人甞於山下得一紫石英王府君聞遣人縁山掘得數升芒角甚好色小薄孫府君亦掘得數升也從征記曰自太峴至太山皆有紫石英太山所出時復􅅛殊吴興記曰烏程縣北壟山有紫石英甚光明但小黒􅀶物志曰平氏陽山縣紫石英特好其他者色淺紫石英舊岀胡陽縣嶺表録異曰隴州山中多紫石英其色淡紫其質瑩徹隨其大小皆五稜兩頭如箭鏃煑水飲之暖而無毒比北中白石英其力倍矣本草經曰紫石英味甘温生太山山谷治心腹嘔逆邪氣􅀘不足女子風寒在子宫絶孕十年無子乆服温中輕身延年吴氏本草曰紫石英神農扁鵲甘氣平季氏太寒雷公太温歧伯甘無毒生太山或㑹稽採無時欲令如削紫色頭如摴蒱者白石英本草經曰白石英味甘微温生山谷主治消渴隂痿不足嘔逆益氣除濕痺鬲間乆寒益氣除乆服輕身長年生華隂永嘉記曰安固老山岀白石英吴氏本草曰白石英神農甘歧伯黄帝雷公扁鵲無毒生太山形如紫石英白澤長者二}
