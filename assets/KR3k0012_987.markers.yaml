  - {type: variant, offset: 773, length: 319, content: 色末服方寸匕日三服至百日則得千歲矣又曰龍仙芝狀似昇龍之相負也以葉為鱗其根則如蟠龍服一株得千歲矣又曰紫珠芝其莖黃其葉赤其實如李而紫色二十四枚輒相連而垂如貫珠也又曰白符芝高四五尺似梅常以大雪而花季冬而實又曰朱草芝九曲有三葉葉有實也又曰五德芝狀似樓殿莖方其葉五色各具而不雜狀如偃蓋中嘗有甘露紫光起數尺又曰龍銜芝常以仲春對生三節十二枚下根如坐人凡此草芝又有百二十種陰乾服之則令人與天地相畢或得千歲二千歲又曰肉芝者謂萬歲蟾蜍頭上有角頷下有丹書八字以五月五日日中時取之陰乾百日以其足畫地即為流水千歲蝙蝠色如白雪集則倒懸腦重故也此二物得而陰乾末服之令人壽四萬歲千歲龜五色具額上兩骨起似角以羊血浴之乃剔取服之壽千歲行山中見小人乘車馬長七八寸者肉芝也取服即, krp: 能化鐵爲銅合}
