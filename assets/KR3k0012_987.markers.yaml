  - {type: variant, offset: 2531, length: 0, content: '', SBCK: 青赤黄白黒符神農甘雷公酸無毒桐君辛無毒季氏小寒生南山或海涯採無時赤符神農雷公甘黄帝扁鵲無毒季氏小寒或生少室或生太山色絳滑如脂黄符季氏小寒雷公苦或生嵩山色如肫腦鴈鶵採無時白符一名隨歧伯雷公酸無毒季氏小寒桐君甘無毒扁鵲辛或生少室天婁山或太山黒符一名石泥桐君甘無毒生洛西山空地凝水石本草經曰凝水石味辛寒生山谷治身􅀬腹中積聚邪氣煩滿飲之不飢生常山范子計然曰凝水石出河東色澤者善吴氏本草曰凝水石一名白水石一名寒水石神農辛歧伯毉和甘無毒扁鵲甘無毒季氏大寒或生邯鄲採無時如雲母也陽起石本草經曰陽起石一名白石味酸微温生山谷治崩中􅀘足内攣藏中血結氣寒􅀬腹痛漏下無子隂陽不合生齊地吴氏本草曰陽起石或作羊字神農扁鵲酸無毒桐君雷公歧伯無毒季氏小寒或生太山或陽起山採無時石鍾乳吴録地理志曰始安始陽有洞山山有穴如洞庭其中生石鍾乳唐書曰髙季輔爲太子右庻子上䟽切陳得失特賜鍾乳一劑曰卿進藥石之言故以藥石相報列仙傳曰卭䟽煑石髓而服之謂之石鍾乳水經曰大洪山巖嶂皆數百許仞入石門得穴穴上素崖壁立非人跡所及穴中多鍾乳凝膏下垂望􅀂氷雪微津細液滴􅄋不断幽穴潜逺行者不極又曰易水東經孔山山下有鍾乳穴穴出佳乳採者揭水尋沙入穴里許太山記曰山有鍾乳但不好耳湘川記曰湘東隂山縣有黄坑山出鍾乳長沙湘郷縣出鍾乳季秋入穴六七里乃得盛弘之荆州記曰天門郡出石鍾乳永嘉記曰安固縣東山石穴岀鍾乳東陽記曰北山崖有洞穴有人甞於此穴採鍾乳八十餘日粮盡而穴不窮劉道真錢塘記曰靈隱山北有穴旁入行數歩有清流水黄丈餘昔有人採鍾乳水際見異跡或云是}
