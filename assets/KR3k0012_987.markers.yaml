  - {type: 'tls:seg', offset: 3, content: '', id: KR3k0012_CHANT_987-1a.2}
  - {type: variant, offset: 3, length: 2, content: 芝下, SBCK: 寸採無時乆服通日月光青石英本草經曰青石英形如白石英青端赤後者是赤石英本草經曰赤石英形如白石英􅄱赤端故赤澤有光味苦􅀘心氣黄石英本草經曰黄石英形如白石英黄色如金在端者是黒石英本草經曰黒石英形如白石英黒澤有光石流黄後魏書曰恱盤國有火山山傍石皆燋鎔流數千里迺凝堅人取以爲藥即石流黄也淮南子曰夏至流黄澤}
