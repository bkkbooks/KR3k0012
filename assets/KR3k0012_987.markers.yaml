  - {type: variant, offset: 136, length: 2, content: 龍形, krp: 青煙常髙數尺夜視皆如燃燈光明髙尺餘暢所親視見也且彌人言是時氣不和皆徃保此山毒氣自㓕本草經曰石流黄味酸生谷中治婦人隂蝕疽痔能作金銀物生東海吴氏本草經曰流黄一}
