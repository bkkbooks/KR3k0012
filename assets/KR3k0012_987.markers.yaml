  - {type: 'tls:seg', offset: 2344, content: '', id: KR3k0012_CHANT_987-29a.4}
  - {type: variant, offset: 2345, length: 2, content: 死之, WYG: 足嘔逆隂濕胸鬲間久寒益氣其人久服者身輕健長年生華隂永嘉記曰安固老山出白石英吳氏本}
