  - {type: variant, offset: 2127, length: 396, content: 夏紫秋白冬黑十洲記曰祖州有養神丹芝似菰苗長三四尺人死以草覆之皆活服之長生秦始皇時大疫多有死者有鳥如烏衘此草以覆死人面燈時皆活始皇聞以問北郭鬼谷先生先生曰此不死草也生瓊田中又有鍾山仙家數十萬耕田種芝草嵩高山記曰嵩高山上有神芝人芝者狀似小兒地芝者辟方一尺如黃金色覆以五色雲有神龍守之食者可以遐年崔豹古今注曰元和二年芝生沛如人冠狀又如章武如人抱三子狀成帝建初五年芝生頴川常以六月中生一葉春青夏紫秋白冬黑十月復黃氣出上尺五寸博物志曰名山生神芝不死之草上芝為車馬形中芝為人形下芝為六畜形唐新語曰崔希嶠以孝友稱丁內憂哀毀過禮為鄭縣丞芝草生所居堂一宿而葩蓋盈尺杜寶大業拾遺錄曰七年六月東都永康門內會昌門東生芝草百二十莖散在地周十步許紫莖白頭或白莖黑頭或有枝或無枝亦有三枝如古出宇者地內根並如綿大相連著乾陽殿東東上閣前槐樹上生芝九莖共本相扶而生中莖最長兩邊八莖相次而短有如樓閣甚潔白武賁郎將段文操留守畫圖表奏, SBCK: 石脂}
