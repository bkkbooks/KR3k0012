  - {type: variant, offset: 2736, length: 1, content: 芝, WYG: 南山或海涯採無時赤符神農雷公甘黄帝扁鵲無毒李氏小寒或生少室或生太山色絳滑如脂黄符李氏小寒雷公苦或生嵩山色如㹠腦雁雛採無時白符一名隨岐伯雷公酸桐君甘無毒扁鵲辛或生少室天蔞山或太山黒符一名石泥桐君甘無毒生洛西山空地凝水石本草經曰凝水石味辛寒生山谷治身熱腹中積聚邪氣煩滿飲之不飢生常山范子計然曰凝水石出河東色澤者善吳氏本草曰凝水石一名白水石一名寒水石神農辛岐伯醫和甘無毒扁鵲甘無毒李氏大寒或生邯鄲採無時如雲母也陽起石本草經曰陽起石一名白石味酸㣲温生山谷治崩中漏下破子臟中血結氣寒熱膓痛漏下無子隂陽不合生齊地吳氏本草經曰陽起石或作羊出神農扁鵲酸無毒桐君雷公岐伯無毒李氏小寒生太山或陽起山採無時石鍾乳吳錄地理志曰始安始陽有洞山山有穴如洞庭其中生石鍾乳唐書曰高季輔為太子右庶子上疏切陳得失特賜鍾乳一劑曰卿進藥石之言故以藥石相報列仙傳曰卭疏煮石髓而服之謂之石鍾乳水經曰大紅山巖嶂皆數百許仞入石門得穴穴上素崖壁立非人迹所及穴中多鍾乳凝膏下垂望若氷雪㣲津細液滴瀝不斷幽穴潜逺行者不極又曰易水東經孔山山下有鍾乳穴穴出佳乳採者掲水尋沙入穴里許太山記曰山有鍾乳但不好耳湘川記曰湘東隂山有黄坑山出鍾乳長沙湘鄉縣出鍾乳季秋入穴六七里乃得盛宏之荆州記曰天門郡出石鍾乳永嘉記曰北山涯有洞穴有人嘗於此穴採鍾乳入十餘日粮盡而穴不窮周道真錢塘記曰盧隠山北有穴旁入行數步有清流水丈餘昔有人採鍾乳水際見異迹云是龍迹聞穴裏隆隆有聲便出不測所採近逺范子計然曰石鍾乳出武都黄白者善本草經曰石鍾乳一名留公乳味甘温生山谷明目益精治欬逆上氣安五臓通百節利九竅下乳汁生少室吳氏本草經曰鍾乳神農辛李氏大寒或生太山山谷隂處岸下聚溜汁所成如乳汁黄白色空中相通二月三月採隂乾孔公蘖本草經曰孔公蘖一名通石味辛温生山谷治食化氣利九竅下乳汁治惡瘡瘻疽生梁山吳氏本草經曰孔公蘖神農辛岐伯鹹扁鵲無毒色青黄礜石音預説文曰礜毒石也山海經曰臯塗之山有白石焉名曰礜可以毒鼠今礜石殺䑕蠶}
