  - {type: variant, offset: 139, length: 0, content: '', krp: 石流黄神農黄帝雷公鹹有毒醫和扁鵲無毒或生易陽或河西或五色黃是潘水石液也燒令有紫炎者八月九月採治婦人結隂能化金銀銅䥫石流黄本草經}
  - {type: variant, offset: 140, length: 4, content: 飛節芝大, krp: 石流黄青白色主益肝氣明目石流赤神仙傳曰許由巢父服箕山石流丹抱子曰石流丹}
