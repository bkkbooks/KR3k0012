  - {type: variant, offset: 2339, length: 1, content: 名, WYG: 平氏陽}
  - {type: variant, offset: 2341, length: 0, content: '', WYG: 縣紫石英特好其他者色淺紫石英舊出胡陽縣嶺表錄異曰隴州山中多紫石英其色淡紫其質瑩徹隨其大小皆五稜兩頭如箭鏃煮水飲之暖而無毒比北中白石英其力倍矣本草經曰紫石英味甘温}
  - {type: page-break, offset: 2341, content: '', id: KR3k0012_WYG_987-3b, image: WYG0901/WYG0901-0644b.png}
  - {type: variant, offset: 2342, length: 0, content: '', WYG: 太山谷中治腹嘔逆邪氣補不足女子風寒在子宮絶孕十年無子者久服温中輕身延年吳氏本草曰紫石英}
  - {type: variant, offset: 2343, length: 1, content: 芝, WYG: 農扁鵲甘氣平李氏大寒雷公大温岐伯甘無毒生太山或會稽採無時欲令如削紫色逹頭如樗頭者白石英本草經曰白石英味甘㣲温生山谷主治消渇隂痿}
