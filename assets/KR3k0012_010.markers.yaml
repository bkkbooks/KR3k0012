  - {type: variant, offset: 2798, length: 0, content: '', WYG: 已噞噞音宜臉反又曰黑蜧神虬潛泉而居將雨而躍蜧音麗鄒子曰朱買臣孜孜脩學不覺雨之流粟韓子曰荆人伐陳吳救之軍間三十里雨十日夜左史倚相謂子期曰雨十日甲輯兵聚吳人必至宜備之乃為陣未成而吳人至見荆有戒而反傅子曰昔者伯牙子遊於㤗山之隂逢暴雨止於巖下援琴而鼓之為淋雨之音更造崩山之曲每奏鍾期輒窮}
