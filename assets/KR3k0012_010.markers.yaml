  - {type: variant, offset: 4030, length: 770, content: 之時風不鳴條雨不破塊又曰林中多疾風富貴多諛言樂動聲儀曰風氣者禮樂之使萬物之首也物靡不以風成熟也風順則歲美風暴則歲惡國語曰海鳥曰爰居止於魯國東門之外臧文仲使國人祭之展禽曰今茲海島有災乎夫廣川鳥獸恒知避其災也是歲也海多大風又曰飄風之末不能舉鴻毛又曰火見而清風戒寒清風至而脩城郭物理論曰風者陰陽亂氣激發而起者也猶人之內氣因怒喜哀樂激越而發也故春氣溫其風溫以和喜風也夏氣盛其風熛以怒怒風也秋氣勁其風清以貞清風也冬氣石其風慘以烈固風也此四正之風也又有四維之風東北明庶庶物出幽入明也東南融風其道以長也西南清和百物備成也西北不周方潛藏也此八風者方土異氣徐疾不同和平則慎違逆則凶非有使之者也氣積自然怒則飛沙楊礫發屋拔樹喜則不搖枝動草順物布氣天地之性自然之體也楚宋玉風賦曰楚襄王遊於蘭臺之宮宋王景差侍有風颯然而王乃披襟而當之曰快哉此風寡人所與庶人共者耶宋玉對曰此獨大王之風耳庶人安得共之夫風生於地起於青蘋之末浸淫溪谷盛怒於土囊之口緣於太山之阿舞於松柏之下故其清涼雄風則飄忽升降乘凌高城入于深宮徘徊於桂椒之間翱翔於激水之上獵蕙草離秦衡概新夷披稊楊徜徉中庭北上玉堂躋于羅帷經于洞房故其風也清清泠泠愈病析酲發明耳目寧體便人此謂大王之雄風也夫庶人之風塕然起於窮巷之間堀堁揚塵勃鬱煩冤動沙塸吹死灰此謂庶人之雌風也楚辭曰光風轉蕙泛崇蘭又曰嫋嫋兮秋風洞庭波兮木葉下相風崔豹古今注曰司風鳥夏禹所作王子年拾遺記曰帝與娥皇汎於海上以桂枝為表結芳茅為旍刻玉為鳩置於表端言知四時之候今之相風此遺像也晉書曰廢帝初即位有野雉集于相風後為桓溫所廢沈約宋書輿服志曰案周禮辯載法物莫不詳究然無相風罼旄頭之屬此非古制明矣愚謂戰國並爭師旅數出縣為之設務察風祲疑是秦制矣梁書曰長沙王懿孫孝儼字希莊射策甲科除祕書郎太子舍人從幸華林園於坐獻相風烏華光殿景陽山等頌其文甚美帝深賞之晉令曰車駕出入相風已前侍, SBCK: ''}
