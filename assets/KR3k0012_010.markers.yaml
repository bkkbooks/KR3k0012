  - {type: variant, offset: 2850, length: 1, content: 下, WYG: 太公邑外而過六韜曰武王問散宜生卜伐紂吉乎曰不吉鑽龜龜不兆數蓍交加而折將行之日雨韜車至軫行之日幟折為三散宜生曰此卜四不祥不可舉事太公進曰是非子之所知也祖行之日韜車至軫是洗濯甲兵也師曠占曰候月知雨多少入月一日二日三日月色赤黄者其月少雨月色青者其月多雨常以五卯日候西北有雲如羣羊者即有雨至}
