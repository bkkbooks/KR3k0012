  - {type: variant, offset: 2521, length: 1, content: 還, SBCK: 於巖下援琴而鼔之爲淋雨之音更造崩山之曲毎奏鐘期輒窮其趣曰善哉子之聽也孔叢子曰子思荅懸子曰以子産仁愛譬夫子猶浸水之與膏雨夫浸所及則生不及則死民皆知焉膏􅀨之所生也廣莫大焉民之受賜也普矣莫識其由也吕氏春秋曰武王伐紂至鮪水使膠鬲候周師問武王曰西伯何時至曰將以甲子日至膠鬲行矣大􅀨日夜不休武王疾行不輟軍吏諌武王曰吾疾行以救膠鬲之死也楊子法言曰震風凌􅀨然後知夏屋之帡幪震􅀨凌暴也夏大也帡彰懞覆廣雅曰􅀨師謂之屏翳纂要曰疾雨曰驟雨徐雨曰零雨雨乆曰苦雨亦曰愁霖雨晴曰啓􅀨水曰潦雨雲曰渰雲亦曰油雲戰國䇿曰文侯與虞人期獵是日天􅀨文侯將出左右諌止曰吾與虞人期不可失乃徃魏於是始強易林變占曰雷君出裝隱隱西行霖雨不止流爲江河周易集林雜占曰占天雨否外卦得隂爲雨得陽不雨其爻發變得坎爲雨得离不􅀨巽}
