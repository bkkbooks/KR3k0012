  - {type: variant, offset: 2794, length: 2, content: 北溟, WYG: 無雲而雨是謂雨血將軍當揚兵講武以應之雨軍中尤甚者將軍戰必無功也管子曰冬作土功發地藏則夏多暴雨秋霖不止又曰春秋察五政一曰論㓜孤赦}
  - {type: page-break, offset: 2794, content: '', id: KR3k0012_WYG_010-11a, image: WYG0893/WYG0893-0117c.png}
  - {type: variant, offset: 2797, length: 0, content: '', WYG: 罪二曰賦爵列授祿位三曰脩溝洫復亡人四曰治封疆正阡陌五曰無殺麑卵無絶華萼五政狥時春雨乃來淮南子曰失火遇雨禍中有福又曰人莫鑑於沫雨而鑑於止水者以其浄也沫雨雨潦上沫起覆蓋也言其濁擾不見人形也又曰朱鼈浮於水上必大雨又曰天且雨也}
  - {type: page-break, offset: 2797, content: '', id: KR3k0012_WYG_010-11b, image: WYG0893/WYG0893-0117d.png}
