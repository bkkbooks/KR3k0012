  - {type: variant, offset: 2801, length: 1, content: 鯤, WYG: 善哉子之聽也孔叢子曰子思答縣子曰以子産仁愛譬夫子猶浸水之與膏雨夫浸所及則生不及則死民皆知焉膏雨之所生也廣莫大焉民之受賜也普矣莫識其由也吕氏春秋曰武王伐紂至渭水紂使膠鬲候周師問武王曰西伯何時至曰將以甲子日至膠鬲行矣大雨日夜不休武王疾行不輟軍吏諫武王曰吾疾行以救膠鬲之死也揚子法言曰震風凌雨然後知夏屋之帡幪震疾凌暴也夏大也帡障也幪覆也廣雅曰雨師謂之屏翳纂要曰疾雨曰驟雨徐雨曰零雨久雨曰苦雨亦曰愁霖雨晴曰霽雨水曰潦雨雲曰渰雲亦曰油雲戰國策曰文侯與虞人期獵是日大雨文侯將出左右諫曰吾與虞人期獵不可失也乃往魏于是始强易林變占曰雷公出裝隠隠西行霖雨不止流為江河周易集林雜占曰占天雨否外卦得隂為雨得陽不雨其爻發變得坎為雨得離不雨坎}
