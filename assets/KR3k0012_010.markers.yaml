  - {type: variant, offset: 2523, length: 2, content: 為石, SBCK: 爲巽先􅀨後風􅀶物志曰太公爲灌壇令武王夢婦人當道夜哭問之曰吾是東海神女嫁於西海神童今爲灌壇令當道廢我行我行必有大風疾雨大風疾雨是毀君之德也武王覺召太公問之果有疾雨暴風在太公邑外而過六韜曰文王問散冝生卜伐紂吉乎曰不吉鑚􅀛􅀛不兆數􅆱}
  - {type: variant, offset: 2523, length: 2, content: 為石, krp: 爲巽先雨後風博物志曰太公爲灌壇令武王夢婦人當道夜哭問之曰吾是東海神女嫁於西海神童今爲灌壇令當道廢我行我行必有大風疾雨大風疾雨是毀君之德也武王覺召太公問之果有疾雨暴風在太公邑外而過六韜曰文王問散冝生卜伐紂吉乎曰不吉鑚龜龜不兆數蓍}
