  - {type: variant, offset: 1727, length: 119, content: 得與數十騎遁去又曰蚩尤氏能徵風召雨黃帝爭強滅之中冀又曰庶女者齊之寡婦養姑姑女利母財而殺母以告寡婦婦不能自解以冤告吳而大風襲於齊殿又曰荊軻入秦燕太子丹送別易水上歌曰風蕭蕭兮易水寒壯士一去兮不復還漢書曰燕王都薊大風拔宮中樹七圍已上十六枚壞城樓, SBCK: 令記其時日}
