  - {type: variant, offset: 4801, length: 384, content: 史令史淮南子曰故終身隸於入譬若綄之見風也綄音緩候風者也世所謂五雨述征記曰長安宮南靈臺上有相風銅烏或云此烏遇千里風乃動鄭玄相風賦曰昔之造相風者其知自然之極乎其達變通之理乎上稽天道陽精之運表以靈烏物象其類下憑地體安貞之德鎮以金虎玄成其氣風雲之應龍虎是從觀妙之徵神明所通夫能立成器以占吉凶之先見者莫精乎此乃構相風因象設形蜿盤虎以為趾建脩竿之亭亭體正直而無撓度徑挺而不傾摟神烏於竿首候祥風之來征張華相風賦曰太史候部有相風在西城上而作者弗為豈以其託處幽閑違眾特立無羽毛之飾而丹漆不為之容乎傅咸相風賦曰相風之賦蓋亦眾矣然辭義大同唯中書張令以太史相風獨無文飾故特賦之太僕寺丞武君賓樹一竹於前庭其上頗有樞機插以雞毛于以占事知來與彼無異斯乃簡易之至有殊太史相風張氏之賦非其至者也翟翟竹竿在武之庭厥用自然既脩且貞插羽其首丹漆弗營經之營之不日而成庾闡楊都賦曰雲虎之門雙竿內啟祥烏司飆丹墀竟陛, SBCK: 覽卷第十}
