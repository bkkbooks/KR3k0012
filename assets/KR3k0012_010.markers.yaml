  - {type: variant, offset: 3112, length: 868, content: 曰鳥鵲識歲之多風去喬木而巢扶枝扶傍又曰禹沐淫雨櫛扶風扶風奔風又曰騰虵雄鳴上風雌鳴下風而化成形又曰虎嘯而谷風至高誘注曰虎陽獸也與風同類又曰人主之精通于天故誅暴則多飄風抱朴子曰用兵之要惟風為急扶搖獨鹿之風大起軍中軍中必有反者風高者道遠風下者道近風不鳴葉者十里鳴條搖枝百里大枝五百里仆大木千里折大木五千里三日三夕天下盡風二日二夕天下半風一日一夕萬里風周生列子曰夫獵葉之風不應八節呂氏春秋曰何謂八風東北曰焱風一曰融風東方滔風一曰庶風東南曰薰風一曰清明淮南子作景風南方曰巨風一曰凱風西南曰淒風淮南子作涼風西方曰颼風一曰閶闔西北方曰厲風一曰不周風風俗通曰風或清明來久長不搖樹木枝葉離地三二丈者此有龍德在其下風或清明不及二三尺者此君子之風也又曰猛風曰颲列音涼風曰瀏劉音微風曰颼搜音小風從孔來曰䫼呼穴反周書時訓曰小暑之日溫風至立秋之日涼風至又曰小暑之日溫風不至國無寬教淮南萬畢術曰欲致疾風焚雞羽帝王世紀曰堯時廚中自生肉脯薄如翣搖則生風使食物寒而不臭名曰翣脯又曰舜彈五絃琴歌南風曰南風之薰兮可以解吾人之慍兮括地圖曰鍾山之神名曰燭龍視為晝眠為夜吹為冬吁為夏息為風又曰奇肱民能為飛車從風遠行湯時西風吹奇肱車至於豫州湯破其車不以示民十年西風至乃復作車遣賜之去玉門四萬里黃帝風經曰調長祥和天之喜風也折揚奔厲天之怒風也山海經曰法獄之山有獸其名曰山𤟤音輝其行如風言疾見則天下大風又曰大荒之中有山名曰鞠陵有人名曰折丹神人處東極以出入風又曰扶陽之山多怪風又曰大極山東有溫水湯風不可過也河圖帝通紀曰風者天地之使六韜曰人主好田獵罼弋則歲多大風禾穀不實紂時如此陸機要覽曰列子御風常以立春歸于八荒立秋遊乎風穴是風至草木皆生去則搖落謂之離合風潛夫論曰排翣障風揲沙擁河無禦也又曰黃帝夢大風吹天下塵土得風后以為相漢武帝秋風辭曰秋風起兮白雲飛草木搖落兮雁南歸汎樓船兮濟汾河橫中流兮楊素波龍魚河圖曰風者天之使也荊山圖曰佷山縣山下有石床傍生野薤人往乞者神許則風吹制其分齊隨偃而翦不得過越廣雅曰風伯謂之飛廉法訓曰利物誘人猶飄風之加庶草也唯有直慎者然後不回潛潭巴曰疾風拔木讒臣恣忠臣辱崔豹古今注, SBCK: ''}
