  - {type: variant, offset: 2730, length: 273, content: 舒曰太平之世風不搖條開甲破萌而已老子曰飄風不終朝莊子曰列子御風而行泠然經旬五日而後返司馬彪注曰列子鄭人列禦寇也御迎也冷然涼貌又曰北溟有魚其名曰鯤化而為鳥其名曰鵬摶扶搖而上者九萬里司馬彪云扶搖上行風也風之積也不厚則其負大翼也無力故九萬里則風在下矣又曰大塊噫依界反氣其名曰風是惟無作作則萬竅怒號而獨不聞之翏翏乎長風之聲又曰湯之問棘也窮髮之北有冥海者天池也有魚焉其廣數千里其名為鯤有鳥焉其名為鵬背若太山翼若垂天之雲摶扶搖羊角而上者九萬里扶搖羊角風也今旋風上如羖羊角也列子曰列子師老啇氏友伯高子進二子之道乘風而歸莊子曰列子御風而行泠然至旬有五日而後反管子, SBCK: ''}
