  - {type: variant, offset: 1979, length: 166, content: 虵出被中後果及禍晉陽秋曰袁宏為東郡守謝安執宏手授扇宏曰謹當奉揚仁風慰彼黎庶宋書曰明帝猜慮肥體憎風夏月常著小皮衣拜左右二人為司風令史風起方面輒先啟聞又曰宗愨字元幹徵士炳兄子也少時問愨所志荅曰願乘長風破萬里浪前秦錄曰術士蓋欽苻堅召至長安因讌會以其惑眾將誅之酒酣將執欽欽化為旋風飛去前涼錄曰永嘉五年抱罕令嚴羌妾產一龍一鷲鷲尋飛去龍十五日雷, SBCK: ''}
