  - {type: variant, offset: 2526, length: 2, content: 州記, SBCK: 加而折將行之日雨輜車至軫行之日幟折爲三散冝生曰此􅁲四不祥不可舉事太公進曰是非子之所知也祖行之日輜車至軫是洗濯甲兵也師曠占曰候月知雨多少入月一日二日三日月色赤黃者其月少雨月色青者其月多雨常以五夘日候西北有雲如羣羊者即有雨至矣冬戊巳春辰巳日雨蝗蟲食禾稼立春日雨傷五木立秋日雨害五榖常以戊巳日日入時出時欲雨日上有冠雲大者即雨小者少雨天文要集曰北斗之旁有氣徃徃而黒􅃺似禽獸大如皮席不出三日必雨又曰河有雲黒狀似􅂳􅀂一疋布維河不出十日大雨又曰辰口守心有水災一日大雨不可當又曰北斗者不欲雲覆之黒雲覆之大雨范子計然}
