  - {type: variant, offset: 1698, length: 7, content: 項王國漢王三匝, SBCK: 􅁗始皇時置酒而天雨陛䙉者沾寒優旃見而哀謂之曰汝欲休乎陛䙉者曰幸優旃曰我即行呼汝疾應曰諾居有頃殿上上夀呼万􅀊旃大呼曰陛楯郎曰諾優旃曰汝雖長何益幸雨立我短幸休居}
  - {type: variant, offset: 1698, length: 7, content: 項王國漢王三匝, WYG: 秦始皇時置酒而天雨陛楯者沾寒優旃見而哀之謂之曰汝欲休乎陛楯者曰幸甚優旃曰我即行呼汝疾應曰諾居有頃殿上上夀呼萬嵗旃臨檻大呼曰陛楯郎郎曰諾優旃曰汝雖長何益徒雨立我雖短幸休居}
  - {type: variant, offset: 1698, length: 7, content: 項王國漢王三匝, krp: 秦始皇時置酒而天雨陛䙉者沾寒優旃見而哀謂之曰汝欲休乎陛䙉者曰幸優旃曰我即行呼汝疾應曰諾居有頃殿上上夀呼万歲旃大呼曰陛楯郎曰諾優旃曰汝雖長何益幸雨立我短幸休居}
  - {type: punctuation, offset: 1705, content: ，, id: KR3k0012_CHANT_010-bkkpn581}
  - {type: 'tls:seg', offset: 1705, content: '', id: KR3k0012_CHANT_010-22a.6}
  - {type: variant, offset: 1707, length: 0, content: '', SBCK: 使得半相代又曰夫子當行命第子持雨具旣而果雨曰昨夜月不􅀫畢故知之范曄後漢書曰髙鳯字文通家貧好學不休其家曝麥令鳯守雞以竿授其手中鳯執竿讀書雨大至鳯讀書不覺執竽如故其妻還麥流甚以爲怒鳯亦不愧後漢書曰郭林宗甞於陳梁間行遇雨巾一角蟄時人乃故折角以爲林宗巾其見慕如此謝承後漢書曰百里嵩字景山爲徐州刺史境旱嵩岀巡遽甘雨輒澍東海祝其合郷等三縣父老訴曰人等是公百姓獨不迃降廻赴雨隨車而下東觀漢記曰王郎起光武自薊東南馳及至南宫遇大風雨而引車入道傍舎馮異抱薪鄧禹􅅡火光武對竈燎衣又曰順帝陽嘉元年立順烈皇后是時自冬至春不􅀨尊后之日嘉澍沾渥又曰沛獻王輔善京氏易永平五年京師少􅀨上御雲臺自卦以周易林占之其繇曰蟻封穴户太雨時至上以問輔輔上書曰蹇艮下爲山坎上爲水山雲爲蟻穴居知雨將至故以蟻爲興漢書名臣奏曰天隂雨人之病爲之先動是隂相應而起也天將隂雨又使人睡卧者隂氣也魏志曰曹眞伐蜀從子午道南入諸軍或從斜谷道㑹大霖􅀨四十餘日棧道断絶詔眞還又曰太祖在長安使曹仁討関羽於樊秋大霖雨漢水溢平地水數丈六軍皆没􅀳書曰詔以王雅爲太子少傅將拜遇雨請以繖入王珣不許因冒􅀨而拜又曰樊英隱於壷山甞有暴}
  - {type: page-break, offset: 1707, content: '', id: KR3k0012_SBCK_010-4a}
  - {type: page-break, offset: 1707, content: '', id: KR3k0012_SBCK_010-4b}
  - {type: variant, offset: 1707, length: 0, content: '', WYG: 始皇使陛楯者得半相代又夫子嘗行命弟子持雨具旣而果雨曰昨暮月不宿畢乎范蔚宗後漢書曰髙鳳字文通家貧好學不休其家曝麥令鳳守雞以竿授其手中鳳執竿讀書雨大至鳳讀書不覺執竿如故其妻還麥流甚以爲怒鳳亦不愧後漢書曰郭林宗嘗于陳梁間行遇雨巾一角墊時人乃故折角以爲林宗巾其見慕如此謝承後漢書曰百里嵩字景山爲徐州刺史境旱嵩出巡逰甘雨輒㴻東海祝其合鄉等三縣父老訴曰某等是公百姓獨不䧏乎迨赴雨隨車而下東觀漢記曰王郎追光武自薊東南馳及至南宫遇大風雨乃引車入道傍舎馮異抱薪鄧禹爇火光武對竈燎衣又順帝陽嘉元年立順帝烈皇后是時自冬至春不雨立后之日嘉㴻沾渥又沛獻王輔善京氏易永平五年京師少雨上御靈臺自為卦以周易林卜之其繇曰蟻封穴戸大雨時至上以問輔輔上書曰蹇艮下爲山坎上爲水山出雲為雨蟻穴居知雨將至故以雨為興居漢書名臣奏曰天隂雨人之病爲之先動是隂相應而起也天將隂雨又使人睡卧者隂氣也魏志曰曹真伐蜀從子午道司馬宣王泝漢水當㑹南鄭入諸軍或從斜谷道或從武威入㑹大霖雨三十餘日棧道絶斷詔真還又太祖在長安使曹仁攻雲長于樊城秋大霖雨漢水溢平地水數丈于禁七軍皆没晉書曰詔以王雅爲太子少傅將拜遇雨請以繖入王珣不許因冐雨拜後漢書曰樊英隱壺山有暴}
