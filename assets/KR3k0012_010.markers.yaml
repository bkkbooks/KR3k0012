  - {type: variant, offset: 2517, length: 206, content: 則飛雨止還化為石交州記曰風山在九真郡風門在山頂上常長風又曰風母出九德縣風母似猿見人若慚而屈頭若打殺之得風還活南越志曰熙安間多颶音具風颶者具四方之風也一曰懼風言怖懼也常以六七月興未至時三日雞犬為之不鳴大者或至七日小者一二日外國以為黑風盛弘之荊州記曰宜都佷山縣山有風穴張口大數尺名曰風井夏則風出冬則風入風出之時吹拂左右常凈如掃暑月經之凜然有衣裘想宜都山記曰元山松以六月至此穴便思衣裘又曰沮楊縣黃竹山常肅肅有風名曰風門, WYG: ''}
