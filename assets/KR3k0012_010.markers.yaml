  - {type: variant, offset: 2518, length: 1, content: 飛, SBCK: 滴瀝雨也又曰香雲成香雨帝王世紀曰黃帝遊洛水上見大魚殺五牲以醮天乃甚雨七日七夜魚流始得圖書今河圖是也家語曰孔子將行遇雨不假蓋於子夏護其短也又曰齊有一足之鳥集於殿前舒翅而跳齊侯異之使聘魯訪諸孔子曰此鳥名曰啇羊昔童児有屈一脚振訊兩臂而跳且謡曰天將大雨啇羊鼔舞今齊有之其應至矣急告趣治溝渠脩隄防將有大雨水爲災果大霖雨水溢泛諸國傷害人民唯齊有備不敗景公曰聖人之言信而有徵矣老子曰暴雨不終日莊子曰宋景公時大旱三年卜云以人祀乃雨公下堂頓首曰吾所求雨者爲人今殺人不可將自當之言未卒天大雨方千里又曰堯讓天下於許由許由曰日月出矣而爝火不息時雨降矣而猶浸灌不亦勞乎文子曰􅀂與俗處猶走逃雨也無之而不濡列子曰赤松子神農時雨師也廣成子曰黄帝時雲不待族而雨尸子曰神農理天下欲雨則五日爲行雨旬爲谷雨旬五日爲時雨萬物咸利故謂之神雨孟子曰油然作雲霈然下􅀨抱朴子曰軍始發大風甚􅀨起於後大勝之徴也軍始出雨沾衣者是謂潤兵軍有功雨不足沾衣裳是謂泣軍必敗又曰無雲而雨是謂􅀨血將軍當楊兵講武以應之雨軍中尤甚者將軍戰必無功也管子曰冬作土功發地藏則夏多暴雨秋霖不止又曰春發五政一曰論㓜􅀌赦有罪二曰賦爵列授禄位三曰脩溝洫復亡人四曰治封壃正阡陌五曰無殺麑􅆑無絶華萼五政徇時春雨乃來淮南子曰失火遇􅀨禍中有福又曰人莫鑑於沬雨而鑑於止水者以其淨也沫􅀨􅀨潦上沫起覆孟也言其濁擾不見人形也又曰朱鼈浮於水上必大􅀨又曰天且雨也魚巳噞噞音冝撿反又曰黒蜧神虬潜泉而居將雨則躍蜧音麗鄒子曰朱買臣孜孜脩學不覺雨之流粟韓子曰荆人伐陳呉救之軍間三十里雨十日夜左史􅀝相謂子期曰􅀨十日甲輯兵聚吴人必至不如備之乃爲陣未成而呉人至見荆有戒而反傳子曰昔者伯牙子遊於泰山之隂逢暴}
