  - {type: variant, offset: 2746, length: 0, content: '', WYG: 又董仲舒曰隂陽二氣之初蒸也若有若無若實若虛團攢聚合其體稍重乘虛而墜風多則合速故雨大而踈風少則合遲故雨細而宻湘州記曰零陵山有石燕遇風雨則飛止還爲石王采安城記曰萍鄉西城津有玉女岡天當雨輒先涌五色雲於石間俗謂玉女披衣搜神記曰武王伐紂至河上雨甚疾雷晦㝠揚波于河衆甚懼武王曰余在天下誰敢干志者風波立霽述異記曰廬山有康王谷北嶺上有一城號劉城天毎有雨輒聞山上有鼓角笳簫之聲村人常以爲候武昌記曰武昌東南有金牛岡西有石鼓山上有三石鼔石鼔鳴天必雨羅浮山記曰山有龜淵淵有神龜龜鼻貫銅鐶若有人穢此淵即注雨周處風土記曰榆莢雨春雨黄雀風濯枝雨六月之風雨也又六月有大雨名濯枝雨荆楚歲時記曰六月必有三時雨田家以爲甘澤邑里相賀曰賀嘉雨王子年拾遺記曰甘雨濛濛似露委草木則滴瀝雨也又香雲成香雨帝王世紀曰黄帝逰洛水上見大魚殺五牲以醮天乃甚雨七日七夜魚流始得圖書今河圖是也孔子家語曰將行遇雨不假蓋於子夏䕶其短也又齊有一足之鳥集于殿前舒翅而跳齊侯異之使聘魯訪於孔子曰此鳥名曰商羊昔童兒有屈一脚振兩臂而跳且謡曰天将大雨商羊鼓舞今齊有之其應至矣急告民趣治溝渠修隄防將有大雨水爲灾果有霖雨水溢汎諸國傷害人民唯齊有備不敗景公曰聖人之言信而有徴矣}
