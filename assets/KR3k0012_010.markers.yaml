  - {type: variant, offset: 1394, length: 233, content: 挫止其鋒芒收之使成實四十五日景風至景風強也強以成之夏至之候也強言萬物強盛也四十五日涼風至涼風者寒以閉也立秋之候也閉收也言陰寒收成萬物也四十五日閶闔風至閶闔者當寒天收也秋分之候也閶闔盛也時盛收物蓋藏之閶或為當四十五日不周風至不周者不交也陰陽未合化也立冬候也未合化言消息純坤無陽也月令曰天地不通而閉塞成冬也四十五日廣莫風至廣莫者精大滿也冬至之候也言冬物無者風精大滿美無偏風之為言萌也其立字蟲動於几中者為風蟲動於几言陽氣無不周也明昆蟲之屬得陽乃生遇陰則死故風為陰中之陽者也, SBCK: 水爲雨}
