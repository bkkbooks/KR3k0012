  - {type: variant, offset: 2757, length: 0, content: '', WYG: 宋景公時大旱三年卜云以人祀乃雨公下堂頓首曰吾所求雨者爲人今殺人不可將自當之言未卒天大雨方千里又堯讓天下於許由由曰日月出矣而爝火不息其于光也不亦難乎時雨降矣而猶浸灌其于澤也不亦勞乎文子曰若與俗處猶走逃雨也無之而不濡}
  - {type: variant, offset: 2759, length: 2, content: 御風, WYG: 曰赤松子神農時雨師也廣成子曰黄帝時雲不待族}
