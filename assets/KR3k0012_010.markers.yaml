  - {type: variant, offset: 2541, length: 0, content: '', SBCK: 隂陽交通萬物成矣劉義慶世說曰謝太􅀓無嗔喜曽送兄征西葬還日暮雨馭人皆醉不可處分公乃於車中手取車柱撞馭人聲色甚怒劉義慶幽明録曰河南人趙良與其郷人諸生之長安至新安界遇霖雨糧乏相謂曰飢郍得羙食邪應時羮飯備具有人聲語云進踈食黄子發相雨書曰}
