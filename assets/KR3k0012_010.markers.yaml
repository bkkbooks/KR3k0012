  - {type: variant, offset: 2517, length: 0, content: '', SBCK: 即飛止還爲石王采安成記曰萍郷西津名玉女崗天當􅀨輙先涌五色氣於石間俗謂玉女披衣搜神記曰武王伐紂至河上雨甚疾雷晦􅁳揚波於河衆甚懼武王曰余在天下誰敢干余者風波立濟􅄒異記曰廬山有康王谷北嶺上有一城號劉城天每有雨輒聞山上有鼔角笳簫之聲村人以爲常􅃸武昌記曰武昌城東南有金牛崗西有石鼔山上有三石鼔石鼔鳴天必雨羅浮山記曰山有􅀛淵淵有神􅀛􅀛鼻貫銅鐶若有人􅁾此淵即注雨周處風土記曰榆莢雨春雨黃雀風濯梅雨六月之風雨也又曰六月有大雨名濯枝雨荆楚􅀊時記曰六月必有三時雨田家以爲甘澤邑里相賀曰嘉雨王子年拾遺記曰甘雨濛濛似露委草木}
