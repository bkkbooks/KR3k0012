  - {type: variant, offset: 1272, length: 965, content: 年贈后謚為恭皇后及中宗崩將葬于定陵追謚后為和思莫知瘞所以皇后禕衣於陵所寢宮招魂置衣於魂轝以太牢告祭遷衣於寢宮舒於御榻之右覆以夷衾而祔葬焉中宗廢韋皇后唐書曰中宗韋庶人京兆萬年人也中宗為太子時納后為妃仍擢后父玄貞為豫州刺史嗣聖元年立為皇后其年中宗見廢后隨從房州時中宗懼不自安每聞制使至惶恐欲自殺后勸王曰禍福倚伏何常之有豈失一死何遽如是也累年同艱危情義甚篤所生懿德太子永泰永壽長寧安樂四公主安樂最幼生於房州帝自脫衣裹之遂名曰裹兒特寵異焉及中宗復立為太子又立后為妃中興初復立為皇后帝在房州時常謂后曰一朝見天日誓不相禁忌及得志乃受上官昭容邪說引武三思入宮中升御床與后雙陸帝為點籌以為歡笑醜聲日聞于外景龍四年六月帝遇毒暴崩后懼秘不發喪及臨淄王勒兵入內后惶駭遁入殿前飛騎營及武延秀安樂公主皆為亂兵所殺追貶為庶人上官昭容唐書曰中宗上官昭容名婉兒西臺侍郎儀之孫也父庭芝與儀同被誅婉兒時在襁褓隨配入掖庭及長有文詞明習吏事則天時婉兒忤旨當誅則天惜其才不殺但黥其面而已自聖曆已後百司表奏多令參決中宗即位又令專掌制命深被信任尋拜為昭容婉兒既與武三思淫亂每下制勑多因事推尊武氏而排抑皇家節愍太子深惡之及舉兵至肅章門扣閤索婉兒婉兒大言曰觀其此意即當次索皇后以及大家帝與后遂激怒并將婉兒登玄武門樓以避兵鋒俄而事定婉兒常勸帝廣置昭文學士盛引當朝詞學之臣數賜遊宴賦詩唱和婉兒每代帝及后長寧安樂二公主數首並作辭甚綺麗時人咸諷誦之婉兒俄又通於吏部侍郎崔湜引知政事湜嘗充使開商山新路功未半而中宗崩婉兒草遺制曲敘其功而加襃賞及韋庶人敗婉兒亦斬於旗下睿宗劉皇后唐書曰睿宗肅明順聖皇后劉氏父延景陜州刺史儀鳳中睿宗居藩納后為孺人尋立為妃生寧王憲壽昌代國二公主睿宗即位冊為皇后及降為皇嗣后從降為妃長壽中與昭成皇后同被譴為則天所殺景雲元年追謚肅明皇后招魂葬於東都城南陵曰惠陵睿宗竇皇后唐書曰睿宗昭成順聖皇后竇氏父孝諶潤州刺史后姿容婉順動循禮則睿宗為相王時為孺人甚見禮異光宅元年立為德妃生玄宗及金仙玉真二公主長壽二年為戶婢團兒誣讚與肅明皇后厭蠱呪詛正月二日朝則天皇后於嘉豫殿既退而同時遇害梓宮秘密莫知所在睿宗即位謚曰昭成皇后招魂葬於都城之南陵曰靖陵玄宗廢王皇后唐書曰玄宗廢后王氏同州下邳人梁冀州刺史神念之後上為臨淄王時納后為妃上將起事頗預密謀贊成大業先天元年立為皇后以父仁皎為太僕卿后兄, SBCK: 兇淑媛留}
