  - {type: variant, offset: 1391, length: 0, content: '', WYG: 統業夫人助理國政甚有補益建安四年臨薨引見張昭等囑以後事孫權步后吳志曰吳主權步夫人臨淮淮隂人也以美麗得幸於權寵冠後宫夫人性不妬嫉多所推進故乆見愛權為王及帝意欲以為后羣臣議在徐氏權依違者十餘年然宫内皆稱皇后親戚上䟽稱}
