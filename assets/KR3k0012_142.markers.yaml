  - {type: page-break, offset: 1514, content: '', id: KR3k0012_WYG_142-8b, image: WYG0894/WYG0894-0314d.png}
  - {type: variant, offset: 1515, length: 0, content: '', WYG: 聰曰父終子紹古今之大典太弟何為者哉陛下百年後粲兄弟必無種也願陛下深思之聰亦信之曰然吾當為計}
