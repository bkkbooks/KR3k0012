  - {type: variant, offset: 2496, length: 2374, content: 戶妃早孤養於叔父玄璬開元初武惠妃特承寵遇故王皇后廢黜二十四年惠妃薨帝哀悼久之後庭數千無可意者或奏玄琰女姿色冠代宜蒙召見時妃衣道士服號曰太真既進見玄宗大悅不朞歲恩禮如惠妃太真姿質豐艷善歌舞通音律智筭過人每倩盻承迎動移上意宮中呼為娘子禮數實同皇后有姊三人皆有才貌玄宗並封國夫人天寶中安祿山大立邊功上深寵之祿山來朝帝令貴妃姊妹與祿山結為兄弟祿山母事妃每宴賜錫齎稠沓及祿山叛露檄數國忠之罪河北盜起玄宗以皇太子為天下兵馬元帥監撫軍國事國忠大懼諸楊聚哭貴妃衘土陳請帝遂不行內禪及潼關失守從幸至馬嵬禁軍大將陳玄禮密啟太子誅國忠父子既而六軍不散玄宗遣力士宣問對曰賊本尚在蓋指貴妃也力士復奏帝不獲已與妃決遂縊死於佛室時年三十八瘞於驛西道側玄宗楊皇后唐書曰玄宗元獻皇后楊氏弘農華陰人后景雲元年八月選入太子宮時太平公主用事尤忌東宮宮中左右持兩端而潛附太平者必陰伺察事雖纖芥皆聞於上太子心不自安后時方娠太子密謂侍讀張說曰用事者不欲吾多息恐禍及此婦人其如之何密令說懷去胎藥而入太子於曲室躬自煮藥醺然似寐夢神人覆鼎既寤如夢如是者三太子異之告說說曰天命也無宜他慮既而太平誅后果生肅宗皇帝太子妃王氏無子后班在下后不敢母肅宗王妃撫鞠慈甚所生開元中肅宗為忠王后為妃又生寧親公主張說以舊恩特承寵異說亦奇忠王儀表心知運曆所鍾故寧親公主降說子垍開元十七年后薨葬細柳原肅宗張皇后唐書曰肅宗張皇后本南陽西鄂人後徙家昭應祖母竇氏玄宗母昭成皇太后之妹也昭成為天后所殺玄宗幼失所恃為竇姨鞠養景雲中封鄧國夫人父去逸天寶中選入太子宮為良娣后辯惠豐碩巧中上旨祿山之亂玄宗幸蜀太子與良娣俱從車駕渡渭百姓遮道請留太子收復長安肅宗姓仁孝以上皇播越不欲違離左右官者李靖忠啟太子請留良娣贊成之白於玄宗太子如靈武時賊已陷京師從官單寡道路多虞每太子次舍宿止良娣必居其前太子曰捍禦非婦人之事何以居前良娣曰今大家跋履險難兵衛非多恐有倉卒妾自當之大家可由後而出庶幾無患及至靈武產子三日起縫戰士衣太子勞之曰產忌作勞安可容易后曰此非妾自養之時須辦大家事肅宗即位冊為淑妃贈父去逸左僕射母竇氏封義章縣主乾元元年冊為皇后肅宗崩太子監國遂移后於別殿幽宮崩肅宗吳皇后唐書曰肅宗章敬皇后吳氏濮陽人后父坐事沒入掖庭開元二十二年玄宗幸忠王邸見王服御蕭然傍無媵侍命將軍高力士選掖庭宮人賜之而吳后在籍中容止端麗性多謙抑寵遇益隆明年生代宗皇帝二十八年薨葬於春明門外代宗即位群臣以肅宗山陵有期准禮以先太后祔代宗沈皇后唐書曰代宗睿真皇后沈氏吳興人世為冠族父易直秘書監開元末以良家子選入東宮賜太子生男廣平王天寶元年生德宗皇帝祿山之亂玄宗幸蜀諸王妃主從幸不及者多陷於賊后被拘於東都掖庭及代宗破賊收東都見之留后於宮中方經略北征未暇迎歸長安俄而史思明再陷河洛及朝義敗復收東都失后所在莫測存亡代宗遣使求訪十餘年寂無所聞德宗即位下詔遙尊為皇太后代宗獨孤皇后唐書曰代宗貞懿皇后獨孤氏父頴左威衛錄事參軍后以美麗入宮嬖幸專房故長秋虛位諸姬罕所進御后始冊為貴妃生韓王迥華陽公主大曆十年五月薨追謚曰貞懿皇后於殯於內殿累年不忍出宮十三年十月方葬命宰臣常袞為哀冊德宗王皇后唐書曰德宗昭德皇后王氏父遇官至秘書監德宗為魯王時納后為嬪上元二年生順宗皇帝特承寵異德宗即位冊為淑妃貞元二年妃病十一月甲午冊為皇后是日崩於兩儀殿韋賢妃唐書曰德宗韋賢妃不知氏族所出初為良娣貞元二年冊為賢妃性敏惠言無茍容動必由禮德宗深重之六宮師其德行及德宗崩請於崇陵終喪紀因侍於寢園元和四年薨順宗王皇后唐書曰順宗莊憲皇后王氏瑯琊人父顏衛尉卿后幼以良家子選入宮為才人順宗在蕃時代宗以才人賜之時年十三大曆十三年生憲宗皇帝立為宣王孺人順宗升儲冊為良娣后言容恭謹宮中稱其德行順宗即位疾恙未平后供侍毉藥不離左右屬帝不能言冊禮將行復止及永貞內禪冊為太上皇后中和元年正月順宗晏駕五月尊太上皇后為皇太后冊禮畢憲宗御紫宸宣赦太后居興慶宮后性仁和恭遜深抑外戚無絲毫假貸訓厲內職有母儀之風焉元和十一年三月崩於咸寧殿謚曰莊憲憲宗郭皇后唐書曰憲宗懿安皇后郭氏尚父子儀之孫駙馬都尉曖之女母代宗長女昇平公主憲宗為廣陵王時納后為妃以母貴父祖有大勳於王室順宗深寵異之貞元十一年生穆宗皇帝元和元年冊為貴妃時帝後庭多私愛以后門族華盛慮正位之後不容嬖幸以是冊拜後時穆宗嗣位冊為皇太后敬宗即位尊為太皇太后宣宗繼統即后之諸子也恩禮愈異於前朝大中年崩於興慶宮謚曰懿安祔葬於景陵后歷位七朝五居太母之尊人君行子孫之禮福壽隆貴四十餘年雖漢之馬鄧無以加焉女學士宋尚宮附唐書曰女學士尚宮宋氏者名若昭貝州清陽人父庭芬世為儒學至庭芬有詞藻生五女皆聰惠庭芬始教以經藝既而課為詩賦年未及笄皆能屬文長曰若華次曰若昭若倫若憲若荀若華若昭文尤淡麗性復貞素閑雅不尚芳華之飾嘗白父母誓不從人願以藝學揚名顯親若華教誨四妹有如嚴師著女論語十篇其言摸倣論語以韋逞母宣文君宋氏代仲尼以曹大家等代顏閔其間問荅悉以婦道所尚若昭注解皆有理致貞元四年昭義節度使李抱真表薦以聞德宗俱召入宮試以詩賦兼問經史中大義深加賞歎德宗能詩與侍臣唱和相屬亦令若華姊妹應制每進御無不稱善嘉其節概不群不以宮妾遇之呼為學士先生庭芬起家受饒州司馬習藝館內教賜第一區給俸料元和末若華卒贈河內郡君自貞元七年已後宮中記注簿籍若華掌其事穆宗復令若昭代司其職拜尚宮姊妹中若昭尤通曉人事自憲穆敬三帝皆呼為先生六宮嬪媛諸王公主駙馬皆師之為之致敬進封梁國夫人寶歷初卒將葬詔所司供鹵簿敬宗復令若憲代司宮籍文宗好文以若憲善屬文能論議奏對尤重之大和中坐駙馬沈光事幽若憲於外第賜死穆宗王太后唐書曰穆宗恭僖皇太后王氏越人父紹卿婺州金華令后少入太子宮元和四年生敬宗穆宗皇帝即位立為妃長慶四年二月尊為皇太后文宗即位之初號寶歷太后穆宗蕭皇后唐書曰穆宗貞獻皇后蕭氏福建人初入十六宅為建安王侍者元和四年生文宗皇帝寶歷三年敬宗崩中尉王守澄率兵討賊迎江王即位文宗踐祚之月, SBCK: ''}
