  - {type: 'tls:seg', offset: 20, content: '', id: KR3k0012_CHANT_142-1a.5}
  - {type: variant, offset: 20, length: 2, content: 京兆, SBCK: 親戚嫌堅輕狡將距焉堅甚慙恨夫人謂親戚曰何愛一女以取禍乎如有不遇命也於是遂許爲婚生四男一女及權少年統業夫人助理國政甚有􅀘益建安七年臨薨引見張昭等囑以後事孫權歩后呉志曰呉主權歩夫人臨淮淮隂人也以羙麗得幸於權寵冠後宫夫人性不嫉妬多所推進故乆見愛權爲王及帝意欲以爲后羣臣議在徐氏權依違者十餘年然宫內皆稱皇后親戚上䟽稱中宫及薨臣下縁權旨請追正名號乃贈皇后印綬二王后呉志曰呉主權王夫人琅瑘人也夫人以選入宫得幸生孫和權將立爲后而全公主素憎夫人數加􅉲毀及權􅃦疾言有喜色由是權深責怒以憂死呉志曰呉主權王夫人南陽人也生孫休及和爲太子和母貴諸􅁎有寵者皆出居外夫人出在公安卒因塟焉休即位遣使追尊曰敬懷皇后改葬敬陵潘后呉志曰呉主權潘夫人㑹稽句章人父爲吏坐死夫人與姊俱輸織室權見而異之召充後宫得幸有身夣有以龍頭授巳者巳以蔽膝受之遂生孫亮夫人爲皇后性妬媚容自}
  - {type: page-break, offset: 20, content: '', id: KR3k0012_SBCK_142-3a}
  - {type: variant, offset: 20, length: 2, content: 京兆, krp: 親戚嫌堅輕狡將距焉堅甚慙恨夫人謂親戚曰何愛一女以取禍乎如有不遇命也於是遂許爲婚生四男一女及權少年統業夫人助理國政甚有𥙷益建安七年臨薨引見張昭等囑以後事孫權歩后呉志曰呉主權歩夫人臨淮淮隂人也以羙麗得幸於權寵冠後宫夫人性不嫉妬多所推進故乆見愛權爲王及帝意欲以爲后羣臣議在徐氏權依違者十餘年然宫內皆稱皇后親戚上䟽稱中宫及薨臣下縁權旨請追正名號乃贈皇后印綬二王后呉志曰呉主權王夫人琅瑘人也夫人以選入宫得幸生孫和權將立爲后而全公主素憎夫人數加譖毀及權寢疾言有喜色由是權深責怒以憂死呉志曰呉主權王夫人南陽人也生孫休及和爲太子和母貴諸姬有寵者皆出居外夫人出在公安卒因塟焉休即位遣使追尊曰敬懷皇后改葬敬陵潘后呉志曰呉主權潘夫人㑹稽句章人父爲吏坐死夫人與姊俱輸織室權見而異之召充後宫得幸有身夣有以龍頭授巳者巳以蔽膝受之遂生孫亮夫人爲皇后性妬媚容自}
  - {type: variant, offset: 23, length: 0, content: '', SBCK: 至卒􅉲害甚衆權不豫夫人使問中書令張昭吕后專制故事侍疾疲勞因以羸病諸人伺其昏卧共縊殺之託言中惡後事泄坐死者六七十人權㝷薨合葬蔣陵謝妃呉志曰呉主權謝夫人㑹稽山隂人也權聘以爲妃愛幸有寵後權納姑孫徐氏欲令謝下之謝不肯由是失寵早卒徐妃呉志曰呉主權徐夫人呉郡富春人也初􅃴同郡陸尚尚卒權娉以爲妃使母養子登後權以夫人妬忌廢之以疾卒孫亮全后呉志曰孫亮全夫人全尚女也立爲皇后孫綝廢亮爲㑹稽王隨亮之國呉録曰亮妻惠解有容色呉}
  - {type: page-break, offset: 23, content: '', id: KR3k0012_SBCK_142-3b}
  - {type: variant, offset: 23, length: 0, content: '', krp: 至卒譖害甚衆權不豫夫人使問中書令張昭吕后專制故事侍疾疲勞因以羸病諸人伺其昏卧共縊殺之託言中惡後事泄坐死者六七十人權㝷薨合葬蔣陵謝妃呉志曰呉主權謝夫人㑹稽山隂人也權聘以爲妃愛幸有寵後權納姑孫徐氏欲令謝下之謝不肯由是失寵早卒徐妃呉志曰呉主權徐夫人呉郡富春人也初適同郡陸尚尚卒權娉以爲妃使母養子登後權以夫人妬忌廢之以疾卒孫亮全后呉志曰孫亮全夫人全尚女也立爲皇后孫綝廢亮爲㑹稽王隨亮之國呉録曰亮妻惠解有容色呉}
