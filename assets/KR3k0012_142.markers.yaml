  - {type: variant, offset: 1503, length: 1, content: 復, WYG: 適同郡陸尚尚卒權聘以為妃使母養子登後權以夫人妬忌廢之尋以疾卒孫亮全后吳志曰孫亮全夫人全尚女也}
