  - {type: variant, offset: 4879, length: 0, content: '', SBCK: 第休之並超顯職太后頗豫政事賜與休之等財物家累千金居處器服與帝子相侔㝷崩時年五十五遷殯東宫改東宫門題曰崇憲宫劉駿王后沈約宋書曰孝}
  - {type: variant, offset: 4879, length: 0, content: '', WYG: 太后弟子瓊之上表為父乞恩贈給事中瓊之及弟休之茂之並超顯職太后頗預政事賜與休之等財物家累千金居處器服與帝子相侔尋崩時年五十五遷殯東宫改東宫門題曰崇憲宫劉駿王后沈約宋書曰孝}
  - {type: variant, offset: 4879, length: 0, content: '', krp: 第休之並超顯職太后頗豫政事賜與休之等財物家累千金居處器服與帝子相侔㝷崩時年五十五遷殯東宫改東宫門題曰崇憲宫劉駿王后沈約宋書曰孝}
  - {type: variant, offset: 4880, length: 0, content: '', SBCK: 文穆王皇后諱憲嫄琅邪臨沂人元嘉二十年拜武陵王妃生廢帝山隂公主丗祖在藩后甚有寵上伐凶逆與太后同還京都立爲皇后大明四年率六宫躬桑于西郊廢帝即位尊曰皇太后宫曰永訓其年崩于含章殿時年三十八祔葬景寜陵劉彧母沈婕妤沈約宋書文帝沈婕妤諱容􅁎納後宫爲美人生明帝拜爲婕妤元嘉三十年卒時年四十丗祖即位追贈湘東國太妃太}
  - {type: page-break, offset: 4880, content: '', id: KR3k0012_SBCK_142-8a}
  - {type: variant, offset: 4880, length: 0, content: '', WYG: 文穆王皇后諱憲嫄瑯琊臨沂人元嘉二十年拜武陵王妃生廢帝山隂公主世祖在藩后甚有寵上伐㓙逆與太后同還京都立為皇后文明四年率六宫躬桑於西郊廢帝即位尊曰皇太后宫曰永順其年崩於含章殿時年三十八祔葬景陵劉彧母沈媫妤沈約宋書曰文帝沈媫妤諱容姬納於後宫為美人生明帝拜為媫妤元嘉三十年卒時年四十世祖即位追贈湘東國太妃太}
