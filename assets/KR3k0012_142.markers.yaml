  - {type: variant, offset: 4577, length: 293, content: 馬習藝館內教賜第一區給俸料元和末若華卒贈河內郡君自貞元七年已後宮中記注簿籍若華掌其事穆宗復令若昭代司其職拜尚宮姊妹中若昭尤通曉人事自憲穆敬三帝皆呼為先生六宮嬪媛諸王公主駙馬皆師之為之致敬進封梁國夫人寶歷初卒將葬詔所司供鹵簿敬宗復令若憲代司宮籍文宗好文以若憲善屬文能論議奏對尤重之大和中坐駙馬沈光事幽若憲於外第賜死穆宗王太后唐書曰穆宗恭僖皇太后王氏越人父紹卿婺州金華令后少入太子宮元和四年生敬宗穆宗皇帝即位立為妃長慶四年二月尊為皇太后文宗即位之初號寶歷太后穆宗蕭皇后唐書曰穆宗貞獻皇后蕭氏福建人初入十六宅為建安王侍者元和四年生文宗皇帝寶歷三年敬宗崩中尉王守澄率兵討賊迎江王即位文宗踐祚之月, WYG: ''}
