  - {type: variant, offset: 1389, length: 0, content: '', WYG: 小張后蜀志曰後主張皇后飛小女隨後主遷於洛陽吳孫堅吳后吳志曰孫堅吳夫人權母也本吳人徙錢塘早失父母與弟居孫堅聞}
  - {type: page-break, offset: 1389, content: '', id: KR3k0012_WYG_142-4a, image: WYG0894/WYG0894-0312c.png}
  - {type: variant, offset: 1390, length: 0, content: '', WYG: 才貎欲娶之吳夫人親戚嫌堅輕狡將拒婚焉堅甚慚恨夫人謂親戚曰何愛一女以取禍乎如有不遇命也於是遂許為婚生四男一女及權少}
  - {type: punctuation, offset: 1391, content: ，, id: KR3k0012_CHANT_142-bkkpn300}
