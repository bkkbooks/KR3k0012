  - {type: variant, offset: 1498, length: 0, content: '', WYG: 性險妬容媚自始至卒譛害甚衆權不豫夫人使問中書令張昭后專制故事侍疾疲勞因以羸病諸宫人伺其昏卧共縊殺之託言中惡後事泄坐死者六七十人權尋薨合葬蔣陵謝妃吳志曰吳主權謝夫人㑹稽山隂人也權聘以}
