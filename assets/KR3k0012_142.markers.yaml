  - {type: variant, offset: 872, length: 511, content: 百姓頗倦勞役上䟽諫之太宗善其言優賜甚厚及太宗崩追思顧遇之恩哀慕愈甚發疾不自醫病甚謂所親曰吾荷顧實深志在早歿魂其有靈得侍園寢吾之志也因為七言詩及連珠以見其志永徽元年卒時年二十四詔贈賢妃陪葬於昭陵之石室高宗廢王皇后唐書曰高宗廢后王氏并州祁人也父仁祐同安長公主即后之從祖母也公主以后有美色言於太宗遂納為晉王妃高宗登儲冊為皇太子妃永徽初立為皇后初武皇后貞觀末隨太宗嬪御居於感業寺后及左右數為之言高宗由是復召入宮立為昭儀俄而漸承恩寵遂與后及良娣蕭氏遞相譖毀帝終不納后言而武昭儀寵遇日厚后懼不自安密與母柳氏求巫祝厭勝事發帝大怒斷柳氏不許入宮將廢后長孫無忌褚遂良等固諫乃止俄又納李義府之策永徽六年廢后及蕭良娣皆為庶人囚之別院武昭儀令人皆縊殺之中宗趙皇后唐書曰中宗和思皇后趙氏京兆長安人父瓌尚高祖女常樂公主中宗為英王時納后為妃既而妃母公主得罪妃亦坐廢幽死於內侍省則天臨朝瓌為壽州刺史坐與越王貞連謀被誅公主亦坐死神龍元年贈后謚為恭皇后及中宗崩將葬于定陵追謚后為和思莫知瘞所以皇后禕衣於陵所寢宮招魂置衣於魂轝以太牢告祭遷衣於寢宮舒於御榻之右覆以夷衾而祔葬焉中宗廢韋皇后唐書曰中宗韋庶人京兆萬年人也中宗為太子時納后為妃仍擢后父玄貞為豫州刺史嗣聖, WYG: ''}
