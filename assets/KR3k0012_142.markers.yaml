  - {type: variant, offset: 18, length: 1, content: 竇, krp: 陳留人也兄呉壹素與劉焉有舊是以舉家隨焉入蜀焉有異志而聞善相者使相后云當大貴焉時將子瑁自隨遂爲瑁納后瑁死寡居先主旣定益州而孫夫人還呉羣下勸先主聘后先主疑於與瑁同族法正進曰論其親踈何與晉文之於子圉乎於是納后延熈八年薨合葬惠陵劉禪張后蜀志曰後主敬哀皇后車騎將軍張飛長女章武元年納爲太子妃建興元年立爲皇后小張后蜀志曰後主小張皇后飛小女隨後主遷于洛陽呉孫堅呉后呉志曰孫堅呉夫人權之母也夲呉人徙錢塘早失父母與弟居孫堅聞其才貌欲娶之呉}
