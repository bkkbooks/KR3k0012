  - {type: variant, offset: 4349, length: 227, content: 詞藻生五女皆聰惠庭芬始教以經藝既而課為詩賦年未及笄皆能屬文長曰若華次曰若昭若倫若憲若荀若華若昭文尤淡麗性復貞素閑雅不尚芳華之飾嘗白父母誓不從人願以藝學揚名顯親若華教誨四妹有如嚴師著女論語十篇其言摸倣論語以韋逞母宣文君宋氏代仲尼以曹大家等代顏閔其間問荅悉以婦道所尚若昭注解皆有理致貞元四年昭義節度使李抱真表薦以聞德宗俱召入宮試以詩賦兼問經史中大義深加賞歎德宗能詩與侍臣唱和相屬亦令若華姊妹應制每進御無不稱善嘉其節概不群不以宮妾遇之呼為學士先生庭芬起家受饒州, WYG: ''}
