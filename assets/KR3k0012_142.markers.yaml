  - {type: variant, offset: 542, length: 329, content: 太宗即位立為皇后后性尤儉約凡所服御取給而已太宗彌加禮待十年六月己卯崩于立政殿時年三十六葬於昭陵后嘗撰古婦人善事勸戒十卷名曰女則自為之序又著論駮漢明德馬皇后以為不能抑退外戚令其當朝貴盛乃戒其龍馬水車此乃開其禍源而防其末事耳且誡主守者曰此吾以自防閑耳婦人著述無條貫不欲至尊見之慎勿言崩後宮司以聞太宗覽而增慟以示近臣曰皇后此書足可垂於後代我豈不達天命而不能割情乎以其每能規諫補朕之闕今不復聞善言是內失一良佐以此益令人哀耳上元元年改上尊號曰文德順聖皇后徐妃附唐書曰太宗賢妃徐氏名惠右散騎常侍堅之姑也生五月而能言四歲誦論語毛詩八歲好屬文其父孝德試擬楚辭云山中不可以久留詞甚典美自此遍涉經史手不釋卷太宗聞之納為才人其所屬文揮翰立成詞華綺贍俄拜婕妤再遷充容時軍旅函動宮室玄, WYG: 建}
