  - {type: variant, offset: 27, length: 4, content: 州揔管神, krp: 宫孫皓母何太后呉志曰孫和何姬丹陽句容人也父遂夲騎士孫權嘗遊幸諸營而何姬觀於道中權望見異之命宦者召入以賜子和生男權喜名之曰彭祖彭祖即皓也後徙和居新都遣使賜嫡妃張氏自殺何姬曰若皆從死誰當養孤遂撫育皓及其王弟皓即位尊和爲昭獻皇帝何姬爲昭獻皇后月餘進爲皇太后焉孫皓滕后呉志曰孫皓滕夫人故太常胤之族女也胤夷滅夫人父牧以踈逺徙邊郡孫休即位大赦得還以牧爲五官中郎皓旣封烏程侯娉牧女爲妃皓即位爲皇后封牧髙密侯拜衛將軍録尚書事時人以牧尊戚頗推令諫爭而夫人寵漸衰皓滋不恱皓母何恒左右之又太史言於運歷中后不可易皓信巫覡故得不廢常供養昇平宫長秋官僚備貟而巳受朝賀表䟽如故皓内諸寵姬佩皇后璽者多矣天紀四年隨皓遷于洛陽前趙劉淵母呼延妃崔鴻三十國春秋前趙録曰左賢王妃呼延氏魏嘉平中祈子於龍門俄而一大白魚頭有二角軒髯躍鱗於龍門而至於祭所乆之乃去巫覡皆異之曰此嘉祥也其夜夢旦所見魚變爲人左手把一物大如半雞子光影非常授延氏曰此是日精服之生貴子自是十三月而生淵劉淵張后崔鴻三十國春秋前趙録曰劉淵皇后張氏夣日入懷寤而告淵淵曰吉徴也愼勿言之自是十五月生聦劉聦呼延后崔鴻三十國春秋前趙録曰劉聦皇后呼延氏淵后之從父妹有美色恭孝稱於宗族淵后愛聦姿貌故以配焉毎謂聦曰父終子紹古今之大典陛下自承髙祖之嗣太弟何爲者哉陛下百年後粲兄弟必無種也願陛下深思之聦亦信之曰然吾當爲計后曰事留變生太弟見粲兄弟並大必有不安之志矣或有小人構間其中未必不禍發于今日妾常聞陛下說魯隱公事一何相似竊爲陛下寒心聦深然其言於是相圖之計起矣大劉后崔鴻三十國春秋前趙録曰劉聦皇后劉氏殷長女也字麗芳以左貴嬪立爲皇后聦將起䳨儀殿廷尉陳元逹諌聦大怒將斬之后時在後堂聞而密遣中常侍勑左右停刑於是手䟽啓曰伏聞勑旨將爲妾營殿今四海未一禍難猶繁廷尉之言社稷之計當賞以美爵而反欲誅之陛下此怒由妾而起廷尉之禍由妾而招自古國敗家喪未始不由婦人妾毎覽古事忿之不忘何意今日妾自爲之後人觀妾猶妾之視前人復何靣目仰侍巾櫛請歸死此堂以塞陛下誤惑之過聦覽之色變曰朕此來得微風之患意怒不自由元逹忠臣命其冠履就坐引元逹以劉后表示曰外輔如公等内輔如此后朕亦何憂矣小劉后崔鴻三十國春秋前趙録曰聦后劉氏殷小女字麗華童齒聦惠膚髮異常晝營女工夜誦書傳母每止之敦翫彌甚與諸兄爭論經義理旨超然諸兄常深歎謝性孝友善風儀進止如珪璋焉以貴嬪立爲皇后殷二女四孫皆姿色超丗女德冠時聦並納之自是六劉之寵傾於後宫建元中流星起於牽牛入紫微龍形委蛇其光照地落平陽北十里視之則肉臰聞于平陽肉傍常有哭聲晝夜不止聦甚惡之劉后産一蛇一虎各害人而走㝷之不得頃見隕肉之傍劉氏卒僞謚}
  - {type: variant, offset: 32, length: 2, content: 公毅, SBCK: 宣皇后乃失此肉􅂘聲亦止劉曜劉后崔鴻三十國春秋前趙録曰劉皇后侍中暟女年十三長七尺八寸手垂過􅂰髮與身齊姿色才徳邁於列后後趙石勒劉后崔鴻三十國春秋後趙録曰石勒劉皇后侍中閏之妹後部胡人也勒納之於胡􅀜美色有特寵張枰反於襄城后抽劒斬之勒頼后而濟后性惠有幹助理軍國之務有吕氏輔漢之風然嚴整貞婉容􅁉不妬忌過之也石􅀪即位尊爲皇太后與彭城王堪謀殺石虎謀泄虎殺之後燕慕容垂叚后崔鴻三十國春秋後燕録曰垂皇后叚氏字元妃光禄大夫儀}
