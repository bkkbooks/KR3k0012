  - {type: variant, offset: 4893, length: 261, content: 積慶太后會昌中崩謚曰貞獻敬宗郭貴妃唐書曰敬宗郭貴妃父義右威衛將軍長慶末以姿貌選入太子宮敬宗即位為才人生晉王普帝以少年有子復以才人容德冠絕特寵異之俄冊為貴妃及昭愍遇盜宮闈變起文宗即位尤憐晉王有若己子故貴妃禮遇不衰昭宗何皇后唐書曰昭宗積善皇后何氏東蜀人侍壽王邸婉麗多智特承恩顧生德王輝王昭宗即位立為淑妃乾寧中車駕在華州冊為皇后自乾符已後盜滿天下妖生九重宮廟榛蕪奔播不暇景福之際奸臣內侮后於蒙塵薄狩之中嘗膳禦侮不離左右天祐初朱全忠逼遷輿駕東幸洛陽其年八月昭宗遇弒翌日宰相柳璨獨孤損等詐宣皇后令云帝為宮人所害輝王祚宜昇帝位仍尊后為, SBCK: 爲}
