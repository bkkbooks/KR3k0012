  - {type: variant, offset: 1627, length: 299, content: 中宗上官昭容名婉兒西臺侍郎儀之孫也父庭芝與儀同被誅婉兒時在襁褓隨配入掖庭及長有文詞明習吏事則天時婉兒忤旨當誅則天惜其才不殺但黥其面而已自聖曆已後百司表奏多令參決中宗即位又令專掌制命深被信任尋拜為昭容婉兒既與武三思淫亂每下制勑多因事推尊武氏而排抑皇家節愍太子深惡之及舉兵至肅章門扣閤索婉兒婉兒大言曰觀其此意即當次索皇后以及大家帝與后遂激怒并將婉兒登玄武門樓以避兵鋒俄而事定婉兒常勸帝廣置昭文學士盛引當朝詞學之臣數賜遊宴賦詩唱和婉兒每代帝及后長寧安樂二公主數首並作辭甚綺麗時人咸諷誦之婉兒俄又通於吏部侍郎崔湜引知政事湜嘗充使開商山新路功未半而中宗崩婉兒草遺制曲敘其功而加襃賞及韋庶人敗婉兒亦斬於旗下睿宗, WYG: ''}
