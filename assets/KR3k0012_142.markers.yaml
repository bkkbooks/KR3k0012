  - {type: variant, offset: 4910, length: 1, content: 唐, WYG: 諱妙登丹陽屠家女也太妃家在建康縣東家貧有草屋二三間上出見之賜錢三萬令起瓦房尉自送錢與之家人並不在唯太妃在家時年十二三尉見其容質甚美即以白世祖於是迎入宫賜太宗始有寵一年許衰歇以乞將軍李道兒尋又迎還生廢帝故民中皆呼廢帝為李氏子廢帝踐祚號曰皇太妃輿服一如晉孝武太妃故事置家令一人改諸國太妃曰太姬劉昱江后沈約宋}
