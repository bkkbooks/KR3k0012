  - {type: variant, offset: 4904, length: 4, content: 獻敬宗郭, WYG: 風瑯琊臨沂人也上嘗宫内大集而裸婦人觀之以為歡笑后以扇障靣獨無所言帝怒曰外舍家寒乞今共為笑樂何獨不視后曰為樂之事其方自多豈有姑姊妹集聚而裸婦人形體以為樂外舍之為懽適實與此不同帝大怒遣后令起廢帝即位尊為皇太后元徽五年五月五日太后賜帝玉柄毛扇帝嫌其毛柄不華因此欲加酖害己令太醫煑藥左右止之曰若行此事官家便應作孝子豈復得出入狡獪帝曰汝語大有理乃止順帝即位齊王秉權順帝禪位太后與帝遜於東邸孝建元年薨於第時年四十四陳妃沈約宋書曰明帝陳}
