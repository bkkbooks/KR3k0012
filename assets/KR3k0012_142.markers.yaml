  - {type: variant, offset: 2382, length: 113, content: 漸承恩寵及王庶人廢後特賜號為惠妃宮中禮秩一同皇后惠妃開元初產夏悼王及懷安哀王上仙公主並襁褓不育上特垂傷悼及生壽王瑁不敢養於宮中命寧王憲於外養之又生盛王琦咸宜太華二公主惠妃以開元二十五年薨年四十餘楊貴妃唐書曰玄宗楊貴妃父玄琰蜀州, SBCK: 有}
  - {type: variant, offset: 2382, length: 1271, content: 漸承恩寵及王庶人廢後特賜號為惠妃宮中禮秩一同皇后惠妃開元初產夏悼王及懷安哀王上仙公主並襁褓不育上特垂傷悼及生壽王瑁不敢養於宮中命寧王憲於外養之又生盛王琦咸宜太華二公主惠妃以開元二十五年薨年四十餘楊貴妃唐書曰玄宗楊貴妃父玄琰蜀州司戶妃早孤養於叔父玄璬開元初武惠妃特承寵遇故王皇后廢黜二十四年惠妃薨帝哀悼久之後庭數千無可意者或奏玄琰女姿色冠代宜蒙召見時妃衣道士服號曰太真既進見玄宗大悅不朞歲恩禮如惠妃太真姿質豐艷善歌舞通音律智筭過人每倩盻承迎動移上意宮中呼為娘子禮數實同皇后有姊三人皆有才貌玄宗並封國夫人天寶中安祿山大立邊功上深寵之祿山來朝帝令貴妃姊妹與祿山結為兄弟祿山母事妃每宴賜錫齎稠沓及祿山叛露檄數國忠之罪河北盜起玄宗以皇太子為天下兵馬元帥監撫軍國事國忠大懼諸楊聚哭貴妃衘土陳請帝遂不行內禪及潼關失守從幸至馬嵬禁軍大將陳玄禮密啟太子誅國忠父子既而六軍不散玄宗遣力士宣問對曰賊本尚在蓋指貴妃也力士復奏帝不獲已與妃決遂縊死於佛室時年三十八瘞於驛西道側玄宗楊皇后唐書曰玄宗元獻皇后楊氏弘農華陰人后景雲元年八月選入太子宮時太平公主用事尤忌東宮宮中左右持兩端而潛附太平者必陰伺察事雖纖芥皆聞於上太子心不自安后時方娠太子密謂侍讀張說曰用事者不欲吾多息恐禍及此婦人其如之何密令說懷去胎藥而入太子於曲室躬自煮藥醺然似寐夢神人覆鼎既寤如夢如是者三太子異之告說說曰天命也無宜他慮既而太平誅后果生肅宗皇帝太子妃王氏無子后班在下后不敢母肅宗王妃撫鞠慈甚所生開元中肅宗為忠王后為妃又生寧親公主張說以舊恩特承寵異說亦奇忠王儀表心知運曆所鍾故寧親公主降說子垍開元十七年后薨葬細柳原肅宗張皇后唐書曰肅宗張皇后本南陽西鄂人後徙家昭應祖母竇氏玄宗母昭成皇太后之妹也昭成為天后所殺玄宗幼失所恃為竇姨鞠養景雲中封鄧國夫人父去逸天寶中選入太子宮為良娣后辯惠豐碩巧中上旨祿山之亂玄宗幸蜀太子與良娣俱從車駕渡渭百姓遮道請留太子收復長安肅宗姓仁孝以上皇播越不欲違離左右官者李靖忠啟太子請留良娣贊成之白於玄宗太子如靈武時賊已陷京師從官單寡道路多虞每太子次舍宿止良娣必居其前太子曰捍禦非婦人之事何以居前良娣曰今大家跋履險難兵衛非多恐有倉卒妾自當之大家可由後而出庶幾無患及至靈武產子三日起縫戰士衣太子勞之曰產忌作勞安可容易后曰此非妾自養之時須辦大家事肅宗即位冊為淑妃贈父去逸左僕射母竇氏封義章縣主乾元元年冊為皇后肅宗崩太子監國遂移后於別殿幽宮崩肅宗吳皇后唐書曰肅宗章敬皇后吳氏濮陽人后父坐事沒入掖庭開元二十二年玄宗幸忠王邸見王服御蕭然傍無媵侍命將軍高力士選掖庭宮人賜之而吳后在籍中容止端麗性多謙抑寵遇益隆明年生代宗皇帝二十八年薨葬於春明門外代宗即位群臣以肅宗山陵有期准禮以先太后祔代宗沈皇后唐書曰代宗睿真皇后沈氏吳興人世為冠族父易直秘書監開元末以良家子選入東宮賜太子生男廣平王天寶元年生德宗皇帝祿山之亂玄宗幸蜀諸王妃主從幸不及者多陷於賊后被拘於東都掖庭及代宗破賊收東都見之留后於宮中方經略北征未暇迎歸長安俄而史思明再陷河洛及朝義敗復收東都失后所在莫測存亡代宗遣使求訪十餘年寂無所聞德宗即位下詔遙, WYG: ''}
