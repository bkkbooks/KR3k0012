  - {type: 'tls:seg', offset: 1508, content: '', id: KR3k0012_CHANT_142-6a.35}
  - {type: variant, offset: 1508, length: 0, content: '', WYG: 孫綝廢亮為㑹稽王隨亮之國吳錄曰亮妻恵解有容色居侯官吳平乃歸永寕中卒孫休朱后吳志曰孫休朱夫人朱據女孫綝廢亮立休永安五年立夫人為皇后休卒羣臣尊夫人為皇太后孫皓即位月餘貶為景皇后稱安定宫甘露元年見逼薨合葬定陵孫皓母何太后吳志曰孫和何姬丹陽句容人也父遂本騎士孫權嘗逰幸諸宫而何姬觀於道中權望見異之命宦者召入以賜子和生男權喜名之曰彭祖彭祖即皓也孫亮即位和居新都遣使賜嫡妃張氏曰殺何姬曰若皆従死誰當養孤遂撫育皓及其三弟皓即位尊和為昭獻皇}
  - {type: page-break, offset: 1508, content: '', id: KR3k0012_WYG_142-6b, image: WYG0894/WYG0894-0313d.png}
  - {type: page-break, offset: 1508, content: '', id: KR3k0012_WYG_142-7a, image: WYG0894/WYG0894-0314a.png}
  - {type: variant, offset: 1509, length: 3, content: 在房州, WYG: 何姬為昭獻皇后月餘進為皇太后孫皓滕后吳志曰孫皓滕夫人故太常𦙍之族女也𦙍夷滅夫人父牧以踈逺徙邉郡孫休即位大赦得還以牧為五官中郎皓既封烏城侯聘牧女為妃皓即位為皇后封牧髙宻侯拜衛將軍錄尚書事}
  - {type: punctuation, offset: 1513, content: ，, id: KR3k0012_CHANT_142-bkkpn329}
  - {type: 'tls:seg', offset: 1513, content: '', id: KR3k0012_CHANT_142-6a.36}
  - {type: variant, offset: 1513, length: 0, content: '', WYG: 人以牧尊戚頗推令諫諍而夫人寵漸衰皓滋不恱皓母何恒左右之又太史言於運厯后不可易皓信巫覡故得不廢}
  - {type: page-break, offset: 1513, content: '', id: KR3k0012_WYG_142-7b, image: WYG0894/WYG0894-0314b.png}
  - {type: variant, offset: 1514, length: 0, content: '', WYG: 供養昇平宫長秋宫僚備員而已受朝賀表䟽如故皓内諸寵姬佩皇后璽綬者多矣天紀四年隨皓遷於洛陽前趙劉淵母呼延妃崔鴻十六國春秋前趙録曰左賢王妃呼延氏魏嘉平中祈子於龍門俄而一大白魚頂有二角掀鬐躍鱗於龍門而至於祭所乆之乃去巫覡皆異之曰此嘉祥也其夜夢旦所見魚變為人左手把一物大如半雞子光影非常以授氏曰此是日精服之生貴子自是十三月而生淵劉淵張后崔鴻十六國春秋前趙録曰劉淵皇后張氏夢日入懐寤而吿淵曰吉徵也慎勿言之自是十五月而生聰劉聰呼延后崔鴻十六國春秋前趙録曰劉聰皇后呼延氏淵后之従父妹有美色恭孝稱於宗族淵后愛聰姿色故以配焉聰以弟乂為帝太弟后}
