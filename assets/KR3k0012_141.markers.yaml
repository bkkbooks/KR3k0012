  - {type: variant, offset: 174, length: 0, content: '', SBCK: 初武皇后貞觀末隨太宗嬪御居於感業寺后及左右數爲之言髙宗由是復召入宫立爲昭儀俄而漸承恩寵遂與后及良娣蕭氏遞相譛毀帝終不納后言而武昭儀寵遇日厚后懼不自安密與母栁氏求巫祝厭勝事發帝大怒斷栁氏不許入宫將廢后長孫無忌禇遂良等固諌乃止俄又納李義府之䇿永徽六年廢后及蕭良娣皆爲庶人囚之别院武昭儀令人皆縊殺之中宗趙皇后唐書曰中宗和思皇后趙氏京兆長安人父瓌尚髙祖女常樂公主中宗爲英王時納后爲妃旣而妃母公主得罪妃亦坐廢幽死於内侍省則天臨朝瓌爲壽州刺史坐與越王貞連謀􅀍誅公主亦坐死神龍元年贈后謚爲恭皇后及中宗崩將葬于定陵追謚后爲和思莫知瘞所以皇后禕衣於陵所寢宫招魂置衣於魂轝以太牢告􅀕遷衣於寢宫舒於御榻之右覆以夷衾而祔葬焉中宗廢韋皇后唐書曰中宗韋庶人京兆萬年人也中宗爲太子時納后爲妃仍擢后父􅀇貞爲豫州刺史嗣聖元年立爲皇后其年中宗見廢后隨從房州時中宗懼不自安毎聞制使至惶恐欲自殺后勸王曰禍福􅀝伏何常之有豈失一死何遽如是也累年同艱危情義甚篤所生懿德太子永㤗永壽長寧安樂四公主安樂最㓜生於房州帝自脫衣裹之遂名曰裹兒特寵異焉及中宗復立爲太子又立后爲妃中興初復立爲皇后帝在房州時常謂后曰一朝見天日誓不相禁忌及得志乃受上官昭容邪􅀃引武三思入宫中􅂛御􅇃與后􅀟陸帝爲􅀧籌以爲歡􅀏醜聲日聞于外景龍四年六月帝遇毒􅁀崩后懼秘不發喪及臨淄王勒兵入内后惶駭遁入殿前飛􅀐營及武延秀安樂公主皆爲亂兵所殺追貶爲庶人上官昭容唐書曰中宗上官昭容名婉兒西臺侍郎儀之孫也父庭芝與儀同􅀍誅婉兒時在襁褓隨配入掖庭及長有文詞明習吏事則天時婉兒忤旨當誅則天惜其才不殺但黥其靣而已自聖曆巳後百司表奏多令叅決中宗即位又令專掌制命􅀷􅀍信任㝷拜爲昭容婉兒旣與武三思􅁋亂毎下制勑多因事推尊武氏而排抑皇家節愍太子深惡之及舉兵至肅章門扣閤索婉兒婉兒大言曰觀其此意即當次索皇后以及大家帝與后遂激怒并將婉兒登􅀇武門樓以避兵鋒俄而事定婉兒常勸帝廣置昭文學士盛引當朝詞學之臣數賜遊宴賦詩唱和婉兒每代帝及后長寧安樂二公主數首並作辭甚綺麗時人咸諷誦之婉兒俄又通於吏部侍郎崔湜引知政事湜嘗充使開啇山新路功未半而中宗崩婉兒草遺制曲叙其功而加襃賞及韋庶人敗婉兒亦斬於旗下睿宗劉皇后唐書曰睿宗肅明順聖皇后劉氏父延景陜州刺史儀鳯中睿宗居藩納后爲孺人㝷立爲妃生寧王憲壽昌代國二公主睿宗即位􅁽爲皇后及降爲皇嗣后從降爲妃長壽中與昭成皇后同􅀍譴爲則天所殺景雲元年追謚肅明皇后招魂葬於東都城南陵曰惠陵睿宗竇皇后唐書曰睿宗昭成順聖皇后竇氏父孝諶潤州刺史后姿容婉順動循禮則睿宗爲相王時爲孺人}
