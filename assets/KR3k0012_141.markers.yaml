  - {type: variant, offset: 154, length: 0, content: '', SBCK: 武德元年􅁽爲秦王妃九年􅁽拜皇太子妃太宗即位立爲皇后后性尤儉約凡所服御取給而巳太宗彌加禮待十年六月巳夘崩于立政殿時年三十六葬於昭陵后甞撰古婦人善事勸戒十卷名曰女則自爲之序又著論駮漢明德馬皇后以爲不能抑退外戚令其當朝貴盛乃戒其龍馬水車此乃開其禍源而防其末事耳且誡主守者曰此吾以自防閑耳婦人著述無條貫不欲至尊見之愼勿言崩後宫司以聞太宗覽而増慟以示近臣曰皇后此書足可垂於後代我豈不逹天命而不能割情乎以其毎能規諌􅀘朕之闕今不復聞善言是内失一良佐以此益令人哀耳上元元年改上尊號曰文德順聖皇后徐妃附唐書曰太宗賢妃徐氏名惠右散􅀐常侍堅之姑也生五月而能言四歳誦論語毛詩八歳好屬文其父孝德試擬楚辭云山中不可以乆留詞甚典羙自此遍渉經史手不釋卷太宗聞之}
