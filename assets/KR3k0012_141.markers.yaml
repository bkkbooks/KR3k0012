  - {type: variant, offset: 192, length: 0, content: '', WYG: 冊為淑妃贈父去逸左僕射母竇氏封義章縣主乾元元年冊為皇后肅宗崩太子監國遂移后於别殿幽宫崩肅宗呉皇后唐書曰肅宗章敬皇后呉氏濮陽人后父坐事没入掖庭開元二十二年𤣥宗幸忠王邸見服御蕭然傍無姬侍命将軍髙力士選掖庭宫人賜之而后在籍中容止端麗性無驕傲寵遇益隆明年生代宗皇帝二十八年薨葬春明門外代宗即位羣臣以肅宗山陵有期準禮以先太后祔代宗沈皇后唐書曰代宗睿真皇后沈氏呉興人世為冠族父易直秘書監開元末以良家子選入東宫太子以賜廣平王天寳元年生徳宗皇帝禄山之亂𤣥宗幸蜀諸王妃主從幸不及者多䧟於賊后被囚於東都掖庭及代宗破賊收東都見之留后於宫中方經畧北征未及迎歸長安俄而史思明再䧟河洛及朝義敗復收東都失后所在莫測存亡代宗遣使求訪十餘年寂無所聞徳宗即位下詔追尊為皇太后代宗獨孤皇后唐書曰太宗貞懿皇后獨孤氏父穎左威衛録事叅軍后以美麗入宫嬖幸專房故長秋虚位諸姬罕所進御后始冊為貴妃生韓王迴華陽公主大厯十年五月薨追諡曰貞懿皇后嬪於内殿累年不忍出宫十三年十月方葬命宰臣常衮為哀冊徳宗王皇后唐書曰徳宗昭徳皇后王氏父遇官至祕書監徳宗為魯王特納后為嬪上元二年生順宗皇帝特承寵異徳宗即位冊為淑妃貞元二年妃病十一月甲午冊為皇后是日崩於兩儀殿韋賢妃唐書曰徳宗韋賢妃不知氏族所出初為良娣貞元二年冊為賢妃性敏慧言動必有禮徳宗深重之六宫師其徳行及徳宗崩請於崇陵終䘮己因侍於寢園元和四年薨順宗王皇后唐書曰順宗荘憲皇后王氏瑯琊人父顔衛尉卿后幼以良家子選入宫為才人順宗在藩時代宗以才人賜之時年十三大厯十三年生憲宗皇帝立以為王孺人順宗升儲冊為良娣后言容恭謹宫中稱其徳行順宗即位疾恙未平后供侍醫藥不離左右屬帝不能言冊禮将行復止及憲宗受禪冊為太上皇后中和元年正月順宗晏駕五月尊太上皇后為皇太后冊禮畢憲宗御紫宸宣赦太后居興慶宫后性仁和恭遜深抑外戚無絲毫假貸訓厲内職有母儀之風焉元和十一年三月崩於咸寧殿諡曰荘憲憲宗郭皇后唐書曰憲宗懿安皇后郭氏尚父子儀之孫駙馬都尉曖之女母代宗長女昇平公主憲宗為廣陵王時納后為妃以妃家父祖有大勲於王室順宗深寵異之貞元十一年生穆宗皇帝元和元年冊為貴妃時帝後庭多私愛以后門族華盛慮正位之後不容嬖幸以是冊拜後時穆宗嗣位冊為皇太后敬宗即位尊太皇太后宣宗繼統即后之諸子也恩禮愈異於前朝大中年崩於興慶宫諡曰懿安祔葬於景陵后厯七朝五居太母之尊人君行子孫之禮福夀隆貴四十餘年雖漢之馬鄧無以加焉女學士宋尚宫附唐書曰女學士尚宫宋氏者名若昭貝州清陽人父廷芬世為儒學至廷芬有詞藻生五女皆聰慧廷芬始教以經藝既而課為詩賦年未及筓皆善屬文長曰若莘次曰若昭若倫若憲若荀若莘若昭文尤髙性復貞素閒雅不尚芳華之飾共白父母誓不從人願以藝學揚名顯親若莘教誨四妺有如嚴師著女論語十篇其言模倣論語以韋逞毋宣文君宋氏代仲尼以曺大家等代顔閔其間問答悉以婦道所尚若昭注解皆有理致貞元四年昭義節度使李抱真表薦以聞德宗俱召入宫試以詩賦兼問經史中大義深加嘆賞徳宗能詩侍臣倡和相屬亦令若莘姊妹應制每進御無不稱善嘉其節概不羣不以宫妾御之呼為學士先生廷芬起家授饒州司馬習藝舘内教賜第一區給俸料元和末莘卒贈河内郡君自貞元七年以後宫中記註簿籍若莘掌其事穆宗復令若昭代司其職拜尚宫姊妺中若昭尤通曉人事自憲穆敬三帝呼為先生六宫嬪媛諸王公主駙馬皆師之為之致敬進封國夫人寳厯初卒将塟詔所司供鹵簿敬宗復令若憲代司宫籍文宗好文以若憲善屬文能論議奏對尤重之太和中坐駙馬沈􅔲事幽若憲於外第賜死穆宗王皇后唐書曰穆宗恭僖皇后王氏越州人父紹卿婺州金華令后少入太子宫元和四年生敬宗穆宗皇帝即位立為妃長慶四年二月尊為皇太后文宗即位之初號寳厯太后穆宗蕭皇后唐書曰穆宗貞憲皇后蕭氏福建人初入十六宅為建安王侍者元和四年生文宗皇帝寳厯三年敬宗崩中尉王守澄率兵討賊迎江王即位文宗踐祚之月奉冊}
