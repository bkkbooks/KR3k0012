  - {type: variant, offset: 3819, length: 570, content: 四高祖與后相得誓無異生之子后初亦柔順恭孝不失婦道后姊為周明帝后長女為周宣帝后貴戚之盛莫與為比而后每謙卑自守世以為賢及周宣帝崩高祖居禁中揔百揆后使人謂高祖曰大事已然騎獸之勢必不得下勉之高祖受禪立為皇后性尤妬忌上亦每事唯后言是用后見諸王及朝士有妾孕者必勸上斥之時皇太子多內寵妃元氏暴薨后意太子愛妾雲氏害之由是風上竟廢太子立晉王廣皆后之謀也仁壽二年八月甲子月暈四重己巳太白犯軒轅其夜后崩於永安宮時年五十葬於太陵宣華夫人隋書宣華夫人陳宣帝之女也性聰慧姿貌無雙及陳滅配掖庭後選入宮為嬪時獨孤皇后性妬後宮罕得進御唯陳氏有寵晉王廣之在藩也陰有奪宗之計陳氏皇太子廢立之際頗有力焉及文獻皇后崩進位為貴人專房擅寵主斷內事六宮莫與為比及上大漸遺詔拜為宣華夫人煬帝嗣位之後出居仙都宮尋召人歲餘而終時年二十九帝深悼之為製神傷賦煬帝蕭皇后隋書曰煬帝蕭皇后梁明帝巋丘軌切之女也江南風俗二月生子者不舉后以二月生由是季父岌收而養之未幾岌夫妻俱死轉養舅氏張軻家然軻甚貧窶具宇切后躬親勞苦煬帝之為晉王時高祖將為王選妃於梁遍占諸女皆不吉巋迎后於舅氏令使者占之曰吉於是遂策為王妃后性婉順有智識好學解屬文頗知占候高祖大善之帝甚寵敬焉及帝嗣位詔立為后帝每遊幸未嘗不隨侍從及宇文氏之亂隨軍至聊城化及敗沒竇建德突厥處羅可汗遣使迎后於洺州建德不敢留遂入於虜庭唐貞觀四年滅突厥乃以禮致之歸于京師, WYG: 一}
