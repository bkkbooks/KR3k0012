  - {type: variant, offset: 903, length: 221, content: 寮表請公除太后不許尋幸永寧寺觀建剎於九級之基僧尼士女赴者數萬人后幸左藏公主嬪女已下從者百餘人皆令任力負布絹即以賜之尋幸闕口溫水登雞頭山自射象牙簪一發中之勑示文武時太后得志逼幸清河王懌媱亂肆情為天下所惡領軍元又長秋卿劉騰等奉肅宗於顯陽殿幽太后於北宮於禁中殺懌自劉騰死義又寬怠太后與肅宗及高陽王雍為計解又領軍太后復臨朝大赦改元自是朝政踈緩威恩不立天下牧守所在貪惏音嵐鄭儼寵私宮掖勢傾海內李神軌徐紇並見親待一二年中位總禁要手握王爵輕重在心宣淫於朝為, SBCK: ''}
