  - {type: variant, offset: 1944, length: 2445, content: 鑿麥積崖為龕而葬神柩將入有二藂雲先入龕中頃之一滅一出後號寂陵及文帝山陵畢手書云萬歲后欲令后配饗公卿乃議追謚曰文皇后祔於太廟廢帝時合葬於永陵郁久閭后後魏書曰文帝悼皇后郁久閭氏蠕蠕主阿那環之長女容貌端嚴夙有成智大統初蠕蠕屢犯北邊文帝乃與通好結婚扶風王孚受使奉迎蠕蠕俗以東為貴后之來營幕戶席一皆東向車七百乘馬萬匹駞千頭到黑鹽池魏朝鹵簿文物始至孚奏請正南面后曰我未見魏王故蠕蠕女也魏伏向南我自東面孚無以辭四年正月至京師立為皇后時年十四六年后懷孕將產居於瑤華殿聞上有狗吠聲心甚惡之又見婦人盛飾來至后所后謂左右曰此為何人毉巫傍侍悉無見者時以為文后之靈產訖而崩年十六葬於少陵原十七年合葬永陵當會橫橋北后梓宮先至鹿苑帝轀音京音溫車涼后來將就次所軸折不進西魏廢帝宇文后後魏書曰廢帝皇后宇文氏周文帝女也后初產之日有雲氣滿室氣久之幼有風神好陳列女圖置之左右周文曰每見此女良慰人意廢帝之為太子納為妃及即位為皇后志操明秀帝深重之專寵後宮不置嬪御帝既廢崩后亦以忠於魏室羅禍恭帝若干后後魏書曰恭帝皇后若干氏司空長樂公正惠之女也有容色恭帝納之為妃及即位立為皇后後出家為尼在佛寺葬竟無謚東魏孝靜高皇后後魏書曰孝靜高皇后齊獻武王之第二女也天平四年詔娉以為皇后王前後固辭帝不許興和初詔侍中司空孫騰司空公襄城王旭一云昶兼尚書令司州牧西河王悰藏宗切兼太常卿及宗正卿元孝支等奉詔致禮并備宮官侍衛以后駕迎於晉陽之丞相第五月立為皇后大赦天下齊受禪降為山王妃後周文元皇后後周書曰文元皇后魏孝武妹初封平原公主適開府張歡遇后無禮帝殺歡改封后馮翊公主以配太祖生孝閔薨祔葬成陵文叱奴后後周書曰文叱奴后太祖為丞相納后為姬生高祖高祖即位後尊為皇太后建德三年三月己酉崩四月丁巳葬固陵閔元后後周書曰閔元皇后名胡摩魏文帝第五女初封晉安公主愍帝為洛陽公尚焉及踐祚立為皇后帝被廢后出俗為尼高祖誅晉公護上帝尊號為愍帝以后為孝愍皇后號崇義宮隋氏革命出居里第大業十二年殂明獨孤后後周書曰明獨孤后太保衛公信之長女也帝在藩納為夫人帝即位立為王后在位數日崩葬昭陵世宗崩與后祔葬之武阿史那后後周書曰武阿史後突厥木杆可汗俟斤之女突厥蠕蠕而恕反後盡有塞表之地控弦十數萬於是陵逼中原太祖方與齊人爭衡結以為媛俟斤初欲以女配帝保定五年二月詔陳公純等備皇后文物及行殿并六宮已下一百二十人至俟斗牙帳所迎后俟斗又許齊人以婚將有異志純等在彼累載不得返命會雷風大起飄壞其穹廬等旬日不止俟斗大懼以為天譴去戰切乃禮送后及純等設行殿列羽儀奉之以歸高祖行親迎之禮后有姿貌善容止高祖深敬焉宣帝即位尊為天元上皇太后隋開皇二年殂年三十一隋文詔后祔葬孝陵孝帝李后後周書曰孝帝李后名娥姿楚人也于謹平江陵后家被籍沒至長安太祖以后賜高祖高祖幸之生宣帝宣帝即位尊為天元聖皇太后宣帝崩靜帝尊為大帝太后隋開皇初出俗為尼改名常悲薨以尼禮葬之京城南宣帝楊后後周書曰宣帝楊后名麗華隋文帝長女帝在東宮高祖為帝納后為皇太子妃宣政元年立為天元皇后后性柔婉不妬忌四皇后及嬪御等咸愛而仰之帝後昏暴滋甚喜怒乖度嘗譴后欲加之罪后進止詳閑辭色不撓帝大怒遂賜后死逼令引決后母獨孤氏聞之詣閤陳謝叩頭流血然後得免帝崩靜帝尊后為皇太后號弘聖皇太后初宣帝不豫詔隋文帝入禁中侍疾及大漸劉昉鄭譯等因矯詔以后父受遺輔政后雖初不預謀然以嗣主幼冲恐權在他族不利於己聞昉譯已行此詔甚悅後知父有異圖意頗不平形於言色及行禪代憤惋愈甚隋文帝既不能譴責內甚愧之開皇六年封后為樂平公主後又議奪其志后誓不許乃止大業中殂祔葬定陵宣朱后後周書曰宣朱皇后名滿月吳人也其家唑事沒入東宮帝為太子后被選掌衣服召而幸之遂生靜帝靜帝立尊為天元太皇后后本非良家子年又大帝十歲踈賤無寵以靜帝之故特尊崇之宣帝崩靜帝即位尊為太后隋初出俗為尼改名法凈後殂以尼禮葬之宣陳后後周書曰宣陳后名月儀自云潁川人大將軍山提之女以選入宮拜為德妃月餘立為天元左大皇后帝崩出俗為尼改名華光父山提本爾朱兆之隸仕齊為特進開府謝陽王高祖平齊拜大將軍以后父超授上柱國除大宗伯宣元后後周書曰宣元皇后名樂尚河南洛陽人開府晟之第二女也年十五被選入宮拜貴妃後立為天元右大皇后宣帝崩出俗為尼名華勝父晟少以元氏宗室拜開府宣尉遲后後周書曰宣尉遲皇后名繁熾蜀公迥之孫女也有美色初適杞公亮之子西陽公溫後以宗婦入朝帝逼而幸之後亮聞謀逆帝遂誅溫追后入宮立為天元右大皇后帝崩出俗為尼改名華道年四十殂靜司馬后後周書曰靜帝司馬后名令姬柱國滎陽公消難之女宣帝傳位於帝納后為皇后隋文帝以后父消難擁眾奔陳廢后為庶人後嫁為隋司州史李丹妻隋文獨孤皇后隋書曰文獻獨孤皇后河南雒陽人周大司馬河內公信之女也信見高祖有奇表故以后妻焉時年十四高祖與后相得誓無異生之子后初亦柔順恭孝不失婦道后姊為周明帝后長女為周宣帝后貴戚之盛莫與為比而后每謙卑自守世以為賢及周宣帝崩高祖居禁中揔百揆后使人謂高祖曰大事已然騎獸之勢必不得下勉之高祖受禪立為皇后性尤妬忌上亦每事唯后言是用后見諸王及朝士有妾孕者必勸上斥之時皇太子多內寵妃元氏暴薨后意太子愛妾雲氏害之由是風上竟廢太子立晉王廣皆后之謀也仁壽二年八月甲子月暈四重己巳太白犯軒轅其夜后崩於永安宮時年五十葬於太陵宣華夫人隋書宣華夫人陳宣帝之女也性聰慧姿貌無雙及陳滅配掖庭後選入宮為嬪時獨孤皇后性妬後宮罕得進御唯陳氏有寵晉王廣之在藩也陰有奪宗之計陳氏皇太子廢立之際頗有力焉及文獻皇后崩進位為貴人專房擅寵主斷內事六宮莫與為比及上大漸遺詔拜為宣華夫人煬帝嗣位之後出居仙都宮尋召人歲餘而終時年二十九帝深悼之為製神傷賦煬帝蕭皇后隋書曰煬帝蕭皇后梁明帝巋丘軌切之女也江南風俗二月生子者不舉后以二月生由是季父岌收而養之未幾岌夫妻俱死轉養舅氏張軻家然軻甚貧窶具宇切后躬親勞苦煬帝之為晉王時高祖將為王選妃於梁遍占諸女皆不吉巋迎后於舅氏令使者占之曰吉於是遂策為王妃后性婉順有智識好學解屬文頗知占候高祖大善之帝甚寵敬焉及帝嗣位詔立為后帝每遊幸未嘗不隨侍從及宇文氏之亂隨軍至聊城化及敗沒竇建德突厥處羅可汗遣使迎后於洺州建德不敢留遂入於虜庭唐貞觀四年滅突厥乃以禮致之歸于京師, SBCK: ''}
