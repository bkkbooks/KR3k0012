  - {type: 'tls:seg', offset: 192, content: '', id: KR3k0012_CHANT_141-2a.15}
  - {type: variant, offset: 192, length: 0, content: '', SBCK: 􅁽爲淑妃贈父去逸左僕射母竇氏封義章縣主乾元元年􅁽爲皇后肅宗崩太子􅁥國遂移后於別殿幽宫崩肅宗呉皇后唐書曰肅宗章敬皇后呉氏濮陽人后父坐事没入掖庭開元二十二年􅀇宗幸忠王邸見王服御蕭然傍無媵侍命將軍髙力士選掖庭宫人賜之而呉后在籍中容止端麗性多謙抑寵遇益隆明年生代宗皇帝二十八年薨葬於春明門外代宗即位羣臣以肅宗山陵有期准禮以先太后祔代宗沈皇后唐書曰代宗睿眞皇后沈氏呉興人丗爲冠族父易直秘書􅁥開元末以良家子選入東宫賜太子生男廣平王天寳元年生德宗皇帝禄山之亂􅀇宗幸蜀諸王妃主從幸不及者多䧟於賊后􅀍拘於東都掖庭及代宗破賊收東都見之留后於宫中方經略北征未暇迎歸長安俄而史思明再䧟河洛及朝義敗復􅀵東都失后所在莫測存亡代宗遣使永訪十餘年寂無所聞德宗即位下詔遥尊爲皇太后代宗獨􅀌皇后唐書曰代宗貞懿皇后獨􅀌氏父頴左威衛録事叅軍后以羙麗入宫嬖幸專房故長秋虚位諸􅁎罕所進御后始􅁽爲貴妃生韓王迥華陽公主大曆十年五月薨追謚曰貞懿皇后殯於内殿累年不忍出宫十三年十月方葬命宰臣常衮爲哀􅁽德宗王皇后唐書曰德宗昭德皇后王氏父遇官至秘書􅁥德宗爲魯王時納后爲嬪上元二年生順宗皇帝特承寵異德宗即位􅁽爲淑妃貞元二年妃病十一月甲午􅁽爲皇后是日崩於兩儀殿韋賢妃唐書曰德宗韋賢妃不知氏族所出初爲良娣貞元二年􅁽爲賢妃性敏惠言無苟容動必由禮德宗深重之六宫師其德行及德宗崩請於崇陵終喪紀因侍於寢園元和四年薨順宗王皇后唐書曰順宗莊憲皇后王氏瑯瑘人父顔衛尉卿后㓜以良家子選入宫爲才人順宗在藩時代宗以才人賜之時年十三大曆十三年生憲宗皇帝立爲宣王孺人順宗􅂛儲􅁽爲良娣后言容恭謹宫中稱其德行順宗即位疾恙未平后供侍毉藥不離左右屬帝不能言􅁽禮將行復止及永貞内禪􅁽爲太上皇后中和元年正月順宗晏駕五月尊太上皇后爲皇太后􅁽禮畢憲宗御紫宸宣赦太后居興慶宫后性仁和㳟遜深抑外戚無􅁝毫假貸訓厲内職有母儀之風焉元和十一年三月崩於咸寧殿謚曰莊憲憲宗郭皇后唐書曰憲宗懿安皇后郭氏尚父子儀之孫駙馬都尉曖之女母代宗長女昇平公主憲宗爲廣陵王時納后爲妃以母貴父祖有大勲於王室順宗深寵異之貞元十一年生穆宗皇帝元和元年􅁽爲貴妃時帝後庭多􅀻愛以后門族華盛慮正位之後不容嬖幸以是􅁽拜後時穆宗嗣位􅁽爲皇太后敬宗即位尊爲太皇太后宣宗繼統即后之諸子也恩禮愈異於前朝大中年崩於興慶宫謚曰懿安祔葬於景陵后歷位七朝五居太母之尊人君行子孫之禮福壽隆貴四十餘年雖漢之馬鄧無以加焉女學士宋尚宫附唐書曰女學士尚宫宋氏者名􅀂昭貝州清陽人父庭芬丗爲儒學至庭芬有詞藻生五女皆聦惠庭芬始敎以經藝旣而課爲詩賦年未及笄皆能屬文長曰􅀂華次曰􅀂昭􅀂倫􅀂憲􅀂荀􅀂華􅀂昭文尤淡麗性復貞素閑雅不尚芳華之飾嘗白父母誓不從人願以藝學􅀭名顯親􅀂華教誨四妹有如嚴師著女論語十篇其言摸倣論語以韋逞母宣文君宋氏代仲尼以曹大家等代顔閔其間問荅悉以婦道所尚􅀂昭注解皆有理致貞元四年昭義節度使李抱眞表薦以聞德宗俱召入宫試以詩賦兼問經史中大義深加賞歎德宗能詩與侍臣唱和相屬亦令􅀂華姊妹應制每進御無不稱善嘉其節槩不羣不以宫妾遇之呼爲學士先生庭芬起家受饒州司馬習藝館内教賜第一區給俸料元和末􅀂華卒贈河内郡君自貞元七年巳後宫中記注簿籍􅀂華掌其事穆宗復令􅀂昭代司其職拜尚宫姊妹中􅀂昭尤通暁人事自憲穆敬三帝皆呼爲先生六宫嬪媛諸王公主駙馬皆師之爲之致敬進封梁國夫人寳曆初卒將葬詔所司供鹵簿敬宗復令􅀂憲代司宫籍文宗好文以􅀂憲善屬文能論議奏對尤重之大和中坐駙馬沈􅔲事幽􅀂憲於外第賜死穆宗王太后唐書曰穆宗㳟僖皇太后王氏越人父紹卿婺州金華令后少入太子宫元和四年生敬宗穆宗皇帝即位立爲妃長慶四年二月尊爲皇太后文宗即位之初號寳曆太后穆宗蕭皇后唐書曰穆宗貞獻皇后蕭氏福建人􅀄入十六宅爲建安王侍者元和四年生文宗皇帝寳曆三年敬宗崩中尉王守澄率兵討賊迎江王即位文宗踐祚之月奉􅁽}
