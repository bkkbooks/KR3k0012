  - {type: variant, offset: 401, length: 685, content: 知也后姑為尼頗能講道世宗初人講禁中積數世諷左右稱后姿行世宗聞之乃召入掖庭為承華世婦而椒庭之中以國舊制相與祈祝皆願生諸王公主不願生太子也惟后每謂夫人等言天子豈可獨有兒子何緣畏一身之死而令皇家不育冢嫡乎及肅宗在孕同列猶以故事相恐勸為諸計后固意確然幽夜獨誓云但使所懷是男次第當長子生身死所不辭也既誕肅宗進為充華嬪先是世宗頻喪皇子自以春秋長矣深加慎護為擇乳母皆取良家宜子者養於別宮皇后及充華嬪皆莫得而撫視焉及肅宗踐祚尊后為皇太妃後尊為皇太后臨朝聽政猶稱殿下令以行事後改令稱詔群臣上書曰陛下自稱曰朕太后以肅宗冲幼未堪親祭欲傍周禮夫人與君交獻之義代行祭禮訪尋故式門下召禮官愽士議以為不可而太后欲以惟慢自鄣觀三公行事重問侍中崔光光便據漢和熹鄧后熹音熙薦祭故事太后大悅遂攝行祠祀太后性聰悟多才藝姑既為尼幼相依託略得佛經大義親覽萬機手筆斷決幸西林園法流堂命侍臣射不能射者罰之又自射針孔中之大悅賜左右布帛有差先是太后勑造申訟車時復御焉出自雲龍大司馬門從宮西而北入自千秋門以納冤訟又親策孝秀州郡計吏於朝堂太后與肅宗幸華林園宴群臣于都亭曲水令王公以下賦七言詩太后詩曰化光造物含氣貞肅宗詩曰恭已無為賴慈英王公以下賜帛有差太后父薨百寮表請公除太后不許尋幸永寧寺觀建剎於九級之基僧尼士女赴者數萬人后幸左藏公主嬪女已下從者百餘人皆令任力負布絹即以賜之尋幸闕口溫水登雞頭山自射象牙簪一發中之勑示文武時太后得志逼幸清河王懌媱亂肆情為天下所惡領軍元又長秋卿劉騰等奉肅宗於顯陽殿幽太后於北宮於禁中殺懌自劉騰死義又寬怠太后與肅宗及高陽王雍為計解又領軍太后復臨朝大赦改元自是朝政踈緩威恩不立天下牧守所在貪惏音嵐鄭儼, WYG: 容徳冠絶特}
