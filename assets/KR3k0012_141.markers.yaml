  - {type: variant, offset: 1125, length: 817, content: 方之所厭穢文武懈體所在亂逆土崩魚爛始於此矣及武太元年爾朱榮稱兵渡河太后盡召明帝六宮皆令入道太后亦自落髮榮遣騎拘送太后及幼主河陰太后對榮多所陳說榮拂衣而起太后及幼主並沉於河水太后妹馮翊君收瘞於雙靈寺武帝時始葬以后禮而追加謚焉又曰靈太后頗事莊飾數出遊幸元順面諍曰禮婦人夫喪自稱未亡人首去珠珥音餌衣不被綵陛下母臨天下年垂不惑過修容飾何以示後世靈太后慚而還入召順責曰千里相徵豈欲眾見辱也順曰陛下盛服炫容不畏天下所笑何恥臣之一言乎孝明胡皇后後魏書曰孝明胡皇后靈太后從兄冀州刺史盛之女也靈太后欲榮重門族故立為皇后肅宗頗在酒德專嬖充華潘氏及嬪御並無過寵太后為肅宗選納抑屈人流時愽陵崔孝芬女范陽盧道約女隴西李瓚等女俱為世婦諸人訴訟咸見忿責武太初后既入道遂居於瑤光寺焉西魏孝武高皇后後魏書曰孝武皇后高氏齊神武長女也帝見立乃納為后及帝西幸關中降為彭城王妃文帝乙弗后後魏書曰文帝文皇后乙弗氏河南洛陽人也其先世為吐谷渾渠帥居青海號青海王涼州平后之高祖莫瓌擁部落入附拜定州刺史封西平公自莫瓌後三世尚公主女乃多為王妃甚見貴重父瑗儀同三司兗州刺史母淮陽長公主孝文之第四女也后美容儀少言笑年數歲父母異之指示諸親曰生女何妨也若此者實勝男年十六文帝納為妃及帝即位以大統元年冊為皇后后性好節儉蔬食故衣珠玉羅綺絕於服玩又仁恕無嫉妬之心帝益重之生男女十二人多早夭唯太子及武都王戍存焉時新都關中務欲東討蠕蠕音軟寇邊未遑北伐故帝結婚以撫之於是更納悼后命后遜居別宮出家為尼悼后猶懷猜忌復徙后居秦州依子秦州刺史武都王帝雖限大計恩好不忘後密令養髮有追還之意然事祕禁外無知之者六年春蠕蠕舉國渡河前驅已過而頗有言虜為悼后之故興此役帝曰豈有百萬之眾為一女子舉也雖然致此物論朕亦何顏以見將帥耶乃遣中常侍曹寵齎手勑令后自盡后奉勑揮淚謂寵曰願至尊享千萬歲天下康寧死無恨也因命武都王前與之決遺語皇太子辭皆悽愴因慟哭久之侍御咸垂涕失聲莫能仰視召僧設供令侍婢數十人出家手為落髮事畢乃入室引被入自覆而崩年三, SBCK: ''}
