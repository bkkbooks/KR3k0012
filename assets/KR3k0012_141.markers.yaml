  - {type: variant, offset: 183, length: 4, content: 稀得進御, krp: 其如之何密令說懷去胎藥而入太子於曲室躬自煑藥醺然似寐夢神人覆鼎旣寤如夢如是者三太子異之告說說曰天命也無冝他慮旣而太平誅后果生肅宗皇帝太子妃王氏無子后班在下后不敢母肅宗王妃撫鞠慈甚所生開元中肅宗爲忠王后爲妃又生寧親公主張說以舊恩特承寵異說亦竒忠王儀表心知運曆所鍾故寧親公主降說子垍開元十七年后薨葬細栁原肅宗張皇后唐書曰肅宗張皇后本南陽西鄂人後徙家昭應祖母竇氏玄宗母昭成皇太后之妹也昭成爲天后所殺玄宗㓜失所恃爲竇姨鞠養景雲中封鄧國夫人父去逸天寳中選入太子宫爲良娣后辯惠豐碩巧中上旨禄山之亂玄宗幸蜀太子與良娣俱從車駕渡渭百姓遮道請留太子收復長安肅宗姓仁孝以上皇播越不欲違離左右宦者李靖忠啓太子請留良娣賛成之白於玄宗太子如靈武時賊巳䧟京師從官單寡道路多虞毎太子次舎宿止良娣必居其前太子曰捍禦非婦人之事何以居前良娣曰今大家跋履險難兵衛非多恐有倉卒妾自當之大家可由後而出庶幾無患}
