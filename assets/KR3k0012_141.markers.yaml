  - {type: variant, offset: 1087, length: 521, content: 私宮掖勢傾海內李神軌徐紇並見親待一二年中位總禁要手握王爵輕重在心宣淫於朝為四方之所厭穢文武懈體所在亂逆土崩魚爛始於此矣及武太元年爾朱榮稱兵渡河太后盡召明帝六宮皆令入道太后亦自落髮榮遣騎拘送太后及幼主河陰太后對榮多所陳說榮拂衣而起太后及幼主並沉於河水太后妹馮翊君收瘞於雙靈寺武帝時始葬以后禮而追加謚焉又曰靈太后頗事莊飾數出遊幸元順面諍曰禮婦人夫喪自稱未亡人首去珠珥音餌衣不被綵陛下母臨天下年垂不惑過修容飾何以示後世靈太后慚而還入召順責曰千里相徵豈欲眾見辱也順曰陛下盛服炫容不畏天下所笑何恥臣之一言乎孝明胡皇后後魏書曰孝明胡皇后靈太后從兄冀州刺史盛之女也靈太后欲榮重門族故立為皇后肅宗頗在酒德專嬖充華潘氏及嬪御並無過寵太后為肅宗選納抑屈人流時愽陵崔孝芬女范陽盧道約女隴西李瓚等女俱為世婦諸人訴訟咸見忿責武太初后既入道遂居於瑤光寺焉西魏孝武高皇后後魏書曰孝武皇后高氏齊神武長女也帝見立乃納為后及帝西幸關中降為彭城王妃文帝乙弗后後魏書曰文帝文皇后乙弗氏河南洛陽人也其先世為吐谷渾渠帥居青海號青海王涼州平后之高祖莫瓌擁部落入附拜定州刺史封西平公自莫瓌後三世尚公主女乃多為王妃甚見貴重父瑗儀同三司兗州刺史母淮陽長公主孝文之第四女也后美容儀少言笑年數歲父母, WYG: ''}
