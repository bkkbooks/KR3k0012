  - {type: variant, offset: 177, length: 3, content: 重性妬, SBCK: 異光宅元年立爲德妃生􅀇宗及金仙玉真二公主長壽二年爲户婢團兒誣讚與肅明皇后厭蠱呪詛正月二日朝則天皇后於嘉豫殿旣退而同時遇害梓宫秘宻莫知所在睿宗即位謚曰昭成皇后招魂葬於都城之南陵曰靖陵􅀇宗廢王皇后唐書曰􅀇宗廢后王氏同州下邳人梁兾州刺史神念之後上爲臨淄王時納后爲妃上將起事頗預宻謀賛成大業先天元年立爲皇后以父仁皎爲太僕卿后兄守一以后無子嘗懼有廢立導以符厭之事有左道僧明悟爲􅀕南北斗刻霹靂木書天地字及上諱合而佩之且呪曰佩此有子當與則天皇后爲此事發上親究之皆驗下制廢爲庶人守一賜死其年十月庶人卒以一品禮葬於無相寺寳應元年雪􅁈復尊爲皇后􅀇宗武皇后唐書曰􅀇宗貞順皇后武氏則天從父兄子􅁪安王攸正女也攸正卒後后尚㓜隨例入宫上即位漸承恩寵及王庶人廢後特賜號爲惠妃宫中禮秩一同皇后惠妃開元初産夏悼王及懷安哀王上仙公主並襁褓不育上特垂傷悼及生壽王􅈘不敢養於宫中命寧王憲於外養之又生盛王􅄾咸冝太華二公主惠妃以開元二十五年薨年四十餘楊貴妃唐書曰􅀇宗楊貴妃父􅀇琰蜀州司户妃早􅀌養於叔父􅀇璬開元初武惠妃特承寵遇故王皇后廢黜二十四年惠妃薨帝哀悼乆之後庭數千無可意者或奏􅀇琰女姿色冠代冝蒙召見時妃衣道士服號曰太眞旣進見􅀇宗大恱不朞歳恩禮如惠妃太眞姿質豐艷善歌舞通音律智筭過人每倩盻承迎動移上意宫中呼爲娘子禮數實同皇后有姊三人皆有才貌􅀇宗並封國夫人天寳中安禄山大立邊功上深寵之禄山來朝帝令貴妃姊妹與禄山結爲兄弟禄山母事妃每宴賜􅃬賚稠沓及禄山叛露檄數國忠之罪河北盗起􅀇宗以皇太子爲天下兵馬元帥􅁥撫軍國事國忠大懼諸楊聚哭貴妃衘土陳請帝遂不行内禪及潼􅀜失守從幸至馬嵬禁軍大將陳􅀇禮宻啓太子誅國忠父子旣而六軍不散􅀇宗遣力士宣問對曰賊夲尚在盖指貴妃也力士復奏帝不獲巳與妃決遂縊死於佛室時年三十八瘞於驛西道側􅀇宗楊皇后唐書曰􅀇宗元獻皇后楊氏弘農華隂人后景雲元年八月選入太子宫時太平公主用事尤}
