  - {type: variant, offset: 2334, length: 610, content: 為皇后志操明秀帝深重之專寵後宮不置嬪御帝既廢崩后亦以忠於魏室羅禍恭帝若干后後魏書曰恭帝皇后若干氏司空長樂公正惠之女也有容色恭帝納之為妃及即位立為皇后後出家為尼在佛寺葬竟無謚東魏孝靜高皇后後魏書曰孝靜高皇后齊獻武王之第二女也天平四年詔娉以為皇后王前後固辭帝不許興和初詔侍中司空孫騰司空公襄城王旭一云昶兼尚書令司州牧西河王悰藏宗切兼太常卿及宗正卿元孝支等奉詔致禮并備宮官侍衛以后駕迎於晉陽之丞相第五月立為皇后大赦天下齊受禪降為山王妃後周文元皇后後周書曰文元皇后魏孝武妹初封平原公主適開府張歡遇后無禮帝殺歡改封后馮翊公主以配太祖生孝閔薨祔葬成陵文叱奴后後周書曰文叱奴后太祖為丞相納后為姬生高祖高祖即位後尊為皇太后建德三年三月己酉崩四月丁巳葬固陵閔元后後周書曰閔元皇后名胡摩魏文帝第五女初封晉安公主愍帝為洛陽公尚焉及踐祚立為皇后帝被廢后出俗為尼高祖誅晉公護上帝尊號為愍帝以后為孝愍皇后號崇義宮隋氏革命出居里第大業十二年殂明獨孤后後周書曰明獨孤后太保衛公信之長女也帝在藩納為夫人帝即位立為王后在位數日崩葬昭陵世宗崩與后祔葬之武阿史那后後周書曰武阿史後突厥木杆可汗俟斤之女突厥蠕蠕而恕反後盡有塞表之地控弦十數萬於是陵逼中原太祖方與齊人爭衡結以為媛俟斤初欲以女配帝保定五年二月詔陳公純等備皇后文物及行殿并六宮已下一百二十人至俟斗牙帳所迎后俟斗又許齊人以婚將有異志純等在彼累載不得返命會雷風大起飄壞其穹廬等旬日不止俟斗大懼以為天譴去戰切, WYG: ''}
