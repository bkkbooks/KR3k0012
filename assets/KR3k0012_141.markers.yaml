  - {type: variant, offset: 177, length: 1, content: 重, WYG: 待光宅元年立為徳妃生𤣥宗及金仙玉真二公主長夀二年為戸婢團兒誣譖與肅明皇后厭蠱呪詛正月二日朝則天皇后於嘉豫殿既退而同時遇害梓宫秘宻莫知所在睿宗即位諡曰昭成皇后招䰟葬於東都之南陵曰靖陵𤣥宗廢王皇后唐書曰𤣥宗廢皇后王氏同州下邽人梁冀州刺史神念之後上為臨淄王時納為妃上将起事頗預宻謀贊成大業先天元年立為皇后以父仁皎為太僕卿后兄守一以后無子嘗懼有廢立導以符厭之事有左道僧明悟為祭南北斗刻霹靂木書天地字及上諱合而佩之且呪曰佩此有子當與則天皇后為比事發上親究之皆騐下制廢為庻人守一賜死其年十月卒以一品禮葬於無相寺寳應元年雪寃復尊為皇后𤣥宗武皇后唐書曰𤣥宗貞順皇后武氏則天從父兄子恒安王攸止女也攸止卒後后尚幼隨例入宫上即位漸承恩寵及王庻人廢後特賜號為惠妃宫中禮秩一同皇后惠妃開元初産夏悼王及懐哀王上仙公主並襁褓不育上特垂傷悼及生夀王瑁不敢養於宫中命寧王憲於外養之又生盛王琦咸宜太華二公主惠妃以開元二十五年薨年四十餘楊貴妃唐書曰𤣥宗楊貴妃父元琰蜀州司戸妃幼孤養於叔父元璬開元初武惠妃特承恩遇故王皇后廢黜二十四年惠妃薨帝哀悼乆之後庭數千無可意者或奏元琰女姿色冠代冝蒙召見時妃衣道士服號曰太真既進見𤣥宗大悦不期嵗恩禮如惠妃太真姿質豐艶善舞通音律智筭過人毎倩盼承迎動移上意宫中呼為娘子禮數寔同皇后有姊三人皆有才貎𤣥宗並封為國夫人天寳中安禄山大立邉功上深寵之禄山來朝帝令貴妃姊妹與禄山結為兄弟禄山母事妃每宴賜賚稠沓及禄山叛露檄數國忠之罪河北盗起𤣥宗以皇太子為天下兵馬元帥監撫軍國事國忠大懼諸楊聚哭貴妃銜土陳情帝遂不行内禪及潼闗失守從幸至馬嵬禁軍大將陳元禮宻白太子誅國忠父子既而六軍不散𤣥宗遣力士宣問對曰賊本尚在盖貴妃也力士復奏帝不獲己與妃訣遂縊死於佛堂時年三十八瘞於驛西道側𤣥宗楊皇后唐書曰𤣥宗元獻皇后楊氏𢎞農華隂人景雲元年八月選入太子宫時太平公主用事尤忌東宫宫中左右持兩端而潛附太平者必隂伺察事雖纎芥皆聞於上太子心不自安后時方娠太子宻語侍讀張説曰用事者不欲吾多息裔恐禍及此婦人其如之何宻令説懐去胎藥而入太子於曲室躬自煑藥醺然似寐夢神人覆鼎既寤復夢如是者三太子異之告説説曰天命也無他慮既而太平誅后果生肅宗皇帝太子妃王氏無子后班在下后不敢母肅宗為王妃所鞠慈甚所生開元中肅宗為忠王而妃又生寧親公主張説以舊恩特承寵異説亦竒忠王儀表心知運厯所鍾故寧親公主降説子垍開元十七年后薨葬細桞原肅宗張皇后唐書曰肅宗張皇后本南陽西鄂人家昭應祖母竇氏𤣥宗母昭成皇太后之妺也昭成為天后所殺𤣥宗幼失所恃為竇姨鞠養景雲中封鄧國夫人父去逸天寳中選入太子宫為良娣后辨慧豐碩巧中上㫖禄山之亂𤣥宗幸蜀太子與良娣俱從車駕渡渭百姓遮道請留太子收復長安肅宗}
