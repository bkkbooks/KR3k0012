  - {type: variant, offset: 174, length: 0, content: '', WYG: 初武皇后貞觀末隨太宗嬪御居於感業寺后及左右數為之言髙宗由是復召入宫立為昭儀俄而漸承寵恩遂與后及良娣蕭氏逓相譖毁帝終不納后言而武昭儀寵日厚后懼不自安宻與母劉氏求巫氏厭勝事發帝大怒斷劉氏不許入宫將廢后長孫無忌禇遂良等固諫乃止俄又納李義府之䇿永徽六年廢后及蕭良娣皆為庻人囚别院武昭儀令人皆縊殺之中宗趙皇后唐書曰中宗和思皇后趙氏京兆長安人父瓌尚髙祖女常樂公主中宗為英王時納后為妃既而妃母公主得罪妃亦坐幽死於内侍省則天臨朝瓌為夀州刺史坐與越王貞連謀被誅公主亦坐死神龍元年贈后諡為恭皇后及中宗崩將葬於定陵追諡后為和思莫知瘞所以皇后禕衣於陵所寢宫招䰟置衣於䰟輦以太牢告於衣遷於寝宫舒於御榻之右覆以夷衾而祔葬焉中宗廢韋皇后唐書曰中宗韋庻人京兆萬年人也中宗為太子時納后為妃仍擢后父元貞為豫州刺史嗣聖元年立為皇后其年中宗見廢后隨徙房州時中宗懼不自安每使至惶恐欲自殺后勸王曰禍福倚伏何常之有豈失一死何遽如是也每同艱危情義甚篤所生懿德太子永泰永壽長寧安樂四公主安樂最幼生於房州帝自脫衣裹之遂名曰裹兒特寵異焉及中宗召還立為太子又立后為妃中興初復立為皇后帝在房州時常謂后曰一朝見天日乃不相禁忌及得志後受上官昭容邪説引武三思入宫升御床與后雙陸帝為㸃籌以為歡笑醜聲日聞於外景龍四年六月帝遇暴崩后懼秘不發喪及臨淄王勒兵入内后懼駭遁入殿前飛騎營及武延秀安樂公主皆為亂兵所殺追貶為庶人上官昭容唐書曰中宗上官昭容名婉兒西臺侍郎儀之孫也父庭芝與儀同被誅婉兒時在襁褓隨配入掖庭及長有文詞明習史事則天時婉兒忤㫖當誅則天惜其才不殺但黥其面而已自聖厯以後百司表奏多令叅决中宗即位又令専掌制命深被信任尋拜為昭容婉兒既與武三思滛亂每下制勅多因事推尊武氏而排抑皇家節愍太子深惡之及舉兵至肅章門扣閤索婉兒婉兒大言曰觀其此意即當次索皇后以及大家帝與后隨激怒并將婉兒登𤣥武門樓以避兵鋒俄而事定婉兒常勸帝廣置招文學士盛引當朝詞學之臣數賜遊宴賦詩唱和婉兒每代帝及后長寧安樂二公主數首並作辭甚綺麗時人咸諷誦之婉兒俄又通於吏部侍郎崔湜引知政事湜嘗充使開商山新路功未半而中宗崩婉兒代草遺制曲加褒賞及韋庻人敗婉兒亦斬於纛下睿宗劉皇后唐書曰睿宗肅明順聖皇后劉氏父延景陜西刺史儀鳯中睿宗居藩納后為孺人尋立為妃生寧王憲夀昌代國二公主睿宗即位冊為皇后又降為皇嗣后後降為妃長夀中與昭成皇后同被譴為則天所殺景雲元年追諡肅明皇后招䰟葬於東都城南陵曰惠陵睿宗竇皇后唐書曰睿宗昭成順聖皇后竇氏父孝諶潤州刺史后姿容婉順動循禮則睿宗為湘王時納為孺人}
