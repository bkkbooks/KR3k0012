  - {type: variant, offset: 140, length: 3, content: 宣武高, WYG: 太宗賢妃徐氏名惠右散騎常侍堅之姑也生五月而能言四嵗誦論語毛詩八嵗好屬文其父孝徳試擬楚辭曰山中不可以乆留詞甚典美自此遍渉經史手不釋巻太宗聞之納為才人其所屬文揮翰立成詞華綺贍俄拜媫妤再遷充容時軍旅亟動宫室稍興百姓頗倦勞役上䟽諌之太宗善其言優賜甚厚及太宗崩追思顧遇之恩哀慕愈甚發疾不自醫疾甚謂所親曰吾荷顧實深志在早殁䰟其有靈得侍園寢吾之志也因為七言詩及連珠以見志永徽元年卒時年二十四詔贈賢妃陪葬於昭陵之石室髙宗廢王}
