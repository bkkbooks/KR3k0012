  - {type: variant, offset: 29, length: 5, content: 世宗始親政, SBCK: 后母周武帝姊襄陽長公主后生而髮垂過頸三􅀊與身齊周武帝特愛重之養於宫中時武帝納突厥女爲后無寵后尚㓜竊言於帝曰四邊未靜突厥尚強願舅抑情撫慰以蒼生爲念但得突厥之助則江南􅀜東不能爲患矣武帝􅀷納之毅聞之謂長公主曰此女才貌如此不可妄以許人當爲求賢夫乃於門屏􅀞二孔雀諸公子有求婚者輙與兩箭射之濳約中目者許之前後數十軰莫能中髙祖後至兩發各中一目毅大恱遂歸于我及周武帝崩后追思如䘮所生隋文帝受禪后聞而流涕自投於床曰恨我不爲男以救舅氏之難毅與長公主遽掩口曰汝勿妄言滅吾族矣后}
