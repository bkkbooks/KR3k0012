  - {type: 'tls:seg', offset: 181, content: '', id: KR3k0012_CHANT_141-2a.13}
  - {type: variant, offset: 181, length: 1, content: 宮, SBCK: 東宫宫中左右持兩端而濳附太平者必隂伺察事雖纎芥皆聞於上太子心不自安后時方娠太子宻謂侍讀張􅀃曰用事者不欲吾多息􅒨恐禍及此婦}
  - {type: variant, offset: 181, length: 7, content: 宮人稀得進御及, WYG: 作勞安可容易后曰此非妾自養之時須辦大家事}
  - {type: variant, offset: 181, length: 1, content: 宮, krp: 東宫宫中左右持兩端而濳附太平者必隂伺察事雖纎芥皆聞於上太子心不自安后時方娠太子宻謂侍讀張說曰用事者不欲吾多息裔恐禍及此婦}
  - {type: variant, offset: 183, length: 4, content: 稀得進御, SBCK: 其如之何密令􅀃懷去胎藥而入太子於曲室躬自煑藥醺然似寐夢神人覆鼎旣寤如夢如是者三太子異之告􅀃􅀃曰天命也無冝他慮旣而太平誅后果生肅宗皇帝太子妃王氏無子后班在下后不敢母肅宗王妃撫鞠慈甚所生開元中肅宗爲忠王后爲妃又生寧親公主張􅀃以舊恩特承寵異􅀃亦竒忠王儀表心知運曆所鍾故寧親公主降􅀃子垍開元十七年后薨葬細栁原肅宗張皇后唐書曰肅宗張皇后本南陽西鄂人後徙家昭應祖母竇氏􅀇宗母昭成皇太后之妹也昭成爲天后所殺􅀇宗㓜失所恃爲竇姨鞠養景雲中封鄧國夫人父去逸天寳中選入太子宫爲良娣后辯惠豐碩巧中上旨禄山之亂􅀇宗幸蜀太子與良娣俱從車駕渡渭百姓遮道請留太子收復長安肅宗姓仁孝以上皇播越不欲違離左右宦者李靖忠啓太子請留良娣賛成之白於􅀇宗太子如靈武時賊巳䧟京師從官單寡道路多虞毎太子次舎宿止良娣必居其前太子曰捍禦非婦人之事何以居前良娣曰今大家跋履險難兵衛非多恐有倉卒妾自當之大家可由後而出庶幾無患}
