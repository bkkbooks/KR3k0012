  - {type: 'tls:seg', offset: 178, content: '', id: KR3k0012_CHANT_141-2a.12}
  - {type: variant, offset: 179, length: 1, content: 妬, WYG: 仁孝以上皇播越不欲違離左右宦者李靖忠啓太子請留良娣贊成之於是冊太子如靈武時賊䧟京師從官單寡路道多虞每太子次舎宿止良娣必居其前太子曰捍禦非婦人之事何以居前良娣曰大家䟦履險艱兵衛非多恐有倉卒妾自當之大家可由後而出庻幾無患及至靈武産子三日起縫戰士衣太子勞之曰産}
