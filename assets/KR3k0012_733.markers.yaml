  - {type: variant, offset: 2400, length: 1, content: 二, WYG: 六年真人應之在此矣又曰初吳之未㓕也斗牛之間有紫氣道術者皆以吳方強盛未可圗也惟張華以為不然及吳平之後紫氣愈明又曰陳訓字道元厯陽人也學天文筭歴隂陽占候無不畢綜尤善風角孫皓以為奉禁都尉使其占候皓政嚴酷訓知其必敗而不敢言時錢塘湖開或言天下當太平青蓋入洛陽皓以問訓訓曰臣止能望氣未達湖之開塞退而告人曰青蓋入洛將有輿襯銜璧之事非吉祥也尋而吳亡及陳敏作亂弟宏為厯陽太守訓謂邑人曰陳家無王氣不久當㓕宏聞將斬之訓鄉人秦璩為宏參軍乃說宏曰訓善風角可試之如不中徐斬未晚也乃赦之時宏攻征東叅軍衡彦於厯陽乃問訓曰城中有幾千人攻之可拔不訓登牛渚山望氣曰不過五百人然不可攻攻之必敗宏復大怒曰何有五千人攻五百人而不得拔之令將士攻之果為彦所敗方信訓有道術乃優遇之宋紀曰齊宣帝墳塋在武進縣常有雲氣氲人故元嘉中望氣者稱此地有天子氣後周書曰蔣昇字鳳起少善天文𤣥象之學太祖雅信待之常侍左右以備顧問大統三年東魏將竇㤗入㓂濟自風陵頓軍潼關太祖出師馬牧澤時西南有黄紫氣抱}
