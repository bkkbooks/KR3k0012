  - {type: variant, offset: 2297, length: 3, content: 作郡加, WYG: 受災嵗鎮二星共合翼軫從子及已徘􅆦六年荆郢之分嵗鎮所守其下國昌豈非功德之徵也今年六月鎮星前角亢角亢鄭之分嵗星移入房太白在心房宋分順之者昌逆之者亡石季龍若興兵東南此其死㑹官若應取天與不取反受其咎侃志在中原聞而大喜㑹病篤不果行而薨又曰祖逖將城武牢未成而逖病甚先是華譚庾闡問術人戴洋洋曰祖豫州九月當死初有妖星見於豫州之分又曰陳訓謂人曰今年西北大}
