  - {type: 'tls:seg', offset: 2363, content: '', id: KR3k0012_CHANT_733-14a.26}
  - {type: variant, offset: 2365, length: 0, content: '', WYG: 遁去遂終身不仕吳志曰孫權征黄祖軍行及潯陽吳範見風氣}
  - {type: variant, offset: 2366, length: 1, content: 赦, WYG: 詣船賀催兵急行至即破祖祖夜亡權恐失之範曰未遠必生擒祖至五更果}
  - {type: variant, offset: 2368, length: 0, content: '', WYG: 之晉書曰祖約鎮譙梁國人反戴洋曰賊以辛酉反辛德在南方酉受刑梁在譙北乗德伐刑賊必破亡及甲子日東風而雷西行譙在南雷在軍前為軍驅除昔吳伐關羽天雷在前周瑜拜賀今與徃同故知必尅約從之果平又曰洋徃潯陽時劉𦙍鎮潯陽九月甲寅申時迴風從東來入𦙍兒船中西過狀如疋練長五六丈洋曰風從咸池下來攝提下去咸池為刀兵大殺為死䘮到甲子日申時府内大聚骨埋之𦙍問在何處洋曰不}
  - {type: page-break, offset: 2368, content: '', id: KR3k0012_WYG_733-9a, image: WYG0899/WYG0899-0466a.png}
  - {type: punctuation, offset: 2369, content: 。, id: KR3k0012_CHANT_733-bkkpn685}
  - {type: 'tls:seg', offset: 2369, content: '', id: KR3k0012_CHANT_733-14a.27}
  - {type: variant, offset: 2369, length: 6, content: 康帝將登祚使, WYG: 州府門也𦙍架東門}
  - {type: punctuation, offset: 2374, content: ，, id: KR3k0012_CHANT_733-bkkpn686}
  - {type: 'tls:seg', offset: 2374, content: '', id: KR3k0012_CHANT_733-14a.28}
  - {type: variant, offset: 2376, length: 1, content: 擇, WYG: 又曰東為天牢牢下開門憂天獄至十二月十七}
  - {type: punctuation, offset: 2378, content: ，, id: KR3k0012_CHANT_733-bkkpn687}
  - {type: 'tls:seg', offset: 2378, content: '', id: KR3k0012_CHANT_733-14a.29}
  - {type: variant, offset: 2379, length: 0, content: '', WYG: 又曰臘近可開門}
  - {type: variant, offset: 2380, length: 5, content: 為宜用三月, WYG: 五十人備守并以百人備東北寅上以却害氣裔不從}
  - {type: page-break, offset: 2380, content: '', id: KR3k0012_WYG_733-9b, image: WYG0899/WYG0899-0466b.png}
  - {type: variant, offset: 2389, length: 2, content: 景午, WYG: 壬辰裔遂為郭黙所害北齊書曰權㑹明風角𤣥象曾令家人遠行久而不反其行還垂欲至宅乃逢寒雪寄息他舍㑹方處學堂講說忽有旋風瞥然吹雪入戸㑹乃笑曰行人至何意中停遂命使人令詣其處追尋果如語每為人占筮小大必中但用爻辭彖象以辯吉凶占雨後漢書曰任文公為侍中從事時天大旱白刺史曰五月一日當有大水其變已至不可防救宜令吏人豫為其備刺史不聼文公獨儲大舩百姓或聞頗有為防者到其日旱烈文公急促載使白刺史笑之日將中天北雲起湏臾大雨至餔時湔水涌起十餘丈突壞廬舍所害數千人又曰髙獲善天文曉遁甲能役使鬼神時郡境大旱}
  - {type: page-break, offset: 2389, content: '', id: KR3k0012_WYG_733-10a, image: WYG0899/WYG0899-0466c.png}
  - {type: punctuation, offset: 2391, content: 。, id: KR3k0012_CHANT_733-bkkpn688}
  - {type: 'tls:seg', offset: 2391, content: '', id: KR3k0012_CHANT_733-14a.30}
  - {type: variant, offset: 2392, length: 0, content: '', WYG: 守鮑昱自徃問何以致雨獲曰急罷三部督郵明府當自北出到三十里亭雨可致也昱從之果得大雨又曰揚統善天文推歩之術建初中為皷城令一州大旱統推隂陽消伏縣界䝉澤太守宗湛使統為郡求雨亦即降澍望氣}
  - {type: page-break, offset: 2392, content: '', id: KR3k0012_WYG_733-10b, image: WYG0899/WYG0899-0466d.png}
  - {type: variant, offset: 2393, length: 0, content: '', WYG: 記曰漢文十五年夏四月趙人新垣平以望氣見因說上設立渭陽五廟欲出周鼎當有玉英見漢書曰范増說羽曰沛公居山東時貪財好色今聞其入關珍物無所取婦女無所幸此其志不小吾使人望其氣皆為龍成五色此天子氣急擊之勿失又曰孝武釣弋趙媫好昭帝母也家在河間武帝廵狩過河間望氣者言此有竒女天子使召之既至女兩手皆拳上自披之手即時申由是得幸號曰拳夫人進為媫妤居釣弋宫生昭帝又曰宣帝武帝曾孫戾太子孫生數月遭巫蠱事雖在襁褓猶坐収繫郡獄而邴吉為廷尉監憐之無辜使女徒更乳養望氣者言長安獄中有天子氣上遣使者分條中都官獄繫者輕重皆殺之内謁者}
  - {type: page-break, offset: 2393, content: '', id: KR3k0012_WYG_733-11a, image: WYG0899/WYG0899-0467a.png}
  - {type: page-break, offset: 2393, content: '', id: KR3k0012_WYG_733-11b, image: WYG0899/WYG0899-0467b.png}
  - {type: variant, offset: 2394, length: 4, content: 陳卓奏用, WYG: 郭穰夜至郡獄吉拒閇使者不得入頼吉得全後漢書曰光武紀云望氣者蘇伯阿為王莾使至南陽遥望見舂陵郭唶曰氣佳哉欝欝葱葱然及始起兵還舂陵遠望舍南火赫然屬天有頃不見晉書曰秦時望氣者云五百年後金陵有天子氣故始皇東廵狩以厭之改其地曰秣陵壍北山以絶其勢及孫權之稱號自謂當之考其厯數猶為未及元帝之渡江也乃五百}
