  - {type: variant, offset: 2819, length: 167, content: 陵陷滅高祖為丞相嘗夜召季才而問曰吾以庸虛受茲顧命天時人事卿以為何如季才曰天道精微難可急察竊以人事卜之符兆已定季才縱言不可公豈復得為箕潁之士乎高祖默然久之因舉首曰吾今譬如騎獸誠不得下矣因賜雜綵五十疋絹二百段曰愧公此意宜善為思之大定元年正月季才言曰今月戊戍平旦青氣如樓闕見於國城之上俄而變紫逆風西行氣經云天不能無雲而雨皇王不能無氣而立於今, WYG: 東}
