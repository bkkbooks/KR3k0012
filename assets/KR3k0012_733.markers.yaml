  - {type: variant, offset: 841, length: 136, content: 上生莠子羽曰其莠猶在乎子羽公孫俾以莠喻伯有侈知其不能久存於是歲在降婁降婁中而旦裨竈指之曰猶可以終歲指降婁也歲星十二年而一終歲不及此次也已不及降婁及其亡也歲在娵訾之口娵訾營室東二十八年歲星淫在玄枵今三十年在娵訾是歲星停在玄枵二年其明年乃及降婁又曰昭七年夏四月甲辰朔日有食之晉, WYG: ''}
