  - {type: variant, offset: 587, length: 352, content: 虛危下為蛇所乘龍宋鄭之星也歲星本位在東方東方房心為宋角亢為鄭故以龍為宋鄭之星也宋鄭必饑玄枵虛中也玄枵三宿虛星在其中枵耗名也土虛而民耗不饑何為歲為宋鄭之星今失常經入虛耗之次時復無冰地氣發洩故曰土虛民耗也禆竈曰今茲周王及楚子皆將死禆竈鄭大夫歲棄其次而旅於明年之次以害鳥帑周楚惡之旋客處也歲星棄星紀之次客在玄枵歲星所在其國有福失次於北禍衝在南南為朱鳥鳥尾曰帑鶉火鶉尾周楚之分故周王楚子受其咎俱論歲星過次梓慎則曰宋鄭飢禆竈則曰周楚王死傳故備舉以示卜占唯人所在也又曰子蟜之卒也將葬公孫揮與禆竈晨會事焉會葬事過伯有氏其門上生莠子羽曰其莠猶在乎子羽公孫俾以莠喻伯有侈知其不能久存於是歲在降婁降婁中而旦裨竈指之曰猶可以終歲指降婁也歲星十二年而一終歲不及此次也已不及降婁及其亡也歲在娵訾之口娵訾營室東二十八年歲星淫在玄枵今, SBCK: 到}
