  - {type: variant, offset: 2318, length: 0, content: '', WYG: 傳舍時暴風卒至文公遽起曰諸從事促去當有逆變來害人者因起駕速驅諸從事未能自發郡果使兵殺}
  - {type: variant, offset: 2319, length: 0, content: '', WYG: 文公獨得免又}
