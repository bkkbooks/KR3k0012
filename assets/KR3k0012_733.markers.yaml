  - {type: variant, offset: 1776, length: 478, content: 汰侈無禮已甚亂所在也後漢書曰謝夷吾字堯卿會稽山陰人也少為郡吏學風角占候太守第五倫擢為督郵時烏程長有贓釁倫使收案其罪夷吾到縣無所驗但望閤伏哭而還一縣驚怪不知所為及還白倫曰竊以占候知長當死近三十日遠不過六十日遊魄假息非刑所加故不收之倫聽其言至月餘日果有驛馬齎長印綬上言暴卒倫以此益禮信之又曰楊由字辰侯蜀郡成都人少習易并七政元氣風雲占候為郡文學掾時有大雀夜集於庫樓太守廉范以問由對曰此占郡內當有小兵然不為害後二十餘日廉柔縣蠻夷反殺傷長吏郡發庫兵擊之由嘗從人飲勑御者曰酒若三行便宜嚴駕既而趨去後主人舍有弗相殺者人請問何以知之由曰向社中木上有鳩弗此兵賊之象也又曰公沙穆遷弘農令永壽元年霖雨大水三輔以東莫不湮沒穆明曉占候乃豫告令百姓徙居高地故弘農人獨得免害又曰段翳字元章廣漢新都人習易經明風角時有就其學者雖未至必豫知姓名嘗告守津吏曰當有諸生二人荷檐問翳舍處者幸為告之後如其言又有一生來學積年自謂略究要術辭歸鄉里翳為合膏藥并以簡書封於筒中告生曰有急發視之生到葭萌與吏爭津吏撾破從者頭生開筒得書言到葭萌與吏蜊頭破者以此膏裹之生用其言創者即愈生歎服乃還卒業翳遂隱居竄跡終于家, WYG: ''}
