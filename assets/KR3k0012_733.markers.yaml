  - {type: variant, offset: 3030, length: 438, content: 日甲子甲為六甲之始子為十二辰之初甲數九子數又九九為天數其日即是驚蟄陽氣壯發之時昔周武王以二月甲子日定天下享年八百漢高帝以二月甲午即帝位享年四百故甲子甲子為得天數今二月甲子宜應天受命上從之開皇初授通直散騎常侍高祖將遷都夜與高熲蘇威二人定議季才旦而奏曰臣仰觀玄象俯察圖記龜兆允襲必有遷都且堯都平陽舜都冀土是知帝王居止世代不同且漢營此城經今八百歲水皆鹹不甚宜人願陛下恊天之心為遷徙之計高祖愕然謂熲等曰是何神也遂發詔施行賜絹三百段馬兩疋進爵為公謂季才曰朕自今已後信有天道矣又曰盧太翼善曆數其後目盲以手摸書而知其字仁壽末高祖將避暑仁壽宮大翼固諫不納至再三太翼曰臣愚豈敢飾詞但恐是行鑾輿不及反高祖大怒繫之長安獄期還而斬之高祖至宮寢疾臨崩謂皇太子曰太翼非常人也前後言事未嘗不中吾來日道當不反今果至此爾宜釋之唐書曰桑道茂者大曆中遊京師善太一遁甲五行災異之說言事無不中代宗召之禁中待詔翰林建中初神策軍脩奉天城道茂請高其垣閭大為制度德宗不之省及朱泚之亂帝倉卒出幸至奉天方思道茂之言時道茂已卒命祭之, WYG: ''}
