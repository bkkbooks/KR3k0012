  - {type: variant, offset: 2356, length: 0, content: '', WYG: 終於家南女亦曉家術為由拳縣人妻晨詣㸑室卒有暴風女便上堂復姑求歸辭其二親姑不許}
  - {type: variant, offset: 2357, length: 1, content: 稱, WYG: 跪而泣曰家代𫝊術風卒起先吹竈突及井此禍為婦女主㸑者妾將亡之應因著其亡日乃聼還家如期}
  - {type: punctuation, offset: 2359, content: ，, id: KR3k0012_CHANT_733-bkkpn683}
  - {type: 'tls:seg', offset: 2359, content: '', id: KR3k0012_CHANT_733-14a.25}
  - {type: variant, offset: 2359, length: 5, content: 收付廷尉俄, WYG: 卒又曰宗郎為吳令時卒有暴風宗占知京師當有大火記識時日遣人參候果如其言諸公聞其表上以愽士徵之宗恥以占騐見知聞徵書到包懸印綬於懸迋}
