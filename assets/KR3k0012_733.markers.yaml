  - {type: variant, offset: 977, length: 1, content: 侯, SBCK: 書日秦時望氣者云五百年後金陵有天子氣故始皇東巡狩以厭之改其地日秣陵壍北山以絕其勢及孫權之稱號自謂當之考其暦數猶爲未及元帝之渡江也乃五百二十六年真人應之在此矣又日初吳之未滅也斗牛之閒有紫氣道術者皆以吴方强盛未可圗也唯張華以爲不然及吳平之後紫氣愈明事見劒門中又曰陳訓字元道厯陽人也學天文筭暦陰陽占候無不畢綜尢善風􅊁孫皓以爲奉東都尉使其占候皓政嚴酷訓知其必敗而不敢言時錢塘湖開或言天下當太平靑蓋入洛時皓以}
