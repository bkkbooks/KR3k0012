  - {type: variant, offset: 10, length: 0, content: '', SBCK: 秋左氏傳說神降于莘其至卽其物也請以日辰推之􅁃午之夕幸未之朝天有雲熒惑之亡當在此二日之内庚之與未皆主於秦辛爲西夷今姚興據咸陽是熒惑入秦矣諸人皆作色日天上失星人安能知其所詣而安說無徵之言浩􅀏而不應後八十日熒惑果岀於東井留守盤疑泰中大旱赤地昆明池水竭童謡訛言國内􅁩擾明年姚興死二子交兵三年國滅於是諸人乃服日非所及也唐書日嚴善思同州朝邑人也少以學涉知名尢善天文厯數及卜相之術則天時爲監察御史稍遷太史令聖曆二年熒惑入輿􅀑則天以問善思善思對曰商姓大臣當之其年文昌左相王及善卒長安中熒惑入月鎮星犯天􅀜善思奏日法有亂臣伏罪且有臣下謀上之象歲餘張柬之敬暉等起兵誅張易之昌宗其占驗皆此􅀋又曰尚獻甫衛州汲人也尢善天文則天時召見起家拜太史令數顧問灾異事皆符驗長安二年獻甫奏曰臣本命納音在金今熒惑犯上諸侯太史之位熒惑火也火能尅金是臣將死之徵則天曰朕爲􅀸穰之遽轉獻甫爲水衡都尉謂日水能生金又去太史之位􅀸無憂矣其秋獻甫卒則天甚嗟異惜之又曰元和八年熒惑犯太微上相厯執法占者言今之三相皆不利始輕末重月餘李絳以足疾免明年十日李吉甫以暴疾卒九年六月武元衡爲盜所害年五十八始元衡與吉甫齊年又同日爲宰相及出鎭分領楊益至吉甫再入元衡亦還吉甫先一年以元衡生月卒元衡後一年以吉甫生月卒吉凶之數若符會焉占風後漢書日郎顗上書日今月十七日戊午徵日也陽嘉二年正月日加申日在申時也風從寅來丑時而止丑寅申皆徵也不有火灾必當爲旱南方爲徵故爲火及旱也願陛下校計繕脩之費求念百姓之勞罷將作之}
