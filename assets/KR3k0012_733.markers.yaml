  - {type: variant, offset: 2296, length: 0, content: '', WYG: 熒惑守胃昴至今年四月積五百餘日昴趙之分野石勒遂死熒惑以七月退從畢右順行入黄道未及天關以八月二十二日復逆行鈎繞畢向昴昴畢為邉兵主外域故置矢弓以射之熒惑逆行司無德之國石勒死是也勒之餘燼已自殘害今年官與太嵗太隂三合癸巳癸為北方北方}
