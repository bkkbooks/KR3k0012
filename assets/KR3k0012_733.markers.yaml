  body:
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 四占星占風占雨望氣占星漢書曰高祖元年十月五星聚東井客謂張耳日東井秦地也漢王入􅀜五星從歲星聚當以義取天下後漢書曰嚴光字子陵少有髙名與光武同遊及帝即位光變姓名隱身不見帝思其賢乃令以物色訪之後齊國上言有一男子􅀍羊裘釣澤中帝疑其光也乃備安車􅀇纁遣使聘之}
  - {type: variant, offset: 4, length: 1, content: 三, WYG: 四}
  - {type: variant, offset: 4, length: 0, content: '', krp: 四占星占風占雨望氣占星漢書曰高祖元年十月五星聚東井客謂張耳日東井秦地也漢王入關五星從歲星聚當以義取天下後漢書曰嚴光字子陵少有髙名與光武同遊及帝即位光變姓名隱身不見帝思其賢乃令以物色訪之後齊國上言有一男子𬒳羊裘釣澤中帝疑其光也乃備安車玄纁遣使聘之}
