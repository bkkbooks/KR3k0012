  - {type: variant, offset: 11, length: 0, content: '', SBCK: 減彫文之飾損庖廚之饌退宴私之樂又日任文公巴郡閬中人也閬中今隆川縣父文孫明曉天官風星秘要文公少脩父術州辟從事哀帝時有越嶲太守欲反刺史大懼遣文公等五從事檢行郡界潜伺虚實共止傳舎時暴風卒至文公遽起白諸從事促去當有逆變來害人者因起駕速驅諸從事未能自發郡果使兵殺之文公獨得免又曰李南字孝山丹陽句容人也少篤學明於風􅊁和帝永元中太守馬稜坐盜賊事􅀍徵當詣廷尉吏人不寧南特通謁賀稜意有恨謂日太守不德今當即罪而君反相賀耶南日旦有善風明日中時應有吉問故來稱慶旦日稜延望景晏以爲無徵至晡乃有驛使齎詔書原停稜事南問其遲留之狀使者曰向渡宛陵浦里航宛陵縣二陽郡航以舟濟水也航何唐切也馬踠足是以不得速踠屈損也稜乃服焉後舉有道辟公府病不行終於家南女亦曉家術爲由拳縣人妻晨詣爨室卒有暴風婦便上堂從姑求歸辭其二親姑不許乃跪而泣曰家代傳術風卒起先吹竈突及井此禍爲婦女主爨者妾將亡之應因著其亡日乃聽還家如期病卒又日郎}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_SBCK_733-5a}
