  - {type: variant, offset: 12, length: 1, content: 伯, SBCK: 爲吳令時卒有暴風宗占知京師當有大火記識時日遣人參候果如其言諸公聞而表上以愽士徵之宗耻以占驗見知聞徵書到包懸印綬於縣廷而遁去遂終身不仕吳志日孫權征黄祖軍行及潯陽哭範見風氣因詣舡賀催兵急行至郞破祖祖夜亡權恐失之範日未遠必生擒祖至五更果得之權與吕蒙謀襲關羽議之近臣多日不可權以問範範日得之在後王辛德在南方酉受自刑梁作譙北乘德伐刑賊必破亡及甲子日東風而雷西行譙在南雷在軍前爲軍驅除昔吳伐關羽天雷在前瑜拜賀今往同故知必尅約從之果平梁城洋往潯陽時劉裔鎮潯陽九月甲申時廻風從東來入裔兒舡中西過狀如疋練長五六丈洋日風從咸池中來攝堤}
