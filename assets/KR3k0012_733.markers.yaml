  - {type: variant, offset: 2320, length: 1, content: 君, WYG: 李南字孝山丹陽句容人也少篤學明於風角和帝永元中太守馬稜坐盗賊事被徵當詣廷尉吏人不寧南特通謁賀稜意有恨謂曰太守}
  - {type: variant, offset: 2323, length: 0, content: '', WYG: 今當即罪而君且相賀耶南曰旦有善風明日中時應有吉問故來稱慶旦日稜延望景晏以為無徵}
