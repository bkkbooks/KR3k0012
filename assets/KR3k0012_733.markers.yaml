  - {type: 'tls:seg', offset: 5, content: '', id: KR3k0012_CHANT_733-1a.2}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 反而後至帝嘗引光入論道舊故相對累日帝從容問曰朕何如昔時對曰陛下差增於住因共偃卧光以足加帝腹上明日太史奏客星犯御座甚急帝􅀏曰朕故人嚴子陵共卧耳又日李郃字孟節漢中南鄭人也父頡以儒學稱官至博士郃襲父業遜太學通五經善河洛風星外質朴人莫之識縣召署幕門候吏和帝即位分遣使者皆微服單行各至州縣觀採風俗使者二人當到益部投郃舎時夏夕露坐郃因仰觀問日二君發京師時寧知朝廷遣二使耶二人默驚相對視日不聞也問郃何以知之郃指星示云有使星向益州分野故知之耳又曰曹公破袁紹於官渡初􅁊帝時有黄星見於楚宋之分遼東殷馗善天文言後五十歲當有眞人起於梁沛之閒其鋒不可當至是凡五十年而公破􅀽紹天下莫敵也晉書日戴洋善}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_733-1b}
  - {type: variant, offset: 5, length: 0, content: '', krp: 反而後至帝嘗引光入論道舊故相對累日帝從容問曰朕何如昔時對曰陛下差增於住因共偃卧光以足加帝腹上明日太史奏客星犯御座甚急帝笑曰朕故人嚴子陵共卧耳又日李郃字孟節漢中南鄭人也父頡以儒學稱官至博士郃襲父業遜太學通五經善河洛風星外質朴人莫之識縣召署幕門候吏和帝即位分遣使者皆微服單行各至州縣觀採風俗使者二人當到益部投郃舎時夏夕露坐郃因仰觀問日二君發京師時寧知朝廷遣二使耶二人默驚相對視日不聞也問郃何以知之郃指星示云有使星向益州分野故知之耳又曰曹公破袁紹於官渡初桓帝時有黄星見於楚宋之分遼東殷馗善天文言後五十歲當有眞人起於梁沛之閒其鋒不可當至是凡五十年而公破袁紹天下莫敵也晉書日戴洋善}
  - {type: variant, offset: 6, length: 7, content: 候周禮春官宗伯, WYG: 星占風占雨望氣占星漢書曰髙祖元年十月五星聚東井客謂張耳曰東井秦地也漢王入關五星從嵗星聚當以義取天}
