  - {type: variant, offset: 7, length: 2, content: 周禮, SBCK: 揚州刺史嘗問吉凶於洋荅曰熒惑入南斗八月暴水當有客軍西南來如期果大水而石冰作亂冰旣據揚州洋謂人日視賊雲氣四月當破果如其言泰寧二年正月有流星東南行洋日至秋應當壽陽及王敦作逆祖約問其勝敗洋日大白在東方辰星不出兵法先起者爲主應者爲客辰星若出太白爲主辰星爲客長星不岀太白爲客先起兵者敗今有客無主有前無後冝傳檄所部應詔伐之約乃率衆向合肥俄而敦死衆敗遂住壽陽洋又謂曰江淮之閒當有軍事譙城虚曠冝還固守不言然者雍丘沛皆非官有也約不從豫土遂陷於賊南中郞將􅁊宣以洋爲參軍將隨宣往襄陽太守陶侃留之住武昌時侃謀北伐洋日前年十一月熒惑守胃昴至今年四月積五百餘日昂趙之分野石勒遂死熒惑以七月退從畢右順行人潢道未及天關以八月二十二日復逆行還鈎繞畢向昴昴畢爲邊兵主胡夷故置天弓以射之熒惑逆行司無德之國石勒死是也勒之餘燼已自殘害今年官與太歲太陰三合癸已癸爲北方北方當受災歲鎮二星共合翼軫從子及巳徘徊六年荆郢之分歲鎮所守其下國昌豈非功德之徵也今年六月鎮星前角亢角亢鄭之分歲星移入房太白爲心房宋分順之者昌逆之者亡石季龍若興兵東南此其死㑹官若應天與不取反受其咎侃志在中原聞而大喜㑹病篤不果行而薨又曰祖逖將城武牢未成而逖病甚先是華譚􅁃闡問術人戴洋洋曰祖豫州九月當死初有妖星見于豫州之分厯陽陳訓謂人曰今年西北大將軍當死逖亦見星曰爲我矣方平河北而天欲殺我此乃不祐國也俄卒于雍丘又戴記曰苻堅時有大風從西南來俄而晦冥􅁪星皆見又有赤星見于西南太史令魏延言于堅曰於占西南國亡明年必平蜀漢堅大悦又日苻堅以弟融爲鎭東大將軍代王猛爲兾州牧融將發堅祖于灞東奏樂賦詩堅母苟氏以融少子甚憂之比發三至灞上其夕又竊如融所内外莫知是夜堅寢于前殿魏延言天市南門屏内后妃星失明左右閽寺不見后妃移動之象堅問知之驚日天道與人何其不遠遂重星官後魏書曰崔浩明識天文好觀星變常置金銀銅鋌於酢器中令靑夜有所見即以鋌書紙作字以記其異又日姚興死之前歲太史奏熒惑在瓠􅀲星中一夜怱然亡失不知所在或謂下入危亡之國將爲童謡言之妖而後行其灾禍大宗聞之大驚乃召諸碩儒十數人令與吏官求其所詣崔浩對曰案}
