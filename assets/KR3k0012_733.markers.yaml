  - {type: variant, offset: 976, length: 0, content: '', SBCK: 旣至女兩手皆拳上自披之手卽時伸由是得幸號曰拳夫人淮爲婕妤居鈎弋宫生昭帝又日宣帝武帝曾孫戻太子孫生數月遭巫蠱事雖在襁褓猶坐收繫郡邸獄而邴吉爲廷尉監怜之無辜使女徒更乳餋望氣者言長安獄中有天子氣上遣使者分條中都官獄繫者輕重皆殺之内謁者令郭穰夜至郡邸獄吉拒􅐬使者不得入賴吉得全後漢書日光武紀云望氣者蘇伯阿爲王莽使至南陽遥望見舂陸郭唶日唶歎也音子夜反氣佳哉鬱鬱葱葱然及始起兵還舂陵遠望舎南火光赫然屬天有頃不見}
