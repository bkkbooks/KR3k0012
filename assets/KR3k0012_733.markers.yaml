  - {type: variant, offset: 171, length: 642, content: 佩鑴之鑴謂日旁氣剌日也監冠珥也彌氣冠日也隮虹也詩云朝隮于西想雜氣有似可形想掌安宅敘降宅居也降下也人見妖祥則不安主安其居處也次序其凶禍所下謂禳移之正歲則行事占夢以季冬贈惡夢此正月而行安宅之事所以順民歲終則弊其事弊斷也謂計其吉凶然否多少傳曰僖五年正月辛亥朔日南至公既視朔遂登觀臺以望而書禮也視朔親告朔也觀臺臺上搆屋可以遠觀也朔旦冬至曆數之所始治曆者因此則可以明其術數審別陰陽敘事訓民魯君不能常脩此禮故善公之得禮也凡分至啟閉必書雲物分春秋分也至冬夏至也啟立春立夏閉立秋立冬雲物氣色災變也傳重申周典不言公者日官掌其職為備故也素察妖祥逆為之備又襄二十八年曰春無冰梓慎曰今茲宋鄭其饑乎歲在星紀而淫於玄枵歲歲星也星紀在丑斗牛之次玄枵在子虛危之次十八年晉董叔曰天道多在西北是歲歲星在亥至此年十一歲故在星紀明年乃當在玄枵今已在玄枵淫行失次以有時菑陰不堪陽時菑無冰也盛陰用事而溫無冰是陰不勝陽地氣發洩蛇乘龍蛇玄武之宿虛危之星龍歲星歲星木也木為青龍失次出虛危下為蛇所乘龍宋鄭之星也歲星本位在東方東方房心為宋角亢為鄭故以龍為宋鄭之星也宋鄭必饑玄枵虛中也玄枵三宿虛星在其中枵耗名也土虛而民耗不饑何為歲為宋鄭之星今失常經入虛耗之次時復無冰地氣發洩故曰土虛民耗也禆竈曰今茲周王及楚子皆將死禆竈鄭大夫歲棄其次而旅於明年之次以害鳥帑周楚惡之旋客處也歲星棄星紀之次客在玄枵歲星所在其國有福失次於北禍衝在南南為朱鳥鳥尾曰帑鶉火鶉尾周楚之分故周王楚子受其咎俱論歲星過次梓慎則曰宋鄭飢禆竈則曰周楚王死傳故備舉以示卜占唯人所在也, WYG: 陵共卧耳}
