  - {type: variant, offset: 978, length: 200, content: 問於士文伯曰誰將當日食對曰魯衛惡之衛大魯小公曰何故對曰去衛地如魯地衛地豕韋也魯地降婁也日食於豕韋之未及降婁之始乃息故禍在衛大在魯小也周四月今二月故曰在降婁也於是有災魯實受之其大咎其衛君乎魯將上卿又曰夏四月陳災鄭禆竈曰五年陳將復封五十二年而遂亡子產問其故對曰陳水屬也陳顓頊之後故為水屬火水妃也火畏水故為之妃妃音配而楚所相也相治也楚之先祝融為高辛氏火正主治火事今火出而火陳火心星也火出於周為五月而以四月出, WYG: 吏和帝即位分使}
  - {type: variant, offset: 979, length: 0, content: '', SBCK: 訓訓日臣止能望氣不能達湖之開塞退而告其友曰青蓋入洛將有輿櫬銜璧之事非吉祥也尋而吳亡及陳敏作亂弟宏爲厯陽太守訓謂邑人日陳家無王氣不乆當滅宏聞將斬之訓鄉人秦璩爲宏參軍乃說宏日訓善風角可試之如不中徐斬未晩也乃赦之時宏攻征東參軍衡彥}
