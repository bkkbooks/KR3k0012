  - {type: variant, offset: 2302, length: 0, content: '', WYG: 當死逖亦見星曰為我矣方平河北而天欲殺我此乃不祐國也俄卒于雍丘又載記曰符堅時有大風從西南來俄而晦冥恒星皆見又有赤星見于西南太史令魏延言於堅曰於占西南國亡明年必平蜀漢堅大悅又曰符堅以弟融為鎮東將軍代王猛為冀州牧融將發堅祖于覇東奏樂賦詩堅母苟氏以融少子甚愛之比發三}
  - {type: page-break, offset: 2302, content: '', id: KR3k0012_WYG_733-4b, image: WYG0899/WYG0899-0463b.png}
  - {type: variant, offset: 2303, length: 1, content: 期, WYG: 㶚上其夕又竊如融所内外莫知是夜堅寢於前殿魏延言天市南門屏内后妃星失明左右閽寺不見后妃移動之象堅問知之驚曰天道與人何其不遠遂重星官後魏書曰崔浩明識天文好觀星變常置金銀銅鋌於酢噐中令青夜有所見即以鋌畫紙作字以記其異又曰姚興死之前嵗大史奏熒惑在匏𤓰星中一夜忽然亡失不知所在或謂下入危亡之國將}
  - {type: page-break, offset: 2303, content: '', id: KR3k0012_WYG_733-5a, image: WYG0899/WYG0899-0463c.png}
  - {type: punctuation, offset: 2304, content: ，, id: KR3k0012_CHANT_733-bkkpn669}
  - {type: 'tls:seg', offset: 2304, content: '', id: KR3k0012_CHANT_733-14a.13}
  - {type: variant, offset: 2305, length: 0, content: '', WYG: 童謡訛言之妖而後行其災禍太宗聞之大驚乃召碩儒十數人令與史官求其所詣崔浩對曰按春秋左氏𫝊說神降于莘其至即其物也請以日辰推之庚午之夕辛未之朝天有雲熒惑之亡當在此二日之内庚之與午皆主於秦辛為西夷今姚興據咸陽是熒惑入秦矣諸人皆作色曰天上失星人安能知其所詣而妄說無徵之言浩笑而不應後八十日熒惑果出於東井留守盤旋秦中大旱赤地昆明池水竭童謡訛言國内諠擾明年姚興死二子交兵二年國㓕於是諸人乃服曰非所及也唐書曰嚴善思同州朝邑人也少以學涉知名尤善天文歴數及卜相之術則天時為監察御史稍遷太史令聖歴二年熒惑入輿鬼則天以問善思善思對曰商姓大臣當之其年文昌左相王及善卒長安中熒惑入月鎮星犯天關善思奏曰法有亂臣伏罪且有臣下謀上之象嵗餘張柬之敬暉等起兵誅張易之昌宗其占騐皆此類又曰尚獻甫衛州汲人也尤善天文則天時召見起家拜太史令數顧問災異事皆符騐長安二年獻甫奏曰臣本命納音在金今熒惑犯五諸侯太史之位熒惑火也火能尅金是臣將死之徵則天曰朕為卿厭之遽轉獻甫為水衡都尉謂曰水能生金又去太史之位卿無憂矣其秋獻甫卒則天甚嗟異惜之又曰元和八年熒惑犯太㣲上相歴執法占者言今之三相皆不利治輕未重月餘李絳以足疾免明年十月李吉甫以暴疾卒九年六月武元衡為盗所害年五十八始元衡與吉甫齊年又同日為宰相及出鎮分領揚益至吉甫再入元衡亦還吉甫生月卒吉凶之數若符㑹焉占風後漢書曰郎顗上書曰今月十七日戊午徵日也日加申風從寅來丑時而止丑寅申皆徵也不有火災必當為旱願陛下校計繕修之費永念百姓之勞罷將作之官减彫文之飾損庖厨之饌退晏私之樂又曰任文公巴郡閬中人也父文孫明曉天官風星秘要文公少脩父術州辟從事哀帝時有越嶲}
