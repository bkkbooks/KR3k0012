  - {type: variant, offset: 2503, length: 236, content: 咸和元年祖約南行路遇大雷雨西南來洋曰甲子西南天雷其下必失火將至夏汝南人反執約兄子濟迸于石勒約府內地忽赤如丹洋曰按河圖徵云地赤如丹血丸當有下反上者恐十月二十七日胡馬當來飲淮水至時石勒騎大至攻城大戰其日西風兵火俱發約大懼會風廻賊退時傳言勒遣騎向壽陽約欲送其家還江東洋曰必無此事尋而傳言果妄征西將軍庾亮鎮武昌咸康三年洋言於亮曰武昌土地有山無林正可圖始不可居終山作八字數不及九昔吳用壬寅來止創立宮城至巳酉還下沫陵陶公亦涉八年土地盛衰有數人心去就有期不可移也公宜更擇吉處武昌不可久住, WYG: ''}
