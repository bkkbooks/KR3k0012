  - {type: variant, offset: 1226, length: 425, content: 妃合得五而成故五歲而陳復封為十三年陳侯吳歸于陳傳歲五及鶉火而後陳卒亡楚克有之天之道也故曰五十二年又曰有星出于婺女鄭裨竈言於子產曰七月戊子晉君將死今茲歲在顓頊之虛姜氏任實守其地居其維首而有妖星焉告邑姜也邑姜晉之妣也天以七紀戊子逢公以登星斯於是乎出吾是以譏之又曰有星孛于大辰西及漢申須曰彗所以除舊布新也天事恒象今除於火火出必布焉諸侯以火災乎梓慎曰往年吾見之是其徵也火出而見今茲火出而章必火入而伏其居火也久矣其與不然乎火出於夏為三月於商為四月於周為五月夏數得天若火作其四國當之六物之占在宋衛陳鄭乎宋大辰之虛也陳大皞之虛也鄭祝融之虛也皆火房也星孛及漢漢水祥也衛顓頊之虛也故為帝丘其星為大水水火之牡也其以丙子若王午作乎水火所以合也若火入而伏必以壬午不過其見之月鄭禆竈言於子產曰宋衛陳鄭將同日火若我用瓘犖玉瓚鄭必不火子產弗從十八年夏五月火始昏見丙子風梓慎曰是謂融風火之始也七日其火作乎戊寅風甚壬午大甚宋衛陳鄭皆火梓慎登大庭氏之庫以望之曰宋衛陳鄭也數日皆來告火禆竈, WYG: 對視}
