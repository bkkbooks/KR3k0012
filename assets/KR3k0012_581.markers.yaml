  - {type: variant, offset: 884, length: 14, content: 書監荀勗中書令張華出御府銅竹, krp: 衷心翔翔民之子惟天之望吕氏春秋曰墨子見荆王衣錦吹笙竽易通卦驗曰冬至吹黄鍾之}
  - {type: punctuation, offset: 888, content: 、, id: KR3k0012_CHANT_581-bkkpn273}
  - {type: variant, offset: 894, length: 66, content: 御府銅竹律二十五具命太樂郎劉秀等校試其三具與杜夔及左延年法律同其二十二具視其銘題尺寸是笛律也問恊律中郎將列和辭昔魏明帝時令和永受笛聲, SBCK: 夲末笳者胡人卷蘆葉吹之}
