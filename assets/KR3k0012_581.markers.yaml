  - {type: variant, offset: 100, length: 114, content: 吹裁十二之音應律荀勗樞問依三尺二調成均剪雲夢之霜筠法龍吟之異韻三孔為籥文舞執之邠人吹也五孔為遂祴樂用周師掌之六孔為笛羗人吹之七孔下調漢部用也今之七星古之長笛一定為調合鍾磬之均各有短長應律呂之度雅樂部內咸用之也馬融自敘曰融性好音能, WYG: ''}
