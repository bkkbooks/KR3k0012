  - {type: variant, offset: 1704, length: 1, content: 蘇, WYG: 隋作竽楚辭曰代奏鄭衛鳴竽張伏獻駕辯楚勞商伏羲作琴造駕辯之曲楚人自作勞商之歌皆妙曲也通禮義纂曰漢武帝時丘仲作竽三十六管樂府圖曰吹笙有以知法度竽音調則度數得見列仙傳曰商丘子胥者髙邑人也好牧豕吹竽年七十娶婦不老邑人乃竒怪之從受道問其要言但食木菖蒲根飲水不饑不老如此傳世見之三百餘年貴戚富室聞之取而服之不能終嵗輒止惰慢矣謂将復有匿術也文心雕龍曰林籟結響調如竽琴淮南子曰孟夏南風御女衣赤采吹笙竽煦也立春之氣煦生萬物也管三十六宫管在左右和十三宫管在中今之竽並以木代瓠而漆之無復八音矣荆梁之南尚仍古制桓譚新論曰}
