  - {type: variant, offset: 349, length: 365, content: 客主不交一言晉書向秀作思舊賦曰鄰家有吹笛發聲寥亮追想疇昔遊宴之好晉中興書曰帝舅王愷嘗置酒王遵王敦俱往女妓吹笛小失聲愷意便令黃門歐殺之一坐改容敦神色自若沈約宋書曰晉太始十年中書監荀勖中書令張華令郝生鼓琴宋同吹笛以為新引相和唐書曰文宗時雲朝霞以善吹笛進上為新聲雅樂朝霞能承意變聲頗符上旨猶是有寵世說曰謝仁祖妾阿紀有國色善吹笛仁祖死阿紀誓死不嫁郗曇時為北中郎設權計遂得阿紀為妾阿紀終身不與曇言幽明記曰永嘉中泰山巢氏先為相縣令居在晉陵家婢採薪忽有一人隨追尋隨婢還家不使人見見形者唯婢而已每與婢飲宴輒吹笛而歌歌曰閑夜寂以清長笛亮且鳴若欲知我者姓郭名長生又曰代郡界有一亭常有怪不可詣止有諸生壯勇行歌正宿鬼吹五孔笛有一手都不能得攝笛諸生不耐忽便笑謂汝止有一手郍得遍笛我為汝吹來鬼云為我少指耶乃數十指出諸生知其可擊拔劍斫之得一老雄雞從者並雞鶵文士, SBCK: 蔡琰別}
