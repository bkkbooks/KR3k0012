  - {type: variant, offset: 879, length: 14, content: 太和十年中書監荀勗中書令張華, SBCK: 胡笳漢舊録有其曲不記所}
  - {type: variant, offset: 879, length: 4, content: 太和十年, krp: 女媧之笙簧周禮曰春官笙師掌教吹笙郷飲酒曰笙入奏南陔白華邯鄲綽五經折疑曰夫笙者法萬物始生導逹隂陽之氣故有長短黄鍾爲始象法鳯凰蔡邕月令章句曰季秋之月上丁入學習吹笙所以通氣也管簫笙竽塤箎皆以吹鳴者也穆天子傳曰西王母吟月吹笙皷簧簧在笙}
  - {type: punctuation, offset: 883, content: ，, id: KR3k0012_CHANT_581-bkkpn272}
