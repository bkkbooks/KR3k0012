  - {type: variant, offset: 77, length: 0, content: '', SBCK: 靈帝善皷琴吹洞簫丹陽記曰江寕縣南三十里有慈姥山積石臨江生簫管竹王褒洞簫賦所稱即此也其竹圎緻異於衆處自伶倫採竹嶰谷其後唯此簳見珎故歴代掌給樂府而俗呼曰皷吹涼州記曰吕纂咸寕二年有盗發張駿墓得白玉罇玉}
