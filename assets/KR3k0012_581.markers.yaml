  - {type: variant, offset: 1562, length: 1, content: 箎, SBCK: 笙竽風俗通曰謹案禮記竽竹簧長四尺二寸今二十三管世夲曰隨作竽楚辭曰代奏鄭衛鳴竽張伏獻駕辯楚勞啇伏羲作琴造駕辯之曲楚人自作勞啇之歌皆妙曲也通禮義纂曰漢武帝時丘仲作竽笙三十六管樂府雜録曰將竽形􅀋小鍾以手捋之即鳴樂府圖曰吹竽有以知法度竽音調則度數得見列仙傳曰啇丘子􅇧者髙邑人也好牧豕吹竽年七十不取婦而老邑人乃竒怪之從受道問其要言但食木菖蒲根飲水不飢不老如此傳世見之三百餘年貴戚冨室聞之取而服之不能終歳輙止墯慢矣謂將復有匿術也文心雕龍曰林􅄜結響諷如竽琴淮南子曰孟夏南方御女衣赤采吹笙竽煦也立春之氣煦生萬物也管三十六宮管在左右和十三宮管在中今之竽並以木代瓠而􅃮之無復八音矣荆梁之南尚仍古制桓譚新論曰成少伯工吹竽見安昌侯張子夏皷瑟謂曰音不通千曲以上不足以爲知音韓子曰齊宣王使人吹竽有三百人南郭處士請爲王吹粟食與三百人等宣王死文王即位一一聽之處士走或云韓昭侯田巖使一一聽之乃知其濫吹也新序曰楚王使謁者徐光迎方與盲人能吹竽者龔遂乃止簧毛}
