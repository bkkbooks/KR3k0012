  - {type: variant, offset: 968, length: 4, content: 別居一坊, SBCK: 謂之和郭璞曰大笙列管匏中施簧也管端大者十九簧小音十三簧犍爲舎人曰大笙音聲衆而髙也小者音相和也白虎通曰笙之言施也牙也萬物始施而牙笙者太簇之氣也象萬物之生也故曰笙有七正之節焉有六合之和焉天下樂之故謂之笙古之善吹笙者有王子晉見列仙傳周靈王之太子也毛詩鹿鳴曰我有嘉賔皷瑟吹笙吹笙皷簧承筐是將尚書益稷曰笙鏞以間鳥獸蹌蹌孔安國曰間迭也吹笙擊鍾鳥獸仰德相率而舞蹌蹌然也禮記檀弓上曰孔子旣祥五日彈琴而不成聲十日而成笙}
