  - {type: variant, offset: 2193, length: 346, content: 百四十七黃鍾之子以為實實始法而一得則九寸則諸律也大戴禮曰舜時西王母獻白玉琯說文管如箎六孔十二月之音物關地而牙故謂之管從竹管聲琯者古者有玉管焉樂法圖曰次主東律東律主黃鍾聖人承天樂用管宋均注曰管黃鍾九寸管也吹管者以知律管音調則律曆正周禮春官少師曰小師掌教簫管鄭司農曰管如箎六孔玄謂管如𥴦而小併兩而吹之又曰孤竹之管於圓丘奏之孫竹之管於方丘奏之陰竹之管於宗廟奏之鄭玄云孤竹竹特生者也孫竹竹枝根未生者也陰竹生山北籥釋名曰籥躍也氣躍出也爾雅曰大籥謂之產中者曰仲小者曰箹郭璞曰籥也笛三孔而短犍為舍人曰仲其聲適仲呂也小者形聲細小曰筠也禮記曰葦籥伊祁氏之樂也籥春分之音萬物振躍而出也周官笙師掌教吹籥籥師教國子舞羽吹籥籥章掌幽籥鄭玄曰卯地之竹也又曰籥師掌教國子秋冬教吹籥歷代文舞之樂所執羽籥毛詩曰左手執籥右手秉翟, SBCK: ''}
