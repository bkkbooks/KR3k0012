  - {type: variant, offset: 1564, length: 7, content: 節南山云伯氏吹, SBCK: 曰巧言如簧又曰君子陽陽左執簧右招我由房陽陽無所用其心也漢書内傳曰西王母命侍女許飛瓊皷震簴之簧世夲曰女媧作簧宋均曰女媧黄帝臣也三禮圖曰雅簧上下各六神仙傳曰王遥有竹篋未甞開後將茅子擔篋入石室室中有二人遥自取一枚以二枚與室中人對共皷之潜夫論曰簧削銳其頭有傷害之象塞蠟宻有口舌之􅀋皆非􅁻祥善應也}
