  - {type: variant, offset: 754, length: 335, content: 笛續矩笛長願陛下保壽無極傳子曰列和善吹笛吳姬之聲無以加也西京雜記曰高祖初入咸陽宮周行府庫金玉珍寶不可稱言其尤驚異者玉笛長二尺三寸六孔銘曰昭華之琯樂纂曰唐玄宗時樂人孫處秀善吹笛好作犯聲當時皆以為新意流美樂人皆效之其聲變態日增因有犯調犯調即今之所尚也又曰太和十年中書監荀勗中書令張華出御府銅竹律二十五具命太樂郎劉秀等校試其三具與杜夔及左延年法律同其二十二具視其銘題尺寸是笛律也問恊律中郎將列和辭昔魏明帝時令和永受笛聲以作此律欲使學者別居一坊歌詠講習依此律調但識其尺寸之名則竹絲歌詠皆得均含歌聲濁者用長笛長律歌聲清者用短笛短律凡絃歌調張清濁之制不依笛尺寸名之則不可知也又曰黃鍾笛晉時三尺八寸元嘉九年太樂令鍾宗之減為三尺七寸十四年治書令史奚縱又減五分為三尺六寸五分劉和之東箱長笛, WYG: ''}
