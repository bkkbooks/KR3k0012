  - {type: variant, offset: 961, length: 40, content: 作此律欲使學者別居一坊歌詠講習依此律調但識其尺寸之名則竹絲歌詠皆得均含歌聲濁者用, krp: 竽竽}
  - {type: variant, offset: 962, length: 5, content: 此律欲使學, SBCK: 樂也故謂曰胡笳夏仲御別傳曰激南楚吹胡笳風雲爲之揺動星辰爲之變度世􅀃曰劉越石爲胡􅀐所圍數重城中窘迫無計越石始乗月登樓清嘯胡賊聞之皆悽然長嘆中夜奏胡笳賊皆流涕人有懷􅁟之切向曉又吹之賊並棄圍奔走笙釋名曰笙生也象物管地而生以匏爲之其中空以受簧爾雅曰大笙謂之巢小}
  - {type: punctuation, offset: 964, content: 。, id: KR3k0012_CHANT_581-bkkpn284}
