  - {type: variant, offset: 2047, length: 123, content: 小者聲音清妙也廣雅曰管象箎長尺圍寸有六孔無底班固曰黃帝作律以玉為管長尺六孔為十二月音至舜時西王母獻白玉管漢章十二年零陵營道舜祠下得笙白玉管則古者又以玉為管矣班氏用銅之言外然之義未為得也求律所生大極之數起於一在子以三乘之得三在丑以次至酉得一萬九千六, SBCK: 太平御覽卷第五}
