  - {type: variant, offset: 504, length: 2, content: 國色, WYG: 懐土之思向曉又吹之賊並棄圍奔走笙釋名曰笙生也象物管地而生以匏為之其中空以受簧爾雅曰大笙謂之巢小者謂之和郭璞曰大笙則管匏中施簧也管端大者十九簧小者十三簧犍為舍人曰大笙音聲衆而髙也小者音相和也白虎通曰笙之言施也牙也萬物始施而牙生者太簇之氣也萬物象之生也故曰笙有七正之莭焉有六合之和焉天下樂之故謂之笙古之}
