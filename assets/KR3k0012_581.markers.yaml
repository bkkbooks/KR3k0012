  - {type: variant, offset: 101, length: 1, content: 裁, SBCK: 簫能致孔雀白鶴繆公女弄玉好之以妻焉其後隨鳯去故􅁗人作鳯女祠於雍宫代有簫聲江表傳曰孫權攻合肥不下而還休兵皆上道權與吕蒙等在後魏將張遼奄至皷吹驚怖不能復鳴簫唱甘寕援刀欲斫之於是始作之莊子曰南郭子綦謂顔成子遊曰汝聞人􅄜曰而未聞地􅄜汝聞天􅄜郭象曰天􅄜簫也􅁗子曰一人執規}
