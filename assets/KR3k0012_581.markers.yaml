  - {type: variant, offset: 1176, length: 279, content: 壯勇而樂和細絲高竹不可用也慮悲聲感人士卒思歸之故也又曰橫笛小箎也漢靈帝好胡笛有胡笛箎出於胡吹即此也梁胡歌云快馬不須鞭拗折揚柳枝下馬吹橫笛愁殺路傍兒此歌辭元出北國知撗笛是北國名今撗笛皆去義觜其有觜者謂之義觜笛國史補曰李舟好事嘗得村舍煙竹截以為笛堅如鐵石以遺李牟牟吹笛天下第一月夜泛江與舟吹之溜亮逸發俄有客立於岸呼舡請載既至請笛而吹其為精壯山石可裂牟平生未嘗見及人破呼吸盤辟應指粉碎客散不知所之舟著記疑其蛟龍也又曰李牟秋夜吹笛於瓜州舟楫甚隘初發調群動皆息及數奏微風颯然而至俄頃舟人賈客有怨嗟悲泣之聲箎釋名曰箎啼也聲從孔出如嬰兒啼聲也毛詩曰彼何人斯伯氏吹塤仲氏吹箎, WYG: ''}
