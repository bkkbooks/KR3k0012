  - {type: variant, offset: 741, length: 1, content: 復, SBCK: 平王之夫人昭王之母也伯嬴操刃曰妾聞天子天下之表也公侯一國之儀也天子失制則天下亂諸侯失節則國危今夫婦之道固人倫之始王教之端也今吴去儀表之行從亂亡之欲犯誅絶之事何以行訓民乎妾聞生以辱者}
