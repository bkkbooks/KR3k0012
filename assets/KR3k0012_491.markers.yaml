  - {type: variant, offset: 740, length: 0, content: '', WYG: 反以忠義笑人淑有慙色唐書婁師德初狄仁傑未為宰相時師德甞薦之及為宰相不知師德薦己數排師德合充外使則天甞出師德書表示之仁傑大慙謂人曰吾為婁公所含如此方知不逮婁公逺矣晏子春秋曰景公置酒太山之陽酒酣公四望喟然歎泣數行曰寡人將去此堂堂國死耶左右泣者三人曰吾細人也猶将難死而况公乎晏子搏髀仰天而大笑曰樂哉今日之飲也公怒曰子何笑也對曰怯君一諛臣三是以大笑公慙而更辭吳越春秋曰季札去徐而歸行道逢男子五月被裘採薪於道傍有委金一器季札見之忽不入意顧謂薪者曰來取此金薪者曰君舉止何髙視何下也五月被裘採薪寧是拾金者乎札慚於斯言下車禮之曰何子衣之鄙而言之正也子姓為何薪者曰君皮相之士何足以告姓字乎季札有慙色又曰吳師入郢闔閭既妻昭王夫人又及於伯嬴伯嬴秦康公之}
