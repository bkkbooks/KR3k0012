  - {type: variant, offset: 717, length: 2, content: 奮語, SBCK: 爲吴歌恭曰居端右之重集宰相之座而放妖俗之音乎並有慙色又曰熒惑守南斗經旬王導謂陶囬曰南斗􅀭州分而熒惑守之吾當遜位以厭此謫回荅曰公以明徳作相輔弼聖主冝親忠貞逺邪佞而與桓景造􅂰熒惑何由退舎導深愧之宋書曰王惠陳郡謝瞻才辯有風氣甞與兄弟群從造惠談論鋒起文史間發惠時相酬應言清理逺瞻等慙而退又曰謝誨爲荆州都督甚有自矜之色將之鎮詣從叔光禄大夫瞻別問晦年荅曰三十五瞻􅀏曰昔荀中郎年二十七爲北府都督卿比之巳爲老矣晦有慙色又曰何尚之在家常着鹿皮帽及拜開府天子臨軒百僚陪位沈慶之於殿廷戲之曰今何不着鹿皮冠慶之累辝爵命朝廷敦勸甚切尚之謂曰主上虚懷側席詎冝固辭慶之曰沈公不効何公去而復還也尚之有愧色又曰顧凱之爲尚書吏部郎甞於太祖坐論江左人言顧榮􅀽淑謂凱}
