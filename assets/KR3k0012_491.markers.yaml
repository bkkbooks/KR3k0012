  - {type: variant, offset: 360, length: 1, content: 責, SBCK: 懷縑一疋陳之於主人前曰如丹此縑岀自機杼遵聞而有慙色又曰樊重外孫何氏兄弟争財重耻之以田二頃解其忿訟縣中稱美推爲三老年八十餘臨終其素所假貸人間數百萬遺令焚削文契債家聞者皆慙争往償之諸子從勑竟不肯受又曰魏霸字延年仕爲光禄大夫霸妻死長兄伯爲霸取妻送至官舎霸􅀏曰年老兒子備具矣何空養他家老爲即自入辭其妻奉案前因跪曰夫人視老夫復何中而遂失計義不敢屈即拜而出妻慙求去又曰卓茂爲丞相史甞出道中人有認茂馬者茂}
