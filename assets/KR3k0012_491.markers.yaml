  - {type: variant, offset: 740, length: 0, content: '', SBCK: 反以忠義􅀏人淑有慙色唐書婁師德􅀄狄仁傑未爲宰相時師德甞薦之及爲宰相不知師徳薦巳數排師德令充外使則天甞出師德書表示之仁傑大慙謂人曰吾爲婁公所含如此方知不逮婁公逺矣晏子春秋曰景公置酒太山之陽酒酣公四靣望喟然嘆泣數行曰寡人將去此堂堂國死耶左右泣者三人曰吾細人也猶將難死而况公乎晏子􅅮髀仰天而大􅀏曰樂哉今曰之飲也公怒曰子何􅀏也對曰怯君一䛕臣三是以大􅀏公慙而更辭吴越春秋曰季扎去徐而歸行於道逢男子五月􅀍裘採薪於道傍有委金一器季扎見之忽不入意顧爲薪者曰來取此金薪者曰君舉止何髙視何下也五月􅀍裘採薪寧是拾金者乎扎慚於斯言下車禮之曰何子衣之鄙而言之雅也子姓爲何薪者曰君皮相之士何足以告姓字乎季扎有慚色又曰吴師入郢闔閭旣妻昭王夫人又及於伯嬴伯嬴秦康公之}
