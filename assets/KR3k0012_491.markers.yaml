  - {type: variant, offset: 222, length: 1, content: 飾, SBCK: 産業常刈薪樵􅀒戴相隨婦數止買臣無歌謳道中買臣逾益疾歌妻羞之求去又曰建始三年秋京師民無故相驚言大水至百姓奔走相蹂􅏳韋昭曰蹂踐􅏳轢也老弱號呼長安中大亂天子親御前殿召公卿議大將軍鳯以爲太后與上及後宮可御舟􅂳令吏民上長安城以避水群臣皆從鳯議左將軍王啇獨曰自古無道之國水猶不冒城郭今政治平丗無}
