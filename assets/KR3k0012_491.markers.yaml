  - {type: variant, offset: 1483, length: 1815, content: 安忽忽善忘不樂詔使王褒等皆之太子宮娛侍太子朝夕誦讀奇文及所自造作疾復乃歸太子喜褒所為甘泉及洞簫頌令後宮貴人左右皆誦之又曰李廣隨大將軍擊匈奴語其麾下曰廣結髮與匈奴大小七十餘戰今幸從大將人迷失道豈非天哉遂自刎魏志曰夏侯霸聞曹爽被誅而征西將軍夏侯玄又徵以為禍必將轉相及心既內恐又霸先與雍州刺史郭淮不和而淮代玄為征西霸尤不安故遂奔蜀趍陰平而失道入窮谷中糧盡殺馬步行足破臥岩石下使人求道未知所之蜀間之乃使人迎霸晉中興徵祥說曰海西公即位忘設豹尾夫豹尾儀服之主大人所以豹變也而海西公非可宜忘之天若曰海西凡庸不可以主社稷故忘其豹尾示不能終也山海經曰招搖之山有木焉其狀如穀而黑理穀褚也皮中作帋也其華四照名曰迷穀佩之不迷又曰歷小之山其山多櫑是木也方莖圓葉黃華而毛其實如棟亦木名於如指頭白而粘可浣衣音棟也服之不忘搜神記曰蜀中西南高山之上有物與猴相類長七尺能作人行善走名猳一名馬化或曰玃伺行道人有後者輒盜取以去人不得知此物能別男女氣臭故取女而男不知也取去而共為家室其無子者終身不得還十年之後形皆類之意亦迷惑不復思歸產子者輒抱送還其家產子皆如人有不養者母輒死也廣州記曰廬山有山桃大如檳榔形亦似之色黑而味甘酢人時登山採拾正得於上飽噉不得持下輒迷不得返述異記曰南康南野有東望山民三人上山頂有湖清深又有果林周四里許眾果畢植間無雜木行列整齊如人功也甘子正熟三人共食致飽訖懷三枚欲以示外人廻旋迷不能得路即聞空中語云速放雙甘乃聽汝去投所懷甘於地轉盼即見歸途新序曰晉文公出田逐獸入大澤迷不知所出有漁者文公謂曰我若君也出我且厚賜於是遂出漁者曰臣願有獻文公曰子之所欲教寡人者何等也漁者曰鴻鵠保河海之中厭而從之小澤必有丸矰之憂龜魚保於淵厭而出之淺渚則必有羅網之憂今君逐獸至此何行之大遠也文公曰善哉鬻子曰文王問曰人有大忘乎對曰大忘知其身之惡而不改也以賊其身乃喪其軀有行如此之謂大忘列子曰禹治水土也迷而失墜謬之一國當國之中有山山名壺嶺有口名滋穴有水湧出名曰神瀵山頂之泉曰瀵臭過蘭椒味過醪醴其人性婉而從物不競不爭柔心而弱骨不驕不妄長幼儕居不君不民男女雜遊不媒不娉緣水而居不耕不稼土氣溫適不織不衣百年而死不夭不病又曰宋陽里華子中年病忘朝取而夕忘夕與而朝忘在途則忘行在室則忘坐又曰秦人逢氏有子少而慧及壯而有迷罔之疾聞歌以為哭視白以為黑饗香以為臭嘗甘以為苦行非以為是楊氏告其父曰魯之君子多術藝汝奚不訪焉其父之魯遇老聃因告其子之證老聃曰汝庸知汝子之迷乎今天下之人皆惑莫有覺者且身之迷不足傾一家一家之迷不足傾一鄉一鄉之迷不足傾一國一國之迷不足傾天下天下盡迷孰正之哉嚮使天下之人其心盡如汝子汝則反迷矣哀樂聲色臭味是非孰能正之且吾之此言未必非迷況魯之君子迷之郵者莊子曰顏淵曰回益矣仲尼曰何謂也曰回忘仁義矣曰可矣猶未也他日復見曰回坐忘矣仲尼踧然曰何謂坐忘曰隳支體黜聰明離形去智同於大道此謂坐忘又曰黃帝將見大隗于具茨之山具茨山在滎陽縣今名大隗山方明為御昌寓驂乘張若謂朋前馬前馬言二人先道馬昆閽骨稽後車言二人從後車也至於襄城之野七聖皆迷無所問塗適遇牧馬小童而問塗焉屍子曰魯哀公問孔子曰魯有大忘徙而忘其妻有諸孔子曰此忘之小者也昔商紂有臣曰王子須務為謟使其君樂須臾之樂而忘終身之憂家語同韓子曰管仲隰朋從桓公伐孤竹春往而冬返迷失惑道管仲曰老馬之智可用也乃放老馬遂得道楚辭曰入漵浦子邅廻兮迷不知其所如劉謚之迷賦曰寵郎居山中稀行出朝市蹔來到豫章因便造人士東西二城門赫弈正相似向風徑東征直去不轉耳癡周書曰太公望忽然曰不癡不狂其名不彰不狂不癡大事不成左傳成下曰晉周子有兄而無惠不能辨菽菱杜預注曰蓋祈謂白癡也魏忘曰許楮字仲康長八尺餘大十圍勇力絕人楮後事太祖以楮力如虎而癡號曰癡虎又曰明悼毛皇后父嘉本典虞車工卒暴富貴帝令朝臣會其家飲宴其容止舉動甚蚩騃語輒自謂侯身時人以為笑後魏書曰太祖謂尚書崔玄伯曰蠕蠕而蠢切之民昔來號為頑嚚每來抄掠駕牸牛奔遁驅犍牛隨之牸牛不能前異部人教其以犍牛易之者蠕蠕曰其母尚不能行而況其子終於不易遂為敵所虜北史曰齊皇甫亮所居宅洿下摽牓賣之將買者或問其故亮每荅云為宅中水淹不泄雨即流入床下由是宅終不售其淳實如此隋書曰楊玄感司徒素之子也體貌雄偉美鬢髯少時晚成人多謂之癡其父每謂所親曰此兒不癡也及長好讀書便騎射以父軍功位至柱國唐書曰竇威家世勳貴諸昆弟並尚武藝而威躭翫文史介然自守諸兄哂之謂為書癡又曰雜端御史㝡為雄劇食坐之南設一撗榻謂之南床殿中監察不得坐注云亦謂之癡床言處其上者皆驕慠自得使人如癡故謂之癡床, SBCK: 受}
