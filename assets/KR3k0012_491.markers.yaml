  - {type: variant, offset: 711, length: 5, content: 楊駿漸驕傲, SBCK: 朱冲字巨容南安人也少有志行閑静寡欲好學而貧常以耕蓻爲事隣人失犢乃認冲犢以歸後得犢於冰下大慙以犢還冲又曰王羲之傳時劉琰之爲丹陽尹許詢甞就琰之􅀫牀帷新麗飲食豐甘詢曰􅀂此保全殊勝東山劉曰卿􅀂知吉凶由人吾安得保此羲之在坐曰令巢許遇稷契當必無此言二人並有愧色又曰􅄞紹甞詣齊王囧咨事遇囧燕㑹召董艾葛􅒅等共論時政艾言於囧曰􅄞侍中善於􅁝竹公可令操之左右進琴紹推不受囧曰今日爲歡卿何希此耶紹對曰公匡復社稷當􅁤物作則垂之於後紹虚鄙􅁰備常伯􅆎紱冠冕鳴玉殿省豈有操執􅁝竹以爲伶人之事􅀂釋公服從私宴所不敢辭也冏大慙又曰􅁃亮傳􅀄亮所乘馬有的顱殷浩以爲不利於主勸亮賣之亮曰􅂚有己之不安而移之於人浩慙而退又曰王羲之傳素與王述不恊先是王羲之常謂賔友曰懷祖正當作尚書耳投老可得僕射更求㑹稽便自邈然及述蒙顯授羲之耻爲其下遣使詣朝廷求分㑹稽爲越州行人失辭大爲時賢所􅀏旣而内懷愧歎謂其諸子曰吾不减懷祖而位遇懸邈當由汝等不及坦之晉中興書曰王恭甞宴于司馬道子室尚書謝}
  - {type: page-break, offset: 711, content: '', id: KR3k0012_SBCK_491-4a}
  - {type: page-break, offset: 711, content: '', id: KR3k0012_SBCK_491-4b}
  - {type: variant, offset: 711, length: 5, content: 楊駿漸驕傲, WYG: 朱冲字巨容南安人也少有志行閒靜寡欲好學而貧常以耕蓺為事隣人失犢乃認冲犢以歸後得犢於樹下大慙以犢還冲又曰王羲之傳時劉琰之為丹陽尹許詢常就琰之宿牀帷新麗飲食豐甘詢曰若此保全殊勝東山劉曰卿若知吉凶由人吾安得保此羲之在坐曰令巢許遇稷契當必無言二人並有愧色又曰嵇紹常詣齊王冏咨事遇冏燕㑹召董艾葛旟等共論時政艾言於冏曰嵇侍中善於絲竹公可令操之左右進琴紹推不受冏曰今日為歡卿何吝此耶紹對曰公匡復社稷當軌物作則垂之於後紹虛鄙忝備常伯腰紱冠冕鳴玊殿省豈有操執絲竹以為伶人之事若釋公服從私宴所不敢辭也冏大慙又曰庾亮傳初亮所乗馬有的顱殷浩以為不利於主勸亮賣之亮曰曷有己之不安而移之於人浩慙而退又曰王羲之傳素與王述不協先是王羲之甞謂賔友曰懐祖正當作尚書耳投老可得僕射更求㑹稽便自邈然及述䝉顯授羲之耻為其下遣使詣朝廷求分㑹稽為越州行人失辭大為時賢所笑既而内懐愧歎謂其諸子曰吾不减懐祖而位遇懸邈當由汝等不及坦之晉中興書曰王恭甞宴於司馬道子室尚書謝}
