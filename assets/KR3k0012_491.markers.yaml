  - {type: variant, offset: 821, length: 539, content: 僕隸夫妻並坐共食而令諸父餕餘其自矜無禮如此為時人所鄙笑蕭子顯齊書曰司徒褚淵送湘州刺史王僧虔閣道壞墜水僕射王常牛驚跣下車謝超宗拊掌笑戲曰落水三公墜車僕射賈誼新書曰虢君驕恣伐之不守出走逃於山遂餓死為禽獸食語林曰晉王武子與武帝圍碁孫皓看王問孫歸命何以好剝人面皮皓曰見無禮於君者即剝其面皮乃舉碁局武子伸腳在局下怠惰禮記王藻曰垂緌五寸惰遊之士也左傳僖上曰天王使召武公內史過賜晉侯命受王惰過歸告王曰晉侯其無後乎王賜之命而惰於受瑞先自棄也已其何繼之有又成下曰晉侯使郄錡來乞師將事不敬孟獻子曰郄氏其亡乎禮身之幹也敬身之基也郄子無基且先君之嗣卿也受命以求師將社稷是衛而惰棄君命也不亡何為蜀志曰楊戲性簡惰省略未嘗以言加人遇情接物書符指事希有盈紙孟子曰世俗所謂不孝者五惰其四支不顧父母之養一不孝也蔡邕勸學曰瞻彼頑薄執性不固心遊目蕩意與手互嵇康與山濤書曰吾每讀尚子平臺孝威傳慨然慕之想其為人如少孤露母兄見驕性復踈懶筋駑內緩頭面常一月十五日不洗非大悶痒不能梳也每當小便而忍起令胞中略轉乃起耳又縱逸來久情志慠散簡與禮相背懶與慢相成而為儕類見寬不攻其過又讀老莊重增其放故使榮進之心曰頹任實之情轉篤又人倫有禮朝廷有法自惟有不堪者七也迷忘說文曰迷惑也忘不識也易坤卦曰先迷後得君子有攸往又復卦曰迷復之凶反君道也國語, SBCK: 玄􅀏}
