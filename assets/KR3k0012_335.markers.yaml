  - {type: variant, offset: 1218, length: 887, content: 前立伐惡立善之旗所以知善罪之所在先齊良善而後伐之文選曰輕車霆激驍騎雷驚戰艦墨子曰公輸般自魯之楚為舟戰之具謂之鉤拒退則鉤之進則拒之也後漢書曰公孫述遣其將任滿田戎程汎將數萬人乘枋箄下江關榜箄以木竹為之浮於江水上爾雅曰舫附也郭景純曰水中箄筏也華陽國志曰巴楚相攻故置江關舊在京赤甲城後移在江南岸對白帝城故基在今夔州魚復縣南枋即舫字古用通箄音步隹切附音疋沮切擊破馮駿及田鴻季玄等遂拔夷道夷陵據荊門虎牙撗江水起浮橋鬥樓立攢柱絕水道結營山上以拒漢兵彭攻之不利於是裝直進樓舡冐突露撓數千艘並舡名樓舡之上施樓橈楫也爾雅曰楫謂之橈又謂露橈在外人在舡中冐突取其觸冐而唐突也晉書曰周訪與諸軍共征杜弢弢作結皋打官軍舡艦訪作長岐棖以拒之結皋不為害又曰劉裕北征廣固嶺南賊將徐道覆謂其帥盧循曰今日之機萬不可失既剋都邑劉𥙿雖還無能為也循從之初道覆密欲裝舟艦乃使人伐舡材於南康山偽云將下都貨之稱力少不能得致即賤賣之價減數倍居人貪賤賣衣物而市之贛石水急贛古暗切出舡甚難皆儲之如是者數四故板大積而百姓弗之疑及道覆舉兵案賣券而取無得隱匿者乃并裝之旬日而辨遂舉眾寇南康廬陵豫章郡諸守相皆委任奔走梁書曰陸納反叛造大艦一名曰三王艦者邵陵王河東王桂陽嗣王三人並為元帝所害故立其像於艦祭以太牢加其節蓋羽儀鼓吹每戰輒祭之以求福又曰王琳大營樓艦將啚義舉琳將張平宅乘一艦每將戰勝艦則有聲如野豬故琳戰艦以千數以野豬為名南史曰梁徐世譜從陸法和與景戰於赤亭湖景軍甚盛世譜乃別造樓舡拍艦火舫水軍以益軍勢將戰又乘大艦居前大敗景軍禽景將任約景退走因隨王僧辨攻郢州世譜復乘大艦臨其倉間賊將宋子仙據城降以功徐信州刺史封魚復縣侯周書庾信傳曰信常有鄉關之思作哀江南賦以致其意云麾兵金匱校戰玉堂蒼鷹赤雀鐵軸牙檣隋書曰楊素數進取陳之計未幾拜信州惣管賜錢百萬錦千叚馬二百疋而遣之素居永安造大艦名曰五牙上起樓五層高百餘尺左右前後置六柏竿並高五十尺容戰士八百人旗幟加於上次曰黃龍置兵百人自餘平乘舴艦等各有差唐書曰曹王皋性多巧思常為戰艦挾以二輪令蹈之愬風鼓浪其疾如掛帆席凡造物必省易而為久不可販性纖悉每遺人糧肉必令自持衡秤量以致之官署布帛令縱書其幅而印之絕吏之私易, SBCK: ''}
