  - {type: variant, offset: 4000, length: 3, content: 實險要, SBCK: 置一烽應接令遣到軍其遊弈馬騎晝日遊弈候視至暮速即作食契即移十里外止􅀫慮防賊徒暮間見􅃄火夜間掩襲捉將其賊路左右草中着人􅀫止以聽賊徒如覺來報烽家舉烽逓報軍司如􅁴十􅀐以上五􅀐以下即放火炬火前鋒應訖即滅火􅀂百􅀐以上二百巳下即放兩炬火准前應滅賊􅀂五百􅀐以上五千􅀐以下即同放三拒火准前應滅前鋒應訖即赴軍􅀂虜走不到軍即且投山谷逐空方可赴軍如以次烽候視不覺其舉火}
  - {type: variant, offset: 4000, length: 3, content: 實險要, WYG: 置一置應接令遣到軍其逰奕馬騎晝日逰奕候視至暮速即分食喫即移十里外止宿慮防賊徒暮間見烟火夜間掩襲捉將其賊路左右草中着人宿止以聼賊徒如覽來報燧家舉烽逓報軍司如覺十騎以上五騎以下即放火炬火箭前烽應訖即滅火若百騎以上二百以下即放兩炬火准前應滅賊若五百騎以上五千騎以下即同放三炬火准前應滅前烽應訖即赴軍若慮走不到軍即且投山谷逐空方可赴烽如以次烽候視不覺其舉火}
