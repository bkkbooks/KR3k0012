  - {type: variant, offset: 2469, length: 281, content: 又曰鬥艦舡上設女牆可高尺牆下開製掉孔舷內五尺又建柵與女牆齊棚上又建女牆重列戰敵上無覆背前後左右樹牙旗幡幟金鼓此戰舡也又曰走舸舷上立女牆棹夫多戰卒少皆選勇力精銳者往返如飛鷗乘人之不及金鼓旗幟列之於上此戰舡也又曰遊艇無女牆舷上置槳床槳音槳左右隨大小長短四尺一床計床計會進止迴軍轉陣其疾如風虞候居之非戰舡也又曰海鶻頭低尾高前大後小如鶻之狀舷下左右置浮版形如鶻翅翼以助其舡雖風濤漲天免有傾側覆背上左右張生牛皮為城牙旗金鼓如常法江海之中戰舡也傅玄正都賦曰飛雲鷁首龍舟餘皇艨艟水城蜀艇吳航萬艘俱興雲帆齊張懸斾光天征鐸琳瑯凌波泝流星列鴈行吳都賦曰戎車盈於石城戈舡掩於江湖亭障後, SBCK: ''}
