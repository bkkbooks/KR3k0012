  - {type: variant, offset: 3975, length: 0, content: '', SBCK: 京兆尹李􅅠奏三原髙陵涇陽興平等四縣共管烽二十八所毎年差烽子烽師九百七十五人今逺近無虞畿内烽燧請停從之􅀇女戰經曰諸見舉烽火傳言虜且起欲知審來不以言者時所加之得陽者不得隂者爲來法晉令曰誤舉烽燧罰金一斤八兩故不舉者弃市甘氏天文占曰權舉烽逺近沉浮權四星在轅尾西邊地驚備烽候相望虜至則舉烽火十丈如今之井桔橰大錘其頭􅀂警急燃火放之權重本低則末仰人見烽火呉時縁江戍圖曰毎刺姦屯有五兵賊曹一人皆作烽火有急以光傳之黄帝出軍决法曰行軍行兵兩敵相要地形不便望見烽火不得爲客衛公兵法曰烽臺於髙山四顧險絶處置之無山亦於􅀌逈道平地置下築羊馬}
