  - {type: variant, offset: 1474, length: 1278, content: 謂露橈在外人在舡中冐突取其觸冐而唐突也晉書曰周訪與諸軍共征杜弢弢作結皋打官軍舡艦訪作長岐棖以拒之結皋不為害又曰劉裕北征廣固嶺南賊將徐道覆謂其帥盧循曰今日之機萬不可失既剋都邑劉𥙿雖還無能為也循從之初道覆密欲裝舟艦乃使人伐舡材於南康山偽云將下都貨之稱力少不能得致即賤賣之價減數倍居人貪賤賣衣物而市之贛石水急贛古暗切出舡甚難皆儲之如是者數四故板大積而百姓弗之疑及道覆舉兵案賣券而取無得隱匿者乃并裝之旬日而辨遂舉眾寇南康廬陵豫章郡諸守相皆委任奔走梁書曰陸納反叛造大艦一名曰三王艦者邵陵王河東王桂陽嗣王三人並為元帝所害故立其像於艦祭以太牢加其節蓋羽儀鼓吹每戰輒祭之以求福又曰王琳大營樓艦將啚義舉琳將張平宅乘一艦每將戰勝艦則有聲如野豬故琳戰艦以千數以野豬為名南史曰梁徐世譜從陸法和與景戰於赤亭湖景軍甚盛世譜乃別造樓舡拍艦火舫水軍以益軍勢將戰又乘大艦居前大敗景軍禽景將任約景退走因隨王僧辨攻郢州世譜復乘大艦臨其倉間賊將宋子仙據城降以功徐信州刺史封魚復縣侯周書庾信傳曰信常有鄉關之思作哀江南賦以致其意云麾兵金匱校戰玉堂蒼鷹赤雀鐵軸牙檣隋書曰楊素數進取陳之計未幾拜信州惣管賜錢百萬錦千叚馬二百疋而遣之素居永安造大艦名曰五牙上起樓五層高百餘尺左右前後置六柏竿並高五十尺容戰士八百人旗幟加於上次曰黃龍置兵百人自餘平乘舴艦等各有差唐書曰曹王皋性多巧思常為戰艦挾以二輪令蹈之愬風鼓浪其疾如掛帆席凡造物必省易而為久不可販性纖悉每遺人糧肉必令自持衡秤量以致之官署布帛令縱書其幅而印之絕吏之私易三國典略曰梁陸法和多聚兵艦欲襲襄陽寇武關梁王使止之法和謂使者曰法和是求道之人常不希釋梵天王坐處豈規人主之位但於空王佛所與主上香火因緣見主上應有報至故救援耳今既被疑是業不可改也又曰梁陸納叛湘州時造二艦衣以牛皮高十五丈一曰青龍一曰白虎選其驍勇者乘之以戰魏武軍令舡戰令曰雷鼓一通吏士皆嚴再通士伍皆就舡整持櫓棹戰士各持兵器就舡各當其所幡鼓各隨將所載舡鼓三通大小戰舡以次發左不得至右右不得至左前後不得易處違令者斬通典曰水戰舡闊狹長短隨用大小勝人多少皆以米為率一人重米二石其揖掉篙櫓帆席絙素沉石調度與常舡不殊又曰樓舡舡上建樓三重列女牆戰格樹幡幟開弩窗矛穴置拋軍壘石鐵汁狀如城壘忽遇暴風人力不能制此亦非便於事然為水軍不可不設以成形勢又曰蒙衝以生牛皮蒙舡覆背兩廂開掣棹孔前後左右有弩窗矛穴敵不得近矢石不能敗此不用大舡務於速進乘人之不及非戰之舡也又曰鬥艦舡上設女牆可高尺牆下開製掉孔舷內五尺又建柵與女牆齊棚上又建女牆重列戰敵上無覆背前後左右樹牙旗幡幟金鼓此戰舡也又曰走舸舷上立女牆棹夫多戰卒少皆選勇力精銳者往返如飛鷗乘人之不及金鼓旗幟列之於上此戰舡也又曰遊艇無女牆舷上置槳床槳音槳左右隨大小長短四尺一床計床計會進止迴軍轉陣其疾如風虞候居之非戰舡也又曰海鶻頭低尾高前大後小如鶻之狀舷下左右置浮版形如鶻翅翼以助其舡雖風濤漲天免有傾側覆背上左右張生牛皮為城牙旗金鼓如常法江海之中戰舡也傅玄正都賦曰飛雲鷁首龍舟餘皇艨艟水城蜀艇吳航萬艘俱興雲帆齊張懸斾光天征鐸琳瑯凌波泝流星列鴈行吳都賦曰戎車盈於石城戈舡掩於江湖亭障後漢書, WYG: ''}
