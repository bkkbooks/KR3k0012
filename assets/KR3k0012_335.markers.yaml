  - {type: variant, offset: 4004, length: 5, content: 鎮從前因循, SBCK: 烽即湏差人急走告知旣置爟烽軍内即湏應接又置一都烽應接四山諸烽其都烽如見􅃄火急報大揔管云某道烟火起大揔管當湏嚴備収拾畜生遣人逺拓毎烽令別奏一人押一道烽令折衝果毅一人都押􅁃闡楊都賦注曰烽火以置於􅀌山頭縁江相望或百里或五十里或三十里㓂至則舉以相告一夕可行萬里孫權時合暮舉火於西陵鼓三竟逹呉郡南徐敬業古意曰甘泉警烽候上谷抵樓蘭北門行曰羽檄起邊庭烽火入咸陽張景陽雜詩曰長鋏鳴鞘中烽火烈邊庭蔡邕徙朔方上書曰旣到徙所乗塞守烽職在候望憂怖燋灼無心復能操筆成草致章闕庭蔡謨與弟書曰軍之耳目當用烽鼓烽可遥見鼓可遥聞湏􅁷百里京觀左傳曰丙辰楚軍於邲遂次于衡雍潘黨曰君盍築武軍築武軍營以章武功而収晉屍以爲京觀臣聞尅敵必視子孫以無志武功楚子曰非尓所知也夫文止戈爲武武王克啇作頌曰載戢干戈載櫜弓矢我求懿徳肆干時夏古者明王伐}
