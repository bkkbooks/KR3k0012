  - {type: variant, offset: 891, length: 311, content: 武王戎車三百兩車一乘步卒七十二人虎賁三百人與紂戰于牧野詩曰戎車既駕四牡業業又曰元戎十乘以先啟行禮記曰兵車不式武軍綏旌前有水則載青旌前有塵埃則載鳴鳶前有車騎則載飛鴻前有士師則載虎皮前有摯獸則載貔貅行前朱鳥而後玄武左青龍而右白虎招搖在上急繕音勁其怒進退有度左右有局各司其局左傳曰晉車七百乘韅靷鞅絆遂伐其木以益其兵也又曰叔向曰寡君有甲車四千乘在行之必可畏也牛雖瘠僨於豚上其畏不死乎又曰楚子會諸侯伐隨軍於漢淮之間少師謂隨侯曰楚人上左君必左君楚君也無與王遇且攻其右右無良焉弗從戰于速杞隋師敗績鬥丹獲其戎車穀梁曰趙盾長轂五百綿地千里古司馬兵法曰戎車夏曰鉤車先正也鉤設淮望遠近計車量地以立壘正者什伍之例也殷曰寅車先疾也寅敬也前有旌旗幟所, SBCK: 何}
