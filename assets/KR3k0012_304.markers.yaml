  - {type: variant, offset: 2247, length: 182, content: 又曰季氏將伐顓臾冉有曰今夫顓臾固而近於費今不取後世必為子孫憂孔子曰求君子疾夫遠人不服而不能來也邦分崩離析而不能守也而謀動干戈於邦內吾恐季孫之憂不在顓臾而在蕭牆之內也韓詩外傳曰楚王欲伐晉告士大夫有諫者死叔敖曰臣園中有榆榆上有蟬蟬方奮翼悲鳴不知螗蜋在其後欲獲而食之螗蜋取蟬不知黃雀在其後又曰脩武屬河內本殷之甯邑武王伐紂勒兵於甯改曰脩武今懷州也家語曰孔子言於定公曰大夫家, SBCK: 天下}
