  - {type: 'tls:seg', offset: 433, content: '', id: KR3k0012_CHANT_304-9a.30}
  - {type: variant, offset: 433, length: 0, content: '', SBCK: 􅁗㑹又曰開皇九年大舉伐陳􅀂賀􅀂弼爲行軍揔管將渡江酹酒而呪曰弼親承廟略逺振國威伐罪吊民除兇剪暴上天長江鑒其􅀂此如使福善禍滛大軍利渉如事有乖違得葬江魚腹中且不恨又曰李德林自隋有天下毎賛平陳之計八年車駕幸同州德林以疾不從勑書追之書後御筆注云伐陳事意冝自隋也時髙潁因使入京上語頴曰德林􅀂患未堪行冝自至宅取其方略髙祖以之付􅀳王後駕還在塗中髙祖以馬鞭南指云待平陳訖㑹以七寳裝嚴公使自山東無及之者唐書曰武德􅀄􅁗王東討王丗充連年未下􅀫師于野髙祖以兵乆在外議}
  - {type: page-break, offset: 433, content: '', id: KR3k0012_SBCK_304-6b}
  - {type: variant, offset: 433, length: 0, content: '', krp: 秦㑹又曰開皇九年大舉伐陳若賀若弼爲行軍揔管將渡江酹酒而呪曰弼親承廟略逺振國威伐罪吊民除兇剪暴上天長江鑒其若此如使福善禍滛大軍利渉如事有乖違得葬江魚腹中且不恨又曰李德林自隋有天下毎賛平陳之計八年車駕幸同州德林以疾不從勑書追之書後御筆注云伐陳事意冝自隋也時髙潁因使入京上語頴曰德林若患未堪行冝自至宅取其方略髙祖以之付晉王後駕還在塗中髙祖以馬鞭南指云待平陳訖㑹以七寳裝嚴公使自山東無及之者唐書曰武德𥘉秦王東討王丗充連年未下宿師于野髙祖以兵乆在外議}
  - {type: variant, offset: 434, length: 2, content: 微切, SBCK: 班師中書令封德彛奏曰丗充得地雖多而羇縻相属其所用命者唯洛陽一城而巳計盡力窮破在旦夕今􅀂還兵賊勢必振更相連結後必難圖未􅀂乗其巳衰破}
