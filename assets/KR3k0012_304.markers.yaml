  - {type: variant, offset: 241, length: 0, content: '', WYG: 遂不得克平逋㓂前入賊境備見敵情觀彼行師殆同兒戲又聞其朝政昏亂政由羣小百姓嗷然朝不謀夕天與不取恐貽後悔若復同徃年岀軍河外直為撫背未扼其喉然晉州本髙歡所起之地鎮攝要重今徃攻之彼必求援吾嚴軍以待擊之必克然後乘破竹之勢鼔行而東足以窮其窟穴混同文軌諸將多不願行帝曰機者事之㣲不可失矣若有阻吾軍者朕當以軍法裁之己酉帝總戎東伐以越王盛為右一軍總管把國公亮為右二軍總管隋國公楊堅為右三軍總管譙王儉為左一軍總管大將軍竇㤗為左二軍總管廣化公丘崇為左三軍總管齊王憲陳王純為前軍又曰保定中命宇文䕶統衆伐齊於是徴二十四軍及左右廂驍騎及秦隴巴蜀之兵諸蕃國之衆二十萬人十月帝於廟廷授䕶斧鉞至潼關乃遣柱國尉遲逈率精兵十萬為前鋒大將軍權景宣攻克豫州尋以洛陽圍觧亦引軍退楊􅎎於軹關戰䕶於是班師以誨功與諸將稽首請罪帝弗之責}
