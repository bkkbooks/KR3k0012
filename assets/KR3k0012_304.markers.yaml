  - {type: variant, offset: 233, length: 0, content: '', SBCK: 至孟津諸侯叛殷㑹周者八百諸侯皆曰紂可伐又曰武王爲文王木主載車中武王自稱太子發言奉文王以伐不敢自專又曰武王偏告諸侯曰殷有重罰不可不畢罰徐廣注云伐一作滅漢書郊祀志曰昔齊􅁊公欲封禪謂管仲曰寡人北伐山戎過􅀌竹西伐束馬縣車上卑耳之山南伐召陵登熊耳山以望江漢兵車之㑹三而乗車之㑹六遂九合諸侯一匡天下昔三代受命亦何以異乎又李廣利傳曰天子爲萬里而伐不録其過又匈奴傳曰東胡強聞冒頓殺父自立乃使使謂冒頓欲得單于閼氏冒頓問左右左右皆怒曰東胡無道乃求閼氏請擊之冒頓曰奈何與人憐愛一女子乎遂取所愛閼氏與之東胡愈驕冒頓遂東集襲擊東胡東胡􅀄輕冒頓不爲備及冒頓以兵至}
  - {type: page-break, offset: 233, content: '', id: KR3k0012_SBCK_304-2a}
  - {type: variant, offset: 233, length: 0, content: '', krp: 至孟津諸侯叛殷㑹周者八百諸侯皆曰紂可伐又曰武王爲文王木主載車中武王自稱太子發言奉文王以伐不敢自專又曰武王偏告諸侯曰殷有重罰不可不畢罰徐廣注云伐一作滅漢書郊祀志曰昔齊桓公欲封禪謂管仲曰寡人北伐山戎過孤竹西伐束馬縣車上卑耳之山南伐召陵登熊耳山以望江漢兵車之㑹三而乗車之㑹六遂九合諸侯一匡天下昔三代受命亦何以異乎又李廣利傳曰天子爲萬里而伐不録其過又匈奴傳曰東胡強聞冒頓殺父自立乃使使謂冒頓欲得單于閼氏冒頓問左右左右皆怒曰東胡無道乃求閼氏請擊之冒頓曰奈何與人憐愛一女子乎遂取所愛閼氏與之東胡愈驕冒頓遂東集襲擊東胡東胡𥘉輕冒頓不爲備及冒頓以兵至}
  - {type: variant, offset: 234, length: 7, content: 啇會朝清明肆疾, SBCK: 破滅東胡王後漢書曰帝以􅀜中未定而鄧禹乆不進兵下勑曰司徒堯也亡賊桀也長安吏人遑遑無所依歸冝以時進討鎭慰西京繫百姓之心禹猶執前意乃分遣將軍別攻上郡諸縣更徵兵引穀歸至大要大要縣名魏志曰太祖父嵩去官後還譙以董卓之亂避難琅邪爲陶謙所害故太祖志在復讎東伐又曰景元四年鄧艾伐蜀自隂平行無人之地七百餘里鑿山通道作橋閣山髙谷深至有艱嶮艾以旃自褁推轉而下將士皆攀木縁崖魚貫而進王隱􅀳書曰太康元年龍驤將軍王濬等攻建平丹陽城尅之東擊西陵以下盡㧞其城虜其將帥於是上下諸軍同時並進呉人降者以萬計呉丞相張悌及護軍孫震與楊州刺史周浚等戰于板橋破之臨陣斬悌震首濬遂汎舟東下所歴皆平軍至秣陵晧面縛與舁襯將其太子詣濬降乃收其圖籍皆因呉所置除其虐政示以簡易百姓大悅乃赦天下改元爲太康天下大酺五日􅀳書曰宣王破張魯請魏武便討劉備魏武曰人􅀂無足旣得隴復欲得蜀}
  - {type: page-break, offset: 234, content: '', id: KR3k0012_SBCK_304-2b}
  - {type: variant, offset: 234, length: 2, content: 啇會, WYG: 夏渉流沙束馬縣車上卑耳之山南伐召陵登熊耳山以望江漢兵車之㑹三而乘車之㑹六遂九合諸侯一匡天下昔三代受命亦何以異乎又李廣利傳曰天子為萬里而伐不録其過又匈奴傳曰東胡强聞冒頓殺父自立乃使使謂冒頓欲得單于閼氏冒頓問左右左右皆怒曰東胡無道乃求閼氏請擊之冒頓曰奈何與人隣愛一女子乎遂取所愛閼氏與東胡東胡愈驕冒頓遂東襲擊東胡東胡初輕冒頓不為備及冒頓以兵至大破滅東胡主後漢書曰帝以關中未定而鄧禹乆不進兵下勅曰司徒堯也亡賊桀也長安吏人遑遑無所依歸宜以時進討鎮慰西京百姓之心禹猶執前意乃分遣將軍别攻上郡諸縣更徴兵引穀歸至大要大要地名魏志曰太祖父嵩去官後還譙以董卓之亂避難瑯邪為陶謙所害故太祖志在復讐東伐又曰景元四年鄧艾伐蜀自隂平行無人之地七百餘里鑿山通道作橋閣山髙谷深至有艱險艾以氊自裹推轉而下将士皆攀木縁岸魚貫而進王隱晉書曰太康元年龍驤將軍王濬等攻建平丹陽城尅之東擊西陵以下盡㧞其城虜其將帥於是上下諸軍同時並進吳人降者以萬計吳丞相張悌及䕶軍孫震與揚州刺史周渡等戰於板橋破之臨陳斬悌震首濬遂汎舟東下所厯皆平軍至秣陵皓面縛輿襯將其太子詣濬降乃收其圖籍皆因吳所置除其虐政示以簡易百姓大悦乃赦天下改元太康賜天下大酺五日晉書曰宣王破張魯請魏武使討西蜀魏武曰人苦無足既得隴右復欲得蜀又曰王羲之與㑹稽王牋陳殷浩不宜北伐并論時事又宣帝紀曰鎮東大將軍諸葛誕殺揚州刺史樂綝以淮南作亂議者速請伐之帝曰吾當與四方同力全勝制之乃表曰昔黥布叛逆漢祖親征隗囂違戾光武西伐皆所以奮揚赫赫震曜威武也又天文志曰參十星一曰參伐主斬刈又為天獄主殺伐又馬紞傳曰初謀伐吳紞與賈充荀朂同共苦諌不可吳平紞内懐慙懼又載記曰慕容垂議征長子諸將咸諫以慕容永未有釁連嵗征役士卒疲怠請俟他年垂將從之及聞慕容徳之䇿笑曰吾計决矣不復留賊以累子孫也乃發歩騎七萬遣其丹陽王慕容瓚龍驤張崇攻永弟支于晉陽北史曰慕容紹宗討侯景於渦陽時景軍甚盛初聞韓軌徃討之曰噉猪腸小兒聞髙岳徃曰此兵精人凡爾諸將被輕及聞紹宗至扣鞌曰誰教鮮卑小兒解遣紹宗來若然髙王未死耶及與景戰諸將頻戰敗無肯先者紹宗麾兵徑進諸將從之因大㨗三國典略曰周伐梁于謹大軍次于樊鄧岳陽王率軍㑹之傳檄于梁曰告梁文武衆官夫作國者罔弗以禮信為本惟爾今主徃遭侯景逆亂之始實結我國家以聲援今乃背徳黨賊髙洋引厥使人置之堂宇傲我王命擾我還人我皇帝襲天之意弗敢以寧分命衆軍奉揚廟畧凡衆十萬直指江陵丁卯梁主停講内外戒嚴是}
