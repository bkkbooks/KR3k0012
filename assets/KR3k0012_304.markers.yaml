  - {type: variant, offset: 589, length: 3, content: 行然後, WYG: 受命者欲盛其威使士卒一意繫心故但聞將軍令不聞天子命也明進退在大夫也又曰誅者何謂也誅猶責也}
  - {type: variant, offset: 589, length: 0, content: '', krp: 令合春秋說題辭曰伐者渉入國内}
