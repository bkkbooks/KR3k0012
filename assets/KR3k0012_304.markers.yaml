  - {type: variant, offset: 224, length: 5, content: 維鷹揚諒彼, SBCK: 神農氏丗衰諸侯相侵伐暴虐百姓而神農氏弗能正於是轅轅乃集用干戈以征不享諸侯或來賔從而􅃖􅀹最爲􅁀莫能伐又曰賜弓矢斧􅃏使得征伐爲西伯又曰西伯旣卒周}
