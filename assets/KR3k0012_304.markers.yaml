  - {type: variant, offset: 244, length: 0, content: '', krp: 王羲之與㑹稽王牋陳殷浩不冝北伐并論時事又宣紀曰鎭東大將軍諸葛誕殺楊州刺史樂綝以淮南作亂議者請速伐之帝曰吾當與四方同力全勝制之乃表曰昔黥布叛逆漢祖親征隗嚻違戾光武西伐皆所以奮楊赫斯震曜威武也又天}
  - {type: variant, offset: 245, length: 0, content: '', SBCK: 志曰參十星一曰參伐主斬刈又爲天獄主殺又馮紞傳曰􅀄謀伐呉紞與賈充荀勗同共苦諌不可呉平紞内懷慙懼又載記曰慕容垂議征長子諸將咸諌以慕容永未有舋連歳征役士卒疲怠請俟他年垂將從之及聞慕容德之䇿􅀏曰吾計决矣不復留賊以累子孫也乃發歩􅀐七萬遣其丹陽}
  - {type: page-break, offset: 245, content: '', id: KR3k0012_SBCK_304-3a}
  - {type: variant, offset: 245, length: 0, content: '', krp: 志曰參十星一曰參伐主斬刈又爲天獄主殺又馮紞傳曰𥘉謀伐呉紞與賈充荀勗同共苦諌不可呉平紞内懷慙懼又載記曰慕容垂議征長子諸將咸諌以慕容永未有舋連歳征役士卒疲怠請俟他年垂將從之及聞慕容德之䇿笑曰吾計决矣不復留賊以累子孫也乃發歩騎七萬遣其丹陽}
  - {type: variant, offset: 246, length: 0, content: '', SBCK: 慕容瓉龍驤張崇攻求弟支于晉陽北史曰慕容紹宗討侯景於渦陽時景軍甚盛􅀄聞韓䡄徃討之曰噉猪膓小兒聞髙岳往曰此岳精凢人耳諸將􅀍輕及聞紹宗至扣案曰誰敎鮮卑小兒解遣紹宗來􅀂然髙王未死耶及與景戰諸將頻敗無肯先者紹宗麾兵徑進諸將從之因大捷三國典略曰周伐梁于謹大軍次于樊鄧岳陽王率軍㑹之傳檄于梁曰告梁文武衆官夫作國者罔弗以禮信爲夲惟尓今主徃遭侯景逆亂之始實結我國家以隣援今揔背德黨賊髙洋引厥使人置之堂宇傲我王命擾我邊人我皇帝襲天之意弗敢以寧分命衆軍奉揚廟略凡衆十萬直指江陵丁卯梁主停講内外誡嚴是朝昬霧巳時方歇梁主親戎百官並甲胄從於褉飲堂間公私馬仗是日大風㧞木王琛旣至石梵未見我軍乃馳書報黄羅漢曰吾至梵境上怗然前曰所言皆兒戯耳羅漢入啓梁主疑之庚午續講百官以戎服聽後周書曰建德五年冬十月帝謂羣臣曰朕去歳属}
  - {type: page-break, offset: 246, content: '', id: KR3k0012_SBCK_304-3b}
  - {type: variant, offset: 246, length: 0, content: '', WYG: 使鄧艾伐蜀禪晉穆帝使桓温伐季子仁宋武帝使朱齡石伐譙縱梁武帝使鄧元起伐劉季近則太祖使尉遲逈平肅記隋文帝使梁睿平王謙憲宗命髙崇文平劉闢自秦至元和九度伐蜀四為水軍泝江而上唯蔡與鄧艾尉遲逈梁睿及崇文五在斜谷駱谷出師兩討不廷古司馬兵法曰王覇之所以治諸侯者以土利列諸侯列相也相諸侯優劣而封之以地徳廣受土廣徳小受土小也以政令平諸侯政者以道徳善政教訓諸侯平均之以禮信結諸侯謙恭愛惠接待諸侯官命誠信以治民心以材力説諸侯材能也力者任重理煩能堪勝事理位高力大故諸侯悦來各修其職任以謀人維諸侯維持也諸侯逺方不奉制命驕佚自恣立故牧伯維持督禦之同患同利以合諸侯盟約}
