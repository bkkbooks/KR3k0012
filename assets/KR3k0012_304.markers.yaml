  - {type: variant, offset: 231, length: 1, content: 肆, WYG: 東伐至孟津諸侯叛殷㑹周者八百諸侯皆曰紂可伐又曰武王為文王木主載車中武王自稱太子發言奉文王以伐不敢自專又曰武王徧告諸侯曰殷有重罪不可以不畢罸漢書郊祀志曰昔齊桓公欲封禪謂仲曰寡人北伐山戎過孤竹西}
