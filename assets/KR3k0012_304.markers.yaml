  - {type: variant, offset: 72, length: 144, content: 殷一月戊午師渡孟津詩曰東山周公東征也我徂東山慆慆不歸昔我往矣楊柳依依今我來思雨雪霏霏又曰六月宣王北伐也六月棲棲戎車既飾四牡騤騤載是常服薄伐玁狁以奏膚功有嚴有翼共武之服又曰采芑宣王南征也蠢爾蠻荊大邦為柔又曰赫赫南仲薄伐西戎又曰浩浩昊天不駿其德降喪飢饉斬伐四國又曰篤生武王保祐命爾燮伐大啇燮和, SBCK: ''}
