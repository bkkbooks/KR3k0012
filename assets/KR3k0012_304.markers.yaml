  - {type: variant, offset: 966, length: 1013, content: 鄭伯侵陳大獲往歲鄭伯請成于陳成平陳不許五父諫曰親仁善鄰國之寶也君其許鄭陳公也陳侯曰宋衛實難可畏難也鄭何能為遂不許君子曰善不可失惡不可長其陳桓公之謂乎長惡不悛從自及也雖欲救之其將能乎又曰齊君之無道也興師而伐遠方會之又曰君姑脩政而親兄弟之國庶免於難隋侯懼而脩政楚不敢伐又曰初北戎病齊諸侯救之鄭公子忽有功焉齊人餼諸侯使魯次之以周班後鄭鄭人怒請師於齊齊人以衛師助之故不稱侵伐又曰吳伐郯郯成季文子曰中國不振旅蠻夷入伐而莫之或恤又曰晉侯復假道於虞以伐虢宮之奇諫曰虢虞之表虢亡虞必從之晉不可啟寇不可翫一之為甚其可再乎謂二年假晉道伐夏陽也諺所謂輔車相依脣亡齒寒者其虞虢之謂也輔頰輔車牙車也公不聽後遂為晉所滅又曰晉侯使太子申生伐東山皋落氏衣之偏衣珮之金玦先友曰衣身之偏握兵之要又何患焉弧突曰尨涼冬殺今寒玦離胡可恃也里克曰師在制命而已稟命則不威專命則不孝將焉用之也又齊侯伐楚楚使與師言曰君處北海寡人處南爾唯是風馬牛不相及也不虞君之涉吾地何故也管仲對曰昔召康公命我先君太公曰五侯九伯汝實征之賜我先君履東至于海西至于河南至于穆陵北至于無棣爾貢苞茅不入王祭不供寡人是徵昭王南征不復寡人是問對曰貢之不入敢不供給昭王不復君其問諸水濱又曰衛人以燕師伐鄭鄭祭足原繁泄駕以三軍軍其前曼伯與子元潛軍軍其後燕人畏鄭三軍而不虞制人君子曰不備不虞不可以師又曰十年公會鄭伯伐宋壬申公敗宋師于管庚午鄭師入郜辛未歸于我鄭伯後期而公獨敗宋師故鄭獨進兵以入郜入而不貪命魯取之推功上爵讓以自贊也君子謂鄭莊公曰於是乎可謂正矣以王命討不庭不貪其土以勞王爵又曰衛大旱甯莊子曰周飢克殷而年豐今邢方無道諸侯無伯伯長也天其或者欲使衛討邢乎從之師興而雨又曰公伐邾取須句公卑邾不設備而禦之卑小也臧文仲曰國無小不可易也蜂蠆有毒而況國乎弗聽及邾戰于升陘我師敗績又曰楚子以諸侯伐吳使屈申圍朱方朱方吳邑齊慶封所封也屈申屈蕩之子也克之執慶封而盡滅其族慶封以襄二十八年奔吳也將戮慶封椒舉曰臣聞無瑕者可以戮人其肯從於戮乎言不肯默而從戮也王不聽負之斧鉞以徇於諸侯使言曰無或如齊慶封弒其君而弱其孤以盟其大夫齊崔杼弒其君慶封其黨也故以弒君罪責之慶封曰無或如楚恭王之庶子圍弒其君兄之子麋而伐之以盟諸侯王使速弒之又曰四月鄭人侵衛收收衛邑也經書夏四月葬衛桓公今傳直言夏而更以四月附鄭人侵衛牧者於下事宜得月以明事之先後故不復備舉經文也以報東門之役東門役在四年又曰秋衛伐邢以報免囿之役邢不速退所以獨見伐也又曰夏趙盾救焦遂自陰地有, SBCK: ''}
