  - {type: punctuation, offset: 244, content: 《, id: KR3k0012_CHANT_304-bkkpn107}
  - {type: variant, offset: 244, length: 0, content: '', SBCK: 王羲之與㑹稽王牋陳殷浩不冝北伐并論時事又宣紀曰鎭東大將軍諸葛誕殺楊州刺史樂綝以淮南作亂議者請速伐之帝曰吾當與四方同力全勝制之乃表曰昔黥布叛逆漢祖親征隗嚻違戾光武西伐皆所以奮楊赫斯震曜威武也又天}
  - {type: variant, offset: 244, length: 0, content: '', WYG: 建徳四年秋七月武帝召大將已上於大徳殿帝曰太祖神武膺運創造王基兵威所臨有征無戰唯彼偽齊猶懐䟦扈雖復戎車屢駕而大勲未集朕以寡昧纂承鴻緒徃以政岀權宰無所措懐自親覽萬幾便圖東討惡衣菲食繕甲治兵數年以來戰備稍足而偽主昏虐恣行無道伐暴除亂斯實其時今欲數道岀兵水陸兼進北拒大行之路東扼黎陽之險若攻㧞河隂兖豫則馳檄可定然後養鋭享士以待其至但得一戰則破之必矣王公以為何如羣臣咸稱善丁丑詔曰髙氏因時放命據有汾漳擅假名噐厯年永乆朕以亭毒為心遵養時晦遂敦聘好務息黎元而彼懐惡不悛尋事侵軼背言負信竊邑藏姦徃者軍下宜陽釁由彼始兵興汾曲事非我先此獲俘囚禮送相繼彼所拘執曾無一反加以淫刑妄逞毒賦繁興齊魯軫殄悴之哀幽并企求蘇之望既禍盈惡稔衆叛親離不有一戎何以大定今者白藏在辰凉風戒節厲兵詰暴時事惟宜朕當親御六師躬行天罰憑祖宗之靈資將士之力風馳九有電掃八紘可分命衆軍指期進發以柱國陳王純為前一軍總管滎陽公司馬消難為前二軍總管鄭國公逹奚震為前三軍總管越王盛為後一軍總管周昌公侯莫陳瓊為後二軍總管趙王招為後三軍總管齊王憲率衆二萬趣黎陽隋國公楊堅廣寧侯薛迴舟師五萬自渭入河柱國梁公侯莫陳芮率衆一萬守太行道申國公李穆率衆三萬守河陽道常山公于翼帥衆二萬岀陳汝壬午上親率大軍衆六萬直指河隂八月癸邜入于齊境禁伐樹踐苗稼犯者以軍法從事隋書曰崔仲方為虢州刺史上書論取陳之䇿曰臣謹按晉太康元年嵗在庚子晉武平吳至今開皇六年嵗次丙午合三百七載春秋寳乾圖云王者三百年一蠲法令三百之期可謂滿矣陳氏草竊起於庚子至今丙午子午為衝隂陽之忌昔史趙有言曰陳顓頊之族為水故嵗鶉火以滅又云周武王克商封胡公滿於陳至魯昭九年陳災禆竈曰嵗五及鶉火而後陳亡楚克之楚祝融之後也為火正故復滅陳陳承舜後舜承顓頊雖太嵗左行嵗星右轉鶉火之嵗陳族再亡戊午之年媯虞運盡語迹雖殊考事無别皇朝五運相承感火徳而王國號為隋與楚同分楚是火正午為鶉火未為鶉首申為實沉酉為大梁既當周秦晉趙之分若當此分發兵將必得嵗之助以今量古陳滅不疑臣謂午未申酉並是數極蓋聞天時不如地利地利不如人和况主聖臣良兵强國富動植迴心人神計契陳既主昏於上民讟於下險無百二之固衆非九國之師夏癸殷辛尚不能立獨此島夷而稽天討伏度朝廷自有宏謀但芻蕘所見冀申螢爝今惟須武昌已下蘄和滁方吳海等州更帖精兵宻營渡計益信襄荆基郢等州速造舟楫多張形勢為水戰之具蜀漢二江是其上流水路衝要必爭之所賊雖於流頭荆門延州公安巴陵隱磯夏首蘄口盆城置船然終聚漢口峽口以水戰大决若賊必以上流有軍令精兵赴援者下流諸將即須擇便横渡如擁衆自衛上江水軍鼓行以前雖恃九江五湖之險非徳無以為固徒有三吳百越之兵無恩不能自立上覽而大悦轉基州刺史徴入朝仲方因面陳經畧上善之賜以御􅂁袴并雜綵五百段進位開府而遣之及大舉伐陳以仲方為行軍總管率兵與秦王㑹又曰開皇九年大舉伐陳以賀若弼為行軍總管將渡江酹酒而祝曰弼親承廟畧逺振國威伐罪弔民除兇剪暴上天長江鍳其若此如使福善禍淫大軍利渉如事有乖違得葬江魚腹中且不恨又曰李徳林自隋有天下每贊平陳之計八年車駕幸同州徳林以疾不從勅書追之書後御筆注云伐陳意宜自隨也時髙熲因使入京上語熲曰徳林若患未堪行宜自至宅取其方畧髙祖以之付晉王後從駕還在塗中髙祖以馬鞭南指云待平陳訖㑹以七寳裝嚴公使自山東無及之者唐書曰武徳初秦王東討王世充連年未下宿使於野髙祖以兵乆在外議欲班師中書令封徳彛奏曰世充得地雖多而羈縻相屬其所用命者唯洛陽一城而已計盡力窮破在旦夕今若還兵賊勢必振更相連結後必欲悔若乘其已衰破之必矣髙祖從其議及平世充髙祖顧謂侍臣曰朕初興兵東討衆議多有不同唯秦王議行徳彛贊成此計張華叶同晉武亦無以加之又曰髙崇文伐蜀領兵馬取鳯翔斜谷路李元奕領兵馬取駱谷路同赴梓州應接當秦惠王用司馬錯之䇿以伐蜀漢光武使吳漢伐公孫魏司馬}
