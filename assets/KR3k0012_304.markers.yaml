  - {type: variant, offset: 590, length: 2, content: 然後, SBCK: 威有所斬壞伐之爲言敗也白虎通曰王者受命質家先伐文家先改正朔何質家言天命巳使民誅無道故先伐文家天命巳成爲王者故先改正朔也文者先其文質者先其質也故論語曰予小子履改昭告于皇天上帝此謂湯伐桀告天也詩云命此文王言誅伐也禮記曰湯放桀武王伐紂時也尚書曰今予惟恭行天之罰此言開自出伐有扈也王制曰賜之弓矢乃得專征伐犯王誅者也大夫將兵出必不御者欲盛其威使士卒一意繫心故但聞將軍令不聞君命也明進退在大夫也又曰誅者何謂也誅猶責也}
