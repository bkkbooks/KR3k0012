  - {type: variant, offset: 584, length: 2, content: 彼廢, SBCK: 伸巳之􅀻絶天下之交奪天下之􅁠已威得伸巳私也威加於敵家故其國可㧞而其城可隳也無法之懸無功之令言軍法令不應預施懸也司馬法曰見敵作誓瞻功作賞此之謂也犯三軍之衆􅀂使一人犯者用也言明罰雖用衆若使一人也又曰安能動之攻其所愛故我欲戰敵雖髙壘深溝不得不與我戰者攻其所必救也絶糧}
  - {type: page-break, offset: 584, content: '', id: KR3k0012_SBCK_304-8a}
  - {type: variant, offset: 584, length: 2, content: 彼廢, WYG: 伸己之私絶天下之交奪天下之權以威徳伸己之私欲威加於敵故其城可㧞而其國可隳施無法之賞懸無政之令言軍法令不應預施懸也司馬法曰見敵作誓瞻作賞此之謂也犯三軍之衆若使一人犯者用也言明賞雖用衆若使一人也又曰我欲戰敵雖高疊深溝不得不與我戰者攻其所必救也絶糧}
  - {type: page-break, offset: 584, content: '', id: KR3k0012_WYG_304-13a, image: WYG0895/WYG0895-0635c.png}
  - {type: variant, offset: 584, length: 2, content: 彼廢, krp: 伸巳之私絶天下之交奪天下之權已威得伸巳私也威加於敵家故其國可㧞而其城可隳也無法之懸無功之令言軍法令不應預施懸也司馬法曰見敵作誓瞻功作賞此之謂也犯三軍之衆若使一人犯者用也言明罰雖用衆若使一人也又曰安能動之攻其所愛故我欲戰敵雖髙壘深溝不得不與我戰者攻其所必救也絶糧}
  - {type: variant, offset: 587, length: 1, content: 而, SBCK: 守歸路攻其君主上兵伐謀敵始有設謀伐之易其次伐交}
  - {type: variant, offset: 587, length: 1, content: 而, WYG: 阻歸路攻其君主上兵伐謀敵始有設謀伐之易其次伐交下令合春秋説題辭曰伐者渉人國内行威有所斬壊伐之為言敗也白虎通曰王者受命質家先伐文家先改正朔何質家言天命已使己誅無道故先伐文家言天命已成為王者故先改正朔也文者先其文質者先其質也故論語曰予小子履敢昭告于皇天上帝此謂湯伐桀告天也詩曰命此文王言誅伐也禮記曰湯放桀武王誅紂時也尚書曰今予惟恭行天之罸此言啟自出伐有扈者也王制曰賜之弓矢乃得專征伐犯王征誅者也大夫將兵出}
  - {type: page-break, offset: 587, content: '', id: KR3k0012_WYG_304-13b, image: WYG0895/WYG0895-0635d.png}
  - {type: variant, offset: 587, length: 1, content: 而, krp: 守歸路攻其君主上兵伐謀敵始有設謀伐之易其次伐交}
