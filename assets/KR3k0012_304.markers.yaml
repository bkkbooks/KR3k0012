  - {type: variant, offset: 496, length: 1, content: 九, SBCK: 謀人維諸侯維持也諸侯逺方來不奉制令驕佚自專故立牧伯維持督御之同患同利以合諸侯明約有功賞之奢淫不從罰之所以合諸侯也比小大以和諸侯比次也使小國事大國不失尊卑之序以恊諸侯也㑹之所以發禁三者恐禁命不行以亂風化故發丸}
