  - {type: variant, offset: 432, length: 0, content: '', SBCK: 夏癸殷辛尚不能立獨此島夷而稽天討伏度朝廷自有宏謀但蒭蕘所見兾申營爛爝今唯須武昌巳下蘄和滁方呉海等州更怗精兵宻營渡計益信襄荆基郢等州速造舟艥多張勢爲水戰之具蜀漢二江是其上流水路要衝必爭之所賊雖於流頭荆門延洲公安巴陵隱機夏首蘄口盆城置船然終聚漢口峽口以水戰大決􅀂賊必以上流有軍令精兵赴援者下流諸將即湏擇便横渡如擁衆自衛上江水軍鼓行以前雖恃九江五湖之險非德無以爲固徒有三呉百越之兵無恩不能自立上覽而大悅轉基州刺史徵入朝仲方因面陳經略上善之賜以御袍袴并􅄂綵五百叚進位開府而遣之及大舉伐陳以仲方爲行軍緫管率兵}
  - {type: page-break, offset: 432, content: '', id: KR3k0012_SBCK_304-6a}
  - {type: variant, offset: 432, length: 0, content: '', krp: 夏癸殷辛尚不能立獨此島夷而稽天討伏度朝廷自有宏謀但蒭蕘所見兾申營爛爝今唯須武昌巳下蘄和滁方呉海等州更怗精兵宻營渡計益信襄荆基郢等州速造舟艥多張勢爲水戰之具蜀漢二江是其上流水路要衝必爭之所賊雖於流頭荆門延洲公安巴陵隱機夏首蘄口盆城置船然終聚漢口峽口以水戰大決若賊必以上流有軍令精兵赴援者下流諸將即湏擇便横渡如擁衆自衛上江水軍鼓行以前雖恃九江五湖之險非德無以爲固徒有三呉百越之兵無恩不能自立上覽而大悅轉基州刺史徵入朝仲方因面陳經略上善之賜以御袍袴并雜綵五百叚進位開府而遣之及大舉伐陳以仲方爲行軍緫管率兵}
