  - {type: variant, offset: 268, length: 1, content: 殷, SBCK: 僞齊猶懷䟦扈雖復戎車屢駕而大勲未集朕以寡昧纂承鴻緒徃以政出權宰無所措懷自親覽萬機便圖東討惡衣菲食繕甲治兵數年巳來戰備稍足而僞主昬虐恣行無道伐􅁀除亂斯實其時今欲數道岀兵水陸兼進北拒太行之路東扼􅀺陽之險􅀂攻㧞河隂兖豫則馳檄可定然後養銳享士以待其至但得一戰則破之必矣王公以爲何如羣臣咸稱善丁􅐫詔曰髙氏因時放命據有汾漳檀假名器歷年永乆朕以亭毒爲心遵養時晦遂敦聘好務息􅀺元而彼懷惡不悛㝷事侵軼背言􅀒信竊邑藏姦徃者軍下冝陽舋由彼始兵興汾曲事非我先此獲俘囚禮送相繼彼所拘執曾無一反加以淫刑妄逞毒賦繁興齊魯軫殄悴之哀幽并企來􅂫之望旣禍盈惡稔衆叛親離不可一戎何以大定今白藏在辰凉風戒節厲兵詰暴時事惟冝朕當親御六師龔行天罰庶慿祖宗之靈資將士之力風馳九有電掃八紘可分命衆軍指期進發以柱國陳王純爲前一軍緫管滎陽公司馬消難爲前二軍緫管鄭國公逹奚震爲前三軍緫管越王盛爲後一軍緫管周昌公侯莫陳瓊爲後二軍緫管趙王招爲後三軍緫管齊王憲率衆二萬趣􅀺陽隨國公楊堅廣寜侯薛廻舟師三萬自渭入河柱國梁國公侯莫陳苪率衆一萬守太行道申國公李穆衆三萬守河陽道常山公于翼衆二萬岀陳汝壬午上親率六軍衆六萬直指河隂八月癸卯入于齊境禁伐樹踐苗稼犯者以軍法從事隋書曰崔仲方爲􅉑州刺史上書論取陳之䇿曰臣謹案􅀳太康元年歳在庚子􅀳}
