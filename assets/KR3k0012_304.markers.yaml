  - {type: variant, offset: 2503, length: 662, content: 頎勒士眾下伐之費人北遂隳之強公室弱私家尊君卑臣政化大行又曰孔子曰明王之征猶時雨之降行地彌愽得親彌眾是還師於衽席之上也國語曰吳伐越王勾踐請嫡女執箕箒嫡男奉盥𠤷以隨諸御𠤷沷盥器也春秋貢獻不懈王府吳王曰吾將許越成申胥諫曰申胥楚臣伍胥不可許也大夫種勇以善謀將還玩吳國於股掌之上以得其志吳王不聽乃許盟將伐齊申胥諫曰越之在吳猶人有腹心之疾今非越是圖而齊魯為憂夫齊魯譬諸疾疥癬也豈能涉江淮與我爭此地哉王弗聽又曰謀甫諫曰不可先王之於民懋正其德而厚其性阜其財求利其器用明利害之鄉以文脩之使務利而避害懷德而畏威故能保世以滋大昔我先王后稷以服事虞夏及夏之衰也棄稷不務我先王不窋用失其官而自竄于戎狄之間不敢怠業時序其德纂脩其緒脩其訓典朝夕恪勤守以惇篤奉以忠信奕世載德不忝前人至於武王昭前人之光明而加之以慈和事神保民莫不欣喜商王帝辛大惡於民庶民不忍欣戴武王以致戎于商牧是先王非務武也勤恤民隱而除其害也夫先王之制國內甸服國外侯服侯衛賓服夷蠻要服戎翟荒服甸服者祭侯服者祀賓服者享要服者貢荒服者王日祭月祀時享歲貢終王先王之訓也有不祭則脩意有不祀則脩言有不享則脩文有不貢則脩名有不王則脩德序成而又不至則脩刑於是乎有刑不祭伐不祀征不享讓不貢告不王於是乎有刑罰之辟有攻伐之兵有征討之備有威讓之令有文告之辭布令陳辭而又不至則又增脩其德無勤民於遠矣是以近無不至遠無不服今自大畢伯士之終也犬戎氏以其職來王天子曰予必以不享征之且觀之兵其無乃廢先王之訓而王幾頓也吾聞夫犬戎樹惇率舊德而守終純固其有以禦我矣王遂征之得四白狼四白鹿以歸自是荒服者不至又曰文公即位二年欲用其民用用, SBCK: ''}
  - {type: variant, offset: 2503, length: 662, content: 頎勒士眾下伐之費人北遂隳之強公室弱私家尊君卑臣政化大行又曰孔子曰明王之征猶時雨之降行地彌愽得親彌眾是還師於衽席之上也國語曰吳伐越王勾踐請嫡女執箕箒嫡男奉盥𠤷以隨諸御𠤷沷盥器也春秋貢獻不懈王府吳王曰吾將許越成申胥諫曰申胥楚臣伍胥不可許也大夫種勇以善謀將還玩吳國於股掌之上以得其志吳王不聽乃許盟將伐齊申胥諫曰越之在吳猶人有腹心之疾今非越是圖而齊魯為憂夫齊魯譬諸疾疥癬也豈能涉江淮與我爭此地哉王弗聽又曰謀甫諫曰不可先王之於民懋正其德而厚其性阜其財求利其器用明利害之鄉以文脩之使務利而避害懷德而畏威故能保世以滋大昔我先王后稷以服事虞夏及夏之衰也棄稷不務我先王不窋用失其官而自竄于戎狄之間不敢怠業時序其德纂脩其緒脩其訓典朝夕恪勤守以惇篤奉以忠信奕世載德不忝前人至於武王昭前人之光明而加之以慈和事神保民莫不欣喜商王帝辛大惡於民庶民不忍欣戴武王以致戎于商牧是先王非務武也勤恤民隱而除其害也夫先王之制國內甸服國外侯服侯衛賓服夷蠻要服戎翟荒服甸服者祭侯服者祀賓服者享要服者貢荒服者王日祭月祀時享歲貢終王先王之訓也有不祭則脩意有不祀則脩言有不享則脩文有不貢則脩名有不王則脩德序成而又不至則脩刑於是乎有刑不祭伐不祀征不享讓不貢告不王於是乎有刑罰之辟有攻伐之兵有征討之備有威讓之令有文告之辭布令陳辭而又不至則又增脩其德無勤民於遠矣是以近無不至遠無不服今自大畢伯士之終也犬戎氏以其職來王天子曰予必以不享征之且觀之兵其無乃廢先王之訓而王幾頓也吾聞夫犬戎樹惇率舊德而守終純固其有以禦我矣王遂征之得四白狼四白鹿以歸自是荒服者不至又曰文公即位二年欲用其民用用, WYG: ''}
