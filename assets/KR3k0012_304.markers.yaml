  - {type: variant, offset: 247, length: 2, content: 聲繼, SBCK: 􅐄疾遂不得克平逋㓂前賊入境備見敵情觀彼行師殆同兒戯又聞其朝政昬亂政由羣小百姓嗷然朝不謀夕天與不取恐貽後悔􅀂復同徃年出軍河外直爲撫背末扼其喉然􅀳州本髙歡所起之地鎭攝要重今徃攻之彼必來援吾嚴軍以待擊之必克然後乗破竹之勢鼔行而東足以窮其窟穴混同文䡄諸將多不願行帝曰機者事之微不可失矣􅀂有沮吾軍者朕當以軍法裁之巳酉帝揔戎東}
