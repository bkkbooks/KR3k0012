  - {type: variant, offset: 494, length: 0, content: '', krp: 䇿以伐蜀漢光武使呉漢伐公孫述魏司馬文王使鄧艾伐劉禪晉穆帝使桓温伐李子仁宋武帝使朱齡石伐譙縱梁武帝使鄧元起伐劉季連周太祖使尉遲逈平蕭紀隋文帝使梁睿平王謙憲宗命髙崇文平劉闢自秦至元和九度伐蜀四爲水軍泝江而上唯秦與鄧艾尉遲逈梁睿及崇文五在斜谷駱谷岀師南討不廷古司馬兵法曰王霸之所以治諸侯者以土地刑諸侯列相也相諸侯優劣地而封之以德受土廣德受土小也以正命平諸侯王者以道德善政敎訓諸侯平均之以禮信結諸侯謙㳟愛惠接待諸侯官命誠信以治民心以材力說諸侯材能也力者任重理煩能堪物理事位髙力大故諸侯悦來各修其}
