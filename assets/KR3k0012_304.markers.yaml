  - {type: variant, offset: 237, length: 3, content: 清明肆, WYG: 昏霧巳時方歇梁主親戎百官并甲胄從於禊飲堂是日大風㧞木玊琛既至石梵未見我軍乃馳書報黄羅漢曰吾至梵境境恬然前日所言皆兒戲耳羅漢入啟梁王疑之庚午續講百官以戎服聽後周書曰建徳五年冬十月帝謂羣臣曰朕去嵗屬有}
