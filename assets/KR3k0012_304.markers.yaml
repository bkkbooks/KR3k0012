  - {type: variant, offset: 650, length: 2, content: 楚門, SBCK: ''}
  - {type: variant, offset: 650, length: 250, content: 楚門于巢攻巢門也巢牛臣曰吳王勇而輕若啟之將親門啟開門也我獲射之必殪殪死是君也壃其少安吳子門焉牛臣隱於短墻以射之卒又曰晉師伐楚至於邲楚師出陣楚將孫叔敖曰進之寧我薄人無人薄我詩云元戎十乘以先啟行先人也元戎戎車在前軍言王者軍行必有戎車十乘在前開道先人為備御之也軍志曰先人有奪人之心薄之也奪敵戰也遂疾進師車騎卒奔乘晉師荀林父不知所為鼓於軍中曰先濟者有賞中軍下軍爭舟舟中之指可掬也兩手曰掬下軍禆將趙嬰齊使其徒先具舟于河故敗而先濟又曰晉伐齊齊侯駕將走郵棠郵棠齊邑郵羽求切太子與郭榮扣馬太子光也榮齊大夫曰師速而疾略, WYG: 擊}
