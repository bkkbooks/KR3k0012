  - {type: variant, offset: 1647, length: 0, content: '', WYG: 尅廣陵斬誕初立馳道自閶闔門至朱雀門又自承明門至於𤣥武湖七年於博望梁山立雙闕八年閏五月帝崩於玉燭殿年三十五沈約宋書曰世祖逰幸無度太后六宫常乘副車在後沈懷文與王景文毎諌不冝數出嘗同從坐松樹下風雨甚驟景文曰卿可}
  - {type: page-break, offset: 1647, content: '', id: KR3k0012_WYG_128-11b, image: WYG0894/WYG0894-0194d.png}
  - {type: variant, offset: 1648, length: 0, content: '', WYG: 言矣懷文曰獨言無益冝相與諌之江智淵卧草側亦謂言之為善俄而被召俱入雉塲懷文曰風雨如此非聖躬所冝冒景文又曰懷文所啓冝從智淵未及有言上方注弩作色曰卿欲効顔峻耶何以恒知人事又曰顔峻小子恨不得鞭其面劉子業沈約宋書曰前廢帝諱子業小字法師孝武帝長子也世祖入伐元㓙被囚於侍中下省将見害者數矣卒得無恙世祖崩其日}
  - {type: page-break, offset: 1648, content: '', id: KR3k0012_WYG_128-12a, image: WYG0894/WYG0894-0195a.png}
