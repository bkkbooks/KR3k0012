  - {type: variant, offset: 3405, length: 1, content: 四, WYG: 等二}
  - {type: variant, offset: 3407, length: 0, content: '', SBCK: 四帝少而和羙風姿端雅早失所生飬於路太后房内大明丗諸弟多􅀍㺓忌唯上見親常侍路太后醫藥好讀書愛文義在藩時撰江左以來文章志又續衛瓘所注論語二卷行丗及即大位四方反叛以寛仁待物諸將帥有父兄子弟同逆者並授以禁兵委任不異故衆爲之用莫不盡力平定天下逆黨多􅀍全宥其才者並見授用有如舊臣才學之士多蒙引進參攷典籍應對左右於華林園茆堂講周易常自臨聽末年好􅀑神多忌諱近䜛慝剪落皇技宋氏之業自此衰矣沈約宋書曰王景文爲􅀭州刺史上旣有疾而諸弟並已見殺唯桂楊王休範人才夲下不見疑出爲江州刺史慮一旦晏駕皇后臨朝景文自然成宰相門族強盛籍元舅之重􅀊暮不爲純臣太豫元年春上疾篤乃遣使送藥賜景文死手詔曰與卿周旋欲全卿門户故有此處分劉昱沈約宋書曰廢帝諱昱字德融小字慧震明帝長子也太宗諸子在孕皆以周易筮之即以得之卦爲小字故帝字慧震立爲皇太子太宗崩太子即位元徽元年正月改元二年太尉江州刺史桂陽王休範舉兵反賊奄至攻新亭壘齊王拒擊大破之越􅀐校尉張苟兒斬休範}
