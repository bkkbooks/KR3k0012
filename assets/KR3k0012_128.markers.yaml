  - {type: variant, offset: 2943, length: 204, content: 曰朕之皇祖北遷幽朔改姓姒氏後從母為劉氏子從母姓非禮也古人氏族無常王者繼天為子是為徽赫實與天連今改姓曰赫連氏庶協皇天之意攴庶非正統者以鐵代為氏庶朕宗予剛銳如鐵皆堪伐人二年立夫人梁氏為后立子璝為太子四年九月劉裕滅秦入于長安十二月裕留子義真鎮長安而還勃大悅遂圖進取之計遣太子璝率騎二萬南伐長安五年義真遣龍驤將軍沈田子率眾逆戰璝擊敗之退屯劉廻堡八月勃進據咸陽劉裕大懼乃召義真東鎮洛勃入長安正月群臣勸勃稱皇帝三月壇于霸, SBCK: 書施行}
