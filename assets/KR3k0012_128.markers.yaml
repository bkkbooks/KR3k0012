  - {type: variant, offset: 2279, length: 868, content: 至水前者銜馬尾後者迭相銜尾而渡識者以為民遷之象七月魏師來伐神高八月石城邊東營丘城周四郡並降魏九月魏師引還徙民四萬餘戶而西三年六月魏永昌王健來伐五年四月遣右衛孫德乞師于宋十二月又遣尚書陽伊請迎于勾麗六年三月端門崩四月魏又遣侍中達興公虞弼東平公鵝青伐攻剋白狼句麗將葛居孟光率眾數萬隨陽伊來迎屯于臨川尚書令郭生因民之憚遷開門而引魏軍魏軍疑而不赴生遂勒眾攻弘弘引句麗兵入自東門與生戰于闕下生中流矢卒句麗軍既入城取武庫甲以給其眾城內美女皆句麗軍人所掠五月乙卯弘率龍城見戶東徙焚燒宮殿火一旬不絕令婦人被甲居中陽伊等勤精兵於外葛居孟先率騎後殿方軌而進前後八十餘里魏軍追至遼水不擊而還遣使徵弘于句麗後二年為句麗所殺偽謚昭成皇帝自馮跋太平元年歲在己酉至弘滅亡之歲丙子二十八載夏赫連勃勃崔鴻十六國春秋夏錄曰赫連勃勃朔方人右賢王去卑之後劉元海之族也曾祖父劉虎前趙嘉平中以宗室封樓煩公拜安北將軍丁零中郎將祖父豹後趙建武中拜平北將軍左賢王父衛辰符堅以為西單于督攝河西諸虜屯于伐來城因秦末兵亂遂有朔方之地控弦之士三萬八千姚萇拜辰大將軍河西王大單于魏師來伐辰遣子右地代率騎二萬拒戰河東為魏所敗遂乘勝濟河攻剋伐來執辰殺之勃勃辰弟三子奔秦高平公沒弈于妻之以女姚興以勃勃為持節安將軍五原公配以三交五部鮮卑及雜虜二萬餘落鎮朔方時河西鮮卑杜崙獻馬八千匹于秦濟河至大城勃勃留之召其眾二萬襲殺高平公沒弈于而并其眾至數萬自稱天王大單于大赦改弘始十年為龍昇元年置百官以匈奴夏后氏之苗裔僭稱大夏以大兄右地代為丞相代公發嶺北民夷十萬於朔方黑渠之南營起京城大赦改龍昇七年為鳳翔元年令曰朕之皇祖北遷幽朔改姓姒氏後從母為劉氏子從母姓非禮也古人氏族無常王者繼天為子是為徽赫實與天連今改姓曰赫連氏庶協皇天之意攴庶非正統者以鐵代為氏庶朕宗予剛銳如鐵皆堪伐人二年立夫人梁氏為后立子璝為太子四年九月劉裕滅秦入于長安十二月裕留子義真鎮長安而還勃大悅遂圖進取之計遣太子璝率騎二萬南伐長安五年義真遣龍驤將軍沈田子率眾逆戰璝擊敗之退屯劉廻堡八月勃進據咸陽劉裕大懼乃召義真東鎮洛勃入長安正月群臣勸勃稱皇帝三月壇于霸, WYG: ''}
