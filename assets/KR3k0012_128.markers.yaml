  - {type: variant, offset: 649, length: 1, content: 河, SBCK: 髙祖固讓加録尚書封豫章公邑萬戸絹三萬匹鮮卑慕容德􅆫號於青州德死從子超襲僞位公抗表北討屠廣因超踰城走獲之戮其王公以下約口萬餘馬二千匹夷其城隍獻超于京師斬于建康市盧循㓂南康廬陵豫章諸郡守皆委任奔走馳使徴公公至下邳留􅂳運輜重自帥精銳歩歸孟昶諸􅁑長民懼㓂之深也欲擁天子過江公弗聽昶窮窘無餘圗飲藥而卒群賊大至公悉出輕利帝躬提幡鼓命軍衆齊力擊之賊衆大敗追奔逮夜乃収兵而歸循等還潯陽公更簡練三軍將進攻討循聞大軍至欲遁還豫章乃悉力柵斷左里丙申大軍至左里將戰公麾以進兵幡竿折遂沉于水衆皆失色公自忻􅀏曰徃年覆舟之戰亦幡竿折今復然賊必破矣衆乃大恱即攻柵並進循兵雖死戰猶弗能禁諸軍乗勝擊之循單舸走劉蕃孟懷玉斬徐道覆于始興傳首京師交}
