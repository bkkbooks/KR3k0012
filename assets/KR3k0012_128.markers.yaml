  - {type: variant, offset: 275, length: 277, content: 城以都之三年符登遣使拜仁大將軍苑川王四年六月薨偽謚曰烈王廟號烈祖乞伏乾歸崔鴻十六國春秋西秦錄曰乞伏乾歸國仁弟雄武有度略仁薨群寮以仁子公府幼稚乃立乾歸為將軍大單于河南王大赦改四年為太初元年立妻邊氏為后以南川侯出連乞都為丞相九月遷于金城二年正月符登遣使拜為大將軍金城王六年立子熾盤為太子七年登遣使授左丞相河南王假黃鉞加九錫之禮十月氐王楊定步騎四萬來伐歸勒眾而進大敗定軍斬定及首級萬有七千於是盡有隴西之地十二月僭稱秦王大赦八年呂光來伐歸乃稱蕃遣子勃勃為質既而悔之十三年秦征西大將軍姚碩德率眾來伐入自兩安峽歸次于隴西以拒碩德興潛師繼發歸聞興至自率輕騎數千候興俄與, SBCK: 督}
