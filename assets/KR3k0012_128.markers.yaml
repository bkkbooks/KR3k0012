  - {type: variant, offset: 181, length: 0, content: '', SBCK: 逆旅沙門言及中原事故因云江表㝷當喪亂髙祖曰便遂至亂亡當有拯之者不沙門曰拯之者其在君乎其意甚至􅀄髙祖患手瘡積年未瘳沙門曰此瘡難治先有良藥當以相與因出懐中黄散褁}
  - {type: variant, offset: 181, length: 0, content: '', krp: 逆旅沙門言及中原事故因云江表㝷當喪亂髙祖曰便遂至亂亡當有拯之者不沙門曰拯之者其在君乎其意甚至𥘉髙祖患手瘡積年未瘳沙門曰此瘡難治先有良藥當以相與因出懐中黄散褁}
  - {type: variant, offset: 183, length: 0, content: '', SBCK: 沙門旣去髙祖追而望之倐忽不見以黄散治瘡一􅀓而愈餘散寳録之􅀍金瘡輙用有驗晉陵人韋叟少以占相爲事其言多驗嘗相髙祖曰君當立主方伯乆之又曰君相輙進貴不可言唯願冨貴無相志晉末妖賊孫恩作亂前將軍劉牢之東討牢之請髙祖參軍事牢之命髙祖覘賊逺近將勇士數十人㑹遇賊至仍迎擊之賊衆數千髙祖所將人多死而戰意方酣奮}
