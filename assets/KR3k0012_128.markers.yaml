  - {type: variant, offset: 1082, length: 0, content: '', SBCK: 閶闔門至朱雀門又自朱雀門至於􅀇武湖七年於博望山立􅀟闕八年閏五月帝崩於玉燭殿年三十五沈約宋書曰丗祖遊幸無度太后六宫常乗副車在後沈懷文與王景文毎諫不宜數出後同從坐松樹下風􅀨甚驟景文曰卿可以言矣懷文曰獨言無係宜相與諌之江智淵卧草側亦謂言之爲善俄而􅀍召俱入雉􅂣懷文曰風􅀨如此非聖躬所宜冒景文又曰懷文所啓宜從智淵未及有言上乃注弩作色曰卿欲效顔峻耶何以恒知人事又曰顔峻小子恨不得鞭其靣目劉子業沈約宋書曰前廢帝諱子業小字法師孝武帝}
  - {type: variant, offset: 1082, length: 0, content: '', krp: 閶闔門至朱雀門又自朱雀門至於玄武湖七年於博望山立雙闕八年閏五月帝崩於玉燭殿年三十五沈約宋書曰丗祖遊幸無度太后六宫常乗副車在後沈懷文與王景文毎諫不宜數出後同從坐松樹下風雨甚驟景文曰卿可以言矣懷文曰獨言無係宜相與諌之江智淵卧草側亦謂言之爲善俄而𬒳召俱入雉埸懷文曰風雨如此非聖躬所宜冒景文又曰懷文所啓宜從智淵未及有言上乃注弩作色曰卿欲效顔峻耶何以恒知人事又曰顔峻小子恨不得鞭其靣目劉子業沈約宋書曰前廢帝諱子業小字法師孝武帝}
  - {type: variant, offset: 1083, length: 4, content: 安逃歸拜, SBCK: 子也丗祖入伐元凶􅀍囚於侍中下省將見害者數矣卒得無恙丗祖崩其日太子即皇帝位罷南北二馳道孝建以來所改制度還依元嘉是􅀊諸郡大旱甚米一斗數百京邑亦至百餘永光元年春改元大赦八月帝自率􅀫衛兵誅太宰江夏王義恭尚書令驃􅀐大將軍柳元景}
