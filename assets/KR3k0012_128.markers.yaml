  - {type: variant, offset: 36, length: 2, content: 南出, WYG: 将軍檀道濟討荆州刺史謝晦上親帥六師擒晦於延頭送京師伏誅京師疾疫遣使存問給醫藥死者若無家屬賜以棺木十二年大水京邑乘舡二十四年貨貴制大錢一當兩三十年三月遇弑于含光殿年四十七劉劭沈約宋書曰劉劭字休逺文帝長子六歳拜為皇}
