  - {type: variant, offset: 3408, length: 3, content: 謚武烈, SBCK: 年七月戊子夜帝殞於仁壽殿􅀄帝在東宮年五六􅀊時始就書學而墮業好嬉戯主師不能禁好縁􅃮帳竿去地二丈餘如此者半食乃下年漸長喜怒無節左右有失旨者輙手加撲打徒跣蹲踞以此爲常主師以白太宗上輙敕昱所生嚴加捶訓及嗣位内畏太后外憚諸臣猶未得肆志自加元服變態轉興内外稍無以制三年秋冬間便好出遊行太妃毎乗青篾車隨相撿攝漸自放恣太后不復能禁單將左右棄部伍或十里二十里入市里或徃營署旦出日暮乃歸四年春夏此行弥數自京城尅定意志轉驕於是無日不出與左右人解僧智張立􅀑恒自馳逐夜出承明門夕去晨反旦去暮歸從者並執鋋矛行人男女及馬驢值無免者民間憂懼晝日不敢開門道上行人殆絶常着小袴未嘗服衣冠有白棓數十枚各有名號鉗鑿錐鋸之徒不離左右嘗以鐵錐錐人隂破左右人見歛眉者昱大怒令此人祖臂正立以矛刺臂洞骨於耀靈殿上飬驢數十頭所自乗馬飬於御床側先是民間訛言謂太宗不男昱是李道兒子昱每出入去來常自稱劉統或自號李將軍與右衛翼輦營女子私通毎從之遊持百數十錢供酒肉之費輅車一乗其上施蓬乗以出入從者不過數十人羽儀追之恒不及又各慮禍亦不敢追㝷惟整部伍别在一處瞻望而巳凡諸鄙事過目即能能鍜金銀裁衣作帽莫不精絶未嘗吹箎執管便韻天性好殺以此爲忻一日無事慘慘不樂齊王濳圗廢立與直閣將軍王敬則謀之七月七日昱乗露車從二百許人無復鹵簿羽儀徃青園尼寺曉至新安寺就曇渡道人飲酒醉扶夕還仁壽殿東阿氊幄中卧時昱出入無禁大内諸閣夜皆不閇廂下畏相逢值無敢出者􅀫衛竝逃避内外無相禁攝王敬則先結昱左右楊萬年等二十五人謀共取昱其夕王敬則出外楊玉夫見昱醉熟無所知乃與萬年同入氊幄内以昱防身刀斬之提昱首依常行法稱敕開承明門出以首與敬則馳至領軍府以首付齊王齊王乃戎服率左右數十人稱行還開承明門入昱他夕每開門門者震懼不敢視至是弗之疑齊王旣入曉乃奉太后令奉迎安成王劉准沈約宋書曰順}
