  - {type: variant, offset: 193, length: 1, content: 勇, SBCK: 丹徒以髙祖爲中軍參軍􅀇簒帝位循入朝􅀇髙祖從至京師􅀇旣􅀫憚髙祖威名又恱髙祖之風儀姿貌語司徒王謐曰昨見劉􅁉卿不得獨擅其清或􅀃􅀇曰劉􅁉龍行虎歩瞻視不凡恐必不爲人下宜早爲其所􅀇曰我方欲平蕩中原使􅁉以萬人爲前驅關隴不足定也事定之後當更議之耳髙祖乃與弟道規沛郡劉毅東海何無忌潜謀匡復桓循弟弘以征虜將軍領廣陵以道規爲中兵參軍劉毅先亦爲弘吏佐遭母憂還京口是至住江北與道規共集義徒髙祖託遊獵㑹無忌及任城魏詠之髙平擅慿之及從弟蕃等同謀二十七人并願從者百餘人是時大風􅁀起丙辰詰朝城門開義衆馳入稱有詔齊聲大呼吏}
