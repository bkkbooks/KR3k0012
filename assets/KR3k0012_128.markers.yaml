  - {type: variant, offset: 33, length: 2, content: 自漠, WYG: 廢義真然後廢帝侍中程道惠勸立第五皇弟義恭羨之不許遣使殺義真於新安殺帝於吳縣帝突走出昌門追者以門關擊之倒地然後加害劉義隆沈約宋書曰太祖文皇諱義隆小字車兒武帝第三子也授西中郎将荆州刺史長七尺五寸博涉經史善𨽻書少帝廢百官備法駕奉迎即皇帝位改元元嘉元年三年正月司徒録尚書事揚州刺史徐羨之尚書令䕶軍將軍𫝊亮有罪伏誅遣中領軍到彦之征}
