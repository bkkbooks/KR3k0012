  - {type: 'tls:seg', offset: 5, content: '', id: KR3k0012_CHANT_128-1a.2}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 沙門于逆旅沙門言及中原故事因云江表尋當喪亂髙祖曰便遂至亂亡當有拯之者沙門曰拯之者其在君乎其意甚至初髙祖患手瘡積年未瘳沙門曰此瘡難治先有良藥當以相與因出懷中黄散裹留之沙門既去髙祖追而望之倐忽不見以黄散治瘡一傅而愈餘散寳藏之被金瘡輙用有驗晉陵人常叟少以占相為事其言多驗嘗相髙祖曰君當貴為方伯乆之又曰君相輙進貴不可言唯願富貴無相忘晉末妖賊孫恩作亂前将軍劉牢之東討牢之請髙祖叅軍事牢之命髙祖覘賊逺近将勇士數十人會遇賊至乃迎擊之賊衆數千髙祖所将人多死而戰意方酣奮長刀所殺傷甚衆牢之子敬宣疑髙祖淹乆恐為賊所殺乃輕騎赴之既而衆騎並至賊遂大崩髙祖為流矢所傷信宿而愈自後累被重傷皆弗以為患軍中益加敬憚恩北走海鹽髙祖追而翼之築城于海鹽故治恩知城弗可下乃進向滬瀆帝復棄城追之恩乘風浮海奄至丹徒師衆數萬鼔噪登于蒜山居民皆荷擔而走髙祖率所領奔擊大敗之投巘赴水死者甚衆恩顛沛僅得還船雖被摧破猶恃衆力遂徑向京師朝廷震懼以高祖為建武将軍下邳太守帥舟師討恩于郁洲復大破之桓𤣥從兄循以撫軍鎮丹徒以髙祖為中兵叅軍𤣥簒帝位循入朝𤣥髙祖從至京師𤣥既宿憚髙祖威名又悦髙祖之風儀姿貌語司徒王謐曰昨見劉裕卿不得獨擅其清或告𤣥曰劉裕龍行虎步瞻視不凡恐必不為人下冝早為之所𤣥曰我方欲平蕩中原使裕以萬人為前驅關隴不足定也事定之後當更議之耳高祖乃以弟道規沛國劉毅東海何無忌潜謀匡復桓循弟𢎞為征虜将軍鎮廣陵以道規為中兵叅軍劉毅先亦為𢎞吏佐遭母憂還京口至是往江北與道規共集義兵髙祖㑹無忌及任城魏詠之劉毅從弟蕃等共謀二十七人并願從者百餘人是時大風暴起丙辰詣朝門義衆馳入稱有詔齊聲大呼吏士驚散即獲桓循斬而徇之與主簿平昌孟昶等帥将士六十人斬𢎞於廣陵城因収衆濟江𤣥遣頓丘太守吳甫之右衛将軍皇甫敷北拒義軍或曰裕等衆力甚弱豈辦之有成陛下何慮之甚𤣥曰劉裕足為一世之雄劉毅家無儋石之儲樗蒱一擲百萬何無忌劉牢之甥酷似其舅共舉大事何謂無成衆推高祖為盟主移檄京邑遇吳甫之於江乘甫之𤣥驍将也其兵甚鋭髙祖躬執長刀入其陣衆皆披靡即斬甫之進至羅落橋高祖望賊旗鼓誓衆馳進挺劔指麾光耀如電将軍皆莫敢仰視但憑神武争為先登皆殊死戰無不一以當百呼聲動天地風火並起鉦鼓之音震駭京邑桓謙等諸軍一時土崩髙祖鎮石頭畱百官羣寮宿衛各率其職於是推髙祖為使持節都督揚徐兖豫青冀幽并八州諸軍事鎮軍将軍徐州刺史桓𤣥經潯陽江州刺史郭昶之備乘輿法服以資之收畧二千餘人挾天子奔于江陵冠軍将軍劉毅輔國将軍何無忌帥諸軍南討獲𤣥大将軍鄭鈐等于桑落洲𤣥棄衆復挾天子}
