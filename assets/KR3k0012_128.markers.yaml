  - {type: variant, offset: 3233, length: 2, content: 追尊, WYG: 上大漸袁粲禇淵劉勔蔡興宗沈攸之同被顧命上崩于景福殿年三十四帝少而和令丰姿端雅早失所生養於路太后宫内大明世諸弟多被猜忌唯上見親常侍太后醫藥上好讀書愛文義在藩時撰江左以來文章志又續衞瓘所注論語二卷行世及即大位四方反叛以寛仁待物諸將帥有}
