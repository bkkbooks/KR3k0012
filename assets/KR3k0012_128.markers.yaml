  - {type: variant, offset: 874, length: 769, content: 將軍智達追擒公府于嵻㟍山南轘裂之八月葬歸于抱罕元平陵偽謚武元王廟號高祖乞伏熾盤崔鴻十六國春秋西秦錄曰乞伏熾盤乾歸太子歸薨自稱大將軍河南王改年為永康元年以尚書令翟就為相國封拜各有差二年盤討吐谷渾別統屈達于渴渾川大破之俘獲男女二萬三千三年正月有五色雲起於南山盤大悅謂群臣曰吾今年應有所定王業成矣於是繕甲整兵以待四方之隙五月聞傉擅西征率步騎二萬襲樂都傉檀降遂并南涼兵強地廣十月僭即秦王位置百官立妻吐蕃氏為王后四年盤子元基自長安逃歸拜尚書左僕射建弘元年立第二子慕末為太子領撫軍改年大赦九年盤寢疾顧命太子慕末乃薨于外寢六月葬武平陵謚文昭王廟號太祖乞伏慕末崔鴻十六國春秋西秦錄曰乞伏慕末字安石熾盤之太子幼而好學有文才建弘年立為太子盤薨僭即秦王位大赦改年為永弘元年二月立子萬載為太子三年九月部民多叛未焚城邑毀寶器率戶五千東如上邽為赫連定所拒遂國南安十一月魏遣尚書庫結率騎五千迎末衛軍吉毗固諫以為不宜遂內徙從之庫結引還四年赫連定遣其叔北平公韋代率眾一萬攻南安城內大飢人相食傳侍中乞伏延祚吏部尚書乞伏跋跋踰城奔代末乃御璧出降送于上邽及宗族五百餘人悉為赫連定所誅自國仁建義元年乙酉歲至辛未四十七載晉書曰熾盤在位七年而宋氏受禪以宋元嘉四年死子慕末嗣在位三年為赫連定所殺始國仁以孝武大元十年僭位至慕末四世凡四十有六載而滅北燕馮跋崔鴻十六國春秋北燕錄曰馮跋字文起長樂信都人其先畢萬之後也子孫食菜馮鄉因以氏焉晉永嘉之亂祖父和避地上黨父安雄有器量為慕容永將永滅跋東徙和龍長樂中跋夜見天門開神光赫然燭於庭中永康末拜中衛將軍建始元年與二弟結謀襲殺慕容熙立高雲為主正始元年以跋為中外都督開府儀同三司錄尚書封武邑公太平元年雲為離班桃仁所殺下督李垂等誅班及仁群臣推跋為主僣即天王位大赦令曰義貴適時不必改作故陳氏代姜不徙齊號即號燕國改為太平元年追尊祖和為元皇帝父安為宣帝子永為太子, WYG: 堂}
