  - {type: variant, offset: 1929, length: 167, content: 非常宋夫人規立其子受惡翼聽政謂之曰上疾將瘳柰何便欲代父臨天下乎翼性仁弱遂還東宮一日三省疾宋夫人矯絕內外遣閽寺傳問而已翼及大臣皆不得見跋弟弘於是舉壯士數十人裏甲入禁中宿衛皆不戰而散宋夫人命閉東閤弘家僮庫斗頭徑捷有勇力踰閤而入至于皇堂射殺女御一人跋驚懼而薨弘遣脩城告曰天降凶禍大帝崩背太子不侍疾群公不奔喪疑有逆謀國危社稷吾備太弟之親遂攝大, WYG: 羽儀雖未即}
