  - {type: variant, offset: 368, length: 0, content: '', WYG: 世祖及南譙王義宣隨王誕並舉義兵劭以事委王羅漢魯秀以拒義軍三月十九日義軍至新林二十一日至新亭二十二日劭衆連敗相繼散降五月四日義軍薛安郡等並入殿臧質從廣莫門入同㑹大極殿前劭穿西垣入武庫即從井中牽出縳劭於馬上防送軍門斬于牙下濬劭及四子並梟首暴屍於市投劭濬屍于江張超之為亂軍剖腹刳心臠食其肉焚其骨道育鸚鵡並都街鞭殺於石頭四望山下焚屍揚灰于江後史云劭為元㐫劉駿沈約宋書曰世祖孝武皇帝諱駿字休龍小字道民文帝第三子遷南中郎将江州刺史元㓙弑逆以為征南将軍加散騎常侍上帥衆入討荆州刺史南譙王義宣雍州刺史臧質並舉義兵元嘉三十年四月上至于新亭即皇帝位五月尅京城孝建元年春親祀南郊改元大赦詔凡諸守蒞親民之官有申詳舊條勸盡地利力田善蓄者具以名聞更鑄四銖錢}
