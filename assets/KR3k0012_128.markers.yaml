  - {type: variant, offset: 30, length: 0, content: '', WYG: 慕容德僣號於青州德死從子超襲偽位公抗表北討屠廣固超踰城走獲之戮其王公以下約口萬餘馬二千疋夷其城隍獻超于京師斬于建康市盧循㓂南康廬陵豫章諸郡守皆委任奔走馳使徴公公至下邳留船運輜重自帥精鋭步歸孟昶諸葛長民懼冦之深入欲擁天子過江公弗聴昶窮窘無餘圖飲藥而卒羣賊大至公悉出輕利鬭艦躬提幡鼓命軍衆齊力擊之賊衆大敗追奔逮夜乃收兵而歸循等還潯陽公更簡練三軍将進攻討循聞大軍至欲遁還豫章乃悉力柵斷左里丙申大軍至左里将戰公提幡麾以進兵幡竿折遂沉于水衆皆失色公自忻笑曰徃年覆舟之戰亦幡竿折今復然賊必破矣衆乃大悦即攻柵並進循兵雖死戰猶弗能禁諸軍乘勝擊之循單舸走劉蕃孟懷玉斬徐道覆于始興傳首京師交州刺史杜慧度斬盧循父子函首送都劉毅為荆州刺史矜功驕恣公表請討之毅及黨與皆伏誅分遣諸軍伐蜀以朱齡石為益州刺史公授以謀畧遂平成都斬偽蜀王譙縱荆州刺史司馬休之潜結雍州刺史魯宗之宗之得書響應公帥衆軍西討休之不敢戰乃棄城走奔羌羌偽主姚興死子泓新立}
