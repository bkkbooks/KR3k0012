  - {type: variant, offset: 3380, length: 4, content: 勃寢疾八, WYG: 戊子夜帝殞於仁壽殿初帝在東宫年五六歳時始就學而惰業好嬉戲主師不能禁好緣漆帳竿去地丈餘如此者半食乆乃下年漸長喜怒無節左右有失㫖者輙手加撲打徒跣蹲踞以此為常主師以白太宗上輒敕昱所生嚴加捶訓及嗣位内畏太后外憚諸臣猶未得肆志自加元服變態轉興内外稍無以制三年秋冬間便好出遊行太妃毎乘青篾車随相檢攝漸自放恣太妃不復能禁單将左右棄部伍入市里或十里二十里或往營署旦出日暮乃歸四年春夏此行彌數京城尅定意志轉驕於是無日不出與左右人解僧智張五兒恒相馳逐夜出承明門夕去晨反旦去暮歸從者並執鋋矛行人男女及馬驢值無免者民間憂懼晝夜不敢開門道上行人殆絶常著小袴褶未嘗服衣冠有白棓數枚各有名號鉗鑿錐鋸之徒不離左右常以鐵錐錐人陰破左右人有歛眉者昱大怒令此人袒胛正立以矛刺胛洞骨於耀靈殿上養驢數十頭所自乘馬養於御床側先是民間訛言謂太宗不男昱是李道兒子昱毎出入去來常自稱劉統或自號李將軍與右衛翼輦營女子私通毎從之遊持數千錢供酒肉之費製露車一乘其上施蓬乘以出入從者不過數十人羽儀追之恒不及又各慮禍亦不敢追尋唯整部伍别在一處瞻望而已凡諸鄙事過目即能鍜金銀裁衣作㡌莫不精絶未嘗吹篪執管便韻天性好殺以此為歡一日無事慘慘不樂齊王潜圖廢立與直閣将軍王敬則謀之七}
