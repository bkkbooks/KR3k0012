  - {type: variant, offset: 187, length: 3, content: 為鎮西, SBCK: 爲患軍中益加敬憚恩北走海鹽髙祖追而翼之築城于海鹽故治恩知城弗可下乃進向滬髙祖復弃城追之恩乗風浮海􅍕至丹徒師衆數萬鼓噪登于蒜山居民皆荷檐而走髙祖率所領奔擊大破之投巘赴水死者甚衆恩顚沛僅得還􅂳雖􅀍摧破猶恃衆力遂徑向京師朝廷震懼以髙祖爲建武將軍下邳太守帥舟師討恩于郁洲復大破之桓􅀇從兄循以撫軍}
