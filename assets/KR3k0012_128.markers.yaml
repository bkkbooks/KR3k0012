  - {type: variant, offset: 1079, length: 0, content: '', SBCK: 六歳拜爲皇太子二十七年有巫嚴道育自言通靈天爲刧没入奚官劭姊東陽公主應閤婢王鸚鵡白公主云道育有異術主乃白上求入道道育自言服食主及劭皆惑之始興王濬與劭並多過失使道育祈請令不上逹遂誣蠱事泄道育叛亡變服爲尼逃柬宫濬徃京口復載將去三十年二月濬自京口入朝復載還東宫有告上云京口有一尼服食出入征北内似是嚴道士上使掩捉得二婢云道育隨濬還都上乃使京口送道育二婢頃至撿覆廢劭賜濬死母潘淑妃具以告濬濬馳報劭劭因是有異謀其月二十一日召前中庶子蕭斌告以逆事明旦與斌同載從萬春門入張超之手行殺逆又使人殺潘淑妃濬屯中堂劭即僞位改}
  - {type: page-break, offset: 1079, content: '', id: KR3k0012_SBCK_128-6a}
  - {type: variant, offset: 1079, length: 0, content: '', krp: 六歳拜爲皇太子二十七年有巫嚴道育自言通靈天爲刧没入奚官劭姊東陽公主應閤婢王鸚鵡白公主云道育有異術主乃白上求入道道育自言服食主及劭皆惑之始興王濬與劭並多過失使道育祈請令不上逹遂誣蠱事泄道育叛亡變服爲尼逃柬宫濬徃京口復載將去三十年二月濬自京口入朝復載還東宫有告上云京口有一尼服食出入征北内似是嚴道士上使掩捉得二婢云道育隨濬還都上乃使京口送道育二婢頃至撿覆廢劭賜濬死母潘淑妃具以告濬濬馳報劭劭因是有異謀其月二十一日召前中庶子蕭斌告以逆事明旦與斌同載從萬春門入張超之手行殺逆又使人殺潘淑妃濬屯中堂劭即僞位改}
  - {type: variant, offset: 1080, length: 1, content: 基, SBCK: 嘉三年爲太􅀄元年丗祖及南譙王義宣隨王誕並舉義兵劭以事委王羅漢魯秀以拒義軍三月十九日義軍至新林二十一日至新亭二十二日劭衆連敗相繼散降四月四日義軍薛安都等並入殿臧質從廣莫門入同㑹大極殿劭穿西垣入武庫井中即從井中牽出􅅞劭於馬上防送軍門斬于牙下濬劭及四子並梟首曝屍於市投劭濬屍于江張超之爲亂兵所剖腹刳心臠食其肉焚其頭骨道育鸚鵡並都街鞭殺於石頭西望山下焚屍􅀭灰于江後史官目劭爲元凶劉駿沈約宋書曰丗祖孝武皇帝諱駿字休龍小字道民文帝第三子遷􅀯中郎將江州刺史元凶殺逆以爲征南將軍加散􅀐常侍上帥衆入討荆州刺史南譙王義宣雍州刺史臧質並舉義兵元嘉三十年四月上至于新亭即皇帝位五月尅京城孝建元年春新祠南郊改元大赦詔凡諸守莅親民之官可申詳舊條勸畫地利力田善蓄者具以名聞更鑄四銖錢立皇子業爲太子賜爲父後者爵一級大明元年正月大赦改元四月京師疾疫遣使案行賜給醫藥死而無収斂者官爲斂埋諸王及妃王庶姓位從公者喪事聽設凶門餘悉斷司空南州刺史竟陵王誕有罪貶爵誕不受命據廣陵反上親御六師車駕出頓宣武堂三年七月尅廣陵城斬誕􅀄立馳道}
