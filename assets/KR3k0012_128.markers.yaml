  - {type: variant, offset: 1095, length: 376, content: 年立第二子慕末為太子領撫軍改年大赦九年盤寢疾顧命太子慕末乃薨于外寢六月葬武平陵謚文昭王廟號太祖乞伏慕末崔鴻十六國春秋西秦錄曰乞伏慕末字安石熾盤之太子幼而好學有文才建弘年立為太子盤薨僭即秦王位大赦改年為永弘元年二月立子萬載為太子三年九月部民多叛未焚城邑毀寶器率戶五千東如上邽為赫連定所拒遂國南安十一月魏遣尚書庫結率騎五千迎末衛軍吉毗固諫以為不宜遂內徙從之庫結引還四年赫連定遣其叔北平公韋代率眾一萬攻南安城內大飢人相食傳侍中乞伏延祚吏部尚書乞伏跋跋踰城奔代末乃御璧出降送于上邽及宗族五百餘人悉為赫連定所誅自國仁建義元年乙酉歲至辛未四十七載晉書曰熾盤在位七年而宋氏受禪以宋元嘉四年死子慕末嗣在位三年為赫連定所殺始國仁以孝武大元十年僭位至慕末四世凡四十有六載而滅北燕馮跋崔鴻十六國春秋北燕錄曰馮跋字文起長樂信都人其先畢萬之後也子孫食菜馮鄉因以氏焉晉永嘉之亂祖父, SBCK: 爲景}
