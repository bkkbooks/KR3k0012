  - {type: variant, offset: 1, length: 1, content: 霸, WYG: 覇}
  - {type: variant, offset: 4, length: 17, content: 一西秦乞伏國仁崔鴻十六國春秋西秦錄, SBCK: 二宋劉􅁉劉義符劉義隆劉劭劉駿劉子業劉彧劉昱劉准宋劉􅁉徐爰宋書}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 二宋劉裕劉義符劉義隆劉劭劉駿劉子業劉彧劉昱劉準劉裕徐爰宋書曰髙祖武皇帝姓劉氏諱裕彭城緩輿里人夜生有神光之異是夕甘露降於墓樹常遊下邳遇}
