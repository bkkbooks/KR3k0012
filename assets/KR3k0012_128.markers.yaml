  - {type: variant, offset: 31, length: 73, content: 其先自漠北南出太陰山五世祖拓鄰晉太始初率戶五萬遷居高平川鄰卒子詰權立遷于牽屯權卒子利郍立郍卒弟祁泥立祁泥卒郍子述延立遷于苑川延卒祁泥子傉大寒立石勒, SBCK: 夜生有神光}
  - {type: variant, offset: 31, length: 0, content: '', WYG: 情騷擾公乃抗表北伐諸軍入關及秦姚泓戰破之泓肉袒降公至長安長安豐稔帑藏盈積數千萬公先收彞器渾儀土圭之屬獻于京師}
  - {type: variant, offset: 31, length: 73, content: 其先自漠北南出太陰山五世祖拓鄰晉太始初率戶五萬遷居高平川鄰卒子詰權立遷于牽屯權卒子利郍立郍卒弟祁泥立祁泥卒郍子述延立遷于苑川延卒祁泥子傉大寒立石勒, krp: 夜生有神光}
  - {type: variant, offset: 32, length: 0, content: '', WYG: 餘珍寳珠玉悉以班諸将執姚泓歸之有司斬于建康市公至洛陽常有紫雲見於軍上晉帝乃命有司禪位于王改元熈二年為永初元年三年正月崩于西殿年六十七沈約宋書曰髙祖諱裕字德輿漢楚元王交之後也小字寄奴初髙祖家貧嘗負刁逵社錢三萬經時無以還逵逵執録甚嚴王謐造逵見之乃密以錢代還由是得釋髙祖名微位薄盛流皆不與相知唯謐交焉桓𤣥将簒謐手解安帝璽綬為𤣥佐命功臣及義旗事建衆並謂謐冝誅唯高祖保持之上清簡寡欲嚴整有法度不事珠玉輿馬之飾後庭無絲竹之音寧州常獻虎魄枕光色甚麗時将北征以虎魄治金瘡上大悦命擣碎分付諸将卒關中得姚興從女有盛寵以之廢事謝晦諌即時遣出錢帛皆付外府内無私藏宋臺建有司奏東西堂施局脚牀銀塗釘上不許使用直脚牀釘用鉄孝武帝大明中環上所居陰室於其處起玉燭殿與羣臣觀之牀頭土鄣壁上掛葛燈籠麻繩紼侍中袁覬盛稱上儉素之德故能光有天下克成大業焉宋書髙祖遊京口竹林寺獨卧講堂前上有五色龍章衆僧見之驚以白帝帝獨喜曰上人無妄言也述異記曰宋高祖微時常逰㑹稽過孔靖宅正晝卧有神人衣服非常謂之曰起天子在門既而失之靖遽出適與帝遇延入結交贈遺臨别執帝手曰卿後必當大貴願以嗣身為託帝許之及定京邑靖自山隂令擢為會稽内史劉義符徐爰宋書曰少帝諱義符髙祖子也髙祖崩五月即皇帝位廬陵王義真明雋秀發朝野屬望而司空徐羡之尚書僕射傳亮領軍謝晦等貪弄朝權忌之乃共誣罔構成其釁収義真徙於新安郡夏五月徐羨之王𢎞傳亮謝晦檀道濟共謀廢帝露仗入殿時上在華林園寢舟中兵士競進殺侍御者二人遂扶上出東閤廢為滎陽王一依漢昌邑晉海西故事遂徙于吳郡六月徐羡之等使邢安太殺滎陽王於金昌亭年十九沈約宋書曰羡之等将謀廢立而廬陵王義真輕動多過不任主四海乃}
