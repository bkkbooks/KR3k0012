  - {type: variant, offset: 6, length: 22, content: 秦乞伏國仁崔鴻十六國春秋西秦錄曰乞伏國仁隴西, WYG: 走初益州刺史毛璩遣弟子修之誘𤣥以入蜀至於枚囘州益州都䕶馮遷斬𤣥首傳于京師天子反正詔進位侍中都督中外諸軍事髙祖固讓加録尚書封豫章公邑萬户絹三萬疋}
