  - {type: variant, offset: 993, length: 0, content: '', SBCK: 崩于西陵年六十沈約宋書曰髙祖諱􅁉字德輿漢楚元王交之後也小字􅀉奴􅀄髙祖家貧嘗􅀒刁逵社錢三萬經時無以還逵執録甚嚴王謐造逵見之乃宻以錢代還由是得釋髙祖名微位薄盛流皆不與相知唯謐交焉桓􅀇將􅆲謐手解安帝璽紱爲􅀇佐命功臣及義旗事建衆並謂謐宜誅唯髙祖保持之上清簡寡欲嚴整有法度不視珠玉輿馬之飾後庭無􅁝竹之音寧州嘗獻虎魄枕光色甚麗時將北征以虎魄治金瘡上大恱命擣碎分付諸將卒􅀜中得姚興從女有盛寵以之廢事謝晦諌即時遣出錢帛皆付外府内無私藏宋臺建有司奏東西堂施局脚牀銀塗釘上不許使用直脚牀釘用鐵孝武帝大明中壞上所居隂室於其處起王燭殿與群臣觀之牀頭土鄣璧上掛􅁑燈籠麻繩紼侍中􅀽覬盛稱上儉素之德故能光有天下克成大業者焉宋書髙祖遊京口竹林寺獨卧講堂前上}
