  - {type: variant, offset: 2755, length: 0, content: '', WYG: 曰澤上於地萃君子以除戎噐戒不虞書曰武王伐殷乃偃武脩文倒載干戈包以虎皮示不用也行禮射設庠序脩文敎也歸馬於華山之陽放牛於桃林之野示天下弗服山南曰陽桃林在華山東北皆非長飬牛馬之地欲使自生死示天下不復乘用也修文教也禮記曰武王克商後㪚軍而郊射左射貍首右射騶虞而貫革之射息矣歸馬於華山之陽放牛於桃林之野干戈弓矢包之以虎皮示天下不復用兵也左傳曰宋向戍欲弭諸侯之兵以為名子罕曰天生五材民並用之廢}
  - {type: page-break, offset: 2755, content: '', id: KR3k0012_WYG_327-12b, image: WYG0895/WYG0895-0808b.png}
  - {type: variant, offset: 2756, length: 0, content: '', WYG: 不可誰能去兵兵之設乆矣所以威不軌而昭文徳也聖}
  - {type: variant, offset: 2757, length: 0, content: '', WYG: 以興亂人以廢興廢存亡昏明}
  - {type: variant, offset: 2758, length: 2, content: 命呂, WYG: 術皆由兵也而子求去之不亦誣乎又曰武王克商作頌曰載戢干戈載櫜弓矢又曰夫文止戈為武家語曰孔子北逰登扵農山曰二三子各言其志吾將擇焉子路進曰由願白羽若月赤羽若日攘地千里搴旗折馘惟由能之子貢進曰賜願旗鼓相望縞衣白冠陳説其間二國釋怨惟賜能之顔回曰回聞薰蕕不同噐而藏回願得明王聖主而相之鑄劍㦸為農噐放牛馬於原藪則由無所施其勇賜無所用其辨矣孔子曰美哉徳也史記曰始皇曰寡人頼宗廟之靈六王咸服其辜天下大定收天下兵噐鑄以為鐘鐻金人十二重各千斤置咸陽之宫中漢書文帝詔曰朕能任衣冠念不到征討故雞鳴狗吠煙火萬里也又食貨志曰武帝末年悔征伐之事乃封丞相為富民侯顔師古曰欲百姓之殷實故取其嘉名也莊子曰孔子謂盗跖曰將軍有意聽臣臣請南使吳越北使齊魯東使宋衛西使晋楚使為將軍造大城數百里立數十萬户之邑使尊將軍為諸侯與天下更始罷兵休卒収養昆弟共祭先祖此聖人才士之行而天下之願又曰見侮不辱救民之鬭禁攻寢兵救世之戰古司馬法曰古者武軍三年不與民覩示勞也上下相報和之至也還師罷兵休戎卒三年不輕殺以荅人勞得意則凱樂歌示喜也聖主誅不義百姓皆得其所喜樂各安其居樂其常偃伯靈臺答民之勞告不興也偃休息也伯主兵也靈臺頌徳美之喜以祭天示不復用兵也吕}
