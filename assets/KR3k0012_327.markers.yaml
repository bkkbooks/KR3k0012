  - {type: variant, offset: 2952, length: 77, content: 百姓悅服所向皆下晉書曰官人孟玖弟超並為成都王頴所嬖寵超領萬人為小都督未戰縱兵大掠陸機錄其主者超將鐵騎百餘人直入機麾下奪之顧謂機曰貉奴能作督不機司馬孫極勸機, SBCK: 父}
