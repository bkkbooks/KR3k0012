  - {type: variant, offset: 942, length: 53, content: 遣使請舊圖以定疆界又連結於齊言辭悖慢太祖曰古人有言天之所棄誰能興之其蕭繹之謂乎冬十月壬戍遣柱國于謹中山公護, krp: 患匈奴屢爲邊患鴈門馬邑豪聶壹因}
  - {type: variant, offset: 948, length: 921, content: 定疆界又連結於齊言辭悖慢太祖曰古人有言天之所棄誰能興之其蕭繹之謂乎冬十月壬戍遣柱國于謹中山公護大將軍楊忠韋孝寬等步騎五萬討之十一月癸未師濟於漢中公護與楊忠率銳騎先屯其城下據江津以備其逸甲申謹至江陵列營圍守辛亥進攻城其日克之擒梁元帝殺之并虜其百官及士民以歸沒為奴婢者十餘萬其免者二百餘冢立蕭詧為梁主居江陵為魏附庸又曰侯莫陳崇隨賀拔岳征討以功除建威將軍從岳入關破萬俟醜奴崇與輕騎逐北至涇長坑及之賊未成列崇單騎入賊中於馬上生擒醜奴於是大呼眾悉披靡莫敢當之後騎集遂破之岳以醜奴所乘馬及寶劍金帶賞之又曰李廣會稽人早事詧以敢勇聞沇口之役先詧力戰及華皎軍敗為吳明徹所擒將降之廣辭色不屈遂被害又曰柳檜除魏興華陽二郡守安康人黃眾寶謀反連結黨與將圍州城乃相謂曰常聞柳君勇悍其鋒不可當今既在外方為吾徒腹心之病也不如先擊之遂圍檜郡郡城卑下士眾寡弱人無守御之備連戰積十餘日士卒僅有存者於是力屈城陷身被十數瘡遂為賊所獲既而眾寶等進圍東梁州乃縛檜置城下欲令誘說城中檜乃大呼曰群賊烏合糧食已罄行即退散各宜勉之眾寶大怒乃臨檜以兵曰速更汝辭不爾便就戮矣檜守節不變遂害之棄屍水中人皆為之流涕隋書曰漢王諒之作亂也煬帝將發幽州兵以討之時竇杭為幽州惣管帝恐其有貳心問可任者於楊素素進李子雄授上大將軍拜廣州刺史馳至幽州止傳舍召募得千餘人杭恃素貴不時相見子雄遣人諭之後二日抗從鐵騎二千來詣子雄所子雄伏甲請與相見因擒抗遂發幽州兵步騎三万自陘以討諒時諒遣大將軍劉建略地燕趙正攻井陘相遇於抱犢山下力戰破之遷幽州總管又曰獨孤揩字脩則不知何許人也本姓李氏父屯從齊神武帝與周師戰于沙苑齊師敗績因為柱國獨孤信所擒配為士伍給使信家漸得親近因賜姓獨孤氏楷少謹厚便弄馬槊為宇文護執刀累轉車騎將軍其後數從征伐賜爵廣阿縣公邑千戶唐書曰長平王叔良遣驃騎劉感擊薛仁果却為所敗感歿於賊感不知何許人初以本官鎮涇州為仁果所圍感拒戰久之城中糧盡無可食感殺馬以分士卒感一無所噉唯煮馬骨取汁和木屑而自食之城垂陷者數矣會長平王叔良援兵至仁果解去感與叔良復出戰因為賊所擒又曰王行敏鎮潞州劉黑闥來攻行敏自歷亭出兵拒戰擊賊破之既而憩於野不設備賊知而掩之左右皆遁因為黑闥所擒竟不拜黑闥怒斬之臨死西向而言曰行敏大唐忠臣也願陛下知之高祖聞而痛惜, WYG: 享}
