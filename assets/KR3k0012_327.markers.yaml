  - {type: variant, offset: 2627, length: 13, content: 所到不虜掠觀其言語舉止非庸, SBCK: 有意聽臣臣請南使呉越北使齊魯東使宋衛西使晉楚使爲將軍造大城數百里立數十萬户之邑使尊將軍爲諸侯與天下更始罷兵休卒収飬昆弟共􅀕先祖此聖}
  - {type: variant, offset: 2627, length: 2, content: 所到, WYG: 視之盡難攻中山之事也將軍還北面而再拜曰中山之舉也非臣之力君之功也韓子曰晉文公將與楚戰召舅犯問曰吾將與楚戰彼衆我寡為之奈何對曰臣聞之君子}
