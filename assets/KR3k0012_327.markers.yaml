  - {type: variant, offset: 3034, length: 67, content: 用超宣言於眾曰陸機將反又曰惠帝末妖賊劉柏根起於東萊王彌率家僮從之柏根死亡入長廣山為群盜彌多權略凡有所掠必預圖成敗舉無遺策弓馬迅捷膂力過, WYG: 宴武}
