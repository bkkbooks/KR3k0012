  - {type: variant, offset: 2613, length: 0, content: '', krp: 侯之兵以爲名子罕曰天生五材民並用之廢一不可誰能去兵兵之設乆矣所以威不軌而昭文德也聖人以興乱人以廢興廢存亡昏明之術皆兵由也而子求去之不亦誣乎又曰武王克啇作頌曰載戢干戈載橐弓矢又曰夫文止戈爲武家語曰孔子北遊登於農山曰二三子各言其志吾}
  - {type: variant, offset: 2614, length: 11, content: 皆壯士屈起多暴橫獨有劉, SBCK: 擇焉子路進曰由願白羽􅀂月赤羽􅀂曰攘地千里搴旗折馘唯由能之子貢進曰賜願旗鼓相望縞衣白冠陳􅀃其間二國釋怨唯賜能之顔回曰回聞薫蕕不同器而治回願得明王聖主王相之鑄劒㦸爲農器放牛馬於原藪則由無所施其勇賜無所用其辯矣孔子曰羙哉德也史記曰始皇曰寡人頼宗廟之靈六王咸服其辜天下大定収天下兵器銷以爲鍾鐻金人十二重各千斤置咸陽廷宫中漢書文帝詔曰朕能任衣冠念不到征討故鷄鳴狗吠煙火万里也又食貨志曰武帝末年悔征伐之事乃封丞相爲冨民侯顔師古曰欲百姓之殷實故取其嘉名也莊子曰孔子謂盗跖曰}
