  - {type: variant, offset: 1247, length: 1354, content: 守安康人黃眾寶謀反連結黨與將圍州城乃相謂曰常聞柳君勇悍其鋒不可當今既在外方為吾徒腹心之病也不如先擊之遂圍檜郡郡城卑下士眾寡弱人無守御之備連戰積十餘日士卒僅有存者於是力屈城陷身被十數瘡遂為賊所獲既而眾寶等進圍東梁州乃縛檜置城下欲令誘說城中檜乃大呼曰群賊烏合糧食已罄行即退散各宜勉之眾寶大怒乃臨檜以兵曰速更汝辭不爾便就戮矣檜守節不變遂害之棄屍水中人皆為之流涕隋書曰漢王諒之作亂也煬帝將發幽州兵以討之時竇杭為幽州惣管帝恐其有貳心問可任者於楊素素進李子雄授上大將軍拜廣州刺史馳至幽州止傳舍召募得千餘人杭恃素貴不時相見子雄遣人諭之後二日抗從鐵騎二千來詣子雄所子雄伏甲請與相見因擒抗遂發幽州兵步騎三万自陘以討諒時諒遣大將軍劉建略地燕趙正攻井陘相遇於抱犢山下力戰破之遷幽州總管又曰獨孤揩字脩則不知何許人也本姓李氏父屯從齊神武帝與周師戰于沙苑齊師敗績因為柱國獨孤信所擒配為士伍給使信家漸得親近因賜姓獨孤氏楷少謹厚便弄馬槊為宇文護執刀累轉車騎將軍其後數從征伐賜爵廣阿縣公邑千戶唐書曰長平王叔良遣驃騎劉感擊薛仁果却為所敗感歿於賊感不知何許人初以本官鎮涇州為仁果所圍感拒戰久之城中糧盡無可食感殺馬以分士卒感一無所噉唯煮馬骨取汁和木屑而自食之城垂陷者數矣會長平王叔良援兵至仁果解去感與叔良復出戰因為賊所擒又曰王行敏鎮潞州劉黑闥來攻行敏自歷亭出兵拒戰擊賊破之既而憩於野不設備賊知而掩之左右皆遁因為黑闥所擒竟不拜黑闥怒斬之臨死西向而言曰行敏大唐忠臣也願陛下知之高祖聞而痛惜焉又曰劉世讓檢校并州總管時突厥可汗遣俱儉特勤以所部千人居我并州甚為民患前總管李仲文不能制世讓到官以計擒之馳使以聞高祖大悅嘉歎久之又曰姜寶誼武德初拜武衛大將軍尋為井鉞將軍劉武周將黃子英住來崔鼠谷高祖令寶誼擊之子英數以輕兵挑戰寶誼兵纔接子英輕遁如此者再三寶誼悉眾以逐之伏兵發軍遂大敗寶誼為賊所擒後得逃歸至是與斐寂拒宋金對戰始合寂棄軍而走兵遂大潰寶誼復為賊所擒高祖初聞其沒也泣曰寶誼烈士必不生降賜其家物千叚米三百石寶誼後謀背賊事洩遇害臨死西向大言曰臣無狀負陛下被屠潰是所甘心但敗軍喪師九泉所恨及賊退高祖遣使迎其柩謚曰剛又曰恒州節度李寶臣使人謂朱滔曰吾聞朱公皃如神安得而識之願因繢事以觀可乎滔乃圖其形以示之錦衣金鉤甚偉寶臣懸於射堂命諸將熟視之曰朱公信神人也他日滔出獵寶臣密選精卒劫之戒其將曰取彼貌如射堂所懸者是時二軍方共事不相虞而卒變暴至滔駭然與戰於瓦橋適衣他服以不識免又曰蔡州賊將吳秀琳以文城柵兵三千降李愬愬從秀琳於新興柵遂以琳之眾攻吳房夏四月庚寅朔辛卯李愬奏師至嵖岈山擒賊將柳世于李湊等二人李光顏敗元濟之眾三萬於郾城其將張伯良奔于蔡州殺其卒十二三獲馬千餘疋器甲三萬其甲上悉畫作雷公符北斗星文又云速破城北軍急急如律令周史曰皇甫暉正陽敗八保滁州太祖皇帝麾兵涉水踰城而入盡戮其黨生擒暉及其偽命都監姚鳳等送于行在世宗召見之暉曰臣力備矣欲暫坐及坐又曰臣欲暫臥不俟命而臥神色自若世宗亦復容之乃言曰臣非不盡忠於本國實以甲兵勇怯不敵臣早事晉朝累將兵與契丹相持未如大朝此日甲馬之盛昨者退守滁州不謂天兵便能踰城攻取如履平地臣力所不加故就擒耳因盛稱太祖之武勇世宗命釋之賜衣服帶鞍馬後數日暉以金瘡尋卒于洛陽暉本驍將唐莊宗之基業因暉而敗焉故暉有名於天下虜掠左傳曰鄭祭足帥師取溫之麥秋又取成周之禾, SBCK: ''}
