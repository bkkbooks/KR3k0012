  - {type: variant, offset: 2983, length: 4, content: 小都督未, WYG: 英也前蒙矢石而後墮溝壑出百死而紹一生以争天下之權墮入也紹至也奮武勵威以決一旦之命當此之時豐衣博帶而道儒墨者以為不肖言尚武也逮至亂以勝勝暴亂也海内大定繼文之業立武之功繼文王受命之業武王誅無道之功總鄒魯之儒墨通先聖之遺教載天子之旗乗大輅建九斿撞大鐘擊鳴鼓奏咸池持干戚周禮天子五輅大輅上輅也王有功成而為天下法擊鼓咸池黄帝樂也干楯也戚斧也王之使所共執當此之時有立武者見疑一世之間而文武之政後世有時而用也今世之為武也則非文為文也則非武文武相非而不知時世之用也說苑曰魏文侯與田子方語有兩童子衣青白衣而侍於君前子方曰此君之寵子乎文侯曰非也其父死之扵}
