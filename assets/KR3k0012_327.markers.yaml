  - {type: 'tls:seg', offset: 3035, content: '', id: KR3k0012_CHANT_327-22a.13}
  - {type: variant, offset: 3035, length: 1117, content: 超宣言於眾曰陸機將反又曰惠帝末妖賊劉柏根起於東萊王彌率家僮從之柏根死亡入長廣山為群盜彌多權略凡有所掠必預圖成敗舉無遺策弓馬迅捷膂力過人青土號為飛豹十六國春秋曰南涼禿髮傉檀伐北涼沮渠蒙遜於姑臧至番禾苕藋苕徒聊切藋徒吊切掠五千餘戶其將窟古進曰陛下轉戰千里前無完陣徙戶資財盈溢衢路宜倍道遊師早度峻嶮蒙遊善於用兵士眾習戰若輕軍卒至出吾不慮大敵外逼徙戶內攻危道也衛尉伊力延曰我軍勢方盛將士勇氣自倍彼徒我騎勢不相及若倍道遊師必捐棄資財示人以弱非計也俄而昏霧風雨蒙遊軍大至傉檀大敗而還三國典略曰齊主以契丹犯塞親征至于平州取其西道直指長漸司徒潘相樂率精騎五千自東道趣青山向白狼城安德王韓軌率精騎四千斷其走路追奔至于遼水齊主露髮袒身晝夜不息行千餘里唯食肉飲水壯氣彌厲親踰山嶺為士卒先指揮奮擊大破之虜獲十萬餘口後魏書曰濟陰王新城頗有武略庫莫奚侵擾詔新城率眾討之新城乃多為毒酒賊漸逼便棄營而去賊至喜而競飲聊無所備遂簡輕騎因醉縱擊俘馘甚多又曰天水梁會守東城謀欲逃遁先是封勑文掘重塹於東城之外斷賊走路夜中會乃陣飛梯騰塹而走勑文先嚴兵於塹外拒鬥從夜至旦勑文謀於眾曰困獸猶鬥而況於人賊眾知無生路人自致死必傷士眾未易可平若開其生路賊必上下離心剋之易矣眾咸以為然勑文以白虎幡宣告賊眾曰若能歸降原其生命應時降者六百餘人會知人心沮壞於是分遁勑文縱騎騰躡死者太半俘獲四千五百餘口後周書曰賀拔岳副爾朱天光討万侯醜奴時醜奴自率大眾圍歧州遣行臺尉遟菩薩等向武功南渡渭水天光望岳率騎赴之岳身先率擊之退走岳號令部賊下馬者皆不聽殺賊顧見之便悉投馬俄而虜獲三千餘人人馬無遺遂擒菩薩降卒万餘並收其輜重醜奴棄歧州走安定平亭隋書曰南寧夷翫來降拜昆州刺史既而復叛遂以史萬歲為行軍總管率眾擊之入自蜻音精蛉音靈川經弄揀次小勃弄大勃弄至于南中賊前猿屯據要害万歲皆擊破之行數百里見諸葛亮紀功碑銘其皆曰万歲之後勝我者過此万歲令左右倒其碑而進渡西二河入渠濫川行千餘里破其三十餘部虜獲男女二万餘口諸夷大懼遣使請降獻明珠徑寸於是勒美隨德萬歲遣使馳奏請將翫入朝詔許之又曰達奚長儒與鳥丸軌圍陳將吳明徹於呂梁陳遣驍將劉景率勁勇七千來為聲援軌令長儒逆拒之長儒於是取車輪數百擊以大石沉之清水連轂相次以待景軍至舡艦礙輪不得進長儒乃縱奇兵水陸俱發大取之俘數千人又曰周法尚初仕陳背陳歸周陳將樊猛濟江討之法尚遣部曲督韓朗詐為背己奔于陳偽告猛曰法尚部兵不願降人皆竊議盡欲叛還若得來軍必無鬥者自當於陣倒戈耳猛以為然引師急進法尚乃佯為畏懼自保於江曲猛陳兵挑戰法尚先伏輕舸於浦中又伏精銳於古村之北自張旗幟迎流拒之戰數合偽退登岸投古村猛捨舟逐之法尚又疾走行數里與村北軍合復前擊猛猛退走舡既而浦中伏舸取其舟楫建周旗幟猛於是大敗僅以身免虜八千人, SBCK: ''}
