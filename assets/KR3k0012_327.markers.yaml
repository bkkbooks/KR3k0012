  - {type: variant, offset: 2612, length: 0, content: '', SBCK: 有人於此舎其文軒隣有弊輿而欲􅀼之舎其錦繡隣有短􅄄而欲􅀼之舎其梁􅁏隣有糠糟而欲􅀼之此爲何􅀂人王曰此爲􅀼疾耳墨子曰荆之地方五千里宋之地方五百里此猶文軒之與弊輿也荆有雲夢犀兕麋鹿盈之以江漢之魚鱉黿鼉爲天下饒宋無雉兎鮒魚者也猶梁肉之與糠糟也荆有長松文梓楩柟豫章宋無長木此猶錦繡之與短􅄄也臣以王之攻宋也爲與此同􅀋王曰善請無攻宋吕氏春秋曰􅁗興兵欲攻魏司馬唐諌􅁗君曰叚干木賢者也而魏禮之天下莫不聞無乃不可加兵乎􅁗君乃按兵而輟不攻魏文侯可謂善用兵矣聞君子之用兵也莫見其形其功巳成此之謂也偃武易曰澤上於地萃君子以除戎器戒不虞書曰武王伐殷乃偃武脩文倒載干戈包以虎皮示不用也行禮射設庠序脩文教也歸馬于華山之陽放牛于桃林之野示天下弗服山南曰陽桃林在華山東北皆非長養牛馬之地欲使自生死示天下不服乗用也脩文教也禮記曰武王克啇後散軍而郊左射狸首右射騶虞而貫革之射息矣歸馬于華山之陽放牛于桃林之野干戈弓矢包之以虎皮示天下不復用兵也左傳曰宋向戌欲弭}
  - {type: page-break, offset: 2612, content: '', id: KR3k0012_SBCK_327-7b}
  - {type: variant, offset: 2612, length: 1, content: 諸, WYG: 民吏未安賢者未定何以安之太公曰惟如天如地說苑曰魏文侯攻中山樂羊}
  - {type: variant, offset: 2612, length: 0, content: '', krp: 有人於此舎其文軒隣有弊輿而欲竊之舎其錦繡隣有短褐而欲竊之舎其梁肉隣有糠糟而欲竊之此爲何若人王曰此爲竊疾耳墨子曰荆之地方五千里宋之地方五百里此猶文軒之與弊輿也荆有雲夢犀兕麋鹿盈之以江漢之魚鱉黿鼉爲天下饒宋無雉兎鮒魚者也猶梁肉之與糠糟也荆有長松文梓楩柟豫章宋無長木此猶錦繡之與短褐也臣以王之攻宋也爲與此同類王曰善請無攻宋吕氏春秋曰秦興兵欲攻魏司馬唐諌秦君曰叚干木賢者也而魏禮之天下莫不聞無乃不可加兵乎秦君乃按兵而輟不攻魏文侯可謂善用兵矣聞君子之用兵也莫見其形其功巳成此之謂也偃武易曰澤上於地萃君子以除戎器戒不虞書曰武王伐殷乃偃武脩文倒載干戈包以虎皮示不用也行禮射設庠序脩文教也歸馬于華山之陽放牛于桃林之野示天下弗服山南曰陽桃林在華山東北皆非長養牛馬之地欲使自生死示天下不服乗用也脩文教也禮記曰武王克啇後散軍而郊左射狸首右射騶虞而貫革之射息矣歸馬于華山之陽放牛于桃林之野干戈弓矢包之以虎皮示天下不復用兵也左傳曰宋向戌欲弭}
  - {type: variant, offset: 2613, length: 0, content: '', SBCK: 侯之兵以爲名子罕曰天生五材民並用之廢一不可誰能去兵兵之設乆矣所以威不􅁤而昭文德也聖人以興乱人以廢興廢存亡昏明之術皆兵由也而子求去之不亦誣乎又曰武王克啇作頌曰載戢干戈載橐弓矢又曰夫文止戈爲武家語曰孔子北遊登於農山曰二三子各言其志吾}
