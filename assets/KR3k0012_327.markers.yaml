  - {type: variant, offset: 13, length: 0, content: '', SBCK: 石季龍攻䧟徐龕送之襄國勒嚢盛於百尺樓自上㩧殺之令歩都等妻子刳而食之坈龕降卒三千又曰杜預平呉王濬先列上得孫歆頭預後生送歆洛中以爲大􅀏梁書曰沈林子獻捷書每以實聞武帝問其故林子曰夫王者之師夲有征無戰豈可復増張虜獲以示誇誕昔魏尚以盈級致罰此後乗之良轍也武帝曰乃所望於卿也後魏書曰裴叔業率王茂先李定等來侵楚王戍傳永適還州王肅復令􅀓永討之永將心腹一人馳詣楚王至即令戍塡塞外壍夜伏戰士一千人於城外曉而叔業等至頓於城東列陣置長圍永所伏兵於左道擊其後軍破之叔業乃令將佐守所列之陣自率精甲數千救之永上門樓觀叔業南行五六里許便開門􅁬擊遂摧破之叔業進退失圖於是奔走左右欲追之永曰弱卒不滿三千彼精甲猶盛非力屈而敗直墮吾計中耳旣不測我之虚實足喪其瞻俘此足矣何暇逐之􅀗叔業傘扇皷幕甲仗万餘兩月之中遂獻再捷髙祖嘉之後周書曰武帝平齊夏四月至自東伐列齊主於前其王公等並從車轝旗幟及器物以次陳於其後大駕布六軍備凱樂獻俘於太廟京邑觀者皆稱万歳戊申封齊主爲温國公唐書曰武德中西突厥葉護可汗遣使請㛰又入宼邊上髙祖謂群臣曰突厥入宼而復請和和之與戰其䇿安在太常卿鄭元璹對曰􅀂擊之則怨􅀷難以和緝中書令封德彛進曰􅀂不戰而和親夷狄必謂中國畏懼未􅀂擊之尅捷而和親此則威恩兼舉髙祖然之戊辰西突厥遣使獻名馬巳巳并州大惣管襄邑王神符擊突厥於汾東斬首五百級虜其馬二千疋汾州刺史蕭顗斬突厥五千餘級又曰太宗平東都凱旋親􅀍黄金甲陳鐵馬一万􅀐甲士三萬人前後部鼓吹俘二僞主及隨神器輦輅獻捷于太廟髙祖大恱行飲至禮以享焉又曰張瑾初仕隋歷職顯貴煬帝􅀍圍於鴈門也瑾以驍果出城擊戰一日九捷煬帝登城望之大恱賜物二千叚又曰元和中忠武軍節度使李光顔奏破呉元濟之衆上大恱賜其告捷使奴婢銀錦又曰元和十二年十月隋唐節度使李愬帥師入蔡州執賊師呉元濟以聞淮西平辛巳上御宣政殿受朝賀九品巳上及宗子四夷之使皆㑹又曰元和十四年魏􅀶節度使田弘正遣使獻逆臣李師道命左右軍兵衛之先獻于太廟郊社上御興安門百寮於門下列位稱賀又曰元和中昭義節度郗士羙以賊首三百來獻詔梟於通化門外班師爾雅曰出曰治兵尚武也入曰振旅反尊卑也郭璞日㓜賤在前貴勇也尊老在後尚儀也詩曰出車勞還率也赫赫南仲薄伐西戎昔我徃矣􅁰稷方華春日遟遟卉木萋萋執訊獲醜薄言還歸又曰杖杜勞還役也有杖之社其葉萋萋周禮曰􅀂師有功左執律右秉􅃏以先凱樂獻于社左傳曰三年而治兵入而振旅歸而飲至以數軍實飲至於廟以數車徒所獲也又曰楚子敗晉師于邲潘黨曰君盍築武軍而収晉尸以爲京觀楚子曰夫文止戈爲武武有七德禁􅁀戢兵保大定功安人和衆豐財者也我無一焉何以示子孫祀于河作先君宫告成事而還後漢書曰曹操討}
