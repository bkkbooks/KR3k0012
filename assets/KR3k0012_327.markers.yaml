  - {type: variant, offset: 2876, length: 0, content: '', SBCK: 巳戰之後三革不累五刃不砥牛馬放之歷山終身弗乗也淮南子曰􅁗之時髙爲臺榭大爲苑囿逺爲馳道鑄金人秦始皇二十六年􅀄兼天下有長人見於臨洮其髙五丈足迹六尺放冩其刑鑄金人以象之翁仲君何是也發謫戍入蒭槀戍守長城也入蒭藁之􅀃以供囯用之也頭㑹箕賦於少府頭㑹隨民口數人責其稅箕賦似箕檢民則多取意也少府官名如今司農丁壯大夫西至臨洮狄道臨洮隴西之縣能水北狄道漢陽之縣是也東至㑹稽浮石㑹稽山名浮石隨水髙下言不没皆在遼西界一􅀃㑹稽山在㤗山下封于㤗山禪於㑹稽是也南至豫章桂林䂊章郡挂林欎林也北至飛狄陽原飛狄在代郡南飛狄山也陽原在太原道路死人以溝量言滿備也當此之時忠諌者謂之不祥而道仁義者謂之狂逮至髙皇帝存亡継絶漢髙祖也舉天下之大義身自􅁬􅃑執銳以爲百姓請命于皇天執利兵}
