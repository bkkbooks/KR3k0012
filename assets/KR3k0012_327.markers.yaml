  - {type: variant, offset: 3574, length: 247, content: 餘人會知人心沮壞於是分遁勑文縱騎騰躡死者太半俘獲四千五百餘口後周書曰賀拔岳副爾朱天光討万侯醜奴時醜奴自率大眾圍歧州遣行臺尉遟菩薩等向武功南渡渭水天光望岳率騎赴之岳身先率擊之退走岳號令部賊下馬者皆不聽殺賊顧見之便悉投馬俄而虜獲三千餘人人馬無遺遂擒菩薩降卒万餘並收其輜重醜奴棄歧州走安定平亭隋書曰南寧夷翫來降拜昆州刺史既而復叛遂以史萬歲為行軍總管率眾擊之入自蜻音精蛉音靈川經弄揀次小勃弄大勃弄至于南中賊前猿屯據要害万歲皆擊破之行數百里見諸葛亮紀功碑銘其皆曰万歲之後勝我者過此万歲令左右倒其碑而進渡西, WYG: ''}
