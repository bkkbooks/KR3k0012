  - {type: variant, offset: 2605, length: 2, content: 馮異, SBCK: 光武建武中北匈奴衰弱臧宫馬武上書請臨塞厚懸購賞喻告髙勾驪烏桓鮮卑攻其左發河西四郡及天水隴西羗胡擊其右如此北虜之㓕不過數年矣帝曰舎近謀逺者勞而無功舎逺謀近者逸而有終故曰務廣地者荒務廣德者強有其有者安貪人有者殘殘滅之政雖成必敗今國無善政災變不息百姓驚惶人不自保而復逺事邊外乎孔子曰吾恐季孫之憂不在顓􅁷自是諸將莫敢復言兵事魏志曰諸葛誕據壽春及魏將王基討之司馬文王欲遣諸將輕兵􅀷入招迎呉將唐咨等子弟因釁有蕩覆呉之勢基諌曰昔呉將諸葛恪乗東􅀜之勝竭江表兵以圍新城城旣不㧞而衆死者太半蜀將姜維因洮上之利輕軍􅀷入粮餉不継軍覆上邽音圭夫旣勝之後必輕敵則慮難不􅀷今賊新敗於外又内患未弭是其脩政設慮之時也且兵出踰年人有㱕志俘馘十万罪人斯得自歷代征伐未有全兵獨克如今之盛者也武皇帝破􅀽紹於官度自以所獲巳多不復追奔懼挫威也從之尸子曰公輸般爲蒙天之階階成將以攻宋墨子聞之赴於宋至於郢見般曰聞子爲階將以攻宋宋何罪之有無罪而攻之不可}
  - {type: page-break, offset: 2605, content: '', id: KR3k0012_SBCK_327-6b}
  - {type: variant, offset: 2605, length: 2, content: 馮異, WYG: 曹操於軍中出教曰雞肋外曹莫曉楊德祖曰夫雞肋食之則無所得棄則惜之公歸計決矣操乃還軍又曰馬援自南方振旅還京師軍吏經瘴疫死者十四五賜援兵車一乗晉書曰王濬平吳上表云間在秣陵諸軍凡二十萬衆臣軍先至為土地之主百姓之心皆歸仰臣臣切勅所領秋毫不犯諸有市易皆明破劵契有違犯者凡斬十三人皆是人所知也餘軍縱横詐稱臣軍而軍類皆蜀人幸以此自别耳又曰賈充為伐吳大都督孫皓降於王濬充未之知方以吳未可平抗表請班師充表與告㨗表同至朝野以充位居人上智出人下宋書曰十二月丙申大軍次左里將戰帝麾之麾竿折幡沉於水衆咸懼帝笑曰昔覆舟之役亦如此今勝必矣遂攻其栅盧循單舸走衆軍皆弛晉帝遣侍中黄門勞師于行所三國典畧曰齊公憲夜收軍欲待明更戰達奚武}
