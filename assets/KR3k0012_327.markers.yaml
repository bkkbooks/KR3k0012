  - {type: variant, offset: 2608, length: 2, content: 苗萌, SBCK: 仁胡不巳也公輸般曰不可吾旣以言之王矣墨子曰胡不見我於王公輸般曰諾墨子見楚王}
  - {type: variant, offset: 2608, length: 2, content: 苗萌, WYG: 之曰洛陽軍散人情駭動若不因夜速還明日欲歸不得武在軍旅乆矣備見行狀豈可將數營大衆一朝而棄之憲從其諫全軍皆反後魏書曰蕭衍冦徐兖州邢巒大破之旋師世宗臨東堂勞之曰卿役不踰時剋清妖醜鴻勲碩美可謂不愧古人巒曰此是陛下威畧聖靈加以將士之力臣何功之有白虎通曰古者師出不踰時者為怨思也天道一時生物飬人者天之貴物也踰時即内有怨女外有曠夫詩曰昔我往矣楊栁依依今我來思雨雪霏霏春秋曰宋人取長葛傳曰外取邑皆不書此何以書乆也六韜曰武王平殷還問太公}
