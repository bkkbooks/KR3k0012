  - {type: variant, offset: 3102, length: 316, content: 青土號為飛豹十六國春秋曰南涼禿髮傉檀伐北涼沮渠蒙遜於姑臧至番禾苕藋苕徒聊切藋徒吊切掠五千餘戶其將窟古進曰陛下轉戰千里前無完陣徙戶資財盈溢衢路宜倍道遊師早度峻嶮蒙遊善於用兵士眾習戰若輕軍卒至出吾不慮大敵外逼徙戶內攻危道也衛尉伊力延曰我軍勢方盛將士勇氣自倍彼徒我騎勢不相及若倍道遊師必捐棄資財示人以弱非計也俄而昏霧風雨蒙遊軍大至傉檀大敗而還三國典略曰齊主以契丹犯塞親征至于平州取其西道直指長漸司徒潘相樂率精騎五千自東道趣青山向白狼城安德王韓軌率精騎四千斷其走路追奔至于遼水齊主露髮袒身晝夜不息行千餘里唯食肉飲水壯氣彌厲親踰山嶺為士卒先指揮奮擊大破之虜獲十萬餘口後魏書曰濟陰王新城頗有武略庫莫奚侵擾詔新城率眾討之新城乃多為毒酒賊漸逼便棄營, WYG: 歸獸}
