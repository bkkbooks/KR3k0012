  - {type: variant, offset: 5, length: 3, content: 擒獲下, SBCK: 月丙申振旅凱以入于晉凱樂也獻俘授馘飲至大賞授數也献楚俘於廟徴㑹討貳徴㑹諸侯將冬㑹於温殺舟之僑以徇于國民於是大服又曰晉侯使趙同獻狄俘于周不敬劉康公曰不及十年原叔必有大咎劉康公元孝子元趙同也天奪之魄也又曰士㑹帥師㓕赤狄甲氏及留吁鐸辰鐸辰留吁之属也三月獻狄俘干廟}
  - {type: variant, offset: 5, length: 3, content: 擒獲下, WYG: 月丙申振旅凱以入于晉凱樂也獻俘授馘飲至大賞授數也獻楚俘于廟徴㑹討貳徴㑹諸侯將冬㑹于温殺舟之僑以徇於國民於是大服又曰晉侯使趙同獻俘于周不敬劉康公曰不及十年原叔必有大咎劉康公元孝原叔趙同也天奪之魄也又曰春士㑹帥師滅赤狄甲氏及留吁鐸辰鐸辰留吁之屬也三月獻狄俘于廟}
  - {type: variant, offset: 5, length: 3, content: 擒獲下, krp: 月丙申振旅凱以入于晉凱樂也獻俘授馘飲至大賞授數也献楚俘於廟徴㑹討貳徴㑹諸侯將冬㑹於温殺舟之僑以徇于國民於是大服又曰晉侯使趙同獻狄俘于周不敬劉康公曰不及十年原叔必有大咎劉康公元孝子元趙同也天奪之魄也又曰士㑹帥師㓕赤狄甲氏及留吁鐸辰鐸辰留吁之属也三月獻狄俘干廟}
