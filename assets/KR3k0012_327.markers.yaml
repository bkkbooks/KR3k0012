  - {type: variant, offset: 2754, length: 0, content: '', WYG: 為度者不以己私怒傷天下之政故乃遣劉敬奉金千斤以結和親至今為五代利孝文皇帝又嘗一擁天下之精兵聚之廣武常谿終無尺寸之功而天下黔首無不憂孝文悟於兵之不可宿故復合和親之約此二聖之跡足以為效矣竊以為勿擊便漢書曰元帝時朱厓儋耳二郡夷數反賈捐之上書請不擊其畧曰臣聞堯舜禹三聖之徳地方不過千里西被流沙東漸于海朔南暨聲教欲與聲教則理之不欲與者不強理也是以頌聲並作視聽之類咸樂其生秦氏興兵逺攻貪外虛内務欲廣地而天下潰叛頼聖漢為百姓請命早定天下至孝武皇帝以國富兵強攘却匈奴西連諸國至於安息東過碣石造鹽鐵酒𣙜之利以佐用度猶不能足當此之時冦賊並起征伐不休之故也今陛下不忍悁悁之忿欲􅇌士衆擠之大海之中快心幽㝠之地非所以保全元元也詩云蠢爾蠻荆大邦為讎自古患之乆矣何況萬里之蠻乎臣竊以往者羗軍言之暴師曽未一年兵出不踰千里費四十餘萬大司農錢盡乃以少府禁錢續之夫一隅為不善費尚如此况於勞師逺攻亡上無功乎臣愚以為非冠帶之國禹貢所不及皆可無以為也於是遂罷其郡後漢書曰光武建武中北匃奴衰弱臧宫馬武上書請臨塞厚懸購賞喻告髙勾驪烏桓鮮卑攻其左發河西四郡及天水隴西羗胡擊其右如此北虜之滅不過數年矣帝曰舎近圗逺者勞而無功舍逺謀近者逸而有終故曰務廣地者荒務廣徳者強有其有者安貪人有者殘殘滅之政雖成必敗今國無善政灾變不息百姓驚惶人不自保而欲逺事邊外乎孔子曰吾恐季孫之憂不在顓臾自是諸將莫敢復言兵事魏志曰諸葛誕據夀春反魏將王基討之司馬文王欲遣諸輕兵深入招迎吳將唐咨等于以因釁有蕩覆吳之勢基諌曰昔吳將諸葛恪乗東關之勝竭江表兵以圍新城城既不㧞而衆死者大半蜀將姜維因洮上之利輕軍深入粮餉不繼軍覆上邽夫既勝之後必輕敵則慮難不深今賊新敗於外又患未弭是其修政設慮之時也且兵出踰年人有歸志俘馘十萬罪人斯得自歴代征伐未有全兵獨克如今之盛者也武皇帝破袁紹於官渡自以所獲已多不復追奔懼挫威也從之尸子曰公輸般為蒙天之階階成將以攻宋墨子聞之赴於宋至於郢見般曰聞子為階將以攻宋宋何罪之有無罪而攻之不可謂仁胡不已也公輸般曰不可吾既以言之王矣墨子曰胡不見我於王公輸般曰諾墨子見楚王曰今有人於此舎其文軒隣有弊輿而欲竊之舎其錦繡隣有短褐而欲竊之舎其粱肉隣有糠糟而欲竊之此為何若人王曰此為竊疾耳墨子曰荆之地方五千里宋之地方五百里此猶文軒之與弊輿也荆有雲夢犀兕麋鹿盈之以江漢之魚鼈黿鼉為天下饒宋無雉兎鮒魚者也猶粱肉之與糠糟也荆有長松文梓楩柟豫章宋無長木此猶錦繡之與短褐也臣以王之攻宋也為與此同類王曰善請無攻宋吕氏春秋曰秦興兵欲攻魏司馬唐諫秦君曰叚干木賢者也而魏禮之天下莫不聞無乃不可加兵乎秦君乃按兵而輟不攻魏文侯可謂善用兵矣聞君子之用兵也莫見其形其功已成此之謂也偃武}
