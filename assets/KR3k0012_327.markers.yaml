  - {type: variant, offset: 2135, length: 177, content: 人謂朱滔曰吾聞朱公皃如神安得而識之願因繢事以觀可乎滔乃圖其形以示之錦衣金鉤甚偉寶臣懸於射堂命諸將熟視之曰朱公信神人也他日滔出獵寶臣密選精卒劫之戒其將曰取彼貌如射堂所懸者是時二軍方共事不相虞而卒變暴至滔駭然與戰於瓦橋適衣他服以不識免又曰蔡州賊將吳秀琳以文城柵兵三千降李愬愬從秀琳於新興柵遂以琳之眾攻吳房夏四月庚寅朔辛卯李愬奏師至嵖岈山擒賊將柳世于李湊等二人, WYG: ''}
