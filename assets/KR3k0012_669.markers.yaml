  - {type: variant, offset: 2472, length: 126, content: 眼者身之鏡耳者體之牖視多則鏡昏聽眾則牖閉磨鏡決牖則能徹洞萬靈眇察絕響面者神之庭髮者腦之華心悲則面焦腦減則髮素所以精氣內喪丹津損竭精者體之神明者身之寶勞多則精散營竟則明消所以老隨氣落耄已及之真誥曰富貴者破骨之斧載罪之舟車適足誨愆要辱為伐命之兵非佳事也是故, SBCK: 太}
