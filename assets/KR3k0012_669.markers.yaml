  - {type: variant, offset: 852, length: 2, content: 陸行, SBCK: 爲佳又東華眞人食石法即東府也亦是太清法又曰紫微夫人撰术序其畧曰吾俱察草木之勝􅀒􅀂速益於已者並已}
