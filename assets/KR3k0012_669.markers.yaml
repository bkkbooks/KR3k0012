  - {type: variant, offset: 1866, length: 604, content: 積傷至盡乖養性之方耳不極聽目不久視坐不至疲先寒而衣先熱而解不欲極飢而食食不過飽極渴而飲飲不過多不欲甚勞不欲多汗及多唾奔車走馬極目遠望多食生冷冬不欲極溫夏不欲極涼大寒大熱大風大霧不欲冒之五味不可偏多凡言傷者亦不便覺久則損壽耳是以善攝生者臥起有四時之早晚興居有至和之常制調利筋骨有偃仰之方杜疾閑邪有吞吐之術流衝營胃有補瀉之法節宣勞逸有與奪之要忍怒以全陰抑喜以養陽然後先將服草木以救虧缺後服金丹以定無窮長生之理盡於此矣若有欲決意任懷自謂達識知命不泥異端極情不營久生者安可告養生之言哉登真隱訣曰方諸青童云人學道亦苦不學亦苦二苦之始乃同為苦之終則異為道者緣苦得樂不為道者從辛苦而已矣惟人自生至老自老至病獲身至死其苦甚矣心腦積罪生死不絕其苦難說況復不終其天之年老哉此不為道之苦也為道亦苦者清淨存真守玄思靈尋師勞苦歷試數百用志不墮亦苦之至也此為道之苦數十年中為苦之理乃有甚於彼得道之日乃頓忘此苦猶百日之飢一朝而飽豈復覺向者之餒乏耶非道則不可右英真人曰夫內接家業以自羈外綜王事以雜役此亦道之不專也夫抱道不行猶無道也握寶不用猶無寶也紫微元君曰疾之所生生乎念多邪之所兆兆於心散念多則事廣事廣則累繁浮泛莫撿紛竟不息內煎萬慮外勞百役形神弊矣眾病安得不興高墉重關猶恐冠至況闢扉去防自我致寇也智以無涯傷性心以為惡蕩真形來在眼聲發入聽其為閞意屬想實有增羨魂者正神神貴明信魄者邪鬼鬼尚狂悖飛仙之想觸見必念慈護之情遇物斯極以此為心心即道矣九華, SBCK: 上}
