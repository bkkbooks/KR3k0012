  - {type: variant, offset: 1023, length: 185, content: 曰古人為道也玄寂靜神念真存元示漸引末歸識源神知而能見見而能從從而能習習而能堅堅而能成成而不居善人在於天下如橐籥乎非與萬物交爭其德常歸焉以其謙虛無欲也欲者凶害之根也無者天地之元也莫知其根莫知其源聖人者去欲入無以輔其身也太一洞真經曰兩耳名為六合之高牎也又云齊中名曰受命之宮也又曰養生之道耳目為主雜視則目闇廣聽則耳閉裴君內傳曰夫求道者要先令目清耳聰為主也且耳目是尋真之梯級綜靈, SBCK: ''}
