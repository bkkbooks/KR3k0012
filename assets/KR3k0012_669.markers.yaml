  - {type: variant, offset: 1337, length: 272, content: 以和六液玄示經曰夫形體者特生之具也非所以生生也生生乃以素朴為體以氣為元以神為形此乃生之宮庭也以無為育其神舒釋玄妙之門往來無形之間休息於無鄰此所謂得玄明之生源又云外想宜絕內注玄真然後長生可保妙真經曰道人謀生不謀於名胸中絕白意無所傾志若流水居若空城積守無為乃能長生眾真戒曰性躁暴者一身之劇賊求道之散梯也用之者真去改之者道來每事觸類皆當柔遲而盡精潔之理如此幾乎道也神者天地之所馳也頤神養性行生道氣以度難也此乃上聖真人達識也夫為道者當行此以載其身太一帝君經曰若能常行九晨照洞房泥丸之法者檢魂魄制萬邪清淨行之以致靈仙之氣降于寢室所謂引三光九星以照百神者也, SBCK: ''}
