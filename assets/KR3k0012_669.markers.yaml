  - {type: variant, offset: 3869, length: 1, content: 甚, krp: 劉向列仙傳曰務光夏時人好琴服蒲韮根又彭祖多服水桂雲母中岳人蘇林字子玄夲衛人靈公末年師仇公教以服氣之法又尹喜之長沙服巨勝實又曰劉奉林周時人也學道嵩髙山積年後之委羽山能閉氣三日不息但服黄連已及千歳不能有所役使又曰董威輦不知何許人晉武帝末在洛陽白社中藍縷不蔽恒吞一石子終日不食南岳魏夫人内傳曰夫人名華存字賢安任城人也晉成帝時服金屑得道太元眞人茅盈内傳曰金闕聖君命太極真人使正一玄玉郎王忠鮑丘等與茅盈四節燕胎流明神芝長躍雙飛夜光洞草使拜而食之佩璽服衣正冠北首帶符握鈴畢四使者告盈日食太極四節隱芝者位爲眞卿食金闕燕胎玉芝者位爲司命食東宫流明金英者位爲司禄食長躍雙飛者位爲眞伯食夜光洞草者位爲主㹅左右御史之任子今盡食之矣壽畢天地位當爲司命上眞東岳卿君都統呉越之神仙眞人周君内傳曰紫陽眞人周義山字季通汝隂人也漢丞相勃七世孫父浚官至陳留内史君年十六隨浚在郡爲人沉重喜怒不形好獨坐静處精思微宻常以平旦出日之𥘉面東嗽日服氣旦旦知此眞誥曰衡山張正禮漢末受西城君虹景神丹方患丹砂}
  - {type: variant, offset: 3871, length: 0, content: '', SBCK: 得去廣州爲道士仙去颷室爲上仙又曰張􅀇賔定襄人也魏武帝時曽舉茂才歸郷里師事西河葪公受服餌术方後遇眞人樊子明於少室授以遁變隱景之道昔在天柱山今來華陽内爲理禁伯又曰廬江潜山中有學道者鄭景世張重華並以晉􅀄受仙人孟德然口訣以入山}
