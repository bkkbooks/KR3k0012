  - {type: variant, offset: 329, length: 268, content: 二年三一見相授子書矣但有三一長生不滅況復守之乎能守三一名刊玉札況與三一相見乎加存洞房為上清公加知三元為五帝君後金闕帝君所以乘景迅雲周行十天者寔由洞房三元真一之道也世之學者皆尊守一當令心朴神凝體專誠感所以百念不生精意不散但有三月內視注心一神繫念不散專氣致和由朴之至也得之速也自朴散真離華偽玄起爭競亂生故一不卒感神不即應非不欲往存之者不專思之者不審故起積年之功絕有髣髴耳三一之法上清真書之首篇高上之玉道神仙之津途眾真之妙訣子能守一一亦守子子能見一一亦見子一須身而立身須一而生守一之戒戒於不專專復不久久不能精精不能固固而不恒則三一去矣身為空宅, SBCK: 卷}
