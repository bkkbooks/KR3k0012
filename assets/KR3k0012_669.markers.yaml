  - {type: variant, offset: 3868, length: 0, content: '', SBCK: 道生生之夲業也欲得延年當吞日華食物多飲愼便卧多則生病卧則蕩心心蕩則失性病生則藥不行學道者愼}
  - {type: variant, offset: 3868, length: 0, content: '', WYG: 道生生之本業也欲得延年當吞日華食物多飲慎便卧多則生病卧則蕩心心蕩則失性病生則藥不行學道者慎}
  - {type: variant, offset: 3868, length: 0, content: '', krp: 道生生之夲業也欲得延年當吞日華食物多飲愼便卧多則生病卧則蕩心心蕩則失性病生則藥不行學道者愼}
  - {type: variant, offset: 3869, length: 1, content: 甚, SBCK: 劉向列仙傳曰務光夏時人好琴服蒲韮根又彭祖多服水桂雲母中岳人蘇林字子􅀇夲衛人靈公末年師仇公教以服氣之法又尹喜之長沙服巨勝實又曰劉奉林周時人也學道嵩髙山積年後之委羽山能閉氣三日不息但服黄連已及千歳不能有所役使又曰董威輦不知何許人晉武帝末在洛陽白社中藍縷不蔽恒吞一石子終日不食南岳魏夫人内傳曰夫人名華存字賢安任城人也晉成帝時服金屑得道太元眞人茅盈内傳曰金闕聖君命太極真人使正一玄玉郎王忠鮑丘等與茅盈四節燕胎流明神芝長躍􅀟飛夜光洞草使拜而食之佩璽服衣正冠北首帶符握鈴畢四使者告盈日食太極四節隱芝者位爲眞卿食金闕燕胎玉芝者位爲司命食東宫流明金英者位爲司禄食長躍雙飛者位爲眞伯食夜光洞草者位爲主㹅左右御史之任子今盡食之矣壽畢天地位當爲司命上眞東岳卿君都統呉越之神仙眞人周君内傳曰紫陽眞人周義山字季通汝隂人也漢丞相勃七世孫父浚官至陳留内史君年十六隨浚在郡爲人沉重喜怒不形好獨坐静處精思微宻常以平旦出日之􅀄面東嗽日服氣旦旦知此眞誥曰衡山張正禮漢末受西城君虹景神丹方患丹砂}
