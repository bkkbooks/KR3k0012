  - {type: variant, offset: 3426, length: 389, content: 積精為神故仙者內求內密則道來真者修寂修靜則合真神者須積感則靈通常能守一則仙近矣則與天地共寄於太無中矣又能洞靈體無則太無共寄於寂寥中矣能洞寂則聽視不聞見與道冥矣道者靈通之至真也術者變化之伎玄也道無形因術以濟人人之有靈因修而契道道之要者在深簡易功術之祕者惟藥與氣也上士服之升為仙官中士服之栖集崑崙下士服之長生人間於是太一元君述還丹金液之要行於世又曰木公金母者二氣之祖宗陰陽之原本仙真之主宰造化之元先疑氣成真與道合體且氣之彌綸天地經營動植在人為人在物為物發大蘊散無窮性發乎天而命成乎人立之者天行之者道玄老云致虛極守靜篤萬物將自復復謂歸於道而常存也長久之要者天保其玄地守其物人養其氣又曰商王聞彭祖有道拜為大夫每稱疾閑居不預政事服雲母粉麋鹿角水挂常有少容性深靜不自言有道王詣問莫之告王於掖庭立華屋紫閣使祖居之問延年益壽之道荅曰欲登天上補仙官者當服元君太一金丹此道至大其次當愛精養神服食草藥, SBCK: ''}
