  - {type: variant, offset: 852, length: 2, content: 陸行, krp: 爲佳又東華眞人食石法即東府也亦是太清法又曰紫微夫人撰术序其畧曰吾俱察草木之勝負若速益於已者並已}
  - {type: variant, offset: 855, length: 5, content: 遇兕虎入軍, SBCK: 及木之多驗乎所以長生乆視逺而更靈我非謂諸物皆當减於术也眞以术之用今之所要末丗多疾冝當服餌夫道有内足猶畏外事之禍有外足者亦或中崩之弊我見山林隱􅇣得服术者千年八百年此肩五岳矣今撰术數方以傳好尚􅀂必信用庶無橫􅁀之災矣又曰南陽酈縣山中有甘谷水所以甘者谷山左右皆生甘菊菊花墮其中歴丗弥乆臨此谷中居民皆}
