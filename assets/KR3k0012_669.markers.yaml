  - {type: variant, offset: 861, length: 4, content: 被甲兵兕, SBCK: 穿井悉食甘谷水食者無不壽髙者百四五十歳下者不失八九十歳故司空王暢太尉劉寛太傅􅀽隗皆爲南陽太守毎到官常使酈縣月送甘谷水四十斛以爲飲食此諸公多患風痺及􅅭冐皆得愈但不能大得其益如甘谷上居民從㓜便飲食此水又菊花與薏花相似直以甘苦別之耳菊甘而薏苦今眞菊甚少耳率多生於水側緱氏山與酈縣最多仙方所謂曰精更生周盈皆一菊而根莖花實異名矣其說甚美而近來服之者畧}
