  - {type: variant, offset: 2600, length: 447, content: 高人覽罪咎之難豫知富貴之不可享矣遂肥遯長林栖景名山欲遠此跡自求多福保全至素者也裴君曰三關常調是長生之道也口為天關手為人關足為地關調則五藏安安則無病又存五神於體謂兩手兩足頭也頭想恒青兩手俱赤二足常白者則去仙近矣昔徐季道學仙於鵠鳴山中亦時時出市道間忽見一人著皮袴褶柱桃杖季道乃拜之因語季道曰欲學道者當巾天青詠大曆踏雙白佪二赤此五神之事其語隱也大曆三皇文也此即太素五神事別有經品黃老經曰士能遺物乃可議生生本無邪為物所嬰久久易志志欲外無能守以道為貴生太上太真科曰一在人身鎮定三處能守三一動止不忘三尸自去九虫自消不假藥餌不須禁防久視之要守一為先次行師教授職隨才依功進位積德居尊宣楊妙氣開導後生三皇經曰天能守一覆而不舉地能守一靜而能處岳能守一不避寒暑海能守一流而不還人能守一必得真仙昇玄經曰道有大法得之立得是謂三一之道當有將軍吏兵斷絕惡道上清玉皇曰三真者兆一身之帝君百神之內始變化離合與真洞靈微哉難言非仙不傳太上素靈經曰三一者一身之靈宗百神之命根津液之山源魂精之玉室是以胃池體方而受物腦宮圓靈而適真太上曰真, SBCK: ''}
