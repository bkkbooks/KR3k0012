  - {type: variant, offset: 4267, length: 451, content: 交故四時均而萬物生生成不知窮極所以天不失其動地不失其和物不失其生而能長久也人不能法天地而有常減衣絕食自取死病愚之甚也去此修攝節宣之外則有服元和之氣得其道則邪不能入此理身之本也其餘含景思神歷藏導引吞餌服御之事千七百餘條及四時首月責己謝過臥起早晏之法可以教初學之士引進向善之門漸正其心而徐息其罪咎非便能致人得道也若血脈枯竭神氣凋敗豈鬼神念真而能守之固未知其益矣此由凡人為道而求其末不務其本也又曰內不養神外勞其形元精漸虛神氣困竭而晝夜服勤讀誦經訣此亦無益也諸經萬三千首皆示以始涉之門庭耳商王具受諸要行彭祖之亦壽但不能戒其淫慾耳集仙籙曰女凡者陳市上酒婦也作酒美有仙人過其家飲酒即以素書五卷貰酒凡開視之乃仙方養性長生之術也凡私寫其要訣依而修之三年顏色更少數歲貰酒仙人復來笑謂之曰盜道無師有翅不飛女凡隨仙人去不知所之又日太陽女朱翼得吐納之道事絕洞子李脩脩著書四十篇名曰道源常行之道以柔勝剛弱制強如臨深履危御奔乘朽差之毫釐喪爾之策勤而行之可以長壽又曰太陰女盧金學道未成當道沽酒密訪其師會客過使問客土數為歲但南三北五東, SBCK: ''}
