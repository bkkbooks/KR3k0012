  - {type: variant, offset: 692, length: 0, content: '', WYG: 明又曰真人謂黄精獲天地之淳精依山寄居神化者也仙名此為戊巳芝玉訣經曰元始五常氣以陽光初明散元始之輝真人食其景而無窮三光經曰三光者仙道錬胎之術也泥丸者體形之上神也吐納經曰八公有言食草者力食肉者勇食榖者智食氣者神仙經曰丹為金服之上士也茹芝導引咽氣者中士也食餌草木者下士也食金石藥雖未去世百邪不近也若但服草木及餌金石適可令疾除命益耳不足却外禍也惟守真一則劇性不犯昔仙公各服一物以得數百年乃合神丹金液韓衆服菖蒲十三年身生毛目視書萬言皆誦之冬極不寒又菖蒲生須石上一寸九節已上紫花者尤善又曰煑石方東府左卿白石先生造也皆真人所授但未見真本世有兩本以省}
