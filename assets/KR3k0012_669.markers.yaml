  - {type: variant, offset: 3880, length: 1, content: 非, SBCK: 曰虞翁生㑹稽人也受仙人介君食日精法吳時來隱狼伍山兼行雲氣廻形之道精思積乆仙去又曰朱孺子呉末入赤水山中服窮華及术後遇西歸子從乞度世西歸子授以要言仙去又曰明星}
  - {type: variant, offset: 3880, length: 1, content: 非, WYG: 曰虞翁生㑹稽人受仙介君食日精法呉時來隠狼伍山兼行服氣廻形之道精思積久仙去又曰朱孺子呉末入赤水山中服菊花及术後過西歸子從乞度世西歸子授以要言仙去又曰明星玉女者居華山服玊漿山中頂上有石龜其廣數畝髙且三仞其側有梯磴逹龜背見玉女祠前有五石臼號曰玉女洗頭盆其中水碧緑深澄雨不加溢旱不减耗内有玉女馬一疋又曰華隂山中有學道者尹受子張石生李方回並晉武帝時人受仙人管城子蒸丹餌术法又授蘇門周壽陵服丹霞之法又曰范㓜冲遼西人恒服三氣法青白赤氣各如綖服之十年遂得仙此髙元君太素内景法旦旦為之視日益佳其法簡其事驗又曰姜白真在太横山服石腦石腦如石小班色而軟又大茅山東亦有形狀真小如層青而色似鍾乳繁陽子昔亦服此裴君内傳曰佛面道人支子元裴君授以長生内術又云尋藥之與存思雖致同津而關源異緒服藥所以保形形康則神安存思所以安神神通則形保二理乃成相資而有道學傳曰許邁字叔元少名映後改名逺遊與}
