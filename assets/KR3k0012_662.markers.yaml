  - {type: variant, offset: 481, length: 0, content: '', SBCK: 隱博落山中九十餘年伹食桃飲石泉後逢司馬季主季主以導仙八方與之遂度世仙去又曰王生陽城人居壷谷中不知時漢武帝登嵩山東方朔等從忽見一神人長丈餘帝禮而問之曰某九疑山人也聞中岳有石菖蒲一寸九節食可長生故來採之忽失神人帝遂採服之帝性􅀬煩悶不快從官皆服皆能遟乆惟王生聞神人教服遂採食之仙去又曰劉根字君安京兆長安人少明五經漢成帝時人也入嵩山石室峻絶之處嘗曰上藥有九轉還丹太一金液次有雲}
  - {type: page-break, offset: 481, content: '', id: KR3k0012_SBCK_662-5a}
  - {type: variant, offset: 481, length: 0, content: '', WYG: 隠博落山中九十餘年但食桃飲石泉後逢司馬季主季主以導引仙方與之遂度世得仙又曰王生陽城人居壺谷中不知時漢武登嵩山東方朔等從忽見一神人長丈餘帝禮而問之曰其九疑山人也聞中嶽有石菖蒲一寸九節食可長生故來採之忽失神人帝遂扶服之帝性熱煩惱不快從官皆服皆能遲久惟王生聞神人教服遂採食之仙去又曰劉根字君安京兆長安人少明五經漢武帝時人也入嵩山石室峻絶之䖏嘗曰上乗有九轉還丹太一金液次有雲}
