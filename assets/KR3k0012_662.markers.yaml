  - {type: variant, offset: 906, length: 253, content: 巫蠱事起帝愈悔恨又大茅君盈南治句曲之山元壽二年八月己酉南岳真人赤君西城王君方諸葛青童並從王母降於茅盈之室又王母命上元夫人授盈二第茅固茅衷太霄隱書其後紫靈元君魏華存齋戒於陽洛山隱元之臺王母與金闕聖君降於臺中乘八景之輿同詣清虛上宮傳玉清隱書四卷以授魏夫人時太虛真人等歌太極歌王母曰逍遙玄精際萬流無暫停哀此去留會劫盡天地傾當尋無中景不死亦不生體被自然道寂觀合大冥南岳挺真幹玉映耀穎精有任靡其事虛心自受靈嘉會絳河曲相與樂未央王母復還龜臺三一經曰黃帝遊靈臺青城山絕巖之下見天真皇人以蒼玉為屋黃玉為狀翠羅之帷侍者皆天人, SBCK: ''}
