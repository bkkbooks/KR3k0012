  - {type: variant, offset: 3, length: 1, content: 真, SBCK: 淸九宫並有僚屬例左勝於右其髙揔稱曰道君次眞}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 清九宫並有僚屬例左勝於右其上惣穪曰道君次}
  - {type: variant, offset: 3, length: 1, content: 真, krp: 淸九宫並有僚屬例左勝於右其髙揔稱曰道君次眞}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 眞公眞􅀸其中有御史玉郎諸小號官位甚多也女眞則稱元君夫人其名仙夫人之秩比仙公也夫人亦隨仙之大小男女皆取所治處以爲署號並有左右凡稱太上者皆一宫之所尊又有太淸右仙公蓬萊左仙公太極仙侯眞伯仙監仙郞仙賔皇民譜録曰自三象明曜巳來至于累億刼㑹天地成敗非可勝載數極唐堯是爲小劫丁亥之後甲申之年陽九百六之氣離合壬辰之始數有九周至庚子之年赤星見于東方白彗見于月窟唐堯之後四十六丁亥是小刼之周又五十五丁亥至壬辰癸巳是大刼之周也六合冥一二道盈虧時運周刼始轉一仙階金根}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_662-1b}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 真公真卿其中有御史玉郎諸小號官位甚多也女真則穪元君夫人其名仙夫人之秩比仙公也夫人亦随仙之大小男女皆取所治䖏以為著號並有左右凢稱太上者皆一宫之所尊又有太清右仙公蓬萊左仙太極仙侯真伯先監先郎先賢皇民譜録曰自三象明曜已來至於累億刼㑹天地成敗非可勝載數極唐堯是為小刼丁亥之後甲申之年陽九百六二氣離合壬辰之始數有九周至庚子之年赤星見於東方白􅀈見於月窟唐堯之後四十六丁亥是三刼之周又五十五丁亥至壬辰癸巳是大刼之周也六合冝一二道盈虧時運周刼始轉一仙階金根}
