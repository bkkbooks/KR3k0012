  - {type: variant, offset: 554, length: 575, content: 也至若太上靈藥上帝之奇物也下陰生重雲妙草皆神仙之藥也得上品者後天而老乃太上之所服非中仙之所寶其中品者有得服之後天而遊乃天真之所服非下仙之所及其次藥有九丹金液紫虹華英太清九轉五雲之漿玄霜絳雪騰躍三黃東瀛白香玄洲飛生八石千芝威喜九光西流石膽東滄青錢高丘餘糧積石瓊田太靈還丹盛以金蘭長光絳草雲童飛于此飛仙之所服非地仙之所聞也其下藥茯苓昌蒲巨勝黃精之類服之可以延年雖不得長享無期亦以身生光澤得為地仙求道者要先憑此階漸而能致遠勝也若能呼吸服御保固神氣此上品自然之要道也且夫一人之身天付之以神地付之以形道付之以氣萬物草木亦如之身以道為本豈可不養神固氣以全爾形也形神俱全上聖所貴王母命上元夫人出八會之書五岳真圖五帝六甲靈飛之符凡十二事以授帝不能用其道而多所惑焉後三祠王母復下降所授之書置柏梁臺上為天災所焚李少君解形而去巫蠱事起帝愈悔恨又大茅君盈南治句曲之山元壽二年八月己酉南岳真人赤君西城王君方諸葛青童並從王母降於茅盈之室又王母命上元夫人授盈二第茅固茅衷太霄隱書其後紫靈元君魏華存齋戒於陽洛山隱元之臺王母與金闕聖君降於臺中乘八景之輿同詣清虛上宮傳玉清隱書四卷以授魏夫人時太虛真人等歌太極歌王母曰逍遙玄精際萬流無暫停哀此去留會劫盡天地傾當尋無中景不死亦不生體被自然道寂觀合大冥南岳挺真幹玉映耀穎精有任靡其事虛心自受靈嘉會絳河曲相與樂未央王母復還龜臺三一經曰黃帝遊靈臺, WYG: 矣遂入}
