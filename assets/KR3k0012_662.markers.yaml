  - {type: variant, offset: 2471, length: 0, content: '', SBCK: 積四十五年精思不懈體有眞氣後仙去又曰葛􅀇善於變幻拙於用身初在長山近入蓋竹亦能乘虎使􅀑但末得受職耳常與謝稚堅黃子陽郭聲子相隨也葛􅀇是抱朴子從祖即鄭思逺之師也時人莫測所處傳言東海中仙人寄書呼爲仙公又曰魯妙典者九疑山女道士也生而好道忽謂母曰人之上壽所傳得者稀喜樂悲哀日以相害況埋没眞性混于流浴乎有道士過其門授以大洞黃庭經謂曰所患人不能知知不能修修不能精精不能乆不惟有􅀇科之責亦將苦報無窮也妙典奉其言入九疑山累有魔試介特不撓山上一石盆中有泉用之不竭又有大鐵臼不知何虚來}
