  - {type: variant, offset: 421, length: 0, content: '', SBCK: 家濮陽曲水林少􅀌以仁孝聞貧常自牧牛得道母食思鮓仙公以匕著置器中攜錢去即以鮓至母日便縣有魚去此百餘里汝欺我哉仙公跪曰不妄明日舅至云昨見仙公便縣市鮓母方駭其神異後仙去有白鶴來止郡城東北樓以爪畫樓板似漆書云城郭是人民非于今仙公故第猶在丁令威亦如此又曰沈文泰者九疑人得紅泉神丹法去土符還年之道服之甚効欲之崑崙留息積年以傳李文淵曰土符不去服藥行道無益也文淵遂受其祕要後亦仙去令以竹根汁煑丹及黃神去三尸法又曰沉羲吳郡人學道於蜀能治病救人甚有恩德後遇羽衣持節人以白玉版青玉丹書授羲羲不能讀須􅁷大霧霧解失其人羲還後仙去又曰陳安世京兆人爲灌叔本傭稟性慈仁叔本好道有二道人託爲書生從叔本遊以觀試之叔本不知其異人也乆而益怠書生乃問安世曰爾好道否曰無縁知之曰審好道明日早會道北大樹}
  - {type: page-break, offset: 421, content: '', id: KR3k0012_SBCK_662-4a}
  - {type: variant, offset: 421, length: 0, content: '', WYG: 家濮陽曲水林少孤以仁孝聞貧常自牧牛得道毋食思鮓仙公以錢着置器中携前去即以魚來毋曰縣便有魚去此百餘里汝欺我哉仙公跪曰不妄明日舅至云昨見令公在縣市鮓毋方駭其神異後仙去有白鶴來至郡城東北樓以爪畫樓板以膝書云城郭是人民非仙公故第猶丁令威又曰沈文㤗者九疑人得紅泉神丹法學玉符述年之道服之甚效欲之崑崙留息積年以傳李文淵曰土符不去服藥行道無益也文淵遂受其秘要後亦仙去令以竹根汁煑丹及神去三尸法又曰沈義吳郡人學道於蜀能治病救人甚有恩徳後遇羽衣侍兩人以白玉板及青玉丹書授義義不能讀須臾大霧霧解失其人義還後仙去又曰陳安世京兆人為灌叔本傭禀性慈仁叔本好道有二道士託為書生從叔本遊以觀試之叔本不知其異人也久而益怠書生乃問安世曰爾好道否曰無縁知之曰審好道明日早至道北大樹}
