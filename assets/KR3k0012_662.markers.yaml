  - {type: variant, offset: 2538, length: 897, content: 年忽見五老人賜裴君神芝之術亦號清虛真人又曰中岳真人王仲甫少好仙道常吸引二景及飡霞法四十餘年都不覺益其子亦服之十八年仙去後南真人忽降仲甫家而教之日子朏眾虧減津液不注雖接真景以飡霞故未為身益仲甫遂因藥治病兼修真道又積年方成今在玄洲受書為中岳真人領九玄之司又曰范伯慈桂陽人也家本事俗忽得狂病經年不愈聞沈道士治病多驗乃棄家求療五十日病愈後入天目山餌胡麻精思十七年又服丹砂得道為玄一真人又曰許謐宇思玄一名穆晉簡文皇帝以為護軍長史雖外混俗務而內修真學得為上清真人又曰紫虛元君領上真司命南岳魏夫人玉清虛弟子名華存楊司命之師也任城人晉司徒文康公魏舒之女年二十四適南陽劉幼彥幼彥為汲縣修武夫人齋戒念道入室百日十二月夜半青童君及王君四真人同降授上經三十一卷至洛陽亂夫人渡江居豫章隨于璞往江州安城郡因居彼年八十三以成帝咸和九年青童清虛又降授劍解之道稱疾隱化乘飆車往陽洛山明日有四十七真人降教道法積十六年西母與金闕南極同降迎夫人北詣上清宮玉闕下受神鳳章龍衣虎帶丹飛裙十絕華幡流金火鈴九蓋芝軿九色之節雙珠月明神虎之符錦旂虎旌給西華玉女八景飛輿玄景九龍又受扶桑大帝君玉劄金文位為紫虛元君領上真司命主諸學道死生圖籍攝御三官關校罪考又受金闕聖君青瓊板丹籙文位為南缶夫人給曲晨飛蓋治天台大霍山洞臺中下訓奉道教授當為真仙者一月再登玉清三登太素四謁玉晨遨宴扶桑仰招天真揔括神籙刊書九天佐命東華叶翼帝晨飛步太霞參轡九虛以興寧中降揚君又授許掾上經自此後數數來降也玉清虛令弟子范邈作內傳顯于世也又曰紫清上宮九華安真妃晉興寧三年年十三四著雲錦裙上丹下青腰絲繡帶右帶係十餘小鈴鈴子青色又黃色相閒左帶玉珮指著金鐶白珠約臂作髻在頂中餘髮垂至腰一侍女朱衣帶青章襄長尺餘以盛書書可十餘卷白玉檢囊口上刻字玉清神虛內真紫元丹章一侍女赤衣捧白玉箱絳帶絡之年並十七八自此後數數來降授書作詩真人傳曰馬明生者齊國臨淄人也本姓帛名和字君賢為縣吏捕賊所傷遇太真元君與藥即愈隨至太山石室中金床玉几珍物奇偉人跡所不能及事之勤亦至矣太真乃授以長生之方曰我所受服太和自然龍胎之體適所以授三天真人不可以教始學者後隨安期先生服餌仙去為真人裴真人弟子三十四人其十八人學真道餘學仙道, SBCK: ''}
