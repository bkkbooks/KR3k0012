  - {type: variant, offset: 1550, length: 901, content: 數度盡九星度值合歲月並正應有異人過此乃齋戒掃道以俟之及老子度關喜先誡關吏曰若有翁乘青牛薄板車者勿聽過止以白之果至吏白願少止喜帶印綬設師事之禮老子重辭之喜曰願為我著書說大道之意得奉而行焉於是著道德經上下二篇喜於是俱去玄洲上卿蘇林傳曰林字子玄濮陽曲水人也父秀含德隱曜居於恒山林少稟異操至趙師琴高先生授鍊氣益命之道又師華山仇先生授還神之術曰子真人也當學真道乃致林於涓子未遂告林真訣先生日必作地上真人當先去三尸林後授紫陽真人道訣凡二百餘事至于守玄丹洞房三元真人具標上焉林為中岳真人茅君傳日盈字叔申咸陽人也父祚有三子盈固衷也盈少稟奇操矯俗抗邁不求聞達不交非類入恒山讀老易餌朮潛影在山中六年精思念道誠感密應夢太玄玉女持玉劄而攜之曰西城有王君得真道可為師明發乃尋求至西城齋戒三月果見王君盈乃叩頭再拜勤懇乞長生之術乃得在西城洞臺之中金玉上宮親侍旦夕執巾屨之役積十七年專一不懈復二年王君命駕造白玉龜山謁王毋於青琳宮將盈同行王君見西王母稽首於前盈乃叩頭再拜自陳於王母前得治身之要道行其事歸家數十年以漢元帝時天官下迎來渡江東治句曲山於是天皇大帝遣授黃金紫玉策為太元真人東岳上卿司命神君仗紫毛之節十絕靈幡巾藕華冠繡羽紫帔丹青飛群斑龍輿素虎軿曲晨寶蓋瓊帷緣寶執神流火雙珠月明錦旌白羽玄千金鍾玉磐紫琳之腴玉漿金甖治赤城山玉洞之府上編上清下宴太極封掌吳越司校太山死生籙朝籍眾真定策金名領授學道試校群仙時茅君弟吏二千石當之官鄉人多送之茅君亦在座曰余亦有職某月日當之官賓客曰願奉送茅君言不須有所損費吾有以供帳至期大作宴會皆青縑帷幄下鋪重白氈奇饌異果羅列妓樂合奏聞數里從者千餘人文吏則朱衣素帶武吏則戎備曜日茅君乃登羽蓋車去以晉興寧三年七月四日夜初降楊君家著青錦繡裙紫毛帔巾芙蓉冠侍從七人入戶一人執紫毛節一人執十絕幡一人帶綠章囊一人握流金鈴三人奉白牙箱並朱衣以後數數來降弟子迎候仙人李遵撰傳光顯于世閒也三洞珠囊日王褒字子登前漢王陵七世孫服青精䭀飯趍步峻峰如飛鳥無津梁直度積水又服雲碧晨飛丹腴視見甚遠太上大道君遣正一左玄執蓋郎封瑋音賜王君素明瓊玕丹紱綿旌號清虛真人真誥曰赤松子黃帝時雨師號太極真人又曰九疑真人韓偉遠昔師中岳宋德玄德玄者周宣王時, SBCK: ''}
