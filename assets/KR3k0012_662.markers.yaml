  - {type: variant, offset: 8, length: 1, content: 錄, SBCK: 籙曰後漢南陽公主降駙馬都尉王咸公主素尚至道屬漢末亂離謂咸曰伹當自保必可延生若碌碌隨時與世進退恐不免乖離之苦奔廹之患也咸黽俛世利未從其言公主遂入華陰山長往咸入山追之無見忽於嶺上見朱履一雙前取之化爲石謂其山爲公主峯又曰張正禮漢未在衡山學道服黃精受西城君虹景丹患藥之難得至廣州爲道士遂得内外洞徹砂兼修守一之法仙去眞詰曰章震南郡人少學經晝周幽王時人而常歎曰人生世閒日失一日去生轉逺乃著道書百餘篇精於五行演其微妙以飬性治病爲旨後入崆峒山仙去又}
