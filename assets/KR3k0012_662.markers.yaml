  - {type: variant, offset: 76, length: 189, content: 蓬髮虎齒非西母之真形蓋金方之神也元始授以萬天元統龜山九光之籙使制召萬靈統括眾真揔諸天之羽儀天帝朝宴之會上清寶經三洞玉書凡所授度咸所關預黃帝在位王母遣使乘白鹿集帝庭授以地圖其後舜在位遣使獻白玉環及益地圖遂廣黃帝九州為十二州又遣獻舜玉琯吹之以和八風又尚書帝驗期曰王母之國在西荒凡得道授書者皆朝王母於崑崙之闕王褎字子登齋戒三月王母授以瓊花寶曜七晨素經茅盈從西城王君詣白玉龜臺朝謁王母求, SBCK: 本大儒晚學}
