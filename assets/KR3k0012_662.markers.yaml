  - {type: variant, offset: 2475, length: 5, content: 偉遠久而隨, SBCK: 中石壇上宛然有仙履跡及古鏡一廣三尺古鍾一形如偃月在無爲觀中妙典後仙去又曰謝自然女道士也果州人詞氣高異其家在大方山下頂有古像老君其形自然因拜禮不願下山母從之乃遷居山頂自此常誦道德經黃庭内篇於開元觀受紫虚寶籙於金泉山居之山有石壇煙籮脩竹一十三年晝夜不寐兩膝上忽有印似小於人閒宫印四壖若朱有古􅂐六字粲如白玉忽於金泉道塲有雲氣遮匝一川散漫彌乆仙去其金泉碑略曰天上有白玉堂壁上列髙仙眞仙之名如人閒壁記時有朱書注其字下曰降世爲某官某職又自然於所居堂東壁上書數字皆道德之意眞跡有焉又曰王奉仙宣州當塗縣民家女也}
