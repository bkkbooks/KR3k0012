  - {type: variant, offset: 11, length: 3, content: 母者龜, SBCK: 逺字方平東海人舉孝廉除郎中累遷至中散大夫博學尢明天文圗讖河洛之要逆知天下盛衰之期漢􅁊帝嗣位聞之連詔不出使郡國逼載以至京師但低頭閉口不荅詔乃題宫門板四百餘字皆說方來帝惡之歸鄕里同郡故太尉公陳躭爲方平駕道室旦夕事之方平在躭家四十餘年後語躭云吾當去明日日中發至明日果卒躭知仙去曰先生捨我矣又曰嚴青㑹稽人家貧常於}
