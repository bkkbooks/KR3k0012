  - {type: variant, offset: 422, length: 2, content: 車扶, SBCK: 安世承言早往無所見曰書生詐我哉三期安世輒早至乃以藥授安世後仙去又曰吳睦長安人少爲縣吏掌􅈰枉尅人民訟之睦逃去入山林飢累日行至石室遇孫先生令學種黍及胡麻掃除駈使經四年先生遂授其道後服丹仙去又曰董威輦不知何許人晉武帝末在洛陽白社中寢息土上衣服籃縷常吞一石子經日不食或市乞傭作人或往觀之亦不奥言時或著詩莫知所終又曰蕭史秦繆公時人善吹蕭能致孔雀白鵠公女字弄玉好之以妻焉遂教弄玉作鳳鳴居十數年鳯凰來止公爲作鳳臺夫婦止其上數年仙去故秦人爲作鳯女祠雍宫世有蕭聲又曰河上公莫知姓名也漢孝景時結草菴於河上帝讀老子經景帝好其言有所不解聞公以問之以素書}
