  - {type: variant, offset: 1343, length: 206, content: 源彰陰邪清晨案天馬來詣太真家真人無奈隱又以滅百魔常歌此乞食市人無解此者獨萊子悟疑其真人然未全解其歌耳遂師此翁而去積十餘年翁遂授以中仙之道萊子今在中岳也乞食翁者西岳真人馮延壽周宣王時人也天庭任兩眉之下是徹視之津梁亦謂之華庭也山源是鼻下人中之本側在鼻下小入谷中也天馬手也以手按鼻下則杜絕百邪又曰真人尹喜周大夫也為關令少好學善天文祕緯鬼神無以匿其情狀瓌傑不檢榮戚不形於色志懷逍遙天性玄湛忽登樓四望見東極有紫氣西邁喜曰夫, SBCK: ''}
