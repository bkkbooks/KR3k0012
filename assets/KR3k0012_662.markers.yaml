  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第六百六十二}
  body:
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 四天仙天仙品日飛行雲中神化輕舉以爲天仙亦云飛仙神仙衆眞戒經曰大方諸山對㑹稽之東上有天仙宫室金玉雜爲棟宇金根經曰天闕上有層樓玉臺主衆仙出入之所也玉淸刻石隱銘曰佩玉帝隱文者得爲上仙戒文經曰天西北有仙堂差次職署則度名著九宫五斗仙府中天上有東西南北及中央也皆有石城應其方位百官曹局皆在斗中列紀後聖列紀曰若斗中有􅀇玉籙藉者皆爲上仙登眞隱訣曰}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 四天仙天仙品曰飛行雲中神化輕舉以為天仙亦云飛仙神仙衆真戒經曰大方諸山對㑹稽之東上有天仙宫室金玉雜為棟宇金根經曰天闕上有層樓玉臺主衆仙出入之所也玉清刻石隠銘曰佩玉帝隠文者得為上仙戒文經曰天西北有仙堂差次職署則度名著九宫五斗仙府中天上有東西南北及中央也皆有石城應其方位百官曹局皆紀列斗府中後聖列紀曰若斗中有𤣥玉籙籍者皆為上仙登真隠訣曰}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_WYG_662-1b, image: WYG0898/WYG0898-0856d.png}
  - {type: variant, offset: 2, length: 0, content: '', krp: 四天仙天仙品日飛行雲中神化輕舉以爲天仙亦云飛仙神仙衆眞戒經曰大方諸山對㑹稽之東上有天仙宫室金玉雜爲棟宇金根經曰天闕上有層樓玉臺主衆仙出入之所也玉淸刻石隱銘曰佩玉帝隱文者得爲上仙戒文經曰天西北有仙堂差次職署則度名著九宫五斗仙府中天上有東西南北及中央也皆有石城應其方位百官曹局皆在斗中列紀後聖列紀曰若斗中有玄玉籙藉者皆爲上仙登眞隱訣曰}
