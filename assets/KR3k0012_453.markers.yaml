  - {type: variant, offset: 3606, length: 2, content: 陳蕃, SBCK: 游子逺仕劉曜西羌羯叛亂舉兵四十餘萬三輔大震曜甚患之欲大興師伐之子逺諌曰足下納臣愚計不勞大軍可一月而定矣且羌夷之叛也非有大度窺􅀼神器矣但迫足下嚴刑峻􅃠今死者可不追生者猶可安莫􅀂大赦釋諸逆人􅀂没官者悉還之遽相撫育聽其復業與人更始彼生路旣開人情豈有樂禍好亂者也且小人聚居必有他心今無刑辟之懼以恩信懷之不降何待矣縱酋長負罪而不下者請假臣弱兵五千人爲足下梟之不勞大軍此可定矣今賊黨旣盛弥川被谷君臨之以兵恐非歳月而可殄也此言其術也曜大恱行其計西方遂平王隱晉書曰愍懷太子頗好遊宴洗馬江統等}
