  - {type: variant, offset: 3345, length: 316, content: 姓觀覩上愧色曰敬受侍中斯言以後為式更自整頓謝承後漢書曰延篤字叔固孝桓皇帝拜侍中自在機密常見進納上數問政事得失以經義古典默諫帷幄言不宣外又曰李膺等黨事下獄陳蕃上䟽極諫曰臣聞聖明之君委心輔佐亡國之主諱聞直辭故湯武雖聖而興於伊呂桀紂迷惑亡在失人由此言之君為元首臣為股肱同體相須共成美惡者伏見前司隸校尉李膺太僕社密太尉掾范滂等正身無點死心社稷以忠忤旨橫加考案或禁錮閉隔或死徙非所杜塞天下之口聾盲一世之人與秦焚書坑儒何以為異臣位列台司憂責深重不敢尸祿惜生坐觀成敗如不蒙採錄使身首分裂異門而出所不恨也帝諱其言切託以蕃非其人遂策免之又曰陳蕃諫桓帝曰故皋陶戒舜無畋遊周公戒成王無般于遊田虞舜成王猶有此戒況德不及二主者乎夫安平之時尚宜有節況當今之世有, WYG: 五十}
