  - {type: variant, offset: 3112, length: 0, content: '', SBCK: 􅅞先主曰卿何以知之雍對曰彼有淫具與欲釀者同先主大􅀏而原欲釀者雍之滑稽凡此􅀋又曰黄權字公衡州牧劉璋召爲主簿時別駕張松建議冝迎先主代張魯權諫曰左將軍有驍名今欲以部曲遇之則不滿其心欲以賔客禮待則一國不容二君客􅀂有太山之安則主有累􅆑之危可但閇境以待河清璋不聽又曰張松􅀃劉璋交通先主璋從之遣法正請先主璋從事廣漢王累倒自懸於州門以諫璋一無所納勑在所供奉先主入境如歸晉書曰何尚之傳時造􅀇武湖上欲於湖中立萬丈蓬萊瀛洲三神山尚之固諫乃止時又造華林園並盛暑欲興人工尚之又諫冝加休息又曰續咸僞趙石勒將遷都於鄴咸固諫勒怒曰不斬此老臣朕宫不得遷也勑御史收之中書令徐光表極諫勒乃悟停作賜咸絹百疋又曰孫嵩爲王弥長史弥與石勒有􅂩勒常惡之乃請計於右侯張賔賔曰英雄不並立冝早圗之勒於是開宴請弥弥將行嵩請諫曰石公卑甚言甘不可信也願公勿徃自守保固恐有專諸孫峻之祸及耳弥曰石勒一竪子耳奚能爲也不聽遂入酒酣遇害又曰裴元略事僞􅁗符堅爲金部郎中堅常以珠璣竒異弥飾不可勝計以朝羣臣元略諫曰周卑宫室慶垂八百始皇窮極嗣不及孫此万古所以傳載也}
  - {type: page-break, offset: 3112, content: '', id: KR3k0012_SBCK_453-8a}
  - {type: variant, offset: 3112, length: 0, content: '', WYG: 縛先主曰卿何以知之雍對曰彼有淫具與欲醸者同先主大笑而原欲釀者雍之滑稽凡此類又曰黄權字公衡州牧劉璋召為主簿時别駕張松建議宜迎先主伐張魯權諫曰左将軍有驍名今欲以部曲遇之則不滿其心欲以賔禮待則一國不容二君客若有泰山之安則主有累卵之危耳但閒境以待河清璋不聴又曰張松說劉璋交通先主璋從之遣法正請先主璋從事廣漢王累自懸于州門以諫璋一無所納勅所在供奉先主入境如歸晉書曰何尚之𫝊時造𤣥武湖上欲扵湖中立方丈蓬萊瀛洲三神山尚之固諫乃止時又造華林園並盛暑欲興工尚之又諫宜加休息又曰續咸偽趙石勒将遷都扵鄴咸固諫勒怒曰不斬此老臣朕宫不得遷也勅御史收之中書令徐光轅極諫勒乃悟停作賜咸絹百疋又曰孫嵩為王彌長史彌與石勒常惡之乃請計于右侯張賔賔曰英雄不並立宜早圖之勒于是開宴請彌将行嵩諫曰石公卑甚言甘不可信也願公勿往自守保固恐有專諸孫峻之禍及耳彌曰石勒一豎子耳奚能為也不聴遂入酒酣遇害又曰裴元畧仕偽秦苻堅為金部郎中堅常以珠璣竒異珍飾不可勝計以示朝臣元畧諫曰周卑宫室慶埀八百始皇窮極嗣不及孫此萬古所以傳載也}
