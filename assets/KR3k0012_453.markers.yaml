  - {type: variant, offset: 2840, length: 0, content: '', SBCK: 死魏志曰辛毗字佐治潁川人帝踐祚爲侍中帝欲徙兾州士家十萬民實河南時連蝗民飢羣司以爲不可而帝意甚盛毗與朝臣俱求見帝知其欲諌作色以見之皆莫敢言毗曰陛下徙士家其計安出帝曰卿謂我徙之非耶毗曰誠以爲非也帝曰吾不與卿共議也毗曰陛下以臣不肖置之左右厠之謀議之官安得不與臣議耶臣所言非私也乃社稷之慮也帝不荅起入內毗隨而引其􅅂帝遂􅁬衣而還良乆乃出曰佐治卿持我何太急耶毗曰今徙旣失民心又無以食也帝遂徙其半甞從帝射雉帝曰射雉樂哉毗曰於陛下甚樂而於羣下甚苦帝黙然爲之希出又曰太祖討張魯東還時有將軍許遊擁部曲不附太祖而有慢言太祖怒先欲討之羣臣多諌太祖横刀於􅂰作色不聽繆襲入欲諌太祖逆之曰吾計以定卿勿復言襲曰􅀂殿下計是耶目方助殿下成之􅀂殿下計非耶雖成冝敗之殿下逆臣令勿言何待下之不闡乎太祖曰許遊慢吾何言可致乎襲曰臣聞千石之弩不爲鼷䑕發機萬鈞之鍾不以橦起音今區區之許遊何足以勞神哉太祖曰善遂厚撫遊遊即歸服又曰賈詡字文和文帝時爲}
