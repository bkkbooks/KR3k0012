  - {type: variant, offset: 3105, length: 0, content: '', SBCK: 猶隨時不妨農務况乃作無益之物黃龍鳯皇九龍承露盤玉山淵池也此皆聖明之所興其功叅倍於殿舎三公九卿侍中尚書天下至德皆知非道而不敢言者以陛下春秋方剛心畏雷霆臣今知言出必死而臣自比於牛一毛生旣無益死亦何損發筆流涕心與丗辭臣有八子臣死之後累陛下矣將奏沭浴旣通帝曰董尋不畏死耶主者奏收尋有詔勿問吴志曰張昭少子休字叔嗣從中庶子轉爲右弼都尉孫權嘗遊獵逮暮乃歸休上䟽諌}
