  - {type: variant, offset: 2848, length: 2, content: 忠諫, SBCK: 顯至尊務戒慎也近日車駕及昏而反非萬乗之至愼也又曰文帝踐祚以髙柔爲治書侍御史時人間數有誹謗祅言帝疾之有祅言輙殺而賞告者柔上疏曰冝除祅謗賞告之法帝乃下詔敢以誹謗相告者以所告罪罪之於是遂絶又曰太祖置校事盧洪趙逹等使察羣下髙柔諌曰今置校書旣非君上信下之指又逹等數以憎愛擅作威福冝撿治之後姦利發太祖殺之以謝於柔又曰太祖征并州留崔琰􅀓文帝於鄴太子仍出田獵變服易乗志存驅逐琰書諌曰今􅀖國殄悴惠康未洽唯太子燔翳損以塞衆望不令老臣}
  - {type: page-break, offset: 2848, content: '', id: KR3k0012_SBCK_453-4a}
  - {type: variant, offset: 2848, length: 1, content: 忠, WYG: 顯至尊務戒慎也近日車駕及昏而反非萬乘之至慎也又曰文帝踐祚以髙柔為治書侍御史時人間數有誹謗妖言帝疾之有妖言輙殺而賞告者柔上疏曰宜除妖謗賞告之法帝下詔敢以誹謗相告者以所告罪罪之扵是遂絶又曰太祖置校事盧洪趙逹等使察羣下髙柔}
