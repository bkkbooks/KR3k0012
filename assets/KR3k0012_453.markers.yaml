  - {type: variant, offset: 2840, length: 0, content: '', WYG: 死魏志曰辛毗字佐治潁川人帝踐祚為侍中帝欲徙冀州士家十萬民實河南時連蝗民飢羣司以為不可而帝意甚盛毗與朝臣俱求見帝知其欲諫作色以見之皆莫敢言毗曰陛下徙士家其計安出帝曰卿謂我徙之非耶毗曰誠以為非也帝曰吾不與卿共議也毗曰陛下以臣不肖置之左右厠之謀議之官安得不與臣議耶臣所云非私也乃社稷之慮也帝不答起入内毗隨而引其裾帝遂奮衣而還良乆乃出曰佐治卿持我何太急耶毘曰今徙既失民心又無以食也帝遂徙其半嘗從帝射雉帝曰射雉樂哉毗曰扵陛下甚樂而扵羣下甚苦帝黙然為之希出又曰太祖討張魯東還時有将軍許逰擁部曲不附太祖而有慢言太祖怒先欲討之群臣多諫太祖横刀扵膝作色不聴繆襲入欲諫太祖逆謂之曰吾計已定卿勿復言襲曰若殿下計是耶方助殿下成之若殿下計非耶雖成宜敗之殿下逆臣令勿言何待下之不閎乎太祖曰許逰慢吾何言可赦乎襲曰臣聞千石之弩不為鼷䑕發機萬鈞之鐘不以挺撞起音今區區之許遊何足以勞神哉太祖曰善遂厚撫遊遊即歸服又曰賈詡字文和文帝時為}
