  - {type: variant, offset: 3109, length: 0, content: '', WYG: 止權大怒牽晃入殿杖一百又曰孫權任信校事吕壹壹性苛􅆭用法深刻太子登数諫權不納後壹姦罪發露權引咎責躬又曰孫權既為吴王歡宴之末自起行酒虞翻伏地佯醉不持權去翻起坐權扵是大怒手劔欲擊之侍坐者莫不惶遽唯大司農劉基起抱權諫曰大王以三爵後殺善士雖翻有罪天下孰知之權曰曹孟徳尚殺孔文舉孤扵虞翻何有哉基曰孟徳輕害士人天下非之今大王躬行徳義欲與尭舜比隆何自喻扵彼乎翻得免權因勅左右自今酒後言殺皆不得殺又曰張紘字子綱廣陵人避難江東委質扵孫策遣奉章詣許昌曹公聞策薨欲伐吴紘諫曰以為乘人之喪既非古義若有不克棄好成讎不如厚禮曹公從之紘歸吳後為長史權率輕騎将赴敵紘諫曰兵者凶器戰者危事麾下多强暴之勇三軍之衆莫不寒心權納而止又曰吕蒙時為護軍權将欲北取徐州以廣其地蒙諫曰不可今曹操逺在河北新破二袁撫集幽冀未暇東顧今徐州守將惡足言也往必克之然地勢陸通四面受敵今日得之明日還失舉全吳之衆未足守也不如取荆州西據荆州則利盡長江此上流之勢扵國之便十徐州也倚重西門國之固也權甚然之興師遂平荆州又曰華覈字永先吴人上疏諫皓曰臣聞之主所求扵民者二民之所望扵主者三二謂求其為勞己也求其為己死也三謂飢者能食之勞者能息之功者能賞之今民以致其三事而主失其三求己備民之望未報今百工作無用之器婦人為綺靡之飾且美貌者不華彩以崇好艷姿者不待文綺以致愛若極粉黛窮盛服未必無醜婦廢華彩文繡未必無美貌也皓終不納後以微譴免数年而卒又曰韋曜字𢎞嗣吴人本名昭避晉武諱改之孫皓立曜以直諫非一漸見責怒皓每饗宴以七升為限小户雖不入口並澆灌取盡曜遂見逼皓輙以韋曜與華覈薛瑩撰吴書皓欲以父和作帝紀曜以和不登帝位宜作傳曜遂被誅又曰賀邵字興伯孫皓時為中書令領太子太傅皓凶暴驕矜邵上疏諫曰陛下媟近寵媚之臣日聞順}
