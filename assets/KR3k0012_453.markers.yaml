  - {type: variant, offset: 3109, length: 0, content: '', SBCK: 止權大怒牽晃入殿杖一百又曰孫權任信校事吕壹壹性苛􅃤用法深刻太子登數諫權不納後壹姦罪發露權引咎責躬又曰孫權旣爲吴王歡宴之末自起行酒虞翻伏地陽醉不持權去翻起坐權於是大怒手劒欲擊之侍坐者莫不惶遽唯大司農劉基起抱權諫曰大王以三爵後殺善士雖翻有罪天下熟知之權曰曹孟德尚殺孔文舉􅀌於虞翻何有哉基曰孟德輕害士人天下非之今大王躬行德義欲與堯舜比隆何自喻於彼乎翻由是得免權因勑左右自今酒後言殺皆不得殺又曰張紘字子綱廣陵人避難江東委質於孫策遣奉章詣許昌曹公聞䇿薨欲伐呉紘諫曰以爲乗人之喪旣非古義􅀂有不克弃好成讎不如厚禮曹公從之紘歸呉後爲長史權率輕􅀐將赴敵紘諫曰兵者凶器戰者危事麾下多強暴之勇三軍之衆莫不寒心權納而止又曰吕蒙時爲護軍權將欲北取徐州以廣其地蒙諫曰不可今曹操逺在河北新破二􅀽撫集幽兾未暇東顧今徐州將守惡足言也徃必尅之然地􅀔陸通四面受敵今日得之明日還失舉全呉之衆未足守也不如取關羽西據荆州則利盡長江此上流之􅀔於國之便十徐州也則重關西門國之固也權甚然之興師遂擒􅀜羽而平荆州又曰華覈字永先吴人上䟽諫皓曰臣聞之主所求於民者二民之所望於主者三二謂求其爲巳勞也求其爲巳死者也三謂飢者能食之勞者能息之功者能賞之今民以致其二事而主失其三主二求巳備民之三望未報今百工作無用之器婦人爲綺靡之飾且美貌者不待華彩以崇好艷姿者不待文綺以致愛􅀂極粉黛窮盛服未必無醜婦廢華彩文繡未必無美貌也皓終不納後以懲譴免數年而卒又曰韋曜字弘嗣呉人夲名昭避晉文諱改之孫皓立曜以直諫非一漸見責怒皓毎饗宴以七升爲限小户雖不入口並澆灌取盡曜遂見逼皓輙以爲曜與華覈薜瑩㯢呉書皓欲以父和作帝紀曜以和不登帝位冝作傳曜遂􅀍誅又曰賀邵字興伯孫皓時爲中書令領太子太傅皓凶暴驕矜邵上䟽諫曰陛下媟近寵媚之臣日聞順}
