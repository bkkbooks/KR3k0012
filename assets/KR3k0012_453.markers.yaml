  - {type: punctuation, offset: 3128, content: 「, id: KR3k0012_CHANT_453-bkkpn781}
  - {type: variant, offset: 3128, length: 385, content: 桓帝時有上書宜改鑄大錢劉陶上議曰伏讀鑄錢之詔平輕重之議蓋以當今之憂不在於貨在於民飢竊見比年以來良苗盡於蝗螟之口杼柚空於公私之求野無青草室如懸磬所急朝夕之飡所患靡監之事豈謂錢之銖兩輕重哉就使當今沙礫化為黃金瓦石變為和玉使百姓渴無飲飢無食雖黃羲之純德唐虞之文明猶不能以保蕭牆之內也蓋人民可百年無貨不可一朝有飢故食為至急也又曰劉陵字孟高豫章人為侍中車駕出祠南郊陵參乘上起早升輿眠陵跪曰陛下為萬乘之主升輿宜正立雖早嚴欲寢不當上為天地靈祇下為百姓觀覩上愧色曰敬受侍中斯言以後為式更自整頓謝承後漢書曰延篤字叔固孝桓皇帝拜侍中自在機密常見進納上數問政事得失以經義古典默諫帷幄言不宣外又曰李膺等黨事下獄陳蕃上䟽極諫曰臣聞聖明之君委心輔佐亡國之主諱聞直辭故湯武雖聖而興於伊呂桀紂迷惑亡在失人由此言之君為元首臣為股肱同體相須共成美惡者伏見前司隸校尉李膺太僕社密太尉掾范滂等正身無點死心社稷以, SBCK: 非卿}
  - {type: variant, offset: 3128, length: 3, content: 桓帝時, WYG: 游子逺仕劉曜西羗羯叛亂舉兵四十餘萬三輔大震曜患之欲大興師伐之子逺諫曰足下納臣愚計不勞大軍可一月而定矣且羗夷之叛也非}
