  - {type: variant, offset: 230, length: 1600, content: 為漢王王巴蜀沛公怒不許蕭何諫曰雖漢中之惡猶不愈於死乎王曰何為乃死也何曰今眾不如百戰百敗不死何俟周書曰天與不取反受其咎天漢其稱美乎夫能屈一人之下而申於萬乘之上者湯武是也臣願大王王漢中養其人致英傑收巴蜀定三秦天下之事可圖也漢王善之遂之國又曰周昌沛國人高祖時為御史大夫高祖欲廢呂后所生太子立戚夫人之子如意為太子昌諫之曰陛下若廢嫡立庶臣不敢奉詔高祖乃止後太子立是為惠帝拜昌為太傅又曰薛廣德為御史大夫元帝永光中行幸不已廣德乃上書諫曰臣竊見關東人民流離陛下日撞亡秦之鍾聽鄭衛之樂馳騁干戈恣獵于田野不恤百姓臣誠悼之今士卒暴露從官勞倦願陛下亟返宮與天下同憂樂上即日還宮又帝欲酎祭宗廟出便門橋欲御樓舡廣德乃當車免冠頓首諫曰陛下宜從橋上帝曰大夫冠廣德曰陛下不聽臣臣自刎頸以血污車輪陛下不得入宗廟矣帝不悅先驅光祿大夫張猛前曰臣聞主聖臣直乘舡危從橋安聖主不涉危不履虛御史大夫言可用上曰曉人不當如此乃從橋又曰劉向為宗正時西域都護甘延壽副校尉陳湯矯制發胡漢兵四萬攻郅支單于斬首傳送京師名王已下千五百人一十八級生虜百四十五人降虜千餘人上議其功丞相匡衡石顯等皆以延壽與湯擅興師矯制幸得不誅不宜加爵土上欲從之向乃上䟽極諫文多不載於是上乃赦湯與延壽等矯制罪封延壽為義城侯長水校尉湯為關內侯食實封二百戶又曰貢禹字少翁瑯琊人累為諫議大夫時歲不登郡國多困禹乃進諫曰今關東諸道禾稼不稔江淮浙右人民流離父子不保願陛下蠲賦稅常貢減太官之食去角觝諸戲廢不急務役速下詔命以蘇疲人上悅之遷禹為御史大夫禹自治憲司數陳得失又言官家奴婢十餘萬人稅良民以給之率脂膏以滑之歲費鉅萬於國無益宜請免為庶人從之又奏武帝始臨天下犯法者贖罪入穀者補吏是以官私俱亂盜賊並起玉石混雜真偽不分今欲興至理致太平宜除贖法以進賢良則天下治矣上大悅行之賜禹錢百萬又曰劉輔為諫議大夫成帝欲立趙婕妤為后輔䟽曰今陛下觸情縱慾傾於卑賤之女欲以母天下豈不畏于天乎上怒使掖庭中縛之谷永等上書訟之上乃減死又曰谷永時成帝好微行不止永乃諫曰陛下棄萬乘之至尊樂家人之賤事厭高美之尊號好疋夫之卑業使拱衛之臣執干戈守其空宮使公鄉百寮不知陛下所在忽有變將奈社稷何帝歛容而止又曰耿育關內侯陳湯被讒奪爵黜之燉煌郡育上書諍曰陳湯昔年討絕域不羇之君雪國家累年之恥自古及今安有比哉今被讒黜老棄燉煌復為遺虜所笑誠可痛哉至今奉使外夷者未嘗不陳以郅支之誅夷以揚漢國之威稜豈可以授人之功棄人之身開倖門路快讒佞者乎帝遂詔湯還京師復舊爵又曰鄭崇字子游高密大族哀帝時為尚書僕射數見諫諍陳得失每奏事嘗曳革履上笑曰我識鄭尚書履聲崇每以董賢貴寵過度陳諫由是得罪上因崇曰君門如市何乃欲禁切主上用人乎崇曰臣門如市臣心如水矣又曰朱雲成帝封諸舅王鳳等五人同日為侯傾壞朝政京兆尹王章以直言見誅安昌侯張禹以依違任事雲為槐里令頗御之乃諫曰今朝廷大臣上不能匡君下不能益人皆尸祿耳不可以事君臣請尚方劍斷佞臣頭一人勵其餘上問曰誰也雲曰張禹上大怒曰小臣居下訕上庭辱師傅罪死不赦御史將下雲攀折殿檻大呼曰臣願得從龍逢比干遊於地下免事桀紂之主死不恨矣將軍辛慶忌叩頭流血極諫得免所司理檻帝曰勿理以旌直臣又曰王宏為侍中哀帝寵董賢為大司馬衛將軍事是時賢年二十二上置酒與賢父親屬宴飲上放酒從容視賢而笑曰吾欲法堯禪舜何如時宏在坐進諫曰昔周成戲以桐葉封弟叔虞於晉周公入曰天子無戲言耳今天下乃高帝之天下非陛下之天下也陛下以藩王入奉嗣孝成皇帝後當承宗廟傳子孫於無窮豈得以戲言將高祖社稷輸人耶上默然不悅終以失旨貶為郎署又曰郅都景帝時為中郎敢直諫面折大臣於朝嘗從上入上林賈姬在廁野彘入廁上目郅都不行上欲自持兵救賈姬都伏上前曰一姬死更一姬進天下所少寧賈姬乎陛下縱自輕奈宗廟太后何上還彘亦不傷賈姬太后聞嘉之賜都金百斤上亦賜金百斤又曰梅福上書諫成帝曰天下民有上書求見者輒使詣尚書問其所言諫可採取者秩以升外斗之祿賜以一束之帛若此天下之士發憤懣吐忠言嘉謀日聞於上天下條貫國家表裏爛然可睹矣又曰哀帝時杜欽, SBCK: ''}
