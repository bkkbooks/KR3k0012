  - {type: variant, offset: 2842, length: 5, content: 掾杜眾傷雲, SBCK: 將而臨淄侯植才名方盛有奪宗之議文帝使人問詡自固之術詡曰願將軍恢崇德度躬素士之業朝夕孜孜不違子道如此而巳文帝從之深自砥礪太祖又當屏除問詡詡嘿然不對太祖曰與卿言而不荅何也詡曰思􅀽夲􅀄劉景􅂛父子也太祖大􅀏於是太子遂定又曰文帝頻岀遊獵或昏夜還宮王朗上䟽曰夫帝王將行則設兵而後登輿清道而後奉引所}
  - {type: variant, offset: 2842, length: 5, content: 掾杜眾傷雲, WYG: 将而臨淄侯植才名方盛有奪宗之議文帝使人問詡自固之術詡曰願将軍恢崇徳度躬素士之業朝夕孜孜不違子道如此而已文帝從之深自砥礪太祖又嘗屏除問詡詡嘿然不對太祖曰與卿言而不荅何也詡曰思袁本初劉景升父子也太祖大笑扵是太子遂定又曰文帝頻出遊獵或昏夜還宫王朗上疏曰夫帝王将行則設兵而後登輿清道而後奉引所}
