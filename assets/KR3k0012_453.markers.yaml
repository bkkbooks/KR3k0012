  - {type: variant, offset: 2852, length: 0, content: '', WYG: 扵天又曰髙堂隆寝疾口占上疏曰臣寝疾病有増無損常懼忠欵不昭時王莫不思紹尭舜而蹈桀紂之跡願陛下少垂省覽又曰明帝即位辛毗為廷尉帝欲平北邙令登臺觀則見孟津毗諫曰天地之性髙髙下下今而反之既非其禮若九河湓溢洪水為害而邱陵皆移将何以禦之帝乃止又曰明帝時百姓凋匱而役務方殷衛凱上疏曰順㫖者愛所由來逆意者惡所從至故人臣皆争順㫖而避逆意非破家為國殺身成君者誰能犯顔色觸忌諱建一言開一說哉又曰荀彧傳曰時曹公欲滅陶謙乘勝欲取徐州而後定吕布彧諫曰昔髙祖保關中光武據河内深根固本以制天下進可以勝敵退可以自守雖師北身遁者数矣而終復振成大業也今将軍本以兖州首事故能平定山東此實天下之要地而将軍之關河也若不先定根本将何以寄諸跡乎宜且急收熟麥以實軍資吕布不足慮也今捨此而東未見其便多留兵則不可勝敵少留兵則不可固守且吕布乘虛冦暴震動人心縦保数城非已所有操乃從其言遂破吕布西平兖州魏略曰蘇則為侍中文帝時人多飢困而軍数出又兼治宫室則数面諫由此上頗不恱其後出以為河東相又曰時太祖欲征吴而大雨霖三軍多不願行太祖知其然恐外諫者教曰今孤戒嚴未知所之有諫者死賈逵受教謂其同寮三主簿曰今實不可出而教如此不可諫也乃建諫草以示三人三人不獲已皆署名疏入太祖怒收逵等當送獄教取造意者逵即言我造意遂走詣獄獄吏以逵主簿也不即著械逵謂獄吏曰促械我尊者且疑我在近職求緩扵卿既而復職又曰明帝徙長安鐘簴起土山等司徒軍議掾河東董尋}
