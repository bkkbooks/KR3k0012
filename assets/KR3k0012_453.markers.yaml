  - {type: variant, offset: 2854, length: 245, content: 願與雲同日死詔下廷尉皆死獄中又曰陳琳為丞相府主簿靈帝時朝綱失序政在官官尚書何進謀於袁紹曰昔趙鞅興晉陽之甲誅君側之惡今閽豎弄權可謂蔓草也盍萌而薙之琳諫曰易稱即鹿無虞諺有掩日捕雀夫微物尚不可欺以得志況國之大事其可以詐乎今明公總皇威權兵要龍驤虎步高下在心此猶鼓洪鑪而燎毛髮耳夫違經合道天人所慎而反委釋利器更徵外助大兵藂會強者為雄所謂倒持干戈授人以柄功必無成為禍階矣進不聽遂召前將軍太原守董卓卓未至卒為禍亂而進亦為宦官所殺又曰銚期重於信義在朝廷憂國憂主其有不得於心犯顏諫爭帝嘗輕與期門近出期頓首車前, SBCK: ''}
