  - {type: variant, offset: 3299, length: 0, content: '', WYG: 時孝宗欲扵前園修立池苑逌諫以強賊未滅宜務軍􅍯當存儉約以率群下上即納之徐廣晉記曰成帝有乳母經營艱苦欲假其名號顧和諫曰保母奉祐聖躬不遺其勲第舍供給巳為隆厚若假以名號非令典也書而不法後嗣何觀帝乃止臧榮緒晉書曰衛瓘字伯玉每議及經國屡形扵言色晉祖恐大臣有諫嘗因宴飲瓘醉手撫御床曰此坐可惜宋書曰世祖逰幸無度太后六宫常乘副}
