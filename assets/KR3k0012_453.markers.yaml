  - {type: variant, offset: 2852, length: 0, content: '', SBCK: 於天又曰髙堂隆寢疾口占上䟽曰臣寢疾病有憎無損常懼忠欵不昭時王莫不思紹堯舜而蹈桀紂之跡願陛下少垂省覽又曰明帝即位辛毗爲廷尉帝欲平北邙令登臺觀則見孟津毗諌曰天地之性髙髙下下今而反之旣非其理􅀂九河湓溢洪水爲害而丘陵皆移將何以禦之帝乃止又曰明帝時百姓凋匱而役務方殷衛覬上䟽曰順止者愛所由來逆意者惡所從至故人臣皆爭順指而避逆意非破家爲國殺身成君者誰能犯顔色觸忌諱建一言開一􅀃哉又曰荀彧傳曰時曹公欲㓕陶謙乗勝欲取徐州而後定吕布彧諌曰昔髙祖保關中光武據河内深根固夲以制天下進可以勝敵退可以自守雖師北身遁者數矣而終復振成大業也今將軍夲以兖州首事故能平定山東此實天下之要地而將軍之􅀜河也􅀂不先定根夲將何以􅀉諸乎冝且急收熟麥以實軍資吕布不足慮也今捨此而東未見其便多留兵則不可勝敵少留兵則不可固守且吕布乗虚㓂暴震動人心縱保數城非巳所有操乃從其言遂破吕布而平兖州魏略曰􅂫則爲侍中文帝時人多飢困而軍數岀又兼治宫室則又數面諫由此上頗不恱其後出以爲河東相又曰時太祖欲征吴而大雨霖三軍多不願行太祖知其然恐外有諌者教曰今􅀌戒嚴未知所之有諫者死賈逵受教謂其同寮三主簿曰今實不可岀而教如此不可諫也乃建諫草以示三人三人不獲皆署名入白事太祖怒收逵等當送獄教取造意者逵即言我造意遂走詣獄獄吏以逵主簿也不即着械逵謂獄吏曰促械我尊者且疑我在近職求緩於卿旣而復職又曰明帝徙長安鍾􅙇起土山寺司徒軍議􅁺河東董尋}
