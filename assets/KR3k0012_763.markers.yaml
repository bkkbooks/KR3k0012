  - {type: variant, offset: 20, length: 2, content: 間或, WYG: 所常輒舉目之繡及將帥莫敢仰視晉書曰魏舒常適野王主人妻夜産俄而聞車馬之聲相問曰男也女也曰男書之十五以兵死復問宿者誰曰魏公舒後十五載詣主人問所生兒父母曰因條桑為斧傷而死舒自知為公晉咸和起居注曰有司奏魏氏故事正旦賀公卿上殿虎賁六人隨上以斧柄挂衣裙上令宜依舊為儀注}
