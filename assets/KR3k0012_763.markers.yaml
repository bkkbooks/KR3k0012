  - {type: variant, offset: 178, length: 2, content: 七尺, krp: 安受經廷尉决事曰廷尉髙文惠上民傳晦詣民籍牛塲上盗黍爲牛所覺以斧擲折晦脚物故依律牛應弃市監棗超議晦旣夜盗牛本無殺意冝减死一等六韜曰操刀不割失利之期執斧不伐賊人將來繁葉不去將爲斧柯列子曰人有亡鈇者意其隣人子視其行歩竊鈇也顔色竊缺也言語竊鈇也動作態度無爲而不竊鈇也俄而於其谷而得其鈇他日復見其隣子之動作態度無似竊鈇矣孟子曰斧斤以時入山林材木不可勝用也荀卿子曰林木茂而斧斤至焉吕氏春秋曰孔甲田于東陽萯音倍山天大風晦孔甲迷惑入于民室主人方乳乳産也或曰后來是良日也是子必大吉或曰不勝之是子必大殃后取其子以歸曰以爲余子誰敢殃之子長成莫動析音老斧破斬其足遂爲太者以其無足遂使守門淮南子曰巨斧擊桐薪不待利時日而後破之又曰古之遣將尹親操斧持頭授將軍柄曰閫以外者將軍裁之說苑曰雍門周說孟甞君以秦楚之強而報於弱薛譬猶蕭斧而伐朝􅌲也玄晏春秋曰隣人亡斧及雞意予竊之居三日雞還斧又自得隣人大愧志林曰齊斧齋當爲齋凡師岀必齋戒入廟受斧故云齋也抱朴子曰介象燒斧而立其上乆不知熱諸葛亮教曰前後所作斧都不可用前伐鹿角壞刀斧千餘枚頼賊已走間自令作部刀斧數百枚用之百餘日𥘉無壞者爾乃知彼主者無意冝收治之此非小事也若臨敵敗人軍事矣鋸釋名曰鋸倨也其體直所截應倨勾之正也說文曰鋸槍唐也古史考曰孟莊子作鋸史記曰公孫鞅之事孝公也設刀鋸以禁姧邪信賞罰以致理後漢書曰獻帝欲復肉刑孔融議曰雖忠如鬻拳信如楚和智如孫臏一離刀鋸没丗不齒吴志曰孫皓愛妾使人至市賊奪百姓財物同市陳聲䋲之以法皓大恕假他事燒鋸斷聲頭王隱晉書曰趙王倫欲廢賈后而門錀在侍中處所部司馬多木作有利鋸至期倫乃命三部司馬以銅鋸截關開門晉書曰胡母輔之字彦國少擅髙名王澄常與人書曰彦國吐佳言如鋸木屑霏霏不絶誠爲後進領䄂也又中興書曰符徤凶滛暴虐常露刀張弓椎鉗鋸鑿殺人之具備置左右宋書曰後廢帝名昱𥘉在東宫惰業好嬉師主不能禁及嗣位漸自放恣晨岀暮歸從者並執鋌矛加以虐刑鍼椎鑿鋸之徒不離左右}
