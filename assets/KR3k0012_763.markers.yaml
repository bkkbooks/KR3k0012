  - {type: variant, offset: 2932, length: 7, content: 云天旁轉如推磨, SBCK: 婦方産夜有叩門者湏􅁷門裏言有客堂下有人不可進曰從後徃湏􅁷還留者問曰何等名可與幾歳應以何死荅曰男也名奴得十五歳當以兵死仲舉告其家父母不使執寸刃年十五有置鑿於梁者其末岀奴以長木鉤取鑿墮䧟腦}
  - {type: variant, offset: 2932, length: 7, content: 云天旁轉如推磨, WYG: 婦方産夜有叩門者須㬰門内有言客堂下有人不可進曰從後往須㬰還留者問曰何等名可與㡬嵗應以何死荅曰男也名奴得十五歲當以兵死仲舉告其家父母不使執寸刃年十五有置鑿於梁上者其末出奴以長木鈎取鑿堕䧟腦}
