  body:
  - {type: variant, offset: 3, length: 3, content: 七瓢方, SBCK: 八斧鋸椎鑿斧釋名曰斧甫始也凡將制器始以斧伐木已乃制之也易曰得其資斧我心不快斧所以破除荆􅁄以安其客舎者也不得其位不獲平之地雖得資斧其心不快龍魚河圖曰斧神名狂章周書曰神農作陶治斧破木爲耜鋤耨以墾草莽然後五􅂖興詩曰析薪如之何匪斧不剋取妻如之何匪媒不得又曰􅅙月條桑取彼斧斨音牆以伐逺揚又曰破斧羙周公也旣破我斧又缺我斨周禮曰大䘮及窆執斧以莅匠師匠師主豊碑之士執斧以師之使戒其士禮曰禮諸侯賜鈇音夫􅃏然後誅又曰天子􅀒斧依南郷而立斧依爲斧文屏風於户牖之間傳曰楚子執齊慶封將戮之􅀒之斧􅃏以徇於諸侯使}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_763-1b}
  - {type: variant, offset: 3, length: 3, content: 七瓢方, WYG: 八斧鋸椎鑿斧釋名曰斧甫始也凡将制器始以斧伐木已乃制之也易曰得其資斧我心不快龍魚河圖曰斧神名狂章周語曰神農作陶冶斧破木為耜鋤耨以墾草莽然後五􅂖興詩曰析薪如之何匪斧不克取妻如之何匪媒不得又曰蠶月條桑取彼斧斨音牆以伐逺揚又曰破斧美周公也旣破我斧又缺我斨周禮曰大喪及窆執斧以涖匠師匠師主豐碑之士執斧以帥之使戒其士禮曰禮諸侯賜鈇鉞然後誅又曰天子負斧依南鄉而立傳曰楚子執齊慶封將戮之負之斧鉞以狥於諸侯使}
