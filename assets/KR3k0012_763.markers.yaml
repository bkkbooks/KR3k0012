  - {type: variant, offset: 381, length: 251, content: 以巡守宗祝以前焉杜子春云勺謂酒樽中勺也鄭司農云鼻謂勺龍頭鼻也衡謂勺柄龍頭也鄭玄謂勺鼻流凡流智為龍口也三璋之勺形如玉瓚天子巡守有事山川則用灌焉於大山川則用大璋中山川用中璋於小山川用邊璋也又曰梓人為飲器勺一升勺尊升也禮曰犧恩歌切尊䟽布鼏音覔樿之演切勺此以素為貴也鄭玄曰樿木白理也又曰勺夏后氏以龍勺殷以䟽勺周以蒲勺鄭玄曰龍龍頭也䟽道刻其頭也蒲合蒲如鳧頭也漢書曰霍顯之謀行於柸勺東宮舊事曰漆注八合鴨頭勺四論衡曰司南之勺投之於地其柄指南語林曰諸阮以大盆盛酒木勺數枚也束晳貧家賦曰舉短柄之掘勺豊三禮圖曰射為罰爵之豊, SBCK: ''}
