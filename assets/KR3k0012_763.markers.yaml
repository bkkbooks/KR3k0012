  - {type: variant, offset: 1647, length: 165, content: 解門以為薪塞井以為臼雖用小而所喪大矣桓譚新論曰伏羲制杵臼之利後世加巧因借身以踐碓而利十倍又曰復設機關用驢羸牛馬及役水而舂其利百倍論衡曰舂者以杵擣臼杵臼鼓動地動地臨池水河水震蕩夫臼杵木也水與木土三者殊類而相應首相叩動其勢然也風俗通曰秦留燕太子丹天為雨粟廚中杵生肉是不然也世本曰雍父作舂杵臼宋志曰雍父黃帝名也湘州記曰棗陽縣有蔡倫宅宅西, SBCK: 軍必}
