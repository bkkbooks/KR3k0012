  - {type: variant, offset: 2063, length: 333, content: 細腰舍中何以有人氣須臾復有一人高冠青衣次又高冠白衣問並如前將曙文下堂如向法呼細腰問曰黃衣者誰曰金也在堂西壁下青衣者誰曰錢也在堂前井西五步白衣誰曰銀也在堂東北任下汝誰也曰我也在竈下至明文按次掘之得金銀各五百斤錢千餘萬取杵焚之宅遂清安魏武上獻帝表曰臣袒騰有順帝賜器今上藥杵臼一具堪爾雅曰堪謂之榩郭業曰堪木質也榩音虔廣雅曰枕質堪也東宮舊事曰太子納妃有石砧一枚又擣衣杵十杵荊州記曰柹歸縣有屈原宅女嬃音須廟擣衣石猶存漢水記曰有女郎擣衣砧也古樂府詩曰藁砧今何在山上復有山藁砧謂失也碓廣雅曰穭碓也穭丁歷切方言曰碓機陳魏宋楚自關而東謂之柩魏略曰司農王思弘作水碓免歸田里晉書曰魏舒遲鈍質朴不為鄉親所重從叔父吏部郎衡有當世名猶不知之使守水碓王隱晉書曰石崇有水碓三十區又曰劉頌為河內太守有, SBCK: 桓}
