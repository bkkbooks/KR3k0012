  - {type: variant, offset: 170, length: 3, content: 漆卺爵, SBCK: 王莽夢大夏殿前五銅人語莽惡之斧斫開銅人腹東陽記曰􅀳中朝時有民王質者入山伐木至石室中見童子數人彈琴而歌因留跂斧柯而聽之童子以物與之􅃺如􅀥核質含之便不復飢也童子曰汝來巳乆冝去質承聲起斧柯漼然爛盡旣歸去家巳數十年列女傳曰丁仲謀妻氏共夫至交趾夫爲賊所殺妻舩上得一斧舉以破賊列仙傳曰赤斧手中常有赤斧録異傳曰陳丗母黄亡後還家但聞聲丗忽亡斧黄言問家奴福盗之幽明録曰文翁常欲斷大樹欲斷處去地一丈八尺翁先祝曰吾􅀂得}
