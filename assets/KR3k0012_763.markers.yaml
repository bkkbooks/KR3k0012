  - {type: variant, offset: 15, length: 3, content: 陳楚宋, SBCK: 應劭曰齊利也亡其利斧言無以復斬断者東觀漢記曰􅀕遵襲略陽遣護軍王忠皆持刀斧伐樹開道又曰蔣翊字元卿後母憎之伺翊寢操斧斫之值詡如厠謝承後漢書曰㑹稽戴就字景成爲都曹􅁺太守爲州所奏就見伏考燒斧以着腋下就罵獄卒此無火氣何不熟燒}
  - {type: page-break, offset: 15, content: '', id: KR3k0012_SBCK_763-2a}
