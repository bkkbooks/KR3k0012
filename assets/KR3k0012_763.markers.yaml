  - {type: variant, offset: 633, length: 929, content: 人形也豊國名也坐酒亡國戴盂戒酒說文曰豊俎豆貴豊厚也一曰鄉飲酒有豊侯者儀禮曰司射適堂西命弟子設豊將飲不勝設豊以承其爵豊形蓋似豆卑而大之又曰公尊瓦泰兩有豊崔駰酒箴曰豊侯沉酒荷甖負缶自戮於世圖形戒後李尤豊侯銘曰豊侯荒繆醉亂迷逸乃象其形為豊戒式後世傳之固無止說禁三禮圖曰棜長四尺廣二尺四寸深寸無足漆赤中青雲畫䔖苕華飾禁長四尺廣二尺四寸通局足高三寸漆赤中青雲畫䔖苕華飾刻鏤其足為褰帷之形儀禮曰尊於戶間兩甒音武有禁禁承尊之器名之曰禁因為酒戒也又曰尊兩壺于房戶間斯斯禁禁切地無足也禮曰天子諸侯之尊廢禁大夫士棜禁此以下為貴也廢猶去也棜斯禁也無足有似於棜或因名之小耳大夫用斯禁士用棜禁如今方案情悵局食架東宮舊事曰漆食架二食廚禮曰大夫七十而有閣閣以板為之度食物也天子之閣左達五右達五公侯伯於房中五大夫於閣三士於坫一達夾室大夫言於閣與天子同處天子二五倍諧侯也東宮舊事曰漆食廚一具酒臺周禮曰六彝皆有舟鄭司農曰舟下臺也若今時承盤也東宮舊事曰漆酒臺二金塗鐶鈿槽劉伶酒德頌曰先生方棒罌承槽御柸嗽醪杵臼易下繫辭曰斷木為杵掘地為臼臼杵之利萬民以濟蓋取諸小過王肅曰雷起起上杵之象地艮止於下臼之義書曰血流漂杵孔安國曰流而漂舂杵甚之言也一戎衣天下大定禮曰鄰有喪舂不相相送杵聲又曰暢臼以掬杵以梧所以檮鬱鬯椈柏也穀梁傳曰大夫救日擊門士擊杵舂染盛之具示有上下陰陽周易類謀曰間可倚杵鄭玄曰天地相去其間才可倚一杵也春秋繁露曰夏求雨暴杵臼於街十日漢書曰傳咸為南陽太守有猾吏大姓犯令為地臼木杵舂不中程者輒加笞箠又曰江都易王非宮人有過者或髡鉗以鈆杵舂不中程輒掠又曰楚王戊即位胥靡申公白公衣赭衣使雅舂於市東觀漢記曰公沙穆遊太學無資糧乃變服客傭為吳祐賃舂祐與語大驚遂共定交於杵臼之間後漢書曰梁鴻之妻孟光多力能舉石臼又曰馮衍娶北地任氏女為妻悍忌不得畜媵妾兒女常自探井臼王隱晉書曰賈后使小黃門孫慮徙愍懷太子於坊中不與食乃劫服杏子黑丸其夜薨或傳太子不肯服藥伺至廁以藥杵橦害之喚聲聞於外燕書曰昭武帝營新殿昌黎大棘城縣河岸崩出鐵築杵頭一千一百七十枚永樂民郭陵見之詣闕言狀詔曰經始崇殿而築具出人神允恊之應賜陵爵關外侯戰國策曰智伯攻趙襄子於晉陽臼竈生鼃於禍切又曰衛人迎新婦婦入室見曰曰徙之牖下妨往來者主人美之河圖曰千歲之後天可倚杵孟, SBCK: 鑿尸}
