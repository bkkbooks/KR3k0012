  - {type: variant, offset: 2397, length: 528, content: 王水碓三十餘區所在遏塞輒為侵害頌表上封諸民獲便宜又曰衛灌為太子少傅詔賜園曰水碓不受又曰鄧攸去石勒投李矩借水碓舂於城東晉諸公讚曰征南杜預作連機碓晉陽秋曰給陳留王碓一區幽明錄曰弘農徐儉家有一遠來客寄宿有馬一疋中夜驚跳客不安騎馬而去一物長丈餘來逐馬後客射之聞如中木聲明日尋昨路見箭著一碓柵世說曰王戎既貴且富區宅水碓洛下莫比孔融肉刑論曰賢者所制或踰聖人水碓之巧勝於斷木掘地王渾表曰洛陽百里內舊不得作水碓臣表上先帝聽臣立碓并攙得官地磨說文曰䃺莫佐切石磑也磑音五對切釋名曰磑磨也廣雅曰礱磨也方言曰磑或謂之婕即磨也錯碓切通俗文曰麤曰䃀千內刀填音䃺曰硐途棟切磨床曰摘直易切魏略曰諸葛亮為衝車圍郝昭於陳倉昭以繩繫石磨羂古犬切其衝車魏志曰管輅字公明平原人也往同村郭思家磑上有鳩食相鬭輅曰不祥思明日射鳩悞中鄰女蜀志曰許靖為許劭排擯以馬磨自給晉書曰王戎為司徒好治產業周遍天下水碓四十所鄴中記曰解飛者石虎時工人造作旃檀車左轂上置磑右轂上置碓每行十里磨麥一石舂米一斛世本曰公輸般作磑諸葛亮別傳曰孫權常饗蜀使費禕音揮停食餅索筆作麥賦恪亦請筆作磨賦異苑曰上黨侯亮之於江都城下獲一磨下有銅馬幽明錄曰廣陵有家相傳漢江都王逮之墓也常有村人行過見地有數十具磨取一具持歸暮即叩門求磨甚急明旦送著故處, SBCK: ''}
