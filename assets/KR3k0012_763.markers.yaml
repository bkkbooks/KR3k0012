  - {type: variant, offset: 12, length: 0, content: '', SBCK: 漢書曰分周爲二有逃責之臺􅀍竊鈇之言應劭曰周赦王出至路邊竊取過人又曰􅁀勝之爲直指使者衣繡持斧逐捕盗賊又曰王莽司徒王㝷􅀄發長安􅀫霸昌廐亡其黄􅃏㝷軍士所王素狂直入哭曰此經所謂䘮其齊}
  - {type: variant, offset: 12, length: 0, content: '', WYG: 漢書曰分周為二有逃責之臺被竊鈇之言應邵曰周穆王出至路邊竊取過人又曰暴勝之為直指使者衣繡持斧逐捕盜賊又曰王莽司徒王尋初發長安宿覇昌廐亡其黄鉞尋軍士房揚素狂直廼哭曰此經所謂喪其齊}
  - {type: page-break, offset: 12, content: '', id: KR3k0012_WYG_763-2b, image: WYG0899/WYG0899-0678d.png}
  - {type: variant, offset: 12, length: 0, content: '', krp: 漢書曰分周爲二有逃責之臺𬒳竊鈇之言應劭曰周赦王出至路邊竊取過人又曰暴勝之爲直指使者衣繡持斧逐捕盗賊又曰王莽司徒王㝷𥘉發長安宿霸昌廐亡其黄鉞㝷軍士所王素狂直入哭曰此經所謂䘮其齊}
  - {type: variant, offset: 13, length: 1, content: 禮, SBCK: 資斧者}
