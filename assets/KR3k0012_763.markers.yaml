  - {type: variant, offset: 174, length: 3, content: 銀鏁連, SBCK: 千石斧當着此處因擲之中所欲一丈八尺處後果爲郡賈逵別傳曰逵廟一栢樹有人竊來斫伐始投斧數下斧刃仍折於樹中七賢傳曰文黨字翁仲與人俱入山取木謂侣人曰吾欲逺學先試投斧髙木上斧當挂乃投之斧果上因之}
  - {type: variant, offset: 174, length: 3, content: 銀鏁連, WYG: 千石斧當著此處因擲之中所欲一丈八尺處後果為郡賈逵别傳曰逵廟一柏樹有人竊來斫伐投斧數下斧刃乃折於樹中七賢傳曰文黨字仲翁與人俱入山取木謂侣人曰吾欲逺學先試投斧髙木上斧當柱乃投之斧果止因之}
