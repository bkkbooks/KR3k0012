  - {type: variant, offset: 183, length: 1, content: 惠, SBCK: 禮􅀂亢鋸之柄亢舉也禮有所断割猶舉鋸之柄以断物也又曰天下好智而百姓求竭矣於是乎釿音斤鋸顓焉䋲墨殺焉椎鑿决焉管}
  - {type: variant, offset: 183, length: 4, content: 惠子謂莊, WYG: 禮若亢鋸之柄亢舉也禮有所斷割偤舉鋸之柄以㫁物也又曰天下好智而百姓永竭矣於是乎釿音斤鋸顓焉繩墨殺焉椎鑿决焉管}
  - {type: variant, offset: 183, length: 1, content: 惠, krp: 禮若亢鋸之柄亢舉也禮有所断割猶舉鋸之柄以断物也又曰天下好智而百姓求竭矣於是乎釿音斤鋸顓焉䋲墨殺焉椎鑿决焉管}
  - {type: variant, offset: 185, length: 0, content: '', SBCK: 曰軍中必有一斧一鋸尸子曰水非石之鑚繩非木之鋸列女傳曰臧文仲爲魯使齊齊拘之文仲使人遺公書恐人得之乃謬其詞曰臧我羊食我以銅魚公及大夫莫能知之乃問臧孫母母泣曰吾子拘有木治矣木治桔也臧我羊者臧善也羊者有母告妻善養母食我以銅魚銅魚其父錯錯者所以治鋸也鋸者所以治木是以知有木治擊於獄矣淮南子曰夏屋聮房公輸王爾無所措剖居綺切劂居月切削鋸然猶未能贍人主之欲也丗􅀃曰晉元皇􅀄見賀司空言及吴時孫皓燒鋸截一賀頭是誰司空未復言元皇曰燒是賀邵司空流涕曰昔者先臣遭遇無道臣創巨痛深無以上荅明詔元皇慙愧三日不出衡山記曰雞頭陂西有石室有人採藥暮􅀫其中曉見一鋸懸在壁上示有形無復䥫貫椎􅀃文曰椎擊也齊}
  - {type: page-break, offset: 185, content: '', id: KR3k0012_SBCK_763-5b}
  - {type: variant, offset: 185, length: 0, content: '', krp: 曰軍中必有一斧一鋸尸子曰水非石之鑚繩非木之鋸列女傳曰臧文仲爲魯使齊齊拘之文仲使人遺公書恐人得之乃謬其詞曰臧我羊食我以銅魚公及大夫莫能知之乃問臧孫母母泣曰吾子拘有木治矣木治桔也臧我羊者臧善也羊者有母告妻善養母食我以銅魚銅魚其父錯錯者所以治鋸也鋸者所以治木是以知有木治擊於獄矣淮南子曰夏屋聮房公輸王爾無所措剖居綺切劂居月切削鋸然猶未能贍人主之欲也丗說曰晉元皇𥘉見賀司空言及吴時孫皓燒鋸截一賀頭是誰司空未復言元皇曰燒是賀邵司空流涕曰昔者先臣遭遇無道臣創巨痛深無以上荅明詔元皇慙愧三日不出衡山記曰雞頭陂西有石室有人採藥暮宿其中曉見一鋸懸在壁上示有形無復䥫貫椎說文曰椎擊也齊}
  - {type: variant, offset: 186, length: 0, content: '', SBCK: 之柊音終揆音葵鐓丁回切千椎斤也纂文曰柊揆方椎隹贑易林曰亡椎失斧公輸無輔廣雅曰柊揆㪙􅀂卧切櫌鐇音煩䤶於業切㭬音卓椎也史記曰張良爲韓報讎得切刀爲䥫椎重百二十斤擊始皇於􅀶浪沙中誤中副車又曰信陵君客朱亥䄂四十斤䥫椎椎晉鄙殺之奪兵以救趙戰國䇿曰始皇遺齊君王后連環曰齊多知能解環君王后引椎椎破之謝􅁗使曰謹巳解矣漢書曰賈山上書曰􅁗王東窮燕齊南極吴楚厚築其外隱以金椎爲馳道之麗至於此使其後丗曽不得斜逕而託足焉又曰淮南王長怨辟陽侯之不救其母也䄂金椎椎殺辟陽侯又曰中山靖王勝來朝聞樂聲而泣曰衆煦漂山聚蚊成雷明堂執虎十夫橈椎王隱晉書曰梅陶及鍾雅數􅀃事祖納輙困之因曰君汝頴之士利如錐我幽兾之士鈍如椎持我鈍椎椎君利錐皆當槯陶雅並稱有神錐不可得椎納曰假有神錐必有神椎吴越春秋曰夫差使力士石畨以䥫椎椎殺王孫聖益州記曰市橋莋音作橋今各有一䥫椎大十許圍長六七十尺云􅀄橋引機運此椎以擊橋柱本有三今餘二管子曰一農必有一椎}
