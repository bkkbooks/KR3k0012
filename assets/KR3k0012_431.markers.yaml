  - {type: variant, offset: 2272, length: 197, content: 仕大夫又復立表令於邑中如前邑人守門爭表又曰晉文公伐原示信明年復伐之與士期必得原然後返原人聞之乃下衛人聞之以信為至矣乃歸晉故曰攻原得衛者此之謂也始文公非不欲原也不信得之不若勿得必誠以得之歸之者非獨衛也文公可謂知求矣又曰人主必信信之為政大矣信立則虛言可以賞矣虛言可以賞則六合之內皆為己府天行不信不能成歲地安不信草木不大春風不信其華不盛夏暑不信其土不肥秋雨不信其穀不堅冬寒不信其地不閉天地之大四時之化, SBCK: 菲庖厨殷湯寐寢黃屋駕}
