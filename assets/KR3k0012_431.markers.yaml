  - {type: variant, offset: 5258, length: 1, content: 上, WYG: 殃恭儉福之塲古今善言曰靈帝時欲用羊續為三司而中官求其賂續出黄紙補袍以示使者延篤與李文徳書曰吾食赤烏之䴸麥飲化益之元醴折張騫大宛之蒜㰱晉國郇瑕氏之鹽魏武令曰吾衣被皆十歳也嵗嵗觧浣補納之衞顗奏曰武皇帝之時後宫食不重肉衣不錦綉茵席不縁物}
