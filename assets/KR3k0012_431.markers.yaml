  - {type: variant, offset: 2997, length: 207, content: 禮不理吾從汝謁往監之謂請也監視也諸子皆稽首唯諾又召請婦曰婦人有三從之義無專制之行少繫於父母長繫於夫老繫於子今諸子許我視私家願與少子俱以備婦人出入之制諸婦其慎房戶之守吾夕而反於是使少子僕歸辦家事天陰還失早至閭外而止待夕而入魯大夫從臺上見而怪之召而問之曰母從北來至閭外而止良久乃入吾不知其故是以召母也對曰妾不幸早失夫獨與九子處臘日從諸子謁歸視私家與諸婦孺子期夕而反妾恐其酺醵醉飽酺醵合藂飲酒也人情所有也妾反失早故止閭外, WYG: 俸}
