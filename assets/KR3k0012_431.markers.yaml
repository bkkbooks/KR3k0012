  - {type: variant, offset: 393, length: 557, content: 自傷與齊侯讎不能復也曹子曰然則君請當其君臣請當其臣莊公曰諾於是會莊公升壇曹子手劍而從之管子進曰君何求曹子曰城壞壓境齊數取魯邑以渝信君不圖歟君為齊桓公也不當許侵魯地太甚願請汶陽之田管仲顧曰君許諾桓公曰諾曹子請盟已曹子摽劍而去之要盟可犯而桓公不欺曹氏可讎而桓公不怨桓公之信著乎天下自柯之盟始也又僖公曰晉獻公死奚齊立里克謂荀息曰君殺正廢長而立幼如之何願與子慮之荀息曰君嘗訊臣訊問臣對曰使死者反生生者不愧乎其言則可請信矣里克知其不可與謀退殺奚齊荀息立卓子里克殺卓子荀息死之荀息可謂不食其言矣論語學而曰信近於義言可復也復覆也言語之信可反覆又顏淵曰子貢問政子曰足食足兵民信之矣子貢曰必不得已而去於斯三者何先曰去兵曰必不得已而去於斯二者何先曰去食自古皆有死民無信不立言民所急者信也爾雅曰西至日入所為太蒙太蒙之人信史記蘇秦說燕王曰尾生與女子期於梁下女子不來水至不去抱梁柱而死又曰楚莊王圍宋五月不解宋城中急無食華元乃夜私見楚將子反告莊王王問曰城中何如曰析骸而炊易子而食王曰誠哉是言我軍亦有三日糧以其信故遂罷兵去又曰季札之初使北過徐君君好季札劍口弗敢言季札知之為使上國未獻還至徐君已死於是乃解其寶劍繫徐君冢樹而去從者曰徐君已死尚誰與乎季子曰不然吾心已許之豈以死背吾心漢書曰季布楚人以任俠為名以重然諾聞楚人為之諺曰得黃金百斤不如季布一諾, SBCK: ''}
