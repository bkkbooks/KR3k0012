  - {type: variant, offset: 1480, length: 511, content: 言而信信在言前同令而化化在令外聖人在上民遷如化列子曰子華有寵於晉不仕而居三卿之右禾生子伯范氏之上客也出行坰外宿於田叟商丘開之舍中夜禾生子伯二人相與言子華之名勢能使存者亡亡者存富者貧貧者富商丘開先窘於飢寒潛於牗聽之因之子華子華之門徒皆世族也見商丘開年老力弱面目犁黑狎侮欺紿無所不為遂與商丘開俱乘高臺於眾中漫言曰有能自投下者賞百金眾皆競應商丘開以為信然遂先投之形若飛鳥楊於地𩨒骨無傷因復指河曲之隈曰波中有寶珠泳可得也商丘開復從而泳之水底潛行曰洙既出果獲珠焉眾始同疑俄而范氏之藏失火子華曰若能入火取錦者從所得多少賞焉商丘開往無難色入火往還埃不漫身不燋范氏之徒乃共謝之曰吾不知子之有道而紿子吾不知子之有神而辱子敢問其道商丘開曰吾亡道雖吾之心亦不知其所以然有一於此試與子言之曩子二客之宿吾舍也聞譽范氏之子勢能使存者亡亡者存富者貧貧者富吾誠之無二心故遠而來及來以子黨之言皆實也唯恐誠之不至行之不及不知形體之所措利害之所著也心一而已物無迕者如斯已矣今昉知子黨之紿我我內藏猜慮外矜觀聽追無昔日之不燋溺也坦然內熱惕然震悸矣水火豈復可近哉自此之後范氏門徒路遇乞兒馬醫弗敢辱也必下車而揖之宰我聞之以告仲尼仲尼曰汝不知乎夫至信也動天地感鬼神橫六合, krp: 千乗}
