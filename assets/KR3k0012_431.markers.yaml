  - {type: variant, offset: 1070, length: 1, content: 卿, SBCK: 公馮翊雲陽人爲御史中丞遷司􅀠校尉秉性節約常布服􅀍􅂼食瓦器帝嘗幸其府舎見而歎曰楚國二龔不如雲陽宣巨公即賜布帛帳帷又曰􅀕遵爲人廉約小心克巳奉公賞賜輒盡與士卒家無私財身衣韋袴布􅀍夫人裳不加縁帝以是重焉魏略曰常林字伯槐歷宰守刺史所在檢身節用其家常飢乏糟糠緼弊魏志曰太祖平栁城頒所獲器物以素屏風素馮几賜毛玠曰君有古人之風故賜君古人之服玠居顯位常布衣􅂼食呉志曰是儀字子羽北海營陵人爲尚書僕射不服精細食不重膳孫權聞之幸儀舎求視􅂼食親甞之對之歎息􅀳書曰帝以}
  - {type: page-break, offset: 1070, content: '', id: KR3k0012_SBCK_431-4b}
  - {type: variant, offset: 1070, length: 1, content: 卿, WYG: 公馮翊雲陽人為御史中丞遷司𨽻校尉秉性節約常布服被疏食瓦器帝常幸其府舍見而歎曰楚國二龔不如雲陽宣巨公即賜布帛帳帷又曰祭遵為人亷約小心克已奉公賞賜輙盡與士卒家無私財身衣韋袴布被夫人裳不加縁帝以是重焉魏略曰常林字伯槐厯宰守刺史所在檢身節用其家常飢乏糟糠緼弊魏志曰太祖平柳城頒所獲器物以素屏風素馮几賜毛玠曰君有古人之風故賜君古人之服玠居顯位常布衣􅂼食吴志曰是儀字子羽北海營陵人為尚書僕射服不精細食不重膳孫權聞之幸儀舎求視􅂼食親嘗乏對之歎息晉書曰帝以}
