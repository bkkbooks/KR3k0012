  - {type: variant, offset: 3316, length: 952, content: 以須恕至時賓客會者皆以為會稽建業相去千餘里道阻江湖風波難必豈得如期須臾恕至一座盡驚諸葛亮別傳曰魏明帝自征蜀幸長安遣宣帝督張郃諸軍勁卒三十餘萬潛軍密向劍閣亮有戰士十萬十二更下在者八萬時魏軍始陳番兵適交亮參佐咸以敵眾強多非力所制宜權停下兵以并聲勢亮曰吾聞用武行師以大信為本得原失信古人所惜去者束裝以待期妻子鶴望以計日皆勑速遣於是去者感悅願留一戰住者憤勇咸思致命臨戰之日莫不拔刃爭先以一當十殺張郃卻宣帝一戰大剋此之由也王符論曰夫十步之間必有茂草十室之邑必有忠信謹慎易頤卦曰君子以慎言語節飲食尚書堯典曰慎徽五典五典克從毛詩抑曰敬慎威儀惟民之則周禮地官大司徒曰以賢制爵則民慎德禮記中庸曰君子戒慎乎其所不睹恐懼乎其所不聞蓋君子慎其獨也又儒行曰敬慎者仁之地也又太學曰敬慎者仁之地也又太學曰有國者不可以不慎辟則為天下僇矣是故君子先慎乎德論語學而曰慎終追遠民德歸厚矣又為政曰多聞闕疑慎言其餘則寡尤多見闕殆慎行其餘則寡悔尤遇又述而曰子之所慎齊戰疾又公冶長曰季文子三思而後行孝經曰在上不驕高而不危制節謹度滿而不溢高而不危所以長守貴也滿而不溢所以長守富也家語曰孔子入后稷廟左前有金人焉三緘其口而銘其背曰我古之慎言人也戒之哉無多言多言多敗無多事多事多患安樂必戒無所行悔漢書曰成帝為太子博謹慎上嘗急召太子出龍樓門不敢絕馳道西至直城門得絕乃度又曰石建為太僕奏事事下建讀之驚恐曰書馬者與尾而五服虔曰作馬字典者五建上事誤作四今乃四不足一獲譴死矣第慶為太僕御出上問車中幾馬慶以策數馬畢舉手曰六馬又曰金日磾自在左右目不忤視者數十年賜出宮女不敢近上欲內其女後宮不肯應其篤慎如此又曰霍光入禁闥小心謹慎未嘗有過又曰張安世職典樞機以謹慎周密自著又曰孔光性周密謹慎時有所言輒削藁休日歸休兄弟妻子燕語終不及朝廷政事或問光溫室省中樹皆何木也光嘿不應更荅以他語其不泄如此東觀漢記曰陳寵字昭公沛人為尚書寵性周密重慎時所表薦輒自手書人莫得知常言人臣之義若不畏慎自在樞機謝遣門人不復教授絕知友之路又曰樊楚字文高為尚書郎每當直事常晨駐馬待漏雖在閑署冠劍不解於身每齊祠恐失時乃張燈俯伏又曰陰識為執金吾居位數十年與賓客語不及國家其重慎如此又曰蔡倫字敬仲為中常侍有才學盡忠重慎每至休下輒閉門絕賓客曝體田野又曰樊宏字靡卿拜光祿大夫位特進宏為人謙慎每當朝會先到俯伏待事時至乃起, WYG: 醤􅀈}
