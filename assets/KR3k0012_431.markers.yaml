  - {type: 'tls:seg', offset: 1071, content: '', id: KR3k0012_CHANT_431-13a.5}
  - {type: variant, offset: 1072, length: 1, content: 陽, SBCK: 濤清儉無以供養特給日契加賜牀帳茵蓐禮秩崇重時莫爲比濤居榮貴貞愼儉約雖爵同千乗而無嬪媵王隱􅀳書曰李胤歷職内外而至貧儉兒病無以市藥上賜錢十萬􅀳中興書曰王廙爲母立屋過制中宗流涕諌之帝所幸鄭夫人􅂁無文綉其恭儉率下如此又曰陸納字祖言徴拜左民尚書將應召綱紀白日冝裝幾舫約曰吾家不在此巳勑􅀻奴乗駕裝并食糧米無所湏也臨發載􅀍襆而巳其餘皆封還官崔鴻十六國春秋趙録曰孟卓字君偉廣平人少脩清苦之志有一單裠十年不澣又前燕録曰太尉楊驚字士秋右北平無終人也驚母李氏􅀶學有母儀慕容晁常􅂛堂拜敬性尤清儉好施無倦位爲台保爵封郡公常乗弊車瘠牛卒無餘財後漢書曰孝文帝性儉素常服澣濯之衣鞍勒䥫木而巳宋書曰文帝性存儉約不好奢侈車府令嘗以輦䇨故請改易之輦席舊以烏皮縁欲代以紫皮上以䇨未至於壞紫色貴並弗聽也䇨音貢又曰孝武大明中壞上所居隂室於其處起王燭殿與群臣觀之牀頭有土鄣壁上挂􅁑燈籠麻䋲拂侍中􅀽顗盛稱巳爲過矣又曰顔延之性旣􅄶傲兼有酒過肆意直言曽無廻隱故論者多不知之居身清儉不營財利布衣􅂼食獨酌郊野當其爲適傍􅀂無人蕭子顯齊書曰髙帝即位後身不御精細之物勑中書舎人桓景真曰主衣中似有玉􅀲導此制始自大明末復太始増其光麗留此著主衣政是興長疾源可即時打破後宫器物欄檻以銅爲飾者改用䥫内殿施黃紗帳宮人著紫皮履華蓋除}
