  - {type: variant, offset: 3093, length: 268, content: 天陰還失早至閭外而止待夕而入魯大夫從臺上見而怪之召而問之曰母從北來至閭外而止良久乃入吾不知其故是以召母也對曰妾不幸早失夫獨與九子處臘日從諸子謁歸視私家與諸婦孺子期夕而反妾恐其酺醵醉飽酺醵合藂飲酒也人情所有也妾反失早故止閭外盡期而入大夫美之言於穆公穆公賜母尊號曰母師使朝謁夫人夫人諸姬皆師之會稽典錄曰卓恕字公行上虞人恕為人篤信言不宿諾與人期約雖遭暴風疾雨雷電冰雪無不必至嘗從建業還家辭太傅諸葛恪恪問何當復來恕對曰某日當復親覲至是日恪欲為主人停不飲食以須恕至時賓客會者皆以為會稽建業相去千餘里道阻江湖風波難必豈得如期須臾恕至一座盡驚諸葛亮別, SBCK: 桓階别}
