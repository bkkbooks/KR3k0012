  - {type: variant, offset: 2591, length: 342, content: 降寒暑四時當矣又曰齊桓公伐魯魯人不敢戰去魯國五十里而封之魯請比關內侯以聽桓公許之曹劌謂莊公請從於是明日將盟莊公與劌皆懷劍至於壇上曰魯國去境數百今去境五十亦無生矣均其死也戮於君前管仲鮑叔進曹劌案劍當兩陛下間曰君將改圖毋或進者莊公曰封於汶則可不則請死管仲曰以地衛君非以君衛地君其許之乃遂封汶南與之盟歸而欲勿予管仲曰不可人將劫君而不知不可謂智臨難而不能勿聽不可謂勇許之而不予不可謂信不智不勇不信有此三者不可以立功名予之雖亡地亦得信也以四百里之地見信於天下君猶得也莊公仇也曹劌賊也信於仇賊又況於非仇賊者乎夫九合而之合一匡而之聽乃從此生矣賈誼書曰禹與士民同務故不自言其信諭矣淮南子曰管子以小辱成大榮蘇秦以百誕成一信又曰胡人彈骨胡人盟約置酒人頭骨中飲以相誼越人齧臂中國唼盟所由各異其於信一也說苑曰, SBCK: 輿}
