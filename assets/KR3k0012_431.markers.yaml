  - {type: variant, offset: 4999, length: 320, content: 匣常自緘封家人莫有見者及卒視之乃前後勑書其慎密如此又曰楊再思在位累載屈節希旨無所規弼然慎畏末嘗忤物或謂再思曰公名高位重何為屈折如此再思曰世路艱難直者受禍茍不如此何以全其身哉又曰高郢性恭慎廉潔罕與人交游守官奉法勤恪掌誥累年家無制草或謂曰前輩皆留制集公焚之何也曰王言不可存私家時人重其慎密太公金匱曰黃帝曰子之居上搖搖恐夕不至朝尸子曰言美則響美言惡則響惡身長則影長身短則影短名者響也行者影也是故慎而言將有和之慎而行將有隨之淮南子曰君子之居民上也若以腐索御馬恐失民意若履薄冰蛟在其下又曰若行獨梁不為旡人不兢其容殷康明慎曰犇車之上無仲尼覆舟之下無伯夷益言慎也魏任嘏別傳曰嘏字紹先樂安博昌人也文帝時為黃門侍郎每納忠言輒手書壞本自在禁省歸書不封帝嘉其淑慎, SBCK: ''}
