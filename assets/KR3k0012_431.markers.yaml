  - {type: variant, offset: 5279, length: 1, content: 嘏, WYG: 蟋蟀刺晉僖公也儉不中禮故作是詩以閔之論語曰如有周公之才之美使驕且吝其餘不足觀也已又曰出納之吝謂之有司史記曰魯人俗儉嗇曹邴氏尤甚以鐵冶起富至巨萬然家自父兄子孫約俛有拾仰有取三輔决録曰平陵士孫奮富聞京師性儉恡嘗宿客舍顧錢直甚少主人曰君惜錢如此欲作士孫景卿耶魏畧曰曹洪家富而性嗇文帝前在東宫嘗從洪貸絹百疋洪不稱意及犯法自分必死晉書曰王戎性好興利廣収八方園田水碓周遍天下積實聚錢不知紀極而又儉嗇不自奉養天下人謂之膏肓之疾女􅃴裴頠貸錢數萬久而未還女後歸寧戎色不悦女遽還責然後乃歡從子將婚戎遺其单衣婚訖而更責於家有好李常出貨之恐人得種恒鑚其核以此獲譏於世後魏書曰崔光韶家足於財而性儉恡衣弊馬瘦食味麄薄始光韶在都同里王蔓於夜遇盗害其二子孝荘詔黄門髙道穆令加檢捕一方之人家别搜索至光韶宅綾絹錢布匱箧充積議者譏其矯嗇郭子曰王丞相性儉節帳下甘果盈溢不散涉春敗爛都督白之公别令拾去勅云慎不可使大郎知之大郎名恱}
