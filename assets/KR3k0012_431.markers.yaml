  - {type: variant, offset: 262, length: 130, content: 原降呂氏春秋云七日期原不下去之也明年復伐與士期必得而反原聞之乃下衛人曰文公信至矣乃歸之故曰攻原得衛新序云溫人聞之而降故曰伐原得溫又僖下曰王子虎盟諸侯于王庭要言曰皆獎王室無相害也君子謂是盟也信公羊傳曰莊公會齊侯盟于柯莊公將會曹子進曰君之意何如莊公曰寡人之生則不若, SBCK: 水}
