  - {type: variant, offset: 1993, length: 2478, content: 逆豈但履危嶮入火水而已哉孫卿子曰君者治之源也源清則流長在上有信小民不待探籌投鉤莊子曰夫交邇則相靡以信交遠則忠之以言慎子曰折券契屬符節賢不肖用之券契不為人信人自用之韓子曰魏文侯與虞人期獵明日天疾風左右止文侯文侯曰不可以疾風故失信遂犯風而往戰國策同又曰齊索讒鼎於魯以其偽往齊曰使樂正子來將聽魯君謂樂正子樂正子曰君胡不以真往曰我愛之荅曰臣亦愛臣之信又曰吳起示其妻以組曰子為我織組合如是組妻織組異善吳起曰非詔也使衣之而歸妻往請之起曰家無虛言呂氏春秋曰吳起治西河欲諭其信於民乃置表於南門之外令於邑中曰有能僨此表者仕長大夫民相謂曰此必不信有一人曰試往僨表還來謁之吳起見而仕大夫又復立表令於邑中如前邑人守門爭表又曰晉文公伐原示信明年復伐之與士期必得原然後返原人聞之乃下衛人聞之以信為至矣乃歸晉故曰攻原得衛者此之謂也始文公非不欲原也不信得之不若勿得必誠以得之歸之者非獨衛也文公可謂知求矣又曰人主必信信之為政大矣信立則虛言可以賞矣虛言可以賞則六合之內皆為己府天行不信不能成歲地安不信草木不大春風不信其華不盛夏暑不信其土不肥秋雨不信其穀不堅冬寒不信其地不閉天地之大四時之化而猶不能以不信成物也又況乎人事君不信則百姓誹謗社禝不寧處官不信則少不畏長貴賤相輕賞罰不信則民易犯法不可使令交友不信則離散鬱怨不能相親百工不信則器械苦偽丹漆不真夫可與為始可與為終可與尊通可與卑窮者其唯信乎信而又信重襲於身乃通於天以此君人則膏雨甘露降寒暑四時當矣又曰齊桓公伐魯魯人不敢戰去魯國五十里而封之魯請比關內侯以聽桓公許之曹劌謂莊公請從於是明日將盟莊公與劌皆懷劍至於壇上曰魯國去境數百今去境五十亦無生矣均其死也戮於君前管仲鮑叔進曹劌案劍當兩陛下間曰君將改圖毋或進者莊公曰封於汶則可不則請死管仲曰以地衛君非以君衛地君其許之乃遂封汶南與之盟歸而欲勿予管仲曰不可人將劫君而不知不可謂智臨難而不能勿聽不可謂勇許之而不予不可謂信不智不勇不信有此三者不可以立功名予之雖亡地亦得信也以四百里之地見信於天下君猶得也莊公仇也曹劌賊也信於仇賊又況於非仇賊者乎夫九合而之合一匡而之聽乃從此生矣賈誼書曰禹與士民同務故不自言其信諭矣淮南子曰管子以小辱成大榮蘇秦以百誕成一信又曰胡人彈骨胡人盟約置酒人頭骨中飲以相誼越人齧臂中國唼盟所由各異其於信一也說苑曰魏太子謂經侯曰主信臣忠此魏國之寶也列女傳曰魯之母師者九子之寡母也臘日祀畢悉召諸子謂曰婦人之義非有大故不出夫家然吾父母家多幼稚歲時禮不理吾從汝謁往監之謂請也監視也諸子皆稽首唯諾又召請婦曰婦人有三從之義無專制之行少繫於父母長繫於夫老繫於子今諸子許我視私家願與少子俱以備婦人出入之制諸婦其慎房戶之守吾夕而反於是使少子僕歸辦家事天陰還失早至閭外而止待夕而入魯大夫從臺上見而怪之召而問之曰母從北來至閭外而止良久乃入吾不知其故是以召母也對曰妾不幸早失夫獨與九子處臘日從諸子謁歸視私家與諸婦孺子期夕而反妾恐其酺醵醉飽酺醵合藂飲酒也人情所有也妾反失早故止閭外盡期而入大夫美之言於穆公穆公賜母尊號曰母師使朝謁夫人夫人諸姬皆師之會稽典錄曰卓恕字公行上虞人恕為人篤信言不宿諾與人期約雖遭暴風疾雨雷電冰雪無不必至嘗從建業還家辭太傅諸葛恪恪問何當復來恕對曰某日當復親覲至是日恪欲為主人停不飲食以須恕至時賓客會者皆以為會稽建業相去千餘里道阻江湖風波難必豈得如期須臾恕至一座盡驚諸葛亮別傳曰魏明帝自征蜀幸長安遣宣帝督張郃諸軍勁卒三十餘萬潛軍密向劍閣亮有戰士十萬十二更下在者八萬時魏軍始陳番兵適交亮參佐咸以敵眾強多非力所制宜權停下兵以并聲勢亮曰吾聞用武行師以大信為本得原失信古人所惜去者束裝以待期妻子鶴望以計日皆勑速遣於是去者感悅願留一戰住者憤勇咸思致命臨戰之日莫不拔刃爭先以一當十殺張郃卻宣帝一戰大剋此之由也王符論曰夫十步之間必有茂草十室之邑必有忠信謹慎易頤卦曰君子以慎言語節飲食尚書堯典曰慎徽五典五典克從毛詩抑曰敬慎威儀惟民之則周禮地官大司徒曰以賢制爵則民慎德禮記中庸曰君子戒慎乎其所不睹恐懼乎其所不聞蓋君子慎其獨也又儒行曰敬慎者仁之地也又太學曰敬慎者仁之地也又太學曰有國者不可以不慎辟則為天下僇矣是故君子先慎乎德論語學而曰慎終追遠民德歸厚矣又為政曰多聞闕疑慎言其餘則寡尤多見闕殆慎行其餘則寡悔尤遇又述而曰子之所慎齊戰疾又公冶長曰季文子三思而後行孝經曰在上不驕高而不危制節謹度滿而不溢高而不危所以長守貴也滿而不溢所以長守富也家語曰孔子入后稷廟左前有金人焉三緘其口而銘其背曰我古之慎言人也戒之哉無多言多言多敗無多事多事多患安樂必戒無所行悔漢書曰成帝為太子博謹慎上嘗急召太子出龍樓門不敢絕馳道西至直城門得絕乃度又曰石建為太僕奏事事下建讀之驚恐曰書馬者與尾而五服虔曰作馬字典者五建上事誤作四今乃四不足一獲譴死矣第慶為太僕御出上問車中幾馬慶以策數馬畢舉手曰六馬又曰金日磾自在左右目不忤視者數十年賜出宮女不敢近上欲內其女後宮不肯應其篤慎如此又曰霍光入禁闥小心謹慎未嘗有過又曰張安世職典樞機以謹慎周密自著又曰孔光性周密謹慎時有所言輒削藁休日歸休兄弟妻子燕語終不及朝廷政事或問光溫室省中樹皆何木也光嘿不應更荅以他語其不泄如此東觀漢記曰陳寵字昭公沛人為尚書寵性周密重慎時所表薦輒自手書人莫得知常言人臣之義若不畏慎自在樞機謝遣門人不復教授絕知友之路又曰樊楚字文高為尚書郎每當直事常晨駐馬待漏雖在閑署冠劍不解於身每齊祠恐失時乃張燈俯伏又曰陰識為執金吾居位數十年與賓客語不及國家其重慎如此又曰蔡倫字敬仲為中常侍有才學盡忠重慎每至休下輒閉門絕賓客曝體田野又曰樊宏字靡卿拜光祿大夫位特進宏為人謙慎每當朝會先到俯伏待事時至乃起上聞之勑騶臨朝乃告勿令豫到又曰杜安字伯夷貴戚慕其名或遺其書安不發悉壁藏之後捕貴戚賓客安聞壁出書而封如故由是不羅其患又曰張純字伯仁為虎賁中郎將純素重慎周密時上封事輒削去草後漢書曰馬援在交趾還書誡兄子曰龐伯高敦厚周密吾愛之重之願尔曹効之又曰馬光字叔山為衛尉卿上以光周密謹慎特親異之又曰皇甫嵩為人愛慎勤書前後上表陳諫有補益者五百餘事皆手書毀草不宣於外吳志曰闞澤字德潤山陰人也性謙恭篤慎人有非短口未嘗及容貌似不足者, krp: 嬪媵}
