  - {type: variant, offset: 1418, length: 0, content: '', SBCK: 丗基當朝貴盛妻子􅀍服擬於王者丗南雖同居而躬履勤儉不失素業又曰李藩爲相憲宗謂曰前代理天下或家給人足或國貧下困其故何也藩對曰古人云儉以足用盖足用繫於儉約誠使人君不貴珠玉惟務耕桑則人無􅁋巧俗自敦夲百姓旣足君孰}
