  - {type: variant, offset: 1003, length: 0, content: '', SBCK: 陳寵辟司徒鮑昱府􅁺屬專尚交遊以不肯親事爲髙寵常非之獨勤以物務又曰班超居家常執勤苦不恥勞辱又曰王丹字仲因毎歳農時輒載酒肴於田間􅃸勤者與而勞之魏氏春秋曰髙文惠爲刺姦令夙夜匪懈至擁􅂰抱書而寐太祖嘗夜微出覘察諸吏見而哀之徐解衣覆之而去魏志曰叚灼上䟽理鄧艾曰艾值歳㐫又爲區種身􅀍烏衣手執耒耜以率將士上下相感莫不盡力呉志曰諸􅁑恪征淮南以滕胤爲都督掌統留事㣧白日接賔客夜省文書或至曉不寐王隱晉書曰陶侃少長勤勑自強不息常語人曰大禹聖者乃惜寸隂至於凡俗當惜分隂晉書曰}
  - {type: page-break, offset: 1003, content: '', id: KR3k0012_SBCK_431-2a}
  - {type: variant, offset: 1003, length: 0, content: '', WYG: 陳寵辟司徒鮑昱府掾屬專尚交逰以不肯親事為髙寵常非之獨勤以事務又曰班超居家常執勤苦不恥勞辱又曰王丹字仲因毎嵗農時輒載酒肴於田間候勤者與而勞之魏氏春秋曰髙文惠為刺姦令夙夜匪懈至擁膝抱書而寐太祖常夜㣲出覘察諸吏見而哀之徐觧衣覆之而去魏志曰叚灼上䟽理鄧艾曰艾值嵗㐫艾為區種身被烏衣手執耒耜以率将士上下相感莫不盡力吴志曰諸葛恪征淮南以滕允為都督掌統留事允白日接賔客夜省文書或至曉不寐王隐晉書曰陶侃少長勤勑自強不息常語人曰大禹聖者乃惜寸隂至於凢俗宜惜分隂晉書曰}
  - {type: page-break, offset: 1003, content: '', id: KR3k0012_WYG_431-2b, image: WYG0896/WYG0896-0753d.png}
  - {type: variant, offset: 1003, length: 0, content: '', krp: 陳寵辟司徒鮑昱府掾屬專尚交遊以不肯親事爲髙寵常非之獨勤以物務又曰班超居家常執勤苦不恥勞辱又曰王丹字仲因毎歳農時輒載酒肴於田間候勤者與而勞之魏氏春秋曰髙文惠爲刺姦令夙夜匪懈至擁膝抱書而寐太祖嘗夜微出覘察諸吏見而哀之徐解衣覆之而去魏志曰叚灼上䟽理鄧艾曰艾值歳㐫又爲區種身𬒳烏衣手執耒耜以率將士上下相感莫不盡力呉志曰諸葛恪征淮南以滕胤爲都督掌統留事㣧白日接賔客夜省文書或至曉不寐王隱晉書曰陶侃少長勤勑自強不息常語人曰大禹聖者乃惜寸隂至於凡俗當惜分隂晉書曰}
  - {type: variant, offset: 1004, length: 0, content: '', SBCK: 愷素有識鑒加以在公勤恪甚得朝野稱譽唐書曰杜佑性勤而無倦雖位極將相手不釋卷質明視事接對賔客夜則燈下讀書孜孜不怠與賔佐談論人憚其貴而伏其􅀶杜預自叙曰在家則滋味經籍居官則畢力理治公家之事知無不爲夏仲御别傳曰夏統字仲御永興人與母兄弟居􅁪星行夜歸採梠求食母老病不悰家事仲御鼔四起洒掃庭内鑚火炊爨之後徑便入野孟子曰鷄鳴而起孜孜爲善舜之徒也淮南子曰墨子無黔突孔子無暖席是故聖人蒙耻辱以干世主者非以貪禄慕位也欲事天下之利除萬民之害也又曰跬歩不休跛鱉千里積累不輟可成丘阜鹽鐡論曰禹感洪水身親其勞簮墮不掇冠挂不顧儉約尚書大禹謨曰禹克儉于家周書曰文王疾召太子發曰吾栝柱茅茨盖爲民愛費也禮記檀弓下曰晏子一狐裘三十年又禮器曰晏平仲祀其先人豚肩不掩豆澣衣濯冠以朝君子以爲隘矣左傳桓公曰臧哀伯諌曰清廟茅屋大輅越席大羮不致粢食不鑿昭其儉也又閔公曰衛文公大布之衣大帛之冠又襄公上曰季文子卒大夫入歛公在位無衣帛之妾無食粟之馬無藏金玉無重器備又襄五年曰叔向曰子展儉而壹又哀上曰子西曰二三子無患矣吾昔聞闔閭食不二味居不重席室不崇壇器不雕鏤宫室不觀舟車不飾衣服財用擇不取費選取堅厚不尚細靡公羊傳宣公曰􅀳靈公無道趙盾趍入靈公望見再拜知其欲諌以拒之盾出公使勇士徃殺之勇士入俯而闚其户方食魚飡勇士曰嘻子誠仁人也爲􅀳國重卿而食魚飱見子之儉也君使我殺子吾不忍殺子也吾亦不可復見君遂刎頸而死論語里仁曰以約失之者鮮矣又㤗伯曰子曰禹吾無間然矣菲飲食而致孝乎􅀑神惡衣服而致美乎黻冕卑宫室而盡力乎溝洫漢書曰公孫弘起徒歩數年至宰相封侯於是開東閤以}
