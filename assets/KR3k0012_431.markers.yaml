  - {type: variant, offset: 4271, length: 7, content: 勑騶臨朝乃告勿, SBCK: 數戲曰卿家作醬頗得成不詔曰光光大魏富有四海棟梁大臣而有􅂼食非吾所以禮賢之意也其賜射鹿師二人并給媒弩三輔决録曰前隊大夫有范仲翁鹽䜴蒜果共一筩言其麤儉也㑹稽典録曰陳脩字奉先遷爲豫章守性清㓗恭儉十日一炊不燃官薪殷康明愼曰古人云驕奢人之殃恭儉福之塲古今善言曰靈帝時欲用羊續爲三司而中官求其賂續出黃帋􅀘􅂁以示使者延篤與李文德書曰吾食赤烏之䴸麥飲化益之玄醴折張騫大􅁐之蒜㰱􅀳國郇瑕氏之鹽魏武}
  - {type: page-break, offset: 4271, content: '', id: KR3k0012_SBCK_431-7b}
  - {type: variant, offset: 4271, length: 287, content: 勑騶臨朝乃告勿令豫到又曰杜安字伯夷貴戚慕其名或遺其書安不發悉壁藏之後捕貴戚賓客安聞壁出書而封如故由是不羅其患又曰張純字伯仁為虎賁中郎將純素重慎周密時上封事輒削去草後漢書曰馬援在交趾還書誡兄子曰龐伯高敦厚周密吾愛之重之願尔曹効之又曰馬光字叔山為衛尉卿上以光周密謹慎特親異之又曰皇甫嵩為人愛慎勤書前後上表陳諫有補益者五百餘事皆手書毀草不宣於外吳志曰闞澤字德潤山陰人也性謙恭篤慎人有非短口未嘗及容貌似不足者王隱晉書曰李康嘗荅司馬文王問因以為家誡曰昔侍於先帝時有三長史俱見臨辭出上曰為官長當慎當勤當清脩此三者何患不治乎上問臣曰必不得已於斯三者何先吾對曰慎乃為先夫清者不必慎慎必自清上, WYG: 數戯}
  - {type: punctuation, offset: 4277, content: ，, id: KR3k0012_CHANT_431-bkkpn1361}
  - {type: 'tls:seg', offset: 4277, content: '', id: KR3k0012_CHANT_431-45a.14}
  - {type: variant, offset: 4279, length: 2, content: 豫到, SBCK: 曰吾衣􅀍皆十歳也歳歳斛浣􅀘納之衛顗奏曰武皇帝之時後宮食不重􅁏衣不錦繡茵席不縁物無丹􅃮用能平定天下遺福子孫儉嗇毛詩曰汾沮洳刺儉也沮洳漸洳也又􅁑屨曰刺􅄶也魏地狹隘其民機巧趨利其君儉嗇􅄶急}
