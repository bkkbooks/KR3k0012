  - {type: variant, offset: 4840, length: 275, content: 博陵平安人也從入官已後典機務甚密慎常云古不言溫樹何足稱也唐書曰溫彥博自掌知機務即杜絕賓客國之利害知無不言太宗嘉之及薨謂侍臣曰彥博以憂國之故勞精竭神我見其不逮已二年矣恨不縱其閑逸致夭生靈又曰陸元方在官清謹再為宰相則天將有遷除每先以訪之必密封以進未嘗露其私恩臨終取前後草奏悉命焚之且曰吾陰德於人多矣其後庶幾福不衰矣又有書一匣常自緘封家人莫有見者及卒視之乃前後勑書其慎密如此又曰楊再思在位累載屈節希旨無所規弼然慎畏末嘗忤物或謂再思曰公名高位重何為屈折如此再思曰世路艱難直者受禍茍不如此何以全其身哉又曰高郢性恭慎廉潔罕與人交游守官奉法勤恪掌誥累年家無制草或謂, WYG: 决録}
