  - {type: variant, offset: 4477, length: 0, content: '', krp: 胤歷職内外而至貧儉兒病無以市藥上賜錢十萬晉中興書曰王廙爲母立屋過制中宗流涕諌之帝所幸鄭夫人𫀆無文綉其恭儉率下如此又曰陸納字祖言徴拜左民尚書將應召綱紀白日冝裝幾舫約曰吾家不在此巳勑私奴乗駕裝并食糧米無所湏也臨發載𬒳襆而巳其餘皆封還官崔鴻十六國春秋趙録曰孟卓字君偉廣平人少脩清苦之志有一單裠十年不澣又前燕録曰太尉楊驚字士秋右北平無終人也驚母李氏博學有母儀慕容晁常升堂拜敬性尤清儉好施無倦位爲台保爵封郡公常乗弊車瘠牛卒無餘財後漢書曰孝文帝性儉素常服澣濯之衣鞍勒䥫木而巳宋書曰文帝性存儉約不好奢侈車府令嘗以輦䇨故請改易之輦席舊以烏皮縁欲代以紫皮上以䇨未至於壞紫色貴並弗聽也䇨音貢又曰孝武大明中壞上所居隂室於其處起王燭殿與群臣觀之牀頭有土鄣壁上挂葛燈籠麻䋲拂侍中袁顗盛稱巳爲過矣又曰顔延之性旣𥚹傲兼有酒過肆意直言曽無廻隱故論者多不知之居身清儉不營財利布衣𬞞食獨酌郊野當其爲適傍若無人蕭子顯齊書曰髙帝即位後身不御精細之物勑中書舎人桓景真曰主衣中似有玉瓜導此制始自大明末復太始増其光麗留此著主衣政是興長疾源可即時打破後宫器物欄檻以銅爲飾者改用䥫内殿施黃紗帳宮人著紫皮履華蓋除金花瓜以用䥫廻釘毎曰使我治天下十年當使黃金與土同價又曰太官進食有裹蒸明帝曰我食此不盡可四片破之餘充晚食又曰太始巳來相承奢侈太祖輔政上表禁民間華僞不得作成綉裠衣道路不得着錦履不得作局脚檉栢牙牀箱籠錦縁不得以七寳飾樂器又諸雜􅃮物不得以金銀爲花獸又曰王逡之字宣約瑯邪臨沂人也少好學儉素衣服不浣几案塵墨齊春秋曰王儉字仲寳臨沂人不好聲色衣裘服用取給而巳梁書曰到漑字茂灌美風儀善容止所莅以清白脩性又率儉不好聲色虚室單衣傍無姬侍後周書曰辛慶之位遇雖隆而率性儉素車馬衣服不尚華侈志量温和有儒者風度特爲當時所重唐書曰虞丗南隋時丗基當朝貴盛妻子𬒳服擬於王者丗南雖同居而躬履勤儉不失素業又曰李藩爲相憲宗謂曰前代理天下或家給人足或國貧下困其故何也藩對曰古人云儉以足用盖足用繫於儉約誠使人君不貴珠玉惟務耕桑則人無淫巧俗自敦夲百姓旣足君孰與不足帝曰儉約之事是我誠心唯當上下相朂以保此道又曰于休烈在朝凢三十餘年歷掌清要家無擔石之蓄恭儉深仁未甞以喜愠形於顔色而親覽下士推轂後進雖位崇年髙曽無倦色文子曰量腹而食度身而衣節乎巳者貪心不生矣墨子曰晉文公好惡衣臣下皆衣䍧羊之裘以韋帶劔吕氏春秋曰周明堂茅茨蒿柱土階三尺以見儉也風俗通曰大禹闕百品之羞而菲庖厨殷湯寐寢黃屋駕而乗露輿魏武别傳曰武皇帝子中山恭王衮尚儉約教勑妃妾紡績織絍習爲家人之事桓階别傳曰䧟爲趙郡太守時俸盡食醬上聞之數戲曰卿家作醬頗得成不詔曰光光大魏富有四海棟梁大臣而有𬞞食非吾所以禮賢之意也其賜射鹿師二人并給媒弩三輔决録曰前隊大夫有范仲翁鹽䜴蒜果共一筩言其麤儉也㑹稽典録曰陳脩字奉先遷爲豫章守性清㓗恭儉十日一炊不燃官薪殷}
