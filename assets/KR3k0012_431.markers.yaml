  - {type: variant, offset: 1005, length: 7, content: 除細陽令每至歲, SBCK: 賢人食一肉脫粟之飯故人賔客仰衣食俸禄皆以給之又曰辛慶忌居處恭儉飲食􅀍服尤以節約東觀漢記曰第五倫性節儉雖爲二千石常衣布躬莝飬馬妻炊㸑飲食受俸禄常取赤米又曰王良爲大司徒司直在位恭儉妻子不入官舎布􅀍瓦器}
