  - {type: variant, offset: 4731, length: 267, content: 吾何得先食其謹慎如此北齊書曰封隆之字祖裔渤海脩人也性寬和有度量義旗始建首參經略奇謀妙策密以啟聞上書削藁罕聞於外高祖嘉其忠謹每多從之隋書曰高頴字昭玄渤海蓨人也少明敏尤善詞令所出奇策密謀及損益時政皆世無知者又曰李德林字公輔博陵平安人也從入官已後典機務甚密慎常云古不言溫樹何足稱也唐書曰溫彥博自掌知機務即杜絕賓客國之利害知無不言太宗嘉之及薨謂侍臣曰彥博以憂國之故勞精竭神我見其不逮已二年矣恨不縱其閑逸致夭生靈又曰陸元方在官清謹再為宰相則天將有遷除每先以訪之必密封以進未嘗露其私恩臨終取前後草奏悉命焚之且曰吾陰德於人多矣其後庶幾福不衰矣又有書, SBCK: 覽卷第四百三十}
