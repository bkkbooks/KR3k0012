  - {type: variant, offset: 2352, length: 22, content: 三夜賜金璧數十萬出於阜鄉亭皆置去留書以赤玉舄, WYG: 帝復遊池濵得明珠}
  - {type: variant, offset: 2352, length: 3, content: 三夜賜, krp: 帝復遊池濵得明珠一雙武帝曰豈非昔魚之報桓冲之述異記曰陳留周氏婢名興進入山取撨夢見一女語之曰近在汝頭前目中有刺煩爲抜之當有厚報婢見一朽棺頭穿壞髑髏墮地草生目中便爲拔草内着棺中以甓塞穿即於髑髏處得一雙}
  - {type: punctuation, offset: 2354, content: ，, id: KR3k0012_CHANT_479-bkkpn714}
  - {type: 'tls:seg', offset: 2354, content: '', id: KR3k0012_CHANT_479-34a.7}
  - {type: variant, offset: 2356, length: 10, content: 璧數十萬出於阜鄉亭皆, krp: 指環呉均續齊諧記曰弘農楊寳見一黄雀爲鴟梟所搏取之以歸}
  - {type: variant, offset: 2359, length: 961, content: 萬出於阜鄉亭皆置去留書以赤玉舄一量為報曰後千歲求我於蓬萊山下費禕別傳曰孫權以手中嘗所執寶刀贈禕荅曰臣不才何以堪明令然刀所以討不庭禁暴亂者也但願大王勉建功業同獎漢室臣雖闇弱不負采顧蜀王本紀曰蜀王獵於褒谷見秦王以金一笥遺蜀王報以禮物盡化為士秦王大怒臣下拜賀曰土者地也葛洪西京雜記曰朱買臣為會稽太守懷章綬至金亭而國人未知也所知錢勃見其曝露乃勞之曰得無罷乎遺以紈扇買臣至郡引為上客雜記曰公孫弘為國士所推上為賢良國人郵長贈以生芻一束素絲一繸撲玉一枚孟儀周載曰悼公時晉智伯為政強暴好侵伐欲謀襲衛乃遺衛君野馬四白璧一以結好韓子曰仲尼為政於魯齊景公患之黎鉏謂景公遺哀公女樂景公曰善乃以女樂二八遺哀公哀公果怠於政仲尼諫不聽去而之齊又曰晉獻公欲伐虞虢乃遺之屈產之乘垂棘之璧女樂二八以榮其心而亂其政孔叢子曰子思居貧其友有饋之粟者受二車焉或獻樽酒束脩子思弗為當或曰子取人粟而辭吾酒是辭少取多也子思曰伋不幸而貧於財至乃困乏將絕先人祀夫所以受粟為周乏也酒脯則飲讌方乏於食而乃飲讌非義也吾豈以為介哉又曰孔子使宰予於楚楚昭王以安車蒙飾因宰予遺孔子焉宰予曰夫子無以此為也臣竊見其行不離道動不違仁貴義尚德清素好儉仕而有祿不以為費不合則去退無恡心妻不服綵妾不衣帛車器不彫馬不食粟道行則樂其治不行則樂其身臣知夫子之不用此車也古詩曰客從遠方來贈我一端綺文作雙鴛鴦裁為合歡被謝惠連詩曰客從遠方來贈我鶴文綾裁為親身服著以便寢興古詩曰客從遠方來贈我一端綺相去萬餘里故人心尚爾張衡四愁詩曰美人贈我金錯刀何以報之英瓊瑤又云美人贈我翠琅玕何以報之雙玉盤又云美人贈我錦繡段何以報之青玉案又云美人贈我貂襜褕何以報之明月珠傅云四愁詩曰美人贈我明月珠何以報之比目魚又云美人贈我蘇合香何以要之翠鴛鴦張載擬四愁詩曰美人遺我綠綺琴何以贈之雙南金琴操曰許由無有杯器手掬水人見由無器以瓠瓢遺之由操飲飲訖掛以樹枝風吹樹動有歷歷聲由以為煩擾取損之楚辭曰折䟽麻兮瑤華䟽麻神麻也瑤王華將以遺兮離居離居隱者也皇甫規與劉司空牋曰明公至德佐國憂世雖贈兩梁冠及鮐魚一雙服厚尊貺榮施其弘班固集曰竇憲餉身所服物虎頭繡盤囊一雙又遺身所服韤三具錯鏤鐵一魏武帝與楊彪書曰今贈足下青氈床褥三具慕容晃與顧和書曰今致繡鞋一緉張敞集敞荅朱登書曰登為東海相遺敞蟹醬敞荅曰遽伯玉受孔子之賜必以及其鄉人敞謹分斯貺于三老尊行者曷敢獨享之, SBCK: 九}
