  - {type: variant, offset: 2305, length: 2, content: 務施, krp: 職也且敬大其必有故使人視之則用兵在後赤布曰衛假吾道而厚贈我我見難不告是與爲謀也稱疾而留使人告衛衛人驚戒智伯乃止又曰楚莊王賜群官酒日暮燈燭滅有引妾衣者妾得其冠纓持之趍火來上視絶纓者王曰賜人酒使醉失禮柰何欲顯婦人節而辱士乎乃令曰夜飲不絶纓者不歡群臣百餘人皆絶纓乃大醉盡忻居二十年晉與楚戰有一臣常在前五合五獲甲首却敵卒勝恠而問之對曰臣當死徃醉失禮王隱不誅也終不敢以隂蔽之德}
  - {type: variant, offset: 2309, length: 1, content: 腐, WYG: 顯報常願肝膽塗地頸血湔敵人矣臣乃絶纓者也遂平晉軍楚得以强又曰陽虎得罪於衛北見簡子曰自今以來不復樹人矣簡子曰唯賢者為能報恩不肖者不能夫春樹桃李者夏得休息秋得食焉樹蒺藜者夏不得休息秋得其刺焉今君所樹者蒺藜也異苑曰景平中東陽大水永康人蔡嘉夫避往南壠夜有大䑕形如狸浮水而來徑伏嘉床角奴惡而不犯每食轉以}
  - {type: page-break, offset: 2309, content: '', id: KR3k0012_WYG_479-11a, image: WYG0897/WYG0897-0352a.png}
  - {type: variant, offset: 2309, length: 1, content: 腐, krp: 顯報常願肝膽塗地用頸血湔敵人矣臣乃絶纓者也遂平晉軍楚得以強又曰陽虎得罪於衛北見簡子曰自今以來不復樹人矣簡子曰唯賢者爲能報恩不肖者不能夫春樹桃李者夏得休息秋得食焉樹蒺䔧者夏不得休息秋得其刺焉今所樹者蒺䔧也異苑曰景平中東陽大水永康人蔡嘉夫避住南壟夜有大䑕形如浮水而來徑㐲嘉夫床角奴愍而不犯每食轉以}
  - {type: variant, offset: 2311, length: 1, content: 財, WYG: 飰與之水勢退嘉夫得反居䑕以前脚捧青紙裹約三寸許看奴啾啾狀如欲語從此去來不絶也又曰始興陽山縣人行田忽遇一象以鼻卷之遥入深山見一象脚有巨刺此人牽挽得出病}
  - {type: variant, offset: 2311, length: 1, content: 財, krp: 飰與之水勢退嘉夫得反居䑕以前脚捧青𥿄褁三斤許珠着奴前啾啾狀如欲語從此去來不絶也又曰始興楊山縣人行田忽遇一象以鼻卷之遥入深山見一象脚有巨刺此人牽挽得出病}
