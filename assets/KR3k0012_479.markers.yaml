  - {type: variant, offset: 1775, length: 3, content: 綸巾以, SBCK: 鳥似鵠而大至樹下又見一虵長五丈許上樹取鳥鳥欲飛虵張口翕之鳥不去􅌭紛一飡頃射師彀弩射三矢虵落鳥得去樹百餘歩山邊整理毛羽湏􅁷雲雷發射師懾不得旋踵見向鳥徘徊其上毛落紛紛似如相援如此數陣雲息電滅射師得免鳥亦髙飛三輔决録曰髙陵龐智伯名勃爲郡小吏東平衡農字剽卿爲書生窮乏客鍜於勃家勃知其賢禮待頋眷常去送十里過舅家復貸錢}
