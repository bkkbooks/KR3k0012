  - {type: variant, offset: 1766, length: 0, content: '', SBCK: 迫遽昭之曰此畏死也便以繩繫此蘆着舡頭蟻縁繩出中夜夢一人烏衣從百許人來謝云僕不愼墮江慙君濟活僕是蟻中王君􅀂急難之日當見告後昭遇事繋獄蟻穴獄昭遂得脫}
