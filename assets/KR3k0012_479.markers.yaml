  - {type: variant, offset: 303, length: 9, content: 越圍吳趙孟使楚隆使, WYG: 朱買臣為㑹稽太守悉召見故人與飲食諸嘗有恩者皆報復焉又曰宣帝在長安獄中邴吉保䕶養視上知吉有舊恩而終不言特賢之詔曰御史大夫與朕有恩厥德茂焉詩不云乎無德不報其封吉為􅀶陽侯食邑千三百户又曰陳平旣貴寵封侯乃謂高祖曰臣不因魏無知無以得見陛下請報之又曰張賀幸}
