  - {type: variant, offset: 1848, length: 2, content: 鎰初, SBCK: 傅藥留養十餘日瘡愈飛去月餘銜赤玉珠二枚置禧㕔事晏子春秋曰北郭騷見晏子曰竊􅀃先生之義願乞以養母晏子使人分粟府金以遺之辭金受粟有間晏子見疑景公乃出奔北郭子曰養及親者身更其難遂告公庭曰晏子天下之賢也去齊齊國必侵}
