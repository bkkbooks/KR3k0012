  - {type: variant, offset: 1839, length: 0, content: '', SBCK: 于寳搜神記曰噲叅寓居河内䖍恭父母忽有單鶴趣之叅撫視箭創甚重於是以膏藥摩之月餘漸愈放而飛去數十日間夜鶴雌雄二頭各銜一珠吐之而去搜神記曰羊公雍伯本以儈賣爲業性篤孝父母終葬南山遂家焉山髙無水公汲水作義漿於坂頭行者皆飲之三年有一人就飲以一升石子與之使至髙平好地有石處種之得五􅀟白璧名玉田玉田起於此也續搜神記曰晉咸康中豫州刺史毛寳戍邾城有一軍人於武昌市見人賣一白􅀛子長四五寸色白可愛其人買取持歸着瓮中養之日漸大近及尺許其人憐之持至江邊放於水中視其遊去後邾城遭石虎敗毛豫州旣赴江莫不沉溺所養􅀛人于時􅀍鎧持刀亦同自投入水中􅁴如墮一石上水裁至腰湏􅁷浮去中流視之乃是先養白􅀛甲巳長六七尺旣送至東岸出頭視之徐游而去中江猶頋者數四焉陳壽益郚耆舊傳曰王忳嘗詣京師於空舎中有一書生病因􅉖而視之書生謂忳曰我當到洛陽而病􅆎下有金十斤願以相贈死後乞藏骸骨未及問姓名而絶忳即鬻金營葬餘金悉置棺下後數年縣署大度亭長􅀄到日有馬馳入亭而止其日大風飄一繡􅀍復墮忳前}
