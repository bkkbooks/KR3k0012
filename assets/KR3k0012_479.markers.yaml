  - {type: 'tls:seg', offset: 3094, content: '', id: KR3k0012_CHANT_479-46a.9}
  - {type: variant, offset: 3094, length: 0, content: '', WYG: 農受曰為馮翊乃相報别七八年果為馮翊勃為門下書佐忘之矣農召問乃寤舉孝廉為尚書郎左右丞魏郡太守又曰趙岐避難於四方江海岱霍無所不至自匿姓名布衣布絮賣餅北海市安丘孫嵩年二十餘遊市見趙歸㣲察知非常人駐車呼與共載曰我北海孫賓石顧終不相負岐聞嵩即以實告遂與俱歸嵩先入白母曰今日出得死友在外岐即嵩家積年乃出後詣劉表時北海孫嵩流離在劉表末座不為表所識岐遙識之向表說嵩表甚竒重之因共表嵩為青州刺史干寳搜神記曰噲叅寓居河内䖍恭父母忽有單鶴趣之叅撫視箭創甚重於是以膏藥摩之月餘漸愈放而飛去数十日間夜鶴雌雄二頭各銜一珠吐而去搜神記曰羊公雍伯本以儈賣為業性篤孝父母終葬無終山遂家焉山髙無水公汲水作義漿於坂頭行者皆飲之三年有一人就飲以一升石子與之使至髙平好地有石處種之得五}
  - {type: page-break, offset: 3094, content: '', id: KR3k0012_WYG_479-14a, image: WYG0897/WYG0897-0353c.png}
  - {type: page-break, offset: 3094, content: '', id: KR3k0012_WYG_479-14b, image: WYG0897/WYG0897-0353d.png}
  - {type: variant, offset: 3094, length: 0, content: '', krp: 農受曰爲馮翊乃相報別七八年果爲馮翊勃爲門下書佐忘之矣農召問乃寤舉孝廉爲尚書郎左右丞魏郡太守河内太守又曰趙歧避難於四方江海岱霍無所不到自匿姓名布衣巾絮賣餅北海市安丘孫嵩年二十餘遊市見趙歸微察知非常人駐車呼與共載曰我北海孫賔碩終不相負歧聞嵩即以實告遂與俱歸嵩先入白母曰今日出得死友在外歧即匿嵩家積年乃出後說劉表時北海孫嵩流離在劉表末座不爲表所識歧遥識之表說嵩表甚重之同共表嵩爲青州刺史于寳搜神記曰噲叅寓居河内䖍恭父母忽有單鶴趣之叅撫視箭創甚重於是以膏藥摩之月餘漸愈放而飛去數十日間夜鶴雌雄二頭各銜一珠吐之而去搜神記曰羊公雍伯本以儈賣爲業性篤孝父母終葬南山遂家焉山髙無水公汲水作義漿於坂頭行者皆飲之三年有一人就飲以一升石子與之使至髙平好地有石處種之得五}
  - {type: variant, offset: 3095, length: 1, content: 南, WYG: 白璧名玉田起於此也續搜神記曰晉咸康中豫州刺史毛寳戍邾城有一軍人於武昌市見人賣一白龜子長四五寸色白可愛其使買取持歸着瓮中養之日漸大近及尺許其人憐之持至江邉于水中視其遊去後邾城遭石虎敗毛豫州旣赴江莫不沉溺所養龜人于時被鎧持刀亦同自投入水中覺如見一石上水裁至腰湏􅁷浮去中流視之乃是先養白龜甲巳長六七尺旣送至東㟁出頭視之徐遊而去中江猶還顧者數四焉陳夀益部耆舊傳曰王忳嘗詣京師於空舎中有一書生病困愍而視之書生謂忳曰我當到洛陽而病腰下有}
