  - {type: variant, offset: 1767, length: 3, content: 呼德基, SBCK: 弘之荆州記曰隨侯曽得大虵不殺而遣之虵後銜明月珠以報隨侯一名隨侯珠孔靈符㑹稽記曰射的山南有白鶴山此鶴爲仙人取箭漢太尉鄭弘嘗採薪得一遺箭頃有人覔弘還之問何所欲弘曰常患􅀂耶溪載薪爲難願旦南風夕北風後果然劉義慶幽明録曰項縣人姚牛年十餘歲父爲郷人所殺牛手刃之於衆中吏捕得官長深矜孝節爲推遷其事㑹赦得免令後出獵逐鹿}
