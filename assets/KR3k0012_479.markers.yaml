  - {type: variant, offset: 2313, length: 1, content: 聖, WYG: 即起相與跼陸狀若懽喜前象復載就一汙濕地以鼻掘出數長牙送還本處彼境苗稷常為象所困其象俗呼大客因語云我田稼在此恒為大客所犯若念我者勿見侵便覺躑躅如相訓解於是一家業田絶無其患三秦記曰白鹿原}
