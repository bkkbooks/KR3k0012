  - {type: variant, offset: 1089, length: 0, content: '', SBCK: 丹沛郡人本姓􅁗養曹氏或云其父伯南􅀫與太祖善興平􅀽術部黨與太祖相攻刼太祖出爲㓂所追走入􅁗氏伯南開門受㓂問所在荅云我是㓂遂害之由此太祖思其功遂變其姓又曰郭援捕得賈逹逹不肯拜謂援曰王府君臨郡積年不知足下􅂚爲者也援曰捉斬之諸將覆護乃囚之閉着􅁟窟中以車輪盖上使人圍守方且殺之逹從窖中謂守者此間無徤兒也而當使}
