  - {type: variant, offset: 17, length: 0, content: '', krp: 詶無德不報左傳曰靈公將殺趙盾伏甲而饗之𥘉宣子田於首山舎翳桑見靈輙餓問其病曰不食三日矣食之旣而爲公介倒㦸以御公徒而免之問何故曰翳桑之餓人也又曰晉大夫魏武子有寵妾無子武子疾命其子顆曰我死必嫁之及其疾困曰以殉武子卒顆嫁之曰疾困則亂吾從其治也其後及秦戰於輔氏大敗秦師獲杜回方戰見一老父結草以抗杜回杜回秦之力士杜回躓而顛故獲之夜夢一老人謂巳曰予汝嫁妾之父也尔用先人治命故以是報戰國䇿曰中山君饗都大夫司馬子期在焉羊羹不徧子期怒而走於楚}
  - {type: substitution, offset: 17, original: 說, replacement: 説, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19811}}
  - {type: variant, offset: 18, length: 0, content: '', SBCK: 楚以伐中山中山君亡走有二人挈戈隨其後者君頋二子奚爲對曰臣父嘗餓且死君下壷飱餔臣父且死言曰中山有事汝必死之故來死爲君也中山君􅁣然曰吾以一杯羮亡國以一壷飱得二人史記曰王稽載范睢入􅁗爲相睢乃入言之王曰非王稽之忠莫能内臣於函谷關非大王之賢聖莫能貴臣今臣官至於相爵在列侯王稽之官尚止於謁者非所以内臣之意也王召稽拜以爲河東太守又曰􅀽盎自爲呉相時有從吏嘗盗盎侍兒文潁云婢盎知之不泄遇之如􅀄人有告從吏言君知尔與侍者通乃亡歸盎自追還遂以侍者賜之及􅀽盎使呉見守從吏適爲守盎校尉司馬乃悉以其齎裝置二石醇醪㑹天寒士卒飢渇飲酒醉西南陬卒皆卧司馬夜引􅀽盎起曰君可以去矣呉王期旦日斬君盎不信曰公何爲者司馬曰臣故爲從吏盗君侍兒者盎乃驚謝之而去又曰􅂫􅁗旣貴乃遍報諸所嘗見}
  - {type: page-break, offset: 18, content: '', id: KR3k0012_SBCK_479-2a}
  - {type: variant, offset: 18, length: 0, content: '', WYG: 楚以伐中山中山君亡走有二人挈戈隨其後者君顧二子奚為對曰臣父嘗餓且死君下壺飱哺之臣父且死言曰中山有事汝必死之故來死為君也中山君慨然曰吾以一杯羮亡國以一壺飱得二人史記曰王稽載范睢入秦為相雎乃入言之王曰非王稽之忠莫能内臣於函谷關非大王之賢聖莫能貴臣今臣官至於相爵在列侯王稽之官尚止於謁者非所以内臣之意也王召稽拜以為河東太守又曰袁盎自為呉相時有從吏嘗盗盎侍兒文穎云婢盎知之不泄遇之如初人有告從吏言君知爾與侍者通乃亡歸盎自追還遂以侍者賜之及袁盎使呉見守從吏􅃴為守盎校尉司馬乃悉以其齎裝置二石醇醪㑹天寒士卒饑渴飲酒醉西南陬卒皆卧司馬夜引袁盎起曰君可以去矣呉王期旦日斬君盎不信曰公何為者司馬曰臣故為從吏盗君侍兒者盎乃驚謝之而去又曰蘇秦旣貴乃遍報諸所嘗見}
