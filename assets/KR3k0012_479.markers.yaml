  - {type: variant, offset: 1771, length: 3, content: 寺門脫, SBCK: 草中有古深穽數處馬將趣之忽見一公舉杖擊馬馬驚僻不得及鹿令怒引弓將射之公曰此中有穽恐君墮耳令曰汝爲何人翁跪曰姚牛父也感君活牛故來謝恩遂㓕不見又曰符堅時有射師經嵩山望見松上有一􅀟}
