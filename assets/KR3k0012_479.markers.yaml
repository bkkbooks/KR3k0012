  - {type: variant, offset: 323, length: 174, content: 臣志父得承齊盟曰好惡同之今君在難無恤不敢憚勞非晉國之所能及也使陪臣敢展布之王拜稽首曰寡人不佞不能事越以為大夫憂拜命之辱與之一簞珠又曰吳公子札聘於鄭見子產如舊相識與之縞帶縞帶大帶也子產獻紵衣焉紵衣禪衣謂子產曰鄭之執政侈難將至矣政必及子子為政慎之以禮不然鄭國將敗又曰叔鮒欲求貨於衛淫芻蕘者淫放也使欲衛患之而致貨焉衛人使屠伯饋叔向羹與一篋錦屠伯衛大夫曰諸, SBCK: 賜爵􅀜内}
