  - {type: variant, offset: 2305, length: 2, content: 務施, WYG: 職也具大其必有故使人視之則用兵在後赤布曰衛假吾道而厚贈我我見難不告是與為謀也稱疾而留使人告衛衛人驚戒智伯乃止又曰楚莊王賜羣官酒日暮燈燭㓕有引妾衣者妾得其冠纓持之趣火來上視絶纓者王曰賜人酒使醉失禮柰何欲顯婦人節而辱士乎乃令曰夜飲不絶纓者不歡羣臣百餘人皆絶乃大醉盡歡後二十年晉與楚戰有一臣常在前五合五獲甲首却敵卒勝怪而問之對曰臣當死往醉失禮王隱不誅也終不敢以隂蔽之德}
