  - {type: variant, offset: 17, length: 0, content: '', SBCK: 詶無德不報左傳曰靈公將殺趙盾伏甲而饗之􅀄宣子田於首山舎翳桑見靈輙餓問其病曰不食三日矣食之旣而爲公介倒㦸以御公徒而免之問何故曰翳桑之餓人也又曰晉大夫魏武子有寵妾無子武子疾命其子顆曰我死必嫁之及其疾困曰以殉武子卒顆嫁之曰疾困則亂吾從其治也其後及􅁗戰於輔氏大敗􅁗師獲杜回方戰見一老父結草以抗杜回杜回􅁗之力士杜回躓而顛故獲之夜夢一老人謂巳曰予汝嫁妾之父也尔用先人治命故以是報戰國䇿曰中山君饗都大夫司馬子期在焉羊羹不徧子期怒而走於楚}
  - {type: page-break, offset: 17, content: '', id: KR3k0012_SBCK_479-1b}
  - {type: variant, offset: 17, length: 0, content: '', WYG: 酬無德不報左傳曰靈公將殺趙盾伏甲而饗之初宣子田於首山舎翳桑見靈輙餓問其病曰不食三日矣食之既而為介倒㦸以御公徒而免之問何故曰翳桑之餓人也又曰晉大夫魏武子有寵妾無子武子疾命其子顆曰我死必嫁之及其疾困曰以殉武子卒顆嫁之曰疾困則亂吾從其治也其後及秦戰於輔氏大敗秦師獲杜回方戰見一老父結草以抗杜回杜回秦之力士杜回躓而顛故獲之夜夢一老人謂己曰予汝嫁妾之父也爾用先人治命故以是報戰國策曰中山君饗都大夫司馬子期在焉羊羮不徧子期怒而走於楚}
