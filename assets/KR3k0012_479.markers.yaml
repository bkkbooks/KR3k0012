  - {type: variant, offset: 1206, length: 142, content: 虞郭經親故門各以一兩頭置門內而去又曰陶潛傳顏延之為始安郡經過日日造潛每往必酣飲致醉臨去留二萬錢與潛潛悉送酒家稍就取酒飲宋書曰郭原平高陽許謠之居在永興罷建安郡丞還家以綿一斤遺原平不受送而復反者前後數十瑤之乃自往曰今歲過寒而建安綿好以此奉尊上耳原平乃拜而受之齊書庾易徵辟不就以文義自樂安西, SBCK: ''}
