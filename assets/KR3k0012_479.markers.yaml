  - {type: variant, offset: 2627, length: 410, content: 黎鉏謂景公遺哀公女樂景公曰善乃以女樂二八遺哀公哀公果怠於政仲尼諫不聽去而之齊又曰晉獻公欲伐虞虢乃遺之屈產之乘垂棘之璧女樂二八以榮其心而亂其政孔叢子曰子思居貧其友有饋之粟者受二車焉或獻樽酒束脩子思弗為當或曰子取人粟而辭吾酒是辭少取多也子思曰伋不幸而貧於財至乃困乏將絕先人祀夫所以受粟為周乏也酒脯則飲讌方乏於食而乃飲讌非義也吾豈以為介哉又曰孔子使宰予於楚楚昭王以安車蒙飾因宰予遺孔子焉宰予曰夫子無以此為也臣竊見其行不離道動不違仁貴義尚德清素好儉仕而有祿不以為費不合則去退無恡心妻不服綵妾不衣帛車器不彫馬不食粟道行則樂其治不行則樂其身臣知夫子之不用此車也古詩曰客從遠方來贈我一端綺文作雙鴛鴦裁為合歡被謝惠連詩曰客從遠方來贈我鶴文綾裁為親身服著以便寢興古詩曰客從遠方來贈我一端綺相去萬餘里故人心尚爾張衡四愁詩曰美人贈我金錯刀何以報之英瓊瑤又云美人贈我翠琅玕何以報之雙玉盤又云美人贈我錦繡段何以報之青玉案又云美人贈我貂襜褕何以報之, WYG: 蛇後銜}
