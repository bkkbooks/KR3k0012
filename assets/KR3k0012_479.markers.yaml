  - {type: variant, offset: 1763, length: 2, content: 容服, SBCK: 將欲報之金不知其家遂投金瀬水之中而去有頃一嫗行哭而來問曰嫗何􅂘之悲也嫗曰吾有女守吾年三十不嫁徃年擊漂於此遇人窮飯之而恐泄事自投於瀬水中而死今聞伍君來不得其家自傷空而無爲報者故行􅂘之悲也人曰子胥欲報嫗以百金不知嫗所在投金水中而去嫗乃取金以歸也劉向􅀃苑曰呉赤布使於智氏假道於衛寗文子具紵絺三百製送之將歸呉智伯命造舟爲梁赤布曰吾聞天子濟於水造舟爲梁諸侯方舟大夫維舟臣之職也且敬大其必有故使人視之則用兵在後赤布曰衛假吾道而厚贈我我見難不告是與爲謀也稱疾而留使人告衛衛人驚戒智伯乃止又曰楚莊王賜群官酒日暮燈燭滅有引妾衣者妾得其冠纓持之趍火來上視絶纓者王曰賜人酒使醉失禮柰何欲顯婦人節而辱士乎乃令曰夜飲不絶纓者不歡群臣百餘人皆絶纓乃大醉盡忻居二十年晉與楚戰有一臣常在前五合五􅀗甲首却敵卒勝恠而問之對曰臣當死徃醉失禮王隱不誅也終不敢以隂蔽之德而不顯報常願肝膽塗地用頸血湔敵人矣臣乃絶纓者也遂平晉軍楚得以強又曰陽虎得罪於衛北見簡子曰自今以來不復樹人矣簡子曰唯賢者爲能報恩不肖者不能夫春樹桃李者夏得休息秋得食焉樹蒺䔧者夏不得休息秋得其刺焉今所樹者蒺䔧也異苑曰景平中東陽大水永康人蔡嘉夫避住南壟夜有大䑕形如浮水而來徑㐲嘉夫床角奴􅉖而不犯每食轉以餘飰與之水勢退嘉夫得反居䑕以前脚捧青􅁓褁三斤許珠着奴前啾啾􅃺如欲語從此去來不絶也又曰始興楊山縣人行田忽遇一象以鼻卷之遥入深山見一象脚有巨刺此人牽挽得出病者即起相與跼陸􅃺􅀂懽喜前象復載就一汙濕地以􅈹掘出數枝長牙送還本處彼境苗稷常爲象所困其象俗呼大客因語云我田稼在此􅁪爲大客所犯􅀂念我者勿見侵便􅁴躑躅如相訓解於是一家業絶無其患三秦記曰白鹿原人釣魚於原綸絶而去夢於漢武求去其鈎明日戲於池見大白魚銜索帝曰豈非昨所夢取而去之間三日帝復遊池濵得明珠一􅀟武帝曰豈非昔魚之報桓冲之述異記曰陳留周氏婢名興進入山取撨夢見一女語之曰近在汝頭前目中有刺煩爲抜之當有厚報婢見一朽棺頭穿壞髑髏墮地草生目中便爲拔草内着棺中以甓塞穿即於髑髏處得一􅀟金指環呉均續齊諧記曰弘農楊寳見一黄雀爲鴟梟所搏取之以歸置巾箱中養之百餘日毛羽成朝去暮還後寳夕讀書未卧有黄衣童子向寳再拜曰我王母使臣昔使蓬萊不愼爲鴟梟所搏蒙君仁愛救拯今當受使南海不得奉侍以白環四枚與寳令君子孫㓗白且位登三事當如此環矣東陽元凝齊諧記曰冨陽董昭之嘗乗舡過錢塘江中央見有一蟻着一短蘆}
