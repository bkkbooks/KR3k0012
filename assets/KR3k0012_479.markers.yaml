  - {type: variant, offset: 1833, length: 3, content: 路由壽, SBCK: 曰今日出得死友在外歧即匿嵩家積年乃出後􅀃劉表時北海孫嵩流離在劉表末座不爲表所識歧遥識之表􅀃嵩表甚重之同共表嵩爲青}
