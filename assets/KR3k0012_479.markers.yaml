  - {type: variant, offset: 1349, length: 218, content: 史袁彖欽其風通書致遺易以連理机竹翹書格報之又曰張融字思光吳郡吳人也祖禕晉琅邪王國郎中令父暢宋會稽太守融年弱冠道士同郡陸脩靜以白鷺羽尾扇遺融曰此既異物以奉異人又曰何點隱居不仕豫章王命駕造門點從後門逃去竟陵王子良聞之曰豫章王尚不屈非吾所議遺點嵇叔夜酒杯徐景山酒鎗以通意范享燕書曰高祖少有大度雄略傑出晉安北將軍張華鎮薊總御諸部高祖童冠往見華甚異之謂高祖曰君必為命時之器匡時濟難者也脫所著幘簪以遺高祖結殷勤而別崔鴻後燕錄曰王猛伐洛陽將發謂慕容垂, SBCK: 嘆}
