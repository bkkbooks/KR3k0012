  - {type: variant, offset: 3095, length: 1, content: 南, krp: 白璧名玉田玉田起於此也續搜神記曰晉咸康中豫州刺史毛寳戍邾城有一軍人於武昌市見人賣一白龜子長四五寸色白可愛其人買取持歸着瓮中養之日漸大近及尺許其人憐之持至江邊放於水中視其遊去後邾城遭石虎敗毛豫州旣赴江莫不沉溺所養龜人于時𬒳鎧持刀亦同自投入水中覺如墮一石上水裁至腰湏臾浮去中流視之乃是先養白龜甲巳長六七尺旣送至東岸出頭視之徐游而去中江猶頋者數四焉陳壽益郚耆舊傳曰王忳嘗詣京師於空舎中有一書生病因愍而視之書生謂忳曰我當到洛陽而病腰下有}
