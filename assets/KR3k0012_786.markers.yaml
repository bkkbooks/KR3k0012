  - {type: variant, offset: 1282, length: 1, content: 將, SBCK: 開南境北縣其地從廣可六百里餘城去海百二十里去日南界四百餘里北接九德郡其南界地北水歩道二百餘里有西圖夷亦稱王馬援所植二銅柱表漢界處也其國有金山石皆赤色其中生金金夜則出飛狀如螢火又出瑇􅈘貝齒古貝沉木香貝者樹名也其花成時如鵝毳抽其緒紡之以作布布與紵布不殊亦染成五色織爲班布沉木香者土人斫断積以歳年朽爛而心節獨在置水中則沉故名曰沉香次浮者棧香漢末大亂功曹區連殺縣令自立爲王數丗其後王無嗣外甥范熊代立死子逸嗣晉成帝咸康三年逸死奴之簒立文夲曰南西捲縣夷帥范㓜家奴常牧牛於山澗得鯉魚二化而爲䥫因以鑄刀刀成文向石呪曰􅀂斫石破者父當王此國因斫石如断蒭藳文心異之范㓜甞使之啇賈至林邑因敎林邑王作}
  - {type: page-break, offset: 1282, content: '', id: KR3k0012_SBCK_786-4a}
  - {type: variant, offset: 1282, length: 1, content: 將, WYG: 開南境北縣其地從廣可六百里餘城去海百二十里去日南界四百餘里北接九德郡其南界水步道二百餘里有西國夷亦稱王馬援所植二銅柱表漢界處也其國有金山石皆赤色其中生金夜則出飛狀如螢火又出瑇􅈘貝齒古貝沉木香貝者樹名其花成時如鵞毳抽其緒紡之以作布布與紵布不殊亦染成五色織為班布沉木香者土人斫斷積以嵗年朽爛而心節獨在置水中則沉故名曰沉香次浮者棧香漢末大亂功曹區連殺縣令自立為王數世其後王無嗣外甥范熊代立死子逸嗣晉成帝咸康三年逸死奴文簒立文本日南西棬縣夷帥范稚家奴常牧牛於山澗鯉魚二化而為鐡因以鑄刀成文向石呪曰若斫石破者文當王此國因斫石如斷蒭藁文心異之范稚嘗使之商賈至林邑因教林邑王作}
