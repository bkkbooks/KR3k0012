  - {type: variant, offset: 2252, length: 164, content: 是也又曰和帝永元十三年巫蠻許聖等漢之巫縣今雲安郡巫山縣也以郡收稅不均懷怨恨遂屯聚反叛荊州諸郡兵討破之復悉徙置江夏靈帝光和三年江夏蠻復反寇患累年廬江太守陸康討破之漢廬江即今郡也世本曰廩君使人操青縷以遺鹽神曰嬰此即相宜云與女俱生弗宜將去鹽神受縷而嬰之廩君即立陽石上望青縷而射之鹽神死天乃大開說文曰𢄐南郡蠻夷布也𢄐音稼荊州圖曰夷陵縣西, SBCK: ''}
