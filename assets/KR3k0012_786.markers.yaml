  - {type: variant, offset: 1197, length: 3, content: 單程等, SBCK: 救不容得食力不能盡相檐去者便断取手足以去尤以人手足掌蹠爲珎異以飴長老出得人歸家合聚隣里懸死人中當四面向坐擊銅鼓歌舞飲酒稍就割食之奉月方田尤好出索人貪得之以􅀕田神也異物志曰烏滸取翠羽採珠爲産又能織班布可以爲帷幔族類同姓有爲人所殺則居處伺殺主不問是與非遇人便殺以爲􅁏食也裴淵廣州記曰晉興有烏滸人以鼻飲水口中進噉如故林邑國南史曰林邑國}
