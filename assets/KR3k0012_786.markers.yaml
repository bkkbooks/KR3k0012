  - {type: variant, offset: 1192, length: 1, content: 陵, WYG: 封賢栗等為君長自是嵗来朝貢又曰永平十二年哀牢王栁貎遣子率種人内屬顯宗以其地置哀牢慱南二縣割益州郡西部都尉所領六縣合為永昌郡始通慱南山渡蘭倉水行者苦之歌曰漢德廣開不賓度􅀶南越蘭津渡蘭倉為他人又曰西部都尉廣漢鄭純為政清潔化行夷貊天子嘉之即以為永昌太守純與哀牢夷人約邑豪嵗輸布貫頭衣二領鹽一斛以為常賦夷俗安之九州記曰哀牢人皆儋耳穿鼻其渠帥自謂王者耳皆下肩三寸庶人則至肩而已土地沃美宜五糓􅅙桑知染綵文繡有蘭干細布獠言紵也織成文章如綾錦有梧桐木葉績以為布幅廣五尺潔白不受垢汚先以覆亡人然後服之有濮竹節相去二尺地出銅鐡鉛錫金銀光珠琥珀水精琉璃軻蟲蚌珠孔雀翡翠犀象猩猩貊獸唐書曰麟德元年五月於昆明之梇棟川置姚州都督府每年差兵募五百人鎮守武太后神功二年蜀州刺史張柬之上表曰姚州者古哀牢之舊國也本不與中國交通前後唐䝉開夜郎滇筰而哀牢不附至光武季年始請内屬漢置永昌郡以統理之稅其鹽布氊􅄢以利中土其國西通大秦東通交趾竒珍進貢嵗時不闕及諸葛亮五月渡瀘水收其金銀鹽布以益軍儲使張伯岐選其勁卒以増武備前代置郡其利頗深今鹽布之稅不供珍竒之貢不入而空竭府庫驅率平人受役}
