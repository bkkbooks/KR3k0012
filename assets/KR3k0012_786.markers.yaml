  - {type: variant, offset: 1191, length: 0, content: '', SBCK: 其王賢栗遣兵乗箄舩箄音蒲佳切南下江漢擊附塞夷鹿茤音多鹿茤人溺爲所擒獲於是震雷疾雨南風飄起水爲逆流飜涌二百餘里箄舩沉没哀牢之衆溺死者數千人賢栗復遣六王將萬人以攻鹿茤鹿茤王與戰殺其六三哀牢􅂄老共埋六王夜虎復出其尸而食之餘衆驚怖立引去賢栗惶恐謂其􅂄老曰我曹入邊塞自古有之今攻鹿茤輙􅀍天誅中國其聖帝乎天祐助之何其明也二十七年賢栗等遂率種人詣越嶲太守鄭鴻降求内属光}
  - {type: variant, offset: 1191, length: 0, content: '', WYG: 其王賢栗遣兵乗箄船箄音浦佳切南下江漢撃附塞夷鹿茤音多鹿茤人溺為所擒獲於是震雷疾雨南風飄起水為逆流翻涌二百餘里箄船沉沒哀牢之衆溺水者數千人賢栗復遣六王將萬人以攻鹿茤鹿茤王與戰殺其王哀牢耆老共埋六王夜虎復出其尸而食之餘衆驚怖立引去賢栗惶恐謂其耆老曰我曹入邊塞自古有之今攻鹿茤輙被天誅中國其聖帝乎天祐助之何其明也二十七年賢栗等遂率衆人詣越嶲太守鄭鴻降求内屬光}
  - {type: page-break, offset: 1191, content: '', id: KR3k0012_WYG_786-2b, image: WYG0899/WYG0899-0833b.png}
  - {type: variant, offset: 1191, length: 0, content: '', krp: 其王賢栗遣兵乗箄舩箄音蒲佳切南下江漢擊附塞夷鹿茤音多鹿茤人溺爲所擒獲於是震雷疾雨南風飄起水爲逆流飜涌二百餘里箄舩沉没哀牢之衆溺死者數千人賢栗復遣六王將萬人以攻鹿茤鹿茤王與戰殺其六三哀牢耆老共埋六王夜虎復出其尸而食之餘衆驚怖立引去賢栗惶恐謂其耆老曰我曹入邊塞自古有之今攻鹿茤輙𬒳天誅中國其聖帝乎天祐助之何其明也二十七年賢栗等遂率種人詣越嶲太守鄭鴻降求内属光}
  - {type: variant, offset: 1192, length: 1, content: 陵, SBCK: 封賢栗等爲君長自是歳來朝貢又曰永平十二年哀牢王柳邈遣子率種人内属顯宗以其地置哀牢愽南二縣割益州郡西部都尉所領六縣合爲永昌郡始通􅀶南山渡蘭倉水行者苦之歌曰漢德廣開不賔度􅀶南越蘭津渡蘭倉爲他人又曰西部都尉廣漢鄭純爲政清㓗化行夷貊天子嘉之即以爲永昌太守純與哀牢夷人約邑豪歳輸布貫頭衣二領鹽一斛以爲常賦夷俗安之九州記曰哀牢人皆儋耳穿􅈹其渠帥自謂王者耳皆下肩三寸鹿人則至肩而己土地沃羙冝五榖􅅙桑知染綵文繡有蘭于細布獠言紵也織成文章如綾錦有梧桐木華績以爲布幅廣五尺潔白不受垢汚先以覆亡人然後服之有濮竹節相去二丈地岀銅䥫鈆􅃬金銀光珠琥珀水精瑠璃軻蟲蚌珠孔雀翡翠犀象猩猩豹獸唐書曰麟徳元年五月於昆明之挵㨂川置姚州都督府毎年差兵募五百人鎮守武太后神功二年蜀州刺史張柬之上表曰姚州者古哀牢之舊國也夲不與中國交通前漢唐蒙開夜郎滇笮而哀牢不附至光武季年始請内属漢置永昌郡以統理之稅其鹽布氈􅄢以利中土其國西通大􅁗通交阯竒珎進貢歳時不闕及諸葛亮五月渡瀘水収其金銀鹽布以益軍儲使張伯歧選其勁卒以増武備前代置郡其利頗深今鹽布之稅不供珎竒之貢不入而空竭府庫駈率平人受役}
  - {type: page-break, offset: 1192, content: '', id: KR3k0012_SBCK_786-2a}
