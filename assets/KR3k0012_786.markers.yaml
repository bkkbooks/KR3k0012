  - {type: variant, offset: 1573, length: 7, content: 舉旄鳴鼓應聲十, SBCK: 土多香木金寳物産大抵與交趾同以塼爲城蜃炭􅂗之皆開北户以向日或東西無定尊官有二其一曰西郍婆帝其二曰蕯婆地歌其属官三等其一曰倫多姓次歌倫致帝次乙地伽蘭外官分爲二百餘部其長曰弗羅次曰可倫如牧宰之差也王戴金花冠形如章甫衣朝霞布珠璣纓絡足躡革履時服錦􅂁良家子侍衛者二百餘人皆執金裝兵有弓箭刀槊以竹爲弩􅀓毒於矢樂有琴笛琵琶五絃頗與中國同毎擊皷以驚衆吹蠡以即戎其人􅀷目高鼻髮拳色黒俗皆徒跣以幅布纒身冬月衣􅂁婦人稚髻書樹葉􅁓施椰葉爲席王死七日而葬有官者三日庻人一日以凾盛屍鼔舞導從輿至外次積薪焚之収其餘骨王則内金甖中沉之於海有官者以銅甖沉之海口庻人以瓦送之於江男女皆截髮􅂘至水次盡哀而止歸則不哭毎七日燃香散花復􅂘盡哀而止百日三年皆如之皆奉佛文字同於天笁隋書曰林邑之先因漢末交趾女子徴側之亂内縣功曺子區連殺縣令自號爲王無子其甥范熊代立死子逸立日南人范文因亂爲逸僕遂教之築宫室造器械逸甚信任使文將兵極得衆心文因間其子弟或奔或徙及逸死國無嗣文自立爲王其後范佛爲晉楊威將軍戴桓所破宋交州刺史檀和之將兵擊之􅀷入其境至梁陳亦通使徃來其國延袤數千里髙祖旣平陳乃遣使獻千物其後朝貢遂絶時天下無事群臣言林邑多竒寳者仁壽末上遣大將劉方爲驩州道行軍惣管卒欽州刺史寗長直驩州刺史李暈開府􅁗雄步􅀐}
