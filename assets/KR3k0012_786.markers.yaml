  - {type: variant, offset: 410, length: 1, content: 天, WYG: 其先有婦人名沙壹居牢山嘗捕魚水中觸沉木若有感因懐姙十月産子男十人後沉木化為龍出水上沙壹忽聞龍語曰若為我生子今悉何在九子見龍驚走獨小子不能去背龍而坐龍因䑛之其母鳥語謂背為九謂坐為隆因名其子曰九隆沙壹將九隆居龍山}
  - {type: variant, offset: 410, length: 1, content: 天, krp: 其先有婦人名沙壹居牢山嘗捕魚水中觸沉木若有感因懷姙十月産子男十人後沉木化爲龍岀水上沙壹忽聞龍語曰若爲我生子今悉何在九子見龍驚走獨小子不能去背龍而坐龍因䑛之其母鳥語謂背爲九謂坐爲隆因名其子曰九隆沙壹將九隆居龍山}
