  - {type: variant, offset: 3990, length: 1, content: 為, SBCK: 瓶盛送于}
  - {type: variant, offset: 3990, length: 0, content: '', WYG: 瓶盛送於大水内貧者或用瓦而以彩色畫之亦有不焚送屍山中任野獸食之其國北多山阜南有水澤地氣尤熱無霜雪饒瘴癘毒蠚土冝粱稻與日南九真相類異者有娑那婆樹無花葉似柿實似冬瓜菴羅樹花葉似􅀥實似李毗野樹花似木瓜葉似杏實似楮婆田羅樹花葉實並似􅀥而小異歌畢佗樹花似李葉似榆而厚大實似李其大如升九真海中有魚名建同四足無鱗其鼻如象吸水上噴髙五六十尺有浮胡魚其形如䱇觜如鸚鵡有八足多大魚半身出水望之如山每五六月中毒熱氣流行即以白猪白羊於城西門外祠之不然五糓不登六畜多死近都有陵伽鉢婆山上有神祠每以二千人守衞城東有神名婆多利祭用人肉每年殺人以夜祀禱大業十三年遣使貢獻帝厚禮之其後亦絶唐書曰真臘國貞觀二年與林邑國俱來朝獻太宗嘉其厯逺疲勞賜賚甚厚南方人謂真臘國}
