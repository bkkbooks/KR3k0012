  - {type: variant, offset: 1194, length: 2, content: 精夫, SBCK: 夷肝腦塗地漢以得利旣多更置􅀶南哀牢二縣蜀人愁怨行者作歌今於國家無絲髮之利在百姓受終之酷伏乞省罷姚州使肄嶲府歳時朝覲同之畨國烏滸後漢書曰交阯西有噉人國生首子輙解而食謂之冝弟味旨則以遣其君君喜而賞其父取妻羙則譲其兄今烏滸人是也南州異物志曰交廣之界民曰烏滸烏滸地名東界在廣州之南交州之北恒出道間伺􅀱二州行旅有單逈軰者輙岀擊之利得人食之不貪其財貨也地有􅁄竹厚十餘寸破以作弓長四尺餘名狐弩削竹爲矢以銅爲鏇長八寸以射急疾不凢用也地有毒藥以傳矢金入則撻皮視未見瘡頋盻之間肌肉便皆壞爛湏􅁷而死尋問此藥云取䖝諸有毒螫者合着管中曝之旣爛因取其汁日煎之如射肉在其内地則裂外則不復裂也烏滸人便以肉爲殽爼又取其髑髏破之以飲酒也其伺􅀱行人小有失軰出射之􅀂人無救者便止以火燔燎食之􅀂人有伴}
  - {type: page-break, offset: 1194, content: '', id: KR3k0012_SBCK_786-3a}
