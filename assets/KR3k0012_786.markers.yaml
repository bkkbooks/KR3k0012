  - {type: variant, offset: 1888, length: 182, content: 蠻本有五姓色氏樊氏瞫氏瞫音審相氏鄭氏皆出於武落鍾離山在今郡是夷陵山縣其山有赤黑二穴巴氏之子生於赤穴四姓之子皆生黑穴未有君長俱事鬼神乃共擲劍於石穴約能中者奉以為君巴氏子務相乃獨中之眾皆歎又令各乘土舩約能浮者當為君餘姓悉沉惟務相獨浮因共立之是為廩君乃乘土舩從夷水至鹽陽鹽水有神女謂廩君曰此地廣大魚鹽所出願留共居廩君不許鹽神暮輒來宿旦即化為蟲與諸蟲群飛掩蔽日光天地晦冥積, WYG: 西陸行一}
