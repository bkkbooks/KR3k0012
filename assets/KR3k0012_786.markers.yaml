  - {type: variant, offset: 204, length: 499, content: 微弱故復戒將率之臣以治軍實又曰保有鳧繹遂荒徐宅至于海邦淮夷蠻貊及彼南夷莫不率從尚書舜典曰柔遠能邇惇德允元而難任人蠻夷率服帝曰皋陶蠻夷猾夏寇賊姦宄猾亂也夏華夏也群行攻劫曰寇殺人曰賊在外曰姦在內曰究言無殺所致也又禹貢曰三百里蠻以文德來之不制以法論語曰子張問行子曰言忠信行篤敬雖蠻貊之邦行矣史記曰吳太伯弟仲雍皆周大王之子避季歷乃犇荊蠻文身斷髮示不可用荊蠻義之從西歸之千餘家漢書曰賈誼上書云凡天子者天下之首何也上也蠻夷者天下之足何也下也世說曰郝隆為桓溫南蠻參軍三月三日就溫席作詩曰娵隅躍清池溫問何物荅曰蠻名魚為娵隅桓曰何為作蠻語隆曰千里投公始得一蠻府參軍郍得不作蠻語越裳國尚書大傳曰交阯之南有越裳國周公居攝六年制禮作樂天下和平越裳以三象重譯而獻曰雉曰道路悠遠山川阻深音使不通故重譯而朝成王以歸周公曰德不加焉則君子不饗其質質亦贄也政不施焉則君子不臣其人吾何以獲此賜也其使請曰吾受命吾國之黃耇日久矣天之無烈風注雨意者中國有聖人乎有則盍往朝之周公乃歸之於王稱先王之神致以薦于宗廟周德既衰於是稍絕黃支國漢書曰黃支國去合浦日南三萬國俗與朱崖略同武帝時來貢具多明珠璧琉璃奇石異物大珠圍及二寸至團者置之平地終日不得止槃瓠, SBCK: 哀牢}
