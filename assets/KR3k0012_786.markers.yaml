  - {type: variant, offset: 608, length: 577, content: 有聖人乎有則盍往朝之周公乃歸之於王稱先王之神致以薦于宗廟周德既衰於是稍絕黃支國漢書曰黃支國去合浦日南三萬國俗與朱崖略同武帝時來貢具多明珠璧琉璃奇石異物大珠圍及二寸至團者置之平地終日不得止槃瓠後漢書曰昔高辛氏有犬戎之寇帝患其侵暴而征伐不剋乃訪募天下有能得犬戎之將吳將軍首者購黃金千鎰邑萬家又妻以少女時帝有畜狗其毛五采名曰槃瓠下令之後槃瓠遂衘人頭造闕下群臣怪而診視之乃吳將軍首也帝大喜乃以女配槃瓠槃瓠得女負而走南山止石室中所處險絕人跡不至於是女解去衣裳為僕鑒之髻結著獨力之衣僕鑒獨力皆未詳流俗或改鑒為堅者妄穿鑿也經三年生子十二人六男六女槃瓠死後因自相夫妻織績木皮染以草實好五色衣服製裁皆有尾形其衣裳班蘭語言侏離好入山壑不樂平曠帝順其意賜以名山廣澤其後滋蔓號曰蠻夷外癡內黠安土重舊以先父有功母帝之女田作賈販無關梁符傳租稅之賦有邑君長皆賜印綬冠用獺皮名渠帥曰精夫相呼為姎徒姎焉郎切說文曰自自稱姎我也今長沙武陵蠻是也又曰南蠻其在唐虞與之要質故曰要服夏商之時漸為邊患暨于周代黨眾彌盛故詩曰蠢爾蠻荊大邦為讎至楚武王時蠻與羅子共敗楚師殺其將屈瑕莫敖不設備故敗縊于荒谷群帥囚于治父也楚師既振遂屬於楚及吳起相悼王南并蠻越遂有洞庭蒼梧秦昭王使白起伐楚略取蠻夷始置黔中郡又曰漢興改秦黔中郡為武陵歲令大人輸布一疋小口二丈是謂賨布說文曰賨南蠻賦也音牛冬切雖時為寇盜而不足為郡國患光武, WYG: ''}
