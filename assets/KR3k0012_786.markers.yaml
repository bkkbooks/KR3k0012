  - {type: variant, offset: 817, length: 364, content: 所處險絕人跡不至於是女解去衣裳為僕鑒之髻結著獨力之衣僕鑒獨力皆未詳流俗或改鑒為堅者妄穿鑿也經三年生子十二人六男六女槃瓠死後因自相夫妻織績木皮染以草實好五色衣服製裁皆有尾形其衣裳班蘭語言侏離好入山壑不樂平曠帝順其意賜以名山廣澤其後滋蔓號曰蠻夷外癡內黠安土重舊以先父有功母帝之女田作賈販無關梁符傳租稅之賦有邑君長皆賜印綬冠用獺皮名渠帥曰精夫相呼為姎徒姎焉郎切說文曰自自稱姎我也今長沙武陵蠻是也又曰南蠻其在唐虞與之要質故曰要服夏商之時漸為邊患暨于周代黨眾彌盛故詩曰蠢爾蠻荊大邦為讎至楚武王時蠻與羅子共敗楚師殺其將屈瑕莫敖不設備故敗縊于荒谷群帥囚于治父也楚師既振遂屬於楚及吳起相悼王南并蠻越遂有洞庭蒼梧秦昭王使白起伐楚略取蠻夷始置黔中郡又曰漢興改秦黔中郡為武陵歲令大人輸布一疋小口二丈是謂賨布說文曰賨南蠻賦也音牛冬切雖時為寇盜而不足為郡, SBCK: ''}
