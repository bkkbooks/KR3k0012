  - {type: variant, offset: 3183, length: 511, content: 落內屬孝文嘉之拜誕東荊州刺史襄陽王誕字天生桓玄子也既內屬居朗陵王師南伐請為前驅討義陽不果而旋太和十七年蠻首田益宗率部曲四千餘戶內屬襄陽蠻首雷婆思等十一人率千餘戶內徙求居大和川詔給廩食後開南陽全有沔北之地蠻人安堵不為寇賊宣武景明初太陽蠻首田育丘等二萬八千戶內附詔置四郡十八縣魯陽蠻魯北鷰等聚眾萬餘攻逼頻陽遣右衛將軍李崇討平之徙萬餘家於南北及六鎮尋叛南走所在追討北及河殺之皆盡正始二年梁沔東太守田清喜擁七郡三十一縣戶萬九千內附永平初東荊州表太守桓叔興前後招慰大陽蠻歸附者一萬七百戶請置郡十六縣五十詔前鎮東府長史酈道元檢行置之後二荊兩郢蠻大擾動斷三鵶路殺都督寇盜至於襄城汝水百姓多被其害連年攻討散而復合其暴滋甚有冉氏向氏田氏陬落最盛大者萬家小者千戶更相崇樹僣稱王決七據三峽斷遏水路荊蜀行人至有假道者周文略定伊瀍聲教南被諸蠻畏威靡然向風後唐州蠻田魯嘉叛自號豫州伯王雄等計平之尋而蠻師舟令賢向五子王等反攻陷白帝天和初開封陸騰討斬之以其骸骨於水邏城側為京觀後蠻蜑音但見輒大哭自此狼戾之心去矣俚後漢書曰建武十二年九真徼外蠻里張里蠻之別號今則呼為俚人率種人慕化內屬封為歸漢里君沈懷遠南越志曰晉康郡夫陙音純縣人夷曰世尺切其俗柵居實惟俚之城落, SBCK: 日}
