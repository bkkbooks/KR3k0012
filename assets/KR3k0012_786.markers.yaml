  - {type: variant, offset: 1571, length: 0, content: '', SBCK: 攻城尅之乗勝即尅林邑陽邁父子並挺身逃奔獲其珎異皆是未名之寳又銷其金人得黃金數萬斤又曰齊永明中林邑王范文賛遣使貢獻梁天監中文賛子天凱奉表獻白猴自此貢獻不絶北史曰林邑國延袤數}
