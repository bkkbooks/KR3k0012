  - {type: variant, offset: 3991, length: 0, content: '', WYG: 吉蔑國自神龍以後真臘分為二半以南近海多陂澤處謂之水真臘半以北多山阜處謂之陸真臘亦謂之文單國髙宗則天𤣥宗朝並遣使朝貢水真臘國其境東西南北約皆八百里東至奔陀浪洲西至墮羅鉢底國南至小海北即陸真臘其王所居城號婆羅提㧞國之東界有小城皆謂之國其國多象元和八年遣李摩郍等来朝參半國唐書曰武德中參半國遣使朝貢其國在真臘西南千餘里城臨}
