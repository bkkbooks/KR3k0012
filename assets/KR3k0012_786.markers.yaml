  - {type: variant, offset: 3714, length: 3, content: 蒼梧鬱, SBCK: 郡舟行六十日而南接車渠國西有朱江國其王姓刹利氏名質多斯郍自其祖漸己強盛至質多斯郍遂兼扶南而有之死子伊奢郍先代立居伊奢郍城郭下二萬餘家城中有一大堂是王聽政之所其王三日一朝坐五香七寳床上施寳帳帳以文木爲竿象牙金鈿爲壁狀如小屋懸金光熖有同於赤土前有金香炉二人侍側王着朝霞古貝暪絡腰腹下垂至脛頭戴金寳花冠披眞珠瓔珞足履革屣耳懸金璫常服白疊以象牙爲屩有五大臣一曰􅀌落支二曰髙相慿三曰婆阿多陵四曰舎磨陵五曰髯羅婁及諸小臣朝於王者輙於階下三稽首王喚上階則跪以兩手抱􅈩遶王還坐議政事訖跪伏而去其國與參半朱江二國和親數與陁桓}
  - {type: page-break, offset: 3714, content: '', id: KR3k0012_SBCK_786-9a}
  - {type: variant, offset: 3714, length: 3, content: 蒼梧鬱, WYG: 郡舟行六十日而至南接車渠國西有朱江國其王姓刹利氏名質多斯􅄼自其祖漸已强盛至質多斯􅄼遂兼扶南而有之死子伊奢􅄼先代立伊奢􅄼城郭下二萬餘家城中有一大堂是王聽政之所其王三日一朝坐五香七寶牀上施寶帳以文木為竿象牙金鈿為壁狀如小屋懸金光熖有同於赤土前有金香爐二人侍側王着朝霞古貝瞞絡腰服下垂至脛頭戴金寶花冠披真珠瓔珞足履革屣耳懸金璫常服白疊以象牙為屩有五大臣一曰孤落支二曰髙相憑三曰婆何多陵四曰舍摩陵五曰髯多婁及諸小臣朝於王者輙於階下三稽首王喚上階則跪以兩手抱􅈩遶王環坐議政事訖跪伏而去其國與參半朱江二國和親數與陀桓}
