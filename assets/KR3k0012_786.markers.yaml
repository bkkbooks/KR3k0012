  - {type: variant, offset: 2417, length: 302, content: 溫泉古老相傳此泉元出鹽于今水有鹽氣縣西一獨山有石穴有二大石並立穴中相去一丈俗名為陰陽石陰石常濕陽石常燥盛弘之荊州記曰昔廩君浮夷水射鹽神于陽石之上按今施州清江縣江水一名夷水一名鹽水源出清江縣西都亭山水經曰夷水別出巴郡魚復縣注云水色清照十丈分沙石蜀人見澄清因名清江板楯蠻後漢書曰板楯蠻者秦昭襄王時有一白虎常從群虎數遊秦蜀巴漢之境傷害千餘人昭王乃募國中有殺虎者賞邑萬家時有巴郡閬中夷人能作白竹之弩乃登樓射殺白虎昭王嘉之以其夷人不欲加封乃刻石盟要復夷人頃田不租十妻不筭一戶免其一頃田之租稅雖有十妻不輸口筭之錢也傷人者論殺人得以倓錢贖死何承天纂文曰倓蠻夷贖罪貨也倓音徒濫也盟曰秦犯夷輸黃龍一雙夷犯秦輸清酒一鍾夷人安, SBCK: ''}
