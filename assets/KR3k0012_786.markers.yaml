  - {type: variant, offset: 69, length: 134, content: 麋人率百濮聚於選將伐楚選楚地百濮夷也於是申息之北門不啟又曰楚子聞蠻氏之亂也與蠻子無質也質信也使然丹誘戎蠻子嘉殺之遂取蠻氏又曰王子朝使告于諸侯曰茲不穀震蕩播越竄在荊蠻未有攸底詩曰蠢爾蠻荊大邦為讎蠢動也蠻荊荊州之蠻也又曰脩爾車馬弓矢戎兵用戒戎作用逷蠻方蠻方蠻荊之外也此時中, SBCK: 白頭}
