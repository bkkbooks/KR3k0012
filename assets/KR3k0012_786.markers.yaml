  - {type: variant, offset: 4003, length: 4, content: 為銅鼓釵, SBCK: 婆多利􅀕用人肉毎年殺人以夜祀禱大業十三年遣使貢獻帝厚礼之其後亦絶唐書曰真臘國貞觀二年又與林邑國俱來朝獻太宗嘉其歴逺疲勞􅃬賚甚厚南方人謂真臘國爲吉􅑪國自神龍以後真臘分爲二半以南近海多陂澤處謂之水真臘半以北多山阜處謂之陸真臘亦謂之文單國髙宗則天玄宗朝並遣使朝貢水真臘國其境東西南北約皆八百里東至奔陁浪州西至墮羅鉢底國南至小海北即陸真臘其王所居城號婆羅是㧞國之東界有小城皆謂之國其國多象元和八年遣李摩郍等來朝貢叅半國唐書曰武德中叅半國遣使朝貢其國在真臘西南千餘里城臨大海土地下濕}
