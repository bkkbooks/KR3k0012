  - {type: variant, offset: 3934, length: 0, content: '', WYG: 石閔崔鴻十六國春秋後趙録曰石閔字永曾虎之養孫也父瞻字𢎞武本姓冉名良魏郡内黄人也其先漢黎陽騎都督累世牙門勒破陳午於河内獲瞻時年十二長而勇悍便弓馬臨陣不顧勒奇之曰此兒壯健可嘉命虎子之厯位左積射將軍封西華侯閔幼而果銳虎撫之如孫及長身長八尺善謀勇力絶人虎即位封為修武侯厯位北中郎將虎之敗於昌黎閔軍獨全由此功名大顯永興元年閏月司徒申鍾司空即闓等四十八人上尊號於閔僣皇帝位於南郊大赦改元號稱大魏復姓冉氏追尊親隆元皇帝考瞻烈祖皇帝尊母王氏為太后妻董氏為皇后子智為皇太子以司馬李農為太宰諸子皆封為縣公新興王祗聞石鑒之死稱尊號於襄國改年永寧石祗遣相國汝隂王石琨帥衆十萬伐鄴六月進據邯鄲閔盡衆拒之琨軍大敗二年三月閔攻襄國百餘日祗怯乃去皇帝之號改稱趙王遣太尉張奉乞師于慕容雋中軍張春請救於姚弋仲三月祗相國汝隂王琨自兾州救祗弋仲復遣子襄帥騎三萬八千雋遣將軍恱綰帥甲士三萬勁卒十三萬四方攻之祗衞其後閔師大敗閔與千萬騎奔還鄴祗使劉顯帥衆十萬追奔伐鄴閔盡衆出戰大敗之追奔至於陽平顯懼密使請降求殺石祗為効四月劉顯殺祗及其丞相樂安王炳太保張舉等遣拜顯上大將軍大單于單州牧祗炳皆虎之庶子也七月劉顯稱尊號襄國三年二月劉顯帥衆伐常山太守蘇彦告難閔帥八千救彦敗顯于常山追奔及于襄國顯大將軍曹伏駒開門為應遂入襄國誅顯及其公卿已下百餘人焚襄國宫室遷其民于鄴三月慕容雋已尅幽薊畧地至于兾州閔帥騎擊之與慕容恪遇於魏昌城恪方陣而前閔衆寡不敵所乗赤馬曰朱龍日行千里潰圍東奔行二十餘里馬無故而死遂為恪所禽送之于薊雋立閔而問之曰汝奴僕下才何敢妄稱天子閔曰天下大亂爾曹夷狄人面獸心尚欲簒逆我一時英雄何為不可作帝王耶雋怒鞭之三百遣慕容評帥衆圍鄴五月送閔於龍城告廆皝廟而殺之鄴中飢人相食虎時宫人被食畧盡冉智尚幼蒋幹遣詹事劉猗奉表降晉八月長水校尉馬願龍驤將軍田香開門隆評蒋幹懸縋而下奔于倉垣評送閔后董氏太子智太尉申鍾及諸王公卿于薊初慕容雋斬閔於遏陘山山左右七里草木悉枯蝗䖝大起自五月不雨至於十二月雋遣使者祀之諡曰武悼天王其日大雨雹是嵗太和八年也太平御覽卷一百二十}
