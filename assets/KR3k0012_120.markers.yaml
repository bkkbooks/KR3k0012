  - {type: variant, offset: 1087, length: 0, content: '', SBCK: 頋謂左右曰向胡鶵吾觀其聲視有竒志恐將爲天下之患馳遣收之㑹勒巳去石􅀪崔鴻十六國春秋後趙録曰石􅀪字大雅第三子母程夫人右光禄遐之妹建平元年立爲太子虚衿受士好爲文詠其所親昵莫非儒素勒謂徐光曰大雅愔愔殊不似將家子光曰漢祖以馬上取天下孝文以􅀇黙治之聖人之後必丗勝殘天之道也勒大恱程遐言於勒曰中山怏怏不可以輔少主宜早除之以便大計勒不從勒薨虎執政臨軒召子兾州刺史遂帥兵入禁􅀫衞文武無不奔散􅀪大懼䇿拜中山王虎爲丞相以十三郡封爲魏王又加九錫虎僞讓後乃授之延熈元年七月改頓丘爲衛國分魏郡立􅀺陽}
