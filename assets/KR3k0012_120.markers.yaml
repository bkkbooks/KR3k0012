  - {type: variant, offset: 1103, length: 3, content: 為元熙, SBCK: 劉琨送勒母王及虎于􅁑陂時年十七殘忍好馳獵諠遊無紀度尤善彈人軍中毒患之勒白王曰此兒凶􅁀無使軍人煞之聲名可惜宜自除也王曰快牛犢子小時多能破車爲復小忍勿怯之至十八檢攝恭謹嚴重愛士弓馬迅健勇􅃣當時勒深嘉焉拜征虜將軍性酷虐無道軍中勇幹䇿略與已侔者輙因事害之至於降城䧟壘坑斬士女鮮有遺􅀋勒屢加責誨而行意自􅀂然御衆嚴而不頗莫敢犯者指授攻討所向無前故勒寵信弥隆杖以專征之任旣廢殺􅀪稱居攝趙大王建武}
