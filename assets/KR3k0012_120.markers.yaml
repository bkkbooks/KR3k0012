  - {type: variant, offset: 1701, length: 293, content: 籌卿與武子俱得九籌卿贈朕柘弓銀硯頗憶不帝曰臣敢忘之但恨爾曰不早識龍顏聰曰卿家骨肉相殘何其甚也帝曰此殆非人事皇天之意大漢將應乾受曆故為陛下自相驅除且臣家若能奉武帝之業九族敦睦者陛下何由得之三年正月醼於光極前殿逼晉帝行酒庾珉王雋等起而大哭聰惡之二月丁未懷帝崩于平陽於是誅珉等三月立貴嬪劉氏為皇后四月愍帝即位於長安車騎曜等攻長安河東地震雨于平陽建元元年正月黑霧四塞著人如墨五日而止辛酉庚時日落地三月相承出於西方東行平陽地震崇明觀陷為池水赤如血赤氣至天有赤龍奮迅而去流星起于牽牛入紫微龍形逶迤其光照地落于平陽北十里視之則肉臭聞于平陽長三十步廣二十七步肉旁常有哭聲晝夜不止聰甚惡之癸未劉后產一虵一, WYG: 石}
