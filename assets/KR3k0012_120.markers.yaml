  - {type: variant, offset: 347, length: 1, content: 字, WYG: 拜為輔漢將軍晉平王淵薨聰襲位劉曜王彌圍洛陽勒帥精騎二萬㑹之王彌既平洛陽將先誅勒勒請彌燕于己營手斬彌而并其衆將軍郭墨畧獲天竺沙門佛圖澄以其有道術見於勒試之有効甚尊重之前趙嘉平二年張賔說勒曰邯鄲襄國趙之舊都依山憑險形勢之固可擇此二邑而都然後命將四出授以奇略王業可圗石勒於是進據㐮國聰授勒都督幽冀并營四川諸軍事冀州牧進封本郡公邑萬户三年以征虜將軍為魏郡太守鎮鄴三臺基謀之崩由於此矣前趙嘉麟}
