  - {type: variant, offset: 3001, length: 1, content: 族, WYG: 勒怒之白母王氏曰此兒凶暴無度使軍人殺之聲名可惜不若自除之母曰徤犢走車破轅且當小忍勿便殺也至十八檢攝恭謹嚴重愛士弓馬迅捷勇冠當時勒深喜焉拜征虜將軍性酷虐無道軍中勇幹策畧與已侔者輒因事害之至於降城陷壘坑斬士女鮮有遺類勒屢加責誨而行意自若然御衆嚴而不煩莫敢犯者指授攻討所向無前故勒寵信彌隆任以専征之任既廢殺𢎞稱居攝趙大王建武元年正月大赦改元虎荒遊廢政外耽營繕使太}
