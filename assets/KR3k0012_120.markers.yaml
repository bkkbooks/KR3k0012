  - {type: variant, offset: 3008, length: 2, content: 淵幼, WYG: 其中東西七十五步南北六十五步皆漆瓦金鐺銀楹金柱珠簾玉璧窮極伎巧起靈風室九殿於顯陽後選召百官州郡民女以充之後庭服綺縠玩珍奇者萬餘人内置女官十八等教宫人星占及馬步射置女太史于靈臺仰觀灾祥以考外太史之虛實禁郡國不得私學星䜟左校令成公段造庭燎于崇杠之末髙十餘丈上盤置燎下盤置人絙繳上下虎試}
