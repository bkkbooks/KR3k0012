  - {type: variant, offset: 1076, length: 0, content: '', krp: 事大赦八月羣臣又固請以名位不正宜即尊號九月僣即皇帝位大赦改年正月勒南郊有白氣自壇属天勒大恱四月勒如鄴議營新宫廷尉續咸諌曰臣聞唐虞}
  - {type: variant, offset: 1077, length: 0, content: '', SBCK: 治採􅁺茅茨土堦三尺羙彰于詩書漢文惜百金不營露臺稱之於千古迨夏啇之瓊臺瑶室楚秦章華阿房資財内竭華夷外叛詔曰且勑停作申吾直臣之氣九月以太尉中山王虎爲大司馬程遐開府儀同是月犬雨霖中山西北􅁀水流巨木萬餘根集于堂陽勒大恱謂公卿曰此非爲灾天意欲吾營鄴都耳於是營之勒以成周漢晉舊京欲有移都之意乃命洛陽爲南都置行臺治書侍御史于洛陽三年正月大饗于建德殿酒酣勒謂徐光曰朕方自古開基何等主也光對曰陛下神武籌略邁于髙皇雄藝卓犖超絶魏祖自三王巳來無可比也其軒轅之亞乎勒􅀏曰人豈不自知卿言亦巳太過朕􅀂逢髙皇當北面而事之然猶與韓彭競鞭而爭先耳脫遇光武者當並驅于中原未知鹿死誰手丈夫行事當礧礧落落如日月皎然終不能如曹孟德司馬仲逹父子欺他􅀌兒寡婦狐媚以取天下朕在二劉之間軒轅豈所擬乎羣臣皆稱萬歳四年雍州刺史石生上言西郷竹死虵䑕􅃲于安定府間二日虵死臨涇馬生角長安城中雞鳴音皆曰基兹安定㕔事前夜聞誦書聲求之不得七日乃止隕石于肥郷六月勒寢疾召中山王虎太子􅀪中常侍嚴震等侍疾禁中七月薨于西閤僞謚明皇帝廟}
  - {type: page-break, offset: 1077, content: '', id: KR3k0012_SBCK_120-4a}
