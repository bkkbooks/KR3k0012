  - {type: variant, offset: 651, length: 395, content: 而生淵淵生左手有文曰淵海𨔵以名焉幼而好學不捨晝夜常謂同門生朱紀范隆等曰吾每觀書傳常鄙隨陸之無武絳灌之無文一物之不知固君子恥之也二生遇高皇不能建封侯之業兩公屬太宗不能開庠序之美惜哉於是學武事並皆工絕猨臂善射膂力過人身長八尺四寸鬚長三尺餘當心有赤毫毛三根長三尺六寸太原王渾虛衿友之命子濟拜焉咸熙中為任子在洛陽晉文王深待之時東萊王彌等皆憑結渾言之於晉武帝帝召見與言大悅之後謂王濟曰劉元海容貌風儀機談鑒智雖由余日磾無以加也會父豹卒帝以淵代為左部帥轉寧朔將軍監五部軍事大安中惠帝失政諸王迭相殘廢州郡奸豪所在蜂起從祖北部都尉右賢宣等議曰右賢淵姿器絕人幹宇超世天下恢崇單于終不虛生此人也於是共推淵為大單于淵曰當為崇崗峻阜何能為培螻乎夫帝王豈有常哉大禹生於西戎文王生於東夷顧惟德所授耳今見眾十餘萬皆一當晉十鼓行摧亂晉猶拉枯耳上可成漢高之業下不失為魏氏何呼韓耶足道哉宣等稱善元熙元年遷於左國城晉人東附者數萬宣, WYG: 車騎石虎}
