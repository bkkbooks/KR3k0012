  - {type: variant, offset: 3396, length: 538, content: 五丈以銅為棺槨黃金飾之臣聞堯葬穀林市不改肆顓頊葬廣陽下不及泉聖王之終也如是秦始皇下固三泉周逾七里身亡之後毀不旋踵闇王之終也如此從喪亂已來漢帝諸陵咸見踐辱唯霸陵獨會此雖太宗之達至然抑亦釋之之功興亡奢儉然於前唯陛下覽之曜大悅終南山崩崩所得白玉一尺有字曰皇亡皇亡敗越昌以為己瑞群臣咸賀中書監劉均曰山崩石壞國傾民亂皇亡皇亡敗越昌者此言皇室將為趙所敗趙因之而昌大趙都於秦雍而勒跨全趙趙昌之應當在石勒不在我也曜撫然改容五年曜后羊氏卒故晉惠后也洛陽之陷納之六年正月天裂廣一丈餘長五十丈十一年七月石虎帥眾四萬人寇擾河東進攻蒲攻曜盡中外精銳自潼關北濟虎懼引師而還曜追而敗之枕尸二百餘里虎奔朝歌遂攻石生于金墉分遣諸將攻討汲郡河內十二月勒自帥眾拒之陣于洛西曜性少酗酒末年尤甚將戰飲數斗常乘赤馬無故跼頓乃乘小馬比出復飲斗餘至于西陽門撝陣就平勒將石堪因而乘之師遂大潰曜昏醉奔退馬陷石渠墜于水上為堪所執勒將還襄國喻曜使與太子毗書令速降但勑毗與諸大臣匡維社稷勿以吾易意建平末為勒所殺十二年正月太子毗大司馬南陽王胤等議欲西保秦州遂相率奔上邽石虎乘勝追戰枕尸千里上邽潰虎執毗及王公已下三千餘人皆殺之自劉淵建號西河至是二十有六載晉書載記曰曜在位十年而敗始元海以懷帝永嘉四年僣立至曜三世凡二十有七載以成帝咸和四年滅, SBCK: ''}
