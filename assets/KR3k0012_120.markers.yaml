  - {type: variant, offset: 1565, length: 0, content: '', SBCK: 以司馬李農爲太宰諸子皆爲縣公新興王祗聞石鍳之死稱尊號于襄國改年永寜石祗遣相國汝隂王石琨帥衆十萬伐鄴六月進據邯鄲閔盡衆拒之琨軍大敗二年三月閔改襄國百餘日祗懼乃去皇帝之號改稱趙王遣太尉張舉乞師于慕容㑺中軍張春請救于姚弋仲三月祗相國汝隂王琨自兾州救祗弋仲遣子襄帥􅀐三萬八千儁遣將軍恱綰帥甲士三萬勁卒十三萬四方攻之祗衛其後閔師大敗閔與十餘􅀐奔還鄴祗使劉顯師衆七萬追奔伐鄴閔盡衆岀戰大敗之追奔至于陽平顯懼宻使請降求煞石祗爲効四月劉顯煞祗}
  - {type: page-break, offset: 1565, content: '', id: KR3k0012_SBCK_120-9a}
