  - {type: variant, offset: 3003, length: 4, content: 少孤見養, WYG: 䆳還省以書奏事選守牧祀郊廟惟征伐刑斷乃親覽之四月南遊臨江而還京師大震是月觀省臺城賜匠有差九月遷都鄴宫三年徙洛陽鍾􅒶九龍翁仲等于鄴是嵗太武殿東西宫皆就太武殿基二丈八尺下穿伏室置衛士五百人}
