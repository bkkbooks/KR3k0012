  - {type: variant, offset: 1926, length: 432, content: 奮迅而去流星起于牽牛入紫微龍形逶迤其光照地落于平陽北十里視之則肉臭聞于平陽長三十步廣二十七步肉旁常有哭聲晝夜不止聰甚惡之癸未劉后產一虵一虎各害人而走尋之不得頃之見在隕肉旁己丑劉氏卒乃失此肉哭聲亦止十一月以晉王粲為國相大單于總百揆十二月宣光陵石人皆行數步宮中鬼哭麟嘉元年武庫陷入地一丈五尺聰自去冬至是遂不復受朝賀軍國之事一決於粲立市於後庭與宮人讌戲或三日不醒七月河東大蝗唯不食粟豆司隸靳准率部民牧而埋之哭聞于十餘里然後鑽土飛出復食黍豆大司馬曜攻陷長安外城九月犬與豕交于宮門有豕著進賢冠昇聰御唑犬冠帶綬與豕並昇俄而鬥死殿上宿衛莫有見其入者長安飢甚死半麴允為粥以供帝膳帝泣曰今窘厄如此外無救援勢不自支乃使侍中宗敞奉牋降曜敞隨使者至帝內祖牽羊輿襯銜壁出降東門曜受璧焚襯遷愍帝及司徒梁汾驃騎麴允等諸臣百餘人至于平陽聰臨光極殿帝稽顙于前麴允伏地大哭扶不能起聰大怒允自殺以帝為光祿大夫懷安侯以大司馬曜假黃鉞大都督陜西諸軍事太宰秦王二年正月東平王約卒十一月聰校獵上林以晉帝行車騎大, SBCK: 驤}
