  - {type: variant, offset: 2566, length: 195, content: 癸亥薨于建始殿甲子粲即位大赦改年漢昌葬宣光陵為謚昭武皇帝廟號烈宗八月以丞相曜為相國大都督司空靳准為將軍領尚書事粲荒酗酒色遊讌後庭軍國之事一決於准准𨔵勒兵入宮執粲數而殺之追謚靈帝劉氏無少長男子盡刑于市發掘二陵焚燒宗廟鬼大哭聲聞百里准自號漢大王置百官遣使稱蕃于晉相國曜自長安赴難前趙錄曰麟嘉元年十二月大將軍東平王約卒一指猶煖遂不殯殮至甲戍乃蘇言見淵於不周山經五日遂復從至崑崙山三日而復反於不周見, SBCK: 申鍾及}
