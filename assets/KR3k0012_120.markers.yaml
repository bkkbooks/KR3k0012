  - {type: variant, offset: 3011, length: 4, content: 聰惠性託, WYG: 恱之三年太保安䕫等文武五百九人上皇帝尊號安等方入而庭燎油灌下盤死者七人虎大怒腰斬成公段于閶闔門辛巳即天王位大赦親王貶為郡公藩王為縣侯太子䆳總百揆其後荒酒淫色驕恣無道或盤遊于田浹旬不返或夜百騎宿于宫臣家淫其妻妾裝飾宫人美淑者斬首洗血置于盤上傳共視之又納諸比丘尼有姿色者與之交䙝而殺之合牛羊肉煮而食之亦賜左右所以識其味也虎荒耽内遊威刑失度䆳以事為可呈呈之虎怒曰小事何足呈也時有所不聞復怒曰何以不呈誚責杖捶月至再三䆳甚恨私謂中庶子李顔等曰官家難稱吾欲行冐頓之事卿從我乎顔等伏不敢對事發幽䆳于東宫殺之及妃張氏并男女二十六人盡賜死合一棺埋之誅其宫臣友黨二百餘人立河間公宣為太子建武六年追尊皇考樂平敬公為太宗孝皇帝八年六月上黨孟門上有神人之像坐于山上三日而去虎遣使以太牢祀之九年十二月武鄉送雄虎變為雌産一狼子日噬虎腦而殺之後三日狼子亦死佛圗澄聞之流涕十年虎起河橋於靈昌津採石為中濟石無大小輒隨流用工五日餘不成虎如靈昌津沉壁告誠壁浮于渚水波上騰津所殿觀莫不傾壊壓死者百餘人虎恚甚斬工匠而還十一年發雍梁十六萬人成長安未央宫既又發豫荆兖二十六萬人成洛陽宫十三年二月虎親耕籍田于桑梓苑十四年三月虎夢龍飛西南自天}
