  - {type: variant, offset: 1571, length: 1, content: 二, WYG: 孝文以𤣥黙守之聖人之後必世勝殘天之道也勒大恱程遐言於勒曰中山怏怏不可以輔少主乞早除之以便大計勒不從勒薨虎執政臨軒収程遐等召子䆳將兵入宿衛文武無不奔散𢎞大懼策拜中山王虎為丞相以}
