  - {type: variant, offset: 3905, length: 0, content: '', WYG: 咸康}
  - {type: variant, offset: 3906, length: 7, content: 海以懷帝永嘉四, WYG: ''}
  - {type: punctuation, offset: 3916, content: ，, id: KR3k0012_CHANT_120-bkkpn849}
  - {type: 'tls:seg', offset: 3916, content: '', id: KR3k0012_CHANT_120-6a.6}
  - {type: variant, offset: 3917, length: 1, content: 曜, WYG: 此太和六年凡在位十五年世子即位尊劉后為太后彭城王遵先鎮關右至是勒兵而還戎卒九萬次于蕩隂石閔為前鋒都督太后令授遵丞相加九錫增封十郡己丑至安陽亭貫甲耀兵入自鳯陽門升太武前殿盡哀退如東閣羣臣敦勸即位大赦封世為譙王邑萬户廢太后劉氏為昭儀尋皆殺之世立凡}
  - {type: page-break, offset: 3917, content: '', id: KR3k0012_WYG_120-12a, image: WYG0894/WYG0894-0132c.png}
  - {type: variant, offset: 3919, length: 1, content: 世, WYG: 十三日尊其母鄭氏為皇太后立妃張氏為皇后大司馬義陽王鑒為太傅沛王沖為太保石閔為都督中外諸軍事錄尚書事甲午太武殿灾諸門觀閣蕩然其乗御服燒者大半光熖照天月餘乃滅己未雨血周徧鄴城六月𦵏虎顯原陵偽諡武皇帝廟號太祖十一月石閔刼司空李農及右衛王基密謀共廢遵閔使將軍蘇彦周成帥甲士三十八人執遵于南臺如意觀遵時方與婦人彈碁問周成等曰反者誰也成曰義陽王鑒當立遵曰我尚如是汝等立鑒復能㡬時遂殺之于琨華殿誅鄭太后張皇后遵字大祗虎第九子}
  - {type: page-break, offset: 3919, content: '', id: KR3k0012_WYG_120-12b, image: WYG0894/WYG0894-0132d.png}
  - {type: punctuation, offset: 3920, content: ，, id: KR3k0012_CHANT_120-bkkpn850}
  - {type: 'tls:seg', offset: 3920, content: '', id: KR3k0012_CHANT_120-6a.7}
  - {type: variant, offset: 3921, length: 0, content: '', WYG: 在位者百八十三日鑒即位大赦以石閔為將軍封武徳王李農為大司馬鑒使中書令李松殿中將軍張才等夜誅閔農等于琨華殿不克禁中擾亂鑒偽不知夜斬松才於西中華門龍驤將軍孫伏都劉銖等結羯士三千人伏於朝天門亦欲誅閔等時鑒在中臺伏都帥三十餘人將升臺挾鑒以攻之鑒見而問其故伏都曰閔農等反已在東掖門臣嚴帥衛士謹先啟知鑒曰卿好陳力勿憂無報也伏都等攻閔不尅閔農攻斬伏都等自鳯陽門至琨華横尸相枕諸胡羯無少長皆斬之死者}
  - {type: page-break, offset: 3921, content: '', id: KR3k0012_WYG_120-13a, image: WYG0894/WYG0894-0133a.png}
  - {type: variant, offset: 3923, length: 0, content: '', WYG: 餘萬人于時髙鼻多鬚至}
  - {type: variant, offset: 3924, length: 0, content: '', WYG: 濫死者青龍初元年正月石閔欲滅二石之號議曰孔子曰死姓而王}
  - {type: variant, offset: 3925, length: 1, content: 載, WYG: 月者七十有三國繼趙李䜟書炳然且徳星鎮衞宜改號大衛復姓冉氏又大赦閏月改元廢鑒殺之誅虎孫三十八人盡殪石氏鑒在位一百三日鑒字大郎虎第三子也晉書曰季龍十三子五人為冉閔所殺八人自相殘害初䜟言㓕石者陵尋而石閔封蘭陵公季龍惡之改蘭陵為武興郡至是終為閔所滅石勒}
  - {type: page-break, offset: 3925, content: '', id: KR3k0012_WYG_120-13b, image: WYG0894/WYG0894-0133b.png}
