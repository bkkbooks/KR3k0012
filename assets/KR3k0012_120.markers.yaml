  - {type: variant, offset: 1110, length: 0, content: '', krp: 改年虎志荒内遊外躭營繕使太子邃省可尚書奏事選守牧祀郊廟征伐刑断乃親覽之三月南遊臨江而還江東大震是日鶴省臺成賜匠有差九月遷都鄴宫二年徙洛陽鍾簴九龍等于鄴是歳大武殿東西宫皆就大武殿基二丈八尺穿爲伏室置衛士五百人於其中東西七十五歩南北六十五歩皆􅃮瓦金璫銀楹珠簾玉壁窮極伎巧起靈臺之殿于顯陽後採召百官州郡民女以充之後庭服綺榖珎竒者萬餘人内置宫女十八等教宫人星占及馬歩射置女太史靈臺仰觀災祥以考外太史虚實禁郡國不得私知學星䜟左校令成公叚造庭燎于崇杠之末髙十餘丈上置繚下盤置人絙繳上下虎試而恱之三年太保安夔等文武五百九十人上皇帝尊號勸進方入而庭燎油灌下盤死者七人虎大怒腰斬成公叚于閶闔門即}
  - {type: variant, offset: 1111, length: 1, content: 下, SBCK: 王位南郊大赦親王貶爲郡公蕃王爲縣侯太子邃㹅百揆其後荒酒淫色驕恣無道或盤于遊畋懸管而入或夜百􅀐􅀫于宫臣家淫其妻妾裝飾宫人羙淑者斬首洗血置盤上傳首視之又内諸比丘尼有姿色者與其交䙝後煞之合牛羊􅁏煑而食亦賜左右所以識其味也虎荒躭内遊威怒違度􅃉以事可呈之怒曰此小事何足呈也時有所不聞復怒曰何以不呈誚責杖捶月至再三􅃉甚愠私謂中庶子李顔等曰官家難稱吾欲行冒頓之事卿從我乎顔等伏不敢對事發幽􅃉于東宫殺之及妃張氏男女二十六人盡賜死合一棺埋之誅其宫臣友黨二百餘人立河間公宣爲太子建武六年}
