  - {type: variant, offset: 51, length: 283, content: 後三十六年也重華自稱涼王後一年冉閔據鄴稱魏後一年符健據長安稱秦慕容氏先據遼東稱燕是歲自符健後一年也儁始僣號後三十一年後燕慕容垂據鄴後二年西燕慕容冲據阿房是歲也乞伏國仁據枹罕稱秦後一年慕容求據上黨是歲也呂光據姑臧稱涼後十二年慕容德據滑臺稱南燕是歲也禿髮烏孤據廉川稱南涼叚業據張掖稱北涼後三年李玄盛據燉煌稱西涼後一年沮渠蒙遜殺叚業自稱后涼四月譙縱據蜀稱成都王後二年赫連勃勃據朔方稱大夏後二年馮跋殺離班據和龍稱北燕堤封天下十喪其八莫不龍旌帝服建社開祊華夷咸暨人物斯在或篡通都之鄉或擁數州之地雄圖內卷師旅外并窮兵凶於勝負盡人命於鋒鏑其為戰國者一百三十六載抑元海為之禍首云劉淵, SBCK: ''}
