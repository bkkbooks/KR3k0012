  - {type: variant, offset: 1995, length: 988, content: 各害人而走尋之不得頃之見在隕肉旁己丑劉氏卒乃失此肉哭聲亦止十一月以晉王粲為國相大單于總百揆十二月宣光陵石人皆行數步宮中鬼哭麟嘉元年武庫陷入地一丈五尺聰自去冬至是遂不復受朝賀軍國之事一決於粲立市於後庭與宮人讌戲或三日不醒七月河東大蝗唯不食粟豆司隸靳准率部民牧而埋之哭聞于十餘里然後鑽土飛出復食黍豆大司馬曜攻陷長安外城九月犬與豕交于宮門有豕著進賢冠昇聰御唑犬冠帶綬與豕並昇俄而鬥死殿上宿衛莫有見其入者長安飢甚死半麴允為粥以供帝膳帝泣曰今窘厄如此外無救援勢不自支乃使侍中宗敞奉牋降曜敞隨使者至帝內祖牽羊輿襯銜壁出降東門曜受璧焚襯遷愍帝及司徒梁汾驃騎麴允等諸臣百餘人至于平陽聰臨光極殿帝稽顙于前麴允伏地大哭扶不能起聰大怒允自殺以帝為光祿大夫懷安侯以大司馬曜假黃鉞大都督陜西諸軍事太宰秦王二年正月東平王約卒十一月聰校獵上林以晉帝行車騎大將軍戎服執戟前導行三驅之禮觀者皆指帝曰此故長安天子聚而觀之故老亦有悲泣者十二月大饗于光極前殿聰欲觀晉臣之意使帝行酒洗爵更衣又使帝執蓋多有涕泣或有失聲者尚書郎辛賓起而抱帝大哭引出斬之戊戍愍帝崩于平陽三年聰所居螽斯則百堂災會稽王康已下二十一子焚焉而卒自此鬼哭宮至於九月夜聲不絕四月尚書令王監崔懿之等極諫聰大怒收監等斬之秋七月鬼哭于光極殿聰晝見東平王約甚惡之徵秦王曜為丞相錄尚書事固辭仍以丞相領雍州收靳准為大司空領司隸校尉癸亥薨于建始殿甲子粲即位大赦改年漢昌葬宣光陵為謚昭武皇帝廟號烈宗八月以丞相曜為相國大都督司空靳准為將軍領尚書事粲荒酗酒色遊讌後庭軍國之事一決於准准𨔵勒兵入宮執粲數而殺之追謚靈帝劉氏無少長男子盡刑于市發掘二陵焚燒宗廟鬼大哭聲聞百里准自號漢大王置百官遣使稱蕃于晉相國曜自長安赴難前趙錄曰麟嘉元年十二月大將軍東平王約卒一指猶煖遂不殯殮至甲戍乃蘇言見淵於不周山經五日遂復從至崑崙山三日而復反於不周見諸王公卿將相死者悉在大有人民宮室甚壯麗號曰蒙珠離國淵謂約曰東北遮須夷國無主久待汝父為之汝後二年當來後國中大亂相殺害吾家死亡略盡俱可永明輩十數人在耳汝伹還後年當來見汝不遟不久約拜辭而歸道過一國曰猗尼渠餘國引約入宮與皮囊一枚曰為吾遺漢皇帝約辭而歸謂約曰劉郎後年來必見過當以女相妻約歸置皮囊於机上俄而蘇謂左右曰机上取囊來左右取得開有一方白玉題文曰猗尼渠餘國天王敬信遮須夷國天王歲在攝提當相見馳使奏呈聰曰若當如此吾不懼死也及聰以戊寅歲薨與此玉并葬焉劉曜, WYG: ''}
