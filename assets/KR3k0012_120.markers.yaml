  - {type: variant, offset: 341, length: 0, content: '', SBCK: 後趙録曰石勒字丗龍上黨武郷羯人父周易朱勒生時赤光滿室白氣自天屬于庭中長而壯健有膽力雄武好􅀐射幼而力耕毎聞鞞鐸之聲或在前後懼以告父母曰勞耳鳴無不祥也㑹并州刺史司馬騰執諸胡山東賣充軍實將詣兾州兩胡一枷勒亦在中東至平原賣荏平人師懽爲奴毎夜於野嘗聞鼔角之聲諸奴亦聞歸以白灌懽竒而免之隣於馬牧率汲桑往來勒以能馬自託於桑而傭武安臨水爲遊軍所囚㑹有羣鹿傍過軍人競逐之勒乃獲免俄而見一老父謂勒曰羣鹿者我也君應爲中州主故相救耳勒拜而受命遂招集王陽䕫安等十八􅀐復東如赤龍􅀐諸􅁐中乗􅁐馬逺掠繒寳以賂汲桑永興元年􅀜東所在兵起二年陽平人公師蕃等自稱將軍起兵趙魏衆至數萬勒與汲桑率牧人乗􅁐馬數百􅀐以赴之桑始命勒以石爲姓以勒爲名永嘉元年勒歸劉淵淵拜爲輔漢將軍平晉王淵薨聦襲位劉曜王弥圍洛陽勒帥精􅀐三萬㑹之王弥旣平洛陽將先誅勒請弥讌于巳營手斬弥并其衆將軍郭黙獲沙門笁浮圖澄以其有道術進之於勒試澄有効甚尊重之}
