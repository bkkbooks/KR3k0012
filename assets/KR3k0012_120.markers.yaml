  - {type: variant, offset: 345, length: 0, content: '', WYG: 石勒字季龍上黨武鄉羯人父周曷朱勒生時赤光滿室白氣自天屬于庭中長而壯健有膽力雄武好騎射㓜而力耕每聞鞞鐸之聲或在前後歸以告其母母曰作勞耳鳴非不祥也㑹并州刺史司馬騰執諸胡山東賣充軍實將詣兾州兩胡一枷勒亦在中東至中原賣與茌平人師權為奴毎夜於野嘗聞皷角之聲諸奴亦聞歸以白權權奇而免之勒與馬牧帥汲桑往来勒以能相馬自託於桑而傭於武安臨水為遊軍所囚㑹有羣鹿旁過軍人競逐之勒乃獲免俄而見一老父謂勒曰向羣鹿者我也君應為中州主故相救耳勒拜而受命遂招集王陽䕫安等十八騎復東如赤龍諸苑中乗苑馬逺掠繒寳以賂汲桑永興元年關東所在盜起二年陽平人公師蕃等自稱將軍起兵趙魏衆至數萬勒與汲桑率牧人乗苑馬數百騎以赴之桑始命勒以石為姓以勒為名永嘉元年勒歸}
