  - {type: variant, offset: 1036, length: 0, content: '', SBCK: 纛天子禮樂於斯備矣三年􅀺陽民陳武妻産三男一女上書自陳令曰昔周之興也四乳八子今武妻乳四子可謂慶過􅁎祥羙加曩日其賜乳婢一人榖百石雜繒四十疋庶以肅迎嘉祥冬十月勒與郷親齒坐語及平生勒曰李陽壯士也􅀌方任之何以不來父老歸語令速來漚麻麻之忿是布衣之恨􅀌方崇信于天下寜讎疋夫乎令曰武郷吾之豐沛也其復之三丗十一月李陽至引入懽酣宣楊臂笑視之曰卿雖老臂中猶有力頗復與人闘不􅀌住曰厭卿老拳卿亦飽􅀌毒手賜甲第一拜爲都尉陽與勒隣居歳常爭漚麻池迭相敺擊四年二月拜子􅀪爲丗子勒雅好文學雖在軍旅之中常令儒生讀春秋史漢諸傳而聽之聞酈食其勸立六}
