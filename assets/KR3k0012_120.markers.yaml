  - {type: variant, offset: 3176, length: 228, content: 民庶故立漢祖宗之廟以懷民望昭武因循遂未悛革今欲除宗廟改國號御以大單于為太祖其速議以聞於是太保呼延晏等議曰今宜承晉母子傳號以光文本封盧奴中之屬城陛下勳功懋於平洛終於中山中山分野屬大梁趙也宜革稱大趙遵以水行曜從之於是以冒頓配天淵配上帝三年五月西明門內大樹風吹折一宿樹撥撥變為人形髮長一尺鬚眉三寸皆黃色白有歛手之狀亦有兩腳著履之形唯無目鼻每夜有聲十日而生柯條遂為大樹枝葉甚茂四年將於霸陵西南營壽陵侍中喬豫和苞上䟽諫曰伏聞勑旨營陵將周廻四十下深二十五丈以銅為棺槨黃, WYG: ''}
