  - {type: variant, offset: 1110, length: 0, content: '', SBCK: 改年虎志荒内遊外躭營繕使太子邃省可尚書奏事選守牧祀郊廟征伐刑断乃親覽之三月南遊臨江而還江東大震是日鶴省臺成賜匠有􅏔九月遷都鄴宫二年徙洛陽鍾簴九龍等于鄴是歳大武殿東西宫皆就大武殿基二丈八尺穿爲伏室置衛士五百人於其中東西七十五歩南北六十五歩皆􅃮瓦金璫銀楹珠簾玉壁窮極伎巧起靈臺之殿于顯陽後採召百官州郡民女以充之後庭服綺榖珎竒者萬餘人内置宫女十八等教宫人星占及馬歩射置女太史靈臺仰􅀚災祥以考外太史虚實禁郡國不得􅀻知學星䜟左校令成公叚造庭燎于崇杠之末髙十餘丈上置繚下盤置人絙繳上下虎試而恱之三年太保安夔等文武五百九十人上皇帝尊號􅂆進方入而庭燎油灌下盤死者七人虎大怒腰斬成公叚于閶闔門即}
