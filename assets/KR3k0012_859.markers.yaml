  - {type: variant, offset: 562, length: 9, content: 楊德祖為主簿侍坐人, krp: 郄嘉賔三伏之月詣謝公炎暑重赫雖當風交扇猶霑汗流離謝着故練衣食熱白粥郄謂謝曰自非君體幾不堪此又曰賔客詣陳大丘宿使元方季方炊太丘問炊何遟留元方長跪曰君與客語乃俱竊聽炊忘着米今皆成糜太丘曰尓頗}
  - {type: punctuation, offset: 568, content: ，, id: KR3k0012_CHANT_859-bkkpn191}
  - {type: 'tls:seg', offset: 568, content: '', id: KR3k0012_CHANT_859-8a.11}
  - {type: punctuation, offset: 570, content: 。, id: KR3k0012_CHANT_859-bkkpn192}
  - {type: 'tls:seg', offset: 570, content: '', id: KR3k0012_CHANT_859-8a.12}
  - {type: variant, offset: 572, length: 3, content: 餉酪者, krp: 所識不二子長跪俱說言無遺失大丘曰如此俱成糜自可何必飯耶俗說曰王東亭嘗之呉郡就汰公宿別汰公設豆藿糜自噉一大甌東亭有難色汰公強進半甌王薈別傳曰薈爲呉郡内史其年太飢薈出私財爲百姓饘粥風土記曰天正日南黄鍾踐長粥饘追萌微納休昌是以陽始牙動爲饘粥以養㓜扶微俗尚以赤豆爲糜所以象色也廣志曰遼東赤梁}
  - {type: punctuation, offset: 575, content: ，, id: KR3k0012_CHANT_859-bkkpn193}
  - {type: 'tls:seg', offset: 575, content: '', id: KR3k0012_CHANT_859-8a.13}
  - {type: variant, offset: 577, length: 5, content: 噉少許乃題, krp: 帝以爲御粥天文要集曰玉井主粥厨殷康集曰康爲武康縣教曰郭邑居民有死䘮者可令送兩坩粥時鏡新書曰齊魏収當寒食餉王元景與収書曰始知令節湏御麥粥加之以糖弥覺香冷荆楚歳時記曰正月十五日豆糜加油骨其}
  - {type: punctuation, offset: 580, content: ，, id: KR3k0012_CHANT_859-bkkpn194}
  - {type: 'tls:seg', offset: 580, content: '', id: KR3k0012_CHANT_859-8a.14}
  - {type: variant, offset: 583, length: 0, content: '', krp: 以祠門戸魏武帝苦寒行曰行行日巳逺人馬同時飢擔橐以取薪斧氷持}
  - {type: punctuation, offset: 584, content: 『, id: KR3k0012_CHANT_859-bkkpn195}
  - {type: variant, offset: 584, length: 5, content: 合字致坐中, krp: 糜唐新語曰李勣旣貴其姉病必親爲煑粥火爇其鬚姉曰僕妾多何自苦若是勣對曰豈爲無}
  - {type: punctuation, offset: 585, content: 』, id: KR3k0012_CHANT_859-bkkpn196}
  - {type: punctuation, offset: 586, content: ，, id: KR3k0012_CHANT_859-bkkpn197}
  - {type: 'tls:seg', offset: 586, content: '', id: KR3k0012_CHANT_859-8a.15}
  - {type: punctuation, offset: 590, content: ，, id: KR3k0012_CHANT_859-bkkpn198}
  - {type: 'tls:seg', offset: 590, content: '', id: KR3k0012_CHANT_859-8a.16}
  - {type: variant, offset: 590, length: 1, content: 並, krp: 耶頋姉年老勣亦年老雖欲乆爲姉煑粥其可得乎膏糜國語曰勾踐載稻與脂於舟以行稻有膏糜國之孺子之遊者無}
  - {type: variant, offset: 592, length: 2, content: 解脩, krp: 餔也無不歠也必問其名爲後將用之續齊諧記曰呉縣張成夜起忽見一婦人立於宅東南角舉手招成成便徃就之婦人曰此地是君家蚕室我}
  - {type: punctuation, offset: 593, content: 。, id: KR3k0012_CHANT_859-bkkpn199}
  - {type: 'tls:seg', offset: 593, content: '', id: KR3k0012_CHANT_859-8a.17}
  - {type: variant, offset: 595, length: 1, content: 噉, krp: 是此地}
  - {type: punctuation, offset: 597, content: ，, id: KR3k0012_CHANT_859-bkkpn200}
  - {type: 'tls:seg', offset: 597, content: '', id: KR3k0012_CHANT_859-8a.18}
  - {type: variant, offset: 597, length: 0, content: '', krp: 神明曰是正月半宜作白粥泛膏於上以祭也當令君蚕桑百倍言絶失所成如言爲作膏白粥自此巳後年年大得蚕今世人正月半作膏糜像此糝周易曰鼎折足覆公餗鄭玄曰糝謂之餗震又爲竹竹萌日荀荀者餗之米也詩}
  - {type: punctuation, offset: 598, content: ：, id: KR3k0012_CHANT_859-bkkpn201}
