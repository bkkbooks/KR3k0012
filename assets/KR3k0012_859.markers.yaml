  - {type: 'tls:seg', offset: 499, content: '', id: KR3k0012_CHANT_859-7a.7}
  - {type: variant, offset: 500, length: 1, content: 粳, WYG: 粥火燃其鬚姊曰僕妾甚多何自苦若是對曰豈為無人耶顧姊年老勣亦年老雖欲久為煮粥其可得乎膏糜國語曰勾踐載稻與脂於舟行國中孺子之逰者無不餔也無不歠也必問其名續齊諧記曰呉縣張成夜起忽見一婦人立於宅東南角舉手招成成便往就之婦人曰此地是君家蠶室我即是此地之神明日是正月半宜作白粥泛膏於上以祭也當令君蠶桑百倍言絶失所成如言為作膏白粥自此已後年年大得蠶今世人正月半作膏糜像此糝周易曰鼎折足覆公餗鄭𤣥曰糝謂之餗周禮曰醢人掌羞豆之實酏食糝食記曰犬羮兔羮和糝不蓼又曰糝取牛羊豕之肉三如一小切之與稻}
  - {type: page-break, offset: 500, content: '', id: KR3k0012_WYG_859-13b, image: WYG0900/WYG0900-0524b.png}
  - {type: page-break, offset: 500, content: '', id: KR3k0012_WYG_859-14a, image: WYG0900/WYG0900-0524c.png}
  - {type: variant, offset: 502, length: 1, content: 或, SBCK: 今皆成糜太丘曰尓頗有所識不二子長跪俱􅀃言無遺失}
  - {type: page-break, offset: 502, content: '', id: KR3k0012_SBCK_859-7b}
  - {type: variant, offset: 502, length: 2, content: 或大, WYG: 二肉一合以為餌煎之説文曰糂以米和羮也糂與糝同宗躬孝子𫝊曰桑虞䘮父十四日食百粒糝墨子曰孔子窮陳蔡之間藜藿不糂􅭁通俗文曰煮米􅭁食經日作糄法近水則澀䵄蕡周禮曰籩人朝食之籩其實䵄蕡白黑形鹽蕡熬枲實也鄭司農云䵄麻曰蕡稲曰白黍曰黑儀禮曰䵄蕡坐設於豆西當外列䵄在東方婦贊者執白黑以授主婦又曰主婦薦韮菹醢坐奠于筵前醢在南方婦贊者執籩䵄蕡以授主婦主婦不興受之奠䵄醢南蕡在䵄東禮曰芼羮菽}
  - {type: page-break, offset: 502, content: '', id: KR3k0012_WYG_859-14b, image: WYG0900/WYG0900-0524d.png}
  - {type: variant, offset: 504, length: 0, content: '', SBCK: 丘曰如此俱成糜自可何必飯耶俗􅀃曰王東亭嘗之呉郡就汰公􅀫別汰公設豆藿糜自噉一大甌東亭有難色汰公強進半甌王薈別傳曰薈爲呉郡内史其年太飢薈出􅀻財爲百姓饘粥風土記曰天正日南黄鍾踐長粥饘追萌微納休昌是以陽始牙動爲饘粥以養㓜扶微俗尚以赤豆爲糜所以象色也廣志曰遼東赤梁魏武帝以爲御粥天文要集曰玉井主粥厨殷康集曰康爲武康縣教曰郭邑居民有死䘮者可令送兩坩粥時鏡新書曰齊魏収當寒食餉王元景與収書曰始知令節湏御}
  - {type: page-break, offset: 504, content: '', id: KR3k0012_SBCK_859-8a}
  - {type: variant, offset: 505, length: 0, content: '', SBCK: 粥加之以糖弥􅁴香冷荆楚歳時記曰正月十五日豆糜加油骨其上以祠門戸魏武帝苦寒行曰行行日巳逺人馬同時飢擔橐以取薪斧氷持作糜唐新語曰李勣旣貴其姉病必親爲煑粥火􅋹其􅂡姉曰僕妾多何自苦若是勣對曰豈爲無人耶頋姉年老勣亦年老雖欲乆爲姉煑粥其可得乎膏糜國語曰勾踐載稻與脂於舟以行稻有膏糜國之孺子之遊者無不餔也無不歠也必問其名爲後將用之續齊諧記曰呉縣張成夜起忽見一婦人立於宅東南角舉手招成成便徃就之婦人曰此地是君家蚕室我即是此地之神明曰是正月半宜作白粥泛膏於上以􅀕也當令君蚕桑百倍言絶失所成如言爲作膏白粥自此巳後年年大得蚕今世人正月半作膏糜像此糝周易曰鼎折足覆公餗鄭玄曰糝謂之餗震又爲竹竹萌日荀荀者餗之米也詩云其餗唯何周禮曰醢人掌羞豆之實酏食糝食記曰犬羮莬羮和糝不蓼凢羮齊冝五味之和朱屑之糝蓼則不也又曰糝取牛羊豕之􅁏三如一小切之與稻米稻米二􅁏一合以爲餌煎之此周禮糝食也􅀃文曰糂以米和羹也糂與糝同宗躬孝子傳曰桑虞䘮父十四日食百粒糝藜藿墨子曰孔子窮陳蔡之間藜蒸不糂􅭁所㦸切通俗文曰煑米􅭁食經日作糄法近水則澀䵄蕡周禮曰籩人掌朝食之籩其實䵄蕡白黒形塩蕡􅆈枲實也鄭司農云䵄麻曰蕡稻日白􅁰曰黒鄭玄曰今河問以北煑穜麦賣之名曰儀禮曰䵄蕡坐設于豆西當外列䵄在東方婦賛者執白黒以授主婦又曰主婦薦韭菹􅊽坐奠于筵前醢在南方婦賛者執二籩䵄蕡以授主婦主婦不興受之奠䵄于醢南蕡在䵄東禮曰芼羮菽麥蕡稻􅁰梁麮丘與切荅頡解詁曰麮煑麥也􅀃文曰麮麥甘粥也釋名曰煑麥曰麮麮亦齲也熟煑之齲壞也急就曰甘麮殊羙奏諸君肺䐣蘇夲切􅀃文曰䐣切熟􅁏内於血中和也釋名曰肺䐣也全米糝之如膏鑚也盧湛􅀕法曰四時祠皆用肺䐣血苦濫切􅀃文曰羊血曰釋名曰血以血}
