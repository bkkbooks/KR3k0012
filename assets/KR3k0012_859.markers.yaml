  - {type: variant, offset: 496, length: 0, content: '', krp: 三日乾粥中國爲寒食涼州異物志曰髙昌僻土有異於華寒服冷水暑啜羅闍闍受車切此郡人}
  - {type: variant, offset: 497, length: 4, content: 醴酪煮粳, SBCK: 糜粥啜之俗號闍丗南越志曰陵廬城中有井半清半黄黄者甜滑冝作粥色如金似􅁅汁甚芬馨世􅀃曰郄嘉賔三伏之月詣謝公炎暑重赫雖當風交扇猶霑汗流離謝着故練衣食􅀬白粥郄謂謝曰自非君體幾不堪此又曰賔客詣陳大丘􅀫使元方季方炊太丘問炊何遟留元方長跪曰君與客語乃俱􅀼聽炊忘着}
  - {type: variant, offset: 497, length: 2, content: 醴酪, WYG: 糜粥啜之俗􅃅者也南越志曰廬陵城中有井半清半黄黄者甜滑宜作粥色如金似灰汁甚芬馨世説曰郄嘉賔三伏之月詣謝公炎暑熏赫雖當風交扇猶霑汗流離謝着故練衣食熱白粥郄謂謝曰自非君體幾不堪此又曰賔客詣陳太丘宿使元方炊太丘問炊何遲留元方長跪曰君與客語乃俱竊聽炊忘着箄今皆成糜太丘曰爾頗有所識否二子長跪俱説言無遺失太丘曰如此便成糜自可何必飯耶俗説曰王東亭嘗之呉郡就汰公宿汰公設豆藿糜自噉一大甌東亭有難色汰公强進半甌王薈别𫝊曰薈為呉郡内史其年大飢薈出私財為百姓饘粥風土記曰天正日南黄鐘踐長饘粥追萌徴納休昌是以陽始牙動為饘粥以養幼扶微俗尚以赤豆為糜所以象色也廣志曰遼東赤粱魏武帝以為御粥天文要集曰玉井主粥厨殷康集曰康為武康縣教曰郭邑居民有死䘮者可令送兩坩粥時鏡新書曰齊魏收當寒食餉王元景粥元景與収書曰始知令節須御麥粥加以甘糖彌覺香冷荆楚歳時記曰正月十五日豆糜加油骨上其以祠門戶魏武帝苦寒行曰行行日已遠人馬同時飢擔嚢以取薪斧氷持作糜唐新語曰李勣既貴其姊病必親為}
