  - {type: variant, offset: 42, length: 0, content: '', SBCK: 光武爲王郎所追至無蔞亭馮異上豆粥一椀明日上謂諸將曰昨得公孫豆粥飢寒俱解又曰樊儵事後母至孝及母卒哀思過禮毀病不自支世祖常遣中黄門朝暮送饘粥東觀漢記曰曹褒遷將作大匠上聞襃病使致醫藥糜粥謝承後漢書曰南陽陸續仕郡户曹史時飢荒太守尹興使續於都亭賦民饘粥續悉令簡閱其人訊以名氏事畢興問所食幾何續因口􅀃六百餘人皆分別姓字無有差謬興異之漢獻帝傳曰帝在長安榖一斛五十餘萬帝使侍御史侯汶岀太倉米豆爲飢民作糜粥死者不絶帝疑廪賦不實勑取米豆五􅂛於御前作糜得滿兩盆詔杖汶五十九州春秋曰臧洪爲青州刺史爲􅀽紹所圍粮食巳盡􅀄尚掘䑕煑筋角後無可復食厨有米三􅂛主簿啓進内稍以爲糜粥洪歎曰吾獨食此何爲命作薄粥與衆共啜之魏末傳曰曹爽等令李勝辭司馬宣王并伺察焉宣王見勝自陳無他勞効横􅂪聖恩當爲夲州詣閤拜辭不悟加恩得蒙引見宣王令兩婢侍衣衣落復上指口言渴主飲婢進粥宣王持杯飲粥粥皆流岀沾胷勝􅉖然者乆之呉録曰李壽作糜以食飢者而不自名又曰朱桓除餘姚長遇疫癘榖食荒貴桓分部良吏隠親醫藥食粥相継士民感戴之王隠晉書曰賊杜㢭下蜀蜀人飢陶􅋲多作粥以待之於是悉降晉安帝紀曰桓玄敗走左右進以麄粥咽不能下郭林宗傳曰林宗甞止陳國文學見童子魏德公知其有異德公求近其房止供給洒埽林宗甞不佳夜中命作粥德公爲之進焉林宗一啜怒而呵之曰髙明爲長者作粥不如意使沙不可食以杯擿地徳公更爲粥三進三呵德公姿無變容顔色殊恱林宗乃曰始見子之靣今乃知卿心遂友善之卒爲妙士宋書曰戴顒與兄㪍並隠遁有名中書令王綏甞携客之㪍等方進豆粥綏曰聞卿善琴試欲一聽不荅綏恨而去又曰何子平大明末東土飢荒繼以師旅家有大䘮八年不得營葬晝夜號哭常如􅃝括之日冬不衣絮暑避清凉一日以數合米爲粥不進塩菜齊書曰宣考陳皇后生髙帝髙帝年二歳乳人乏乳后夢人以兩甌麻粥與之覺而乳驚因此豊足梁書曰昭明太子統母丁貴殯薨水漿不入口每哭慟絶}
