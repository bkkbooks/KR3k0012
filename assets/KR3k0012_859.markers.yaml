  - {type: variant, offset: 400, length: 0, content: '', SBCK: 改容獻皇后甚竒其意致請於上遂下詔可减死爲民太公金匱曰武王伐紂都洛邑而雪􅀷丈餘不知何五大夫乗馬車從兩􅀐止王門外師尚父使人持一器粥出開門而進曰先生大夫在内方對天子未有出時天寒故進􅀬粥以御寒莊子曰顔回有􅀒郭之田五十􅅿足以供饘粥七畧曰宣帝詔徴􅀍公見誦楚辭􅀍公年衰母老毎一誦輙與粥風俗通曰范滂父字叔矩遭母憂旣葬之後饘粥不贍司徒召滂滂曰老父年尊絶意世仕遂不得避也魏武遺令曰吾夜半覺小不佳至明日飲粥汗出服當歸湯譙子法訓曰或曰母有疾使其妻爲粥者妻不可以刀擊之夷其面可以爲孝乎曰以刀刃妻其親必駭而有憂及之何有於孝郭子曰許允爲吏部郎多用其郷里帝遣虎賁収之婦云無憂尋還作粟粥待之語林曰石崇爲客作豆粥咄嗟便辦王愷乃宻貨崇帳中都督曰豆難煑唯豫作熟豆以白粥投之續搜神記曰劉他苟䝉在夏口忽有􅀑來喜偷食劉即於他家煑治葛取二􅂛汁􅁡賫還家向夜令舉家糜食餘一甌因冩治葛汁着中於几上以瓮覆至人定後聞􅀑發瓮啖糜湏􅁷在屋頭吐至四更中寂然於此遂絶也徐廣}
  - {type: page-break, offset: 400, content: '', id: KR3k0012_SBCK_859-6b}
