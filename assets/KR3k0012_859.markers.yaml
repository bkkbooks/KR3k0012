  - {type: 'tls:seg', offset: 616, content: '', id: KR3k0012_CHANT_859-9a.4}
  - {type: variant, offset: 619, length: 0, content: '', krp: 籩其實䵄蕡白黒形塩蕡熬枲實也鄭司農云䵄麻曰蕡稻日白黍曰黒鄭玄曰今河問}
  - {type: variant, offset: 620, length: 9, content: 酪陸還遂病明日有牋, krp: 北煑穜麦賣之名曰儀禮曰䵄蕡坐設于豆西當外列䵄在東方婦賛者執白黒以授主婦又曰主婦薦韭菹醢坐奠于筵前醢在南方婦賛者執二籩䵄蕡以授主婦主婦不興受之奠䵄于醢南蕡在䵄東禮曰芼羮菽麥蕡稻黍梁麮丘}
