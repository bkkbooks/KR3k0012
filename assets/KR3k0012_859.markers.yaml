  - {type: variant, offset: 396, length: 0, content: '', SBCK: 詔可其奏讓將就刑馮氏蓬頭垢面詣朝堂數日無汗馬之勞致位刺史不能盡誠奉國以荅鴻恩而返違犯憲章􅂍貨狼籍􅀂言司馬誣汝百姓百官不應亦皆誣汝言至尊不憐􅉖汝百姓何故治書覆汝汝豈誠臣豈孝子不誠不孝何以爲人於是流涕嗚咽親持盂粥勸讓令食旣而}
