  - {type: variant, offset: 609, length: 8, content: 陸太尉詣王丞相公, krp: 糝取牛羊豕之肉三如一小切之與稻米稻米二肉一合以爲餌煎之此周禮糝食也說文曰糂以米和羹也糂與糝同宗躬孝子傳曰桑虞䘮父十四日食百粒糝藜藿墨子曰孔子窮陳蔡之間藜蒸不糂􅭁所㦸切通俗文曰煑米􅭁食經日作糄法近水則澀䵄蕡周禮曰籩人掌朝}
