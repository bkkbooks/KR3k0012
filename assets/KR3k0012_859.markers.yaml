  body:
  - {type: variant, offset: 4, length: 6, content: 六酪酷酥附䬫, SBCK: 七糜粥膏糜糝􅭁䵄蕡麮丘與切肺䐣􅂫夲切血苦濫切􅀬洛河羗煑胡飯糜粥周書曰黄帝始烹榖爲粥記曰仲秋養衰老授几杖行麋粥飲食行酒賜也又曰公叔文子卒其子請謚於君君曰昔者衛國㓙飢夫子爲粥與國之餓者是不亦惠乎又曰悼公之䘮季昭子問於孟敬子曰爲君何食悼公魯哀公之子昭子康子之曽孫名強敬子武伯之子名捷敬子曰食粥天下之逹禮也又曰穆公之母卒穆公魯哀公之曽孫使人問於曽子曰如之何問居䘮之礼曾子曽參之于名申對曰申也聞諸申之父曰哭泣之哀齊斬之情饘粥之食自天子逹子䘮父母尊卑同又曰親始死三日不舉火故鄰里爲之麋粥以飲食之又曰君之䘮子大夫公子衆士皆三日不食子大夫公子食粥納財朝一溢米莫一溢米食之無筭又曰大夫之䘮主人室老子姓皆食粥左傳曰晉人執衛侯歸之于京師寘諸􅀷室寗子納橐饘焉饘粥餅也又曰齊晏桓子卒晏嬰麤縗斬苴經帶杖菅􅋰食鬻君􅀝廬寢苫枕草其老曰非大夫之禮也又曰正考父鼎銘云饘於是粥於是以}
