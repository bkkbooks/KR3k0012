  - {type: variant, offset: 324, length: 0, content: '', SBCK: 文明太后崩孝文五日不食楊椿諌曰聖人之禮毁不滅性縱陛下欲自賢於万代其􅀂宗廟何帝感其言乃一進粥又曰楊逸爲光州刺史時災儉連歳􅇣欲以倉粟賑給而所司懼罪不敢逸曰國以人爲夲人以食爲命假令以此􅀗戾吾所甘心遂出粟然後申表右僕射元羅巳下謂公儲難闕並執不許尚書令}
  - {type: page-break, offset: 324, content: '', id: KR3k0012_SBCK_859-5a}
  - {type: variant, offset: 324, length: 0, content: '', WYG: 文明太后崩孝文五日不食楊椿諫曰聖人之禮毁不滅節縦陛下欲自賢於萬代其若宗廟何帝感其言乃進一粥又曰楊逸為光州刺史時灾儉連歳逸欲以倉粟賑給而所司懼罪不敢逸曰國以人為本人以食為天假令以此獲戾吾所甘心遂出粟然後申表右僕射元羅已下謂公儲難闕並執不許尚書令}
  - {type: variant, offset: 324, length: 0, content: '', krp: 文明太后崩孝文五日不食楊椿諌曰聖人之禮毁不滅性縱陛下欲自賢於万代其若宗廟何帝感其言乃一進粥又曰楊逸爲光州刺史時災儉連歳逸欲以倉粟賑給而所司懼罪不敢逸曰國以人爲夲人以食爲命假令以此獲戾吾所甘心遂出粟然後申表右僕射元羅巳下謂公儲難闕並執不許尚書令}
