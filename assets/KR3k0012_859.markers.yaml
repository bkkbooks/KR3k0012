  - {type: variant, offset: 36, length: 0, content: '', SBCK: 麋爛也粥濯於麋粥粥然也寒粥米投寒水中也史記曰左師觸龍見趙太后曰食得無衰乎太后曰恃粥耳又曰陽盧侯趙章病淳于意􅐷其脉曰迵音洞風迵風者五日而死後七日乃死曰其}
