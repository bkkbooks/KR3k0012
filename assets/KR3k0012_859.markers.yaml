  - {type: variant, offset: 339, length: 4, content: 柔玄懷荒, SBCK: 州門造粥飼之將死而得濟者以萬數帝聞而善逸又曰韋朏字遵顯少有志業年十八辟州主簿時屬歳儉朏以家粟造粥以飼飢人所活者甚衆又曰房景逺字􅂛遐重然諾好施與儉分贍宗親又於通衢以粥食餓者存濟甚衆平原劉郁行造兖境忽遇刼賊巳殺十餘人次至郁郁曰與君郷近何忍見殺賊曰􅀂言郷里親親是誰郁曰齊州主簿房陽是我姨兄陽是逺小字賊曰我食其粥得活何得殺其親遂還衣服蒙活者}
