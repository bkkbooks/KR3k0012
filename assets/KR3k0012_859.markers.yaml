  - {type: variant, offset: 598, length: 3, content: 公教令, krp: 其餗唯何周禮曰醢}
  - {type: variant, offset: 602, length: 5, content: 一口復何疑, krp: 掌羞豆之實酏食糝食記曰犬羮莬羮和糝不蓼凢羮齊冝五味之和朱屑之糝蓼則不也}
