  - {type: variant, offset: 940, length: 0, content: '', SBCK: 設此官貟以待賢士工啇􅄂色之流假令術踰儕􅀋止可厚給財物必不可超授官秩與朝賢君子比肩而立同坐而食大和中文宗欲以樂官尉遲璋爲王府率拾遺竇詢直極諌乃改授光州長史伏乞以兩朝故事別授可及之官帝不之聽又曰髙祖以李粲爲左􅁥門大將軍禮髙年也􅀄髙祖問粲年幾對曰八十髙祖曰公清幹之譽聞於隋曰今年齒雖邁筋力未衰但􅁥門之職非公莫可意欲相委如何粲以年老辭讓髙祖曰藉公處分耳豈欲煩公筋力􅁘於是詔粲自非殿庭皆乗蜀馬論者榮之又曰王及善除右千牛衛將軍髙宗謂曰朕以卿忠敬故}
  - {type: page-break, offset: 940, content: '', id: KR3k0012_SBCK_237-4a}
  - {type: variant, offset: 940, length: 0, content: '', WYG: 設此官員以待賢士工商雜色之流假令術踰儕類止可厚給財物必不可超授官秩與衆賢君子比肩而立同坐而食太和中文宗欲以第官尉遲璋為王府率拾遺竇洵直極諫乃改授光州長史伏乞以兩朝故事别授可及之官帝不之聽又曰髙祖以李粲為左監門大將軍禮髙年也初髙祖問粲年幾對曰八十髙祖曰公清幹之譽聞於隋日今年齒雖邁筋力未衰但監門之職非公莫可意欲相委如何粲以年老辭讓髙祖曰藉公處分耳豈欲煩公筋力耶於是以粲自非殿庭皆乘蜀馬論者榮之又曰王及善除右千牛衛將軍髙祖謂曰朕以卿忠謹敕}
