  - {type: variant, offset: 1129, length: 147, content: 特下制曰吉凶禮儀國家所重司禮愽士未甚詳明成均司業韋叔夏太子率更令祝欽明等愽涉禮經多所該練委以參掌冀弘典式自今司禮所脩儀注並委叔夏等刊定訖然後進奏又曰歸崇敬上言司業者義在禮記云樂正司業正長也言樂官之長司主此業爾雅云大板謂之業按詩周頌設業設虡崇牙樹羽則業是懸鍾磬之簨虡也今大學既不教樂於義則無所取請, WYG: 十二月詔}
