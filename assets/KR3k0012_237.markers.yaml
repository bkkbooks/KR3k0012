  - {type: variant, offset: 2378, length: 706, content: 國子學王公以下畢集光升座講禮啟發章門已而諸儒生以次論難者十餘人皆當時碩學光剖析疑滯雖辭非俊辯而理義弘贍論者莫測其淺深咸共推服上嘉而勞焉又曰王頗授著作佐郎尋令於國子講授會高祖親臨釋奠國子祭酒元善講孝經頗與相論難詞義鋒起善往往見屈高祖大奇之超授國子愽士又曰何妥授太學愽士帝初欲立五后以問儒者辛彥之對曰后與天子匹體齊尊不宜有五妥駮曰帝嚳四妃舜又二妃亦何常數由是封襄城縣伯又曰房暉遠為國子愽士會上令國子生通一經者並悉薦舉將擢用之既策問訖愽士不能時定臧否祭酒元善怪問之暉遠曰江南河北義例不同愽士不能遍涉學生皆持其所短稱己所長愽士各各自疑所以久而不決也祭酒因令暉遠考定之暉遠覽筆便下初無疑滯或有不服者暉遠問其所傳義䟽輒為始末誦之然後出其所短自是無敢飾非者所試四五百人數日便決諸儒莫不推其通愽魯國先賢傳曰漢文帝時聞申公為詩最精以為愽士申公為詩傳號曰魯詩李郈別傳曰郈上書太后數陳忠言其辭雖不能盡施用輒有策詔襃贊焉愽士著兩梁冠朝會宜隨士大夫例時賤經學愽士乃在市長下公奏以為非所以敬儒德明國體也上善公言正月大朝引愽士公府長史前殷氏世傳曰殷亮建武中徵拜愽士遷講學大夫諸儒講論勝者賜席亮重席至八九帝嘉之曰講學不當如是耶典略曰公儀休者魯愽士也為魯相無所變更百官自正使食祿者不得與下民爭利論衡曰王莽之時省五經章句博士弟子郭略夜定舊說死於燭下少府監六典曰少府監之職掌百工伎巧之政令惣中書尚左尚右尚職治掌治五署之官屬正其工徒謹其繕作少監為之貳漢官宰尹下曰少府言別為小藏故曰少府漢書曰少府秦官掌山海地澤之稅以給供養又曰歐陽地餘字長賓為少府誡其子曰我死官屬送汝財物慎無受汝九卿儒者子孫以廉潔著可以自成及卒少府官屬送數百萬其子不受天子聞而嘉焉賜錢百萬, SBCK: 秉􅁪領宿衛謝承}
