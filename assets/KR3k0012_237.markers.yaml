  - {type: variant, offset: 464, length: 4, content: 張緒竟陵, SBCK: 薛世雄性廉謹凡所行軍破敵之處秋毫無犯帝由是嘉之帝嘗從容謂群臣曰我欲舉好人未知諸君識否群臣咸曰臣等何能測聖心帝曰我欲舉者薜世雄群臣皆稱善帝復曰世雄廉正節槩有古人之風於是超拜右翊衛將軍煬帝改左右衛爲之唐書曰元和中以前靈塩等節度使}
