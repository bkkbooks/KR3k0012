  - {type: variant, offset: 3889, length: 253, content: 年大匠應慎上言百郡計吏觀國之光而舍逆旅崎嶇私館貢篚之物朽濕曝露昔晉霸之盟主耳舍諸侯於隸人鄭子產以為大譏况今四海之大而可無乎和帝嘉納之魏志曰楊阜字義山為將作大匠明帝時初治宮室發美女充後庭阜上䟽欲省宮人諸不見幸者乃召御府吏問後宮人數吏守舊令對曰禁密不得宣露阜怒杖吏一百數之曰國家不與九卿為密反與小吏為密乎帝聞之而愈驚憚晉書曰將作大匠陳勰掘地得古文尚書奏今文長於古文宜以古為正潘岳以為習用已久不宜復改唐書官品志曰大匠卿位視太僕掌土木之工統左右校諸署汝南先賢傳曰應仲華遷大匠除藻飾之無用割有損之浮費凡所省息七億餘萬, SBCK: ''}
