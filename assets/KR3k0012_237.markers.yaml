  - {type: variant, offset: 994, length: 134, content: 昔從卿讀書卿今日從朕求官但言所欲不相違也時國子祭酒缺後胤奏言之因授國子祭酒風俗通曰孫卿有秀才善為詩禮易春秋至齊襄王時而孫卿最老師三為祭酒齊王融為王儉讓國子祭酒表曰竊以成均義重振古所崇資師道尊有來攸尚匪由蘭芷疇變入室之情不自朱藍何遷素絲之質司業唐書曰韋叔夏遷成均司業久視, WYG: 馬是必可任五代史云周廣順二}
