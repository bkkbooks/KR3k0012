  - {type: variant, offset: 553, length: 248, content: 為國子祭酒丞祖儉父暕並居此職三代為國師前代未有當時以為榮暕音簡崔鴻十六國春秋前秦錄曰建元七年高平蘇通長樂劉祥並以碩學耆儒尢精二禮堅以通為禮記祭酒居于東庠祥為儀禮祭酒處于西序堅每月朔旦率百僚親臨講論後魏書曰韓子熙累遷國子祭酒子熙儉素安貧常好退靜遷鄴之始百司並給兵力時以祭酒閑豫止給二人或有令其陳謁者子熙曰朝廷不與祭酒兵何關韓子熙事論者稱之後周書曰盧誕本名恭祖拜給事黃門侍郎魏帝詔曰經師易求人師難得朕諸兒稍長欲命卿為師於是親幸晉王第勑晉王以下皆拜之於帝前因賜名曰誕又以誕儒宗學府為當世所推乃拜國子祭酒, SBCK: 官至武衛將軍}
