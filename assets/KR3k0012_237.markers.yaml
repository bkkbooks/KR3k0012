  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第二百三十七}
  body:
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 五揔叙將軍左右衛將軍諸衛將軍附左右金吾衛將軍諸衛上將軍揔叙將軍石氏中官占曰河鼓星主軍鼔一曰三星主天子三將軍中央大星爲大將軍左星爲左將軍右星爲右將軍所以備􅀜梁而距難也周禮夏官上大司馬曰凢制軍万有二千五百人一郷之民也凢起從役家一人也王六軍六郷之數也郷始文教軍定武功其道皆兼三才而兩之故數俱六也大國三軍公侯之封也成國不過半天子之一軍次國二軍諸伯之封小國一軍子男之封軍將皆命卿位視六事之人司於六郷之大夫春秋之時列國有正卿爲將軍又以亞卿一人爲佐猶執政者貪其權遂以陵遲皆非周公之舊也左傳襄二年曰􅀳蒐于綿上以治兵使士丐將中軍辭曰伯游長昔臣習於知氏以佐之非能賢也請從伯游使荀偃將中軍士丐佐之使韓起將上軍辭以趙武孝經左契曰將軍順虎衘珠大夫正海出魚史記曰齊景公召穰苴與語大恱以爲將軍將兵扞燕又曰孝文後六年匈奴入上郡周亞夫爲將軍居㶚上祝兹侯徐廣曰表作松兹姓徐名悍也軍􅁄門以備胡漢書曰楚王召宋義計事而恱之因以爲將軍范曄後漢書曰靈帝時望氣者以爲京師當有大兵兩宫流血大將軍司馬許源說何進曰太公六韜有天子親於兵事可以威壓}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_237-1b}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 五總叙將軍左右衛將軍諸衛將軍附左右金吾衛將軍諸衛上將軍總叙將軍石氏中官占曰河鼓星主軍皷一曰三星主天子三將軍中央大星為大將軍左星為左將軍右星為右將軍所以備關梁而距難也周禮夏官上大司馬曰凡制軍萬有二千五百人一鄉之民也凡起徒役家一人也王六軍六鄉之數也鄉治文教軍定武功其道皆兼三才而兩之故數俱六也大國三軍公侯之封也成國不過半天子之六軍次國二軍諸伯之封小國一軍子男之封軍將皆命卿同視六事之人同於六鄉之大夫春秋之時列國有正卿為將軍又以亞卿一人為佐由執政者貪其權遂以陵遲皆非周公之舊也左傳襄十三年曰晉蒐於綿上以治兵使士丐將中軍辭曰伯游長昔臣習於知氏以佐之非能賢也請從伯游使荀偃將中軍士丐佐之使韓起將上軍辭以趙武孝經左契曰將軍順虎銜珠大夫正海出魚史記曰齊景公召穰苴與語大恱以為將軍將兵扞燕又曰孝文後六年匈奴入上郡周亞夫為將軍居細栁宗正劉禮為將軍居霸上祝兹侯徐廣曰表作松兹姓徐名悍也軍棘門以備胡漢書曰楚王召宋義計事而恱之因以為將軍范曄後漢書曰靈帝時望氣者以為京師當有大兵兩宫流血大將軍司馬許源說何進曰太公六韜有天子親于兵事可以威壓}
