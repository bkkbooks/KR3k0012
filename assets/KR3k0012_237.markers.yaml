  - {type: variant, offset: 469, length: 0, content: '', SBCK: 佖爲右衛將軍佖在鎮無智略以馭下居常猜忌及多殺人以懼之衆益不附乃召至踰月而授以衛將軍凢將相出入皆翰林草制謂之白麻佖始以責罷中書草制隋書曰來護兒煬帝即位遷右驍衛大將軍帝甚親重之大業六年從駕江都賜物千叚令上先人塚宴父老州里榮之魏志曰許禇從太祖戰大破馬起等乃遷武衛中郎將武衛之號自此始也文帝踐阼遷武衛將軍又曰曹爽自散􅀐常侍轉武衛將軍爽秉政又以弟訓爲武衛將軍王敦別傳曰敦}
