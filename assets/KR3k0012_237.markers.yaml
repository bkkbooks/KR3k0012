  - {type: variant, offset: 1014, length: 267, content: 時國子祭酒缺後胤奏言之因授國子祭酒風俗通曰孫卿有秀才善為詩禮易春秋至齊襄王時而孫卿最老師三為祭酒齊王融為王儉讓國子祭酒表曰竊以成均義重振古所崇資師道尊有來攸尚匪由蘭芷疇變入室之情不自朱藍何遷素絲之質司業唐書曰韋叔夏遷成均司業久視年特下制曰吉凶禮儀國家所重司禮愽士未甚詳明成均司業韋叔夏太子率更令祝欽明等愽涉禮經多所該練委以參掌冀弘典式自今司禮所脩儀注並委叔夏等刊定訖然後進奏又曰歸崇敬上言司業者義在禮記云樂正司業正長也言樂官之長司主此業爾雅云大板謂之業按詩周頌設業設虡崇牙樹羽則業是懸鍾磬之簨虡也今大學既不教樂於義則無所取請改司業一為, SBCK: ''}
  - {type: variant, offset: 1014, length: 267, content: 時國子祭酒缺後胤奏言之因授國子祭酒風俗通曰孫卿有秀才善為詩禮易春秋至齊襄王時而孫卿最老師三為祭酒齊王融為王儉讓國子祭酒表曰竊以成均義重振古所崇資師道尊有來攸尚匪由蘭芷疇變入室之情不自朱藍何遷素絲之質司業唐書曰韋叔夏遷成均司業久視年特下制曰吉凶禮儀國家所重司禮愽士未甚詳明成均司業韋叔夏太子率更令祝欽明等愽涉禮經多所該練委以參掌冀弘典式自今司禮所脩儀注並委叔夏等刊定訖然後進奏又曰歸崇敬上言司業者義在禮記云樂正司業正長也言樂官之長司主此業爾雅云大板謂之業按詩周頌設業設虡崇牙樹羽則業是懸鍾磬之簨虡也今大學既不教樂於義則無所取請改司業一為, krp: ''}
