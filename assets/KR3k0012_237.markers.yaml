  - {type: variant, offset: 1315, length: 0, content: '', SBCK: 曰吾者禦也常執金革以禦非常也顔師古曰金吾鳥名也主辟不祥天子出職主先導以備非常故執此鳥之象因以名官也緹􅀐二百人輿服導從車􅀐滿路群僚之中斯最壯矣舊掌京師盗賊考按疑事漢郅都寗成王温舒滅宣等皆截理横噬虎而冠者也止切理辨亦旋誅黜又置執金吾丞後漢掌宫外戒司非常水火之事衛尉廵行宫中金吾徼循宫外爲表裏以擒姦討猾日三繞行宫外及主兵器自中興但專徼循不與他政又有執金吾吏文學執金吾佐執金吾貟吏魏武秉政復爲中尉晉􅀄罷直至後周置武環率武􅀱率下大夫各二人隋置左右武􅀱府大將軍一人將軍三人掌車駕出入先驅後殿晝夜廵察執捕姦非烽􅀱道路水草所冝廵狩田師則掌其營禁煬帝大業三年改爲左右武􅀱衛所領軍事名佽飛}
