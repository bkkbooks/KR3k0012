  - {type: variant, offset: 74, length: 141, content: 也辨云凡會同饗讌必尊長先用酒以祭先故曰祭酒漢時吳王年長以為劉氏祭酒是也徐廣釋祭酒云古主人具饌則賓中長者一人舉酒祭地是則長者為祭酒也漢書曰吳王賜號為劉氏祭酒應劭曰禮飲酒必祭示有先也故稱祭酒飲時唯尊長者以酒沃酹也又曰張安世薦蘇武明習故事奉使不辱君命宣帝以武壯節老臣令朝朔望號稱祭酒甚優寵, SBCK: 職皆如}
