  - {type: variant, offset: 470, length: 80, content: 良領國子祭酒武帝勑王晏曰吾欲令司徒辭祭酒以授張緒物議以為云何子良竟不拜以緒領國子祭酒齊職儀曰晉令愽士祭酒掌國子學而國子生師事祭酒執經葛巾單衣終身致敬梁書令曰王丞, SBCK: 應}
