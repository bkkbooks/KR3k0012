  - {type: variant, offset: 6, length: 0, content: '', SBCK: 曰户易豐卦窺其户閴其無人毛詩鴻鴈斯干曰築室百堵西南其户大戴禮曰隋武子户之銘曰夫難得而易失又夏小正曰七月漢案户漢天漢也案户者直户也言正南北也禮記曲禮上曰户外有二屨言聞則入言不聞則不入將入户視必}
