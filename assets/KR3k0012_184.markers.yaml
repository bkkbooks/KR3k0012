  - {type: variant, offset: 1641, length: 581, content: 南面最東曰開陽門初未有名夜有一柱飛在樓上乃是琅邪開陽縣南門一柱飛去遂記其年月日以為名又曰鴻門在新豐縣西八里沛公見項羽處又曰蒯城慕容儁鑄銅馬於門側謂曰銅馬門今大廳前有石函長二尺高一尺代不敢開銘云秦建元十年造銅虎馬又曰汴州陳留郡縣本春秋衛地魏惠王自安邑徙都亦稱梁惠王焉土多髦俊儒藝則以遊俠夷門即侯羸抱關處又曰洪州西門昌門豫章生松陽門內大二十五圍嘗枯永嘉中忽更榮茂以為元帝中興之瑞故郭璞南郊賦云弊樟櫂秀於祖邑以宣帝曾為此郡守故也又曰虬門即吳大城門也又曰廣州盧躭仕州為治中有仙術刺史步騭惡之以狀聞後誅之躭後題其門曰珠門珠門國雖存無射年欲知此書盧躭還太守削之隨削字更生又曰越州雷門勾踐所立吳有虵門得雷而發表事吳之意吳以越在辰巳之地作虵門石虎鄴中記曰鄴宮南面三門西鳳陽門高二十五丈上六層反宇向陽下開二門又安大銅鳳於其鎮舉頭一丈六尺開䆫戶朱柱白壁未到鄴城七八里遙望此門述征記曰青門外有魏車騎將軍郭淮碑小城最東一門名落索門門裏有司馬京兆碑郡民所立豫章記曰郡灌嬰所築有六門其一日松陽門其所以郡為名西二門其一曰昌門其一曰皋門東及北一門亦即以東北為名晉太元中太守順陽范君更開門之北為東陽門以對皋門開北門以對松陽門今八門相望通路直指安城記曰郡大城舊有六門今為八荊州圖記曰臨灃縣南三百里有高巒特立素崖千尋望之有似香鑪吳永安六年自然洞開其朗如門古老相傳名天門門兩角上各生一竹垂下為之天箒云吳, SBCK: ''}
