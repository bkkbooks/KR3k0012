  - {type: variant, offset: 1218, length: 170, content: 即上東門也一曰上昇門又曰閶闔門漢之西上門又曰陶水東南經高門南蓋層阜墮缺故有高門之稱矣又經司馬子長墓北入于河亦謂之龍門太史自敘云遷生於龍門是也在馮翊夏陽縣郡國誌賀州封陽有隄陂龍水深百尋大魚自擲登此門化為龍不過者曝鰓點額也又曰同州龍門城帶龍門山大魚點額暴鰓半死謂此也司馬彪注莊子云呂梁即龍門也又曰郢城南有三門東曰龍門離騷云過夏首而西浮顧龍門而不, SBCK: 數}
