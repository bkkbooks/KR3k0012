  - {type: variant, offset: 444, length: 282, content: 秦孝文王以李冰為蜀守冰作石犀五頭以壓水精在市橋門今所謂石牛門吳越春秋曰吳王闔閭為太子騁齊女齊女思於齊日夜號泣因而為疾闔閭乃為起北門名曰望齊門作樓令女往登遊其上又曰子胥為吳造大城陸門八象天之八風水門八法地之八聽立閶門者象天門通閶闔風也立虵門以象地戶亦名破楚門亦名虵門者吳位辰屬龍故小城南門作龍以厭虵氣也又曰吳赦越王使歸國送之虵門之外大縱酒群臣祖道晏子春秋曰晏子使楚晏子身短楚人為小門於大門之側延晏子晏子曰使狗國者從狗門入今臣使楚不當從此門入乃更通大門淮南子曰周文王作玉門言以玉飾也又曰崑崙山旁有四百四十門又曰北極之山曰寒門楚辭曰踔絕寒門又曰自東北方土山曰東極之山曰開, WYG: ''}
