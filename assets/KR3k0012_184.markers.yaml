  - {type: variant, offset: 1389, length: 126, content: 夏首即夏口也又曰洞庭山有宮五門東通林屋西達峨眉南接羅浮北連岱岳東有石樓樓下兩石鼓扣之即清越所謂神鉦也又曰兗州乘丘左傳公子偃曰宋師不整可敗也自雩門突出蒙皋比而先犯之大敗宋師于乘丘即此也又曰長安縣漢高祖五年置故城在京西北二里漢惠帝築南為南斗形北為北斗形入街, SBCK: 親觀差閣}
