  - {type: variant, offset: 3525, length: 0, content: '', SBCK: 何峨峨飛閣跨通波崔􅄾七蠲曰紫閣青宫綺錯相連東京賦曰飛閣神行南都賦曰連閣煥其相輝上林賦曰重座曲閣陸機表云登三閣注三閣謂祕書郎掌内外三閣經書鮑昭詩觀霞登綵閣蜀都賦曰行陽城之延閣注延長也江淹表云府之延閣注延閣書府也天台賦曰朱閣玲瓏於雲間陸機詩曰飛閣纓虹帶張景陽七命翆觀岑青彫閣霞連謝􅀇暉詩曰㝷雲陟累樹隨山望茵閣楚辭曰蘭閣􅀆黄樓古詩曰層閣肅天居簃音馳又音移爾雅曰連閣謂之簃郭璞注曰堂樓閣連小屋今呼之簃蹰連觀也通俗文連閣曰簃闥東觀漢記曰帝詔馬嚴留仁壽闥與校書杜撫班固定建武注記晉宫閣名曰洛陽宫有崇陽闥延明闥通明闥脩雲闥通福闥徴音闥承休闥􅀇明闥􅀇暉闥崇禮闥}
