  - {type: variant, offset: 2931, length: 295, content: 上陽宮東西二門南曰提象門北星躔門內門曰觀風門又曰東都苑東面四門曰垂豫上陽新門望春門南面三門曰興善興安靈光門西面四門曰延秋遊義籠煙靈溪門北面四門曰朝陽靈圃望冬應福門又曰東都皇城南面三門正南曰端門東左掖門西又掖門東面一門賓曜門西面二門南曰麗景門北曰宣耀門又曰東都城東面一門宣仁門南面一門永福門北面一門含嘉門又曰萬年縣門宇文愷所造高宗末太平公主出降於縣廨為婚第以縣門窄隘欲毀之高宗勑曰其宇文愷所作不須坼於他所開門遂存楚辭曰望長楸而大息涕零零其若霰過夏首而西浮顧龍門而不見又曰君之門兮九重又曰魂兮下來入脩門王逸曰脩門郢城門也摯虞門銘云祿無常家福無定門人謀鬼謀道在則尊李尤平城門銘曰平門督司午位處中外, SBCK: 紫微宫有}
