  - {type: variant, offset: 76, length: 4, content: 敬遇賓客, SBCK: 出畏之入懼之也解道虎齊記曰巢父城北十五里石户聖人去轉欲閇今裁廣數寸窺屋裏方二丈論衡曰燕王生明光宫所卧處三户盡閉使二十人開不得越地傳曰勾踐宫有百户列仙傳曰方回堯時􅀮人食雲母夏桀時爲人所閉於宫中從求道因化得去印封其户時人曰得方回一丸泥閇户不可開樞爾雅曰樞謂之椳郭璞注曰門户屝樞也孫炎曰門户扇樞開可依蔽爲提也說文曰門樞謂之椳魏志華佗曰户樞不朽潜夫論曰}
  - {type: page-break, offset: 76, content: '', id: KR3k0012_SBCK_184-3b}
  - {type: variant, offset: 76, length: 38, content: 敬遇賓客貴賤無二蔡邕明堂月令論曰禮古大明堂之禮曰膳夫氏相禮日中出南闈見九侯及, WYG: ''}
  - {type: variant, offset: 76, length: 4, content: 敬遇賓客, krp: 出畏之入懼之也解道虎齊記曰巢父城北十五里石户聖人去轉欲閇今裁廣數寸窺屋裏方二丈論衡曰燕王生明光宫所卧處三户盡閉使二十人開不得越地傳曰勾踐宫有百户列仙傳曰方回堯時隱人食雲母夏桀時爲人所閉於宫中從求道因化得去印封其户時人曰得方回一丸泥閇户不可開樞爾雅曰樞謂之椳郭璞注曰門户屝樞也孫炎曰門户扇樞開可依蔽爲提也說文曰門樞謂之椳魏志華佗曰户樞不朽潜夫論曰}
