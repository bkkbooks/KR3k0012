  - {type: variant, offset: 1516, length: 123, content: 陌東面有青綺門東陵侯邵平秦破為布衣種瓜此門外西北面有棘門漢文屯兵之所又曰魯城伯禽邑也西五門東一曰鹿門即臧孫紇斬鹿門關以出奔邾第三曰稷門即圉人犖能投蓋于稷門之所又曰蜀望帝以褒斜為前門熊耳靈關為後戶又曰鄜州仙宮門即漢武帝所遊相思川也伏陸縣有相思鄉又曰, SBCK: 間}
