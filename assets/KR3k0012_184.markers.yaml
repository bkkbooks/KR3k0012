  - {type: variant, offset: 10, length: 0, content: '', SBCK: 子曰誰能岀不由户者何莫由斯道也史記田嬰賤妾有子名文五月五日生嬰告其母勿令舉妾竊舉之及嬰見文怒曰五月之子長與户齊不利其父母文頓首曰人生受命于天乎受命于户乎如受命于户則髙其户誰能至者嬰歎曰子休矣後漢龐叅爲漢陽太守郡人任棠者有竒節隠居教授叅到先􅀱之棠不與言但以薤一大夲水一盞致於屏前自抱孫兒伏於户下主簿白以爲琚叅思其微意良乆曰棠是欲曉太守也水者欲吾清也拔大薤夲欲吾擊強宗也抱兒當户欲吾開門恤􅀌也於是歎息而還叅在職果能抑強扶弱以惠政得人又曰魏應字君伯任城人也少好學建武􅀄詣博士受業習魯詩閇户誦習不交僚友京師稱之又曰魯恭十五及弟丕俱居大學習魯詩魯申公詩􅐬户講誦絶人間事兄弟俱爲諸儒所稱學士爭歸之􅀳書羊祐􅀓襄陽百姓於峴山祜平生遊憇之所建碑立廟歳時饗􅀕焉望其碑者莫不流涕杜預因名爲墯淚碑荆州人爲祜諱名屋室皆以門爲稱改户曹爲詞曹也老子曰不出户知天下莊子曰原憲居魯蓬户不完桑以爲樞也慎子曰天明不憂人之闇雖不憂闇也闕户牖必取以明焉淮南子曰使􅀑神􅀇化則不待户牖而行若循虚而出入則亦無履也夫户牖者風氣所從往來也而風氣者隂陽之户牖者也離者必病離遭故託􅀑神以戒之又曰百星之明不若一月之光十牖畢開不若一户之明楊子法言曰山徑之蹊不可勝由矣向牆之户不可勝入矣曰惡由入曰}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_SBCK_184-2a}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_SBCK_184-2b}
  - {type: variant, offset: 10, length: 0, content: '', WYG: 子曰誰能出不由户何莫由斯道也史記曰田嬰妾有子名文五月五日生嬰告其母勿令舉妾竊舉之及嬰見文怒曰五月之子長與户齊不利其父文頓首曰人生受命于天乎抑受命于户乎如受命于户則髙其户誰能至者嬰歎曰子休矣後漢書曰龎參為漢陽太守任棠者有竒節隠居敎授叅到先候之棠不與言但以薤一大本水一盂置户屏前自抱兒伏於户下主簿白以為倨叅思其㣲意良久曰棠是欲曉太守也水者欲吾清也㧞大薤本欲吾擊强宗也抱兒當户欲吾開門恤孤也於是歎息而還叅在職果能抑强扶弱以惠政得人又曰魏應字君伯任城人也少好學建武初詣博士受業習魯詩閉户誦習不交僚友京師稱之又曰魯恭及其弟丕居太學習魯詩魯申公詩閉户講誦絶人間事兄弟俱為諸儒所稱學士争歸之晉書羊祜傳襄陽百姓於峴山之右平生遊憇之所建碑立廟歲時享祭焉望其碑者莫不流涕杜預因名為墮淚碑荆州人為祜諱名屋室皆以門為稱改户曹為祠曹也老子曰不出户知天下莊子曰原憲居蓬户不完桑以為樞也慎子曰天有明不憂人之暗天雖不憂人暗闢户牖必已以明焉淮南子曰使鬼神𤣥化則不待户牖而行若循虛而出入則亦無履也夫户牖者風氣所從往來者而風氣者隂陽之户牖也離者必病故託鬼神以戒之又曰百星之明不若一月之光十牖之開不若一户之明揚子法言曰山徑之蹊不可勝由向牆之户不可勝入矣曰惡由入曰}
