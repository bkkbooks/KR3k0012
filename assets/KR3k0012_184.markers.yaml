  - {type: variant, offset: 1037, length: 18, content: 掖門西掖門千秋門南端門笙鏞門神仙門敬, SBCK: 園止於阿閣棲梧桐食竹實終身不去禮記内則曰大夫七十而閣天子之閣左逹五右逹五鄭􅀇注曰閣以板爲之藏食物也王者三牲􅁏及魚腊廣雅曰棧閣也漢書曰甘露中五經諸儒雜論於石渠閣又楊雄傳曰王莽時雄校書天禄閣上治獄使者來欲収雄雄恐不免乃從閣上自投幾死莽聞之曰雄素不與事何故在此間請問其故廼劉愔子棻甞從雄學作竒字雄不知情有詔勿問然京師爲語曰惟寂惟寞自投于閣後漢楊級上言宣帝博徴群儒論定五經於石渠閣方今天下少事學者得成其業而章句之徒破壞大體冝如石渠故事永爲後世}
