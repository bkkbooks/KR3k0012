  - {type: variant, offset: 7, length: 1, content: 家, SBCK: 入户奉扄視瞻母囬不于掩人之私户開亦開户闔亦闔有後入者闔而勿遂又禮運曰大道之行外户而不閇是謂大同又王藻曰君子之居􅁪當户自明又月令曰孟春其祀户􅀕先脾陽氣出祀之於户也論}
