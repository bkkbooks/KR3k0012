  - {type: variant, offset: 531, length: 312, content: 城陸門八象天之八風水門八法地之八聽立閶門者象天門通閶闔風也立虵門以象地戶亦名破楚門亦名虵門者吳位辰屬龍故小城南門作龍以厭虵氣也又曰吳赦越王使歸國送之虵門之外大縱酒群臣祖道晏子春秋曰晏子使楚晏子身短楚人為小門於大門之側延晏子晏子曰使狗國者從狗門入今臣使楚不當從此門入乃更通大門淮南子曰周文王作玉門言以玉飾也又曰崑崙山旁有四百四十門又曰北極之山曰寒門楚辭曰踔絕寒門又曰自東北方土山曰東極之山曰開明之門東南方曰波母之山曰陽門南方曰南極之山曰暑門西方曰西極之山曰閶闔之門西北方曰不周之山幽都之門北方曰北極之山曰寒門八門之風是節寒暑焉神異經曰東北有鬼石室三百里戶共一門石牓題曰鬼門西南銅關頰牓題曰人往門向東北銅闕夾門牓題曰人來門張晏注, SBCK: 治}
