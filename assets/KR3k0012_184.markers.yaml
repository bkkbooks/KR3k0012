  - {type: variant, offset: 81, length: 1, content: 賤, SBCK: 戚懼家之不􅁻而聚爲令名懼之不堅而爲作鐵樞卒其所敗者非禁忌少門樞朽也苦崇貨財而行驕僣失民心耳事具門部􅀓子曰漢武世王侯觀殿重階金樞紫墀李陵詩曰明月照户樞想見餘光輝文選詩曰􅁗地天下樞八方溱賢才尚書顧命曰四人綦弁執戈上刃夾兩階戺孔安國曰綦文鹿子皮弁亦土也堂廉曰戺土所立處爾雅曰樞逹北方謂之落時落時謂之戺郭璞曰門特樞者或達北􅀮以爲固三秦記曰明光殿以金爲戺關易復卦曰先王以至日閇關啇旅不行后不省方焦貢易林曰大畜之乾金柱鐵關堅固衛災君子居之居當憂居左傳襄四年季孫攻臧紇斬鹿門之關以出奔邾杜預曰魯南城東門方言曰關而東陳楚之間户籥老子曰善閉}
  - {type: page-break, offset: 81, content: '', id: KR3k0012_SBCK_184-4a}
  - {type: variant, offset: 81, length: 1, content: 賤, krp: 戚懼家之不吉而聚爲令名懼之不堅而爲作鐵樞卒其所敗者非禁忌少門樞朽也苦崇貨財而行驕僣失民心耳事具門部傳子曰漢武世王侯觀殿重階金樞紫墀李陵詩曰明月照户樞想見餘光輝文選詩曰秦地天下樞八方溱賢才尚書顧命曰四人綦弁執戈上刃夾兩階戺孔安國曰綦文鹿子皮弁亦土也堂廉曰戺土所立處爾雅曰樞逹北方謂之落時落時謂之戺郭璞曰門特樞者或達北隱以爲固三秦記曰明光殿以金爲戺關易復卦曰先王以至日閇關啇旅不行后不省方焦貢易林曰大畜之乾金柱鐵關堅固衛災君子居之居當憂居左傳襄四年季孫攻臧紇斬鹿門之關以出奔邾杜預曰魯南城東門方言曰關而東陳楚之間户籥老子曰善閉}
  - {type: variant, offset: 83, length: 1, content: 二, SBCK: 關史記曰侯嬴謂魏公子曰嬴乃夷門抱關者又漢書王仲翁謂蕭望之曰不肯録録反抱關爲錄疑循常也魯連子曰魯連先生見孟甞君於杏堂之門孟甞君曰吾聞先生有勢數可得聞乎連曰勢數者譬若門關舉之而便則可以一指持中而舉之非便則兩手不關非益加重兩手非加罷也彼所起者非舉勢也彼可舉然後舉之所謂勢數鑰周禮地官曰司門掌授管鍵以啓閉國門鄭司農云鍵爲壯也方言曰關西謂之鑰何承天纂文曰壯出鑰者也人作鑰子鑰母非也東宫舊事曰守鑰四人對畨上下東宮門鑰在中庶子坊太公金匱鑰之書曰昏慎守深察訛也風俗通曰鑰施懸魚翳伏淵源欲令揵閉如此闈爾雅曰宫中門謂之闈周禮考工記曰闈門容小扃}
