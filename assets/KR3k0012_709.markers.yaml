  - {type: variant, offset: 368, length: 4, content: 先雚簟尊, SBCK: 漢書儀曰􅀕天紫壇紺席登地用六彩席六重吕氏春秋曰衛靈公天寒鑿池宛春諌曰天寒起土恐傷民曰天寒乎哉宛春曰公衣狐裘坐熊席陬隅有竈是以不寒莊子曰申屠嘉兀者也與鄭子産同師伯昏瞀人合堂同席而坐也魯連子曰人君所察者三不可以不知不知行與不行譬以方爲輪也不知冝與不冝譬以錦縁薦也列子曰陽朱南}
  - {type: variant, offset: 368, length: 4, content: 先雚簟尊, WYG: 漢書儀曰天子登紫壇紺席除地用六彩席六重吕氏春秋曰衛靈公天寒鑿池宛春諫曰天寒起工恐傷民曰天寒乎哉宛春曰公衣狐裘坐熊席陬隅有灶是以不寒莊子曰申屠嘉兀者也與鄭子産同師伯昏瞀人合堂同席而坐也魯連子曰人君所察者三不可以不知不知行與不行譬以方為輪也不知宜與不宜譬以錦縁薦也列子曰楊朱南}
  - {type: page-break, offset: 368, content: '', id: KR3k0012_WYG_709-8a, image: WYG0899/WYG0899-0317c.png}
  - {type: variant, offset: 368, length: 4, content: 先雚簟尊, krp: 漢書儀曰祭天紫壇紺席登地用六彩席六重吕氏春秋曰衛靈公天寒鑿池宛春諌曰天寒起土恐傷民曰天寒乎哉宛春曰公衣狐裘坐熊席陬隅有竈是以不寒莊子曰申屠嘉兀者也與鄭子産同師伯昏瞀人合堂同席而坐也魯連子曰人君所察者三不可以不知不知行與不行譬以方爲輪也不知冝與不冝譬以錦縁薦也列子曰陽朱南}
