  - {type: variant, offset: 335, length: 1, content: 永, SBCK: 陽邁􅀄在孕其母夢生兒有人以金席籍之其色光麗夷人謂金之精者爲陽邁中國云紫磨者因以爲名宋起居注曰元嘉中劉禎爲御史中丞奏風聞廣州刺史韋朗於州部作白蒐席三百二十領請以事追免朗官呉均齊春秋曰劉璡字子璥耿介好禮嘗與故人共車於津陽内見一女子容質甚麗盻睞之璡因抽坐席懸車中以隔絶之其正如此唐書曰代宗時晉州男子郇摸以麻辨髪持竹筐􅓗席哭於東市三十字論時政每字條一事上即召見又曰玄宗子頴王璬爲劒南節度大使玄宗將幸蜀遣璬先赴夲郡渡綿州江乗舡見以綵縁席而籍者頋曰此可以爲寢處柰何賤之令撤去六韜曰桀紂之時婦人坐文綺之席衣以紈綺之夜家語曰}
  - {type: page-break, offset: 335, content: '', id: KR3k0012_SBCK_709-5a}
  - {type: variant, offset: 335, length: 1, content: 永, WYG: 陽邁初在孕其母夢生兒有人以金席籍之其色光麗夷人謂金之精為陽邁中國云紫磨者因以為名宋起居注曰元嘉中劉禎為御史中丞奏風聞廣州刺史韋朗於州部作白席三百二十領請以事追免郎官吳均齊春秋曰劉璡字子敬耿介好禮嘗與故人共車於津陽門内見一女子容質甚麗盻睞之璡因抽坐席懸車中以隔絶之其正如此唐書曰代宗時晉州男子郇模以麻辮髮持竹筐葦席哭於東市以三十字論時政每字條一事上即召見又曰𤣥宗子頴王璬為劔南節度大使𤣥宗將􅄑蜀遣璬先赴本郡渡綿州江乘舡見以綵縁席而籍者顧曰此可以為寢處奈何踐之令撤去六韜曰桀紂之時婦人坐文綺之席衣以紈綺之衣家語曰}
