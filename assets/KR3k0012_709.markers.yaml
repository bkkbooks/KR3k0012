  - {type: variant, offset: 45, length: 0, content: '', WYG: 筵掌五席大朝覲大饗射凡封國命諸侯以王位設黼扆扆前南鄉設筦筵紛純加繅席畫純加次席黼純諸侯祭祀席蒲筵繢純加筦席紛純右雕几竹席筦筵紛純加繅席畫純筵甸役則設熊席凡喪事設葦席大戴禮曰武王踐祚席前左端之銘曰安樂必敬前右端之銘曰無行所悔後左端之銘曰一反一側爾}
