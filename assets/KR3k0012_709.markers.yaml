  - {type: variant, offset: 43, length: 1, content: 枕, WYG: 席間函丈主人跪正席客跪撫席而辭客徹重席主人固辭客踐席乃坐又檀弓下曰仲尼之畜狗死使子貢埋之曰丘也貧無蓋與之席傳曰大輅越音活席昭其儉也又曰臧文仲不仁者三下展禽廢六關妾織蒲周禮天官玉府曰玉府掌王之袵席又春官曰司}
