  - {type: variant, offset: 18, length: 0, content: '', SBCK: 蒲平以蒲作之其體平也蓆釋也可卷可釋也書曰牗間南嚮敷重篾蓆黼純華玉仍几篾桃枝竹白黒雜繒縁之華彩色華玉以飾慿几因因也因生時几不改作西序東嚮敷重底席綴純文貝仍几東西廂謂之序底蒻革綴􅄂綵有文之具飾矣東序西嚮敷重豐蓆􅀞純雕玉仍几豐莞彩色爲􅀞雕刻鏤此養國老饗羣臣之坐西序南嚮敷重荀蓆玄紛純􅃮仍几荀蒻竹玄紛黒綬此親屬私宴之坐詩邶栢舟曰我心匪席不可卷也席雖平尚可卷禮曲禮上曰羣居五人則長者必異席席以四人爲節爲人子者坐不中席又曰有憂者側席而坐側猶持也有䘮者專席而坐專猶單也侍坐於所尊敬無餘席必盡其近者尊之端爲其後來也又曰姑姊妹女子子巳嫁而反兄弟不與同席而坐不與同器而食又曰奉蓆如橋居廟切横奉之令左昂古低如有首尾然橋井上􅥱槹衡上低昂請蓆何郷請祍何趾順折者所安也祍卧席也坐問郷卧問趾因於隂陽也席南郷北郷以西方爲上東郷西郷以南方爲上若非飲食之客則}
  - {type: page-break, offset: 18, content: '', id: KR3k0012_SBCK_709-1b}
  - {type: variant, offset: 18, length: 1, content: 布, WYG: 蒲草也以蒲作}
  - {type: variant, offset: 18, length: 0, content: '', krp: 蒲平以蒲作之其體平也蓆釋也可卷可釋也書曰牗間南嚮敷重篾蓆黼純華玉仍几篾桃枝竹白黒雜繒縁之華彩色華玉以飾慿几因因也因生時几不改作西序東嚮敷重底席綴純文貝仍几東西廂謂之序底蒻革綴雜綵有文之具飾矣東序西嚮敷重豐蓆畫純雕玉仍几豐莞彩色爲畫雕刻鏤此養國老饗羣臣之坐西序南嚮敷重荀蓆玄紛純􅃮仍几荀蒻竹玄紛黒綬此親屬私宴之坐詩邶栢舟曰我心匪席不可卷也席雖平尚可卷禮曲禮上曰羣居五人則長者必異席席以四人爲節爲人子者坐不中席又曰有憂者側席而坐側猶持也有䘮者專席而坐專猶單也侍坐於所尊敬無餘席必盡其近者尊之端爲其後來也又曰姑姊妹女子子巳嫁而反兄弟不與同席而坐不與同器而食又曰奉蓆如橋居廟切横奉之令左昂古低如有首尾然橋井上􅥱槹衡上低昂請蓆何郷請祍何趾順折者所安也祍卧席也坐問郷卧問趾因於隂陽也席南郷北郷以西方爲上東郷西郷以南方爲上若非飲食之客則}
  - {type: variant, offset: 19, length: 0, content: '', SBCK: 席席間凾丈謂講問客也凾猶容也講問冝相對客文足以指畫也飲食}
  - {type: variant, offset: 19, length: 0, content: '', krp: 席席間凾丈謂講問客也凾猶容也講問冝相對客文足以指畫也飲食}
  - {type: variant, offset: 20, length: 2, content: 簟然, SBCK: 客布席於牗前主人跪}
  - {type: variant, offset: 20, length: 3, content: 簟然正, WYG: 其體}
  - {type: variant, offset: 20, length: 2, content: 簟然, krp: 客布席於牗前主人跪}
  - {type: variant, offset: 23, length: 1, content: 平, SBCK: 席客跪撫席而辭客徹重席主人固辭客踐席乃坐又檀弓下曰仲尼之畜狗死使子貢埋之曰丘也貧無蓋與之以席傳曰大輅越活音席昭其儉也服䖍曰越席紀草爲席又曰臧文仲不仁者三下展禽廢六􅀜妾織蒲杜預曰家人敗席與民爭利周禮天官玉府曰王廂府掌王之袵愼鄭司農云袵席許曰純袵席軟弱布也又春官曰司几筵掌五席大朝覲大饗射凡封國命諸侯王位設黼依依前南郷設莞筵紛純加繅席畫純加次席黼純鄭司農云紛白繡也純縁純也謂紛有文如綬而狹者也繅席削蒲編以五彩若今合歡也畫謂雲氣也次者有文次列之也諸侯􅀕祀席蒲筵繢純加莞席紛純右彫几昨席莞筵紛純加繅席畫純筵甸役則設熊席凡䘮事設葦席大戴}
