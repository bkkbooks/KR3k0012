  - {type: variant, offset: 24, length: 0, content: '', WYG: 也席釋也可卷可釋也書曰牖間南嚮敷重篾席黼純華玉仍几西序東嚮敷重底席綴純文貝仍几東序西嚮敷重豐席畫純雕玉仍几西夾南嚮敷重筍席𤣥紛純漆仍几詩邶栢舟曰我心匪席不可卷也席雖平尚可卷禮記曲}
