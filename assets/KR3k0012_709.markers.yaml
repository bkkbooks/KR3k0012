  - {type: variant, offset: 1510, length: 570, content: 伐蜀自陰平行無人之地鑿山通道作橋以氈自裹推轉而下魏武帝與楊彪書曰今贈足下青氈床褥三具也晉書曰杜預子錫為愍懷太子舍人屢直諫於太子太子患之置針於鍚坐處氈中鍚上剌足血出又曰戴記曰慕容熙后符氏卒慕容隆妻張氏熙之㛐也美姿容有巧思熙將以符氏之殉欲以罪殺之乃毀其檖鞾有中弊氈遂賜死三女叩頭求哀熙不許齊書曰孔奐為晉陵太守清白自守妻子並不之官唯以單舡臨郡所得秩俸隨即分贍孤寡郡中號曰神君曲阿富人殷綺見奐居處儉素乃餉以衣氈一具奐辭不受北齊書曰裴寬與東魏將彭樂戰於新城因傷被擒至河陰見齊文襄寬舉止閑雅善於占對文襄甚賞異之解鏁付館厚加禮遇寬乃裁所臥氈夜縋而出因得遁還又曰清河三年周師及突厥至并州突厥謂周人曰爾言齊亂故我伐之今齊人眼中有鐵何可當耶乃還至陘嶺凍滑乃鋪氈以渡之又曰綦儁佞巧能候當途斛斯椿賀拔勝皆與友善性多詐賀拔勝出鎮荊州過儁別因辭儁故見敗氈弊被更遺之錢物廣志曰羗女人披大華氈以為盛服拾遺錄曰漢武帝以氈綈藉地惡輶之喧也搜神記曰太康中天下以氈為陌頭及帶身袴口於是百姓相戲曰中國其必為胡所破也夫氈胡之產者也而今天下以為陌頭帶身袴口胡既三制之矣淮南子曰夫胡人見麻不知其可以為布越人見毳不知其可以為氈故不通於物者不可與言俗俗說曰桓豹奴病勞冷無氈可臥桓車騎自撤己眠氈與之語林曰王子敬在齋中臥偷人取物一室之內略盡子敬臥而不動偷遂登褟欲有所覔子敬因呼曰偷兒石染青氈是我家, SBCK: 爲蓆益部耆}
