  - {type: 'tls:seg', offset: 371, content: '', id: KR3k0012_CHANT_709-7a.9}
  - {type: variant, offset: 373, length: 0, content: '', SBCK: 沛之梁而過老子老子曰睢睢盱盱而誰與居夫太白若辱盛德如不足楊朱曰聞命矣其徃也舎者避席其來也焬者與之争竈席晏子曰景公獵休坐地而食晏子後至戍葭而席公不恱曰子猶席何也對曰臣聞介胄坐陳不席獄尸不席二者皆憂也臣故不敢以憂侍坐公曰善令大夫皆席又曰景公飲酒移於晏子晏子曰夫鋪薦陳簠有人臣不敢與焉又移於司馬穣苴曰鋪薦席陳簠簋者有人臣不敢與焉范子計然曰六尺蘭席出河東}
  - {type: page-break, offset: 373, content: '', id: KR3k0012_SBCK_709-5b}
  - {type: variant, offset: 373, length: 0, content: '', WYG: 沛之梁而過老子老子曰而睢睢而盱盱而誰與居夫太白若辱盛德如不足楊朱曰聞命矣其徃也舍者避席其來也煬者與之爭竈席晏子曰景公獵休坐地而食晏子後至滅葭而坐公不悅曰子獨席何也對曰臣聞介胄坐陳不席獄户不席二者皆憂也臣故不敢以憂侍坐公曰善令大夫皆席又曰景公飲酒移於晏子晏子曰夫鋪薦陳簠者人臣不敢與焉又移於司馬穰苴曰鋪薦席陳簠簋者人臣不敢與焉范子計然曰六尺蘭席出河東}
  - {type: page-break, offset: 373, content: '', id: KR3k0012_WYG_709-8b, image: WYG0899/WYG0899-0317d.png}
  - {type: variant, offset: 373, length: 0, content: '', krp: 沛之梁而過老子老子曰睢睢盱盱而誰與居夫太白若辱盛德如不足楊朱曰聞命矣其徃也舎者避席其來也焬者與之争竈席晏子曰景公獵休坐地而食晏子後至戍葭而席公不恱曰子猶席何也對曰臣聞介胄坐陳不席獄尸不席二者皆憂也臣故不敢以憂侍坐公曰善令大夫皆席又曰景公飲酒移於晏子晏子曰夫鋪薦陳簠有人臣不敢與焉又移於司馬穣苴曰鋪薦席陳簠簋者有人臣不敢與焉范子計然曰六尺蘭席出河東}
  - {type: variant, offset: 374, length: 3, content: 先玄酒, SBCK: 價七十蒲席出三輔上價百子思子曰舜不降席而天下治桀紂不降席而天下亂韓子曰趙簡子謂左右曰車席泰羙夫冠雖惡頭必戴之履雖善足必履之金車如此其太羙也吾將何以履之且夫羙而耗上方義之道也又曰衛嗣公時縣有人於令左右縣令發褥而席弊嗣公令人遣席曰吾聞汝發褥而席弊其賜汝席縣令大驚以君爲神又曰孟獻伯相魯不坐重席又曰禹爲蔣席頗縁此弥侈矣而國不服者三十三殷作茵席彫文弥侈矣國之不服者五十三又曰文公至河令席袵􅂢之咎犯聞之曰席蓐所卧也而君弃之臣不勝其哀􅀃苑曰孔子困於陳蔡之間居環堵之内席三經之席塩鐵論曰古者庻人蒲席以草經及後踐蒲蒻􅃨筵方薦帛縁者也又曰古者大夫􅃨薦草縁蒲平單莞今富者繡茵崔豹古今注曰草名虎􅁂者江東織以爲席曰西}
  - {type: page-break, offset: 374, content: '', id: KR3k0012_SBCK_709-6a}
  - {type: page-break, offset: 374, content: '', id: KR3k0012_SBCK_709-6b}
  - {type: variant, offset: 374, length: 3, content: 先玄酒, WYG: 價七十蒲席出三輔上價百兩子思子曰舜不降席而天下治桀紂不降席而天下亂韓子曰趙簡子謂左右曰車席㤗美夫冠雖惡頭必戴之履雖善足必履之今車如此其㤗美也吾將何以履之且夫美而耗上妨義之道也又曰衛嗣公時有人於縣令左右縣令發褥而席弊嗣公令人遺席曰吾聞汝發褥而席弊其賜汝席縣令大驚以君為神又曰孟獻伯相魯不坐重席又曰禹為蔣席頗縁此彌侈也而國不服者三十三人殷作茵蓆彫文彌侈矣國之不服者五十三又曰文公至河令席袵捐之舅犯聞之曰席蓐所卧也而君棄之臣不勝其哀說苑曰孔子困於陳蔡之間居環堵之内坐三經之席鹽鐵論曰古者庶人蒲席以草經及後踐蒲蒻復筵方薦帛縁者也又曰古者大夫複薦草縁蒲平簞筦今當富者繡茵崔豹古今注曰草名虎鬚者江東織以為席曰西}
