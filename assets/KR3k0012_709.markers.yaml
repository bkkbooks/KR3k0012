  - {type: variant, offset: 36, length: 4, content: 父母舅姑, SBCK: 任安田仁俱爲衛將軍舎人居門下衛將軍從此兩人過平陽至主家令兩人與􅀐奴同席而食此二子拔刀斷席而坐主家皆怪而惡}
  - {type: variant, offset: 36, length: 3, content: 父母舅, WYG: 有憂者側席而坐有喪者專席而坐侍坐於所尊敬無餘席又曰}
  - {type: variant, offset: 36, length: 4, content: 父母舅姑, krp: 任安田仁俱爲衛將軍舎人居門下衛將軍從此兩人過平陽至主家令兩人與騎奴同席而食此二子拔刀斷席而坐主家皆怪而惡}
  - {type: variant, offset: 40, length: 0, content: '', WYG: 姊妹女子子已嫁而反兄弟不與同席而坐不與同器而食又曰奉席如橋居廟切橫請席何鄉請袵何趾南向北向以西方為上東鄉西鄉以南方為上若非飲食}
  - {type: variant, offset: 41, length: 1, content: 簟, SBCK: 莫敢問也又曰陳平以弊}
