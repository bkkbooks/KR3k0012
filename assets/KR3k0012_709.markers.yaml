  - {type: variant, offset: 809, length: 351, content: 母為作厚褥大被人問其故母曰小兒無德客多貧故為廣被大褥齊書曰宗測高尚不仕王儉亦雅重之贈以蒲褥筍席又曰禇彥回弟澄為左戶尚書彥回薨澄以錢一萬一千就招提寺贖高帝所賜彥回白豹坐褥又柳慶遠為儀同初慶遠從父兄世隆嘗謂慶遠曰吾夢太尉以褥席見賜吾遂亞台司適又夢以吾褥席與汝汝必光我門族至是慶遠亦繼世隆焉太尉謂元景也後魏書曰爾朱世隆將被誅此年正月晦日令僕並不上省西門不開忽有河內太守田帖家奴告省門亭長云今且為令王借車牛一乘終日於洛濱遊觀至晚王還省將軍自東掖門始覺車上無褥請為之記識世說曰晉孝武年十三四時冬天晝日不著衣夜則累茵褥謝公云體宜令常和陛下晝過冷夜過熱恐非攝生之術帝曰夜靜宜溫謝公出歎之也南越傳曰尉佗臥象床錦茵茵褥也東宮舊事曰皇太子拜有八尺禱一重中褥一步輿褥一納妃有承床禱三會稽後賢傳曰丁潭以光祿大夫還第詔賜床帳席褥, SBCK: 處}
