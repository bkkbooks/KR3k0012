  - {type: variant, offset: 60, length: 0, content: '', SBCK: 韓愈爲􅀽州刺史愈至潮州獻上表上對􅌠臣曰昨日韓愈表因思當時所論佛骨大是愛我我豈不知然爲人臣不當言人主事佛乃年促也我}
  - {type: variant, offset: 60, length: 0, content: '', WYG: 韓愈為袁州刺史愈潮州獻上表上對宰臣曰昨日韓愈表至因思當時所論佛骨大是愛我我豈不知然為人臣不當言人主事佛乃年促也我}
