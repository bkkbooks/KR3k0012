  - {type: variant, offset: 60, length: 0, content: '', krp: 韓愈爲袁州刺史愈至潮州獻上表上對宰臣曰昨日韓愈表因思當時所論佛骨大是愛我我豈不知然爲人臣不當言人主事佛乃年促也我}
  - {type: variant, offset: 61, length: 2, content: 六條, SBCK: 是惡之是時上深欲擢用愈候􅌠臣啓之耳皇甫鏄素嫉愈乃曰終是狂踈且與移一郡故有是命又曰劉禹錫移授播州刺史御史中丞裴度奏禹錫母年八十今播州乃猿狖所居人跡罕至禹錫誠合得罪然其老母必至不得行則湏與子爲死別傷陛不孝理之風伏請屈法稍移近處使得終飬上曰夫爲人子毎事尤湏修謹常恐貽親之憂今禹錫所坐更合重於他人豈可以此論度不能對上曰我所言是責人子之事然終不能傷其所親之心明日改授禹􅃬爲連州刺史又曰崔珙大和七年正月拜廣州刺史兼嶺南節度使延英中謝帝}
