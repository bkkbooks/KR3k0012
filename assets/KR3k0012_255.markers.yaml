  - {type: variant, offset: 897, length: 302, content: 時為須昌小吏者百餘人祖餞之其一人輕卞卞遣扶出之人以此少之又曰王機入廣州刺史郭訥握節而避機遂入城就訥求節訥曰昔蘇武不失其節前史以為美談此節天朝所假義不相與自可遣兵取之機慚而止又曰石苞為徐州刺史文帝之敗於東關也苞獨全軍而退帝指所持節謂苞曰恨不以此付卿晉陽春秋云胡質為荊州刺史子威自洛陽至荊州定省家貧自驅驢單行見父停十餘日臨歸質賜絹一疋為道糧威跪拜曰大人清高不審安得此質曰吾俸祿之餘故以為汝糧耳又曰晉武嘗問威曰卿清孰與卿父清威曰臣不如也帝曰何以為不如威曰臣父清畏人知之臣清畏人不知陸機晉武紀曰王濬之在巴郡也夢懸四刀於其上甚惡之璿主簿李毅拜賀曰三刀為州而見益一明府其臨益州乎濬果為益州刺史晉中興書曰荀羨字令則為徐, SBCK: ''}
