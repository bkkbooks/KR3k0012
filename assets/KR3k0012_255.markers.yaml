  - {type: variant, offset: 2077, length: 409, content: 本州特給路車鼓吹先還其宅并給騎士三千列羽儀遊鄉黨經過故人歡飲旬日然後入州世以為榮又曰獨孤信為秦州刺史嘗因獵日暮馳入城其帽微側詰旦而更人有戴帽者咸慕信而側帽焉其為鄰境及士庶所重如此又曰劉雄字猛雀高祖嘗從容謂雄曰古人云富貴不歸故鄉猶衣錦夜遊今以卿為本州何如雄稽首拜謝於是詔以雄為河州刺史雄先已為本縣令復有此授鄉里榮之又曰史寧為涼州刺史遣使詣太祖請事太祖即以所服冠履衣被及弓箭甲矟等賜寧謂其使人曰為我謝涼州孤解衣以衣公推心以委公公其善始令終無損功名也又曰長孫儉為荊州刺史時梁岳陽王蕭詧內附初遣使入朝至荊州儉於廳事列軍儀具戎服與使人以賓主禮相見儉容貌魁偉音聲如鍾大為鮮卑語遣人傳譯以問客客惶恐不敢仰視日晚儉乃著裙襦紗帽引客宴於別齋因序梁國喪亂朝廷招攜之意發言可觀使人大悅出曰吾所不能測也三國典略曰周陸逞字季明嘗為宜州刺史故事刺史奉辭例備鹵簿逞以時屬農要奏請停之制曰逞雖未臨人已存優恤宜遂所請彰其雅操又曰周帝制於玉壁置勳州以孝寬, WYG: ''}
