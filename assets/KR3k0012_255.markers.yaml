  - {type: variant, offset: 12, length: 2, content: 監察, SBCK: 楊尚希素有足疾上謂之曰蒲州出羙酒足堪養病屈公卧治之於是出拜蒲州刺史又曰髙勵拜楚州刺史吏民安之先是城北有伍子胥廟其俗敬􅀑祈禱者必以牛酒至破産業勵歎曰子胥賢者豈冝損百姓乃告諭所部自此遂止百姓頼之又曰張威以罪免後從上祠㤗山至洛陽上謂威曰自朕之有天下毎委公以重鎮可謂推赤心矣何乃不修名行唯利是視豈直􅀌􅀒朕心亦且累卿名德因問威曰公所執笏今安在威頓首曰臣􅀒罪􅃜失無顔復執謹藏於家上曰可持來威明日奉笏以見上曰雖不遵法度功効實多朕不忘之今還公笏於是復拜洛州刺史又曰梁彦光拜趙州刺史彦光言於上曰臣前待罪相州百姓呼爲戴帽餳臣自分廢黜無復衣冠之望不謂天恩復垂収採請復爲相州改弦昜調庶有以變其風俗上荅隆恩上從之復爲相州刺史豪猾者聞彦光自請而來莫不嗤􅀏彦光下車發擿姧隠有􅀂神明於是狡猾之徒莫不潜竄合境大駭唐書曰天授二年正月天后内出繡􅂁賜新除都督刺史其􅂁皆刺繡作山形繞山勒廻文銘曰德政惟明職令思平清信忠勤勞進躬親自此每新除都督刺史必以􅂁賜之又曰李擇言開元中爲漢褒相􅄮四州刺史安德郡公所歴皆以嚴幹聞其在漢州張嘉貞爲益州長史判都督事性簡貴待管内刺史禮隔而引擇言同搨坐談正理時人榮之又曰􅀽光庭者河西戌將天寳末爲伊州刺史禄山之亂西北邊戍兵入赴難􅀜隴郡邑皆爲吐藩所抜唯光廷守伊州累年外救不至虜百端誘􅀃終不屈部下如一及矢石旣盡粮儲並竭城將䧟没光廷手殺其妻子自焚而死朝廷聞之贈工部尚書又曰曹王臯上書言理道拜爲衡州刺史坐小法貶潮州刺史楊炎作相復以皐爲衡州刺史􅀄皐爲}
