  - {type: variant, offset: 1797, length: 441, content: 為本州當世榮之時終敬以老還鄉常呼其子元賓為史君每於元賓聽政之時與出元賓所先遣左右勑不聽起觀其斷決忻忻然喜見顏色又曰邢巒征梁漢諸郡之民相繼而至遂平漢中詔曰巒至彼有以懷和附眾高下品第可依義陽都督之格也拜巒西安梁秦州刺史北齊書曰張亮武定初拜太中大夫薛琡嘗夢亮於山上挂絲以告亮且占之曰山上絲幽字也君其為幽州乎數日亮出為幽州刺史北史曰齊平鑒為楊州刺史其妻生男鑒因喜飲醉擅免境內囚誤免關中細作二人醒而知之上表自劾文宣原其罪賜牛羊酒令作樂又曰慕容三藏為郭州刺史州界連雲山響稱萬年者三詔頒郡國仍遣使醮山所其日景雲浮於上雉免馴壇側使還以聞上大悅後周書曰蘇亮出為岐州刺史朝廷以其牧本州特給路車鼓吹先還其宅并給騎士三千列羽儀遊鄉黨經過故人歡飲旬日然後入州世以為榮又曰獨孤信為秦州刺史嘗因獵日暮馳入城其帽微側詰旦而更人有戴帽者咸慕信而側帽焉其為鄰境及士庶所重如此又曰劉雄字猛雀高祖嘗從容謂雄曰古人云富貴不歸故鄉猶衣錦夜遊今以卿為本州何如雄稽首拜謝於是詔以雄為河州刺史雄先已為本縣令復有此授鄉里榮之又曰史寧為, SBCK: 父爲}
