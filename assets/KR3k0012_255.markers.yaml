  - {type: variant, offset: 1639, length: 154, content: 南安王禎出為相州刺史高祖餞之於林都亭詔曰今者之集雖曰分歧實為曲宴並可賦詩申意射者可以觀德不能賦詩者可聽射也當使武士彎弓文士下筆又曰汝陰王子修義字壽安涉獵書傳高才為高祖所知除右將軍齊州刺史修義以齊州頻喪刺史累表固辭詔曰脩短有命吉凶由人何過致憂憚以乖維城之寄違凶就吉時亦有之可聽更立廨宇修義於是移治東城又曰畢終敬, SBCK: 侍中}
