  - {type: variant, offset: 404, length: 462, content: 置牧十八年改為刺史督二千石又曰叚熲起於徒中為并州刺史有功徵還京師熲乘車介士鼓吹曲蓋朱旗騎馬殷天蔽日連騎相繼數十里後漢書曰馬嚴上書云臣伏見方今刺史太守專州典郡不務奉事盡心為國而司察偏阿取與自己同則舉為尤異則中以刑法不即垂頭塞耳採求財賂又曰郭伋為并州牧過京師謝恩帝即引見并召皇太子諸王宴語終日賞賜車馬衣服什物伋因言選補眾職當簡天下賢俊不宜專用南陽人帝納之謝承後漢書云王宏遷冀州刺史宏性刻不發私書不容豪族賓客號曰王獨坐又曰李壽為青州刺史發璽書於本縣傳舍乘法駕騑騬朱軒就路奏免四郡相百城怖懼悉豫棄官魏志曰賈逵自梁道為豫州刺史是時天下初復州郡多不懾逵曰州本以御史出監諸郡以六條詔書察長吏二千石已下故其狀皆言嚴毅鷹揚有督察之才不言安靜寬仁有愷悌之德也今長吏慢法盜賊公行州知而不糺天子復何所取正乎逵到官數月乃還考竟其二千石以下阿縱不如法者皆舉奏免之帝曰逵真刺史矣布告天下當以豫州為法又曰張既字德容出為雍州刺史太祖謂既曰君還本州可謂衣繡晝行矣又曰呂虔字子恪任城人也遷徐州刺史加破虜將軍請琅耶王祥為別駕民事一以委之世多其能任賢晉書曰向雄太始中, SBCK: ''}
