  - {type: variant, offset: 1939, length: 150, content: 好學節儉行義常分損租奉貽卹宗親雖至傾匱而施與不怠又曰伏湛字惠公更始元年拜為平原太守遭倉卒兵起莫不驚擾而湛獨安然教授謂妻子曰一穀不升國君徹膳今人皆飢柰何獨飽且食麤糲盡分奉祿以賑活鄉里來客者百餘家司馬彪續漢書曰獻帝初百姓飢荒張儉資計差溫乃傾竭財產與邑里共之賴其差溫故存者以百數又曰肅宗崩廉范奔起敬陵時盧江, SBCK: 有志歷}
