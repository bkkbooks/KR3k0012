  - {type: variant, offset: 2073, length: 156, content: 百數又曰肅宗崩廉范奔起敬陵時盧江郡椽嚴麟奉章俱會於路麟乘小車塗深馬死不能自進范見而愍然命從騎下馬與之不告而去麟事畢不知馬所歸乃沿路訪之或謂麟曰故蜀郡太守廉叔度好周人窮今奔國喪獨當是耳麟亦素聞范名以為然即牽馬造門謝而歸之世伏其義魏志曰楊俊字秀才以兵亂方起而河內處四達之衢必為戰場乃扶老弱去詣京密問同行者百餘家俊賑濟, WYG: ''}
