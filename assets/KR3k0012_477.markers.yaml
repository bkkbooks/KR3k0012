  - {type: variant, offset: 1110, length: 351, content: 不告姓名自策馬去季禮意其子相也後故到頴陰還所假乘詡閉門辭行不與相見後黃巾賊起郡縣飢荒詡救給乏絕資糧者數百人又逢知故困餒於路不忍委去因殺所駕牛以救之眾人止之詡曰視沒不救非志也遂俱餓後列曰折像字伯式廣漢雒人父國有資財二億家僮八伯人像幼有仁心不殺昆虫不折萌牙能通京氏易好黃老言及國卒感多藏厚亡之義乃散金帛資產周施親踈自知亡日召賓客飲食辭訣忽然而終又曰廖扶逆知歲荒乃藂穀數千斛悉用周給宗族姻親又歛葬遭疫死亡不能自收者常居先人冢側未曾入城市人因號為北郭袁宏後漢書曰种暠字景伯父為定陶令有財三千萬父卒暠皆以賑鄉里貧賤者其進趣名利者皆不與交通東觀漢記曰鄧弘收恤故舊無所失父所厚同郡郎中王臨年老貧乏弘常居業給足乞與衣裘輿馬施之終竟後列曰馬援少年處處田牧至有牛馬羊數千頭穀萬斛既而歎曰凡殖貨財產貴其能施賑也否則守錢虜耳乃, SBCK: 俄頃立}
