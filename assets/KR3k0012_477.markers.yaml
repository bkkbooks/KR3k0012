  - {type: variant, offset: 2618, length: 3, content: 紀瞻少, SBCK: 嚴丗期㑹稽山隂人也好施慕善出自天然同里張邁三人妻子各産子時歳飢儉慮不相存欲弃而不舉丗期聞之馳往拯救分食解衣以贍其乏三子並得成長又曰蕭惠開爲益州牧太始四年還至京師􅀄惠開府録事叅軍劉希微􅀒蜀人債將百萬爲債主所制未得俱還惠開甚耻之輙之厩中凢有馬六十疋悉以}
  - {type: page-break, offset: 2618, content: '', id: KR3k0012_SBCK_477-1b}
  - {type: variant, offset: 2618, length: 2, content: 紀瞻, WYG: 嚴世期㑹稽山陰人也好施慕善出自天然同里張邁三人妻子各産子時歲饑儉慮不相存欲棄而不舉期聞之馳往拯救分食解衣以贍其乏三子竝得成長又曰蕭惠開為益州牧太始四年還至京師初惠開府録事叅軍劉希㣲假蜀人債將百萬為債主所制未得俱還惠開甚耻之輙之廐中凡有馬六十疋悉以與希㣲償債其意趣不常皆如此齊書曰劉善明平原人懐珍族弟祖徐州刺史鎮北將軍父懐民宋世為齊北海二郡太守元嘉末青州饑荒人相食善明家有積粟躬食饘粥開倉以救鄉里多獲全濟百姓呼其家田為續命田崔鴻前凉録曰張冲字長思燉煌人散家財巨萬施之鄉閭時人為之謡曰推財不疑張長思後燕録曰趙狄字子武汲郡朝歌人}
