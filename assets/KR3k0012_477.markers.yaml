  - {type: variant, offset: 2778, length: 49, content: 詹年稚弱乃請宗中單貧者與共為居弱冠知名太宰何邵見而稱之曰質文之士也晉紀曰祖逖梗慨有大志年十五不知書, krp: ''}
  - {type: variant, offset: 2780, length: 0, content: '', WYG: 四十餘未仕讀書揚州困於自給妻子怨尤之晏如也又曰盧鈞為嶺南節度使自貞元已來衣冠得罪流放嶺表者因物故子孫貧悴雖遇赦不能自還凡在封境者鈞减俸錢為營槥櫝其家疾病死䘮則為之醫藥殯殮孤兒}
  - {type: page-break, offset: 2780, content: '', id: KR3k0012_WYG_477-4a, image: WYG0897/WYG0897-0338a.png}
  - {type: variant, offset: 2781, length: 1, content: 弱, WYG: 女為之婚嫁凡數百家又曰李臯貶温州長史攝行州事嵗儉州有官粟數十萬斛欲行賑救掾吏叩頭乞候上㫖臯曰夫人一日不再食當死安暇禀命若殺我一身活數千命利莫大焉於是開倉盡散之以擅貸之罪飛章自劾天子聞而嘉之荅以優詔崔氏家傳座右銘曰無論人之短無道己之長施人慎勿念受施慎勿忘隱心而後動謗議庸何傷虛譽不足慕古戒不可忘家語曰子游問於孔子曰夫子亟言子産之惠也可得聞乎孔子曰夫子産者猶衆人之母也食之不能教之以其乘車濟冬渉者盖愛而無教也又曰孔子曰好學則智恤孤則惠恭則近禮勸則有經又尚書大𫝊曰老而無妻謂之鰥老而無夫謂之寡㓜而無父謂之孤老而無子謂之獨行而無資謂之乏居而無食謂之困此皆天下之至悲哀而無告者故聖人在上君子在位能者任職必先施此無使失職戰國策曰襄王立田單相之過淄有老人渉淄而寒出不能行坐沙中田單見其寒也解裘而衣之王}
  - {type: page-break, offset: 2781, content: '', id: KR3k0012_WYG_477-4b, image: WYG0897/WYG0897-0338b.png}
