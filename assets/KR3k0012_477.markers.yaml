  - {type: 'tls:seg', offset: 2782, content: '', id: KR3k0012_CHANT_477-38a.7}
  - {type: variant, offset: 2783, length: 0, content: '', WYG: 賜田單牛酒召單而揖於庭勞之乃布令求百姓之饑寒者收榖之乃使人聽於閭里聞大夫相與語曰單之愛人乃王之教之也江表傳曰全琮罷東安郡還錢塘修祭墳墓麾幢節葢曜於舊里}
  - {type: variant, offset: 2784, length: 0, content: '', WYG: 㑹邑人平生知舊}
  - {type: variant, offset: 2785, length: 0, content: '', WYG: 族八親施散惠與千有餘萬本土以為榮又曰司馬徽有臨蠶向其求簇者徽便與之自棄其蠶或有難之者凡人有損己以贍人謂彼事急己事緩耳今彼此正等何為急損己以與人邪徽曰人不當求耳人己求拒之將慙何有以財貨令人慙者也董卓别傳曰太常張奐將師北征表卓為軍司馬從軍行卓手斬購募羌酋拜五官}
  - {type: page-break, offset: 2785, content: '', id: KR3k0012_WYG_477-5b, image: WYG0897/WYG0897-0338d.png}
  - {type: variant, offset: 2786, length: 1, content: 單, WYG: 郎賜縑九千疋卓歎曰為者則已有者則士悉以縑分與兵吏葛洪神仙傳曰焦先日日入山伐薪以布施從西村頭一家起周而復始秦書曰尚書令苻雅為人樂施乞人填門嘗曰天下物何常吾今日富後日}
  - {type: page-break, offset: 2786, content: '', id: KR3k0012_WYG_477-6a, image: WYG0897/WYG0897-0339a.png}
  - {type: variant, offset: 2788, length: 0, content: '', WYG: 耳忽一日不施則意不泰時人為之語曰不為權異富寧作苻雅貧賈誼新書曰楚昭王當房而立愀然有寒色是日也出府衣裘以衣寒}
  - {type: variant, offset: 2789, length: 0, content: '', WYG: 出倉之粟以賑饑者二年呉襲郢當房賜者請還戰死闔閭曰皆當房之德也三輔决録曰摯茂字子華以茂才為郡法曹治財致大富悉散以分宗人先從貧始以夀終虞預㑹稽典録曰駱俊字逺孝靈皇帝擢拜陳相汝南葛陂盗賊並起}
  - {type: page-break, offset: 2789, content: '', id: KR3k0012_WYG_477-6b, image: WYG0897/WYG0897-0339b.png}
  - {type: variant, offset: 2790, length: 1, content: 共, WYG: 接境四面受敵俊整厲吏人}
  - {type: variant, offset: 2792, length: 4, content: 居弱冠知, WYG: 之保障出倉見糓以贍貧乏劉劭人物志曰中材之人隨財損益是故籍富貴則貨財充於内施惠周於外見贍者求可稱而譽之見授者闡小美而大之雖無異材猶行成而}
