  - {type: variant, offset: 2626, length: 0, content: '', WYG: 傾家贍遺常見州郡徴租甚急巗遂以家粟萬斛代輸聞者莫不嗟嘆又曰張普惠不營財業好有進舉敦於故舊冀州人侯堅固少時與共遊學早終其子長瑜普惠每於四時請禄無不减贍給其衣食隋書郭衍授瀛州刺史遇秋霖大水其屬縣多漂没民皆上髙樹依大塜衍}
