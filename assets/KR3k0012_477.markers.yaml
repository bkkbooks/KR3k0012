  - {type: variant, offset: 2831, length: 0, content: '', SBCK: 隣人李玄度母死家貧無以葬秋謂其兄曰起死生救不足人之本也家有二牛以一與之玄度得以葬它年秋夜行見一老母遺金一餅曰子能葬我是以相報子五十巳後當冨貴不可言勿忘玄度也後魏書曰祖巖字洪山於固安縣丗有積粟至數萬石自延昌巳來北州頻經災儉巖兄弟傾家瞻遺嘗見州郡徴租甚急巖遂以家粟萬解代輸聞者莫不唴歎又曰張普惠不營財業好有進舉敦於故舊兾州人侯堅固少時與其遊學早終其子長瑜普惠毎於四時請禄無不减贍其衣食隋書郭衍授羸州刺史遇秋霖大水其屬縣多漂没民皆上髙樹依大塚衍親備舡栰并賫粮拯救之民多獲濟衍先開倉賑䘏後始聞奏上大善之唐書曰孟簡性俊拔尚義早歳交友先殁者視其孤毎厚於周䘏議者以爲有前軰風又曰李藩少恬淡修撿雅容儀好學父卒冡冨於財親族弔者有挈去不禁愈務散施不數年而貧年四十餘未仕讀書楊州困於自給妻子怨尤之晏如也又曰盧鈞爲嶺南節度使自貞元巳來衣冠得罪流放嶺表者因物故子孫貧悴雖遇赦不能自還凢在封境者鈞减俸錢爲營槥櫝其家疾病死䘮則爲之毉藥殯歛􅀌兒稚女爲之婚嫁凢數百家李臯貶温州長史無幾攝行州事歲儉州有官粟數十萬斛欲行賑救􅁺吏叩頭乞候上㫖臯曰夫人一日不再食當死安暇禀命􅀂殺我一身活數千命利莫大焉於是開倉盡散之以擅貸之罪飛章自劾天子聞而嘉之荅以優詔崔氏家傳座右銘曰無論人之短無道巳之長施人愼勿念受施慎勿忘隱心而後動謗議庸何傷虚譽不足慕古誡不可抗家語曰子游問於孔子曰夫子亟言子産之惠也可得聞乎孔子曰夫子産者猶衆人之母也能食之不能教以其乗車濟冬渉者盡愛而無教也又曰孔子曰好學則智恤孤則惠恭則近禮勤則有繼尚書大傳曰老而無妻謂之鰥老而無夫謂之寡㓜而無父謂之􅀌老而無子謂之獨行而無資謂之乏居而無食謂之困此皆天民之至悲哀而無告者故聖人在上君子在位能者任職必先施此無使失職戰國䇿曰襄王立田單相之過淄有老人渉淄而寒岀不能行坐渉中田單見其寒也解裘而衣之王乃賜田單牛酒召單而揖於庭勞之乃布令求百姓之飢寒者収穀之乃使人聽於閭里聞大夫相與語曰單之愛人乃王之教也江表傳曰全琮罷東安郡還錢唐修􅀕墳墓麾幢節蓋曜於舊里請㑹邑人平生知舊宗族六親施散惠與千有餘萬本土以爲榮司馬徽字德操人有臨􅁞求簇者徽便與之自弃其􅁞或有難之者曰凢人有損巳以贍人謂彼事急巳事緩耳今彼此正等何爲急之以與人邪徽曰人不當求耳人巳求拒之將慙何有以財貨令人慙者也董卓別傳曰太常張奂將師北征表卓爲軍司馬從軍行卓手斬購募羌酋拜五官中郎賜縑九十疋卓歎曰爲者則巳有者則士悉以縑分與兵吏葛洪神仙傳曰焦先日日入山伐薪以布施從西村頭一家起周而復始􅁗書曰尚書令符雅爲人樂施乞人塡門嘗曰天下物何常吾今日冨後日貧耳忽一日不施則意不泰時人爲之語曰不爲權異冨寕作符雅貧賈􅁩新書曰楚昭王當房而立愀然有寒色是日也出府之裘以衣寒者出倉之粟以賑飢者二年呉襲郢當房賜者請還戰死闔閭曰昔吾徒當房之德也三輔决録曰摰茂字子華以茂才爲郡去治財致大冨悉散以分宗人先從貧始以壽終虞預㑹稽典録曰駱俊字逺孝靈皇帝擢拜陳相汝南葛陂盗賊並起與接境四靣受敵俊整厲吏人爲之保鄣出倉見􅂖以贍貧乏劉邵人物志曰中材之人財隨損益是故籍冨貴則貨財充於内施惠周於外見贍者求可稱而譽之見援者闡小美而太之雖無異材猶行成而名立也英雄記曰王匡字公節泰山人輕財好施以任俠聞辟大將軍何進府使匡於徐州發強弩五百詣京師㑹進敗匡還郷里劉義慶丗􅀃曰頋榮在洛嘗應人請覺行炙人有欲炙之色因輟巳施焉後遭亂渡江}
