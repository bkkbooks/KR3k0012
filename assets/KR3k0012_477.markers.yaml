  - {type: variant, offset: 1462, length: 470, content: 散以班昆弟故舊又曰崔駰學於太學而糧盡鄧衛尉欲餼焉而未果季彥九歲以其父命往見衛尉曰施不必豊期於救乏崔生巨父之執也不幸而貧公許賑之有日矣嘉貺未至或欲豊之然後乃致之乎荅曰家物少須租入曰是猶古人欲決江海以救牛蹄之類也鄧公曰諾又曰鄧琳字叔孫西羌反破郡縣上乃拜綝謁者屯田三輔琳臨發之日散千金之產分與兄弟甥舅親族各有差品又曰朱暉建初四年南陽大飢米石千錢初同縣張堪有名德每與相見常接以友道暉以堪宿望成名未敢安也堪至把暉臂曰欲妻子託朱生暉舉手不敢荅後堪仕至蜀郡漁陽太守物故暉自為臨淮太守後遂絕不復相聞南陽飢時聞堪妻子貧窮暉乃自往候視困厄分所有以賑之又曰王丹字仲回京兆人王莽時連徵不至家累千金隱居養志好施周急已具富部後列曰寇恂經明行脩名重朝廷所得秩俸盡施朋友故人及所從吏士常曰吾因士大夫以致此其獨享之乎時人稱其長者後為宰相又曰竇固久歷大位甚見尊貴而性謙儉愛人好施士以此稱之又曰梁商飢年穀貴民餒輒遣蒼頭去幘著巾車載米鹽菜錢於四城門與貧乏不語主人知其陰德伏恩絕不望報匿名隱譽皆此類也司馬彪續漢書曰郭伋字細侯并州牧徵為太中大夫賜宅一區及帷帳錢穀伋輒散與宗親九族無遺餘, SBCK: ''}
