  - {type: variant, offset: 759, length: 349, content: 其麾下飲食與士卒共之家無餘財終不言生產事前列曰婁護字君卿為諫議大夫使郡國護貸多持幣帛至齊上書求上先人冢因會宗族人各以親踈與束帛一日散百金之費使還奏事事稱旨擢夫水太守前列曰韋玄成字少翁以父任為郎少好學脩父業尤謙遜下士出遇相識步行輒下從者與載送之以為常其接人貧賤者益加由是名譽日廣以明經擢為諫議大夫遷大河都尉前列曰張臨安世曾孫亦謙儉每登閣殿常歎曰桑霍為我戒豈不厚且死分施宗族故舊薄葬不起墳又曰蘇武為右曹典屬國所得賞賜盡以施與昆弟故人又曰朱邑為人惇篤於故舊以愛和為行居處儉節賜以供九族鄉黨家無餘財後漢書曰趙典兄子溫字子恭初為京兆郡丞歎曰丈夫當雄飛安能雌伏遂棄官去遭歲大飢散家糧以賑窮餓所活萬餘人後列曰劉詡字子相頴川人家世豊產常能周施而有不其惠嘗行於汝南界中有陳國張季禮遠赴師喪遇寒冰車毀頓滯道路詡見而下車, SBCK: ''}
