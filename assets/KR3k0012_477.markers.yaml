  - {type: variant, offset: 2839, length: 0, content: '', SBCK: 今重違公子之盛指則有䧟禮之愆焉􅀂何公子曰友巳言於君矣又曰季桓子以粟千鍾餼夫子受之而不辭旣而以班門人之無者子貢進曰季孫以夫子貧故致粟夫子受之而以施人無乃非季孫之}
