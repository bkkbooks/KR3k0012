  - {type: variant, offset: 2230, length: 381, content: 乏通共有無宗族知故為人所略作奴僕者凡六家俊皆傾財贖之魚豢魏略曰趙喜字伯陽為平原太守百官大食光武問喜在郡何如咸稱喜政有跡時親家諸夫人皆會會罷諸大夫言喜篤義多恩從長安還收護妾等衣食生活使得蒙今日之富貴非獨能臨人也吳志曰魯肅字子敬大散財貨摽賣地以賑窮人結士為務甚得鄉邑忻心周瑜為居巢長將數百人故過候肅并求資糧肅家有兩囷米各三千斛肅乃指一囷與瑜瑜益知其奇也遂相親結定僑札之分又曰朱據字子範吳郡人有姿皃膂力絕人又能論難黃武初徵拜五官中郎權遷建業據尚公拜左將軍封雲陽侯謙虛接士輕財好施吳志曰駱公緒時年八歲與親客歸會稽事嫡母甚謹時飢荒多有困乏公緒為之飲食衰少其姊仁愛有行寡歸無子見甚哀之數問其故公緒曰丈夫糟糠不足我亦何必獨飽姊曰誠如是何不告我而自苦若此乃自以私粟與公緒又以告母亦覺之遂使分施由是顯名晉書郄鑒時所在饑荒州中之士素有感其恩義者相與資贍鑒復分所得以恤宗族鄉曲孤老賴而, WYG: 罄}
