  - {type: variant, offset: 2090, length: 349, content: 椽嚴麟奉章俱會於路麟乘小車塗深馬死不能自進范見而愍然命從騎下馬與之不告而去麟事畢不知馬所歸乃沿路訪之或謂麟曰故蜀郡太守廉叔度好周人窮今奔國喪獨當是耳麟亦素聞范名以為然即牽馬造門謝而歸之世伏其義魏志曰楊俊字秀才以兵亂方起而河內處四達之衢必為戰場乃扶老弱去詣京密問同行者百餘家俊賑濟貧乏通共有無宗族知故為人所略作奴僕者凡六家俊皆傾財贖之魚豢魏略曰趙喜字伯陽為平原太守百官大食光武問喜在郡何如咸稱喜政有跡時親家諸夫人皆會會罷諸大夫言喜篤義多恩從長安還收護妾等衣食生活使得蒙今日之富貴非獨能臨人也吳志曰魯肅字子敬大散財貨摽賣地以賑窮人結士為務甚得鄉邑忻心周瑜為居巢長將數百人故過候肅并求資糧肅家有兩囷米各三千斛肅乃指一囷與瑜瑜益知其奇也遂相親結定僑札之分又曰朱據字子範吳郡人有姿皃膂力絕人又能論難黃武初徵拜, SBCK: ''}
