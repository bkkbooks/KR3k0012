  - {type: variant, offset: 2777, length: 0, content: '', WYG: 親族弔者有挈去不禁愈務散施不數年}
  - {type: variant, offset: 2778, length: 49, content: 詹年稚弱乃請宗中單貧者與共為居弱冠知名太宰何邵見而稱之曰質文之士也晉紀曰祖逖梗慨有大志年十五不知書, SBCK: ''}
