  - {type: variant, offset: 191, length: 318, content: 公子鮑禮於國人宋飢竭其粟而貸之年七十以上無不饋詒也時加羞珍異無日不數於六卿之門國之賢人無不事也親自桓以下無不卹也公子鮑美而豔襄夫人欲通之鮑嫡祖母而不可乃助之施傳曰鄭子皮即位於是鄭飢而未及麥民病子皮以子展之命餼國人粟戶一鍾是以得鄭國之民故罕氏常掌國政以為上卿傳曰楚子伐蕭申公巫臣曰師人多寒王巡三軍拊而勉之三軍之士皆如挾纊傳曰晉公子重耳及曹僖負羈之妻曰吾觀晉公子從者皆足以相公子必反其國若反其國必得志於諸侯而誅無禮曹其首也子盍早自貳焉乃饋盤餐置壁焉公子受餐反壁傳曰子西曰昔闔廬有國天有災厲親巡孤寡而供其乏困在軍熟食者分而後敢食語曰子華使於齊冉子為其母請粟子曰與之釜請益曰與之庾冉子與之粟五秉子曰赤之適齊也乘肥馬衣輕裘吾聞之君子周急不繼富史記, SBCK: 書}
