  - {type: variant, offset: 2841, length: 1, content: 帛, SBCK: 之宗族次散之邑里乃散一國行年六十氣幹衰棄其家事都散其庫藏珎寳車服妾媵一年之中盡焉及其病也無藥石之儲及其死也無理葬之資一國之人受其施者相與賦而藏之及其子孫之財焉金屈􅈊聞之曰端木叔狂人也辱其祖矣段干生聞之曰端木叔逹人也德過其祖矣莊子曰青青之麥生於陵陂生不布施死何含珠爲孟子曰子産聽鄭國之政}
