  - {type: variant, offset: 2840, length: 0, content: '', SBCK: 乎子曰受人財不以成冨與季孫之惠於一人豈若惠數百之人哉列子曰衛端木叔者子貢之丗父也藉其先資家累萬金奉養之餘先}
  - {type: variant, offset: 2840, length: 0, content: '', WYG: 乎子曰受人財不以成富與季孫之惠於一人豈若惠數百之人哉列子曰衛端木叔者子貢之世父也籍其先資家累萬金奉養之餘先}
