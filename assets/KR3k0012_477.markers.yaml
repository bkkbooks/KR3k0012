  - {type: variant, offset: 54, length: 136, content: 左傳目冬晉薦饑使乞糴於秦秦伯謂子桑曰與諸乎對曰重施而不報其民必攜攜而討焉無眾必敗謂百里曰與諸乎對曰天災流行國家代有救災恤憐道也行道有福是以輸粟于晉自雍及絳相繼命之曰汎舟之役傳曰晉侯逆秦師使韓簡視師復曰師少於我鬭士倍我公曰何故對曰出因其資入用其寵飢食其粟三施無報是以來也傳曰, SBCK: 下}
