  - {type: variant, offset: 2844, length: 2, content: 嘉焉, SBCK: 何爲泣對曰昔呉子吮其父傷而殺之涇水之上今又將安知不殺是乎吕氏春秋曰􅁗繆公乗馬車敗右服失公自往求馬見野人方將食之於􅄮山之陽繆公􅀏曰食馬肉而不飲酒余恐其傷生也遍飲而去居一年爲韓原之戰晉人以環繆公之車矣嘗食馬肉者三百餘人疾闘車下遂大尅晉反獲晉公以歸吕覽曰魯國之法魯人爲人臣妾於諸侯有能贖之者取其金於府子貢贖魯人於諸侯來辭不受其金孔子曰賜失之矣自今以往魯人不贖人也淮南子曰爲魚德者非挈而入淵也爲猨賜者非􅀒於縁木也縱其所之利之而巳矣太平御覧卷第四百七十七}
  - {type: page-break, offset: 2844, content: '', id: KR3k0012_SBCK_477-6a}
  - {type: variant, offset: 2844, length: 2, content: 嘉焉, WYG: 何為泣母對曰昔呉子吮其父傷而殺之涇水之上今又將安知不殺是乎吕氏春秋曰秦繆公乘馬車敗右服失公自往求馬見野人方將食之於岐山之陽繆公笑曰食馬肉而不飲酒余恐其傷生也遍以飲之居一年為韓原之戰晉人已環繆公之車矣嘗食馬肉三百餘人疾闘車下遂大尅晉反獲晉公以歸吕覽曰魯國之法魯人為人臣妾於諸侯有能贖之者取其金於府子貢贖魯人於諸侯而辭不受其金孔子曰賜失之矣自今以往魯人不贖人也淮南子曰為魚德者非挈而入淵也為猿賜者非負以縁木也縱其所之而已矣太平御覽卷四百七十七}
