  - {type: variant, offset: 2618, length: 3, content: 紀瞻少, krp: 嚴丗期㑹稽山隂人也好施慕善出自天然同里張邁三人妻子各産子時歳飢儉慮不相存欲弃而不舉丗期聞之馳往拯救分食解衣以贍其乏三子並得成長又曰蕭惠開爲益州牧太始四年還至京師𥘉惠開府録事叅軍劉希微負蜀人債將百萬爲債主所制未得俱還惠開甚耻之輙之厩中凢有馬六十疋悉以}
  - {type: variant, offset: 2621, length: 0, content: '', WYG: 而輕財好施隣人李元度母死家貧無以葬狄謂其兄曰起死生救不足人之本也家有二牛以一}
