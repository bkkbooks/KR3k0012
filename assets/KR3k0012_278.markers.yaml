  - {type: variant, offset: 59, length: 0, content: '', SBCK: 竇憲懼誅自求擊匈奴以贖死㑹南單于請兵北伐乃拜憲車􅀐將軍金印紫綬官屬依司空依淮也長一人千石掾屬二十九令史及御屬三十二人見續漢志以執金吾耿秉爲副發北軍五校漢有􅀯北軍北軍中候一人六百石掌臨五營􅀺陽雍營縁邊十二郡􅀐士漢官儀曰光武中興以幽兾并州兵􅀐克定天下故於􅀺陽五營以謁者監之又曰扶風郡尉部在雍縣以凉州近羗數犯三輔將兵衛護故俗稱雍營及羗胡兵出塞明年憲與秉各將四千騎及南匈奴左谷蠡王師子師子其名也万􅀐出朔方鷄鹿塞南單于屯屠河屯屠河單于名將万餘􅀐出滿夷谷度遼將軍鄧鴻鄧禹少子及縁邊義從羗胡八千􅀐與左賢王安􅀦万􅀐出棝陽塞棝陽在五原郡棝音固皆㑹􅃰郡山憲分遣副校尉閻盤司馬耿䕫耿譚將左谷蠡王師子右呼衍王湏訾等呼衍其號因以爲姓匈奴貴種也今呼延姓是其後須訾各精􅀐万餘與北單于戰於稽落山大破之虜衆崩潰單于遁走追擊諸部遂臨私渠比鞭鞮海匈奴中海各斬名王巳下方三千級􅀗生口馬牛羊櫜駞百餘万頭於是温犢須日逐温吾夫渠王抑鞮等八十一部率降者前後二十餘万人憲秉遂登燕然山去塞三千餘里刻石勒功紀漢威徳令班固作銘又曰}
  - {type: page-break, offset: 59, content: '', id: KR3k0012_SBCK_278-3a}
