  - {type: variant, offset: 982, length: 355, content: 吳郡揔管委以平陳之事弼忻然以為己任與壽州揔管源雄並為重鎮弼遺雄詩曰交河驃騎幕合浦伏波營勿使騏驎上無我二人名獻取陳十策上稱善賜以寶刀又曰周羅㬋初仕陳為太子左衛率信任逾重時參宴席陳王曰周左率武將詩每前成文士何為後也都官尚書孔範對曰周羅㬋執筆製詩還如上馬入陣不在人後自是益見親禮又曰于仲文討高麗大破之至鴨淥水高麗將乙支文德詐降來入其營仲文先奉密旨若遇高乙支文德者必擒之至是文德來仲文將執之時尚書右丞劉士龍為慰撫使固止之仲文遂捨文德尋悔遣人紿文德曰更有言議可復求也文德不從遂濟仲文選騎渡水追之每戰破賊文德遺仲文詩曰神策究天文妙筭窮地理戰勝功既高知足願云止仲文荅書諭之文德燒柵而遁唐書曰調露元年突厥阿史德溫傳叛單于府所管二十四州皆叛應之單于都護蕭嗣業率兵討之被阿史德掠其糧車兵多餓死由是大敗朝廷憂之遣禮部尚書裴行儉為定襄, WYG: 玉門}
