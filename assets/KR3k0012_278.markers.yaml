  - {type: variant, offset: 2759, length: 1, content: 代, SBCK: 是歳北虜遣梅禄將軍李暢以馬万疋來市託云入貢所經州府守帥假之禮分嚴其兵備留館則戒卒於外懼其襲奪太原故事出兵逆之暢及界上公綽使牙將祖孝恭單馬勞問待以修好之意暢感義出涕徐驅道中不妄馳獵及至闢牙門令譯引謁宴以常禮及市馬而還不敢侵犯陘}
