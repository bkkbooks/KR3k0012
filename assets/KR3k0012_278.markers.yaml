  - {type: variant, offset: 15, length: 2, content: 郄縠, WYG: 如前乃敢奉令王許諾數嵗終無所得後選百金之士五萬彀弦者十萬大破匈奴又曰文帝時匈奴大入朝那殺北地都尉昂帝乃復問馮唐曰公何以知吾不能用㢘頗李牧也唐對曰臣聞上古王者之遣將跪而推轂曰閫以内者寡人制之閫以外者将軍制之軍功爵賞皆决於外歸而奏之此非虛言也臣大父言李牧為趙將居邊軍市之租皆自用饗士賞賜决於外不從中擾也委任而責成功故李牧乃能得盡智能遣選車千三百乗彀騎萬三千百金之士十萬是以北逐單于破東邊滅澹林西抑强秦南支韓魏當是之時趙㡬覇㑹趙王遷立用郭開讒卒誅李牧令顔聚代之是以兵破士北為秦所滅今臣竊聞魏尚為雲中守其軍市租盡以給士卒出私養錢五日一殺牛饗賔客軍吏舍人是以匈奴逺避不近雲中之塞敵嘗一入尚率車騎擊之所殺甚衆夫士卒盡家人子起田中從軍安知尺籍伍符終日力戰斬首捕敵上功幕府一言不相應文吏以法䋲之其賞不行而吏奉法必用臣愚以為陛下法太明賞太輕罰太重且雲中守魏尚坐上功首虜差六級陛下下之吏削其爵罰作之由此言之陛下雖得㢘頗李牧不能用也文帝}
