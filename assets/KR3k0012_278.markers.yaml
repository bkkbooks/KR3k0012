  - {type: variant, offset: 1637, length: 908, content: 婁師德頗有學術器量寬厚喜怒不形於色專綜邊任三十餘年恭勤接下孜孜不怠當危亂之時族滅者相繼師德出將入相能以功名始終識者多之又曰永徽中薛仁貴平百濟高宗令別將攝帶方州刺史劉仁軌留兵鎮守詔仁貴班師還高宗勞問之曰卿在海東前後奏請皆合事宜而雅有文理卿本武將何得然也對曰非臣所能皆劉仁軌之所為也帝深加歎賞超仁軌六階正授帶方州刺史仁貴初平百濟合境凋殘殭屍相屬仁軌始令收歛骸骨瘞理弔祭之校計戶口署置官長開通道路整理村落補葺堤堰脩復陂塘勸課耕種賑貸貧乏存問孤老頒宗廟忌諱位皇家社稷百濟餘眾復安生業仁軌位至中書令又曰御史大夫唐休璟有文武才幹貞觀元年為隴右大使大破吐蕃大將麴莽布支於涼州洪源谷凡六戰六捷破虜築京觀而還後吐蕃使來朝嘗因侍宴蕃使屢覘休璟則天問其故對曰往歲洪源戰時此將軍雄猛無比殺臣將士甚眾今願識之則天大加歎異休璟尤練邊事自碣石西踰四鎮綿亘萬里山川要害皆能記之長安中西突厥與諸蕃不和舉兵相持安西道阻表䟽相繼則天召休璟與宰相啇度事勢俄頃間草奏便施行後十餘日安西諸州請兵應接一如休璟所畫則天謂之曰恨用卿晚乃遷夏官尚書同中書門下三品仍謂魏元忠曰休璟諳練邊事卿等十不當一也又曰宰相張說出為并州大都督府長史兼天兵軍大使開元九年胡賊康待賓據長泉鎮叛與黨項連結攻䧟蘭池等六胡州詔說與朔方軍大使王晙合勢進討賊攻銀城連谷以據倉糧說統馬步萬人出合河關掩擊大破之追至駱駞堰胡及黨項自相疑貳乃散說招集黨項復其居業副使史憲請盡誅黨項說曰先王之道推亡固存如盡誅之是逆天道因奏置麟州安置黨項餘眾其年說自兵部尚書同平章事十年又勑說為朔方軍節度大使往巡五城處置兵馬時降胡康願子自立為可汗舉兵掠監牧馬西河涉出塞說收兵討而擒之以獻徙其家屬於木盤山其黨悉平獲男女三千人於是移河曲六胡州殘胡五萬餘口配之於許汝唐鄧仙豫等州始空河南朔方地先是緣邊鎮兵常六十萬說以邊寇漸平奏罷二十餘萬勒還農畝玄宗頗以為疑說奏曰臣久在疆場具悉邊事禦敵制勝不在多驅閑冗陛下若以為疑臣請闔門百口保之以陛下之明四夷畏服必不慮減兵而招寇也玄宗從之時當蕃衛士寖以貧弱逃亡略盡說建策請一切罷之別召募強壯令其宿衛不簡色役優為條例逋逃者必爭來應募上從之旬日得精兵十三萬人分繫諸衛彍騎是也又曰吳元濟據蔡州叛王師討伐詔, SBCK: ''}
