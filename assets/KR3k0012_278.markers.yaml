  - {type: variant, offset: 1481, length: 0, content: '', SBCK: 啓民可汗連兵擊伊吾師次玉門啓民可汗背約兵不至丗雄􅀌軍度磧伊吾􅀄謂隋軍不能至皆不設備及聞丗雄度磧大懼請降詣軍門上牛酒丗雄遂於漢舊伊吾城東築城號新伊吾因留銀青光禄大夫王威以甲卒千餘人戌之而還天子大恱進位正議大夫賜物二千叚唐書曰馬揔爲安南郡都護揔管經畧使㹅敦儒學長於政術在南海累年清廉不撓夷獠便之於漢所立銅柱之處以銅一千五百斤特鑄二柱刻書唐德以継伏波之迹}
