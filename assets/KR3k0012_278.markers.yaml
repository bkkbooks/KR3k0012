  - {type: variant, offset: 130, length: 2, content: 遵為, WYG: 焉又曰耿恭以疏勒城傍有澗水可固五月乃引兵據之七月匈奴復攻恭募先登數千人直馳之胡騎散走匈奴于城下壅絶澗水恭於城中穿井十五丈不得水吏士渴乏笮馬糞汁而飲之笮謂壓笮也恭仰歎曰聞昔貳師}
