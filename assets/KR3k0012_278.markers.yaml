  - {type: variant, offset: 15, length: 4, content: 郄縠說禮, SBCK: 如前乃敢奉令王許諾數嵗終無所得後進百金之士五万彀􅁌者十万大破匈奴又曰文帝時匈奴大入朝郍殺北地都尉印音昂帝以問馮唐安得廉頗李牧爲將也唐對曰臣聞上古王者之遣將跪而推轂曰閫以内者寡人制之閫以外者將軍制之軍功爵賞皆决於外歸而奏之此非虚言也臣大父言李牧之爲趙將居邊軍市之租皆自用饗士賞賜决於外不從中御也委任而責成功故李牧乃能得盡智能選車千三百乘彀􅀐万三千疋百金之士十万是以北逐單于東破胡滅澹林西抑強􅁗南支韓魏當是之時趙幾覇㑹趙王遷其母倡也王遷立乃用郭開䜛卒誅李牧令顔聚代之是以兵破士北爲􅁗所滅今臣竊聞魏尚爲雲中守其軍市租盡以給士卒出私養錢五日一殺牛饗賔客軍吏舎人是以匈奴逺避不近雲中之塞虜嘗一入尚率車􅀐擊之所殺甚衆夫士卒盡家人子起田中從軍安知尺籍伍符終日力戰斬首捕虜上功莫府一言不相應文吏以法繩之其賞不行而吏奉法必用臣愚以爲陛下法太明賞太輕罰太重且雲中守魏尚坐上功首虜差六級陛下下之吏削其爵罰之由此言之陛下雖得廉頗李牧不能用文帝􅀃是日令馮唐持節赦魏尚復以爲雲中守而受唐爲車􅀐都尉又曰武帝以李廣爲未央衛尉而程不識亦爲長}
