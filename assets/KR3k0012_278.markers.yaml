  - {type: variant, offset: 25, length: 0, content: '', SBCK: 自衛莫府省約束文籍事然亦逺斥候未甞遇害程不識正部曲行伍營陣擊刀斗士吏理軍簿至明軍不得休息然亦未嘗遇害不識曰李廣軍極簡易然虜卒犯之無以禁也而其士卒亦佚樂咸樂爲之死我軍雖煩擾然虜亦不得犯我是時漢邊郡李廣程不識皆爲名}
