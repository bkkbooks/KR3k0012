  - {type: variant, offset: 200, length: 1, content: 賈, SBCK: 耿䕫爲大將軍左校尉將􅀐八百出居延塞直奔北單于庭於金微山斬閼氏名王已下五千餘級單于與數􅀐脫亡盡􅀗其匈奴珎寳財畜去塞五千餘里而還自漢出師所未甞至也又曰班超在䟽勒將還中國䟽勒舉國憂恐其都尉􅀺弇日漢使棄我我必}
  - {type: variant, offset: 200, length: 1, content: 賈, WYG: 耿䕫為大將軍左校尉將騎八百出居延塞直奔北單于庭於金㣲山斬閼氏名王已下五千餘級單于與數騎脫亡盡獲其匈奴珍寳財畜去塞五千餘里而還自漢出師所未嘗至也又曰班超在䟽勒將還中國䟽勒舉國憂恐其都尉黎弇曰漢使棄我我必}
