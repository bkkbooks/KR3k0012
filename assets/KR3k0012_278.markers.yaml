  - {type: variant, offset: 471, length: 270, content: 法當失何得遂成天下至留侯諫乃曰賴有此耳宋書曰沈慶之嘗對上為詩令僕射顏師伯執筆慶之口占曰微生值多幸得逢時運昌老朽䈥力盡徒步還南崗辭榮此聖代何愧張子房並歎其辭意之美梁書曰曹景宗大破魏軍振旅凱入帝於華光宴飲因令左僕射沈約賦韻景宗不得韻意色不平啟求賦詩帝曰卿伎能甚多人才英拔何必止在一詩景宗已醉求作不已詔令約賦韻已盡唯餘競病二字景宗便操筆斯須而成其辭曰去時兒女悲歸來笳鼓競借問路行人何如霍去病帝欣然不已約及朝賢驚嗟竟日詔令上史北史曰周文帝宴群公卿士仍賦詩言高琳詩末章云寄言竇車騎為謝霍將軍何以報天子沙漠靜祅氛帝大悅曰獯獫陸梁末時款塞卿言有驗國之福也, SBCK: ''}
