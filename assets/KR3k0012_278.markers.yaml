  - {type: variant, offset: 61, length: 1, content: 閑, SBCK: 討五溪蠻軍次下雋下雋縣名屬長沙國故城今辰州沅陵縣雋音字兖反有兩道可入從壷頭則路近而水嶮壺頭山名也今在辰州沅陵東武陵記曰此山頭與東海方壺山相似神仙多所遊集固名壺頭山也從充則􅂗夷而運逺充縣名屬武陵郡充音昌容反帝􅀄以爲疑及軍至耿舒欲充道援以爲棄日費粮不如進壷頭搤其喉咽搤持也充賊自破以事上之帝從援䇿三月進營壷頭賊乗髙守隘水疾舡不得上㑹暑甚士卒多疾死援亦中病遂困乃穿岸爲室以避炎氣武陵記曰壺頭山邊有石窟即援所室也室内有地如百斛舡大云是援之餘靈也賊每升險鼔譟援輙曳足以觀之左右哀其壯意莫不爲之流涕又曰􅀄馬援軍還將至故人多迎勞之平陵人孟兾名有計謀}
