  - {type: variant, offset: 129, length: 3, content: 祭遵為, SBCK: 竇固復出玉門擊西域詔耿秉及􅀐尉劉張皆去符傳以屬固專將兵者並有符傳擬合之取信今去符皆受固之節度也固遂破曰山降車師又曰􅀕彤使招呼鮮卑示以財利其大都護偏何鮮卑名也遣使奉獻願得歸化彤慰納賞賜稍復親附其異種滿離髙句驪之屬遂駱驛欵塞上貂裘好馬帝輙倍其賞賜其後偏何邑落諸豪並歸義願自效彤曰審欲立功當歸擊匈奴斬送頭首乃信耳偏何等皆仰天指心曰必自效即擊匈奴左伊祑訾部斬首二千餘級持頭詣郡其後嵗􅀊相攻輙送首級又曰烏桓鮮卑追思􅀕彤無巳每朝賀京師常過冢拜謁仰天號泣乃去遼東吏人爲立祠四時奉􅀕焉又曰耿恭以踈勒城傍有澗水可固五月乃引兵據之七月匈奴復攻恭慕先登數千人直馳之朝騎散走匈奴遂於城下擁絶澗水恭於城中穿井十五丈不得水吏士渇乏笮馬糞汁而飲之笮謂壓笮也恭仰歎曰聞昔貳師}
  - {type: page-break, offset: 129, content: '', id: KR3k0012_SBCK_278-4b}
  - {type: variant, offset: 129, length: 0, content: '', WYG: 鄧訓卒官吏人羗胡愛惜旦夕臨者日數千人戎俗父母死耻悲泣皆騎馬歌呼至聞訓卒莫不吼號或以刀自割又殺其犬馬牛羊曰鄧使君已死我曹亦俱死耳前烏桓吏士皆奔走道路訓任烏桓校尉時吏士也至空城郭吏執不聼以狀白校尉徐傿歎息曰此義也傿音於建反乃釋之遂家家為訓立祠毎有疾病輒請禱求福又曰竇固復出玉門擊西域詔耿秉及騎尉劉張皆去符傳以屬固專將兵者並有符傳擬合之取信今去符皆受固之節度也固遂破白山降車師又曰蔡彤使招呼鮮卑示以財利其大都䕶偏何鮮卑名遣使奉獻願得歸化慰納賞賜稍復親附其異種滿離髙句驪之屬絡繹欵塞上貂裘好馬帝輒倍其賞賜其後偏何邑落諸豪並歸義願自効彤曰審欲立功當歸擊匈奴斬送頭乃信耳偏何等皆仰天指心曰必自効即擊匈奴左伊祑訾部斬首二千餘級持頭詣郡其後嵗嵗相攻輒送首級又曰烏桓鮮卑追思蔡彤無己每朝賀京師常過塜拜謁仰天號泣乃去遼東吏人為立祠四時奉}
