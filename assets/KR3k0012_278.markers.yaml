  - {type: variant, offset: 31, length: 3, content: 馮奉世, SBCK: 晁錯上言兵事曰自髙后}
  - {type: variant, offset: 31, length: 2, content: 馮奉, WYG: 晁錯上言兵事曰自髙后以來隴西三困於匈奴非隴西之民有勇怯廼將吏之製巧拙異也故兵法曰有必勝之將無必勝之民由此觀之安邊境立功名在於良將不可不擇也又曰趙充國奏曰從今盡三月敵馬羸瘐必不敢捐妻子于他種中逺涉河山而來為冦是臣之愚計所以度敵且必瓦解其處不戰而自破也又曰張安}
