  - {type: variant, offset: 2818, length: 196, content: 二年憲宗兵宰臣議兵曰王師伐蔡首尾三年雖捷奏頻來窠巢未殄度支供饋其何以濟李逢吉崔群王涯各有奏對多言罷兵為便唯裴度不言利害議曰臣請身自往行營督戰明日延英復對宰臣俱退上獨止度謂之曰卿必能為朕行乎度頓首流涕而奏曰臣誓不與此賊俱全上亦為之感慟度奏曰賊已力困但以群帥不一故未降耳上深嘉之遂欲加度招討使度奏曰韓弘已為都統臣不欲受招討之名但奉使即得乃下詔以度為彰義軍節度蔡申光觀察等使仍淮西行營宣慰處置使其年, SBCK: ''}
