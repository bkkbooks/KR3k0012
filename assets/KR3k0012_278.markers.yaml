  - {type: variant, offset: 2548, length: 203, content: 以鄂兵五千隸安州刺史李聽率赴行營公綽曰朝廷以吾儒生不知兵耶即日上奏願自征行許之公綽自鄂濟溳江直抵安州李聽以廉使之禮事之公綽謂之曰公所以屬鞬負弩者豈非為兵事耶若去戎容被公服兩郡守耳何所統攝乎以公名家曉兵若吾不足以指麾則當赴闕不然吾且署職名以兵法從事矣聽曰唯公所命即署聽為鄂岳都知兵馬使中軍先鋒行營馬步都虞候三牒授之乃選卒六千屬聽戒其部校曰行營之事一決都將聽感恩畏威如出麾下其出權制變為當時所稱入為刑部尚書出授, SBCK: 爲}
