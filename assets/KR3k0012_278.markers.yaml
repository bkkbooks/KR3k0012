  - {type: variant, offset: 3015, length: 699, content: 月一日度發京師仍賜禁軍三百為衛兵憲宗御通化門餞軍度銜涕辭至蔡州度傳上慰勞之旨躬督戰陣卒伍立功即時論賞諸將奮勵無敢退留至十月十一日拔蔡州擒吳元濟仗節而還又曰元和中以裴度征淮西詔曰輔弼之臣軍國是賴興化致理秉鈞以居取威定功則分鬥而出所以同君臣之體一中外之任焉屬者問罪汝南致誅淮右蓋欲刷其污俗弔彼頑人雖挈地求生者實繁有徒而嬰城執迷者未翦其類何獸困而猶鬥豈鳥窮之無歸歟由是遙聽鼓鼙更張琴瑟煩我台席董茲戎旃朝議大夫守中書侍郎同平章事飛騎尉賜金魚袋裴度為時降生恊朕夢卜精辦宣力堅明納忠當軸而才謀老成運籌而智略有定司其樞務備知四方之事付以兵要必得萬人之心是用禱於上玄練此吉日帶丞相之印綬所以尊其名賜諸侯之斧鉞所以重其命爾宜布清問恢壯猷感勵連營蕩平多壘招懷孤疾字撫夷傷况淮西一軍素効忠節過海赴難史冊書勳建中初攻破襄陽擒滅崇義比者脅於凶逆歸命無由每念前勞常思安撫所以內輟輔臣俾為帥率實欲保全慰諭各使得宜往欽哉無越唐書曰太尉李光弼御軍嚴峻而有禮士卒望風畏憚乾元中郭子儀會九節度之師不利於相州詔以光弼代子儀為河北副元帥子儀寬恕朔方將士多不奉法時僕固懷恩引迴紇內助累立戰功將帥多假借之及光弼統師懷恩為右廂都知兵馬使光弼出關會諸軍於汜水左廂都知兵馬使張用濟後至斬於纛下懷恩見而憚之不敢惕息光弼在河陽令懷恩攻泰清於懷州官軍頻不利光弼怒將斬之懷恩出奇為地道偷得賊號詐傳號令賊軍大亂遂拔懷州擒泰清而還光弼拾之泰清妻有美色城破被俘泰清從光弼求之即命還泰清議者稱自艱難已來唯光弼行軍理戎沉毅有籌略將帥中第一又曰鳳翔將野詩良輔涇原將郝玭各以名雄邊上吐蕃嘗謂漢使曰唐國既與吐蕃和好何忘語也問曰何謂曰若不忘語何因遣野詩良輔作隴州刺史其畏憚如此, SBCK: ''}
