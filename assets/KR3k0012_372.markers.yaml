  - {type: variant, offset: 175, length: 0, content: '', WYG: 亥唐坐而出叔向入公曵一足叔向問之公曰吾侍唐子腓痛足痺而不可伸足爾雅曰趾足也說文曰足在下也釋名曰脚却也以其坐時却在後也易說卦曰震為足尚書說命曰若跣弗視地厥足用傷禮記玉藻曰足容重又祭義曰樂正子春下堂而傷其足數月不出猶有憂色門弟子曰夫子之足瘳矣數月不出猶有憂色何也樂正子春曰父母全而生之子全而歸之可謂孝矣不虧其體不辱其身可謂全矣故君子頃歩而弗敢忘孝也今予忘孝之道予是以有憂色也一舉足而不敢忘父母一出言而不敢㤀父母是故道而不徑舟而不逰不敢以先父母之遺體行殆左傳荘公曰鄭伯治與扵雍糾之亂者刖强鉏君子謂强鉏不能衛其足又莊公八年曰齊亂殺孟陽于牀曰非君也不類見公之足扵戸下遂弑之又成下曰齊刖鮑牽仲尼曰鮑荘子之智不如葵葵猶能衛其足又昭二年曰衛襄公夫人姜氏無子嬖人婤姶生孟縶孟縶之足不能良行又哀下曰衛侯與諸大夫飲酒禇師聲子襪而登席公怒曰必斷而足榖梁傳定公曰公㑹齊侯于夹谷孔子曰笑君者罪當死使司馬行法焉手足異門而出史記曰韓信使人言齊偽詐多變願為假王漢王大怒張良陳平躡漢王足因附耳語曰漢方不利寕能禁信之王乎漢書曰漢王}
