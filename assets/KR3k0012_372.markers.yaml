  - {type: variant, offset: 172, length: 2, content: 高祖, krp: 馬援擊西羗中流矢貫脛帝以璽書勞之東觀漢記曰淳于恭養兄崇孤而教誨學問時不如意輙呼責數以捶自擊其脛欲感之兒慙負不敢復有過魏略曰北丁零有馬脛國聲似鴈鶩從膝脛以下生馬蹄走疾於馬正部曰夏禹治水腓無胈脛無毛山海經曰交脛國爲人交脛郭璞注曰脚脛曲相交所謂交趾也有赤脛民赤水之東有長脛之國腓脹說文曰腨腓脹也腨市兖切腓符非切脹直良切易艮卦曰六二艮其腓又咸卦六二曰咸其腓凶居則吉東觀漢記曰馬援爲隴西太守擊羗中矢貫腓脹上聞賜羊三千牛三百頭以飬病山海經曰無䏿之國爲人無䏿郭璞曰脹脹音啓又公弟切韓子曰晉平公}
  - {type: variant, offset: 175, length: 0, content: '', SBCK: 唐彦坐而出叔向入公曵一足叔向問之公曰向吾侍唐子腓痛足痺而不可伸足尓雅曰趾足也􅀃文曰足在下也釋名曰脚却也以其坐時却在後也易􅀃卦曰震爲足尚書􅀃命曰􅀂跣弗視地厥足用傷禮記玉藻曰足容重舉欲遲也又􅀕義曰樂正子春下堂而傷其足數月不出猶有憂色門弟子曰夫子之足瘳矣數月不出猶有憂色何也樂正子春曰父母全而生之子全而歸之可謂孝矣不􅃜其體不辱其身可謂全矣故君子頃歩而弗敢忘孝也今子忘孝之道予是以有憂色也一舉足而不敢忘父母一出言而不敢忘父母是故道而不徑舟而不遊不敢以先父母之遺體而行危殆左傳莊公曰鄭伯治與於雍糾之亂者刖強鉏君子謂強鉏不能衛其足又莊公八年曰齊亂殺孟陽于牀曰非君也不􅀋見公之足于户下遂弑之又成下曰齊刖鮑牽仲尼曰鮑莊子之智不如葵葵猶能衛其足言折牽居亂不能危行言遜又昭二年曰衛襄公夫人姜氏無子嬖人婤姶生孟縶孟縶之足不良能行跛也婤音周始烏合切又哀下曰衛侯與諸大夫飲酒禇師聲子襪而登席公怒曰必斷而足事具手部􅂖梁傳定公㑹齊侯于夾谷孔子曰􅀏君者罪當死使司馬行法焉手足異門而出史記曰韓信使人言齊僞詐多變願爲假王漢王大怒張良陳平躡漢王足因附耳語曰漢方不利寜能禁信之王乎漢書曰漢王}
