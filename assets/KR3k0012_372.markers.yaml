  - {type: variant, offset: 64, length: 1, content: 且, SBCK: 其所至亮但􅀏而不言三國典略曰王僧辯平侯景或謂僧辯曰朝士來者孰當先至僧辯曰其周􅀪正乎俄而􅀪正與弟􅀪讓自拔迎軍僧辯甚喜謂之曰公可坐􅂰上􅀪正對曰可謂加諸􅂰也老夫何足當之莊子曰黄帝聞廣成子在於崆峒之上間居三月復往邀之廣成子南首而卧黄帝從下風􅂰行而進列女傳曰桀日夜與末嬉及宫人飲酒常置末嬉於􅂰上聽用其言黄帝素問曰􅂰者筋之府脛􅀃文曰脛胻也胻胡郎切釋名曰脛莖也直而長似物莖尚書㤗誓曰啇王受斮朝渉之脛孔安國注曰冬月見朝渉水者謂其脛耐寒斬}
