  - {type: page-break, offset: 172, content: '', id: KR3k0012_SBCK_372-5b}
  - {type: variant, offset: 172, length: 2, content: 高祖, WYG: 馬援擊西羗中流矢貫脛帝以璽書勞之東觀漢記曰淳于恭養兄崇孤而敎誨學問時不如意輙呼責數以捶自擊其脛欲感之兒慙負不敢復有過魏畧曰北丁零有馬脛國聲似鴈鶩従膝脛以下生馬蹄走疾扵馬正部曰夏禹治水腓無胶脛無毛山海經曰交脛國為人交脛郭璞注曰脚脛曲相交所謂交趾也有赤脛民赤水之東有長脛之國腓脹說文曰腨腓脹也易艮卦曰六二艮其腓又咸卦六二曰咸其腓凶居則吉東觀漢記曰馬援為隴西太守擊羗中矢貫腓脹上聞賜羊三千牛三百頭以養病山海經曰無臋之國為人無臋韓子曰晉平公}
