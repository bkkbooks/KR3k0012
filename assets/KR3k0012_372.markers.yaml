  - {type: variant, offset: 172, length: 2, content: 高祖, SBCK: 馬援擊西羗中流矢貫脛帝以璽書勞之東觀漢記曰淳于恭養兄崇孤而教誨學問時不如意輙呼責數以捶自擊其脛欲感之兒慙􅀒不敢復有過魏略曰北丁零有馬脛國聲似鴈鶩從􅂰脛以下生馬蹄走疾於馬正部曰夏禹治水腓無胈脛無毛山海經曰交脛國爲人交脛郭璞注曰脚脛曲相交所謂交趾也有赤脛民赤水之東有長脛之國腓脹􅀃文曰腨腓脹也腨市兖切腓符非切脹直良切易艮卦曰六二艮其腓又咸卦六二曰咸其腓凶居則吉東觀漢記曰馬援爲隴西太守擊羗中矢貫腓脹上聞賜羊三千牛三百頭以飬病山海經曰無䏿之國爲人無䏿郭璞曰脹脹音啓又公弟切韓子曰晉平公}
