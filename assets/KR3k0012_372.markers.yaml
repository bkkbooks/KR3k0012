  - {type: variant, offset: 203, length: 0, content: '', krp: 張湯所愛史魯謁居病卧閭里主人湯自徃視病爲謁居摩足又曰昭帝立遣李陵故人隴西任立政等三人俱至匈奴招陵單于置酒政等見陵未得私語即目視陵而數自循其刀環握其足隂喻之言可歸漢後漢書曰李固足下有龜文續漢書曰楊彪見漢祚將終遂稱脚攣不復行積十餘年}
  - {type: variant, offset: 204, length: 2, content: 莽好, SBCK: 隠晉書曰陶偘爲荆州杜㢭音韜將王眞遥語眞横脚馬上􅋲􅀃曰杜㢭爲益州刺史盗用庫金父死不奔喪君夲佳人何隨之天下無白頭賊也眞聞下其脚辭又順􅋲知其意使降人喻眞眞乞得先信乃截髮爲信蜀賊粮盡真旣降而走晉書曰陶潛無履江州刺史王􅀪顧左右爲之造履左右請履度潛便於座伸足令度焉􅀪要之還州問其所乗荅云素有脚病向來籃輿亦足自}
  - {type: variant, offset: 204, length: 2, content: 莽好, WYG: 隠晉書曰陶侃為荆州杜弢音韜將王真遥語真横脚馬上侃說曰杜弢為益州刺史盗用庫金父死不奔䘮君本佳人何随之天下無白頭賊也真聞下其脚辭又順侃知其意使降人喻真真乞得先信乃截髮為信蜀賊糧盡真既降而走晉書曰陶潜無履江州刺史王𢎞顧左右為之造履左右請履度潜便扵座伸足令度焉𢎞要之還州問其所乘答云素有脚病向来籃輿亦足自}
  - {type: page-break, offset: 204, content: '', id: KR3k0012_WYG_372-11b, image: WYG0896/WYG0896-0318b.png}
  - {type: variant, offset: 204, length: 2, content: 莽好, krp: 隠晉書曰陶偘爲荆州杜㢭音韜將王眞遥語眞横脚馬上侃說曰杜㢭爲益州刺史盗用庫金父死不奔喪君夲佳人何隨之天下無白頭賊也眞聞下其脚辭又順侃知其意使降人喻眞眞乞得先信乃截髮爲信蜀賊粮盡真旣降而走晉書曰陶潛無履江州刺史王弘顧左右爲之造履左右請履度潛便於座伸足令度焉弘要之還州問其所乗荅云素有脚病向來籃輿亦足自}
  - {type: variant, offset: 207, length: 2, content: 膺高, SBCK: 乃令一門生二兒共輿之三十國春秋曰王濟甞與武帝棊濟伸脚在局下因問孫皓曰聞君生剥人面皮何也皓曰見人臣無禮於其君者則剥之武子大慙遽縮脚晉陽秋曰周顗旣遇害王彬告之甚哀敦怒曰周伯仁凢人遇汝何爲如此彬曰伯仁長者君之親友在朝雖無蹇諤亦無所阿黨且加之極刑何痛如之左右見敦盛怒竊勸跪謝彬曰脚痛不能跪拜敦復曰脚痛孰與頸痛咸爲失色續晉陽秋曰習鑿齒以脚病廢於里巷符堅滅樊鄧素聞其名與釋道安俱舉而致焉與語大恱以其蹇疾裁堪半丁與諸鎮書曰晉氏平吴利在二陸今破漢南得士一人半耳三國典略曰侯景左足上有肉瘤其狀如􅀛戰應剋捷瘤則隠起如其不勝瘤則低下及奔敗瘤䧟肉中唐書曰工部尚書賈直言父道冲以􅇊術待詔翰林因言事獲罪於代宗皇帝詔逐之賜酖於路直言僞令其父拜四方辭上下神祇伺使者}
  - {type: page-break, offset: 207, content: '', id: KR3k0012_SBCK_372-7b}
  - {type: page-break, offset: 207, content: '', id: KR3k0012_SBCK_372-8a}
  - {type: variant, offset: 207, length: 2, content: 膺高, WYG: 乃令一門生二兒共輿之三十國春秋曰王濟嘗與武帝棊濟伸脚在局下因問皓曰聞君生剥人靣皮何也皓曰見人臣無禮扵其君者則剥之武子大慙遽縮脚晉陽秋曰周顗既遇害王彬哭之甚哀敦怒曰周伯仁凡人遇汝何為如此彬曰伯仁長者君之親友在朝雖無蹇諤亦無所阿黨且加之極刑何痛如之左右見敦盛怒竊勸跪謝彬曰脚痛不能跪拜敦復曰脚痛孰與頸痛咸為失色續晉陽秋曰習鑿齒以脚病廢扵里巷苻堅㓕樊鄧素聞其名與釋道安俱輿而致焉與語大恱以其蹇疾裁堪半丁與諸鎮書曰晉氏平吴利在二陸今破漢南得士一人半耳三國典畧曰侯景左足上有肉瘤其状如龜戰應尅㨗瘤則隠起如其不勝瘤則低下及奔敗瘤䧟肉中唐書曰工部尚書賈直言父道冲以伎術待詔翰林因言事獲罪扵代宗皇帝詔逐之賜酖扵路直言偽令其父拜四方辭上下神祇伺使者}
