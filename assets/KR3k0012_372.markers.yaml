  - {type: variant, offset: 42, length: 0, content: '', SBCK: 衛石圃攻公公踰北方而墜折股戰國䇿曰􅂫秦讀書欲睡引錐自刺其股血流至踵漢書曰髙祖股上有七十二黒子又曰}
  - {type: variant, offset: 42, length: 0, content: '', WYG: 衛石圃攻公公踰北方而墜折股戰國䇿曰蘇秦讀書欲睡引錐自刺其股血流至踵漢書曰髙祖股上有七十二黒子又曰}
