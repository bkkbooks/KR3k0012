  - {type: variant, offset: 1415, length: 1905, content: 為小也易說卦曰坤為腹離其於人也為大腹尚書盤庚曰今予其敷心腹腎腸歷告爾百姓于朕志左傳宣十三年傳曰楚子圍蕭司馬卯言號申叔展曰有麥麴乎曰無有山芎窮乎曰無河魚腹疾柰何曰目於眢井而出之國語曰叔魚牛腹其母歎曰必以賄死史記曰薄姬曰昨夜夢蒼龍據妾腹帝曰此貴徵也吾為汝成之一幸生男是為代王史記曰范睢說秦昭王曰伍子胥橐載而出昭門夜行晝伏至於陵水無以餬其口𣍿行匍匐稽首肉袒鼓腹吹簫乞食於吳市卒興吳國闔閭為伯東觀漢記曰光武降銅馬諸將未能信賊賊亦兩心上勑賊各歸勒兵上輕騎入賊營賊曰蕭王推赤心置人腹中安得不投死又曰帝問東平王蒼在家何等最樂對曰為善最樂後詔與諸國述之曰王言甚大副其腰腹矣謝承後漢書曰濟陰戎良字子恭年十八為郡門下幹良儀容佳麗太守諸葛禮使寫書從者誣良與婢通良刳腹引出肝腸示禮赤心後漢書曰邊韶字孝先教授數百人韶口辯曾晝眠臥弟子嘲曰邊孝先腹便便嬾讀書但欲眠韶潛聞之應之曰吾以邊為姓先為字腹便便五經笥但欲眠思經義寐與周公通夢靜與孔子同意師而可嘲出何典記嘲者大慚魏志曰管輅弟展謂輅曰大將軍待君意厚冀當富貴輅長歎曰天與我明才不與我年壽恐四十七八間不見女嫁男娶吾背無三甲腹無三壬此皆不壽之驗明年四十八卒吳錄曰丁固夢腹上生松趙達謂之曰松字十八公後果然夢門已具齊書曰高帝為領軍蒼梧王深相猜忌屢欲害帝常帥數十人直入領軍府時暑熱帝晝臥裸袒蒼梧立帝於室內畫腹為射的自引滿將射之帝神色不動歛袂曰老臣無罪蒼梧左右王天恩諫曰領軍腹大是佳射堋而一箭便死後無可復射不如髇射之乃取髇箭一發即中帝臍蒼梧投弓於地大笑曰此手如何崔鴻十六國春秋後趙錄曰佛圖澄腹傍有一孔常以絮塞之每夜書則拔絮孔中出光照于一室又當齋時平旦至流水側復腹傍孔中引出五藏六腑洗之訖還內腹中老子曰虛其心實其腹又曰聖人為腹不為目莊子曰夫赫胥氏之民含餔而熙鼓腹而遊唐子曰人君以江海為腹山為面如此則下不知其量畏而懷之帝王世紀曰紂刳孕婦之腹中以觀其胎吴越春秋曰子胥鞭平王尸三百右手決其目左手踐其腹京房易占曰人生有二腹其國分王子年拾遺錄曰孫策母夢腸出委地有神女夜來為其收內腹裏云必生才雄之子方興吴國神女負策母繞吴昌門三匝曰當錫爾此土鼎足於天下談藪曰楊玠娶博陵崔季讓女崔家富圖籍殆將萬卷成婚之後頗亦遊其書齋既而告人曰崔氏書被人盜盡曾不之覺崔遽令檢之玠捫腹曰已藏之經笥矣世說曰郝隆七月七日出日中仰臥人問其故荅曰我曬腹中書耳又曰張華既貴有少時賓客來候之華與共飲九醞為酣暢其夜醉眠張常飲此酒眠輒使人左右轉倒其夜客臥志勑左右而左右依常為張公轉側至明起友人猶不起視之酒果穿腹流床下滂沱又曰劉真長始見王丞相時盛暑之月丞相以腹熨彈碁局曰何乃𧥺吴人以吟為𧥺或作渹音與鄭相近劉既出人問見王公如何劉曰未見他異唯作吴語耳又曰郄太尉在京日遣門生與王丞相書求女壻丞相語郄信曰君往東廊下任意選之門生歸白郄云王家諸郎皆可喜聞某來覔女壻咸自矜持唯有一郎在東床坦腹而食如不聞郄云正好比訪之乃是逸少因嫁女與之俗說曰有人指周伯仁腹曰此中何有荅此中洪洞容卿等數百人背說文曰背脊也釋名曰背陪也在後稱也廣雅曰背謂之骶音帝背北也左傳莊公曰齊襄公田于貝丘見大豕從者曰公子彭生也公怒曰彭生敢見射之豕人立而啼公懼墜于車傷足喪屨反誅屨於徒人費弗得鞭之見血走出遇賊于門劫而束之費曰我奚御哉袒而示之背信之費請先入伏公而出鬭死于門中史記曰婁敬說高祖曰夫與人鬭不搤其亢張晏曰亢喉嚨也拊其背未能全勝也今陛下入關而都秦之故地此亦搤天下之亢而拊其背又曰蒯通知天下權在韓信說之曰相君之面不過封侯相君之背貴乃不可言漢書曰吴王濞高帝兄仲之子上患吴會輕悍無壯王鎮之乃立濞為吴王王三郡五十二城高祖召濞相之曰爾狀有反相因拊其背曰漢帝後五十年東南有亂豈非若耶天下一家慎無反濞頓首曰不敢又曰武帝過平陽主既飲謳者進帝起更衣子夫侍尚衣軒中得幸還坐忻甚賜平陽主金千斤主因奉子夫送入宮子夫上車主拊其背曰行矣強飯勉之即貴願無相忘元朔元年生男據遂立為皇后後漢書曰越騎校尉伍子孚怒董卓兇毒乃朝服懷刃見卓語畢辭去卓送至閤以手撫其背孚因出刀剌之不中卓自奮得免呼左右執殺孚魏略曰孟達降文帝乘小輦執手拊其背戲之曰卿得無為劉備剌客耶又曰太祖丁夫人養劉夫人子脩脩士於穰下常言將我兒殺之遂哭泣無節太祖忿之遣歸家後太祖就見之夫人方織踞機如故太祖拊其背曰顧我共載歸乎夫人不應太祖卻行戶外遂不應太祖曰真決矣遂與之絕吴志曰魯肅代周瑜之當陸口過呂蒙屯下肅常輕蒙蒙問肅君受重任與關羽為鄰將何計略以備不虞肅造次應曰臨時施宜蒙曰今東西雖一家而關羽實熊虎因為畫五策於是越席就之拊其背曰呂子明吾不知卿才略所及於此子明蒙之字也車頻秦書曰苻堅生肩背赤色隱起狀若篆文付因為苻氏又曰堅背文曰草付之祥因為符氏唐書曰貞觀四年制決罪人不得鞭背以明堂孔穴針灸, SBCK: 體}
