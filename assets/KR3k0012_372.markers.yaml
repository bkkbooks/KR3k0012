  - {type: variant, offset: 58, length: 0, content: '', SBCK: 又曰諸􅁑亮復出􅄮山詔張郃督諸將至木門與亮軍交戰飛矢中郃右􅂰薨又曰􅂫則與董昭俱爲侍中昭甞枕則􅂰卧則推下之曰蘇則􅂰非侫人之枕又曰鍾繇有􅂰疾拜起不便常輿車上殿魏略曰􅀄􅀽熈納甄后熈出行在幽州后留侍姑及鄴城破􅀽紹妻及后坐堂上文帝入紹舎后怖以頭伏姑􅂰上文帝謂曰􅀽夫人令新婦舉頭姑乃捧后令仰帝就視顔色非凢稱歎之太祖聞遂爲迎之又曰諸􅁑亮在荆州以建安􅀄與潁川石廣元徐元直汝南孟公威等俱遊學三人務於精熟}
  - {type: page-break, offset: 58, content: '', id: KR3k0012_SBCK_372-4a}
  - {type: variant, offset: 58, length: 0, content: '', WYG: 又曰諸葛亮後出岐山詔張郃督諸將至木門與亮軍交戰飛矢中郃右膝薨又曰蘇則與董昭俱為侍中昭嘗枕則膝卧則推下之曰蘇則膝非佞人之枕又曰鍾繇有膝疾拜起不便常輿車上殿魏畧曰初袁熙納甄后熙出行在幽州后留侍姑及鄴城破袁紹妻及后坐堂上文帝入紹舍后怖以頭伏姑膝上文帝謂曰袁夫人令新婦舉頭姑乃捧后令仰帝就視顔色非凡稱嘆之太祖聞遂為迎之又曰諸葛亮在荆州以建安初與潁川石廣元徐元直汝南孟公威等俱逰學三人務扵精熟}
