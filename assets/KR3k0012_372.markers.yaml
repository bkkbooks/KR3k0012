  - {type: variant, offset: 42, length: 0, content: '', krp: 衛石圃攻公公踰北方而墜折股戰國䇿曰蘇秦讀書欲睡引錐自刺其股血流至踵漢書曰髙祖股上有七十二黒子又曰}
  - {type: variant, offset: 43, length: 5, content: 犨爇僖負羈, SBCK: 勃少時欲求見齊相曹參家貧無以自通乃早掃齊舎人門因得自進及灌嬰責其勸齊王反􅃺勃曰失火之家豈暇先言大人然後救火乎因退股戰不能言嬰曰人謂勃勇庸妄人耳何能爲乎東觀漢記曰耿弇擊張歩於東城飛矢中弇股以手中刀截之軍中無知者魏志曰諸􅁑亮軍退司馬宣王使張郃追之郃曰軍法圍城必闕歸軍勿追宣王不聽郃不得巳逐之蜀軍乗髙布伏弓弩亂發矢中郃髀股江表傳曰孫䇿攻苲融爲流矢中傷股不能乗馬因自輿還九州春秋曰劉備奔荆州劉表甚敬禮之備作上客數年甞於坐中起至厠見髀裏肉生流涕還坐表問備備曰昔年甞身不離鞍鞞肉皆消今不復􅀐髀裏生肉日月􅀂馳老將至矣而功業不立是以悲耳晉中興書曰王恭敗單馬奔曲阿不堪乆􅀐兩髀生瘡不能復去曲阿人殷礭以舡載之爲胡浦尉所得三國典略曰後周盧昌期祖英伯反宇文神舉討平之神舉以英伯壯節欲令寛赦軍人巳割其髀肉如鵝􅆑矣英伯顔色不變遂遣誅之唐書曰李勣􅀄平王世充獲其故人單雄信勣表稱其武藝請以官爵贖之髙祖不許臨將就戮勣對之號慟割股肉以啖之曰生死永訣典略曰王符字節信安定人渡遼將軍皇甫規去官歸安定有人前以貨買鴈門太守者亦去官歸書刺從規規卧不迎使呼入旣坐問啖鴈美乎又以其刺刮髀聞符至大禮之叚􅀛龍涼州記曰隠王張美人年色壯艶出家爲道吕隆逼之張自投門樓􅀟股頓折口誦經色自􅀂俄而死太公金匱曰武王伐殷丁侯不朝尚父乃引􅀞丁侯射之丁侯病遣使請臣尚父乃以十干日別去箭丁侯病乃愈四夷聞皆懼越裳}
  - {type: page-break, offset: 43, content: '', id: KR3k0012_SBCK_372-2a}
  - {type: page-break, offset: 43, content: '', id: KR3k0012_SBCK_372-2b}
  - {type: variant, offset: 43, length: 5, content: 犨爇僖負羈, WYG: 勃少時欲求見齊相曹參家貧無以自通乃早掃齊舍人門因得自進及灌嬰責其勸齊王反状勃曰失火之家豈暇先言大人然後救火乎因退股戰不能言嬰曰人謂勃勇庸妄人耳何能為乎東觀漢記曰耿弇擊張歩于東城飛矢中弇股以手中刀截之軍中無知者魏志曰諸葛亮軍退司馬宣王使張郃追之郃曰軍法圍城必闕歸軍勿追宣王不聽郃不得已逐之蜀軍乗髙布伏弓弩亂發矢中髀股江表傳曰孫䇿攻苲融為流矢中傷股不能乗馬因自輿還九州春秋曰劉備奔荆州劉表甚敬禮之備作上客數年嘗扵坐中起至厠見髀裏肉生流涕還坐表問備備曰昔年嘗身不離鞍髀肉皆消今不復騎髀裏生肉日月若馳老將至矣而功業不立是以悲耳晉中興書曰王恭敗單馬奔曲阿不堪久騎兩髀生瘡不能復去曲阿人殷礭以舡載之為胡浦尉所得三國典畧曰後周盧昌期祖英伯反宇文神舉討平之神舉以英伯壯節欲令寛赦軍人已割其髀肉如鵝卵矣英伯顔色不變遂遣誅之唐書曰李勣初平王世充獲其故人單雄信勣表稱其武藝命請以官爵贖之髙祖不許臨將就戮勣對之號慟割股肉以啖之曰生死永訣典略曰王符字節信安定人渡遼將軍皇甫規去官歸安定有人前以貨買鴈門太守者亦去官歸書刺従規規卧不迎使之入既坐問啖鴈美乎又以其刺刮髀聞符至大禮之段龜龍涼州記曰隠王張美人年色壮艷出家為道吕隆逼之張投門樓雙股頓折誦經顔色自若俄而死太公金匱曰武王伐殷丁侯不朝尚父乃引畫丁侯射之丁侯病遣使請尚父乃以十干日去别箭丁侯病乃愈四夷聞皆懼越裳}
