  - {type: variant, offset: 1083, length: 186, content: 齒落髮禿又年少嫗者乳養還復若幼稚神仙服食經曰仙藥有陽丹陰丹陰丹婦人乳汁也婦人十五已上下為月客有身月客絕上為乳汁養性經曰乳者意之府也世說曰王武子蒸肫肥美異常味武帝怪問何由乃爾云以人乳飲之武帝色甚不平所以飲食未畢便去異苑曰賈充妻郭氏為人凶妒生兒黎民年始二歲充外入就乳母抱中嗚撮郭遙見謂充愛乳嫗即殺之兒恒啼泣不飲他乳經日遂死郭於是終身無子唐新語曰韓思彥以侍御史巡察于蜀成都有富商, SBCK: 姥}
