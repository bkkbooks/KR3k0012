  - {type: variant, offset: 216, length: 0, content: '', SBCK: 南宫縚音韜見孔子未甞越履往來過之足不履影老子曰千里之行始於足下韓子曰楚}
  - {type: variant, offset: 216, length: 0, content: '', WYG: 南宫縚音韜見孔子未嘗越履徃来過之足不履影老子曰千里之行始扵足下韓子曰楚和氏得玉璞楚山之中獻之武王武王使玉}
  - {type: variant, offset: 216, length: 0, content: '', krp: 南宫縚音韜見孔子未甞越履往來過之足不履影老子曰千里之行始於足下韓子曰楚}
  - {type: variant, offset: 217, length: 0, content: '', SBCK: 和氏得玉璞楚山之中獻之武王武王使玉人相之曰石也刖其左足武王薨文王即位又奉獻之玉人相之曰石也刖其右足成王即位和抱其璞􅂘于楚山之下三日三夜泣盡繼之以血王使玉人理之得寳焉名曰和氏璧又曰魯哀公問孔子曰吾聞夔一足信乎對曰夔人也獨通於聲堯曰夔一而足矣使爲樂正又曰晉平公與唐彦坐而出叔向入公曵一足叔向問之公曰吾待唐子腓痛足痺而不敢申叔向不恱公曰子欲貴吾爵子子欲冨吾禄子夫唐先}
  - {type: page-break, offset: 217, content: '', id: KR3k0012_SBCK_372-8b}
  - {type: variant, offset: 217, length: 0, content: '', WYG: 相之曰石也刖其左足武王薨文王即位又奉獻之玉人相之曰石也則其右足成王即位和抱其璞哭扵楚山之下三日三夜泣盡繼之以血王使玉人理之得寳焉名曰和氏璧又曰魯哀公問孔子曰吾聞䕫一足信乎對曰䕫之為人也獨通扵聲堯曰䕫一而足使為樂正又曰晉平公與亥唐坐而出叔向入公曵一足叔向問之公曰吾侍唐子腓痛足痺而不敢伸叔向不恱公曰子欲貴吾爵子子欲富吾禄子夫唐先}
  - {type: page-break, offset: 217, content: '', id: KR3k0012_WYG_372-13b, image: WYG0896/WYG0896-0319b.png}
  - {type: variant, offset: 217, length: 0, content: '', krp: 和氏得玉璞楚山之中獻之武王武王使玉人相之曰石也刖其左足武王薨文王即位又奉獻之玉人相之曰石也刖其右足成王即位和抱其璞哭于楚山之下三日三夜泣盡繼之以血王使玉人理之得寳焉名曰和氏璧又曰魯哀公問孔子曰吾聞夔一足信乎對曰夔人也獨通於聲堯曰夔一而足矣使爲樂正又曰晉平公與唐彦坐而出叔向入公曵一足叔向問之公曰吾待唐子腓痛足痺而不敢申叔向不恱公曰子欲貴吾爵子子欲冨吾禄子夫唐先}
