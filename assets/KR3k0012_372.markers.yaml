  - {type: variant, offset: 40, length: 0, content: '', SBCK: 中曰宋公及楚人戰於􅇦宋公旣成列楚人未濟司馬曰彼衆我寡及其未濟也請擊之公曰不可旣陣而後擊之宋師敗績公傷股又襄四年曰齊侯襲莒門于且于且于莒邑傷股而退又襄二十五年曰崔杼之亂甲興公登臺而請弗許公踰牆又射之中股又哀}
  - {type: page-break, offset: 40, content: '', id: KR3k0012_SBCK_372-1b}
