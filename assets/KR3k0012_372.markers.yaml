  - {type: variant, offset: 490, length: 574, content: 宜當棺由戎所見膈說文曰胸心上膈也釋名曰膈塞也膈塞上下使不與穀氣相亂世說曰桓公有主簿善別酒輒令先嘗好者謂青州從事惡者謂平原督郵青州有齊郡平原有膈縣從事言至臍督郵言至膈上住乳廣雅曰湩謂之乳說文曰湩乳汁也湩音凍又竹仲切通俗文曰乳病曰𤴱丁故切河圖曰蒼帝并乳宋均曰法房星也春秋元命苞曰文王四乳是為含良蓋法酒旗布恩舒明宋均曰乳酒也漢書曰張蒼免相後口中無齒食乳以女子為乳母也謝承後漢書曰南陽李善本濟陽李元家奴元遭病死唯有孤孫續有貲千萬奴婢欲謀殺續分其財產善夜抱續逃瑕丘界親自哺養乳為生湩遂至成長吴書曰潁川馮熙使魏辭意不屈魏留之熙懼見迫乃引刀刺中乳房上聞嘉之賜鹽米復其門後魏書曰朱循之為劉義隆司徒從事中郎守滑臺安頡圍之其母在家乳汁忽出母號慟告家人曰我年老非復有乳汁之時今忽如此兒必沒矣果以其日為頡所擒又曰昭成皇帝諱什翼臥則乳至席齊書曰太祖母陳皇后生太祖二年乳人乏乳后夢人以兩甌麻粥與之覺乳遂大出淮南子曰文王四乳是謂太仁天下所歸百姓所親山海經曰形夭與帝爭神帝斷其首罪葬之常羊山乃以乳為目齊為口益部耆舊傳曰蜀郡張寬字叔文漢武帝時為侍中從祀甘泉至渭橋有女子浴於渭水乳長七尺上怪問之女曰帝後第七車者知我所來時寬在第七車對曰天星主祭祀者齋戒不嚴時則女人見劉欣期交州記曰趙嫗者九真軍安縣女子也乳長數尺不嫁入山藂群盜遂攻郡常著金㩉蹤屐戰退輒張帷幙與少男通數十侍側刺史吳郡陸胤平之, SBCK: 差}
