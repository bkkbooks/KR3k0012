  - {type: variant, offset: 3322, length: 555, content: 又曰呂溫者以小吏事崔漢衡貞元初吐蕃背盟漢衡為吐蕃所虜將殺之溫趨往以背受刃吐蕃義之由是與漢衡俱免尸子曰醫竘者秦之良醫為宣王割痤為惠王治痔皆愈張子之背腫謂竘曰背非吾背也子製焉醫竘善治疾張子委製焉夫為身與國亦猶此必有所要製然後治矣竘音叩又音齲孔叢子曰仲尼龜背帝王世紀曰簡翟浴玄丘之水燕遺卵吞之剖背生契白虎通曰傳稱周公背僂是謂強後成就周道輔相幼主又孫卿子曰周公傴背不伸也博物志曰宋有田夫自曝背於日其妻曰負日之暄今獻必蒙重賞田夫曰昔人有美戎菽甘芹子獻之鄉豪嘗苦於口笑而棄之論衡曰書言齊桓公負婦人以朝諸侯管仲曰吾君背疽瘡不得婦人瘡不愈此虛也桓公設庭燎夜坐以致賢士豈反以白日負婦人於背乎幽明錄曰王子猷先有背疾子敬疾篤恒禁來往聞子敬亡撫心悲惋都不一聲背即潰裂脊說文曰脊背𦛗也釋名曰脊積也積續骨節終上下也春秋元命苞曰陽立於三故人脊三寸而結宋均曰結節結也孝經鉤命決曰仲尼龜脊墨子曰周宣王殺其臣杜伯不辜後三年王田於圃田車徒滿野杜伯乘白馬素車衣朱衣朱冠弓矢射王車上中心折脊王殪車中伏韔而死韔音暢脅說文曰骿并脅也膀兩脅旁也從內脅聲通俗文曰腋下謂之脅釋名曰脅挾也在兩旁臂所挾也春秋元命苞曰陰極於八故人旁八幹長八寸又曰顓頊駢幹上法月參集成紀以理陰陽左傳僖中曰晉公子重耳及曹曹共公聞其駢脅欲觀其躶浴薄而觀之公羊傳曰齊公子彭生送魯莊公拉幹而殺之, SBCK: 鍾聚}
