  - {type: variant, offset: 49, length: 0, content: '', SBCK: 獻白鳥也山海經曰長股國爲人常􅀍髮一曰長脚范注方曰青龍中司徒吏顔奮女苦風一髀偏枯農犢民爲穿地作坈取雞矢荆葉燃之令煙内脛坈中視䖝出長尺頭尾赤病愈臋廣雅曰臋謂之脽亦謂臎脽音誰臎音翠釋名曰臋遌也髙厚有殿遌也周易困卦􅀄六曰臋困于株木入于幽谷三歳不覿凶又姤卦曰臀無膚其行次且國語曰晉成公之生其母夢神䂓其臋以黒曰使有晉國故名之黒臋􅂰釋名曰􅂰申也可屈申也􅂰頭曰􅈩􅈩圎也因形圎而名之禮記檀弓下曰穆公問子思曰爲舊君反服古歟子思曰古之君子進人以禮退人以禮今之君子進人􅀂將加諸􅂰退人􅀂將墜諸淵無爲戎首不亦善乎又何反服之禮之有孝經曰故親生之􅂰下以養父母日嚴史記曰衛鞅復見孝公與語不自知􅂰之前於席也}
