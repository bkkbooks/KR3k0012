  - {type: variant, offset: 203, length: 0, content: '', SBCK: 張湯所愛史魯謁居病卧閭里主人湯自徃視病爲謁居摩足又曰昭帝立遣李陵故人隴西任立政等三人俱至匈奴招陵單于置酒政等見陵未得私語即目視陵而數自循其刀環握其足隂喻之言可歸漢後漢書曰李固足下有􅀛文續漢書曰楊彪見漢祚將終遂稱脚攣不復行積十餘年}
