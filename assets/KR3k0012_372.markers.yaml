  - {type: variant, offset: 4057, length: 267, content: 終娶于鬼方氏之妹謂之女嬇音蒯生六子孕而不育三年啟其左脅三人出焉啟其右脅三人出焉王充論衡曰張儀駢脅卒相秦魏外國圖曰大秦國人長脅肋釋名曰肋勒也檢肋五藏也廣雅曰幹謂之肋竹林七賢論曰劉伶嘗醉與俗人相忤其人攘袂而往必欲歐之伶顧而笑曰雞肋不足以安尊拳臍說文曰臍肚臍也釋名曰齊劑也腸端之所限劑也春秋元命苞曰齊者下流並會合為齊腹宋均曰齊中也四方並湊者也左傳莊公曰楚文王過鄧鄧祁侯享之三甥曰亡鄧國者必此人也若不早圖後君噬臍若齧腹齊喻不可及後漢書曰董卓既誅乃尸於市天時始熱卓充肥脂流於地守尸吏燃火置卓臍中光明達曙如是積日漢晉陽秋曰齊王冏之方盛也有婦人詣大, SBCK: 機}
