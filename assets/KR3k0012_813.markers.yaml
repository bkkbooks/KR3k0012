  - {type: variant, offset: 2028, length: 231, content: 韶之始興記曰冷君西北有小首山宋元嘉元年夏霖雨山崩自顛及麓崩處有光耀有若星辰焉居人往觀皆是銀鑠鑄得銀也又曰秋水源山盤石上羅列十甕皆蓋以青盆其中悉是銀餅人有遇之者但得開觀之不可取取輒迷悶晉太元初林驅家僕竊三餅有大虵傷而死其夜林驅夢神語曰君奴不良盜銀三餅已受顯戮願以銀相備驅覺奴死銀在其傍有徐道者自謂能致乃集祭酒盛奏章書擊鼓吹入山須臾雷震雨石倒樹折木道遂懼走湘州記曰曲江縣有銀山山多素霧廣州記曰廣州市司用銀易米遂成縣任山又有有銀砂桂陽記曰臨賀山有黑銀黃銀禮斗威儀曰君乘, SBCK: 范明逹獻}
