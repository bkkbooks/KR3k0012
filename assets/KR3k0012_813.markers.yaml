  - {type: variant, offset: 2699, length: 177, content: 娉迎道人作為金銀又云字金與公鈆則金之公而銀者金之昆弟也茅君內傳曰取鈆十斤安鐵器中猛火燒之三沸投九轉之華一銖於鈆中攪之立成黃金神仙傳曰尹軌字公度有一人遭父喪當葬而貧窮汲汲公度過省之孝子說甚辛苦公度愴然曰卿假求數十斤鈆得否孝子言猶可得耳乃具一百斤公度將入前山中架小屋下於爐火中銷鈆以其所帶管中藥如棗大投沸鈆中攪之皆成好銀以與之告曰念卿貧困故以相與慎勿多言述異, SBCK: 年拾遺}
