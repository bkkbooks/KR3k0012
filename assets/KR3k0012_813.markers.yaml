  - {type: variant, offset: 1436, length: 2, content: 寶器, SBCK: 以金華池􅃮之内太一神鼎中下以桂薪燒之銅成以銅炭冶之取牡銅以爲雄劔取牝銅爲雌劒帶之以入河則蛟龍巨魚水神不敢進也欲知銅之牝壯當令童男童女俱以水灌銅以其在火中尚赤時也則銅自分爲兩叚}
