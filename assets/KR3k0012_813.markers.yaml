  - {type: variant, offset: 1456, length: 0, content: '', SBCK: 上多赤銅此山出金色赤如火以切玉如泥周穆王持西戎爲兵獻汲冡中得銅金劔一枚長三尺五寸故通以錫雜爲兵器帝王丗紀曰紂作銅柱令男女祼形縁之落則妲巳􅀏國語管仲曰美金以鑄㦸劒鑄冶試諸狗馬狗馬難爲利者惡金以鑄鉏夷斤欘惡麄夷平也所以削草平地也斤形似鉏而小欘斫也廣雅曰白銅謂之鋈赤銅謂之錫漢武内傳曰上起神屋臺以銅爲柱黄金塗之神異經曰入金山下四丈得丹楊銅張華曰此銅與金相似典術曰陶丹銅以爲金也賈􅁩書曰下不得鑄錢則民反耕田矣西京􅄂記曰髙祖􅀄入咸}
  - {type: page-break, offset: 1456, content: '', id: KR3k0012_SBCK_813-4b}
  - {type: variant, offset: 1456, length: 0, content: '', WYG: 上亦多銅帝王世紀曰紂作銅柱令男女裸形縁之落則妲己笑國語管仲曰美金以鑄㦸劍試諸狗馬狗馬難為利者惡金以鑄鉏夷斤欘惡麄夷平也以削草平地也斤形似鉏而小欘所也廣雅曰白銅謂之鋈赤銅謂之錫漢武内傳曰上起神屋臺以銅為柱黃金塗之神異經曰入金山下四丈得丹}
  - {type: variant, offset: 1456, length: 0, content: '', krp: 上多赤銅此山出金色赤如火以切玉如泥周穆王持西戎爲兵獻汲冡中得銅金劔一枚長三尺五寸故通以錫雜爲兵器帝王丗紀曰紂作銅柱令男女祼形縁之落則妲巳笑國語管仲曰美金以鑄㦸劒鑄冶試諸狗馬狗馬難爲利者惡金以鑄鉏夷斤欘惡麄夷平也所以削草平地也斤形似鉏而小欘斫也廣雅曰白銅謂之鋈赤銅謂之錫漢武内傳曰上起神屋臺以銅爲柱黄金塗之神異經曰入金山下四丈得丹楊銅張華曰此銅與金相似典術曰陶丹銅以爲金也賈誼書曰下不得鑄錢則民反耕田矣西京雜記曰髙祖𥘉入咸}
  - {type: variant, offset: 1457, length: 0, content: '', SBCK: 宫周行庫藏見銅人十一枚坐皆髙三尺列在一筵上琴筑笙竽皆有所執皆綴花綵儼然􅀂生人筵下有銅管上口髙數尺出筵後其一管内空一管有䋲大如指使一人吹管一人紐䋲則琴筑笙竽皆作聲音與眞樂不異虞喜志林曰建武中南郡男子獻銅皷背有銘及呉時江水中鍾上有百餘字人莫有識者地鏡圖曰草莖黄秀下有銅器士緯曰銅出於石爲鈴則小鑄鍾則大南中八郡志曰雲南舊有銀窟數十劉禪時􅀊常納貢亡破以來時徃採取銀化爲銅不復中用丗語曰元康八年陵雲臺上生銅賈􅁩鵩鳥賦曰隂陽爲炭萬物爲銅張瑩漢南記曰安帝見銅人以問侍中張陵對曰昔􅁗始皇時有大人十二身長五丈履六尺皆夷狄之服見於臨洮此天將亡􅁗之證而始皇誤喜以爲瑞乃鑄銅人以爲像上曰何以知之對曰臣見傳載亦其人􅎍上有銘林邑記曰林邑王范文鑄銅爲牛銅屋行宫荆州記曰衡陽重安縣有苦歷反塘故老相傳云此塘中有銅神今猶時聞銅聲水轉變緑魚爲之死武當山記曰山有石室中有銅杖長七尺越絶書曰赤堇之山破而出錫􅀂耶之谷涸而出銅歐冶因爲純鈞之劒玄中記曰銅之精爲童奴嶺表異録曰蠻夷之樂有銅皷焉形如􅆎皷而一頭有靣皷靣圎二尺許靣與身連全用銅鑄其身遍有䖝魚花草之狀通體均勻厚二分已來鑪鑄之妙實爲竒巧擊之響亮不下鳴鼉貞元年中驃國進樂有玉螺銅皷玉螺盖螺之白者非􅅣王所爲即知南蠻酋首之家皆有此皷也咸逋末幽州張直方貶龔州刺史到任後修葺州城縁掘土得一銅皷牽復載以歸京到襄漢以爲無用之物遂捨于延慶禪院用代木魚鐵尚書曰華陽黒水惟梁州厥貢璆鐵尚書􅀃命曰􅀂金用汝作礪孔安國曰鐵須礪以成利器禮記月令曰季春之月命工師令百工審五庫之量金鐵皮革無或不良左傳昭七年曰􅀳趙鞅賦􅀳國一皷鐵以鑄刑鼎著范宣子刑書各出功力共皷石爲鐵一鼓而足之春秋孔演圖曰八政不中則鐵飛春秋繁露曰蒸石取鐵非人意也禍福所從生亦非人意乎廣雅曰鐵朴謂之礪史記曰邯鄲郭縱以鐵冶成業與王者埒冨也又曰卓氏宛氏以鐵冶致冨漢書五行志曰武帝征和二年􅃰郡鐵官鑄鐵消皆飛去時劉屈􅈊爲太守後死象漢書曰髙祖又與功臣剖符作誓丹書鐵契藏之宗廟又曰張良以家財求客㓨􅁗王得力士爲鐵椎重一百二十斤􅁗始皇至愽浪沙中良與客俱擊􅁗皇帝又曰張敞弟武拜爲梁相武曰當以柱後惠文冠彈治之耳應劭日柱後以鐵爲柱夲法官冠也又曰成帝河平二年沛郡鐵官冶鐵飛又曰李㝷􅀃王根曰政感隂陽猶鐵炭之低仰見效可信者天文志曰懸士炭也以鐵易土耳先冬夏至懸鐵炭於衡各一端冬陽氣至炭仰而鐵低夏至炭低而鐵仰又曰婼羌國有鐵自化作兵范曄後漢書曰赤眉降徐宣等曰自今日得降猶去虎口歸慈母丗祖曰卿鐵中鎗鎗庸中佼佼耳又曰公孫瓉徙鎭易京慮有非常乃居於髙京以鐵爲門魏略曰弁辰國出鐵韓穢皆從市之諸市買皆用鐵如中國用錢也王隱􅀳書曰石苞字仲容􅀄爲縣吏買鐵鄴市市長沛國趙元儒見苞異之便與結交􅀳陽秋曰肅愼土無塩鐵晉書曰林邑國王范逸死奴文篡立文曰南西卷縣夷帥范雅奴也甞牧牛澗中獲二鱧魚化成鐵用以爲刀刀成乃對大石障而呪之曰鱧魚變化冶成􅀟刀石障破者是有神靈進斫之石即瓦解文知其神乃懷之􅀳書載記曰赫連㪍㪍以鐵伐爲氏曰使我宗族子孫剛銳如鐵皆堪伐人也齊書曰髙祖素儉約後宫物器欄檻以銅爲飾者並改以鐵梁書曰康絢築浮山堰將合淮水漂没復決潰衆患之或謂江淮}
