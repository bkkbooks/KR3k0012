  - {type: variant, offset: 144, length: 5, content: 時珠堤銀重, SBCK: 夢長樂宫銅人五枚並起立莽惡之使尚方鐫滅銅人應之又曰呉有豫章郡銅山招致天下人民亡命者盗鑄錢又曰凡律度量衡用銅者所以同天下齊風俗也銅爲物至精不爲燥濕寒暑變其節不爲風雨􅁀露改其形介然有常似於士君子之行是以用銅也又曰王莽天鳯四年}
