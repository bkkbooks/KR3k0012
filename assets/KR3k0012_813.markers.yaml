  - {type: variant, offset: 1457, length: 0, content: '', WYG: 銅張華曰此銅與金相似典術曰陶丹銅以為金賈誼書曰下不得鑄錢則民反耕田矣西京雜記曰髙祖初入咸陽宮周行庫藏見銅人十二枚坐皆髙三尺列在一筵上琴筑笙竽各有所執皆綴花彩儼然若生人筵下有銅管上口髙數尺出筵後其一管内空一管有繩大如指使一人吹管一人紐繩則琴筑笙竽皆作聲音與真樂不異虞喜志林曰建武中南郡男子獻銅皷皆有銘及吳時江水中鐘上有百餘字人莫有識者地中圖曰草莖黃秀下有銅器士幃曰銅出於石為鈴則小鑄鐘則大南中八郡志曰雲南舊有銀窟數千劉禪時歲常納貢亡破以來時往採取銀化為銅不復中用世語曰元康八年陵雲臺上生銅賈誼鵩鳥賦曰隂陽為炭萬物為銅張塋漢南記曰安帝見銅人以問侍中張陵對曰昔秦始皇時有大人十二身長五丈屨六尺皆夷狄之服見於臨洮此天將亡秦之證而始皇誤喜以為瑞乃鑄銅人以為像上曰何以知之對曰臣見傳載云其人胷上有銘林邑記曰林邑王范文鑄銅為牛銅屋行宮荆州記曰衡陽重安縣有岩塘故老相傳云此塘中有銅神今猶時聞銅聲水傳變緑魚為之死武當山記曰山有石室守有銅杖長三尺越絶書曰赤堇之山破而出錫若耶之谷涸而出銅歐冶因為純鈎之劍𤣥中記曰銅之精為童奴嶺表異録曰蠻夷之樂有銅皷焉形如腰皷而一頭有面皷面員一尺許面與身連全用銅鑄其身遍有蟲魚花草之狀通體均匀厚二分已來鑪鑄之妙脾為奇巧擊之響亮不下鳴鼉貞元中年驃國進樂有玉螺銅皷即知南蠻酋首之家皆有此皷也咸通中幽州張直方貶龔州刺史到任後修葺州城縁掘土得一銅皷載以歸京到襄漢以為無用之物遂捨於延慶禪院用代木魚鐵尚書曰華陽黑水惟梁州厥貢璆鐵尚書説命曰若金用汝作礪禮記月令曰季春之月命工師令百工審五庫之量金鐵皮革無或不良左傳昭二十九年曰晉趙鞅賦晉國一鼓鐵以鑄刑鼎著范宣子刑書各出功力共皷石為鐵一皷而足之春秋演圖曰八政不中則鐵飛春秋繁露曰蒸石取鐵非人意也禍福所從生亦非人意乎廣雅曰鐵朴謂之礦史記曰邯鄲郭縱以鐵冶成業與王者埓富也又曰卓氏宛以鐵冶致富漢書五行志曰武帝征和二年涿郡鐵官鑄鐵銷皆飛去時劉屈釐為太守後死象漢書曰髙祖又與功臣剖符作誓丹書鐵契藏之宗廟又曰張良以家財求客刺秦王得力士為鐵椎重一百二十觔秦始皇至慱浪沙中良與客俱擊秦皇帝又曰張敞弟武拜為梁相武曰當以柱後惠文冠彈治之耳柱後以鐵為柱本法官冠也又曰成帝河平二年沛郡鐵官冶鐵飛又曰李尋説王根曰政感隂陽猶鐵炭之低昻見效可信者天文志曰懸上炭也以鐵易土耳先冬夏至懸鐵炭於衡冬一端冬陽氣至炭仰而鐵低夏至炭低而鐵仰又曰㛨羌國有鐵自化作兵范􅁮後漢書曰赤眉降徐宣等曰自今日得降猶去虎口歸慈母世祖曰卿鐵中錚錚傭中佼佼耳又曰公孫瓚徙鎮易京慮有非常乃居於髙京以鐵為門魏畧曰弁辰國出鐵韓濊皆從市之諸市買皆用鐵而中國用錢也王隠晉書曰石苞自仲容初為縣吏買鐵鄴市市長沛國趙元儒見苞異之因與結交晉陽春秋曰肅慎土旡塩鐵晉書曰林邑國王范逸死奴文簒立文日南西卷縣夷帥范椎奴也常牧牛澗中獲二鯉魚化成鐵用以為刀刀成乃對大石鄣而呪之曰鯉魚變化冶成雙刀石鄣破者是有神靈進斫之石即瓦解文知其神乃懷之晉書載記曰赤連勃勃以鐵伐為氏曰使我宗族子孫剛鋭如鐵皆可伐人也齊書曰髙祖素儉約後宫物器欄檻以銅為飾者並改以鐵梁書曰康絢築浮山堰將合淮水漂疾復決潰衆患之或謂江淮}
