  - {type: variant, offset: 2260, length: 411, content: 而王則黃銀見隋書曰辛公義為牟州刺史時山東霖雨自陳汝至于滄海皆苦水災境內犬牙獨無所損山出黃銀獲之以獻詔水部郎婁崱就公義禱乃聞空中有金石絲竹之響唐書曰太宗嘗賜房玄齡黃銀帶顧謂曰昔如晦與公同心輔朕今日所賜唯獨見公因泫然流涕又曰如聞黃銀多為鬼神所畏命取黃金帶遣玄齡親送于靈所也水銀史記曰秦始皇葬以水銀為百川江河大海機轉相輪終而復始皇覽曰關東賊發始皇墓中有水銀廣雅曰水銀謂之澒吳越春秋曰闔閭葬墓中澒地廣六丈神仙傳曰封君達隴西人服鍊水銀年百餘歲常騎青牛世號青牛道士鈆尚書禹貢曰海岱惟青州岱畎絲枲鈆松怪石史記曰高漸離秦始皇矐其目使擊筑漸離乃以鈆置筑中舉筑朴秦始皇帝漢書曰江都王建宮人八子有過者輒令以鈆杵舂不中程輒掠廣川王去數召姬榮愛與飲後昭信譖之銷鈆灌其口中漢書曰或盜靡錢質而取鈆如淳曰或曰民盜靡漫面而其鈆以更鑄作錢東觀漢記曰曹襃寢則枕鈆范子計然曰黑鈆之錯化成黃丹丹再化之成水粉淮南子曰鈆不可為刀又曰鈆之與丹異類殊色而可以為丹者誠得數也, SBCK: 鋼指鐶}
