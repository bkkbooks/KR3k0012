  - {type: variant, offset: 2878, length: 172, content: 河間有雨鈆城漢世天雨鈆地境圖曰草青莖赤秀下有鈆玄中記曰鈆錫之精為老婢錫周禮夏官中職方曰楊州其利金錫鄭玄曰錫鍋也爾雅曰錫謂之鈏周官考工記曰凡鑄金之狀金與錫黑濁之氣竭黃白次之黃白之氣竭青氣次之然後可鑄史記曰江南出柟梓薑桂錫連徐廣曰連音蓮鈆之未練者也淮南子曰明鏡之始照未見其容也及杚之以玄錫磨之以氈則鬚眉見山海經曰龍山之下多赤錫濯山多白錫愽物志曰積草, krp: 石虎爲四時浴臺皆用鍮石珷玞爲隄岸太平御覽卷第八百十}
