  - {type: variant, offset: 2077, length: 231, content: 一人華嶠後漢書韋彪上䟽曰有楚獄事繁故置尚書令史以助郎晉書曰陳壽少仕蜀在觀閣為令史又為郎官人黃皓專弄朝政大將軍閻宇等皆曲躬事皓以營時務壽獨峻然皓乃自禪與杖又曰趙孟字長舒入補尚書郎令史善於清談有國士之風其面有疵點諸事不決皆言當問疵面齊職儀曰自魏晉宋齊正令史書令史皆有品秩朱衣執板進賢一梁冠楊楞伽北齊鄴都故事曰尚書郎判事正令史側坐書令史過事典略曰邊讓字文禮陳留人將軍何進聞其名欲以禮辟恐不肯來乃託以軍事召之到署令史進以禮見之讓占對閑敘聲氣如流其時坐席賓客有百數皆高慕之, SBCK: 四}
