  body:
  - {type: variant, offset: 4, length: 172, content: 一左丞六典曰左右丞掌管轄省事糾舉憲章以辨六官之儀制而正其文法分而視焉漢官典職曰尚書左右丞典臺事繩糾無所不揔續漢書百官志曰左丞掌錄尚書吏人上章百官威儀漢官儀曰漢制八座丞郎初拜並集都座交禮遷又解交晉書百官表志注曰左右丞俸月三十斛左丞主臺內禁令宗廟祠祀朝儀射制彈案選用署吏稽近道文書給假晉書曰劉曒字長叔為尚書左丞正色在朝三臺清肅又曰郄詵為尚書左丞推奏, SBCK: 二}
