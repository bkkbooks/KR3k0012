  - {type: variant, offset: 1222, length: 780, content: 廢而昨左右二丞及諸郎皆出唯次直二郎在設使有兵火警急便為無復行事者二丞頓行無印可以封符䟽此之逋慢莫斯之甚傅咸荅辛曠詩序曰尚書左丞彈八座以下居萬機之會斯乃皇朝之司直天臺之管轄余前為右丞具知此職之要後忝此任僶俛從事日慎一日右丞續漢書百官志曰尚書右丞一人四百石掌錄文書期會假署印綬及筆墨諸材用漢官儀曰尚書左右丞秩各四百石遷刺史晉書百官表注曰右丞主臺內庫藏廨舍量物用多少及廩賜民戶租布刑獄兵器稽遠道文書章表奏事晉中興書曰王國寶因酒坐怒右丞祖台之攘袂喚呼以盤盞樂器擲台之復為有司所彈烈宗詔曰國寶縱肆情性其不可長台之懦弱非監司體其免官沈約宋書曰晉西朝八座丞郎朝晡詣都座朝江左唯旦朝而巳八座丞郎初拜並集都座交禮遷又解交漢舊制也今唯八座解交丞郎不復解交宋書百官志曰右丞掌臺丙庫藏凡諸器物廨舍刑獄兵器唐書曰宇文節為尚書右丞明習法令以幹局見稱時江夏王道宗嘗以私事託於節遂奏之太宗大悅賜絹二百疋仍勞之曰朕所以不置左右僕射者正以卿在省耳又曰韋溫為尚書右丞吏部員外張文規父弘靖長慶初在幽州為朱克融所囚文規不時省赴人士喧然罪之溫居綱轄首糺其事出文規為安州刺史五代史後唐書曰梁開平二年改左右丞為左右司侍郎避廟諱也至同光年十月復舊為左右丞長興元年九月詔曰臺轄之司官資並設左右貂素來相類左右揆不至相懸以此比方豈宜分別自此宜升尚書右丞官品與左丞並為正四品左司郎中左司員外郎六典曰左右司郎中員外郎各掌付十有二司之事以舉正稽違者署符目焉凡都省掌舉諸司之綱紀與其百寮之程式以正邦理以宣邦教隋書曰煬帝三年尚書都司始置左右司郎各一人品同諸曹郎從五品掌都省之職唐職員令曰左右司郎中掌副左右丞所管諸司事署抄目舉稽失知臺內宿直若本司郎中不在併行之右司郎中右司員外郎隋書曰骨儀遷尚書右司郎于時政漸亂濁貨賂公行凡當樞要之職無問貴賤並家累金寶天下士大夫莫不變節而儀勵志守常介然獨立令史漢官儀曰能通蒼頡史篇補蘭臺令史滿歲補, SBCK: 如毛}
