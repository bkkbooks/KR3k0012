  - {type: variant, offset: 1779, length: 529, content: 品左司郎中左司員外郎六典曰左右司郎中員外郎各掌付十有二司之事以舉正稽違者署符目焉凡都省掌舉諸司之綱紀與其百寮之程式以正邦理以宣邦教隋書曰煬帝三年尚書都司始置左右司郎各一人品同諸曹郎從五品掌都省之職唐職員令曰左右司郎中掌副左右丞所管諸司事署抄目舉稽失知臺內宿直若本司郎中不在併行之右司郎中右司員外郎隋書曰骨儀遷尚書右司郎于時政漸亂濁貨賂公行凡當樞要之職無問貴賤並家累金寶天下士大夫莫不變節而儀勵志守常介然獨立令史漢官儀曰能通蒼頡史篇補蘭臺令史滿歲補尚書令史滿歲為尚書郎出亦與郎同宰百里郎與令史分職受書令史見僕射尚書執板拜見丞郎執板揖續漢書百官志曰尚書令史十八人人二百石曹有三人主書後增列曹三人合二十一人華嶠後漢書韋彪上䟽曰有楚獄事繁故置尚書令史以助郎晉書曰陳壽少仕蜀在觀閣為令史又為郎官人黃皓專弄朝政大將軍閻宇等皆曲躬事皓以營時務壽獨峻然皓乃自禪與杖又曰趙孟字長舒入補尚書郎令史善於清談有國士之風其面有疵點諸事不決皆言當問疵面齊職儀曰自魏晉宋齊正令史書令史皆有品秩朱衣執板進賢一梁冠楊楞伽北齊鄴都故事曰尚書郎判事正令史側坐書令史過事典略曰邊讓字文禮陳留人將軍何進聞其名欲以禮辟恐不肯來乃託以軍事召之到署令史進以禮見之讓占對閑敘聲氣如流其時坐席賓客有百數皆高慕之, WYG: ''}
