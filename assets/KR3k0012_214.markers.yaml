  - {type: variant, offset: 229, length: 3, content: 是視各, WYG: 謝荘笑而不與人官又曰蔡廓為吏部尚書廓因傅隆問傅亮選事若悉以見付不論不然不能拜亮以語録尚書徐羡之羡之曰黄門已下悉以委蔡自此已上宜共叅同異廓曰我不能為徐干木署紙尾遂不拜干木羡之小字也選案録尚書與吏部尚書連名故廓云紙尾又曰王𢎞自領選將加榮䘵於人者每先呵責譴辱之然後施行若美相盼接語欣歡者必無所諧人問其故答曰王爵既加於人又相撫勞便成與主分功此所謂奸以事君者也若求者絶官叙之分既無以為惠又不微借顔色即大成怨府亦鄙薄所不任問者恱伏又曰江湛為吏部尚書家甚貧不營財利餉饋盈門一無所受無兼衣餘食嘗為上所召遇澣衣稱疾經日衣成然後赴又曰庾仲文性好㓗為吏部尚書用少府卿劉道錫為廣州刺史道錫至鎮餉白檀牽車常自乘焉或以白文帝帝見問曰道錫餉卿小車装餙甚嚴麗有之乎仲文懼起謝又曰庾炳之為吏部尚書通貨賄吏部令史錢泰能彈琵琶主客令史周伯齊善歌詣炳之宅諮事因留宿尚書舊制令史諮事不得宿停外雖有八座命亦不許為所司奏免官也又曰少帝即位以蔡廓為吏部尚書不肯拜乃以王惠代焉惠被召即拜未嘗接客人有與書求官者得輒聚置閣上及去職其封如初時談者以廓之不拜惠之即拜雖事異而意同也齊書曰褚彦回遷吏部尚書有人求官䄂中宻將一餅金因求清閒出金示之曰人無知者彦回曰卿自應得官無假此物若必見與不得不相啟此人大懼收金而去彦回叙其事而不言其名時人莫知之也又曰褚炫為吏部尚書炫居身清立非弔問不雜交遊論者以為美及在選部門庭蕭索賓客罕至出行左右常捧一黄紙㡌風吹紙剥殆盡南史曰初謝脁吿王敬則敬則女為脁妻常懷刃欲報脁脁不敢相見及當拜吏部謙挹尤甚尚書郎范緽嘲之曰卿人才無慙小選但恨不可刑于寡妻脁有愧色南史曰蔡徴拜吏部尚書啟後主借皷吹後主謂所司曰皷吹軍樂有功乃授蔡徴不自量揆紊我朝章然其父景厯既有締構之功宜且如啟拜訖即追還梁書曰蕭子}
