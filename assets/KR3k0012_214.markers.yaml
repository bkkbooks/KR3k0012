  - {type: variant, offset: 881, length: 0, content: '', SBCK: 吏部侍郎髙丗夲鑒賞機晤清愼絶倫然爽俊有餘迹以輕薄時宰多以此疑之唯􅀪深識其眞推心委任隋之選舉於斯爲最又曰牛􅀪拜吏部尚書時髙祖又令􅀪與楊素􅂫威薛道衡許善心虞丗基崔子發等并召諸儒論新禮降殺輕重􅀪所立議衆咸推服之仁壽二年獻皇后崩王公已下不能定其儀注楊素謂􅀪曰公舊學時賢所仰今日之事決在於公􅀪了不辭讓斯須之間儀注悉備皆有故實素歎曰衣冠禮樂盡在此矣非吾所及也又曰韋丗康拜吏部尚書前後十餘年間多所進拔朝廷稱爲廉平嘗因休暇而謂子弟曰吾聞功遂身退古人常道今年將耳順志在懸車汝輩以爲云何子福嗣荅曰大人澡身浴德名立宦成盈滿之誡先哲所重欲追蹤二踈㐲奉尊命}
  - {type: page-break, offset: 881, content: '', id: KR3k0012_SBCK_214-7a}
  - {type: page-break, offset: 881, content: '', id: KR3k0012_SBCK_214-7b}
  - {type: variant, offset: 881, length: 0, content: '', krp: 吏部侍郎髙丗夲鑒賞機晤清愼絶倫然爽俊有餘迹以輕薄時宰多以此疑之唯弘深識其眞推心委任隋之選舉於斯爲最又曰牛弘拜吏部尚書時髙祖又令弘與楊素蘇威薛道衡許善心虞丗基崔子發等并召諸儒論新禮降殺輕重弘所立議衆咸推服之仁壽二年獻皇后崩王公已下不能定其儀注楊素謂弘曰公舊學時賢所仰今日之事決在於公弘了不辭讓斯須之間儀注悉備皆有故實素歎曰衣冠禮樂盡在此矣非吾所及也又曰韋丗康拜吏部尚書前後十餘年間多所進拔朝廷稱爲廉平嘗因休暇而謂子弟曰吾聞功遂身退古人常道今年將耳順志在懸車汝輩以爲云何子福嗣荅曰大人澡身浴德名立宦成盈滿之誡先哲所重欲追蹤二踈㐲奉尊命}
