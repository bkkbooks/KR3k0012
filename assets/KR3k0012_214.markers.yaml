  - {type: variant, offset: 303, length: 1, content: 轉, SBCK: 畢集欲待順至於衆挫之順日髙方至雍攘􅃑撫几而言曰天子之子天子之弟天子之叔天子之相四海之內親尊莫二元順何人以身成命投弃於地順􅂡眉俱張仰面㸔屋憤氣奔湧長歔而不言乆之摇一白羽扇徐而謂雍曰髙祖遷宅中土剏定九流官方清濁軌儀万古而朱暉小人身爲省史何令爲廷尉清官殿下旣先皇同氣冝遵成旨自有短垣而復踰之雍曰身爲丞相録尚書如何不用一人爲官順曰庖人雖不理庖尸祝不得越樽俎而代之未聞有別㫖令殿下叅選事順又厲聲曰殿下必如是順當依事聞雍遂􅀏而言曰豈可以朱暉小人便相忿恨遂起呼順入室與之極飲順之亢毅不撓皆此􅀋也又曰元脩義遷吏部尚書及在銓衡唯事貨賄授官大小皆有定價時中散大夫髙居者有旨先叙上黨郡缺遂求之脩義私已許人抑居不與居大言不遜脩義命}
  - {type: page-break, offset: 303, content: '', id: KR3k0012_SBCK_214-5b}
  - {type: variant, offset: 303, length: 1, content: 轉, WYG: 畢集欲待順至於衆挫之順日高方至雍攘袂撫几而言曰天子之子天子之弟天子之叔天子之相四海之内親尊莫二元順何人以身成命投弃於地順鬚眉俱張仰面看屋憤氣奔湧長歔而不言久之搖一白羽扇徐而謂雍曰高祖遷宅中土剙定九流官方清濁軌儀萬古而朱暉小人身為省史何令為廷尉清官殿下既先皇同氣宜遵成㫖自有短垣而復踰之雍曰身為丞相録尚書如何不用一人為官順曰庖人雖不理庖尸祝不得越樽俎而代之未聞有别㫖令殿下恭選事順又厲聲曰殿下必如是順當依事聞雍遂笑而言曰豈可以朱暉小人便相忿恨遂起呼順入室與之極飲順之亢毅不撓皆此類也又曰元脩義遷吏部尚書及在銓衡唯事貨賄授官大小皆有定價時中散大夫高居者有㫖先叙上黨郡缺遂求之脩義私已許人抑居不與居大言不遜脩義命}
