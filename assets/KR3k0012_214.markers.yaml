  - {type: variant, offset: 225, length: 0, content: '', SBCK: 聞善論議臧否得中甄竒録異薦述後進題目品藻曲有條貫以此服之權擢爲選曹尚書選舉號爲得才又曰曁艷字子休爲選曹尚書性峭厲好清議當時郎署混濁多非其人欲區別賢愚彈指百寮覈選三署皆貶髙就下降損數等其居位貪鄙志節汙卑者皆以爲軍吏置營府以處之故怨憤聲積競言艷用私情愛憎不由公理艷坐自殺又曰陸喜字文仲頗渉文籍好人倫孫皓時爲選曹尚書又曰薛綜爲選部尚書固讓顧譚曰譚心精體密貫道逹微才照人物德服衆望誠非臣所可越先後遂代綜晉書曰山濤爲吏部尚書濤用人皆先密啓然後公奏又曰鄧攸爲吏部尚書當時清靜内外肅然後牧馬於家庭妻􅒚素食不受一錢又曰嵇紹字延祖裴頠亦深器之每曰使延祖爲吏部尚書可使天下無復遺才矣又曰王戎爲左僕射領吏部尚書自戎居選未嘗進一寒素退一虚名理一􅁈枉殺一疽嫉隨其沉浮門調戸選好營生廣收八方園田水碓周遍天下聚歛積實不知紀極又曰呉隱之與太常韓康伯隣居康伯母殷浩之姊賢明婦人也每聞隱之哭聲輟飡投杼爲之悲泣旣而謂康伯曰􅀂居銓衡當舉此輩人及康伯爲吏部尚書隱之遂階清級又曰蔡克居選官苟進之徒望風畏憚􅀄克未仕時河内山簡嘗與瑯邪王􅄛書曰蔡子尼今之正人􅄛以書示衆曰山子以一字拔人然未易可稱後􅄛聞克在選官曰山子正人之言驗於今矣晉起居注曰太康四年八月詔曰選曹銓管人才冝得忠恪寡欲抑華崇夲者尚書朱整周愼廉敬以道素自居是其人也其以整爲吏部尚書虞預晉書曰盧欽字子􅀂少好學爲尚書僕射領吏部欽清實選舉稱爲廉平晉陽秋曰陳羣爲吏部尚書制九格登用皆由於中正考之簿丗然後授任晉書諸公賛曰李胤爲吏部尚書正身率職不撓故能行其所}
