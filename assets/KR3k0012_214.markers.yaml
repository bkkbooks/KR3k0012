  - {type: variant, offset: 482, length: 0, content: '', SBCK: 東魏以楊愔典選嘗六十人爲一甲愔令其自叙訖不省文簿便次第呼之呼誤以慕容爲長孫一人而巳有職人魯澷漢自言微賤不蒙記愔曰卿前在元子思坊乗驢遥見我不下以方麹障面我何不識卿耶澷漢驚服愔又謂之曰名以定體果自不虚令史唱名誤以盧士􅀷爲士琛深自言其名愔曰盧郎朗潤所以加玉}
