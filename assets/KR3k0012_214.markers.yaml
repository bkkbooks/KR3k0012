  - {type: variant, offset: 229, length: 3, content: 是視各, SBCK: 謝莊􅀏而不與人官又曰蔡廓爲吏部尚書廓因􅀓隆問􅀓亮選事􅀂悉以見付不論不然不能拜亮以語録尚書徐羡之羡之曰黃門巳下悉以委蔡自此巳上冝共叅同異廓曰我不能爲徐干木署􅁓尾遂不拜干木羡之小字也選案録尚書與吏部尚書連名故廓云􅁓尾又曰王􅀪自領選將加榮禄於人者每先呵責譴辱之然後施行􅀂美相盻接語欣歡者必無所諧人問其故荅曰王爵旣加於人又相撫勞便成與主分功此所謂姧以事君者也􅀂求者絶官叙之分旣無以爲惠又不微借顔色即大成怨府亦鄙薄所不任問者恱伏又曰江湛爲吏部尚書家甚貧不營財利餉饋盈門一無所受無兼衣餘食嘗爲上所召遇澣衣稱疾經日衣成然後赴又曰􅁃仲文性好㓗爲吏部尚書用少府卿劉道錫爲廣州刺史道錫至鎭餉白檀牽車常自乗焉或以白文帝帝見問曰道錫餉卿小車裝飾甚麗有之乎仲文懼起謝又曰􅁃炳之爲吏部尚書通貨賄吏部令史錢泰能彈琵琶王客令史周伯齊善歌詣炳之宅諮事因留􅀫尚書舊制令史諮事不得􅀫停外雖有八座命亦不許爲所司奏免官也又曰少帝即位以蔡廓爲吏部尚書不肯拜乃以王惠代焉惠􅀍召即拜未嘗接客人有與書永官者得轉聚置閣上及去職其封如􅀄時談者以廓之不拜惠之即拜雖事異而意同也齊書曰禇彦回遷吏部尚書有人求官密䄂中將一鉼金因求清閑出金示之曰人無知者彦回曰卿自應得官無假此物􅀂必見與不得不相啓此人大懼􅀵金而去彦回叙其事而不言其名時人莫之知也又曰禇炫爲吏部尚書炫居身清立非弔問不􅄂交遊論者以爲美及在選部門庭蕭索賔客罕至出行左右常捧一黃􅁓帽風吹􅁓剥殆盡南史曰􅀄謝朓告王敬則敬則女爲朓妻常懷刀欲報朓朓不敢相見及當拜吏部謙挹尤甚尚書郎范縝嘲之曰卿人才無慙小選但恨不可刑于寡妻朓有愧色南史曰蔡徴拜吏部尚書啓後主借鼓吹後主謂所司曰鼓吹軍樂有功乃授蔡徴不自量揆紊我朝章然其父景歷旣有締搆之功冝且如啓拜訖即追還梁書曰蕭子}
