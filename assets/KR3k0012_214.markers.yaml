  - {type: variant, offset: 267, length: 4, content: 累辭病疾, SBCK: 􅀄爲吏部尚書與郎姚範清心虚求搜揚俊乂内外稱之以擬魏之崔毛後魏書曰崔玄伯遷吏部尚書命有司制官爵撰朝儀恊音樂定律令申科禁玄伯揔而裁之以爲永式及置八部大夫擬八座玄伯通署三十六曹如令僕統事又曰崔亮遷吏部尚書時羽楚新害張尋之後靈太后令武官得依資入選官貟旣少應選者多前尚書李韶循常擢人百姓大爲嗟怨亮乃奏爲格制}
