  - {type: variant, offset: 349, length: 128, content: 望風自肅晉中興書曰荀蕤字令遠遷左丞時桓溫平蜀朝廷欲以豫章封溫蕤謂太宗曰若溫復假王威平定河洛修復山陵將復何以加之遂止沈約宋書曰何承天為中丞與尚書左丞謝元素不相善二人競伺二臺之違累相糾奏宋書百官志曰晉宋之世左丞主臺內禁令宗廟祠祀朝儀禮制選用署吏糺諸不法無所廻避, SBCK: 賊乎脩義失色居行罵而出}
