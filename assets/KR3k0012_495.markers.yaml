  - {type: variant, offset: 2992, length: 0, content: '', SBCK: 長沙威王晃代兄映爲寧朔將軍淮南宣成二郡太守􅀄沈攸之事起晃便弓馬多從武客燻赫都街時人爲之語曰煥煥蕭四繖崔鴻前􅁗録曰梁讜字伯言愽學有雋才與弟熈俱以文藻清麗見重一時時人爲之語曰􅀜東堂堂二申兩房未􅀂二梁瓌文綺章崔鴻前凉録曰辛攀字懷逺隴西狄道人父奭尚書郎兄鑒曠弟寳迅皆以才識知名􅁗雄爲之語曰五龍一門金友玉昆後魏書曰濟南王元彧與從兄安豐王中山王齊名時人爲之語曰三王楚楚盡琳瑯未􅀂濟南備圎方又曰靈太后幸左藏賜諸臣儀同陳留公}
