  - {type: punctuation, offset: 3073, content: 『, id: KR3k0012_CHANT_495-bkkpn817}
  - {type: variant, offset: 3073, length: 435, content: 李貓尹文子曰虎求百獸食之得狐狐曰子無食我也天帝令我長百獸今子食我是逆天帝命也子以我言不信吾為子先行子隨我後觀百獸之見我不走乎虎以為然故遂與行獸見之皆走虎不知獸之畏己而走以為畏狐也韓子曰司城子罕謂宋君曰慶賞賜子者民之所好也君自行之誅罰殺戮者民之所惡也臣請當之於是戮細民而誅大臣君曰與子罕議之居朞年民知死生命制於子罕故一國歸焉子罕親劫奪宋之政淮南子曰夫狐之搏雉也卑體弭毛以待其來也雉見而信之故可得而禽也使狐瞑目見其必殺之勢雉亦知憚驚遠飛以避其怒矣夫人偽詐以相欺非直禽獸詐也吳越春秋曰要離為王殺慶忌曰請以罪出走殺臣之妻子焚之吳市飛揚其灰購臣千金與百里之邑詐往慶忌必信臣也王曰諾要離以罪出走王殺其妻子焚之吳市飛揚其灰購之千金與百里之邑呂氏春秋曰趙簡子病召太子告曰我則死已葬上夏屋之山以望簡子死已葬襄子上夏屋以望代曰先君必以此殺之也反歸慮所以取代乃先善之代君好色請以其弟妻之襄子謂代君而請觴之先令舞者置兵羽中數百人又先具大金斗代君至酒酣舉斗而擊之腦塗地舞者操兵以鬭盡殺其從者陸賈新, SBCK: ''}
  - {type: variant, offset: 3073, length: 1, content: 李, WYG: 後}
