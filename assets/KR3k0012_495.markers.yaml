  - {type: variant, offset: 929, length: 1, content: 賜, SBCK: 友爲難又曰成帝爲太子及即位以張禹論語爲師以上難數對巳問經爲論語章句獻之諸儒爲之語曰不欲爲論念張文由是學者多從張氏餘家浸微又曰諸􅁑豐元帝擢為司􅀠校尉刺舉無所避京師語曰間何闊逢諸􅁑又曰王􅁻少時居長安其東家有􅀥樹臨􅁻庭中􅁻婦取以啖之􅁻知而去婦東家聞而欲伐樹隣里止之因請吉還婦爲之語曰東家有樹王陽婦去東家􅀥完去婦復還東觀漢記曰陳忠上䟽稱語曰迎新千里送故不出門又曰更始在長安中爲之語曰竈下養中郎將爛羊胄􅀐都尉爛羊頭􅀜内侯又曰楊震少學受歐陽尚書於太常桓郁經明愽覽無不窮究諸儒爲之語曰􅀜西孔子楊伯起又曰明德馬后時上欲封諸舅}
