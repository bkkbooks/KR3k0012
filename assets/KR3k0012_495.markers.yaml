  - {type: variant, offset: 3662, length: 196, content: 而奪己愛也乃為俯而泣曰君王年既老耶明既衰耶何貌惡之若此而覆謂之好也紂於是渝而以為惡妲己恐天下之愈進美女因曰九侯之無道也乃欲以此惑君王也而弗誅何以革後紂則大怒遂脯淑女而烹九侯論衡曰儒書稱武王伐紂太公陰謀食小兒以丹令身絕赤長大教言商亡商民見身赤以為天神及言商亡皆謂商滅世說曰鍾會密白鄧艾有反狀會善効人書於劍閣要艾章表白事皆易其言令辭指倨傲多自矜伐葛仙公別傳曰時有一老人頗能治病從中國來其人言年已數, SBCK: 覽卷第四}
