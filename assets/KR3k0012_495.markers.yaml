  - {type: variant, offset: 800, length: 15, content: 皇后宣平侯敖女也呂太后欲為重親, SBCK: 釋之爲廷尉天下無􅁈人于定國爲廷尉人自}
  - {type: variant, offset: 800, length: 1, content: 皇, WYG: 釋之為廷尉天下無寃人于定國為廷尉人自以不寃又曰王莽簒位後復上符命者莽盡誅之時楊雄校書天禄閣使者欲収雄雄恐乃從閣自投幾死京師為之語曰惟寂惟寞自投于閣爰清爰静無作符命又曰范増徃說項梁曰夫秦㓕六國楚最無罪自懐王入秦不反楚人憐之至今故南公稱楚雖三戶亡秦必楚又曰樓䕶字君卿與谷永俱為五侯上客長安號之曰谷子雲筆札樓君卿唇舌又曰成帝時王吉子駿為京兆尹試以政事先是京兆有趙廣漢張敞王尊王章至駿皆有能名故京師稱曰前有張趙後有三王又曰匡衡好學諸儒為之語曰無說詩匡鼎来匡説詩解人頥又曰少府五鹿充宗貴幸為梁邱易元帝好之欲考其異同令與諸易家論充宗辨口諸儒莫能抗有為朱雲者召入攝齊登堂抗首而講音動左右故諸儒為之語曰五鹿嶽嶽朱雲折其角又曰文帝從㶚陵欲馳下峻阪袁盎攬轡上曰将軍怯耶盎曰臣聞千金子不垂堂百金子不倚衡服䖍曰惜身不倚衡也如淳曰衡樓殿邉欗楯又曰杜欽字子夏少好經書家富而目偏盲故不好為吏茂陵杜業與欽同姓氏俱以才能稱於京師故衣冠謂欽為盲杜子夏以相别欽惡以疾見詆為小冠髙廣材二寸由是京師更謂欽為小冠杜子夏而業為大冠杜子夏又曰劉輔諫成帝立趙}
