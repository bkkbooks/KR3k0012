  - {type: variant, offset: 916, length: 2, content: 傅介, SBCK: 匡衡好學諸儒爲之語曰無􅀃詩匡鼎來匡􅀃詩解人頥又曰少府五鹿充宗貴幸爲梁丘易元帝好之欲考其異同令與諸易家論充宗辯口諸儒莫能抗有薦朱雲者召入攝齋登堂抗首而請音動左右故諸儒爲之語曰五鹿嶽嶽朱雲折其角又曰文帝從灞陵欲馳下峻阪􅀽盎攬轡上曰將軍怯耶盎曰臣聞千金}
  - {type: variant, offset: 916, length: 2, content: 傅介, WYG: 更始在長安中為之語曰竈下養中郎將爛羊胄騎都尉爛羊頭闗内侯又曰楊震少學受歐陽尚書於太常桓郁經明博覽無不窮究諸儒為之語曰闗西孔}
  - {type: variant, offset: 916, length: 2, content: 傅介, krp: 匡衡好學諸儒爲之語曰無說詩匡鼎來匡說詩解人頥又曰少府五鹿充宗貴幸爲梁丘易元帝好之欲考其異同令與諸易家論充宗辯口諸儒莫能抗有薦朱雲者召入攝齋登堂抗首而請音動左右故諸儒爲之語曰五鹿嶽嶽朱雲折其角又曰文帝從灞陵欲馳下峻阪袁盎攬轡上曰將軍怯耶盎曰臣聞千金}
  - {type: variant, offset: 919, length: 0, content: '', SBCK: 不垂堂百金子不􅀝衡服䖍曰惜身不􅀝衡也如淳曰衡樓殿邊欄楯又曰杜欽字子夏少好經書家冨而目偏盲故不好爲吏茂陵杜業}
  - {type: variant, offset: 919, length: 11, content: 與士卒俱齎金幣揚言以賜, WYG: 楊伯起又曰明德馬后時上欲封諸舅}
