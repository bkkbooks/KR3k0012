  - {type: variant, offset: 923, length: 4, content: 齎金幣揚, SBCK: 以才能稱於京師故衣冠謂欽爲盲杜子夏以相别欽惡以疾見詆爲小冠髙廣材二寸由是京師更謂欽爲小冠杜子夏而業爲大冠杜子夏又曰劉輔諌成帝立趙后曰里語云腐木不以爲柱卑人不可以爲主又曰蕭育少與陳咸朱愽爲友著聞當丗往者有王陽貢公故長安語云蕭朱結綬王貢彈冠}
