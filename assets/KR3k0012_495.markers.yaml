  - {type: variant, offset: 1963, length: 212, content: 幼天下賴明公然眾情謂公舊風病發何意尊體乃爾宣王徐更言年老沉疾死在旦夕君當屈為并州并州近胡好善為之恐不復相見如何勝曰當遷本州非并州宣王仍復陽為惛謬曰君方到并州努力自愛錯亂其辭狀如荒語勝復曰當忝本州非并州也宣王乃若微悟者謂勝曰懿年老意荒不解君言今當與君別自顧氣力轉微後必不更會同欲自力設薄主人生死共別今師昭兄弟結君為友因流涕哽咽勝亦長歎吳志曰孫峻謀置酒誅諸葛恪恪將見駐車宮門峻已伏兵於帷中恐恪不時入事洩自出見恪曰使君若尊體不安自, SBCK: ''}
