  - {type: variant, offset: 1486, length: 193, content: 中官所害觀君表相似當應之酺受恩接愴君之禍耳懿憂懼移病不試由是酺對第一拜尚書又曰靈帝時官官得志並起第擬則宮室帝嘗登永安候臺官官恐其望見居處乃使中大夫尚坦諫曰天子不當登高登高則百姓虛散自是不敢升高東觀漢記曰和熹鄧后臨朝權在外戚杜根以安帝年長宜親政事乃與同時郎上書直諫太后大怒收執根等令盛以嫌囊於殿上撲殺之執法者以根知名語行事人使不加力既而載出城外根得蘇太后使人檢視遂詐死三日目中生蛆因得逃竄, WYG: 兄僧珎珉小字}
