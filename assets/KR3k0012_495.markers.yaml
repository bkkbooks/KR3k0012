  - {type: variant, offset: 1692, length: 1, content: 眾, SBCK: 餘同謀者咸超階越次不可勝紀至於奴卒厮役亦加以爵位每朝㑹貂蟬盈坐時爲之諺曰貂不足狗尾續又曰王坦之字文度弱冠與郄超俱有重名時人爲之語曰盛德絶倫郄嘉賔江東獨步王文度嘉賔超小字也魏書曰夏侯淵爲將赴急疾常出敵不意故軍中語曰典軍校尉夏侯淵三日五百六十千魏略曰韓曁韓宣爲大鴻臚稱職語曰大鴻臚小鴻臚前後履行相曷如又曰賈洪字叔業好學有材特精於春秋左傳與馮翊敬危材學最髙故衆人爲之語曰州中曄曄賈叔業辯論洶洶敬丈通又曰}
