  - {type: variant, offset: 13, length: 2, content: 詭責, SBCK: 諺傳言也俗言曰諺禮記大學曰故諺有之人莫知其子之惡莫知其苗之碩此謂身不脩不可以齊其家左傳隱公曰􅅬侯薛侯來朝爭長公使羽父請於薛侯曰周諺有之山有木工則度之賔有禮主則擇之周之宗盟異姓爲後寡人􅀂朝于薛不敢與諸任齒又曰虞叔有玉虞公求旃弗獻旣而悔之曰周諺有之疋夫無罪懷璧其罪吾焉用此其以賈禍也乃獻之又曰楚子爲陳夏氏亂故伐陳殺夏徴舒滅陳爲縣申叔時使於齊復命不賀王使讓之對曰人有言曰牽牛以蹊人之田而奪之牛牽牛以蹊者信有罪矣而奪之牛罰巳重矣又曰公孫歸父㑹楚子于宋宋人使樂嬰齊告急于􅀳􅀳侯欲救之伯宗曰不可古人有言曰雖鞭之長不及馬腹天方授楚未可與爭雖􅀳之強能違天乎諺曰髙下在心髙下猶屈申也川澤納汙山藪藏疾瑾瑜匿瑕國君含垢含忍也垢耻也天之道}
