  - {type: variant, offset: 2176, length: 394, content: 須復當具白主上欲以嘗知恪意荅曰當力人散騎常侍張約朱思密書與恪曰今日張設非常疑有佗故恪省書而去未出門逄太常滕裔恪曰卒腹痛不任入裔不知峻計謂恪曰君自行旋未見今上置酒請君已至門直當力進恪踟躕而還劍履上殿謝亮還坐設酒峻因曰使君疾未善平當有常服藥酒自可取之恪意乃安則飲所齎酒數行亮還入內峻起如廁著短服出曰詔收諸葛恪恪驚起杖劍未殊而峻刃交下晉書曰謝玄等既破符堅有驛書至謝安安方對客圍碁看書既竟便攝放床上了無喜色碁如故客問之徐荅云小兒輩遂已破賊既罷還內過戶限心喜甚不覺屐齒之折其矯情鎮物如此又曰桓玄以歷代咸有肥遁之士而己世獨無乃徵皇甫謐六世孫希之為著作并給其資用皆令讓而不受號曰高士時人名為充隱又曰紀瞻為會稽內史時有詐作大將軍府符收諸吏暨令令已受拘瞻覺其詐便破檻出之訊問使者果伏詐妄又曰崔洪口不言貨財手不執珠玉汝南王亮嘗讌公卿以琉璃鍾行酒酒及洪洪不執亮問其故對曰慮有執玉不趨之義故爾然實乖其常性故為詭也, SBCK: 趙逹殺我}
