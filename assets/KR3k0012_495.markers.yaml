  - {type: variant, offset: 1279, length: 3, content: 王郎起, SBCK: 井丹字太春通五經善談論京師語曰五經紛綸井太春又曰李固遺黄瓊書曰自生人以來平代少而亂俗多必待堯舜之君此爲治終無時矣常聞語曰嶢嶢者易缺皦皦者易汙陽春之曲和者必寡謝承後漢書曰宋􅀪宴見上令主坐屏風後上謂􅀪曰諺言貴易交冨易妻人情乎􅀪曰臣聞貧賤之知不可忘糟糠之妻不下堂上顧謂主曰事不諧矣又曰許愼字叔重性淳篤少愽學經籍馬融常推敬之時人爲之語曰五經無􅀟許叔重又曰馬后履行節儉事從簡約馬廖慮以美業難終上䟽長樂宫以勸成德政長安語曰城中好髙髺四方且一尺城中好廣眉四方􅀞半額城中好大䄂四方全疋帛斯言如戯有切事實又曰胡廣字伯始一爲司空再作司徒三在太尉京師諺曰萬事不理詣胡伯始􅀽山松後漢書曰桓帝時京師稱曰李元禮巖巖如玉山陳仲舉軒軒如千里􅂹又曰桓帝時南陽語曰朱公叔肅肅如松栢下風又曰公沙穆有六子時人號曰公沙六龍天下無􅀟蜀志曰馬良字季常襄陽冝城人兄弟五人並有才名郷里爲之諺曰馬氏五常白眉㝡良良眉中有白毛故以稱之晉書曰歐陽建字堅石丗爲兾方碩族雅有理思才藻美贍擅名}
