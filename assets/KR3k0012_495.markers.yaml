  - {type: variant, offset: 1682, length: 2, content: 隗囂, SBCK: 石苞字仲容渤海南皮人也雅曠有智局容儀偉麗不脩小節故時人爲之語曰石仲容姣無􅀟又曰衛玠瑯邪王澄有髙名少所推服每聞玠言輙歎息絶倒故時人爲之語曰衛玠談道乎子絶倒又曰阮瞻見司徒王戎戎問曰聖人貴名教老莊明自然其旨同異瞻曰將無同戎咨嗟良乆即命辟之時人謂之三語􅁺又曰劉惔字真長沛國相人也祖宏字終嘏光禄勲宏兄粹字純嘏侍中弟潢字冲嘏吏部尚書並有名中朝時人語曰洛中雅雅有三嘏又曰劉與字慶孫俊㓪有才局與琨並尚書郎弈之甥名著當時京師爲之語曰洛中弈弈慶孫越石又曰裴秀少好學有風操時人語曰後進領䄂有裴秀又曰荀闓字道明亦有名稱京都爲之語曰洛中英英荀道明又曰羊祜傳曰王衍甞詣祜陳事辭甚俊辯祜不然之衍拂衣而起祜顧謂賔客曰王夷甫方以盛名處大位然}
  - {type: page-break, offset: 1682, content: '', id: KR3k0012_SBCK_495-6b}
  - {type: variant, offset: 1682, length: 2, content: 隗囂, WYG: 石苞字仲容渤海南皮人也雅曠有智局容儀偉麗不修小節故時人為之語曰石仲容姣無䨇又曰衛玠瑯邪王澄有髙名少有推服每聞玠言輙歎息絶倒故時人為之語曰衛玠談道平子絶倒又曰阮瞻見司徒王戎戎問曰聖人貴名教老莊明自然其㫖同異瞻曰将無同戎咨嗟良久又即命辟之時人謂之三語掾又曰劉惔字真長沛國相人也祖宏字終嘏光祿勲宏兄粹字純嘏侍中弟潢字冲嘏吏部尚書並有名中朝時人語曰洛中雅雅有三嘏又曰劉與字慶孫俊朗有才局與琨並尚書郎奕之甥名著當時京師為之語曰洛中奕奕慶孫越石又曰裴秀少好學有風操時人語曰後進領袖有裴秀又曰荀闓字道明亦有名稱京師為之語曰洛中英英荀道明又曰羊祜傳云王衍嘗詣祜陳事辭甚俊辨怙不然之衍拂衣而起怙顧謂賔客曰王夷甫方以盛大名處位然}
