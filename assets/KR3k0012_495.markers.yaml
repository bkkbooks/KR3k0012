  - {type: variant, offset: 3510, length: 3, content: 秦二世, SBCK: 京師楚楚􅀽與祖洛中翩翩祖與􅀽又曰李謐字永和􅀄師事小學愽士孔璠數年}
  - {type: variant, offset: 3510, length: 2, content: 秦二, WYG: 青成藍藍謝青師何常在明經陳書張種少恬靜居處雅正不妄交逰傍無造請時人為之語曰宋稱敷演梁則卷充清處學問種有其風隋書崔儦與頓丘李若俱見稱重時人為之語曰京師灼灼崔儦李若齊亡歸鄉里仕郡為功曹又曰何妥少聪明時蘭陵蕭春亦雋才住青陽巷妥住白楊頭時人為之語曰}
