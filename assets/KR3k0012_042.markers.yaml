  - {type: variant, offset: 3, length: 2, content: 會稽, SBCK: 年獻帝爲中常侍叚珪等數人所執公卿百官隨其後到阿上乃得還此非侯非王上北邙也魏略曰魏文帝獵北邙上時盛夏炎暑行者或中暍鮑勛切諌遂因此伏法魏志曰明帝即位欲平北邙令登臺以觀見孟津廷尉辛毗諌曰天地之性髙髙下下今而反之旣非其理加以損費人功民不堪役帝乃止熊耳}
