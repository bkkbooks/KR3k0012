  - {type: variant, offset: 330, length: 0, content: '', SBCK: 長白山陳仲子夫妻隱起郭氏述征記云長白山能興雲雨山西南有大湖山二山並有石室敗赤􅃮舡上有記皆謂之堯時物􅓺山三齊略記曰鄭􅀇刋注詩善棲􅓺今山有古井不竭猶生細草葉形似韭俗稱鄭公書帶陶山齊地記曰范蠡浮海岀齊變姓名自號鴟夷子間行止於陶山因號陶朱公焉後改曰鴟夷山在今平隂縣東巫山又曰巫山一名孝堂山左傳曰齊侯登巫山以望晉師即此山也}
  - {type: variant, offset: 330, length: 0, content: '', WYG: 北邙山是隴山之尾一名平逢山亦名郟山楊龍驤洛陽記曰北山連嶺修亘四百餘里實古今東洛九源之地也又戴延之西征記云邙山西匡東垣阜相屬其下有張母祠即永嘉中此母有神術能愈病故元帝渡江時延聖母於丹陽即此母也今祠存焉續漢書五行志曰靈帝時童謡曰侯非侯王非王千乘萬騎上北邙中平六年獻帝為中常侍叚珪等數人所執公卿百官隨其後到阿上乃得還此非侯非王上北邙也魏畧曰魏文帝獵北邙上時盛夏炎暑行者或中暍鮑勛切諫遂因此罷去魏志曰明帝即位欲平北邙令登臺以觀見孟津廷尉辛毗諫曰天地之性髙髙下下今而反之既非其理加以損費人功民不堪役帝乃止熊耳山河圗括地象曰熊耳山地門也其精上為畢附耳星史記齊桓公曰寡人南伐至郡陵登熊耳山以望江漢東觀漢記曰赤眉初降輦輸鎧甲兵弩積與熊耳山等盛𢎞之荆州記曰南鄭脩縣北有熊耳山山東西各一峯傍竦南北望之若熊耳上多漆下多椶浮豪之水出焉西流注于洛又案山書謂此}
