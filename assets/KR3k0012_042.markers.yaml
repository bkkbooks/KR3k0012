  - {type: variant, offset: 206, length: 0, content: '', krp: 廟四壁皆青石隱起自書契以來忠臣孝子貞婦及孔子弟子七十二人形像像邊皆刻石記之文字分明又有石狀長八尺磨瑩鮮明叩之聲聞甚逺時太尉從事中郎傳珎之諮議叅軍周安穆析敗石牀各取之爲魯氏之後所訟三人並免官琅瑘山史記始皇二十六年滅齊遂登琅瑘山築層臺於上秦皇樂之因留三月是也郡國縣道記云琅瑘臺在故城東南十里州東南一百七十里臺上有始皇碑碑上有六百字可識餘多剥落臺側有四時祠即齊地八祠之一又云臺上有神泉人或汙之即立竭龜山水經注曰龜山在博縣一十五里昔夫子傷政道之陵遟故望山而懷操故琴操有齊龜山操焉山北即龜隂之田也春秋定公十年齊人來歸龜隂之田是也徂徠山又經注曰鄒山記云徂徠山在梁甫奉髙博三縣界猶有美松亦曰尤竦之山危山漢書五行志曰哀帝時無塩危山土自起覆草如馳道狀報山又報山石轉立晉灼曰漢注作報山山脅石一枚轉側起立髙九尺六寸旁行一丈廣四尺東平王雲及后謁自之石所祭治石象報山立石束倍草并祠之三年息夫躬告之王自殺后謁棄市國除尼丘山水經注曰沂水出魯城東南尼丘山西北山即顔母所祈而生孔丘也山東一十里有顔母廟防山南數里孔子父葬處禮所謂防墓崩者也羽山十道志曰羽潭一名羽池潭東有羽山又漢志曰東海郡祝其縣有羽山殛鯀之所又郡國志云鍾離沬城有羽泉殛鯀處其水恒清牛羊不飲書曰殛鯀于羽山}
