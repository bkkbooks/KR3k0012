  - {type: variant, offset: 201, length: 3, content: 嘗配食, SBCK: 乗羊車登嶧山鄒山記曰鄒山古之嶧山也􅀌桐之所植邾文公之所卜山下是鄒縣本是邾國魯穆公改鄒山從邑變故謂鄒山嶧陽猶多桐樹地理志嶧山在鄒縣北繹邑之所依名也山東西二十里南北一十三里髙秀獨岀積石相臨殆無壌石間多孔穴洞逹相通往往有如數間居處其俗謂之嶧孔遭亂輙將居人入嶧外㓂雖衆無所施害永嘉中太尉郗鑒將郷曲逃}
