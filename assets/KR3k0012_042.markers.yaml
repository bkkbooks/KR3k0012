  - {type: variant, offset: 3767, length: 0, content: '', WYG: 南三十五里水經注云相澗水經九泉東仲長子云昔有上者身遊}
  - {type: variant, offset: 3769, length: 0, content: '', WYG: 之上施心不拘之鄉即此山也山陰有九山廟碑晉永康二年立文曰九山府君者太華元子之稱也大嵬山陽城記曰大嵬山在密縣東南五十里即具茨之山黄帝登具茨之山升於供隄之上受神芝圗於黄蓋童子即此也又名具茨山也又有方山一名浮戲山泥水出焉又有洧水出密縣西南馬嶺山桑山春秋曰鄭大旱使屠擊有事於桑山斬其木不雨子產曰有事於山藝山林也藝養䕶也而斬其木有罪大矣奪之官邑半石山山海經曰半石山其上有草生而秀髙大葉與花皆赤而不實其名嘉榮服者不遷喜怒在緱氏南十五里天心山道書福地志曰天心之山方圓百里形如城四面有門上有石墻長千餘丈山髙谷深多生薇蘅其草有風不偃無風獨揺天心山又名錫義山在豐利縣東六十五里少陘山山海經曰少陘山器難之水出焉舊傳器難之水即索水也少陘山一曰嵩渚山俗名周山去滎陽縣三十五里蘭岩山搜神記曰滎陽縣南有蘭岩山峭㧞千丈常有雙鶴不絶往來神仙傳曰昔有夫婦隠此山數百年化為兩鵠忽一旦有一鵠為人所害其一鵠嵗常哀鳴碭山水經注曰碭縣分水北有碭水碭芒二縣之間山澤深固多懐神智有仙者涓子注主並隠碭山得道漢髙隠之吕后望氣知之即於是處也厯山水經注曰雷澤西南十里許有一小山孤立峻上亭亭嵥峙謂之厯山山北有小阜南屬迤澤之東北有陶墟}
