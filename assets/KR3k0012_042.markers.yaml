  - {type: variant, offset: 3786, length: 2, content: 九疑, SBCK: 俗云太}
  - {type: variant, offset: 3786, length: 0, content: '', WYG: 奚公山奚仲造車之所山上軌轍猶存嵇山水經注曰嵇山嵇氏故居也嵇康本姓奚㑹嵇人先人自㑹稽遷于譙之銍縣故為嵇氏取嵇字之義以為姓蓋志本也曹南山十道志曰曹南山曹風所謂薈兮蔚兮南山朝隮是也有泥水出焉即漢書云髙祖即位於泥水之陽今壇存焉泥音沆嶧山書禹貢曰嶧陽孤桐泗濵浮磬鄭𤣥注曰嶧山今在下邳西葛嶧山也詩曰奄有鳬嶧遂荒徐宅鳬宅二山爾雅曰魯國鄒縣有嶧山絶石相積搆屬而成山史記曰始皇二十八年始皇東行郡縣上鄒嶧山立石與魯諸生議刻石頌秦德三代地理書曰秦始皇乘羊傳車登嶧山鄒氏記曰鄒山古之嶧山也孤桐之所植邾文公之所卜下山是鄒縣本是邾國魯穆公改鄒山從邑變故謂鄒山嶧陽猶多桐樹也地理志云嶧山在鄒縣北繹邑之所依名也山東西二十里南北一十三里髙秀獨出積石相臨無土壤石間多孔穴洞洞相通往往有如數間屋處其俗謂之嶧山孔嶧遭亂輙將居人入嶧外冦雖衆無所施害永嘉中太尉郗鍳將鄉曲逃此山胡賊攻守不能得今山南有大嶧名曰郗公山北有絶岩秦始皇觀禮於魯登於嶧山之上命丞相李斯以大篆勒名山嶺名曰畵門詩所謂保有鳬嶧者也金鄉山戴延之西征記曰焦氏北有數山漢司𨽻校尉魯恭穿山得白蛇白兎不葬更葬山南鑿而得金故曰金鄉山山形峻峭塚前有石祠石廟廟四壁皆青石隠起自書契以來忠臣孝子貞婦及孔子弟子七十二人形像像邊皆刻石記之文字分明又有石牀長八尺磨瑩鮮明叩之聲聞甚逺時太尉從事中郎傅珍之諮議參軍周安穆折敗石牀各取之為魯氏之後所訟三人並免官瑯琊山史記曰始皇二十六年滅齊遂登瑯琊山築層臺於上秦皇樂之因留三月是也郡國道記云瑯琊臺在故城東南十里州東南一百七十里臺上有始皇碑碑上有六百字可識餘多剥落臺側有四時祠即齊地八祠之一又云臺上有神泉人或汚之即立竭龜山水經注曰龜山在博縣一十五里昔夫子傷政道之陵遲故望山而懐操故琴操中有龜山操焉山北即龜陰之田也春秋定公十年齊人來歸龜山之田是也徂徠山水經注曰鄒山記云徂徠山在梁甫奉髙博三縣界猶有美松亦曰尤疎之山危山漢書五行志曰哀帝時無鹽危山土自起覆草如馳道狀報山報山石轉立晉灼曰漢注作報山山脅右一枚轉側起立髙}
