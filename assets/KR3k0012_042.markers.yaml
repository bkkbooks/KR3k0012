  - {type: variant, offset: 3815, length: 2, content: 九疑, WYG: 鍾離沫城有羽山殛鯀處其水恒清牛羊不飲書曰殛鯀于羽山又曰蒙羽其藝左傳昭公七年鄭子產聘于晉平公有疾韓宣子逆客私焉曰寡君寢疾于今三月矣並走羣望有加而無瘳今夢黄熊入于寢門其何厲鬼也對曰以君之明子為大政其何厲之有昔堯殛鯀于羽山其神化為黄熊入于羽淵實為夏郊三代祀之韓子祀夏郊晋侯乃間華不注山傳曰齊師與晉戰於鞍齊師敗績晉逐之三周華不注山水經注曰華不注山牙桀立孤峰特起青崖發翠同㸃黛焉長白山郡國志曰長白山陳仲子夫妻隠處郭氏述征記曰長白山能興雲雨山西南有太湖山二山並有石室敗赤漆船上有記皆謂之堯時物黌山三齊記略曰鄭𤣥註詩經常棲黌山}
