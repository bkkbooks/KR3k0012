  - {type: variant, offset: 4246, length: 203, content: 玉笥而去因封為玉笥山又漢武時邑民伐材於山為廨館闕殿中梁一條邑民相謂曰欲精仙館在其梁棟未可以凡木為之經數旬未獲忽一夜震雷風烈天降白玉梁一條光彩瑩目至今下有玉梁觀至魏武時遣人取之至其山門亭午之際雷霆大震化為白龍擘煙霧而去晉永嘉中有人見在都木巖下梁黃門侍郎蕭子雲聿來棲上兼撰立館碑經五載忽有一人來謂之曰館之東北有洞曰都木坑水自東注可以久居矣子雲遂徙家居之後全家隱洞中不知所之大曆初有道士謝修通者宜春人也此山不出凡, SBCK: 第}
