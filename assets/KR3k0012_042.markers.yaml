  - {type: variant, offset: 3373, length: 287, content: 沈約宋書云蕭思話領左衛常從太祖登鍾山北嶺石上彈琴因賜以銀鍾酒謂曰相賞有松石間意焉梁書曰武帝時旱甚詔於蔣山神求雨十旬不降帝怒命載荻焚廟并其神影白日開朗將起火當神上忽有雲如繖蓋須臾驟雨臺中宮殿皆自震動帝詔使停山謙之丹陽記曰京師南北并有連領而蔣山獨崖峻異其形象龍實楊都之鎮也孫權葬山南因為名號曰孫陵又曰出建陽門望鍾山之與覆舟似上東門首陽之與北邙也金陵地記曰秦始皇時望氣者云金陵有天子氣乃東巡埋金玉雜寶於鍾山仍斷其地更名曰秣陵又曰蔣山本少林木東晉令刺史罷還都種松百株郡守五十株又曰周顒字彥倫隱居蔣山出為臨海令還罷都欲游舊居孔稚珪作北山移文以譏之曰鍾山之英草堂之靈馳煙驛霧勒移山庭九疑, WYG: 鼔鐘}
