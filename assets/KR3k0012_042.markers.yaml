  - {type: variant, offset: 4071, length: 174, content: 守王希聃於此山龍淵獲劍二口大真白龜山經曰本名群玉山胚渾初分此山積五色氣而成形覩若群玉之狀皆虛無之貌浮焉至炰犧氏之時山乃堅實委地變為五色遂號為群玉山至夏殷之世人多採其玉百靈慮損其山形遂化為五色土石而生之叢木今溪澗之中五色碧赤之石皆古玉變也玉笥山記曰漢武好仙察眾山之跡知此山為靈感之司遂於山頂致降真壇日夕祈禱天乃降白玉笥置壇上武帝遣使取至其壇側飄風大振, SBCK: 平御覽}
