  - {type: variant, offset: 205, length: 0, content: '', SBCK: 山胡賊攻守不能得今山南有大嶧名曰郗公嶧山北有絶巖秦始皇􅀚禮於魯登於嶧山之上命丞相李斯以大􅂐勒銘山嶺名曰晝門詩所謂保有蒲嶧者也金郷山戴延之西征記曰焦氏山北數山有漢司􅈻校尉魯恭穿山得白虵白兎不葬更葬山南鑿而得金故曰金郷山山形峻峭冢前有石祠石}
