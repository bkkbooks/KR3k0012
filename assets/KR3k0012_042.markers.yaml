  body:
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 七河南宋鄭齊魯諸山砥柱山邙山熊耳山鼔鍾山陸渾山崤山青要山缺門山三塗山女几山白馬山太隂山金門山轘轅山闕塞山牧牛山九山大嵬山桑山半石山天心山小徑山蘭巖山碭山歷山南城山奚公山嵇山曹南山嶧山金郷山琅瑘山􅀛山徂徠山危山報山尼丘山羽山華不注山長白山􅓺山陶山巫山魚山􅂖城山勞山蒙山謝禄山夾山桃山吠狗山砥柱山水經注曰砥柱山名也禹治洪水山陵當水者鑿之故破山以通河河水分流包山而過山見水中􅀂柱然故曰砥柱捜神記曰齊景公渡于江沅之河黿衘左􅆖没之衆皆驚􅅥古冶子於是抜劒從之邪行五里逆之三里至于砥柱之下乃殺黿頭右手挾左􅆖鷰躍鵠踴而岀仰天大呼水爲逆流三百歩觀者皆以爲河伯也說文曰鳯鳥岀東方君子之國過崐崘飲砥柱濯羽弱水暮宿風穴邙山說文曰邙洛陽北土上邑也十道志曰邙山在洛陽縣四十里元和郡國志曰北邙山是隴山之尾一名平逢山亦名郟山楊佺期洛城記曰北山連嶺脩亘四百餘里實古今東洛九原之地也又戴延之西征記云邙山西匡東垣亘阜相屬其下有張母祠即永嘉中此母有神術能愈病故元帝渡江時延聖火於丹陽即此母也今祠存焉續漢書五行志曰靈帝時童謡曰侯非侯王非王千乗萬􅀐上北邙至中平}
