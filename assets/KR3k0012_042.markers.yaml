  - {type: variant, offset: 92, length: 2, content: 勾踐, krp: 昔有夫婦隱此山數百年化爲此鵠忽一旦一鵠爲人所害其一鵠歳常哀鳴至今饗動岩谷莫年歲碭山水經注曰碭縣分水北有碭山碭芒二縣之間山澤深固多懷神智有仙者㳙予柱主並隱碭山得道漢髙隱之占后望氣知之即於是處也歷山水經注曰雷澤西南十許里有一小山孤立峻上停停嵥峙詩謂之歷山山北有小阜南屬迤澤之東北有陶墟縁生言舜耕陶所在墟阜聮属濵帶瓠河也鄭玄云歷山河東今有舜井皇甫謐曰或言今濟隂歷山是也與雷澤相比余謂鄭玄之言爲然故揚雄河東賦曰登歷觀而遥望兮聊浮濟河之巖今雷首歷觀歷山西枕大河校之圖緯於事爲安南城山後漢書曰鄭玄漢末遭黃巾之難客於徐州今孝經序鄭氏所作其序云僕避于南城之山棲遟岩石之下念昔先人餘暇述夫子之志而注孝經盖康成胤孫所作也今西上可二里所有石室焉周廽五丈俗云是康成注孝經處也奚公山楊曄徐州記曰奚公山奚仲造車之所山上䡄轍猶存嵇山水經曰嵇山嵇氏故居也嵇康本姓奚㑹稽人也先人自㑹稽遷于譙之銍縣故爲嵇氏取稽字之上}
  - {type: variant, offset: 95, length: 5, content: 甲楯五千保, SBCK: 爲姓蓋志本也曹南山十道志曰曹南山曹風詩所謂薈􅀆蔚􅀆南山朝躋是也有汜水出焉即漢書云髙祖即位}
