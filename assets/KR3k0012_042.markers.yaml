  - {type: variant, offset: 1118, length: 228, content: 瀑布飛流灑散冬夏不竭山谷絕澗崢嶸無底長松蔓藟幽藹其上又曰赤城山內則有天台靈嶽玉室璿臺又曰天台山舊居五縣之餘地五縣者餘姚鄞句章剡始寧也孫綽天台山賦曰濟楢谿而直進落五界而迅征啟蒙記曰天台山石橋路徑不盈尺長數十步至滑下臨絕溟之澗續搜神記曰會稽剡縣民袁柏桹碩二人獵經深山重嶺甚多見一群山羊六七頭遂經一石橋橋甚狹而峻羊去桹等亦隨渡向絕崖崖正赤壁立名曰赤城上有水流下廣狹如疋布剡人謂之瀑布羊徑有山穴如門豁然而過既入內甚平敞草木皆香有一小屋二女子住中年皆十五六容色甚美著, WYG: 丹}
