  - {type: variant, offset: 463, length: 653, content: 數十丈下臨絕冥之澗唯忘其身然後能濟濟者梯巖壁捫蘿葛之莖度得平路見天台山蔚然綺秀列雙嶺於青霄上有瓊樓玉閣天堂碧林醴泉仙物畢具晉隱士白道猷得過之獲醴泉紫芝靈藥神異經曰餘姚人虞洪入山採茗遇一道士牽三青羊引洪至天台瀑泉曰吾丹丘子也聞子善具飲常思見惠山中有大茗可以相給祈子他日有甌犧之餘不相遺也因立奠祀後常與家人往山獲大茗焉晉書曰許邁與王羲之書云自山陰至臨海多有金庭玉堂仙人芝草異苑曰會稽天台山遐遠自非忽生忘形不能躋也赤城阻其逕瀑布激其衢石有莓苔之嶮淵有不測之深幽明錄曰漢明帝永平五年剡縣劉晨阮肇共入天台山取穀皮迷不得返經十餘日糧食乏盡飢餒殆死遙望山上有一桃樹大有子實而絕巖邃澗了無登路攀葛乃得至噉數枚而飢止體充復下山持杯取水欲盥漱見蕪菁葉從山腹流出甚鮮新復一杯流出有胡麻糝相謂曰此必去人徑不遠度山出一大溪溪邊有二女子姿質妙絕見二人持盃出便笑曰劉阮二郎捉向所失流杯來晨肇既不識之二女便呼其姓如似有舊相見忻喜問來何晚耶因要還家家筒瓦屋南壁及東壁下各有一大床皆施絳羅帳角懸鈴上金銀交錯床頭各十侍婢便勑云劉阮二郎經涉山阻向雖得瓊實猶尚虛弊可速作食有胡麻飯山羊脯甚美食畢行酒有群女來各持三五桃子笑而言賀汝壻來酒酣作樂劉阮忻怖交并至暮令各就一帳宿女往就之言聲清婉令人忘憂至十日後欲求還去女云君已來是宿福所牽何復欲還耶遂留半年氣候草木是春時百鳥鳴呼更懷土求歸甚苦女曰當如何遂呼前來女子有三四十人集會奏樂共送劉阮指示還路既出親舊零落邑屋全異無復相識問得七世孫傳聞上世入山迷不得歸孔靈符會稽記曰赤城山土色皆赤岩岫連沓狀似雲霞懸霤千仞, WYG: 安}
