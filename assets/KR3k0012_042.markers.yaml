  - {type: variant, offset: 3014, length: 687, content: 愽羅二縣之境有羅水南流注于海舊說羅浮高三千丈長八百里有七十二石室七十二長溪神湖神禽玉樹朱草相傳云浮山從會稽來今浮山上猶有東方草木又曰鮑靜字子玄上黨人愽究仙道為南海太守晝臨民政夜來羅浮山騰空往還裴淵廣州記曰羅山隱天唯石樓一路時有閑遊者少得至山際大樹合抱極目視之如薺菜在地山之陽有一小嶺云蓬萊邊山浮來著此因合號羅浮山名山略記曰羅浮山有阿育王塔三十二所雜道書南海郡傳曰羅山諸仙人所遊之山也惡人不得妄上惡人上此山有獸即擊之投於巖下蔣山輿地志曰蔣山舊名金陵山因此山立名金陵徐爰釋問曰諸葛亮以為鍾山龍盤即蔣山也金陵圖曰後漢末蔣子文為秣陵尉逐盜鍾山北為賊傷額而死常謂青骨死當為神至吳大帝下都子文乘白馬慘搔頭執白羽見形故令史白吳王為立廟不爾當百姓大疫大帝猶未信又翊日見於路當令飛蟲入人耳後如其言帝乃立廟鍾山封子文為蔣侯改為蔣山即此是也沈約宋書云蕭思話領左衛常從太祖登鍾山北嶺石上彈琴因賜以銀鍾酒謂曰相賞有松石間意焉梁書曰武帝時旱甚詔於蔣山神求雨十旬不降帝怒命載荻焚廟并其神影白日開朗將起火當神上忽有雲如繖蓋須臾驟雨臺中宮殿皆自震動帝詔使停山謙之丹陽記曰京師南北并有連領而蔣山獨崖峻異其形象龍實楊都之鎮也孫權葬山南因為名號曰孫陵又曰出建陽門望鍾山之與覆舟似上東門首陽之與北邙也金陵地記曰秦始皇時望氣者云金陵有天子氣乃東巡埋金玉雜寶於鍾山仍斷其地更名曰秣陵又曰蔣山本少林木東晉令刺史罷還都種松百株郡守五十株又曰周顒字彥倫隱居蔣山出為臨海令還罷都欲游舊居孔稚珪作北山移文以譏之曰鍾山之英草堂之靈馳煙驛霧勒移山庭九疑山山海經曰九疑山舜所葬為永陵在長沙零陵界秦始皇三十七年十一月行至雲夢望祀虞舜於九疑, SBCK: ''}
