  - {type: variant, offset: 1276, length: 1013, content: 隨渡向絕崖崖正赤壁立名曰赤城上有水流下廣狹如疋布剡人謂之瀑布羊徑有山穴如門豁然而過既入內甚平敞草木皆香有一小屋二女子住中年皆十五六容色甚美著青衣一名瑩珠見二人至忻然云早望汝來遂為室家忽二女出行云復有得壻者往慶之曳屐於絕巖上行琅琅然二人思歸潛去歸路二女巳知追還乃謂曰自可去乃以一腕囊與桹語曰慎勿開也於是得歸後出行家人開其囊囊如蓮花一重去復一重至五盡中有小青鳥飛去桹還知此悵然而巳後桹於田中耕家依常餉之見在田中不動就視但有皮殼如蟬蛻也茅山茅君內傳曰句曲山秦時名為華陽之天三茅君居之因而為名外有金山因壇為號矣周時名其源澤為句曲之穴案山形曲折後人名為句曲之山山間有金陵之地四十七八頃是金壇之地肺也居其地必得度世許邁別傳曰延陵之茅山是洞庭西門潛通五岳茅山記曰大茅山獨高處玄帝命東海神埋大銅鼎於山頂深八尺上有盤石鎮之顓頊水德故號玄帝又曰秦始皇三十七年遊會稽還於此山北埋白壁一雙深七尺李斯刻篆壁文云始皇聖德平章山河巡狩蒼川勒名素壁又曰王莽地皇三年七月遣使者章邕陳獻銅鍾五口黃金百鎰贈之於三茅君又曰中茅山其山獨處司命君埋玉門丹砂六千斤鎮於此山深二丈上有盤石鎮之其山左右泉流下皆小赤色飲之延年益壽左真人就司命乞得一十二斤以合九華丹山頂石壇石按香爐今存今三陽百姓間多有長壽者蓋太陽北陽朱陽三材耳又曰小茅山漢光武帝以建武元年三月遣使吳倫齎金五十斤陳獻三茅君今山頂有埋金處存焉上有聚石又曰開成中高修女真侯仙姑絕穀六十餘年壽逾百歲常棲息此山入洞府獲覩覩征祥又曰咸通中東海蓬萊觀龔道者初入此山斷穀茹芝十餘年後因正月朔旦焚香洞門恍惚之間得入洞中經由一十三日備見洞府巖壁山川星辰日月靈異難詳又曰昔仙人捧一大石臨嶮峻是謂神設一人推之若欲崩墜百人推之亦復如故真誥曰中茅前一長嶺直抵大茅山後古多積金寶故因此著名貞白依東流水合神丹遺壇竈存疊玉峰大茅山東南三山積疊亦有洞穴俗多呼疊石石與玉猶為同類山作三角又呼三角山殊無影響今去葛仙翁壇相近廬山廬山記曰山高二千三百六十丈周廻二千五十里東南三十二里張僧鑒尋陽記云匡俗周武王時人屢逃徵聘結廬此山後登仙空廬尚在弟子等呼為廬山又名匡山蓋稱其姓又接豫章匡俗字君孝父共鄱陽令吳芮佐漢定天下封俗鄱陽廬君兄弟七人皆好道術遂寓精爽於洞庭之山故世謂廬山漢武帝南巡親見神靈封俗為文明公一云匡俗漢人一云周武時人未知誰是遠法師廬山記曰山海經曰廬江三天子都有匡俗先生者出自殷周之際隱遁避世潛居其下或云俗受道於仙人而共遊其嶺遂託室懸岫即巖成館故時人謂, SBCK: ''}
