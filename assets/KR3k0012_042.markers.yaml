  - {type: variant, offset: 3730, length: 0, content: '', WYG: 陸渾山伊水出焉今亦號方山漢末隠士潁川胡昭隠居山中有石城逺望之有金壇玉匱晶然間出尤好竹木泉石時有野人居之長生不死春秋時遷陸渾之戎意其遺類崤山元和郡縣志曰二崤山在今澠池縣西北一名崤嶺也左傳謂秦將襲晉蹇叔哭送謂收子骨後漢末建安中曹公西討巴漢惡其險而更開北山道路多從之便又有石銘云晉太康三年𢎞農太守梁柳脩復舊道西征記曰崤山上不得鳴鼔角鳴則風雨忽至自東崤至西崤三十里東崤長坂數里峻阜絶澗車不得方軌西崤全是石坂十二里險絶不異東崤傳曰杞子自鄭使告于秦曰鄭人使我掌北門之管若潜師以來國可得也穆公召孟明西乞白乙使出師於東門之外蹇叔之子與師哭而送之曰晉人禦師必於崤崤有二陵焉其南陵夏后臯之墓也其北陵文王之所避風雨也必死是間余收爾骨焉漢書曰景帝三年吳楚反以周亞夫為太尉擊吳楚亞夫發至㶚上趙渉遮説亞夫曰吳王素富懐輯死士久矣此知將軍且行必置間人於崤澠阨陿之間將軍何不從此右去走藍田出武關抵雒陽間不過差一二日直入武庫擊金鳴鼔諸侯聞之以為將軍從天而下也太尉如其計至雒陽使吏搜崤澠間果得吳伏兵三輔舊事曰鄧禹敗於潼關後大破赤眉於崤青要山山海經曰青要山實惟帝之密都畛水出焉有草黄華赤實服之美人色水經注云强山東阜即騩山有美􅀥焉十道志曰青要山又名强山缺門山水經注曰缺門山山阜之不相接者一里故得名二壁争髙升聳相亂是也三塗山地里志曰三塗山在陸渾縣南左傳謂四嶽三塗九州之險或曰三塗者伊闕大谷轘轅三道是也女几山元和郡縣志曰女几山在福昌縣西南三十四里山海經曰女几山上多玉下多金其獸即豹麋麝禽多鷮翟鳩白馬山十道志曰白馬山水經注云溪水出宜陽白馬山山上有大石厥狀似馬故溪澗以物色受名焉滑州白馬山門山圗云白馬羣行山上悲鳴則河决馳走則山崩謂此山也西征記云山有神白馬故名焉太陰山十道志曰太陰山左傳謂晉梁丙陰趯率戎伐頴又云蠻子赤奔晉之陰也且自雒以東至陸渾謂此山也金門山阮籍宜陽記曰金山之竹堪笙管楊泉物理論云宜陽金山竹為律管河内葭莩為灰可以調氣水經注曰金門溪出金山也戴氏西征記曰宜陽縣地名金門塢轘轅山十道志曰轘轅山在緱氏縣之東南左傳曰欒盈過周王使候出諸轘轅是也按轘轅道有十二曲今置關焉薛綜注東京賦云轘轅坂十二曲道將去復還故曰轘轅闕塞山洛陽記曰闕塞山在河南縣左傳晉趙鞅納王使汝寛守闕塞伏虔謂}
