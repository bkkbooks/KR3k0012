  - {type: variant, offset: 163, length: 2, content: 會稽, WYG: 齊景公渡于江沅之河黿銜左驂沒之衆皆驚惕古冶子於是拔劍從之邪行五里逆之三里至于砥柱之下乃殺黿頭右手挾左驂燕躍鵠踴而出仰天大呼水為通流三百歩觀者皆以為河伯也說文曰鳯鳥出東方君子之國過崐崙飯飲砥柱濯羽弱水暮宿風光邙山説文曰邙洛陽北土山上邑也十道志曰邙}
  - {type: page-break, offset: 163, content: '', id: KR3k0012_WYG_042-3b, image: WYG0893/WYG0893-0354d.png}
  - {type: variant, offset: 167, length: 0, content: '', WYG: 洛陽}
  - {type: variant, offset: 168, length: 158, content: 東南其上石狀似覆釜禹夢玄夷倉水使者卻倚覆釜之上是也今禹廟在下秦始皇嘗配食此廟又曰山有石室云是仙人射堂東高巖有射的石遠望的的如射候形圓視之如鏡土人常以占穀食貴賤射的明則米賤暗則米貴諺曰射的白斛一百射的玄斛一千夏侯曾先志曰此山有石帆壁立臨川湧石亙山遙望芃芃有似張帆也下有懸巖名為射堂傳云仙人常射於此使白鶴取箭此是會稽東峰, WYG: 四十里元和}
