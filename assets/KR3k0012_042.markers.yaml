  - {type: variant, offset: 3782, length: 1, content: 荊, WYG: 言為然河東賦曰登厯山觀而遥望兮聊浮濟河之岩今雷首厯觀厯山西枕大河校之圖緯於是為安南城山後漢書曰鄭𤣥漢末遭黄巾之難客於徐州今孝經序鄭氏所作其序云僕避于南城之山棲遲岩石之下念昔先人餘暇述夫子之志而注孝經蓋康成之孫所作也今西上可二里所有石室焉周廽五丈俗云是康成嘗注孝經處也奚公山楊曄徐}
