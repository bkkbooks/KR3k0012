  - {type: variant, offset: 2370, length: 1001, content: 下以玉杯承甘露與猛猛遍與弟子又進至一處見崇臺廣廈玉宇金房琳琅焜燿燿輝彩眩目多珍寶玉器不可識見數人與猛共言若舊相識周景式廬山記曰登廬山望九江以觀禹之跡其茲峰乎東南隱諸嶺不得駢矚自廬山人跡所暨逈望無後出此者每雨其下成潦而上猶皎日遠法師遊山記曰自託此山二十二載凡再詣石門四遊南嶺東望香爐秀絕眾形北眺九流神覽視四巖之內猶觀之掌焉傳聞有石井方湖足所未踐張野廬山記曰廬山天將雨則有白雲或冠峰巖或亘中嶺俗謂之山帶不出三日必雨尋陽記曰廬山頂上有一池水池中有三石鴈霜落則飛山北有老峰於廬山最為峻極橫隱蒼穹積石巖巉逈壓彭蠡其形勢如河中虞鄉縣前五老之形故名之又曰上霄峰在山東南秦皇登之與霄漢相接因名之高處有刻名之字大如掌背隱起焉僅百餘言又曰王敦誅術士吳猛附舡日行千里追者但見龍附其舡猛令舡人閉目人聞曳撥林木之聲懼而開目龍知人見遂委舟山頂今艑底在紫霄峰上又曰陶潛栗里今有平石如砥縱廣丈餘相傳靖節先生醉臥其上在廬山南神仙傳曰董奉字君異候官人少有道術居此山多救人疾苦種杏於此山十數年杏有十數萬株結實奉乃多倉廩宣言人買杏多少不須來報但一器穀一器杏多者則為猛獸所害人懼無敢欺者得穀悉賑貧乏羅浮山南越志曰此山本名蓬萊山一峰在海中與羅山合因名焉山有洞通句曲又有濬房瑤室七十二所裴淵廣州記曰羅浮二山隱天唯石樓一路是可登矣晉中興書曰葛洪上羅浮山中鍊丹在山積年忽與廣州刺史鄧岱書云當欲遠行岱得書狼狽而洪已亡顏色如平生體輕弱如空衣時咸以為神仙茅君內傳曰羅浮山之洞周五百里名朱明燿真之天羅浮山記曰羅羅山也浮浮山也二山合體謂之羅浮在層城愽羅二縣之境有羅水南流注于海舊說羅浮高三千丈長八百里有七十二石室七十二長溪神湖神禽玉樹朱草相傳云浮山從會稽來今浮山上猶有東方草木又曰鮑靜字子玄上黨人愽究仙道為南海太守晝臨民政夜來羅浮山騰空往還裴淵廣州記曰羅山隱天唯石樓一路時有閑遊者少得至山際大樹合抱極目視之如薺菜在地山之陽有一小嶺云蓬萊邊山浮來著此因合號羅浮山名山略記曰羅浮山有阿育王塔三十二所雜道書南海郡傳曰羅山諸仙人所遊之山也惡人不得妄上惡人上此山有獸即擊之投於巖下蔣山輿地志曰蔣山舊名金陵山因此山立名金陵徐爰釋問曰諸葛亮以為鍾山龍盤即蔣山也金陵圖曰後漢末蔣子文為秣陵尉逐盜鍾山北為賊傷額而死常謂青骨死當為神至吳大帝下都子文乘白馬慘搔頭執白羽見形故令史白吳王為立廟不爾當百姓大疫大帝猶未信又翊日見於路當令飛蟲入人耳後如其言帝乃立廟鍾山封子文為蔣侯改為蔣山即此, WYG: ''}
