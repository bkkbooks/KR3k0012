  - {type: variant, offset: 6, length: 2, content: 吳越, SBCK: 河圖括地象曰熊耳山地門也其精上爲畢附耳星史記齊桓公曰寡人南伐至邵陵登熊耳山以望江漢東觀漢記曰赤眉初降輦輸鎧甲兵弩積與熊耳山等盛弘之荆州記曰南縣脩縣北有熊耳山山東西各一峯傍竦南北望之􅀂熊耳山多􅃮下多㯶浮豪之水岀焉西流注于洛又案仙書謂此山上有青丹之樹得而服之成仙西京雜記曰葉似江籬而紅緑是又有丹青樹葉一青一赤望之如繡長安謂之丹青樹是也鼔鍾山山海經曰皷鍾之山帝臺之所以觴百神者也有草焉方莖而黃華圎葉而三成其名曰烏酸可以爲毒也今名鍾山在陸渾縣西南三十里陸渾山水經曰陸渾山伊水岀焉今亦號方山漢末隱士潁川胡昭隱居山中有石城逺望之有金壇玉匱皛然間岀尤好竹木泉石時有野人居之長生不死春秋時遷陸渾之戎意其遺􅀋崤山元和郡縣志曰二崤山在今澠池縣西北一名嶺岑左傳謂秦將襲鄭蹇叔哭送謂収子骨所後漢末建安中曹公西討巴漢惡其險而更開北山道路多從之便又有石銘云晉太康三年弘農大守梁栁脩復舊道西征記曰崤山上不得鳴鼔角鳴則風雨揔至自東崤至西崤三十里東崤長坂數里峻阜絶澗車不得方䡄西崤全是石坂十二里險絶不異東崤傳曰􅂎子自鄭使告于秦曰鄭人使我掌其北門之管􅀂潜師以來國可得也穆公召孟明西乞白乙使岀師於東門之外蹇叔之子與師哭而送之曰晉人禦師必於崤有二陵焉其南陵夏后臯之墓也北陵文王之所避風雨也必死是間余収尓骨焉漢書曰景帝三年吴楚反以周亞夫爲太尉擊吴楚亞夫發至灞上趙渉􅃒說亞夫曰吴王素宿懷輯死士乆矣此知將軍且行必置間人於崤澠阨陋之間將軍何不從此右去趨藍田岀武関抵雒陽間不過差一二日直入武庫擊金鳴鼔諸侯聞之以爲將軍從天而下也太尉如其計至雒陽使吏捜崤澠間果得吴伏兵三輔舊事曰鄧禹敗於潼関後大破赤眉於崤青要山山海經曰青要山實惟帝之宻都水岀焉有草黄華赤實服之美人色注水經云強山東阜即騩山有美􅀥焉十道志曰青要山又名強山缺門山注水經曰缺門山山阜之不相接者一里故得名二壁争髙升聳相亂是也三塗山地理志曰三塗山在陸渾縣南左傳謂四嶽三塗九州之險或曰三塗者伊闕大谷轘轅三道是也女几山元和郡縣志曰女几山在福昌縣西南三十四里山海經曰女几山上多玉下多金其獸即豹麖麝禽多鷮翟鴆白馬山十道志曰白馬山注水經云溪水岀冝陽白馬山山上有大石厥狀似馬故溪間以物色受名焉滑州白馬山開山圖云白馬群行山上悲鳴則河决馳走則山崩謂此山也西征記云山有神白馬故名焉太隂山十道志曰太隂山左傳謂晉梁丙隂趯率戎伐潁又云蠻子赤奔晉之隂地且自雒以東至陸渾謂此山也金門山阮籍冝陽記曰金山之竹堪爲笙管楊泉物理論云冝陽金山竹爲律管河内葭莩爲􅁅可以調氣又注水經曰金門溪岀金門山也又戴氏西征記云冝陽縣地名金門塢轘轅山十道志曰轘轅山在緱氏東南左傳曰欒盈過周王使候岀諸轘轅是也按轘轅道十三曲今置􅀜焉又按薛綜注東京賦云轘轅坂十二曲道將去復還故曰轘轅闕塞山洛陽記曰闕塞山在河南縣左傳晉趙鞅納王使汝寛守闕塞伏䖍謂南山伊闕是也杜預云洛西南闕口也俗名龍門是也牧牛山陽城記曰牧牛山在陽城東八十里下有九十六泉即滄河之上源也父老云昔有一神駮身自山而降下飲泉竭故以爲名九山陽城記曰九山在縣南三十五里注水經云相澗水經九山東仲長子云昔有上者身遊九山之上施心不拘之郷即此山也山隂有九山廟碑晉永康二年立文曰九山府君者太華元子之稱也大嵬山陽城記曰大嵬山在宻縣東南五十里即具茨之山黃帝登具茨之山升於供隄之上受神芝圖於黃盖童子即此也又名具茨山也又有方山一名浮戯山汜水出焉又有洧水出宻縣西南馬嶺山桑山}
