  body:
  - {type: variant, offset: 3, length: 1, content: 五, SBCK: 六臺下王子年拾遺記曰􅁗始皇起雲明臺窮四方之珎木捜天下之工南得煙丘碧桂酈水然沙賁都朱泥雲岡素竹東得䓗巒綿栢縹穟龍杉雲梓寒河星柘西得漏海浮金狼淵羽壁滌嶂霞素寘阜乾􅃮隂坂文杞褰流黒魄暗海香瓊瑶異是集有二人皆騰虚縁木揮斤斧於空中子時興功至午時巳畢􅁗人謂之子午臺又云二客於子午之地各起一臺又曰燕昭二年海人乗霞舟以雕壼盛數斗膏以獻王王坐通雲堂亦曰通霞之臺以龍膏爲燈光耀百里煙色丹紫國人望之咸言瑞光也遥拜之燈以火浣布爲􅆞山西有照石去石十里見人物之影如鏡焉碎石片片皆能照人而質方一丈則重一兩昭王舂此石爲泥泥於通霞之臺與西王母遊居此}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_178-1b}
  - {type: variant, offset: 3, length: 1, content: 五, WYG: 六臺臺下王子年拾遺記曰秦始皇起雲明臺窮四方之珍木搜天下之巧工南得燕丘碧柱麗水然沙賁都朱泥雲岡素竹東得葱巒錦栢漂檖龍松寒河星柘屼雲文梓西得漏海浮金狼淵羽壁滌嶂霞桑沉塘員籌北得𠖇阜乾漆隂坂文杞褰流黑魄暗海香瓊珍異是集二人騰虛縁木揮斤斧于空中子時起工午時已畢秦人謂之子午䑓亦言於子午之地各起一䑓述征記曰燕昭王二年海人乘霞舟以雕壺盛數斗膏獻王王坐通雲堂亦曰通霞之臺以龍膏為燈光耀百里烟色丹紫國人望之咸言瑞光也遥拜之燈以火浣布為纒山西有照石去石十里見人物之影如鏡焉碎石片片皆能照人而質方一尺則重一兩昭王舂此石為泥泥於通霞之臺與西王母遊居此}
