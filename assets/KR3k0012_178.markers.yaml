  - {type: variant, offset: 521, length: 1, content: 君, SBCK: 􅁈句縣昌都城吕后追尊父吕公爲宣王都此有吕后臺西有辟陽侯臺閤道相連基址見存又曰洛陽鷄臺有劉曜試弩棚夕陽亭賈充出鎮長安百僚餞送於此又曰鄭州故魏任城王臺下池内有漢時鐵鍾長六尺入地三尺頭自正爲晉氏重興之瑞今不知所在東南有空侯城鄭衛之音也又曰酸􅀥縣韓徙都於此有冰井臺五馬泉又曰衛州有鳯皇臺又曰荆州龍陂山有楚王臺又曰濮州羊角城陳思王愁臺基甚髙又曰夏州朔方郡赫連㪍㪍僣號築土起真珠樓沖天臺又曰兖州有娥皇女英臺又曰􅁪州野望臺趙武靈王以登髙望亦曰寒臺又曰荆州華容縣東六十里有章華臺楚靈王築臺東即荆臺縣也又曰并州榆次縣鑿臺即韓殺智伯於鑿臺之中又曰木客山吴王遣木客入山求木不得工人憂思作木客吟一旦神木自生長二十丈作姑􅂫臺又曰鄧州皇后城即迎隂后處城西張平子讀書堂又曰毫州城父縣老子祠頼郷曲仁里廟内有八公臺九柱樓􅀞東王母西王母又有静念樓又曰蒲州􅃖尤城鳴條野禹娶塗山女思戀本國築臺以望之謂之青臺上有禹祠下有青臺驛又曰汴城上有列仙吹臺西有牧澤甬道二百里漢梁孝王所造今謂之赤堤城東有繁臺本吹臺也云蒼頡師子野所造後有繁姓居側因名}
