  - {type: 'tls:seg', offset: 31, content: '', id: KR3k0012_CHANT_178-1a.10}
  - {type: variant, offset: 31, length: 1, content: 言, SBCK: 魏代䘮滅珎寳池臺鞠爲煨燼􅎳金之鳥亦自髙翔也又曰周靈王二十三年起昆昭之臺一名宣昭之臺聚天下異木神工得崿谷隂生之樹其質千尋文理盤錯以此一木臺用足矣其木有龍虵百獸之形篩水精爲泥臺髙百丈􅂛之以望雲色時有萇引能招致神異王登臺忽見二人乗空而至乗遊飛之輦駕以青螭其衣皆縫緝毛羽王即迎之上席時天下大旱地裂木然一人先唱能爲霜雪引氣一噴則雲起雪飛坐者皆口禁井池氷堅可琢又設狐腋素裘紫羆大褥褥是西域所獻施於臺上又一人以指彈席上而暄風入室裘褥皆弃臺下又曰魏文帝}
  - {type: page-break, offset: 31, content: '', id: KR3k0012_SBCK_178-2b}
  - {type: variant, offset: 31, length: 1, content: 言, WYG: 魏代喪滅珍寳池臺鞠為煨燼𠻳金之鳥從此亦自髙翔也又曰周靈王二十三年起昆明之臺一名宣昭之䑓聚天下異木神工得崿谷隱生之樹臺用足矣其木有龍蛇百獸之形篩水精為泥臺髙百丈升之以望雲色時有萇𢎞能招致神異王登臺忽見二人乘雲而至乘龍鳯之輦駕以青螭其衣皆縫緝毛羽王即迎之上席時天下大旱地裂木然一人先唱能為霜雪引氣一噴則雲起雪飛坐者皆口噤井池冰堅可琢又設狐腋素裘紫罷文褥是西域所獻施於臺上又一人以指彈席上而暄風入室裘褥皆棄臺下又曰魏文帝}
