  - {type: variant, offset: 12, length: 8, content: 而高曰臺積土四方, SBCK: 國所獻異鳥殊獸皆畜此園也時昆明國貢嗽金鳥國人云其地去涼州九千里出此鳥形如雀色黄毛羽柔宻常翶翔海上羅}
