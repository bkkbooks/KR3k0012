  - {type: variant, offset: 72, length: 2, content: 刺衛, SBCK: 今猶基存漢武帝内傳曰鈎弋夫人謂帝曰妾相運正應爲陛下生一男男年七歳妾當死矣今年必不得歸願陛下自愛言終遂卒旣殯屍香聞十餘里因葬之雲凌帝甚哀悼又疑其非常人乃發塚開視空棺無屍唯衣履存焉乃起通靈臺於甘泉常有一青鳥集臺上徃來至}
