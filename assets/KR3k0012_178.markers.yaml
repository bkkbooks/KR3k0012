  - {type: variant, offset: 21, length: 0, content: '', SBCK: 得之以爲至瑞聞大魏之德􅀍於荒逺故越山航海來獻大國帝得此鳥畜於靈禽之園飴以真珠飲以􅀛腦鳥常吐金屑如粟鑄之以爲器服昔漢武時}
  - {type: variant, offset: 21, length: 0, content: '', WYG: 得之以為至瑞聞大魏之德被於荒逺故越山航海來獻大國帝得此鳥畜於靈禽之園飴以珍珠飲以龜腦鳥常吐金屑如粟鑄之以為器服昔漢武帝時}
  - {type: variant, offset: 21, length: 0, content: '', krp: 得之以爲至瑞聞大魏之德𬒳於荒逺故越山航海來獻大國帝得此鳥畜於靈禽之園飴以真珠飲以龜腦鳥常吐金屑如粟鑄之以爲器服昔漢武時}
  - {type: variant, offset: 22, length: 4, content: 木曰榭釋, SBCK: 獻大雀此之􅀋也此鳥畏雪霜乃起小屋以處之}
  - {type: variant, offset: 22, length: 4, content: 木曰榭釋, WYG: 獻神雀此之類也此鳥畏霜雪乃起小室以處之}
