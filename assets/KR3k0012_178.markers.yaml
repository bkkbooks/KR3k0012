  - {type: variant, offset: 582, length: 0, content: '', SBCK: 年吹似鳯聲鳯皇來止其屋爲作鳯臺夫婦止其上數年皆隨鳯飛去􅁗爲作鳯女祠於雍宫時有簫聲焉成都記曰望郷臺蜀王秀所築也又曰思妻臺在梓潼縣五丁於此山㧞虵山崩殺五丁并殺􅁗王女因名之三輔宫殿簿曰長樂宫有臨華臺神仙臺西征記曰揚州雷陂有臺髙二}
