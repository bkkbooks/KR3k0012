  - {type: variant, offset: 575, length: 0, content: '', SBCK: 思子臺及泉鳩里加兵仞於太子者上憐太子無辜乃作思子宫爲歸來望思之臺於湖師古曰言巳望而思之無太子之魂歸來也其在今湖城縣之西閿郷縣之東基阯猶存也天下聞而悲之又曰睢陽城故宫東即梁之舊池也周五六百歩水列鈞臺池東又有一臺世謂之清冷臺北城慿隅又結一池臺晉灼曰或􅀃平臺在城中東北角亦或言兎園在平臺側如淳曰平臺離宫所在今城東二十里有臺寛廣而不甚極髙俗謂之平臺余桉漢梁孝王傳稱王以功親爲大國築東苑方三百里廣睢陽城七十里大治宫室爲􅃨道自宫連屬於平臺三十餘里􅃨道自宫東出楊州之門左陽門即睢陽東門也連屬於平臺則近矣屬之城隅則不能是知平臺不在城中也又曰景􅂛臺劉表之所築也表性好鷹毎登此臺歌野鷹自來又曰睢陽城中有掠馬臺東有一臺謂之清冷臺又曰長平城在上黨郡南􅁗壘在城西􅁗抗趙衆收頭顱築臺於此崔嵬桀}
  - {type: page-break, offset: 575, content: '', id: KR3k0012_SBCK_178-8a}
  - {type: variant, offset: 575, length: 0, content: '', WYG: 思子臺及泉鳩里加兵刃於太子者上憐太子無辜乃作思子宫為歸來望思之臺於湖城師古曰言已望而思之太子之魂其歸來也在今湖城縣之西閿鄉縣之東基跡猶存也天下聞而悲之又曰睢陽城故東宫即梁之舊池也齊周五六百步水列釣臺池東又有一臺世謂之清泠臺北城慿隅又結一池臺晉灼曰或説平臺在城中東北角亦或言兔園在平臺側如淳曰平臺離宫所在今城東二十里有臺寛廣而不甚極髙俗謂之平臺余按漢梁孝王傳稱王以功親為大國築東苑方三百里廣睢陽城七十里大治宫室為複道自宫東出陽州之門左陽門即睢陽東門也連屬於平臺則近矣屬之城隅則不能是知平臺不在城中也又曰景升臺劉表之所築也表性好鷹每登此臺歌野鷹來又曰睢陽城中有掠馬臺東有一臺謂之清泠臺又曰長平城在上黨郡秦壘在城西秦坑趙卒收頭顱築臺於此嵬峨桀}
