  - {type: variant, offset: 1973, length: 363, content: 屋基跡極高云是孔明避水臺先有人姓董居之滅門後無復敢有住者齊建武中有人修井得一石枕高一尺二寸長九寸獻晉安王習鑿齒又為宅銘今宅院見在樓觀本記曰尹喜宅南山阜上先館舍即大夫觀望之臺也昔老君於此山騰空時人因號曰老子陵蓋非墳墓也故爾雅云大陸曰阜大阜曰陵此之謂矣新序曰桀作瑤臺殫百姓之財伊尹諫之桀曰吾有天下猶天之有日日亡吾亡矣又曰魏王將欲為中天之臺曰敢諫者死許綰入曰聞大王將為中天之臺願加一力王曰子何力能加曰臣聞天與地相去萬五千里今王因而半之當立七千五百里高其趾當方八千里盡王之地不足以為臺趾古者堯舜建諸侯五千里王必願為臺必起兵伐諸侯盡有其地猶不足又伐四夷得方八千里乃足以為臺趾材木之積人徒之眾食廩之輸以千萬億度八千里之外當盡農畝之地足以奉給王臺具者已備乃可作王默然而罷又曰紂為鹿臺十年乃成大三里高千尺臨望雲雨故天下叛沈懷遠守越志曰熙安縣東, SBCK: 射堂}
