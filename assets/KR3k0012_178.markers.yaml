  - {type: variant, offset: 29, length: 1, content: 持, SBCK: 皆用水精爲户牖使內外通光而風露􅁪隔宫人爭以鳥所吐之金用飾􅁫珮謂之辟寒金宫人相嘲曰不服辟寒金郍得帝王心於是媚惑者亂争此寳以爲身飾及行卧皆懷挾以要寵}
  - {type: page-break, offset: 29, content: '', id: KR3k0012_SBCK_178-2a}
  - {type: variant, offset: 29, length: 1, content: 持, WYG: 皆用水精為户牖使内外通光而風露恒隔宫人爭以鳥所吐之金用飾釵珮謂之避寒金宫人相嘲曰不服避寒金那得帝王心於是媚惑者亂爭此寳以為身飾及行卧皆懷挾以要寵}
  - {type: variant, offset: 29, length: 1, content: 持, krp: 皆用水精爲户牖使內外通光而風露恒隔宫人爭以鳥所吐之金用飾釵珮謂之辟寒金宫人相嘲曰不服辟寒金郍得帝王心於是媚惑者亂争此寳以爲身飾及行卧皆懷挾以要寵}
