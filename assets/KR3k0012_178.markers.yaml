  - {type: variant, offset: 663, length: 1280, content: 雷雨悉在其下去長安三百里望見長安城武帝祭天臺舞八歲童女三百人置祠具招仙人祭天己令人升通天臺以候天神天神既下祭所若大流星乃舉烽火而就竹宮望拜上有承露盤仙人掌擎玉盃承雲表之露元鳳間臺自毀椽桷皆化為龍鳳隨風雨飛去西京賦云通天眇而竦峙經百常而基擢上班華以交紛下刻峭而若削也又藝文志曰曲臺后倉記七篇如淳注曰行禮射曲臺后倉為記故曰曲臺又曰趙武靈王建藂臺於邯鄲又曰文帝嘗欲作露臺計之直百金曰百金中民十家之產也吾奉先帝宮室常恐羞之何以臺為又曰貳師擊右賢王召李陵使為貳師將軍輜重陵召見武臺師古曰未央宮有武臺也叩頭自請曰臣所將屯邊者皆荊楚勇士奇材劍客也力扼虎射命中願得自當一隊到蘭于山南以分單于兵母令專鄉貳師軍上曰將軍惡相屬邪吾發軍多無騎予女陵對曰無所事騎師古曰猶言不事復騎也臣願以少擊眾步兵五千涉單于庭上壯而拜之後漢書曰永平初馬援女立為皇后顯宗圖畫建初中名臣列將於雲臺雲臺在南宮以椒房故獨不及援東平王蒼觀圖言於帝曰何不畫伏波像帝笑而不言魏志曰武紀建安十五年作銅雀臺十八年作金虎臺又作冰井臺魏略云黃初五年文帝東征留郭后於永始臺霖雨城樓多壞有司請移止后曰昔楚昭王出遊貞姜留漸臺江水至使迎而無符不去卒沒今帝在遠未有急而便移止奈何也何晏景福殿賦曰鎮以崇臺實曰永始複道重閣猖狂是俟吳志曰孫權於武昌臨釣臺飲酒大忻歡使人以水灑群臣曰今日酣飲醉墮臺乃止張昭曰紂為糟丘酒池長夜之飲當時亦以為樂不以為惡權有慚色而罷晉書曰汝南文成王亮太妃伏氏嘗有小疾祓於落水亮兄弟三人侍從並持節鼓吹震耀洛濱武帝登凌雲臺望見曰伏妃洛可謂富貴矣又曰范甯為豫章太守大設庠序遣往交州採磬石以供學用改革舊制不拘常憲遠近至者千餘人資給眾費一出私祿并取郡四姓子弟皆充學生課讀五經又起學臺功用彌廣又曰涼張茂築靈釣臺周輪八十餘堵其高九仞武陵人閻魯夜叩門呼曰武公遣我來曰何故勞百姓築臺乎姑臧令辛巖以魯妖妄請殺之茂曰吾信勞人魯稱先君之令何謂妖乎太府主簿馬魴曰今世難未夷唯當弘尚道素不宜勞役崇飾臺榭比年已來轉覺眾務曰奢於往昔所經營輕違雅度實非士女所望於明公茂曰吾過也命止作役崔鴻十六國春秋夏錄曰赫連勃勃大破南涼傉檀于百井殺眾數萬以人頭為京觀號曰髑髏臺韓子曰景公與晏子游少海登柏寢之臺望其國曰美哉煥乎後世將孰有之晏子曰其田氏乎曰寡人有國如田氏有之為之奈何對曰君若欲奪之則近賢遠不肖治其煩亂綏其刑罰振貧窮恤孤寡行惠而好儉民將歸君雖十田氏其如君何又曰越王伐吳先宣言吾聞吳王築如皇之臺掘淵泉之池罷苦百姓剪財貨以盡民力余為民誅之幽明錄曰海中有金臺出水百丈結構巧麗窮極神功橫巖雲渚竦曜星河也晏子春秋曰景公起大臺歲寒役者皆凍晏子遂如臺執扑鞭其不務者曰吾細人也皆有闔廬以避燥濕寒暑今君為一臺而不速成國人皆以晏子助君虐也晏子歸而君令罷役仲尼曰古之善為臣者美名歸之君災禍歸之身陸賈新語曰楚靈王作乾溪之臺立百仞之高欲登浮云窺天上王孫子曰昔衛靈公坐重華之臺侍御數百隨珠照日羅衣從風仲叔御諫曰昔桀行此而滅紂用此以亡今四境內侵諸侯加兵土地日削內寵無乃太盛歟公下席再拜曰寡人過矣於是出宮女數百人百姓大悅子貢聞之曰所謂能受諫也賈子曰翟王使使之楚楚王誇之饗于章華之臺三休乃至, SBCK: ''}
