  - {type: variant, offset: 523, length: 4, content: 用孔悝請, SBCK: 西有崇臺即顔率云蟬臺之下沙海之上是也又曰許州有丹書臺魏文帝受禪有黄鳥衘丹書集此臺又曰衛州鹿臺在預城内紂自投火處紀年曰武王檎紂於南單之臺蓋鹿臺之異名也糟丘酒池去城南一里基跡猶存水經注曰固安縣金臺陂東西六十里南北五十歩側陂西北有釣臺髙十丈方可四十歩陂北十餘歩有金臺金臺髙上東西八十許歩南北加减髙十餘丈昔慕容垂之爲范陽也戍之即斯臺也有小金臺臺北有簡馬臺並悉髙大秀峙相對翼臺左右水流經通長廡廣宇周旋波浦棟渚咸淪柱礎尚存是基構可}
