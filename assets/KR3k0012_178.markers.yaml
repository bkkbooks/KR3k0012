  - {type: variant, offset: 82, length: 1, content: 新, SBCK: 瓦起瑶宫金堂二人皆以繩縋入地裏􅀒畚器取土多有壓䧟死者今猶二人在耳漢人問何得獨存荅曰我以玉爲衣玦金爲環身有金玉故心氣不滅漢人問汝欲更出爲人否荅曰食􅁟飲泉與螻蟻爲伍寧望日月乎乃引出三日自死骨肉靡靡成􅁅唯心如彈丸大堅如石以物扣之則是乾血耳述異記曰郭景純注爾雅臺今在夷陵郡又曲阜縣南十里有孔子春秋臺又曰吴王夫差築姑蘇臺三年乃成周環詰屈横亘五里崇飾土木殫耗人力宫妓數千人上别立春宵宫爲長夜飲造千石酒鍾又作大池池中造青龍舟舟陳妓日與西施爲水嬉又於宫中作靈館館娃閤銅溝玉檻宫之欄檻皆珠玉飾之吴旣敗越王勾踐於㑹稽山上地方千里勾踐得范蠡之謀躬教民以耕桑延四方之士作}
