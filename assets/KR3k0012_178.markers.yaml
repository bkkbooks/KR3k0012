  - {type: variant, offset: 2837, length: 737, content: 子期忠臣也若臣諛臣也願王賞忠而誅諛也王乃還五經異義曰天子有三臺靈臺以觀天文時臺中以觀四時施化囿臺以觀鳥獸魚鼈諸侯卑不得觀天文無靈臺但有時臺囿臺歸藏夏后曰啟筮享神於晉之靈臺作璿臺山海經曰享神於大陵而上釣臺老子曰九層之臺起於累土又曰眾人熙熙如春登臺伏滔地記曰瑯琊城東南十里有郎山即古郎琊臺也秦始皇二十八年至瑯琊大樂之留三月作瑯琊臺臺赤孤山也然高顯出於眾山之上高五里下周二十餘里山上壘石為臺石形如塼長八尺廣四尺厚尺半三級而上級高三丈上級平敞二百餘步刊石立碑紀秦功德漢武帝亦登此臺吳越春秋曰楚靈王立建章華之臺與群臣登焉王曰臺美乎伍舉曰臣聞國君服寵以為美安民以為樂克聽以為聰致遠以為明不聞土水之崇高蟲鏤之刻畫金石之清音絲竹之悽唳以之為美昔先莊王為匏居之臺高不過望國氛大不過容宴豆士不妨守備用不煩官府民不敗時務官不易朝市今君為此臺七年國人怨焉財用盡焉年穀敗焉百姓煩焉諸侯忿怨卿士訕譏豈前王之所盛人君之所美者乎臣之誠愚不知所謂也靈王納之即除工去飾不遊於臺又曰范蠡於東武山起遊臺其上東南為司馬門立增樓冠其山巔以為靈臺起離宮於淮陽中宿臺在於高平駕臺在於成丘立苑於樂野燕臺在於石室齊臺在於襟山勾踐之出遊也休息石臺食於冷廚又曰吳王闔閭治宮室立射臺於安里華池在平昌南城宮在長樂闔閭出遊臥秋冬治於城中春夏治於姑胥之臺且食䱉山晝遊胥臺射於鷗陂馳於遊臺興樂石城又曰越得神木一雙大二十圍長五十尋陽為文梓陰為楩柟巧工施校制以規繩雕治圓轉刻削磨礱分以丹青錯畫文章嬰以白壁鏤以黃金狀類龍虵文彩生光乃使大夫種獻之於吳王曰東海役臣臣孤勾踐使臣種敢因下吏聞於左右賴大王之力竊為小殿有餘材再拜獻之吳王大悅子胥諫曰王勿受昔者桀為靈臺紂起鹿臺陰陽不和寒暑不時五穀不熟自取其災民虛國變遂取滅亡大王受之後必為越所戮吳王不聽遂受而, SBCK: 差}
