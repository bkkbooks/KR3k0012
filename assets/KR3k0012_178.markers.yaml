  - {type: variant, offset: 80, length: 1, content: 妻, SBCK: 鍾掛懸􅀺之磬吹霜滌之箎唱來雲依日之曲使臺下聽而不聞管歌之聲又曰太􅀄二年起甘泉望風臺於臺上得珠望之如照且因名照月珠又曰建元二年帝起騰光臺以望四逺常有飛光如星集於臺上亦曰經星臺又曰帝初起神明臺時掘地入三十丈得泉水色黄傍有人居無日月光明晝夜以火照中有人食土飲水服赭布之衣漢人問汝何時居此荅曰啇王無道使兆民入地千丈求青堅之土以}
