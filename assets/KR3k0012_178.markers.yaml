  - {type: variant, offset: 2529, length: 306, content: 過簡子與之居無幾而死後與諸大夫飲於洪波之臺酒酣泣曰千羊之皮不如一狐之腋眾人之唯唯不如周舍之諤諤今舍死吾亡無日矣說苑楚莊王與晉戰勝之懼諸侯之畏己也乃築為五仞之臺臺成而觴諸侯諸侯請約莊王曰我薄德之人也諸侯請為觴皆仰而曰將將之臺窅窅其謀我言而不尚諸侯伐之於是遠者來朝近者入賓又曰齊景公為露寢之臺成而不適焉柏常騫曰為臺甚急臺成君何為不適焉公曰然梟昔鳴昔鳴者其聲無不為也吾惡之甚是以不適焉柏常騫曰臣請禳而去之公曰何其對曰築新室為置白茅焉公使為室置白茅焉柏常騫夜用事明問公曰今昔聞梟聲乎公曰一鳴而不復聞使人往視之梟當陛布翼伏地而死家語曰楚王將游荊臺司馬子期諫王怒令尹子西駕於殿下曰今荊臺之觀不可失也王喜子西出從十里還引轡而止, SBCK: ''}
