  - {type: variant, offset: 31, length: 1, content: 言, krp: 魏代䘮滅珎寳池臺鞠爲煨燼嗽金之鳥亦自髙翔也又曰周靈王二十三年起昆昭之臺一名宣昭之臺聚天下異木神工得崿谷隂生之樹其質千尋文理盤錯以此一木臺用足矣其木有龍虵百獸之形篩水精爲泥臺髙百丈升之以望雲色時有萇引能招致神異王登臺忽見二人乗空而至乗遊飛之輦駕以青螭其衣皆縫緝毛羽王即迎之上席時天下大旱地裂木然一人先唱能爲霜雪引氣一噴則雲起雪飛坐者皆口禁井池氷堅可琢又設狐腋素裘紫羆大褥褥是西域所獻施於臺上又一人以指彈席上而暄風入室裘褥皆弃臺下又曰魏文帝}
  - {type: variant, offset: 33, length: 0, content: '', SBCK: 臺基髙四十丈列燭置於臺下名曰燭臺逺望如列星之墜也以處美人薛靈芸焉又曰魏明帝起凌雲臺躬自掘}
  - {type: variant, offset: 33, length: 0, content: '', WYG: 臺基髙四十丈列燭置於臺名曰燭臺逺望如列星之墜地以處美人薛靈芸焉又曰魏明帝起凌雲臺躬自掘}
  - {type: variant, offset: 33, length: 0, content: '', krp: 臺基髙四十丈列燭置於臺下名曰燭臺逺望如列星之墜也以處美人薛靈芸焉又曰魏明帝起凌雲臺躬自掘}
  - {type: variant, offset: 34, length: 2, content: 堅高, SBCK: 羣臣皆負畚鍤時隂寒役者多死髙堂隆等諌之不聽累年而畢又曰魏文帝時黄星炳夜乃起畢昻臺以祀星又曰吴主潘夫人之父坐法夫人輸入織室夫人容態少儔爲江東絶色同幽者百餘人有司聞於吴主使圖其容貌夫人憂慼不食減痩改形工人冩其眞狀以進吴主吴主見圖而嘉之以琥珀如意撫桉則折嗟曰此神女也愁貌尚}
  - {type: variant, offset: 34, length: 2, content: 堅高, WYG: 羣臣皆負畚鍤時隂寒役者多死髙堂隆等諫之不聽累年而畢又曰魏文帝時黄星炳夜乃起畢昴臺以祀星又曰吳主潘夫人之父坐法夫人輸於織室夫人容態少儔為江東絶色同幽者百餘人有司聞於吳主使圖其容貌夫人憂戚不食减瘦改形工人寫其圖狀以進吳主吳主見圖而嘉之以琥珀如意撫按而嘆息曰此神女也愁貌尚}
