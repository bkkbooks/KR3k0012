  - {type: variant, offset: 3181, length: 1, content: 推, WYG: 甚悦又曰桓範黄初中為洛陽典農中郎將使持節都督青徐諸軍事治下邳與徐州刺史鄒岐爭屋引節欲斬岐為岐奏不直坐免呉書曰婁圭字子伯初依劉表後歸曹公曹公向荆州表子琮降以節迎曹公諸將皆疑曹公以問子伯子伯曰天下擾攘以貪王命以自重今以節來必至誠公善之晉書曰石苞遷徐州刺史文帝之敗於東關也苞獨全軍而返帝指所持節謂苞曰恨不以此授卿以究大}
