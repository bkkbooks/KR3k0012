  - {type: variant, offset: 2449, length: 143, content: 豹尾中晉中興書徵祥說曰海西公初即位忘設豹尾亦服妖也豹尾儀服之主大人所以豹變也西海凡庸不可以主社稷故忘其豹尾示不能終晉書曰王敦謀逆以沈充錢鳳為謀主明帝討之使充鄉人沈禎往吳興喻充以為司空曰丈夫共事終始當同寧可中道改易禎陳成敗苦勸之充不納率失臨發謂妻子曰男兒不豎豹尾約不還也齊書曰高昭劉皇后年, SBCK: 三}
