  - {type: variant, offset: 2732, length: 1, content: 一, SBCK: 左騑馬頭上金鍐者馬冠也髙廣各五寸上如三華形在馬髦前方釳者䥫也廣數寸在馬髦後有三孔垂翟尾其中繁纓在馬膺前重轂者轂外復有小轂施轄晉諸公賛曰賈后女宣華公主塟皆羽葆皷吹熊渠次飛爲鹵簿晉書曰帝自鄴還洛河間王顒將張方遣三千􅀐奉迎將渡河橋方又以新乗陽燧}
