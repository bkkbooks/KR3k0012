  - {type: variant, offset: 1486, length: 961, content: 彭權對曰秦記云國有奇怪觸山截水無不崩潰唯畏旄頭故使虎士服之衛至尊也中書令張華曰有是言而事不經臣以為壯士之怒髮踴衝冠義取於此也徐爰釋疑略曰乘與黃麾內羽林班弓箭左罼右䍐者熊皮謂之旄頭魏武表曰不悟陛下復加後命命置旄頭以比東海雲䍐徐廣車服注曰雲䍐罼䍐也司馬相如上林賦曰弋玄鵠弄干鏚載雲䍐掩群雅雅鳥張衡東京賦曰雲䍐九游闟戟膠葛潘岳籍田賦曰五輅鳴鑾九旗楊斾瓊鉞入蘂雲䍐晻藹黃鉞說文曰鉞大斧也夏執玄戈殷執白戚周左仗黃鉞字林曰鉞斧也書曰武王左仗黃鉞右秉白旄周書曰武王陳牧野既誓以馳商師大崩商辛自燔于火王斬之以黃鉞懸諸大白左傳曰楚王將戮齊慶封負之斧鉞以徇於諸侯曰無或如齊慶封殺其君弱其孤以盟其大夫封反曰無或如楚恭王之子圍殺其君之子而自立以盟諸侯漢書曰王莽使司徒王尋鎮洛陽初發長安宿霸昌廄亡其黃鉞尋士房楊素狂直乃哭曰此經所謂喪其資斧者也莽聞乃殺之吳志曰假陸遜黃鉞吳王親執鞭以見之晉公卿禮秩曰太尉賈充河間王顒梁王彤司徒王衍汝南王亮太傅楊駿東海王越義陽王望齊王修琅琊王伷東平公茍晞皆假黃鉞晉書曰石勒王彌寇京師以王衍都督征諸軍持節假黃鉞以伐之齊書曰高帝輔政王儉議加黃鉞任遐曰此大事應報禇公彥回也帝曰禇脫不與卿將何計遐曰彥回保妻子愛性命非有奇才異節遐能制之果無違異崔豹古今注曰今斧黃鉞鐵斧玄鉞三代通用之以斷斬今以黃鉞為乘輿之飾玄鉞諸公王得建之武王以黃鉞斷紂頭故王者以為戒太公以玄鉞斬妲己故婦人以為戒漢制諸公建玄鉞以太公助武王斷斬故為諸公之飾大將出征特加黃鉞者以銅為之黃金塗刃及柄不得純金也淮南子曰至精之感無所不通昔武王渡孟津而陽侯之波逆流而擊疾風晦冥武王舉黃鉞瞋目麾之曰予在天下誰敢害吾意者於是風去而波罷遂得濟又曰國有難召將詔之曰社稷之命在將軍身今國有難願子將而應之將軍受命乃令祝史太卜齋三日之太廟鑽靈龜卜吉曰以受旗鼓君入廟門西面而趍至堂下北面立王親操鉞持頭授將軍柄曰從此上至天者將軍制之又復操斧持頭授將軍其柄曰從此下至淵者將軍制之世說曰諸葛亮之次渭濱也魏明帝遣辛毗為軍司宣王既與亮對渭而陣亮設誘譎萬方宣王果大怒憤將應以重兵亮遣間謀視之還曰有一老夫毅然仗黃鉞當軍門立軍不得出亮曰此辛毗也徐爰釋疑略注曰豹尾黃鉞金鉦舊載馬車晉江左乘馬執之宋元嘉中復舊典豹尾崔豹古今注曰豹尾車周制也象君子豹變尾言謙也古軍正建之今唯乘輿焉漢書曰成帝趙昭儀方大幸每上甘泉嘗從在, SBCK: 叅乗}
  - {type: variant, offset: 1486, length: 68, content: 彭權對曰秦記云國有奇怪觸山截水無不崩潰唯畏旄頭故使虎士服之衛至尊也中書令張華曰有是言而事不經臣以為壯士之怒髮踴衝冠義取於此也徐爰釋疑略曰, WYG: 參}
