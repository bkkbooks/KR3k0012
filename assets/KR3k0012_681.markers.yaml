  - {type: variant, offset: 2963, length: 1, content: 姚, SBCK: 王郞遣諌議大夫杜威持節詣軍門上遣棨㦸迎延請入軍威稱􅀃實成帝遺體子輿也上曰設使成帝復生天下不可復得況詐子輿乎又曰建武元年杜詩爲侍御史安集洛陽時將軍蕭廣放縱兵士􅁀横民間詩勑曉不改遂格殺廣還以􅃺聞上召見賜以棨㦸復使之河東誅降逆賊楊異等漢雜事曰奉車都尉竇固征匈奴􅀐都尉秦彭副令彭別屯彭擅斬軍司馬固奏彭不由督率專賊殺人公卿議皆以爲固議是公府􅁺郞躬以爲彭得斬人上曰軍正校尉一統督將何以得專殺躬對曰一統將者謂在部曲也今彭別將軍事至急勢不得􅀜督漢制假棨㦸以當斧􅃏議者皆屈上從之呉志曰孫權拜諸葛恪撫越將軍領丹陽太守棨㦸武􅀐三百拜軍令作鼓吹導引歸家時年三十二又曰陸遜字伯言少爲孫權帳下右部督授棨㦸督㑹稽鄱陽丹陽三郡晉書曰羊祜在軍頗以畋漁廢政甞欲夜出軍司徐胤執棨當營門曰將軍都督萬里安可輕出今曰胤死此門乃開爾祜改容謝之此後稀出宋書曰王曇首領驍􅀐將軍元嘉四年車駕出北堂使三更竟開廣莫門南臺云應湏白獸幡銀字棨不肯開門尚書左丞羊玄保奏免御史丞傳隆已下曇首曰旣無異勑又闕幡棨雖稱上㫖不異單刺其不請白獸幡銀字棨致開門不時由尚書相承之失亦合糺正上特無問更立科條唐書曰龍朔中左衛大將軍范陽郡公張延師東夷都護儉弟也與兄太僕卿大師次兄儉同時三品宅中棨㦸齊列時號三㦸張家又曰徐泗節度李愿奏請換㦸有司以官㦸五年一換私家不在昜限詔以李晟忠勲之家特許之又曰吕諲爲相有司送㦸至宅諲釋􅃤服以受之時譏其失襄陽記曰李衡字叔平爲丹陽太守孫休加威逺將軍授以棨㦸荆州先賢傳曰羅獻字令則以泰始三年進位冠軍假節増鼓吹棨㦸崔豹古今注曰殳㦸前驅之器也以木爲之後世僣僞無復典刑以亦油韜之赤謂之油㦸亦曰棨㦸公主以下通之以前驅王昶謝棨表曰復假臣棨光榮照赫非臣怯弱所當荷受節􅀃文曰節信也象相合之形釋名曰節者號令賞罰之節也後漢書注曰節所以爲信以竹爲之長八尺以旄牛尾爲眊三重周禮地官下掌節曰掌守􅀖節而辯其用以輔王命􅀖節者鎭圭牙璋􅂖圭也王有命則別其節之用以授使者輔王命執以行爲信守􅀖國者用玉節守都鄙者用角節角用犀角其制未聞凢􅀖國之使節山國用虎節􅁟國用人節澤國用龍節皆金也以英蕩輔之杜子春云凾器盛此莭或曰英蕩書凾也􅀜門用符節貨賄用璽節道路用旌節皆有}
