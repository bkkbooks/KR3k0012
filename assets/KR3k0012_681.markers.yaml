  - {type: variant, offset: 3217, length: 3, content: 備於此, SBCK: 何無忌自豫章拒盧循軍敗握節受害王隠晉書曰叚疋磾降石勒常着朝服持晉節勒亦不問晉中興書曰廣州人背刺史郭訥迎王機遂入廣州訥乃持節出機就訥求節訥曰昔蘇武不失節人以爲羙今寧可以與賊乎義不可得相與自可遣兵來取之機慙而止又曰王機簒廣州懼王敦來討杜㢰在鬰林與機結好機勸㢰取交州㢰至機執節曰節當相與迭持何可獨捉機遂以節與㢰後並爲陶侃所殺晉永昌起居注曰元帝使司空王導距王敦詔曰以吾征東時節給司空晉令曰使信節皆鳥書之唐書曰頴王璬爲劒南節度大使時玄宗將幸蜀璬赴藩卒遽不遑受節或􅀃假大槊油囊􅂪之璬曰但爲眞王何用假節漢武内傳曰西王母降殿前有五十大仙童執綵旄之節俗􅀃曰殷伯弟爲何無忌叅軍在㝷陽與何共樗蒲得何百}
