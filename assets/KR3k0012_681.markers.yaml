  - {type: variant, offset: 3117, length: 5, content: 懿卜居東郊, WYG: 太僕卿大師次兄儉同時三品宅中棨㦸齊列時號三㦸張家又曰徐泗節度李愿奏請換㦸有司以官㦸五年一換私家不在易限詔以李晟忠勲特許}
  - {type: variant, offset: 3123, length: 0, content: '', WYG: 又曰吕諲為相有司送㦸至宅諲釋慘服以受之時議其失襄陽記曰李衡字叔平為丹陽太守孫休加威遠將軍授以棨㦸荆州先賢傳曰羅獻字令則以㤗始三年進位冠軍假節増鼓吹棨㦸崔豹古今注曰殳㦸前驅之器也以木為之後世僭偽無復典刑以赤油韜之謂之赤油㦸亦曰棨㦸公王以下通以之前驅王昶謝棨表曰復假臣棨光榮照赫非臣怯弱所當荷受節説文曰節信也象相合之形釋名曰節者號令賞罰之節也後漢書注節所以為信以竹為之長八尺以旄牛尾為眊三重周禮地官下掌節曰掌守邦節而辯其用以輔王命邦節者鎮圭牙璋榖圭也王有命則别其節之用以授使者輔王命執以行為信守邦國者用玉節守都鄙者用角節角用犀角其制未聞凢邦國之使節山國用虎節土國用人節澤國用龍節皆金也以英蕩輔之杜子春云凾器盛此節或曰英蕩畫凾也門關用符節貨賄用璽節道路用旌節皆有期以反命門關司門司關也貨賄者主通貨符節宫中諸詔符也璽節者今之印章也旌節者今使者所擁也凢通達於天下者必有節以傳輔之無節者有幾則不達禮記玉藻曰凢君召以三節二節以走一節以趨節所以明信輔君命也使使召臣急則持二緩則持一𫝊曰宋襄夫人襄王之姉也昭公不禮焉昭公適祖母夫人因戴氏之族華樂皇皆戴族以殺襄公之孫孔叔公孫鍾離及大司馬公子卬皆昭公黨也司馬握節以死故書以官節國之符信也握之以死示不廢命公羊𫝊哀公曰齊景公謂陳乞曰吾欲立舎何如陳乞曰君欲立請立之陽生謂陳乞曰聞子將不立我也陳乞曰夫千乗之主將廢正而立不正必殺正者吾不立子者所以生子也與之玉節而走之節信也析玉與陽生留其半為後當迎之合以為信防稱矯也景公死而舎立陳乞使人迎陽生史記曰袁盎使呉呉王囚之盎解節毛懐之遂歸報呉楚已破漢書曰劉章已殺吕産帝令謁者持節勞章章欲奪節謁者不肯章乃從與載因節信馳斬長樂衞尉吕更始因謁者所持之節用為信還入北軍復報太尉勃勃賀章曰所患獨産今已誅天下定矣又曰呉王反周丘者下邳人亡命於呉酗酒無行王薄不任周丘乃上說王曰臣以無能不得待罪行間臣非敢求有所將也願請王一漢節必有以報王乃與之周丘得節夜馳入下邳至傳舍召令斬之遂召昆弟所善豪吏一夜得三萬人又西域傳曰初公主侍者馮嫽音繚能史書習事常持節為公主使行賞賜於城郭諸國敬信之號曰馮夫人又曰蘇武使匈奴單于乃徙武北海上武仗節牧羊卧起操持節毛盡落又曰戾太子誅江充初漢節純赤以太子持赤節故更為黄毛加上以相别又曰張騫使月氏匈奴得之謂曰吾欲使越漢肯聽我乎留騫十餘嵗予妻有子然持漢節不失又曰諸葛豐字少季為司𨽻校尉刺舉無所避侍中許章以}
