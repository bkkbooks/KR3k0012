  - {type: variant, offset: 48, length: 1247, content: 服氏掌祭祀朝覲袞冕六人維王之太常禮記曰成王封周公於曲阜命魯公世世祀周公以天子之禮樂是以魯君乘大路載弧韣旂十有二旒日月之章又曰旂十有二旒龍章而設日月以象天也旂釋名曰交龍為旂旂依倚也通以一赤色為之無文采諸侯所建也爾雅曰有鈴曰旂懸鈴於竿頭盡交龍於旒也詩曰載見辟王曰求厥章龍旂陽陽又曰魯侯戾止言觀其旂其旂茷茷鸞聲噦噦周禮曰龍旂九施以象大火也傳曰藏哀伯諫曰三辰旂旗昭其明也三辰日月星也於旂旗象天之明又曰子魚曰以先王觀之則尚德也昔武王克商成王定之選建明德以藩屏周故周公相王室以尹天下所同為睦分魯公以大路大旂交龍為旂周禮同姓以封旌釋名曰折羽為旌旌精也有精光也爾雅曰注旄首曰旌載旌於竿頭也周禮曰析羽為旄凡軍士建旌旗甸亦如之凡射共獲旌歲時共更旌取舊與新禮記曰武車綏旌綏垂舒之德車結旌不盡飾結謂收歛之也左傳曰初衛宣公烝於夷姜生伋子屬諸右公子為之娶於齊而美公取之生壽及朔屬壽於左公子夷姜縊宣姜與公子朔搆伋子公使諸齊將殺之壽子告之使行不可曰棄父之命惡用子矣有無父之國則可也及行飲以酒壽子載其旌以先盜殺之伋子至曰我之求也彼何罪請殺我乎又殺之又曰楚許伯御樂伯攝叔為右以致晉師許伯曰吾聞致師者御靡旌摩壘而還又曰宋公享晉侯于楚丘請以桑林舞師題以旌夏旌夏大旌也以大旌表識其行列晉侯懼退入于房去旌卒享而還詩曰子子干旌在浚之城史記曰蘇秦說楚合從楚王曰寡人自料以楚當秦不見勝也內與群臣謀不足恃也寡人臥不安席食不甘味心搖搖然如懸旌而無所終薄今主君欲一天下收諸侯存危國寡人謹奉社稷以從斾釋名曰雜帛為斾以新色綴其邊為翅尾也將帥所建象物雜色也爾雅曰繼旐曰斾續旐未為煞尾詩曰蕭蕭馬鳴悠悠斾旌又曰織文鳥章白斾央央鳥章鳥之文章也央央鮮明皃左傳曰晉或以廣隊不能進楚人惎之脫局少進馬還又惎甚教之之拔斾投衡乃出又曰晉侯伐齊齊登巫山以望晉師晉人使司馬斥山澤之險雖所不至必斾而踈陳之使乘車者左實右偽以斾先輿曳柴而從之齊侯見之其眾也乃脫歸又曰八月辛未治兵建而不斾建立旌旗不曳其斾游也壬申復斾之諸侯畏之旟爾雅曰錯革鳥曰旟釋名曰鳥隼為旟旟舉也軍吏所建急疾走事則有稱舉矣周禮曰鳥旟七施以象鶉火也詩曰眾維魚矣旐維旟矣太人占之眾維魚矣實維豐年旐維旟矣室家溱溱旐釋名曰龜蛇為旐旐兆也龜知氣兆之吉凶建之於後察事宜之形兆也爾雅曰緇廣充幅長尋曰旐周禮曰龜虵四游以象宮室詩曰我出我車于彼郊矣設此旐矣建彼旄矣彼旟旐斯胡不斾斾斾斾旒垂皃又曰出車彭彭旂旐央央幡釋名曰幡幡也其皃旛旛然也魏志曰陶謙字恭𥘵少孤以不羈聞年十四猶綴帛為旛乘竹馬戲邑中宋書曰高祖討廬循戰于左里高祖麾之竿折幡沉于水眾咸懼高祖笑曰昔覆舟之役亦如之今勝必矣果破賊麾蔡邕月令章句曰麾鳥翼以為旌幢麾也魏志曰張遼從征袁尚於柳城卒與虜遼勸火戰氣甚奮太祖壯之自以所持麾授遼遂擊大破之斬單于蹋頓旄頭史記曰昴星曰旄頭漢書曰梁丘賀字長翁宣帝祠孝昭廟先驅旄頭劍挺墮音地首垂臿泥中挺引也劍自然引挺出也刃嚮乘輿車馬驚於是召賀筮之有兵謀不吉上還使有司侍祠是時霍氏外孫任宣坐逆謀反宣子章夜玄服入廟執戟欲為逆發覺伏誅東觀漢記曰東海王強置虎賁旄頭應劭, SBCK: 鹵簿}
