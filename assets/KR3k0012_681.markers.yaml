  - {type: variant, offset: 2722, length: 0, content: '', SBCK: 天子出車駕謂之鹵簿有大駕有小駕上所乘曰金根車駕六馬五色安車五色立車各一皆四馬是爲五時副車俗人號之曰五帝車非也又曰前驅有九旒雲罕闟㦸皮軒鑾旗車皆大夫載鑾旗者編羽毛列繫憧旁俗人名之曰鷄翹車非也後有金䤠黄􅃏黄門鼓車又曰古者諸侯貳車九乗秦㓕六國兼其服故}
