  - {type: variant, offset: 2965, length: 3, content: 次貺為, SBCK: 以反命門關司門司􅀜也貨賄者主通貨符節宫中諸官府也壐節者今之印章也旌節者今使者所權也凢通逹於天下者必有節以傳輔之無節者有幾則不逹禮記玉藻曰凢君召以三節二節以走一節以趍節所以明信輔君命也使使召臣急則持二緩則持一傳曰宋襄夫人襄王之姉也昭公不禮焉昭公適祖母夫人因戴氏之族華樂皇皆族戴以殺襄王之孫孔叔公孫鍾離及大司馬公子卬皆昭公黨也司馬握節以死故書以官節國之符信也握之以死示不廢命公羊傳哀公曰齊景公謂陳乞曰吾欲立舎何如陳乞曰君欲立請立之陽生謂陳乞曰聞子將不立我也陳乞曰夫千乗之主將廢正而立不正必殺正者吾不立子者所以生也與之玉節而走之節信也折玉與陽生留其半爲後當迎之合以信防稱矯也景公死而舎立陳乞使人迎陽生史記曰􅀽盎使呉呉王囚之盎解節毛懷之遂歸報呉楚巳破漢書曰劉章巳殺吕産帝令謁者持節勞章章欲奪節謁者不肯章廼從與載因節信持斬長樂衛尉吕更始因謁者所持之節用爲信還入北軍復報太尉勃勃賀章曰所患獨産今巳誅天下定矣又曰呉王反周丘者下邳人亡命於呉酤酒無行王薄不任周丘乃上􅀃王曰臣以無能不得待罪行間臣非敢求有所將也願請王以一漢節必有以報王廼與之周丘得節夜持入下邳至傳舎召令斬之遂召昆弟所善豪吏一夜得三萬人又西域傳曰􅀄公主侍者馮嫽音繚能史書習事常持節爲公主使行賞賜於城郭諸國敬信之號曰馮大夫又曰蘇武使匈奴單于乃徙武北海上武仗節牧羊卧起操持節毛盡落又曰戾太子誅江充􅀄漢節純赤以太子持赤節故更爲黄毛加上以相别又曰張騫使月氏匈奴得之謂曰吾欲使越漢肯聽我乎留騫十餘歲予妻有子然騫持漢節不失又曰諸葛豐字少季爲司校尉㓨舉無所避侍中許章以外屬貴幸賔客犯事與章相連豐案劾章欲奏其事適逢許侍中私出豐駐車舉節詔章曰下欲収之章馳車去豐追之許因得入宫門自歸奏於是収豐節司􅈻去節自豐始也又南越傳曰遣韓千秋入越越以兵擊千秋等滅之凾封漢節置塞上好爲慢辭謝罪又匈奴傳曰漢使王烏等窺匈奴匈奴曰漢使不去節不以黒黯其面不得入穹廬王烏北地人習胡俗去其節黯靣入穹廬單于愛之又曰王莽簒位皇孫功崇公宗􅀍誅宗姉妨爲衛將軍王興夫人祝祖姑􅀍殺婢以絶口事發覺事連及司命孔仁妻亦自殺仁見莽免冠謝莽使尚書劾仁乗乹車駕坤馬左蒼龍右白虎前朱鳥後玄武右仗威節左􅀒威斗號曰赤皇非以驕仁乃以尊新室之威命也仁擅免天文冠大不敬有詔勿劾更易新冠其恠如此荀恱漢紀曰征和二年長安擾亂言太子反任安受太子節懷二心􅆎斬續漢書曰鮑永爲更始大將將兵安集河東赤眉害更始三輔道絶世祖即位遣諌議大夫儲大伯持節徴永永疑爲不審収繫大伯封節傳舎壁中遣人持至長安知更始審亡即發䘮出降東觀漢記曰}
