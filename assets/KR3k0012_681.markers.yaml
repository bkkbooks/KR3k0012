  - {type: variant, offset: 2805, length: 3, content: 近王宮, SBCK: 果是天􅂇浚也違天不祥我不可乆與演同乃以謀告浚浚宻嚴兵夜與單于圍演演持白幡詣浚降浚遂斬之又載記曰石季龍常以女􅀐一千爲鹵簿皆着紫綸巾熟錦袴金銀鏤帶五丈織成鞾遊于戯馬觀上安詔書五色在木鳯之口鹿盧逥轉狀􅀂飛翔焉宋書曰孝武舉義兵沈慶之有功􅀄慶之甞夣引鹵簿入厠中慶之甚􅁖入厠之鄙時有善占夣者爲解之曰君必大冨貴然未在旦夕問其故荅云鹵簿故是冨貴容厠中所謂後帝也知君冨貴不在今主及中興之功自五校至是而登三事}
