  - {type: variant, offset: 3176, length: 0, content: '', WYG: 莽免冠謝莽使尚書劾仁乘乾車駕坤馬左蒼龍右白虎前朱雀後𤣥武右仗威節左負威斗號曰赤星非以驕仁乃以尊新室之威命也仁擅免天文冠大不敬有詔勿劾更易新冠其怪如此荀悦漢記曰征和二年長安擾亂言太子反任安受太子節懷二心腰斬續漢書曰鮑永為更始大將將兵安集河東赤眉害更始三輔道絶世祖即位遣諫議大夫儲大伯持節徴永疑為不審收繋大伯封節傳舎壁中遣人持至長安知更始審亡即發喪出降東觀漢記曰光武拜岑彭為刺姦大將軍督察營衆授以常所持節又曰郭丹為更始諫議大夫更始敗諸將軍悉}
