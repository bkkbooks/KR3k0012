  - {type: variant, offset: 3020, length: 3, content: 楊秉諫, SBCK: 郭丹爲更始諌議大夫更始敗諸將軍悉歸上普獲封爵丹無所歸節傳以弊布􅆞褁節合如擔晝伏夜行詣更始妻子奉還節傳因歸郷里又曰永平中遣鄭衆北使匈奴衆因上言臣前奉使不爲匈奴拜單于恚恨遣兵圍臣令復御命必見凌折臣誠不忍持大漢節對氊裘獨拜如今匈奴遂能服臣將有損大漢之強上不聽又曰温序字次房遷護羗校尉爲隗􅅝別將荀字所拘刼序素氣力大怒叱宇等曰虜何敢迫脅漢因以節撾殺數人宇曰此義士可賜以劒序受劒衘􅂡於口頋左右曰旣爲賊所迫殺無令􅂡汚地遂伏劒而死張璠漢記曰董卓謂􅀽紹曰劉氏種不足復遺紹勃然曰天下徤者豈唯董公横刀長揖徑出懸節於上東門而奔兾州獻帝春秋曰太傳司馬日磾假節循撫州郡􅀽術在壽春借節觀之因奪不還日磾失節憂恚而死魏書曰鎮北將軍劉静卒朝廷以許允代静巳受節傳丗止外舎大將軍與允書曰鎭北雖少事而都典一方念足下震華鼓建朱節歷夲州此所謂着繡晝行也允心甚恱又曰}
