  - {type: variant, offset: 3178, length: 2, content: 是盡, WYG: 歸鄉里又曰永平中遣鄭衆北使匈奴衆因上言臣前奉使不為匈奴拜單于恚恨遣兵圍臣今銜命必見凌折臣誠不忍持大漢節對氊裘獨拜如今匈奴遂能服臣將有所損大漢之强上不聽又曰温序字次房遷䕶羗校尉為隗囂别將荀宇所拘刼序素氣力大怒叱宇等曰虜何敢迫脅漢將以節撾殺數人宇曰此義士可賜以劔序受劔衘鬚於口顧左右曰既為賊所迫殺無令鬚汚血遂伏劔而死張璠漢記曰董卓謂袁紹曰劉氏種不足復遺紹勃然曰天下健者豈唯董公横刀長揖徑出懸節於上東門而奔兾州獻帝春秋曰太傅馬日磾假節循撫州郡袁術在夀春借節觀之因奪不還日磾失節憂恚而死魏書曰鎭北將軍劉靜卒朝廷以許允代靜已受節傳出止外舍大將軍與允書曰鎭北雖少事而都典一方念足下震華皷建朱節歴本州此所謂着綉晝行也允}
