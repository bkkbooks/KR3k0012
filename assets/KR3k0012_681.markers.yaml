  - {type: variant, offset: 2829, length: 2, content: 渭橋, SBCK: 兩三人以矯之常相逢華陽􅀂不知是邵謂左右曰此鹵簿甚盛必是殿下乃下牽車立於道側及邵至乃驚齊書曰虞悰遷太子右率永明八年大水百官戎服救太廟悰朱衣乗車鹵簿於宣陽門外入行馬内駈逐入􅀍奏見原又曰陳顯逹建武世心懷不安􅀷自貶退車乗朽故導從鹵簿皆用羸小梁書曰朱异起宅東陂窮采功晚曰麗来下酣飲其中毎迫曛黄慮臺門將闔乃引其鹵簿自宅至城使捉城門停留管籥又曰吕僧珎爲兖州刺史姉適于氏住市西小屋臨路與列肆雜僧珎常導從鹵簿到其宅不以爲恥南史曰王僧孺爲尚書右丞僧孺少􅀌貧與母鬻紗爲業母甞携之至市道遇中丞鹵簿驅迫墜溝及是拜日引騶清道悲感不自勝陳書曰長沙王叔堅與始興王叔陵並招聚賔客各争權寵甚不平毎朝㑹鹵簿不肯爲先後必分道而趍左右或争道而闘至}
