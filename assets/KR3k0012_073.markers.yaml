  - {type: variant, offset: 9, length: 1, content: 藪, krp: 橋水梁也榷音角水上橫木所以度也亦曰約音灼今謂之略灼東楚謂橋爲圯詩曰維鵜音題在梁不濡其翼又曰造舟維梁又曰有狐綏綏在彼淇梁爾雅曰梁莫}
  - {type: punctuation, offset: 10, content: ，, id: KR3k0012_CHANT_073-bkkpn5}
