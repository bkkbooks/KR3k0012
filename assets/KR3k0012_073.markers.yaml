  - {type: variant, offset: 30, length: 4, content: 雲夢豫州, SBCK: 韋景駿神龍中累轉肥郷令縣北界漳水連年泛溢舊堤迫近水漕雖脩築不息而漂流相継景駿審其地勢拓南數里因髙築堤􅁀水至堤南以無患水去而堤北稱􅃾田漳水舊有架柱長橋毎年修葺駿又改造爲浮橋自是無復水患至今頼焉戰國䇿曰䂊讓欲爲知伯報讎􅃮身吞炭襄子當出伏於橋下至橋馬驚曰是必䂊讓也求}
