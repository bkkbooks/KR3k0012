  - {type: variant, offset: 2721, length: 121, content: 守鄧晨使許陽典復鴻郄以陽為都水掾陽曰昔成帝夢上天天帝怒曰何故壞我濯龍池於是乃因高下形勝起塘四百餘里數年乃立續漢書郭林宗交汝南黃叔度過袁奉高不宿而去泰曰叔度之量汪汪若萬頃之陂澄之不清撓之不濁不可量望也謝承後漢書曰汝南許陽曉以術承地脈太守鄧晨署為, SBCK: ''}
