  - {type: variant, offset: 882, length: 301, content: 注曰雷夏澤名書大傳曰舜漁於雷澤鄭玄注曰雷澤今屬濟陰詩曰彼澤之陂有蒲與荷周禮曰川澤其動物宜鱗物其植物宜膏物其民黑而津又曰澤虞掌國澤之政令為之厲禁使其地之人守其財物以時入之于王府頒其餘于萬民禮曰獺祭魚然後虞人入澤梁禮記稽命徵曰王者德禮之制者澤谷中有朱鳥白玉赤虵赤龍出焉傳曰宣十五年晉侯救宋伯宗曰不可古人有言雖鞭之長不及馬腹天方受楚未可與爭雖晉之強能違天乎諺曰高下在心度時制置川澤納污受汙濁也山藪藏疾又曰衛侯出奔齊孫氏追之敗公徒于柯澤濟北東河縣西南有大澤是也又曰叔向母曰深山大澤實生龍蛇廣雅曰方澤祭地也太公金匱曰夏桀之時有芩山之水桀常以十月發民鑿山穿陵通於河民諫曰孟冬鑿山穿陵是泄天氣發藏天子失子道後必有敗桀, SBCK: 欲}
