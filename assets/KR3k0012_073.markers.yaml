  - {type: variant, offset: 1028, length: 462, content: 可古人有言雖鞭之長不及馬腹天方受楚未可與爭雖晉之強能違天乎諺曰高下在心度時制置川澤納污受汙濁也山藪藏疾又曰衛侯出奔齊孫氏追之敗公徒于柯澤濟北東河縣西南有大澤是也又曰叔向母曰深山大澤實生龍蛇廣雅曰方澤祭地也太公金匱曰夏桀之時有芩山之水桀常以十月發民鑿山穿陵通於河民諫曰孟冬鑿山穿陵是泄天氣發藏天子失子道後必有敗桀殺之朞年芩山一旦崩為天澤戰國策曰淳于髡一日見七人於齊宣王王曰千里而一士是比肩而立百世而一聖若隨踵而生淳于髡曰今求桔梗於沮澤則累世不得一矣桔梗山中之草史記曰陳餘與張耳相失餘解印綬付耳亡入澤中捕魚又曰封禪書云上效雍通回中道春至鳴澤漢書曰高祖以亭長送徒驪山徒道亡到豐西澤中停飲夜皆解縱曰公等皆去吾亦從此逝矣又曰秦皇帝常曰東南天子氣於是東游以厭當之高祖即自疑亡匿隱巖石之間呂后與人俱求常得之高祖怪而問之呂后曰季所居上常有雲氣故從往常得季高祖心喜沛中子弟或聞之多欲附者西域傳曰康居國西北二千里有奄蔡國控弦十萬臨大澤而居又曰河有兩源合東注塩澤一名昌蒲海去玉門關三百里廣輪四百里水冬夏不減皆以為潛行地下續漢書吳祐嘗牧豕於長垣澤中, WYG: 復由京口}
