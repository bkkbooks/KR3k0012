  - {type: variant, offset: 1563, length: 1, content: 海, SBCK: 上夾淮數百里皆水之所淹人謂絢曰四瀆天所以節宣其氣不可乆塞旣而昏霧霧解而堰决殺萬人其聲􅀂雷聞三百里水中恠物隨流而下或人頭魚身龍形鳥首殊􅀋詭狀不可勝名今號其處爲荆山堰今渦口東岸是後周書曰賀蘭祥太祖以涇渭漑灌之處渠堰廢毀乃命祥修造冨平堰開渠引水東注於洛功用旣畢民􅀗其利唐書張守珪爲都督􅀲州也地多沙磧不冝稼穡毎年少雨以雪水漑田至是渠堰盡爲賊所毀旣地少林木難爲修葺守珪設􅀕祈禱經􅀫而山水􅁀至大漂材木塞澗而流直至城下守珪使取充堰於是水道復舊晉後略曰張方圍京邑决千金堰水溝渠枯涸井多無泉鄴中記曰當魏文侯時西門豹爲鄴令堰引漳水激鄴以冨魏之河南後史起爲鄴令引漳水十二渠灌漑於魏田數百頃魏益豊實後廢堰田荒魏時更修通天井堰鄴城西靣漳水十八里中細流東注鄴城南二十里中作二十堰語林曰陳恊數曰輙進阮歩兵酒一壷後晉文王修九龍堰阮舉恊文王用之掘地得古承水銅龍六枚堰遂成也魏郡圖}
