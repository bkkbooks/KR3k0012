  - {type: punctuation, offset: 13, content: 《, id: KR3k0012_CHANT_073-bkkpn8}
  - {type: variant, offset: 13, length: 0, content: '', SBCK: 或曰梁石橋也石杠音江謂之􅀝音寄亦曰石橋也史記曰張良曽間從容出遊下邳圯上楚人謂橋爲圯圯音怡之有老父衣􅄄至良所直墮其履圯下頋謂良曰孺子下取良下爲取履因長跪授之父足受􅀏而去又曰文帝行出中渭橋有一人從橋下走乗輿馬驚吏􅀐捕屬之廷尉張釋之治問曰縣人來如淳曰長安縣人聞蹕匿橋下乆以爲行過即出見車􅀐即走耳廷尉奏犯蹕當罰金又曰西門豹發民鑿十二渠引水灌民田到漢丗而長吏以爲渠水且至馳道不可也遂欲合三渠爲一橋鄴人父老不肯聽長吏以爲西門君所爲賢君之法式不可更終不聽置之漢書曰薛廣德爲諌議大夫上酎􅀕宗廟出便門欲御樓舡廣德當乗輿免冠頓首曰冝從橋詔曰大夫冠廣德曰陛下不聽臣臣自刎以血汙車輪陛下不得入廟矣上不恱光禄大夫張猛進曰乗舡危就橋安上曰暁人不當如是耶乃從橋束觀漢記曰班超討焉􅂄王廣廣遣其左將比鞬友奉迎超賜而遣焉􅂄國有葦橋之險廣乃絶橋不欲令漢軍入國超更從他道渡魏略曰驢分國取大􅁗渡河橋長三百四十里又曰洛陽城西橋洛水浮橋三處三柱三公象也魏志曰鍾繇甞與族父瑜至洛陽道遇相者曰此童有貴相然當厄水行未十里渡橋馬驚墮水幾死而後至太傅又曰景元四年伐蜀鐘㑹領十餘萬衆分從斜谷入先遣牙門將許儀在前治道㑹在後行而橋穿馬足䧟於是斬儀蜀志曰先主爲曹公所追張飛距後據水断橋無敢近者吴志曰凌統字公續從征合淝爲右部都督時權徹軍還前部巳發魏將張遼等奄至津北權使追還前兵兵巳逺勢不相及也統率親近三百人扶杆權出敵巳毀橋之兩板䇿權馬駈統復還戰王隱晉書曰杜預啓建河橋于富平津衆論以爲殷}
