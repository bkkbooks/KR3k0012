  - {type: variant, offset: 2469, length: 251, content: 金谷晉石季倫別墅在焉陂說文曰陂池也書曰九川滌原九澤既陂詩曰彼澤之陂有蒲有荷陂澤也史記曰高祖母云劉媼嘗息大澤之陂夢與神遇時雷電晦冥見蛟龍於其上已而有娠遂產高祖又曰甯成抵罪得脫乃詐馳傳出關歸家稱曰仕不至二千石賈不至千萬安可比人乎乃貰貸買陂田千餘頃假貧民役數千家焉漢書曰汝南舊有鴻郄大陂郡以為饒成帝時關東數水陂溢為害翟方進為丞相以為決去陂水其地肥美省隄防之費遂奏罷之及翟氏敗後鄉里歸惡於方進言方進請陂下良田不得而奏罷陂顧野王云王莽時嘗苦旱起追怨方進童謠云壞陂誰翟子威飯我豆食美芋魁反覆陂當復誰言者兩黃鵠建武中, SBCK: ''}
