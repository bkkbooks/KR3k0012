  - {type: variant, offset: 11, length: 1, content: 澤, SBCK: 於溴梁郭璞注梁即橋}
  - {type: variant, offset: 11, length: 1, content: 澤, WYG: 夫上酎祭宗廟出便門欲御樓船廣德當乗輿免冠頓首曰宜從橋詔曰大夫冠廣德曰陛下不聽臣臣自刎以血汚車輪陛下不得入廟矣上不悅光禄大夫張猛進曰乗船危就橋安上曰曉人不當如是耶乃從橋東觀漢記曰班超討焉耆王廣遣其左將比鞬友奉迎超賜而遣焉耆見有葦橋之險廣乃絶橋不欲令漢軍入見超更從他道渡魏略曰驢分國往大秦渡海飛橋長二百三十里又曰洛陽城西橋洛水浮橋三處三柱三公象}
