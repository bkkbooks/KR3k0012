  - {type: variant, offset: 1769, length: 335, content: 出問漁者送出澤因以諫之公令記其名漁者曰公亟反國臣亦反漁所又曰楚威王問於宋玉曰先生其有遺行也何士民眾庶不譽之甚宋玉對曰鯨魚朝發崑崙之墟暮宿於孟諸夫尺澤之鯢豈能與之量江海之大哉俗之民又安知臣之所為哉風俗通曰水草交曰澤言潤萬物以阜民用水經注曰路溫舒鉅鹿縣之東里人里監門使溫舒牧羊澤中取蒱牒用寫書即北澤也又曰坳澤河水之所潛也其源渾渾泡泡者也東去玉門陽關一千三百里廣輪四百里其水澄停冬夏不減其中洄湍雷輪轉為隱輪之脈當其圜流之上飛禽舊翮於霄中者無不墜於淵波即河水之所潛而出於積石也又曰徐州豐西澤即高祖斬白虵之所又曰中牟縣圃田澤北與陽武分水澤多麻黃草故述征記曰踐縣境便覩斯卉斯卉窮則知踰界今雖不能然諒亦非謬詩所謂東有茂草也皇武子曰鄭之有原圃猶秦之有具圃澤在中牟縣西限長城東極官度北佩渠, SBCK: 立引}
