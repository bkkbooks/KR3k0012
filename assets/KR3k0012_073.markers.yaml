  - {type: variant, offset: 13, length: 0, content: '', WYG: 魏志曰鍾繇嘗與族叔瑜至洛陽道遇相者曰此童有貴相然當厄水行未十里渡橋馬驚墮水㡬死而後至太傅又曰景元四年伐蜀鍾㑹領十餘萬衆分從斜谷入先遣牙將許儀在前治道㑹在後行而橋穿馬足陷於是斬儀蜀志曰先主為曹公所追張飛拒後據水斷橋無敢近者吳志曰凌統字公績從征合淝為右部都督時權徹軍還前部已發魏將張遼等掩至津北權使追還前兵兵已遠勢不相及也統率親近三百人扶扞權出敵已毁橋之兩板䇿權馬過統復還戰王隱晉書曰杜預啓建河橋于富平津衆論以為殷}
