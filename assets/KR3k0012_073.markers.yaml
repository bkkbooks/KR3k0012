  - {type: variant, offset: 16, length: 1, content: 楊, SBCK: 昔造舟爲梁則河橋之謂也遂作橋成上從百官臨㑹舉杯勸預曰非君此橋不立也預曰非陛下之明臣亦不􅀗奉成聖制也衆咸稱善後魏書曰崔亮爲雍}
