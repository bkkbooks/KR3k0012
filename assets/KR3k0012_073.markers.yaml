  - {type: variant, offset: 651, length: 218, content: 天下澤履君子以辯上下定民志又曰澤上有地臨君子以教思無窮容保民無疆又曰山上有澤咸君子以虛受人又曰上火下澤睽君子以同而異又曰澤上有雷歸妹君子以求終知敝又曰山下有澤損君子以懲忿窒慾又曰澤上於地萃君子以除戎器戒不虞又曰澤上有水節君子以制數度議德行又曰澤中有火革君子以治曆明時又曰澤上有風中孚君子以議獄緩死又曰澤滅木大過君子以獨立不懼遁世無悶又曰澤無水困君子以致命遂志又曰象曰澤上於天夬君子以施祿及下居德則忌河圖曰大跡出雷澤華胥履之生伏犧雷澤澤也, WYG: ''}
