  - {type: variant, offset: 2843, length: 472, content: 水掾使治鴻郄陂陂成人譖陽言取錢晨系陽於獄戶自開械自解晨釋之出時日暮陂上有火光引前清德之感也魏略曰明帝出次摩陂有龍見於井中帝出觀龍因改摩陂為龍陂異苑曰東鄉太湖吳庚申歲於此有一軍士五百人將破堰取魚先以酒肉祈神約令水涸夜夢人云塘水速竭若見巨鱗慎勿殺也又有銅釜並不可發明往決水翕然而盡得白魚形狀非常小人貪利剖而治之見昨所祭餘食充溢腸內須臾復得釜又取發水便暴出五百人一時沒溺唯督監得存具說事狀于今猶名此湖為五百陂汝南先賢傳曰鄭敬去吏隱居于蟻陂之陽以魚釣自娛彈琴詠詩常方坐於陂側隨杞柳之蔭鋪茅蘼為席淮南子曰譬若同陂而溉田其受水均也孫綽子曰海人曰橫海有魚一吸萬頃之陂抱朴子曰葛仙公每酒醉常入家門前陂水中臥竟日乃出方輿記曰新蔡縣葛陂費長房化竹之所後漢於此立葛陂縣河南圖經曰洛水自苑內上陽宮南瀰浸東注當宇文隑版築之時因築斜堤今東北流水衡作堰九所形如偃月謂之月陂壽春圖經曰芍陂在安豊縣淮南子曰楚相作期思之陂灌雩婁之野又輿地志崔寔月令云孫叔敖作期思陂即此是也故漢王景為廬江太守重修起之境內豊給又桉芍陂上承渒水南自霍山縣北界騶虞石入號曰濠水是北流注陂中凡經百里灌四萬頃, SBCK: 御覽卷第七十三}
