  - {type: variant, offset: 9, length: 1, content: 藪, SBCK: 橋水梁也榷音角水上橫木所以度也亦曰約音灼今謂之略灼東楚謂橋爲圯詩曰維鵜音題在梁不濡其翼又曰造舟維梁又曰有狐綏綏在彼淇梁爾雅曰梁莫}
  - {type: variant, offset: 9, length: 1, content: 藪, WYG: 橋水梁也𣙜音角水上横木所以渡也亦曰彴音灼今之略彴東楚謂橋為圯詩曰維鵜音題在梁不濡其翼又曰造舟為梁又曰有狐綏綏在彼淇梁爾雅曰隄謂之梁郭璞注梁即橋也或曰梁石橋也石杠音江謂之猗音竒亦曰石橋也史記曰張良嘗間從容歩遊下邳圯上楚人謂橋為圯圯音怡有老父衣褐至良所直墮其履圯下顧謂良曰孺子下取良下為取履因長跪履之父足受笑而去又曰文帝出行中渭橋有一人從橋走乗輿馬驚使騎捕之屬廷尉張釋之治問曰縣人來如淳曰長安縣人聞蹕匿橋下乆以為行過既出見車騎即走耳廷奏犯蹕當罰金又曰西門豹發民鑿十二渠引河水灌民田到漢之立而長吏以為十二渠橋絶馳道相比近不可欲合渠水且至馳道合三渠為一橋鄴人父老不肯聽長吏以為西門君所為也賢君之法式不可更也長吏終聽置之漢書曰薛廣德為諫議}
