  - {type: variant, offset: 628, length: 154, content: 以朋友講習又曰澤中有雷隨君子以嚮晦入宴息又曰上天下澤履君子以辯上下定民志又曰澤上有地臨君子以教思無窮容保民無疆又曰山上有澤咸君子以虛受人又曰上火下澤睽君子以同而異又曰澤上有雷歸妹君子以求終知敝又曰山下有澤損君子以懲忿窒慾又曰澤上於地萃君子以除戎器戒不虞又曰澤上有水節君子以制數度議德行又曰澤中有火革君子以治曆, SBCK: 名東}
