  - {type: variant, offset: 2234, length: 229, content: 晉有大陸呂氏春秋云晉之大陸猶趙之鉅鹿也按隋圖經云大陸大鹿大河即一澤而異名也漢書云路溫舒取蒲於此也澤亦尚書云納于大麓是此也河南圖經曰廣成澤在梁縣西四十里後漢書云安帝永初元年以廣成遊獵地假與貧人于時馬融作廣成頌云大漢之初基也揆厥靈囿營于南郊右矕莫板切三途左枕嵩岳面據衡陽箕背王屋浸以波溠演以榮洛金山石床殷起乎中神泉側出丹水星湟池怪石浮磬混乎其陂是此澤也隋大業中置馬牧焉亦名廣陂其溉灌之利至今百生賴之輿地志曰稡澤在王城西北三十里與金谷相近又郡國志云稡澤即金谷也有金, SBCK: 􅂖}
