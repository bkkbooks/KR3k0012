  - {type: variant, offset: 1557, length: 2, content: 征舍, SBCK: 抵巉石依岸以築土合􅆃於中流十四年四月堰將合淮水漂疾輙復决潰衆㑹之或謂江淮之間多有蛟能乗風雨決壞崖岸其性􅁖䥫因是引東西二冶故䥫器大則釡鬲小則钁鋤數千萬斤沉於堰所謂不能合乃伐樹爲井幹填以巨石加土其上縁淮百里内岡陵木石無巨細必盡􅀒擔者肩背穿夏日疾疫死者相枕蠅䖟晝合是冬又寒甚淮泗盡凍士死者十七八至十五年四月堰乃成其長九里下闊百四十丈上廣四十五尺髙二十丈軍人安堵列居}
  - {type: page-break, offset: 1557, content: '', id: KR3k0012_SBCK_073-6a}
  - {type: variant, offset: 1557, length: 2, content: 征舍, WYG: 抵巉石依岸以築土合脊於中流十四年四月堰將合淮水剽疾輙復決潰衆患之或謂江淮之間多有蛟龍能乘風雨決壞崖岸其性惡鐵因是引東西二冶故鐵噐大則釜鬵小則鋘鋤數千萬斤沉於堰所仍不能合乃伐樹為井榦填以巨石加土其上縁淮百里内岡陵木石無巨細必盡負擔者肩皆穿夏日疾疫死者相枕蠅䖟晝合是冬寒甚淮泗盡凍士死者十七八至十五年四月堰乃成其長九里下濶有四十丈上廣四十五丈髙二十丈軍人列居}
