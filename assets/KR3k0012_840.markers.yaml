  - {type: variant, offset: 3836, length: 247, content: 稻稌也䆏肥尾切稻紫莖不黏者也稴稴稻不黏者也耗稻屬也徐暢祭記曰舊稑稻熟常用九月九日薦稻汜勝之書曰稻種春凍解時耕反其土種稻區不欲大大則水深淺不遍冬至後百一十日可種稻地美者用種畝四㪷俞益期牋云交趾稻再熟而草深耕重收穀薄異物志曰交趾稻夏冬又熟農者一歲再種雲南記曰雅州榮經縣土田歲輸稻米畝五㪷其穀精好每一㪷穀近得米一㪷炊之甚香滑微似糯味崔寔四民月令曰三月多種秔稻蔡邕月令曰十月穫稻九月熟者謂之半夏稻愽物志曰海陵縣扶江接海多糜獸千千為群掘食草根其處成泥名麋畯民人隨此畯種稻不耕而獲其收百倍任昉述異記曰夏禹時, SBCK: 稷爲}
