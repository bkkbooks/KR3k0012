  - {type: variant, offset: 2037, length: 1, content: 蔬, WYG: 榖實也粟之為言續也爾雅曰虋赤苖芑白苗虋赤􅆝栗也􅉮白粱粟也虋音門􅉮音起尚書仲虺之誥曰肇我邦于有夏若苖之有莠若粟之有秕毛詩曰握粟出卜自何能榖}
