  - {type: variant, offset: 4260, length: 7, content: 徐孝克所生母患, SBCK: 酈食其􅀃齊王曰漢英豪賢才皆樂爲之用諸侯之兵四靣而至蜀漢之粟方舩而下又曰公孫弘起家徒歩爲丞相故人髙賀從之食以脫粟米飯覆以布􅀍賀怨曰何用故人冨貴爲脫粟布􅀍我自有之乃退又曰主父偃諌伐匈奴曰􅁗皇使天下飛蒭輓粟起於東睡琅耶􅀒海之郡轉月北河率三十鍾而致一石又曰􅁗將王離渉河圍鉅鹿章邯軍其南築通道而輸之粟又曰神農之教曰有石城十仞湯池百歩帶甲百萬而亡粟弗能守汜勝之書又又東方朔傳曰侏儒長三尺俸一囊粟錢二百四十臣長九尺餘亦俸一囊粟錢二百四十侏儒飽}
  - {type: page-break, offset: 4260, content: '', id: KR3k0012_SBCK_840-3b}
  - {type: variant, offset: 4260, length: 7, content: 徐孝克所生母患, krp: 酈食其說齊王曰漢英豪賢才皆樂爲之用諸侯之兵四靣而至蜀漢之粟方舩而下又曰公孫弘起家徒歩爲丞相故人髙賀從之食以脫粟米飯覆以布𬒳賀怨曰何用故人冨貴爲脫粟布𬒳我自有之乃退又曰主父偃諌伐匈奴曰秦皇使天下飛蒭輓粟起於東睡琅耶負海之郡轉月北河率三十鍾而致一石又曰秦將王離渉河圍鉅鹿章邯軍其南築通道而輸之粟又曰神農之教曰有石城十仞湯池百歩帶甲百萬而亡粟弗能守汜勝之書又又東方朔傳曰侏儒長三尺俸一囊粟錢二百四十臣長九尺餘亦俸一囊粟錢二百四十侏儒飽}
