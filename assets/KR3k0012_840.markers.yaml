  - {type: variant, offset: 4080, length: 2, content: 夏禹, WYG: 光武興洛陽斗粟萬錢人死者相枕又曰馬不食粟桑扈不啄粟非亷也又曰未嘗稼穯粟滿倉未嘗桑蠶絲滿嚢得之不以道用之横横放也又曰粟得水而熟甑得火而液水中有火火中有水疾雷破石隂陽相薄自然之熱又曰闔閭伐楚五戰入郢燒髙府之粟六韜曰武王入殷發鉅橋之粟以與殷民説苑曰十粟為一分十分為一寸又黑子語禽滑釐曰今㐫年與子隋侯珠又與子一鍾粟子将何擇釐曰粟可耳亦見珠部又曰髙平王遣使者従魏文侯貸粟文侯曰須吾租收邑粟至乃得也使者曰臣初來}
  - {type: page-break, offset: 4080, content: '', id: KR3k0012_WYG_840-13a, image: WYG0900/WYG0900-0435a.png}
