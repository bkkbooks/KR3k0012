  - {type: variant, offset: 4083, length: 0, content: '', WYG: 見瀆中有魚張口謂臣曰吾窮水魚命在呼吸可得灌乎臣謂之曰待吾南見河伯之君決江淮之水灌汝口魚曰謂命在須臾及須決江淮之水比至君還必求吾於枯魚肆今髙平貧窮故遣請君貸粟乃須租收大王必求臣於死人之墓風俗通曰燕太子丹仰歎}
  - {type: variant, offset: 4084, length: 126, content: 雨稻古詩云安得天雨稻飼我天下民物理論曰稻者溉種之惣名養生要集曰秔稻屬也稻亦秔之惣名也道家方藥有用稻米秔米此則是兩物也稻米粒白如霜味苦主溫服之令人多瘦無飢膚秔米味甘主利五藏長飢膚好顏色左思魏都賦曰清流之稻清流近鄴西出御稻又吳都賦曰國秔再熟之稻鄉貢八蟲之綿, SBCK: 官}
  - {type: variant, offset: 4084, length: 0, content: '', WYG: 為}
  - {type: variant, offset: 4084, length: 126, content: 雨稻古詩云安得天雨稻飼我天下民物理論曰稻者溉種之惣名養生要集曰秔稻屬也稻亦秔之惣名也道家方藥有用稻米秔米此則是兩物也稻米粒白如霜味苦主溫服之令人多瘦無飢膚秔米味甘主利五藏長飢膚好顏色左思魏都賦曰清流之稻清流近鄴西出御稻又吳都賦曰國秔再熟之稻鄉貢八蟲之綿, krp: 官}
  - {type: variant, offset: 4085, length: 3, content: 稻古詩, WYG: 粟賈誼書曰鄒穆公有令食鳬鴈者必以秕無敢以粟於是倉無粃而求易於民二石粟得一石秕於民請曰秕食鳬鴈為無費也今求秕於二石粟而易一石秕食鴈則費甚矣請以粟食之公曰去非爾知也夫百姓胊牛而耕暴背而芸勤而不食惰者豈為鳥獸哉粟米人上食也柰何以其食養鳥且汝知小計而不知大害晁錯書曰利民欲者莫如用爵致粟矣能以粟拜爵者皆民之有餘者也汜勝之書曰欲知歳宜以布嚢盛粟等量埋於隂地述異記曰漢末大飢江淮童謠}
