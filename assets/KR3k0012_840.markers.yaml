  - {type: variant, offset: 4232, length: 7, content: 潛為彭澤令公田, SBCK: 冶斤斧破木爲耜鉏耨以墾草莽然後五榖興以助菓蓏之實史記曰武王平殷亂天下宗周伯夷叔齊恥之義不食周粟又曰宣曲任氏之先爲督道倉吏􅁗之敗豪傑皆争金玉而任氏獨害倉粟楚漢相拒滎陽民不得耕種米石至万金而豪傑金玉盡歸任氏任氏以此起冨又曰漢興七十餘年之間國家無事非遇水旱之災太倉之粟新陳相因充溢露積於外至腐敗不可食也又曰文帝徙淮南王道死民歌曰一斗粟尚可舂一尺帛尚可縫兄弟兩人不能相容又汲黯傳曰河内失火上使黯徃視之還報曰河内人或父子相食臣謹發河南倉粟以賑貧乏上賢而釋之史記曰大將軍青遂至窴顔山趙信城得匈奴積粟食軍軍留一月而還}
