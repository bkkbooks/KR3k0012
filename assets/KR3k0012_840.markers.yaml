  - {type: variant, offset: 2036, length: 0, content: '', WYG: 稷為太官盧毓冀州論曰貞定好稷地産不為無珎也粟歸藏曰剥良人得其玉小人得其粟河圖讖徴曰蒼帝起天雨粟也説文曰粟}
