  - {type: variant, offset: 4737, length: 1, content: 稻, SBCK: 武帝建元四年天雨粟宣帝地節三年長安雨黒粟元帝竟寕元年南陽山郡縣雨粟色青黑味苦大者如豆小者如麻子赤黄味如麥建􅀄二年九江壽春雨粟光武建武二十年清河廣川雨粟大如莧實色黒吴氏夲草曰陳粟神農黄帝苦無毒治痺􅀬渴粟養腎氣杜寳大業拾遺録曰吏部侍郎楊㳟仁欲改葬學士舒綽曰此所擬}
