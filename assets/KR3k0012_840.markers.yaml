  - {type: variant, offset: 3173, length: 3, content: 孟元陽, WYG: 偉朏字尊顯少有志業年十八辟州主簿時屬歳儉胐以家粟造粥以飼飢人所活甚衆後周書曰王羆}
  - {type: variant, offset: 3177, length: 3, content: 曲環軍, WYG: 華州刺史時闗}
  - {type: variant, offset: 3182, length: 0, content: '', WYG: 飢徴稅民間榖食以供軍費或隱匿者令逓相吿多被鞭棰以是人有逃散惟羆信著於人莫有隠者得粟不少唐書曰始平人宗士眺負粟一石委於太倉而去云願少益軍國髙祖嘉之賚布百叚晉史曰髙祖性嚴而難犯事多親决嘗有店婦與軍士懇訴無以自明帝因鞫吏曰雖屬官吾可市而代之兩訟未分何以為斷可殺馬刳腸視其粟有則軍士誅無則婦人死遂殺馬馬腸無粟因戮其婦境内肅然莫敢以欺漢實録曰王周性寛恕不忤物情初刺信都州城西橋敗覆民租車周曰橋梁不飾予之過也乃還其所沉粟出私財以修之孔叢子曰子思居貧其友有餽之粟者受二車焉或獻罇酒束修子思曰為費而無當也或曰子取人粟而辭酒是辭少而受多也於義則無名於分則不全行之何也子思曰然伋不幸而貧於財至及困乏}
  - {type: page-break, offset: 3182, content: '', id: KR3k0012_WYG_840-7b, image: WYG0900/WYG0900-0431b.png}
  - {type: page-break, offset: 3182, content: '', id: KR3k0012_WYG_840-8a, image: WYG0900/WYG0900-0432a.png}
