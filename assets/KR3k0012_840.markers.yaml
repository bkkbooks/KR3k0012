  - {type: variant, offset: 4739, length: 1, content: 黏, SBCK: 處掘深五尺之外亦有五穀􅀂得一榖即是福德之地公侯丗丗不絶恭仁即將綽向京令人掘深七尺得一穴如五石甕大有粟七八斗此地經爲粟田蟻運粟下於此穴當時朝野之士以綽爲聖任昉􅄒異記曰光武興洛陽斗粟万錢人死}
