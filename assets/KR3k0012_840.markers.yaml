  - {type: variant, offset: 2219, length: 129, content: 劉敞拜廬江都尉歲餘遭旱行縣人持稻皆枯吏強責租敞應曰太守事也載枯稻至太守所酒數行以語太守太守曰無有敞以枯稻示之太守曰都尉事也敞怒叱太守曰鼠何敢爾也後漢書曰鄧晨為汝南太守興鴻郄陂數千頃田鴻郄陂名今在豫州汝南縣東成帝時開東水陂溢為害翟方進為丞相奏罷水陂江表傳曰孫亮, SBCK: 稷}
  - {type: variant, offset: 2219, length: 8, content: 劉敞拜廬江都尉歲, WYG: 武平殷亂天下宗周伯夷叔齊恥之義不食周粟又曰宣曲任氏之先為督道倉吏秦之敗豪傑皆爭金玉而任氏獨窖倉粟楚漢相拒滎陽民不得耕種米石至萬金而豪傑金玉盡歸任氏任氏以此起富又曰漢興七十}
