  - {type: variant, offset: 4569, length: 5, content: 江表唯長沙, SBCK: 始平人宗士眺􅀒粟一石委於大倉而去云願少益軍國髙祖嘉之賚物百段晉史曰髙祖明而難犯事多親决甞有店婦與軍士墾訴無以自明帝爲鞠吏曰雖屬官吾可市而代之兩訟未分何以爲断可殺馬刳膓而視其粟有則軍士誅無則婦人死遂殺馬馬膓無粟因戮其婦境内肅然莫敢以欺漢實録曰王周性寛恕不忤物情􅀄刺信都州城西橋敗覆民租車周曰橋梁不飾子之過也乃還其所沉粟出私財以修之孔叢子曰子思居貧其友饋之粟者受二車焉或獻樽酒束脩子思曰爲費而無當也或曰子取人粟而辭酒是辭少而受多也於義則無}
