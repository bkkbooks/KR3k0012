  - {type: variant, offset: 675, length: 1348, content: 三穗禾茂跳取之得其中穗輒復失之屋之大者古通呼為殿也極殿梁也三輔間謂屋梁為極以問主簿郭賀賀離席慶曰大殿者官府形象也極而有禾人臣之上祿也取中穗是中台之位也於字禾失為秩曰失之所以得祿秩也袞職有闕君其補之旬月而茂微焉吳志曰赤烏七年宛陵言嘉禾生會稽始平言嘉禾生改年為嘉禾晉書曰庾袞居貧禾熟穫者已畢而採捃尚多袞乃引其群子以退曰待其間及其捃也不曲行不旁掇跪而把之則亦大獲又與邑人入山拾橡分夷險序長幼推易居難禮無違者臧榮緒晉書曰朱冲字巨容躬植禾藝蔬鄰牛侵犯持蒭送牛而無恨色晉起居注曰武帝世嘉禾三生其七莖同穗晉中興徵祥說曰王者德盛則嘉禾生嘉禾仁卉也義熙十三年鞏縣民宋曜於田中獲嘉禾九穗同本九穗九州是時羌平六合寧後魏書曰許謙字元遜代人也子洛陽為鴈門太守家田三生嘉禾皆異壟合穎世祖善之進爵北地公也北史曰趙肅授原州揔管司馬在道夜行其左右馬逸入田中暴人禾輒駐馬待明訪禾主酬直而去唐書曰朔方節度郭子儀言寧朔縣界荒地廣十五里有黑禾穀出遍地每日側近百姓掃盡經宿還生前後可得五六千石其禾圓實味甘美臣以為天啟興王先瑞百穀故漢稱雨粟周頌來麰豈若瑞禾自出家給人足蓋陛下富教安人務農敦本光復社稷康濟黎元之應也又曰代宗為皇太子乾元初上降誕豫州奏百姓李氏有嘉禾生及是冊禮特詔改名豫又曰永泰元年秋京兆府上言鄠縣嘉禾生穗長一尺餘穗上粒重疊如連珠又曰馬燧大曆四年為懷州刺史乘兵亂後其夏大旱人失耕種燧乃務教化將吏有父母者燧輒造之施敬收瘞暴骨去其煩苛至秋田中生穭禾人頗便之穭音呂禾再生也又曰元和中東川觀察使潘孟陽上言龍州武安川中嘉禾生有麟食之復生麟之來一鹿引之群鹿隨焉光華不可正視畫工就圖之并嘉禾一函以獻淮南子曰后稷辟土墾草以為百姓力農然而不能使禾冬生又曰洛水輕利而宜禾又曰夫子見禾之三變夫子孔子也三變始於粟粟生於苗苗成於穗也滔滔然曰狐鄉丘而死我其首禾乎禾穗垂而向根君子不忘本也呂氏春秋曰飯之美也玄山之禾山海經曰崑崙墟上有禾禾長五尋郭璞注曰木禾穀穎也白虎通曰德至於地則嘉禾生嘉禾者大禾也說文曰禾嘉穀也二月始生八月而熟得時之中故謂之禾木也木王而生金王而死稹早種也頴禾末也穀禾皮也稈禾莖也藁稈也會稽典錄曰沈勳身自耕耘以供衣食人有盜穫其禾勳見而避之明日更收拾送致其家盜者愧懼齋還不受六韜曰人主好田獵則歲多大風禾穀不實鄭玄別傳曰玄年十六號曰神童民有獻嘉禾者欲表府文辭鄙略玄為改作又著頌一篇侯相高其才為修寇禮杜寶大業拾遺錄曰七年九月太原郡有獻禾一本三穗長八尺穗長三尺五寸大尺圍芒穗皆紫色鮮明受自禾已上二尺餘亦紫色有老人年八十餘以素木匣盛之賜物三十叚板授嘉禾縣令續搜神記曰盧陵巴丘人文晃者世以田作為業秋牧以過穫刈都畢明旦至田禾悉復滿湛然如生即更穫所穫盈倉而巨富廣五行記曰東魏孝靜帝天保初四月禾夜生於帝銅硯中及明而長數寸有穗其年帝為高洋所幽遇鴆而崩古今注曰和帝元年嘉禾生濟陰城陽一莖九穗安帝延光三年嘉禾生九真百五十六本一百六十八穗汜勝之書曰種禾無期因地為時三月榆莢雨時高地強土可種禾薄田不能糞者以原蠶矢雜禾種之則禾不崔寔四民月令曰三月二月可種稹米夢書曰禾稼為財用之所夢見禾稼言財氣生廣志曰渠和蔓生實如葵子米粉白如面可為饘粥牛食之肥六月種九月熟感禾扶䟽生實似大麥楊禾似藋粒細也折右炊停即牙生此中國巴禾木稷也火禾高丈餘子如小豆出粟特國稻周禮夏官職方氏曰楊州宜稻青州宜稻麥, SBCK: 秬}
