  - {type: variant, offset: 2601, length: 996, content: 不交世事唯以漁釣射獵為娛貧無業欲墾荒田先立表題經年無主然後乃作稻將熟有認之者悉與之縣令聞而詰之以稻還翻翻遂不受又曰袁甫嘗詣何勗自言能為劇縣勗曰唯欲宰縣不為臺閣職何也甫曰人各有能有不能譬繒中之好莫過錦錦不可以為縚音滔穀中之美莫過稻稻不可以為糜是以聖王使人必先以器茍非周材何能悉長黃霸馳名於州郡而息譽於京邑廷尉之材不為三公自昔然也勗善之除松滋令宋書曰顧歡好學年六七歲家貧父使田中驅雀歡作黃雀賦而歸雀食稻過半父怒欲撻之見賦乃止齊書曰范雲嘗從文惠太子幸東田觀穫稻文惠顧謂雲曰刈此甚快雲曰三時之務亦甚勤勞願殿下知稼穡之艱難無徇一朝之宴逸也文惠改容謝之南史曰孔琇之有吏能仕齊為吳令有小兒年十歲偷刈鄰家稻一束琇之付獄案罪或諫之琇之曰十歲便為盜長大何所不為縣中皆震肅梁書曰鄧元起嘗至其西沮田舍有沙門造之乞於元起有稻幾二千斛悉以施之時人稱其有大度又曰陳伯之濟陰睢陵人也年十三四好著獺皮冠帶刺刀候鄰里稻熟輒偷刈之嘗為田主所見呵之曰楚子莫動伯之曰君稻幸多取一檐何若田主將執之因援刀而進曰楚子定何如田主皆反走徐擔稻而歸隋書曰梁陳五壇祭法以三牲首餘以骨體薦粢盛為六飯粳以敦音堆稻以牟黃梁以簠白粱以簋黍以瑚粢以璉又曰齊孝昭皇建中平州刺史稽曄建議開幽州督元舊陂長城左右營屯歲收稻粟數十萬石比境得以周贍唐書曰開元十九年楊州奏穭生稻二百一十五頃再熟稻一千八百頃其粒與常稻無異又曰孟元陽為曲環軍中大將環使董作西華屯元陽盛夏芒履立稻田中須役者退而後就舍故其田歲無不稔軍中足食淮南子曰江水肥而宜稻又曰今稻生於水而不能生於湍瀨之流又曰離先稻熟而農夫耨之稻米隨而生者為離與稻相似耨之為其少實也不以小利傷大獲也戰國策曰東周欲為稻西周不下水東周患之蘇子往見西周之君曰君之謀過矣今不下水所以富東周也今其民皆種麥無他種矣君若欲害之不若一為下水以病其所種下水東周必以種稻而復奪之若是則東周之民可令一仰西周受命於君矣國語曰越敗吳王孫雄請和范蠡不聽雄曰范子先有言無助天為虐助天為虐不祥今吾稻蟹不遺種子將助天為虐乎呂氏春秋曰得時之稻大本而莖葆長秱䟽穖穗如馬尾大粒無芒搏米而薄糠舂之易而食之香如此者不䔉益息也先時者大本而莖葉格對對等短秱短穗多粃厚糠薄米多芒後時者纖莖而不滋厚糠多粃辟米不得待定熟仰天而死又曰史起為鄴令民大被其利相與歌之曰鄴有聖令為史公決漳水兮灌鄴旁終古斥鹵兮生稻粱吳越春秋曰越王勾踐復興師伐吳吳王敗晝夜馳走三日飢顧見生稻而取食之抱朴子曰南, SBCK: 山}
