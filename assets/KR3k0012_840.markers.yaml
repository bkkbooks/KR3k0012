  - {type: variant, offset: 3, length: 139, content: 三禾尚書微子之命曰唐叔得禾異畝同潁獻諸天子王命唐叔歸周公于東作歸禾又金縢曰周公居東秋大熟未穫天大雷電以風禾則盡偃王啟金縢得周公代武王之說王出郊天乃反風禾盡起尚書大傳曰成王時有苗異莖而生同為一穟大幾盈車長充箱人有上之者王召周公而問之公曰三苗為一穟抑天下其和為一乎果有越裳氏重譯而來, SBCK: 四稷粟稷}
