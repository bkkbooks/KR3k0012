  - {type: 'tls:seg', offset: 3183, content: '', id: KR3k0012_CHANT_840-49a.4}
  - {type: variant, offset: 3183, length: 1, content: 環, WYG: 絶先人之祀夫所以受粟為周乏也酒脯則所以飲讌也方乏於食而乃飲讌非義也吾豈以為介哉度義而行之又曰季桓子以粟十鍾餼夫子夫子受而班門人之無者子貢曰季孫以夫子貧故致粟今而施人無乃乖彼意乎子曰吾受而不辭為季孫之恵受而不為富恵於一人豈若數百人哉管子曰桓公觀於野曰何物可比君子之徳隰朋曰粟可比君子之徳管仲曰苖始出生也昫昫乎音句似孺子安之則安不得則危故命之曰禾可比君子桓公曰善晏子春秋曰北郭騷見晏子曰願託所以養母晏子分倉粟府金以遺之辭金受粟晏子見疑出奔北郭子遂造公庭曰晏子天下賢人去齊敵必來侵臣見國之侵不若死請以頭白晏子因自殺景公聞大駭自造晏子又曰寸之管無當天下不能足粟今齊國丈夫耕女子織夜以按日不足以奉上而君側雕文刻鏤之觀此無當之管也曾子曰曽子魯君饋之粟辭不受}
  - {type: page-break, offset: 3183, content: '', id: KR3k0012_WYG_840-8b, image: WYG0900/WYG0900-0432b.png}
  - {type: page-break, offset: 3183, content: '', id: KR3k0012_WYG_840-9a, image: WYG0900/WYG0900-0433a.png}
  - {type: variant, offset: 3185, length: 1, content: 董, WYG: 者曰子無求於人人自致之曰與人者驕人受人者畏人縦子不以是驕我我能無畏乎與其富而畏人不若貧而無屈墨子曰世俗之君子視義士不若視負粟者今有人於此負粟息於路側欲起而不能君子見之無長少貴賤必起之何重故也今為義之君子奉承先王之道以語之縦不説而行又従而非毁之則是世俗之君子視義士不若視負粟者莊子曰周家貧貸粟於監河侯侯曰待我得邑金將貸子周}
  - {type: page-break, offset: 3185, content: '', id: KR3k0012_WYG_840-9b, image: WYG0900/WYG0900-0433b.png}
  - {type: variant, offset: 3187, length: 0, content: '', WYG: 色曰周昨来有呼周者視轍中有一鮒魚曰我東海之波臣也君豈有升斗水活我哉周曰諾我且南遊吳越激}
  - {type: page-break, offset: 3187, content: '', id: KR3k0012_WYG_840-10a, image: WYG0900/WYG0900-0433c.png}
  - {type: variant, offset: 3188, length: 3, content: 華屯元, WYG: 江之水迎子可乎鮒魚曰不如早索我於枯魚之肆吕氏春秋伍子胥諫呉王曰非呉䘮越越必䘮呉今將輸之粟是吾讐而豢吾仇乎又曰飯之美者𤣥山之禾不周之粟不周山在崑崙山}
