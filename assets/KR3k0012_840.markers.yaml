  - {type: variant, offset: 155, length: 435, content: 易治也長畝竟畝也禮記檀弓下曰季子皋葬其妻犯人之禾申祥以告曰請庚之子皋曰孟氏不以是罪子朋友不以是棄予以吾為邑長於斯也買道而葬後難繼也左傳隱公曰夏四月鄭祭足帥師取溫之麥溫周地蘇氏邑也秋又取成周之禾春秋運斗樞曰旋星明則嘉禾液春秋感精符曰日下論於地則嘉禾興春秋說題辭曰天文以七列精以五故嘉禾之滋莖長五尺五七三十五神盛故連莖三十五穗以成盛德禾之極也又曰禾者御滋液御滋液以生故以和軟為名也孝經援神契曰德下至地則嘉禾生春秋繁露曰禾實於野粟缺於倉皆奇怪非人所意乎此可畏也史記封禪書曰管仲說桓公曰古之封禪北里禾所以為盛蘇林注曰北里地名漢書曰武帝外事四夷四民去本董仲舒說上曰春秋他穀不書至於麥禾不成則書之以見聖人於五穀最重麥與禾又郊祀志曰王莽篡位興神仙事種五梁禾於殿中各順其色置其方面煮二十餘物漬種計粟斛成一金言此黃帝穀仙之術又曰莽使中郎平憲誘羗還云天下太平一禾長丈餘故乞內屬續漢書曰承宮字少子瑯耶人嘗在蒙陰山中耕種禾忝臨熟人認之宮便推與而去由是發名也東觀漢記曰光武以建平元年生於濟陽縣是歲, SBCK: 稷}
