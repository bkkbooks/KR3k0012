  - {type: variant, offset: 4726, length: 3, content: 黃墳宜, SBCK: 桓公觀於野曰何物可比君子之德隰朋曰粟可比君子之德管仲曰苗始岀生也㫬㫬音㫬乎以孺子安之則安不得則危故命之曰禾此可比君子桓公曰善晏子春秋曰北郭騷見晏子曰願託所以養母晏子分倉粟府金以遺之辭金受粟晏子見疑出奔北郭子遂造公庭曰晏子天下賢人去齊敵必來侵臣見國之侵不若死請以頭白晏子因自殺景公聞大駭自追晏子又曰寸之管無當天下不能足粟今齊國丈夫耕女子織夜以接日不足以奉上而君側雕文刻鏤之觀此無當之管也曽子曰曽子魯君饋之粟辭不受使者曰子無求於人人自致之曰與人者驕人受人者畏人縱子不以是驕我我能無畏乎與冨而畏人不􅀂貧而無屈墨子曰丗俗之君子視義士不􅀂視負粟者今有人於此負粟息於路側欲起而不能君子見之無長少貴賤必起之何重故也今爲義之君子奉承先王之道以語之縱不􅀃而行又從而非毀之則是丗俗之君子視義士不􅀂視負粟者莊子曰周家貧貸粟於監河侯侯曰待我得邑金將貸子周作色曰周昨來有呼周者視轍中有一鮒魚曰我東海之波臣也君豈有斗􅂛水活我哉周曰諾我且南遊呉越激西江之水迎子可乎鮒魚曰不如早索我於枯魚之肆吕氏春秋伍子胥諌吴王曰非吴䘮越越必䘮吴今將輸之粟是長吾讎而劵吾仇也又曰飯之美者􅀇山之禾不周之粟不周山在崑崙山北陽山之穄南海之秬崑崙之南故曰陽山穄関西爲之麋秬黒􅁰也啇君書曰金一兩生於境内粟十二石死於境外粟十二石生於境内金一兩死於境外國好生金於境内則金粟兩死倉府兩虚國弱好生粟於境内金粟兩生倉府兩實國強荀卿子曰仁義禮善之於人也譬之若貨財粟米之於家也多有之者冨少有之者貧至無有者窮淮南子曰䰞棺者欲民之疾疫畜粟者欲歳之飢荒也又曰黄帝治天下力牧太山稽輔之狗􅇾吐菽粟於道路而無分争之心又曰昔者蒼頡作書而天雨粟髙誘注曰蒼頡始視鳥跡之文而造書者也有書契則詐僞萌生去本走未弃耕作之業也務錐刀之利天知其將餓故雨粟也又曰量粟而舂數米而炊可以治家而不可以治國又曰馬不食脂桑扈不啄粟非廉也又曰未甞稼穡粟滿倉未甞桑虫絲滿囊得之不以道用之横横放也又曰粟得水而􅀬甑得火而液水中有火火中有水疾雷破石隂陽相薄自然之熱又曰闔盧伐楚五戰入郢燒髙府之粟六韜曰武王入殷發鉅橋之粟以與殷民􅀃苑曰十粟爲一分十分爲一寸又曰墨語禽滑􅁵曰今凶年與子隋侯珠又與子一鍾粟子將何擇􅈊曰粟可耳亦具珠部又曰髙平王遣使者從魏文侯貸粟文侯曰湏吾租収邑粟至乃得也使者曰臣􅀄來時見瀆中有魚張口謂臣曰吾窮水魚命在呼吸可得􅈅乎臣謂之曰待吾南見河堤之君决江河之水灌汝口魚曰謂命在湏􅁷乃湏決江淮之水比至君還必求吾於枯魚肆今髙平貧窮故遣從君貸速乃湏租收大王必求臣於死人之墓風俗通曰燕太子丹仰歎天爲雨粟賈􅁩書曰鄒穆公有令食鳬鴈者必以秕無敢以粟於是倉無秕而求易於民二石粟得一石秕民請曰秕食鳬鴈爲無費也今求秕於二石粟而易一石粃食鳬鴈則費甚矣請以粟食之穆公􅒘去非尔所知也夫百姓朐牛而耕􅁀背而芸勤而不敢隋者豈謂鳥獸哉粟米人之食也柰何以其食養鳥且汝知小計而不知大害晁錯書曰利民欲者莫如用爵致粟能以粟拜爵者皆民之有余者也汜勝之書曰欲知􅀊冝以布囊盛粟等量埋於隂地冬至後取量㝡多者多種之桓階別傳曰階爲趙郡太守路有遺粟一囊耕者得之舉以繫樹數日其主聞還取之桂陽先賢􅀞讃曰成子郴中人能逹鳥鳴爲郡主簿與衆人俱坐聞雀鳴而􅀏曰東市輦粟車覆雀相呼徃食之衆人遣視信然益部􅂄旧又載王子年拾遺記曰東極之東有龍枝之粟言其枝屈曲游龍食之善走又有鳯冠粟似鳯之冠食者令人多力有雲渠粟叢生葉似扶蕖食之益顔色粟莖赤黄皆長二丈千株叢生博物志曰鴈食粟則翼垂不能飛鄒子曰董仲舒三年不闚園甞乗馬不覺牝牡朱買臣貧賤之時孳孳脩藝不知雨之流粟志在經傳也京房易祅占曰天雨粟不肖者食禄與三公易位天雨稻}
