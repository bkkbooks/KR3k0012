  - {type: variant, offset: 4228, length: 0, content: '', SBCK: 粟之爲言續也爾雅曰虋赤苗芭白苗虋赤􅆝粟也􅉮白􅆝粟也虋音門􅉮音起尚書仲虺之誥曰肇我􅀖于有夏􅀂苗之有莠􅀂粟之有粃孔安囯注曰始我啇家囯於夏世欲見剪除若莠生苗粃在粟恐被鋤治傷之也毛詩曰握粟岀卜自何能榖又小宛曰交交桑扈率􅂣啄粟周禮地官下曰倉人掌粟入之藏鄭玄注曰九榖盡藏以粟爲主禮記曲禮上曰獻粟者執右契契劵要古尊也禮記􅀕法曰父母旣殁必求仁者之粟以祀之謂禮終左傳僖上曰冬􅀳荐饑乞糴于秦􅁗輸粟于􅀳自雍及絳相繼命之曰汎舟之役又襄元曰季文子卒大夫入歛無衣帛之妾無食粟之馬又襄六曰鄭子皮即位於是鄭飢而未及麥民病子皮以子展之命餼國人粟户一鍾又昭六曰夏㑹于黄父謀王室也王室有子朝乱謀定之也趙簡子令諸侯之大夫輸王粟春秋佐􅂇期曰粟神名許給姓慶天又􅀃題辞曰髙而平者爲原平者和故冝粟又曰粟助陽扶性粟之爲言續也粟五變一變而以陽生爲苗二變而秀爲禾三變而粲然謂之粟四變入臼米岀甲五變而蒸飯可食}
  - {type: page-break, offset: 4228, content: '', id: KR3k0012_SBCK_840-2a}
  - {type: variant, offset: 4228, length: 0, content: '', WYG: 帝有慙色又曰}
  - {type: variant, offset: 4228, length: 0, content: '', krp: 粟之爲言續也爾雅曰虋赤苗芭白苗虋赤粱粟也芭白粱粟也虋音門芭音起尚書仲虺之誥曰肇我邦于有夏若苗之有莠若粟之有粃孔安囯注曰始我啇家囯於夏世欲見剪除若莠生苗粃在粟恐被鋤治傷之也毛詩曰握粟岀卜自何能榖又小宛曰交交桑扈率埸啄粟周禮地官下曰倉人掌粟入之藏鄭玄注曰九榖盡藏以粟爲主禮記曲禮上曰獻粟者執右契契劵要古尊也禮記祭法曰父母旣殁必求仁者之粟以祀之謂禮終左傳僖上曰冬晉荐饑乞糴于秦秦輸粟于晉自雍及絳相繼命之曰汎舟之役又襄元曰季文子卒大夫入歛無衣帛之妾無食粟之馬又襄六曰鄭子皮即位於是鄭飢而未及麥民病子皮以子展之命餼國人粟户一鍾又昭六曰夏㑹于黄父謀王室也王室有子朝乱謀定之也趙簡子令諸侯之大夫輸王粟春秋佐助期曰粟神名許給姓慶天又說題辞曰髙而平者爲原平者和故冝粟又曰粟助陽扶性粟之爲言續也粟五變一變而以陽生爲苗二變而秀爲禾三變而粲然謂之粟四變入臼米岀甲五變而蒸飯可食}
  - {type: variant, offset: 4229, length: 0, content: '', SBCK: 均注曰粟受五行氣而五变故乃成可食陽以一立爲法故粟積大一分穗長一尺文以七烈精以五立故其字粟爲粟西者金所立米者陽精故西字合米而爲粟宋芍注曰續爲續陽生長也受五行氣故有変春秋潜潭巴曰天雨粟無德者興有德者不禄小人進大臣辱公羊傳僖上曰秋齊侯宋公江人黄人㑹於陽榖桓公無障谷無貯粟何休注曰有無相通榖梁傳莊公曰諸侯無粟諸侯相歸粟正也論語雍也曰子華使於齊冉有爲其母請粟子曰與之釡請益曰與之􅁃原思爲之宰與之粟九百辤子曰無以與尓隣里郷黨乎周}
  - {type: page-break, offset: 4229, content: '', id: KR3k0012_SBCK_840-2b}
  - {type: variant, offset: 4229, length: 49, content: 書曰陶潛為彭澤令公田悉令吏種秫妻子固請種粳乃使五十畝種粳陳書曰徐孝克所生母患欲粳米為粥不能常辦母亡, WYG: 髙祖之初當晉末飢饉之}
