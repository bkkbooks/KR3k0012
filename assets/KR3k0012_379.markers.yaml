  - {type: variant, offset: 3931, length: 518, content: 餘年後子脩為曹操所殺操見彪問曰公何瘦甚對曰愧無日磾先見之明猶懷老牛舐犢之愛操為之改容獻帝春秋曰司空攻呂布於下邳呂布登西北白樓上城陷士擒以詣司空布曰明公何瘦司空曰所以瘦不早相得故耳司空曹操也三輔決錄注曰張氏得鉤何氏得筭故三輔舊語曰何氏筭張氏鉤何氏肥張氏瘦言何氏有肥人輒貴瘦人輒賤張氏瘦者輒貴肥者輒賤故二族以鉤筭知吉凶以肥瘦知貴賤文子曰神農形顇堯瘦將欲利萬人也韓子曰宓子賤治單父有子見之曰何瘁也曰官事急憂之故臞有子曰昔舜鼓五絃之琴歌南風之詩而天下治今單父細治之而憂治天下將奈何故無術御之雖瘁臞未有益也世說曰鄧竟陵免官後赴山陵過見大司馬桓公問曰卿何以更瘦徐廣晉記曰鄧遐勇力絕人氣蓋當世人方樊噲為桓溫參軍數從征伐為冠軍將軍竟陵太守枋頭之伇溫既懷恥忽且忌憚遐因免遐官遐曰有愧於叔達不能不恨恨於破甑述異記曰甄法崇永初中為江陵令在任嚴明于時南平僇士為江安令喪官至其年末崇在廳事上忽見一人從門入云僇江安通法崇法崇知士已亡因問卿貌何故瘦荅曰我生時所行善不補惡今繫苦役窮劇理盡魏明帝手詔曹植曰王顏色瘦弱何意耶腹中調和不今者食幾許米又啖肉多少見王瘦吾甚驚宜當節水加飡荅詔表曰近得賜御食拜表謝恩尋奉手詔愍臣瘦弱奉詔之日泣涕橫流錐武文二帝所以愍憐於臣不復過於明詔, SBCK: 九}
