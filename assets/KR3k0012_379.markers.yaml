  - {type: variant, offset: 2553, length: 1, content: 援, WYG: 衆寡將卒名字具識之所問咸對身長八尺儀貌都雅權悦曰吾久不見公禮又曰吕範字子衡汝南人有容冠姿貌邑人劉氏家富女美範求之母嫌欲勿與範親劉氏曰觀吕子衡寜當久貧者耶遂與之婚又曰孫桓儀容端正聰明愽學能論議應對孫權常稱為宗室顔淵又曰張純少厲操行學愽才秀切問㨗對容止可觀官拜郎中晋書曰裴楷字叔則為吏部侍郎風神髙邁容儀俊爽愽渉羣書特精義理時人謂之玉人又曰尚書閔鴻見陸雲竒之此兒若非龍駒則是鳯雛又曰潘岳字安仁滎陽中年人才名冠世出為河陽令有異政累遷給事中美姿儀少時常挾琴出洛陽羣嫗相遇者悉連手縈遶以果擲之盈車而歸又曰王恭字伯李累遷為青兖二州刺史美姿儀人或多目之歎曰神仙中人又曰衛玠字叔寳河東安邑人也齠齔年乗白羊車入市見者咸曰誰家璧人遂號為璧人王武子玠之舅也甞與同逰語人曰昨比與我外甥並坐若珠玉在側朗然映人覺我形穢及長好言𤣥理武子每聞玠言歎息絶倒故時人語曰衛玠談道武子絶倒玠妻父樂廣有重名議者以為婦公氷清女壻玉潤為太子洗馬以國亂至江夏玠亡其妻征南將軍山簡以女妻之至豫章大將軍王敦謂長史謝鯤曰昔王輔吐金聲扵中朝此子復玉振於江表}
