  - {type: variant, offset: 3709, length: 221, content: 年曰楚子使薳子馮為令尹訪於申叔豫豫曰國多寵王弱不可為也遂以疾辭方暑闕地下冰大夫孝疾受水而床焉重蠒衣裘禮記玉藻曰纊為蠒縕為袍也鮮食寢楚子使醫視之復曰瘠則甚矣血氣未動乃使子南為令尹漢書曰張湯子安世女孫敬為霍氏外屬婦霍氏反當相坐安世瘦臞形於顏色宣帝赦敬以慰其意東觀漢記曰和熹鄧后自遭大憂及新野君仍喪諸兄嘗悲傷思慕羸瘦骨立不能自勝又曰龐萌字明兄為赤眉所得欲啖之萌詣賊叩頭言兄年老羸瘠不如萌肥健願代兄賊義而不啖謝承後漢書曰楊彪見漢祚將移遂稱腳攣不復行積, SBCK: 百七}
