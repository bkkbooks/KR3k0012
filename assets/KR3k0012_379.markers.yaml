  - {type: variant, offset: 2555, length: 0, content: '', WYG: 來往建鄴敦遣之京師人聞其姿容觀者如堵不見者輙歎之又曰王衍字夷甫有美貌㓜清辯仕至太尉甞執玉柄塵尾與手無别人謂之為口中雌黄為世間之一龍或理有所不安者即隨改之妻郭氏賈后之親藉宫中勢聚斂無厭夷甫患之口不言錢妻試之令婢以錢遶牀夷甫曰好舉阿堵物又曰石苞字仲容渤海南皮人}
