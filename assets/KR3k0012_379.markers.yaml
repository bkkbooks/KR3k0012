  - {type: variant, offset: 3403, length: 233, content: 掌切肥貌也博物志曰京邑有一人失名姓食噉兼十許人遂肥不能動其父曾作遠方長吏彼縣令故義共傳食之一二年中一鄉為儉張顯誓曰古諺云堯舜至聖身如脯臘桀紂無道肥膚三尺語林曰孟業為幽州其人甚肥或以為千斤武帝為稱之難其大臣乃作一大秤掛壁業入見武帝曰朕欲自稱有幾斤業荅曰陛下欲稱臣耳無煩復勞聖躬於是稱業果得千斤世語曰太祖父嵩在太山太祖令太山太守應劭送家詣兗州陶謙密遣數十騎掩捕嵩家嵩懼穿後垣先出其妾肥不得出逃于廁與妾俱被害又曰廋公造周伯仁曰君何所欣悅而忽肥廋曰君復何所憂慘而忽瘠伯仁曰吾, WYG: 葛勃}
