  - {type: variant, offset: 2630, length: 0, content: '', SBCK: 字濬冲㓜頴悟神彩秀徹視日不眩裴楷目之曰戎眼爛爛如巖下電又曰王蒙字仲祖羙姿容甞覽鏡自照稱其父字曰王文開生如此兒耶甞帽破入市買之羣嫗悅之爭遺其帽又曰謝尚論中朝人物劉琰云杜又膚清衛叔寳神清爲有識所重如此又曰韓壽武帝時爲􅁺有姿容太尉賈充有室女見壽羙心悅之充有異香女竊與夀帶之充怪以問婢婢以告充乃以女妻之又曰王戎謂王􅄛神姿髙徹如瑶林瓊樹自是風塵外物又曰文帝器重魏舒毎朝㑹坐罷目送曰魏舒堂堂人之領䄂也又曰桓温字元}
