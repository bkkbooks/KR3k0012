  - {type: variant, offset: 2562, length: 2, content: 洪大, WYG: 肥麗朝服衣冠窺照自視謂其妻曰我與城北徐公孰美妻曰君美徐公齊之美者也忌不信復問妾妾曰君美旦日客從外來忌復問之客亦曰徐公不如君及徐公來忌熟視之自以為不如因思之曰吾妻之美我私我也妾之美我畏我也客之美我有求扵我也扵是入朝見威王曰臣誠不如徐公而臣妻妾及客皆言臣美或私畏扵臣或有求扵臣今齊地千里宫女左右莫不私王朝廷之臣莫不畏王四境之内莫不有求扵王由此觀之王蔽甚矣王曰善乃下羣臣吏民能}
