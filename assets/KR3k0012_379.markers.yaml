  - {type: variant, offset: 3294, length: 185, content: 燒皎若燭光會稽典錄曰董孝治勾章人家貧採薪供養得甘果奔走以獻母母甚肥悅鄰人家富有子不孝母甚瘦不孝子疾孝治母肥常苦辱之孝治不報及母終負土成墳鳥獸助其悲號喪竟殺不孝子置冢前以祭詣獄自繫會赦得免方言曰益梁之間凡諱其肥盛謂之䑋如掌切肥貌也博物志曰京邑有一人失名姓食噉兼十許人遂肥不能動其父曾作遠方長吏彼縣令故義共傳食之一二年中一鄉為儉張顯誓曰古諺云堯舜至聖身如脯臘桀紂無道肥膚三尺, SBCK: 歸}
