  - {type: variant, offset: 494, length: 1646, content: 漢書曰汝南周滂字次彥世祖到常山問可治兵者誰滂舅以滂對世祖見滂短小以為不能將帥滂對有詞理拜潁川府丞東觀漢記曰張重日南計吏形容短小明帝問云何郡小吏荅曰臣日南計吏非小吏也袁宏漢紀曰陰后短小舉止時有失儀左右掩口而笑魏志曰樂進字文謙容貌短小膽烈從高祖為帳下吏魏氏春秋曰魏武王姿貌短小神明英徹吳錄曰張蕃字仲輔為人短小顧譚以短戲之曰朱儒朱儒有何德令我思君罔極臧榮緒晉書曰山濤子淳元尪疾不仕世祖聞其短小而聰敏欲見之濤面荅淳元自謂形容宜絕人事不肯受詔論者奇之沈約宋書曰王敬弘形狀短小而坐起端方劉璠梁典曰徐摛起家太學博士周捨舉曰臣外弟徐摛形質陋小若不勝衣而堪此選乃為晉安王侍讀崔鴻前涼錄曰宗醜字仲業慷慨有大志清素敦朴不好華競形狀短小體有鱗甲仕至西平太守三國典略曰齊孟業有盛名初司州牧清河王岳聞業名召為法曹見其容貌短小笑而不言及尋斷決之處乃謂業曰卿決斷之明可謂有過軀之用晏子春秋曰晏子短小使楚楚人為小門而迎晏子晏子曰使狗國者從狗門入今臣使楚不當狗門入王曰全齊無人耶使子為使晏子曰齊之臨淄張袂成帷揮汗成雨何為無人使賢者使於賢國使不肖者使於不肖之國以嬰為不肖故使王耳孫卿子非相曰帝舜短周公短楚葉公子高微小短瘠行若不勝衣而定楚國說苑曰齊遣淳于髡到楚為人短小楚王甚薄之謂曰齊無人而使子來何長也對曰臣無所長臣腰中七尺之劍欲斬無狀王王曰止吾但戲子耳即與髡共飲酒博物志曰齊桓公獵得一鳴鵠宰之嗉中得一人長三寸三分著白圭之袍帶劍持車罵詈瞋目後又得一折齒方圓三尺問群臣曰天下有此及小兒否陳章荅曰昔秦胡充一舉渡海與齊魯交戰傷折版齒昔李子敖於鳴鵠嗉中遊長三寸三分纂文曰漢光武時潁川張仲師長二尺二寸亦出王充論衡古文璅語曰齊景公伐宋至曲陵夢見有短丈夫賓於前晏子曰君所夢何如哉公曰其賓者甚短大上小下其言甚怒好俛晏子曰則如是伊尹也伊尹甚大而短大上小下赤色而髯其言好俛而下聲公曰是矣晏子曰是怒君師不如違之遂不果伐宋方言曰鮆矲蒱揩反短也江湘之會謂之鮆昨啟反又曰癠桂林之中謂短矲東揚之間謂之俯今俗呼小為瘠矲短也俯言俯視因名云汝南先賢傳曰周舉字宣光姿貌短陋有晏子之風陸胤廣州先賢傳曰徐徵字君外為人短小果敢劉彥明燉煌實錄曰汎洊字世震博學善屬文為人短小弱冠屢陳損益續搜神記曰司徒蔡謨親親有王蒙者單獨常為蔡公所收養蒙長纔及三尺似為無骨登床輒令人抱上桓譚新論曰諺云朱儒見一節而長短可知短絕域人詩含神霧曰東北極有人長九寸家語曰孔子曰僬僥氏長三尺短之至也國語同魏略西域傳曰短人國在康居西男女皆長三尺眾甚多康居長老傳曰常有商行迷惑失道而到此國國中甚多珠夜光明商度此國去康居可萬餘里魏志曰倭南有朱儒國人其長三四尺去女王國四千餘里列子曰從中州以東三十萬里得僬僥國人長一尺六寸東北極有人名竫音靖人長九寸山海經曰周饒國為人短小著冠帶一曰僬僥國郭璞曰其人長三尺漢武故事曰東郡送一短人長七寸衣冠具足疑其山精常令在案上行召東方朔問朔至呼短人曰巨靈汝何忽叛來阿母還未短人不對因指朔謂上曰王母種桃三千年一作子此兒不良已三過偷之矣遂失王母意故被謫來此上大驚始知朔非世中人短人謂上曰王母使臣來告陛下求道之法唯有清淨不宜躁擾復五年與帝會言終不見神異經曰西北荒中有小人焉長一寸圍如長朱衣玄冠乘軺車導引有威儀人遇其乘車並食之其味辛楚終不為虫豸所咋並識萬物名字殺腹中三虫又曰西海之中有鵠國男女皆長七寸自然有禮好經論跪拜壽三百歲人行如飛日千里百物不敢犯之唯畏鵠鵠遇吞之上壽三百歲在鵠腹不死而鵠一舉千里張華注曰此陳章對齊桓公云西海之外鵠國男女皆七寸也廣志曰東方有人長三尺君長出行導衛威儀有若中國人又有小人如螻蛄手撮之滿手得二十枚外國圖曰僬僥國人長一尺六寸迎風則偃背風則伏眉目具足但野宿一曰僬僥長三尺其國草木夏死而冬生去九疑三萬里王子年拾遺記曰員嶠山有陁移國人長三尺壽萬歲廣延之國人長二尺郭璞山海經圖贊曰僬僥極麼門可反諍人唯小四體具足眉目才了肥說文曰肥多肉也腴腹下肥也禮記禮運曰安之以樂而不達於順猶食而弗肥也四體既正膚革充盈人之肥也左傳哀下曰魯哀公至自越郭重仆孟武伯惡重曰何肥也公曰是食言多矣能無肥乎公與, SBCK: 爲御史}
