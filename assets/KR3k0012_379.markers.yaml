  - {type: variant, offset: 9, length: 0, content: '', SBCK: 箋云思周室之賢者彼羙人兮西方之人兮箋云彼羙人謂碩人也又曰叔于田巷無居人叔大叔叚也田取禽也豈無居人不如叔也洵羙且仁洵信也又淇奥曰有匪君子如金如錫如圭如璧寛兮綽兮猗童較兮又猗嗟曰猗嗟昌兮頎而長兮昌盛也頎長貌也抑􅀂揚兮抑羙色揚廣揚羙目揚兮好目􅀭眉巧趨蹌兮射則臧兮又小戎曰文茵暢􅂖駕我騏􅑓言念君子温其如玉又盧令曰盧令令其人羙且仁盧重環其人羙且鬈鬈好貌讀當爲權權勇壯也盧重鋂其人羙且偲偲才也又汾沮洳曰彼其之子羙如英羙如英殊異乎公行又曰彼其之子羙如玉羙如玉殊異乎公族}
  - {type: page-break, offset: 9, content: '', id: KR3k0012_SBCK_379-1b}
  - {type: variant, offset: 9, length: 0, content: '', WYG: 箋云思周室之賢者彼美人兮西方之人兮箋云彼美人謂碩人也又曰叔于田巷無居人叔大叔段也田取禽也豈無居人不如叔也洵美且仁洵信也又淇澳曰有斐君子如金如錫如圭如璧寛兮綽兮猗重較兮又猗嗟曰猗嗟昌兮頎而長兮昌盛也頎長貌也抑若揚兮抑美也揚廣也美目揚兮好目揚眉巧趨蹌兮射則臧兮又小戎曰文茵暢轂駕我騏􅑓言念君子温其如玉又盧令曰盧令令其人美且仁盧重環其人美且鬈鬈好貌讀當為權權勇壯也盧重鋂其人美且偲偲才也又汾沮洳曰彼其之子美如英美如英殊異乎公行又曰彼其之子美如玉美如玉殊異乎公族}
