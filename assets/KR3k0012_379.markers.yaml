  - {type: variant, offset: 2961, length: 1, content: 安, SBCK: 陶洪景字通明特愛松風毎聞其響欣然爲樂有時獨遊泉石望見者以爲仙人又曰王茂字休逺太原祁人也身長八尺羙容觀武帝布衣時見之歎曰王茂年少堂堂如此必爲公輔之器崔鴻十六國春秋前凉録曰辛綝弟理羙姿貌張駿欲奪其妻以寡妹妻之理割鼻自誓駿大怒徙理燉煌遂以憂死又曰前趙録曰遊子逺㓜姿貌聦亮好學年十五至洛陽張華見而竒之曰此兒雅㓗洪方精公才也又曰後趙録曰張謐羙姿貌㓜有􅇣氣太守陸雲見而異之謂傳喜曰吾聞兾州多名童故不虚也又曰劉光弱冠羙姿儀自稱佛太子從大􅁗來當至小􅁗國昜姓名爲季子轉相扇惑聚千人於南山僣稱號鎭西石廣擊斬之于鄠頸無血十餘日面猶如生北齊書曰崔}
