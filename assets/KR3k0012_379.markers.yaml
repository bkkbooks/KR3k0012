  - {type: variant, offset: 2628, length: 0, content: '', SBCK: 裴揩字叔則爲吏部侍郎風神髙邁容儀俊爽􅀶渉羣書特精義理時人謂之玉人又曰尚書閔鴻見陸雲竒之此兒􅀂非龍駒則是鳯雛又曰潘岳字安仁滎陽中牟人才名冠丗出爲河陽令有異政累遷給事中羙姿儀少時常挾彈出洛陽羣嫗相遇者悉連手縈遶以果擲之􅄹車而歸又曰王恭字伯季累遷爲青兖二州刺史羙姿儀人或多目之云濯濯􅀂春日栁恭甞􅀍鶴􅌁裘渉雪而行孟昶窺見之歎曰神仙中人又曰衛玠字叔寳河東安邑人也齠齓年乗白羊車入市見者咸曰誰家璧人遂號爲璧人王武子玠之舅也甞與同遊語人曰昨日與吾外甥並坐􅀂珠玉在側朗然映人覺我形穢及長好言玄理武子每聞玠言歎息絶倒故時人語曰衛玠談道武子絶倒玠妻父樂廣有重名議者以爲婦公冰清女壻玉潤爲太子洗馬以國亂至江夏玠亡其妻征南將軍山簡以女妻之至豫章大將軍王敦謂長史謝鯤曰昔王輔嗣吐金聲於中朝此子復玉振於江表後求徃建鄴敦遣之京師人聞其姿容觀者如堵不見者輙嘆之又曰王􅄛字夷甫有羙貌㓜清辯仕至太尉甞執玉柄塵尾與手無別人爲之義口中雌黄爲丗間之一龍義理有所不安者即隨改之妻郭氐賈后之親籍宫中勢聚歛無猒夷甫患之口不言錢妻試之令婢以錢遶牀夷甫曰好舉阿堵物又曰石苞字仲容渤海南皮人也雅曠有智容儀偉麗不脩小節故時人爲之語曰石仲容姣無􅀟又曰嵇康長七尺八寸羙音氣好容色土木形骸不自藻飾人以爲龍章鳯姿天質自然又曰}
