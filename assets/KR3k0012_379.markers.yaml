  - {type: variant, offset: 2556, length: 0, content: '', WYG: 雅曠有智容儀偉麗不脩小節故時人為之語曰石仲容姣無雙又曰嵇康長七尺八寸美音氣好容色土木形骸不自藻餙人以為龍章鳯姿天質自然又曰王戎字濬冲㓜頴悟神彩秀徹視日不眩裴楷目之曰爛爛如巖下電又曰王䝉字仲祖美姿容常覽鏡自照稱其父字曰王文開生如此兒耶甞帽破入市買之羣嫗悦之爭遺其帽又曰謝尚論中朝人物劉琰云蔣乂膚清衛叔寳神清為有識所重如此又曰韓夀武帝時為掾有姿容太尉賈充有室女見夀美心悦之充有異香女竊與夀帶之充怪以問婢婢以告充乃以女妻之又曰王戎謂王衍神姿髙徹如瑶林瓊樹自是風塵外物又曰文帝器重魏舒每朝㑹坐罷目送曰魏舒堂堂人領䄂也又曰桓温字元子宜城太守彛之子也生未期而太原温嶠見之曰此兒有竒骨可試使啼及聞聲曰真英物也年長豪爽有氣概姿貌甚偉又曰王衍神情明秀王澄曰兄形似導而神鋒太雋晋中興書曰王矩字令式美容貌每出行觀者盈路宋書曰謝莊字希逸美容儀善談論屬文好𤣥理為文帝所賞帝一見之輙歎曰藍田出美玉豈虛也哉又曰葢道風姿貌端雅容止可觀中書郎范述見而竒之曰此荆楚仙人也又曰謝晦美風姿善言笑眉目分明鬢髪如墨渉獵文義朗贍多通時人以方揚徳祖㣲將不及晦聞猶以為恨齊春秋曰世祖甞扵華林園宴集使羣臣各出所長王儉曰臣少為書生請誦封禪書跪前誦之容止可觀音吐藴藉上大悦曰樂哉梁書曰陶𢎞景字通明特愛松風每聞其響欣然為樂有時獨㳺泉石望見者以為仙人又曰王茂字休逺太原祁人也身長八尺美容觀武帝布衣時見之歎曰王茂今堂堂如此必為公輔之器崔鴻十六國春秋前凉録曰辛綝弟理美姿貌張駿欲奪其妻以寡妹妻之理割鼻自誓駿大怒徙理燉煌遂以憂死又曰前趙録曰㳺子逺㓜姿貌聰亮好學年十五至洛陽張華見而竒之曰此兒雅㓗洪方真雋才也又曰後趙録曰張謐美姿貌㓜有逸氣太守陸雲見而異之謂傅喜曰吾聞冀州多名童故不虛也又曰劉光弱冠美姿儀自稱佛太子從大秦來當至小秦國易姓名為季子鄠赤眉信恭之妻二女轉相扇惑聚千人扵南山僣稱號鎮西石廣擊斬之子鄠頸無血十餘日面猶如生北齊書曰崔陵子瞻字彦通聰明有文情善容止神彩凝然楊愔曰昔裴瓉在晋也為中書郎情髙邁每扵禁門出入宿衛者肅然動容崔生堂堂之貌亦當無愧裴子又曰王昕字元景北海劇人也生九子並風流藴藉世號王氏九龍又曰劉禕五子並有志行為世所稱璿字祖玉聰敏機悟美姿儀為其舅北海王昕所愛顧座曰可謂珠玉在傍覺我質穢又曰李繪字恭文儀貌端偉河間邢晏即繪弟五舅也與繪清言歎其髙逺每稱曰若披雲霧如對珠玉又曰北平陽貞字仁堅世祖第五子沉審寛恕太祖稱之曰此兒得我鳯毛又曰陸即字雲駒洛陽人也昆弟六人並魏藍田公主元氏所生故邢邵甞謂人云藍田生美玉豈虛也十二國史曰鄒忌為齊相身}
