  - {type: variant, offset: 3024, length: 207, content: 子騫曰吾出見其美車馬則欲之入聞先王之言則又欲之兩心相與戰今先王之言勝故肥韓子曰子夏見曾子曰何肥也對曰戰勝故肥曾子曰何謂也子夏曰吾入見先王之義則榮之出見富貴又榮之二者戰於胸臆今先王之義勝故肥淮南子曰繼子得食肥而不澤情不相往來也適子懷於燕慈母喻於利情相往來也吳質別傳曰詔特進以下會質間曹真肥朱鑠臞質召俳優使說肥臞真曰卿欲部曲將遇我耶遂爭而罷諸葛恪別傳曰孫權常問恪何以自娛而更肥澤恪對曰臣聞富潤屋德潤身臣非敢自娛脩己而已, WYG: ''}
