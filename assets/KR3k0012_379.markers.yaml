  - {type: variant, offset: 2963, length: 0, content: '', krp: 子瞻字彦通聦明有文情善容止神彩凝然楊愔曰昔裴瓉在晉也爲中書郎情髙邁每於禁門出入宿衛者肅然動容崔生堂堂之貌亦當無愧裴子又曰}
  - {type: variant, offset: 2964, length: 2, content: 大春, SBCK: 昕字元景北海劇人也生九子並風流藴藉丗號王氏九龍又曰劉禕五子並有志行爲丗所稱璿字祖玉聦敏機悟羙姿儀爲其舅北海王昕所愛顧座曰可謂珠玉在傍覺我質穢又曰李繪字恭文儀貌端偉河間邢晏即繪第五舅也與繪清言歎其髙逺每稱曰􅀂披雲霧如對珠玉又曰北平陽貞}
  - {type: page-break, offset: 2964, content: '', id: KR3k0012_SBCK_379-7b}
  - {type: variant, offset: 2964, length: 2, content: 大春, krp: 昕字元景北海劇人也生九子並風流藴藉丗號王氏九龍又曰劉禕五子並有志行爲丗所稱璿字祖玉聦敏機悟羙姿儀爲其舅北海王昕所愛顧座曰可謂珠玉在傍覺我質穢又曰李繪字恭文儀貌端偉河間邢晏即繪第五舅也與繪清言歎其髙逺每稱曰若披雲霧如對珠玉又曰北平陽貞}
  - {type: variant, offset: 2968, length: 4, content: 經少博涉, SBCK: 堅丗祖第五子沉審寛恕太祖稱之曰此兒得我鳯毛又曰陸郎字雲駒洛陽人也昆弟六人並魏藍田公主元氏所生故邢邵甞謂人云藍田生羙玉豈虚也十二國史曰鄒忌爲齊相身長八尺餘體肥麗朝服衣冠窺照自視謂其妻曰我與城北徐公孰美妻曰君美徐公齊之美者也忌不信復問妾妾曰君美旦日客從外來忌復問之客亦曰徐公不如君及徐公來忌孰視之自以爲不如因思之曰吾妻之羙我􅀻我也妾之美我畏我也客之羙我有求於我也於是入朝見威王曰臣誠不如徐公而臣妻妾及客皆言臣美或􅀻畏於臣或有求於臣今齊地千里宫女左右莫不􅀻王朝廷之臣莫不畏王四境之内莫不有求於王由此觀之王蔽甚矣王曰善乃下羣臣吏民能面刺寡人過者受上賞又曰羙男破老羙女破居北史後魏}
  - {type: page-break, offset: 2968, content: '', id: KR3k0012_SBCK_379-8a}
