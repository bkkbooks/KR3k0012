  - {type: variant, offset: 3110, length: 9, content: 榮齊王囧召為主簿囧, WYG: 問上悦而從之又曰李遜爲給事中嘗論時政以爲事君之義有犯無隱陳誠啓沃不必擇辰今君臣敷奏乃候隻日是畢歲臣下睹天顔獻可否能幾何憲宗嘉之又曰元和十四年以撫州司馬令狐通爲右衞將軍給事中崔植封還制書言通前刺史壽州用兵失律前罪未塞不宜遽加奬用上命宰臣諭植以通父彰有功不忍棄其子其制方行又曰常𢎞景爲給事中屢有封駮時有劉士經以駙馬交通邪倖}
