  - {type: variant, offset: 3113, length: 6, content: 囧召為主簿囧, SBCK: 乃宗社無疆之福臣等不能廣求直士又不能數進直言􅀌􅀒聖心合當罪責今請以元膺復爲給事中以俻頋問上恱而從之又曰李遜爲給事中嘗論時政以爲事君之義有犯無隱陳誠啓沃不必擇辰今君臣敷奏乃候􅃗日是畢歳臣下睹天顔獻可否能幾何憲宗嘉之又曰元和十四年以撫州司馬令狐通爲右衛將軍給事中崔植封還制書言通前刺史壽州用兵失律前罪未塞不冝遽加奬用上命宰臣諭植以通父彰有功不忍弃其子其制方行又曰韋􅀪景爲給事中屢有封駮時有劉士經以駙馬交通邪倖}
