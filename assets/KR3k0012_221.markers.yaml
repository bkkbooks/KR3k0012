  - {type: variant, offset: 905, length: 1771, content: 外每旦車常數百兩宋泰始起居注曰王言之職揔司清要中將軍丹陽尹王景文夙尚弘簡情度淹粹忠規茂績寔宣國道宜兼管內樞以重其任可中書令齊書曰王延之代張緒為中書令何點歎曰晉以子敬季琰為此職今以王延之張緒為之可謂清官後接之者實為未易崔鴻後趙錄曰徐光字季武頓丘人幼有文才年十三王陽攻頓丘掠之而令主秣馬光但書柱作詩賦左右以白石勒勒令召光付紙筆光立為頌賜衣服遷為中書令後魏書曰任城王澄為中書令蕭頤使庾菙來朝見澄音韻遒雅風儀秀逸謂主客郎張尋曰往魏任城以武著稱今魏任城乃以文見美也又曰高允高宗禮敬甚重晨入暮出或積日居中朝臣莫知所論或有上書言得失者高宗省而謂群臣曰君父一也父有是非子何為不能書諫之使人知惡而於家內隱處也豈不以父親恐惡彰於外也今國家善惡不能面陳而上表顯諫此豈不彰君之短明巳之美至如高允者真忠臣矣朕有非恒正言面論至朕所不用聞者皆言說無避就朕聞其過而天下不知其諫豈不忠乎汝等在左右曾不聞一正言但向朕喜時求官乞職汝等把弓刀侍朕左右徒立勞耳皆至公王此人把筆匡我國家不過作郎汝等不自媿乎於是拜允中書令又曰高允字伯恭為中書令高宗重之不名恒呼為令公又曰高允拜中書令司徒陸麗曰高允雖蒙寵待而家貧布衣妻子不粒高宗怒曰何不先言今見朕用之方言其貧是日幸允第惟草屋數間布被縕袍廚中藍菜而巳高宗歎息曰古人之清豈有此乎即賜帛五百疋粟千斛唐書曰武德年嘗有勑而中書門下不時宣行高祖責其遟由內史令蕭瑀曰臣見內史宣勑或前後相乖者百司行之不知何所承用所謂易雖在前難必在後臣在中書日久備見其事今皇階初搆事涉安危若遠方有疑恐失機會比每受一勑臣必審勘使與前勑不相乖背者始敢宣行遟晚之愆實由於此上善之又曰褚遂良拜中書令太宗寢疾召遂良及長孫無忌入臥內謂之曰卿等忠烈簡在朕心昔漢武寄霍光劉備託葛亮朕之後事一以委卿太子仁孝卿之所悉必須盡誠輔佐永保宗社又顧謂太子曰無忌遂良在國家之事汝無憂矣又曰神龍元年改中書令曰紫微令又曰開元二年紫微令姚崇奏紫微舍人六員每議事諸舍人同押連署狀進訖凡事有是非理均與奪人心既異所見或殊抑使雷同情有不盡臣今啇量其事執見不同者望請別作啇量狀連本狀同奏若狀語交牙恐煩聖思臣既是官長望於兩狀後略言二理優劣奏聽進止則人各盡能官無留事勑曰可又曰張九齡為中書令時天長節百寮上壽多獻珍異唯九齡進金鏡錄五卷言前古興廢之道上賞異之薛瑩條列吳事曰胡冲意性調美心趣解暢有刀筆才閑於時事為中書令雖不能匡矯亦自守不茍求容媚王珉別傳曰珉字季琰詔曰新除侍中王珉才學廣贍理識清通宜處機近以參時務其以珉為長兼中書令郭頒魏晉世語曰劉放孫資共典樞要夏侯獻曹肇心內不平殿中有雞棲樹二人相謂此亦久矣其能復幾指謂中書監劉放中書令孫資又曰司馬景王令中書令虞松作表輒不可意令松更定思竭不能改鍾會為定五宇松深悅服宋謝莊讓中書令表曰伏惟陛下登馭震維臨齊璿政澤與風翔恩從雲動臣聞璧門天邃鳳沼神深絲綸王言出納帝命自非望允當時譽宣庠塾未有謬垂曲寵空席茲榮在於平壯猶不可勉况今綿痼百志俱淪中書監魏志曰黃初中改秘書為中書以劉放為監孫資為令遂並掌機密歷文明齊王三世又曰蔣濟字子通時中書監令號為專任濟上䟽曰大臣太重者國危左右太親者身弊古之至戒也往者大臣秉事外內扇動陛下卓然自覽萬機莫不祇肅夫大臣匪不忠也然威權在下則眾心慢上勢之常也陛下既巳察之於大臣願無忘於左右晉書曰荀勗守中書監毗贊朝政及遷尚書令勗久在中書專管機事失之甚慍人有賀者勗恚曰奪我鳳皇池諸公何賀焉又曰太安元年有胡人入雲龍門殿前再拜云我當作中書監付都虞候斬之晉陽秋曰朱整少有名行官至中書監魏禪晉使整與中書令劉良共為詔世祖踐祚權即用之晉中興書曰肅宗欲使庾亮為中書監亮上䟽曰陛下踐祚復以臣領中書則示天下有私矣晉諸公讚曰華廙為中書監時事多不泄啟世祖乞授子薈荅詔先時荀勗為中書監末年亦使息組書詔草傅祗為中書監病風復使息暢書啟事皆前後相承以子弟管之後魏書曰孝文時蠕蠕如兗反國有喪帝遣高閭為書與之不敘凶事孝文謂曰卿為中書監職典文詞若情思不至應謝所任環濟要略曰中書掌內事密詔下州郡及邊將不由尚書者也後關百官事益重有令僕射丞郎令史秩與尚書同陶氏職官要錄曰中書監舊視僕射梁選簿書自宋巳來比尚書令特進之流而無事任清貴華重大位多領之王導表曰臣乞得除中書監持節專壹所司竭誠保傅惟力是視詔曰昔者荀公曾從中書監為尚書令人賀之乃發恚云奪我鳳皇池卿諸人何賀耶願足下處之勿疑王敦表曰中書令領軍庾亮清雅履正可中書監領軍如故中書, SBCK: ''}
