  - {type: variant, offset: 91, length: 132, content: 以選為中尚書宣帝時任中書官以恭為令君防為僕射恭死君防代為令貴倖傾朝百寮皆敬事應劭漢官儀曰左右曹受尚書事前世文士以中書在右因謂中書為右曹又稱西掖吳錄曰紀騭字子上景皇時騭父亮為尚書令騭為中書令每朝會詔以屏風隔其坐吳志曰胡冲平和有文幹天紀中為中書令又曰張尚有俊才孫皓時為, SBCK: ''}
