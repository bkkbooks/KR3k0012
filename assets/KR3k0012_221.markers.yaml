  - {type: variant, offset: 2681, length: 0, content: '', SBCK: 黄門侍郎掌貳侍中之職凡政之㢮張事之與奪皆叅議焉􅀂大祭祀則從升壇以陪禮皇帝盥手則奉巾以進旣恱則奠巾于篚奉匏爵以賛獻凢元正冬至天子視朝則以天下祥瑞奏聞漢官儀曰給事黃門侍郎次侍中侍從左右開通内外給事於中故曰給事中黃門侍郎漢書曰王音薦楊雄待詔歳餘爲給事黃門郎成哀平三代不徙又曰張禹爲太傅有疾成帝臨視拜於床下禹有少子在側數目之帝知其意於前拜黃門郎又曰劉向字子政宣帝時以中郎爲給事黃門侍郎又曰董賢字聖卿雲陽人爲太子舎人賢待漏在殿下爲人美麗自喜哀帝望見恱其儀皃識而問之曰是舎人董賢耶因引上與語拜爲黃門侍郎東觀漢記曰鄧閶字秀昭遷黃門侍郎于時國家每有災異水旱閶側身暴露憂懼顦顇形於顔色公卿以下咸髙尚焉漢興以來爲外戚儀表後漢書曰馬防子鉅爲常從小侯正月當冠特拜爲黃門侍郎肅宗親御章臺下殿陳鼎爼自臨冠之續漢書曰荀恱字仲豫遷黃門侍郎獻帝頗好文學恱與從弟彧孔融並侍講禁中又輿服志曰禁門曰黃闥以中人主之故號曰黃令然則黃門郎給事黃闥之内故曰黃門郎夲旣無貟於此各置六人也又百官志曰給事黃門侍郎六百石無貟侍從左右給事中使開通中外諸王朝見於殿上引王就位獻帝起居注曰自誅黃門後侍中侍郎出入禁中機事頗露由是王允乃奏侍中黃門不得出入不通賔客自此始也漢官曰尚書郎奏事於明光殿省中皆胡粉塗璧其邊以丹漆地故曰丹墀尚書郎含雞舌香伏其下奏事黃門侍郎對揖跪受漢舊儀曰黃門郎屬黃門令日暮入對青􅃈門拜名曰夕郎魏志曰王粲字仲宣山陽人年十七司徒辟詔除黃門侍郎以西京擾亂皆不就又曰夏侯玄字太􅀄少知名弱冠爲黃門侍郎嘗進見與皇后弟毛曾並坐􅀇耻之不恱形之於色明帝恨之左遷爲羽林監又曰杜恕字矜伯爲散􅀐黃門侍郎恕推誠以質不治飭在朝不結交每政有得失常引綱維以正言於是侍中辛毗等器重之又曰夏侯向字伯仁淵從子也文帝與之親友有籌畫智略從太祖定兾州遷黃門侍郎又曰鍾毓字稚叔年十四爲散􅀐侍郎機捷談􅀏有父風大和􅀄蜀相諸􅁑亮圍祁山明帝欲親西征毓上䟽曰夫䇿貴廟勝功尚帷幄不下殿堂之上而决勝千里之外車駕冝鎭守中土以威四方今者盛暑行師詩人所重實非至尊順動之時也遷黃門侍郎魏略曰董遇字季直獻帝時爲黃門侍郎旦夕侍講爲天子所愛信蜀志曰費禕字文偉爲黃門侍郎丞相亮南征還群僚於數十里逢迎年位多在禕右而亮命禕同載由是衆莫不易觀呉志曰孫承字顯世好學有文章作螢火賦行於世爲黃門侍郎與頋榮俱爲侍臣歸命世内侍多得罪唯榮承獨􅀗免常使二人記事承荅頋問乃下詔曰自今巳後用侍郎皆當令如宗室承頋榮儔也又曰孫皓每宴會群臣無不咸令沉醉置黃門郎十人特不與酒侍立終日爲司過之吏宴罷之後各奏其闕失迕視之咎謬言之愆罔有不舉大者即加威刑小者咸以爲罪晉書曰頋榮少有珪璋符采朗澈仕呉弱冠舉賢良爲黃門侍郎當時後進盡相推謝稱榮有天才令望又曰張華爲黃門侍郎􅀶覽圖籍千門萬户􅀞地成圖又曰呉隱之孝武帝欲以爲黃門郎以隱之貌􅀋簡文帝乃止又曰嵇紹爲給事黄門侍郎時侍中賈謐以外戚之寵年少居位潘岳杜斌等皆附託焉謐求交於紹紹拒而不荅謐誅紹時在省以不阿比凶族封弋陽子晉書載記曰秦黃門郎古成詵風韻秀舉確然不群每以天下是非爲己任時京兆韋髙慕阮籍之爲人居母喪彈琴飲酒詵聞而泣曰吾當私刃斬之以崇風教遂持劒求髙髙懼逃匿終身不敢見詵齊職儀曰給事黃門侍郎四人秩六百石武冠絳朝服漢有中黃門給事黃門位從諸大夫􅁗制也與侍中掌奏文案賛相威儀典署其事後魏書曰崔光爲黃門侍郎未嘗留心文案唯從容論議叅賛文政而巳又曰陽平王之子匡爲黃門侍郎茹皓始有寵百寮微憚之世宗曾於山陵還詔匡陪乗乂命皓登車褰裳將上匡諫止世宗推之命下皓恨匡失色當時壯其忠謇又曰任城王之子順除給事黃門侍郎時領軍元乂威刑尤盛凡有遷授莫不造門謝謁順拜表而巳曾不詣乂乂謂順曰卿何得不見我順正色曰天子冨於春秋委政宗輔叔父冝至公爲心舉士報國如何賣恩責人私謝豈所望也北史曰盧誕拜給事黃門侍郎魏帝詔曰經典易求人師難得朕諸兒稍長欲令卿爲師於是親幸晉王第勑晉王以下皆拜之於帝前隋書曰劉行本爲黃門侍郎文帝嘗怒一郎於殿前笞之行本進諌帝不頋行夲乃正當上前又曰陛下不以臣不肖置臣左右豈得輕臣而不頋也乃置笏於地而退上謝之而原所笞者唐書曰温大雅爲黃門侍郎弟彦將爲}
