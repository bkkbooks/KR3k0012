  - {type: variant, offset: 3109, length: 1, content: 顧, SBCK: 盧粲遷給事中時安樂公主壻武崇訓爲節􅉖太子所殺特追封爲魯王令司農少卿趙履温監護葬事履温諷公主奏請依永泰公主故事爲崇訓造陵詔從其請粲駮奏曰伏尋陵之稱謂本屬皇王及儲君等自皇家巳來諸王及公主墓無稱陵者唯永泰公主承恩特葬事越常途不應假永泰公主爲名請比貞觀巳來諸王舊例足得豐厚手勑荅曰安樂公主與永泰公主無異同穴之義古今不殊魯王縁此特爲陵制不煩固執粲又奏曰臣聞陵之稱謂施於尊極不屬王公巳下且魯王􅀂欲論親等第則不親於雍王守禮雍王之墓尚不稱陵魯王則不可因尚公主而加號且君之舉事則載於方􅁽或稽之徃典或考自前朝臣歷撿貞觀巳來駙馬墓無得稱陵者且君人之禮服絶於傍朞盖爲不獨親其親不獨子其子陛下以􅂰下之恩愛施及其夫贈賵之儀哀}
  - {type: page-break, offset: 3109, content: '', id: KR3k0012_SBCK_221-7b}
  - {type: variant, offset: 3109, length: 0, content: '', WYG: 盧粲遷給事中時安樂公主婿武崇訓爲節愍太子所殺特追封爲魯王令司農少卿趙履温監䕶葬事履温諷公主奏請依永泰公主故事爲崇訓造陵詔從其請粲駮奏曰伏尋陵之稱謂本屬皇王及儲君等自皇家已來諸王及公主墓無稱陵者唯永泰公主承恩特葬事越常途不應假永泰公主爲名請比貞觀已來諸王舊例足得豐厚手勅荅曰安樂公主與永泰公主無異同穴之義古今不殊魯王縁此特爲陵制不煩固執粲又奏曰臣聞陵之稱謂施於尊極不屬王公已下且魯王若論親等第則不親於雍王守禮雍王之墓尚不稱陵魯王則不可因尚公主而加號且君之舉事則載於方冊或稽之往典或考自前朝臣歴檢貞觀已來駙馬墓無得稱陵者且君人之禮服絶於傍朞蓋爲不獨親其親不獨子其子陛下以膝下之恩愛施及其夫贈賵之儀哀樂足備豈得使上下無辨君臣一貫者哉帝竟依粲所奏又曰李藩爲給事中制勅有不可遂於黄勅後批之吏曰宜别連白紙藩曰别以白紙是文狀豈曰批勅耶裴垍言於帝以爲宰相器又曰憲宗以同州刺史吕元膺復爲給事中初元膺自給事中除同州及入謝上問以時政得失元膺論奏詞甚激切上嘉其剛正翌日謂宰臣曰吕元膺讜言直氣今欲畱在左右使言得失卿等以爲何如李藩裴垍進賀曰陛下納諫超冠前王乃宗社無疆之福臣等不能廣求直士又不能數進直言孤負聖心合當罪責今請以元膺復爲給事中以備}
