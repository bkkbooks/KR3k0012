  - {type: variant, offset: 236, length: 668, content: 中書令又曰蔡款字文德歷位內外以清貞顯於當世衛尉領中書令晉書曰王獻之為中書令少而摽邁不循常貫文義並所不長而能撮其勝會故為一時風流之冠獻之卒以王珉代之世謂之大王令小王令也珉父洽永和中嘗為此官至珉復居之時人以為弈世令望又曰王獻之為中書令啟瑯㖿王為中書監表曰中書職掌詔命固非輕才所能獨任自晉建國常命宰相參領中興以來益重其任故能王言彌徽德音四塞又曰和嶠為中書令荀勗為監嶠意抗直鄙荀巧佞以意氣加之專車而坐自此監令乃使異車臧榮緒晉書曰潘尼性淡退唯以著述為事永興末為中書令晉陽秋曰王洽除中書令時年二十九將辭之從兄朗之遺書曰弟今二十九便居清顯要任敢不敬以先旨為弟啟義讓之路焉若弟年至四五十之間雖復超登公輔亦非吾所豫况降此以還者耶洽遂不拜又曰溫嶠上䟽曰臣才短學淺文義不通中書之職酬對無方斟酌重輕豈唯文䟽而巳自非望士良才何可妄居斯任累辭得止晉中興書曰肅祖以溫嶠為散騎常侍侍講太寧初手詔曰卿既以令望忠允之懷著於周旋且文清而旨遠宜居深密今欲以卿為中書令朝論咸以為宜又曰王洽字敬和顯宗時王洽為中書令帝曰敬和清裁昔為中書郎吾尚小數呼見意甚親之今以為中書令欲共講文章之事也又曰褚裒授衛將軍中書令裒以中書銓管詔命不宜以親居之固讓晉令曰中書為詔令記會時事典作文書也晉制曰中書令銅印墨綬進賢兩梁冠絳朝服佩水蒼玉乘軺車晉諸公讚曰陳准為中書令張華為監准與華俱處機密而推崇之每直日有詔書無小大輒先示華了不措意華得詔書不以示准為中號准為中書五郎其從容如此又曰懷帝以繆播為中書令朝事莫不諮之人君之所取信於臣下無以尚也宋書曰傅亮永初元年為中書令直中書省專典詔命以亮任揔國權聽於省見客神虎, SBCK: 黄}
