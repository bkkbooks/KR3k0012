  - {type: variant, offset: 1238, length: 293, content: 之難說也道之難明耶老子曰幸子之不遇治世之君也夫六經先王之陳跡也豈其道哉又曰孔子見聃不許於是繙繙堆聚之皃十二經以說老聃聃曰願聞其要也孟子曰王者之跡息而詩亡詩亡然後春秋作王者諸聖王者也太平道衰王跡止息頌聲不作曰詩亡春秋撥亂作衰晉之乘楚之擣抌魯之春秋一也淮南子曰五行異氣而皆和六蓺異科而皆道溫惠淳良者詩之風也純元敦厚者書之教也清淨條達者易之義也恭儉揖讓者禮之為也寬和簡易者樂之化也剌譏辨議者春秋之靡也故易之失也鬼樂之失也淫詩之失也愚書之失也劫禮之失也亂此六者聖人兼用而裁制之又曰玉石之相類者唯良工能識之書傳之微者唯聖人能論之楊子法方曰或問周官曰立事左氏曰品藻又曰書不經非書也又曰虞夏之書渾渾爾, WYG: ''}
