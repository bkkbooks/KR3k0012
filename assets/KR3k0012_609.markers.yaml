  - {type: variant, offset: 216, length: 0, content: '', SBCK: 興其於中古乎然則伏犧爲上古文王爲中古孔子爲下古也及􅁗燔書而筮卜之事傳者不絶漢書曰京房學易於焦延壽常曰得我道以亡身者京生也東觀漢記曰任丹傳孟氏易作通論七卷丗傳之號曰任君通論後漢書曰孔融荅虞仲翔書曰示所著易傳自啇翟以來舛錯多矣去聖弥逺衆􅀃騁辭曩聞延陵之理樂今覩吾君之治易知東南之美者非但㑹稽之竹箭焉又觀象雲物察應寒温原本禍福與神㑹契可謂探􅄨窮道者也晉書曰王湛字處仲司徒渾之弟也􅀄有隱德人莫能知兄弟宗族皆以爲癡其父永獨異焉兄子濟每輕之甞詣湛見牀頭有周易問曰叔父何用此爲湛曰體中不佳時復看耳濟請言之湛因剖折􅀇理微妙有竒趣皆濟所未聞也濟遂留連弥日累夜自視缺然乃歎曰家有名士三十年而不知濟之罪也北齊書曰權㑹本貧生無僕􅀠􅀄任助教之日􅁪乗驢上下且職事處多每湏經歷及其退食非晚不歸曽夜出城東門鍾漏巳盡㑹唯獨乗驢忽有二人牽頭一人隨後有異生人漸漸}
  - {type: page-break, offset: 216, content: '', id: KR3k0012_SBCK_609-3a}
  - {type: variant, offset: 216, length: 0, content: '', WYG: 興其于中古乎則伏羲為上古文王為中古孔子為下古也及秦燔書而易為卜筮之事傳者不絶漢書曰京房學易於焦延夀嘗曰得我道以亡身者京生也東觀漢記曰任丹傳孟氏易作通論七卷世傳之號曰任居通後漢書曰孔融答虞仲翔書曰示所著易傳自商翟以來舛錯多矣去聖彌逺衆説騁辭曩聞延陵之禮樂今觀吾君之治易知東南之美者非但㑹稽之竹箭焉又觀象雲物察應寒温原本禍福與神㑹契可謂探賾旁通者也晉書曰王湛字處沖司徒渾之弟也初有隱徳人莫能知兄弟宗族皆以為痴其父昶獨異焉兄子濟每輕之嘗詣湛見床頭有周易問曰叔父何用也湛曰體中不佳時復看耳濟請言之湛因剖析𤣥理微妙有竒趣皆濟所未聞也濟遂留連彌日累夜自視缺然乃嘆曰家有名士三十年而不知濟之罪也北齊書曰權㑹本貧生無僕𨽻初任助教之日恒乗驢上下且職事處多每須經厯及其退食非晩不歸曽夜出城東門鐘漏已盡㑹唯獨乗驢忽有二人一人牽頭一人隨後有異生人漸漸}
