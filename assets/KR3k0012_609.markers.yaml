  - {type: variant, offset: 855, length: 20, content: 深言經學李石因奏施士丐春秋可讀上曰朕嘗覽, WYG: 三復流涕門人受業者皆廢蓼莪}
  - {type: variant, offset: 856, length: 951, content: 言經學李石因奏施士丐春秋可讀上曰朕嘗覽之穿鑿之學貴為異同耳學者如鑿井然得美水則已何必辛苦旁求然後為得也廣雅曰三墳分也論三才之分天地人之治其體有三也五典鎮也制作教法所以鎮之上下其等有五八索著素王之法若孔子者聖而不王制此法者有八也九丘者丘區也別九州土氣教化所宜施者也此皆三王以前上至羲皇時書也今皆亡唯堯典在易變易也禮體也得事體也詩志所之也敷布其義謂之賦事類相比似謂之比言王政事謂之雅稱頌成功謂之頌隨作者之志而別名之也尚書上也以堯為上始而書其時事春秋冬夏終而歲成春秋書人事卒歲而究備春秋溫涼中象政和也故舉以為名也國語記諸國君臣相與言語謀議之得失也莊子曰詩以導志書以導事禮以導行樂以導和易以導陰陽春秋以導名分其數散於天下而設於中國者百家之學時或稱而導之皆導古之人陳跡耳而後不能常稱哉又曰孔子謂老聃曰丘治詩書禮樂易春秋六經以為文矣干七十君論先王之道明周邵之跡一無所用甚矣夫人之難說也道之難明耶老子曰幸子之不遇治世之君也夫六經先王之陳跡也豈其道哉又曰孔子見聃不許於是繙繙堆聚之皃十二經以說老聃聃曰願聞其要也孟子曰王者之跡息而詩亡詩亡然後春秋作王者諸聖王者也太平道衰王跡止息頌聲不作曰詩亡春秋撥亂作衰晉之乘楚之擣抌魯之春秋一也淮南子曰五行異氣而皆和六蓺異科而皆道溫惠淳良者詩之風也純元敦厚者書之教也清淨條達者易之義也恭儉揖讓者禮之為也寬和簡易者樂之化也剌譏辨議者春秋之靡也故易之失也鬼樂之失也淫詩之失也愚書之失也劫禮之失也亂此六者聖人兼用而裁制之又曰玉石之相類者唯良工能識之書傳之微者唯聖人能論之楊子法方曰或問周官曰立事左氏曰品藻又曰書不經非書也又曰虞夏之書渾渾爾深大商書灝灝爾夷廣周書噩噩爾不阿附也下周者其書憔悴乎下周者秦言酷烈也又曰好書不能要諸仲尼書肆也李軌注曰賣書市又曰說天者莫辨乎易說事者莫辨乎書說體者莫辨乎禮說志者莫辨乎詩說理者莫辨乎春秋又曰或問聖人之經不可使易知歟曰不可天俄而可度則其覆物也淺矣地俄而可測則其載物也薄矣大哉天地之為萬物郭五經之為眾說郛抱朴子曰正經為道德之淵海子書為增深之川流猶北辰之佐三辰林薄之禆高岳也又曰隱士以三墳為金玉五典為琴箏講肆為鍾鼓百家為笙簧孔融與諸卿書曰鄭康成多臆說人見其名學謂有所出也證案大較要在五經四部書如非此文近為妄矣若子所執以為郊天鼓必當騏驎之皮寫孝經本當曾子家策乎顏, SBCK: 致顔}
