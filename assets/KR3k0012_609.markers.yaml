  - {type: variant, offset: 220, length: 2, content: 失煩, SBCK: 遂誦易經上篇一卷不盡前後二人忽然離散齊書曰張緒長於周易言精理奥見宗一時常云何平叔所不解易中七事梁書曰伏曼容字公儀平昌安丘人少篤學善考易倜儻好大言常曰何晏疑易中九事以吾觀之晏了不學也唐書曰文宗時裴通自􅀕酒改詹事因中謝上知通有易學因訪以精義仍命進所習經本著易􅀇解并揔論二十卷易禦㓂十三卷易洗心二十卷丗􅀃曰殷荆州仲堪曽問逺公云易以何爲體荅曰易以感爲體曰銅山西崩靈鍾東應便是易也淮南子曰孔子讀易至於損益未甞不喟然而歎曰或欲利之適足以害之或欲害之適足以利之利害禍福之門不可不察劉向別傳曰所校讎中易傳淮南九師道訓除復重定著十二篇淮􅀯王聘善爲者九人從之採獲故中書署曰淮南九師書王叔師正部曰易與}
