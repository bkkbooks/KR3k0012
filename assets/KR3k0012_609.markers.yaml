  - {type: variant, offset: 216, length: 0, content: '', krp: 興其於中古乎然則伏犧爲上古文王爲中古孔子爲下古也及秦燔書而筮卜之事傳者不絶漢書曰京房學易於焦延壽常曰得我道以亡身者京生也東觀漢記曰任丹傳孟氏易作通論七卷丗傳之號曰任君通論後漢書曰孔融荅虞仲翔書曰示所著易傳自啇翟以來舛錯多矣去聖弥逺衆說騁辭曩聞延陵之理樂今覩吾君之治易知東南之美者非但㑹稽之竹箭焉又觀象雲物察應寒温原本禍福與神㑹契可謂探賾窮道者也晉書曰王湛字處仲司徒渾之弟也𥘉有隱德人莫能知兄弟宗族皆以爲癡其父永獨異焉兄子濟每輕之甞詣湛見牀頭有周易問曰叔父何用此爲湛曰體中不佳時復看耳濟請言之湛因剖折玄理微妙有竒趣皆濟所未聞也濟遂留連弥日累夜自視缺然乃歎曰家有名士三十年而不知濟之罪也北齊書曰權㑹本貧生無僕隷𥘉任助教之日恒乗驢上下且職事處多每湏經歷及其退食非晚不歸曽夜出城東門鍾漏巳盡㑹唯獨乗驢忽有二人牽頭一人隨後有異生人漸漸}
