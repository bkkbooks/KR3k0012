  - {type: variant, offset: 262, length: 0, content: '', SBCK: 事之趙孟曰武請受其卒章卒章曰心乎愛矣遐不謂矣中心藏之何日忘之趙孟欲子産之見規誨子太叔賦野有蔓草野有蔓草詩鄭風取其邂逅相遇適我願􅀆趙孟曰吾之惠也太叔喜於相遇故趙孟愛其惠印叚賦蟋蟀蟋蟀詩唐風曰無以太康職思其居好樂無荒良土瞿瞿言瞿瞿然顧禮儀之所趙孟曰善哉保家之主也吾有望矣公孫叚賦桑扈桑扈詩小雅義取君子有禮文故能受天之祐趙孟曰匪交匪敖福將焉往􅀂保是言也欲辭福禄得乎卒享文子告叔向曰伯有將爲戮矣詩以言志志誣其上而公怨之以爲賔榮言誣則鄭伯未有其實趙倡賦詩以自寵其能乆乎幸而後亡言必先亡叔向曰然巳侈所謂不及五稔者夫子之謂矣又曰楚靈王與子革語左史􅀝相趍過倚相楚史名也王曰是良史也子善視之是能讀三墳五典八索九丘皆古書名對曰臣甞問焉昔穆王欲肆其心周穆}
  - {type: page-break, offset: 262, content: '', id: KR3k0012_SBCK_609-5a}
  - {type: variant, offset: 262, length: 0, content: '', WYG: 事之趙孟曰武請受其卒草卒章曰心乎愛矣遐不謂矣中心藏之何日忘之趙孟欲子産之見規誨子太叔賦野有蔓草野有蔓草詩鄭風取其邂逅相遇適我願兮趙孟曰吾子之恵也太叔喜於相遇故趙孟受其恵印段賦蟋蟀蟋蟀詩唐風曰無以大康職思其居好樂無荒良士瞿瞿言瞿瞿然顧禮儀趙孟曰善哉保家之主也吾有望矣公孫段賦桑扈桑扈詩小雅義取君子有禮文故能受天之祜趙孟曰匪交匪敖福將焉往若保是言也欲辭福禄得乎卒享文子告叔向曰伯有將為戮矣詩以言志志誣其上而公怨之以為賔榮言誣則鄭伯未有其實趙孟倡賦詩以自寵其能久乎幸而後亡言必先亡叔向曰然已侈所謂不及五稔者夫子之謂也又曰楚靈王與子革語左史倚相趨過倚相楚史名也王曰是良史也子善視之是能讀三墳五典八索九丘皆古書名對曰臣嘗問焉昔穆王欲肆其心周穆}
