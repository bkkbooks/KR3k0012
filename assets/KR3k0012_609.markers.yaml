  - {type: variant, offset: 225, length: 2, content: 失亂, SBCK: 織經營天道以成人事金樓子曰按周禮筮人氏掌三易夏曰連山殷曰歸藏周曰周易解此不同按杜子春云連山伏犧也歸藏黄帝也難曰按禮記曰我欲觀殷道得坤乾焉仐歸藏先以坤後乾則知是殷明矣推歸藏旣在殷制連山理是夏書詩卜啇詩序曰詩者志之所之也情動於中而形於言也又曰在心爲志發言爲詩漢書曰通其言謂之詩}
