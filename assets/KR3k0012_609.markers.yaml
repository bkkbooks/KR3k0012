  - {type: variant, offset: 264, length: 0, content: '', WYG: 肆極也周行天下將皆必有車轍馬跡焉祭公謀父作祈招之詩以止王心謀父周卿士祈父周司馬掌甲兵之職招其名也祭公方諫遊行故指司馬官而言也此逸詩王是以獲没於祗宫獲没不見簒臣問其詩而不知也若問逺焉其焉能知之王曰子能乎對曰能其詩曰祈招之愔愔式昭徳音愔愔安和貌也式用也思我王度式如玉式如金金玉取其堅重形民之力而無醉飽之心言國之用民當随其力任如金冶之器随器制形故言形民之力去其醉飽過盈之心王揖而入饋不食寢不寐數月深感子革之言論語孔子曰小子何莫學夫詩詩可以興可以觀可以羣可以怨邇之事父逺之事君多識於鳥獸草木之名又曰孔子謂伯魚曰汝為周南召南矣乎人而不為周南召南其猶正牆面而立也與又曰起予者商也商子夏始可與言詩已矣又曰詩三百一言以蔽之曰思無邪荘子曰詩以道志毛詩正義曰昔孔子刪古詩三千餘篇上取諸商下取諸魯皆絃歌以合韶武之音凢三百一十一篇至秦滅學亡六篇今在者有三百五篇正義云初孔子授訓卜商商為之序以授魯人申曾曽授魏人李克克授魯人孟仲子仲子授根牟子根牟子授趙人荀卿荀卿授漢人魯國毛亨作詁訓傳以授於趙國毛萇時人謂亨為大毛公萇為小毛公以其所傳故名其詩曰毛詩又曰東漢鄭𤣥取毛詩訓詁所不盡及同異者續為之注解謂之箋箋薦也言薦成毛意也詩含神霧曰集微揆著上統元皇下序四始羅列五際宗均注曰集微揆著若綿綿𤓰瓞人之初生揆其始是必将至著有天下也又曰詩者天地之心君徳之祖百福之宗萬物之戸也詩推度災曰建四始五際而八節通卯酉之際為革政午亥之際為革命}
