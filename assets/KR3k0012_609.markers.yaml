  - {type: variant, offset: 201, length: 0, content: '', SBCK: 出期節者􅀂以至日閉関啇旅不行后不省方之比也􅂏言變化繫設􅀋迹孝經援神契曰易長於變書考命行授河宋均注曰授河者授河洛以考命行也帝王丗紀曰庖犧氏作八卦神農重之爲六十四卦黃帝堯舜引而伸之分爲二易至夏人因炎帝曰連山殷人因黄帝曰歸藏文王廣六十四卦著九六之爻謂之周易周易正義曰㐲犧重卦周公作爻辭此􅀃與帝王丗紀不同又孔氏作十篇亦曰十翼􅀄卜啇爲易傳至西漢傳之有能名家者有施讎孟喜梁丘賀京房費直髙相又東漢鄭􅀇魏王弼並注易施孟諸家自漢及魏並得立而傳者甚衆至西晉梁施髙三氏亡孟京二氏有書無師而鄭􅀇王弼所傳則費氏之學漢書蓺文志曰虙犧氏仰觀象於天俯觀法於地觀鳥獸之文與地之冝近取諸身逺取諸物於是始作八卦以通神明之德以􅀋萬物之情文王於是重易六爻作上下篇孔氏爲之􅂏象繫辭文言序卦之屬十篇}
  - {type: page-break, offset: 201, content: '', id: KR3k0012_SBCK_609-2b}
  - {type: variant, offset: 201, length: 0, content: '', WYG: 出期節者若至日閉闗商旅不行后不省方之類也象言變化繫設類跡孝經援神契曰易長於變書考命行授河宋均注曰授河者授河洛以考命行也帝王世紀曰庖犧氏作八卦神農重之為六十四卦黄帝堯舜引而伸之分為二易至夏人因炎帝曰連山殷人因黄帝曰歸藏文王廣六十四卦著九六之爻謂之周易周易正義曰伏羲重卦周公作爻辭此説與帝王世紀不同又孔氏作十篇亦曰十翼初卜商為易傳西漢之能名家者有施讐孟喜梁丘賀京房費直髙相又東漢鄭𤣥魏王弼並注易施孟諸家自漢及魏得並立而傳者甚衆至西晉梁施高三氏亡孟京二氏有書無師而鄭𤣥王弼所傳則費氏之學漢書藝文志曰虙犧氏仰觀象於天俯觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之德以類萬物之情文王於是重易六爻作上下篇孔氏為之彖象繫辭文言序卦之屬十篇}
