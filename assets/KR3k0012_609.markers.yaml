  - {type: variant, offset: 2177, length: 657, content: 州莫過乎尚書和人情動風俗莫過乎樂治刑名審法術莫過乎商韓載百王紀治亂莫過乎史漢孟軻之徒溷淆其間世人見其才易登其意易過於是家著一書人書一法雅人君子投筆硯而高視傅子曰詩之雅頌書之典謨文足以相副翫之若近尋之若遠浩浩焉文章之淵府也袁淮正論曰公羊高道聽塗說之書欲以鄉曲之辯論聖人之經非其任也潛夫論曰索物於夜室者莫良於火燭索道於當世者莫良於典籍物理論曰夫五經則海也他傳記則四瀆也諸子則涇渭也至于百川溝洫畎澮茍能通陰陽之氣達水泉之流以四海為歸者皆益也孫綽子曰衘轡衡軛無心於馬而所以御馬典籍禮度無心於治而所以為治又曰典籍文章之言也治出於天辭宣於人杜子新語曰眾儒覩春秋之記錄政之失得以立正義以為聖人起當復作春秋也自通士若太史公亦以為然余謂之否夫聖賢所陳皆同取道德仁義以為奇論異文而俱善可觀猶人食皆用魚肉菜茹以為生熟異和而復俱美也博物志曰聖人制作曰經賢曰著述曰記曰章句曰解曰論曰讀文心雕龍曰自夫子刪述而大寶啟耀於是易張十翼書摽七觀詩列四始禮正五經春秋五例義既埏乎性情辭亦匠乎文理故能開學養政昭明有融然而道心惟微聖謨卓絕墟宇重峻吐納者深譬萬鈞之鴻鍾無錚錚之細響矣夫易惟談天入神致用故繫稱旨遠辭文言中事隱韋編三絕固哲人之驪淵也書實紀言而誥訓茫昧通乎爾雅則文意曉然故子貢歎書昭昭若日月之明離離如星辰之行言昭灼也詩主言志詁訓周書摛風裁興藻詞譎喻溫柔在誦最附哀矣禮以立體據事章條纖曲執而後顯採掇片言莫非寶也春秋辯理一字見義五石六鶂以詳備成文雉門兩觀以先後顯旨婉章志晦源已邃矣尚書則覽文如詭而尋理則暢春秋則觀辭立曉而訪義方隱此聖文殊致表裏之異體者也, SBCK: ''}
