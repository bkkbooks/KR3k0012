  - {type: variant, offset: 1532, length: 275, content: 大商書灝灝爾夷廣周書噩噩爾不阿附也下周者其書憔悴乎下周者秦言酷烈也又曰好書不能要諸仲尼書肆也李軌注曰賣書市又曰說天者莫辨乎易說事者莫辨乎書說體者莫辨乎禮說志者莫辨乎詩說理者莫辨乎春秋又曰或問聖人之經不可使易知歟曰不可天俄而可度則其覆物也淺矣地俄而可測則其載物也薄矣大哉天地之為萬物郭五經之為眾說郛抱朴子曰正經為道德之淵海子書為增深之川流猶北辰之佐三辰林薄之禆高岳也又曰隱士以三墳為金玉五典為琴箏講肆為鍾鼓百家為笙簧孔融與諸卿書曰鄭康成多臆說人見其名學謂有所出也證案大較要在五經四部書如非此文近為妄矣若子所執以為郊天鼓必當騏驎之皮寫孝經本當曾子家策乎顏, WYG: 致顔}
