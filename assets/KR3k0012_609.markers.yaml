  - {type: variant, offset: 193, length: 4, content: 屬辭比事, WYG: 不可逺為道也屢遷變動不居周流六虛上下無常剛柔相易不可以為典要又曰易之興也其於中古乎作易者其有憂患乎是故履徳之基也謙徳之柄也復徳之本也恒徳之固也損徳之修也益徳之裕也困徳之辨也井徳之地也巽徳之制也又曰夫易聖人所以極深而研幾也唯深也故能通天下之志唯幾也故能成天下之務説卦曰昔者聖人之作易也将以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦分隂分陽迭用柔剛故易六位而成章又曰昔者聖人作易也幽贊於神明而生蓍叅天兩地而倚數觀變於隂陽而立卦發揮於剛柔而生爻和順於道德而理於義窮理盡性以至於命}
