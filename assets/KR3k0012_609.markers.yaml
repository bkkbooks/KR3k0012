  - {type: variant, offset: 264, length: 0, content: '', SBCK: 肆極也周行天下將皆必有車轍馬跡焉􅀕公謀父作祈招之詩以止王謀父周卿士祈父周司馬掌甲兵之職招其名也􅀕公方諌遊行故指司馬官而言也此詩逸王是以獲没於祇宫獲没不見􅆲臣問其詩而不知􅀂問逺焉能知乎王曰子能乎對曰能其詩曰祈招之愔愔式昭德音愔愔安和皃也式用也思我王度式如玉式如金金玉取其堅重形民之力而無醉飽之心言國之用人當隨其力往往如金治之器而制形故言形民之力去其醉飽過盈之也王揖而入饋不食寢不寐數日深感子革之言論語孔子曰小子何莫學夫詩詩可以興可以觀可以羣可以怨邇之事父逺之事君多識於鳥獸草木之名又曰孔子謂伯魚曰汝爲周南召南矣乎人而不爲周南召南其猶正墻面而立也歟又子曰起子者啇也商子夏始可與言詩巳矣又曰詩三百一言以蔽之曰思無邪莊子曰詩以道志毛詩正義曰昔孔子刪古詩三千餘篇上取諸啇下取諸魯皆絃歌以合韶武之音凢三百一十一篇至秦滅學亡六篇今在者有三百五篇正義云􅀄孔子授訓卜啇啇爲之序以授魯人曽申申授魏人李克克授魯人孟仲子仲子授振牟子振牟子授趙人荀卿荀卿授漢人魯國毛享作詁訓傳以授於趙國毛萇時人謂享爲大毛公萇爲小毛公以其所傳故名其詩曰毛詩又曰東漢鄭􅀇取毛氏詁訓所不盡及同異者續爲之注解謂曰箋箋薦也言薦成毛意也詩含神霧曰集微揆著上統元皇下序四始羅列五際宋均注曰集微揆著􅀂綿綿􅀲瓞人之􅀄生揆其如是必將至著王有天下也又曰詩者天地之心君德之祖百福之宗萬物之户也詩推度災曰建四始五際而八節通夘酉之際爲革政午亥之際爲革命}
