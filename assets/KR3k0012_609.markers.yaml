  - {type: variant, offset: 2075, length: 0, content: '', SBCK: 古文尚書孔安國以今文尚書字讀之又古文尚書序曰伏生老言不可曉使其女傳言授晁錯漢書蓺文志曰易曰河出圖洛出書書之所起逺矣至孔子篡焉音撰上斷於堯下訖于􅁗凢百篇而爲之序劉歆七畧曰尚書直言也始歐陽氏先名之大夏侯小夏侯立於學官三家之學於今傳之陸德明經典釋文曰漢宣帝太始中河内女子得㤗誓一篇獻之與伏生所誦合三十篇漢丗行之漢書曰元帝時豫章内史枚頥奏上孔傳古文尚書中亡舜典一篇乃取王肅注堯典愼徽}
