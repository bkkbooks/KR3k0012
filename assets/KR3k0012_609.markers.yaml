  - {type: variant, offset: 476, length: 246, content: 內七業俱興齊書曰臧榮緒常以宣尼庚子日生其日陳五經拜之自號被褐先生唐書曰長慶中上謂兵部侍郎薛放曰為學經史何先放對曰經者古先聖之至言多仲尼所發明皆天人之極致誠萬代不刊之典也史則歷紀成敗雜書善惡各錄當時之事亦是鑒其興亡然得失相參是非無所准的固不可以典籍為比論也上曰六經所尚不一至學之士白首不能盡通如何得其要乎對曰論語者六經之精華孝經者人倫之大本窮理執要真可謂聖人至言是以漢朝論語首列學官光武令虎賁之士皆習孝經玄宗親為孝經注解皆使當時大理海內久安人知孝節氣感和樂之所致也上曰聖人謂孝為至德要道其信然矣, SBCK: 篇}
