  - {type: variant, offset: 58, length: 178, content: 陣曰戰大崩曰敗績得儁曰剋覆而敗之曰取某師京師敗績曰王師敗績于某又曰夫其敗也如日月之蝕何損於明又曰及齊師戰于乾時我師敗績又曰公及邾師戰于井陘我師敗績又曰鄭伯侵陳大獲往歲鄭伯請成於陳五父諫曰親仁善鄰國之寶也陳侯不從故敗又曰晉侯及秦師戰于彭衙秦師敗績又曰宋師及齊師戰于獻齊師敗績又曰息侯伐鄭鄭伯與戰于境息師大敗而還君子是以知息之將亡也不度德鄭莊賢也不量力息國弱也, SBCK: 然費人無歸}
