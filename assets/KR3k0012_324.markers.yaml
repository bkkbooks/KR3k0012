  - {type: variant, offset: 770, length: 1, content: 敗, WYG: 凢旬有二日間遣使説諭示以善惡山盗邀邵出乃以儒服出城致之不疑因皆降之又曰范希朝為朔方莭度使至靈武突厥别部有沙陀者北方推其勇勁希朝誘致之自甘州舉族來歸衆且萬人其後以之討賊所至有功降左傳曰蔡穆侯將許僖公以見楚子於武城許男面縳銜璧大夫衰絰士輿櫬楚子問諸逄伯對曰昔武王尅殷㣲子啓如是武王親釋其縳受其璧焚其櫬禮而命之使復其所楚子從之史記曰楚莊王圍鄭三月剋之入自皇門鄭伯肉􅃝牽羊以逆曰孤實不天不能事君懷怒以及敝邑孤之罪也敢不唯命是聽又曰周武王伐紂剋殷㣲子乃持其祭噐於軍門肉袒面縳左牽羊右把茅膝行而前以告於是武王乃釋㣲子復其爵後漢書曰武都㕘狼羌為㓂殺長史馬援將四千餘人徃擊之不與戰羌遂窮困悉降又曰陳宫降曹操曰奈卿老母何宫曰老母在公不在宫也夫以孝治天下者不害人之親操復曰奈卿妻子何宫曰聞覇王之主不絶人之嗣因請就刑遂出不顧操為之涕泣遂殺之傳首許市又曰耿秉與竇固至車師後王安得震怖從數百騎出迎秉與固司馬蘓安欲全功歸固即馳謂安得曰漢貴將獨有奉車都尉天子姊壻固尚光武女陽公主明}
