  - {type: variant, offset: 1630, length: 2, content: 辭死, SBCK: 行臺州鎭悉降􅀜東平合州五十郡一百六十二縣三百八十五戸三百三十萬二千五百二十八口二千萬六千八百八十六唐書曰王行夲仕隋以軍功爲朝散大夫堯君素之鎮河東也令行夲統精甲七百人及君素􅀍誅於東樓行夲率兵赴之不及因捕殺君素}
