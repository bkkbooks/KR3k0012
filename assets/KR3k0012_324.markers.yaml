  - {type: variant, offset: 1007, length: 1, content: 十, SBCK: 二千以焦離堡降燧廷光道旣絶乃因率其下出降燧乃以數􅀐徑入城處之不疑莫不畏服衆大呼曰吾復得爲王人矣渾瑊私歎謂叅佐曰瑊謂馬公用兵與僕不相逺但恠累敗田恱今覩其行師料敵僕不逮逺矣又曰曹王臯爲衡州刺史􅀄湖南􅇛練使辛京杲遣將軍王國良鎭武崗京杲侵刻之又虐其士卒國良以兵叛因據山河守險刼行旅以自給詔徴荆南江西黔桂兵誅之二歳不下乃以臯爲潭州刺史湖南都􅇛練使臯率諸軍至武崗國良阻險兵不得進臯乃謂諸軍曰國良怨京杲刻害夲非反也其情易不如降之乃三遺之書國良因請降未得其情臯曰其心屈矣乃捨軍自稱使者乗偏舟直造其壘曰曹王也國良遂出降又曰于邵爲巴州刺史時歳儉夷獠相聚山澤爲盗數千百人來圍州城邵撫勵州兵與之拒戰凡旬有二日間遣使􅀃喻示以善惡山盗邀邵出乃以儒服出城致之不疑因皆降之又曰范希朝爲朔方節度使至靈武突厥別部有沙陁者北方推其勇勁希朝誘致之自甘州舉族來歸衆且}
