  - {type: variant, offset: 1535, length: 7, content: 減死論群心咸悅, SBCK: 書招戎戎疑必賣巳遂不敢降東觀記云戎至期日灼􅀛卜降兆不中折遂止不降而反與􅁗豐合彭出兵攻戎數月大破之呉書曰壬申王濬受皓之降解􅅞焚櫬延請相見晉陽秋曰濬平呉濬収其圖籍領州四郡三十三縣三百二十三户五十二萬三千男女口二百三十萬後宫五千餘人晉書曰樊雅據譙郡祖逖使桓宣􅀃之雅與宣置酒結友遣子隨宣詣逖少日雅便自詣逖逖遣雅還撫其衆僉謂前數罵辱逖懼罪不敢降雅復􅐬城自守逖徃攻之復遣宣入􅀃雅即斬異巳者遂出降}
