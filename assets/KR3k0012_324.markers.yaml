  - {type: variant, offset: 1628, length: 1, content: 配, WYG: 衆與温戰于笮橋叅軍襲護戰沒衆懼欲退而鼓吏誤鳴進鼓於是攻之勢衆大潰温乗勢直焚其小城勢遂夜遁九十里至晉夀葭萌城其將軍鄧嵩咎堅觀勢降乃面縳輿櫬請命温解縳焚櫬送于京師温停蜀三旬舉賢旌能百姓大悦齊書曰始興王鑑鎮益州益州刼帥韓武方棠聚黨千餘人斷流為暴郡縣不禁行旅斷絶鑑行至上明武方乃出降長史虞悰等咸請殺之鑑曰武方為暴積年所不能制今降而被殺失信且無以勸善於是啓臺果被宥自巴西蠻夷兇惡皆望風降附三國典畧曰侯景黨儀同三司馬世雲率其所領降于慕容紹宗仍以鐵騎五千夾擊景景謂其衆曰汝軰家口髙登悉已殺之努力何慮無妻子待向江東當還入鄴用汝軰悉作本州刺史衆信之紹宗遥呼曰爾舉家悉在但能歸來官勲如舊乃被髪向北斗以誓之於是景衆大潰爭赴渦水為之不流後周書曰武帝平齊齊王至帝降自阼階以賔主之禮相見髙湝在冀州擁兵未下遣上柱國齊王憲與柱國隨公楊堅率軍討平之齊定州刺史范陽王髙紹義叛入突厥齊}
