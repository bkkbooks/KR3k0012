  - {type: variant, offset: 1094, length: 263, content: 天性不言而動言相感也且厲五千鐵騎於北隰之中下濕曰隰起火為應吾當自內出奮揚威武決命於斯不然吾亡之後天下雖廣汝欲求安足之地其可得乎紹候得其書獻帝春秋候者得書紹使陳琳易其詞即此書如期舉火瓚以為救至遂便出戰紹設伏瓚遂大敗復還保小城自計必無全乃悉縊其姉妹妻子然後引火自焚魏志曰太祖在長安使曹仁討關羽於樊又遣于禁助仁秋大霖雨漢水溢平地水數丈禁等七軍皆沒禁與諸將登高望水無所迴避羽乘大舟就攻禁遂降會孫權擒羽獲其眾禁復在吳文帝踐祚權稱藩遣之帝引見禁鬚髮皓白形容燋悴泣涕頓首帝慰喻以荀林父孟明視之事魏書詔曰昔荀林父敗績於邲孟明喪師於郩晉秦不替使, SBCK: ''}
