  - {type: variant, offset: 1628, length: 1, content: 配, SBCK: 衆與温戰于笮橋叅軍襲護戰没衆懼欲退而鼓吏誤鳴進鼔於是攻之勢衆大潰温乗勝直進焚其小城勢遂夜遁九十里至晉壽葭萌城其將軍鄧嵩昝堅勸勢降乃面􅅞輿櫬請命温解􅅞焚襯送于京師温亭蜀三旬舉賢旌善百姓大恱齊書曰始興王鑑鎭益州益州刼帥韓武方常聚黨千餘人斷流爲􅁀郡縣不禁行旅斷絶鑑行至上明武方乃出降長史虞悰等咸請殺之鑑曰武方爲􅁀積年所不能制今降而􅀍殺失信且無以勸善於是啓臺果􅀍宥自巴西變夷􅇯惡皆望風降附三國典略曰侯景黨儀同司馬丗雲率其所領降于慕容紹宗仍以鐵􅀐五千夾而擊景景謂其衆曰汝軰家口髙澄悉巳殺之弩力何慮無妻子待向江東當還入鄴用汝輩悉作夲州刺史衆信之紹宗遥呼曰尓居家悉在但能歸來官勲如舊乃􅀍髪向北斗以誓之於是景衆大潰争赴渦水爲之不流後周書曰武帝平齊齊主至帝降自阼階以賔主之禮相見髙湝在兾州擁兵末下遣上柱國齊王憲與柱國隨公楊堅率軍討平之齊定州刺史范陽王髙紹義叛入突厥齊}
