  - {type: variant, offset: 823, length: 2, content: 鄧禹, SBCK: 仁壽􅀄山獠作亂出衛􅀇爲資州刺史以鎭撫之􅀇旣到官時獠攻圍大牢鎭􅀇單􅀐造其營謂群獠曰我是刺史衘天子詔安養汝等勿驚懼也諸賊莫敢動於是􅀃以利害渠帥感恱解兵而去前後歸附者十餘萬口髙祖大恱賜縑二千疋除遂州惣管仍令劒南安撫唐書曰馬燧討李懷光自京師}
  - {type: variant, offset: 823, length: 2, content: 鄧禹, WYG: 太山賊叔孫無忌等暴橫一境州郡不能討衛羽説第五種曰中國安寧忘戰日久而太山險阻冦猾不制今雖有精兵難以赴敵羽請譬降之種敬諾羽乃徃備説禍福無忌即帥其黨}
  - {type: variant, offset: 823, length: 2, content: 鄧禹, krp: 仁壽𥘉山獠作亂出衛玄爲資州刺史以鎭撫之玄旣到官時獠攻圍大牢鎭玄單騎造其營謂群獠曰我是刺史衘天子詔安養汝等勿驚懼也諸賊莫敢動於是說以利害渠帥感恱解兵而去前後歸附者十餘萬口髙祖大恱賜縑二千疋除遂州惣管仍令劒南安撫唐書曰馬燧討李懷光自京師}
  - {type: variant, offset: 826, length: 2, content: 車騎, SBCK: 渾瑊駱元光韓遊瓌合軍次于長春宫懷光遣驍}
