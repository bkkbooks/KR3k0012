  - {type: variant, offset: 2384, length: 232, content: 劉統馮雅等聚黨四百人掩沒潯陽城建威將軍劉懷肅討平之其黨自相斬以降玄入江陵太守馮談勸使更下戰玄欲步出漢川投梁州而人情崩阻不可復合益州刺史毛璩弟璠卒璩使其從孫祐之參軍費恬送璠喪葬江陵璩弟子脩之為玄屯騎校尉玄計窮欲走漢中脩之誘以入蜀遂與石康等乘艦泝江數十里恬與祐之迎擊玄益州督護馮遷斫玄玄曰是何人耶敢殺天子遷曰欲殺天子之賊耳遂斬玄首并石康等五級庚頤之及殿中監萬盖丁仙期皆死之玄年六十息昇六歲云我是豫章王諸軍勿見殺遂送至江陵市斬之三十國春秋曰後燕慕容垂遣其子寶步騎七萬伐後, SBCK: 周文帝征東}
