  - {type: variant, offset: 729, length: 2, content: 鄧禹, SBCK: 􅀍害時鮪與其謀與音預又諌更始無遣蕭王北伐自知罪􅀷彭還具言於帝帝曰夫建大事者不忌小怨鮪今􅀂降官爵可保况誅罰乎河水在此吾不食言指河水爲信言其明白也彭復徃告鮪鮪從城上下雲索曰必信可乗此上彭趣索欲上趣向也鮪見其誠即許降後五日鮪將輕􅀐詣彭顧勑謂部將曰堅守待我我􅀂不還諸君徑將大兵上轘轅歸郾王更始傳尹尊爲郾王乃面縳與彭俱詣河陽東觀記曰諸行在所河津亭帝即解其􅅞召見之復令彭夜與鮪歸城明旦悉其衆出降拜鮪爲平狄將軍封扶溝侯蜀志曰􅀜羽圍魏氏之樊留兵將備公安}
  - {type: page-break, offset: 729, content: '', id: KR3k0012_SBCK_324-2b}
  - {type: variant, offset: 729, length: 2, content: 鄧禹, WYG: 被害時鮪要城固與其謀與音預又諌更始無遣蕭王北伐自知罪深彭還具言於帝帝曰夫建大事者不忌小怒鮪今若降官爵可保况誅罰乎河水在北吾不食言指河水為信言其明白也彭復往告鮪鮪從城上下雲索曰必信可乗此上彭趣索欲上趣向也鮪見其誠即許降後五日鮪將輕騎詣彭顧勑謂部將曰堅守待我若不還諸君徑將大兵上轘轅歸郾王尊更始傳尹為郾王乃面縛與彭俱詣河陽東觀記曰詣行在所河津亭帝即解其縛召見之復令彭夜與鮪歸城明旦悉其衆出降拜鮪為平狄將軍封扶溝侯蜀志曰關雲長圍魏樊城留兵將備公安}
