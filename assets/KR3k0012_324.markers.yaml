  - {type: variant, offset: 1408, length: 2, content: 陸機, SBCK: 武都叅狼羗爲宼殺長吏馬援將四千餘人徃擊之不與戰羗遂窮困悉降又曰陳宫降曹操曰柰卿老母何宫曰老母在公不在宫也夫以孝治天下者不害人之親操復曰柰卿妻子何宫曰聞覇王之主不絶人之嗣因請就刑遂出不顧操爲之泣涕遂殺之傳首許市又曰耿秉與竇固至車師後王安得震怖從數百􅀐出迎秉而固司馬􅂫安欲全功歸固即馳謂安得曰漢貴將獨有奉車都尉天子姉壻固尚光武女沮陽公主明帝姉也爵爲通侯當先降之安得乃還更令其諸將迎秉秉大怒􅀍甲上馬麾其精􅀐徑造固壁言曰車師王降訖今不至請徃梟其首固大驚曰且止將敗事秉厲聲曰受降如受敵遂馳赴之安得惶恐走出門脫帽抱馬足降東觀記曰脫帽趍鳴馬蹄也秉將以詣固其前王亦歸命遂定車師而還又曰太山賊叔孫無忌等􅁀撗一境州郡不能討衛羽􅀃第五種曰中國安寜志戰日乆而太山險阻㓂猾不制今雖有精兵難以赴敵羽請譬降之種敬諾羽乃徃備􅀃禍福无忌即帥其黨與三千餘人降又曰劉盆子遣劉恭乞降曰盆子將百萬衆降陛下何以待之帝曰待汝以不死耳樊崇乃將盆子及丞相徐宣以下三十餘人􅁏􅃝降上所得傳國璽綬更始七尺寳劒及玉壁各一積兵甲冝陽城西與熊耳山齊又曰龐雄與梁慬及耿种歩􅀐萬六千人攻虎澤連營稍前單于惶怖遣左奥鞬曰遂王詣慬乞降慬乃大陳兵受之單于脫帽徒跣面􅅞稽顙納質又曰岑彭與嚴􅀃共守宛漢兵攻之數月城中粮盡人相食彭乃與􅀃舉城降諸將欲斬之大司徒伯􅂛曰彭郡之大吏執心堅守是其節也今舉大事當表義士不如封之以勸其後更始乃封彭爲歸德侯又曰班超復使西域是時于寘王廣德新攻破車遂雄張南于寘國去長安九千六百七十里南與始羗西與姑墨車國去長安九千九百五十里西域南北有大山中央有}
