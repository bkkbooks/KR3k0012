  - {type: variant, offset: 732, length: 2, content: 馮異, SBCK: 南郡呉將吕蒙襲之兵到南郡羽下守將麋芳降蒙入據城盡得羽及將士家屬蒙皆撫慰約令軍中不得干歴人家有求取軍中震僄道不拾遺蒙朝暮使親近存恤􅂄老問所不足病疾者給醫藥飢寒者賜衣粮羽府藏財寳皆封閉以待呉主孫權至羽還路數使人}
