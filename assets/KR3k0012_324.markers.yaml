  - {type: variant, offset: 3284, length: 255, content: 疋馬而歸通勢彌蹙自摩其頸曰要當為國家受人一刀耳勞勉將士未嘗不流涕人亦以此懷之又曰安祿山之亂哥舒翰領兵馬步十五萬賊將崔乾祐會戰初哥舒翰造氈車以氈蒙其車以馬駕之畫以龍虎之狀五色相宣以金銀飾其畫獸之目及爪將衝戰焉因其驚駭擬從而椅角攢戈矢而逐之賊知其計積薪蒭於隘路候氈車至順風縱火焚之駕馬奔駭燒氈車薪蒭煙焰昏黑兩軍不相辯我師謂賊軍在煙焰中遂集弓弩併力射之賊軍抽退盡日矢盡方覺無賊我師眾從關門六七十里路狹北抵黃河南是古岸排蹴進不得賊抽軍從南山設疑曳柴楊塵以同羅詣直習險直透黃河古岸撗截我師我師敗績沉河而死十有二三又曰潼關, SBCK: 文德}
