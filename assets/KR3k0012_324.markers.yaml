  - {type: variant, offset: 735, length: 2, content: 赤眉, SBCK: 蒙相聞蒙輙厚遇其使周旋城中家家致問或手書示信羽人還􅀻相叅訊咸知家問無恙見待過於平時羽吏士無􅋐心㑹權至羽自知􅀌窮乃走交城西至漳郷衆皆委羽而降三國典略曰梁蕭乾字思愓梁秘書監子範之子容止雅正志性恬簡善􅀠書得叔父子雲之法閩中豪帥反叛陳武謂乾曰陸賈南征趙佗歸順隨何奉使黥布來臣追想清風髣髴在目乃令乾徃使諭以逆順渠帥並即欵附北史曰魏可朱渾元歸齊神武聞其來遣平陽太守髙崇持金環一枚賜元并運資粮候接隋書曰劉權爲南海太守行至鄱陽㑹群盗起不得進詔令權召募討之權率兵與賊相遇不與}
