  - {type: variant, offset: 3615, length: 1053, content: 渡餘軍盡散走還入關三國典略曰齊師既敗軍士奔至江者縛荻為筏多被沒溺浮屍翳江至于京先是童謠曰虜馬萬疋入南湖城南酒家使虜奴至是梁軍士以齊兵質酒一人纔得一醉又曰周武伐齊齊主亦於壍北列陣謂高阿郍肱曰戰是耶不戰是耶郍肱曰不如勿戰却守高梁橋安吐根曰一把子賊馬上刺取擲著汾陽中諸內參曰彼亦天子我亦天子彼能懸軍遠來我何為守壍示弱齊主曰此言是也使讓郍肱曰爾富貴足惜性命耶乃填壍南引帝大喜齊主親戰東偏頗有退者淑妃怖曰軍敗矣穆提婆進曰大家去大家去齊主以淑妃奔高梁關奚長樂諫曰半進半退戰家常體今兵眾全整未有傷敗陛下捨比安之御馬一動人情驚擾願速還安撫齊主將從之穆提婆引其肘月曰言何可信齊眾大潰軍資甲仗數百里間委棄山積在陣死者八千餘人齊主夜走至洪洞戍又曰周遣大將軍王軌破陳於呂梁擒其司空南平郡公吳明徹北徐州刺史董安公程文季等俘斬三萬餘人初軌潛於清水入淮口多堅大木以鐵鎖貫車輪橫截水流遏斷舡蕭摩訶謂明徹曰聞王軌正鏁下流其兩邊築城今尚未立若見遣擊之彼必不敢相拒彼城若立則吾屬且為虜矣明徹乃奮髯曰搴旗陷陣將軍事也長筭遠略老夫事也摩訶失色而退一旬之間我兵益至摩訶又請明徹曰今求不得進退無路若潛軍突圍未足為恥願公率步乘車輿徐行摩訶領鐵騎數千騎前後必當使公安達京邑明徹曰弟之此計乃良圖也然老夫受脤專征不能戰勝攻取今被圍逼慚寡無地且步軍既多吾為惣督必須身居其後相率兼行遂欲破堰大軍以舫載馬北譙州刺史裴子烈議曰若決堰下舡舡必順倒不如前遣馬出於事為允會明徹疾篤知事不濟遂從之乃遣摩訶率馬數千前還明徹決堰乘水而退至清口水勢漸微舡礙車輪並不得度軌圍而蹙之明徹力窮就執陳之銳卒於是殲焉衛公兵法曰或若軍有賢智而不能用者敗上下相親而各述己長者敗賞罰不當而眾多怨言者敗知而不敢擊不知而擊之者敗利地利不得而卒多戰阨者敗勞逸無別不曉車騎之用者敗覘候不審而輕敵懈怠者敗行於險道而不知深溝絕澗者敗陣無選鋒而奇正不分者敗凡此十敗非天之殃將之過也夫兵者乍千日而不使不可一時而不勝故白起對秦王曰明王愛其國忠臣愛其名寧伏其重誅不忍為辱軍之將又嚴顏謂張飛曰卿等無狀侵奪我州有斷頭將軍無降將軍也故二將咸重其名節寧就死而不求生者蓋知敗衂之恥斯誠甚矣說苑曰晉荊戰於邲晉師敗績荀林父將歸請死景公將許之士貞伯曰不可城濮之役晉勝于荊夫文公猶有憂色曰子玉猶存憂未歇也困獸猶鬥况國相乎及荊殺子玉乃憙今天或者大警晉也林父之事君進思盡忠退思補過社稷之衛也今殺之是重荊勝也景公曰善乃使復將潘安仁汧馬督誄序曰昔乘兵之戰縣賁父御魯莊公馬驚敗績賁父曰他日未嘗敗績今而敗績是無勇也遂死又曰偏師禆將殞首覆軍者蓋以十數, SBCK: 四}
