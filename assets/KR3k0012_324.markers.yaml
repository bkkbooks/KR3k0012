  - {type: variant, offset: 764, length: 12, content: 鄧禹與赤眉戰敗帝徵禹還勑, SBCK: 開皇末桂州俚李光仕聚衆爲亂詔何稠召募討之師次衡嶺遣使者諭其渠師洞主莫崇解兵降欵桂州長史王文周鏁崇以詣稠所詐宣言}
  - {type: variant, offset: 764, length: 2, content: 鄧禹, WYG: 開皇末桂州俚李光仕聚衆為亂詔何稠召募討之師次衝嶺遣使者諭其渠帥洞主莫崇解兵降桂州長史王文周鏁崇以詣稠所稠宣言曰州縣不能綏飬致使邊民擾叛非崇之罪也乃命釋之引崇共坐并從者四人為設酒食遣之崇大悦歸洞不設備稠至五更掩入其洞悉散俚兵以臨餘賊象州逆帥杜條遼羅州逆帥龎靖等相降欵又曰仁夀初山獠作亂出衛𤣥為資州刺史以鎮撫之𤣥既至官時獠攻圍大牢鎮𤣥單騎造其營謂羣獠曰我是刺史䘖天下詔安飬汝等勿驚懼也諸賊莫敢動於是説以利害渠師感悦解兵而去前後歸附者十餘萬口髙祖大悦賜縑二千疋除遂州總管仍令劒南安撫唐書曰馬燧討李懐光自京師}
  - {type: page-break, offset: 764, content: '', id: KR3k0012_WYG_324-5a, image: WYG0895/WYG0895-0780a.png}
