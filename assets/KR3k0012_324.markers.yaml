  - {type: variant, offset: 764, length: 12, content: 鄧禹與赤眉戰敗帝徵禹還勑, krp: 開皇末桂州俚李光仕聚衆爲亂詔何稠召募討之師次衡嶺遣使者諭其渠師洞主莫崇解兵降欵桂州長史王文周鏁崇以詣稠所詐宣言}
  - {type: variant, offset: 767, length: 2, content: 赤眉, WYG: 渾瑊駱元光韓逰懷合軍次于長春宫懷光令驍將徐廷光以精卒六千守城兵械甚嚴燧度長春不下則懷光自固攻之則矌日持久死傷必甚乃挺身至城下呼廷光廷光素懼燧威名拜於城上燧度廷光心已屈乃謂曰我來自朝廷可西面受命廷光復西拜又曰公等皆朔方將士禄山已來首立大勲四十餘年功伐最髙柰何棄祖父之勲力為滅族之計耶從吾言非止免罪富貴可圖也賊徒皆不對燧又曰爾以吾言不誠今相去數歩爾當射我乃披襟示之廷光感泣俯伏軍士亦泣光一日賊將尉珪率兵二千以焦離堡降燧廷光道既絶乃因率其下出降燧乃以數騎徑入城處之不疑莫不畏服衆大呼曰吾復得為王人矣渾瑊私歎謂叅佐曰瑊謂馬公用兵與僕不相逺但恠累敗田悦今覩行師料敵僕不逮逺矣又曰曹王皋為衡州刺史初湖南團練使辛京杲遣將軍王國良鎮武岡京杲侵刻之又虐其士卒國良以兵叛因據山河守險刼行旅以自給詔徵荆南江西黔桂兵誅之二嵗不下乃以皋為潭州刺史湖南都團練使皋率諸事至武岡國良阻險兵不得進􅆏乃謂諸軍曰國良怨京杲刻害本非反也其情易不如降之乃三遺之書國良因謂降未得其情皋曰其心屈矣乃捨軍自稱使者乗扁舟直造其壘曰曹王也國良遂出降又曰于邵為巴州刺史時嵗儉夷獠相聚山澤為盗數千百人來圍州城邵撫勵州兵與之拒}
