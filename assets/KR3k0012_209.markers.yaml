  - {type: variant, offset: 3529, length: 480, content: 號為白衣登三公又曰顗為司空文帝平蜀議復五等表魏朝使公定禮儀中護軍賈充正法律尚書僕射裴秀議官制公遂刪定舊文行正式為一代之典書成奏藏於祕府其服色旗幟法駕之式禮樂犧牲柴燎之典裕褅遷毀配食之制及於明堂辟雍之儀皆公所議定朝廷歸其美公既為台輔德望清重加以留心禮教以年耆多疾不數朝見詔使侍中任愷諮問政化所宜行否又曰蕃字大堅為司空劉琨表於太子曰司空荀蕃朝廷之舊臣弈世忠勤乃心皇家具瞻之望唯蕃而巳宜增位號授分陜之重永令臣等有所憑准白虎通曰司空主土不言土而言空空尚主之況於實乎環濟要略曰冬官司空掌邦事營城郭都邑立社稷宗廟造宮宅器械監百工典略曰禹為司空披九山通九澤決九川定九州使各以其職來貢傅子曰荀仲豫稱禹十二為司空世論曰諸葛誕為鎮東將軍都督楊州司馬文王秉政徵誕為司空書至誕曰我當在王文舒後今便為司空不遣使者出齎書使以兵付樂綝此必綝所為乃將左右數百人至楊州州人欲閉門誕叱之曰卿非我故吏耶逕入綝逃上樓就斬之齊孔稚珪為王敬則讓司空表曰故李通豪贍以親寵登用王基才勇以聲華入選先帝擢臣以榮華陛下申臣以富貴遂得北帶五州東跨六郡內亞三鼎外齊四岳蟬佩之映則左右交暉龜組之華則縱橫吐曜輕輪徐動則劍騎, WYG: ''}
