  - {type: variant, offset: 3453, length: 334, content: 志曰趙瑤字元珪拜扶風太守未之郡司空張溫謂曰第五伯魚從蜀郡為司空今掃吾第以待足下荀氏家傳曰荀爽字慈明董卓徵公公到府三日策拜司空爽起巖穴九十五日而為台司世人號為白衣登三公又曰顗為司空文帝平蜀議復五等表魏朝使公定禮儀中護軍賈充正法律尚書僕射裴秀議官制公遂刪定舊文行正式為一代之典書成奏藏於祕府其服色旗幟法駕之式禮樂犧牲柴燎之典裕褅遷毀配食之制及於明堂辟雍之儀皆公所議定朝廷歸其美公既為台輔德望清重加以留心禮教以年耆多疾不數朝見詔使侍中任愷諮問政化所宜行否又曰蕃字大堅為司空劉琨表於太子曰司空荀蕃朝廷之舊臣弈世忠勤乃心皇家具瞻之望唯蕃而巳宜增位號授分陜之重永令臣等有所憑准白虎通曰司空主土不言土而言空空尚主之況於實乎環濟要略曰冬官司空掌邦事營城郭都邑立社稷宗廟造宮宅器械監百工, SBCK: ''}
