  - {type: variant, offset: 4, length: 0, content: '', krp: 師平邦國也毛詩曰圻父圻父司馬也予王之爪牙春秋運斗樞曰黃帝與大司馬容光觀鳯皇銜圖置黃帝前尚書中候曰禝爲大司馬舜爲太尉尚書大傳曰蠻夷猾夏冦賊姦宄則責之司馬韓詩外傳曰故隂陽不和四時不節星辰失度灾變非常則責之司馬河圖録運法曰黃帝坐玄扈閣上與大司馬容光左右輔將周昌等百二十人觀鳯皇銜書家語曰賢能而失官爵功勞而失賞禄士卒疾怨兵弱不用曰不平不平則飭司馬飭謂整攝史記曰楚大司馬景舎帥軍伐蔡蔡侯奉社稷而歸之楚發其賞舎辭曰發誠布令而敵退是王威也相攻而敵退是將威也戰而敵退是衆威也臣不冝以衆威受賞漢書曰元狩四年上命大將軍衛青驃騎將軍霍去病各兵五万騎數十万出塞斬首捕虜有功廼置大司馬又曰董賢爲大司馬是時賢年二十二雖爲三公常給事中領尚書百官因賢奏事單于來朝宴見羣臣上前單于怪賢年少以問上令報曰大司馬年少以大賢居位單于乃起拜賀漢得賢臣又曰孝元王皇后成帝母也家凡十侯五大司馬外戚莫盛焉又曰成帝綏和元年賜大司馬金印紫綬置官屬禄比丞相東觀漢記曰更始欲以近親廵行河北大}
  - {type: variant, offset: 6, length: 1, content: 下, SBCK: 賜言上第一可用更始以上爲大司馬遣之河北又曰䜟云孫咸征狄命以平狄將軍孫咸行大司馬事後漢書曰丗祖北擊羣賊呉漢常將突􅀐五千爲軍鋒數先登䧟陣及河北平漢與諸將奉圖書上尊號丗祖即位拜漢爲大司馬又曰上疾瘳召見隂興欲以代呉漢爲大司馬興叩頭流涕固讓曰臣不敢惜身誠􅃜損聖德不可苟冒至誠發中感動左右帝遂聽之漢官序曰三司之職司馬主兵漢承秦曰太尉武帝改曰大司馬無印綬官兼加而已丗祖改曰太尉呉志曰赤鳥九年秋九月以車􅀐朱然爲左大司馬衛將軍全琮爲右大司馬}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 賜言上弟秀可用更始以上為大司馬遣之河北又曰䜟云孫咸征狄命以平狄将軍孫咸行大司馬事後漢書曰世祖北擊羣賊吴漢将突騎五千為軍前鋒數先登陷陣及河北平漢與諸将奉圖書上尊號世祖即位拜漢為大司馬又曰帝疾瘳召見隂興欲以代吴漢為大司馬興叩頭流涕固讓曰臣不敢惜身誠恐虧損聖徳不可苟冒至誠發中感動左右帝遂聽之漢官序曰三司之職司馬主兵漢承秦曰太尉武帝改曰大司馬無印綬官兼加而已世祖改曰太尉吴志曰赤烏九年秋七月以車騎朱然為左大司馬衛将軍全琮為右大司馬晉書石苞太始之初為大司馬舊參軍於都督無敬故孫楚抗衡於苞苞以楚傲更相表禮故㕘軍有敬自楚始也又曰齊王冏之盛也有一婦人詣大司馬府求寄産吏詰之婦人曰我截臍便去耳識者聞而惡之又曰陳騫咸寧初轉大司馬騫因入朝言於帝曰胡列䑓宏皆勇而無謀强於自用非綏邉之材将為國耻願陛下詳之時宏為揚州刺史不承順騫命帝以為不恊相搆乃徴宏既至復以為凉州刺史騫竊嘆曰以為必敗二人後果失羌戎之和皆被寇喪役征討連嵗僅能得定帝乃悔之晉武帝太始官名曰大司馬石苞開通爽悟秉意不辟晉公卿禮秩曰司馬兵官也魏氏大司馬大将軍各自為官在三司上晉以石苞為大司馬次三司}
