  - {type: variant, offset: 3, length: 0, content: '', krp: 七大司馬三公府掾屬大司馬韋昭辯釋名曰大司馬馬武也大揔武事也大司馬掌軍古者兵車一車四馬故以馬名官周禮夏官曰大司馬之職掌建邦國之九法以佐王平邦國平成也制畿封國以正邦國封爲立封立彊爲界設儀辨位以等邦國儀謂諸侯之儀也别尊卑之位進賢興功以作邦國作起也起其勸善樂業之心使不廢也建牧立監以維邦國牧州牧也監監一國謂君也維聮結也制軍詰禁以均邦國語猶窮治也均猶正也施貢分職以任邦國職謂賦稅也任猶事事以其力之所堪也簡稽郷民以同封邦國簡謂比數之以稽猶訓也均守平則以安邦國均之者尊者守大卑者守小也則法也比小事大以和邦國比猶親也使大國親小國小國事大國相合和也以九伐之法正邦國諸侯有違王命則出兵以征伐所以正之尚書曰司馬掌邦政統}
