  - {type: variant, offset: 10, length: 0, content: '', SBCK: 石苞泰始之初拜大司馬舊叅軍於都督無敬故孫楚抗衡於苞苞以楚傲更相表理故叅軍有敬自楚始也又曰齊}
  - {type: variant, offset: 10, length: 0, content: '', krp: 石苞泰始之初拜大司馬舊叅軍於都督無敬故孫楚抗衡於苞苞以楚傲更相表理故叅軍有敬自楚始也又曰齊}
  - {type: variant, offset: 11, length: 5, content: 渾字玄冲遷, SBCK: 冏之盛也有一婦人詣大司馬府求􅀉産吏詰之婦人曰我截臍便去耳識者聞而惡之又曰陳騫咸寜初轉大司馬騫因入朝言於帝曰胡列牽􅀪皆勇而無謀強於自用非綏邊之材將爲國恥願陛下詳之時􅀪爲楊州刺史不承順騫命帝以爲不恊相搆於是徴􅀪旣至復以爲凉州刺史騫竊歎息以爲必敗二人後果失羌戎之和皆􅀍宼喪没征討連歳僅而得定帝乃悔之晉武帝太始官名曰大司馬石苞開通爽悟秉意不碎晉公卿禮秩曰司馬兵官也魏氏大司馬大將軍各自爲官在三司上晉以石苞爲大司馬次三司下晉諸公賛曰義陽王爲大司馬時父孚爲太宰父子居上公中代以來未之有也晉中興書曰王猛少貧賤鬻畚爲事常至洛陽貨畚有人於市貴買其畚云家近在此可隨我取直猛隨去忽至􅀷山此人曰且住當先啓道君湏􅁷猛進見一公踞胡牀頭白侍從十許人有一人引猛云大司馬公可進猛因拜老公公曰王公何縁拜即十倍售畚直遣人送猛出山顧視乃嵩髙山也齊職儀曰大司馬品第一秩中二千石金章紫綬武冠絳朝服佩山􅀇玉其在少昊則雎鳩氏之任顓頊以司馬主火堯命羲叔爲司馬夏官也虞夏二代以司夏官棄居其職周成王以畢公髙爲司馬楚漢之際曹叅周勃始居其職又曰大司馬府舊爲闕王莽􅆲位故貶去闕焉後魏書曰安定王休領大司馬髙祖親行諸軍遇休以三盗人徇於六軍斬之有詔救之休執曰陛下將逺親衡霍故親御六師跋渉野次軍行始尓巳有姧竊如其不斬何以息盗詔曰大司馬執憲誠如是但因縁㑹朕王者之體亦時有非常之澤雖違軍法可特原之休乃奉詔髙祖謂}
