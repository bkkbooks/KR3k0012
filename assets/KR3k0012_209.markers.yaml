  - {type: variant, offset: 3939, length: 258, content: 親寵登用王基才勇以聲華入選先帝擢臣以榮華陛下申臣以富貴遂得北帶五州東跨六郡內亞三鼎外齊四岳蟬佩之映則左右交暉龜組之華則縱橫吐曜輕輪徐動則劍騎如雲飛蓋暫停則歌鍾成列樅金龍吹鬱其前鳴笳鳳管疊其後鄧禹若不遭漢光則南陽之掾史微臣若不逢明聖則孤城之戍客豈可加以正台之席登以論道之寄啟黃扉而爕五緯躡青帷而調四序梁劉孝儀為臨川王解司空表曰臣以庸薄謬竊隆重職班三事任揔六條衣袞坐槐既闕論道駝傳憩棠尤慚為政而俯司土地仰爕陰陽折撓之譏巳彰愆伏之咎爰著今水蜧不躍旱魃為災山無薈蔚雲成煙火陛下曲私未垂策免臣職是當於何逃責乞責降茲台步協此天人, SBCK: 語}
