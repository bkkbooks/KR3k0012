  - {type: variant, offset: 4, length: 0, content: '', SBCK: 師平􅀖國也毛詩曰圻父圻父司馬也予王之爪牙春秋運斗樞曰黃帝與大司馬容光觀鳯皇銜圖置黃帝前尚書中􅃸曰禝爲大司馬舜爲太尉尚書大傳曰蠻夷猾夏冦賊姦宄則責之司馬韓詩外傳曰故隂陽不和四時不節星辰失度灾變非常則責之司馬河圖録運法曰黃帝坐􅀇扈閣上與大司馬容光左右輔將周昌等百二十人觀鳯皇銜書家語曰賢能而失官爵功勞而失賞禄士卒疾怨兵弱不用曰不平不平則飭司馬飭謂整攝史記曰楚大司馬景舎帥軍伐蔡蔡侯奉社稷而歸之楚發其賞舎辭曰發誠布令而敵退是王威也相攻而敵退是將威也戰而敵退是衆威也臣不冝以衆威受賞漢書曰元狩四年上命大將軍衛青驃􅀐將軍霍去病各兵五万􅀐數十万出塞斬首捕虜有功廼置大司馬又曰董賢爲大司馬是時賢年二十二雖爲三公常給事中領尚書百官因賢奏事單于來朝宴見羣臣上前單于怪賢年少以問上令報曰大司馬年少以大賢居位單于乃起拜賀漢得賢臣又曰孝元王皇后成帝母也家凡十侯五大司馬外戚莫盛焉又曰成帝綏和元年賜大司馬金印紫綬置官屬禄比丞相東觀漢記曰更始欲以近親廵行河北大}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_209-2a}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_209-2b}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 師平邦國毛詩曰祈父祈父司馬也予王之爪牙春秋運斗樞曰黄帝與大司馬容光觀鳯凰銜圖置黄帝前尚書中候曰稷為大司馬舜為太尉尚書大𫝊曰蠻夷滑夏寇賊奸宄則責之司馬韓詩外𫝊曰故隂陽不和四時不節星辰失度灾變非常則責司馬河圖録運法曰黄帝坐立扈閣上與大司馬容光左右輔将周昌等百二十人觀鳯凰銜書家語曰賢能而失官爵功勞而失賞禄士卒疾怨兵弱不用曰不平不平則飭司馬史記曰楚大司馬景舍帥軍滅蔡蔡侯奉社稷而歸之楚發其賞舍辭曰發誠布令而敵退是王威也相攻而敵退是將威也戰而敵退是衆威也臣不宜以衆威受賞漢書曰元狩四年上命大將軍衞青驃騎將軍霍去病各将兵五萬騎數十萬出塞斬首捕虜有功廼置大司馬又曰董賢為大司馬時年二十二雖為三公常給事中領尚書百官因賢奏事單于来朝宴見羣臣上前單于怪賢年少以問上令報曰大司馬年少以大賢居位單于乃起拜賀漢得賢臣又曰孝元王皇后成帝母也家凡十侯五大司馬外戚莫盛焉又曰成帝綏和元年賜大司馬金印紫綬置官属禄比丞相東觀漢記曰更始欲以近親廵行河北大}
