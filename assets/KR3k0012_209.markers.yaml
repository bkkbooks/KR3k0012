  - {type: variant, offset: 1257, length: 1826, content: 之乃謂左丘明曰寡人欲以孔丘為司徒而授以魯政焉寡人將欲詢諸三子左丘明曰孔丘聖人與夫聖人在政過者離位焉君雖欲謀其罪弗合乎魯侯曰吾子奚以知之丘明曰周人有愛裘而好珍羞欲為千金之裘而與狐謀其皮欲具少牢之珍而與羊謀其羞言未卒狐相率逃於重丘之下羊相呼藏於深林之中故周人十年不制一表五年不具一牢何者周人之謀失之矣今君欲以孔丘為司徒召三桓而議之亦以狐謀裘與羊謀羞哉於是魯侯遂不與三桓謀而召孔丘為司徒典略曰契為司徒百姓和親夔主賓客遠人畢至蔡邕中鼎銘序曰惟建寧四年春三月進公登于王前廷乃制詔曰其以司空橋玄為司徒公拜稽首三讓然後受命曹植輔臣論曰辨博通幽見傅異度德實充塞于內知謀從橫於外解疑釋滯剖散盤結者主司徒荀勗荅詔曰咸寧四年司徒何曾遷太宰詔問勗司徒處當得人副遠近之望并治事見才誰可也勗表三公具瞻之望誠不可用非其人昔魏文帝用賈詡為公孫權笑之尚書令李胤忠亮高潔應處台輔宋謝莊為北中郎謝兼司徒章曰臣聞爕理陰陽夤亮天地弗惟其官無人則闕司徒掌敷五典職擾兆民豈悟乾靈罔遺光渥方闡不次之任殊絕蕃岳豈可權尸三事假備六符慚震周廻顧步交悸司空尚書曰舜曰咨四岳有能奮庸熙帝之載奮明也載成也僉曰伯禹作司空帝曰俞咨禹女平水土惟時懋哉帝曰然嗟禹女有平水災之功惟是勉之哉遂委以政也又曰司空掌邦土居四民時地利冬官卿主國空亡以居士農工商四民使順天時分也利也禮記王制曰司空執度度地司空冬官卿掌邦事者也度丈尺也量地遠近制邑井之處也興事任力事謂築邑宿市春秋昭四年曰爽鳩氏司空也續漢志曰司空為冬官掌邦事凡營城起邑復溝洫修墳防之事則議其利逮其功四方水土功課歲盡則奏其殿最而行賞罰凡國有大造大疑諫諍與太尉同春秋元命苞曰危東六星兩兩而比曰司空主水金木守之天下憂水韓詩外傳曰山陵崩陁川谷不通五穀不殖草木不茂則責之司空尚書大傳曰溝瀆擁遏水為民害田廣不墾則責之司空尚書形德放曰禹長於地理水泉九州得括象圖故堯以為司空家語曰度量不審舉事失理都鄙不修財物失所曰貧貧則飭司空飭謂整攝又曰魯定公以孔子為司空乃別五土之性五土山林川澤丘陵墳衍原隰也而物其所生之宜咸得厥所漢書曰成帝綏和元年始更名御史大夫曰大司空初改為司空議者又以縣道官有獄司空故復加為大司空亦所以別大小之文又曰彭宣字子佩為大司空而王莽為大司馬專權宣上書曰三公鼎足承君一足不任則覆亂美質臣老病願上印綬又曰何武字君卿為司空事後母不篤詔以其舉措煩碎不合眾心孝聲不聞惡名流行其上大司空印綬遂冊免之東觀漢記曰杜林代張純為大司空務於無為第五倫為司空奉公不撓言事無所依違後漢書曰王梁初為野王令世祖議選大司空而赤伏符曰王梁主衛作玄武帝以野王衛之所徙史記曰衛文君自濮陽徙於野王玄武水神之名司空水土之官也於是擢拜梁為大司空又曰竇融拜冀州牧十餘日又遷大司空融自以非舊臣一旦入朝在功臣之右召會進見容貌辭氣卑恭巳甚帝以此愈親厚之又曰陳寵為司空府故事以計吏至時自以下皆屬籍不通賓客以防交關寵去籍通客以明無所不受論者大之又曰張奮字穉通父純臨終勑家丞曰司空無功於時猥蒙爵土身死之後勿議傳國奮兄根少被病光武詔奮嗣爵奮稱純遺勑固不肯受帝以奮遠詔勑收下獄奮惶怖乃襲又曰第五倫章帝立徵拜司空奉公不撓言議果決後自陳老病以二千石祿俸終厥身續漢書曰張奮為司空時歲災旱祈雨不應乃上表即時引見復口陳時政之宜帝召太尉司徒幸洛陽獄錄囚徒大雨三日華嶠後漢書曰第五倫雖峭直然常以中興巳來二主好吏化俗尚苛刻政化之本宜先以寬和及為三公值章帝長者多恕屢有善政倫上䟽褒稱盛美因以勸成德風也又曰伏恭為太僕常臨辟雍於行禮中拜恭為司空儒者以為榮袁宏後漢紀曰第五倫為司空有人與倫千里馬者倫雖不取每三公有所選舉倫心不忘也然亦終不用漢官解詁曰下理坤道上和乾光謂之司空魏志曰景初元年司徒司空並𡙇散騎侍郎孟康曰夫宰相者天下之所瞻效誠宜得秉忠履正本德伏義之士足為海內所師表者竊見司隸校尉崔林稟自然之正性體高雅之弘量論其所長以比古之人忠直不回則史魚之儔也清儉守約則季文之疋也遂為司空封安陽亭侯三公封列侯自林始也又曰徐邈拜司空歎曰三公論道之官無其人則𡙇豈可以老病忝之哉固辭不受晉書曰裴秀為司空刪定官制損益多善當禪代之際揔納言之要其所裁當禮無違者又案禹貢山川地名古有今無者皆隨事注列作禹貢地域圖十八篇事成奏上藏於祕府秀在位四年為當世名公又曰鄭袤字林叔為司空天子臨軒遣就第拜授袤謂使曰魏以徐景山為司空徐公曰三公上應天心茍非其人實傷和氣固辭見許晉起居注曰武帝太始七年詔光祿大夫鄭袤體行純正履道冲粹退有清和之風進有素絲之節宜齊三階之曜補袞職之闕明弼朕躬匡其不逮其以袤為司空, SBCK: 叅軍}
