  - {type: variant, offset: 854, length: 332, content: 誼為大司徒蘇威立議以為戶口滋多民田不贍欲減功臣之地以給民誼奏曰百官者歷世勳賢方蒙爵土一旦削之未見其可如臣所慮正恐朝臣功德不建何患民田有不足上然之竟寢威議唐書曰大和四年守司徒裴度上表辭冊命言臣此官巳三度受冊有靦顏目從之九州春秋曰靈帝賣官廷尉崔烈入錢五百萬以買司徒烈子均亦有時名烈問曰吾作公天下人謂何如對曰大人少有高名不謂不當為公今登其位海內嫌其銅臭烈舉杖擊之均走烈曰子授父撾而走可謂孝乎均曰舜之事父小杖則受大杖而走不陷父於不義烈曰爾以吾為瞽叟耶華陽國志曰自建武之後群儒修業開案圖緯漢之宰相當出坤鄉於是司徒李公屢登七政太傅于堅弈代論道荀氏家傳曰組字大章中宗為晉王時將徵為司徒問太常賀循循曰組舊望清重勤勞顯著遷訓五品以統人倫實充人望詔以組為司徒江氏家傳曰江統字應元時太傅, WYG: 導}
