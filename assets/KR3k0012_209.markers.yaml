  - {type: variant, offset: 771, length: 279, content: 朱愽議始置三司改丞相為大司徒以孔光為之魏以華歆為之北齊書曰孫騰初北境亂騰亡一女及貴推訪不得疑其為人婢及為司徒婢訴良者皆免之願免千人冀得其女神武知之大怒遂解司徒隋書曰王誼為大司徒蘇威立議以為戶口滋多民田不贍欲減功臣之地以給民誼奏曰百官者歷世勳賢方蒙爵土一旦削之未見其可如臣所慮正恐朝臣功德不建何患民田有不足上然之竟寢威議唐書曰大和四年守司徒裴度上表辭冊命言臣此官巳三度受冊有靦顏目從之九州春秋曰靈帝賣官廷尉崔烈入錢五百萬以買司徒烈子均亦有時名烈問曰吾作公天下人謂何如對曰大人少有高名不謂不當為公今登其位海內嫌其銅臭烈舉杖擊之均走烈曰子授父撾而走可謂孝乎均曰舜之, SBCK: ''}
