  - {type: variant, offset: 11, length: 5, content: 渾字玄冲遷, WYG: 猛少貧賤常至洛陽貨畚有人於市買其畚云家近在此可隨我取直猛隨去忽至深山此人曰且住當先啟道君須㬰猛進見一公踞胡床頭白侍從十許人有一人引猛云大司馬公可進猛因拜老公曰王公何縁拜即十倍售畚直遣人送猛出回視乃嵩髙山也齊職儀曰大司馬品第一秩中二千石金章紫綬武冠絳服朝佩山𤣥玉其在少昊則雎鳩氏之任顓頊以司馬主火堯命羲叔為司馬夏官也唐虞二代以司夏官棄居其職周成王以畢公髙為司馬楚漢之際曹參周勃始居其職又曰大司馬府舊為闕王莽篡位故貶去焉後魏書曰安定王休領大司馬髙祖親行諸軍遇休以三盜人狥於六軍斬之有詔赦之休執曰陛下将逺親衝盧故親御六師䟦踄野次軍行始爾已有奸竊如其不斬何以息盜詔曰大司馬執憲誠如是但因縁㑹朕王者之體亦時有非常之澤雖為軍法可特原之休乃奉詔髙祖謂}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_WYG_209-6a, image: WYG0894/WYG0894-0817c.png}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_WYG_209-6b, image: WYG0894/WYG0894-0817d.png}
  - {type: variant, offset: 11, length: 2, content: 渾字, krp: 冏之盛也有一婦人詣大司馬府求寄産吏詰之婦人曰我截臍便去耳識者聞而惡之又曰陳騫咸寜初轉大司馬騫因入朝言於帝曰胡列牽弘皆勇而無謀強於自用非綏邊之材將爲國恥願陛下詳之時弘爲楊州刺史不承順騫命帝以爲不恊相搆於是徴弘旣至復以爲凉州刺史騫竊歎息以爲必敗二人後果失羌戎之和皆𬒳宼喪没征討連歳僅而得定帝乃悔之晉武帝太始官名曰大司馬石苞開通爽悟秉意不碎晉公卿禮秩曰司馬兵官也魏氏大司馬大將軍各自爲官在三司上晉以石苞爲大司馬次三司下晉諸公賛曰義陽王爲大司馬時父孚爲太宰父子居上公中代以來未之有也晉中興書曰王猛少貧賤鬻畚爲事常至洛陽貨畚有人於市貴買其畚云家近在此可隨我取直猛隨去忽至深山此人曰且住當先啓道君湏臾猛進見一公踞胡牀頭白侍從十許人有一人引猛云大司馬公可進猛因拜老公公曰王公何縁拜即十倍售畚直遣人送猛出山顧視乃嵩髙山也齊職儀曰大司馬品第一秩中二千石金章紫綬武冠絳朝服佩山}
  - {type: punctuation, offset: 12, content: ，, id: KR3k0012_CHANT_209-bkkpn5}
  - {type: 'tls:seg', offset: 12, content: '', id: KR3k0012_CHANT_209-1a.5}
  - {type: variant, offset: 14, length: 2, content: 冲遷, krp: 玉其在少昊則雎鳩氏之任顓頊以司馬主火堯命羲叔爲司馬夏官也虞夏二代以司夏官棄居其職周成王以畢公髙爲司馬楚漢之際曹叅周勃始居其職又曰大司馬府舊爲闕王莽篡位故貶去闕焉後魏書曰安定王休領大司馬髙祖親行諸軍遇休以三盗人徇於六軍斬之有詔救之休執曰陛下將逺親衡霍故親御六師跋渉野次軍行始尓巳有姧竊如其不斬何以息盗詔曰大司馬執憲誠如是但因縁㑹朕王者之體亦時有非常之澤雖違軍法可特原之休乃奉詔髙祖謂}
  - {type: punctuation, offset: 15, content: ，, id: KR3k0012_CHANT_209-bkkpn6}
  - {type: 'tls:seg', offset: 15, content: '', id: KR3k0012_CHANT_209-1a.6}
  - {type: variant, offset: 18, length: 1, content: 仍, SBCK: 誕曰大司馬嚴而秉法君不可不慎於是六軍肅然後周書曰夏官謂之大司馬卿掌􅀖政以建􅀖國之九法佐皇帝平􅀖國大􅀕祀掌其􅀫衛廟社則奉犧牲管子曰昔黃帝得大封辨乎四方故使爲司馬又曰凉風至白露下天子命左右司馬全組甲厲士衆􅀓子曰曹大司馬之勇賁育弗}
  - {type: variant, offset: 18, length: 1, content: 仍, WYG: 誕曰大司馬嚴而秉法君不可不慎於是六軍肅然後周書曰夏官謂之大司馬管子曰昔黄帝得風后辨乎四方故使為司馬又曰凉風至白露下天子命左右司馬全組甲勵士衆傅子曰曹大司馬之勇賁育弗如也博物志曰太公望為灌壇令文王夢見婦人當道哭問其故曰吾太山之神嫁為西海婦灌壇令當吾道夢見召太公三日果疾風暴雨文王乃拜太公為大司馬班彪上事曰元狩六年罷太尉置司馬時議以北軍中候有千人司馬故}
  - {type: page-break, offset: 18, content: '', id: KR3k0012_WYG_209-7a, image: WYG0894/WYG0894-0818a.png}
  - {type: variant, offset: 18, length: 1, content: 仍, krp: 誕曰大司馬嚴而秉法君不可不慎於是六軍肅然後周書曰夏官謂之大司馬卿掌邦政以建邦國之九法佐皇帝平邦國大祭祀掌其宿衛廟社則奉犧牲管子曰昔黃帝得大封辨乎四方故使爲司馬又曰凉風至白露下天子命左右司馬全組甲厲士衆傳子曰曹大司馬之勇賁育弗}
  - {type: variant, offset: 20, length: 2, content: 兵渾, SBCK: 也曹仁􅀶物志曰太公望爲灌壇令文王夢見婦人當道哭問其故曰吾泰山之神嫁爲西海婦灌壇令當吾道夢覺召太公三日果疾風􅁀􅀨文王乃拜太公爲大司馬班彪上事曰元狩六年罷太尉置司馬時議}
  - {type: page-break, offset: 20, content: '', id: KR3k0012_SBCK_209-4b}
  - {type: variant, offset: 20, length: 2, content: 兵渾, WYG: 之大司馬所}
  - {type: variant, offset: 20, length: 2, content: 兵渾, krp: 也曹仁博物志曰太公望爲灌壇令文王夢見婦人當道哭問其故曰吾泰山之神嫁爲西海婦灌壇令當吾道夢覺召太公三日果疾風暴雨文王乃拜太公爲大司馬班彪上事曰元狩六年罷太尉置司馬時議}
