  - {type: 'tls:seg', offset: 21, content: '', id: KR3k0012_CHANT_209-1a.7}
  - {type: variant, offset: 23, length: 0, content: '', SBCK: 北軍中􅃸有千人司馬故加之爲大司馬所以別小大司馬之號也三公府􅁺屬太尉長史應劭漢官儀曰太尉}
  - {type: variant, offset: 23, length: 0, content: '', WYG: 别大小司馬之號也三公府掾属太尉長史應劭漢官儀曰太尉}
  - {type: variant, offset: 23, length: 0, content: '', krp: 北軍中候有千人司馬故加之爲大司馬所以別小大司馬之號也三公府掾屬太尉長史應劭漢官儀曰太尉}
  - {type: variant, offset: 25, length: 2, content: 文官, SBCK: 司空長史秩比千石號爲毗佐三台􅂇和鼎味太尉􅁺汝南先賢傳曰李宣字公休爲太尉黃瓊所辟時寒暑不和瓊見􅁺屬曰是太尉無德願諸􅁺有以匡之次及宣宣曰明公􅀍日月之衣居上司之位輔弼天子處諌諍之職未有對楊謇謇之言其所旌命不授巖谷之士小􅁺私所以於邑廣州先賢傳曰鄧盛字伯眞蒼梧人爲太尉諸曹􅁺彭城相左尚以贓罪三府􅁺屬栲驗踰科不竟更選盛覆栲盛到獄洗沐尚解械賜席乃謂尚曰君受國重恩而所坐事理如此今遇君子不可以小人道相待尚感盛至意對曰今使君相於如此尚獨何心敢不以死相歸乎即引筆具對衛玠別傳曰玠字叔寳陳留阮千里有令聞當年太尉王君見而問曰老莊與聖教同異阮曰將無同太尉善其言而辟之爲􅁺丗號曰三語􅁺君見而謿之曰一言可辟何假三阮曰苟是天下民望可無言而辟復何假於一言崔寔政論曰且三公天子之股肱􅁺屬則三公之喉舌天子當恭巳南面於三公三公亦委䇿􅁺屬以荅天子太尉從事中郎後魏書曰郭景尚字思和渉歷書傳遷太尉從事中郎善事權寵丗呼爲郭尖于寳司徒儀曰從事中郎之職各掌其所治之曹而紀綱其事維正大體叅輔謀議太尉}
  - {type: page-break, offset: 25, content: '', id: KR3k0012_SBCK_209-5a}
  - {type: page-break, offset: 25, content: '', id: KR3k0012_SBCK_209-5b}
  - {type: variant, offset: 25, length: 2, content: 文官, WYG: 司空長史秩比千石號為毗佐三台助和鼎味太尉掾汝南先賢傳曰鄧盛字伯真蒼梧人為太尉諸曹掾彭城相左尚以賍罪三府掾属拷騐踰科不竟更選盛覆拷盛到獄洗沐尚觧械賜席乃謂尚曰君受國重恩而所坐事理如此今遇君子不可以小人道相持尚感盛至意對曰今使君相於如此尚獨何心敢不以死相歸乎即引筆具對衛玠别傳曰玠字叔寳陳㽞阮千里有令聞當年太尉王君見而問曰老荘與聖教同異阮曰将無同太尉善其言而辟之為掾世號曰三語椽君見而嘲之曰一言可辟何假三阮曰苟是天下民望可無言而辟復何假於一言崔寔政論曰且三公天子之股肱掾属則三公之喉舌天子當恭已南面三公亦委䇿掾属以荅天子太子從事中郎後魏書曰郭景尚字思和渉厯書𫝊遷太尉從事中郎善事權寵世呼為郭尖干寳司徒議曰從事中郎之職各掌其所治之曹而紀綱其事體參輔謀議太尉}
