  - {type: variant, offset: 28, length: 11, content: 吏不持兵持兵乃吏屬絳衣, SBCK: 簿後魏書曰元慶智性貪鄙爲太尉主簿事無大小得物然後判或十錢二十錢得便取之府中號曰十錢主簿廣州先賢􅀓曰鄧盛字伯直爲秭歸令聞母病解印綬決去太尉馬公嘉其所履服竟辟之初入府爲主簿司徒長史東觀漢記曰呉梁爲司徒長史以清白方正稱于寳晉紀曰􅀓咸爲司徒長史多所執正齊書曰到撝爲司徒左長史宋丗上數遊㑹撝家同從明帝射雉郊野渴倦撝得早青􅀲與上對剖食之上懷其舊德意眄良厚至是一歳三遷梁書曰禇球字仲寳爲司徒左長史加貂}
