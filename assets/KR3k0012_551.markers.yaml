  - {type: punctuation, offset: 1262, content: ‧, id: KR3k0012_CHANT_551-bkkpn377}
  - {type: variant, offset: 1262, length: 409, content: 曲禮下曰在棺曰柩柩之言究又檀弓下曰君遇柩於路必使人弔之又曰襄公朝于荊唐王卒在魯襄公二十八年康王楚子昭也荊人曰必請襲欲使襄公衣之魯人曰非禮也荊人強之巫先拂柩荊人悔之巫祝桃茢君臨臣喪之禮記統曰柩之言也具書其謚置棺旁萬世久藏也釋名曰柩究也送隨身之制皆究備也漢書曰薛宣守左馮翊多仁恕池陽令舉廉吏獄椽王立於府未及有聞立受囚家錢宣責讓縣縣案驗獄椽乃其妻受繫者錢萬六千受之而椽實不知椽慚恐自殺宣聞之移書池陽曰縣所舉廉吏獄椽王立家私受財而立不知殺身以自明立誠廉士甚可閔惜其以府決曹椽書立之柩以顯其魂東觀漢記曰廉范字叔度京兆人也父客死蜀范乃出負喪歸至葭萌舡觸石破沒范持棺柩遂俱沈溺眾傷其義鉤求得之僅免於死晉書曰東海王越薨葬東海石勒追及於莒縣甯平城將軍錢端出兵拒勒戰死軍潰勒命焚越柩曰此人亂天下吾為天下報之故燒其骨以告天地蕭子顯齊書曰傳琰字季珪北地靈州人也美姿儀為尚書左民郎遭喪居南岸鄰家失火燒屋抱柩不動殯禮記曲禮上曰里有殯不巷歌助哀也又, SBCK: ''}
