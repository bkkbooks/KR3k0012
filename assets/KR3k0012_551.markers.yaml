  - {type: variant, offset: 2130, length: 2, content: 廢輴, WYG: 葬焉桐棺四寸栢椁五寸家語曰墨子葬法棺三寸足以朽骨衣三領足以朽肉掘地之深下無漏氣發洩于上襲之以明其所止也説文曰棺闗也可以掩屍櫬附身棺也櫃匱也槥櫝也史記曰飛亷生惡來俱以材力事紂武王伐紂并殺惡來時飛亷為紂使北方還無所報為壇霍泰山而得石棺銘曰天令處父與亂賜汝石棺死遂葬霍泰山古史考曰堯作瓦棺湯作木棺漢書曰髙祖下令士卒從軍死者為槥服䖍曰槥音惠應劭曰小棺也今謂之櫝歸其縣縣給衣衾棺椁葬具致其尸于家縣官吏給衣衾斂祠以少牢吏親葬漢書張湯自殺昆弟欲厚葬湯母曰為大臣被惡言死何厚葬為載以牛車有棺無椁上聞曰非此母不生此子漢書曰哀帝崩有司奏賢乃自殺死後其父恭等不悔過乃復以畫棺作五采之色左蒼龍右白虎著金銀日月玉衣珠璧至尊無以加漢書曰王莽奏貶下傅太后號改葬發取璽綬太后以為既往之事不須發莽固爭之太后詔曰因改棺為致椁作塜葬既開傅太后棺聲聞數里續漢書禮儀志曰王公主貴人皆樟棺朱漆畫雲氣公特進樟棺黒漆續漢書曰楊震數切諌為樊豐等所譖遣歸本郡震行至城西夕陽亭謂諸子門人曰身死之日以雜木為棺單衣被裁足葢形無歸塜次設祭祀因飲酖以卒續漢書曰曹褒在射聲營舍有停棺椁不葬者百餘所褒親自履行愴然為買空地悉葬其無主者續漢書曰周盤字伯堅年七十三歲朝集諸生講論終日因令其子曰吾日者夢見先師東里先生與我講于陰堂之奥而長歎豈吾齒之盡乎命終之日桐棺足以周身外椁足以周棺斂形懸封濯衣幅巾編四寸簡寫堯典一篇并刀筆各以}
