  - {type: variant, offset: 71, length: 151, content: 服也陳之將歛也敬妾曰婦人不飾不敢見舅姑將有四方之賓來褻衣何為陳於斯命撤之又喪大記曰小歛於戶內大歛於阼階君以簟席大夫以蒲席士以葦席小歛君錦衾大夫縞衾士緇衾皆一衣十有九稱大斂布紟二衾君大夫士一也簟細葦席也三者下皆有莞衣十有九稱法天地之終數也二衾者或覆之或薦之也又曾子問曰下殤士周葬于園遂輿機而往途邇故也土周, SBCK: 陶夏后氏}
