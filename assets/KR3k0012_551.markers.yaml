  - {type: variant, offset: 2436, length: 2, content: 竟陵, SBCK: ''}
  - {type: variant, offset: 2436, length: 1, content: 竟, WYG: 崔光韶謂子孫曰吾兄弟自幼及老衣服飲食未嘗一日不同弟頃横禍權作松棺亦可為我作松棺使我見之搜神記曰不其縣有孤竹城孤竹君之國也靈帝光和元年遼水中有浮棺人破斫之棺中人語曰我伯夷之弟孤竹君也海水壊我棺椁是以漂流汝斫我何為乃不敢破因為立祠民有欲發視者無病而死搜神記曰北海有道人能令人與死人相見其同郡人婦死已數年聞而往見之曰願令一見死婦死不恨矣道人曰可然聞鼓聲疾出俄而得見之與婦言語悲喜恩情如生良久聞鼓音恨不能得住壻當走岀户時忽掩其衣裾户間掣絶而去後數歳餘此人死家葬之開塜見婦棺葢下裾恨力尚反異苑曰海}
