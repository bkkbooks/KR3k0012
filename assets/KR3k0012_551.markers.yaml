  - {type: variant, offset: 2777, length: 448, content: 客給者入設乘黃於大路之西客入則致命矣左傳隱公曰天王使宰咺來歸惠公仲子之賵緩且子氏未薨故名惠公葬在春秋前故曰緩也子氏仲子也葬薨在二年賵助喪之物贈死不及尸尸未葬之通稱弔生不及哀諸侯曰上既葬則衰麻除無哭位諒闇終喪豫凶事非禮也仲子在而求贈故曰豫凶事穀梁傳隱公曰乘馬曰賵公羊傳隱公曰車馬曰賵春秋說題辭曰知生則賻知死則賵賻之為言助也賵之為言覆也輿馬曰賵貨財曰賻玩好曰贈決其意也衣被曰禭養死具也贈稱也禭遺也賻周禮天官曰小宰凡邦之弔事掌其戒令與其弊器財用凡所共者弔事弔諸侯臣弊所用贈也器所致明器也凡喪始無弔而含隧葬而賵贈其間加恩厚則有賻焉禮記曲禮下曰弔喪不能賻不問其所費又檀弓上曰孔子之衛遇舊館人之喪入而哭之哀出使子貢稅驂而賻之子貢曰於門人之喪未有所稅驂稅驂於舊館無乃已重乎言稅驂太重比於門人恩為偏頓也夫子曰予嚮而哭之遇於一哀而出涕遇見也舊館人恩雖輕我入哭見主人為我盡一哀是厚恩待我也我為之出涕思重宜施惠之也予惡夫涕之無從也小子行之客行無他物可以易之者使遂以往也又檀弓曰子柳之母死既葬子碩欲以賻布之餘具祭器古者謂, SBCK: 裳銅}
