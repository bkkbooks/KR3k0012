  - {type: variant, offset: 3964, length: 344, content: 後路貳車貳車行在後地又少儀曰臣致禭於君則曰致衣廢於賈人敵者曰禭言廢衣不必其以斂也賈人知物善惡也親者兄弟不以禭進不執將命左傳文公曰秦人來歸僖公成風之禭進禮也秦慕諸夏欲通敬於魯國有翟泉之盟故贈僖公并及成風本非魯方獄同無相赴弔之制故不譏其緩而以接好為禮諸侯相弔賀也雖不當事茍有禮焉書之可也以無忘舊好送死不及尸故曰不當事書者書於典策垂示子孫使無忘過厚之好又襄公曰魯公朝于楚康王卒楚人使公親禭禭諸侯有遣使賵禭禮今楚欲依遣使之比矣公患之穆叔曰祅殯而禭則布幣也先使巫祅除殯之凶邪而行禭禮與朝而布弊無異乃使巫以桃茢先殯祅茢黍穰楚人弗禁既而悔之又襄公曰鄭伯有死於羊肆羊肆市列子產禭之枕之股而哭之斂而殯諸伯有之臣在市側者既而葬諸斗城斗城鄭地名春秋說題辭曰衣被曰禭禭之言遺也穀梁傳隱公曰衣衾曰禭說文曰禭衣死人也, SBCK: 太平御覽卷第五百五十一}
