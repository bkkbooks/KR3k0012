  - {type: variant, offset: 2438, length: 6, content: 王誕據廣陵為, WYG: 如臯縣東城村邊海岸崩壊一古墓有方頭漆棺以朱題上云百七年墮水元嘉二十載三月墜于懸巘巴蜀志曰獠夷死即立埋棺不卧設盛𢎞之荆州記曰冠軍縣東一里有張詹墓魏太和時人也刻碑背曰白楸之棺易朽之裳銅錢不入瓦器不藏嗟爾後人幸勿我傷自胡石之亂墳墓莫不夷毁此墓元嘉初猶儼然六年大水民飢始被發初開金銀銅錫之器爛然畢備有三朱漆棺椁棺椁前薄簾金釘釘之永嘉郡既曰樂城縣石堂水口先時有一漆棺}
