  - {type: variant, offset: 2051, length: 3, content: 幬攢置, SBCK: 定姒本賤旣無備器議其䘮制欲殯不過廟又不及哭也匠慶謂季文子曰子爲上卿而小君之䘮不成不終君也父其母是不終事君之道也君長誰受其咎􅀄季孫爲巳樹六檟於蒱圃東門之外蒱圃場圃名矣匠慶請木季孫曰略匠慶用蒱圃之檟季孫不禦禦止左傳哀上曰趙簡子與鄭戰簡子誓曰志父無罪君實圖之􅀂其有罪絞縊以戮桐棺三寸不設屬辟屬辟棺之重數王棺四重君再重大夫一重素車樸馬以載柩無入}
