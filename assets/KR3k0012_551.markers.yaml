  - {type: variant, offset: 2049, length: 0, content: '', SBCK: 大棺八寸屬六寸下大夫大棺六寸屬四寸士棺六寸大棺棺之在表君裏棺用朱緑用雜金鐟大夫裏棺用玄緑用牛骨鐟士不緑鐟所以瑑着裏也君蓋用􅃮三祍三束大夫蓋用􅃮二祍二束士蓋不用漆二祍二束用􅃮者塗合牝牡中也祍小要君大夫鬊􅀲實于緑中士埋之緑當爲角聲之設角即謂棺之内也禮記外傳曰凡棺之重數從内數向外如席之重也兕革棺一各三寸内一重有水牛皮次兕皮二者合爲一重都厚六寸一名椑棺又名櫬椑者堅如壁櫬者親於身也杝棺二厚八寸杝曰椵木在椑棺之外屬棺三其厚四寸屬者施杝棺外大棺四厚六寸屬棺之列也屬棺大棺皆用梓也上公去水牛皮兕皮外有三重也侯伯巳下去水兕杝棺外二重卿大夫唯屬棺與大棺一重士不言重唯棺而巳左傳宣上曰鄭人討幽公之亂斵子家之棺以四年殺君故也斵薄其棺不使從卿禮左傳成上曰宋文公葬椁有四阿棺有翰檜杜預注曰翰旁飭檜上飭王礼左傳襄上曰齊姜薨􅀄穆姜使擇美槚檟梓之屬以自爲櫬與頌琴櫬棺也頌琴琴名猶言雅琴也皆㣲以送納季文子取以葬君子曰非禮也禮無所逆婦養姑者也虧姑以成婦逆莫大焉穆姜成公母齊姜成公婦也左傳襄上曰定姒薨不}
