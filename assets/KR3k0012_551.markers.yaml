  - {type: variant, offset: 241, length: 1019, content: 遠不就墓也機舉尸之床也繩絙其中央又以繩從旁釣之禮以機舉屍輿之以就國而歛葬焉途近故耳輿機或為餘機今墓遠則其葬也如之何今人歛下殤於宮中而葬之於墓與成人同墓途乃遠其葬當輿其棺乎載之也問禮之變孔子曰吾聞諸老聃曰昔使佚有子而死下殤也墓遠蓋欲葬之墓如長殤從成人也長殤有送葬車者則棺載之矣史佚武王時史賢猶有所不知召公謂之曰何以不棺斂於宮中欲其斂於宮中如成人也斂於宮中則葬當載之也史佚曰吾敢哉畏知禮也召公言於周公為史佚問周公曰豈不可言是豈於禮可不許也史佚行之佚失於以為許也遂用召公之宮言也下殤用棺衣棺自史佚始也棺謂斂於棺也又問喪曰或問曰死三日而后斂者何也怪其遲也曰孝子親死悲哀志懣故匍匐而哭之若將復生然安可得奪而斂之故曰三日而后斂者以俟其生也三日而不生亦不生矣孝子之心亦益襄矣家室之計衣服之具亦可以成矣親戚之遠者亦可以至矣是故聖人為之斷決以三日為之禮制也左傳僖下曰許穆公卒于師葬之以侯禮也男而以侯禮加一等凡諸侯薨於朝會加一等死王事加二等於是有以袞斂又襄公曰魯季文子卒大夫入斂公在位宰庀家器為葬備無衣帛之妾無食粟之馬無藏金玉無重器備君子是以知季文子之忠於公室也相三君矣而無私積可不謂忠乎又定上曰季平子行東野東野季氏邑還未至丙申卒于房陽虎將以璵璠斂璵璠美玉君所佩忡梁懷弗與懷亦季氏家臣曰改步改玉昭公之出季孫行君事佩璵璠祭宗廟今定公立復臣位改君步則亦當去璵璠陽虎欲逐之告公山不狃不狃曰彼為君也子何怨焉家語曰季平子卒將以君之璵璠斂孔子初為中都宰聞之歷級而救歷登階不聚足曰送死人而以寶玉猶曝屍於中原示民以姦利之端後漢書戴封年十五詣大學時同學石敬平溫病卒封養視殯殮以所齎糧市小棺送喪到家更殮見敬平生時書物皆在棺中乃異之吳志曰張昭卒遺令幅巾素棺歛以時服孫權素服臨弔又曰諸葛瑾年六十八卒遺令素棺斂以時服事從約省晉書曰安平王孚臨終遺令曰有魏貞士河內溫司馬孚字叔達不伊不周不夷不惠立身行道終始若一當以素棺單槨歛以時服南史曰王奐為雍州剌史被誅舊人無敢至者汝南許明達為奐參軍躬為殯殮經理甚厚當時高其節梁書曰王志天監初為丹陽尹為政清靜都下有寡婦無子姑亡舉債以斂葬既而無以還之志愍其義以俸償馬陳書曰周弘直卒遺䟽氣絕之後便買市中見材小形者斂以時服古人通制但見先人必須備禮可著單衣裙衫故履既應侍養宜備紛悅或逢善友又須香菸棺內唯安白布手巾麤香鑪而已此外無所用釋名曰衣尸棺曰歛藏不復也風俗通曰禮天子斂以梓器宮者存時所居緣生事亡因以為名凡人呼棺亦為宮也宋韜遺教曰吾死斂以時服不得造新白祫單衣柩, SBCK: ''}
