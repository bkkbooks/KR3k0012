  - {type: variant, offset: 3590, length: 718, content: 無所受詔書襃美勑太山太守以府賻錢賜續家世說曰王戎父渾官至梁州剌史渾所歷州郡義故懷其德惠相率致賻數百萬戎悉不受齊書曰張稷所生劉先假葬瑯琊黃山建武中改申葬禮賻助委積於時雖不拒絕事畢隨以還之又曰江斅卒遺令不受賻詔賻錢三萬布百疋子蒨啟遵斅命不受詔嘉美之從其所請又曰張融有孝義父暢臨終謂諸子曰昔丞相事難吾以不同將見殺緣司馬笁超人得活爾等必報其子後超人孫微冬月遭母喪居貧融弔之悉脫衣以為贈披牛被而反禭儀禮士喪禮曰士喪君使人禭撤帷主人如初禭者左執領右執要入升致命禭之言遺也衣被曰禭致命曰君使某禭主人拜如初禭者入衣尸出主人拜送如初禮記檀弓下曰衛有太史曰柳莊寢疾公曰若疾亟雖當祭必告也亟急公再拜稽首請於尸曰有臣柳莊也者非寡人之臣社稷之臣也聞之死急弔不賢也釋服而往遂以禭之脫君祭服以禭目親賢也又雜記曰諸侯相禭以後路與冕服先路與褒衣不以禭不以己之正者施於人以彼不以為正也後路貳車貳車行在後地又少儀曰臣致禭於君則曰致衣廢於賈人敵者曰禭言廢衣不必其以斂也賈人知物善惡也親者兄弟不以禭進不執將命左傳文公曰秦人來歸僖公成風之禭進禮也秦慕諸夏欲通敬於魯國有翟泉之盟故贈僖公并及成風本非魯方獄同無相赴弔之制故不譏其緩而以接好為禮諸侯相弔賀也雖不當事茍有禮焉書之可也以無忘舊好送死不及尸故曰不當事書者書於典策垂示子孫使無忘過厚之好又襄公曰魯公朝于楚康王卒楚人使公親禭禭諸侯有遣使賵禭禮今楚欲依遣使之比矣公患之穆叔曰祅殯而禭則布幣也先使巫祅除殯之凶邪而行禭禮與朝而布弊無異乃使巫以桃茢先殯祅茢黍穰楚人弗禁既而悔之又襄公曰鄭伯有死於羊肆羊肆市列子產禭之枕之股而哭之斂而殯諸伯有之臣在市側者既而葬諸斗城斗城鄭地名春秋說題辭曰衣被曰禭禭之言遺也穀梁傳隱公曰衣衾曰禭說文曰禭衣死人也, WYG: ''}
