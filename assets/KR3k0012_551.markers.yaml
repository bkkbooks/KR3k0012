  - {type: variant, offset: 2130, length: 2, content: 廢輴, SBCK: 葬焉桐棺四寸栢椁五寸家語曰墨子葬法棺三寸足以朽骨衣三領足以朽肉掘地之深下無漏􅂔發􅂥於上襲之以明其所止也􅀃文曰棺􅀜也可以掩屍櫬附身棺也櫝匱也槥櫝也史記曰飛廉生惡來俱以材力事紂武王伐紂并殺惡來時飛廉爲紂使北方還無所報爲壇霍太山而報得石棺銘曰天令處父與發亂賜汝石棺死遂葬霍太山古史考曰舜作瓦棺湯作木棺漢書曰髙祖下令士卒從軍死者爲槥服䖍曰槥音衛應劭曰小棺也今謂之櫝歸其縣縣給衣衾棺葬具致其尸於家縣官更給衣衾歛祠以少牢吏親葬漢書曰張湯自殺昆弟欲厚葬湯母曰湯爲大臣􅀍惡言死何厚葬爲載以牛車有棺無椁上聞曰非此母不生此子漢書曰哀帝崩有司奏董賢乃自殺死後其父恭等不悔過乃復以緲􅀞棺作時之色左蒼龍右白虎上著金銀日月玉衣珠璧至尊無以加漢書曰王莽奏貶丁􅀓太后號改葬發取璽綬太后以爲旣徃之事不湏發莽固爭之太后詔曰因故棺爲致椁作塜葬旣開􅀓太后棺臰聞數里續漢書禮儀志曰王公王貴人皆樟棺朱􅃮􅀞雲氣公特進樟棺黒漆續漢書曰楊震數灱諌爲樊豊等所譛遣歸夲郡震行至城西凡陽亭謂諸子門人曰身死之日以􅄂木爲棺單􅀍裁足盖形勿歸塜次勿設􅀕祠因飲酖而卒續漢書曰曹襃在射聲營舎有停棺椁不葬者百餘所襃親自履行愴然爲買空地悉葬其無主者續漢書曰周盤字伯堅年七十三歳朝集諸生講論終日因令其二子曰吾日者夢見先師東里先生與我講於隂堂之奥而長歎豈吾齒之盡乎命終之日桐棺足以周身外椁足以周棺歛刑懸封濯衣幅巾編四寸簡冩堯典一篇并刀筆各一以}
