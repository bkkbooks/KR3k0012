  - {type: variant, offset: 3398, length: 530, content: 二千石官賦斂賻葬皆千萬已上妻子適共受之以定產業時又少行三年喪者及涉父死讓還南陽賻送行喪冢墓三年由是顯名京師又曰何竝字子廉徙潁川太守疾病召丞椽作先令書曰告子恢吾生素飡日久死雖得官賻勿受葬為小槨但下棺恢如其言後漢書曰魯恭字仲康父期為武陵太守卒官恭年十二晝夜號踊聲郡中賻無所受乃歸服喪禮過成人後漢書曰羊續為南陽太守徵為太常未及行會病卒遺言薄歛不受賵遺舊典二千石卒官賻賵百萬府丞焦儉遵續先意一無所受詔書襃美勑太山太守以府賻錢賜續家世說曰王戎父渾官至梁州剌史渾所歷州郡義故懷其德惠相率致賻數百萬戎悉不受齊書曰張稷所生劉先假葬瑯琊黃山建武中改申葬禮賻助委積於時雖不拒絕事畢隨以還之又曰江斅卒遺令不受賻詔賻錢三萬布百疋子蒨啟遵斅命不受詔嘉美之從其所請又曰張融有孝義父暢臨終謂諸子曰昔丞相事難吾以不同將見殺緣司馬笁超人得活爾等必報其子後超人孫微冬月遭母喪居貧融弔之悉脫衣以為贈披牛被而反禭儀禮士喪禮曰士喪君使人禭撤帷主人如初禭者左執領右執要入升致命禭之言遺也衣被曰禭致命曰君使某禭主人拜如初禭者入衣尸出主人拜送如初禮記檀弓下曰衛有太史曰柳莊寢疾公曰若疾亟雖當祭必告也亟急公再拜稽首請於尸曰有臣柳莊也者非寡人之臣社稷之臣也聞之死急弔不賢也釋服而往遂以禭之脫君祭服以禭目親賢也又雜, SBCK: ''}
