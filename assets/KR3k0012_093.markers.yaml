  - {type: variant, offset: 1920, length: 1848, content: 歲官官用事排疾士人熹平四年五月帝自造皇義五十章光和五年帝幸太學自就石碑作賦廢帝弘農王獻帝春秋曰孝靈皇帝何皇后生太子辯帝數失子不敢正名養于道人史子眇家號曰史侯後漢書曰中平六年四月丙辰靈帝崩于南宮嘉德殿戊午皇子辯即皇帝位年十七太后臨朝八月中常侍叚珪等殺大將軍何進於是虎賁中郎將袁術燒東西宮攻諸官者庾午張讓叚珪等劫少帝及陳留王幸北宮司隸校尉袁紹勒兵收偽司隸校尉樊陵及諸閹人無少長皆斬之讓珪等復劫少帝陳留王走小平津尚書盧植追讓珪等斬之其餘投河而死帝與陳留王協夜步逐螢火光行數里得民家露車共乘之還宮九月董卓廢帝為弘晨王英雄記曰董卓在顯陽苑請官僚共議欲有廢立謂袁紹曰劉氏之種不足復遺袁紹曰漢家君天下四百許年恩澤深渥兆民戴之恐眾不從公議卓曰天下之事豈不在我我今為之誰敢不從紹曰天下健者不唯董公紹請立觀之橫刀長揖而去坐中皆驚愕時卓新至見紹大家故不敢害之卓於是遂策廢皇太后遷之永安宮其夜崩廢皇帝史侯為弘農王立陳留王為皇帝卓聞東方州郡謀欲舉兵恐其以弘晨王為主乃置王閣上荐薦之以棘召王太傅責問之曰弘農王病困何故不白遂遣兵迫守太醫致藥即日弘農王及妃唐氏皆薨袁山松後漢書曰董卓使弘農郎中令李孝儒進鴆於弘農王曰服此辟惡王曰此必是毒也弗肯強之於是王與唐姬及宮人共飲酒王自歌曰天道易兮我何艱棄萬乘兮退守藩逆臣見迫兮命不延逝將棄爾兮適幽玄唐姬起舞歌曰皇天崩兮后土頹身為帝王兮命夭摧死生路畢兮從此乖悼我焭獨兮中心哀因泣下坐者噓欷不自勝王謂唐姬曰卿故王者妃勢不復為吏民妻也行矣自愛從此長辭遂鴆死孝獻皇帝續漢書曰孝獻皇帝諱協靈帝少子也母曰王美人何皇后妬而害之靈帝母永樂太后董氏收養焉故號董侯中平六年四月靈帝崩太子辯即尊位年幼皇太后詔封上為渤海王七月徙封陳留王九月董卓廢天子立陳留王是日即皇帝位年九歲董卓秉政初平元年二月天子自雒陽遷都長安興平元年正月帝加元服二年十月上自長安東遷建安元年七月至雒陽八月上自雒陽遷都於許二十五年十月上禪位於魏魏王即帝位封上為山陽公青龍二年三月薨以天子禮葬禪陵獻帝春秋曰袁紹將兵入宮誅諸黃門張讓等逼迫以尺一詔開大夏門將帝及陳留王出不知所如有螢火照道到盟津河上傳國六璽不及自隨百僚分散唯河南中部掾閔貢見天子出率騎追之比曉到河上天子飢渴貢宰羊進之厲聲謂讓曰今不速死吾射殺汝讓等惶怖又手再拜叩頭向天子辭曰臣等死陛下自愛遂投河而死貢扶輦還宮時董卓適至屯顯陽苑聞帝當至率兵迎帝於北邙帝見卓兵振喜不自勝群公曰有詔卻兵卓曰卿為大臣不能匡輔國朝至令幼主蒙塵播越何卻兵之有遂俱入城帝幸北宮改年號曰昭寧於閣上得六璽失傳國璽又曰興平元年蝗虫起百姓飢穀一斛五六萬錢帝勑主者盡賣廄馬二百餘疋及御府雜繒二萬疋賜公卿已下及貧民車騎將軍李𠐶不聽盡取以置其邸李𠐶郭汜有隙𠐶使兄子副車中郎將李進勒兵數千統宮使虎賁王曹等三百人以軺車三乘載帝及伏后幸𠐶營又迎宮人公卿家屬入塢移御府諸署繒綵珍寶上方在廄車馬乘輿器物盡置其邸放兵燒府庫及居民被害者不可勝數五月或欲轉乘輿幸黃白城帝不肯司徒趙溫以帝當東歸而𠐶等方亂以忠節責𠐶𠐶怒欲斬溫𠐶從弟上軍校尉維故溫掾請諫乃止於是閉溫與帝同門設反關校尉以監察之十一月車駕東幸到黃卷亭庚午乘輿到弘農張濟欲與董承楊奉交質而留乘輿承奉不肯白帝東行到澗中濟郭汜放兵欲留車駕承奉力戰乘輿得過公卿婦女衣服悉見鈔奪不解帶便斫㓨寒凍死者不可勝計天子得過路次曹陽乘輿到安邑十二月使侍中史跱直里切太僕韓融奉詔詔張濟悉遣宮人公卿以下婦女及乘輿服物車馬諸見略者皆詣安邑建安元年七月乘輿到洛幸城西故中常侍趙忠舍百官被荊棘依故丘墟間侍郎以下皆出葬采四方州郡各擁強兵莫有至者曹操白帝遷都許庚申車駕出洛轘轅而東陽奉韓暹引軍追之輕騎既至曹操設伏兵要於陽城山峽中大敗之九月車駕到許幸曹操營設有司營宗廟社稷自帝西遷朝廷傾覆王制節度於是始建漢晉陽秋曰獻帝都許守位而已宿衛近侍莫非曹氏黨舊恩戚議郎趙彥嘗為帝陳言時策曹操惡而殺之其餘內外多見誅操後以事入見殿中帝不任其忿因曰君能相輔則厚不爾幸垂恩相捨操失色俛仰求出舊儀三公輔兵入朝令虎賁執刃挾之操顧左右汗流洽背自後不敢復朝請袁山松後漢書曰獻帝崎嶇危亂之間飄薄萬里之衢萍流蓬轉嶮岨備經自古帝王未之有也觀其天性慈愛弱而神患若輔之以德真守文令主也曹氏始於勤王終至陷天遂力制群雄負鼎而趨然因其利器假而不反廻山倒海遂移天日昔田常假湯武而殺君操因堯舜而竊國所乘不同濟其盜賊之身一也善乎莊生之言竊鉤者誅竊國者為諸侯之門仁義在焉信矣范曄後漢論曰傳稱鼎之為器雖小而重故神之所寶不可奪移至今負而趨者斯亦窮運之歸乎天猒漢德久矣山陽其何誅焉, SBCK: ''}
