  - {type: variant, offset: 517, length: 1, content: 東, SBCK: 􅀕魏武帝文曰夫大徳曰生資二儀以成化大寳曰位應五運而逓昌貴賤廢興莫非天命故龍顔日角顯帝王之符電影虹光表乾坤之瑞不可以智競不可以力爭昔漢室三分羣雄並立夫民離政亂安之者哲人徳喪時危定之者賢輔伊尹之匡殷室王道昏而復明霍光之佐漢朝皇綱否而還泰立忠履節爰在於斯帝以雄武之姿常艱難之運棟梁之任同乎曩時匡正之功異乎往代}
