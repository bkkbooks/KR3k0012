  - {type: variant, offset: 536, length: 471, content: 之曾孫也樂安王孫渤海王子也年八歲茂質純淑好學尊師有聞於郡國孝冲帝崩徵封建平侯即皇帝位本初元年閏六月帝崩于玉堂前殿在位一年時方九歲葬靜陵漢晉春秋曰帝初年幼小聞梁冀專權於天下每朝出輒目之曰此跋扈將軍冀聞而大懼遂陰行鴆毒始病呼太尉李固入固前問病帝曰食煮餅令腸中悶得水尚可活冀曰不可語未絕而崩威宗孝桓皇帝東觀漢記曰孝桓皇帝諱志章帝曾孫河間孝王孫蠡吾侯翼之長子也母曰匽音匽夫人年十四襲爵始入有殊於人梁大后欲以女弟妃之太初元年四月徵詣雒陽既至未及成禮會質帝崩無嗣太后密使瞻察威儀才明任奉宗廟遂與兄冀定策於禁中迎帝即位時年十五改元建和元年大將軍梁冀輔政縱橫為亂帝與中常侍單超等五人共謀誅之於是封超等為五侯五侯暴恣日甚毒流天下白馬令李雲坐直諫誅名臣少府李膺等並為閹人所譖誣為黨人下獄死在位二十一年崩年三十六薛瑩漢記贊曰漢德之衰有自來矣而桓帝繼之以淫暴封殖官豎群妖滿側姦黨彌興賢良被辜政荒民散亡徵漸積逮至靈帝遂傾四海豈不痛哉左傳曰國於天地有與立焉不數世淫不能獘也信矣孝靈皇帝續漢書曰孝靈皇帝諱宏章帝玄孫河間孝王曾孫解瀆亭侯淑之孫萇之子也母曰董姬萇薨上襲爵為侯永, SBCK: 延}
