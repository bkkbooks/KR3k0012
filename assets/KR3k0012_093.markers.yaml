  - {type: variant, offset: 117, length: 0, content: '', krp: 詣楊州募兵司徒王允與吕布共殺卓青州黄巾衆百餘萬人兖州劉岱欲擊之鮑信諫岱不從遂與戰果爲賊}
  - {type: variant, offset: 118, length: 5, content: 譖愬京懼有, SBCK: 殺信乃迎太祖領兖州牧遂進兵擊黄巾追至濟北乞降各受降卒三十餘萬男女百餘萬口収其精銳者號青州兵天子拜太祖兖州牧是歳長安亂天子東遷敗於曹陽渡河幸安邑太祖軍臨武迎天子假太祖節􅃏録尚書事獻帝記曰又領司􅀠校尉洛陽殘破董昭等勸太祖都許車駕出轘轅而東以太祖爲大將軍封武平侯自天子西遷朝廷離亂至是宗廟社稷制度始立時以袁紹爲太尉紹恥班在公下不肯受公乃固辭以大將軍讓紹天子拜公司空行車騎將軍公圍張繡於穰劉􅀽遣兵救繡以絶軍}
  - {type: variant, offset: 118, length: 5, content: 譖愬京懼有, krp: 殺信乃迎太祖領兖州牧遂進兵擊黄巾追至濟北乞降各受降卒三十餘萬男女百餘萬口収其精銳者號青州兵天子拜太祖兖州牧是歳長安亂天子東遷敗於曹陽渡河幸安邑太祖軍臨武迎天子假太祖節鉞録尚書事獻帝記曰又領司隷校尉洛陽殘破董昭等勸太祖都許車駕出轘轅而東以太祖爲大將軍封武平侯自天子西遷朝廷離亂至是宗廟社稷制度始立時以袁紹爲太尉紹恥班在公下不肯受公乃固辭以大將軍讓紹天子拜公司空行車騎將軍公圍張繡於穰劉袁遣兵救繡以絶軍}
