  - {type: variant, offset: 138, length: 0, content: '', WYG: 室之重據二周之險東向以臨天下雖以無道行之猶足為患今焚燒宫室刼遷天子海内震動不知所歸此天亡之時也一戰而天下定矣不可失也遂引兵西據成臯到榮陽汴水遇卓將徐榮與戰不利士卒死傷甚多太祖為流矢所中乗馬被創從弟洪以馬與太祖得出太祖兵少乃與夏侯惇等詣揚州募兵司徒王允與吕布共殺卓青州黃巾衆百餘萬人兖州劉岱欲擊之鮑信諌岱不從遂與戰果為賊所殺信乃迎太祖領兖州牧遂進兵擊黃巾追至濟北乞降冬受降卒三十餘萬男女百餘萬口收其精銳者號青州兵天子拜太祖兖州牧是嵗長}
  - {type: page-break, offset: 138, content: '', id: KR3k0012_WYG_093-2b, image: WYG0893/WYG0893-0751d.png}
