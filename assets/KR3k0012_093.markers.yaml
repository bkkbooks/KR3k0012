  - {type: variant, offset: 1674, length: 1, content: 四, WYG: 七尺之形死為一坯之土唯立徳揚名可以不朽其次莫如著篇籍疫癘數起士人凋落余獨何人能全其壽故論撰所著典論詩賦蓋百餘篇集諸儒於肅成門内講論大義侃侃無倦吳志曰魏文帝出廣陵望大江曰彼有人焉未可圗也乃還博物志曰魏文帝善彈棊能用手巾角時有一書生又能低頭以所冠著葛巾角撇棊典論曰初平之元董卓弑帝鴆后盪覆王室時余年五嵗上以世方擾亂教余學射六嵗而知射教余乗馬八嵗而能騎射矣以時之多難故毎征伐余乗馬常從建安初上南征荆州至宛張繡降旬日而反亡兄孝亷子脩從兄安民遇害時余十嵗乗馬得脫夫文武之}
