  - {type: variant, offset: 136, length: 1, content: 陰, WYG: 南相國有十餘縣長吏多阿附貴戚贓汚狼籍於是奏免其八九禁斷滛祀姦雄逃竄郡界整肅乆之徵還為東郡太守不就稱疾歸鄉里初平元年春正月後將軍袁術冀州牧韓馥兖州刺史劉岱渤海太守袁紹濟北相鮑相等同時俱起衆各數萬推紹為盟主太祖行奮武將軍董卓聞兵起乃徙天子都長安卓留屯洛陽遂焚宫室是時卓兵强紹等莫敢先進太祖曰舉義兵以誅暴亂大衆已合諸君何疑向使卓聞山東兵起恃}
