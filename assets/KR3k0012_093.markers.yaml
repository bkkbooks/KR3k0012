  - {type: variant, offset: 139, length: 4, content: 帝崩北鄉, WYG: 亂天子東遷敗於曹陽渡河幸安邑太祖軍臨武迎天子假太祖節鉞録尚書事獻記曰又領司隷校尉洛陽殘破董昭等勸太祖都許車駕出轘轅而東以太祖為大將軍封武平}
