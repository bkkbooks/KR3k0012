  - {type: variant, offset: 152, length: 0, content: '', SBCK: 進連營稍前公與荀彧書曰賊來追吾雖日行數里吾䇿之到安衆破繡必矣到安衆繡與表兵合守險公軍前後受敵公乃夜鑿險爲地道悉過輜重設竒兵㑹明賊謂公爲遁也悉軍來追乃縱竒兵岀夾攻大破之公還許荀彧問公前何以䇿賊必破公曰虜遏吾歸師而與吾死地戰吾以是知勝矣􅀽紹旣并公孫瓉兼四州之地衆十餘萬諸將以爲不可敵公曰吾知紹之爲人志大而智小色厲而膽薄忌刻而少威兵多而分畫不明將驕而政令不一土地雖廣粮食雖豐適所以爲吾奉也張繡率衆降公軍官渡劉備殺徐州刺史曹胄舉兵屯沛五年公自征備諸將曰與公爭天下者􅀽紹也今棄之東若何公曰劉備人傑也今不擊必爲後患袁紹雖有大志而見事遟必不動也遂破備備奔紹紹遣郭圎淳于瓊顔良等攻劉延於白馬紹引兵至黎陽公於是救延荀攸􅀃公曰今兵少不敵分其􅀔乃可公從之遂擊破斬良紹􅀐將文醜與劉備將五六千􅀐前後至公縱竒兵擊大破之斬醜良醜良皆紹名將再戰悉擒紹軍大震八月紹連營稍前進臨官渡起土山地道公亦於内作之以相應紹射營中矢如雨下行者皆蒙楯衆大懼時公粮少與荀或書議欲還許或以爲紹悉衆臨官渡欲與公决勝敗公以至弱當至強􅀂不能制必爲所乗是天之大機也公與紹相距連月雖比戰斬將然衆少粮盡士卒疲乏公謂運者曰十五日爲汝破紹不復勞汝矣冬十月紹遣車運榖使淳于瓊等五人將兵萬餘人逆之宿紹軍營北四十里紹謀臣許攸貪財紹不能足來奔因􅀃公擊瓊等左右疑之荀攸賈詡勸公公乃留曹洪守自將歩􅀐五千人夜徃㑹明至瓊等望見公兵少出陣門外公急擊之瓊退保營遂攻之紹遣􅀐救瓊左右或言賊稍近請分兵距之公怒曰賊在背後乃白士卒皆殊死戰大破瓊等皆斬之紹􅀄聞公擊瓊謂長子譚曰就彼破瓊等吾攻抜其營彼固無所歸矣乃使張郃髙覽攻曹洪郃等聞瓊破遂來降紹衆大潰紹及譚棄軍走渡河追之不及盡収其輜重圖書珍寳虜其衆公収紹書中得許下及軍中人書皆焚之紹自軍破後發病歐血死小子尚代譚自號車􅀐將軍屯􅀺陽秋公征之連戰譚尚數敗退固守攻其郭乃出戰擊大破之譚尚夜遁譚尚争兾州譚爲尚所敗走保平原尚攻之急譚遣辛毗乞降請救諸將皆疑荀攸勸公許之公乃引軍到􅀺陽爲子整與譚結婚尚聞公北乃釋平原還鄴公進軍攻鄴尚懼乞降公不許爲圍益急尚夜遁衆大潰尚走中山盡獲其輜重得尚印綬節􅃏鄴定公臨祠紹墓哭之流涕慰勞紹妻還其家人寳物賜之雜繒絮廪食之天子以公領兾州牧公讓還兖州公之圍鄴也譚略取甘陵安平渤海河間尚敗還中山譚攻之尚奔固安遂并其衆公遺譚書責以􅀒約與之絶婚女還然後進軍譚懼拔平原走保南皮公入平原略定諸縣攻譚破之斬誅其妻子兾州平袁熈大將焦觸張南等叛攻熈尚熈尚奔三郡烏丸觸等舉其縣降封爲列侯三郡烏丸承亂破幽州略有漢民合十餘萬户􅀄袁紹皆立其酋豪西單于蹹頓尤強爲紹所厚故尚兄弟歸之數入塞爲害公將征之鑿渠自呼陁入􅀌水名平虜渠引軍出盧龍塞外道絶不通乃壍山堙谷五百餘里經白擅歴平剛渉鮮卑庭東指栁城未至二百里虜乃知之尚熈與蹹頓遼西單于樓班右北平單于能臣抵之等將數萬􅀐逆軍登白狼山卒與虜遇衆甚盛公車重在後􅀍甲者少左右皆懼公登髙望虜陣不整乃縱兵擊之使張遼爲先鋒虜衆大崩斬蹹頓及名王以下胡漢降者二十餘萬口􅀄遼東太守公孫康恃逺不服及公破烏丸或􅀃公遂征之尚兄弟可擒也公曰吾方使康斬送尚熈首不煩兵矣公引軍自柳城還康即斬尚熈及速僕九等傳其首諸將或問公還而康斬送尚熈何也公曰彼素畏尚等吾急之則并力緩之則自相圖其勢然也􅀜中諸將疑公欲自襲馬超遂與韓遂楊秋李堪成冝等及公迺征之與超夾􅀜爲軍乃與剋日㑹戰先輕兵挑之戰良乆乃縱虎􅀐夾擊大破之斬成冝李堪等超走凉州楊秋奔安定􅀜中平天子命公賛拜不名入朝不趨劒履}
