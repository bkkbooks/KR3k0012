  - {type: variant, offset: 109, length: 2, content: 江京, SBCK: 封費亭侯養子嵩嗣官至太尉莫能審其生出本末曹瞞傳及郭頒丗語並云嵩夏侯氏子夏侯惇之叔父太祖於惇爲從父兄弟也嵩生太祖太祖少機警有權數而任俠放蕩不治行業故丗人未之竒也唯梁國橋􅀇南陽何顒異焉􅀇謂太祖曰天下將亂非命世之才不能濟也能安之者其在君乎年二十舉孝廉爲郎除洛陽北部尉遷頓丘令徴拜議郎光和末黄巾起拜􅀐都尉討潁川賊遷爲濟南相國有十餘縣長吏多阿附貴戚􅂍汙狼籍於是奏免其八九禁斷􅁋祀姦宄逃竄郡界整肅乆之徴還爲東郡太守不就稱疾歸郷里􅀄平元年春正月後將軍袁術兾州牧韓馥兖州刺史劉岱㴾海太守􅀽紹濟北相鮑信等同時俱起衆各數萬推紹爲盟主太祖行􅁬武將軍董卓聞兵起乃徙天子都長安卓留屯洛陽遂焚宫室是時卓兵强紹等莫敢先進太祖曰舉義兵以誅暴亂大衆巳合諸君何疑向使卓聞山東兵起􅀝王室之重據二周之險東向以臨天下雖以無道行之猶足爲患今焚燒宫室刧遷天子海内震動不知所歸此天亡之時也一戰而天下定矣不可失也遂引兵西據成臯到滎陽汴水遇卓將徐榮與戰不利士卒死傷甚多太祖爲流矢所}
  - {type: page-break, offset: 109, content: '', id: KR3k0012_SBCK_093-1b}
  - {type: variant, offset: 109, length: 13, content: 江京中常侍樊豐等所譖愬京懼, WYG: 封費亭侯養子嵩嗣官至太尉莫能審其生出本末曹瞞傳及郭班世語並云嵩夏侯氏子夏侯惇之叔父太祖於惇為從父兄弟也嵩生太祖太祖少機警}
  - {type: variant, offset: 109, length: 2, content: 江京, krp: 封費亭侯養子嵩嗣官至太尉莫能審其生出本末曹瞞傳及郭頒丗語並云嵩夏侯氏子夏侯惇之叔父太祖於惇爲從父兄弟也嵩生太祖太祖少機警有權數而任俠放蕩不治行業故丗人未之竒也唯梁國橋玄南陽何顒異焉玄謂太祖曰天下將亂非命世之才不能濟也能安之者其在君乎年二十舉孝廉爲郎除洛陽北部尉遷頓丘令徴拜議郎光和末黄巾起拜騎都尉討潁川賊遷爲濟南相國有十餘縣長吏多阿附貴戚贓汙狼籍於是奏免其八九禁斷淫祀姦宄逃竄郡界整肅乆之徴還爲東郡太守不就稱疾歸郷里𥘉平元年春正月後將軍袁術兾州牧韓馥兖州刺史劉岱㴾海太守袁紹濟北相鮑信等同時俱起衆各數萬推紹爲盟主太祖行奮武將軍董卓聞兵起乃徙天子都長安卓留屯洛陽遂焚宫室是時卓兵强紹等莫敢先進太祖曰舉義兵以誅暴亂大衆巳合諸君何疑向使卓聞山東兵起倚王室之重據二周之險東向以臨天下雖以無道行之猶足爲患今焚燒宫室刧遷天子海内震動不知所歸此天亡之時也一戰而天下定矣不可失也遂引兵西據成臯到滎陽汴水遇卓將徐榮與戰不利士卒死傷甚多太祖爲流矢所}
