  - {type: variant, offset: 129, length: 5, content: 子太子坐廢, WYG: 祖曰天下將亂非命世之才不能濟也能安之者其在君乎年二十舉孝㢘為郎除洛陽北部都尉遷􅉐丘令徴拜議郎光和末黃巾起拜騎都尉討頴川賊遷}
