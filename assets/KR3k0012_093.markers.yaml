  - {type: variant, offset: 144, length: 6, content: 即尊位王廢絀, WYG: 自天子西遷朝廷離亂至是宗廟社稷制度始立時以袁紹為太尉紹耻班在公下不肯受公乃固辭以大將軍讓紹天子拜公司空行車騎將軍公圍張繡於穰劉表遣兵救繡以絶軍後公將引還繡兵來追公軍}
