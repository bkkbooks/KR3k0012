  - {type: variant, offset: 506, length: 0, content: '', krp: 廟號曰太祖曹暪傳曰操少好飛鷹走狗遊蕩無度其叔父數言之於嵩操患之後逢叔父於路及陽敗面喎口叔父恠問其故太祖曰卒中惡風叔父以告嵩嵩驚愕呼操而口皃如故嵩問曰叔父言汝中風巳差乎操曰初不中風但失愛於叔父故見罔耳嵩乃疑焉自後叔父有所告嵩終不復信操於是益得肆意及爲洛陽北部尉初入尉廨繕治四門造五色棒懸門左右各十餘枚有犯禁者不問豪强皆棒殺從數月靈帝愛幸小黄門蹇碩叔父夜行}
  - {type: variant, offset: 507, length: 1, content: 位, SBCK: 殺之京師歛迹莫敢犯者近習寵臣咸疾之然不能傷於是共稱薦操故遷爲頓丘令操爲人輕易無威重好音樂倡優在側但以日逹夕􅀍服輕綃身自佩小盤囊以盛手巾細物時或冠祫帽以見賔客毎與人談論戯弄言辭盡無所隠及恍大􅀏至以頭投杯案中餚膳皆沾汚巾幘其輕易如此然持法峻刻諸將計畫勝出巳者隨以法誅之及故人舊惡亦皆無餘其所刑殺輙對之垂涕嗟痛之終無所活嘗出軍行經麥中令士卒無敗麥犯者死騎士皆下馬指麥以相付時操馬騰入麥中勑主簿議罪主簿對以春秋之義罰不加尊操曰制法而自犯之何以帥下然􅀌爲軍帥不可殺請自刑因抜刀割髮以置地世語曰魏武將見匈奴自以形陋不足雄逺國使崔季珪代當自捉刀立牀頭坐旣畢令間謂曰魏王何如匈奴使荅曰王雅望非常然牀頭捉刀人此乃英雄也魏王聞之馳遣殺此使􅀶物志曰漢世安平崔瑗瑗子寔弘農張芝芝弟昶並善草書而太祖亞焉桓譚蔡邕善音樂馮翊山子道王九眞郭凱等善圍碁太祖皆與埒能又好養性法亦解方藥招引方術之士廬江左慈譙郡華他甘陵甘始陽城郄儉無不畢至又習噉野􅁑至}
