  - {type: variant, offset: 512, length: 3, content: 歲孝質, SBCK: 十里魏武曰吾巳得令脩別記所如脩曰黄絹色􅁝也於字爲絶㓜婦少女也於字爲妙外孫女子也於字爲好虀臼受辛也於字爲辭所謂絶妙好辭武帝亦記之與脩言同帝歎曰我才不如卿乃較三十里唐太宗}
