  - {type: variant, offset: 509, length: 2, content: 年年, SBCK: 尺亦得少多飲鴆酒世􅀃曰魏武帝甞過曹娥碑不解楊脩讀碑背上題云黄絹㓜婦外孫虀臼魏武謂脩曰卿解未可言待我思之行}
  - {type: variant, offset: 509, length: 2, content: 年年, WYG: 切細物時或冠祫帽以見賔客每與人談論戲弄言辭盡無所隠及恱大笑至以頭投杯案中飲膳皆沾汚巾幘其輕易如此然持法峻刻諸將計畫勝出已者隨以法誅之及故人舊惡亦皆無餘其所刑殺輙對之垂涕嗟痛之終無所活嘗出軍行經麥中令士卒無敗麥犯者死騎士皆不騎扶麥以相過時操馬騰入麥中勅主簿議罪主簿對以春秋之義罰不加尊操曰制法而自犯之何以帥下然孤為軍帥不可殺請自刑因援刀割髪以置地世説曰魏武將見匈奴自以形陋不足雄逺國使崔季珪代當自捉刀立牀頭坐既畢令間謂曰魏王何如匈奴使答曰王雅望非常然牀頭捉刀人此乃英雄也魏王聞之追殺此使博物志曰漢世安平崔瑗瑗子實𢎞農張芝芝弟昶並善草書而太祖亞焉桓譚蔡邕善音樂馮翊山子道王九真郭凱等善圍碁太祖皆與埒能又好養性法亦解方藥招引方術之士廬江左慈譙郡華陀甘陵甘始陽城郗儉無不畢至又習噉野葛至一尺亦能少少飲鴆酒世說曰魏武帝嘗過曹娥碑不解楊脩讀碑背上題云黃絹㓜婦外孫虀臼魏武謂修曰卿解未可言待我思之行}
