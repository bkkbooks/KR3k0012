  - {type: variant, offset: 1509, length: 0, content: '', SBCK: 時年四十帝好文學以著述爲務自所勒成垂百篇又使諸儒撰集經傳隨􅁼相從凡千餘篇號曰皇覽魏書曰帝生時有雲氣青色而圎如車蓋當其上終日望氣者以爲至貴之證非人臣之氣年八􅀊能屬文有逸才遂􅀶貫古今經傳諸子百家之言善騎射好擊劒州舉茂才不行又曰文帝􅀄}
  - {type: variant, offset: 1509, length: 6, content: 在位二十二年, WYG: ''}
  - {type: variant, offset: 1509, length: 0, content: '', krp: 時年四十帝好文學以著述爲務自所勒成垂百篇又使諸儒撰集經傳隨類相從凡千餘篇號曰皇覽魏書曰帝生時有雲氣青色而圎如車蓋當其上終日望氣者以爲至貴之證非人臣之氣年八歲能屬文有逸才遂博貫古今經傳諸子百家之言善騎射好擊劒州舉茂才不行又曰文帝𥘉}
  - {type: variant, offset: 1510, length: 1, content: 位, SBCK: 東宫氣疫大起時人凋傷帝􅀷感歎與素所善者大理王㓪書曰人生有七尺之形死爲一棺之土唯立徳揚名可以不朽其次莫如著篇籍疫癘數起士人凋落余獨何人能全其夀故論撰所著論詩賦蓋百餘篇集諸儒於肅成門内講論大義偘偘無倦呉志曰魏文帝出廣陵望大江曰彼有人焉未可圖也乃還􅀶物志曰魏文帝善彈棊能用手巾角時有一書生又能低頭以所冠巾角撇棊典論曰􅀄平之元年董卓弑帝鴆后盪覆王室時余年五歳上以丗方擾亂教余學射六歳而知射教余乗馬八歳而能􅀐射矣以時之多難故每征伐余乗馬常從建安􅀄上南征荆州至宛張繡降旬日而反亡兄孝廉子脩從兄安民遇害時余十歳乗馬得脫夫文武之道各隨時而用生乎中平之季長於戎旅之間是以少好弓馬于今不衰逐禽輙十里馳射常百歩日夕體倦心毎不厭建安十年始定兾州穢貊獻良弓燕岱獻名馬時歳之暮春勾芒司節和風扇物弓燥手柔草淺獸肥與族兄弟同獵於鄴西終日􅀗麞鹿九雉兎}
  - {type: page-break, offset: 1510, content: '', id: KR3k0012_SBCK_093-8b}
  - {type: variant, offset: 1510, length: 1, content: 位, krp: 東宫氣疫大起時人凋傷帝深感歎與素所善者大理王㓪書曰人生有七尺之形死爲一棺之土唯立徳揚名可以不朽其次莫如著篇籍疫癘數起士人凋落余獨何人能全其夀故論撰所著論詩賦蓋百餘篇集諸儒於肅成門内講論大義偘偘無倦呉志曰魏文帝出廣陵望大江曰彼有人焉未可圖也乃還博物志曰魏文帝善彈棊能用手巾角時有一書生又能低頭以所冠巾角撇棊典論曰𥘉平之元年董卓弑帝鴆后盪覆王室時余年五歳上以丗方擾亂教余學射六歳而知射教余乗馬八歳而能騎射矣以時之多難故每征伐余乗馬常從建安𥘉上南征荆州至宛張繡降旬日而反亡兄孝廉子脩從兄安民遇害時余十歳乗馬得脫夫文武之道各隨時而用生乎中平之季長於戎旅之間是以少好弓馬于今不衰逐禽輙十里馳射常百歩日夕體倦心毎不厭建安十年始定兾州穢貊獻良弓燕岱獻名馬時歳之暮春勾芒司節和風扇物弓燥手柔草淺獸肥與族兄弟同獵於鄴西終日獲麞鹿九雉兎}
  - {type: variant, offset: 1513, length: 2, content: 二年, SBCK: 後軍南征次曲蠡尚書令荀彧奉使犒軍見余談論之末或言聞君善左右射此實難能余言執事未覩夫項發口縱俯馬蹄而仰月支也彧喜􅀏曰乃爾余日射有常徑的有常所雖毎發輙中非至妙也􅀂夫馳平原赴豊草要狡獸截輕禽使弓不虛彎所中必洞胷斯則妙矣}
