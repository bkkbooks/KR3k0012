  - {type: variant, offset: 1657, length: 1, content: 是, SBCK: 橦車也其下四輪從中權之至敵城下又曰漢世祖造大戰車駕數牛上設樓櫓置疆塞之外以拒匈奴酈善長水經注曰交州刺史檀和之軍次區粟進逼城飛梯雲橋懸樓登壘鉦鼔大作風烈火颺城摧衆䧟斬區栗王范扶龍首十五已上坈截無赦太公六韜曰凢三軍有大器攻圍邑有橨榅臨衝城中則有雲梯飛樓又曰凢三軍行師領衆旦則有雲梯逺望夜則有雲火萬炬又曰武王􅃦疾十日太公􅀒王乃駕騖寘之車周旦爲御至于孟津大黄叅連弩大才扶咠車並戰具也飛鳬赤莖白羽以䥫爲首雷影青莖赤羽以銅爲首副也晝則爲光夜則爲星方頭䥫搥重八斤亦軍備也大柯斧重八斤一名鐵鉞軍備也行馬廣二文二十具渡溝飛橋廣五尺轉關鹿盧八具天舡一名天漢以濟丈水也鷹􅀲方㐫䥫把柄長七尺天陣日月斗柄杓左一右一仰背天陣}
