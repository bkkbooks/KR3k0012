  - {type: variant, offset: 1243, length: 1, content: 都, SBCK: 宋}
  - {type: variant, offset: 1243, length: 3, content: 都督武, WYG: 宋遣輔國將軍劉勔用草茅苞土擲以塞塹城内以火箭射之草未及然後土續至塹便欲滿隊主趙法進計以鐵之珠子灌之珠子流滑悉縁隟得入草扵是火然勔乃作大蝦蟆車載土牛皮蒙之三百人推以塞塹琰戸曹叅軍虞挹之造抛車擊之以石車悉破壊宋起居注曰劉道符露板曰七月二十日部率衆車虎士攻城鉤車至城東南樓下逆賊程天作等道窮數廹仍乞䧏齊書曰殷琰反帝遣輔國將軍劉勔西討之築長圍創攻道於東南角并作大蝦蟆車載土牛皮䝉之百人推以塞塹琰乃始䧏三國典畧曰侯景作尖頂木驢攻城石不能破也羊侃作雉尾炬灌以膏蠟取擲焚之乃退梁書曰侯景為曲項木驢攻城矢石不能制羊侃作雉尾炬施鐵鏇以油灌之擲驢上焚之俄盡賊又東西起二土山以臨城中震駭侃命為地道潜引其土山不能立又作登城樓髙十餘丈欲臨射城中侃曰車髙塹虛彼來必倒可卧而觀之及車動果倒衆皆服焉賊既頻攻不捷乃築長圍朱异張綰議出擊之帝以問侃侃曰不可賊多日攻城既不能下故立長圍欲引城中降者耳今擊之出人若少不足當賊若多則一旦失利門隘橋小必大致挫衂不從遂使千餘人出戰未及交鋒望風退走果以爭橋赴水死者大半隋書曰遼東之役何稠攝右屯}
