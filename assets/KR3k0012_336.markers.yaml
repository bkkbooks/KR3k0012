  - {type: variant, offset: 1656, length: 0, content: '', SBCK: 陶公故事曰臣􅋲言郭黙狂狡肆行凶虐􅀒阻城險用稽天誅臣土山陵其城樓櫓攻具備設宋先朝故事曰慕容超大將垣遵踰城帰順髙祖使遵等治攻城橦車築長圍髙三丈外三重壍周􅁶輿服雜事曰轒輼今}
  - {type: variant, offset: 1656, length: 0, content: '', krp: 陶公故事曰臣侃言郭黙狂狡肆行凶虐負阻城險用稽天誅臣土山陵其城樓櫓攻具備設宋先朝故事曰慕容超大將垣遵踰城帰順髙祖使遵等治攻城橦車築長圍髙三丈外三重壍周遷輿服雜事曰轒輼今}
