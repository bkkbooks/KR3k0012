  - {type: variant, offset: 1525, length: 1, content: 蕭, krp: 侯景作尖項木驢攻城石不能破也羊侃作雉尾矩灌以膏臘取擲焚之乃退梁書曰侯景爲曲頂木驢攻城矢石所不能制羊侃作短尾炬施鐡鏃以油灌之擲驢上焚之俄盡賊又東西起二土山以臨城城中震駭侃命爲地道潜引其土山不能立又作登城樓髙十餘丈欲臨射城中侃曰車髙壍虚彼來必倒可卧而觀之及車動果倒衆皆服焉賊旣頻攻不捷乃築長圍朱异張綰議出擊之帝以問偘偘曰不可賊多日攻城旣不能下故立長圍欲引城中降者耳今擊之出人若少不足當賊若多則一旦失利門隘橋小必大致挫衂不從遂使千餘人出戰未及交鋒望風退走果以争橋赴水死者太半矣隋書曰遼東之役何稠攝右屯衝將軍領御營弩手三萬人時工部尚書宇文愷造遼水橋不成師未得濟右屯衝大將軍麥䥫杖因而遇害帝遣稠造橋二日而就𥘉稠製行殿及六合城至是帝於遼左與賊相對夜中施之其城周廻八里城及女垣各髙十仞上布甲士立仗建旗四隅置闕面別一觀觀下三門遟明而畢髙麗望見謂若神功是歳加金紫光禄大夫唐書曰姜礭爲交何道行軍副緫管率衆數千先大軍出伊吾趣柳城谷依山採木造攻城器械其地有班超}
  - {type: variant, offset: 1527, length: 127, content: 兵次西陵艫舳旌戈翳川曜日護軍陸法和於硤兩岸築二壘運石填江鐵鏁斷之梁主令法和壘北斷白鴈城道別立小柵孟子曰天時不如地利地利不如人和三里之城七里之郭環而攻之而不勝夫環而攻之必有得天時者矣然而不勝者是天時不如地利也城非不高也池非不深也兵革非不堅利也米粟非不多也委, SBCK: 功碑礭磨去其文刋頌國功}
