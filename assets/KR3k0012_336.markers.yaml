  - {type: variant, offset: 1520, length: 71, content: 三國典略曰蕭紀兵次西陵艫舳旌戈翳川曜日護軍陸法和於硤兩岸築二壘運石填江鐵鏁斷之梁主令法和壘北斷白鴈城道別立小柵孟子曰天時不如地利地利不如人和三, WYG: 吹鳴箛作振萬}
