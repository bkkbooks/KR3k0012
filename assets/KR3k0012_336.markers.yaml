  - {type: variant, offset: 1045, length: 1, content: 陣, SBCK: 行樓土山并諸攻具時夏雨不得攻城上使御史中丞􅁃徽之奏慶官以激之自四月至于七月乃屠城斬誕又曰元嘉二十七年虜主佛狸遂攻圍懸瓠行汝南郡事廣陵陳憲嬰城自守虜多作髙樓施弩以射城内飛矢雨下城中􅀒户以汲又毀佛圗取金像以爲大鈎施之衝車端以牽樓作蝦蟆車以塡塹憲督厲將士固女牆而戰賊死者屍與城等又曰僞燕主慕容超尚書郎張䌉乞師於姚興自長安返太山守申宣執送之䌉有巧思先是帝修攻具城上人曰汝不得張䌉何能爲也及至升諸樓車以示之故城内莫不失色超旣求救不􅀗䌉反見虜乃求稱藩割大峴爲界獻馬千疋不聽又曰十月張䌉修攻具成設飛樓懸梯木慢板屋冠以皮弓矢無所用之劉毅遣上黨太守趙恢以千餘人來援帝夜潜遣軍㑹之明旦恢衆五千方道而進}
  - {type: page-break, offset: 1045, content: '', id: KR3k0012_SBCK_336-4b}
  - {type: variant, offset: 1045, length: 1, content: 陣, WYG: 行樓土山并諸攻具時夏雨不得攻城上使御史中丞庾徽之奏免慶之官以激之自四月至於七月乃屠城斬誕又曰元嘉二十七年虜主佛貍遂圍懸瓠城行汝南新蔡郡事陳憲嬰城自守虜多作髙樓施弩以射城内飛矢雨下城中負户以汲之又毁佛圖取金像以為大鈎施之衝車端以牽樓作蝦蟆車以填塹憲督厲將士登郭城督戰賊死者屍與城等又曰偽燕主慕容超尚書郎張綱乞師於姚興自長安返太山守仲宣執送之綱有巧思先是帝修攻具城上人曰汝不得張綱何能為也及至升諸樓車以示之故城内莫不失色超既求救不獲綱反見虜乃求稱藩割大峴為界獻馬千疋不聽又曰十月張綱修攻具成設飛樓懸梯木幔板屋冠以皮弓矢用之劉毅遣上黨太守趙恢以千餘人來援帝夜潜遣軍㑹之明旦恢衆五千方道而進}
