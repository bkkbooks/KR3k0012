  - {type: variant, offset: 1290, length: 131, content: 德宗幸奉天李晟赴難李懷光以朔方軍屯咸陽不欲晟獨當一面以分功乃奏請晟兵詔令晟將兵合懷光軍晟引兵至陳陶斜軍壘未周賊出兵來攻晟乃出陣且言於懷光曰賊堅保宮苑攻之未必克今出穴而欲一戰此殆天以賊賜明公也懷光恐晟有功乃曰馬未銜秣士不素飽不飽不若歛兵俟時而發晟乃收軍入壘又曰高宗, SBCK: 殷琰反帝}
  - {type: variant, offset: 1290, length: 4, content: 德宗幸奉, WYG: 姜確為交河道行軍副摠管率衆數千先大軍出伊吾趣栁城谷依山採木造攻城器械其地有班超紀功碑確磨去其文刋頌國功而去陶公故事曰臣侃言郭黙狂狡肆行凶虐負阻城險用稽}
