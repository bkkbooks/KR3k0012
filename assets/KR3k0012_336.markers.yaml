  - {type: variant, offset: 2892, length: 672, content: 里置一烽應接令遣到軍其遊弈馬騎晝日遊弈候視至暮速即作食喫即移十里外止宿慮防賊徒暮間見烟火夜間掩襲捉將其賊路左右草中著人宿止以聽賊徒如覺來報烽家舉烽報軍司如覺十騎以上五騎以下即放火炬火前鋒應訖即滅火若百騎以上二百已下即放兩炬火准前應滅賊若五百騎以上五千騎以下即同放三炬火准前應滅前鋒應訖即赴軍若虜走不到軍即且投山谷逐空方可赴軍如以次烽候視不覺其舉火之烽即須差人急走告知既置爟烽軍內即須應接又置一都烽應接四山諸烽其都烽如見烟火急報大揔管云某道烟火起大揔管當須嚴備收拾畜生遣人遠拓每烽令別奏一人押一道烽令折衝果毅一人都押庾闡楊都賦注曰烽火以置於孤山頭緣江相望或百里或五十里或三十里寇至則舉以相告一夕可行萬里孫權時合暮舉火於西陵鼓三竟遠吳郡南徐敬業古意曰甘泉警烽候上谷抵樓蘭北門行曰羽檄起邊庭烽火入咸陽張景陽雜詩曰長鋏鳴鞘中烽火烈邊庭蔡邕徙朔方上書曰既到徙所乘塞守烽職在候望憂怖憔灼無心復能操筆成草致章闕庭蔡謨與弟書曰軍之耳目當用烽鼓烽可遙見鼓可遙聞須臾百里京觀左傳曰丙辰楚軍於邲遂次于衡雍潘黨曰君盍築武軍築武軍營以章武功而收晉屍以為京觀臣聞剋敵必視子孫以無志武功楚子曰非爾所知也夫文止戈為武武王克啇作頌曰載戢干戈載櫜弓矢我求懿德肆于時夏古者明王伐不敬取其鯨鯢而封之以為大戮於是乎有京觀以懲淫慝大魚喻不義吞食小國也積屍封土其上謂之京觀又曰齊侯伐晉取朝歌為二隊入孟門登太行張武軍於滎庭戍郫邵封少水封晉屍於少水以為京觀以報平陰之役乃還又曰秦伯伐晉濟河焚舟封尸而還遂霸西戎崔鴻夏錄曰赫連勃勃大破南涼殺眾數萬以人頭為京觀號曰髑髏臺梁書曰天殲醜類宜為京觀用旌武功, SBCK: 六}
