  - {type: variant, offset: 2266, length: 3, content: 遣驃騎, SBCK: 墨子自齊至郢見楚王楚王曰公輸般爲我雲梯取宋矣墨子乃見公輸般解帶爲城以褋爲械公輸九設攻城之具機變墨子九拒之械盡墨子禦有餘公輸屈曰吾知拒子矣墨子曰子不過欲殺臣臣之弟子禽滑氂三百人巳持臣守禦之器在宋城上而待楚矣又曰禽子問雲梯旣施爲之柰何墨子曰雲梯者重器也矢石沙炭以雨之薪火湯水以濟之如此則雲梯之功敗尸子又載般爲蒙天之階階成將以攻宋墨子請獻十金般曰吾義固不殺人墨子再拜傳子序馬鈞曰鈞石車敵人於樹邊懸濕牛皮中之則墮石不能連属而欲作一輪懸}
