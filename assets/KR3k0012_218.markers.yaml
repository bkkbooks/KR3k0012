  - {type: variant, offset: 55, length: 0, content: '', SBCK: 司門揔其職務而行其制命凡中外百司之事由於所屬咸質正焉唐書曰栁公綽爲刑部尚書京兆人有姑鞭婦致死者府斷以償死公綽議曰尊毆卑非􅃲且其子在以妻而戮其母非敎也竟減死又曰李適之拜刑部尚書適之雅好賔友飲酒一斗不亂夜則宴賞晝决公務庭無留事刑部侍郎唐書曰太宗謂侍臣曰張亮有義兒五百畜養此輩將何爲也正欲反耳命百寮議其獄多言亮當誅唯將作少匠李道􅁉言亮反形未具明其無罪太宗旣盛怒竟斬于市籍没其家歳餘刑部侍郎有闕令執政者妙擇其人累奏皆不可太宗曰朕得其人也徃者李道􅁉議張亮云反形未具此言當矣當時雖不即從至今追悔遂授道􅁉刑部侍郎又曰劉瑑轉刑部侍郎瑑精於法律選大中已前二百四十四年制勑可行用者二千八百六十五條分爲六百四十六門議其輕重別成一家法書號大中統􅀋奏行用之刑部郎中刑部貟外郎六典曰刑部郎中貟外郎各二貟掌舉其典憲而辨其輕重凡文法之名有四一曰律二曰令三曰格四曰式凡律一十有二章一曰名例二曰衛禁三曰職制四曰戸婚五曰廏}
