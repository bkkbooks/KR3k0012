  - {type: variant, offset: 1968, length: 0, content: '', SBCK: 國典略曰裴讓之十七舉秀才爲屯田郎中與祖班俱聘宋邢劭省中語曰多竒多能祖孝徴能賦能詩裴讓之讓之弟讞之謀之訥之謁之並清立楊愔曰河東士族京官不少裴讓兄弟都無郷音裴文季爲不亡也隋書曰栁彧爲屯田郎時三品以上門皆列㦸左僕射髙頴子􅀪德封應國公申牒請㦸彧判曰僕射之子更不異居父之㦸槊已列外門尊有厭卑之義子有避父之禮豈有外門旣設内閤又施事竟不行頴聞而歎伏唐書曰沈扶字雲翔太和初爲屯田郎中五}
