  - {type: variant, offset: 2394, length: 4, content: 畢諴歷駕, WYG: 閻立本代兄立德爲工部尚書兄弟相代爲八座時論榮之五代史晉書曰裴皥知貢舉擢桑維翰進士第後維翰居相位徴拜皥工部尚書舎於相國寺維翰謁之不迎不送問之荅曰皥見維翰於中書曰庶寮也維翰見皥於館則門生也何送迎之有人重其耿介五代史周書曰盧文紀嗣業之子爲工部尚書時新除工部郎中于鄴公叅文紀文紀以父名同音不見或謂鄴曰南宫故事郎中入省如本行尚書侍郎不容叅何以省上鄴憂畏太過一夕醉歸遂經於室其甥鄭鐐以事聞謫文紀爲石州司馬工部郎中工}
