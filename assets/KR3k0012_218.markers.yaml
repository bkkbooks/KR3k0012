  - {type: variant, offset: 1965, length: 2, content: 開皇, SBCK: 爲工部尚書名爲稱職時有人告大都督邴紹非毀朝廷爲憒憒者上怒將斬之平進諫曰川澤納汙所以成其深山嶽藏疾所以就其大臣不勝至願願陛下􅀪山海之量茂寛􅁉之德鄙諺曰不癡不聾未堪作大家翁此言雖小可以喻大邴紹之言不應聞奏陛下又復誅之臣恐百代之後有虧聖德上於是赦紹唐書曰閻立夲代兄立德爲工部尚書兄弟相代爲八座時論榮之五代史晉書曰裴皥知貢舉擢桑維翰進士第後維翰居相位徴拜皥工部尚書舎於相國寺維翰謁之不迎不送或問之荅曰皥見維翰於中書則庶寮也維翰見皥於館則門生也何送迎之有人重其耿介五代史周書曰盧文紀嗣業之子爲工部尚書時新除工部郎中于鄴公叅文紀文紀以父名同音不見或謂鄴曰南宫故事郎中入省如夲行尚書侍郎不容叅何以省上鄴憂畏太過一夕醉歸遂經于室其甥鄭鐐以事聞謫文紀爲石州司馬工部郎中工部貟外郎六典曰工部郎中貟外掌經營興造之衆務凡城池之脩濬土木之繕葺工匠之程式咸經度之凡興建修築材木二匠則下少府將作以奉其事屯田郎中屯田貟外郎六典曰屯田郎中貟外郎掌天下屯田之政令凡軍州邊防鎭守轉運不給則設屯田以益軍儲其水陸􅃾瘠播植地冝功庸煩省收率等咸取決焉諸屯田役力各有程數}
