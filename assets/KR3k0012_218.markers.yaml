  - {type: variant, offset: 1707, length: 132, content: 書曰初魏文帝置度支尚書專掌軍國支計朝議以征討未息動須節量及明帝嗣位欲用安平王孚問左右曰有兄風不荅曰似兄帝曰吾得司馬懿二人復何憂哉轉為度支尚書又曰當陽侯杜元凱為度支尚書內以利人外以救邊備物致用以濟當時之益者五十餘條朱鳳晉書曰文帝立度支尚書軍糧計校一由之以司馬孚為之晉, WYG: 宋}
