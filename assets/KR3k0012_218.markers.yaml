  - {type: variant, offset: 56, length: 0, content: '', krp: 六曰擅興七曰盗賊八曰鬪訟九曰詐僞十曰雜律十一曰捕亡十二曰斷獄而大凡五百條焉唐書曰長慶中刑部貟外郎孫革奏准京兆府雲陽縣人力張蒞欠羽林官騎康憲錢米憲徴之蒞乗醉拉憲氣息將絶憲男買徳年十四將救其父以蒞角觝力人不敢撝解遂持木鍤擊蒞之首見血後三日致死者准律文爲人所毆人徃救擊其人折傷減凡鬪三等至死依常律即買德救父難是性孝非暴擊張蒞是功非兇以髫丱之歳正父子之親若非聖化所加童子安能及此王制稱五刑之理必原父子之親以權之測淺深之量以別之春秋之義原心定罪周書訓諸罰有權今買徳生𬒳皇風㓜符至孝哀矜之宥伏在聖慈職當讞刑合分善惡先具事由陳奏伏兾賜下中書門下啇量勑旨康買德尚在童年得知子道雖殺人當死而爲父可哀若從沉命之科是失原情之義冝付法司減死罪一等處分都官尚書南史曰徐孝克爲都官尚書自晉巳來尚書官僚皆擕家屬居省省在臺城内下舎門中有閣道東西跨路通干朝堂其第一即都官省西抵閣道年代乆逺多有鬼怪每夜昏之際無故有聲光或見人着衣冠從井中出湏臾復没或門閣自然開閉居者多死云尚書周確卒於此省孝克代確便即居之經兩載祅變皆息時人咸以爲貞正所致梁書曰羊侃遷都官尚書時尚書令何敬容用事與之並居未甞遊造有宦者張僧㣧候侃曰我牀非閹人所坐竟不前之時論美其貞正後周書曰梁元帝以沈重領江陵遷都官尚書領羽林監察又令重於合歡殿講周禮比部郎中比部貟外郎六典曰比部郎中貟外郎掌勾諸司百寮俸料公廨贓贖調歛徒役課程逋懸數物以周知内外之經費而揔勾之凡内官料俸以品第髙下爲差外官以州縣府之上中下爲差魏志曰何貞奏許都賦明帝竒之擢爲比部郎中李綽尚書故實曰杜牧甞於宰執求小儀不遂請小秋又不遂甞夢人謂曰辭春不及秋昆脚與皆頭後果得比部貟外司門郎中司門貟外郎六典曰司門郎中貟外掌天下諸門及關出入徃來之籍賦而審其政凡關二十有六而爲上中下之差所以限中外隔華夷設險作固閑邪正禁者周禮司徒職司門下大夫掌授管鍵以啓閉國門幾出入不物者正其賄貨凡財物犯禁者舉之以財養死政之老與其孤禮部尚書六典曰禮部尚書侍郎之職掌天下禮儀祭饗貢舉之政令其屬有四一曰禮部二曰祠部三曰膳部四曰主客揔其職務而行其制命凡中外百司之事由於所屬皆質正焉尚書堯典帝曰咨四岳有能典朕三禮僉曰伯夷帝曰俞伯夷汝作秩宗家語曰父子不親長㓜失序君臣上下乖離異志曰不和不和則飭宗伯飭謂整攝後魏書曰孝文車駕征馬圈留宋弁以夲官兼祠部尚書攝七兵事及行執其手曰國之大事在祀與戎故令卿綰攝二曹弁頓首辭謝東晉始置祠部尚書宋齊梁陳後還北齊皆同東晉至隋乃更爲禮部尚書禮部侍郎唐書曰韋陟爲禮部侍郎陟好引接後輩尤鑒于文雖詞人後生靡不諳練曩者主司取與皆以一場之善登其科目不盡其才陟先責舊乃令舉人自通所工詩筆先試一日知其所長然後依常式考覆片善無遺美聲盈路又曰賈至轉禮部侍郎是歳至以時艱歳歉舉人赴省者奏請兩都分試從之兩都試舉人自此始也又曰髙郢拜禮部侍郎時應進士舉者多務朋游馳聲名每歳冬州府薦送後唯追奉讌集罕隷其業郢性剛正尤嫉其風旣領職拒絶請託雖同列通熟無敢言者志在經藝專考程試凢掌貢部三歳進幽獨抑浮華朋濫之風翕然一變又曰貶劉太眞爲信州刺史太眞爲禮部侍郎性愜懦詭隨其掌貢舉宰臣姻族方鎭子弟先收擢之又甞叙陳少遊勲勣擬之桓文大招物議因斯貶禮部郎中六典曰禮部郎中貟外郎掌二尚書侍郎舉其儀制而辨其名數梁書曰武帝謂徐勉云今帝業𥘉構湏一人有學藝解朝儀者爲尚書儀曹郎勉曰孔休源識見清通詳練故事自晉宋起居注略誦上口遂拜爲儀曹郎禮部貟外郎唐書曰韋叔夏授春官貟外郎則天將拜洛及享明堂皆别受制共當時大儒祝欽明郭山惲撰定儀注凡所立議衆咸推服之祠部郎中祠部貟外郎六典曰祠部郎中貟外郎掌祠祀享祭天文漏刻國忌廟諱卜筮醫藥僧尼之事凡祭祀之名有四一曰祀天神二曰祭地祇三曰享人鬼四曰釋奠于先聖先師其差有三若昊天上帝五方帝皇地祇神州宗廟爲大祀日月星辰社稷先代帝王岳鎭海瀆帝社先蠶孔宣父齊太公諸太子廟爲中祀司中司命風師雨師衆星山林川澤五龍祠等及州縣社稷釋奠爲小祀梁書曰賀德基少遊學都下積年不歸衣資罄乏又車服故弊盛冬止衣裌𥜗袴甞於白馬寺前逢一婦人容服甚盛呼德基入寺門脫白綸巾以贈之仍謂曰君方爲重器不乆貧寒故以此相遺耳問姓名不荅而去德基於禮記稱爲精明位尚書祠部郎雖不至大官而三丗儒學俱爲祠部郎時論美其不墜主客郎中主客貟外郎六典曰主客郎中貟外郎掌二王後及諸蕃朝聘之事後漢書何逺少有美望公府中十辟一無所就由是名重華夏起家爲尚書主客郎膳部郎中膳部貟外郎六典曰膳部郎中貟外掌邦之牲豆酒膳辨其品數凡郊祀天地日月星辰岳瀆享祀宗廟百神在京都者用牛羊豕滌養之數省閱之儀皆載於廪犧之職焉五代史後唐書曰膳部郎中鄭兟先奏諸司諸使職掌人吏乗暖坐帶銀魚席帽輕衣肥馬叅雜庭臣尊卑無别汙染時風請下禁止上嘉其事促行之中書覆爲不可趙鳯亟言於執政曰此禮誡人不可不切爲權吏所庇竟寢其事工部尚書工部侍郎六典曰工部尚書侍郎之職掌天下百工屯