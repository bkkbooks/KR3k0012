  - {type: variant, offset: 81, length: 1878, content: 五代史晉史曰王權轉兵部尚書高祖德契丹屈節以事之馳馹乘軺道路交織一日勑權為使權以前世累為將相未嘗有稱臣於戎虜者謂人曰我雖不才年今耄矣豈能稽顙於穹廬之長乎違詔得罪亦所甘心由是停任兵部侍郎唐書曰太宗以楊弘禮有文武材擢拜兵部侍郎專典兵機之務弘禮每入參謀議出則統眾攻戰駐蹕之陣領馬步二十四軍出其不意以擊之所向摧破太宗自山下見弘禮所統之眾人皆盡力殺獲居多甚壯之謂許敬宗等曰越公兒郎故有家風矣又曰崔湜遷兵部侍郎父挹為禮部侍郎父子同為南省副貳有唐巳來未有其事兵部郎中兵部員外郎六典曰兵部郎中二人一人掌判帳及天下武官之階品衛府之名數一人掌判簿以揔軍戎差遣之名數員外郎二人職方郎中職方員外郎六典曰職方郎中員外郎掌天下之地圖及城隍鎮戍烽候之數辨其邦國都鄙之遠近及四夷之歸化者外夷每有蕃客至委鴻臚訊其人本國山川風土修圖以進周禮曰夏官職方氏中大夫之職掌天下地圖主四方之職貢駕部郎中駕部員外郎六典曰駕部郎中員外郎掌邦國輿輦車乘傳驛廄牧官私馬牛雜畜簿籍辨其出入司其名數北史曰馮子琮為尚書駕部郎中攝庫部孝昭曾閱簿領試令口陳子琮闇對無有遺失隋書曰辛公義為駕部郎勾撿馬牧所獲十餘萬疋帝喜曰唯我公義奉國竭心庫部郎中庫部員外郎六典曰庫部郎中員外郎掌邦國軍州戎器儀仗凡元正冬至陳設并祠祭喪葬所供之物皆辦其出入之數量其繕造之功以分給焉宋書曰文帝宴會有荒外歸化人帝問尚書庫部顧琮曰庫中仗有幾許琛跪對曰有十萬人仗舊武庫仗多祕不言帝既問失言及琛跪對甚善之又曰江智泉除尚書庫部郎時高流官序不為臺郎智泉問孤援寡獨有此選意甚不悅固辭不拜唐書曰孔若思遷庫部郎中若思常謂人仕至郎中足矣至是持一石止水滿於座右以示有止足之意戶部尚書六典曰戶部尚書侍郎之職掌天下田戶均輸錢穀之政令其屬有四一曰戶部二曰度支三曰金部四曰倉部揔其職務而行其制命凡中外百司之事由於所屬皆質正焉漢書曰成帝置尚書五人其三曰民曹主人吏上尚書事吳志曰孫休初即位戶部尚書階下讀奏梁書曰到溉為左民尚書溉身長八尺美風儀善容止所蒞以清白自脩性又率儉不好聲色虛室單床傍無姬侍自外車服不事鮮華冠履十年一易朝服或至穿補傳呼清露示有朝章而巳又曰何胤字子季為左民尚書後辭官隱於若邪山雲門寺勑給白衣尚書祿胤固辭又曰到洽為御史中丞兄溉為左民尚書舊中丞不得入尚書下舍洽引服親不應有礙刺省詳決乃許入溉省亦以其兄弟素篤不能相別也又曰周弘正為左民尚書夏月著犢鼻禈衣朱衣為有司所彈其放達如此戶部侍郎唐書曰李林甫引蕭炅為戶部侍郎嘗與何挺之同行慶弔客次有禮記一卷炅讀之曰蒸嘗伏臘炅早從宦無學術不識伏臘之意誤讀之挺之戲問炅對如初挺之白張九齡曰省中豈得有伏獵侍郎由是出為歧州刺史又曰李絳為戶部侍郎嘗因次對憲宗曰戶部比有進獻至卿獨無何也絳曰將戶部錢獻入內藏是用官物以結私恩上聳然益嘉其直又曰長慶中孟簡代崔群為戶部侍郎是官有二員其判使案者別居一署謂之左戶元和以還號為清重之最宰輔登用多由此而去又曰張平叔長慶中為戶部侍郎平叔狡險大言因王播以進既掌財用常屈公利以便嬖倖多狎之既有寵於上進退便僻雜以優諧或自稱老奴無復大臣之體嘗奏事畢降階復昇又有論奏佻盪輕脫上每為笑容之在班列間玩狎郎吏譁肆無忌請變榷鹽法請宰相為之使因以自求樞機之任每有內制出輒疑授巳整衣冠以俟後人多笑之又曰庾敬休字順之為戶部侍郎奏兩川米價騰踊百姓流亡請糶兩川闕官職田祿米以救貧人從之戶部郎中六典曰戶部郎中員外郎掌分理戶口井田之事凡天下十道任土所出而為貢賦之差隋書曰高構徵拜比部侍郎尋轉民部時內史侍郎晉平東與兄子長茂爭嫡尚書省不能斷朝臣三議不決構斷而合理上以為能召入內殿勞之曰我聞尚書郎上應列宿觀卿才識方知古人之言信矣嫡庶者禮敬之所重我讀卿判數過詞理愜當意所不能及也賜米百石由是知名唐書曰韋維少習儒業愽涉文史舉進士自大理丞累至戶部郎中善於剖判時員外郎宋之問工於詩時人以為戶部有二妙戶部員外郎唐新語曰呂太一遷戶部員外戶部外吏部鄰司吏部移牒戶部令墻宇悉豎棘以防令史交通太一報牒曰眷彼吏部銓綜之司當須簡要清通何必豎籬插棘省中賞其俊拔度支尚書晉書曰初魏文帝置度支尚書專掌軍國支計朝議以征討未息動須節量及明帝嗣位欲用安平王孚問左右曰有兄風不荅曰似兄帝曰吾得司馬懿二人復何憂哉轉為度支尚書又曰當陽侯杜元凱為度支尚書內以利人外以救邊備物致用以濟當時之益者五十餘條朱鳳晉書曰文帝立度支尚書軍糧計校一由之以司馬孚為之晉起居注曰咸寧五年詔曰一年不收使公私俱匱不唯天時乃人事有不盡也故揔要者正在度支尚書也其以散騎常中書令張華為度支尚書後魏書曰陽平王子匡除度支尚書匡與尚書令高肇不平常無降下之色時世宗委政於肇朝廷傾憚惟匡與肇抗衡先自造棺置於廳事意欲輿棺詣闕論肇罪惡, SBCK: ''}
