  - {type: variant, offset: 282, length: 220, content: 大志唯務金帛寶玩為無門大櫃上開一孔使足以受物夫妻寢止其上韓子曰楚人賣其珠於鄭者為木蘭之櫝薰以桂椒綴以珠玉飾以玫瑰緝以翡翠鄭人買櫝而還珠未可謂善鬻珠也李尤匱匣銘曰國有都邑家有匣匱貨賄之用我之利器廚魏略曰扈累字伯重京兆人常隨青牛先生先生字方正曉知星曆風角鳥情累得其術有婦無子後亦喪婦獨居道側以塼為障施一廚床食宿其中晉陽秋曰顧愷之尤好丹青嘗以一廚畫寄桓玄悉糊題其前玄乃發廚後而取之封題如舊以還之愷之見封題如初但失其畫直云妙畫通靈變化而去猶人登仙也, SBCK: 兩歧}
