  - {type: variant, offset: 27, length: 2, content: 匣拾, SBCK: 客堂朝則誦虞夏之書歴公旦之典禮覽仲尼之春秋當此之時不知天之爲蓋地之爲輿愼勿迷其夲棄其生也魏志曰徐季龍取十三種物著大篋中使管輅占之輅先􅀃雞子後道􅁞蛹遂一一名之唯以梳爲枇耳脩復山陵故事曰梓宫用象牙梳五枚后梓宫物象牙梳六枚瑇􅈘梳六枚東宫舊事曰太子納妃有瑇􅈘梳三枚盛弘之荆州記曰臨賀興安縣東邊有平石其上有櫛履各一具俗云越王渡溪脫履墜櫛於此崔寔政論曰無賞罰而欲丗之治是猶不畜梳枇而欲髮之治物理論曰威行法明漏吞舟之魚法之不明則數於細櫛細櫛則苛慝生也夢書曰夢梳枇爲憂解也虱盡去百病愈傳咸櫛賦叙曰夫才之治丗猶櫛之理髮涂岑詩曰思見君巾櫛以弭我勞慙蔡邕女誡曰用櫛則思其心之理髙文惠與婦書曰今致瑇􅈘梳一枚陸雲與兄機書曰按行視曹公器物梳枇皆在四愁詩曰美人}
