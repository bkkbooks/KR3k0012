  - {type: variant, offset: 438, length: 234, content: 名是時州郡災旱百姓窮荒望行部道見飢者祼行草食五百餘人愍然哀之因以便宜出所在布粟給其廩糧為作褐衣又曰中平元年交阯屯兵反執刺史及合浦太守自稱柱天將軍靈帝特勑三府精選能吏有司舉賈琮為交趾刺史琮到部訊其反狀咸言賦歛過重百姓莫不空單京師遙遠告冤無所民不聊生故聚為盜賊琮即移書告示使安其資業招撫荒散蠲復徭役誅斬渠帥為大害者簡選良吏使試守諸縣歲間蕩定百姓以安巷路為之歌曰賈父來晚使我先反今見清平吏不敢飯在事三年為十三州最又曰郭伋為并州牧入界所到縣邑老幼相攜逢迎道路所過問民疾苦聘求耆, SBCK: ''}
