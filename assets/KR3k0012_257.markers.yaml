  - {type: variant, offset: 356, length: 11, content: 舊典傳車驂駕垂赤帷裳迎, SBCK: 勸課農桑境内稱爲慈父隣州號曰神君先是州人張孟都張洪建馬潘崔獨憐張叔緒崔思哲等八人皆屯保林野不臣王命州郡號曰八王孚至皆請入城願致死効力北齊書曰趙郡王叡除北朔州刺史都督北燕北蔚北􅁪三州及庫堆以西黄河以東長城諸鎮諸軍事叡慰撫新遷量置􅇏戌内防外禦備有條法大爲兵民所安有無水之處禱而掘井鍫挿裁下泉源湧出至今號曰趙郡王又曰魏蘭根爲􅄮州刺史從行臺蕭寳夤討破宛川俘其人爲奴婢以美女十人賞蘭根蘭根曰此縣分於強虜故成背叛今當恤其飢寒奈何並充僕􅀠於是盡以歸其父兄部内麥多五穗隣州田䑕爲災犬牙不入歧土又曰韓􅁤遷􅁗州刺史甚得邊和神武廵秦州欲以䡄還仍賜城人户別絹布兩疋州人田昭等七千户皆辭不受唯乞留䡄神武嘉歎乃留焉北史曰齊任城王諧爲并州刺史時有婦人臨汾川浣衣有乗馬人換其新靴馳而去者婦人持故靴詣州言之諧召居城諸嫗以靴示之給曰有乗馬人於路􅀍賊刧害遺此靴焉得無親属乎一嫗撫膺哭曰兒昨着此靴向妻家如其語捕􅀗之時稱明察又曰齊平覽遷懷州刺史覽奏諸}
  - {type: page-break, offset: 356, content: '', id: KR3k0012_SBCK_257-3b}
  - {type: page-break, offset: 356, content: '', id: KR3k0012_SBCK_257-4a}
  - {type: variant, offset: 356, length: 11, content: 舊典傳車驂駕垂赤帷裳迎, WYG: 雲留心政事甚得下情於是合州民各請輸絹五尺粟五升以報雲恩髙祖嘉之又曰城陽王長壽之子徽除并州刺史先是州界下霜人庶逃散徽輒開倉賑之文武咸共諫止徽曰昔汲長孺郡守耳尚輒開倉救人饑弊况我皇家親近授委大藩豈可拘法而不救人困也先給後表肅宗嘉之又曰李平字曇定為相州刺史勸課農桑修飾太學簡試通儒以充博士選五郡聰敏者以教之圖孔子及七十二弟子於講堂親為立贊前臺使頗好侵漁平畫履虎尾踐薄氷於客館注頌其下以示誡焉又曰韋彧為東豫州刺史彧以蠻俗荒梗不識禮儀乃表立太學選諸郡生徒}
