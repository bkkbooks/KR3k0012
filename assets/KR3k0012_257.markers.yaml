  - {type: variant, offset: 406, length: 0, content: '', SBCK: 在同州也時屬大旱髙祖勑武祀華嶽而廟在舊山下當徃祈禱武謂寮屬曰吾備位三公不能爕理隂陽遂使盛農之月乆絶甘􅀨天子勞心}
  - {type: variant, offset: 406, length: 18, content: 百城聞風自然竦震其諸贓過者望風解印綬, WYG: 普慶慙懼}
  - {type: variant, offset: 406, length: 0, content: '', krp: 在同州也時屬大旱髙祖勑武祀華嶽而廟在舊山下當徃祈禱武謂寮屬曰吾備位三公不能爕理隂陽遂使盛農之月乆絶甘雨天子勞心}
  - {type: variant, offset: 407, length: 0, content: '', SBCK: 姓惶懼忝􅀉旣重憂責實深不可同於衆人在常祀之所必湏登峯展誠湏其靈奥嶽旣髙峻千仞壁立武年逾六十唯將數人攀藤援􅁄然後得上於是稽首祈請陳百姓懇誠晚不得還即於嶽上藉草而􅀫夢見白衣人來執武手曰快辛苦甚相嘉尚武遂驚覺益用祗肅至旦雲霧四起俄而澍雨逺近沾浹髙祖聞之璽書慰勞又曰韋瑱字丗珎魏恭帝二年賜姓宇文氏三年除􅀲州刺史通西域蕃夷徃來前後刺史多受賂遺胡冦犯邊又莫能禦瑱雅性清儉兼有武略蕃夷贈遺一無所受胡人畏威不敢爲冦公私安静夷夏懷之又曰長孫儉授荆州刺史東南道行臺僕射所部鄭縣令泉璨爲民所訟推理􅀗實儉即大集僚属而謂之曰此由刺史教誨不明信不􅀍物是我之愆非泉璨之罪遂於㕔事前肉􅃝自罰捨璨不問於是州}
  - {type: page-break, offset: 407, content: '', id: KR3k0012_SBCK_257-5b}
  - {type: variant, offset: 407, length: 0, content: '', krp: 姓惶懼忝寄旣重憂責實深不可同於衆人在常祀之所必湏登峯展誠湏其靈奥嶽旣髙峻千仞壁立武年逾六十唯將數人攀藤援棘然後得上於是稽首祈請陳百姓懇誠晚不得還即於嶽上藉草而宿夢見白衣人來執武手曰快辛苦甚相嘉尚武遂驚覺益用祗肅至旦雲霧四起俄而澍雨逺近沾浹髙祖聞之璽書慰勞又曰韋瑱字丗珎魏恭帝二年賜姓宇文氏三年除瓜州刺史通西域蕃夷徃來前後刺史多受賂遺胡冦犯邊又莫能禦瑱雅性清儉兼有武略蕃夷贈遺一無所受胡人畏威不敢爲冦公私安静夷夏懷之又曰長孫儉授荆州刺史東南道行臺僕射所部鄭縣令泉璨爲民所訟推理獲實儉即大集僚属而謂之曰此由刺史教誨不明信不𬒳物是我之愆非泉璨之罪遂於㕔事前肉袒自罰捨璨不問於是州}
