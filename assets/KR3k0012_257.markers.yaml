  - {type: variant, offset: 22, length: 8, content: 績漢宣詔賜車特高, SBCK: 二子三􅀊遇賊亡失數年不知所在後見在同縣人趙奉伯家泰以狀告各言巳子並有隣證郡縣不能断崇曰此昜知耳二父與兒各在別處經禁數旬然後遣人告之曰君兒遇患向巳􅁀死有教解禁可出奔哀也茍㤗聞即號咷悲不自勝奉伯咨嗟而巳殊無痛意崇知之乃以兒還泰詰奉伯詐狀奉伯乃疑引先亡}
