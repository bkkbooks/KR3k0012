  - {type: variant, offset: 50, length: 3, content: 朱愽遷, SBCK: 韋崇除南頴川太守不好發擿細事常云何用小察以傷大道吏民感之郡中大治髙祖聞而嘉賞賜帛二百疋又曰崔亮爲雍州刺史城北渭水淺不通舩行人艱阻謂寮佐曰昔杜預乃造河梁况此有異長河且魏晉之日亦自有橋吾今决欲營之咸曰水淺不可爲浮橋况長無常又不可施柱恐難成立亮曰昔􅁗居咸陽横橋渡渭以像閣道此即以柱爲橋今惟慮長柱不可得耳㑹天大雨山水􅁀至浮出長木數百根藉此爲用橋遂成立百姓利之至今猶名崔公橋又曰任城王雲爲}
