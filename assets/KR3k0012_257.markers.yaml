  - {type: variant, offset: 430, length: 0, content: '', WYG: 素重者以友禮待之詢之政事如此者十人號曰十善於是發姦摘伏事無不驗百姓以為神明無敢冦盜徵為散騎常侍人乞留者千餘人又曰崔休}
  - {type: variant, offset: 432, length: 0, content: '', WYG: 州刺史青州九郡民單􅋆李伯徽劉通等一干人上書頌休德政靈太后善之休在幽青五六年皆清白愛民甚著聲績二州懐其德澤百姓追思之又曰任城王澄為揚州刺史下車封孫叔敖之墓毁蔣子文之廟表請復皇宗之學開四門之教詔從之又曰阮孚拜冀州刺史勸課農桑境内稱為慈父隣州號曰神君先是州人張孟都張洪建馬潘崔之璘張叔緒崔思哲等八人皆屯保林野不臣王命州郡號曰八王孚至皆請入城願致死効力北齊書曰趙郡王叡除北朔州刺史都督北燕北蔚北恒三州及庫堆以西黄河以東長城諸鎮諸軍事叡慰撫新遷量置烽戍内防外禦備有條法大為兵民所安有無水之處禱而掘井鍬搯裁下泉源湧出至今號曰趙郡王井又曰魏蘭根為岐州刺史從行臺蕭寶夤討破宛川俘其人為奴婢以美女十人賞蘭根蘭根曰此縣介於强虜故成背叛今當恤其饑寒柰何並充僕隸於是盡以歸其父兄部内麥多五穗隣州田䑕為灾犬牙不入岐土又曰韓軌遷秦州刺史甚得邉和神武巡秦州欲以軌還仍賜城人户别絹布兩疋州人田昭等七千户皆辭不受唯乞留軌神武嘉歎乃留焉北史曰齊任城王諧為并州刺史時有婦人臨汾川浣衣有乘馬人換其新靴馳而去者婦人持故靴詣州言之諧召居城諸嫗以靴示之紿曰有乘馬人於路被賊刼害遺此靴焉得無親屬乎一嫗撫膺哭曰兒昨著此靴向妻家如其語捕獲之時稱明察又曰齊平鑒遷懐州刺史鑒奏請於州西故軍道築城以防西軍從之尋而西魏來攻時新築城糧仗未集素乏水南門有大井隨汲即竭鑒具衣冠俯井而祝至旦而井泉湧溢有異於常又曰齊彭城王攸為滄州刺史有人從幽州來驢䭾鹿脯至滄州界脚痛行遲偶㑹一人為伴遂盜驢及脯去明旦告州乃令左右及府僚吏分市鹿脯不限其價其主見識之推獲盜者又曰竇熾為原州刺史熾挫抑豪右申理幽滯在州十載甚有政績州城北有泉水屢經遊踐嘗與僚吏宴於泉側因酌水自飲曰吾在此州惟當飲水而已又曰申㣲為襄州刺史時南方初附舊俗官人皆通餉遺㣲性㢘慎乃畫楊震像於寢室以自戒及代還人使送者數十里不絶㣲自以無德於人慨然懐愧因賦詩題於清水亭長㓜聞之皆競來讀遞相謂曰此是申使君手迹並冩誦之又曰赫連逹為雲州刺史性㢘儉邉境胡人或饋逹羊逹欲招異類報以繒帛主司請用官物逹曰羊入我厨物出官庫是欺上也命取私帛與之識者嘉其仁恕三國典畧曰賀祥為荆州刺史祥有惠政逺近欵附梁岳陽王詧欽其清素乃贈以竹屏風祥難違其意取付所司太祖聞之並以賜祥後周書曰獨孤信為秦州刺史先是守宰闇弱政令乖方民有寃訟厯年不能决信在州事無壅滯示以禮教勸以耕桑數年之中公私富實流民願附者數萬家太祖以其信著遐邇故賜名為信又曰逹奚武之在同州也時屬大旱髙祖勑武祀華嶽而嶽廟在舊山下當往祈禱武謂寮屬曰吾備位三公不能爕理隂陽遂使盛農之月乆絶甘雨天子勞心百姓惶懼忝寄既重憂責實深不可同於衆人在常祀之所必須登峰展誠尋其靈奥嶽既髙峻千仭壁立武年逾六十惟將數人攀藤援葛然後得上於是稽首祈請陳百姓懇誠晩不得雨即於嶽上藉草而宿夢見白衣人來執武手曰過辛苦甚相嘉尚武遂驚覺益用祗肅至旦雲霧四起俄而澍雨逺近沾浹髙祖聞之璽書慰勞又曰韋瑱字世珎魏恭帝二年賜姓宇文氏三年除𤓰州刺史通西域蕃夷往來前後刺史多受賂遺胡冦犯邊又莫能禦瑱雅性清儉兼有武畧蕃夷贈遺一無所受胡人畏威不敢為冦公私安靜夷夏懐之又曰長孫儉授荆州刺史東南道行臺僕射所部鄭縣令泉璨為民所訟推理獲實儉即大集僚屬而謂之曰此由刺史教誨不明信不被物是我之愆非泉璨之罪遂於聽事前肉袒自罰捨璨不問於是州城肅勵莫敢犯法魏文帝璽書勞之又曰王思政遷荆州刺史州境卑濕城塹多壊思政乃命都督藺小歡督工匠繕治之掘得黄金三十斤夜中宻送之至旦思政召佐吏以金示之曰人臣不宜有私悉封金送上太祖嘉之賜錢二十萬又曰泉仚為東雍州刺史性清約纎毫不擾於民在州五年每於鄉里運米以自給隋書曰令狐熙拜滄州刺史時山東承齊之弊户口簿籍類不以實熙曉喻之令自歸首至者一萬口在職數年風教大洽稱為良二千石開皇四年上幸洛陽熙來朝吏民恐其遷易悲泣於道及熙復還百姓出境迎謁歡呌盈路在州獲白烏白麞嘉禾甘露降於庭前栁樹又曰令狐熙時上祠泰山還次汴州惡其殷盛多有奸俠於是以熙為汴州刺史下車禁遊食抑工商民有向街開門者杜之船客停於郭外星居者勒為聚落僑人逐令歸本其有滯獄並决遣之令行禁止稱為良政上聞而嘉之顧謂侍臣曰鄴都天下難理處也勑相州刺史豆盧通令習熙之法其年來朝考績為天下之最賜帛三百疋頒告天下又曰楊逹字士逹為鄯鄭趙三州刺史俱有能名平陳之後四海大同上差品天下牧宰逹為第一賜雜綵五百段加以金帛又曰慕容三藏授廓州刺史州極西界與吐谷渾隣接奸宄犯法者皆遷配彼州流人多有逃逸及三藏至招納綏撫百姓愛悦襁負日至吏民歌頌之髙祖聞其能屢有勞問其年州内畜産繁孳獲醍醐奉獻賚物百段又曰衞𤣥出為資州刺史以鎮撫之𤣥既到官時獠攻圍大牢鎮𤣥單騎造其營謂羣獠曰我是刺史銜天子詔安養汝等勿驚懼也諸賊莫敢動於是説以利害渠帥感悦解兵而去前後歸附者十餘萬口髙祖大悦賜縑二千疋又曰郭衍為瀛州刺史遇秋霖大水其屬縣多漂没民皆上髙樹依