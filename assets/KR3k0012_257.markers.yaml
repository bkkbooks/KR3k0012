  - {type: variant, offset: 673, length: 591, content: 雅俊設几杖之禮朝夕與參政事又曰蘇章為冀州刺史故人為清河太守章行部按其奸贓乃請太守為設酒肴陳平生之好甚歡太守喜曰人皆有一天我獨有二天章曰今夕蘇孺文與故人飲者私恩也明日冀州刺史按事者公法也遂舉正其罪州境知章無私望風畏肅又曰張禹拜楊州刺史當過江行部中土人皆以江有子胥之神難於濟涉禹將渡吏固請不聽禹厲言曰子胥如有靈知吾志在理察枉訟豈危我哉遂鼓而過歷行郡邑深幽之處莫不必到親錄囚徒多所明舉吏人希見使者人懷喜悅又曰楊秉遷任城相自為刺史二千石計日受俸餘祿不入私門故吏齎錢百萬遺之閉門不受以廉潔稱又曰謝夷吾為荊州刺史第五倫薦之曰受牧荊州威行郡國奉法作政有周邵之風居儉履約紹公儀之後尋功簡能為外臺之表聽聲察實為九伯之冠也續漢書曰種暠為益州刺史在職三年宣恩遠夷開曉殊俗岷山雜落皆懷服漢德其白狼槃木諸國自前刺史卒後遂絕暠至乃復向化時永昌太守鑄黃金為文蛇以獻梁冀暠紏發追捕馳傳上言冀由是銜怒又曰周舉為并州刺史太原舊俗以介子推焚骸有龍忌之禁輒一月寒食莫敢煙爨老少不堪歲歲多死者舉既到州乃作弔書以置子推之廟言盛冬去火殘損人命非賢者之意以宣示愚民使還溫食謝承後漢書曰陳留百里嵩字景山為徐州刺史境遭旱嵩行部傳車所經甘雨輒霔東海金鄉祝其兩縣僻在山間嵩傳駟不往二縣不得雨父老干請嵩曲路到二縣入界即雨又曰巴祗字敬祖為楊州刺史在官不迎妻子俸祿不使有餘積毀壞不復改易以水澡傅墨用之夜與士對坐暗中不燃官燭又曰弟五種遷兗州刺史中, SBCK: 煚}
