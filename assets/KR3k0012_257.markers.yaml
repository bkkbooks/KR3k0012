  - {type: variant, offset: 2742, length: 0, content: '', krp: 又曰韋丗康尉遟迴之作亂也髙祖憂之謂丗康曰汾絳舊是周齊分界因此亂皆恐生搖動今以委公善爲吾守因授絳州刺史以雅望鎮之闔境清肅又曰豆盧勣爲渭州刺史甚有惠政華夷恱服德澤流行多致祥瑞鳥䑕山俗呼爲髙武隴其下渭水所出其山絶壁千㝷由來乏水諸羌苦之勣馬足所踐忽飛泉湧出有白烏翔止㕔前乳子而後去又白狼見於襄武民爲之謡曰我有丹陽山出玉漿濟我民夷神鳥來翔百姓因號其泉爲玉漿泉太平御覽卷第二百五十七}
