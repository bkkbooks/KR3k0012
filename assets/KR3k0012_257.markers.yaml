  - {type: variant, offset: 428, length: 1, content: 王, WYG: 李崇沉深有將畧寛厚善御衆在揚州凡經十年養壯士數千人冦賊侵邉所向摧破號曰卧虎又曰陸俟長子馥多智有父風髙祖見而悦之謂朝臣曰吾常歎其父智過其軀是復踰於父矣少為内都下大夫出為相州刺史假長廣公為政清平抑强扶弱州中有舊德宿老名}
  - {type: page-break, offset: 428, content: '', id: KR3k0012_WYG_257-4b, image: WYG0895/WYG0895-0316d.png}
  - {type: variant, offset: 429, length: 3, content: 望為青, SBCK: 思政遷荆州刺史州境卑濕城壍多壞思政方命都督藺小歡督工匠繕治之掘得黄金三十斤夜中宻送之至旦思政召佐吏以金示之曰人臣不冝有私悉封金送上太祖嘉之賜錢二十萬又曰泉企爲東雍州刺史性清約纎毫不擾於民在州五年毎於郷里運米以自給隋書曰令狐熈拜滄州刺史時山東承齊之弊户口薄藉􅀋不以實熈暁諭之令自歸首至者一萬口在職數年風敎大洽稱爲良二千石開皇四年上幸洛陽熈來朝吏民恐其遷易悲泣於道及熈復還百姓出境迎謁歡呌盈路在州獲自烏白麞嘉禾甘露降於庭前栁樹又曰令狐熈時上祠泰山還祠汴州惡其殷盛多有姧俠於是以熈爲汴州刺史下車禁遊食抑工啇民有向街開門者杜之舩客於郭外星居者勒爲聚落僑人逐令歸夲其有滯獄並决遣之令行禁止稱爲良政上聞而嘉之顧謂侍臣曰鄴都天下難理處也勑相州刺史豆盧通令習熈之法其年來朝考績爲天下之最賜帛三百疋頒告天下又曰楊逹字士逹爲鄯鄭趙三州刺史俱有能名平陳之後四海大同上差品天下牧宰逹爲第一賜雜綵五百叚加以金帛又曰慕容三藏授廓州刺史州極西界與吐谷渾隣接姦宄犯法者皆遷配彼州流人多有逃逸及三藏至招納綏撫百姓愛恱繦􅀒日至吏民歌頌之髙祖聞其能屢有勞問其年當州畜産䌓孳􅀗醍醐奉獻頼物百叚又曰衛􅀇出爲資州刺史以鎮撫之􅀇旣到官時獠攻圍大牢鎮􅀇單􅀐造其營謂羣獠曰我是刺史衘天子詔安養汝等勿驚懼也諸賊莫敢動於是􅀃以利害渠帥感恱解兵而去前後歸附者十餘萬口髙祖大恱賜縑二千疋又曰郭衍爲瀛州刺史遇秋霖大水其屬縣多漂没民皆上髙樹依大冢􅄛親備􅂳栰并賫糧拯救之民多獲濟衍先開倉賑恤後始聞奏上大善之又曰辛彦之拜隋州刺史于時州牧多貢珎翫唯彦之所貢並供􅀕之物髙祖善之顧謂朝臣曰人安得無學彦之所貢稽古之力也又曰梁彦光爲歧州刺史甚有惠政嘉禾連出於州境開皇二年上幸歧州恱其能乃下詔曰賞以勸善義兼訓物彦光操履平直識用凝逺布政歧下恩惠在人廉愼之譽聞於天下三載之後自當遷陟恐其匱乏且冝旌善可賜粟五百斛物三百叚御傘一枚庶使有感朕心日増其美四海之内凡曰官人慕髙山而仰止聞清風而自勵又曰梁彦光爲相州刺史有塗陽人焦通性嗜酒事親禮闕爲從弟所訟彦光弗之罪將至州學令觀於孔子廟于時廟中有韓伯瑜母杖不痛哀母力弱對母悲泣之像通遂感寤旣悲且媿􅀂無自容彦光訓諭而遣之後改過勵行卒爲善士以德化人皆此􅀋也又曰公孫景茂遷息州刺史法令清静德化大行時屬平陳之後征人在路有疾病者景茂撤减俸禄爲饘粥湯藥分賑濟之賴以全活者以千數上聞而嘉之詔宣告天下又曰薛胄爲兖州刺史城東有沂泗二水合而南流汎濫大澤中胄遂積石堰之使決令西注陂澤盡爲良田又通轉運利盡淮海百姓賴之號爲薛公豐兖渠又曰梁毗出爲西寜州刺史改封邯鄲縣侯在州十一年先是蠻夷酋長皆服金冠以金多者爲豪倠乃由此遞相陵奪毎㝷干戈邊境略無寜歳毗患之後因諸酋長相率以金遺毗於是置金座側對之慟哭而謂之曰此物飢不可食寒不可衣汝等以此相滅不可勝數今將此來欲殺我耶一無所納悉以還之於是蠻夷感悟遂不相攻擊髙祖聞而善之又曰趙煚爲兾}
