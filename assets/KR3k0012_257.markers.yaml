  - {type: variant, offset: 2742, length: 0, content: '', WYG: 又韋世康傳尉遲迴之作亂也髙祖憂之謂世康曰汾絳舊是周齊分界因此亂堦恐生揺動今以委公善為吾守因授絳州刺史以雅望鎮之闔境清肅又曰豆盧勣為渭州刺史甚有惠政華夷悦服德澤流行多致祥瑞鳥䑕山俗呼為髙武隴其下渭水所出其山絶壁千尋由來乏水諸羗苦之勣馬足所踐忽飛泉湧出有白烏翔止㕔前乳子而後去又白狼見於襄武民為之謡曰我有丹陽山出玉漿濟我民夷神鳥來翔百姓因號其泉為玉漿泉太平御覽卷二百五十七}
