  - {type: variant, offset: 107, length: 0, content: '', SBCK: 李平字曇定爲相州刺史勸課農桑脩飾太學簡試通儒以充愽士選五郡聦敏者以教之圖孔子及七十二弟子於講堂親爲立賛前臺使頗好平􅀞履虎尾踐薄氷於客館注頌其下以示誠焉又曰韋彧爲東豫州刺史彧以蠻俗荒梗不識禮儀乃表立太學選諸郡生徒於州㹅教文於城北置崇武館以習武焉境内清肅又曰韋珎遷郢州刺史在州有聲績朝廷嘉之遷龍驤將軍賜驊騮二疋帛五十疋榖三百斛珎乃召集州内􅀌貧者謂曰天子以我能綏撫卿等故賜以榖帛吾}
  - {type: page-break, offset: 107, content: '', id: KR3k0012_SBCK_257-2b}
  - {type: variant, offset: 107, length: 244, content: 何武為楊州刺史行部必先即學官見諸生試其誦論得失然後入傳舍問墾田頃畝五穀美惡東觀漢記曰郭伋字細侯河南人也在并州素結恩德行部到西河美稷有童兒數百各騎竹馬迎拜伋問曰兒曹何自遠來對曰聞使君到喜故迎諸兒復送到郭外問使君何日當還伋曰別駕從事計日告之行部還入美稷界先期一日伋念負諸童兒遂止于野亭須期乃入又曰李珣為兗州刺史所種小麥葫菻悉付從事一無所留清約率下常席羊皮布被後漢書曰郭賀為荊州刺史顯宗巡狩到南陽特見嗟歎賜以三公之服黼黻冕旒勑行部去䄡帷使百姓見其容服以章有德每所經過吏人指以相示莫不榮之又曰賈琮, WYG: 任城王雲}
  - {type: variant, offset: 107, length: 0, content: '', krp: 李平字曇定爲相州刺史勸課農桑脩飾太學簡試通儒以充愽士選五郡聦敏者以教之圖孔子及七十二弟子於講堂親爲立賛前臺使頗好平畫履虎尾踐薄氷於客館注頌其下以示誠焉又曰韋彧爲東豫州刺史彧以蠻俗荒梗不識禮儀乃表立太學選諸郡生徒於州㹅教文於城北置崇武館以習武焉境内清肅又曰韋珎遷郢州刺史在州有聲績朝廷嘉之遷龍驤將軍賜驊騮二疋帛五十疋榖三百斛珎乃召集州内孤貧者謂曰天子以我能綏撫卿等故賜以榖帛吾}
  - {type: variant, offset: 108, length: 2, content: 武為, SBCK: 敢獨當遂以所賜悉分與之又曰韓麒麟除齊州刺史假魏昌侯麒麟在官寡於刑罰從事劉普慶􅀃麒麟曰明公杖節方夏而無所斬戮何以示威麒麟曰刑罰所以止惡盖不得巳而用之今民不犯法何所戮乎􅀂必湏斬戮以立威名當以卿應之普慶慙懼而去又曰李崇沉深有將略寛厚善御衆在楊州凡經十年養壯士數千人冦賊侵邊所向摧破號曰卧虎又曰陸俟長子馛多智有父風髙祖見而恱之謂朝臣曰吾常歎其父智過其軀是復踰於父矣少爲内都下大夫出爲刺史刺史假長廣公爲政清平抑強扶弱州中有舊德􅀫老名望素重者以友禮待之詢之政事如此者十人號曰十善於是發姦擿伏事無不驗百姓以爲神明無敢冦盗徴爲散􅀐常侍人乞留者千餘人又曰崔林爲青州刺史青州九郡民單􅋆李伯徽劉通等一千人上書訟休德政靈太后善之休在幽青五六年皆清白愛民甚著聲績二州懷其德澤百姓追思之又曰任城王澄爲}
