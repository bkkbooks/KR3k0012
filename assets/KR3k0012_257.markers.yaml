  - {type: variant, offset: 1265, length: 1350, content: 侍單超兄子匡為濟陰太守負勢貪放種欲收舉未知所使會聞從事衛羽素抗直乃召羽具告之曰聞公不畏強禦今欲相委以重事若之何對曰願庶幾於一割羽出遂馳到定陶閉門收匡賓客親吏四十餘人六七日中紏發其贓五六十萬種即奏匡并以劾超魏志曰劉馥字元頴沛國相人也太祖方有袁紹之難謂馥可任以東南之事遂表為楊州刺史馥既受命單馬造合肥空城建立州治南懷緒等皆安集之貢獻相繼南懷緒數年恩化大行百姓樂其政流民越江山而歸者以萬數於是聚諸生立學校廣屯田興治芍陂及茄陂七門吳塘以溉稻田官民有蓄陂塘之利至今為用又曰徐邈為涼州刺史進善黜惡風化大行百姓歸心焉西域通流荒戎入貢皆邈勳也又曰田豫護匈奴中郎將領并州刺史聞其威名相率來獻州界寧肅百姓懷之又曰陳泰為并州刺史懷柔民夷甚有威惠京邑貴人多寄寶貨因泰市奴婢泰皆挂之於壁不發其封及徵為尚書悉以還之又曰梁習字子虞為并州刺史政治常為天下最太和二年徵拜大司農習在州二十餘年而居處貧窮無方面珍物明帝異之禮賜甚厚又曰王昶字文舒太原晉陽人也遷兗州刺史明帝即位加揚烈將軍賜爵關內侯昶雖在外任心存朝廷以為魏承泰漢之弊法制苛碎不大釐改國典以准先王之風而望治化復興不可得也乃著治論略依古制而合於時務者二十餘篇又曰司馬朗字伯達河內溫人也遷兗州刺史政化大行百姓稱之雖在軍旅常惡衣惡食以儉率下魏略云裴潛為兗州時嘗作一胡床及去留以挂柱吳志曰呂岱為交州刺史歷年不餉家妻子飢乏孫權聞之歎息以讓群臣曰呂岱出身萬里為國勤事家內困而孤不早知股肱耳目其責安在於是加賜錢米絹布歲有常限晉書曰杜元凱為荊州人號為杜父舊水道唯沿漢達江陵千數百里君乃開陽口起夏水導洪洞達巴陵徑近千里南土美而謠曰後世無叛由杜翁孰識知名與勇功又曰吳隱之為廣州州界有貪泉父老云飲此水使廉士變貪隱之先至水酌而飲之賦詩曰古人云此水一飲重千金若使夷齊飲終當不易心王隱晉書曰華軼為江州刺史得江表之歡心流亡之士赴之如歸時天子孤危四方瓦解軼有匡天下之志每遣貢獻入洛不失臣節謂使者曰若洛都道斷可輸之琅耶王以明吾之為司馬氏也又曰山濤為冀州刺史冀州舊名剋俗略無人士自濤居州搜求賢才旌命所知三十餘人皆顯名當世冀州之士於是為盛晉陽秋曰劉弘字和季與晉世祖同年居同里以舊恩屢登顯位弘為荊州刺史值王室多難得專命一方盡其器能推誠御下厲以公義每有發手書郡國丁寧款密故莫不感悅顛倒奔赴咸曰得公一紙書賢於十部從事也曹嘉之晉紀云羊暨為青州刺史暨牛產犢及遷以官舍所生遺之而去晉中興書曰禇裒字季野河南人也弱冠譙國桓彝見而之曰禇季野有皮裏陽秋裒女即獻后也徵拜侍中遷尚書裒以后父苦求外出除江州刺史莅政貞素每崇清約常使私僮樵採晉桓伊字叔夏譙國人湛隱有武幹又善音律為中興第一遷都督江州荊州十郡豫州四郡軍事江州刺史伊到鎮以邊境無虞宜以寬恤為務乃上䟽江州虛耗加連歲不登宜併合小縣除諸郡逋米州治宜還豫章詔荅移州潯陽其餘皆聽伊隨宜拯撫甚得南土清和宋書曰陸徵為益州刺史䘏隱有方威惠兼著寇盜靜息民物殷阜蜀土安悅至今稱之齊書曰臨川王映為雍州刺史嘗置錢還都買物有獻計者於江陵買貨至都廻換可得微有所增映笑曰我是賈客耶乃復求利又曰王琨為廣州刺史南土沃實在任者常致巨富世謂廣州刺史但經城門一過便得三千萬也琨無所取納表獻祿俸之半州鎮舊有鼓吹又啟翰還及罷任孝武知其清問還資多少琨曰臣買宅百三十萬餘物稱之帝悅其對梁書曰安成康王秀都督雍梁南北泰四州諸軍事雍州刺史, SBCK: ''}
