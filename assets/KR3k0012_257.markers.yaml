  - {type: variant, offset: 380, length: 0, content: '', SBCK: 有人從幽州來驢䭾鹿脯至滄州界脚痛行遲偶㑹一人爲伴遂盗驢及脯去明旦告州乃令左右及府僚吏分市鹿脯不限其價其主見識之推􅀗盗者又曰竇熾爲原州刺史熾挫抑豪右申理幽滯在州十載甚有政績州城北有泉水屢經遊踐甞與僚吏宴於泉側因酌水自飲曰吾在此州唯}
  - {type: variant, offset: 380, length: 0, content: '', WYG: 在州有聲績朝廷嘉之遷龍驤將軍賜驊騮二疋帛五十疋榖三百斛珎乃召集州内孤貧者謂曰天子以我能綏撫卿等故賜以榖帛吾何敢獨}
  - {type: variant, offset: 380, length: 0, content: '', krp: 有人從幽州來驢䭾鹿脯至滄州界脚痛行遲偶㑹一人爲伴遂盗驢及脯去明旦告州乃令左右及府僚吏分市鹿脯不限其價其主見識之推獲盗者又曰竇熾爲原州刺史熾挫抑豪右申理幽滯在州十載甚有政績州城北有泉水屢經遊踐甞與僚吏宴於泉側因酌水自飲曰吾在此州唯}
