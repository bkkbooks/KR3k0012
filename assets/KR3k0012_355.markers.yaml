  - {type: variant, offset: 208, length: 1, content: 賀, krp: 矯曰不殺二子憂必及君公曰一朝而尸三卿余不忍也又曰楚子重伐吴爲簡}
  - {type: variant, offset: 210, length: 1, content: 日, SBCK: 師簡選練也克鳩兹至于衡山使鄧廖帥組甲三百􅀍練三千馬融曰組甲組爲甲裏公族所服􅀍練爲裏甲者所服杜預曰組甲成組文􅀍練練􅂁也以侵吴吴人要而擊之獲鄧廖其能免者組甲八十􅀍練三百而已又曰宋災樂喜爲司城以爲政使皇鄖命校正出馬工正出車備甲兵庀武守又曰諸侯㑹柤遂伐偪陽狄彌建}
  - {type: variant, offset: 210, length: 1, content: 日, krp: 師簡選練也克鳩兹至于衡山使鄧廖帥組甲三百𬒳練三千馬融曰組甲組爲甲裏公族所服𬒳練爲裏甲者所服杜預曰組甲成組文𬒳練練𫀆也以侵吴吴人要而擊之獲鄧廖其能免者組甲八十𬒳練三百而已又曰宋災樂喜爲司城以爲政使皇鄖命校正出馬工正出車備甲兵庀武守又曰諸侯㑹柤遂伐偪陽狄彌建}
