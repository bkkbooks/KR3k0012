  - {type: variant, offset: 18, length: 0, content: '', WYG: 秦師至河曲秦軍掩晉上軍趙穿追之不及返怒曰裹糧坐甲固敵是求敵至不擊將何俟焉乃以其屬出又曰宋華元獲于鄭逃歸後宋城華元為植廵功植將主也城者謳曰睅其目皤其腹棄甲而復睅大目皤大腹棄甲謂亡師也于思于思棄甲復來于思鬚多貎使其驂乘謂之曰牛則有皮犀兕尚多棄甲則那那猶何也役人曰縱有其皮丹漆若何又曰晉侯飲趙盾酒伏甲將攻之其右提彌明知之趨登曰臣侍宴過三爵非禮也遂扶以下公嗾夫獒焉明摶而殺之盾曰棄人用犬雖猛何為鬭且出提彌明死之又曰晉楚戰於邲楚王乗左廣以逐趙旃趙旃棄車而走林屈蕩搏之得其甲裳又曰齊晉陳於鞍齊頃公曰余姑剪㓕此而朝食姑且剪盡不介馬而馳之晉郄克傷於矢曰余病張侯曰擐甲執兵固即死也擐貫也即就也病未及死吾子勉之又曰使吕相絶秦曰文公躬擐甲胄䟦履山川征東之諸侯虞夏商周之𦙍而朝諸秦又曰晉楚戰於鄢陵潘尩之子黨與養由基蹲甲而射之徹七札蹲聚也一發達七札以示王曰王有二臣如此何憂於戰也又曰晉胥童夷羊五帥甲八百將攻郄氏長魚矯請無用衆既殺三郄胥童以甲刼欒書中行偃於朝矯曰不殺二子憂必及君公曰一朝而尸三卿余不忍也又曰楚子重伐吳為簡之師簡選練也克鳩兹至于衡山使鄧廖帥組甲三百被練三千馬融曰組甲組為甲裏公族所服被練為裏甲者所服杜預曰組甲成組文被練練袍也以侵吳吳人要而擊之獲鄧廖其能免者組甲八十被練三百而已又曰宋災樂喜為司城以為政使皇鄖命校正出馬工正出車備甲兵又曰諸侯會柤遂伐偪陽狄彌建大車之輪而䝉之以甲以為櫓杜預曰狄彌魯人也䝉覆也櫓大楯也左執之右㧞㦸成一隊百人為隊又曰鄭子孔之為政也專國人患之乃討西宫之難尉止等作難於西宫子孔知而不言子孔當罪以其甲及子革子良氏之甲守以自守子展子西率國人伐之殺子孔而分其室又曰欒盈帥曲沃之甲因魏獻子以晝入絳又曰崔杼稱疾不視事莊公問崔子問疾遂從姜氏侍人賈舉止衆從者而入閉門為崔子閉公也甲興公登臺而請弗許請自刄於廟弗許遂殺之又曰楚蒍掩為司馬子木使庀賦數甲兵閱也數賦車籍馬籍疏其毛色歳齒以備軍用賦車兵車兵甲士徒甲步卒甲楯之數使噐仗冇常數既成以授子木禮也又曰鄭伯有嗜酒為窟室而夜飲酒擊鐘焉子晳以駟氏之甲伐而焚之伯有奔雍梁雍梁鄭也聞子皮之甲不與攻已喜曰子皮與我矣晨自暮門之竇入駟帶率國人攻之伯有死於羊肆又曰諸侯將盟於宋西門之外楚人衷甲甲在衣中欲因會攻擊伯州犁固請釋甲子木曰晉楚無信久矣事利而已苟得志焉焉用有信太宰伯州犂也告人曰令尹將死矣又曰鄭徐吾犯之妺美公孫楚聘之楚子南也公孫黑又使強委禽焉子南戎服入左右射超乘而出女自房觀之曰子晳信美矣抑子南夫也適子南氏子晳怒既櫜甲以見子南欲殺之而取其妻子南擊之子晳傷而歸又曰楚靈王伏甲饗蔡靈侯醉而殺之刑其士七十人公子弃疾帥師圍蔡傳言楚无道也又曰齊子尾卒子旗欲治其室子旗季施也欲并治子尾之家政殺梁嬰梁嬰子尾家臣而主子良氏之宰子梁子尾之子高蠆也子旗為子良主宰其臣曰孺子長矣孺子謂子良也而相吾室欲無我也授甲將攻之桓子善於子尾亦授甲將助之或告於子旗子旗不信則數人告將徃又數人告於道遂如陳氏桓子將出走聞之而還還子根室遊服而逆之去戎備有宫遊戲之服請命問桓子所至也對曰聞彊氏授甲將攻子子聞諸乎曰弗聞曰子盍亦授甲無宇請從又曰齊惠欒高氏皆嗜酒欒高二族皆出惠公也信内多怨彊於陳鮑氏而惡之夏有告陳桓子曰子旗子良將攻陳鮑氏遭子良醉而騁欱及子良醉故馳告鮑文子也遂見文子文子國鮑也則亦授甲矣使視二子二子子旗子良則皆將飲酒桓子曰彼雖不信彼傳言也聞我授甲則必逐我及其飲酒也先伐諸陳鮑方睦遂伐欒髙氏欒施髙強來奔又曰晉荀躒如周籍談為介王曰闕鞏之甲武所以尅商也唐叔受之以處參墟匡有戎狄又曰魯昭公伐季平子叔孫氏之司馬鬷戾言於其衆曰凡有季氏與無於我孰利皆曰無季氏是無叔孫氏也鬷戾曰然則救諸帥徒以徃䧟西北隅以入䧟公闕也公徒釋甲執氷而踞言無戰心遂逐之逐公徒也公遜于齊又曰吳子光伏甲於窟室而享王僚掘地為室王使甲坐於道及其門坐道邊至光門門階戸席皆王親也專諸抽劍刺王鈹交於胸又曰郤宛直而和令尹子常賄而信讒費無極譛郤宛謂子常曰子惡欲飲子酒子惡郤宛又謂子惡令尹欲飲酒於子氏無極曰令尹好甲兵子出之吾擇焉擇取以進也取五甲五兵曰寘諸門令尹至必觀之而從以酬之曰無極辭及饗日帷諸門左張帷列兵甲其中無極謂令尹曰吾幾禍子子惡將為子不利甲在門矣子必無徃令尹使視郤氏則有甲焉不徃遂令攻郤氏之族黨又曰齊伐晉夷儀東郭書讓登犂彌從之書與王猛息將登而休息猛曰我先登書斂甲曰曩者之難今又難焉斂甲起欲擊之猛笑曰吾從子如驂之靳註靳車中馬也疏靳是當胷之皮也猛不敢與書爭故言已之從書若驂馬之隨靳也又曰齊伐魯孟孺子泄帥右師孺子孟懿子之子武伯也顔羽御邴洩為右三子孟氏臣冉求帥左師管周父御樊遲為右季氏之甲七千冉有以武城人三百為已徒卒老㓜守宫次于雩門之外南城門也五日右師從之及齊師戰于郊師獲甲首八十冉求所得齊人不能師又曰哀公會吳子伐齊甲戌戰于艾陵展如敗高子國子敗胥門巢王卒助之大敗齊師獲革車八百乗甲首三千以獻于公公以兵從故以勞公又曰吳王夫差敗越于夫椒遂入􅚼越子以甲楯五千保于會稽又曰孔文子將攻大叔氏訪于仲尼仲尼曰俎豆之事則嘗聞之矣甲兵之事未之聞也退命駕而行又曰侯犯以郈叛武叔懿子圍郈弗克駟赤謂侯犯日旦盍多舍甲於子之門以備不虞侯犯曰諾乃命舍甲焉侯犯請易於齊齊有司觀郈將至駟赤使周走而呼曰齊師至矣郈人大駭介侯犯之門甲以圍侯犯又曰晉周綽射殖綽齊大夫中肩兩矢夾脰曰止將為三軍獲不止將取其𠂻乃弛弓而縛郭最皆衿甲面縛公羊曰成元年始作丘甲何以書譏何譏爾譏始丘使也何休一解曰四井為邑四邑為丘甲鎧也幾始使丘民丘甲鎧也周}
