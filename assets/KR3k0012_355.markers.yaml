  - {type: variant, offset: 478, length: 942, content: 授以長白毦槊毦音餌三國典略曰文育小字猛奴到都見太子詹事周舍舍命兄子弘讓教之書計文育謂弘讓曰誰能學取此富貴但有大槊耳弘讓壯之教之騎射文育大悅又曰羊侃字祖忻嘗從梁主宴樂遊苑時少府啟兩刃矟成長二丈四尺三寸梁主因賜侃河南國紫騮馬令試之侃執矟上馬左右擊刺特盡其妙觀者登樹梁主曰此樹必為侍中折矣俄而果折因號此矟為折樹矟又曰北齊安州刺史盧冑入海島得一人脛可長二丈以為矟獻於神武諸將咸莫能用唯彭樂舉之冑未幾遇疾痛聲聞外巫言海神為祟因此而卒鄴城故事曰紫陌浮橋在城西北五里案鄴中記云趙王虎時於此濟置紫陌宮暨齊時因修為濟口帝巡幸又向并州百官相餞莫不至此而訣別迄今猶以為渡口齊文宣時西巡百官辭於紫陌使矟騎圍之曰我舉鞭一時刺殺淹留半日文宣醉不能起黃門郎連子暢進曰陛下如此諸臣恐怖文宣曰大怖耶若然不須殺乃命解圍又曰北齊文宣於臺上以矟刺都督尉子輝應手而死靈鬼志曰河間王顒既敗於關中有給使陳安甚壯健常乘一赤馬儁快非常雙持二刀皆長七尺馳馬運刀所向披靡關西為之歌曰壟上健兒字陳安頭小面狹腹中寬丈八長槊左右盤語林曰桓宣武與殷劉談不如甚喚左右取黃皮袴褶音十上馬持矟數廻或向劉或擬殷意氣始得雄王傅玄歌詩曰彎我繁弱弓弄我丈八矟一舉覆三軍再舉殄戎貊梁簡文帝馬槊譜序曰馬槊為用雖非遠法近代相傳稍已成藝鄧蔗縈魏后之庭武而猶質桓馬入丹陽之寺雄而未巧聊以餘暇復撰斯法搜採抑揚斟酌煩簡至如春亭落景秋皋晚凈青霜旦盡密雨初晴纖驪沃若天馬半漢盼金精而轉態交流汗血愛連乾而息影不畏衣春鏤衢與白刃爭暉翠眊與紅塵俱動足使武夫憤氣觀者衝冠巴童留玩不待輕舟之楫越女踟躕無假如皋之箭槍風俗通曰刻葦傷盜為槍宋元嘉起居注曰謝靈運自理表云及經山陰防禦彰赫彭排馬槍斷截衢巷衛公兵法曰聽角聲第一聲絕諸隊即一時散立第二聲絕諸隊一時捺槍卷幡張弓拔刀第三聲絕諸隊一時舉槍第四聲絕諸隊一時籠槍跪膝坐唐書曰郯國公羅士信容皃短小而驍勇絕倫隋末賊起士信始年十四為通守張須陁執衣遇翟讓來寇士信請自効須陁小之曰汝形容未勝衣甲何可入陣士信怒重著二甲左右雙鞬躍而上馬須陁壯之遂將其眾擊賊于澭水之上陣纔列士信執長槍立於馬上馳至賊所刺倒數人斬一人首擲於空中用槍承之戴以略陣賊眾愕然莫敢逼者士信乃棄筴馳馬為十下而還須陁因而奮擊兵始接賊師大潰士信逐北每殺一人輒劓其鼻而懷之每歸而數其鼻以表殺賊之多少, WYG: ''}
