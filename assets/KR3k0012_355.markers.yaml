  - {type: variant, offset: 2251, length: 567, content: 吉士瞻初為荊府城局參軍浚池得一金革帶鉤隱起鏤甚精巧篆文曰錫爾金鉤且公且侯士瞻取夏侯洋兄之女女竊以與洋洋喜佩之及是革命洋果封侯而士瞻不錫茅土列仙傳曰鉤戈夫人姓趙病臥左手拳望氣者云東北有貴人氣推而得夫人武帝發手得玉鉤手亦舒遂幸而生昭帝後被害殯之尸不臭而香一月三秦記曰藏鉤因鉤弋夫人世人法之也瑞應圖曰湯都于亳有神人牽白狼口御銅鉤入湯庭搜神記曰京兆長安有張氏者晝獨處室有鳩自外人張氏惡之披懷而祝曰鳩介來為我禍耶飛上受塵為我福耶來入我懷鳩飜入懷以手探則不知鳩之所在而得一金帶鉤焉遂寶之自是之後子孫昌盛有為必偶貲財萬倍蜀客賈至長安中聞之乃厚賂內婢婢竊鉤以與蜀客張氏失鉤漸漸耗而蜀客數罹難厄不為己利或告之曰天命也不可以力求於是以鉤反張氏復昌故關西稱張氏傳鉤云陳留風俗傳曰浚儀周時梁伯所居國都多池沼時池中出神帶鉤到今其民象而作之號曰大梁氏鉤焉吳越春秋曰闔閭作金鉤令曰能為善鉤者賞之百金而有人貪賞之重殺其兩子以血釁金遂成二鉤獻之闔閭而詣宮門求賞王曰為鉤者多而子獨求賞何以異於眾人之鉤乎作者曰吾之作鉤者貪王之賞殺吾二子以成兩鉤以示之曰何者是也時王鉤甚眾形體相類不知所在於是鉤師向鉤而哭呼其兩子名曰吳鴻泥稽我在此王不知汝之神也聲未絕於口兩鉤俱飛著於父之胸吳王大驚乃賞之百金夢書曰夢得鉤帶憂約束也鉤帶著身約勑已也持鉤帶脫事決已也莊子曰曲者中鉤吳都賦曰吳鉤越棘, SBCK: ''}
