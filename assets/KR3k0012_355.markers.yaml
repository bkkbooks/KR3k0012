  - {type: variant, offset: 2205, length: 1, content: 備, SBCK: 玄莬庫晉書曰桓伊爲江州刺史卒􅀄伊有馬歩鎧六百領預爲表令死乃上之表曰臣過蒙殊寵受任西藩淮南之捷逆兵奔北人馬噐鎧隨處放散于時收拾破敗不足貫連比年營繕並巳脩整今六合雖一餘燼未滅臣不以杇邁猶欲輸力効命仰報皇恩此志永絶衘恨泉壤謹奉輸馬具裝百具歩鎧五百領並在尋陽請勒所属領受詔曰忠誠不遂益以傷懷乃受其所上之鎧又曰馬隆討凉州或夾道累磁石賊􅀒鐵鎧行不得前隆卒悉􅀍犀甲無所留礙賊咸以爲神轉戰千里殺傷以千數又曰杜曽新野人少驍勇絶人能􅀍甲游}
  - {type: page-break, offset: 2205, content: '', id: KR3k0012_SBCK_355-8a}
