  - {type: variant, offset: 1421, length: 647, content: 須陁大悅之引置左右每戰須陁居前士信為副賊無敢當者又曰太宗每當大陣望賊中驍將銳士炫曜人馬出入來去者意頗怒之輒命秦叔寶往取焉叔寶應命躍馬負槍而進必刺之萬眾之中人馬俱倒太宗因以是重之叔寶亦以此頗自矜尚貞觀已後恒多疾病每謂人曰吾少長戎馬所經二百餘陣屢中重瘡計吾前後出血亦數斛矣何能不病乎及卒太宗甚傷惜久之贈徐州都督陪葬于昭陵令所司於其瑩內立石人馬以旌戰之功焉又曰哥舒翰為別將時吐蕃大寇邊翰拒之于苦海吐蕃之眾三道從山相續而下翰持半叚槍當其鋒逆擊之無不摧靡又擊其次軍復走之又擊其後軍皆大破由是知名天寶六載擢受右武衛將軍仍充隴右節度使副都知關西兵馬使河源軍使先是吐蕃每歲候夌秋即大掠積石軍前後不能禦至是翰使將王難德楊景暉等潛領兵候蕃兵至設伏以待之吐蕃五千騎既至放馬脫甲翰以城中率驍勇合伏兵馳擊之殺略盡百餘騎奔突得走王難德追擊之疋馬不還翰常逐馬驚墜于河立於水中吐蕃三人擬槍方刺之翰大叱之賊驚駭俱廢失槍而走救騎至賊便解散翰有家臣曰左車年十五每隨翰入陣翰善使槍追賊及以槍搭其肩而遏之賊驚顧翰從而刺其喉皆剔高三五丈而墜左車輒下馬斬其首率以為常又曰王難得有膽力善騎射天寶元年正月吐蕃大寇河源軍難得以騎將為軍鋒贊普有子曰琅支都恃其趫悍乘諳真馬寶鈿裝鞍軍前求較鬥者難得橫槍突往刺殺之斬其首以其馬歸虜眾無敢追者軍使以聞玄宗召至御殿問之因令馳突作殺琅支都狀壯之衣以錦袍拜左金吾衛羽林將軍五代晉史曰梁將有王彥章者勇力過人常執鐵槍僅百斤所向辟易莊宗畏之鋋釋名曰鋋延也達也去此至彼之言也方言曰矛吳楊江淮南楚五湖之間謂之鋋音蟬或謂之鏦, WYG: ''}
