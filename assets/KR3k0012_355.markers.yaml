  - {type: variant, offset: 250, length: 0, content: '', SBCK: 鄭徐吾犯之妹美公孫楚聘之楚子南也公孫黒又使強委禽焉禽鴈也紡綵用鴈子南戎服入左右射超乗而出女自房觀之曰抑子美夫言丈夫適子南氏子晢怒旣而槖甲以見子南欲殺之而取其妻子南擊之以戈晢傷而歸又曰楚靈王伏甲饗蔡靈侯醉而殺之刑其士七十人公子弃疾帥師圍蔡傳言楚無道也又曰齊子尾卒子旗欲治其室子旗欒施也欲并治子尾之家政殺梁嬰梁嬰子尾家􅌠而立子良氏之宰子良子尾之子髙疆也子旗爲子良立宰其臣曰孺子長矣孺子謂子良也而相吾室欲兼我也授甲將攻之桓子善於子尾亦授甲將助之或告}
  - {type: variant, offset: 250, length: 0, content: '', krp: 鄭徐吾犯之妹美公孫楚聘之楚子南也公孫黒又使強委禽焉禽鴈也紡綵用鴈子南戎服入左右射超乗而出女自房觀之曰抑子美夫言丈夫適子南氏子晢怒旣而槖甲以見子南欲殺之而取其妻子南擊之以戈晢傷而歸又曰楚靈王伏甲饗蔡靈侯醉而殺之刑其士七十人公子弃疾帥師圍蔡傳言楚無道也又曰齊子尾卒子旗欲治其室子旗欒施也欲并治子尾之家政殺梁嬰梁嬰子尾家宰而立子良氏之宰子良子尾之子髙疆也子旗爲子良立宰其臣曰孺子長矣孺子謂子良也而相吾室欲兼我也授甲將攻之桓子善於子尾亦授甲將助之或告}
  - {type: variant, offset: 251, length: 2, content: 栗磾, SBCK: 子旗子旗不信則數人告將徃又數人告於道遂如陳氏桓子將出矣聞之而還聞子旗至逰服而逆之去戎備着常遊戯之服請命問桓子所至也對曰聞疆氏授甲將攻子子聞諸乎曰弗聞曰子盍亦授甲無宇請從無宅桓子名也又曰齊惠欒髙氏皆嗜酒欒髙二族皆出惠公也信内多怨疆於陳鮑氏而惡之夏有告陳桓子曰子旗子良將攻陳鮑氏遭子良醉而騁欲及子良醉故駈告鮑文子也遂見文子文子國鮑也則亦授甲矣使視二子二子子旗子良則皆將飲酒桓子曰彼雖不信彼傳言也聞我授甲則必逐我及其飲酒也先伐諸陳鮑方睦遂伐欒髙氏欒施髙強來奔又曰晉荀躒如周籍談爲介王曰闕鞏之甲武所以尅啇也闕鞏國所出鎧唐叔受之以處叅虚匡有戎狄又曰魯昭公伐季平子叔孫氏之司馬􅎦戾言於其衆曰凢有季氏與無於我孰利皆曰無季氏是無叔孫氏也􅎸戾曰然則救諸帥徒以徃䧟西北隅以入䧟公圍也公徒釋甲執冰而踞言無戰心也遂逐之逐公徒也公遜于齊又曰吴子光伏甲於窟室而享王僚掘地爲室王使甲坐於道及其門坐道邊至光門門階户席皆王親也又曰楚郄宛直而和國人􅀃之令尹子常賄而譛郄宛焉謂子常曰子惡欲飲子酒子惡郄宛又謂子惡令尹欲酒於子氏無極曰令尹好甲兵子出之吾擇焉擇取以進子常取五甲五兵日寘諸門令尹至必觀之而從以酬之曰無極辭及饗曰惟諸門左張惟張兵甲其中也無極謂令尹曰吾幾禍子子惡將爲子不利甲在門矣子必無徃令尹使視郄氏則有甲焉不徃遂令攻郄氏盡㓕郄氏之族黨又曰齊伐晉夷儀東郭書讓登讓衆使後而巳先登書與王猛息戰訖共止息也猛曰我先登書歛甲曰曩者之難今又難焉歛甲起欲擊猛猛􅀏曰吾從子如􅆖之靳靳車中馬也猛不敢與書爭言巳從書争言􅆖馬之相隨靳也又曰齊伐魯魯孟孺子泄帥右師孺子孟懿子之子武伯也顔羽御邴洩爲右二子孟氏臣冉求帥左師管周御樊遟爲右季氏之甲七千冉有以武城人三百爲巳徒卒老㓜守宫次于雩門之外南城門也五右師從之及齊師戰于郊師獲甲首八十冉求所得齊人不能師又曰哀公㑹吴子伐齊甲戌戰于艾陵展如敗髙子國子敗胥門巢王卒助之大敗齊師獲革車八百乗甲首三千以獻于公公以兵從故以勞公又曰吴王夫差敗越于夫椒遂入越越子以甲楯五千保于㑹稽又曰衛孔文子將攻大叔氏訪于仲尼仲尼曰胡簋之事則甞聞之矣甲兵之事未之聞也退命駕而行又曰侯犯以郈叛武叔懿子圍郈弗克駟赤謂侯犯曰且盍多舎甲於子之門以備不虞侯犯曰諾乃命舎甲焉侯犯請易於齊齊有司觀郈將至駟赤使周走而呼曰齊師至矣郈人大駭介侯犯之門甲以圍侯犯又曰晉周綽射殖綽殖綽齊中大夫肩兩矢夾脰曰止將爲三軍不止將取其􅂨乃㢮弓而􅅞郭最皆衿甲靣􅅞公羊曰成元年始作丘甲何以書譏何譏爾譏始丘使也何休一解曰四井爲邑四邑爲丘甲鎧也譏始使丘民作田鎧也周書曰年不登甲則纓縢宫室不容甲不以組也戰國䇿曰陘山之事趙且與􅁗伐齊齊王懼蘇代爲齊獻書穰侯曰臣聞徃來者之言曰􅁗且益起甲兵四萬人以伐齊臣竊必是之弊邑之王曰􅁗王明熟於計穰侯智而習於事必不益趙甲兵以伐齊也國語曰晉平公射鴳不死使竪衰摶之逸公怒枸將殺之叔向聞之曰君必殺之昔吾先君唐叔射兕于徒林殪以爲大甲今君射鴳不死摶之不得是揚吾君之耻也賈逵注曰以兕革爲大甲鴳}
