  - {type: variant, offset: 195, length: 0, content: '', SBCK: 華元獲于鄭逃歸後宋城華元爲植廵功植將主也城者謳曰睅其目皤其腹棄甲而復睅出目皤}
  - {type: variant, offset: 195, length: 0, content: '', krp: 華元獲于鄭逃歸後宋城華元爲植廵功植將主也城者謳曰睅其目皤其腹棄甲而復睅出目皤}
  - {type: variant, offset: 196, length: 5, content: 千驍果善騎, SBCK: 腹弃甲謂亡師也于思于思棄甲復來于思􅂡之皃使其􅆖乗謂之曰牛則有皮犀兕尚多棄甲則郍郍猶何也役人曰縱有其皮丹􅃮􅀂何又曰晉侯飲趙盾酒伏甲將攻之其右提音峙彌明知之趨登曰臣侍宴過三爵非禮也遂扶以下公嗾夫􅋙焉明摶而殺之盾曰棄人用犬雖猛何爲􅋐且出提彌明死之又曰晉楚戰於邲楚王乗左廣以逐趙旃趙旃弃車而走林屈蕩摶之得其甲裳下曰裳也又曰齊晉陳於鞍齊頃公曰余姑剪滅此而朝食姑且翦盡不介馬而馳之介郄克傷於矢曰余病張侯曰擐甲執兵固即死也擐貫也即就也病未及死吾子勉之又曰使吕相絶􅁗曰文公躬擐甲胄跋履山川征東之諸侯虞夏啇周之胤而朝諸􅁗又曰晉楚戰於鄢陵潘尫之子黨與飬由基蹲甲而}
  - {type: page-break, offset: 196, content: '', id: KR3k0012_SBCK_355-3a}
  - {type: variant, offset: 196, length: 5, content: 千驍果善騎, krp: 腹弃甲謂亡師也于思于思棄甲復來于思鬚之皃使其驂乗謂之曰牛則有皮犀兕尚多棄甲則郍郍猶何也役人曰縱有其皮丹􅃮若何又曰晉侯飲趙盾酒伏甲將攻之其右提音峙彌明知之趨登曰臣侍宴過三爵非禮也遂扶以下公嗾夫􅋙焉明摶而殺之盾曰棄人用犬雖猛何爲鬪且出提彌明死之又曰晉楚戰於邲楚王乗左廣以逐趙旃趙旃弃車而走林屈蕩摶之得其甲裳下曰裳也又曰齊晉陳於鞍齊頃公曰余姑剪滅此而朝食姑且翦盡不介馬而馳之介郄克傷於矢曰余病張侯曰擐甲執兵固即死也擐貫也即就也病未及死吾子勉之又曰使吕相絶秦曰文公躬擐甲胄跋履山川征東之諸侯虞夏啇周之胤而朝諸秦又曰晉楚戰於鄢陵潘尫之子黨與飬由基蹲甲而}
