  - {type: variant, offset: 12, length: 1, content: 八, SBCK: 夫人人皆能作是噐不湏國工也燕近強胡胡習作甲胄也又曰凾人爲甲犀甲七属兕甲六属合甲五属属讀如灌注之謂止旅下旅扎續之數也革堅}
  - {type: variant, offset: 12, length: 1, content: 八, krp: 夫人人皆能作是噐不湏國工也燕近強胡胡習作甲胄也又曰凾人爲甲犀甲七属兕甲六属合甲五属属讀如灌注之謂止旅下旅扎續之數也革堅}
  - {type: variant, offset: 13, length: 0, content: '', WYG: 人甲今時鎧也司其甲戈楯官也又曰燕之無函也非無函也夫人而能為函也鄭𤣥曰以言燕地之人皆能作是噐不湏國工也燕近強胡胡習作甲胄也又曰函人為甲犀甲七屬兕甲六屬合甲五屬屬讀如藿詿之謂上旅下旅扎續之數也革堅}
  - {type: page-break, offset: 13, content: '', id: KR3k0012_WYG_355-3b, image: WYG0896/WYG0896-0173b.png}
  - {type: variant, offset: 14, length: 0, content: '', SBCK: 扎長鄭司農云合甲削革裹肉但取其裘合以爲甲也犀甲壽百年兕甲壽二百年合甲壽三百鄭玄白革堅者支乆也凡爲甲必先爲容服者之形容鄭司農云容謂象式也然後制革裁扎之廣袤也權其上旅與其下旅而重􅀂一鄭司農云上旅謂要以上也下旅謂要以下也以其長爲之圍圍謂扎要廣厚凡甲鍜不摯則不堅巳敝則撓鄭司農云鍜鍜革也贄謂質也鍜革太熟則革敝無強撓曲也左傳曰鄭武公娶于申曰武姜生莊公及共叔叚莊公即位使叚居京}
  - {type: page-break, offset: 14, content: '', id: KR3k0012_SBCK_355-2b}
  - {type: variant, offset: 14, length: 0, content: '', WYG: 扎長鄭司農云合甲胄革裏肉但取其表合以為甲也犀甲壽百年兕甲壽二百年合甲壽三百鄭𤣥曰革堅者支乆也凡為甲必先為容服者之形容鄭司農云容謂象武也然後制革裁扎之廣柔也權其上旅與其下旅重而若一鄭司農云上旅謂要以上也下旅謂要以下也以其長為之圍圍謂比要廣厚凡甲鍜不贄則不堅已敝則撓鄭司農云鍜鍜革也贄謂質也鍜革太熟則革敝旡強撓曲也左傳曰鄭武公娶于申曰武姜生莊公及共叔叚莊公即位使叚居京}
  - {type: variant, offset: 14, length: 0, content: '', krp: 扎長鄭司農云合甲削革裹肉但取其裘合以爲甲也犀甲壽百年兕甲壽二百年合甲壽三百鄭玄白革堅者支乆也凡爲甲必先爲容服者之形容鄭司農云容謂象式也然後制革裁扎之廣袤也權其上旅與其下旅而重若一鄭司農云上旅謂要以上也下旅謂要以下也以其長爲之圍圍謂扎要廣厚凡甲鍜不摯則不堅巳敝則撓鄭司農云鍜鍜革也贄謂質也鍜革太熟則革敝無強撓曲也左傳曰鄭武公娶于申曰武姜生莊公及共叔叚莊公即位使叚居京}
  - {type: variant, offset: 16, length: 1, content: 矟, SBCK: 京城太叔後太叔治甲兵具卒乗將襲於鄭夫人將啓公聞其期命子封帥車二百乗以伐京又曰狄伐衛衛懿公好鶴鶴有乗軒者將戰國人受甲者皆曰使鶴鶴實有禄位余焉能戰又曰楚成王欲黜太子啇臣其師潘崇曰能行大事乎曰能以宮甲圍成王杜預曰大子宫甲也又曰}
