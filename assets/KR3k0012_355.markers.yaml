  - {type: variant, offset: 212, length: 1, content: 千, SBCK: 車之輪而蒙之以甲以爲櫓杜預曰狄彌魯人也蒙覆也櫓大楯也左執之右拔㦸成一隊百人爲隊又曰鄭子孔之爲政也專國人患之乃討西宫之難尉止等作難於西宮子孔知而不言子孔當罪以其甲及子革子良氏之甲守以自守子展子西率國子伐之殺子孔而分其室又曰欒盈帥曲沃之甲因魏獻子以晝入絳又曰崔杼稱疾不視事莊公問崔子問疾遂從姜氏侍人賈舉止衆從者而入閉門爲崔子閉公也甲興公登臺而請弗許請自刄於廟弗許遂殺之又曰楚蔿掩爲司馬子木使庀賦庀治數甲兵閱數也賦車籍馬籍䟽其毛色歳齒以備軍用賦車兵車兵甲士徒甲歩卒甲楯之數使器仗有}
