  - {type: variant, offset: 258, length: 1810, content: 從太祖田於白登山見熊將數子顧謂栗磾曰卿勇幹如此寧能搏之乎對曰天地之性人為貴若搏之不勝豈不虛斃壯士也自可驅致御前坐而制之尋皆擒獲劉𥙿之伐姚泓也栗磾慮其北擾遂築壘河上親自守焉𥙿甚憚之不敢前進𥙿遺栗磾書遠引孫權求討關羽之事假道西上題書曰黑矟公麾下栗磾以狀表聞太宗許之因授黑矟將軍栗磾好持黑矟以自摽衛𥙿望而異之故有是號累遷豫州刺史續晉陽秋曰太尉伐羗於濟口入河索虜遣將鵝青步騎十萬於河北聲云救羗太尉遣隊主丁旿音五以車百乘五北岸為却月陣相去一步車置七人授以長白毦槊毦音餌三國典略曰文育小字猛奴到都見太子詹事周舍舍命兄子弘讓教之書計文育謂弘讓曰誰能學取此富貴但有大槊耳弘讓壯之教之騎射文育大悅又曰羊侃字祖忻嘗從梁主宴樂遊苑時少府啟兩刃矟成長二丈四尺三寸梁主因賜侃河南國紫騮馬令試之侃執矟上馬左右擊刺特盡其妙觀者登樹梁主曰此樹必為侍中折矣俄而果折因號此矟為折樹矟又曰北齊安州刺史盧冑入海島得一人脛可長二丈以為矟獻於神武諸將咸莫能用唯彭樂舉之冑未幾遇疾痛聲聞外巫言海神為祟因此而卒鄴城故事曰紫陌浮橋在城西北五里案鄴中記云趙王虎時於此濟置紫陌宮暨齊時因修為濟口帝巡幸又向并州百官相餞莫不至此而訣別迄今猶以為渡口齊文宣時西巡百官辭於紫陌使矟騎圍之曰我舉鞭一時刺殺淹留半日文宣醉不能起黃門郎連子暢進曰陛下如此諸臣恐怖文宣曰大怖耶若然不須殺乃命解圍又曰北齊文宣於臺上以矟刺都督尉子輝應手而死靈鬼志曰河間王顒既敗於關中有給使陳安甚壯健常乘一赤馬儁快非常雙持二刀皆長七尺馳馬運刀所向披靡關西為之歌曰壟上健兒字陳安頭小面狹腹中寬丈八長槊左右盤語林曰桓宣武與殷劉談不如甚喚左右取黃皮袴褶音十上馬持矟數廻或向劉或擬殷意氣始得雄王傅玄歌詩曰彎我繁弱弓弄我丈八矟一舉覆三軍再舉殄戎貊梁簡文帝馬槊譜序曰馬槊為用雖非遠法近代相傳稍已成藝鄧蔗縈魏后之庭武而猶質桓馬入丹陽之寺雄而未巧聊以餘暇復撰斯法搜採抑揚斟酌煩簡至如春亭落景秋皋晚凈青霜旦盡密雨初晴纖驪沃若天馬半漢盼金精而轉態交流汗血愛連乾而息影不畏衣春鏤衢與白刃爭暉翠眊與紅塵俱動足使武夫憤氣觀者衝冠巴童留玩不待輕舟之楫越女踟躕無假如皋之箭槍風俗通曰刻葦傷盜為槍宋元嘉起居注曰謝靈運自理表云及經山陰防禦彰赫彭排馬槍斷截衢巷衛公兵法曰聽角聲第一聲絕諸隊即一時散立第二聲絕諸隊一時捺槍卷幡張弓拔刀第三聲絕諸隊一時舉槍第四聲絕諸隊一時籠槍跪膝坐唐書曰郯國公羅士信容皃短小而驍勇絕倫隋末賊起士信始年十四為通守張須陁執衣遇翟讓來寇士信請自効須陁小之曰汝形容未勝衣甲何可入陣士信怒重著二甲左右雙鞬躍而上馬須陁壯之遂將其眾擊賊于澭水之上陣纔列士信執長槍立於馬上馳至賊所刺倒數人斬一人首擲於空中用槍承之戴以略陣賊眾愕然莫敢逼者士信乃棄筴馳馬為十下而還須陁因而奮擊兵始接賊師大潰士信逐北每殺一人輒劓其鼻而懷之每歸而數其鼻以表殺賊之多少也須陁大悅之引置左右每戰須陁居前士信為副賊無敢當者又曰太宗每當大陣望賊中驍將銳士炫曜人馬出入來去者意頗怒之輒命秦叔寶往取焉叔寶應命躍馬負槍而進必刺之萬眾之中人馬俱倒太宗因以是重之叔寶亦以此頗自矜尚貞觀已後恒多疾病每謂人曰吾少長戎馬所經二百餘陣屢中重瘡計吾前後出血亦數斛矣何能不病乎及卒太宗甚傷惜久之贈徐州都督陪葬于昭陵令所司於其瑩內立石人馬以旌戰之功焉又曰哥舒翰為別將時吐蕃大寇邊翰拒之于苦海吐蕃之眾三道從山相續而下翰持半叚槍當其鋒逆擊之無不摧靡又擊其次軍復走之又擊其後軍皆大破由是知名天寶六載擢受右武衛將軍仍充隴右節度使副都知關西兵馬使河源軍使先是吐蕃每歲候夌秋即大掠積石軍前後不能禦至是翰使將王難德楊景暉等潛領兵候蕃兵至設伏以待之吐蕃五千騎既至放馬脫甲翰以城中率驍勇合伏兵馳擊之殺略盡百餘騎奔突得走王難德追擊之疋馬不還翰常逐馬驚墜于河立於水中吐蕃三人擬槍方刺之翰大叱之賊驚駭俱廢失槍而走救騎至賊便解散翰有家臣曰左車年十五每隨翰入陣翰善使槍追賊及以槍搭其肩而遏之賊驚顧翰從而刺其喉皆剔高三五丈而墜左車輒下馬斬其首率以為常又曰王難得有膽力善騎射天寶元年正月吐蕃大寇河源軍難得以騎將為軍鋒贊普有子曰琅支都恃其趫悍乘諳真馬寶鈿裝鞍軍前求較鬥者難得橫槍突往刺殺之斬其首以其馬歸虜眾無敢追者軍使以聞玄宗召至御殿問之因令馳突作殺琅支都狀壯之衣以錦袍拜左金吾衛羽林將軍五代晉史曰梁將有王彥章者勇力過人常執鐵槍僅百斤所向辟易莊宗畏之鋋釋名曰鋋延也達也去此至彼之言也方言曰矛吳楊江淮南楚五湖之間謂之鋋音蟬或謂之鏦, SBCK: ''}
