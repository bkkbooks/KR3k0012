  - {type: variant, offset: 10, length: 2, content: 矛丈, WYG: 鎧甲也銲音翰臂鎧也錏音雅頸鎧也世本曰杼作甲宋衷曰少康之子也甲鎧也墨子同書曰惟口起羞惟甲胄起戎孔安國曰甲鎧也言不可輕教令易用兵又曰魯侯伯禽都曲阜徐戎並興公曰善􅙀乃甲胄敿乃干易說卦曰離為甲胄詩曰小戎美襄公也備其兵甲以討西戎西方戎疆也征伐不休國人則矜其甲婦人能問其君子焉又曰叔于田刺莊公也叔處于京繕甲治兵以出于田國人說而歸之又曰清人在彭駟介旁旁介胄也又曰豈曰無衣與子同裳王于興師脩我甲兵與子皆行禮記曰介胄則必有不可犯之色又曰介者不拜言失容也又曰獻甲者執胄又曰甲若有以前之則執以將命無以前之則櫜袒奉胄鄭𤣥曰甲鎧也有以前之謂他贄幣也櫜鎧衣也胄兠牟也袒其衣出墨鍪以致命也又曰國家靡弊則車不彫幾甲不組縢食器不刻鏤君子不履絲履馬不常秣又曰賔牟賈侍坐於孔子言及武樂孔子曰武王克殷濟河而西車甲衅許靳切而藏之府庫而弗復用然後天下知武王不復用兵也又曰君子耻服其服而無其容耻有其容而無其辭耻有其辭而無其德是故君子端冕則有敬色甲胄則有不可辱之色言色稱其服也又曰儒有忠信以為甲胄禮義以為干櫓戴仁而行抱義而處雖有暴政不更其所自立有如此者甲鎧也干櫓者大小楯也周禮曰司甲下大夫二人中士}
