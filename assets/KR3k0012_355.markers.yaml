  - {type: variant, offset: 10, length: 1, content: 矛, SBCK: 鎧甲也釬音汗臂鎧也錏音叚音鴉金遐頸鎧也丗夲曰杼作甲宋􅂨曰少康之子輿也甲鎧也墨子同書曰惟口起羞惟甲胄起戎孔安國曰甲鎧也言不可輕教令易用兵又曰魯侯伯禽宅曲阜徐戎並興公曰善􅰴乃甲胄矯乃干言當善簡汝甲鎧兠鍪施汝楯使可用也易􅀃卦曰離爲甲胄詩曰小戎美襄公也備其兵甲以討西戎西戎方疆而征伐不休國人則矜其車甲婦人能閔其君子焉又曰叔于田刺莊公也叔處于京繕甲治兵以岀于田國人􅀃而歸之又曰清人在彭駟介旁旁介胄也又曰豈曰無衣與子同裳王于興師修我甲兵與子皆行禮記曰介胄則必有不可犯之色又曰介者不拜言失容也又曰獻甲者執胄又曰甲􅀂有以前之則執以將命無以前之則􅃝櫜奉胄鄭玄曰甲鎧也有以前之謂他贄弊也櫜鎧衣也胄兠鍪也祖其衣出兠鍪以致命也又曰國家靡弊則車不彫幾甲不組縢食噐不刻鏤君子不履絲履馬不常秣靡弊賦稅極也彫􅀞也幾附纒爲圻鄂也組縢以組節之也組以鎧飾也又曰賔牟賈侍坐於孔子言及武樂孔子曰武玉克殷濟河而西車甲衅許靳切而藏之府庫而弗復用然後天下知武王不復用兵也又曰君子耻服其服而無其容耻有其容而無其辭恥有其辭而無其德是故君子端冕則有敬色甲胄則有不可辱之色言色稱其服也又曰儒有忠信以爲甲胄禮義以爲干櫓戴仁而行抱義而處雖有􅁀政不更其所自立有如此者甲鎧也干櫓者小大楯也周禮曰司甲下大夫二人中士八人甲令時鎧也司兵甲戈楯官也又曰燕之無凾也非無凾也夫人而能爲凾也鄭玄曰言其}
