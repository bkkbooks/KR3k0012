  - {type: variant, offset: 330, length: 1, content: 貞, WYG: 篳篥者本龜茲國樂也亦名悲篥有類於笳也徳宗朝有尉遲青官至将軍大歴中有幽州王麻奴者解吹觱篥河北推為第一手頗踞傲自負除戎帥外莫有輕易請者時有從事姓盧不記名䑓拜将入京臨岐把酒請麻奴吹一曲子相送麻奴偃蹇大以為不可盧乃怒曰汝藝亦未足稱者殊不知上國有尉遲将軍冠絶今古麻奴大怒曰某之此藝海内豈有及者耶今即往彼定其優劣不數月到京訪尉遲所居即常樂里也乃於側近僦居日夕加意吹之尉遲毎經其門過如不聞麻奴尚未分因賂其門者方得通見即設席於地令坐乃於髙般渉調中吹一曲勒部羝曲終流汗浹背尉遲頷頥謂曰此曲何必於髙般渉費許多氣力也耶因自出銀字管於平般渉調中吹之麻奴驚愧垂泣拜之曰某生於逺方偶有寡藝實為無敵今日幸聞天樂方悟前非遂将樂器碎之而歸終身不復言觱篥明皇雜錄曰明皇既幸蜀西南行初入斜谷屬霖雨渉旬於棧道雨中聞鈴聲與山相應上既悼念貴妃採其聲為雨霖鈴曲以寄恨焉時梨園弟子善吹觱篥者張野狐為第一此人從至蜀上因以其曲授野狐洎至徳中車駕復幸華清宫從官嬪御多非舊人上於望京樓下命野狐奏雨霖鈴曲未半上四顧凄凉不覺流涕左右感動與之歔欷其曲今傳於法部五絃國史補云趙璧弹五絃人問其術璧曰吾之於五絃也始則心驅之中則神遇之終則天隨之方吾浩然眼如耳目如鼻不知五絃之為璧璧之為五絃也音律圖曰五絃不知誰所造也今世有之比琵琶稍小盖北國所出也又曰二絃未詳所起形如琵琶二絃四隔孤柱一合散聲二隔聲八柱聲一緫十一聲隨調應律又曰秦漢未詳所起與琵琶同以不開目為異四絃四隔合散聲四隔聲十二總二十聲随調應律六絃又曰六絃史盛作天寳中進形如琵琶而身長六絃四隔孤柱一合散聲六隔聲二十四柱聲一總三十一聲隔調應律七絃又曰七絃鄭善子作開}
