  - {type: punctuation, offset: 78, content: 《, id: KR3k0012_CHANT_584-bkkpn28}
  - {type: variant, offset: 79, length: 246, content: 史曰宋范曄善彈琵琶能為新聲上欲聞之屢諷以微旨曄偽若不肯為上嘗宴飲歡適謂曄曰我欲歌卿可彈曄乃奉旨上歌既畢曄乃罷弦蕭子顯齊書曰太祖江宴群臣數人各使效伎藝禇淵彈琵琶王僧度彈琴沈文季歌張敬兒舞王敬則柏王儉曰臣無所解唯知誦書因跪上前誦相如封禪書上笑曰此盛德之事吾何以堪之遽止使陸澄誦孝經自仲尼居而起儉曰澄所謂博而寡要臣請誦之乃誦君子之事上章上曰善張子布更覺非奇隋祕書監牛弘修皇后房內之樂文帝龍潛時頗好音樂嘗倚琵琶作歌二首名曰地厚天高託言夫妻之義因即取之為房內曲命婦人並登歌上壽並用之職在宮內之女人教習之, SBCK: 蠻}
