  - {type: variant, offset: 402, length: 0, content: '', SBCK: 家樂人也缶易曰日􅉴之离不皷缶而歌則大耋之嗟凶毛詩宛丘曰坎其擊缶宛丘之道缶者瓦器所以盛酒漿􅁗人皷之以節歌也爾雅曰盎謂之缶注云盆也史記曰􅁗王與趙王㑹澠池藺相如從􅁗王曰寡人聞趙王好音請奏琴趙王皷琴􅁗御史書曰某年某月􅁗王命趙王皷琴相如亦奉缶􅁗王􅁗王不肯相如曰五歩之内請以頸血濺大王􅁗王不懌爲一擊之相如亦命趙御史書曰某年某月趙王使􅁗王擊缶淮南子曰夫窮郷之社扣瓮拊瓶相和而歌自以爲樂常試爲之擊建皷撞巨鐘乃始知夫瓮瓶之足差也徐幹中論曰聽黄鍾之音知擊缶之細涉庠序之教知不學之困吕氏春秋曰堯使質以麋鞅魚缶而皷之也墨子曰農夫春耕夏耘秋歛冬藏息於吟缶大周正樂曰今缶八永太􅀄司馬滔進獻廣平樂兼此八缶具黄鍾一均聲樂府雜録曰唐大中􅀄}
