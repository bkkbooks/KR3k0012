  - {type: variant, offset: 3865, length: 212, content: 山猿鳥悉皆飛鳴從事頗異之曰昔夔之擊拊百獸舞庭此豈遠耶漸曰若漸於此稍當致功猶未致妙尚能及是況聖主御天賢臣考樂飛走之類又何不感因言某有別墅近花嚴閣每值風清月朗時或登閤奏此初見群羊於川下數舉頭躑躅不已某謂以鼓然也及鼓止亦止某復鼓之亦復然遂以疾徐高下而節之無不相應旋有二犬自其家走而吠之及羊側逐漸止聲仰首若有所聽少選即復宛頸搖尾亦從而變態是知率舞固無難矣某後不敢為之近者士林間無習之者唯僕射韓皋善不甚露焉鄂州節度使時聞黃鶴一兩集而已, SBCK: ''}
