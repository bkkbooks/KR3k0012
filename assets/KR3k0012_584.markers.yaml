  - {type: variant, offset: 862, length: 4, content: 琵琶始自, SBCK: 卒長執鐃兩司馬執鐲言鐲鐃之用謂鉦鐸之屬以金鐃止皷而金鐲節皷然是四金之數故鐲者非雅樂器也角通禮義纂曰長鳴角也按􅃖􅀹師蝄蜽與黄帝戰於􅃰鹿帝命吹角爲龍鳴以禦之魏武帝征}
  - {type: page-break, offset: 862, content: '', id: KR3k0012_SBCK_584-6a}
  - {type: variant, offset: 862, length: 2, content: 琵琶, WYG: 卒長執鐃兩司馬執鐲言鐲鐃之用為鉦鐸之屬以金鐃止皷而金鐲節皷然是四金之數故鐲者非雅樂器也角通禮義纂曰長鳴角也按蚩尤帥蝄蜽與黄帝戰於涿鹿帝命吹角為龍鳴以禦之魏武帝征烏桓軍士思歸乃減角為中鳴其聲尤悲以應胡笳晉宋以䧏㳂襲用之有長鳴角唐禮大駕陳一百二十具是承晉魏之制也宋樂志曰西戎有吹金者銅角長可二尺形如牛角書記所不載或云出羌胡以駕中國焉又曰角長五尺形如竹筒本細末稍大未詳所起今鹵部及軍中用之或以竹木或以皮為之無定制按古軍法有吹角者此器俗名㧞邏廻葢胡人驚軍之音所以書傳無之海内亂離至侯景圍䑓城}
  - {type: page-break, offset: 862, content: '', id: KR3k0012_WYG_584-9b, image: WYG0898/WYG0898-0345d.png}
  - {type: variant, offset: 862, length: 4, content: 琵琶始自, krp: 卒長執鐃兩司馬執鐲言鐲鐃之用謂鉦鐸之屬以金鐃止皷而金鐲節皷然是四金之數故鐲者非雅樂器也角通禮義纂曰長鳴角也按蚩尤師蝄蜽與黄帝戰於涿鹿帝命吹角爲龍鳴以禦之魏武帝征}
  - {type: variant, offset: 865, length: 5, content: 自烏孫公主, WYG: 用之也銅鈸又曰銅鈸是西凉樂也以皮紐相擊應節今法樂用之通典曰銅鈸亦謂之銅盤出西戎及南蠻其圍數寸隠起如浮漚貫之以韋相擊以和樂也南蠻國大者圍數尺或謂齊穆士素所}
  - {type: page-break, offset: 865, content: '', id: KR3k0012_WYG_584-10a, image: WYG0898/WYG0898-0346a.png}
  - {type: variant, offset: 867, length: 4, content: 孫公主造, SBCK: 桓軍士思歸乃減角爲中鳴其聲尤悲以應胡笳晉宋以降㳂襲用之有長鳴唐禮大駕陳一百二十具是承晉魏之制也宋樂志曰西戎有吹金者銅角長可二尺形如牛角書記所不載或云出羗胡以驚中國}
  - {type: variant, offset: 867, length: 4, content: 孫公主造, krp: 桓軍士思歸乃減角爲中鳴其聲尤悲以應胡笳晉宋以降㳂襲用之有長鳴唐禮大駕陳一百二十具是承晉魏之制也宋樂志曰西戎有吹金者銅角長可二尺形如牛角書記所不載或云出羗胡以驚中國}
