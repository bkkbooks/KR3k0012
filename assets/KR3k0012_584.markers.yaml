  - {type: variant, offset: 1076, length: 506, content: 孫放別傳曰君性好音能操琴及琵琶以自散傅玄琵琶序曰聞之故老云漢遣烏孫公主念其行道思慕使工知音者戰琴箏筑箜篌之屬作馬上之樂觀其器盤圓柄直陰陽序也四弦法四時也以方語目之故枇杷也取易傳於外國也杜摯以為興秦之末蓋苦長城之役百姓弦鼗而鼓之二者各有所據以意斷之烏孫近焉石崇琵琶引曰王明君曰本為昭君以觸文帝諱改匈奴請婚元帝以明君配焉昔公主嫁烏孫令琵琶馬上作樂以慰其思其送明君亦故然序之云耳傅子曰朱生善彈琵琶雖伯牙之妙無加也文士傳曰孔煒字正忠解音律彈琵琶異苑曰永嘉中李謙素善琵琶元嘉初往廣州夜集坐倦悉寢唯謙獨揮彈未輟便聞窗外有唱佳聲每至契會無不擊節謙怪語曰何不進耶對曰遺生以久無宜干突始悟是鬼幽明錄曰晉司空桓豁在荊州有參軍五月五日剪鸜鵒舌教令學語遂無不鳴與人相問顧參軍善彈琵琶鸜鵒每立聽移時錄異傳曰吳赤烏三年句章氏楊度至餘姚夜行有一年少持琵琶求寄載度受之鼓琵琶作數十曲曲畢乃吐舌擘自以怖度而去復行二十里許又見一老父寄載自云姓王名戒因復載之謂曰鬼工鼓琵琶甚哀戒曰我亦能鼓即是向鬼復擘眼吐舌度怖幾死語林曰桓宣武外甥恒在坐鼓琵琶宣武醉後指琵琶曰名士固亦操斯器三輔決錄曰遊楚上表乞宿衛拜駙馬都尉楚無學問好遊遨音樂乃畜歌琵琶箏笛每行將以自隨, SBCK: 柏板}
