  - {type: variant, offset: 1701, length: 1113, content: 家僮接得就岸乃祕器也及發棺視之乃一女郎也粧色儼然久伺之口鼻間餘息未絕遂移於曲室中將養經旬漸能言詢之云是鄭中丞也昨以悞聖旨命內官縊殺投於渭河錦即諸弟子相贈耳及如故因垂涕感謝厚本即納為妻言其琵琶今尚在南趙家值鄭注之亂莫有知者梁乃潛賂樂匠贖得之每至夜深方敢輕彈後遇良晨美景飲於花下酒酣不覺郎彈數曲洎有黃門放鷂子過其門私於牆外聽之曰此是鄭中丞琵琶聲也不日召入內乃捨厚本之罪仍加錫賜也明皇雜錄曰天寶中上命宮女子數百人為梨園弟子皆居宜春北院上素曉音律時有馬仙期李龜年賀懷智洞知律度安祿山自范陽入覲亦獻白玉簫管數百事皆陳於梨園自是音響殆不類人間有中官白秀貞自蜀使廻得琵琶以獻其槽以邏逤檀為之溫潤如玉光輝可鑒有金縷紅文蹙成雙鳳貴妃每抱是琵琶奏於梨園音韻淒清飄如雲外而諸王貴主洎虢國已下競為貴妃琵琶弟子每授曲畢皆廣有進獻其後龜年流落江南每遇良晨勝景常為人歌數關座客聞之莫不掩泣罷酒羯鼓羯鼓錄曰羯鼓出外夷以戎羯之鼓故曰羯鼓其音主太簇一均龜茲高昌踈勒天笁諸部皆用之次在都曇荅獵鼓之下都曇似腰鼓而小荅獵即楷鼓也鷄鼓之上𣞙如漆桶山桑為之下以小牙床承之擊用兩杖其音焦殺鳴烈尤宜急曲促破作戰杖連碎之聲又宜高樓曉影明月清風破空透遠特異眾樂杖用黃檀狗骨花楸等木須至乾緊絕濕氣而復柔膩乾取發越響亮膩取戰䮍健舉捲用鋼鐵鐵當精練捲須至勻若不以鋼則應條高下細捩不停不勻則鼓面緩急若琴徽之病玄宗洞曉音律由之天縱凡是管絃悉造其妙若製作曲調隨意即成如不立章度取適長短應指發聲皆中點拍至於清濁變轉律呂呼召君臣事物相制使雖古之夔曠無以過也尤愛羯鼓橫笛云八音之領袖也諸樂不可為比嘗值二月詰旦巾櫛方畢時宿雨初晴景色明麗小殿庭內柳杏將吐覩而歎曰對此景物豈可不與他判斷之左右相目將令備酒唯高力士遣取羯鼓上旋命之臨軒縱擊一曲名春光好上自掣神思自得及顧柳杏皆已發拆指而笑曰此事不喚我作天公可乎左右皆稱萬歲又製秋風高每至秋空逈徹纖塵不起即奏之必遠風徐來庭葉墜落其妙絕入神也如此又曰汝陽王璡寧王長子也姿容妍美秀出藩邸上特鍾愛焉自傳授之又以其聰悟敏惠妙達其旨每隨遊幸頃刻不捨璡嘗戴砑綃帽打曲上自樀槿花一朵置於帽上著處二物皆極滑久之方安遂奏舞山花一曲花不墜本色所謂定頭項難在不動搖上大喜笑賜金器一廚因誇花奴璡小名也姿質明瑩肌膚光細非人間人必神仙謫墜也寧王謙讓隨而短之上笑曰大哥不在過慮阿暪自是相師上於諸親自稱此號夫帝王之相且須英特越逸之氣不然則有深沉包育之候若花奴但端秀過人悉無此犬固無猜也而又舉止淹雅更得公卿間令譽耳寧王又謝之曰如此則臣乃輸之上曰若此則阿暪亦輸大哥矣寧王又謙謝上曰阿暪嬴處亦多大哥大用偽揖眾皆歡笑也上性雋邁酷不好琴嘗聽彈正弄未及畢叱琴者曰待詔出去謂宦者曰速召花奴將羯鼓來為我解穢黃, SBCK: 黄}
