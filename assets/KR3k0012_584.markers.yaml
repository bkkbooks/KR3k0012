  - {type: variant, offset: 683, length: 176, content: 出及見即僧也蓋西市內豪族厚賂莊嚴寺僧善本善本名俗姓段也以定東之勝也翌日德宗召入令陳本藝異常佳獎因令教授崑崙奏曰且請崑崙彈一調子乃彈之師曰本領何雜也兼帶雅聲崑崙驚曰段師神人也臣小年初學琵琶偏於鄰舍女巫處授一品絃調子後仍易數師段精鑒玄妙如此段師奏曰遣崑崙不近樂器十餘年使忘其本領然後可教詔許之後盡段師之蓺也又曰開元中有賀懷智善琵琶以石為槽鵾鷄筋作絃用鐵撥彈, SBCK: 擊}
