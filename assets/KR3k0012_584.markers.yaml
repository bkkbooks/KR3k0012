  - {type: variant, offset: 3385, length: 357, content: 緍及皋遺之財帛器皿其直果稱焉又曰廣德中蜀客雙流縣丞李琬者亦能之調集至長安稅居務本里夜聞羯鼓聲曲頗妙於月下步尋至一小宅門戶極卑隘叩門請謁鼓工曰君所擊者豈非耶婆色鷄乎一本作耶婆娑鷄也雖至精能然而無尾何也工大異之曰君固知音者此事無人知某太常工人也祖父傳此蓺尤能此曲進因張通儒而入長安某家流散父沒西河此曲遂絕今但按舊譜數本尋之竟無結尾聲故夜夜求之琬曰曲下意盡乎工曰盡琬曰意盡則曲盡又何索乎工曰奈何聲不盡也琬曰可言矣夫曲有如此當以他曲解之方可盡其聲矣夫耶婆色鷄當用掘拓急偏解之工如其所教果得諧叶聲意皆盡如朽枝用渾脫解甘州用絕了頭解之類是也工泣言而謝之即言於寺卿奏為主簿累官至太常少卿為宗正卿又曰永奏中杜鴻漸為三川副元帥兼西川節度使亦能之成都有削杖者以二枚獻於鴻漸鴻漸得之示於眾曰此尤物也常衣襟下收貯積時矣匠曰某於脊溝中養之二, SBCK: 八}
