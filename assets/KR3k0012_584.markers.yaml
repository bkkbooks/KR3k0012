  - {type: variant, offset: 2941, length: 309, content: 時入上問之綽語其方及解怒之際皆無羗悟上奇之復厲聲謂之曰我心骨下事安有侍官奴聞鼓聲能料之耶今且謂我何如綽遂走下階面北鞠躬大聲曰有勑豎金鷄上大笑而止又曰宋開府雖耿介不倫亦深好聲樂尤善羯鼓南山起雲北山起雨即開府所為始承恩顧與上論鼓事曰不是青州石即是魯山花歐然少年碧掌下雖有朋肯聲據此乃漢震第二鼓也且𣞙用石花瓷固是腰鼓掌下朋肯聲是以手拍非羯鼓鳴矣又謂上曰頭如青山峰手似白兩點按此即羯鼓之能事山峰欲不動兩點取碎急即上與開府兼善兩鼓也而羯鼓偏好以其比漢震稍雅細焉開府之家悉傳之東都留守鄭叔祖母即開府之女今尊賢里鄭氏第小樓即是夫人習鼓之所也又曰嗣曹王皋有巧思精於器用為荊南節度使有羈客懷二捲欲求通謁先啟於賓府府中觀者訝之曰豈足尚邪客, SBCK: 故對}
