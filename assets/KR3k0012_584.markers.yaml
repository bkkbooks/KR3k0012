  - {type: variant, offset: 875, length: 9, content: 直項曲項者曲項蓋使, WYG: 前廣後鋭長一寸餘其形如覆節僮少以為戲也堯時有八九十老人擊而歌曰日出而作日入而息鑿井而飲耕田而食帝力何有}
