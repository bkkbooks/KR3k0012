  - {type: variant, offset: 871, length: 3, content: 馬上彈, WYG: 也壤風土記曰壤者以木作}
  - {type: variant, offset: 872, length: 2, content: 上彈, SBCK: 又曰角長五尺形如竹筒夲細末稍大未詳所起今鹵部及軍中用}
