  - {type: variant, offset: 2412, length: 402, content: 備酒唯高力士遣取羯鼓上旋命之臨軒縱擊一曲名春光好上自掣神思自得及顧柳杏皆已發拆指而笑曰此事不喚我作天公可乎左右皆稱萬歲又製秋風高每至秋空逈徹纖塵不起即奏之必遠風徐來庭葉墜落其妙絕入神也如此又曰汝陽王璡寧王長子也姿容妍美秀出藩邸上特鍾愛焉自傳授之又以其聰悟敏惠妙達其旨每隨遊幸頃刻不捨璡嘗戴砑綃帽打曲上自樀槿花一朵置於帽上著處二物皆極滑久之方安遂奏舞山花一曲花不墜本色所謂定頭項難在不動搖上大喜笑賜金器一廚因誇花奴璡小名也姿質明瑩肌膚光細非人間人必神仙謫墜也寧王謙讓隨而短之上笑曰大哥不在過慮阿暪自是相師上於諸親自稱此號夫帝王之相且須英特越逸之氣不然則有深沉包育之候若花奴但端秀過人悉無此犬固無猜也而又舉止淹雅更得公卿間令譽耳寧王又謝之曰如此則臣乃輸之上曰若此則阿暪亦輸大哥矣寧王又謙謝上曰阿暪嬴處亦多大哥大用偽揖眾皆歡笑也上性雋邁酷不好琴嘗聽彈正弄未及畢叱琴者曰待詔出去謂宦者曰速召花奴將羯鼓來為我解穢黃, krp: 黄}
