  - {type: variant, offset: 1587, length: 687, content: 唐文宗朝女弟子鄭中丞善於胡琴中丞即宮人之宮也內庫有兩面琵琶號大忽雷鄭常彈小忽雷因匙頭脫送於崇仁坊南趙家修理大約造樂器多在此坊中南北二趙家最妙大和中有權相舊吏梁厚本莊在渭南縣之西北臨渭水一日因垂釣忽見一物流過長五尺許悉以錦纏其上令家僮接得就岸乃祕器也及發棺視之乃一女郎也粧色儼然久伺之口鼻間餘息未絕遂移於曲室中將養經旬漸能言詢之云是鄭中丞也昨以悞聖旨命內官縊殺投於渭河錦即諸弟子相贈耳及如故因垂涕感謝厚本即納為妻言其琵琶今尚在南趙家值鄭注之亂莫有知者梁乃潛賂樂匠贖得之每至夜深方敢輕彈後遇良晨美景飲於花下酒酣不覺郎彈數曲洎有黃門放鷂子過其門私於牆外聽之曰此是鄭中丞琵琶聲也不日召入內乃捨厚本之罪仍加錫賜也明皇雜錄曰天寶中上命宮女子數百人為梨園弟子皆居宜春北院上素曉音律時有馬仙期李龜年賀懷智洞知律度安祿山自范陽入覲亦獻白玉簫管數百事皆陳於梨園自是音響殆不類人間有中官白秀貞自蜀使廻得琵琶以獻其槽以邏逤檀為之溫潤如玉光輝可鑒有金縷紅文蹙成雙鳳貴妃每抱是琵琶奏於梨園音韻淒清飄如雲外而諸王貴主洎虢國已下競為貴妃琵琶弟子每授曲畢皆廣有進獻其後龜年流落江南每遇良晨勝景常為人歌數關座客聞之莫不掩泣罷酒羯鼓羯鼓錄曰羯鼓出外夷以戎羯之鼓故曰羯鼓其音主太簇一均龜茲高昌踈勒天笁諸部皆用之次在都曇荅獵鼓之下都曇似腰鼓而小荅獵即楷鼓也鷄鼓之上𣞙如漆桶山桑為之下以小牙床承之擊用兩杖其音焦殺鳴烈尤宜急曲促破作戰杖連碎之聲又宜高樓曉影明月清風破空透遠特異眾樂杖用黃檀狗骨花楸等木須至乾緊絕濕氣而復柔膩乾取發越響亮膩取戰䮍健舉捲用鋼鐵鐵當精練捲須至勻若不以鋼則應條高下細捩不停不勻則鼓面緩急若琴徽之病, krp: ''}
  - {type: variant, offset: 1590, length: 110, content: 朝女弟子鄭中丞善於胡琴中丞即宮人之宮也內庫有兩面琵琶號大忽雷鄭常彈小忽雷因匙頭脫送於崇仁坊南趙家修理大約造樂器多在此坊中南北二趙家最妙大和中有權相舊吏梁厚本莊在渭南縣之西北臨渭水一日因垂釣忽見一物流過長五尺許悉以錦纏其上, SBCK: ''}
