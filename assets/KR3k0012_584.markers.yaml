  - {type: variant, offset: 443, length: 0, content: '', krp: 土木絲竹各得其冝唯黄鍾不調紹逺每以爲意甞因退朝經韓使君佛寺過浮圖三層之上有鳴鐸焉忽聞其音雅合宮調取而配奏方始克諧紹逺乃啓世宗行取通禮義纂曰鐸大鈴振之以通皷也大周正樂曰鐸如鐃以木爲舌揺之以和皷也樂書曰木鐸者鈴也主銅爲之以木作舌故天將以夫子爲木鐸言施政教時天將命以號令天下文舞所執而鳴之以振文教樂書曰金鐸者形同木鐸以爲金舌號令爲度鳴而驚衆舞所執以振武教者也鄭注司馬職云掩上振之爲摝摝者止行息氣也六軍三三而居其間相逺故振鐸以通之使軍衆知可進可止之節也司馬法曰皷聲不過閶􅎏聲不過闒鐸聲不過其琅也廣古今五行記曰晉愍帝建興四年晉陵人陳寵在田得銅鐸五枚皆有龍虎形大周正樂曰唐朝承周隋離亂之後樂懸散失獨無徴音國姓所闕知者不敢聞逹其事天后末御史大夫李嗣真常宻求之不得一旦秋爽聞砧聲有應之者在今弩營是當時英公宅又數年無由得之其後敬業舉兵敗走后瀦其宫嗣真乃求得䘮車一鐸入而振之}
