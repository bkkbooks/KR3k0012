  - {type: variant, offset: 402, length: 0, content: '', WYG: 家樂人也缶易曰日昃之離不鼓缶而歌則大耋之嗟凶毛詩宛丘曰坎其擊缶宛丘之道爾雅曰盎謂之缶注云盆也史記曰秦王與趙王㑹渑池藺相如從秦王曰寡人聞趙王好音請奏琴趙王鼓琴秦從史書曰某年某月秦王命趙王鼓琴相如亦奉缶秦王秦王不肯相如曰五歩之内請以頸血濺太王秦王不懌為一擊之相如亦命趙從史書曰某年某月秦王為趙王擊缶淮南子曰夫窮鄉之社扣甕拊瓶相和而歌自以為樂常試為之擊建鼓撞巨鐘乃始知夫瓮瓶之足羞也徐幹中論曰聽黄鍾之音知擊缶之細渉庠序之教知不學之困吕氏春秋曰堯使質以麋􅛘置缶而鼓之也墨子曰農夫春耕夏耘秋收冬藏息於吟缶大周正樂曰今缶永泰初司馬㴞進獻廣平樂葢}
