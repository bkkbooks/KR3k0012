  - {type: variant, offset: 579, length: 0, content: '', SBCK: 叚裁爲四具􅀘樂懸之散闕今享宗廟郊天掛簨簴者乃嗣眞所得也鐃釋名曰鐃鐃也者宮懸用之飾以流􅂫禮記曰始奏以文文擊皷以驚衆也復亂以武武擊鐃而退也周禮曰金鐃止皷鐃如鈴無舌者秉執而鳴之以止皷也樂書曰金鐃小者似鈴執而鳴之以止皷也舞武工人所執謂振而退武也大者懸而擊之象鍾形薄旁有二十四銑應律音而和樂也􅀃文曰鉦鐃也鈴柄中上下通鉦也銑小鐃也軍法卒長執銑漢有皷吹}
