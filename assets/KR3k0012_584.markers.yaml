  - {type: variant, offset: 339, length: 1, content: 子, SBCK: 近身便也􅃶十三隔􅀌柱一合散聲七隔聲九十一柱聲一惣九十九聲隨調應律太一又曰太一司馬滔作開元中進十二􅃶六隔合散聲十二隔聲七十二􅃶散聲應律吕以隔聲旋相爲宫合八十四調今入雅樂宫懸内用之矣又曰天寳樂任歴作天寳中進􅀋石憧十四􅃶設柱黄鍾一均足倍七聲後柱作調應律每舞者執之方響三禮圖方響梁有銅磬盖今方響也方響以䥫爲之脩九寸廣二寸圎上方下架磬而不設􅀝架上以代鍾磬人間使用者􅂊三四寸樂府雜録曰唐咸通中有調音律官呉􅌭爲皷吹署丞}
