  - {type: variant, offset: 330, length: 1, content: 貞, SBCK: 篳篥者夲􅀛兹國樂也亦名悲篥有􅀋於笳也德宗朝有尉遟青官至將軍大暦中有幽州王麻奴者解吹􅓋篥河北推爲第一手頗踞傲自􅀒除戎師外莫有敢輕易請者時有從事姓盧不記名臺拜將入京臨歧把酒請麻奴吹一曲子相送麻奴偃蹇大以爲不可盧乃怒曰汝蓺亦未足稱者殊不知上國有尉遟將軍冠絶今古麻奴大怒曰某之此蓺海内豈有及者耶今即徃彼定其優劣不數月到京訪尉遟所居即常樂里也乃於側近僦居日夕加意吹之尉遟每經其門過如不聞麻奴尚未分因賂其閽者方得通見即設席於地令坐乃於髙般渉調中吹一曲勒部低曲終流汗夾背尉遟頷頥謂曰此曲何必於髙般渉徒費許多氣力也因自出銀字管於平般渉調中吹之麻奴驚僨垂泣拜之曰某生於偏逺之方偶有寡藝實爲無人今日幸聞天樂方悟前非遂將樂器碎之而歸終身不復言觱篥明皇雜録曰明皇旣幸蜀西南行􅀄入斜谷屬霖􅀨渉旬於棧道雨中聞鈴聲與山相應上旣悼念貴妃採其聲爲雨霖鈴曲以􅀉恨焉時梨園弟子善吹觱篥者張野狐唯此人從至蜀上因以其曲授野狐泊至德中車駕復幸華清宫從官嬪御多非舊人上於望京樓下命野狐奏􅀨霖鈴曲未半上四顧凄凉不􅁴流涕左右感動與之歔欷其曲今傳於法部五􅃶國史􅀘云趙壁彈五􅁌人問其術壁曰吾之於五􅃶也始則心驅之中則神遇之終則天隨之方吾浩然眼如耳耳如􅈹不知五􅃶之爲壁壁之爲五􅃶也音律圖曰五􅁌不知誰所造也今世有之比琵琶稍小盖北國所出也又曰二􅃶未詳所起形如琵琶二􅃶四隔􅀌柱一合散聲二隔聲八柱聲一惣一十聲隨調應律又曰􅁗漢未詳所起與琵琶同以不開目爲異四􅃶四隔合散聲四隔聲十六惣二十聲隨調應律六􅃶又曰六􅃶史盛作天寳中進形如琵琶而身長六􅃶四隔􅀌柱一合散聲六隔聲二十四柱聲一惣三十一聲隔調應律七􅃶又曰七􅃶鄭喜子作開}
