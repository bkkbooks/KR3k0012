  - {type: variant, offset: 369, length: 3, content: 有同心, SBCK: 子都公孫閼也又曰秋大閲簡車馬也又曰􅋐丹獲其戎車與其戎右少師又曰天王使家父來求車非禮也諸侯不貢車服天子不􅀻求財諸侯自常職貢又曰使公子彭生乗公公薨于車公魯桓公也又曰公怒公齊襄公也曰彭生敢見射之豕人立而啼公懼墜于車傷足喪屨反誅屨於徒人費又曰南宫長萬奔陳以乗車輦其母一日而至又曰衆車入自純門及逵市又曰齊侯使公子無􅃜帥車三百乗甲}
