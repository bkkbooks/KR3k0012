  - {type: variant, offset: 1917, length: 681, content: 丈廣十餘丈山昔在海中行侶舉帆從穴中過陸景典語曰孤特與水軍一萬從風舉帆朝發海島暮至呇渚世說曰顧長康作殷荊州佐請假還東爾時例不給布帆顧苦求之然乃發至破冡便遭風大敗作牋與殷云地名破冡而出行人安穩布帆無恙馬融廣成頌曰然後方艅舶連舼舟張雲帆施蜺幬靡颼風陵迅流發櫂歌從水謳郭璞江賦曰鼓帆迅越超張絕逈儵忽數百千里俄頃飛廉無以希其蹤渠黃不能及其景孫綽望海賦曰若乃惟馨陳祈祝不愧言或適於東或歸于西商客齊暢潮流往還各資順勢雙帆同懸倏如繡驊背馳拏奴加切如交集絰軒帆檣吳書曰孫弘被黜之長沙過蕪湖有鵲𠾑薪巢帆檣帆檣官僚以為檣末傾危非久安之像遂以憂終郭璞江賦曰舳艫相接萬里連檣泝洄沿流或漁或商五兩淮南子曰若綄胡管切之候風也許慎曰綄候風扇也楚人謂之五兩兵書曰凡候風法以雞羽重八兩建五重旗取羽繫其巔立軍營中郭璞江賦曰氣氛梫於清旭覘五兩之動靜榜補明堂月令曰榜舫人習水者也司馬相如上林賦曰榜人歌聲流喝烏邁切釋名曰舡筌𥶌桅釋名曰舡前立柱曰桅桅巍也巍巍高皃也筌𥶌釋名曰舟中床以薦物者曰筌言伹有簀筌床也其上板曰𥶌言所覆眾慮也牂柯魏略曰沐並字德信少有志氣吳將朱然圍樊城遣兵於硯山斫牂柯材兵作食先熟者呼共食後熟者曰不也呼者曰汝欲作沐德信耶其名乃播異域雖華夏不知者以為前世人也華陽國志曰楚頃襄王遣將軍莊蹻泝沅水出且蘭且干余切以伐夜郎王㭬牂柯擊舡於且蘭既克夜郎而秦奪楚黔中地無路得歸遂留王之號為莊王以且蘭有㭬舡䍧柯處因改其為名牂柯異物志曰䍧柯者繫舡筏也其山在海中小而高以繫舡伐也俗人謂之越王䍧柯遠望甚小而高不似山望之以為一株樹在水中也尋陽記曰郡西北有一松楊樹枝條繁茂垂陰數畝傳云陶桓公䍧柯成此樹豫章記新淦音紺縣北, SBCK: ''}
