  - {type: variant, offset: 11, length: 0, content: '', krp: 車七乗詩曰我送舅氏曰至渭陽何以贈之路車乗黄乗黄白馬秦康公作是詩送重耳歸晉又曰何彼穠矣棠棣之華曷不肅雍王姬之車又曰公車于乗朱英緑縢又曰戎車孔愽徒御無斁又曰君子之車旣庶且多又曰子有車馬弗馳弗驅又曰役車其休又曰有棧之車行彼周道又曰命彼後車謂之載之又曰我任我輦我車我牛又曰擇有車馬以居徂向鄭箋云擇民之在車馬者徃居于向又曰其車旣載乃弃爾輔又曰旣岀我車旣挾我侯又曰脩爾車馬謹爾戎兵又曰間關之車牽兮牽音轄又曰戎車旣飾徒御無繹又曰戎車旣安如輊如軒輕陟利灱車前重軒後重也禮曰乃擇元辰天子親載耒耜置之車右率公卿諸侯大夫躬耕籍田又曰乃教田獵以習五戎班馬政命僕夫七騶咸駕載旌旐授車以級整設于屏外有司搢朴北靣以誓之又曰大夫七十而致仕若不得謝則必賜之几杖行役以婦人適四方乗安車自稱曰老夫又曰夫爲人子者三賜不及車馬又曰獻車馬者執䇿綏旌武車綏旌徳車結旌又曰前有車騎則載飛鴻又曰車驅而騶至于大門君撫僕之手而顧命車右就車門閭溝渠必歩又曰君車將駕則僕執䇿立於馬前君岀就車則僕并轡授綏又曰客車不入大門又曰祥車曠左又曰乗君之乗車不敢曠左右必式又曰國君不乗竒車又曰車上不廣欬不妄指又曰問士之冨以車數對問庶人之冨數畜以對也又曰君之適長殤車三乗公之庶長殤車一乗大夫之適長殤車一乗又曰五十無車者不越疆而弔人又曰有若曰晏子一狐裘三十年遣車一乗及墓而反國君七介遣車七乗大夫五介遣車五乗晏子焉爲知禮又曰赴車不戢櫜丘不戢示當報以告䘮之辭言之謂還吿於國櫜甲衣韔弓衣又曰大夫殺則止佐佐䡛止則百姓田獵佐車䡱送之車也又曰有發則命大司徒教士以車甲乗兵專衣甲之儀有發謂有軍師之發卒又曰有圭璧金璋不鬻於市命服命車不鬻於市宗廟之器不鬻於市犠牲不鬻於市戎器不鬻於市用器不中度不鬻於市兵車不中度不鬻於市鬻賣也又曰曽子問曰古者師行必以遷廟主行乎孔子曰天子廵狩以遷廟主行載于齊車言必有尊也今也取七廟之主以行則失之矣齊車金路也又曰曽子問曰古者師行無遷主則何主孔子曰主命問曰何謂也孔子曰天子諸侯將出必以幣帛皮圭告于祖禰遂奉以岀載于齊車以行毎舎奠焉而后就舎以脯醢禮神乃敢即安所告而不以岀即埋之又曰苟有車必見其軾茍有衣必見其敝又曰其爲賔則公舘復私館不復其在野則升其乗車之左轂以其綏而復私館則卿大夫之家也不私之復爲主人之惡又曰武王克殷反啇未及下車而封黄帝之後於薊封帝堯之後於祝封帝舜之後於陳下車而封夏后氏之後於𣏌封殷之後於宋封王子比干之墓釋箕子囚使之行啇容而復其位庶民㢮禁庶士倍禄濟河而西馬散之華山之陽而弗復乗牛散之桃林之野而弗復服車甲衅音釁而藏之府庫而弗復用又曰大夫以布爲輤音舊而行至於家而說輤載以輲車入自門至於阼階下而說車舉自阼階升適所殯又曰國主待客出入三積餼客於舎五牢之具陳於内米三十車禾三十車周禮春官}
