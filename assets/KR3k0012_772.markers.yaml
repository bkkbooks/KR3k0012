  - {type: variant, offset: 382, length: 5, content: 我曹為今日, krp: 由基曰雖君有命爲國故子必射乃射再發盡殪叔山冉搏人以投中車折軾晉師乃止又曰狄虒彌建大車之輪而䝉之以甲以爲櫓狄虒彌櫓人也蒙覆也櫓大楯又曰巳酉師于牛首鄭地𥘉子駟與尉上有爭將禦諸侯之師黜其車禦牛首師也黜減損遂弗使獻不使獻所獲又曰子西聞盗不儆而岀子西公孫夏子駟子尸而追盗先折尸而逐賊盗入於北宫乃歸授甲臣妾多逃噐用多喪子産聞盗子國子爲門者置守門庀羣司閉府庫完守備成列而後岀兵車十七乗尸而攻盗於北宫子蟜帥國人助之殺尉止子師僕盗衆盡死又曰鄭人賂晉侯以師悝師觸師蠲皆樂師名廣車軘車淳十五乗甲兵備廣車軘車皆兵車名淳禺也凡兵車百乗他兵車及廣軋共百乗又曰魯人莒人皆請以車千乗自其郷入又曰齊侯登巫山以望晉師晉人使司馬斥山澤之險雖所不至必斾而䟽陳之斥候也䟽建旄旗以陳爲陳民衆也又曰使乗車者左實右僞以斾先輿曳柴而從之以陽塵齊侯見之畏其衆}
