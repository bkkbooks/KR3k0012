  - {type: variant, offset: 7, length: 0, content: '', WYG: 古者車聲如居言所以居人也今曰車車舍也行者所處若車舎也又曰皇帝造車故號軒轅氏説文曰車輿輪總名象形也軒曲藩車也軿輜車也輕輕車也軘兵車也䡴䧟陣車也一曰一輪車輿車輿也輅軨前横木也軧大車後也輦輓車也在車前引之轟羣車聲也易曰大車以載積中不敗也又曰賁其趾舎車而徒又曰上九暌孤見豕負塗載鬼一車書曰五載一廵狩羣后四朝敷奏以言明試以功車服以庸又曰武王革車三百兩虎賁三千人與受戰于牧野作牧誓至牧地以誓衆又曰酒誥妹土嗣爾股肱純其藝黍稷奔走事厥考厥長肇牽車牛逺服賈用孝養厥父母農功既畢始牽車牛載其所有易求所無逺行賈賣用其所得異珍孝養其父母又蔡仲之命曰惟周公位冡宰正百工百工百官羣叔流言乃致辟管叔于啇囚蔡叔于郭鄰以車七乗詩曰我送舅氏曰至渭陽何以贈之路車乗黄乗黄四馬皆黄秦康公作是詩送重耳歸晉又曰何彼穠矣棠棣之華曷不肅雍王姬之車又曰公車千乗朱英緑縢又曰戎車孔愽徒御無斁又曰君子之車既庻且多又曰子有車馬弗馳弗驅又曰役車其休又曰有棧之車行彼周道又曰命彼後車謂之載之又曰我任我輦我車我牛又曰擇有車馬以居徂向鄭箋云擇民之有車馬者徃居于向又曰其車既載乃棄爾輔又曰既出我車既挾我侯又曰脩爾車馬謹爾戎兵又曰閒關車之牽兮牽音轄又曰戎車既飭又曰戎車既安如輊如軒輊陟利切車前重軒後重也禮曰乃擇元辰天子親載耒耜置之車右率公卿諸侯大夫躬耕籍田又曰乃教田獵以習五戎班馬政命僕夫七騶咸駕載旌旐授車以級整設于屏外有司搢扑北靣以誓之又曰大夫七十而致仕若不得謝則必賜之几杖行役以婦人適四方乗安車自稱曰老夫又曰夫為人子者三賜不及車馬又曰獻車馬者執䇿綏武車綏旌德車結旌又曰前有車騎則載飛鴻又曰車驅而騶至于大門君撫僕之手而顧命車右就車門閭溝渠必歩又曰君車將駕則僕執䇿立于馬前君出就車則僕并轡授綏又曰客車不入大門又曰祥車曠左又曰乗君之乗車不敢曠左左必式又曰國君不乗竒車又曰車上不廣欬不妄指又曰問士之富以車數對問庻人之富數畜以對又曰君之適長殤車三乗公之庻長殤車一乗大夫之適長殤車一乗又曰五十無車者不越疆而弔人又曰有若曰晏子一狐裘三十年遣車一乗及墓而反國君七个遣車七乗大夫五个遣車五乗晏子焉知禮又曰赴車不載櫜韔兵不戢示當報以告䘮之辭言之謂還告於國櫜甲衣韔弓衣又曰大夫殺則止佐車佐車止百姓田獵佐車驅逆之車也又曰有發則命大司徒教士以車甲乗兵專衣甲之儀有發謂有軍師之發卒又曰有圭璧金璋不鬻於市命服命車不鬻於市宗廟之器不鬻於市犧牲不鬻於市戎器不鬻於市用器不中度不鬻於市兵車不中度不鬻於市鬻賣也又曰曾子問曰古者師行必以遷廟主行乎孔子曰天子廵狩以遷廟主行載于齊車言必有尊也今也取亡廟之主以行則失之矣齊車金路也又曰曾子問曰古者師行無遷主則何主孔子曰主命問曰何謂也孔子曰天子諸侯將出必以幣帛皮圭告于祖禰遂奉以出載于齊車以行毎舎奠焉而后就舎以脯醢禮神乃敢即安所告而不以出即埋之又曰苟有車必見其軾苟有衣必見其敝又曰其為賓則公舘復私舘不復其在野則升其乗車之左轂以其綏而復私館則卿大夫之家也又曰武王克殷反商未及下車而封黄帝之後於薊封帝堯之後於祝封帝舜之後於陳下車而封夏后氏之後於把投殷之後於宋封王子比干之墓釋箕子囚使之行商容而復其位庶民弛政庶士倍禄濟河而西馬散之華山之陽而弗復乗牛散之桃林之野而弗復服車甲衅音釁而藏之府庫而弗復用又曰大夫以布為輤音倩而行至於家而說輤載以輲車入自門至於阼階下說車舉自阼階升適所殯又曰主國待客出入三積餼客於舎五牢之具陳於内米三十車禾三十車周禮春官下曰巾車掌公車之政令又考工記曰輿人為車圜者中規方者中矩立者中縣衡者中水直者如生焉繼者如附焉治材也如生如木從地生附如木之附枝也輈人為輈輈車轅也國馬之輈深四尺七寸田馬之輈深四尺駑馬之􅀈輈深三尺有三寸軫方象地盖圓象天輪輻三十象日月盖弓二十有八以象星行澤欲短轂短轂則利行山欲長轂長轂則安又曰巾車云服車五乗孤乗夏篆以五綵畫轂約也卿乗夏縵五綵畫無篆也大夫乗墨車不畫者也士乗棧車不革鞔而漆之也庻人乗役車方箱可載任器物以供役自孤以下之妻亦各得乗其夫之車也又曰王后五輅一曰重翟錫面朱總二曰厭翟勒面繢總三曰安車彫面鷖總四曰翟車貝面組總有握五曰輦車組輓有翣羽盖王之䘮車五乗一曰木車始遭䘮乗也二曰素車卒哭所乗三曰薻車既練所乗四曰駹車大祥所乗五曰漆車既禪所乗其卿大夫士被喪三年者乗堊齊衰素車大功薻車小功䮾車緦麻漆車又曰王后有安車翟車五乗木車素車薻車駹車漆車五乗孤乗夏篆卿乗夏縵大夫乗墨車士乗棧車庻人乗役車散車其用無常又考工記曰一器而工聚者車為多傳曰太叔將襲鄭夫人將啓之公聞其期曰可矣命子封帥車}
