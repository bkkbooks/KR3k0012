  - {type: variant, offset: 1759, length: 157, content: 帆時風一月餘日乃入秦大秦國也南州異物志曰外徼人隨舟大小或作四帆前後沓載之有盧頭木葉如牖形長丈餘織以為帆其四帆不正前向皆使邪移相聚以取風吹風後者激而相射亦並得風力若急則隨宜城減之邪張相取風氣而無高危之慮故行不避迅風激波所以能疾永嘉記云郡有石帆又有破石傳云古有神人以破石半為帆故名石帆吳郡錄海記曰海虞縣有穿山下有洞穴高, SBCK: 百七}
