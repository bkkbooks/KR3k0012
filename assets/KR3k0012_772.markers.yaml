  - {type: variant, offset: 389, length: 1, content: 選, SBCK: 脫歸又曰旣食之使御廣車而行廣車兵車巳皆乗乗車乗車安車又曰丁亥葬諸士孫之里士孫人姓因名其里四翣不􅵖下車七乗不以兵甲下車送葬之車齊舊依上公禮九乗又有甲兵今皆降損又曰六月鄭子展子産帥車七百乗伐陳霄突陳城又曰賦車籍馬賦車兵車也兵甲士也又曰大夫逆於境者逆迎也迎衛侯執其手而與之言道逆者自車揖之逆於門者領之而巳領摇其頭言衎驕心易生又曰齊慶封來聘其車羙孟孫謂叔孫曰慶季之車不亦羙乎季慶封之字叔孫曰豹聞之肥羙不稱必以惡終羙車何爲又曰獻車於季武子羙澤可以鑑展莊叔見之曰車甚澤人必瘁冝其亡也又曰王聞羣公子之死也王楚靈也自投于車下曰人之愛其子也亦如余乎侍者曰甚焉小人老而無子知擠干溝壑矣擠墜也又曰治兵于郝南甲車四千乗三十萬人又曰叔向曰寡君有甲車四千乗在雖以無道行之必可畏也况其率道其可敵之公羊傳曰夏四月公㑹紀侯于郕秋八月壬午大閲大閱者何簡車徒也大簡閲兵車使可任用而}
  - {type: page-break, offset: 389, content: '', id: KR3k0012_SBCK_772-7b}
  - {type: page-break, offset: 389, content: '', id: KR3k0012_SBCK_772-8a}
  - {type: variant, offset: 389, length: 1, content: 選, WYG: 脫歸又曰既食之使御廣車而行廣車兵車已皆乗乗車乗車安車又曰丁亥葬諸士孫之里士孫人姓因名其里四翣不蹕下車七乗不以兵車下車送葬之車舊依上公公禮九乗又有甲兵今皆降損又曰六月鄭子展子産帥車七百乗伐陳宵突陳城又曰賦車籍馬賦車兵車也兵甲士也又曰大夫逆於境者逆迎也迎衛侯執其手而與之言道逆者自車揖之逆於門者頷之而已貞揺其頭言術驕心易生又曰齊慶封來聘其車美孟孫謂叔孫曰慶季之車不亦美乎季慶封之字叔孫曰豹聞之服美不稱必以惡終美車何為又曰獻車於季武子美澤可以鑑展莊叔見之曰車甚澤人必瘁宜其亡也又曰王聞羣公子之死也王楚靈也自投于車下曰人之愛其子也亦如余乎侍者曰甚焉小人老而無子知擠于溝壑矣擠墜也又曰治兵于郝南甲車四千乗三十萬人又曰叔向曰寡君有甲車四千乗在雖以無道行之必可畏也况其牽道其可敵也公羊傳曰夏四月公㑹紀侯于郕秋八月壬午大閱大閱者何簡車徒也大簡閱兵車使可任用而}
