  - {type: variant, offset: 2599, length: 223, content: 十五里曰封溪今有聶友所伐梓繫著䍧柯處昔聶友於此左右夜照射遇一白鹿友遂射之鹿帶箭走友即躡跡追尋不得見向箭著一梓樹友即伐樹數斧便有血出而落之梯隨復故創音瘡不可得斷友更多將手刀復伐之輦其梯而焚之樹遂斷斫以二板以還繫著渚下以樟木為䍧柯後友舡行遇風舡皆沒唯友舡獨全尋看乃向椊板夾扶其舡友大異之後友在京都此板於豫樟來至友許輒有大喜中更異梓板至輒有憂所用樟木為牂柯者遂生為樹今猶存其木合抱始到植之今枚條皆向下板門中亦述其事泝斗廣雅曰泝斗謂之以之切纂文曰杼水斗也, SBCK: ''}
