  - {type: variant, offset: 7, length: 1, content: 二, SBCK: 古者車聲如居言所以居人也今曰車車舎也行者所處􅀂居舎也又曰黄帝造車故號軒轅氏說文曰車輿輪惣名象形也軒曲周璠車也軿車輅小車也輊車也輈兵車也輊䧟陣車也輦一輪也輿車軨前横木也䡝於􅀽切大車後掩也輦大車駕馬也䡝引車轟車聲易曰大車以載積中不敗又曰賁其趾舎車而徒又曰上九􅢦􅀌見豕􅀒塗載􅀑一車書曰五載一廵狩羣后四朝敷奏以言明試以功車服以庸又曰武王戎車三}
