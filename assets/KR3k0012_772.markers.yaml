  - {type: variant, offset: 391, length: 1, content: 水, WYG: 之又曰宋公與楚子期以乗車之㑹公子目夷諫曰楚夷國也彊而無義請君以兵車之㑹往宋公曰不可吾與之約以乗車㑹自我為之自我墮之曰不可終以乗車之㑹徃楚人果伏兵車執宋公以伐宋又曰晉郤缺帥師革車八百乗以納接菑于邾婁力沛若有餘沛有餘貌又曰秋蒐于紅蒐者何簡車徒也楚衆也穀梁傳曰兵車之㑹四未嘗有大戰也愛民也以兵車㑹而不用兵伐也論語曰升車必正立執綏車中不内顧不疾言不親指大戴禮曰王升車則聞和鑾之聲是以非僻之心無自入也在衡為鑾在軾為和馬行而鸞鳴鸞鳴而和應其聲曰和則敬此御之節也上車以和鸞為節下車以珮玊為度禮斗威儀曰山車垂勾福草生宗廟中松栢為常山車者自然勾之勾者曲也不揉治而自員曲故言垂孝經援神契曰德至山陵則山出根車根車應載養萬物也家語曰孔子適衛子僑僕靈公與夫人南子同車出令宦者雍渠􅆖乗使孔子為次連逰過市孔子恥之又曰孔子曰自南宮敬叔之乗我車也而道加行又曰三尺之限空車不能登峻故天子郊乗乗車貴其質也車則有左右車而無左右則亂於車矣史記曰孝文帝出趙同􅆖乗袁盎伏車前曰臣聞天子所與共六尺輿者皆天下英豪今漢雖乏人獨奈何與刀鋸人載於是上笑下同泣而下車又曰封禪為蒲輪車惡傷土石草木又曰秦王收穰侯之印使歸陶因使縣官給車牛以從千乗有餘到關閱其寳器珍怪多於王室漢書曰田千秋年老上優之朝見得乗小車入宮殿中故因號車丞相又曰王莽造四輪車駕六馬力士}
