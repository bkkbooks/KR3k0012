  - {type: variant, offset: 600, length: 1, content: 木, SBCK: 􅀽閎二弟忠弘節操皆亞於閎忠字正甫與同郡范滂爲友俱證黨事得釋􅀄平中爲沛相乗葦車到官以清亮稱及天下亂忠弃官}
  - {type: page-break, offset: 600, content: '', id: KR3k0012_SBCK_772-9b}
  - {type: variant, offset: 600, length: 1, content: 木, WYG: 袁閎二弟忠宏節操皆亞於閎忠字正甫與同郡范滂為友俱證黨事得釋初平中為沛相乗葦車到官以清亮稱及天下亂忠棄官}
  - {type: variant, offset: 600, length: 1, content: 木, krp: 袁閎二弟忠弘節操皆亞於閎忠字正甫與同郡范滂爲友俱證黨事得釋𥘉平中爲沛相乗葦車到官以清亮稱及天下亂忠弃官}
  - {type: variant, offset: 602, length: 0, content: '', SBCK: 㑹稽上虞縣也又曰江革字次翁齊國臨菑人少失父獨與母居遭天下亂賊盗並起革􅀒母逃難備經阻險常採拾以爲養數遇賊或刧欲將去革輙涕泣求哀言有老母辭有足感動人者賊以是不忍犯之或乃指示避兵之方遂得俱全于難轉客下邳窮貧祼跣行傭以供母革以母老不欲摇動自在轅中輓車不用牛馬由是郷里稱之曰江巨孝又曰井丹字}
  - {type: variant, offset: 602, length: 9, content: 大冢者勾踐之兄弟冢, WYG: 㑹稽上虞縣}
