  - {type: variant, offset: 1449, length: 245, content: 此溪中人號為拖下溪宣穆所遣人見山湖中有敗艑而後拖流下信其不妄孫綽子曰動而不乘不理若汎舟而無拖趙壹嫉邪賦曰奚異涉海之失拖坐積薪而待燃張華遊仙詩曰遊仙迫西極弱水隔流沙雲榜鼓霧拖飃忽陵飛波纜爾雅曰汎汎楊舟紼縭維之紼索也縭緌也郭璞曰索也緌吳書曰甘寧住止常以繒錦纜舟去輒割棄以示奢笮纂文曰竹索謂之笮茅索謂之索釋名曰引舟者曰笮笮作也起舟使動作也漢鼓吹曲曰桂樹為君舡青絲為君笮木蘭為君棹黃金錯其間帆釋名曰隨風張幔曰帆帆汎者舟疾汎汎然也韻集曰颿舡張也颿音凡馬疾步也義以與帆同長沙耆舊傳曰夏隆仕郡時潘濬為南征, SBCK: 澤車}
