  - {type: variant, offset: 430, length: 168, content: 水來下出大江注浦口未即渡周瑜又夜密使輕舡走軻百艘燒椑操乃夜走吳錄曰孫策欲渡江舡少欲往便求策姑王氏分命伐蘆為樑以佐舡渡人吳錄地理志曰蒼梧高要縣郡下人避瘴氣乘筏來停此六月來十月去歲歲如此雷次宗豫章記曰望蔡縣有一石室入室十餘里得水廣數十步清深不測邊有筏竹遊者伐竹為筏過水莫能究其源出好鍾乳淮南子曰方車蹠越乘桴入朝欲無寵不可得也許填曰桴木筏越絕, SBCK: ''}
