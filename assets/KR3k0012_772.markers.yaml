  - {type: variant, offset: 83, length: 81, content: 丈上有一舟名舴艋前頭有石鼓石艇世云石鼓鳴則土地寇亂隆安初此鼓屢鳴果有孫恩賊此處多山精水祟不可輕陟山下平地便望見舴艋民王志祭山神求到鼓所遂得至捉搥打鼓閭里咸聞如金玉, SBCK: 乗以伐京又曰鄭伯}
  - {type: variant, offset: 83, length: 289, content: 丈上有一舟名舴艋前頭有石鼓石艇世云石鼓鳴則土地寇亂隆安初此鼓屢鳴果有孫恩賊此處多山精水祟不可輕陟山下平地便望見舴艋民王志祭山神求到鼓所遂得至捉搥打鼓閭里咸聞如金玉之響下山便病死蓋登山召禍擊鼓自殺也異苑曰檀道濟元嘉中鎮尋陽入朝伏誅濟未下時有人施罟於柴桑江收得大舡孔鑿若新使匠作舴艋云勿斲工人誤截兩頭檀以為不祥殺三巧手欲以塞匠違約加斲凶兆先遘矣宋元嘉起居注曰有司奏云楊州刺史王弘上會稽從事韋詣解列先風聞餘姚令何玢之造作平床一乘舴艋一艘精麗過常用功兼倍請免玢今官詔可其奏筏論語曰道不行乘桴浮于海從我者其由與子路聞之喜東觀漢記曰吳漢教乘筏從江下巴郡盜賊解散張堪為陪義長公孫述遣擊之有同心, WYG: 乗甲}
