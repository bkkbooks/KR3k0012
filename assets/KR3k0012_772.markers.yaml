  - {type: variant, offset: 389, length: 1, content: 選, krp: 脫歸又曰旣食之使御廣車而行廣車兵車巳皆乗乗車乗車安車又曰丁亥葬諸士孫之里士孫人姓因名其里四翣不􅵖下車七乗不以兵甲下車送葬之車齊舊依上公禮九乗又有甲兵今皆降損又曰六月鄭子展子産帥車七百乗伐陳霄突陳城又曰賦車籍馬賦車兵車也兵甲士也又曰大夫逆於境者逆迎也迎衛侯執其手而與之言道逆者自車揖之逆於門者領之而巳領摇其頭言衎驕心易生又曰齊慶封來聘其車羙孟孫謂叔孫曰慶季之車不亦羙乎季慶封之字叔孫曰豹聞之肥羙不稱必以惡終羙車何爲又曰獻車於季武子羙澤可以鑑展莊叔見之曰車甚澤人必瘁冝其亡也又曰王聞羣公子之死也王楚靈也自投于車下曰人之愛其子也亦如余乎侍者曰甚焉小人老而無子知擠干溝壑矣擠墜也又曰治兵于郝南甲車四千乗三十萬人又曰叔向曰寡君有甲車四千乗在雖以無道行之必可畏也况其率道其可敵之公羊傳曰夏四月公㑹紀侯于郕秋八月壬午大閲大閱者何簡車徒也大簡閲兵車使可任用而}
  - {type: variant, offset: 391, length: 1, content: 水, SBCK: 之又曰宋公與楚子期以乗車之會公子目夷諫曰楚夷國也彊而無義請君以兵車之㑹徃宋公曰不可吾與之約以乗車㑹自我爲之自我墮之曰不可終以成乗車以㑹徃楚人果伏兵車執宋公以伐宋又曰晉卻缺帥師革車八百乗以納接菑于邾婁力沛􅀂有餘沛有餘貌七􅆖乗有車右有御者又曰秋蒐于紅蒐者何簡車徒也楚衆也穀梁傳曰兵車之會四未嘗有大戰也愛民也以兵車㑹而不用兵伐也論語曰􅂛車必正立執綏車中不内顧不疾言不親指大戴禮曰王􅂛車則聞和鸞之聲是以非僻之心無自入也在衡爲鸞在軾爲和馬動而鸞鳴鸞鳴而和應其聲曰和則敬此仰之節也上車以和鸞爲節下車以珮玉爲度禮斗威儀曰山車垂勾福草生宗廟中松栢爲常山車者自然之車句者曲也不揉治而自貟曲故言垂孝經援神契曰徳至山陵則山岀根車根車應載養萬物也家語曰孔子適衛子矯僕靈公與夫人小子同車岀令䆠者雍渠􅆖乗使孔子爲次連遊過市孔子耻之又曰孔子曰自南宫敬叔之乗我車也而道加行又曰三尺之限空車不能登峻故天子郊乗乗車貴其質也車則有左右車而無左右則亂於車矣史記曰孝文帝岀趙同參乗􅀽盎伏車前曰臣聞天子所與共六尺輿者皆天下英豪今漢雖乏人獨奈何與刀鋸人載於是上􅀏下同同泣而下車又曰封禪爲蒲輸車惡傷土石草木又曰􅁗王収穰侯之印使歸陶自使縣官給車牛以從千乗有餘到􅀜閱其寳器􅈿恠多於王室漢書曰田千秋年老上令朝見得乗小車入宫殿中故目號車丞相又曰王莽造四輪車駕六馬力士}
