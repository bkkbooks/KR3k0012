  - {type: variant, offset: 385, length: 2, content: 今日, WYG: 國故子必射乃射再發盡殪叔山冉摶人以投中車折軾晉師乃止又曰狄虒彌建大車之輪而䝉之以甲以為櫓狄虒彌魯人也䝉覆也櫓大楯又曰己酉師于牛首鄭地初子駟與尉止有争將禦諸侯之師黜其車禦牛首師也黜减損遂弗使獻不使獻所獲又曰子西聞盗不儆而出子西公孫夏子駟子尸而追盗先臨尸而追盗盗入於北宮乃歸授甲臣妾多逃器用多喪子産聞盗子國子爲門者置守門戒羣司閉府庫完守備成列而後出兵車十七乗尸而攻盗於北宮子蟜帥國人助之殺尉止子師僕盗衆盡死又曰鄭人賂晉侯以師悝師觸師蠲皆樂師名廣車軘車淳十五乗甲兵備廣車軘車皆兵車名淳耦也凡兵車百乗他兵車及廣軘共百乗又曰魯人莒人皆請以車千乗自其鄉人又曰齊侯登巫山以望晉師晉人使司馬斥山澤之險雖所不至必斾而䟽陳之斥候也疏建旄旗以陳為陳氏衆也又曰使乗車者左實右偽以斾先輿曳柴而從之以揚塵齊侯見之畏其衆}
