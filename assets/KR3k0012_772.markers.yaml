  - {type: variant, offset: 381, length: 0, content: '', SBCK: 子也公曰謂之君子而射之非禮也射其左越于車下射其右斃于車中又曰綦母張喪車從韓厥曰請寓乗又曰丑父使公下如華泉取飲鄭周父御佐車宛茂爲石載齊侯以免又曰茍有險余必下推車子豈識之乎然子病矣又曰楚子登巢車以望􅀳軍巢車車上爲櫓又曰叔山冉謂}
  - {type: variant, offset: 381, length: 0, content: '', WYG: 子也公曰謂之君子而射之非禮也射其左越于車下射其右斃于車中又曰綦母張喪車從韓厥也請寓乗又曰丑父使公下如華泉取飲鄭周父御佐車宛茂為右載齊侯以免又曰苟有險余必下推車子豈識之子病矣又曰楚子登巢車以望晉軍巢車車上樓櫓又曰叔山冉謂}
