  - {type: variant, offset: 1752, length: 10, content: 寶治宅因浚池忽見一物, SBCK: 又曰利渉大川書曰予決九川距四海王肅曰九川者九州之川也又曰􅀂濟大川用汝作舟檝又曰九山刋旅九川滌源禮曰天降時雨山川出雲周禮曰楊州其川三江荆州其川江漢䂊州其川滎洛青州其川淮泗兖州其川河泲雍州其川涇汭幽州其川河濟兾州其川漳并州其川呼沲又曰兩山之間必有川焉大川之間必有途焉大戴禮曰聖人有國則川澤不竭蔡邕月令章句曰衆流注海曰川國語曰幽王二年三川皆震又曰厲王虐國人謗王邵公告王曰民不堪命矣王怒得衛巫使監謗者以告則殺之國莫敢言道路以目王喜告邵公曰吾能弭謗矣乃不敢言邵公曰是鄣之也防民之口甚於防川川壅而潰傷人必多民亦}
