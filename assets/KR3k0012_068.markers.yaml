  - {type: variant, offset: 2188, length: 303, content: 當時英彥名德庾亮溫嶠羊曼等共集青谿池上郭璞預焉乃援筆屬詩以白四賢并自序武昌記曰樊山東有山谿夏時凜凜恒有寒氣故謂之寒谿王韶之始興記曰連水下流有斟谿一日十溢十竭盛弘之荊州記曰酈縣北五十里有菊谿源出石澗山有甘菊村人食此水多壽又曰零陵郡西有九渡谿山獸從數十里往飲之經越他水皆不飲傍有半石坑上石形極方峭名為仙人樓又曰桂陽郡桂橫谿谿水甚深冬夏不乾俗謂之為貪泉也郡西南五十里有萬歲山有石室出鍾乳山上悉生靈壽木下有一谿名為千秋水其傍有居民即號萬歲村管子曰桓公北征孤竹廻未至卑耳之谿授弓而射未敢發謂左右曰見前人乎對曰不見公曰寡人見人長尺而人物具焉管仲曰臣聞霸王之君興而登山神見公拜曰仲父之聖若此俗說曰郗僧施青谿中汎舟一曲處輒, SBCK: 朕}
