  - {type: variant, offset: 3042, length: 325, content: 術三年後白龍來迎子明遂得上昇其溪環遶山足今有仙壇醮祭不絕信州圖經曰師溪水源出黃蘗山北面在弋陽縣東南一百一十里昔有隱士胡超居此眾人師之故名師溪越絕書曰薛燭對越王曰若耶之溪涸而出銅也古歐冶子鑄劍之所故戰國策云涸若耶以取銅破堇山而出錫又郡國志云歐冶子鑄劍處下有孤潭深而清有孤石聳出潭上有大櫟樹謝客兒與弟惠連作詩連句刻於樹上吳興記曰前溪在縣南東流入太湖謂之風渚夾溪悉生箭箬後溪在市北東出餘不亭晉車騎將軍沈充作前溪歌曲傳者以為指此溪也裴氏廣州記曰百管谿周廻丈餘水極沸涌如猛火煎油聲臨海圖經曰銅溪在縣西北五十里其水黃色狀似銅故號銅溪也孫興公天台山賦云過靈溪而一濯是也善歌錄曰武溪水源出武山東南流注于沅故為歌曰武溪深復深飛鳥不能渡遊獸不能臨又曰下潦上霧看飛鳥墮水中, SBCK: ''}
