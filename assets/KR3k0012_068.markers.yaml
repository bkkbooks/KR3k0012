  - {type: variant, offset: 1748, length: 2, content: 太原, SBCK: 天河從北極分爲兩頭至於南極其一經南斗中過其一經東斗中過兩河隨天轉入地下過而與下水相得又與海水合三水相蕩而天轉排之故激涌而成潮水又曰濤水者潮取物多者其力盛來逺者其􅀔大今潮水從東地廣道逺乍入狹處陵山觸岸從直赴曲其勢不泄故隆崇涌起而爲濤俗人云濤是五子胥所作妄也子胥始死耳天地開闢巳有濤水矣川說文曰川貫穿通流水也釋名曰川者穿地而流也易曰地險山川丘陵也}
  - {type: page-break, offset: 1748, content: '', id: KR3k0012_SBCK_068-6a}
  - {type: variant, offset: 1748, length: 2, content: 太原, WYG: 天河從北極分為兩頭至扵南極其一經南斗中過其一經東斗中過兩河隨天轉入地下過而與下水相得又與海水合三水相蕩而天轉排之故激涌而成潮水又曰濤水者潮取物多者其力盛來遠者其勢大今潮水從東地廣道遠乍入狹處陵山觸岸從直赴曲其勢不泄故隆崇涌起而為濤俗人云濤是伍子胥所作妄也子胥始死耳天地開闢已有濤水矣川說文曰川貫穿通流水也釋名曰川者穿地而流也易曰地險山川丘陵也}
