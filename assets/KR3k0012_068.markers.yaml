  - {type: variant, offset: 2492, length: 285, content: 一篇詩謝益壽見詩嘆曰青谿中曲復何可窮水經注曰磻溪即太公釣所也石壁深高幽泉邃密林障秀阻亦人罕交東南隅有石室蓋太公所居也水次平石即太公垂釣之處也其水清冷神異北流注于渭又曰長陽谿源石穴中有神魚大者二尺小者一尺居民釣魚先陳所須多少拜而請之拜訖投釣得魚過數者水輒波涌暴風卒起樹木催折水側生異花路人欲摘者皆當先請不得輒取又曰白馬谿水出宜陽山有大石厥狀似馬故谿澗以物色受名也又曰向城有水二源俱北流合為一川名天漿谿又曰閩中有徐登者女子化為丈夫與東陽趙昞並善越方時遭兵亂相遇於谿各矜其所能登先禁谿水為不流昞次禁枯柳為生荑二人相視而笑登年長昞師事之後登身故昞東入章安百姓未知昞乃升茅屋榰鼎而, SBCK: ''}
