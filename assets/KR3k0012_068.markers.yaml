  - {type: variant, offset: 1698, length: 2, content: 黃泉, SBCK: 則毛起潮去則復也臨海異物志曰石鷄清響以應潮慧軀輕逝以逺縶石鷄形似家鷄在海中山上每朝水將至􅂺羣鳴相應􅀂家雞之向晨也裴淵廣州記曰石洲在海中名爲黄山山北日一潮山南日再潮枹朴子曰糜氏云潮者據朝來也言夕至也一月之中天再東再西}
