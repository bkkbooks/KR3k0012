  - {type: variant, offset: 1696, length: 0, content: '', krp: 凝而爲氷迎春則釋而爲水氷㢮易乎前後又曰知一葉之落知歲將暮覩瓶中之氷而知天}
  - {type: variant, offset: 1697, length: 0, content: '', SBCK: 之寒以近諭逺也論衡曰夫燻一炬火爨一鑊水終日而不􅀬也􅀝一尺氷置庖厨中終夜而不寒也風俗通曰積氷曰凌壯氷曰凍氷流曰澌氷解曰泮魏子曰居危殆之國治不善之民是猶薄氷當白日藂毛過猛火也枹朴子曰五玉不染而堅寒氷不礱而㓪又曰蹈薄氷以待夏日登杇枝而須勁風新論曰􅀞水鏤氷與時消釋潮水􅀃文曰潮朝也從水朝風土記曰俗說鯢一名海鰌長數千里穴居海底入穴則水溢爲潮出穴則水入潮退出入有節故潮水有期祖台之志恠曰隆安中陳悝於江邊作魚䇻正匪切潮去於䇻中得一女人長六尺有容色無衣服水去不能動卧沙中與語不應人有就辱之悝夜夢云我是江黄昨失道落君䇻小人遂見加凌今當白尊神殺之悝不敢移潮來自逐水去姧者㝷病死呉越春秋曰呉賜子胥劒而死乃投之江中子胥因掦波成濤隨潮徃來􅀶物志曰東海中有牛魚其魚形如牛剥其皮懸之潮水}
  - {type: page-break, offset: 1697, content: '', id: KR3k0012_SBCK_068-5a}
  - {type: variant, offset: 1697, length: 0, content: '', WYG: 之寒以近喻遠也論衡曰夫燻一炬火爨一鑊氷終日而不熱也倚一尺氷置庖厨中終夜而不寒也風俗通曰積水曰凌壯氷曰凍水流曰澌氷解曰泮魏子曰居危殆之國治不善之民是猶薄氷當白日聚毛過猛火也抱朴子曰五玉不染而堅寒氷不礱而勁又曰蹈薄氷以待夏日登朽枝而須勁風新論曰畫水鏤氷與時消釋潮水說文曰潮朝也從水朝風土記曰俗說鯤一名海鰌長數千里穴居海底入穴則水溢為潮出穴則水入潮退出入有節潮水有期祖台之志怪曰隆安中陳悝扵江邊作魚䇻正匪切潮去扵䇻中得一女人長六尺有容色無衣服水去不能動卧沙中與語不應人有就辱之悝夜夢云我是江黄昨失道落君䇻小人遂見加凌今當白尊神殺之悝不敢移潮來自隨水去辱者尋病死吳越春秋曰吳賜子胥劒而死乃投之江中子胥因揚波成濤隨潮往來博物志曰東海中有牛魚其魚形如牛剝其皮懸之潮水}
