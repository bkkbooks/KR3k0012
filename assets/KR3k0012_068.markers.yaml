  - {type: variant, offset: 1731, length: 14, content: 夕中作比曉便成即今謂太子池是, SBCK: 萬五千里故夏潮大也冬時日居北􅀫隂盛陽消而天卑一萬五千里故冬潮小也又春日居東􅀫天髙一萬五千里故春潮漸起也秋日居西􅀫天卑一萬五千里故秋潮漸減}
