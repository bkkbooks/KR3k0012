  - {type: variant, offset: 3370, length: 124, content: 壑周易略例曰隆墀永歎遠壑必盈禮記曰大蜡之祭辭曰土反其宅水歸其壑山海經曰東海之水有大壑列子曰渤海之東不知幾億萬里有大壑實惟無底之谷曰歸塘莊子曰夫壑之為物注焉而不滿取焉而不竭又曰藏舟於壑藏山於澤謂之固矣然則夜半有力者負之而趨昧者不知孟子曰志士不志在溝壑, SBCK: 太平御覽卷第六十八}
