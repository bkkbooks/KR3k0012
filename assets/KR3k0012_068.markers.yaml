  - {type: variant, offset: 543, length: 728, content: 佳園池簡每出嬉遊多之池上置酒輒醉名之曰高陽池時有童兒歌曰山公出何許往至高陽池日夕倒載歸酩酊無所知時時能騎馬倒著白接離舉鞭向葛疆何如并州兒彊家在并州簡愛將也又曰荀勗久在中書專管機事失之甚怏怏或有賀之者勗曰奪我鳳皇池諸君何賀我耶後魏書曰文明皇太后馮氏與高祖幸靈泉池醼群臣太后忻然歌高祖亦和歌歌者九十人唐書曰蔣鎮為諫議大夫時戶部侍郎判度支韓滉上言河中鹽池生瑞鹽實土德之上瑞上以秋霖稍多水潦為患不宜生瑞命鎮馳馹檢行之鎮奏與滉同仍上表賀請宣付史館并請置神祠錫其號寶應靈慶池又曰文宗用鄭注言即命左右神策軍差人淘曲江昆明二池仍許公卿士大夫之家於江頭立亭館以時追賞遁甲開山圖榮氏解曰降北有陽石山中有神龍池黃帝時遣雲陽先生養龍於此帝王歷代養龍之處國有水旱不時祀池請雨晉宮閣名曰靈芝池廣長百五十步深二丈上有連樓飛觀四出閣道釣臺中有鳴鶴舟指南舟袁山松宜都記曰佷山縣東六十里有山名下魚城四面絕崖唯兩道可上皆峻嶮山上周廻可二十里有林池水民田種於山上昔永嘉亂土人登此避賊賊守之經年食盡取池魚擲下與之示不窮賊遂退散因名此為下魚城辛氏三秦記曰昆明池通白鹿原人釣魚綸絕而去夢於漢武求去其鉤明日戲於池見大魚御鉤帝去其鉤而放之間三日帝復遊池濱得明珠一雙武帝曰豈昔魚之報也湘州記曰湘南縣有架山下有小池常涸竭民齋戒往請自然而滿事訖還乾雷次宗豫章記曰去洪井六七里有風雨池山嶠水出激著樹木星散遠灑如風雨焉襄陽記曰峴山南有習郁太魚池依范蠡養魚法當中築一釣臺將亡勑其兒曰必葬我近魚池山季倫每臨此輒大醉而歸臨川記曰崇仁縣有鹹池桉陳書司空黃法𣰋音翟字仲昭崇仁縣巴山人也侯景亂法𣰋於卿里聚徒以助高祖有功薨墓在崇仁縣巴山卿故老相傳法𣰋有奇術常欲變置鹽池於家山之下愊員六十餘畝至今水味獨鹹於他水而湛然清澈禽畜不敢觸之, SBCK: 火}
