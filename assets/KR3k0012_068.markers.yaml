  - {type: variant, offset: 100, length: 3, content: 國方城, SBCK: 子使醫視之復曰病則甚矣而血氣未動又曰春無氷梓愼曰今兹宋鄭其饑乎隂不勝陽也又曰日在北陸而藏氷西陸朝覿而出之其藏氷也深山窮谷固隂沍寒於是乎取之其出之也朝之禄位賔食喪􅀕於是乎用之其藏之也黒牡秬􅁰}
  - {type: variant, offset: 100, length: 3, content: 國方城, WYG: 子使醫視之復曰病則甚矣而血氣未動又曰春無氷梓愼曰今兹宋鄭其饑乎隂不勝陽也又曰日在北陸而藏氷西陸朝覿而出之其藏氷也深山窮谷凅隂沍寒扵是乎取之其出之也朝之祿位賓食喪祭扵是乎用之其藏之也黑牡秬黍以享司寒其出之也桃弧棘矢以除其災祭司寒而藏之獻羔而啓之火出而畢賦自命夫命婦至於老疾無不受氷帑人取之縣人傳之輿人納之𨽻人藏之夫氷以風壯而以風出其藏之也周其用之也徧則冬無愆陽夏無伏隂春無淒風秋無苦雨人不夭札孝經援神契曰髙山之巔無樹深海之淵無氷剛太燥温太柔也家語曰霜降而婦功成娶者行季秋霜降氷泮而農事起婚禮殺史記曰姜嫄為帝嚳元妃出野見巨人跡悅欲踐之踐而身動如孕者居期而生子}
