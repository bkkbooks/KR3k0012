  - {type: variant, offset: 10, length: 0, content: '', WYG: 𫝊曰周豐魯人也潜居自貴哀公執贄請見之豐辭使人問曰有虞氏未施信於民而民信夏后氏未施敬於民而民敬何施而得此於民也對曰墟墓之間未施哀於民而民哀宗廟社稷中未施敬於民而民敬殷人作誓而民始叛周人作㑹而民始疑苟無禮義忠信誠慤之心以蒞之雖固結之民其不可解乎又曰顔歜者齊人也宣王見之王曰歜前歜曰王前王不恱歜曰夫歜前為慕勢王前為趨士王作色曰士貴乎歜曰昔秦攻齊令曰敢近栁下惠壟樵者罪死不赦有能得齊王頭者封萬户由是觀之生王之頭不如死士之壟齊王曰願先生與寡人遊食太牢乗}
