  - {type: variant, offset: 30, length: 2, content: 百錢, krp: 斯於民也對曰墟墓之間未施哀於民而民哀宗廟社稷之中未施敬於民而民敬殷人作誓而民始叛周人作㑹而民始疑苟無禮義忠信誠慤之心以蒞之雖固乗結之民其兩不解乎又曰顔歜者齊人也宣王見之王曰歜前歜曰王前王不恱歜曰夫歜前爲慕勢王前爲趍士王作色曰貴乎歜曰昔秦攻齊令曰敢近栁下惠壟樵者罪死不赦有能得齊王頭者封萬户由是觀之生王之頭不如死士之壟齊王曰願先生與寡人遊食太牢乗安車歜曰願得𬞞食以當肉安歩以當輿無事以當貴清浄}
  - {type: variant, offset: 34, length: 84, content: 給卜訖則閉肆下簾以著書為事揚雄少從之遊數稱其德李強為益州牧喜曰吾得君平為從事足矣雄曰君可備禮與相見其人不可屈也王鳳請交不許歎曰益我貨者損我神生我名者殺我身故不仕時人服之, SBCK: 娯遂辭而去}
