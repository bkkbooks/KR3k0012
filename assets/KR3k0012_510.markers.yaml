  - {type: variant, offset: 1668, length: 6, content: 披裘帶索鼓琴, SBCK: 隱居􅀑谷山因以爲稱􅂫􅁗張儀師之遂立功名先生遺書勉之曰二君豈不見河邊之樹乎僕御折其枝風浪盪其根此木豈與天地有仇怨所居然也子見嵩岱之松柘乎上枝干於青雲下根通於三泉千秋萬􅀊不逢斧斤之患此木豈與天地有骨肉所居然也又曰鄭長者隱德無名著書一篇言道家事韓非稱之丗傳是長者之辭因以爲名又曰南公者楚人埋名藏用丗莫能識居國南鄙因以爲號著書言隂陽事又曰野老六國時人遊􅁗楚間年老隱居掌勸爲務著書言農家事因以爲号又曰鶡冠子或曰楚人隱居幽山衣弊履穿以鶡爲冠莫測其名因服成號著書言道家事馬煖常師事之煖後顯於趙鶡冠子懼其薦巳也乃與煖絶又曰楚人有獻魚于楚王曰今日漁獲食之不盡賣之不售弃之又可惜是故來獻左右曰鄙哉辭也楚王曰漁者仁人將以誨我也乃恤鰥寡}
  - {type: page-break, offset: 1668, content: '', id: KR3k0012_SBCK_510-5a}
  - {type: variant, offset: 1668, length: 6, content: 披裘帶索鼓琴, WYG: 隐居鬼谷山因以為稱蘓秦張儀師之遂立功名先生遺書勉之曰二君豈不見河邉之樹乎僕御折其枝風浪盪其根此木豈與天地有仇怨所居然也子見嵩岱之松栢乎上枝干於青雲下根通於三泉千秋萬嵗不逢斧斤之患此木豈與天地有骨肉所居然也又曰鄭長者隐徳無名著書一篇言道家事韓非稱之世𫝊是長者之辭因以為名又曰南公為楚人埋名藏用世莫能識居國南鄙因以為號著書言隂陽事又曰野老六國時人遊秦楚間年老隐居掌勸為務著書言農家事因以為號又曰鶡冠子或曰楚人隐居幽山衣弊履穿以鶡為冠莫測其名因服成號著書言道家事馬援常師事之援後顯於趙鶡冠子懼其薦已也乃與援絶又曰楚人有獻魚于楚王曰今日漁獲食之不盡賣之不售棄之又可惜是故來獻左右曰鄙哉辭也楚王曰漁者仁人將以誨我也乃恤鰥寡}
