  - {type: variant, offset: 285, length: 544, content: 羊春秋三正曆九章筭術周官禮記左氏春秋大將軍何進辟玄州郡迫脅不得已而詣進設机杖之禮以待玄玄以幅巾見進一宿而逃去公府前後十餘辟並不就又曰任安字定祖少好學隱山不營名利時人號安曰任孔子連辟不就建安中讀史記魯連傳歎曰性以潔白為治情以得志為樂性治情得體道而不憂彼棄我取與時而無爭遂終身不仕號曰任徵君又曰管甯字幼安靈帝末以中國方亂乃與其友邴原涉海依遼東太守公孫度度虛館禮之其後中國少安人多南歸唯甯不遝黃初中華歆薦寧寧知公孫淵必亂乃因徵辭還以為太中大夫固辭不就甯凡徵命十至輿服四賜常坐一木榻上積五十年未嘗箕琚榻上當膝皆穿常著布裙貉裘唯祠先人乃著舊布單衣加首絮巾遼東郡圖其形於府殿號為賢者又曰胡昭字孔明棄妻子不應袁紹之命武帝亦辟昭昭自陳本志帝曰人各有志出處不同勉卒高尚義不相屈昭乃隱陸渾山中又曰焦先字孝然世莫知其所出或言生漢末及魏受禪常結草為廬於河之湄獨止其中冬夏袒不著衣臥不設席又無草蓐以身親土其體垢汙皆如泥滓不行人間或數日一食行不由邪徑目不與女子迕視口未嘗言雖有驚急不與人語後野火燒其廬先因露寢遭冬雪大至先袒臥不移人以為死就視如故後百餘歲卒嵇康高士傅曰子州友父者堯舜各以天下讓友父友父曰我適有勞憂之病方治之未暇在天下也又曰石戶之農不知何許人與舜為友舜以天下讓之石戶夫負妻戴攜子以入海終身不反又曰伯成子高, SBCK: ''}
