  - {type: variant, offset: 1675, length: 1, content: 歌, SBCK: 存􅀌獨出倉粟發幣帛去後宫楚國大治又曰河上丈人家貧編蕭自給其子􅃿泉得千金之珠丈人曰取石來鍜之夫千金之珠必在九重之泉驪龍頷下子能得其珠者遇其睡也使龍而寤子其韲粉矣又曰孫叔敖遇狐丘先生曰僕聞人有三利必有三患子知之乎夫爵髙者人妬之官大者主惡之禄厚者怨處之叔敖曰不然吾爵髙而志益下官大而志益小禄厚而施益溥丈人曰善哉言乎堯舜其猶病諸又見列子又曰客有候孔子者顔淵問曰客何人也}
