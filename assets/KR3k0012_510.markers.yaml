  - {type: variant, offset: 30, length: 2, content: 百錢, SBCK: 斯於民也對曰墟墓之間未施哀於民而民哀宗廟社稷之中未施敬於民而民敬殷人作誓而民始叛周人作㑹而民始疑苟無禮義忠信誠慤之心以蒞之雖固乗結之民其兩不解乎又曰顔歜者齊人也宣王見之王曰歜前歜曰王前王不恱歜曰夫歜前爲慕勢王前爲趍士王作色曰貴乎歜曰昔􅁗攻齊令曰敢近栁下惠壟樵者罪死不赦有能得齊王頭者封萬户由是觀之生王之頭不如死士之壟齊王曰願先生與寡人遊食太牢乗安車歜曰願得􅂼食以當肉安歩以當輿無事以當貴清浄}
