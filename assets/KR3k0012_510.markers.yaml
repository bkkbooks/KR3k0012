  - {type: variant, offset: 1781, length: 414, content: 執輿者為誰子路曰是孔子是魯孔丘歟曰是也曰是知津矣問於桀溺桀溺曰子為誰曰仲由孔丘之徒歟對曰然曰與其從避人之士豈若從避世之士哉耰而不輟子路以告孔子孔子憮然曰鳥獸不可與同群吾非斯人之徒歟又曰荷篠丈人不知何許人也子路從而後問曰子見夫子乎丈人曰四體不勤五穀不分孰為夫子植其杖而耘子路行以告子曰隱者也使子路反見之至則行矣又曰顏闔者魯人也魯君聞其賢以幣聘焉闔方服布衣自飲牛使者問曰此顏闔家耶曰然使者致幣闔曰恐聽誤而遺使者羞使者至復來求之闔乃鑿坯而遁又曰市南宜僚楚人也姓熊白公為亂使石乞告之不從承之以劍而遼弄丸不輟魯侯問曰吾學先王之道勤而行之然不免於憂患何也僚曰君今能刳形洒心而遊無人之野則無憂矣又曰太公任者陳人孔子圍陳七日不火食太公往吊之曰子幾死乎夫直木先伐甘井先竭子其飾智以警愚修身以明汙昭昭如揭日月而行故汝不免於患也孰能削跡捐勢不為功名者哉無責於人人亦無責焉孔子曰善辭其交遊巡於大澤入獸不亂群而況人也又曰漢陰丈人者楚人也子貢適楚見丈人為圃, SBCK: 􅀒􅇲}
