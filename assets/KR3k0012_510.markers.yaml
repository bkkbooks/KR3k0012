  - {type: variant, offset: 2216, length: 0, content: '', SBCK: 命曰槁終日灌韭百區不倦衛丈夫曰吾師言有機智之心我非不知不欲爲也雜記事曰徐稚忽榮禄陳蕃欽其髙行以禮招請署爲功曹及師友􅀕酒又特爲設東面之坐重席佩巾几以􅀱之稚辭疾不到王僧䖍呉地記曰處士陸著字文伯漢桓靈之間州府交辟並不就唯事棲遁臨卒誡諸子弟云吾少未嘗官勿苟仕濁丗子弟遵訓遂二代不仕並有盛}
