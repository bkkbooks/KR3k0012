  - {type: variant, offset: 1273, length: 0, content: '', SBCK: 司馬季主者楚人也卜於長安漢文帝時宋忠賈􅁩爲太中大夫􅁩曰吾聞聖人不居朝廷必在巫毉試觀卜數中見季主閑坐弟子侍而論隂陽之紀二人曰觀}
  - {type: page-break, offset: 1273, content: '', id: KR3k0012_SBCK_510-2a}
  - {type: variant, offset: 1273, length: 0, content: '', WYG: 司馬季主者楚人也卜於長安漢文帝時宋忠賈誼為大中大夫誼曰吾聞聖人不居朝廷必在巫醫試觀卜肆中見季主閒坐弟子侍而論隂陽之紀二人曰觀}
  - {type: variant, offset: 1273, length: 0, content: '', krp: 司馬季主者楚人也卜於長安漢文帝時宋忠賈誼爲太中大夫誼曰吾聞聖人不居朝廷必在巫毉試觀卜數中見季主閑坐弟子侍而論隂陽之紀二人曰觀}
  - {type: variant, offset: 1275, length: 0, content: '', SBCK: 之􅃺聽先生之辭丗未嘗見也尊官髙位賢者所處何業之卑何行之汙季主􅀏曰觀大夫􅀋有道術何言之陋夫相引以􅀔相導以利所謂賢者乃可爲羞耳夫内}
  - {type: variant, offset: 1275, length: 0, content: '', WYG: 之状聴先生之辭世未嘗見也尊官髙位賢者所處何業之卑何行之汚季主笑曰觀大夫類有道術何言之陋夫相引以勢相導以利所謂賢者乃可為羞耳夫内}
  - {type: page-break, offset: 1275, content: '', id: KR3k0012_WYG_510-3a, image: WYG0897/WYG0897-0565c.png}
  - {type: variant, offset: 1275, length: 0, content: '', krp: 之狀聽先生之辭丗未嘗見也尊官髙位賢者所處何業之卑何行之汙季主笑曰觀大夫類有道術何言之陋夫相引以勢相導以利所謂賢者乃可爲羞耳夫内}
  - {type: variant, offset: 1276, length: 5, content: 遺教以告弟, SBCK: 飢寒之累外無刼奪之憂處上而有敬居下而無害君}
  - {type: variant, offset: 1276, length: 1, content: 遺, WYG: 饑寒之累外無刼奪之憂處上而有敬居下而無害君子道也卜之為業所謂上徳也鳯凰不與燕雀為羣公等喁喁何知長者二人忽忽不覺自失後不知季主所在史記又載又曰班嗣樓煩人也世在京師家有賜書内足於財好老荘之道不屑榮官恒居山從禇莊子}
