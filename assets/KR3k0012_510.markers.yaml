  - {type: variant, offset: 1372, length: 0, content: '', SBCK: 而立之子􅆇辭曰前志有之聖逹節次守節下失節爲君非吾節也遂亡命奔宋晉侯請子臧反國而歸成公子臧以國致成公爲君見左傳又曰周黨字伯况整身清約非法不行建武中徴爲義郎以病去詔曰昔夷齊不食周粟太原周黨不食朕禄後終隱居娯志不營於丗虞般佑髙士傳曰皇甫士安少執冲素以耕稼爲業專心好學毎改服以行兼日而食得風痺或多勸修名士安荅曰居畎畒之中亦可以樂堯舜之道何必崇􅀔利而後名乎詔以爲太子中庻子著作郎並不應也又曰朱冲字巨容南安人少有德行閑静寡欲好學而貧隣牛犯種擔蒭送牛牛主人}
  - {type: page-break, offset: 1372, content: '', id: KR3k0012_SBCK_510-3b}
