  - {type: variant, offset: 1382, length: 5, content: 老子西遊喜, SBCK: 近代所崇事可行也朝竟不就後卒於家王隱晉書亦同也又曰郭文舉河内軹縣人年十三有懷隱志毎行山林旬日忘歸父母喪終辭家不娶入陸渾嵩山少室乃隱華隂之崖以觀石室之石函洛下將没歩擔入呉興餘杭大辟山窮谷無人之地􅀝木於樹苫覆其上亦無壁鄣時多虎􅁀而文獨􅀫積十餘年恒着鹿皮裘葛巾司徒王公迎置果園中衆人問文曰飢而思食壯而思室自然之性}
  - {type: page-break, offset: 1382, content: '', id: KR3k0012_SBCK_510-4a}
  - {type: variant, offset: 1382, length: 2, content: 老子, WYG: 近代所崇事可行也朝竟不就後卒于家王隠晉書亦同也又曰郭文舉河内軹縣人年十三有懐隠志每行山林旬日忘歸父母喪終辭家不娶入陸渾嵩山少室乃隠華隂之崖以觀石室之石函步擔入吳興餘杭山中窮谷之地倚木於樹苫覆其上亦無壁障時多暴虎而文獨宿積十餘年恒著鹿皮裘葛巾司徒王公迎置}
