  - {type: variant, offset: 1388, length: 0, content: '', SBCK: 生安獨無情乎文曰情由意生意息則無情又問先生獨處窮山􅀂疾病遭命終則爲烏鳥所食頋不酷乎文曰藏埋者亦爲螻蟻所食復何異哉又曰狼虎害人先生獨不畏乎文曰人無害獸之心獸亦不害人耳居園七年逃歸餘杭􅀽淑真隱傳曰􅂫門先生嘗行}
