  - {type: variant, offset: 940, length: 322, content: 卞隨務光者不知何許人湯將伐桀因卞隨而謀曰非吾事也湯遂伐桀以天下讓隨隨曰后之伐桀謀於我必以我為賊也而又讓我必以我為貪也吾不忍聞乃自投桐水又讓務光光曰廢上非義殺民非仁無道之世不踐其土況於尊我哉乃抱石而沉廬水又曰小臣稷者齊人抗厲希古桓公三往而不得見公曰吾聞士不輕爵祿無以易萬乘之主萬乘之主不好仁義無以下布衣之士於是五往乃得見焉又曰亥唐晉人也高恪寡素晉國憚之雖蔬食菜羹平公每為之欣飽公與亥唐坐有間亥唐出叔向入平公伸一足曰吾向時與亥子坐腓痛足痺不敢伸叔向悖然作色不悅公曰欲貴乎吾爵子子欲富乎吾祿子夫亥先生乃無欲也吾非正坐無以養之子何不悅哉又曰涓子齊人餌木接食甚精至三百年後釣於河澤得鯉魚中符後隱於宕石山能致風雨告伯陽九仙法淮南王少得其文不能解其旨又曰商容, SBCK: 鄭仲虞}
