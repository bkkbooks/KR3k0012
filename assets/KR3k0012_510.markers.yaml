  - {type: variant, offset: 1367, length: 4, content: 關令尹喜, SBCK: 蔣詡字元卿杜陵人爲兖州刺史王莽爲宰衡詡奏事到㶚上稱病不進歸杜陵荆􅁄塞門舎中三徑終身不出時人諺曰楚國二龔不如杜陵蔣翁又曰王眞字叔平杜陵人李邵公上郡人眞世二千石王莽辟不至嘗爲杜陵門下􅁺終身不窺長安城但閉門讀書未嘗問政不過農田之事邵公王莽時避地河西違武中竇融欲薦之固辭乃止家累百金優遊自樂又曰薛方齊人飬德不仕王莽安居迎方因謝曰堯舜在上下有巢許今明王方欲隆唐虞之德亦由小臣欲守箕山之志莽恱其言遂終于家又曰龔勝楚人王莽時遣使徴聘義不事二姓遂不食而死有老父來吊甚哀旣而曰嗟乎薫以香自燒膏以明自消龔先生竟夭天年非吾徒也趍而出終莫知其誰也張顯逸民傳曰曹子臧者曹宣公之子也宣公卒負芻殺太子留而自立是爲曹成公其後晉執成公將見子臧於}
  - {type: page-break, offset: 1367, content: '', id: KR3k0012_SBCK_510-3a}
  - {type: variant, offset: 1367, length: 4, content: 關令尹喜, WYG: 蔣詡字元卿杜陵人為兖州刺史王莽為宰衡詡奏事到霸上稱病不進歸杜陵荆棘塞門舎中三徑終身不出時人諺曰楚國二龔不如杜陵蔣翁又曰逢貞字叔平杜陵人李邵公上郡人貞世二千石王莽辟不至嘗為杜陵門下掾終身不窺長安門但閉門讀書未嘗問政不過農田之事邵公王莽時辟地河西建武中竇融欲薦之面辭乃止家累百金優游自樂又曰薛方齊人養徳不仕王莽安車迎方因謝曰堯舜在上下有巢許今明王方欲隆唐虞之徳亦猶小臣欲守箕山之志莽說其言遂終於家又曰龔勝楚人王莽時遣使徴聘義不事二姓遂不食而死有父老來弔甚哀既而曰嗟乎薰以香自燒膏以明自消龔先生竟夭天年非吾徒也趍而出終莫知其誰也張顯逸民傳曰曹子臧者曹宣公之子也宣公卒負芻殺太子留而自立是為曹成公其後晉執成公將見子臧於}
