  - {type: variant, offset: 2552, length: 5, content: 諱雄始祖第, SBCK: 戯於池見大魚􅋦索帝曰豈非昔時所夢也取而去其鈎放之􅀶物志曰靈帝時遼西太守黄翻上言海邊有流屍露冠綘衣感翻夢曰我伯夷弟􅀌竹君也求見掩藏吏民有嗤者皆死虞翻別傳曰翻注易奏上曰臣都吏陳挑夢臣與道士相遇放髮􅀍鹿裘布易六爻燒其}
