  - {type: variant, offset: 1725, length: 221, content: 第七子也小字七符初梁武夢眇目僧執香鑪稱託生王宮既而采女石氏侍始褰戶幔有風廻裙梁武帝意感幸之采女夢月墮懷中遂孕孝元載誕之夕舉室光明室中有非常香氣及紫胞之異梁書曰江淹少夢見人授之五色筆因而有文章後十餘年忽夢一丈夫自稱郭璞謂淹曰前借君筆可相還淹夢中探懷中筆自此後不復有文章時稱淹才盡又曰鄭灼少事皇侃灼性精勤尤明三禮少時嘗夢皇侃謂曰鄭郎開口侃因唾灼口中自後義理益進又曰何點少時嘗患渴經歲不愈後在吳中石佛寺僧建講晝寢夢一道人形貌非常授丸一掬夢中服之而差, SBCK: 以爲南青州刺史}
