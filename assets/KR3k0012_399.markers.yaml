  - {type: variant, offset: 9, length: 0, content: '', WYG: 射其右斃於車中又昭二曰鄭子產聘於晉晋侯有疾韓宣子曰寡君寢疾於今三月矣並走羣望有加而無瘳今夢黄熊入於寢門其何厲鬼也對曰以君之明子為大政其何厲之有昔堯殛鯀于羽山其神化為黄熊以入於羽實為夏郊三代祀之晉為盟主其或者未之祀乎韓子祀夏郊晉侯有間間差也又昭二曰鑄刑書之嵗二月或夢伯有介而行介甲也曰壬子余將殺𢃄也明年壬寅余又將殺段也及壬子駟𢃄卒國人益懼齊燕平之月壬寅公孫段卒國人愈懼又昭四曰晋荀吳帥師滅陸渾韓宣子夢文公携荀吳而授之陸渾宣子韓起文公晉文公荀吴中行穆子也故使穆子帥師獻俘於文宫欲以應夢又昭二曰十二月辛亥朔日有食之是夜也趙簡子夢童子臝而轉以歌轉宛轉也且占諸史墨子曰吾夢如是簡子夢適與日蝕㑹謂咎在已故問之也對曰六年及此月也吳其入郢乎終亦弗克漢書曰孝文帝嘗夢欲上天不能進有一黄頭郎推之上天顧見其衣後穿覺而之漸臺見郎鄧通衣後穿即夢中所見也因而寵之又曰衛太子為江充所譛敗乆之田千秋上急變訟太子寃曰子弄父兵罪當笞天子之子過誤殺人當何罪哉臣嘗夢見一白頭翁教臣言是時上頗知太子惶恐無他意乃大感寤召見千秋謂曰父子之間人所難言也公獨明其不然此高廟神靈使公教我公當遂為吾輔佐立拜千秋為大鴻臚又曰韋元成為丞相言孝文太后寢園宜如禮勿復修奏可後嵗餘上寢疾夢祖宗譴罷郡國廟上少弟楚孝王亦夢焉上召問匡衡議欲復之衡深言不可}
