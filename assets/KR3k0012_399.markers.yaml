  - {type: variant, offset: 1330, length: 207, content: 娠而生帝也後周書曰柳霞幼而爽邁其世父慶遠特器異之謂霞曰吾昔逮事伯父太尉公嘗語吾云我作一夢夢汝登一樓甚峻麗吾以坐席與汝汝後名官必達恨吾不及見耳吾向聊復晝寢又夢將昔坐席還以賜汝汝之官位當復及吾特宜勉勵以應嘉祥也又曰高琳字秀琳其先高麗人母嘗祓禊泗濱臥遇見一石光彩朗潤遂持歸是夜夢見一人衣冠若仙者謂曰夫人向所持來石是浮磬之精耳君受之必生令子母驚寤舉身流汗俄而有娠及生琳因以名字焉及長有大度智略從文帝累有戰功位至開府儀同三司, SBCK: 徃荆州}
