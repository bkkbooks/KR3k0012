  - {type: variant, offset: 2550, length: 0, content: '', krp: 文王晝卧夢人登城而呼巳曰我東北陬之腐骨也速以人君葬我文王曰諾覺召吏使視之信有焉文王曰速以人君葬之吏曰此無主請以大夫禮王曰吾夢中已許之矣奈何背之也桓譚新論曰楊子雲亦言成帝時上甘泉召使作賦子雲爲之卒暴倦卧夢其五藏岀在地以手収内及覺大少氣病一歳卒丗說曰王東亭嘗夢人以大筆與之管如掾子大旣覺語人云他日當有大手筆事少日烈宗晏駕哀䇿謚議王所作辛氏三秦記曰昆明池漢}
  - {type: variant, offset: 2551, length: 0, content: '', SBCK: 停舡立之習水戰也中有靈沼神池云堯時治水訖停舡池通白鹿源人釣魚於此綸絕而去夢於漢武求去其鈎明日}
  - {type: variant, offset: 2551, length: 0, content: '', WYG: 停船立之習水戰也中有靈沼神池云堯時治水訖停船池通白鹿源人釣魚於此綸絶而去夢於漢武求去其鈎明日}
