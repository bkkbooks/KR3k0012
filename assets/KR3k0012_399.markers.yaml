  - {type: variant, offset: 992, length: 6, content: 桓溫以為江左, SBCK: 又曰裴安祖閑居養志不岀城邑曽行值天􅀬舎於樹下有鷙鳥逐雉雉急投}
  - {type: page-break, offset: 992, content: '', id: KR3k0012_SBCK_399-4a}
  - {type: variant, offset: 992, length: 2, content: 桓溫, WYG: 又曰裴安祖閑居飬志不出城邑曾行值天熱舍於樹下有鷙鳥逐雉雉急投之遂觸樹而死安祖愍之乃取置隂地徐徐視良乆得蘇安祖喜而放之後夜夢一丈夫衣冠甚偉着曲領向安祖再拜安祖怪而問之此人云感君前日見放來謝徳聞者異焉北齊書曰張亮字伯徳西河隰城人也拜大中大夫薛淑常夢於山上挂􅁝以告亮且占之曰山上絲幽字也君其為幽州乎數月出為幽州刺史又曰蘓穎為凉州刺史穎前妻鄧氏亡後十年夢見向頴拜曰新婦今被處分高崇妻故來辭别頴見崇言之崇數日而卒梁書曰吉士瞻少時夢得一積鹿皮而數之有十一領及覺喜曰鹿者禄也吾當居十一禄乎自其後仕進所莅者九及除二郡心惡之遇疾不肯療普通七年卒於郡梁後畧曰初賀革之往江陵也意甚不悅過别御史中丞江革以情告之答曰吾嘗夢主上徧見諸子唯至湘東王所手脫㡌以與之此人後必當璧卿其行乎革因頷之遂往荆州三國典畧曰江陵平梁御史中丞沈炯遷長安太祖授儀同三司甚禮待之炯恐太祖愛其人才恒閉門却掃無所交遊時有文章隨即毁棄不令流布嘗獨行經漢武通天臺為表奏之陳已思歸之意奏訖其夜炯夢見有宫禁之所兵衛甚嚴炯便以情事陳訴聞有人言甚不惜放卿幾日可至若一月内見關出此恐不復由我寤而異之當時}
