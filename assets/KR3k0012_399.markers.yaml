  - {type: variant, offset: 6, length: 1, content: 吉, WYG: 十七而終武王九十三而終左傳僖公下曰楚子玉自為瓊弁玉纓未之服也先戰}
  - {type: variant, offset: 6, length: 1, content: 吉, krp: 十七而終武王九十三而終左傳僖公下曰楚子玉自爲瓊弁玉纓未之服也先戰}
  - {type: variant, offset: 8, length: 0, content: '', SBCK: 河神謂巳曰􅂌余余賜汝孟諸之麋又成公上曰鞍之戰晉韓厥夢子與厥父謂巳曰避左右故中御而從齊侯邴夏曰射其御者君子也公曰謂之君子而射之非禮也射其左越于車}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 河神謂已曰畀余余賜汝孟諸之麋又成公上曰鞍之戰晉韓厥夢子輿厥父謂已曰避左右故中御而從齊侯邴夏曰射其御者君子也公曰謂之君子而射之非禮也射其左越於車}
  - {type: variant, offset: 8, length: 0, content: '', krp: 河神謂巳曰卑余余賜汝孟諸之麋又成公上曰鞍之戰晉韓厥夢子與厥父謂巳曰避左右故中御而從齊侯邴夏曰射其御者君子也公曰謂之君子而射之非禮也射其左越于車}
