  - {type: variant, offset: 539, length: 436, content: 乘龍上天顧不見尾覺而異之孫皓廢休立七年薨孫皓悉誅其子又曰吳主孫權潘夫人會稽句章人得幸有身夢有似龍頭授己者己以蔽膝授之遂生孫亮王隱晉書曰陶侃字士衡鄱陽人少漁於雷澤夢背上生八翅飛入天門見門非常欲入不敢而下侃後都督八州諸軍事又曰陶侃為廣州夢有司馬與侃鎧者長史陳協以為司馬者國姓也鎧者捍禦之器節下當進位泰興二年侃加平南將軍又曰鄧殷為淮南太守夢行水邊見一女子虎在後來盪斷鞶囊占者以為水邊有女汝字也斷鞶囊者新虎頭代故虎頭也不作汝陰當汝南也果遷汝陰續晉陽春秋曰李太后在會稽王宮夢兩龍枕膝日月入懷其後果以相者之言見幸太宗凡生烈宗會稽王道子及鄱陽公主焉王韶之晉安帝紀曰劉敬宣在齊夢丸土吞之而於夢中占者荅曰此服土吞也既覺喜曰丸者桓也桓既吞矣我當復本土旬日中間玄敗遂得歸陸機晉書武紀曰王濬之在巴郡也夢懸四刀於其上甚惡之濬主簿李毅拜賀曰夫三刀為州而見四為益一也明府其臨益州乎後果為益州刺史晉書曰羅含字君章襄陽人少時夢五色鳥入懷遂取吞之含覺胸中如吞物意謂不吉乃告叔母朱氏朱氏曰此鳥有文章汝當善文章矣, WYG: ''}
