  body:
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 四十應夢禮記文王丗子曰文王謂武王曰汝何夢矣武王對曰夢帝與我九齡帝天也文王曰汝以爲何也武王曰西方有九國君王其終撫諸文王曰非也古者謂年爲齡齒亦齡也我百爾九十吾與爾}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 四十應夢禮記文王世子曰文王謂武王曰汝何夢矣武王曰夢帝與我九齡帝天也文王曰汝以為何也武王曰西方有九國君王其終撫諸文王曰非也古者謂年為齡齒亦齡也我百爾九十吾與爾}
