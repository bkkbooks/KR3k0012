  - {type: variant, offset: 2550, length: 0, content: '', SBCK: 文王晝卧夢人登城而呼巳曰我東北陬之腐骨也速以人君葬我文王曰諾覺召吏使視之信有焉文王曰速以人君葬之吏曰此無主請以大夫禮王曰吾夢中已許之矣奈何背之也桓譚新論曰楊子雲亦言成帝時上甘泉召使作賦子雲爲之卒暴倦卧夢其五藏岀在地以手収内及覺大少氣病一歳卒丗􅀃曰王東亭嘗夢人以大筆與之管如􅁺子大旣􅁴語人云他日當有大手筆事少日烈宗晏駕哀䇿謚議王所作辛氏三􅁗記曰昆明池漢}
  - {type: page-break, offset: 2550, content: '', id: KR3k0012_SBCK_399-6b}
  - {type: variant, offset: 2550, length: 0, content: '', WYG: 文王晝卧夢人登城而呼已曰我東北陬之腐骨也速以人君𦵏我文王曰諾覺召吏使視之信有焉文王曰速以人君𦵏之吏曰此無主請以大夫禮王曰吾夢中已許之矣奈何背之也桓譚新論曰揚子雲亦言成帝時上甘泉召使作賦子雲為之卒暴倦卧夢其五藏出在地以手收内及覺大少氣病一嵗卒世說曰王東亭嘗夢人以大筆與之管如椽子大既覺語人云他日當有大手筆事少日烈宗晏駕哀䇿諡議王所作辛氏三秦記曰昆明池漢}
