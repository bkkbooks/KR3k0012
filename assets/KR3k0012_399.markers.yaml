  - {type: variant, offset: 2822, length: 126, content: 原郭登之字仲靖義熙初諸葛長民欲取為諮議登之不樂後為南康太守盧循之反長民以其無先過也將加大辟夢一神人以烏角如意與雖是寤寐中殊自指約既覺在其側可長尺餘形制甚陋郭遂得無他屢經顯官後徙入關齎以自隨插著步差中忽失所在幽明錄曰謝安石當桓溫之世恒懼不全夜忽夢乘桓舉行, SBCK: 平御覽卷第三百九}
