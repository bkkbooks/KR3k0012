  - {type: 'tls:seg', offset: 9, content: '', id: KR3k0012_CHANT_399-1a.3}
  - {type: punctuation, offset: 9, content: 《, id: KR3k0012_CHANT_399-bkkpn1}
  - {type: variant, offset: 9, length: 0, content: '', SBCK: 射其右斃于車中又昭二曰鄭子産聘于晉晉侯有疾韓宣子曰寡君寢疾於今三月矣並走羣望有加而無􅪜今夢黄熊入於寢門其何厲􅀑也對曰以君之明子爲大政其何厲之有昔堯殛鯀于羽山其神化爲黄熊以入于羽淵實爲夏郊三代祀之晉爲盟主其或者未之祀乎韓子祀夏郊晉侯有間間愈也又昭二曰鑄刑書之歳二月或夢伯有介而行介甲也曰壬子餘殺帶也明年壬寅餘又將殺叚也及壬子駟帶卒國人益懼齊燕平之月壬寅公孫叚卒國人愈懼又昭四曰晉荀吴帥師滅陸渾韓宣子夢文公携荀吴而授之陸渾宣子韓起文公晉文公荀吴仲行穆子也故使穆子帥師獻俘於文宮欲以應夢又昭七曰十二月辛亥朔日有蝕之是夜也趙簡子夢童子羸而轉以歌轉婉轉也旦占諸史墨子曰吾夢如是今而日蝕何也對曰六年及此月也吴其入郢乎終亦弗克漢書曰孝文帝嘗夢欲上天不能進有一黄頭郎推之上天頋見其衣後穿覺而之漸臺見郞鄧通衣後穿即夢中所見也因而寵之又曰衛太子爲江充所譛敗乆之田千秋上急變訟太子􅁈曰子弄父兵罪當笞天子之子過誤殺人當何罪哉臣甞夢見一白頭翁教臣言是時上頗知太子惶恐無他意乃大感寤召見千秋謂曰父子之間人所難言也公獨明其不然此髙廟神靈使公教我公當遂爲吾輔佐立拜千秋爲大鴻臚又曰韋玄成爲丞相言孝文太后寢園冝如禮勿復修奏可後􅀊餘上寢疾夢祖宗譴罷郡國廟上少弟楚孝王亦夢焉上召問匡衡議欲復之衡深言不可}
