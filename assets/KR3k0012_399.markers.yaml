  - {type: variant, offset: 2798, length: 1, content: 老, SBCK: 女子曰吾目中有刺煩爲抜之當有厚報此婢乃見朽棺髑髏草生眼中便爲抜草即於某處得一􅀟金指環靈䰟志曰濡湏口有一大舶舩覆在水中水小時便出見甞有漁人夜􅀫其傍以舩繫之但聞筝笛絃管之音夢人驅遣云勿近官妓此人驚􅁴即移舩去傳云是曹公載妓舡覆于此于今存在智瓊傳曰弦超字義超夢神女從之自稱天上玉女姓成字智瓊早喪}
