  - {type: variant, offset: 1973, length: 297, content: 而至納之帝口及覺腹內猶熱南史曰徐陵字孝穆母藏氏嘗夢五色雲化為鳳集左肩上已而誕陵年數歲家人攜以候沙門釋寶誌寶誌曰此天上石麒麟也唐書曰李嶠趙州贊皇人隋內史侍郎元操從曾孫也代為著姓父鎮惡襄城令嶠早孤事母以孝聞為兒童時夢有神人遺之雙筆自是漸有學業弱冠舉進士又曰尹知章絳州翼城人少勤學嘗夢神人以大鑿開其心以藥內之自是日益開朗盡通諸經義未幾而諸師反北面受業焉又曰張薦字孝舉深州陸澤人祖鷟字文成聰警絕倫書無不覽為兒童時夢紫色大鳥五彩成文降于家庭其祖謂之曰五色赤文鳳也紫文鸑鷟也為鳳之佐吾兒當以文章瑞於朝廷因以為名字又曰天寶中安祿山自范陽入朝肅宗觀其兇恣有勃逆之狀言之於太上皇太上皇易之不納上恐危社稷遂精誠祈夢, SBCK: ''}
