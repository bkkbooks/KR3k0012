  - {type: variant, offset: 1496, length: 179, content: 母驚寤舉身流汗俄而有娠及生琳因以名字焉及長有大度智略從文帝累有戰功位至開府儀同三司三國典略曰高歡嘗夢履眾星而行覺而內喜遂傾產以結客又曰宇文永貴昌黎大棘人也母初孕貴夢有老人抱一兒授之曰賜爾是子俾壽且貴及生形類所夢故以永貴字之又曰齊陽休之幼年將仕夢鄴城東南有大冢上有銅柱跗為蓮花休之從西北而登以手捉柱柱右轉夢中呪曰三匝而止柱如其言榮貴之後所居之宅竟在其地又曰祖珽, WYG: 春豫}
