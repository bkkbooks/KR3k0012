  - {type: variant, offset: 2732, length: 1, content: 吳, SBCK: 吴選曹令史長沙劉卓得病夢一人以白越單衫與之語曰汝着此衫汗即火燒便㓗也覺果有衫在側後汗便火燒之捜神記曰有周擥力感切嘖音責者貧而好道夫婦夜耕息卧夢天公過而哀之勑有以給與司命案録籍此人相貧限不過此唯有張車子應賜錢千萬車子未生請以借之天公曰善曙覺言之於是所爲輙得貲至千萬先時有張嫗者常徃擥嘖家傭賃合有身月滿當孕便遣出生車屋下産得兒主人徃視間言當名汝兒作何嫗曰今在車下夢天告之名爲車子擥嘖乃悟自是居日衰减車子長大冨於周家續捜神記曰承儉者東莞人葬後十年忽夜與其縣令夢云没故民承儉今見劫明府急見救令便􅃙外内裝束往冢上日巳向出天忽大霧對面不相見但聞􅃁中㕳㕳破棺聲有二人墳上望但霧􅁳不見人徃令旣至収得冡内三人墳上二人遂得逸走棺未壊令即使人脩復之即其夜又夢儉云二人雖得走民悉誌之一人面上有青誌如藿葉一人㧻其前兩齒折明府但案此尋覔自得也令從其言追捕皆擒獲又曰宗淵字叔林南陽人􅀳太元中爲尋陽太守有數十頭􅀛付厨􅃙旦且以二頭作臛便着潘汁甕中飬之其暮夢有十丈夫並着烏布袴褶自反􅅞向宗淵叩頭􅀂求哀明日厨人􅌠二􅀛其暮復夢八人求哀如􅀄宗淵方悟令勿殺明夜還夢見昨八人來跪謝恩於是驚覺明朝自入廬山放之遂不復食􅀛又曰荆州刺史殷仲堪布衣時在丹徒忽夢見一人自􅀃巳是㑹稽上虞人死亡浮喪飄江中明日當至君有濟物之仁豈能見移着髙燥處則恩及枯骨殷明日與諸人共江上看果見一棺逐水流下飄飄至殷坐處令人牽取題如夢所即移着崗上酹以酒飯其夕又夢此人來謝恩又曰嘉興徐㤗㓜喪父母叔又隗養之甚於所生隗病}
