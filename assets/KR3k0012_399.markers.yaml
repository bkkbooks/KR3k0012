  - {type: variant, offset: 2538, length: 0, content: '', SBCK: 神􅀛也君乃刳􅀛以卜七十鑚而無遺䇿又曰匠石之齊至于曲轅曲轅之道見櫟社樹其大蔽千牛曰是不材之木也故能􅀂是之壽匠石歸櫟社見夢曰汝將比予於丈木耶柤梨橘柚果蓏之屬耶實熟則剥剥擊也剥則辱大枝折小枝泄泄亦折也此以其能􅀂生者也子求年所可用乆矣乃今得之吕氏春秋曰尹儒學御三年而無得焉夜夢受秋駕於其師時日徃朝其師而謂之曰吾}
  - {type: page-break, offset: 2538, content: '', id: KR3k0012_SBCK_399-6a}
  - {type: variant, offset: 2538, length: 0, content: '', WYG: 神龜也君乃刳龜以卜七十鑽而無遺䇿又曰匠石之齊至於曲轅曲轅道也見櫟社樹其大蔽牛曰是不材之木也故能若是之夀匠石歸櫟社見夢曰汝將比予於文木耶柤梨橘柚果蓏之屬耶實熟則剥剝擊也剥則辱大枝折小枝泄泄亦折也此以其能苦生者也予求無所可用乆矣乃今得之吕氏春秋曰尹儒學御三年而無得焉夜夢受秋駕於其師明日往朝其師而謂之曰}
  - {type: page-break, offset: 2538, content: '', id: KR3k0012_WYG_399-9b, image: WYG0896/WYG0896-0519b.png}
  - {type: variant, offset: 2538, length: 0, content: '', krp: 神龜也君乃刳龜以卜七十鑚而無遺䇿又曰匠石之齊至于曲轅曲轅之道見櫟社樹其大蔽千牛曰是不材之木也故能若是之壽匠石歸櫟社見夢曰汝將比予於丈木耶柤梨橘柚果蓏之屬耶實熟則剥剥擊也剥則辱大枝折小枝泄泄亦折也此以其能若生者也子求年所可用乆矣乃今得之吕氏春秋曰尹儒學御三年而無得焉夜夢受秋駕於其師時日徃朝其師而謂之曰吾}
