  - {type: variant, offset: 612, length: 244, content: 齋不齊以致齋者也是故君子非有大事也非有恭敬也則不齋不齋則於物無防也嗜欲無止也及其將齋也防其邪物訖其嗜欲耳不聽樂故記曰齋者不樂言不敢散其志也心不茍慮必依於道手足不茍動必依於禮是故君子之齋也專致其精明之德也故散齋七日以定之致齋三日以齊之定之之謂齋齋者精明之至也然後可以交於神明也定者定其志意是故先期旬有一日宮宰宿夫人夫人亦散齋七日致齋三日宮宰守宮官也宿讀為肅肅猶戒也戒輕肅重也君致齋於外夫人致齋於內然後會於太廟又坊記曰子云七日戒三日齋承一人焉以為尸過之者趍走以教敬也戒謂散齋也承猶事也又表記曰, SBCK: 孔}
