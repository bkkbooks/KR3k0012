  - {type: variant, offset: 2007, length: 188, content: 臨牢筴說曰汝奚惡死吾將三月犧汝十日戒十日齊藉白茅加汝肩尻于彫俎之上韓子曰燕王欲巧衛人請以棘剌之端為猴成功人曰君欲觀之半歲不入宮不飲酒食肉雨霽日出視之晏陰之間而棘剌之母猴乃可見也燕王固養之不能觀也搜神記曰王業和帝時為荊州剌史每出行部沐浴齋潔以祈于天地當啟佐愚心無使有枉百姓在州七年惠風大行苛慝不作儺禮記月令季春日命國儺九門磔攘以畢春氣洪範傳曰言之不從則有犬禍犬屬金也故磔之於九門, SBCK: 虞}
