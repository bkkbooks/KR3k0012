  - {type: variant, offset: 256, length: 3, content: 司會冢, SBCK: 七廟諸侯五大夫三士一又文王丗子曰五廟之孫祖廟未毀雖及庶人冠娶必告死必赴不忘親也又明堂位曰山節藻梲􅃨廟重檐刮楹逹郷反玷出尊崇坫康珪䟽屏天子廟飾也山節刻欂櫨爲山也藻梲謂侏儒柱爲藻文􅃨廟重屋也檐承壁材也刮摩也郷牖屬謂夾户牎也每室爲八牎爲四逹反坫反爵之坫也出尊當尊南也唯兩君爲好旣獻反爵其上禮君尊於兩楹之間也嵩髙也康讀爲元龍之亢屏謂之樹今愚也刻之爲雲氣虫獸如今閻上爲之又雜記曰成廟則釁之其禮祝宗人}
  - {type: page-break, offset: 256, content: '', id: KR3k0012_SBCK_531-2a}
  - {type: variant, offset: 256, length: 3, content: 司會冢, WYG: 立七廟諸侯立五廟大夫立三廟士一廟又文王世子曰五廟之孫祖廟未毁雖及庶人冠娶必告死必赴不忘親也又眀堂位曰山節藻梲複廟重檐刮盈達鄉反玷出尊崇玷康珪䟽屏天子廟飾也又雜記曰成廟則釁之其禮祝宗人}
