  - {type: variant, offset: 389, length: 3, content: 郊特牲, SBCK: 曰爲之宗廟以􅀑享之宗者尊也廟者皃也先祖之尊皃所居中宫何以爲人死精䰟歸乎天形體不藏存之即存不存則亡明先祖神死依人也孝經援神契曰廟所以尊祖也論語八佾曰子入太廟毎事問或曰孰謂鄒人之子知禮乎入太廟毎事問子聞之曰是禮也家語曰孔子在齊景公造焉左右白曰周使至言先王廟災景公曰何王廟孔子曰此必􅁵王廟夫釐變文武之制而作玄黄華麗之飾故天殃其廟焉有頃左右報所災者釐王廟景公曰善哉聖人之智過人逺矣又}
  - {type: page-break, offset: 389, content: '', id: KR3k0012_SBCK_531-4a}
  - {type: variant, offset: 389, length: 3, content: 郊特牲, WYG: 桓公曰清廟茅屋又僖上曰震伯夷之廟罪之也于是展氏有隠慝焉又文公下曰太室之屋壊書不恭也又成公三年曰甲子新宫火三日哭又㐮二年曰吴子夀夢卒臨于周廟禮也凡諸侯之喪異姓臨于外者同姓臨于廟是故魯為諸姬臨于周廟周廟文王廟也周公出文王魯立其廟公羊傳文公曰世室屋壊世室者何魯公之廟也周公稱太廟魯公稱世室羣公稱宫穀梁傳成公曰新宫灾三日哭新宫者稱公也稱父也成公之父宣公之宫也孝經曰宗廟致敬不亡親也又曰為之宗廟以鬼享之孝經援神契曰廟者所以尊祖也論語八佾曰子入太廟每事問或曰孰謂鄹人之子知禮乎入太廟每事問子聞之曰是禮也家語曰孔子在齊景公造焉左右白曰周使至言宣王廟灾景公曰何王廟孔子曰此必釐王廟夫釐變文武之制而作𤣥黄華麗之飾故天殃其廟焉有頃左右報所灾者釐王廟景公曰善哉聖人之智過人逺矣又}
