  - {type: variant, offset: 262, length: 3, content: 掌計要, SBCK: 又􅀕法曰天下有王分地建國置都立邑設廟祧壇墠而􅀕之乃爲親䟽多少之數是故王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月􅀕之逺廟爲祧有二祧享甞乃止去祧爲壇去壇爲墠壇墠有禱焉􅀕之無禱乃止去墠曰􅀑諸侯立五廟一壇一墠曰考廟曰王考廟曰皇考廟皆月􅀕之顯考廟祖考廟享甞乃止去祧爲壇去壇爲墠壇墠有禱焉􅀕之無禱乃止去墠爲􅀑大夫立三廟二壇曰考廟曰王考廟曰皇考廟享甞乃止顯考祖考無廟有禱焉爲壇􅀕之去壇爲􅀑適士二廟一壇曰考廟曰王考廟享甞乃止顯考無廟有禱焉爲壇􅀕之去壇爲􅀑官師一廟曰考廟王考無廟而􅀕之去王考爲􅀑庶士庶人無廟死曰􅀑廟之言貌也宗庿}
