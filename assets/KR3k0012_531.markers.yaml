  - {type: variant, offset: 1168, length: 242, content: 物以布為之齋必變食居必遷坐又述而曰子之所慎齋戰疾此三者人所不能慎而夫子慎之史記曰藺相如謂秦王曰趙送璧時齋五日今大王亦宜齋遂許齋五日舍相如廣成傳舍秦王齋五日後乃設九賓於庭引相如又曰秦二世夢白虎囓其左驂馬殺之心不樂問占夢人曰涇水為祟二世乃齋望夷宮閻樂殺之更立子嬰為王漢書曰蕭何薦韓信於漢王何曰王宜擇日齋戒設壇場具禮乃可拜為大將軍至拜乃韓信也一軍大驚也又曰宣帝詔曰迺者鳳凰甘露降集京師嘉瑞見脩興太一五帝后土之祠祈為百姓蒙福鸞鳳萬舞集止于旁齋戒之暮神光顯著薦鬯之夕神光交映或降于天或登于地或從, SBCK: 形}
