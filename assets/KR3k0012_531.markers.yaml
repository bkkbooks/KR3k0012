  - {type: variant, offset: 305, length: 0, content: '', krp: 冨有四海之内宗廟饗之子孫保之又祭法曰天下有王分地建國置都立邑設廟祧壇墠而祭之左傳桓公曰宋華父督巳殺孔父而殺殤公召莊公於鄭而立之以親鄭以郜}
  - {type: variant, offset: 306, length: 2, content: 樂正, SBCK: 鼎賂公夏四月取郜大鼎于宋戊申納于太廟非禮也又桓公曰清廟茅屋以茅飾屋著儉也清廟肅然清静之稱又僖上曰震夷伯之廟罪之也於是展氏有隱慝焉又文公下曰太室之屋壞書不恭也又成公三年曰甲子新宫災三日哭宣公神主新入廟故謂之新宫書三日哭善得禮宗廟親之神靈所憑居而遇災故哀而􅂘之又襄二曰吴子壽夢卒臨}
  - {type: variant, offset: 306, length: 24, content: 樂正於周宗伯之屬市司市也於周司徒之屬從從於司會也, WYG: 鼎賂公夏四月取郜}
