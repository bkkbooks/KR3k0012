  - {type: variant, offset: 521, length: 2, content: 養獸, SBCK: 司奏造二廟立文皇帝廟與髙祖合􅀕親盡以次毀特立武皇帝廟四時享祀爲魏太祖萬載不毀吴録地理志曰㑹稽有禹廟始皇配食王朗爲太守黜}
  - {type: variant, offset: 521, length: 0, content: '', WYG: 司奏造二廟立文皇帝廟與髙祖合祭親盡以次毁時立武皇帝廟四時享祭為魏太祖萬載不毁也吴録地里志曰㑹稽有禹廟始皇配食王郎為太守而斥之王隠晉書曰太康十年太廟成遷神主于新廟賜王公以下至焉督子弟官賜作廟者帛漢晉陽秋曰武帝改營太廟南盡荆山之木西採華山之石鑄銅柱十二塗以黄金鏤以百物填以丹青綴以珠玉以麗之也晉書禮志曰武帝太始二年有司奏置七廟宜權立一廟羣臣議上古清廟一宫周制七廟舜承堯禪受終文祖則虞氏不改唐廟因仍舊宫可依有虞故事宋書禮志曰晉太始二年有司奏天子七廟宜始禮建宫帝重其役設宜權立一廟于是羣臣議奏上古清廟一宫尊逺神祗逮至周室制為七廟以辨宗祧空宫深𢎞逺跡上世後魏書曰武定六年二月齊營齊獻武王廟議定室數形制兼度支尚書崔昻等議按禮諸侯五廟太祖親廟四今獻武王為始封之君便是太祖既通在親廟不容立五室且帝王親廟亦不過四今宜四室二間兩頭各一類室厦頭徘徊鴟尾又按禮圖諸侯廟止開南門而二王後祔祭儀注云執事者列于廟東門之外既有東門明非一門獻武禮數既隆備物殊異今據廟宜開四門内院南面開三門餘及外院四面皆一門齊書禮志曰世宗夢太祖宋氏諸帝常在太廟從我求求食可别為吾賜上乃敕豫章王妃庾氏四時還青溪宮舊宅處内舍堂奉祠二帝二后牲牢服章用家人禮晉起居注曰武帝太安中詔曰往者乃魏氏舊處還立廟既壅翳不顯又材木弱小至今中間有跌撓之患今當修立不冝在故處太僕寺南臨甬道地形顯故更于此營之主者依典禮行之晉書曰桓𤣥簒問衆曰朕其敗乎曹靖之對曰神怒人怨臣實懼焉𤣥曰人或可怨神何可怒對曰移晉宗廟飄泊無所大楚之祭不及于祖此其所以怒之白虎通曰禮聖王所制宗廟何曰生死殊路又云敬鬼神而逺之所以有室何所以象生之居又曰臣侍于郊君不絶其禄者以其禄三分之一其妻長子使得祭其宗廟賜其環則還之玦則去之又曰王者立宗廟何曰縁生以事死敬死若事存欲立宗廟而祭之此孝子之心所以追繼}
