  - {type: variant, offset: 524, length: 1, content: 官, WYG: 髙廟漢武故事曰宣帝立孝武廟于河東告祠日見一人騎馬異于常馬持尺一扎賜将作丞又曰汝續克成賜汝金一斤因忽不見禮乃亦為金一斤蜀王本紀曰禹生于世紐禹母天珠孕禹祈禹而生禹于塗山娶妻生子名啓于今塗山而有禹廟葢亦為其母立也三輔黄圖曰莽于長安城作九廟又曰太上皇廟在長安香街南墨子曰昔三苗大亂天命殛之雨血于廟説苑曰衞孫文子問王孫賈曰吾見君之廟小欲更之可乎對曰古之君子以儉為禮今之君子以大易之桓譚新論曰王莽起九廟以銅為柱甍大金銀錯鏤其上也王嬰古今通論曰夏室世世祭祀之也殷曰重屋重夏為屋曰霤周曰宗廟尊其生存之貌示不死之故致之于廟楚辭天問序曰屈原放逐徬徨山澤仰天嘆息楚有先王之廟又公卿祠堂圖畫天地山川神靈琦瑋譎詭}
