  - {type: variant, offset: 305, length: 0, content: '', SBCK: 冨有四海之内宗廟饗之子孫保之又􅀕法曰天下有王分地建國置都立邑設廟祧壇墠而􅀕之左傳桓公曰宋華父督巳殺孔父而殺殤公召莊公於鄭而立之以親鄭以郜}
  - {type: page-break, offset: 305, content: '', id: KR3k0012_SBCK_531-3a}
  - {type: variant, offset: 305, length: 0, content: '', WYG: 富有四海之内宗廟享之子孫保之又祭法曰天下有王分地建國置都立邑設廟祧壇墠而祭之左傳桓公曰宋華父督已殺孔父而弑殤公召莊公于鄭而立之以親鄭以郜}
