  - {type: variant, offset: 910, length: 243, content: 入廟齋必變食去其葷羶也居必遷坐易其常處也故散齋於外致齋於內外者公寢也內者寢中小室大祀散齋七日祭曰猶遠客意散致齋三日致者至也就祭日近則十日齋矣祭前旬外之日則有司戒告內外內外百官齋謂之夙戒夙早也中祀七日則散齋四日小祀三日月令秦書也當戰國之急大小祭祀唯三日散齋二日致齋一日春秋合誠圖曰黃帝請問太一長生之道太一曰齋戒六丁道乃可成丁取能丁寧常戒懼也家語曰季桓子將祭齋三日而二日鍾鼓之音不絕冉有問於孔子子曰孝子之祭也散齋七日慎思其事致齋三日而一用之精一而用之也猶恐不敬而二日伐鼓何其論語鄉黨曰齋必有, SBCK: 方}
