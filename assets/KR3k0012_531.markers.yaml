  - {type: variant, offset: 517, length: 0, content: '', SBCK: 自雒陽遷都長安􅀄長安遭赤眉亂宫室焚盡唯有髙廟遂居之漢雜事曰光武弃天下以再受命復漢祚更起廟稱丗祖孝明臨崩遺詔遵儉無起寢廟藏王於世祖廟孝章不敢違是後遵奉藏世祖廟如孝明之禮而園陵皆自起寢孝明廟曰顯宗孝章曰肅宗是後踵前孝和爲穆宗孝安曰敬宗孝順曰恭宗孝桓曰威宗今雒陽諸陵皆晦望二十四氣伏社臘及四時上飯太官送用物園令食監典省其親陵一所宫人隨鼔漏理􅀍枕具盥水陳嚴具天子以正月五月供畢後上原陵以次周遍公卿百官皆從四姓小侯諸家婦凡與先君有􅀲􅁑者及}
