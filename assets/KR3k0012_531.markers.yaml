  - {type: variant, offset: 881, length: 0, content: '', SBCK: 人君旣葬之後日中虞􅀕即作木主以存神未葬以前縣重於庭以代主也廟主用木者木落歸本有始終之義人之生也無不死木生於亥又落於亥是歸本也天子廟主長尺二寸諸侯一尺四向孔穴午逹相通􅃮書謚號曰神主葬後孝子心目無所覩故用以主其神也公羊傳文公曰二年丁丑作僖公主虞主用桑練主用栗作僖公主不時也左傳莊公曰先君桓公命我先人典司宗祏􅁊公鄭始受封君也宗柘宗廟中藏主石室言巳丗爲宗廟守臣又文公曰葬僖公緩也作主非禮也}
  - {type: variant, offset: 881, length: 0, content: '', WYG: 人君既葬之後日中虞祭即作木主以存神廟主用木者木者木落歸本有如之義天子廟主長尺二寸諸侯一尺四寸孔穎達正義葬后孝子心目無所覩故用以主其神也公羊傳文公曰二年丁丑作僖公虞主用桑練主用栗作僖公主不時也左傳莊公曰先君桓公命我先人典司宗祏又文公曰葬僖公緩也作主非禮也}
  - {type: variant, offset: 881, length: 0, content: '', krp: 人君旣葬之後日中虞祭即作木主以存神未葬以前縣重於庭以代主也廟主用木者木落歸本有始終之義人之生也無不死木生於亥又落於亥是歸本也天子廟主長尺二寸諸侯一尺四向孔穴午逹相通􅃮書謚號曰神主葬後孝子心目無所覩故用以主其神也公羊傳文公曰二年丁丑作僖公主虞主用桑練主用栗作僖公主不時也左傳莊公曰先君桓公命我先人典司宗祏桓公鄭始受封君也宗柘宗廟中藏主石室言巳丗爲宗廟守臣又文公曰葬僖公緩也作主非禮也}
  - {type: variant, offset: 882, length: 0, content: '', SBCK: 君薨卒􅂘而祔祔而作主特祀於主户柩巳逺孝子思募故造木主立几筵焉丞甞禘於廟又昭五曰使祝史徙主祏於周廟告于先君祏廟主石凾周廟厲王廟也論語八佾曰哀公問社於宰我宰我對曰夏后氏以松殷人以栢周人以栗五經異義曰謹按}
  - {type: page-break, offset: 882, content: '', id: KR3k0012_SBCK_531-9b}
  - {type: variant, offset: 882, length: 0, content: '', WYG: 君薨卒哭而祔祔而作主特祀于主烝嘗禘于廟又昭五年曰使祀史徒主祏于周廟告于先君祏廟主石函周廟厲王廟也論語八佾曰哀公問社於宰我宰我對曰夏后氏以松殷人以栢周人以栗五經異義曰謹按}
