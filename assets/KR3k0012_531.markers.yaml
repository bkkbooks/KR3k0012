  - {type: variant, offset: 2453, length: 860, content: 氣化萬物五帝各行其德餘氣留滯則傷後時謂之不和而災疫興焉大儺者貴賤至於邑里皆得驅疫命國儺者但於國城中行之耳名之儺者取群隸為儺儺之聲周禮夏官曰方相氏掌蒙熊皮黃金四目玄衣朱裳執戈楊盾帥百隸而時儺以索室驅疫蒙冐也冐熊皮者以驚驅疫癘之鬼如今魌頭也時儺四時作方相氏以儺卻凶惡也月令季冬命國儺索搜也續漢書曰先臘一日大儺謂之逐疫其儀選中黃門子弟十二已下百二十人為侲子皆赤幘皂製執大鼗方相氏服如周制及十二獸裳衣毛角中黃門行人冗從僕射之以逐惡鬼于禁中設桃梗鬱壘葦茭畢執事者皆罷葦戟桃枝以賜公卿將軍特進諸侯禮緯曰顓頊有三子生而亡去為疫鬼一居江水是為虐鬼魑鬼一居人宮室區隅善驚人小兒於是常以正歲十二月令禮官方相氏蒙熊皮黃金四目玄衣纁裳執戈楊楯帥百隸及童子而時儺以索室而驅疫鬼以桃弧葦矢土鼓且射之以赤丸五穀播洒之以除疫殃後魏書曰高宗和平三年十二月因歲除大儺之禮遂耀兵武更為制令步兵陣於南騎士陳於北各擊鍾鼓以為節度其步兵所衣青赤黃黑別無部隊楯矟矛戟相次周廻轉易以相赴就有飛龍騰虵之變為函箱魚鱗四門之陣凡十餘法跽起前卻莫不應節陣畢南北二軍皆鳴鼓角眾盡大譟各令騎將交去來挑戰步兵更進退以拒擊南敗北捷以為盛觀自後踵以為常唐書曰舊驅儺侲子等金吾將軍並具欄笏引入閤門謹按大儺者所以驅除群厲合資威武盛其光儀欄笏之制常參朝服舊制未稱今請各依錦繡具帑袜魅帶儀力部引出入建康實錄曰孫興公嘗著戲為儺至桓宣武家宣武覺其應對不凡推問之乃興公宣城記曰吳時洪巨為廬陵太守有清稱徵還舩輕皆載土時歲暮除逐人就乞見土而去莊子曰游島問雄黃曰今逐疫出魅擊鼓呼噪何也雄黃曰黔首多疾黃帝氏立巫咸使黔首沐浴齋戒以通九竅鳴鼓振鐸以動其心勞形趍步以發陰陽之氣飲酒茹蔥以通五藏夫擊鼓呼噪逐疫出魅鬼黔首不知以為魅祟也張衡東京賦曰卒歲大儺驅逐群厲方相秉鉞巫覡操茢侲子萬童丹首玄裳桃弧棘矢所發無臬飛礫雨散剛殫畢斃惶火馳而星流逐赤疫於四裔然後淩天地絕飛梁囚耕父於清泠溺女魑於神潢廉品大儺賦曰於吉日之上戊將大腊于臘烝先茲曰之酉久宿潔靜以清澄乃班有司聚眾大儺天子坐華殿臨朱軒憑玉几席文旃率百隸之侲子群鼓噪於宮垣, SBCK: ''}
