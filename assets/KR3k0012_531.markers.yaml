  - {type: variant, offset: 297, length: 6, content: 以其成從質於, WYG: 師一廟曰考廟王考無廟而祭之去王考為鬼庶士庶人無廟死曰鬼又中庸曰武王纉太王王季文王之緒一戎衣而有天下身不失天下之顯名尊為}
