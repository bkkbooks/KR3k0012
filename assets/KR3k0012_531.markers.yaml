  - {type: variant, offset: 477, length: 2, content: 居處, SBCK: 人猶愛其樹尊其人必敬其道也史記曰􅁗始皇廵隴西北地岀雞頭山過回中應劭曰回中在安定髙平孟康注曰回中在北地作信宫渭南更命信宫爲極廟象天極廟道通驪山作甘泉前殿築甬道應劭曰築垣墻如街巷又曰髙祖崩群臣皆曰髙祖起細撥亂令郡諸侯各立髙祖廟以歳時祠及孝惠五年}
