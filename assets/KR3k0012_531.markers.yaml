  - {type: variant, offset: 515, length: 0, content: '', SBCK: 甞果方今櫻桃熟可獻願陛下出因取櫻桃獻宗廟上許之諸果獻由此興又曰文帝作顧城廟服䖍曰廟在長安城南文帝作還顧見城故名之􅀿劭日文帝自爲之制度􅂌狹􅀂顧望而成故曰顧城賈誼曰目頋城之廟爲天下太宗與漢無極或曰地名也如淳曰身存而爲廟􅀂尚書顧命也髙祖廟曰原廟文帝廟曰頋城廟景帝廟曰徳陽武帝廟曰龍淵昭帝廟曰徘徊宣帝號樂遊元帝廟曰長壽成帝廟曰成陽又曰梅福上書諫曰武王克殷未下車存五帝之後封殷於宋紹夏於􅂎明著三統示不獨有也是以􅁎姓半天下遷廟之主岀於戸所謂存人自立也又曰宣帝即位尊孝武廟爲世宗所行廵狩郡國皆立廟告祠世宗廟有白鶴集後庭以立世宗廟告祠孝昭寢有鴈五色集殿前西河築世宗廟神光興于殿旁有鳥曰鶴前赤後青神光又興於房中如燭狀廣川國世宗廟殿上有鍾音房戸大開夜有光殿上盡明又曰王莽以宗廟未脩張邯􅀃莽曰徳盛者文縟冝崇其制度宣示海内冝令萬世之後無以復加也莽乃􅀶徴天下工匠諸圖􅀞及吏民以義入錢榖助作者駱驛道路壞徹城西苑中建章永光苞陽大臺儲元宫及平樂當路陽禄館凡十餘所取其材瓦以起九廟帝王世紀曰漢景帝廟名德陽宣帝廟名長壽武帝廟名龍淵文帝廟名顧成昭帝廟名徘徊東觀漢記曰中元元年十月甲申使司空馮魴吿祠髙祖廟吕太后不冝配食以薄太后配遷吕太后于園四時止􅀕又曰永􅀄六年皇太后入宗廟於世祖廟與皇帝交獻薦如光烈皇后故事又曰建􅀄四年八月上以公卿所奏明徳皇后在世祖廟坐位駮議示東平憲王蒼蒼上言文武宣元祫食髙廟皆以后配先帝所制典法設張大雅曰昭哉來御從其祖武又曰不􅗅不忘率由舊章明徳皇后冝配孝明皇帝􅀽山松後漢書曰}
  - {type: page-break, offset: 515, content: '', id: KR3k0012_SBCK_531-5a}
  - {type: page-break, offset: 515, content: '', id: KR3k0012_SBCK_531-5b}
  - {type: variant, offset: 515, length: 0, content: '', WYG: 嘗果方今櫻桃熟可獻願陛下出因取櫻桃獻宗廟上許之諸果獻由此又曰文帝作顧成廟又曰梅福上書諫曰武王尅殷未下車存五帝之後封殷于宋紹夏于杞眀著三統示不獨有也是以姬姓半天下遷廟之主出于户所謂存人以自立也又曰宣帝即位尊事武廟為世宗所行巡狩郡國皆立廟告祠宗廟有白鶴集後庭以立世宗廟告祠孝昭寢官有五色雁集殿前西河築世宗廟神光興于殿傍有鳥曰鶴前赤後青神光興于房中如燭狀廣川國世宗廟殿上有鍾音房中大開有光殿上又曰王莽以宗廟未修張邯説莽曰徳勝者文縟宜崇其制度宣示海内冝令萬世之后無以復加也莽乃博徵天下工臣諸圖􅀞及吏民以義入錢榖助作者駱驛道路壊徹城西苑中建章永光苞陽臺大儲宫及平樂當路陽禄舘凡十餘所取其財以完九廟帝王世紀曰漢景帝廟名徳陽宣帝廟名長夀武帝廟名龍淵文帝廟名顧成昭帝廟名徘徊東觀漢紀曰中元元年十月甲申使司空馮魴告祠髙祖廟吕太后不宜配食以薄太后配遷吕太后于園四時上祭又曰永初六年皇太后入宗廟與世宗廟與皇帝交獻薦如光烈皇后故事又曰建初四年八月上以公卿所奏眀徳皇后在世髙廟坐位駿議示東平憲王蒼上言文武宣九十食髙廟皆以后配先帝所制與法設張大雅曰昭哉來御從其祖武又曰不愆不忘率猶舊章眀徳皇后冝配孝眀皇帝袁山松後漢書曰}
