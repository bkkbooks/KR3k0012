  - {type: variant, offset: 4390, length: 193, content: 名晨風玄中記曰東南有桃都山上有大樹名曰桃都枝相去三千里上有天雞日初出照此木天雞即鳴天下雞皆隨之鳴臨海異物志曰杉雞黃冠青綏常在杉樹下頭上有長黃毛頭及頰正青如垂緌南越志曰新夷縣鳥多杉雞尹子曰楊州之雞裸無毛南越志曰高興縣多容雞如家雞五采至則年穰孫綽望海賦曰石雞清響以應潮慧軀輕近以遠潔石雞形似家雞而灰色在海中山上每潮水將至輒鳴相應若家雞司晨也商人欲知水道往來以至此為候也周景式廬山記曰白水南行, SBCK: ''}
