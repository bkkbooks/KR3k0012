  - {type: variant, offset: 54, length: 3, content: 又月令, krp: 之雞望視之兔白蹄之豕短喙之狗脩頸之馬君子之皃何獨異耶吴地記}
  - {type: punctuation, offset: 55, content: 《, id: KR3k0012_CHANT_919-bkkpn26}
