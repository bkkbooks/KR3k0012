  - {type: variant, offset: 1593, length: 813, content: 山陰令二野父爭雞琰問雞何食一云粟一云豆琰使破雞得粟罪言豆者魏收後魏書曰崔光字長仁東清河鄃人也正始元年夏有典事史元顯獻四足四翼雞詔散騎侍郎趙邕以問光光表曰翅足眾多亦群下相扇動之象雛而未大腳弱差小亦其勢尚微易制御也武帝覽之悅後數日而茹晧等並以罪失伏法於是禮光逾重又曰傅乾愛嗜雞肉葵菜食傅靈越乃為作之下以毒藥乾愛飯還而卒北史曰宋世良為清河太守發姦擿伏有若神明嘗有一吏休滿還郡食人雞豚又有一幹受人一帽又食二雞世良叱而語之吏幹叩頭伏罪於是上下震悚莫敢犯禁又曰齊彭城王浟為滄州刺史有隰沃縣主簿張達嘗詣州夜投人舍食雞羹浟察知之守令畢集浟對眾曰食雞羹何不償價直也達即伏罪合境號為神明三國典略曰齊長廣王湛即皇帝位於南宮大赦改元其日將赦庫令於殿門外建金雞宋孝王不識其義問於光祿大夫司馬膺之赦建金雞其義何也膺之曰案海中星占曰天雞星動當有赦由是帝王以雞為候唐書曰劉武周父匡徙家馬邑嘗與其妻趙氏夜坐庭中忽見一物狀如雄雞流光燭地飛入趙懷振衣無所見因而娠遂生武周為人驍勇善騎射莊子曰莊子謂惠子曰年溝之雞司馬彪注曰年溝鬭鷄處三歲為秣秣魁帥也相者視之則非良雞也然而數以勝人者以狸膏塗其頭也雞畏狸故又曰越雞不能伏鵠卵魯雞固能矣司馬彪曰越雞小雞也魯雞大雞今蜀雞也列子曰紀渻子為周宣王養斗雞十日而問雞可鬭乎曰未也方虛驕而恃氣十日又問之曰未也猶疾視而盛氣十日又問之曰幾矣雞雖有鳴者已無變望之似木雞矣其德全矣異雞無敢應者燕丹子曰燕太子丹質於秦逃歸到關丹為雞鳴遂得逃歸尸子曰戰如鬭雞勝者先鳴韓子曰使雞司夜令狸執鼠皆用其能淮南子曰雄雞夜啼庫兵動而戎馬驚淮南萬畢術曰孤桃之象令雞夜鳴取孤桃南北行枝長三尺折以為象塗以三歲雄血夜居栖下戰國策曰秦惠王謂寒泉子曰蘇秦欺獘邑欲以一人智反覆山東之君夫諸侯之不可一猶連雞之不能俱止於栖也呂氏春秋曰善學者若齊王之食雞也食其距數千而後足又曰白圭謂魏王曰市丘之鼎以烹雞多洎之則淡而不可食市丘魏邑肉汁曰洎少洎之則焦而不熟然而視之蝺焉羹無所可用蝺者齲, WYG: ''}
