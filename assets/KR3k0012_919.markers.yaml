  - {type: variant, offset: 182, length: 348, content: 之雄也州綽曰君以為雄誰敢不雄然臣不敏平陰之役先二子鳴晉伐齊及平陰州綽獲殖綽郭最故自比於雞鬭勝而先鳴又襄五曰公膳日雙雞又昭五曰賓孟適郊見雄雞自斷其尾問之侍者曰自憚其犧也又昭六曰季郈之雞鬭季平子郈昭伯二家相近故鬭雞季氏芥其雞以芥子播其羽郈氏為之金距平子怒毛詩曰女曰雞鳴剌不說德也陳古義以剌今不說德而好色也女曰雞鳴士曰昧旦子興視夜明星有爛又曰君子于役不知其期曷其至哉雞棲于塒日之夕矣又緇衣曰風雨思君子也亂世則思君子不改其度風雨淒淒雞鳴喈喈既見君子云胡不夷風雨蕭蕭雞鳴膠膠既見君子云何不瘳風雨如晦雞鳴不已既見君子云胡不喜又雞鳴思賢妃也雞既鳴矣朝既盈矣匪雞則鳴蒼蠅之聲尚書牧誓曰古人有言曰牝雞無晨牝雞之晨惟家之索論語曰子路遇丈人以杖荷蓧止子路宿殺雞為黍而食之又曰子之武城聞絃歌之聲夫子莞爾而笑曰割雞焉用牛刀, SBCK: ''}
