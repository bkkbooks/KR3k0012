  - {type: variant, offset: 1172, length: 14, content: 雞冠四間如蓮花鳴清聲澈也魏志, SBCK: 建昌侯孫慮於堂前作􅋐鴨欄頗施小巧陸遜正色}
  - {type: variant, offset: 1172, length: 0, content: '', WYG: 建昌侯孫慮於堂前作鬬鴨欄頗施小巧陸遜正色曰君侯宜勤覧經典用此何為慮即毁之陳書曰齊人渡江至𤣥武湖西北莫府山南我軍自覆舟東移頓郊壇北與齊人對是時乏食調市人餽軍皆是交屑為飯以荷葉裹而分給兵士皆困㑹文帝遣送米三千石鴨千頭帝即炊米煮鴨誓申一戰将士及防身計粮數臠人人裹飯嫓以鴨肉帝命衆軍蓐食攻之齊軍大潰三國典畧曰髙徳衆正相齊未誅之前家有赤鴨羣行於庭犬來逐遂成碎血北史曰元善以髙熲有宰相之具常言於上曰楊素麄疎蘇威怯愞元冐元昊正似鴨耳可以付社稷者唯獨髙熲上初然之唐書曰齊王祐太宗第五子好養鴨未反前忽有野狸入籠中咬四十餘鴨皆斷其頭及敗同惡而誅者四十四人抱朴子曰有白虎七變法取三月三十日殺鴨血等合和之忽生草似胡麻一生取其實合之可以移形易貌兩京雜記曰髙祖既作新豐并移舊社放犬羊}
