  - {type: variant, offset: 968, length: 3, content: 泣怪問, WYG: 性冷偏宜覆小兒而辟驚癎也雲南記曰韋齊休使雲南屯城驛西牆外有大池斗門垂栁夾隂池中鵞鴨甚盛幽明録曰晉義熈中𦍑主姚畧壞洛陽隂溝取磚得一隻雄鵞並金色交頸長鳴聲聞九臯臨海記曰邵東南有白山髙三百餘丈望}
