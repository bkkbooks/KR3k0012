  - {type: variant, offset: 2411, length: 5, content: 田饒為魯哀, SBCK: 趙倉唐擊爲魏文侯太子擊使於外問太子曰侯何好曰􅄝晨鳬好北犬於是遣唐緤北犬奉晨鳬獻之侯曰擊愛我知我所􅄝好莊子曰鳬脛雖短續之則憂風俗通曰王喬者河東人爲葉令喬有神術每月朔望常自縣詣臺朝帝怪其來數而不見車􅀐宻令太史伺望之言其臨至輙有􅀟鳬從東南飛來於是􅀱鳬至舉羅張之但得一􅀟履乃詔尚方􅐷視則四年中所賜尚書官属履楚辭曰寧與騏􅂹抗軛將與雞鶩争食乎寧卭卭􅀂千里之駒㲹㲹􅀂水中之鳬焦贛易林曰鳬舞鼓翼嘉樂尭德李陵贈􅂫武詩曰二鳬俱北飛一鳬獨南翔我當留斯館子當歸故郷􅂫武與李陵書曰乗雲附景不足以譬速晨鳬失群不足以喻疾豈可因歸鴈以運粮託景風以餉軍哉晉書張華傳曰人有得鳬鳥毛長三丈以示華華見慘然曰此謂海鳬毛也出則天下亂後周書曰􅀄賀勝至􅀜中自以年位素重見太祖不拜㝷而自悔太祖亦有望焉後從太祖宴于昆明池時有􅀟鳬遊於池上太祖乃授弓矢於勝曰不見}
  - {type: page-break, offset: 2411, content: '', id: KR3k0012_SBCK_919-8a}
  - {type: page-break, offset: 2411, content: '', id: KR3k0012_SBCK_919-8b}
  - {type: variant, offset: 2411, length: 2, content: 田饒, WYG: 趙倉唐病魏文侯太子擊使於外問太子曰侯何好曰嗜晨鳬好北犬於是遣唐緤北犬奉晨鳬獻之侯曰擊愛我知我所嗜好燕子曰鳬脛雖短續之則憂風俗通曰王喬者河東人}
  - {type: variant, offset: 2411, length: 5, content: 田饒為魯哀, krp: 趙倉唐擊爲魏文侯太子擊使於外問太子曰侯何好曰嗜晨鳬好北犬於是遣唐緤北犬奉晨鳬獻之侯曰擊愛我知我所嗜好莊子曰鳬脛雖短續之則憂風俗通曰王喬者河東人爲葉令喬有神術每月朔望常自縣詣臺朝帝怪其來數而不見車騎宻令太史伺望之言其臨至輙有雙鳬從東南飛來於是候鳬至舉羅張之但得一雙履乃詔尚方侯視則四年中所賜尚書官属履楚辭曰寧與騏驥抗軛將與雞鶩争食乎寧卭卭若千里之駒㲹㲹若水中之鳬焦贛易林曰鳬舞鼓翼嘉樂尭德李陵贈蘇武詩曰二鳬俱北飛一鳬獨南翔我當留斯館子當歸故郷蘇武與李陵書曰乗雲附景不足以譬速晨鳬失群不足以喻疾豈可因歸鴈以運粮託景風以餉軍哉晉書張華傳曰人有得鳬鳥毛長三丈以示華華見慘然曰此謂海鳬毛也出則天下亂後周書曰𥘉賀勝至關中自以年位素重見太祖不拜㝷而自悔太祖亦有望焉後從太祖宴于昆明池時有雙鳬遊於池上太祖乃授弓矢於勝曰不見}
  - {type: variant, offset: 2414, length: 2, content: 魯哀, WYG: 葉令喬有神術每月朔望常自縣詣臺朝帝怪其來數而不見車騎宻令太史伺望之言其臨至輒有䨇鳬從東南飛來於是候鳬至舉羅張之但得一䨇履乃詔尚方視之則四年中所賜尚書官屬履楚辭曰寧與騏驥抗軛乎将與雞鶩争食乎寧昂昻若千里之駒泛泛若水中之鳬乎焦贑易林曰鳬舞鼓翼嘉樂克徳李陵贈蘇武詩曰二鳬俱北飛一鳬獨南翔我當留斯館子當歸故鄉蘇武與李陵書曰乗雲附景不足以譬速晨鳬失羣不足以喻疾豈可曰歸鴈以運粮託景風以餉軍哉晉書張華傳人有得鳬鳥毛長三丈以示張華華見不悦曰此謂海鳬毛也出則天下亂後周書曰初賀勝至闗中自以年位素重見太祖不幸尋而自悔太祖亦有望焉後從太祖宴于昆明池時有䨇鳬逰於池上太祖乃授弓矢於勝曰不見}
