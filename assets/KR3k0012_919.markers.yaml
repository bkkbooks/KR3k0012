  - {type: variant, offset: 58, length: 2, content: 季冬, krp: 鴨城者吴王築城城以養鴨周數百里笁法真登羅山䟽曰山上有神湖湖中有白鴨嶺南異物志曰廣州浛洭縣金池黃家有養鵝鴨池嘗於鴨糞中見麩金片遂多收掏}
