  - {type: variant, offset: 948, length: 1, content: 女, WYG: 妾與信弟倓私通倓欲求之無敢言者信庭前有一蒼鵝乃繫書于鵝頸信視之乃倓啟遂題紙尾曰畜生乞汝唐書曰元和十二年李愬襲蔡州兵至懸瓠城夜半雪甚城旁有鵝鴨池愬令驚擊之以雜其聲列子曰黄帝與炎帝戰以鵰鶡鷹雁鵝為旗幟魯連子曰君鵝鴨有餘食士不足半菽孟子曰仲子以兄之禄為不義避兄離母處於陵他日歸則有饋其兄生鵝者嚬顣曰惡用是鶂鶂者為其母殺是鵝與之食其兄自外至曰是鶂鶂之肉也出而哇之戰國策曰管燕得罪於齊王謂左右曰子孰能與我赴諸侯乎左右莫對管燕漣然流涕曰悲夫士何其易得而難用也田需對曰士三食不得厭而君鵝鶩有餘食下宫曵綺縠而士不得以為縁且財者君之所輕死者士之所重若不肯以所輕與士而責之以所重事非士易得而難用也異苑曰𫝊承為江夏守有一隻鵝失之三年忽引導得三十餘頭來向承家秦記曰苻朗食鵝炙知黑白之處人不信既而試之果然世說曰㑹稽有孤居老姥養一鵞鳴喚清長王逸少為太守既求市之未得逸少乃㩦親故命駕共往觀之姥聞二千石當來即烹以待之逸少既至殊喪生意歎息彌日俗記曰京下劉光禄養好鵝劉後軍從京還鎮潯陽以一隻鵝為後軍别純蒼色頸長四尺許頭似龍此一隻鵝可堪五萬自後不復見有此類張鴻傳曰鴻為慕容晃黄門初刑鴻不熟頤下生黄鬚三根長寸餘乃遣出宫㸔鵝鴨沈充鵝賦序曰先大夫俞潁川者殊精意於養鵝求得竒鵝時有縁眼黄喙折翼赤頭皆經潁川之好者焦叔明以為太康中得大蒼鵝從喙至足四尺有九寸體色鮮麗鳴聲驚人三年而為暴犬所害惜其不終故為之賦云崔豹古今注曰夫鵝似鵠而大頸長八尺善鬭好啖蛇列異傳曰廬山之右常有野鵝數千為羣長老傳言}
