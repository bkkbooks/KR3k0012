  - {type: variant, offset: 1468, length: 216, content: 齊名右軍後進庾猶不分在荊州與都下人書云小兒輩賤家雞愛野雉皆學逸少書須吾下當比之又載記曰符朗善知味會稽王道子殺雞以食之既進朗曰此雞栖恒半露檢之驗焉晉書武帝嘗幸琅邪城宮人常從早發至湖北埭雞始鳴今呼為雞鳴埭南史曰齊鬱林王好鬭雞密買雞至數千價又曰傅琰字季珪為山陰令二野父爭雞琰問雞何食一云粟一云豆琰使破雞得粟罪言豆者魏收後魏書曰崔光字長仁東清河鄃人也正始元年夏有典事史元顯獻四足四翼雞詔散騎侍郎趙邕以問光光表曰翅足眾多亦群下相扇動之象雛而未, SBCK: ''}
