  - {type: variant, offset: 244, length: 9, content: 賓孟適郊見雄雞自斷, krp: 吾甞㑹賔設樂天忽雲興繼以大雨有群鶩成列飛翔而過此偶尔何異玄鸖二八也廣志曰鶩生百卵一日再生有露華鶩以秋冬生卵並出蜀晨鳬肥而耐寒冝爲矐越地傳曰越人爲競渡有輕薄少年各尚}
