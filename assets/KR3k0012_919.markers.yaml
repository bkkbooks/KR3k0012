  - {type: variant, offset: 240, length: 2, content: 又昭, krp: 饔人竊更之以鶩子尾怒春秋繁露曰張湯問仲舒曰祠宗廟或以鶩當鳬可不對曰鶩非鳬鳬非鶩愚以爲不可漢書王莽多事諸鬼用三牲鳥獸三千餘種後不能備乃以雞當鴈鶩東觀漢記曰馬援與兄子嚴敦書云學龐伯髙不就猶爲謹勑士所謂刻鵠不成尚類鶩者說苑曰鶩無他心故庻人以爲贄崔寔政論曰今下僣其上尊卑無別如使鷄鶩蛇頸龜身}
