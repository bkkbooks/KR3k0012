  - {type: variant, offset: 1984, length: 0, content: '', SBCK: 白頭翁訪逐之化爲雄鴨還舡欲煑之啇人争看遂飛去廣志曰野鴨雄者赤頭有距蔡氏化清經曰水戰之鴨何必白纓盈俎之雞何必長鳴新言曰譬猛虎浮水不如鳬鴨騏驎登木不如猿猴太元經曰素嬰之鴨翰音之雞望視之􅇠白蹄之豕短喙之狗脩頸之馬君子之皃何獨異耶吴地記曰鴨城者吴王築城城以養鴨周數百里笁法真登羅山䟽曰山上有神湖湖中有白鴨嶺南異}
  - {type: punctuation, offset: 1985, content: ，, id: KR3k0012_CHANT_919-bkkpn692}
  - {type: 'tls:seg', offset: 1985, content: '', id: KR3k0012_CHANT_919-30a.6}
  - {type: variant, offset: 1985, length: 1, content: 狀, SBCK: 志曰廣州浛洭縣金池黃家有養鵝鴨池嘗於鴨糞中見麩金片遂多收掏之日得一兩縁此而致冨其子孫皆爲使府劇職三丗後池即無金黄氏力殫矣鶩􅀃文曰鶩野鳬春秋左傳曰公膳日􅀟雞饔人􅀼更之以鶩子尾怒春秋繁露曰張湯問仲舒曰祠宗廟或以鶩當鳬可不對曰鶩非鳬鳬非鶩愚以爲不可漢書王莽多事諸􅀑用三牲鳥獸三千餘種後不能備乃以雞當鴈鶩東觀漢記曰馬援與兄子嚴敦書云學龐伯髙不就猶爲謹勑士所謂刻鵠不成尚􅀋鶩者􅀃苑曰鶩無他心故庻人以爲贄崔寔政論曰今下僣其上尊卑無別}
