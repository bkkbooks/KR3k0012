  - {type: variant, offset: 542, length: 936, content: 雞曰僆絕有力奮雞三尺為鶤棲於杙為桀鑿垣而棲為塒郭璞注曰蜀雞也雓鶵子名也今江東呼雞少者為健古之雞春秋說解辭曰雞為積陽南方之象火陽精物炎上故陽出雞鳴以類感也雞之為言隹也隹而起為人期莫寶也善為人制晏早之期春秋考異郵曰雞應旦鳴詩記曆樞曰候及東次氣發雞泄三號冰始泮卒于丑以成歲及東及於寅也承丑之季故謂之次氣也雞為畜陽也丑之季向晨鳴雞得其氣感之而喜故鳴也周書曰大寒之日雞始乳易通卦驗曰萬民聞雞鳴皆翹首結帶正衣裳史記曰子路性鄙好勇力冠雄雞佩假豚陵暴孔子孔子乃設禮義稍誘之子路乃委質請為弟子又曰孟嘗君至關關法雞鳴出客孟嘗君客之居下坐者有能為雞鳴遂發傳出又曰越巫立越祀而以雞卜上信之漢書曰徵昌邑王賀到濟陽求長鳴雞又曰昌邑王之立為皇太子私置雞豚以食又曰龔遂為渤海太守使人家養五雞又曰王奉先好鬭雞宣帝微時數與奉先會後即位以其女為婕妤立為皇后奉先封侯又曰方士曰益州有金馬碧雞之寶可祭祀致也宣帝使王褒往祀焉范曄後漢書曰河南樂羊子妻不知何氏女嘗有他舍雞謬入垣內姑盜殺食之妻對不食而泣怪問之妻曰自傷居貧使食他肉姑竟棄之後漢書曰范式字巨卿與汝南張元伯為友二人春到京以暮秋為期元伯以九月十五日殺雞炊黍以待巨卿母謂元伯曰相去千里汝何信之審也言未畢而巨卿至相隨升堂再拜母極悅九州春秋曰魏王入漢中討劉備不得進欲守復難意欲棄之乃發令云雞肋官屬不知主簿楊脩曰夫雞肋棄之則可惜噉之無所得以比之漢中王欲去也白戒嚴王遂還吳錄曰魏文帝遣使於吳求長鳴短鳴雞群臣以非禮欲不與孫權勑付使江表傳曰南郡獻長鳴承露雞南越志曰雞冠四間如蓮花鳴清聲澈也魏志曰馬韓國出細尾雞其尾皆五尺餘郭頒魏晉世語曰劉放孫資共典樞要夏侯獻曹肇心內不平殿中有雞棲樹二人相謂此亦久矣其能復幾指謂中書監劉放中書令孫資王隱晉書曰郄詵母病若車及亡不欲車葬而貧無以得馬乃養雞種蒜竭其方術喪過三年得馬八匹舉棺至冢晉書曰祖逖與劉琨俱為司州王簿情好綢繆共被同寢中夜聞雞鳴蹴琨覺曰此非惡聲因起舞又曰桓玄既被殺安帝反正其餘擁眾假號皆平桓氏遂滅元興中衡陽有雌鷄化為雄八十日而冠萎及玄建國於楚衡陽屬焉自篡至敗凡八旬矣晉中興書曰殷浩北伐江逌為長史及丁零反叛浩令逌伐之乃取數百雞以長繩連之腳皆繫火一時驅放群雞駭散飛過壍集羌營皆燃因其驚亂縱兵擊之晉書庾征西翼書少時與右軍齊名右軍後進庾猶不分, krp: 鳬鷖}
