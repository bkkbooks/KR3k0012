  body:
  - {type: variant, offset: 3, length: 37, content: 五雞春秋運斗樞曰玉衡星散為雞周禮春官上大宗伯曰工商執雞鄭玄曰取其守時而動也, SBCK: 六鵝鴨鶩鳬鵝}
  - {type: variant, offset: 3, length: 37, content: 五雞春秋運斗樞曰玉衡星散為雞周禮春官上大宗伯曰工商執雞鄭玄曰取其守時而動也, WYG: 六鵝鴨鶩鳬鵝}
  - {type: variant, offset: 3, length: 0, content: '', krp: 六鵝鴨鶩鳬鵝禮記内則曰舒鴈翠鄭玄注曰翠尾舒鴈鵝也謂不利人爾雅曰鵱鷜鵝郭璞曰今之野鵝舒鴈鵝郭璞曰出如舒鴈今江東呼􅕯音加廣雅曰鴐鵝野鵝也吴志曰景帝有疾使巫視鬼欲試之乃殺一鵝埋之於苑中架屋施床几以婦人服物着上乃使巫視之若能說此家中婦形狀者加賞此巫視日竟晝夕無所道帝催問之急乃曰實不見有鬼但見一頭白鵝在墓上所以不即白疑是神鬼變化而作定無復改易不知何故景帝乃厚賜之晉書曰永嘉中洛陽東北歩廣里地䧟有二鵝出焉一白一蒼白者不能飛蒼者飛去董養字仲道歎曰昔有周時盟㑹狄泉即此地也蒼胡白國象其可盡言乎又曰劉毅家在京口酷貧甞與郷曲士大夫往東堂共射時庾恱爲司徒右長史要府州僚佐出東堂毅巳先至遣與恱相聞曰身並貧躓營一遊甚難君如意人無處不可爲適豈能以此堂見讓曰恱素豪徑前不荅時衆人並避唯毅留射如故恱厨饌甚盛不以及毅毅旣不去恱甚不歡毅又相聞曰身今年未得子鵝豈能以殘炙見惠恱又不荅及毅貴奏解恱都督將軍官深相挫辱恱不得志疽發背少日而卒宋書曰胡蕃爲髙祖從事征廣固累月未抜忽有鳥如鵝蒼黒色飛入髙祖帳裏衆皆駭愕蕃起賀曰蒼黑色者戎虜戎虜歸我大吉之祥也明旦攻城䧟之又曰孔静居山隂宋武微時往候之静時寢夢人語曰天子在門覺寤即遣人出看而帝適至静虚已接待乃留帝宿夜設粥無鮭新伏鵝卵令煑以爲食賊平以静爲奮威將軍又曰劉暄𥘉爲江夏王寳玄郢州行事執事過刻王妃索煑肫帳下諮暄暄曰旦巳煑鵝不煩復此寳玄恚曰舅殊無渭陽之情齊書曰下彬禽獸决録目云鵝性頑而慠盖比潘敞也又曰桂陽之役朝庭周章詔檄乆之未就髙帝引江淹入中書省先賜酒食淹素能飲啖食鵝炙垂盡進酒數升文誥亦辦南史曰何逺爲永康令人甚稱之太守王彬廵属縣諸縣皆盛供帳以待焉至武康逺獨設糗水而巳彬去逺送至境進斗酒隻鵝而別彬戯曰卿禮有遇陸納將不爲古人所笑乎三國典略曰庾信自建康遁歸江陵湘東王因賜妾徐氏妾與信弟掞私通掞欲求之無致言者信庭前有一蒼鵝乃繫書于鵝頸信視之乃掞啓遂題紙尾曰畜生乞汝唐書曰元和十二年李愬襲蔡州兵至懸瓠城夜半雪甚城旁有鵝鴨池愬令驚擊之以雜其聲列子曰黄帝與炎帝戰以鵰鴈鵝爲旗幟魯連子曰君鵝鴨有餘食士不足半菽孟子曰仲子以兄之禄爲不義避兄離母處於陵他日歸則有饋其兄生鵝者嚬曰惡用是鶂鶂者爲其母殺是鵝與之食其兄自外至曰是鶂鶂肉也出而吐之趙岐曰鶂鶂鵝聲也戰國䇿曰管燕得罪於齊王謂左右曰子孰能與我赴諸侯乎左右莫對管燕連然流涕曰悲夫士何其易得而難用也田需對曰士三食不得厭而君鵝鶩有餘食下宫曳綺縠而士不得以爲縁且財者君之所輕死者臣之所重君不肯以所輕與士而責之以所重事非士易得而難用也異苑曰傅承爲江夏守有一雙鵝失之三年忽引導得三十餘頭來向承家秦記曰符殷食鵝炙知黒白之處人不信旣而試之果然丗說曰㑹稽有孤居老姥養一鵝鳴喚清長時王逸少爲太守就求市之未得逸少乃携故親命駕共往觀之姥聞二千石當來即烹以待之逸少旣至殊喪往意歎息弥日俗記曰京下劉光禄飬好鵝劉後軍從京還鎮㝷陽以一雙鵝爲後軍別純蒼色頸長四尺許頭似龍此一雙鵝可堪}
  - {type: xml-element, offset: 4, content: '', id: KR3k0012_CHANT_919-bkkxmlele1}
  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_919-1a.1}
  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_919-1a.2}
  - {type: variant, offset: 4, length: 1, content: 雞, krp: 萬自後不復見有此類張鴻傳曰鴻爲慕容晃黄門𥘉刑鴻不熟頥下生黄鬚三根長寸餘乃遣出宫看鵝鴨沈玄鵝賦序曰先大夫俞頴川者殊精意於善鵝求得駿鵝類於張猛虎亦多好者于時有緑眼黄喙折翼頳頭然經頴川之好者焦叔明以太康中得大蒼鵝從喙至足四尺有九寸體色豊麗鳴聲驚人三年而爲暴犬所害惜其不終故爲賦云崔豹古今注曰夫鵝似鵠而大頸長八尺善闘好啖虵列異傳曰廬山左右常有野鵝數千爲群長老傳言甞有一狸食明日見狸喚於沙州之上如見繫縛南越志曰化蒙縣祠山上有湖湖中有泉鵝如今野鵝弄吭山泉故号爲泉鵝兩京記曰浄影寺沙門慧逺講經𥘉在郷養一鵝常隨逺聽經及逺入京留在寺晝夜鳴呼不止僧徒送入京至此寺大門放之自然知逺房便入馴狎毎聞講鍾即入堂伏聽若聞汎說他事鳴翔而出如是六年忽哀叫庭宇不肯入堂二旬而逺卒寺内有逺碑亦述其事嶺南異物志曰南道之酋豪多選鵝之細毛夾以布帛絮而爲𬒳復縱撗納之其温柔不下於挾纊也俗云鵝毛柔暖而性冷偏冝覆嬰兒而辟驚癎也雲南記曰韋齊休使雲南屯城驛西牆外有大池斗門垂栁夾䕃池中鵝鴨甚衆幽明録曰晉義熈中羗主姚略壞洛陽隂溝取塼得一隻雄鵝並金色交頸長鳴聲聞九臯臨海記曰郡東南有砶山髙三百餘丈望之如雪山上有湖古老相傳云金鵝之所集八挂所植下有溪金光煥然又曰郡東有宴室山古老云越王時山上起望海舘山下有湖湖中有金鵝飛魚唐書曰貞觀二十年吐蕃遣其大臣禄東賛奉表曰聖天子定四方日月所照之國並爲臣妾而髙麗恃逺闕於臣禮天子自領百萬渡遼致討隳城䧟陣指日凱旋奴纔聞陛下發駕少選之間巳聞歸國鴈飛迅越不及陛下速疾奴黍預子婿喜百常夷夫鵝猶鴈也故作金鵝奉獻其鵝黄金鑄成髙七尺中可實酒三斛淮南子曰魯般墨子以木爲鵝而飛三日集而不可使爲工也唐書曰髙祖義兵至河東隋將堯君素城守時圍甚急君素乃爲木鵝置表於頸具論事勢浮之黄河下河陽守者得之逹於東都越王侗見而歎息鴨爾雅曰舒鳬鶩也郭璞曰鴨也廣雅曰鳬鶩鴨也魏氏}
