  - {type: variant, offset: 947, length: 0, content: '', WYG: 故景帝乃厚賜之晉書曰永嘉中洛陽東北步廣里地陷有二鵝出焉一白一蒼白者不能飛蒼者飛去董養字仲道歎曰昔有周時盟㑹狄泉即此地也蒼胡白國象其可盡言乎又曰劉毅家在京口酷貧嘗與鄉曲士大夫往東堂共射時庾恱為司徒右長史要府州僚佐出東堂毅已先至遣與恱相聞曰身並貧躓營一逰甚難君如意人無處不可為適豈能以此堂見讓耶恱性素豪徑前不荅時衆人並避唯毅留射如故恱厨饌甚盛不以及毅毅既不去恱甚不懽毅又相問曰身今年未得子鵝豈能以殘炙見惠恱又不荅及毅貴奏解恱都督將軍官深相挫辱恱不得志疽發背少日而卒宋書曰胡蕃為髙祖從事征廣固累月未拔忽有鳥如鵝蒼黑色飛入髙祖帳裏衆皆駭蕃起賀曰蒼黑􅕎色者戎也戎既歸我大吉之祥也明旦攻城陷之又曰孔静居山隂宋武㣲時往候之静時寢夢人語曰天子在門覺寤即遣人出看而帝適至静虚已接待乃留帝宿夜設粥無鮭新伏鵞卵令煮以為食賊平以静為奮威将軍南史曰劉暄初為江夏王寳𤣥郢州行事執事過刻王妃索煮肫帳下諮暄暄曰旦已煮鵝不煩復此寳𤣥恚曰舅殊無渭陽之情齊書曰卞彬禽獸決録目云鵝性頑而傲盖比潘敞也又曰桂陽之役朝廷周章詔檄久之未就髙帝引江淹入中書内省先賜酒食淹素能飯啖食鵝炙垂盡進酒數升文誥亦辦南史曰何逺為武康令人甚稱之太守王彬廵屬縣諸縣皆盛供帳以待焉至武康逺獨設糗水而已彬去逺送至境進斗酒隻鵝而别彬戲曰卿禮有過陸納將不為古人所笑乎三國典畧曰庾信自建康遁歸江陵湘東王因賜妾徐}
