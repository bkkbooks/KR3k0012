  - {type: variant, offset: 951, length: 0, content: '', WYG: 一狸食鵝明日狸喚於沙州之上如見繫縛南越志曰化䝉縣祠山上有湖湖中有泉鵝如今野鵝弄吭山泉故號為泉鵝兩京記曰浄影寺沙門慧逺講經初在鄉養一鵝常隨逺聽經及還入京留在寺晝夜鳴呼不止僧徒送入京至此寺大門放之自然知逺房便入馴狎每聞講經即入堂伏聽若聞泛說}
  - {type: variant, offset: 952, length: 3, content: 舍雞謬, WYG: 事鳴翔而出如是六年忽哀呌庭宇不肯}
