  - {type: punctuation, offset: 26, content: 「, id: KR3k0012_CHANT_919-bkkpn12}
  - {type: variant, offset: 26, length: 7, content: 工商執雞鄭玄曰, krp: 有白虎七變法取三月三日殺虎血鴨血等合和之𥘉生草似胡麻者生}
  - {type: punctuation, offset: 30, content: 。, id: KR3k0012_CHANT_919-bkkpn13}
  - {type: punctuation, offset: 30, content: 」, id: KR3k0012_CHANT_919-bkkpn14}
  - {type: 'tls:seg', offset: 30, content: '', id: KR3k0012_CHANT_919-1a.7}
  - {type: punctuation, offset: 33, content: ：, id: KR3k0012_CHANT_919-bkkpn15}
  - {type: 'tls:seg', offset: 33, content: '', id: KR3k0012_CHANT_919-1a.8}
  - {type: punctuation, offset: 33, content: 「, id: KR3k0012_CHANT_919-bkkpn16}
  - {type: variant, offset: 35, length: 2, content: 守時, krp: 實合之可以移形易皃西京雜記曰髙祖旣作新豐并移舊社放犬羊雞鴨於通途亦競識其家傳子曰鴨足何以眅雞足何以盺眅吾不知也何况問天地乎金樓子曰海鴨大如常鴨班白文亦謂之交鳥洞冥記曰武帝昇望月臺南端有三青鴨飛俄}
  - {type: variant, offset: 38, length: 1, content: 動, krp: 下帝恱之至夕鴨宿於臺端化爲三小童皆著青綺文𥜗各執鯨文大錢五枚置帝几前風俗通曰雞伏鴨卵鶵成入水雞母隨岸呼之鶵出而隨母鴨雞異類能相隨}
  - {type: punctuation, offset: 40, content: 。, id: KR3k0012_CHANT_919-bkkpn17}
  - {type: punctuation, offset: 40, content: 」, id: KR3k0012_CHANT_919-bkkpn18}
  - {type: xml-element, offset: 40, content: '', id: KR3k0012_CHANT_919-bkkxmlele6}
  - {type: xml-element, offset: 40, content: '', id: KR3k0012_CHANT_919-bkkxmlele7}
  - {type: 'tls:seg', offset: 40, content: '', id: KR3k0012_CHANT_919-2a.1}
  - {type: 'tls:seg', offset: 40, content: '', id: KR3k0012_CHANT_919-2a.2}
  - {type: punctuation, offset: 40, content: 《, id: KR3k0012_CHANT_919-bkkpn19}
  - {type: variant, offset: 40, length: 1, content: 禮, krp: 博物志曰中諸藥毒巳死者取生鴨斷頭以鴨項内病者口中得血三兩滴入喉中即蘇也語林曰傅信貧母羸病恒驚悸信乃取雞鴨滅毛放承塵上行落地毋轉恐怖石崇金谷詩序曰吾有廬在河南金谷中去城十里有田十頃羊二百口雞猪鵝鴨之属莫不畢備㝷陽}
  - {type: punctuation, offset: 42, content: ‧, id: KR3k0012_CHANT_919-bkkpn20}
  - {type: variant, offset: 42, length: 26, content: 曲禮下曰祭宗廟之雞曰翰音又月令曰季冬之月雉雊雞乳又內, SBCK: 内}
  - {type: variant, offset: 42, length: 26, content: 曲禮下曰祭宗廟之雞曰翰音又月令曰季冬之月雉雊雞乳又內, WYG: 内}
