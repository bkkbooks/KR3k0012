  - {type: variant, offset: 2182, length: 3, content: 丹子曰, SBCK: 來寧爾酒旣清爾殽旣馨公尸}
  - {type: variant, offset: 2182, length: 224, content: 丹子曰燕太子丹質於秦逃歸到關丹為雞鳴遂得逃歸尸子曰戰如鬭雞勝者先鳴韓子曰使雞司夜令狸執鼠皆用其能淮南子曰雄雞夜啼庫兵動而戎馬驚淮南萬畢術曰孤桃之象令雞夜鳴取孤桃南北行枝長三尺折以為象塗以三歲雄血夜居栖下戰國策曰秦惠王謂寒泉子曰蘇秦欺獘邑欲以一人智反覆山東之君夫諸侯之不可一猶連雞之不能俱止於栖也呂氏春秋曰善學者若齊王之食雞也食其距數千而後足又曰白圭謂魏王曰市丘之鼎以烹雞多洎之則淡而不可食市丘魏邑肉汁曰洎少洎之則焦而不熟然而視之蝺焉羹無所可用蝺者齲, krp: 飲福禄來爲}
