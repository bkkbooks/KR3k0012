  - {type: variant, offset: 1042, length: 1, content: 審, SBCK: 所集八挂所植下有溪金光煥然又曰郡東有宴室山古老云越王時山上起望海舘山下有湖湖中有金鵝飛魚唐書曰貞觀二十年吐蕃遣其大臣禄東賛奉表曰聖天子定四方日月所照之國並爲臣妾而髙麗恃逺闕於臣禮天子自領百萬渡遼致討隳城䧟陣指日凱旋奴􅂊聞陛下發駕少選之間巳聞歸國鴈飛迅越不及陛下速疾奴􅁰預子婿喜百常夷夫鵝猶鴈}
