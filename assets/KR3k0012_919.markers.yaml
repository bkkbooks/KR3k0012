  - {type: variant, offset: 2574, length: 1727, content: 雒陽人也居尸鄉北山下養雞皆有名字千餘頭暮栖樹晝放散食欲取呼名即至販雞及子得千萬錢輒置錢去論衡曰傳書言淮南王得道畜皆仙犬吠天上雞鳴雲中陳子要言棄晨雞犬俟鳳警亦猶棄當世之實才須故人之執政也太元經曰雌雞鳴晨雄雞宛頸隋侯墮井河伯除川風俗通曰呼雞朱朱俗說雞本朱公化而為之今呼雞者朱朱也謹桉說文解喌喌二口為讙州其聲也讀若祝祝者誘致禽畜和順之意喌與朱音相似耳又曰臘除夕以雄雞著門上以和陰陽按今人卒病皆殺雄雞傅其心病風者雞散治之東門雞頭治蠱信善也異苑曰朱文繡與羅子鍾為友俱仕於梁繡既死羅鍾哭之其夜俱亡梁南七里有雞山葬繡於其中北九里有雉澗埋鍾於其內繡神靈變為雞鍾魂魄化為雉清鳴哀響來往不絕故詩曰雞山別飛響雉澗和清音荀悅申鑒曰覩孺子之驅雞而見御民之術孺子之驅雞急則驚緩則滯馴而安之然入門嵇康宅無吉凶論曰天同栖之雞一攔之羊賓至而有死者豈異之哉幽明錄曰晉兗州刺史沛國宋處宗嘗買得一長鳴雞愛養甚至栖籠著窗間雞遂作人語與宗談語極有言致終日不輟處宗因此言功大進越絕書曰雞山勾踐以畜雞將伐吳以食死士也吳越春秋曰婁門外雞陂墟者吳王牧雞處西河記曰涼州罪人於市將刑忽有一白雄雞飛於人邊請命引頸長鳴伏地向吏驅之去輒來刺史張義免其坐王子年拾遺記曰太初二年月氏貢雙頭雞四足一尾鳴則俱鳴又曰含塗國去王都七萬里人善服鳥獸雞犬皆使能言郭子撗洞冥記曰有遠飛雞夕則還依人曉則絕飛四海外朝往夕還裴玄新言曰正朝縣官殺羊懸其頭於門又磔雞以副之俗說以厭厲或以問河南任君任君曰是月土氣上升草木萌動羊齧百草雞啄五榖故殺之以助生氣崔寔四民月令曰十二月東門磔白雞頭可以合藥本草經曰丹雞一名載丹又曰烏雄雞主補中其血治踒折骨凡雞肉不食小兒令生蚘蟲又令消髓葛洪方曰五月七日深井深冢多有毒氣不可入也宜先以雞毛試投井中直下無毒毛迴四邊不可入也師曠占曰長吏乘車出入行步道上有雞飛集車上者雄遷雌去雜五行書曰欲求婦取雄雞兩毛燒著酒中飲之所求必得用戊子日此是天地合日必得三往不得女當死龍魚河圖曰玄雞白頭食病人雞有六指亦殺人雞有五色殺人焦贛易林旅之爻曰十雉百鶵常與母俱抱雞捕虎誰者為怙又歸妹之無妄曰雞方啄粟為狐所逐走不得息惶懼喘息又歸妹之損曰爭雞失羊亡其金囊利得不長又巽之遯曰三雞啄粟十鶵從養飢鵝卒擊亡其兩寂廣志曰雞有胡溝五指金骹及翹之種大者蜀小者荊白雞金體者美舊并州所獻吳中送長鳴雞長倍於常雞永昌郡無雞異物記曰伺潮雞潮水上則鳴博物志神農本草經曰雞卵可以作虎魄法取茯苓雞卵黃白渾雜者熟煮之及尚軟隨意刻作物形以苦酒漬數宿既堅內著粉中假者乃亂真此世所恒用作無不成也干寶搜神記曰安陽城南有亭宿者輒死書生明術數入亭宿端坐誦書夜半有人著皁衣來戶外呼亭主此有宿客耶應曰然喑嗟而去須臾有赤衣問如前生問曰向黑衣者誰荅曰北舍母豬赤幘者誰荅曰西舍老雄雞也汝是誰荅曰我是老蠍也明旦掘之得蠍大如琵琶身長四尺并及豬雞亭遂安靜劉欣期交州記曰長鳴雞出日南南州異物志曰狼盲之雞特稟異聲狼盲地名白澤圖曰老雞能呼人姓名殺之則止又曰雞有四距重翼者龍也殺之震死夢書曰雞為武吏有冠距也夢見雄雞憂武吏也眾雞入門吏所捕也群鬭舍中驚兵怖也論墓書曰養白雞令識其主聲形以五月五日九月九日任意用五色綵長五寸係雞頸將雞於名山放雞著山仰頭呪曰必存鳴晨雞心開悟沈懷遠南越志曰雞冠四開如蓮花鳴聲清徹也荊楚歲時記曰正月一日三元之日雞鳴而起先於庭中爆竹帖畫雞或斲鏤五彩及雞於戶上風土記曰乃有雞子五薰練形正旦皆會生吞雞子一個謂之練形又晨噉五辛以助五藏氣吳錄曰合浦朱虛縣有山雞黑色樹栖魏志曰平原太守劉邠印囊及山雞毛著器中使管輅筮輅曰內方外圓五色成文含寶守信出則有章此即囊也高岳巖巖有鳥朱身羽翼玄黃鳴不失晨此山雞毛也異苑曰山雞愛其毛羽映水則儛魏武時南方獻之帝欲其鳴舞而無由公子蒼舒令人取大鏡著其前雞鑑形而儛不知止遂至死韋仲將為之賦甚美博物志曰山雞有美毛自愛其毛終日映水目眩則溺臨海異物志曰山雞狀如人家雞安陽諸山中多此雞恃距好鬭當時以家雞置其處取即可得南越志曰曾城縣多鵔鸃鵔鸃山雞也利距善鬭世以家雞鬭之可禽也光色鮮明五采炫燿辛氏三秦記曰陳倉山在太白之西去長安八百里上有石雞與山雞各別趙高使燒山山雞飛去石雞不去晨鳴山頭聲聞三十里或云是玉雞陳倉城上有神雞人取不得雄者王雌者霸穆公得雌故霸山海經曰鷩雉一名山雞養之穰火左思吳都, SBCK: 蔡叔闘鳬}
