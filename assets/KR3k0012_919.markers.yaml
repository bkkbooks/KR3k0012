  - {type: variant, offset: 990, length: 2, content: 范式, SBCK: 永嘉中洛陽東北歩廣里地䧟有二鵝出焉一白一蒼白者不能飛蒼者飛去董養}
  - {type: variant, offset: 990, length: 7, content: 范式字巨卿與汝, WYG: 貞觀二十年吐蕃遣其大臣禄東輦賛奉表曰聖天子定四方日所照之國並為臣妾而高麗恃逺闕於臣禮天子自領百萬渡遼致討隳城陷陣指日凱旋奴甫聞陛下發駕少選之間已聞歸國鴈飛迅速不及陛下速疾如忝預子壻喜百常夷夫鵞猶鴈也故作金鵞奉獻其鵞黄金鑄成髙七尺中可實酒三斛淮}
