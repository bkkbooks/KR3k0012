  - {type: variant, offset: 1962, length: 1, content: 劉, SBCK: 齊王祐太宗第五子好養鴨未反前忽有野狸入籠中咬四十餘鴨皆斷其頭及敗同惡而誅者四十四人抱朴子曰有白虎七變法取三月三日殺虎血鴨血等合和之􅀄生草似胡麻者生取其實合之可以移形易皃西京雜記曰髙祖旣作新豐并移舊社放犬羊雞鴨於通途亦競識其家􅀓子曰鴨足何以眅雞足何以盺眅吾不知也何况問天地乎金樓子曰海鴨大如常鴨班白文亦謂之交鳥洞􅁳記曰}
  - {type: page-break, offset: 1962, content: '', id: KR3k0012_SBCK_919-6a}
  - {type: variant, offset: 1964, length: 0, content: '', SBCK: 帝昇望月臺南端有三青鴨飛俄而下帝恱之至夕鴨􅀫於臺端化爲三小童皆著青綺文􅃭各執鯨文大錢五枚置帝几前風俗通曰雞伏鴨􅆑鶵成入水雞母隨岸呼之鶵出而隨母鴨雞異􅀋能相隨也􅀶物志曰中諸藥毒巳死者取生鴨斷頭以鴨項内病者口中得血三兩滴入喉中即􅂫也語林曰傅信貧母羸病􅁪驚悸信乃取雞鴨滅毛放承塵上行落地毋轉恐怖石崇金谷詩序曰吾有廬在河南金谷中去城十里有田十頃羊二百口雞猪鵝鴨之属莫不畢備㝷陽記曰}
  - {type: page-break, offset: 1964, content: '', id: KR3k0012_SBCK_919-6b}
  - {type: variant, offset: 1965, length: 7, content: 父匡徙家馬邑嘗, SBCK: 訪}
