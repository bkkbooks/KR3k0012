  - {type: variant, offset: 11, length: 5, content: 玉衡星散為, krp: 司馬文王鎮許昌徴還擊姜維至京師帝於平樂觀臨軍與左右小臣謀因文王辭劒之巳書詔文王入帝方食粟優人雲午等唱曰青頭}
  - {type: punctuation, offset: 17, content: 。, id: KR3k0012_CHANT_919-bkkpn5}
  - {type: punctuation, offset: 17, content: 」, id: KR3k0012_CHANT_919-bkkpn6}
  - {type: xml-element, offset: 17, content: '', id: KR3k0012_CHANT_919-bkkxmlele4}
  - {type: xml-element, offset: 17, content: '', id: KR3k0012_CHANT_919-bkkxmlele5}
  - {type: 'tls:seg', offset: 17, content: '', id: KR3k0012_CHANT_919-1a.5}
  - {type: punctuation, offset: 17, content: 《, id: KR3k0012_CHANT_919-bkkpn7}
  - {type: variant, offset: 17, length: 1, content: 周, krp: 青頭雞者鴨也帝懼不敢發景王因是謀廢帝江表傳曰魏文帝遣使求闘鴨群臣奏冝勿與權曰彼在諒闇之中所求若此豈可與言}
  - {type: punctuation, offset: 19, content: ‧, id: KR3k0012_CHANT_919-bkkpn8}
  - {type: variant, offset: 19, length: 2, content: 春官, krp: 哉具以與使者吴志曰建昌侯孫慮於堂前作鬪鴨欄頗施小巧陸遜正色曰君侯冝勤覽經典用此何爲慮即毀之陳書曰齊人渡江至玄武湖西北莫府山南我軍自覆舟東移頓郊壇北與齊人對是時食盡調市人餽軍皆是麥屑爲飯以荷葉褁而分給兵士皆困㑹文帝遣送米三千石鴨千頭帝即炊米煑鴨誓申一戰將士及防身計粮數臠人人褁飯嫓以鴨肉帝命衆軍蓐食攻之齊軍大潰三國典略曰髙徳衆正相齊未誅之前家有赤鴨群行於庭犬來逐遂成碎血北史曰元善以髙頴有宰相之具常言於}
  - {type: punctuation, offset: 22, content: ‧, id: KR3k0012_CHANT_919-bkkpn9}
  - {type: variant, offset: 22, length: 1, content: 大, krp: 曰楊素麁踈蘇威怯愞元胄元昊正似鴨耳可以付社稷者唯獨髙頴上𥘉然之唐書曰齊王祐太}
  - {type: variant, offset: 24, length: 1, content: 伯, krp: 第五子好養鴨未反前忽有野狸入籠中咬四十餘鴨皆斷其頭及敗同惡而誅者四十四人抱朴子}
  - {type: punctuation, offset: 25, content: 》, id: KR3k0012_CHANT_919-bkkpn10}
  - {type: punctuation, offset: 26, content: ：, id: KR3k0012_CHANT_919-bkkpn11}
