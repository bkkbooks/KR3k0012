  - {type: variant, offset: 1034, length: 0, content: '', SBCK: 子孰能與我赴諸侯乎左右莫對管燕連然流涕曰悲夫士何其易得而難用也田需對曰士三食不得厭而君鵝鶩有餘食下宫曳綺縠而士不得以爲縁且財者君之所輕死者臣之所重君不肯以所輕與士而責之以所重事非士易得而難用也異苑曰傅承爲江夏守有一􅀟鵝失之三年忽引導得三十餘頭來向承家秦記曰符殷食鵝炙知黒白之處人不信旣而試之果然丗􅀃曰㑹稽有􅀌居老姥養一鵝鳴喚清長時王逸少爲太守就求市之未得逸少乃携故親命駕共往觀之姥聞二千石當來即烹以待之逸少旣至殊喪往意歎息弥日俗記曰京下劉光禄飬好鵝劉後軍從京還鎮㝷陽以一􅀟鵝爲後軍別純蒼色頸長四尺許頭似龍此一􅀟鵝可堪五萬自後不復見有此􅀋張鴻傳曰鴻爲慕容晃黄門􅀄刑鴻不熟頥下生黄􅂡三根長寸餘乃遣出宫看鵝鴨沈􅀇鵝賦序曰先大夫俞頴川者殊精意於善鵝求得駿鵝􅀋於張猛虎亦多好者于時有緑眼黄喙折翼頳頭然經頴川之好者焦叔明以太康中得大蒼鵝從喙至足四尺有九寸體色豊麗鳴聲驚人三年而爲􅁀犬所害惜其不終故爲賦云崔豹古今注曰夫鵝似鵠而大頸長八尺善闘好啖虵列異傳曰廬山左右常有野鵝數千爲群長老傳言甞有一狸食明日見狸喚於沙州之上如見繫縛南越志曰化蒙縣祠山上有湖湖中有泉鵝如今野鵝弄吭山泉故号爲泉鵝兩京記曰浄影寺沙門慧逺講經􅀄在郷養一鵝常隨逺聽經及逺入京留在寺晝夜鳴呼不止僧徒送入京至此寺大門放之自然知逺房便入馴狎毎聞講鍾即入堂伏聽􅀂聞汎􅀃他事鳴翔而出如是六年忽哀叫庭宇不肯入堂二旬而逺卒寺内有逺碑亦述其事嶺南異物志曰南道之酋豪多選鵝之細毛夾以布帛絮而爲􅀍復縱撗納之其温柔不下於挾纊也俗云鵝毛柔暖而性冷偏冝覆嬰兒而辟驚癎也雲南記曰韋齊休使雲南屯城驛西牆外有大池斗門垂栁夾䕃池中鵝鴨甚衆幽明録曰晉義熈中羗主姚略壞洛陽隂溝取塼得一􅃗雄鵝並金色交頸長鳴聲聞九臯臨海記曰郡東南有砶山髙三百餘丈望之如雪山上有湖古老}
