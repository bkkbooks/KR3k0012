  - {type: variant, offset: 46, length: 2, content: 祭宗, krp: 周訪與啇人共入宫亭}
  - {type: variant, offset: 49, length: 0, content: '', krp: 宿明起如厠見一白頭翁訪逐之化爲雄鴨還舡欲煑之啇人争看遂飛去廣志曰野鴨雄者赤頭有距蔡氏化清經曰水戰之鴨何必白纓盈俎}
  - {type: variant, offset: 51, length: 0, content: '', krp: 何必長鳴新言}
  - {type: variant, offset: 52, length: 0, content: '', krp: 譬猛虎浮水不如鳬鴨騏驎登木不如猿猴太元經曰素嬰之鴨}
