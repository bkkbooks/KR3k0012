  - {type: variant, offset: 1586, length: 157, content: 唐虞分命羲和四子敬授民時高祖受命懲秦之弊與民休息逮至文景國家無事家給人足京師之錢累百巨萬貫杇而不可校太倉之粟陳陳相因充溢露積腐敗而不可食魏志曰梁習為并州二十餘年政治為天下最乃徵拜大司農吳志曰樓玄為大司農玄從九卿持刀衛正身率眾奉法而行應對切直數迕皓意漸見責怒後人誣曰玄與賀劭相逢駐共耳語大笑謗訕政事遂被詔詰責送付廣州, SBCK: 檀道論}
