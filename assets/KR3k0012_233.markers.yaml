  - {type: variant, offset: 1533, length: 12, content: 鄭玄公車徵為大司農給安車, SBCK: 嚴苞以髙才黃􅀄中入爲秘書丞數奏文賦帝甚異之晉書􅄞紹以父得罪靖居私門山濤領選啓武帝曰康誥有言父子罪不相及􅄞紹賢侔郄缺冝加旌命請爲秘書郎帝謂濤曰如卿所言乃堪爲丞何但郎也乃發詔徴之起家爲秘書丞王隱晉書曰􅁃峻字山甫􅀶學有才爲秘書丞遍觀古今聞見益優虞預晉書曰何禎字元幹廬江人也爲尚書郎特詔叅祕書丞祕書夲有}
