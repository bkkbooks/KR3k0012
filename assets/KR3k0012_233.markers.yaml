  - {type: 'tls:seg', offset: 1751, content: '', id: KR3k0012_CHANT_233-26a.4}
  - {type: variant, offset: 1752, length: 0, content: '', SBCK: 士季敏惠夙成時蔣濟著論謂觀其眸子可以知人㑹年五歳見濟濟大竒之正始中以賜官郎中爲秘書郎蜀志曰郄正字令先安貧好學􅀶渉墳籍弱冠能屬文入爲秘書史轉令史遷秘書郎性澹於榮利尢躭文章自司馬王楊班傳張蔡之儔遺文篇賦及當世美書善論益部有者則鑚鑿推求略皆寓目王隱晉書曰鄭黙字思}
  - {type: variant, offset: 1752, length: 0, content: '', krp: 士季敏惠夙成時蔣濟著論謂觀其眸子可以知人㑹年五歳見濟濟大竒之正始中以賜官郎中爲秘書郎蜀志曰郄正字令先安貧好學博渉墳籍弱冠能屬文入爲秘書史轉令史遷秘書郎性澹於榮利尢躭文章自司馬王楊班傳張蔡之儔遺文篇賦及當世美書善論益部有者則鑚鑿推求略皆寓目王隱晉書曰鄭黙字思}
  - {type: variant, offset: 1753, length: 5, content: 則出奔曹爽, SBCK: 爲秘書郎刪省舊文除其浮穢時陳留虞松爲中書令謂黙曰而今而後朱紫别矣又曰左思專思三都賦杜絶人事自以所見不􅀶求爲秘書郎虞預晉書曰司馬彪少篤學不倦好色薄行不交人事專精學問大始中爲秘書郎後轉爲丞晉太康起居注曰秘書丞桓石綏啓校定四部書詔郎中四人各掌一部晉令}
