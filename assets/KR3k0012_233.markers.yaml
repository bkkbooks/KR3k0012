  - {type: variant, offset: 666, length: 1226, content: 瑜後主立為大鴻臚為人靜嘿少言闔門自守不與世事吳志曰張儼字子節吳人也弱冠知名早歷顯位以愽聞多識拜大鴻臚使于晉皓謂儼曰南北通好以君有出境之才故相屈行對曰皇皇者華臣蒙其榮懼無古人延譽之美磨厲鋒鍔思不辱命既至車騎將軍賈充尚書令裴秀侍中荀勗等欲傲以所不知而不能屈尚書僕射羊祜尚書何禎並結縞帶之好唐書官品志曰鴻臚卿位視尚書右丞掌導護贊拜山濤啟事曰鴻臚職主胡事前後為之者率多不善了今缺當選御史中丞刀攸不審可爾不鴻臚少卿後魏職令曰鴻臚少卿第四品上第二清用雅學詳當明樞達理者隋書曰煬帝時蠻夷朝貢前後相屬帝從容謂宇文述虞世基等曰四夷率服觀禮華夏鴻臚之職須歸令望寧有多才藝美容儀可以接對賓客者為之乎咸以蘇夔對帝然之即日拜鴻臚少卿典屬國漢書曰武帝以移音移中監蘇武為典屬國又曰宣帝甘露二年以常惠為典屬國又曰典屬國秦官掌蠻夷降者成帝河平元年省併大鴻臚司農卿六典曰司農卿之職掌邦國倉儲委積之事惣上林太倉鉤盾導官四署與諸監之官屬謹其出納而修其職務少卿為之貳凡京都百司官吏祿廩皆仰給焉周禮曰冢宰有太府下大夫鄭玄注曰太府為王治藏之長若今司農矣史記曰韓信歸漢漢以為治粟內史漢書曰治粟內史秦官掌穀貨景帝更名大農令武帝更名大司農又曰鄭當時字莊為司農門下客至無貴賤無留門者執賓禮以下人山東諸公翕然稱莊曰吾聞鄭莊行千里不齎糧又曰朱邑為北海太守以治行第一入為大司農身為列卿居處節儉性公正不可交以私天子器之朝廷敬焉及卒詔稱揚其節行賜邑子黃金百斤以奉其祭祀又曰田延年為大司農坐盜都內錢三千萬自殺又曰平帝元始元年改大司農曰羲和以劉歆為之東觀漢記曰劉據為大司農以職事被譴召詣尚書將加捶撻尚書左雄諫帝曰九卿位亞三公行則鳴玉孝明永平始加扑罰非古制也帝從之卿於是始免扑捶又曰高詡字季回以儒學徵拜大司農在朝以清白方正稱又曰羊融字子優為大司農性明達稱為名卿續漢書曰李固為大司農上信閹官天下牧守多其宗親舊故及受貨賂有詔特拜不由選試亂生彌甚固乃上表具陳盜賊所以興由官非其人也又曰大司農卿一人中二千石掌諸錢穀金帛又曰趙典字仲經為大司農閉門却掃非德不交又曰耿國字叔慮為大司農曉邊事能論議數上便宜事天子器之又曰鄭玄公車徵為大司農給安車一乘所過長吏送迎張璠漢記曰陳寵為廣漢太守風聲大行入為大司農應劭漢官儀曰大司農古官也唐虞分命羲和四子敬授民時高祖受命懲秦之弊與民休息逮至文景國家無事家給人足京師之錢累百巨萬貫杇而不可校太倉之粟陳陳相因充溢露積腐敗而不可食魏志曰梁習為并州二十餘年政治為天下最乃徵拜大司農吳志曰樓玄為大司農玄從九卿持刀衛正身率眾奉法而行應對切直數迕皓意漸見責怒後人誣曰玄與賀劭相逢駐共耳語大笑謗訕政事遂被詔詰責送付廣州晉陽秋曰司農梪範字元則出奔曹爽云大司農印在吾手中所在得開倉而食宋書曰大司農卿一人書稱棄后稷其職也齊職儀曰司農卿耕籍則掌其禮儀隋書曰趙元淑轉頴川太守甚有惠政因入朝會司農不時納諸郡租穀元淑奏之帝謂元淑曰如卿意者幾日當了元淑曰如臣意不過十日帝即日拜元淑為司農卿納天下租如言而了帝悅焉唐書官品志曰司農卿位視, WYG: ''}
