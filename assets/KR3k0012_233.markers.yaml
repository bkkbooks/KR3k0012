  - {type: variant, offset: 3155, length: 2, content: 任用, WYG: 遣凌流稱青土蓋亦由基協和}
  - {type: variant, offset: 3158, length: 252, content: 物則以時出貨其沒官物者亦如之韋昭辯釋名曰釋云平准令主染色色有常平之法淮的之也辯云主平物價使相依准史記曰桑弘羊以物多騰躍請置平准於京師受天下委輸盡籠天下之貨物貴則賣之賤則買之如此則富啇大賈無所牟大利矣始置平准焉漢書百官表曰司農屬官有平准令丞漢書曰趙廣漢清潔下士有名譽州舉茂才拜平准令續漢書曰平准令六百石齊職儀曰染署掌染繒色少昊置五雉為工正翬雉氏設五色之工周有染人之職掌絲帛以為服左右藏令六典曰左藏令掌邦國庫藏之事丞為之貳凡天下賦調先於輸場閱其合尺度斤兩者卿及御史監閱然後納于庫藏皆題以州縣年月以別麤良辯新舊, WYG: 輔}
