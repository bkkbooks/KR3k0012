  - {type: variant, offset: 484, length: 4, content: 德儒清河, SBCK: 義伯散􅀐常侍領秘書􅁥撰皇覽魚豢魏略曰蘭臺臺也而秘書署耳王隠晉書曰王沉爲秘書􅁥著魏書多爲時諱而善序事又曰羊祐爲黃門郎陳留王立以少帝不願爲侍臣徙爲秘書􅁥又曰惠帝永平元年詔云秘書􅁥綜理經籍考校古今課試署吏領有四百人冝專其事鄧粲晉紀華譚爲秘書自􅀒宿名意毎怏怏嘗從容謂上曰臣老於秘閣矣汲黯之言復存今日上不恱晉諸公讃曰荀朂領秘書監太康二年汲郡􅃁中得竹書朂躬自撰次注冩以爲中經列於秘書經傳闕文多所證明又讃曰􅁃峻自司空長史遷秘書監幽讃符命天文地理因有述焉何法盛晉中興書曰孫盛字安國爲秘書監篤尚好學自少及長常手不釋卷旣居史官乃著三國陽秋沈約宋書百官志曰秘書監丞各一人郎四人魏武建國有秘書令左右丞黃􅀄中分秘書立中書而秘書之局不廢昔漢武帝建藏書之􅁽置寫書之官於是天下文籍皆在天禄石渠延閣廣内秘府之室謂之秘書至成哀世使劉向父子以夲官典其事至于後則圖籍在}
  - {type: page-break, offset: 484, content: '', id: KR3k0012_SBCK_233-1b}
  - {type: page-break, offset: 484, content: '', id: KR3k0012_SBCK_233-2a}
  - {type: variant, offset: 484, length: 181, content: 德儒清河東武城人也遷大鴻臚龜茲王遣侍子來朝廷嘉其遠至襃賞其王甚厚餘國各遣子來朝問使連蜀林恐所遣或非真的權取䟽屬賈胡因通使命利得印綬而道路護送所損滋多勞所養之民資無益之事為夷狄所笑此曩時之所患也乃移書燉煌諭旨并錄前世待遇諸國豐約故事使有恒魏略曰韓宣字景然為大鴻臚始南陽曲阜韓暨以宿德在宣前為大鴻臚及宣在官亦稱職故鴻臚中為之語曰大鴻臚小鴻臚前後治行相曷如蜀志曰杜瓊字, WYG: 義}
  - {type: variant, offset: 484, length: 4, content: 德儒清河, krp: 義伯散騎常侍領秘書監撰皇覽魚豢魏略曰蘭臺臺也而秘書署耳王隠晉書曰王沉爲秘書監著魏書多爲時諱而善序事又曰羊祐爲黃門郎陳留王立以少帝不願爲侍臣徙爲秘書監又曰惠帝永平元年詔云秘書監綜理經籍考校古今課試署吏領有四百人冝專其事鄧粲晉紀華譚爲秘書自負宿名意毎怏怏嘗從容謂上曰臣老於秘閣矣汲黯之言復存今日上不恱晉諸公讃曰荀朂領秘書監太康二年汲郡冡中得竹書朂躬自撰次注冩以爲中經列於秘書經傳闕文多所證明又讃曰庾峻自司空長史遷秘書監幽讃符命天文地理因有述焉何法盛晉中興書曰孫盛字安國爲秘書監篤尚好學自少及長常手不釋卷旣居史官乃著三國陽秋沈約宋書百官志曰秘書監丞各一人郎四人魏武建國有秘書令左右丞黃𥘉中分秘書立中書而秘書之局不廢昔漢武帝建藏書之冊置寫書之官於是天下文籍皆在天禄石渠延閣廣内秘府之室謂之秘書至成哀世使劉向父子以夲官典其事至于後則圖籍在}
