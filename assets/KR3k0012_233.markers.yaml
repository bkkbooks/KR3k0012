  - {type: variant, offset: 2033, length: 496, content: 曰兩都是朕東西二宅也今之宮館隋代所造歲序既淹漸將頹頓欲有修造又費財力如何弘機奏曰臣任司農向已十年前後省費今見貯錢三千萬貫若以供葺理可不勞而就也上大悅上林苑令漢書百官表曰水衡屬官有上林令續漢書曰上林苑令六百石主苑中禽獸有民居皆主之捕得獸送太官李郃別傳曰郃以郎謁者為上林苑令揚雄上林苑令箴曰芒芒天田芃芃作穀山有陵陸野有林麓夷原汙藪禽獸攸伏魚鼈以時芻堯咸植國以殷富民以家給太倉令六典曰太倉署令掌九穀廩藏之事丞為之貳凡鑿窖置屋皆銘甎為庾斛之數與其年月日受領粟官吏姓名又立碑如其銘焉漢書曰淳于意為太倉令續漢書曰太倉令一人秩六百石主受郡國轉漕穀梁冀別傳曰太倉令秦宮出入冀妻壽所語言飲食獨往獨來屏去御者宮冀倉頭壽姉夫宗忻不知書因壽氣力起家拜太倉令齊職儀曰太倉令周司徒屬官有廩人倉人則其職也導官令六典曰導官令掌導擇米麥之事凡有九穀之用皆隨其精麤差其耗損而供之漢書百官表曰少府屬官有導官如淳曰太官之別主酒也續漢書曰導官令一人主舂御米及作乾糒導擇也太府卿六典曰太府卿之職掌邦國賦貨之事惣京都四市平准左右藏常平八署之官屬舉其綱目修其職務少卿為之貳以二法平物一曰度量二曰權衡周禮曰天官屬有太府下大夫掌貢賦受其貨賄之入, SBCK: ''}
