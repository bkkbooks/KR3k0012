  - {type: variant, offset: 2689, length: 1, content: 品, WYG: 任重選重而舉厯代攸難守秘書監顔師古體業淹和器用詳敏學總流略詞兼典麗職司圖書亟經嵗序朱紫既辨著述有成宜正名器允兹望實可秘書監秘書少監唐書曰周思茂者貝州漳南人少與弟思鈞俱早知名自右史轉太子舎人與范履冰在禁最蒙親遇至於政事損益多參預焉累遷麟臺少監崇文館學士垂拱四年下獄又曰王紹宗揚州江都人也遷秘書少監仍侍皇太子讀書紹宗性澹雅以儒素見稱當時朝廷之士咸敬慕之張易之兄弟亦厚之伏誅紹宗坐以交往見廢又曰德宗以左諫議大夫史館脩撰張薦為秘書監脩撰如故時裴延齡貴欲異同宰府乃言於上曰諫議大夫論朝廷得失之官史館修撰書朝廷得失之事則領史職者不宜為諫官故有斯命秘書丞魏}
