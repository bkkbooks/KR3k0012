  - {type: variant, offset: 1748, length: 3, content: 農梪範, SBCK: 徒王朗辟基凌又不遣朗書却州曰取宿衛之臣留秘閣之吏所希聞也凌猶不遣凌流稱青土盖亦由基恊和之輔也又曰鍾㑹}
  - {type: page-break, offset: 1748, content: '', id: KR3k0012_SBCK_233-6b}
  - {type: variant, offset: 1748, length: 3, content: 農梪範, krp: 徒王朗辟基凌又不遣朗書却州曰取宿衛之臣留秘閣之吏所希聞也凌猶不遣凌流稱青土盖亦由基恊和之輔也又曰鍾㑹}
