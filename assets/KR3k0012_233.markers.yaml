  - {type: variant, offset: 3413, length: 3, content: 右藏署, WYG: 鍾會字士季敏惠夙成時蔣濟著論謂觀其眸子可以知人會年五嵗見濟濟大竒之正始中以賜官郎中為秘書郎蜀志曰郄正字}
  - {type: variant, offset: 3417, length: 0, content: '', WYG: 先安貧好學博涉墳籍弱冠能屬文入為秘書史轉令史遷秘書郎性澹於榮利尤躭文章自司馬王楊班傅張蔡之儔遺文篇賦及當世美書善論益部有者則鑽鑿推求略皆寓目王隱晉書曰鄭黙字思元為秘書郎刪省舊文除其浮穢時陳畱虞松為中書令謂黙曰而今而後朱紫别矣又曰左思專思三都賦杜絶人事自以所見不博求為秘書郎虞預晉書曰司馬彪少篤學不倦好色薄行不交人事專精學問泰始中為秘書郎後轉為丞晉太康起居注曰秘書丞桓石綏啟校定四部書詔郎中四人各}
  - {type: page-break, offset: 3417, content: '', id: KR3k0012_WYG_233-11a, image: WYG0895/WYG0895-0156c.png}
  - {type: variant, offset: 3418, length: 4, content: 邦國寶貨, WYG: 一部晉令曰秘書郎掌中外三閣經書覆省校閱正定脫誤沈約宋書曰秘書郎四人後漢校書郎也又曰蕭慧開雖貴戚而素服簡素初為秘書郎秘書著作並名家年少慧開意趣與}
  - {type: page-break, offset: 3418, content: '', id: KR3k0012_WYG_233-11b, image: WYG0895/WYG0895-0156d.png}
  - {type: variant, offset: 3423, length: 2, content: 事丞, WYG: 多不同比肩或三年不共語宋書曰王敬𢎞子恢之為秘書郎使求為奉朝請與恢之書曰秘書有限故有競朝請無限故無競吾欲使汝處無競之地文帝許之梁書曰張纘字伯緒為秘書郎固求不遷欲遍觀閣内圖籍後魏書曰髙謐字安平有文武才度天安中以功臣子召入禁中除秘書郎典秘閣謐以墳典殘缺奏廣訪郡邑大加繕寫由是代京圖籍莫不審正通典曰宋齊秘書郎皆四員尤為美職皆為甲族起家之選待次入補其居職例十日便遷又曰秘書郎自齊梁之末多以貴遊子弟}
