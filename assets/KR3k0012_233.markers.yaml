  - {type: variant, offset: 3117, length: 1, content: 市, WYG: 秘書丞銅印墨綬南史曰劉孝綽遷秘書丞武帝謂舎人周捨云第一官當用第一人故以孝綽居此職後魏書曰李彪字道固遷秘書丞分領著作事自武成帝已來至於太和崔浩髙允著述國書編年序錄為春秋之體遺落時事一二無存彪與秘書}
