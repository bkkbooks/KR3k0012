  - {type: variant, offset: 3081, length: 0, content: '', WYG: 嵇紹以父得罪靖居私門山濤領選啟武帝曰康誥有言父子罪不相及嵇紹賢侔郄缺宜加旌命請為秘書郎帝謂濤曰如卿所言乃堪為丞何但郎也乃發詔徵之起家為秘書丞王隱晉書曰庾峻字山甫博學有才為秘書丞遍觀古今聞見益優虞預晉書曰何楨字元幹廬江人也為尚書郎特詔參秘書丞秘書本有一丞時尚未轉遂以楨為右丞右丞之置自楨始也檀道論晉陽秋曰太元十八年王謐為秘書丞乃表前尚書殷允中書郎張敞太子後率郄儉之故太常桓}
  - {type: page-break, offset: 3081, content: '', id: KR3k0012_WYG_233-8b, image: WYG0895/WYG0895-0155b.png}
  - {type: variant, offset: 3082, length: 12, content: 苞賣鐵鄴市市長沛國趙元儒, WYG: 秀是多書之家請秘書郎分局採借齊書曰王儉字仲寶為秘書丞上表求校墳籍依七略撰七志四十卷獻之又曰張率字士簡吳郡人遷秘書丞髙祖曰秘書丞天下清官東南胄緒未有為之今以相處為卿定}
  - {type: page-break, offset: 3082, content: '', id: KR3k0012_WYG_233-9a, image: WYG0895/WYG0895-0155c.png}
