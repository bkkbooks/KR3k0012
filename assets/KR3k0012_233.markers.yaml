  - {type: variant, offset: 3119, length: 0, content: '', WYG: 髙祐始奏從遷固之體創為紀傳表志之目焉又曰李輔字伯尚少有重名髙祖毎云此李氏之千里駒勑撰太宗起居注尋遷秘書丞後}
  - {type: page-break, offset: 3119, content: '', id: KR3k0012_WYG_233-9b, image: WYG0895/WYG0895-0155d.png}
  - {type: variant, offset: 3120, length: 10, content: 有司廛肆師司市皆其任, WYG: 書曰栁虬為秘書丞時秘書雖領著作不參史事自虬為丞始令監掌焉王肅論秘書表云青龍中議秘書丞郎與博士議郎同職近日月宜在三臺上又曰秘書丞郎宜比尚書郎侍御史今侍御史乗犢車奏事用尺一秘書丞郎乘鹿車猶用尺奏恐非陛下崇儒之本意}
