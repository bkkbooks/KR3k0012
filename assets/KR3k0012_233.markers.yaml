  - {type: 'tls:seg', offset: 486, content: '', id: KR3k0012_CHANT_233-8a.4}
  - {type: variant, offset: 489, length: 0, content: '', SBCK: 觀有校書郎又有著作郎傳毅馬融之徒多爲校書郎又蔡邕從尚書選入東觀著作邕旣巳爲尚書郎而入東觀著作復拜議郎知是著作郎也又碩學逹官徃徃典校秘書如向歆故事或但校書東觀或有兼撰漢記也梁書曰任昉字彦昇爲秘書監自齊永元以來秘閣四部篇卷紛雜昉手自讎校由是篇目定焉後魏書伊馥世祖欲拜馥爲尚書郡公馥辭曰尚書務殷公爵至重非臣年少愚近所冝荷任請収過恩世祖問其所欲馥曰中秘二省多諸文士􅀂恩矝不巳請叅其次世祖賢之遂拜爲中護將軍秘書監隋書曰栁􅙒煬帝嗣位拜秘書監封漢南縣公帝退朝之後便命入閤言宴諷讀終日而罷帝毎與嬪后對酒時逢與㑹輙遣命之至與同榻共席恩􅀂友朋帝猶恨不能夜召於是命匠刻木偶人施機􅀜能坐起拜伏以像於􅙒帝毎在月下對酒輙令宫人置之於坐與相讎酢而爲懽􅀏唐書曰魏徵爲秘書監奏引學者校定四部書自是秘府圖籍粲然畢備劉歆七略曰}
  - {type: page-break, offset: 489, content: '', id: KR3k0012_SBCK_233-2b}
  - {type: variant, offset: 489, length: 0, content: '', krp: 觀有校書郎又有著作郎傳毅馬融之徒多爲校書郎又蔡邕從尚書選入東觀著作邕旣巳爲尚書郎而入東觀著作復拜議郎知是著作郎也又碩學逹官徃徃典校秘書如向歆故事或但校書東觀或有兼撰漢記也梁書曰任昉字彦昇爲秘書監自齊永元以來秘閣四部篇卷紛雜昉手自讎校由是篇目定焉後魏書伊馥世祖欲拜馥爲尚書郡公馥辭曰尚書務殷公爵至重非臣年少愚近所冝荷任請収過恩世祖問其所欲馥曰中秘二省多諸文士若恩矝不巳請叅其次世祖賢之遂拜爲中護將軍秘書監隋書曰栁辯煬帝嗣位拜秘書監封漢南縣公帝退朝之後便命入閤言宴諷讀終日而罷帝毎與嬪后對酒時逢與㑹輙遣命之至與同榻共席恩若友朋帝猶恨不能夜召於是命匠刻木偶人施機關能坐起拜伏以像於辯帝毎在月下對酒輙令宫人置之於坐與相讎酢而爲懽笑唐書曰魏徵爲秘書監奏引學者校定四部書自是秘府圖籍粲然畢備劉歆七略曰}
  - {type: variant, offset: 490, length: 1, content: 城, SBCK: 帝廣獻書之路百年之間書積如丘山故外有太常史愽士之藏内則延閣廣内秘室之府魚豢典略曰芸臺香辟􅁓魚蠧故藏書臺稱芸臺三輔黃圖曰未央宫東有麒麟殿臧秘書即楊雄校書之處也王充論衡曰蘭臺之官監國得失也通典曰秘書省但主書冩勘校而巳雖非要刺然好學君子亦多求爲之温嶠舉荀崧爲秘書監表曰夫國史之興將以明失得之跡謂之實録使一代之典煥然可觀散􅀐常侍崧文質彬彬思義通􅀶歷位先朝莅事以穆冝掌秘奥宣明史籍王肅表曰青龍之末主者啓選祕書監詔秘書騶吏以上三百餘人非但學問義理當聞有威嚴能檢下者詔肅以常侍領焉又王肅論秘書不應屬少府表曰魏之秘書即漢之東觀郡國稱敢言之上東觀且自大魏分秘書而爲中書以來傳緒相繼于今三監未有􅀠名於少府者也今欲使臣編名於騶􅝗言事於外府不亦􅈥朝章而辱國典乎大和中蘭臺秘書争議三府奏議秘書司先生之載籍掌制書之典謨與中書相亞冝與中書爲官聮華嶠集詔曰尚書嶠體素弘簡文雅該通經覽古今􅀶聞多識屬書實録有良史之志故轉爲秘書監其加散􅀐常侍使中書散􅀐著作及治禮者律天文數術南省文章門下撰集皆典領之嶠表伏見詔書以臣爲秘書監加位常伯昔劉向父子世典史籍馬融通􅀶三入東觀非臣膚淺所敢投跡唐書太宗正授顔師古秘書監制曰秘書望華史官任重􅃟衆而舉歷代攸難守秘書監顔師古體業淹和噐用詳敏學該流略詞兼典麗職司圖書亟經歳序朱紫旣辨著述有成冝正名噐允兹望實可秘書監秘書少監唐書周思茂者貝州漳南人少與弟思鈞俱早知名自右史轉太子舎人與范履冰在禁最蒙親遇至於政事損益多叅預焉累遷麟臺少監崇文舘學士垂拱四年下獄死又曰王紹宗楊州江都}
