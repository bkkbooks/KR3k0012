  - {type: variant, offset: 1747, length: 0, content: '', SBCK: 太元十八年王謐爲秘書丞乃表前尚書殷允中書郎張敞太子後率郄儉之故太常桓石秀是多書之家請秘書郎分局採借齊書曰王儉字仲寳爲秘書丞上表求校墳籍依七略撰七志四十卷獻之又曰張率字士簡呉郡人遷秘書丞髙祖曰秘書丞天下清官東南胄緒未有爲之今以相處爲卿定名譽齊職儀云秘書丞銅印墨綬南史劉孝綽遷祕書丞武帝謂舎人周捨云第一官當用第一人故以孝綽居此職後魏書李彪字道固遷秘書丞分領著作事自文成帝己來至於大和崔浩髙允著述因書編年序録爲春秋之體遺落時事一二無存彪與秘書令髙祐始奏從遷固之體創爲紀傳表志之目焉又曰李輔子伯尚少有重名髙祖每云此李氏之千里駒勑撰太宗起居注㝷遷秘書丞後周書曰栁虬爲秘書丞時秘書雖領著作不叅吏事自虬爲丞始令監掌焉王肅論秘書表云青龍中議秘書丞郎與􅀶土議郎同職近日月冝在三臺上又曰秘書丞郎冝比尚書郎侍御史令侍御史乗犢車奏事用尺一秘書丞郎乘鹿車猶用尺奏恐非陛下崇儒之夲意也秘書郎六典曰秘書郎四人從六品上晉起居注云武帝遣秘書圖書分爲甲乙景丁四部使秘書郎各掌其一焉魏志曰王基字伯輿東萊人也時青土􅀄定刺史王凌特表請基爲别駕後召爲私書郎凌復請還之}
  - {type: page-break, offset: 1747, content: '', id: KR3k0012_SBCK_233-5b}
