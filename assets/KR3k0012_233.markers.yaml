  - {type: punctuation, offset: 941, content: 、, id: KR3k0012_CHANT_233-bkkpn265}
  - {type: variant, offset: 946, length: 584, content: 接對賓客者為之乎咸以蘇夔對帝然之即日拜鴻臚少卿典屬國漢書曰武帝以移音移中監蘇武為典屬國又曰宣帝甘露二年以常惠為典屬國又曰典屬國秦官掌蠻夷降者成帝河平元年省併大鴻臚司農卿六典曰司農卿之職掌邦國倉儲委積之事惣上林太倉鉤盾導官四署與諸監之官屬謹其出納而修其職務少卿為之貳凡京都百司官吏祿廩皆仰給焉周禮曰冢宰有太府下大夫鄭玄注曰太府為王治藏之長若今司農矣史記曰韓信歸漢漢以為治粟內史漢書曰治粟內史秦官掌穀貨景帝更名大農令武帝更名大司農又曰鄭當時字莊為司農門下客至無貴賤無留門者執賓禮以下人山東諸公翕然稱莊曰吾聞鄭莊行千里不齎糧又曰朱邑為北海太守以治行第一入為大司農身為列卿居處節儉性公正不可交以私天子器之朝廷敬焉及卒詔稱揚其節行賜邑子黃金百斤以奉其祭祀又曰田延年為大司農坐盜都內錢三千萬自殺又曰平帝元始元年改大司農曰羲和以劉歆為之東觀漢記曰劉據為大司農以職事被譴召詣尚書將加捶撻尚書左雄諫帝曰九卿位亞三公行則鳴玉孝明永平始加扑罰非古制也帝從之卿於是始免扑捶又曰高詡字季回以儒學徵拜大司農在朝以清白方正稱又曰羊融字子優為大司農性明達稱為名卿續漢書曰李固為大司農上信閹官天下牧守多其宗親舊故及受貨賂有詔特拜不由選試亂生彌甚固乃上表具陳盜賊所以興由官非其人也又曰大司農卿一人中二千石掌諸錢穀金帛又曰趙典字仲經為大司農閉門却掃非德不交又曰耿國字叔慮為大司農曉邊事能論議數上便宜事天子器, SBCK: 折}
