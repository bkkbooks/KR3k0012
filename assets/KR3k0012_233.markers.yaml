  - {type: variant, offset: 3427, length: 2, content: 貳凡, WYG: 無其才實故當時諺曰上車不落則著作體中何如則秘書又曰王肅表曰臣以為秘書職于三臺為近宻中書郎在尚書丞郎上秘書丞郎宜次尚書郎下不然則宜次侍御史下秘書丞郎俱}
