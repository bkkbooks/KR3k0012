  - {type: variant, offset: 2871, length: 635, content: 賈均平市精為上賈次為中賈麤為下賈凡賣買不和而攉固攉謂專略其利固謂鄣固其市及更出開閉共限一價謂賣物以賤為貴買物以貴為賤也若參市而規自入者並禁之謂在旁高下其價以相惑亂史記曰司馬談祖為漢市長漢書百官表曰內史屬官有長安市長又長安四市令長丞屬左馮翊東觀漢記曰祭遵從征河北為軍市令舍中兒犯法遵格殺之上怒命收遵時主簿陳副諫曰明公常欲眾軍整齊今遵奉法不避是教令行也上乃貸之以為刺姦將軍語諸將曰當備祭遵吾舍中兒犯令尚殺之必不私諸卿也晉書曰石苞賣鐵鄴市市長沛國趙元儒名知人見而異之便與結交歎其遠量當至公輔齊職儀曰市令周有司廛肆師司市皆其任也平准令六典曰平准令掌供官市易之事丞為之貳凡百司不任用之物則以時出貨其沒官物者亦如之韋昭辯釋名曰釋云平准令主染色色有常平之法淮的之也辯云主平物價使相依准史記曰桑弘羊以物多騰躍請置平准於京師受天下委輸盡籠天下之貨物貴則賣之賤則買之如此則富啇大賈無所牟大利矣始置平准焉漢書百官表曰司農屬官有平准令丞漢書曰趙廣漢清潔下士有名譽州舉茂才拜平准令續漢書曰平准令六百石齊職儀曰染署掌染繒色少昊置五雉為工正翬雉氏設五色之工周有染人之職掌絲帛以為服左右藏令六典曰左藏令掌邦國庫藏之事丞為之貳凡天下賦調先於輸場閱其合尺度斤兩者卿及御史監閱然後納于庫藏皆題以州縣年月以別麤良辯新舊也又曰右藏署令掌邦國寶貨之事丞為之貳凡四方所獻金玉珠貝玩好之物皆藏之出納禁令如左藏之職齊職儀曰右藏庫周天府內府之任天府物所藏也內府掌邦市之出入以待王用後漢中藏府令丞掌幣帛金銀諸物晉置中黃左右藏, SBCK: 十三}
