  - {type: variant, offset: 3137, length: 3, content: 平准令, WYG: 秘書郎四人從六品上晉起居注云武帝遣秘書圖書分為甲乙丙丁四部使秘書郎各}
  - {type: variant, offset: 3141, length: 4, content: 供官市易, WYG: 其一焉魏志曰王基字伯輿東萊人也時青土初定刺史王凌特表請基為别駕後召為秘書郎凌復請還}
  - {type: variant, offset: 3146, length: 3, content: 事丞為, WYG: 司徒王朗辟基凌又不遣朗書劾州曰取宿衛}
