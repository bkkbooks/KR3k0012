  - {type: variant, offset: 3059, length: 0, content: '', WYG: 此君秘書丞天水薛宣也宜共談其見遇如此魚豢魏略曰薛夏為秘書丞時秘書嘗公事移蘭臺蘭臺自以臺也秘書丞時為署耳謂不得儀}
  - {type: variant, offset: 3060, length: 5, content: 備祭遵吾舍, WYG: 有坐者夏報之曰蘭臺為外臺秘書為内閣臺也閣也何不相移之有蘭臺無以折之又曰嚴苞以髙才黄初}
