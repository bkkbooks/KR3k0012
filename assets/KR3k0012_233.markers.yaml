  - {type: variant, offset: 2713, length: 277, content: 魏職令曰太府少卿第四品上士人官上用勤篤有幹細務無滯者唐新語曰狄光嗣仁傑長子也睿宗朝起復除太府少卿光嗣頻表不起乃降勑朕念卿家門忠於王室奪卿情理以荅殊恩卿屢表固陳詞理懇至循環省覽有足可矜今遂所請用勸浮薄待卿情禮云畢更俟後命仍編入史市令六典曰京都諸市令掌百族交易之事丞為之貳凡建摽立候陳肆辯物以二物平市謂秤以格斗以概也以三賈均平市精為上賈次為中賈麤為下賈凡賣買不和而攉固攉謂專略其利固謂鄣固其市及更出開閉共限一價謂賣物以賤為貴買物以貴為賤也若參市而規自入者並禁之謂在旁高下其價以相惑亂史記曰司馬談祖為漢市長漢書百官表曰內史屬官有長安市長又長安四市令長丞屬左馮翊, WYG: 征}
