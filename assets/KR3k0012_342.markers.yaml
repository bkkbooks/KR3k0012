  - {type: variant, offset: 3461, length: 685, content: 鼗將之諸侯賜弓矢然後征賜鈇鉞然後殺賜圭瓚然後為鬯又曰軍旅鈇鉞先王之所以飾怒也又曰是故君子不賞而民勸不怒而民威於鈇鉞左傳曰魏絳至授僕人書將伏劍士魴張老止之公讀其書曰君合諸侯臣敢不敬君師不武執事不敬罪莫大焉臣懼其死以及楊干無所逃罪不能致訓至於用鉞臣之罪重敢有不從以怒君心請歸死於司寇也又曰將戮慶封椒舉曰臣聞無瑕者可以戮人慶封唯逆命是以在此其肯從於戮乎播於諸侯焉用之王弗聽負之斧鉞以徇於諸侯又曰其後襄之二輅鏚鉞耟鬯彤弓虎賁文公受之以有南陽之田晉文公也史記殷本紀曰當是時桀為虐亂媱荒酖酗于酒不脩厥政天下叛之而諸侯昆吾氏為亂湯迺興師率諸侯伊尹從湯湯自把鉞以伐昆吾遂伐桀又曰紂囚西伯於羑里西伯之臣閎夭之徒求美女奇物善馬以獻紂迺赦西伯西伯出而獻洛之地以請除炮烙之刑紂乃許之賜弓矢斧鉞使征伐又曰周本紀曰紂嬖妾二女皆經自殺武王又射三發擊以劍斬以玄鉞又曰周公旦把大鉞畢公把小鉞以夾武王漢書刑法志曰大刑用甲兵其次用斧鉞中刑用刀鋸其次用鑽鑿薄刑用鞭朴後漢書郭躬傳曰竇固出擊匈奴騎都尉秦彭為副彭在別屯而輒以法斬人固奏彭專擅請誅之顯宗乃引公卿朝臣平其罪科躬以明法律召入議者皆然固奏躬獨曰於法彭得斬之帝曰畢征校尉一統於督彭既無斧鉞何得專殺人乎躬對曰一統於督者謂在部曲也今彭專軍別將有異於此兵事呼吸不容先關督帥且漢制棨戟即為斧鉞於法不合罪帝從躬之議吳志陸遜傳曰遜假節鉞為大督逆曹休斬獲萬餘吳錄曰假陸遜黃鉞吳主親執鞭以見之晉書天文志曰天槍三星在北斗杓東一曰天鉞天之武備也又曰參十里一曰參伐一曰大辰一曰天市一曰鈇鉞主斬刈又曰青龍三年六月丁未鎮星犯井鉞占曰為兵氣也又曰甘露元年七月乙卯熒惑犯井鉞占曰竝有兵事唐, SBCK: 爲知言梁}
