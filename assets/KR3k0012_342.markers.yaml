  - {type: variant, offset: 166, length: 0, content: '', SBCK: 孝景帝賜衛綰曰先帝賜臣劒凢六不敢奉詔上曰劒人之所施獨亦至今乎綰曰具在上使取六劒尚盛未嘗服之也又曰質氏以治削而鼎食注治刀劒也又曰王莽使武賁以斬馬劒挫音剉董忠又曰梁兾帶劒入省尚書張凌呵叱令出兾跪謝凌不應因劾奏詔以一歳俸贖罪楚漢春秋曰上過陳留酈生求見使者入通公方洗足問如何人曰􅃺􅀋大儒上曰吾方以天下爲事未暇見大儒也使者出告酈生瞋目按劒入言髙陽酒徒非儒者也後漢書曰}
