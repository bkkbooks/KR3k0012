  - {type: variant, offset: 776, length: 5, content: 帝伐南越禱, SBCK: 庫火歷代之寳孔子履漢髙斬白蛇劒王莽頭皆失所在張華見龍劒排户而飛去又曰何攀除兖州刺史錫班劒赤舄又曰王如􅀄聚衆作逆敗王敦弟稜愛驍武請敦配麾下稜甚加寵遇如數與敦將角射闘爭爲過稜杖之如甚以爲耻􅀄敦有不臣之迹稜每諌之敦常怒異色乃密使人激怒如勸令殺稜因稜閑晏如請劒儛爲勸稜從之如於是儛刀爲戯漸來前稜惡而呵之不止遂直前斬稜敦聞而佯驚亦捕如誅之又曰張華傳吴之未滅也斗牛之間常有紫氣道術者皆以吴方強盛未可圖也唯司空張華以爲不然及吴平之後紫氣愈明華聞豫章人雷煥妙逹緯象乃要煥􅀫屏人曰可共尋天文知將來吉凶因登樓仰觀煥曰僕察之乆矣唯牛斗之間頗有異氣華曰是何祥也煥曰寳劒之精上徹於天耳華曰君言得之吾少時有相者言吾年出六十位登三事當得寳劒佩之斯言效歟因問曰在何郡煥曰在豫章豊城華曰欲屈君爲􅌠密共尋之可乎煥許之華大喜即􅀘煥豊城令煥到縣掘獄屋基入地四丈餘得一石凾光氣非常中有􅀟劒並刻題一曰龍泉一曰}
