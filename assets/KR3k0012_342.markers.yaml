  - {type: variant, offset: 149, length: 0, content: '', SBCK: 吴季札之􅀄使北過徐君好季扎劒口弗敢言季扎知之爲使上國未獻還至徐徐君巳死乃解其寳劒繫徐冢樹而去從者曰徐君巳死當誰予乎曰不然始吾心巳許之豈以死背吾心哉又曰平原君及毛遂與楚合從言其利害日出而言日中不決遂按劒而上請平原君曰從者利害兩言而决耳令日出而言日中不決何也楚王謂平原君曰客何爲者也平原君曰是勝之舎人也楚王叱之胡不下吾乃與君言汝何爲者也毛遂按劒而前曰今十歩之内王不得恃楚國之衆也王之命懸於遂且遂聞湯以七十里之地而王天下文王以百里之壤而臣諸侯今楚地方五千里持㦸百萬此覇王之資也白起小竪子耳率數萬之衆興師以與楚戰一戰而舉鄢郢再戰而燒夷陵三戰而辱王之先人此百丗之怨而趙之所羞而王弗知惡合從者爲楚非爲趙也吾君在前叱者何也諸侯乃定從又曰范雎傳云􅁗昭王臨朝歎息應侯進曰臣聞主憂臣辱主辱臣死今大王中朝而憂臣敢請其罪王曰吾聞楚之鐵劒利而倡優拙夫鐵劒利則士勇倡優拙則思慮逺夫以逺思慮而御勇士恐楚之圖􅁗也又曰李斯上書云今陛下服太阿之劒乗纎離之馬此數寳者􅁗不生一焉又曰陳平間行杖劒亡渡河舡人見其美丈夫獨行疑其亡將腰中當有金寳目之欲殺平平恐乃解衣躶而佐刺舡舡人知無有乃止又曰邹陽上書梁王云臣聞明月之珠夜光之璧以闇投人於道路人無不按劒相眄者何則無因而至前也又曰髙祖送徒驪山夜徑澤中令一人行前行前者還報曰前有大蛇當徑願還髙祖曰壯士行何畏乃前拔劒斬蛇又曰髙祖置酒雒陽宫曰吾有三傑而能用之故吾以布衣提三尺劒取天下也項羽有一范増而不能用所以爲吾擒也又曰髙祖擊英布時爲流矢所中髙祖問毉曰病可治於醫曰可治於是髙祖慢罵之曰吾以布衣提三尺劒取天下此非天命乎命乃在天雖扁鵲何益又曰伍貟奔吴舡人濟之貟感其德解寳劒賜之舡人曰子逹吴勿相忘劒則不敢以當又曰魏相爲丞相好武皆令諸吏有奏事者帶劒而前奏或有不帶劒者入奏事乃借錯劒而方敢入又曰荆軻衛人之燕燕人謂之軻卿軻卿好讀書學擊劒以術􅀃元君元君不用又曰司馬相如好讀書學擊劒故母名曰犬子漢書曰雋不疑字曼倩渤海人治春秋爲郡文學進退必以禮名聞州郡武帝末􅁀勝之爲直指使者衣繡衣素聞不疑賢至渤海遣吏請與相見不疑冠進賢冠帶攂具劒應劭日攂具摽首之攂磊落壯大之㒵又曰時中國􅀄定尉他平南越回王之髙祖使中大夫陸賈賜他印爲南越王王賜賈橐中裝千金賈有五男廼出所使橐中裝賣千金分其子子二百金賈常乗安車駟馬從歌皷瑟侍者十人寳劒直百金謂其子曰與汝約過汝汝給人馬酒食極歡十日而更約所死家得寳劒其遊漢庭名聲籍甚言狼籍甚盛也又曰朱博奏王莽爲庶人莽就國南陽太守以莽貴重選門下􅁺孔休守新都伯休謁見莽莽盡禮自納休亦聞其名莽後疾休候之莽縁恩意進其玉具劒欲以爲好休不肯受莽因見誠見君靣有瘢美玉可以滅瘢休復辭譲莽曰君嫌其價耶遂椎碎自裹以進休乃受之又曰朱雲曰臣願請上方斬馬劒斷倿臣一人首上問誰對曰安昌侯張禹上怒又曰龔遂爲渤海太守務農勸人賣劒買牛曰可爲佩牛乎又曰}
