  - {type: variant, offset: 1457, length: 1996, content: 督郵不受建留於家還白意言受他日意見督郵而督郵謝意言所以不受青幘幡者己自有也意還召建問狀建惶怖叩頭意曰勿叩頭使外聞也出因轉署主記史假遣無期建歸家父問之曰朝大士眾賢能者多子何功才既獲顯榮假乃無期寵厚將何謂也無得有不信於賢主耶建長跪以青幘幡意語父父嘿然有頃令妻設酒殺雞與建相樂謂建曰吾聞有道之君以義理殺人無道之君以血刃加人長假無期唯死不還將何以自栽乎酒畢進藥建遂物故石虎鄴中記曰勒為石虎諱呼白虎幡為天鹿幡鹽鐵論曰發春之後懸青幡築土牛殆非明主勸耕稼之意春令之論也軍令曰五聞鼓音舉黃帛兩半幡合旗為三面負陣庾肅之教曰大赦蕩然萬物更新陽幡既建事從寬簡羗可得詢求民瘼撫循物性旒周禮曰龍旂九斿象大火也鳥旟七斿象鶉火也熊旗六斿以象伐也龜旐四斿以象營室也大尾九星朱鳥七星參七星營室四星又曰全羽為旒公羊傳曰諸侯若贅旒禮含文嘉曰天子之旗九仞十二旒曳地旗者旌旗也所以別尊卑序貴賤也諸侯七仞九旒齊軫軫車後橫木也諸侯之旗齊於軫卿大夫五仞五旒齊軫士三仞三旒齊首首頭也廣雅曰天子十二旒至地諸侯九旒至軫大夫七旒至轂士三旒至肩東京賦曰建神旒之太常旄尚書曰武王右秉白旄孔安國注曰手秉旄有事施教也又曰羽畎夏翟雉名可飾旄毛詩曰建彼旄矣又曰干旄美好善也衛文公之臣子多好善賢者樂告以善道也孑孑干旄在浚之郊左傳曰晉人假羽旄于齊而不歸齊人始貳漢書武紀曰征和二年更加節黃旄應邵注曰戾太子發節加其上黃以嗣之也晉書曰王珣字元琳弱冠與陳郡謝玄為桓溫掾俱為溫所重嘗謂之曰謝掾年四十必擁旄杖節王椽當作黑頭公皆未易才也鬻子曰武王伐紂乃命太公把旄以麾之紂軍反走列仙傳曰秦文公時有梓樹化為牛以騎擊之騎不勝或墜髻解被髮牛畏之入河故秦因致旄頭騎使先驅文選曰羽旄掃霓又曰羽旄楊蕤又曰素旄一麾渾一區宇洛神賦曰左倚彩旄右蔭桂旌楚詞曰建脩虹之采旄甘泉賦曰流星旄以電燭又曰建雄虹之采旄係綴螮文紛錯也五色雜而炫耀眾采雜廁而明朗眊服虔通俗文曰毛飾曰眊音餌漢魏故事曰與外國節皆二赤眊一黑眊十異於常節魏略曰諸葛亮見劉備備性好眊時適以旄牛尾與備者備手自結之亮曰將軍當復有遠志耶止結眊而已備知亮非常人乃投眊而謂曰以志憂耳吳時外國傳曰黑白眊出天笁國陶公故事曰臣侃奉獻金繕白眊四枚續異記曰竟陵王誕在廣陵左右侍直眠中夢人告之曰官須髮為矟眊覺則已失髮矣如此者數十人俗說曰謝安小兒時便有名譽流聞遠國慕容廆餉謝白狼眊一雙謝時年十三一作慕容垂也魏武與楊彪書曰今贈足下十鈴眊一具諸葛亮與瑾書曰兄嫌白帝兵非精練到所督則先主帳下白眊西方上兵也嫌其少者當復部分江州兵以廣益之庾翼與燕王書曰今致孔雀眊二枚諸葛亮與吳王書曰所送白毦薄少重見辭謝益以憎慚庾翼與慕容皝書曰今致𥜗鎧一領兜牟白眊自副又曰今致朱漆銏二十張絳碧畫幡黑眊自副銏所諫切麾左傳曰楚人謂夫旍子重之麾也穀梁曰日有食之鼓用牲于社用牲非禮也天子救日置五麾陳五兵五鼓諸侯置三麾陳三兵三鼓大夫擊門士擊柝後漢書曰班超拜為將兵長史假鼓吹幡麾王隱晉書曰戴洋病亡天神使為酒藏吏授符持幡麾將士蓬萊諸山五日更生華陽國志曰曹公察關羽不安使張遼以情問之羽嘆曰吾極知曹公待我厚然吾受劉將軍恩誓以共死不可背之要當立効報公曹聞而義之是歲紹征官渡遣驍騎將軍顏良攻東郡太守劉延於白馬公使遼羽為先鋒羽望見良麾策馬刺良於萬眾中斬其首還遂解延圍公即表封羽漢壽亭侯重加賞賜羽盡封其物拜書告辭而歸先主也晉令曰兩頭進戰視麾所指聞三金音止二金音還軍令曰凡戰臨陣皆無讙音暄譁音化明聽鼓音謹視幡麾麾前則前麾後則後麾左則左麾右則右麾不聞令而擅前後左右者斬淮南子曰譬若軍之持麾者也妄指而亂矣幢釋名曰幢童也其皃童童然也晉公卿禮秩曰安平王孚汝南王亮太傅楊駿義陽王望齊王魯王賈充河間王顒梁王彤秦王東長沙王乂皆給羽葆幢後魏書曰韓茂膂力絕人尤善騎射太宗曾親征丁零翟猛茂為中軍執幢時大風諸軍旌旗皆偃仆茂於馬上持幢初不傾倒太宗異而問之徵茂所屬具以狀對太宗謂左右曰記之尋徵詣行在所試以騎射太宗深奇之以茂為虎賁中郎將兵書曰赤幢常在大將不得動搖赤者火也火土之母故軍主長服赤幢節周禮曰守國者用玉節守都鄙者用角節掌邦國之使者用虎節土國用人節澤國用龍節皆金為之門戶用符節貨賄用璽節使用管節道用旌節以竹為之漢書曰蘇武在匈奴北海牧羊起臥操節節麾也又曰張騫使月支匈奴得之留騫五六年漢節不失東觀漢記曰鄭眾謂匈奴曰不忍將大漢節對氈裘也唐書曰潁王璬為蜀郡都督璬性儉率將渡綿州江登舟見以綵緣席為籍者顧曰此可以為寢處奈何踐之命徹去之璬初奉命之藩卒遽不遑受節綿州司馬史賁進說曰王帝子也且為節度大使今之藩而不持節單騎徑進人何所瞻請建大槊蒙之油囊為旌節狀先驅道路足以威眾璬笑曰但為真王何用假旌節乎鉞釋名曰鉞豁也所司莫敢當前豁然破散也宋林曰鉞王斧也開元文字云斧也或為鉞尚書牧誓曰王左杖黃鉞右秉白旄以麾曰逖矣西土之人又顧命曰一人冕執劉立于東堂一人冕執鉞立于西堂云冕皆大夫也鉞屬也立於東西廂之前堂詩曰武王載斾有虔秉鉞如火烈烈則莫我敢遏虔固也禮記曰天子賜諸侯樂則以柷將, SBCK: ''}
