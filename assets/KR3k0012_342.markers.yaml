  - {type: variant, offset: 1214, length: 242, content: 曇首曰既無異勑又闕幡棨雖稱上旨不異單刺元嘉元年二月雖有開門例此乃前事違令今守舊未為非禮其不請白獸幡銀字棨致開門不時由尚書相承之失亦合糺正上特無問更立科條北史曰後魏元孚持白虎幡勞阿那瓌於柔玄懷荒二鎮間阿那瓌眾號三十萬陰有異意遂拘留孚載以轒音汾轀音溫日給酪一升肉一叚每集其眾坐孚東廂稱為行臺甚加禮敬晉起居注曰太陽佐伺承有母云感老君生丞相中貴畫作九龍幡遂群聚棄市晉諸公讚曰楚王瑋矯詔害汝南王亮其夜帝臨東堂張華唱議乃遣左右以白虎幡麾之然後眾散鍾離意別傳曰意為瑕兵今立春遣戶曹史擅建齎青幘幡白督, SBCK: 杜}
