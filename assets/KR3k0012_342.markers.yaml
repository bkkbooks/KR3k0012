  - {type: variant, offset: 176, length: 0, content: '', SBCK: 特以寵劒自手署其名曰韓稜楚龍泉晉太康記曰汝南西平縣有龍泉可淬刀劒特堅利汝南即楚分野也郅壽蜀漢文陳寵濟南椎成椎音直追切漢官椎成作鏗成時論者爲之􅀃以稜深有謀故得龍泉壽明逹有文章故得漢文寵敦朴善不見外故得椎成謝承後漢書曰延熹中詔應奉曰蠻夷叛逆作難積惡放恣鑊中之魚火熾湯盡當急燋爛以刷國恥朝廷以奉昔守南土威名播越故復式序重任奉之廢興期在於今賜奉錢十萬駮犀方具劒金錯把刃劒革帶各一奉其勉之又曰吴郡張業字仲叔爲郡門下􅁺逐太守歸郷里至河内遇賊業拔劒與賊交戰而死子武時㓜不識父傷父䘮不還毎至節日持業遺劒至河内到業死處醊􅀕悲哀感動路}
  - {type: page-break, offset: 176, content: '', id: KR3k0012_SBCK_342-6a}
  - {type: variant, offset: 176, length: 0, content: '', WYG: 特以寵劒自手署其名曰韓稜楚龍泉晋太康記曰汝南西平縣有龍泉可淬刀劒特堅利汝南即楚分野也郅夀蜀漢文陳寵濟南椎成椎音直追切漢官椎成作鏗成時論者為之説以稜深有謀故得龍泉夀明達有文章故得漢文寵敦敦朴善不見外故得椎成謝承後漢書曰延熹中詔應奉曰蠻夷叛逆作難積惡放恣鑊中之魚火熾湯盡當急燋爛以雪國耻朝廷以奉昔守南土威名播越故復式序重任奉之廢興期在扵今賜俸錢十萬駮犀方具劒金錯把刄劒革帶各一奉其勉之也又曰吳郡張業字文仲叔為郡門下掾送太守歸鄉里至河内遇賊業拔劒與賊交戰而死子武時幼不識父傷父喪不還每至節日持業所遺劒至河内到業死處醊酒悲哀感動路}
