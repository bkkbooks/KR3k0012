  - {type: variant, offset: 11, length: 1, content: 斾, SBCK: 左首尊也又曰受弓劒以􅃑敬也周禮曰周官桃氏爲劒臘廣二寸有半寸臘謂兩刃音臘兩從半之劒脊兩殺趍鍔者以其臘廣爲之莖圍長倍之莖謂劒天人之所握以上中其莖設其後謂從中以却稍大之身長五其莖長重九鋝音刷謂之上制上士服之身長四其莖長重七鋝謂之中制中士服之身長三其莖長重五鋝謂之下制下士服之今之上首也各以形皃大小帶之士勇士也又曰鄭之刀宋之斤魯之削呉越之劒遷乎其地而弗能爲良地氣}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_SBCK_342-1b}
  - {type: variant, offset: 11, length: 1, content: 斾, WYG: 左首尊也又曰受弓劒以袂敬也周禮曰周官桃氏為劒臘廣二寸有半寸臘謂刃臘音獵兩從半之劒脊兩靣殺趨鍔以其臘廣為之莖圍長倍之莖謂劒夾人所握鐔以上中其莖設其後謂從中以却稍大之身長五其莖長重九鋝音刷謂之上制上士服之身長四其莖長重七鋝謂之中制中士服之身長三其莖長重五鋝謂之下制下士服之今之匕首也各以形貌大小帶之士勇士也又曰鄭之刀宋之斤魯之削吳越之劒遷乎其地而弗能為良地氣}
