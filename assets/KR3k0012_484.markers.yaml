  - {type: variant, offset: 2058, length: 0, content: '', SBCK: 子而自業賤事縱子無耻奈先君何祐辭謝而巳守志如􅀄也又曰王苑字仲安貧賤茅屋蓬户藜藿謝承後漢書曰施延字君子沛人家貧母老常鬻力供養種􅀲自給位至太尉又曰永平五年班超兄固􅀍召詣校書超與母隨至洛陽家貧常爲傭書以供養乆傭甞苦輟業投筆歎曰大丈夫無它志略獨當効􅀓介子張騫立功異域以取封侯安能乆事筆硯乎魏略曰常林少單貧雖貧自非手力不取}
