  - {type: variant, offset: 651, length: 0, content: '', SBCK: 廟旣成還報曰三窟以就君可髙會而樂矣孟甞君乃還爲齊相又曰顔無繇字路顔淵父也回死顔路貧請孔子車以葬孔安國曰賣車以作椁也孔子曰才不才亦各言其子鯉也死有棺而無槨吾不徒行以爲之槨以吾從大夫之後不可徒行也又曰魏悖少時欲求見齊相曹叅家貧無以自通乃常獨早夜掃齊相舎人門外舎人怪之以爲物而伺之獨得勃勃曰願見相君無因故爲子掃欲以求見於是舎人見之曹叅因以爲舎人又曰東郭先生拜爲都尉先生乆待詔}
  - {type: page-break, offset: 651, content: '', id: KR3k0012_SBCK_484-4a}
  - {type: variant, offset: 652, length: 3, content: 為魁梧, SBCK: 車貧困飢寒衣弊履不完行雪中履有上無下足盡踐地道人􅀏之又曰甘茂亡􅁗奔齊逢􅂫代爲齊使於􅁗茂曰臣得罪於􅁗懼而逃無所容跡臣聞冨人女會績貧人女曰我無以置燭而子之火光有餘子可分我餘光無損子明今臣困願以餘光振之漢書曰司馬相如字長卿成都人家貧甞於臨卭市與人沽酒傭爲洒掃身着牘鼻布裩於市中然少好讀書學擊劒小名犬子慕藺相如之爲人更名曰相如後遊梁數年歸素與臨卭令王吉善臨卭多冨人有卓王孫程鄭相謂曰今有貴客爲具召之并召令令旣至請長卿長卿謝不能臨臨卭令不敢甞食乃自起迎相如相如不得巳而強徃一坐盡歡酒酣令前奏琴曰竊聞長卿好之願以自娯相如爲鼔一弄卓王孫有女文君新寡好音竊窺之相如乃挑之文君夜奔相如相如與馳歸成都家徒四璧立卓王孫大怒女不才我不忍赦一錢不分文君乆之與相如俱至臨卭買酒舎乃令文君當壚相如與傭保􅄂作於市卓王孫耻之昆弟諸公謂王孫曰一女所不足者非財}
