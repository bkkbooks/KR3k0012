  - {type: variant, offset: 2389, length: 9, content: 導妻曹氏性妒導憚之, WYG: 猛北海郡人也居魏土少貧賤鬻畚為業嘗至洛陽貨畚有一人於市貴買畚而無直曰可隨我去取直猛隨行不覺遂逺至深山語猛且住樹下當先啓道君來須臾猛進見一公衣朝衣頭鬢悉白從十許人一人引猛云大司馬公可進猛因拜公公曰王公何縁許拜即十倍償畚直遣人送猛出顧視}
