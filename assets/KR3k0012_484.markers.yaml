  - {type: variant, offset: 680, length: 2, content: 遂滅, SBCK: 錢百萬文君與相如乃歸成都武帝立蜀人楊德意爲狗監侍上讀子虚賦而善之曰朕獨不得與此人同時意曰此臣之邑人司馬相如爲此賦上驚乃召問相如相如曰然此乃諸侯之事未足可觀乃作上林賦賦成奏之帝大恱以相如爲郎後拜中郎將建節使至蜀蜀太守郊迎縣令􅀒弩先驅於是郷閭故人及卓王孫諸公因門下獻牛酒以交歡王孫於是喟然歎曰老人所恨得使女事相如乃晚耳又曰晁錯奏曰古者稅民不過什}
