  - {type: variant, offset: 644, length: 3, content: 觀皆笑, SBCK: 上書言其不亂請以身盟遂自刎於宫門湣王大驚乃復召孟甞君孟甞君謝病歸老於薛未至百里民扶老携㓜迎於道傍孟甞君頋謂驩}
  - {type: page-break, offset: 644, content: '', id: KR3k0012_SBCK_484-3b}
  - {type: variant, offset: 644, length: 2, content: 觀皆, WYG: 上書言其不亂請以身盟遂自刎於宫門湣王大驚乃復召孟嘗君孟嘗君謝病歸老於薛未至百里民扶老携幼迎於道傍孟嘗君顧謂煖曰先生所為文市義者乃今見之矣煖對曰狡兔有三窟僅得免於死耳今君止有一窟未得髙枕而卧也請為君復鑿二窟孟嘗君與車五十乗金百斤西遊於梁說魏王曰齊放其大臣孟嘗君諸侯先迎之者國富兵強於是魏昭王以其故相為上將軍而虛相位遣謁者賫黄金千斤車百乘往聘孟嘗君固辭不往魏使三返湣王聞之君臣恐懼遣太傅賫黄金千斤文馬二駟以謝孟嘗君使反國煖又請曰願得先王祭器立宗廟於薛廟既成還報曰三窟已就君可髙枕而卧矣孟嘗君乃還為齊相又曰顔旡繇字路顔淵父也回死顔路貧請孔子車以葬孔安國曰賣車以作槨也孔子曰才不才亦各言其子鯉也死有棺而無槨吾不徒行以為之槨以吾從大夫之後不可徒行也又曰魏勃少時欲求見齊相曹叅家貧無以自通乃常獨早夜掃齊相舎人門外舎人恠之以為物而伺之獨得勃勃曰願見相君無因故為子掃欲以求見於是舎人見之曹叅因以為舎人又曰東郭先生拜為都尉先生久待詔公車貧困饑寒衣弊履不完行雪中履有上無下足盡踐地道人}
