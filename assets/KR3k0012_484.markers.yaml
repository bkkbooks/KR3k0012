  - {type: punctuation, offset: 115, content: 「, id: KR3k0012_CHANT_484-bkkpn60}
  - {type: variant, offset: 115, length: 404, content: 公孫閼與潁考叔爭車潁考叔挾輈以走輈車轅也子都拔棘以逐之子都公孫閼也及大逵弗及子都怒又曰齊侯遊于姑焚遂田于貝丘姑焚貝丘皆齊地也見大豕從者曰公子彭生也怒曰彭生敢見射之豕人立而啼公懼墜于車傷足喪屨又曰齊侯蔡姬乘舟于囿蕩公公懼變色禁之不可公怒歸之未之絕也蔡人嫁之齊侯以諸侯之師侵蔡蔡潰又曰先軫朝問秦囚公曰夫人請之吾舍之矣先軫怒曰武夫力而拘諸原婦人暫而免諸國隳軍實而長寇讎亡無日矣不顧而唾公使陽處父追之及諸河則在舟中矣又曰楚子使申舟聘于齊曰無假道於宋及宋華元曰過我而不假道鄙我也鄙我亡也殺其使者必伐我伐我必亡亡一也乃殺之楚子聞之投袂而起屨及於窒皇劍及於寢門之外車及於蒲胥之市秋九月楚子圍宋又曰眾怒不可犯又曰衛獻公戒孫文子甯惠子食皆服而朝日旰不召而射鴻於囿二子從之不釋皮冠而與之言二子怒而逐獻公又曰邾莊公與夷射姑飲酒私出閽乞肉焉奪之杖以敲之公在門臺臨庭閽以缾水沃庭邾子望見之怒閽曰夷射姑旋焉旋小便也命執之弗得滋怒自投於床, SBCK: 室如懸罄}
  - {type: variant, offset: 115, length: 41, content: 公孫閼與潁考叔爭車潁考叔挾輈以走輈車轅也子都拔棘以逐之子都公孫閼也及大逵弗及子都怒, WYG: 室如懸磬論語曰貧而無謟}
