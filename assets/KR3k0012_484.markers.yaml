  - {type: variant, offset: 1477, length: 497, content: 與上起兵新野吏乃燒晨先祖祠堂污池室宅焚其冢墓宗族皆怒曰家自富足何故隨婦家入湯鑊中晨終無恨色又曰有詔會議靈臺所上謂桓譚曰天下事吾欲讖決之何如譚默然良久曰臣不讀讖上問其故譚復極言讖之非經上大怒曰桓譚非聖無法將下斬之譚叩頭流血良久得解出為六安郡丞又曰戴憑為侍中數進見門得失上謂憑曰侍中當輔國政勿有隱情憑曰太尉西曹掾蔣遵清亮忠孝學通古今陛下納膚受之譖遂禁錮世以是為嚴上怒曰子復欲黨乎憑出自繫廷尉詔出引見憑謝曰臣無謇諤之節而有狂瞽之言上即勑尚書解遵禁錮又曰韓歆字翁君南陽人以從征伐有功封扶陽侯好直言為司徒嘗因朝會帝讀隗囂公孫述相與書歆曰亡國之君皆有才桀紂亦有才上大怒以為激發免歸田里上猶不釋復詔就責歆及子嬰皆自殺又曰竇憲恃宮掖聲勢遂以賤直奪沁園公主不敢訴後肅宗駕出過園指以問憲憲陰嗚不得對發覺帝大怒召憲切責曰今貴主尚見枉奪何況小臣乎又曰杜根和熹鄧后臨朝根以安帝年長宜親政事乃上書直諫太后大怒收根囊盛撲殺之執法者私語行事人使不加力既而載出城外根詐死三日目中生蛆因逃竄及鄧氏誅根方歸徵拜侍御史魏志曰太祖討張魯東還時有將軍許遊擁部曲不附太祖大怒先欲討之群臣多諫可招懷遊共討強敵太祖橫刀於膝作色不聽繆襲欲諫太祖逆, SBCK: ''}
