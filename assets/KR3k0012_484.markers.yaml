  - {type: variant, offset: 779, length: 3, content: 趙使藺, SBCK: 倪寛千乗人治尚書歐陽生貧無貲用帶經而鋤休息輙誦讀又曰嚴助侍讌從容上問所欲對曰家貧爲友壻冨人所辱願爲㑹稽太守於是拜之又曰王章字仲卿太山鉅平人爲諸生學長安獨與妻居章疾病無􅀍卧牛衣中與妻决涕泣其妻呵怒曰仲卿京師尊貴在朝廷人誰踰仲卿者今疾病困厄不自激卯廼反涕泣何鄙也又曰朱買臣字翁子吴人也家貧好書不治産業常刈薪樵以自賣給食擔束薪行且誦書其妻亦􅀒載}
