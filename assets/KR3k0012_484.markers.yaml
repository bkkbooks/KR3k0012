  - {type: variant, offset: 692, length: 13, content: 言漢王曰齊反覆之國南邊吳楚, SBCK: 家貧無行}
  - {type: variant, offset: 692, length: 0, content: '', WYG: 家貧無行不得推擇為吏不能治生為商賈常從人寄食其母死無以葬乃行營髙燥地令傍可置萬家者又曰倪寛千乘人治尚書歐陽生貧無貲用帶經而鋤休息輙誦讀又曰嚴助侍讌從容上問所欲對曰家貧為友壻富人所辱願為㑹稽太守於是拜之又曰王章字仲卿泰山鉅平人為諸生學長安獨與妻居章疾病無被卧牛衣中與妻訣涕泣其妻呵怒曰仲卿京師尊貴在朝廷人誰踰仲卿者今疾病困厄不自激昂迺反涕泣何鄙也又曰朱買臣字翁子呉人也家貧好書不治産業常刈薪樵以自賣給食擔束薪行且誦書其妻亦負載相隨數止買臣無歌謳道中買臣愈益疾歌妻羞之求去買臣笑曰我年五十當富貴今四十餘矣汝苦日久待我富貴報汝功力妻恚曰如公等終餓死溝中耳何能富貴買臣不能留即聴去又曰蔡義河内温人以明經給事大將軍幕府家貧常歩行資禮不逮衆門下好事者相合為義買犢車令乘之又曰主父偃齊國臨淄人學長短縱横術晩迺學易春秋百家}
