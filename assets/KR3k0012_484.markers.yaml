  - {type: variant, offset: 1420, length: 3, content: 獨下延, SBCK: 到門不出夜遣吏到属縣書決罪行刑坐徴詣廷尉繫獄數曰免歸家貧無以自賑贍身築壍以給食章帝知憐之復以爲郎華嶠後漢書曰范式爲荆州刺史友人南陽孔嵩家貧親老乃變名姓傭爲新野河里街卒式行部到新野而縣選嵩爲導騶迎式式見而識之呼嵩把臂曰子非孔仲山耶對之歎息語及平生曰共與俱曳長􅅂遊集帝學吾蒙國恩致位牧伯而子懷道隱身處於卒伍不亦惜乎嵩曰昔侯嬴長守於賤業晨掃門肆志於抱關子居九夷不患其陋貧者士之冝豈爲鄙哉式勑縣代嵩嵩以爲先傭未竟不肯去續漢書曰范丹桓帝時以丹爲萊蕪長不到官後辟太尉府自以狷急不能從俗常佩韋於朝徒行􅁦服賣小於市遭黨人禁錮遂推鹿車載妻子捃拾自資或依􅀫樹䕃如此十餘年乃結草室内居焉閭里歌曰甑中生塵范史雲釡裏生魚范萊蕪又曰呉祐年二十䘮父居無擔石}
