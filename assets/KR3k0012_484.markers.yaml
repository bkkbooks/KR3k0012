  - {type: variant, offset: 648, length: 1, content: 始, SBCK: 先生所爲文市義者乃今見之矣驩對曰狡兎有三窟僅得免於死矣今君止有一窟未得髙枕而卧也請爲君復鑿二窟孟甞君與車五十乘金百斤西遊於梁􅀃魏王曰齊放其大臣孟甞諸侯先迎之者國冨兵強於是魏昭王}
  - {type: variant, offset: 648, length: 1, content: 始, WYG: 甘茂亡秦奔齊逢蘇代為齊使於秦茂曰臣得罪於秦懼而迯無所容跡臣聞富人女㑹績貧人女曰我無}
