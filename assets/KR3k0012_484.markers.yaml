  - {type: variant, offset: 238, length: 1, content: 蔡, WYG: 請而見之謝曰文倦於事憒於體久闕罪於先生先生不羞乃有思欲為收債乎煖對曰願之於是約車治装載劵契將行煖問曰收債畢市何物而返也孟嘗君曰視吾家之寡有者煖遂驅而之薛使吏召諸民當償債者悉來合劵劵既合煖乃矯君命以所償賜諸民因燒其劵民皆呼萬歲煖遂長驅而還見孟嘗君君恠其疾也衣冠而見之曰債畢乎對曰畢何市而返對曰臣竊計宫中珍寳盈室車馬實於外廐美}
