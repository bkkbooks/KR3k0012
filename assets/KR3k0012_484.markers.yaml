  - {type: variant, offset: 1405, length: 7, content: 龐萌為平狄將軍, SBCK: 桓榮字春卿沛郡龍亢人也少學長安治歐陽尚書事􅀶士朱普貧窶無常客傭以自給精力不倦十五年不闚家又曰閔仲叔居安邑老病家貧不能買肉日買一片猪肝屠者或不肯爲斷安邑令􅀱之問諸子何飯食對曰但食猪肝屠或不肯}
