  - {type: variant, offset: 637, length: 1, content: 趙, krp: 怪曰此誰乎左右曰歌夫長鋏歸來者也孟甞君笑曰客果有能吾負之未之見也請而見之謝曰文倦於事憒於憂乆闕罪於先生先生不羞乃有意欲爲收債乎驩對曰願之於是約車治裝載劵契將行驩問曰收債畢市何物而返也孟甞君曰視吾家之寡有者驩遂驅而之薛使吏召諸民當償債者悉來合劵劵旣合驩乃矯君命以所債賜諸民因燒其劵民皆呼萬歲驩遂長驅而還見孟甞君君怪其疾也衣冠而見之曰債畢乎對曰畢向市而返對曰臣竊計宫中珎寳盈室車馬實於外廐美}
  - {type: variant, offset: 639, length: 0, content: '', SBCK: 充下陳君家所寡有者義耳􅀼爲君市義孟甞君曰市義若何對曰今君有區區之薛不附愛子其民因而賈利之臣􅀼矯君命盡以賜之而燒其劵民時稱萬歳此臣爲君市義也孟甞君不悅曰先生休矣於是朞年人或毀孟甞君於湣王曰孟甞君將亂及王出畋忽有刼王者意甚疑之孟甞君將出奔其舎人魏子􅀄爲君收邑三返而不敢入君問之對曰有賢者竊爲君教與之以故無入至是魏子所與賢者}
  - {type: variant, offset: 639, length: 0, content: '', WYG: 魏子初為君收邑三返而不敢入君問之對曰有賢者竊為君教與之以故無入至是魏子所與賢者}
  - {type: variant, offset: 639, length: 0, content: '', krp: 充下陳君家所寡有者義耳竊爲君市義孟甞君曰市義若何對曰今君有區區之薛不附愛子其民因而賈利之臣竊矯君命盡以賜之而燒其劵民時稱萬歳此臣爲君市義也孟甞君不悅曰先生休矣於是朞年人或毀孟甞君於湣王曰孟甞君將亂及王出畋忽有刼王者意甚疑之孟甞君將出奔其舎人魏子𥘉爲君收邑三返而不敢入君問之對曰有賢者竊爲君教與之以故無入至是魏子所與賢者}
