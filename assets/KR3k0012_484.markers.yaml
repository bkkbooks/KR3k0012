  - {type: variant, offset: 629, length: 1, content: 嘗, SBCK: 之賢病且死謂其子曰我死汝必貧困其子無立錐之地又曰寗戚衛人也欲仕齊家貧無以自資乃賃爲人推車至齊國桓公出戚望見車駕乃於車下飯牛扣牛角而歌桓公聞之撫手曰異哉此人乃非常人也命管仲迎之以爲上卿又曰馮驩齊人貧乏不能自存使人屬齊相孟甞}
  - {type: variant, offset: 629, length: 1, content: 嘗, krp: 之賢病且死謂其子曰我死汝必貧困其子無立錐之地又曰寗戚衛人也欲仕齊家貧無以自資乃賃爲人推車至齊國桓公出戚望見車駕乃於車下飯牛扣牛角而歌桓公聞之撫手曰異哉此人乃非常人也命管仲迎之以爲上卿又曰馮驩齊人貧乏不能自存使人屬齊相孟甞}
  - {type: variant, offset: 631, length: 0, content: '', SBCK: 願􅀉食門下孟甞君曰}
  - {type: page-break, offset: 631, content: '', id: KR3k0012_SBCK_484-2b}
  - {type: variant, offset: 631, length: 5, content: 客於趙平原, WYG: 將亂及王出畋乃有刼王者意甚疑之孟嘗}
  - {type: variant, offset: 631, length: 0, content: '', krp: 願寄食門下孟甞君曰}
  - {type: variant, offset: 632, length: 0, content: '', SBCK: 何能也對曰無能孟甞君􅀏而受之左右皆知君賤之食以草具居有頃驩􅀝柱彈其劒鋏而歌曰長鋏歸來乎食無魚左右以告孟甞君食之乃比門下諸客居有頃復歌曰長鋏歸來乎岀無車左右以告孟甞君爲之駕比門下客後有頃復歌曰長鋏歸來乎無以爲家左右皆惡之以其貪不知足也孟甞君問驩曰公有親乎對曰有母孟甞君令人給其食用無使乏驩乃不復歌後孟甞君出記事問門下諸客有能習計㑹能爲吾收債}
  - {type: variant, offset: 632, length: 0, content: '', krp: 何能也對曰無能孟甞君笑而受之左右皆知君賤之食以草具居有頃驩倚柱彈其劒鋏而歌曰長鋏歸來乎食無魚左右以告孟甞君食之乃比門下諸客居有頃復歌曰長鋏歸來乎岀無車左右以告孟甞君爲之駕比門下客後有頃復歌曰長鋏歸來乎無以爲家左右皆惡之以其貪不知足也孟甞君問驩曰公有親乎對曰有母孟甞君令人給其食用無使乏驩乃不復歌後孟甞君出記事問門下諸客有能習計㑹能爲吾收債}
  - {type: variant, offset: 633, length: 3, content: 趙平原, SBCK: 薛乎驩獨署曰臣能孟甞}
