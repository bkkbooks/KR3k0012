  - {type: variant, offset: 334, length: 293, content: 宋及宋華元曰過我而不假道鄙我也鄙我亡也殺其使者必伐我伐我必亡亡一也乃殺之楚子聞之投袂而起屨及於窒皇劍及於寢門之外車及於蒲胥之市秋九月楚子圍宋又曰眾怒不可犯又曰衛獻公戒孫文子甯惠子食皆服而朝日旰不召而射鴻於囿二子從之不釋皮冠而與之言二子怒而逐獻公又曰邾莊公與夷射姑飲酒私出閽乞肉焉奪之杖以敲之公在門臺臨庭閽以缾水沃庭邾子望見之怒閽曰夷射姑旋焉旋小便也命執之弗得滋怒自投於床論語曰哀公問弟子孰為好學孔子對曰有顏回者好學不遷怒不貳過不幸短命死矣今也則亡國語曰晉郄獻子如齊聘齊傾公使婦人觀而笑之獻子怒歸請伐齊范武子退自朝曰郄子之怒甚矣不逞於齊必發諸晉國逞解不得政何以逞怒余將致政焉以成其怒也史記, WYG: 湣王}
