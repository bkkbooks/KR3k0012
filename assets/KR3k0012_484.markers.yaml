  - {type: variant, offset: 3355, length: 1209, content: 里封鄢陵君鄢陵君辭不受使唐且謝秦王秦王怒曰嘗見天子之怒乎一怒伏尸百萬流血千里唐且曰大王嘗聞布衣韋帶之士怒乎伏尸二人流血五步即按其匕首起視秦王曰今將是矣王變色長跪曰先生就坐寡人諭矣列士傳曰秦召魏公子無忌無忌不行使朱亥奉璧一雙秦王大怒將朱亥著虎圈中亥瞋目視虎眥裂血出濺虎虎不敢動怨尚書曰商王受自絕于天結怨于民崇信奸回放黜師保又曰怨豈在明不見是圖毛詩曰亂世之音怨以怒其政乖又曰角弓父兄剌幽王也不親九族而好讒佞骨肉相怨故作是詩又曰民之無良相怨一方左傳曰宋華元將與楚戰殺羊食士其御羊斟不與及戰曰疇昔之羊子為政今日之事我為政與入鄭師故敗君子謂羊斟非人也以其私怨敗國殄民又曰晉侯賞從亡者介之推不言祿祿亦弗及其母曰盍亦求之以死誰懟對曰尤而效之罪又甚焉且出怨言不食其食又曰季郈之雞鬭季平子郈昭伯季氏芥其雞郈氏為之金距平子怒益室於郈且讓之故郈昭伯怨平子又曰晉郗至獻楚捷于周與單襄公語驟稱其伐單子語諸大夫曰溫季其亡乎位於七人之下而求掩其上怨之所藂亂之本也多怨而階亂何以在位又曰吳公子札來聘請觀於周樂為歌周南召南曰美哉始基之矣猶未也然勤而不怨矣為之歌小雅曰美哉思而不貳怨而不害其周德之衰乎又曰子產曰我聞忠恕以積怨不聞作威以防怨又曰君子之言信而有徵故怨遠於其身小人之言僣而無徵故怨咎及之論語曰放於利而行多怨又曰貧而無怨難富而無驕易國語曰夫事君者險而不懟怨而不怒戰國策曰趙襄子怨智伯漆其頭為飲器漢書曰汲黯列九卿而公孫洪張湯為小吏及弘湯稍與黯同位而尊用過之黯心褊不能無怨望見上言曰陛下用群臣如積薪耳後來者居上東觀漢記曰長水校尉耿恭坐將兵不憂軍事肆心縱欲飛鷹走狗遊戲道上虜至不敢出得詔書怨懟徵下獄續漢祭祀志曰建武二十年二月群臣上言即位三十年宜封禪太山詔書曰即位三十年百姓怨氣滿腹吾誰敢欺欺天乎晉書曰趙王倫謟事賈后裴頠甚惡之倫數求官頠與張華復固執不許由是深為倫所怨玉韶之晉紀曰桓玄問眾曰朕其敗乎曹靖之對曰神怒民怨臣實憂懼玄曰民怨有之神何為怒對曰移晉宗廟所以怒也管子曰凡禍亂之所生各在於非理故曰閑禍在除怨晏子春秋曰景公籍重而獄多拘者滿圄怨者滿朝文子曰人有三怨爵高者人妒之官大者王惡之祿厚者怨處之夫爵益高者意益下官益大者心益小祿益厚者意益薄淮南子曰和氏之璧夏氏之璜揖讓而進之則忻暮夜以投人則為怨時與不時也楚辭曰怨靈脩之浩兮終不察夫民心眾女妒余之娥眉兮譖諑謂余善淫譖毀也諑譖也琴操曰王昭君者齊國襄王之女也昭君年十七時顏色皎潔聞於國中襄王見昭君端正閑麗於孝元帝既不幸納備後宮積五六年王昭君心有怨曠不飾其形容元帝每歷後宮踈略不過其處後單于遣使者朝賀元帝陳設倡樂乃令後宮莊出昭君怨恚久不得侍列乃更脩飾盛服形容光輝帝令後宮欲至單于者起於是昭君喟然越席而前曰妾幸得備在後宮麤醜卑陋不合陛下之心誠願得元帝見昭君便驚悔不得復止遂以與之王昭君雖去漢至單于心思不樂乃作怨曠思惟歌曰秋木萋萋其葉萎黃我獨伊何改往變常翩翩之燕遠集西羌高山峨峨河水泱泱父母妻子道里悠長嗚呼哀哉憂心惻傷, SBCK: 四}
