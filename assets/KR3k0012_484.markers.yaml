  - {type: variant, offset: 637, length: 1, content: 趙, SBCK: 怪曰此誰乎左右曰歌夫長鋏歸來者也孟甞君􅀏曰客果有能吾􅀒之未之見也請而見之謝曰文倦於事憒於憂乆闕罪於先生先生不羞乃有意欲爲收債乎驩對曰願之於是約車治裝載劵契將行驩問曰收債畢市何物而返也孟甞君曰視吾家之寡有者驩遂驅而之薛使吏召諸民當償債者悉來合劵劵旣合驩乃矯君命以所債賜諸民因燒其劵民皆呼萬歲驩遂長驅而還見孟甞君君怪其疾也衣冠而見之曰債畢乎對曰畢向市而返對曰臣竊計宫中珎寳盈室車馬實於外廐美}
  - {type: page-break, offset: 637, content: '', id: KR3k0012_SBCK_484-3a}
