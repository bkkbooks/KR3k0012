  - {type: variant, offset: 2877, length: 477, content: 後魏書曰李彪之入京也孤微寡援而自立不群以李沖好士傾心宗附沖亦重其器學禮而納焉每言之高祖公私共相援益及彪為中尉兼尚書為高祖知待便謂非復籍沖而更相輕背唯公歛袂而已沖時震怒數責彪前後愆悖瞋目大呼投折几案詈辱肆口沖素溫柔而一旦暴急遂發病荒悸言語亂錯猶扼腕叫詈稱李彪小人然醫藥所不能療或謂肝藏傷裂旬有餘日而卒列子曰宋有蘭子能以伎干宋元君雙杖屬其腦弄七劍而躡之元君立賜金帛又有蘭子能燕戲聞之復以干元君元君大怒曰昔有異伎適值寡人有忻心故賜金帛彼必聞此復望吾賜拘而戮之莊子曰孔子往見盜跖下車而前謁者通之盜跖聞之忿怒目如明星髮上指冠孔子趍而進避席反走再拜盜跖大怒而展其足按劍嗔目其聲如吼虎韓子曰孟孫獵得麑使秦巴持之其母隨而呼秦巴不忍而與其母孟孫適至求麑不得大怒逐之居三月復召使為子傅燕丹子曰田光荅太子曰竊觀太子客皆無可用者夏扶血勇之人怒而面赤宋意脈勇之人怒而色青武陽骨勇之人怒而色白荊軻神勇之人怒而色不變吳越春秋曰吳王伐齊請公孫聖告之聖諫願大王勿伐齊王大怒曰吾天之所生神之所助使力士石番擊以鐵槌身絕為五吳越春秋曰子胥諫吳王王怒賜以钃鏤之劍盛以鴟夷之器投之於江說苑曰秦王以五, SBCK: 八}
