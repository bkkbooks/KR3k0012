  - {type: variant, offset: 2389, length: 9, content: 導妻曹氏性妒導憚之, SBCK: 猛北海人居魏土少貧賤鬻畚爲業甞至洛陽貨畚有一人於市貴買畚而無直曰可隨我去取直猛隨行不覺逺忽至深山語猛且住樹下當先啓道君來須􅁷猛進見一公踞胡牀頭鬢悉白從十許人一人引猛云大司馬公可進猛因拜公公曰王公何縁拜即十倍酬畚直遣人送猛出頋視}
