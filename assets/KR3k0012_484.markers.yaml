  - {type: variant, offset: 650, length: 0, content: '', SBCK: 其故相爲上將軍而虚相位遣謁者賫黄金千斤車乗徃聘孟甞君固辭不徃魏使三返湣王聞之君臣恐懼遣太傅賫黄金千斤文馬二駟以謝孟甞君使返國驩又請曰願得先生􅀕噐立宗廟於}
  - {type: variant, offset: 650, length: 1, content: 薛, WYG: 置燭而子之火光有餘子可分我餘光無損子明今臣困願以餘光振之漢書曰司馬相如字長卿成都人家貧嘗於臨卭市與人沽酒傭為洒掃身着犢鼻布裩於市中然少好讀書學擊劒小名犬子慕藺相如之為人更名曰相如後遊梁數年歸素與臨卭令王吉善臨卭多富人有卓王孫程鄭相謂曰令有貴客為具召之并召令令既至請長卿長卿謝不能臨臨卭令不敢嘗食乃自起迎相如相如不得已而強往一坐盡歡酒酣令前奏琴曰竊聞長卿好之願以自娯相如為鼓一弄卓王孫有女文君新寡好音竊窺之相如乃挑之文君夜奔相如相如與馳歸成都家徒四壁立卓王孫大怒女不才我不忍殺一錢不分文君久之與相如俱至臨卭買酒舎乃令文君當罏相如與傭保雜作於市卓王孫恥之昆弟諸}
