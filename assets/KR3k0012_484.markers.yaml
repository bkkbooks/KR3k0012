  - {type: variant, offset: 2630, length: 246, content: 武之國若以假人將有尾大之患公宜自領以為梁州足矣敦從之訪大怒敦手書譬釋并遺玉環玉椀以申厚意訪投椀於地曰吾豈賈豎可以寶悅乎又曰陶侃嘗出遊見人持一把未熟稻問用此何為人云行道所見聊取之耳侃大怒曰汝既不佃而戲賊人稻執而鞭之齊書曰袁彖性剛嘗以微言忤世祖又與王晏不協世祖在便殿用金柄刀子治瓜晏在側曰外聞有金刀之言恐不宜用此物世祖愕然窮問所以晏曰袁彖為臣說之上銜怒良久彖到郡坐逆用祿錢免官崔鴻後趙錄曰冉閔為慕容恪所擒慕容雋立問閔曰汝奴僕下才何自妄稱天子閔曰爾曹人面獸心欲篡逆我一時英雄何為不作帝王耶雋怒鞭之三, SBCK: 展病者亦愈太平御覽卷第四}
