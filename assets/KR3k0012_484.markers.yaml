  - {type: variant, offset: 158, length: 0, content: '', WYG: 貧與賤是人之所惡也不以其道得之不去也又曰衣敝緼袍與衣狐貉者立而不耻者其由也與緼絮也又曰賢哉回也一簞食一瓢飲在陋巷人不堪其憂回也不改其樂又曰邦有道貧且賤焉耻也又曰君子憂道不憂貧家語曰端木賜駟馬連騎以從原憲居蓬蒿之中并日而食子貢曰甚矣子之病矣國語曰叔向見韓宣子憂貧叔向賀之宣子曰吾有卿之名而無其實無以從二三子家貧則不及人也吾是以憂子賀我何故對曰昔欒武子無一卒之田武子晉正卿欒書也大夫一卒無者不及上大夫其官不備其宗器器祭器也宣其徳行順其憲則諸侯親之戎翟懐之今吾子有欒武子之貧吾以為能其徳矣是以賀若不憂徳之不脩而患貨之不足將弔不暇何賀之有史記曰孫叔敖知優孟之賢病且死謂其子曰我死汝必貧困其子無立錐之地又曰甯戚衛人也欲仕於}
