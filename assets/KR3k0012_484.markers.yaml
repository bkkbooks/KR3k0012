  - {type: variant, offset: 683, length: 0, content: '', SBCK: 􅁗則不然用商鞅之法改帝王之制除井田民得賣買冨者連阡陌貧者亡立錐之地故貧民常衣馬牛之衣而食犬􅇾之食又曰陳平陽武戸牗郷人少時家貧有田三十􅅿與兄伯居常耕田縱平使遊學平爲人長大美色人或謂平貧何食而肥􅀂是其嫂疾平之不親家事曰食糠籺耳有叔如此不如無平好讀詩書家貧居窮巷以席爲户然門外多長者車轍又曰酈食其陳留髙陽人好讀書家貧落魄無衣食業爲里監門吏然}
  - {type: page-break, offset: 683, content: '', id: KR3k0012_SBCK_484-5b}
  - {type: variant, offset: 683, length: 0, content: '', WYG: 秦則不然用商鞅之法改帝王之制除井田民得賣買富者連阡陌貧者亡立錐之地故貧民常衣馬牛之衣而食犬彘之食又曰陳平陽武户牖鄉人少時家貧有田三十畝與兄伯居伯常耕田縱平使遊學平為人長大美色人或謂平貧何食而肥若是其嫂疾平之不親家事曰食糠籺耳有叔如此不如無平好讀詩書家貧居窮巷以席為户然門外多長者車轍又曰酈食其陳留髙陽人好讀書家貧落魄無衣食業為里監門吏然}
