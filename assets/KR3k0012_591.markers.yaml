  - {type: variant, offset: 3818, length: 0, content: '', SBCK: 帝乙有雷震之禍殷紂致分砂之災多營池觀逺求異寳民不得耕女不得蚕田荒業廢兆庶凋殘見其飢寒不爲之哀覩其勞苦不爲之戚苦民之君也非治民之主也薄賦輕傜百姓家給上無急命之徴下有謳歌之詠屈一身之}
  - {type: page-break, offset: 3818, content: '', id: KR3k0012_SBCK_591-6a}
  - {type: variant, offset: 3818, length: 0, content: '', krp: 帝乙有雷震之禍殷紂致分砂之災多營池觀逺求異寳民不得耕女不得蚕田荒業廢兆庶凋殘見其飢寒不爲之哀覩其勞苦不爲之戚苦民之君也非治民之主也薄賦輕傜百姓家給上無急命之徴下有謳歌之詠屈一身之}
  - {type: variant, offset: 3819, length: 1, content: 輕, SBCK: 樂四海之民憂國之主也樂民之君也此}
  - {type: variant, offset: 3819, length: 1, content: 輕, krp: 樂四海之民憂國之主也樂民之君也此}
  - {type: variant, offset: 3821, length: 0, content: '', SBCK: 所以爲難也且用人之道又爲未易巳之所賢未必盡賢衆之所毀未必全惡知能不舉即爲失才知惡不黜則爲禍胎又人才互有長短不必兼通是以公綽優於大國之卿子産善爲小􅀖之相綘侯木訥卒安劉氏之宗嗇夫利口不任上林之令捨短從長然後爲羙夫人剛柔之情各異曲直之性不同不可不察也逆主耳而履道戮孔懷以安國周公是也順上心以安身隨君情而殺之易牙是也棄巳之命存君之身紀信是也挾國謀事以報公讎􅀽盎是也􅂢身而執節􅀌立而自毁屈原是也外顯和穆之端内懷湯火之意宰嚭是也忠謟之道以此觀之足以永鏡白起爲􅁗平趙乃􅀍昭王所殺亞夫定七國之亂卒爲景帝所誅文種設䇿滅呉翻遭越王之戮五貟竭誠爲國終罹賜劒之禍乃君之過也非臣之罪焉至如趙髙韓信黥布陳狶之儔此自貽厥釁非君之濫刑之也髙祖失於存功之能光武獲於置將之妙臣安君社稷之國君處臣危亡之地豈是相酬之道也爲天下之君處萬民之上安可易乎背道違}
