  - {type: variant, offset: 2, length: 3, content: 六銘釋, WYG: 七御製上御製上尚書益稷曰帝庸作歌曰勑天之命惟時惟幾乃歌曰股肱喜哉元首起哉百工熈哉臯陶拜手稽首颺言曰念哉率作興事慎乃憲欽哉屢省乃成欽哉乃賡載歌曰元首明哉股肱良哉庶事康哉又歌曰元首叢脞哉股肱惰哉萬事墮哉漢書曰髙祖還歸過沛置酒沛宫悉召故人父老子弟佐酒發沛中兒得百二十人教之歌酒酣髙祖擊筑自為歌曰大風起兮雲飛揚威加海内兮歸故郷安得猛士兮守四方又曰武帝求賢詔曰蓋有非常之功必待非常之人故馬或奔踶而致千里士或有負俗之累而立功}
