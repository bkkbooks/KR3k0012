  - {type: variant, offset: 702, length: 0, content: '', WYG: 小智不可謀大巧詐不如拙誠信匪謬矣有明王有暗主漢祖攝衣}
  - {type: variant, offset: 703, length: 4, content: 劍閣崔鴻, WYG: 酈生比干剖心於帝辛殷湯留情於伊尹龍逢被戮於夏桀楚莊暇隙而懷憂晉侯罷朝而含喜闇主護短而拒善明主思短而長善觀漢祖殷湯仰其有德行譬若隂陽調四時會法令均萬民樂則麒麟呈其祥漢祖殷湯豈非麒麟之類乎觀夏癸商辛其背惡之甚政令不行如寒暄失序則猛獸肆毒螽螟為害夏癸商辛豈非猛獸之類乎予以此觀之豈非天道也雖曰天時抑亦人事成湯之世有七年之旱剪髪為犧千里雨降太戊之世桑榖生朝懼而修德遂使}
