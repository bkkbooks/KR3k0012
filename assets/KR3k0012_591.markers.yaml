  - {type: variant, offset: 1136, length: 421, content: 金人器銘曰武王問尚父曰五帝之誡可得聞乎尚父曰黃帝之戒曰吾之居民上也搖搖恐夕不至朝故為金人三封其口曰古之慎言堯之居民上也振振如臨深淵舜之居民上也慄慄恐夕不見旦武王曰吾并殷民居其上也翼翼懼不敢息尚父曰德盛者守之以謙威彊者守之以恭武王曰欲如尚父言吾因是為誡隨之身孔子家語曰孔子觀周遂入太祖后稷之廟廟當右階之前有金人焉三緘其口而銘其背曰古之慎言人也誡之哉無多言無多事多言多敗多事多害安樂必誡無所行悔勿謂何傷其禍將長勿謂何害其禍將大勿謂不聞神將伺人焰焰弗滅炎炎若何涓涓不壅終為江河綿綿不絕或成網羅綿綿微細若不絕則有成網羅者也豪末不札如豪之未言微者札拔也將尋斧柯誠能慎之福之垠也口是何傷禍之門也強梁者不得其死好勝者必遇其敵盜憎主人民怨其上君子知天下之不可上也故下之知眾人之不可先也故後之溫恭慎德使人慕之執雌持下人莫踰之人皆趨彼我獨守此人皆惑之我獨不徙內藏乃智不示人技我雖尊高人弗我害唯能於此也江海雖左長於百川以其卑也天道無親嘗與善人誡之哉戒之哉孔子既讀斯, SBCK: ''}
