  - {type: variant, offset: 806, length: 5, content: 砥柱因勒銘, WYG: 十一年太宗幸洛陽遣使祭漢太尉楊震墓太宗自為文曰惟君資華巖之竒氣禀金方之秀質體忠篤以成性應時運而挺生彈冠贊務弼諧帝道正色立朝周行以肅坐槐爕理鼎飪載調值安德不昇政由近習氣舛玉衡日微黄道君慨然忠憤乃心王室昌言正義屢犯}
