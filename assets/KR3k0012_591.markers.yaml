  - {type: variant, offset: 3813, length: 0, content: '', SBCK: 云桀紂躭於聲色子將爲不好也何以然桀紂命不終於天年樂不終於一丗以此知爲不好也舜禹命壽於終樂畢於丗予謂之愛也且夫人有寛躁強柔之志愁樂貪慾之心性有善不善者也由是觀之堯舜禹湯躬行仁義治致隆平此禀其善性也幽厲桀紂乃爲炮烙之刑刳孕婦割人心斮朝渉脯􅀑侯造酒池糟丘爲長夜之飲此其受於不善之性也夫立身之道在於折􅂨不在於偏躭呉起曰昔桑氏之君脩德廢武以滅其國有扈之君恃衆好勇以䘮社稷仲尼曰寛濟猛猛濟寛仁義之道猶不得偏何况於左道乎况於不仁乎爲君之道處至極之尊以億兆爲心以萬􅀖爲意安民必以文德防邊必以武功孔子曰夫文之所加者深武之所服者大德之所施者愽則威之所制者廣不可以武威安民不可以文德備塞大鯨岀水必廢遊波之功鴻鵠沉泥定無凌空之効􅀂各令遂志並不失其}
  - {type: page-break, offset: 3813, content: '', id: KR3k0012_SBCK_591-4b}
  - {type: variant, offset: 3813, length: 0, content: '', krp: 云桀紂躭於聲色子將爲不好也何以然桀紂命不終於天年樂不終於一丗以此知爲不好也舜禹命壽於終樂畢於丗予謂之愛也且夫人有寛躁強柔之志愁樂貪慾之心性有善不善者也由是觀之堯舜禹湯躬行仁義治致隆平此禀其善性也幽厲桀紂乃爲炮烙之刑刳孕婦割人心斮朝渉脯鬼侯造酒池糟丘爲長夜之飲此其受於不善之性也夫立身之道在於折衷不在於偏躭呉起曰昔桑氏之君脩德廢武以滅其國有扈之君恃衆好勇以䘮社稷仲尼曰寛濟猛猛濟寛仁義之道猶不得偏何况於左道乎况於不仁乎爲君之道處至極之尊以億兆爲心以萬邦爲意安民必以文德防邊必以武功孔子曰夫文之所加者深武之所服者大德之所施者愽則威之所制者廣不可以武威安民不可以文德備塞大鯨岀水必廢遊波之功鴻鵠沉泥定無凌空之効若各令遂志並不失其}
  - {type: variant, offset: 3814, length: 2, content: 育物, SBCK: 古人云構大厦者先擇木然後簡材治國者先擇佐然後定民大匠構屋必以大材爲棟梁小材爲榱撩苟有所中尺寸之木無棄此善理木者也非獨屋有棟梁國家亦然大德爲宰相亦國之棟梁也予思三代以來君有所好民必從之在上留心臺榭竒巧之人必至致情遊獵馳騁之人逺臻存意管􅁌鄭衛多進降懷脂粉燕趙斯來塞切直之路爲忠者少少開謟䛕之道爲佞者必多古人云君猶器也民猶水也方圎在於器不在於水以此而言足爲永戒夫玉不􅅣不成器人不學不知道仲尼好於郯子文王學於虢叔聖人且猶如此何况於凢人乎治主思賢如農夫之望􅀊哲后求人􅀂旱苗之思雨亂君嫉勝巳如讎視不肖如子懷之中心何日暫忘王莽僞行仁義之道有始無終孫皓權施恩惠之風有􅀄無末二子猶舡之汎巨浪毁在不遥􅀂駑焉之奔千里困其將至古人云􅂛量不以盛碩小智不可謀大巧詐不如拙誠信無謬矣有明主有暗主漢祖攝衣於酈生比干剖心於辛紂殷湯留情於伊尹龍逢􅀍戮於夏桀楚莊暇􅂩而懷憂武侯罷朝而含喜闇主護短而永愚明主思短而長善覩漢祖殷湯仰其有德行譬􅀂隂陽調四時㑹法令均萬民樂則騏驎呈其祥漢祖殷湯豈非騏驎之􅀋乎觀夏癸商辛嗟其悖惡之甚猶政令不行寒暄失序則猛獸肆毒螽螟爲害夏癸商辛豈非猛獸之儔乎予以此觀之豈非天道也雖曰天時抑亦人事成湯之丗有七年之旱剪髪爲犧千里雨降太戊之時桑穀生朝懼而脩德遂使十有六國重譯而來此豈非人事者也或云爲君難爲臣不易君處尊髙之位執賞罰之權録人之材因人之力何爲不成何求不得此言似易論之實難何者輕凌天地衆精顯其妖忽慢神靈風雨應其暴}
