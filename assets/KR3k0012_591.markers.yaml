  - {type: variant, offset: 842, length: 293, content: 世謂勒石銘功德大戴禮曰武王踐祚三日召士大夫而問焉曰惡有藏之約行之萬世可以為子孫者乎師尚父曰在丹書王欲聞之則齋矣三日端冕師尚父端冕奉書而入則負屏而立王下堂南面而立父曰先王之道不北面王行西折而東面而立師尚父西面道書之言曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶以仁得之以仁守之其量百世以不仁得之以仁守之其量十世以不仁得之以不仁守之必及其世王聞書之言惕然若恐懼而為誡書於席之四端為銘焉太公金匱曰武王曰吾隨師尚父之言因為慎書銘隨身自誡其冠銘曰寵以著首將身不正遺為德咎書履曰行必慮正無懷僥倖書劍曰常以服兵而行道德行則福廢則覆書鏡曰以鏡自昭則知吉凶書車曰自致者急載人者緩取欲無度自致而反皇覽記陰謀黃, SBCK: 詔䇿皆}
