  - {type: variant, offset: 2243, length: 597, content: 流別傳曰夫古之銘至約今之銘至煩亦有由也質文時異則既論之矣且上古之銘銘於宗廟之碑蔡邕為楊公作碑其文典正末世之美者也後世以來器銘之佳者有王莽鼎銘崔瑗机銘朱公叔鼎銘王粲硯銘咸以表顯功德天子銘嘉量諸侯大夫銘太常勒鍾鼎之義所言雖殊而令德一也李尤為銘自山河都邑至於刀筆符契無不有銘而文多穢病討而潤色言可采錄三輔決錄曰何敞字文高為汝南太守帝南巡過郡郡有刻鏤屏風帝命侍中黃香銘之曰古典務農彫鏤傷民忠在竭節義在脩身事見黃香集銘志西京雜記杜子夏葬長安北四里臨終作文曰魏郡杜鄴立志忠款犬馬未陳奄先朝露骨肉歸於后土魂氣無所不之何必古丘然後即化封於北郭山焉晏然處死乃命刊名埋於墓前種松柏五株至今茂盛西京雜記滕公駕至陳都門馬鳴跪不肯前以足跑地久之滕公懼使卒掘其所跪之地深二尺得石槨滕公以燭照之有銘乃以水洗之其文字古異左右莫能知問叔孫通通曰科斗書也以今文寫之曰佳城鬱鬱三千年見白日呼嗟滕公居此室滕公曰嗟乎天也吾死其葬此乎於是終葬此焉博物志曰魯閹里蔡伯公死求葬庭中有二人行頃還葬二人復出掘土得石槨有銘曰四體不勤孰為作生不遭遇長附託賴得二人發吾宅閭里祠之又曰衛靈公葬得石槨銘云不逢箕子靈公奪之我里七辭傅玄七謨序曰昔枚乘作七發而屬文之士若傅毅劉廣崔駰李尤桓麟崔琦劉梁桓彬之徒承其流而作之者紛焉七激七依七說七觸七舉七誤之篇於通儒大才馬季長張平子亦引其源而廣之馬作七廣張造七辨或以恢大道而導幽滯或以點瑰奓而託調詠楊暉播烈垂於後世者凡十, SBCK: 百}
