  - {type: variant, offset: 1717, length: 524, content: 拘廣庭終身義手孔子家語曰孔子觀於魯桓公之廟見欹器焉歌傾孔子問於守廟者曰此何器也對曰宥坐之器子曰吾聞宥坐之器虛則欹中則正滿則覆明君以為至誡常置於坐側也子路進曰敢問持滿有道乎子曰聰明叡智守之以愚功被天下守之以讓勇力振世守之以怯富有四海守之以謙後之君子感誡之至追而作銘楊子法言曰或問銘曰銘哉銘哉有意於慎也文心雕龍曰昔軒轅帝刻輿以弼違太禹勒筍簴以招諫成湯盤盂著日新之規武王戶席題必誡之訓周公慎言於金人仲尼革容於欹器列聖鑒戒其來久矣故銘者名也觀器必也正名審用貴乎慎德蓋臧武仲之論銘也曰天子令德諸侯計功大夫稱伐夏鑄九牧之金周勒肅慎之楛令德之事也呂望銘功於昆吾仲山鏤績於庸器計功之義也魏顆紀勳於景鍾孔悝表勤於衛鼎稱伐之類也若乃飛廉有石槨之錫雲公有奪里之諡銘發幽石噫可怪也趙靈勒跡於潘吾秦昭刻傳於華山夸誕示後吁可笑也詳觀眾例銘義見矣至於始皇勒岳政暴而文澤亦有踈通之美焉若乃班固燕然之勒張旭華陰之碣序亦成矣蔡邕之銘思燭古全橘公之鍼則吐納典譽朱穆之鼎全成碑文溺所長也至如敬通新器矱淮武銘而事非其物繁略違中崔駰品物讚多戒少李尤積篇義儉辭碎蓍龜神物而居博弈之下衡斛嘉量而在杵臼之末曾名品之未暇何事理之能閑哉魏文九寶器利辭鈍惟張載劍閣其才清彩迅足駸駸後發前至銘勒崏漢得其宜矣, SBCK: 餘}
