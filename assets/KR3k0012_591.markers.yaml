  - {type: variant, offset: 255, length: 0, content: '', SBCK: 威加海内兮歸故郷安得猛士兮守四方又曰武帝求賢詔曰盖有非常之功必待非常之人故馬或奔踶而致千里士或有􅀒俗之累而立功名夫泛駕之馬弛斥之士亦在御之而巳泛覆也方腫反弛廢也斥逐也其令州縣察吏民有茂才異等可爲將相及使絶國者又曰武帝幸河東祠后􅁟顧帝京欣然中流與群臣宴飲上歡甚乃自作秋風辭云秋風起兮白雲飛草木黃落兮鴈南歸蘭有秀兮菊有芳携佳人兮不能忘泛樓舡兮濟汾河橫中流兮揚素波蕭皷鳴兮發棹歌歡樂極兮哀情多少壯幾時兮柰老何後漢書東平憲王蒼傳曰顯宗}
