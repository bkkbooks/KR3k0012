  - {type: variant, offset: 677, length: 4, content: 張載字孟, SBCK: 殷仲堪爲黃門郎孝武嘗示仲堪詩曰勿以巳才而􅀏不才宋書曰髙祖過彭城置酒命􅁓筆爲詩曰先蕩臨淄穢却清河洛塵華}
  - {type: page-break, offset: 677, content: '', id: KR3k0012_SBCK_591-2b}
  - {type: variant, offset: 677, length: 0, content: '', WYG: 殷仲堪為黄門郎孝武帝示仲堪詩曰勿以己才而笑不才宋書曰髙祖過彭城置酒命紙筆為詩曰先蕩臨淄穢却清河洛塵華陽有逸驥桃林無伏綸於是羣才並作也後魏書曰孝文帝雅好讀書手不釋卷五經之義覽之便講學不師授探其精奥史傳百家無不該涉才藻富贍好為文章詩賦辭頌有興而作有大文筆馬上口授及其成也不改一字自太和已後詔䇿皆帝文也自餘文章百有餘篇三國典畧曰周明帝幼而好學華彩温麗捃摭衆善自羲農以來訖于宋末叙為世譜凡百卷所著文章十卷行於世後周書曰明帝三年秋九月幸同州過故宅賦詩曰玉燭調秋氣金輿立舊宫還當如白水更似入新豐霜潭清晚菊寒井落疎桐舉杯延故人今聞歌大風梁書曰武帝賜}
  - {type: page-break, offset: 677, content: '', id: KR3k0012_WYG_591-4a, image: WYG0898/WYG0898-0387a.png}
