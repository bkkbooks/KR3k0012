  - {type: variant, offset: 1007, length: 259, content: 其世王聞書之言惕然若恐懼而為誡書於席之四端為銘焉太公金匱曰武王曰吾隨師尚父之言因為慎書銘隨身自誡其冠銘曰寵以著首將身不正遺為德咎書履曰行必慮正無懷僥倖書劍曰常以服兵而行道德行則福廢則覆書鏡曰以鏡自昭則知吉凶書車曰自致者急載人者緩取欲無度自致而反皇覽記陰謀黃帝金人器銘曰武王問尚父曰五帝之誡可得聞乎尚父曰黃帝之戒曰吾之居民上也搖搖恐夕不至朝故為金人三封其口曰古之慎言堯之居民上也振振如臨深淵舜之居民上也慄慄恐夕不見旦武王曰吾并殷民居其上也翼翼懼不敢息尚父曰德盛者守之以謙威彊者守之以恭武王曰欲如尚父言吾因是為誡隨之身孔子, WYG: ''}
