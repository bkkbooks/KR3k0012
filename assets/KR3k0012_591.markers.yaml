  - {type: 'tls:seg', offset: 169, content: '', id: KR3k0012_CHANT_591-1a.37}
  - {type: variant, offset: 172, length: 434, content: 公成公乃命莊叔隨難於漢陽即宮于宗周奔走無射啟右獻公獻公乃命成叔慕乃祖服乃考文叔興舊嗜欲作率慶士躬恤衛國其勤公家夙夜不解民咸曰休哉公曰叔舅子汝銘若纂乃考服悝拜稽首曰對揚以辟之勤大命施于蒸彝鼎此衛孔悝之鼎銘也古之君子論撰其先祖之美而明著之後世者也以比其身以重其國家如此子孫之守宗廟社稷者其先祖無美而稱之是誣也有善而弗知不明也知而弗傳不仁也此三者君子之所恥也周禮夏官上司勳職曰司勳掌六卿賞地之法以等其功賞地賞田也在遠郊之內屬六卿馬等由羗也以功大小為差王功曰勳成王業若周公者也國功曰功保全國家若伊尹也民功曰庸施法於民若后稷也事功曰勞以勞定國若禹者也民功曰力制法成治若咎繇也戰功曰多克敵出奇若韓信陳平者也司馬法曰上多前虜也凡有功者銘於王之太常祭於大烝司勳詔之銘之言名也生則書於王旌以識其人與其功也死則於烝先王祭之詔謂告其神以辭也般庚告其卿大夫曰茲子大享于先王爾祖其從與饗之是也今漢祭功臣於廟庭周禮冬官考工記曰鬴銘曰時文思索允臻其極銘刻之也時是也允信也臻至也極中也言是文德之君思求, WYG: 山林𤣥甲曜日光猛將懷暴怒膽氣正縱横誰云江水廣一葦}
