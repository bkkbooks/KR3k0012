  - {type: variant, offset: 710, length: 2, content: 春秋, WYG: 重譯而來此豈非人事者也或曰為君難為臣不易君處尊髙之位執掌賞罰之權録人之材因人之力何為不成何求不得此言似易論之實難何者輕凌天地衆精顯其妖忽慢神靈風雨應其報是以帝乙有雷霆之祸殷紂致分沙之灾多營池觀逺求異寶民不得耕女不得蠶田荒業廢兆庶凋殘見其饑寒不為之哀觀其勞苦不為之戚苦民之君也非治民之主也薄賦輕徭百姓家給上無暴令之征下有謳歌之詠屈一身之欲樂四海之民憂國之主也樂民之君也此其所以為難也且用人之道又為未易己之所賢未必盡賢衆之所毁未必全惡知能不舉既為失材知惡不黜則為禍胎又人才互有長短不必兼通是以公綽優於大國之卿子産善為小邦之相絳侯木訥卒安劉氏之宗嗇夫利口不任上林之令捨短從長然}
