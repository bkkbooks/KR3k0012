  - {type: variant, offset: 3396, length: 438, content: 者也七厲敘賢歸以儒道雖文非拔群而意實卓爾矣連珠傅玄文敘曰連珠者興於漢章帝之世班固賈逵傅毅三才子受詔作之而蔡邕張華之徒又廣焉其文體辭麗而言約不指說事情必假喻以達其旨而賢者微悟合於古詩諷興之義欲使歷歷如貫珠易覩而可悅故謂之連珠也班固喻美辭壯文體裁引麗最得其體蔡邕言質辭碎然其旨篤矣賈逵儒而不豔傅毅文而不典文心雕龍曰揚雄雖小而明潤矣此文章之枝流暇預之末造也自此已後擬者間出杜篤賈逵之曹劉珍潘勗之輩欲穿明珠多貫魚目可謂壽陵匍匐非復邯鄲之步里醜捧心不關西子之嚬矣惟士衡運思理新文敏而裁意致句廣於舊篇豈慕朱仲四寸之璠乎夫文小易周思閑可膽足使義明而辭淨事圓而音澤磊磊自轉可稱珠耳宋書劉祥著連珠十五首以寄其懷其譏議云希世之寶違時必賤偉俗之器無聖則淪是以明玉黜於楚岫章甫窮於越人有以祥連珠啟上上令御史中丞任遐奏其過惡付廷尉上別遣勑祥曰我當原卿性命令卿萬里思愆卿若能改革當令卿得還乃徙廣州不意終日縱酒少時卒三國典略曰梁簡文為侯景所幽作連珠曰吾聞言可覆也人能育物是以欲輕其禮有德必昌兵賤於義無思不服, WYG: 方騐保山河}
