  - {type: variant, offset: 2795, length: 598, content: 子亦引其源而廣之馬作七廣張造七辨或以恢大道而導幽滯或以點瑰奓而託調詠楊暉播烈垂於後世者凡十有餘篇自大魏英賢迭作有陳王七啟王氏七釋楊氏七訓劉氏七華從父侍中七誨並陵前而邈後揚清風於儒林亦數篇焉世之賢明多稱七激工余以為未盡善也七辨似也非張氏至思比之七激未為劣也七釋僉曰妙焉吾無間矣若七依之卓轢一致七辨之纏綿精巧七啟之奔逸壯麗七釋之精密閑理亦近代之所希也摯虞文章流別論曰七發造於枚乘借吳楚以為客主先言出輿入輦蹙痿之損深宮洞房寒暑之疾靡漫美色宴安之毒厚味暖服淫曜之害宜聽世之君子要言妙道以䟽神導體蠲淹滯之累既設此辭以顯明去就之路而後說以聲色逸遊之樂其說不入乃陳聖人辨士講論之娛而霍然疾瘳此因膏梁之常疾以為匡勸雖有甚泰之辭而不沒其諷喻之義也其流遂廣其義遂變率辭人淫麗之尤矣崔駰既作七依而假非有先生之言嗚呼揚雄有言童子雕蟲篆刻俄而曰壯夫不為也孔子疾小言破道斯文之族豈不謂義不足而辨有餘者乎賦者將以諷吾恐其不免於勸也傅子集古今七篇而論品之署曰七林文心雕龍曰枚乘擒豔首製七發腴辭雲構夸麗風駭蓋七覆所發發乎嗜欲始邪末正所以戒膏梁之子也自七發以下作者繼踵觀枚氏首唱信獨拔而偉麗矣及傅毅七激會清要之工崔駰七依入博雅之巧張衡亡辨結采綿靡崔瑗七厲植義純正陳思七啟取美於宏壯仲宣七釋致辨於事理觀其大抵所歸莫不高談宮館壯語田獵窮瓌奇之服饌極蠱媚之聲色甘意搖骨豔辭洞魂識雖始之以淫侈終之以居正然諷一勸百勢不自反子雲所謂聘鄭聲曲終而, WYG: 臺}
