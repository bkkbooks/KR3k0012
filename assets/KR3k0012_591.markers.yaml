  - {type: variant, offset: 3794, length: 0, content: '', krp: 周明帝㓜而好學詞彩温麗捃摭衆書自羲農巳來訖于魏末叙爲丗譜凢百卷所著文章十卷行於丗後周書曰明帝三年秋九月幸同州過故宅賦詩曰玉燭調秋氣金輿歴舊宫還如過白水更似入新豐霜潭漬晚菊寒井落踈桐舉盃延故老令聞歌大風}
  - {type: variant, offset: 3795, length: 1, content: 簡, SBCK: 書曰武帝賜張率詩曰東南有才子故能服官政余雖慙夙昔得人斯爲盛率氶詔徃復六首又曰髙祖製春景明志詩五百字勑在朝辭人沈約巳下同作髙祖以王僧孺詩爲工隋書曰陳禎明􅀄後主作新歌詞甚哀思令後宫羙人習而歌之其辭曰玉樹後庭花花開不復乆時人以歌䜟此其不乆兆又曰大業三年幸榆林啓民可汗奉觴上壽拜伏甚恭帝大恱賦詩曰鹿塞鴻旗駐龍庭翆輦廻氊惟望風舉穹廬向日開呼韓稽顙至休屠繼踵來索辦擎羶肉韋韝獻酒杯何如漢天子空上單于臺國朝傳記曰煬帝善屬}
