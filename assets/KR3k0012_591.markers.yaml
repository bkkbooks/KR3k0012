  - {type: variant, offset: 813, length: 0, content: '', WYG: 饗之又曰高宗製元首前星維城股肱等誡以示侍臣禮部尚書𢎞文舘學士許敬宗又上表請總名為天訓并請注解許之及注畢敬宗為之序又曰咸亨中上自裁樂章有上元二儀三才四時五行六律七政八風九宫十州得一慶雲之曲以示羣臣令太常行用之又曰咸亨中御書飛白書贊以賜中書門下三品戸部尚書戴至德詞曰汎洪源俟舟楫中書侍郎郝處俊曰飛九霄假六翮吏部侍郎李敬𤣥曰資啓沃罄丹誠中書侍郎崔知悌曰竭忠節贊皇猷議者以戴郝寛厚而李崔忠勤故}
