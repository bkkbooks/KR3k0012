  - {type: variant, offset: 3825, length: 5, content: 昌兵賤於義, SBCK: 爲深怨偏與人語衆以爲曲􅀻任使賢良則謂偶委伏凢才則言愚闇數言則謂太繁辭寡則謂道薄恣情忿怒則朝野戰慄留心寛恕則法令不行民樂則官苦官樂則民勞四海之内莫非王􅁟要荒爲枝葉畿内爲根本古人云皮之不存毛將安傅深根固本之内相而伊尹傅􅀃丗所希逢至如鎭積氷之塞守飛雪之邊而魏尚李牧當今罕遇遣人逺撫則眷戀而不忍􅉖而不遺則枝葉而不存二冝之間致心何所是以晨興夕􅅥}
