  - {type: variant, offset: 3849, length: 1, content: 極, SBCK: 律七政八風九宫十洲得一慶雲之曲以示群臣令太常行用之又曰咸亨中御書飛白書賛以賜中書門下三品户部尚書戴至德詞曰汎洪源俟舟楫中書侍郎郝處俊曰飛九霄假六翮吏部侍郎李敬玄曰資啓沃罄丹誠中書侍郎崔知悌曰竭忠節賛皇猷議者以戴郝寛厚而李崔忠勤故上以此言褒羙之又曰顯慶中上以琴中雅曲古人歌之近代巳來此聲頓絶令}
