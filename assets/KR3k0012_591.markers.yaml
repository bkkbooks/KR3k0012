  - {type: variant, offset: 2058, length: 586, content: 山夸誕示後吁可笑也詳觀眾例銘義見矣至於始皇勒岳政暴而文澤亦有踈通之美焉若乃班固燕然之勒張旭華陰之碣序亦成矣蔡邕之銘思燭古全橘公之鍼則吐納典譽朱穆之鼎全成碑文溺所長也至如敬通新器矱淮武銘而事非其物繁略違中崔駰品物讚多戒少李尤積篇義儉辭碎蓍龜神物而居博弈之下衡斛嘉量而在杵臼之末曾名品之未暇何事理之能閑哉魏文九寶器利辭鈍惟張載劍閣其才清彩迅足駸駸後發前至銘勒崏漢得其宜矣文章流別傳曰夫古之銘至約今之銘至煩亦有由也質文時異則既論之矣且上古之銘銘於宗廟之碑蔡邕為楊公作碑其文典正末世之美者也後世以來器銘之佳者有王莽鼎銘崔瑗机銘朱公叔鼎銘王粲硯銘咸以表顯功德天子銘嘉量諸侯大夫銘太常勒鍾鼎之義所言雖殊而令德一也李尤為銘自山河都邑至於刀筆符契無不有銘而文多穢病討而潤色言可采錄三輔決錄曰何敞字文高為汝南太守帝南巡過郡郡有刻鏤屏風帝命侍中黃香銘之曰古典務農彫鏤傷民忠在竭節義在脩身事見黃香集銘志西京雜記杜子夏葬長安北四里臨終作文曰魏郡杜鄴立志忠款犬馬未陳奄先朝露骨肉歸於后土魂氣無所不之何必古丘然後即化封於北郭山焉晏然處死乃命刊名埋於墓前種松柏五株至今茂盛西京雜記滕公駕至陳都門馬鳴跪不肯前以足跑地久之滕公懼使卒掘其所跪之地深二尺得石槨滕公以燭照之有銘乃以水洗之其文字古異左右莫能知問叔孫通通曰科斗書也以今文寫之曰佳城鬱鬱三千年見白日呼嗟滕公居此室滕公曰嗟乎天也吾死其葬此乎於是終葬此焉, WYG: ''}
