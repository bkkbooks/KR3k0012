  - {type: variant, offset: 2843, length: 946, content: 自大魏英賢迭作有陳王七啟王氏七釋楊氏七訓劉氏七華從父侍中七誨並陵前而邈後揚清風於儒林亦數篇焉世之賢明多稱七激工余以為未盡善也七辨似也非張氏至思比之七激未為劣也七釋僉曰妙焉吾無間矣若七依之卓轢一致七辨之纏綿精巧七啟之奔逸壯麗七釋之精密閑理亦近代之所希也摯虞文章流別論曰七發造於枚乘借吳楚以為客主先言出輿入輦蹙痿之損深宮洞房寒暑之疾靡漫美色宴安之毒厚味暖服淫曜之害宜聽世之君子要言妙道以䟽神導體蠲淹滯之累既設此辭以顯明去就之路而後說以聲色逸遊之樂其說不入乃陳聖人辨士講論之娛而霍然疾瘳此因膏梁之常疾以為匡勸雖有甚泰之辭而不沒其諷喻之義也其流遂廣其義遂變率辭人淫麗之尤矣崔駰既作七依而假非有先生之言嗚呼揚雄有言童子雕蟲篆刻俄而曰壯夫不為也孔子疾小言破道斯文之族豈不謂義不足而辨有餘者乎賦者將以諷吾恐其不免於勸也傅子集古今七篇而論品之署曰七林文心雕龍曰枚乘擒豔首製七發腴辭雲構夸麗風駭蓋七覆所發發乎嗜欲始邪末正所以戒膏梁之子也自七發以下作者繼踵觀枚氏首唱信獨拔而偉麗矣及傅毅七激會清要之工崔駰七依入博雅之巧張衡亡辨結采綿靡崔瑗七厲植義純正陳思七啟取美於宏壯仲宣七釋致辨於事理觀其大抵所歸莫不高談宮館壯語田獵窮瓌奇之服饌極蠱媚之聲色甘意搖骨豔辭洞魂識雖始之以淫侈終之以居正然諷一勸百勢不自反子雲所謂聘鄭聲曲終而奏雅樂者也七厲敘賢歸以儒道雖文非拔群而意實卓爾矣連珠傅玄文敘曰連珠者興於漢章帝之世班固賈逵傅毅三才子受詔作之而蔡邕張華之徒又廣焉其文體辭麗而言約不指說事情必假喻以達其旨而賢者微悟合於古詩諷興之義欲使歷歷如貫珠易覩而可悅故謂之連珠也班固喻美辭壯文體裁引麗最得其體蔡邕言質辭碎然其旨篤矣賈逵儒而不豔傅毅文而不典文心雕龍曰揚雄雖小而明潤矣此文章之枝流暇預之末造也自此已後擬者間出杜篤賈逵之曹劉珍潘勗之輩欲穿明珠多貫魚目可謂壽陵匍匐非復邯鄲之步里醜捧心不關西子之嚬矣惟士衡運思理新文敏而裁意致句廣於舊篇豈慕朱仲四寸之璠乎夫文小易周思閑可膽足使義明而辭淨事圓而音澤磊磊自轉可稱珠耳宋書劉祥著連珠十五首以寄其懷其譏議云希世之寶違時必賤偉俗之器無聖則淪是以明玉黜於楚岫章甫窮於越人有以祥連珠啟上上令御史中丞任遐奏其過惡付廷尉上別遣勑祥曰我當原卿性命令卿萬里思愆卿若能改革當令卿得還乃徙廣州不意終日縱酒少時卒, SBCK: ''}
