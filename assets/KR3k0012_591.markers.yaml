  - {type: variant, offset: 3809, length: 2, content: 可覆, SBCK: 至於滅亡終身不悟豈不懼哉觀理亂之本原足爲明鏡之鍳戒亂未常不任不肖理未嘗不任忠賢任忠賢則享天下之福用不肖則受天下之禍社稷臨危之主各師其臣􅀂使􅁴悟安有危亡之禍特由不留心於任使翻屬意於遨遊豈不哀哉以遨遊將爲任使以任使將爲遨遊豈不善哉古人言舜禹不愛於聲不貪於色予謂不然將爲愛}
  - {type: variant, offset: 3809, length: 2, content: 可覆, krp: 至於滅亡終身不悟豈不懼哉觀理亂之本原足爲明鏡之鍳戒亂未常不任不肖理未嘗不任忠賢任忠賢則享天下之福用不肖則受天下之禍社稷臨危之主各師其臣若使覺悟安有危亡之禍特由不留心於任使翻屬意於遨遊豈不哀哉以遨遊將爲任使以任使將爲遨遊豈不善哉古人言舜禹不愛於聲不貪於色予謂不然將爲愛}
