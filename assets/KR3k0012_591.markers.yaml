  - {type: variant, offset: 29, length: 0, content: '', WYG: 受命中興頌上甚善}
  - {type: variant, offset: 30, length: 121, content: 有德善功烈勳勞慶賞聲名列於天下而酌之祭器自成其名焉以祀其先祖者也顯楊先祖所以崇孝也身比為順也明示後世教也夫銘者一稱而上下皆得焉耳矣是故君子之觀於銘也既美其所稱又美其所為為之者明足以見之仕足以與之智足以利之可謂賢矣賢而勿伐可謂恭矣故衛孔悝之鼎銘, SBCK: 命惟時惟幾乃歌}
