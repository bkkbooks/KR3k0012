  - {type: variant, offset: 3854, length: 2, content: 麟出, SBCK: 其調髙人和遂寡自宋玉巳來迄今千祀未有能歌白雪曲臣今准勑依於琴中舊曲定其宫商然後教習並合於歌輙以御製雪詩爲白雪歌詞又按古今樂府奏正曲之後皆別有聲君唱臣和事彰前史輙取侍中許敬宗等奉和雪詩以爲送聲各十六節令悉教訖並皆諧韻上善之乃付太常編於樂府又曰􅀇宗製令長新誡一篇頒賜天下縣令其詞曰我求令長保義下人人之所爲必有所因侵漁浸廣賦役不均使夫離散莫保其身徴諸善理􅀉尔良臣與之革故政在惟新調風變俗背僞歸真教先爲冨惠恤於貧無大無小以躬以親青旌勸農其唯在勤墨綬行令孰不攸遵􅂚云􅀍之我澤如春又曰玄宗親製春臺望一章二十八句起居舎人蔡孚奏曰伏見所製氣雄詞羙德音相屬鄙炎漢之奢侈徇有唐之儉陋知作勞}
