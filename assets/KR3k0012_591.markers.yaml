  - {type: variant, offset: 3857, length: 4, content: 悲豈唯孔, SBCK: 居逸念中人之家産用心如此天下斯安臣職在司言請宣示百寮及編國史又曰端午日􅀇宗自賦詩曰端午臨中夏時清日復良鹽梅巳佐鼎麴蘖且傳觴事古人留迹年深縷續長當軒知槿荗向水􅁴蘆香億兆同歸壽群公共保昌忠貞如不替貽厥後昆芳又曰􅀇宗幸寧王憲宅與諸王宴探韻賦詩上詩曰魯衛情先重親賢受轉多冕旒豐暇日乗景蹔經過戚里申髙宴平臺奏雅歌復㝷爲善樂方驗保山河又曰天寳八載九月甲午是日皇太}
