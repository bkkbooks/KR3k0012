  - {type: variant, offset: 3803, length: 0, content: '', SBCK: 空梁落鷰泥否煬帝爲鷰歌行文士皆和著作郎王胄獨不下帝帝毎衘之竟坐此見害而誦其警句曰庭草無人隨意緑復能作此語耶又曰牛􅀪煬帝之在東宫也數有詩書遺􅀪􅀪亦有荅及嗣位之後嘗賜􅀪詩曰晉家山吏部魏丗盧尚書莫言先哲異竒才亦佐余學行敦時俗道素乃冲虚納言雲閣上禮儀皇運􅀄彞倫欣有叙垂拱事端居唐書曰太宗以武功定海内櫛風沐雨不暇於詩書洎于嗣業進引忠良銳精思政朝多孜孜求之􅀂不及數年之後天下晏和遂於聽覽之暇留精文史叙事言懷時有制作天才宏麗興記􅀇逺著作鄧隆請編次之詔不許又曰太宗著金鏡述以示群臣其辭曰朕以萬機暇日遊心前文仰六代之髙風觀百王之遺跡興亡之運可得言焉每至軒昊之無爲唐虞之至治未甞不留}
