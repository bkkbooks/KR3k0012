  - {type: variant, offset: 812, length: 0, content: '', WYG: 逆鱗霜簡直繩志袪於時蠧而運屬陵夷道消賢哲才納嘉猷遂嬰嚴網方𢎞至治遽夭天年英傑云亡邦國彌瘁斯乃􅃡想高蹤可為長嘆朕省方班瑞言事東巡瞻墳􅎬於道周想風徽於前代若使九原可作吾將與歸千載如存依然何逺行潦致屬君}
