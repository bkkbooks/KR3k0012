  - {type: variant, offset: 1640, length: 417, content: 其口而書其胸曰我古之多言人也無少言無少事少言少事後生何述焉我頌三墳五典八索九丘賾罔深而不探理無奧而不鉤故言滿天下而無口尢夫唯言立乃可長久胡不愧然生鍼其口自拘廣庭終身義手孔子家語曰孔子觀於魯桓公之廟見欹器焉歌傾孔子問於守廟者曰此何器也對曰宥坐之器子曰吾聞宥坐之器虛則欹中則正滿則覆明君以為至誡常置於坐側也子路進曰敢問持滿有道乎子曰聰明叡智守之以愚功被天下守之以讓勇力振世守之以怯富有四海守之以謙後之君子感誡之至追而作銘楊子法言曰或問銘曰銘哉銘哉有意於慎也文心雕龍曰昔軒轅帝刻輿以弼違太禹勒筍簴以招諫成湯盤盂著日新之規武王戶席題必誡之訓周公慎言於金人仲尼革容於欹器列聖鑒戒其來久矣故銘者名也觀器必也正名審用貴乎慎德蓋臧武仲之論銘也曰天子令德諸侯計功大夫稱伐夏鑄九牧之金周勒肅慎之楛令德之事也呂望銘功於昆吾仲山鏤績於庸器計功之義也魏顆紀勳於景鍾孔悝表勤於衛鼎稱伐之類也若乃飛廉有石槨之錫雲公有奪里之諡銘發幽石噫可怪也趙靈勒跡於潘吾秦昭刻傳於, WYG: ''}
