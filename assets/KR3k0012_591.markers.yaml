  - {type: 'tls:seg', offset: 699, content: '', id: KR3k0012_CHANT_591-3a.6}
  - {type: variant, offset: 699, length: 0, content: '', WYG: 空上單于臺國朝傳記曰煬帝善屬文而不欲人出其右司𨽻薛道衡由是得罪後因事誅之曰更能作空梁落燕泥否煬帝為燕歌行文士皆和著作郎王胄獨不下筆帝毎銜之胄竟坐此見害而誦其警句曰庭草無人隨意緑復能作此語否又曰牛𢎞煬帝之在東宫也數有詩書遺𢎞𢎞亦有答及嗣位之後嘗賜𢎞詩曰晉家山吏部魏世盧尚書莫言先哲異竒才並佐余學行敦時俗道素乃冲虛納言雲閤上禮儀皇運初彛倫忻有叙垂拱事端居唐書曰太宗以武功定海内櫛風沐雨不暇於詩書洎于嗣業進引忠良鋭精思政朝夕孜孜求之若不及數年之後天下晏如遂於聴覽之暇留情文史叙事言懷時有制作天才𢎞麗託興𤣥逺著作鄧隆請編次之詔不許又曰太宗著金鏡述以示羣臣其辭曰朕以萬幾暇日遊心前史仰六代之髙風觀百王之遺跡興亡之運可得言焉毎至軒黄之無為唐虞之至治未嘗不留連贊詠不能已矣及於夏殷末世秦漢暴君使人凜然兢懼如履朽薄然為人君皆欲其永享萬乘之尊以垂百王之後而得失異趣興滅不同何也蓋短於自見不聞逆耳之言至於滅亡終身不悟豈不懼哉觀理亂之本原足為明鏡之鑒戒亂未嘗不任不肖理未嘗不任忠賢任忠賢則享天下之福用不肖則受天下之禍社禝臨危之主各師其臣若使覺悟安有危亡之禍特有不留心於任使翻屬意於遨遊豈不哀哉以遨遊將為任使以任使將為遨遊豈不善哉古人言舜禹不愛於聲不貪於色予謂不然將謂愛也人云桀紂躭於聲色予將謂不好也何以然桀紂}
  - {type: page-break, offset: 699, content: '', id: KR3k0012_WYG_591-5b, image: WYG0898/WYG0898-0387d.png}
