  - {type: variant, offset: 399, length: 207, content: 王業若周公者也國功曰功保全國家若伊尹也民功曰庸施法於民若后稷也事功曰勞以勞定國若禹者也民功曰力制法成治若咎繇也戰功曰多克敵出奇若韓信陳平者也司馬法曰上多前虜也凡有功者銘於王之太常祭於大烝司勳詔之銘之言名也生則書於王旌以識其人與其功也死則於烝先王祭之詔謂告其神以辭也般庚告其卿大夫曰茲子大享于先王爾祖其從與饗之是也今漢祭功臣於廟庭周禮冬官考工記曰鬴銘曰時文思索允臻其極銘刻之也時是也允信也臻至也極中也言是文德之君思求, SBCK: 山林玄甲曜日光猛將懷暴怒膽氣正縱橫誰云江水廣一葦}
