  - {type: variant, offset: 3794, length: 0, content: '', SBCK: 周明帝㓜而好學詞彩温麗捃摭衆書自羲農巳來訖于魏末叙爲丗譜凢百卷所著文章十卷行於丗後周書曰明帝三年秋九月幸同州過故宅賦詩曰玉燭調秋氣金輿歴舊宫還如過白水更似入新豐霜潭漬晚菊寒井落踈桐舉盃延故老令聞歌大風}
