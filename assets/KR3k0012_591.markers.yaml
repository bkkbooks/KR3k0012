  - {type: variant, offset: 700, length: 1, content: 刻, WYG: 不終於天年樂不終於一世以此知為不好也舜禹命壽於終樂畢於世予謂之愛也夫人有寛躁强柔之志愁歡貪慾之心性有善不善者也由是觀之堯舜禹湯躬行仁義治致隆平此其稟善性也幽厲桀紂乃為炮烙之刑刳孕婦割人心斮朝涉脯鬼侯造酒池糟丘為長夜之飲此其受於不善之性也夫立身之道在於折衷而不在於偏躭呉起曰昔桑氏之君任德廢武以滅其國有扈之君恃衆好勇以喪社禝仲尼曰寛濟猛猛濟寛仁義之道猶不可偏何況於不仁乎為君之道處至極之尊以億兆為心以萬邦為意安民必以文德防邊必以武功孔子曰夫文之所加者深則武之所服者大德之所施者博則威之所制者廣不可以武威安民不可以文德備塞大鯨出水必廢遊波之功鴻鵠沉泥定無凌空之効若各令遂志並不失其能古人云構大厦者先擇匠然後簡材治國者先擇佐然後定民大匠構屋必以大材為棟梁小材為榱桷茍有所中尺寸之木無棄此善理木者也非獨屋有棟梁國家亦然大德為宰相亦國之棟梁也予思三代以來君有所好民必從之在上留心臺榭竒巧之人必至馳情遊獵畋騁之人逺臻存意絃管鄭衞多進降懷脂粉燕趙斯來塞切直之路為忠者必少開謟䛕之道為佞者必多古人云君猶器也民猶水也方圓在於器不在於水以此而言之足為永戒夫玉不琢不成器人不學不知道仲尼問於郯子文王學於虢叔聖人猶且如此何况於凡人乎治主思賢如農夫之望嵗哲后求人如旱苗之思雨亂君嫉勝已如仇親不肖如子懐之中心何日暫忘王莽偽行仁義之道有始無終孫皓權施恩惠之風有初無末二子猶敝船之汎巨浪覆在不遥若駑馬之奔千里困其將至古人云升量不可以盛}
