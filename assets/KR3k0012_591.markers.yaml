  - {type: variant, offset: 3836, length: 0, content: '', SBCK: 太宗思隋氏失道皇運開基因而序之以明誡愼神筆書石命工刻之以賜皇太子其詞曰昔隋季崩離天綱㢮紊波濤沸四海氣霧塞三光􅀑哭石言人怨神怒丁壯疲於兵甲老弱斃於飢寒㸑骨百城流血千里宮闕變爲禾黍中原化爲㓂塲余以弱齡屬當厄運思靜大難以濟蒼生秣馬揮戈風驅電掃尅平八表臨撫萬方聊因暇景載懷興亂歴想前代暗君庸王莫不恃其智力則輕侮聖賢騁其文才則不尊道德縱其口辯以飾非肆其姦言以拒諫昏迷酒色習近䜛邪暴疾􅀺元窮其轍跡傾危莫悟以至滅亡明鏡不逺於焉自鑒又曰魏徴葬日太宗登􅁐西樓臨路哭􅀕太宗復爲製碑文并御書公卿士庶競來摸冩車馬塡噎日有數千時人號其碑爲二絶文與書也又曰太宗幸積翠池宴五品以上太宗曰今兹年榖大登水潦不能爲害天下旣安邊方靜息因此農隙與公等舉酒酒旣酣各冝賦一事太宗賦尚書其詞曰日􅉴翫百篇臨登􅀍五典夏康旣逸預商辛亦流湎恣情昬主多尅巳明君鮮滅身資累惡成名由積善又曰太宗征髙麗廻次營州詔遼東戰死骸骨並集栁城東南有司設太牢以􅀕之大宗臨哭盡哀從臣無不流淚帝親爲文􅀕之曰忠烈盖世徃賢明䡄忘身徇國先哲良規惟􅈛等懷忠立節重義輕生奮劒提戈摧城䧟陣冐鋒刃而不頋赴湯火以如歸殞命戰塲殘形宼壘膏原潤􅃏身喪名存揺落寒關遂非生入蒼茫雷野無復餘蹤山川宛其不殊存亡䬃焉非昔然則身者今之所重名者後之所貴身乃常有而愚夫怯焉功則難立惟烈士成焉去一生之短期收千載之令譽此聖賢之操也豈直忠勇者乎所以按轡停輿撫膺一慟嘉乃誠節痛􅈛遺靈酒爼旣陳䰟其斯享又曰貞觀十一年太宗幸洛陽遣使􅀕漢太師楊震墓太宗自爲文曰惟君資華巖之竒氣禀金方之秀質艶忠篤以成性應時運而挺生彈冠賛務弼諧帝道正色立朝周行以肅坐槐爕理鼎餁載調值安德不昇政由近習氣舛玉衡日微黃道君􅁣然忠憤乃心王室昌言正議屢犯於逆鱗霜簡且繩志祛於時蠧而運屬陵夷道消賢哲不納嘉猷遂嬰嚴網方弘至治遽夭天年英傑云亡􅀖國彌瘁斯乃緬想髙蹤可爲長歎朕省方班瑞言事東廵瞻墳􅎬於道周想風徽於前代􅀂使九原可作}
