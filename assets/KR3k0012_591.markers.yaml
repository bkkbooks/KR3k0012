  - {type: variant, offset: 801, length: 40, content: 宗幸河北觀砥柱因勒銘於其上以陳盛德穆天子傳曰天子觀舂山之上乃為銘䟽於玄圃之上以貽, SBCK: 和巳}
  - {type: variant, offset: 801, length: 40, content: 宗幸河北觀砥柱因勒銘於其上以陳盛德穆天子傳曰天子觀舂山之上乃為銘䟽於玄圃之上以貽, krp: 和巳}
  - {type: variant, offset: 803, length: 2, content: 河北, WYG: 積翠池宴五品以上太宗曰今兹年數大登水潦不能為害天下既安邊方静息因此農隙與公等舉酒酒既酣各宜賦一事太宗賦尚書其詞曰日昃翫百篇臨燈披五典夏康既逸豫商辛亦沉􅊺􅔤情昏主多克己明君鮮滅身資累惡成名由積善又曰太宗征髙麗回次營州詔遼東戰死骸骨並集柳城東南有司設太牢以祭太宗臨哭盡哀從臣無不流淚帝親為文祭之曰忠烈蓋世往賢明軌忘身狥國先哲良規惟爾等懷忠立節重義輕生奮劒提戈摧城陷陣冐鋒刄而不顧赴湯火以如歸殞命戰場殘形冦壘膏原潤鉞身喪名存揺落寒關遂非生入蒼茫雷野無復餘蹤山川宛其不殊存亡䬃焉非昔然則身者今之所重名者後之所貴身乃常有而愚夫怯焉功則難立惟烈士成焉去一生之短期收千載之令譽此聖賢之操也豈直忠勇者乎所以按轡停輿撫膺一慟嘉乃誠節痛爾遺靈酒俎既陳魂其斯享又曰貞}
