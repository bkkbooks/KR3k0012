  - {type: variant, offset: 152, length: 83, content: 六月丁亥公假於太廟公曰叔舅乃祖莊叔左右成公成公乃命莊叔隨難於漢陽即宮于宗周奔走無射啟右獻公獻公乃命成叔慕乃祖服乃考文叔興舊嗜欲作率慶士躬恤衛國其勤公家夙夜不解民咸曰休, SBCK: 股肱喜}
