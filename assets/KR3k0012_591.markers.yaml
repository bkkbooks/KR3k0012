  - {type: punctuation, offset: 712, content: ‧, id: KR3k0012_CHANT_591-bkkpn195}
  - {type: variant, offset: 713, length: 0, content: '', WYG: 為美夫人剛柔之情各異曲直之性不同不可不察也逆王耳而履道戮孔懷以安國周公是也順上心以安身隨君情而殺子易牙是也棄己之命存君之身紀信是也挾國謀事以報私讐袁盎是也捐身而執節孤立而自毁屈原是也外顯和穆之端内懷湯火之意宰嚭是也忠謟之道以此觀之足以永鏡白起為秦平}
  - {type: page-break, offset: 713, content: '', id: KR3k0012_WYG_591-10b, image: WYG0898/WYG0898-0390b.png}
  - {type: variant, offset: 714, length: 1, content: 錄, WYG: 乃被昭王所殺亞夫定國之亂卒為景帝所誅大夫種設䇿滅呉翻遭越王之戮伍員竭誠為國終罹賜劍之禍乃君之惡也非臣之罪焉至如趙髙韓信黥布陳豨之儔此自貽厥釁非君之濫刑也髙祖失於將兵之能光武獲於置將之妙臣安君社稷之固君處臣危亡之地豈是相酬之道也為天下之君處萬民之上安可易乎背道違禮非惟損己乃為賢人之所笑修身勵行實為君子反為凡夫之所譏越品進官其類必為深怨偏與人語在衆以為由私任使賢良則為偶合委仗凡才則言愚闇言數則謂大繁辭寡則謂道薄恣情忿怒則朝野戰慄留心寛恕則法令不行民樂則官苦官樂則民勞四海之内莫非王土要荒為枝葉畿甸為根本古人云皮之不存毛將安傳當使本固根深委之内相而伊尹傳説世所希逢至鎮積水之塞守飛雪之邊而魏尚李牧當令罕遇遣人逺撫則眷戀而不忍愍而不遣則枝葉落而不存二者之間致心何所是以晨興夕惕無忘斯事為上猶然何况臣下易云書不盡言言不盡意今畧陳梗槩以示心之所存耳古語云勞者必歌其事朕非故煩翰墨以見其藻但學以為己聊書所懷想逹見羣賢不以為嗤也又}
