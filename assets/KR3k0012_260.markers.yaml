  - {type: variant, offset: 2343, length: 809, content: 官曰王慶籍一世清人也又曰陰鏗為招遠將軍晉陵太守鏗嘗與賓友宴飲見行觴者因迴酒矣以授之眾坐皆笑鏗曰吾儕終日酣酒而執爵者不知其味非人情也及侯景之亂鏗嘗為賊所擒或救之獲免鏗問其故乃前所行觴者梁書曰劉之遴為南郡太守初之遴在荊府常寄居南郡廨忽夢前太守袁彖謂曰卿後當為折臂太守則居此中之遴後果折臂遂臨此郡又曰謝朏字敬仲齊時為義興太守加秩二千石不省雜事悉付綱紀曰吾不能作主者但吏能作太守耳又曰任昉為吳興太守清潔友人到溉與弟洽從昉為山澤遊被代而還無衣沈約遺裙衫迎也又曰范縝為宜都太守性不信鬼神夷陵有伍相廟唐漢三神廟胡里神廟縝乃下教斷不祠後魏書曰房士達永安末轉濟南太守士達不入京師而頻為本州郡時人榮之又曰崔休為渤海太守時大儒張吾貴有盛名於山東四方學士咸相宗慕弟子自遠而至者常千餘人生徒既眾所在多不見容休乃為設俎豆招延禮接使肆業而還儒者稱為口實又曰盧道將為燕郡太守道將下車表樂毅霍光之墓而為之立祠又曰房幼愍安豊新蔡二郡太守坐事奮官居家忽聞有客聲出無所見還至庭中為家群犬所噬遂卒北史曰宋欽道仕齊歷位中山太守長於撫接然好察細事其州府佐吏使民間者先酬錢然後敢食臨蒞處稱為嚴整後周書曰盧光為京兆太守先是舍數有妖怪前後郡將莫敢居者光曰吉凶由人妖不妄作遂入居之未幾光所乘馬忽昇廳事昇床南首而立又食器無故自破光並不以介懷其精誠守正如此唐書曰崔玄亮清慎介獨自登朝行不樂趨競歷御史尚書密湖曹三部守每一遷秩謙讓輒形於色又曰李暠守太原舊俗有僧徒以習禪為業及死不歛但輿屍送近郊以飼鳥獸如是積年土人號其地為黃坑坑側有餓犬千數食死人肉因侵害幼弱遠近苦之前後官吏不能禁止暠到官申明禮憲期不再犯仍發兵捕殺群狗其風遂革三輔決錄曰馬援誡兄子書龐伯高敦篤周慎口無擇言吾愛之重之願汝曹効之世祖見援書即擢為零陵太守在郡四年甚有治化文士傳曰文帝亦親阮籍常與談戲任其所欲不迫以職事籍常從容言昔曾遊東平樂其土風願得為東平太守文帝大悅即從其意籍便乘驢往之至郡皆壞府舍諸壁鄣使內外相望教令清當, SBCK: 六}
