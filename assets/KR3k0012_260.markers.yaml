  - {type: variant, offset: 1136, length: 917, content: 廣陽守太祖器其勇略不使之郡蜀志曰法正字孝直先主以正為蜀郡太守揚武將軍外統都畿內為謀主一飡之德睚眥之怨無不報覆擅殺毀傷己者數人或謂諸葛亮曰法正於蜀郡太縱橫將軍啟主公抑其威福亮荅曰主公之在公安也北畏曹操之強東憚孫權之逼近則慮孫夫人生變於肘腋當斯之時進退狼跋法孝直為之輔翼令翻然翱翔不可復制如何禁法正使不得行其意也又曰劉琰字威碩魯國人也先主在豫州辟為從事以其宗姓有風流善談論厚親待之遂墮從周旋常為賓客先主定益州以琰為固陵太守吳志曰士燮為交阯太守中國士人往依避難者以百數耽翫春秋為之注解陳國袁徽與尚書令荀彧書曰交阯士府君既學問優愽又達於從政處大亂之中保全一郡二十餘年疆場無事民不失業羈旅之徒皆蒙其慶雖竇融保河西曷以加之又曰周魴黃武中鄱陽大帥彭綺作亂攻沒屬城及以魴為鄱陽太守與胡綜等戮力致討遂生擒綺送詣武昌又曰陸績字公紀孫權統事辟為奏曹掾以直道見憚出為鬱林太守晉書曰桓玄出補義興太守鬱鬱不得志嘗登高望震澤歎曰父為九州伯兒為五湖長棄官歸國又曰辛恭靖隴西狄道人也少有器幹才量過人隆安中為河南太守會姚興來寇恭靖固守百餘日以無救而陷被執至長安興謂之曰朕將任卿以東南之事可乎恭靖厲色曰我寧為國家鬼不為羗賊臣興怒幽之別室經三年至元興中誑守者乃踰垣而遁歸于江東又曰鄭冲為陳留太守冲以儒雅為德蒞職不為幹局之譽而簞食縕袍不營貲產世以此重之又曰劉世智字子房貞素有寔兄風少貧窶每負薪自給讀書不輟竟以儒行稱歷吏部郎出為潁川太守平原管輅嘗謂人曰吾與劉潁川兄弟語使人神思清發昏不暇寐自此之外殆白日欲寢矣又曰劉胤王敦請為右司馬胤知敦有不臣心枕疾不視事以是悞敦意出為豫章太守辭以腳疾詔就家授印綬郡人莫鴻南土豪族因亂殺本縣令橫恣無道百姓患之胤至誅鴻及諸豪右界內肅然晉起居注太康八年詔曰昔先王御俗以興至治未有不先成民事者也漢宣識其如此是以歎息良二千石今欲皆先外郡治民著績然後入為常伯納言及典兵宿衛黃門散騎中書郎晉書呂光載記曰呂纂剋金城太守衛鞬韃瞋目謂光曰我寧守節斷頭不為降虜也光義而免之沈約宋書曰羊玄保為黃門郎善弈棊棊品第三太祖亦好棊數蒙引見嘉其溫謹與太祖賭郡戲勝以補宣城太守齊書曰王敬則遷吳興太守郡舊多剽掠有十數小兒於路取遺物敬則殺之以徇自此路不拾遺物郡無劫盜又錄得一偷召其親屬, SBCK: ''}
