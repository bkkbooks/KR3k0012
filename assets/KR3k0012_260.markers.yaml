  - {type: variant, offset: 78, length: 5, content: 甲次子乙官, SBCK: 矣書不云乎股肱良哉元首明哉其賜霸爵􅀜内侯黄金百斤又曰文翁廬江人也少好學景帝末年爲蜀郡太守仁愛好教化見蜀地僻陋有蠻夷風文翁欲誘進之乃選郡縣小吏開敏有才者張叔等十餘人親自􅅚厲遣詣京師受業蜀地學於京師者比齊魯焉又曰龔遂字少卿山陽人宣帝問遂曰渤海廢亂朕甚憂之君何以息其盗賊以稱朕意遂曰海濵遐逺不霑聖化其民困於飢寒而吏莫恤今欲使臣勝之將安之上曰選用賢良固欲安之遂曰臣聞治亂䋲不可急唯緩之然後可治願丞相御史無拘臣以文法得一切以便冝從事上許焉遂單車獨行至府郡中翕然盗賊亦}
