  - {type: variant, offset: 737, length: 0, content: '', krp: 故號爲万石秦氏又曰沈豐字聖逹爲零陵太守爲政慎刑重殺罪法辭訟𥘉不歷獄嫌疑不决一斷於口鞭杖不舉市無刑戮僚友有過𥘉不暴揚有竒謀異略輙爲談述曰太守所不及也到官一年甘露降芝草生又曰宗慶字叔平爲長沙太守民飬子者三千餘人男女皆以宗爲名後漢書曰光武南定河内而更始大司馬朱鮪等盛兵據洛陽又并州未安光武難其守問於鄧禹曰諸將誰可使守河内者禹曰昔髙祖任蕭何於關中無復西顧之憂所以得專精山東終成大業今河内帶河爲固户口殷實北通上黨南迫洛陽冠恂文武備足有牧人御衆之才非此子莫可使也乃拜恂河内太守行大將軍事又曰冦恂字子翼爲潁川太守拜執金吾後光武幸潁川百姓遮道曰願陛下復借冦君一年乃留之又曰楊震遷東萊太守當之郡道經昌邑故所舉荆州茂才王宻爲昌邑令謁見至夜懷金十斤以遺震曰故人知君君不知故人何也宻曰暮夜無知者震曰天知神知我知子知何謂無知宻愧而出轉涿郡太守性公廉不受私謂子孫常𬞞食歩行故舊長者或欲令爲開産業震不肯曰使後代稱爲清白吏子孫以此遺之不亦厚乎又曰孟甞遷合浦太守郡不産榖實而海出珠寳與交阯比境常通啇販貿糶糧食先是宰守並多貪穢詭人採求不知紀極詭貴珠遂漸徙於交阯郡界於是行旅不至人物無資貧者餓死於道甞到官革易前弊求人病利曽未踰歲去珠復還又曰任延爲九真太守九真不識父子之性夫婦之道延乃移書屬縣各使男年二十至五十女年十五至四十皆以年齒相配其貧無禮娉令長吏以下各省俸禄以賑助之同時相娶者二千餘人是歲風雨順節榖稼豊衍其産子者始知種姓咸曰使我有是子者任君也多名子爲任又曰陳寵轉廣漢太守西川豪右并兼吏多姧貪訴訟日百數寵到顯用良吏王渙鐔顯等以爲腹心鐔音徒南反訟者日減郡中清肅先是洛縣城南洛縣名故城在今益州雒縣南也毎隂雨常有哭聲聞於府中積數十年寵聞而疑其故使吏案行還言前代衰亂時此下多死亡者而骸骨不得葬寵愴然歎即矜勑縣盡収歛葬之自是哭聲遂絶又曰宋均爲九江太守山陽楚沛多蝗其飛至九江界者輙東西散去又曰劉寵爲㑹稽太守簡除煩苛禁察非法郡中大化徴爲將作大匠山隂縣有五六老叟尨眉皓髪自若耶山谷間出人齎百錢以送寵寵爲人選一大錢受之又曰曹襃爲河内太守時春夏大旱粮榖踊貴襃到乃省吏併職退去姧殘澍雨數降其秋大熟百姓給足流寓皆還又曰鮑德爲南陽太守時歲多荒災唯南陽豐穰吏人愛恱號爲神父又曰廉范遷蜀郡太守其俗尚文辨好相持短長范每厲以淳厚不受偷薄之說成都民物豐盛邑宇逼側舊制禁民夜作以防火災而更相隱蔽焼者范乃毀削先令但嚴使儲水而已百姓爲便乃歌之曰廉叔度來何暮不禁火民安堵平生無𥜗今五袴又曰馬嚴爲陳留太守下車明賞罰發姧匿郡界清静時京師訛言賊從東方來百姓奔走轉相驚動諸郡遑急各以狀聞嚴察其虚妄獨不爲備詔書勑問使驛係道嚴固執無賦後卒如言又曰黄香爲魏郡太守郡舊有内外園田常與人分種収榖歲數千斛香曰田令啇者不農王制仕者不耕王制曰上農夫食九人下士視上農夫禄足以代耕也伐氷食禄之人不與百姓争利乃悉以賊人課令耕種又曰中平三年江夏兵趙慈反叛殺南陽太守奏頡攻没六縣拜羊續爲南陽太守當入郡界乃羸服間行童子一人觀歷縣邑採問風謡然後乃進其令長貧㓗吏民良猾悉迸知其狀郡内驚竦莫不震懾乃發兵與荆州刺史王敏共擊趙慈斬之獲首五千餘級屬縣餘賊並詣續降又曰羊續爲南陽太守續妻後與子秘俱徃郡舎續閉門不内妻而自將秘行其資藏唯有布衾弊祗禂監麥數斛而已說文曰祗裯短衣而巳祗者丁奚反禂音丁勞也顧勑祕曰吾自奉若此何以資爾母乎使母俱歸又曰三府舉主棠治劇拜巴郡太守棠馳兵赴賊斬虜千餘級巴庸清静吏民生爲立祠又曰樊淮拜鉅鹿太守時飢荒之餘人庶流迸家户且盡淮課督農桑廣施方略朞年間榖粟豐賤數十倍而趙魏之郊數爲羗所鈔暴淮外禦冦虜内撫百姓郡境以安又曰伏湛更始立以爲平原太守倉卒兵起天下驚擾而湛獨晏然教授不廢謂子曰夫一榖不登國君撤膳禮記曰年榖不登君膳不祭肺今人皆飢奈何獨飽乃共食麄糲糲麄米者九章筭術曰粟五十糲率三十一斛粟得六斗米爲糲也悉分俸禄以賑郷里來客者百餘家又曰鮑昱後拜汝南太守郡多陂池歲歲决壞年費常三千餘萬昱乃上作方梁石洫洫渠也以石爲之猶今之水門也水常饒足漑田倍多人以殷冨又曰第五訪爲張掖太守歲飢粟石數千訪乃開倉賑給以救其弊吏懼譴争欲上言訪曰若上湏報是棄人也湏待也太守樂以一身救百姓遂出榖賦人順帝璽書嘉之由是一郡得全謝承後漢書曰鄭弘遷淮隂太守消息傜賦政不煩苛行春天旱隨車致雨白鹿方道夾轂而行弘怪問主簿黄國曰鹿爲吉爲凶國拜賀曰聞三公車􅙲畫作鹿明府必爲宰相續漢書曰宋均爲九江太守五日一聽事冬以日中夏以平旦時多虎均曰夫虎豹在山黿鼉在泉物性之所託故江淮之間有猛獸猶江北之雞豚也數爲民害咎在貪殘今退檻穽進忠良虎遂東渡江又曰劉寛字文饒弘農人爲南陽太守温仁多恕遇民如子口不出詈言吏人有過但用蒲鞭罰之示辱而巳又曰羊茂字季寳豫章人爲東郡太守冬坐白羊皮夏處單版榻常食乾飯出界買鹽致妻子不歷官舎華嶠後漢書曰岑熈爲東郡太守好聘禮隱逸顯之於朝與叅政事視事三年人歌之曰我有枳棘岑君伐之我有蝥蠈岑君遏之狗吠不驚足下生釐含哺皷腹焉知凶災我嘉我生獨丁斯時美矣岑君於戲如兹張璠漢記曰宋登字叔楊岀爲潁川太守市無豫價道不拾遺病免卒於家汝陰人配社祀之又曰陳球爲零陵太守球到郡設方略朞月間賊虜消散而州兵朱益等反與桂楊賊胡蘭數萬人轉攻零陵零陵下濕編木爲城不可守備郡中惶恐掾吏白請遣家避難球怒曰太守分國虎符受任一郡豈顧妻孥而坦國威乎重復言者斬乃悉郡内吏民老弱與共城守}
