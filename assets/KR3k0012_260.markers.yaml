  - {type: variant, offset: 220, length: 3, content: 孝文時, SBCK: 後青州大蝗入平原界􅂺死􅀊屢有年百姓歌之又曰汲黯爲東海太守治官好清静擇丞史任之責其大指而巳黯素多病卧閤内不出歳餘東海大治召爲淮陽太守黯辭之上曰君薄淮陽耶吾欲得君卧而治之乃行又曰王尊爲中郡太守河溢堤壞尊執珪請以身填金堤而水稍却又曰王尊字子貢􅃰郡}
  - {type: page-break, offset: 220, content: '', id: KR3k0012_SBCK_260-2b}
  - {type: variant, offset: 220, length: 1, content: 孝, WYG: 後青州大蝗入平原界輒死嵗屢有年百姓歌之又曰汲黯為東海太守治官好清静擇丞史任之責其大指而已黯素多病卧閣内不出嵗餘東海大治召為淮陽太守黯辭之上曰君薄淮陽耶吾欲得君卧而治之乃行又曰王尊為東郡太守河溢堤壞尊執珪請以身塡金堤而水稍却又曰王尊字子貢涿郡人也為安定太守到官出教告屬縣曰令長丞尉奉法守城為民父母抑强扶弱宣恩廣澤甚勞苦矣太守以今日至府願諸君自勉正身又曰馮立字聖卿以任為郎遷五原太守徙西河上郡立在職公亷治行略與兄野王相似而多知有恩貸好為條教吏人嘉美野王立相代為太守人歌之曰大馮君小馮君兄弟繼踵相因循聰明賢智恩惠民政如魯衛德化均周公康叔猶二君後遷為東海太守土下濕病痺天子聞之徙太原太守更治五郡所居有迹又曰韓延夀字長公燕人為淮陽太守治甚有名徙潁川多豪強難治延夀教以禮讓令}
  - {type: page-break, offset: 220, content: '', id: KR3k0012_WYG_260-4a, image: WYG0895/WYG0895-0338c.png}
  - {type: page-break, offset: 220, content: '', id: KR3k0012_WYG_260-4b, image: WYG0895/WYG0895-0338d.png}
  - {type: variant, offset: 220, length: 3, content: 孝文時, krp: 後青州大蝗入平原界輒死歲屢有年百姓歌之又曰汲黯爲東海太守治官好清静擇丞史任之責其大指而巳黯素多病卧閤内不出歳餘東海大治召爲淮陽太守黯辭之上曰君薄淮陽耶吾欲得君卧而治之乃行又曰王尊爲中郡太守河溢堤壞尊執珪請以身填金堤而水稍却又曰王尊字子貢涿郡}
  - {type: variant, offset: 222, length: 1, content: 時, WYG: 學教官諸生冠皮弁執俎豆為吏民行喪娶禮百姓遵用其教徙為東郡太守吏無追捕之苦}
