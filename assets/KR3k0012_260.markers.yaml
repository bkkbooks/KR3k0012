  - {type: variant, offset: 689, length: 6, content: 故容徙為雲中, SBCK: 慮霸就徴臨淮必亂不敢受璽書而具以狀聞又曰耿純字伯山鉅鹿人請治一郡盡力自効上􅀏曰卿乃欲以治民自効乃拜純爲東郡太守後坐事免上過東郡數千人號呼涕泣云願復得耿君上復以純爲東郡}
