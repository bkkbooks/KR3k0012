  - {type: variant, offset: 3153, length: 746, content: 餘日便復乘驢而去楚國先賢傳曰耒陽胡紹字伯蕃年十八為郡門下幹迎太守許荊荊足中風使紹柳之紹視荊蹠音跖下而笑荊怒問之紹曰見明府蹠下黑子紹亦有之忻而故笑荊視之果有黑子令其從學學八年遂為九真零陵二郡太守華陽國志曰趙瑤字元珪弟琰字稚珪瑤兄弟皆以令德著聞瑤少有公望遷扶風太守徙為蜀郡司空張溫謂之曰弟五伯魚從蜀郡入為司空吾今掃弟以待足下矣西京雜記曰朱買臣為會稽太守懷章綬還至舍亭而國人未知也所知錢勃見曝露乃勞之曰無罷乎遺以紈扇買臣至郡引為上客尋遷為掾吏韓子曰李悝為魏文侯上地之守而欲人之善射乃下令曰民有狐疑之訟者令之射杓中之者勝不中者負令且下而人皆習射日夜不休及與秦戰大敗之以民之善射也風俗通曰蜀郡任嘉年三四歲時父騰為諸生於漢中就師有盜賊道路斷絕蜀亦覆沒客轉長沙為州郡吏後嘉為長沙太守騰為奏曹掾默知嘉實其子曰嘉母語次謂嘉曰奏曹任掾則汝父也但差老耳嘉曰天下豈獨有一任夫人何以老更生邪意母曰咄我尚守養汝數十年無嫌譏豈以垂沒更失計哉顧實真父不可棄捐後嘉問掾聲音何類太守何州里耶掾曰本犍為武陽人蓬轉流宕到此母察審諦又識左耳前贅因出抱持對之流涕嘉自拔榻歔欷哽咽世說曰爰綜為新安太守南界有刻石爰至其下醼有人於石下得剪刀者眾咸異之主簿對曰昔長沙桓王嘗飲餞孫洲父老云此洲狹而長君當為長沙事果應夫三刀為州今得交刀君亦當為交州後果作交州世語曰荊州刺史裴潛以南陽周泰為從事使詣司馬宣王宣王知之辟泰泰九年居喪留鈌行之後三十六日擢為新城太守宣王為大會使尚書鍾毓嘲之曰君釋褐登宰府三十六日擁麾蓋守兵馬典郡乞兒乘小車一何快耶泰曰君貴公之子故守吏職獼猴騎土牛一何遲也潘尼贈二李郎詩序曰元康六年尚書吏部郎汝南李光彥遷汲郡太守都亭侯江夏李茂曾遷平陽太守此二子皆弱冠知名歷職顯要旬月之間繼踵名郡離儉劇之勤就放曠之逸枕鳴琴以俟遠致離別之際各斐然賦詩, SBCK: ''}
