  - {type: variant, offset: 773, length: 2, content: 萬為, krp: 誨導東蕃}
  - {type: variant, offset: 775, length: 272, content: 弘農守後漢書曰郅惲再遷長沙太守先是長沙有孝子古初遭父喪未葬鄰人失火初匍匐柩上以身扞火火為之滅惲真異之以為首舉又曰任延為武威太守帝親見戒之曰善事上官無失名譽延對曰臣聞忠臣不私私臣不忠履正奉公臣子之節上下雷同非陛下之福善事上官臣不敢奉詔帝歎息曰卿言是也又曰橋玄為上谷太守上邽姜歧守道隱居名聞西州玄召以為吏稱疾不就玄怒勑督郵尹益逼致之曰歧若不至趣嫁其母趣音促益固爭不能得遽曉譬歧歧堅臥不起郡內士大夫亦往諫玄乃止時頗以為譏漢官解詁云太守專郡信理庶績勸農賑貧決訟斷辟興利除害檢察詳奸舉善黜惡誅殺暴殘者也魏志曰賈逵字梁道太祖征馬超至弘農曰此西道之要以逵領弘, WYG: 𢎞}
