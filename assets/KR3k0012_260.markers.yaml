  - {type: variant, offset: 656, length: 1, content: 為, SBCK: 白外事輙曰此丞􅁺任何足相煩􅀂大姓侵小民􅃛羗欲旅距此乃太守事耳又曰朱暉字文季再遷臨淮太守暉好節槩有所㧞用皆厲行之士吏民畏愛謂之歌曰強直自遂南陽朱季吏畏其威民懷其惠又曰􅀕彤爲遼東太守􅊮之威聲􅀭於北方胡夷皆來内附野無風塵乃悉罷縁邊屯兵及彤卒烏桓鮮卑追思無巳毎朝京師過􅊮􅃁拜謁仰天號泣乃去又曰張堪字君遊遷}
  - {type: page-break, offset: 656, content: '', id: KR3k0012_SBCK_260-4b}
  - {type: variant, offset: 656, length: 0, content: '', WYG: 白外事輒曰此丞掾任何足相煩若大姓侵小民黠羌欲旅距此乃太守事耳又曰朱暉字文季再遷臨淮太守暉好節概有所拔用皆厲行之士吏民畏愛}
  - {type: variant, offset: 656, length: 1, content: 為, krp: 白外事輙曰此丞掾任何足相煩若大姓侵小民黠羗欲旅距此乃太守事耳又曰朱暉字文季再遷臨淮太守暉好節槩有所㧞用皆厲行之士吏民畏愛謂之歌曰強直自遂南陽朱季吏畏其威民懷其惠又曰祭彤爲遼東太守􅊮之威聲揚於北方胡夷皆來内附野無風塵乃悉罷縁邊屯兵及彤卒烏桓鮮卑追思無巳毎朝京師過􅊮冡拜謁仰天號泣乃去又曰張堪字君遊遷}
  - {type: variant, offset: 657, length: 0, content: '', WYG: 之歌曰強直自遂南陽朱季吏畏其威民懷其惠又曰祭彤為遼東太守彤之威聲揚於北方胡夷皆來内附野無風塵乃悉罷緣邉屯兵及彤卒烏桓鮮卑追思無已毎朝京師過彤冡拜謁仰天號泣乃去又曰張堪字君遊遷}
