  - {type: variant, offset: 2145, length: 197, content: 郡太守又曰張岱時新安王子鸞以盛寵為南徐州割吳郡屬焉高選佐吏孝武帝召岱謂之曰卿美望夙著今欲用卿為子鸞揔刺史之任無謂小屈終當大伸也又曰王敬則為吳興太守入烏程從市過見屠肉枅結賢反歎曰吳興昔無此枅是我少時在此作也召故人飲酒說平生不以屑也南史曰謝超宗有高名齊高帝以超宗為義興太守昇明二年坐公事免詣東府門自通其日風寒高帝謂四坐曰此客至使人不衣自暖矣三國典略曰王慶籍為京兆太守太祖以其精勤賚以紫袍及綾裳一襲謂, SBCK: ''}
