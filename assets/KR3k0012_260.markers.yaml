  - {type: variant, offset: 225, length: 0, content: '', WYG: 昆弟相與訟田延夀大傷之曰幸得為郡不能宣明教化至令民有骨肉争訟既傷風化咎在馮翊當先退是日移病不聽事因入卧傳舍閉閤思過於是訟者宗族傳相責讓此兩昆弟皆自髠肉袒謝終死不敢復争延夀恩信周遍二十四縣莫敢復以辭訟自}
