  - {type: variant, offset: 723, length: 0, content: '', SBCK: 霸爲鉅鹿太守霸性清約質朴爲政寛恕正色而巳不求備於人􅁺吏有過輙私責數不改休罷之終不􅁀􅀭其惡又曰􅁗彭字伯夲爲山陽太守以禮訓民不任刑名崇好儒雅百姓懷之莫敢欺犯轉潁川太守鳯皇騏驎嘉禾甘露之瑞集於郡境元成}
  - {type: page-break, offset: 723, content: '', id: KR3k0012_SBCK_260-5b}
  - {type: variant, offset: 723, length: 0, content: '', WYG: 霸為鉅鹿太守霸性清約質朴為政寛恕正色而已不求備於人掾史有過輒私責數不改休罷之終不暴揚其惡又曰秦彭字伯平為山陽太守以禮訓民不任刑名崇好儒雅百姓懷之莫敢欺犯轉潁川太守鳯凰麒麟嘉禾甘露之瑞集於郡境元成}
