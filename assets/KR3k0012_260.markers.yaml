  - {type: variant, offset: 737, length: 0, content: '', SBCK: 故號爲万石􅁗氏又曰沈豐字聖逹爲零陵太守爲政慎刑重殺罪法辭訟􅀄不歷獄嫌疑不决一斷於口鞭杖不舉市無刑戮僚友有過􅀄不􅁀􅀭有竒謀異略輙爲談述曰太守所不及也到官一年甘露降芝草生又曰宗慶字叔平爲長沙太守民飬子者三千餘人男女皆以宗爲名後}
  - {type: variant, offset: 737, length: 0, content: '', WYG: 洫洫梁也以石為之猶今之水門也水常饒足溉田倍多人以殷富又曰第五訪為張掖太守嵗飢粟石數千訪乃開倉賑給以救其敝吏懼譴争欲上言訪曰若上須報是棄人也須待也太守樂以一身救百姓遂出穀賑人順帝璽書嘉之由是一郡得全謝承後漢書曰鄭𢎞遷淮隂太守消息徭賦政不煩苛行春天旱随車致雨白鹿方道夾轂而行𢎞恠問主簿黄國曰鹿為吉為凶國拜賀曰聞三公車轓畫作鹿明府必為宰相續漢書曰宋均為九江太守五日一聽事冬以日終夏以平旦時多虎均曰夫虎豹在山黿鼉在泉物性之所託故江淮之間有猛獸猶江北之有鷄豚也數為民害咎在貪殘今退檻穽進忠良虎遂東渡江又曰劉寛字文饒𢎞農人為南陽太守温仁多恕遇民如子口不出詈言吏人有過但用蒲鞭罰之示辱而已又曰羊茂學字季寶豫章人為東郡太守冬坐白羊皮夏處單版榻常食乾飯出界買鹽致妻子不厯官舎華嶠後漢書曰岑熈為東郡太守好聘禮隱逸顯之於朝與叅政事視事三年人歌之曰我有枳棘岑君伐之我有蝥賊岑君遏之狗吠不驚足下生氂含哺鼓腹焉知凶災我嘉我生獨于斯時美矣岑君於戲休兹張璠漢記曰宋登字叔揚出為潁川太守市無偽價道不拾遺病免卒於家汝隂人配社祀之又曰陳球為零陵太守球到郡設方略期月間賊虜消散而州兵朱葢等反與桂陽賊胡蘭數萬人轉攻零陵零陵下濕編木為城不可守備郡中惶恐掾史白請遣家辟難球怒曰太守分國虎符受任一郡豈顧妻孥而沮國威重乎復言者斬乃悉郡内吏民老弱與共守城}
