  - {type: variant, offset: 724, length: 10, content: 號為萬石諸馮至是世至, SBCK: 宗族五人同爲}
  - {type: variant, offset: 724, length: 0, content: '', WYG: 宗族五人同為二千石故}
  - {type: variant, offset: 724, length: 10, content: 號為萬石諸馮至是世至, krp: 宗族五人同爲}
  - {type: punctuation, offset: 726, content: 『, id: KR3k0012_CHANT_260-bkkpn200}
  - {type: variant, offset: 728, length: 0, content: '', WYG: 秦氏又曰沈豐字聖達為零陵太守為政愼刑重殺聴理辭訟初不厯獄嫌疑不決一斷於口鞭杖不舉市無刑戮僚友有過初不暴揚有竒謀異略輒為談述曰太守所不及也到官一年甘露降芝草生又曰宗慶字叔平為長沙太守民養子者三千餘人男女皆以宗為名後漢書曰光武南定河内而更始大司馬朱鮪等盛兵據洛陽又并州未安光武難其守問於鄧禹曰}
  - {type: page-break, offset: 728, content: '', id: KR3k0012_WYG_260-9b, image: WYG0895/WYG0895-0341b.png}
  - {type: variant, offset: 729, length: 1, content: 馮, WYG: 將誰可使守河内者禹曰昔髙祖任蕭何於關中無復西顧之憂所以得專精山東終成大業今河内帶河為固戸口殷實北通上黨南迫洛陽冦恂文武備足有牧人御衆之才非此子莫可使也乃拜恂河内太守行大將軍事又曰冦恂字子翼為潁川太守拜執金吾後光武幸潁川百姓遮道曰願陛下復借冦君一年乃留之又曰楊震遷東莱太守當之郡道經昌邑故所舉荆州茂才王宻為昌邑令謁見}
  - {type: page-break, offset: 729, content: '', id: KR3k0012_WYG_260-10a, image: WYG0895/WYG0895-0341c.png}
  - {type: punctuation, offset: 730, content: 』, id: KR3k0012_CHANT_260-bkkpn201}
  - {type: punctuation, offset: 730, content: 。, id: KR3k0012_CHANT_260-bkkpn202}
  - {type: 'tls:seg', offset: 730, content: '', id: KR3k0012_CHANT_260-7a.8}
  - {type: variant, offset: 731, length: 0, content: '', WYG: 夜懷金十斤以遺震曰故人知君君不知故人何也宻曰暮夜無知者震曰天知地知我知子知何謂無知宻愧而出轉􅃰郡太守性公亷不受私謁子孫常蔬食步行故舊長者或欲令為開産業震不肯曰使後代稱為清白吏子孫以此遺之不亦厚乎又曰孟嘗遷合浦太守郡不産榖實而海出珠寶與交阯比境常通商販貿糴糧食先時宰守並多貪穢詭人採求不知紀極珠遂漸徙於交阯郡界於}
  - {type: page-break, offset: 731, content: '', id: KR3k0012_WYG_260-10b, image: WYG0895/WYG0895-0341d.png}
  - {type: variant, offset: 732, length: 1, content: 世, WYG: 行旅不}
  - {type: variant, offset: 734, length: 0, content: '', WYG: 人物無資貧者餓死於道嘗到官革易前弊求人病利曽未踰嵗去珠復還又曰任延為九真太守九真不識父子之性夫婦之道延乃移書屬縣各使男年二十至五十女年十五至四十皆以年齒相配其貧無禮聘令長吏以下各省俸祿以賑助之同時相娶者}
  - {type: page-break, offset: 734, content: '', id: KR3k0012_WYG_260-11a, image: WYG0895/WYG0895-0342a.png}
  - {type: variant, offset: 736, length: 0, content: '', WYG: 餘人是嵗風雨順節穀稼豐衍其産子者始知種姓咸曰使我有是子者任君也多名子為任又曰陳寵轉廣漢太守西川豪右并兼吏多姦貪訴訟日百數寵到顯用良吏王渙鐔顯等以為腹心鐔音徒南反訟者日減郡中清肅先是雒縣城南雒縣名故城今在益州維縣南也毎隂雨常有哭聲聞於府中積數十年寵聞而疑其故使吏案行還言代衰亂時此下多死亡者而骸骨不得葬寵愴然矜歎即勑縣盡収歛葬之自是哭聲遂絶又曰宋均為九江太守山陽楚沛多蝗其飛至九江界者輒東西散去又曰劉寵為㑹稽太守簡除煩苛禁察非法郡中大化徵為將作大匠山隂縣有五六老叟龎眉皓髮自若耶山谷間出人齎百錢以送寵寵為人選一大錢受之又曰曹褒為河内太守時春夏大旱糧穀踊貴褒到乃省吏併職退去奸殘澍雨數降其秋大熟百姓給足流民皆還又曰鮑德為南陽太守時嵗多荒灾惟南陽豐穰吏人愛恱號為神父又曰亷范遷蜀郡太守其俗尚文辨好相持短長范毎厲以淳厚不受偷薄之說成都民物豐盛邑宇逼側舊制禁民夜作以防火灾而更相隱蔽燒者日屬范乃毁削先令但嚴使儲水而已百姓為便乃歌之曰亷叔度來何暮不禁火民安堵平生無襦今五袴又曰馬嚴為陳畱太守下車明賞罰發奸慝郡界清静時京師訛言賊從東方來百姓奔走轉相驚動諸郡惶急各以狀聞嚴察其虛妄獨不為備詔書勑問使驛係道嚴固執無賊後卒如言又曰黄香為魏郡太守郡舊有内外園田常與人分種收穀嵗數千斛香曰田令商者不農王制仕者不耕王制曰上農夫食九人下士視上農夫祿足以代耕者伐冰食祿之人不與百姓争利乃悉以賦人課令耕種又曰中平三年江夏兵趙慈反殺南陽太守秦頡攻沒六縣拜羊續為南陽太守當入郡界乃羸服間行侍童子一人觀厯縣邑採間風謠然後乃進其令長貪潔吏民良猾悉逆知其狀郡内驚悚莫不震懾乃發兵與荆州刺史王敏共擊趙慈斬之獲首五千餘級屬縣餘賊並詣續降又曰羊續為南陽太守續妻後與子秘俱往郡舍續閉門不内妻而自將秘行其資藏惟有布衾敝袛裯鹽麥數斛而已説文曰袛裯短衣也袛音丁奚反裯音丁勞反顧勑秘曰吾自奉若此何以資爾母乎使與母俱歸又曰三府舉王堂治劇拜巴郡太守堂馳兵赴斬賊虜千餘級巴庸清静吏民生為立祠又曰樊準拜鉅野太守時飢荒之餘人庶流離家戸且盡準課督農桑廣施方略朞年間穀粟豐賤數十倍而趙魏之郊數為羌所鈔暴準外禦冦虜内撫百姓郡境以安又曰伏湛更始立以為平原太守倉卒兵起天下驚擾而湛獨晏然教授不廢謂子曰夫一穀不登國君撤膳禮記曰年穀不登君膳不祭肺今人皆飢奈何獨飽乃共食麤糲糲粗米九章算術曰粟五十糲率三十一斛粟得六斗米為糲也悉分俸祿以賑鄉里來客者百餘家又曰鮑昱後拜汝南太守郡多陂池嵗嵗決壞後年費常三千餘萬昱乃上作方梁}
