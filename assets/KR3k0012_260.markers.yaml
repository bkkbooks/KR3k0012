  - {type: variant, offset: 682, length: 0, content: '', SBCK: 位常􅂼食布衣妻自炊㸑􅀄代到當發百姓老小闐府門攀車叩馬啼呼曰捨我何之其得人心見愛如此又曰郭伋爲頴川太守辭去之官光武詔曰郡得賢能太守去帝城不逺何潤九里冀京師并蒙其福也又曰􅁗彭遷山陽太守時山陽新遭地動後飢旱榖貴米石七八萬百姓窮困彭下車經營勞來爲民四誡以父母夫妻兄弟長㓜之序擇民能率衆以爲郷三老選郷三老爲縣三老令與長吏叅職崇儒雅貴庠序上德化春秋饗射􅂛降揖讓務禮示民吏民畏愛不敢欺犯又曰侯霸字君房爲臨淮太守治有能名及王莽之敗霸保固守卒全一郡更始元年遣使徴霸百姓老弱相携號哭􅃒使者車或當道而卧}
  - {type: page-break, offset: 682, content: '', id: KR3k0012_SBCK_260-5a}
  - {type: variant, offset: 682, length: 0, content: '', WYG: 位常蔬食布衣妻自炊爨初代當發百姓老小闐府門攀車扣馬啼呼曰捨我何之其得人心見愛如此又曰郭伋為潁川太守辭去之官光武詔曰郡得賢能太守去帝城不逺河潤九里冀京師并蒙其福也又曰秦彭遷山陽太守時山陽新遭地動後飢旱穀貴米石七八萬百姓窮困彭下車經營勞來為民四誡以父母妻子兄弟長㓜之序擇民能率衆以為鄉三老選鄉三老為縣三老令與長吏叅職崇儒雅貴庠序尚德化春秋饗射升降揖讓務以禮示民吏民畏愛不敢欺犯又曰侯霸字君房為臨淮太守治有能名及王莽之敗霸保固自守卒全一郡更始元年遣使徵霸百姓老弱相攜號哭遮使者車或當道而卧}
