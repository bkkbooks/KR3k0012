  - {type: variant, offset: 224, length: 0, content: '', SBCK: 也爲安定太守到官出教告屬縣曰令長丞尉奏法守城爲民父母禦強扶弱宣廣澤甚勞苦矣太守以今日至府願諸君自免正身又曰馮立字聖通以任爲郎遷五原太守徙西河上郡立在職公廉治行略與兄野王相似而多知}
  - {type: variant, offset: 224, length: 0, content: '', WYG: 無捶楚之憂皆便安之接待下吏恩施甚厚入守左馮翊行縣至髙陵民}
