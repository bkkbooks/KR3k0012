  - {type: variant, offset: 88, length: 0, content: '', WYG: 新到輒遣吏存問致意乃敢起就職博奮髯抵几曰觀齊兒欲以此為俗耶乃召見諸曹史書佐及縣大吏選其可用者出教署之皆斥寵諸病吏郡中大驚又勑功曹官屬多褎衣大祒祒音紹謂大袴也不中節度自今掾史衣皆令去地三寸又曰尹翁歸字子況為東海太守郡中吏人賢不肖及奸邪盡知之東海大治以髙第入守右扶風滿嵗為真政雖任刑其在公卿之間清潔自守語不及私温良廉退不以行能驕人甚得名譽}
