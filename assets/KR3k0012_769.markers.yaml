  - {type: variant, offset: 521, length: 221, content: 為橋也維連四舡也方併兩舡也特單舡也柎編木以渡也廣雅曰艦大舡也舫艕舩也蒙衝艑步典切䑦音鉤𦪇音鹿舸古我切共音廷音孟音舟洪舟挺舟猛舟也家語曰舟非水不行水入舟則沒君非民不治民犯上則君危戰國策曰或謂公叔曰乘舟舟漏而不塞則舟沉矣塞漏舟而輕陽侯之波則舟覆矣令公自以辯於薛公而輕秦是漏舟而輕陽侯之波也願公察之帝王世紀曰昭王濟漢舡人惡之以膠舡進王中流膠舡解王沒于水史記曰項羽欲東渡烏江瓚曰牛渚烏江亭長艤舩侍徐廣曰擬音儀駰案應劭曰檥正也孟康曰檥音蟻附也附舩著岸也, SBCK: 合}
