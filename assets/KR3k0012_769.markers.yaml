  - {type: variant, offset: 268, length: 10, content: 齊侯與蔡姬乘舟于囿蕩, SBCK: 扶南國伐木爲舡長者十二㝷廣肘六尺頭尾似魚皆以䥫鑷露裝大者載百人人有長短襓及篙音髙各一從頭至尾靣有五十人作或四十二人隨舡大小立則用長撓坐則用短橈水淺乃用篙皆當上應聲如一杜蘭香别傳曰香降張碩碩既成婚香便去絶不來年餘碩舡行忽見香乗車於山際碩不勝驚喜遥徃造香見香悲喜香亦有悅色言語頃時碩欲登其車其婢舉手排之嶷然山立碩復欲車前上車奴攘臂排之碩於是遂退續捜神記曰臨淮}
