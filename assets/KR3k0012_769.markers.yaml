  - {type: variant, offset: 3, length: 1, content: 敘, krp: 萬徙洛陽鍾簴九龍翁仲銅駞飛廉鍾一没於河募浮没三百人入河以竹絙牛頭轆轤引之乃岀造萬斛}
  - {type: variant, offset: 5, length: 2, content: 上釋, SBCK: 載以渡之至于鄴穆天子傳曰天子乗鳥舟龍本浮于大沼沼池龍下冝有舟皆以龍鳥爲形制今吴之青雀昉遺象山海經曰大人之國㘴而削舡世夲曰共鼔貨狄作舟共鼔貨狄黄帝二臣又曰廪君}
