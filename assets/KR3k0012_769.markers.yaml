  - {type: variant, offset: 743, length: 266, content: 淳曰南方人謂整舡向岸曰檥也謂項王曰江東雖小地方千里眾數十萬人亦足王也願大王急渡今獨臣有舩漢軍至無以渡項王笑曰天之亡我我何渡為且籍與江東子弟八千人渡江而西今無一人還縱江東父兄憐而王我何面目見之縱彼不言籍獨不愧於心乎乃為亭長曰吾知公長者吾騎此馬五歲所當無敵嘗一日行千里吾不忍殺之以賜公又曰韓信擊魏魏王盛兵蒲坡塞臨晉信乃益為疑兵陳舡欲渡臨晉而伏兵從夏陽以木罌缻與缶字同渡軍襲安邑虜魏王豹又曰陳平逃楚歸漢渡河舡人疑有金陰欲害之平脫衣刺舩遂免害漢書曰鄧通蜀郡南安人以櫂舡為黃頭郎師古曰櫂舡能持櫂行舡也士勝水其色黃故刺舡之郎皆著黃帽因號曰黃頭郎, SBCK: 􅀄}
