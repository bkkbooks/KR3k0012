  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第七百六十九}
  body:
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 二叙舟中方言曰舟自􅀜而東謂之舡自􅀜而西或謂之舟方舟或謂之航又曰舩首謂之閭或謂之鷁首郭璞注曰今江東貴人舡前作青雀是其象也東觀漢記曰鄧訓爲護羗校尉綘革爲舡置於箄上以渡河掩擊明羗張璠漢記曰梁兾弟池中舡無故自覆問椽朱穆穆曰舟所以濟渡萬物不施遊戯而巳今覆者天戒將軍濟渡萬民不可長念遊戯也漢宫殿䟽曰武帝作大池周匝四十里名昆明池作豫章大舡可載萬人舡上起宫室吴記曰孫皓問中書令張尚詩言汎彼栢舟唯栢中舟乎尚曰詩云檜檝松舟亦中也皓忌其勝巳因下獄晉令曰水戰飛雲舡相去五十歩蒼隼舡相去四十歩金舡相去三十歩小兒先登飛鳥舡相去五十歩晉朝雜事曰太康八年七月大雨殿前地䧟方五尺深數丈中有破舡晉宫閣記曰天淵池中紫宮舟升進舡曜陽飛龍舟射獵舟靈芝池有鳴鶴舟指南舟舎利池有雲母舟無極舟都亭池有華潤舟常安舟崔鴻後趙録曰張彌師衆}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_SBCK_769-1b}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 二叙舟中方言曰舟自關而東謂之船自關而西或謂之舟方舟或謂之航又曰船首謂之閭或謂之鷁首郭璞注曰今江東貴人舟前作青雀是其象也東觀漢記曰鄧訓為䕶羗校尉縫革為船置於箄上以渡河掩擊明羗張璠漢記曰梁冀第池中船無故自覆問掾朱穆穆曰舟所以濟渡萬物不施遊戲而已今覆者天戒將軍濟渡萬民不可長念遊戲也漢宫殿疏曰武帝作大池周匝四十里名昆明池作豫章大船可載萬人船上起宮室吳記曰孫皓問中書令張尚詩言汎彼栢舟唯栢中舟乎尚曰詩云檜檝松舟亦中也皓忌其勝已因下獄晉令曰水戰飛雲船相去五十歩蒼隼船相去四十歩金船相去三十歩小兒先登飛鳥船相去五十歩晉朝雜事曰太康八年七月大雨殿前地陷方五尺深數丈中有破船晉宮閣記曰天淵池有紫宮舟升進船曜陽飛龍舟射獵舟靈芝池有鳴鶴舟指南舟舍利池有雲母舟無極舟都亭池有華潤舟常安舟崔鴻后録曰張彌帥衆}
