  - {type: variant, offset: 10, length: 1, content: 循, SBCK: 雕文􅀞之而浮}
  - {type: variant, offset: 10, length: 1, content: 循, krp: 雕文畫之而浮}
  - {type: variant, offset: 12, length: 0, content: '', SBCK: 中其舡浮者神以爲君他姓舡不能浮獨廪君舡浮因立爲君蜀王本紀曰􅁗爲舶舡萬艘欲攻楚吕氏春秋曰虞姁作舟姁音劬詡二音又曰荆有佽飛者得寳劒渉江中流而有蛟夾繞其舡佽飛拔寳劔赴江刺蛟殺之舟中之人皆活荆王聞之位以執圭又曰楚人有渉江者其劒自舟中墜於水遽契其舟曰是吾劒所從墜也舟去從所契處入求之而舟巳行劒不行􅀂此不亦惑乎又曰伍貟如吴過於荆至江上欲涉見一丈人刺小舡方將漢從而請焉丈人渡之又曰管夷吾百里奚覆王之舡􅂹也絶江者託於舡致逺者託於􅂹淮南子曰湯武聖主也而不能與越人乗舲音靈舟而浮於江湖舲舟小舡者也又曰楚人有乗舡而遇大風者投於水非不貪生而畏死也或於死而反忘於生又曰龍舟鷁首浮吹以虞此道於水也於舡中吹􅄜與竿以爲樂故曰浮吹以虞者也衡波傳曰孔子使子貢乆而不來孔子謂弟子占之遇鼎鼎易卦也皆言無足不來顔回掩口而􅀏子曰回也哂謂賜來也曰無足者乗舟而來至矣子貢朝至如顔回說苑曰梁相死惠子欲之梁渡河而遽墮水中舩人救之曰子欲何之而遽也曰梁無相吾欲徃相之舡人曰子居舡檝之間而溺無我則死矣子何能相梁乎惠子曰居艘長檝之間不如子至於安國家社稷子比我矇矇如未視狗耳又曰晉平公使叔向聘吴吴人飾舟以逆之左右各五百人有繡衣豹裘者錦衣狐裘者叔向歸以告平公吴其亡乎潜夫論曰人行之動天地譬車上御駟馬蓬中櫂舟雖有覆載猶在我所之蔣子萬機論曰吴越争於五湖用舟檝而相觸怯勇共覆鈍利俱傾顧譚新言曰蓬蒿生于泰山之上豫章長于窮藪之中良匠造舟興宮建廟必不取泰山之陋質而弃窮藪之羙材明矣又曰奔事失轄泛舟無檝欲以不覆未之有也譙周法訓曰以道爲天下者猶乗安舟而由廣路安舟難成可乆處也廣路難至可常行也又曰乗舡曲折不失其瀆是善乗舟者􅀽准正書曰非其所事而強學猶以百萬之師積之河濟之中其用舟擑固不如江漢之良杜夷幽求曰輕舟可以救溺濡幕可以濟焚抱朴子曰欲以􅁦藥必􅂛騰者何異䇿蹇驢而欲㝷遺風櫂籃舟而欲濟大川語林曰劉道真遭亂於河側自牽舡見一老嫗採桑逆旅劉謂之曰女子何不調機利杼而採桑逆旅女荅曰丈夫何不跨馬揮鞭而牽舡王子年拾遺記曰周昭王二十四年塗脩國獻青鳯丹鵠各一雌一雄孟夏之時鳯羽皆脫易毛羽聚鵠翅爲羽扇鳯羽以飾車蓋扇名遊飄二名條翮三名􅉻光四名側影時東甌獻二羙女一名延姢二名造娱使此二人更摇此扇侍於王側輕風乍至冷然自凉昭王淪於江漢二女與乗舟來願同没漢水故江漢之民到今異之丘祠於江湄數十年間人於江漢之上猶見王與二女乗舟檝於水際至暮春上巳之日禊集於祠間或以時鮮甘味採杜蘭之葉以包褁之沉於水中或結五色紗囊盛食或用金䥫之器並沉於波中以言蛟龍水中一褁之不侵食也其祠號曰招祇之祠又曰軒皇變乗採以造舟檝水物爲之翔踴滄海爲之恬波又曰周武王東伐夜郎濟河時雲明如晝八百之旅皆薦賢而歌有大蜂􅃺如舟鳥飛集王舟困以鳥􅀞幡旗翌日而梟紂名其舡曰蜂舟魯哀公二年鄭人擊趙簡子得其蜂旗則其遺􅀋也事出太公六韜又曰漢成帝嘗與飛鷰汎舟戯太液池以沙棠爲舟貴不沉没也以雲母飾於鷁首一名雲母舟又刻大桐木爲虬龍雕飾如真像以夾雲舟}
