  - {type: variant, offset: 385, length: 135, content: 第津在河東大陽縣西封藏又曰楚敗吳師獲其舟餘皇餘皇舟名又曰晉楚將戰趙嬰齊使其徒先具舟于河故敗而先濟也春秋潛潭巴曰澤浮舟天子以亡為憂宋均注曰潭無底之澤今浮舟言陰盛之耳論語曰南宮適問於孔子曰羿善射奡盪舟俱不得其死然爾雅曰舫舟也天子造舟諸侯維舟大夫方舟士特舟庶人乘柎郭璞注曰造北, SBCK: 請賽}
  - {type: variant, offset: 385, length: 357, content: 第津在河東大陽縣西封藏又曰楚敗吳師獲其舟餘皇餘皇舟名又曰晉楚將戰趙嬰齊使其徒先具舟于河故敗而先濟也春秋潛潭巴曰澤浮舟天子以亡為憂宋均注曰潭無底之澤今浮舟言陰盛之耳論語曰南宮適問於孔子曰羿善射奡盪舟俱不得其死然爾雅曰舫舟也天子造舟諸侯維舟大夫方舟士特舟庶人乘柎郭璞注曰造北舡為橋也維連四舡也方併兩舡也特單舡也柎編木以渡也廣雅曰艦大舡也舫艕舩也蒙衝艑步典切䑦音鉤𦪇音鹿舸古我切共音廷音孟音舟洪舟挺舟猛舟也家語曰舟非水不行水入舟則沒君非民不治民犯上則君危戰國策曰或謂公叔曰乘舟舟漏而不塞則舟沉矣塞漏舟而輕陽侯之波則舟覆矣令公自以辯於薛公而輕秦是漏舟而輕陽侯之波也願公察之帝王世紀曰昭王濟漢舡人惡之以膠舡進王中流膠舡解王沒于水史記曰項羽欲東渡烏江瓚曰牛渚烏江亭長艤舩侍徐廣曰擬音儀駰案應劭曰檥正也孟康曰檥音蟻附也附舩著岸也, WYG: 請賽船合}
