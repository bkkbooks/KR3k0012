  - {type: variant, offset: 12, length: 0, content: '', WYG: 中其船浮者神以為君他姓船不能浮獨廩君船浮因立為君蜀王本記曰秦為大白船萬艘欲攻楚呂氏春秋曰虞姁作舟又曰荆有佽飛者得寳劔渉江中流而有蛟夾繞其船佽飛㧞寳劔赴江刺蛟殺之舟中之人皆活荆王聞之位以執圭又曰楚人有渉江者其劔自舟中墜於水遽契其舟曰是吾劔所從墜也舟止從所契處入求之而舟已行劔不行若此不亦惑乎又曰伍員如吳過於荆至江上欲渉見一丈人刺小船方將漁從而請焉丈人渡之又曰管夷吾百里奚覆王之船驥也絶江者託於船致逺者託於驥淮南子曰湯武聖主也而不與越人乗舲音靈舟而浮於江湖舲舟小船也又曰楚人有乗船而遇大風者投於水非不貪生而畏死也惑於死而反忘生又曰龍船鷁首浮吹以虞此逰於水也於舟中吹􅄜與竽以為樂故曰浮吹以虞衡波傳曰孔子使子貢乆而不來孔子謂弟子占之遇鼎鼎易卦也皆言無足不來顔回掩口而笑子曰回也哂謂賜來也曰無足者乗舟而來至矣子貢果至驗如回言說苑曰梁相死惠子欲之梁渡河而遽墮水中船人救之曰子欲何之而遽也曰梁無相欲徃相之船人曰子居吾船檝之間而溺無我則死矣子何能相梁乎惠子曰居叟船檝之間則不如子至於安國家社稷子比我矇如未視狗耳又曰晋平公使叔向聘吴吴人餙舟以逆之左右各五百人有繡衣豹裘者錦衣狐裘者叔向歸以告平公吴其亡乎潜夫論曰人行之動天地譬車上御駟馬蓬中耀舟雖有覆載猶在我所之蔣子萬機論曰吳日争於五湖用舟檝而相觸怯勇共覆鈍相俱傾顧譚新言曰蓬萬生于泰山之上豫章長于窮藪之中良匠造舟興宮建廟必不取泰山之陋質而棄窮藪之美材明矣又曰奔車失轄泛舟無檝欲以不覆未之有也譙周法訓曰以道為天下者猶乗安舟而由廣路安舟難成可乆處也廣路難至可常行也又曰乗船曲折不失其瀆是善乗舟者袁准正書曰非所事而强學猶以百萬之師積之河濟之中其用舟檝固不如江漢之良杜夷幽求曰輕舟可以救溺濡幕可以濟焚抱朴子曰欲以弊藥必升騰者何異䇿蹇驢而欲尋追風櫂藍舟而欲濟大川語林曰劉道眞遭亂於河側自牽船見一老嫗採桑逆旅劉調之曰女子何不調機刺杼而採桑逆旅女答丈夫何不跨馬揮鞭而牽船乎王子年拾遺記曰周昭王二十四年塗脩國獻青鳳丹鵲各一雌一雄孟夏之時鳳鵲皆脫易毛羽聚鵲翅為扇緝鳳羽以飾車盖扇一名逰飄二名條翮三名虧光四名文影時東甌獻二美女一名延姢二名延娛使此二人更换此扇侍於王側輕風乍至冷然自􅋽昭王淪於江漢二女與乗舟夾擁同没漢水故江漢之民到今異之立祠於江湄數十年間人於江漢之上猶見王與二女乗舟檝於水際至暮春上已之日褉集於祠間或以時鮮甘味採杜蘭之葉以包裹之沉於水中或結五色紗嚢盛食或用金鐡之器並沉於波中人言蛟龍水中一裹之不侵食也其祠號曰招祗之祠又曰軒皇變乗桴以造舟楫水物為之翔踴滄海為之恬波又曰周武王東伐紂夜濟河時雲明如晝八面之旅皆薦賢而歌有大蜂􅃺如舟鳥飛集王舟因以鳥畫幡旗翌日而梟紂名其船曰蜂舟魯哀公二年鄭人擊趙簡子得其蜂旗則其遺類事出太公六韜又曰漢成帝嘗與飛燕汎戲太液池以沙棠為舟貴不沉沒也以雲母飾於鷁首一名雲母舟又刻大桐木為虬龍雕飾如真象以夾雲舟}
