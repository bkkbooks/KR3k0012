  - {type: variant, offset: 1252, length: 225, content: 使宮女乘小舡建以足踏覆宮女溺乍沉乍浮建觀而大笑後漢書曰馬援平南越將樓舡大小二千餘艘士二萬餘人進擊九真賊徵側餘黨都羊等自無功至居風無功居風二縣並屬九真郡斬獲五千餘人嶠南悉平嶠嶺嶠也廣州記曰援到交趾立銅柱為漢之極界又曰第五倫為會稽太守永平五年坐法徵老小攀車叩馬啼呼相隨曰裁行數里不得前倫乃偽止亭舍陰乘舡去眾知復追之及詣廷尉吏人上書守闕者千餘人是時顯宗方按梁松事亦多為松訟者帝患之詔公車諸為梁氏及會稽太守上書者勿復受會帝幸廷尉錄囚徒得免歸田里身自耕種不交通, SBCK: 載六七百}
