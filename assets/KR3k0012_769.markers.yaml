  - {type: variant, offset: 5, length: 2, content: 上釋, WYG: 載以渡之至於鄴穆天子傳曰天子乗鳥舟龍卒浮於大沼沼池龍下有舟字舟皆以龍鳥為形制今吳之青雀舫其遺制也山海經曰大人之國坐而削船世本曰共皷貨狄作舟共皷貨狄黄帝二臣又曰廩君}
