  - {type: variant, offset: 1585, length: 1768, content: 餘丈酈元水經注云湔水出綿道王疊山在今益州湔音子建庭反突壞廬舍所害數千餘人文公遂以占術馳名又曰郭林宗遊洛陽始見河南尹李膺大奇之遂相友善於是名震京師後歸鄉里衣冠諸儒送至河上車數千兩林宗唯與李膺同舟而濟眾賓望之以為神仙焉又曰趙炳嘗臨海求船人不和之和許也俗本作知者誤也炳乃張蓋唑其中長嘯呼風亂流而濟於是百姓神服從者如歸魏志曰尚書僕射杜畿受詔作御樓船於陶河試舡遇風沒文帝為之流涕詔曰昔冥勤其官而水死稷勤百穀而死杜畿忠之至也又曰徐宣遷司隸校尉從至廣陵六軍乘舟風浪暴起帝舡洄倒宣疾在後陵波而前群寮無至者帝壯之又曰郭嘉死太祖征荊州還於巴丘遇疾燒舡歎曰郭奉孝若在不使孤至此奉孝嘉字又曰鄧哀王仲字蒼舒五六歲智若成人孫權曾致巨象太祖欲知其輕重訪之群下咸莫能出其理仲曰量象大舡之上而刻其所至稱物以載之則交可知矣太祖大悅即施行焉魏略曰孫權乘大舡來觀軍公使弓弩亂發箭著其舡舡偏重將覆權因廻舡復以一面受箭箭均船平乃還吳志曰諸葛恪出征東興有虹見其舡又曰吳人以舟楫為興馬以巨海為夷庚也晉書曰陸機初詣張華華問雲何在機曰雲有笑疾未敢自見俄而雲至華為人多髭製好帛繩纏髭雲見而大笑不能自已先是常著縗絰上舡於水中顧見其影因大笑落水人救獲免又曰張憑字長宗祖鎮蒼梧太守憑年數歲鎮謂其父曰我不如汝有佳兒憑曰阿翁詎宜以子戲父耶及長有志氣為鄉閭所稱舉孝廉負其才自謂必參時彥初欲詣劉惔鄉里及同舉者共笑之既至惔處之下座神意不接憑欲自發而無端會王濛就惔清言有所不通憑於末制之言旨深遠足暢彼我之懷一座皆驚惔延之上座清言彌日留宿至旦遣之憑既還舡須臾遣傅教覔張孝廉舡便召與同載遂言之於簡文帝帝召與語歎曰張憑勃窣為理窟官至吏部郎御史中丞又曰王濬徵拜右衛將軍除大司農車騎將軍羊祜雅知濬有奇略乃密表留濬於是重拜益州刺史武帝謀伐吳詔濬修舟艦濬乃作大艦連舡方百二十步受二千餘人以木為城起樓櫓開四門其上皆得馳馬來往又畫鷁首怪獸於舡首以懼江神舟楫之盛自古未有太康元年正月濬自成都率巴東監軍廣武將軍唐彬攻吳丹陽剋之擒其丹陽監盛紀吳人江險磧要害之處並以鐵鎖橫截之又作鐵錐長丈餘暗置江中以逆拒舡先是羊祐獲吳間諜具知情狀濬乃作大筏數十亦方百餘步縛草為人被甲持仗令善水者以筏先行筏既行遇鐵錐軌著筏去又作炬長十餘丈大數十團灌以麻油在舡前遇鏁然炬燒之須臾融液斷絕於是舡無所礙王隱晉書曰陶侃擊蜀賊王真真拘得侃有雀舡侃欲投水都督王榱蘇扶侃入小舡得脫晉中興書曰蘇峻作逆與祖渙許柳等將萬餘人出橫江連舡東渡時遇西風既濟船江中忽更東風吹舡還西岸峻書善憙憙曰是天助我固將志也又曰郭飜武昌人安西將軍庾翼以帝舅之重躬往逼飜欲強起飜曰人性各有所短豈可強逼翼以飜舡俠小欲引就大舡飜曰使君不以民鄙賤而辱臨之此固野人之舟也翼俯屈入其中舡太公六韜曰武王伐殷先出於河呂尚為將以四十七艘舡濟於河又曰天舡一名天撗以濟大水又曰殷君為酒池可遊舡莊子曰顏回問於仲尼曰回嘗濟於觴深之泉津人操舟若神吾問焉操舟可學也曰遊善者數音朔能若乃夫沒人未嘗見舟而便操之吾問焉不吾告敢問何謂也仲尼曰善遊者之數能忘水故也彼視眾泉若陵視舟之覆猶車之卻退也視泉若陵故視舟之覆於淵猶車卻退於岐也又曰藏舟於壑藏山於澤謂之固矣然則夜半有力者負之而走昧者不知也又曰水之積也不厚則其負大舟也無力覆盃水於坳於交切堂之上則芥為之舟置杯焉則膠水淺而舟大也又曰孔子遊乎緇維之林坐杏壇之上有漁父者下舡而來孔子乃下求之至於澤畔有將杖挐而引其舡顧見孔子再拜而起乃刺舡而去延緣葦間顏淵還車了不顧待水波定不聞挐音而後敢乘又曰方舟而濟河有虛舡來觸舟雖有惼心之人終不怒也忽有一人在其上則惡聲隨之向不怒向虛而今實也又曰巧者勞而智者憂無能者無所求也食而遨汎若不係之舟也又曰散木以為舟則沉是不材之木鄧析子曰同舟涉海中流遇風救患若一所憂同也孔藂子曰順謂韓王曰吳越之人同舟濟江中流遇風波其相救如左右手不慎所同之患是不如吳越之舟人也尸子曰六馬登糟丘方舟泛酒池劉析書曰舟行於水車轉於陸此勢自然者也文子曰舟浮江海不為莫乘而沉君子行道不為莫知而止孫卿子曰君者舟也庶人者水也水則載舟水則覆舟墨子曰工倕作舟慎子曰燕鼎之重乎千鈞乘於吳舟則可以濟所託者浮道也又曰行海者生而至越有舟也行陸者立而至秦有車也秦越遠塗也安坐而至者械也韓子曰千鈞得舡則浮錙銖失舡則沉非千鈞輕而錙銖重也有勢之與無勢也又曰奔車之上無仲尼覆舟之下無伯夷號令者國之舟車安則知廉危則爭越也, SBCK: 九}
