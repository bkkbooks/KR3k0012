  - {type: variant, offset: 29, length: 0, content: '', SBCK: 耳目也齊一耳目之視聽使知進退之度人旣專一則勇者不得獨進怯者不得獨退齊之以法教使強弱不得相踰紛紛紜紜間亂而不可亂旌旗亂也示敵若亂以金間之紛紛旌旗像紜紜士卒貌言旌旗翻轉一合一離士卒進退或徃或來視之若擾觀之􅀂亂然其法令素定度幟分明各有分數擾而不亂也渾渾沌沌形圎而不可敗車􅀐齊轉也􅄱圓者出入有道齊整也渾渾車輪轉行沌沌歩騎奔馳視其行陣縱横圓而不方然其指趣各有所應故王子日將欲内明而外暗内理而外軍所以示敵之輕巳者也渾外本切沌徒損切周禮曰太宗伯以軍禮同􅀖國同謂威其不協僣差者軍禮之别五也太師之禮用衆也用其義勇也大均之禮䘏衆也均其地政地守地職之賊所以憂民於蔿終日而畢鞭七人貫三人耳國老皆賀子文蔿賈不賀曰子玉剛而無禮過三百乗其不能以入矣子玉之敗子之舉也舉以敗國將何賀焉又曰苗賁皇徇曰蒐乗􅀘卒秣馬利兵脩陣固列蓐食申禱明日復戰乃逸楚囚又曰宣子曰我若受􅁗則賔也不受㓂也旣不受矣而復緩師􅁗將生心先人有奪人之心軍之善謀也逐㓂如追逃軍之善政也訓卒利兵秣馬蓐食潜師夜起戊子敗􅁗師于令狐至于刳首又曰宣榭火宣榭講武室也論語曰子曰善人教民七年亦可以即戎矣可􅈬兵攻戰也又曰不教民戰是謂弃之後漢書曰靈帝時望氣以爲京師有大兵兩宫血流以爲太公六韜有天子將兵事可以威厭四方帝乃講武於平樂觀下起大壇建五采盖天子擐甲介馬稱無上將軍何進領兵屯於觀下置西園八校尉􅀽紹曹操等爲之唐書曰太宗􅀄即位突厥入㓂欲諸軍皆習􅀐射毎退朝即引諸衞將習射于顯德殿庭謂將軍巳下曰古突厥與中國更有盛衰若軒轅善用五兵即能北逐獯虜周宣驅駕方召亦能}
