  - {type: variant, offset: 30, length: 0, content: '', SBCK: 勝太原下至漢晉之君洎于隋代不使兵士素習干戈突厥來侵莫能抗禦遣中國生民塗炭於㓂手我今不使汝等穿池築苑造諸淫費農民恣令逸樂兵士唯習弓馬若無賊來我則爲汝博士敎汝等武藝優長若有賊來我即爲汝將師領汝􅃲戰亦望使汝等前無横敵於是日引數百人於殿庭敎射太宗親自臨試毎坐或至午時射中者隨賞弓力布帛統帥加上考朝臣咸諌云不冝引卑碎之人挾狐矢於軒陛之側上曰率土之内皆吾臣子我所恨不能將我心遍置人腹中豈有相疑之道哉由是一二年間兵士盡便弓馬又曰李抱真領澤潞觀察留後抱眞密揣山東當有變上黨且當兵衛是時乗戰餘之地土塉賦重人益困無以養軍士乃籍户丁男三選其一有材力者免租傜給弓矢令之曰農之􅂩則分曹角射歳終吾當㑹試及期按簿而徴之都試以示賞罰復命之如􅀄比三年則皆善射抱眞曰軍可用矣於是舉部内之卿得成卒二萬前旣不廪費府庫益實乃繕兵甲爲戰具遂雄視山東是時稱昭義歩兵冠諸軍又曰德宗即位以馬燧爲太原尹北都留守河東節度觀察度支營田使是時承鮑防自百井敗軍之後兵甲寡弱騎士少燧乃悉召將吏牧馬厮役得數千人悉􅀘騎卒教之數月皆爲精􅀐造甲者必令長短三等稱其所衣以便進趨又造戰車以狡猊象刺㦸於後行則載兵甲止則爲營陣或塞險阨以遏奔衝器械無不犀利居一年陳兵三萬開廣場以習戰陣敎其進退古司馬兵法曰凢戰非陣之難使人可陣難非可使陣難使可用難使人盡心效力用必勝}
