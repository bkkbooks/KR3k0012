  - {type: variant, offset: 3700, length: 743, content: 若變易姓名衣服不鮮金鼓不具兵刃不磨器仗不堅矢不著羽弓弩無絃主者吏士法令不從此謂欺軍有此者斬之聞鼓不行叩金不止按旗不伏舉旗不起指麾不隨避前在後縱發亂行折兵弩之勢却退不鬭或左或右扶傷舉死因託歸還此謂背軍有此者斬之出軍行將士卒爭先紛紛擾擾軍騎相連咽塞道路後不得前呼喚喧譁無所聽聞失行亂次兵刃中傷長將不理上下縱橫此謂亂軍有此者斬之屯營所止問其鄉里親近相隨共食相保呼召不得越入他位干誤次第不可呵止度營出入不由門戶不自啟白奸邪所起知者不告罪同一等合人飲食阿私所受大言驚語疑惑吏士此謂誤軍有此者斬之衛公兵法曰古之善為將者必能十卒而殺其三次者十殺其一三者威振於敵國一者令行於三軍是知畏我者不畏敵畏敵者不畏我如曰盡忠益時輕生重節者雖讎必賞犯法怠情敗事貪財者雖親必罰服罪輸情質直敦素者雖重必捨遊辭巧飾虛偽狡詐者雖輕必戮善無微而不贊惡無纖而不貶斯乃勵眾勸功之要術也昔馬謖音縮軍敗葛亮對泣而行誅鄉人盜笠呂蒙先涕而後斬馬逸犯麥曹公割髮而自刑兩掾辭屈黃蓋詰問而俱戮故知威克其愛雖少必濟如愛勝其威雖多必敗蓋賞罰不在重在必行不在數在必當故尉繚子曰吳起與秦人戰戰而未合有一夫不勝勇乃怒而前獲首而返吳起斬之吏曰此壯士也不可斬吳子曰雖壯士不從令者必斬之又曰褰旗斬將陷陳摧鋒上賞破敵所得資物僕馬等並給戰士每收陣之後禆將虞候輩收歛對揔管均分之與敵鬭旗頭被傷救得者重賞漏泄軍事斬之背軍逃走斬之後期斬之有故不坐行列不齊旌旗不正金革不鳴斬之與敵私交通斬之言語書䟽并同或說道釋祈禱鬼神陰陽卜筮災祥訛言以動眾心并與其人往還言議斬之無故驚軍叫呼奔走謬言煙塵斬之凡令覘候或更相推託謬說事宜兼復漏泄者斬之吏士所經歷侵掠者斬之奸人妻女及將婦女入營斬之不戰而降敵沒其家凡有私讎須先言令其避仇若不言因戰陣報復者斬之布陣旗亂吏士驚惶罪在旗頭斬之陣定或輒, SBCK: 方敎}
