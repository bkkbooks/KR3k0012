  - {type: variant, offset: 960, length: 0, content: '', SBCK: 坐而起之行而止之左而右之列而合之絶而解之無犯進止之節無失飲食之冝無絶人馬之力令吏士一人學戰敎成十人十人學戰敎成百人百人學戰敎成千人千人學戰教成萬人萬人學戰教成三軍之衆大戰之法百萬之師故能成大功也衛公兵法曰諸兵士將戰身貌尫弱不勝衣甲又戎具所施理須堅勁須簡取強兵并令試練器仗兵須徹扎䧟堅皆須取甲試令所射然始取中又曰毎營中兩廂置土馬十二疋大小如常馬眞鞍令士卒檈甲胄櫜弓矢櫜音髙佩刀劒持矛楯左右上下以便習其事又敎旗法曰凢教旗於平原曠野登髙逺視處大將居其上南向左右各置鼓一十二靣角一十二具左右各樹五色旗六纛居前列旗節次之左右衙官駐隊如偃月形爲後􅀐下臨平野使士卒目見旌旗耳聞鼓角心存號令乃命諸將分爲左右皆去兵刃精新甲胄幡幟分爲左右廂各以兵馬使爲長班布其次陣間容陣隊間容隊曲間容曲以長叅短以短叅長迴軍轉陣以後爲前以前爲後進無奔迸退無趨走以正合以竒勝聽音覩麾乍合乍離}
