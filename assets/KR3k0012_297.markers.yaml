  - {type: variant, offset: 2385, length: 4, content: 德宗幸奉, WYG: 闔閭試其民於五湖劒皆加於肩地流血幾不可止勾踐試其民於寢宮民争入火死者千餘遽擊金而退之賞罰充實也鄴城故事曰凌霄觀按石季龍永和三年命其子石宣祈于山川因而遊獵乗大輅羽葆華蓋建}
