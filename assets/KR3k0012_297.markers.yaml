  - {type: variant, offset: 1649, length: 1, content: 案, SBCK: 廂陣前毎旗命壯勇士五十人守旗選壯勇士五十人奪旗左廂奪右廂右廂奪左廂鼓音動而奪角音動而止得旗者勝失旗者負勝賞而􅀒罰離合之􅀔聚散之形勝負之理賞罰之信因是而敎之太白隂經曰春秋末並爲戰􅀦増講武之禮}
  - {type: variant, offset: 1649, length: 6, content: 案以從事吳志, WYG: 廂陣前毎旗命壯勇士五十人守旗選壯勇五十人奪旗左廂奪右右廂奪左鼔音動而奪角音動而止得旗者勝失旗者負勝賞而負罸離合之勢聚散之形勝負之理賞罰之信因是而教之太白隂經}
  - {type: page-break, offset: 1649, content: '', id: KR3k0012_WYG_297-8b, image: WYG0895/WYG0895-0586b.png}
  - {type: variant, offset: 1649, length: 1, content: 案, krp: 廂陣前毎旗命壯勇士五十人守旗選壯勇士五十人奪旗左廂奪右廂右廂奪左廂鼓音動而奪角音動而止得旗者勝失旗者負勝賞而負罰離合之勢聚散之形勝負之理賞罰之信因是而敎之太白隂經曰春秋末並爲戰國増講武之禮}
  - {type: variant, offset: 1651, length: 0, content: '', SBCK: 爲戲樂以相誇視而􅁗更名爲角抵故􅀦雖大好戰必亡天下雖平亡戰必危天下旣平春蒐秋獮振旅理兵所以不忘戰今邊軍更名曰敎旗使士卒識金鼓别旗幟任行列知部分一軍之節制也又曰古之諸侯畋獵者爲田除害也上所以供承宗廟下所以閑習武事太古之時人食禽獸之肉坐其皮後代之人浸多時禽獸寡少衣食不足於是神農敎其植榖導以紡績自是之後禽獸復􅄹山林下平土害禾稼爲人所害於是王公秋冬無事畋獵閑習兵革奮揚威武以戒非常李冬之月獵日隂用事萬物畢成蟄虫巳伏乃具卒乗}
  - {type: page-break, offset: 1651, content: '', id: KR3k0012_SBCK_297-5a}
  - {type: variant, offset: 1651, length: 0, content: '', krp: 爲戲樂以相誇視而秦更名爲角抵故國雖大好戰必亡天下雖平亡戰必危天下旣平春蒐秋獮振旅理兵所以不忘戰今邊軍更名曰敎旗使士卒識金鼓别旗幟任行列知部分一軍之節制也又曰古之諸侯畋獵者爲田除害也上所以供承宗廟下所以閑習武事太古之時人食禽獸之肉坐其皮後代之人浸多時禽獸寡少衣食不足於是神農敎其植榖導以紡績自是之後禽獸復盈山林下平土害禾稼爲人所害於是王公秋冬無事畋獵閑習兵革奮揚威武以戒非常李冬之月獵日隂用事萬物畢成蟄虫巳伏乃具卒乗}
  - {type: variant, offset: 1652, length: 3, content: 事吳志, SBCK: 禽于山澤以教部伍分進退之儀一人守圍地三尺十二時守三萬六千尺積尺得六千歩積歩得一十五里餘六十歩圍中徑闊得地五里餘二十歩以左右決勝將爲交頭其决勝左右將各主士仵爲行列皆以金鼓旌旗爲節制其􅀄起圍張翼隨山林地勢無逺近部分其合圍地虞候先擇定訖以善弧矢者爲圍中􅀐其歩卒槍旗幡守圍有漏禽獸坐守圍吏如大獸公之小獸私之以觀進止管子}
  - {type: page-break, offset: 1652, content: '', id: KR3k0012_SBCK_297-5b}
  - {type: variant, offset: 1652, length: 3, content: 事吳志, krp: 禽于山澤以教部伍分進退之儀一人守圍地三尺十二時守三萬六千尺積尺得六千歩積歩得一十五里餘六十歩圍中徑闊得地五里餘二十歩以左右決勝將爲交頭其决勝左右將各主士仵爲行列皆以金鼓旌旗爲節制其𥘉起圍張翼隨山林地勢無逺近部分其合圍地虞候先擇定訖以善弧矢者爲圍中騎其歩卒槍旗幡守圍有漏禽獸坐守圍吏如大獸公之小獸私之以觀進止管子}
