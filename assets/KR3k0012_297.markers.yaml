  - {type: variant, offset: 1714, length: 1, content: 犯, WYG: 戲樂以相誇視而秦更名為角抵故國雖大好戰必亡天下雖平忘戰必危天下既平春蒐秋獮振旅理兵所以不忘戰今邊}
  - {type: variant, offset: 1716, length: 0, content: '', WYG: 更名曰教旗使士卒識金鼔别旗幟任行列知部分一軍之節制也又曰古之諸侯畋獵者為田除害也上所以供承宗廟下所以嫻習武事太古之時人食禽獸之肉坐其皮後代之人浸多時禽獸寡少衣食不足於是神農教其植穀導以紡績自是之後禽獸復盈山林下平土害禾稼為人所害於是王公秋冬無事畋獵嫻習兵革奮揚威武以戒非常季冬之月臘日隂用事萬物畢成蟄蟲已伏乃具卒乗從禽於山澤以教部分進退之儀一人守圍地三尺十二時守三萬六千尺積尺得六千部積部得十五里餘六十部圍中徑闊得地五里餘二十部以左右决勝將軍為交頭其决勝左右將各主士仵為行列皆以金鼔旌旗為節制其初起圍張翼随山林地勢無近逺部分其合圍地虞候先擇定訖以善弧矢者為圍中騎其歩卒搶旗幡守圍者漏禽獸坐守圍之吏大獸公之小獸私之以觀進止管子曰凉風至而白露下天子命左右司馬}
