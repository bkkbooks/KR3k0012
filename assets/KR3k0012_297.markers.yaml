  - {type: variant, offset: 4457, length: 274, content: 之行便斬之或有弓弩已注失而廻顧者或干行失位者後行斬之前行不動行斬干失之行守圍不固一火及主吏並斬之遇敵攻圍危急若前後左右部隊不救致陷者全部隊皆斬之設奇伏掩襲務應機速捷前將先合後將即副進退應接乖者並斬之為敵所乘失旗鼓節鉞罪全陣斬之戰敵旗頭被敵殺爭得屍首免坐不得者一旗並斬之凡戰敵失主將隨從者皆斬之一將禦敵裨將已下等羗主率不齊力同戰更相救助者任便斬之吏士雖破敵濫行戮殺發冢焚廬踐稼穡伐樹木者斬之禽獲敵人或有來降者直領見揔帥不得輒訪問敵中事若違因而漏泄者斬之破敵先虜掠者斬之入敵境同凡隱欺破虜所收獲及吏士身死有欺隱其資物兼違令不收恤者斬之違揔率一時之令斬之, SBCK: 御覽卷第二百九十七}
