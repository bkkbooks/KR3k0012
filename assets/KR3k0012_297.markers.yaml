  - {type: variant, offset: 29, length: 0, content: '', WYG: 耳目也人既專一則勇者不得獨進怯者不得獨退紛紛紜紜間亂而不可亂旌旗亂也示敵若亂以金間之紛紛旌旗翻轉一合一離士卒進退或徃或來視之若擾觀之若亂然其法令素定度職分明各有分數擾而不亂也渾渾沌沌形圓而不可敗車騎齊轉也形圓者出入有道齊整也渾渾車輪轉行沌沌歩騎奔馳視其形陣縱横圓而不方然其指趣各有所應故王子曰將欲内明而外暗内理而外渾示敵之輕已者也渾音分本切沌從損切周禮曰大宗伯以軍禮同邦國同謂威其不協僣差者軍禮之别有五大師之禮用衆也用其義勇也大均之禮恤衆也均其地政地守地職之賦所以憂民也大田之禮簡衆也古者因田習兵閱其車徒之數也大役之禮任衆也築宫邑所以事民力强弱也大封之禮合衆也正封疆溝洫之固所以合聚其民也又曰夏官大司馬之職掌中春教振旅司馬以旗致民平列陳如戰之陳以教坐作進退疾徐疏數之節遂以蒐田中夏教茇舎如振旅羣吏撰車徒遂以苗田中秋教治兵如振旅辨旗物之用遂以獮田中冬教大閱前期羣吏聽􅊎於陳前斬牲以左右徇陳曰不用命者斬之遂以狩田師以救無辜伐有罪若師有功則左執律右秉鉞以先愷樂獻於社左傳曰春蒐夏苗秋獮冬狩皆於農隙以講事也三年而治兵入而振旅歸而飲至以數軍實昭文章明貴賤辨等列順少長習威儀也又曰楚子文治兵於暌終朝而畢不戮一人子玉復治兵於蒍終日而畢鞭七人貫三人耳國老皆賀子文蒍賈不賀曰子玉剛而無禮過三百乗其不能以入矣子玉之敗子之舉也舉以敗國將何賀焉又曰苗賁皇徇曰蒐乗補卒秣馬利兵修陣固列蓐食申禱明日復戰乃逸楚囚又曰宣子曰我若受秦則賔也不受冦也既不受矣而復緩師秦將生心先人有奪人之心軍之善謀也逐冦如追逃軍之善政也訓卒利兵秣馬蓐食潜師夜起戊子敗秦師於令狐至於刳首又曰宣榭火宣榭講武室也論語曰子曰善人教民七年亦可以即戎矣可就兵攻戰也又曰以不教民戰是謂棄之後漢書曰靈帝時望氣以為京師有大兵兩宮流血大將軍司馬許涼假司馬伍宕說何進曰太公六韜有天子將兵事可以威四方進以為然入言之于帝于是講武於平樂觀下起大壇建十二重五采華蓋帝躬擐甲介馬稱無上將軍使進領兵屯於觀下置西園八校尉袁紹曹操等為之唐書曰太宗初即位突厥入冦欲諸軍皆習騎射毎退即引諸衛將習射於顯徳殿庭謂將軍已下曰古突厥與中國更有盛衰若軒轅善用五兵即能北逐獯虜周宣驅駕方召亦能}
