  - {type: variant, offset: 268, length: 687, content: 魴張老止之公讀其書曰君乏使使臣斯司馬斯此臣聞師眾以順為武順莫敢違軍事有死無犯為敬守官行法雖死不敢有違君合諸侯臣敢不敬君師不武執事不敬罪莫大焉臣懼其死以及楊干無所逃罪懼自犯不武不敬不能致訓至於用鉞用鉞斬楊干之僕臣之罪重敢有不從以怒君心言不敢不從戮也請歸死於司寇致尸於司寇使戮也公跣而出曰寡人之言親愛也吾子之討軍禮也寡人有弟不能教訓使干大命寡人之過也子無重寡人之過聽絳死為重過敢以為請請使無死晉侯以魏絳為能以刑佐民矣反役與之禮食使佐新軍令欲顯絳故特為設禮食史記曰齊景公時晉伐阿鄄阿今濟陽郡東阿縣鄄音絹今濮陽郡鄄城縣而燕侵河上齊師敗績嬰乃薦司馬穰苴文能附眾武能威敵齊景公召穰苴與語兵事大說之以為將軍將兵扞燕晉之師穰苴曰臣素卑賤君擢之閭伍之中加之大夫之上士卒未附百姓弗信人微權輕願得君之寵臣國之所尊者以監軍乃可於是景公許之使莊賈往穰苴既辭與賈約曰旦日日中會於軍門穰苴先馳至軍立表下漏待賈賈素驕貴不甚急親戚送之留飲日中而賈不至苴仆表決漏入行軍勒兵申明約束約束既定夕時莊賈至穰苴曰何後期為賈謝曰不佞大夫親戚送之故留穰苴曰將受命之日則忘其家臨軍約束則忘其親援桴鼓之急則忘其身今敵國深侵邦內騷動士卒暴露於境君不安席百姓之命皆懸於君何謂相送乎召軍正問曰軍法後期者云何對曰當斬遂斬莊賈以徇三軍三軍之士皆震慓燕晉之師聞之悉引而歸皆復所侵之地又曰孫武以兵法見於吳王闔閭闔閭曰子之十三篇吾盡觀之可以小試勒兵乎對曰可闔閭曰可試以婦人乎曰可於是許之出宮中美人得百八十人孫子分為二隊以王之寵姬二人各為隊長皆令持戟令曰汝知而心與左右手背乎婦人曰知武曰前則視心左視左手右視右手後即視背婦人曰諾約束既畢乃設鈇鉞即, WYG: ''}
