  - {type: variant, offset: 2799, length: 313, content: 麟遊諸鎮兵討闢時宿將專征者甚眾人人自謂當選及詔出大驚崇文在長武練卒五千常若寇至及是中使至長武卯時宣命而辰時出師五千器用無闕者軍至興元軍中有折逆旅之匕箸者斬之以徇從閬中入遂却劍門之師解梓潼之圍又曰高崇文平劉闢王師入成都介士屯于大造軍令嚴肅珍貨山積巿井不移無秋毫之犯又曰郗士美為昭義節度使朝廷討王承宗士美遣兵馬使王獻領卒一萬為前鋒獻兇惡恃亂逗撓不進遽令召至數其罪斬之下令曰敢後出者斬士美親鼓之兵既合而賊軍大敗下三營環柏鄉屢以捷聞上大悅曰吾固知士美之能辦吾事于時四面七八鎮兵共十餘萬以環鎮冀未有首功多犯法士美兵士勇敢畏法聲甚振承宗大懼指期有破亡之勢會詔班師至今兩河間稱之又曰李師道攻徐徐將王智興敗賊壁獲美妾智興懼軍士爭之乃曰軍中有女, SBCK: ''}
