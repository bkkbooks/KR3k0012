  - {type: variant, offset: 1065, length: 581, content: 姬食不甘味願勿斬也武曰臣已受命為將將在軍君命有所不受遂斬隊長二人以徇用其次為隊長於是復鼓之婦人左右前後跪起皆中規矩繩墨無敢出聲者於是武使使報王曰兵既整齊王可試下觀之唯王所欲用之雖赴水火猶可也吳王曰將軍罷休就舍寡人不願下觀武曰王徒好其言不能用其實於是闔閭知孫子能用兵卒以為將西破彊楚入郢北威齊晉又曰文帝立後六年匈奴大入邊乃以宗正劉禮為將軍軍灞上祝茲侯徐厲為將軍軍棘門以河內守周亞夫為將軍軍細柳以備胡上自勞軍至灞上棘門直馳入將軍下騎送迎已而之細柳軍士吏被甲銳兵刃彀弓弩持滿天子先驅至不得入先驅曰天子且至軍門都尉曰軍中但聞將軍令不聞天子詔居無何上至又不得入於是上乃使持節詔將軍吾欲入勞軍亞夫乃傳言開壁門士吏謂從車騎曰將軍約束軍中不得驅馳於是天子乃案轡徐行至軍中營將軍亞夫持兵揖曰介冑之士不拜請以軍禮見應劭曰禮介者不拜也天子為動容軾車使人稱皇帝敬勞將軍成禮而去既出軍門群臣皆驚文帝曰嗟乎此真將軍矣曩者灞上棘門軍若兒戲耳其將固可襲而虜也至於亞夫可得而犯耶稱善者久之後漢書曰祭遵從征河北為軍市令舍中兒犯法遵格殺之光武怒命收遵時主簿陳副諫曰明公常欲眾軍整齊今遵奉法不避是教令所行也光武乃貰之貰猶赦也以為刺奸將軍謂諸將曰當備祭遵吾舍中兒犯法尚殺之必不私諸卿謝承後漢書曰張溫以司空加車騎將軍征韓遂丙辰引溫見於崇德殿溫以軍禮長揖不拜魏志曰曹仁字子孝少時不修行檢及長為將嚴整奉法常置科, WYG: 口各樹}
