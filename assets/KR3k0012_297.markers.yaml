  - {type: variant, offset: 2777, length: 94, content: 兼御史大夫充左神策行營節度使兼統左右神策奉天麟遊諸鎮兵討闢時宿將專征者甚眾人人自謂當選及詔出大驚崇文在長武練卒五千常若寇至及是中使至長武卯時宣命而辰時出師五千器用無闕者軍至興元軍中有折逆旅, WYG: 曰示攻戰進取}
  - {type: variant, offset: 2777, length: 94, content: 兼御史大夫充左神策行營節度使兼統左右神策奉天麟遊諸鎮兵討闢時宿將專征者甚眾人人自謂當選及詔出大驚崇文在長武練卒五千常若寇至及是中使至長武卯時宣命而辰時出師五千器用無闕者軍至興元軍中有折逆旅, krp: 曰示攻戰進取}
