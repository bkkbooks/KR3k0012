  - {type: variant, offset: 2477, length: 236, content: 復以數騎入德信軍中撫勞軍士無敢動者晟既并德信軍軍益振又曰李晟收復都城朱泚乃與妻子及姚令言張芝等數千騎西走涇原餘兵麋散晟乃入抵丹鳳門舍軍於外朝晟處於右金吾仗舍下令曰軍中五日不得通家問違者斬之遣京兆尹李齊運告諭於眾百姓安堵秋毫無犯尚可孤軍人有擅取馬者晟大將高明曜虜賊女妓一人司馬伷音冑取賊馬二疋晟立斬之軍士皆脅息莫敢仰視翌日晟以露布聞上覽之感泣百官皆出涕因上壽稱萬歲曰李晟虔奉聖謨盪滌凶慝然古之樹勳力復都邑者往往有之至於不驚宗廟不易市肆長安人不識旗鼓安堵如初三代已來未之有也上, WYG: ''}
