  - {type: variant, offset: 2872, length: 1571, content: 匕箸者斬之以徇從閬中入遂却劍門之師解梓潼之圍又曰高崇文平劉闢王師入成都介士屯于大造軍令嚴肅珍貨山積巿井不移無秋毫之犯又曰郗士美為昭義節度使朝廷討王承宗士美遣兵馬使王獻領卒一萬為前鋒獻兇惡恃亂逗撓不進遽令召至數其罪斬之下令曰敢後出者斬士美親鼓之兵既合而賊軍大敗下三營環柏鄉屢以捷聞上大悅曰吾固知士美之能辦吾事于時四面七八鎮兵共十餘萬以環鎮冀未有首功多犯法士美兵士勇敢畏法聲甚振承宗大懼指期有破亡之勢會詔班師至今兩河間稱之又曰李師道攻徐徐將王智興敗賊壁獲美妾智興懼軍士爭之乃曰軍中有女子安得不敗此雖無罪違軍法也即斬之以徇韓子曰吳起為魏武侯西河之守奏有小亭臨境吳起欲攻之乃倚車轅於北門外而令之曰有能徙此南門之外賜之上田上宅民莫之徙也或有徙之者遂賜之如令俄又置一石赤黍於東門之外而令之曰有能徙之於西門之外者賜之如初民則爭徙之乃下令曰明日攻亭有能先登者仕之國大夫賜之上田上宅民爭上於是攻亭一朝而拔之尉繚子曰古之善用兵者能殺卒之半其次殺其十三其下殺其十一殺其半者威立海內殺其十三者力加諸侯殺其十一者令行士卒故曰百萬之眾不鬭不如萬人之尸萬人不死不如百人之賊賞明如日月信比如四時令嚴如斧鉞而出卒有不死者未嘗聞也六韜曰武王問將何為威太公曰殺一人萬人懼者宜殺之殺一人三軍不知雖多殺其將不重也淮南子曰勾踐決一獄不辜援龍淵而切其股血流至足故戰武士必死魏武軍令曰兵欲作陣對敵營先白表乃引兵就表而陣皆無讙譁明聽鼓音旗幡麾前則前麾後則後麾左則左麾右則右不聞令而擅前後左右者斬伍中有不進者伍長殺之伍長不進什長殺之什長不進都伯殺之督戰部曲將拔刃在後察違令不進者斬之一部受敵餘部有不進救者斬之武侯兵法曰軍有七禁一曰輕二曰慢三曰盜四曰欺五曰背六曰亂七曰誤此治軍之禁也若朝會不到聞鼓不行乘寬自留廻避務止初近而後遠喚名而不應軍甲不具兵器不備此謂輕軍有此者斬之受令不傳傳之不審以惑吏士金鼓不聞旌旗不覩此謂慢軍有此者斬之食不廩糧軍不部兵賦賜不均阿私所親取非其物借貸不還奪人頭首以獲功名此謂盜軍有此者斬之若變易姓名衣服不鮮金鼓不具兵刃不磨器仗不堅矢不著羽弓弩無絃主者吏士法令不從此謂欺軍有此者斬之聞鼓不行叩金不止按旗不伏舉旗不起指麾不隨避前在後縱發亂行折兵弩之勢却退不鬭或左或右扶傷舉死因託歸還此謂背軍有此者斬之出軍行將士卒爭先紛紛擾擾軍騎相連咽塞道路後不得前呼喚喧譁無所聽聞失行亂次兵刃中傷長將不理上下縱橫此謂亂軍有此者斬之屯營所止問其鄉里親近相隨共食相保呼召不得越入他位干誤次第不可呵止度營出入不由門戶不自啟白奸邪所起知者不告罪同一等合人飲食阿私所受大言驚語疑惑吏士此謂誤軍有此者斬之衛公兵法曰古之善為將者必能十卒而殺其三次者十殺其一三者威振於敵國一者令行於三軍是知畏我者不畏敵畏敵者不畏我如曰盡忠益時輕生重節者雖讎必賞犯法怠情敗事貪財者雖親必罰服罪輸情質直敦素者雖重必捨遊辭巧飾虛偽狡詐者雖輕必戮善無微而不贊惡無纖而不貶斯乃勵眾勸功之要術也昔馬謖音縮軍敗葛亮對泣而行誅鄉人盜笠呂蒙先涕而後斬馬逸犯麥曹公割髮而自刑兩掾辭屈黃蓋詰問而俱戮故知威克其愛雖少必濟如愛勝其威雖多必敗蓋賞罰不在重在必行不在數在必當故尉繚子曰吳起與秦人戰戰而未合有一夫不勝勇乃怒而前獲首而返吳起斬之吏曰此壯士也不可斬吳子曰雖壯士不從令者必斬之又曰褰旗斬將陷陳摧鋒上賞破敵所得資物僕馬等並給戰士每收陣之後禆將虞候輩收歛對揔管均分之與敵鬭旗頭被傷救得者重賞漏泄軍事斬之背軍逃走斬之後期斬之有故不坐行列不齊旌旗不正金革不鳴斬之與敵私交通斬之言語書䟽并同或說道釋祈禱鬼神陰陽卜筮災祥訛言以動眾心并與其人往還言議斬之無故驚軍叫呼奔走謬言煙塵斬之凡令覘候或更相推託謬說事宜兼復漏泄者斬之吏士所經歷侵掠者斬之奸人妻女及將婦女入營斬之不戰而降敵沒其家凡有私讎須先言令其避仇若不言因戰陣報復者斬之布陣旗亂吏士驚惶罪在旗頭斬之陣定或輒, WYG: 方教}
