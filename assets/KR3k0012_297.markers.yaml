  - {type: variant, offset: 1936, length: 231, content: 特原之休乃奉詔帝謂司徒馮誕曰大司馬嚴而執法諸君不可不慎於是六軍肅然唐書曰闞稜容貌魁岸勇而多力每臨陣手持大刀長一丈一舉輒斃數人前無當者及杜伏威據有江淮之地兵皆出自群賊類多放縱有相侵奪者稜必殺之雖親故無所捨令行禁止路不拾遣後從伏威入朝拜左領軍將軍輔公祏之反也稜從軍討之及與陳正通相遇方接戰稜脫兜鍪謂賊眾曰汝不識我邪何敢來戰其眾多稜舊之所部由是各無鬭志或有遙拜者賊師遂潰又曰竇軌初入蜀將其甥從軍以為心腹嘗夜出呼之不以時至因斬之將吏重足而立見之者莫不股慓又曰哥舒翰好讀左, SBCK: 用矣吕}
