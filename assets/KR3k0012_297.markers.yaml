  - {type: variant, offset: 3113, length: 533, content: 安得不敗此雖無罪違軍法也即斬之以徇韓子曰吳起為魏武侯西河之守奏有小亭臨境吳起欲攻之乃倚車轅於北門外而令之曰有能徙此南門之外賜之上田上宅民莫之徙也或有徙之者遂賜之如令俄又置一石赤黍於東門之外而令之曰有能徙之於西門之外者賜之如初民則爭徙之乃下令曰明日攻亭有能先登者仕之國大夫賜之上田上宅民爭上於是攻亭一朝而拔之尉繚子曰古之善用兵者能殺卒之半其次殺其十三其下殺其十一殺其半者威立海內殺其十三者力加諸侯殺其十一者令行士卒故曰百萬之眾不鬭不如萬人之尸萬人不死不如百人之賊賞明如日月信比如四時令嚴如斧鉞而出卒有不死者未嘗聞也六韜曰武王問將何為威太公曰殺一人萬人懼者宜殺之殺一人三軍不知雖多殺其將不重也淮南子曰勾踐決一獄不辜援龍淵而切其股血流至足故戰武士必死魏武軍令曰兵欲作陣對敵營先白表乃引兵就表而陣皆無讙譁明聽鼓音旗幡麾前則前麾後則後麾左則左麾右則右不聞令而擅前後左右者斬伍中有不進者伍長殺之伍長不進什長殺之什長不進都伯殺之督戰部曲將拔刃在後察違令不進者斬之一部受敵餘部有不進救者斬之武侯兵法曰軍有七禁一曰輕二曰慢三曰盜四曰欺五曰背六曰亂七曰誤此治軍之禁也若朝會不到聞鼓不行乘寬自留廻避務止初近而後遠喚名而不應軍甲不具兵器不備此謂輕軍有此者斬之受令不傳傳之不審以惑吏士金鼓不聞, SBCK: ''}
