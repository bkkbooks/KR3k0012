  - {type: variant, offset: 45, length: 2, content: 蒲萄, WYG: 其一種枝皮葉皆如栗其子小形似杼子味亦如栗所謂樹之榛栗者也其一種枝莖如木蓼生髙丈餘作胡桃味遼代上黨皆饒周禮天官下籩人職曰饋食之籩其實榛禮記曲禮下曰婦人之贄椇榛􅀥栗説文曰榛似梓實如小栗山海經曰上申之山下多榛楉任昉述異記曰漢末楊氏家園中産神榛二株張衡七辯曰寒梨乾榛柚爾雅曰柚條也尚書禹貢曰揚州厥苞橘柚周書曰秋食橘柚毛詩秦車轔曰終南何有有條有梅列子曰呉越之間有木焉其名柚碧樹而冬青實丹而味酸度淮北而化為枳焉莊子曰三王五帝之禮義法度辟猶柤梨柚橘其味相反而皆適於口淮南子曰天之所覆地之所載皆生於一父母故槐榆與橘柚合而為兄弟吕氏春秋曰果之羙者雲夢之柚山海經曰洞庭之山綸山銅山賈超之山其木多柚郭氏注曰柚似橘而大鹽鐡論御史曰孝武皇帝平百越以為園圃臣庻皆厭橘柚崔實政論曰橘柚之貢堯舜所不常御裴淵廣州記曰别有柚號為雷柚實大如升廣志曰成都有柚大如升慱物志曰橘柚類多豫章郡出真者風土記曰柚大橘也赤黄酢也神異記曰東方見春山外多柚異苑曰南康歸羙山石城内有丼橘柚楚辭曰斬伐橘柚列樹苦桃楚辭曰雜橘柚以為圃兮列辛夷與椒㯽司馬相如子虛賦曰橘柚芬芳古詩曰橘柚垂華實乃在深山側聞君好我丼竊獨自雕餙揚雄揚州牧箴曰彭蠡既瀦陽鳥攸處橘柚羽貝瑶琨篠簜崔琦七蠲曰于期江南實産橘柚紫葉𤣥實緑裏朱莖郭璞讃曰屈生嘉歎以為羙談椵爾雅曰櫠椵也椹毛詩駉頌泮宫曰翩彼飛鴞集于泮林食我桑椹懐我好音後}
