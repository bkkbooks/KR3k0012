  - {type: variant, offset: 948, length: 133, content: 華林園蒲萄百七八十株秦州記曰秦野多蒲萄本草經曰蒲萄生五原隴西燉煌益氣強志令人肥健延年輕身王逸荔支賦曰西旅獻崑山之蒲萄鍾會蒲萄賦曰余植蒲萄於堂前嘉而賦之命荀勗並作應禎蒲萄賦曰結繁子之礧落兮英籠總而彌房傳玄蒲萄賦曰踰龍堆之險越懸度之阻涉乎三光之阪歷乎身熱之野橄欖金樓子曰, SBCK: 桑上}
  - {type: variant, offset: 948, length: 394, content: 華林園蒲萄百七八十株秦州記曰秦野多蒲萄本草經曰蒲萄生五原隴西燉煌益氣強志令人肥健延年輕身王逸荔支賦曰西旅獻崑山之蒲萄鍾會蒲萄賦曰余植蒲萄於堂前嘉而賦之命荀勗並作應禎蒲萄賦曰結繁子之礧落兮英籠總而彌房傳玄蒲萄賦曰踰龍堆之險越懸度之阻涉乎三光之阪歷乎身熱之野橄欖金樓子曰有樹名獨分為二枝其東向一枝是木威樹南向一枝是橄欖樹南越志曰博羅縣有合成樹十圍去地二丈分為三衢東向一衢木葉似練子如橄欖而硬削去皮南人以為糝南向一衢橄欖西向一衢橄欖裴淵廣州記曰橄欖澀酒廣志曰橄欖大如鷄子交州以飲酒南州草木狀曰橄子大如棗二月華八九月熟生食味酢蜜藏乃甜美交阯武平興古九真有之臨海異物志曰餘甘子梭形初入口舌澀酸飲水乃甘又如梅實核兩頭銳呼為餘甘橄欖同一物異名耳嶺表錄異曰橄欖樹身聳枝皆高數尺其子深秋方熟閩中尤重味云咀之香口勝含鷄舌香生喫及煮飲悉解酒毒有野生者子繁樹峻不可梯緣但刻其根下方寸許內鹽於其中一夕子皆自落樹枝節, WYG: 桑}
