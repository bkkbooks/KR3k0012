  - {type: variant, offset: 8, length: 0, content: '', SBCK: 龍眼樹髙五六丈似荔支而小廣州記曰龍眼子似荔支七月熟吴氏本草曰龍眼一名比目嶺表録異曰龍眼子樹如荔支葉小殻青黄色形圎如彈丸}
  - {type: page-break, offset: 8, content: '', id: KR3k0012_SBCK_973-1b}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 龍眼樹高五六丈似荔支而小廣州記曰龍眼子似荔支七月熟呉氏本草曰龍眼一名比目嶺表録異曰龍眼之樹如荔枝葉小殻青黄色形圓如彈丸}
  - {type: variant, offset: 8, length: 0, content: '', krp: 龍眼樹髙五六丈似荔支而小廣州記曰龍眼子似荔支七月熟吴氏本草曰龍眼一名比目嶺表録異曰龍眼子樹如荔支葉小殻青黄色形圎如彈丸}
  - {type: variant, offset: 9, length: 1, content: 宛, SBCK: 核如木槵子而不堅肉白蔕漿其甘如􅁡一朶􅁪三二十顆荔支方過龍眼即熟南人謂之荔支奴}
  - {type: variant, offset: 9, length: 1, content: 宛, WYG: 核如木槵子而不堅肉白帶漿其甘如蜜一朶恒三二十顆荔枝方過龍眼即熟南人謂之荔枝奴}
  - {type: variant, offset: 9, length: 1, content: 宛, krp: 核如木槵子而不堅肉白蔕漿其甘如蜜一朶恒三二十顆荔支方過龍眼即熟南人謂之荔支奴}
  - {type: variant, offset: 11, length: 3, content: 蒲萄為, SBCK: 其常隨後也左思蜀都賦曰傍挺龍眼側生荔支榠樝齊書曰武帝幸丹陽郡宴飲郅撝恃舊}
  - {type: variant, offset: 11, length: 2, content: 蒲萄, WYG: 其常隨後也左思蜀都賦曰傍挺龍眼側生荔枝榠樝南史曰武帝幸丹陽郡宴飲到撝恃舊酒後狎侮同列時王敬則執榠樝以刀子削之謂曰此非元徽頭何事自吃之}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_WYG_973-2b, image: WYG0901/WYG0901-0555b.png}
  - {type: variant, offset: 11, length: 3, content: 蒲萄為, krp: 其常隨後也左思蜀都賦曰傍挺龍眼側生荔支榠樝齊書曰武帝幸丹陽郡宴飲郅撝恃舊}
  - {type: variant, offset: 14, length: 7, content: 酒富人藏酒至萬, WYG: 左丞庾杲之所糺以贖論廣志曰椬櫨其子甚酢出西方}
  - {type: punctuation, offset: 15, content: 。, id: KR3k0012_CHANT_973-bkkpn5}
  - {type: 'tls:seg', offset: 15, content: '', id: KR3k0012_CHANT_973-1a.5}
  - {type: variant, offset: 15, length: 6, content: 富人藏酒至萬, SBCK: 後狎侮同列時王敬則執榠樝以刀子削之謂曰此非元徽頭何事自喫之爲左丞􅁃果之所糺以贖論廣志曰樝其子甚酢出西方}
  - {type: variant, offset: 15, length: 6, content: 富人藏酒至萬, krp: 後狎侮同列時王敬則執榠樝以刀子削之謂曰此非元徽頭何事自喫之爲左丞庾果之所糺以贖論廣志曰樝其子甚酢出西方}
  - {type: variant, offset: 22, length: 8, content: 石久者數十歲不敗, SBCK: 甘吴録地理志曰髙涼安寜縣有餘甘􅀄食之味苦後口中更甘臨海異物志曰餘甘子如梭形出􅀳安候官界中餘甘橄㰖同一果耳雲南記曰瀘水南岸有餘甘子樹子如彈丸許色微黄味酸苦核有五稜其樹枝如柘枝葉如小夜合葉陳祁暢異物志曰餘甘大小如彈丸大視之理如定陶􅀲片􅀄入口如苦忽咽口中乃更甜羙塩而蒸之尤羙可多食之朱崖故事曰朱崖果有餘甘左思吴都賦曰其果則丹橘餘甘荔支之林蒟子}
  - {type: page-break, offset: 22, content: '', id: KR3k0012_SBCK_973-2a}
  - {type: variant, offset: 22, length: 8, content: 石久者數十歲不敗, WYG: 甘呉録地理志曰髙凉安寜縣有餘丼初食之味苦後口中更丼臨海異物志曰餘丼子如梭形出晉安侯官界中餘丼橄㰖同一果耳雲南記曰瀘水南岸有餘丼子樹子如彈丸許色微黄味酸苦核有五棱其樹枝如柘枝葉如小夜合葉陳祈暢異物志曰餘丼大小如彈丸大視之理如定陶𤓰片初入口如苦忽咽口中乃更丼羙鹽而蒸之尤羙可多食之朱崖故事曰朱崖果有餘丼左思呉都賦曰其果則丹橘餘丼荔枝之林蒟子}
  - {type: page-break, offset: 22, content: '', id: KR3k0012_WYG_973-3a, image: WYG0901/WYG0901-0555c.png}
  - {type: page-break, offset: 22, content: '', id: KR3k0012_WYG_973-3b, image: WYG0901/WYG0901-0555d.png}
  - {type: variant, offset: 22, length: 8, content: 石久者數十歲不敗, krp: 甘吴録地理志曰髙涼安寜縣有餘甘𥘉食之味苦後口中更甘臨海異物志曰餘甘子如梭形出晉安候官界中餘甘橄㰖同一果耳雲南記曰瀘水南岸有餘甘子樹子如彈丸許色微黄味酸苦核有五稜其樹枝如柘枝葉如小夜合葉陳祁暢異物志曰餘甘大小如彈丸大視之理如定陶瓜片𥘉入口如苦忽咽口中乃更甜羙塩而蒸之尤羙可多食之朱崖故事曰朱崖果有餘甘左思吴都賦曰其果則丹橘餘甘荔支之林蒟子}
