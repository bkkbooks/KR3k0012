  - {type: 'tls:seg', offset: 30, content: '', id: KR3k0012_CHANT_973-1a.7}
  - {type: variant, offset: 31, length: 1, content: 使, SBCK: 書曰畨陽令唐􅂪風曉南粤南粤食􅂪蜀枸醬注曰枸音矩枸樹也如桑其椹長二三寸酢}
  - {type: variant, offset: 31, length: 1, content: 使, WYG: 書曰番陽令唐䝉風曉南粤南粤食䝉蜀枸櫞醬注曰蒟音矩枸樹也如桑椹其長三二寸酢}
  - {type: variant, offset: 31, length: 1, content: 使, krp: 書曰畨陽令唐蒙風曉南粤南粤食蒙蜀枸醬注曰枸音矩枸樹也如桑其椹長二三寸酢}
  - {type: variant, offset: 35, length: 1, content: 來, SBCK: 以爲醬廣志曰蒟子蔓生依􅀣子似桑椹長數寸色黒辛如薑以􅐭淹之下氣消食出南安左思蜀都賦曰笻杖傅節於大夏之邑蒟醬流味於畨禺之郷木􅀲爾雅曰楙木􅀲郭氏注曰實如小􅀲酢可食楙音茂也周禮冬官下弓人職曰取幹之道木􅀲次果桑毛詩衛淇澳木􅀲曰投我以木􅀲報之以瓊琚毛云楙也詩義䟽曰楙葉似榛實如小㼐􅀲上黄著中令蚡香欲噉者蜜封藏百日食之也三國典略曰齊孝昭北伐庫莫奚至天池以木􅀲􅁅毒魚魚皆死而浮出庫莫奚􅀼相謂曰池有靈魚犯之不祥乃岀長城北道齊主分兵追擊獲牛羊七萬振旅而還水經曰魚復縣地多木􅀲樹有子大如甒音武白黄實甚苦香爾雅之所謂楙也盛弘之荆州記曰魚復縣有固陵村地多木􅀲樹其子大者如甒晉宫閣記曰華林園有木􅀲五株廣志曰木􅀲子可藏枝爲一尺百二十節吴氏本草曰木􅀲生夷陵虎丘山䟽曰山三靣悉有木􅀲何承天木􅀲賦曰惟兹木之在林亦超􅀋而獨劭方朝華而繁實比沙棠而有曜劉爾雅曰劉劉杙也劉子生山中實如梨酢甜核堅出交趾杙音弋吴録地理志曰交阯羸僂縣有劉子樹出山中實如梨而味酸羙郡内皆有之南方草物狀曰劉三月華七月八月熟其色黄其味酢出交阯武平興古九真吴都賦曰梌劉禦霜欎周書曰夏食欎棣也毛詩􅃎七月曰六月食欎毛注日欎棣詩義䟽曰其樹髙五六尺其實大如李正赤食之甜魏王花木志曰欎薁樹髙五六尺實大如李赤色食之甘廣雅曰一名雀李又名車下李又名郁李亦名棣亦名薁李子毛詩七月食欎及薁即郁李也一名棣也吕氏夲草曰郁核一名雀李一名車下李一名棣晉宫閣名曰華林園薁李一林司馬相如上林賦曰隱夫欎棣合逯離支潘岳閑居賦曰梅杏薁棣之屬曹毗魏都賦曰􅀂榴郁棣杜梨爾雅曰杜甘棠今之杜梨也山海經曰岷山其木多棠韓詩外傳曰邵伯在朝所司請召民邵伯曰不勞一身而勞百姓此非文王之志也}
