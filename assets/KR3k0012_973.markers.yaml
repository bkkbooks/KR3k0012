  - {type: variant, offset: 1082, length: 366, content: 樹名獨分為二枝其東向一枝是木威樹南向一枝是橄欖樹南越志曰博羅縣有合成樹十圍去地二丈分為三衢東向一衢木葉似練子如橄欖而硬削去皮南人以為糝南向一衢橄欖西向一衢橄欖裴淵廣州記曰橄欖澀酒廣志曰橄欖大如鷄子交州以飲酒南州草木狀曰橄子大如棗二月華八九月熟生食味酢蜜藏乃甜美交阯武平興古九真有之臨海異物志曰餘甘子梭形初入口舌澀酸飲水乃甘又如梅實核兩頭銳呼為餘甘橄欖同一物異名耳嶺表錄異曰橄欖樹身聳枝皆高數尺其子深秋方熟閩中尤重味云咀之香口勝含鷄舌香生喫及煮飲悉解酒毒有野生者子繁樹峻不可梯緣但刻其根下方寸許內鹽於其中一夕子皆自落樹枝節上生脂膏如桃膠南人採之知其皮葉煎之調如黑錫謂之橄欖糖用泥舡損乾後牢於膠漆著水益乾堅耳左思吳都賦曰龍眼橄欖椰隋書曰林邑國人深目高鼻髮拳色黑俗皆徒跣以幅布纏身冬月衣袍婦人椎髻施椰葉蓆唐書曰訶陵國俗以椰樹花為酒其樹生花, SBCK: 椹}
