  - {type: variant, offset: 41, length: 6, content: 觀傍盡種蒲萄, SBCK: 有柚號爲雷柚實如􅂛大廣志曰成都有柚大如升􅀶物志曰橘柚􅀋多豫章郡出真者風土記曰柚大橘也赤黄而酢也神異記曰東方建春山外多柚異苑曰南康歸羙山石城内有甘橘柚楚辭曰斬伐橘柚列樹苦桃楚辭曰􅄂橘柚以爲圃兮列辛夷與椒楨司馬相如子虚賦曰橘柚芬芳古詩曰橘柚垂華實乃在深山側聞君好我甘竊獨自雕飾楊雄楊州牧箴曰彭蠡旣瀦陽鳥攸居橘柚羽貝瑶琨篠簜崔琦七蠲曰于斯江睪寔産橘柚紫葉玄實緑裏朱莖郭璞讃曰屈生嘉歎以爲羙談椵爾雅曰櫠椵也郭璞注曰柚屬子大如盂皮厚二三分中似枳食之味少椹毛詩䮐頌泮宫曰翩彼飛鴞集于泮林食我桑黮懷我好音黮桑實後}
