  - {type: variant, offset: 1596, length: 449, content: 有核皮裏有汁升餘清如水美如蜜可飲核中膚白如雪厚半寸味如胡桃而美可食出交阯家家種之南方草木狀曰椰二月花花仍蓮著實房連相累房三十或二十七八子十一月十二月熟其樹黃俗名為丹橫破之可作椀子長如栝樓子交州記曰椰子有漿截花以竹䇶承取汁作酒飲之亦醉神異經曰東南荒中有椰木椰高二三丈或十餘丈圍丈餘或七八尺葉三百歲盡落而華華如甘瓜華華盡落而生萼萼下生子三歲而熟熟後不長不減形如寒瓜長七八寸徑四五寸南州異物志曰椰樹大三四圍長六丈通身無枝至百餘年有葉葉狀如蒲長四五尺直竦指天實生葉間皮苞之如蓮狀皮硬過於核中肉白如鷄子著皮而腹內空含汁大者含升餘實形團團然或如苽樓橫破之可為爵並堪器用南人珍之異物志曰椰樹高六七丈無枝條葉如束蒲在上其實如瓠繫之巔實外皮如胡蘆膚中有汁升餘清如水味美於蜜食其膚則不飢食其汁則增渴又有如兩眼處俗號椰子為越王頭嶺表錄異曰椰子樹亦類海棕實號椰子大如甌盂外有麤皮如火腹次有硬殼圓而且堅厚二三分有圓如卵者即截開一頭砂石摩之去其皴皮其爛斑錦文以白金裝之以為水鑵子珍奇可愛殼中有液數合如乳亦可飲之冷而動氣左思吳都, SBCK: 傳休弈桑椹}
