  - {type: variant, offset: 35, length: 1, content: 來, WYG: 以為醬廣志曰蒟子蔓生依樹子似桑椹長數寸色黑辛如薑以鹽淹之下氣消食左思蜀都賦曰笻杖傳節於大夏之邑蒟醤流味於番禺之鄉木𤓰爾雅曰楙木𤓰周禮冬官下弓人職曰取幹之道木𤓰次果桑毛詩衞淇澳木𤓰曰投我以木𤓰報之以瓊琚三國典略曰齊孝昭北伐庫莫奚至其地以木𤓰灰毒魚魚皆死而浮出庫莫奚竊相謂曰池有靈魚犯之不祥乃出長城北道齊分兵追撃獲牛羊七萬遂振旅而返水經曰魚腹縣地多木𤓰樹有子大如甒白黄實甚苦香爾雅之所謂㮊也盛宏之荆州記曰魚腹縣有固樹陵村地多木𤓰樹其子大者如甒晉宫閣名曰華林園有木𤓰五株廣志曰木𤓰子可藏長一尺百二十節呉氏本草曰木𤓰生夷陵虎丘山䟽曰山三面悉有木𤓰何承天木𤓰賦曰惟兹木之在林亦超類而獨劭方朝華而繁實比沙棠而有耀劉爾雅曰劉劉杙也呉録地理志曰交阯羸倭縣有劉子樹出山中實如梨而味酸羙郡内皆有之南方草物狀曰劉三月華七月八月熟其色黄其味酢出交趾武平興古九真呉都賦曰梌劉禦霜欝周書曰夏食欝棣也毛詩豳七月曰六月食鬰及薁詩義䟽曰其樹髙五六尺其實大如李色赤食之丼魏王花木志曰欝樹髙五六尺其實大如李赤色食之丼廣雅曰一名雀李又名車下李又有郁李亦名棣亦名薁李子毛詩七月食鬰及薁即郁李也一名棣也吕氏本草曰郁李一名雀李一名車下李一名棣晉宫閣名曰華林園薁李一株司馬相如上林賦曰隠夫鬰李合逮離支潘岳閒居賦曰梅杏薁棣之屬曹毗魏都賦曰若榴郁棣杜梨爾雅曰杜丼棠山海經曰岷山其木多棠韓詩外傳曰召伯在朝有司請營召以居召伯曰以吾一身而勞百姓此非先君文王之志也}
