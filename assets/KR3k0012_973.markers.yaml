  - {type: variant, offset: 2, length: 4, content: 九蒲萄史, SBCK: 十龍眼樝餘甘蒟子木􅀲劉鬰杜梨㮕􅀥榛柚椵椹龍眼廣雅曰益智龍眼也謝承後漢書曰交阯七郡献龍眼廣志曰龍眼􅀣葉似荔支蔓延縁木生子大如酸􅀥色異純甜無酸朱崖傳曰果有龍眼交州}
