  - {type: variant, offset: 38, length: 2, content: 離宮, SBCK: 廬於棠樹之下百姓大恱詩人見而歌焉毛詩鵲巢甘棠曰蔽芾甘棠勿剪勿伐召伯所菱毛云甘棠杜也詩義䟽曰今棠梨也一名杜梨如梨而小有甜酢可噉也毛詩蟋蟀枤杜曰有枤之杜生于道周陸氏毛詩䟽義曰枤杜杜赤棠也與白棠同但有赤白羙惡子白色者爲白棠白棠甘棠也多酸羙滑赤棠子澁而酢者也俗語澁如杜是也木理亦赤可以作弓材孫楚枤杜賦序曰家弟以虞氏梨賦見示余謂豈以梨有用之爲貴杜無用之爲賤故賦之㮕􅀥晉宫閣名曰華林園㮕音軟􅀥四株廣志曰㮕􅀥味如柿晉陽楛㮕肌細而厚以供御范子計然曰㮕􅀥岀漢中郡崔豹古今注曰㮕􅀥葉如柿實似柿而小味甘羙司馬相如子虚賦曰樝梨梬栗梬楟􅀥也橘柚芬芳左思蜀都賦曰林檎枇杷橙柿梬楟榛毛詩􅆁栢舟簡兮曰山有榛隰有苓陸機毛詩䟽義曰山有榛枝葉似栗樹子似橡子味似栗枝莖可以爲燭毛詩鄘栢舟定之方中曰樹之榛栗椅桐梓漆詩義䟽曰榛栗屬有兩種其一種大小皮葉皆如栗其子小形似杼子味亦如栗所謂樹之榛栗者也其一種枝莖如木蓼生髙丈餘作胡挑味遼代上黨皆饒周禮天官下籩人職曰饋食之籩其實榛禮記曲禮下曰婦人之贄椇榛􅀥栗􅀃丈曰榛似梓實如小栗山海經曰上申之山下多榛楛郭氏注曰榛似栗而小任昉述異記曰漢末楊氏家園中産神榛二株張衡七辨曰寒梨乾榛柚尔雅音義曰或作爾雅曰柚條也鄭氏注曰以橙實酢出江南尚書禹貢曰楊州厥苞橘柚周書曰秋食橘柚毛詩􅁗車轔曰終南何有有條有梅列子曰吴越之間有木焉其名曰碧樹而冬青實丹而味酸度淮北而化爲枳焉莊子曰三王五帝之禮義法度譬猶柤梨橘柚其味相反而皆可於口淮南子曰天之所處地之所載皆生於一父母故槐榆與橘柚合而爲兄弟吕氏春秋曰果之羙者雲夢之柚山海經曰洞庭之山綸山銅山賈超之山其木多㐬郭氏榣注曰柚似橘而大塩鐵論御史曰孝武皇帝平百越以爲園圃臣庶皆厭橘柚崔寔政論曰橘柚之貢堯舜所不常御裴淵廣州記曰}
