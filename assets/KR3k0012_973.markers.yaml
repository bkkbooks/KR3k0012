  - {type: variant, offset: 35, length: 1, content: 來, krp: 以爲醬廣志曰蒟子蔓生依樹子似桑椹長數寸色黒辛如薑以􅐭淹之下氣消食出南安左思蜀都賦曰笻杖傅節於大夏之邑蒟醬流味於畨禺之郷木瓜爾雅曰楙木瓜郭氏注曰實如小瓜酢可食楙音茂也周禮冬官下弓人職曰取幹之道木瓜次果桑毛詩衛淇澳木瓜曰投我以木瓜報之以瓊琚毛云楙也詩義䟽曰楙葉似榛實如小㼐瓜上黄著中令蚡香欲噉者蜜封藏百日食之也三國典略曰齊孝昭北伐庫莫奚至天池以木瓜灰毒魚魚皆死而浮出庫莫奚竊相謂曰池有靈魚犯之不祥乃岀長城北道齊主分兵追擊獲牛羊七萬振旅而還水經曰魚復縣地多木瓜樹有子大如甒音武白黄實甚苦香爾雅之所謂楙也盛弘之荆州記曰魚復縣有固陵村地多木瓜樹其子大者如甒晉宫閣記曰華林園有木瓜五株廣志曰木瓜子可藏枝爲一尺百二十節吴氏本草曰木瓜生夷陵虎丘山䟽曰山三靣悉有木瓜何承天木瓜賦曰惟兹木之在林亦超類而獨劭方朝華而繁實比沙棠而有曜劉爾雅曰劉劉杙也劉子生山中實如梨酢甜核堅出交趾杙音弋吴録地理志曰交阯羸僂縣有劉子樹出山中實如梨而味酸羙郡内皆有之南方草物狀曰劉三月華七月八月熟其色黄其味酢出交阯武平興古九真吴都賦曰梌劉禦霜欎周書曰夏食欎棣也毛詩豳七月曰六月食欎毛注日欎棣詩義䟽曰其樹髙五六尺其實大如李正赤食之甜魏王花木志曰欎薁樹髙五六尺實大如李赤色食之甘廣雅曰一名雀李又名車下李又名郁李亦名棣亦名薁李子毛詩七月食欎及薁即郁李也一名棣也吕氏夲草曰郁核一名雀李一名車下李一名棣晉宫閣名曰華林園薁李一林司馬相如上林賦曰隱夫欎棣合逯離支潘岳閑居賦曰梅杏薁棣之屬曹毗魏都賦曰若榴郁棣杜梨爾雅曰杜甘棠今之杜梨也山海經曰岷山其木多棠韓詩外傳曰邵伯在朝所司請召民邵伯曰不勞一身而勞百姓此非文王之志也}
