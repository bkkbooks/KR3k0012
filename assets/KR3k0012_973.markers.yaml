  - {type: variant, offset: 2084, length: 498, content: 歲甚聰惠孔君平詣其父父不在乃呼兒出為設果有楊梅孔公指以示兒曰此真君家果兒應聲荅曰未聞孔雀是夫子家禽博物志曰地有章名則生楊梅南越志曰熙安縣白蜀里多楊梅張公以為名章則多楊梅此偶以所聞而命書後好事改地就之耳求之白蜀去之遠矣裴淵廣州記曰盧山頂有湖楊梅繞其際人登者止得於山飽食不得持下吳興記曰故章縣縣北有石槨山出楊梅常以貢御張華所謂地名章必生楊梅蓋謂此也食經曰藏楊梅法取完者一斛鹽漬之曝乾別取杭皮二斤煮汁鹽漬之不加蜜漬梅色如初美好可留數月臨海異物志曰楊梅其子如彈丸正赤五月中熟熟時似梅味甘甜酸梁江淹楊梅頌曰懷蕊挺實涵黃橘丹鏡日繡壑照霞綺巒沙棠山海經曰崑崙之山有木焉狀如棠棠梨黃華赤實味如李而無核名曰沙棠可以卻水呂氏春秋曰伊尹說曰果之美者沙棠之實南越志曰寧鄉果多沙棠笁法真登羅浮山疏曰羅浮山有沙棠華黃實赤味甘如李枸櫞裴淵廣州記曰枸櫞樹似橘如柚大而倍長味奇酢皮以蜜煮為劉欣期交州記曰枸櫞如柚核細異物志曰枸櫞實橘大如飯筥皮不香味不美可以浣治葛紵若酸漿嶺表錄異曰枸櫞子形如瓜皮以橙而金色故人重之愛其香氣京輦豪貴家釘盤筵憐其遠方異果肉甚厚白如蘿蔔南中女工競取其肉鏤花鳥浸之蜂蜜點以燕脂擅其妙巧亦不讓湘中人鏤木瓜也益智, SBCK: ''}
