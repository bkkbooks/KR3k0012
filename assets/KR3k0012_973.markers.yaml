  - {type: variant, offset: 604, length: 13, content: 大月氏國善為蒲萄花葉酒或以, SBCK: 􅁗皇遣徐福求一寸椹碧海之中有扶桑樹長數千丈樹兩兩同}
  - {type: variant, offset: 604, length: 5, content: 大月氏國善, WYG: 秦皇遣徐福求桑椹於碧海之中有扶桑樹長數千丈樹兩兩同根偶生更相依倚是名扶桑仙人食其椹而體作金光飛騰𤣥宫也漢武内傳曰神仙上藥有扶桑丹椹汝南仙賢傳曰蔡君仲孝養老母時赤眉亂仲孝取桑椹赤黑異噐賊問其故答曰黑者奉母赤者自食賊嘉之與鹽二升世説曰張天錫}
