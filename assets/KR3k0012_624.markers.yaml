  - {type: variant, offset: 3209, length: 147, content: 或曰功巍巍德赫赫非唯不禆於政化亦乃陛下之厭聞臣以為當今風俗未甚振理政令未息煩勞陰陽未調和帑藏未充牣流離者尚相望於道路犯禁者猶繼踵於狴牢耳未聞康哉之聲目未覩太平之事且貞觀永徽之天下亦今日之天下相去幾何而風俗淳季相反由理之失也夫霸者任智失德與人故大偽緣生矣然巧智之士浮詭之徒智忠者為立身之階識仁義為, SBCK: 御覽卷第六}
