  - {type: variant, offset: 2590, length: 0, content: '', SBCK: 矣文子曰以御言之左手執轡右手運用不亦速乎􅀂任轡無䇿馬何懼哉子曰吾聞古之善御者執轡如組兩􅆖如舞非䇿之􅂇也是以先王盛於禮而薄於刑故民從命也廢禮而尚刑民弥􅁀矣又曰子思問於夫子曰亟問夫子之詔正俗}
