  - {type: variant, offset: 2586, length: 0, content: '', krp: 信旣咸熈然後樂乃和焉又曰孔子之衛衛將軍文子問曰吾聞魯公父氏不能聽獄信乎孔子荅曰不知}
  - {type: variant, offset: 2587, length: 2, content: 義節, SBCK: 不能也夫公父氏之聽獄有罪者懼無罪者耻文子曰有罪者懼聽之察刑之當也無罪者耻耻何乎孔子曰齊之以禮則民耻矣刑以止刑則民懼矣文子曰今齊之以刑刑猶弗勝何禮之齊孔子曰以禮齊民譬之於御則轡也刑以齊民譬之於銜則鞭也執轡於此而動於彼御之良也無轡而用䇿則馬失}
  - {type: variant, offset: 2587, length: 0, content: '', WYG: 不能也夫公父氏之聴獄有罪者懼無罪者恥文子曰有罪者懼聴之察刑之當也無罪者恥何恥乎孔子曰齊之以禮則民恥矣刑以止刑則民懼矣文子曰今齊之以刑刑猶弗勝何禮之齊孔子曰以禮齊民譬之於御則轡也以刑齊民譬之於御則鞭也執轡于此而動于彼御之良也無轡而用䇿則馬失道矣文子曰以御言之左手執轡右手運用不亦速乎若任轡無䇿馬何懼哉子曰吾聞古之善御者執轡如組兩驂如舞非䇿之助也是以先王盛于禮而薄于刑故民從命也廢禮而尚刑民彌暴矣又曰子思問於夫子曰伋聞夫子之詔正俗化民之政莫善於禮樂也管子任法以治齊而天下稱仁焉是法與禮樂異用而同功也何必但禮樂哉子曰堯舜之化百世不輟仁愛之風逺矣管仲之智足以定法材非管氏而專任法終必亂成矣又曰新桓固謂子順曰賢者所在必興化致治今子相魏未聞異政而即自退其有不得志者乎何去之速也答曰以無異政所以自退也且死病無良醫今秦有吞食天下之心以}
