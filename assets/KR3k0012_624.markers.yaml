  - {type: variant, offset: 2591, length: 0, content: '', SBCK: 民之政莫善於禮樂也管子任法以治齊而天下稱仁焉是法與禮樂異用而同功也何必但禮樂哉子曰尭舜之化百丗不輟仁愛之風逺矣管仲之智足以定法材非管氏而專任法終必亂成矣又曰孟軻問子思曰尭舜文武之道可力而致乎子思曰彼人也我人也稱其言履其}
  - {type: variant, offset: 2591, length: 20, content: 行於上清議隆於下上下相奉人懷義心亡秦蕩滅, WYG: 之興昔伊摯在夏吕望在商而二國不治豈伊吕之不欲哉勢不可也又曰尹曾謂子魚子之讀}
  - {type: variant, offset: 2591, length: 0, content: '', krp: 民之政莫善於禮樂也管子任法以治齊而天下稱仁焉是法與禮樂異用而同功也何必但禮樂哉子曰尭舜之化百丗不輟仁愛之風逺矣管仲之智足以定法材非管氏而專任法終必亂成矣又曰孟軻問子思曰尭舜文武之道可力而致乎子思曰彼人也我人也稱其言履其}
  - {type: variant, offset: 2592, length: 0, content: '', SBCK: 夜思之晝行之滋滋焉汲汲焉如農之趍時商之趍利惡有不致者乎又曰穆公問子思曰吾國可興乎子思曰可公曰爲之柰何對曰苟君與大夫慕周公伯禽之治行其政化開公家之惠杜私門之利結恩百姓脩禮鄰國其興也勃矣又曰衛君問子思曰寡人之政何如荅曰無非君曰寡人不知其不肖亦望其如此也子思曰希㫖容媚則君親之中正弼非則君䟽之夫能使人冨貴貧賤者君也在朝之士孰肯舎其所以見親而取其所以見䟽乎是故競求射君之心而莫有非君之者此臣所謂無非也公曰然乎寡人之過也今知改矣荅曰君弗能焉口順而心不懌者臨事必痝君雖有命臣未敢受也又曰信陵君問曰古之善爲國至}
  - {type: page-break, offset: 2592, content: '', id: KR3k0012_SBCK_624-5b}
