  - {type: variant, offset: 2601, length: 0, content: '', krp: 勤德而和德無不化俗無不和衆之所譽政之所是也衆之所毁政之所非也毁譽是非與政}
  - {type: variant, offset: 2602, length: 1, content: 奉, SBCK: 應所以無訟也又曰子順相魏改嬖寵之官以事賢才奪其不任之禄以賜有功諸䘮職者不恱造謗言文咨以告且曰夫不善前政而有成孰與變之而起謗哉子順曰民之不可與慮始乆矣古之善爲政者其􅀄不能無謗子産相鄭三年而後謗止吾先君之相魯三月而後謗止今吾爲政日新雖不及聖賢庸知謗止獨無時乎文咨曰子産之謗嘗亦聞之未識先君之謗何也子順曰先君􅀄相魯魯}
