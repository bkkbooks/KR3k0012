  - {type: variant, offset: 120, length: 5, content: 齊威王召即, SBCK: 凢牧民者使士無邪行女無淫事士無邪行教也女無淫事訓也教訓成俗而刑罰省也又曰善爲國者使民􅀂飢魚之歸餌渴馬之走飲又曰堯舜之民非生而治桀紂之民非生而亂故治亂在上也又曰聖人設度量置儀法如天地之堅如列星之固如日月之明如四時之信然故令徃而民從之老子曰治大國􅀂烹小鮮烹小鮮不敢橈恐其縻也治國煩則亂治身煩則精神散以道蒞天下者其鬼不神以道德治天下則鬼不敢見其精神以犯人也又曰聖人虚其心實其腹弱其志強其骨常使民無知無欲使夫知者不敢爲也爲無爲則無不治矣又曰聖人無􅁪心以百姓心爲心善者吾善之不善者吾亦善之信者吾信之不信者吾亦信之欲善信者吾因而善信之不善信者吾亦以善信教之聖人在天下惵惵爲天下惲其心聖人治天下常惵惵心同惲用心皆爲天下百姓皆注其耳目聖人皆孩之百姓頃注耳目以觀聽聖人聖人視百姓如嬰兒又曰以政治國以竒用兵以無事取天下以政教治國以竒計用兵皆不合道惟無事可以取天下吾何以知天下其然哉以此以此下文知之天下多忌諱而民弥貧國多忌諱人失作業故貧人多􅇊巧竒物滋起法令滋章盗賊多有法令益明􅀼盗爲姦盡成盗賊故聖人云我無爲而民自化我與事而民自冨我好静而民自正我無欲而民自朴老子曰其政悶悶其民淳淳其政察察其民􅆙􅆙文子曰水濁則魚險政苛則民亂}
