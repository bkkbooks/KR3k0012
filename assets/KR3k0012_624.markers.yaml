  - {type: variant, offset: 2582, length: 0, content: '', SBCK: 君治國而晦晦而行行而止故一言正而天下定一言􅀝而天下靡啇君書曰善治者使跖可信不能治者使伯夷可疑韓子曰或曰景公不知用勢師曠晏子不知除患夫獵者託車輿之安用六馬之足使王良左轡則身不勞而易及輕獸國者君之車勢者君之馬不乗君之車不因馬之利釋車而下走者也故曰景公不知用勢之主師曠晏子不知除患之臣也又曰桓公謂管仲曰官少而索者衆索求也寡人憂之管仲曰君無聽左右之請因能而授禄因功而與官人莫敢索君何憂焉又曰夫堯舜在上位雖有十桀紂不能亂者勢治也桀紂在上位雖有十堯而不能治者勢亂也又曰故善毛嬙西施之美無益吾靣用脂澤粉黛則倍}
