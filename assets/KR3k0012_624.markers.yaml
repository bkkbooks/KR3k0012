  - {type: variant, offset: 1617, length: 293, content: 亂之所生故不齊也堯舜行德則民仁壽桀紂行暴則民鄙夭夫上之化下下之從上猶泥之在鈞唯甄者之所為猶金之在鎔惟冶者之所鑄綏之斯來動之斯和也又曰董仲舒論時政曰為政不行甚者必變而更化之譬諸琴瑟不調必解而更張之當更張而不更張雖有良工不能善調也當更化而不更化雖有大賢不能善治也又曰蕭望之上䟽曰夫民函陰陽之氣函與含同有仁義欲利之心在教化之所助雖堯在上不能去民欲利心而能令其欲利不勝其好義也雖桀在上不能去民好義之心而能令其好義不勝其欲利也故堯桀之分任於義利而已故道民不可不慎也又曰匡衡上書言政治曰五帝不同樂三王各異教民俗殊務所遇之時異也比年大赦而姦邪不為衰止蓋保民者陳之以德義示之以好惡觀其失而制其宜也朝廷者, SBCK: ''}
