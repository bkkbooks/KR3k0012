  - {type: variant, offset: 2150, length: 401, content: 能以往知來耳房因免冠謝曰春秋記二百四十二年災異以示萬世之君今陛下即位已來日月失明星辰錯行山崩泉湧地震石隕夏霜冬雷水旱螟蟲民人飢疫盜賊不禁刑人滿市春秋所記災異盡備陛下視今為治耶為亂耶上曰亦極亂耳尚何道房曰今所任者誰歟上曰然幸其瘉於彼又以為不在此人也瘉與愈同愈勝也言其勝於彼也房曰夫前世之君亦皆然矣臣恐後之視今猶今之視前也後漢書曰桓譚上䟽曰國之廢興在於政事得失由乎輔佐有國之君俱欲興化建善然而治道未洽者所謂賢者要也且設法禁者非能盡塞天下之姦皆合眾人之欲也大底取便國利民多者則可矣夫張官置吏以理萬民懸賞設罰以別善惡惡人誅傷則善人蒙福矣魏志曰袁渙字曜卿為梁相每勑諸縣曰世治則禮備世亂則禮簡方今難以禮化在吾所以為政又曰太祖破袁氏領冀州牧辟崔琰為別駕從事請琰曰昨案戶籍可得三十萬眾故為大州也琰曰今天下分崩九州幅裂二袁兄弟親尋干戈冀方蒸庶暴骸原野未聞王師仁聲先路存問風俗救其塗炭而較計兵甲唯此為先豈彼州士女所望於明公, SBCK: ''}
