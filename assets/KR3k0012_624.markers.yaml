  - {type: variant, offset: 3357, length: 136, content: 行之本託之以求進假之以取容口是而心非言同而意反明君哲后亦何盡能察哉趍競之吏巧知之人欲密網以為至公殊不知網密而犯者眾用苛細為勤事殊不知事細而擾愈煩賞貪冐以強能鄙貞正而孤介隨波浮沉者題之以黠剛毅正直者目之曰愚歲月漸漬日致澆浮朴散淳離流宕忘反若不匡救其弊何由使風俗淳質厥人以康哉, SBCK: 二十四}
