  - {type: variant, offset: 1667, length: 173, content: 冶者之所鑄綏之斯來動之斯和也又曰董仲舒論時政曰為政不行甚者必變而更化之譬諸琴瑟不調必解而更張之當更張而不更張雖有良工不能善調也當更化而不更化雖有大賢不能善治也又曰蕭望之上䟽曰夫民函陰陽之氣函與含同有仁義欲利之心在教化之所助雖堯在上不能去民欲利心而能令其欲利不勝其好義也雖桀在上不能去民好義之心而能令其好義不勝其欲利也故堯桀之分任於義利而已故道民不, WYG: 無事}
