  - {type: variant, offset: 2745, length: 0, content: '', SBCK: 也和輯乎轡衘之際而緩急乎唇吻之和正度乎胷臆之中而執節乎掌握之間内得於中心而外合於馬志是故能進能退履䋲而還曲中䂓取道致逺而氣力有餘誠得其術也是權勢者人主之車輿也大臣者人主之四馬也體離車輿之安而手失四馬之心能無危者古今未之聞也是故輿馬}
  - {type: page-break, offset: 2745, content: '', id: KR3k0012_SBCK_624-7a}
