  - {type: variant, offset: 129, length: 669, content: 語之曰自子之居即墨也毀曰至然吾使人視即墨田野辟民人給官無留事東方以寧是子不事吾左右以求譽也封之萬家召阿大夫語曰自子之守阿譽日聞然使人視阿田野不辟民人貧苦昔趙氏攻甄子弗能救衛取薛陵而子不知是子以幣厚吾左右以求譽也是日烹阿太夫及左右嘗譽者於是齊國震懼人人不敢飾非務盡其誠齊國乃大治又曰公孫鞅西入秦因孝公寵臣景監以求見孝公孝公既見鞅語事良久孝公時睡弗應罷而去孝公怒景監曰子之客妄人耳安足用耶景監以讓鞅鞅曰吾說孝公以帝道其志不開悟後五日復求見鞅鞅復見孝公益愈然而未中旨罷而去孝公復讓監監亦讓鞅鞅曰吾說公以王道而未入也請復見鞅鞅復見孝公善之而未甚也罷而去孝公謂景監曰汝客蓋可與語矣鞅曰吾說孝公以霸道其意欲用之矣誠復見我我知之矣鞅復見孝公公與語不自知膝之前於席也語數日不厭景監曰子何以中吾君吾君之驩甚也鞅曰吾說君以帝王之道而吾君曰久遠吾不能待安能邑邑待數十百年而成王道之業乎故吾以強國之術說君君說之然亦難以比德於殷周矣漢書曰曹參相齊召長老諸先生問以安集百姓而齊故諸儒以百數言人人殊參未知所定聞膠西有蓋公善治黃老使人厚幣請之既見蓋公蓋公為言治道貴清靜而民自定推此類具言之參於是避正堂舍蓋公焉其治要用黃老術故相齊九年齊國安集大稱賢相及參去齊屬其後相曰以齊獄市為寄慎勿擾也後相曰治無大於此乎參曰不然夫獄市者所以并容也今君擾之姦人安所容乎吾是以先之又曰陸賈時時說詩書高帝罵之曰乃公居馬上得之安事詩書賈曰馬上得之寧可以馬上治乎且湯武逆取而順守文武並用長久之術也昔者吳王夫差智伯極武而亡夫差吳王闔閭子也好用兵卒為越所滅智伯晉卿荀瑤也攻趙襄子襄子與韓魏反而喪之秦任, WYG: ''}
