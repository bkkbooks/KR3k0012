  - {type: variant, offset: 2583, length: 0, content: '', WYG: 初明法度必賞罰則國富而治法度賞罰者國之脂澤粉黛也孔叢子曰夫子適齊晏子就其館既燕而私焉曰齊其危夫譬若載無轄之車以臨千仞之谿其不顛覆亦難兾也子吾心也子以齊為遊息之館當或可救子幸不吾隠也夫子曰死病不可醫夫政令者人君之銜轡所以制下也今齊君失之已乆也子雖欲挾其輈而扶其輪良弗及也抑猶可以没齊君及子身過此而徃齊其田氏矣又曰定公問曰周書所謂庸庸祗祗威威顯民何謂也孔子曰不失其道明之於民之謂也夫能用可用則政治矣敬可敬則尚賢矣畏可畏則省刑矣人君審此三者明以示民而國不興未之有也又曰哀公問書稱䕫曰於予擊石拊石百獸率舞庶尹允諧何謂也孔子對曰此言善政之化乎物也古之帝王功成作樂其功善者樂和樂和則天地且猶應之况百獸乎䕫為帝舜樂正實能以樂盡治禮之情公曰然則政之}
