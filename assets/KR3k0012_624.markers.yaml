  - {type: variant, offset: 2604, length: 1, content: 懷, SBCK: 頌曰麛裘而芾投之無戾芾而麛裘投之無郵及三月政化旣行民又作頌曰衮衣章甫實獲我所章甫衮衣恵我無私文咨喜曰乃今知先生不異乎聖賢矣又曰新桓固謂子順曰賢者所在必興化致治今子相魏未聞異政而即自退其身者志不得乎何去之速也荅曰以無異政所以自退也且死病無良醫今􅁗有呑食天下之心以}
