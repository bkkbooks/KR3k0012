  - {type: variant, offset: 504, length: 189, content: 成王道之業乎故吾以強國之術說君君說之然亦難以比德於殷周矣漢書曰曹參相齊召長老諸先生問以安集百姓而齊故諸儒以百數言人人殊參未知所定聞膠西有蓋公善治黃老使人厚幣請之既見蓋公蓋公為言治道貴清靜而民自定推此類具言之參於是避正堂舍蓋公焉其治要用黃老術故相齊九年齊國安集大稱賢相及參去齊屬其後相曰以齊獄市為寄慎勿擾也後相曰治無大於此乎參曰不然夫獄市者所以并容也今君擾之姦人安所容乎吾是以先之, SBCK: 闚}
