  - {type: variant, offset: 695, length: 122, content: 陸賈時時說詩書高帝罵之曰乃公居馬上得之安事詩書賈曰馬上得之寧可以馬上治乎且湯武逆取而順守文武並用長久之術也昔者吳王夫差智伯極武而亡夫差吳王闔閭子也好用兵卒為越所滅智伯晉卿荀瑤也攻趙襄子襄子與韓魏反而喪之秦任刑法不變卒滅趙氏秦之先封於趙鄉使秦已并, SBCK: 聞在宥}
