  - {type: variant, offset: 882, length: 316, content: 能從者是不法聖智也秦世之所以亟絕者其轍跡可見也然而不避是後車又將覆也夫存亡之變治亂之機其要在是而已矣夫人之智能見已然不能見將然夫禮者禁於將然之前而法者禁於已然之後是知法之用易見而禮之所以為至難知也若夫慶賞以勸善刑罰以懲惡先王執此之政堅若金石行此之令信如四時據此之公無私如天地耳豈顧不同哉顧反也為人主計者莫如先審取舍取舍之極定於內安危之萌應是外矣安者非一日而安也危者非一日而危也以禮義治之者積禮義以刑罰治之者積刑罰刑罰積而民怨背禮義積而民和親故世主欲民之善同而所以使民善者或異或道之以德教或毆之以法令道之以德教者德教洽而民氣樂毆之以法令者法令極而民風哀哀樂之感禍福之應也秦王之欲尊社廟而安子孫湯武同然而湯武廣大其德行六七百歲而不失秦王, SBCK: 聞}
