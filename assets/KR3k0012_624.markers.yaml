  - {type: variant, offset: 2581, length: 0, content: '', SBCK: 使天下欣欣焉人樂其性也是不恬也桀之治天下也使天下瘁瘁焉人苦其性是不愉也夫不恬不愉非德也非德而可長乆者天下無之也又曰黄帝將見大隗于具茨之山􅃴遇牧馬童子問塗焉曰􅀂知具茨之山乎曰然􅀂知大隗之存乎曰然黄帝曰異哉小童非徒知具茨之山又知大隗之所存請問爲天下小童曰夫爲天下者亦奚以異乎牧馬哉亦去其害馬而已矣又曰黄帝立爲天子十九年令行天下聞廣成子在崆峒之上故徃見之曰吾欲取天地之精以佐五榖以養民人又欲官隂陽以遂羣生爲之柰何廣成子曰而所欲問者物之質也而所官者物之殘也自而治天下雲氣不待族而􅀨草木不待黄而落日月之光益以荒矣而侫人之心翦翦焉又奚足以語至道哉翦翦狹劣貌尸子曰范獻子泛於河大夫皆在君曰孰知欒氏之子大夫莫荅舟人清㳙捨檝荅曰君奚問欒氏之子􅀂脩晉國之政内得大夫外不失百姓雖欒氏之子其􅀂君何􅀂不脩晉國之政内不得大夫而外失百姓則舟中之人皆欒氏子也君曰善申子曰}
