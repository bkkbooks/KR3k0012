  - {type: variant, offset: 4117, length: 498, content: 上其中虛者也夜呼者恐也軍士夜喧爭將不勇相驚而無備者恐懼也軍擾者將不重也無威重旗動者亂也旌旗謬動東西傾倚者亂也吏怒者倦也軍吏悉怒將者疾倦粟馬食肉軍無懸箠不及其舍者窮寇也穀馬食肉不復蓄積無懸簞之食欲死戰此窮寇也箠即簞之類也諄諄翕翕徐言入入者失眾也諄諄者語貌又足貌也翕翕者不直貌上失卒之心少氣之意徐言入入者與之言安徐之貌此將失其眾也諄章淪切翕許及切數賞者窘也軍不索敵數行賞欲士卒之力戰者此恐窘者也數罰者困也數行刑罰者教令施廢是困軍也先暴而後畏其眾者不精之至也先行卒暴於士卒而後欲畏己者此將不精之極也來委謝者欲休息也戰未相伏而下其意氣相委謝者欲休息也兵怒而相迎久而不合又不相去必謹察之備奇伏也此必有間諜也又曰凡敵有不卜而與戰有不占而避之疾風大寒早興冥選部冰濟度盛夏炎熱興役無間行飢驅渴務取於遠師久無糧士眾怨怒妖祥疑惑上不能止軍資既竭時多霖注欲掠無所師眾不多地土不利人馬疾疫道遠日暮士卒勞倦飢未及食解甲而息將薄吏輕士卒不固三軍數驚師徒無助陣而未定舍而未畢行坂涉險半隱半出諸如此類擊而勿疑若土地廣大人眾富盛上愛其下惠施流布賞信刑察發止得時行陣居列任賢使能師徒習教兵甲精銳四鄰有助大國之援凡如此類憚而避之故曰見, SBCK: ''}
