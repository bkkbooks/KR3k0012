  - {type: variant, offset: 2237, length: 396, content: 東歛兵依嶮軍不得交亮引兵而還宣王尋亮至於鹵城張郃曰彼遠來逆我請戰不得謂我利在不戰欲以長計制之也且祁山大軍以近人情自固可止屯於此分為奇兵亦出其後不宜進前而不敢逼坐失民望也今亮懸軍食少亦行去矣宣王不從固尋亮既至又登山掘營不肯戰賈詡魏平數請救且曰公畏蜀如畏虎奈天下笑何宣王病之諸將咸請戰五月辛巳乃使張郃攻無當監何平於南國自案中道向亮亮使魏延高翔吳班赴距大破之獲甲首三千級鎧五千領宣王還保營袁希之漢表傳曰丞相亮出軍圍祁連山始以木牛運糧魏司馬宣王張郃救祁連山夏六月亮糧盡軍還至于青封木門郃追之亮駐軍削大樹皮題曰張郃死此樹下豫令兵夾道以數千強弩備之郃果自見千弩俱發射郃而死韓子曰趙主父使李疵視中山可攻不報曰可攻也主父曰何故可攻對曰其見巖穴窮閻隘巷之士以十數亢禮下布衣之士以百數矣君曰是賢君也安可攻疵曰然矣好顯巖穴之士而朝之則戰士怠於行陣上尊者下居士而朝之則農夫惰於力田戰士怠於陣者兵弱也農夫惰於田者國貧也, WYG: 勢}
