  body:
  - {type: variant, offset: 4, length: 2, content: 二料, SBCK: 三用間孫子曰興師十萬出師千里百姓之費公家之奉日費千金内外騷動不得操事者七十萬家古者八家爲隣一家從軍七家奉之言十萬之師不事不耕者凢七十萬家也相守數年以爭一日之勝是故明王聖主賢君勝將所以動而勝人成功出於衆者先知不可取於神􅀑不可禱祈以求不可像於事也不可以事􅀋求不可驗於事度不可以行事度也必取於人知}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 三用間用間孫子曰興師十萬出師千里百姓之費公家之奉日費千金内外騷動不得操事者七十萬家相守數年以爭一日之勝是故明王聖主賢君勝將所以動而勝人成功出於衆者先知不可取於神鬼不可像於事類不可騐於事度不可以行事度也必取於人知敵之情也因人也故用間有五因間内間反間死間生間五間俱起莫知其道是謂神紀人君之寶也用時任五間也因間者因其鄉人而用之也因敵鄉人知敵表􅂻虛實之情故就而用之可使伺候内間者因其官人而用之者也因在官失職者若刑戮之子孫與受罰之家也因其有隙就而用之也反間者因其敵間而用之者也敵使間來視我我知之因厚賂重許反使為我間也蕭世淳曰言敵使人來候我佯不知而示以虛事前却期㑹使歸相語是故曰反間也死間者為誑事於外令吾間知之而待於敵間也作詐誑之事於外佯漏泄之使吾間知之吾間至敵中為敵所得必以誑事輸敵從而備之吾所行不然間則死矣又一云敵間來間以我誑事而持歸然皆非所圖也}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_WYG_292-1b, image: WYG0895/WYG0895-0549b.png}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_WYG_292-2a, image: WYG0895/WYG0895-0549c.png}
  - {type: variant, offset: 4, length: 2, content: 二料, krp: 三用間孫子曰興師十萬出師千里百姓之費公家之奉日費千金内外騷動不得操事者七十萬家古者八家爲隣一家從軍七家奉之言十萬之師不事不耕者凢七十萬家也相守數年以爭一日之勝是故明王聖主賢君勝將所以動而勝人成功出於衆者先知不可取於神鬼不可禱祈以求不可像於事也不可以事類求不可驗於事度不可以行事度也必取於人知}
  - {type: xml-element, offset: 5, content: '', id: KR3k0012_CHANT_292-bkkxmlele1}
  - {type: 'tls:seg', offset: 5, content: '', id: KR3k0012_CHANT_292-1a.1}
  - {type: 'tls:seg', offset: 5, content: '', id: KR3k0012_CHANT_292-1a.2}
  - {type: variant, offset: 5, length: 1, content: 料, WYG: 間皆不能知幽隠深宻故曰死間也蕭世誠云所獲}
  - {type: variant, offset: 7, length: 0, content: '', SBCK: 之情也因人也故用間有五因間内間反間死間生間五間俱起莫知其道是謂神紀人君之寳也用時任五間也因間者因其郷人而用之也因敵郷人知敵表裹虚實之情故就而用之可使伺候内間者因其官人而用之者也因在官失職者􅀂刑戮之子孫與受罰之家也因其有􅂩就而用之也反間者因其敵間而用之者也敵使間來有急即呼之則不見何止亦因以知敵之情令吾間必索知之敵間之來間我者因而利之導而舎之舎居止也今吾人遺以重利復遇而舎止之可令詭其辝故反間可得而用也故能取敵之間而用因是而知之故郷間内間可得而使也因反敵間而知敵情郷間内間者皆可得使也因是而知之故死間爲誑事可使告敵因是可得而攻也因誑事而知敵情生間往反可使知其敵之腹心所在因是而知之故生間可使如期五間之事主必知之人主當知五間之用厚其禄豐其財知之必在於反間故反間不可不厚也反間者五間之夲事之要也故當在厚待之殷之興也伊摯在夏伊尹周之興也吕牙在殷吕望故唯明主賢將能以上智爲間者必成大功此兵之要三軍所恃而動者也巳上注出通典左傳曰楚師伐宋九月不服將去宋楚大夫申叔時曰築室反耕者宋必聽命楚子從之築室於宋分兵於田示無去志王從其言宋人懼使華元夜入楚師登子反之牀起之曰寡君使元以病告兵法因其郷人而用之必先知其守將左古謁者門者舎人之娃名因而利導之華元盖用此術得以自通曰敝邑易子而食析骸而㸑雖然城}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_SBCK_292-1b}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_SBCK_292-2a}
  - {type: variant, offset: 7, length: 0, content: '', WYG: 人及已叛軍有重罪繫者故貸免相􅃯勿泄佯為不宻令敵間竊聞之吾因縱之亡亡必歸敵必信焉往必死故曰死間也生間者反報者也擇已有賢才智謀能自開通於敵之親貴察其動静知其事訃彼所為已知其實還報是曰生間也故三軍之親莫親於間若不親撫重以祿賞則反為敵用泄吾情實也賞莫厚於間厚賞之賴其用事莫宻於間間事不宻則為己害非聖智不能用間非仁義不能使間不能得間人之用也非微宻者不能得間之實精微用意宻不泄漏微哉微哉無所不無間也間事不發而先聞其間者與所告者皆死凡軍之所欲擊所欲擊之軍城之所欲攻所欲攻之城人之所欲殺欲殺之人必先知其守將左右謁者門者舍人之姓名守有官職任者謁告也主告事者也門者守門者也舍人守舍之人也必先知之為親舊有急即呼之則不見訶止亦因以知敵之情令吾間必索知之敵間之來間我者因以利𨗳而舍之舍居止也令吾人遺以重利復導而舍止之可令詭其辭故反間可得而用也反能取敵之間為用因是而知之故因間内間可得而使也因反敵間而知敵情因間内間者皆可得使也因是而知之故死間為誑事可使告敵因是可得而攻也因誑事而知敵情生間往反可使知其敵之腹心所在因是而知之故生間可使如期五間之事主必知之人主當知五間之用厚其祿豐其財知之必在於反間故反間不可不厚也反間者五間之本事之要也故當尤厚待之殷之興也伊摯在夏伊尹周之興也吕牙在殷吕望故惟明主賢將能以上智為間者必成大功此兵之要三軍所恃而動者也已上注出通典左傳曰楚師伐宋九月不服將去宋楚大夫申叔時曰築室反耕者宋必聽命楚子從之築室於宋分兵於田示無去志王從其言宋人懼使華元夜入楚師登子反之牀起之曰寡君使元以病告兵法因其鄉人而用之必先知其故將左右謁者門者舍人之姓名因而利導之華元蓋用此術得以自通曰敝邑易子而食析骸而爨然城}
