  - {type: variant, offset: 3743, length: 280, content: 險也敵遠而挑人者欲人之進也其所處者居易利也所居利也言敵去我近促遣輕挑我欲使前就之其就處者平利也眾樹動者來也斬拔樹木除道進來故動眾草多障者疑也結草為陣欲使我度稠草中多障蔽者敵必逃去恐追及多作障蔽使人疑有伏也鳥起者伏也下有伏兵住藏觸鳥而驚起獸駭者覆也敵廣陣張翼來覆我也故獸驚駭矣塵高而銳者車來也車馬行疾速塵相衝故高也卑而廣者徒來也散而條達者薪採來也塵散衍而條達各行所來也少往來者營軍者也少塵少也辭卑而益備者進也其人來使辭卑使間視之敵增備也必進來辭強而進驅者退也詭詐也來馳驅無所畏是欲退輕車先出居其側者陣也陣兵欲戰也輕車馳車在陣側無約而請和者謀也未有要約而使來請和者, SBCK: ''}
