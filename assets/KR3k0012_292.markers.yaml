  - {type: variant, offset: 3377, length: 1246, content: 五形可擊新集始至行陣未定未食雖己結陣須饋食不順逆風向月建後至敵後來不得山川地勢利奔走行陣失次用力不齊陣布不均不戒我亦弱誘敵之不設備勤勞倍道兼行人馬未息衣甲馳路雖陣不整將離大將已去獨任小吏素不威服長路趨戰爭利晝暮不息候濟半渡疾擊不暇貪利求勝不腵盡陣險路泥濘阻狹車馬單行左右難救擾亂行列失序進退不齊縱不相戴橫不相對或坐或立驚怖卒阨相逢都無備擬鼓譟掩擊三軍震懾不定陣數移動人馬數顧師有十過勇而輕死可暴貪而好利可遺仁而不忍可勞知而心法可窘信而喜信人可誑廉潔而愛人可侮慢而心緩可襲剛而自用可誘懦志多疑可惑急而心速可久孫子曰軍旁有險阻蔣潢井生葮葦小林翳薈者必謹覆索之此伏奸之所藏處也險者一高一下之地阻者草蔣水草之藂生潢者池也井者下也葮葦者眾木所居也翳薈者可以屏籠蔽處也此以上相地形此以下察敵情也翳薈草木之相蒙蔽可以藏兵處反覆索之也敵近而靜者恃其險也敵遠而挑人者欲人之進也其所處者居易利也所居利也言敵去我近促遣輕挑我欲使前就之其就處者平利也眾樹動者來也斬拔樹木除道進來故動眾草多障者疑也結草為陣欲使我度稠草中多障蔽者敵必逃去恐追及多作障蔽使人疑有伏也鳥起者伏也下有伏兵住藏觸鳥而驚起獸駭者覆也敵廣陣張翼來覆我也故獸驚駭矣塵高而銳者車來也車馬行疾速塵相衝故高也卑而廣者徒來也散而條達者薪採來也塵散衍而條達各行所來也少往來者營軍者也少塵少也辭卑而益備者進也其人來使辭卑使間視之敵增備也必進來辭強而進驅者退也詭詐也來馳驅無所畏是欲退輕車先出居其側者陣也陣兵欲戰也輕車馳車在陣側無約而請和者謀也未有要約而使來請和者有間謀也奔走而陣兵者期也自與偏將期也半進半退者誘也倚仗而立者飢也倚仗矛戟而立者飢之意汲役先飲者渴也向人見利而不進者勞也士疲勞也敵人來見我利而不能擊進者疲勞鳥集者虛也敵大作營壘示我眾而鳥集其上其中虛者也夜呼者恐也軍士夜喧爭將不勇相驚而無備者恐懼也軍擾者將不重也無威重旗動者亂也旌旗謬動東西傾倚者亂也吏怒者倦也軍吏悉怒將者疾倦粟馬食肉軍無懸箠不及其舍者窮寇也穀馬食肉不復蓄積無懸簞之食欲死戰此窮寇也箠即簞之類也諄諄翕翕徐言入入者失眾也諄諄者語貌又足貌也翕翕者不直貌上失卒之心少氣之意徐言入入者與之言安徐之貌此將失其眾也諄章淪切翕許及切數賞者窘也軍不索敵數行賞欲士卒之力戰者此恐窘者也數罰者困也數行刑罰者教令施廢是困軍也先暴而後畏其眾者不精之至也先行卒暴於士卒而後欲畏己者此將不精之極也來委謝者欲休息也戰未相伏而下其意氣相委謝者欲休息也兵怒而相迎久而不合又不相去必謹察之備奇伏也此必有間諜也又曰凡敵有不卜而與戰有不占而避之疾風大寒早興冥選部冰濟度盛夏炎熱興役無間行飢驅渴務取於遠師久無糧士眾怨怒妖祥疑惑上不能止軍資既竭時多霖注欲掠無所師眾不多地土不利人馬疾疫道遠日暮士卒勞倦飢未及食解甲而息將薄吏輕士卒不固三軍數驚師徒無助陣而未定舍而未畢行坂涉險半隱半出諸如此類擊而勿疑若土地廣大人眾富盛上愛其下惠施流布賞信刑察發止得時行陣居列任賢使能師徒習教兵甲精銳四鄰有助大國之援凡如此類憚而避之故曰見可而進知難而退也, WYG: 二}
