  - {type: variant, offset: 2638, length: 15, content: 凡與敵相逢持軍相守欲知彼筭將揣, SBCK: 夫戰之取勝此豈求之於天地在乎因人以成之歷􅀚古人之用間}
  - {type: variant, offset: 2638, length: 0, content: '', WYG: 夫戰之取勝此豈求之於天地在乎因人以成之厯觀古人之用間其妙非一也即有間其君者有間其親者有間其賢者有間其能者有間其助者有間其隣好者有間其左右者有間其縱横者故子貢史廖陳軫蘇秦張儀范雎等皆憑此術而成功也且間之道有五焉有因其邑人使潛自察而致詞焉有因其事故洩虛假令告示焉有因敵之使矯使其事而反之焉有審擇賢能覘彼向背虛實而歸説之焉有佯緩罪戾微漏我偽情浮計使死報之焉}
