  - {type: variant, offset: 751, length: 1114, content: 是而甚以臣觀之不復周矣世祖曰若如卿言則效在不遠其子必復世襲之後又問曰早晚當滅順曰臣略見其子並非俊才能保一隅如燉煌太牧犍器性粗立若繼蒙遜者必此人也然比之於父僉謂不逮殆天所用資聖明也既而蒙遜死問至世祖謂順曰卿言蒙遜死今則驗矣又言牧犍立何其妙哉晚克涼州知當不遠於是賜絹千疋廄馬一疋進號安西將軍寵待彌厚唐書曰武德初劉武周據太原使其將宋金剛屯於河東太宗往征之謂諸將曰金剛懸軍千里深入吾地精兵驍將皆在於武周自據太原專倚金剛以為捍蔽金剛雖眾內實空虛虜掠為資意在速戰我堅營蓄銳以挫其鋒分兵汾隰衝其心腹彼糧盡計窮自當遁走當待此機未宜速戰於是遣劉弘等絕其糧道其眾遂餧金剛果遁又曰武德中李靖隨河間王孝恭討蕭銑師至于清江剋銑荊門遣其將乘勝入北江銑悉兵以拒之孝恭將戰李靖止之曰楚之輕銳難與爭鋒今新失荊門盡兵出戰此救敗之師也非其本圖勢不能久一日不戰賊必兩分留輕兵以抗我退羸師以自守此即勢虧力弱擊之必捷孝恭不從遣靖按營自以銳師水戰孝恭果敗于南岸又曰隋末王世充殺其主越王侗自僭偽號太宗率師討之世充求援于河北竇建德將全軍赴之諸將以二賊合勢眾寡不敵宜退舍以避之行臺郎中薛收獨進計曰王世充據有東都府庫填積其下兵士皆是江淮精銳其所患者在於乏食耳是以為我所持求戰不可建德親揔軍旅來拒我師亦當盡彼驍雄期於奮決若縱其至此兩寇相連轉河北之糧以相資給則伊洛之間戰鬭不已今宜分兵守營深其溝防即世充欲戰慎勿出兵大王親選猛銳先據成皋之險訓兵坐甲以待其至彼以疲弊之師當我堂堂之勢一戰必克建德既破則世充自下不過兩旬夏鄭二主可面縛於麾下矣若退兵自守計之下也秦王喜曰合吾意是日出師據虎牢卒擒建德又曰隋煬帝為突厥所圍郡縣皆發赴援時太宗年未弱冠召募從軍隸屯衛將軍雲定興師將發太宗勸之多齎旗鼓設疑兵以威突厥定興初不納太宗謂之曰始畢掃其境內敢圍天子本疑國家倉卒無援忽見旗鼓之盛必謂救兵雲集今者師進可前後相次令數十里間連亘不絕書則旗幡相續夜則鉦鼓相應以張形勢賊見必懼望塵而退此計之上也不然則為所輕悉軍來戰公必不支矣定興悅而從焉將次崞縣突厥候騎馳告始畢曰兵大至遂解圍而退果如所籌又曰太宗遣李靖經略突厥以張公謹副公謹因言突厥可取之狀曰頡利縱慾肆情窮凶極暴誅害良善昵近小人此即主昏於上其可取一也又其別部同羅僕骨廻紇延陀之類並自立君長將圖反噬此則眾叛於下其可取二也頡利被疑輕騎自免柘設出討疋馬不歸欲谷喪師立足無地則兵挫將敗其可取三也塞北霜早糇糧乏絕天降之災因以饑饉其可取四也頡利踈其突厥委諸胡人胡人翻覆是其常性大軍一臨內必生變其可取五也華人入北其類實多比聞自相嘯聚保據山險師出塞垣自然有應其可取六也太宗深納之及破定襄敗頡利頗預謀略進爵為國公又曰元和十年王師討淮西鎮州鎮度使王承宗淄青節度李師道謀撓王師遣刺客於京, SBCK: 杏}
