  - {type: 'tls:seg', offset: 233, content: '', id: KR3k0012_CHANT_292-2a.8}
  - {type: variant, offset: 233, length: 0, content: '', SBCK: 􅁗間來奢善食遣之食音寺間以報􅁗將以爲奢師怯弱而止不行奢一隨而卷甲趨􅁗師擊破之斯則反用彼間又曰􅁗與趙兵相拒長平趙孝成王使廉頗爲將固壁不戰秦數挑戰廉頗不岀􅁗之間言曰􅁗之所患獨畏馬服趙奢之子爲將耳趙王信􅁗之間因以奢子爲將終爲􅁗將白起所敗史記曰楚漢相持未決勝負陳平言於漢王曰彼項王有骨鯁之臣以亞父范増鍾離昧龍且周殷之屬昧音妹且于間切不過數人耳大王誠能岀􅂢數萬斤金行反間間其君臣以疑其心項王爲人意忌信䜛必内相誅漢因舉兵攻之破楚必矣漢王然之乃出黄金四萬斤與平恣所爲不問出入平旣多以金縱反間於楚軍宣言}
  - {type: page-break, offset: 233, content: '', id: KR3k0012_SBCK_292-3a}
  - {type: variant, offset: 233, length: 0, content: '', WYG: 秦間來奢進食遣之食音寺間以報秦將以為奢師怯弱而止不行奢乃隨而卷甲趨秦西擊破之斯則反用彼間又曰秦與趙兵相距長平趙孝成王使亷頗為將固壁不戰秦數挑戰亷頗不出秦之間言曰秦之所患獨畏馬服趙奢之子為將耳趙王信秦之間因以奢子為將終為秦將白起所敗史記曰楚漢相持未决勝負陳平言於漢王曰彼項王有骨鯁之臣似亞父范増鍾離昧龍且周殷之屬昧音秣且子閭切不過數人耳大王誠能出捐數萬斤金行反間間其君臣以疑其心項王為人意忌信䜛必内相誅漢因舉兵攻之破楚必矣漢王然之乃出黄金四萬斤與平恣所為不問出入平既多以金縱反間於楚軍宣言諸將鍾離昧等為項王將功多矣然終不得裂地而王欲與漢為一滅項氏分王其地項王果疑之使使至漢漢王為太牢具舉進見楚使舉鼎俎而來也即佯驚曰吾以為亞父使乃項王使也復持去更以惡草具進楚使去肉更草萊之具使歸具以報項王項王果大疑亞父亞父欲急擊下滎陽城項王不信不肯聽亞父聞項王疑之乃大怒曰天下事大定矣君王自為之願賜骸骨歸未至彭城疽發背而死疽癰病也音干余切漢遣紀信詐降而漢王宵遁終滅項羽羽不悟反間而亡也又曰漢使酈食其説齊王田廣廣捨兵與酈生縱酒漢將韓信因齊無備襲齊破之田廣烹食其此偶成韓信用死間之勢又曰漢高帝被匈奴單于冐頓圍於白登乃使間厚遺閼氏乃謂冐頓曰兩主不相困今得漢地而單于終非能居之也且漢王亦有神單于察之冐頓乃解圍之一角於是高帝令士皆持滿傅矢外鄉從解角直出境與大軍合而冐頓遂引兵而去又曰高祖紀曰上問豨將皆故賈人也上曰吾知所以與之乃以金㗖將豨將多降者陳豨也後漢書曰西域將兵長史班超發于闐諸國兵擊莎車龜兹國揚言兵少不敵罷散乃隂縱生口歸以告龜兹王喜而不虞超即潛勒兵馳莎車營大破降之斯亦同死間之勢晉書曰益州牧羅尚遣將隗伯攻蜀賊李雄於郫城未有勝負雄乃募武都人朴泰鞭之見血使譎羅尚欲為内應以火為期尚信之悉出精兵遣隗伯等率兵從泰擊雄雄將李驤於道設伏泰以長梯倚城而舉火伯軍見火起皆争緣梯泰又以繩汲上尚軍百餘人皆斬之雄因放兵内外擊之大破尚軍此用内間之勢又曰劉曜逼長安復圍北城太守麴昌遣使求救於麴充充率歩騎赴之去城數十里賊繞城放火烟塵蔽天反間麴充曰郡城已䧟焚燒向盡軍無及矣充信之衆懼而潰後數日麴昌突圍赴長安北城遂䧟崔鴻十六國春秋曰後梁吕光將吕延伐乞伏乾歸大敗之乾歸乃縱反間稱衆潰東奔成紀延信而追之延司馬耿稚曰告者視高而色動必有姦計不可從相遇戰敗死之魏書曰陸俟擊蓋吳於杏城大敗之獲吳二叔諸將請送京師俟獨不許曰吳一身藏竄非其親信誰能獲之若停十萬之衆以追一人非上䇿也不如私許吳叔免其妻子使自追吳擒之必也}
