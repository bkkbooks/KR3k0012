  - {type: variant, offset: 229, length: 1, content: 頓, krp: 唯命是聽子反懼與之盟而告楚子退三十里宋及楚平華元若不因間若不用課无由得入楚}
  - {type: variant, offset: 231, length: 0, content: '', SBCK: 也又曰楚師伐鄭鄭人將奔楚師夜遁諜告曰楚幕有烏乃止禮記曰晉人之覘宋者反報於晉侯曰陽門之介夫死而子罕哭之哀而民說殆不可伐也從之戰國䇿曰鄭武公欲伐胡先以其子妻胡因問群臣曰吾欲用兵誰可伐者大夫􅀜思其曰胡可伐武公怒而戮之曰胡兄弟之囯子言伐之何也胡君聞之以鄭爲親巳而不備鄭鄭襲胡取之此用死間之􅀔又曰燕昭王以樂毅爲將破齊七十餘城及惠王立與毅有􅂩齊將田單乃縱反間於燕宣言曰齊王巳死城不拔者二耳樂毅畏誅而不敢歸以伐齊爲名實欲連兵南靣王齊齊人未附故且緩即墨殘矣燕王以爲然使􅀐劫代毅燕人士卒離心單又縱反間曰吾懼燕人掘吾城外冢墓僇先人燕軍從之即墨人激怒請戰大敗燕師所亡七十餘城悉復之僇與戮同又曰􅁗師圍趙閼與音餘趙將趙奢救之去趙國都三十里}
  - {type: page-break, offset: 231, content: '', id: KR3k0012_SBCK_292-2b}
  - {type: variant, offset: 231, length: 0, content: '', WYG: 也又曰楚師伐鄭鄭人將奔楚師夜遁諜告曰楚幕有烏乃止禮記曰晉人之覘宋者反報於晉侯曰陽門之介夫死而子罕哭之哀而民説殆不可伐也從之戰國䇿曰鄭武公欲伐胡先以其子妻胡因問羣臣曰吾欲用兵誰可伐者大夫關其思曰胡可武公怒而戮之曰胡兄弟之國子言伐之何也胡君聞之以鄭為親已而不備鄭鄭襲胡取之此用死間之法又曰燕昭王以樂毅為將破齊七十餘城及惠王立與樂毅有隙齊將田單乃縱反間於燕宣言曰齊王已死城不拔者二耳樂毅畏誅而不敢歸以伐齊為名實欲連兵南面王齊若騎刼早為將則即墨殘矣燕王以為然使騎刼代毅燕人士卒離心單又縱反間曰吾懼燕人掘吾城外冢墓僇先人燕軍從之即墨人激怒請戰大敗燕師所亡七十餘城悉復之僇與戮同又曰秦師圍趙閼與音餘趙將趙奢救之去趙國都三十里}
