  - {type: variant, offset: 568, length: 257, content: 等據州城反州人李賢乃招集豪傑謀曰賊起倉卒便誅二將其勢雖盛其志已驕然其政令莫施唯以殘剝為業夫以羇據之賊而馭烏合之眾勢自離解今若從中擊之賊必喪膽如吾計者指日取之眾皆從賢乃率敢死士三百人分為兩道乘夜鼓譟而出群賊大驚一戰而敗狼遁走追斬之後魏書曰李順使涼州還世祖問蒙遜政教得失順曰蒙遜專威河右三十許年雖不能貽厥將來獨足以終其一世但前歲表許十月送曇元讖及臣往迎便乖本意不忠不信於是而甚以臣觀之不復周矣世祖曰若如卿言則效在不遠其子必復世襲之後又問曰早晚當滅順曰臣略見其子並非俊才能保一隅如燉煌太牧犍器性粗立若繼蒙遜者必此人也然比, WYG: 歌}
