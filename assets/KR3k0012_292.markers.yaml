  - {type: variant, offset: 2414, length: 2, content: 甲首, SBCK: 呉二叔諸將請送京師俟獨不許曰呉一身藏竄非其親信誰能獲之􅀂停十萬之衆以追一人非上䇿也不如私許呉叔免其妻子使自追吴擒之必也諸將咸曰今來討賊旣破之獲其二叔唯走一人何所復至俟曰呉之恃逆夲自天性今􅀂獲免必誑惑愚人稱王者不死妄相扇動爲患必大遂遣呉二叔與之期呉叔不至諸將皆咎於俟俟曰此未得其便可必不背他日果斬呉以至皆如所言俟之明略皆此􅀋也通典曰東魏將段琛據冝陽遣將牛道􅁪扇誘邊人西魏將韋孝寛拒之遣諜之訪獲道􅁪手跡令善書者僞作道􅁪與孝寛書論歸欵之意又爲落燼燒迹􅀂火下書者還令諜人遺之於琛營琛得書果疑之道所經略皆不見用孝寛知其離沮因出竒兵掩襲擒道恒及琛等崤澠遂清又曰東魏大將齊神武率兵趣沙苑西魏大將周文帝遣將逹奚武覘之武從}
