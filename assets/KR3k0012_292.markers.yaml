  - {type: 'tls:seg', offset: 1866, content: '', id: KR3k0012_CHANT_292-11a.7}
  - {type: variant, offset: 1866, length: 544, content: 煞宰相武元衡憲宗怒命御史中丞裴度為宰相專主兵機以誅三盜時淮西鎮冀兩道用軍度支儲運供餉不暇復又諸軍玩寇陰與賊通冀朝廷力竭即行赦雪議者患之宰相韋貫之奏曰陛下豈不知建中之事乎天下兵始於蔡急魏應齊趙同惡德宗率天下兵令馬燧李抱真急擊之物力既屈朱泚乘間為亂朱滔南向指闕致使梁漢為府奉天有行皆陛下親所聞見非他也不能忍待次第速於滅賊故也陛下獨不能寬歲月之計俟拔蔡而圍鎮耶上深然之而已下詔矣後擒元濟而承宗服果如貫之所籌漢晉春秋曰亮圍祁山招鮮卑軻比能等至故北地石城以應亮於是魏大司馬曹真有疾司馬宣王自荊州入朝魏明帝曰西方事重非君莫可付者乃使西屯長安都督張郃費曜戴陵郭淮等宣王使曜陵留精兵四千上邽餘眾悉出西救祁山郃欲分駐雍宣王曰料前軍獨能當之者將軍言是也不能當而分為前後此楚之三軍所以為黥布擒也遂進亮分兵留攻自逆宣王于上邽郭淮費曜邀亮亮破之因大芟其麥宣王遇於上邽之東歛兵依嶮軍不得交亮引兵而還宣王尋亮至於鹵城張郃曰彼遠來逆我請戰不得謂我利在不戰欲以長計制之也且祁山大軍以近人情自固可止屯於此分為奇兵亦出其後不宜進前而不敢逼坐失民望也今亮懸軍食少亦行去矣宣王不從固尋亮既至又登山掘營不肯戰賈詡魏平數請救且曰公畏蜀如畏虎奈天下笑何宣王病之諸將咸請戰五月辛巳乃使張郃攻無當監何平於南國自案中道向亮亮使魏延高翔吳班赴距, SBCK: ''}
