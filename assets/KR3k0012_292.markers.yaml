  - {type: variant, offset: 2860, length: 516, content: 必須料敵制勝誡於小利然後可立大功矣或又問曰所謂料敵者何對曰凡料敵者料其彼我之形定乎得失之計始可兵出而決於勝負矣當料彼將吏孰與己和客主孰與己逸排甲孰與己堅器械孰與己利教練孰與己明地形孰與己險城池孰與己固騎畜孰與己多糧儲孰與己廣工巧孰與己能秣飼孰與己豐資貨孰與己富以此揣而料之焉有不保其勝哉夫軍無小聽聽必審也戰無小利利必大也審聽之道詐亦受之實亦受之工亦受之拙亦受之其詐而似實亦受之其實而似詐亦受之但當明聽其實參會眾情徐思其驗鍛鍊而使不得逆詐目聰挫折愚人之詞又不得聽庸人之說稱敵寡弱輕侮眾心而不料其虛實又不得受敵人以小利餌我勇士輒掠財畜獲其首級將闇不斷而重賞之忽敵無備必為所敗揣敵之術亦易知矣若辭怒而不戰者待其援也杖而立汲而先飲者倍程迫速渴之兼也夫欲行無窮之勢圖不測之利其事煩多略陳梗概而已若遇小寇而有不可擊者為其將智而謀深士勇而軍整鋒甲堅銳而地險騎畜肥逸而令行如此則士蓄必死之心將懷擒敵之計此當固而待之末得輕而犯也如逢大敵而必可鬭也彼將愚昧而政令不行士馬雖多而眾心不一鋒甲雖廣而兵刃不堅居地無固而糧運不繼卒無決戰之志傍無軍馬之援此可襲而取之抑又聞之統戎行師攻城野戰當須料敵然後縱兵夫為將能識此之機變知彼之物情亦何慮功不逮鬭不勝哉又曰敵有, WYG: 太平御覽卷二百九}
