  - {type: variant, offset: 2280, length: 290, content: 千餘人轔轢也藉相蹈藉也由此不敢復向雲中又曰耿恭與匈奴戰恭以毒藥傅矢傳語匈奴曰漢家箭神其中瘡者必有異因發強弩射之虜中矢者視瘡皆沸遂大驚會天暴風雨隨而擊之殺傷甚眾匈奴震怖相謂曰漢兵神真可畏也遂解去又曰耿弇勑諸校會會猶集也後五日攻西安張藍聞之晨夜儆守至期夜半弇勑諸將皆蓐食會明至臨淄城護軍荀梁等爭之以為宜速攻西安弇曰不然西安聞吾欲攻之日夜為備然臨淄出不意而至必驚擾吾攻之一日必拔臨淄即西安孤張藍與步隔絕必復亡去所謂擊一而得兩者也若先攻西安不卒下頓兵堅城死傷必多縱能拔之張藍引軍還奔臨淄并兵合勢觀人虛實吾深入敵地後無轉輸旬月之間不戰而困諸軍之言未見其宜遂攻臨淄半日拔之入據其城又曰高峻據高, SBCK: 數萬太}
