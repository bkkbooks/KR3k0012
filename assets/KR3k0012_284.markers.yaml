  - {type: variant, offset: 118, length: 0, content: '', krp: 遣臧宮將北軍及黎陽營數千人圍之賊榖食多數攻不下士卒死傷帝召公卿諸侯王問方略皆曰冝重其購賞時顯宗爲東海王獨對曰妖巫相刧勢無乆立其中必有悔欲亡者但外圍急不得走耳冝小挺緩挺解也令得逃亡逃亡則一亭長足以禽矣帝然之即勑宮撤圍緩賊賊衆分散遂斬臣鎮等又曰岑彭南擊秦豐與其大將蔡宏拒彭等於鄧數月不得進帝怪以讓彭彭懼於是夜勒兵馬申令軍中使明旦西擊山都山都縣名屬南陽郡乃緩所獲虜令得逃亡歸以告豐豐即悉其軍西邀彭彭乃潜兵渡沔水擊其將張楊於阿頭山大破之沔水源出武都東狼谷中即漢水之上源也阿頭山在襄陽從川谷間伐木開道直襲黎丘擊破諸屯兵豐聞大驚馳歸救之彭與諸將依東山爲營豐與蔡宏夜攻彭彭預爲之備出兵逆擊之豐敗走追斬蔡宏又皇甫嵩傳曰梁州賊王國圍陳倉復拜嵩爲左將軍督前將軍董卓各率二萬人拒之卓欲速進赴陳倉嵩不聽卓曰智者不後時勇者不留決速救則城全不救則城滅全㓕之勢在於此也嵩曰不然百戰百勝不如不戰而屈人之兵是以先爲不可勝以待敵之可勝不可勝在我可勝在彼彼守不足我攻有餘孫子之文有餘者動於九天之上不足者䧟於九地之下玄女三宫戰法曰行兵之道天地之寳九天九地各有表裏九天之上六甲子也九地之下六癸酉也子能順之萬全可保今陳倉雖小城守固備非九地之䧟也王國雖強而攻我之所不救非九天之勢也夫勢非九天攻者受苦害䧟非九地守者不拔國今巳䧟受害之地而陳倉保不拔之城我可不煩兵動衆而取全勝數十里勢如風雨所至皆奔散初述聞漢軍在平曲故遣大軍逆之及漢兵至武陽出延岑軍後蜀地震駭又曰馬援爲隴西太守發歩騎三千人擊先零羗將其妻子輜重移阻於允吾谷允吾音銳牙援仍潜行間道掩赴其營羗大驚壞復逺徙唐翼谷中援復追討之羗引精兵聚北山上援陳軍向山而分遣數百騎繞襲其後乗夜放火擊鼓叫譟虜遂大潰又曰馮異與鄧禹率車騎將軍鄧弘等議攻赤眉異曰賊衆尚多可稍以恩}
