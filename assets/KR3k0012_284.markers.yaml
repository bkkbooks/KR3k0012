  - {type: variant, offset: 539, length: 1, content: 秦, WYG: 卓曰不可兵法窮寇勿迫歸衆勿追司馬兵法之言今我追國是廹歸衆追窮寇也困獸歸鬬蜂蠆有毒况大衆乎嵩曰不然前吾不擊避其鋭也今而擊之待其衰也所擊疲師非歸衆也且走者莫有鬬志以整擊亂非窮寇也遂獨進擊之使卓為後拒連戰大破之斬首萬餘級國走而死卓大慚恨由是拒嵩又曰吳漢岑彭討公孫述述使其将延岑等悉兵拒廣漢及資中又遣将侯丹率二萬餘人拒黄石彭乃多張疑兵使䕶軍楊翕與臧宫拒延岑等自分兵浮江下還江州今南郡即漢江州縣泝都江而上都江城都江也襲擊侯丹大破之因晨夜倍道兼行二千餘里徑拔武陽使精騎馳廣都去城都數十里勢如風雨所至皆奔散初述聞漢軍至武陽繞出延岑軍後蜀地震駭又曰馬援為隴西太守發歩騎三千人擊先零羗将其妻子輜重移阻於允吾谷允吾音鈆牙援乃潛行間道掩赴其營羗大驚攘復逺徙唐翼谷中援復追討之羌引精兵聚北山上援陳軍向山而分遣數百騎繞襲其後乗夜放火擊鼓呌譟遂大潰又曰馮異與鄧禹率車騎将軍鄧𢎞等議攻赤眉異曰賊衆尚多可稍以恩信傾難卒用兵破也上今使諸将屯澠池要其東而異擊其西一舉取之此萬全計也禹𢎞不聴𢎞遂大戰移日赤眉佯敗棄輜重而走車皆載土以豆覆其上兵士餓爭之赤眉自引還擊𢎞𢎞}
