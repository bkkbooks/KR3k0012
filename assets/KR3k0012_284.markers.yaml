  - {type: variant, offset: 845, length: 0, content: '', WYG: 霸馬武擊河南賊周建於垂恵賊帥蘇茂將五校兵四千餘人救建而先遣精騎遮擊馬武軍糧武往救之建縦城中兵出夾擊武武恃霸之援戰不甚力為茂建所敗武軍奔過霸營大呼求救霸曰賊兵盛出必兩敗努力而已閉營堅壁軍吏皆爭之霸曰茂兵精鋭其衆又多吾吏士心恐而馬武}
