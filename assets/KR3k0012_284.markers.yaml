  - {type: variant, offset: 1983, length: 895, content: 年習於攻守今兵寡少未易可進當須諸郡所發悉至爾乃并力攻之申令軍中恣聽射獵兵士喜悅大小皆相與從禽尚乃密使所親客潛焚其營積皆盡獵者來還莫不泣涕尚人人慰勞深自咎責因曰卜陽等財寶足富數代諸卿但不并力耳所亡少少何足介意眾聞咸憤踊尚勑令秣馬蓐食明旦徑赴賊屯陽鴻等自以深固不復設備吏士乘銳遂大破平之尚出兵三年群寇悉定又曰廉范為雲中太守會匈奴大入塞烽火日通故事虜入過五千人移書傍郡吏欲傳檄求救范不聽自率士卒拒之虜眾盛而范兵不敵會日暮令軍士各交縛兩炬三頭爇火營中星列用兩炬交縛如十字爇其頭手持一端使敵人望之疑兵士之多虜遙望火多謂漢兵救至大驚待旦將退范乃令軍中蓐食晨往赴之蓐食早起食於寢蓐中也斬首數百級虜自相轔藉死者千餘人轔轢也藉相蹈藉也由此不敢復向雲中又曰耿恭與匈奴戰恭以毒藥傅矢傳語匈奴曰漢家箭神其中瘡者必有異因發強弩射之虜中矢者視瘡皆沸遂大驚會天暴風雨隨而擊之殺傷甚眾匈奴震怖相謂曰漢兵神真可畏也遂解去又曰耿弇勑諸校會會猶集也後五日攻西安張藍聞之晨夜儆守至期夜半弇勑諸將皆蓐食會明至臨淄城護軍荀梁等爭之以為宜速攻西安弇曰不然西安聞吾欲攻之日夜為備然臨淄出不意而至必驚擾吾攻之一日必拔臨淄即西安孤張藍與步隔絕必復亡去所謂擊一而得兩者也若先攻西安不卒下頓兵堅城死傷必多縱能拔之張藍引軍還奔臨淄并兵合勢觀人虛實吾深入敵地後無轉輸旬月之間不戰而困諸軍之言未見其宜遂攻臨淄半日拔之入據其城又曰高峻據高平猶不下帝議遣使降之乃謂寇恂曰為吾行也若峻不降引耿弇等擊之恂奉璽書與峻峻遣軍帥皇甫文出謁辭禮不屈恂怒將誅文諸將諫曰高峻精兵萬人率多強弩西遮隴道連年不下今欲降之而反戮其使無乃不可乎恂不應遂斬之遣其副歸告峻曰軍帥無禮已戮之矣欲降急降不欲固守峻惶恐即日開城門降諸將皆賀因曰敢問殺其使而降其城何也恂曰皇甫文峻之腹心其所取計者也今來辭意不屈必無降心全之則文得其計殺之則峻亡其膽是以降耳諸將皆曰非所及也又曰吳漢在河北時鬲縣五姓共逐守長據城而反鬲縣名屬平原郡故城在今德州西北五姓蓋當土強宗豪右也鬲音革諸將爭欲攻之漢不聽曰使鬲反者皆守長罪也敢輕冒進兵者斬乃移檄告郡使收守長而使人謝城中五姓大喜即相率歸降諸將乃服曰不戰而下城非眾所及也, WYG: 四}
