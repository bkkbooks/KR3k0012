  - {type: variant, offset: 1501, length: 332, content: 圍之數十里列營百所雲車十餘瞰臨城中旗幟蔽野埃塵連天鉦鼓之聲聞數十里或為地道或輣橦城輣蒲萌切積弩亂發矢下如雨城中負楯而汲王鳳等乞降不許光武遂與諸營部俱進自將部騎千餘人前去大軍四五里而陣尋邑亦遣兵千餘合戰光武奔之斬首數十級諸部喜曰劉將軍平生見小敵怯今見大敵勇甚可怪也且復居前請助將軍光武復進尋邑兵却諸部兵乘之斬首數百千級連勝遂因而大敗通典曰王邑違九攻宛所以敗也又曰王郎起河北郎鉅鹿郡太守王饒據城光武圍數十日連攻不剋耿純說曰久守王饒士眾疲弊不如及大兵精銳進攻邯鄲若王郎已誅王饒不戰自服矣從之乃留兵守鉅鹿而進軍邯鄲屯其郭北郎數出戰無利城守急攻之二十餘日郎少傅李立為反間開門內漢兵遂拔邯鄲郎黨悉平又曰曹操圍袁尚鑿環城初令淺示若可越城中望見笑而不出操令一夜濬之廣深二丈決漳水以, SBCK: 驚}
