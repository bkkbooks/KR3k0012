  - {type: variant, offset: 59, length: 10, content: 見我走必空壁逐我若疾, SBCK: 弘據宛城儁因急擊弘斬之賊餘帥韓忠復據宛拒儁儁兵少不敵乃張圍結壘赴土山以臨城内因鳴鼓攻其西南賊悉衆赴之儁自將精卒五千掩其東北乘城而}
  - {type: variant, offset: 59, length: 8, content: 見我走必空壁逐我, WYG: 𢎞據宛城雋因急擊𢎞斬之賊餘帥韓忠復據宛拒雋雋兵少不敵乃張圍結壘起土山以臨城内因鳴鼓攻其西北賊悉衆赴之雋自將精卒五千掩其東北乗城而入忠乃退保小城惶懼乞降司馬張超及徐璆秦頡皆欲聴之雋曰兵有形同而勢異者秦項之際人無定主也故賞附以勸來耳今海内一統唯黄巾造冦納降無以勸善討之足以懲惡今}
