  - {type: variant, offset: 2571, length: 307, content: 猶不下帝議遣使降之乃謂寇恂曰為吾行也若峻不降引耿弇等擊之恂奉璽書與峻峻遣軍帥皇甫文出謁辭禮不屈恂怒將誅文諸將諫曰高峻精兵萬人率多強弩西遮隴道連年不下今欲降之而反戮其使無乃不可乎恂不應遂斬之遣其副歸告峻曰軍帥無禮已戮之矣欲降急降不欲固守峻惶恐即日開城門降諸將皆賀因曰敢問殺其使而降其城何也恂曰皇甫文峻之腹心其所取計者也今來辭意不屈必無降心全之則文得其計殺之則峻亡其膽是以降耳諸將皆曰非所及也又曰吳漢在河北時鬲縣五姓共逐守長據城而反鬲縣名屬平原郡故城在今德州西北五姓蓋當土強宗豪右也鬲音革諸將爭欲攻之漢不聽曰使鬲反者皆守長罪也敢輕冒進兵者斬乃移檄告郡使收守長而使人謝城中五姓大喜即相率歸降諸將乃服曰不戰而下城非眾所及也, SBCK: 御覽第二百八十四卷終}
