  - {type: variant, offset: 2272, length: 0, content: '', SBCK: 􅀐出迎秉降又曰􅀽紹曹公相持於官渡俎授􅀃紹俎側居切可遣蔣竒別爲支軍於外以絶曹公之路紹不從許攸進曰曹公兵少而悉師拒我許下餘守􅀔必空弱􅀂分遣輕軍星行掩襲許伏則操爲成擒如其未潰可令首尾奔命破之必也紹又不用竟爲曹公所敗又曰曹公征河北師次頓兵黒山賊于毒等攻東武陽曹公引丘西入山攻毒等夲屯毒聞之弃武陽還魏武要擊於内黄大破之又曰曹公征張繡於穰荀攸曰繡仰食於劉表於乆而􅀔必離今緩之可誘致急之則相救公不從與繡戰表果救之公敗歸又曰青徐黄巾三十萬衆入渤海界欲與黒山合公孫瓉率歩􅀐二萬人逆擊於東光南大破之斬首二萬餘}
  - {type: page-break, offset: 2272, content: '', id: KR3k0012_SBCK_284-7a}
  - {type: variant, offset: 2272, length: 0, content: '', krp: 騎出迎秉降又曰袁紹曹公相持於官渡俎授說紹俎側居切可遣蔣竒別爲支軍於外以絶曹公之路紹不從許攸進曰曹公兵少而悉師拒我許下餘守勢必空弱若分遣輕軍星行掩襲許伏則操爲成擒如其未潰可令首尾奔命破之必也紹又不用竟爲曹公所敗又曰曹公征河北師次頓兵黒山賊于毒等攻東武陽曹公引丘西入山攻毒等夲屯毒聞之弃武陽還魏武要擊於内黄大破之又曰曹公征張繡於穰荀攸曰繡仰食於劉表於乆而勢必離今緩之可誘致急之則相救公不從與繡戰表果救之公敗歸又曰青徐黄巾三十萬衆入渤海界欲與黒山合公孫瓉率歩騎二萬人逆擊於東光南大破之斬首二萬餘}
