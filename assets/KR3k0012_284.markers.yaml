  - {type: variant, offset: 1052, length: 552, content: 項羽於垓下羽兵尚眾漢兵圍之皆為楚歌楚人久苦征戰因敗思歸遂潰通典曰斯亦攻心之機也又曰漢王遣將韓信擊魏魏王盛兵蒲坂塞臨晉信乃益為疑兵陳舩欲度臨晉而伏兵從夏陽以木罌缻度軍以木為器如罌缻以度軍無舡且尚密也缻缶同襲安邑虜魏王豹又曰吳王濞反濞疋備反漢將周亞夫率師禦之壁於下邑吳師奔壁東南亞夫備西北吳師果以精兵奔西北不得入大敗漢書曰先零音憐罕開音汧二種羌皆解仇合黨為寇漢將趙充國討之守便宜上書曰先零羌虜欲為背叛故與罕開解仇然其私心恐漢兵至而罕開背之也臣愚以為其計請擊先零若先擊罕羌零必助之今虜馬肥饒糧擊之恐不能傷害適使先零施德於罕羌也堅其約合其黨虜交堅黨合誅之用力數倍臣恐國家憂累猶十數年不一二歲而已先誅先零則罕開之屬不煩兵服矣宣帝從之果如其策又曰王莽末光武起兵據昆陽城時唯有八九千人莽遣將王邑嚴尤討之軍至城下者十萬光武留王鳳等守城與李軼等十餘騎夜出既至郾定陵悉發諸營兵嚴尤說王邑曰昆陽城小而堅今假號者宛亟進大兵亟急也紀力切彼必奔走則昆陽自服邑曰吾昔以武牙將軍圍翟義坐不生得以見責今將百萬之眾過城而不能下何謂耶遂圍之數十里列營百所雲車十餘瞰臨城中旗幟蔽野埃塵連天鉦鼓之聲聞數十里或為地道或輣橦城輣蒲萌切積弩亂發矢下如雨城中負楯而汲王鳳等乞降不許光武遂與諸營部俱進自將部騎千餘人前去大軍四五里而陣尋邑亦遣兵千餘合戰光武奔, WYG: ''}
