  - {type: variant, offset: 113, length: 3, content: 戰良久, SBCK: 破之乗勝逐北數十里斬首萬餘級忠等遂降又曰董卓將三萬討先零羌卓於望垣北望垣縣屬天水郡爲羌胡所圍糧食乏絶進退逼急乃於所渡水中僞立􅋣以爲捕魚而潜從􅋣下過軍續漢書􅋣字作堰北賊追之决水巳􅀷不得渡時衆軍敗退唯卓全師而還又曰臧宮將兵屯駱越越人謀叛從蜀宮兵少力不能制㑹屬縣送委輸車數百乗至宫夜使鋸斷城門限令車迴轉岀入至旦即越人候伺者聞車聲不絶而門限斷相告以漢兵大至其渠帥乃奉牛酒以勞軍營宫陳兵大㑹擊牛釃酒饗賜慰納之又曰蜀有妖巫維汜弟子單臣傅鎮等復妖言相聚入原武城維或作侯刧吏人自稱將軍}
