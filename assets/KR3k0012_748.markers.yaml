  - {type: variant, offset: 3448, length: 329, content: 篇洛陽鄴許三都宮觀始就命誕銘題以為永制以御筆墨皆不任用因奏曰夫工欲善其事必先利其器用張芝筆左伯紙及臣墨兼此三具又得臣手然後可以逞徑丈之勢方寸千言俗說曰桓玄取羊欣為征西行軍參軍玄愛書呼欣就坐仍遣信呼顧長康與共論書至夜良久乃罷世論曰鍾會有異志密白鄧艾有反狀又會善效人書於劍閣要艾章表皆易其言令倨傲多有矜伐以疑之論衡曰夫河出圖雒與洛同出書聖帝明王之瑞應也蒼頡作文字筆與天地同指與鬼神合何惡而致雨粟鬼哭之怪哉又曰書官諱丙日雲蒼頡以丙日死也世說曰韋仲將善書魏明帝起殿安牓使仲將登梯題之既下頭髮皓然因是勑誡兒孫勿復學書王升之懷舊序曰余與從甥孫道濟交好特至昔寓荊州同處一室冬多閑暇長共學書余收而錄之欲以為索居之愛道濟因記紙末曰舅還山之曰覽此相存閑書見其手跡皎若平日悽悵傷心, SBCK: 八}
