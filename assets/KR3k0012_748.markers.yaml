  - {type: variant, offset: 223, length: 190, content: 之佐屈節治單父以自試意者其以此諫乎公寤太息歎曰寡人亂宓子之政而責其善數矣漢書曰陳遵長八尺餘長頭大鼻容貌甚偉略涉傳記贍於文辭性善書與人尺牘主皆藏去以為榮又曰宣帝時中郎將張彭祖少與帝微時同席研書及帝即尊位彭祖以舊恩封陽都侯又曰田蚡學盤盂諸書孔甲二十六篇雜家書後漢書曰孫敬字文寶少時畫地學書日進焉東觀漢記曰樂成靜王黨善吏書喜正文字也魏志曰胡昭善尺牘動見模楷衛覬好古文鳥篆隸草無所不善也晉, SBCK: 僧䖍論}
