  - {type: variant, offset: 1801, length: 165, content: 崔玄伯尤善草隸行狎之書為世模楷玄伯祖悅與范陽盧諶並以愽藝著名諶法鍾繇悅法衛瓘而俱習索靖諶傳子偃偃傳子邈悅傳子潛潛傳玄伯故魏初重崔盧之書唐書曰太宗嘗謂侍中魏徵曰虞世南死後無人可與論書徵曰禇遂良下筆遒勁甚得王逸少體太宗即日召令侍讀嘗以金帛購求王羲之書跡天下爭齎古書詣闕以獻當時莫能辯其真偽遂良備論所出一無所誤又曰虞世南字伯施同郡沙門釋, SBCK: 右軍孫僧}
