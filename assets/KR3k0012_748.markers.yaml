  - {type: variant, offset: 1986, length: 361, content: 其體由是聲名藉甚又曰柳公權字誠懸幼嗜學十二能為詞賦元和初進士擢第釋禢祕書省校書郎李聽鎮夏州辟為掌書記穆宗即位入奏事帝召見謂公權曰我於佛寺見卿筆蹟思之久矣即日拜右拾遺充翰林侍書學士遷右補闕司封員外郎穆宗政僻嘗問公權筆何盡善對曰用筆在心心正則筆正上改容知其筆諫也公權初學王書遍閱近代筆法體勢勁媚自成一家當時公卿大臣家碑板不得公權手筆者人以為不孝外夷入貢皆別署貨貝曰此購柳書上都西明寺金剛經碑備有鍾王歐虞禇陸之體尤為得意文宗夏日與學士聯句帝曰人皆苦炎熱我愛夏曰長公權續曰薰風自南來殿閣生微涼時丁袁五學士皆屬繼帝獨諷公權兩句曰詞清意足不可多得乃令公權題於殿壁字方圓五寸帝視之歎曰鍾王復生無以加焉又曰柳公權大中初轉少師中謝宣宗召昇殿御前書三紙軍容使西門季玄捧硯樞密使崔巨源過筆一紙真書十宇曰衛夫人傳筆法於王右軍一紙行書十一字曰永禪師, SBCK: ''}
