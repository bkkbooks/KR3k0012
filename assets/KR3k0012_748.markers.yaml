  - {type: variant, offset: 1486, length: 1, content: 梁, SBCK: 大經矣筆不欲捷亦不欲徐亦不欲平亦不欲側側竪令平峻不使傾捷則湏定徐則須利如此則其大較矣徐浩古跡記曰中宗時中書令宗楚客奏事承恩乃乞大小二王真跡勑賜十二卷大小各十軸楚客遂裝作十二扇屏風以禇遂良閑居賦枯樹賦爲脚大會貴要張以示之時薛稷崔湜盧藏用廢食歎美復不宴樂何延之蘭亭記曰蘭亭者晉右軍將軍㑹稽内史琅耶王羲之字逸少所書之詩序也右軍蟬聮美胄}
