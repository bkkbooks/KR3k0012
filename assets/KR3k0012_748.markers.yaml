  - {type: variant, offset: 1486, length: 1, content: 梁, WYG: 大經矣筆不欲捷亦不欲徐亦不欲平亦不欲側側豎令平平竣使側捷則須定徐則須利如此則其大較矣徐浩古跡記曰中宗時中書令宗楚客奏事承恩乃乞大小二王真迹勅賜二十卷大小各十軸楚客遂装作十二扇屏風以禇遂良閑居賦枯樹賦為脚大㑹貴要張以示之時薛稷崔湜盧蔵用廢食歎美復不晏樂何延之蘭亭記曰蘭亭者晉右軍㑹稽内史瑯琊王羲之字逸少所書之詩序也右軍蟬聨美胄}
