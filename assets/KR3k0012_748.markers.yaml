  - {type: variant, offset: 1481, length: 3, content: 並驅爭, SBCK: 二曰竒字即古文而異者也三曰􅂐書云小篆也四曰佐書秦􅀠書也五曰繆􅂐所以摹印也六曰鳥蟲所以書幡信也李嗣真書後品曰蟲􅂐者小學之所宗草􅀠者士人之所尚近代君子故多好之或時有可觀耳武平一徐氏法書記曰梁大同中武帝勑周興嗣撰千字文使温鐡石摸次羲之之迹以賜八王徐浩論書曰􅀄學之際冝}
