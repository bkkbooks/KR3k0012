  - {type: variant, offset: 2763, length: 1, content: 唯, WYG: 行書羲之之亞草書則索衛之下八分則有魏受禪碑稱此為最也又曰晉韋昶字文休太元中孝武帝改治宫室及廟諸門並欲使}
  - {type: variant, offset: 2763, length: 1, content: 唯, krp: 行書羲之之亞書則索衛之下八分則有魏受禪碑稱此爲最也又曰晉韋昶字文休太元中孝武帝改治宫室及廟諸門並欲使}
  - {type: variant, offset: 2765, length: 0, content: '', SBCK: 獻之隷書題牓獻之固辭乃使劉瓌以八分書之後又使文休以大􅂐改八分焉或問王右軍父子書君以爲如何荅曰二王自可謂能未是知書也又曰妙則筆王子敬得其筆歎爲絶丗又曰晉薄紹之字敬叔丹陽人也官至給事中善書憲草小王風格秀異􅀂干將出匣光芒射人書斷曰晉太元中新起太極殿謝安欲使子敬題牓以爲萬代寳而難言之乃說韋仲題陵雲臺事子敬知其旨乃正色曰仲將魏室大臣寧有此事使其􅀂此知魏德之不長安遂不之逼又曰齊王僧䖍善書孝武欲擅書名僧䖍不敢顯迹大明之丗常用掘筆書以此見容梁蕭子雲字景喬小􅂐草行諸體兼備而剏造小􅂐飛白意趣飄然􅀧畫之際有􅀂騫舉妍妙至極難與比肩故歐陽詢云飛白烏巾冠丗其後}
  - {type: page-break, offset: 2765, content: '', id: KR3k0012_SBCK_748-6b}
  - {type: variant, offset: 2765, length: 0, content: '', WYG: 獻之𨽻書題榜獻之固辭乃使劉瓌以八分書之後又使文休以大篆改八分焉或問王右軍父子書君以為如何答曰二王自可謂能未足知書也又文休妙于作筆王子敬得其筆歎為絶世又曰晉薄紹之字敬叔丹陽人也官至給事中善書憲章小王風格秀異若干将出匣光芒射人書斷曰晉太康中新起太極殿謝安欲使子敬題榜以為萬代寳而難言之乃說韋仲將題凌雲臺事子敬知其㫖乃正色曰仲将魏室大臣寧有此事使其若此知魏徳之不長安遂不之逼又曰齊王僧䖍善書孝武欲擅書名僧䖍不敢顯迹大明之世常用拙筆書以此見容又曰梁蕭子雲少善小篆草行諸體兼備而剏造小篆飛白意趣飃然㸃畫之際有若騫舉妍妙極難與比故歐陽詢云飛白張烏巾冠世其後}
