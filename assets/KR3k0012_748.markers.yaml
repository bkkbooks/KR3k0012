  - {type: variant, offset: 678, length: 540, content: 君家尊荅曰故當不同安曰外論不爾荅曰人郍得知又曰衛常字巨山轉黃門郎常善草隸書為四體書勢曰昔在黃帝創制造物有沮側魚切誦蒼頡者始作書契以代結繩蓋覩鳥跡以興思也因而遂滋則為之字有六義焉一曰指事上下是也二曰象形日月是也三曰形聲江河是也四曰會意武信是也五曰轉注老考是也六曰假借令長是也又曰索靖作書狀其辭曰聖皇御世隨時之宜蒼頡既生書契是為科斗鳥篆類物象形叡哲變通意巧滋生損之隸草以崇簡易百官畢脩事業正厲草書之為狀也婉若銀鉤漂若驚鸞舒翼未發若舉復安虫虵虬蟉力幽切或往或還頹阿郍以羸羸欻奮釁而桓桓及其逸遊盻乍正乍邪騏驥暴怒逼其轡海水窳隆揚其波芝草蒲萄還相結棠棣融融反其華玄熊對踞于山岳飛燕相追而差池舉而察之又似乎和風吹林偃草扇樹枝條順氣轉相比附窈嬈奴鳥切廉苫隨體散布紛擾擾以綺靡中持疑而猶豫玄螭狡獸嬉其間騰猿飛鯢相奔趣凌魚奮尾蛟龍反據投空自竄張設互距或若登高望其類或若既往而中顧或若倜儻而不群或若自檢於常度於是多才之英篤藝之彥役心精微躭此文憲守道兼權觸類生變離拆八體靡形不判去繁存微本象末亂上理開元下周謹按騁辭放手兩行冰散高音翰厲溢越流漫忽班班而成章言奇妙之煥爛體磥落而壯麗姿光潤以璀璨命杜度運其指使伯英迴其腕著絕勢於紈素垂百世之殊觀宋書劉穆之傳高祖書素拙穆之曰此雖小事然宣被四遠願公少復留意高祖既, SBCK: 貴胄失品次}
