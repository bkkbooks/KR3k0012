  - {type: variant, offset: 418, length: 6, content: 嘗詣門生家見, SBCK: 叔自過江東右之前唯廙爲最􅀞爲晉明帝師書爲右軍法又曰中書今王珉筆力過於子敬書舊品云有四疋素月朝操筆三暮便竟首尾如一又無誤字子敬􅃧云弟書如􅀐騾駸駸常欲度驊騮前又曰鍾公之書謂之盡妙鍾有三躰一曰銘石書妙者也二曰章程書傳小學秘書教者也三曰行狎書是者也二法皆丗人所善虞龢論書曰晉謝奉起廟悉用}
  - {type: variant, offset: 418, length: 6, content: 嘗詣門生家見, WYG: 叔自過江東右軍之前唯廙為最畫為晉明帝師書為右軍法又曰中書令王珉筆力過於子敬書舊品云有四疋素絹朝操筆至暮便竟首尾如一又無誤字子敬戲云弟書如騎騾駸駸常欲度驊騮前又曰鍾公之書謂之盡妙鍾有三體一曰銘石書最妙者也二曰章程書世傳祕書教小學者也三曰行狎書相聞者也三法皆世人所善虞龢論書曰晉謝奉起廟悉用}
