  - {type: variant, offset: 566, length: 1, content: 羲, SBCK: 理也􅁃元威論書曰余爲書十牒屏風書作十體間以采墨當時衆所驚異自尓絶筆唯留草本而巳其百體者懸針書垂露書􅁗望波􅃁書金鵲書玉文書鵠頭書虎爪書倒薤書偃波書幡信書制書列書日書月書風書雲書科斗署書胡書蓬書相書天竺書轉􅀫書一筆􅂐一筆􅊢飛白章草古又􅊢横書横書楷書小科􅊢芝英􅊢花草􅊢幡信􅀠鍾鼓􅀠龍虎􅂐鳯魚􅂐麒麟􅂐仙人􅂐科斗􅂐雲􅂐蟲􅂐魚􅂐鳥􅂐龍􅂐􅀛􅂐虎􅂐鸞􅂐龍虎􅀠鳯魚􅀠麒麟􅀠仙人􅀠科斗􅀠雲􅊢蟲􅊢魚􅊢鳥􅊢龍􅀠􅀛􅊢虎􅊢鸞􅀠龍文書􅀛文書䑕書牛書龍書虎草書兔書龍草書蛇草書馬書羊書猴書雞書大書豕書巳上皆采色其外復有大􅂐小􅂐銘鼎摹印刻符石經象形篇章震書到書反左書等及九體書所謂縑素書簡奏書牋表書行狎書檝書蒿書半草全草書此九法極真草}
