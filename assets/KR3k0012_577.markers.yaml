  - {type: variant, offset: 180, length: 0, content: '', SBCK: 又何爲􅁝桐之間忌曰大絃急以温者君也小絃㢘折以清者相也推之􅀷釋之舒者刑罰審也均諧之鳴者政令一也大小相盖回邪不相害者上下和鳴吏民相親也夫復而不亂者所以治昌連而徑者所以存亡故曰琴音調而天下治治國家弭人民無􅀂乎五音者矣王曰善忌}
