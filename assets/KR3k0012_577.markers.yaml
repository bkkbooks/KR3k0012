  - {type: variant, offset: 3189, length: 246, content: 寸五分闊七寸五分下闊六寸五分史記曰高漸離善擊筑與荊軻友見軻剌秦王不中而死乃變姓名入秦欲為軻報讎市中擊筑而乞人觀而美奏之秦王聞召之於前擊之王悅猶以疑焉熏其兩目置於帳中王躭之親近於漸離漸離望秦王歎息之聲舉筑以擊中王膝王怒之又曰高祖過沛大享故人父老酒酣高祖擊筑而歌曰大風起兮雲飛揚威加海內兮歸故鄉又曰荊軻之燕與屠狗高漸離飲於燕市酒酣高漸離擊筑荊軻和而於市中相樂也己而相泣旁若無人準京房曰準竹聲不可以度調故作準以定數準之狀如瑟長一丈而十三絃隱間九尺以應黃鍾之九寸中央一絃下有書分寸以為六十律清濁之節矣, SBCK: ''}
