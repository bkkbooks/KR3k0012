  - {type: variant, offset: 393, length: 0, content: '', SBCK: 音則不然亢厲微末以象殺伐之義中和之感不載乎心温和之動不存於躰夫然者乃所以爲乱亡之風家語曰伯牙皷琴鍾子期聽之方皷而志在太}
  - {type: variant, offset: 393, length: 0, content: '', WYG: 音則不然亢厲微末以象殺伐之義中和之感不載乎心温和之動不存乎體夫然者乃所以為亂亡之風也家語曰伯牙鼔琴鍾子期聽之方鼔而志在太}
