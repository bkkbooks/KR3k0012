  - {type: variant, offset: 670, length: 0, content: '', SBCK: 耻與魑魅争光阮籍樂論曰漢桓帝聞楚琴悽愴傷心􅀝户而悲慷􅁣長息曰善哉爲琴􅀂此而足矣􅀃苑曰應侯與賈子坐聞皷琴聲應侯曰今日琴一何悲也賈子曰夫張急調下故使之悲耳因張者良材也調下者官卑也取夫良材而卑之官安能}
  - {type: variant, offset: 670, length: 0, content: '', WYG: 耻與魑魅争光阮籍樂論曰漢桓帝聞楚琴悽愴傷心倚戸而悲慷慨長息曰善哉為琴若此而足矣說苑曰應侯與賈子坐聞鼔琴聲應侯曰今日琴一何悲也賈子曰夫張急調下故使之悲耳因張者良材也調下者官卑也取夫良材而卑之官安能}
  - {type: page-break, offset: 670, content: '', id: KR3k0012_WYG_577-11b, image: WYG0898/WYG0898-0299d.png}
  - {type: variant, offset: 670, length: 0, content: '', krp: 耻與魑魅争光阮籍樂論曰漢桓帝聞楚琴悽愴傷心倚户而悲慷慨長息曰善哉爲琴若此而足矣說苑曰應侯與賈子坐聞皷琴聲應侯曰今日琴一何悲也賈子曰夫張急調下故使之悲耳因張者良材也調下者官卑也取夫良材而卑之官安能}
  - {type: variant, offset: 671, length: 6, content: 句作磬古史考, SBCK: 悲乎應侯曰善楊雄琴清英曰晉王謂孫息曰子皷琴能令寡人悲乎息曰今處髙䑓邃宇連屋重户藿肉漿酒倡樂在前難可使悲者乃謂少失父母長無兄嫂當道獨坐暮無所止如此者乃可悲耳乃援琴而皷之晉王酸心哀涕曰何子來遟也蔡邕女訓曰舅姑􅀂命之皷琴必正坐操琴而奏曲􅀂問曲名則捨琴興對曰某曲坐􅀂近則琴聲必聞􅀂逺左右必有賛其言者凢皷小曲五終則止大曲三終則止無數變曲無多少尊者之聽未猒不敢早止􅀂頋望視也則曲終而後止亦無中曲而息也琴必常調尊者之前不更調張􅀻室􅀂近舅姑則不敢皷獨􅀂絶逺聲音不聞皷之可也皷琴之夜有姉妹之宴則可也通禮纂}
  - {type: page-break, offset: 671, content: '', id: KR3k0012_SBCK_577-7b}
  - {type: variant, offset: 671, length: 6, content: 句作磬古史考, WYG: 悲乎應侯曰善揚雄琴清英曰晉王謂孫息曰子鼔琴能令寡人悲乎息曰今處髙臺􅃉宇連屋重户藿肉漿酒倡樂在前難可使悲者乃謂少失父母長無兄嫂當道獨坐暮無所止扵此者乃可悲耳乃援琴而鼔之晉王酸心哀涕曰何子来遲也蔡邕女訓曰舅姑若命之鼔琴必正坐操琴而奏曲若問曲名則捨琴興對曰某曲坐若近則琴聲必聞若逺左右必有賛其言者凡鼔小曲五終則止大曲三終則止無數變曲無多少厭尊者之聴未厭不敢早止若顧望視也則曲終而後止亦無中曲而息也琴必常調尊者之前不更調張私室若近舅姑則不敢鼔獨若絶逺聲音不聞鼔之可也鼔琴之夜有姊妹之宴則可也通禮纂義}
