  - {type: variant, offset: 390, length: 0, content: '', SBCK: 子路皷琴孔子聞之謂冉有曰甚矣由之不才也夫先王之制音也奏中聲以爲節流入於南不歸於北夫南者生育之郷北者殺伐之域也故君子之音温和居中以飬生育之氣憂愁之感不加乎心􅁀厲之動不存乎禮夫然者乃所以爲治安之風也}
  - {type: variant, offset: 390, length: 0, content: '', WYG: 子路鼔瑟孔子聞之謂冉有曰甚矣由之不才也夫先王之制音也奏中聲以為節流入扵南不歸扵北夫南者生育之鄉北者殺伐之域也故君子之音温和居中以養生育之氣憂愁之感不加乎心暴厲之動不存乎體夫然者乃所以為治安之風也}
  - {type: variant, offset: 390, length: 0, content: '', krp: 子路皷琴孔子聞之謂冉有曰甚矣由之不才也夫先王之制音也奏中聲以爲節流入於南不歸於北夫南者生育之郷北者殺伐之域也故君子之音温和居中以飬生育之氣憂愁之感不加乎心暴厲之動不存乎禮夫然者乃所以爲治安之風也}
