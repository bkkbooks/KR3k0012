  - {type: variant, offset: 268, length: 0, content: '', SBCK: 上甞問宋弘道通之士弘薦桓譚譚善皷琴喜鄭聲上數聽恱之弘聞坐府上遣吏召譚責問之譚叩頭良乆乃遣後上令譚皷琴譚爲之失次上問之弘言其故故不復令譚給事後漢書曰􅀄蔡邕在陳留鄰人有以酒食召邕者比徃而酒巳酣客有彈琴於屏邕至門潜聽之曰以樂召我而有殺心何也遂返將命者告主人曰蔡君至門而去邕素爲􅀖郷所宗主人遂自追問其故邕具以告莫不憮然彈琴者曰我向見螳蜋方向鳴蟬蟬將去而未飛螳蜋爲之一前一却吾心聳然唯恐螳蜋之失蟬也此豈爲殺心而形於聲乎邕歎曰此足以當之矣又曰蔡邕字伯喈陳留人性沉審志好琴道以嘉平元年入清溪訪􅀑谷先生所居山五曲曲有幽居靈跡每一曲制一弄三年曲成出呈馬融}
  - {type: page-break, offset: 268, content: '', id: KR3k0012_SBCK_577-4a}
  - {type: variant, offset: 268, length: 0, content: '', WYG: 上嘗問宋宏道通之士宏薦桓譚譚善鼔琴喜鄭聲上數聽恱之宏聞坐府上遣吏召譚責問之譚叩頭良久乃遣後上令譚鼔琴譚為之失次上召之宏言其故不復令譚給事後漢書曰初蔡邕在陳留鄰人有以酒食召邕者比往而酒已酣客有彈琴於屏邕在門濳聽之曰以樂召我而有殺心何也遂返將命者告主人曰蔡君至門而去邕素爲邦鄉所宗主人遂自追問其故邕具以吿莫不憮然彈琴者曰我向見螂螳方向蟬蟬將去而未飛螳螂為之一前一却吾心聳然唯恐螳螂之失蟬也此豈爲殺心而形于聲乎邕唯曰此足以當之矣又曰蔡邕字伯喈陳留人性沉審志好琴道以嘉平元年入清溪訪鬼谷先生所居山五曲曲有幽居靈跡毎一曲制一弄三年而成出呈馬融}
  - {type: page-break, offset: 268, content: '', id: KR3k0012_WYG_577-5b, image: WYG0898/WYG0898-0296d.png}
  - {type: page-break, offset: 268, content: '', id: KR3k0012_WYG_577-6a, image: WYG0898/WYG0898-0297a.png}
  - {type: variant, offset: 268, length: 0, content: '', krp: 上甞問宋弘道通之士弘薦桓譚譚善皷琴喜鄭聲上數聽恱之弘聞坐府上遣吏召譚責問之譚叩頭良乆乃遣後上令譚皷琴譚爲之失次上問之弘言其故故不復令譚給事後漢書曰𥘉蔡邕在陳留鄰人有以酒食召邕者比徃而酒巳酣客有彈琴於屏邕至門潜聽之曰以樂召我而有殺心何也遂返將命者告主人曰蔡君至門而去邕素爲邦郷所宗主人遂自追問其故邕具以告莫不憮然彈琴者曰我向見螳蜋方向鳴蟬蟬將去而未飛螳蜋爲之一前一却吾心聳然唯恐螳蜋之失蟬也此豈爲殺心而形於聲乎邕歎曰此足以當之矣又曰蔡邕字伯喈陳留人性沉審志好琴道以嘉平元年入清溪訪鬼谷先生所居山五曲曲有幽居靈跡每一曲制一弄三年曲成出呈馬融}
  - {type: variant, offset: 269, length: 3, content: 阜為重, SBCK: 元董卓等異之晉書曰王敬伯㑹稽餘姚人洲渚中昇亭而􅀫是夜月華露輕敬伯皷琴感劉惠明亡女之靈告敬伯就體如平生從婢二人敬伯撫琴而歌曰低露下􅀷幕垂月照􅀌琴空絃益霄淚誰憐此夜心女乃和之曰歌宛轉情復哀願爲煙與霧氛氲同共懷晉書曰阮瞻善彈琴人聞其能多徃來聽不問貴賤長㓜皆爲彈之神氣冲和不知向人所在内兄潘岳每令皷琴終日逹夜無忤色晉中興書曰戴逵字安道少有文藝善皷琴太宰武陵王晞聞其能琴使人召焉逵對使者破琴曰戴安道不爲王門伶人晞怒乃更引其兄􅄒􅄒亦能樂聞命忻然操琴而徃逵不樂當丗以琴書爲娱不逺千里宋書曰蕭思話領左衛將軍甞從太祖登鍾山北領中道有盤石清}
  - {type: page-break, offset: 269, content: '', id: KR3k0012_SBCK_577-4b}
  - {type: variant, offset: 269, length: 1, content: 阜, WYG: 允董卓等異之晉書曰王敬伯會稽餘姚人洲渚中昇亭而宿是夜月華露輕敬伯鼔琴感劉恵明亡女之靈吿敬伯就體如平生從婢二人敬伯撫琴而歌曰低露下深幕垂月照孤琴空絃益宵淚誰憐此夜心女乃和之曰歌宛轉情復哀願}
  - {type: page-break, offset: 269, content: '', id: KR3k0012_WYG_577-6b, image: WYG0898/WYG0898-0297b.png}
  - {type: variant, offset: 269, length: 3, content: 阜為重, krp: 元董卓等異之晉書曰王敬伯㑹稽餘姚人洲渚中昇亭而宿是夜月華露輕敬伯皷琴感劉惠明亡女之靈告敬伯就體如平生從婢二人敬伯撫琴而歌曰低露下深幕垂月照孤琴空絃益霄淚誰憐此夜心女乃和之曰歌宛轉情復哀願爲煙與霧氛氲同共懷晉書曰阮瞻善彈琴人聞其能多徃來聽不問貴賤長㓜皆爲彈之神氣冲和不知向人所在内兄潘岳每令皷琴終日逹夜無忤色晉中興書曰戴逵字安道少有文藝善皷琴太宰武陵王晞聞其能琴使人召焉逵對使者破琴曰戴安道不爲王門伶人晞怒乃更引其兄𫐠𫐠亦能樂聞命忻然操琴而徃逵不樂當丗以琴書爲娱不逺千里宋書曰蕭思話領左衛將軍甞從太祖登鍾山北領中道有盤石清}
  - {type: variant, offset: 271, length: 1, content: 重, WYG: 煙與霧氛氲同共懐晉書曰阮瞻善彈琴人聞其能多往求聽不問貴賤長幼皆爲彈之神氣冲和不知向人所在内兄潘岳每令鼔琴終日達夜無忤色晉中興書曰戴逵字安道少有文藝善鼔琴太宰武陵王晞聞其能琴使人召焉逵對使者破琴曰戴安道不為王門伶人晞怒乃更引其兄述述亦能樂聞命忻然操琴而往逵不樂當世以琴書為娱不逺千里宋書曰蕭思話領左衞將軍嘗從太祖登鍾山北嶺中道有盤石清}
  - {type: page-break, offset: 271, content: '', id: KR3k0012_WYG_577-7a, image: WYG0898/WYG0898-0297c.png}
  - {type: variant, offset: 273, length: 0, content: '', SBCK: 上使於石上彈琴因賜以銀鍾酒謂曰相賞有松石間意又曰衡陽王義季鎮京口長史張邵與戴顒姻通近來止黄鵠山林澗甚美顒憩於澗義季亟從之遊顒衣野服爲義季皷琴並新聲變曲皆與丗異也又曰衡陽王義季鎮京口戴顒爲義季皷琴並新聲曲其三調遊絃廣陵止息之流皆與丗異太祖毎􅁒見之甞謂黄門侍郎張敷曰當讌戴公山也以其好音長給正聲􅇊一部顒合何當白鵠二聲以爲一調号爲清曠又曰陶潜不解音聲而畜素琴一張毎有酒適輙撫弄以􅀉其意蕭子顯齊書曰王仲雄善彈琴當時妙絶江左有蔡邕焦尾琴在王衣庫上勑五日一給仲雄又曰尚書}
  - {type: page-break, offset: 273, content: '', id: KR3k0012_SBCK_577-5a}
  - {type: variant, offset: 273, length: 0, content: '', WYG: 上使於石上彈琴因賜以銀鍾酒謂曰相賞有松石間意又曰衡陽王義季鎮京口長史張邵與戴顒姻通迎來止黄鵠山林澗甚美顒憇扵澗義季亟從之逰顒衣野服為義季鼔琴並新聲變曲皆與世異也又曰衡陽王義季鎮京口戴顒為義季鼔琴並新聲曲其三調逰絃廣陵止息之流皆與世異太祖每欲見之嘗謂黄門侍郎張敷曰當讌戴公山也以其好音長給正聲伎一部顒合何當白鵠二聲以為一調號為清曠又曰陶濳不解聲音而畜素琴一張每有酒適輒撫弄以寄其意蕭子顯齊書曰王仲雄善彈琴當時妙絶江左有蔡邕焦尾琴在尚衣庫上勑五日一給仲雄又曰尚書}
