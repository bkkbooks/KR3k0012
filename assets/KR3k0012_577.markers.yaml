  - {type: 'tls:seg', offset: 394, content: '', id: KR3k0012_CHANT_577-10a.4}
  - {type: variant, offset: 394, length: 0, content: '', SBCK: 鍾子期曰善哉乎皷琴巍巍乎􅀂太山少選之期而志在流水鍾子期復曰善哉乎皷琴湯湯乎􅀂流水鍾子期死伯牙破琴絶絃終身不復皷琴以爲丗無足爲皷琴者莊子曰孔子窮於陳蔡七日不食絃歌皷琴又曰孔子遊於緇帷之林休坐杏壇之上弟子讀書孔子絃歌皷琴奏曲未半有父者下􅂳而來孔子推琴而起曰}
  - {type: page-break, offset: 394, content: '', id: KR3k0012_SBCK_577-6a}
  - {type: variant, offset: 394, length: 0, content: '', WYG: 鍾子期曰善哉乎鼔琴巍巍乎若太山少頃之間而志在流水鍾子期復曰善哉乎鼔琴蕩蕩乎若流水鍾子期死伯牙破琴絶絃終身不復鼔琴以為世無足為鼔琴者莊子曰孔子窮扵陳蔡七日不食絃歌鼔琴又曰孔子逰于緇帷之林休坐杏壇之上弟子讀書孔子絃歌鼔琴奏曲未半有漁父者下船而来孔子推琴而起曰}
  - {type: page-break, offset: 394, content: '', id: KR3k0012_WYG_577-9b, image: WYG0898/WYG0898-0298d.png}
  - {type: variant, offset: 394, length: 0, content: '', krp: 鍾子期曰善哉乎皷琴巍巍乎若太山少選之期而志在流水鍾子期復曰善哉乎皷琴湯湯乎若流水鍾子期死伯牙破琴絶絃終身不復皷琴以爲丗無足爲皷琴者莊子曰孔子窮於陳蔡七日不食絃歌皷琴又曰孔子遊於緇帷之林休坐杏壇之上弟子讀書孔子絃歌皷琴奏曲未半有父者下船而來孔子推琴而起曰}
  - {type: variant, offset: 395, length: 1, content: 陰, SBCK: 聖欤列子曰瓠巴皷琴鳥舞魚躍鄭師文聞之從師襄三年不成無幾見師襄曰乆得之矣於是當春而叩啇絃以召南吕凉風惣至草木成實秋而叩角温風徐廻草木發榮夏而叩羽霜雪交下川池􅁀涸冬其叩徴陽光熾烈堅冰立散將終而四景風翔慶雲浮甘露降醴泉湧前􅁗録曰符堅末年好色寵幸鮮卑有趙整者援琴歌曰昔聞盟津河千里作一曲此水夲清白是誰乱使濁又曰北園有􅀥樹布葉垂重隂外雖}
  - {type: variant, offset: 395, length: 1, content: 陰, WYG: 聖歟列子曰瓠巴鼔琴鳥舞魚躍鄭師文聞之從師襄三年不成無㡬見師襄曰已得之矣扵是當春而叩商絃以召南呂凉風忽至草木成實秋而叩角温風徐迴草木發榮夏而叩羽霜雪交下川池暴涸冬而叩徵陽光熾烈堅氷立散將終而逝景風翔慶雲浮甘露降醴泉湧前秦録曰苻堅末年好色寵幸鮮卑有趙整者援琴歌曰昔聞盟津河千里作一曲此自本來清是誰亂使濁又曰北園有棗樹布葉垂重隂外雖}
