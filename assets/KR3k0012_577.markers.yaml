  - {type: variant, offset: 164, length: 8, content: 徐州泗濱浮磬孔安, SBCK: 鄒忌以皷琴見齊威王威王恱之舎之右室須􅁷王自皷琴鄒忌推户久曰善哉皷琴也王悖然不恱去琴按劒曰夫子見之未察何以知其善忌曰大絃濁以温小絃廉折以淸推之􅀷而釋之舒均諧以鳴大小相盖回邪而不相害是知其善忌復曰不獨語音夫治}
