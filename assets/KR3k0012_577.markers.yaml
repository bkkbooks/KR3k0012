  - {type: variant, offset: 213, length: 0, content: '', SBCK: 荆軻左把􅁗王右揕其胷王乞聽琴而死召􅁎人皷琴聲曰羅縠單衣可裂而絶八尺屏風可超而越鹿盧之劒可􅀒而拔王奮而去又曰黄帝使素女皷五十絃琴帝悲不能自禁破爲二十五絃又曰萬石君奮年十五爲小吏侍髙祖與語愛其恭敬問曰􅀂何}
  - {type: variant, offset: 213, length: 0, content: '', WYG: 荆軻左把秦王右揕其胷王乞聽琴而死召姬人鼔琴聲曰羅縠輕衣可裂而絶八尺屏風可超而越鹿盧之劒可負而拔王奮而去又曰黄帝使素女鼔五十絃琴帝悲不能自禁破為二十五絃又曰萬石君奮年十五為小吏侍髙祖與語愛其恭敬問曰君何}
