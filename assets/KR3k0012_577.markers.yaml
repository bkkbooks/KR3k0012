  - {type: variant, offset: 667, length: 0, content: '', SBCK: 孫琴操曰伏羲作琴長三尺六寸六分象三百六十日也廣六寸象六合也文上曰池下曰宕池水平也前廣後狹象尊卑也上圎下方法天地五絃官也大絃君也寛和而温小絃臣也清廉不亂文王加二絃合君臣恩也宮爲君啇爲臣角爲民徴爲事羽爲物傳玄琴賦叙曰齊桓有鳴琴曰號鍾楚㽵王有琴曰繞梁司馬相如有緑綺蔡邕有焦尾皆名器也蔡邕焦尾有證甚多相如政取古名目琴耳無其事也不異号鍾丗􅀃曰頋彦先平生好琴死後置琴床上張翰直上床彈琴不與孝子語而去語林曰嵇中散夜燈下彈琴忽有一}
  - {type: page-break, offset: 667, content: '', id: KR3k0012_SBCK_577-7a}
  - {type: variant, offset: 667, length: 0, content: '', WYG: 孫琴操曰伏羲作琴長三尺六寸六分象三百六十六日也廣六寸象六合也文上曰池下曰岩池水中也前廣後狹象尊卑也上圓下方法天地也五絃官也大絃君也寬和而温小絃臣也清㢘不亂文王加二絃合君臣恩也宮為君商為臣角為民徵為事羽為物傅𤣥琴賦叙曰齊桓有鳴琴曰號鍾楚莊王有琴曰繞梁司馬相如有緑綺蔡邕有焦尾皆名器也蔡邕焦尾有證甚多相如故取古名目琴耳無其事也不異號鍾世說曰顧彦先平生好琴死後置琴床上張翰直上床彈琴不與孝子語而去語林曰嵇中散夜燈下彈琴忽有一}
  - {type: page-break, offset: 667, content: '', id: KR3k0012_WYG_577-11a, image: WYG0898/WYG0898-0299c.png}
