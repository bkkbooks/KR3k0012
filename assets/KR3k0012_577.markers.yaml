  - {type: variant, offset: 1022, length: 205, content: 伶倫造磬又曰天地尚質用石磬宗廟及殿庭尚文用玉磬必用之者聲清正者陰陽之察主於金石也又曰唐禮皇后享先蚕設十二磬於辰位陰陽之察主於清濁是以用磬而不用鍾也瑟白虎通曰瑟者閑也所以懲忿窒欲正人之德也故曰瑟有君父之節臣子法商角則君父有節臣子有義然後四時和然後萬物生故謂之瑟大瑟謂之灑長八尺一寸廣一尺八寸二十七絃爾雅曰徒鼓瑟謂之步三禮圖曰雅瑟長八尺一寸廣二尺八寸二十三絃其常用者十九絃其餘四絃謂之蕃羸也頌瑟七尺二寸廣尺八寸二十, SBCK: 無勾作琴}
