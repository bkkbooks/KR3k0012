  - {type: variant, offset: 203, length: 2, content: 荷蕢, SBCK: 女文君新寡好音相如謬與令相重}
  - {type: variant, offset: 203, length: 2, content: 荷蕢, WYG: 嬖妾使師曹誨之琴師曹鞭之公怒鞭師曹三百爾雅云大琴曰離二十絃或傳此是伏羲所制史記曰鄒忌以鼔琴見齊威王恱之舍之右室須臾王自鼔琴鄒忌推戸入曰善哉鼓琴也王勃然不恱去琴按劒曰夫子見之未察何以知其善忌曰大絃濁以溫小絃㢘折以清推之深}
  - {type: page-break, offset: 203, content: '', id: KR3k0012_WYG_577-3a, image: WYG0898/WYG0898-0295c.png}
  - {type: variant, offset: 203, length: 2, content: 荷蕢, krp: 女文君新寡好音相如謬與令相重}
  - {type: variant, offset: 206, length: 2, content: 過孔, SBCK: 以琴心挑之相如始之臨卭車􅀐雍容閑雅甚都及飲卓}
  - {type: variant, offset: 206, length: 2, content: 過孔, WYG: 釋之舒均諧以鳴大小相盖回邪而不相害是以知其善忌復曰不獨語音夫治國家弭人民皆在其中王又勃然不恱曰若語五音旣信未有如夫子者也若治國家弭人民皆在其中又何為絃桐之間忌曰大絃急以温者君也小絃㢘折以清者相也推之深釋之舒者刑罰審也均諧之鳴者政令一也大小相盖回邪不相害者上下和鳴吏民相親也夫復而不亂者所以治昌連而徑者所以存亡故曰琴音調而天下治治國家弭人民無若乎五音者矣王曰善忌見三月而受相印淳于髠謂忌曰髠有愚志願陳諸前忌曰謹受教髠曰得人者昌失人者亡忌曰謹受命請無離前髠曰狶膏棘軸所以爲滑然而不能運方穿忌曰謹受命請事左右髠曰弓膠昔幹所以爲合然而不能傅合踈逺忌曰謹受命請謹自撫附萬民髠曰狐裘雖弊不可補以黄犬之皮忌曰謹受命謹請擇君子無親小人髠曰大車無轂不能載常任琴瑟無軫不能成五音忌曰謹受命請謹脩法律而督奸吏髠說畢趨出至門而盻其僕曰是人者吾語之微言其應我如響之應聲是人封不久矣居期年封扵下邳號曰成侯史記曰箕子諫紂不聽而被髮佯狂為奴隠而鼔琴以自悲又曰司馬相如素與臨卭令王吉相善臨卭富人卓王孫有女文君新寡好音相如謬與令相重而以琴心挑之相如始之臨卭車騎雍容閑雅甚都及飲卓}
