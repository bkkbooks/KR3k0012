  - {type: variant, offset: 2473, length: 333, content: 文史及孫吳兵法姬妾列侍窮極奢靡有彈箏人陸大喜著鹿角爪長七寸舞人張淨琬腰圍一尺六寸時人咸云能掌上舞俗說曰謝仁祖為豫州主簿在桓溫閣下聞其善彈箏便呼之既至取箏與令彈謝即理絃撫箏因歌曰秋風意殊道桓大以此知之取謝引詣府襄沔記曰辛居士名宣仲隴西人大明末寓居襄陽縣西六里多植松竹栖遲其下靜嘿不交塵俗林中起一草廬容膝而已善彈箏與淮南胡陶京兆駱惠度同志為友常共讌集此林陶能吹笛惠度工歌拾林下絃管道韻時人謂之三公樂宋邵陵王休若為南雍州剌史躬往造焉宣仲正在林中彈箏了不廻顧逡巡致箏於席延邵陵與語纔述寒溫而已時邵陵客有述其旨者授箏令彈再三固請荅曰幸非王門伶人何事見逼所勝於君者正舉止自由若聞君鞠躬復與君何異占對詳雅眾不能屈齊文惠臨州吳興沈約奉教聘引並不降志約乃共論文章宣仲輒言莊老既各言其志, SBCK: 重恐}
