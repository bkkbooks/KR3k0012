  - {type: variant, offset: 2837, length: 145, content: 布不自安因求還洛陽紹聽之丞制使領司隸校尉遣壯士送布而陰殺之布疑其圖己乃使人鼓箏於悵中潛自遁出夜中兵起而布己亡紹聞懼為患募追之皆莫敢近遂復歸燉煌實錄曰索丞宗伯夷成善鼓箏悲歌能使喜者墮淚改調易謳能使戚者起舞時人號曰雍門周魏略曰游楚好音樂乃畜琵琶箏每行將以自隨吳質別傳曰魏文帝與吳質書曰斬泗濱之梓, WYG: 削}
