  - {type: variant, offset: 679, length: 342, content: 時人周禮冬官考工記磬氏為磬倨句一矩有半必先度一矩為句一矩為股而求其絃既而以一矩有半觸其弦則磬之倨句也磬之制有大小此假矩以定倨句非用其度也其博為一博謂服博博廣也服為二鼓為三三分其股博去一以為鼓博三分其鼓博以其一為之厚鄭眾云股磬之上者也鼓其下小者所當擊也鄭玄謂服外面鼓內面也假令磬服廣四寸半者股長九寸服廣三寸長尺三半厚一寸已上則摩其旁鄭玄云磬聲太上則摩鑢其旁也鄭玄謂太上聲清也薄而廣則濁也已下則摩其端太下聲濁也矩而厚則清又曰磬師掌教擊磬教教視瞭磬亦編於鍾也教縵樂讌樂之鍾磬鄭玄云縵謂雜聲之和樂者學記曰不學操縵不能安絃宴謂房中之樂所謂陰聲二樂皆教其鍾磬通禮義纂曰晉賀脩奏登歌之簴采玉造小磬宗廟殿用玉郊丘用石本法堂上樂以歌為故名歌鍾歌磬唐制設磬於壇上之西歌鍾於東近南北向至匏竹立於壇下又曰黃帝, SBCK: ''}
