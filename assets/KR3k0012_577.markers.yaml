  - {type: variant, offset: 181, length: 1, content: 石, SBCK: 三月而受相印淳于髠謂忌曰髠有愚志願陳諸前忌曰謹受教髠曰得人者昌失人者亡忌曰謹受命請無觀髠曰狢膏􅁄軸所以爲猾然而不能運方穿忌曰謹受命請事左右髠曰弓膠腊幹所以爲勢然而不能􅀓合踈逺忌曰謹受命請謹自撫附萬民髠曰狐裘雖􅁦不}
  - {type: variant, offset: 181, length: 1, content: 石, krp: 三月而受相印淳于髠謂忌曰髠有愚志願陳諸前忌曰謹受教髠曰得人者昌失人者亡忌曰謹受命請無觀髠曰狢膏棘軸所以爲猾然而不能運方穿忌曰謹受命請事左右髠曰弓膠腊幹所以爲勢然而不能傳合踈逺忌曰謹受命請謹自撫附萬民髠曰狐裘雖弊不}
