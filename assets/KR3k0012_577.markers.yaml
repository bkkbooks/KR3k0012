  - {type: variant, offset: 1331, length: 350, content: 論語曰由之瑟奚為於丘之門陽貨曰孺悲欲見孔子孔子辭之以疾將命者出戶取瑟而歌使之聞之又曰仲尼問曾哲曰點爾何如鼓瑟希鏗爾捨瑟而作曰暮春者春服既成冠者五六人童子六七人浴乎沂風乎舞雩詠而歸周書曰師曠見太子晉師曠束躅其足曰善哉善哉王子曰太師乎何舉足驟師曠曰天寒之躅是以數舉也王子曰請入坐遂敷席注瑟師曠曰歌無射曰國誠寧矣遠人來觀脩義經矣好樂無荒乃注瑟於王子漢書曰萬石君石奮其父趙人姊能鼓瑟高祖曰若能從我乎曰願盡力於是高祖召其姊為美人又楊惲報孫會宗書曰惲本秦人能為秦聲婦趙女也雅善鼓瑟又曰莽何羅及走趍臥內顧入行觸寶瑟僵仆金日磾得抱何羅因呼曰何羅反呂氏春秋曰古朱襄氏之治天下多風陽氣畜積果實不成故王建作為五絃之瑟以來陰以定群瞽瞍制五絃之瑟作十五之絃舞益以八絃為二十三絃高誘曰王建朱襄之臣慎子曰公輸子巧用材也不能以檀為瑟, SBCK: ''}
