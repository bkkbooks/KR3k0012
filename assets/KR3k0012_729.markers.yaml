  - {type: variant, offset: 810, length: 3, content: 令璞筮, SBCK: 有相者蘇大見后大驚日此成湯之骨法也貴不可言家人􅀼喜而不敢宣又日漢法常因八月筭人漢儀注日八月初爲筭賦故日筭人遣中大夫與掖庭丞及相工於洛陽鄉中閱視良家童女十三以上二十巳下姿色端麗合法相者載還後宫擇視可否乃用登御所以慎娉納詳求淑哲東觀漢記日班超行詣相者相者日祭酒布衣諸生耳而當封侯萬里之外超問其狀相者指日生鷰頷虎頸飛而食肉此萬里侯相也又日李固字子堅漢中南鄭人也司徒郃之子固貌狀有奇表鼎角匿犀足履􅀛文少好學常步行隨師不遠千里魏志日管輅族兄李國居在斥丘輅往從之與二客會客去後輅謂國日此二人天廷及耳口之閒同有凶氣黑變俱起􅀟䰟無宅輅别傳日厚味腊毒天精幽夕坎爲棺楟兊爲喪車流魄于海骨歸于家少許時當並死後十數日二人飲酒醉夜共載車牛渴下道入漳河中皆即溺死矣又日鍾繇嘗與族父瑜俱至洛陽道遇相者日此童有貴相然當厄於水努力愼之行未十里度橋馬驚墮水幾死瑜以相者言中益貴繇是供給資費使得專學舉孝廉又日朱建平沛國人善相術頴川荀修錘繇相與親善修先亡子幼繇經記其門戸欲嫁其女與人書日吾與}
