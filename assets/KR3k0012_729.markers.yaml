  - {type: variant, offset: 3149, length: 358, content: 隙及素平并州先訪知常將斬之賴此獲免又有失馬來詣伯醜卜者時伯醜為皇太子所召在塗遇之立為作卦卦成曰我不遑為卿占之卿且向西市東壁門南第三店為我買魚作膾當得馬矣其人如此言須臾有一人牽所失馬而至遂擒之崖州嘗獻徑寸珠其使者陰易之上疑焉召伯醜筮曰有物出自水中質圓而色光是大珠也今為人所隱具隱者姓名容狀上如言簿責之果得本珠上奇之賜帛二十疋唐書曰太宗皇后長孫氏隋大業中歸寧於永興里后舅高士廉有姬張氏於后所宿舍側見一大馬二丈餘鞍勒備具士廉筮之遇坤彖曰至哉坤元萬物資生乃順承天坤厚載物德合無疆象曰牝馬地類行地無疆也泰彖曰內陽而外陰內健而外順則是天地交而萬物通也象曰后以輔相天地之宜而左右人也卜人曰龍乾之象也馬坤之象也變而為泰天地交也繇恊於歸妹婦人兆也案王弼云婦人謂嫁曰歸女處尊位履中居順也此女當大貴也其可盡言乎士廉志之而心獨喜親戚知者咸敬, WYG: ''}
