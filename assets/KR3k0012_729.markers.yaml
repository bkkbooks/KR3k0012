  - {type: variant, offset: 39, length: 0, content: '', krp: 三歲而侯侯八歲爲將相貴重於人臣無兩其後九歲而餓死負指其口有從理入口此餓死法也又曰韋賢爲吏至大鴻臚有工相之至丞相有男四人使相之至第二子玄成相工日此子貴當封俟竟爲亟相又日衛靑爲侯家人少時歸其父使牧牛母子皆奴畜之不以爲兄弟數青嘗從上至甘泉居室有一鉗徒相靑日貴人也官至封侯青笑日人之奴得無笞罵卽足矣安得封侯漢書日上立劉濞於沛爲吳王王郡五十三城巳拜受印高帝召濞相之日若狀有反相因拊其背日漢後五十年東南有亂者豈汝耶然天下同姓一家}
  - {type: variant, offset: 40, length: 0, content: '', SBCK: 無反濞頓首日不敢又日李陵爲匈奴所圍上欲陵戰死召陵毋及婦使相者視之無死喪色後聞降上甚怒又日翟方進字子威汝南上蔡人家世微賤方進年十二三失父孤學給事大守府爲小吏號遟鈍不及事數爲􅁺史所詈辱方進自傷乃從汝南蔡父相問巳能所冝蔡父大奇其形皃謂日小吏有封侯骨當以經術進方進聞蔡父言心喜因病歸家辭其後母欲西至京師受經後母憐其幼隨之長安織履以給方進又日黃霸與善相者共載岀見一婦人相者言此婦人當貴不然相書}
