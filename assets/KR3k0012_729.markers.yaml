  - {type: variant, offset: 135, length: 520, content: 比視已死吐黑血斗餘其夕序墅上白鵝數頭無故自死而序家無恙又曰郭璞既過江宣城太守殷祐引為參軍時有物大如水牛灰色卑腳腳類象胸前尾上皆白大力而遲鈍來到城下眾咸異焉祐使人伏而取之令璞作卦遇遯之蠱其卦曰艮體連乾其物壯巨山潛之畜匪兕匪虎身與鬼并精見二午法當為禽兩靈不許遂被一創還其本墅按卦是為驢鼠卜適了伏者以戟剌之深尺餘遂去不復見巫云廟神不悅曰此是䢼亭驢山君鼠使詣刑山暫來過我不須觸之其精妙如此又曰王導深重郭璞引參己軍事導令作掛璞言公有震厄可命駕西出數十里得一柏樹截斷如身長置常寢處災當可消矣導從其言數日果震柏木粉碎時元帝初鎮建鄴導令璞筮之遇咸之井璞曰東北郡縣有武名者當出鐸以著受命之符西南郡縣有陽名者井當沸其後晉陵武進縣人於田中得銅鐸五枚歷陽縣中井沸經日乃止及帝為晉王又使璞筮遇豫之睽璞曰會稽當出鍾以告成功上有勒銘應在人家井沸泥中得之繇辭所謂先王以作樂崇德殷薦之上帝者也及帝即位太興初會稽剡縣人果於井中得一鍾長七尺二分口徑四寸半上有古文奇書十八字云會稽嶽命餘字時人莫識之又曰王敦之謀逆也溫嶠庾亮使郭璞筮之璞對不決嶠亮復令占己之吉凶璞曰元吉嶠等退相謂曰璞對不了是不敢言或天奪敦魄令吾等與國家共舉大事而璞云元吉是為舉事必有成也於是勸帝討敦初璞每言殺我者山宗, WYG: ''}
