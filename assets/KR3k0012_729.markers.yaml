  - {type: variant, offset: 15, length: 0, content: '', SBCK: 見其二子焉叔服日穀也食子難也收子穀文伯難惠叔也食子奉祭祀供餋者也收子葬子身也穀也豐下必有後於魯國豐下蓋方面也又日初楚子將以商臣爲太子訪諸令尹子上子上日君之齒未也而又多愛黜乃亂也楚國之舉􅁪在少者且是人也蜂目而犲聲忍人也不可立也弗聽又宜上日楚司馬子良生子越椒子文日必殺之是子也熊虎之狀而犲狼之聲不殺必滅若敖氏矣諺日狼子野心是乃狼也其可畜乎子良不可子文以爲大慼及將死聚其族日椒也知政乃速行矣無及於難且泣日􅀑猶求食若敖氏之鬼不其餒而周書日師曠見太子晉日汝聲淸浮汝色赤火色不壽王子日後三年上賔於帝汝愼母言殃將及汝師曠歸末及三年告死者至史記日秦王見尉繚亢禮衣服食飲與繚同繚日秦王爲人蜂淮徐廣日蜂一作隆長目鷙喙鳥膺犲聲少恩而虎狼心居約易岀人下得志亦輕食人我布衣也然見我常身自下我誠使秦王得志於天下天下皆爲虜矣不可與乆遊乃亡去王覺固止之以爲秦國尉又日吕公日臣少好相人相人多矣無如季相願季自愛臣有息女願爲箕帚妾吕公女乃吕后也季漢高祖字也又日吕后與兩子居田中耨有一老父過請飲吕后因餔之老父相后日夫人天下貴人令相兩子見孝惠日夫人所以貴乃由此男相魯元亦皆貴又曰薄􅁎母媪之許􅀒相薄􅁎當生天子薄􅁎少時與管夫人趙子皃相約曰先貴無相忘而管趙先幸漢王漢王坐河南城臯臺兩美人相與􅀏薄􅁎初約漢王問其故以實告漢王心憐薄姬召一幸生代王卽文帝也又曰姑布子卿見趙􅂤子􅂤子徧召其子使相之子􅀸曰無爲將軍者􅂤子日趙氏其滅乎子􅀸曰吾嘗見一子於路殆君之子也􅂤子召子母恤母恤至則子􅀸起日此眞將軍矣簡子曰其母賤翟婢也奚道貴哉子􅀸日天所授也雖賤必貴自是之後􅂤子盡召諸子與語母恤最賢􅂤子乃告諸子曰吾藏寶符於常山之上先得者賞諸子馳之􅁪山求無所得母恤還日巳得符矣簡子曰奏之母恤日從常山臨代代可取也􅂤子於是知母恤果賢乃廢太伯魯而以母恤爲太子又日平原君對趙王日澠池之㑹臣察武安君之爲人小頭銳上瞳子白黒分明眡瞻不轉小頭銳上斷敢行也瞳子白黒分明者見事明也眡瞻不轉者執志疆也眡讀如視古文通用可與持乆難與爭鋒廉頗爲人勇摯而愛士知難而忍恥與之野戰則恐不如守足以當之王從其計又曰蔡澤者燕人也遊學干諸侯大小甚衆而不遇因從唐舉相日聞子相李兊百日之內持國秉政有之乎日有之日若臣者如何唐舉熟視而􅀏曰先生曷鼻曷鼻如謂蝎蟲也巨肩巨肩謂頂仾而肩竪魋顔蹙齃謂蹙鼻於眉膝攣兩脚曲也吾聞聖人不相殆先生乎蔡澤知唐舉戲之乃曰富貴吾所自有吾所不知者夀也願聞之舉曰先生之壽從今巳往四十三歲矣蔡澤􅀏謝而去謂其御者日吾持粱齧肥躍馬疾驅懷黃金之印結紫綬於腰揖讓人主之前肉食富貴四十三歲亦足矣又曰英布少時遇相者日當黥而王後布被刑欣然果爲王又曰上使}
