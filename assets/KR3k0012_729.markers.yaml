  - {type: variant, offset: 2093, length: 166, content: 在左右參與謀議北史曰後魏樂平王丕坐事以憂薨及日者董道秀之死也高允遂著筮論曰昔明元未起白臺其高二十餘丈樂平王嘗夢登其上四望無所見王以問日者董道秀筮之曰大吉王默而有熹色後事發王遂憂死而道秀棄市道秀善推六爻以對王曰易稱亢龍有悔窮高曰亢高而無人不為善也夫如是則可上寧於王下保於己福祿方至豈有禍哉今舍於本而從其末咎釁之至不亦宜乎三國典略曰西魏, SBCK: 生}
