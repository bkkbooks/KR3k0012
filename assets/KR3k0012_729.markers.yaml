  - {type: variant, offset: 6, length: 1, content: 晉, WYG: 必有後於魯國又曰初楚子將以商臣為太子訪諸令尹子上子上曰君之齒未也而又多愛黜乃亂也楚國之舉恒在少者且是人也蜂目而豺聲忍人也可不立也弗聽又宣公曰楚司馬子良生子越椒子文曰必殺之是子也熊虎之狀而豺狼之聲不殺必滅若敖氏矣諺曰狼子野心是乃狼也其可畜乎子良不可子文以為大慼及將死聚其族曰椒也知政乃速行矣無及於難且泣曰鬼猶求食若敖氏之鬼不其餒而周}
