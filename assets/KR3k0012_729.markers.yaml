  - {type: variant, offset: 3309, length: 1314, content: 疋唐書曰太宗皇后長孫氏隋大業中歸寧於永興里后舅高士廉有姬張氏於后所宿舍側見一大馬二丈餘鞍勒備具士廉筮之遇坤彖曰至哉坤元萬物資生乃順承天坤厚載物德合無疆象曰牝馬地類行地無疆也泰彖曰內陽而外陰內健而外順則是天地交而萬物通也象曰后以輔相天地之宜而左右人也卜人曰龍乾之象也馬坤之象也變而為泰天地交也繇恊於歸妹婦人兆也案王弼云婦人謂嫁曰歸女處尊位履中居順也此女當大貴也其可盡言乎士廉志之而心獨喜親戚知者咸敬異焉又曰衛大經篤學善易口無二言則天降詔徵之辭疾不起嘗預筮死日先鑿墓自為誌文如筮而終又曰玄宗之為潞州別駕將入朝有軍人韓凝禮自謂知五兆上因以食箸試之既布卦一箸無故自起凡三偃三起觀者以為大吉徵既而誅韋氏定天保因此行也凝禮起家五品家語曰孔子嘗自為筮而卦得賁愀然有不樂之狀子張進曰師聞卜者得賁是吉卦也而夫子之色不平何也孔子曰以其雜也在周易山下有火謂之賁非正色之卦也夫質也白宜正白黑宜正黑今而以賁非吉兆也吾聞丹漆不文白玉不雕何者質之有餘質有餘者不受飾故也說苑同古史考曰庖羲作卦始有筮衝波傳曰孔子使子貢往外而未來謂弟子占之遇鼎皆言無下足不來顏子掩口而笑曰無足者乘舟而來賜至矣清朝也子貢果朝至國語曰晉公子在秦筮之曰尚有晉國得貞屯悔象皆八也內曰貞外日悔震下坎上屯坤下震上豫得此兩卦震在屯為貞在豫為悔八謂震兩陰爻在悔皆不動故曰皆八諸爻無為也筮史占之皆曰不吉卦閉而不通爻無為也司空季子日吉是在周易皆利建侯不有晉國以輔王室安能建侯我命筮曰尚有晉國筮告曰利建侯得國之務也吉孰大焉是二者得國之卦也二者屯豫又曰惠公卒秦伯納公子董困逆公於河公問焉曰吾其濟乎對曰歲在大梁集天行元年始受實沉之星也實沉之虛晉人是居所以興也今君當之無不濟矣君之行也歲在大火大火閼伯之星也是謂大辰臣筮之得泰之八乾下坤上泰遇泰無動爻筮為侯也泰三至五震為陰爻不動其數皆八故得泰之八與貞屯悔豫皆八義同曰是謂天地配享小往大來今及之矣何不濟之有且以辰出而以參人皆晉祥也濟且秉成必伯諸侯秉執子孫賴之君無懼矣又曰晉孫談之子適周事單襄公襄公有疾召頃公而告之曰吾聞晉之筮之也遇乾之否曰配而不終君三出焉一既往矣後之不知其次必此且吾聞之成公之生也其母夢神規其臀以黑曰使有晉國規畫臀尻三世而卑驩之孫故名之曰黑臀於今再矣襄公曰驩此其孫也此周子者晉襄公之孫也而令德孝恭非此其誰且其夢曰必驩之孫實有晉國其卦曰必三取君於周其德又可以君國三襲焉襲合也三合德夢卦也吾聞之泰誓曰朕夢恊于朕卜襲于休祥戎商必剋以三合襲晉仍無道而鮮胄其將失之矣早善晉子其當之晉子周子頃公許諾及厲公之亂召周子而立之是為悼公亂謂殺之智瓊傳曰弦超為神女所降論者以為神仙或以為鬼魅不可得正也著作郎干寶以周易筮之遇頤之益以示同寮郎郭璞曰頤貞吉正以養身雷動山下氣性唯新變而之益延壽永年乘龍銜風乃升于天此仙人之卦也搜神記曰橋玄字公祖梁國人也初為司徒長史五月末夜臥見東壁正白如門呼左右左右莫見因起自往手捫摸之壁如故還床又見心大恐其旦應劭往候之玄告劭曰鄉人有童彥興者許季山外孫也其探頤索隱窮神知化然天性褊狹羞於卜筮者玄聞往請之公祖虛禮盛饌下席行觴彥興辭公祖讓再三爾乃應之曰府君怪見白光如門明者然不為害也六月上旬雞鳴時聞南家哭即吉到秋節遷北行郡以金為名位至將軍三公到六月, SBCK: ''}
