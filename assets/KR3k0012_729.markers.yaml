  - {type: variant, offset: 1127, length: 245, content: 送豐有司不堪楚掠誣引殺妻融察而疑之問曰汝行往還頗有怪異及卜筮以不豐曰初將發夜夢乘馬南渡水返而北渡復自北而南馬停水中鞭策不去俯而視之見兩日在于水下左白而濕右黑而燥寤而心悸以為不祥還之夕復夢如初問筮者筮者云憂獄訟遠三枕避三沐既至妻為具沐夜授豐枕豐記筮者之言皆不從之乃自沐枕枕而寢融曰吾知之矣周易坎為馬為離三爻同變而成離離為中女坎為中男兩日二夫之象坎為執法吏吏誥其夫婦人被流血而死坎二陰一陽離三陽一陰相承易位離下坎上既濟文王遇之囚羑里有禮而生無禮而死馬左而濕水也左冰右馬馮字也兩日昌字也其馮昌殺之, SBCK: 於子圉}
