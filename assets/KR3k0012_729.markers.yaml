  - {type: variant, offset: 4624, length: 1013, content: 日太尉楊秉薨七月拜鉅鹿太守鉅邊有金焉復為度遼將軍遂登三事續搜神記曰郭璞每自為卦知其凶終嘗行建康柵塘逢一趨走少年便牽住脫絲布袍與之此人乃受及當死果此人行刑傍人皆為求屬璞曰我託之久矣此人為之歔欷哽咽又曰郤超年二十餘得重病廬江杜不愆始學易卜屢有驗超令試筮之卦成不愆曰案卦言之卿所苦尋除然宜於東北三十里上宮姓家索其先養雄雉籠而絆之置東簷下卻後九日辰加午必當有野雌雉飛來與交合既畢雙飛去若如此不出二十日病都除又是休應年將八十位極人臣若但雌逝雄留者病一周方差年半八十名位亦失超依其言索雉果得至期日超臥南軒下觀之至日晏果有雌雉飛入籠與雄交而去雄雉不動超歎息曰雖管郭之奇何以尚此超病彌年乃起至四十卒於中書郎錄異傳曰隗炤者汝陰鴻壽亭人也善於易臨死書板授其妻曰吾亡後當大荒窮雖爾慎莫賣宅也卻後五年春當有詔使來頓此亭姓龔此人負吾金卿以此板往責之勿違吾言言訖而卒後果大困乏欲賣宅憶夫言輒止期日有龔使者至亭妻遂齎板往使者執板惘然不知所以乃言曰我生不踐此何緣爾耶妻曰夫臨亡手書板見命如此不敢妄也使者沉吟良久而寤謂曰賢夫何善妻曰亡夫善於易而未會為人卜也使者曰噫可知矣乃命取蓍筮之卦成撫掌而歎曰妙哉隗生含明隱跡可謂鏡窮達而洞吉凶者也於是告炤妻曰吾不可相負金也賢夫自有金耳知亡後蹔窮故藏金以待泰平所以不告婦兒者恐金盡而困無已也知吾善易故書板以寄意耳金有五百斤盛以青甖覆以銅柈埋在堂屋東頭去壁一丈入地九尺妻還掘之皆如其言金樓子自敘云初至荊州卜雨聊附見首末孟秋之月亢陽日久月旦雖雨俄尒便晴有人云諺曰雨月額千里赤蓋旱之徵也吾乃端筴拂蓍遇動不動既而言曰庚子爻為世於金七月建申申子辰又三五合必在此月五日庚子果值甘雨余又以十七日筮何時雲卷金翹日耀合壁紅塵暗陌丹霞映峙謂亢陽之勢未霔膏澤筮遇坎之比於是輟蓍而歎曰坎者水也子爻為世其在金今夜三更平地上有水稱之為比其方有甘雨乎欣然有自得之志又曰桃文烈善龜卜謂余曰此二十一日將雨其在虞淵之時余乃筮之遇謙之小過既言曰坤艮二象俱在土宮非直無雨乃應開霽俄而星如玉李月上金波霧生猶縠河垂似帶余乃欣然異苑曰頴川庾嘉德善於蓍蔡之事有一人失婢庾卦云君可出東陵口伺候有姓曹乘車者無問識否但就其載得與不得殆一理也旦出郭果有曹郎上墓逕便升車曹大駭呼牛驚奔入草剌一死屍下視乃其婢也博物志曰龜三千歲遊於卷耳之上蓍千歲而三百莖同本以老故知吉凶又曰筮必沐浴齋潔燒香每朔望浴蓍必五浴之浴龜亦然鬼谷子曰夫決情定疑萬事之基以正亂治天決誠為難者也先生乃用蓍龜以助自決也, SBCK: ''}
