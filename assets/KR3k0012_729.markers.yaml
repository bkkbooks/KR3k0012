  - {type: variant, offset: 456, length: 351, content: 乃止及帝為晉王又使璞筮遇豫之睽璞曰會稽當出鍾以告成功上有勒銘應在人家井沸泥中得之繇辭所謂先王以作樂崇德殷薦之上帝者也及帝即位太興初會稽剡縣人果於井中得一鍾長七尺二分口徑四寸半上有古文奇書十八字云會稽嶽命餘字時人莫識之又曰王敦之謀逆也溫嶠庾亮使郭璞筮之璞對不決嶠亮復令占己之吉凶璞曰元吉嶠等退相謂曰璞對不了是不敢言或天奪敦魄令吾等與國家共舉大事而璞云元吉是為舉事必有成也於是勸帝討敦初璞每言殺我者山宗至是果有姓崇者構璞於敦敦將舉兵又使璞筮璞曰無成敦因疑璞之勸嶠亮又聞卦凶乃問璞曰卿更筮吾壽幾何荅曰思向卦明公起事必禍不久若往武昌壽不可測敦大怒曰卿壽幾何曰命盡今日中敦怒收璞詣南崗而斬之璞臨出謂行刑者欲何之曰南崗頭璞曰必在雙柏樹下既至果然復云此樹應有大鵲巢眾索云不見璞更令尋覓果於枝閒得一大巢密葉蔽之又曰庾翼, SBCK: ''}
