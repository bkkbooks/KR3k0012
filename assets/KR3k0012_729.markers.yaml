  - {type: variant, offset: 4150, length: 283, content: 聞晉之筮之也遇乾之否曰配而不終君三出焉一既往矣後之不知其次必此且吾聞之成公之生也其母夢神規其臀以黑曰使有晉國規畫臀尻三世而卑驩之孫故名之曰黑臀於今再矣襄公曰驩此其孫也此周子者晉襄公之孫也而令德孝恭非此其誰且其夢曰必驩之孫實有晉國其卦曰必三取君於周其德又可以君國三襲焉襲合也三合德夢卦也吾聞之泰誓曰朕夢恊于朕卜襲于休祥戎商必剋以三合襲晉仍無道而鮮胄其將失之矣早善晉子其當之晉子周子頃公許諾及厲公之亂召周子而立之是為悼公亂謂殺之智瓊傳曰弦超為神女所降論者以為神仙或以為鬼魅不可得正也著作郎干寶以周易筮之遇頤之益以示同寮郎郭璞曰頤貞吉正以養身雷動山下氣性唯新變而之益延壽永, WYG: ''}
