  - {type: variant, offset: 1094, length: 2, content: 苻融, WYG: 王見尉繚元禮衣服食飲與繚同繚曰秦王為人綘凖長目鷙啄鳥鷹豺聲少恩而虎狼心居約易出人下得志亦輕食人我布衣也然見我常身自下我誠使秦王得志於天下天下皆為虜矣不可與久遊乃亡去王覺固止之以為秦國尉又曰吕公曰臣少好相人多矣無如季相願季自愛臣有息女願為箕帚妾吕公女乃吕后也季漢髙祖字也又曰吕后與兩子居田中耨有一老父過請飲吕后因甫之老父相后曰夫人天下貴人令相兩子見孝惠曰夫人所以貴乃由此男相魯元亦皆貴又曰薄􅁎母媪之許負所相相薄􅁎當生天子薄􅁎少時與管夫人趙子兒相約曰富貴無相忘而管趙先幸漢王漢王坐河南成皋臺兩美人相與笑薄􅁎初約漢王問其故以實吿漢王心憐薄􅁎召一幸生代王即漢文帝也又曰姑布子卿見趙簡子簡子徧召其子使相之子卿曰無為將軍者簡子曰趙氏其㓕乎子卿曰吾嘗見一子於路之子也簡子召子毋恤毋恤至子卿起曰此真將軍矣簡子曰其母賤翟婢也奚道貴哉子卿曰天所授也雖賤必貴自是之後簡子盡召諸子與語毋恤最賢簡子乃告諸子曰吾藏寳符於常山之上先得者賞諸子馳之恒山求無所得毋恤還曰已得符矣簡子曰奏之毋恤曰從常山臨代代可取也簡子於是知毋恤果賢乃廢太子伯魯而以毋恤為太子又曰平原君對趙王曰澠池之㑹臣察武安君之為人小頭銳上瞳子白黑分明眡瞻不轉小頭銳上斷敢行也瞳子白黑分明者見事明也眡瞻不轉者執志彊也眡讀如視古文通用可與持久難與爭鋒亷頗為人勇􅋧而愛士知難而忍耻與之野戰則恐不如守足以當之王從其計又曰蔡澤者燕人也遊學于諸侯大小甚衆而不遇因從唐舉相曰聞子相李克百日之内持國秉政有之乎曰有之曰若臣者如何唐舉熟視而笑曰先生蝟鼻如蟲也巨肩魋顔蹙齃膝攣兩脚曲也吾聞聖人不相殆先生乎蔡澤知唐舉戲之乃曰冨貴吾所自有吾所不知者壽也願聞之舉曰先生之壽從今以往四十三嵗矣蔡澤笑謝而去謂其御者曰吾將飯梁齧肥躍馬疾驅懷黄金之印結紫綬於腰揖讓人主之前肉食富貴四十三歲亦足矣又曰英布少時遇相者曰當黥而後王布被刑欣然果為王又曰上使善相者相鄧通曰當貧餓死文帝曰能富貴通者在我於是賜通蜀道嚴銅山得自鑄錢景帝立有告通盜出徼鑄錢下吏驗問頗有遂竟案盡没其家一簪不得著身謂長公主遂寄死人家又曰條侯周亞夫為河内太守時許負相之曰君後三嵗而侯後八嵗為將相貴重於人臣無兩其後九嵗而餓死負指其口有螣蛇入口此餓死法也又曰韋賢為吏至大鴻臚有工相之至丞相有男四人使相之至第二子𤣥成相工曰此子貴當封侯竟為丞相又曰衞青為侯家人少時歸其父使牧牛母子皆奴畜之不以為兄弟數青嘗從上至甘泉居室有一鉗徒相青曰貴人也官至封侯青笑曰人之奴得無笞罵即足矣安得封侯漢書曰上立劉濞於沛為吳王王郡五十三城已拜受印髙帝召濞相之曰若狀有反相因拊其背曰漢後五十年東南有亂者豈汝耶然天下同姓一家慎無反濞頓首言曰不敢又曰李陵為匈奴所圍上意陵戰死召陵母及婦使相者視之無死喪色後聞降上甚怒又曰翟方進字子威汝南上蔡人家世微賤方進年十二三失父孤學給事大守府為小史號遲鈍不及事數為掾吏所詈辱方進自傷乃從汝南蔡父相問已能所宜蔡父大竒其形貎謂曰小史有封侯骨當以經術進方進聞蔡父言心喜因病歸家辭其後母欲西至京師受經後母憐其㓜隨之長安織履以給方進又曰黄霸與善相者共載出見一婦人相者言此婦人當貴不然相書不可用矣霸推問之乃其鄉里巫家女也霸即娶為妻與之終身後為丞相後漢書曰世祖以朱祐為護軍常見親幸舍之於中祐侍讌從容曰長安劉公有日角之相此天命也又曰龍淵善相劉宏造淵淵聞宏聲乃起迎曰公當極位也宏曰家貧負債可得貴乎淵曰公匆然也張濟就相淵曰事劉宏可至三公濟事宏後為解瀆侯既去南陽桓帝崩迎解瀆侯為天子是為靈帝濟}
