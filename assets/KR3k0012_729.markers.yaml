  - {type: variant, offset: 38, length: 64, content: 君慎不可東行必遭暴害之氣而非劫也序之不信卿曰既必不信宜有以禳之可索西郭外獨母家白雄狗繫著舩前求索正得駮狗無白卿曰駮者亦足然猶恨其, WYG: 汝聲清浮汝色赤火}
  - {type: variant, offset: 39, length: 0, content: '', SBCK: 三歲而侯侯八歲爲將相貴重於人臣無兩其後九歲而餓死􅀒指其口有從理入口此餓死法也又曰韋賢爲吏至大鴻臚有工相之至丞相有男四人使相之至第二子􅀇成相工日此子貴當封俟竟爲亟相又日衛靑爲侯家人少時歸其父使牧牛母子皆奴畜之不以爲兄弟數青嘗從上至甘泉居室有一鉗徒相靑日貴人也官至封侯青􅀏日人之奴得無笞罵卽足矣安得封侯漢書日上立劉濞於沛爲吳王王郡五十三城巳拜受印高帝召濞相之日若狀有反相因拊其背日漢後五十年東南有亂者豈汝耶然天下同姓一家}
