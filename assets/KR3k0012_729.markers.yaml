  - {type: variant, offset: 1104, length: 2, content: 董豐, WYG: 大司徒融之曾孫也父勲尚東海恭王疆女泚陽公主后其長女也家既廢壞數從相工問息耗耗惡也息耗猶言善惡也見后者皆言當大尊貴非臣妾容貎又曰和熹鄧后傳曰㓜時嘗有相者蘇文見后大驚曰此成湯之骨法也貴不可言家人竊喜而不敢宣又曰漢法常因八月筭人遣中大夫與掖庭丞及相工於洛陽鄉中閲視良家童女十三以上二十以下姿色端麗合法相者載還後宫擇視可否乃用登御所以慎明聘納詳求淑喆東觀漢記曰班超行詣相者相者曰祭酒布衣諸生耳而當封侯萬里之外超問其狀相者指曰生鷰頷虎頭飛而食肉此萬里侯相也又曰李固字子堅漢中南鄭人也司徒郃之子固貎壯有竒表鼎角匿犀足履龜文少好學常步行隨師不逺千里魏志曰管輅族兄孝國居在升丘輅往從之與二客㑹客去後輅謂孝國曰此二人天廷及耳口之間同有凶氣異變俱起雙魂無宅流魄於海骨歸於家少許時當並死後數十日二人飲酒醉夜共載車牛驚下入漳河中皆即溺死矣又曰鍾繇嘗與族父瑜俱至洛陽道遇相者曰此童有貴相然當厄於水努力慎之行未十里度橋馬驚墮水幾死瑜以相者言中益貴繇由是供給資費使得專學舉孝亷又曰朱建平沛國人善相術穎川荀攸鍾繇相與親善攸先亡子㓜繇經紀其門户欲嫁其女與人書曰吾與公達曾共使朱建平相建平曰荀君雖少然當以後事付鍾君吾時嘲之曰唯當嫁􅀸阿騖耳何意此子竟早殞殁戲言遂驗乎今欲嫁阿騖使得好處為追思建平之妙雖唐舉許負何以復加耶又曰文帝為五官將坐上㑹客三十餘人文帝問朱建平巳年壽又命徧相衆賔建平曰將軍當壽八十至四十時當小有厄願謹護之謂夏侯威曰君四十九位為州牧而當有厄厄若得過可年至七十致位公輔謂應璩曰君六十二位為常伯而當有厄先此一年獨見白狗而旁人不見也謂曹彪曰君據藩國至五十七當厄於兵宜善防之後文帝皇初七年年四十病因謂左右曰建平所言八十謂晝夜也吾其決矣頃之果崩夏侯威為兖州刺史年四十九十二月上旬得疾念建平之言自分必死至三十日夜半卒應璩六十一為侍中直省内欻見白狗問之衆人悉無見者於是數聚㑹并}
