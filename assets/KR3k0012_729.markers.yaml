  - {type: variant, offset: 4723, length: 3, content: 郤超年, WYG: 檀憑之嘗有善相者晉陵韋叟見憑之大驚曰卿有急兵之厄其候不過三四日耳宜深藏以避之不可輕出及桓𤣥將皇甫敷之至羅落橋也憑之與劉裕各領一隊而戰軍敗為敷軍所害又曰魏詠之字長道任城人家素貧而躬耕為事好學不倦生而兔缺有善相者謂之曰卿當富貴後果如言又曰王彌少遊俠京師隱者董仲道見而謂之曰君豺聲豹視好亂樂禍若天下騷擾不作士大夫矣晉中興書曰陶侃少漁雷澤夢生八翼飛至天門而不入相者師珪曰君位當上公為八州都督太平御覽卷七百}
