  - {type: variant, offset: 1405, length: 346, content: 宋書曰劉休善筮因尚書令吳喜事明帝遂見親賞長直殿內後宮孕者帝使筮其男女無不如占齊書曰賀瑒伯祖導養工卜筮經遇工歌女人病死為筮之曰此非死也天帝召之歌耳乃以土塊加其心上俄頃而蘇南史曰梁大同中同泰寺災帝召太史令虞履筮之遇坤之履曰無害其繇曰西南得朋東北喪朋安貞吉文言曰東北喪朋乃終有慶帝曰斯魔也酉應見卯金來剋木卯為陰賊鬼而帶賊非魔孰為致之酉為口舌當就說言乎兌故知善言乎宜前為法事於是人人贊善莫不從風梁書曰鄧元起初為益州剌史及巴東聞蜀亂使蔣光濟筮之遇蹇喟然歎曰吾豈鄧艾而及此乎後果如筮又阮孝緒傳曰孝緒見善筮者張有道曰見子隱跡而心難明自非考之龜蓍無以驗也及布卦既揲五爻曰此將為鹹應感之法非嘉遁之兆孝緒曰安知後爻不為上九果成遁卦有道歎曰此所謂肥遁無不利象實應德心跡并也孝緒曰雖獲遁卦而上九爻不發升遐之道便當高謝, SBCK: ''}
