  - {type: variant, offset: 2647, length: 422, content: 不見又後周書曰梁孝元凡諸伎術無所不該南平嗣王恪嘗以銅合盛金玉虎珀指環請孝元射覆卦遇姤之履林曰上既為天其體則圓指環之象金玉在焉寅爻帶牛寅則為虎琥珀生光在合中央合中之物凡有三種案卦而談或輕或重恪於是神服又以壬申日寅時筮南軍何時有信遇剝之艮孝元曰使還已在門外遣人往看果如所說賓客驚其妙而問之孝元曰艮為門時在寅與日辰并故知之耳凡所占決萬不失一及我軍之伐援蓍為卦取龜式驗之因抵於地曰吾若死此下豈非命乎隋書曰楊伯醜馮翊武鄉人也好讀易隱於華山開皇初被徵入朝見公卿不為禮無貴賤皆汝之人不能測也高祖召與語竟無所荅上賜之衣服至朝堂捨之而去於是被髮陽狂遊行市里形體垢穢未嘗櫛沐時有張永樂者賣卜京師伯醜每從之遊永樂為卦有不能決者伯醜輒為分折爻象尋幽入微永樂嗟服自以為非及也伯醜亦開肆賣卜有人嘗失子就伯醜筮者卦成伯醜曰汝子在懷遠坊南門道東北壁上有青裙女子抱之可往取也如言果得或有金數兩夫妻共藏之於後失金其夫意妻有異志將逐之其妻稱冤以詣伯醜伯醜為筮之曰金在矣悉呼其家人指一, WYG: 要煥宿屏}
