  - {type: variant, offset: 3508, length: 567, content: 焉又曰衛大經篤學善易口無二言則天降詔徵之辭疾不起嘗預筮死日先鑿墓自為誌文如筮而終又曰玄宗之為潞州別駕將入朝有軍人韓凝禮自謂知五兆上因以食箸試之既布卦一箸無故自起凡三偃三起觀者以為大吉徵既而誅韋氏定天保因此行也凝禮起家五品家語曰孔子嘗自為筮而卦得賁愀然有不樂之狀子張進曰師聞卜者得賁是吉卦也而夫子之色不平何也孔子曰以其雜也在周易山下有火謂之賁非正色之卦也夫質也白宜正白黑宜正黑今而以賁非吉兆也吾聞丹漆不文白玉不雕何者質之有餘質有餘者不受飾故也說苑同古史考曰庖羲作卦始有筮衝波傳曰孔子使子貢往外而未來謂弟子占之遇鼎皆言無下足不來顏子掩口而笑曰無足者乘舟而來賜至矣清朝也子貢果朝至國語曰晉公子在秦筮之曰尚有晉國得貞屯悔象皆八也內曰貞外日悔震下坎上屯坤下震上豫得此兩卦震在屯為貞在豫為悔八謂震兩陰爻在悔皆不動故曰皆八諸爻無為也筮史占之皆曰不吉卦閉而不通爻無為也司空季子日吉是在周易皆利建侯不有晉國以輔王室安能建侯我命筮曰尚有晉國筮告曰利建侯得國之務也吉孰大焉是二者得國之卦也二者屯豫又曰惠公卒秦伯納公子董困逆公於河公問焉曰吾其濟乎對曰歲在大梁集天行元年始受實沉之星也實沉之虛晉人是居所以興也今君當之無不濟矣君之行也歲在大火大火閼伯之星也是謂大辰臣筮之得泰之八乾下坤上泰遇泰無動爻筮為侯也泰三至五震為陰爻不動其數皆八故得泰之八與貞屯悔豫皆八義同, WYG: 氣華}
