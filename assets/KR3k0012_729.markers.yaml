  - {type: variant, offset: 656, length: 301, content: 是果有姓崇者構璞於敦敦將舉兵又使璞筮璞曰無成敦因疑璞之勸嶠亮又聞卦凶乃問璞曰卿更筮吾壽幾何荅曰思向卦明公起事必禍不久若往武昌壽不可測敦大怒曰卿壽幾何曰命盡今日中敦怒收璞詣南崗而斬之璞臨出謂行刑者欲何之曰南崗頭璞曰必在雙柏樹下既至果然復云此樹應有大鵲巢眾索云不見璞更令尋覓果於枝閒得一大巢密葉蔽之又曰庾翼幼時嘗令璞筮公家及身卦成曰立始之末丘山傾長順之初子凋零及康帝即位將改元為建元或謂庾冰曰子忘郭生之言邪立始建元也丘山上名此號不宜用冰撫心歎恨帝崩何充改元為永和庾翼歎曰天道精微乃當如是長順者永和也吾庸得免乎其年翼卒冰又令筮其後嗣卦成曰卿諸子並當貴盛然有白龍者凶徵至矣若墓碑生金庾氏之大忌也後冰子蘊為廣州剌, WYG: ''}
