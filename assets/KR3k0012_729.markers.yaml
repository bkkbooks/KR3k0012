  - {type: variant, offset: 1808, length: 234, content: 明堂左個詔太常卿王諶親令龜易筮南伐之事其兆遇革高祖曰此是湯武革順之卦也群臣莫敢言澄曰革者更也將欲應天順人革君臣之命湯武得之為吉陛下帝有天下重光累葉今日卜征乃可伐叛不得云革命此非君人卦未可為吉也高祖厲聲曰此象云大人虎變何云不吉也澄曰陛下龍興既久不宜方同虎變高祖勃然作色曰社稷我社稷任城而欲沮眾也澄曰社稷誠知陛下之社稷然臣是社稷之臣也務參顧問敢盡愚衷高祖久之乃解曰各言其志亦復何傷車駕還宮便召澄未及昇陛遙謂曰向者之革今更欲論之明堂之忿懼眾人竟言沮我計故厲色怖文武耳想解朕意, WYG: 地}
