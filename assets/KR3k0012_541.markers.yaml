  - {type: variant, offset: 32, length: 2, content: 玄冠, SBCK: 張􅀒有女孫五嫁夫輙死人莫敢娶平欲得之邑中有大喪平家貧待喪待先徃後去罷爲助張負旣見之喪所獨視偉平平亦以故後去隨平至其家家乃􅀒郭窮巷以席爲門然門外多長者車張負欲以女孫與平其子仲曰平貧柰何與之女負曰固有美如陳平長貧賤者乎卒與女平貧乃假貸幣以聘與酒肉之資以内婦又曰張耳大梁人也少時及魏公子無忌爲客嘗亡命遊外黄外黄冨人女甚羙嫁庸奴亡其夫去抵父客素知張耳謂女曰必欲求賢夫從張耳女聽爲請決嫁之女家厚奉給耳耳以故致千里客及官魏外黄令陳餘亦大梁人好儒術遊趙苦陘冨人公乗氏以其女妻之又曰張放得幸成帝放取皇后弟平恩侯許嘉女上爲放供帳賜甲第充以乗輿服餘飾時號爲天子娶婦皇后嫁女又曰王閎妻父蕭咸爲中郎將董賢父恭慕之欲以賢爲弟求婚咸恐私謂閎曰董公爲大司馬􅁽文云允執其中此堯禪舜之文長老見者莫不心懼此豈家子所能堪耶閎性有智略聞咸言心亦悟乃還報謙逺之意恭不恱又曰鄭崇字子游夲髙宻大族丗與王家相嫁娶後漢書曰􅀽術僣亂曹操託楊彪與術婚姻誣以欲圖廢置奏収下獄劾以大逆孔融聞之不及}
  - {type: page-break, offset: 32, content: '', id: KR3k0012_SBCK_541-2a}
