  - {type: variant, offset: 94, length: 1, content: 冠, SBCK: 禇淵致意爲子晃求女㛰閎不敢聞命曰辭霍不婚常所嘉揖齊大非偶所以不敢承殊眷太祖雖嘉其退讓而心不能懽也蕭子顯齊書曰王秀之字伯􅁬臨沂人也吏部尚書禇淵見秀之正潔欲與結㛰秀之不肯以此頻爲府外兵叅軍梁書曰江蒨方雅有風格僕射徐勉權重唯蒨及王規與抗禮不爲之屈勉因蒨門客翟景爲子繇求婚於蒨蒨不荅景再言之乃杖景四十由此與勉忤韓子曰楚王謂田鳩曰墨}
