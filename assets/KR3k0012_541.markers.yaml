  - {type: variant, offset: 2094, length: 544, content: 永平四年外弟王景系兄弟四人並冠故貽之詩曰濟濟四令弟妙年踐二九今月惟吉日成服加元首雖無兕觥爵杯醮傳旨酒後漢黃香天子冠頌曰以三載之孟春建寅月之上旬皇帝將加玄冕簡甲子之元辰厥日王於太皞厥時叶於百神既臻廟而成禮乃廻軨而反宮正朝服以享宴撞太蔟之庭鍾祚蕃屏而鼎輔暨夷裔之君王咸進酌于金罍獻萬年之玉觴蕭子範冠子箴曰是月惟令敬擇良辰式遵士典諮筮于賓嘉賓受錫醮酒方陳禮莊爾質德成爾身梁沈約冠子祝文曰蠲茲令日元服肇加成德既學童心自化行之則至無謂道敗敦以秋實食以春華無恥下問乃致高車子孫千億廣樹厥家婚姻上易歸妹九四曰歸妹愆期遟歸有時夫以不正旡應而適人也必須彼道窮盡旡所與交然後乃可以往故愆期遟歸以待時也又咸卦曰咸亨利貞取女吉山澤以氣通男女以禮感男女初嫁之象所以為禮彖曰咸感也柔上而剛下二氣感應以相與止而說男下女是以亨利貞取女吉也天地感而萬物化生聖人感人心而天下和平万物感陽氣而生民感聖人之化而和悖政感天而生毛詩鵲巢何彼穠矣曰何彼穠矣美王姬也雖則王姬亦下嫁於諸侯猶執婦道以成肅雍之德也又國風曰谷風剌夫婦失道也衛人化其上淫於新婚而棄其舊室夫婦離絕國俗傷敗焉習習谷風以陰以雨僶俛同心不宜有怒德音莫違及爾同死又曰綢繆剌晉亂也國亂則婚姻不得其時焉不得其時謂不及中春之月又曰東門之楊剌時也婚姻失時男女多違親迎女猶有不至者也, WYG: ''}
