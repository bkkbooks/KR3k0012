  - {type: variant, offset: 2980, length: 215, content: 是則其子孫慈悌孝愛不敢淫暴黨無不善三族輔之故鳳皇生而有仁義之意虎狼生而有貪戾之心嗚呼戒之哉無養乳虎將傷天下儀禮曰記士婚禮凡行事必用昏昕受諸一禰廟辭無不腆無辱摯不用死皮帛必可制腊必用鮮魚用鮒必殽全禮記曲禮上曰男女非有行媒不相知名見媒往來傳婚姻之言乃相知姓名非受幣不交不親故書日月以告君齋戒以告鬼神為酒食以召鄉黨寮友以厚其別也娶妻不娶同姓故買妾不知其姓則卜之又曲禮下曰納女於天子曰備百姓於國君曰備酒漿於大夫曰備灑掃納女猶致女也又曾子問, SBCK: 家語}
