  - {type: variant, offset: 4, length: 0, content: '', WYG: 婚姻下媒婚姻下論語曰子謂公冶長可妻也雖在縲絏之中非其罪也以其子妻之子謂南容邦有道不廢邦無道免於刑戮以其兄之子妻之公冶長弟子魯人也南容弟子南宫縚也爾雅曰女子之夫為壻壻之父為姻婦之父為婚婦之父母壻之父母相謂為婚姻國語曰董叔將娶於范氏叔向曰范氏富盍已乎曰欲為繫援焉繫援欲自結連於大援也他日董祈愬之於范獻子曰不吾敬也獻子執而紡之紡猶懸也懸於庭之槐也叔向過之曰子盍為我請乎叔向曰求繫既繫矣求援既援矣欲而得之又何為焉家語曰伯夏生叔梁紇叔梁紇娶於魯施氏生女}
