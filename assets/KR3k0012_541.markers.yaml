  - {type: variant, offset: 1373, length: 0, content: '', SBCK: 重國嗣不從古制也白虎通曰婚姻者何謂昬時行禮故曰㛰婦人因夫而成故曰姻又曰人道何以有嫁娶者何以爲情性之大者莫大於男女之交人倫之始莫􅀂夫婦男三十而娶女二十而嫁何陽數竒隂數偶男長女㓜者何陽道舒隂道促男三十䈥骨以堅彊任爲人父女二十肌膚充盛任爲人母合爲五十應大衍之數生萬物也又曰禮曰女子十五許嫁納采問名納吉請期親迎以鴈爲贄納徴用玄纁故不用鴈也納徴玄纁束帛離皮玄三法天纁二法地也陽竒隂偶明陽道之大也離皮者兩皮也以爲庭實庭實偶也又曰嫁娶必以春何春天地交通萬物始生隂陽交接之時也詩曰士如歸妻迨氷未泮夏小正曰二月}
