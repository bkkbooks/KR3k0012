  - {type: variant, offset: 1509, length: 859, content: 禮懿子曰天子未冠即位長亦冠乎孔子曰古者王世子之雖幼而即位則尊為人君尊為人君治為成人之事者也何冠之有懿子曰然然則諸侯之冠異天子與孔子曰君薨而世子主喪是亦冠也與人君無殊也懿子曰今邾君之冠非禮乎孔子曰諸侯之有冠禮也夏之末造也有自來矣今無譏焉又曰成王年十有二而嗣立明年六月冠成王而朝于祖廟以見諸侯周公命祝雍作頌曰祝王辭達而勿多也祝雍辭曰使王近於民遠於年嗇於時惠於財親賢而任能其頌曰令月吉日王始加元服去王幼志乃心兗職欽若昊天六合是式率爾祖考烝烝無極國語曰趙文子冠謂以士禮始冠也見韓獻子獻子曰戒之此謂成人成人在始與善始與善進不善蔑由至矣蔑無也始與不善進善亦蔑由至矣如草木之產也各以其物人之有冠猶宮室之有牆屋也冀除而已又何加焉糞除喻自脩潔漢書曰惠帝元年冠赦天下除挾書律又曰宣帝五鳳元年皇太子冠太后賜丞相以下帛赦徒作杜陵者續漢書曰安帝靈帝加元服並大赦賜公卿金帛東觀漢記曰馬防子鉅為常從小侯六年正月齊宮中上欲冠鉅夜拜為黃門郎御章臺下殿陳鼎俎自臨冠之晉書禮志曰江左諸帝將冠金石宿設百僚陪位豫於殿上鋪大床御府令奉冕幘簪導袞服以授侍中常侍太尉加幘太保加冕太尉跪讀祝文曰今月吉日始加元服皇帝穆穆思弘袞職欽若昊天六合是式率遵祖考永永無極眉壽惟祺介茲景福譙周喪服圖曰男子幼娶必冠女子幼嫁必笄禮之則從成人不為殤禮論曰王彪之以為禮冠自卜日不必以三元也又禮夏冠用葛屨冬冠用皮屨明無定時也後漢應亨贈四王冠詩曰永平四年外弟王景系兄弟四人並冠故貽之詩曰濟濟四令弟妙年踐二九今月惟吉日成服加元首雖無兕觥爵杯醮傳旨酒後漢黃香天子冠頌曰以三載之孟春建寅月之上旬皇帝將加玄冕簡甲子之元辰厥日王於太皞厥時叶於百神既臻廟而成禮乃廻軨而反宮正朝服以享宴撞太蔟之庭鍾祚蕃屏而鼎輔暨夷裔之君王咸進酌于金罍獻萬年之玉觴蕭子範冠子箴曰是月惟令敬擇良辰式遵士典諮筮于賓嘉賓受錫醮酒方陳禮莊爾質德成爾身梁沈約冠子祝文曰蠲茲令日元服肇加成德既學童心自化行之則至無謂道敗敦以秋實食以春華無恥下問乃致高車子孫千億廣樹厥家婚姻上易歸妹九四曰歸妹愆期遟歸有時夫以不正旡應而適人也必須彼道窮盡旡所與, SBCK: ''}
