  - {type: variant, offset: 273, length: 472, content: 拜送母又拜賓降直西序東面主人降復初位冠者立于西階東南面賓字之冠者對賓出主人送于廟門外請醴賓就次此醴當作禮禮賓者謝其自勤勞冠者見於兄弟兄弟再拜冠者荅拜入見姑姊如見其母如見母者亦北面姑姊不拜也不見妹妹卑也乃易服服玄冠玄端爵韠奠贄見于君遂以贄見于大夫鄉先生若孤子則父兄戒宿若庶子則冠于房外南面遂醮焉加始祝曰令月吉日始加元服棄爾幼志順爾成德壽考惟祺介爾景福再加曰吉月令辰乃申爾服敬爾威儀淑慎爾德眉壽萬年永受斯福三加曰以歲之正以月之令咸加爾服兄弟具在以成厥德黃耇無疆受天之慶醴辭曰甘醴惟厚嘉薦令芳拜受祭之以定爾祥承天之休壽考不忘醮辭曰旨酒既清嘉薦既時始加元服兄弟具來孝友時格永乃保之再醮曰旨酒既湒嘉薦伊脯乃中爾服禮儀有序祭此嘉爵承天之祐三醮曰旨酒令芳籩豆有楚咸加爾服肴升折俎承天之慶受福無疆字辭曰禮儀既備令月吉曰昭告爾字爰字孔嘉髦士攸宜宜之于嘏永受保之大戴禮逸禮曰太子既冠成人免於師傳則有司過之史有虧膳之宰太子有過史必書之禮記郊特牲曰始冠緇布之冠也大吉冠布齊則緇之嫡子冠於阼以著代也醮於客位加有成也三加彌尊喻其志也冠而字之敬其名也無大夫冠禮而有其婚禮古者, SBCK: ''}
