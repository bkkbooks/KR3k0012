  - {type: variant, offset: 1374, length: 0, content: '', SBCK: 子娶婦之時也夫有惡行妻不得去地無去天之義夫雖有惡猶不可去也故郊特牲記曰壹與之醮終身不改悖逆人倫殺妻父母廢絶綱紀亂之大者也義絶乃得去耳天子諸侯一娶九女者何重國廣繼嗣也適九何地有九州承天之施無所不生一娶九女亦足承君施九}
