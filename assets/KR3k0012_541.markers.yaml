  - {type: variant, offset: 3496, length: 671, content: 尺謂之疋由匹偶之云也又祭統曰國君娶夫人之辭曰請君之玉女與寡人共有幣邑事宗廟社稷此求助之本也又經解曰婚姻之禮廢則夫妻之道苦而淫僻之罪多矣又哀公問曰哀公問於孔子曰敢問為政如之何孔子對曰古之為政愛人為大所以治愛人禮為大所以治禮敬為大敬之至矣大婚為大大婚既至冕而親迎親之也公曰冕而親迎不已重乎已猶大也怪親迎乃服祭服也對曰合二姓之好以繼先聖之後以為天地宗廟社稷之主君何謂已重乎天地不合萬物不生大婚萬世之嗣也君何謂已重焉又婚禮曰婚禮者將合二姓之好上以事宗廟而下以繼後世也故君子重之是以婚禮納采問名納吉納吉納徵致禮幣為徵信也請期永請迎之言也皆主人筵几於廟而拜迎於門外入揖讓而升聽命於廟所以敬慎重正婚禮也父親醮子而命之迎男先於女也子丞命以迎主人筵几於廟而拜迎於門外壻執鴈而入揖讓升再拜奠鴈蓋親授之於父母也又外傳曰古者謂婚姻為兄弟因成兄弟之義也壻曰婚以昏時往婦曰姻因壻之來則從之而去又壻之父曰姻婦之父曰婚爾雅取其內外父黨之新者壻者陽也婦者陰也日往而陰氣至也昏時曰往則月來陽往陰來之義又曰夏殷五世之後則通婚姻周公制禮百世不通所以別禽獸也左傳文公上曰逆婦姜於齊卿不行非禮也又成下曰晉侯使呂相絕秦曰昔逮我先君獻公及穆公相好戮力同心申之以盟誓重之以婚姻天禍晉國文公如齊惠公如秦又晉侯使呂相絕秦曰白狄及君同州君之仇讎而我之婚姻也君來賜命曰吾與汝伐狄寡君不敢顧婚姻畏君之威而受命於吏又成下曰聲伯之母不聘不聘無媒禮穆姜曰吾不以妾為姒生聲伯而出之嫁於齊又定上曰楚昭王敗鍾建負季芉以逃王將嫁季芉辭曰所以為女子遠丈夫也鍾建負我矣以妻鍾建又哀上曰劉氏范氏世為婚姻劉氏周卿士范氏晉大夫, SBCK: 一}
