  - {type: variant, offset: 97, length: 0, content: '', SBCK: 顯學也其身體可則也其言多不辯何也田鳩對曰昔者秦伯嫁女於晋公子爲之飾裝從文衣之媵七十人至晉晉人愛其妾而不愛公女此可謂善嫁妾矣未可謂善嫁女也又曰齊桓公微服以巡民家人有年老而自養者公問其故對曰臣有子五人家貧無以妻之使傭未及反公歸以告管仲管仲曰畜積有腐棄之財而民饑餓宫中有怨女而民無妃公曰善}
