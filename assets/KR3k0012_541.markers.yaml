  - {type: variant, offset: 93, length: 0, content: '', SBCK: 一解禁止自今後冝爲其防又曰阮脩字宣子居貧四十未有室王敦等歛錢爲㛰皆名士也時慕之者求入錢而不得宋書曰江湛字微淵濟陽考城人也爲義康司徒主簿司空擅道濟爲子求湛妹婚不許義康有命又不從時人重其立志義者也吴均齊春秋曰桓閎字叔通太祖輔政}
