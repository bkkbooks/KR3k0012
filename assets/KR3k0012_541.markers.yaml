  - {type: punctuation, offset: 9, content: 「, id: KR3k0012_CHANT_541-bkkpn4}
  - {type: variant, offset: 9, length: 0, content: '', WYG: 以賣馬錢娶婦令多惡病夫妻離别漢書曰陳平邑有富人張負有女孫五嫁夫輙死人莫敢娶平欲得之邑中有大䘮平家貧侍䘮以先徃後去罷為助張負既見之䘮所獨視偉平平亦以故後去隨平至其家家貧負郭窮巷以席為門然門外多長者車轍張負欲以女孫與平其子仲曰平貧奈何與之女負曰固有美如陳平長貧賤者乎卒與女平貧乃假貸幣以聘與酒肉之資以内婦又曰張耳大梁人少時及魏公子無忌為客嘗亡命逰外黄外黄富人女甚美庸奴其夫亡邸父客素知張耳謂女曰必欲求賢夫從張耳女聴為請决嫁之女家厚奉給耳耳以故致千里客及官魏外黄令陳餘亦大梁人好儒術逰趙井陘富人公乗氏以其女妻之又曰張放得幸成帝放取皇后弟平恩侯許嘉女上為放供帳賜甲第充以乗輿服飾于時號為天子娶婦皇后嫁女又曰王閎妻父蕭咸為中郎將董賢父恭慕之欲以賢為弟求婚咸恐私謂閎曰董公為大司馬册文云允執其中此堯禪舜之文長老見者莫不心懼此豈家子所能堪耶閎性有知略聞咸言心亦悟乃還報謙逺之意恭不恱又曰鄭崇字子㳺本髙宻大族世與王家相嫁娶命敬恭聽宗爾父母之言夙夜無愆視諸衿鞶去不辭誡不諾葢恥之重去也鄭𤣥别傳曰故尚書左丞同縣張逸年十三為縣小吏君謂之曰爾有賛道之徳玊雖美湏雕琢而成器能為書生以成其志不對曰願之乃遂拔於其輩妻以弟女列女傳曰邵南申女者申人之女也旣許嫁於農家禮不備而欲迎之女與其人言其人媒氏往求命之者以為夫婦者人倫之始也不可不正夫家輕我違制不可以行夫家訟之女曰一物不具一禮不備守節持義必死不徃又曰魯師春姜者魯師氏之母也嫁其女三徃而三逐春姜問故以輕其室人也春姜召其女而笞之曰夫婦人以順從為務貞慤為首故婦事夫有五平旦纚筓而朝則有君臣之嚴洗盥饋食則有父子之敬報反而行則有兄弟之道必期必誠則有朋友之信寢席之交然後有夫婦之際君子謂春姜曰知陰陽之順逆也楚國先賢傳曰孫擕字文英與李元禮俱娶太尉桓焉女時人謂桓叔元兩女俱乗龍言得壻如龍也世說曰王戎儉恡其從子壻與一單衣裁後便責之戎女適裴氏貸錢數萬女歸戎不悅女還錢乃懌世說曰温嶠從姑劉氏家值亂離唯有一女姑問嶠有求婚意答云佳壻難得但如嶠比云何姑答云喪破之餘乞得粗相存活便足慰吾餘年敢希汝比却數日嶠報姑云已得婚處門第粗可壻身不減嶠因下玉鏡臺一枚姑大喜既婚交禮女以手披紗扇大笑曰固嫌是此老奴果如所疑玉鏡臺是嶠為劉越石長史北征劉聰所得也後漢書曰袁術僭亂曹操託楊彪與術婚姻誣以欲圖廢置奏取下獄劾以大逆孔融聞之不及朝服往見操曰楊公四代清徳海内所瞻周書父子兄弟罪不相及况以袁氏歸罪楊公操曰此國家之意融曰假使成王殺召公周公可得言不知耶操遂理出彪魏志曰王褒與管彦各男女始生許為婚彦為西夷校尉褒女更許人彦弟馥問褒褒曰賢兄𦵏父於洛陽隨母還臨淄用意如此何昏之有魏氏春秋曰司空東萊王基當世大儒豈不達禮而納司空王忱女以姓同源異故也又曰陳矯本劉氏子出嗣舅氏而婚於本族徐宣每非之廷議其闕太祖以矯才量欲全之乃下令曰喪亂以來風敎凋薄謗議之言難同褒貶自建安五年已前一切勿論其以斷前誹議者以其罪罪之魏志曰桓楷字伯緒劉表辟為從事祭酒欲妻以妻妹蔡氏楷自陳已結婚他處拒不受也又曰王粲父名謙名公之胄何進為長史欲與為㛰見二子使擇焉謙不許魏書評曰夏侯曹氏世為婚姻故淳淵仁洪休尚真等並親舊肺腑貴重於時左右勲業咸有勞効吳書曰陶謙字恭祖丹陽縣人甘公出遇之塗見其状貎異而呼之住車與語甚悅之因許妻以女甘夫人怒曰聞陶家兒逰戯無度如何以女許之甘公曰彼有竒表後必大成遂與之後為徐州牧吳志曰吕範字子衡汝南細陽人少為縣吏有客觀其姿邑人劉氏家富女美範求之母嫌欲勿與劉氏曰觀吕子衡寧為久貧者耶王隠晉書曰初后父楊駿欲以女妻鄭黙子預黙忌其太盛拒而不婚晉書曰王籍之為太子文學居叔母之䘮而婚丞相司直劉隗奏之帝下令云詩稱殺禮多婚以㑹男女之無夫家者正今日之謂也可以解禁止自今後為置其防又曰阮修字宣子貧居四十未有妻王敦等斂錢為婚皆名}
