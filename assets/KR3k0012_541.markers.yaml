  - {type: variant, offset: 36, length: 8, content: 緇帶素韠即位示門, SBCK: 徃見操曰楊公四代清德海内所瞻周書父子兄弟罪不相及況以􅀽氏歸罪楊公操曰此國家之意融曰假使成王殺召公周公可得言不知邪操遂理出彪魏志曰王褒與管彦男女各始生許爲㛰彦爲西夷校尉褒女更許人彦弟馥問褒褒曰賢兄葬父於洛陽隨母還臨淄用意如此何㛰之有魏氏春秋曰司空}
