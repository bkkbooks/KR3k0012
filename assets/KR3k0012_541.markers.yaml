  - {type: variant, offset: 805, length: 563, content: 幣之可也本古耳非時王之法服也又曰曾子問曰將冠子冠者至揖讓而入聞齊襄大功之喪如之何冠者賓及贊者孔子曰內喪則廢外喪則冠而不醴徹饌而歸即位而哭如冠者未至則廢內喪同也不醴不醴子也其廢者喪成服因喪不冠如將冠子而未及期日而有齊衰大功小功之喪則因喪服而冠廢告禮而因喪冠俱成人之服及至也除喪不改冠乎孔子曰天子賜諸侯大夫冕弁服於太廟歸設奠服賜於斯乎有冠醮無冠醮酒為醮冠禮醴重而醮輕此服賜服酌用酒尊賜也不醴明不為改冠改冠當醴之父沒而冠則已冠掃地而祭於禰已祭而見伯父叔父而後饗冠者饗謂之禮又冠義曰冠而后服備服備而后容體正顏色齊辭令順言報未備者未可求以三始也童子之服采衣紒故曰冠者禮之始也是故古者聖王重冠古者冠禮筮賓所以敬冠事敬冠事所以重禮重禮所以為國本也國以禮為本故冠於阼以著代也醮於客位三加彌尊加有成也阼謂主人之北也適子冠於阼者不醮則醮用酒於客位敬而成之也戶西為客位庶子冠於房戶外又因醮焉不代父也冠者初加緇布冠次加受弁次棄次加爵弁每加益尊所以益成也又曰冠者禮之始也嘉事之重者也是故古者重冠故行之於廟行之於廟者所以尊重事尊重事而不敢擅重事不敢擅重事所以自卑而尊先祖也嘉事嘉禮也宗伯掌五禮有吉禮有凶禮有賓禮有軍禮有嘉禮而冠屬嘉禮周禮曰以昏冠之禮親成男女也左傳襄公曰晉侯以公宴于河上問公年季武子對曰會于沙隨之歲寡君以生晉侯曰十二年矣是謂一終一星終也國君, SBCK: 娶}
