  - {type: variant, offset: 1411, length: 1, content: 禮, SBCK: 敬報反而}
  - {type: variant, offset: 1411, length: 337, content: 禮行之裸謂裸鬯酒也享祭先君以金石之樂節之以先君之祧處之今寡君在行未可具也請及兄弟之國而假備焉晉侯曰諾公還及衛冠于成公之廟假鍾罄焉禮也家語曰邾隱公既即位將冠使大夫因孟懿子問禮於孔子孔子曰其禮如世子之禮懿子曰天子未冠即位長亦冠乎孔子曰古者王世子之雖幼而即位則尊為人君尊為人君治為成人之事者也何冠之有懿子曰然然則諸侯之冠異天子與孔子曰君薨而世子主喪是亦冠也與人君無殊也懿子曰今邾君之冠非禮乎孔子曰諸侯之有冠禮也夏之末造也有自來矣今無譏焉又曰成王年十有二而嗣立明年六月冠成王而朝于祖廟以見諸侯周公命祝雍作頌曰祝王辭達而勿多也祝雍辭曰使王近於民遠於年嗇於時惠於財親賢而任能其頌曰令月吉日王始加元服去王幼志乃心兗職欽若昊天六合是式率爾祖考烝烝無極國語曰趙文子冠謂以士禮始冠也見韓獻子獻子, WYG: 至父}
