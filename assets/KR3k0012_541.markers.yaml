  - {type: 'tls:seg', offset: 25, content: '', id: KR3k0012_CHANT_541-1a.8}
  - {type: variant, offset: 28, length: 0, content: '', WYG: 也為義康司徒主簿司空檀道濟為子求湛妹婚不許義康有命又不從時人重其立志義者也吳均齊春秋曰桓閎字叔通太祖輔政使禇淵致意為子晃求女婚閎不敢從命曰辭霍不婚常所嘉揖齊大非偶所以不敢承殊眷太祖雖嘉其退讓而心不能懽也蕭子顯齊書曰王秀}
  - {type: page-break, offset: 28, content: '', id: KR3k0012_WYG_541-8a, image: WYG0898/WYG0898-0060a.png}
  - {type: variant, offset: 29, length: 0, content: '', SBCK: 道羣生閉藏乎隂而爲化育之始聖人因時以合偶男女窮天數也霜降而婦功成嫁娶者行焉季秋霜降嫁娶者始於此氷泮而農桑起婚}
  - {type: variant, offset: 29, length: 0, content: '', WYG: 字伯奮臨沂人也吏部尚書禇淵見秀之正㓗欲與結婚秀之不肯以此頻為府外兵參軍梁書曰江蒨方雅有盛格僕射徐勉權重唯蒨及王規與抗}
  - {type: page-break, offset: 29, content: '', id: KR3k0012_WYG_541-8b, image: WYG0898/WYG0898-0060b.png}
