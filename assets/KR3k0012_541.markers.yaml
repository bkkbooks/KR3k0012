  - {type: variant, offset: 6, length: 21, content: 儀禮曰士冠禮筮于廟門鄭玄注云筮者告於廟重成, SBCK: 有爲人父之端女年十五許嫁有適}
  - {type: variant, offset: 6, length: 1, content: 儀, WYG: 有為人父之端女年十五許嫁有適人之道羣生閉藏乎隂而為化育之始聖人因時以合偶男女窮天數也霜降而婦功成嫁娶者行焉季秋霜降嫁娶者始於此氷泮而農桑起婚}
