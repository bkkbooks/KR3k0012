  - {type: variant, offset: 4, length: 0, content: '', SBCK: 婚姻下媒婚姻下論語曰子謂公冶長可妻也雖在縲絏之中非其罪也以其子妻之子謂南容􅀖有道不廢􅀖無道免於刑戮以其兄之子妻之冶長弟子魯人也􅀯容南宫縚也爾雅曰女子子之夫爲壻壻之父爲姻婦之父爲婚婦之父母壻之父母相謂爲㛰姻國語曰董叔將娶於范氏叔向曰范氏冨盍已乎曰欲爲繫援焉繫援欲自結連於大援也他日董祈愬之於范獻子曰不吾敬也獻子執而紡之紡猶懸也懸於庭之槐也叔向過之曰子盍爲我請乎叔向曰求繫旣繫矣求援旣援矣欲而得之又何請焉家語曰伯夏生叔梁紇叔梁紇娶於魯施氏生女}
