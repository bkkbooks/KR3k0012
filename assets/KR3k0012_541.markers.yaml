  - {type: variant, offset: 5, length: 0, content: '', SBCK: 人無男叔梁紇曰雖有九女是無子也乃求婚於顔氏顔氏有三女小曰徴在顔父問三女曰鄒大夫雖父祖爲士然先聖之裔也今其人身長九尺武力絶倫吾甚貪之雖年長性嚴不足爲疑三子孰能爲之妻二女莫對徴在進曰從父所制將何問焉父曰即尓能矣遂以妻之又曰男子二十而}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 人無男叔梁紇曰雖有九女是無子也乃求婚於顔氏顔氏有三女小曰徴在顔父問三女曰鄒大夫雖父祖為士然先聖之裔也今其人身長九尺文武絶倫吾甚憐之雖年長性嚴不足為疑三子孰能為之妻二女莫對徴在進曰從父所制將何問焉父曰即爾能矣遂以妻之又曰男子二十而}
