  - {type: variant, offset: 44, length: 41, content: 東西面筮人即席坐西面卦者在左卒筮書卦執以示主人筮人還東而疾占卒進告吉前期三日筮賓如, WYG: 客翟景為子繇}
  - {type: variant, offset: 45, length: 3, content: 西面筮, SBCK: 萊王基當丗大儒豈不逹禮而納司空王忱女以姓同源異故也又曰陳矯夲劉氏子出嗣舅氏而婚于夲族徐宣毎非之廷議其闕太祖以矯才量欲全之乃下令曰喪亂以來風教凋薄謗議之言難同褒貶自建安五年巳前一切勿論其以斷前誹議者以其罪罪也魏志曰桓楷字伯緒劉表辟爲從事􅀕酒欲妻以妻妹蔡氏楷自陳巳結㛰他處拒而不受也又曰王粲父謙名公之胄何進爲長史欲與爲婚見二子使擇焉謙不許魏書評曰夏侯曹氏丗爲婚姻故淳淵仁洪休尚眞等並親舊肺腑貴重於時左右勲業咸有勞効吴書曰陶謙字恭祖丹陽}
