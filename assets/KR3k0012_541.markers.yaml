  - {type: variant, offset: 1385, length: 1, content: 冠, SBCK: 告禰也父母親戒女何親親之至父曰戒之敬之夙夜無違命母施矜結縭曰勉之敬之夙夜無違宫事父誡於阼階母誡於西階庶女及門内施鞶申以父母之命命之曰敬恭宗廟父母之言夙夜無愆視諸衿鞶去不辭誡不諾盖耻之重去也鄭玄別傳曰故尚書左丞同縣張逸年十三爲縣小史君謂之曰尓有賛道之質玉雖羙湏雕􅅣}
