  - {type: variant, offset: 2976, length: 1, content: 遣, SBCK: 迷送賦曰余種迷送於中庭嘉其楊條吐香馥有令芳乃爲之賦曰坐中堂以遊􅀚覽芳草之樹庭舞妙䴡于纎枝楊脩幹而結莖簿六夷之􅁾俗超万里而來征豈衆華之是芳信希丗而特生應瑒迷送香賦曰振纎枝之翠粲動採葉之菲菲舒芳香之酷烈乗清風以徘徊陳班迷送香賦曰立碧莖之荷郍鋪緑條之蟺蜿零陵南越志曰零陵香土人謂爲鷰草芸香􅀃文曰芸草似苜蓿淮南子曰芸可以死而復生􅄂字解釋詁曰芸杜榮大戴禮夏小正曰採芸爲廟菜禮記月令曰仲冬之月芸始生鄭􅀇曰芸香草也禮圗曰芸蒿曰葉似蒿香美可食也魏略曰大􅁗出芸膠洛陽宫殿簿曰顯陽殿前芸香一株徽音含章殿前各二株晉宫閣名曰太極殿前芸香四畦式乾殿前芸香徽音殿前芸香􅄂花十一畦明光殿前芸香􅄂花八畦顯陽殿前芸香二畦廣志曰芸膠有安息膠有黒膠吴氏夲草曰石芸一名敞列一名頋喙傳􅀇芸香賦序曰始以微香進御終於􅂢弃黄壤吁可閔也遂詠而賦之成公綏芸香賦曰美芸香之脩㓗禀隆陽之淑精莖􅀋秋竹枝象春松􅀓咸芸香賦序曰先君作芸香賦辭美髙䴡有覩斯卉蔚茂馨香同遊}
