  body:
  - {type: variant, offset: 2, length: 235, content: 一香書曰至治馨香感于神明左傳曰黍稷非馨馨者香之遠聞明德惟馨說文曰香芳也吳志曰士爕兄弟並為列郡雄長一州車騎滿道胡人夾轂焚香者常有數千世說曰桓車騎時有陳莊者入武當山學道所居恒有白煙香氣聞徹續晉安帝紀曰王鎮惡亡經曰魏興太守郭宣之晝坐忽見陳莊來因敘舊事相對悲泣勸營功德去後郡內悉聞香狀如芳煙流散晉書杜太后傳曰海西公之世太后復臨朝稱制桓溫之廢海西公也太后方在佛屋燒香內侍啟云外有急奏太后乃出尚倚戶前視奏宋書曰范曄撰和香方其序曰麝本多忌過分必害沉實易和盈斤無傷零藿虛燥詹唐黏濕甘松蘇, SBCK: 二􅂫}
