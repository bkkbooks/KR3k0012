  - {type: variant, offset: 2213, length: 366, content: 葳香也鬱香說文曰鬱芳草也十葉為貫築以煮之為鬯一合而釀之以降神也周禮春官上曰鬱人掌祼器祼器謂彝及舟與瓚凡祭祀賓客之祼事和鬱鬯以實彝而陳之築鬱金煮之以和鬯酒鄭司農云鬱金草名七葉為貫百二十賈為築以煮之鑊中停放祭前鬱為草若蘭後周書曰秦國出鬱金後周書曰波斯國大月氏之別種也地出氍毹翟俞二音玄獐皮及薰陸鬱金蘇合青木香等胡椒畢撥石蜜千年棗香附于訶黎勒無食子鹽綠雌黃等物唐書曰天竺國卑濕暑熱稻歲四熟有金剛似紫石英百鍊不銷可以切玉又有旃檀鬱金諸香通於大秦又曰太宗時伽毗國獻鬱金香似麥門冬九月花開狀似芙蓉其色紫碧香聞數十步花而不實欲種者取根文士傳曰朱穆字公叔作鬱金賦曰英熠爍以焜煌似九日之普照遠而望之粲若星羅出雲嶠近而觀之曄若丹桂耀湘涯應劭地理風俗記曰周禮鬱人掌祼器凡祭醊賓客之祼事和鬱鬯以實樽彝鬱芳草也謂用百草之華煮以合釀黑黍以降神香也或說今鬱金香是, SBCK: ''}
