  - {type: variant, offset: 2769, length: 1, content: 洲, SBCK: 越志曰交州有􅁡香樹欲取先斷其根經年後外皮朽爛木心與節堅黒沉水者爲沉香與水面平爲鷄骨㝡麄者爲棧香木􅁡}
  - {type: page-break, offset: 2769, content: '', id: KR3k0012_SBCK_982-4b}
  - {type: variant, offset: 2769, length: 1, content: 洲, WYG: 史曰任昉為新安太守嘗欲營佛齋調楓香二石始入三斗便出教長斷曰與奪自已不欲貽之後人南方記曰楓香樹子如鴨卵爆乾可燒魏武令曰房屋不潔聴得燒楓膠及蕙草棧香廣志曰棧香出日南諸國南方草木狀曰棧蜜香出都毘國不知蜜香樹若何但見香耳嶺表録異曰廣管羅州多棧香樹身似柳其花白而繁其葉如橘皮堪作紙名為香皮紙灰白色有紋如魚子牋其紙慢而弱沾水即爛遠不及楮皮者又無香氣或云沉香雞骨黄熟棧香同是一樹而根幹枝節各有分别者也南越志曰交州有密香樹欲取先㫁其根經年後外皮朽爛木心與節堅黑沉水者為沉香與水面平為雞骨最麄者為棧香木蜜}
