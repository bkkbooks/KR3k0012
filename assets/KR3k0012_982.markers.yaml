  - {type: variant, offset: 926, length: 0, content: '', WYG: 之所出薰陸香木膠也樹有傷穿膠因堕夷人採之以待估客所以賈不多得者所患狤掘獸噉之此獸斫刺不死投火中薪盡不焦以杖打之皮不傷而骨碎然后乃死廣志曰寄六出交州又大秦海邉人採與賈人易穀若無賈人取食之南方草木狀曰薰陸香出大秦云在海邉自有大樹生於沙中盛夏樹膠流出沙上夷人採取賣與賈人南州異物志同其異唯云狀如桃膠典術亦同惟云陶松栢法飲食之令人通神靈也于益期牋曰衆香共是一木木膠為薰陸流黄吳時外國傳曰流黄香出都毘國在}
  - {type: page-break, offset: 926, content: '', id: KR3k0012_WYG_982-3b, image: WYG0901/WYG0901-0611d.png}
