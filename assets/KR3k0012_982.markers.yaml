  - {type: variant, offset: 1380, length: 566, content: 海出千步香佩之聞於千步也今海隅有千步香是其種也葉似杜若而紅碧間雜貢藉云日南郡貢千步香漢雍仲子進南海香物拜為涪陽尉時人謂之香尉日南郡有香市商人交易諸香處南海郡有香戶日南郡有千畝香林名香出其中香洲在朱崖郡洲中出諸異香往往不知其名千年松香聞十里亦謂之十里香也夢書曰夢得香物婦女歸也曹植洛神賦曰踐椒塗之郁烈步蘅音衡薄而流芳魏武令曰昔天下初定吾便禁家內不得香薰後諸女配國家為其香因此得燒香吾不好燒香恨不遂所禁今復禁不得燒香其以香藏衣著身亦不得秦嘉荅婦徐淑書曰令種好香四種各一斤可以去穢淑荅書曰未得侍帷帳則芬芬不設陸機吊魏武文曰余為著作郎遊祕閣見魏武令曰餘香可分與諸夫人諸舍中無所為學作履組賣也吊曰紆家人於履組塵清慮於餘香麝爾雅曰麝父麋足郭璞注曰腳似麕臍有香許慎說文曰麝如小麋臍有香從鹿射聲黑色獐也義熙起居注曰倭國獻貂皮人參等詔賜細笙麝香齊書曰東昏侯鑿金蓮花帖地令潘妃行其上曰此步步蓮花也塗地皆以麝香唐書曰波斯國人皆以麝香如蘇塗鬚點額及於耳鼻用以為敬抱朴子曰辟虵法入山以麝香丸著足爪中皆有效又麝香及野豬皆啖虵故以壓之也又作筆墨法曰作墨用雞子白真珠麝香合以和墨宜用九月二日南夷志曰南詔有婆羅門波斯闍婆渤泥崑崙數種外道交易之處多珠珍寶以黃金麝香為貴貨嵩高山記曰有人在嶺上聞異聲清和雅妙尋不復聞唯見一麝香在嶺上側足䨥跳忽失所在荊州圖記曰臨澧縣南有龍寄, SBCK: ''}
