  - {type: variant, offset: 928, length: 0, content: '', SBCK: 林邑色紫赤亦謂紫檀也杜寳大業拾遺録曰薵禪師甚妙醫術作五香第一沉香飲次丁香飲次檀香飲次澤蘭飲次甘松飲皆別有法以香爲法以香爲主更加別藥有味而止渴兼於􅀘益甘松廣志曰甘松出凉州諸山艾納廣志曰艾納出剽國樂府歌曰行胡從何來列國持何來􅚊五味香迷送艾納及都梁霍香廣志曰霍香出日南諸國吴時外國}
  - {type: page-break, offset: 928, content: '', id: KR3k0012_SBCK_982-3b}
  - {type: variant, offset: 928, length: 117, content: 傳曰頓遜國人恒以香花事天神香有多種區撥葉逆花途致各遂花摩夷花冬夏不衰日載數十車於市賣之燥乃益香亦可為粉以傳身體述征記曰北芒有張母墓舊說是王氏妻葬有年載後開墓而香火猶燃十洲記曰漢武時長安大疫人死日以百數帝乃試取月氏國神香燒之於城內死未滿, WYG: 南}
