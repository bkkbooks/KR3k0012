  - {type: punctuation, offset: 1802, content: 》, id: KR3k0012_CHANT_982-bkkpn591}
  - {type: variant, offset: 1802, length: 524, content: 曰辟虵法入山以麝香丸著足爪中皆有效又麝香及野豬皆啖虵故以壓之也又作筆墨法曰作墨用雞子白真珠麝香合以和墨宜用九月二日南夷志曰南詔有婆羅門波斯闍婆渤泥崑崙數種外道交易之處多珠珍寶以黃金麝香為貴貨嵩高山記曰有人在嶺上聞異聲清和雅妙尋不復聞唯見一麝香在嶺上側足䨥跳忽失所在荊州圖記曰臨澧縣南有龍寄山有獸多麝西京雜記曰趙飛鷰為皇后女弟在昭陽殿遺飛鷰書曰今日嘉辰貴姊懋膺洪冊上檖三十五條以陳暐曜之志焉榔葉扇同心梅合枝李青木香香螺巵出南海一曰丹螺甲九真雄黃麝香沉水香續搜神記曰桓哲字明期居豫章時梅玄龍為太守已病哲往省之語梅曰吾昨夜忽夢作卒迎卿來作太山府君梅聞之愕然曰吾亦夢見卿為卒著衣來迎我數日復同夢如先云二十八日當拜至二十七日晡後桓忽中惡腹脹滿遣人就梅索麝香丸聞便令作凶具桓便亡八日而梅卒本草經曰麝香味辛辟惡殺鬼精生中臺山也秦嘉與婦書曰今奉麝香一斤可以辟惡氣嵇康養生論曰麝食柏而香葳香孫氏瑞應圖曰葳蕤者禮備至則生一曰王者愛人命則生一名葳香也鬱香說文曰鬱芳草也十葉為貫築以煮之為鬯一合而釀之以降神也周禮春官上曰鬱人掌祼器祼器謂彝及舟與瓚凡祭祀賓客之祼事和鬱鬯以實彝而陳之築鬱金煮之以和鬯酒鄭司農云鬱金草名七葉為貫百二十賈為築以煮之鑊中停放祭前鬱為草若蘭後周書曰秦, WYG: ''}
