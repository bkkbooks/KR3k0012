  - {type: variant, offset: 2021, length: 191, content: 雄黃麝香沉水香續搜神記曰桓哲字明期居豫章時梅玄龍為太守已病哲往省之語梅曰吾昨夜忽夢作卒迎卿來作太山府君梅聞之愕然曰吾亦夢見卿為卒著衣來迎我數日復同夢如先云二十八日當拜至二十七日晡後桓忽中惡腹脹滿遣人就梅索麝香丸聞便令作凶具桓便亡八日而梅卒本草經曰麝香味辛辟惡殺鬼精生中臺山也秦嘉與婦書曰今奉麝香一斤可以辟惡氣嵇康養生論曰麝食柏而香葳香孫氏瑞應圖曰葳蕤者禮備至則生一曰王者愛人命則生一, SBCK: 地}
