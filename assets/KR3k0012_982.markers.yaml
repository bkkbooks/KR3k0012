  - {type: variant, offset: 820, length: 0, content: '', SBCK: 願三日水微流有小龍五六尺隨水來湏􅁷水大至唐書曰曹國出青黛安息靑木等香薫陸魏略曰大􅁗出薫陸抱朴子曰俘焚洲在海中薫陸香}
  - {type: page-break, offset: 820, content: '', id: KR3k0012_SBCK_982-2a}
  - {type: variant, offset: 820, length: 1, content: 之, WYG: 願三日水㣲流有小龍五六寸隨水來}
  - {type: variant, offset: 820, length: 225, content: 之須臾生青蓮花林邑記曰朱吾以南有文狼野人居無室宅依樹止宿食生肉採香為業與人交市若上皇之民矣鄴中記曰石虎作流蘇帳頂安金蓮花花中懸金簿織成綩音苑囊囊受三升以盛香注帳之四面上十二香囊采色亦同竺法登真羅山䟽曰越王擣薰陸香扶南傳曰頓遜國人恒以香花事天神香有多種區撥葉逆花途致各遂花摩夷花冬夏不衰日載數十車於市賣之燥乃益香亦可為粉以傳身體述征記曰北芒有張母墓舊說是王氏妻葬有年載後開墓而香火猶燃十洲記曰漢武時長安大疫人死日以百數帝乃試取月氏國神香燒之於城內死未滿, krp: 願}
  - {type: punctuation, offset: 821, content: ，, id: KR3k0012_CHANT_982-bkkpn280}
  - {type: 'tls:seg', offset: 821, content: '', id: KR3k0012_CHANT_982-12a.11}
  - {type: variant, offset: 821, length: 2, content: 須臾, SBCK: 所出薫陸香木膠也樹有傷穿膠因墮夷人採之以待估客所以賈不多得者所患狤居一切掘獸噉之此獸斫刺不死投火中薪盡不燋以杖打之皮不傷而骨碎然後乃死廣志曰􅀉六出交州又大􅁗海邊人採與賈人易榖􅀂無賈人取食之􅀯方草木狀曰薫陸香出大􅁗云在海邊自有大樹}
  - {type: variant, offset: 823, length: 1, content: 生, WYG: 水大至唐書曰曹國出}
  - {type: variant, offset: 824, length: 0, content: '', SBCK: 於沙中盛夏樹膠流出沙上夷人採取賣與賈人南州異物志同其異香唯云􅃺如桃膠典術又同唯云陶松栢法不飲食之令人通神靈也俞益期牋曰衆香共是一木木膠爲薫陸流黄吴時外國傳曰流黄香出都昆國在扶南南三千餘里􅀯州異物志同廣志曰流黄香出南海邊國}
  - {type: page-break, offset: 824, content: '', id: KR3k0012_SBCK_982-2b}
  - {type: variant, offset: 825, length: 4, content: 蓮花林邑, SBCK: 木隋書曰樊子盖爲武威太守車􅀐駕西廵將入吐谷渾子盖以彼多瘴氣獻青木香禦霧露唐子曰師子􅀦出朱砂水銀薫陸欝金􅂫合青木等諸香南夷志曰崑崙國正北去蠻界西洱河八十一日程出象及青不香旃檀香紫檀香㯽榔琉璃水精䗍柸又曰南詔青木香永昌所出其山名青木山在永昌南三月日程廣志曰青木出交州天竺徐裏南方}
