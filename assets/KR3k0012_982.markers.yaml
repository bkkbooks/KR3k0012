  - {type: variant, offset: 1374, length: 400, content: 今馨香又曰南海出千步香佩之聞於千步也今海隅有千步香是其種也葉似杜若而紅碧間雜貢藉云日南郡貢千步香漢雍仲子進南海香物拜為涪陽尉時人謂之香尉日南郡有香市商人交易諸香處南海郡有香戶日南郡有千畝香林名香出其中香洲在朱崖郡洲中出諸異香往往不知其名千年松香聞十里亦謂之十里香也夢書曰夢得香物婦女歸也曹植洛神賦曰踐椒塗之郁烈步蘅音衡薄而流芳魏武令曰昔天下初定吾便禁家內不得香薰後諸女配國家為其香因此得燒香吾不好燒香恨不遂所禁今復禁不得燒香其以香藏衣著身亦不得秦嘉荅婦徐淑書曰令種好香四種各一斤可以去穢淑荅書曰未得侍帷帳則芬芬不設陸機吊魏武文曰余為著作郎遊祕閣見魏武令曰餘香可分與諸夫人諸舍中無所為學作履組賣也吊曰紆家人於履組塵清慮於餘香麝爾雅曰麝父麋足郭璞注曰腳似麕臍有香許慎說文曰麝如小麋臍有香從鹿射聲黑色獐也義熙起居注曰倭國獻貂皮人參等詔賜細笙麝香齊書曰東昏侯鑿金蓮花帖地令潘妃行其上曰此步步蓮花也塗地皆以麝香, krp: ''}
