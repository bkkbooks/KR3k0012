  - {type: variant, offset: 2882, length: 1, content: 正, SBCK: 先天二年十月親講武於驪山之下徴兵二十萬上親擐戎服持沉香大槍立於陣前威振宇宙長安士庻奔走縱}
  - {type: variant, offset: 2882, length: 0, content: '', WYG: 先天二年十月親講武于驪山之下徵兵二十萬上親被戎服持沉香大搶立於軍前威振宇宙長安士庻奔走縱觀塡塞道路又曰長慶中波斯大賈李蘇沙進沉香亭子材左拾遺李漢上疏以為沉香亭與瑶臺瓊室同上頗怒其言特優容之金樓子曰扶南國衆香共是一木根便是旃檀節便是沉香花是雞舌葉是霍香膠是薰陸竺法眞登羅山疏曰沉香葉似冬青樹形崇竦其木枯折外皮朽爛肉乃香山雖有此樹而非香所出新㑹髙凉土人斫之經年肉爛盡心則為沉香出北景縣樹極高大土人伐之累年須外皮消盡乃剖心得香郭子横洞㝠記曰薰木鮮祗所獻色如玉而質輕泛之毘盧池為舟爛則沉矣碎其屑氣聞數百里氣之所至毒疫皆除杜寶大業拾遺録曰四年夏四月征林邑國兵還至獲彼國得雜香眞檀象牙百餘萬斤沉香二千餘斤又曰尚書令楊素大業中東都宅造沉香堂甚精麗新泥壁訖閉之三月後開視四壁並為新血所灑腥氣觸人異苑曰沙門支法存在廣州有八尺毾㲪又有沉香八尺板牀大元中王琰為州大兒劭求二物不得乃殺而籍焉南州異物志曰沉水香出日南欲取當先斫壊樹着地積乆外皮朽爛其心至堅者置水則沉名沉香其次在心白之間不甚堅置之水中不沉不浮與水面平者名曰棧香其最小者名曰已香于益期牋曰衆香共是一木木心為沉香甲香廣志曰甲香出南方南州異物志曰甲香螺屬也大者如甌面前一邉直攙長數寸圍殻岨峿有刺其掩可合衆香燒之皆使益芳獨燒則臭甲香一名流螺諸螺之中流螺味最厚范曄香方曰甲煎淺俗迷迭魏畧曰大秦迷迭廣志曰迷迭出西海中魏文帝迷迭賦曰余種迷迭于中庭嘉其揚條吐香馥有令芳乃為之賦曰坐中堂以遊觀覽芳草之樹庭舞妙麗于纎枝揚脩幹而結莖薄西夷之穢俗超萬里而來征豈衆卉之足方信希世而特生應瑒迷迭香賦曰振纎枝之翠粲動緑葉之莓莓舒芳香之酷烈乗凉風以徘徊陳琳迷迭賦曰立碧莖之婀娜鋪緑條之蟺蜿零陵南越志曰零陵香土人謂之鷰草芸香説文曰芸香似苜蓿淮南子曰芸可以死而復生雜字解釋話曰芸杜榮大戴禮夏小}
