  - {type: variant, offset: 12, length: 1, content: 別, WYG: 欲有為也貂勃從楚來王賜諸前酒酣王曰召相田單貂勃避席稽首曰王惡得此亡國之言乎人臣之功豈有厚於安平君乎王乃殺九子益封安平君又曰先生王斗造門而歌欲見於宣王宣王使謁者延入王斗曰斗趨見王為好勢王趨見斗為好士於王何如使者還報宣王因趨而迎之於門與入曰寡人聞先生直言正諌不諱王斗曰生於亂世事亂君焉敢直言正諌宣王忿然作色不說有間王斗曰昔先君桓公所好者五天子授籍立為方伯今王有四焉宣王說曰寡人愚陋焉能有四王斗曰先君好馬好狗好酒好色王亦好之先君好士王不好士宣王曰當今之世無士寡人何好斗謂王曰世無騏驥騄耳王駟已備世無東郭韓盧氏之犬王犬已備世無毛嬙西施之妓王宫已充王亦弗好士也何患無士蘇代為燕王謂趙惠王曰今者來過川蜯方出曝而鷸啄其肉蜯合而掩其喙鷸曰今日不雨明日不雨蜯將為脯蜯亦為鷸曰今日不出明日不出必見死鷸兩者不肯相捨漁父得而并擒之今趙且伐燕燕趙久相交以弊大衆臣恐強秦之為漁父也惠王曰善乃止之又曰趙太后新用事秦急征之趙氏求救於齊齊曰必以長安君質兵乃出太后不肯太臣強諌太后謂左右有復言令長安君為質者老婦必唾其面左師觸讋願見太后盛氣而揖之入而徐趨曰老臣賤息舒祺最少不肖而衰竊愛憐之願令得補黒衣之數以衛王宫太后敬諾問年㡬何矣對曰十五嵗矣太后曰丈夫亦愛憐少子乎對曰甚於婦人太后曰婦人異甚對曰唯唯臣竊以為媪之愛燕后賢於長安君曰君過矣左師曰媪之送燕后時祭祀則祝之曰必不使反豈非計長久為子孫相繼為王也今媪尊長安君之位而封之以膏腴之地與之重器而不及今令有功於國一旦山陵崩長安君何以自託於趙老臣以媪為長安君計短也故以為其愛不若燕后太后曰諾惟君所使之於是為長安君約車百乗質於齊齊兵乃出補逸禮}
