  - {type: variant, offset: 729, length: 775, content: 趙簡子舉兵攻齊令軍中諫者罪至死被甲之士名曰公盧望見簡子而笑曰臣有宿笑當桑之時臣鄰家父與妻俱之田見桑中女因往追之不能得還反其妻怒而去之臣笑其曠也簡子還師而歸又曰左儒友於杜伯皆臣周宣王宣王將殺杜伯而非其罪也左儒爭之王不許也王曰黨友也易而言則生不易而死左儒對曰臣聞古之士不枉義以從邪不易言以求生王殺杜伯而儒死之又曰有能盡言於君用則留不用則去謂之諫又曰秦始皇帝太后不謹幸郎嫪毐封以為長信侯為生兩子毐專國事浸益驕奢與侍中左右貴臣俱博飲酒醉爭言而鬭瞋目大叱曰吾乃皇帝之假父也窶人子何敢乃與我抗所與鬭者走行白皇帝皇帝太怒毐懼誅因作亂戰咸陽宮敗始皇乃取毐四支車裂之取其兩弟囊撲殺之諫而死者二十七人矣齊客茅蕉乃往上謁曰齊客茅蕉願上諫皇帝皇帝使使者出問客得無以太后事諫也茅蕉曰然使者還白曰果以太后事諫皇帝曰走往告之若不見闕下積死人耶使者問茅焦茅焦曰臣聞之天有二十八宿今死者已有二十七人矣臣所以來者欲滿其數耳臣非畏死人也走入白之茅焦邑子同食者盡負其衣物行亡使者入白之皇帝大怒曰是子故來犯吾禁趨炊鑊湯煮之是安得積闕下乎趨召之入皇帝按劍而坐口正沫出使者召之入茅焦不肯疾行足趣相過耳使者趨之茅焦曰臣至前則死矣君獨不能忍吾須臾乎使者極哀之茅焦至前再拜謁起稱曰臣聞之夫有生者不諱死有國者不諱亡諱死者不可以得生諱亡者不可以得存死生存亡聖主所欲急聞也不審陛下欲聞之不皇帝曰何謂也茅焦對曰陛下有狂悖之行不自知耶皇帝曰何等也願聞之茅焦對曰陛下車裂假父有嫉妒之心囊撲兩弟有不慈之心遷母棫陽宮有不孝之行從蒺藜於諫士有桀紂之治今天下聞之盡瓦解無嚮秦者臣竊為陛下危之所言已畢乞行就鑕乃解衣伏鑕皇帝下殿左手接之右手麾左右曰赦之先生就衣今願受事乃立焦為仲父爵之為上卿皇帝立駕千乘萬騎空左方自行迎太后棫陽宮歸於咸陽太后大喜乃置酒待茅焦及飲太后曰抗枉令直使敗更成安秦之社稷使妾母子復得相會者盡茅君之力也又曰, SBCK: ''}
