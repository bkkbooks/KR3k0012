  - {type: variant, offset: 582, length: 2, content: 曷害, krp: 出鍾磬竽瑟坐有頃平公曰客子爲樂咎犯對曰臣不能爲樂臣善隱平公召隠士十二人咎犯曰隱臣竊願昧死御平公曰諾咎犯申其左臂而詘五指平公問}
  - {type: variant, offset: 585, length: 0, content: '', WYG: 隱官曰占之為何隱官皆曰不知平公歸之咎犯則申其指曰好樂一也便游􅀈畫而後城不門二也柱梁衣綉士民無褐三也侏儒有餘酒而死士不霑四也民有饑色而馬有粟秫五也近臣不敢諌逺臣不得逹平公曰善乃屛鐘皷除竽瑟遂與咎犯}
  - {type: variant, offset: 585, length: 0, content: '', krp: 隱官曰占之爲何隱官皆曰不知平公歸之咎犯則申其一指曰是一也便游赭畫而後城門二也柱梁衣繡土民無褐三也侏儒有餘酒而死士渴四也民有饑色而馬有粟秣五也近臣不敢諫逺臣不得逹平公曰善乃屏鍾皷除竽瑟遂與咎犯}
