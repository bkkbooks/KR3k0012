  - {type: variant, offset: 640, length: 2, content: 累卑, SBCK: 漸摩使之}
  - {type: variant, offset: 640, length: 0, content: '', krp: 漸摩使之然夫銖銖而稱之至石必差寸寸而度之至丈必過石稱丈量俓而寡失十圍之木始生於孽可分而絶可擢而拔據其未生先其未形磨礲砥礪不見其損有時而盡種樹畜長不見其益有時而大積德循行不知其善有時而用弃義背理不知其惡有時而亡臣乗願大王熟計而身行之此百王不易之道呉王不聽卒死丹徒又曰晉靈公造九層臺費用千億謂左右曰敢有諌者斬荀息聞之上書求見靈公張弩持矢見之謂曰子欲諌耶息曰不敢諫也臣能}
  - {type: variant, offset: 641, length: 4, content: 卑然後高, krp: 十二博碁加九鷄子其上公曰子爲寡人作之息即正顔色定志意以碁子置下加九鷄子其上左右慴息靈公扶伏氣息不續公曰危哉危哉息曰是不危}
