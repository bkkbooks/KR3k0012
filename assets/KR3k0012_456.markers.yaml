  - {type: variant, offset: 8, length: 0, content: '', krp: 六周書曰微子開者紂之兄也紂不道數諫不聽度紂終不可諫欲死之及去未能决乃問太師箕子少師比干曰紂湎於酒婦人之言是用若渉水無津涯箕子曰今誠得治國國治身死不恨爲死終不治不如去之紂乃爲象牀箕子曰彼爲玉牀則思逺方珍怪之物而御之矣爲人臣者諫不聽是彰君之惡乃𬒳髮佯狂比干曰君有過不以死爭則百姓何辜矣乃直言諌紂怒刳視其心微子曰父有過三諫不聽則號泣而隨之臣三諫不聽則其義可以去矣又曰許綰魏襄王欲爲中天之臺誡曰敢諌者死綰乃負操捶而入曰臣聞大王將爲中天之臺願加一力焉王曰何也對曰臣聞天地相去萬}
