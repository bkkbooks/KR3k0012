  - {type: variant, offset: 300, length: 1, content: 危, SBCK: 語曰晉平公射鷃不死使堅襄􅅮之失公怒拘將煞之叔向聞之曰君必煞之昔吾先君唐叔射兕于徒林殪以爲大甲以封於晉今君嗣吾先君射鷃不死􅅮之不得是揚吾君之恥者也君必速煞之無令逺聞君顏忸怩乃走赦之􅀃􅁐曰齊景公遊於海上而樂之六月不歸令左右曰敢有先言歸者致死不赦顔燭趍進諫曰君樂治海上而六月不歸彼儻有治國者君且安得樂此海也景公援㦸將斬之顔燭進撫衣待之曰君奚不斫也昔者桀殺􅀜龍逢紂殺王子比干君之賢非比二主也臣之材亦非比二子也君奚不斫以臣叅此二人者不亦可乎景公􅀃遂歸中道聞國人謀不内矣又曰呉王欲伐荆舎人少孺子欲諫不敢則懷丸操彈遊於後囿露沾其衣王曰何沾衣如此對曰榆上有蟬髙居而鳴不知螳蜋在其後螳蜋欲取蟬不知黄雀在其傍黄雀延頸欲啄螳蜋而不知彈丸在其下臣欲彈雀不知露沾衣如此三者皆務欲得其利而不顧其後患}
