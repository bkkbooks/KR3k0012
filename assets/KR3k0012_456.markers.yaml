  - {type: variant, offset: 1908, length: 1016, content: 民楚人歌之曰薪乎萊乎無諸御己訖無子乎萊乎薪乎無諸御己訖無人乎又曰齊桓公謂鮑叔曰寡人欲鑄大鍾昭寡人之名焉寡人之行豈避堯舜哉鮑叔曰敢問君之行桓公曰昔者吾圍譚三年得而不自與者仁也吾北伐孤竹剗令支而反者武也吾為葵丘之會以偃天下之兵者文也諸侯抱美玉而朝者九國寡人不受者義也然則文武仁義寡人盡有之矣寡人之行豈避堯舜哉鮑叔曰君好直言臣以直言封昔者公子糺在上位而不讓非仁也背太公之言而侵魯境非義也壃場之士上詘於一劍非武也姪娣不離懷衽非文也為不善遍於物不自知者無天禍必有人害天處甚高其聽甚下今君過言天且聞之桓公曰寡人有過子幸記之是社稷之福也子不幸教幾有大罪以辱社稷又曰楚昭王欲之荊臺游司馬子綦進諫曰荊臺之游左洞庭之陂右彭蠡之水南望猲山下臨方淮樂其使人遺老而忘死人君游者盡以亡其國願大王勿往游焉王曰荊臺乃吾地也有地而游之子何為絕我游乎怒而擊之於是令尹子西駕安車駟馬至於殿下曰今日荊臺之游不可不觀也王登車而拊其背曰荊臺之游與子共樂之矣步馬十里引轡而止曰臣不敢下車願得有道大王肯聽之乎王曰第言之令尹子西曰臣聞之為人臣而忠其君爵祿不足以賞也若司馬子綦者忠臣也若臣者諛臣也願大王殺臣之軀罰臣之家而祿司馬子綦王曰若我能止聽公子獨能禁我游後世游之無有極時奈何乎令尹子西曰欲禁後世易耳願大王山陵崩陁為陵於荊臺未嘗有持鍾鼓管弦之樂而游於父之墓上者也於是王還卒不游於荊臺令罷先置孔子從魯聞之曰悲哉令尹子西諫之十里之前而催之於百世之後者也又曰荊文王得如黃之狗菌蕗之矰以畋於雲夢三月不反得舟之姬淫之朞年不聽朝保申謀曰先王卜以臣為保吉今王得如黃之狗菌蕗之矰畋於雲夢三月不反得舟之姬淫之朞年不聽朝王之罪當笞匍伏將笞王王曰不穀免於繈緥託諸侯矣願請變更無笞保申曰臣承先王之命不敢廢王不受笞是廢先王之命也臣寧得罪於王無負於先王王曰敬諾乃蓆王王伏保申承細箭五十跪而加之王背如此者再謂王起矣王曰有笞之名一也遂致之保申曰臣聞之君子恥之小人痛之恥之不變痛之何益保申趨出欲自流乃請罪於王王曰此不穀之過保申將何罪王乃變行從保申殺如黃之狗折菌蕗之矰逐舟之姬務治乎荊兼國三十令荊國廣大至於此者保申敢極言之功也蕭何王陵聞之曰聖主能奉先世之業而以成功名者其唯荊文王乎故天下譽之至今明主忠臣孝子以為法又曰晉平公使叔向聘於吳吳人拭船以送之左五百人右五百人有繡衣豹裘者叔向歸以告平公平公曰吳其亡乎奚以敬舟奚以敬民叔向對曰君為馳底之臺上可以發千兵下可以陳鍾鼓諸侯聞君者亦曰奚以敬臺奚以敬民所敬各異也於是平公乃罷臺, SBCK: 役}
