  - {type: variant, offset: 1624, length: 1, content: 謂, SBCK: 國亡王之馬豈可哉王曰善不榖之屈強國之可以長諸侯也知得地可以爲冨也亡其民之不用也明日飲諸大夫酒椒舉爲上客罷陽夏之師晏子春秋曰景公爲長庲音來舎也將欲美之有風雨作公與晏子入坐飲酒致堂上之樂酒酣晏子作歌曰穗兮不得穫秋風至兮草零落風雨之拂煞之靡弊之歌終顧而流涕張掖而儛公止}
