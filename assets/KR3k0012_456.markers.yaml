  - {type: variant, offset: 1641, length: 208, content: 義之用有法之行且己聞之土負水者平木負繩者正君受諫者聖君築層臺延石千里延壤百里民之釁咎血成通於塗然且未敢諫也己何敢諫乎顧臣愚竊以虞不用宮之奇而晉并之陳不用子家羈而楚并之曹不用僖負羈而宋并之萊不用子猛而齊并之吳不用子胥而越并之秦不用蹇叔之言而秦國危桀殺關龍逢而湯得之紂殺王子比干而武王得之宣王殺杜伯而周室卑此三天子六諸侯皆不能尊用賢辯士之言故身死而國亡遂趨而出楚王遽而追之曰己子反矣吾將用子之諫先日說寡人者其說也不足以動, SBCK: 賜譏}
