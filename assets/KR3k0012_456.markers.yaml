  - {type: variant, offset: 3377, length: 1, content: 移, SBCK: 善自尒以來未有鳥獸之禁又曰景公曰爲巨冠長衣以聽朝日晏不罷晏子進曰日晏矣君脫服就晏公曰諾寡人受令退朝遂去衣冠不復服也蕭方等三十國春秋曰􅁗王符堅懸珠簾}
  - {type: variant, offset: 3377, length: 2, content: 移於, WYG: 善自爾以來未有禽獸之禁又曰景公自為巨冠長衣以聽朝日晏不罷晏子進曰日宴矣君脱服就宴公曰諾寡人受令退朝遂去衣冠不復服也蕭方等三十國春秋曰秦王苻堅懸珠簾于正殿以朝羣臣宫宇服御物極珍餙之竒尚書金部郎裴元略諫曰願陛下遵采椽之不斵鄙瓊室而不居堅笑曰非卿之忠朕何由聞過乎趙曄呉越春秋曰呉王既殺子胥問太宰曰子胥數以越諫遂以喪身從死以來若有所亡今欲祠之何日可也曰三月癸未可也及夫差出國祠子胥江水之濵乃言曰寡人昔日不聽相國之言至令相國逺投江海自亡}
