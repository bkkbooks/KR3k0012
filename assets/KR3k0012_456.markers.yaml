  - {type: variant, offset: 9, length: 4, content: 鍾離意別, SBCK: 千里今王因而半之當髙七千五百里基址當廣八千里盡王之地不足以爲大王必欲爲之先起兵以伐諸侯及四夷盡有地乃足矣然以林木之積人徒之衆倉廪之輸當給其外乃可以作襄王嘿然無以應之乃罷又曰叚規智伯請地於韓康子康子欲勿與規諌曰不可夫智伯之爲人好利而鷙復來請地而勿與則必加兵於我矣􅀂與之彼又請地於他國他國不聽必向之以兵然則與可以免於患而待事之變康子曰善因使使者封萬家之縣一與智伯智伯大恱復請地於趙不與果隂約韓魏而伐圍晉陽三年後韓魏應之遂滅智伯又曰田嬰齊宣王弟封靖郭君於薜嬰自威王以來任職有功故封之靖郭君嬰將城薛客多諌者嬰謂謁者有諌者勿通於是人有請見者曰臣請三言而巳矣􅀂過三言臣則請烹靖郭君見之客趨進曰海大魚因返走君不解曰更言之客對曰君夫不聞海大魚乎網不能止釣不能牽忽而失水則螻蟻得志焉今齊亦君之水也􅀂長有齊奚以薛爲君􅀂一旦失齊雖降薛之城到天猶無益也君曰善遂不城薛又曰不幸不聞其過福在受諫基在愛民固在親賢戰國䇿曰齊王有幸臣九人九人欲傷安平君田單田單之與王君臣無禮隂結諸侯之雄俊其志欲有爲也貂勃從楚來王賜諸前酒酣王曰召相田單貂勃避席稽首曰王惡得此亡國之言乎人臣之功豈有厚於安平君乎王乃煞九子益封安平君又曰先生王歜造門而歌欲見於宣王宣王使謁者延入王歜趨見王爲好􅀔王趨見歜爲好士於王何如使者還報宣王因趨而迎之於門與入曰寡人聞先生直言正諫不諱王歜曰生於亂丗事亂君焉敢直言正諌宣王忿然作色不􅀃有間王歜曰昔先君桓公所好者五天子受籍立爲太伯今王有四焉宣王說曰寡人愚陋焉能有四王歜曰先君好馬好狗好酒好色王亦好之先君好士王不好士宣王曰當今之丗無士寡人何好歜謂王曰丗無騏􅂹騄耳王駟巳備丗無東郭韓盧氏之犬王走犬巳備無毛嬙西施之妓王宮巳充王亦弗好士也何患無士附託辛戰國䇿曰趙旦伐燕蘓代爲燕王謂趙惠王曰今者來過川蜯方岀曝而鷸啄其肉蜯合而掩其啄鷸曰今日不􅀨明日不􅀨蜯將爲脯蜯亦謂鷸曰今日不出明日不出必見死鷸兩者不肯相捨漁父得而并禽之今趙旦伐燕燕趙乆相交以弊大衆臣恐強􅁗之爲漁父也惠王曰善乃止之又曰趙太后新用事􅁗急征之趙氏求救於齊齊曰必以長安君爲質兵乃出太后不肯大臣強諫太后謂左右有復言令長安君爲質者老婦必唾其靣右師解龍言願見太后盛氣而湏之入而徐趨曰老臣賤息舒旗最少不肖而衰􅀼愛隣之願令得􅀘黒衣之數以衛王宫太后敬諾問年幾何矣對曰十五歳矣太后曰丈夫亦愛憐少子對曰甚於婦人太后曰婦人異甚對曰左右臣竊以爲嫗之愛燕后賢於長安君過矣媪之送燕后時􅀕祀則祝之曰必不使反豈非計長乆爲子孫相繼爲王也今媪尊長安君之位而封之以膏􅃾之地與之重器而不反今令有功於國山陵崩長安君何以自託於趙老臣與媪爲長安君短也故以爲其愛不􅀂燕后太后曰諾惟君所使之於是爲長安君約車百乗質於齊齊兵乃出􅀘逸禮}
