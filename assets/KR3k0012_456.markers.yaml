  - {type: variant, offset: 574, length: 1, content: 嚴, WYG: 而鳴不知螳螂在其後螳螂欲取蟬不知黄雀在傍黄雀欲啄螳螂而不知彈丸在其下臣欲彈雀不知露沾衣如此三者皆務欲得其利而不顧其後患也王曰善哉乃罷兵又曰晉平好樂多其賦歛不治城郭敢有諌者死國人憂之有咎犯者見門大夫曰臣聞主君好樂故以樂見門大夫入言晉人咎犯欲以樂見}
