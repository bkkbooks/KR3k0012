  - {type: variant, offset: 572, length: 1, content: 朝, WYG: 敢有先言歸者至死不赦顔燭趨進諌曰君樂治海上而六月不歸彼儻有治國者君且安得樂此海也景公援㦸將斬之顔燭進撫衣待之曰君奚不斫也昔者桀殺關龍逢紂殺王子比干君之賢非此二主也臣之材亦非此二子也君奚不斫以臣叅此二人者不亦可乎景公說遂歸中道聞國人謀不内矣又曰呉王欲伐荆舍人少孺子欲諌不敢則懐丸操彈遊於後圃露沾其衣王曰何沾衣如此對曰榆上有蟬髙}
