  - {type: variant, offset: 3455, length: 708, content: 敢與焉公曰移於梁丘據之家前驅報門曰君至梁丘據左操瑟右挈竽行歌而至公曰樂哉今夕吾飲酒也微彼二子者何以治吾國微此一臣者何以樂吾身聖賢之君皆有益友無偷樂之臣景公弗能及故兩用之僅得不亡又曰吳王濞反梁孝王中郎枚乘字叔聞之為書諫王其辭曰君王之外臣乘竊聞得全者昌失全者亡舜無立錐之地以有天下禹無百戶之眾以王諸侯湯武之地方不過百里上不絕三光之明下不傷百姓之心者有王術之故父子之道天性也忠臣不敢避誅以直諫故事無廢業而功流於萬世也臣乘願披腸心而效愚忠恐大王不能用也臣乘願大王聽臣乘之言夫一縷之任係千鈞之重上懸之無極之高下垂之不測之淵雖甚愚之人且猶知哀其絕也馬方駭而重驚之係方絕而重鎮之係絕於天不可復結墜入深淵難以復出其出不出間不容髮誠能用臣乘言以百舉必脫必若所欲為危於累卵難於上天變所欲為易於反掌安於泰山今欲極天命之壽弊無窮之樂保萬乘之勢不出反掌之易以居泰山之安乃欲乘累卵之危走上天之難此愚臣之所大惑也人生有畏其影而惡其跡者乃背而走無益也不如就陰而止影滅跡絕欲人勿聞莫若勿言欲人勿知莫若勿為欲湯之冷令一人炊之百人揚之無益也不如絕薪止火而已不絕之於彼而救之於此譬猶抱薪救火也故武王諤諤而昌紂嘿嘿而亡君無諤諤之臣父無諤諤之子兄無諤諤之弟夫無諤諤之婦士無諤諤之友其亡可待故曰君失之臣得之父失之子得之兄失之弟得之夫失之婦得之士失之友得之故無亡國破家悖父亂子放兄棄弟狂夫淫婦絕交敗友者也又曰易曰王臣謇謇匪躬之故人臣之所以謇謇為難而諫其君者非為身也將欲以匡君之過矯君之失也君有過失者危亡之萌也見君之過失而不諫是輕君之危亡也夫輕君之危亡者忠臣不忍為也三諫而不用則去不去則亡身亡身者仁人所為也是故諫有五一曰正諫二曰降諫三曰忠諫四曰戇諫五曰風諫孔子曰吾其, SBCK: ''}
