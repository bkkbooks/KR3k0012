  - {type: variant, offset: 646, length: 4, content: 夫治天下, krp: 復有危於此}
  - {type: variant, offset: 647, length: 5, content: 治天下者非, SBCK: 銖銖而稱之至石必差寸寸而度之至丈必過石稱丈量俓而寡失十圍之木始生於孽可分而絶可擢而拔據其未生先其未形磨礲砥礪不見其損有時而盡種樹畜長不見其益有時而大積德循行不知其善有時而}
  - {type: variant, offset: 647, length: 2, content: 治天, WYG: 銖銖而稱之至石必差寸寸而度之至丈必過石稱丈量徑而寡失十圍之木始生如蘖可搔而絶可擢而㧞據其未生先其未形磨礲砥礪不見其損有時而盡種樹畜長不見其益有時而大積徳循行不知其善有時而用棄義背禮不知其惡有時而亡臣乗願大王熟計而身行之此百王不易之道呉王不聽卒死丹徒又曰晉靈公造九層臺費用千億謂左右曰敢有諫者斬荀息聞之上書求見靈公張弩挾矢見之謂曰子欲諌耶息曰不敢諫也臣能累十二博碁加九鷄子上公曰子為寡人作之息卽正顔色定志意以碁子置}
