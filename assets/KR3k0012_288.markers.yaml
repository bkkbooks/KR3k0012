  - {type: variant, offset: 2178, length: 696, content: 取車輪去輞削銳其輻兩接對揉竹為絙揉人久切貫連相屬並十餘道橫水為橋兩頭施大轆轤出沒任情不可燒斫既斷祖悅走路又令舟舸不通梁氏援軍不能赴救祖悅合軍咸見俘虜後魏書曰太武征夏赫連昌於統萬城師次城下收眾偽退昌鼓譟而前會有風雨從東南來沙塵昏冥宦者趙兒進曰今風雨從賊後來我向彼背天助人將士飢渴願陛下避之更待後日崔浩曰是何言歟千日制勝一日之中豈得變易賊前行不止後以離絕宜分軍隱出掩擊不意風雨在人豈有常也帝從之分騎奮擊昌軍大潰又曰雍州刺史蕭寶寅據州反魏大將長孫稚討之軍次弘農副將楊侃曰昔魏武與韓遂馬超挾關為壘勝負之理久而無決豈才雄相類筭路抗衡當以河山險阻難用智力今賊守潼關全據形勝縱曹操更出亦無所逞奇必須北取蒲坂飛棹西岸置兵死地人有鬥心潼關之賊必覩風而散諸處既平長安自剋稚曰賊黨薛脩義已圍河東薛風賢又保安邑都督宗正珍孫停虞坂久不能進雖有此計猶用為疑侃曰珍孫本行陣一夫因緣進達可為人使未可使人一旦受元帥之任處分三軍精神亂矣寧堪圖賊河東理在蒲坂西帶河湄所部之人多在東境脩義驅率壯勇西圍郡邑父老妻弱尚保舊村若卒一臨方寸各亂人人思歸則郡圍自解不戰而勝昭然在目稚從之令其子彥等領騎與侃於弘農北度所統悉是騎士習於野戰未可攻城便據石錐壁侃乃班告曰今且停軍於此以待步卒兼觀人情向背然後行若送降名者各自還村候臺軍舉烽火亦舉烽應之以明降疑其無應烽者即是不降之村理須殄戮賞賚軍士民遂傳相告報未實降者亦許舉烽一宿之間火遍數百里內寶寅將時圍河東不測所以各自散歸長安賊平侃頗有力又曰河北賊葛榮別帥韓樓郝長等有眾數萬屯據薊城遣將侯泉率騎七百討之泉遂廣張聲勢多設供具親以數百騎深入樓境欲執行人以問虛實去薊百餘里值賊帥陳周馬步萬餘泉遂潛伏以乘其背, WYG: ''}
