  - {type: variant, offset: 11, length: 0, content: '', WYG: 西遷拜驃騎大將軍加侍中開府嘗修州城未畢梯在外齊神武遣韓軌司馬子如從河東宵濟襲羆羆不之覺比曉軌衆已乘梯入城羆尚臥未起聞閤外洶洶有聲便袒身露髻徒跣持一白挺大呼而出敵見之驚逐至東門左右稍集合戰破之軌衆遂投城遁走又曰陸騰守陵州木籠獠恃險麤獷每行抄刼詔騰討之獠既因山為城攻之未可拔騰遂於城下多設聲樂及諸雜伎示無戰心諸賊果棄其兵仗或攜妻子臨城觀樂騰知其無備宻令衆軍俱上諸賊惶懼不知所為遂縱兵討擊盡破之又曰楊忠梁雍州刺史岳陽王蕭詧雖稱藩附而尚有二心自樊城觀兵於漢濵易旗逓進實騎二千詧登樓望之以為三萬懼而服焉又曰韓襃為汾州刺史界北接太原當敵之衝先是高齊寇數入人廢耕桑前後刺史莫能防扞襃至適㑹寇來襃乃不下屬縣人既不及設備以故多被抄掠齊人喜相謂曰汾州不覺吾至先未集兵今者之還必莫能追攝我矣由是益懈不為營壘襃已先勒精鋭伏北山中分據險阻邀其歸路乘其衆怠縱伏擊之盡獲其衆又曰東魏寇龍門屯軍蒲坂造三道浮橋渡河又遣其將竇泰趣潼關高敖曹圍洛州太祖出軍廣陽召諸將曰賊今掎吾三面又造浮橋於河示欲必渡是欲綴吾軍使竇泰西入耳久與相持其計得行非良䇿也且歡起兵以來泰每為先其下多鋭卒屢勝而驕今出其不意襲之必克克泰則歡不戰而自走矣諸將咸曰賊在近捨而逺襲事若蹉跌悔無及也太祖曰歡前襲關吾軍不過霸上今者大來兵未出郊賊顧謂吾但自守耳無逺鬭意又忸於得志有輕我之心乗此擊之何往不克賊雖造橋未能徑度比五日中吾取竇泰必矣公等勿疑庚戌太祖率騎六千還長安聲言欲保隴右辛亥謁}
