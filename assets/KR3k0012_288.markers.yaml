  - {type: variant, offset: 1984, length: 515, content: 定也於是選騎二千銜枚夜進遇仲禮於漴頭漴音崇水所衝曰漴忠親自陷陣擒仲禮悉俘其眾安陸及竟陵郡如忠所策陳書曰周炅鎮安蘄等州高齊遣將陸騫以眾二萬出自巴蘄與炅戰炅留羸弱輜重設疑兵以當之身率精銳由間道邀其後大敗騫軍虜獲器械馬驢不可勝數北史曰後魏濟陰王新成頗有武略庫莫奚侵擾詔新成討之新成乃多為毒酒賊逼便棄營而去賊至竟飲遂簡輕騎擊之俘馘甚多又曰梁將趙祖悅率水軍偷據峽石後魏將崔延伯率兵討之延伯夾淮為營遂取車輪去輞削銳其輻兩接對揉竹為絙揉人久切貫連相屬並十餘道橫水為橋兩頭施大轆轤出沒任情不可燒斫既斷祖悅走路又令舟舸不通梁氏援軍不能赴救祖悅合軍咸見俘虜後魏書曰太武征夏赫連昌於統萬城師次城下收眾偽退昌鼓譟而前會有風雨從東南來沙塵昏冥宦者趙兒進曰今風雨從賊後來我向彼背天助人將士飢渴願陛下避之更待後日崔浩曰是何言歟千日制勝一日之中豈得變易賊前行不止後以離絕宜分軍隱出掩擊不意風雨在人豈有常也帝從之分騎奮擊昌軍大潰又曰雍州刺史蕭寶寅據州反魏大將長孫稚討之軍次弘農副將楊侃曰昔魏武與韓遂馬超挾關為壘勝負之理久而無決豈才雄相類筭路抗衡當以河山險阻難用智力今賊守潼關全據形勝縱曹操更出亦無所逞奇必須北取蒲坂飛棹西岸置兵死地人有鬥心潼關之賊必覩風而散諸處既平, SBCK: 逕趣}
