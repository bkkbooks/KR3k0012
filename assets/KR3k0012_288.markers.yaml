  - {type: variant, offset: 5, length: 3, content: 略六宋, WYG: 畧七機畧七三國典畧曰周賀若敦陳侯瑱相拒於湘州敦恐瑱知其粮少乃於營内聚土覆之以米召其側近村人佯有所防令其遥見瑱以為實乃據守要險以老敦師敦又故脩壁壘示以持久土人乘輕騎載米粟籠雞鴨以餉瑱軍敦患之乃偽為土人裝船内甲士其中瑱兵見船至送米爭取敦甲士出而擒之後周}
