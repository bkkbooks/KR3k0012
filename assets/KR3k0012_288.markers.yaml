  - {type: variant, offset: 577, length: 465, content: 叫喚直上廳事祇驚起出門將處分賊射之傷敗却入衹密語左右曰賊乘闇得入掩我不備但打五鼓懼明謂曉於是奔散追討盡獲之又曰宗愨征林邑圍區粟城林邑王范陽邁遣將范毗沙達率萬餘人來救愨謂諸將曰寇眾我寡難與爭鋒乃分軍為數道偃旗臥鼓愨潛進令曰聽吾鼓噪乃出山路榛深賊了不為備卒見軍至驚懼退走愨乘勝追討散歸林邑仍攻區粟拔之泛海陵山至八象浦有大渠南來注浦宋師沮渠置陣林邑王傾國來逆沮渠不得渡以具裝被象諸將憚之請待前後軍進然後擊之愨曰不然吾已屠其堅城破其銳眾我氣方厲彼已破膽一戰可定何疑焉愨以為外國有師子威服百獸乃制其形與象相禦象果驚奔眾因此潰亂愨率兵直度渠奮擊陽邁遁走其眾一時奔散遂剋林邑南史曰蕭齊將魯康祚趙公政眾號一萬侵後魏荊河州之太倉口魏將傅永率三千人擊之時康祚等軍於淮南永舍於淮北十有餘里永量吳楚之兵好夜斫營即夜分兵為二部出於營外又以賊若夜來必應於渡淮之所以火記其淺處永既設伏乃密令人以瓠盛火度淮南岸當深處置之教云若有火起即亦然之其夜康祚公政等果親領兵來斫永營東西二仗夾擊之康祚等奔趣淮水火既竟起不能記其本濟遂覩永所置之火而爭度焉水深溺而死斬首者數千級, SBCK: ''}
