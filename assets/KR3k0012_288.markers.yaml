  - {type: variant, offset: 2877, length: 0, content: '', SBCK: 又曰東魏遣將斛律金㓂西魏洛陽師至于河北周文帝患其度河乃於上流縱火舩而下以燒河橋金先備小艇半盛以水鐵鎻連之亘絶中流火舡至而不前湏􅁷火滅而橋獲存遂進軍洛陽又曰東魏將齊神武伐西魏軍至許原西周文帝至渭南徴諸州兵皆來㑹乃召諸將謂之曰髙歡越山度河逺來至此天亡之時也今及其新至便可擊之即造浮橋於渭令軍人齎三日粮輕􅀐度渭南夾渭而軍至沙苑距齊神武軍六十餘里齊神武聞周文至引軍來㑹覩周文軍少竟馳而進不行列揔萃於左軍兵將交周文鳴鼔士皆奮起其將于謹等六軍與之合戰李弼等率鐡􅀐横擊之絶其軍爲二遂大破之斬六千餘級臨陣降者二萬餘人齊神武夜遁追至河上復大尅獲前後}
