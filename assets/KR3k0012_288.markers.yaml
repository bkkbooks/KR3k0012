  - {type: variant, offset: 54, length: 1, content: 內, SBCK: 逈遣將檀讓屯成武别將髙士儒屯永昌隋將于仲文詐移書州縣曰大軍將至可移積粟讓謂仲文未能卒至方搥牛享士仲文知其怠選精􅀐襲之一日便至遂拔成武逈將席毗羅衆十萬屯於沛縣將攻徐州其妻子住金郷仲文遣人詐爲毗羅使者謂金郷城主徐善淨曰檀讓明日午到金郷將宣蜀公令即尉遲逈賞賜將士金郷人謂爲信然皆喜仲文簡精兵僞建逈旗幟倍道而進善淨遥見仲文軍且至以爲檀讓乃出迎謁仲文執之遂取金郷諸將多勸屠之仲文曰此城是毗羅起兵之所當寛其妻子其兵可自歸如即屠之彼意絶矣衆皆稱善於是毗羅恃衆來薄官軍仲文背城結陣岀軍數里設伏於麻田中兩陣􅂊合伏兵發俱曳柴鼔噪塵埃蔽夭毗羅軍大潰仲文乗之賊皆投漆}
