  - {type: variant, offset: 6, length: 2, content: 六宋, SBCK: 七三國典略曰周賀􅀂敦陳侯瑱相拒于湘州敦恐瑱知其粮少乃於營内聚土覆之以米召其側近村人揚有所訪令其遥見瑱聞以爲實乃據守要險以老敦師敦又増修壁壘示以持乆土人乗輕􅀐載米粟籠鷄鴨以向瑱軍敦患之乃僞爲土人裝舡内甲士其中瑱兵見舡至送米爭取敦甲士出而擒之後周}
  - {type: variant, offset: 6, length: 2, content: 六宋, krp: 七三國典略曰周賀若敦陳侯瑱相拒于湘州敦恐瑱知其粮少乃於營内聚土覆之以米召其側近村人揚有所訪令其遥見瑱聞以爲實乃據守要險以老敦師敦又増修壁壘示以持乆土人乗輕騎載米粟籠鷄鴨以向瑱軍敦患之乃僞爲土人裝舡内甲士其中瑱兵見舡至送米爭取敦甲士出而擒之後周}
