  - {type: variant, offset: 1926, length: 213, content: 勞師表裏受敵非計也南人多習水軍不閑野戰仲禮廻師已在近路吾出其不意以奇兵襲之彼怠我奮一舉必剋則安陵不攻自拔諸城可傳檄而定也於是選騎二千銜枚夜進遇仲禮於漴頭漴音崇水所衝曰漴忠親自陷陣擒仲禮悉俘其眾安陸及竟陵郡如忠所策陳書曰周炅鎮安蘄等州高齊遣將陸騫以眾二萬出自巴蘄與炅戰炅留羸弱輜重設疑兵以當之身率精銳由間道邀其後大敗騫軍虜獲器械馬驢不可勝數北史曰後魏濟陰王新成頗有武略庫莫奚侵擾詔新成討之新成乃多為毒酒賊逼便棄營而去賊至竟飲遂簡, WYG: 粮}
