  - {type: variant, offset: 3353, length: 270, content: 不可擊也前鋒既敗後陣方固三不可擊也彼眾我寡四不可擊也官軍自戰其地一不可動動而不勝眾心不固二不宜動隍池夫修敵來無備三不宜動此皆兵機也深溝高壘以逸待勞彼千里饋糧野無所掠久則三軍糜資攻則眾旅多斃師老釁生詳而圖之可以捷也德曰韓別駕之言良平之策也又曰大將廣陽王元深伐北狄使于謹單騎入賊中示以恩信於是西部鐵勒酋長也列河等三萬餘戶並款附相率南遷廣陽欲與謹至折敦嶺迎接之謹曰破六汗拔陸兵眾不少聞也列河等歸附必來要擊彼若先據險要則難與爭鋒今以列河等餌之當竟來抄掠然後設伏而待必指掌破之廣陽然其計拔陵果來要擊破也列河於嶺上部眾皆沒謹伏兵發賊遂大敗悉收列河之眾也, SBCK: 百八十八}
