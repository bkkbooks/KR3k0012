  - {type: variant, offset: 52, length: 1, content: 猶, SBCK: 破之必矣遣一將趨劒閣一將指巴西一將水軍入嘉陵睿遣將分道攻惎自午及申破之惎奔歸于謙睿進逼成都謙令逹奚惎城守親率精兵五萬背城結陣睿擊之謙不利將入城惎以城降謙將麾下三十􅀐遁走斬之又曰後周將法尚􅀄自陳來歸陳將樊猛濟江討之法尚遣部曲督韓朗詐爲背已奔于陳僞告猛曰法尚部兵不願降北人皆竊議盡欲叛還􅀂得軍來必無􅃲者自當於陣倒戈耳猛以爲然引師急進法尚乃佯爲畏懼自保於江曲猛陣兵挑戰法尚先伏輕舡於浦中又伏精銑於古村之北自張旗幟逆流拒之戰數合僞退登岸投古村猛捨舟逐之法尚又疾走行數里與村北軍合復前擊猛猛走退赴舡旣而浦中伏舡取其舟檝建周旗幟猛於是大敗僅以身免又曰後周末隋文帝輔政周大將尉遲逈在河北拒命河南州縣多}
