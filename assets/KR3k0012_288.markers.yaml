  - {type: variant, offset: 11, length: 0, content: '', SBCK: 西遷拜驃􅀐大將軍加侍中開府嘗脩州城未畢梯在外齊神武遣韓􅁤司馬子如從河東宵濟襲羆羆不之覺比曉軌衆以乗梯入城羆尚卧未起聞閤外洶洶有聲便􅃝身露髻徒跣持一白挺大呼而出敵見之驚逐至東門左右稍集合戰破之軌衆遂投城遁走又曰陸騰陵州木籠獠恃險麤獷毎行抄刼詔騰討之獠旣因山爲城攻之未可拔騰遂於城下多設聲樂及諸雜技示無戰心諸賊果弃其兵仗或携妻子臨城觀樂騰知其無備密令衆軍俱上諸賊惶懼不知所爲遂縱兵討擊盡破之又曰楊忠梁雍州刺史岳陽王蕭察雖稱藩附而尚有二忠自穰城觀兵於漢濵易旗逓進實􅀐二千察登樓望之以爲三萬懼而服焉又曰韓襃爲汾州刺史界北接大原當千里徑先是髙齊㓂數入人廢耕桑前後刺史莫能防扞襃至適㑹宼來襃乃不下屬縣人旣不及設備以故多􅀍抄掠齊人喜相謂曰汾州不􅁴吾至先未集兵今者之還必莫能追躡我矣由是益懈不爲營壘襃已先勒精銳伏北山中分據險阻邀其歸路乗其衆怠縱伏擊之盡獲其衆又曰東魏宼龍門屯軍蒲坂造三道浮橋渡河又遣其將竇泰趣潼􅀜髙敖曹圍洛州太祖出軍廣陽召諸將曰賊今椅吾三面又造橋於河示欲必渡是欲綴吾軍使竇泰得西入耳乆與相持其計得行非良䇿也且歡起兵以來泰每爲先驅其下多銳卒屢勝而驕今出其不意襲之必克克泰則歡不戰而自走矣諸將咸曰賊在近捨而逺襲事􅀂差跌悔無及也太祖曰歡前襲􅀜吾軍不過霸上今者大來兵未出郊賊顧謂吾但自守耳無逺􅃲意又忸於得志有輕我之心乗此擊之何徃不克賊雖造橋未能徑度比五日中吾取竇泰必矣公等勿疑庚戍太祖率􅀐六千還長安聲言欲保隴右辛亥謁}
