  - {type: variant, offset: 12, length: 0, content: '', SBCK: 而潛出軍癸丑旦至小􅀜竇泰卒聞軍至惶懼依山爲陣未及成列太祖縱兵擊破之盡俘其衆萬餘人斬泰傳首長安髙敖曹適䧟洛州執刺史泉企聞泰之殁焚輜重弃城走齊神武亦撤橋而退通典曰後周末隋文帝爲丞相益州揔管王謙舉兵拒命隋文}
  - {type: variant, offset: 12, length: 0, content: '', WYG: 而潛出軍癸丑旦至小關竇泰卒聞軍至惶懼依山為陣未及成列太祖縱兵擊破之盡俘其衆萬餘人斬泰傳首長安高敖曹適陷洛州執刺史泉仚聞泰之殁焚輜重棄城走齊神武亦撤橋而退通典曰後周末隋文帝為丞相益州總管王謙舉兵拒命隋文}
