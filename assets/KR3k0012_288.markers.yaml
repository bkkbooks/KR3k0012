  - {type: variant, offset: 3031, length: 89, content: 有數百騎令所在揚塵鼓譟使賊不測多少又以人馬逼戰刀不如棒密勒軍士各齎棒一枚置於馬側至於戰時不聽斬級以棒棒之而已虜沸騰逐北乃分命壯勇所當衝突號令嚴明將士同奮榮身自陷陣出於賊後表裏合擊, SBCK: 得度}
  - {type: variant, offset: 3031, length: 2, content: 有數, WYG: 得渡大事去矣果如其言帝西奔長安太平御覽卷二}
  - {type: variant, offset: 3031, length: 89, content: 有數百騎令所在揚塵鼓譟使賊不測多少又以人馬逼戰刀不如棒密勒軍士各齎棒一枚置於馬側至於戰時不聽斬級以棒棒之而已虜沸騰逐北乃分命壯勇所當衝突號令嚴明將士同奮榮身自陷陣出於賊後表裏合擊, krp: 得度}
  - {type: variant, offset: 3034, length: 589, content: 騎令所在揚塵鼓譟使賊不測多少又以人馬逼戰刀不如棒密勒軍士各齎棒一枚置於馬側至於戰時不聽斬級以棒棒之而已虜沸騰逐北乃分命壯勇所當衝突號令嚴明將士同奮榮身自陷陣出於賊後表裏合擊大破之於鄴擒葛榮又曰傅永守楚王戍蕭齊將裴叔業來攻永令填塞外塹夜伏戰士千人於城外曉而叔業至頓於城東列陣將置長圍永所伏兵於道左擊其後軍破之叔業乃令將佐守所列之陣自率精甲數千救之永上門樓觀叔業南行五六里許便開門奮擊遂摧破之叔業進退失圖於是奔走左右欲追之永曰弱卒不滿三千彼精甲猶盛非力屈而敗直墮吾計中耳既不測我之虛實足喪其膽俘此足矣何假逐之又曰太武帝親征後燕將慕容德于鄴戰前軍敗績德又欲攻之別駕韓𧨳進曰今魏不可擊者四燕不宜動者三魏懸軍遠入利在野戰一不可擊也深入近畿致兵死地二不可擊也前鋒既敗後陣方固三不可擊也彼眾我寡四不可擊也官軍自戰其地一不可動動而不勝眾心不固二不宜動隍池夫修敵來無備三不宜動此皆兵機也深溝高壘以逸待勞彼千里饋糧野無所掠久則三軍糜資攻則眾旅多斃師老釁生詳而圖之可以捷也德曰韓別駕之言良平之策也又曰大將廣陽王元深伐北狄使于謹單騎入賊中示以恩信於是西部鐵勒酋長也列河等三萬餘戶並款附相率南遷廣陽欲與謹至折敦嶺迎接之謹曰破六汗拔陸兵眾不少聞也列河等歸附必來要擊彼若先據險要則難與爭鋒今以列河等餌之當竟來抄掠然後設伏而待必指掌破之廣陽然其計拔陵果來要擊破也列河於嶺上部眾皆沒謹伏兵發賊遂大敗悉收列河之眾也, WYG: 八十八}
