  - {type: variant, offset: 1292, length: 307, content: 說行事不暗相聞不容矯有所道天獸是行事心膐彼聞必謂行事與天獸共隱其事必人人疑山陽惑於眾口必相嫌貳則行事進無以自明必恐漏吾謀內是馳兩空亟定一州矣山陽至江安聞之果疑不上頴胃大懼乃斬天獸送首山陽信之將數十人馳入頴冑伏甲斬之送首梁武以州歸又曰梁武帝發雍州東下雍州今襄陽郡大軍次江寧梁武使呂僧珍與王茂率精兵先登梁武頓於越城呂僧珍猶守白坂齊主東昏將李居士密覘知城中眾少率銳卒萬人直來薄城僧珍謂將士曰今力既不敵不可與戰可勿遙射須至塹裏當并力破之俄而皆越塹拔柵僧珍分人上城矢石俱發自率馬步三百人出其後守陴者復踰城而下內外齊擊居士等應時奔散三國典略曰侯景叛叚韶夾渦而軍潛於上風縱火景眾騎入水出而卻走草濕火不復然梁書曰司州刺史陳慶之率兵, SBCK: ''}
