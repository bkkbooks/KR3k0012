  - {type: variant, offset: 2941, length: 2, content: 為并, SBCK: 章太守鯤之子幼有至性八􅀊風神夙悟鯤嘗携之送客或曰此児一􅚋之顔回也尚應聲曰􅚋無尼父焉識顔回賔客莫不歎異年十􅀊遭父憂丹陽尹温嶠吊之尚號􅂘極哀旣而収涕吿訴舉止有異常童嶠甚竒之又曰韓康伯早􅀌家貧年數􅀊母爲作􅃭子令康伯捉熨母謂曰且着尋爲汝作袴伯曰巳足不復煩母問其故荅曰如火在熨斗中而柄亦熱今旣着􅃭皆當暖也母異之王隱晉書曰王儉字元衡内史下邳陳邵擅名徐州邵聞儉年十四善属文請作祝文邵謂郡客曰此生爲文有可􅀚採命爲督郵主簿邵迁給事儉毎爲定表晉中興書曰謝安字安石年四􅀊桓彛見而歎曰此児風神秀徹後當不减王東海揔角神識深敏氣宇條暢丞相王導知之由是著名又曰范宣陳留人年十􅀊能誦詩書甞以刀傷手捧手改容人問痛耶荅曰受全之體而致毁傷不可處耳少好學手不釋卷􅀶覧衆書善三禮又曰戴逵字安道譙國人少􅀶學好談論善屬文能鼓琴工書􅀞其餘巧藝靡不畢綜揔角時以雞􅆑汁溲白瓦屑作鄭玄碑又爲文手自刻字文旣綺藻器亦妙絶時人莫不驚歎知其深敏宋書曰劉秀之字道寳少􅀌貧有志操十許􅀊時與諸兒戯於前渚忽有大虵來勢甚猛無不顛怖驚呼秀之猶不動衆並異焉又曰王僧逹㓜聦敏弘爲州縣僧逹六七􅀊遇有通訟者竊覧其辤謂爲有理及入訟者亦進弘意其小留左右僧逹爲申理闇誦不失一句又曰徐湛之㓜與弟淳之共車行牛奔車左右人馳來赴之湛之先令取弟衆咸歎其㓜而有識又曰蔡興宗字興宗㓜爲父廊所重謂有巳風與親故書曰小児四􅀊神氣似可不入非􅀋室不與小人遊故以興宗爲之名興宗爲之字齊書曰王慈字伯寳琅耶臨沂人司空僧䖍子也八􅀊外祖宋江夏王義恭施寳物恣聽所取慈唯取素琴石硯義恭善之又曰􅀓昭六􅀊而􅀌哀毁如成人爲外祖所養十歳於朱雀航賣暦曰雍}
