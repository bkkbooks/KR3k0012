  - {type: variant, offset: 296, length: 552, content: 檀弓上曰子夏喪其子而喪其明曾子吊之子夏哭曰天乎予之無罪曾子怒曰吾與汝事夫子於洙泗之間退而老於西河之上使西河之民疑汝於夫子爾罪一也又曰王制曰養耆老以致孝又曰凡養老有虞氏以燕禮夏后氏以饗禮殷人以食禮周人脩而兼用之五十養於鄉六十養於國七十養於學達於諸侯天子諸侯養老同也五十異糧六十宿肉七十貳膳八十常珍九十飲食不離寢膳飲從於遊可也五十始衰六十非肉不飽七十非帛不煖八十非人不煖九十雖得人不煖矣又曰五十杖於家六十杖於鄉七十杖於國八十杖於朝九十者天子欲有問焉則就其室以珍從尊養之七十不俟朝二夫士之差者揖君則退八十曰告存每月致膳九十曰有秩秩常也有常膳有虞氏養國老於上庠養庶老於下庠夏后養國老於東序養庶老於西序殷人養國老於右學養庶老於左學周人養國老於東膠養庶老於西膠又曰君子耆老不徒行庶人耆老不徒食矣又曰文王世子曰文王謂武王曰汝何夢矣武王對曰夢帝與我九齡帝天也文王曰古者謂年齡齒亦齡也我百爾九十吾與爾三焉文王九十七而終武王九十三而終又祭義曰先王之所以治天下者五貴有德貴貴貴老仁長慈幼為其近於親也又曰虞夏殷周天下之盛王也未有遺年者年之貴乎天下久矣次乎事親也又曰天子巡守諸侯待于竟天子先見百年者左傳隱公曰石碏使告于陳曰衛國褊小老夫耄矣無能為也又僖公上曰王使宰孔賜齊侯胙將下拜孔曰且有後命天子使孔曰以伯舅耋老加勞賜一級無下拜又僖, WYG: 成}
