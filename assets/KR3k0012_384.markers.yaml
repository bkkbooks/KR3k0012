  - {type: variant, offset: 20, length: 3, content: 耆耆指, SBCK: 童故禮有陽童牛羊之無角者曰童山無草木亦曰童言末巾冠似之左傳僖下曰楚子將圍宋使子文治兵於聧終朝而畢不戮一人子玉復治兵於蔿終日而畢鞭七人貫三人耳國老皆賀子文飲之酒蔿賈尚㓜後至不賀子文問之對曰不知所賀子之傳政於子玉曰以靖國}
  - {type: variant, offset: 20, length: 4, content: 耆耆指也, WYG: 童故禮有陽童牛羊之無角者曰童山無草木亦曰童言無巾冠似之左傳僖下曰楚子將圍宋使子文治兵扵暌終朝而畢}
