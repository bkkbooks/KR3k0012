  - {type: variant, offset: 2939, length: 1, content: 田, WYG: 鍾㑹字士季潁川長社人太傅繇小子也少敏惠夙成中護軍蔣濟著論曰觀其眸子足以知人㑹年五嵗繇遣見濟濟甚異之曰非常人又曰賈逵字梁道河東㐮陵人自為童戯弄常設部伍祖父習異之曰汝大必為將相口授兵法數萬言又曰楊俊同郡王象少孤特為人僕𨽻年十七八見使牧羊而私讀書因獲捶楚俊美其才質即贖象至家聘娶立屋然後與别又曰劉冀字恭嗣南陽安衆人年七嵗戯講堂上潁川司馬徳操撫其頭曰孺子孺子黄中通理寜自知不又曰司馬朗字伯逹河内温縣人年九嵗人有稱其父字者朗曰慢人者不敬其親客謝之十二試為童子郎又曰王粲為中郎蔡邕見而竒之時邕顯著貴重朝廷常車騎填巷賔客盈坐聞粲在門倒屣迎之及至年既㓜弱容狀短小一坐盡驚邕曰此為王公孫也有異才吾不及也吾家書籍文章盡當與之又曰陳羣字長文潁川許昌人祖父寔父紀叔父諶皆有盛名羣為兒時寔常竒之謂宗人父老曰此兒必興吾宗又曰常林字伯槐河内温人年七嵗父黨造門問林曰伯先在不汝何不拜林曰對子字父何拜之有扵是咸共嘉之又曰曹休字文烈太祖族子年十餘嵗見太祖太祖謂左右曰此吾家千里駒也使與文帝同止見待如子常從征討使領虎豹騎又曰夏侯惇字元譲沛國譙人年四嵗求師就學人有辱其師者殺之由是以烈氣聞呉書曰虞翻少好學有才氣年十二客有候其兄者不過翻翻追與書曰僕聞琥珀不拾腐草磁石不受曲針過而不存不亦冝乎客得書異之又曰沈友字子正呉郡人年十一華歆行風俗見而異之因呼沈郎可登車語乎友逡廵却曰先生銜命將以禆補先王之教齊風俗也而輕脱威儀猶負薪救火無乃更崇其熾乎歆慙曰自桓靈來未有㓜童若此者又曰陸績年六嵗扵九江見袁術術出橘與績績懐三枚去拜辭墮地術曰陸郎作賔客而懐橘乎績跪荅曰欲歸遺母術大竒之蜀志曰諸葛亮子瞻字思逺亮與兄瑾書曰瞻今已八嵗聰惠可愛嫌其早成不為重器耳晋書曰王戎㓜而頴悟神彩秀徹視日不眩裴楷見而目之曰戎眼爛爛如巖下電年六七嵗扵宣武塲觀戯猛獸在檻中虓闞震地衆皆奔走戎獨立不動神逸自若魏明帝扵閣上見而竒之又曰王澄字平子生而警悟雖未能言見人舉動便識其意衍妻郭性貪鄙欲令禆路上擔糞澄年十四諌郭以為不可又曰中宗太子紹㓜而聰哲年數嵗常置中宗膝上㑹長安使来中宗因問曰汝謂日與長安孰逺對曰日逺中宗問其故答曰不聞人從日邉來逺可知耳中宗異之明日㑹羣臣又問之對曰日近中宗失色曰何異昨日之言對曰舉目見日不見長安由是益竒之又曰王舒字允之總角時甞從伯敦敦與錢鳯謀逆而允之時飲酒帳中卧悉聞其言慮敦疑之便扵卧處吐涕狼藉敦果疑遣㸔之見吐唾以為醉又曰謝尚字仁祖}
