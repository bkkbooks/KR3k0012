  - {type: variant, offset: 971, length: 841, content: 一也吏走問諸朝師曠曰魯叔仲惠伯會卻成子于承匡之歲也七十三年矣又曰穆叔至自會見孟孝伯語之曰趙孟將死矣其語偷不似民主且年未盈五十而諄諄焉如八十九十者弗能久矣又昭元曰天王使劉定公勞趙孟於潁館於洛汭劉子曰美哉禹功子盍亦遠績禹功而大庇民乎對曰老夫罪矣是懼焉能恤遠吾儕偷食朝不謀夕何其長也劉子歸以語王曰諺所謂老將至而耄及之者其趙孟之謂也又曰齊侯田於莒蘆蒱嫳見泣且請曰余髮如此種種余奚能為種種短也自言衰老不能復為害又昭公四曰楚靈王至乾溪聞群公子之死也自投于車下曰人之愛其子也亦如余乎侍者曰甚焉小人老而無子知擠于溝壑矣尚書盤庚曰汝無侮老成人無弱孤有幼又洪範曰五福一曰壽百二十年又無逸曰自時厥後立王生則逸生則逸不知稼穡之艱難不聞小人之勞惟耽樂之從自時厥後亦罔或克壽以耽察之故從是其後亦無有能壽考又呂刑曰惟呂命王享國百年耄荒言呂侯見命為卿時穆王以享國百年耄亂荒忽雖老而能用賢以揚名論語里仁曰父母之年不可不知一則以喜一則以懼孔子曰見其壽老則喜見其衰老則懼又微子曰齊景公待孔子曰若季氏則吾不能以季孟之間待之曰吾老矣不能用也孔子行爾雅曰耆老也尚書中候曰齊桓公欲封禪謂管仲曰寡人日暮仲父年艾韓詩外傳曰楚丘先生見孟常君孟常君曰先生老矣春秋高矣多遺忘矣何以教文先生曰使我投石超距追車赴馬逐麋鹿搏虎豹吾則老矣使我探計謀設精神決嫌疑出正辤尚諸侯吾乃始壯耳何老之有孟常君勃然汗出至踵曰文過耳又曰齊桓公見畝丘人曰叟年幾何對曰臣年八十三公曰美哉壽也論語讖曰仲尼曰吾聞堯舜等遊首山觀河渚乃有五老遊河渚一老曰河圖將來告帝期二老曰河圖持龜告帝謀三老曰河圖將來告帝書四老曰河圖將來告帝圖五老曰河圖將浮龍衘玉包金泥玉檢封盛書五老飛為流星上入昂宋均注曰浮龍浮於水周書曰文王在鄗召太子發曰嗚呼我身老矣吾語汝我所保與我所守汝勤之我傳之子孫吾厚德而廣惠信忠而志愛不為驕役不為泰靡括柱而茅茨為民愛費也戰國策曰昔者秦魏為國齊楚約攻魏魏使人求救於秦冠蓋相望秦救不出魏人有唐祖者年九十餘謂魏王曰老臣請西說秦令兵出可乎曰敬諾遂約車遣之見秦王秦遽發兵救之, SBCK: 誅淖齒}
