  - {type: variant, offset: 4673, length: 387, content: 歲兩目皆盲文帝奇之問何能服食而至此耶對曰年十三失明父母哀之教使鼓琴日講習以為常事臣不能道引無所服餌也譚以為少盲恒逸樂所以益性命也神仙傳曰淮南王安好道術八公乃詣門門者見其垂白不進八公皆化成童子色如桃花門吏白王王迎之登思仙之臺張錦綺之帷設象牙之床席燔百和之香進碧玉之几執弟子禮八公還成老人授之要道及郎中雷被譖安安與八公昇天所踐石皆陷今人馬之跡在焉王子年拾遺錄曰昔老聃當周之末居反景日室之山與世人絕跡唯有黃髮老叟五人或乘虎豹或乘鴻鵠衣毛羽之服眉覆於目耳垂至肩兩眸子皆黑方面玉潔手握青筠之杖出入于日室之中與老子談天文之數述異記曰尹雄年九十頭生角角半寸世說曰顧悅與簡文同年而早白簡文問曰卿何以先老荅曰蒲柳之姿望秋而先落松柏之質逢霜而彌盛應琚詩曰昔有行道人陌上見三叟年各百餘歲相與鋤禾莠住車問三叟何以得此壽上叟前置辤室內嫗麤醜中叟前置辭量腹節所受下叟前置辤暮臥不覆首要哉三叟言所以能長久, SBCK: 四}
