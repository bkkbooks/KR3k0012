  - {type: variant, offset: 24, length: 0, content: '', SBCK: 靖諸内而敗諸外所􅀗幾何子玉之敗子之舉也舉以敗國將何賀焉且子玉剛而無禮不可以治民過三百乗其不能以入矣苟入而賀何後之有又曰􅁗師過周北門左右免胄而下超乗玉孫滿尚㓜觀之曰􅁗師輕而無禮必敗輕則寡謀無禮則脫脫易也入險而脫又不能謀能無敗乎又成公下曰晉變書中行偃使程滑殺厲公使荀罌士魴逆周子于京師而立之悼公周公生十四年矣大夫逆于清原周子曰􅀌始願不及此雖及此豈非天乎抑人之求君使出令也立而}
  - {type: page-break, offset: 24, content: '', id: KR3k0012_SBCK_384-1b}
  - {type: variant, offset: 24, length: 0, content: '', krp: 靖諸内而敗諸外所獲幾何子玉之敗子之舉也舉以敗國將何賀焉且子玉剛而無禮不可以治民過三百乗其不能以入矣苟入而賀何後之有又曰秦師過周北門左右免胄而下超乗玉孫滿尚㓜觀之曰秦師輕而無禮必敗輕則寡謀無禮則脫脫易也入險而脫又不能謀能無敗乎又成公下曰晉變書中行偃使程滑殺厲公使荀罌士魴逆周子于京師而立之悼公周公生十四年矣大夫逆于清原周子曰孤始願不及此雖及此豈非天乎抑人之求君使出令也立而}
