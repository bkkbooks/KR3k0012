  - {type: variant, offset: 1744, length: 1, content: 昔, WYG: 文信侯疾故使張唐相燕弗肯行少庶子甘羅請行之文信侯叱去甘羅曰夫項橐七嵗為孔子師今臣年十二君其試焉奚遽言叱乃見張卿而行之又曰王孫賈年十五事閔王其母曰汝朝出而晚還則吾倚門而望汝暮出不還則吾倚閭而望汝汝事王王出走不知其處汝尚歸王孫賈乃入市中曰淖齒亂齊國殺王欲與我誅}
