  - {type: variant, offset: 4000, length: 670, content: 人謁齊王王賜之田眾老皆拜閭丘先生獨不拜又賜無役諸老復拜閭丘先生又不拜宣王疑而問之對曰來見大王所望者三願賜臣壽賜臣富賜臣貴王曰天命有長短非寡人所制無所壽先生倉粟雖盈備災畜無以富先生大官無闕小官卑賤無以貴先生先生曰所望願王選良吏臣少得壽焉使人以時役無煩苛此臣所以得富焉使少者敬長者長者敬老者此臣所以得其貴也王賜臣田田不租倉廩虛賜臣無役則官無所使非所望也王曰賜先生為相可乎先生曰臣得三願足矣安用為相又曰子奇年八十齊君任為東阿既行而君悔焉使人追之囑使者曰未至追令還已至勿追未至東阿使者反之齊君問故使者曰臣見子奇同載者皆白首矣夫老者之智少者之決此必能治東阿矣王曰善哉又曰昔衛武公年九十五儆於國曰茍在朝者無謂我老耋而舍我也必恭恪於朝夕以儆我聞一二之言志誦納之以訓道漢武故事曰上嘗輦至郎署見一老髭鬚皓白衣服不完上問曰公何時為郎何其老矣對曰臣姓顏名駟江都人也文帝時為郎上問曰何不遇也駟曰文帝好文臣好武景帝好老臣又少陛下好少臣已老是以三世不遇上感其言拜為會稽都尉新序曰孔子見宋榮啟期年老白首衣弊服鼓琴自樂孔子問曰先生老而窮何樂也啟期曰吾有三樂天生萬物以人為貴吾得為人一樂也人生以男為貴吾得為男二樂也人生命有傷夭吾年九十餘是三樂也貧者士之常死者人之終居常以守終何不樂乎說苑曰楚文王伐鄭使王子革子露居二子出遊老人戴畚從而乞食焉不與搏而奪之畚又曰晉平公問師曠曰吾年七十欲學恐晚如何對曰暮不炳燭耶臣聞少而學者如日出之陽壯而學者如日中之光老而學者如炳燭之明炳燭之明孰與昧行乎公曰善哉善哉申鑒曰學壽不至壽可以盡命新論曰余前為王翁典樂大夫見樂家書記文帝時得魏文侯時樂人竇公, SBCK: ''}
