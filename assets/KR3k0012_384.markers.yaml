  - {type: variant, offset: 2939, length: 1, content: 田, SBCK: 鍾㑹字士季頴川長社人太􅀓繇小子也少敏惠夙成中護軍蔣濟著論曰觀其眸子足以知人㑹年五􅀊繇遣見濟濟甚異之曰非常人又曰賈逵字梁道河東襄陵人自爲童戯弄常設部伍祖父習異之曰汝大必爲將帥口授兵法數萬言又曰楊俊同郡王象少􅀌時爲人僕隸年十七八見使牧羊而私讀書固獲捶楚俊羙其才質即贖象着家娉娶立屋然後與別又曰劉廙字恭嗣南陽安衆人年七􅀊戯講堂上頴川司馬德操撫其頭曰孺子孺子黄中通理寧自知不又曰司馬㓪字伯逹河内温縣人年九􅀊人有稱其父字者㓪曰慢人者不敬其親客謝之十二試爲童子郎又曰王粲爲中郎蔡邕見而竒之時邕顯著貴重朝廷常車􅀐填巷賔客盈坐聞粲在門倒屣迎之及至年旣㓜弱容狀短小一㘴盡驚邕曰此王公孫也有異才吾不如也吾家書籍文章盡當與之又曰陳羣字長文頴川許昌人祖父寔父紀叔父諶皆有盛名羣爲児時寔常竒之謂宗人父老曰此児必興吾宗又曰常林字伯槐河内温人年七􅀊父黨造門問林曰伯先在不汝何不拜林曰對子字父何拜之有於是咸共嘉之又曰曹休字文烈太祖族子年十餘歳見太祖太祖謂左右曰此吾家千里駒也使與文帝同止見待如子常從征討使領虎豹􅀐又曰夏侯惇字元讓沛國譙人年四歳求師就學人有辱其師者惇殺之由是以烈氣聞呉書曰虞翻少好學有才氣年十二客有􅀱其兄者不過翻翻追與書曰僕聞琥珀不授腐草礠石不授曲針過而不存不亦宣乎客得書異之又曰沈友字子正呉郡人年十一華歆行風俗見而異之因呼沈郎可登車語乎友逡廵却曰先生衘命將以禆􅀘先王之教齊風俗也而輕脫威儀猶負薪救火無乃更崇其熾乎歆慙曰自桓靈來未有幼童􅀂此者又曰陸績年六􅀊於九江見􅀽術術出橘與績績懷三枚去拜辤墮地術曰陸郎作賔客而懷橘乎績跪荅曰欲歸遺母術大竒之蜀志曰諸葛亮子瞻字思逺亮與兄瑾書曰瞻今巳八􅀊聦惠可愛嫌其早成不爲重器耳􅀳書曰王戎㓜而潁悟神彩秀徹視日不眩裴楷見而目之曰戎眼爛爛如巖下電年六七􅀊於宣武􅂣觀戯猛獸在檻中虓闞震地衆皆奔走戎獨立不動神色自􅀂魏明帝於閤上見而竒之又曰王澄字平子生而警悟雖未能言見人舉動便識其意衍妻郭性貪鄙欲令婢路上擔糞澄年十四諌郭以爲不可又曰中宗太子紹㓜而聦哲年數􅀊嘗置中宗膝上㑹長安使來中宗因問曰汝謂日與長安孰逺對曰日逺中宗問其故荅曰不聞人從日邊來然可知耳中宗異之明日㑹羣臣又問之對曰日近中宗失色曰何異昨日之言對曰舉目見日不見長安由是益竒之又曰王舒字允之揔角時嘗從從伯敦敦與錢鳯謀逆而允之時飲酒帳中卧悉聞其言慮敦疑之便於卧處吐涕狼藉敦果疑遣看之見吐唾以爲醉又曰謝尚字仁祖}
