  - {type: variant, offset: 2073, length: 280, content: 四人前對各言名姓曰東園公角里先生綺里季夏黃公上乃大驚曰吾求公數歲公避逃我今公何自從吾兒游乎四人皆曰陛下輕士善罵臣等義不受辱故恐而亡匿竊聞太子為人仁孝恭敬愛士天下莫不延頸欲為太子死者故臣來耳上曰煩公幸卒調護太子又曰伏生者伏生名勝濟南人故秦博士也孝文欲求能治尚書者天下無有聞伏生能治召之是時伏生年九十餘老不能行乃詔太常掌故朝錯往受之又曰武帝使束帛加璧安車駟馬迎申公弟子二人乘軺傅從見天子天子問治亂之事申公時已八十餘對曰為治者不至多言顧力行何如耳又曰季少君以祠竈卻老方見上自謂七十嘗從武安侯飲坐中有年九十餘老人少君乃言與其大父游射處老人為兒時從其大父行識其處一坐盡驚, SBCK: ''}
