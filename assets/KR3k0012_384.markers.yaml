  - {type: variant, offset: 888, length: 203, content: 如人今老矣無能為也又襄公六曰晉悼夫人食與人之城杞者綘縣人或年長矣無子而往與於食有與疑年使之年使言其年曰臣小人也不知紀年臣生之歲正月甲子朔四百有四十五甲子矣其季於今三之一也吏走問諸朝師曠曰魯叔仲惠伯會卻成子于承匡之歲也七十三年矣又曰穆叔至自會見孟孝伯語之曰趙孟將死矣其語偷不似民主且年未盈五十而諄諄焉如八十九十者弗能久矣又昭元曰天王使劉定公勞趙孟於潁館於洛汭劉子曰美哉禹功子盍亦遠績禹功而大庇民乎對曰老夫罪矣, WYG: 唯命}
