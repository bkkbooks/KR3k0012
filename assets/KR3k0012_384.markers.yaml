  - {type: variant, offset: 34, length: 0, content: '', SBCK: 􅀊爲孔子師今臣年}
  - {type: variant, offset: 34, length: 150, content: 十曰耄頭髮耄耄然也八十曰耋耋鐵也皮膚變黑色如鐵也九十曰鮐背背有鮐文也或曰黃耇鬢髮變黃也耇垢也皮色驪悴恒如有垢也或曰胡耇皮如雞胡也或曰凍梨皮有班黑如凍梨色也或曰鬼齒大齒落盡更生細齒如小兒齒也百年曰期頤頤養也老惛不復知服味善惡孝子期於盡養道也老朽也老不死曰仙仙遷也遷入山也周禮夏官司馬曰中春羅春鳥獻鳩以養, WYG: 人貫三人耳}
  - {type: variant, offset: 34, length: 0, content: '', krp: 歲爲孔子師今臣年}
  - {type: variant, offset: 35, length: 189, content: 曰耄頭髮耄耄然也八十曰耋耋鐵也皮膚變黑色如鐵也九十曰鮐背背有鮐文也或曰黃耇鬢髮變黃也耇垢也皮色驪悴恒如有垢也或曰胡耇皮如雞胡也或曰凍梨皮有班黑如凍梨色也或曰鬼齒大齒落盡更生細齒如小兒齒也百年曰期頤頤養也老惛不復知服味善惡孝子期於盡養道也老朽也老不死曰仙仙遷也遷入山也周禮夏官司馬曰中春羅春鳥獻鳩以養國老是時鷹化為鳩鳩與春鳥變舊為新以宜養左助生氣也禮記曲禮上曰六十曰耆指使七十曰老, SBCK: 二君其試焉奚遽言叱乃見張卿說}
