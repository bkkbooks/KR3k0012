  - {type: variant, offset: 2898, length: 3, content: 班超自, SBCK: 丁鴻年十三從桓榮受歐陽尚書三年而明章句善論難爲都講遂篤志精銳布衣荷檐不逺千里又曰張堪字君遊年六􅀊受業長安治梁丘易才羙而髙京師號曰聖童又曰鄧禹字仲華南陽新野人年十三能誦詩受業長安時上亦遊學京師禹年雖㓜而見上知非常人遂相親附及漢兵起即䇿杖北渡追及上於鄴又曰承宫琅瑘姑􅂫人少􅀌年八􅀊爲人牧猪郷里徐子盛明春秋經授諸生數百人宫過其廬下見諸生講誦好因弃其猪而聽經猪主恠其不還來索見宫欲笞之門下生共禁止因留精舎門下樵薪又曰魯恭父建武􅀄爲甘陵太守卒官時年十二弟平年七􅀊晝夜號踊不絶聲郡中􅉠贈無所受歸服喪禮過成人又曰吴祐字季英陳留長垣人父恢爲南海太守祐年十二恢欲殺青簡}
