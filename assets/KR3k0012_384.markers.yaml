  - {type: variant, offset: 3354, length: 253, content: 即號曰羅侯城至今猶在又曰刀雍以耆年特見優禮錫以几杖杖履上殿因致珍羞焉嘗經篤疾幾死見有神明救之言福門子當享長年後卒於洛州刺史又曰尉先許致仕詣闕謝老引見於庭命昇殿勞宴賜以玄冠素服又詔充三老給上公之祿唐書曰太宗將伐遼東召李靖入閤賜坐御前謂曰公南平吴會北清沙漠西定慕容唯東有高麗未服公意如何對曰臣往者憑藉天威薄展微效今殘年朽骨唯擬此行陛下若不棄老臣病其瘳矣帝愍其羸老不許又曰嚴綬材器不逾常品事兄嫂過謹為時所稱常以寬柔自持位躋上公年至大耋前後統臨三鎮皆號雄藩所辟士親暏為將相者凡九人其貴壽如此周史曰蕭愿字惟恭梁宰相頃, SBCK: 王澄}
