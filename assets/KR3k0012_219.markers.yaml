  - {type: variant, offset: 1841, length: 334, content: 別受制共當時大儒祝欽明郭山惲撰定儀注凡所立議眾咸推服之祠部郎中祠部員外郎六典曰祠部郎中員外郎掌祠祀享祭天文漏刻國忌廟諱卜筮醫藥僧尼之事凡祭祀之名有四一曰祀天神二曰祭地祇三曰享人鬼四曰釋奠于先聖先師其差有三若昊天上帝五方帝皇地祇神州宗廟為大祀日月星辰社稷先代帝王岳鎮海瀆帝社先蠶孔宣父齊太公諸太子廟為中祀司中司命風師雨師眾星山林川澤五龍祠等及州縣社稷釋奠為小祀梁書曰賀德基少遊學都下積年不歸衣資罄乏又車服故弊盛冬止衣裌襦袴嘗於白馬寺前逢一婦人容服甚盛呼德基入寺門脫白綸巾以贈之仍謂曰君方為重器不久貧寒故以此相遺耳問姓名不荅而去德基於禮記稱為精明位尚書祠部郎雖不至大官而三世儒學俱為祠部郎時論美其不墜主客郎中主客員外郎六典曰主客郎中員外郎掌二王後及諸蕃朝聘之事後漢書何遠少, SBCK: 忠亮}
