  - {type: variant, offset: 1522, length: 4, content: 長然後依, SBCK: 不敢當帝羙之勑左右䟽其語續搜神記曰程咸字延休其母始懷咸夢老公授藥與之服此當生貴子晉武帝時歴位至侍中有名於丗摯虞決疑要注曰晉武帝時彭權爲侍中帝問侍臣旄頭之義何謂邪權對曰􅁗紀云􅁗國有竒怪觸山截水無不崩潰唯畏旄頭故使虎士執之以衛至尊山公啓事曰侍中太}
