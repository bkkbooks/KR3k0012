  - {type: variant, offset: 84, length: 4, content: 綽為刑部, SBCK: 孫曄拜􅀶士侍中國有疑事常使進見問其得失所陳皆據經依義􅀘益國家深見省納又曰劉淑爲侍中朝夕建議竭忠於朝􅀘政二百餘事悉有篇章朝廷有疑事密詔問焉又曰周舉字宣光時詔遣八使廵行風俗皆選有威名者乃拜舉侍中與杜喬周翊馮羡欒巴張綱郭尊太尉長史劉班分行天下使同日而拜號曰八俊應劭漢官儀曰侍中迺存年􅂄口臭上出雞舌使含之雞舌香頗小辛螫不敢咀咽自嫌有過得賜毒藥歸舎辭訣欲就便冝家人哀泣不知其故賴僚友諸賢問其􅄽失求視其藥及口香共􅀏之更爲吞食其意遂解存鄙儒蔽於此耳漢官曰侍中殿下稱制出則叅乗佩璽抱劒又曰史丹爲侍中元帝寢疾丹以親密近臣得視疾候上間獨寢時丹直入卧内頓首伏青蒲上應劭曰以青規地曰青蒲漢官儀曰侍中秩千石黄門有􅀞室署玉堂署各有長一人漢舊儀曰侍中無貟或列侯將軍衞尉光禄大夫爲之得舉非法又曰侍中左右近臣見皇后如見帝見婕妤行則對壁坐則伏茵漢書典職曰侍中常伯選舊儒髙德􅀶學洞逹仰瞻俯視切問近對喻指公卿貟八人在}
