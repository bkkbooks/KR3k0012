  - {type: variant, offset: 23, length: 1, content: 刑, SBCK: 冝皆罷遣􅀶選􅂄儒􅀫德與叅政事帝怒不應穆伏不肯起左右傳出傳聲令出也良乆乃趨而去又曰爰延爲侍中帝遊上林苑從容問延曰朕何如主也對曰陛下爲漢中主帝曰何以言之對曰尚書令陳蕃任事則化中常侍黄門豫政則亂是以知陛下可與爲善可與爲非此中主之謂也帝曰昔朱雲廷折檻今侍中面稱朕違敬聞命矣又曰桓帝末侍中皇禪叅乗上問貂璫何}
  - {type: variant, offset: 23, length: 9, content: 刑法及徒隸勾覆關禁, WYG: 宜皆罷遣博選耆儒宿德與叅政事帝怒不應穆伏不肯起左右傳出傳聲令出也良乆乃趨而去又曰爰延爲侍中帝遊上林苑從容問延曰朕何如主也對曰陛下爲漢中主帝曰何以言}
