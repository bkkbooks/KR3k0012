  - {type: variant, offset: 1521, length: 0, content: '', SBCK: 道德可常遵也􅁗始皇復故冠貂蟬漢因而不改侍帷幄受頋問拾遺於左右出則􅀒璽以從秩二千石語林曰晉孝武好與虞嘯父飲酒不醉不出後臨出拜殆不復能起帝因呼人扶上殿扶虞侍中嘯父荅曰臣位未及扶醉未及亂非分之賜}
