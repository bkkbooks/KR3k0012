  - {type: variant, offset: 90, length: 2, content: 京兆, SBCK: 僕射下尚書上漢􅄂事曰金敞爲元帝侍中帝崩故事近臣皆隨陵爲園敞丗名忠孝太后使侍成帝魏志曰盧毓爲侍中先是散􅀐常侍劉劭受詔定律未就毓上論曰古今制律之意以爲法冝一正不冝有兩端使姧吏得容情及侍中髙堂隆數以宫室事切諫帝不恱毓曰君明臣直古之聖王恐不聞其過故有敢諫之鼓近臣盡規此乃臣等所以不及隆隆諸生名爲狂直陛下冝容之毓在職三年多所駮易又曰劉曄字子陽爲侍中在朝略不交接時}
