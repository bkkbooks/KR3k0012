  - {type: variant, offset: 357, length: 2, content: 法書, WYG: 而聞西更増白帝之守何也預對曰臣以爲東益巴丘之戍西增白帝之守皆事勢宜然俱不足以相問也權大笑嘉其抗藎甚愛待之見敬亞於鄧芝費褘遷爲侍中又曰關興字安國少有令問丞相諸葛亮深器異之弱冠爲侍中又曰董扶字茂安靈帝徴扶即拜侍中在朝稱爲儒宗甚見器用又曰馬良字季常襄陽宜城人也先主稱尊}
