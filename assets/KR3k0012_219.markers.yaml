  - {type: variant, offset: 21, length: 0, content: '', WYG: 出納帝命緝熈皇極總典吏職贊相禮儀以和萬邦以弼庶務蓋以佐天子而統大政者也凡軍國之務與中書令叅而總焉坐而論之舉而行之此其大較也應劭漢官儀曰侍中周官也金蟬有貂金取堅剛百鍊不耗蟬居髙食潔目在掖下貂内勁悍而外温潤侍中便蕃左右與帝升降卒思近對拾遺補闕百僚之中莫密於兹秦始皇破趙得其冠以賜侍中史記曰二世用趙高計不悉廷見大臣居禁中趙高常侍中用事漢書曰張彭祖宣帝時爲侍中少與帝微時同硯席書以舊恩封侯出常叅乗又曰史丹元帝世爲侍中出常陪乗甚有寵九男皆以丹任爲侍中又曰桑𢎞羊雒陽賈人子以心計年十五爲侍中又曰霍去病以皇后姊子年十八爲侍中善騎射又曰孝惠時侍中皆冠鵕鸃具𢃄𫝊脂粉矣又曰張良子辟疆年十五爲侍中又曰上官桀隴西人爲中廐令上嘗疾及愈見馬多瘦怒曰汝以我不復見馬耶桀頓首曰臣聞聖體不安日夜憂惶意誠不在馬言未卒泣數行下帝以爲忠親近之爲侍中又曰衞尉金敞疾甚成帝拜子渉爲侍中緑車載送衞尉府如淳曰載以皇孫車寵之也東觀漢記曰戴慿字次仲爲侍中正旦朝賀百僚畢㑹帝令群臣能説經者更相難詰義有不通輒奪其席以益通者慿遂重坐五十餘席故京師爲之語曰解經不窮戴侍中又曰馮魴字孝孫父子兄弟並𢃄青紫三代侍中後漢書曰趙典再遷爲侍中時帝欲廣開鴻池典諫曰鴻池泥漑已且百頃猶復增而深之非所以崇唐虞之約已遵孝文之愛人也帝納其言而止又曰楊震孫竒靈帝時爲侍中帝常從容問竒曰朕何如桓帝對曰陛下之於桓帝亦猶虞舜比德唐堯帝不悅曰卿强項真楊震子孫强項言不低屈也光武謂董宣爲强項令也又曰朱穆因進見復陳曰臣聞漢家舊典置侍中常侍各一人省尚書事省覽黄門侍郎一人傳發書奏傳通皆用姓族引用士人有族望者自和熹太后以女主稱制不接公卿乃以閹人爲常侍小黄門通命兩宫自此以來權傾人主窮困}
