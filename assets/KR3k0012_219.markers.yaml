  - {type: variant, offset: 362, length: 592, content: 統類奏行用之刑部郎中刑部員外郎六典曰刑部郎中員外郎各二員掌舉其典憲而辨其輕重凡文法之名有四一曰律二曰令三曰格四曰式凡律一十有二章一曰名例二曰衛禁三曰職制四曰戶婚五曰廄庫六曰擅興七曰盜賊八曰鬭訟九曰詐偽十曰雜律十一曰捕亡十二曰斷獄而大凡五百條焉唐書曰長慶中刑部員外郎孫革奏准京兆府雲陽縣人力張蒞欠羽林官騎康憲錢米憲徵之蒞乘醉拉憲氣息將絕憲男買德年十四將救其父以蒞角觗力人不敢撝解遂持木鍤擊蒞之首見血後三日致死者准律文為人所毆人往救擊其人折傷減凡鬭三等至死依常律即買德救父難是性孝非暴擊張蒞是功非兇以髫丱之歲正父子之親若非聖化所加童子安能及此王制稱五刑之理必原父子之親以權之測淺深之量以別之春秋之義原心定罪周書訓諸罰有權今買德生被皇風幼符至孝哀矜之宥伏在聖慈職當讞刑合分善惡先具事由陳奏伏冀賜下中書門下啇量勑旨康買德尚在童年得知子道雖殺人當死而為父可哀若從沉命之科是失原情之義宜付法司減死罪一等處分都官尚書南史曰徐孝克為都官尚書自晉巳來尚書官僚皆攜家屬居省省在臺城內下舍門中有閣道東西跨路通于朝堂其第一即都官省西抵閣道年代久遠多有鬼怪每夜昏之際無故有聲光或見人著衣冠從井中出須臾復沒或門閣自然開閉居者多死云尚書周確卒於此省孝克代確便即居之經兩載祅變皆息時人咸以為貞正所致梁書曰羊侃遷都官尚書時尚書令何敬容用事與之並居未嘗遊造有宦者張僧胤候侃曰我床非閹人所坐竟不前之時論美其貞正後周書曰梁元, SBCK: 驚懼}
