  - {type: variant, offset: 489, length: 5, content: 刑部員外郎, WYG: 與侍中孔恂楊濟同列爲一時秀彦武帝常㑹公卿藩牧於式乾殿顧濟恂而謂諸公曰朕左右可謂恂恂濟濟矣又曰沈演之爲侍中衞將軍文帝謂之曰侍中領衞俱爲優重此蓋宰相便座卿其勉之又曰陸玩遷侍中玩雖豋公輔謙不辟掾屬成帝聞而勸之玩不得已而從命所辟皆寒素有行之士玩翼亮累世常以𢎞重爲人主所貴加性通雅不以名位格物誘納後進謙若布衣由是縉紳之徒莫不廕其德宇又曰韋誕以能書畱補侍中魏氏寳器銘題皆誕書也又曰安平王孚初爲魏太子中庶子魏文帝初即位選侍中常侍等官太子左右舊人頗風主者便欲就用不調餘人孚曰雖堯舜必有稷契今嗣王新立當進用海内英賢猶患不得如何欲因際㑹自相薦舉邪官失其任得者亦不足貴遂更他選又曰王戎爲侍中南郡太守劉肇賂戎筒中細布五十端爲司𨽻所糾以知而未納故得不坐然議者尤之帝謂朝臣曰戎之爲行豈懷私苟得正當不欲爲異耳帝雖以是言釋之然爲清慎者所鄙又曰褚翼字謀遠爲侍中蘇峻作亂王師敗績火及宫室翼手抱天子豋太極峻兵入叱翼令下翼不動曰蘇冠軍未覲至尊軍人豈得逼斥宫禁於是兵士不敢上太極峻執政猶以爲侍中宋書曰陸仲元者晉太尉玩曾}
