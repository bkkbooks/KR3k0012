  - {type: variant, offset: 90, length: 2, content: 京兆, krp: 僕射下尚書上漢雜事曰金敞爲元帝侍中帝崩故事近臣皆隨陵爲園敞丗名忠孝太后使侍成帝魏志曰盧毓爲侍中先是散騎常侍劉劭受詔定律未就毓上論曰古今制律之意以爲法冝一正不冝有兩端使姧吏得容情及侍中髙堂隆數以宫室事切諫帝不恱毓曰君明臣直古之聖王恐不聞其過故有敢諫之鼓近臣盡規此乃臣等所以不及隆隆諸生名爲狂直陛下冝容之毓在職三年多所駮易又曰劉曄字子陽爲侍中在朝略不交接時}
  - {type: variant, offset: 93, length: 0, content: '', SBCK: 或問其故曄荅曰魏室即祚尚新智者知命俗或未咸僕在漢爲支葉於魏備膓心寡偶少徒於冝末失也又曰王粲字仲宣山陽髙平人拜侍中􅀶物強識問無不對時舊儀㢮廢方興造制度粲􅁪典之又曰􅂫則拜侍中與董昭同寮甞枕則膝卧則推之曰􅂫則之􅂰非佞人之枕也又曰辛毗遷侍中于時帝欲徙兾州户十萬貫于河南毗曰陛下不以臣不肖置之左右安得不與臣議帝不荅起入内毗隨而引其􅅂帝遂奮衣不還又曰􅂫則與􅁻茂同隱於太白山後則爲侍中侍中舊親省起居故俗謂之執虎子茂見則嘲曰仕進不止執虎子則􅀏曰誠不能效汝蹇蹇鹿車驅也蜀志曰宗預字德艷南陽人也預將命使呉孫權問預曰東之作與西譬猶一家而聞西更増白帝之守何也預對曰臣以爲東益巴丘之戍西増白帝之守皆事勢冝然俱不足以相問也權大􅀏嘉其抗藎甚愛待之見敬亞於鄧芝費禕遷爲侍中又曰􅀜興字安國少}
  - {type: page-break, offset: 93, content: '', id: KR3k0012_SBCK_219-5a}
  - {type: variant, offset: 93, length: 0, content: '', krp: 或問其故曄荅曰魏室即祚尚新智者知命俗或未咸僕在漢爲支葉於魏備膓心寡偶少徒於冝末失也又曰王粲字仲宣山陽髙平人拜侍中博物強識問無不對時舊儀㢮廢方興造制度粲恒典之又曰蘇則拜侍中與董昭同寮甞枕則膝卧則推之曰蘇則之膝非佞人之枕也又曰辛毗遷侍中于時帝欲徙兾州户十萬貫于河南毗曰陛下不以臣不肖置之左右安得不與臣議帝不荅起入内毗隨而引其𥚑帝遂奮衣不還又曰蘇則與吉茂同隱於太白山後則爲侍中侍中舊親省起居故俗謂之執虎子茂見則嘲曰仕進不止執虎子則笑曰誠不能效汝蹇蹇鹿車驅也蜀志曰宗預字德艷南陽人也預將命使呉孫權問預曰東之作與西譬猶一家而聞西更増白帝之守何也預對曰臣以爲東益巴丘之戍西増白帝之守皆事勢冝然俱不足以相問也權大笑嘉其抗藎甚愛待之見敬亞於鄧芝費禕遷爲侍中又曰關興字安國少}
  - {type: variant, offset: 94, length: 3, content: 姑鞭婦, SBCK: 令問丞相諸葛亮深噐異之弱冠爲侍中又曰董扶字茂安靈帝徴扶即拜侍中在朝稱爲儒宗甚見噐用又曰馬良字季常襄陽冝城人也先主稱尊號以良爲侍中及東征呉遣良入武陵招納五谿蠻夷蠻夷渠帥皆受印號咸如意指晉書曰王濟字武子累遷侍中與侍中孔恂楊濟同列爲一時秀彦武帝常㑹公卿藩牧於式乾殿頋濟恂而謂諸公曰朕左右可謂恂恂濟濟矣又曰沈演之爲侍中衛將軍文帝謂之曰侍中領衛俱爲優重此蓋宰相便座卿其勉之又曰陸玩遷侍中玩雖登公輔謙不辟􅁺屬成帝聞而勸之玩不得已而從命所辟皆寒素有行之士玩翼亮累丗常以􅀪重爲人主所貴加性通雅不以名位格物誘納後進謙􅀂布衣由是搢紳之徒莫不􅄻其德宇又曰韋誕以能書留􅀘侍中魏氏寳噐銘題皆誕書也又曰安平王孚􅀄爲魏太子中庶子魏文帝􅀄即位選侍中常侍等官太子左右舊人頗諷主者便欲就用不調餘人孚曰雖堯舜必有稷契今嗣王新立當進用海内英賢猶患不得如何欲因際㑹自相薦舉邪官失其任得者亦不足貴遂更他選又曰王戎爲侍中南郡太守劉肇賂戎筒中細布五十端爲司􅀠所糺以知而未納故得不坐然議者尤之帝謂朝臣曰戎之爲行豈懷私苟得正當不欲爲異耳帝雖以是言釋之然爲清愼者所鄙又曰禇翼字謀逺爲侍中􅂫峻作亂王師敗績火及宫室翼手抱天子登太極殿峻兵入叱翼令下翼不動曰􅂫冠軍未覲至尊軍人豈得逼斥宫禁於是兵士不敢上太極峻執政猶以爲侍中宋書曰陸仲元者晉太尉玩曾孫也爲侍中自呉郡太守玩至仲元四丗爲侍中時人方之金張二族又曰劉湛爲侍中時王華王曇首殷景仁亦爲侍中文帝於六合殿與四人宴飲甚恱華等出帝目送良乆歎曰此四賢一時之秀同管喉舌恐後丗難繼又曰殷景仁遷侍中與王華王曇首劉湛四人並時爲侍中俱居門下皆以風力局幹冠冕一時同列之美近代莫及又曰王僧綽遷侍中任以機密時年二十九始興王濬甞問其年僧綽自謙早逹逡廵良乆乃荅其謙虚自退􅀂此又曰謝莊爲侍中領前將軍時孝武出行夜還勑開門莊居守以棨信或虚湏墨詔乃開上後因酒宴從容曰卿欲效郅君章邪對曰臣聞蒐廵有度郊祀有節盤于遊田著之前誡陛下今蒙犯塵露晨徃宵還容}
