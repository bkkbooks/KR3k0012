  - {type: variant, offset: 1519, length: 1, content: 知, SBCK: 㑹朝中見諸侍中皆諸家年少無一􅀫儒可顧問者乃進楊厚黃瓊三輔故事曰金日磾字翁叔封秺侯有忠勤之節七葉侍中又士傳曰張衡拜侍中􅁪居帷幄從容諷議拾遺左右竹林七賢傳曰山濤太始七年爲侍中詔書曰濤清風淳履思心通逺冝侍帷幄盡規左右顔含別傳曰顔髦字君道儀狀嚴整風貌端美大司馬桓公歎曰顔侍中廊廟之望喉舌機要魏明帝先賢傳曰盧植字子幹拜侍中逆臣董卓議欲廢帝羣僚之士唯卓是順獨植正色卓遂大怒欲害植議郎彭伯羣與卓親入爲卓議曰夫善人者天下之紀盧侍中海内大儒天下之望今先害之則天下怖卓遂止孔叢子曰孔臧與子琳書侍中安國特見崇禮不供䙝事獨得掌御唾壷朝廷之士莫不榮之此親汝所見環濟要略曰侍中古官也或曰風后爲黄帝侍中周時號常伯常者言}
  - {type: page-break, offset: 1519, content: '', id: KR3k0012_SBCK_219-9a}
  - {type: variant, offset: 1519, length: 1, content: 知, WYG: 會朝中見諸侍中皆諸家年少無一宿儒可顧問者乃進楊厚黄瓊三輔故事曰金日磾字翁叔封秺侯有忠勤之節七葉侍中文士傳曰張衡拜侍中恒居帷幄從容風議拾遺左右竹林七賢傳曰山濤大始七年爲侍中詔書曰濤清風淳履思心通遠宜侍帷幄盡規左右顔含别傳曰顔髦字君道儀状嚴整風貌端美大司馬桓公歎曰顔侍中廊廟之望喉舌機要魏明帝先賢傳曰盧植字子幹拜侍中逆臣董卓議欲廢帝群僚之士唯卓是順獨植正色卓遂大怒欲害植議郎彭伯群與卓親入爲卓議曰夫善人者天下之紀盧侍中海内大儒天下之望今先害之則天下怖卓遂止孔叢子曰孔臧與子琳書侍中安國特見崇禮不供褻事獨得掌御唾壺朝廷之士莫不榮之此親汝所見環濟要略曰侍中古官也或曰風后爲黄帝侍中周時號常伯常者言}
