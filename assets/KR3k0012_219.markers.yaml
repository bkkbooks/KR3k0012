  - {type: variant, offset: 319, length: 42, content: 巳前二百四十四年制勑可行用者二千八百六十五條分為六百四十六門議其輕重別成一家法書號大, krp: 甞失火禁}
  - {type: variant, offset: 323, length: 1, content: 四, WYG: 餘事悉有篇章朝廷有疑事密詔問焉又曰周舉字宣光時詔遣八使廵行風俗皆選有威名者乃拜舉侍中與杜喬周翊馮羨欒巴張綱郭遵太尉長史劉班分行天下使同日而拜號曰八俊應劭漢官儀曰侍中廼存年耆口臭上出雞舌使含之雞舌香頗小辛螫不敢咀咽自嫌有過得賜毒藥歸舎辭訣欲就便宜家人哀泣不知其故頼僚友諸賢問其得失求視其藥及口香共笑之更爲吞食其意遂解存鄙儒蔽於此耳漢官曰侍中殿下稱制出則叅乗佩璽抱劔又曰史丹爲侍中元帝寢疾丹以親密近臣得視疾候上間獨寢時丹直入卧内頓首伏青蒲上應邵曰以青規地曰青蒲漢官儀曰侍中秩千石黄門有畫室署玉堂署各有長一人漢舊儀曰侍中無員或列侯將軍衞尉光禄大夫爲之得舉非法又曰侍中左右近臣見皇后如見帝見媫妤行則對壁坐則伏茵漢書典職曰侍中常伯選舊儒高德博學洞達仰瞻俯視切問近對喻指公卿員八人在尚書僕射下尚書上漢雜事曰金敞爲元帝侍中帝崩故事近臣皆隨陵爲園敞世名忠孝太后使侍成帝魏志曰盧毓爲侍中先是散騎常侍劉劭受詔定律未就毓上論曰古今制律之意以爲法宜一正不宜有兩端使奸吏得容情及侍中高堂隆數以宫室事切諫帝不悦毓曰君明臣直古之聖王恐不聞其過故有敢諫之鼓近臣盡規此乃臣等所以不及隆隆諸生名爲狂直陛下宜容之毓在職三年多所駮易又曰劉􅁮字子陽爲侍中在朝畧不交接時人或問其故􅁮荅曰魏室即祚尚新智者知命俗或未成僕在漢爲支葉於魏備腹心寡偶少徒於宜未失也又曰王粲字仲宣山陽高平人拜侍中博物强識問無不對時舊儀弛廢方興造制度粲恒典之又曰蘇則拜侍中與董昭同寮嘗枕則膝卧則推之曰蘇則之膝非佞人之枕也又曰辛毗遷侍中於時帝欲徙兾州戸}
