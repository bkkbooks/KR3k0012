  - {type: variant, offset: 766, length: 5, content: 徐孝克為都, WYG: 謝朏音斐爲侍中及齊受禪胐當日在直百僚陪位侍中當解璽胐佯不知曰有何公事傳詔云解璽授齊王朏曰齊自應有侍中乃引枕卧傳詔懼乃使稱疾欲取兼人朏曰我無疾何所道遂朝服歩岀東掖門乃得車仍還宅是日遂以王儉爲侍中解璽旣而武帝請誅朏高帝曰殺之則成其名正應容之度外齊職儀曰魏侍中掌儐賛大駕出則次直侍中䕶駕正直侍中負璽陪乗不𢃄劔皆騎從御豋殿與散騎侍郎對挾帝侍中居左常侍居右備切問近對拾遺補闕也又曰東漢侍中便蕃左右與帝升降法駕岀多識者一人叅乗兼負傳國璽操斬蛇劔南史曰朱异居權要三十餘年善承上㫖故特被寵任歴}
