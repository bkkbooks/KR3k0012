  - {type: variant, offset: 645, length: 364, content: 高車山也桐柏山河圖括地象曰桐柏山為地穴上為維星荊州圖副曰桐柏山禹貢所謂導淮自桐柏者也其山則雲峰秀峙林惟椅柏潛潤吐霤伏流數里武當山山記曰武當山區域周廻四五百里中央有一峰名曰參嶺高二十餘里望之秀絕出於雲表清朗之日然後見峰一月之間不見四五輕霄蓋于上白雲帶其前旦必西行夕而東返常謂之朝山蓋以眾山朝揖之主也又南雍州記曰武當山有石門石室相承云尹喜所棲之地又陰君內傳云君字長生入武當山昇仙是也又郭仲產南雍州記曰武當山廣三四百里山高巃峻若博山香爐苕亭峻極干霄出霧學道者常百數相繼不絕若有於此山學者心有隆替輒為百獸所逐山海經曰祭水源伏流三百餘里漢武帝遣殿上將軍戴生之此山採仙藥遂得道不返甄異傳曰歷陽謝允字道通年十五為蘇峻賊軍王免所掠賣屬東陽蔣鳳家嘗行山中見虎檻中狗窮念狗餓以飯飴之人檻方見虎攀木仰看允謂虎曰此檻木為汝施而我幾死其中汝不殺我我放汝乃, SBCK: ''}
