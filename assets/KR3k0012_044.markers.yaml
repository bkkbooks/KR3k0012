  - {type: variant, offset: 2628, length: 2, content: 雞籠, SBCK: 盤龍也猿門山益州記云猿門山在涪縣之北二十五里上多猿其山二峯磔堅如門故曰猿門金山益州記曰金山在涪縣東五十歩東臨澗水光照映川又李膺記云金山長七八里每夏潦雨有崩處即金粟散出是也五婦山蜀記云梓橦縣有五婦山一名五婦臺秦王遺蜀王美女五人蜀王遣五丁迎女至梓橦五丁蹋地大呼驚五女並化爲石蜀王築臺登而望之}
