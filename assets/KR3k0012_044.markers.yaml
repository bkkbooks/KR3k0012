  - {type: variant, offset: 2615, length: 1, content: 登, WYG: 照其中龍橋處二山相去百餘歩其峯危竦相對橋在峯首其橋中半漸漸促小可六七寸長一丈五尺兩邊懸崖俯臨不測山傍有誓石天師張道陵與鬼兵為誓朱華盡山青崖中絶今驗斷處石並丹色濶二十丈深六七丈望之截然卭崍山山海經曰卭崍山江水出焉今在漢中嚴道縣中江所出有九折坂出獸似熊其陽多黄金其陰多麋其木多檀柘也華陽國志曰嚴道縣南有卭崍山山上凝氷夏結縈廽九折王陽去官之所牛頭山九州記云牛頭山昔日葛仙翁多遊於此今立為寺與白獸山相連者秦世有白獸為害夷人射之刻白石於此今遺像尚存董政山十道記曰董政山隋開皇中縣令董政封髙雅之士去官之後民咸思其徳因指山為董政山綏山列仙傳曰葛由者蜀之羗人周成王時刻木為羊賣之一旦乘木羊入蜀蜀中王侯賓之上綏山山在安國縣東三十里隨之人皆得仙術覆船山十道錄曰覆船山堯遭洪水維舟山下船因覆焉又益州記云覆船山中十五里有七里坂一名羊膓坂屈曲難昇靈臺山十道記曰靈臺山在縣北一名天柱山髙四百丈即漢張道陵昇真之所郡國志曰靈臺山天柱崖下有一桃樹髙五尺皮是桃心肉似栢張道陵與王良趙昇試法於此四百餘年桃迄今不朽小碑記之黄厥山郡國志曰黄厥山有鍾乳穴十九又西岸有自然石竇其下流水上有一懸石似磬擊之有聲可聽彭亡山十道記曰彭亡山後漢將軍岑彭征公孫述於}
