  - {type: variant, offset: 486, length: 158, content: 公德冠四海道嗣前哲令聞令望當與此山俱傳若湛輩乃當如公語耳後以州人思暮遂立羊公廟并碑於此山白馬塞山盛弘之荊州記曰孟達為新城太守登白馬塞山而歎曰劉封申耽據金城千里而不能守豈丈夫也為上渚吟方土今猶傳此聲韻憤激其哀思之音乎遊者云重山疊鄣事亦信然也高車山高士傳曰高車山上有四皓碑及祠皆漢惠帝所立也漢高后使張良詣南山迎四皓之處因, SBCK: 呉嶽别}
