  - {type: variant, offset: 482, length: 3, content: 潤甫對, SBCK: 郭璞}
  - {type: variant, offset: 482, length: 353, content: 潤甫對曰公德冠四海道嗣前哲令聞令望當與此山俱傳若湛輩乃當如公語耳後以州人思暮遂立羊公廟并碑於此山白馬塞山盛弘之荊州記曰孟達為新城太守登白馬塞山而歎曰劉封申耽據金城千里而不能守豈丈夫也為上渚吟方土今猶傳此聲韻憤激其哀思之音乎遊者云重山疊鄣事亦信然也高車山高士傳曰高車山上有四皓碑及祠皆漢惠帝所立也漢高后使張良詣南山迎四皓之處因名高車山也桐柏山河圖括地象曰桐柏山為地穴上為維星荊州圖副曰桐柏山禹貢所謂導淮自桐柏者也其山則雲峰秀峙林惟椅柏潛潤吐霤伏流數里武當山山記曰武當山區域周廻四五百里中央有一峰名曰參嶺高二十餘里望之秀絕出於雲表清朗之日然後見峰一月之間不見四五輕霄蓋于上白雲帶其前旦必西行夕而東返常謂之朝山蓋以眾山朝揖之主也又南雍州記曰武當山有石門石室相承云尹喜所棲之地又陰君內傳云君字長生入武當山昇仙是也又, WYG: ''}
