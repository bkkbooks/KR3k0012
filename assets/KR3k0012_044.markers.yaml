  - {type: variant, offset: 2591, length: 1, content: 籠, krp: 不别趙髙燒山雞飛去晨鳴山頭聲聞三十里或謂是玉雞録異傳云秦文公時雍南山有大梓樹文公伐之輙有大風雨樹生合不斷有一人病夜往山中聞有鬼語樹神秦若使人𬒳髪以朱絲繞伐樹汝得不憂否文公如其言伐樹樹斷中有一青牛岀走入澧水中復岀使騎擊之不勝騎墮地復上髪解牛乃畏之入水不出故置髦頭騎也五將山崔鴻十六國春秋云符堅爲慕容冲所逼長安城中有書曰帝出五將乆長得免是又謠曰堅入五將長得堅大信之率騎數百出五將宣告州郡期以孟冬救長安堅至五將山姚萇遣將軍呉忠圍堅衆奔散忠執堅以歸新平即此山也仇池山辛氏三秦記云仇池山上有百頃地平如砥其南北有山路東西絶壁百仞上有數萬家一人守道萬夫莫向山勢自然有樓櫓却敵之狀東西二門盤道可七里上有岡阜泉源史記謂秦得百二之固也西晉末爲氐陽茂捜所據於山上立宫室囷倉皆爲板屋乃氐之所理於此今謂之洛谷道是也秦州記曰仇池山本名仇維山形似覆壷上廣百頃下周數十里髙二十餘里壁立千仞自然樓櫓却敵分置均調竦起數丈有如人力也青城山福地記曰青城山髙三千六百丈周匝五千里有甘露芝草天池醴泉玉匱經云黃帝封爲五岳丈人乃岳瀆之上司眞仙之崇秩一月之内群岳再朝六時灑泉以代晷漏一名赤城一名青城都一名天谷山亦爲第五大洞寳仙九室之天對郡之西北在岷山之南群峯掩映㸦相連接靈仙所宅祥異則多益州記云崗蠻㠋連嶺千里上有仙都地理志云西徹之外江水所出天彭青城連峯不絶李膺記云入山七里至赤石城有羊馬臺三師壇上五里至瀑布水澗二百歩有二石梯有一石笋髙三丈過二石門絶崖數百丈下起常道觀髙峯下有氷六時灑落東北有二石室名龍宫可容百餘人從龍宫過石室至石梯名龍橋又有一石梯洞穴深淺莫知所極西北有石室宛然見存又有黃帝壇石法天地上圎下方闊一丈二尺有十二角觀東有石日月各闊五尺厚一尺二寸相對柱上烏兎煇鑠方圎磅礴可觀五岳真形圗云洞天所在之處其下别有日月分精以照其中龍橋處二山相去百餘歩其峯危竦相對橋在峯首其橋中半漸漸促小可六七寸長一丈五尺兩邊懸崖俯臨不測山傍有誓石天師張道陵與鬼兵爲誓朱筆畫山青崖中絶今驗斷處石並丹色闊二十丈深六七丈望之赩然卭崍山山海經曰崍山江水岀焉今在漢嚴道縣南中江所岀有九折坂出貘似熊其陽多黃金其隂多麋其木多檀柘也華陽國志曰嚴道縣縣有卭崍山山上凝氷夏結廻曲九折王陽去官之所岷山山海經曰岷山江水岀焉而東海注于大江其中多恠蛇有鳥焉其狀如鴞而赤身白首其名曰竊脂可以禦火石鏡山華陽國志曰疊州合川縣石鏡}
