  - {type: variant, offset: 2526, length: 0, content: '', SBCK: 鷄頭山崔鴻十六國春秋云石生不能守長安欲西上隴士卒散盡遂入鷄頭山爲追兵所害山在鄠縣東牛首山山海經曰牛首山澇水出焉而注于潏水是多飛魚狀似魽可療痔疾又云牛首山有􅀑草赤莖葉如葵莠如禾服之使人不憂藍田山後魏風土記云藍田山巓方二里仙聖遊集之所劉雄鳴學道於山下有祠甚嚴亦灞水之源此西又有尊盧氏陵次北又有媧氏谷則知此地是三皇舊居於是笄頭山史記云黃帝西至于崆峒笄頭山圖}
