  - {type: variant, offset: 2609, length: 5, content: 老母提雞籠, WYG: 石笋其髙三丈過二石門絶崖數百丈下起常道觀髙峯下有水不時灑落東北有二石室名龍宫可容百餘人從龍宫過石室至石梯名龍橋又有一石梯洞穴深淺莫知所極西北有石室宛然見存又有黄帝壇石法天地上圓下方濶一丈二尺有十二角觀東刻日月各濶五尺厚一尺二寸相對柱上烏兔煇鑠方圓磅礴可觀五岳真形圖云洞天所在之處其下别有日月分精}
