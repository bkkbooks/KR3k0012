  - {type: variant, offset: 2530, length: 2, content: 東面, krp: 在涇陽西禹貢涇水所岀淮南子云薄落山一名笄頭山注水經云大隴之山異名耳莊子謂廣成子學道於崆峒之山亦黃帝問道於廣成子盖在此山按今肅州又}
  - {type: variant, offset: 2531, length: 1, content: 面, WYG: 牛首山山海經曰牛首山澇水出焉而注于滳水魚多非魚狀以餌可療痔疾又曰牛首山}
  - {type: variant, offset: 2533, length: 11, content: 激水冬夏懸流狀如瀑布下, SBCK: 崆峒山未詳孰是今此見}
  - {type: variant, offset: 2533, length: 1, content: 激, WYG: 鬼草赤莖葉如葵秀如禾服之使人不憂五將山崔鴻十六國春秋曰苻堅為慕容冲所逼長安城中有書曰古苻傳賈録載帝出五將乆長得先是又謡曰堅入五將乆長得堅大信之率騎數百出如五將宣告州郡期孟冬救長安堅至五將山姚萇遣將軍吳忠圍堅衆奔散忠執堅以歸新平即此山也仇池山辛氏三秦記曰仇池山上有百頃地平如砥其南北有山路東西絶壁百仞上有數萬家一人守道萬夫莫向山勢自然有樓櫓却敵之狀東西二門盤道可七百里上有岡阜泉源史記謂秦得百二之固也西晋末為氐楊茂搜所據於山上立宫室囷倉皆為板屋乃氐之所理於此今謂之洛谷道是也秦州記曰仇池山本名仇羅山形似覆壺上廣百頃下周數十里髙二十餘里壁立千仞自然樓櫓却敵分置均調竦起數丈有如人力也賀蘭山涇陽圗經曰賀蘭山在縣西九十三里山上多有白草遥望青白如駁馬北人呼駁馬為賀蘭因名賀蘭山鮮卑等類多依山谷為氏族今賀蘭姓名皆因此山太白山辛氏三秦記曰太白山南有陳倉山山有石與山雞不别趙髙燒山雞飛去晨鳴山頭聲三十里或謂是玉雞錄異傳云秦文公時雍南山有大梓樹文公伐之輙有大風雨樹生合不斷有一人病夜往山中聞有鬼語樹神秦若使人被髮以朱絲繞伐樹汝得不憂否文公如其言伐樹樹中有一青牛出走入壇}
