  - {type: variant, offset: 2512, length: 6, content: 峙疊嶂重巒拒, WYG: 於此山驪山三輔故事曰始皇葬驪山起陵髙五十丈下錮三泉周廽七百歩以明珠為日月魚膏為脂燭金銀為鳬雁金蠶三十箱四門施徹奢侈太過六年之間為項籍所發放羊兒墜羊塚中燃火求羊燒其槨藏述征記曰長安東則驪山西則白鹿原北望}
