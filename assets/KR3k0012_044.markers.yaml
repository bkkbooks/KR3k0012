  - {type: variant, offset: 2510, length: 1, content: 峰, SBCK: 峯望之􅁪有落􅀔山下有石穴廣四尺髙七赤水溢石穴懸波傾注涌瀾奔盪發源成川北流注于汧是也驪山三輔故事曰始皇葬驪山起陵髙五十丈下錮三泉周廻七百歩以明珠爲日月魚膏爲脂燭金銀爲鳬鴈金􅅙三十箱四門施徼奢侈太過六年之間爲項籍所發放羊兒墮羊􅊘中燃火求羊燒其槨藏述征記曰長安東則驪山西則白鹿原北望雲陽悉見山阜之形而􅁪􅀂在雲霧之中孟康曰昔周幽王恱褒姒姒不􅀏王乃擊鼔舉烽以徴諸侯至而無冦褒姒乃􅀏王甚恱之及犬戎至王舉烽以徴諸侯不至王遂敗身死于驪山之北龍首山辛氏三秦記云龍首山長六十里頭入渭水尾連樊川頭髙二十丈尾漸下髙五六丈土赤不毛昔有黒龍從山出飲水其行道成土山今長安城即䟽山爲臺殿基址不假築其含元殿即龍首山之東麓髙敞爲京城之最階髙於平地三十餘尺南去丹鳯門四百餘歩中無間隔左右寛平東西廣百歩兩都賦云漢之西都寔曰長安左據凾谷二崤之岨右界褒斜龍首之險表以太華終南之山帶以洪河涇渭之川即此山之形勢也九嵕山四夷郡國縣道記曰九嵕山東連仲山西當涇水出焉九嵕髙六百五十丈周十五里在咸陽嶻嶭山四夷郡國縣道記曰嶻嶭山在雲陽縣東北十里一名慈峨山俗嵯峨山頂有雲起即雨里人以爲􅀱昔黃帝鑄}
  - {type: page-break, offset: 2510, content: '', id: KR3k0012_SBCK_044-2a}
  - {type: page-break, offset: 2510, content: '', id: KR3k0012_SBCK_044-2b}
  - {type: variant, offset: 2510, length: 1, content: 峰, WYG: 峯望之恒有落勢山下有石穴廣四尺髙七尺赤水溢石穴懸波傾注浦瀾奔盪發源成川北流注于汧是也銅梁山左太冲蜀都賦云外負銅梁岩渠張孟注云銅梁山名也按其山有桃枝竹西東亘二十餘里山嶺之上平整逺望諸山而此獨秀也山在州南九里髙梁山江原記云南浦郡髙梁山尾東跨江西首劒閣東西數千里嶺長峻其峯崔嵬於蜀市望之若長雲垂天一日行之乃極其頂俯視衆山泯若平原劒閣銘謂岩岩梁山積石峨峨即述此也九􅉄山四夷郡國縣道記曰九􅉄山東連仲仁西當涇水焉又九􅉄山髙六百六十丈周十五里在咸陽嶻嶭山四夷郡國縣道記曰嶻嶭山在雲陽縣東北十里一名慈峨山勢嵯峨山頂有雲起即雨故里人以為候昔黄帝鑄}
