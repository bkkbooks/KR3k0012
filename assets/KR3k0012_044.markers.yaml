  - {type: variant, offset: 11, length: 5, content: 水經曰白於, SBCK: 五將}
  - {type: variant, offset: 11, length: 341, content: 水經曰白於山今名女郎山上多松柏下多櫟檀其獸多㸲音昨牛羬羊鳥多白鴞洛水出于其陽東注于涇也又云洛水源出縣北白於山又曰漢水女郎山山上有女郎冢遠望山墳崔嵬狀高及即其所裁有墳形山上直路下出不生草木世人謂之女郎道下有女郎廟及擣衣石言張魯女也啇山盛弘之荊州記曰上洛有啇山班孟堅西都賦所謂啇洛緣其隅高士傳謂地肺即此也晉書曰董景道少好學千里追略不與人交通永平中知天下將亂隱啇洛山衣木皮葉食樹果彈琴歌嘯以自娛至劉曜時徵拜常辭以壽終玄扈山春秋合成圖曰黃帝遊玄扈上洛與大司馬容光左右輔周昌等百二十人臨之有鳳御圖以置帝前玄扈山在上洛縣北一百里望楚山襄陽記曰望楚山有三名一名馬鞍山一名災山宋元嘉中武陵王駿為刺史屢登之鄙其舊名望郢山因改為望楚山後遂龍飛是孝武望之處時人號為鳳嶺高處有三墱即劉弘山簡九日宴賞之所也石, WYG: 銅}
