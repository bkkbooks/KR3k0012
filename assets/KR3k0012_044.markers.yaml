  - {type: variant, offset: 2530, length: 2, content: 東面, SBCK: 在涇陽西禹貢涇水所岀淮南子云薄落山一名笄頭山注水經云大隴之山異名耳莊子謂廣成子學道於崆峒之山亦黃帝問道於廣成子盖在此山按今肅州又}
  - {type: variant, offset: 2530, length: 0, content: '', WYG: 在涇陽西禹貢涇水所出淮南子云薄浴山一名笄頭山水經注云大隴之山異名耳莊子謂廣成子學道於崆峒之山葢黄帝問道於廣成子亦在此山按今肅州又有崆峒之山未詳孰是今此見有栢堂在山頂上不知何代所置也後漢隗囂使王孟塞雞頭道謂此山也雞頭山崔鴻十六國春秋云石生不能守長安欲西上隴士卒散盡遂入雞頭山為追兵所害山在鄠縣}
