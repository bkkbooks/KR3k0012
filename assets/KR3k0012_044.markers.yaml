  - {type: variant, offset: 2622, length: 1, content: 今, WYG: 蜀王築臺登而望之因名為五婦臺焉靈山郡國志曰靈山者有神女於此搗衣因號搗衣山山南絶岩有方石明瑩謂之玉女搗練砧又有盤龍山以山形如盤龍也猿門山益州記曰猿門山在涪縣之北二十五里上多猿其山二峯磷竪如門故曰猿門閬山閬山圗經曰閬山四合於郡故曰閬中按名山志云閬山多仙聖遊集焉盤龍山李膺益州記云閬中盤龍山南有一石長四十丈髙五尺當中有户兩扇若人之掩閉古老以為玉女房玉女山梁州記云肥城東南有玉女山}
