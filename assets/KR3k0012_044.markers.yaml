  - {type: variant, offset: 2601, length: 4, content: 麻湖初陷, WYG: 西徹}
  - {type: variant, offset: 2606, length: 1, content: 時, WYG: 外江水所出天彭青城連峯不絶李膺記云入山七里至赤石城有羊馬臺三師壇上五里至瀑布水澗二百歩有二石梯}
