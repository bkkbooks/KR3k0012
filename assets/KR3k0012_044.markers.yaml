  - {type: variant, offset: 2119, length: 371, content: 子使使問孔子孔子曰丘聞之昔禹致群臣於會稽之山防風氏後至禹殺之其骨專車此為大也蓋丘明親丞聖旨錄為實證矣又案劉向說苑辯物王肅之敘孔子世孫孔龜所出先人書家語並出此事故塗山有會稽之名考校群書及方土之目疑非此矣蓋周穆之所會矣八公山水經注曰壽春縣八公山山無樹木唯重阜耳山上有淮南王劉安廟劉安是漢高帝之孫厲王長之長子也折節下士篤好儒學養方術之徒數千人多神仙祕法鴻寶之道忽有八公皆鬚眉皓素詣門希見門者曰吾王好長生今先生無住衰之術未敢聞八公咸變成童王甚敬之八士並能鍊金化丹從有入無乃與安登山埋金於地白日昇天餘藥在器雞犬舐之者俱得上昇其所昇之處踐石皆陷入焉故山即以八公為目蔡山懷寧圖經曰蔡山出大龜尚書云九江納錫大龜即謂蔡山也玉鏡山懷寧圖曰玉鏡山在縣北萬歲鄉界貞元二年從晥山東面忽然爆裂皎然如玉行路遠見如鏡懸焉其年刺史呂謂聞奏因山改萬歲為玉鏡鄉其山西隅連睆山東面睆, WYG: ''}
