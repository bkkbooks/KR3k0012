  - {type: variant, offset: 2519, length: 2, content: 概日, WYG: 陽悉見山阜之形而恒若在雲霧之中孟康曰昔周幽王悦褒姒姒不好笑王乃擊鼓舉烽以徵諸侯至而無寇褒姒乃笑王甚悦之及犬戎至王舉烽以徵諸侯不至王遂敗身死于驪山之北龍首山辛氏三秦記曰龍首山長六十里頭至渭水尾連樊川頭髙二十丈尾漸下髙五六丈土赤不毛昔有黑龍從山出飲水其行道成土山今長安城即疏山為臺殿基址不假築其含元殿即龍首山之東麓髙敞為京之最階髙於平地三十餘尺南去丹鳯門四百餘歩中無間隔左右寛平東西廣百歩兩都賦云漢之西都實曰長安左據函谷二崤之岨右界褒斜龍首之險表以太華終南之山帶以洪河涇渭之川即此之形勢也藍田山後魏風土記云藍田巓方二里仙聖遊集之所劉雄鳴學道於山下有祠甚嚴蓋㶚水源于此西又有尊盧氏陵次北有女媧氏谷則知此地是三皇舊居於是笄頭山史記云黄帝西至于崆峒}
