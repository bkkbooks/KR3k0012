  - {type: variant, offset: 1010, length: 1480, content: 檻出虎賊平之後允詣縣別良善烏程令張球不為申理桎梏栲楚允夢見人曰此中易入難出汝有慈心當救拯廻見一少年通身黃衣遙在柵外時進獄中與允言語獄吏知是異人由此不敢枉允蒙理還都西上武當山太尉庾公聞而愍之給其糧資隨到襄陽見道士說吾師戴先生孟盛子非世間人也勑若有西上欲見我者可將來得無是君允因隨去入武當山齋戒三日進見先生乃是昔日所夢人也問允復見黃童不因賜以神藥三丸服之便不飢渴無所思欲先生亦無常處時有祥雲紫氣陰其上或聞芳香之氣徹於山谷太狐山水經注曰大胡山在泚陽北如東三十餘里廣圓五六十里張衡賦曰所謂天封大胡者也胡一作抓南陽圖注曰山有大石如狐石魚山水經注曰石魚山本名立石山高八十餘丈廣十里石色黑而理若雲母開發一重輒有魚形鱗鰭首尾有若刻畫長數寸魚形備足燒之作魚膏腥因以名之苦菜山郡國志曰苦菜山即黃城山也自葉至泚陽南北相毗連旦百里亦曰長城山即長沮桀溺耦耕處下有東流水即子路問津之所尸子云楚狂接輿耕於方城即此山也春秋曰方城以為城是也大洪山水經注曰蔡陽縣東南大洪山山在隋郡之西南竟陵之東北盤基所跨廣圓一百餘里峰曰懸鉤處眾阜之中為諸嶺之秀山下有石門俠鄣層峻岩高皆數百許仞入石門又得鍾乳穴穴上素崖壁立非人跡所及穴中多鍾乳凝膏下垂望齊冰雪微津細液滴瀝不斷幽穴潛遠行者不窮其深而穴內常有風勢火無能以經久故也隕水出于其隕陰初流淺狹遠乃寬廣可以浮舟栰矣時人以隕水所導故亦謂之為隕山赤岸山南兗州記曰爪步山東五里江有赤岸山南臨江中羅君章云赤岸若朝霞即此類也濤水自海入江衝激六七百里至此岸側其勢始衰郭景純江賦云鼓洪濤於赤岸莫耶山壽春圖經曰莫耶山長老傳云古者於此山鑄莫耶劍因為山名史記賈誼吊屈原篇云莫耶為鈍兮鈆刀為銛銛汪云莫耶吳大夫姓也王僧虔吳郡地理志云吳人造劍二陽曰干將陰曰莫耶莫耶其妻名也又淮南記云濛水合流千金塘源出縣西莫耶山是也雲母山壽春圖經曰雲母山一名濠上山在州東南四十里按神仙傳云彭祖服食雲母時人共傳採於此山今或有道者採取不已濠塘山壽春圖經曰濠塘山在縣南六十里有濠水出焉古老所傳緣山泉灌濠成塘故以為名山穴多出鍾乳并有蝙蝠白艾色於穴中倒懸微帶紫色居人或有九月已後二月已前採取服之頗益壽九鬭山壽春圖經曰九鬥山一謂陰陵山江表傳云項羽敗烏江取此山過漢遣灌嬰兵追羽至此一日九戰因名九鬥山今石猶有磨刀礪鏃之跡塗山應劭漢地理志曰禹娶塗山塗山有禹墟太康地記曰塗山古當塗國夏禹所娶也山西南又有禹村蓋禹會諸侯於塗山在禹貢楊州之域今九江當塗縣有禹娶之地今邑界有當塗故城存焉即漢為縣後廢郡國志曰平阿縣有當塗山淮水出于荊山之左當塗之右奔流二山之間而楊濤北注也春秋左氏傳曰哀公七年諸大夫對孟孫曰禹合諸侯於塗山執玉帛者萬國杜預注曰塗山在壽春東北非也余案家語曰吳伐越至會稽獲骨焉其節專車吳子使使問孔子孔子曰丘聞之昔禹致群臣於會稽之山防風氏後至禹殺之其骨專車此為大也蓋丘明親丞聖旨錄為實證矣又案劉向說苑辯物王肅之敘孔子世孫孔龜所出先人書家語並出此事故塗山有會稽之名考校群書及方土之目疑非此矣蓋周穆之所會矣八公山水經注曰壽春縣八公山山無樹木唯重阜耳山上有淮南王劉安廟劉安是漢高帝之孫厲王長之長子也折節下士篤好儒學養方術之徒數千人多神仙祕法鴻寶之道忽有八公皆鬚眉皓素詣門希見門者曰吾王好長生今先生無住衰之術未敢聞八公咸變成童王甚敬之八士並能鍊金化丹從有入無乃與安登山埋金於地白日昇天餘藥在器雞犬舐之者俱得上昇其所昇之處踐石皆陷入焉故山即以八公為目蔡山懷寧圖經曰蔡山出大龜尚書云九江納錫大龜即謂蔡山也玉鏡山懷寧圖曰玉鏡山在縣北萬歲鄉界貞元二年從晥山東面忽然爆裂皎然如玉行路遠見如鏡懸焉其年刺史呂謂聞奏因山改萬歲為玉鏡鄉其山西隅連睆山東面睆, SBCK: ''}
