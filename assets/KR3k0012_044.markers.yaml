  - {type: variant, offset: 2618, length: 1, content: 因, WYG: 戰死故號曰彭亡山鼎鼻山十道記曰鼎鼻山周道衰微九鼎淪沒於此山之下其水清澄今民猶或見其鼎耳金山益州記曰金山在涪縣東五十歩東臨澗水光照映川又李膺記云金山長七八里毎夏潦雨有崩處即金粟散出是也五婦山蜀記云梓潼縣有五婦山一名五婦臺秦王遺蜀王美女五人蜀王遣五丁迎五女至梓潼五丁躍地大呼驚五女並}
