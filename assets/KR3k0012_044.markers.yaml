  - {type: variant, offset: 2597, length: 26, content: 淮南子云麻湖初陷之時有一老母提雞籠以登此山因化為石今, SBCK: 四十五里其}
  - {type: variant, offset: 2597, length: 1, content: 淮, WYG: 四十五里其山有石光瑩皎潔照之莫不備見形體故謂之石鏡山山下又有銅窟隋初於此置監鼔鑄錢刀焉青城山福地記曰青城山髙三千六百丈周匝五十里有甘露芝草天池醴泉玉匱經云黄帝封為五岳丈人乃岳瀆之上司真仙之崇秩一月之内羣岳再朝六時洒泉以代晷漏一名赤城一名青城都一名天谷山亦為第五洞天寶仙九室之天對郡之西北在岷山之}
