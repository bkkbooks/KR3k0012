  - {type: variant, offset: 2628, length: 3, content: 雞籠因, WYG: 箒祁山關山圗曰漢陽西南有祁山九州之名阻天下竒峻按蜀志云建興六年諸葛亮率師攻祁山不㧞即謂此也又按九州志云祁山上有髙樓武陟二神祠每嵗郡邑祀之青石山益州記云昔巴蜀争界久而不决漢髙帝八年一朝密霧石}
