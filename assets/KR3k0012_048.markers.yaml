  - {type: variant, offset: 3706, length: 2, content: 闌干, WYG: 金雞山臨貢水石色如霞其傍有穴廣四尺一石正當穴口如彈丸嘗有金雞出入此穴晉義熈中再三出見有人挾彈放丸於穴口化為石其雞至今不見因號曰金雞穴宋永初中又見栖翔於此峽}
