  - {type: variant, offset: 3806, length: 133, content: 類鷓鴣魏王泰坤元錄云武夷山瀾東一巖上有雞栖即此是也烏嶺山烏嶺山記曰烏嶺峻極不通牛馬以其烏居山連接因以為名魏王泰坤元錄云邵武北有庸嶺一名烏嶺北隰中有大虵為將樂令李誕女所殺者金泉山建安記曰金泉山南枕溪有細泉出沙彼人以夏中水小披沙掏之得金山之西有金泉祠演仙山建安記曰演仙山, SBCK: ''}
