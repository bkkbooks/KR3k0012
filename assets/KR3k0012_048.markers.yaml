  - {type: variant, offset: 2811, length: 235, content: 春草巖折竹巖巖間不生蔓草盡出龍鬚云赤松羽化處又有似龍鬚而麤大者名為虎鬚不中為席但以其蓑為燈炷又抱朴子云左元放言金華山可以合神丹免五兵洪水之患又按輿地志云金華山連亘三百餘里畢嶺輿地志曰東陽畢嶺之下有錢嶺往往人於嶺下獲大錢今俗謂之錢嶺銅山東陽記曰銅山下有泉水色鮮白號為銅泉又按異苑曰吳時有軍士五百人破洞得一銅釜將欲破之水從中暴發遂成湖以溺人皆死於此崑山東陽記曰崑山頂上有一孤石高可三十丈其形如甑人謂之石甑騎石山郡國志曰騎石山如人騎馬而無頭昔有神巫以印指馬馬頭即落則此山也江郎, SBCK: 侃迹存焉雞籠}
