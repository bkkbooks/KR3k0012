  - {type: variant, offset: 717, length: 438, content: 飛禽罕至嘗有採藥者沿山見涌蹊尋上於山頂樹下有十二方石地甚方潔還復更尋遂迷前路言諸仙之所集讌故以壇讌名山嶠北有嶀浦浦口有廟廟甚靈驗行人及樵伐者皆先敬焉若相盜竊必為蛇虎所傷北則嶀山與嵊山接二山雖曰異縣而峰嶺相連其間傾澗懹煙泉溪引霧吹陸風馨觸岫延賞是以王元琳謂之神明境事備謝康樂山居記宋書曰張稷子嵊字四山稷初為剡令至嵊亭生之因名嵊字四山塗山郡國志曰塗山禹會萬國之所有石舡長一丈云禹所乘者宋元嘉中有人於舡側掘得鐵履一雙又會稽記云東海聖姑從海中乘舟張石帆至二物見在廟中又有周時樂器名錞于銅為之形似鍾有頸映水用芒莖刜則鳴宋武修廟得古珪梁武初修之又得青玉印重山孔曄會稽記曰重山大夫種墓語訛成重漢江夏太守宋輔於山南立學教授今白樓亭處是也羅山孔曄會稽記曰諸暨縣北界有羅山越時西施鄭旦所居所在有方石是西施曬紗處今名紵羅山王羲之墓在山足有石碑孫興公為文王子敬所書也鶴山孔靈符會稽記曰射的山西南水中有鶴山此鶴常為仙人取箭曾刮壤尋索遂成此山漢太尉鄭弘少貧賤以採薪為業嘗於山中得一遺箭羽鏃異常心甚怪之頃之, SBCK: ''}
