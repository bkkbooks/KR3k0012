  - {type: variant, offset: 38, length: 3, content: 為弓弦, SBCK: 息諸仁智拪遊羽客故名静山驚磯山江夏圖經曰在縣東九十里其山無連接西南俯臨大江下有石磯波濤迅急啇旅驚駭故以爲名黃鶴山江夏圖經曰在縣東九里其山斷絶無連接舊傳云昔有仙人控黃鶴於山因以爲名故梁湘東王晉安寺碑云黃鶴從天之夜響是烽火山江夏圖經曰烽火山在縣東北四十里梁典云梁武征齊頓軍於此舉烽火相應故名烽火山}
