  - {type: variant, offset: 3191, length: 258, content: 一名石橋山一名空石山晉中朝時有王質者嘗入山伐木至石室有童子數四彈琴而歌質因放斧柯而聽之童子以一物與質狀如棗梅含之不復飢遂復小停亦謂俄頃童子語曰汝來已久何不速去質應聲而起柯已爛盡天階山建安記曰天階山在將樂縣南二十里山下有寶華洞即赤松子採藥之所洞中有石鷰石蝙蝠石室石柱并石臼石井俗云其井南通沙縣溪復有乳泉自上而滴人以服之登山頂者若昇碧霄故有天階之號大湖山建安記曰大湖山在浦城縣西南一百里一名聖湖山湖在山頂昔有採藥者止此湖畔見滿湖芙蓉涉水採之乃石也亦有禽鳥遠望如飛近視則石孤山建安記曰孤山在環璋之間其地坦平悉是溝塍阡陌以以, SBCK: 始皇死五女葬}
  - {type: variant, offset: 3191, length: 0, content: '', WYG: 宜春記曰郡有石室山山有數石室相通髙十餘丈皆相似素壁若雪萬象森羅因以為名黄唐山輿地志曰贛縣黄唐山有石室數千間屋上通天窗下有方榻者二十人巾櫛而坐傍有小石室七所相通悉有石人室前時有車馬跡春夏草不生無諸毒蟲林木繁茂水石幽絶蓋靈仙窟宅也山下居人每丙日輙聞山室有笳鼓簫樂之音鄧徳眀記云有石子如彈丸聚在山角至丙日不復見他日復有其山獨立髙}
