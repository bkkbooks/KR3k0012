  - {type: variant, offset: 3944, length: 1, content: 演, SBCK: 上有玉在石壁内南面遥望似有白處曽有胡人來取上山後遇風雨不果得今逺望頗似射侯故名射的焉石印山呉志曰天璽元年鄱陽郡言歷陵山石有文理成字巫言石印神有三郎皓遣使以大牢祭并印綬拜三郎爲王又按江}
  - {type: page-break, offset: 3944, content: '', id: KR3k0012_SBCK_048-6a}
  - {type: variant, offset: 3944, length: 1, content: 演, krp: 上有玉在石壁内南面遥望似有白處曽有胡人來取上山後遇風雨不果得今逺望頗似射侯故名射的焉石印山呉志曰天璽元年鄱陽郡言歷陵山石有文理成字巫言石印神有三郎皓遣使以大牢祭并印綬拜三郎爲王又按江}
  - {type: variant, offset: 3946, length: 2, content: 鍊丹, SBCK: 記云歷陵有石印山臨水髙百丈有七穿駢羅穿中色黄赤相續因謂之石印山龍虎山信州圖經曰龍虎山在貴谿縣二山相對谿流其間乃張天師得道之山羊山宋永􅀄山川記曰啇安縣西有羊山山有燃石黄白而理麄以水灌之便􅀬􅀂石炭以鼎置之烹煑可熟羅霄山王孚安成記曰萍郷羅霄山澤水所岀水傍岀石乳天旱吏人禱之因以大木長三四丈投井中即􅀨水懸湊井溢輙令木涌岀而雨止蓋潜龍之穴也以陽居隂神精上通故扣之而必有玄感則蜀都賦云應鳴鼓而興雨者也鍾山裴子野宋略曰永嘉元年鍾山因洪水有鍾從山流岀時人得之送上驗銘云是秦時樂器因以爲名又按成記云鍾山臨水阻峽春夏則湍洑涌沸濆上白沙如米兩岸石上各九十餘里以之􅀱歳􅀂一岸偏饒則其方豊穰民以爲準望鳯山冝春圖經曰望鳯山在州西北七十里上有一峯逺觀似鳯以此爲名昌山冝春圖經曰昌山在州東六十里舊名傷山周廻連延一十八里􅀽江流於其間巨石枕﨑潺激舟人上下多傾覆故名傷山顧野王輿地記云時人以傷爲非善徴乃改爲昌山石室山冝春記曰郡有石室山山有數石室相連髙十餘丈皆相似素壁􅀂雪萬像森羅於其所因以爲名黄唐山輿地志曰贑縣黃唐山有石室如數千間屋上通天䆫下有方榻者二石人巾櫛而坐傍有小石室七所相通悉有石人室前時有車馬跡春夏草不生無諸毒蟲林木繁茂水石幽絶盖靈仙窟宅也山下居毎丙日輙聞山室有茄鼓簫樂之音鄧德明記云有石子如彈丸聚在山角至丙日不復見他日復有其山獨立髙一千三百丈相傳以石室呼爲黄唐廟因以名焉儲潭山南康記曰儲潭山俯臨清潭有儲君廟因以名焉輿地志云咸和二年刺史朱偉所立常有漁者釣於此潭得金􅃈縈引舟中向數百丈忽一物隨瑣而來其形如水牛眼赤角白及見人驚駭拽走而漁者以刀断得數尺不知其所由然也赤石山南康記曰赤石山大石連聳粲􅀂舒霞山角多赤石有玉房瓊室耆舊相傳云宋元嘉年中有人自稱安道士者不知何許人披服巾􅄄栖}
