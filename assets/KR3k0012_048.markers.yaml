  - {type: variant, offset: 3962, length: 4, content: 面亦略通, SBCK: 其山乆晴不雨山或自鳴必有大雨乆雨不晴欲晴自有煙霧蓋其頭古老相傳祈請有驗鶴嶺山信州圖經曰鶴嶺山自貴溪縣界崗阜鱗次北入縣境嶺上多松樹有鶴窠因得名爲鶴嶺山石虹山鄱陽記曰石虹山有石室中有石砥平如床可容置數百}
