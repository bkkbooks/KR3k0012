  - {type: variant, offset: 568, length: 0, content: '', SBCK: 望夫石又記曰武昌郡奉新縣北山上有望夫石狀􅀂人立者今古慱云昔有貞婦其夫從役逺赴國難擕弱子餞送於此山旣而立望其夫乃化爲石因以爲名焉翠屏山輿地志曰江水入富池一百八十里得奉新上流三百里有城山三面壁立一面峻極水是奉新大源本名石城山天寳五載改爲翠屏山九宫山武昌記曰九宫山西北陸路去州五百八十里其山晉安王兄弟九人造九宫殿於此山遂以爲名角山武昌記曰天欲雨其山有聲如吹角以此爲名鍾臺山武昌記曰鍾臺山在縣東南一百里上有桃花洞洞側有李邕讀}
