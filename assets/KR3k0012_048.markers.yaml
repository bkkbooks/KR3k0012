  - {type: variant, offset: 3710, length: 1, content: 與, WYG: 康記曰峽山上時有夜光飛焰遥見若火炤燎于原從峽泝流數十里有石臨水名曰蛟窟天寶六載勅改名夜光山梓潭山南康記曰梓潭山有大梓樹吴王令都尉肅}
  - {type: page-break, offset: 3710, content: '', id: KR3k0012_WYG_048-15a, image: WYG0893/WYG0893-0417c.png}
  - {type: variant, offset: 3712, length: 1, content: 夷, WYG: 伐為龍舟槽斫成而牽挽不動占云湏童男女數十人為歌樂乃當得行遂依其言以童男女牽拽没於潭中男女皆溺焉其後天晴朗髣髴若見人船夜宿潭邊或聞歌唱之聲因號梓潭焉柴侯峽}
  - {type: variant, offset: 3714, length: 0, content: '', WYG: 南康記曰柴侯峽山漢靈帝時有劉叔喬避地於此死𦵏村側自云柴侯墓晉末喪亂有發其塜者忽有大風雨棺及松柏悉飛渡水移上此峰其棺乃化為石因是名焉官山南康記曰官山天寶六年改名珠玉其山髙峻出善鳥香草嘗有人於此山見大珠玉}
  - {type: page-break, offset: 3714, content: '', id: KR3k0012_WYG_048-15b, image: WYG0893/WYG0893-0417d.png}
  - {type: variant, offset: 3715, length: 0, content: '', WYG: 傳謂之官山君山南康記曰君山翠麗鮮眀遙若臺榭一名曰媧宫亦曰女姥山山去盤固山五十里上有玉臺方廣數十丈上有自然石室形風雨之後景氣眀静頗聞上有鼓吹之聲盤固山南康記曰盤固山有石井井側有大銅人常守之按此石井五百年水一湧起髙數丈銅人以手掩之其水即止其山盤紆峻嶒因號盤固山焉歸美山南康記曰歸美山髙數百丈逺望嵯峨靈闕騰空故老謂之神闕其山有水出焉四面嶮峻自然有石城髙數十丈週廻三百步又有石峽左右髙五六十丈勢若雙闕其状入雲復有古石室色如黄金號為金室有鸀鳥形色鮮潔自愛毛羽其隻者或鑒水悲鳴自絶方知孤鸞}
  - {type: page-break, offset: 3715, content: '', id: KR3k0012_WYG_048-16a, image: WYG0893/WYG0893-0418a.png}
  - {type: page-break, offset: 3715, content: '', id: KR3k0012_WYG_048-16b, image: WYG0893/WYG0893-0418b.png}
