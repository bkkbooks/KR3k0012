  - {type: variant, offset: 3298, length: 0, content: '', WYG: 有大石臨水號曰螺亭云昔有貧女採螺忽夜中見衆螺張口亂噉其肉貧女乃死其伴因殯水傍其冢化為巨石螺殻無數號曰螺亭石山上洛山輿地志曰虔州上洛山多木客乃鬼類也形似人語亦如人遥見分眀近則藏隠能斫杉枋聚于髙峻之上與人交市以木昜人刀斧交關者前置物枋}
