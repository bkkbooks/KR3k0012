  - {type: punctuation, offset: 3951, content: ，, id: KR3k0012_CHANT_048-bkkpn1069}
  - {type: 'tls:seg', offset: 3951, content: '', id: KR3k0012_CHANT_048-55a.6}
  - {type: variant, offset: 3951, length: 1, content: 竈, SBCK: 中數十年忽失所在其後有人時復見者天寳六年勑改爲玉房山螺亭石山南康記曰螺亭山有大石臨水號曰螺亭云昔有貧女暮宿於亭採螺忽夜中見衆螺張口亂噉其肉貧女乃死其伴因殯水傍其冢化爲巨石螺殻無數號曰螺亭石山上洛山輿地志曰䖍州上洛山多木客乃􅀑􅀋也􅄱似人語亦如人遥見分明近則藏隱能斫杉枋聚於髙峻}
  - {type: page-break, offset: 3951, content: '', id: KR3k0012_SBCK_048-8a}
  - {type: variant, offset: 3951, length: 1, content: 竈, WYG: 上故以為名又列仙傳云洪崖山者山}
  - {type: variant, offset: 3951, length: 1, content: 竈, krp: 中數十年忽失所在其後有人時復見者天寳六年勑改爲玉房山螺亭石山南康記曰螺亭山有大石臨水號曰螺亭云昔有貧女暮宿於亭採螺忽夜中見衆螺張口亂噉其肉貧女乃死其伴因殯水傍其冢化爲巨石螺殻無數號曰螺亭石山上洛山輿地志曰䖍州上洛山多木客乃鬼類也形似人語亦如人遥見分明近則藏隱能斫杉枋聚於髙峻}
  - {type: variant, offset: 3953, length: 6, content: 餘基近猶存焉, SBCK: 上與人交市以木易人刀斧交􅀜者前置物枋下却走避之木客㝷來取物下枋與人隨物多少甚信直而不欺有死者亦哭泣殯葬嘗有山行人遇其葬日岀酒食以設人山中有石墨可書空山南康圖經云空山晉咸康五年太守􅁃恪於山西麓中建立神廟歷代祈雨最有靈應按郡國志云空山在郡南山多林木果實食物一郡皆資}
  - {type: page-break, offset: 3953, content: '', id: KR3k0012_SBCK_048-8b}
  - {type: variant, offset: 3953, length: 6, content: 餘基近猶存焉, WYG: 陽有洪唐山寺中有洪崖壇每亢旱禱}
  - {type: variant, offset: 3953, length: 6, content: 餘基近猶存焉, krp: 上與人交市以木易人刀斧交關者前置物枋下却走避之木客㝷來取物下枋與人隨物多少甚信直而不欺有死者亦哭泣殯葬嘗有山行人遇其葬日岀酒食以設人山中有石墨可書空山南康圖經云空山晉咸康五年太守庾恪於山西麓中建立神廟歷代祈雨最有靈應按郡國志云空山在郡南山多林木果實食物一郡皆資}
  - {type: punctuation, offset: 3959, content: 。, id: KR3k0012_CHANT_048-bkkpn1070}
  - {type: 'tls:seg', offset: 3959, content: '', id: KR3k0012_CHANT_048-55a.7}
  - {type: variant, offset: 3960, length: 68, content: 山東面亦略通人逕山中出橘其味甘人有食者即可攜之出山即迷道又有演仙水出此山當郡城北為大河莫知其深淺兼下有暗竇入城流出於劍潭居人資之常流不絕, WYG: 太平御覽卷四十八}
  - {type: variant, offset: 3961, length: 0, content: '', SBCK: 雖名空山其出物百倍於他山金雞山南康記曰金雞山臨貢水石色如霞其傍有穴廣四尺一石正當穴口如彈丸嘗有金雞岀入此穴晋義熙中再三出見有人挾彈放丸於穴口化爲石其雞至今不見因號曰金雞穴宋永初中又見捿翔於此峽山南康記曰峽山上時有夜光飛熖遥見若火炤燎于原從峽泝流數十里有石臨水名曰蛟窟天寳六載勑改名夜光山梓潭山南康記曰梓潭山有大梓樹吴王令都尉蕭武伐爲龍舟槽斫成而牽引不動占云湏童男女數十人爲歌樂乃當得遂依其言以童男女牽拽糟没于潭中男女皆溺其後天晴朗浄髣髴􅀂見人舡焉夜􅀫潭邊或聞歌唱之聲因號梓潭焉柴侯峽南康記曰柴侯峽山漢靈帝時有劉叔喬避地於兹死葬村側自云柴侯墓晋末䘮亂有發其􅊘者忽有大風雨棺及松栢悉飛渡水移上此峯其棺乃化爲石因是而名之官山南康記曰官山者天寳六年改名珠玉山其山髙峻有善鳥香草嘗有人於此山見大珠玉相傳謂之官山君山南康記曰君山翠麗鮮明遥􅀂臺􆇍名曰媧宫亦曰女姥石山去盤固山五十里上有玉臺方廣數十丈上有自然石室􅄱風雨之後景氣明静頗聞山有鼓吹之聲盤固山南康記曰盤固山有石井井側有大銅人常守之按此石井五百年水一湧起髙數丈銅人以手掩之其水即止其山盤紆峻嶒因號爲盤固山焉歸美山南康記曰歸美山髙數百丈逺望嵯峨靈闕騰空故老謂之神闕其山有水岀焉西面嶮峻自然有石城髙數十丈周廽三百歩又有石峽左右髙五六十丈勢􅀂􅀟闕其狀入雲復有古石室色如黃金號爲金室有鸀鳥形色鮮絜自愛毛羽其􅃗者或鑒水向影悲鳴自絶方知􅀌鸞對鏡爲不虛矣山頂有杉枋數百片髙危懸絶非人力所及焉莫巨山荀伯子臨川記曰巖内有石人坐盤石上體有塵穢則興風雨洗訖晴日遍體絜朗如玉瑩浄民以爲準焉五章山荀伯子臨川記曰五章山絶巖嶮峭有宻蜂依之爲房其形如笠採者皆懸磴數十丈然後獲之麻山荀伯子臨川記曰麻山或有登之者望廬岳彭蠡皆在其下有黃連厚朴􅁪生焉又有楓樹及數千年者如人形眼􅈹口全而無臂脚入山往往見之或斫之者皆岀血人以籃冠其頭明日看輙失籃俗名楓子􅀑其山竹木稠宻如麻因名麻山天寳六年職方奏改名豊材山焉鄧公山信州圖經曰鄧公山在縣北本名銀山因鄧逺爲鄧公場儀鳯二年􅀕山山頽䧟焉按開山記云揔章二年邑人鄧逺經刺史豆盧公陳開山之便㝷爲山䧟後人立鄧公廟焉明府山信州圖經曰明府山在縣}
