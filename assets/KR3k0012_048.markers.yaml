  - {type: variant, offset: 3196, length: 0, content: '', WYG: 南康記曰儲潭山俯臨清潭有儲君廟因以名焉輿地志云咸和二年刺史朱偉所立常有漁者釣於此潭得金鎻索引舟中長數百丈忽}
