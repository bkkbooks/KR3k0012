  - {type: variant, offset: 3716, length: 1, content: 半, WYG: 鏡為不虛矣山頂有木枋數百片髙危非人力所及莫巨山荀伯子臨川記曰}
  - {type: variant, offset: 3718, length: 0, content: '', WYG: 内有石人坐石盤上體有塵埃則興風雨洗訖晴日遍體潔朗如玉瑩浄民以為凖焉五章山荀伯子臨川記曰五章山絶岩嶮峭有蜜蜂依之為房其形如笠採者皆懸磴數十丈然後獲之麻山荀伯子臨川記曰麻山或登之者望廬岳彭蠡皆在其下有黄連厚朴恒生焉又有楓樹及數千年者如人形眼鼻口全而無臂脚入山往往見之或斫之者皆出血人以籃冠其頭眀日輙失籃俗名楓子鬼其山竹木稠宻如麻因名麻山天寶六年職方奏改為豐材山焉鄧公山信州圖經曰鄧公山在縣北本名銀山因鄧公為鄧公塲儀鳳二年邑人祭山山頹䧟焉按開山記云總章二年邑人鄧逺經刺史豆盧公陳開山之便㝷為山䧟後人立鄧公廟焉眀府山信州圖經曰眀府山在縣東其山久晴不雨山或自鳴必有大雨久雨不晴欲晴必有烟霧蓋其頭故老相傳祈請有驗鶴嶺山信州圖經曰鶴嶺山自貴溪縣界崗阜鱗次北入縣境嶺上多松樹有鶴窠因名鶴嶺山石虹山鄱陽記曰石虹山}
