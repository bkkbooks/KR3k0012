  - {type: variant, offset: 1693, length: 1042, content: 名山略記曰小白山在會稽陽城趙廣信以魏末入小白山受李氏服氣法又師左元放受守中之道後鍊九華丹丹成服之太一遣迎今在東華宮為真人縉雲山郡國志曰括州即處州也括蒼縣縉雲山黃帝遊仙之處有孤石特起高二百丈峰數十或如羊角或似蓮花謂之三天子都有龍鬚草云群臣攀龍髯所墜者桃都山郡國志曰台州桃都山上有大桃樹上有天雞日初出桃樹天雞即鳴雞下聞之而鳴樹下有兩鬼持葦索取不祥之鬼食之椒山郡國志曰越州椒山吳王遣木客入山求大木不得工人憂思作木客吟一旦神木自生合抱長二十丈伐造姑蘇臺覆釜山郡國志曰台州覆釜山云夏帝登此得龍符處有巨跡云是夸父逐日之所踐石簣山賀循記曰石簣山其形似簣在宛委山上吳越春秋云九山東南曰天柱山號宛委承以文玉覆以盤石其書金簡青玉為字編以白銀禹乃東巡登衡山殺四馬以祭之見赤繡文衣男子自稱玄夷倉水使者謂禹曰欲得我簡書知導水之方者齋於黃帝之岳禹乃齋登石簣山果得其文乃知四瀆之眼百川之理鑿龍門通伊闕遂周行天下使伯益記之名為山海經開山圖曰禹開宛委山得赤珪如日碧珪如月長一尺二寸也括蒼山五岳圖序曰括蒼山東岳之佐命登真隱訣注及吳錄云括蒼山登之俯視雷雨也天姥山郡國志曰天姥山與括蒼山相連石壁上有刊字科斗形高不可識春月樵者聞簫鼓笳吹之聲聒耳元嘉中遣名畫寫狀於圓扇即此山也消山郡國志曰消山下有夫人祠山北湖陰又有消御史廟孤石聳出似婦人艷粧而坐白鶴山郡國志曰白鶴山者昔有白鶴飛入會稽雷門鼓中擊之聲震洛陽臨海記曰郡西有白鶴山山上有池泉水懸溜遠望如倒掛白鶴因名掛鶴泉又郡國志云漢末有徐公於白鶴山成道控鶴騰虛而去又有鶴掛嶺猶有翱翔之勢仙石山臨海記曰仙石山有館土人謂之黃公客堂兩邊有石步廊觸石雲起崇朝必兩有四竿䈥竹風吹自垂空微拂石皆淨即王方平遊處也石新婦山臨海記曰新婦山亦名似人山土石悉紺色列石參羗似人形遠望如鳥之俯仰宋文帝遣畫工模寫山狀時一國盛圖於白圃扇焉靈石山臨海記曰靈石山者山有寺當孫恩作叛毀材木以為舩舸山石即於空中自然而落賊每有所傷故曰靈山石臨海山臨海記曰臨海山山有二水合成溪曰臨海一水是始豊溪一水是東女溪至州北兩溪相合即名臨海溪山因溪名崛門山郡國志曰崛門山在海中腹有孔上達于頂有聲即大風不風即水涌出必見大兵吳將平孔內有聲遠聞千里石公山東陽記曰石公山孤石望如石人坐其傍又有石如人狀似新婦著花履焉或名新婦巖石城山吳錄曰永康有石城山海內南經云三天子都在閩西海北郭璞注云在新安歙縣東又引張氏土地記云東陽永康縣南四里有石城山上有小石城云黃帝曾遊此山即三天子都也金勝山郡國志曰金勝山昔有人於此拾得金勝因以名之山有趙炳祠炳善方術廟至今無蚊虫, SBCK: ''}
