  - {type: variant, offset: 3474, length: 204, content: 珍木靈草昔為淹之勝境泉山泉山記曰山頂有泉分為兩派一入處州一入建溪即漢書朱買臣所謂東越王居保泉山一人守險千人不得上即此山也梨嶺泉山記曰梨嶺因梨以名之記云南嶺下道東有鍾離古亭跡存焉武夷山蕭子開建安記曰武夷山高五百仞巖石悉紅紫二色望之若朝霞有石壁峭拔數百仞於煙嵐之中其石間有木碓礱簸箕籮箸什器等物靡不有之顧野王謂之地仙之宅半巖有懸棺數千傳云昔有神人武夷君居此故因名之又坤元錄云建陽縣上百餘里有仙人葬山亦神仙所居之地, SBCK: ''}
