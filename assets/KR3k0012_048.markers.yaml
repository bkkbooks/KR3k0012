  - {type: variant, offset: 3188, length: 2, content: 石室, SBCK: 江州五女}
  - {type: variant, offset: 3188, length: 0, content: '', WYG: 江州五女山始皇死五女𦵏此山天昏毎聞筝笛之聲射的山郡國志曰射的山者故老相傳云上有玉在石壁内遥望似有白處曽有胡人來取上山後遇風雨不果得今逺望頗似射侯故名射的焉石印山吳志曰天璽元年鄱陽郡言厯陵山石有文理成字巫言石印神有三郎皓遣使以太牢祭并印綬拜三郎為王又按江氏記云厯陵有石印山臨水高百丈有七穿騈羅穿中色黄赤相續因謂之石印山龍虎山信州圗經曰龍虎山在貴溪縣二山相對溪流其間乃張天師得道之山羊山宋永初山川記曰商安縣西有羊山山有燃石黄色而理麄以水灌之便熱若石灰以鼎置之烹煮可熟羅霄山王孚安成記曰萍鄉羅霄山澤水所出傍出石乳天旱吏人禱之因以大木長三四丈投井中即雨水懸輳井溢輙令木涌出而雨止蓋潛龍之穴也以陽居隂神精上通故叩之而必有所感則蜀都賦所云應鳴鼔而興雨者也鐘山裴子野宋略曰永嘉元年鐘山因洪水有鐘從山流出時人得之送上驗銘云是秦時樂器因以為名又安成記曰鐘山臨水阻峽春夏則湍洑涌沸湧上白沙如米兩㟁石山各有九十餘里以之候嵗若一㟁偏饒則其方豐稔民以為凖望鳳山宜春圗經曰望鳳山在州西北七十里上有一峰逺觀似鳳因以為名昌山宜春圗經曰昌山在州東六十里舊名傷山週廻連延一百八十里袁江流于其間巨石枕﨑潺激舟人上下多傾覆故名傷山顧野王輿地記云時人以傷為非善徴乃改為昌山}
