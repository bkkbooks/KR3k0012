  - {type: variant, offset: 17, length: 1, content: 明, SBCK: 雲陽縣界多漢離宫故地有似槐而葉細士人謂之玉樹楊子雲甘泉賦云玉樹青䓗後左思以雄爲假稱珎怪也踈麻南越志曰踈麻大二圍髙數丈四時結實無衰落騷人所謂折踈麻兮瑶華樠音謾山海經曰樠樹生蜀中七八月吐穗成有塩梅粉可以酢羮瑯玕山海經曰崑崙山有瑯玕樹盧頭南越志曰南海江岸間有盧頭木葉如甘蔗織以爲帆以其踈暢懷風故㠶不以布櫰山海經曰中曲山有櫰音瓌木如棠而圎葉赤實如木􅀲食之多力桬棠山海經曰桬棠木岀崑崙山黄色赤實味如李食之使不溺䡤音諸山海經曰前山其木多䡤似柞子可食冬夏􅁪青作柱難腐}
  - {type: page-break, offset: 17, content: '', id: KR3k0012_SBCK_961-5a}
  - {type: page-break, offset: 17, content: '', id: KR3k0012_SBCK_961-5b}
  - {type: variant, offset: 17, length: 1, content: 明, WYG: 雲陽縣界多漢宫故地有似槐而葉細士人謂之玉樹楊子雲甘泉賦云玉樹青葱後左思以雄為假稱珍怪也踈麻南越志曰踈麻大二圍高數丈四時結實落無瓤騷人所謂折踈麻兮瑶華樠山海經曰樠樹生蜀中七八月吐穗成有鹽梅粉可以酢􅅅榔玕山海經曰崑崙山有瑯玕樹蘆頭南越志曰南海江岸間有蘆頭木葉如甘蔗織以為帆以其踈暢懐風吹帆不似布櫰山海經曰中曲山有櫰音環木如棠而圓葉赤實如木𤓰食之多力桬棠山海經曰桬棠木出崑崙山華黄赤實味如李而無核食之使人不溺􅀢山海經曰前山其木多􅀢似柞子可食冬夏恒青作柱難腐}
