  - {type: variant, offset: 600, length: 308, content: 楊州有茱萸樹風土記曰茱萸椒也九月九日成熟色赤可棌世俗亦以比日折茱萸費長房云以插頭髻云辟惡異苑曰庾紹為東郡令宗協與紹中表旦服茱萸酒忽見紹來仍求酒執酒杯還置云茱萸氣協云惡之耶紹云上官皆畏況我乎雜五行書曰舍東種楊茱萸各三株增年益壽除患害蜀都賦曰其圃則有蒟蒻茱萸曹植樂府歌曰茱萸自用芳不若桂與蘭穀毛詩鶴鳴曰樂彼之園爰有樹檀其下維穀穀惡木也詩義䟽曰幽州謂之穀桑或曰楮桑荊楊交廣謂之穀今江南績其皮以為布又搗以為紙長數丈潔白光澤甚好葉初生可以為茹說文曰穀楮也裴淵廣州記曰蠻夷取穀皮熟搥為楬褁髻布鋪以擬氈錢塘記曰靈隱山四布似蓮花中央生穀樹甚高大韓子曰宋人有為其君以象為楮葉者三年而成亂之楮葉中而不可別也吳氏本草曰穀木皮治喉閉痺一名楮, SBCK: ''}
