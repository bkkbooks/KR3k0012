  - {type: variant, offset: 11, length: 4, content: 皂莢也宋, WYG: 赤如糯粟可食杭梁異物志曰有木洪直厥名杭梁乙木徐𠂻南方記曰乙樹葉𢷬之和繻葉汁煮之再沸味辛曝乾可投魚􅅅中求郍衛羅浮山記曰求郍衛外國樹英華粉紅至可愛翫男青羅浮山記曰男青條蘂之属莫不朱色尤易植立折挿土中因便開榮㝷木山海經曰㝷木長十丈生河邉玉樹山海經曰開明北有文樹五彩括地圖曰崑崙墟北有玉樹世説曰謝安嘗謂子姪曰汝等何豫人事諸子莫言𤣥答曰譬如芝蘭玉樹欲生庭堦耳唐}
