  - {type: variant, offset: 19, length: 2, content: 憎婦, SBCK: 屋山海經曰講山有木名帝屋葉如椒反陽赤實反陽刺不勾也可以禦凶六駮陸機毛詩䟽義曰六駮馬梓其樹皮青白駮犖遥視似馬故謂之駮馬下章云山有苞棣隰有樹檖皆山隰木相配不冝謂獸崔豹古今注曰六駮山中有木葉似豫章皮多癬駮名六駮木􅃮淮南子曰䖟散積血斵木愈齲駈主切此􅀋之推者也推行膏之殺鱉鵲矢中蝟中亦殺矣爛􅁅生蠅爛腐􅃮見蟹而不乾又曰染者先青而後黒則可先黒而後青則不可工}
