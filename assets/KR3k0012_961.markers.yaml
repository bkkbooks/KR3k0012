  - {type: variant, offset: 965, length: 4, content: 武帝使東, SBCK: 真臘國土俗與日南九真相􅀋異者有婆郍娑樹無花葉似冬􅀲菴羅樹花葉似􅀥實似李毗野樹花似木􅀲葉似杏實似楮婆田羅樹花葉實並似􅀥而小異歌畢他樹花似李葉似榆而厚大實似李其大如􅂛自餘多同九眞枹音嶺表録異曰枹木産江溪中葉細如檜身堅􅀋栢唯根軟不勝刀鋸今潮循人多用其根刳而爲履當木濕時刻削易如割􅀲木乾之後柔刀不可理也或油􅀞或􅃮其輕如通草暑月着之隔卑濕地氣力如杉木今廣州賔從諸郡牧守􅀄到任皆有油􅀞枹木履也牧婆羅南夷志曰南詔多牧婆羅樹子破其殻中白如柳絮紉爲絲織爲}
  - {type: page-break, offset: 965, content: '', id: KR3k0012_SBCK_961-8a}
  - {type: variant, offset: 965, length: 4, content: 武帝使東, WYG: 真獵國土俗與日南九真相類異者有㜑郍娑樹無花葉似冬𤓰菴羅樹花花似棗實似李毗野樹花似木𤓰葉似杏實似楮婆田羅樹花葉實並似􅀥而小生歌畢他樹花似李葉似榆而厚大實似李其大如外似金多同九真枹嶺表録異曰枹木産江溪中葉細如檜身堅類柏惟根軟不勝刀鋸今潮循多用其根刳而為履當木濕時刻削易如割𤓰木乾之後柔刀不可理也或油􅀞或漆其輕如通草暑月着之隔卑濕地氣如力杉木今廣州賔從諸郡牧守初到任皆有油􅀞枹木履也牧婆羅南夷志曰南詔多牧婆羅樹子破其殻中白如絮紉為絲織為}
