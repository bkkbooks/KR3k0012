  - {type: variant, offset: 11, length: 4, content: 皂莢也宋, krp: 赤如糯粟可食杭梁異物志曰有木洪直厥名杭梁乙木徐衷南方記曰乙樹葉檮之和繻葉汁煑之再沸味辛曝乾可投魚羹中求郍衛羅浮山記曰求郍衛外國樹英華紅粉至可愛翫男青羅浮山記曰男青條蘂之屬莫不朱色尤昜植立折挿土中因便開榮㝷木山海經曰㝷木長十里生河邊玉樹山海經曰開明北有文玉樹五彩括地圖曰崑崙墟北有玉樹丗說曰謝安甞謂子姪曰汝等何豫人事諸子莫言玄荅曰謦如芝蘭玉樹欲生庭堦耳唐}
