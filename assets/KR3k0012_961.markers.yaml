  body:
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 十交譲建木􅀂木姑繇丹木􅕴靈椿附迷􅂖帝休雒常返魂如何仙樹棆机木鹿椵椋橝繫彌杭梁乙木求郍衛男青㝷木玉樹踈麻樠瑯玕盧頭櫰桬棠䡤音諸帝屋六駮􅃮槲樺柟石南婆郍娑枹牧婆羅青田都念娑羅兒樹酒樹陳勾鳥文比閭制木交讓大魏諸州記曰益州汶山郡平康縣界東北接牂牁有都安縣有交讓樹兩兩相對歳更㸦枯㸦生不俱盛左思蜀都賦曰交讓所植建木山海經曰有木􅀂牛引之有皮􅀂纓黄蛇其實􅀂欒其木􅀂區名曰建木在弱水上青葉紫莖玄華赤實百仞無枝上有}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_SBCK_961-1b}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 十交讓建木若木姑繇丹木蓂靈椿迷穀帝休雒常返魂如何仙樹棆机木鹿椵椋橝繫彌杭梁乙木求郍衛男青尋木玉樹疎麻樠榔玕蘆頭櫰桬棠􅀢音諸帝屋六駮漆槲樺柟石南婆郍娑枹牧婆羅青田都念娑羅兒樹酒樹都勾鳥文比閭制木交讓大魏諸州記曰益州汶山郡平康縣界東北接䍧牱有都安縣有交讓樹兩兩相對嵗更半枯半生不俱盛左思蜀都賦曰交讓所植建木山海經曰有木若牛引之有皮若纓黄蛇其實如欒其木若蓲名曰建木在弱水上青葉紫莖𤣥華赤實百仞無枝上有欘下有}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_WYG_961-1b, image: WYG0901/WYG0901-0475d.png}
