  - {type: variant, offset: 1972, length: 206, content: 杭味如楮廣志曰原木漬其汁消殺眾生生南魄爾雅曰魄榽音奚橀音醯也魄大木細葉似檀今江東多有之廣雅曰青檀似奚橀語曰齊人斫檀奚榽先殫樕樸爾雅曰樕樸心也郭僕曰檞樕別名檴杔說文曰狗杶也欒說文曰欒木也似木蘭從木欒聲文木吳錄曰南朱桐縣有文木材堅黑如水牛角作馬鞭山海經曰符愚之山文木其實如棗南方草物狀曰文木樹高七八丈其色正黑如水牛角作馬鞭日南有之韶裴淵廣州記曰韶葉似栗赤色子大如栗有棘剌破其皮內白豬肪著核不離味甜酢核如荔枝平仲左思吳, SBCK: 酒出无遜國}
