  - {type: variant, offset: 2, length: 0, content: '', krp: 十交譲建木若木姑繇丹木􅕴靈椿附迷糓帝休雒常返魂如何仙樹棆机木鹿椵椋橝繫彌杭梁乙木求郍衛男青㝷木玉樹踈麻樠瑯玕盧頭櫰桬棠䡤音諸帝屋六駮􅃮槲樺柟石南婆郍娑枹牧婆羅青田都念娑羅兒樹酒樹陳勾鳥文比閭制木交讓大魏諸州記曰益州汶山郡平康縣界東北接牂牁有都安縣有交讓樹兩兩相對歳更㸦枯㸦生不俱盛左思蜀都賦曰交讓所植建木山海經曰有木若牛引之有皮若纓黄蛇其實若欒其木若區名曰建木在弱水上青葉紫莖玄華赤實百仞無枝上有}
