  - {type: variant, offset: 2487, length: 550, content: 地四五丈作懸根生地便大如本株形一樹亦可有數十根如本形花白子不中食種於精舍浮圖前嵩高山記曰嵩高寺中有思惟樹即貝多也如來坐貝多下思惟因以為名焉魏王花木志曰思惟樹漢時有道人自西域持貝多子植於嵩之西峰下後極高大有四樹樹一年三花射干孫卿子曰西方有木名射干莖長四寸生於高山之崖臨百仞之淵木非長也所立高也君子居必擇鄉遊必就士楚辭曰掘荃蕙與射干兮芸蕓藜與蘘荷時好孫綽子曰北阜有木焉名曰時好摩廚異物志曰木有摩廚生于斯調摩廚木名也生於斯調州厥汁肥潤其澤如膏馨香馥郁可以煎熬如脂膏可以煎熬食物也彼州之民仰為嘉肴花木志曰煎熬食物香美如華夏之人用油榕異物志曰榕樹栖栖長與少殊少時緣木後乃成樹故為殊也高出林表廣蔭原丘孰知初生葛虆之儔魏王花木志曰榕木初生少時緣縛他樹如外方扶芳藤形不能自立根本緣繞他木傍作連結有如羅網相絡然後木理連合鬱茂扶踈高六七丈嶺表錄異曰榕樹桂廣容南府郭之內多栽此樹葉如冬青秋冬不凋枝條既繁葉文蒙細而根鬚繚繞枝榦屈盤上生嫩條如藤垂下漸漸及地藤梢入土便生根節或一大榕樹三五處有根者又橫枝著鄰樹則連理南人以為常不為之瑞木夫漏徐衷南方記曰夫漏樹野生三月華五六月成子如術有煮著豬肉雞鴨羹中好可食亦中鹽藏都桶徐衷南方記曰都桶樹二月花仍連實七月熟如卵魏王花木志曰南方草物狀都桶樹野生二月花色仍連著實八九月熟子如鴨卵民取食之, SBCK: ''}
  - {type: variant, offset: 2487, length: 550, content: 地四五丈作懸根生地便大如本株形一樹亦可有數十根如本形花白子不中食種於精舍浮圖前嵩高山記曰嵩高寺中有思惟樹即貝多也如來坐貝多下思惟因以為名焉魏王花木志曰思惟樹漢時有道人自西域持貝多子植於嵩之西峰下後極高大有四樹樹一年三花射干孫卿子曰西方有木名射干莖長四寸生於高山之崖臨百仞之淵木非長也所立高也君子居必擇鄉遊必就士楚辭曰掘荃蕙與射干兮芸蕓藜與蘘荷時好孫綽子曰北阜有木焉名曰時好摩廚異物志曰木有摩廚生于斯調摩廚木名也生於斯調州厥汁肥潤其澤如膏馨香馥郁可以煎熬如脂膏可以煎熬食物也彼州之民仰為嘉肴花木志曰煎熬食物香美如華夏之人用油榕異物志曰榕樹栖栖長與少殊少時緣木後乃成樹故為殊也高出林表廣蔭原丘孰知初生葛虆之儔魏王花木志曰榕木初生少時緣縛他樹如外方扶芳藤形不能自立根本緣繞他木傍作連結有如羅網相絡然後木理連合鬱茂扶踈高六七丈嶺表錄異曰榕樹桂廣容南府郭之內多栽此樹葉如冬青秋冬不凋枝條既繁葉文蒙細而根鬚繚繞枝榦屈盤上生嫩條如藤垂下漸漸及地藤梢入土便生根節或一大榕樹三五處有根者又橫枝著鄰樹則連理南人以為常不為之瑞木夫漏徐衷南方記曰夫漏樹野生三月華五六月成子如術有煮著豬肉雞鴨羹中好可食亦中鹽藏都桶徐衷南方記曰都桶樹二月花仍連實七月熟如卵魏王花木志曰南方草物狀都桶樹野生二月花色仍連著實八九月熟子如鴨卵民取食之, WYG: ''}
