  - {type: 'tls:seg', offset: 3, content: '', id: KR3k0012_CHANT_961-1a.2}
  - {type: variant, offset: 3, length: 2, content: 皂莢, SBCK: 欘渉玉切下有九衢黄帝所爲欘曲也爲治護之也淮南子曰建木在廣都衆帝所自上下日中無影呼而無響盖天之中廣都方都南山也􅀂木山海經曰􅁅野之山有樹青葉名曰􅀂木郭璞注曰生崑崙西隅其華光赤照下地也楚詞曰羲和之未陽􅀂華何光羲和日卿也言日未陽升之時􅀂木能有赤明之光華又曰折􅀂木以拂日姑繇穆天子傳曰天子釣于河以觀姑繇之木丹木山海經曰崦嵫山有丹木葉如榖其實大如􅀲赤跗而黒理食之巳癉可以禦火又曰密山上多丹木圎葉而赤莖黄華實如飴食之不飢玉膏灌丹木丹木五歳五色乃清言光明也五味乃馨蓂靈列子曰荆之南有蓂靈者以五百歳爲春以八千歳爲秋椿左傳曰襄公十八年諸侯伐齊孟莊子斬雍門之椿或作槆爲公琴莊子曰上古有大椿以八千歳爲春秋曹毗魏都賦曰檉栢振露緑椿停霜迷榖山海經曰招揺之山有木焉其狀如榖而黒理其花四照其名迷榖佩之不迷帝休山海經曰少室之山有木名帝休其枝葉大如楊而五衢黄華黒實服之不恐雒常山海經曰肅慎之國有樹名雒常聖人代立於此取衣郭璞曰其俗無衣聖帝代立則此木皮可衣也返魂十洲記曰聚窟洲在西海中申未地上有大樹與楓木相似而華葉香聞數百里名爲返魂樹叩其樹樹亦能自聲聲如牛吼聞之者皆心振神駭伐其根心於玉釡中煑取汁微火熟煎之令可丸名曰驚精香或名震靈丸或名反生香或名人鳥精或名却死香斯靈物也香氣聞數百里死屍在地聞氣仍活如何神異經曰南方荒中如何之樹三百歳作華九百歳作實有核形如􅀥子長五尺金刀割之則飴非則辛食之得地仙顧凱之啓􅂪記曰如何隨刀而改味仙樹西河舊事曰連山有仙樹人行山中飢渴者輙得之可飽不得持去平居時亦不得見棆音倫爾雅曰棆無疪也郭璞曰楩屬似豫章也机山海經曰單狐之山其木多机郭璞曰音飢也木鹿荆州土地記曰武陵城内社中木鹿樹及南岸二木鹿樹光武所種椵􅀃文曰椵木可作伏机椋音良爾雅曰椋即來椋有髓熊折而乳之又曰今椋材中車輞橝音覃}
