  - {type: variant, offset: 1522, length: 332, content: 乾擣以水淋之如麵可作餅餌嶺表錄異曰桄榔樹枝葉並蕃茂與棗檳榔等樹小異然葉下有鬢如麤馬尾廣人採之以織巾子其鬢尤宜鹹水浸漬即麤脹而肕故人以此縛舶不用釘線木性如竹紫黑色有文理而堅工人解之以制博弈局此樹皮中有屑如麵可為餅食之水經曰漢興縣溪中多生卬竹桄榔樹樹出緜而夷人資以自給欀吳錄地理志曰交趾望縣有欀木其皮中有如白米屑者乾之水淋之似麵可作餅郡內皆有之左思吳都賦曰文欀貞橿莎木蜀志曰莎樹大四五圍長五六丈峰頭生葉出麵一樹出一石正白而味似桄榔南中八郡志曰莎樹大四五圍長十餘丈樹皮能出麵大者百斛色黃鳩民部落而就食之廣志曰莎樹多枝葉葉兩邊行列若飛鳥翼其麵色白樹收麵不過一斛擣篩乃如麵不則如磨屑為飯滑軟木緜吳錄地理志曰交趾定安縣有木緜樹高大實如酒杯中有緜如蠶之緜又可作布名曰緤一名毛布廣, SBCK: 荆}
