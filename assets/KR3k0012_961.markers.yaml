  - {type: variant, offset: 965, length: 4, content: 武帝使東, krp: 真臘國土俗與日南九真相類異者有婆郍娑樹無花葉似冬瓜菴羅樹花葉似棗實似李毗野樹花似木瓜葉似杏實似楮婆田羅樹花葉實並似棗而小異歌畢他樹花似李葉似榆而厚大實似李其大如升自餘多同九眞枹音嶺表録異曰枹木産江溪中葉細如檜身堅類栢唯根軟不勝刀鋸今潮循人多用其根刳而爲履當木濕時刻削易如割瓜木乾之後柔刀不可理也或油畫或􅃮其輕如通草暑月着之隔卑濕地氣力如杉木今廣州賔從諸郡牧守𥘉到任皆有油畫枹木履也牧婆羅南夷志曰南詔多牧婆羅樹子破其殻中白如柳絮紉爲絲織爲}
