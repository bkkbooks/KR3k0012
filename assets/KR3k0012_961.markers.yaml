  - {type: variant, offset: 3, length: 2, content: 皂莢, WYG: 枸黄帝所為欘曲也為治護之也淮南子曰建木在廣都若木山海經曰泂野之山有赤樹青葉赤華名曰若木郭璞記曰生崑崙西隅其華光赤照下地也楚辭曰羲和之未陽若華何光又曰折若木以拂日姑繇穆天子傳曰天子釣于河以觀姑繇之木丹木山海經曰崦嵫山有丹木葉如糓其實大如𤓰赤附而黑理食之已癉痺可以禦火又曰宻山上多丹木圓葉而赤莖黄華而赤實味如飴食之人不饑玉膏以灌丹木丹木五嵗五色乃清言光明也五味乃馨蓂靈列子曰荆之南有蓂靈者以五百嵗為春以八千嵗為秋椿左傳曰襄公十八年為諸侯伐齊孟莊子斬雍門之槆為公琴莊子曰上古有大椿以八千嵗為秋曹毘魏都賦曰桱栢振露緑椿停霜迷穀山海經曰招揺之山有木焉其狀如穀而黑理其花四照其名迷穀佩之不迷帝休山海經曰少室之山木名帝休其葉狀如楊其枝五衢黄華黑實服之不怒雒常山海經曰肅慎之國有樹名雒常聖人代立於此取衣其俗無衣聖帝代立則此木皮可衣也返魂十洲記曰聚窟洲在西海中申未地上有大樹與楓木相似而華葉香聞數百里名為返魂樹叩其樹樹亦能自鳴聲如牛吼聞之者皆心振神駭伐其根置於玉釡中煮取汁微火熟煎之合為丸名曰驚精香或曰震靈丸或名反生香或名人鳥精或名却死香斯靈物也香氣聞數百里死屍在地聞氣仍活如何神異經曰南方荒中如何之樹三百嵗開花三百嵗作實有核形如棗子長五尺金刀割之則味飴或辛食之則地仙顧凱之啟䝉記曰如何隨刀而改味仙樹西河舊事曰連山有仙樹人行山中饑渴者輙得之可飽不得持去平居時亦不得見棆爾雅曰棆無疵也楰屬如豫章也机山海經曰單狐之山其木多机木鹿荆州土地記曰武陵城中社中木鹿樹及南岸二木鹿樹光武所種椵説文曰椵木可作杖椋音艮爾雅曰椋郎來椋有隨熊折而乳之又曰今椋材中車橝音單}
