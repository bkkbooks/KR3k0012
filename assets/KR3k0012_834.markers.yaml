  - {type: variant, offset: 4298, length: 1, content: 堯, SBCK: 臨河欲魚不􅀂退而織網老子曰天網恢恢踈而不漏莊子曰魚不畏網而畏鵜鴣網者公平無􅀻鵜鴣有欲得之心故魚畏又曰豐狐文豹不免於網羅之患者文也韓于曰善張網者引其網不一一攝萬目而後得一一攝萬目而後得則是勞而難􅀗引其網而魚巳慕矣故吏者民之夲網也故聖人治吏不治民又曰靖郭君將城薛客曰君聞大魚乎網不能止繳不能絓也蕩而失水螻蟻得意焉孟子曰數􅅈不入洿池魚鱉不可勝食也抱朴子曰太昊師蜘蟵而結網國語曰魯宣公夏濫於泗淵濫漬也漬􅅈於泗水之淵以取魚泗在魯城北里革斷其􅅈而棄之􅅈網曰古者大寒降土蟄發降下也寒氣􅀄下謂季冬建丑之月大寒之後也士蟄發謂孟春建寅之月蟄虫始震魚上水􅆩􅀕魚水虞於是乎講罛罶取名魚登川禽而甞之寢廟行諸國助宣氣也今魚方别孕不放魚長又行罣􅅈貪無藝也公聞之曰吾過而里革匡我不亦善乎是良􅅈也爲我得法良善}
