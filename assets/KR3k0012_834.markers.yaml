  - {type: variant, offset: 1025, length: 32, content: 梁書曰侯景據壽陽懷反計以臺所給仗多不能精啟請治鍜工欲更營造勑並給, SBCK: 三年白龍來迎}
  - {type: variant, offset: 1025, length: 272, content: 梁書曰侯景據壽陽懷反計以臺所給仗多不能精啟請治鍜工欲更營造勑並給之後魏書曰崔鑒為東徐州刺史於州內銅冶為農且丘人獲利北史曰後周薛善為行臺郎中時欲廣置屯田以供軍費乃除善司農少卿領同州夏陽縣二十七監又於夏陽置鐵冶復令善於監每月役八千人營造軍器善自督課兼加慰撫甲兵稍利而皆忘其苦焉唐書曰侍中魏徵乞解所職請為散官陪奉左右拾遺補闕太宗曰朕拔卿於讎虜之中任卿以樞要之職見朕之非未嘗不諫公獨不見金之在鑛也何足貴哉良冶鍜而為器便為人所寶朕方自比於金以卿為良匠卿雖有疾未為衰老豈得便爾耶徵乃止尸子曰造冶者蚩尤也淮南子曰夫宋工畫吳冶刻形鏤法其為微妙堯舜之聖不能及也列, WYG: 三年白龍来迎去神}
