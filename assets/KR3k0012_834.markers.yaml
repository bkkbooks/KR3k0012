  - {type: variant, offset: 4298, length: 1, content: 堯, WYG: 臨河欲魚不如退而織網老子曰天網恢恢踈而不漏莊子曰魚不畏網而畏鵜鶘網者公平無私鵜鶘有欲得之心故魚畏又曰豐狐文豹不免於網羅之患者文也韓子曰善張網者引其綱不一一攝萬目而後得一一攝萬目而後得則是勞而難引其綱而魚已慕矣故吏者民之本綱也故聖人治吏不治民又曰靖郭君將城薛客曰君聞夫魚乎網不能止繳不能絓也蕩而失水螻蟻得意焉孟子曰數罟不入洿池魚鱉不可勝食也抱朴子曰太昊師蜘蟵而結網國語曰魯宣公夏濫於泗淵濫漬也漬罟於泗水之淵以取魚泗在魯城北里革斷其罟而棄之罟網也曰古者大寒降土蟄發降下也寒氣初下謂季冬建丑之月大寒之後也土蟄發謂孟春建寅之月蟄䖝始震魚上氷獺祭魚水虞於是乎講罛罶取名魚登川禽而嘗之寢廟行諸國人助宣氣也今魚鱉方孕不教魚長又行網罟貪無藝也公聞之曰吾過而里革匡我不亦善乎是良罟也為我得法良善也}
