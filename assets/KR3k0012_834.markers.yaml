  - {type: variant, offset: 1304, length: 4, content: 六安冶師, SBCK: 咸驚中論曰獨思則滯而不通獨爲則困而不就善釣不易坻而得魚君子不降席而追道又曰又王遇姜公於渭濵皤然皓首秉竿而釣文王得之灼􅀂祛雲而見日霍􅀂開霧而觀山桓範丗論曰水則有波釣則有磨我欲更之無如之何言物動而舋巳彰形行而迹巳著又曰釣巨魚不使嬰兒輕預非不親力不堪}
