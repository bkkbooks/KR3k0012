  - {type: variant, offset: 4514, length: 217, content: 焉孔子不受漁者曰天暑市遠無處鬻焉思欲棄之糞壤不若獻之君子故取以進之於是夫子再拜受之使弟子掃地將以祭享焉門人曰彼將棄之矣而夫子祭之何也子曰吾聞惜其腐餘欲以務施者仁人之偶也惡有受仁人之饋而無祭者乎劉向新序曰楚人有獻餘魚於王者曰今日獲魚食之不盡賣之不售棄之可惜故來獻王也楚王曰漁者仁人也境內多貧寡人聞之未能行漁者知之以此喻寡人也乃出倉粟去後宮以妻寡夫郭璞江賦曰蘆人漁于儐落江山衣則羽褐食惟䟽鱻忽忘夕而宵歸詠採菱以扣舷倣自足於一區尋風波以窮年, WYG: 為銛太平御覽巻八百三十四}
