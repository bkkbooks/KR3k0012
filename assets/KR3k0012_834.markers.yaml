  - {type: variant, offset: 3166, length: 359, content: 七八見使牧羊而私讀書用獲箠楚俊嘉美其才質即贖象著家娉娶立屋然後與別也晉書曰張華字茂先少家貧常以牧羊為事三十國春秋曰沮渠蒙遜其先世為匈奴左沮渠因以官為氏少牧羊臥息田畔忽見沙門以手摩其頭曰爾後當王此土不久苦焉言終而滅崔鴻前趙錄曰李景字延祐少貧見養叔父常使牧羊景見其叔子講誦羨之後從博士乞得百餘字牧羊之睱折草木書之叔乃誤曰吾家千里駒也而令騏驎久躓鹽坂乃為娶妻教學又曰姜宇天水冀北人也少孤貧為河北陳不識家牧羊年十五身長七尺九寸聰惠美風儀不識奇之妻之以女後魏書曰游明根字志遠幼年遭亂為櫟陽王氏奴主使牧羊明根以漿倩人書字路邊書地學之長安鎮將竇瑾見之呼問知其姓名乃告游雅使人贖之列子曰楊朱見梁惠王言治天下猶運諸掌王曰先王有一妻一妾而不能治言天下何也對曰君見夫牧羊者乎百羊為群使五尺童子荷箠而隨之欲東而東欲西而西使堯牽一羊舜荷箠而隨之, krp: 疋}
