  - {type: variant, offset: 97, length: 124, content: 當周之興閼父為武王陶正我先王賴其利器用也與其神明之後也舜聖故謂之神明庸以元女大姬配胡公庸用也元女武王之長女胡公閼父之子滿也而封諸陳以備三恪周得天下封夏殷二王後又封舜後謂之恪并二王後為三國其體轉降示敬而已故曰三恪毛詩文王綿曰古公亶甫陶復陶穴未有家室續, SBCK: ''}
