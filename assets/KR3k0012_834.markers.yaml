  - {type: variant, offset: 1511, length: 194, content: 疑色工曰今所鑄鐵剛厲製器難成若得公腰間佩刀雜而治之即成神器可以剋定天下皇精為輔佐以殲三猾木長火盛此為興兆上皇曰余此物名為匕首其利難儔水斷虵龍陸斬虎兕工曰若不得此匕首雖歐治專精越砥歛鍔終為鄙器上皇即解腰間匕首投於爐中俄而煙炎衝天日為之晦及劍成釁以三牲工問上皇何時得匕首上皇曰秦昭襄王時余行逢一野人於野授余云是殷時物世世相傳上有古字記其年月工人視之其鏌耶尚在葉前疑也工人持劍授上皇上皇以賜高祖, SBCK: 鱗甲}
