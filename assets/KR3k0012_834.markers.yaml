  - {type: variant, offset: 469, length: 0, content: '', SBCK: 而千乗得之知與不知也又曰若釣者魚有大小餌有冝適羽有動静羽釣浮也􅀃苑曰宓于賤爲單父宰過於陽書曰子亦有以送僕乎陽書曰吾少也賤不知治民之術有釣道二焉請以送子子賤曰釣道柰何陽書曰夫投綸餌迎而吸之者陽橋也其爲魚也薄而不美􅀂存􅀂亡􅀂食不食者魴也其爲魚也薄而味厚宓子賤曰善於是未至單父冠蓋迎之者交接於道子賤曰驅驅之夫陽書之所謂陽橋者至矣焦贑易林曰曵綸江海鈎挂魴鯉王孫利得以饗仲友}
  - {type: variant, offset: 469, length: 0, content: '', WYG: 而千乗得之知與不知也又曰若釣者魚有大小餌有宜適羽有動靜羽釣浮也説苑曰宓子賤為單父宰過於陽晝曰子亦有以送僕乎陽晝曰吾少也賤不知治民之術有釣道二焉請以送子子賤曰釣道奈何陽晝曰夫投綸餌迎而吸之者陽橋也其為魚也薄而不美若存若亡若食不食者魴也其為魚也薄而味厚宓子賤曰善於是未至單父冠盖迎之者交接於道子賤曰車驅之夫陽晝之所謂陽橋者至矣焦贑易林曰曵綸江海釣挂魴鯉王孫利得以饗仲友}
