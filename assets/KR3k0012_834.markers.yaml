  - {type: variant, offset: 660, length: 124, content: 先梁人也用鐵冶為業秦代魏遷孔氏南陽大鼓鑄規陂池連車騎遊諸侯因通商賈之利有游間公子之名又曰魯人邴氏以鑄冶起富至巨萬然家自父兄子弟約頫有拾仰有取師古曰頫古俯宇也俯仰必有取捨無巨細字惡也張璠漢記曰杜詩為太守為冶作水排教化大行魏志曰韓暨字公至辟為丞相士曹屬, SBCK: ''}
