  - {type: variant, offset: 2292, length: 1377, content: 時牧人之職廢宣王始興而復之至此而成謂復先王牛羊之數誰謂爾無羊三百維群誰謂爾無牛九十其犉黃牛黑唇曰犉箋云爾女也宣王復古之牧法汲汲於其數故歌此詩以解之也爾羊來思其角濈濈聚其角而息濈濈然云此者美富產得其所爾牛來思其耳濕濕動其耳濕濕然或降于阿或飲于池或寢或訛訛動也言此者美其無所驚畏爾牧來思何蘘何笠或負其餱何揭也蓑所以備雨笠所以御暑言此者美牧人寒暑飲食有備三十維物爾牲則具又魯頌曰駉頌僖公也僖公能遵伯禽之法儉以足用寬以愛民務農重穀牧于坰野魯人尊之於是季孫行父請命于周而史克作頌季孫行父季文于也史克魯史也駉駉牧馬在坰之野駉駉良馬腹幹肥張也坰遠野也箋云必牧於坰野者辟知民居與良田者也史記曰卜式河南人少與弟別居脫身出分獨取畜羊百餘田宅財物盡與弟式入山牧羊十餘歲羊致千餘上召之曰吾有羊上林中欲令子牧之乃布衣牧羊歲餘羊悉肥上過見其羊善之式曰非獨羊也治民亦猶是也以時起居惡者輒去無令敗群上以式為奇拜為郎又曰衛青平陽人也其父為平陽侯家給使與妾通生青為侯家人少時歸其父父使牧羊民母之子皆奴畜之不以為兄弟又曰范增說項梁曰以君代為楚將必能立楚之後梁乃求懷王孫在人間為人牧羊立以為楚懷王後從人望也又曰公孫弘淄川人家貧牧豕海上年四十餘乃學春秋雜記漢書曰蘇武使匈奴欲降之乃徙武北海上無人處使牧羝羊曰羊乳乃得歸武仗漢節牧羊臥起操持節旄盡落又曰路溫舒字長君鉅鹿人父為里監門使溫舒牧羊又曰王尊字子貢涿郡高陽人少孤歸諸父使牧羊澤中後漢書曰馬援轉遊隴漢間常謂賓客曰丈夫為志窮當益堅老當益壯因處田牧至有牛馬羊數千頭穀數萬斛既而歎曰凡殖貨財產貴其能施賑也否則守錢虜耳仍盡散以班昆弟故舊身衣羊裘皮袴又曰承宮年八歲為人牧豬鄉里徐子威明春秋授諸生數百人宮過其廬下見諸生誦好之因亡其豬豬主欲笞諸生禁乃止之謝承後漢書曰孫期字仲式事母至孝牧豕於大澤中賣之以奉供養遠人從其學者皆執經追於澤畔范曄後漢書曰梁鴻字伯鸞扶風平陵人也家貧牧豕上林苑中曾誤遺失火延燒及他舍鴻乃尋訪燒者問所失去悉以豕償之其主者猶以為少鄰家耆老見鴻非常人乃共責讓主人於是始敬異焉悉還豕鴻不受魏志曰楊俊字季才避地并州同郡王象孩少孤特為人僕隸年十七八見使牧羊而私讀書用獲箠楚俊嘉美其才質即贖象著家娉娶立屋然後與別也晉書曰張華字茂先少家貧常以牧羊為事三十國春秋曰沮渠蒙遜其先世為匈奴左沮渠因以官為氏少牧羊臥息田畔忽見沙門以手摩其頭曰爾後當王此土不久苦焉言終而滅崔鴻前趙錄曰李景字延祐少貧見養叔父常使牧羊景見其叔子講誦羨之後從博士乞得百餘字牧羊之睱折草木書之叔乃誤曰吾家千里駒也而令騏驎久躓鹽坂乃為娶妻教學又曰姜宇天水冀北人也少孤貧為河北陳不識家牧羊年十五身長七尺九寸聰惠美風儀不識奇之妻之以女後魏書曰游明根字志遠幼年遭亂為櫟陽王氏奴主使牧羊明根以漿倩人書字路邊書地學之長安鎮將竇瑾見之呼問知其姓名乃告游雅使人贖之列子曰楊朱見梁惠王言治天下猶運諸掌王曰先王有一妻一妾而不能治言天下何也對曰君見夫牧羊者乎百羊為群使五尺童子荷箠而隨之欲東而東欲西而西使堯牽一羊舜荷箠而隨之則不能矣符子曰漢王聞宋勝子方牧羊于巨澤鼓而歌南風之詩使者進謂宋勝子曰漢王聞先生之賢使使者致命于先生而委國政焉宋勝子矍然而顧謂使者曰是何言歟今漢王待四海之士與十群之羊其於職司也奚以異乎而大王廢牧羊之任委以四海之政是錯亂天位倒置人倫勝不願為也乃逃于陰山之陽公孫尼子曰舜牧羊於潢陽還堯舉為天子說, SBCK: 􅅈􅀃}
