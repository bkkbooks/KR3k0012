  - {type: variant, offset: 4450, length: 1, content: 宓, SBCK: 天羅廓矣野人猶有􅇁翳之勤涔爾雅曰糝謂之涔郭璞注曰今作糝者聚柴於水中魚得寒入其裏藏隱因以簿圍捕取之犍爲舎人曰以米投水中養魚曰涔也纂文曰以鐡施竹頭取魚爲涔罾􅀃文曰􅊻魚網也史記曰陳勝詐爲書置人所罾魚腹中風土記曰罾樹四植而張網於水車輓上下之形如蜘蟵之網方而不圎楚辭曰鳥何萃􅀆蘋中􅊻何爲􅀆木上俞失其所應璩新詩曰洛水禁􅊻􅅈魚鱉不爲殖罾􅅈網名空令自相啖吏民不得食笱毛詩雞鳴弊笱曰弊笱在梁其魚唯唯又小雅小弁曰無逝我梁無發我笱􅀃文曰笱曲竹捕魚笱也從竹勾亦聲也欚音禮廣雅曰其􅊻謂之欚梁毛詩國風曰維鵜在梁不濡其翼鵜洿澤也梁水中之梁鵜在梁可謂不濡其翼彼其之}
