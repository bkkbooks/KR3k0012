  - {type: variant, offset: 395, length: 0, content: '', SBCK: 方物海人曰横海有魚額􅀂華山之頂一吸萬頃之波山客曰鄧林有木圍三萬㝷直上千里傍䕃數國有人曰東極有大人斬木爲䇿短不可支釣魚爲鮮不足充饑抱朴子曰金鈎玉餌雖珍而不能制九淵之沉鱗顯寵豐禄雖貴而不能致無欲之幽人符子方外曰太公釣隱溪五十有六年矣而未甞得一魚魯連聞之徃而觀其釣太公跪石隱崖且不餌而釣仰詠俯吟及暮而釋竿􅀓子曰劉曄責楊曁曰夫釣者中大魚則縱而隨之湏可制而後牽之則無不得也人主之威豈徒大魚而巳子誠直臣然計不足不可不精思也穆天子傳曰天子北征舎於珠澤此澤岀珠因名之云今越携平澤出青珠以釣於流水又曰辛未天子北還釣于漸澤食魚于桑野又曰天子乃釣于河以觀姑繇之木姑繇大木也山海經日尋木長千里生河邊謂此木之􅀋六韜曰吕尚坐茅以漁文王勞而問焉吕尚曰魚求於餌乃牽其緡人食於禄乃服於君故以餌}
  - {type: page-break, offset: 395, content: '', id: KR3k0012_SBCK_834-4b}
  - {type: variant, offset: 395, length: 0, content: '', WYG: 方物海人曰横海有魚額若華山之頂一吸萬頃之波山客曰鄧林有木圍三萬㝷直上千里傍䕃數國有人曰東極有大人斬木為䇿短不可支釣魚為鮮不足充飢抱朴子曰金鈎玉餌雖珍而不能制九淵之沉鱗顯寵豐禄雖貴而不能制無欲之幽人符子方外曰太公釣隠溪五十有六年矣而未嘗得一魚魯連聞之往行觀其釣太公跪石隠崕且不餌而釣仰詠俯唫及暮而釋竿傅子曰劉􅁮責楊暨曰夫釣者中大魚則縦而隨之須可制而後牽之則無不得也人主之威豈徒大魚而已子誠直臣然計不足不可不精思也穆天子傳曰天子北征舎於珠澤此澤出珠因名之云今越淮平澤出青珠以釣于流水又曰辛未天子北還釣于漸澤食魚于桑野又曰天子乃釣於河以觀姑繇之木姑繇大木也山海經曰尋木長千里生河邉謂此木之類六韜曰吕尚坐茅以漁文王勞而問焉吕尚曰魚求於餌乃牽其緡人食其禄乃服於君故以餌}
