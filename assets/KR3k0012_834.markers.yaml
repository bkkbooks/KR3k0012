  - {type: variant, offset: 376, length: 1, content: 昆, SBCK: 子思居衛衛人釣於河得鱞一作魚魚焉其大盈車子思問之曰鱞魚魚之難得者也子如何得之對曰}
  - {type: page-break, offset: 376, content: '', id: KR3k0012_SBCK_834-3a}
  - {type: variant, offset: 376, length: 1, content: 昆, WYG: 子思居衞有人釣得鰥魚焉其大如車子思問之鰥魚魚之難得者也子如何得之對曰}
  - {type: variant, offset: 376, length: 1, content: 昆, krp: 子思居衛衛人釣於河得鱞一作魚魚焉其大盈車子思問之曰鱞魚魚之難得者也子如何得之對曰}
  - {type: variant, offset: 378, length: 7, content: 作陶呂氏春秋同, SBCK: 下釣垂一魴之餌鱞過而弗視也更以豚之半體則吞之子思喟然曰鱞雖得貪以死餌士雖懷道貪以死禄文子曰魚不可以無餌釣獸不可以空器召列子曰詹何以獨璽絲爲綸芒針爲鈎荆條爲竿剖粒爲餌引盈車之魚於百仭之川洎流之中綸不絶鈎不申竿不撓因水勢而施舎也又曰渤海之東有大壑焉實惟無底之谷其中有五山常隨潮波上下徃還不得暫峙使巨鼇十五舉首而載之五山始峙而不動而龍伯國有大民曁五山之所一釣而連六鼇合􅀒而趨歸其國灼其骨以數焉荀卿子曰自上莅下猶夫釣者焉隱於手而應於釣則可以得魚􅀑谷子曰古之善摩者如操釣而臨深淵而投之必得魚矣闕子曰魯人有好釣者以桂爲餌黄金之鈎錯以銀碧垂翡翠之綸其持竿處位即是然其得魚不幾矣故曰釣之務不在芳飾事之急不在辯言莊子曰莊子釣於濮水之上楚王使大夫二人徃見焉曰願以境内累夫子莊子持竿不頋又曰任公子好釣巨魚爲大綸巨釣以犗牛爲餌蹲㑹稽投東海朞年不得魚巳而大魚食之牽巨釣驚􅀭波而􅁬鬐白波􅀂山海水振蕩任公子得􅀂魚離而腊之浙河以東蒼梧以北莫不厭􅀂魚者}
  - {type: page-break, offset: 378, content: '', id: KR3k0012_SBCK_834-3b}
  - {type: variant, offset: 378, length: 7, content: 作陶呂氏春秋同, WYG: 下釣垂一魴之餌鰥過而弗視也更以豚之半體則吞之子思喟然歎曰鱞雖難得貪以死餌士雖懐道貪以死禄文子曰魚不可以無餌釣獸不可以空器召列子曰詹何以獨繭絲為綸芒針為鈎荆條為竿剖粒為餌引盈車之魚於千仞之川汨流之中綸不絶鈎不申竿不撓因水勢而施舎也又曰渤海之東有壑焉實惟無底之谷其中有五山常隨朝波上下往還不得暫峙使巨鼇十五舉首而戴之五山始峙而不動而龍伯國有大民泊五山之所而連六鼇合負而趍歸其國灼其谷以數焉荀卿子曰自上莅下猶夫釣者焉隐於手而應扵釣則不可以得魚鬼谷子曰古之善摩者如操釣而臨深淵投之而必得魚矣關子曰魯人有好釣者以桂為餌黄金之鈎錯以銀碧垂翡翠之綸其持竿處位則是然其得魚不㡬矣故曰釣之務不在芳飾事之急不在辨言莊子曰莊子釣於漢水之上楚王使大夫二人往見焉曰願以境内累夫子莊子持竿不顧又曰任公子好釣巨魚為大綸巨鈎以犗牛為餌蹲㑹稽投東海期年不得魚已而大魚食之牽巨鈎驚掦波而奮鬐白波若山海水振蕩任公子得若魚離而腊之浙河以東蒼梧以北莫不厭若魚者}
