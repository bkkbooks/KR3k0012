  - {type: variant, offset: 4, length: 6, content: 三陶禮記檀弓, SBCK: 四釣筌罛網􅅈罶罺􅇁涔􅊻笱欚梁軥罠罨箄􅩬銛釣毛詩何彼穠矣曰其釣維何維絲伊緡伊維緡綸也箋云釣者以此有求於何彼以爲之乎以絲爲之綸則是善釣也又國風竹竿曰籊籊竹竿以釣于淇又小雅采緑曰之子于釣言綸之繩綸釣繳也其釣維何維魴及鱮維魴及鱮薄言觀者論語􅄒而曰子釣而不綱綱謂爲大索横流屬釣尚書大傳曰周文王至磻溪見吕望釣文王拜之尚云望釣得玉璜刻曰周受命吕佐檢徳合于今昌來提戰國䇿曰魏王與龍陽君共􅂳而釣龍陽君得十餘魚而涕下王曰何謂也對曰臣之始得魚也臣甚喜後得益大今欲弃臣前之所得矣今臣與王拂枕席爵至人君走人於庭避人於塗四海之内其美人多矣聞臣之得幸王也必裂裳而趍王臣亦猶曩之所得魚也亦將弃矣臣安能無涕乎魏王}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_834-1b}
