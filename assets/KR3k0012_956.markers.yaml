  - {type: variant, offset: 974, length: 395, content: 略曰楊沛為新鄭長課民益蓄桑椹䝁豆積浸得千餘斛太祖遷天子軍無糧沛乃進乾椹後為鄴令賜其生口十人絹百疋以報乾椹也蜀志曰先主舍東南角籬上有桑樹生高丈餘遙望童童如小車蓋往來者皆怪此樹非凡或謂當出貴人先主少時同宗中諸兒於樹下戲言吾必當乘此羽葆車蓋晉書曰賈后將廢愍懷太子時有桑生於西廂長數日而枯十二月后廢太子又曰劉驎之尚書質素好道車騎將軍桓冲聞名辟為長史固辭冲嘗到其家驎之於樹條桑使者致命驎之曰使君既枉駕光臨宜先詣家君冲愧詣其父又載記曰北燕馮跋下書曰今疆守無虞百姓寧業而田畝荒穢有司不隨時督察欲令家給人足不亦難乎桑柘之益有生之本此土少桑人未見其利可令百姓人植桑一百二十根崔鴻前涼錄曰張天錫為符堅破後歸晉孝武帝問之曰北方何物為美錫對曰桑椹甘香鴟鴞革響淳酪養性人無疾心崔鴻十六國春秋後燕錄曰初晃之遷于龍城也植松為社主及秦滅燕大風吹拔之後數年社處忽有桑二根生焉先是遼川無桑及廆通于晉晉求種江南平川之桑悉由吳來齊, SBCK: ''}
