  - {type: variant, offset: 1448, length: 0, content: '', WYG: 桓帝曾中蠱後吐之地乃生榆木趙書曰從幽州大道滹沱造浮橋植行榆五十里置行宫管子曰五沃之土其榆脩長莊子曰鵲上高城之垝而巢於高榆之顛城壊巢折凌風而起故君子之居世也得時則義行失時則鵲起淮南万畢術曰八月榆檽音而令人不飢注曰以美酒漬榆檽曝乾以梁米紫莧實蒸令相合欲不食者三指撮以服之即不飢耳}
