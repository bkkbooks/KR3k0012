  - {type: variant, offset: 1845, length: 1, content: 桑, SBCK: 蕪荑出地赤心者善汜勝之書曰種禾無期因地爲時三月榆莢􅀨時髙地強土可種禾崔寔四民月令曰二月榆莢成者収乾以爲醬隨節早晚勿失其適夢書曰榆爲人君德至仁也夢採榆}
  - {type: page-break, offset: 1845, content: '', id: KR3k0012_SBCK_956-3a}
  - {type: variant, offset: 1845, length: 1, content: 桑, WYG: 蕪荑出地赤心者善汜勝之書曰種禾無期因地為時三月榆莢雨至高地强土可種禾崔寔四民月令曰二月榆莢成者收乾以為醬隨節早晚勿失其時夢書曰榆為人君徳至仁也夢採榆}
  - {type: page-break, offset: 1845, content: '', id: KR3k0012_WYG_956-4b, image: WYG0901/WYG0901-0445b.png}
  - {type: variant, offset: 1845, length: 1, content: 桑, krp: 蕪荑出地赤心者善汜勝之書曰種禾無期因地爲時三月榆莢雨時髙地強土可種禾崔寔四民月令曰二月榆莢成者収乾以爲醬隨節早晚勿失其適夢書曰榆爲人君德至仁也夢採榆}
  - {type: variant, offset: 1847, length: 3, content: 出三輔, SBCK: 受賜恩也夢居樹上得貴官也夢其葉滋茂福禄存也古樂府詩曰天上何所有歷歷種白榆應璩與龐惠恭書曰見所上利民之術殖濟南之榆栽漢中之􅃮嵆康養生論曰豆令人重榆令人瞑愚智所知也桐易緯曰桐枝濡毳而又空中難成易傷湏成氣而後華尚書禹貢曰嶧陽􅀌桐嶧山之陽特生桐中爲琴瑟毛詩卷阿曰梧桐生矣于彼髙崗梧桐柔木也又定之方中曰樹之榛栗椅桐梓􅃮爰伐琴瑟詩義䟽曰梓實桐皮曰椅今民云梧桐也有青桐白桐赤桐白桐冝琴瑟今雲南䍧牱人績以爲布禮記月令曰清明之日桐始華周書曰不始華􅀊有大寒禮斗威儀曰君乘火而王其政平梧桐爲常生爾雅曰櫬梧也今梧桐榮桐木即梧桐後漢書曰蔡邕㤗山行見㸑桐聞爆聲曰此良木也取而爲琴齊書曰豫章王於邸起山}
  - {type: page-break, offset: 1847, content: '', id: KR3k0012_SBCK_956-3b}
  - {type: variant, offset: 1847, length: 3, content: 出三輔, WYG: 受賜恩也夢居樹上得貴官也夢其葉滋茂福禄存也古樂府詩曰天上何所有歴歴種白榆應璩與龎惠恭書曰見所上利民之術植濟南之榆栽漢中之漆嵇康養生論曰豆令人腫榆令人暝愚智所知也桐易緯曰桐枝濡毳而又空中難成易傷湏成氣而後華尚書禹貢曰嶧陽孤桐嶧山之陽特生桐中為琴瑟毛詩卷阿曰梧桐生矣於彼高岡又定之方中曰樹之榛栗椅桐梓漆爰伐琴瑟詩義疏曰梓實桐皮曰椅今民云梧桐也有青桐白桐赤桐白桐宜琴瑟今雲南牂牱人績以為布禮記月令曰清明之日桐始華周書曰不始華嵗有大寒禮斗威儀曰君乘火而王其政平梧桐常生爾雅曰櫬梧也今梧桐榮桐木即梧桐後漢書曰蔡邕行泰山見爨桐聞爆聲曰此良木也取而為琴齊書曰豫章王於邸起山}
