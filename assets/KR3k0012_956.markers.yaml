  - {type: variant, offset: 2607, length: 1, content: 陳, SBCK: 也東門之楊其葉䍧牂䍧牂然盛貌又南山有臺曰南山有桑北山有楊樂只君子􅀖家之光又小弁曰菀彼柳斯鳴蜩嘒嘒柳木茂盛則多蟬又曰菀柳刺幽王也暴虐無親而刑罰不中有菀者柳不尚息焉有宛然柳葉茂盛之柳行路之人豈有不庻幾欲就之止息又東方未明曰折柳樊圃柳弱脆之木樊蕃也折以蕃圃無益也毛詩䟽義曰楊之水不流束蒲蒲柳之木二種一種皮正青一種皮紅白可爲箭竿左傳曰董澤之蒲今人以爲其􅍉可爲矣又曰樹􅂎􅂎柳也生水旁樹如柳葉麤而白木理微赤今人以爲車轂今其水旁魯}
