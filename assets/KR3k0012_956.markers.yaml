  - {type: variant, offset: 2154, length: 4, content: 然王法禁, WYG: 秦記曰初長安謡云鳳凰鳳凰止阿房苻堅遂於阿房植桐數萬株以待}
  - {type: variant, offset: 2159, length: 0, content: '', WYG: 其後慕容冲入阿房城而止焉冲小字鳳凰廣志曰梧桐有白者異國有白桐木其華有白毳取其毳淹漬緝織以為布逰名山志曰吹臺有高桐皆百圍嶧山孤桐方此為劣鄒山記曰鄒山古之嶧山魯穆公改為鄒今鄒山嶧陽猶多桐樹齊地記曰城北十五里有梧桐臺即梧宫也論衡曰李子長為政欲知囚情以梧桐為之象囚形乃鑿地為埳卧木囚其中囚罪若正木囚不動若有寃木囚動出人之精誠著木人也華陽國志曰益州有梧桐木其華采如絲人績以為布名曰華布沈懐逺南越志曰青桐華頗似木綿而輝重過之晉宫闕名曰華林園青白桐三株伏候古今注曰昭帝元鳳三年馮翊人獻桐枝長六尺九枝枝一葉異苑曰晉武帝時呉郡臨平岸崩出一石鼔打之無聲以問張華華云可取蜀中桐材刻作魚形扣之則鳴矣於是如言音聞數十里又曰句章呉平門前忽生一株青桐樹上有謡歌之聲平惡而斫殺平隨軍北征首尾三載死桐歘自還立於故根之上又聞樹顛空中歌曰死樹今更青呉平㝷當歸適聞殺此樹已復有光輝平㝷歸如鬼謡祖台之志怪曰蹇保至檀邱塢上北樓宿暮鼓二中有人著黄練單衣白帢將入持炬火上樓保懼藏壁中湏臾有二婢迎一女子上與白帢人入帳中宿未明白帢人輙先去如是四五宿後向晨白祫人纔去保因入帳中持女子問向去者誰答曰桐郎郎道東廟樹是也至暮鼓二中桐郎來保乃斫取之縛著樓柱明日視之形如人長三丈餘檻送詣丞相渡江未半風浪起桐郎忽投入水風浪乃息齊民要術曰梧桐山石間生}
