  - {type: variant, offset: 288, length: 9, content: 月命野虞無伐桑柘又, SBCK: 榆}
  - {type: variant, offset: 288, length: 205, content: 月命野虞無伐桑柘又曰古者天子諸侯必有公桑蠶室近川而為之左傳曰晉重耳及齊桓公妻之有馬二十乘公子欲安之從者以為不可將行謀於桑下蠶妾在其上以告姜氏姜氏殺之又宣上曰趙宣子田於首山舍於翳桑田獵也翳桑桑之多蔭翳者也見靈輒餓問其病應之曰不食三日矣食之捨其半問之曰宦三年矣未知母之存否今近焉去家近也請以遺之使盡之而為之簞食與肉簞笥置諸橐以與之既而與為公介靈輒為公甲士倒戟以禦公徒而免問其故曰翳桑之餓人也問其名居問所居也不告而退, WYG: 白枌白榆}
