  - {type: variant, offset: 2614, length: 0, content: '', SBCK: 漢書曰上林苑中大栁樹斷卧地一朝起生枝葉有蟲食其葉爲字曰公孫病巳立眭孟以爲木下民之象當有廢故之家孫氏從民間受命爲天子者及昭帝崩無嗣大臣迎立昌邑王王即位􅁋亂失道霍光廢之更立昭帝兄衛太子之孫爲宣帝帝本名病巳}
  - {type: variant, offset: 2614, length: 0, content: '', WYG: 暴虐無親而刑罰不中有菀者柳不尚息焉有菀然茂盛之柳行路之人豈有不庶幾欲就之止息又東方未明曰折柳樊圃柳柔脆之木樊藩也折以藩圃無益也毛詩䟽義曰楊之水不流束蒲蒲柳之木二種一種皮正青一種皮紅白可為箭簳左傳曰董澤之蒲蒲柳也今人以其為萑可笑矣又曰樹把把柳也生水旁樹如柳葉麤而白木理微赤今人以為車轂今淇水旁縁㟁水邊純把柳也大戴禮曰正月柳荑注荑發葉也爾雅曰檉河柳郭璞曰河旁赤葉水楊也旄澤柳生澤中者楊蒲柳詩云楊柳依依傳曰董澤之蒲漢書曰上林苑中僵柳樹一朝起生枝葉有蟲食其葉為字曰公孫病已立晆孟以為木下民之象當有從民間受命為天子者及昭帝崩無嗣大臣迎立昌邑王王即位滛亂無道霍光廢之更立昭帝兄衛太子之孫為宣帝帝本名病已}
