  - {type: variant, offset: 2141, length: 7, content: 原蠶一歲再登非, SBCK: 智有所}
  - {type: variant, offset: 2141, length: 2, content: 原蠶, WYG: 智有所不足故桐不可以為弩又曰夫以巨斧擊桐薪不待利時良日而後破之加巨斧桐薪之上而無人力之奉雖順招揺挾刑徳招揺斗杓也刑十二辰徳十日也而弗能破者以其無勢也淮南萬畢術曰桐木成雲注取十石瓮甖滿以水置桐其中葢之三四日氣如雲作董仲舒請雨書曰秋以桐魚九枚風俗通曰梧桐生於嶧陽山巖石之上採東南孫枝為琴聲甚清雅遁甲經曰梧桐不生則九州異君梧桐以知日月無閏生十二葉}
