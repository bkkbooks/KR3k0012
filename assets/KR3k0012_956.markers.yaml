  - {type: variant, offset: 1448, length: 0, content: '', SBCK: 桓帝曽中蠱歐吐之地乃生榆木趙書曰從幽州大道滹沱造浮橋植行榆五十里置行宫管子曰五沃之土其榆條長莊子曰鵲上髙城之垝而巢於髙榆之㒹城壞巢折凌風而起故君子之居丗也得時則義行失時則鵲起淮南萬畢術曰八月榆檽音而令人不飢注曰以羙酉漬榆檽曝乾以清梁米紫莧實蒸令相合欲不食者三指撮酒以服之即不飢耳}
