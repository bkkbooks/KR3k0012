  - {type: variant, offset: 2772, length: 240, content: 曰沛國張伯遠年十歲時病亡見泰山下有十餘小兒共推一大車車高數丈伯遠亦推之時天風暴起揚塵伯遠因桑枝而住聞呼聲便歸遂蘇髮中皆有沙塵後年大至泰山識桑如死時所見十洲記曰扶桑在碧海中上有天帝宮東王公所治有椹樹長數千丈二千圍兩兩同根更相依倚故曰扶桑仙人食其椹椹體作金色其樹雖大椹如中夏桑椹也稀而色赤九千歲一生實耳味甘香玄中記曰天下之高者扶桑無枝木焉上至天盤蜿而下屈通三泉括地圖曰化民食桑二十七年化而自裹九年生翼十年而死石虎鄴中記曰幸梓苑中盡種桑三月三日及蠶時虎皇后將宮人數千出採桑遊戲其下汜勝之, WYG: 晉}
