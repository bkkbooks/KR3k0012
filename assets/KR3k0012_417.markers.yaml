  - {type: punctuation, offset: 1241, content: 「, id: KR3k0012_CHANT_417-bkkpn399}
  - {type: variant, offset: 1241, length: 0, content: '', SBCK: 諸􅁑恪圍合肥新城城中遣士劉整岀圍傳消息爲賊所得栲問所傳語賊謂整曰諸葛公欲活汝汝可具服整罵曰我當必死爲魏國鬼不茍求活逐汝去也終無他辭又遣使鄭像岀城傳消息恪遣􅀐尋跡得像歸面縛繞城令整像大呼言大將軍巳還洛不如早降像更呼城中大軍近在圍外壯士努力賊以刀築口不使得語遂大呼令城中聞詔追賜整像爵􅀜中侯又曰王修字叔治北海人魏國旣建爲大農郎中令徙爲奉常其後嚴才反與其徒属數十攻掖門修聞變召車馬未至便將官属歩至宫門太祖在銅爵臺望見之曰彼來者必王叔治也相國}
  - {type: page-break, offset: 1241, content: '', id: KR3k0012_SBCK_417-5a}
  - {type: variant, offset: 1241, length: 0, content: '', WYG: 諸葛恪圍合肥新城城中遣士劉整出圍傳消息為賊所得拷問所傳語賊謂整曰諸葛公欲活汝汝可具服整罵曰我當必死為魏國鬼不苟求活逐汝去也終無他辭又遣士鄭像出城傳消息恪遣騎尋跡得像歸面縛繞城令整像大呼言大將軍已還洛不如早降像更呼城中大軍近在圍外壯士努力賊以刀築口不使得語遂大呼令城中聞詔追賜整像爵闗中侯又曰王脩字叔治北海人魏國既建為大司農郎中令徙為奉常其後嚴才反與其徒屬數十攻掖門脩聞變召車馬未至更將官屬步至宫門太祖在銅爵臺望見之曰彼來者必王叔治也相國}
  - {type: page-break, offset: 1241, content: '', id: KR3k0012_WYG_417-7b, image: WYG0896/WYG0896-0650b.png}
