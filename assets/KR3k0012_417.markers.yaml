  - {type: variant, offset: 1242, length: 6, content: 皓字季明潁川, SBCK: 繇謂修曰舊京城有變九卿各居其府修曰食其禄焉避其難居府雖舊非赴難之義也又曰諸葛誕爲鎮東將軍殺楊州刺史樂綝據壽春反遣司馬昭征之斬誕誕麾下三百人不降昭令曰不降皆斬衆咸曰願從諸葛公死不恨矣每斬一人諸人顔色不變時人謂之後代田撗蜀志曰鄧艾伐蜀遣書誘諸葛曕􅀂降者必表爲瑯瑘王瞻怒斬艾使遂戰大敗臨陣死時年三十七衆皆散瞻}
  - {type: variant, offset: 1242, length: 6, content: 皓字季明潁川, WYG: 繇謂脩曰舊京城有變九卿各居其府脩曰食其禄焉避其難居府雖舊非赴難之義也又曰諸葛誕為鎮東將軍殺揚州刺史樂綝㨿壽春反遣司馬昭征之斬誕誕麾下五百人不降昭令曰不降皆斬衆咸曰願從諸葛公死不恨矣每斬一人諸人顔色不變時人謂之後代田橫蜀志曰鄧艾伐蜀遣書誘諸葛瞻若降者必表為琅琊王瞻怒斬艾使遂大戰敗臨陣死時年三十七衆皆散瞻}
