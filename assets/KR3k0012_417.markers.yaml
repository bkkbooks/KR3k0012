  - {type: variant, offset: 3134, length: 2, content: 李銓, SBCK: 曹公察􅀜羽不安使張遼以情問之曰極知曹公待我厚然吾受劉將軍恩不可背之要當立効報公公聞而美之是歳􅀽紹遣顔良攻東郡太守劉延於白馬公使遼羽爲先鋒羽望見麾䇿馬刺良於萬衆之中斬其首還遂解延圍公即表封羽壽亭侯重加賞賜羽盡封其物拜書告辭而歸先主周處別傳曰玄賊齊萬年爲亂乃以處爲建威將軍進軍大戰􅁬劍慷旣仰天歎曰古者將受賑鑿凶門以出盖有進無退我爲大臣以身殉國不亦可乎遂戰死太}
  - {type: page-break, offset: 3134, content: '', id: KR3k0012_SBCK_417-10a}
  - {type: page-break, offset: 3134, content: '', id: KR3k0012_SBCK_417-10b}
  - {type: variant, offset: 3134, length: 2, content: 李銓, WYG: 曹公察雲長不安使張遼以情問之曰極知曹公待我厚然吾受劉將軍恩不可背之要當立功報公公聞而美之是歳袁紹遣顔良攻東郡太守劉延於白馬公使雲長為先鋒雲長望麾䇿馬刺良於萬衆之中斬其首還遂解延圍表封雲長漢壽亭侯重加賞賜雲長封其物拜書告辭而歸先主周處别傳曰氐人齊萬年為亂乃以處為建威將軍進軍火戰奮劒慷慨仰天嘆曰古者將受賑鑿凶門以出蓋有進無退我為大臣以身殉國不亦可乎遂戰死太}
  - {type: page-break, offset: 3134, content: '', id: KR3k0012_WYG_417-16b, image: WYG0896/WYG0896-0654d.png}
  - {type: variant, offset: 3134, length: 2, content: 李銓, krp: 曹公察關羽不安使張遼以情問之曰極知曹公待我厚然吾受劉將軍恩不可背之要當立効報公公聞而美之是歳袁紹遣顔良攻東郡太守劉延於白馬公使遼羽爲先鋒羽望見麾䇿馬刺良於萬衆之中斬其首還遂解延圍公即表封羽壽亭侯重加賞賜羽盡封其物拜書告辭而歸先主周處別傳曰玄賊齊萬年爲亂乃以處爲建威將軍進軍大戰奮劍慷旣仰天歎曰古者將受賑鑿凶門以出盖有進無退我爲大臣以身殉國不亦可乎遂戰死太}
