  - {type: variant, offset: 3084, length: 6, content: 李孟元修易論, SBCK: 魏伐蜀羅獻爲巴東太守得劉禪委質定問乃帥所部臨于都亭三日吴聞蜀巳敗遂起兵西上外託援救内欲襲獻城以固其國遣盛㬅等水陸到􅀃獻以合同之計獻乃㑹議曰今夲朝傾覆吴爲同盟不恤我難而邀其利可主降於北臣求福於東乎今守孤城百姓未定冝一決戰以定衆心遂衘枚夜擊破㬅旋軍保城告誓將士厲以節義莫不用命襄陽記曰劉備以習珎爲零陵北部都尉孫權遣潘濬討珎珎帥數百人登山自將濬乃單將左右自到山下交}
  - {type: page-break, offset: 3084, content: '', id: KR3k0012_SBCK_417-9b}
