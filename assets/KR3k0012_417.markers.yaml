  - {type: variant, offset: 1421, length: 205, content: 牛馬負妻子入草中又遇賊掠牛馬去攸語妻曰吾弟早亡唯有一息今當步走誓兩兒恐盡死不如棄我兒抱弟子遺民婦乃從之崔鴻十六國春秋前趙錄曰上郡王俊字玄英有幹藝之稱俊年七八歲隨兄密子元直西如涼州路中糧匱密留元直於途乞丐民間比還俊為賊所掠元直逃免密乃將元直追賊叩頭求哀曰人情自當皆愛其子但此弟未生家君見背孤遺相長以至于今請以元直易俊賊相謂曰以子易弟義之大也於是以俊密受元直而去密後亡俊勺飲不入口者五日雖服喪朞年而心喪六載又前燕錄, SBCK: 檄示焉雄}
