  - {type: variant, offset: 1304, length: 7, content: 顏含字弘都瑯琊, SBCK: 譙王承爲湘州刺史王敦遣叅軍桓羆􅀃承以劉隗專寵令討之請承爲軍司馬承歎曰吾其死矣地荒民飢􅀔􅀌援絶赴君難忠也死王事義也得忠與義亦復何求便唱義衆府長史長沙}
