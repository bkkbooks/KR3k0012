  - {type: variant, offset: 175, length: 209, content: 失道故作棠棣焉周公吊二叔之不咸而使兄弟恩䟽召公為作此詩而歌以親之也棠棣之華萼不韡韡箋云承華曰萼不當作拊拊萼足得華之光明其貌韡韡然盛也興者喻弟以敬事兄兄以榮覆弟恩義之敬亦韡韡然也凡今之人莫如兄弟又邶柏舟二子乘舟曰二子乘舟思伋壽也衛宣公之二子爭相為死國人傷而思之而作是詩也二子乘舟汎汎其景二子伋壽也宣公為伋娶於齊女而美公奪之而生壽及朔朔與其母訴伋於公公全伋之齊使賊先待於隘而殺之壽竊其節而先往賊殺之伋至曰君命殺我彼何罪焉又, SBCK: 肩皆}
