  - {type: variant, offset: 2803, length: 0, content: '', SBCK: 七列未及崔子一列而死又曰楚有士申鳴者在家而養其父孝聞於楚國王欲授之相申鳴辭不受其父曰王欲相汝汝何不受乎申鳴對曰捨父之孝子而爲王之忠臣何也其父曰使有禄於國立義於庭汝樂吾無憂矣吾欲汝之相也申鳴曰喏遂入朝楚王因授之相居三年白公爲亂殺司馬子期申鳴將徃死之父止之曰棄父而死其可乎申鳴曰聞}
