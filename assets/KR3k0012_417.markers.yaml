  - {type: variant, offset: 663, length: 428, content: 縛先季死賊憐而放遣之又曰趙孝字長平建武穀食尚少孝得穀炊將熟令弟禮夫妻出比還孝夫妻共蔬食禮夫妻歸告言已食輒獨飲之積久禮心怪之疑後掩伺見之不肯食出遂共蔬食兄弟怡怡鄉里歸德又曰孔奮篤於骨肉弟奇在雒陽為諸生分祿奉以供給其糧用四時送衣下至脂燭每有所食甘美輒分減以遺奇謝承後漢書曰許荊兄子常報讎殺人怨家會眾操兵至荊家欲殺之會荊始從府休歸與相遇因出門解劍長跪曰前無狀相犯咎皆在荊不能相教兄既早沒一子為嗣如令死者傷其滅絕今願殺身代之塞咎雖死已往猶謂更生怨家扶起荊曰許掾郡中稱為賢吾何敢相侵因遂委去又曰李鴻字奉遜禮性仁孝友于兄弟弟育為人所侵辱育後陰結客報怨為執法吏所得當伏罪時未有立嗣鴻為太尉掾在京師傷育以養刷恥門戶斷絕因分代育遂刻印還歸欲過家恐見妻子虧移其意到縣北亭預作記乞代育通記便飲酖而之縣令省記怛然驚感矣司馬彪續漢書曰山陽張儉以忠正為中常侍侯覽所忿疾覽為刑章下州郡召捕儉儉與孔融兄褒有舊亡投遇褒出時融年十五六少之不下告也融知儉長者有窘迫色謂曰吾獨不能為君主乎因留舍藏, SBCK: 旦及昏復大破}
