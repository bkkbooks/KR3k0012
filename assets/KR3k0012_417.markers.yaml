  - {type: variant, offset: 3137, length: 177, content: 丘人也少聰慧有至行銓兄前母子後母甚不愛也而衣食皆使下銓銓始年五歲覺己衣服勝兄即脫不著須兄得己同然後服之母遂不得有偏及長銓內匡順母外奉其兄故閨門雍睦為群族所稱杜預汝南記曰李充兄弟六人貧無擔石之儲易衣而出并日而食而妻竊謂充曰今貧如是我有私財可分異獨居人多費極無為空自窮也充請呼諸鄰里室家相對前跪觴告其母便顧其妻叱而遣之婦行泣出門去顏延之庭誥曰將責弟悌務念為友, SBCK: 御覽卷第四百一十七}
