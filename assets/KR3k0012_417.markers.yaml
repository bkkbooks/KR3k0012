  - {type: variant, offset: 2804, length: 0, content: '', SBCK: 仕者身歸於君而禄歸於親今去子事君得無死其難乎遂辭而徃因以兵圍之白公謂石乞曰申鳴者天下之孝子也徃刧其父以事兵申鳴聞之必來來與之語白公曰善則徃取其父持之以兵告申鳴曰子與吾吾與子分楚國子}
