  - {type: variant, offset: 1183, length: 3, content: 伯淮彭, SBCK: 次房太原人爲護羗校尉行部至襄武爲隗􅅝別將苟宇等所刧宇謂序曰子􅀂與我并威同力天下可圖也序曰受國重任分當效死義不貪生茍背恩德宇等復曉譬之序素有氣力大怒叱宇等曰虜何敢迫脅漢將因以節撾殺數人賊衆争欲殺之宇止之曰此義士有死節可賜以釼序受釰衘􅁂于口顧左右曰旣爲賊所殺無令鬢汙土遂伏釰而死英雄記曰王允誅董卓卓部曲將李􅔸郭氾不自安遂合謀攻圍長安}
