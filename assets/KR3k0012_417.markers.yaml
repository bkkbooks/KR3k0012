  - {type: variant, offset: 1312, length: 6, content: 含次嫂繁氏老, SBCK: 虞悝慷􅁣有志節共盟誓囚桓羆馳檄湘川於是一州之内並皆同赴又曰蘇峻反桓彛爲宣城内史徃赴朝廷長史禆惠等咸以冝且桉甲以謀湏衆力齊集彛厲色曰夫見無禮於其君者誅之如鷹鸇之逐鳥雀今社稷之難}
  - {type: page-break, offset: 1312, content: '', id: KR3k0012_SBCK_417-6a}
