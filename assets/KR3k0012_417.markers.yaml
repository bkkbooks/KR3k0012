  - {type: variant, offset: 60, length: 0, content: '', SBCK: 戰於殽也晉梁弘御戎萊駒爲右戰之明日晉㐮公縳􅁗囚使萊駒以戈斬之囚呼萊駒失戈狼瞫取戈以斬囚禽之從公乗遂以爲右箕之􅃥先軫黜之而立續簡伯狼瞫怒其友曰盍死之瞫曰吾未􅀗死所其友曰吾與汝爲難瞫曰周志有之勇則害上不登於明堂死而不義非勇也共用之謂勇吾以勇求右無勇而黜亦其所也謂上不我知黜而冝乃知我矣}
  - {type: page-break, offset: 60, content: '', id: KR3k0012_SBCK_417-1b}
  - {type: variant, offset: 60, length: 0, content: '', WYG: 戰於殽也晉梁宏御戎萊駒為右戰之明日晉襄公縛秦囚使萊駒以戈斬之囚呼萊駒失戈狼曋取戈以斬囚禽之從公乗遂以為右箕之役先軫黜之而立續簡伯狼曋怒其友曰盍死之曋曰吾未獲死所其友曰吾與汝為難曋曰周志有之勇則害上不豋於明堂死而不義非勇也共用之謂勇吾以勇求右無勇而黜亦其所也謂上不我知黜而宜乃知我矣}
  - {type: variant, offset: 60, length: 0, content: '', krp: 戰於殽也晉梁弘御戎萊駒爲右戰之明日晉㐮公縳秦囚使萊駒以戈斬之囚呼萊駒失戈狼瞫取戈以斬囚禽之從公乗遂以爲右箕之役先軫黜之而立續簡伯狼瞫怒其友曰盍死之瞫曰吾未獲死所其友曰吾與汝爲難瞫曰周志有之勇則害上不登於明堂死而不義非勇也共用之謂勇吾以勇求右無勇而黜亦其所也謂上不我知黜而冝乃知我矣}
  - {type: variant, offset: 61, length: 1, content: 路, SBCK: 姑待之及彭衙旣陳以其屬馳􅁗師死焉晉師從之大敗􅁗師又宣公下曰楚圍宋宋人告急于晉使解楊如宋使無降楚曰晉師悉起將至矣鄭人囚而獻諸楚楚子厚賂之使反其言反言晉不救不許三而許之登諸樓車使呼宋人而告之遂致其君命楚子將殺之使與之言曰爾旣許不榖而反之何故非我無信女則棄之速即爾刑對曰臣聞之君能制命爲義臣能承命爲信信載義而行之爲利謀不失利以衛社稷民之主也義無二信信無二命君之賂臣不知命也受命以岀}
