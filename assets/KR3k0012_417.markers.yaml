  - {type: variant, offset: 2460, length: 170, content: 仵薩求代棘及後軍期應死棘薩爭死妻許氏又遙屬棘曰君當門戶豈可委罪小郎且大家臨終以小郎屬君竟未有妻息君已二兒死復何恨太守張岱表聞詔牓門宋世祖感其悌友乃普增諸弟封秩列女傳曰會稽石師安妻者同郡呂氏之女也名軍其兄遂犯法軍匿之知不能免乃請智者為辭乞代兄遂之命因自經縣門縣官嘉有義乃捨遂罪又曰齊義繼母者齊二子之母也當宣王時有人鬭死道者吏診之二子立其傍吏問, SBCK: 旅臣}
