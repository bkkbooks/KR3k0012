  - {type: variant, offset: 2201, length: 11, content: 白居易弟行簡字知退文筆, SBCK: 張廵守雎陽在圍中每戰皆登城大呼以助軍􅀔皆血流面牙齒皆咬碎城將䧟廵西向拜曰臣不能全􅀌城今爲賊凌逼誓願爲􅀑與賊爲厲以荅聖明及城䧟尹子竒入城見廵問曰聞公毎督戰皆裂嚙碎牙齒因以大刀剔其口見其存者不過三數將存之廵大詈之賊黨皆曰此人必不爲我用又得衆死心不可留故害之五代史曰後唐應順末少帝失位自洛渉河與數百􅀐欲奔鄴時晉髙祖改鎭常山亦自郡􅍗􅏱夜與帝遇於獲嘉東遂俱入衛郡郵舎中是夜少帝伏甲欲與徒臣謀害晉髙祖詐屏人對語方坐於亭廡帝宻遣御士石敢䄂鎚立其後伏甲者俄起左右驚優敢素}
  - {type: page-break, offset: 2201, content: '', id: KR3k0012_SBCK_417-7b}
  - {type: variant, offset: 2201, length: 11, content: 白居易弟行簡字知退文筆, WYG: 張巡守睢陽在圍中每戰皆登城大呼以助軍勢皆血流面牙齒皆咬碎城將陷巡西向拜曰臣不能全孤城今為賊陵逼誓願為鬼與賊為厲以答聖明及城陷尹子竒入城見巡問曰聞公每督戰皆裂嚙碎牙因以大刀剔其口見其存者不過三數將存之巡大詈之賊黨皆曰此人必不為我用又得衆死心不可留故害之五代史曰後唐應順末少帝失位自洛涉河與數百騎欲奔鄴時晉高祖改鎮常山亦自郡詣闕夜與帝遇於獲嘉東遂俱入衛郡郵舎中是夜少帝伏甲欲與徒臣謀害晉高祖詐屏人對語方坐於亭廡帝宻遣御士石敢袖鎚立其後伏甲者俄起左右驚擾敢素}
