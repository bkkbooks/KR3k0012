  - {type: variant, offset: 526, length: 142, content: 鄴中記曰并州俗以介子推五月五日燒死世人為其忌故不舉食飼非也北方五月五日自作飲食飼神及作五色縷五色辛盤相問遺不為介子推也荊楚歲時記曰五月五日西人並蹋百草今人又有鬥百草之戲又曰五月五日競渡俗為屈原投汩羅日傷其死所並命舟楫以拯之舸舟取其輕利謂之飛鳧一自以為水軍一自以為水馬州將及土人悉臨水而, SBCK: 因詢}
