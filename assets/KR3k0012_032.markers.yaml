  - {type: variant, offset: 483, length: 2, content: 王鳳, SBCK: 漢武帝宫人賈佩蘭九月九日佩茱茰食餌飲菊花酒云令人長壽盖相一傳自古莫知其由豫章記曰龍沙在郡北帶江沙甚㓗白髙峻而陂有龍形俗爲九日登髙處又曰郡北龍沙九月九日所遊宴處其俗皆然也案南陽酈縣有菊水民居其側者壽並百二三十歳漢時劉寛􅀽隗甞臨此郡月致三十斛水}
