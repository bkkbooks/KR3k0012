  - {type: variant, offset: 379, length: 0, content: '', WYG: 九月九日登髙飲酒婦人帶茱茰囊因此也晉書曰孟嘉為㕘軍既和而正桓温重之九月九日温逰龍山僚属畢集風吹嘉㡌落不覺如厠孫盛時在坐温授紙筆命嘲之著嘉坐處嘉歸見之笑而請紙即答了不容思言速成也續晉陽秋曰陶潜九月九日無酒宅邊東籬下菊藂中擿盈把坐其側未幾望見白衣人至乃王𢎞送酒也即便就醉而後歸又曰寧康三年九月九日上嘗講孝經謝安侍坐陸約并卞躭執讀謝石袁宏並執經車𦙍王温摘句南齊書曰髙祖以九月九日登商飈館在孫陵寺岡世呼為九日臺在縣北八里一百步當孫陵岡曲街也又曰南齊以九月九日馬射或說秋金氣講習武事象漢立秋之禮又曰宋武帝為宋公在彭城九月九日出登項羽戲馬臺至今相承以為故事荆楚嵗時記曰九月九日四民並藉野飲讌杜公瞻云九月九日宴會未知起于何代然自漢至宋未改今北人亦重此節近代皆宴設于臺榭風土記曰九月九日律中無射而數九俗于}
