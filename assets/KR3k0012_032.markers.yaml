  - {type: variant, offset: 2952, length: 438, content: 高祖方曝書令史竊知還具以告乃重遣辟之勑行者曰若復不動便可收之高祖懼而應命後魏書曰太祖道武皇帝韓珪七月七日生於參合陂又曰任城王澄為雍州功縗在身故以七月七日集文武馬射張普惠字洪賑為錄事參軍奏記請停列仙傳曰陶安公者六安鑄治師也一朝火散上紫色衝天安公伏治下求哀須臾朱雀止治上曰安公治與天通七月七日迎汝以赤龍至日龍來安公騎之東南而去邑中數萬人預共送之皆與辭訣又曰王子喬周靈王太子晉也好吹笙作鳳鳴遊伊洛之間浮丘公椄以上嵩高山二十餘年後於山中謂桓良曰告我家七月七日待我緱氏山頭是日果乘白鶴駐山嶺望之不得到舉手謝時人數日而去又曰吳蔡經去家時已老及還更少壯頭髮皆黑語家中言七月七日王君當來可作數百斛飲擬之至期日王方平果來乘羽車駕五龍聞金鼓簫管人馬之聲荊楚歲時記曰七夕婦人結綵縷穿七孔針或以金銀鍮石為針宋孝武七夕詩曰迎風披采縷阿月貫玄針陳瓜果於中庭以乞巧有喜子網於瓜上以為符應周處風土記云七月初七日其夜灑掃中庭然則中庭乞願其舊俗乎又曰魏時人或問董勛云七月七日為良日飲食不同於古何也勛云七月黍熟七日, WYG: 九}
