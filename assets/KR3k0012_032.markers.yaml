  - {type: variant, offset: 1355, length: 220, content: 告之文遂啟父曰不舉五月子何父云生及戶損父文曰壽命於天豈壽命於戶若壽命於戶何不高其戶誰能至其戶耶父知賢為賢齊封為孟常君世說曰胡廣本姓黃五月五日生父母惡之置瓮中投於江胡翁聞瓮中有兒啼往取之養為子遂七登三司會稽典錄曰女子曹娥者會稽上虞人父能絃歌為巫漢安二年五月五日於縣江泝濤迎波沉溺死不得尸娥年十四沿江號哭晝夜不絕聲七日遂投江而死習鑿齒與禇常侍書曰想往日與足下及江州五月五日共澡浴戲處追尋宿眷髣髴王儀心實悲矣國史補曰揚州舊貢江心鏡五月五日楊子江中, SBCK: 對即是佐卿}
