  - {type: variant, offset: 372, length: 1, content: 死, SBCK: 正温甚重之九月九日温遊龍山僚屬畢集風吹嘉帽落不􅁴如厠孫盛時在坐温授紙筆命嘲之着嘉坐處嘉歸見之􅀏而請􅁓即荅了不容思言速成續晉陽秋曰陶潜九月九日無酒宅邊東籬下菊叢中擿盈把坐其側未幾望見白衣人至乃王􅀪送酒也即便就醉而後歸又曰寧康三年九月九日上嘗講孝經謝安侍坐陸納并卞躭執讀謝石􅀽宏並執經車狷王温摘句南齊書曰髙祖以九月九日登髙飈舘在孫陵寺崗世呼爲九日臺在縣北三里一百歩當孫陵崗曲街也又曰南齊以九月九日馬射或􅀃秋金氣講習武事象漢立秋之禮又曰宋武帝爲宋公在彭城九月九日出項羽戯馬臺至今相承以爲故事荆}
