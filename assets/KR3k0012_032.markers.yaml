  - {type: variant, offset: 2394, length: 285, content: 銷爍萬物故損人因避之稽含因熱賦序曰三伏之節始奏啇秋之辰未期余下俚貧生居室卑陋狹巷不來清風短廡不足增蔭歎彼夏屋之士體逸高廊並天而寒暑殊同世而憂樂異矣程曉詩曰平生三伏時道路無行車閉門避暑臥出入不相過今世能襶子觸熱到人家主人聞客來嚬蹙柰此何搖扇臂中疼流汗正滂沱傳戒諸高明熱行宜見呵晉潘岳懷縣詩曰南陸迎脩景朱明送末垂初伏啟新節隆暑亦赫曦七月七日漢武帝故事曰景帝嘗夢高祖謂己曰王美人生子可名為彘以乙酉年七月七日旦生武帝於猗蘭殿謹按洞冥記漢武帝未生之時景帝夢一赤彘從雲中直下崇芳閤帝覺而坐於閤果見赤氣從雲中直下如林木蔽牖望閤上有丹霞鬱既而乃改崇芳閣為猗蘭殿後王夫人生武帝也又曰七月七, WYG: ''}
