  - {type: variant, offset: 490, length: 1, content: 生, SBCK: 或旬朔言歸青城甚爲道流之所傾仰一日忽自外至神爽不怡謂院中人曰吾行山中偶爲飛矢所加㝷巳無恙矣然此箭非人間所有吾留之於壁上後年箭主到此即冝付之愼無墜失仍援毫記壁云留箭之時則十三載九月九日也􅀇宗避狄幸蜀暇日命駕行遊偶至斯觀樂}
