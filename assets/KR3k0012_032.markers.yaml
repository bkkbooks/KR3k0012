  - {type: variant, offset: 2152, length: 0, content: '', WYG: 望楚山有三名一名馬鞍山一名災山宋元嘉中武陵王駿為刺史屢登之鄙其舊名望郢山因改為望楚山後遂龍飛是孝武所望之處時人號為鳯嶺髙處有三磴即劉洪山簡九日宴賞之所也姑熟記曰縣南十里有九井山殷仲文九日從桓公九井賦詩即此山是也臨海記曰郡北四十里有湖山山形平正可容數百人坐民俗極重九日每菊酒之辰宴㑹于此山者常至三四百人登之見已屋悉委江海分明夀陽記曰州有義門舍有數百人每至九日於}
