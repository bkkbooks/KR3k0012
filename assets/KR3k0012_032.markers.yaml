  - {type: variant, offset: 368, length: 3, content: 投汩羅, SBCK: 汝家當有灾厄冝急去令家人各作綘囊盛茱茰以繫臂登髙飲菊花酒此禍消景如言舉家登山夕還見鷄牛羊一時􅁀死長房聞之曰此可以代矣今世人毎至九月九日登髙飲酒婦人帶茱茰囊因此也晉書曰孟嘉爲桓温參軍旣和}
