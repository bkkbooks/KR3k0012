  - {type: variant, offset: 2704, length: 687, content: 朔曰此西王母欲來也有頃王母至有二青鳥如烏夾侍王母旁之又曰王母遣謂帝曰七月七日我當暫來帝至日掃宮內燃九華之燈又曰漢武帝內傳曰帝登尋真之臺齊至七月七日夜忽見天西南如白雲起鬱鬱直來趨宮有頃西王母至乘紫雲之輦又曰七月七日乃掃除宮掖之內張雲錦之帷燃九光微燈夜二唱後西王母駕九色之班龍上殿又曰七月七日西王母降武帝戴太真晨纓之冠履玄瓊鳳文之舄宋卜子楊園苑䟽曰太液池西有武帝曝衣閤常至七月七日宮女出后登樓襮衣晉書曰魏武帝辟高祖以漢祚將終不欲屈節於曹氏辭以風痺不能起居魏武遣親信令史微服於高祖門下樹蔭下息時七月七日高祖方曝書令史竊知還具以告乃重遣辟之勑行者曰若復不動便可收之高祖懼而應命後魏書曰太祖道武皇帝韓珪七月七日生於參合陂又曰任城王澄為雍州功縗在身故以七月七日集文武馬射張普惠字洪賑為錄事參軍奏記請停列仙傳曰陶安公者六安鑄治師也一朝火散上紫色衝天安公伏治下求哀須臾朱雀止治上曰安公治與天通七月七日迎汝以赤龍至日龍來安公騎之東南而去邑中數萬人預共送之皆與辭訣又曰王子喬周靈王太子晉也好吹笙作鳳鳴遊伊洛之間浮丘公椄以上嵩高山二十餘年後於山中謂桓良曰告我家七月七日待我緱氏山頭是日果乘白鶴駐山嶺望之不得到舉手謝時人數日而去又曰吳蔡經去家時已老及還更少壯頭髮皆黑語家中言七月七日王君當來可作數百斛飲擬之至期日王方平果來乘羽車駕五龍聞金鼓簫管人馬之聲荊楚歲時記曰七夕婦人結綵縷穿七孔針或以金銀鍮石為針宋孝武七夕詩曰迎風披采縷阿月貫玄針陳瓜果於中庭以乞巧有喜子網於瓜上以為符應周處風土記云七月初七日其夜灑掃中庭然則中庭乞願其舊俗乎又曰魏時人或問董勛云七月七日為良日飲食不同於古何也勛云七月黍熟七日為, krp: 苦旅鴈違霜雪淒淒}
