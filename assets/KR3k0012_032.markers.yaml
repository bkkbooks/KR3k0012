  - {type: variant, offset: 3981, length: 254, content: 公主法曾試有效世說曰郝隆七月七日見鄰人皆曝晒衣物隆乃仰出腹臥云曬書崔寔四民月令曰七月七日作麴合籃丸及蜀漆丸暴經書及衣裳習俗然也又曰世傳竇后少小頭禿不為家人所齒遇七夕人皆看織女獨不許后出乃有神光照室為后之瑞竹林七賢論曰阮咸字仲容籍兄子也諸阮前世儒學善屋室內足於財唯籍一巷尚道業好酒而貧舊俗七月七日法當曝衣諸阮庭中爛然莫非綈錦咸時揔總角乃堅長竿摽大布犢鼻禈於庭中曰未能免俗聊復共爾酉陽雜俎曰魏僕射收臨代七月登舜山徘徊顧眺謂主簿崔撫曰吾所經多矣於山川沃壤襟帶形勝天下名州不能過此唯未審東陽何如撫對曰青得古名齊得舊號, SBCK: 御覽卷第三十}
