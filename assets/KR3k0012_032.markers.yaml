  - {type: variant, offset: 3371, length: 252, content: 為良日飲食不同於古何也勛云七月黍熟七日為陽數故以麋為珍今北人唯設湯餅無復有麋矣又曰陸雲與兄平原書曰機為平原相一日按行曹公器物書刀五板瑠璃筆一枚景初二年七月七日劉婕好云見此使人恨然案魏武帝於漢為相不得有婕好又景初是魏明帝年如此則文帝物也與曹公器玩同處故致舛雜矣日緯書曰牽牛星荊州呼為河鼓主關梁織女星主瓜果嘗見道書云牽牛娶織女取天帝錢二萬備禮久而不還被驅在營室是也言雖不經有是為怪也西京雜記曰戚夫人侍兒賈佩蘭云在宮時見戚夫人侍高祖至七月七日於臨百子池作于滇樂畢以五色縷相霸謂為連受又曰漢彩女常以七月七日穿針於, SBCK: 幾花}
