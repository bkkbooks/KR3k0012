  - {type: variant, offset: 3491, length: 937, content: 器玩同處故致舛雜矣日緯書曰牽牛星荊州呼為河鼓主關梁織女星主瓜果嘗見道書云牽牛娶織女取天帝錢二萬備禮久而不還被驅在營室是也言雖不經有是為怪也西京雜記曰戚夫人侍兒賈佩蘭云在宮時見戚夫人侍高祖至七月七日於臨百子池作于滇樂畢以五色縷相霸謂為連受又曰漢彩女常以七月七日穿針於開襟樓俱以習俗也輿地志曰齊武帝起層城觀七月七日宮人多登之穿針世謂之穿針樓淮南子曰七月七日午時取生瓜葉七枚直入北堂中向南立以拭面靨即當滅矣又萬畢術曰七月七日採守宮陰去聲乾之合以井華水和塗女身有文章即以丹塗之不去者不淫去者有姦晉周處風土記曰七月初七日其夜灑掃於庭露施几筵設酒脯時果散香粉於筵上以祈河鼓爾雅曰河鼓謂之牽牛織女言此二星辰當會守夜者咸懷私願咸云見天漢中有弈弈白氣有光耀五色以此為徵應見者便拜而願乞富乞壽無子乞子唯得乞一不得兼求三年乃得言之頗有受其祚者梁吳均齊諧記曰桂陽成武丁有仙道忽謂其弟曰七月七日織女何事渡河荅曰暫詣牽牛世人至今云織女嫁牽牛也韋氏月錄曰龍魚河圖云七月七日取赤小豆男吞一七女吞二七令人畢歲無病又曰七月七日晒曝革裘無虫又曰合烏雞藥是七月七日取烏雞血和三月三日桃花末塗面及遍身三二日肌白如玉此是太平公主法曾試有效世說曰郝隆七月七日見鄰人皆曝晒衣物隆乃仰出腹臥云曬書崔寔四民月令曰七月七日作麴合籃丸及蜀漆丸暴經書及衣裳習俗然也又曰世傳竇后少小頭禿不為家人所齒遇七夕人皆看織女獨不許后出乃有神光照室為后之瑞竹林七賢論曰阮咸字仲容籍兄子也諸阮前世儒學善屋室內足於財唯籍一巷尚道業好酒而貧舊俗七月七日法當曝衣諸阮庭中爛然莫非綈錦咸時揔總角乃堅長竿摽大布犢鼻禈於庭中曰未能免俗聊復共爾酉陽雜俎曰魏僕射收臨代七月登舜山徘徊顧眺謂主簿崔撫曰吾所經多矣於山川沃壤襟帶形勝天下名州不能過此唯未審東陽何如撫對曰青得古名齊得舊號二處山川形勢相似曾聽所論不能踰越公遂命筆為詩雜異書曰時有女子尚幼七夕見家人出庭望候天門開獨在室中不出曰若合當見者雖暗室中亦應見之至夜深忽見天上門開雲物赫弈因求富及長嫁而富既寡眾累鉅萬有賈客貨其絹百匹去而舩覆溺資貨皆沒其女子偶開後房見絹在其中但濕耳後賈客歸而自首女子曰絹歸矣驗之而信亦出夷聖堅舞亦是開元以後事國史補曰興元元年七月七日斬偽官喬琳將臨刑嘆曰琳以七月七日生亦以此日死豈非命也夫古, WYG: 戲馬臺}
