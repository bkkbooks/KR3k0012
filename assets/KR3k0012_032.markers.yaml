  - {type: variant, offset: 670, length: 217, content: 又曰是月俗忌蓋屋及曝薦席風俗通云五月蓋屋令人頭禿又巽苑云新野庚寔家嘗以五月暴席忽有一小兒於席下俄失所在其後寔女子遂亡相傳彌以忌為此條通五月之事今附於此又曰五月五日荊楚人並蹋百草將艾以為人懸門戶上以攘毒氣故師曠占曰歲病則艾草先生也風土記曰仲夏端五端初也俗重五日與夏至同先節一日又以菰葉褁粘米以粟棗灰汁煮令熟節日啖煮肥龜令極熟去骨加尸豉麻蓼名曰葅龜黏米一名粳一曰角黍蓋取陰陽尚包褁未之象也龜表肉裏陽內陰外之形所以贊時也抱朴子曰或問辟五兵之, SBCK: ''}
