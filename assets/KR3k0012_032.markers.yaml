  - {type: variant, offset: 2689, length: 212, content: 忽有鳥從西方來集殿前上問東方朔朔曰此西王母欲來也有頃王母至有二青鳥如烏夾侍王母旁之又曰王母遣謂帝曰七月七日我當暫來帝至日掃宮內燃九華之燈又曰漢武帝內傳曰帝登尋真之臺齊至七月七日夜忽見天西南如白雲起鬱鬱直來趨宮有頃西王母至乘紫雲之輦又曰七月七日乃掃除宮掖之內張雲錦之帷燃九光微燈夜二唱後西王母駕九色之班龍上殿又曰七月七日西王母降武帝戴太真晨纓之冠履玄瓊鳳文之舄宋卜子楊園苑䟽曰太液池西有武帝曝衣閤常至七月七日宮女出后登樓襮衣晉, WYG: 與鍾繇}
