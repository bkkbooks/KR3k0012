  - {type: variant, offset: 4560, length: 386, content: 取時務聊可尋宋謝惠連詠牛女詩曰落日隱簷楹升月照簾櫳團團滿葉露淅淅振條風蝶足年闕相從遐川阻昵愛脩渚曠清容弄杼不成藻聳轡騖前蹤昔離秋已雨今聚夕無雙傾河易廻幹款情難久悰沃若靈駕旋寂寞雲幄空留情顧華寢遙心逐奔龍宋顏延之織女贈牽牛詩曰婺女麗經星姮娥捷飛月慚無一媛靈託身侍天闕閭殊闔未央銀河豈沐髮漢陰不夕悵長河為誰越有促讌歸期萬頃涼風發非怨杼柚勞但念芳菲歇宋謝莊七夕詠牛女應詔詩曰輟機起春暮停箱動秋襟琥車照漢右芝駕肅河陰珠殿釭未暗瑤庭露已深夜清豈淹抑弦徽無久臨蘇彥七月七日詠織女詩曰火流涼風至少昊協素藏織女思北征牽牛歎南陽時來嘉慶集整駕巾玉箱瑗佩垂藻蕤霧裙結雲裳金翠耀華輜軿軒散流芳釋轡紫微庭解襟碧琳堂忻燕未及究晨暉照扶桑仙童唱道情盤螭起騰驤悵悵一霄促遲遲別日長梁簡文帝七夕穿針欹疑詩曰憐從帳裏出想見夜窗開針欹疑月暗縷散恨風來梁劉孝儀詠織女詩曰金鈿已照耀白日未蹉跎欲待黃昏至含嬌渡淺河, WYG: 緩轍}
