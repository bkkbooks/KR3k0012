  - {type: variant, offset: 486, length: 0, content: '', SBCK: 自供續搜神記曰有一書生居吴自稱胡􅀶士以經傳教授假借諸書經傳年載忽不復見後九日人相與登山遊觀但聞講誦聲㝷覔有一空塚入數歩群狸羅坐見人迸走唯有一狸獨不能去是常假書者集異記曰明皇天寳十三年重陽日獵於沙苑雲間有􅀌鶴佪翔焉上親御弧矢一發而中其鶴則帶箭徐墜將及地丈許歘然矯翰西南而遊萬衆極目良乆乃滅益州城距郭十}
