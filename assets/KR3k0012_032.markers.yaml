  - {type: punctuation, offset: 173, content: 「, id: KR3k0012_CHANT_032-bkkpn53}
  - {type: variant, offset: 173, length: 2, content: 崔信, SBCK: 代序七月望日於内道􅂣造盂蘭盆飾以金翠所費百萬又設髙祖巳下七聖神座備幡節龍傘衣裳之制各書尊號于幡上以識之舁出内庭陳於寺觀是日排儀仗百寮序立於光順門以俟之幡花鼓舞迎呼道路歳以爲常而識者嗤其不典唐楊盈川盂蘭盆賦曰渾元告秋羲和奏曉太隂望􅀆圎魄皎閶闔開􅀆凉風嫋四海澄􅀆百川皛隂陽肅􅀆天地窅掃離宫清重閣設一皇邸張翠幕鸞飛鳯翔睒䁑倐爍雲舒霞布翕赫䀜霍陳法供飾盂蘭壯神功之妙物何造化之多端青蓮吐而非夏頳果摇而不寒銅鐵鈆錫璆琳琅玕映以甘泉之玉樹冠以承露之金盤憲章三極儀形萬􅀋上寥廓􅀆法天下安貞􅀆象地殫怪力窮神異少君王子掣曳􅀆􅀂來玉女瑤􅁎翩僊􅀆不至鳴鷫鸘與鸑鷟舞鶤鷄與翡翠毒龍怒􅀆赫然狂象奔􅀆沉醉怖魍魎潜魑魅离婁}
  - {type: page-break, offset: 173, content: '', id: KR3k0012_SBCK_032-2a}
  - {type: variant, offset: 173, length: 2, content: 崔信, WYG: 代宗七月望日扵内道塲造盂蘭盆飾以金翠所費百萬又設髙祖以下七聖神座備幡節龍傘衣裳之制各書尊號於幡上以識之舁出内庭陳於寺觀是日排儀仗百僚序立於光順門以候之幡花鼓舞迎呼道路嵗以為常而識者嗤其不典唐楊盈川盂蘭盆賦曰渾元告秋羲和奏曉太隂望兮圓魄皎閶闔開兮凉風嫋四海澄兮百川皛隂陽肅兮天地悄掃離宫清重閣設皇邸張翠幕鸞飛鳳翔燄暘倐爍雲舒霧布翕赫䀜霍陳法供飾盂蘭壯神功之妙物何造化之多端青蓮吐而非夏頳果揺而不寒銅鐡鈆錫璆琳琅玕映以甘泉之玉樹冠以承露之金盤憲章三極儀刑萬類上寥廓兮法天下安貞兮象地殫怪力窮神異少君王子掣曵兮若來玉女瑶􅁎翩躚兮必至鳴鷫鸘與鸑鷟舞鶤雞與翡翠毒龍怒兮赫然狂象奔兮沉醉怖魍魎潛魑魅離婁}
