  - {type: variant, offset: 2538, length: 5, content: 南陸迎脩景, SBCK: 季秋邊朔苦旅鴈違霜雪淒淒陽卉腓皎皎寒潭㓗良辰惑聖心雲旗興暮節鳴笳戾}
  - {type: variant, offset: 2538, length: 165, content: 南陸迎脩景朱明送末垂初伏啟新節隆暑亦赫曦七月七日漢武帝故事曰景帝嘗夢高祖謂己曰王美人生子可名為彘以乙酉年七月七日旦生武帝於猗蘭殿謹按洞冥記漢武帝未生之時景帝夢一赤彘從雲中直下崇芳閤帝覺而坐於閤果見赤氣從雲中直下如林木蔽牖望閤上有丹霞鬱既而乃改崇芳閣為猗蘭殿後王夫人生武帝也又曰七月七日上於承華殿臺齊其日忽有鳥從西方來集殿前上問東方, krp: 季秋邊}
