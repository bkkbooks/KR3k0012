  - {type: variant, offset: 1742, length: 407, content: 金也陰陽書曰候夏至後第三庚為初伏第四庚為中伏立秋後初庾為後伏謂之三伏曹植謂之三詢也史記曰張子房始見下邳圯上老父與一編書曰讀是為王者師後十三年濟北殿穀城山下黃石即我也良後從高帝過濟北果見穀城下黃石良取寶而祠之留侯死并黃石葬之每上塚伏臘祠黃石又曰秦穆公始為伏祠漢書曰東方朔為郎伏日詔賜諸郎肉朔獨拔劍割肉謂其同官曰當早歸請受賜即懷肉而去上問朔曰賜肉不待詔而去何也上令自責朔曰受賜不待詔何無禮也拔劍割肉一何壯也割之不多又何廉也歸遺細君又何仁也上笑曰令生自責而反自譽復賜酒一巵肉百斤遺細君又曰楊煇報孫會宗書曰田家作苦歲時伏臘烹羊炰羔斗酒自勞去聲漢官儀曰伏日萬鬼所行故謹漢魏日有食之會故漢書楊煇閑居曰養羊沽酷供伏臘之費典略曰大駕都許使光祿大夫劉松北鎮袁紹軍與紹子弟日共宴飲常以三伏之際晝夜酣飲極醉至於無知云以避一時之暑故河朔有避暑飲王翽鄴中記曰石季龍於冰井臺藏冰三伏之月以冰賜大臣荊楚歲時記曰六月伏日並作湯餅名為辟惡宋玉玄謨壽, WYG: 襄}
