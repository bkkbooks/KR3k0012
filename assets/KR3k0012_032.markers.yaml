  - {type: variant, offset: 4236, length: 951, content: 處山川形勢相似曾聽所論不能踰越公遂命筆為詩雜異書曰時有女子尚幼七夕見家人出庭望候天門開獨在室中不出曰若合當見者雖暗室中亦應見之至夜深忽見天上門開雲物赫弈因求富及長嫁而富既寡眾累鉅萬有賈客貨其絹百匹去而舩覆溺資貨皆沒其女子偶開後房見絹在其中但濕耳後賈客歸而自首女子曰絹歸矣驗之而信亦出夷聖堅舞亦是開元以後事國史補曰興元元年七月七日斬偽官喬琳將臨刑嘆曰琳以七月七日生亦以此日死豈非命也夫古詩曰迢迢牽牛星皎皎河漢女纖纖擢素手軋軋弄機杼終日不成章泣涕零如雨河漢清且淺相去復幾許盈盈一水間脈脈不得語晉潘尼七月七日侍皇太子宴玄圃園詩曰啇風初授辰火微流朱明送夏少昊迎秋嘉木茂園芳草被疇於時我后以豫以游宋孝武七夕詩曰開庭鏡天路餘光不可臨沿風披弱縷迎曜貫玄鍼薄藝誠無取時務聊可尋宋謝惠連詠牛女詩曰落日隱簷楹升月照簾櫳團團滿葉露淅淅振條風蝶足年闕相從遐川阻昵愛脩渚曠清容弄杼不成藻聳轡騖前蹤昔離秋已雨今聚夕無雙傾河易廻幹款情難久悰沃若靈駕旋寂寞雲幄空留情顧華寢遙心逐奔龍宋顏延之織女贈牽牛詩曰婺女麗經星姮娥捷飛月慚無一媛靈託身侍天闕閭殊闔未央銀河豈沐髮漢陰不夕悵長河為誰越有促讌歸期萬頃涼風發非怨杼柚勞但念芳菲歇宋謝莊七夕詠牛女應詔詩曰輟機起春暮停箱動秋襟琥車照漢右芝駕肅河陰珠殿釭未暗瑤庭露已深夜清豈淹抑弦徽無久臨蘇彥七月七日詠織女詩曰火流涼風至少昊協素藏織女思北征牽牛歎南陽時來嘉慶集整駕巾玉箱瑗佩垂藻蕤霧裙結雲裳金翠耀華輜軿軒散流芳釋轡紫微庭解襟碧琳堂忻燕未及究晨暉照扶桑仙童唱道情盤螭起騰驤悵悵一霄促遲遲別日長梁簡文帝七夕穿針欹疑詩曰憐從帳裏出想見夜窗開針欹疑月暗縷散恨風來梁劉孝儀詠織女詩曰金鈿已照耀白日未蹉跎欲待黃昏至含嬌渡淺河梁庾肩吾七夕詩曰玉匣卷懸衣針縷開夜扉姮娥隨月落織女逐星移離前看促夜別後對空機寄語雕凌鵲填河未可飛隋庾信七夕賦曰兔月先上羊燈次安覩牛星之曜景視織女之闌干於是秦娥麗妾趙艷佳人窈窕名鷰逶迤姓秦娥麗裝而半故憐晚飾之全新此時併捨房櫳共往庭中縷條緊而貫中針鼻細而穿空隋王慎七夕詩曰天河橫欲曉鳳駕儼應飛落日移粧鏡浮雲動別衣懽逐今霄盡愁隨還路歸猶將宿昔淚更上去年機張文恭七夕詩曰鳳律驚秋氣龍梭靜夜機星橋百枝動云路七香飛映月廻雕扇凌霜曳綺衣含情向華幄流態入重闈歡余夕漏盡怨結曉驂歸誰念分河漢還意兩心違, SBCK: ''}
