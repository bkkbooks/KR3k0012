  - {type: variant, offset: 888, length: 465, content: 荅以五月五日作赤靈符著心前又曰蟾蜍萬歲者頭上有角頷下丹書八字再重五月五日中時取之陰乾百日以其足畫地即為流水風俗通曰五月五日以五彩絲繫臂者辟兵及鬼令人不病溫又曰亦因屈原一名長命縷一名續命縷一名辟兵繒一名五色絲一名朱索又有條達等織組雜物以相贈遺孝援神契云仲夏始出婦人染練或有作務玉燭寶典云此節備擬甚多其尚矣又曰日月星辰鳥獸之狀文綉金縷帖畫貢獻所尊古詩經云繞臂雙條達是也又曰五月五日集五色繒辟兵余問服君服君曰青赤白黑以為四方黃為中央襞方綴於胸前以示婦人蠶功也織麥䅌懸於門以示農工成傳聲以襞為辟兵耳按䅌音涓麥莖也養生要集曰木味苦小溫生漢中南鄭山谷五月五日採之琴操曰介子綏國語曰介子推割腓股以啖重耳重耳復國子綏獨無所得綏甚怨恨乃作龍虵之歌以感之終不肯出文公令燔山求之子綏遂抱木而燒死文公令民五月五日不得發火玉燭寶典曰五月五日採艾懸於戶上以攘毒氣按荊楚歲時記云宗則字文度常以五月五日未雞時採艾見似人處攬而取之用灸有驗是日競渡採雜藥夏小正曰此月蓄藥以蠲除毒氣也異苑曰五月五日剪鴝鵒舌以能學人語又曰田文母嬖五月五日生文父勑令勿舉之後母私舉文長成童, SBCK: 士皆}
