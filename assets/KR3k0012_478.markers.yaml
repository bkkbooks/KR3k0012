  - {type: variant, offset: 2224, length: 267, content: 一月徒杠成十二月輿梁成民未病涉韓子曰吳起為魏將而攻中山軍人有病疽者吳起跪而自吮其膿傷者母立而泣人曰將軍於若子如是何為泣對曰昔吳子吮其父傷而殺之涇水之上今又將安知不殺是乎呂氏春秋曰秦繆公乘馬車敗右服失公自往求馬見野人方將食之於岐山之陽繆公笑曰食馬肉而不飲酒余恐其傷生也遍飲而去居一年為韓原之戰晉人以環繆公之車矣嘗食馬肉者三百餘人疾鬭車下遂大剋晉反獲晉公以歸呂覽曰魯國之法魯人為人臣妾於諸侯有能贖之者取其金於府子貢贖魯人於諸侯來辭不受其金孔子曰賜失之矣自今以往魯人不贖人也淮南子曰為魚德者非挈而入淵也為猨賜者非負於緣木也縱其所之利之而已矣, SBCK: 八}
