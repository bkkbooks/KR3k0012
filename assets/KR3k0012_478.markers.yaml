  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_478-1a, image: WYG0897/WYG0897-0341a.png}
  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覧卷第四百七十八}
  body:
  - {type: variant, offset: 5, length: 0, content: '', WYG: 十九贈遺毛詩曰雞鳴刺不說德也知子之來之雜佩以贈之知子之順之雜佩以問之又曰唯士與女伊其相謔贈之以芍藥又曰渭陽康公念母也康公之母晉獻公之女文公遭驪姫之難未返而秦姬卒穆公納文公康公時為太子贈送文公於渭之陽渭水名秦時都雍至渭陽者葢東行送舅氏於咸陽之地我送舅氏曰至渭陽河以贈之輅車乘黄我送舅氏悠悠我思何以贈之瓊瑰玉佩禮記曰孔子之衛遇舊舘人之喪入而哭之哀出使子貢脫驂而􅉠之子貢曰無乃已重乎夫子曰余嚮者入而哭之遇於}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_478-1b, image: WYG0897/WYG0897-0341b.png}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 哀而出涕余惡夫涕之無從也小子行之左傳曰鄢陵之戰郤至三遇楚子之卒必下免胄而趨風楚子使工尹襄問之以弓曰方事之殷有韎韋之跗注君子也適見不糓而趨無乃傷乎郤至見客免胄承命又曰越圖呉趙孟使楚隆使於呉王曰黄池之役君之先臣志父得承齊盟曰好惡同之今君在難無恤不敢憚勞非晉國之所能及也使陪臣敢展布之王拜稽首曰寡人不佞不能事越以為大夫憂拜命之辱與之一簞珠又曰呉公子札聘於鄭見子産如舊相識與之縞帶縞帯大𢃄也子産獻紵衣焉紵衣襌衣謂子産曰鄭之執政侈難將至矣為政必子子為政慎之以禮不然鄭國將敗又曰叔鮒欲求貨於衛滛芻蕘者滛致也使欲衛患之而致貨焉衛人使屠伯饋叔向羮與一篋錦屠伯衛大夫曰諸侯事晉未敢擕貳况衛在君之宇下屋宇之下喻近而敢有異志芻蕘者異於他日敢請之請正之意叔向受羮反錦受羮示不逆其意且非貨賂也論語鄉黨曰康子饋藥拜而受之曰丘未逹不敢嘗饋遺也拜受敬也曰丘未逹言不服之意藥從中制外故當慎也又㣲子曰齊人饋女樂季桓子受之三日不朝孔子行漢書曰文帝賜趙佗書上褚五}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_WYG_478-2a, image: WYG0897/WYG0897-0341c.png}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_WYG_478-2b, image: WYG0897/WYG0897-0341d.png}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_WYG_478-3a, image: WYG0897/WYG0897-0342a.png}
  - {type: variant, offset: 7, length: 3, content: 八施惠, SBCK: 九贈遺毛詩曰鷄鳴刺不􅀃德也知子之來之雜佩以贈之知子之順之雜佩以問之又曰唯士與女伊其相謔贈之以芍藥又曰渭陽康公念母也康公之母晉獻公之女文公遭驪􅁎之難未返而􅁗􅁎卒穆公納文公康公時爲太子贈送文公於渭之陽念母之不見也我見舅氏如母存焉我送舅氏曰至渭陽渭水名􅁗時都雍至渭陽者盖東行送舅氏於咸陽之地何以贈之輅車乗黄我送舅氏悠悠我思何以贈之瓊魏玉佩禮記曰孔子之衛遇舊館人之䘮入而􅂘之哀岀使子貢脫􅆖而賻之子貢曰無乃巳重乎夫子曰余嚮者入而哭之遇於一哀而出涕余惡夫涕之無從也小子行之左傳曰鄢陵之戰卻至三遇楚子之卒必}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_SBCK_478-1b}
  - {type: variant, offset: 7, length: 3, content: 八施惠, WYG: 衣中褚三十衣}
  - {type: variant, offset: 7, length: 3, content: 八施惠, krp: 九贈遺毛詩曰鷄鳴刺不說德也知子之來之雜佩以贈之知子之順之雜佩以問之又曰唯士與女伊其相謔贈之以芍藥又曰渭陽康公念母也康公之母晉獻公之女文公遭驪姬之難未返而秦姬卒穆公納文公康公時爲太子贈送文公於渭之陽念母之不見也我見舅氏如母存焉我送舅氏曰至渭陽渭水名秦時都雍至渭陽者盖東行送舅氏於咸陽之地何以贈之輅車乗黄我送舅氏悠悠我思何以贈之瓊魏玉佩禮記曰孔子之衛遇舊館人之䘮入而哭之哀岀使子貢脫驂而賻之子貢曰無乃巳重乎夫子曰余嚮者入而哭之遇於一哀而出涕余惡夫涕之無從也小子行之左傳曰鄢陵之戰卻至三遇楚子之卒必}
