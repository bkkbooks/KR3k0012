  - {type: variant, offset: 991, length: 1, content: 能, SBCK: 但願大王勉建功業同奬漢室臣雖闇弱不􅀒采顧蜀王本紀曰蜀王獵於褒谷見􅁗王以金一笥遺蜀王報以禮物盡化爲士􅁗王大怒臣下拜賀曰土者地也葛洪西京雜記曰朱買臣爲㑹稽太守懷章綬至金亭而國人未知也所知錢勃見其曝露乃勞之曰得無罷乎遺以紈扇買臣至郡引爲上客雜記曰公孫弘爲國士所推上爲賢良國人郵長贈以生芻一束素絲一繸撲玉一杖孟儀周載曰悼公時晉智伯爲政強􅁀好侵伐欲謀襲衛乃遺衛君野馬四白璧一以結好韓子曰仲尼爲政於魯齊景公患之􅀺鉏謂景公遺哀公女樂景公曰善乃以女樂二八遺哀公哀公果怠於政仲尼諌不聽去而之齊又曰晉獻公欲伐虞􅉑乃遺之屈産之乗垂􅁄之璧女樂二八以榮其心而亂其政孔藂子曰子思居貧其友有饋之粟者受二車焉或獻罇酒束脩子思弗爲當或曰子取人粟而辭吾酒是辭少取多也子思曰伋不幸而貧於財至乃困乏將絶先人祀夫所以受粟爲周乏也酒脯則飲讌方乏於}
  - {type: page-break, offset: 991, content: '', id: KR3k0012_SBCK_478-6b}
  - {type: variant, offset: 991, length: 1, content: 能, WYG: 但願大王勉建功業同奬漢室臣雖闇弱不負東顧蜀王本紀曰蜀王獵於褒谷見秦王以金一笥遺蜀王報以禮物盡化為土秦王大怒臣下賀拜曰土者地也葛洪西京雜記曰朱買臣為㑹稽太守懐章綬至金亭而國人未知也所知錢勃見其曝露乃勞之曰得無罷乎遺以紈扇買臣至郡引為上客雜記曰公孫𢎞為國士所推上為賢良國人郵長贈以生芻一束素絹一繸撲滿一枚儀周載曰悼公時晉智伯為政强暴好侵伐欲謀襲衛乃遺衛君野馬四白璧一以結好韓子曰仲尼為政於魯齊景公患之黎鉏謂景公遺哀公女樂景公曰善乃以女樂二人遺哀公哀公果怠放政仲尼諫不聽去而之齊又曰晉獻公欲伐虞虢乃遺之屈産之乘垂棘之璧女樂二人以縈其心而亂其政孔藂子曰子思居貧其友有饋之粟者受二車焉或獻罇酒束脩子思弗為嘗或曰子取人粟而辭吾酒脯是辭少取多也子思曰伋不幸而貧於財至乃困乏將絶先人祀夫所以受粟為周乏也酒脯則飲讌方乏於}
