  - {type: variant, offset: 11, length: 0, content: '', WYG: 禇二十衣遺王范曄後漢書曰李恂徴拜謁者領西域副校尉西域殷富多珍寳諸國侍子及督使賈胡數遺恂奴婢宛馬金銀香􅄢之屬一無所受東觀漢記曰陳遵為大司農護軍嘗使匈奴過辭於王丹臨訣丹謂遵曰俱遭時反覆唯我二人為天地所遺今子當之絶域無以相贈贈子以不拜遂揖而别遵甚恱後漢書王丹字仲回資性清白少脩節義時京師大豪陳遵朋友䘮親遵為護䘮事􅐠縑數百疋丹懐縑一疋至䘮主前出縑授之謂曰如丹是縑出自機杼遵有慚色後漢書閔中叔好黄老清志潔行不仕王莾之世恬靜養神弗役於物與周黨相交黨過叔舎共含菽飲水無菜茹黨嘗遺其生麻仲叔歎曰我欲省煩耳受而不食後漢書光禄勲杜林與馬援鄉里親厚援方南還時林馬􅃴死援遣子將馬一疋遺林曰朋友有車馬之餽可以備之居數月林還之後漢書曰或問第五倫曰公有私乎對曰昔人有與吾千里馬者雖不受每三公有所選舉心不能忘而亦終不用也吾兄子嘗病一夜十往退而安寢吾子有病雖不省視而竟夕不眠若是者豈謂無私乎又曰張奐少立志節常與士友言曰大丈夫處世當為國家立功邉境及為將帥果有勲名董卓慕之使其兄遺縑百疋奐惡卓為人絶而不受呉志曰太史慈字子義曹公聞其名遺慈書以篋封之發省無所道而但貯當歸蜀志曰宗預東聘呉孫權捉預手涕泣而别曰君每衘命結二國之好今君年長孤亦衰老恐不復相見遺預大珠一斛}
