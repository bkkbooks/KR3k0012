  - {type: variant, offset: 1799, length: 1, content: 大, SBCK: 美人贈我金錯刀何以報之英瓊瑶又云美人贈我翠琅玕何以報之􅀟玉盤又云美人贈我錦繡叚何以報之青玉案又云美人贈我貂襜䄖何以報之明月珠傳云四愁詩曰美人贈我明月珠何以報之比目魚又云美人贈我􅂫合香何以要之翠鴛鴦張載擬四愁詩曰美人遺我緑綺琴何以贈之􅀟南金琴操曰許由無有杯器手掬水人見由無器以瓠瓢遺之由操飲飲訖掛以樹枝風吹樹動有歷歷聲由以爲煩擾取損之楚辭曰折䟽麻兮瑶華䟽麻神麻也瑶王華}
