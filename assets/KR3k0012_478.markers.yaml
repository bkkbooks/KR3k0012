  - {type: variant, offset: 1162, length: 315, content: 庭勞之乃布令求百姓之飢寒者收穀之乃使人聽於閭里聞大夫相與語曰單之愛人乃王之教也江表傳曰全琮罷東安郡還錢唐修祭墳墓麾幢節蓋曜於舊里請會邑人平生知舊宗族六親施散惠與千有餘萬本土以為榮司馬徽字德操人有臨蠶求簇者徽便與之自棄其蠶或有難之者曰凡人有損己以贍人謂彼事急己事緩耳今彼此正等何為急之以與人邪徽曰人不當求耳人已求拒之將慚何有以財貨令人慚者也董卓別傳曰太常張奐將師北征表卓為軍司馬從軍行卓手斬購募羌酋拜五官中郎賜縑九十疋卓歎曰為者則已有者則士悉以縑分與兵吏葛洪神仙傳曰焦先日日入山伐薪以布施從西村頭一家起周而復始秦書曰尚書令符雅為人樂施乞人填門嘗曰天下物何常吾今日富後日貧耳忽一日不施則意不泰時人為之語曰不為權異富甯作符雅貧賈誼新書曰, SBCK: 楚}
