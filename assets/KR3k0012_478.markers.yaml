  - {type: variant, offset: 80, length: 4, content: 俄頃立盡, SBCK: 即着以採藥又曰王弘之隱居性好釣日夕載魚入徃上虞郭經親故門各以一兩頭置門内而去又曰陶潜傳顔延之爲始安郡經過日日造潜毎往必酣飲致醉臨去留二萬錢與潜潜悉送酒家稍就取酒飲宋書曰郭原平髙陽許謡之居在永興罷建安郡丞還家以綿一斤遺原平不受送而復反者前後數十瑶之乃自往曰今歳過寒而建安綿好以此奉尊上耳原平乃拜而受之齊書􅁃易徵辟不就以文義自樂安西長史􅀽􅂏欽其風通書致遺易以連理机竹翹書格報之}
