  - {type: variant, offset: 623, length: 232, content: 舡栰并齎糧拯救之民多獲濟衍先開倉賑卹後始聞奏上大善之唐書曰孟簡性俊拔尚義早歲交友先歿者視其孤每厚於周卹議者以為有前輩風又曰李藩少恬淡修撿雅容儀好學父卒家富於財親族弔者有挈去不禁愈務散施不數年而貧年四十餘未仕讀書楊州困於自給妻子怨尤之晏如也又曰盧鈞為嶺南節度使自貞元已來衣冠得罪流放嶺表者因物故子孫貧悴雖遇赦不能自還凡在封境者鈞減俸錢為營槥櫝其家疾病死喪則為之毉藥殯歛孤兒稚女為之婚嫁凡數百家李皋貶溫州長史無幾攝行州事歲儉州有官粟數十萬斛欲行賑救掾吏叩頭乞候上旨皋曰, SBCK: 太}
