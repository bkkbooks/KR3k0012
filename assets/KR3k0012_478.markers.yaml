  - {type: punctuation, offset: 11, content: 《, id: KR3k0012_CHANT_478-bkkpn1}
  - {type: variant, offset: 11, length: 0, content: '', SBCK: 免胄而趍風楚子使工尹襄問之以弓曰方事之殷有韎韋之附注君子也適見不榖而趍無乃傷乎郄至見客免胄承命又曰越圍呉趙孟使楚隆使於呉王曰黄池之役君之先臣志父得承齊盟曰好惡同之今君在難無恤不敢憚勞非晉國之所能及也使陪臣敢展布之王拜稽首曰寡人不侫不能事越以爲大夫憂拜命之辱與之一簞珠又曰呉公子札聘於鄭見子産如舊相識與之縞帶縞帶大帶也子産獻紵衣焉紆衣禪衣謂子産曰鄭之執政侈難將至矣政必及子子爲政慎之以禮不然鄭國將敗又曰叔鮒欲求貨於衛滛芻蕘者滛放也使欲衛患之而致貨焉衛人使屠伯饋叔向􅃵與一篋錦屠伯衛大夫曰諸侯事晉未敢携貳况衛在君之宇下屋宇之下喻近而敢有異志芻蕘者異於它日敢請之請正之意叔向受羮反錦受羮示不逆其意且非貨賂也論語郷黨曰康子饋藥拜而受之曰丘未逹不敢嘗饋遺也拜受敬也曰丘未逹言不服之意藥從中制外故當慎也又微子曰齊人饋女樂季桓子受之三日不朝孔子行漢書曰文帝賜趙它書上禇五十衣中禇三十衣遺王上禇下禇謂之多少厚薄祫複之名范曄後漢書曰李恂徴拜謁者領西域副校尉西域殷冨多珎寳諸國侍子及督使賈胡數遺恂奴婢宛馬金銀香􅄢之屬一無所受東觀漢記曰陳遵爲大司農護軍嘗使匈奴過辭於王丹臨决丹謂遵曰俱遭時反覆唯我二人爲天地所遺今子當之絶域無以相贈贈子以不拜遂揖而別遵甚悅後列曰王丹字仲回資性清白少脩節義時京師大豪陳遵朋友䘮親遵爲護䘮事縳縑數百疋丹懷縑一疋至䘮主前出縑授之謂曰如丹是縑出自機杼遵有慙色閔仲叔太原人好黄老清志㓗行不仕王莽之丗恬静養神弗役於物與周黨相友黨過叔舎共含菽飲水無菜茹黨嘗遺其生麻叔歎曰我欲省煩耳受而不食後列曰光禄勲杜林與馬援郷里親厚援南方還時林馬適死援遣子將馬一疋遺林曰朋友有車馬之餽可以備之居數月林還之後漢書曰或問第五倫曰公有私乎對曰昔人有與吾千里馬者雖不受每三公有所選舉心不能忘而亦終不用也吾兄子嘗病一夜十往退而安寢吾子有病雖不省視而竟夕不眠若是者豈謂無私乎又曰張奐少立志節常與士友言曰大丈夫處丗當爲國家立功邊境及爲將帥果有勲名董卓慕之使其兄遺縑百疋奐惡卓爲人絶而不受呉志曰太史慈字子義曹公聞其名遺慈書以篋封之發省無所道而但貯當歸蜀志曰宗預東聘呉孫權捉預手涕泣而別曰君每銜命結二國之好今君年長􅀌亦衰老恐不復相見遺預大珠一斛}
