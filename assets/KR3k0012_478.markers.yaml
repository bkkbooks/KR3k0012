  - {type: variant, offset: 1533, length: 229, content: 輔決錄曰摯茂字子華以茂才為郡去治財致大富悉散以分宗人先從貧始以壽終虞預會稽典錄曰駱俊字遠孝靈皇帝擢拜陳相汝南葛陂盜賊並起與接境四面受敵俊整厲吏人為之保鄣出倉見穀以贍貧乏劉邵人物志曰中材之人財隨損益是故籍富貴則貨財充於內施惠周於外見贍者求可稱而譽之見援者闡小美而太之雖無異材猶行成而名立也英雄記曰王匡字公節泰山人輕財好施以任俠聞辟大將軍何進府使匡於徐州發強弩五百詣京師會進敗匡還鄉里劉義慶世說曰顧榮在洛嘗應人請覺行炙人有欲炙之色因輟己施焉後遭亂渡江每經危急常有, WYG: 具錯鏤鐵}
