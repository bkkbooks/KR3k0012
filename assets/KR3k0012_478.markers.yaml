  - {type: variant, offset: 981, length: 0, content: '', SBCK: 不疆不逹不勞無功不忠無親不信無復不恭失禮慎此五者而巳矣子路曰由請終身奉之戰國䇿曰蘇􅁗說李兊抵掌而談李兊送蘇􅁗以明月之珠和氏之璧黒狐之裘黄金百鎰蘇􅁗得以爲用西入於􅁗又曰張儀爲􅁗破從連横􅀃楚王遺車百乗獻駭鷄之犀夜光之璧於􅁗王梁祚魏國統曰􅀄太祖過故人吕伯奢也遂行日暮道逢二人容貌威武太祖避之路二人􅀏曰觀君有奔懼之色何也太祖始􅁴其異乃悉告之臨別太祖解佩刀與之曰以此表吾丹心願二賢慎勿言劉向􅀃苑曰田子方使人遺子思狐白之裘恐其不受因謂之曰吾與人也如弃之子思辭曰伋聞妄與不如遺弃於溝􅐿伋雖貧不忍以身爲溝壑也􅀃苑曰孔子之楚有漁者獻魚孔子不受獻漁者曰天暑市逺賣之不售思慮欲弃之不􅀂獻之君子孔子再拜受謂弟子曰掃除將􅀕之弟子曰夫人將弃之今}
  - {type: page-break, offset: 981, content: '', id: KR3k0012_SBCK_478-5b}
  - {type: variant, offset: 981, length: 0, content: '', WYG: 不彊不逹不勞無功不忠無親不信無復不恭失禮慎此五者而已矣子路曰由請終身奉之戰國策曰蘇秦說李兊抵掌而談李兊送蘇秦以明月之珠和氏之璧黑狐之裘黄金百鎰蘇秦得以為用西入於秦又曰張儀為秦破從連横說楚王遺車百乘獻駭鷄之犀夜光之璧於秦王梁祚魏國統曰初太祖過故人吕伯奢也遂行日暮道逄二人容貌威武太祖避之路二人笑曰觀君有奔懼之色何也太祖始覺其異乃悉告之臨别太祖解佩刀與之曰以此表吾丹心願二賢慎勿言劉向說苑曰田子方使人遺子思狐白之裘恐其不受因謂之曰吾與之也如棄之子思辭曰伋聞妄與不如遺棄於溝壑伋雖貧不忍以身為溝壑也說苑曰孔子之楚有漁者獻魚孔子不受獻魚者曰天暑市逺賣之不售思慮欲棄之不若獻之君子孔子再拜受謂弟子曰掃除將祭之弟子曰夫人將棄之今}
