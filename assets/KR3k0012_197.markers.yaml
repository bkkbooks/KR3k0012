  - {type: variant, offset: 3113, length: 208, content: 四方之事無有畜滯則麒麟遊囿六畜繁多天苑有德星應白虎通曰苑囿所以在東方何苑囿養萬物者也東方所以生也戰國策曰張儀說韓王曰大王不助秦鴻臺之宮樂林之苑非韓之有也拾遺記曰黃帝為養龍之囿洞冥記曰北及玄坂去空同十七萬里日月不至其地自明有紫河萬里流沬千丈中有寒荷霜下方香茂也北有潰陽之山有兔如鼠能飛毛色光如漆以腦和丹食則不死帝使放兔於昭祥苑苑在甘泉宮西周千里萬國獻異物皆集此中三輔黃圖曰甘泉苑起仙人觀緣山谷行至雲陽三百八十里入右扶風, SBCK: 造}
