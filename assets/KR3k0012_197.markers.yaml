  - {type: variant, offset: 3328, length: 2, content: 兩京, SBCK: 虎圈又曰李禹有寵於太子然好利亦有勇甞與侍中貴人飲侵陵之莫敢應後愬之上上召禹使制虎懸下圈中未至地有詔引岀之禹從落中以劒斫絶纍欲刺虎師古曰落與絡同謂當時繦絡而下也纍索也上壯之遂救止焉三輔故事曰師子圈在建章宫西南列士傳曰􅁗召公子無忌無忌不行使朱亥奉璧􅁗王大怒將朱亥着虎圈中亥瞋目視虎虎不敢動郡國誌曰雍州虎圈在通化門東二十五里􅁗王置朱亥於其中亥瞋目虎不敢動漢文帝問上林尉處及馮婕妤當熊在此漢宫殿䟽曰有彘圈有師子圈武帝造􅁗故虎圈周匝三十五歩長二十歩西去長安十五里牢說文曰牢閑養牛馬園也詩曰乃造其曹執豕于牢注云曹羣也言􅅮豕於牢中以爲飲酒之殽穆天子傳曰髙奔戎獲虎畜于東虞命曰虎牢事且州郡曹子建求自試表曰如微才不試没丗無聞禽息鳥視終於白首此徒圈牢之養物非臣之所志也藩籬易曰羝羊觸藩羸其角詩曰折柳樊圃或云藩左傳曰宋向戍請弭諸侯之兵襄公二十七年諸侯之大夫㑹于宋以藩爲軍注云示不相忌也又哀十二年衛侯㑹兵于鄖呉人藩衛侯之舎子服景伯謂子貢曰夫諸侯之㑹事旣畢矣侯伯致禮地主歸餼以相辭也今呉不行禮於衛而藩其君舎以難之子盍見太宰乃請束錦以行乃免衛侯晉書曰􅁃衮字叔襃􅀄衮諸父並貴盛唯衮父獨安貧約躬耕稼穡以給供養而執事勤恪與弟子樹籬跪以授條或曰今在隱屏先生何恭之過也荅曰幽顯易操非君子意也宋書曰謝瞻字宣逺弟晦時爲宋臺右衛權遇巳重於彭城還都迎家賔客輻湊瞻在家驚駭謂晦曰吾家以逺退爲業汝遂􅀔傾朝野此豈門户福耶乃堅籬隔門庭曰吾不忍見此南朝宫􅁐}
