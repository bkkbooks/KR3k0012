  - {type: 'tls:seg', offset: 258, content: '', id: KR3k0012_CHANT_197-6a.6}
  - {type: variant, offset: 258, length: 202, content: 皆令民田之又滑稽傳曰秦始皇欲大苑囿東至函谷關西至陳倉優旃曰善多縱禽獸於其中寇從東方來令獸觸之足矣始皇以故輟止又蕭相國請曰上林中多空地願令民得田苑中上大怒曰相國多受民財乃為民請吾苑乃下廷尉械繫數日王衛尉侍曰便於民而請真宰相事陛下距楚數歲陳豨黥布反上自擊之當是時相國守關中搖足則關巳西非陛下有也相國不此時為利今乃利賈人之金乎陛下何疑於是使持節赦出何徒跣謝上曰休矣相國為民請吾苑吾不許我不過為桀紂主而相國為賢耳, SBCK: 甚衆}
