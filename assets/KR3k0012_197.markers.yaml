  - {type: variant, offset: 1755, length: 849, content: 囿署以宦者為令又曰楊賜為少府光祿勳代劉郃為司徒帝欲造罼圭靈琨之苑賜上䟽諫曰竊聞使者並出規度城南人田欲以為苑昔先王造苑囿裁足以修容三驅之禮薪萊芻牧皆悉往焉先帝之制左補鴻池右作上林鴻池在洛陽東上林在西不奢不約以合禮中今猥規郊城之地以為苑囿壞沃衍廢田園驅居人奮禽獸殆非所謂若保赤子之義今城外苑巳有五六陽喜元年起西苑延熹三年造顯陽苑洛陽宮殿名有平樂苑上林苑桓帝延熹元年置鴻德苑可以逞情意順四節也宜惟夏禹卑宮太宗露臺之義以慰下人之勞書奏帝意欲止以問侍中任芝中常侍樂松等曰昔文王之囿百里人以為小齊宣七十里人以為大今與百姓共之無害於政也帝悅遂令築苑漢官典職曰宮內苑聚土為山十里九坂種奇樹育麋鹿麑麂鳥獸百種激上河水銅龍吐水銅仙人銜杯受水下注天子乘輦遊獵苑中漢舊儀曰上林苑中廣長三百里置令丞左右尉苑中養百獸天子遇秋冬獵射苑中取禽無數其中離宮七十所皆容千乘方騎又曰武帝時使上林苑中官奴婢及天下民貧貲不滿五十萬徙置苑中人日五錢到帝得七十億萬以給軍擊西域續漢獻帝紀曰昭寧元年董卓住兵屯陽苑使者就拜司空續漢書百官志曰上林苑令一人六百石主苑中禽獸東觀漢記曰桓帝延熹元年初置鴻德苑張璠漢記曰梁冀多規苑囿西至弘農東至滎陽南入魯陽北到河淇周旗十里崔鴻十六國春秋後趙錄曰趙王八年春正月立桑梓苑於襄國又後燕錄曰慕容熙築龍騰苑廣袤十餘里役徒二萬人又起景靈山苑內基廣五百步峰高十七丈又起逍遙宮甘露殿連房數百觀門相交鑿天河渠引入宮晉宮閣名曰洛陽有洪德苑靈崑苑平樂苑河南十二境簿曰河南縣有鹿子苑洛陽城西有桑梓苑孟子曰齊宣王問孟子曰文王之囿方七十里有諸何其大也孟子曰民猶以為小也王曰寡人囿方四十里民以為大何故曰文王之囿芻蕘雉兔者往焉與民同之民以為小宜矣王之囿殺麋鹿者如殺人之罪是以四十里為穽於國中也民以為大不亦宜乎呂氏春秋曰昔先王之為苑囿園池足觀望勞形而巳矣非好儉節乎性也陶季直京都記曰覆舟山周廻二十里有林名白水苑又曰建康縣北吳朝為桂林苑南朝宮苑記曰樂游苑在覆舟山南北連山築臺觀苑內起正陽林光等殿又曰桂林苑在落星山之陽吳都賦云數軍實于桂林之苑即此, SBCK: ''}
