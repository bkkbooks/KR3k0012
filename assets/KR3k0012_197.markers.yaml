  - {type: variant, offset: 3325, length: 1, content: 四, SBCK: 五十斛隋圖經曰司竹園在盩厔縣東十二里穆天子西征至􅀇池乃植竹即此是也史記曰渭川千畒竹漢謂鄠杜竹林故有司竹都尉西都賦所謂鄠杜濱其足竹林果園芳草甘木也圈史記曰竇太后好黄老書召袁固問老子書固曰此家人言耳太后怒曰安得司空城旦書乎乃使固入圈擊豕漢書曰孝武帝作建章宫度爲千門萬户其西則數}
