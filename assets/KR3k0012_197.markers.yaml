  - {type: variant, offset: 3019, length: 0, content: '', krp: 鴈池鶴洲鳬渚宫觀相屬隋圖經曰史記謂梁孝王築東苑方三百里是曰兔園王襃雲陽記曰車箱阪下有黎園一頃樹數百株青翠繁密望如車蓋水經注曰睢水東南流入于竹圃水次緑竹䕃渚青青實望丗人言梁王竹園也又曰玄瓠灣中地數頃有栗園栗小殊不並固安之實也然歳貢三百石以充天府水渚即栗洲樹木髙茂望若屯雲中有栗堂甚閑敞牧宰英彦多所游薄魏志曰有芳林園桐園芳林後避少帝諱改爲華林晉宫閣名靈芝園鄴有鳴鶴園蒲陶園華林園司馬彪續漢書曰濯龍園在洛陽西北角也郭仲産仇池記城東有苜蓿園列女傳魯􅃮室之女曰昔有客繫馬園中馬逸踐葵使子終歳不飽葵淮南子曰園有螫毒葵藿爲之不採陳留志曰園庾襄邑人也庾始居園中故代謂之園公天文要集曰庖瓜爲天子果園又天園主果實茹蓄儲又曰芙蓉園夲隋氏之離宮居地三十頃周廻十七里貞觀中賜魏王泰㤗死又賜東宫今屬家令寺園中廣厦脩廊連亘屈曲其地延袤爽塏跨帶原隰}
