  - {type: variant, offset: 1948, length: 977, content: 宜惟夏禹卑宮太宗露臺之義以慰下人之勞書奏帝意欲止以問侍中任芝中常侍樂松等曰昔文王之囿百里人以為小齊宣七十里人以為大今與百姓共之無害於政也帝悅遂令築苑漢官典職曰宮內苑聚土為山十里九坂種奇樹育麋鹿麑麂鳥獸百種激上河水銅龍吐水銅仙人銜杯受水下注天子乘輦遊獵苑中漢舊儀曰上林苑中廣長三百里置令丞左右尉苑中養百獸天子遇秋冬獵射苑中取禽無數其中離宮七十所皆容千乘方騎又曰武帝時使上林苑中官奴婢及天下民貧貲不滿五十萬徙置苑中人日五錢到帝得七十億萬以給軍擊西域續漢獻帝紀曰昭寧元年董卓住兵屯陽苑使者就拜司空續漢書百官志曰上林苑令一人六百石主苑中禽獸東觀漢記曰桓帝延熹元年初置鴻德苑張璠漢記曰梁冀多規苑囿西至弘農東至滎陽南入魯陽北到河淇周旗十里崔鴻十六國春秋後趙錄曰趙王八年春正月立桑梓苑於襄國又後燕錄曰慕容熙築龍騰苑廣袤十餘里役徒二萬人又起景靈山苑內基廣五百步峰高十七丈又起逍遙宮甘露殿連房數百觀門相交鑿天河渠引入宮晉宮閣名曰洛陽有洪德苑靈崑苑平樂苑河南十二境簿曰河南縣有鹿子苑洛陽城西有桑梓苑孟子曰齊宣王問孟子曰文王之囿方七十里有諸何其大也孟子曰民猶以為小也王曰寡人囿方四十里民以為大何故曰文王之囿芻蕘雉兔者往焉與民同之民以為小宜矣王之囿殺麋鹿者如殺人之罪是以四十里為穽於國中也民以為大不亦宜乎呂氏春秋曰昔先王之為苑囿園池足觀望勞形而巳矣非好儉節乎性也陶季直京都記曰覆舟山周廻二十里有林名白水苑又曰建康縣北吳朝為桂林苑南朝宮苑記曰樂游苑在覆舟山南北連山築臺觀苑內起正陽林光等殿又曰桂林苑在落星山之陽吳都賦云數軍實于桂林之苑即此也又曰芳林苑一名桃花園本齊高帝舊宅在廢東府城東邊秦淮大路北齊王融作曲水詩序載懷平浦乃睠芳林即此也又曰南苑在臺城南鳳臺山宋孝武以南苑地給張永云且給三百年期訖更啟即此也渚宮故事云湘東王於子城中造湘東苑穿地構山長數百丈植蓮蒲緣岸雜以奇木其上有通波閣跨水為之南有芙蓉堂東有禊飲堂堂後有隱士亭北有正武堂堂前有射堋馬埒其西有鄉射堂堂安行堋可得移動東南有連理太清初生此連理當時以為湘東踐祚之瑞北有映月亭脩竹堂臨水齋前有高山山有石洞潛行宛委二百餘步山上有陽雲樓極高峻遠近皆見北有臨風亭明月樓顏之推云屢陪明月宴並將軍扈義熙所造三輔黃圖曰宮二觀十四在甘泉苑垣內甘泉苑起仙人觀石虎鄴中記曰鄴城西三里桑梓苑有宮臨漳水凡此諸宮皆夫人侍婢又並有苑囿養獐鹿雉兔虎數遊宴其中, WYG: ''}
