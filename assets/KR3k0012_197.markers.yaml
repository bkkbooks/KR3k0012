  - {type: variant, offset: 1699, length: 2, content: 光和, WYG: 求之不過數十王濟侯其上直率少年詣園共啖畢伐樹而去王隠晉書曰凉州牧張駿増築四城箱各千歩東城殖園果命曰講武場北城殖園果命曰𤣥武圃皆有宫殿宋書曰栁元景多產業居南岸有數十畆菜園時有人求之或留錢元景曰本立園自為供喫豈求利耶齊書曰世祖太子性頗奢麗宫内多雕飾精綺過於王宫開沼𤣥圃園與臺城北塹等其樓觀塔宇多聚竒石妙極山水慮上宫望見乃傍列修竹内施高障造逰墻數百間施諸機巧宜須障蔽以晉明帝為太子時立西池乃啟世祖引前例求於東田起小苑上許之窮極制度陳留耆舊𫝊曰范丹學通}
