  - {type: variant, offset: 633, length: 406, content: 南山又詔中尉左右內史表屬縣草困欲以償時東方朔在傍進諫曰臣聞謙遜靜愨天表之應應之以福驕溢靡麗天表之應應之以異今陛下累郎臺恐其不高也師古曰郎者堂下周屋也弋獵之處恐不廣也如天不為變則三輔之地盡可以為苑何必𥂕厔鄠杜乎奢侈越制天為之變上林雖小臣尚以為大也夫南山天下之陌也南有江淮北有河渭其地從汧隴以東商雒以西厥壤肥饒漢興去三河之地止霸產以西都涇渭之南北所謂天下陸海之地秦之所以虜西戎兼山東者也其山出玉石金銀銅鐵豫章檀柘異類之物不可勝原師古曰原本也言說不能盡其根本也此百工所取給萬民所足卬也又有秔稻梨栗桑麻竹箭之饒土宜薑芋水多蛙魚貧者得以人給家足無飢寒之憂故酆鎬之間號為土膏其賈畝一金今規以為苑絕陂池水澤之利而取民膏腴之地上乏國家之用下奪農桑之業棄成功就敗事損耗五穀是其不可一也且盛荊棘之林而長養麋鹿廣狐兔之苑大虎狼之墟又壞人冢墓發人室廬令幼弱懷土而思耆老泣涕而悲是其不可二也斥而營之垣而囿之騎馳東西車騖南北又有深溝大渠夫一, SBCK: ''}
