  - {type: variant, offset: 3328, length: 2, content: 兩京, WYG: 虎圈又曰李禹有寵於太子然好利亦有勇嘗與侍中貴人飲食侵陵之莫敢應後愬之上召禹使制虎懸下圈中未至地有詔引出之禹從洛中以劒砍絶纍欲刺虎師古曰落與絡同謂當時繈絡而下也纍索也三輔故事曰師子圈在建章宫西南列士𫝊曰秦召公子無忌無忌不行使朱亥奉璧秦王大怒將朱亥著虎圈中亥瞋目視虎虎不敢動郡國志曰雍州虎圈在通化門東二十五里秦王置朱亥於其中亥瞋目視虎不敢動漢文帝問上林尉處及馮婕妤當熊在此漢宫殿䟽曰有彘圈有師子圈武帝造秦故虎圈周匝三十五步長二十步西去長安十五里牢說文曰牢閑養牛馬園也詩曰乃造其曹執豕于牢注云曹群也言搏豕於牢中以為飲酒之殽穆天子𫝊曰伐犬戎獲虎畜於東虞命曰虎牢事具州郡曹子建求自試表曰如微才不試沒世無聞獸息鳥視終於白首此徒圏牢之養物非臣之所志也藩籬易曰羝羊觸藩羸其角詩曰折栁樊圃或云藩左傳曰宋向戌請弭諸侯之兵㐮公二十七年諸侯之大夫會於宋以藩為軍注云示不相忌也哀公十二年衞侯㑹吴于鄖吳人藩衞侯之舍子服景伯謂子貢曰夫諸侯之㑹事既畢矣侯伯致禮地主歸餼以相辭也今吳不行禮於衞而藩其君舍以難之子盍見太宰乃請束錦以行乃兔衞侯晉書曰庾衮字叔褒初衮諸父並貴盛唯衮父獨安貧約躬耕稼穡以給供養而執事勤恪與子弟樹籬跪以授條或曰今在隠屏先行何恭之過也荅曰幽顯易操非君子意也宋書曰謝瞻字宣逺弟晦時為宋臺右衞權遇已重於彭城還都迎家賔客輻凑瞻在家驚駭謂晦曰吾家以逺退為業汝遂勢傾朝野此豈門户福耶乃竪籬隔門庭曰吾不忍見南朝官苑}
