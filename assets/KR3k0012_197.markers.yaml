  - {type: variant, offset: 3324, length: 0, content: '', SBCK: 里池中遍生荷芰菰蒲冒間禽魚翔泳宣帝立廟曲池之北名曰樂遊廟即今昇平坊内基趾是也此在􅁗爲冝春􅁐在漢爲樂遊􅁐宇文愷營建京城以羅城東南地髙不便故􅆙此偶頭一坊餘地穿入芙蓉池以虚之郡國志云西夷有荔支園僰僮施夷中最賢者古所謂僰僮之富多以荔支爲業園植萬株樹收一}
  - {type: page-break, offset: 3324, content: '', id: KR3k0012_SBCK_197-5a}
  - {type: variant, offset: 3324, length: 0, content: '', WYG: 里池中遍生荷芰菰蒲其間禽魚翔沐宣帝立廟曲池之北名曰樂逰廟即今昇平坊内基趾是也此在秦為宜春苑在漢為樂逰苑宇文愷營建京城以羅城東南地高不便故即此隅頭一方餘地穿入芙蓉池以虛之郡國志云西夷有荔枝園僰僮施夷中最賢者古之謂僰僮之富多以荔枝為業園植萬株樹收一}
