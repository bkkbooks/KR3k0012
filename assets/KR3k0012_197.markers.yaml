  - {type: variant, offset: 1040, length: 200, content: 之樂不足以危無隄之輿蘇林曰隄限也輿乘輿也不敢斥天子故言輿也張晏曰一日之樂謂田獵也無隄之輿謂天子富貴無隄限也是其不可三也故務苑囿之大不恤農時非所以強國富人也夫殷作九市之宮而諸侯叛應劭曰紂於宮中設九市靈王起章華之臺而楚民散秦興阿房之殿而天下亂糞土愚臣忘生觸死逆威意犯隆指罪當萬死不勝大願願陳泰階六符孟康曰泰階三台也每台而二星凡六星符六星之符驗也應劭曰黃帝泰階六符經曰泰階者天之三階也上階為天子中階為諸侯公, SBCK: 夜飲酒}
