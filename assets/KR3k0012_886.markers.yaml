  - {type: variant, offset: 1131, length: 3, content: 李林甫, WYG: 故門之精名野狀如朱儒見人則拜以名呼之宜飲食又曰故}
  - {type: variant, offset: 1135, length: 1, content: 屢, WYG: 之精名揮文又曰山冕其狀如蛇一身兩頭五采文以其名呼之可使取金銀又曰故廢邱墓之精名曰元狀如老役夫衣青衣而好杵舂以其名呼之宜禾穀又曰故道徑之精名忌狀如野人以其名呼之使人不迷又曰道之精名作器狀如丈夫善眩人以其名呼之即去又曰故池之精名意狀如豚以其名呼之即去又曰故井之精名觀狀如美女好吹簫以其名呼之即去又曰絶水}
