  - {type: variant, offset: 3518, length: 522, content: 日輒於夜眠中驚起跳踉如與人相打狀毛修之嘗與同宿駭愕不達此意視之良久長民告毛此物奇健非我無以制之良曰是何物長民曰我正見一物甚黑而手腳不分明每月中多夕來輒共鬥深自驚懼焉屋中柱及椽桷間悉見有蛇頭令人以刀懸斫應刀隱滅去輒復出悉以紙褁柱桷紙內蔌蔌如有物行聲又曰劉斌在吳郡時婁縣有一女忽夜乘風雨恍惚至郡城內自覺去家正一炊頃衣小沾濡曉在門上求通言我天使也府君宜起迎我當大富貴不爾必有凶禍劉問所來亦不自知後二十許日劉果誅又曰桓溫時參軍夜坐忽見屋梁上有一伏免切齒向之兔來轉近引刀斫之見正中兔而實反傷膝流血甄異記曰徐州人吳清以太元五年被羗為征人殺雞求福置雉頭在拌中忽然而鳴其後破賊賊帥邵寶臨陣戰死于時殭尸狼籍莫之能識清見一人著白錦袍疑是主帥便斬以聞推校之乃是寶首清以功拜清河太守越自行伍猥蒙榮位雞之妖更為祥桓譚新論曰呂仲子婢死有女四歲數來為沐頭浣濯道士云其家青狗為之殺之則止楊仲亦言所知家嫗死忽起飲食後醉而坐祭床上如是三四家益厭苦其後醉形壞但得老狗便打殺之推問乃里頭沽家狗玄晏春秋曰新安寺有槐而鵲巢之雄雞奪而棲焉永安令繁璉予之族姑子也其主簿以告予予雞棲野人必將寄次于野縣其空乎夏五月丙申璉卒喪次子縣空縣送之賈誼鵬鳥賦曰誼為長沙太傅有鵬飛入誼舍止于坐隅鵬似鴞不祥鳥也, WYG: 六}
