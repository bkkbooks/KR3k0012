  - {type: variant, offset: 3884, length: 1, content: 云, SBCK: 吴猛與弟子殺蛇蛇死而蜀賊杜㢭滅􅀇中記曰千歳樹精爲青羊萬歳樹精爲青牛多出遊人間事具牛部又曰山精如人一足長三四尺食山蟹夜出晝藏人晝日不見夜聞}
