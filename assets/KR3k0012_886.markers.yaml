  - {type: variant, offset: 1154, length: 0, content: '', WYG: 被髮走忽見惡之名曰溝以其名呼之則無咎又曰百嵗狼化為女人名曰知女狀如美女坐道旁告丈夫曰我無父母兄弟丈夫取為妻三年而食人以其名呼之則逃去又曰故溷之精名曰卑狀如美女而}
  - {type: page-break, offset: 1154, content: '', id: KR3k0012_WYG_886-10b, image: WYG0900/WYG0900-0723b.png}
  - {type: variant, offset: 1155, length: 0, content: '', WYG: 鏡呼之使人知愧王子年拾遺記曰劉向校書天禄専精不倦假寢彌時有人植青藜之杖時夜已暗乃吹其杖端炯然}
  - {type: variant, offset: 1157, length: 0, content: '', WYG: 因以照向則户内如燈燭也向與言三代以前帝王興亡之事如目見也及説陰陽運數起㓕之狀授向五行洪範之文向前問其姓名對曰我太乙之精主天地圖䜟聞子好學下而觀焉抱朴子曰萬物之老者其精悉能假託形以惑人唯不能於鏡中易形耳是以古人}
