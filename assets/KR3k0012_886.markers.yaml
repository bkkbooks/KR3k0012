  - {type: variant, offset: 2367, length: 728, content: 劉曜所嬪又曰有人姓劉在朱方人不得共語若與之言人必遭禍難及身死疾唯一土謂無此理偶值人有屯塞耳劉聞之欣然而往自說被謗君能見明荅云世雷同何足卹須臾火發資畜服玩蕩盡於是舉世號為劉鵂鶹復遇諸塗皆閉車走馬掩目奔避劉亦杜門自守歲時一見則人驚散過於見鬼又曰太原王徽之字伯猷元嘉四年為兗州刺史在道有客命索酒炙言未訖而炙至徽之取自割終不入投地大怒少頃顧視向炙已變為徽頭矣驚愕反矚又覩其首在空中揮霍而沒王至州便殞又曰張仲舒元嘉十七年七月中晨夕間輒見門側有赤氣赫然後空中忽雨絳羅於其庭廣七八分長五六寸皆以箋紙繫之紙廣長亦與羅等紛紛甚駃舒惡焚之舒宿暴病而死又曰王愉義熙初在中庭行帽忽自脫仍乘空如人所著及愉母喪月期上祭酒器在几上須臾下地覆還登床尋而第三兒綏懷貳伏誅又曰檀道濟元嘉中鎮尋陽十二年入朝與家分別顧瞻城闕歔欷逾深識者是知道濟之不南旋也故時人為其歌曰生人作死別荼毒當奈何濟將發舟所養孔雀來銜其衣驅去復至如此數焉以十三年三月伏誅又曰武昌戴熙家道貧陋墓在樊山南占者云有王氣宣武桓公伏威西下停武昌令鑿之得一物大如水牛青色無頭腳時亦動搖斫刺不陷仍縱著江中得水便有聲如雷響發長川熙後嗣淪胥殆絕又曰烏傷葛輝夫義熙中在婦家宿至三更有兩人把火炬至階前疑是凶人往打之欲下杖悉變蝴蝶蠙紛飛散有一物衝輝夫腋下便倒地少時死述異記曰郭仲產宅在江陵批把寺南宋元嘉中起齊屋以竹為䆫櫺竹遂漸生枝葉長數丈鬱然如林仲產以為吉祥及孝建中被誅又曰嘉興朱休之元嘉中兄弟對坐犬向休蹲視二人而笑搖頭語曰言我不能歌聽我歌梅花今年故復可奈汝明年何其家斬犬牓首路側至梅花時兄弟相鬥弟戟傷兄收繫皆死又曰宋大明中頓丘縣令劉順酒酣晨起見榻床上有一聚凝血如覆盆形劉是武人了不驚怪乃令擣虀親自切血染虀食之棄其所餘後十許載至元徽二年為王道隆所, WYG: ''}
