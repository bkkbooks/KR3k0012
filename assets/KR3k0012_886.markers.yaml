  - {type: variant, offset: 3884, length: 1, content: 云, krp: 吴猛與弟子殺蛇蛇死而蜀賊杜㢭滅玄中記曰千歳樹精爲青羊萬歳樹精爲青牛多出遊人間事具牛部又曰山精如人一足長三四尺食山蟹夜出晝藏人晝日不見夜聞}
  - {type: variant, offset: 3886, length: 0, content: '', SBCK: 聲千歳蟾蜍食之又曰玉精爲白虎金精爲車馬銅精爲僮奴鈆精爲老婦􅀶物志曰山有夔其形如鼔一足澤有委虵􅃺如轂長轅見之者覇昔夏禹觀河見長人魚身出曰吾河精豈河伯也白澤圖曰厠之精名曰依􅀝青衣持白杖知其名呼之者除不知其名則死築室三年不居其中有小兒長三尺而無髪見人則掩鼻見之有福火之精名必方􅃺如鳥一足以其名呼之即去木之精名彭侯􅃺如黒狗無尾可烹之食之千載木其中有蟲名曰賈詘􅃺如豚食之如狗􅁏味又曰上有山林下有川泉地理之間生精名曰必方􅃺如鳥長尾此隂陽變化所生玉之精名岱委其狀如羙女衣青衣見之以桃戈刺之而呼其名則得金之精名倉􅃺如豚居人}
  - {type: page-break, offset: 3886, content: '', id: KR3k0012_SBCK_886-6b}
