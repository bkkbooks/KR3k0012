  - {type: variant, offset: 3908, length: 0, content: '', SBCK: 又曰故宅之精名曰揮文又曰山冕其􅃺如虵一身兩頭五采文以其名呼之可使取金銀又曰故廢丘墓之精名曰元􅃺如老􅃥夫衣青衣而杵好春以其名呼之冝禾榖又曰故道徑之精名忌􅃺如野人以其名呼之使人不迷又曰道之精名作器􅃺如丈夫善眩人以其名呼之則去又曰故池之精名意􅃺如豚以其名呼之即去又曰故井之精名觀􅃺如羙女好吹簫以其名呼之即去又曰絶水有金者精名曰侯伯􅃺如人長五尺綵衣以其名呼之即去又曰故臺屋之精名兩貴􅃺如赤狗以其名呼之使人目明又曰左右有石水生其間水出流千歳不絶其精名曰喜􅃺如小兒黒色以名呼之可使取飲食又曰三軍所載精名曰賔滿􅃺如人頭無身赤目見人則轉以其名呼之即去又曰故水石者精名慶忌􅃺如人乗車盖日馳千里以其名呼之可使入水取魚又曰丘墓之精名狼􅀑善與人闘不休爲桃弓􅁄矢羽以鵄羽以射之狼􅀑爲飄風脫履投之不能化又曰故市精名曰毛門其􅃺如囷無手足以名呼之即去又曰室之精名徯龍如小兒長一尺四寸衣黒衣赤幘大冠帶劒持㦸以其名呼之即去又曰山之精名䕫􅃺如鼔一足而行以其名呼之可使取虎豹又曰故牧弊池之精名曰髠頓􅃺如牛無頭見人則逐人以其名呼之則去又曰夜見堂下有小兒􅀍髪走勿惡之名曰溝以其名呼之即無咎又曰百歳狼化爲女人名曰知女􅃺如羙女坐道旁告丈夫曰我無父母兄弟丈夫取爲妻三年而食人以其名呼之則逃去又曰故溷之精名曰卑􅃺如羙女而持鏡呼之使人知愧王子年拾遺録曰劉向校書天禄專精不倦假􅄰彌時有人植青藜之杖時夜巳暗乃吹其杖端烱然火出因以照向則户内如燈燭也向與言三代巳前帝王興亡之事如目見焉及􅀃隂陽運數起滅之兆向因受五行洪範之文向問其姓名對曰我太一之精主天地圖䜟聞子好學下而觀焉抱朴子曰萬物之老者其精悉能假託形以惑人唯不能於鏡中易形耳是以古人入山道士皆以明鏡懸於背}
