  - {type: variant, offset: 2783, length: 469, content: 南占者云有王氣宣武桓公伏威西下停武昌令鑿之得一物大如水牛青色無頭腳時亦動搖斫刺不陷仍縱著江中得水便有聲如雷響發長川熙後嗣淪胥殆絕又曰烏傷葛輝夫義熙中在婦家宿至三更有兩人把火炬至階前疑是凶人往打之欲下杖悉變蝴蝶蠙紛飛散有一物衝輝夫腋下便倒地少時死述異記曰郭仲產宅在江陵批把寺南宋元嘉中起齊屋以竹為䆫櫺竹遂漸生枝葉長數丈鬱然如林仲產以為吉祥及孝建中被誅又曰嘉興朱休之元嘉中兄弟對坐犬向休蹲視二人而笑搖頭語曰言我不能歌聽我歌梅花今年故復可奈汝明年何其家斬犬牓首路側至梅花時兄弟相鬥弟戟傷兄收繫皆死又曰宋大明中頓丘縣令劉順酒酣晨起見榻床上有一聚凝血如覆盆形劉是武人了不驚怪乃令擣虀親自切血染虀食之棄其所餘後十許載至元徽二年為王道隆所害又曰周登之家在都宋明帝時統諸靈廟甚被恩寵母謝氏奉佛法太始五年夏月暴雨有物形隱煙霧垂頭屬廳事前地頭頸如大赤烏飲庭中水登之驚駭謂是善神路之汲水益之飲百餘斛水竭乃去二年而謝氏亡亡後半歲而明帝崩登之自此事業衰敗又曰宋驃騎大將軍河東柳元景大明八年少帝即位元景乘車行還使人在中庭洗車轅曬之有飄風中門而入直來衝車明年而闔門被誅, SBCK: 精}
