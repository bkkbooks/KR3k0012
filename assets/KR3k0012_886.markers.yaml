  - {type: punctuation, offset: 57, content: 『, id: KR3k0012_CHANT_886-bkkpn19}
  - {type: variant, offset: 57, length: 0, content: '', SBCK: 道何以爲體曰以無有爲體魄曰無有無形也魄曰無有何得而問也魂曰吾直有所遇之耳視之無形聽之無聲謂之幽􅁳幽􅁳者所以喻道而非道也白虎通曰魂魄者何謂也魂}
  - {type: page-break, offset: 57, content: '', id: KR3k0012_SBCK_886-2b}
  - {type: variant, offset: 57, length: 0, content: '', krp: 道何以爲體曰以無有爲體魄曰無有無形也魄曰無有何得而問也魂曰吾直有所遇之耳視之無形聽之無聲謂之幽冥幽冥者所以喻道而非道也白虎通曰魂魄者何謂也魂}
  - {type: variant, offset: 58, length: 4, content: 有妖乎對, SBCK: 伝伝行不休也少陽之氣故動不息人爲外魄者猶迫然着人也此少隂之氣象金石着人不移也魂者芸也情以除穢魄者迫也性以治内精神者何謂也精者静也太隂施化之氣也象水之化湏待任坐也神者恍惚大隂之氣出入無間抱朴子曰師言欲求長生當勤服大藥欲得通神當金水分形形分則自見其身三魂七魄而天靈地祇皆下接山川之神皆可役也又曰太一召魂魄丹法取五石封之以太一泥卒死三日以還者折齒内一丸以水送之入喉活活者皆見使者持節召之又}
