  - {type: variant, offset: 781, length: 2, content: 奇形, WYG: 底有絃歌之聲肴膳芬芳前梁上翁及年少數人絳衣素裳皆長八九寸凌波而出或有挾樂器者帝命坐於食案上老翁曰老臣前昧死歸訴蒙陛下即息斧斤全其居宅不勝欣躍故私相賀耳便治酒絃歌又有小人長毛無}
  - {type: variant, offset: 784, length: 0, content: '', WYG: 於鳥此人歌聲清婉繞梁帝欣恱勸酒乃獻帝一紫螺殻中有物}
