  - {type: variant, offset: 138, length: 0, content: '', WYG: 遇之耳視之無形聽之無聲謂之幽冥幽冥者所以喻道而非道也白虎通曰魂魄者何謂也魂猶伝伝行不休也少陽之氣故動不息人為外魄者猶廹然著人也此少陰之氣象金石著人不移也魂者芸也情以除穢魄者廹也性以治内精神者何謂也精者静也太陰施化之氣也象火之化須待任生也神者恍惚太隂之氣}
