  - {type: variant, offset: 776, length: 0, content: '', WYG: 一人形長七尺毛而不衣負數頭猿與語不詶將歸閉空屋中十餘日復送故處孫皓時海得毛精如人而有毛此蔣山精幽明録曰漢武帝與羣臣宴未央宫方噉黍臛忽聞語曰老臣尋覔不}
  - {type: variant, offset: 777, length: 0, content: '', WYG: 梁上有老翁長八九寸拄杖僂歩帝問之翁下稽首不言仰視屋俯指帝脚忽然不見問東方朔朔對曰其名為藻兼}
  - {type: variant, offset: 778, length: 2, content: 族覆, WYG: 木之精也夏巢林冬潜河陛下興造宫室斬伐其居故來訴耳仰視屋者殿名未央也俯視脚者脚足也願止於此也帝為此暫止少時幸河渚聞}
