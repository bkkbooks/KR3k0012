  - {type: variant, offset: 135, length: 2, content: 蛇妖, WYG: 淫厲况良霄乎又昭公曰宋公宴飲使昭子右坐語相泣也樂祁佐退而告人曰今兹君與叔孫其皆死乎吾聞之哀樂而樂哀皆䘮心也心之精爽是謂魂魄魂魄去之何以能久孝經援神契曰情者魂之使性者魄之主情生於陰以計念性主於陽以理契王肅䘮服要記曰魯哀公葬其父孔子問曰寧設魂衣乎哀公曰魂衣起苑荆於山之下道逄寒死友哀往迎其尸魂神之寒故作魂衣吾父生服錦繡死於衣被何魂衣為史記曰髙祖謂沛父兄曰遊子悲故鄉吾雖都闗中萬嵗之後吾魂魄猶樂思沛也晉典書曰東海王越死哀痛越棺柩被焚乃招魂葬越於丹徒中宗以為非禮乃下詔曰夫冢以藏形廟以安神今世招魂葬者是埋神也其禁之淮南子曰天氣為魂地氣為魄又曰魄問於魂曰道何以為體曰以無有為體魄曰無有形乎魂曰無有魄曰無有何得而問也魂曰吾直有}
