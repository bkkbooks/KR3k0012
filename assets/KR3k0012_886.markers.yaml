  - {type: variant, offset: 785, length: 2, content: 或乘, WYG: 如牛脂帝又曰可能以珍異見貽老翁顧命取洞穴之寳一人下波淵底倐忽還得一大珠數寸明燿絶世俄而翁等忽然而去東方朔曰螺殻中是蛟髓以傅面令人好顔色又有女千草在其中用之産易雷次宗豫章記曰永嘉末有大蛇長十餘丈㫁道經過者蛇輙吸取吞噬已數百道士呉猛與弟子殺蛇蛇死而蜀賊杜弢滅𤣥中記曰千嵗樹精為青羊萬嵗樹精為青牛多出遊人間又曰山精如人一足長三四尺食山蟹夜出晝藏人不能見但聞其聲千嵗蟾蜍食之又曰玉精為白虎金精為}
