  - {type: variant, offset: 17, length: 0, content: '', SBCK: 禮記檀弓下曰延陵季子適齊其反也其長子死葬於嬴􅀶之間旣封左􅃝右還其封且號者三曰骨􅁏歸復于土命也􅀂魂氣則無不之也無不之也而遂行又禮運曰體魄則降知氣在上死者北首生者南嚮又曰作其祝號玄酒以􅀕君與夫人交獻以嘉魂魄是}
  - {type: variant, offset: 17, length: 0, content: '', WYG: 禮記檀弓下曰延陵季子適齊其反也其長子死葬于嬴博之間既封左袒右還其封且號者三曰骨肉歸復於土命也若魂氣則無不之也無不知也又禮運曰體魄則降智氣在上死者北首生者南嚮又曰作其祝號𤣥酒以祭君與夫人交獻以嘉魂魄是}
  - {type: variant, offset: 17, length: 0, content: '', krp: 禮記檀弓下曰延陵季子適齊其反也其長子死葬於嬴博之間旣封左袒右還其封且號者三曰骨肉歸復于土命也若魂氣則無不之也無不之也而遂行又禮運曰體魄則降知氣在上死者北首生者南嚮又曰作其祝號玄酒以祭君與夫人交獻以嘉魂魄是}
