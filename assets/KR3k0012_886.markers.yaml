  - {type: variant, offset: 3101, length: 96, content: 家在都宋明帝時統諸靈廟甚被恩寵母謝氏奉佛法太始五年夏月暴雨有物形隱煙霧垂頭屬廳事前地頭頸如大赤烏飲庭中水登之驚駭謂是善神路之汲水益之飲百餘斛水竭乃去二年而謝氏亡亡後半歲而明帝崩登之自此事業衰敗, WYG: 即吉}
