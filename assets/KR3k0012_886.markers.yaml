  - {type: variant, offset: 1383, length: 1, content: 虵, SBCK: 一人長九尺餘皂衣髙冠大咤聲動左右子路引出與戰于庭仆於地乃是大鯷魚也長九尺餘孔子歎曰此物也何爲來哉吾聞物老則群精依之因衰而至此其來也豈以吾遇厄絶糧}
  - {type: variant, offset: 1383, length: 722, content: 虵從郭外入與邑中虵鬥孝文廟下邑中蛇死後二年秋有衛太子事自趙人江充起又曰王莽居攝東郡太守翟義知其將篡漢世謀舉義兵兄宣教授諸生滿堂郡鵝鴈數十在中庭有狗從外入齧之皆驚比救之皆斷頭狗走出門求不知處宣大惡之後數日莽夷其三族又曰魏司馬太傅討公孫淵父子先時淵家有犬著赤幘絳衣襄城北市生肉有頭目無手足而動瑤占者曰有形不成有體無聲其國滅又曰吳時廬陵郡亭重屋中常有鬼物宿者輒死自後使官莫敢入舍丹陽人應大者膽武至使廬陵便入亭止吏啟不可應不聽盡遣所將人還外持一口大刀至三更聞有扣閤者應遙問是誰荅云部郡相聞應使進相聞去須臾扣閤者如前曰府君相聞應復使進著皂衣又去應謂是人了無疑也須臾復扣閤言部府君相詣應乃知是鬼持刀迎之見三人皆盛衣服俱進坐畢府君者便與應談談未畢而部郡跳至應背後應顧以刀擊中之府君下坐走應追至亭後墻下及之斫傷數下應還臥達曙將人往尋之見血跡追皆得之云稱府君者是老狶部郡是老狸自後遂絕又曰夏侯藻母病困將詣淳于智卜有一狐當門向之嗥喚藻愁愕遂馳詣智智曰其禍甚急君速歸在嗥處樹下啼哭合家人驚怪大小畢出一人不且啼哭勿休然後其禍僅可救也藻如之母亦扶疾而出家人既集堂屋五間拉然崩又曰淳于智字叔平濟北人性沉深有惠義少為書生善易高平劉采夜鼠齧其左手中指意甚惡之以問智智為筮之曰鼠本欲殺君而不能當相為使之反死乃以朱書其手腕橫文後三寸為田字辟方一寸使夜露手以臥其夜大鼠伏死手前又曰東陽劉寵字道和居于姑熟每夜門亭有血數十不知所從來如此三四後寵為折衝將軍見遣北征將行而炊食悉變為蟲寵遂北征軍敗於檀丘為徐龕所殺續搜神記曰廣州有三人共在山中伐木忽見石窠中有三卵大如升取煮之始湯熱便聞林中如風雨聲須臾有一蛇大十圍長四五丈徑來於湯中銜卵去三人無幾皆死又曰代郡張平者符堅時為賊帥自號并州刺史養一狗, WYG: ''}
