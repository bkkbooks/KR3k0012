  - {type: variant, offset: 805, length: 567, content: 道別何意相照也意甚惡之至鎮未旬日因齒疾而卒北齊書曰趙郡王叡奏後主云和士開不宜居內出士開為兗州刺史太后欲留過百日叡正色不許叡出夜方寢見一人長可丈五尺當門向床以臂壓王良久遂失甚惡之而明日被誅沈約宋書曰蕭思話在青州常所用銅斗覆在藥廚下忽於斗下得二死雀思話歎曰斗覆而雙雀殞其不祥乎既而被繫宋書曰劉敬宣嘗夜與寮屬宴空中有投一隻芒屩於坐墜敬宣食盤上長三尺五寸已經人著耳鼻間並欲壞頃之而敗喪易洞林曰吳興太守袁玄瑛當之官卜卦占凶曰至官當有赤蛇為妖不可殺至果有赤蛇在銅虎符石函上蟠玄瑛擿殺之其後果為賊徐馥所害唐明皇雜錄曰李適之既貴且豪嘗列鼎前以具膳羞一旦庭中鼎躍出相鬥家僮告適之適之乃往以其所引酒自誓而鬥亦不解鼎耳及足皆落明日適之罷知政事俄為李林甫所陷貶宜春太守而終又曰李林甫宅屢有妖怪其南北隅溝中有火光大起或有小兒持火出入林甫惡之又曰李林甫之疾也晨起盥飾將入朝命取書囊即常時所要事目也忽覺頗重於常時者開視之即有二鼠出焉投下於地即變為蒼狗雄目張牙仰視林甫命弓射之殷然即滅林甫惡之不踰月而卒世說曰衛瓘永熙中家人炊飯墮地盡化為螺出足而行瓘終見誅列異傳曰中山王周南正始中為襄邑長鼠從穴中出在廳上語曰周南汝以某月某日當死周南不應鼠還穴中至期復更冠幘絳衣而語曰周南汝日中當死周南復不應日適中鼠曰周南汝不應我復何道言鼠遂顛蹶而即失冠衣周南使卒取來視之如常鼠耳搜神記, krp: 録}
