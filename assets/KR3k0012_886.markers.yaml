  - {type: variant, offset: 795, length: 46, content: 夜夢人謂己曰與君幽明道別何意相照也意甚惡之至鎮未旬日因齒疾而卒北齊書曰趙郡王叡奏後主云和士開, WYG: 名則死築室三年}
