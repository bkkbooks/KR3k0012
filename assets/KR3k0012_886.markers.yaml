  - {type: variant, offset: 1741, length: 452, content: 之見血跡追皆得之云稱府君者是老狶部郡是老狸自後遂絕又曰夏侯藻母病困將詣淳于智卜有一狐當門向之嗥喚藻愁愕遂馳詣智智曰其禍甚急君速歸在嗥處樹下啼哭合家人驚怪大小畢出一人不且啼哭勿休然後其禍僅可救也藻如之母亦扶疾而出家人既集堂屋五間拉然崩又曰淳于智字叔平濟北人性沉深有惠義少為書生善易高平劉采夜鼠齧其左手中指意甚惡之以問智智為筮之曰鼠本欲殺君而不能當相為使之反死乃以朱書其手腕橫文後三寸為田字辟方一寸使夜露手以臥其夜大鼠伏死手前又曰東陽劉寵字道和居于姑熟每夜門亭有血數十不知所從來如此三四後寵為折衝將軍見遣北征將行而炊食悉變為蟲寵遂北征軍敗於檀丘為徐龕所殺續搜神記曰廣州有三人共在山中伐木忽見石窠中有三卵大如升取煮之始湯熱便聞林中如風雨聲須臾有一蛇大十圍長四五丈徑來於湯中銜卵去三人無幾皆死又曰代郡張平者符堅時為賊帥自號并州刺史養一狗名曰飛鷰形若小驢忽夜上廳事屋上行行聲如常平未經年果為鮮卑所逐敗走降符堅未幾便死又曰新冶庾謹母病兄弟三人悉在白日侍疾常燃火忽見帳帶自卷上自舒如此數四須臾聞床前狗鬥聲非常舉家共視了, krp: 覔}
