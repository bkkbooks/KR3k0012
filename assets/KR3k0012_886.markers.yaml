  - {type: 'tls:seg', offset: 63, content: '', id: KR3k0012_CHANT_886-1a.15}
  - {type: punctuation, offset: 63, content: 『, id: KR3k0012_CHANT_886-bkkpn23}
  - {type: variant, offset: 64, length: 0, content: '', SBCK: 無賢愚皆知巳身}
  - {type: variant, offset: 64, length: 0, content: '', krp: 無賢愚皆知巳身之魂魄魂魄分去則人病盡去則死故分去術家有録之之法盡去則禮典有招魂之義此之爲物至近者也然與人俱生至於終身莫或自聞見之者豈可不聞見復言無乎又曰軫星逐鬼張星拘魂東井還魄也異苑曰新野庾寔妻滎陽毛氏女義熈中五月曝曬席忽見女在席下薦上以驚怛便女真形在別牀如故不旬日而夭也仲夏忌舉牀第兹驗矣襄陽耆舊記曰羊公與鄒潤甫登峴山垂泣曰自有宇宙便有此山由來賢逹勝士登此逺望如我與卿者多矣皆湮滅無聞不可得知念此使人悲傷我百年後魂魄猶當登此山十洲記曰聚窟洲在西海中申未地洲上有大樹與楓木相似華葉香聞數百里名此爲反魂樹叩其樹樹亦能自聲聲如牛吼聞之者皆心震神駭伐其根心在玉釡中煑取汁更微火熟煎之如黒飴令可丸名驚精香或名之爲震靈丸或名之爲反生香或名之爲鳥精香或名之爲却死香一種五名斯靈物也香氣聞數百里死尸在地聞仍活博物志曰援神契云五岳之神聖四瀆之精仁太山天帝孫也主召人魂東方萬物始故主人生命之長短王子年拾遺録曰融臯山上有飜魂稻言食者死更生楚辭曰招魂者宋王}
  - {type: variant, offset: 65, length: 7, content: 所忌其氣燄以取, SBCK: 魂魄魂魄分去則人病盡去則死故分去術家有録}
  - {type: variant, offset: 66, length: 1, content: 忌, krp: 作也玉憐哀屈原忠而斥棄憂愁山澤魂魄放佚厥命將落故作招魂欲以復其精神延其年壽外陳四方之惡内崇楚國之羙以諷諌懷王兾其覺悟而還之也又招魂曰帝告巫陽曰有人在下我欲輔之魂魄離散汝筮與之使筮其所冝而與招其魂使復其精神精易上繫曰男女構精萬物化生禮記祭義曰衆生必死死必歸土此之謂鬼骨肉斃于下隂爲野土}
