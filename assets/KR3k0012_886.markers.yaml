  - {type: variant, offset: 2195, length: 1537, content: 狗止見一死人頭在地頭猶有血兩眼尚動甚可憎惡其家怖懼夜不持出門即於後園中埋之明旦往視之出土上兩眼猶爾即又埋之後旦亦復出乃以磚著頭合埋之不復出也數日其母遂亡異苑曰謝文靜於後府接賓婦劉氏見狗銜謝頭來久乃失所在婦具說之謝容無異色是月而薨又曰安固李道豫元嘉中狗當路眠豫蹴之狗曰汝停死何以蹋我經年豫死又曰晉惠帝羊后將入宮衣中忽有火光自後蕃臣遘兵洛陽失御后為劉曜所嬪又曰有人姓劉在朱方人不得共語若與之言人必遭禍難及身死疾唯一土謂無此理偶值人有屯塞耳劉聞之欣然而往自說被謗君能見明荅云世雷同何足卹須臾火發資畜服玩蕩盡於是舉世號為劉鵂鶹復遇諸塗皆閉車走馬掩目奔避劉亦杜門自守歲時一見則人驚散過於見鬼又曰太原王徽之字伯猷元嘉四年為兗州刺史在道有客命索酒炙言未訖而炙至徽之取自割終不入投地大怒少頃顧視向炙已變為徽頭矣驚愕反矚又覩其首在空中揮霍而沒王至州便殞又曰張仲舒元嘉十七年七月中晨夕間輒見門側有赤氣赫然後空中忽雨絳羅於其庭廣七八分長五六寸皆以箋紙繫之紙廣長亦與羅等紛紛甚駃舒惡焚之舒宿暴病而死又曰王愉義熙初在中庭行帽忽自脫仍乘空如人所著及愉母喪月期上祭酒器在几上須臾下地覆還登床尋而第三兒綏懷貳伏誅又曰檀道濟元嘉中鎮尋陽十二年入朝與家分別顧瞻城闕歔欷逾深識者是知道濟之不南旋也故時人為其歌曰生人作死別荼毒當奈何濟將發舟所養孔雀來銜其衣驅去復至如此數焉以十三年三月伏誅又曰武昌戴熙家道貧陋墓在樊山南占者云有王氣宣武桓公伏威西下停武昌令鑿之得一物大如水牛青色無頭腳時亦動搖斫刺不陷仍縱著江中得水便有聲如雷響發長川熙後嗣淪胥殆絕又曰烏傷葛輝夫義熙中在婦家宿至三更有兩人把火炬至階前疑是凶人往打之欲下杖悉變蝴蝶蠙紛飛散有一物衝輝夫腋下便倒地少時死述異記曰郭仲產宅在江陵批把寺南宋元嘉中起齊屋以竹為䆫櫺竹遂漸生枝葉長數丈鬱然如林仲產以為吉祥及孝建中被誅又曰嘉興朱休之元嘉中兄弟對坐犬向休蹲視二人而笑搖頭語曰言我不能歌聽我歌梅花今年故復可奈汝明年何其家斬犬牓首路側至梅花時兄弟相鬥弟戟傷兄收繫皆死又曰宋大明中頓丘縣令劉順酒酣晨起見榻床上有一聚凝血如覆盆形劉是武人了不驚怪乃令擣虀親自切血染虀食之棄其所餘後十許載至元徽二年為王道隆所害又曰周登之家在都宋明帝時統諸靈廟甚被恩寵母謝氏奉佛法太始五年夏月暴雨有物形隱煙霧垂頭屬廳事前地頭頸如大赤烏飲庭中水登之驚駭謂是善神路之汲水益之飲百餘斛水竭乃去二年而謝氏亡亡後半歲而明帝崩登之自此事業衰敗又曰宋驃騎大將軍河東柳元景大明八年少帝即位元景乘車行還使人在中庭洗車轅曬之有飄風中門而入直來衝車明年而闔門被誅幽明錄曰吳北寺終祚道人臥齋中鼠從坎出言終祚後數日當死終祚呼奴令置犬鼠云亦不畏此且犬入戶必死犬至果爾終祚嘗為商閉戶謂鼠曰汝正欲使我富貴耳今既遠行勤守吾房勿令有所零失時桓溫在南州禁殺牛甚急終祚載數萬竊買牛皮還東貨之得二十萬還時室猶闔也都無所失其怪亦絕自是浸富又曰石虎時太武殿圖賢人之像頭忽悉縮入肩中又曰義興周超為謝晦司馬在江陵妻許在家夜遙見屋裏月光一死人頭在地血流甚大驚怪即便失去後超被法又曰元嘉九年南陽樂遐嘗在坐忽聞空中有人呼其夫婦名甚急半夜乃止殊自驚懼後數日婦屋後還忽舉體衣服惣是血未一月而夫婦相繼病卒又曰諸葛長民富貴後嘗一月或數十日輒於夜眠中驚起跳踉如與人相打狀毛修之嘗與同宿駭愕不達此意視之良久長民告毛此物奇健非我無以制之良曰是何物長民曰我正見一物甚黑而手腳不分明每月中多夕來輒共鬥深自驚懼焉屋中柱及椽桷間悉見有蛇頭令人以刀懸斫應刀隱滅去輒復出悉以紙褁柱桷紙內蔌蔌如有物行聲又曰劉斌在吳郡時婁縣有一女忽夜乘風雨恍惚至郡城內自覺去家正一炊頃衣小沾濡曉在門上求通言我天使也府君宜起迎我當大富貴不爾必有凶禍劉問所來亦不自知後二十許日劉果誅又曰桓溫時參軍夜坐忽見屋, krp: ''}
