  - {type: variant, offset: 1137, length: 2, content: 妖怪, WYG: 金者精名曰侯伯狀如人長五尺綵衣以}
  - {type: punctuation, offset: 1139, content: 。, id: KR3k0012_CHANT_886-bkkpn345}
  - {type: 'tls:seg', offset: 1139, content: '', id: KR3k0012_CHANT_886-16a.4}
  - {type: variant, offset: 1140, length: 5, content: 南北隅溝中, WYG: 名呼之即去又曰故臺屋之精名兩貴狀如赤狗以其名呼之使人目明又曰左右}
  - {type: variant, offset: 1146, length: 2, content: 火光, WYG: 石水生其間水出流千嵗不絶其精名曰喜狀如小兒黑色以名呼之可使取飲食又曰三軍所載精名曰賔滿狀如人頭無身赤目見人則轉以其名呼之即去又曰故水精名忌狀如人乗車盖日馳千里以其名呼之可使人入水取魚又曰邱墓之精名狼鬼善與人鬬不休為桃弓棘矢司以鵄羽以射之狼鬼為飃風脱履投之不能化又曰故市精名曰毛門其狀如囷無手足以名呼之即去又曰室之精名傒龍如小兒長一尺四寸衣黑衣赤幘}
  - {type: page-break, offset: 1146, content: '', id: KR3k0012_WYG_886-9b, image: WYG0900/WYG0900-0722d.png}
  - {type: variant, offset: 1149, length: 2, content: 起或, WYG: 冠帶劍持㦸以其名呼之即去又曰山之精名夔狀如鼓一足而行以其名呼之可使取虎豹又曰故牧弊池之精名曰髠蝢狀如牛頭見人則逐人以其名呼之則去又曰夜見堂下}
  - {type: page-break, offset: 1149, content: '', id: KR3k0012_WYG_886-10a, image: WYG0900/WYG0900-0723a.png}
