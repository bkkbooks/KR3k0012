  - {type: variant, offset: 52, length: 0, content: '', SBCK: 哀樂可樂而哀而樂哀皆喪心也心之精爽是謂魂魄魂魄去之何以能乆孝經援神契田情者魂之使性者魄之使情生於隂以計念性生於陽以理契王肅喪服要記曰魯哀公葬其父孔子問曰寜設魂衣乎哀公曰魂衣起苑荆苑荆於山之下道逢寒死友人羊角哀徃迎其尸魂神之寒故作魂衣吾父生服錦繡死於衣􅀍何用魂衣爲史記曰髙祖謂沛父兄曰遊子悲故郷吾雖都關中万歳之後吾魂魄猶樂思沛也晉中興書曰東海王越妃裴痛越棺柩􅀍焚乃招魂葬越於丹徒中宗以爲非禮乃下詔曰夫􅃁以藏形廟以安神今丗招魂葬者是埋神也其禁之淮南子曰天氣爲魂地氣爲魄又曰魄}
  - {type: page-break, offset: 52, content: '', id: KR3k0012_SBCK_886-2a}
  - {type: variant, offset: 52, length: 0, content: '', krp: 哀樂可樂而哀而樂哀皆喪心也心之精爽是謂魂魄魂魄去之何以能乆孝經援神契田情者魂之使性者魄之使情生於隂以計念性生於陽以理契王肅喪服要記曰魯哀公葬其父孔子問曰寜設魂衣乎哀公曰魂衣起苑荆苑荆於山之下道逢寒死友人羊角哀徃迎其尸魂神之寒故作魂衣吾父生服錦繡死於衣𬒳何用魂衣爲史記曰髙祖謂沛父兄曰遊子悲故郷吾雖都關中万歳之後吾魂魄猶樂思沛也晉中興書曰東海王越妃裴痛越棺柩𬒳焚乃招魂葬越於丹徒中宗以爲非禮乃下詔曰夫冡以藏形廟以安神今丗招魂葬者是埋神也其禁之淮南子曰天氣爲魂地氣爲魄又曰魄}
  - {type: variant, offset: 54, length: 2, content: 申繻, SBCK: 魂}
  - {type: variant, offset: 54, length: 78, content: 申繻曰猶有妖乎對曰人之所忌其氣燄以取之妖由人興也人無釁焉妖不自作人棄常則妖興故有妖也又文公曰有蛇自泉宮出入于國如先君之數伯禽至僖公十七君秋八月聲姜薨毀泉臺魯, WYG: ''}
