  - {type: variant, offset: 468, length: 6, content: 孟龍符懷王第, SBCK: 四月鄭人侵衛收收衛邑也經書夏四月葬衛􅁊公今傳直言夏而更以四月附鄭人侵衛牧者於下事冝得月以明事之先後故不復備舉經文也以報東門之役東門役在四年又曰秋衛伐邢以報免囿之役邢不速退所以獨見伐也又曰夏趙盾救焦遂自隂地有諸侯之師侵鄭以報大􅁄之役又曰􅀳荀息請屈産之乗與垂􅁄之壁假道於虞以伐􅉑公曰是吾寳也對曰􅀂得道於虞猶外府也公曰宫之竒在對曰宫之竒爲人懦不能強諌且少長於君君暱之雖諫將不聽乃使荀息假道於虞曰兾爲不道入自㒹軨伐鄍}
  - {type: page-break, offset: 468, content: '', id: KR3k0012_SBCK_303-5a}
  - {type: variant, offset: 468, length: 4, content: 孟龍符懷, WYG: 齊侯伐楚楚使與師言曰君處北海寡人處南海唯是風馬牛不相及也不虞君之渉吾地也何故管仲對曰昔召康公命我先君太公曰五侯九伯汝實征之賜我先君履東至于海西至于河南至于穆陵北至于無棣爾貢苞茅不入}
