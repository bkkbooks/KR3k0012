  - {type: variant, offset: 58, length: 1, content: 偏, WYG: 九伐之法正邦國馮弱犯寡則眚之賊賢害民則伐之暴内侵外則壇之野荒民散則削之負固不服則侵之賊殺其親則正之放弑其君則殘之犯令陵政則杜之内外亂鳥獸行則滅之大戴禮曰凡明王之所征者必皆道之所廢者也以彼廢道而不行然後率師以征之誅其君改其政弔其民而不主於奪其財也故曰明王之征也猶時雨之降也左傳曰夏鄭人侵許凢師有鍾鼓曰伐無曰侵輕曰襲又曰吳子諸樊伐楚門于巢攻巢門也巢牛臣曰吳王勇而輕若啓之}
