  - {type: variant, offset: 1434, length: 0, content: '', SBCK: 文脩之使務利而避害懷德而畏威故能保丗以滋大昔我先王后稷以服事虞夏及夏之衰也弃稷不務我先王不窋用失其官而自竄于戎狄之間不敢怠業時序其德纂脩其緒脩其訓典朝夕恪勤守以惇篤奉以忠信奕丗載德不忝前人至於武王昭前人之光明而加之以慈和事神保民莫不欣喜商王帝辛大惡於民庶民不忍欣戴武王以致戎于商牧是先王非務武也勤恤民隱而除其害也夫先王之制國内甸服國外侯服侯衛賔服夷蠻要服戎翟荒服甸服者􅀕侯服者祀賔服者享要服者貢荒服者王日􅀕月祀時享歳貢終王先王之訓也有不􅀕則脩意有不祀則脩言有不享則脩文有不貢則脩名有不王則脩徳序成而又不至則脩刑於是乎有刑不􅀕伐不祀征不享讓不貢告不王於是乎有刑罰之辟有攻伐之兵有征討之備有威譲之令有文告之辭布令陳辭而又不至則又増脩其徳無勤民於逺矣是以近無不至逺無不服今自大畢伯士之終也犬戎氏以其職來王天子曰予必以不享征之且觀之兵其無乃廢先王之訓而王幾頓也吾聞夫犬戎樹惇率舊德而守終純固其有以禦我矣王遂征之得四白狼四白鹿以歸自是荒服者不至又曰文公即位二年欲用其民用用征伐子犯曰民未知義未知尊上之義盍納天子以示之義時天子之子帶之難在鄭地氾乃納襄王于周曰可矣乎對曰民未知信乃伐原謂信上令以五日之糧糧盡不降命去之曰可矣乎對曰民未知禮盍大蒐備師尚禮以示之蒐所以明尊卑順少長習威儀也乃大蒐于􅀍廬􅀍廬􅀳地作三軍使郄縠將中軍以爲大政大掌國政郄溱佐之溱晉大夫郄至之先子犯曰可矣可用也遂伐曹衛岀榖戍釋宋圍敗楚師于城濮於是乎遂伯穀齊地也戰國䇿曰趙且伐燕􅂫代謂燕惠王曰今者臣來過易水見蜯方出曝而鷸啄其􅁏蜯合而拑其啄鷸曰今日不雨明日不雨即有蜯脯蜯亦曰今日不出明日不出必見死鷸兩者不能相捨而漁者併擒之今趙且伐燕不相支以􅁦大衆㠯恐強􅁗之爲漁父也願大王熟計之惠王曰善乃止又曰蘇􅁗謂􅁗惠王曰戰車萬乗􅁬擊百萬可以并諸侯呑天下稱帝而治願大王少留意臣請奉其郊王曰寡人聞毛羽不豐滿不可以髙飛文章不成者不可以誅罰道德不厚者不可以使民政教不順者不可以煩大臣􅁗曰臣固疑大王不能用也昔者神農伐捕逐黄帝伐涿鹿堯伐驩兠舜伐三苗禹伐共工湯伐有夏文王伐崇武王伐紂}
