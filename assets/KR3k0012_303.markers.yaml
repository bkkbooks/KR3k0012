  - {type: variant, offset: 29, length: 14, content: 力能貫三百斤弓虜每犯塞常為士, SBCK: 而輕􅀂啓之將親門啓開門也我獲射之必殪殪死是君也壃其少安呉子門焉牛臣隱於短墻以射之}
