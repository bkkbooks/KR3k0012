  - {type: variant, offset: 1348, length: 203, content: 殿也後漢書曰岑彭圍隗囂於西城囂將行巡周宗將蜀救兵到囂得出還冀漢軍食盡燒輜重引兵下隴延弇亦相隨而退囂出兵尾擊諸營彭殿為後拒尾謂異其後也凡軍在前曰啟在後曰殿後周書曰高祖伐齊還以齊王憲為後拒齊主自率眾來追至於高梁橋憲以精騎二千阻水為陣齊領軍叚暢直進至橋隔水招暢與語語畢憲問暢曰若何姓名暢曰領軍叚暢也公復為誰憲曰我虞候大都督耳暢曰觀公言語不是凡人今日相見何用隱其名位陳王純梁公侯莫陳芮內史王誼等並在憲側暢固問不已憲, WYG: 善}
