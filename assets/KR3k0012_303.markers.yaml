  - {type: variant, offset: 475, length: 12, content: 子也驍勇有膽氣高祖伐廣固, SBCK: 門兾之旣病則亦唯君故今號爲不道保於逆旅侵􅁦邑之南鄙敢請假道}
  - {type: variant, offset: 475, length: 0, content: '', WYG: 軍軍其前曼伯與子元潛軍軍其後燕人畏鄭三軍而不虞制人君子曰不備不虞不可以師又曰十年公㑹鄭伯伐宋壬申公敗宋師于菅庚午鄭師入郜辛未歸于我鄭伯後期而公獨敗宋師故鄭伯獨推進兵以入郜防入而不有命魯取之公上爵譲以自贊也君子謂鄭莊公於是乎可謂正矣以王命討不庭不貪其土以勞王爵又曰衛大旱寗莊子曰周飢克殷而年豐今邢方無道諸侯無伯伯長也天其或者欲使衛討邢乎從之師興而雨又曰公伐邾取須句公卑邾不設備而禦之卑小也臧文仲曰國無小不可易也蜂蠆有毒而况國乎公弗聽及邾戰於升陘我師敗績又曰楚子以諸侯伐吳使屈申圍朱方朱方吳邑慶封所封也屈申蕩之}
