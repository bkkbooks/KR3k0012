  - {type: variant, offset: 2083, length: 2315, content: 歲不興左傳曰北戎侵鄭鄭伯患之曰彼徒我車懼其侵軼我也徒步兵也軼突也公子突曰使勇而無剛者嘗寇而速去之嘗試也勇則能往無其剛不恥退也君為三覆以待之覆伏兵也戎輕而不整貪而無親勝不相讓敗不相救先者見獲後必務進進而遇覆必速奔後者弗救則無繼矣乃可以逞從之戎人之前遇覆者奔鄭將祝聃逐之衷戎師前後擊之盡殪為三部伏兵祝聃帥勇而無剛者先犯之戎而速奔以遇二伏兵至後伏兵伏兵起戎還走祝聃返遂逐之戎前後及中三處受敵故曰衷戎師殪死衷丁仲切又曰吳侵楚楚將養由基奔命楚司馬子庚以師繼之養由基曰吳乘我喪謂我不能師也必易我而不戒戒備子為三覆以待我我請誘之子庚從之戰于庸浦庸浦楚地大敗吳師又曰秋九月晉侯飲趙盾酒伏兵甲將攻之其右提彌明知之右軍右也趍登曰臣將侍宴過三爵非禮也遂扶跣以下公嗾獒焉明搏而殺之鬥且出提彌死之又曰衛侯在平壽平壽衛下邑公孟有事於蓋獲之門外有事祭也蓋獲衛郭門也齊氏惟於門外而伏甲焉齊豹之家後漢書曰馮異招集諸營保數萬人與賊約期會戰使壯士變服與赤眉同伏於道側且曰赤眉使萬人攻異前部異裁出兵以救之裁小出兵所以示弱也賊見勢弱遂悉眾攻異乃縱兵大戰日昃賊氣衰伏兵卒起衣服相亂赤眉不復識別眾遂驚潰追擊大破於崤底降男女八萬人通典曰後漢末荊州牧劉表遣劉備北侵至鄴曹公遣將李典與夏侯惇距之備一旦燒屯去惇率諸軍追擊之典曰賊無故退疑必有伏南道穿狹草木深不可追也惇不聽與將于禁追之典與惇等果入賊伏衷戰不利典往救備救至乃退又曰後漢末呂布從東緡與陳宮將萬餘人來與曹公戰時兵皆出取麥在者不數千人屯營不固曹公乃令婦人守陳悉將兵距之屯西有大堤其南樹木幽深布疑有伏乃相謂曰曹操多詐勿入伏中引軍南七十餘里明日復來曹公隱兵堤裏出半兵堤外布益進乃令輕兵挑戰既合伏兵乘堤步卒並進遂大破之晉書曰鎮南將軍杜元凱伐吳樂鄉城晉牙門管定周旨等伏兵樂鄉城外吳都督孫歆先遣車出拒晉將王濬於上流大敗而還旨等發伏兵隨歆軍入歆不覺直至賬下虜歆於是進逼江陵吳都督將伍延偽請降而列兵登陴晉師攻剋之十六國春秋曰後晉石季龍攻晉將劉演于廩丘晉將邵續使文鴦救演季龍退止盧關津以避之文鴦弗能進屯于景亭兗州豪右張平等起兵救演季龍夜棄營設伏于外揚聲將歸河北張平以為信然入于空營季龍廻擊敗之遂陷廩丘又曰夏赫連勃進屯依力川後秦姚興來伐至三城勃勃率騎禦之興遣其將姚文宗拒戰勃勃偽退設伏以待之興將姚榆生等追之伏兵夾擊皆擒之北齊書曰叚韶與右丞相斛律光率師伐後周五月攻服秦城周人於姚襄城南更起城鎮東接定陽又作深塹斷絕行道韶乃密抽壯士從襲之又遣潛渡河告姚襄城中令內外相應度者千有餘人周人始覺於是合戰大破之諸將咸欲攻其新城韶曰此城一面阻河三面地險不可攻縱令得之一城地耳不如更作一城壅其要路破服秦城併加以圖定陽計之長者將士咸以為然遂圍定陽其城主楊範固守不下韶登山以觀城勢乃縱兵爭攻之七月屠其外城韶謂光曰此城三面重澗險阻並無走路唯慮東南一處耳賊若突圍必從此出但簡精兵專守自是成摛光乃令壯士千餘人設伏於東澗口其夜果如所策賊遂出城伏兵擊之大潰範等面縛盡獲其眾後魏書曰万俟醜奴作亂關中魏將賀拔岳率兵討之岳以輕騎八百北渡渭殺略其民以挑之醜奴大將遲菩薩果率步騎三萬至渭北岳以輕騎數千餘菩薩隔水交言岳稱楊國威菩薩自言強盛往復數返時已逼暮於是各還兵密於渭南傍水分精騎數十為一處隨地形便置之明日自將百餘騎隔水與賊相見岳漸前進先所置騎隨岳而集騎既漸增賊不復測其多少行二十許里至水淺可濟之處岳便馳馬東出以示奔遁賊謂岳走乃棄步兵南渡渭之輕騎追兵東行十餘里依橫崗設伏待之賊以路險不得齊進前後繼至半度崗東岳乃廻與賊戰身先士卒急擊之賊便退走岳號令所部賊下馬者皆不聽殺賊顧見之便悉投馬俄而虜獲三千人馬亦無遺遂擒菩薩乃度渭北降步卒萬餘隋書曰煬帝征吐谷渾至覆袁川時吐谷渾王與數騎而遁其名王詐為渾主保車我真山帝令將張定和率師擊之定和既與賊相遇輕其眾少呼之命降賊不肯定和不被甲挺身登山賊伏兵於巖石之下發矢中之而斃唐書曰武德中太宗圍王世充於東都竇建德自河北率兵十二萬來救太宗自率騎二千五百步卒千人趣武牢四月建德自滎陽西上築壘于板渚太宗以五百騎出武牢東二十餘里將挑戰先伏李勣程咬金秦叔寶等齩五巧切令尉遲敬德執矟造建德壘下大呼致師賊眾大驚擾出兵數千騎太宗逡巡漸却遂引以入伏內李勣等奮擊大破之獲其大將殷秋石瓚斬首數百級又曰羅士信仕王充率千餘人奔于穀州高祖以為新安道行軍揔管使圖世充士信進居前鋒退居後殿凡所虜獲悉分士卒以此為常身未曾自取人有功者解衣下馬而賞之然持兵嚴暴有不用命者無問親友必皆斬決由是下不附而畏之及大軍至洛陽士信以兵圍世充千金堡其中人大罵之士信怒夜遣百餘人將嬰兒數十從南而來至于堡下詐言從東都來投羅揔管也因令嬰兒啼譟既而陽驚曰此千金堡吾輩錯矣忽然而去堡中謂是東都逃人遽出兵追之士信伏五千人於路側候其開門而奮擊遂破之殺無遺類也又曰武德中菀君璋及突厥吐屯設來寇馬邑高蒲政設三伏以待之突厥至城下伏兵發大破之斬首二百餘級以蒲政為朔州總管曲赦馬邑又曰王君廓從大軍討別下轘轅羅山二縣王充遣將魏隱率兵拒之君廓撤營偽遁設伏以待之隱縱兵疾進發伏破之又曰太宗初為右元帥揔兵十萬徇東都軍屯西苑營於三王陵自三月而旋太宗俄而隋將叚達率萬餘人自後而至太宗發伏以擊之賊師大敗親自追奔至金城下斬四十餘級又曰王君廓亡命聚徒數千人轉掠長平進逼夏縣河東郡丞丁榮以兵拒之又遣使慰諭君廓見其使謬為恭敬稱欲歸首榮心輕之於是曜兵登山下十餘里君廓悉匿其眾於山谷中榮無所見引兵而退纔至山下君廓追擊大破之吳越春秋曰公子光伏甲於私室中具酒而王僚乃被棠夷之甲三重使兵衛陳於道專諸置魚腹而進之刺王僚貫脾達背王僚立死世說曰桓玄伏甲設饌廣延朝士因此欲誅謝安王坦之王甚遽問謝謝之寬容愈表於皃望階趣席方作洛生詠諷浩浩洪流桓憚其曠遠乃起解兵王謝舊齊名於此始別優劣, SBCK: ''}
