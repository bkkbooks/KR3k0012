  - {type: variant, offset: 1781, length: 301, content: 騎殿於後令眾曰聞鼓聲有不進者自後斬之既鼓士卒爭進擊賊破之斬首千餘級虜男女二萬餘口鄉導孫子曰不用鄉導者不得地利不任彼鄉人而導軍者則不能得道路之便利先知迂直之計者勝此軍爭之法也衛公兵法曰凡是賊徒好相掩襲須擇敢勇之夫選明察之士兼使鄉導潛歷山原密其聲晦其迹或刻為獸䟽而履於中途或上冠微禽而幽伏於叢薄然後傾耳以遙聽竦目而深視專智以度事機注心而候氣色見水痕則可以測敵濟之早晚觀樹動則可以辨來寇之驅馳也故烟火莫若謹而審旌幟莫若齊而一爵賞必重而不欺刑戮必嚴而不捨止敵之動靜而我必有其備彼之去就而我豈不保其全哉必須先覘敵國道路遠近水潦山林谿谷險阨城邑大小溝渠深淺畜積多少兵革之數豪傑姓名審而知之用兵之要也伏兵易曰伏戎于莽, SBCK: ''}
