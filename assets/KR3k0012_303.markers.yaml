  - {type: variant, offset: 488, length: 146, content: 龍符統步騎為前鋒賊數千圍統攻之以眾寡不敵遂見害追贈青州刺史又表曰龍符投袂義切前驅効命摧鋒三捷每為眾先及西勦桓歆北殄索虜朝議爵賞未及施行會臣北伐復統前旅臨照之戰氣冠三軍于時逆徒實繁控弦掩澤龍符疋馬電躍所向摧靡奮伐深入知死不恡後周書曰高祖東伐齊王憲率所部先向晉州明日諸軍揔集稍逼城下齊人亦大出兵陣, SBCK: 請罪}
  - {type: variant, offset: 488, length: 11, content: 龍符統步騎為前鋒賊數千, WYG: 襄二十八年奔吳也將戮慶封椒舉曰臣聞無瑕者可以戮人其肯從於戮乎言不肯黙而從戮也王不聽負之斧鉞以狥于諸侯使言曰無或如齊慶封弑其君而弱其孤以盟其大夫齊崔杼弑其君慶封其黨也故以弑君罪責之慶封曰無或如楚恭王之庻子}
