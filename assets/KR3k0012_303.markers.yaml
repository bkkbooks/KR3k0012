  - {type: variant, offset: 1314, length: 2, content: 高祖, WYG: 乃大蒐於被廬被廬晉地作三軍使郤縠將中軍以為大政大掌國政郄溱佐之溱晉大夫郄至之兄子犯曰可矣可用也遂伐曹衛岀榖戍釋宋圍敗楚師于城濮于是乎遂伯榖齊也戰國䇿曰趙且伐燕蘇代謂燕惠王曰今臣來過易水見蚌方岀曝而鷸啄其肉蚌合而拑其喙鷸曰今日不雨明日不雨即有蚌脯蚌亦曰今日不岀明日不岀必有死鷸兩者不能相捨而漁者併擒之今趙且伐燕不相友以弊大衆臣恐强秦}
