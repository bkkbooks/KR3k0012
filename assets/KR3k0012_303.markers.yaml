  - {type: variant, offset: 1294, length: 5, content: 非敢後也馬, SBCK: 楚王欲伐􅀳告士大夫有諌者死叔敖曰臣園中有榆榆上有蟬蟬方奮翼悲鳴}
  - {type: page-break, offset: 1294, content: '', id: KR3k0012_SBCK_303-5b}
  - {type: variant, offset: 1294, length: 0, content: '', WYG: 越之在吳猶人有腹心之疾}
  - {type: variant, offset: 1294, length: 5, content: 非敢後也馬, krp: 楚王欲伐晉告士大夫有諌者死叔敖曰臣園中有榆榆上有蟬蟬方奮翼悲鳴}
  - {type: variant, offset: 1295, length: 0, content: '', WYG: 越是圖而齊魯為憂夫齊魯譬諸疾疥癬也豈能渉江淮與我爭此地哉王弗聽又曰謀甫諫曰不可先王之於民也懋正其德而厚其性阜其財求而利其噐用明利害之鄉以文修之使務利而避害懐徳而畏威故能保世以滋大昔我先世后稷以服事虞夏及夏之衰也棄稷弗務我先王不窋用失其官而自竄於戎狄之間不}
  - {type: variant, offset: 1296, length: 1, content: 後, WYG: 怠業時序其徳纂修其緒修其訓典朝夕恪謹守以惇篤奉以忠信弈世載徳不忝前人至於武王昭前人之光明而加之以慈和事神保民莫不欣喜商王帝辛大惡於民庶民不忍欣戴武王以致戎于商牧是先王非務武}
  - {type: page-break, offset: 1296, content: '', id: KR3k0012_WYG_303-10b, image: WYG0895/WYG0895-0627d.png}
  - {type: punctuation, offset: 1298, content: ，, id: KR3k0012_CHANT_303-bkkpn426}
  - {type: 'tls:seg', offset: 1298, content: '', id: KR3k0012_CHANT_303-19a.15}
  - {type: variant, offset: 1298, length: 1, content: 馬, WYG: 勤恤民隱而除其害也夫先王之制邦内甸服邦外侯服侯衛賔服夷蠻要服戎翟荒服甸服者祭侯服者祀賔服者享要服者貢荒服者王日祭月祀時享歳貢終王先王之訓也有}
  - {type: variant, offset: 1300, length: 44, content: 進也史記絳侯世家曰周勃沛人也高祖之為沛公以中涓從攻胡陵勃擊章邯車騎殿如淳注云殿不進呂瓚云, SBCK: 知螗蜋}
  - {type: variant, offset: 1300, length: 1, content: 進, WYG: 祭則修意有不祀則修言有不享則修文有不貢則修名有不王則修徳序成而有不至則修刑於是乎有刑不祭伐不祀征不享讓不貢告不王於是乎有刑罰之辟有攻伐之兵有征討之備有威讓之令有文告之辭布令陳辭而又有不至則又増修其徳無勤民於遠是以近無不至遠無不服今自大畢伯仕之終}
