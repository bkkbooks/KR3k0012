  - {type: variant, offset: 2636, length: 299, content: 追也惇不聽與將于禁追之典與惇等果入賊伏衷戰不利典往救備救至乃退又曰後漢末呂布從東緡與陳宮將萬餘人來與曹公戰時兵皆出取麥在者不數千人屯營不固曹公乃令婦人守陳悉將兵距之屯西有大堤其南樹木幽深布疑有伏乃相謂曰曹操多詐勿入伏中引軍南七十餘里明日復來曹公隱兵堤裏出半兵堤外布益進乃令輕兵挑戰既合伏兵乘堤步卒並進遂大破之晉書曰鎮南將軍杜元凱伐吳樂鄉城晉牙門管定周旨等伏兵樂鄉城外吳都督孫歆先遣車出拒晉將王濬於上流大敗而還旨等發伏兵隨歆軍入歆不覺直至賬下虜歆於是進逼江陵吳都督將伍延偽請降而列兵登陴晉師攻剋之十六國春秋曰後晉石季龍攻晉將劉演于廩丘晉將邵續使文鴦救演季龍退止盧關津以避之文鴦弗能進屯于景亭兗州豪右張, WYG: 太}
