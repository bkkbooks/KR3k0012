  - {type: variant, offset: 1309, length: 0, content: '', WYG: 予必以不享征之且觀之兵其無乃廢先王之訓而王幾頓乎吾聞夫犬戎樹惇能率舊德而守終純固其有以禦我矣王不聽遂伐之得四白狼四白鹿以歸自是荒服者不至又曰文公即位二年欲用其民用其征伐子犯曰民未知義未知戰上之義盍納天子以示之義時天子以子帶之難在鄭地乃納襄王於}
