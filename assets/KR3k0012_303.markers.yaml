  - {type: variant, offset: 320, length: 5, content: 宜曜初鋒示, SBCK: 呉伐郯郯成季文子曰中國不振旅蠻夷入伐而莫之或恤又曰􅀳侯復假道於虞以伐􅉑宫之竒諫曰􅉑虞之表􅉑亡虞必從之􅀳不可啓㓂不可翫一之爲甚}
  - {type: variant, offset: 320, length: 5, content: 宜曜初鋒示, WYG: 吳伐郯郯成季文子曰中國不振旅蠻夷入伐而莫之或恤又曰晉侯後復假道於虞以伐虢宮之竒諫曰虢虞之表也虢亡虞必從之晉不可啓㓂不可翫一之為甚}
  - {type: variant, offset: 320, length: 5, content: 宜曜初鋒示, krp: 呉伐郯郯成季文子曰中國不振旅蠻夷入伐而莫之或恤又曰晉侯復假道於虞以伐􅉑宫之竒諫曰􅉑虞之表􅉑亡虞必從之晉不可啓㓂不可翫一之爲甚}
  - {type: punctuation, offset: 324, content: ，, id: KR3k0012_CHANT_303-bkkpn102}
  - {type: 'tls:seg', offset: 324, content: '', id: KR3k0012_CHANT_303-5a.5}
  - {type: variant, offset: 326, length: 0, content: '', SBCK: 可再乎謂二年假晉道伐夏陽也諺所謂輔車相依脣亡齒寒者其虞􅉑之謂也輔頰輔車牙車也公不聽後遂爲􅀳所滅又曰􅀳侯使太子申生伐東山臯落氏衣之偏衣珮之金玦先友曰衣身之偏握兵之要又何患焉弧突曰尨凉冬殺今寒玦離胡可恃也里克曰師在制命而巳禀命則不}
  - {type: page-break, offset: 326, content: '', id: KR3k0012_SBCK_303-3b}
  - {type: variant, offset: 326, length: 0, content: '', WYG: 可再乎謂二年假晋道伐夏陽也諺所謂輔車相依脣亡齒寒者其虞虢之謂也謂頰輔與牙車也公不聽後遂為晉所滅又曰晉侯使太子申生伐東山皋落氏衣之偏衣珮之金玦先友曰衣身之偏握兵之要又何患焉狐突曰尨凉冬殺金寒玦離胡可恃也里克曰師在制命而已禀命則不}
  - {type: page-break, offset: 326, content: '', id: KR3k0012_WYG_303-5b, image: WYG0895/WYG0895-0625b.png}
  - {type: variant, offset: 326, length: 0, content: '', krp: 可再乎謂二年假晉道伐夏陽也諺所謂輔車相依脣亡齒寒者其虞􅉑之謂也輔頰輔車牙車也公不聽後遂爲晉所滅又曰晉侯使太子申生伐東山臯落氏衣之偏衣珮之金玦先友曰衣身之偏握兵之要又何患焉弧突曰尨凉冬殺今寒玦離胡可恃也里克曰師在制命而巳禀命則不}
  - {type: variant, offset: 327, length: 2, content: 武彼, SBCK: 專命則不孝將焉用之也又齊侯伐楚楚使與師言曰君處北海寡人處南尓唯是風馬牛不相及也不虞君之渉吾地何故也管仲對曰昔召康公命我先君太公曰五侯九伯汝實征之賜我先君履東至于海西至于河南至于穆陵北至于無棣尓貢苞茅不入王􅀕不供寡人是徴昭王南征不復寡人是問對曰貢之不入敢不供給昭王不復君其問諸水濵又曰衛人}
  - {type: variant, offset: 327, length: 39, content: 武彼以我遠來必決死拒戰可一舉而平宋書曰劉懷慎彭城人也少謹慎質直始參高祖鎮軍車騎, WYG: 專命則不孝}
  - {type: variant, offset: 327, length: 2, content: 武彼, krp: 專命則不孝將焉用之也又齊侯伐楚楚使與師言曰君處北海寡人處南尓唯是風馬牛不相及也不虞君之渉吾地何故也管仲對曰昔召康公命我先君太公曰五侯九伯汝實征之賜我先君履東至于海西至于河南至于穆陵北至于無棣尓貢苞茅不入王祭不供寡人是徴昭王南征不復寡人是問對曰貢之不入敢不供給昭王不復君其問諸水濵又曰衛人}
  - {type: punctuation, offset: 328, content: 。, id: KR3k0012_CHANT_303-bkkpn103}
  - {type: 'tls:seg', offset: 328, content: '', id: KR3k0012_CHANT_303-5a.6}
  - {type: variant, offset: 330, length: 0, content: '', SBCK: 燕師伐鄭鄭􅀕足原繁泄駕以三軍軍其前曼伯與子元潜軍軍其後燕人畏鄭三軍而不虞制人君子曰不備不虞不可以師又曰十年公㑹鄭伯伐宋壬申公敗宋師于管庚午鄭師入郜辛未歸于}
  - {type: page-break, offset: 330, content: '', id: KR3k0012_SBCK_303-4a}
  - {type: variant, offset: 330, length: 0, content: '', krp: 燕師伐鄭鄭祭足原繁泄駕以三軍軍其前曼伯與子元潜軍軍其後燕人畏鄭三軍而不虞制人君子曰不備不虞不可以師又曰十年公㑹鄭伯伐宋壬申公敗宋師于管庚午鄭師入郜辛未歸于}
  - {type: variant, offset: 331, length: 6, content: 遠來必決死拒, SBCK: 鄭伯後期而公獨敗宋師故鄭獨進兵以入郜入而不貪命魯取之推功上爵讓以自賛也君子謂鄭莊公曰於是乎可謂正矣以王命討不庭不貪其土以勞王爵又曰衛大旱寗莊子曰周飢克殷而年豐今邢方無道諸侯無伯伯長也天其或者欲使衛討邢乎從之師興而雨又曰公伐邾取湏句公卑邾不設備而禦之卑小也臧文仲曰國無小不可易也蜂蠆有毒而況國乎弗聽及邾}
