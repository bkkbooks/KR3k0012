  - {type: variant, offset: 55, length: 2, content: 賈復, WYG: 吳侵陳斬祀殺厲師還出境陳太宰嚭使於師夫差謂行人儀曰是夫也多言盍嘗問焉師必有名人之稱斯師也者則謂之何太宰行人官名太宰嚭曰古之侵伐者不斬祀不殺厲不獲二毛今斯師也殺厲與其不謂之殺厲之師與曰反爾地歸爾子則謂之何曰君王赦敝邑之罪又矜而赦之師與有無名乎周禮曰大司馬之職}
