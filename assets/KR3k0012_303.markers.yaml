  - {type: variant, offset: 468, length: 6, content: 孟龍符懷王第, krp: 四月鄭人侵衛收收衛邑也經書夏四月葬衛桓公今傳直言夏而更以四月附鄭人侵衛牧者於下事冝得月以明事之先後故不復備舉經文也以報東門之役東門役在四年又曰秋衛伐邢以報免囿之役邢不速退所以獨見伐也又曰夏趙盾救焦遂自隂地有諸侯之師侵鄭以報大棘之役又曰晉荀息請屈産之乗與垂棘之壁假道於虞以伐􅉑公曰是吾寳也對曰若得道於虞猶外府也公曰宫之竒在對曰宫之竒爲人懦不能強諌且少長於君君暱之雖諫將不聽乃使荀息假道於虞曰兾爲不道入自㒹軨伐鄍}
