  - {type: variant, offset: 3140, length: 1258, content: 面地險不可攻縱令得之一城地耳不如更作一城壅其要路破服秦城併加以圖定陽計之長者將士咸以為然遂圍定陽其城主楊範固守不下韶登山以觀城勢乃縱兵爭攻之七月屠其外城韶謂光曰此城三面重澗險阻並無走路唯慮東南一處耳賊若突圍必從此出但簡精兵專守自是成摛光乃令壯士千餘人設伏於東澗口其夜果如所策賊遂出城伏兵擊之大潰範等面縛盡獲其眾後魏書曰万俟醜奴作亂關中魏將賀拔岳率兵討之岳以輕騎八百北渡渭殺略其民以挑之醜奴大將遲菩薩果率步騎三萬至渭北岳以輕騎數千餘菩薩隔水交言岳稱楊國威菩薩自言強盛往復數返時已逼暮於是各還兵密於渭南傍水分精騎數十為一處隨地形便置之明日自將百餘騎隔水與賊相見岳漸前進先所置騎隨岳而集騎既漸增賊不復測其多少行二十許里至水淺可濟之處岳便馳馬東出以示奔遁賊謂岳走乃棄步兵南渡渭之輕騎追兵東行十餘里依橫崗設伏待之賊以路險不得齊進前後繼至半度崗東岳乃廻與賊戰身先士卒急擊之賊便退走岳號令所部賊下馬者皆不聽殺賊顧見之便悉投馬俄而虜獲三千人馬亦無遺遂擒菩薩乃度渭北降步卒萬餘隋書曰煬帝征吐谷渾至覆袁川時吐谷渾王與數騎而遁其名王詐為渾主保車我真山帝令將張定和率師擊之定和既與賊相遇輕其眾少呼之命降賊不肯定和不被甲挺身登山賊伏兵於巖石之下發矢中之而斃唐書曰武德中太宗圍王世充於東都竇建德自河北率兵十二萬來救太宗自率騎二千五百步卒千人趣武牢四月建德自滎陽西上築壘于板渚太宗以五百騎出武牢東二十餘里將挑戰先伏李勣程咬金秦叔寶等齩五巧切令尉遲敬德執矟造建德壘下大呼致師賊眾大驚擾出兵數千騎太宗逡巡漸却遂引以入伏內李勣等奮擊大破之獲其大將殷秋石瓚斬首數百級又曰羅士信仕王充率千餘人奔于穀州高祖以為新安道行軍揔管使圖世充士信進居前鋒退居後殿凡所虜獲悉分士卒以此為常身未曾自取人有功者解衣下馬而賞之然持兵嚴暴有不用命者無問親友必皆斬決由是下不附而畏之及大軍至洛陽士信以兵圍世充千金堡其中人大罵之士信怒夜遣百餘人將嬰兒數十從南而來至于堡下詐言從東都來投羅揔管也因令嬰兒啼譟既而陽驚曰此千金堡吾輩錯矣忽然而去堡中謂是東都逃人遽出兵追之士信伏五千人於路側候其開門而奮擊遂破之殺無遺類也又曰武德中菀君璋及突厥吐屯設來寇馬邑高蒲政設三伏以待之突厥至城下伏兵發大破之斬首二百餘級以蒲政為朔州總管曲赦馬邑又曰王君廓從大軍討別下轘轅羅山二縣王充遣將魏隱率兵拒之君廓撤營偽遁設伏以待之隱縱兵疾進發伏破之又曰太宗初為右元帥揔兵十萬徇東都軍屯西苑營於三王陵自三月而旋太宗俄而隋將叚達率萬餘人自後而至太宗發伏以擊之賊師大敗親自追奔至金城下斬四十餘級又曰王君廓亡命聚徒數千人轉掠長平進逼夏縣河東郡丞丁榮以兵拒之又遣使慰諭君廓見其使謬為恭敬稱欲歸首榮心輕之於是曜兵登山下十餘里君廓悉匿其眾於山谷中榮無所見引兵而退纔至山下君廓追擊大破之吳越春秋曰公子光伏甲於私室中具酒而王僚乃被棠夷之甲三重使兵衛陳於道專諸置魚腹而進之刺王僚貫脾達背王僚立死世說曰桓玄伏甲設饌廣延朝士因此欲誅謝安王坦之王甚遽問謝謝之寬容愈表於皃望階趣席方作洛生詠諷浩浩洪流桓憚其曠遠乃起解兵王謝舊齊名於此始別優劣, WYG: ''}
