  - {type: variant, offset: 2058, length: 576, content: 革之數豪傑姓名審而知之用兵之要也伏兵易曰伏戎于莽三歲不興左傳曰北戎侵鄭鄭伯患之曰彼徒我車懼其侵軼我也徒步兵也軼突也公子突曰使勇而無剛者嘗寇而速去之嘗試也勇則能往無其剛不恥退也君為三覆以待之覆伏兵也戎輕而不整貪而無親勝不相讓敗不相救先者見獲後必務進進而遇覆必速奔後者弗救則無繼矣乃可以逞從之戎人之前遇覆者奔鄭將祝聃逐之衷戎師前後擊之盡殪為三部伏兵祝聃帥勇而無剛者先犯之戎而速奔以遇二伏兵至後伏兵伏兵起戎還走祝聃返遂逐之戎前後及中三處受敵故曰衷戎師殪死衷丁仲切又曰吳侵楚楚將養由基奔命楚司馬子庚以師繼之養由基曰吳乘我喪謂我不能師也必易我而不戒戒備子為三覆以待我我請誘之子庚從之戰于庸浦庸浦楚地大敗吳師又曰秋九月晉侯飲趙盾酒伏兵甲將攻之其右提彌明知之右軍右也趍登曰臣將侍宴過三爵非禮也遂扶跣以下公嗾獒焉明搏而殺之鬥且出提彌死之又曰衛侯在平壽平壽衛下邑公孟有事於蓋獲之門外有事祭也蓋獲衛郭門也齊氏惟於門外而伏甲焉齊豹之家後漢書曰馮異招集諸營保數萬人與賊約期會戰使壯士變服與赤眉同伏於道側且曰赤眉使萬人攻異前部異裁出兵以救之裁小出兵所以示弱也賊見勢弱遂悉眾攻異乃縱兵大戰日昃賊氣衰伏兵卒起衣服相亂赤眉不復識別眾遂驚潰追擊大破於崤底降男女八萬人通典曰後漢末荊州牧劉表遣劉備北侵至鄴曹公遣將李典與夏侯惇距之備一旦燒屯去惇率諸軍追擊之典曰賊無故退疑必有伏南道穿狹草木深, WYG: ''}
