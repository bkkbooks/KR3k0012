  - {type: variant, offset: 11, length: 4, content: 祭彤拜遼, SBCK: 葛伯􅄷餉湯􅀄征自葛}
  - {type: variant, offset: 11, length: 4, content: 祭彤拜遼, WYG: 葛伯讐餉湯初征自葛始}
  - {type: variant, offset: 11, length: 4, content: 祭彤拜遼, krp: 葛伯仇餉湯𥘉征自葛}
  - {type: variant, offset: 16, length: 0, content: '', SBCK: 征西夷怨南征北狄怨曰奚獨後予又曰惟十有一年武王伐殷一月戊午師渡孟津詩曰東山周公東征也我徂東山慆慆不歸昔我徃矣楊柳依依今我來思􅀨雪霏霏又曰六月宣王北伐也六月棲棲戎車旣飾四牡騤騤載是常服薄伐玁狁以奏膚功有嚴有翼共武之服又曰采􅉮宣王南征也蠢尓蠻荆大􅀖爲柔又曰赫赫南仲薄伐西戎又曰浩浩昊天不駿其德降䘮飢饉斬伐四國又曰篤生武王保祐命尓爕伐大啇􅝂和也又曰維師尚父時維鷹􅀭諒彼武王肆伐大啇㑹朝淸明肆疾也又曰文王有聲繼伐也武王能廣文王之聲卒其伐功也又曰撻彼殷武奮伐荆楚罙入其阻襃荆之旅傳云罙深也箋云有鍾鼓曰伐罙冒也殷道衰而楚人叛啇宗撻然􅁬楊威武出兵伐之也禮記曰呉侵陳斬祀殺厲祀神謂有屋樹者厲􅔂病師還岀境陳}
  - {type: page-break, offset: 16, content: '', id: KR3k0012_SBCK_303-1b}
  - {type: variant, offset: 16, length: 5, content: 太守至則厲, WYG: 征西夷怨南征北狄怨曰奚獨後予易曰髙宗伐鬼方三年克之詩曰東山周公東征也我徂東山慆慆不歸我來自東零雨其濛又曰六月宣王北伐也六月棲棲戎車既飭四牡騤騤載是常服薄伐玁狁以奏膚功有嚴有翼共武之服又曰采芑宣王南征也蠢爾蠻荆大邦為讐又曰赫赫南仲薄伐西戎又曰浩浩昊天不駿其徳降喪飢饉斬伐四國又曰篤生武王保祐命爾燮伐大商燮和也又曰維師尚父時維鷹揚諒彼武王肆伐大商㑹朝清明肆疾也又曰文王有聲繼伐也武王能廣文王之聲卒其功也又曰撻彼殷武奮伐荆楚罙入其阻裒荆之旅傳云冞深也箋云有鐘鼓曰伐冞冒也殷道衰而楚人叛髙宗奮揚威武出}
  - {type: page-break, offset: 16, content: '', id: KR3k0012_WYG_303-1b, image: WYG0895/WYG0895-0623b.png}
  - {type: page-break, offset: 16, content: '', id: KR3k0012_WYG_303-2a, image: WYG0895/WYG0895-0623c.png}
  - {type: variant, offset: 16, length: 0, content: '', krp: 征西夷怨南征北狄怨曰奚獨後予又曰惟十有一年武王伐殷一月戊午師渡孟津詩曰東山周公東征也我徂東山慆慆不歸昔我徃矣楊柳依依今我來思雨雪霏霏又曰六月宣王北伐也六月棲棲戎車旣飾四牡騤騤載是常服薄伐玁狁以奏膚功有嚴有翼共武之服又曰采芭宣王南征也蠢尓蠻荆大邦爲柔又曰赫赫南仲薄伐西戎又曰浩浩昊天不駿其德降䘮飢饉斬伐四國又曰篤生武王保祐命尓爕伐大啇􅝂和也又曰維師尚父時維鷹揚諒彼武王肆伐大啇㑹朝淸明肆疾也又曰文王有聲繼伐也武王能廣文王之聲卒其伐功也又曰撻彼殷武奮伐荆楚罙入其阻襃荆之旅傳云罙深也箋云有鍾鼓曰伐罙冒也殷道衰而楚人叛啇宗撻然奮楊威武出兵伐之也禮記曰呉侵陳斬祀殺厲祀神謂有屋樹者厲􅔂病師還岀境陳}
  - {type: variant, offset: 17, length: 1, content: 守, SBCK: 宰嚭使於師夫差謂行人儀曰是夫也多善言盍甞問焉師必有名人之稱斯師者則謂之何大宰行人官名太宰嚭曰古之侵伐者不斬祀不殺厲不獲二毛獲猶係虜之人二毛髪鬢班白者今斯師也殺厲與其不謂之殺厲之師與欲微切之故其言似若不審也曰反尓地歸尓子則謂之何曰君王赦􅁦邑之罪又矜而赦與有無名者也又微之終其意也呉楚􅀳號稱王周禮曰大司馬之職以九伐之法正􅀖國馮弱犯寡則眚之賊賢害民則伐之暴内侵外則墠之野荒民散則削之􅀒固不服則侵之賊殺其親則正之犯令侵政則杜之放殺其君則殘之外内亂鳥獸行則滅之大戴禮曰明主之所征必道之所廢者也彼廢道而不行然後誅其君改其政吊其民而不奪其財也故曰明主之征也猶時􅀨也}
  - {type: page-break, offset: 17, content: '', id: KR3k0012_SBCK_303-2a}
  - {type: variant, offset: 17, length: 1, content: 守, krp: 宰嚭使於師夫差謂行人儀曰是夫也多善言盍甞問焉師必有名人之稱斯師者則謂之何大宰行人官名太宰嚭曰古之侵伐者不斬祀不殺厲不獲二毛獲猶係虜之人二毛髪鬢班白者今斯師也殺厲與其不謂之殺厲之師與欲微切之故其言似若不審也曰反尓地歸尓子則謂之何曰君王赦弊邑之罪又矜而赦與有無名者也又微之終其意也呉楚晉號稱王周禮曰大司馬之職以九伐之法正邦國馮弱犯寡則眚之賊賢害民則伐之暴内侵外則墠之野荒民散則削之負固不服則侵之賊殺其親則正之犯令侵政則杜之放殺其君則殘之外内亂鳥獸行則滅之大戴禮曰明主之所征必道之所廢者也彼廢道而不行然後誅其君改其政吊其民而不奪其財也故曰明主之征也猶時雨也}
