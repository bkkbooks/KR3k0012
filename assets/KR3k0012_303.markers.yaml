  - {type: variant, offset: 1428, length: 2, content: 高祖, SBCK: 堵三堵曰雉古之制也今三家過制請皆損之乃使季氏宰仲由隳三都叔孫輙不得意於季氏因費宰公不狃率費人以襲攻之入及臺側子命申勾湏樂頎勒士衆下伐之費人北遂隳之強公室弱私家尊君卑臣政化大行又曰孔子曰明王之征猶時雨之降行地弥􅀶得親弥衆是還師於祍席之上也國語曰呉伐越王勾踐請嫡女執箕箒嫡男奉盥􅓢以隨諸御􅓢沃盥噐也春秋貢獻不懈王府呉王曰吾將許越成申胥諌曰申胥楚臣伍胥不可許也大夫種勇以善謀將還玩呉國於股掌之上以得其志呉王不聽乃許盟將}
