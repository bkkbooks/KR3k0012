  - {type: variant, offset: 338, length: 0, content: '', SBCK: 于􅂛陘我師敗績又曰楚子以諸侯伐呉使屈申圍朱方朱方呉邑齊慶封所封也屈申屈蕩之子也克之執慶封而盡滅其族慶封以襄二十八年奔吴也將戮慶封椒舉曰臣聞無瑕者}
