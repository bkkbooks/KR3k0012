  - {type: punctuation, offset: 1281, content: 「, id: KR3k0012_CHANT_303-bkkpn419}
  - {type: variant, offset: 1281, length: 1, content: 孟, SBCK: 孔子曰天下有道則禮樂征伐自天子岀又曰季氏將伐顓􅁷冉有曰今夫顓􅁷固而近於費今不取後丗必爲子孫憂孔子曰求君子疾夫逺人不服而不能來也􅀖分崩離析而不能守也而謀動干戈於􅀖内吾恐季孫}
  - {type: variant, offset: 1281, length: 1, content: 孟, WYG: 天下有道則禮樂征伐自天子岀又曰季氏將伐顓㬰冉有曰今夫顓㬰固而近於費今不取後世必為子孫憂孔子曰求君子疾夫舍曰欲}
  - {type: variant, offset: 1281, length: 1, content: 孟, krp: 孔子曰天下有道則禮樂征伐自天子岀又曰季氏將伐顓臾冉有曰今夫顓臾固而近於費今不取後丗必爲子孫憂孔子曰求君子疾夫逺人不服而不能來也邦分崩離析而不能守也而謀動干戈於邦内吾恐季孫}
  - {type: variant, offset: 1283, length: 2, content: 反奔, SBCK: 憂不在顓􅁷}
  - {type: variant, offset: 1283, length: 2, content: 反奔, WYG: ''}
  - {type: variant, offset: 1283, length: 2, content: 反奔, krp: 憂不在顓臾}
  - {type: punctuation, offset: 1284, content: ，, id: KR3k0012_CHANT_303-bkkpn420}
  - {type: 'tls:seg', offset: 1284, content: '', id: KR3k0012_CHANT_303-19a.10}
  - {type: variant, offset: 1286, length: 7, content: 殿將入門策其馬, SBCK: 在蕭牆之内也韓詩外傳}
  - {type: variant, offset: 1286, length: 1, content: 殿, WYG: 必為之辭逺人不服而不能來也邦分崩離析而不能守也而謀動干戈於邦内吾恐季孫之憂不在顓臾而在蕭牆之内也韓詩外𫝊曰楚王欲伐晉告士大夫有諌者死叔敖曰臣園中有榆榆上有蟬蟬方奮翼悲鳴不知螳蜋在其後欲攫而食之螳蜋取蟬不知黄雀在其後又曰修武屬河内本殷之甯邑武王伐紂勒兵於甯改曰修武懷州也家語曰孔子言於定公曰大夫家無藏甲邑無百雉之城髙丈長丈曰堵三堵曰雉古之制也今三家過制請皆損之乃使季氏宰仲由隳三都叔孫輒不得意於季氏因費宰公山不狃率費人以襲攻之入臺側孔子命申勾須樂頎勒士衆伐之費人北遂隳之强公室弱私家尊君卑臣政化大行又曰孔子曰明王之征猶時雨之降行地彌博得親彌衆是還師於衽席之上也國語曰吳伐越越勾踐請嫡女執箕帚嫡男奉槃匜以隨諸御槃匜􅏕噐也春秋貢獻不懈王府呉王曰吾}
  - {type: page-break, offset: 1286, content: '', id: KR3k0012_WYG_303-9a, image: WYG0895/WYG0895-0627a.png}
  - {type: page-break, offset: 1286, content: '', id: KR3k0012_WYG_303-9b, image: WYG0895/WYG0895-0627b.png}
  - {type: variant, offset: 1286, length: 7, content: 殿將入門策其馬, krp: 在蕭牆之内也韓詩外傳}
  - {type: punctuation, offset: 1287, content: ，, id: KR3k0012_CHANT_303-bkkpn421}
  - {type: 'tls:seg', offset: 1287, content: '', id: KR3k0012_CHANT_303-19a.11}
  - {type: variant, offset: 1288, length: 3, content: 入門策, WYG: 許越成申胥諌曰申胥楚臣伍胥不可許也大夫種勇而善謀將還玩吳國於股掌之上以得}
  - {type: punctuation, offset: 1290, content: ，, id: KR3k0012_CHANT_303-bkkpn422}
  - {type: 'tls:seg', offset: 1290, content: '', id: KR3k0012_CHANT_303-19a.12}
  - {type: variant, offset: 1292, length: 1, content: 馬, WYG: 志吳王不聽乃許盟將伐齊申胥諌}
  - {type: punctuation, offset: 1293, content: ，, id: KR3k0012_CHANT_303-bkkpn423}
