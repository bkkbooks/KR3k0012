  - {type: variant, offset: 95, length: 4, content: 然後食耳, SBCK: 心薄之也奪敵戰也遂疾進師車􅀐卒奔乗晉師荀林父不知所爲鼔於軍中曰先濟者有賞中軍下軍爭舟舟中之指可掬也兩手曰掬下軍禆將趙嬰齊使其徒先具舟于河故敗而先濟又曰􅀳伐齊齊侯駕將走郵棠郵棠齊邑郵羽求切太子與郭榮扣馬太子光也榮齊大夫曰師速而疾略也言欲行略其地無乆攻意將退矣君何懼焉且社稷之主輕則失衆君必待之將犯之太子抽劒斷鞅乃止}
