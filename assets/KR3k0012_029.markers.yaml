  - {type: variant, offset: 749, length: 6, content: 南至周正今十, krp: 大嚮萬國朝宗庭廢鍾鼓之奏朕聞起居之節朝無磬折之音賔無蹈履之度其於事儀不亦闕乎卿諸人當准量輕重以制事中則情典並隨國無滯儀矣又曰永和中廷尉王處之與揚州刺史殷浩書曰太史上元日合朔談者或有疑應却㑹與否昔建元元年亦元日合朔庾車騎冩劉孔才所論爲不得禮苟令從之是勝人之}
