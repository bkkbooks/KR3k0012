  - {type: variant, offset: 99, length: 0, content: '', SBCK: 正月五更人整衣冠於家庭中爆竹帖􅀞雞子或鏤五色土於户上厭不祥也尚書大傳曰正月上日受終于文祖在琁璣玉衡以齊七政琁璣者何也傳曰琁者還也機者幾也微也其變微微而所動者大謂之琔璣是故琁璣謂之北極受謂舜也上日元日又曰夏以孟春爲正殷以季冬爲正周以仲冬爲正夏以平旦爲朔殷以雞鳴爲朔周以夜半爲朔不以二三月後爲正者萬物不齊莫適所}
