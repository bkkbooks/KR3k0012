  - {type: variant, offset: 2604, length: 8, content: 呂氏春秋曰冬至後, SBCK: 而山臊驚憚􅀇黄經云謂此􅀑是也俗人以爆竹起於庭燎不應濫於王者魏時人問議郎董勛云今正臈月門前作烟火桃人絞索松栢殺雞着門户逐疫禮也勛荅云禮十二月索室逐疫舋門户磔雞漢火行故作火助行氣桃􅀑所惡􅀞作人首可以有所收縳不死之祥勛又云正月一日爲雞二日爲狗三日爲羊四日爲猪}
