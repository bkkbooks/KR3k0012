  - {type: variant, offset: 2638, length: 0, content: '', SBCK: 以錢貫繫牀脚廻以投糞掃上云令如願一録異記云有啇人區明者過彭澤湖有車馬自稱青洪君要明過厚禮之問何所湏有人教之但乞如願及問以此言荅之青洪君甚惜如願不得以許之乃其婢也旣而送出自尓啇人或有所求如願並爲即得後至正旦如願起晚乃打如願如願走入糞中啇人以杖打糞掃喚如願竟不還也如此願遺事今北人正月十五日夜立於糞掃籩令人執杖打糞堆上云以治􅆎痛意者亦爲如願故事耳鄧德明南康記}
