  - {type: variant, offset: 748, length: 0, content: '', SBCK: 􅀨不㑹甲戍皇太后登太極前殿施紗幃鄣與上臨嚮群臣又曰咸康四年尚書倉部奏下􅀭州調胡米一􅂛至五年正旦進御詔停又曰十二月丙子正旦㑹百僚増賜緑醽酒人二外又曰咸康七年十二月尚書樂謨奏八年正㑹儀注唯作鼓鍾其餘􅇊樂盡不作詔曰􅀂元}
  - {type: page-break, offset: 748, content: '', id: KR3k0012_SBCK_029-5a}
  - {type: variant, offset: 748, length: 0, content: '', WYG: 雨不㑹甲戌皇太后登太極前殿施紗幃帳與上臨饗羣臣又咸康四年尚書倉部奏下揚州調胡米一升至五斗正旦進御詔停之又十二月庚子詔曰正㑹}
