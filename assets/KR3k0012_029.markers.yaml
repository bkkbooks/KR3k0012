  - {type: variant, offset: 3405, length: 244, content: 原上黨西河鴈門冬至後百有五日皆絕火寒食云為介子推晉潘尼長至詩曰渾儀賦四氣玉衡運招搖靈晷脩期夕日南始今朝宋鮑昭冬至詩曰景移風度改日至晷遷換眇眇負霜鶴皎皎帶云鴈長河夜闌干層冰如玉岸哀哀故老容慘慘愁歲暮陳新塗妻李氏冬至詩曰靈象尋數迴四氣憑時散陰律鼓微陽大明將啟旦感興時來多心隨逝花難式宴集中堂嘉賓盈朝館魏曹植冬至獻襪頌表曰伏見舊儀國家冬至獻履貢袜所以迎福踐長先臣或為之頌臣既玩其嘉藻願述朝慶千載昌期一陽嘉節四方交泰万彙昭蘇亞歲迎祥履長納慶不勝感節情繫帷幄拜表奉賀并獻紋履七量襪若干副上獻以聞謹獻, WYG: 平御覽卷二十九}
