  - {type: variant, offset: 748, length: 0, content: '', krp: 雨不㑹甲戍皇太后登太極前殿施紗幃鄣與上臨嚮群臣又曰咸康四年尚書倉部奏下揚州調胡米一升至五年正旦進御詔停又曰十二月丙子正旦㑹百僚増賜緑醽酒人二外又曰咸康七年十二月尚書樂謨奏八年正㑹儀注唯作鼓鍾其餘伎樂盡不作詔曰若元}
  - {type: variant, offset: 749, length: 6, content: 南至周正今十, SBCK: 大嚮萬國朝宗庭廢鍾鼓之奏朕聞起居之節朝無磬折之音賔無蹈履之度其於事儀不亦闕乎卿諸人當准量輕重以制事中則情典並隨國無滯儀矣又曰永和中廷尉王處之與􅀭州刺史殷浩書曰太史上元日合朔談者或有疑應却㑹與否昔建元元年亦元日合朔􅁃車􅀐冩劉孔才所論爲不得禮苟令從之是勝人之}
