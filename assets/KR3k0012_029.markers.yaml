  - {type: variant, offset: 800, length: 404, content: 曆數之所始治曆者因之則可以明其術數審別陰陽敘事訓民魯君不能常脩此禮故善公之得禮凡分至啟閉必書雲物分春秋分也至冬夏至啟立春立夏閉立秋立冬雲物氣色災變也愽重申周典不言公者曰官掌其職為備故也素察妖祥逆為之備易通卦驗曰冬至之日見雲送迎從下嚮來歲美人民和不疾疫無雲送迎德薄歲惡故其雲赤者旱黑者水白者為兵黃者有土功諸從日氣送迎其徵也又曰冬至始人主致八能之士或謂黃鍾或調六律或調五行或調律曆或調陰陽或調正德鄭玄注曰致八能之士者言選於人眾之中取習曉者使之調焉諧調和之也又曰冬至始人主與群臣左右從樂五日天下之眾亦家家從樂五日以迎日至之禮鄭玄注曰從者就也冬至君臣俱就大司樂之宮臨其肆樂祭天圜丘之樂以為祭事莫大於此又曰冬至成天文鄭玄注云天文謂之三光運照行天下冬至而數訖於是時也祭而成之所以報也又曰冬至之日立八神樹八尺表日中視其晷如度者則歲美人和順晷不如度者歲惡晷入則水晷退則旱進二寸則月食進尺則日食進謂長於度也京房易妖占曰冬至繕宮, WYG: 尊靜躬}
