  - {type: variant, offset: 1205, length: 200, content: 封倉庫易說曰坎北方也主冬至尚書考靈曜曰冬至日則五星俱起牽牛日月若懸璧五星若編珠孝經說曰斗指子為冬至至有三義一者陰極之至二者陽氣始至三者日行南至故謂為至孝經援神契曰冬至陽氣動又曰冬至日在外衡三禮義宗曰十一月大雪為節者刑於小雪為大雪時雪轉甚故以大雪名節冬至中者亦有三義一者陰極之至二者陽氣始至三者日行南至故謂之冬至也又曰冬至日祭天於圓丘玉用其蒼璧牲同玉色樂用夾鍾為宮樂作六變五經通義曰冬至寢兵鼓啇旅不行君, SBCK: 堂}
