  - {type: variant, offset: 5, length: 0, content: '', SBCK: 年畢將即政故復至文祖廟告又曰正月朔旦受命于神宗受舜終事之命神宗文祖之宗廟言神尊之也率百官􅀂帝之􅀄順舜􅀄攝帝位故事奉行之漢書曰正月朔歳首}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 年畢將即政故復至文祖廟告漢書正月朔歲首}
  - {type: variant, offset: 5, length: 0, content: '', krp: 年畢將即政故復至文祖廟告又曰正月朔旦受命于神宗受舜終事之命神宗文祖之宗廟言神尊之也率百官若帝之𥘉順舜𥘉攝帝位故事奉行之漢書曰正月朔歳首}
  - {type: variant, offset: 6, length: 1, content: 冬, SBCK: 春四時之首又曰哀帝時鮑宣以正旦日蝕地震宣上書曰陛下父事天母事地子養庶人今父􅃜明母震動子詠言三朝始小民正月朔日俗忌器破尚惡之况日之􅃜缺乎三朝日月歳也東觀漢記曰戴慿字次仲爲侍中正旦朝賀百僚畢㑹帝令群臣能􅀃經史更相難詰義有不通輙奪其席以益通者慿遂重坐五十餘席後漢書陳翔拜侍御史時正旦朝賀大將軍梁兾威儀不整翔奏兾恃貴不敬請收治罪時人竒之續漢書曰永平四年詔曰比來水旱飢饉加有軍旅正旦無陳朝賀之儀又曰歳正日爲大射朝受賀其儀夜漏未盡七刻鍾鳴受賀及䞇公侯璧中二千石羔千六百石鴈四百石巳下雉百官賀正曰二千石巳上上殿稱萬歳舉觴御食司空奉羮大司農奉飯奏食舉之樂百官奏畢宴飲作樂魏書曰建安中劉邵爲計吏詣許太史言正旦當日蝕邵時在荀彧所坐者數十人或云當廢或云冝却㑹邵曰梓愼禆竈古之良史猶占水火錯失天時然則聖人垂制不爲變豫廢朝}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_SBCK_029-1b}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_SBCK_029-2a}
  - {type: variant, offset: 6, length: 1, content: 冬, WYG: 春四時之首又哀帝時正旦日蝕鮑宣上書曰陛下父事天母事地子養黎民即位以來父虧明母震動子訛言今日蝕於三始誠可畏懼小民正月朔日尚恐毁敗噐物况日虧乎正月一日為嵗之朝日之朝日之朝始猶朝也東觀漢記曰戴憑字次仲爲侍中正旦朝賀百僚畢㑹帝令羣臣能説經史更相難詰義有不通輒奪其席以益通者憑遂重坐五十餘席後漢書曰陳翔拜侍御史時正旦朝賀大將軍梁冀威儀不整翔奏冀恃貴不敬請收治罪時人竒之後漢書曰永平四年詔曰比來水旱饑饉加有軍旅正旦無陳朝賀之儀又曰每嵗首為大朝受賀其儀夜漏未盡七刻鐘鳴受賀及贄公侯璧中二千石二千石羔千石六百石鴈四百石已下雉百官賀正月二千石已上上殿稱萬嵗舉觴御座前司空奉羮大司農奉飯奏食舉之樂百官受賜宴饗大作樂魏畧曰建安中劉邵為計吏詣都太史言正旦當日蝕邵時在荀彧所坐者數十人或云當廢朝或云宜却㑹邵曰梓慎禆竈古之良史猶占水火錯失天時然則聖人垂制不為變豫廢朝}
