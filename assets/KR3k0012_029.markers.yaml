  - {type: variant, offset: 15, length: 0, content: '', SBCK: 一日一夜行三百里神武繼至兆軍人因宴饗休息驚走遂破之兆自殺又曰張華原爲兖州刺史獄有繫囚時謂之曰三元之始念卿幽閉今給假五日足得展謁親親期盡當還也囚果應期而至梁書曰天􅁥四十年正}
