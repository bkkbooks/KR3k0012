  - {type: variant, offset: 3039, length: 3, content: 供祖獮, WYG: 助生氣古史考曰元日太史乃占氣候以知水旱吉凶隨分野書之王渾集曰詔問明年正旦㑹四方計吏入見臨朝當何所宜渾奏舊正㑹計吏前軒下侍中讀詔書計吏跪奏臣以詔當次對承陛下留心訪問之意可令中書恒詔問方土所宜士人賢才隱伏未逹風俗好尚禮教之宜勸農務本以盡墾殖之利刑獄清理無枉濫之失郡守長吏勤心治政為民興利除害訓化之績授以紙筆盡意陳聞以明聖㫖垂心四逺劉臻妻正旦獻椒花頌曰昊穹}
