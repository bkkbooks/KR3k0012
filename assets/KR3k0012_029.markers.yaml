  - {type: variant, offset: 3071, length: 259, content: 士專權冬至之日蚯蚓不結君政不行麋角不解兵不藏水泉不動陰不承陽曆義䟽曰大雪十一月節月之初氣也言太陰之氣以大水凝為雪故曰大雪冬至十一月之中氣也言冬至者極也太陰之氣上干於陽太陽之氣下極於地寒氣已極故曰冬至氣當易之是以王者閉門閭啇旅不行以其陽氣乘踴君壽益長是以冬賀也亦以日之行天至於巽維東南角極之於此故曰冬至顏師古匡謬正俗曰鄭氏箋云鵲之作巢冬至加功至春乃成此言始起冬至加功力為巢蓋直言耳而劉昌宗周讀等音加為架名從以搆架為義則不應云架功也黃帝針炙經云冬至日風從南來者名為虛賊傷人也周角書曰候赦法冬至後盡丁巳之日有風從巳上來滿三日, WYG: 二千石}
