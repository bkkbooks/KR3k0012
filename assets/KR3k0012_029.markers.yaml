  - {type: variant, offset: 3022, length: 0, content: '', WYG: 也玉燭寳典曰正月為端春秋傳履端于始其一日為元日元者善之長也先王體元居正又元者原也始也一也首也亦云上日亦云三朝亦云三元歲之元月之元日之元亦云三朔尚書傳曰夏以平明為朔殷以雞鳴為朔周以夜半為朔又元日造桃板著門戸謂之仙木像鬱壘山桃樹百鬼畏之王羲之月儀書曰日往月來元正首祚太蔟告辰㣲陽始布罄無不宜和神養素李膺家録曰膺坐黨事與杜宻荀翊同繫新汲縣獄時歳旦翊引杯曰正朝從小起膺謂翊云死者人情所惡今子無恡色者何翊曰求仁得仁又誰恨也膺乃歎曰漢其亡矣漢其亡矣善人天地之紀而多害之何以存國裴𤣥新書曰}
