  - {type: variant, offset: 2635, length: 1, content: 草, SBCK: 服之又方江夏劉次卿受彈􅀑九方武都雄黄丹沙二兩五物合禱洋五兩䗶和令謂如彈九正月旦令男左女右帶之又云敷子散出胡洽方於是下五辛菜膠牙糖各進一雞子梁有天下不食葷荆自此不復食雞子以從常則周處風土記云正旦當生吞雞子一枚謂之練形又啖五辛菜以助發五藏氣則行之乆矣膠牙者盖以使其牢固不動今北人亦如之熬麻子大豆兼糖散之案練化篇云正月旦吞雞子赤豆各七枚辟温氣又肘後方云且及七日吞麻子小豆各二七枚消疾疫張仲景方云歳有惡氣中人不幸便死取大豆二七枚雞子白麻井酒吞之然麻豆之設當起於此今則熬之未知所據}
