  - {type: variant, offset: 2767, length: 220, content: 休也釋文曰冬至斗指子夜半時加午者也又曰調律者度竹為管蘆莩為灰列之九間之中漠然無動寂然無聲微風不起纖塵不形冬至夜半黃鍾以應白虎通曰廣莫風至斷大辟行刑獄也又曰冬至前後君子安身靜體百官絕事不聽政擇吉辰而後省事又曰冬至陽始起反大寒何也陰氣推而上故大寒玉燭寶典云十一月建子周之正月冬至日極影極長陰陽日月萬物之始律當黃鍾其管最長故有履長之賀神農書曰冬至陰陽合精天地交讓天為尸濕地為不凍君為不朝百官為不親事不可出遊必有憂悔符瑞圖曰冬至東北方融風至一名焱風, SBCK: 禁殺}
