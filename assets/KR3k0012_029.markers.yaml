  - {type: variant, offset: 753, length: 0, content: '', WYG: 㑹儀注唯作鼓鐘其餘伎樂盡停不作詔曰若元日大饗萬國朝宗庭發鐘鼓之樂奏朕起居之莭朝無磬折之音賔無蹈履之度其於事儀不亦闕乎卿諸人當量輕重以制事中則情典並随國無滯儀矣魏曹植正㑹詩曰初嵗元祈告日惟良乃為嘉㑹讌此髙堂尊卑列叙典而有章衣裳解結黼黻𤣥黄清酤盈爵中坐騰光珍膳雜遝充溢圓方笙磬既設琴瑟俱張悲歌厲嚮咀嚼清商俯視文軒仰瞻華梁願保兹善千載為常歡笑盡娯樂哉未央室家榮貴夀若東王又永和中廷尉王彪之與揚州刺史殷浩書曰太史上元日告朔談者或有疑慮却㑹與否昔建元元年亦元日告朔庾車騎寫劉孔才所論唯不得禮茍}
