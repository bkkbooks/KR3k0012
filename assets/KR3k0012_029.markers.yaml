  - {type: variant, offset: 2641, length: 0, content: '', SBCK: 曉不及預朝列化爲白鵠至閣前廻翔欲下威儀以箒擲之得一􅃗履躭乃驚還就列内外左右莫不駭異時歩隲爲廣州刺史意甚惡之便以狀聞遂至誅滅王子年拾遺記曰堯在位七年有鸞鳯而來集麒麟遊於藪澤鴟梟逃於絶漠有祇友之國献重明之鳥一名重精􅀟晴在目􅃺如雞鳴似鳯時解落毛羽以􅁏翮而飛能􅅮逐猛虎使妖惡不能爲害食以瓊膏或一歳數來或數歳不至國人莫不掃洒門户以望重精之集其來至之時國人或刻鑄金寳爲此鳥之􅃺置於户牖之間則魑魅􅀑􅀋自然退伏今人毎歳元}
