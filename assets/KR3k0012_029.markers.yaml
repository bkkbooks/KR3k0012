  - {type: variant, offset: 2642, length: 0, content: '', SBCK: 刻􅀞爲雞於户牖之上者蓋重精之遺像也西京雜記曰漢置宗廟飲酎用九十大牢皇帝侍祠以正月旦作酒八月成名曰酎一曰醖鄴中記曰石虎正㑹虎於正殿南面臨軒施流蘇帳皆竊擬禮制整法服冠通天珮王璽􅀇衣纁裳􅀞日月火龍黼黻華虫粉米㝷改車服著逺遊冠前安金􅀶山蟬翼丹紗裏服太學}
