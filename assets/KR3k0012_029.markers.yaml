  - {type: variant, offset: 8, length: 0, content: '', SBCK: 者或災消異伏或推術謬誤也彧善其言勑朝㑹如故日亦不食臧榮緒晉書曰熊逺議曰履端元日正始之􅀄有識之士於是觀禮樂榮耳目之觀崇玩弄之好又曰晉元㑹設白獸樽於殿上樽盖上施白獸􅀂有能獻直言者則發此樽飲酒案禮白獸樽乃杜舉之遺式也爲白獸盖後代所爲示不忌憚也晉載}
