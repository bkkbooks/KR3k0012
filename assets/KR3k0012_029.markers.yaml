  - {type: variant, offset: 828, length: 229, content: 能常脩此禮故善公之得禮凡分至啟閉必書雲物分春秋分也至冬夏至啟立春立夏閉立秋立冬雲物氣色災變也愽重申周典不言公者曰官掌其職為備故也素察妖祥逆為之備易通卦驗曰冬至之日見雲送迎從下嚮來歲美人民和不疾疫無雲送迎德薄歲惡故其雲赤者旱黑者水白者為兵黃者有土功諸從日氣送迎其徵也又曰冬至始人主致八能之士或謂黃鍾或調六律或調五行或調律曆或調陰陽或調正德鄭玄注曰致八能之士者言選於人眾之中取習曉者使之調焉諧調和之也又曰冬至始人主與群臣左右從樂五日天下之眾亦家家從樂五日以迎日至, SBCK: 修豫防}
