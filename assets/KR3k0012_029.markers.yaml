  - {type: variant, offset: 1958, length: 512, content: 憂嵩起曰恐不如尊旨伯仁志大而才短名重而識闇好乘人之弊此非自全之道嵩性抗直亦不容於世唯阿奴碌碌當在阿母目下耳阿奴謨小字也後果如其言沈約宋書曰魏晉冬至日受萬國及百寮稱賀因小會其儀亞於歲朝也又曰冬至朝賀享皆如元日之儀又進履襪崔駟襪銘有建子之月助養元氣之事後魏北京司徒崔女儀云近古婦人常以冬至日進履檢於舅姑皆其事也襪亦作袜並亡伐反作赤豆粥荊楚記云共工氏有不才子以冬至日旡為人厲畏赤豆故作粥攘之南史曰梁傳岐為始新令有囚當死會冬至岐乃放其還家獄曹掾固爭曰古者有此今不可行岐曰其若負信縣令當坐竟如期而反太守深相歎異遽以狀聞梁書曰席闡出為東陽太守在郡有能名冬至悉放獄中囚依期而至齊書曰庫狄伏連冬至之日親表稱賀其妻為設豆餅伏連問此豆何因而得妻對曰於馬豆中分減伏連大怒唐玄宗實錄曰上御含元殿受朝太史奏曰朔日至曆數之元嘉辰之會按樂計圖徵云朔日冬至聖主厚祚又按春秋精符云冬至陰雲祁寒有雲迎日者來歲大美此並聖德光被上感天心請付有司以彰嘉瑞從之荊楚歲時記曰十一月冬至日作赤豆粥洽聞記曰赤土國直崖州南渡海經雞籠島冬至之日影在北夏至之日影在南開戶皆向北西域諸國志曰天笁國以十一月六日為冬至冬至則麥秀管子曰以冬至之日始數四十六冬盡春始教民鑽燧謹灶泄所以壽人也, SBCK: 恱焉}
