  - {type: variant, offset: 10, length: 1, content: 令, WYG: 旦雪江夏王義恭以衣承雪作六出花以為瑞帝大悦又元嘉三十年正月旦上朝萬國平旦東南有青黒雲氣非常廣數丈過北覆映宮上北齊書神武既平并州爾朱兆北保秀營神武揚聲討兆既出而止者數四兆意怠神武揣其歲首當宴㑹遣竇泰以精騎襲之一日一夜行三百里神武繼至兆軍人因元日宴饗休息驚走遂破之兆自殺又張華原為兖州刺史獄有繫囚乃謂之}
