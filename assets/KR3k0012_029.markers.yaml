  - {type: variant, offset: 2595, length: 1, content: 升, SBCK: 斗四時纂要日此占最有據也世􅀃曰元帝正㑹引王丞相登御牀王公固辭中宗引之弥苦文獻曰文献王導謚太陽與萬物同輝臣下何以瞻仰乃止又曰陶公作荆州時勑舡官使鋸木屑不限多少悉藏之時咸不解此意後正㑹值積雪㑹日始晴㕔事前除雪地甚潤濕於是悉用木屑覆之都無所妨桂陽列仙傳曰成武丁正旦大㑹以酒沃庭中有司問}
  - {type: page-break, offset: 2595, content: '', id: KR3k0012_SBCK_029-6b}
  - {type: variant, offset: 2595, length: 1, content: 升, krp: 斗四時纂要日此占最有據也世說曰元帝正㑹引王丞相登御牀王公固辭中宗引之弥苦文獻曰文献王導謚太陽與萬物同輝臣下何以瞻仰乃止又曰陶公作荆州時勑舡官使鋸木屑不限多少悉藏之時咸不解此意後正㑹值積雪㑹日始晴㕔事前除雪地甚潤濕於是悉用木屑覆之都無所妨桂陽列仙傳曰成武丁正旦大㑹以酒沃庭中有司問}
  - {type: punctuation, offset: 2596, content: ，, id: KR3k0012_CHANT_029-bkkpn819}
  - {type: 'tls:seg', offset: 2596, content: '', id: KR3k0012_CHANT_029-37a.9}
  - {type: variant, offset: 2596, length: 0, content: '', WYG: 四時纂要曰此占最有據也世説曰元帝正㑹引王丞相登御牀王公固辭中宗引之彌苦文獻曰文獻王導諡太陽與萬物同輝臣下何以瞻仰乃止又陶公作荆州時敇船官使鋸木屑不限多少悉藏之時咸不解此意後正㑹値積雪㑹日始晴㕔事前除雪地甚濕於是悉用木屑覆之都無所妨桂陽列仙傳曰成武丁正旦大㑹以酒沃庭中有司問}
  - {type: page-break, offset: 2596, content: '', id: KR3k0012_WYG_029-10b, image: WYG0893/WYG0893-0250d.png}
  - {type: variant, offset: 2597, length: 2, content: 為歲, SBCK: 故對曰臨武縣失火以酒救之遣驗果然又曰永寧元年西南夷獻樂及幻人能吐火自支解易牛馬頭時元㑹作之於庭安帝與群臣觀木竒之唯陳禪獨離席曰帝王之庭不冝作夷狄􅇊荆楚歳時記曰元日庭前爆竹以辟山臊惡􅀑也山臊按神異經在西方深山中長尺餘犯人則病畏煨竹聲又俗爆竹燃草起於庭燎又曰元日至于月晦民並酺食之名又似之矣出錢爲醵出食爲酺竟分明擲摴名爲愽射蓺經爲擲慱又曰元日鏤懸葦炭桃捧户上却癘疫也又曰元日服桃湯桃者五行之精厭伏邪氣制百􅀑今人進屠􅂫酒膠牙餳盖其遺事也又曰正月一日三元之日也元始也雞鳴而起案周書緯通卦云雞陽鳥也以爲人􅀱四時人得以翹首結帶正衣常也注云案禮内則云子事父母婦事舅姑雞􅀄鳴咸盟潄櫛纚笄則惟其常非獨此日但元正之朝存亡慶弔官有朝賀私有􅀕享䖍恭冝早復位於餘辰所以標而異焉先於庭前爆竹帖􅀞雞或斵鏤五綵及土雞於户上莊周云有挂雞於户懸葦炭於其上樹桃其旁而􅀑畏之括地圖曰桃都山有大桃樹盤屈三千里上有金雞日照此則鳴下有二神一名鬱一名壘並執􅓗索以}
  - {type: page-break, offset: 2597, content: '', id: KR3k0012_SBCK_029-7a}
  - {type: variant, offset: 2597, length: 0, content: '', WYG: 故對曰臨武縣失火以酒救之遣驗果然又永寧元年西南夷獻樂及幻人能吐火自支解易馬牛頭時元㑹作之於庭安帝與羣臣觀大竒之惟陳禪獨離席曰帝王之庭不宜作夷狄伎荆楚歲時記曰元日庭前爆竹以辟山魈惡鬼也按神異經山魈在西方深山中長尺餘犯人則病畏爆竹聲又俗爆竹燃草起于庭燎又元日至於月晦並}
  - {type: page-break, offset: 2597, content: '', id: KR3k0012_WYG_029-11a, image: WYG0893/WYG0893-0251a.png}
  - {type: variant, offset: 2597, length: 2, content: 為歲, krp: 故對曰臨武縣失火以酒救之遣驗果然又曰永寧元年西南夷獻樂及幻人能吐火自支解易牛馬頭時元㑹作之於庭安帝與群臣觀木竒之唯陳禪獨離席曰帝王之庭不冝作夷狄伎荆楚歳時記曰元日庭前爆竹以辟山臊惡鬼也山臊按神異經在西方深山中長尺餘犯人則病畏煨竹聲又俗爆竹燃草起於庭燎又曰元日至于月晦民並酺食之名又似之矣出錢爲醵出食爲酺竟分明擲摴名爲愽射蓺經爲擲慱又曰元日鏤懸葦炭桃捧户上却癘疫也又曰元日服桃湯桃者五行之精厭伏邪氣制百鬼今人進屠蘇酒膠牙餳盖其遺事也又曰正月一日三元之日也元始也雞鳴而起案周書緯通卦云雞陽鳥也以爲人候四時人得以翹首結帶正衣常也注云案禮内則云子事父母婦事舅姑雞𥘉鳴咸盟潄櫛纚笄則惟其常非獨此日但元正之朝存亡慶弔官有朝賀私有祭享䖍恭冝早復位於餘辰所以標而異焉先於庭前爆竹帖畫雞或斵鏤五綵及土雞於户上莊周云有挂雞於户懸葦炭於其上樹桃其旁而鬼畏之括地圖曰桃都山有大桃樹盤屈三千里上有金雞日照此則鳴下有二神一名鬱一名壘並執􅓗索以}
  - {type: variant, offset: 2598, length: 0, content: '', WYG: 醵酺飲食出錢為醵出食為酺士女泛舟或臨水宴樂又元日鏤懸葦茭桃棒門戸上却厲疫也乂元日服桃湯桃者五行之精厭伏邪氣制百鬼今人進屠蘇酒膠牙􅄳蓋其遺事也又正月一日三元之日也元始也雞鳴而起案周書緯通卦云雞陽鳥也以為人候四時使人得以翹首結帶正衣常也注云案禮内則云子事父母婦事舅姑雞初鳴咸盥潄櫛纚笄則惟其常非獨此日但元正之朝存亡慶弔官有朝賀私有祭享虔恭宜早特重于餘辰所以標而異焉先於庭前爆竹帖畫雞或斵縷五采及土雞于戸上莊周云有挂雞于戸懸葦茭于其上樹桃其旁而鬼畏之括地圖曰桃都山有大桃樹盤屋三千里上有金雞日照此則鳴下有二神一名曰鬱壘一名曰神荼又崔氏月令云過臘一日是謂小}
  - {type: page-break, offset: 2598, content: '', id: KR3k0012_WYG_029-11b, image: WYG0893/WYG0893-0251b.png}
  - {type: variant, offset: 2599, length: 1, content: 伺, WYG: 拜賀君親進椒酒從小起按成子安椒花銘曰肇惟歲首月正元日厥味惟辛蠲除百疾是知小歲用之周處風土記曰元日造五辛盤正元日五葷鍊形注曰五辛所以發五藏氣吞生雞子人一枚謂之鍊形莊子曰春月飲酒茹葱以通五臟又乃有雞子五葷練形正旦皆當生吞雞子一枚謂之鍊形又養食五辛菜以助發五藏氣又𤣥中記曰今人正朝作兩桃人立門旁以雄雞毛置索中蓋遺象}
  - {type: page-break, offset: 2599, content: '', id: KR3k0012_WYG_029-12a, image: WYG0893/WYG0893-0251c.png}
  - {type: variant, offset: 2600, length: 0, content: '', SBCK: 不祥之􅀑得則殺之又曰崔氏月令云過獵一日是謂小歳拜賀君親進椒酒從小起按成子安椒花銘曰肇惟歳首月正元日厥味惟新蠲除百疾是知小歳用之周處風土記曰元日造五辛盤正元日五熏鍊形注曰五辛所以發五藏氣莊子曰春月飲酒茹葱以通五藏又曰乃有雞子五熏練形正旦皆當生吞雞子一枚謂之練形又晨食五辛菜以􅂇發五藏氣又􅀇中記曰今人正朝作兩桃人立門旁以雄雞毛置索中盖遺勇}
