  - {type: variant, offset: 4, length: 0, content: '', SBCK: 四元日書曰正月上日受終于文祖上日朔日也終謂堯終帝位之事文祖者堯文德之祖廟又曰正月元日受格于文祖月正正月元日上日也舜服堯喪}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 四元日元日書曰正月上日受終于文祖上日朔日也終謂堯終帝位之事文祖者堯之祖廟又正月朔旦受命于神宗受舜終之事于神宗神宗堯廟也言神尊之也率百官若帝之初順帝初攝帝位故事奉而行之又月正元日舜格于文祖月正正月元日正旦也舜服堯喪}
