  - {type: variant, offset: 3022, length: 0, content: '', SBCK: 也玉燭寳典曰正月爲端春秋傳曰履端於始也其一日爲元日元者善之長也先王躰元以居正又元者元也始也一也首也亦云上曰亦云正朝亦云三元歳之元時之元日之元亦云三朔尚書大傳曰夏以平明爲朔殷以雞鳴爲朔周以夜半爲朔又曰元日造桃板着户謂之仙木像鬱壘山桃樹百􅀑畏之王羲之月儀書曰日往月來元正首祚大簇告辰微陽始布罄無不冝和神養素李膺家録曰膺坐黨事與杜宻荀翊同繫新汲縣獄時歳日翊引杯曰正朝從小起膺謂翊云死者人情所惡今子無􅈔色者何翊曰求仁得仁又誰恨也膺乃歎曰漢其亡矣漢其亡矣善人天地之紀而多害之何以存國裴􅀇新言曰}
