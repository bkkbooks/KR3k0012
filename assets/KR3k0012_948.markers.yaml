  - {type: variant, offset: 2546, length: 669, content: 餘孔穴通連若欄椅樓臺之狀號曰蟻宮常云於中見蟻金色其大若蜂動逾萬計乃掘及泉因得此石張茂先博物志曰蟻知將雨伏侯古今注曰漢光武建武元年山陽有小蟲類人形甚眾明日皆懸樹枝而死乃大蟻也崔豹古今注曰牛亨問蟻曰玄駒何也荅曰河內人無何而見有人馬數千萬騎皆大如黍米旋動往來從朝至暮家人以火燒殺之人皆是蚊蚋馬皆成大蟻故今人呼蚊蚋曰黍民蟻曰玄駒楊子法言曰吾見玄駒是也楊孚異物志曰鯪鯉吐舌蟻附之因吞之又開鱗甲使蟻入其中乃奮迅則舐取之劉敬叔異苑曰桓謙字敬祖太元中忽有人皆長寸餘悉被鎧持槊乘具裝馬塪中出緣机登竈尋飲食之所或有切肉輒來叢藂力所能勝者以槊剌取徑入穴蔣山道士朱應子令以沸湯澆所入處寂不復出因掘之有斛許大蟻死在窟中謙後以門釁同滅古今五行記曰後魏顯宗天安元年六月兗州有黑蟻與赤蟻交鬭長六十步廣四寸赤蟻斷頭而死黑主北赤主南時齊明帝殺少帝子業而自立大為魏軍所破東魏孝靜帝武定四年鄴下有黃蟻與黑蟻鬭黃東魏戎衣色黑西魏戎衣色是時黃蟻盡死時高歡圍玉壁五旬不拔歡疾班師而薨嶺表錄異曰嶺南蟻類極多有席袋貯蟻子窠鬻於市者蟻窠如薄絮囊皆連帶枝葉蟻在其中和窠而賣有黃色大於常蟻而腳長者云南中甘子樹無蟻者實多蛀故人競買之以養甘子又曰交廣溪澗間酋長得收蟻卵淘擇令淨鹵以為醬或云其味酷似肉醬非官客親友不可得也夢書曰蚍蜉為小盜銜食行也夢見蚍蜉小盜眾也神光占曰行造酒家蟻藂中庭急去之應璩百一詩曰大魏承哀弊復欲密其羅蚍蜉猶見得何云鰌與鰕狴犴既已備欻復置黃沙楚辭招魂曰南方赤蟻若象玄蟻若靈壺應璩與曹昭伯牋曰空城寥廓所聞者悲風所見者鳥雀昔陳司空為邑宰所在幽閑獨坐愁思幸賴遊蟻以娛其意以今況之知不虛矣, SBCK: 蠖}
