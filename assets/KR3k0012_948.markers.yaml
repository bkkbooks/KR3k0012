  - {type: variant, offset: 227, length: 3, content: 螾蚯蚓, SBCK: 蝔蟲也大如筆管長三寸餘蝔音皆竹􅆉淮􅀯萬畢術曰竹蟲飲人自言其誠竹蟲三枚竹黄十枚治之欲得人情取藥如大豆燒酒中飲之不令醉以問其事必得其實也蓼蟲孔藂蓼蟲賦曰覩兹茂蓼紛葩吐榮爰有蠕而凖切蟲厥狀似􅑺羣聚其間食之以生悟物託事以况乎人㓜長斯蓼莫知其辛蠐螬毛詩碩人曰膚如凝脂領如蝤蠐蝤蠐蝎蟲也陸機毛詩䟽義曰蠐螬生糞中爾雅曰蟦音汾蠐螬也郭璞注曰在糞土中者蝤蠐蝎在木中有也今雖通名之爲蝎所在異也莊子曰烏足根爲蠐螬司馬彪曰烏足草名生水邊曹齊曹}
