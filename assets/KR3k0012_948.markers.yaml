  - {type: variant, offset: 15, length: 1, content: 蚓, SBCK: 亦冝然故目􅽋則呪之乾鵲噪則餧之蜘蛛集則放之况天下大寳人君重位非天命何以得之劉敬叔異苑曰陳郡殷家飬子名琅與一婢結好經年婢死後猶徃來不絶後夕}
