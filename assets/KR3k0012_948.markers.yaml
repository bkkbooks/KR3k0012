  body:
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 五蜘蛛縊女馬蚿蝔竹蟲蓼蟲蠐螬螻蛄尺蠖蜘蛛焦贑易林未濟之蠱曰蜘蛛作網以司行旅青蠅嚵噉以求膏􅃾又井之遯曰蜘蛛南北廵行罔罟杜季利兵傷我心膂毛詩豳七月東山曰蠨蛸在户蠨蛸長踦也詩義䟽曰一名長脚荆州河内謂之喜子云此蟲來着人當有親客至亦如蜘蛛爲罔羅居之詩義問曰蠨蛸長足蜘蛛也劉芳毛詩義筌曰蠨蛸長䗁音﨑㠊之䗁小蜘蛛長脚者俗呼爲喜子爾雅曰次蟗音秋䵹鼄䵹鼄鼄蝥音矛土䵹鼄布地中布罔草䵹鼄絡幕草間蠨蛸長踦音䗁小蜘蛛長脚者俗呼為喜子張揖廣雅曰蛛蝥罔工蠾毒蜍也魏志曰館陶令諸葛原遷新與太守管輅徃祖餞之賔客並㑹原自起取燕􅆑蜂巢蜘蛛着器中使射覆卦成輅曰第三物觳觫長足吐絲成羅㝷網求食利在昏夜此蜘蛛也舉坐驚喜抱朴子曰太昊師蜘蛛而結網又曰或以赤班蜘蛛及七種水馬以合馮夷水仙丸服之亦可以居水中又以塗足下則可以歩行水上也符子曰晉公子重耳奔齊與五臣而遊乎大澤之中見蜘蛛布其網曳其網而執豸以食之公子重耳觀之顧謂其臣咎犯曰此蟲也智之薄者矣而猶役其智曵其網而執豸以食之况乎人之有智而不能廓垂天之網布絡地之網以供方丈之御是曽不如蜘蛛之智孰可謂之人乎咎犯曰公子愼勿言也終行之則有􅀖有嗣矣金樓子曰楚國龔舎􅀄隨楚王朝􅀫未央宫見蜘蛛焉有赤蜘蛛大如栗}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_948-1b}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_948-2a}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 五蜘蛛焦贛易林未濟之蠱曰蜘蛛作網以伺行旅青蠅嚵噉以求膏腴又井之遯曰蜘蛛南北廵行網罟杜季利兵傷我心旅毛詩豳七月東山曰蠨蛸在戸蠨蛸長踦也詩義疏曰一名長脚荆州河内謂之喜子云此蟲來着人當有親客至亦如蜘蛛為網羅居之詩義問曰蠨蛸長脚蜘蛛也劉芳毛詩義筌曰蠨蛸長踦踦音䗁􅀈之䗁小蜘蛛長脚者俗人呼為喜子爾雅曰次蟗音秋䵹鼄蝥音矛土䵹鼄在地中布網草䵹鼄絡幕草間蠨蛸長踦音䗁小蜘蛛脚長俗呼為喜子也廣雅曰鼄蝥罔蠾􅀈毒蜍也夢書曰夢蜘蛛者其日遂有喜事魏志曰舘陶令葛原遷新興太守管輅往祖餞之賔客並㑹原自起取燕卵蜂窠蜘蛛着器中使射覆卦成輅曰第三物觳觫長足吐絲成羅尋網欲食利在昏夜此蜘蛛也舉坐驚喜抱朴子曰大昊師蜘蛛而結網又曰或以赤斑蜘蛛及七種水馬以合馮夷水仙丸服之亦可以居水中又以塗蹠下則可以步行水上也符子曰晉公子重耳奔齊與五臣而遊乎大澤之中見蜘蛛布其網而執豸以食之公子重耳觀之顧謂其臣舅犯曰此䖝也智之薄者矣而猶役其智曵其網而執豸以食之况乎人之有智而不能廓垂天之網布絡地之繩以供方丈之御是曾不如蜘蛛之智可謂之人乎舅犯曰公子慎勿言也終行之則有邦有嗣矣金樓子曰楚國龔舍初隨楚王朝宿未央宫見蜘蛛焉有赤蜘蛛大如栗}
