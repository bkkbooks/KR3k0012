  - {type: variant, offset: 283, length: 2009, content: 泉物理論曰撿身止欲莫過於蚓此志士所不及也郭義恭廣志曰閩越江北山間蠻夷啖蚯蚓脯為羞崔豹古今注曰蚯蚓一名蜿蟺一名曲蟺善長吟於地中江東謂為歌女或謂鳴砌蜿蟺苑善二音述異記曰劉德願兄子太宰從事中郎道存景和元年五月忽有白蚓數十登其齋前砌上通身白色人所未嘗見也蚓並張口吐舌大赤色其年八月與德願並誅劉敬叔異苑曰孟州王雙宋文帝元嘉初忽不欲見明常取水沃地以菰蔣覆上眠息飲食悉入中云恒有女著青裙白領巾來就其寢母聽聞薦下歷歷有聲發之見一青色白領蚯蚓長二尺許云此女常以一奩香見遺氣甚清芬奩乃螺殼香則菖蒲根于時咸謂雙暫同阜螽矣廣五行記曰陳後主時隋軍至江蚯蚓盡出森然如植箭陳氏水鄉蚯蚓土蟲象陳氏自稱土德盡出明傾其窟穴以曲歸直是歲隋平陳又曰隋煬帝大業中河南有婦人養姑不孝姑兩目暗婦切蚯蚓為羹以食之姑怪其味竊藏一臠以示兒兒還見欲送婦詣縣未及而雷震其婦俄而從空落身如故而易頭為白狗頭郭景純蚯蚓讚曰蚯蚓土精無心之蟲交不以分媱於阜螽觸而感物無乃常雄吳氏本草經曰蚯蚓一名白頸螳螾一名附引葛洪療喉卒腫方曰用白頸蚯蚓十四枚擣以塗喉外立愈陶洪景集注本草經曰白頸蚯蚓一名土龍生蜚谷平土白頸者是其老大耳螔蝓尚書大傳曰鉅定螺鄭玄曰鉅定澤也今屬樂安故有縣屬齊螺蝸牛也禮記內則曰蝸醢而苽食爾雅曰蚹蠃螔蝓郭璞曰音移臾即蝸牛也張楫廣雅曰蠡蠃蝸牛螔蝓也莊子曰有國於蝸之左角者曰觸氏有國於蝸之右角者曰蠻氏時相與爭地而戰伏尸數萬逐北旬有五日而後反許慎說文曰蝸一曰螔蝓山海經曰清要之山北望河曲是多倮纍郭璞曰倮纍蝸牛也陶洪景集注本草經曰螔蝓味鹹寒無毒一名陵蠡一名土蝸一名附蝸生泰仙池澤生陰地沙石垣下螔蝓入三十六禽限又是四種角之例營室之精矣蠍毛詩魚藻彼都人士曰彼君子女卷髮如蠆毛詩義䟽曰蠆一名杜伯河內謂之蚊幽州謂之蠍左傳僖二臧文仲曰蠭蠆有毒而況國乎又昭二曰鄭人謗子產曰其父死於路已為蠆尾大戴禮曰神人國有蜂蠆不螫嬰兒張揖廣雅曰杜伯蠹蠆蠍也說文曰蠆毒蟲也魏志曰彭城夫人夜之廁蠆螫其手呻呼無賴華佗令溫湯近熱漬手其中卒可得寢但旁人數為易湯令煖其日即愈北史曰齊後主詔鏁南陽王綽赴行在所至而宥之問在州何者最樂對曰多取蠍將咀漢看時極樂後主即夜索蠍一斗比曉得二三升置諸浴斛使人裸臥斛中號叫宛轉帝與綽臨觀喜噱不已謂綽曰如此樂事何不早馳驛奏聞綽由是大為後主寵唐史曰劍南本無蠍嘗有人任主簿將之至今呼為主簿蟲莊子曰老聃曰三皇之知上悖日月之明下暌山川之精中隳四時之施其智憯音慘於蠆蠍之尾而猶自以為聖人不可恥乎唐景龍文館記曰上巳日上幸於渭濱宴侍臣其日賜侍臣等柳棬各一云帶之免蠆毒辟溫氣干寶搜神記曰安陽城南有亭宿者輒死有書生入亭宿明掘得蠍大如琵琶毒長數尺亭遂安靜葛洪方曰蠍中國屋中多江東即無也稽含遇蠆賦序曰元康二年余中夜遇蠆客有戲余曰俗諺云過滿百為蠆所螫斯言信哉雖內省不疚而逢此害喟然而歎遂作賦蟻焦贛易林震之蹇曰蟻封戶穴大雨將集又復之萃曰蜱蜉戴怨不能上山卻推趹蹶損傷其顏韓詩外傳曰夫吞舟之魚大矣蕩而失水則為蟻所制大戴禮曰十二月玄駒賁蟻也賁者走於地中也周官曰饋食之豆蜃蚳醢蜃蛤也蚳蟻子也禮記檀弓曰子張之喪公明儀為志焉褚幕丹質蟻結子四隅鄭玄曰畫褚之四角其文如蟻行往來相交錯也蟻蚍蜉也殷之蟻結似今虵文畫也又內則曰蚳醢蚳蚍蜉子也又學記曰蟻子時術之其此之謂乎蚳蚍蜉也蚍蜉之子微蟲耳時蜉之所為其功乃復成大垤也爾雅曰蚍蜉大螘俗呼為馬蚍蜉小者螘齊人呼蟻蟻蛘龔音龍朾直耕切螘赤駮蚍蜉螱音尉飛螘有翅其子蚳蚳蚳蟻卵周禮曰蜃螘醬後漢書曰鉅鹿張角賊起皆著黃巾為摽幟時人謂之黃巾亦名為蛾賊蛾音魚綺切即蟻字喻賊眾多故以為名張勃吳錄曰九真移風縣有赤絮膠人視土知有蟻因墾發以木枝插其中則蟻緣而生漆堅凝如螳蜋子螵蛸也折漆以染絮其色正赤所作赤絮則此膠也孟子曰羊肉不慕蟻蟻慕羊肉羊肉羶也莊子曰函牛之鼎沸蟻不得置一足焉喻聖主之法明奸至不敢蹈之又曰東郭子問莊子曰道安在莊子曰道在螻蟻又曰吞舟之魚蕩而失水則螻蟻能苦之孫卿子曰不食者蟻不飲者蜉蝣韓子曰桓公伐孤竹行山中無水隰朋曰蟻冬居山之陽夏居山之陰蟻壤寸而有水乃掘遂得水又曰千丈之堤以螻蟻之穴而漬又曰以骨去蟻蟻愈多以肉驅蠅蠅愈至呂氏春秋曰吞舟之魚陸處不勝螻蟻淮南子曰千里之堤以螻蟻之穴漏而百尋之屋以突隙之熛焚突灶突也抱朴子曰雞有專栖之雄雉有擅澤之鷮音嬌蟻有兼弱之智蜂有攻寡之計人相役御亦猶是耳又曰周髀家云天圓如張蓋地方如棊局而旁轉如推磨左行日月右行隨而左轉如推於磨蟻行磨石之上磨左旋而蟻右去磨疾而蟻遲故不得不隨磨以左廻焉又曰百尋之山焚於分寸之飆千丈之陂潰於一蟻之穴符子曰東海有鼇焉冠蓬萊而浮游於滄海騰躍而上則千雲之峰類邁於群岳沉沒而下則隱天之丘潛嶠於重川有蚳蟻聞而悅之與群蟻相要乎海畔欲觀鼇焉月餘日鼇潛未出群蟻將反遇長風激浪崇濤萬仞海水沸地雷震群蟻曰此將鼇之作也數日風止雷默海中隱如岳群蟻曰彼之冠山何異我之戴粒逍遙封壤之巔伏乎窟穴也山海經曰朱蟻其狀如蟻郭璞曰蟻蚍蜉在崑崙之墟京房易妖占曰蟻無故當道若門戶城郭藂土水且傷人揚, SBCK: ''}
