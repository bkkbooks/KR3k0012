  - {type: variant, offset: 165, length: 4, content: 蚯蚓見軍, SBCK: 良􅀅之卒􅀂虎之牙􅀂兕之角􅀂鳥之羽􅀂蚈音牽之足蚈馬蠸也又曰蚈足衆走不及蛇物固有小不如大也明堂月令曰腐草爲蠲􅀭雄方言曰北燕馬蚿謂之蛆蟝張茂先􅀶物志曰馬蚿一名百足}
  - {type: page-break, offset: 165, content: '', id: KR3k0012_SBCK_948-5a}
  - {type: variant, offset: 165, length: 4, content: 蚯蚓見軍, WYG: 竹蟲飲人自言其誠竹蟲三移竹黃十移治之欲得人情取藥如大豆撓酒}
  - {type: variant, offset: 165, length: 4, content: 蚯蚓見軍, krp: 良将之卒若虎之牙若兕之角若鳥之羽若蚈音牽之足蚈馬蠸也又曰蚈足衆走不及蛇物固有小不如大也明堂月令曰腐草爲蠲揚雄方言曰北燕馬蚿謂之蛆蟝張茂先博物志曰馬蚿一名百足}
  - {type: variant, offset: 170, length: 11, content: 尤多者軍罷又宜備反叛慎, SBCK: 斷則頭尾各異行而去夲草經曰馬陸一名百足呉氏本草經曰一名馬軸蝔淮􅀯}
  - {type: variant, offset: 170, length: 2, content: 尤多, WYG: 飲之不令醉以問其事必得其實也蓼蟲孔臧蓼蟲賦曰覩兹茂蓼紛葩吐榮爰有蠕而渠切蟲厥狀似螟羣聚其間食之以生悟物托事以况乎人㓜長斯蓼莫知其辛蠐螬毛詩碩人曰膚如凝脂領如蝤蠐蝤蠐蝎蟲也陸機毛詩疏義曰蠐螬生糞中爾雅曰蟦音紛蠐螬也郭璞注曰在糞土中}
