  - {type: variant, offset: 2855, length: 4, content: 後魏顯宗, WYG: 廬陵太守平原龎企字子及自說其乃祖非罪繫獄時有螻蛄行其左右謂曰爾有神當活我因投食與之食盡復來形稍大數月形如豚及當刑螻蛄夜掘壁為孔以出龎氏常祠螻蛄范注葛洪治箭鈎在咽㗋不出方曰用螻蛄腦屠之即出范注治不得小便方曰用螻蛄二枚斷取體下以一升水漬之去皮飲之須臾便通本草經曰一名䗜蛄一名}
