  - {type: punctuation, offset: 27, content: 、, id: KR3k0012_CHANT_948-bkkpn12}
  - {type: variant, offset: 30, length: 0, content: '', SBCK: 爲蟲縱微性乎天壤禀妙造於化靈忽無礙而無想吐自然之纎緒先皇羲而結網慿輕羅以隱顯應大明之幽朗縊女爾雅曰蜆縊女也孫炎曰小黑蟲赤頭三輔謂之縊女此蟲多民多縊死郭璞注曰喜自經死故曰縊女異苑曰縊女蟲也一名蜆長寸許頭赤身黑􅁪吐絲自懸昔齊東郭姜旣亂崔杼之室慶封殺其二子姜亦自經俗傳此婦骸化而爲蟲故以縊女爲名馬蚿音賢爾雅曰蛝音閑馬踐仕板切也郭璞曰馬蠲虳也俗呼馬􅢡虳音均張揖廣雅曰蛆子魚切蟝}
  - {type: variant, offset: 30, length: 11, content: 強上食埃土下飲黃泉用心, WYG: 幽朗縊女爾雅蜆縊女也孫炎曰小黒䖝赤頭三輔謂之縊女此䖝多民多縊死郭璞註曰喜自縊死故曰縊女異苑曰縊女蟲也}
