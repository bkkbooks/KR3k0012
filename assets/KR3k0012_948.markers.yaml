  - {type: variant, offset: 2860, length: 3, content: 安元年, WYG: 螻一名􅥿産難出刺在肉中潰腫下哽咽觧毒與惡瘡陶洪景本草經曰螻蛄味醎寒取自出者其自腰以前甚澁主止大小便尺蠖周易下繫辭曰尺蠖之屈以求伸也龍蛇之蟄以存身也爾雅曰蠖蚇蠖今蝍􅠸也晏子春秋曰弦章謂景公曰尺蠖食黃即身黃食蒼即身蒼說文曰尺蠖曲信蟲信音申方言曰蠀音資􅠸子}
