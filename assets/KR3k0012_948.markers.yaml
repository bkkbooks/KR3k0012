  - {type: variant, offset: 158, length: 3, content: 候抱朴, WYG: 故化為蚈也蚈馬蚿一曰螢火音谿又曰良將之卒若虎之牙若兕之角若鳥之羽若蚈音牽之足蚈馬蠸也又曰蚈足走不及蛇物固有小不如大也明堂月令曰腐草為蠋揚雄方言曰北燕馬蚿謂之蛆􅀈張茂先博物志曰馬蚿一名百足中斷其頭尾各異行而去本草經曰馬六一名百足呉氏本草經曰一名馬軸蝔淮南}
