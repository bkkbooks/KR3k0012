  - {type: variant, offset: 21, length: 1, content: 蚓, SBCK: 某郡張甲者與司徒蔡謨有親僑住謨家暫行數􅀫過期不反謨晝眠夢甲云暫行忽暴病患心腹病痛脹滿不得吐下某時死主人殯殮謨悲涕相對又云我病名乾霍亂自可治之但人莫知其藥故令死耳謨曰何以治之甲曰取蜘蛛生斷去脚吞之則愈謨覺使人徃甲行所驗之果死問主人病時日皆與夢符後有乾霍亂者試用輙差廣五行記曰蜘蛛集於軍中及人家有喜事夢書曰䵹鼄爲大腹其性然也夢見蜘蛛憂懷任婦人也􅁑洪治瘧方曰取蜘蛛一枚着飯中吞即愈成公綏蜘蛛賦曰獨髙懸以浮處遂設罔於四隅南連大廡北接華堂左慿廣厦右依髙廊吐絲屬緒目引結䌉纎羅絡漠綺錯交張雲舉霧綴以待}
  - {type: page-break, offset: 21, content: '', id: KR3k0012_SBCK_948-3b}
  - {type: variant, offset: 21, length: 1, content: 蚓, WYG: 某郡張甲者與司徒蔡謨有親僑住謨家暫行數宿過期不反謨晝眠夢甲云暫得行忽暴病患心腹病痛腹滿不得吐下某時死主人殯殮謨悲涕相對又曰我病名乾霍亂自可治但人莫知其藥故今死耳謨曰何以治之甲曰取蜘蛛生斷去脚而吞之則愈謨覺使人往行所驗之果死問主人病時日皆與夢符後有乾霍亂者試用輒瘥廣五行記曰蜘蛛集於軍中及人家有喜事夢書曰䵹鼄為大腹其性然也夣見蜘蛛憂懷姙婦人也葛洪治瘧方曰取蜘蛛七枚着飯中吞即愈成公綏蜘蛛賦曰獨高懸以浮處遂設網於四隅南連大廡北接華堂左慿廣厦右依高廊吐絲屬緒布網引綱纎羅絡幕綺錯交張雲舉霧綴以待其方張望蜘蛛賦曰嘯詠蓬蘆敖步丘園覽蜘蛛之為䖝焉乘虛運巧構不假物欲足性命蕭然靖逸良可翫也伊蜘蛛之為蟲縱微性乎天壤禀妙造化如靈忽有擬而}
