  - {type: variant, offset: 11, length: 1, content: 黃, SBCK: 吾生亦如是耳仕官者人之網羅也豈可淹歲於是挂冠而退時人􅀏之謂舎為蜘蛛之隱楊雄方言曰䵹鼄郭璞曰知蛛兩音朱蝥也者無自關而西秦晉之間謂之鼄蝥今江東呼蝃蝥音掇自􅀜而東趙魏之郊謂之䵹鼄或謂之蠾蝓燭􅁷兩音蠾蝓者侏儒語之轉北燕朝鮮冽水之間謂之毒蛇齊人又呼爲杜公亦言罔工音毒束哲發蒙記曰蠅生積灰蜂出蜘蛛腐木爲螢火蠐螬出朽芻皇甫謐}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_SBCK_948-2b}
  - {type: variant, offset: 11, length: 1, content: 黃, WYG: 吾生亦如是耳仕宦者人之羅網也豈可淹嵗於是掛冠而退時人笑之謂舍為蜘蛛之隠揚雄方言曰䵹鼄郭璞曰知朱兩音朱蝥音矛自關而西秦晉之間謂之鼄蝥今江東呼蝃蝥音掇自關而東趙魏之間謂之鼅鼄或謂之蠋蝓蠋魚兩音囑蝓者朱儒語之轉也北燕朝鮮洌水之間謂之毒蜍齊人又呼為杜公亦言岡工音毒餘束晳發蒙記曰蠅生積灰蜂出蜘蛛腐木為螢火蠐螬出朽芻皇甫謐}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_WYG_948-3b, image: WYG0901/WYG0901-0393b.png}
  - {type: variant, offset: 11, length: 1, content: 黃, krp: 吾生亦如是耳仕官者人之網羅也豈可淹歲於是挂冠而退時人笑之謂舎為蜘蛛之隱楊雄方言曰䵹鼄郭璞曰知蛛兩音朱蝥也者無自關而西秦晉之間謂之鼄蝥今江東呼蝃蝥音掇自關而東趙魏之郊謂之䵹鼄或謂之蠾蝓燭臾兩音蠾蝓者侏儒語之轉北燕朝鮮冽水之間謂之毒蛇齊人又呼爲杜公亦言罔工音毒束哲發蒙記曰蠅生積灰蜂出蜘蛛腐木爲螢火蠐螬出朽芻皇甫謐}
  - {type: variant, offset: 13, length: 1, content: 起, SBCK: 王丗紀曰湯出見羅者湯下車命解其三面而置其一面更教之祝曰昔蛛蝥作罔今人學結欲左者左欲右者右欲髙者髙欲下者下吾取其犯命者郭璞洞林曰流移道路諸人並欲令郭璞射覆人人自持五月五日蜘蛛者物悉驗遂不復射淮南萬畢術曰蜘蛛塗布而􅀨自晞取蜘蛛置甕中食以膏百日煞以塗布而雨不能濡也又曰取蜘蛛與水狗及猪肪置甕中密以新縑仍懸室後百日視之蜘蛛肥殺之以塗足渉水不没矣又一法取蜘蛛二七枚内甕中合肪百日以塗足得行水上故曰蜘蛛塗足不用橋梁王充論衡曰觀夫蜘蛛之絲以罔飛虫也人之用詐安過之郭義恭廣志曰草蜘蛛在草上色青土䵹鼄在地上春行草間索索履地西京􅄂記曰樊噲問陸賈曰古帝王人君皆云受命於天云有瑞應豈然乎賈曰有之夫目瞷得酒食火花得錢財乾鵲噪行人至蜘蛛集百事喜小故猶徴}
  - {type: page-break, offset: 13, content: '', id: KR3k0012_SBCK_948-3a}
  - {type: variant, offset: 13, length: 1, content: 起, WYG: 王世記曰湯出見羅者湯下車命觧其三面置其一面更放之祝曰昔蛛蝥作罔今人學結欲左者左欲右者右欲高者高欲下者下吾取其犯命者郭璞洞林曰流移道路諸人並欲令郭璞射覆人人自持五月五日蜘蛛諸物悉驗遂不復射淮南萬畢術曰蜘蛛塗布而雨自稀取蜘蛛置甕中食以膏百日殺以塗布不能濡也又曰取蜘蛛與水狗及猪肪置甕中宻以新縑仍懸室後百日視之蜘蛛肥殺之以塗足涉水不没矣又一法取蜘蛛二七枚内甕中合肪百日以塗足得行水上故曰蜘蛛塗足不用橋梁王充論衡曰觀夫蜘蛛之絲以罔飛蟲也人之用詐妄過之郭義恭廣志曰草蜘蛛在草上色青䵹鼄在地上春行草間索覆也西京雜記曰樊噲問陸賈自古帝王人君皆云受命於天必有瑞應豈然乎賈曰有之目瞤得酒食火花得錢財乾鵲噪行人至蜘蛛集百事喜小故猶徴}
