  - {type: punctuation, offset: 1618, content: 。, id: KR3k0012_CHANT_375-bkkpn566}
  - {type: 'tls:seg', offset: 1618, content: '', id: KR3k0012_CHANT_375-25a.10}
  - {type: variant, offset: 1618, length: 426, content: 文宣嘗因酒酣握惇鬚稱美遂以刀截之唯留一握惇不敢復長人號為齊髯公又曰侯景使宋子仙等執梁湘東王世子方諸及中撫軍長史鮑泉司馬虞預于郢州是日子仙等至百姓奔告方諸以五色雜綵編鮑泉白鬚對之雙六弗之信也告者既眾方命闔門縣門未下子仙已入方諸等膜拜而鮑泉遁于床下子仙窺見泉素髯間綵疑愕憚之及其被執莫不驚笑又曰李庶黎陽人魏大司農諧之子也以清卞每接梁客徐陵謂其徒曰江北唯有李庶可語耳庶無鬚髯人謂天閹崔諶嘗翫庶曰教弟種鬚取錐剌而為竅以馬尾插之世傳諸崔多惡疾以呼沱為墓田故庶荅之曰先以方廻施貴族藝眉有效然後樹鬚邢邵笑謂諶曰卿不諳李庶何故犯之又曰周太子贇有失德柱國王軌因內宴上壽捋武帝鬚曰可愛好老公恨後嗣弱耳唐書曰太宗幸翠微宮授司農卿李緯為民部尚書房玄齡時在京城留守會有自京師來者太宗問曰玄齡聞李緯拜尚書如何對曰玄齡但云李緯大好髭鬚更無他語太宗遽改授緯洛州刺史又曰李勣病驗方鬚灰可以療之太宗乃自剪鬚為其和藥勣頓首見血泣以陳謝帝曰吾為社稷計耳不煩深謝又曰李光弼母有鬚數十莖長五六寸晏, SBCK: 道遇二童}
