  - {type: variant, offset: 2720, length: 2, content: 郄雍, WYG: 天下之半戰於涿鹿之野流血漂杵山海經曰禹堙洪水殺相􅀈其血腥臭不可生五穀以其地為臺相􅀈一名相仰春秋後語曰燕太子丹豫求天下名利匕首得趙人徐夫人匕首取之百金使工以藥淬之以試人血濡縷無不立死}
  - {type: page-break, offset: 2720, content: '', id: KR3k0012_WYG_375-18b, image: WYG0896/WYG0896-0345b.png}
  - {type: substitution, offset: 2720, original: 郄, replacement: 郤, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-20567}}
  - {type: variant, offset: 2723, length: 3, content: 能察盜, WYG: 裴駰曰言以匕首傷人血出霑濡絲縷便立死讀如儒也説苑曰蔡威公閉門而哭三日泣盡而繼之以血幽眀録曰王伯陽亡其子營墓得三漆棺移置南堈夜夣魯肅詣云當殺汝父尋復夣見伯陽公魯肅與弟争墓後}
  - {type: variant, offset: 2727, length: 2, content: 眉睫, WYG: 生褥上見數升血疑魯肅殺}
  - {type: variant, offset: 2730, length: 15, content: 間而得其情晉使視盜千百無遺趙文, SBCK: 曰聞尓病我爲尓針以刀}
  - {type: variant, offset: 2730, length: 1, content: 間, WYG: 故也墓今在長廣橋東一里汝南先賢傳曰陽安令趙規與朗陵太守黄萌争水規割指詛曰隨血所流入陽安界萌忿殺規小吏王朔復判殺萌朗陵官屬又殺朔民於京山上為朔作祠壇毎水旱輙往祈禱博物志曰戰鬭死亡處有人馬血積年化為燐燐着地及草如霜露畧不可見人行或有觸着體便有光拂拭便分散無數又細咤聲如沙豆住久乃滅其人忽忽如失魂經日乃差燐音鄰又音吞三輔舊事曰武帝發兵攻太子連鬭五日虎關前溝中血没足世説曰阮歩兵居䘮不率禮}
