  - {type: variant, offset: 167, length: 0, content: '', krp: 爭㑹氣閉而不通隂上而陽内行下内鼔而不起上外絶而不爲使上有絶陽之絡下有破隂之細破隂絶陽色廢脉乱形靜如死狀太子未死也又曰扁鵲過齊齊桓侯客之入朝見曰君有疾在血脉不治恐深桓侯曰寡人無疾又曰齊太倉公淳于意少而喜醫更師同郡元里陽公受其脉曹上下經五侯竒音羇咳音咳術揆度隂陽侯病知人死生漢書曰王莽得翟義黨王孫度使太醫與巧屠共刳剥之量度五藏以竹筳音庭導其脉知其所終始云可以治病後漢書白郭玉爲人善別脉知人生死章帝令童男着女子之衣詐云其病使玉侯脉玉曰此女雖言病據脉陽盛隂微臣謂非女子帝善之三國典略曰周武帝不豫止於雲陽宫内史柳昇私問姚僧坦曰至尊貶膳日乆脉候何如對曰天子上應天心非愚所及凡庶如此萬無一全鶡冠子曰魏文侯問扁鵲曰子昆弟三人並醫其孰最善扁鵲曰長兄視神故名不出家仲兄視毫}
  - {type: variant, offset: 168, length: 0, content: '', krp: 故名不出閭鵲針人血脉救人生死名聞天下燕丹子曰田光竊觀太子客無可用者宋意脉勇之人怒而面青論衡曰王莽時省五經平章句弟子郭略夜定舊記死於燭下精思不任脉絶氣滅崔元始正論曰風俗者國之脉侯}
