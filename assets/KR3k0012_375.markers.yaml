  - {type: variant, offset: 166, length: 0, content: '', krp: 傷以集大事無作三祖羞公孫尼子曰多食苦者而䈥不利多食辛者有益於䈥而氣不利韓子曰淖齒之用齊擢閔王之䈥縣之廟梁宿昔而死論衡曰命冨之人䈥力自強命貴之人才智自髙物理論曰夫清忠之士乃千人之表萬人之英得其人則事易於反手不得其人則難於拔䈥脉釋名曰脉幕也絡一躰也史記曰扁鵲以長桒君言飲藥三十日視見垣一方人以此視病盡見五藏病結特以侯脉爲名耳又曰趙簡子爲大夫專國事簡子疾五日不知人於是召扁鵲扁鵲入視病出董安于問扁鵲扁鵲曰血脉治也而何怪秦穆公甞如此七日而窹今主君之病與之同不出三日必間居二日半簡子寤又曰扁鵲過虢虢太子死扁鵲至虢宫門下曰聞太子不幸而死臣能生之中庶子曰先生得無誕乎何以言太子可生也扁鵲曰越人之爲方也不待切脉望色聽聲冩形言病之所在子以吾言爲不誠試入侯太子當聞其耳鳴而鼻張揗其兩股以至於隂當尚温也中庶子聞入報虢君虢君大驚出見扁鵲於中闕扁鵲曰若太子病者所謂尸蹷者也是以陽脉下遂音隊隂脉}
