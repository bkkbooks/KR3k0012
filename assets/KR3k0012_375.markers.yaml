  - {type: variant, offset: 389, length: 2, content: 官者, WYG: 蝹述常在地下食死人腦若欲殺之以柏燒其頭蝹音襖西京雜記曰廣陵王胥有勇力恒於别囿學格熊後遂空手搏之陷腦而死血釋名曰血濊也流濊日也濊呼㑹切禮記檀弓曰髙子臯之執親之䘮也泣血三年左傳莊公八年曰齊侯田于貝丘傷足䘮屨反誅屨於徒人費弗得鞭之見血}
