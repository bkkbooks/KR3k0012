  - {type: variant, offset: 30, length: 88, content: 左傳昭六年曰王子朝使告諸侯曰在定王六年秦人降妖曰周其有髭王亦克能脩其職至于靈王生而有髭王甚神聖無惡於諸侯班固幽通賦注曰衛蒯聵亂子羔滅髭鬢衣婦人衣逃得出曰父子爭國吾何為其間乎鬚髯, SBCK: 可以相連属作用也}
  - {type: variant, offset: 30, length: 88, content: 左傳昭六年曰王子朝使告諸侯曰在定王六年秦人降妖曰周其有髭王亦克能脩其職至于靈王生而有髭王甚神聖無惡於諸侯班固幽通賦注曰衛蒯聵亂子羔滅髭鬢衣婦人衣逃得出曰父子爭國吾何為其間乎鬚髯, krp: 肉之核也}
