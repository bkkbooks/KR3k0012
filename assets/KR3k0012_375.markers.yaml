  - {type: 'tls:seg', offset: 16, content: '', id: KR3k0012_CHANT_375-1a.7}
  - {type: variant, offset: 16, length: 2, content: 為姿, SBCK: 􅀍覆躰也膚布也布在表也禮記曰古者􅀷衣盖有制度以應規矩繩權衡短母見膚衣取蔽形長無􅀍土毛詩碩人曰手如柔荑膚如凝脂孝經曰身躰髮膚受之父母不敢毀傷孝之始也莊子曰藐姑射之山有神人居之肌膚􅀂冰雪啇子曰上丗之士衣不煖膚食不滿腹苦其心意勞其四胑抱朴子曰素顔紅膚惑其目清啇流徴乱其聽列異傳曰蔡經與神交神將去家人見經詣井上飲水上馬而去視井上俱見經皮如虵蛻遂不還西京􅄂記曰文君姣好眉色如望逺山臉際常􅀂芙蓉肌膚柔滑如脂十七而寡爲人放誕風流恱長卿之才而越禮焉新論語曰髪生於皮去髪而皮不知王子年拾遺録曰燕昭王三年廣延之國去燕七萬里或云在扶桑之東献善儛者二人一名提波一名携漢並玉晢凝膚骨輕氣馥綽約婉妙絶古無倫語林曰賈充問孫皓何以剥人面皮皓曰憎其顔之厚也骨􅀃文曰骨躰之質也肉之核也釋名曰骨堅而滑也似木枝格孝經援神契曰周道衰路有飢骨血成池史記曰楚圍宋五月不解宋城中急無食華元乃夜􅀻見楚將子反告莊王王問曰城中何如曰析骨而炊易子而食又曰孔子適周將問禮於老子老子曰子所言者其人與骨皆巳朽矣獨其言在耳帝王丗紀曰殷時有仙女名昌}
  - {type: page-break, offset: 16, content: '', id: KR3k0012_SBCK_375-2b}
  - {type: page-break, offset: 16, content: '', id: KR3k0012_SBCK_375-3a}
  - {type: variant, offset: 16, length: 3, content: 為姿容, WYG: 若魂氣則無不}
  - {type: variant, offset: 16, length: 3, content: 為姿容, krp: 𬒳覆躰也膚布也布在表也禮記曰古者深衣盖有制度以應規矩繩權衡短母見膚衣取蔽形長無𬒳土毛詩碩人曰手如柔荑膚如凝脂孝經曰身躰髮膚受}
  - {type: variant, offset: 19, length: 0, content: '', SBCK: 隔肉見骨東觀漢記曰陳寵字昭公爲廣漢太守先是雒縣城南毎隂雨常有􅀑􅂘聲寵使案行昔歳倉卒時骸骨不塟者多寵乃勑縣塟埋由是即絶晉書曰桓温生未期温嶠見曰此兒有竒骨相可使啼嶠曰眞英物也因名温尸子曰徐偃王有䈥無骨公孫尼子曰多食甘者有益於肉而骨不利燕丹子曰田光曰竊觀太子客無可用者武陽骨勇}
  - {type: variant, offset: 20, length: 1, content: 美, SBCK: 人怒而面白賈子曰文王晝卧夢人登城呼曰我東北陬槁骨也速以人君塟我文王曰諾覺召吏令以人君塟之吏曰以五大夫塟之文王曰吾夢中巳許之民聞之曰我君不以夢故背槁骨況生人乎乃下信其上孔叢子曰孔附謂陳王曰梁人有揚由者􅇊巧過人骨騰肉飛國語曰呉伐越隳㑹稽􅀗骨焉一節專車使問仲尼曰禹致羣臣於㑹稽防風氏後至戮之其骨專車此爲大矣新序曰文王之塟枯骨無益衆庶衆庶恱之恩義動人也列仙傳曰寗封黄帝時陶正有神人過之爲其掌火能出五}
  - {type: page-break, offset: 20, content: '', id: KR3k0012_SBCK_375-3b}
  - {type: variant, offset: 20, length: 9, content: 美色說文曰髭口上鬚, WYG: ''}
  - {type: variant, offset: 20, length: 1, content: 美, krp: 父母不敢毀傷孝之始也莊子曰藐姑射之山有神人居之肌膚若冰雪啇子曰上丗之士衣不煖膚食不滿腹苦其心意勞其四胑抱朴子曰素顔紅膚惑其目清啇流徴乱其聽列異傳曰蔡經與神交神將去家人見經詣井上飲水上馬而去視井上俱見經皮如虵蛻遂不還西京雜記曰文君姣好眉}
