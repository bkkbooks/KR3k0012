  - {type: variant, offset: 169, length: 0, content: '', WYG: 史記曰扁鵲過齊桓侯客之後五日復見望桓侯而退走桓侯使人問其故扁鵲曰疾之居腠理也湯熨之所能及在血脉鍼石所能及在腸胃酒醪之所能及其在骨髓雖司命無奈之何也今疾在骨髓臣是以無請也後五日桓侯體病使人召扁鵲鵲已逃去桓侯遂死又曰勾踐頓首再拜荅子貢曰孤嘗不料力乃與吳戰困於㑹稽痛入於骨髓帝王世紀曰紂斬朝渉之脛而觀其髓酈善長水經注曰淇水厯汲郡西南出朝歌城西北東南逕朝歌臺下俗謂之陽河水也紂在臺見老人將渡水而沉吟難濟紂問其故左右曰老者髓不實故畏寒紂乃於此斮脛而視髓腦左傳僖下曰晉文公夢與楚王摶楚子伏已而鹽其腦子犯曰吉我得天楚伏其罪吾且柔之矣杜預注曰腦能柔物}
