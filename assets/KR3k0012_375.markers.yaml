  - {type: variant, offset: 2715, length: 14, content: 晉國苦盜有郄雍者能察盜於眉睫, SBCK: 齊主將殺開府髙徳正召而謂}
  - {type: variant, offset: 2715, length: 4, content: 晉國苦盜, WYG: 萇𢎞死乎蜀藏其血三年化為碧燕丹子曰竊觀太子客無可用者夏扶血勇之人怒而面赤賈子曰炎帝黄帝異母兄弟各}
