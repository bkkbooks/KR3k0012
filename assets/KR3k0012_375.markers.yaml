  - {type: variant, offset: 2701, length: 0, content: '', WYG: 風積年沉卧獻眀晝夜禱祈時寒下淚為氷叩頭血出亦為氷不溜陳書曰吳眀徹殺王琳有一叟以酒脯来至號􅀈盡哀收其血懐之而去三國典畧曰齊主於凉風堂召孝昭第}
  - {type: variant, offset: 2701, length: 0, content: '', krp: 風積年沉卧叡明晝夜禱祈時寒下淚爲冰叩頭血出亦爲冰不溜陳書曰呉明徹殺王琳有一叟以酒脯來至號酹盡哀收其血懷之而去三國典略曰齊主於凉風堂召孝昭第}
  - {type: variant, offset: 2702, length: 11, content: 月昱慘慼消瘦眼不交睫列, SBCK: ''}
  - {type: variant, offset: 2702, length: 0, content: '', WYG: 子百年遣左右亂捶擊之又令曳以遶堂所行之處血皆遍地又曰齊主將殺開府髙徳正召而謂之曰聞爾病我為爾針以刀子刺之流血霑地又曰周師圍江陵謝荅仁請守子城梁主即授城内大都督既而召王裒讓之裒以為不可荅仁請入不得嘔血而去唐書曰王君廓鎮幽州㑹突厥入寇君廓邀擊破之髙祖大悦徴入朝賜以御馬令於殿廷乗之而出因謂侍臣曰吾聞藺相如叱秦皇目皆出血君廓往擊竇建徳將出戰李勣遏之君廓發憤大呼目及鼻耳一時流血此之壯氣何謝古人不可以常例賞之復賜錦袍金帶又曰輔公祏㨿江東反發兵寇夀陽命李孝恭為行軍元帥以擊之孝恭自荆州趣九江將發與諸將宴集命取水忽變為血在坐者皆失色孝恭舉止自若徐諭之曰禍福無門唯人所召自顧無負於物諸君何見憂之深公祏惡積禍盈今承廟筭以致盌音椀中之血乃公祏授首之徴又曰李思摩頡利族人也授右衛將軍從征遼東為流矢所中太宗親為吮血又曰李子慎誣告其舅以獲五品其母見其着緋衫覆面牀下泣涕曰此是汝舅血染者耶又曰𤣥宗幸蜀次馬嵬召左相韋見素見素出店為亂兵所撾頭血流地上遽令夀王𫝊詔止之又曰天寳十五年安禄山下將蔡希徳攻陷常山郡執太守顔杲卿長史袁履謙殺掠人吏萬餘人城中流血又曰竇軌每臨戎對寇或經旬}
