  - {type: variant, offset: 1276, length: 140, content: 是日大寒帝涕淚霑鬚皆為冰焉鄧粲晉紀曰湞陽令羊嗣貪而不治縣功曹吏共逐嗣嗣饒鬚乃以嗣內羊闌中始興太守尹虞聞大怒手劍功曹虞字王卿長沙人也又曰王彪之字叔武年二十鬚鬢皓白時人謂之王白鬚又曰張華多鬚常以帛纏之陸雲見之笑不能止又曰桓溫少與沛國劉惔善惔常稱之曰溫眼如紫石稜鬚似蝟毛磔孫仲謀晉宣王之, WYG: 犁面}
