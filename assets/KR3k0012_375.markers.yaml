  - {type: punctuation, offset: 22, content: 《, id: KR3k0012_CHANT_375-bkkpn10}
  - {type: variant, offset: 22, length: 0, content: '', SBCK: 煙乆之教封子積火自燒而隨煙氣上下視其灰燼猶有骨時人塟之謂之封子列異􅀓曰蔣子文漢末爲秣陵尉自謂骨青死當爲神西京􅄂記曰戚􅁎以百錬金爲彄環照見指上骨彄革侯王子年拾遺録曰沭胥國人忽復化爲老叟俄而即死臰爛􅄹屋人有除燒其骸骨於糞土之中復還爲人矣搜神記曰有談生無婦有女來爲其婦三年生一兒曰愼勿以火照我三年後可照生盗照之腰巳上皆肉腰以下但枯骨婦求去續搜神記曰司徒蔡謨親有王蒙者單獨常爲蔡公所收養蒙長纔五尺似爲無骨登牀輙令抱上扶南傳曰頓遜國人死鳥塟或火塟鳥塟者病困便歌舞送郭外有鳥如鵝緑色飛來萬許啄食都盡歛骨焚之沉於海水此必生天上鳥􅀂不食自悲傷乃就火塟取骨埋之丗說曰王右軍目陳玄伯塊壘有正骨司馬相如羙人賦曰皓躰陳露弱骨豐肌䈥}
  - {type: page-break, offset: 22, content: '', id: KR3k0012_SBCK_375-4a}
  - {type: page-break, offset: 22, content: '', id: KR3k0012_SBCK_375-4b}
  - {type: variant, offset: 22, length: 0, content: '', krp: 如望逺山臉際常若芙蓉肌膚柔滑如脂十七而寡爲人放誕風流恱長卿之才而越禮焉新論語曰髪生於皮去髪而皮不知王子年拾遺録曰燕昭王三年廣延之國去燕七萬里或云在扶桑之東献善儛者二人一名提波一名携漢並玉晢凝膚骨輕氣馥綽約婉妙絶古無倫語林曰賈充問孫皓何以剥人面皮皓曰憎其顔之厚也骨}
