  - {type: variant, offset: 3213, length: 292, content: 曹嶷賊寇離亂人民皆塢壘自固見山中火起飛埃絕爓十餘丈樹巔火焱響動山谷又聞人馬鎧甲聲謂嶷賊上人皆怕懼並嚴出欲擊之引騎到山下無有人但見碎火來灑人袍鎧馬毛鬣皆燒於是軍人走還明往視山中無燃火處唯有髑髏百頭布散山中張衡髑髏賦曰張平子將遊目於九野觀化乎八方顧見髑髏委於路旁下據朽壞上負玄霜平子悵然而問之子將并糧推命以夭逝乎奔喪此土流遷來乎為是上智為是下愚荅曰吾宋人也姓莊名周遊心方外不能自修公子何以問之對曰我欲告之於五嶽禱之於神祇起子素骨反子四支髑髏曰死為休息生為役勞冬冰之疑何如春水之消況我已化與道逍遙與陰陽同其流元氣全其朴雲漢為川池星宿為珠玉雷電為鼓扇日月為燈燭合體自然無情無欲不行而至不疾而速, SBCK: 乃蘇}
  - {type: variant, offset: 3213, length: 292, content: 曹嶷賊寇離亂人民皆塢壘自固見山中火起飛埃絕爓十餘丈樹巔火焱響動山谷又聞人馬鎧甲聲謂嶷賊上人皆怕懼並嚴出欲擊之引騎到山下無有人但見碎火來灑人袍鎧馬毛鬣皆燒於是軍人走還明往視山中無燃火處唯有髑髏百頭布散山中張衡髑髏賦曰張平子將遊目於九野觀化乎八方顧見髑髏委於路旁下據朽壞上負玄霜平子悵然而問之子將并糧推命以夭逝乎奔喪此土流遷來乎為是上智為是下愚荅曰吾宋人也姓莊名周遊心方外不能自修公子何以問之對曰我欲告之於五嶽禱之於神祇起子素骨反子四支髑髏曰死為休息生為役勞冬冰之疑何如春水之消況我已化與道逍遙與陰陽同其流元氣全其朴雲漢為川池星宿為珠玉雷電為鼓扇日月為燈燭合體自然無情無欲不行而至不疾而速, krp: 乃蘇}
