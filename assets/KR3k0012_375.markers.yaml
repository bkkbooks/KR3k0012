  - {type: variant, offset: 685, length: 674, content: 人宇曰此義士死節可賜以劍序受劍銜鬚於口顧左右曰既為賊所逼殺無令鬚污土遂伏劍死續漢書曰司馬直字叔異潔白美鬚髯容貌儼然鄉閭奉之如神魏志曰初蘇則及臨淄侯植聞魏氏代漢皆發服悲哭文帝聞植如此常從容曰吾應天受禪而聞有哭者何也則謂為見問髯悉張欲正論以對侍中傅選搯則曰不謂卿也乃止又曰崔琰聲姿高暢眉目踈朗鬚長四尺甚有威重朝士瞻望而太祖亦嚴憚焉後有曰琰怨謗者罰為徒隸使視之辭色無撓太祖令曰琰雖見刑而通賓客虬鬚直視若有所忽遂賜死又曰任城王章為北中郎將討烏桓有功歸太祖喜捋章鬚曰黃鬚兒定大奇魏略曰劉雄鳴詣太祖太祖執其手謂曰孤方入關夢得一神人即汝耶乃厚賜之後亡太祖平漢中來降太祖捉其鬚曰老賊真得汝矣又曰任城王性剛勇而黃鬚北伐烏丸王聞之曰我黃鬚定可使劉備使劉封挑戰王罵曰賣履舍長而使假子拒汝公乎我黃鬚來擊之吳錄曰朱桓還屯濡須權祖之桓奉觴曰臣當遠去願一捋陛下鬚無復恨權憑几前席桓進捋鬚曰臣今日真謂捋虎鬚也獻帝春秋曰張遼問吳降人曰向有紫髯將軍長上短下大便馬善射是誰降人荅曰是孫會稽也蜀志曰張裕為劉璋從事侍坐其人饒鬚先主嘲之曰昔吾為涿縣特多毛姓東西南北皆諸毛也涿令稱曰諸毛繞涿居乎裕荅曰昔有作上黨潞長遷為涿令者去官還家時人與書欲署潞則失涿署涿則失潞乃署曰涿君先主無鬚故裕以此及之也先主常銜其不遜後誅之又曰馬超來降關羽護前書問諸葛亮亮荅書曰孟超當與益德爭先未若髯羽之絕倫羽多鬚故亮謂之髯晉書曰羊祜既卒武帝素服哭之甚哀是日大寒帝涕淚霑鬚皆為冰焉鄧粲晉紀曰湞陽令羊嗣貪而不治縣功曹吏共逐嗣嗣饒鬚乃以嗣內羊闌中始興太守尹虞聞大怒手劍功曹虞字王卿長沙人也又曰王彪之字叔武年二十鬚鬢皓白時人謂, SBCK: ''}
