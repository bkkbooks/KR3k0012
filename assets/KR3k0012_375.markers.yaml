  - {type: variant, offset: 2818, length: 0, content: '', SBCK: 不可以常例賞之復賜錦袍金帶又曰輔公祏據江東反發兵冦壽陽命李孝恭爲行軍元帥以擊之孝恭自荆州趣九江將發與諸將宴集命敢水忽變爲血在坐者皆失色孝恭舉止自􅀂徐諭之曰禍福無門唯人所召自顧無負於物諸君何見憂之深公祏惡積禍􅄹今承廟筭以致討盌音捥中之血乃公祏授首之徴又曰李思摩頡利族人也授右衛將軍從征遼東爲流矢所中太宗親爲吮血又曰李子愼誣告其舅以􅀗}
  - {type: variant, offset: 2818, length: 0, content: '', krp: 不可以常例賞之復賜錦袍金帶又曰輔公祏據江東反發兵冦壽陽命李孝恭爲行軍元帥以擊之孝恭自荆州趣九江將發與諸將宴集命敢水忽變爲血在坐者皆失色孝恭舉止自若徐諭之曰禍福無門唯人所召自顧無負於物諸君何見憂之深公祏惡積禍盈今承廟筭以致討盌音捥中之血乃公祏授首之徴又曰李思摩頡利族人也授右衛將軍從征遼東爲流矢所中太宗親爲吮血又曰李子愼誣告其舅以獲}
  - {type: variant, offset: 2819, length: 1, content: 官, SBCK: 品其母見其着緋衫覆面牀下泣涕曰此是汝舅血染者耶又曰玄宗幸蜀次馬嵬召左相韋見素見素出店爲亂兵所撾頭血流地上遽令夀王傳詔止之又曰天寳十五年安禄山下}
  - {type: page-break, offset: 2819, content: '', id: KR3k0012_SBCK_375-10b}
  - {type: variant, offset: 2819, length: 686, content: 官將戲因從駕出行過冢間無何令俳取道邊死人髑髏繫著忠馬戲笑莊子曰列子行食於道見百歲髑髏搴蓬而指之曰唯予與汝未嘗死未嘗生也又曰莊子之于楚見空髑髏髐然有形擊之以馬捶因而問之曰夫子貪生理而為此乎將子有亡國之事斧鉞之誅而為此乎將子有不善之行愧遺父母妻子之醜而為此乎將子凍餒之患而為此乎於是語卒援髑髏枕而臥夜半髑髏見夢曰子之談者似辯人也諸子所言皆生之累也死則無此矣子欲聞死之說乎莊子曰然髑髏曰死無君於上無臣於下亦無四時之事泛然以天地為春秋雖南面王樂不能過也莊子不信曰吾使司命復生子形為子骨肉肌膚反子父母妻子閭里知識子欲之乎髑髏深矉蹙頞曰吾安能棄南面王樂而復為人之勞乎南州異物志曰烏滸人得髑髏破之以飲酒盛弘之荊州記曰長沙浦坼縣有呂蒙冢中有髑髏極大蒙形既長偉疑即蒙髑髏也裴淵之廣州記曰盧循襲廣州風火夜發奔逸者數千而已循除燒骨數得髑髏三萬餘於江南洲上作大坑葬之今名為共冢續搜神記曰永嘉五年高榮為高平戍邏王時曹嶷賊寇離亂人民皆塢壘自固見山中火起飛埃絕爓十餘丈樹巔火焱響動山谷又聞人馬鎧甲聲謂嶷賊上人皆怕懼並嚴出欲擊之引騎到山下無有人但見碎火來灑人袍鎧馬毛鬣皆燒於是軍人走還明往視山中無燃火處唯有髑髏百頭布散山中張衡髑髏賦曰張平子將遊目於九野觀化乎八方顧見髑髏委於路旁下據朽壞上負玄霜平子悵然而問之子將并糧推命以夭逝乎奔喪此土流遷來乎為是上智為是下愚荅曰吾宋人也姓莊名周遊心方外不能自修公子何以問之對曰我欲告之於五嶽禱之於神祇起子素骨反子四支髑髏曰死為休息生為役勞冬冰之疑何如春水之消況我已化與道逍遙與陰陽同其流元氣全其朴雲漢為川池星宿為珠玉雷電為鼓扇日月為燈燭合體自然無情無欲不行而至不疾而速, WYG: ''}
