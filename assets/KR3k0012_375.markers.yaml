  - {type: variant, offset: 2710, length: 3, content: 交睫列, WYG: 解甲其部衆無貴賤少長不恭命即立斬之每日被事多所鞭撻流血滿庭見者莫不股慄又曰劉審禮丁父憂去職及葬跣足隨車流血灑地行路稱之又曰牛徽為吏部員外郎巢賊犯京師父蔚方病徽與其子自扶藍音監輿投竄山南閤路險狭盜賊縱横谷中盜擊徽破首流血被體而捉輿不輟莊}
