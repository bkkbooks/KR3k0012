  - {type: variant, offset: 380, length: 17, content: 秦太后拔嫪毒鬚眉為官者又曰漢高祖為, SBCK: 昔趙襄子以其姉爲代王妻後與王遇於句注之塞厨}
  - {type: variant, offset: 380, length: 0, content: '', WYG: 昔趙襄子以其姊為代王妻後與王遇於句注之塞厨人進斟因反斗以擊代王殺之王腦塗地三國典畧曰齊南陽王綽與齊王俱五月五日生武成以綽母李夫人非嫡故貶之為弟俗云其日生者腦不壊爛死後踰一年方許收殮毛髮不落如生人焉神異經曰西荒中有人長短如人着百結敗衣手足虎爪名模豹見人獨自輙就人欲食腦先捕虱人伺其卧舌出槃地丈餘便燒石投其舌於是絶氣而死若不如此寤而輙食人腦列異傳曰陳倉有得異物其形不類猪不似羊莫能名以獻}
