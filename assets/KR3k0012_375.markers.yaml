  - {type: variant, offset: 2698, length: 1, content: 三, SBCK: 五枕戈泣血志在復讎崔鴻十六國春秋後趙録曰伏都有膂力善尺牘攻石閔不剋爲閔所殺橫屍相枕血流成渠誅諸胡羯無貴賤男女皆斬之死者二十餘萬于時髙鼻多􅂡至有濫死者又北燕録曰馮跃讌郡僚忽有血流左臂跃惡之從事中郎王乗因陳符命之應跃戒其勿言南史曰蕭叡明}
