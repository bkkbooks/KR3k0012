  - {type: variant, offset: 1604, length: 0, content: '', SBCK: 南陽王綽與齊主俱五月五日生武成以綽母李夫人非嫡故貶之爲弟俗云其日生者腦不壞爛死後踰一年方}
  - {type: variant, offset: 1604, length: 0, content: '', krp: 南陽王綽與齊主俱五月五日生武成以綽母李夫人非嫡故貶之爲弟俗云其日生者腦不壞爛死後踰一年方}
  - {type: variant, offset: 1605, length: 1, content: 惇, SBCK: 收殮毛髮不落如生人焉神異經曰西荒中有人}
  - {type: page-break, offset: 1605, content: '', id: KR3k0012_SBCK_375-7b}
  - {type: variant, offset: 1605, length: 1, content: 惇, krp: 收殮毛髮不落如生人焉神異經曰西荒中有人}
  - {type: variant, offset: 1607, length: 10, content: 鬚垂至帶省中號為長鬣, SBCK: 短如人着百結敗衣手足虎􅀲各摸豹見人獨自輙就人欲食腦先捕虱人伺其卧舌出槃地丈餘便燒石投其舌於是絶氣而死􅀂不如此寤而輙食人腦列異傳曰陳倉有得異物其形不􅀋猪不似羊莫能名以献􅁗穆}
  - {type: variant, offset: 1607, length: 10, content: 鬚垂至帶省中號為長鬣, krp: 短如人着百結敗衣手足虎瓜各摸豹見人獨自輙就人欲食腦先捕虱人伺其卧舌出槃地丈餘便燒石投其舌於是絶氣而死若不如此寤而輙食人腦列異傳曰陳倉有得異物其形不類猪不似羊莫能名以献秦穆}
