  - {type: variant, offset: 393, length: 4, content: 漢高祖為, WYG: 齊晉將戰郄克傷於矢流血及屨未絶鼓音張侯曰余病矣郤至曰自師始合而矢貫余手及肘余折以御左輪朱殷豈敢言病吾子忍之張侯解張也朱血色血色久則殷今}
  - {type: variant, offset: 398, length: 71, content: 隆準而龍顏美鬚髯漢書曰霍光長七尺三寸白晢䟽眉目美鬚又曰朱博為琅邪太守曹掾吏皆移病臥博問其故對曰故事二千石新到遣致意乃敢就職博奮髯抵几曰觀齊兒欲, SBCK: 進斟因反斗}
