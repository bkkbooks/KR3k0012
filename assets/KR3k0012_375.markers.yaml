  - {type: variant, offset: 1417, length: 594, content: 晉中興書曰冉閔殺石鑒及羯胡數萬人于時人有高鼻多鬚者無不濫死崔鴻前趙錄曰劉聰以讒慝故誅詹事曹光光臨刑舉止自若謂刑者曰取席敷之無令土污吾鬚又曰劉元海姿儀魁偉身長八尺四寸鬚長三尺餘當心有赤毫三根長三尺六寸又前秦錄曰符堅每日自王丞相薨後鬚髮中白王丞相猛也宋書曰山陰公主淫恣見褚彥回悅之以白帝帝令就之彥回不從主曰君髭鬚如戟何無丈夫意南史曰宋武帝狎侮群臣各有稱目多鬚者謂之羊三國典略曰齊許惇長鬚垂至帶省中號為長鬣公文宣嘗因酒酣握惇鬚稱美遂以刀截之唯留一握惇不敢復長人號為齊髯公又曰侯景使宋子仙等執梁湘東王世子方諸及中撫軍長史鮑泉司馬虞預于郢州是日子仙等至百姓奔告方諸以五色雜綵編鮑泉白鬚對之雙六弗之信也告者既眾方命闔門縣門未下子仙已入方諸等膜拜而鮑泉遁于床下子仙窺見泉素髯間綵疑愕憚之及其被執莫不驚笑又曰李庶黎陽人魏大司農諧之子也以清卞每接梁客徐陵謂其徒曰江北唯有李庶可語耳庶無鬚髯人謂天閹崔諶嘗翫庶曰教弟種鬚取錐剌而為竅以馬尾插之世傳諸崔多惡疾以呼沱為墓田故庶荅之曰先以方廻施貴族藝眉有效然後樹鬚邢邵笑謂諶曰卿不諳李庶何故犯之又曰周太子贇有失德柱國王軌因內宴上壽捋武帝鬚曰可愛好老公恨後嗣弱耳唐書曰太宗幸翠微宮授司農卿李緯為民部尚書房玄齡時在京城留守會有自京師來者太宗問曰玄齡聞李緯拜尚書如何對曰玄齡但云李緯大好髭鬚更無他語太宗遽改授緯洛州刺史又曰李勣病驗方鬚灰可以療之太宗乃自剪鬚為其和藥勣頓首見, WYG: ''}
