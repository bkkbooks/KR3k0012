  - {type: variant, offset: 2012, length: 673, content: 泣以陳謝帝曰吾為社稷計耳不煩深謝又曰李光弼母有鬚數十莖長五六寸晏子曰湯長頭而髯伊尹蓬頭而髯孫卿子曰傅說之狀禿無鬚眉莊子曰孔子往見盜跖歸到東門外適遇柳下季曰不見車馬有行色得微往見跖耶孔子曰然吾所謂無病而自炙疾走料虎頭編虎鬚幾不免虎口哉孔叢曰子高曰臣見臨屠商焉身脩八尺鬚髯如戟面正紅白幼女不敬之無德故也又曰子思如齊齊之嬖臣美鬚眉立乎側君指而言曰貌可相易寡人不惜此鬚眉於先生也子思荅曰非所願也但欲君修禮義富百姓使伋得寄孥於君之境內則其庸多矣呂氏春秋曰豫讓欲報趙襄子滅鬚去眉自刑以變容抱朴子曰有古疆者自言四千歲敢為虛言云見堯為人長大美鬚髮風俗通曰不舉生鬢鬚子俗說人十四五乃當生鬢鬚今生而有妨害父母也謹按周書靈王生而有髭王甚神聖亦克脩其職諸侯服享二世休和安在其有害乎世說曰鍾毓兄弟警悟過人每有嘲語未嘗屈躓毓語會聞安陵能作調試共視之於是與弟盛飾共載從東門至西門一女子笑曰車中央殊高二鍾都不覺車後一門生云向已被嘲鍾愕然門生曰中央高者兩頭羝毓兄弟多鬚故以此調之又曰郄超為桓溫記室參軍有奇才多髭髯荊州為之稱髯參軍語林曰庾公道王尼子非唯事事勝人布置鬚眉亦勝人我輩皆出其轅下俗說曰有人詣謝益壽云向在劉丹陽坐見一客殊毛謝曰正是我家阿瞻瞻多鬚故云尔廣陵列士傳曰劉瑜字季節舉方正對策高第人呼為長鬚方正列仙傳曰丁次卿漢順帝時人至娶婦家未見禮異婦出謁客鬚髯鬱然其家謝之次卿舉手向婦鬚髯即去郭璞洞林曰東中郎參軍周稚琰封蠶蛾蛓蟲使璞射之璞曰射覆得此大落度必是蠶蛾及毛蠹稚琰饒鬚故因以調之也睫說文曰睫映目旁毛也釋名曰睫接也捶於匡而相接也漢書曰袁盎曰陛下居代時太后嘗病二年陛下不交睫解衣, WYG: ''}
