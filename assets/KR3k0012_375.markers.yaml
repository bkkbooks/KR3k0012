  - {type: variant, offset: 1361, length: 237, content: 白鬚又曰張華多鬚常以帛纏之陸雲見之笑不能止又曰桓溫少與沛國劉惔善惔常稱之曰溫眼如紫石稜鬚似蝟毛磔孫仲謀晉宣王之流晉中興書曰冉閔殺石鑒及羯胡數萬人于時人有高鼻多鬚者無不濫死崔鴻前趙錄曰劉聰以讒慝故誅詹事曹光光臨刑舉止自若謂刑者曰取席敷之無令土污吾鬚又曰劉元海姿儀魁偉身長八尺四寸鬚長三尺餘當心有赤毫三根長三尺六寸又前秦錄曰符堅每日自王丞相薨後鬚髮中白王丞相猛也宋書曰山陰公主淫恣見褚彥回悅之以白帝帝令就之彥回不從主曰君髭鬚如戟何無丈夫意南史曰宋武帝狎侮群臣各有稱目多鬚者謂之羊, SBCK: 腦塗地}
