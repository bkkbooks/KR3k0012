  - {type: variant, offset: 37, length: 0, content: '', WYG: 欲還嬖人伍㕘欲戰令尹孫叔敖弗欲曰昔嵗入陳今兹入鄭不無事矣戰而不捷㕘之肉其足食乎㕘曰若事之捷孫叔為無謀矣戰若不捷㕘之肉將在晉軍可得食乎史記曰晉公}
