  - {type: variant, offset: 121, length: 1, content: 頤, SBCK: 䈥力也肉中之力氣之元也禮記曲禮曰老者不以䈥力爲禮左傳哀公上曰衛太子禱曰敢告無絶䈥無折骨無面傷以集大事無作三祖羞公孫尼子曰多食苦者而䈥不利多食辛者有益於䈥而氣不利韓子曰淖齒之用齊擢閔王之䈥縣之廟梁􅀫昔而死論衡曰命冨之人䈥力自強命貴之人才智自髙物理論曰夫清忠之士乃千人之表萬人之英得其人則事易於反手不得其人則難於拔䈥脉釋名曰脉幕也絡一躰也史記曰扁鵲以長桒君言飲藥三十日視見垣一方人以此視病盡見五藏病結特以􅐷脉爲名耳又曰趙簡子爲大夫專國事簡子疾五日不知人於是召扁鵲扁鵲入視病出董安于問扁鵲扁鵲曰血脉治也而何怪􅁗穆公甞如此七日而窹今主君之病與之同不出三日必間居二日半簡子寤又曰扁鵲過虢虢太子死扁鵲至虢宫門}
  - {type: page-break, offset: 121, content: '', id: KR3k0012_SBCK_375-5a}
  - {type: variant, offset: 121, length: 1, content: 頤, WYG: 皮被也被覆體也膚布也布在表也禮記曰古者深衣盖有制度以應規矩繩權衡短毋見膚衣取蔽形長毋被土毛詩碩人曰手如柔荑膚如凝脂孝經曰身體髮膚受之父母不敢毁傷孝之始也莊子曰藐姑射之山有神人居之肌膚若冰雪商子曰上世之士衣不煖膚食不滿腹苦其心意勞其四胑抱朴子曰素顔紅膚惑其目清商流徴亂其聽列異傳曰蔡經與神交神將去家人見經詣井上飲水上馬而去視井上俱見經皮如􅉬蜕遂不還西京雜記曰文君姣好眉色如望逺山臉際常若芙蓉肌膚柔滑如脂十七而寡為人放誕風流悦長卿之才而越禮焉新論語曰髮生於皮去髪而皮不知王子年拾遺録曰燕昭王三年廣陵之國去燕七萬里或云在扶桑之東獻善儛者二人一名提波一名携漢並玉晢凝膚輕氣馥綽約婉妙絶古無倫語林曰賈充問孫皓何以剥人面皮皓曰憎其顔之厚也骨説文曰骨體之質也肉之核也釋名曰骨堅而滑也似木枝格孝經援神契曰周道衰路有肌骨血成池史記曰楚圍宋五月不解宋城中急無食華元乃夜私見楚將子反告莊王王問曰城中何如曰析骨而炊易子而食又曰孔子適周將問禮於老子老子曰子所言者其人與骨皆已朽矣獨其言在耳帝王世紀曰殷時有仙女名昌容隔肉見骨東觀漢記曰陳寵字昭公為廣漢太守先是雒縣城南每隂雨常有鬼哭聲寵使案行昔嵗倉卒時骸骨不葬者多寵乃勅縣𦵏埋由是即絶晉書曰桓温生未期温嶠見曰此兒有竒骨相可使啼嶠曰真英物也因名温尸子曰徐偃王有筋無骨公孫尼子曰多食甘者有益於肉而骨不利燕丹子曰田光曰竊觀太子客無可用者武陽骨勇之人怒而面白賈子曰文王晝卧夢人登城呼曰我東北陬槁骨也速以人君葬我文王曰諾覺召吏令以人君葬之吏曰以五大夫葬之文王曰吾夢中已許之民聞之曰我君不以夣故背槁骨况生人乎乃下信其上孔叢子曰孔附謂陳王曰梁人有楊由者伎巧過人骨騰肉飛國語曰吳伐越隳㑹稽獲骨焉一節専車使問仲尼曰禹致羣臣於㑹稽防風氏後至戮之其骨専車此為大矣新序曰文王之葬枯骨無益衆庶衆庶悦之恩義動人也列仙傳曰寗封黄帝時陶正有神人過之為其掌火能出五色煙久之教封子積火自燒而隨煙氣上下視其灰燼猶有骨時人葬之謂之封子列異傳曰蔣子文漢末為秣陵尉自謂骨青死當為神西京雜記曰戚姬以百鍊金為彄環照見指上骨彄革侯王子年拾遺録曰沐胥國人忽復化為老叟俄而即死臭爛盈屋人有除燒其骸骨於糞土之中復還為人矣搜神記曰有談生無婦有女来為其婦三年生一兒曰慎勿以火照我三年後可照生盜照之腰以上皆肉腰以下但枯骨婦求去續搜神記曰司徒蔡謨親親有王蒙者單獨常為蔡公所收養蒙長纔五尺似為無骨登牀輙令抱上扶南傳曰頓遜國人死鳥葬或火葬鳥葬者病困便歌舞送郭外有鳥如鵝緑色飛来萬許啄食都盡歛骨焚之沉於海水此必生天上鳥若不食自悲傷乃就火葬取骨埋之世説曰王右軍目陳元伯塊壘有正骨司馬相如美人賦曰皓體陳露弱骨豐肌筋説文曰筋體之力也可以相連屬作用也釋名曰筋力也肉中之力氣之元也禮記曲禮曰老者不以筋力為禮左傳哀公上曰衛太子禱曰敢告無絶筋無折骨無面傷以集大事無作三祖羞公孫尼子曰多食苦者而筋不利多食辛者有益於筋而氣不利韓子曰淖齒之用齊擢閔王之筋縣之廟梁宿昔而死論衡曰命富之人筋力自强命貴之人才智自髙物理論曰夫清忠之士乃千人之表萬人之英得其人事易於反手不得其人則難於㧞筋脉釋名曰脉幕也絡一體也史記曰扁鵲以長桑君言飲藥三十日視見垣一方人以此視病盡見五臓病結特以􅐷脉為名耳又曰趙簡子為大夫専國事簡子疾五日不知人於是召扁鵲扁鵲入視病出董安于問扁鵲扁鵲曰血脉治也而何怪秦穆公嘗如此七日而寤今主君之病與之同不出三日必閒居二日半簡子寤又曰扁鵲過虢虢太子死扁鵲至虢宫門}
