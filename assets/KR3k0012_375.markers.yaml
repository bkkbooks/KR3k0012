  - {type: variant, offset: 2695, length: 1, content: 達, SBCK: 起父爲南郡太守坐事繫獄皓懷小石至公卿間輙出石叩頭其上流血覆面父繫得免虞預晉書曰元康元年河間成都二王舉兵向京都朝廷北討徴嵇紹爲侍中王旅不振敗績於蕩隂百官侍衛莫不潰散唯紹以身捍冦兵突御輦飛矢雨集紹遂􅀍害於帝側血濺御服及定左右欲浣衣帝曰此嵇侍中血勿去又曰丞相府斬督運令史淳于伯血逆流着柱終柱末二丈三尺旋復流下四尺五寸百姓咸稱其􅁈晉書張􅁤傳曰漢末金城人陽成逺殺太守以叛郡人馮忠赴屍號哭歐血而死又曰桓温父彜爲韓晃所害涇令江播預焉温時}
