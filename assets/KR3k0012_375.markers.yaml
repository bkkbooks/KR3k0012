  - {type: variant, offset: 9, length: 1, content: 口, SBCK: 肉柔也禮記檀弓下曰延陵季子適齊長子死塟於嬴􅀶之間號之曰骨肉歸於土魂氣無不之左傳宣公十二年曰楚子北師次于郔將飲馬於河而歸聞晋師旣濟王欲還嬖人伍叅欲戰令尹孫叔敖弗欲曰昔歳入陳今兹入鄭不無事矣戰而不捷叅之肉其足食乎叅曰􅀂事之捷孫叔爲無謀矣戰􅀂不捷叅之肉將在晉軍可得食乎史記曰晉公子重耳在齊五年趙衰等謀醉重耳載以行行逺而覺重耳引戈欲殺咎犯咎犯曰殺臣成子偃之願也重耳曰事不成我食舅氏之肉咎犯曰事不成犯肉腥臊何足食乃止偃咎犯名也吕氏春秋曰齊有人一居東郭一居西郭幸而相遇飲酒曰須肉各抽刀自割相啖乃至于死交州名士傳曰張重字仲䔍舉計漢明帝易重問何短小重曰陛下欲得其才將稱骨度肉也唐書曰先天中有王知道母患骨蒸醫云湏得生人肉食之知道遂密割股}
  - {type: page-break, offset: 9, content: '', id: KR3k0012_SBCK_375-1b}
  - {type: variant, offset: 9, length: 2, content: 口上, WYG: 肉柔也禮記檀弓下}
  - {type: variant, offset: 9, length: 1, content: 口, krp: 肉柔也禮記檀弓下曰延陵季子適齊長子死塟於嬴博之間號之曰骨肉歸於土魂氣無不之左傳宣公十二年曰楚子北師次于郔將飲馬於河而歸聞晋師旣濟王欲還嬖人伍叅欲戰令尹孫叔敖弗欲曰昔歳入陳今兹入鄭不無事矣戰而不捷叅之肉其足食乎叅曰若事之捷孫叔爲無謀矣戰若不捷叅之肉將在晉軍可得食乎史記曰晉公子重耳在齊五年趙衰等謀醉重耳載以行行逺而覺重耳引戈欲殺咎犯咎犯曰殺臣成子偃之願也重耳曰事不成我食舅氏之肉咎犯曰事不成犯肉腥臊何足食乃止偃咎犯名也吕氏春秋曰齊有人一居東郭一居西郭幸而相遇飲酒曰須肉各抽刀自割相啖乃至于死交州名士傳曰張重字仲䔍舉計漢明帝易重問何短小重曰陛下欲得其才將稱骨度肉也唐書曰先天中有王知道母患骨蒸醫云湏得生人肉食之知道遂密割股}
  - {type: variant, offset: 11, length: 0, content: '', SBCK: 肉半斤許加五味以進母食之便愈黄帝素問}
  - {type: variant, offset: 11, length: 0, content: '', krp: 肉半斤許加五味以進母食之便愈黄帝素問}
  - {type: variant, offset: 12, length: 3, content: 髭髭姿, SBCK: 脾主肉乆坐傷肉脾􅀬者色黄而肉軟楚辝大招曰豐肉微骨躰更狷皮膚釋名曰皮􅀍}
  - {type: page-break, offset: 12, content: '', id: KR3k0012_SBCK_375-2a}
