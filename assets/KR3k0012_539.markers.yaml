  - {type: variant, offset: 2915, length: 7, content: 室圓基千步直峭, krp: 書班超傳曰臣超區區特蒙神靈竊冀未便僵仆目見西域平定陛下舉萬年之觴薦勲祖廟布大喜於天下東觀漢記曰呉良濟郡人爲郡議曹掾正旦史入賀太守門下掾王望前言曰齊郡敗亂遭離盗賊人民飢餓不聞雞鳴狗吠之音明府視事五年五榖豐熟家給人足今日歳首請上雅壽掾史皆稱萬歳良跪曰門下掾佞謟明府勿受其觴盗賊未盡人民困乏良曹掾尚無絝望曰議曹惰寙自無絝寜足不爲家給人足耶太守曰此生言是也遂不舉觴賜鰒魚}
