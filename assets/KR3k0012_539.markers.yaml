  - {type: variant, offset: 2951, length: 2, content: 茲土, SBCK: 魯也使寗戚母忘其飰牛車下也桓公避席再拜曰寡人與二大夫能母忘夫子之言則齊國之社稷不危也燕丹子曰太子置酒請荆軻酒酣太子起爲壽贄尚書曰五玉三帛二牲一死贄三帛諸侯丗子執緟公之􅀌執􅀇附庸之君執黄二生卿執羔大夫執鴈一死士執雉王帛生死所爲以贄以見之儀禮曰士相見之禮摯冬用雉夏用腒下大夫相見以鴈飾之以布維之以索如執雉上大夫相見以羔飾之以布四維之結于面左頭如麛執之如士相見之禮周禮春官上大宗伯曰以玉作六瑞以等􅀖國王執鎮圭公執桓圭侯執信圭伯執躬圭子執榖璧男執蒱璧鄭玄注日鎮安也以四鎮之山爲琢飾長一尺二寸公二王後及王之上公􅀟植謂之桓桓宫室之象所以安其上也信當爲身身圭躬圭盖皆象人形爲琢飾家長七寸榖所以養人蒱爲席所以安人二王或以榖爲飾或以蒱爲琢飾璧皆徑五寸不執珪者未成國也以禽作六摯以等諸臣執之言致也所執以自致孤執皮帛卿執羔大夫執鴈士執雉庶人執鶩工啇執雞皮帛束帛也表以皮爲之虎豹皮也帛如璧色繒也羔小羊取其羣}
