  - {type: variant, offset: 281, length: 297, content: 曰春見曰朝夏見曰宗秋見曰覲冬見曰遇時見曰會殷見曰同此六禮者諸侯見王為文也六服之內四方以時分來或朝春或宗夏或覲秋或遇冬者殊禮異更而偏朝猶朝也欲其來之早也宗尊也欲其尊王也覲之言勤也欲其勤王之事也遇猶偶也欲其若不期而俱至也時見者無常期也諸侯有不順服者王將以征討之事則既朝覲王為壇於國外合諸侯有而命焉春秋傳曰有事而會不恊而盟是也殷猶眾也十二歲王如不巡狩則六服盡朝朝禮既畢王亦為壇命諸侯以命改焉所命之政如王巡狩殷見四方四時分來終歲則徧矣時聘曰問殷覜曰視時聘者亦無常期天子有事乃聘之焉境外之臣既非朝歲不敢瀆為小禮殷覜謂一服朝之歲以朝者少諸侯乃使卿以大禮眾聘焉一服朝在元年七年十一月終也又秋官下大行人曰大行人, WYG: ''}
