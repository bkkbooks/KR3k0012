  - {type: variant, offset: 2954, length: 0, content: '', SBCK: 不失其􅀋也鴈取其候時而行雉取其守介而死不失其節鶩取其節鶩取其不飛遷鷄取其守時而動禮記曲禮下曰凡贄天子鬯諸侯圭卿羔大夫鴈士雉庶人之贄匹童子委贄而退贄之言至也天子無客禮以鬯爲贄者所以用告爲至也童子委贄而退不與成人爲禮也􅀃者以匹爲鶩也野外軍中無贄以纓拾矢可也非爲禮之處用時物而巳纓馬縏纓也拾謂射韝婦人之贄梖榛脯脩􅀥栗春秋莊公曰哀姜至公使宗婦覿用幣非禮也御孫曰男贄大者玉帛公侯伯子男}
