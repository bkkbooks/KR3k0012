  - {type: variant, offset: 2455, length: 1, content: 會, SBCK: 士疑㑹否共諮尚書令荀彧時廣平計吏劉邵在彧坐曰梓愼禆竈古之良史猶占水火錯失天時諸侯旅見天子入門不得終禮者五日蝕在一然則聖人垂制不爲變異豫廢朝禮或者災消異伏或推術謬誤也彧及衆人咸善而從之遂朝㑹如舊亦不蝕魏書曰文帝爲魏王南征次譙大饗六軍及譙父老自娱樂伎列百戯魏志曰黄􅀄元年郭淮奉使賀文帝踐祚而道路疾病故計逺近爲稽留及群臣在㑹帝正色責之曰昔禹㑹諸侯塗山防風後至便行大戮今􅄎天同慶而最遟留何也對曰臣聞五帝先教導民以德夏后政衰始用刑辟今臣遭唐虞之丗是以免}
