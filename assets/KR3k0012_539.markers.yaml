  - {type: variant, offset: 2905, length: 1, content: 他, SBCK: 又曰倪寛爲御史大夫從東封㤗山登明堂寛奉觴再拜上千萬歳壽制曰敬舉君之觴又曰隆慮公主子昭平君尚帝女夷安公主隆慮主病困以金千斤錢十萬爲昭平君豫贖死罪上許之隆慮主卒昭平君日驕醉殺主􅀓繫獄廷尉上請上良乆曰法令者先帝}
