  - {type: variant, offset: 2950, length: 0, content: '', SBCK: 朝于南朝親饋上壽也魏書曰文帝爲魏王南征次譙大饗六軍及譙父老設􅇊樂百戯令曰先王云樂其所自生禮不忘其本譙霸王之􅀖真人夲土其復譙租稅二年三老上壽日乆而罷晉書禮志曰元正上壽謁者引王詣樽酌壽酒跪授侍中侍中跪置御座前王還王自酌置位前謁者跪奏藩王臣某等奉觴再拜上千萬歳四箱樂作百官再拜巳飲又再拜唐書曰元和十四年齊魯初平宴文武百寮裴度舉觴獻壽跪而言曰陛下德配天地明並日月神武獨斷冦逆削平􅃬宴羣臣當兹令節臣備位台司幸逢昌運願與四海九州之人同上千萬歲壽上執酒爲飲之管子曰桓公管仲鮑叔牙􅇞戚四人飲飲酣桓公謂鮑叔牙曰盍不起爲寡人壽乎鮑叔牙奉杯而起曰使公母忘出在莒時也使管子母忘束􅅞在}
