  - {type: variant, offset: 936, length: 325, content: 二尋深四尺上介皆奉其君之旂置於宮尚左公侯伯子男皆就其旂而立禮記曲禮曰天子當依而立諸侯北面而見天子曰覲天子當宁而立諸公東面諸侯西面曰朝諸侯春見曰朝受摯於朝受享於廟生氣文也秋見日覲一受之於廟殺氣質也朝者位於內朝而序進覲者位於廟門外而序入王南面立於依宁而受焉夏宗依春冬遇依秋春秋時齊侯言魯昭公以遇禮相見取易略也覲禮今存朝野宗遇禮今亡諸侯未及期相見曰遇相見於郤地曰會諸侯使大夫問於諸侯曰聘又王制曰諸侯之於天子也比年一小聘三年一大聘五年一朝北年每歲也小聘使大夫太聘使卿朝則君自行天子無事與諸侯相見曰朝事謂征伐又中庸曰繼絕世舉廢國治亂持危朝聘以時厚往而薄來所以懷諸侯也又經解曰聘覲之禮廢則君臣之位失諸侯之行惡而背畔侵陵之敗起矣又聘義曰聘禮上公七介侯伯五介子男三介, WYG: 等差}
