  - {type: variant, offset: 90, length: 132, content: 見微而思古焉幽王徵會諸俠為合義兵征討有罪既往而無之是於義事不信也君子見其此知其後必見攻伐將無救也采菽采菽筐之筥之興也菽所以芼大牢而待君子也羊則苦豕則薇箋云菽大豆也采之者采其葉以為藿三牲牛羊豕芼以藿王饗賓客有牛俎乃用鉶羹故使采之君子來朝何錫予之雖無予之路車乘馬君子謂, WYG: 宴}
