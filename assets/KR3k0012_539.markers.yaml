  - {type: variant, offset: 2914, length: 4, content: 漢室圓基, WYG: 於南朝親饋上壽也魏書曰文帝為魏王南征次譙大饗六軍及譙父老設伎樂百戯令曰先王云樂其所自生禮不忘其本譙霸王之邦真人本土其復譙租稅二年三老上夀日久而罷晉書禮志曰元正上夀謁者引王詣樽酌夀酒跪授侍中侍中跪置御坐前王還王自酌置位前謁者跪奏藩王臣某等奉觴再拜上}
