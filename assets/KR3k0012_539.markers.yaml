  - {type: variant, offset: 2972, length: 0, content: '', SBCK: 又曰公執玉取其暢逹也卿執羔取其跪乳有禮也書曰五玉三帛二牲一死贄又曰至正月朔日乃執贄而朝賀正月何歳竟氣改興新長相保重夲正始也羣臣贄賀其君父之五經異義曰謹按周禮􅀃五玉贄自􅀌卿以下執禽尊卑有差也禮不下庶人工啇又無朝儀五經無朝義五經無􅀃庶人工啇有贄穆天子傳曰天子賔于西王母乃執白珪􅀇璧以見西王母執䞇致敬献錦組百純􅀃苑曰鶩無他心故庶人以爲贄也太平御覽卷第五百三十九}
  - {type: page-break, offset: 2972, content: '', id: KR3k0012_SBCK_539-8b}
  - {type: variant, offset: 2972, length: 0, content: '', WYG: 又曰公執玊取其暢逹也卿執羔取其跪乳有禮也書曰五玊三帛二生一死贄又曰至正月朔日乃執贄而朝賀正月何嵗竟氣改與新長相保重本正始也五經異義曰謹按周禮説五玊贄自孤卿以下執禽尊卑有差也禮不下庻人工商之無朝儀五經無朝儀五經無説庻人工商有贄穆天子傳曰天子賔於西王母乃執白圭元璧以見西王母獻錦組百純説苑曰鶩無他飛故庻人以為贄也太平御覽卷五百三十九}
