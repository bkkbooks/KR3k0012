  - {type: variant, offset: 2958, length: 1, content: 萬, SBCK: 禽鳥卿執折大夫執鴈士執雉以章物也章所執之物別貴賤女贄不過榛栗􅀥脩以告䖍也榛小栗脩脯䖍敬也皆取其名以示敬又定公下曰公㑹晉師于耳范獻子執羔趙簡子中行丈子皆執鴈魯於是乎始尚羔禮卿執羔大夫執鴈魯則同之今始知執羔之尊也榖梁傳莊公曰大夫宗婦覿用幣宗婦同宗大夫之婦覿見也禮大夫不見夫人不言及不正其行婦道故列數之也男子之一贄羔鴈雉腒贄所以至者也上大夫用羔取其從羣帥而不黨也下大夫用鴈取其知時飛翔有行列也士冬用雉夏用腒取其耿介交有時別有倫也腒腊也雉必用死爲其不可生膳也夏用腒備腐􅆨也婦人之贄􅀥栗腵脩􅀥取其早自矜莊栗取其敬栗腵􅁱取断断自脩整用幣非禮也用者不冝用者也大夫}
