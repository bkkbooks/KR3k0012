  - {type: punctuation, offset: 2904, content: 「, id: KR3k0012_CHANT_539-bkkpn780}
  - {type: variant, offset: 2904, length: 0, content: '', SBCK: 武帝王太后在民間時所生一女者父爲金王孫王巳死韓王孫名嬀乗間而言曰太后有女在長陵武帝曰何不早言武帝乃自徃迎取乗輿至金氏門外使􅀐圍其宅女亡匿内中床下扶持出詔副車載之馳還入長樂宫太后曰帝何從來帝曰今者至長陵得臣姉與俱來帝奉酒前爲壽賜錢千萬奴婢三百人公田百頃甲第以奉姉太后謝曰爲帝費漢書衛靑傳曰時王夫人方幸於上寗乗􅀃青曰今王夫人幸而宗族未冨貴願將軍奉所賜千金爲夫人親壽靑以五百金爲壽上聞問靑以實對上迺拜寗乗爲東海都}
  - {type: page-break, offset: 2904, content: '', id: KR3k0012_SBCK_539-4b}
  - {type: variant, offset: 2904, length: 0, content: '', WYG: 武帝王太后在民間時所生一女父為金王孫王孫已死韓王孫名嫣乗間白言太后有女在長陵武帝曰何不早言武帝乃自徃迎取乗輿至金氏門外使騎圍其宅女亡匿内中床下扶持出詣車載之馳還入長樂宫太后曰帝從何来帝曰今日至長陵得臣姊與俱来帝奉酒前為夀賜錢千萬奴婢三百人公田百頃甲第以奉姊太后謝曰爲帝費漢書衛青傳曰時王夫人方幸於上寗乗說青曰今王夫人幸而宗族未富貴願將奉所賜千金為夫人親夀青以五百金為夀上間問青以實對上廼拜寗乗為東海郡都}
