  - {type: variant, offset: 2900, length: 1, content: 廣, SBCK: 以列陛讌則服常服設􅁝竹之樂唯􅀫衛者列伏大㑹於太極殿小㑹於東堂丗􅀃曰過江諸人每至暇日相要出新亭藉卉飲宴周侯中坐而歎曰風景不殊舉目有江河之異皆流淚唯丞相愀然作色曰當共勠力王室尅復神}
  - {type: variant, offset: 2900, length: 1, content: 廣, WYG: 以列陛讌則服常服設絲竹之樂唯宿衛者列仗大㑹于太極殿小㑹於東堂世說曰過江諸人每至暇日相要出新亭藉卉飲宴周侯中坐而嘆曰風景不殊舉目有江河之異皆流淚唯丞相愀然作色曰當共戮力王室克復神}
  - {type: page-break, offset: 2900, content: '', id: KR3k0012_WYG_539-5a, image: WYG0898/WYG0898-0045c.png}
  - {type: variant, offset: 2900, length: 1, content: 廣, krp: 以列陛讌則服常服設絲竹之樂唯宿衛者列伏大㑹於太極殿小㑹於東堂丗說曰過江諸人每至暇日相要出新亭藉卉飲宴周侯中坐而歎曰風景不殊舉目有江河之異皆流淚唯丞相愀然作色曰當共勠力王室尅復神}
  - {type: variant, offset: 2902, length: 0, content: '', SBCK: 何至作楚因相對而泣也傳􅀇元㑹賦曰考夏后之遺訓綜殷周之典藝採秦漢之舊儀定元正之嘉㑹潘岳閑居賦曰席長􅱀列孫子柳垂隂車結䡄陸㰅紫房水佳頳鯉或宴于林或禊於汜昆弟班白兒童稚齒稱萬壽以獻觴咸一懼而一喜壽觴舉慈顔和浮水樂飲􅁝竹駢羅頓足起舞柷音髙歌人生安樂熟知其他古詩曰今日良宴㑹懽樂難具陳彈筝􅁬逸饗新聲妙人神古􅃩詩曰今日樂上樂相從天公出羙酒河伯出鯉魚靑龍前鋪席白虎持榼壷南斗工鼔琴北斗吹笙竿曹植侍太子坐詩曰白日耀靑天微雨静飛塵寒水辟炎暑凉風飄我身淸醴􅄹金觴肴饌縱撗陳齊人進竒樂歌者出西秦翩翩我公子機巧忽􅀂神曹植與丁廙詩曰嘉賔填城闕豊膳出中厨吾與二三子曲宴此城隅秦筝發西氣齊瑟楊東嘔肴來不虚歸觴至反無餘陸機皇太子請宴詩序曰感聖恩之罔極退而賦此詩也上壽毛詩大雅江漢曰虎拜稽首天子萬年虎拜稽首對楊王休作召公考天子萬壽左傳哀公宴於五梧武伯爲祝祝上壽酒也漢書曰髙祖與項羽鴻門㑹項㽵入爲壽進爵於尊者獻無􅆠之壽也史}
  - {type: page-break, offset: 2902, content: '', id: KR3k0012_SBCK_539-3b}
  - {type: page-break, offset: 2902, content: '', id: KR3k0012_SBCK_539-4a}
  - {type: variant, offset: 2902, length: 0, content: '', WYG: 何至作楚囚相對傅𤣥元㑹賦曰考夏后之遺訓綜殷周之典藝採秦漢之舊儀定元正之加㑹潘岳閑居賦曰席長筵列孫子栁垂隂車結軌陸擿紫房水佳赬鯉或宴於林或禊於汜昆弟班白兒童稚齒稱萬夀以獻觴咸一懼而一喜夀觴舉慈顔和浮水樂飲絲竹駢羅頓足起舞抗音髙歌人生安樂孰知其他古詩曰今日良宴㑹懽樂難具陳彈箏奮逸響新聲妙入神古豔詩曰今日樂上樂相従天公出美酒河伯出鯉魚青龍前鋪席白虎持榼壺南斗工鼓琴北斗吹笙竽曹植侍太子坐詩曰白日耀青天微雨凈飛塵寒氷辟炎暑凉風飄我身清醴盈金觴肴饌縱横陳齊人進竒樂歌者出西秦翩翩我公子機巧忽若神曹植與丁廙詩曰嘉賔填城闕豐膳出中厨吾於二三子曲宴此城隅秦筝發西氣齊瑟揚東謳肴来不虗歸觴至反無餘陸機皇太子請宴詩序曰感聖恩之罔極退而賦此詩也上夀毛詩大雅江漢曰虎拜稽首天子萬年虎拜稽首對揚王休作召公考天子萬夀左傳哀公宴於梧丘武伯為祝祝上夀酒也漢書髙祖與項羽大㑹鴻門項荘入為夀進爵於尊者獻無疆之夀也史}
