  - {type: variant, offset: 1741, length: 0, content: '', WYG: 相苦成叔傲寗子曰苦成家其亡乎古之為享食也以觀威儀省禍福也今夫子傲取禍之道也又昭公曰楚靈王享昭公於新臺好以大屈宴好好賜也大屈弓名也既而悔之又昭公曰穆有塗山之㑹漢書髙祖擊英布還過沛治酒悉召故人父老發沛中兒百二十人教之歌酒酣上自擊筑曰大風起兮雲飛揚威加海内兮歸故鄉安得猛士兮守四方自起舞慷慨傷懷泣下數行謂父老曰逰子歸故鄉吾雖都關中萬嵗後吾䰟􅅎猶樂思沛也與沛父老諸母樂飲道舊故為笑晉書禮志曰漢建安中將正㑹而太史上言正旦當日蝕朝士疑㑹否共咨尚書令荀彧時廣平計吏劉昭在彧坐曰梓慎禆竈古之良史猶占水火錯失天時諸侯旅見天子入門不得終禮者五日蝕在上然則聖人垂治不為變異豫廢朝禮或者灾消異伏或推術謬誤也彧及衆人咸善而從之遂朝㑹如舊亦不蝕魏書曰文帝為魏王南征次譙大享六軍及譙父老自娱樂伎列百戯魏志曰黄初元年郭淮奉使賀文帝踐祚而道路疾病計逺近為稽留及群臣在㑹帝正色責之曰昔禹㑹諸侯塗山防風後至便行大戮今溥天同慶而最遲留何也對}
