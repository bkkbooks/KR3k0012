  - {type: variant, offset: 2926, length: 9, content: 登進頂上朔望拜號為, WYG: 故列數之也男子之贄羔雁雉腒婦人之贄棗栗鍛脩用幣非禮也用者不宜用者也大夫國體也而行婦道惡之故謹而日之公羊傳荘公曰戊寅大夫宗婦覿用幣宗婦者何大夫之妻也覿者見也用者何用者不宜用也見用幣非禮也然則曷用栗棗云腵脩云乎禮記外傳曰王者}
