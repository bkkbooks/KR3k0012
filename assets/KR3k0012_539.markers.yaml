  - {type: variant, offset: 2451, length: 2, content: 竇融, SBCK: 髙祖擊英布還過沛置酒悉召故人父老發沛中兒百二十人教之歌酒酣上自擊筑曰大風起兮雲飛􅀭威加四内兮歸故郷安得猛士􅀆守四方自起舞慷􅁣傷懷泣下數行謂父老曰逰子悲故郷吾雖都關中萬歳後吾䰟􅅎猶樂思沛也與沛父老諸母樂飲道舊故爲􅀏晉書禮志曰漢建安中}
