  - {type: variant, offset: 1749, length: 2, content: 大國, WYG: 防風之誅帝恱之晉書禮志曰漢儀有正㑹禮正旦夜漏未盡七刻鐘鳴受賀公侯以下執贄来庭二千石以上升殿稱萬嵗然後作樂宴享魏武帝都鄴正㑹文昌殿用漢儀又設百華燈晉氏受命武帝更定元㑹儀咸寧注是}
