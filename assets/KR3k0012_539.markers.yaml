  - {type: variant, offset: 1387, length: 194, content: 隱公曰十一年滕侯薛侯來朝爭長薛侯曰我先封滕侯曰我周之卜正薛庶姓也我不可以後之公使羽父請於薛侯曰周之宗盟異姓為後寡人若朝于薛不敢與諸任齒乃長滕侯又莊公曰虢公晉侯朝王王饗醴命之宥王之覲群后始則行饗禮先置醋酒示不忘古飲宴則以幣物宥助也所以助歡敬之意言備誤也皆賜玉五瑴馬三匹非禮也雙玉為瑴王命諸侯名位不同禮亦異數不以禮假人又莊公曰夫禮所以整民也故會以訓上下之則制財用之節朝以正班爵之義帥長幼之序又, SBCK: ''}
