  - {type: variant, offset: 2907, length: 5, content: 都處築高臺, SBCK: 造也因弟故而誣先帝之法吾何面目入髙廟乎又下􅀒萬民乃奏其可哀不能自止左右盡悲東方朔前上壽曰臣聞聖王爲政賞不避仇讎誅不擇骨􅁏書曰不偏不黨王道蕩蕩此二者五帝所重三王所難也陛下行之是}
