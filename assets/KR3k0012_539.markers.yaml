  - {type: variant, offset: 511, length: 700, content: 有事乃聘之焉境外之臣既非朝歲不敢瀆為小禮殷覜謂一服朝之歲以朝者少諸侯乃使卿以大禮眾聘焉一服朝在元年七年十一月終也又秋官下大行人曰大行人掌大賓之禮大客之儀以親諸侯大賓要要服以內諸侯也大客謂其孤卿也春朝諸侯而圖天下之事秋覲以比邦國之功夏宗以陳天下之謨冬遇以恊諸侯之慮時會以發四方之禁殷同以施天下之政此六事者以王見諸侯為文時聘以結諸侯之好殷覜以除邦國之慝此二事者亦以王見諸侯之使來者時為文間問以諭諸侯之志歸脤以交諸侯之福賀慶以贊諸侯之喜致禬以補諸侯之烖此四者主使臣於諸侯之禮也間問者間歲一問諸侯謂存省之屬也諸侯之志者言語諭書名其類也交或往或來者也贊助也致禬凶禮之吊禮禬禮也補諸侯栽者若春秋澶淵之會謀歸宋財凡太國之孤執皮帛以繼小國之君凡諸侯之卿其禮各下其君二等以下及其大夫士皆如之九州之外謂之蕃國世壹見各以其所貴寶為贄九州之外夷服鎮服藩服也凡諸侯之拜交歲相問也殷相聘也世相朝也小聘曰問殷中也久無事又於殷朝者及而相聘也儀禮覲禮曰諸侯覲天子為宮方三百步四門壇十有二尋深四尺上介皆奉其君之旂置於宮尚左公侯伯子男皆就其旂而立禮記曲禮曰天子當依而立諸侯北面而見天子曰覲天子當宁而立諸公東面諸侯西面曰朝諸侯春見曰朝受摯於朝受享於廟生氣文也秋見日覲一受之於廟殺氣質也朝者位於內朝而序進覲者位於廟門外而序入王南面立於依宁而受焉夏宗依春冬遇依秋春秋時齊侯言魯昭公以遇禮相見取易略也覲禮今存朝野宗遇禮今亡諸侯未及期相見曰遇相見於郤地曰會諸侯使大夫問於諸侯曰聘又王制曰諸侯之於天子也比年一小聘三年一大聘五年一朝北年每歲也小聘使大夫太聘使卿朝則君自行天子無事與諸侯相見曰朝事謂征伐又中庸曰繼絕世舉廢國治亂持危朝聘以時厚往而薄來所以懷, SBCK: 宴}
