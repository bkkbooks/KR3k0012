  - {type: variant, offset: 251, length: 258, content: 宰夫之職掌朝覲會同賓客以牢禮之法掌其牢禮與其陳數又春官上宗伯曰春見曰朝夏見曰宗秋見曰覲冬見曰遇時見曰會殷見曰同此六禮者諸侯見王為文也六服之內四方以時分來或朝春或宗夏或覲秋或遇冬者殊禮異更而偏朝猶朝也欲其來之早也宗尊也欲其尊王也覲之言勤也欲其勤王之事也遇猶偶也欲其若不期而俱至也時見者無常期也諸侯有不順服者王將以征討之事則既朝覲王為壇於國外合諸侯有而命焉春秋傳曰有事而會不恊而盟是也殷猶眾也十二歲王如不巡狩則六服盡朝朝禮既畢王亦為壇命諸侯以命改焉所命之政如王巡狩殷見四方四時分來終歲則徧矣時聘曰問殷覜曰視時聘者亦無常期, SBCK: 湛露}
