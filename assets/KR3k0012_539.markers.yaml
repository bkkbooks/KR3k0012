  - {type: variant, offset: 2960, length: 2, content: 蓋先, SBCK: 體也國體謂爲君股肱而行婦道惡之故謹而日之也公羊傳莊公曰戊寅大夫宗婦覿用幣宗婦者何大夫之妻也覿者何見也用者何用者不冝用也不冝用幣爲贄也見用幣非禮也以文在覿下不使齎見知非禮也然則曷用􅀥栗云暇脩云乎禮記外傳曰}
  - {type: variant, offset: 2960, length: 2, content: 蓋先, krp: 體也國體謂爲君股肱而行婦道惡之故謹而日之也公羊傳莊公曰戊寅大夫宗婦覿用幣宗婦者何大夫之妻也覿者何見也用者何用者不冝用也不冝用幣爲贄也見用幣非禮也以文在覿下不使齎見知非禮也然則曷用棗栗云暇脩云乎禮記外傳曰}
  - {type: variant, offset: 2963, length: 0, content: '', SBCK: 者朝臣諸侯}
