  - {type: variant, offset: 1830, length: 528, content: 韓氏其昌阜於晉乎辭不失舊又曰襄二十二年晉人徵朝于鄭召鄭使朝鄭人使少正公孫僑對曰在晉先君悼公九年我寡君於是即位即位八月而我先大夫子駟從寡君以朝於執事執事不禮於寡君言朝執事謙不敢斥晉侯寡君懼因是行也我二年六月朝于楚因朝晉不見禮生朝楚心晉是以有戲之役楚人猶一競而申禮於敝邑敝邑欲從執事而懼為大尤曰晉其謂我不共有禮是以不敢攜貳於楚我四年三月先大夫子蟜又從寡君以觀釁於楚晉於是乎有蕭魚之役謂我敝邑邇在晉國譬諸草木吾臭味也而何敢差池以大國政令之無常國家罷病不虞荐至無日不愓豈敢忘職大國若安定之其朝夕在庭何辱命焉又昭二曰康有酆宮之朝酆在始平鄠縣東有靈臺康王於是朝諸侯又昭四曰明王之制使諸侯歲聘以志業志職也歲聘以脩其職業間朝以講禮三年而一朝正班爵之義率長幼之序再朝而會以示威六年而一會以訓上下之則制財用之節再會而盟以顯昭明十二年而一盟所以昭信義也凡八聘四朝再會王一巡狩盟于方嶽之下志業於好講禮於等示威於眾昭明於神春秋說題辭曰朝者不占而到諸侯秉政尊卑有序各來朝講文德明禮讓天下法制四方受度會者所以興德明義考遺廢於天下史記曰子貢結駟連騎束帛之幣以聘享諸侯所至國君無不郊迎與抗禮者漢書武紀曰元年春正月朝諸侯王於甘泉宮又曰宣帝甘露二年呼韓邪單于款五原塞願奉國珍朝三年春呼韓邪單于朝, WYG: ''}
