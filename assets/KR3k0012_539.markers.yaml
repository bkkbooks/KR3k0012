  - {type: variant, offset: 1752, length: 140, content: 聘而獻物於是乎有庭實旅百朝而獻功於是乎有容貌采章嘉淑而有嘉貨獻其理國若征伐之功於牧伯又襄公曰晉侯使韓宣子聘于周王使請事對曰晉士起將歸時事於旅無他事矣王聞之曰韓氏其昌阜於晉乎辭不失舊又曰襄二十二年晉人徵朝于鄭召鄭使朝鄭人使少正公孫僑對曰在晉先君悼公九年我寡君於是即位即位八月而我先大, SBCK: 以觀威儀省禍福也今}
