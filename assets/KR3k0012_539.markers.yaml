  - {type: variant, offset: 2229, length: 219, content: 秋說題辭曰朝者不占而到諸侯秉政尊卑有序各來朝講文德明禮讓天下法制四方受度會者所以興德明義考遺廢於天下史記曰子貢結駟連騎束帛之幣以聘享諸侯所至國君無不郊迎與抗禮者漢書武紀曰元年春正月朝諸侯王於甘泉宮又曰宣帝甘露二年呼韓邪單于款五原塞願奉國珍朝三年春呼韓邪單于朝天子于甘泉宮漢寵以殊禮位諸侯王上贊謁稱藩臣而不名賜以璽綬冠帶衣裳使有司導單于先行就邸長安宿長平上自甘泉宿池陽宮上登長平阪詔單于母謁及諸夷蠻君長王侯迎者數萬人夾道陳上登渭橋咸稱萬歲後, SBCK: 東北}
