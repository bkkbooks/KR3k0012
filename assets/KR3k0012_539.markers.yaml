  - {type: variant, offset: 2963, length: 0, content: '', krp: 者朝臣諸侯}
  - {type: variant, offset: 2964, length: 2, content: 高會, SBCK: 朝臣非南面之尊地不成國德不比玉故不執玉􅀌卿執皮帛虎豹之皮與束帛天子之􅀌卿少師少傳少保卿執羔天子六卿即諸侯之上大夫羔取其不乱羣大夫執鴈鴈飛有行列士執雉雉性剛有死節夏執乾雉餘三時皆執死雉工啇執鷄鷄司而鳴庶人執鶩鶩家鴨不逺飛庶人不出郷諸侯太子非天子所命者有列㑹之事則執皮帛繼子男之下婦人􅀄見舅姑執榛栗􅀥脩脯􅀥進於姑榛栗進於舅也執贄幣相見相敬也白虎通曰臣見君有贄者何䞇者質巳之誠王者縁臣子心以爲之制差有尊卑以副其意也公侯以玉爲質玉者取其燥不輕濕不重明公侯之德全也卿以羔爲贄羔者取其羣而不黨卿職在盡忠率下不黨大夫以鴈爲贄者取其飛成行列大夫職在奉命適}
  - {type: page-break, offset: 2964, content: '', id: KR3k0012_SBCK_539-8a}
  - {type: variant, offset: 2964, length: 2, content: 高會, WYG: 制差有尊卑以副其意也公侯以玊為贄玊者取其燥不輕濕不重明公侯之徳全也卿以羔為贄羔者取其羣而不黨卿職在盡忠率下大夫以鴈為贄者取其飛成行列大夫職在奉命適}
