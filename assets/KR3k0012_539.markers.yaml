  - {type: variant, offset: 2923, length: 19, content: 丈螺道登進頂上朔望拜號為朝臺左思吳都賦, SBCK: 枚署功曹後漢書}
  - {type: variant, offset: 2923, length: 2, content: 丈螺, WYG: 官再拜已飲又拜唐書曰元和十四年齊魯初平宴文武百僚裴度舉觴獻夀跪而言曰陛下徳配天地明並日月神武獨斷冦逆削平錫宴羣臣兹當令節臣偹位台司幸逄昌運願與四海九州之人同上千萬嵗夀上執酒為飲之管子曰桓公管仲鮑叔牙寗戚四人飲酣桓公謂鮑叔牙曰盍不起為寡人夀乎鮑叔牙奉杯而起曰使公毋忘出在莒時也使管子毋忘束縛在於魯也使寗戚毋忘其飯牛下車也桓公避席再拜曰寡人與二大夫能毋忘夫子之言則齊國之社稷不危也燕丹子曰太子置酒請荆軻酒酣太子起為夀贄尚書曰五玉三帛二生一死贄三帛諸侯也子執纁公之孤執𤣥附庸之君執黄二生卿執羔大夫執雁一死士執雉玉帛生死所以為贄而見者儀禮曰士相見之禮贄冬用雉夏用腒下大夫相見以雁飾之以布維之以索如執雉上大夫相見以羔飾之以布四維之結於面左頭如麛執之以士相見之禮周禮春官上大宗伯曰以玉作六瑞以等邦國王執鎮圭公執桓圭侯執信圭伯執躬圭子執榖璧男執蒲璧以禽作贄以等諸臣執之言至也所執一自致孤執皮帛卿執羔大夫執鴈士執雉庻人執鶩工商執鷄皮帛束帛也表以為皮為之虎豹皮也帛如璧色繒也羔小羊取其羣而不失其類也㕍取其候時而行之也雉取其守介而死不失其節也鶩取其不飛鷄取其守時而鳴禮記曲禮曰凡贄天子鬯諸侯圭卿羔大夫鴈士雉庶人之贄匹童子委贄而退野外軍中無贄以纓拾矢可也婦人之贄椇榛脯脩棗栗春秋荘公曰哀姜至使宗婦覿用幣非禮也御孫曰男贄大者玉帛小者禽鳥以章物也女贄不過榛栗棗脩以告䖍也又定公下曰公㑹晉師於瓦范獻子執羔趙簡子中行文子皆執雁魯於是乎始尚羔榖梁傳曰荘公曰大夫宗婦覿用幣覿見也禮大夫不見夫人不言及不正其行婦}
