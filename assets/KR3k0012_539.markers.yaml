  - {type: variant, offset: 2913, length: 1, content: 朝, SBCK: 四海之内元元之民各得其所天下幸甚臣朔奉觴昧死再拜上萬歳壽上乃起入省中乆時召讓朔免冠頓首曰臣聞樂大甚則陽溢哀大甚則隂頓陽變則心氣動心氣動則精神散而邪氣入銷憂者莫􅀂酒臣朔以上壽者明陛下正而不阿思以止哀也後}
  - {type: variant, offset: 2913, length: 0, content: '', WYG: 四海之内元元之民各得其所天下幸甚臣朔奉觴昩死再拜上萬嵗夀上乃起入省中久時召讓朔免冠頓首曰臣聞樂太甚則陽溢哀太甚則隂頓隂陽變則心氣動心氣動則精神散而邪氣入消憂者莫若酒臣朔以上夀者明陛下正而不阿思以止哀也後漢書班超傳曰超區區特䝉神靈竊冀未便仆僵目見西域平定陛下舉萬年之觴薦勲祖廟布大喜于天下東觀漢記曰吳良齊郡人為郡議曹掾吏正旦入賀太守門下掾王望前言曰齊郡敗亂遭罹盗賊人民飢餓不聞鷄鳴犬吠之音明府視事五年五榖豐登家給人足今日嵗首請上雅夀掾吏皆稱萬嵗良跪曰門下掾佞謟明府受其觴盗賊未盡人民困乏良曹掾尚無絝望曰議曹惰窳自無絝寧不為家給人足耶太守曰此生言是也遂不舉觴賜鰒魚百枚署功曹後漢書曰竇后定策立靈帝帝以太后有援立之功率羣臣}
