  - {type: variant, offset: 2091, length: 246, content: 雌緩急者不過半日間緩者經宿其方人常有以求之求之小晚則死俗名曰刀勞鬼又曰永昌郡不韋縣有禁水水有毒氣唯十一月十二月可渡涉自正月至十月不可渡渡輒病殺人其氣有惡物不見其形作聲如有所投擊中木則折中人則害人俗名鬼彈文士傳曰左思初作蜀都賦曰鬼彈飛丸以䃒礰後又改易無此語南中八部志曰永昌郡有禁水水有惡毒氣中物則有聲中樹木則折名鬼彈中人則奄然青爛又曰下邳周式嘗至東海道逢一使持一卷書求寄載行十餘里謂式曰吾蹔有所過留書寄舡中慎勿發之去後式盜發視書皆諸死人錄下條有式名須臾使還式首道視書吏怒曰故以相告而勿視之式叩頭, SBCK: 實反傷膝}
