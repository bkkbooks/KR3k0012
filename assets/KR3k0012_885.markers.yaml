  - {type: variant, offset: 264, length: 3, content: 所誅宗, WYG: 徽之字伯猷元嘉四年為交州刺史在道有客命索酒炙言未訖而炙至徽之取自割終不入投地大怒少頃顧視向炙已變為徽之頭矣驚愕反矚目覩其首在空中揮霍而沒又曰檀道濟元嘉中鎮尋陽十二年入朝與家分别顧瞻城闕歔欷逾深識者是知道濟之不南旋也故時}
