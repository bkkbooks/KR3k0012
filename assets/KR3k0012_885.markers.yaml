  - {type: variant, offset: 1184, length: 94, content: 人妾孤窮羸弱不能自振欲之傍縣賣繒從同縣男子王伯賃車牛一乘載繒妾乘車致富執轡乃以前年四月到亭外時日暮行人斷絕不敢復進因止致富暴得腹痛妾之亭長舍乞漿火而亭長龔壽操刀戟來至車傍問妾曰夫人何從來車, SBCK: 炊頃衣小沾濡曉在門}
