  - {type: variant, offset: 2339, length: 833, content: 吏良久曰感卿遠相載此書不可除卿今日已去還家三年勿出門可度也勿道見吾書式還不出已二年餘家皆怪之鄰人卒父怒使吊之式不得已適出門便見此吏吏曰吾令汝三年勿出今而奈何吾求汝不見連相為得鞭杖今已見汝無可奈何三日中當相取也式還涕泣具道如此父故不信母晝夜與相守涕泣至三日日中時即死續搜神記曰淮南胡茂回能見鬼雖不喜見而不可止後行至楊州還歷陽城東有神祠中正值民將至祝祀之須臾群鬼叱曰上官來迸走出祠去回顧見二沙門來入祠中諸鬼兩兩三三相抱持在祠邊草中望沙門皆怖懼須臾沙門去鬼皆還祠中回於是遂少奉佛又曰王伯陽家在京口家東有大冢傳是魯肅墓伯陽婦喪乃平其墳以葬後數年伯陽白日在廳事見一貴人乘平肩輿將從數百人往來坐謂伯陽曰身是魯子敬安冢在此二百許年君何敢遽毀壞身冢因目左右何不舉手左右牽伯陽下床以刀環築之數伯而去伯陽登時絕死良久乃蘇其處皆發疽疽潰尋死又曰會稽句章人東野還暮不及門見路傍小屋燃火投宿止有一少女不欲與丈夫共宿呼鄰人家女自伴夜共彈箜篌戲歌曰連綿葛上藤一緩復一組汝欲知我姓姓陳名阿登明至東郭外有賣食母在肆中此人寄坐因說昨夜所見母聞阿登驚曰是我女近亡葬於郭外又曰施續為尋陽督能言論有門生亦有理意嘗秉無鬼論忽有人單衣白袷來言及鬼客詞屈曰僕便即鬼何以言無使來取君門生酸苦求之鬼問有似君者不門生云施續下都督與僕相似鬼許之俄而督亡語林曰宗岱為青州刺史著無鬼神論甚精莫能屈後有書生詣岱談次及鬼論書生乃拂衣而去曰君絕我輩血食二十餘年以君有青牛髯奴所以未得相困今奴已叛牛已死今得相制言絕而失來日岱亡鄧德明南康記曰山都形如崑崙通身生毛見人輒閉眼張口如笑好在深澗中飜石覔蟹噉之又曰木客頭面語聲亦不全異人但手腳爪如鉤利高巖絕峰然後居之能斫榜牽著樹上聚之昔有人欲就其買榜先置物樹下隨量多少取之若合其意便將去亦不橫犯也但終不與人面對交語作市井死皆知殯歛之不令人見其形也葬棺法每在高岸樹杪或藏石窠中南康三營代舡兵往說親覩葬所舞倡之節雖異於世聽如風林汎響聲頻歌吹之和義熙中徐道覆南出遣人伐榜以裝舟艦木客乃獻其榜而不得見述, SBCK: 甄}
