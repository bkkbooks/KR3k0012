  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第八百八十五妖異部一恠春秋潜潭巴曰異之爲言恠也謂先發感動左傳莊公曰𥘉内蛇與外蛇闘於鄭南門之中内蛇死六年而厲公入公聞之問於申繻曰猶有妖乎對曰人之所忌其氣𦦨以取之妖由人興也人無釁焉妖不自作人弃常則妖興故有妖也又文公曰有蛇自泉宫出入于國如先君之數伯禽至僖公十七君秋八月聲姜薨毀泉臺魯人以爲蛇妖所出而声姜薨故壞之又襄六曰或呌于宋太廟曰譆譆出出謂譆熱也出出戒伯姬鳥鳴于亳社如曰譆譆皆火妖也甲午宋大灾伯姬卒又哀上曰有雲如衆赤烏夾日以飛三日楚子使問諸周太史周太史曰其當王身乎曰爲人君妖氣守之故以爲當王身雲在楚上唯楚見之故禍不及他国若禜之可移於令尹司馬家語曰季桓子穿井獲如土缶其中有羊焉使問之仲尼曰吾穿井而獲狗何也對曰以丘之所聞羊也丘聞之木石之怪夔蝄蜽木石謂山也夔一足越人謂山㺐或言獨足蝄蜽山精好効人聲迷感人氷之怪曰龍罔象土之怪曰羵羊龍}
  body:
  - {type: variant, offset: 1, length: 4, content: 鬼部四鬼, SBCK: 獸非常所見故曰怪罔象食人名沐瞳墳羊雌雄不成者張璠漢記曰梁兾池中舡無故自覆後􅀍誅後漢書曰彭寵自立爲燕王多見變怪堂上聞蝦蟇聲在爐火}
  - {type: variant, offset: 1, length: 4, content: 鬼部四鬼, krp: 獸非常所見故曰怪罔象食人名沐瞳墳羊雌雄不成者張璠漢記曰梁兾池中舡無故自覆後𬒳誅後漢書曰彭寵自立爲燕王多見變怪堂上聞蝦蟇聲在爐火}
  - {type: variant, offset: 3, length: 2, content: 四鬼, WYG: 一恠春秋潜潭巴曰異之為言恠也謂先發感動也左傳莊公曰初内蛇與外蛇鬬於鄭南門中内蛇死六年而厲公入公聞之問於申繻曰猶有妖乎對曰人之所忌其氣燄以取之妖由人興也人無釁焉妖不自作人棄常則妖興故有妖又文公曰有蛇自泉宫出入于國如先君之數秋八月聲姜薨毁泉臺又㐮六曰或呌於宋太廟曰譆譆出出鳥鳴于亳社如曰譆譆甲午宋大灾伯姬卒又哀上曰有雲如衆赤烏夾日以飛三日楚子使問諸周太史周太史曰其當王身乎若禜之可移於令尹司馬國語曰季桓子穿井獲如土缶其中有羊焉使問之仲尼曰吾穿井而獲狗何也對曰以丘之所聞羊也丘聞之木石之恠䕫蝄蜽水之怪曰龍罔象土之怪曰墳羊張璠漢紀曰梁冀池中船無故自覆後被誅後漢書曰彭寵自立為燕王多見變怪堂上聞蝦蟇聲在爐火}
