  - {type: variant, offset: 3175, length: 2, content: 南康, SBCK: 徐州人吴清以太元五年􅀍􅏔爲征人殺雞求福置雉頭在拌中忽然而鳴其後破賊賊帥邵寳臨陣戰死于時殭尸狼籍莫之能識清見一人着白錦􅂁疑是主帥便斬以聞推校之乃是寳首清以功拜清河太守越自行伍猥􅂪榮位雞之妖更爲祥桓譚新論曰吕仲子婢死}
  - {type: variant, offset: 3175, length: 2, content: 南康, WYG: 徐州人呉清以太元五年被差征人殺鷄求福置鷄頭在柈中忽然而鳴其後破賊賊帥邵寳臨陣戰死于時殭尸狼藉莫之能識清見一人着白錦袍疑是主帥便斬以聞推校之乃是寳以功得為清河太守越自行伍猥蒙榮位鷄之妖更為祥桓譚新論曰吕仲子婢死育女四嵗數來為沐浴浣濯道士云其家青狗為之殺之則止陽仲亦言所知家嫗死忽起飲食醉後而坐祭牀上如是三四家益厭苦其後醉行壊垣得老狗便打殺之推問乃里屠沽家狗元晏春秋曰新安寺}
  - {type: page-break, offset: 3175, content: '', id: KR3k0012_WYG_885-13b, image: WYG0900/WYG0900-0717d.png}
  - {type: variant, offset: 3175, length: 2, content: 南康, krp: 徐州人吴清以太元五年𬒳差爲征人殺雞求福置雉頭在拌中忽然而鳴其後破賊賊帥邵寳臨陣戰死于時殭尸狼籍莫之能識清見一人着白錦𫀆疑是主帥便斬以聞推校之乃是寳首清以功拜清河太守越自行伍猥蒙榮位雞之妖更爲祥桓譚新論曰吕仲子婢死}
  - {type: variant, offset: 3178, length: 2, content: 神名, SBCK: 女四歳數來爲沐頭浣濯道士云其家青狗爲之殺之則止楊仲亦言所知家嫗死忽起飲食後醉而坐􅀕牀上如是三四家益厭苦其後醉形壞但得老狗便打殺之推問乃里頭沽家狗玄晏春秋}
  - {type: variant, offset: 3178, length: 2, content: 神名, WYG: 槐而鵲巢之雄雞奪而棲焉永將寄次于野縣其空乎夏五月丙申璉卒䘮次于縣空縣送之賈誼鵩鳥賦}
  - {type: page-break, offset: 3178, content: '', id: KR3k0012_WYG_885-14a, image: WYG0900/WYG0900-0718a.png}
