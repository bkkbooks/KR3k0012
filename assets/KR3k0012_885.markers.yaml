  - {type: variant, offset: 9, length: 1, content: 廣, SBCK: 鉅鹿張荐才見至切正始中戴鵀鳥巢門臶告門人曰夫戴鵀鳥巢門隂此凶祥也乃琴作詩旬日而卒又曰朱建平善相相應璩曰君年六十二位爲常伯先此一年當獨見一白狗也璩年六十一爲侍中直内省忽見白狗衆人悉不見於是併急遊觀飲讌自娛年六十二卒吴志曰諸葛恪將征淮南有孝子着縗衣入其閤中令外詰問曰不自􅁴入時守備亦悉不見後恪遂􅀍誅􅀳書曰齊王冏輔政有一婦人詣大司馬門求􅀉産吏詰之曰我截臍便去耳言畢不見明年冏誅王隠晉書曰王浚居幽}
  - {type: page-break, offset: 9, content: '', id: KR3k0012_SBCK_885-2a}
  - {type: variant, offset: 9, length: 1, content: 廣, WYG: 鉅鹿張臶正始中戴鵀鳥巢臶門隂臶告門人曰夫戴鵀陽鳥而巢門隂此㓙祥也乃援琴作詩旬日而卒又曰朱建平善相相應璩曰君年六十二位為常伯先此一年當獨見一白狗也璩年六十一為侍中直内省忽見白狗衆人悉不見於是併急遊觀飲讌自娯年六十二卒呉志曰諸葛恪將征淮南有孝子著縗衣入其閣中令外詰問曰不自覺入時守備亦悉不見後恪遂被誅晉書曰齊王冏輔政有一婦人詣大司馬門求寄産吏詰之曰我截臍便去耳言畢不見明年冏誅王隐晉書曰王凌居幽}
