  - {type: variant, offset: 320, length: 0, content: '', SBCK: 中狗當路眠豫蹴之狗曰汝停死何以蹋我經年豫死又曰晉惠帝羊后將入宫衣中忽有火光自後蕃臣遘兵洛陽失御后爲劉曜所嬪又曰有人姓劉在朱方人不得共語􅀂與之言人必遭禍難及身死疾唯一土謂無此理偶值人有屯塞耳劉聞之欣然而往自􅀃􅀍謗君能見明荅云丗雷同何足䘏湏􅁷火發資畜服玩蕩盡於是舉丗號爲劉鵂鶹復遇諸塗皆閉車走馬掩目奔避劉亦杜門自守歳時一見則人驚散過於見鬼又曰太原王徽之字伯猷元嘉四年爲兖州刺史在道有客命索酒炙言未訖而炙至徽之取自割終不入投地大怒少頃頋視向炙巳變爲徽頭矣驚愕反矚又覩其首在空中揮霍而没王至州便殞又曰張仲舒元嘉十七年七月中晨夕間輙見門側有赤氣赫然後空中忽雨絳羅於其庭廣七八分長}
  - {type: page-break, offset: 320, content: '', id: KR3k0012_SBCK_885-6a}
