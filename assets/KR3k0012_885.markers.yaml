  - {type: variant, offset: 189, length: 3, content: 寢疾日, SBCK: 郡亭重屋中常有􅀑物􅀫者輙死自後使官莫敢入舎丹陽人應大者膽武至使廬陵便入亭止吏啓不可應不聽盡遣所將人還外持一口大刀至三更聞有扣閤者應遥問是誰荅云部郡相聞應使進相聞去湏􅁷扣閤者如前曰府君相聞應復使進着皂衣又去應謂是人了無疑也湏􅁷復扣閤言部府君相詣應乃知是鬼持刀迎之}
