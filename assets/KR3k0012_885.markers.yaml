  - {type: variant, offset: 1191, length: 1, content: 能, WYG: 少沾濕曉在郡廨上}
  - {type: variant, offset: 1193, length: 806, content: 振欲之傍縣賣繒從同縣男子王伯賃車牛一乘載繒妾乘車致富執轡乃以前年四月到亭外時日暮行人斷絕不敢復進因止致富暴得腹痛妾之亭長舍乞漿火而亭長龔壽操刀戟來至車傍問妾曰夫人何從來車上所載丈夫何在何故獨行妾應曰何問之壽持妾臂曰年少愛有色冀可樂也妾懼怖不應壽即持刀刺脅下一瘡立死又刺致富亦死壽掘樓下合埋妾在下婢在上取財物而去殺牛燒車車釭及牛骨貯在亭東井中妾既冤死痛感皇天無所告訴故來自歸於明使君敞曰今欲發之汝何以為驗女子曰妾上下著白衣青絲屨皆未朽也妾姓蘇名娥願訪鄉里以散骨歸死夫敞乃馳還令吏捕壽考問具服問廣信縣與娥語合壽父母兄弟皆捕繫獄敞表壽常律殺人不至於族然壽為惡隱密經年王法自所不免今鬼神訴者千載無一請皆斬之以明鬼神以助陰教又曰盧充范陽人家西三十里有崔少府墓充年二十先冬至一日出宅西獵戲見麞便射中之麞倒而起充遂逐不覺遠忽見道北一里許高門瓦屋四周有如府舍不復見麞門中鈴下唱客前有一人投一樸新衣曰府君以此繫郎充便著已進見少府語充曰尊府君不以僕門鄙近得書為君索小女為婚故相迎耳便以書示充父亡時充雖小然已識父手跡便即歔欷無復辭便勑內盧郎已來可使女郎莊嚴至黃昏內白女郎莊嚴竟崔語充君可至東廊崔婦下車立席頭即共拜時為三日給食畢崔謂充曰君可歸去女若生男當以相還生女當留養勑外嚴車送客充便辭出至家母見問其故充悉以狀對別後四年三月充臨水戲忽見傍有犢車乍沉乍浮既而上岸四坐皆見而充往開其車後戶見崔氏女與三歲男共載女抱兒以還充又與金盌忽然不見充後乘車入市賣盌冀有識者有一婢識此還白大家曰市中見一人乘車賣崔氏女郎棺中金盌大家即崔氏親姨母也遣兒視之果如婢言乃語充曰昔我姨姉少府女未出而亡家親痛之贈一金盌著棺中可說得盌本末充以事對此兒亦為悲咽齎還白母母即令詣充家迎兒還諸親悉集兒有崔氏之狀又復似充之貌兒盌俱驗姨母曰我外生也即字溫休溫休者是幽婚也遂成令器歷郡守其後植子毓有名天下又曰麋笁嘗從路歸未至家數十里見路次有新婦從麋求寄載行一十餘里新婦謝去謂笁曰, WYG: 云}
