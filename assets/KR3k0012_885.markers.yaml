  - {type: variant, offset: 258, length: 9, content: 玄為司馬景王所誅宗, SBCK: 藻母病困將詣淳于智卜有一狐當門向之嘷喚藻愁愕遂馳詣智智曰其禍甚急君速歸在嘷處樹下啼􅂘合家}
  - {type: variant, offset: 258, length: 1, content: 玄, WYG: 藻母病困將詣淳于智卜有一狐當門向之嘷呌藻愕遂馳詣智智曰其禍甚急君速歸在嘷處拊心啼哭令家人驚怪大小畢出一人不出啼哭勿休然後其禍僅可救也藻如之母亦扶疾而出家人既集堂屋五間拉然而崩又曰淳于智字叔平濟北人性沉深有思義自}
  - {type: variant, offset: 258, length: 9, content: 玄為司馬景王所誅宗, krp: 藻母病困將詣淳于智卜有一狐當門向之嘷喚藻愁愕遂馳詣智智曰其禍甚急君速歸在嘷處樹下啼哭合家}
  - {type: variant, offset: 260, length: 1, content: 司, WYG: 書生善易髙平劉柔夜卧䑕齧其左手中指意甚惡之以問智智為筮之曰䑕本欲殺君而不能當相為使之反死乃以朱書其手腕橫文後三寸為田字可方一寸使夜露手以卧其夜大䑕伏死手前又曰東陽留寵字道和居于姑孰每夜門庭有血數升不知所從來如此三四後寵為折衝將軍見遣北征將行而炊食悉變為虫寵遂北征軍敗於檀邱為徐龍所殺續捜神記曰廣州有三人共在山中伐木忽見石窠中有二卵大如升取煑之始湯熱便聞林中如風雨聲須臾有一蛇大十圍長四五丈徑來於湯中衘卵去三人無幾皆死又曰代郡張平者符堅時為賊帥自號井州刺史養一狗名曰飛鷰形若小驢忽夜上㕔事屋上行行聲如平常未經年果為鮮卑所逐敗走降苻堅未幾便死又曰新野庾謹母病兄弟三人悉在白日侍疾常燃火忽見帳帶自卷自舒如此數四須臾聞牀前狗闘聲非常舉家共視了不見狗見一死人頭在地頭猶有血兩眼尚動甚可憎惡其家怖懼乃不持出門即於後園中瘞之明旦往視乃出土上兩眼猶爾即又埋之後旦亦復出乃以塼頭合埋之不復出也數日其母遂亡異苑曰謝文静於後府接賔婦劉氏見狗衘謝頭來久乃失所在婦具説之謝容無易色是月而薨又曰安固李道豫元嘉中狗當路眠豫蹴之狗曰汝即死何以蹋我經年豫死又曰晉惠帝羊后將入宫衣中忽有火光自後蕃臣遘兵洛陽失御后為劉曜所嬪又曰有人姓劉在朱方人不得共語若與之言人必遭禍難及身死疾唯一士謂無此理偶值人有屯塞耳劉聞之忻然而往自説被謗有能見明答云舉世雷同亦何足䘏須臾火發資畜服玩蕩盡於是舉世號為劉鵂鶹脫遇諸途皆閉車走}
