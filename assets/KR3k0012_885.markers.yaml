markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', SBCK: 太平御覽卷第八百八十五妖異部一恠春秋潜潭巴曰異之爲言恠也謂先發感動左傳莊公曰􅀄内蛇與外蛇闘於鄭南門之中内蛇死六年而厲公入公聞之問於申繻曰猶有妖乎對曰人之所忌其氣􅆋以取之妖由人興也人無釁焉妖不自作人弃常則妖興故有妖也又文公曰有蛇自泉宫出入于國如先君之數伯禽至僖公十七君秋八月聲姜薨毀泉臺魯人以爲蛇妖所出而声姜薨故壞之又襄六曰或呌于宋太廟曰譆譆出出謂譆熱也出出戒伯􅁎鳥鳴于亳社如曰譆譆皆火妖也甲午宋大灾伯􅁎卒又哀上曰有雲如衆赤烏夾日以飛三日楚子使問諸周太史周太史曰其當王身乎曰爲人君妖氣守之故以爲當王身雲在楚上唯楚見之故禍不及他国􅀂禜之可移於令尹司馬家語曰季桓子穿井獲如土􅇲其中有羊焉使問之仲尼曰吾穿井而獲狗何也對曰以丘之所聞羊也丘聞之木石之怪夔蝄蜽木石謂山也夔一足越人謂山㺐或言獨足蝄蜽山精好効人聲迷感人氷之怪曰龍罔象土之怪曰羵羊龍}
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_885-1a}
