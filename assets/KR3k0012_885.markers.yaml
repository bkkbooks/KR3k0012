  - {type: variant, offset: 314, length: 4, content: 謝靈運以, WYG: 武昌戴熙家道貧陋墓在樊山南占者云有王氣宣武桓公仗威西下停武昌令鑿之得一物大如水牛青色無頭脚時亦動揺斫刺不陥乃縱著江中得水便有聲如雷響發長川熙後嗣淪胥殆絶又曰烏傷葛輝夫義熙中在女家宿至三更有兩人把火至堦前疑是㐫人往打之欲下杖悉變蝴蝶繽紛飛散有一物衝輝夫腋下便倒地少時死述異記曰郭中産宅在江陵枇杷寺南宋}
