  - {type: variant, offset: 89, length: 0, content: '', WYG: 人長可丈五尺當門向床以臂壓王良久遂失甚惡之而明日被誅沈約宋書曰蕭思話在青州常所用銅斗覆在藥厨下忽於斗下得二死雀思話歎曰斗覆而雙雀殞其不祥乎既而被繫宋書曰劉敬宣嘗夜與寮屬宴空中有投一隻芒屩於坐墜敬宣食盤上三尺五寸已經人著耳鼻間並欲壊頃之而敗䘮易洞林曰呉興太守袁元瑛當之官筮卦吉㐫曰法至官當主赤蛇為妖不可殺至果有赤蛇在銅虎符石凾上蟠元瑛擿殺之其後果為賊徐馥所害唐明皇雜録曰李適之既貴且豪嘗列鼎於前以具膳羞一旦庭中鼎躍出相闘家僮告適之適之乃往其所引酒自誓而闘亦不觧鼎耳及足皆落明日適之罷知政事俄為李林甫所䧟貶宜春太守而終又曰李林甫宅屢有妖怪其南北隅溝中有火光大起或有小兒持火出入林甫惡之奏於其地立嘉猷觀林甫之疾也晨起盥餙將入朝命取書嚢即常時所要事目也忽覺頗重於常持者開視之即有二䑕出焉投下於地即變為蒼狗雄目張牙仰視林甫命弓射之殷然即滅林甫惡之不踰月而卒世説曰衞瓘永熙中家人炊飯墮地盡化為螺出足而行瓘終見誅列異傳曰中山王周南正始中為襄邑長䑕從穴中出在㕔上語曰周南汝以某月某日當死周南不應䑕還穴中至期復出冠幘絳衣而語曰周南汝日中當死周南復不應日適中䑕曰周南汝不應死我復何道言訖䑕遂顛蹶而死即失衣冠周南使卒來取視之如常䑕耳捜神記曰漢武大始四}
