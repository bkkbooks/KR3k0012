  - {type: variant, offset: 535, length: 0, content: '', SBCK: 而􅀏揺頭語曰言我不能歌聽我歌梅花今年故復可奈汝明年何其家斬犬牓首路側至梅花時兄弟相闘弟㦸傷兄收繫皆死又曰宋大明中頓丘縣令劉順酒酣晨起見榻牀上有一聚凝血如覆盆}
  - {type: variant, offset: 535, length: 0, content: '', WYG: 了不驚怪乃令擣虀親自切血染虀食之棄其所餘後十許載至元徽二年為王道隆所害又曰周登之家在都宋明帝時統諸靈廟甚被恩寵母謝氏奉佛法太始五年夏月暴雨有物}
