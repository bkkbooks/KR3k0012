  - {type: variant, offset: 3287, length: 394, content: 里有古塘名余公塘上有大梓樹可二十圍樹老中空有山都窠宋元嘉元年縣治民哀道訓道虛兄弟二人伐倒此樹取窠還家山都見形謂二人曰我處荒野何豫汝事巨木可用豈可勝數樹有我窠故伐倒之今當焚汝宇以報汝之無道至二更中內外屋上一時火起合宅蕩盡志怪曰會稽郡常有大鬼長數丈腰大數十圍高冠玄衣郡將吉凶跂于雷門示憂喜之色謝氏一族憂喜必告弘道未遭母難數月鬼晨夕來臨及後轉吏部尚書拊掌三節舞自大門至中庭尋而遷問至又曰夏侯弘忽行江陵逢一大鬼投弓戟急走小鬼數百從之弘畏懼下路避之大鬼過後捉一小鬼問此是何物曰廣州大殺弘曰以此矛戟何為曰以此殺人若中心腹者輒死中餘處不至於死弘曰治此病者有方不鬼曰殺烏雞薄心即羗弘曰今欲行何鬼曰當荊楊二州爾時此二州皆行心腹病略無不死者弘在荊州教人殺烏雞薄之十得八九今中惡用鳥雞自弘之由也本草曰梟桃在樹不落者殺百鬼也張衡東京賦曰度索作梗守以鬱壘神荼副焉對操索葦上古有神荼與鬱壘昆弟二人能執鬼度朔山鬼所出入, SBCK: ''}
