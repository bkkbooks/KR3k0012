  - {type: variant, offset: 89, length: 0, content: '', SBCK: 人長可丈五尺當門向床以臂壓王良乆遂失甚􅁖之而明日􅀍誅沈約宋書曰蕭思話在青州常所用銅斗覆在厨下忽於斗下得二死雀思話歎曰斗覆而􅀟雀殞其不祥乎旣而􅀍繫宋書曰劉敬宣嘗夜與寮屬宴空中有投一􅃗芸屩於坐墜敬宣食盤上長三尺五寸巳經人着耳鼻間並欲壞頃之而敗喪易洞林曰吴興太守􅀽玄瑛當之官卜卦占凶曰至官當有赤蛇爲妖不可殺至果有赤蛇在銅虎符石凾上蟠玄瑛擿殺之其後果爲賊徐馥所害唐明皇雜録曰李適之旣貴且豪嘗列鼎前以具膳羞一旦庭中鼎躍出相闘家僮告適之適之乃往以其所引酒自誓而闘亦不解鼎耳及足皆落明日適之罷知政事俄爲李林甫所䧟貶冝春太守而終又曰李林甫宅屢有妖怪其南北隅溝中有火光大起或有小兒持火出入林甫惡之又曰李林甫之疾也晨起盥飾將八朝命取書囊即常時所要事目也忽􅁴頗重於常時者開視之即有二䑕出焉投下於地即變爲蒼狗雄目張牙仰視林甫命弓射之殷然即滅林甫惡之不踰月而卒丗􅀃曰衛瓘永熈中家人炊飯墮地盡化爲螺出足而行瓘終見誅列異傳曰中山王周南正始中爲襄邑長䑕從穴中出在㕔上語曰周南汝以某月某日當死周南不應䑕還穴中至期復更冠幘絳衣而語曰周南汝日中當死周南復不應日適中䑕曰周南汝不應我復何道言䑕遂顛蹶而即失冠衣周南使卒取來視之如常䑕耳捜神記曰漢武太始四}
