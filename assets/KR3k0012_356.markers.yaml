  - {type: variant, offset: 5, length: 0, content: '', SBCK: 領請免㓪官也鄴中記曰石季龍左右置直衛萬人皆五色細鎧光曜奪目伏侯古今注曰章帝建􅀄三年丹陽宛陵民掘地得}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 領請免郎官也鄴中記曰石季龍左右置直衛萬人皆五色細鎧光曜奪目古今注曰章帝建初三年丹陽宛陵民掘地得}
