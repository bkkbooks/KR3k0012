  body:
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 七甲下兠鍪楯上甲下吴越春秋曰勾踐使大夫種於吴曰􅀼聞大王興大義誅彊救弱越使賤臣種以先人藏噐及甲二十領以賀君又曰公子光㐲甲士於􅀻室具酒而請王僚王僚乃􅀍棠夷之甲三重使兵衛至光家之門夾陛帶甲左右皆王僚之親戚也專諸置魚膓劒炙魚腹中而進之刺王僚貫逹背王僚立死獻帝春秋曰越􅀐挍尉伍孚以董卓無道欲身自殺之內貫小鎧拔佩刀詣卓卓送岀閤執手告别孚引刀刺卓卓多力却不中即殺孚夷其族董卓傳曰卓孫年七歳愛以爲己子爲作小鎧胄使􅀐駃音决騠音啼馬與玉甲一具俱出入以爲麟駒鳯鶵至殺人之子如蚤虱耳晉建武故事曰王敦死秘不發䘮賊於水南北渡攻官壘柵皆重鎧浴鐵都督應詹等岀精銳距之宋元嘉起居注曰御史中丞劉損奏前廣州刺史韋㓪於廣州所部作犀皮鎧}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_356-1b}
