  - {type: variant, offset: 4282, length: 4, content: 圍三載外, WYG: 犀角此古制也詩云貝胄朱綅謂以貝齒餙胄朱縷綴之也胄挿以翟尾垂以紅絮朱綅之象也晉令曰軍列營步騎士以下皆着兠鍪郭義恭廣志曰獠在䍧柯興古鬱林交趾蒼梧皆以朱漆皮為兠鍪家語曰孔子對魯哀公曰介胄執戈者}
