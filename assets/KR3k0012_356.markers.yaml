  - {type: variant, offset: 4308, length: 1, content: 隋, SBCK: 燕雀處帷幄虞喜志林曰宋􅀕酒云可以扞禦者爲械謂鎧甲兠鍪也抱朴子曰夫德教者黼黻􅀕服也刑罰者杆刄之甲胄也􅀂以德教治狡􅁀猶以黼黻禦剡音琰􅄡也以刑罰施平丗是以甲胄升廟堂也又曰忍痛苦之藥石者所以除伐命之疾嬰甲胄之重冷者所以扞鋒鏑之集又曰盤旋揖讓非禦寇之容摜甲纓胄非廟堂之飾曹植表曰兩當鎧二十領兠鍪自副鎧百領兠鍪自副陶侃荅温嶠}
