  - {type: variant, offset: 2155, length: 1162, content: 告于子旗子旗不信則數人告將往又數人告於道遂如陳氏桓子將出矣聞之而還聞子旗至遊服而逆之去戎備著常遊戲之服請命問桓子所至也對曰聞彊氏授甲將攻子子聞諸乎曰弗聞曰子盍亦授甲無宇請從無宅桓子名也又曰齊惠欒高氏皆嗜酒欒高二族皆出惠公也信內多怨疆於陳鮑氏而惡之夏有告陳桓子曰子旗子良將攻陳鮑氏遭子良醉而騁欲及子良醉故驅告鮑文子也遂見文子文子國鮑也則亦授甲矣使視二子二子子旗子良則皆將飲酒桓子曰彼雖不信彼傳言也聞我授甲則必逐我及其飲酒也先伐諸陳鮑方睦遂伐欒高氏欒施高強來奔又曰晉荀躒如周籍談為介王曰闕鞏之甲武所以剋啇也闕鞏國所出鎧唐叔受之以處參虛匡有戎狄又曰魯昭公伐季平子叔孫氏之司馬鬷戾言於其眾曰凡有季氏與無於我孰利皆曰無季氏是無叔孫氏也騣戾曰然則救諸帥徒以往陷西北隅以入陷公圍也公徒釋甲執冰而踞言無戰心也遂逐之逐公徒也公遜于齊又曰吳子光伏甲於窟室而享王僚掘地為室王使甲坐於道及其門坐道邊至光門門階戶席皆王親也又曰楚郄宛直而和國人說之令尹子常賄而譖郄宛焉謂子常曰子惡欲飲子酒子惡郄宛又謂子惡令尹欲酒於子氏無極曰令尹好甲兵子出之吾擇焉擇取以進子常取五甲五兵日寘諸門令尹至必觀之而從以酬之曰無極辭及饗曰惟諸門左張帷張兵甲其中也無極謂令尹曰吾幾禍子子惡將為子不利甲在門矣子必無往令尹使視郄氏則有甲焉不往遂令攻郄氏盡滅郄氏之族黨又曰齊伐晉夷儀東郭書讓登讓眾使後而己先登書與王猛息戰訖共止息也猛曰我先登書歛甲曰曩者之難今又難焉歛甲起欲擊猛猛笑曰吾從子如驂之靳靳車中馬也猛不敢與書爭言已從書爭言驂馬之相隨靳也又曰齊伐魯魯孟孺子泄帥右師孺子孟懿子之子武伯也顏羽御邴洩為右二子孟氏臣冉求帥左師管周御樊遟為右季氏之甲七千冉有以武城人三百為己徒卒老幼守宮次于雩門之外南城門也五右師從之及齊師戰于郊師獲甲首八十冉求所得齊人不能師又曰哀公會吳子伐齊甲戌戰于艾陵展如敗高子國子敗胥門巢王卒助之大敗齊師獲革車八百乘甲首三千以獻于公公以兵從故以勞公又曰吳王夫差敗越于夫椒遂入越越子以甲楯五千保于會稽又曰衛孔文子將攻大叔氏訪于仲尼仲尼曰胡簋之事則嘗聞之矣甲兵之事未之聞也退命駕而行又曰侯犯以郈叛武叔懿子圍郈弗克駟赤謂侯犯曰且盍多舍甲於子之門以備不虞侯犯曰諾乃命舍甲焉侯犯請易於齊齊有司觀郈將至駟赤使周走而呼曰齊師至矣郈人大駭介侯犯之門甲以圍侯犯又曰晉周綽射殖綽殖綽齊中大夫肩兩矢夾脰曰止將為三軍不止將取其衷乃弛弓而縛郭最皆𥘞甲面縛公羊曰成元年始作丘甲何以書譏何譏爾譏始丘使也何休一解曰四井為邑四邑為丘甲鎧也譏始使丘民作田鎧也周書曰年不登甲則纓縢宮室不容甲不以組也戰國策曰陘山之事趙且與秦伐齊齊王懼蘇代為齊獻書穰侯曰臣聞往來者之言曰秦且益起甲兵四萬人以伐齊臣竊必是之弊邑之王曰秦王明熟於計穰侯智而習於事必不益趙甲兵以伐齊也國語曰晉平公射鴳不死使豎衰搏之逸公怒枸將殺之叔向聞, SBCK: 遇}
