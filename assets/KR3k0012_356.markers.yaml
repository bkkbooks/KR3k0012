  - {type: variant, offset: 3510, length: 3, content: 今秋稼, WYG: 公孫瓉雖有過惡而明罪未正不若告使改行如不聽以武臨之瓉必悔禍謝罪所謂不戰而服人也虞以緒臨事沮議斬之以狥戒軍士曰無傷餘人殺一伯珪而}
