  - {type: variant, offset: 3514, length: 54, content: 熟復為漁陽所掠張豐狂勃奸黨日增連年拒守吏士疲勞甲冑生蟣虱弓弩不可施又曰曹操攻袁譚弟尚曰我鎧甲不精故前為曹操所, WYG: 虞遂大}
