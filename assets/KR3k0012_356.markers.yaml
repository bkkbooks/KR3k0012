  - {type: variant, offset: 1110, length: 183, content: 右提音峙彌明知之趨登曰臣侍宴過三爵非禮也遂扶以下公嗾夫獒焉明搏而殺之盾曰棄人用犬雖猛何為鬥且出提彌明死之又曰晉楚戰於邲楚王乘左廣以逐趙旃趙旃棄車而走林屈蕩搏之得其甲裳下曰裳也又曰齊晉陳於鞍齊頃公曰余姑剪滅此而朝食姑且翦盡不介馬而馳之介郄克傷於矢曰余病張侯曰擐甲執兵固即死也擐貫也即就也病未及死吾子勉之又曰使呂相絕秦曰文公躬擐甲冑跋履山川征東之諸侯虞夏啇周之胤而朝諸秦, SBCK: 元面如生}
