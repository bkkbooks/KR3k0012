  - {type: variant, offset: 3510, length: 19, content: 今秋稼已熟復為漁陽所掠張豐狂勃奸黨日增, SBCK: 遵爲將軍雖在軍旅心存王室不忘爼豆可謂守死善道者也乃贈將軍給侯印綬遣校尉發􅀐士四百人􅀍玄甲兠鍪兵車軍陣送葬又曰建武六年馬武與衆將上隴擊隗囂身􅀍甲兠鍪持㦸犇擊殺數十人囂追兵盡還武中矢傷又曰上征彭寵朱浮上䟽切諌曰}
