  - {type: punctuation, offset: 7, content: 《, id: KR3k0012_CHANT_356-bkkpn1}
  - {type: variant, offset: 7, length: 2, content: 釋名, SBCK: 用之則民爲之矣邾君曰善下令令官爲甲必以組公息忌知􅀃之行也因令其家皆爲組人有傷之者曰公息忌之所以欲用組者其家多爲組也邾君不􅀃於是乎止官無以組以用邾君有所尤也爲甲以組而便公息忌雖多爲組何損以組不便公息忌雖無爲組亦何益爲組與不爲組不足以累公息忌之􅀃用組之心不可不察又曰趙攻中山中山有多力者曰丘鳩衣鐵甲操杖擊無不碎衝無不䧟以車投車以人投人􅀃苑曰孔子之匡簡子殺陽虎孔子似之甲士以圍孔子之舎子路怒􅁬㦸將下􅋐孔子止之曰何仁義之不免俗也夫詩書之不習禮樂之不脩是吾之過也􅀂非陽虎而以爲陽虎則非丘之罪也夫由歌方和汝子路歌孔子和之三終而甲罷崔寔政論曰貪饕之吏􅔡納財用狡猾之工復盗竊之至以麻枲􅀍弓弩鐵焠醘中令脆易治鎧孔又􅄶小不足容入凢漢所以能制胡者徒􅃭鎧弩之利也今鎧則不堅弩則不勁永失所恃矣抱朴子曰屠犀爲甲給乎專征之服裂翆爲華集乎后妃之首雖出於幽谷迁于喬木然爲二物之計未􅀂棲竄於林薄攝生乎榛藪文選曰介胄􅀍霑汗又曰金練照海浦注練甲也又曰玄甲耀日陳林武庫賦}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_SBCK_356-3a}
