  - {type: variant, offset: 1421, length: 199, content: 于衡山使鄧廖帥組甲三百被練三千馬融曰組甲組為甲裏公族所服被練為裏甲者所服杜預曰組甲成組文被練練袍也以侵吳吳人要而擊之獲鄧廖其能免者組甲八十被練三百而已又曰宋災樂喜為司城以為政使皇鄖命校正出馬工正出車備甲兵庀武守又曰諸侯會柤遂伐偪陽狄彌建大車之輪而蒙之以甲以為櫓杜預曰狄彌魯人也蒙覆也櫓大楯也左執之右拔戟成一隊百人為隊又曰鄭子孔之為政也專國人患之乃討西宮之難尉止等昨難於西宮子孔知而不言子孔當罪以其甲, SBCK: ''}
