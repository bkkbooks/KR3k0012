  - {type: variant, offset: 3505, length: 2, content: 懷懼, SBCK: 瓉將出從事代郡程緒免胄而前曰公孫瓉雖有過惡而罪名未正明公不先告曉使得改行以武臨之瓉必悔禍謝罪所謂不戰而服人也虞以緒臨事沮議斬之以徇戒軍士曰無傷餘人殺一伯珪而巳虞遂大敗斬虞於薊市東觀漢記曰􅀕遵薨䘮至河南􅀶士范升}
