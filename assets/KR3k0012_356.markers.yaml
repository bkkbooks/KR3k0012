  - {type: variant, offset: 7, length: 2, content: 釋名, WYG: 用之則民為之矣邾君曰善下令令官為甲必以組公息忌知說之行也因令其家皆為組人有傷之者曰公息忌知所以欲用組者其家多為組也邾君不說於是乎止官無以組以用邾君有所尤也為甲以組而便公息忌雖多為組何損以組不便公息忌雖無為組亦何益為組與不為組不足以累公息忌之說用組之心不可不察又曰趙攻中山中山有多力者曰丘鳩衣鐵甲操杖擊無不碎衝無不䧟以車投車以人投人說苑曰孔子之匡簡子殺陽虎孔子似之甲士以圍孔子之舍子路怒奮㦸將下鬬孔子止之曰何仁義之不免俗也夫詩書之不習禮樂之不修是吾之過也若非陽虎而以為陽虎則非丘之罪也夫由歌方和汝子路歌孔子和之三終而甲罷崔寔政論曰貪饕之吏競納財用狡猾之工復盗竊之至以麻枲被弓弩鐵焠醯中令脆易治鎧孔又褊小不足容入凡漢所以能制胡者徒襦鎧弩之利也今鎧則不堅弩則不勁永失所恃矣抱朴子曰屠犀為甲給乎專政之服裂翠為華集乎后妃之首雖出於幽谷遷於喬木然為二物之計未若棲竄於林薄攝生乎榡藪文選曰介胄被霑汗又曰金練照海浦注練甲也又曰𤣥甲曜日陳林武庫賦}
