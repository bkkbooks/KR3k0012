  - {type: variant, offset: 309, length: 1, content: 冑, SBCK: 胄}
  - {type: variant, offset: 309, length: 510, content: 冑鄭玄曰甲鎧也有以前之謂他贄弊也櫜鎧衣也冑兜鍪也袒其衣出兜鍪以致命也又曰國家靡弊則車不彫幾甲不組縢食器不刻鏤君子不履絲履馬不常秣靡弊賦稅極也彫畫也幾附纏為圻鄂也組縢以組飾之也組以鎧飾也又曰賓牟賈侍坐於孔子言及武樂孔子曰武王克殷濟河而西車甲衅許靳切而藏之府庫而弗復用然後天下知武王不復用兵也又曰君子恥服其服而無其容恥有其容而無其辭恥有其辭而無其德是故君子端冕則有敬色甲冑則有不可辱之色言色稱其服也又曰儒有忠信以為甲冑禮義以為干櫓戴仁而行抱義而處雖有暴政不更其所自立有如此者甲鎧也干櫓者小大楯也周禮曰司甲下大夫二人中士八人甲令時鎧也司兵甲戈楯宮也又曰燕之無函也非無函也夫人而能為函也鄭玄曰言其丈夫人人皆能作是器不須國工也燕近強胡胡習作甲冑也又曰函人為甲犀甲七屬兕甲六屬合甲五屬屬讀如灌注之謂止旅下旅扎續之數也革堅者扎長鄭司農云合甲削革裏肉但取其裘合以為甲也犀甲壽百年兕甲壽二百年合甲壽三百鄭玄曰革堅者支久也凡為甲必先為容服者之形容鄭司農云容謂象式也然後制革裁扎之廣袤也權其上旅與其下旅而重若一鄭司農云上旅謂要以上也下旅謂要以下也以其長為之圍圍謂扎要廣厚凡甲鍜不摯則不堅已敝則撓鄭司農云鍛鍛革也贄謂質也鍜革太熟則革敝無強撓曲也, WYG: 胄}
