  - {type: variant, offset: 11, length: 3, content: 猶塏塏, SBCK: 則東胡闕鞏百錬精剛函師震推韋人製縫􅀇羽縹甲灼爚流光孔融寘刑論曰古聖作犀兕革鎧今盆領鐵鎧絶聖甚逺魏武軍䇿令曰􅀽夲􅀄鎧萬領吾大鎧二十領夲􅀄馬鎧三百具吾不能有十具見其少遂不施也吾遂出竒破之是時士卒精練不與今時等也曹植表曰先帝賜臣鎧黒光明光各一具兩當鎧一領環鏁鎧一領馬鎧一領今丗以昇平兵革無事乞悉以付鎧曹殷仲堪相王牋曰奉所賜馬鎧旣足以奬厲懦心又以光華逺任􅁃翼與燕王書曰今致􅃭鎧一領兠鍪一副又曰鄧百山昔送此犀皮兩當鎧一領雖不能精好復是異物故復致之李尤鎧銘曰甲鎧之施扞禦鋒矢尚其}
