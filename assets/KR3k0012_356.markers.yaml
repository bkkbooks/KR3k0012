  - {type: variant, offset: 1697, length: 457, content: 為崔子閉公也甲興公登臺而請弗許請自刃於廟弗許遂殺之又曰楚蒍掩為司馬子木使庀賦庀治數甲兵閱數也賦車籍馬籍䟽其毛色歲齒以備軍用賦車兵車兵甲士徒甲步卒甲楯之數使器仗有常數既成以授子木禮也又曰鄭伯有嗜酒為窟室而夜飲酒擊鍾焉子晢以駟氏之甲伐而焚之伯有奔雍梁雍梁鄭地聞子皮之甲不與攻已喜曰子皮與我矣晨自墓門之竇入駟帶率國人伐之伯有死於羊肆又曰諸侯將盟於宋西門之外楚人衷甲甲在衣中欲因會擊晉伯州犁固請釋甲子木曰晉楚無信久矣事利而已茍得志焉焉用有信太宰伯州犁也告人曰令尹將死矣為明年子木死又曰鄭徐吾犯之妹美公孫楚聘之楚子南也公孫黑又使強委禽焉禽鴈也紡綵用鴈子南戎服入左右射超乘而出女自房觀之曰抑子美夫言文夫適子南氏子晢怒既而橐甲以見子南欲殺之而取其妻子南擊之以戈晢傷而歸又曰楚靈王伏甲饗蔡靈侯醉而殺之刑其士七十人公子棄疾帥師圍蔡傳言楚無道也又曰齊子尾卒子旗欲治其室子旗欒施也欲并治子尾之家政殺梁嬰梁嬰子尾家宰而立子良氏之宰子良子尾之子高疆也子旗為子良立宰其臣曰孺子長矣孺子謂子良也而相吾室欲兼我也授甲將攻之桓子善於子尾亦授甲將助之, SBCK: ''}
