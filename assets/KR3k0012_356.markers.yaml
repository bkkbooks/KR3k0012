  - {type: variant, offset: 5, length: 0, content: '', krp: 領請免㓪官也鄴中記曰石季龍左右置直衛萬人皆五色細鎧光曜奪目伏侯古今注曰章帝建𥘉三年丹陽宛陵民掘地得}
  - {type: variant, offset: 6, length: 0, content: '', SBCK: 一述異記曰乹羅者慕容廆之十一丗祖也着金銀􅃭鎧乗白馬金銀鞍勒自天而墜鮮卑神之推爲君長家語曰孔子言於定公曰家不藏甲古之制也今三家過制請皆損之管子曰葛盧之山發而得黃金􅃖尤受之制以爲劒鎧言其始也孟子曰矢人豈不仁於函人哉矢人唯恐不傷人函人唯恐傷人巫匠亦然故術不可不慎也趙岐章句曰矢箭也函鎧也孫卿子曰楚人鮫革犀兕以爲甲堅如金石慎子曰藏甲之國必有兵道鹽鐵論曰強楚勁鄭有犀兕之甲吕氏春秋曰田賛􅀘衣而見荆王王曰先生之衣何其惡也賛曰衣又有惡於此者王曰可得而聞乎對曰甲惡於此王曰何謂也對曰甲冬日則寒夏日則暑衣無惡乎惡乎甲者賛也貧貧故衣惡今大王萬乗之主冨厚無敵而好衣民以甲臣弗得也意者爲其義也甲之事兵之事也刈人之頸刳人之腹墮人之城郭刑人之父子其名又甚不榮也吕氏春秋曰邾之故爲甲裳以帛以帛綴甲公息忌謂邾君曰不􅀂以組凡甲之所以爲固者以滿竅也今竅滿矣而任力者半組則不然竅滿則盡任力矣邾君以爲然曰將何所得組公息忌對曰}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_SBCK_356-2a}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_SBCK_356-2b}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 一述異記曰乾羅者慕容廆之十一世祖也著金銀襦鎧乗白馬金銀鞍勒自天而墜鮮卑神之推為君長家語曰孔子言於定公曰家不藏甲古之制也今三家過制請皆損之管子曰葛盧之山發而出黃金蚩尤受之制以為劒鎧言其始也孟子曰矢人豈不仁於函人哉矢人惟恐不傷人函人惟恐傷人巫匠亦然故術不可不慎也趙歧章句曰矢箭也函鎧也孫卿子曰楚人鮫革犀兕以為甲堅如金石慎子曰藏甲之國必有兵道鹽鐵論曰強楚勁鄭有犀兕之甲吕氏春秋曰田賛衣而見荆王曰先生之衣何其惡也賛曰衣又有惡於此者王曰可得聞乎對曰甲惡於此王曰何謂也對曰甲冬日則寒夏日則暑衣無惡乎甲者賛也貧貧故衣惡今大王萬乗之主富厚無敵而好衣民以甲臣弗得也意者為其義也甲之事兵之事也劉人之頸刳人之腹墮人之城郭刑人之父子其名又甚不榮也吕氏春秋曰邾之故為甲裳衣帛以帛綴甲公息忌謂邾君曰不若以組凡甲之所以為固者以滿竅也今竅滿矣而任力者半組則不然竅滿則盡任力矣邾君以為然曰將何所得組公息忌對曰}
