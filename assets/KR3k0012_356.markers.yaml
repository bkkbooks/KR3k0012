  - {type: variant, offset: 4367, length: 0, content: '', SBCK: 貝胄星離以貝飾之楯上釋名曰楯遯也跪其下避刄以隱遯也大而平者曰呉魁夲出於吴爲魁師者所持也隆者曰滇盾夲出於蜀蜀滇所持也或曰羗盾言出於羗也約脅而邹者曰䧟虜言可䧟破虜敵今謂之曰露是也狹而長者曰歩盾歩兵所持與刀相配者也狹而短者曰夾子盾車上所持者也子小稱也以䩼音逢編板者謂之木絡盾以犀皮作之曰犀盾以木作之曰木盾皆因所用爲名也許慎􅀃文曰楯音伐也所以杆音汗身蔽目象形聲也樐大楯也樐音魯楊雄方言曰楯自􅀜而東或謂之或謂之干干者杆也􅀜西謂之楯}
