  - {type: variant, offset: 1644, length: 4, content: 利劍投軀, krp: 西五百餘里古渠捜國也王姓昭武守阿􅃮都城方四里勝兵數千人王坐金羊床妻戴金花俗多朱沙金䥫東去踈勒千里大業中遣使貢方物色知顯北史曰色知顯國都色知顯城在􅊖万斤西北去代一}
