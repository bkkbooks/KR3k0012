  - {type: variant, offset: 1741, length: 0, content: '', SBCK: 十里周武天和二年其王遣使來獻乙弗獻通典曰乙弗獻後魏時聞焉在吐谷渾國有屈海周廻千餘里衆有萬落風俗與吐谷渾同然不識五榖唯食魚與蘇子狀􅀂中國苟􅂎子或赤或黒西有契翰一部風俗亦同土特多狼伏盧尼北史曰伏盧尼都伏盧尼城在波斯國北去代二萬七千三百二十里累石爲城東有大河南流中有鳥其形似人亦有如橐駞鳥者皆有翼常居水中出水便死城北有云尼山出銀􅃢瑚琥魄多師子石國隋書曰石國居藥殺水都城方十餘里其王姓石名泥國城之東南立屋置座於中正月六日七月十五日以王父母燒餘之骨金甕盛之置于牀上廵遶而行散以花香􅄂菓王率臣下設􅀕焉禮終王與夫人岀就別帳臣下以次列坐享宴而罷有粟夌多良馬其俗善戰曽貳於突厥射匱可汗興兵㓕之令特勒甸職攝其國事大業五年遣使朝貢其後不復至宕昌通典曰宕昌􅏔後魏時興焉亦三苗之嗣與先零燒當罕开諸部姓別自立師皆有地分不相統攝宕昌即其一也俗皆土著居有棟宇其屋織􅈊牛及羖羊毛覆之無法令徭賦唯征伐之時乃相屯聚不然則各事生業不相來徃皆衣裘􅄄牧飬􅈊牛羊豕以供其食俗有蒸報無文字但取木榮落以記歳時三年一相聚殺牛羊以􅀕天俗重虎皮以之送死有梁勤者代爲酋帥得羗毫心乃自稱王其界自仇池以西}
