  - {type: variant, offset: 269, length: 134, content: 降匈奴帝既悔於征伐而搜粟都尉桑弘羊與丞相御史奏言故輪臺以東捷枝渠梨皆故國也輪臺渠地名今在交河北庭界廣饒水草有溉田五千頃以上處溫和田美可益通溝渠種五穀與中國同時熟田一歲有積穀募人壯健有累重敢徙者詣田所累重謂妻子家屬也就畜積為本業墾溉田稍築列亭連城西以威西關帝深陳既往之悔, WYG: ''}
