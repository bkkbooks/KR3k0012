  - {type: variant, offset: 149, length: 0, content: '', WYG: 章帝章和元年安息王遣使獻獅子符㧞形似麟無角也北史曰周武天和二年其王遣使朝獻大月氐漢書曰大月氐國治監氏城去長安萬一千六百里物類民俗與安息同出一封橐駝師古曰脊上有一封也控弦十餘萬故強輕匈奴師古曰恃其強盛而輕易匈奴也至冒頓單于攻破月氐以其王頭為飲器月氐乃逺去過大宛}
  - {type: page-break, offset: 149, content: '', id: KR3k0012_WYG_793-4a, image: WYG0900/WYG0900-0052c.png}
  - {type: variant, offset: 149, length: 0, content: '', krp: 罽賔國王治脩鮮城去長安萬二千二百里地平温和有目蓿雜草花木檀櫰梓竹􅃮種五榖蒲陶有金銀銅錫以金銀爲錢文爲騎馬幕爲人面師古曰幕即漫也出封牛水牛象大狗沐猴孔爵珠璣珊瑚虎珀璧琉瑠自武帝始通唐書曰貞觀十六年罽賔國遣使献褥特䑕啄尖而尾赤能食蛇有𬒳蛇螫者䑕輙嗅而尿之其瘡即愈條支漢書曰條支國臨}
  - {type: variant, offset: 150, length: 1, content: 域, SBCK: 海暑濕田冝稲有大鳥􅆑如甕後漢書曰條支國城在山上周廽四十餘里臨西海水曲環其南及東北三靣路絶唯西北隅通陸出師子犀牛安息漢書曰安息國王治番兠城去長安萬一千六百里風氣物􅀋與􅄢賔同亦}
  - {type: variant, offset: 150, length: 1, content: 域, WYG: 擊大夏而城之北史曰大月氐北與蠕蠕接數為所侵遂西徙都薄羅城其王寄多羅勇武遂興師越大山南侵北天竺自乾陁羅}
  - {type: variant, offset: 150, length: 1, content: 域, krp: 海暑濕田冝稲有大鳥卵如甕後漢書曰條支國城在山上周廽四十餘里臨西海水曲環其南及東北三靣路絶唯西北隅通陸出師子犀牛安息漢書曰安息國王治番兠城去長安萬一千六百里風氣物類與罽賔同亦}
  - {type: variant, offset: 152, length: 1, content: 孝, SBCK: 銀爲錢文獨爲王靣幕爲夫人面王死輙更鑄錢有大馬大爵其属小大數百城方數千里最大國邑臨嬀水商賈車舩行旁國􅀞革旁行爲書記師古日今西方胡國書皆横行不直下也武帝始遣使至安息王令將將二萬􅀐迎於東界東界至王都數千里行北過數十城民人相属因發使隨漢使者來觀漢地以大鳥及􅆑來獻天子大恱後漢書曰章帝章和元年安息王遣使獻師子符㧞符㧞形似麟無角也北史曰周武天和二年其王遣使朝獻大月氏漢書曰大月氏國治􅁥氏城去長安萬一千六百里物􅀋民俗與安息同岀一封橐馳師古曰脊上出一封也控弦十餘万故強輕匈奴師古曰侍其強盛而輕易匈奴也至冒頓單于攻破月氏以其王頭爲飲器月氏乃逺去過大宛西擊大夏而臣之北史曰大月氏北與蠕蠕接數爲所侵遂西徒都薄羅城其王􅀉多羅勇武遂興師越太山南侵北天竺自乾陁羅以北五國盡属之後魏太}
  - {type: page-break, offset: 152, content: '', id: KR3k0012_SBCK_793-2a}
