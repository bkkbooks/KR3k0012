  - {type: variant, offset: 1205, length: 1, content: 和, SBCK: 貞觀九年遣使貢師子太宗嘉其逺至命袐書監虞丗南爲之賦自此朝貢至十一年又獻金桃銀桃詔令植之於苑囿又曰萬歳通天年中則天封其大首領篤婆鉢提爲康國王仍拜左驍衛將軍又曰開元六年遣使貢獻鏁子甲水精盃馬腦鉼駞鳥夘之􅀋副貨北史曰副貨國去代一萬七千里東至阿冨使且國西至没誰國中間相去一千里南有連山不知名北至竒沙國相去一千五百里國中有副貨城周匝七十里冝五榖蒲桃唯有馬駞騾國王有黄金殿殿下有金駞七頭各髙三尺其王遣使朝貢安國隋書曰安國漢時安息國也王姓昭武氏與康國王同族字設力登妻康國王女也都在郍密水南城有五里環以流水宫殿皆爲平頭王坐金駞座髙七八尺毎聽政與妻相對大臣三人評理國事風俗同於康國唯妻子姊妹及母子逓相禽獸此爲異也煬}
