  - {type: variant, offset: 1840, length: 524, content: 出陽關自近者始曰婼羗國王號去胡來王去陽關千八百里去長安六千三百里西接且末隨畜逐水草不田作仰鄯善且末穀山有鐵自作兵有弓矛服刀劍劉德曰服刀拍髀也師古曰指音貊髀音俾又音陛鄯善漢書曰鄯善國本名樓蘭王治杆泥城杆音烏輔國侯卻胡侯鄯善都尉擊車師都尉左右且渠擊車師君各一人譯長二人又曰鄯善地沙鹵少田寄田仰穀旁國國出玉多葭葦檉柳胡桐白草孟康曰白草草之白者也胡桐似桑而多曲師古曰胡桐淚可以汗金銀今工匠皆用之民隨畜牧逐水草有驢馬多橐佗師古曰佗古他字也又曰武帝遣從票侯趙破奴將屬國騎及郡兵數万擊姑師虜樓蘭王破如師於是漢列亭鄣至玉門矣又曰樓蘭國最在東垂近漢當白龍堆乏水草常主發導負水擔糧送迎漢使又曰元鳳四年大將軍霍光白遣平樂監傳介子往刺其王介子輕將勇敢士齎金幣楊言以賜外國為名既至樓蘭詐其王欲賜之王喜與介子飲醉將其王屏語壯士二人從後刺殺之貴人左右皆散走介子告諭以王負漢罪天子遣我誅王當更立王弟尉屠耆在漢者漢兵方至毋敢動自令滅國矣介子遂斬王嘗歸首嘗歸者其王名也馳傳詣闕懸首北闕下封介子為義陽侯乃立尉屠耆為王更名其國為鄯善為刻印章賜以宮女為夫人備車騎輜重丞相將軍百官送至橫門外橫音光祖而遣之北史曰鄯城方一里地多沙鹵少水草北即白龍堆路後魏孝文太和四年遣其弟素延耆入侍于闐漢書曰于闐, WYG: 踈勒}
