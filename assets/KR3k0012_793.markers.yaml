  - {type: variant, offset: 1649, length: 1, content: 死, krp: 二千九百四十里土平多五菓伽色尼北史曰伽色國都伽色尼城在悉萬南去代一萬二千五百里土出塩多五菓白蘭通典曰白蘭羗之别種後周時興焉東北接吐谷渾風俗物産與宕昌同周武帝保定元年朝獻使至乹陁北史曰乹陁國在鳥萇西本名業波爲嚈噠所破因改焉好征戰與罽賔鬪三年不罷人怨苦之有鬪象七百頭十人乗一象皆執兵仗象鼻縛刀以戰所都城東南七里有佛塔髙七十丈周三百歩即所謂雀離佛圖也史國隋書曰史國都獨莫水南十里舊康居}
