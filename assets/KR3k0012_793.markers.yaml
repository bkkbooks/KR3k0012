  - {type: variant, offset: 1867, length: 1, content: 六, SBCK: 帝義熈􅀄遣使獻玉佛像像髙四尺二寸玉色㓗潤形制殊特殆非人功歷晉宋代在建康瓦官寺又曰宋文帝元嘉五年其王刹利摩訶南遣使貢獻梁武帝大通元年後王迦葉伽羅訶犁耶亦使使貢獻穆國北史曰穆國都鳥滸河之西亦安息之故地與鳥郍曷爲隣其王姓昭武亦康國王之種􅀋也字阿濫密都城方三里勝兵二}
