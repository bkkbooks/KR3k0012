  - {type: variant, offset: 1661, length: 75, content: 尚來遠之名臣徇輕生之節是知上之所好下必有甚焉者也煬帝規摹宏侈掩吞漢外裴矩方進西域圖記以蕩其心故萬乘親出玉門關置伊吾且末郡而關右暨於流沙騷然無聊生矣古哲, SBCK: 姓昭武康國}
