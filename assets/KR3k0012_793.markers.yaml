  - {type: variant, offset: 2722, length: 0, content: '', WYG: 多朱沙金鐵東去䟽勒千里大業中遣使貢方物色知顯北史曰色知顯國都色知顯城在悉萬斤西方北去代一萬二千九百四十里地平多五菓伽色尼北史曰伽色尼國都伽色尼城在悉萬斤南去代一萬二千五百里土出塩多五菓白蘭通典曰白蘭羗之别種後周時興焉東北接吐谷渾風俗物産與宕昌同周武帝保定元年朝獻使至乾陁北史曰乾陁國在烏萇西本名業波為嚈噠所破因改焉好征戰與罽賔闘三年不罷人怨苦之有闘象七百頭十人乗一象皆執兵仗象鼻縛刀以戰所都城東南七里有佛塔高七十丈周三百歩即所謂雀離佛圖也史國隋書曰史國都獨莫水南十里舊康居之地也}
