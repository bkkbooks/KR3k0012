  - {type: variant, offset: 404, length: 300, content: 下詔曰前有司奏欲益人賦三十助邊用每口取錢三十是重困老弱孤獨也由是不復出軍而封丞相車千秋為富民侯以明休息思富養人也後漢書曰西羗之本出自三苗蓋羗姓之別其國近南嶽及舜流四凶徙之三危河關之西南羗地是也濱於賜支至於河首綿地千里賜支者禹貢所謂析支者也南接蜀漢所居無常依隨水草地少五穀以產牧為業其俗人民氏族無定或以父名母姓為種號三二世後相與婚姻父沒則妻後母兄亡則納嫠嫂寡嫂曰嫠故國無鰥寡種類繁熾不立君臣無相長一強則分種為角酋豪弱則為附落更相抄暴以力為雄殺人償死無他禁令其兵長在山谷短於平地不能持久而果於觸突以戰死為吉利病終為不祥甚耐寒苦同之禽獸雖婦人產子亦不避風雪性堅固勇猛得西方金行之氣焉王政修則賓服德教失則寇亂, WYG: 還}
