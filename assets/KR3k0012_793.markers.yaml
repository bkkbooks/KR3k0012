  - {type: variant, offset: 1738, length: 1, content: 制, SBCK: 支庻字閉拙都城}
  - {type: variant, offset: 1738, length: 0, content: '', krp: 支庻也都城方二里勝兵千餘俗同康國北去康國二百四十里南去吐火羅五百里大業中遣使朝貢師子通典曰師子國東晉時通焉天笁旁國也西海之中延袤二千餘里多出竒寳其地和適無冬夏之異五榖隨人所種不湏時節其國舊無人止有鬼神有龍居之諸國啇估來共市易鬼不見其形但岀珎寳明其所堪價啇人依價取之諸國人聞其土樂因此􅔡至或有停住者遂成大國能馴飬師子遂以爲名風俗與婆羅門同而尤事佛法安帝義熈𥘉遣使獻玉佛像像髙四尺二寸玉色㓗潤形}
