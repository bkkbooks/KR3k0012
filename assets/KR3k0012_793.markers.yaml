  - {type: variant, offset: 1626, length: 2, content: 鑿空, krp: 曰臣在大夏時見笻竹杖蜀布問曰安得此大夏國人曰吾賈人徃市之身毒身毒國在大夏東南可數千里米國隋書曰米國都郍蜜水西舊康居之地也無王其城主姓昭武康國王之支庻字閉拙都城方二百里勝兵數百人西北去康居百里大業中頻貢方物鄧至通典曰鄧至羗之別種也後魏時與焉有像舒者代爲白水酋帥因地名爲號稱至王其地自千亭以東平武以西汶嶺以北宕昌以南風土習俗與宕昌同自舒理至十代孫舒彭附後魏孝文帝封甘松縣子鄧爲王西魏恭帝𥘉其主檐術因亂來奔周文帝遣兵送還自後無聞安息北史曰安息國在葱嶺之西都蔚捜城西與波斯相接東去長安一萬七百五十里周武天和二年其王遣使來獻乙弗獻通典曰乙弗獻後魏時聞焉在吐谷渾國有屈海周廻千餘里衆有萬落風俗與吐谷渾同然不識五榖唯食魚與蘇子狀若中國苟𣏌子或赤或黒西有契翰一部風俗亦同土特多狼伏盧尼北史曰伏盧尼都伏盧尼城在波斯國北去代二萬七千三百二十里累石爲城東有大河南流中有鳥其形似人亦有如橐駞鳥者皆有翼常居水中出水便死城北有云尼山出銀珊瑚琥魄多師子石國隋書曰石國居藥殺水都城方十餘里其王姓石名泥國城之東南立屋置座}
  - {type: variant, offset: 1629, length: 5, content: 前班超投筆, krp: 中正月六日七月十五日以王父母燒餘之骨金甕盛之置于牀上廵遶而行散以花香雜菓王率臣下設祭焉禮終王與夫人岀就別帳臣下以次列坐享宴而罷有粟夌多良馬其俗善戰曽貳於突厥射匱可汗興兵㓕之令特勒甸職攝其國事大業五年遣使朝貢其後不復至宕昌通典曰宕昌差後魏時興焉亦三苗之嗣與先零燒當罕开諸部姓別自立師皆有地分不相統攝宕昌即其一也俗皆土著居有棟宇其屋織氂牛及羖羊毛覆之無法令徭賦唯征伐之時乃相屯聚不然則各事生業不相來徃皆衣裘褐牧飬氂牛羊豕以供其食俗有蒸報無文字但取木榮落以記歳時三年一相聚殺牛羊以祭天俗重虎皮以之送死有梁勤者代爲酋帥得羗毫心乃自稱王其界自仇池以西千里席水以南北八百里地多山阜部衆二萬餘落至其孫弥忽如遣使}
  - {type: punctuation, offset: 1630, content: ，, id: KR3k0012_CHANT_793-bkkpn444}
