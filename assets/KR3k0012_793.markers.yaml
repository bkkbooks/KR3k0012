  - {type: variant, offset: 2411, length: 9, content: 于闐去洛陽万一千七, WYG: 耿㳟為戊巳校尉引衆入踈勒城中乏水穿井十五丈不得水恭整衣服向井拜飛泉湧出賊遂退異物志曰踈勒國高宗末其王遣使送釋迦佛袈裟長二丈五尺有餘髙宗以審是佛衣應有靈異遂燒之以騐虛實置於猛火之上經日不燃觀者莫不悚駭心懼後每使朝貢隋書曰踈勒國都白山南}
