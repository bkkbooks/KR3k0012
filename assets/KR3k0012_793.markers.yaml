  - {type: variant, offset: 2705, length: 0, content: '', WYG: 後不復至宕昌通典曰宕昌羌後魏時興焉亦三苖之次嗣與先零燒當罕开諸部姓别自立帥皆有地分不相統攝宕昌即其一也俗皆土著居有棟宇其屋織􅈊牛及羖羊毛覆之无法令徭賦唯征伐之時乃相屯聚不然則各事生業不相來徃皆衣裘褐牧養􅈊牛羊豕以供其食俗有蒸報无文字但取木榮落以記嵗時三年一相聚殺牛羊以祭天俗重虎皮以之送死有梁勤者代為酋帥得羌豪心乃自稱王其界自仇池以西千里席水以南南北八百里地多山阜部衆二萬餘落至其孫彌忽始遣使於後魏太武帝拜為宕昌王七葉孫彌秦皆受南北兩朝封爵後見兩魏分隔永熈末種人企定乃引吐谷渾冦金城後企定冦石門後周武帝天和中詔大將軍田𢎞討平之以其地為宕州鏺汗隋書曰鏺汗國都葱嶺之西五百餘里古渠捜國也}
