  - {type: variant, offset: 2748, length: 1927, content: 年王遣使獻娑羅婆步鄣十八年又獻瑠琉甖唐書曰其國出美玉王姓尉遲名屋密貞觀六年遣使獻玉帶太宗優詔荅之大秦後漢書曰大秦國一名黎鞬在海西地方數千里以石為城郭列置郵亭堊塈之又曰民俗力田蠶桑皆髡頭而衣文繡乘輜軿白蓋小車出入擊鼓建旌旗幡幟又曰王宮室皆以水精為柱食器亦然又曰其人民皆長大平正有類中國故謂之大秦國多金銀奇寶有夜光璧明月珠駭雞犀珊瑚虎魄琉璃瑯玕織成金縷罽雜色綾作黃金塗火浣布又曰合會諸香煎其汁以為蘇合以金銀為錢銀錢十當金錢一又曰桓帝延熹九年大秦王安敦遣使自日南徼外獻象牙犀角瑇瑁始一通焉又曰其國無盜賊而道多猛獸師子遮害行旅不百餘人齎兵器輒為所食又有飛橋數百里可度海魏略曰其國中山出九色次玉石一曰青二曰赤三曰黃四曰白五曰黑六曰綠七曰紫八曰紅九曰紺多神龜朱鬣馬玄熊赤白黑黃青綠紺縹紅紫十種瑠璃通典曰國之西南漲海中可七八百里行到珊瑚淵水底有盤石珊瑚生其上大秦人常乘大舶載鐵網令工沒先入視之可下網乃下初生白而漸漸似園生茅中歷歲許出網目間變作黃色枝條交錯高極三四尺大者圍尺餘三年色乃赤好後沒視之知可採便以鐵鈔發其根乃以索繫網使人於舶上絞車舉去還國理載恣意所作若失時不舉便蠹敗龜茲北史曰龜茲國在尉犁西北白山之南一百七十里王姓白即後涼呂光所立白震之後其王頭繫綵帶垂之於後坐金師子床又曰出細氈饒銅鐵鈆麋皮氍毹沙鹽綠雌黃胡粉安息香等又曰其國北大山中有如膏者流出成川行數里入地狀如醍醐服之髮齒已落者能令更生癘人服之皆愈唐書曰龜茲有城郭男女皆剪髮垂與項齊唯王不剪髮以錦蒙頂著錦袍金寶帶坐金師子床有良馬封牛饒蒲萄酒又曰貞觀四年遣使來獻馬太宗賜以璽書撫慰甚厚自此朝貢不絕又曰貞觀二十年太宗遣左驍衛大將軍阿史郍杜爾安西都護郭孝恪率五將軍發鐵勒十三部兵以伐龜茲禽其王及大將羯獵顛等并破其大城五所虜男女數萬口勒石紀功而旋俘其王訶黎布失畢及郍利羯獵顛等獻於社廟尋以訶黎布失畢為左武翊衛中郎將郍利以下授官各有差又曰先是太宗既破龜茲移置安西都護府於其國城以郭孝恪為都護兼統于闐踈勒碎葉謂之四鎮高宗嗣位不欲廣地勞人復命有司棄龜茲等四鎮移安西依舊西州又曰長壽元年武威軍惣管王孝傑阿史郍忠節大破吐蕃克復龜茲于闐等四鎮自此復於龜茲置安西都護府用漢兵三萬人以鎮之則天時有田楊名中宗時有郭元振開元初則張孝嵩杜暹等為安西都護皆有政績為夷人所伏天笁後漢書曰天竺國一名身毒在月氏東南數千里卑濕暑熱其國臨大水乘象而戰脩浮圖道不殺伐遂以成俗出象犀瑇瑁金銀諸香石密黑鹽等又曰明帝夢見金人長大項有光明以問群臣或曰西方有神名曰佛其形長丈六尺而黃金色帝於是遣使天竺問佛道法遂行於中國圖畫形象焉南史曰梁天監初王來貢獻王有螺髻於頂餘剪之穿耳垂璫俗多徒跣衣重白色有文字或善天文筭曆之術其人皆學悉曇章書於貝多葉樹之北史曰天竺國去代三萬一千五百里有伏醜城周匝十里城中出摩尼珠珊瑚城東三百里有拔賴城城中出黃金白真檀赤檀石蜜唐書曰中天竺其都城周回七十餘里北臨禪連河云昔有婆羅門領徒千人隸業於樹下樹神降之遂為夫婦宮室自然而立僮僕甚盛於是使役百神築城以統之經日而就此後有阿育王頗行苛政置炮烙之刑謂之地獄今城中見有跡焉又曰武德中其國大亂其嗣王尸羅逸多練兵聚眾所向無敵象不解鞍人不釋甲居六載而四天竺之君皆北面以臣之威勢遠振政刑甚肅貞觀十五年尸羅逸多自稱摩伽陁王遣使朝貢太宗降璽書慰問尸羅逸多大驚問諸國人曰自古曾有摩訶振且使人至吾國乎皆曰未之有也乃膜拜而受詔書因遣使朝貢太宗以其地遠禮之甚厚復遣衛尉丞李義表報使尸羅逸多遣大臣郊迎傾都邑以縱觀焚香夾道逸多率其臣下東面拜受勑書復遣使獻大珠及鬱金香菩提樹又曰貞觀十年沙門玄奘至其國將梵本經論六百餘部而歸先是遣右率府長史王玄策往使天笁其四天笁王咸遣使朝貢會中天竺王尸羅逸多死國中大亂其弟阿羅郍順篡立乃盡發胡兵以拒玄策玄策戰不敵乃拔身宵遁走至吐蕃發精銳一千二百人并埿婆羅國七千餘騎以從玄策與副使蔣師仁率二國兵進至中天笁國城連戰三日大破之斬首三千餘級赴水溺死者且萬人阿羅郍順棄城而遁師仁進兵擒獲之虜男女萬二千人牛馬三萬餘頭疋於是天笁震懼俘阿羅郍順以歸二十二年至京師太宗大悅命有司告宗廟因謂群臣曰夫人耳目玩於聲色口鼻躭於臭味此乃敗德之源若婆羅門不劫掠我使人豈為俘虜邪昔中山以貪寶取弊蜀侯以金牛致滅莫不由之拜玄策朝散大夫是時就其國得方士郍羅邇婆寐自言壽二百歲云有長生之術太宗深加禮待館之於金颷門內造延年之藥令兵部尚書崔敦禮監主之發使天下採諸奇藥藥成竟服不效後放還本國又曰關元八年南天竺國遣使獻五色能言鸚鵡異物志曰天竺大國也方三萬里佛道所在其國王治城郭宮殿皆彫文刻縷鍾鼓音樂跳丸躍劍通典曰後魏宣武時南天竺國遣使獻駿馬云其國出師子𤟤𤟤胡昆切有火齊如云母而色紫列之則薄如蟬翼積之則如紗縠之重呇有金剛似紫石英百鍊不銷可以攻玉, SBCK: ''}
