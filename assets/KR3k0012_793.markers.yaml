  - {type: variant, offset: 1636, length: 2, content: 或結, krp: 魏太武帝拜爲宕昌王七葉孫弥秦皆授南北兩朝封爵後見兩魏分隔永熈末種人企定乃引吐谷渾㓂金城後企定㓂石門戍周武帝天和中詔大將軍田恒討平}
  - {type: variant, offset: 1639, length: 11, content: 重寶或攝之利劍投軀萬死, SBCK: 身毒身毒國在大夏東南可數千里米國隋書曰米國都郍蜜水西舊康居}
  - {type: variant, offset: 1639, length: 4, content: 重寶或攝, krp: 以其地爲宕州鏺汗鏺音普喝切隋書曰鏺汙國都葱嶺}
