  - {type: variant, offset: 2485, length: 2, content: 于闐, WYG: 副貨國去代一萬七千里東至阿副使且國西至沒誰國中間相去一千里南有連山不知名北至竒沙國相去一千五百里國中有副貨城周匝七十里宜五糓蒲桃唯有馬駞騾國王有黄金殿殿下有金駞七頭各高三尺其王遣使朝貢安國隋書曰安國漢時安息國也王姓昭武氏與康國王同族字設力登妻康國王女也都在郍宻水南城有五里環以流水宫殿皆為平頭王坐金駞座高七八尺每聼政與妻相對大臣三人評理國事風俗同於康國唯妻子姊妹及母子逓相禽獸此為異也煬帝即位之後遣司𨽻從事杜行滿使於西域至其國得五色塩而反西百餘里有畢國可千餘家其國無君長安國統之大業五年遣使貢獻後遂絶焉烏萇北史曰烏萇國在賖彌南北有葱嶺南至天竺婆羅門胡為其上族婆羅門多解天文吉凶之數其王動則訪决焉土多林菓引水灌田豐稻麥事佛多諸寺塔寺極華麗人有爭訴服之以藥曲者發狂直者無恙為法不殺犯死罪唯徙於林山西南有檀特山山上立寺以驢數頭運食山下无人控御自知徃來烏郍曷隋書曰烏郍曷國都烏滸水西舊安息之地王姓昭武亦康國種類字佛食都城方二里勝兵數百人王坐金羊座東北去安國四百里西北去穆國二百餘里東去𤓰州七千五百里大業中遣使貢方物渇槃陁北史曰渇槃陁國在葱嶺東朱駒婆西河經其國東北流在高山夏積霜雪亦事佛道附於嚈達通典曰渇槃陁後魏時通焉亦名漢陁國亦名渇陁國理葱嶺中在朱俱婆國西至䕶宻國北至踈勒國其王本踈勒人累代相承居此國有户二千餘有懸度山在在國南四百里懸度者山名也谿谷不通以䋲索相引而度其間四百里中徃徃有棧道因以為名今按懸度葱嶺邐迤相屬郵置所絶道阻且長故行人由之莫能分别然法顯宋雲所經即懸度山也又有頭痛山在國西南向罽賔歴大頭痛小頭痛之山赤土身熱之坂宋膺異物志曰大頭痛小頭痛山皆渠捜之東踈勒之西經之者身熱頭痛夏不可行行則至死惟冬可行尚嘔吐山有毒藥氣之所為冬乃枯歇故可行也鉢和北史曰鉢和國在渇槃陀西其土尤寒人畜同居穴地而處又曰大雪山望若銀峰其人惟食餅麵飲麥酒服氊裘有二道一道西南向嚈噠一道西南趨烏萇亦為嚈噠所屬大夏史記曰大夏在宛西南二千餘里媯水南其俗土著有城屋與大宛同俗無大君徃徃城邑寡小其兵弱畏善賈及大月氐西徙皆臣畜大夏人可萬餘其都曰藍市城有市販賣諸物東南有身毒國張騫曰臣在大夏時見笻竹杖蜀布問曰安得此大夏國人曰吾賈人徃市之身毒身毒國在大夏東南可數千里米國隋書曰米國都郍宻水西舊康居之地也無王其城主姓昭武康國王之支庶字閉拙都城方二里勝兵數百人西北去康居百里大業中頻貢方物鄧至通典曰鄧至羗之别種也後魏時通焉有像舒理者代為水酋帥因地名為號稱鄧至王其地自干亭以東平武以西汶嶺以北宕昌以南風土習俗與宕昌同魏㳟帝初其主檐術因亂來奔周文帝遣兵送還自後旡聞安息北史曰安息}
