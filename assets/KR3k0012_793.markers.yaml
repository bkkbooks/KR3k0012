  - {type: variant, offset: 2694, length: 0, content: '', WYG: 乙弗敵通典曰乙弗敵後魏時聞焉在吐谷渾北國有屈海週廻千餘里衆有萬落風俗與吐谷渾同然不識五糓唯食魚與蘓子蘓子狀若中國枸杞子或赤或黒西有契翰一部風俗亦同土特多狼伏盧尼北史曰伏盧尼都伏盧尼城在波斯國北去代二萬七千三百二十里累石為城東有大河流中有鳥其形似人亦有如橐駞馬者皆有翼常居水中出水便死城北有云尼山出銀珊瑚琉璃琥珀多獅子石國隋書曰石國居藥殺水都城方十餘里其王姓石}
