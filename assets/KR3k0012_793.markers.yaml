  - {type: variant, offset: 2497, length: 185, content: 所都城方八九里城東三十里有首拔河中出玉石土宜五穀并桑麻山多美玉有好馬駞騾其刑法殺人者死也又曰于闐俗重佛法寺塔僧尼甚眾王尤信尚每設齋日必親自灑掃饋食焉城南五十里有贊摩寺即昔羅漢比丘盧旃為其王造覆瓮浮圖之所石上有辟支佛跣處雙跡猶存西有比摩寺云是老子化胡成佛之所又曰于闐城東二十里有大水北流號樹枝水即黃河也又曰後魏文獻末蠕蠕冠于闐于闐患之遣使素目伽上表求救帝詔以遐阻不行又曰後, WYG: ''}
