  - {type: variant, offset: 464, length: 586, content: 西羗之本出自三苗蓋羗姓之別其國近南嶽及舜流四凶徙之三危河關之西南羗地是也濱於賜支至於河首綿地千里賜支者禹貢所謂析支者也南接蜀漢所居無常依隨水草地少五穀以產牧為業其俗人民氏族無定或以父名母姓為種號三二世後相與婚姻父沒則妻後母兄亡則納嫠嫂寡嫂曰嫠故國無鰥寡種類繁熾不立君臣無相長一強則分種為角酋豪弱則為附落更相抄暴以力為雄殺人償死無他禁令其兵長在山谷短於平地不能持久而果於觸突以戰死為吉利病終為不祥甚耐寒苦同之禽獸雖婦人產子亦不避風雪性堅固勇猛得西方金行之氣焉王政修則賓服德教失則寇亂又曰昔夏后氏太康失國四夷背叛及后相即位乃征畎夷七年然後來賓又曰武乙暴虐犬戎寇邊周古公踰梁山而遊于歧下及子季歷遂伐西落鬼戎又曰文王為西伯西有昆夷之患北有獫狁之難遂攘戎狄西戎之國莫不賓服又曰穆王時戎狄不貢王乃西征犬戎獲其五王又得四白鹿四白狼王遂遷戎于太原又曰平王之末自隴山以東及乎伊洛往往有戎於是渭有狄獂獂音花邽冀之戎涇北有義渠之戎洛川有大荔之戎渭南有驪戎伊洛間有楊拒泉皋之戎潁川以西有蠻氏之戎又曰晉文公欲修霸業乃賂戎狄通道以扶王室秦穆公得戎人由余遂霸西戎開地千里又曰陸渾之戎叛晉晉令荀吳滅之楚執蠻氏而盡囚其民又曰周貞王八年秦厲公滅大荔取其地趙亦滅代戎代戎即地戎也韓魏復共稍并伊洛陰戎滅之其遺脫者皆逃奔西踰汧隴自是中國無戎寇後漢書曰武帝時西域內屬有三十六國漢為置使者校尉領護之宣帝改曰都護元帝又置, SBCK: 耿恭爲}
