  - {type: variant, offset: 1739, length: 0, content: '', krp: 殊特殆非人功歷晉宋代在建康瓦官寺又曰宋文帝元嘉五年其王刹利摩訶南遣使貢獻梁武帝大通元年後王迦葉伽羅訶犁耶亦使使貢獻穆國北史曰穆國都鳥滸河之西亦安息之故地與鳥郍曷爲隣其王姓昭武亦康國王之種類也字阿濫密都城}
  - {type: variant, offset: 1740, length: 0, content: '', SBCK: 二百里勝兵數百人西北去康居百里大業中頻貢方物鄧至通典曰鄧至羗之別種也後魏時與焉有像舒者代爲白水酋帥因地名爲號稱至王其地自千亭以東平武以西汶嶺以北宕昌以南風土習俗與宕昌同自舒理至十代孫舒彭附後魏孝文帝封甘松縣子鄧爲王西魏恭帝􅀄其主檐術因亂來奔周文帝遣兵送還自後無聞安息北史曰安息國在葱嶺之西都蔚捜城西與波斯相接東去長安一萬七百}
