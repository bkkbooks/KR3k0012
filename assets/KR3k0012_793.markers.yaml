  - {type: variant, offset: 1217, length: 0, content: '', SBCK: 至其國得五色塩而返國之西百餘里有畢國可千餘家其國無君長安國統之大業五年遣使貢獻後遂絶焉鳥萇北史曰鳥國在賖弥南北有葱嶺南至天竺婆羅門胡爲其上族婆羅門多解天文吉凶之數其王動則訪决焉􅁟多林菓引水灌田豐稻夌事佛多諸寺塔寺極華麗人有爭訴服之以藥曲者發狂直者無恙爲法不殺犯死罪唯徙於靈山西南有檀特山山上立寺以驢數頭運食山下無人控御自知徃來鳥郍曷隋書曰鳥郍曷國都鳥許水西舊安息之地王姓昭武亦康國種􅀋字佛食都城方二里勝兵數百人王坐金羊座北去安國四百里西北去穆國二百餘里東去􅀲州七千五百里大業中遣使貢方物渴槃陁北史曰渴槃陁國在葱嶺東朱駒波西河經其國東北流有髙山夏積霜雪亦事佛道附於嚈噠通典曰渴槃陁後魏時通焉亦名漢陁國亦名渴槃羅陁國理葱嶺中在朱俱波國西西至護密國北至䟽勒國其王本䟽勒人累代相承居此國有户二千餘有懸度山在國南四百里懸度者名山也谿谷不通以繩索相引而度其間四百里中徃徃有棧道}
