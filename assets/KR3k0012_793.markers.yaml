  - {type: variant, offset: 2479, length: 0, content: '', WYG: 成長口嘗甘言掌持錢如膠之粘物又曰以十二月為嵗首有婆羅門為之占星候氣以定吉凶頗有佛法至十一月皷舞乞寒以水相潑盛為戱樂又曰貞觀九年遣佛貢獅子太宗嘉其逺至命秘書監虞世南為之賦自此朝貢至十一年入獻金桃銀桃詔令植之於苑囿又曰萬嵗通天年中則天封其大首領篤婆鉢提為康}
