  - {type: variant, offset: 2438, length: 2, content: 俞林, WYG: 字阿你厥手足皆六指産子非六指者不育王戴金獅子冠多稻粟麻麥銅鉄銀雌黄唐書曰踈勒國王姓裴俗事祅神有胡書文字貞觀九年遣使獻名馬又曰開元六年𤣥宗遣使冊立其王裴安定}
  - {type: variant, offset: 2441, length: 1, content: 驪, WYG: 踈勒王康國隋書曰康國者康居之後遷徙無常不恒故地然自漢以來相承不絶其王本姓温月氐人也舊居祁連山北昭武城因被匈奴所破西踰葱嶺遂有其國支庶各分王故康國左右諸國並以昭武為姓示不忘本也王字代失畢為人寛厚甚得衆心其妻突厥達可汗女也都於薩寳水上阿禄迪城大臣三人共掌國事其王索髪冠七寳金花衣綾羅錦繡白疊其妻有髻幪以皂布丈夫剪髪錦袍名為強國而西域諸國多}
  - {type: page-break, offset: 2441, content: '', id: KR3k0012_WYG_793-6b, image: WYG0900/WYG0900-0053d.png}
  - {type: variant, offset: 2443, length: 5, content: 王明帝永平, WYG: 之又曰有刑律置於祅祠决罸則取而斷之重罪者族次重者死賊盗截足人皆深目髙鼻多鬢髯善於商賈諸夷交易多凑其國有大小皷琵琶五弦箜篌笛婚姻䘮制與突厥同國立祖廟以六月祭之諸國皆來助祭俗奉佛為國書氣候温宜五糓勤修園蔬樹木滋茂出馬駞驢封牛黄金碙沙甘香阿薩郍香瑟瑟麖皮氍㲣錦疊多蒲桃富家或致千石連年不敗大業}
