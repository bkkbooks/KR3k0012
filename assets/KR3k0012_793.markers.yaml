  - {type: variant, offset: 1250, length: 201, content: 耆於是五十餘國悉納質內屬其條支安息諸國至于海濱四方里外皆重譯貢獻又曰九年班超掾甘英窮臨西海而還皆前世所不至山經所未詳莫不備其風土傳其珍怪焉於是遠國蒙奇兜勒皆來歸服班固西戎論曰孝武之代圖制匈奴患其兼從西國結黨南羗從音子容反乃表河西列四郡開玉門通西域以斷匈奴右臂隔絕南羗月氏單于失援由是遠遁而幕南無王庭因文景玄默養人天下豐富財力有餘士馬彊盛故能賭犀布瑇瑁則建朱崖七郡惑蒟音矩醬竹杖則開牂柯越嶲聞天馬蒲陶則通, WYG: 異物志云}
