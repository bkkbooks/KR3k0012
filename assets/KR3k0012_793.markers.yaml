  - {type: variant, offset: 1864, length: 0, content: '', SBCK: 地多山阜部衆二萬餘落至其孫弥忽如遣使於後魏太武帝拜爲宕昌王七葉孫弥􅁗皆授南北兩朝封爵後見兩魏分隔永熈末種人企定乃引吐谷渾㓂金城後企定㓂石門戍周武帝天和中詔大將軍田􅁪討平之以其地爲宕州鏺汗鏺音普喝切隋書曰鏺汙國都葱嶺之西五百餘里古渠捜國也王姓昭武守阿􅃮都城方四里勝兵數千人王坐金羊床妻戴金花俗多朱沙金䥫東}
  - {type: page-break, offset: 1864, content: '', id: KR3k0012_SBCK_793-8b}
  - {type: variant, offset: 1864, length: 126, content: 去長安六千三百里西接且末隨畜逐水草不田作仰鄯善且末穀山有鐵自作兵有弓矛服刀劍劉德曰服刀拍髀也師古曰指音貊髀音俾又音陛鄯善漢書曰鄯善國本名樓蘭王治杆泥城杆音烏輔國侯卻胡侯鄯善都尉擊車師都尉左右且渠擊車師君各一人譯長二人又曰鄯善地沙鹵少田寄田仰穀旁國國出玉, krp: 控弦十餘萬與康居同俗而役属康居土氣温和臨大澤無涯岸}
  - {type: variant, offset: 1865, length: 1, content: 長, SBCK: 踈勒千里大業中遣使貢方物色知顯北史曰色知顯國都色知顯城在􅊖万斤西北去代一萬二千九百四十里􅁟平多五菓伽色尼北史曰伽色國都伽色尼城在悉萬南去代一萬二千五百里􅁟出塩多五菓白蘭通典曰白蘭羗之别種後周時興焉東北接吐谷渾風俗物産與宕昌同周武帝保定元年朝獻使至乹陁北史曰乹陁國在鳥萇西本名業波爲嚈噠所破因改焉好征戰與􅄢賔􅋐三年不罷人怨苦之有􅋐象七百頭十人乗一象皆執兵仗象鼻縛刀以戰所都城東南七里有佛塔髙七十丈周三百歩即所謂雀離佛圖也史國隋書曰史國都獨莫水南十里舊康居之地也其王姓昭武字逖􅃒亦康國王之支庻也都城方二里勝兵千餘俗同康國北去康國二百四十里南去吐火羅五百里大業中遣使朝貢師子通典曰師子國東晉時通焉天笁旁國也西海之中延袤二千餘里多出竒寳其地和適無冬夏之異五榖隨人所種不湏時節其國舊無人止有􅀑神有龍居之諸國啇估來共市易􅀑不見其形但岀珎寳明其所堪價啇人依價取之諸國人聞其土樂因此􅔡至或有停住者遂成大國能馴飬師子遂以爲名風俗與婆羅門同而尤事佛法}
