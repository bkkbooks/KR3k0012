  - {type: variant, offset: 702, length: 0, content: '', SBCK: 彭生敢見射之豕人立而啼公懼墜于車傷足䘮屨反誅屨於徒人費弗得鞭之見血走出遇賊于門刼而束之費曰我奚御哉􅃝而示之背信之費請先入伏公而岀􅃲死于門中石之紛如死于階下遂入殺孟陽于牀曰非君也不􅀋見公之足干户下遂殺之而立無知又昭七曰昔有仍氏生女樂正居夔取之生伯封實有豕心貪惏無饜謂之封豕又曰衛靈公夫人南子與宋朝通衛太子使齊過宋宋野人以婁猪㓨而歌之云旣定尓婁猪盍歸}
