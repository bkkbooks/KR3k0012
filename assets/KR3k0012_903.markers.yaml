  - {type: variant, offset: 1202, length: 0, content: '', WYG: 叩頭自責徽又厚謝之華陽國志曰何隨字季業清㢘退讓嘗有屠者牽猪過隨門索斷失之强認隨溷中猪隨牽與之屠人尋自得亡者還隨隨以與之越絶書曰雞山豕山者勾踐以畜雞豚將伐吴以食死士也墨子曰孔子窮於陳蔡之間藜藿不糂乗感切子路烹豚孔子不問肉所從來而食之符子曰朔人}
