  - {type: variant, offset: 1203, length: 2, content: 良馬, WYG: 燕昭王以大豕曰養奚若使曰豕也非大圊不居非人便不珍今年百二十矣人謂豕仙王乃命豕宰養之十五年大如沙墳足如不勝其體王異之令衡官橋而量之折橋豕不量又命水官舟而量之其重千鈞其巨無用燕相謂王曰奚不饗之王乃命宰夫膳之夕見夢於燕相曰造化勞我以豕形食我以人穢吾患其生久矣仗君之靈得化吾生始得為魯津之伯燕相㳺乎魯津有赤龜奉璧而獻一云夜光珠孝經援神契曰彘水伏故去喙淮南子曰六九五十}
