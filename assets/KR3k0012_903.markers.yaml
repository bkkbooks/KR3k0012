  - {type: variant, offset: 1336, length: 664, content: 除盜賊春秋繁露曰凡贄卿用羔羔飲之其母必跪類知禮者故羊之為言祥故以為贄莊子曰臧與穀二人相與牧羊而俱亡羊問臧奚事則挾策讀書穀奚事則博塞以游二人事業不同其亡羊均也又曰善養生者如牧羊後者鞭之墨子曰齊莊公之臣王國卑中里撽者訟三年而獄不斷恐失有罪使二人共一羊盟齊之社二子相從以羊血灑社讀王國卑之祠已盡終里撽之辭未半祭羊起而觸中里撽齊人以為有神驗列子傳曰楊朱見梁王言治天下如運諸掌王曰先生有一妻一妾而不能治三畝之園而不能芸言治天下何也曰君見夫牧羊者乎百羊而群使五尺童子荷箠而隨之欲東而東欲西而西使堯牽一羊舜荷箠而隨之則不能前矣孫卿子曰仲尼為魯司冠沈猶氏不敢朝飲其羊尸子曰羊不任駕鹽車椽不可為楣棟龍魚河圖曰羊有一角食之殺人周書曰夏桀德衰夷羊在牧飛蛤滿野韓詩外傳曰魯哀公使人穿井三月不得泉得一玉羊焉公以為玉羊使祝鼓舞之欲上於天羊不能上孔子見曰水之精為玉土之精為羊願無怪之此羊肝土也公使殺之視肝即土矣國語曰季桓子穿井獲如土缶其中有羊符子曰魏文侯見宋陵子三仕不顧文侯曰何貧子曰王見楚富者牧羊九十九而願百嘗訪邑里故人其鄰人貧有一羊富者拜之曰吾羊九十九今君之一盈我成百則牧數足矣鄰者與之從此觀焉富者非富貧者非貧也呂氏春秋曰百里奚未遇時亡虞飯牛於秦傳鬻以五羖羊之皮公孫枝得獻諸繆公繆公用之謀無不當舉必有功淮南萬畢術曰阿羊九頭更食國亂乃出揚雄法言曰敢問質曰羊質虎皮見草而悅見豺而戰忘其皮之虎也王充論衡曰獬豸者一角之羊也性知有罪皋陶治獄其罪疑乃令羊觸之山海經曰羬羊尾如馬出錢來之山羬羬音針玉篇作古咸反瑞應圖曰鍾律和調則玉羊見白澤圖曰羊有一角當頂上龍也殺之震死博, SBCK: 毫射物􅀶}
