  - {type: variant, offset: 421, length: 249, content: 羔羊也羔羊之皮素絲五紽又曰䍧羊賁首三星在霤鄭玄注曰羊牝曰䍧賁大也易說卦曰兌為羊又大壯曰九三小人用壯君子用罔貞厲羝羊觸藩嬴其角周禮夏官上曰羊人掌羊牲凡祭祀飾羔羔小羊也詩曰四之曰其早獻羔祭韭祭祀割羊牲登其首登昇也昇首報陽也昇首于室凡祈珥共其羊牲共猶給也賓客共其灋羊灋羊飧饔積膳之羊凡沈辜侯禳釁積共其羊牲積故書為毗鄭司農云毗讀為釁謂釁國寶漬軍器也玄謂積積柴煙祀猶燎寶柴周禮天官食毉曰凡會膳食羊宜黍左傳宣上曰華元殺羊食士其御羊斟不與及戰曰疇昔之羊子為政今日之事我為政與入鄭師故敗又宣下曰楚子圍鄭鄭伯肉袒牽羊, SBCK: 米者}
