  - {type: variant, offset: 1000, length: 4, content: 更始二年, SBCK: 朱穆字文元嘗飬猪猪有疾使人賣之於市語之言如售當自告買者言病也賣猪者售不言病且直過多穆怪其故賫半直以還買猪者辭不取穆弃錢而去魏志曰挹婁國在夫餘東常穴居土寒氣劇於夫餘其俗好飬猪食其肉衣其皮冬以猪膏塗身又曰管輅嘗}
