  - {type: variant, offset: 2392, length: 289, content: 計過衛玠別傳曰玠少時乘白羊車於洛陽市共觀咸曰誰家璧人述異記曰羊而不角呼蛟羊一名胡髯郎一名青烏又曰周成王時東夷進六角羊周厲王元年外國貢三角羊尹喜內傳曰老子與喜別曰尋吾於成都市青羊之肆喜後求而得之葛洪神仙傳曰皇初平年十五家使牧羊有道士見其良謹將至華山石室中四十年不誤念其家其兄初起行索初平見道士引至山與弟語畢問平羊何在平曰近東初起視不見羊但見白石卻謂平曰山東無羊平曰兄自不見爾與兄俱往平乃叱之白石一時皆起成羊數萬頭初起曰弟得仙道以如此遂棄妻子服松柏伏苓五萬日遂得仙易姓為赤松子又曰曹公收左慈慈走入群羊失慈之所在追者疑化為羊乃令人數羊羊本千口簡之長一口知化為羊乃謂曰若是左公者但出無苦, SBCK: 德}
