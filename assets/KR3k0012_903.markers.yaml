  - {type: variant, offset: 1221, length: 5, content: 黑牛白角爰, SBCK: 屠者牽猪過隨門索斷失之強認隨溷中猪隨牽與之屠人㝷自得亡者還隨隨以與之越絶書曰鷄山豕山者勾踐以畜鷄豕將伐呉以食死士也墨子曰孔子窮於陳蔡之間藜䒱不糂桒感切子路烹豕孔子不問肉所從來而食之符子曰朔人獻燕昭王以大豕曰飬奚􅀂使曰豕也非大圊不居非人便不珎今年百二十矣人謂豕仙王乃命豕宰飬六十五年大如沙墳足如不勝其體王異之令衡官橋而量之折十橋豕不量又命水官舟而量其重千鈞其巨無用燕相謂王曰奚不饗之王乃命宰夫膳之夕見夢於燕相曰造化勞我以豕形食我以人􅁾吾患其生乆矣仗君之靈得化吾生始得爲魯津之伯燕相游乎魯津}
