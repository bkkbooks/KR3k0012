  - {type: variant, offset: 916, length: 2, content: 甄宇, SBCK: 承宫字少子琅邪人少􅀌年八􅀊人令牧豕郷里徐子盛明春秋經授諸生數百人宫過其廬下見諸生講誦好之因弃猪而聽經猪主怪不還行索見宫欲笞門下生共禁止因留精舎門下拾薪執苦數年遂通經又曰朱浮與彭寵書責之曰伯通自伐以功爲髙天下往時遼東有豕生子白頭異而獻之行至河東見群豕皆白懷慙而還􅀂以子功論於朝廷則爲遼東豕也續漢書曰曹萌字元偉以仁厚稱隣人有亡豕者與萌豕相􅀋詣門認之萌不與争後所亡豕自還其主大慙送所認豕辭謝萌萌􅀏而受之􅀽山松漢紀曰呉祐放猪於長垣澤中誦經而行遇父故人謂之曰子二千石子掉鞭而誦經行吟於澤畔縱子無耻奈君父何祐守志如􅀄與}
