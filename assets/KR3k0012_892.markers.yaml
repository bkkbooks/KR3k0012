  - {type: variant, offset: 436, length: 725, content: 約之漸也又曰李敢子禹有寵於太子禹有勇上召禹使㓨虎懸下圈中未至地有詔引出之禹以劍斫絕纍欲㓨虎上壯之遂放焉後漢書曰劉昆字桓公光武時為弘農太守先是崤澠驛道多虎災行旅不通昆為政三年仁化大行虎皆負子渡河帝聞而異之後徵為光祿勳詔問昆曰前在江陵返風滅火後守弘農虎北渡河行何德政而致是事昆對曰偶然耳左右皆笑其質訥帝歎曰此乃長者之言也顧命書諸策又曰宋均遷九江太守郡多虎暴數為人患常募設檻穽而猶多傷害檻為機以捕獸穽謂穿地陷之均到下記屬縣曰夫虎豹在山黿鼉在水各有所託且江淮之有猛獸猶北土之有雞豚也今為人害咎在殘吏而勞勤張捕非憂恤之本也其務退奸貪思進忠善可一去檻穽除削課制其後傳言虎相與東遊渡江又曰法雄為南郡太守郡濱帶江沔又有雲夢藪澤雲夢澤今在安州永初中多虎狼之暴前太守賞募張捕反為所害者甚眾雄乃移書屬縣曰凡虎狼之在山林猶人之居城市古者至化之代猛獸不擾皆由恩信寬澤仁及飛走太守雖不德敢忘其義記到其毀壞檻穽不得妄捕山林是後虎害稍息人以獲安在郡數歲歲常豐稔又曰童恢字漢宗為不其令戶人嘗為虎所害乃設檻捕之生獲二虎恢呪虎曰天生萬物惟人為貴虎狼當食六畜而殘暴於人王法殺人者死傷人則論法若是殺人者當垂頭服罪自知非者當號呼稱冤一虎低頭閉目狀如震懼即時殺之一乃踊躍自奮遂放之謝承後漢書曰豫章劉陵字孟高為長沙安成長先時多虎百姓患之皆從他縣陵之官脩德政踰月虎悉出界去民皆還漢皇德傳曰世祖遣鄧禹西征送之於道既返因於野王獵路見二老翁即禽世祖問曰禽何向並舉首西指言此中多虎臣每即禽虎亦即臣大王勿往也方言曰虎陳魏宋楚之間或謂之李父江淮南楚之間謂之李耳虎食物值耳即止以觸其諱故或謂之於䖘於音今江南山夷呼虎為䖘自關東西或謂之伯都也風俗通曰呼虎為李耳俗說虎本南郡中廬李氏公所化為呼李耳因喜呼班便怒龍魚河圖曰懸, WYG: ''}
