  - {type: variant, offset: 1162, length: 457, content: 虎鼻門上宜官子孫帶印綬懸虎鼻門中周一年取燒作屑與婦飲之二月中便有兒生貴子勿令人知之泄則不驗也亦勿令婦人見之春秋後語曰楚黃歇說秦昭王曰天下強國莫過於秦楚今聞大王欲伐楚此猶兩虎相與鬥而駑大受其弊不如善楚也又曰秦惠王謂陳軫曰今韓魏相攻朞年不解或謂寡人救之便或白勿救便寡人不能自為決願子為寡人計之軫曰亦嘗有以卞莊子之㓨虎聞於王者乎王曰不聞軫曰卞莊子方㓨虎而卞豎子止之曰兩虎方食牛牛甘必爭爭必鬥鬥則大者傷小者死從傷而㓨之一舉必有雙虎之名卞莊子以為然立而顧之有頃兩虎果鬥大者傷小者死一舉果有雙虎之功今韓魏相攻朞年不解是必大國傷小國亡從傷而伐之一舉必有二實此猶下莊子㓨虎之類也惠王曰善卒不救待其敗而攻之果大剋也吳越春秋曰吳王葬昌門外金玉精上為白虎列士傳曰秦召公子無忌無忌不行使朱亥奉璧一雙秦王大怒將朱亥著虎圈中亥瞋目視虎眥裂血出濺虎終不敢動穆天子傳曰有虎在於葭中葭葦七萃之士曰高奔戎乃生捕虎而獻之天子命為押押檻而畜之東虞是曰虎牢因名其地今滎陽成皋縣是也山海經曰孟山鳥鼠同穴之山其上多白虎也又曰狄山爰有熊文虎幽都之山黑水上有玄虎尸, WYG: ''}
