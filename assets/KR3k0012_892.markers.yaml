  - {type: variant, offset: 2350, length: 224, content: 江太守虎負子渡江按虎毛婆娑豈犯陽侯波里語云狐欲渡河無奈尾何舟人尚有懼況虎耶若德被四海虎亦能至鬼方也璅語曰周王欲殺王子宜咎立伯服釋虎將執宜咎叱之虎弭耳而服蔣濟萬機論曰猛虎不處卑勢鷙鳥不立垂枝也西京雜記曰李廣與兄弟獵於冥山之北見臥虎焉射一矢斃斷其髑髏以為枕示服猛也鑄銅象其形為溲器示厭服之也又曰余所知有鞠道龍善為幻術嘗向余說曰東海人黃公少時為幻秦末有白虎見東海詔遣黃公以赤刀往厭之術既不行遂為虎所殺三輔人俗用以為戲漢朝亦取之為角抵戲焉王子年拾遺錄曰始皇, SBCK: 十}
