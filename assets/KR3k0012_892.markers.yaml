  body:
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 四虎下豹駮虎下英雄記曰曹公擒吕布布頋劉備曰􅀇德卿爲坐上客我爲降虜繩縳我急獨不可一言耶操曰縳餓虎不得不急乃命緩縳布呉志曰吕蒙欲從軍母止之蒙曰不探虎穴安得虎子又曰孫權每田獵常乗馬射虎虎甞突攀持馬鞍張昭變色而諫權謝昭曰年少慮事不逺然猶不能巳乃作射虎車又曰孫權親乗馬射虎庱亭庱音攄淩馬爲所傷權投以􅀟㦸虎即廢魏名臣奏曰丗祖時有獻虎者問虎何食對曰食肉詔曰下民厭糠何忍以􅁏食虎乃命虎賁射之斯實得計於時而名垂於後晉令曰諸有虎皆作㩜穽籬柵皆施餌捕得大虎賞絹}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_SBCK_892-1b}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 四虎下英雄記曰曹公擒吕布顧劉備曰𤣥德卿為坐上客我為降虜繩縳我急獨不可一言耶操曰縳餓虎不得不急乃命緩縳布呉志曰吕蒙欲従軍母止之蒙曰不探虎穴安得虎子又曰孫權毎田獵常乗馬射虎虎嘗突前權攀持馬勒走昭變色而諫權謝昭曰年少慮事不逺然猶不能已乃作射虎車又曰孫權親乗馬射虎馬為虎所傷權投以雙㦸虎却廢魏名臣奏曰世祖時有獻虎者問虎何食對曰食肉詔曰下民厭糠何忍以肉食虎乃命虎賁射殺之共食得計扵時而名垂扵後晉令曰諸有虎處皆作檻穽籬柵皆施餌捕得大虎賞絹}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_WYG_892-1b, image: WYG0901/WYG0901-0001b.png}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_WYG_892-2a, image: WYG0901/WYG0901-0002a.png}
  - {type: variant, offset: 2, length: 0, content: '', krp: 四虎下豹駮虎下英雄記曰曹公擒吕布布頋劉備曰玄德卿爲坐上客我爲降虜繩縳我急獨不可一言耶操曰縳餓虎不得不急乃命緩縳布呉志曰吕蒙欲從軍母止之蒙曰不探虎穴安得虎子又曰孫權每田獵常乗馬射虎虎甞突攀持馬鞍張昭變色而諫權謝昭曰年少慮事不逺然猶不能巳乃作射虎車又曰孫權親乗馬射虎庱亭庱音攄淩馬爲所傷權投以雙㦸虎即廢魏名臣奏曰丗祖時有獻虎者問虎何食對曰食肉詔曰下民厭糠何忍以肉食虎乃命虎賁射之斯實得計於時而名垂於後晉令曰諸有虎皆作㩜穽籬柵皆施餌捕得大虎賞絹}
