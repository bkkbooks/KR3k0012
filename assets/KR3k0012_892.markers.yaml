  - {type: variant, offset: 5, length: 1, content: 說, SBCK: 下者推其竒偶謂之虎卜孝子傳曰楊香其父爲虎噬忿憤摶之父免害又曰郭文舉爲虎探鯁骨虎常衘鹿以報之括地圖曰越俚之民老者化爲虎王孚安成記曰平都區寳者後漢人居父䘮隣人格虎虎走趨其孤廬中即以蓑衣覆藏之隣人尋跡問寳寳曰虎豈有可舎而藏之乎此虎後送禽獸以助寳􅀕孝慈之志通於神明由是知名裴淵廣州記曰興寕縣義熈四年忽有數十大鳥大如鶖少焉化爲虎周景式廬山記曰有嫗事康王廟林中有一虎祠􅀕輙以餘肉及骨與之有人惡畏之嫗使避之人去復來陳留􅂄舊傳曰王業字子春爲荆州刺史有德政卒於支江有三白虎低頭曵尾􅀫衛其側及䘮去踰州境忽然不見民共立碑文號曰支江白虎竹林七賢論曰王戎㓜而清秀魏明帝時於宣武場上爲欄􅃲虎使力士逆與之􅅮縱人觀之戎年七歲亦徃觀焉虎乗間薄欄而吼其聲震地觀者無不僻易顚仆戎安然不動帝於閣上見之使問姓名而異焉殷氏丗傳曰亮字子華少學公羊十四傳祖父業多所綜覽舉孝廉到陽城遇虎爭一羊亮乃按劒瞋目斬羊腹虎乃各以其半羊去述異記曰漢中有虎生角道家云虎千歳則牙蛻而角生漢宣城郡守封邵一日忽化爲虎食郡民民呼曰封使君因去不復來故時人語曰無作封使君生不治民死食民異苑曰太元末徐桓岀門仿佯見一女子因言曲相調便要桓入草中桓􅀃其色乃隨去女子忽然變成虎􅀒桓着背上逕向深山其家左右尋覔唯見虎跡旬日虎夜送徐桓着門外又曰樊陽鄭襲太元中爲廣陵太守閤下騶忽如狂奄失其所經日祼身吟呼膚血流灕問其意故云社公命令作虎以班皮衣之辭以執鞭之士不堪虓躍神怒還便剥皮皮以着􅁏瘡毀􅃤痛旬日乃差又曰都陽桓闡以太元十九年殺犬􅀕郷里綏山煑肉不熟神怒即下教於巫曰桓闡以生肉貽我當謪令自食也其年便作虎作虎之始見人以班衣衣之即能跳透噬逐又曰彭城劉黃雄以太元中爲京佐􅀍使還都路經竹里停於邏􅀫此邏多虎劉極自防衛繫馬於户前手刀布於地上宵中士庶同睡虎乗間跳入獨取劉而去又曰邵都梁馮恭永􅀄中醉卧於山路夜有虎來以頭枕其背㳟中宵展轉之以手搏之復大􅃦向曉始醒猶見虎蹲在脚後若有􅀫命非智力所加也又曰扶南王范㝷常畜生虎及鰐魚若有訟未知曲直便投與魚虎虎不噬則爲有理􅁾貊之人􅀕虎爲神將有以也幽明録曰桓大司馬鎮赭圻時有何㕘軍晨出行於田野中溺死人髑髏上還晝􅃦夢一婦人語云君是佳人何以見􅁾汚暮當令知之是時有􅁀虎人無敢行夜出者何常穴壁作溺穴其夜趨穴欲溺虎忽囓斷隂莖即死又曰晉孝武帝母李太后夲賤人簡文無子曽遍令善相者相宫人李太后給皂役不豫焉相者指之此當生貴子而有虎厄帝因幸之生孝武及㑹稽王道子旣登尊位服相者之驗而恠有虎害且生所未見乃令人􅀞作虎象因以手撫欲打虎戯便患手腫痛遂以疾崩神仙傳曰介象入山兾遇神仙卧石上有一虎徃砥象額窹而見虎謂虎曰天使汝來侍衛我者汝且停􅀂山神使汝來試我者汝自去虎乃去搜神記曰􅂫易者廬陵婦人善㸔産夜忽爲虎所取行六里至大曠見有牝虎當産不得解匍匐欲死輙仰視易悟之乃爲探出之有三子生畢虎􅀒易送還并送野肉於門内又曰漢江之域貙人能化爲虎長沙居民作檻捕虎檻發明日衆人共徃格之見一亭長赤幘大冠在檻中坐民問君何以入此中亭長大怒曰昨􅀍縣召夜避雨誤入此中急出我民曰君見召當有文書即岀懷中召文書於是岀之㝷視之化爲虎即上走續搜神記曰丹陽縣人沈宗居在縣下以卜爲業義熈中左將軍檀侯鎭姑熟好獵以格虎爲事忽有一人着皮袴乗烏馬從者一人亦着皮袴以􅁓裏十餘錢來詣宗卜云西去覔食好東去覔食好宗爲作卦卦成告之東向􅁻西向不利因就宗乞飲内口着甌中狀如牛飲旣出門東行百歩從者及馬皆化虎自此以後暴虎非常又曰呉猛有道術同縣鄒惠政迎猛夜於家中庭燒香忽有虎來抱政兒超籬去猛語云無所苦湏􅁷果還云虎將去數十歩忽然復送歸政遂精進爲道士又曰㝷陽縣北山中蠻人有術能使人化爲虎毛色牙爪悉如真尔郷人前將軍周眕有奴使入山伐薪奴有婦及妹亦俱行旣至奴語二人云且髙樹上視我所爲如其言旣而入草湏􅁷見一黄班虎從草中出奮迅吼喚甚爲可畏少時復爲人奴語二人曰歸家慎勿道後向等軰􅀃之周得知飲淳酒令熟醉使人解其衣服及身體唯於髻髪中得一􅁓􅀞作大虎邊有符周密取録之奴旣醒喚問之事巳露遂具􅀃有術其以三尺布巾一赤雄雞一斗酒受此法俗􅀃曰桓石虎是桓征西兒未􅀍舉時西出獵石虎亦從獵圍中射虎虎􅀍數箭伏在地諸將請石虎曰惡郎能抜虎箭不石虎小名惡子荅曰可抜耳惡子於是逕至虎邊便抜得箭虎跳越惡子亦跳跳乃髙虎跳虎還伏惡子持箭便還又曰齊沈僧照別名法朗攸之之孫也記人􅁻凶頗有應驗甞校獵中道而還左右問何故荅曰國家有邊事湏還處分問何以知之曰向聞南山虎嘯知耳俄而使至金樓子曰孔子遊舎於山使子路取水逢虎於水與共戰攬尾得之内於懷還問子曰上士殺虎如何子曰上士殺虎持虎頭又問中士殺虎如何子曰中士捉耳又問下士殺虎如何子曰捉虎尾子路出尾弃之懷石盤曰夫子知虎在水而使我取水是欲殺我也乃欲殺夫子問曰上士殺人云何曰用筆端中士殺人云何曰用言語下士殺人云何曰用石盤子路乃弃石盤而行國史􅀘曰裴旻爲龍華軍使守北平北平多虎旻善射常一日斃虎三十有一旣而息於山下四顧自􅀂有父老至曰此皆彪似虎而非將軍􅀂遇真虎無能爲也旻曰真虎安在父老曰自此而北三十里徃徃有之旻躍馬而徃果有一虎騰出􅃺小而􅀔猛據地一吼山石震烈旻擗易弓矢皆墜殆不得免自此慙懼不復射虎呉氏虎賦曰盖其􅃺也誕節緩腕續背連骸細腰皷􅇩方口大鼻似黼組􅄂間􅀂錦繡相連豹􅀃}
