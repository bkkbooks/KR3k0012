  - {type: variant, offset: 3, length: 0, content: '', SBCK: 疋}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 疋虎之子半魏略曰文帝欲受禪郡國奏白虎二十七見博物志曰江陵有猛人能化為虎俗云猛虎化為人好著紫葛衣足無踵有五指者人化為虎又曰虎知衝破又能畫地今人有畫物上下者推其竒耦謂之虎卜孝子傳曰楊香父為虎噬忿憤摶之父免害又曰郭文舉為虎􅊥鯁骨虎嘗衘鹿以報之括地圖曰越俚之民老者化為虎王孚安成記曰平郡區寶者後漢人居父䘮隣人格虎虎走趨其孤廬中即以蓑衣覆藏之隣人赴尋跡問寶寶曰虎豈有可舎而藏之乎此虎後送禽獸以助寶祭孝慈之志通扵神明由是知名裴淵廣州記曰興寧縣義熙四年忽有數十大鳥大如鶖少日化為虎周景式廬山記曰有姬姓祀康王廟林中有一虎伺祭輙以餘肉及骨與之有人惡畏之姬使避之人去復來陳留耆舊傳曰王業字子春為荆州刺史有德政卒於枝江有三白虎低頭曳尾宿衞其側及䘮去踰州境忽然不見民共立碑文號曰枝江白虎竹林七賢論曰王戎幼而清秀魏明帝時於宣武場上為欄鬭虎使力士逆與之摶縦人觀之戎年七嵗亦徃觀焉虎乗間摶欄而吼其聲震地觀者無不辟易顛仆戎安然不動帝於閣上見之使問姓名而異焉殷氏世傳曰亮字子華少學公羊十四傳祖父業多綜所見舉孝亷到陽城遇虎争一羊亮乃按劒瞋目斬羊虎乃各以其半去述異記曰漢中有虎生角道家云虎千嵗則牙脱而角生漢宣城郡守封邵一日忽化虎食郡民民呼曰封使君因去不復來故時人語曰無作封使君生不治民死食民異苑曰太元末徐桓以太元中出門徜徉見一女子因言曲相調便要桓入草中桓説其色仍隨去女子忽然變成虎負桓著背上徑向山中其家左右尋覔唯見虎跡旬日虎夜送桓下著門外又曰榮陽鄭襲太康中為廣陵太守閣下騶從忽如狂奄失其所在經日祼身呼吟膚血淋漓問其故云社公命令其作虎以斑皮衣之辭以執鞭之士不堪虓躍神怒還使剥皮皮已著肉瘡毁慘痛旬日乃差又曰鄱陽桓闡以太元十九年殺犬祭鄉里綏山煮肉不熟神怒即下教於巫曰桓闡以肉生貽我當謫令自食也其年便作虎作虎之始見人以斑皮衣之即能跳躍噬逐又曰彭城劉廣雅以太元中為京佐被使還都路經竹里停於邏宿此邏多虎劉極自防衞繫馬於户前手執㦸布於地上中宵與士庻同睡虎乗間跨越人畜獨取劉而去又曰邵都梁馮恭永初中醉卧於山路夜有虎來以頭枕其背恭中宵展轉以手搏之復大寢向曉始醒猶見虎蹲在脚後苟有宿命非智力所加也又曰扶南王范尋常畜生虎及鰐魚若有訟未知曲直便投與魚虎魚虎不噬則為有理穢貊之人祭虎為神將有以也幽明錄曰桓大司馬鎮赭圻時有何恭軍晨出行於田野中溺死人髑髅上還晝寢夢一婦人語云君是佳人何以見穢汚暮當令知之是時有暴虎人無敢夜出者何常穴壁作溺穴其夜趨穴欲溺虎嚙㫁隂莖即死又曰晉孝武帝母李太后本賤人簡文無子曽令善相者相宫人李太后給皂役不豫焉相者指之此當生貴子而有虎厄帝因幸之生孝武帝㑹稽王道子既登尊位服相者之見而怪有虎害且生所未見乃令人畫作虎象因以手戯欲打虎後患手腫痛遂以疾崩神仙傳曰介象入山兾遇神仙卧石上一虎徃䑛象額寤而見虎謂虎曰天使汝來侍衞我者汝且停若山神使汝試我者汝自去虎乃去捜神記曰蘇易者廬陵婦人善看産夜忽為虎所取行六里至大壙厝易置地蹲而守見有牝虎當産不得解匍匐欲死輙仰視易悟之乃為探出之有三子生畢牝虎負易還再三送野肉於門内又曰漢江之域貙人能化為虎長沙居民作檻捕虎檻發明日衆人共徃格之見一亭長赤幘大冠在檻中坐民問君何以入此中亭長大怒曰昨被縣召夜避雨誤入此中急出我民曰君見召不當有文書耶即出懐中召文書於是出之尋視之化為}
