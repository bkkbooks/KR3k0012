  - {type: variant, offset: 353, length: 1235, content: 不如蜂蠆之致蠚又曰宣帝元狩南郡獲白虎以為寶又曰李廣北平郡出獵見草中石以為虎而射之中石沒羽視之石也明日射之終不能入矣又曰馬遷書曰猛虎在山中百獸震恐及陷檻穽搖尾而求食積威約之漸也又曰李敢子禹有寵於太子禹有勇上召禹使㓨虎懸下圈中未至地有詔引出之禹以劍斫絕纍欲㓨虎上壯之遂放焉後漢書曰劉昆字桓公光武時為弘農太守先是崤澠驛道多虎災行旅不通昆為政三年仁化大行虎皆負子渡河帝聞而異之後徵為光祿勳詔問昆曰前在江陵返風滅火後守弘農虎北渡河行何德政而致是事昆對曰偶然耳左右皆笑其質訥帝歎曰此乃長者之言也顧命書諸策又曰宋均遷九江太守郡多虎暴數為人患常募設檻穽而猶多傷害檻為機以捕獸穽謂穿地陷之均到下記屬縣曰夫虎豹在山黿鼉在水各有所託且江淮之有猛獸猶北土之有雞豚也今為人害咎在殘吏而勞勤張捕非憂恤之本也其務退奸貪思進忠善可一去檻穽除削課制其後傳言虎相與東遊渡江又曰法雄為南郡太守郡濱帶江沔又有雲夢藪澤雲夢澤今在安州永初中多虎狼之暴前太守賞募張捕反為所害者甚眾雄乃移書屬縣曰凡虎狼之在山林猶人之居城市古者至化之代猛獸不擾皆由恩信寬澤仁及飛走太守雖不德敢忘其義記到其毀壞檻穽不得妄捕山林是後虎害稍息人以獲安在郡數歲歲常豐稔又曰童恢字漢宗為不其令戶人嘗為虎所害乃設檻捕之生獲二虎恢呪虎曰天生萬物惟人為貴虎狼當食六畜而殘暴於人王法殺人者死傷人則論法若是殺人者當垂頭服罪自知非者當號呼稱冤一虎低頭閉目狀如震懼即時殺之一乃踊躍自奮遂放之謝承後漢書曰豫章劉陵字孟高為長沙安成長先時多虎百姓患之皆從他縣陵之官脩德政踰月虎悉出界去民皆還漢皇德傳曰世祖遣鄧禹西征送之於道既返因於野王獵路見二老翁即禽世祖問曰禽何向並舉首西指言此中多虎臣每即禽虎亦即臣大王勿往也方言曰虎陳魏宋楚之間或謂之李父江淮南楚之間謂之李耳虎食物值耳即止以觸其諱故或謂之於䖘於音今江南山夷呼虎為䖘自關東西或謂之伯都也風俗通曰呼虎為李耳俗說虎本南郡中廬李氏公所化為呼李耳因喜呼班便怒龍魚河圖曰懸文虎鼻門上宜官子孫帶印綬懸虎鼻門中周一年取燒作屑與婦飲之二月中便有兒生貴子勿令人知之泄則不驗也亦勿令婦人見之春秋後語曰楚黃歇說秦昭王曰天下強國莫過於秦楚今聞大王欲伐楚此猶兩虎相與鬥而駑大受其弊不如善楚也又曰秦惠王謂陳軫曰今韓魏相攻朞年不解或謂寡人救之便或白勿救便寡人不能自為決願子為寡人計之軫曰亦嘗有以卞莊子之㓨虎聞於王者乎王曰不聞軫曰卞莊子方㓨虎而卞豎子止之曰兩虎方食牛牛甘必爭爭必鬥鬥則大者傷小者死從傷而㓨之一舉必有雙虎之名卞莊子以為然立而顧之有頃兩虎果鬥大者傷小者死一舉果有雙虎之功今韓魏相攻朞年不解是必大國傷小國亡從傷而伐之一舉必有二實此猶下莊子㓨虎之類也惠王曰善卒不救待其敗而攻之果大剋也吳越春秋曰吳王葬昌門外金玉精上為白虎列士傳曰秦召公子無忌無忌不行使朱亥奉璧一雙秦王大怒將朱亥著虎圈中亥瞋目視虎眥裂血出濺虎終不敢動穆天子傳曰有虎在於葭中葭葦七萃之士曰高奔戎乃生捕虎而獻之天子命為押押檻而畜之東虞是曰虎牢因名其地今滎陽成皋縣是也山海經曰孟山鳥, SBCK: 鼷}
