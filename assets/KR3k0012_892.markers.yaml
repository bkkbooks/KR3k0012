  - {type: variant, offset: 1633, length: 310, content: 氣又曰中黃伯曰余左執太行之夔而右搏雕虎韓子曰龐共與太子質於邯鄲謂魏王曰今一人言市有虎王信乎王曰不二人言王信乎王曰不三人言王信乎曰寡人信之龐共曰夫市無虎明矣然而三人言成市虎今邯鄲去魏遠於市議臣者過三人願王察之龐共從邯鄲還竟不得入又曰夫虎之所以能伏狗者爪牙也使虎釋其爪牙而使狗用之則虎反服於狗矣人主者以刑德制臣今君失其刑德而使臣用之則君反制於臣矣管子曰桀之時女樂三萬人放虎於市觀其驚駭列子曰梁鴦曰養虎之法凡順之則喜逆之則怒此血氣者性也夫食虎物不敢以生物與之為其殺之恐怒也不敢以全物與之為其決之之怒也莊子同孟子曰晉人有馮婦者善搏虎有眾逐虎望見馮婦趍而迎之孫卿子曰見寢木以為伏虎呂氏春秋曰衣人在寒食人在飢陳思稱投虎千金不如一豚肩, SBCK: 捷來格}
