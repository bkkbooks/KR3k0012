  - {type: variant, offset: 2152, length: 0, content: '', SBCK: 時相見其黃姑者即河鼓也爲呉音訛而然今之言者謂是列舎牽牛而㑹織女故爲此分析令知斷其疑焉又曰􅍫四星在人星東南主舂􅍫占􅀂覆則􅀊中人飢荒􅀂仰則}
  - {type: variant, offset: 2152, length: 0, content: '', krp: 時相見其黃姑者即河鼓也爲呉音訛而然今之言者謂是列舎牽牛而㑹織女故爲此分析令知斷其疑焉又曰􅍫四星在人星東南主舂􅍫占若覆則歲中人飢荒若仰則}
  - {type: variant, offset: 2153, length: 0, content: '', SBCK: 下熟又曰内杵三星在人星旁主軍糧占􅀂正直下對曰口則吉􅀂偏與曰不相當則軍糧絶又曰漸臺四星屬織}
  - {type: page-break, offset: 2153, content: '', id: KR3k0012_SBCK_006-4a}
  - {type: variant, offset: 2153, length: 2, content: 女孫, WYG: 關參旗伐也觜觹天廟也奎天豕也婁天矢也胃天倉也狼弧魚陵天船天苑卷舌天老人皆西方星名也栁主材木栁星主材木也鄭𤣥註曰日月遺其珠囊珠謂五星也遺其嚢者盈縮失度也黄石公隂謀秘訣法曰熒惑者火之精御史之象主禁令刑罰蔡邕月令章句曰天官五獸之於五事也左有蒼龍大辰之貌右有白虎大梁之文前有朱雀鶉火之體後有𤣥武龜蛇之質中有大角軒轅麒麟之信風俗通曰月與星並無光日照之乃光耳如以鏡光照日則影見壁月初見西方至望後光見東日所照}
