  - {type: variant, offset: 2146, length: 0, content: '', SBCK: 軍也中央大將軍也其南左星左將軍也}
  - {type: variant, offset: 2146, length: 0, content: '', krp: 軍也中央大將軍也其南左星左將軍也}
  - {type: variant, offset: 2147, length: 1, content: 北, WYG: 對為衝嵗乃殃又四守者所司賞罰許慎注曰四守紫㣲軒轅咸池天河也家語曰巫馬期為單父令戴星出入以理人劉向説苑曰懸象著明莫大於日月察變之動莫著於五星也又秦胡亥立日月薄食山林淪亡枉矢光夜熒惑襲月河圗帝通紀曰彗星者天地之旂也國精符也地為山川山川之精上為星各應其州城分野為國作精神符驗也五姓占曰君薄徳義懦弱不勝任則太白失度經天作變易之象樂汁圖曰天宫紫㣲宫也勾陳後宫也大當正妃也大當鈎陳末大星也閣道圵斗輔天理貴人牢為貴人作牢獄也文昌宫天五官㑹府也𤣥戈招揺也皆備兵難之星梗河天矛也梗河一名天矛}
