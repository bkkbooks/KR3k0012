  - {type: variant, offset: 2145, length: 1, content: 將, WYG: 也淮南子曰太㣲者太乙庭也紫宫者太乙之居也軒轅者帝妃之合也咸池者水魚之囿也天河者羣神之􅏱也天河者星名也􅏱猶門也又令雨師灑道使風伯清塵髙誘註曰雨師畢星也風伯箕星也又嵗星之所居五榖豐}
