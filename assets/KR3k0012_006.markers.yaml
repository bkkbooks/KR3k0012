  - {type: variant, offset: 2144, length: 1, content: 上, SBCK: 在牽牛北主軍鼔蓋天子三}
  - {type: variant, offset: 2144, length: 0, content: '', WYG: 見九日不沒莊子曰夫道可傳而不可受可得而不可見傅説得之以相武丁奄有天下乘東維騎箕尾而比於列星列子曰星積氣之中有光耀者抱朴子曰辰星水精生𤣥武嵗星木精生青龍又人初受氣皆秉列星之精值聖宿則聖值賢宿則賢也尸子曰自井中視星所見不過數星自丘山以望則見始多也非明益也勢使然也私井中也公丘}
  - {type: page-break, offset: 2144, content: '', id: KR3k0012_WYG_006-10a, image: WYG0893/WYG0893-0084c.png}
