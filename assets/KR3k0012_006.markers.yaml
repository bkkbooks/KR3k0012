  - {type: variant, offset: 2140, length: 0, content: '', WYG: 大理星在斗中亦為貴人牢又為執法之宫又曰庫樓十五星在左角南噐府東一名天庫兵車之府星芒角兵起又曰招揺一星在梗}
  - {type: variant, offset: 2141, length: 1, content: 鼓, SBCK: 鼔}
  - {type: variant, offset: 2141, length: 1, content: 鼓, WYG: 北主逺狄芒角則兵起又曰貫索九星在七公前為賤人牢牢旦星為門門欲開開即有赦星總見獄事繁豫章列士傳曰周騰字叔逹為御史桓帝欲南郊平明出叔達仰首曰王者象星今宫中宿策馬星不出動帝何出焉四更王子卒遂止關令内傳曰北斗一星面百里相去九千里置二十四氣四宿行四時五方立五星主五岳也黄石公記曰黄石鎮星之精也王子年拾遺記曰禹鑄九鼎擇雌金為隂鼎雄金為陽鼎}
