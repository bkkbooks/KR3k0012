  - {type: variant, offset: 2851, length: 12, content: 朔死上問使者對曰朔是木帝, WYG: 興惟張茂先於天文尤}
  - {type: variant, offset: 2852, length: 348, content: 死上問使者對曰朔是木帝精為歲星下遊人中以觀天下非陛下臣也漢書音義曰瑞星曰景星亦日德星妖星曰孛星彗星長星亦曰攙搶絕跡而去曰飛星光跡相連曰流星亦曰奔星星光曰芒後漢書曰嚴光字子陵與光武為友後光武登阼忘之光怨帝是時太史云天上有客星恨帝帝曰豈非朕故人嚴子陵乎遽命徵之夜與子陵共臥光以腳加帝腹太史奏客星侵御座子陵縮腳客星尋退竟不仕又曰李固對詔陛下有尚書猶天之有北斗北斗天之喉舌尚書陛下之喉舌斟酌元氣運乎四時出納王命所為制氣之臣也又曰和帝分遣使者二人各至州郡觀採風謠二人當到益州投候館吏李郃舍郃問曰二君發京師時知朝廷遣二使耶問何以知之郃指星云前有二星向益州分野謝承後漢書曰吳郡周敞師事京房房為石顯所譖繫獄謂敞曰吾死後四十日客星必入天市即吾無辜之驗也房死後果如房言東觀漢書記曰光武破聖公與伯叔書曰交鋒之日神星晝見, SBCK: ''}
