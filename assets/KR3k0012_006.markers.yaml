  - {type: variant, offset: 77, length: 828, content: 辰形況山川草木書曰堯乃命羲和欽若昊天曆象日月星辰敬授人時又曰日中星鳥以殷仲春又曰庶民惟星星有好風星有好雨星民象故眾民惟若星箕星好風畢星好雨亦民所好也月之從星則以風雨月經於箕則多風離於畢則多雨政教失常以從民欲亦所以亂也詩曰晥彼牽牛不以服箱注晥明星貌河鼓謂之牽牛也又曰維南有箕不可以簸揚維北有斗不可以挹酒漿又曰東有啟明西有長庚日旦出謂明星為啟明日既入謂明星為長庚庚續也又曰嘒彼小星三五在東三心也五噣也嘒微明貌噣音晝柳也又曰子興視夜明星有爛又曰三星在戶又曰月離于畢俾滂沱矣又曰定之方中作于楚宮定營室星也又曰維南有箕載翕其舌維北有斗西柄之揭又曰昏以為期明星煌煌禮曰八月中氣是月也命有司享壽星於南郊又曰十二月是月也日窮于次月窮于紀星回于天又曰幽禜策祭星也又曰天秉陽垂日星又曰宿離不忒無失經紀注二十八宿為經七曜為紀周禮曰保章氏掌天星以志星辰日月之變動以觀天下之遷辨其吉兇以星土辨九州之地所封封域皆有分星以觀祅祥左傳曰魯莊公七年夏四月辛卯夜恒星不見夜中星隕如雨與雨偕也又曰魯僖公五年晉侯復假道於虞以伐虢問於卜偃曰吾其濟乎對曰克之童謠云丙子之晨龍尾伏辰杜預曰龍尾是尾星也又曰十六年春隕石于宋五隕星也又曰魯襄公二十八年春無冰梓慎曰今茲宋鄭其饑乎歲在星紀星紀在田而淫於玄枵玄枵在子虛危之次星紀斗牛之次以有時災陰不堪陽虵乘龍龍歲星木也木為青龍蛇為玄武龍失次也龍宋鄭之星也宋鄭必饑玄枵虛中也枵耗名也土虛而民耗不饑何為又曰昔高辛氏有二子長曰閼伯季曰實沉居于曠林不相能也日尋干戈以相征討后帝不臧后帝堯也臧善遷閼伯于啇丘主辰啇丘宋地也主祀辰星辰大火也啇人是因故辰為啇星啇人湯先祖封啇丘因閼伯故國祀辰星遷實沉于大夏主參大夏今晉陽縣也唐人是因故參為晉星又曰火中寒暑乃退心以季夏昏中而暑退季冬旦中而寒退又曰昭三十二年吳伐越史墨曰不及四十年越其有吳乎越得歲而吳伐之必受其兇穀梁傳曰列星曰恒星亦曰經星恒經皆常也爾雅曰星紀斗牽牛也玄枵虛也又曰祭星曰布布散食於地上又曰西陸昴也郭璞曰昴西方之宿別名旄頭, SBCK: ''}
