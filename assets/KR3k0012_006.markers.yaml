  - {type: variant, offset: 2210, length: 0, content: '', SBCK: 在昴北主䜛佞言語之吏􅀂移動多口舌兵起星繁天下兵亂星少兵廢又曰天䜛星在卷舌中亦主誹謗又曰天禀四星在昴南主積聚􅁰稷供享祀及御膳星明豐暗儉又曰天苑十六星在昴畢如環狀主天子苑囿五星守犯牛馬死又曰參旗九星在參畢間一曰天弓星不欲明明則白衣㑹邊兵動又曰闕丘二星在南河主天子門闕諸侯之兩觀也又}
