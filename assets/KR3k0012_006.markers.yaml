  - {type: variant, offset: 2342, length: 409, content: 五事貌也仁虧失逆春令傷木氣罰見歲星熒惑南方夏禮也視也禮也視失逆夏令傷火氣罰見熒惑太白西方秋義也言也義虧失逆秋令傷金氣罰見太白太白經天孟康注曰謂出東入西出西入東也太白陰星出東當伏西過午為經天晉灼曰星盡見午為經天天下兵革民更主是謂亂紀人民流亡晝見與日爭明強國弱小國強女主昌辰星北方冬智也聽出智虧聽失逆冬令傷水氣罰見辰星鎮星中央土主季夏信也思心也仁義禮智以信為主貌言視聽以心為正四星皆失鎮星乃為之動又曰凡五星色皆白為喪為兵為旱青為憂為水黑為疾多死黃吉五星同色天下偃兵百姓安寧歌舞以行不見災疾五穀蕃昌又曰天星皆有州圖分野角亢氐房心豫州之分尾箕幽州之分牽牛婺女楊州之分虛危青州之分營室東壁并州之分胃徐州之分畢昴冀州之分觜參益州之分東井輿鬼雍州之分柳七星張三河之分翼軫荊州之分折木之津燕之分大火宋之分壽星鄭之分鶉尾楚之分鶉火周之分鶉首秦之分分實沉魏之分大梁趙之分降婁魯之分訾即移反娵子于反衛之分玄枵齊之分星紀吳之分太史掌之以觀祅祥, SBCK: ''}
