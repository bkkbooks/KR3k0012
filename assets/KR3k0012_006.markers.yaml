  - {type: variant, offset: 2754, length: 0, content: '', SBCK: 胡亥立日月薄食山林淪亡枉矢光夜熒惑襲月景帝通紀曰彗星者天}
  - {type: variant, offset: 2754, length: 0, content: '', krp: 胡亥立日月薄食山林淪亡枉矢光夜熒惑襲月景帝通紀曰彗星者天}
  - {type: variant, offset: 2755, length: 1, content: 於, SBCK: 之旂也國精符曰地爲山川山川之精上爲星各應其州城分野爲國作精神符驗也五姓占曰君薄德義懦弱不勝任則太白失度經天作變易之象樂汁圖曰天宫紫微宫也鈎陳後宫也大當正妃也大當鈎陳末大星也閣道北斗輔天理貴人牢爲貴人作牢獄也文昌宫天五曹㑹府也􅀇戈招揺也皆備兵難之星梗河天矛也梗河一名天矛織女連營賤人牢連營貫索咸池五車五車咸池别名天􅀜叅旗伐也觜觹天廟也奎天豕也天矢婁也胃天倉也狼弧魚陵天􅂳天苑卷舌天老人皆西方星名也栁主材木栁星主材木也鄭􅀇注曰日月遺其珠囊珠謂五星也遺其囊者盈縮失度也黃石公隂謀祕訣法曰熒惑者火之精御史之象主禁令刑罰蔡邕月令章句曰}
  - {type: page-break, offset: 2755, content: '', id: KR3k0012_SBCK_006-7a}
  - {type: variant, offset: 2755, length: 1, content: 於, krp: 之旂也國精符曰地爲山川山川之精上爲星各應其州城分野爲國作精神符驗也五姓占曰君薄德義懦弱不勝任則太白失度經天作變易之象樂汁圖曰天宫紫微宫也鈎陳後宫也大當正妃也大當鈎陳末大星也閣道北斗輔天理貴人牢爲貴人作牢獄也文昌宫天五曹㑹府也玄戈招揺也皆備兵難之星梗河天矛也梗河一名天矛織女連營賤人牢連營貫索咸池五車五車咸池别名天關叅旗伐也觜觹天廟也奎天豕也天矢婁也胃天倉也狼弧魚陵天船天苑卷舌天老人皆西方星名也栁主材木栁星主材木也鄭玄注曰日月遺其珠囊珠謂五星也遺其囊者盈縮失度也黃石公隂謀祕訣法曰熒惑者火之精御史之象主禁令刑罰蔡邕月令章句曰}
  - {type: punctuation, offset: 2758, content: ，, id: KR3k0012_CHANT_006-bkkpn1029}
  - {type: 'tls:seg', offset: 2758, content: '', id: KR3k0012_CHANT_006-52a.4}
  - {type: variant, offset: 2758, length: 0, content: '', SBCK: 五獸之於五事也左有蒼龍大辰之㒵右有白虎大梁之文前有朱雀鶉火之體後有􅀇武􅀛蛇之質中有大角軒轅麒麟之信風俗通曰月與星並無光日照之乃光耳如以鏡照日則影見壁月初見西方月望後光見}
