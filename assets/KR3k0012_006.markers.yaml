  - {type: variant, offset: 2124, length: 2, content: 攜連, WYG: 街南為華夏之國街北為戎夷之國又玉井四星在參西主水泉石氏星經曰卷舌六星在昴圵主䜛佞言語之吏若移動多口舌兵起舌直天下無口舌星繁天下兵亂星少兵廢又天䜛星在卷舌中亦主誹謗又天廪四星在昴南主積聚黍稷供享祀及御膳稷星明豐暗儉又天苑十六星在昴畢如環状主天子苑囿五星守苑牛馬死又叅謀九星在參畢間一曰天弓星不欲明明則白衣㑹邊兵動又曰闕丘二星在南河主天子門闕諸侯之兩觀}
