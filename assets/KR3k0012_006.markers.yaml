  - {type: variant, offset: 2129, length: 4, content: 營室為清, SBCK: 宦者四星次帝座西南主侍者帝旁閹人也占以不明則􅁻􅀂明則内臣專權又曰􅀔四星在太陽西北主刑餘人而用事者也占以不明爲吉􅀂明則閹官用權又曰輔一星附北斗杓第六星大臣之象也占欲其小而明則吉􅀂大而明則臣奪君政􅀂小而不明則臣不任職􅀂明大與斗合者則國兵暴起又曰八榖八星在紫微蕃之外五車之北其八星一主稻二主􅁰三主大麥四主大豆五主小豆六主小麥七主粟八主麻子占其明則八榖成􅀂暗則不成􅀂一星不見則一榖不登􅀂八星不見則國人有糊口之憂又曰房四星去氐十五度爲明堂布政之宫占􅀂移徙則國流逆均明則天下大同又曰傅􅀃一星在尾後河中也蓋後宫女巫也主祝祠神靈祈禱以求子胤占􅀂大而明則後宫多禱祈又曰杵三星在箕南主舂杵之用占􅀂其縱則爲豐􅀂其撗則爲飢又曰農丈人一星在南斗南主農正官也占明則爲豐稔􅀂暗則爲飢歉又曰南斗六星去牽牛二十六度四分之一爲天}
  - {type: page-break, offset: 2129, content: '', id: KR3k0012_SBCK_006-3a}
  - {type: variant, offset: 2129, length: 2, content: 營室, WYG: 文昌六星如半月形斗魁前}
  - {type: variant, offset: 2129, length: 4, content: 營室為清, krp: 宦者四星次帝座西南主侍者帝旁閹人也占以不明則吉若明則内臣專權又曰勢四星在太陽西北主刑餘人而用事者也占以不明爲吉若明則閹官用權又曰輔一星附北斗杓第六星大臣之象也占欲其小而明則吉若大而明則臣奪君政若小而不明則臣不任職若明大與斗合者則國兵暴起又曰八榖八星在紫微蕃之外五車之北其八星一主稻二主黍三主大麥四主大豆五主小豆六主小麥七主粟八主麻子占其明則八榖成若暗則不成若一星不見則一榖不登若八星不見則國人有糊口之憂又曰房四星去氐十五度爲明堂布政之宫占若移徙則國流逆均明則天下大同又曰傅說一星在尾後河中也蓋後宫女巫也主祝祠神靈祈禱以求子胤占若大而明則後宫多禱祈又曰杵三星在箕南主舂杵之用占若其縱則爲豐若其撗則爲飢又曰農丈人一星在南斗南主農正官也占明則爲豐稔若暗則爲飢歉又曰南斗六星去牽牛二十六度四分之一爲天}
  - {type: variant, offset: 2132, length: 6, content: 清廟亦曰離宮, WYG: 天府主天下集計事第一星名上將第二名次將第三名貴相第四名司祿第五名司命第六名司法星光潤則天下安}
