  - {type: variant, offset: 1119, length: 271, content: 出氣尾為逃臣賢者叛十二諸侯列於庭元命苞曰五諸侯此云十二則兼他星為數也禮稽命圖曰作樂制禮得天心則景星見也禮斗威儀曰鎮星黃時則祥風至春秋說題辭曰星之為言精也榮也陽之精也陽精為日日分為星故其字日生為星春秋元命苞曰直弧北有一大星為老人星見則治平主壽亡則君危主亡常以秋分候之又曰啇紂之時五星聚於房房者蒼神之精周據而興又曰玉衡北兩星為玉繩玉之為言溝刻也瑕而不掩折而不傷宋均注曰繩能直物故名玉繩溝謂作器又曰心三星五度有天子明堂布政之宮又曰尾九星箕四星為後宮之場列為南宮其庭太微又曰蟾蠩陰精流生織女立地侯宋均注曰地侯鎮星別名也又曰三台星色齊君臣和不齊大乖春秋, SBCK: 法}
