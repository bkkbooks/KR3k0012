  - {type: variant, offset: 2114, length: 1, content: 杓, SBCK: 正星主陽德天子之象二曰璿亦曰法星主隂刑女主之位三曰璣亦曰令星主禍四曰權亦曰伐星主天理伐無道五曰衡亦曰殺星主中央助四旁殺有罪六曰開陽亦曰應星又一主天二主地三主火四主水五主土六主木七主金又一主秦二主楚三主梁四主呉五主隋六主燕七主齊又曰文昌六星在北}
  - {type: page-break, offset: 2114, content: '', id: KR3k0012_SBCK_006-2b}
  - {type: variant, offset: 2114, length: 1, content: 杓, WYG: 正是主陽徳天子之象二曰璿亦曰法星三隂則女主之位三曰璣亦曰合星主福四曰權亦曰伐星主天理伐無道五曰衡亦曰殺星主中央助四旁殺有罪六曰開陽七曰應星又一主天二主地三主火四主水五主土六主木七主金又一主秦二主楚三主梁四主吳五主隋六主燕七主齊又文昌六星在圵斗魁前如匡形故史遷曰斗魁戴匡其第六星名曰司禄此天之府計集所㑹也又宦者四星次帝座西南主侍者帝旁閹人也占以不明則吉若明則内臣專權又勢四星在太陽西南主刑餘人而用事者也占以不明為吉若明則閹宦用權又輔一星附圵}
  - {type: page-break, offset: 2114, content: '', id: KR3k0012_WYG_006-4a, image: WYG0893/WYG0893-0081c.png}
  - {type: variant, offset: 2114, length: 1, content: 杓, krp: 正星主陽德天子之象二曰璿亦曰法星主隂刑女主之位三曰璣亦曰令星主禍四曰權亦曰伐星主天理伐無道五曰衡亦曰殺星主中央助四旁殺有罪六曰開陽亦曰應星又一主天二主地三主火四主水五主土六主木七主金又一主秦二主楚三主梁四主呉五主隋六主燕七主齊又曰文昌六星在北}
