  - {type: variant, offset: 2157, length: 176, content: 曰高帝七年月暈圍參畢七重占曰畢昴間天街也街北胡也街南中國也後有平成之圍又曰太微之十二星東相西將又曰戴王六星曰文昌宮一曰上將二曰次將三曰貴相四曰司命五曰司祿六曰司災又曰危東六星兩兩而比曰司寇又曰古人有言曰天下太平五星循度又曰革命創制三章是紀應天順人五星同軓又郊祀志曰漢祖詔御史令天下立靈星祠常歲時祠以牛又曰天文志曰金木水火土五星天之五佐為經緯伏見有時歲星, WYG: ''}
