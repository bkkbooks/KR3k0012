  - {type: variant, offset: 2258, length: 0, content: '', krp: 自井中視星所見不過數星自丘上以望則見始岀也非明益也勢使然也私井中也公丘上也淮南子曰太微者太一庭也紫宫者太一之居也軒轅者帝妃之舎也咸池者水魚之囿也}
  - {type: variant, offset: 2259, length: 3, content: 下太平, SBCK: 河者羣神之闕也天河星名也闕猶門也又曰令雨師灑道使風伯掃塵髙誘注曰雨師畢星也風伯箕星也又曰歳星之所居五榖豐昌其對爲衡􅀊乃殃又曰四守者所司賞罰許愼注曰四守紫宫軒轅咸池天河也家語曰巫馬期爲單父令戴星出入以理人劉向􅀃苑曰􅀇象著明莫大於日月察變之動莫著於}
