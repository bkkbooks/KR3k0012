  - {type: variant, offset: 2999, length: 426, content: 座子陵縮腳客星尋退竟不仕又曰李固對詔陛下有尚書猶天之有北斗北斗天之喉舌尚書陛下之喉舌斟酌元氣運乎四時出納王命所為制氣之臣也又曰和帝分遣使者二人各至州郡觀採風謠二人當到益州投候館吏李郃舍郃問曰二君發京師時知朝廷遣二使耶問何以知之郃指星云前有二星向益州分野謝承後漢書曰吳郡周敞師事京房房為石顯所譖繫獄謂敞曰吾死後四十日客星必入天市即吾無辜之驗也房死後果如房言東觀漢書記曰光武破聖公與伯叔書曰交鋒之日神星晝見太白清明蜀志曰漢安二十五年劉豹向舉上言於先主曰乃年太白熒惑鎮從歲漢初興五星聚歲星主義漢位在西義之上方故漢法常以歲星候人主當有聖主起於此以致中興頃者熒惑復追歲見在胃昴為天維經曰帝星處之眾邪消亡於是先主即位續晉陽秋曰桓玄庶母馬氏本袁真之妓也與同列薛氏郭氏夏夜同出月下有銅甕水在其側見一流星墮瓮甕中驚喜共視見星如二寸火珠於水底冏然明凈乃相謂曰此吉祥也誰當應之於是薛郭更以瓢接取并不得馬最後取星正入瓢中便飲之既而若有感焉俄而懷玄玄雖纂位不終而數年之中榮貴極矣, WYG: 覽卷六}
