  - {type: 'tls:seg', offset: 2118, content: '', id: KR3k0012_CHANT_006-43a.9}
  - {type: variant, offset: 2118, length: 0, content: '', WYG: 占欲其小而明則吉若大而明則臣奪君政若小而不明則臣不任職若明大與斗合者則國兵暴起又八榖八星在紫㣲藩之外五軍之北其八星一主稻二主黍三主大麥四主大豆五主小豆六主小麥七主粟八主麻子其占明則八榖成若暗則不成若一星不見則一榖不登若八星不見則國人有餬口之憂又房四星去氐十五度為明堂布政之宫占若移徙則國流逆均明則天下大同又傅説一星在尾後河中也蓋後宫女巫主祝祠神靈祈禱以求子嗣占若大而明則後宫多祈禱又杵三星在箕南主舂杵之用占若其縱則為豐若其横則為饑又農丈人一星在南斗南主農正官也占明則為豐稔若暗則為歉又南斗六星去牽牛二十六度四分之一為天廟丞相太宰之位主薦賢良授爵禄又主兵機魁南二星為天梁中央二星為天相北二星杓曰天厨庭亦為夀命之期將有天子之事其占斗星盛明則王道和平爵禄行若不然反是也又河鼓三星在牽牛北主軍鼓蓋天子三將軍也中央大將軍也其南左星左將軍也其圵右星右將軍也所以備關梁而拒難也昔傳牽牛織女七月七日相見者則主是也故爾雅云河鼔謂之牽牛又古歌曰東飛伯勞西飛燕黄姑織女時相見其黄姑者即河鼓也為吳音訛而然今之言者謂是列舍牽牛而㑹織女故為此分析令知斷其疑焉又曰四星在人星東南主舂臼占者覆則歲中人饑荒若仰則天下熟又内杵三星在人星旁主軍糧若占正月杵對臼口則吉若偏與臼不相當則軍糧絶又漸臺四星屬織女左足主晷刻律吕占若明正則隂陽調而律吕和不然則否也又弧九星在狼東南謂天方也主備盗賊常屬天向狼星又天錢十星在北落西北主財帛所聚占若明則府藏盈若不明則為虛耗又東璧二星去宫室十六度天子圖書之秘府也占若明則圖書集道術行小人退君子入若不然則天子好武臣賤文士稽古忠正之臣隱親黨邪曲之人用也又羽林四十五星二三而聚在壘壁南主天軍占若星聚明則國安寧若星稀而動揺則兵革出又進賢一星在太㣲宫東華門東平之道西主訪賢薦士也占若明則賢人進若不明則否也又太㣲宫垣十星在翼軫圵主天子之宫庭五帝之佐十二諸侯府也其外藩南二星間名曰端門東門一星為左執法廷尉之象又軒轅十七星在七星北如}
