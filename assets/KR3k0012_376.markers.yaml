  - {type: variant, offset: 935, length: 1, content: 骨, SBCK: 有故乎對曰國人皆以君安野而好獸公曰夫以獄訟不正則太士子牛存焉社稷宗廟不享則太祝子游存矣倉廪不實申田存矣國家之有餘不足騁乎則吾子存焉寡人有吾子猶心有四支故心得佚晏子曰􅀂心有四支而得佚則可令四支一日無心乎公罷田而返又曰崔杼殺莊公敢不盟者㦸鈎其頸劒承其心晏子不與盟而出上車其僕將馳晏子撫其手曰鹿生於山野命懸於庖厨嬰命有所懸矣成節而去又曰一心可以事百君百心不可以事一君仲尼聞之曰小子記之晏子以一心事百君文子曰心者形之主也神者心之寳也列子曰魯公扈趙嬰齊同見扁鵲鵲曰公扈志強而氣弱足於謀而寡斷嬰齊志弱而氣強故少於慮而傷於專􅀂換汝之心則均於善矣遂飲二人毒酒迷死三日剖􅅐探心易而置之救以神藥旣寤如􅀄於是公扈反嬰齊之室而有其妻子妻子不識嬰齊反公扈之室而有其妻子妻子亦不識也又曰龍叔謂文摯曰吾有疾子能巳乎文摯乃命龍叔背明而立文摯從而向明理望之旣而曰噫見子之心矣方寸之地虚矣幾聖人也子心六孔通流一孔不逹舊􅀃聖人心有七孔今聖智爲病者或由此乎孟子曰人皆知糞其田莫知糞其心糞田不過苗利得粟糞心易行而得所欲何謂糞心􅀶學多聞何謂易行一欲止淫又曰見􅐐子入井皆有惻隠之心非子父母也無此心者非人也無善惡之心非人也莊子曰孔子曰凡人心險於山川難知於天又曰萬惡不可納於靈臺司馬注曰心爲神聖之臺又曰至人之用心􅀂鏡郭象注曰鑒物無錯不將不迎應而不藏來即應去即止韓子曰西門豹性急佩韋以自緩巳董安于心緩佩弦以自急子思子曰百心不可得一人一心可得百人孫卿子曰君子之學入乎耳著乎心布乎四支動静皆可爲法}
