  - {type: variant, offset: 3644, length: 1, content: 枕, SBCK: 恣畿縣尤甚發使安之談藪曰徐摛好爲躰語甞躰一人病㿈曰朱}
  - {type: variant, offset: 3644, length: 1, content: 枕, WYG: 恐畿縣尤甚發使安之談藪曰徐擒好為體語嘗體一人病癰曰朱}
