  - {type: variant, offset: 3654, length: 6, content: 貴賤男女皆斬, SBCK: 所疑惑水亦進而不惑北方水故腎黒隂故腎􅀟居膽說文曰膽連肝}
  - {type: variant, offset: 3654, length: 6, content: 貴賤男女皆斬, WYG: 所疑惑水亦進而不惑北方水故腎黒隂故腎雙膽説文曰膽連肝}
