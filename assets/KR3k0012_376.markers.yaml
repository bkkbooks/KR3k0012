  - {type: variant, offset: 2392, length: 352, content: 問其故扁鵲曰疾之居腠理也湯熨之所能及在血脈鍼石所能及在腸胃酒醪之所能及其在骨髓雖司命無奈之何也今疾在骨髓臣是以無請也後五日桓侯體病使人召扁鵲鵲已逃去桓侯遂死又曰勾踐頓首再拜荅子貢曰孤嘗不料力乃與吳戰困於會稽痛入於骨髓帝王世紀曰紂斬朝涉之脛而觀其髓酈善長水經注曰淇水歷汲郡西南出朝歌城西北東南逕朝歌臺下俗謂之陽河水也紂在臺見老人晨將渡水而沉吟難濟紂問其故左右曰老者髓不實故畏寒紂乃於此斮脛而視髓腦左傳僖下曰晉文公夢與楚王搏楚子伏己而鹽其腦子犯曰吉我得天楚伏其罪吾且柔之矣杜預注云腦能柔物春秋元命苞曰腦之為言在也人精在腦韓詩外傳曰禽息秦大夫薦百里奚不見納繆公出當車以頭擊闑五結切腦乃精出曰臣生無補於國不如死也繆公感寤而用百里奚秦以大化史記曰昔趙襄子以其姊為代王妻後與王遇於句注之塞廚人進斟因反斗以擊代王殺之王, SBCK: 肝}
