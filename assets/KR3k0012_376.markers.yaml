  - {type: variant, offset: 1847, length: 209, content: 吾言為不誠試入診太子當聞其耳鳴而鼻張揗其兩股以至於陰當尚溫也中庶子聞入報虢君虢君大驚出見扁鵲於中闕扁鵲曰若太子病者所謂尸蹶者也是以陽脈下遂音隊陰脈上爭會氣閉而不通陰上而陽內行下內鼓而不起上外絕而不為使上有絕陽之絡下有破陰之細破陰絕陽色廢脈亂形靜如死狀太子未死也又曰扁鵲過齊齊桓侯客之入朝見曰君有疾在血脈不治恐深桓侯曰寡人無疾又曰齊太倉公淳于意少而喜醫更師同郡元里陽公受其脈書上下經五診奇音羈咳音咳術揆度陰陽診病知人死生, SBCK: 壽終}
