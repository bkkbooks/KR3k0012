  - {type: variant, offset: 3641, length: 2, content: 橫屍, SBCK: 權後殺詡食其肝括地圗曰細民肝不朽死八年復生穴處衣皮莊子曰盗跖居太山膾人肝而食之吕氏春秋曰衛懿公有臣弘演有所使翟人攻衛殺懿公盡食其肉獨舎其肝弘演至報使見肝盡哀而止曰臣請爲襮音􅀶因自殺先出其肝内公之肝齊桓公聞之復衛髙誘注曰襮表也賈子曰武王伐紂紂闘而死棄之王門外民蹈其腹蹙其腎踐其肺履其肝武王以幃守之民褰而入以石抵之者猶未止唐書曰天寳三年有星如月墜于東南墜後有聲京師訛言官遣棖捕人肝以􅀕天狗人}
  - {type: page-break, offset: 3641, content: '', id: KR3k0012_SBCK_376-7b}
  - {type: variant, offset: 3641, length: 2, content: 橫屍, WYG: 權後殺詡食其肝括地圖曰細民肝不朽死八年復生穴處衣皮莊子曰盜跖居太山膾人肝而食之吕氏春秋曰衛懿公有臣宏演有所使翟人攻衛殺懿公盡食其肉獨舍其肝宏演至報使見肝盡哀而止曰臣請為襮音博因自殺先出其肝内公之肝齊桓公聞之復衛髙誘注曰襮表也賈子曰武王伐紂紂鬪而死棄之王門外民陷其腹蹙其腎踐其肺覆其肝武王以幃守之民褰而入以石抵之者猶未止唐書曰天寳三年有星如月墜于東南墜後有聲亰師訛言官遣掁捕人肝以祭天狗人}
  - {type: page-break, offset: 3641, content: '', id: KR3k0012_WYG_376-12a, image: WYG0896/WYG0896-0351c.png}
