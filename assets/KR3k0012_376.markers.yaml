  - {type: punctuation, offset: 4873, content: 「, id: KR3k0012_CHANT_376-bkkpn1633}
  - {type: variant, offset: 4873, length: 0, content: '', SBCK: 欲得長生腸中清欲得不死腸無屎白虎通曰大賜小腸心之府也主禮禮有分理腸亦大小相承受也王子年拾遺録曰北有浣腸之國從口中引腸出出而浣濯之更遞易其五藏浣畢嘯慠而飛焉楚辭九章曰惟郢路之遼逺腸一夕而九廻膀胱廣雅曰膀胱謂之脬音胞釋名曰胞歩交切也鞄虚空之言也主以虚承水汋也或曰膀胱言體短而横廣也脬與胞同音春秋元命苞曰膀胱者肺之府也肺者断決膀胱亦常張有勢故膀胱決難也凥說文曰睢凥也脽音誰釋名曰凥廖也所在寥牢􅀷也漢書曰文帝甞夢欲上天不能有一黄頭郎推之上天顧見其衣凥帶後穿師古曰衣凥帶後謂衣當凥上而居革帶之下處也覺而之漸臺以夢中隂目求推者郎見鄧通其衣後穿夢中所見也召問其姓名文帝甚恱尊幸之王隠晉書曰成都王攻洛大駕幸北城上觀看孟豺軍}
  - {type: page-break, offset: 4873, content: '', id: KR3k0012_SBCK_376-11b}
