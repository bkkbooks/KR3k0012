  - {type: variant, offset: 41, length: 10, content: 延陵季子適齊長子死葬, SBCK: 有言逆于汝心必求諸道人以言咈違汝心必以道義求其意勿拒逆之又􅀃命曰啓乃心沃朕心又泰誓曰受有臣億萬惟億萬心人執異心不和諧予有臣三千惟一心三千一心言同欲又曰斮朝渉之脛剖賢人之心又酒誥曰誕惟厥縱淫泆于非彛用燕喪威儀民罔不䀌傷心又周官曰作徳心逸日休作僞心勞日拙爲德直道而行}
