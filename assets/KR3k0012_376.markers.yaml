  - {type: variant, offset: 4707, length: 152, content: 志曰戰鬭死亡處有人馬血積年化為燐燐著地及草木如霜露略不可見人行或有觸著體便有光拂拭便分散無數又細咤聲如沙豆住久乃滅其人忽忽如失魂經日乃差憐音鄰又音吝三輔舊事曰武帝發兵攻太子連鬭五日白虎闕前溝中血沒足世說曰阮步兵居喪不率禮而志孝稱當葬母先食肫飲酒然後臨訣而哭直云人言窮我將窮矣因吐血一升氣絕不知人彌時乃蘇膏, SBCK: 也}
