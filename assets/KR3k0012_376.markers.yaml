  - {type: variant, offset: 3883, length: 0, content: '', WYG: 敵公曰紹志大而智小色厲而膽薄土地雖廣糧食豐適所以為奉吾也吳志曰吕蒙病篤孫權問曰卿如不起誰可代者對曰朱然膽有餘愚以為可任蒙卒權假朱然節鎮江陵又曰朱然長不過七尺氣候分眀内行脩潔其所文彩唯施軍器餘皆質素終日欽欽常存戰塲臨急膽定尤過絶人管輅别傳曰輅年十五琅耶太守單子春雅有才度欲見輅輅造之客百餘人有能言之士輅謂子春曰府君名士加有䧺貴之姿輅既少年膽未堅剛懼失精神若欲相觀先飲三升清酒然後敢言子春大喜酌三升獨使飲之於是輅與人人對}
