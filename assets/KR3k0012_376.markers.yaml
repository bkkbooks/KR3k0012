  - {type: variant, offset: 4873, length: 0, content: '', WYG: 欲得長生腸中清欲得不死腸無屎白虎通曰大腸小腸心之府也主禮禮有分理腸亦大小相承受也王子年拾遺録曰北有浣腸之國從口中引腸出出而浣濯之更易其五臓浣畢嘯傲而飛焉楚辭九章曰惟郢路之遼逺腸一夕而九廻膀胱廣雅曰膀胱胃之脬音胞釋名曰胞􅀈歩交切也􅀈虛空之言也主以虛承水汋也或曰膀胱言體短而横廣也脬與胞同音春秋元命苞曰膀胱者肺之府也肺者斷决膀胱亦常張有勢故膀胱决難也尻説文曰睢尻也睢音誰釋名曰尻寥也所在寥牢深也漢書曰文帝嘗夣欲上天不能有一黄頭郎推之上天顧見其衣尻帶後穿師古曰衣尻帶後謂衣當尻上而居革帶之下處也覺而之漸臺以夣中隂目求推者郎見鄧通其衣後穿夣中所見也召問其姓名文帝甚悦尊幸之王隠晉書曰成都玉攻洛大駕幸北城觀上㸔孟豺軍}
