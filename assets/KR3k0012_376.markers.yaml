  - {type: variant, offset: 3405, length: 208, content: 石至公卿間輒出石叩頭其上流血覆面父繫得免虞預晉書曰元康元年河間成都二王舉兵向京都朝廷北討徵嵇紹為侍中王旅不振敗績於蕩陰百官侍衛莫不潰散唯紹以身捍寇兵突御輦飛矢雨集紹遂被害於帝側血濺御服及定左右欲浣衣帝曰此嵇侍中血勿去又曰丞相府斬督運令史淳于伯血逆流著柱終柱末二丈三尺旋復流下四尺五寸百姓咸稱其冤晉書張軌傳曰漢末金城人陽成遠殺太守以叛郡人馮忠赴屍號哭歐血而死又曰桓溫父彝為韓晃所害涇令江播預焉溫時年十五枕戈泣血志在復讎, SBCK: 子混混刳肝生食之}
