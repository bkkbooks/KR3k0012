  - {type: variant, offset: 37, length: 2, content: 檀弓, SBCK: 禮運曰欲惡者心之大端也人藏其心不可測度也羙惡皆在其心不見其色也欲一以窮之舎禮何以哉又􅀕義曰致樂以治心則易直子諒之心油然生矣易直子諒之心生則樂樂則安安則乆乆則天天則神天則不言而信神則不怒而威致樂以治心者也又緇衣曰子曰民以君爲心君以民爲體心莊則體舒心肅則容敬心好之身必安之君好之民必欲之心以體全亦以體傷君以民存亦以民亡又大學曰欲脩其身者先正其心左傳莊公曰楚武王伐隨入告夫人鄧㬅曰余心蕩矣鄧㬅歎曰王禄盡矣􅄹而蕩天之道也故臨武事將發大命而蕩王心焉􅀂師徒無虧王薨於行國之福也王遂行卒於樠音門木之下又昭公五年曰周景王鑄無射泠州鳩曰王其以心疾死乎毛詩柏舟曰我心匪石不可轉也我心匪席不可卷也又谷風曰習習谷風以隂以雨黽勉同心不冝有怒又小弁曰我心憂傷惄焉如擣又巧言曰他人有心予忖度之周易上繫曰二人同心其利斷金尚書仲虺之誥曰以義制事以禮制心又太甲}
