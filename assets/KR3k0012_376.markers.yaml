  - {type: variant, offset: 4436, length: 252, content: 天下之半戰於涿鹿之野血流漂杵山海經曰禹堙洪水殺相繇其血腥臭不可生五穀以其地為臺相繇一名相仰春秋後語曰燕太子丹豫求天下名利匕首得趙人徐夫人匕首取之百金使工以藥淬之以試人血濡縷無不立死者裴駰曰言以匕首傷人血出霑濡絲縷便立死讀如儒也說苑曰蔡威公閉門而哭三日泣盡而繼之以血幽明錄曰王伯陽亡其子營墓得三漆棺移置南堈夜夢魯肅瞋云當殺汝父尋復夢見伯陽云魯肅與弟爭墓後於坐褥上見數升血疑魯肅殺之故也墓今在長廣橋東一里汝南先賢傳曰陽安令趙規與朗陵太守黃萌爭水規割指詛曰隨血所流入陽安界萌忿殺規小吏王朔復剌殺萌朗陵官屬又殺朔, krp: 肺腸俾}
