  - {type: 'tls:seg', offset: 3661, content: '', id: KR3k0012_CHANT_376-59a.17}
  - {type: variant, offset: 3661, length: 2, content: 死者, SBCK: 府也史記曰呉旣赦越王勾踐返國苦身焦思置膽於坐卧即仰飲膽曰汝忘㑹稽之恥乎魏志曰樂進字文謙陽平衛國人容貌短小心膽烈從太祖爲帳下吏又曰􅀽紹在􅀺陽將南渡時程昱有七百兵守鄄城太祖使人告昱欲益}
  - {type: variant, offset: 3661, length: 2, content: 死者, WYG: 府也史記曰吳既赦越王勾踐返國苦身焦思置膽於坐卧即仰飲膽曰汝忘㑹稽之恥乎魏志曰樂進字文謙陽平衛國人容貌短小心膽烈從太祖為帳下吏又曰袁紹在黎陽將南渡時程昱有七百兵守鄄城太祖使人告昱欲益}
  - {type: page-break, offset: 3661, content: '', id: KR3k0012_WYG_376-14b, image: WYG0896/WYG0896-0352d.png}
  - {type: variant, offset: 3661, length: 12, content: 死者二十餘萬于時高鼻多鬚, krp: 吕氏春秋曰衛懿公有臣弘演有所使翟人攻衛殺懿公盡食其肉獨舎其肝弘演}
  - {type: variant, offset: 3664, length: 0, content: '', SBCK: 千兵昱不肯曰􅀽紹擁十萬衆自以所向無前今見昱兵少必不來攻太祖從之紹果不徃太祖謂賈詡曰程昱之膽過於賁育又曰􅀽紹旣并公孫瓉兼四州地衆}
  - {type: page-break, offset: 3664, content: '', id: KR3k0012_SBCK_376-9a}
  - {type: variant, offset: 3664, length: 0, content: '', WYG: 千兵昱不肯曰袁紹擁十萬衆自以所向無前今見昱兵少必不来攻太祖從之紹果不往太祖謂賈詡曰程昱之膽過賁育又曰袁紹既并公孫瓚兼四州地衆}
  - {type: punctuation, offset: 3667, content: 。, id: KR3k0012_CHANT_376-bkkpn1284}
  - {type: 'tls:seg', offset: 3667, content: '', id: KR3k0012_CHANT_376-59a.18}
  - {type: variant, offset: 3667, length: 7, content: 于時高鼻多鬚至, SBCK: 諸將以爲不可敵公曰紹志大而智小色厲而膽薄土地雖廣糧食豐適所以爲奉吾也呉志曰吕蒙病篤孫權問曰卿如不起誰可代者對曰朱然膽}
  - {type: variant, offset: 3667, length: 153, content: 于時高鼻多鬚至有濫死者又北燕錄曰馮躍讌郡僚忽有血流左臂躍惡之從事中郎王乘因陳符命之應躍戒其勿言南史曰蕭叡明母病風積年沉臥叡明晝夜禱祈時寒下淚為冰叩頭血出亦為冰不溜陳書曰吳明徹殺王琳有一叟以酒脯來至號酹盡哀收其血懷之而去三國典略曰齊主於涼風堂召孝昭第二子百年遣左右亂捶擊之又令曳以遶堂所行之處血皆遍地又曰齊主, WYG: 諸}
  - {type: variant, offset: 3674, length: 93, content: 有濫死者又北燕錄曰馮躍讌郡僚忽有血流左臂躍惡之從事中郎王乘因陳符命之應躍戒其勿言南史曰蕭叡明母病風積年沉臥叡明晝夜禱祈時寒下淚為冰叩頭血出亦為冰不溜陳書曰吳明徹殺王琳有一叟以酒脯來至號酹, krp: 報使見肝}
  - {type: variant, offset: 3675, length: 1, content: 濫, SBCK: 餘愚以爲可任蒙卒權假朱然節鎮江陵又曰朱然長不過七尺氣􅀱分明内行修㓗其所文彩唯施軍器餘皆質素終日欽欽常存戰􅂣臨急膽定尤過絶人管輅別傳曰輅年十五琅耶太守單子春雅有才度欲見輅輅造之客百餘人有能言之士輅謂子春曰府君名土加有雄貴之姿輅旣年少膽未堅剛􅀂欲相觀懼失精神先飲三􅂛清酒然後而言子春大喜酌三􅂛獨使飲之於是輅與人人荅對言皆有餘趙雲別傳曰雲字子龍先主入益州雲留守營曹公爭漢中地運米北山下數千萬囊黄忠以爲可取過期不還雲將數十人出圍視忠值曹公揚兵大出爲前鋒所擊且却公軍散走巳復合雲䧟敵還入營更大開門偃旗鼔公疑雲有伏兵引去雲鼔震以戎弩於後射公軍公軍驚駭因相蹂踐墮漢水}
