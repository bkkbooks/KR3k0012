  - {type: variant, offset: 2789, length: 238, content: 壞爛死後踰一年方許收殮毛髮不落如生人焉神異經曰西荒中有人長短如人著百結敗衣手足虎瓜名摸豹見人獨自輒就人欲食腦先捕虱人伺其臥舌出槃地丈餘便燒石投其舌於是絕氣而死若不如此寤而輒食人腦列異傳曰陳倉有得異物其形不類豬不似羊莫能名以獻秦穆公道遇二童子曰此名為蝹述常在地下食死人腦若欲殺之以柏燒其頭蝹音襖西京雜記曰廣陵王胥有勇力恒於別囿學格熊後遂空手搏之陷腦而死血釋名曰血濊也流濊濊也濊乎會切禮記檀弓曰高子皋之執親之喪也泣血三年左傳莊公八年曰齊侯田于貝丘傷足喪屨反誅屨於徒人費弗得鞭之見血, SBCK: 可勝數}
