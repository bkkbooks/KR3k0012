  - {type: variant, offset: 3647, length: 0, content: '', SBCK: 黄膿晝冩斜看紫肺正視紅肝肺說文曰肺水藏也釋名曰肺勃也其氣勃鬱也毛詩蕩桒柔曰自有肺腸俾民卒狂􅀶物志曰鏐音留民其肺不朽百年復生白虎通曰肺所以義者何肺者金之精義者断決西方亦殺}
  - {type: page-break, offset: 3647, content: '', id: KR3k0012_SBCK_376-8a}
  - {type: variant, offset: 3647, length: 0, content: '', WYG: 黄膿晝寫斜看紫肺正視紅肝肺説文曰肺水藏也釋名曰肺勃也其氣勃欝也毛詩蕩桑柔曰自有肺腸俾民卒狂博物志曰鏐音留民其肺不朽百年復生白虎通曰肺所以義者何肺者金之精義者斷決西方亦殺}
  - {type: page-break, offset: 3647, content: '', id: KR3k0012_WYG_376-13a, image: WYG0896/WYG0896-0352a.png}
  - {type: variant, offset: 3648, length: 2, content: 渠誅, SBCK: 萬物故肺象金色白繫於鼻脾說文曰脾金藏也釋名曰脾禆也在胃下禆助胃氣主化榖也陳思王辨道論曰甘始論車師之西國兒生劈背出脾欲其食少而努行也白虎通曰脾之爲言併也所以併積氣又曰脾所以信何脾者土之精土尚任養萬物無所􅀻信之至也故脾象土色黄繫於舌腎說文曰腎水藏也釋名曰腎屬水主引水氣灌注}
  - {type: variant, offset: 3648, length: 2, content: 渠誅, WYG: 萬物故肺象金色白繫於鼻脾説文曰脾金藏也釋名曰脾禆也在胃下禆助胃氣主化穀也陳思王辨道論曰甘始論車師之西國兒生劈背出脾欲其食少而努行也白虎通曰脾之為言併也所以併積氣又曰脾所以信何脾者土之精土尚任養萬物無所私信之至也故脾象土色黄繫於舌腎説文曰腎水藏也釋名曰腎屬水主引水氣灌注}
  - {type: page-break, offset: 3648, content: '', id: KR3k0012_WYG_376-13b, image: WYG0896/WYG0896-0352b.png}
