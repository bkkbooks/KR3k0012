  - {type: variant, offset: 4871, length: 0, content: '', krp: 曰腸大小腸也釋名曰腸暢也暢胃氣去滓穢也史記曰聶政刺殺韓累因自披面抉眼自屠出腸遂以死又曰衛綰爲中郎將郎官有譴常蒙其罪不與他將爭有功常讓他將上以爲廉忠實無他腸後漢書曰董卓將兵擊韓遂詔徴卓爲少府不肯就上書言所將湟中義從及秦胡兵牽挽臣車使不得行羌胡弊腸狗態言羌胡心腸弊悪情態如狗也臣禁不能止魏略曰丁沖爲司􅊢校尉後數歲遇諸將飲羙不能止醉爛腸而死呉書曰孫堅母懷堅夢腸出繞呉昌門寤而懼之告隣母母曰安知非吉徴梁書曰王偉甞爲候景作撽撽湘東王及景敗獲偉王怒釘其舌抽其腸而死抱朴}
  - {type: punctuation, offset: 4872, content: 》, id: KR3k0012_CHANT_376-bkkpn1631}
  - {type: punctuation, offset: 4873, content: ：, id: KR3k0012_CHANT_376-bkkpn1632}
