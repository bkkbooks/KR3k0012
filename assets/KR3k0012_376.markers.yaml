  - {type: variant, offset: 3028, length: 252, content: 成公上曰齊晉將戰郤克傷於矢流血及屨未絕鼓音張侯曰余病矣郤至曰自師始合而矢貫余手及肘余折以御左輪朱殷豈敢言病吾子忍之張侯解張也朱血色血色久則殷今人謂朱黑殷也言血多汙車輪後不敢息也春秋考異郵曰龍門之下血如江宋均曰龍門戰在魯桓十三年易屯卦曰乘馬班如泣血漣如尚書武成曰紂前徒倒戈攻于後以北血流漂杵孔安國注曰流漂舂杵論語季氏曰君子有三誡血氣未定誡之在色血氣方剛誡之在鬭血氣既衰誡之在得漢書曰申屠嘉為丞相鄧通居上傍怠慢嘉為撽召通責曰朝廷者高帝朝廷也通小臣戲殿上大不敬當斬通頓首血出不解文帝度嘉已困通持節召通而謝嘉漢書, SBCK: ''}
