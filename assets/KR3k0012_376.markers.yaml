  - {type: variant, offset: 2104, length: 286, content: 郭玉為人善別脈知人生死章帝令童男著女子之衣詐云其病使玉診脈玉曰此女雖言病據脈陽盛陰微臣謂非女子帝善之三國典略曰周武帝不豫止於雲陽宮內史柳昇私問姚僧坦曰至尊貶膳日久脈候何如對曰天子上應天心非愚所及凡庶如此萬無一全鶡冠子曰魏文侯問扁鵲曰子昆弟三人並醫其孰最善扁鵲曰長兄視神故名不出家仲兄視毫毛故名不出閭鵲針人血脈救人生死名聞天下燕丹子曰田光竊觀太子客無可用者宋意脈勇之人怒而面青論衡曰王莽時省五經平章句弟子郭略夜定舊記死於燭下精思不任脈絕氣滅崔元始正論曰風俗者國之脈診也年穀如其肌膚肌膚雖和而脈診不和亦未為休也髓說文曰髓骨中脂也史記曰扁鵲過齊桓侯客之後五日復見望桓侯而退走桓侯, SBCK: 今劉項分爭}
