  - {type: variant, offset: 4874, length: 7, content: 受變化一月而膏, SBCK: 擘凥面天子豺士皆切後降長沙王以豺軍人辱帝東市斬之晉中興書曰胡母輔之子謙之醉與父語常呼父字輔之亦不怪也常窺輔之厲聲曰彦國老年不得爲尔將令我凥背東壁輔之遽呼入與共飮酒其爲放逹如此京房易妖占曰人生子無凥國主以仇亡淮南子曰北方人下凥太平御覽卷第}
