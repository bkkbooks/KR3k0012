  - {type: variant, offset: 4000, length: 21, content: 輔公祏據江東反發兵寇壽陽命李孝恭為行軍元帥, SBCK: 孫思邈對盧昭隣曰膽欲大而心欲小黄帝素問曰膽者中心之官断決出焉白虎通曰膽者肝之府肝者木之精主仁仁者苦不忍故}
  - {type: variant, offset: 4000, length: 16, content: 輔公祏據江東反發兵寇壽陽命李孝恭, WYG: 孫思邈對盧照隣曰膽欲大而心欲小黄帝素問曰膽者中心之官斷決出焉白虎通曰膽者肝之府肝者木之精主仁仁者苦不忍故以膽斷是以仁者有勇故斷膽也肝膽異處何以其相}
  - {type: page-break, offset: 4000, content: '', id: KR3k0012_WYG_376-16b, image: WYG0896/WYG0896-0353d.png}
  - {type: variant, offset: 4006, length: 334, content: 反發兵寇壽陽命李孝恭為行軍元帥以擊之孝恭自荊州趣九江將發與諸將宴集命取水忽變為血在坐者皆失色孝恭舉止自若徐諭之曰禍福無門唯人所召自顧無負於物諸君何見憂之深公祏惡積禍盈今承廟筭以致討盌音椀中之血乃公祏授首之徵又曰李思摩頡利族人也授右衛將軍從征遼東為流矢所中太宗親為吮血又曰李子慎誣告其舅以獲五品其母見其著緋衫覆面床下泣涕曰此是汝舅血染者耶又曰玄宗幸蜀次馬嵬召左相韋見素見素出店為亂兵所撾頭血流地上遽令壽王傳詔止之又曰天寶十五年安祿山下將蔡希德攻陷常山郡執太守顏杲卿長史袁履謙殺掠人吏萬餘人城中流血又曰竇軌每臨戎對寇或經旬月身不解甲其部眾無貴賤少長不恭命即立斬之每日被事多所鞭撻流血滿庭見者莫不股慄又曰劉審禮丁父憂去職及葬跣足隨車流血灑地行路稱之又曰牛徽為吏部員外郎巢賊犯, krp: 南墜後有聲}
