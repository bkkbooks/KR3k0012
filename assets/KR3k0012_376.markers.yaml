  - {type: variant, offset: 3651, length: 2, content: 胡羯, SBCK: 脉也尚書盤庚曰今我其敷心腹腎腸歴告尓百姓于朕志布心腹言輸誠於百姓以吿志文子曰腎主鼻白虎通曰腎所以智何腎者水之精智者進止}
  - {type: page-break, offset: 3651, content: '', id: KR3k0012_SBCK_376-8b}
