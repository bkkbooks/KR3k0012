  - {type: variant, offset: 4834, length: 1, content: 哭, krp: 言子春大喜酌三升獨使飲之於是輅與人人荅對言皆有餘趙雲別傳曰雲字子龍先主入益州雲留守營曹公爭漢中地運米北山下數千萬囊黄忠以爲可取過期不還雲將數十人出圍視忠值曹公揚兵大出爲前鋒所擊且却公軍散走巳復合雲䧟敵還入營更大開門偃旗鼔公疑雲有伏兵引去雲鼔震以戎弩於後射公軍公軍驚駭因相蹂踐墮漢水死者甚多先主明日自來視昨戰處曰子龍一身都爲膽宋書曰太學生㑹稽魏淮以才學爲王融所賞旣欲奉子良而淮鼔成其事太學生盧義丘園賔竊相謂曰竟陵才弱王中書無断敗在目中矣及融誅召淮入舎人省詰問遂懼而死舉體皆青時人謂淮膽破唐書曰武懿宗安撫河北諸州先是百姓有脅從賊者後得歸來懿宗以爲同反盡生刳取其膽然後行刑流血盈前言笑自若又曰孫思邈對盧昭隣曰膽欲大而心欲小黄帝素問曰膽者中心之官断決出焉白虎通曰膽者肝之府肝者木之精主仁仁者苦不忍故以膽斷是以仁者有勇故膽斷也肝膽異處何以其相爲府也肝者木精木之爲言牧也人怒無不色青目振張者是其效也西京雜記曰秦有方鏡廣四尺髙五尺九寸表裏有明人}
