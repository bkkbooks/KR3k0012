  - {type: variant, offset: 3641, length: 19, content: 橫屍相枕血流成渠誅諸胡羯無貴賤男女皆斬, krp: 權後殺詡食其肝括地圗曰細民肝不朽死八年復生穴處衣皮莊子曰盗跖居太山膾人肝而食}
