  - {type: variant, offset: 4709, length: 5, content: 戰鬭死亡處, krp: 鏐音留民其肺不朽百年復生白虎通曰肺所以義者何肺者金之精義者断決西方亦殺成萬物故肺象金色白繫於鼻脾說文曰脾金藏也釋名曰脾禆也在胃下禆助胃氣主化榖也陳思王辨道論曰甘始論車師之西國兒生劈背出脾欲其食少而努行也白虎通曰脾之爲言併也所以併積氣又曰脾所以信何脾者土之精土尚任養萬物無所私信之至也故脾象土色黄繫於舌腎說文曰腎水藏也釋名曰腎屬水主引水氣灌注諸脉也尚書盤庚曰今我其敷心腹腎腸歴告尓百姓于朕志布心腹言輸誠於百姓以吿志文子曰腎主鼻白虎通曰腎所以智何腎者水之精智者進止無所疑惑水亦進而不惑北方水故腎黒隂故腎雙居膽說文曰膽連肝之府也史記曰呉旣赦越王勾踐返國苦身焦思置膽於坐卧即仰飲膽曰汝忘㑹稽之恥乎魏志曰樂進字文謙陽平衛國人容貌短小心膽烈從太祖爲帳下吏又曰袁紹在黎陽將南渡時程昱}
