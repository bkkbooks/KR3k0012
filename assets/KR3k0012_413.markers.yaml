  - {type: variant, offset: 7, length: 0, content: '', SBCK: 毎侍宴無所食噉至席散當其前膳羞又損减髙祖宻記以問中書舎人管斌甞不能對自是斌以意伺之見孝克取珍果内紳帶斌常莫能識其意後更尋訪方知還以奉母斌以啓髙祖髙祖歎嗟乆之乃勑所司自今享孝克前饌賜以餉其母後屬兵荒母病思粳米粥不能得而孝克終身不食粳米崔鴻十六國春秋前趙録曰太宰王詳字季海性至孝言及二親未甞不嗚咽摧慟每忌日輙三日不食燕書曰周存字道名}
  - {type: variant, offset: 7, length: 0, content: '', WYG: 每侍宴高宗無所食噉至席散當其前膳羞損減高宗密記以問中書舍人管斌不能對自是斌以意伺之見孝克取珍果内伸帶中斌莫能識其意後更㝷訪之知還以奉母斌以啟高宗高宗歎嗟久之乃勅所司自今孝克前饌賜以餉其母後屬兵荒母患病欲粳米為粥不􅀎常辦母亾之後孝克遂常噉麥有遺粳米者對而悲泣終身不復食之崔鴻十六國春秋前趙録曰太宰王祥字季海性至孝言及二親未有不嗚咽摧慟每忌日輙三日不食燕書曰周存字道名}
