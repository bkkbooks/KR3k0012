  - {type: variant, offset: 22, length: 1, content: 凱, WYG: 辛少雍字季和隴西狄道人也少聰頴有孝行尤為祖父紹先所愛紹先性嗜羊肝常呼少雍共食及紹先卒少雍終身不食肝乂曰張彛字慶賔清河東武城人太和中為給事黄門侍郎後從駕南征母憂解任彛居喪過禮送葬自彭城達家千里徒歩不乘車馬顔貌毁瘠當世稱之又曰㓂治字祖禮上谷人也世宗時為荆州刺史治兄弟並孝友敦睦白首同居父亡雖久而猶於平生所處堂字備設幃帳几杖以時節開堂列拜垂涕陳薦若宗廟然吉凶之事必先啟告遠出行返亦如之又曰孝文帝以文明太后再周忌日哭於陵泣絶膳二日哭不輟聲又曰蕭順字子和任城文宣王之子遭父憂哭泣嘔血身自負土時年二十五便有白髮免喪抽去不復更生除吏部尚書兼右僕射上省登階見榻甚故問都令史徐仵起仵起對曰此榻曾經先王所坐順即哽塞涕泣交流久不能言遂令换之又曰楊引三嵗喪父為叔所養母年九十三嵗終引年七十五哀毁過禮三年服終恨不識父追服斬衰誓終身命經十三年哀慕不改為郡縣鄉閭三百餘人上狀稱美有司奏宜旌賞復其一門旌其純孝後周書曰樂運少好學渉獵經史而不持章句年十五而江陵滅運隨例遷長安其親屬等多被籍没運積年為人傭保皆贖免之乂事母及寡嫂甚謹由是以孝義聞梁故都官郎中琅琊王澄美之為次其行事為孝義傳又曰荆可河東猗氏人也性質朴容止有異於人能苦身勤力供養其母隨時甘㫖終無匱乏及母喪水漿不入口三日悲號擗踊絶而後蘇者數四葬母之後遂于墓側晝夜哭負土成墳蓬髪不櫛沐菜食飲水而已然可家焦塋城極大榛蕪至家十餘里而可猶宿其中與禽獸雜處遠近邑里稱之大統中可鄉人以可孝行之至足以勸勵}
