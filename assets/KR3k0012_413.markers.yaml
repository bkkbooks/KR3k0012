  - {type: variant, offset: 3105, length: 318, content: 遂瘞之又曰師覺援字覺授南陽溫陽人也與外兄宗少文並有素業以琴書自娛於路忽見一人持書一函題曰至孝師君苫前俄而不見捨車奔歸聞家哭聲一叫而絕良久乃蘇又曰謝𣟤字宣鏡幼有殊行年數歲所生母郭氏久嬰痼疾𣟤晨昏溫清嘗藥捧膳不闕一時勤容戚顏未嘗暫改恐僕役營疾懈倦躬自執勞母為病畏驚而微賤過甚一家尊卑感𣟤至性皆納履而行屏氣而語如此十年餘又曰蔡曇智鄉里號蔡曾子廬江何伯璵兄弟里號為何展禽並為高士沈顗所稱常云聞蔡曇智之風怯夫勇鄙夫有立志聞何伯璵之風偽夫正薄夫厚伯璵與弟幼璵俱厲節操養兄孤子及長為婚推家業盡與之安貧枯槁誨人不倦郡守下車莫不修請又曰余齊人晉陵人也少有孝行為邑書吏大明二年父賓在家病亡信未至齊人謂人曰比者肉痛心煩有如割截居常皇駭必有異故信尋至以父病報之, SBCK: 太平御覽卷第}
