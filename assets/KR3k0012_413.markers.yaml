  - {type: variant, offset: 28, length: 1, content: 凱, SBCK: 少聦潁有孝行尤爲祖父紹先所愛紹先性嗜羊肝甞呼少雍共食及紹先卒少雍終身不食羊肝又曰張彛字慶賔清河東武城人太和中爲給事黄門侍郎後從駕南征母憂解任彛居喪過禮送葬自平城逹家千里徒歩不乗車馬顔皃毀瘠當丗稱之又曰寇治字祖禮上谷人也丗宗時爲荆州刺史治兄弟並孝友敦睦白首同居父亡雖乆而猶於平生所處堂宇備設幃帳几杖以時節開堂列拜垂涕陳薦􅀂宗廟然􅁻凶之事必先啓告逺出行返亦如之又曰孝文帝以文明太后再周忌日􅂘於陵左絶膳二日􅂘不輟聲又曰元順字子和任城文宣王之子遭父憂哭泣歐血身自􅀒土時年二十五便有白髮免喪抽去不復更生除吏部尚書兼右僕射上省登階見榻甚故問都令史徐仵仵對曰此榻曽經先王所坐順即哽塞涕泣交流乆不能言遂令換之又曰楊弘三歳喪父爲母所養母年九十三終弘年七十五哀毀過禮三年服終恨不識父追服斬衰誓終身命經十三年哀慕不改爲郡縣郷閭三百餘人上􅃺稱美有司奏冝旌賞復其一門旌其純孝後周書曰樂運少好學渉獵經史而不持章句年十五而江陵㓕運隨例遷長安其親属等多􅀍籍􅃿運積年爲人傭保皆贖免之又事母及寡㛐甚謹由是以孝義聞梁故都官郎中琅邪王澄美之爲次其行事爲孝義傳又曰荆可河東猗氏人也性質朴容止有異於人能苦身勤力供養其母隨時甘􅈲終無匱乏及母喪水漿不入口三日悲號擗踴絶而後蘇者數四葬母之後遂於墓側晝夜哭􅀒土成墳蓬髮不􅌨沐菜食飲水而已然可家舊塋城極大榛蕪至家十餘里而可獨􅀫其中與禽獸雜處逺近邑里稱之大統中可郷人以可孝行之至足以勸勵}
