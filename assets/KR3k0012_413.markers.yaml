  - {type: variant, offset: 8, length: 2, content: 爾雅, SBCK: 谷俱陽人王彭祖叛母遇宼離失所在分崩州郡隔異存謂難尋求自河以北無不周遍存亡無問後傳在昌􅀺而存已属叚氏昌􅀺土地燕之所統存徑投髙祖客之爲置酒於坐問存君失母來幾年相見當識否髙祖言音未止存涕泗覆面尋聲而對辭甚悲酸舉坐莫不忼􅁣髙祖亦爲之動容由是意遇倍加存停朞不得母問將辭歸髙祖意欲留之而未顯也存覺微旨陳謝}
  - {type: page-break, offset: 8, content: '', id: KR3k0012_SBCK_413-1b}
  - {type: variant, offset: 8, length: 2, content: 爾雅, WYG: 谷漁陽人王彭祖叛母遇㓂離失時所在分崩州郡隔異存冐難相求自河以北無不周遍存亡無問後傳在昌黎而時已屬段氏昌黎土地燕之所統存徑投高祖客之為置酒於坐問存君失母來幾年相見當識否高祖言未止存涕泗覆面㝷聲而對辭甚悲酸舉坐莫不忼慨高祖亦為之動容由是恩遇倍加存居停朞月不得母問將辭歸高祖意欲留之而未顯也存覺微㫖陳謝}
