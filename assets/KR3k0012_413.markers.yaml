  - {type: variant, offset: 11, length: 1, content: 善, SBCK: 聶政荆軻刺客之流意氣之顧甘死􅁗韓今明公無求於徴用而見椄以國士應終身奉給以荅厚恩然老母未審存亡弟小無所依􅀝寢食未敢廢心昔徐庶指方寸以未辭今存披肝以表情願明公恕之髙祖矜而聽去後魏書曰趙琰字叔起天水人爲淮南王他府長史時禁制甚嚴不聽越關葬於藉兆琰積四十餘年不得葬二親及烝甞拜未嘗不嬰慕卒事毎於時節不受子孫慶賀年餘耳順而孝思彌篤歳月推移坐遷窆無兾乃絶鹽粟斷諸肴味二十年間食麥而已年八十卒遷都洛陽子應等乃還郷葬焉又曰長孫盧代人也母因飲酒其}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_SBCK_413-2a}
  - {type: variant, offset: 11, length: 1, content: 善, WYG: 聶政荆軻刺客之流意氣之顧甘死􅁗韓今明公無求於徴用而見接以國士應終身奉給以答厚恩然老母未審存亡弟小無所依倚寢食不敢廢心昔徐庶指方寸以求辭今存披肝膽以表情願明公恕之高祖矜之聽去後魏書曰趙琰字叔起天水人為淮南王他府長史時禁制甚嚴不聽越闗葬於舊兆琰積三十餘年不得葬二親及蒸嘗禮拜未嘗不嬰慕每於時節不受子孫慶賀年逾耳順而孝思彌篤嵗月推移遷􅉎無冀乃絶鹽粟斷諸滋味二十年間食麥而已年八十卒遷都洛陽子應等乃還鄉葬焉又曰長孫慮代人也母因飲酒其}
