  - {type: variant, offset: 11, length: 1, content: 善, krp: 聶政荆軻刺客之流意氣之顧甘死秦韓今明公無求於徴用而見椄以國士應終身奉給以荅厚恩然老母未審存亡弟小無所依倚寢食未敢廢心昔徐庶指方寸以未辭今存披肝以表情願明公恕之髙祖矜而聽去後魏書曰趙琰字叔起天水人爲淮南王他府長史時禁制甚嚴不聽越關葬於藉兆琰積四十餘年不得葬二親及烝甞拜未嘗不嬰慕卒事毎於時節不受子孫慶賀年餘耳順而孝思彌篤歳月推移坐遷窆無兾乃絶鹽粟斷諸肴味二十年間食麥而已年八十卒遷都洛陽子應等乃還郷葬焉又曰長孫盧代人也母因飲酒其}
  - {type: variant, offset: 13, length: 12, content: 母為孝毛詩鄁柏舟曰凱風美, SBCK: 眞呵叱之誤以杖擊便即致死眞爲縣囚執處以重坐盧列辭尚書乞盧身代父老命使嬰稚衆􅀌得蒙存立書奏云盧於父爲}
