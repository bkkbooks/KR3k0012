  - {type: variant, offset: 2185, length: 894, content: 司馬攸字文猷晉文少子太后崩執喪過哀動必盡禮左右或以稻米千飯丸理中丸以進王對之涕泣不食經三年杖然後能起人有犯諱者常悲不自勝又曰王延九歲喪父母卜氏遇之無道延事之夏則扇枕席冬則以身溫之盛寒體無全衣而親極滋味王隱晉書曰李胤字宣伯遼東人祖父敏漢末河內太守為賊所迫逐不知所終其子追索歷年無所見此居與父同年者亡制服行喪燕國徐邈與之州里勸令娉婦孕生胤遂絕房內常禮重之不堪其憂數年而卒胤母更適牽招胤不識父母又改行有識之後降食哀感亦如遭喪之禮以祖不知存亡設木主以事之由是發名又曰郄詵對策上第拜朝議郎母憂去職母苦病亡不欲車載家貧無以市買乃於所住堂北壁假葬朝夕拜告養雞種蒜竭其力術過三年得馬八疋輿棺至家負土成墳晉中興書曰吳隱之字處默濮陽人遭母憂哀毀過禮時與太常韓康伯鄰居隱之每哭康伯母輒輟食流涕悲不自勝語康伯曰吾若居銓衡之職當用此輩人及康伯為吏部尚書因進用之遂歷清顯又曰范宣八歲後園挑菜誤傷指大啼問痛邪荅曰非為痛身體髮膚不敢毀傷是以啼也又曰後蜀李雄太子班雄寢疾班晝夜省侍衣不解帶雄自少攻戰大被傷痍至是多膿潰班為吮膿殊無難色班即雄兄之子也宋書曰孫法宗一名宗之吳興人也父隨孫恩入海澨被害屍骸不收母兄並餓死法宗年小流迸至十六方得還單身勤苦霜行草宿營辦棺槨造立冢墓葬送母兄儉而有禮以父屍不測入海尋求聞世間論是至親以血瀝骨當悉凝沒乃操刀沿海見枯骸則刻肉灌血如此十餘年臂脛無完皮血脈枯竭終不能逢縗絰終身常居墓所山禽野獸皆悉馴附每逢鹿觸網必解放之又孝義傳曰崔懷順清河東武城人也父耶利魯郡太守宋元嘉中為魏所獲懷順與妻房氏篤愛聞父見虜即日遣妻布衣蔬食如喪禮歲時北向流涕耶利後仕魏書戒懷順不許如此懷順得書更號泣懷順從叔摸為滎陽太守亦入魏摸子雖居處改節不廢婚官宋大明中懷順宗人冀州刺史元孫北使魏魏人問之曰崔邪利摸並力屈來歸二家子姪出處不同義將安在元孫曰王尊叱馭王陽廻車欲令忠孝並弘臣子兩遂泰始初淮北入魏懷順因此歸北至代都而邪利已卒懷順絕而後蘇載喪還青州徒跣冰雪土氣寒酷而手足不凍時人以為之孝感又曰華寶晉陵無錫人也父豪晉義熙末戍長安年八歲臨別謂寶曰須我還當為汝上頭長安陷寶年七十不婚冠或問之者輒號慟彌日不忍荅也又曰散騎常侍袁瑜薦會稽郭道, SBCK: 祥}
