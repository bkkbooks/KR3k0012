  - {type: variant, offset: 792, length: 132, content: 正履王季復膳然後亦復初左傳曰鄭莊公即位姜氏愛共叔段請京使居之叔段襲鄭莊公伐京遂寘姜氏于城潁而誓之曰不及黃泉無相見也既而悔之潁考叔曰君何患焉若闕地及泉遂而相見闕穿也隧埏也其誰曰不然公從之君子曰潁考叔純孝也孝經曰愛敬盡於事親而德教加於百姓刑於四海蓋天子之孝也高而不危所, WYG: 痛是}
