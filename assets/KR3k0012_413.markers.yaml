  - {type: variant, offset: 925, length: 190, content: 長守貴也滿而不溢所以長守富也蓋諸侯之孝也言滿天下無口過行滿天下無怨惡蓋卿大夫之孝也以孝事君則忠以敬事長則順蓋士之孝也謹身節用以養父母此庶人之孝也孝經援神契曰天子行孝四夷和平又曰孝悌之至通於神明病則致其憂顦顇消形求醫翼全宋均注曰翼羽翼親者也孝經說曰孝畜也養也論語學而曰父在觀其志父沒觀其行三年無改於父之道可謂孝矣孝子父在無所自專庶幾於其善道而已又為政曰子路問孝子曰色難言和顏色悅為難, SBCK: 泣}
