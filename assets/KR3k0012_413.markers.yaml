  - {type: variant, offset: 24, length: 1, content: 美, WYG: 俗乃言焉太祖令州縣表異之及服終後猶若居喪大冡宰晉公護聞可孝特引見與言論時有㑹於䕶䕶亦至孝其母閻氏没於敵境不測存亡每見可自傷久乖膝下而重可至性及卒之後猶思其純孝收可妻子於京城常給其衣食北齊書曰李元忠母老多病患乃專心醫藥研習積年遂善方伎性仁恕見有疾者不問貴賤皆為救療又曰李密平棘人元忠族弟性方直有行檢因母病積年得名醫治療不愈乃精究經方洞曉鍼藥母病乃除唐書曰高祖嘗宴侍臣果有蒲桃侍中陳叔達執而不食問其故對曰臣母患口乾求之不得高祖曰卿有母遺乎遂嗚咽流涕因賜帛百疋以市甘珍又曰歐陽通為中書舍人調露中起復每入朝必徒跣至城門然後着靴直宿則席地籍蒿非公事不言未嘗啟齒歸必哀號無時國朝奪情唯通得禮乂曰聊城人王少元者父隋末於郡西為亂兵所害少元遺腹生年十嵗問父所在其母告之因哀泣便欲求屍以葬時白骨蔽野無由可辨或曰以子血沾父骨即滲焉少元乃刳其體以試之凡經旬日竟獲父體以葬盡禮病創歴年方瘉音庾貞觀中本州聞薦拜除王府叅軍又曰陳集原隴州開陽人也代為嶺表酋長父龍樹欽州刺史集原㓜有孝行父纔有病即終日不食永徽中喪父嘔血數升枕服苫廬悲感行路資財田宅及僮僕三千餘人並以讓兄弟則天時官至左豹韜衛將軍又曰元讓雍州武功人也弱冠明經擢第以母疾遂不求仕躬親藥膳蒸蒸致養不出閭里者數十年及母終廬於墓側蓬髪不櫛沐菜食飲水而已咸亨中孝敬監國下令表其門閭永淳元年廵按使奏讓孝悌殊異擢拜太子右内率府長史後以嵗滿還鄉里鄉人有所争訟不詣州縣皆就讓決焉聖厯中中宗居春宫詔拜太子司議郎及謁見則天謂曰卿既能孝於家必能忠於國今授此職須知朕意宜以孝道輔弼我兒㝷卒又曰張志寛河東人隋末喪父哀毁骨立為州里所稱㓂賊聞其名不犯其閭後為里尹在縣忽稱母疾取急縣令問其故志寛對曰母嘗有所苦志寛亦有所苦向患心疼是以知母有疾令初怒曰妖妄之詞繫於獄外遣馳驗之果如斯言令異之以聞高祖旌表門閭就拜員外散騎侍郎又曰裴敬彛絳州聞喜人也曾祖子通隋開皇中大中大夫母終廬於墓側哭泣無節目遂喪明俄有白鳥巢於墓樹子通兄弟八人皆友悌著名詔旌表其門鄉人至今稱為義門裴氏敬彛少聰敏七嵗解屬文性又端謹宗族咸重之號為甘露頃年十四侍御史唐臨為河北廵察使敬彛父智周時為内黄令為部人所訟敬彛詣臨論其寃臨大竒之因命作詞賦智周事竟釋特表薦敬彛補陳王府典籖智周在官忽暴卒敬彛時在長安忽涕泣不食謂所親曰大人每有痛處吾即輙然不安今日心痛手足皆廢事在不測得無戚乎遂請急倍道言歸果聞父喪羸毁逾禮事母復以孝聞乾封初累轉監察御史時母病有醫人許仁則足疾不能乘馬敬彛每自背負母病高祖特詔贈以縑帛仍官造靈轝服闋拜著作郎兼修國史儀鳳中自中書舍人歴吏部侍郎左庶子則天臨朝為酷吏所陷配流嶺南㝷卒又曰給事中李日知事母至孝時母年老常疾病日知輙急調侍數日而鬂髮變白㝷加朝散大夫其母未受命婦邑而卒將葬發引吏人齎告身而至日知於路上即時慟絶久之乃蘇左右皆哀慟莫能仰視廵察使衛州司馬路敬潜聞其孝悌之跡使求其狀日知辭讓不報服闋累遷黄門侍郎莊子曰夫事其親者不擇地而安之孝之至也尸子曰}
