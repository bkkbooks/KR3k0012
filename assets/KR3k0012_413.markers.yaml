  - {type: variant, offset: 561, length: 136, content: 先王之孝也色不忘乎目目常思父母之顏色聲不絕乎耳心志嗜欲不忘乎心君子生則敬養死則敬享思終身弗辱也又曰子曰舜其大孝也歟德為聖人尊為天子富有四海之內宗廟享之子孫保之故大德也必得其位必得其祿必得其名必得其壽又曰閔子騫既除喪而見與之琴和之而不和彈之而不成聲夫樂之和猶人心雖喪以除而哀, SBCK: 他日}
