  - {type: variant, offset: 3516, length: 983, content: 身長七尺三寸以孝悌稱勔見害於朱雀街悛兄弟平生不行此路喪骨立杖而後起悛為黃門郎稍遷右衛勑明帝山陵不獲己從朱雀街過感慟而卒齊書曰王文殊字令章吳興故鄣人父入魏文殊思慕泣血終身蔬食不衣帛服麻縕而已不婚不交人物吳興太守謝瀹聘為功曹不就立小屋於縣西端揖拱其中歲時伏臘月十五未嘗不北望長悲如此三十餘年太守孔琇之表其行鬱林詔牓門改所居為孝行里琇音秀又音酉蕭子顯齊書曰劉瓛胡官切有至性祖母病疽經年瓛手持膏藥漬指爛母孔氏甚嚴明謂親戚曰阿稱便是今世曾子稱瓛小名也又曰樂頤字文德南陽人也世居南郡父在家病亡頤忽思戀涕泣因假還中路果得父凶問頤便徒跣號咷出陶後渚遇商人附載西上水漿不入口數日常遇病與母隔壁忍病不言齧被至碎恐母哀己吏部庾果之嘗往候之設食枯魚菜葅云我不能食此母聞之自出常膳魚羹數種果之曰卿過於茅季偉我非郭林宗又曰傅琰字季珪北地靈州人也美姿儀除尚書左侍郎遷尚書左丞遂遭母喪居南岸鄰家失火延燒琰屋抱柩不動鄰人競求赴救乃得俱全琰肱髀之間已被煙熖服闋除江夏王錄事梁書曰沈崇傃字思整吳國武康人也父懷明宋兗州刺史崇傃六歲丁父憂哭踊過禮及長事所生母至孝家貧常傭書以養天監二年太守柳惲辟為主簿崇傃之從惲到郡還迎其母未至而母卒崇傃以不及侍疾將欲致死水漿不入口晝夜號哭旬日殆將絕氣兄弟謂曰葬未申遽自毀滅非全孝道也崇傃心悟乃稍進食母權瘞去家數里哀至輒之瘞所不避雨雪就墳哀慟飛鳥翔集夜常有猛獸來望之有聲狀如歎息者家貧無以遷曆乃行乞經年始獲葬焉既而廬于墓側自以初行喪禮不備復以葬後更行服三年久進麥屑不噉鹽酢坐臥於單薦因虛腫不能起郡縣舉至孝梁武帝聞即遣中書舍人慰勉之乃詔令釋服推補太子洗馬旌其門閭崇傃奉詔釋服而涕泣如居喪固辭不受官乃除永寧令自以祿不及養哀思不自堪未至縣卒又曰荀匠字文師潁陰人晉太保勗九世孫也祖瓊年十五復父仇於成都市以孝聞宋元嘉末渡淮赴武陵王義為元凶追殺贈員外散騎侍郎父法超仕齊為安復令卒官匠號慟氣絕身體皆冷至夜乃蘇既而奔喪梁天監元年其兄斐為鬱林太守征俚賊為流矢所中死於陣喪還匠迎于豫章望舟投水傍人赴救僅而得全及至家貧不時葬居父憂并兄服歷四年不出廬戶櫛括髮不復櫛沐髮皆禿落哭無時聲盡則係之以泣目眥皆爛形體枯悴皮骨裁連雖家人不復識郡縣以言武帝詔遣中書舍人為其除服推為豫章王國左常侍匠雖即官而毀悴逾甚外祖孫謙誡之曰主上以孝臨天下汝過古人故推汝為此職非為君父之命難拒故亦楊名後世所顯豈獨汝身匠乃拜竟以毀卒, SBCK: ''}
