  - {type: variant, offset: 1632, length: 301, content: 明有才思尤喜詩人而端等十人多在曖之門下每宴集賦詩公主坐視簾中詩之美者賞曖因拜官會十子曰詩先成者賞時端先獻警句云薰香荀令偏憐小傳粉何郎不解愁主即以百縑賞之錢起曰李校書誠有才此篇宿構也願賦一韻正之請以起姓為韻端即襞牋而獻曰方塘似鏡草芊芊初月如鉤未上弦新開金埒教調馬舊賜銅山許鑄錢曖曰此愈工也令狐楚為太原從事自掌書記至節度判宮歷使下侍御史楚才思俊麗德宗好文每太原奏至能辦楚之所為頗稱之鄭儋都含切在鎮暴卒不及處分從事軍中喧譁將有急變中夜忽十數騎持刃迫楚至軍門諸將環之令草遺表楚在白刃之中榒管即成讀示三軍無不感泣軍情乃安自是聲名益重唐中書舍人陸扆文思敏速初無思慮揮翰如飛文理具愜同舍服其能天子顧待特異嘗金鑾作賦命, WYG: 殿}
