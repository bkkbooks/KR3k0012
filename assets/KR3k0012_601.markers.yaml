  - {type: variant, offset: 259, length: 1, content: 蕭, SBCK: 于寳性好隂陽術數留思京房夏侯勝等傳寳父先有所寵侍婢母甚妬忌及亡母乃生埋婢於墓中寳兄弟年少不知審也後十餘年母䘮開墓而婢伏棺如生載還經日乃􅂫言其父常取飲食與之恩情如生家中􅁻凶輙語之考校悉驗地中亦不􅁴爲惡旣而嫁之生子又寳兄嘗病氣絶積日不冷後遂悟見天地間􅀑神事如夢􅁴不自知死寳以此遂撰集古今神祇靈異人物變化名爲捜神記凢三十卷以示劉惔惔曰卿可謂􅀑之董狐也于寳表曰臣前聊欲撰記古今怪異非常之事㑹聚散逸使同一貫博訪知之者片􅁓殘鈌事事各畢又曰孫盛著晉陽秋詞直而理正咸稱良史焉旣而桓温見之怒謂盛子曰枋頭誠爲失利何至乃如尊君所􅀃其子遽拜謝曰請刪定之時盛年老還家性方嚴有軌憲雖子孫班白而庭訓愈峻至此諸子乃共號泣稽顙請爲百口計盛大怒諸子遂尓改之盛冩定兩本􅀉於慕容雋㤗元中孝武帝博求異聞始於遼東得之以相考校多有不同書遂兩存又曰曹志植之子也帝嘗閱六代論問志曰是卿先王所作耶志對曰先王有手所作自録請歸㝷案還奏曰案録無此帝曰誰作志曰以臣所聞是臣族父所作以先王}
