  - {type: variant, offset: 1316, length: 0, content: '', SBCK: 新誡五卷垂拱格四卷臣䡄二卷兆人夲業五卷又有文集一百二十卷並藏於祕閣又曰劉允濟善屬文與絳州王勃齊名採摭魯哀公後十二代至于戰國遺事撰魯後春秋一十卷表上之遷左右史又曰許叔牙嘗撰毛詩纂義十卷以進太子賜帛二百叚兼令冩夲付司經局其後御史大夫髙智周謂人曰凢欲言詩者必湏先讀此書始可也又曰大曆中刑部尚書顔真卿以陸法言切韻未􅀪乃纂九經子史字義著韻海鏡源三百六十卷獻之詔下祕閣及集賢書院貯之又曰馮伉爲醴泉縣令患百姓多猾爲著論䝉十四篇大略指明忠孝仁義勸學務農毎郷給壹卷俾其傳習}
  - {type: page-break, offset: 1316, content: '', id: KR3k0012_SBCK_601-6b}
