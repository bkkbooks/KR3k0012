  - {type: variant, offset: 652, length: 452, content: 盛事昔司馬長卿尚絕筆於此以臣下材何敢擬議臣雖愚淺敢不竭作乃於御前下筆便就不立藁草文將千言黃門侍郎賈思問侍立深奇之白帝曰雖七步之才無以過此自武定二年以後國家大事詔命軍國文詞皆收所作每有警急不停有同宿構速敏之工邢溫之所不逮梁書范雲少機警其識具善屬文便尺牘下筆輒成未嘗定藁時人疑其宿構蕭介傳曰初武帝延後進二十餘人置酒賦詩藏盾以詩不成罰酒一斗盾飲盡顏色不變言笑自若介染翰便成文無加點帝兩美之曰臧盾之飲蕭介之文即席之美也三國略曰高澄嗣渤海王聞謝挺徐陵來聘遣中書侍郎陸昂於滑臺迎勞於席賦詩昂必先成雖未能盡工亦以敏速見美梁庾肩吾少勤學能鼓琴善屬文宋子仙破會稽購得肩吾謂之曰吾昔聞汝能作詩今可作若能當貰汝命肩吾便操筆立成詩曰髮與年俱暮愁將罪共深聊持轉風燭蹔映廣陵琴子仙乃釋之又曰陰鑑字子堅梁右衛將軍子春之子也徐陵言之於陳主陳主召使賦新成安樂宮鏗援筆便就陳主甚歎賞之北史曰隋韋正玄舉秀才楊素志在試退乃手題使擬司馬相如上林賦王褒聖主得賢臣頌班固燕然山銘張載劍閣銘白鸚鵡賦謂曰我不能為君住宿可至未時令就玄正及時並了素讀數遍大驚, WYG: ''}
