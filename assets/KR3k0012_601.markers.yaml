  - {type: variant, offset: 265, length: 1, content: 丘, SBCK: 也少以才學知名而放蕩不羈州府辟命皆不就州辟別駕乃微服竊出舉州莫知之後於成都市中蹲踞齧胡餅刺史知其不出屈禮遣之閉門自守不交人事著書四卷擬易名曰通􅀇經有文言卦象可用卜筮時人比之楊雄太玄同郡馬秀曰楊雄作太􅀇唯桓譚以爲必傳後丗晚遭陸績􅀇道遂明長文通􅀇經未遭陸績君山耳又曰王隱字處叔太興􅀄典章稍備乃召隱及郭璞俱爲著作郎}
  - {type: variant, offset: 265, length: 1, content: 丘, krp: 也少以才學知名而放蕩不羈州府辟命皆不就州辟別駕乃微服竊出舉州莫知之後於成都市中蹲踞齧胡餅刺史知其不出屈禮遣之閉門自守不交人事著書四卷擬易名曰通玄經有文言卦象可用卜筮時人比之楊雄太玄同郡馬秀曰楊雄作太玄唯桓譚以爲必傳後丗晚遭陸績玄道遂明長文通玄經未遭陸績君山耳又曰王隱字處叔太興𥘉典章稍備乃召隱及郭璞俱爲著作郎}
  - {type: variant, offset: 267, length: 2, content: 揩吳, SBCK: 撰晉史著作郎虞預私撰晉書而生長東南不知中朝事數訪於隱并借隱所著書竊冩之所聞漸廣是後更嫉隱形于言色預旣豪族交結權貴共爲朋黨以斥隱竟以謗免黜歸于家貧无資用書遂不就乃依征西將軍􅁃亮供其􅁓筆書乃得成詣闕上之隱雖好著述而文辭鄙拙蕪舛不倫其書次弟可觀者皆其父所撰文體混雜義不可解者隱之作也宋書曰王淮之字元魯晉尚書僕射彬􅀇孫也曽祖彪之位尚書令博聞多見練悉朝儀自是家丗並記江左舊事緘之有青箱丗謂之王氏青箱學又曰髙平郄紹作晉中}
