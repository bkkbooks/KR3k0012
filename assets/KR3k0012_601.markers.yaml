  - {type: variant, offset: 2242, length: 725, content: 藥夜入其室則其寵妾所召也素拘執於庭將斬之百藥年未二十儀神儁秀素意惜之曰聞汝善為文所作詩自敘稱吾意者當免汝死解縛授以紙筆立就素覽之欣然以妾與之并資從數千萬楊德祖荅臨淄侯牋曰又嘗親見執事握牘持筆有所造作若成誦在心借書於手曾不斯須少留思慮仲尼日月無得而踰焉脩之仰望殆如此矣且以對鶡而作暑賦彌日而不獻見西施之容歸憎其白者也曹植曾作鶡鳥賦命脩作脩辭不為也又命作暑賦脩雖造終日不敢獻思遟西京雜記曰枚皋文章敏疾長卿製作淹遟而盡延譽然長卿首尾溫麗枚皋時有累句故知疾行無善迹矣揚子雲曰軍旅之際戎馬之間飛書走檄而用枚皋廊廟之下朝廷之中文高典冊而用相如後漢書曰張衡字平子少遊大學善屬文太始時天下自公侯以下莫不踰侈衡乃擬班固兩都遂作二京賦因以諷諫思十年始成魏志曰甘露二年帝幸辟雍會命群臣賦詩侍中和逌音由尚書陳騫等制作稽留有司奏免官詔曰吾以門昧愛好文雅廣延詩賦以知得失乃爾紛紜良用惻然乃共原逌等晉書曰左思字太冲齊郡臨淄人思少而好學年四十未仕潛思為三都賦十年而成貴勢之家競傳相寫又案郭伯通衛瓘為思傳曰思為三都改易死乃止宋書曰顏延之與陳郡謝靈運俱以詞彩齊名而遟速懸絕文帝嘗各勑擬樂府北上篇延之受詔輒成靈運久之乃就梁書曰武帝宴壽光殿令劉孺張率賦詩時率與孺並未及成帝取孺手板戲題之曰張率東南美劉孺洛陽才覽筆便應就何事久遟廻隋書曰薛道衡授內史侍郎加上儀同三司道衡每至構文必隱空齊蹋壁而臥聞戶外有人便怒其沉思如此李翰天寶中寓居陽翟為文精密用思苦澀常從陽翟令皇甫曾求音樂每思涸則奏樂神逸則著文唐李建字構直德宗聞其名擢充翰林學士未幾罷為它官高郢為御史大夫表授殿中侍御四遷兵部郎中知制誥自以草詔思遟不願當其任談藪曰盧思道與庾知禮作詩知禮詩成而思道未就知禮曰盧詩何太春日思道曰自許編苫疾如他織錦遟, SBCK: 一}
