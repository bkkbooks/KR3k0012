  - {type: variant, offset: 797, length: 4, content: 根車駕六, SBCK: 風蕩􅀄節玉露凋晚林此夕窮塗士鬱陶傷寸心野平葭葦合村落藿䔧深眺聽良多感徙􅀝獨霑􅁭霑􅁭何所爲悵然懷古意􅁗俗猶未平漢道將何兾樊噲市井屠蕭何刀筆吏一朝時運㑹万古傳名謚􅀉言丗上英虚生眞可愧詩成而泣下數行㑹東郡賊帥翟讓聚黨万餘人宻往㱕之宻因王伯當以䇿干讓曰當今主昏於上人怨於下銳兵盡於遼東和親絶於突厥方乃廵逰楊越委弃京都此亦劉項􅁬起之㑹以足下雄才大略席卷二京誅滅􅁀虐則隋氏之不足亡也讓深加敬異遣􅀃諸小賊所至皆降宻又􅀃讓曰今兵衆旣多粮無所出􅀂直取滎陽休兵館榖待士}
