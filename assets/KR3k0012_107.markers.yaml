  - {type: variant, offset: 2763, length: 1, content: 營, SBCK: 叛東都降于宻東至海岱南至江淮郡縣莫不遣使歸宻竇}
  - {type: variant, offset: 2763, length: 0, content: '', WYG: 叛東都降於宻東至海岱南至江淮郡縣莫不遣使歸宻竇建徳朱粲楊士林孟海公徐𤣥朗盧祖尚周法明等並遣使通表於宻勸進於是宻下官屬咸勸宻即尊號宻言東都未平不可議此及義旗建宻負其强盛欲自為盟主乃致書於髙祖為兄請合從以滅隋髙祖覽書笑曰李宻陸梁放肆不可以折簡招致吾方安輯京師未遑東討即相阻絶此便是更生一敵吾寧推顧使驕其志我得留闗中大事濟矣乃復書曰天生蒸民必有司牧當今為牧非子而誰惟弟早膺圖籙以寧兆民宗盟之長屬籍見容得復封于唐斯榮足矣宻得書甚恱示其部下曰唐公見推天下不足定於是不虞義師而專意於世充俄而宇文化及率衆自江都北指黎陽兵十餘萬宻乃自將步騎二萬拒之隋越王侗稱尊號遣使者授宻太尉尚書令東南道大行臺行軍元帥魏國公令先平化及然後入朝輔政宻將與化及相抗恐前後受敵因卑辭以報謝焉化及至黎陽與宻相遇宻遣徐世勣守倉城化及攻之不能下宻知化及粮且盡因偽與和以弊其衆化及弗之悟大喜恣其兵食冀宻饋之後知其詐化及怒與宻大戰於衛州之童山下宻為流矢所中頓於汲縣化及力竭粮盡衆多叛之掠汲縣北趣魏縣宻引兵而西遣使朝於東都執弑煬帝者于𢎞達以獻越王侗侗召宻入朝至温縣聞世充作難而止乃歸金墉城宻雖據倉而無府庫兵數戰皆不獲賞又厚撫初附之兵由是衆心漸離武徳元年九月世充以其衆五千來决戰宻留王伯當守金墉自引精兵就偃師北阻邙山以待之世充軍至宻遂敗績萬餘人馳向洛宻將入洛口倉城邴元真已遣人潛引世充宻因知之不發其事欲待世充兵半渡洛水然後擊之及世充軍至宻候騎不時覺比將出戰世充軍已濟矣宻自度不能支引騎而遁往赴武平元真以城降於世充宻將入黎陽或人謂宻曰向殺翟讓徐世勣等傷幾死創猶未平安可保乎時王伯當棄金墉保河陽宻以輕騎自武平歸之謂伯當曰兵敗矣徒苦諸君我今自刎請以謝衆伯當抱宻號呌慟哭衆皆莫敢仰視宻復曰諸君幸不相棄當共歸闗中宻雖無功諸君必冨貴於是從入闗尚二萬人髙祖遣使迎勞相望於道宻大喜謂其從曰我有衆百萬一朝至此命也今敗歸國幸蒙殊遇當思竭忠以奉所事耳且山東連城數百知吾至此遣使招之盡當歸此於竇融勲亦不細豈不堪一台司見處乎及至京師禮數益薄尋拜光祿大夫卿封邢國公未㡬聞其所部將帥皆不附世充髙祖使宻領本兵往黎陽招集故時將士經畧世充時王伯當為左武衛將軍亦令為副宻行至桃林髙祖復徴之宻大懼謀將叛伯當力止之宻不從因謂宻曰義士之立志不以存亡易心伯當荷公恩禮期以性命相報乃簡驍勇數十人著婦人衣載貲装蔵刀裾下詐為妻妾自牽之入桃林縣舎須臾變服突出因據縣城驅掠畜産直趣南山時右翊衛將軍史萬寳留鎮熊州遣副將盛彦師率步騎數千追躡至陸渾縣南七十里與宻相及彦師伏兵山谷宻軍先渡横出擊敗之遂斬宻王世充唐書曰王世充字行滿祖西域人祖支頹耨世充頗涉經史尤好兵法及龜筮推步之術開皇中以軍功拜儀同善敷奏明法律然舞弄文法髙下其心或有辨駁之者世充利口飾非辭義鋒起衆雖知其不可而莫能屈大業中累遷江都郡丞兼領江都宫監時煬帝數幸江都世充善候人主顔色阿諛順旨毎入言事帝必稱善乃雕飾池臺因奉逺方珍物以媚於帝由是益信之十年齊郡賊帥孟讓自長白山㓂掠諸郡至盱眙有衆十萬世充以兵拒破之煬帝以世充有將帥才畧復遣領兵討捕諸小盗所向盡平十一年突厥圍煬帝於雁門世充盡發江都人將往赴難在軍中蓬首垢面悲泣焦勞曉夜不解甲藉草而卧煬帝聞之以為忠益信任之十二年遷江都通守及李宻攻陷洛口倉逮逼東都煬帝詔世充大發兵於洛口以拒宻又遣就軍拜世充為將軍趣令破賊世充引軍渡洛水與李宻戰世充軍敗績乃率餘衆歸河陽時天寒大雪比至河陽纔存數千世充自繫請罪越王侗遣使赦之徴還洛陽置}
