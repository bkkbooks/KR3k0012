  - {type: variant, offset: 2871, length: 0, content: '', SBCK: 内皆承正朔唯公執迷獨阻聲敎東都士庻亟請王師􅀜}
  - {type: variant, offset: 2871, length: 0, content: '', WYG: 内皆從正朔惟公執迷獨阻聲教東都士庶亟請王師開張義勇咸思致力至尊重違衆願有所弔伐若轉禍來降則冨貴可保如故相抗無假多言世充無以對太宗分遣諸將攻其城鎮所至輒下九月王君廓攻抜世充轘轅後河南州縣相次降附十一月竇建徳遣人結好并陳救援之意世充乃遣其兄子琬及内史令長孫安世報急且乞師四年二月世充率兵出方諸門與王師相抗世充兵敗因乘勝追之屯其城門世充不復敢出但嬰城自守以待建徳之援三月秦王擒建徳并王琬長孫安世等于虎牢回至東都城下以示之且遣安世入城言敗狀世充惶惑不知所為將潰圍出南走襄陽問諸將皆不答乃率其將吏詣軍門請降秦王以世充至長安髙祖數其罪世充對曰計臣之罪誠不容誅但陛下愛子秦王許臣不死髙祖乃釋之與兄苪妻子同徙於蜀將行為仇人獨孤循徳所殺世充自簒位凡三年而滅竇建徳唐書曰竇建德漳州漳南人少時頗以然諾為重為里長犯法適亡去㑹赦得回父卒送𦵏者千餘人有所贈皆讓而不受大業七年募人欲討髙䴡本郡遂補建德為隊長是時山東大水人多流亡邑人孫安祖者妻子俱已餒死縣以安祖驍勇過人亦選在其}
