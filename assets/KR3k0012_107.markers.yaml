  - {type: variant, offset: 2938, length: 0, content: '', WYG: 時有隃人張金稱者亦結聚得萬餘人在河阻中蓚人髙士達亦得兵數千餘人在於清河界中時諸盗賊徃來漳南者所遇皆殺掠居人焚燒舎宅獨不入建徳之閭由是郡縣意建徳與賊交結遂收繫家屬無少長盡皆殺之建徳聞其家已被屠戮乃率麾下二千人亡歸於士達士達自稱為東海公以建徳為司兵後安祖為張金稱所殺其兵數千人又盡歸於建徳自此盗兵漸至萬餘人猶徃來髙雞泊中十二年涿郡通守}
