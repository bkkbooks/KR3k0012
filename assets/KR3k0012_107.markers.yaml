  - {type: variant, offset: 759, length: 1, content: 高, krp: 五月戊午詔曰天禍隋國大行太上皇遇盗江都酷甚望夷釁深驪北憫子小子奄逮不諐哀號永感心情麋潰仰惟荼毒仇復靡申形影相吊罔知啓處相國唐王膺期命丗扶危拯溺自北徂南東征西怨惣九合於一匡决百勝於千里紏率夷夏大庇氓黎保乂朕躬繄王是頼德侔造化工格蒼旻兆庶㱕心暦數斯在屈爲人臣載違天命在昔虞夏揖讓相推苟非重華誰堪命禹當今九服崩離三靈改卜大運去矣請避賢路兆謀布德頋已莫能私僮命駕湏歸蕃國予夲代王及予而代天之所廢豈其如是庶慿稽古之聖以誅四凶幸值惟新之㤙預充三恪雪冤耻於皇}
  - {type: variant, offset: 761, length: 0, content: '', SBCK: 守禋祀於孝孫朝聞夕殞及泉无恨今遵故事遜于舊邸庶官群辟改事唐朝冝依前典趣上尊号􅀂釋重􅀒感㤗兼懷假手真人俾除醜逆濟濟多士明知朕意仍􅃙有司凡有表奏皆不得以聞是日上遜位于大唐唐以上爲􅈶國公武徳二年夏五月崩時年十五史臣曰恭帝年在㓜冲遭家多難一人失德四海土崩羣盗蜂起犲狼塞路南巢遂徃流彘不歸旣鍾百六之期躬踐數終之運謳歌有屬笙鏞變響雖欲不遵尭舜之迹其庸可得乎李宻唐書曰李宻字􅀇䆳夲遼東襄平人也父寛隋上柱國蒲山公宻以父䕃爲左親侍常在仗下焬帝頋見之退謂許公宇文述曰向者左仗下黒色小兒爲誰許公對曰故蒲山公李寛子宻也帝曰箇小兒視瞻異常勿令􅀫衛他日述謂宻曰弟聦今如此當以才學取官三衛叢脞非飬賢之所宻大喜因謝病專以讀書爲事時人希見其面甞欲尋包愷乗一黄牛􅀍以蒲韉仍將漢書一帙掛於角上一手捉牛靷一手翻卷書讀之尚書令越國公楊素見於道從後按轡躡之旣及問曰何處書生躭學􅀂此宻識越公乃下}
  - {type: page-break, offset: 761, content: '', id: KR3k0012_SBCK_107-2a}
  - {type: page-break, offset: 761, content: '', id: KR3k0012_SBCK_107-2b}
  - {type: variant, offset: 761, length: 0, content: '', WYG: 守禋祀於孝孫朝聞夕殞及泉無恨今遵故事遜於舊邸庶官羣辟改事唐朝冝依前典輒上尊號若釋重負感泰兼懐假手真人俾除醜逆濟濟多士明知朕意仍勅有司凡有表奏皆不得以聞是日上遜位於大唐唐以上為酅國公武徳二年夏五月崩時年十五史臣曰恭帝年在幼冲遭家多難一人失徳四海土崩羣盗蜂起豺狼塞路南巢遂徃流彘不歸既鍾百六之期躬踐數終之運謳歌有屬笙鏞變響雖欲不遵堯舜之迹其庸可得乎李宻唐書曰李宻字𤣥邃遼東襄平人也父寛隋上柱國蒲山公宻以父䕃為左親侍常在仗下煬帝顧見之退謂許公宇文述曰向者在仗下小兒為誰許公對曰故蒲山公李寛子宻也帝曰箇黒色小兒視瞻異常勿令宿衛他日述謂宻曰弟聡令如此當以才學取官王衛藂脞非養賢之所宻大喜因謝病專以讀書為業時人希見其面嘗欲尋包愷乘一黄牛被以蒲韀仍將漢書一帙掛於角上一手捉牛靷一手翻書卷尚書令越國公楊素見於道從後按轡躡之既及問曰何處書生躭學若此宻識越國公乃下而}
