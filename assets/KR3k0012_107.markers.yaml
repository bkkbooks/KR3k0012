  - {type: variant, offset: 321, length: 315, content: 隋州刺史進位大將軍後徵還遇皇妣寢疾三年晝夜不離左右世稱純孝宇文護執政尤忌高祖屢將害焉大將軍侯伏侯壽等匡護得免其後襲爵隋國公武帝娉高祖長女為皇太子妃益加禮重齊王憲言於帝曰普六茹堅相貌非常臣每見之不覺自失恐非人下請早除之帝曰此止可為將耳內史王軌驟言於帝曰皇太子非社稷主普六茹堅貌有反相帝不悅曰必天命有在將若之何高祖甚懼深自晦匿建德中率水軍三萬破齊師於河橋明年從帝平齊進位柱國與宇文憲破齊任城王高湝於冀州除定州總管宣帝即位以后父徵拜上柱國大司馬大象初遷太僕丞右司武俄轉大府丞帝每巡幸恒委以居守大象二年五月以高祖為楊州總管將發暴有足疾不果行乙未宣帝崩時靜帝幼冲未能親理政事內史大夫鄭譯御正大夫劉昉以高祖皇后之父眾望所歸遂矯詔引高祖入總朝政, WYG: 假黄鉞使持節}
