  - {type: variant, offset: 759, length: 1, content: 高, SBCK: 五月戊午詔曰天禍隋國大行太上皇遇盗江都酷甚望夷釁深驪北憫子小子奄逮不諐哀號永感心情麋潰仰惟荼毒仇復靡申形影相吊罔知啓處相國唐王膺期命丗扶危拯溺自北徂南東征西怨惣九合於一匡决百勝於千里紏率夷夏大庇氓􅀺保乂朕躬繄王是頼德侔造化工格蒼旻兆庶㱕心暦數斯在屈爲人臣載違天命在昔虞夏揖讓相推苟非重華誰堪命禹當今九服崩離三靈改卜大運去矣請避賢路兆謀布德頋已莫能私僮命駕湏歸蕃國予夲代王及予而代天之所廢豈其如是庶慿稽古之聖以誅四凶幸值惟新之㤙預充三恪雪􅁈耻於皇}
  - {type: variant, offset: 759, length: 1, content: 高, WYG: 五月戊午詔曰天禍隋國大行太上皇遇盗江都酷甚望夷釁深驪北憫予小子奄逮丕諐哀號永感心懐麋潰仰惟荼毒仇復靡申形影相弔㒺知啓處相國唐王應期命世扶危拯溺自北走南東征西怨總九合於一匡決百勝於千里糾率夷夏大庇民黎保乂朕躬繄王是賴徳侔造化功格蒼旻兆庶歸心厯數斯在屈為人臣載違天命在昔揖讓相推茍非重華誰堪命禹當今九服崩離三靈改卜大運去矣請避賢路兆謀布徳願已莫能私重命駕須歸藩國予本代王及予而代天之所使豈其如是廣憑稽古之典以誅四㓙幸値維新之恩預充三恪雪寃恥於皇}
