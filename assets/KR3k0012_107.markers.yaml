  - {type: variant, offset: 3000, length: 0, content: '', SBCK: 宇文化及僣號於魏縣建德即日引兵討化及連戰大破之化及保聊城建德四面攻城䧟之建德入城先謁隋蕭皇后與語稱臣悉収弑煬帝元謀者斬之梟首轅門之外囚化及并其二子同攻以檻車至大陸縣斬之攻䧟洺州虜刺史􅀽子幹遷都于洺州號萬}
