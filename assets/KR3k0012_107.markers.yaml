  - {type: variant, offset: 851, length: 168, content: 宗伯大將軍金城公趙煚奉皇帝璽紱百官勸進高祖乃受焉開皇元年二月甲子上自相府常服入宮備禮即皇帝位於臨光殿設壇於南郊遣使柴燎告天是日大赦改元為開皇六月癸未詔以初受天命赤雀降祥五德相生赤為火色其郊及社廟依服冕之儀而朝會之服旗幟犧牲各令尚赤戎服以黃秋七月乙卯上始服黃百寮畢賀二年六月景申詔曰龍首山川原秀麗卉物滋阜卜食相土宜建都邑定鼎之基永固無窮之, SBCK: ''}
