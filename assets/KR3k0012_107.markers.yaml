  - {type: variant, offset: 2939, length: 2, content: 衍為, WYG: 絢率精兵萬餘人來討士達士達自以智畧不及建徳乃推軍司馬咸以兵授焉建徳既初董衆欲立奇功以㓕羣盗請士達守其輜重自簡精兵七千人以拒絢大破絢軍絢於是以數千騎遁走遣將追及平原斬其首以獻士達由是建徳之聲勢益振隋遣太僕卿楊義臣率兵萬餘人討張金稱破之於清河所獲賊衆皆屠滅餘㪚草澤間者後皆相聚共投建徳義臣乘勝至平原欲入髙谿泊建徳謂士達曰吾觀隋將善用兵者惟義臣耳新破金稱逺來襲我其鋒不可當請引兵避之令其欲戰不得空延嵗月必將疲倦乘便襲擊可有大功今若争鋒恐公不能當也士達不從其言因留建徳守壁自率精兵迎擊義臣果破士達於陣}
