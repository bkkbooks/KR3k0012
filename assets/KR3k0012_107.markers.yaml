  - {type: variant, offset: 4174, length: 1076, content: 月壬寅宇文述等敗績於薩水右屯衛將軍辛世雄死之九軍並陷將帥奔還亡者二千餘騎癸卯班師九月庚寅上至東都九年春正月丁丑徹天下兵募民為驍果集於涿郡二月戊寅幸遼東以越王侗民部尚書樊子蓋留守東都庚子北海人郭方預聚徒為盜自號盧公眾至三萬攻陷城大掠而去夏四月庚午車駕渡遼壬申遣宇文述楊義臣趣平壤五月丁丑熒惑入南斗己卯濟北人甄寶車聚眾萬餘寇掠城邑六月乙巳禮部尚書楊玄感反於黎陽丙辰玄感逼東都河南贊治裴弘策拒之反為賊所敗戊辰兵部侍郎斛斯政奔於高麗庚午上班師高麗犯後軍八月壬寅左詡衛大將軍宇文述等破楊玄感於閿鄉斬之餘黨悉平十年二月辛卯詔曰菆爾高麗僻居荒表鴟張狼噬侮慢不恭抄竊我邊陲侵軼我城鎮是以去歲出軍問罪遼碣殪長蛇於玄莬戮封豕於襄平扶餘眾軍風馳電逝追奔逐北徑踰沮水滄海舟楫衝賊腹心焚其城郭污其宮室高元伏鑕泥首送款軍門尋請入朝歸罪司寇朕以許其改過乃詔班師而長惡靡悛宴安鴆毒此而可忍孰不可容便可分命六師百道俱進朕當親執武節臨御諸軍秣馬九都觀兵遼水順天誅於海外救窮民於倒懸征伐以正之明德以誅之止除元惡餘無所問三月壬子行幸涿郡癸亥次臨渝宮親御戎服禡祭黃帝斬叛軍者以釁鼓秋七月甲子高麗遣使降囚送斛斯政上大悅八月己巳班師二月壬申上如東都其日大赦天下戊子入東都十二年七月甲子幸江都宮以越王侗光祿大夫叚達太府卿元文都檢校民部尚書韋津右武衛將軍皇甫無逸右司郎盧楚等總留後事十三年二月己丑馬邑校尉劉武周殺太守王仁恭舉兵作亂北連突厥自稱定楊可汗庚寅賊帥李密翟讓等陷興洛倉越王侗遣武賁郎將劉長恭光祿少卿房崱擊之反為所敗死者十五六庚子李密自號魏公稱元年開倉以賑群盜眾至數十萬河南諸郡相繼皆陷焉五月甲子唐公起義師於太原丙寅突厥數千寇太原唐公擊破之秋七月壬子熒惑守積屍丙辰武威人李軌舉兵反攻陷河西諸郡自稱涼王建元安東八月辛巳唐公破武牙郎將宋老生於霍邑斬之十一月景辰唐公入京師辛酉遙尊帝為太上皇立代王侑為帝改元義寧帝在江都聞唐公舉兵動容者久之以手琢按曰渠有奇相渠得之矣如此者再三遂欲渡江幸丹陽時宿衛諸將皆是秦人各有懷土之志宇文化及因人之心與裴虔通作亂入犯宮闈宿衛皆走遂執帝將出示眾數以十罪復引帝入求鴆不得令狐行達牽帝使坐以練布縊之時年五十蕭后令宮人撤床簀為棺以埋之化及發後右禦衛將軍陳稜奉梓宮於成象殿葬吳公臺下發歛之始容貌若生眾咸異之唐平江南之後改葬雷塘初上自以蕃王次不當立每矯情飾行以釣虛名陰有奪宗之計時高祖雅信文獻皇后而性忌媵妾皇太子勇內多嬖幸以此失愛帝後庭有子皆不育之示無私寵取媚於后大臣用事者傾心與交中使至第無貴賤皆曲承顏色伸以厚禮婢僕往來者無不稱其仁孝又常私入宮掖密謀於獻后楊素等因機構扇遂成廢立, SBCK: ''}
