  - {type: variant, offset: 2872, length: 0, content: '', SBCK: 義勇咸思致力至尊重違衆願有斯吊伐􅀂轉禍來降則冨貴可保如欲相抗無假多言丗充無以報太宗分遣諸將攻其城鎮所至輙下九月王君廓攻拔丗充之轘轅縣於是河南州縣相次降附十一月竇建德遣人結好井陳救援之意丗充乃遣其兄子琬及内史令長孫安丗報聘且乞師四年二月丗充率兵出方諸門與王師相抗丗充軍敗因乗勝追之屯其城門丗充不復敢出但嬰城自守以待建德之援三月秦王擒建德并王琬長孫安丗等于武牢廻至東都城下以示之且遣安丗入城使言敗狀丗充惶惑不知所爲將潰圍而出南走㐮陽問於諸將皆不荅乃率其將吏詣軍門請降秦王以丗充至長安髙祖數其罪丗充對曰計臣之罪誠不容誅但陛下愛子秦王許臣不死髙祖乃釋之與兄芮妻子同徒于蜀將行爲讎人獨孤修徳所殺丗充自篡位凡三􅀊而㓕竇建德附又曰竇建德貝州漳南人也少時頗以然諾爲事􅀄里長犯法亡去㑹赦得歸父卒送葬者千餘人有所贈皆讓而不受大業七年募人討髙麗夲郡遂􅀘建德爲二百長時山東大水人多流散同縣有孫安祖家爲水所漂妻子餒死縣以安祖驍勇亦選在行中安祖辭貧自言于漳南令令怒笞之安祖刺殺令亡投建德建德舎之是􅀊山東大饑建德謂安祖曰丈夫不死當立大功}
