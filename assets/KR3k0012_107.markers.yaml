  - {type: variant, offset: 794, length: 2, content: 蹕乘, SBCK: 薊直扼其喉前有髙麗退無歸路不過旬朔賫粮必盡舉麾一召其衆自降不戰而擒此計之上也関中四塞天府之國􅀂西入長安掩其無備天子雖還失其􅁭帶據險臨之故當必尅万全之勢此計之中也􅀂隨近逐便先向東都頓堅城之下勝􅀒殊未可知此計之下也玄感曰公之下計乃上䇿也宻計遂不行及玄感敗宻乃間行入関爲捕者所獲時焬帝在髙麗宻與其黨俱送帝所及出関外防禁漸㢮宻請通市酒食每夜醼飲喧譁竟夕使者不以爲意行至邯鄲宻等七人夜穿牆而遁詣淮陽隠姓名自稱劉智逺聚徒教授經數月蜜鬱鬱不得志爲詩曰}
