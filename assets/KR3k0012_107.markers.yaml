  - {type: variant, offset: 2938, length: 31, content: 郭衍為前軍李景為後軍文武官五品已上給樓舩九品已上給黃薎舳艫相接, SBCK: 時鄃人張金稱亦結聚得万人在河阻中蓨人髙士逹又起兵得千餘人在清河界中時諸盗徃來漳南者所過皆殺掠居人焚燒舎宅獨不入建德之閭由是郡縣意建德與賊徒交結収繫家属無少長皆殺之建德聞其家􅀍屠㓕率麾下}
