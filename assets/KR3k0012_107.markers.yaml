  - {type: variant, offset: 2975, length: 0, content: '', SBCK: 二年􅃰郡通守郭絢卒兵萬餘人來討士逹士逹自以智略不及建德乃推爲軍司馬咸以兵受焉建德旣􅀄統衆欲立竒功以威羣賊請士逹守輜重自簡精兵七千人以拒絢大破絢軍絢以數十􅀐遁走遣將追及於平原斬其首以獻士逹由是建德之􅀔益振隋遣太僕卿楊義臣率兵萬餘人討張金稱破之於清河所􅀗賊衆皆屠㓕餘散在草澤間者復相聚而投建德義臣乗勝至平原欲入髙雞泊建德謂士逹曰歴觀隋將善用兵者唯義臣耳新破金稱逺來襲我其鋒不可當請引兵避之令其欲戰不得空延歳}
