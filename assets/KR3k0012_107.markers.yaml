  - {type: variant, offset: 2780, length: 0, content: '', SBCK: 其事欲待丗充兵半渡洛水然後擊之及丗充軍至宻候􅀐不時覺比將出戰丗充軍巳濟矣宻自度不能支引􅀐而遁徑赴武牢元眞以城降於丗充宻將如􅀺陽或謂宻曰殺翟讓之際徐丗勣幾至於死今向其所安可保乎時王伯當弃金墉保}
  - {type: variant, offset: 2780, length: 0, content: '', krp: 其事欲待丗充兵半渡洛水然後擊之及丗充軍至宻候騎不時覺比將出戰丗充軍巳濟矣宻自度不能支引騎而遁徑赴武牢元眞以城降於丗充宻將如黎陽或謂宻曰殺翟讓之際徐丗勣幾至於死今向其所安可保乎時王伯當弃金墉保}
  - {type: variant, offset: 2781, length: 0, content: '', SBCK: 陽宻以輕􅀐自武牢歸之謂伯當曰兵敗矣乆苦諸君我今自刎請以謝衆伯當抱宻號叫慟絶衆皆泣莫能仰視宻復曰諸軍幸不相弃當共歸􅀜中宻身雖媿無功諸君必保冨貴於是從入􅀜者尚二萬人髙祖遣使迎勞相望於道宻大喜謂其徒曰我有衆百萬一朝至此命也今事敗歸國幸蒙殊遇當思竭忠以事所奉耳且山東連城數百知吾至此遣使招之盡當歸國比於竇融勲亦不細豈不以一台司見處乎及至京師禮數益薄尋拜光禄卿封邢國公未幾聞其所部將帥皆不附丗充髙祖使宻領夲兵徃黎陽招集故時將仕經略丗充時王伯當爲左武衛將軍亦令爲副宻行至桃林髙祖復徴之宻大懼謀將叛伯當頗止之宻不從因謂宻曰義士之立志也不以存亡易心伯當荷公恩禮期以性命相報乃簡驍勇數十人着婦人衣戴􅇈䍦藏刀裙下詐爲妻妾自率之入桃林縣舎湏􅁷変服突出因據縣城驅掠畜産直趣}
  - {type: page-break, offset: 2781, content: '', id: KR3k0012_SBCK_107-6b}
  - {type: variant, offset: 2781, length: 0, content: '', krp: 陽宻以輕騎自武牢歸之謂伯當曰兵敗矣乆苦諸君我今自刎請以謝衆伯當抱宻號叫慟絶衆皆泣莫能仰視宻復曰諸軍幸不相弃當共歸關中宻身雖媿無功諸君必保冨貴於是從入關者尚二萬人髙祖遣使迎勞相望於道宻大喜謂其徒曰我有衆百萬一朝至此命也今事敗歸國幸蒙殊遇當思竭忠以事所奉耳且山東連城數百知吾至此遣使招之盡當歸國比於竇融勲亦不細豈不以一台司見處乎及至京師禮數益薄尋拜光禄卿封邢國公未幾聞其所部將帥皆不附丗充髙祖使宻領夲兵徃黎陽招集故時將仕經略丗充時王伯當爲左武衛將軍亦令爲副宻行至桃林髙祖復徴之宻大懼謀將叛伯當頗止之宻不從因謂宻曰義士之立志也不以存亡易心伯當荷公恩禮期以性命相報乃簡驍勇數十人着婦人衣戴羃䍦藏刀裙下詐爲妻妾自率之入桃林縣舎湏臾変服突出因據縣城驅掠畜産直趣}
  - {type: variant, offset: 2782, length: 0, content: '', SBCK: 山時右翊衛將軍史万寳留鎮熊州遣副將盛産師率歩􅀐數千追躡至陸渾縣南七十里與宻相及彦師伏兵山谷宻軍半渡横出擊敗之遂斬宻時年三十七王丗充附又曰王丗充字行滿夲姓支西域胡人也丗充頗渉經史尤好兵法及􅀛筴推歩之術開皇中以軍功拜儀同善敷奏明習法律然舞弄文法髙下其心或有駮難之者丗充利口飾非辭議鋒起衆雖知其不可而莫能屈大業中累遷江都郡丞兼領江都宫􅁥時煬帝數幸江都丗充善候人主顔色阿䛕順旨每入言事帝必稱善乃雕飾池臺隂奏逺方珎物以媚於帝由是益昵之十年齊郡賊帥孟讓自長白山宼掠}
  - {type: page-break, offset: 2782, content: '', id: KR3k0012_SBCK_107-7a}
  - {type: variant, offset: 2782, length: 4, content: 諸郡男女, WYG: 率餘衆入朝世充盡収其衆振旅而還侗進世充太尉以尚書省為府備置官屬充嘗於侗前賜食還家遂大吐嘔疑遇毒所致自是不復詣朝諷侗欲加九錫之禮二年三月遂䇿授相國總百揆封鄭王加九錫備物段達雲定興等入見於侗曰天命不常鄭王功徳甚盛願陛下揖讓吿禪遵唐虞之迹侗怒四月假為侗詔䇿禪位遣兄世暉廢侗於含涼殿僣皇帝位建元曰開明國號鄭立子𤣥應為皇太子世充每朝聽必殷勤訓諭言詞重復千端}
