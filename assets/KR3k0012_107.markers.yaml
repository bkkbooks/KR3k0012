  - {type: variant, offset: 2784, length: 2, content: 男女, SBCK: 至旴􅇇有衆十餘萬丗充以兵拒大破之煬帝以丗充有將帥才略復遣領兵討諸小盗所向盡平十一年突厥圍煬帝於鴈門丗充盡發江都人將徃赴難在軍中蓬首垢面悲泣無度暁夜不解甲藉草而卧煬帝聞之以爲忠益信任之十二年遷江都通守及李宻攻䧟洛口倉進逼東都焬帝特詔丗充大發兵於洛口以拒宻又遣就軍拜丗充爲將軍趣令破賊丗充引軍渡洛氷與李宻戰丗充軍敗績乃率餘衆歸河陽時天寒大雪北至河陽􅂊以千數丗充自繫獄請罪越王侗遣使赦之徴還洛陽置營於含嘉倉城収合亡散復得}
