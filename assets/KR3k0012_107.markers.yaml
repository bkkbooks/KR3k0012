  - {type: variant, offset: 3992, length: 0, content: '', SBCK: 按甲挫其銳建德結陣於汜水􅁗王遣􅀐挑之建德進軍而戰竇抗當之建德少却􅁗王馳􅀐深入大破之建德中瘡竄於牛口渚車􅀐將軍白士讓楊武威生􅀗之建德所領兵衆一時奔潰妻曹氏及其左僕射齊善行將數百􅀐遁于洛州餘黨欲立建德養子爲主善行曰夏王平定河朔士馬精強一朝旣􅀍擒如此豈非天命有所㱕也不如委心清命無爲塗炭生人遂以府庫財物悉分與故將各令散去善行乃與建德右僕射裴矩行臺曹旦及建德妻率僞官属舉山東之地奉傳}
