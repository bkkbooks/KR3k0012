  - {type: variant, offset: 1512, length: 1244, content: 歲己巳殺左衛大將軍五原郡公元旻十一月戊子天下地震京師大風雪以晉王廣為皇太子十二月戊午詔東宮官屬不得稱臣於皇太子仁壽元年春正月乙酉朔大赦改元以尚書右僕射楊素為尚書左僕射納言蘇威為尚書右僕射丁酉徙河南王昭為晉王三年七月詔令州縣搜揚賢哲皆取明知今古通識治亂究政教之本達禮樂之源不限多少不得不舉以三旬咸令進路徵召將送必須以禮四年春正月景辰大赦甲子幸於仁壽宮乙丑詔賞罰支度事無巨細並付皇太子夏四月乙卯上不豫六月庚申大赦天下八月甲辰上疾甚臥於仁壽宮與百寮辭訣並握手歔欷是時唯太子及陳宣華夫人侍疾太子無禮宣華訴之帝怒曰死狗郍堪付後事遽令召勇楊素祕不宣乃屏左右令張衡入拉帝血濺屏風冤痛之聲聞于外年六十四在位二十四年史臣曰高祖龍德在田奇表見異晦明藏用故知我者稀始以外戚之尊受託孤之任與能之議未為當時所許是以周室舊臣咸懷憤惋既而王謙固三蜀之阻不踰朞月尉遟逈舉全齊之眾一戰而亡斯乃非止人謀抑亦天之所贊也乘茲機運遂遷周鼎于時蠻夷猾夏荊楊未一劬勞日昃經營四方樓船南邁則金陵失險驃騎北指則單于款塞職方所載並入疆理禹貢所圖咸受正朔雖晉武之克平吳會漢宣之推亡固存比義論功不能尚也七德既敷九歌已洽要荒咸暨尉侯無警於是躬節儉平傜賦倉廩實法令行君子咸樂其生小人各安其業強無陵弱眾不暴寡人物殷阜朝野歡娛二十年間天下無事區宇之內晏如也考之前王足以參蹤盛烈但素無學術不能任下無寬仁之度有刻薄之資暨乎暮年此風逾扇又雅好符瑞暗於大道建彼維城權侔京室人皆同帝制靡所適從聽哲婦之言惑邪臣之說溺寵廢嫡託付失人滅父子之道開昆弟之隙縱其尋斧剪伐本枝墳土未乾子孫繼踵屠戮松檟絻列天下皆非隋有惜哉跡其衰怠之源稽其亂亡之兆起自高祖成於煬帝所由來遠矣非一朝一夕其不祀忽諸未為不幸也煬皇帝隋書曰煬皇帝諱廣一名英小字阿𡡉高祖第二子也母曰文獻獨孤皇后上美姿儀少敏慧高祖及后於諸子中特所鍾愛在周以高祖勳封雁門郡公開皇元年立為晉王拜柱國并州揔管時年十三尋授武衛大將軍進位上柱國河北道行臺尚書令大將軍如故高祖令項城公韶安道公李徹輔導之上好學善屬文沉深嚴重朝野屬望高祖密令善相者來和遍視諸子和曰晉王眉上雙骨隆起貴不可言既而高祖幸上居第見樂器絃多斷絕又有塵埃若不用者以為不好聲妓善之上尤自矯飾當時稱為仁孝嘗觀獵遇雨左右進油衣上曰士卒皆霑濕我獨衣此乎乃令持去六年轉淮南道行臺尚書令其年徵拜雍州牧內史令八年冬大舉伐陳以上為行軍元帥及陳平進位太尉賜輅車乘馬兗冕之服玄珪白璧各一復拜并州揔管高祖之祠太山領武候大將軍明年歸藩後數載突厥寇邊復為行軍元帥出靈武無虜而還及太子勇廢立上為皇太子是月當受冊高祖曰吾以大興公成帝業令上出舍大興縣其夜烈風大雪地震山崩民舍多壞壓死者百餘口仁壽初奉詔巡撫東南是後高祖每避暑仁壽宮恒令上監國四年七月高祖崩上即皇帝位於仁壽宮八月奉梓宮還京師并州揔管漢王諒舉兵反詔尚書左仆射楊素討平之十一月癸丑詔可於伊雒營建東京即設官分職以為民極也大業元年正月壬辰朔大赦改元立妃蕭氏為皇后改豫州為秦州洛州為豫州廢諸州揔管府景申立晉王昭為皇太子三月丁未詔尚書令楊素納言楊達, SBCK: ''}
  - {type: variant, offset: 1512, length: 1244, content: 歲己巳殺左衛大將軍五原郡公元旻十一月戊子天下地震京師大風雪以晉王廣為皇太子十二月戊午詔東宮官屬不得稱臣於皇太子仁壽元年春正月乙酉朔大赦改元以尚書右僕射楊素為尚書左僕射納言蘇威為尚書右僕射丁酉徙河南王昭為晉王三年七月詔令州縣搜揚賢哲皆取明知今古通識治亂究政教之本達禮樂之源不限多少不得不舉以三旬咸令進路徵召將送必須以禮四年春正月景辰大赦甲子幸於仁壽宮乙丑詔賞罰支度事無巨細並付皇太子夏四月乙卯上不豫六月庚申大赦天下八月甲辰上疾甚臥於仁壽宮與百寮辭訣並握手歔欷是時唯太子及陳宣華夫人侍疾太子無禮宣華訴之帝怒曰死狗郍堪付後事遽令召勇楊素祕不宣乃屏左右令張衡入拉帝血濺屏風冤痛之聲聞于外年六十四在位二十四年史臣曰高祖龍德在田奇表見異晦明藏用故知我者稀始以外戚之尊受託孤之任與能之議未為當時所許是以周室舊臣咸懷憤惋既而王謙固三蜀之阻不踰朞月尉遟逈舉全齊之眾一戰而亡斯乃非止人謀抑亦天之所贊也乘茲機運遂遷周鼎于時蠻夷猾夏荊楊未一劬勞日昃經營四方樓船南邁則金陵失險驃騎北指則單于款塞職方所載並入疆理禹貢所圖咸受正朔雖晉武之克平吳會漢宣之推亡固存比義論功不能尚也七德既敷九歌已洽要荒咸暨尉侯無警於是躬節儉平傜賦倉廩實法令行君子咸樂其生小人各安其業強無陵弱眾不暴寡人物殷阜朝野歡娛二十年間天下無事區宇之內晏如也考之前王足以參蹤盛烈但素無學術不能任下無寬仁之度有刻薄之資暨乎暮年此風逾扇又雅好符瑞暗於大道建彼維城權侔京室人皆同帝制靡所適從聽哲婦之言惑邪臣之說溺寵廢嫡託付失人滅父子之道開昆弟之隙縱其尋斧剪伐本枝墳土未乾子孫繼踵屠戮松檟絻列天下皆非隋有惜哉跡其衰怠之源稽其亂亡之兆起自高祖成於煬帝所由來遠矣非一朝一夕其不祀忽諸未為不幸也煬皇帝隋書曰煬皇帝諱廣一名英小字阿𡡉高祖第二子也母曰文獻獨孤皇后上美姿儀少敏慧高祖及后於諸子中特所鍾愛在周以高祖勳封雁門郡公開皇元年立為晉王拜柱國并州揔管時年十三尋授武衛大將軍進位上柱國河北道行臺尚書令大將軍如故高祖令項城公韶安道公李徹輔導之上好學善屬文沉深嚴重朝野屬望高祖密令善相者來和遍視諸子和曰晉王眉上雙骨隆起貴不可言既而高祖幸上居第見樂器絃多斷絕又有塵埃若不用者以為不好聲妓善之上尤自矯飾當時稱為仁孝嘗觀獵遇雨左右進油衣上曰士卒皆霑濕我獨衣此乎乃令持去六年轉淮南道行臺尚書令其年徵拜雍州牧內史令八年冬大舉伐陳以上為行軍元帥及陳平進位太尉賜輅車乘馬兗冕之服玄珪白璧各一復拜并州揔管高祖之祠太山領武候大將軍明年歸藩後數載突厥寇邊復為行軍元帥出靈武無虜而還及太子勇廢立上為皇太子是月當受冊高祖曰吾以大興公成帝業令上出舍大興縣其夜烈風大雪地震山崩民舍多壞壓死者百餘口仁壽初奉詔巡撫東南是後高祖每避暑仁壽宮恒令上監國四年七月高祖崩上即皇帝位於仁壽宮八月奉梓宮還京師并州揔管漢王諒舉兵反詔尚書左仆射楊素討平之十一月癸丑詔可於伊雒營建東京即設官分職以為民極也大業元年正月壬辰朔大赦改元立妃蕭氏為皇后改豫州為秦州洛州為豫州廢諸州揔管府景申立晉王昭為皇太子三月丁未詔尚書令楊素納言楊達, WYG: ''}
