  - {type: variant, offset: 3001, length: 165, content: 正月辛酉東京成賜監督者各有差三月庚午車駕發江都夏四月庚戍上自伊闕陳法駕備千乘萬騎入於東京辛亥上御端門大赦免天下今年租賦三年四月甲午詔曰夫孝悌有聞人倫之本德行敦厚立身之基或節義可稱或操履清潔所以激貪厲俗有益風化強毅正直執憲不撓學業優敏文才美秀並為廊廟之用寔乃瑚璉之資才堪將略則拔之以禦侮膂力驍壯則任之爪牙爰及一藝可取亦宜採錄眾善畢舉, SBCK: 宫又}
