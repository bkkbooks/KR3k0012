  - {type: variant, offset: 2777, length: 2, content: 辛亥, SBCK: 兵由是衆心漸怨武德元年九月丗充以其衆五千來决戰宻留王伯當守金墉自引精兵就偃師北阻邙山以待之丗充軍至宻遂敗績於萬餘人馳向洛宻將入洛口倉城邴元真以遣人潜引丗充宻隂知之不}
  - {type: variant, offset: 2777, length: 2, content: 辛亥, krp: 兵由是衆心漸怨武德元年九月丗充以其衆五千來决戰宻留王伯當守金墉自引精兵就偃師北阻邙山以待之丗充軍至宻遂敗績於萬餘人馳向洛宻將入洛口倉城邴元真以遣人潜引丗充宻隂知之不}
