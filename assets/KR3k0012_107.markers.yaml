  - {type: variant, offset: 797, length: 4, content: 根車駕六, WYG: 風盪初節玉露凋晩林此夕窮途士鬱陶傷寸心野坪葭莩合村落藿藜深眺聽良多感徒淚獨霑襟霑襟何所為悵然懐古意秦俗猶未平漢道將何冀樊噲市井屠蕭何刀筆吏一朝時運㑹萬古傳名諡寄言世上英虚名其所愧詩成而泣下數行㑹東都賊帥翟讓者聚黨萬餘人宻徃歸之宻因王伯當以䇿干讓曰當今主昏於上人怨於下銳兵盡於遼東和親絶於突厥方乃巡逰揚越委棄京都此亦劉項奮起之㑹以足下雄材大畧席卷二京誅滅暴虐則隋氏不足亡也翟讓深加敬異遣說諸小賊所至皆降宻又說讓曰今兵衆既多粮無所出若直取滎陽休兵館榖待士}
