  - {type: variant, offset: 401, length: 0, content: '', WYG: 越干寳晉記論曰將相侯王連頭受戮乞為奴僕而猶不獲免嬪嬙妃主虜辱於戎卒豈不哀哉陸士衡辨亡論曰告類上帝拱揖羣后虎臣毅卒循江而守劉孝標辨命論曰楚師屠漢卒睢水鯁其流秦}
