  - {type: variant, offset: 1146, length: 0, content: '', SBCK: 十倍於古更工衡切更卒謂給郡縣一月而更也又胡建傳曰建字子孟河東人也孝武天漢中守軍正丞貧亡車馬常歩與走卒起居所以尉薦走卒甚得其心尉者自上安之也薦者舉藉之也􅀳書天文志曰積卒十三星在房心南主爲衛也又謝万傳曰万乃召集諸將都無所􅀃直如意指四座云諸將皆勁卒諸將益恨之又劉元海載記曰元海薨和嗣立呼延攸等恨不叅顧命也􅀃和曰先帝不惟輕重之計而使三王揔強兵於内大司馬握十萬勁卒居于近郊陛下今便爲􅀉坐禍難未可惻也又劉曜載記曰劉岳攻石生于洛陽配以近郡甲士五}
  - {type: page-break, offset: 1146, content: '', id: KR3k0012_SBCK_300-3a}
  - {type: variant, offset: 1146, length: 0, content: '', krp: 十倍於古更工衡切更卒謂給郡縣一月而更也又胡建傳曰建字子孟河東人也孝武天漢中守軍正丞貧亡車馬常歩與走卒起居所以尉薦走卒甚得其心尉者自上安之也薦者舉藉之也晉書天文志曰積卒十三星在房心南主爲衛也又謝万傳曰万乃召集諸將都無所說直如意指四座云諸將皆勁卒諸將益恨之又劉元海載記曰元海薨和嗣立呼延攸等恨不叅顧命也說和曰先帝不惟輕重之計而使三王揔強兵於内大司馬握十萬勁卒居于近郊陛下今便爲寄坐禍難未可惻也又劉曜載記曰劉岳攻石生于洛陽配以近郡甲士五}
