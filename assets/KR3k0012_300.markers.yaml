  - {type: variant, offset: 47, length: 280, content: 詞辨從衡能移奪人之性情堪辨說者能往來聽言語覽視四方之事軍中之情偽日列於前者能得敵之主佐門廬請謁之情堪間諜者能知山川險易行止形勢利害遠近井泉水草逕路迂直堪鄉導者巧思出人制造五兵及攻守器械者引強敵撤扎戈鋋劍戟便於利用挺身捕虜搴旗斬將堪陷陣者趫捷若飛踰城越塹出入無形堪窺覘者往返三百里不及暮至者破格舒鉤或負六百斤行五十步四百斤行百步者推步五行瞻風雲氣候轉或多言天道詭說陰陽者此雖非兵家本事所要資權譎以取勝耳罪犯者父子兄弟欲執仇者貧窮忿怒將欲快其志故贅𦕓人虜欲昭迹楊名長短經曰夫王者帥師必簡練英雄知士高下因能授職各取所長為其股肱羽翼以成威神然後萬事畢矣腹心一人主淵泉應, SBCK: 爲}
