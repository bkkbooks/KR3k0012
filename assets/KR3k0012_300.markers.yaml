  - {type: variant, offset: 1143, length: 2, content: 被練, SBCK: 爲巳徒卒老㓜守宫次于雱門之外五日右師從之又曰蔡衞不拔固將先奔旣而萃於王卒可以禁事從之又曰子玉使伯棼請戰曰非敢必有功也願以間執䜛慝之口王怒少與之師唯西廣東宫與若敖之六卒實從之又曰狐毛狐偃以上軍夾攻子西楚左師潰楚師敗績子玉收其卒而止故不敗史記項羽夲紀曰是時吕后兄吕侯爲漢將兵居下邑漢王間徃從之稍稍收其士卒漢書曰呉王劉濞傳曰呉王先起兵誅漢吏二千石以下膠西膠東王爲渠率與甾川濟南共攻圍臨甾趙王遂亦隂使匈奴與連兵七國之發也呉王悉其士卒下令國中曰寡人年六十二身自將少子年十四亦爲士卒先諸年上與寡人同與少子等皆發二十餘萬人也又司馬迁傳曰且陵提步卒不滿五千深踐戎馬之地足歴王庭垂餌虎口横挑強胡陵李陵也又刑法志曰戰國之時轉相攻伐齊愍以伎擊強魏惠以武卒􅁬􅁗昭以銳士勝又五行志曰成帝綏和二年八月鄭通里男子王褒衣綘衣小冠帶劒入北司馬門上前殿解帷組結佩之自云天帝使我居此收縳考問故公車大誰卒病狂易不自知入宫下獄死大誰者非常之人名大姓誰是也本以誰何爲稱因用名官有大離長今此卒即長所領之卒也又食貨志曰董仲舒􅀃武帝曰今荒滛越制踰侈以相髙邑有人君之尊里有公侯之冨小民焉得不困又加月爲更卒巳復爲正一歲屯戍}
