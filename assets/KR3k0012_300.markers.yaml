  - {type: variant, offset: 400, length: 0, content: '', WYG: 廣狹從四角面立表制陣之宜請部曲各自案陣兵曹舉事不如令者斬陳孔璋檄吳王校部曲文曰又使征西將軍夏侯淵等帥兵甲五萬巴漢鋭卒五萬又曰城都屠鈎踐武卒散於黄池曹植求自試表曰伏見先帝武臣宿兵年耆即世者有間矣雖才不乏世宿將舊卒猶習戰也阮嗣宗為鄭冲勸晉王牋曰東誅叛逆前軍獨尅擒闔閭之將斬輕鋭之卒以萬計威加南海名懾}
