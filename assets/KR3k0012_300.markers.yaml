  - {type: variant, offset: 2445, length: 145, content: 龍甲犀渠皆是雲臺之仗莊子曰䈥力之士矜難勇敢之士奮忠兵革之士樂戰文選曰雲屯七萃士魚麗六郡兵又曰士馬精研陸士衡辯亡論曰于時雲興之將帶州焱起之師跨邑哮闞之群風驅熊羆之士霧集又曰夫曹劉之將非一世所選向時之師無曩中之眾又曰孫子荊為石仲容與孫皓書云今百僚濟濟俊乂盈庭虎臣武將折衝萬里國富兵強六軍精練隊伍, SBCK: 也}
