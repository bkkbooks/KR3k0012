  - {type: variant, offset: 371, length: 749, content: 天文三人主占星曆候風氣理時日考符驗效災異知天心去就者也地形三人主軍行上形勢利害逮近險易水涸山阻不失地利者也兵法九人主講論異同行事成敗簡練兵器凡軍陣所用刺舉非法者也通糧四人主廣飲食密蓄積通糧道致五穀令三軍不困乏食也奮威四人主擇材士諭兵馬風流電掣不失所由奇狀也鼓旗三人主左鼓旗符節號令倏忽往來出入若神股肱四人主出旌扞任重持難修溝塹治壁壘四轉守禦者通才三人主拾遺補過集會術數周流並會應偶賓客議論談語消息結解也權士三人主奇譎殊異非人所識行無窮之變也耳目七人主往來聽言語覽視四方之事軍中之情偽日列於前也爪牙五人主揚威武激厲三軍冒難死攻令三軍勇猛也羽翼四人主飛名譽震遠近動移四境以弱敵心也游士八人主祠徵祥候開闔視敵人為謀者也偉士二人主為諸詐依託鬼神以惑敵心法筭二人主計會三軍領理萬物也方士二人主為藥以全傷病也軍中有大勇敢死樂傷者聚為一卒名曰冒將之士有勃氣壯勇暴強者聚為一卒名曰陷陣之士有學於奇正長劍琱弧接武齊列者聚為一卒名曰銳騎之士有破格舒鉤強梁多力能潰破金鼓絕滅旗旌者聚為一卒名曰勇力之士有能踰高超遠輕足善走者聚為一卒名曰冠兵之士有故王臣失勢欲復見其功者聚為一卒名曰死鬭之士有死罪之人昆弟為其將報讎者聚為一卒名曰死責之士有貧窮忿怒將快其志者聚為一卒名曰必死之士有故贅𦕓人虜欲昭迹揚名者聚為一卒名曰厲頓之士有辯言巧辭善毀譽者聚為一卒名曰間諜飛言弱敵之士有故咠靡免罪之人欲逃其恥者聚為一卒名曰幸用之士有材伎過人能負重行數百里者聚為一卒名曰待令之士夫卒強將弱曰陁音豕吏強卒弱曰陷兵無選鋒曰北必然之數矣故曰兵眾孰強士卒孰練知之者勝不知之者不勝不可忽也兵眾書曰如虎如貔如熊如羆于商郊又曰用咸戒于王曰王左右常伯常任準人綴衣虎賁詩曰予王之爪牙予王之爪士周禮曰司戈掌戈盾之物而頒之軍旅會同授貳車戈盾建乘車戈盾授旅賁及虎士戈盾, SBCK: 皆赤幘絳褠}
