  - {type: variant, offset: 2433, length: 1, content: 雲, WYG: 左右周旋進退超越溝塹馳山林險阻絶大澤越强敵亂大衆者名曰武騎之士不可不厚也三畧曰欲知敵形色可勝之符先以二十八騎惑之騎象二十八宿也淮南子曰夫善游者溺善騎者墮各以其所好反自為禍禍害也是故好事者未嘗不中中傷也好為情欲之事者未嘗不自傷也爭利者未嘗不窮也通典曰孫臏云用騎有十利一曰迎敵始至二曰乘敵虛背三曰追敵散亂四曰迎敵前擊敵後使敵奔走五曰遮其粮食絶其軍道六曰敗其津關廢其橋梁七曰掩其不備卒擊其未振八曰攻其慢怠出其不意九曰燒其積聚市里十曰蹂其田野係累其子弟此十者其騎戰利也夫騎者能離能散能}
