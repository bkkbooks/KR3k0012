  - {type: variant, offset: 2433, length: 1, content: 雲, SBCK: 左右周旋進退超越溝塹馳山陵險阻絶大澤越強敵亂大衆者名曰武騎之士不可不厚也三略曰欲知敵形色可勝之符先以二十八􅀐感之􅀐象二十八􅀫也淮南子曰夫善游者溺善􅀐者墮各以其所好反自爲禍禍害也是故好事者未甞不中中傷也好爲情欲之事者未甞不自傷也爭利者未甞不窮也通典曰孫臏云用􅀐有十利一曰迎敵始至二曰乗敵虚背三曰追散亂擊四曰迎敵前擊後使敵奔走五曰遮其糧食絶其軍道六曰敗其津􅀜發其橋梁七曰掩其不備卒擊其未振八曰攻其靜怠岀其不意九曰燒其積聚市里十曰掠其田野係纍其子弟此十者􅀐戰利也夫􅀐者能離能散能}
