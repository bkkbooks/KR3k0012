  - {type: variant, offset: 1147, length: 0, content: '', SBCK: 􅀫衛精卒一萬濟自盟津鎮東呼延讓荆州之衆自崤澠而東莊子曰孔子徃見盗跖盗跖乃方休卒太山之陽膾人肝而餔之魏武歩戰令曰嚴鼔一通歩􅀐士悉裝再通騎上馬歩結屯三通以次出之隨幡所指住者結屯幡後聞急鼔音整陣斥􅀱者視地形廣狹從四角面立表制陣之冝諸部曲各自按部陣兵曹舉不如令者斬陳孔璋檄呉將校部曲文曰又使征西將軍夏侯淵等帥精甲五萬巴漢銳卒又曰城都屠勾踐武卒散於黄池曹植求自試表曰伏見先帝武臣􅀫兵年􅂄即丗者有聞矣雖賢不乏丗􅀫將舊卒猶習戰也阮嗣宗爲鄭冲勸晉王牋曰東誅叛逆全軍獨尅擒闔閭之將斬輕銳之卒以萬計威加南海名懾三越于寳􅀳紀論曰將相侯王連頭受戮乞爲奴僕而猶不獲免嬪嬙妃主虜辱於戎卒豈不哀哉陸士衡辨亡論曰告􅀋上帝拱揖羣后虎臣毅卒循江而守劉孝摽辨命論曰楚師屠漢卒睢河鯁其流􅁗人坑趙士卒沸聲􅀂雷霆班孟堅西都賦曰列卒周匝星羅雲布左太冲呉都賦曰雕題之士鏤身之卒又魏都賦曰簿戍綿􅇈無異蛛蝥之網弱卒􅃈甲何異螳蜋之衛王仲宣從軍詩曰汎舟盖長川陳卒􅀍隰坰謝靈運擬魏太子鄴中集應瑒詩曰官度厠一卒烏林預艱阻賈􅁩過􅁗篇曰率罷散之卒將數百之衆轉而攻􅁗斬木爲兵掲竿爲旗又曰信臣精卒陳利兵而誰何顔延年楊給事誄曰立于將卒之間以輯華裔之衆􅀐釋名曰􅀐歧也兩脚歧别也}
