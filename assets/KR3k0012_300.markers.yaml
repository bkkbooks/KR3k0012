  - {type: variant, offset: 225, length: 4, content: 道詭說陰, WYG: 帝使我居此收縛考問故公車大誰卒病狂易不自知入宫下獄大誰者非常之人名大姓誰是也本以誰何為稱因用名官大誰長今比卒即長所領之卒也又食貨志曰董仲舒説武帝曰今荒淫越制踰侈以相髙邑有人君之尊里有公侯之富小民焉得不困又曰月為更卒一嵗屯戍三十倍於古更江衡切更卒為給郡縣一月而更也又胡建傳曰建字子孟河東人也孝武天漢中守軍正丞貧亡車馬常歩與走卒起居所以慰薦走卒甚得其心慰者自上安之也薦者舉藉之也晉書天文志曰積卒十三星在房星南主為衛也又謝萬𫝊曰萬乃召集諸將都無所説直以如意指四座云諸將皆勁卒諸將益恨之又劉元海載記曰元海薨和嗣立呼延攸等恨不叅顧命也説和曰先帝不惟輕重之計而使三王總强兵於内大司馬握十萬勁卒居於近郊陛下今便為寄坐禍難未可測也又劉曜載記曰劉岳攻石生於洛}
