  - {type: variant, offset: 1139, length: 1, content: 組, SBCK: 楚令尹子重將爲陽橋之役赦罪悉師王卒盡行彭名御戎蔡景公爲左許靈公爲右又曰晉侯將伐鄭楚子救鄭六月晉楚遇於􅋣陵苗賁皇言於晉侯曰楚之良在中軍王族而巳請分良以擊其左右而三軍萃於王卒必大敗又曰宣子謂鞅曰矢及君屋死之鞅用劒以帥卒而欒氏退攝車從之又曰楚伐舒鳩呉人救之楚子彊子息桓子駢子子孟五人以其私卒先擊呉師呉師奔登山以望見楚師不繼復逐之傳諸其軍又曰齊爲鄎故國書髙無夲帥師伐我及清季孫謂其宰冉求曰齊師在清必魯故也季氏之}
