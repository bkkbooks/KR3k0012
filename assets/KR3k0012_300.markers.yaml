  - {type: 'tls:seg', offset: 28, content: '', id: KR3k0012_CHANT_300-1a.8}
  - {type: variant, offset: 31, length: 1, content: 任, WYG: 樂氏退攝車從之又曰楚伐舒鳩吳人救之楚子彊子息桓子駢子子孟五人}
  - {type: punctuation, offset: 32, content: ，, id: KR3k0012_CHANT_300-bkkpn9}
  - {type: 'tls:seg', offset: 32, content: '', id: KR3k0012_CHANT_300-1a.9}
  - {type: variant, offset: 33, length: 0, content: '', WYG: 為師卒先斃吳師吳師奔登山以望見楚師不繼復逐之傅其諸軍又曰齊為鄎故國書髙無㔻帥師伐我及清季孫謂其宰冉求曰齊師在清必魯故也季氏之甲七千冉有以武城人三百為己徒卒老幼守宫次於雩門之外五日右師從之又曰蔡衛不支固將先奔既而萃於王卒可以集事從之又曰子玉使伯棼請戰曰非敢必有功也願以間執䜛慝之口王怒少與之師唯西廣東宫與若敖之六卒實從之狐毛狐偃以上軍夾攻子西楚左師潰楚師敗績子玉}
  - {type: page-break, offset: 33, content: '', id: KR3k0012_WYG_300-2b, image: WYG0895/WYG0895-0602d.png}
  - {type: page-break, offset: 33, content: '', id: KR3k0012_WYG_300-3a, image: WYG0895/WYG0895-0603a.png}
  - {type: variant, offset: 35, length: 2, content: 效選, WYG: 卒而止故不敗史記項羽本記曰是時吕后父吕公為漢將兵居下邑漢王間徃從之稍稍收其}
  - {type: punctuation, offset: 36, content: 。, id: KR3k0012_CHANT_300-bkkpn10}
  - {type: 'tls:seg', offset: 36, content: '', id: KR3k0012_CHANT_300-1a.10}
  - {type: variant, offset: 38, length: 0, content: '', WYG: 卒漢書曰吳王劉濞傳曰吳王先起兵誅漢吏二千石以下膠西王膠東王為渠率與菑川濟南共攻圍臨菑趙王遂亦隂使匈奴與連兵七國}
  - {type: variant, offset: 39, length: 6, content: 科沉謀密略出, WYG: 發也吳王悉其士卒下令國中曰寡}
