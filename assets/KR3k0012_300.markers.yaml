  - {type: variant, offset: 2412, length: 2, content: 蕭明, SBCK: 陳韋翽字子羽有志操以孝著稱先㝷以爲驍􅀐將軍領朱衣直閣驍騎之職舊領營兵梁丗巳來其任逾重􅔘素有名望毎大事恒令俠侍左右時人榮之號曰俠御將軍祢衡別傳曰衡着官布單衣以杖捶地數罵責操及其先祖無所不至操乃勑外具上廐驎馬三疋并􅀐二人須􅁷外給啓馬辨曹公謂孔文舉曰祢衡小人無狀乃尔􅀌今殺之無異䑕雀耳顧此子有異才逺近聞之􅀌今殺之將謂􅀌不能容劉景􅂛天性險急不能容受此子必當殺之乃以衡置馬上兩􅀐挾送至南陽也㑹稽典録曰朱育謂鍾離曰大皇帝以神武之姿欲得五千􅀐乃可有圖今􅀐無從出而懷進取之志將何計收曰大皇以中國多騎欲得􅀐以當之呉神鋒弩射三四里洞三四馬騎敢近之乎鄴中記曰石虎皇后出女􅀐千人皆着五綵靴鄴城故事記涼馬臺一名閱焉臺亦名戯馬臺案鄴中記云趙}
  - {type: page-break, offset: 2412, content: '', id: KR3k0012_SBCK_300-7a}
  - {type: page-break, offset: 2412, content: '', id: KR3k0012_SBCK_300-7b}
  - {type: variant, offset: 2412, length: 2, content: 蕭明, WYG: 陳韋翽字子羽有志操以孝著稱髙祖以為驍騎將軍領朱衣直閣驍騎之職舊領營兵梁世以來其任愈重翽素有名望毎大事恒令夾侍左右時人人榮之號曰俠御将軍禰衡别𫝊曰衡着官布單衣以杖捶地數罵曹操及毁其先祖無所不至操及勅外取上廐駿馬三疋并騎二人須㬰外給馬辦曹公謂孔文舉曰禰衡小人無狀乃爾孤今殺之無異䑕雀耳顧此子有異才逺近聞之將謂孤不能容物劉景升天性憸急不能容受此子必當殺之乃以衡置馬上兩騎挾送至南陽也㑹稽典録曰朱育謂鍾離曰大皇帝以神武之姿欲得五千騎乃可有圗今騎無從出而懐進取之志奈何鍾離曰大皇以中國多騎欲得騎以當之吳神鋒弩射三四里洞穿三馬騎敢近之乎鄴中記曰石虎皇后出女騎千人皆著五采靴鄴城故事曰凉馬臺一名閲馬臺亦名戲馬臺案鄴中記云趙}
