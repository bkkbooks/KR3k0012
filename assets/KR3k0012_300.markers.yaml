  - {type: variant, offset: 13, length: 0, content: '', WYG: 卒衣有題識者也玉篇曰卒衆之名也屯戍之兵也桂苑曰卒𨽻人也管子曰管仲相齊作内政而寄軍令二百人為卒卒有正卒聚也韻海曰南楚謂卒為弩父卒主擔弩導因以為名也又行鞍杖者也皆赤幘綘韝左𫝊曰齊侯求逢丑父三入三出毎出齊師以帥退入於狄卒狄卒者狄人從晉討齊也狄卒皆抽戈盾冐之又曰楚令尹子重}
  - {type: page-break, offset: 13, content: '', id: KR3k0012_WYG_300-1b, image: WYG0895/WYG0895-0602b.png}
  - {type: variant, offset: 14, length: 1, content: 統, WYG: 為陽橋之役赦罪悉師王卒盡行彭名御}
  - {type: page-break, offset: 14, content: '', id: KR3k0012_WYG_300-2a, image: WYG0895/WYG0895-0602c.png}
  - {type: punctuation, offset: 16, content: ，, id: KR3k0012_CHANT_300-bkkpn6}
  - {type: 'tls:seg', offset: 16, content: '', id: KR3k0012_CHANT_300-1a.6}
  - {type: variant, offset: 16, length: 0, content: '', WYG: 蔡景公為左許靈公為右又曰晉侯將伐鄭楚子救鄭六月晉楚遇於鄢陵苖賁皇言於晉侯曰楚之良}
  - {type: variant, offset: 17, length: 3, content: 知士器, WYG: 中軍王族而已請分良以擊其左右而三軍萃於王卒必大敗又曰宣子謂鞅曰矢及君屋死之鞅}
  - {type: punctuation, offset: 21, content: ，, id: KR3k0012_CHANT_300-bkkpn7}
  - {type: 'tls:seg', offset: 21, content: '', id: KR3k0012_CHANT_300-1a.7}
