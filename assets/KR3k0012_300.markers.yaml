  - {type: variant, offset: 1417, length: 195, content: 又曰河南賊張步據齊地耿弇討敗之步肉𥘵負斧鑕於軍門鑕鍖也示必死鍖音砧鑕音質弇傳步詣行在而勒兵入據其城樹十二郡旗鼓弇凡平城陽琅邪高密膠東菜北海齊千乘濟山臨淄令步兵各以郡人詣旗下眾尚十餘萬輜重七千餘兩皆罷遣歸鄉里齊地悉平又曰建安中劉表為荊州牧理今江陵郡也劉備時在荊州眾力尚少諸葛亮曰荊非少人也而著藉者寡平居發調即人心不悅凡有游戶皆使自實因錄以益眾可也備言其計故表眾遂強又曰百官志云節從武賁比二百石, SBCK: ''}
