  - {type: variant, offset: 2415, length: 3, content: 僧辨書, SBCK: 虎建武六年造涼馬臺在城西漳水之南約坎爲臺虎常於此臺簡練􅀐卒虎牙􅀫衛號雲騰黒矟􅀐五千人毎月朔晦閱馬於此臺乃於漳水之南張幟鳴鼔列􅀐星羅虎乃登臺射􅐴箭一發五千騎一時奔走從漳水之南齊走集於臺下隊督巳下皆班賚虎又射一箭其五千􅀐又齊走於漳水之北其五千流散攅促􅀂數萬人􅀐皆以􅃮矟從事故以黒矟爲號季龍又常以女􅀐一千人爲鹵簿皆着紫綸巾熟錦袴金銀鏤帶五文織成靴遊于臺上六韜}
  - {type: variant, offset: 2415, length: 3, content: 僧辨書, WYG: 虎建武六年造凉馬臺在城西漳水之南約次為臺虎常於此臺簡練騎卒虎牙宿衛號雲騰黒矟騎五千人每月朔晦閲馬於此臺乃於漳水之南張幟鳴鼔列騎星羅虎乃登臺射􅐴箭一發五千騎一時奔走從漳水之南齊走至於臺下隊督以下皆班賚虎又射一箭騎五千又齊走於漳水之北其五千流散攅促若數萬人皆騎以漆矟從事故以黒矟為號季龍又常以女騎一千人為鹵簿皆着紫綸巾熟錦袴金銀縷帶五文織成靴逰臺上六韜}
