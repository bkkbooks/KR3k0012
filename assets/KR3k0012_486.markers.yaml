  - {type: variant, offset: 97, length: 178, content: 作幹佐為稻田守草吏同郡吏憐其貧資給甚厚艾初不稍謝每見高山大澤輒窺度指畫軍營處所時人多笑焉吳志曰呂範字子衡汝南人有容觀姿皃邑人劉氏家富女美範求之母嫌欲勿與劉氏曰呂子衡寧當久貧者遂與之婚又曰潘璋字文珪東郡人性嗜酒其家甚貧性好賖貸輒言豪富必相還孫權甚奇之魏將夏侯尚南郡作浮橋渡百里洲璋於上流伐葦作簟欲順風放火簟成尚使引退璋遂為平北將軍晉書阮咸字仲容陳留人時俗七月, SBCK: 行絶糧}
