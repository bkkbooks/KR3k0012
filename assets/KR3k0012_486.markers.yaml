  - {type: variant, offset: 1384, length: 714, content: 壁餘光貧妾不蒙見愛之恩長為妾不亦可乎莫之能應遂復與夜高士傳曰老萊子楚人耕蒙山之陽以藿葭為牆蓬蒿為室枝木為床蓍艾為席東方朔別傳曰朔書與公孫弘借書曰朔當從甘泉願借外廄之後乘木槿夕死而朝生者士亦不必長貧也李郃別傳曰公居貧而不好治產有稻田三十畝弟宅一區至京學問常以賃書自給為人沉深弘雅有大度郭林宗別傳曰林宗家貧初欲遊學無資就姊夫貸五千錢乃遠至成皋從師受業併日而食衣不蔽形常以蓋幅自鄣出入入則戶前出則掩後邴原別傳曰原字根矩年十一喪父家貧早孤鄰有書舍原過其傍而泣師問曰童子何悲原曰孤者易傷貧者易感夫書者必有其父兄一則願其不孤二則羨其得學心中惻然而為涕零也師亦哀原之言而為泣曰欲書可書耳桓階別傳曰階貧儉文帝嘗幸其第見諸子無褌文帝搏手笑曰長者子無褌乃抱與同乘是日拜二子為郎使黃門齎衣三十囊賜曰卿兒能趍可以褌矣文士傳曰劉梁字曼山一名岑漢宗室子孫少有清才以文學見貴梁貧恒賣書以供衣食汝南先賢行狀曰胡定字元安頴川人至行絕人在喪雉兔遊其庭雪覆其室縣令遣戶曹掾排雪問定定已絕穀妻子皆臥在床令遣以乾糗就遺之定乃受半三輔決錄曰第五頡字子陵倫小子以清正為郡功曹至州從事公府辟舉高第侍御史南頓令皆稱病免洛陽無主人鄉里無田宅寄止靈臺中或十日不炊又曰孫晨字允公家貧不仕居杜城中織箕為業明詩書為郡功曹冬月無被有一束芻暮臥中旦燒之華陽國志曰朱良字雲卿什仿人少受學於蜀郡張寧食豆屑飲水以諷誦同業憐其貧給米肉不受家貧恒以步行為郡功曹世說曰李弘度常歎不被遇殷楊州知其家貧問君能屈志百里不李荅曰北門之歎久已上聞窮猿奔林豈暇擇木遂作鄻縣俗說曰謝僕射太常詣吳領軍坐久吳留客作食日已中方使婢賣狗供客比得食無氣力可語又曰劉真長少時居丹徒家至貧織芒履以養母說苑曰子思居於衛縕袍無表二旬九食, SBCK: ''}
