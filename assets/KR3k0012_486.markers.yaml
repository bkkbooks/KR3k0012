  - {type: variant, offset: 3012, length: 0, content: '', WYG: 今夫窮鄙之社也叩盆拊缻相和而歌自以為樂矣窮鄙之社窮巷之小社也嘗試為之擊建皷撞巨鍾乃始知其擊缻之足羞矣新序曰甯戚欲干齊桓公窮困無以自進於是為商歌宿於郭門之外擊牛角而歌桓公聞之曰異哉之歌非常人也雜道書曰地肺之山其下生草名曰救窮如竹冬夏不枯取而食之可絶榖不食令人長生服之三十日行及走馬趙壹窮鳥賦曰有一窮鳥戢翼原野罩網加上機穽在下前見蒼隼後逼駈者繳彈張右羿弓彀左飛丸繳矢交集於我思飛不得欲鳴不可舉頭畏觸揺足恐墮内獨怖急乍氷乍火琴操曰孔子使顔淵執轡到匡郭外孔子貌似陽虎以為今復來至乃相率圍孔子數日不解弟子皆有饑色於是孔子仰天歎曰君子固亦窮乎子路聞孔子之言悲感勃然大怒張目奮劒聲如鐘鼓顧謂二三子曰使吾有此厄也司馬彪與山巨源書曰根枝失據託命此别告求矜愍許見賑恤窮人易感悲喜兼懐承命之後情過挾纊孔舒元在窮記曰遣信與義陽太守孫仲開相聞告其困乏得絹二疋壊車一乗賣得絹三疋以糴米一石橡三斛食口三十五人百日之中以此自活人皆鶴節無復血色凍左傳襄三年曰楚師伐鄭涉於魚齒之下魚齒山之下有水故言涉也甚雨楚師多凍役徒幾盡漢書曰韓王信降匈奴上自將擊之連戰乗勝北至樓煩㑹大雨士卒饑凍又曰王莽天鳳四年八月莽親之南郊鑄作威斗威斗者以五石銅為之五色石銅合治為威斗也若北斗長二尺五寸欲以厭勝衆兵既成令司命負之莽出則在前入則御旁鑄斗日大寒百官人馬有凍死者三輔决錄曰鮑恢父為縣吏有罪令欲殺之恢年十三掌伏門外凍地晝長號泣令感而赦之晉元嘉起居注曰徐州刺史王仲徳上言下坯僮令殷道益十一月冒寒出郡履涉氷雪主簿王黑等三人脚悉凍斷晏子春秋曰景公出游於塞塗覩死瘠者嘿然不問晏子曰昔我先君桓公出游覩饑者與食病者與財今君逰塞塗饑寒凍餒死瘠相望而君不問失君道矣公於是斂死瘠發粟賑}
