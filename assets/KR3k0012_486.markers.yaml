  - {type: variant, offset: 2099, length: 773, content: 京雜記曰司馬相如初與卓文君至成都文君貧愁憊以所服鷫鸘裘就市人楊昌貰酒遂相與謀還於成都賣酒相如親著犢鼻褌滌器以恥王孫墨子曰天下有義則富無義則貧列子曰管仲之相齊君淫亦淫君奢亦奢志合言從道行國霸其後田氏相齊君盈則己降君斂則己施民皆歸之因有齊國若實名貧偽名富也又曰齊有貧者乞於城市患其亟也眾莫之與遂適田氏之廄從馬豎作役而假食郭中人戲之曰從馬豎而食不以辱乎乞兒曰天下之辱莫過於乞乞猶不辱豈辱馬豎哉又曰齊之國氏大富宋之問氏大貧自宋之齊謀術國氏告之曰吾善為盜始吾為盜也一年而給二年而定三年大攘自此往施及州閭問氏大喜喻其為盜之言而不喻其為盜之道遂踰垣鑿室手目所及亡不探也未及時以贓罪沒其先君之財問氏以國氏之謬己也往而怨之國氏曰嘻若夫為盜之道天有時地有利吾盜天地之利雲雨之澗吾陸盜禽獸水盜龜鱉亡非盜也夫金玉珍寶穀帛財貨人之所藂豈天之所與若盜之而獲罪孰怨哉又曰凡為名者必廉廉斯貧為名者必讓讓斯賤莊子曰原憲處魯居環堵之室蓬戶不完乘木為樞而甕牖上漏下濕匡坐而弦歌子貢乘大馬中紺而表素軒車不容巷往見原憲原憲杖藜而應門子貢曰先生何病也原憲應之曰憲聞無財之謂貧學道不能行之謂病今憲貧也非病也子貢逡巡而退有愧色又曰孔子謂顏淵曰家貧居卑胡不仕乎對曰不願仕回有郭外之田五十畝足以給饘鬻郭內之田五十畝足以為絲麻鼓琴足以自娛所學於夫子者足以自樂也回不願仕孔子愀然變色曰美哉又曰莊周家貧故往貸粟於監河侯曰我將得邑貸子三百金周忿作色曰周昨來有中道而呼者顧視車轍有鮒魚焉問之曰子何為者耶對曰我東海之波臣也君豈有斗升之水而活我哉周曰諾我將南遊吳越之王激西江之水而迎子可乎鮒魚忿然作色曰吾得斗升之水然活耳君乃言此曾不如早索我於枯魚之肆又曰曾子居衛捉衿而肘見納屨而踵決又曰河上有家貧窮恃緯蕭而食者其子沒淵得千金珠謂其子取石來鍜之夫千金之珠必在九重之淵而驪龍之頷下汝得之必遭其睡若龍寤子尚奚珠之有哉呂, SBCK: 唯命魏}
