  - {type: variant, offset: 3014, length: 0, content: '', SBCK: 不足愛也子與我衣弟子曰夫不肖人惡能與國士衣哉戈夷解衣與弟子夜半而死弟子遂活琴操曰曽子㓜少慈仁質孝耕於太山之下遭天霖澤􅀨雪寒旬月不得歸乃作憂思之歌餓禮記檀弓曰齊大饑黔敖爲食於路以待餓者而食之有餓者蒙􅃑戢屨􅐙􅐙然來黔敖左奉食右執飲曰嗟來食揚其目而視之曰予唯不食嗟來之食以致於斯也嗟來食雖憫而呼之非敬辭也從而謝焉終不食而死左傳宣上曰晉侯飲趙盾酒伏甲將攻之􅀄宣子田於首山舎於翳桑田獵也翳桑桑之多隂翳者也見靈輙餓問其病靈輙􅀳人曰不食三日矣食之舎其半問之曰官三年矣未知母之存否今近焉請以遺之使盡之而爲之簞食與肉寘諸槖以與之旣而輙爲公介靈輙爲公甲士倒㦸以御公徒而免之問其何故曰翳桑之餓人也問其名居不告而退論語季氏曰齊景公有馬千駟死之日民無德而稱焉伯夷叔齊餓于首陽之下民到于今稱之史記曰趙主父遊沙丘公子章作亂李兊起兵敗之章徃走主父兊因圍主父宫令宫人後出者夷主父不得出探雀鷇而食之三月遂餓死沙丘營又曰上使善相人相鄧通曰當貧餓死文帝曰能冨通者在我何謂貧於是賜鄧通蜀嚴道銅山得自鑄錢景帝立有告鄧通盗出徼外鑄錢下吏驗問頗有遂案盡没入一簪不得着身遂餓死又曰條侯周亞夫爲河内守時許􅀒相之曰後三歳而侯八􅀊爲將相持國柄貴矣於人臣無两其後九歳而君餓死􅀒指其口有從理入口曰此餓死法也三歲其兄絳侯有罪文帝擇絳侯子賢者皆推亞夫乃封亞夫爲條侯卒餓死又曰趙王友以諸吕女爲后弗愛太后怒召趙王置邸弗與食趙王餓遂幽死戰國䇿曰楚伐中山中山君亡走有二人挈戈隨其後曰臣父甞餓且死君下壷飱餔臣父臣父曰中山有事女必死之故來死君也漢書曰朱買臣獨行歌道中􅀒薪墓間故妻與夫家俱上塜見買臣飢寒呼飯食之又曰􅂫武字子卿杜陵人使匈奴匈奴必欲降之乃出置大窖中絶不與飲食天􅀨雪武齧雪與氊毛并咽之數日不死匈奴以爲神乃徙武北海上無人之處使牧羝羊粟食不至掘野䑕草實而食之又曰元帝即位天下大水關東郡十一尤甚二年齊地飢榖石三十餘萬民多飢死琅琊郡人相食又曰王莽末赤眉遂燒長安宫室市里害更始民飢餓相食死者數十萬長安爲虚城中無行人宗廟園林皆發掘唯覇陵完東觀漢記曰王莽末南方枯旱民多飢餓群盗入野澤掘鳬茨食之又曰建武九年正月隗囂餓出城飡糗腹脹死又曰朱勃上書理馬援曰八年車駕討隗囂唯獨狄道爲國堅守然民飢饉啖弩煑履􅀉命漏刻又曰上問第五倫曰聞卿爲吏撾妻父不過從兄飯寕有之也倫對曰臣三娶妻皆無父臣生遭饑擾攘米石萬錢不敢妄過人飯又曰王郎起上自薊東南馳晨夜草舎至饒陽無蔞亭時天寒冽衆皆飢疲馮異上豆粥明旦上謂諸將曰昨得公孫豆粥飢寒俱解又曰鄧禹與赤眉戰赤眉佯敗棄輜重走皆載􅁟以豆覆其上兵士飢争取之赤眉引還撃之軍潰亂時百姓饑人相食黄金一斤易豆五升道路斷隔委輸不至軍士悉以菓實爲粮又曰耿恭在䟽勒城救兵不至數月食盡窮困乃煑鎧弩食其筋革謝承後漢書曰天下亂人相食趙孝弟禮爲餓賊所得孝聞之即自縳詣賊曰禮乆餓羸瘦不如孝肥飽賊大驚並放之􅀽山松後漢書曰赤眉入長安掖庭中有數百千人自更始敗閉殿門不出掘庭中蘆菔根捕池中魚食之死因埋宫中有故祠甘泉樂人尚共擊鼓歌儛衣服鮮明見盆子叩頭言飢盆子使中黄門廪之粟數升後盆子去皆餓死范曄後漢書曰鄧禹威稍損又乏食歸附者離散而赤眉復還入長安禹與戰敗走至髙陵軍士飢餓皆食􅀥菜漢獻帝傳曰車駕至洛陽是時宫室燒盡百官披荆􅁄依丘牆間州郡各擁強兵而委輸不至羣僚飢乏尚書郎以下自出採穞或餓死牆壁間呉志曰􅀽術在壽春榖石百餘萬載金錢之市求糴市無米而棄錢去百姓飢寒以桑椹蝗蟲爲乾飯王隱晉書曰永嘉五年洛中大飢五月摯虞餓死又曰劉琨與王丞相牋曰不得進軍者實困無食殘民鳥散擁髪徒跣木弓一張荆矢十發編草盛粮不盈二日}
