  - {type: variant, offset: 570, length: 465, content: 卿此履已幾載玩之曰著此履已二十年貧竟不辦易太祖善之又曰庾杲字景行新野人初為駕部郎清貧自業食飡唯有韭葅生菜任彥昇嘗戲曰誰謂庾郎貧食鮭常有二十七種菜王儉用為長史安陸侯蕭緬與儉書曰盛府元僚實難其選庾景行泛淥水依芙蓉何其麗也時人以儉府為蓮花池故緬書言之官至御史中丞梁書曰阮孝緒家貧無以僮妾竊鄰人樵以繼火孝緒知之乃不食更令撤屋而炊所居室唯有一林竹樹環繞後魏書曰胡叟居家蓬室草戶唯以酒自適常謂人曰我此生活似勝焦光不治產業飢貧不以為恥養子字螟蛉以自給養每至貴勝之門恒乘一牸牛布囊容三四升飲噉醉飽便盛餘肉餅以付螟蛉見車馬榮華視之蔑如也隋書曰張仁詡州縣以其貧素將加賑恤輒辭不受每閑居從容長歎曰老冉冉而將至恐脩名之不立以如意擊几皆有處所人方之閔子騫原憲又曰虞世基陳滅歸國為通直郎直內省無產業每傭書養親怏怏不平嘗為五言以見意情理悽切世以為工作者莫不吟詠又曰房彥謙居官所得俸祿皆以周恤親友家無餘財車服器用務存素儉自少及長一言一行未嘗涉私雖致屢空怡然自得嘗從容獨笑顧謂其子玄齡曰人皆因祿富我獨以官貧所遺子孫在於清白又曰許康佐擢進士第以家貧母老求為知院官人或, SBCK: 身}
