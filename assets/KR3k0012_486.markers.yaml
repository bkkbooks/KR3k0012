  - {type: variant, offset: 2899, length: 0, content: '', SBCK: 鳥窮則啄獸窮則攫人窮則詐又曰孔子適楚遊陳蔡之間七日不食子路曰由聞善者天報之福不善者天報之禍今夫子積德義奚居之隱孔子曰由芳蘭生於深林非以無人而不芳君子之學非爲同也居不隱者思不生身不佚者志不廣莊子曰泉涸魚相與處於陸相喣以濕相濡以沬不􅀂相忘乎江湖又曰孔子窮於陳蔡之間七日不火良藜羹不糝顔回擇菜子貢相與言曰夫子載逐於魯削迹於衛伐樹於宋窮於陳蔡君子之無耻也若此乎顔回無以應入告孔子孔子推琴喟然而歎曰由與賜細人也召而語之今丘也抱}
