  - {type: variant, offset: 3012, length: 0, content: '', SBCK: 今夫窮鄙之社也叩盆拊缻相和而歌自以爲樂矣窮鄙之社窮巷之小社也甞試爲之撃建鼔撞巨鍾乃始知其缻之足羞矣新序曰寗戚欲干齊桓公窮困無以自進於是爲啇歌􅀫於郭門之外擊牛角而歌桓公聞之曰異哉之歌非常人也􅄂道書曰地肺之山其下生草名曰救窮如竹冬夏不枯取而食之可絶􅂖不食令人長生服之三十日行及走馬趙壹窮鳥賦曰有一窮烏戢翼原野􅇁網加上機穽在下前見蒼隼後逼驅者繳彈張右羿弓彀左飛丸激矢交集於我思飛不得欲鳴不可舉頭畏觸揺足恐墮内獨怖急乍冰乍火琴操曰孔子使顔淵執轡到匡郭外孔子旣似陽虎以爲今復來至乃相率圍孔子數日不解弟子皆有飢色於是孔子仰天而嘆曰君子固亦窮乎子路聞孔子之言悲感勃然大怒張目􅁬劒聲如鍾鼔頋謂二三子曰使吾有此厄也司馬彪與山巨源書曰根拔失據託命此别告求矜􅉖許見賑恤窮人易感悲喜兼懷承命之後情過挾纊孔舒元在窮記曰遣信與義陽太守孫仲開相聞告其困乏得絹二疋壞車一乗賣得絹三疋以糴得米一石橡三斛食口三十五人百日之中以此自活人皆鶴節無復血色凍左傳襄三年曰楚師伐鄭渉於魚齒之下魚齒山之下有水故言渉也甚雨楚師多凍役徒幾盡漢書曰韓王信降匈奴上自將撃之連戰乗勝北至樓煩㑹寒大雨士卒飢凍又曰王莽天鳯四年八月莽親之南郊鑄作威斗威斗者以五石銅爲之五色石銅合治爲威斗也􅀂北斗長二尺五寸欲以厭勝衆兵旣成令司命􅀒之莽出則在前入則御旁鑄斗曰大寒百官人馬有凍死者三輔决録曰鮑恢父爲縣吏有罪令欲殺之恢年十三常伏門外凍地晝夜號泣令感而赦之晉元嘉起居注曰徐州刺史王仲德上言下坯僮令殷道益十一月冒寒出郡履渉冰雪主簿王黒等三人脚悉凍斷晏子春秋曰景公出遊於寒塗覩死瘠者嘿然不問晏子曰昔吾先君桓公出遊覩飢者與食病者與財今君遊寒塗飢寒凍餒死瘠相望而君不問失君道矣公於是歛死瘠發粟賑}
