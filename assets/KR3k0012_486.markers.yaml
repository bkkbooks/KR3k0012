  - {type: variant, offset: 2876, length: 1, content: 世, SBCK: 􅀄宣王使何晏治曹爽等獄宣王曰凡有八族晏䟽丁鄧等七姓宣王曰未也晏窮急乃曰豈謂晏乎宣王曰是也乃收晏魏末傳曰曹爽兄弟歸家勑洛陽縣發民八百人使尉部圍爽第四角作髙樓令人在上望視爽兄弟舉動爽計窮愁悶持彈到後園中樓上人便唱故大將軍東行爽還㕔事上蜀志曰先主伐呉先主敗引退道隔黄權不得還降魏魏文帝謂權曰君捨逆歸順欲追蹤陳韓􅁘權對曰臣過受劉氏厚遇降呉不可還蜀無路是以歸命敗軍之將免死爲幸何古人之可慕文帝善之蜀志曰許靖爲許邵排擯不得齒叙以馬磨自給王隱晉書曰上攻張方决千金堰水碓不作發王公家奴婢手舂給兵男子自十三以上}
  - {type: page-break, offset: 2876, content: '', id: KR3k0012_SBCK_486-2b}
  - {type: variant, offset: 2876, length: 1, content: 世, WYG: 初宣王使何晏治曹爽等獄宣王曰凡有八族晏疏丁鄧等七姓宣王曰未也晏窮急乃曰豈謂晏乎宣王曰是也乃收晏魏末𫝊曰曹爽兄弟歸家勅洛陽縣發民八百人使尉部圍爽第歸家勅四角作髙樓令人在上望視爽兄弟舉動爽計愁窮悶持彈到後園中樓上人便唱故大將軍東行爽還㕔事上蜀志曰先主伐吳先主敗引退道隔黄權不得還降魏魏文帝謂權曰君捨逆歸順欲追蹤陳韓耶權對曰臣過受劉氏厚遇降吳不可還蜀無路是以歸命敗軍之將免死為幸何古人之可慕文帝善之蜀志曰許靖為許邵排擯不得齒叙以馬磨自給王隱晉書曰上攻張方决千金堰水碓不作發王公家奴婢手舂男子自十三已上}
