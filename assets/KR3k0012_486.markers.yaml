  - {type: variant, offset: 2878, length: 8, content: 以珠玉為寶寶愈多, SBCK: 從役於是公私窮踧米石萬錢晉中興書曰桓􅀇聞義軍起斬其二將志慮窘塞日與臧道士推筭數厭勝之術皇甫士安髙士傳曰陳仲字子終齊人適楚居於陵自謂於陵子仲窮不苟求非義之食不食呉越春秋曰越伐呉呉王率其賢良投於胥山越兵大至圍呉三重大夫文種相拜范蠡左手提鼔右手操桴}
