  - {type: variant, offset: 1312, length: 2, content: 體貌, SBCK: 其夢􅀂何王曰見一婦人狀甚異撫心定氣復有所夢其始來也耀乎􅀂日􅀄出照屋梁其少進也皎乎􅀂明月舒其光穠不短纎不長歩􅒨􅒨兮曜殿堂忽兮改}
  - {type: variant, offset: 1312, length: 2, content: 體貌, WYG: 其夢若何王曰見一婦人狀甚竒異撫心定氣復有所夢其始來也耀乎若白日初出照屋梁其少進也皎乎若明月舒其光穠不短纎不長歩裔裔兮耀殿堂忽兮改}
