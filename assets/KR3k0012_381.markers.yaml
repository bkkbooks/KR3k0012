  - {type: variant, offset: 825, length: 15, content: 繪儀貌端偉神情朗俊舅河間邢晏每, SBCK: 勢妹爲妾主始不知旣聞與數十婢拔白刃襲之温尚明帝女南康長公主正值梳頭髮籍地膚色玉曜不爲動容徐曰國破家亡以至今日􅀂能見殺乃其本懷主慙而退俗說曰宋禕是石崇妓緑珠弟子有色善吹笛後在晉明帝處帝􅐄患篤羣臣進諌請出宋禕帝曰卿諸人誰欲得之阮遥集時爲吏部尚書對曰願以賜臣即}
