  - {type: variant, offset: 849, length: 0, content: '', SBCK: 諸婦因絞懸之厠言自殺術誠以爲不得志而死乃厚葬之方言}
  - {type: variant, offset: 849, length: 0, content: '', WYG: 諸婦因絞懸之厠言自殺術誠以為不得志而死乃厚𦵏之方言曰娥㜲音盈好也秦曰娥言娥娥也宋謂之㜲言㜲㜲也秦晋之間凡好而輕者謂之娥自闗而東河淆之間謂之媌今闗西人亦呼好為媌吾交切或謂之姣言姣㓗也音皎趙魏燕岱之間曰姝音樞亦四方通語耳或曰妦言妦容也音蜂自闗而西秦晋之間故都曰忓秦舊都今扶風雍縣也晋舊都今太原晋陽縣也其俗通呼好為忓五于切又曰釥踖眇切嫽俗夭切好也青徐海岱之間曰釥或謂嫽今通呼小姣潔好者為嫽眇好凡通語也朦已紅切龎䲭鴻切豐也自闗而西秦晋之間凡大貌謂之朦或謂之龎豐其通語也娃烏佳反媠諸遇反窕途了反艷美也吳楚衡淮之間曰娃南楚之外曰媠言婑媠也宋衛晋鄭之間曰艷陳楚周之間曰窕自闗而西秦晋之間凡美色或謂之好或謂之窕故吳有舘娃之宫秦有㭍娥之臺㭍音七秦晋之間美貌謂之娥美狀為窕美色為艷美心為窈奕偞容也自闗而西凡美容謂之奕或謂之媟奕奕偞偞皆輕麗之貌也書記年曰梁武岷山獻女于桀二女曰琬曰琰桀受女刻其名于苕華之玉苕是琬華是琰楚辭曰姱容脩態絙洞房蛾眉曼睩目騰光又曰粉白黛黒施芳澤又曰美人既醉朱顔􅋳又曰室中之觀多珍怪蘭膏燭明華容備山海經曰丹山西郎巫山也帝女居焉宋玉所謂我帝之季女名曰瑶姬其間首尾一百六十里謂之巫峽葢因山名也崔豹古今注曰魏文帝宫人有穆瓊樹薛夜來陳尚夜陳巧笑瓊樹始製蟬鬢望之縹眇蟬翼故號曰蟬鬢桓譚新論曰或曰陳平為髙帝觧平城圍隠而不傳子能知乎曰陳平説閼氏言漢有美女其容貌天下無有今急馳使歸迎欲進單于單于見必愛之則閼氏言之單于而得免也六韜曰紂囚文王扵羑里散冝生受命而行宛懐條途之山有玉女三人冝生得之因費仲而獻之扵紂以免文王何承天纂文云孚瑜美色也服䖍通文云容麗曰媌莫豹切形美曰媠容美曰舘南楚以好為娃烏佳切肥骨柔弱曰婐烏果切􅀈奴果切頰妍美曰嫵七府切媚容茂曰㜰羊灼切越絶書曰越王勾踐得採薪二女西施鄭旦以獻呉王崔駰七依曰閭娵之孕既麗且閒紫脣素齒雪白玉暉廽眸百萬一咲千金孔子傾扵阿谷浮屠忘其桑門彭祖飛而溶集王喬忽而墮雲司馬相如上林賦}
