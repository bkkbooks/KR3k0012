  - {type: variant, offset: 2339, length: 486, content: 佳人不可得上歎息曰善世豈有此人乎平陽主因言延年有女弟上乃召見之實妙麗善舞李夫人少而早卒上憐愍焉圖畫其形於甘泉宮華嶠後漢書曰梁冀妻孫壽色美而善為妖態作愁眉啼粧墮馬髻折腰步齲齒笑以為媚惑東觀漢記曰趙喜與友人韓仲伯欲出武關仲伯以其婦有色恐有強暴者而己受其害欲棄之喜責怒仲伯以泥塗其婦面載以鹿車身自推每逢賊輒為求哀言其病遂脫又曰初光武聞陰麗華美心悅歎曰娶妻當得陰麗華後為皇后漢武故事曰又起明光宮發燕趙美女二千人充之率取十五以上二十以下年滿四十者出嫁凡諸宮美人可七八千帝從行郡國載之後車與上同輦者十六人員數恒使滿皆自然美麗不使粉白黛黑侍衣軒者亦如之魏略曰初袁紹子熙納甄后熙出奔幽州后留侍姑及鄴破紹妻及后坐堂皇上紹妻自搏文帝語袁夫人令新婦舉頭姑乃捧后令仰帝就視見其顏色非凡稱歎之太祖為迎也吳志曰周瑜從孫策攻皖城得喬公兩女國色也策自納大喬瑜納小喬又曰孫權步夫人以美麗得幸寵冠後庭王隱晉書曰阮籍鄰家處女有才色籍不與親生不相知未嫁而死籍往哭盡哀乃去晉陽春秋曰荀燦字奉倩常曰婦人者才智不足論自宜以色為主驃騎將軍曹洪女有美色燦於是聘焉容服帷帳甚麗專房宴寢歷數年後婦偶病亡未殯傳嘏往唁燦不哭神傷曰, SBCK: ''}
