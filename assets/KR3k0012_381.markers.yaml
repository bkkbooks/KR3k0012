  - {type: variant, offset: 896, length: 2, content: 梁楊, SBCK: 釥錯􅆌切嫽夭切好也青徐海岱之間曰釥或謂嫽今通呼小姣㓗喜好者爲嫽眇好凡通語也朦巳紅切庬鴟鴻豐也自關而西秦晉之間凡大貌謂之朦或謂之庬豐其通語也娃烏佳切媠諾過切窕途了切艷羙也吴楚衡淮之間曰娃南楚之外曰媠言婑媠也宋衛晉鄭之間曰艷陳楚周南之間曰窕自關而西􅁗西之間凡羙色或謂之好或謂之窕故吴有館娃之宫􅁗有枈娥之臺㭍音七􅁗晉之間羙貌謂之娥羙􅃺爲窕羙色爲艷羙心爲窈弈偞容也自關而西凡羙容謂之弈或謂之媟弈弈媟媟皆輕麗之皃也書紀年曰桀伐岷山獻女于桀二女曰琬曰琰桀受女刻其名于苕華之玉苕是琬華是琰楚辭曰姱容脩態絙洞房娥眉慢睃目騰光又曰粉}
