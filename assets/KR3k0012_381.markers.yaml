  - {type: variant, offset: 919, length: 2, content: 瑰偉, SBCK: 天下無有今急馳使歸迎欲進單于單于見必愛之則閼氏言之單于而得免也六韜曰紂囚文王於羑里散冝生受命而行宛懷條塗之山有玉女三人冝生得之因費仲而獻之於紂以免文王何承天纂文云孚瑜羙色也服䖍通俗文云容麗曰媌莫豹切形羙曰媠湯火切容媚曰婠烏活切南楚以好爲娃烏佳切肥骨柔弱曰婐烏果切折奴果切頰妍羙曰嫵七府切媚容茂曰㜰羊灼切越絶書曰越王勾踐得採薪二女西施鄭旦以獻吴王崔駰七依曰閭娵之孕旣麗且閑紫脣素齒雪白玉睴迴眸百萬一􅀏千金孔子傾於阿谷浮屠忘其桑門彭祖飛而溶集王喬忽而墮雲司馬相如上林賦曰􅀂夫青琴宓妃之徒皆古神女名也絶殊離俗妖冶閑都靚粧刻飾}
