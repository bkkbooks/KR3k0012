  - {type: variant, offset: 442, length: 0, content: '', WYG: 介象字元則㑹稽人入山求仙見谷上有石皆紫色如鷄子象取二枚見一美人被五綵象向之叩頭乞長生女曰汝急送手中物還著故處汝未應取此象乃送石還女授丹方一首穆天子傳曰赤烏之人獻二女于天子女聼女列赤烏氏美人之地也劉向列女傳曰蕭史者秦穆公時人善吹簫能致孔雀白鶴穆公女弄玉好之公以妻焉一朝隨鳳飛去續列女傳曰曹節弟破石為越騎校尉越騎營五伯妻有美色破石從求之五伯不敢違妻執意不肯行遂自殺襄陽耆舊紀曰楚襄}
