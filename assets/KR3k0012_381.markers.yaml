  - {type: variant, offset: 1929, length: 356, content: 乃帝王之后非諸侯姬也趙王大悅欲請之司馬喜歸謂中山君曰趙王非賢主也乃欲請陰姬王宜立以為后以絕趙王之意中山君遂立為后又曰張儀之楚見楚王曰彼周鄭之女粉白黛黑立於衢閭之間非知而見之者以為神王曰楚僻陋之國寡人未見中國之女如此之美乃資以珠玉使行后鄭袖聞之大恐令人謂張子曰聞君將之晉有千金斤請供芻秣張子請王𨢩之王召鄭袖而𨢩之張子再拜曰儀有死罪儀行天地遍矣未嘗見人如此之美也而儀言得美人是欺王也王曰吾固知天下無兩人矣史記曰紂囚西伯而閎夭之徒以有莘氏美女獻紂紂大悅乃放西伯又曰漢武帝時尹夫人與邢夫人同時幸武帝有詔不得相見尹夫人自請武帝願見邢夫人帝令他夫人飾從者數十人來前尹夫人見之曰非邢夫人帝曰何以知之對曰觀其體貌形狀不足以當人主有詔邢夫人邢夫人故衣獨身來尹夫人望見曰真是矣於是乃低頭而泣自痛其不如也諺曰美女入室惡女之仇漢書曰孝武, SBCK: 璫}
