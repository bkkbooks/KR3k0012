  - {type: variant, offset: 1312, length: 2, content: 體貌, krp: 其夢若何王曰見一婦人狀甚異撫心定氣復有所夢其始來也耀乎若日𥘉出照屋梁其少進也皎乎若明月舒其光穠不短纎不長歩裔裔兮曜殿堂忽兮改}
  - {type: variant, offset: 1315, length: 1, content: 冶, SBCK: 蜿􅀂逰龍乗雲翔王曰此盛矣試爲寡人賦之玉曰夫何神人妖麗兮含隂陽之渥飾􅀍華藻之可好兮􅀂翡翠之􅁬翼其象無􅀟其極毛嬙又登徒子賦曰夫天下之佳人莫􅀂楚國楚國之麗者莫􅀂臣里臣里之羙者莫􅀂臣東家之子増之一分則太長減之一分則太短著粉太白施朱太赤眉如翠羽肌如白雪腰如束素齒如含貝又髙唐賦曰昔者先王甞逰髙唐怠而晝寢夢一婦人曰妾巫山之女也爲髙唐之客辭曰妾在巫山之陽髙唐之岨朝爲行雲暮爲行雨朝朝暮暮陽臺之下王曰朝雲始出􅃺􅀂何玉對曰其始出也㬣兮若松榯其少進也晣兮􅀂姣􅁎楊􅃑障日而望所思忽兮改容偈兮􅀂駕駟馬建羽旌湫兮如風淒兮如雨風止雨霽雲無處所王粲神女賦曰髮似􅀇鑒􅁂類刻成質素純皓粉黛不加朱顔熈曜曄若春華}
  - {type: page-break, offset: 1315, content: '', id: KR3k0012_SBCK_381-7b}
  - {type: variant, offset: 1315, length: 1, content: 冶, WYG: 婉若㳺龍乘雲翔王曰此盛矣試為寡人賦之玉曰夫何神人妖麗兮含隂陽之渥餙被華藻之可好兮若翡翠之奮翼其象無雙其極毛嬙又登徒子賦曰夫天下之佳人莫若楚國楚國之麗者莫若臣里臣里之美者莫若臣東家之子増之一分則太長减之一分則太短著粉則太白施朱則太赤眉如翠羽肌如白雪腰如束素齒如含貝又髙唐賦曰昔者先王常逰髙唐怠而晝寢夢一婦人曰妾巫山之女也為髙唐之客辭曰妾在巫山之陽髙唐之岨朝為行雲暮為行雨朝朝暮暮陽臺之下王曰朝雲始出狀若何玉對曰其始出也㬣兮若松榯其少進也晰兮若姣姬揚袂障日而望所思忽兮改容偈兮若駕駟馬建羽旗湫兮如風凄兮如雨風止雨霽雲無處所王粲神女賦曰髪似𤣥鑑鬢類刻成質素純皓粉黛不加朱顔照曜曄若春華}
