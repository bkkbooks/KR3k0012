  - {type: variant, offset: 433, length: 0, content: '', WYG: 醜惡醜惡之名逺布年過而一國無敢聘者衛有鰥夫失時冒娶之果國色闞子曰西施自窺扵井不恃其美猶佐湯沐堯舜自窺扵世不恃其美猶湏才徳况中庸而拒諫嫫母自窺扵井以為媚扵西施桀紂自窺扵世以為賢扵堯舜韓子曰魏王遺楚王美女王甚悦之慎子曰毛嬙西施天下之至姱也衣以皮褐則見者皆走易以𤣥錫則行者皆止淮南子曰曼顔皓齒形姱骨佳不待脂粉芳澤而美者西施陽文也許慎註曰陽文楚好女也又曰蔡之㓜女衛之稚質纂組竒綵抑黒質陽赤文纂組織組也如今之綬也淺黒見赤其上也湯禹之智不能逮也言不能及二國女之行也}
