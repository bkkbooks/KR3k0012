  - {type: variant, offset: 2890, length: 264, content: 鯤挑之女織梭投之折其兩齒干寶晉紀曰石崇有妓曰綠珠美如玉善舞孫秀使人求焉崇方登涼觀臨清水婦人侍側使者以告崇崇盡出婦妾數十人以示之皆蘊蘭麝而披羅縠使者曰君侯服御麗矣然本受命旨索綠珠崇勃然曰綠珠吾所愛不可得也使者曰願加三思崇曰不然使者還以告故秀勸趙王倫殺之崔鴻十六國春秋前趙錄曰劉聰使大鴻臚李恒聘太保劉商女謂恒曰此女輩皆姿色超世且太保於朕實自不同恒曰太保裔自有周與聖源實別聰大悅賜金六十斤又曰崔後趙石虎鄭后名櫻桃晉冗從僕射鄭世達家妓也在中猥妓中虎數歎其貌於太妃太妃給之又曰前秦初符堅滅燕慕容冲妹年十四有殊色堅納之車頻秦書曰符堅時新羅獻, WYG: 目我對湘娥筝笛更彈吹髙唱好相和曹植}
