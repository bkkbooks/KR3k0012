  - {type: variant, offset: 10, length: 250, content: 唐書曰張知謇蒲州河東人徙家于歧少與兄知立知晦弟知默勵志讀書皆明經擢第儀質瓌偉眉目踈朗曉立理文而清介自守故公卿爭進之又曰崔湜美姿儀有才名弟液滌及從兄涖並有文翰居清要每宴私之際自比東晉王導謝安之家謂人曰吾之門及出身歷官未嘗不為第一丈夫當先據要路以制人豈能默默受制於人液尤善五言堤歎曰海子我家之神龜也海子即液小名官至殿中侍御史又曰盧承慶美風儀博學有才干貞觀初為秦州都督府戶曹參軍因奏河西軍事太宗奇其明辯擢拜考功員外郎遷民部侍郎太宗嘗問歷代戶口數承慶敘夏商後迄于周隋皆有依據上嗟賞之令兼檢校兵部侍郎知五品選事, SBCK: ''}
