  - {type: variant, offset: 543, length: 4, content: 荀羨字令, WYG: 呉主潘夫人父坐法夫人輸入織室容態少儔江東絶色同幽者百餘人謂夫人曰神女敬而逺之有司陳扵呉主使圖其容夫人憂戚不食减瘦改形工人寫之以進呉主主見喜以琥珀如意撫案嗟曰此神女也愁貌尚能感人况在懽樂乃納于後宫又曰孫亮作緑瑠璃屏風每扵月下清夜舒之常愛寵四姬皆振古絶色一名朝姝二名儷姬三名㓗華四名洛寳又曰周成王時有因祗國去王都九萬里獻女士一人善扵工巧體貌輕㓗被纎羅雜繡之衣長袖脩􅅂風至}
