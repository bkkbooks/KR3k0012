  - {type: variant, offset: 273, length: 0, content: '', SBCK: 之公以妻焉一朝隨鳯飛去漢武内傳曰西王母乗紫雲之輦履玄瓊之舄下輦上殿呼帝共坐命侍女許飛瓊皷雲和之簧續列女傳曰曹節弟破石爲越騎校尉越􅀐營伍伯妻有羙色破石從求之伍伯不敢違妻執意不肯行遂自殺襄陽􅂄舊記曰楚襄王遊雲夢望朝雲之餘上有雲氣宋玉曰昔先王遊髙唐怠而晝寢夢一婦}
