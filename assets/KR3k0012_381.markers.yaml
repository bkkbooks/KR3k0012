  - {type: variant, offset: 1633, length: 295, content: 諸侯髮美曰鬒實有豕心夔舜典樂夫有尤物足以移人茍非德義必有禍尤異也又曰宋華父督見孔父之妻於路目逆而送之曰美而艷色美曰艷又曰衛侯自城上見巳氏之妻髮美使髡之以為呂姜髢又曰鄭有徐吾犯之妹甚美公孫楚與公孫黑爭聘之公羊傳曰驪姬者國色也其顏色一國之選又曰邾婁顏夫人者嫗盈女國色也爾雅曰美女為媛國語曰恭王遊於涇上密康公從三女奔之其母曰必致之於王夫獸三為群人三為眾女三為燦今以美物歸汝而何德以堪之康公弗獻一年王滅密賈逵注曰燦美也戰國策曰晉文公得南威三日不朝遂推南威而遠之曰後代必有以色亡國者又曰陰姬與江姬爭為后司馬喜為陰姬乃謂趙王曰臣聞趙佳麗之所出也今至境入都邑殊無美者臣未嘗見人如中山陰姬者其眉目准額權衡偃, SBCK: 毛嬙首戴金歩摇耳繫明}
