  - {type: variant, offset: 269, length: 0, content: '', SBCK: 齊有黄公者好謙卑有二女皆國色常謙辤毁之以爲醜惡醜惡之名逺布年過而一國無敢聘者衛有鰥夫失時冐娶之果國色闞子曰西施自窺於井不恃其羙猶佐湯沐堯舜自窺於世不恃其賢猶湏才德況中庸而距諌嫫母自窺於井以爲媚於西施桀紂自窺於丗以爲賢於堯舜韓子曰魏王遺楚王羙女王甚恱之慎子曰毛嬙西施天下之至姣也衣以皮􅄄則見者皆走昜以玄錫則行者皆止淮南子曰曼顔皓齒形姱骨佳不待脂粉芳澤而羙者西施陽文也許慎注曰陽文楚好女也又曰蔡之㓜女衛之稚質纂組竒綵抑黒質楊赤文慕組織紀也如今之綬也没黒見赤其工也湯禹之智不能逮也言不能及二國女之行也神仙傳曰介象字元則㑹稽人入山求仙見谷上有石皆紫色如雞子象取二枚見一羙人􅀍五綵象向之叩頭乞}
  - {type: page-break, offset: 269, content: '', id: KR3k0012_SBCK_381-1b}
  - {type: variant, offset: 269, length: 3, content: 長大美, WYG: 齊有黄公者}
  - {type: variant, offset: 269, length: 0, content: '', krp: 齊有黄公者好謙卑有二女皆國色常謙辤毁之以爲醜惡醜惡之名逺布年過而一國無敢聘者衛有鰥夫失時冐娶之果國色闞子曰西施自窺於井不恃其羙猶佐湯沐堯舜自窺於世不恃其賢猶湏才德況中庸而距諌嫫母自窺於井以爲媚於西施桀紂自窺於丗以爲賢於堯舜韓子曰魏王遺楚王羙女王甚恱之慎子曰毛嬙西施天下之至姣也衣以皮褐則見者皆走昜以玄錫則行者皆止淮南子曰曼顔皓齒形姱骨佳不待脂粉芳澤而羙者西施陽文也許慎注曰陽文楚好女也又曰蔡之㓜女衛之稚質纂組竒綵抑黒質楊赤文慕組織紀也如今之綬也没黒見赤其工也湯禹之智不能逮也言不能及二國女之行也神仙傳曰介象字元則㑹稽人入山求仙見谷上有石皆紫色如雞子象取二枚見一羙人𬒳五綵象向之叩頭乞}
  - {type: variant, offset: 270, length: 2, content: 大美, SBCK: 生女曰汝急送手中物還著故處汝未應取此象乃送石還女授丹方一首穆天子傳曰赤烏之人獻二女于天子女聦女列赤烏氏羙人之地也劉向列傳曰蕭史者􅁗穆公時人善吹簫能致孔雀白鶴穆公女弄玉}
  - {type: variant, offset: 270, length: 2, content: 大美, krp: 生女曰汝急送手中物還著故處汝未應取此象乃送石還女授丹方一首穆天子傳曰赤烏之人獻二女于天子女聦女列赤烏氏羙人之地也劉向列傳曰蕭史者秦穆公時人善吹簫能致孔雀白鶴穆公女弄玉}
