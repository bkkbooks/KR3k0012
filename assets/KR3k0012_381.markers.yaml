  - {type: variant, offset: 824, length: 0, content: '', SBCK: 崔孝芬取貧家子賈氏以爲養女有姿色騰納之請以邑號又曰齊武成曽有疾自云􅀄見空中有五色物稍近變成一美婦人去地數丈亭亭而立徐之才云此至靈所致即進湯服一劑便覺稍逺又服還變成五色物數劑疾平帝王丗紀曰紂以􅀑侯爲三公􅀑侯有女美而進之於紂恱之妲巳乃泣而譛之紂怒􅀑侯女遂殺之而醢􅀑侯何集續帝王丗紀曰張天錫疾篤閻薛二􅁎並有國色天錫謂曰吾死之後汝二人豈可更爲他妻皆曰尊􅀂不諱請効死尊前誓無他志二人自殺天錫有瘳追悼二􅁎葬以夫人禮􅀃苑曰齊王起九重之臺募國中有􅀞者賜之錢狂卒敬君居常飢寒妻端正敬君工􅀞貪賜􅀞臺去家曰乆思念其妻像向之憘􅀏旁人瞻見之以白王王即設酒與敬君相樂謂敬君曰國中獻女無好者以錢百萬謂妻可乎不者殺汝敬君慞惶聽許又曰太祖下鄴文帝先入􅀽尚府有婦女􅀍髮垢靣立紹妻後文帝問之荅曰是熈妻顧􅄃髮以䄂拭靣姿貌絶倫遂納之丗􅀃曰漢元帝宫人旣多乃令􅀞工圖之欲有呼者輙披圖召焉其中皆行貨賂王昭君姿容甚麗志不可苟求工遂毁爲甚醜終身不召後匈奴來和求美女於帝以昭君充行旣召見而嘆之又曰桓宣武平蜀以}
