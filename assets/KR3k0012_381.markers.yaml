  - {type: variant, offset: 1317, length: 1, content: 多, SBCK: 譬含丹目若瀾波羙姿巧􅀏靨輔竒牙􅀓毅舞賦曰鄭女出進二八飾侍眉連姢以増繞目流睇而撗波劉楨魯都賦曰衆媛侍側鱗附􅄹房娥眉青眸顔若濡霜含丹吮素巧􅀏妍詳掖耀日之珍笄珥明月之珠璫圭衣紛裶振佩鳴璜應瑒神女賦曰騰􅀇眸而俄青陽離朱脣而耀􅀟輔紅顔曄而和妍時調聲以􅀏語張衡舞賦曰􅅂􅀂飛煙䄂如廻雪窣􅀂霆震瞥􅀂電滅於是粉黛施兮玉質粲朱􅆪挺兮緇􅄠亂謝靈運江妃賦曰小腰}
  - {type: page-break, offset: 1317, content: '', id: KR3k0012_SBCK_381-8a}
  - {type: variant, offset: 1317, length: 2, content: 多微, WYG: 譬含丹目若瀾波美姿巧笑靨輔竒牙傳毅舞賦曰鄭女出進二八餙侍眉連媚以増繞目流涕而横波劉楨魯都賦曰衆媛侍側鱗附盈房娥眉青眸顔若濡霜含丹吮素巧笑妍詳掖耀日之珍笄珥明月之珠璫圭衣紛裶振佩鳴璜應瑒神女賦曰騰𤣥眸而俄青陽離朱唇而耀雙輔紅顔曄而和妍時調聲以笑語張衡舞賦曰裾若飛煙袖如廽雪窣若霆震閃若電滅扵是粉黛施兮玉質粲朱簮挺兮緇髪亂謝靈運江妃賦曰小腰㣲骨朱顔皓齒綿視騰采靡膚膩理含台二娥宫庭雙媛青袿晨接紫衣形見或飄翰凌烟或潛泳浮海萬里俄傾寸隂未改}
