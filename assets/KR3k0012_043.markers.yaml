  - {type: variant, offset: 2106, length: 0, content: '', WYG: 西莫耶山是也雲母山夀春圗經曰雲母山一名濠上山在州東南四十里按神仙傳云彭祖服食雲母時人共傳採於此山今或有道者採取不已濠塘山夀春圗經曰濠塘山在縣南六十里有濠水出焉古老所傳岩上泉灌濠城塘故以為名山穴多出鍾乳并有蝙蝠白艾色於穴中倒懸微帶紫色居人或於九月以後二月以前採取服之頗益壽九鬭山夀春圗經曰九鬭山一謂陰陵山江表傳云項羽敗烏江取此山過漢遣灌嬰追羽兵至此一日九戰因名九鬭山今石猶有磨刀礪鏃之跡塗山應劭漢地理志曰禹娶塗山塗山有禹墟太康地記曰塗山古當塗國夏禹所娶也西南又有禹村葢禹㑹諸侯於塗山在禹貢揚州之域今九江當塗縣有禹娶之地邑界有當塗山故城存焉即漢縣後廢郡國志曰平河縣有當塗山出於荆山之左當塗之右奔流二山}
