  - {type: variant, offset: 1464, length: 378, content: 又注水經曰金門溪出金門山也又戴氏西征記云宜陽縣地名金門塢轘轅山十道志曰轘轅山在緱氏東南左傳曰欒盈過周王使候出諸轘轅是也按轘轅道十三曲今置關焉又按薛綜注東京賦云轘轅坂十二曲道將去復還故曰轘轅闕塞山洛陽記曰闕塞山在河南縣左傳晉趙鞅納王使汝寬守闕塞伏虔謂南山伊闕是也杜預云洛西南闕口也俗名龍門是也牧牛山陽城記曰牧牛山在陽城東八十里下有九十六泉即滄河之上源也父老云昔有一神駮身自山而降下飲泉竭故以為名九山陽城記曰九山在縣南三十五里注水經云相澗水經九山東仲長子云昔有上者身遊九山之上施心不拘之鄉即此山也山陰有九山廟碑晉永康二年立文曰九山府君者太華元子之稱也大嵬山陽城記曰大嵬山在密縣東南五十里即具茨之山黃帝登具茨之山升於供隄之上受神芝圖於黃蓋童子即此也又名具茨山也又有方山一名浮戲山汜水出焉又有洧水出密縣西南馬嶺山桑山春秋曰鄭大旱使屠擊有事於桑山斬其木不雨子產曰有事, SBCK: 徹}
