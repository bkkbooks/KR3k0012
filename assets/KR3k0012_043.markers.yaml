  - {type: variant, offset: 3394, length: 271, content: 瘳今夢黃熊入于寢門其何厲鬼也對曰以君之明子為大政其昔堯殛鯀于羽山其神化為黃熊入于羽淵實為夏郊三代祀之也韓子祀夏郊平公乃間華不注山傳曰齊師與晉戰於鞌齊師敗績晉遂之三周華不注山水經曰華不注虎牙桀立孤峰特起青崖發翠同點黛焉長白山郡國志曰長白山陳仲子夫妻隱起郭氏述征記云長白山能興雲雨山西南有大湖山二山並有石室敗赤漆舡上有記皆謂之堯時物黌山三齊略記曰鄭玄刊注詩善棲黌今山有古井不竭猶生細草葉形似韭俗稱鄭公書帶陶山齊地記曰范蠡浮海出齊變姓名自號鴟夷子間行止於陶山因號陶朱公焉後改曰鴟夷山在今平陰縣東巫山又曰巫山一名孝堂山左傳曰齊侯登巫山以望晉師即此山也, SBCK: 樹木唯重阜耳}
