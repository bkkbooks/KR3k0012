  - {type: variant, offset: 1426, length: 200, content: 阮籍宜陽記曰金山之竹堪為笙管楊泉物理論云宜陽金山竹為律管河內葭莩為灰可以調氣又注水經曰金門溪出金門山也又戴氏西征記云宜陽縣地名金門塢轘轅山十道志曰轘轅山在緱氏東南左傳曰欒盈過周王使候出諸轘轅是也按轘轅道十三曲今置關焉又按薛綜注東京賦云轘轅坂十二曲道將去復還故曰轘轅闕塞山洛陽記曰闕塞山在河南縣左傳晉趙鞅納王使汝寬守闕塞伏虔謂南山伊闕是也杜預云洛西南闕口也俗名龍門是也牧牛山陽城記曰牧牛山在陽城東八十里, WYG: 即長沮桀溺耦耕處}
