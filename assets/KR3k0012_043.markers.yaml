  - {type: variant, offset: 238, length: 207, content: 又戴延之西征記云邙山西匡東垣亙阜相屬其下有張母祠即永嘉中此母有神術能愈病故元帝渡江時延聖火於丹陽即此母也今祠存焉續漢書五行志曰靈帝時童謠曰侯非侯王非王千乘萬騎上北邙至中平六年獻帝為中常侍叚珪等數人所執公卿百官隨其後到阿上乃得還此非侯非王上北邙也魏略曰魏文帝獵北邙上時盛夏炎暑行者或中暍鮑勛切諫遂因此伏法魏志曰明帝即位欲平北邙令登臺以觀見孟津廷尉辛毗諫曰天地之性高高下下今而反之既非其理加以損費人功民不堪役帝乃止熊耳, SBCK: 桐栢}
