  - {type: variant, offset: 2745, length: 736, content: 胡賊攻守不能得今山南有大嶧名曰郗公嶧山北有絕巖秦始皇觀禮於魯登於嶧山之上命丞相李斯以大篆勒銘山嶺名曰晝門詩所謂保有蒲嶧者也金鄉山戴延之西征記曰焦氏山北數山有漢司隸校尉魯恭穿山得白虵白兔不葬更葬山南鑿而得金故曰金鄉山山形峻峭冢前有石祠石廟廟四壁皆青石隱起自書契以來忠臣孝子貞婦及孔子弟子七十二人形像像邊皆刻石記之文字分明又有石狀長八尺磨瑩鮮明叩之聲聞甚遠時太尉從事中郎傳珍諮議參軍周安穆析敗石床各取之為魯氏之後所訟三人并免官琅琊山史記始皇二十六年滅齊遂登琅琊山築層臺於上秦皇樂之因留三月是也郡國縣道記云琅琊臺在故城東南十里州東南一百七十里臺上有始皇碑碑上有六百字可識餘多剝落臺側有四時祠即齊地八祠之一又云臺上有神泉人或汙之即立竭龜山水經注曰龜山在博縣一十五里昔夫子傷政道之陵遟故望山而懷操故琴操有齊龜山操焉山北即龜陰之田也春秋定公十年齊人來歸龜陰之田是也徂徠山又經注曰鄒山記云徂徠山在梁甫奉高博三縣界猶有美松亦曰尤竦之山危山漢書五行志曰哀帝時無塩危山土自起覆草如馳道狀報山又報山石轉立東平王雲及后謁自之石所祭治石象報山立石束倍草并祠之三年息夫躬告之王自殺后謁棄市國除尼丘山水經注曰沂水出魯城東南尼丘山西北山即顏母所祈而生孔丘也山東一十里有顏母廟防山南數里孔子父葬處禮所謂防墓崩者也羽山十道志曰羽潭一名羽池潭東有羽山漢志曰東海郡祝其縣有羽山殛縣之所郡國志云鍾離沬城有羽泉殛鯀處其水恒清牛羊不飲書曰殛鯀于羽山又曰蒙羽其藝左傳曰昭公二年鄭于產聘于晉平公有疾韓宣子逆客私焉曰寡君寢疾于今三月矣並走群望有加而無瘳今夢黃熊入于寢門其何厲鬼也對曰以君之明子為大政其昔堯殛鯀于羽山其神化為黃熊入于羽淵實為夏郊三代祀之也韓子祀夏郊平公乃間華不注山傳曰齊師與晉戰於鞌齊師敗績晉遂之三周華不注山水, WYG: 厯陽圖}
