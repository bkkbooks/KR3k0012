  - {type: variant, offset: 3483, length: 579, content: 華不注虎牙桀立孤峰特起青崖發翠同點黛焉長白山郡國志曰長白山陳仲子夫妻隱起郭氏述征記云長白山能興雲雨山西南有大湖山二山並有石室敗赤漆舡上有記皆謂之堯時物黌山三齊略記曰鄭玄刊注詩善棲黌今山有古井不竭猶生細草葉形似韭俗稱鄭公書帶陶山齊地記曰范蠡浮海出齊變姓名自號鴟夷子間行止於陶山因號陶朱公焉後改曰鴟夷山在今平陰縣東巫山又曰巫山一名孝堂山左傳曰齊侯登巫山以望晉師即此山也山上有石室俗傳云郭巨葬母之所因名孝堂山焉在平陰縣魚山郭延生述征記曰魚山一名五山瓠子歌所謂也魏熹平中有神女智瓊降弦超室後復遇此山陌上又西征記曰魚山臨河神女智瓊與弦超會所魏陳思王曹植嘗登此山有終焉之志遂葬其西亦其所封國也魚山在東阿縣東北穀城山漢書曰穀城山昔張良受黃石公素書云山下黃石即吾也穀城山一名黃石山在東阿縣東北勞山伏琛齊記曰不其城南二十里有大勞山小勞山在海側晏謀齊記曰俗云太山自言高不如東海勞即此也蒙山高士傳云老萊子隱於蒙山之陽以葭為蓋蓬為室歧木為床耆艾為蓆衣縵飲水墾山播植楚王親至其門方織畚至去有間其妻戴畚菜挾薪而至問車馬跡之多荅曰楚王妻曰可食以酒肉者可加以鞭捶可受以官祿者可隨以鈇鉞先生受人官祿為人所制妾不能為人所制者妻乃畚菜而去也東蒙山在蒙山之東故曰東蒙論語云昔者先王以為東蒙王是社稷之臣何以伐為謝祿山郡國志曰東海郡有謝祿山按漢書王莽時東海徐宣謝祿等擊王莽將田況大破之曾屯兵於此因名謝祿, WYG: 雞籠}
