  - {type: variant, offset: 626, length: 0, content: '', WYG: 入檻方見虎攀木仰看允謂虎曰此檻本為汝施而我幾死其中汝不殺我我救汝乃開檻出虎賊平之後允詣縣别良善烏程令張球不為申理桎梏捶楚允夢見人曰此易入難出汝有慈心當與救拯囬見一少年通身黄衣遥在柵外時進獄中與允言語獄吏知是異人由此不敢枉允蒙理還都西上武當山太尉庾公聞而愍之給其糧資隨到襄陽見道士說吾師戴先生孟盛子非世間人也勑若有西上欲見我者可將來得無是君允因隨去入武當山齋戒三日進見先生乃是昔日}
