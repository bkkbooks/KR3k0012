  - {type: variant, offset: 2272, length: 787, content: 河校之圖緯於事為安南城山後漢書曰鄭玄漢末遭黃巾之難客於徐州今孝經序鄭氏所作其序云僕避于南城之山棲遲巖石之下念昔先人餘暇述夫子之志而注孝經蓋康成胤孫所作也今西上可二里所有石室焉周廻五丈俗云是康成注孝經處也奚公山楊曄徐州記曰奚公山奚仲造車之所山上軌轍猶存嵇山水經曰嵇山嵇氏故居也嵇康本姓奚會稽人也先自會稽遷于譙之銍縣故為嵇氏取稽字之上以為姓蓋志本也曹南山十道志曰曹南山曹風詩所謂薈兮蔚兮南山朝躋是也有汜水出焉即漢書云高祖即位於汜水之陽今壇存焉汜音汎嶧山書禹貢曰嶧陽孤桐泗濱浮磬鄭玄注曰嶧山今在下邳西葛嶧山也詩曰奄有鳧嶧遂荒徐宅鳧嶧二山爾雅曰魯國鄒縣有嶧山純石相積構連屬而成山史記始皇本紀曰二十八年始皇行郡縣上鄒嶧山立石與諸博士議刻石頌秦德三代地理書曰秦始皇乘羊車登嶧山鄒山記曰鄒山古之嶧山也孤桐之所植邾文公之所卜山下是鄒縣本是邾國魯穆公改鄒山從邑變故謂鄒山嶧陽猶多桐樹地理志嶧山在鄒縣北繹邑之所依名也山東西二十里南北一十三里高秀獨出積石相臨殆無壤石間多孔穴洞達相通往往有如數間居處其俗謂之嶧孔遭亂輒將居人入嶧外寇雖眾無所施害永嘉中太尉郗鑒將鄉曲逃此山胡賊攻守不能得今山南有大嶧名曰郗公嶧山北有絕巖秦始皇觀禮於魯登於嶧山之上命丞相李斯以大篆勒銘山嶺名曰晝門詩所謂保有蒲嶧者也金鄉山戴延之西征記曰焦氏山北數山有漢司隸校尉魯恭穿山得白虵白兔不葬更葬山南鑿而得金故曰金鄉山山形峻峭冢前有石祠石廟廟四壁皆青石隱起自書契以來忠臣孝子貞婦及孔子弟子七十二人形像像邊皆刻石記之文字分明又有石狀長八尺磨瑩鮮明叩之聲聞甚遠時太尉從事中郎傳珍諮議參軍周安穆析敗石床各取之為魯氏之後所訟三人并免官琅琊山史記始皇二十六年滅齊遂登琅琊山築層臺於上秦皇樂之因留三月是也郡國縣道記云琅琊臺在故城東南十里州東南一百七十里臺上有始皇碑碑上有六百字可識餘多剝落臺側有四時祠即齊地八祠之一又云臺上有神泉人或汙之即立竭龜, SBCK: 洪}
