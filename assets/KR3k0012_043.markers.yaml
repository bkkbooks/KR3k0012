  - {type: variant, offset: 3828, length: 234, content: 不其城南二十里有大勞山小勞山在海側晏謀齊記曰俗云太山自言高不如東海勞即此也蒙山高士傳云老萊子隱於蒙山之陽以葭為蓋蓬為室歧木為床耆艾為蓆衣縵飲水墾山播植楚王親至其門方織畚至去有間其妻戴畚菜挾薪而至問車馬跡之多荅曰楚王妻曰可食以酒肉者可加以鞭捶可受以官祿者可隨以鈇鉞先生受人官祿為人所制妾不能為人所制者妻乃畚菜而去也東蒙山在蒙山之東故曰東蒙論語云昔者先王以為東蒙王是社稷之臣何以伐為謝祿山郡國志曰東海郡有謝祿山按漢書王莽時東海徐宣謝祿等擊王莽將田況大破之曾屯兵於此因名謝祿, SBCK: 鷄籠}
