  - {type: variant, offset: 1823, length: 266, content: 旱使屠擊有事於桑山斬其木不雨子產曰有事於山蓻山林也蓻養護也而斬其木有罪大矣奪之官邑半石山山海經曰半石山其上有草生而秀高大葉與花皆赤而不實其名嘉榮服者不遷喜怒在緱氏南十五里天心山道書福地志曰天心之山方圓百里形如城四面有門上有石牆長十餘丈山高谷深多生微蘅其草有風不偃無風獨搖天心山又名錫義山在豊利縣東六十五里小徑山山海經曰小徑山器難之水出焉舊傳器難之水即索水也小徑山一曰嵩諸山俗名周山在榮陽縣三十五里蘭巖山神境記曰榮陽縣有蘭巖山峭拔千丈常有雙鵠不絕來往傳曰昔有夫婦隱此山數百年化為此鵠忽一旦一鵠為人所害其一鵠歲常哀鳴至今饗動岩谷莫年歲碭, WYG: 洪}
