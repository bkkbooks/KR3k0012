  - {type: variant, offset: 726, length: 737, content: 長生不死春秋時遷陸渾之戎意其遺類崤山元和郡縣志曰二崤山在今澠池縣西北一名嶺岑左傳謂秦將襲鄭蹇叔哭送謂收子骨所後漢末建安中曹公西討巴漢惡其險而更開北山道路多從之便又有石銘云晉太康三年弘農大守梁柳脩復舊道西征記曰崤山上不得鳴鼓角鳴則風雨揔至自東崤至西崤三十里東崤長坂數里峻阜絕澗車不得方軌西崤全是石坂十二里險絕不異東崤傳曰杞子自鄭使告于秦曰鄭人使我掌其北門之管若潛師以來國可得也穆公召孟明西乞白乙使出師於東門之外蹇叔之子與師哭而送之曰晉人禦師必於崤有二陵焉其南陵夏后皋之墓也北陵文王之所避風雨也必死是間余收爾骨焉漢書曰景帝三年吳楚反以周亞夫為太尉擊吳楚亞夫發至灞上趙涉遮說亞夫曰吳王素宿懷輯死士久矣此知將軍且行必置間人於崤澠阨陋之間將軍何不從此右去趨藍田出武關抵洛陽間不過差一二日直入武庫擊金鳴鼓諸侯聞之以為將軍從天而下也太尉如其計至洛陽使吏搜崤澠間果得吳伏兵三輔舊事曰鄧禹敗於潼關後大破赤眉於崤青要山山海經曰青要山實惟帝之密都畛水出焉有草黃華赤實服之美人色注水經云強山東阜即騩山有美棗焉十道志曰青要山又名強山缺門山注水經曰缺門山山阜之不相接者一里故得名二壁爭高升聳相亂是也三塗山地理志曰三塗山在陸渾縣南左傳謂四嶽三塗九州之險或曰三塗者伊闕大谷轘轅三道是也女几山元和郡縣志曰女几山在福昌縣西南三十四里山海經曰女几山上多玉下多金其獸即豹麖麝禽多鷮翟鴆白馬山十道志曰白馬山注水經云溪水出宜陽白馬山山上有大石厥狀似馬故溪間以物色受名焉滑州白馬山開山圖云白馬群行山上悲鳴則河決馳走則山崩謂此山也西征記云山有神白馬故名焉太陰山十道志曰太陰山左傳謂晉梁丙陰趯率戎伐潁又云蠻子赤奔晉之陰地且自雒以東至陸渾謂此山也金門山阮籍宜陽記曰金山之竹堪為笙管楊泉物理論云宜陽金山竹為律管河內葭莩為灰可以調, SBCK: ''}
