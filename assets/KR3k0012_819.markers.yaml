  - {type: variant, offset: 2275, length: 117, content: 武帝使東方朔射中上曰善賜帛十疋郭舍人曰朔齊人多變更致他物射之中則臣榜百不中賜臣帛朔又中乃榜舍人又曰館陶公主乃命私府曰董君所發一日金滿百斤錢滿百萬帛滿千疋乃白之又曰婁護為諫議大夫使郡國護假貸多持幣帛過齊上書求上先人冢因會宗族故人各以親䟽, WYG: 江都王建謀反與閩越通越}
