  - {type: variant, offset: 1895, length: 222, content: 於伯高又王制曰布帛精麤不中數廣狹不中量不鬻於市又曰七十非帛不暖又禮運曰後聖有作治其絲麻以為布帛又內則曰國君世子生三日卜士負之告者宿齋朝服寢門外保受乃負之宰禮負子賜之束帛又曰婦人或賜之飲食衣服布帛則受而獻諸舅姑又坊記曰子云禮之先幣帛也欲民之先事而後祿也此禮謂所執之贄以見者也既相見乃奉幣帛以修好也或云禮之光辭而後幣帛左傳襄上曰季文子卒大夫入歛公在位宰庀家器為葬備無衣帛之妾無粟食之馬無藏金玉無重器備又哀上曰邾茅夷鴻以束帛乘韋自請救於吳無君命故言自, SBCK: ''}
