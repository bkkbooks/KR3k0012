  - {type: variant, offset: 606, length: 0, content: '', krp: 孝行旣著髙陽許瑶之罷建安郡丞還家以綿一斤遺之不受瑶之乃自往曰今過寒而建安綿好以此奉尊上耳原平乃拜而受之也又曰朱百年隱居山隂家室素貧母以冬月亡衣並無絮自此不衣綿帛嘗寒時就孔凱宿衣悉裌布飲酒醉眠凱以卧具覆之百年不覺引卧具去躰謂凱曰綿定竒温因流涕悲動凱亦爲之傷感齊書曰阮孝緒年}
