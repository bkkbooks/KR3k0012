  - {type: punctuation, offset: 1500, content: 《, id: KR3k0012_CHANT_819-bkkpn446}
  - {type: variant, offset: 1500, length: 0, content: '', SBCK: 公息忌謂邾君曰凡甲所以爲固者以滿竅也今竅滿矣而任力者半組則不然竅滿則盡任力矣邾君以爲然曰將何所得組公息忌對曰上用之則民爲之矣邾君曰善下令令官爲甲必以組公息忌知􅀃之行也令其家皆爲組人有傷之者曰公息忌之所以欲用組者其家多爲組也邾君不恱於是乎止官無以組邾君有所尤也爲甲以組而便公息忌雖多爲組何損以組不便公息忌雖無爲組亦何益爲組與不爲組不足以累公息忌之􅀃用組之心不可不察劉梁七舉曰華組之組從風紛絃應璩報燕中尉樊彦皇書曰登輿北踐燕路方當化銀􅀛以爲黃變青組以爲紫又報平陸長賁瑋伯書曰從此辭矣何敢復飛蟬於惠文鳴玉於緺組哉納魏武令曰吾衣皆十歳也歳歳解浣􅀘納之耳魏志曰太祖幃帳壞即􅀘納汲太子妻李氏與夫書曰并緻納一端宋書曰徐逵之尚㑹稽長公主􅀄武帝微時貧過甚常自新洲伐荻有納布衣襖等皆是敬皇后手自作武帝旣貴以此衣付主曰後世􅀂有驕奢不節者可以此衣示之主子湛之爲大將軍彭城王義康所愛與劉湛之等頗相附及劉湛之得罪事連主子文帝大怒將致大辟湛之憂懼無計以告公主公主即日入宫及見文帝因號哭下牀不復施臣妾之禮以錦囊盛武帝納衣擲地以示上曰汝家夲貧賤此是我母爲汝父作此納衣今日有一頓飽食便欲殘害我兒子上亦號哭湛之由此得全南史曰齊張欣㤗爲直閣歩兵校尉領羽林監欣㤗通渉雅俗交結多是名素下直輙著鹿皮冠納衣錫杖挾素琴有以啓武帝帝曰將家兒何作此舉止又曰沙門寳志在建康寳亮欲以納􅀍遺之未及有言寳志忽來牽􅀍而去陳書曰大軍侵魏造陜城魏兵大合輕􅀐挑戰侯安都瞋目横矛單騎突陣四向􅁬擊左右皆披靡殺傷不可勝數於是衆並鼓噪俱前魏多縱突􅀐衆軍患之安都怒甚乃脫兠䥐解所帶鎧唯着絳衲兩襠衫馬亦去具裝馳入賊陣猛氣咆勃所向無當其鋒者莫不應刃而倒綸釋名曰綸倫也作之有倫理也􅀃文曰綸紏青􅁝綬也禮記曰王言如絲其出如綸王言如綸其出如綍後漢書仲長統書曰井田之變豪人貨殖舘舎布於州郡田畒連於方國身無半通青綸之命而切三辰龍章之服續漢書輿服志曰百石青紺綸一采宛轉繆織長丈二尺東觀漢記曰建初二年詔齊相其上勿復送吹綸絮鄭玄注禮記曰綸今有秩嗇夫所佩也鄴中記曰石虎皇后出女􅀐一千冬月皆著紫綸巾齊書曰徐龍駒常住含章殿著黃綸帽􅀍貂裘南靣向案代帝書勑世􅀃曰謝万詣簡文無衣幘可前簡文曰但前不湏衣幘即呼使入萬着白綸布而前旣見共談移日孟達與諸􅁑亮書曰貢白綸帽一以示微意縞}
