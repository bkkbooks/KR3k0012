  - {type: variant, offset: 1494, length: 1, content: 餉, SBCK: 與􅀍絮一􅀟以通微心陸雲與兄機書曰一日案行視曹公器物見拭目黃絮有垢黒目淚所沾汚孝子傳曰閔子騫㓜時爲後母所苦冬月以蘆花衣之以代絮其父後知之欲出後母子騫跪曰母在一子單母去三子寒父遂止世􅀃曰王文度在西州與林法師講韓孫諸人並在㘴林公理每欲小屈孫公曰法師今日似着弊絮在荆􅁄中觸地掛閡牽離􅀃文曰絓蠒滓絓頭也一曰牽離釋名曰煑蠒曰莫莫幙也貧者著衣可以幕絮也或謂之牽離煑熟爛牽引使離散如綿也紈釋名曰紈煥也}
