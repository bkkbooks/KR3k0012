  - {type: variant, offset: 3331, length: 4, content: 正直社稷, WYG: ''}
  - {type: variant, offset: 3336, length: 270, content: 臣也固請遣中使齎帛五百疋賜徵又曰貞觀十一年賜遭水之家帛十五疋半毀者八疋又曰王君廓少孤貧無行以剽劫為業亡命聚徒以逆鬢竹器籠人頭而奪其繒帛又曰開成中以諫議大夫蕭俶為楚州刺史俶故相俛之弟將赴任延英候辤上曰蕭俛是先朝賢相筋力未衰即須一來京國朕今賜手詔及賜帛三百疋以備山谷所乏戰國策曰公子魏牟過趙趙王坐前有尺帛且令工以為冠趙王曰公子臨寡人願聞所以為天下魏牟曰王能重王之國若是尺帛則王之國大治矣王有此尺帛何不令郎中以為冠為冠而敗之奚虧王國而王必待工乃使之今社稷為丘墟先人不血食王不以與工乃與幼艾也事具冠門河圖玉板曰崑崙以東得大秦之國人長十丈皆衣帛韓詩外, WYG: 㲔翅稽康高士}
