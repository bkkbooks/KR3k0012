  - {type: variant, offset: 3630, length: 0, content: '', SBCK: 彼婦人可與言矣抽絺綌五兩以授子貢曰善爲之辭以觀其辭子貢曰吾北鄙之人也將南適楚於此有絺綌五兩吾不敢置之水浦婦人對曰行客之行嗟然永乆分其資財棄之野鄙吾年甚少何敢}
