  - {type: variant, offset: 2481, length: 10, content: 永平六年雒山出寶鼎廬, SBCK: 黃香爲郎召詣安福殿賜錢三萬黄白􅁑各一端魏武封魏王詔曰今以君爲魏王青絳皂黃白各二疋􅁑越一端徃欽哉呉曆曰孫䇿送華歆還洛并送布越香􅁑時多盗賊歆渡牛渚悉封還諸物}
  - {type: variant, offset: 2481, length: 107, content: 永平六年雒山出寶鼎廬江太守獻之於廟賜三公帛五十疋九卿二千石半之續漢書曰宋秉字巨公拜御史中丞布被瓦器居不粟馬出無從車車駕幸其府舍歎曰雖楚國二龔不如雲陽宣巨公賜布帛帳帷什器後漢書曰公孫述造十層赤樓帛蘭船蓋以帛飾其欄檻也, WYG: ''}
