  - {type: variant, offset: 625, length: 3, content: 疋右趾, SBCK: 斤綿與謝陸氏異林曰鍾繇常數月不朝或問其故云常有好婦來美麗非凢問者曰必是􅀑物不可不殺之婦人後往不即前止戸外繇問何以曰公有相殺意繇曰無此勤勤呼之乃入繇有不忍心然猶斬之傷胛婦人即出以新綿拭血竟路明日使人㝷跡}
  - {type: variant, offset: 625, length: 3, content: 疋右趾, WYG: 觔綿與謝陸氏異林曰鍾繇嘗數月不朝或問其故云常有好婦來美麗非凡問者曰必是鬼物何不殺之婦人后往不即前止户外繇問何以曰公有相殺意繇曰無此勤勤呼之乃入繇有不忍心然猶斬之婦人即出以新綿拭血竟去明日使人尋跡}
