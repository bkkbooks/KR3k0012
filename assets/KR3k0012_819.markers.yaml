  - {type: variant, offset: 1555, length: 275, content: 立大祀用玉帛牲牷又春官典命曰凡諸侯之適子誓於天子攝其君則下其君之禮一等未誓則以皮帛繼子男又夏官下職方氏曰并州其利布帛又冬官考工記曰繼子男執皮帛謂公之孤也見禮次子男贄用束帛而以豹皮表之為飾又曰涷帛以欄為灰渥淳其帛實諸澤器淫之以蜃渥讀如繒人渥管之渥以欄木之灰漸釋其帛也鄭司農云澤器謂滑澤之器蜃謂炭也士冠禮曰素積白屨以魁柎之說曰魁蛤也周官亦有白盛之蜃蜃蛤也玄謂淫薄粉之令帛白蛤今海旁有焉清其灰而盝之而擇之清澄也於灰澄而出盝晞之晞而揮去其蜃而沃之而盝之而塗之而宿之更渥淳之明日沃而盝之朝更沃至夕盝之又更沃至旦盝之亦七日如漚絲也晝暴諸日夜宿諸井七日七夜是謂水涷, WYG: ''}
