  - {type: variant, offset: 1468, length: 1, content: 帙, WYG: 絮藡苖藿秀也古今注曰元帝永光四年東萊郡東牟山有野蠶為蠒蠒生蛾蛾生卵卵着石收得萬餘石民以為絲絮五年長安雨絮垣屋上皆白民衣之管寜别傳曰管寧性至孝恒布裳貉裘惟祠着單衣絮巾也吳越春秋曰吳王將死曰吾因不用子胥言以至於此死者無知則已死者有知}
