  - {type: variant, offset: 604, length: 1, content: 永, SBCK: 張奐遺命曰吾前後仕進十􅆎銀艾不能和光同塵爲讒邪所忌通塞命也始終常也但地下􅁳􅁳長無曉期而復􅆞以綿纊牢以釘宻爲不喜耳今幸有前穿朝殞夕下橫屍露床幅巾而巳晉陽秋曰有司奏依舊調房子睢陽綿武帝不許宋書曰郭原}
