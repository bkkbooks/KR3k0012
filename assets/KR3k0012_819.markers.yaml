  - {type: variant, offset: 1512, length: 1, content: 帛, SBCK: 老董公􅀃漢王以義帝死故漢王遂發䘮臨三日告諸侯曰天下共立義帝北靣事之今項羽攻殺大逆無道寡人親發䘮諸侯皆縞素歸漢韓子曰魯人身善織屨爲履之也而越人縞欲冠之也而越人􅀍髪欲無窮可得乎淮南子曰鈞之縞也一端以爲冠一端以爲絑冠則戴之絑則履之司馬相如子虚賦曰􅀍阿緆緰紵縞阿細繒緆細練也緆音錫緰音􅁷也曹洪與魏文帝書云我軍入漢中􅀂駭鯨之决細網奔兕之觸魯縞未足以喻其易也締􅗽􅀃文曰􅗽粗􅁑也絺細􅁑也縐絺之細者也尚書禹貢曰海岱惟青州厥貢鹽絺}
  - {type: page-break, offset: 1512, content: '', id: KR3k0012_SBCK_819-9a}
  - {type: variant, offset: 1512, length: 1, content: 帛, WYG: 老董公説漢王以義帝死故漢王遂發喪臨三日吿諸侯曰天下共立義帝北面事之今項羽攻殺大逆無道寡人親發喪諸侯皆縞素歸漢韓子曰魯人身善織屨欲履之也而越人跣縞欲冠之也而越人被髮欲無窮可得乎淮南子曰鈞之縞也一端以為冠一端以為絑冠則戴之絑則履之司馬相如子虚賦曰被阿緆緰紵縞阿細繒緆細練也曹洪與魏文帝書云我軍入漢中若駭鯨之决細網奔兕之觸魯縞未足以喻其易也絺綌説文曰綌粗葛也絺細葛也縐絺之細者也尚書禹貢曰海岱惟青州厥貢鹽絺}
