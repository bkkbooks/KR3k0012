  - {type: variant, offset: 3054, length: 263, content: 龍臺澤諸軍部伍多不齊整唯閻毗一軍法制肅然頴言之於上時蒙賜帛又曰張定和初為侍官會平陳之役定和當從征無以自給其妻有嫁時衣服定和將鬻之妻靳固不與定和於是遂行以功拜儀同賜帛千疋遂棄其妻唐書曰高祖傾府藏以賜勳人而又患國計不足劉義節進計曰今義師數十萬並在長安樵薪貴而布帛賤若伐街衢及苑中之樹為樵易布帛歲取數十萬立可致也又藏內繒絹疋皆有餘軸之使申截剩物以供雜費動盈千餘萬疋高祖並從之大收其利又曰太宗召太子舍人陸敦信勞之曰爾所錄古先太子善惡之事多所規諷誠有可嘉因賜帛五十叚又曰貞觀中皇后所生長樂公主將出降勑資送倍於長公主魏徵諫以漢明帝以朕子安, WYG: 曠野良工}
