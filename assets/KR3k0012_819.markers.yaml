  - {type: variant, offset: 1201, length: 242, content: 青州刺史初思伯與弟思休師事北海陰鳳授業竟無資酬之鳳遂質其衣服時人為之語曰陰生讀書不免癡不識雙鳳脫人衣及思伯之部送縑百疋遺鳳因具車馬迎之鳳慚不往時人稱歎焉隋書曰田德懋丁父艱哀毀骨立廬於墓側負土成墳上聞而嘉之遣散騎侍郎元志就吊焉復降璽書并賜縑二百疋米百石復下詔表其門閭又曰文帝幸并州留高穎居守及上還京賜縑五千疋風俗通曰臨淮有一人持一縑到市賣之遂還值雨因共披戴後有人求庇蔭一頭之地雨霽因共爭之各云我縑丞相薛宣決曰縑直數百錢何足紛紛呼騎吏中斷縑各與半後人曰受恩矣前撮之縑主稱怨不已宣考乃歎服傅, WYG: ''}
