  - {type: variant, offset: 931, length: 212, content: 寢至有易衣併日之弊而澹然自守不汲汲於榮利不戚戚於貧賤乃著窮通論以自慰常為諸儒傭寫經論筆跡稱善卷直一縑歲中能入百餘疋如此數年賴以頗振又曰楊津除侍御中尉孝文幼冲文明太后臨朝津曾入侍左右忽欬逆失聲遂吐數升藏之衣袖太后聞聲閱而不見問其故具以實言遂以敬慎見稱而賜縑百疋遷符璽郎又曰李元忠嘗貢齊文襄王蒲桃一盤文襄報以百縑其見賞重如此又曰高遵性不廉清在中書時每假歸山東必借備騾馬將從百餘屯逼人家不得絲縑滿意則詬詈不去旬月之間縑布千數郡邑苦, SBCK: 倦嗟歎乆}
