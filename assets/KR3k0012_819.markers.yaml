  - {type: variant, offset: 1499, length: 0, content: '', SBCK: 白紈五疋入蜀楚相以聞詔書還蜀縑紈以助伊蒲塞桒門之盛饌漢舊儀曰乗輿冠髙山冠飛羽之纓幘赤丹紈裏范子計然曰白紈素出齊魯王子年拾遺録曰􅌡洲有金巒之觀中有瑶几覆以雲紈之素繁欽定情詩曰何以合歡欣紈素三條裠組􅀃文曰組綬屬其小者以爲纓也禮記檀弓上曰有子盖旣祥而絲屨組纓禮記玉藻曰玄冠朱組纓天子之冠也玄冠丹組纓諸侯之冠也又曰弟子縞帶并細約用組又曰天子佩白玉而玄組綬公侯佩山玄玉而朱組綬大夫佩水蒼玉而緇組綬世子佩璆玉而綦組綬士佩瓀珉而緼組綬孔子佩象環五寸而綦綬又少儀曰國家靡弊則車不雕幾甲不組縢幾附􅆞爲沂鄂也組滕以飾左傳襄三年楚子重伐呉爲簡之師克鳩兹至于衡山使鄧廖帥組甲三百􅀍練三千史記曰秦王子嬰係頸以組降沛公軹道旁漢書曰錦繡纂組害女工穆天子傳曰天子見西王母好獻錦組百純又曰盛􅁎之䘮叔㛗贈用茵組茵褥也叔姓穆王女墨子曰昔楚莊王鮮冠組纓絳衣愽衮以治其國韓子曰呉起示其妻以組曰子爲我織組令如是組妻織組果善呉起曰非戒也使之衣而歸妻兄請之起曰起家無虚言吕氏春秋曰邾之爲甲常以}
