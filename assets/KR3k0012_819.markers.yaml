  - {type: variant, offset: 3078, length: 525, content: 上時蒙賜帛又曰張定和初為侍官會平陳之役定和當從征無以自給其妻有嫁時衣服定和將鬻之妻靳固不與定和於是遂行以功拜儀同賜帛千疋遂棄其妻唐書曰高祖傾府藏以賜勳人而又患國計不足劉義節進計曰今義師數十萬並在長安樵薪貴而布帛賤若伐街衢及苑中之樹為樵易布帛歲取數十萬立可致也又藏內繒絹疋皆有餘軸之使申截剩物以供雜費動盈千餘萬疋高祖並從之大收其利又曰太宗召太子舍人陸敦信勞之曰爾所錄古先太子善惡之事多所規諷誠有可嘉因賜帛五十叚又曰貞觀中皇后所生長樂公主將出降勑資送倍於長公主魏徵諫以漢明帝以朕子安得同於先帝子后聞之以為難可謂正直社稷之臣也固請遣中使齎帛五百疋賜徵又曰貞觀十一年賜遭水之家帛十五疋半毀者八疋又曰王君廓少孤貧無行以剽劫為業亡命聚徒以逆鬢竹器籠人頭而奪其繒帛又曰開成中以諫議大夫蕭俶為楚州刺史俶故相俛之弟將赴任延英候辤上曰蕭俛是先朝賢相筋力未衰即須一來京國朕今賜手詔及賜帛三百疋以備山谷所乏戰國策曰公子魏牟過趙趙王坐前有尺帛且令工以為冠趙王曰公子臨寡人願聞所以為天下魏牟曰王能重王之國若是尺帛則王之國大治矣王有此尺帛何不令郎中以為冠為冠而敗之奚虧王國而王必待工乃使之今社稷為丘墟先人不血食王不以與工乃與幼艾也事具冠門河圖玉板曰崑崙以東得大秦之國人長十丈皆衣帛, SBCK: 虞}
