  - {type: variant, offset: 1540, length: 149, content: 職常立國祀之禮以佐太宗伯佐助也立大祀用玉帛牲牷又春官典命曰凡諸侯之適子誓於天子攝其君則下其君之禮一等未誓則以皮帛繼子男又夏官下職方氏曰并州其利布帛又冬官考工記曰繼子男執皮帛謂公之孤也見禮次子男贄用束帛而以豹皮表之為飾又曰涷帛以欄為灰渥淳其帛實諸澤器淫之以蜃渥讀如繒人渥管之渥以欄木之灰漸釋其帛也鄭司, SBCK: 材于山}
