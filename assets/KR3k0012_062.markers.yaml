  - {type: variant, offset: 817, length: 1251, content: 祭王曰江漢沮漳楚之望也河非所獲罪春秋考異郵曰河者水之氣四瀆之精所以流化故曰河潤千里孝經援神契曰河者水之伯上應天漢史記曰秦滅六國自以為獲水德之瑞更名河曰德水漢書曰河有兩源一出葱嶺山一出于闐于闐在南山下其北流與葱嶺河合東注蒲昌海一名鹽澤又曰長水校尉高竝言河決率常於平原東郡左右其地形下而土䟽惡也聞禹理河本空此地以為水猥近察秦漢河決曹衛之域不過百八十里可空此也勿以為官亭民室張璠漢紀曰郭伋為穎川太守光武詔曰賢能太守去帝城不遠河潤九里冀京師并蒙其福魏志曰袁紹渡河沮授臨舟歎曰上盈其志下務其功悠悠黃河吾其濟乎說苑曰甘茂使齊渡河舩人曰河水猶澗耳君不能渡何王之能說乎甘茂曰持擑隨流臣不若子說萬乘之君子不如我桓譚新語曰大司馬張仲議曰河水濁一石水六斗泥而民競決河溉田令河不通利至三月桃花水至則決以其噎不泄也可禁民勿復引河韓詩外傳曰申徒狄非世將自投於河崔嘉聞而止之曰聖人民之父母也今為濡足之故不救溺人可乎申徒狄曰昔桀殺龍逄紂殺比干而亡天下吳殺子胥陳殺泄治而滅其國非無聖知不用故也遂負石而沉於河河圖始開圖曰黃帝問風后曰余欲知河之始開風后曰河凡有五皆始開乎崑崙之墟慎子曰西河下龍門其流駛竹箭抱朴子曰撮攘不能填決河升水不能冷原火又曰寸膠不能理黃河之濁尺水不能卻蕭丘之火淮南子曰武王伐紂至孟津陽侯之波逆流而擊疾風晦冥人馬不相見於是武王左操黃鉞右執白旄瞋目而麾曰余在天下誰敢害余意者於是風濟波罷又曰河以委虵委虵音逶迤故能遠山以陵遲故能高道以優游故能化又曰水九折注海而流不絕者有崑崙之輸也風俗通曰河播也播為九州也物理論曰河色黃眾川之流蓋濁之也百里一小曲千里一曲一直山海經曰從極之淵深三百仞唯冰夷恒都焉冰夷馮夷也淮南子曰馮夷得道以潛大川馮夷人面乘兩龍乘雲車駕二龍水經注曰禹理洪水觀於河見白面長人魚身出曰吾河精也授禹河圖而還於淵又曰昔澹臺子羽齎千金之璧渡河陽侯波起兩蛟挾舟子羽曰吾可以義求不可以威劫操歛斬蛟蛟死波休乃投璧於河三投而輒躍出乃毀璧而去示無恡意又曰崑崙在北去嵩高五萬里地之中也高萬一千里河水出其東北蕭廣濟孝子傳曰三洲人者各一州人皆孤單焭獨三人闇會樹下息因相訪問老者曰寧可合為斷金之業邪二人曰諾即相約為父子因命二人於大澤中作舍且欲成父曰此不如河邊二人曰諾河邊舍幾成父曰又不如河中二人復填河二旬不立有一書生過之為縛兩土肫投河中會父往呼止之曰嘗見河可填耶觀汝行耳相將而去明日俱至河邊望見河中土高丈餘祥瑞禮記曰河出馬圖言龍馬負圖也河圖曰黃帝云余夢見兩龍授圖乃齊往河洛而求有魚折溜而止魚汎曰圖跪而受之運斗樞曰舜與諸侯觀河洛有黃龍負圖出置帝前䠠入水而前去䠠之遊反又音帶䠠去也拾遺記曰黃河千年一清聖王之大瑞也易乾鑿度曰帝王將起河水先清清變白白變赤赤變黑黑變黃各三日中候曰榮光出河休氣四塞滎光即五色論語曰河不出圖吾已矣夫沉祭穆天子傳曰天子西狩獵獲白狐玄貉以祭于河禮記曰三王之祭川也皆先河後海此所謂務本言海之本源自河也史記曰元光中河決於匏子於是天子臨決河沉白馬玉璧於河令群臣從官自將軍以下皆負薪填決河而取淇園之竹以為堰天子既臨河決悼功之不成乃作瓠, WYG: ''}
