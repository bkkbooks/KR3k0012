  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_062-1a, image: WYG0893/WYG0893-0509c.png}
  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第六十二}
  body:
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 七涇渭霸滻豐鎬澇潏伊洛􅈆澗榖漢􅃆涇書禹貢曰涇屬渭汭屬逮也水北曰汭言治水注入渭詩曰涇以渭濁湜湜其沚傳曰諸侯之大夫從晉侯伐􅁗以報櫟之役濟涇而次􅁗人毒涇上流師人多死以毒藥投涇水之上流􅀳師飲之多死國語曰恭王遊於涇水上宻康公從三女奔之其母曰必致之於至夫獸三爲羣女三爲粲粲羙之物汝何德以堪之康公弗許一年恭王滅宻史記曰韓聞􅁗之好興事乃使水工鄭國間􅀃􅁗令鑿涇水自中山西抵瓠口爲渠以漑田又曰􅁗二丗夢白虎嚙左􅆖殺之卜涇爲崇二丗乃齊望夷宫而欲祀之漢書曰涇雖不在大川之祀以近咸陽得比大川之祀又曰太始二年趙中大夫白公鄭德曰白姓公爵時人多相謂爲公復􅁗穿渠因名白渠民得其饒歌之曰田于河所池陽谷口鄭國在前白公起後舉鍤爲雲決渠爲􅀨涇水一石其泥數斗且漑且糞如淳曰水停淤可以當糞長我禾􅁰衣食京師億萬之口益部􅂄舊傳漢武祀甘泉至涇橋有女子浴於涇水乳長七尺怪遣問之女曰帝後第七車知我時侍中張寛在第七車對曰天星主􅀕祀齋戒不㓗則女人見水經注曰涇水導源安定朝郍縣西笄頭山􅁗始皇廵地西出笄頭山即是山也蓋大隴之異名渭詩曰我送舅氏于渭之陽史記曰􅁗武王三年渭水赤三日昭王十四年又赤三日洪範五行傳曰赤者火色盖亦以火沴水也渭水􅁗大川也隂陽亂秦用嚴刑敗亂之象史記曰西伯獵遇太公渭之陽與語大恱漢書曰武帝元光}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_062-1b}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_062-2a}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 七涇渭㶚滻豐鎬澇潏伊洛瀍澗穀漢沔涇書禹貢曰涇屬渭汭屬連屬也北海曰汭言治水注入渭詩曰涇以渭濁湜湜其沚傳曰諸侯之大夫從晉侯伐秦以報櫟之役濟涇而次秦人毒涇上流師人多死國語曰恭王遊于涇上密康公從有三女奔之其母曰必致之于王夫獸三為羣人三為衆女三為粲粲美之物汝何徳以堪之康公弗許一年恭王滅密史記曰韓聞秦之好興事乃使水工鄭國間説秦令鑿涇水自中山西抵匏口為渠以溉田又秦二世夢白虎嚙左驂殺之卜涇為祟二世乃齋望夷宫而欲祀之漢書曰涇書不在大川之祀以近咸陽得比大川之祀又太始二年趙中大夫白公鄭徳曰白姓公爵時人多謂為相公復奏穿渠因名白渠民得其饒歌之曰田於何所櫟陽谷口鄭國在前白公起後舉鍤為雲決渠為雨涇水一石其泥數斗且溉且糞如淳曰水停於河以當糞長我禾黍衣食京師億萬之口益部耆舊傳曰漢武祀甘泉至涇橋有女子浴于涇水乳長七尺怪遣問之女曰帝後第七車知我時侍中張寛在第七車對曰天星主祭祀齋戒不潔則女人星見水經注曰涇水導源安朝那縣西开頭山秦始皇巡地西出开頭山即是山也葢大隴之異石渭詩曰我送舅氏曰至渭陽史記曰秦武王三年渭水赤三日昭王十四年又赤三日洪範五行傳曰赤者火色葢亦以火沴水也渭水秦大川也隂陽亂秦用嚴刑敗亂之象史記曰西伯獵遇太公渭之陽與語大悦漢書曰武帝元光}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_WYG_062-1b, image: WYG0893/WYG0893-0509d.png}
