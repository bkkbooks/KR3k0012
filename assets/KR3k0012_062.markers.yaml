  - {type: variant, offset: 1694, length: 207, content: 業邪二人曰諾即相約為父子因命二人於大澤中作舍且欲成父曰此不如河邊二人曰諾河邊舍幾成父曰又不如河中二人復填河二旬不立有一書生過之為縛兩土肫投河中會父往呼止之曰嘗見河可填耶觀汝行耳相將而去明日俱至河邊望見河中土高丈餘祥瑞禮記曰河出馬圖言龍馬負圖也河圖曰黃帝云余夢見兩龍授圖乃齊往河洛而求有魚折溜而止魚汎曰圖跪而受之運斗樞曰舜與諸侯觀河洛有黃龍負圖出置帝前䠠入水而前去䠠之遊反又音帶䠠去也拾遺記曰黃河千年一清聖王之大瑞也, SBCK: ''}
