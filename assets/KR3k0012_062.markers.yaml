  - {type: variant, offset: 2137, length: 206, content: 成帝時河決潰金隄凡灌四郡河隄使者王延世塞以竹落長四丈大九圍盛以小石兩船夾載而下之三十六日河隄成改元為河平又曰賈讓奏言治河有上中下三策若徙其當水衝之人以避之放河使北入海泛濫期月自定不勞人力此功一立河定人安千載無患謂之上策若多穿漕渠使人得以溉田雖非聖人法然亦救敗術也今據堅地作石隄東西水門但用木以土耳旱則開東方水門以溉田水則開西方高門以分河此誠富國安人興利除害謂之中策茍繕完故堤增卑陪厚勞費無已數逢此害謂冣下策也又曰, SBCK: ''}
