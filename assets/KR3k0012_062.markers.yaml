  - {type: variant, offset: 61, length: 3, content: 陬屈向, krp: 入渭漢書地理志曰霸水出藍田谷古曰滋水秦穆公更名霸水以彰霸功漢書曰漢王元年十月至霸上秦王子嬰降滻水經注曰滻水出京兆藍田谷北入于霸地理志曰滻水出南陵縣之藍田谷西北流與一水合水出西南莽谷}
