  - {type: variant, offset: 428, length: 346, content: 館陶貝丘廣川信都東光河間以東城池九河舊跡猶存漢伐河決金堤南北多罹其害議者常欲求九河故跡而穿之未知其所是以班固云自茲距漢以亡其八枝也河之故瀆自沙丘堰南分河出焉故尚書稱導河積石至于龍門今絳州龍門縣界南至于華陰北至于砥柱東至于孟津在洛北都道所湊古今以為津東過洛汭至于大伾洛汭今鞏縣在河洛合流之所也大伾山今汜水縣即故成皋也山爯成曰伾北過絳水至于大陸其絳水今冀州信都大陸澤名今邢州鉅鹿又北播為九河同為逆河入海是也同合出九河又合為一名為逆河逆迎也言海口有潮夕潮以迎河水書曰九河既道孔安國注曰河水分為九道詩曰關關睢鳩在河之洲又曰新臺有泚河水瀰瀰又曰河水洋洋北流活活又曰誰謂河廣一葦航之誰謂送遠予望之又曰不敢暴虎不敢憑河大戴禮曰聖人有國則河不滿溢禮斗威儀曰君乘土而王其政太平則河溓宋均注曰河不災溢也傳曰周詩有, SBCK: 命}
