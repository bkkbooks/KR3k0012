  - {type: variant, offset: 5, length: 12, content: 河釋名曰河下也隨地下處而, SBCK: 年春穿漕渠}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 年春穿漕渠通渭山海經曰渭水出鳥䑕同穴山東注}
  - {type: variant, offset: 5, length: 12, content: 河釋名曰河下也隨地下處而, krp: 年春穿漕渠}
