  - {type: variant, offset: 60, length: 0, content: '', krp: 經南安天水略陽扶風始平京兆至弘農華隂縣入河也三輔黄圖曰始皇兼天下都咸陽渭水貫都以象天漢水經注曰渭水中舊有忖留神象此神甞與魯班語班令其人出忖留曰我貌醜卿善圖物容我不能出班於是拱手與言曰出頭見我忖留乃出首班於是以脚畫地忖留覺之便還没水故置其象於水中唯背以上立水上三輔决録曰項中山飲馬渭水日與三錢以償之列子曰夸父逐日渴飲渭水不足乃渴死淮南子曰渭水多力冝黍霸水經注曰霸者水上地名也水東合滻水過白鹿原至秦虎圈}
  - {type: variant, offset: 61, length: 3, content: 陬屈向, SBCK: 入渭漢書地理志曰霸水出藍田谷古曰滋水秦穆公更名霸水以彰霸功漢書曰漢王元年十月至霸上􅁗王子嬰降滻水經注曰滻水出京兆藍田谷北入于霸地理志曰滻水出南陵縣之藍田谷西北流與一水合水出西南莽谷}
