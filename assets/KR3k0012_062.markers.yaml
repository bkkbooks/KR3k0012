  - {type: punctuation, offset: 6, content: 《, id: KR3k0012_CHANT_062-bkkpn1}
  - {type: variant, offset: 6, length: 1, content: 釋, WYG: 入華隂北鳥䑕同穴山今在隴西首陽縣渭水出其東經南安天水畧陽扶風始平京兆至𢎞農華隂縣入河也三輔黄圗曰始皇兼天下都咸陽渭水貫都以象天河水經注曰渭水中舊有忖留神像此神甞與魯班語班令其人出忖留曰我貌醜卿善圖物容我不能出班於是拱手與言曰出頭見我忖留乃出首班於是以脚畫地忖留覺之便還没水故置其像于水中唯背以上立水上三輔決録項仲山飲馬渭水日與三錢以償之列子曰夸父逐日渇飲渭水不足乃渇死淮南子曰渭水多力宜黍霸水經注曰霸者水上地}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_WYG_062-4a, image: WYG0893/WYG0893-0511a.png}
  - {type: punctuation, offset: 8, content: 》, id: KR3k0012_CHANT_062-bkkpn2}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 也水東合滻水過白鹿原至秦虎圏北入渭漢書地理志}
  - {type: page-break, offset: 8, content: '', id: KR3k0012_WYG_062-4b, image: WYG0893/WYG0893-0511b.png}
  - {type: punctuation, offset: 9, content: ：, id: KR3k0012_CHANT_062-bkkpn3}
  - {type: 'tls:seg', offset: 9, content: '', id: KR3k0012_CHANT_062-1a.4}
  - {type: punctuation, offset: 9, content: 「, id: KR3k0012_CHANT_062-bkkpn4}
  - {type: variant, offset: 9, length: 0, content: '', WYG: 霸水出藍田谷古曰滋水秦穆公更名霸水以彰霸功漢書曰漢王元年十月至霸上秦王子嬰降滻水經注曰滻水出京兆藍田谷北入于霸地理志曰滻水出南陵縣之藍田谷西北流與一水合水出西南莽谷東北流注滻水又北厯藍田川北流注于霸水又云北至霸陵入霸水也西京記曰西京東市平凖署東隅有放生池分滻水渠自道政坊東城西流注之俗號海池又曰滻水西岸阪舊名滻阪隋文帝惡阪之名改名長樂阪豐漢書地理志曰漆沮既從豐水攸同顔師古注曰豐水出鄠之南山言沮水既從入渭豐水亦同來也水經注曰渭水與豐水㑹短隂山無他高山異巒唯東原阜石墩而已水上舊有便門橋毛詩文王有聲曰豐水有芑武王豈不仕貽厥孫謀以燕翼子文子曰老子云豐水之深十仞而不受塵垢金鐵在中形見于外鎬水經注曰鎬水上承鎬池於昆明池北周武王之所都也故詩云考卜維王宅是鎬京維龜正之武王成之鎬水又北流與滮池合又北經清泠臺西逕慈石門注于渭鄭𤣥曰豐鎬之間水北流也澇説文曰澇水出扶風鄠北入渭山海經曰牛首之山澇水出焉下注于潏水多飛魚潏字林曰潏水出杜陵縣水經注曰潏水上承皇子陂水逕漸臺東入渭亦名沈水又名高都水漢王氏五侯大治池宅引高都水入長安城故百姓歌之曰五侯初起曲陽最怒決壊高都逕連五杜土山漸臺象西白虎是也伊水經曰伊水出南陽魯陽縣西蔓渠山左僖二十二年初平王東遷也卒有適伊川杜預注曰辛有周大夫也見被髪而祭于野者曰不及百年此其戎乎山海經曰獨蘇之山伊水出焉東流注于洛今伊水出上洛盧氏縣熊耳山東北至}
