  - {type: variant, offset: 2686, length: 1, content: 均, krp: 國語曰靈王二十二年榖洛鬪將毀宫室王欲壅之太子晉曰夫山土之聚也藪物之歸也川氣之導也澤水之鍾也夫水聚於髙歸於下今吾執政無乃實有所僻而滑夫二川之神王卒壅之王室大亂又曰伊洛竭而夏亡河竭而啇亡漢書曰武帝穿渠引洛水岸遂崩乃鑿井深四十餘丈徃徃爲井井下相通行水謝承後漢書曰沛國陳宣建武十年雒水出造津城門或欲築塞之宣諌曰昔王尊正身金堤水退况聖主耶言未絶而水去水經注曰昔黄帝之時天大霧三日帝遊洛水之上見大魚殺五牲以醮之天乃甚雨七日七夜魚流始得圗書魏略曰漢火行忌水故洛去水而加焉山海經云秦買之山洛水出焉東注於河}
