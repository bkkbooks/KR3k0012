  - {type: variant, offset: 2208, length: 464, content: 衝之人以避之放河使北入海泛濫期月自定不勞人力此功一立河定人安千載無患謂之上策若多穿漕渠使人得以溉田雖非聖人法然亦救敗術也今據堅地作石隄東西水門但用木以土耳旱則開東方水門以溉田水則開西方高門以分河此誠富國安人興利除害謂之中策茍繕完故堤增卑陪厚勞費無已數逢此害謂冣下策也又曰武帝元光中河水從頓丘發卒十萬救決河起龍淵宮武廟也自作之故言宮呂氏春秋曰故龍門未開呂梁未發河水孟門大溢逆流名曰洪水禹乃決江疏河為彭蠡之鄣所治者千八百國此禹之功文子曰江河之大溢不過三日水經注曰漢平帝之世河汴決壞未及得修汴渠東侵日月彌廣門閭故處皆水中也漢明帝永平十二年議治汴渠上乃引樂浪人王景問水形便景陳利害應對敏捷帝甚善之乃賜山海經渠書禹貢圖及以錢帛發卒數十萬詔景與將作謁者王吳治渠防築隄修堨起自滎陽東至千乘海口千有餘里景乃商度地勢鑿山開澗防遏衡要踈決壅積十里一門水更相廻注無復潰漏之患明年渠成帝親隨巡行詔濱河郡國置河堤員吏如西京舊制由是顯名王吳及諸從事者皆增秩一等順帝陽嘉中又自汴河口以東緣河積石為堰通淮曰金堤靈帝建寧中又增修石門以遏渠口水盛則通注津耗則輟流淮, krp: 泱泱}
