  - {type: variant, offset: 2507, length: 0, content: '', SBCK: 云􅁗買之山洛水出焉東注於河其中有藻玉述征記曰洛水底有礜石故上無水􅈆水經曰􅈆水出河南榖城縣北出東與千金}
  - {type: variant, offset: 2508, length: 0, content: '', SBCK: 合又東過偃師入于洛澗水經曰澗水出新安縣南白石山東南入于洛又曰三輔决録注云馬氏兄弟五人共居澗榖二水之交作五門客舎因舎以爲名今在河南西四十里以山海經推校里數不殊仲治所記水㑹尚有故居處斯則澗水也即周書所謂我乃卜澗水東言是水也榖水經曰榖水出弘農澠池縣南嶓􅃁林榖陽谷也山海經曰愽山之西有林焉曰嶓􅃁榖水出焉東流注于洛其中多㻒玉今榖水出于崤東馬頭山榖陽谷東北流歷澠池川韋昭國語注曰洛水在城南榖水在王城北東入于􅈆靈王時榖水盛出於王城西而南流合於洛兩水相格有似于􅃲而毀王城西南也漢􅃆尚}
