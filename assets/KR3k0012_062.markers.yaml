  - {type: punctuation, offset: 10, content: ，, id: KR3k0012_CHANT_062-bkkpn5}
  - {type: 'tls:seg', offset: 10, content: '', id: KR3k0012_CHANT_062-1a.5}
  - {type: variant, offset: 10, length: 0, content: '', WYG: 南洛陽縣入洛戴延之西征記曰伊水上源經新城陸渾二縣男女無少長皆病癭俗云水土所致伊水不可飲也吕氏春秋曰有莘氏女子採桑得嬰兒桑中其母居伊水上故命之曰伊尹伊尹母化為空桑洛水經注曰洛水出京兆上洛縣䕶舉山地理志曰洛水出冡嶺山易繫辭曰洛出書聖人則之易乾鑿度曰王者盛徳之應洛水先温九日乃寒五日變為五色又帝王將起河洛龍見察其首黒者人正白者地正赤者天正禹貢曰導洛自熊耳在宜陽之西東北會于澗瀍會于河南城南又東會于伊㑹于洛陽之南又東北入于河合于鞏之東也尚書中候曰武王祀璧于河禮畢退至日旰榮光幕河青雲浮洛毛詩曰瞻彼洛矣維水泱泱春秋説題辭曰洛出熊耳山雒之為言繹其燿也宋均注曰水光輝也國語曰靈王二十二年穀洛鬬將毁王宫王欲壅之太子晉曰夫山土之聚也藪物之歸也川氣之導也澤水之鍾也夫水聚于髙歸于}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_WYG_062-7b, image: WYG0893/WYG0893-0512d.png}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_WYG_062-8a, image: WYG0893/WYG0893-0513a.png}
  - {type: variant, offset: 11, length: 0, content: '', WYG: 今吾執政無乃實有所僻而滑夫三川之神王卒壅之王室大亂又曰伊洛竭而夏亡三河竭而商亡漢書曰武帝穿渠引洛水岸遂崩乃鑿井深四十餘丈往往為井相通行水謝承後漢書曰沛國陳宣建武十年雒水出造津城門或欲築塞之宣諫曰昔王尊正身金堤水退况聖主耶言未絶而水去水經注曰昔黄帝之時天大霧三日帝遊洛水之間見大魚殺五牲以醮之天乃甚雨七日七夜魚流始得圖書魏畧曰漢火行忌水故洛去水而加佳焉山海經云秦中之山洛水出焉東注于河其中有藻玉述征記曰洛水㡳有礜石故上無氷瀍水經曰瀍水出河南穀城縣北東與千金渠合又東過偃師入于洛澗水經曰澗水出新安縣南白石山東南入于洛三輔決録注云馬氏兄弟五人共居澗穀二水之交作五門客舍因舍以為名今在河南西四十里以山海經推校里數不殊仲治所記水會尚有故居之處所則澗水}
