  - {type: variant, offset: 1980, length: 1, content: 三, SBCK: 瞻彼洛矣維水泱泱春秋􅀃題辭曰洛出熊耳山雒之爲言繹也繹其燿也宋均注曰水光燿也國語曰靈}
  - {type: page-break, offset: 1980, content: '', id: KR3k0012_SBCK_062-5a}
  - {type: variant, offset: 1980, length: 148, content: 三王之祭川也皆先河後海此所謂務本言海之本源自河也史記曰元光中河決於匏子於是天子臨決河沉白馬玉璧於河令群臣從官自將軍以下皆負薪填決河而取淇園之竹以為堰天子既臨河決悼功之不成乃作瓠子之歌決塞穀梁傳曰梁山崩壅河三日不流晉君召伯尊伯尊遇輦者問焉輦者曰君親素縞帥群臣哭之既而祠焉伯尊至君問之伯尊如其言而河流, krp: 瞻彼洛}
