  - {type: variant, offset: 3012, length: 149, content: 我尚可活也周曰須我為汝向南詣楚王決江淮以溉汝鮒魚曰今命在盆甕之中耳乃為我見楚王決江淮以溉我汝即索我於枯魚之肆矣晉陽秋曰秦始皇東遊望氣者云五百年後金陵有天子氣於是始皇改曰秣陵塹北山以絕其勢今建康即秣陵西北界所塹即建康南淮也今謂之秦淮淮南子曰夫醉者超江津以為尋常之溝也濟釋名云濟濟也言源出河北濟河而南也, SBCK: 漢}
