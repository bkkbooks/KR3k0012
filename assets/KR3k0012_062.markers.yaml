  - {type: variant, offset: 2513, length: 0, content: '', SBCK: 也文王之化􅀍于南國美化行乎江漢之域又曰滔滔江漢南國之紀又曰南有喬木不可休息漢有游女不可求思左傳曰蔡昭侯爲兩珮與兩裘}
  - {type: page-break, offset: 2513, content: '', id: KR3k0012_SBCK_062-6b}
  - {type: variant, offset: 2514, length: 5, content: 錢帛發卒數, SBCK: 如楚獻一珮一裘於昭王子常欲之不與三年止之蔡侯歸及漢執玉而沉曰余所濟漢而南者有􅀂大川又曰楚國方域以爲城漢水以爲池又曰吴師伐郢楚子常濟漢而陣自小別至于大別蜀志少府王謀等上言前襄陽男子張嘉王休獻玉璽璽潜漢水於深淵暉景燭曜璽光􅜂天孫巖宋書曰漢中城固縣漢水岸際有異聲如雷俄頃岸崩有銅鐘}
