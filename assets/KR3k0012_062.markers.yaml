  - {type: variant, offset: 65, length: 0, content: '', SBCK: 北流注滻水水又北歴藍田川北流注于霸水又云滻水北至霸陵入霸水也兩京記曰西京東市平凖署東隅有放生池分滻水渠自道政坊東城西流注之俗號海地又曰滻水西岸有阪舊名滻阪隋文帝惡阪之名改名長樂坡豐漢書地理志曰􅃮沮旣從豐水逌同顔師古注曰豐水出鄠之}
  - {type: variant, offset: 65, length: 0, content: '', krp: 北流注滻水水又北歴藍田川北流注于霸水又云滻水北至霸陵入霸水也兩京記曰西京東市平凖署東隅有放生池分滻水渠自道政坊東城西流注之俗號海地又曰滻水西岸有阪舊名滻阪隋文帝惡阪之名改名長樂坡豐漢書地理志曰􅃮沮旣從豐水逌同顔師古注曰豐水出鄠之}
  - {type: variant, offset: 66, length: 0, content: '', SBCK: 山言沮水旣從入渭豐水亦同來也水經注曰渭水東與豐水㑹短隂山無他髙山異蠻唯原阜石墽而巳水上舊有便門橋毛詩文王有聲曰豐水有􅉮武王豈不仕貽厥孫謀以燕翼子文子曰老子云豐水之深十仞而不受塵垢金䥫在中形見於外鎬水經注曰鎬水上承鎬池於昆明池北周武王之所都也故詩云考卜維王宅是鎬京維􅀛正之武王承之鎬水又北}
  - {type: page-break, offset: 66, content: '', id: KR3k0012_SBCK_062-3b}
  - {type: variant, offset: 66, length: 0, content: '', krp: 山言沮水旣從入渭豐水亦同來也水經注曰渭水東與豐水㑹短隂山無他髙山異蠻唯原阜石墽而巳水上舊有便門橋毛詩文王有聲曰豐水有芭武王豈不仕貽厥孫謀以燕翼子文子曰老子云豐水之深十仞而不受塵垢金䥫在中形見於外鎬水經注曰鎬水上承鎬池於昆明池北周武王之所都也故詩云考卜維王宅是鎬京維龜正之武王承之鎬水又北}
  - {type: variant, offset: 67, length: 1, content: 為, SBCK: 與滮池合又北經清冷臺西逕慈石門注于渭鄭􅀇曰豐鎬之間水北流也澇􅀃文曰澇水出扶風鄠北入渭山海經曰牛首之山澇水出焉西注於潏水多飛魚潏字林曰潏水出杜陵縣水經注曰漓水上承皇子陂水逕漸臺東入渭亦名沈水又名髙都水漢王氏五侯大治池宅引髙都水入長安城故百姓歌之曰五侯􅀄起曲陽最怒決壞髙都竟連五杜土山漸臺象西白虎是也伊水經曰伊水出南陽縣西荀渠山左傳僖}
