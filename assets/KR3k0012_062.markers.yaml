  - {type: variant, offset: 2723, length: 0, content: '', krp: 入于洛又曰三輔决録注云馬氏兄弟五人共居澗榖二水之交作五門客舎因舎以爲名今在河南西四十里以山海經推校里數不殊仲治所記水㑹尚有故居處斯則澗水也即周書所謂我乃卜澗水東言是水也榖水經曰榖水出弘農澠池縣南嶓冡林榖陽谷也山海經曰愽山之西有林焉曰嶓冡榖水出焉東流注于洛其中多㻒玉今榖水出于崤東馬頭山榖陽谷東北流歷澠池川韋昭國語注曰洛水在城南榖水在王城北東入于瀍靈王時榖水盛出於王城西而南流合於洛兩水相格有似于鬪而毀王城西南也漢沔尚書禹貢曰江漢朝宗于海也詩曰漢廣德廣所及也文王之化𬒳于南國美化行乎江漢之域又曰滔滔江漢南國之紀又曰南有喬木不可休息漢有游女不可求思左傳曰蔡昭侯爲兩珮與兩裘以如楚獻一珮一裘於昭王子常欲之不與三年止之蔡侯歸及漢執玉而沉曰余所濟漢而南者有若大川又曰楚國方域以爲城漢水以爲池又曰吴師伐郢楚子常濟漢而陣自小別至于大別蜀志少府王謀等上言前襄陽男子張嘉王休獻玉璽璽潜漢水於深淵暉景燭曜璽光徹天孫巖宋書曰漢中城固縣漢水岸際有異聲如雷俄頃岸崩有銅鐘十二出自潜壤體制旣精扣之清響韓詩曰鄭交甫過漢臯遇二女妖服珮兩珠交甫與之言曰願請子之珮二女解珮與交甫而懷之去十歩探之則亡矣廻顧二女亦即亡矣}
