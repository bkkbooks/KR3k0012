  - {type: variant, offset: 1873, length: 736, content: 曰亡之矣歧路之中又有歧焉吾不知所之而反揚子曰大道以多歧亡羊學者以多方喪生韓子曰魯以五月起眾為長溝子路私為漿飲要作溝者於五甫之衢孔子譏其不知禮也楚辭曰心不怡之長久憂以之相接惟郢路之遼遠兮江與夏之不可涉古樂府詩曰相逢狹路間道隘不容車古詩曰驅車駕言邁悠悠涉長道馳道史記賈山曰秦為馳道東窮燕齊南極吳楚江湖之上瀕海之觀畢達道廣五十步三丈而樹厚築其外隱以金椎以鐵維築之隱於靳反樹以青松十里一亭亭有長十亭一鄉鄉有三老有秩嗇夫游徼三老掌教化嗇夫職聽頌收賦稅游徼徼循盜賊秦制也漢書曰江充出逢館陶長公主行馳道中充聞之公主曰有太后詔充曰獨公主得行車騎皆不得盡劾沒入官充從上甘泉逢太子家使乘車馬行馳道中充以屬吏太子聞之使人謝充曰非愛車馬誠不欲令上聞之以教勑亡素者唯江君寬之充不聽遂白奏上曰人臣當如是矣大見信用威震京師又曰惠帝為東朝長樂宮作複道方築高帝廟南叔孫通曰陛下何築複道高帝寢衣冠月出遊高廟奈何令子孫宗廟道上行哉惠帝懼曰急壞之通曰人主無過舉今巳作百姓皆知矣願陛下為原廟渭北衣冠月游之益廣宗廟大孝本也帝從之又曰元帝即位成帝為太子上嘗召太子出龍樓門不敢絕馳道至直城門得絕乃度上遟之問其故以狀對上乃令太子被召得絕馳道又曰上居雒陽南宮從複道望見諸將往往數人偶語上曰此何語良曰陛下不知乎此謀反耳上曰天下屬安定何故而反良曰陛下與此屬取天下今陛下己為天子而所封皆蕭曹故人所誅者皆平生仇怨今軍吏計功天下不足以徧封又恐見疑過失及誅故相聚謀反耳上迺憂曰為將奈何良曰上平生所憎群臣所共知誰最甚者上曰雍齒與我有故數窘辱我良曰今急先封雍齒以示群臣則人人自堅矣於是置酒封雍齒為什方侯而急趣丞相御史定功行封群臣皆喜曰雍齒且侯我屬無患矣塗易震卦曰震大塗王廙注曰大塗萬物所出論語陽貨曰道聽而塗說德之棄也爾雅曰堂塗謂之陳路依塗呂, SBCK: 吕}
