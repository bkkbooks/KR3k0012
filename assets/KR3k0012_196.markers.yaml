  - {type: variant, offset: 2944, length: 369, content: 四街街一亭華氏洛陽記曰兩銅駞在官之南街東西相對高九尺漢時所謂銅駞街洛陽又有香街三輔故事曰太上皇在長安香街南高廟在長安城門街東太常街南漢宮殿䟽曰長安有八街九市風俗通曰京師有長壽街萬歲街土馬街若此非一街者攜也離也四出之路攜離而別巷毛詩緇衣曰子之豐兮俟我乎巷兮巷門外也又曰叔于田巷無居人叔于狩巷無飲酒叔適野巷無服馬又曰姜嫄始生后稷誕寘之阨巷牛羊腓字之論語孔子曰賢哉回也一簞食一瓢飲在陋巷人不堪其憂回也不改其樂爾雅曰宮中謂之壺漢書曰陳平家貧負郭窮巷以獘席為門門外多長者車轍晉書曰紀瞻性靜默少交遊好讀書或手自抄寫凡所著述詩賦牋表數十篇兼解音樂殆其妙厚自奉養立宅於烏衣巷館宇崇麗園池竹木有足賞玩焉丹陽記曰七戰巷者庾亮與蘇峻戰宣陽門外峻初小退尋復來攻交戰者七亮乃南奔故有此名商君書曰窮巷多怪曲學多辯也尸子曰舜之方陶不能利其巷也及南面而君天下蠻夷皆被其福, SBCK: 六}
