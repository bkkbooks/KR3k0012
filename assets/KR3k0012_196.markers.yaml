  - {type: variant, offset: 42, length: 0, content: '', SBCK: 古曰宣曲宫名在昆明池西投􅀫諸宫長楊五柞倍楊宣曲尤幸於是上以爲道逺勞苦又爲百姓所患乃使太中大夫吾丘夀王待詔能用筭者二人舉籍阿城以南阿城本秦阿房宫也􅉦厔以東冝春以西隄封頃畒及其賈直欲除以爲上林􅁐屬之南山又詔中尉左右内史表屬縣草困欲以償時東方朔在傍進諌曰臣聞謙遜靜慤天表之應應之以福驕溢靡麗天表之應應之以異今陛下累郎臺恐其不髙也師古曰郎者堂下周屋也弋獵之處恐不廣也如天不爲變則三輔之地盡可以爲􅁐何必􅉦厔鄠杜乎奢侈越制天爲之變上林雖小臣}
  - {type: page-break, offset: 42, content: '', id: KR3k0012_SBCK_196-2b}
  - {type: variant, offset: 42, length: 0, content: '', WYG: 古曰宣曲宫名在昆明池西投宿諸宫長楊五柞信楊宣曲尤幸於是上以為道逺勞苦又為百姓所患乃使太中大夫吾丘夀王待詔能月算者二人舉籍阿城以南阿城本秦阿房宫也盩厔以東宜春以西隄封頃畝及其價直欲除以為上林苑屬之南山又詔中尉左右内史表屬縣草田欲以償鄠杜之民時東方朔在傍進諫曰臣聞謙遜静慤天表之應應之以福驕溢靡麗天表之應應之以異今陛下累廊臺恐其不髙也師古曰廊者堂下周屋也弋獵之處恐不廣也如今不為變則三輔之地盡可以為苑何以償盩厔鄠杜乎奢侈起制天為之變上林雖小臣}
