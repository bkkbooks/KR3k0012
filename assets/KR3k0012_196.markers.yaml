  - {type: variant, offset: 1491, length: 3, content: 宮門及, WYG: 覆舟山周廻二十里有林名白水苑又曰建康縣北呉朝為桂林苑南朝宫苑記曰樂㳺苑在覆舟山南北連山築臺觀苑内起正陽林光等殿又曰桂林苑在落星山之陽吳都賦云數軍實于桂林之苑即此也又曰芳林苑一名桃花園本齊髙帝舊宅在廢東府城邉秦淮大路北齊王融作曲水詩序載懐平浦乃睠芳林即此也又曰南苑在臺城南鳯臺山宋孝武以南苑地給張永云曰給三百年期訖更啟即此也渚宫故事云湘東王於子}
