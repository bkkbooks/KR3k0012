  - {type: variant, offset: 1503, length: 150, content: 央御道兩邊築土牆高四尺餘外分之唯公卿尚書章服道從中道凡人皆行左右左入右出夾道種榆槐樹此三道四通五達也淮南子曰楊朱見歧路而哭曰可以南可以北又曰聖人之道如衢設罇過者斯酌之博物志曰文王以太公為灌壇令其年風不鳴條文王夢一婦人甚麗當道哭問其故曰我東山女嫁為西海婦行必以暴風雨今灌壇令當道有德吾不敢以風雨過也十洲, WYG: ''}
