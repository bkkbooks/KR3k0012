  - {type: variant, offset: 3205, length: 108, content: 篇兼解音樂殆其妙厚自奉養立宅於烏衣巷館宇崇麗園池竹木有足賞玩焉丹陽記曰七戰巷者庾亮與蘇峻戰宣陽門外峻初小退尋復來攻交戰者七亮乃南奔故有此名商君書曰窮巷多怪曲學多辯也尸子曰舜之方陶不能利其巷也及南面而君天下蠻夷皆被其福, WYG: 六}
