  - {type: variant, offset: 1495, length: 60, content: 中大道皆分作三中央御道兩邊築土牆高四尺餘外分之唯公卿尚書章服道從中道凡人皆行左右左入右出夾道種榆槐樹此三道四通五達也淮南, SBCK: 西有桑梓􅁐孟}
  - {type: page-break, offset: 1495, content: '', id: KR3k0012_SBCK_196-6a}
  - {type: variant, offset: 1495, length: 60, content: 中大道皆分作三中央御道兩邊築土牆高四尺餘外分之唯公卿尚書章服道從中道凡人皆行左右左入右出夾道種榆槐樹此三道四通五達也淮南, krp: 西有桑梓苑孟}
  - {type: variant, offset: 1496, length: 2, content: 大道, WYG: 造湘東苑穿地構山長數百丈植蓮蒲縁岸雜以竒木其上有通波閣跨水為之南有芙蓉堂東有禊飲堂堂後有隐士亭北有正武堂堂前有射堋馬埒其西有鄉射堂堂安行堋可得移動東南有連理樹太清初生此連理當時以為湘東踐祚之瑞北有映月亭修竹堂臨水齋前有高山山有洞石潜行宛委二百餘歩山上有陽雲樓極髙峻逺近}
  - {type: variant, offset: 1499, length: 2, content: 分作, WYG: 見北有臨風亭明月樓顔之推云屢陪明月宴並將軍扈義熙所造}
