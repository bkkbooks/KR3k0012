  - {type: variant, offset: 74, length: 0, content: '', WYG: 其山出玉石金銀銅鐵豫章檀柘異類之物不可勝原此百工所取給萬民所仰足也又有秔稻梨栗桑麻竹箭之饒土宜薑芋水多䵷魚貧者得以人給家足無飢寒之憂故酆鎬之間號為土膏其賈畝一金今規以為苑絶陂池水澤之利而取民膏腴之地上乏國家之用下奪農桑之業棄成功就敗事損耗五榖是其不可一也且盛荆棘之林而長養麋鹿廣狐兎之苑大虎狼之虛又壊人冡墓發人室廬令㓜弱懐土而思耆老泣涕而悲是其不可二也斥而營之垣而囿之騎馳東西車騖南北又有深溝大渠夫一日之樂不足以危無隄之輿是其不可三也故務苑囿之大恤農時非所以彊國富人也夫殷作九市之宫而諸侯畔靈王起章華之臺而楚民散秦興阿房之殿而天下亂糞土愚臣忘生觸死逆盛意犯隆指罪當萬死不勝大願願陳泰階六符以觀天變不可不省是日因奏泰階之事上廼拜朔為}
