  - {type: variant, offset: 2613, length: 1, content: 孔, SBCK: 昔先王之爲􅁐囿園池足觀望勞形而巳矣非好儉節乎性也陶季直京都記曰覆舟山周廻二十里有林名白水􅁐又曰建康縣北呉朝爲桂林􅁐南朝宫􅁐記曰樂游􅁐在覆舟山南北連山築臺觀􅁐内起正陽林光等殿又曰桂林􅁐在落星山之陽呉都賦云數軍實于桂林之􅁐即此也又曰芳林􅁐一名桃花園夲齊髙帝舊宅在廢東府城東邊􅁗淮大路北齊王融作曲水詩序載懷平浦乃睠芳林即此也又曰南􅁐在臺城南鳯臺山宋孝武以南􅁐地給張永云且給三百年期訖更啓即此也渚宫故事云湘東王於}
  - {type: page-break, offset: 2613, content: '', id: KR3k0012_SBCK_196-6b}
  - {type: variant, offset: 2613, length: 1, content: 孔, krp: 昔先王之爲苑囿園池足觀望勞形而巳矣非好儉節乎性也陶季直京都記曰覆舟山周廻二十里有林名白水苑又曰建康縣北呉朝爲桂林苑南朝宫苑記曰樂游苑在覆舟山南北連山築臺觀苑内起正陽林光等殿又曰桂林苑在落星山之陽呉都賦云數軍實于桂林之苑即此也又曰芳林苑一名桃花園夲齊髙帝舊宅在廢東府城東邊秦淮大路北齊王融作曲水詩序載懷平浦乃睠芳林即此也又曰南苑在臺城南鳯臺山宋孝武以南苑地給張永云且給三百年期訖更啓即此也渚宫故事云湘東王於}
  - {type: variant, offset: 2615, length: 2, content: 用魯, SBCK: 城中造湘東􅁐穿地構山長數百丈植蓮蒲縁岸􅄂以竒木其上有通波閣跨水爲之南有芙蓉堂東有禊飲堂堂後有隱士亭北有正武堂堂前有射堋馬埓其西有郷射堂堂安行堋可得移動東南有連理太清􅀄生此連理當時以爲湘東踐祚之瑞北有映月亭脩竹堂臨水齋前有髙山山有石洞潛行宛委二百餘歩山上有陽雲樓極髙峻逺近皆見北有臨風亭明月樓顔之推云屢陪明月宴並將軍扈義熈所造}
  - {type: variant, offset: 2615, length: 2, content: 用魯, krp: 城中造湘東苑穿地構山長數百丈植蓮蒲縁岸雜以竒木其上有通波閣跨水爲之南有芙蓉堂東有禊飲堂堂後有隱士亭北有正武堂堂前有射堋馬埓其西有郷射堂堂安行堋可得移動東南有連理太清𥘉生此連理當時以爲湘東踐祚之瑞北有映月亭脩竹堂臨水齋前有髙山山有石洞潛行宛委二百餘歩山上有陽雲樓極髙峻逺近皆見北有臨風亭明月樓顔之推云屢陪明月宴並將軍扈義熈所造}
