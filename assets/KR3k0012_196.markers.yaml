  - {type: variant, offset: 2618, length: 2, content: 年男, krp: 輔黄圖曰宫二觀十四在甘泉苑垣内甘泉苑起仙人觀石虎鄴中記曰鄴城西三里桑梓苑有宫臨漳水凡此諸宫皆夫人侍婢又並有苑囿養獐鹿雉兎虎數遊宴其中西京雜記曰廬陵王胥有勇力恒於別囿學格熊羆後遂能空手搏之又曰樂遊苑自生玟瑰樹樹下多苜蓿又曰文帝爲太子立思賢苑以招賔又曰梁孝王好宫室苑囿之樂作矅華之宫築兎園園中有白室山山上有膚寸石落猿巖棲龍岫又有鴈池池間有鶴洲鳬渚宫館相連延亘數里竒果異樹瑰禽怪獸靡不畢備王與宫人賔客弋釣其中韓子曰秦大飢應侯請發五苑果棗栗以活民王曰秦法賞有功誅有罪令發五苑是有功無功俱賞也禮稽命徴日外内之制各得其所四方之事無有畜滯則麒麟遊囿六畜繁多天苑有德星應白虎通曰苑囿所以在東方何苑囿養萬物者也東方所以生也戰國䇿曰張儀說韓王曰大王不助秦鴻臺之宫樂林之苑非韓之有也拾遺記曰黄帝爲養龍之囿洞冥記曰北及玄坂去空同十七萬里日月不至其地自明有紫河萬里流沬千丈中有寒荷霜下方香茂也北有潰陽之山有兎如䑕能飛毛色光如􅃮以腦和丹食則不死帝使放兎於昭祥苑苑在甘泉宫西周千里萬國獻異物皆集此中三輔黄圖曰甘泉苑起仙人觀縁山谷}
