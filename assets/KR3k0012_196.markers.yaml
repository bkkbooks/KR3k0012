  - {type: variant, offset: 41, length: 0, content: '', SBCK: 漢二年東略地諸故􅁗􅁐囿園池皆令民田之又滑稽傳曰􅁗始皇欲大􅁐囿東至函谷􅀜西至陳倉優旃曰善多縱禽獸於其中宼從東方來令獸觸之足矣始皇以故輟止又蕭相國請曰上林中多空地願令民得田􅁐中上大怒曰相國多受民財乃爲民請吾􅁐乃下廷尉械繫數日王衛尉侍曰便於民而請眞宰相事陛下距楚數歳陳豨黥布反上自擊之當是時相國守􅀜中揺足則􅀜巳西非陛下有也相國不此時爲利今乃利賈人之金乎陛下何疑於是使持節赦出何徒跣謝上曰休矣相國爲民請吾􅁐吾不許我不過爲桀紂主而相國爲賢耳漢書曰武帝好微行後南山下乃知帝微行數出也然尚迫於太后未敢逺出丞相御史知旨乃使右輔都尉徼循長楊以東右内史發小民供待㑹後乃私置更衣從宣曲以一十二所中休更衣}
  - {type: page-break, offset: 41, content: '', id: KR3k0012_SBCK_196-2a}
  - {type: variant, offset: 41, length: 0, content: '', WYG: 漢二年東畧地故秦苑囿園池皆令民田之滑稽傳曰秦始皇欲大苑囿東至函谷闗西至陳倉優旃曰善多縱禽獸於其中寇從東方來令獸觸之足矣始皇以故輟止又蕭相國請曰上林中多空地願令民得田苑中上大怒曰相國多受民財乃為民請吾苑乃下廷尉械繋數日王衛尉侍曰便於民而請真宰相事陛下距楚數嵗陳豨黥布反上自擊之當是時相國守闗中揺足則闗已西非陛下有也相國不此時為利今乃利賈人之金乎陛下何疑於是使持節赦出何徒跣謝上曰休矣相國為民請吾苑吾不許我不過為桀紂主而相國為賢相耳漢書曰武帝好㣲行往南山下乃知帝㣲行數出也然尚廹於太后未敢逺出丞相御史知㫖乃使右輔都尉徼循長楊以東右内使發小民供待㑹所後乃私置更衣從宣曲以南十二所中休更衣}
  - {type: page-break, offset: 41, content: '', id: KR3k0012_WYG_196-2b, image: WYG0894/WYG0894-0723b.png}
  - {type: page-break, offset: 41, content: '', id: KR3k0012_WYG_196-3a, image: WYG0894/WYG0894-0723c.png}
