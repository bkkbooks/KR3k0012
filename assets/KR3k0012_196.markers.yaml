  - {type: variant, offset: 2642, length: 169, content: 上林賦曰長塗中宿阡陌史記曰商鞅相秦孝公壞井田開阡陌漢書游俠傳曰原涉迺大治冢舍周閣重門初武帝時京兆尹曹氏葬茂陵民謂其道為京兆阡涉慕之迺賈地開道立署曰南陽阡人不肯從謂之原氏阡趙書曰佛圖澄建武末卒葬鄴西紫陌先造生墓已數年矣三輔故事曰文王武王周公召公皆葬畢陌南北風俗通曰南北曰阡東西曰陌曹植詩曰東西經七陌南北越九阡陸機詩曰廻渠繞曲陌通波扶直阡街說, SBCK: 封禪}
