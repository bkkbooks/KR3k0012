  - {type: variant, offset: 1373, length: 9, content: 逢萌被徵上道迷不知, SBCK: 桓帝延熹元年􅀄置鴻德􅁐張璠漢記曰梁兾多規􅁐囿西至􅀪農}
  - {type: variant, offset: 1373, length: 7, content: 逢萌被徵上道迷, WYG: 桓帝延熹元年初置鴻徳苑張璠漢記曰梁冀多饒苑囿西至𢎞農東至滎陽南入魯陽北到河淇崔鴻十六國春秋後趙録曰趙王八年春正月立桑梓苑於襄國後燕録曰慕容熙築龍勝苑廣袤十餘里役二萬人又起景靈山苑内基廣五百歩峰髙十七丈又起逍遥宫甘露殿連房數百觀門相交鑿天河渠引入宫晉宫閣名曰洛陽有洪徳苑靈昆苑平樂苑河南十二境簿曰河南縣有鹿子苑洛陽城西有桑梓苑孟子曰齊宣王問孟子曰文王之囿方七十里有諸何其大也孟子曰民猶以為小也王曰寡人之囿方四十里民以為大何也曰文王之囿芻蕘雉兎者往焉與民同之民以為小宜矣王之囿殺麋鹿者如殺人是以四十里為穽也民以為大}
