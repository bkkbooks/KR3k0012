  - {type: variant, offset: 2396, length: 177, content: 陛下不知乎此謀反耳上曰天下屬安定何故而反良曰陛下與此屬取天下今陛下己為天子而所封皆蕭曹故人所誅者皆平生仇怨今軍吏計功天下不足以徧封又恐見疑過失及誅故相聚謀反耳上迺憂曰為將奈何良曰上平生所憎群臣所共知誰最甚者上曰雍齒與我有故數窘辱我良曰今急先封雍齒以示群臣則人人自堅矣於是置酒封雍齒為什方侯而急趣丞相御史定功行封群臣皆喜曰雍齒且侯我屬無患矣塗易震卦曰震大塗, WYG: 張儀說韓}
