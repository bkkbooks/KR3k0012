  - {type: variant, offset: 2665, length: 406, content: 巳未詔書辟士四科一曰德行高妙志節清白二曰經明行脩能任博士三曰明曉法律足以決疑能案章覆問文任御史四曰剛毅多略遭事不惑明足照姦勇足決斷才任三輔皆存孝悌清公之行自今已後審四科辟召及剌史二千石察舉茂才尤異者孝廉廉吏務實校試以職有非其人不習官事正舉者故舉不實為法罪之後漢書和帝永元五年詔曰選舉賢良為政之本科別行能必由鄉曲而郡國舉吏不加簡擇故先帝明勑在所令試之以職乃得充選又德行尤異不須經職者別署狀上而宣佈以來出入九年二千石曾不承奉恣心從好司隸剌史訖無糾察今新蒙赦令且復申勑後有犯者顯明其罰在位不以選舉為憂督察不以發覺為負非獨州郡也是以庶官多非其人下人被姦邪之傷由法不行故也又永元六年詔曰朕以眇末承奉鴻烈陰陽不和水旱違度濟河之域凶饉流亡而未獲忠言至謀所以匡救之策寤寢永歎用思孔疚惟官人不得於上黎民不安於下有司不念寬和而競為苛刻覆案不急以妨人事甚非所以上當天心以濟元元也思得忠良之士以輔朕之不逮其令三公中二千石二千石內郡守相舉, SBCK: ''}
