  - {type: variant, offset: 2211, length: 157, content: 高下用知其人賢否又詔列侯舉茂材諫大夫張勃舉太官獻丞陳湯獻丞主貢獻物湯有罪勃坐削戶二百會薨故賜謚曰繆侯以舉所舉不得人故加惡謚繆者妄也其勸勵也如是故官得其材位必久安為吏長子孫居官以為姓號三代以降斯之為盛漢書音義曰甲乙科謂作簡策難問列置案上在試者意投射取而荅之謂之射策上者為甲次為乙若錄政化得失顯而問之謂之對策也後漢書曰, SBCK: ''}
