  - {type: variant, offset: 182, length: 1, content: 群, krp: 仍訪子孫叙用𥘉蕡條對制䇿言䆠官權盛後必爲患及是果然也又曰大和中禮部侍郎李漢奏准大和七年八月勑貢舉人不要試詩賦䇿且先帖大經小經共十帖次對正義十道次試論義各一首訖考覈放及第又曰大和八年中書門下奏進士放牓舊例禮部侍郎㫮將及第人名先呈宰相然後放牓伏以委在有司固當精慎宰臣先知取捨事匪至公今年已後請便令放牓不用先呈人名其及第人所試雜文及郷貫三代名諱並當日送中書門下便令定例又曰㑹昌三年勑禮部所放進土及第人數目今後但據才堪者即與不要限人數毎年止於十人五人惣得又曰㑹昌四年中書門下奏朝廷設文學之科以求髦俊臺閣清選莫不由兹近縁覈實不在於郷閭超名頗雜於非類致有跋扈之地請計交通將澄化源在舉明憲臣等啇量今日以後舉人於禮部納家狀後望依前五人自相保其衣冠則以親姻故舊乆同遊處者其江湖之士則以封壤接近素所諳知者爲保如有缺孝悌之行資朋黨之勢迹由邪徑言渉多端者並不在就試之限如容情故自相隱蔽有人糾舉其同保人並三年不得赴舉仍委禮部明爲戒勵編入舉格勑旨依奏又曰大中𥘉禮部侍郎魏扶放及第二十三人續奏堪放及第三人封彦卿崔涿鄭延休等皆以文蓺爲衆所知其父皆在重任不敢選取其所試詩賦並封奉進止令翰林學士户部侍郎知制誥韋琮等考盡合程度其月二十三日奉進止並付所司放及第有司考試只合在公如徏徇私自有刑典從今以後但依常例取捨不得別有奏聞又曰大中𥘉勑自今放進士牓後杏園任依舊宴集所司不得禁制先是武宗好廵遊曲江亭禁人宴聚故也又曰大中九年}
