  - {type: variant, offset: 1240, length: 98, content: 至五年詔徵吏人有明當代之務習先聖之術者縣次給食令與計偕計者上計簿使也郡國每歲遣詣京師上之偕者俱也令所徵之人與計者俱來而縣次給之也又元朔元年詔曰夫本仁祖義褒德錄賢勸善刑暴本仁祖義謂以仁義為本始也五帝, SBCK: 薛據及第十}
  - {type: variant, offset: 1240, length: 356, content: 至五年詔徵吏人有明當代之務習先聖之術者縣次給食令與計偕計者上計簿使也郡國每歲遣詣京師上之偕者俱也令所徵之人與計者俱來而縣次給之也又元朔元年詔曰夫本仁祖義褒德錄賢勸善刑暴本仁祖義謂以仁義為本始也五帝三王所繇昌也故詔執事興廉舉孝庶幾成風夫十室之邑必有忠信三人並行厥有我師今或至闔郡而不薦一人是化不下究而積行之君子壅於上聞也究竟也言見壅遏不得聞於天子也且進賢受上賞蔽賢蒙顯戮古之道也其與中二千石禮官博士議不舉者罪是時天下慎法莫敢謬舉而貢士蓋鮮故有斯詔有司奏議曰古者諸侯貢士壹適謂之好德再適謂之賢賢三適謂之有功迺加九錫不貢士一則黜爵再則黜地三而黜爵削地矣夫附下罔上者死附上罔下者刑與聞國政而無益於民者斥在上位而不能進賢者退其不舉孝不奉詔當以不敬論為其不求士報國也不察廉為不勝任也當免奏可凡國之官非傅相其地既自署置又調屬僚, WYG: 孫逖}
