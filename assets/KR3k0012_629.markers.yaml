  - {type: variant, offset: 76, length: 2, content: 比攷, WYG: 謬也昔者採詩以觀風俗詠卷耳則忠臣喜誦蓼莪而孝子悲温良敦厚詩教也豈主于滛文哉夫人之愛名如水之務下上有所好下必甚焉陛下若以徳行為先文藝為末必敦徳勵行以佇甲科鄷舒俊才沒而不齒陳寔長者㧞而用之則多士雷奔四方風動俗從于下聖理於上豈有不變者與又曰寶應初禮部侍郎楊綰奏請毎嵗舉人依鄉舉里選察秀才孝亷勅公卿以下集議中書舍人賈至議曰楊綰所奏實為正論然衣冠遷徙人多僑寓士居鄉里百無一二今依古制恐取士之道未盡今禮部每嵗擢甲乙之科祗足長浮薄之風啓僥倖之路矣}
