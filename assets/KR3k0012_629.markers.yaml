  - {type: variant, offset: 234, length: 128, content: 副寫其書者當詔王爵祿之時也禮記王制曰命鄉論秀士升之司徒曰選士移名於司徒也秀士鄉大夫所考有德行道蓺者司徒論選士之秀者而升之學曰俊士可使習禮者學大學升於司徒者不征於鄉升於學者不征於司徒曰造士不征不給其繇役造成也能習禮則為成士大樂正論造士之秀者以告于王而升諸司馬, SBCK: 􅀘畧}
