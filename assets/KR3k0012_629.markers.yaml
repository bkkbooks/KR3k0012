  - {type: variant, offset: 389, length: 0, content: '', SBCK: 先輩俱捷謂之同年有司謂之座主京兆府考而􅂛者謂之等第外府不試而貢者謂之拔解然拔解亦須預記人爲詞賦非謂自薦將試相保謂之合保群居而賦謂之私試造請權要謂之􅀜節激楊聲價謂之徃還旣捷列名於慈恩走謂之題名㑹大讌於曲江亭謂之曲江㑹曲江大㑹在􅀜試後亦折謂之􅀜宴宴後同年各有所之歸郷井間謂之離㑹籍而入選謂之春􅀜不捷而醉飽謂之打眊燥匿名造謗謂之無名子退而􅀠業謂之夏課挾藏而入試謂之書䇿此其畧也其風俗繫於先逹其制置存於有司雖然}
