  - {type: variant, offset: 4641, length: 222, content: 皇家茍有奇才雖屠釣奴虜之賤亦可用之茍非其人雖三后之胄自墜於皂隸矣或云代無奇才不若取士於門此亦失矣豈可以世無周邵便廢宰相而不置哉但當校其寸長銖重者即先敘之則賢才無遺矣北齊書曰課試之法中書策秀才集書策考貢士考功郎中策廉良天子常服乘輿出坐於朝堂中楹秀才各以班草對字有脫誤者呼起立席後書有濫劣者飲墨水一升文理孟浪者奪席脫容刀後周書曰宣帝大成元年詔州舉高才博學者為秀才郡舉經明行脩者為孝廉上州歲一人下州三歲一人隋書曰文帝開皇中制諸州貢士歲三人工商不得入仕, WYG: 教化科宋琨及第軍謀宏達堪任將帥科鄭冦李式及第太平御覽卷六百二十九}
