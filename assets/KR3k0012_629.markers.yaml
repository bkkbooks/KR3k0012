  - {type: variant, offset: 184, length: 4, content: 獻賢能之, SBCK: 部試宏辭舉人漏洩題目爲御史所劾侍郎裴諗改國子􅀕酒郎中周敬罰兩月俸考官刑部郎中唐扶出爲䖍州刺史監察御史馮顓罰一月俸其登科十人並落下又曰大中十年禮部侍郎鄭顥進諸家科目記十三卷勑付翰林自今放牓後仰冩及第人姓名及所試詩賦題目進入仍令所司逐年編次又曰大中十二年中}
