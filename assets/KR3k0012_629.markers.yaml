  - {type: variant, offset: 1023, length: 216, content: 所謂功者以其任官稱職為差非所謂積日累久也故小材雖累日不離於小官賢材雖未久不害為輔佐是以有司竭力盡知務理其業而以赴功今則不然累日以取貴積久以致官是以廉恥貿亂賢不肖混殽也諸侯列卿郡守二千石各擇其吏民之賢者歲貢各二人以給宿衛且以觀大臣之能所貢賢者有賞不肖者有罰夫如是諸侯吏二千石皆盡心於求賢天下之士可得而官使也授之以官以使其材無以日月為功實試用賢能為上量材而授官錄德而定位錄德存視之也則廉恥殊路賢不肖異處矣帝因是令郡國舉孝廉各一人又限以四, SBCK: 調}
