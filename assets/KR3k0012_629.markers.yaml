  - {type: variant, offset: 753, length: 3, content: 寡欲易, WYG: 為時所尚乆矣是故俊乂由其中出者終身為聞人故争名常切其都㑹謂之舉塲通稱謂之秀才投刺謂之鄉貢得第謂之前進士互推敬謂之先軰俱捷謂之同年有司謂之座主京兆府考而升者謂之等第外府不試而貢者謂之㧞觧然㧞觧亦湏預託人為詞賦非謂白薦将試相保謂之合保羣居而試謂之私試造請權要謂之闗節激揚聲價謂之徃還既捷列名於慈恩寺謂之題名㑹大讌于曲江亭謂之曲江㑹曲江大㑹在闗試後亦謂之闗宴闗宴後同年各有所之亦謂之離㑹籍而入選謂之春闗不捷而醉飽謂之打毷氉匿名造牓謂之無名子退而肄業謂之夏課挾藏而入試謂之書策此其畧也其風俗繫于先逹其制置存于有司雖然賢士得其大者故位極人臣常有二三登顯列十有六七制舉科唐書顯慶三年二月志烈秋霜科韓思彦及第乾封元年幽素科蘓瓌解琬􅴓神容格輔彦徐昭劉納言崔谷神及第上元一年正月詞殫文律科崔融及第永隆元年岳牧舉垂拱四年十二月詞標文苑科房晋皇甫瓊王旦及第永昌元年五月蓄文藻之思科彭景直及第抱儒素之業科李文愿及第長夀三年四月臨難不顧徇節寕邦科薛稷㓂泚及第證聖元年長才廣度沉迹下僚科張漪及第通天元年文藝優長科韓璘琬及第神功元年九月絶倫科蘓頲崔𤣥童袁仁敬何鳳孟温禮洪子與盧從愿趙不欺及第大}
