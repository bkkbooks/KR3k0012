  - {type: variant, offset: 32, length: 0, content: '', krp: 洛城殿前數日方畢殿前試人自兹始也又曰景雲中制曰四方選集群才輻湊操斧伐柯求之不逺}
  - {type: variant, offset: 33, length: 1, content: 鄉, SBCK: 有能習二經通大義者綜一史知本末者通三教宗旨究精微者善六書文字辨聲象者傳雅曲度和六律五音者韜畧學孫呉識天時人事者暢於詞氣聦於受領善敷奏吐納者咸令所司博採明試朕親擇焉又曰長壽二年左拾遺劉承慶上䟽曰伏見比年已來天下諸州所貢物至元日皆陳在御前唯貢人獨於朝堂拜列則金帛羽毛昇於玉陛之下賢良文學弃彼金門之外恐所謂貴財而賤義重物而輕人伏請貢人至元日列在方物之前以備充庭之禮制曰可又曰開元中詔諸州郷貢進士見訖冝令引就國子監謁先師學官爲之開講質問疑義仍令所司優厚設食兩館及監内得解舉人亦准此其曰清官五品巳上及朝集使並徃􅀚禮即爲常式謁先師自此始也又曰開元中國子􅀕酒楊瑒上言曰伏聞承前之例毎年應舉常有千數及第兩監不過一二十人臣恐三千學徒虚費官􅅒兩監博士濫糜天禄臣竊見入仕諸色出身毎歳向二千餘人方於明經進士多十餘倍自然服勤道業之士不及胥}
  - {type: page-break, offset: 33, content: '', id: KR3k0012_SBCK_629-2a}
  - {type: page-break, offset: 33, content: '', id: KR3k0012_SBCK_629-2b}
  - {type: variant, offset: 33, length: 0, content: '', WYG: 有能習二經通大義者綜一史知夲末者通三教宗㫖䆒精微者善六書文字辨聲象者傳雅曲度和六律五音者韜畧學孫呉識天時人事暢於詞氣聰於受領善敷奏吐納者咸令所司愽採明試朕親擇焉又曰長夀二年有左拾遺劉承慶上疏曰伏見比年以來天下諸州所貢物至元日皆陳在御前惟貢人獨於朝堂拜列則金帛羽毛昇于玊階之下賢良文學棄彼金門之外恐所謂貴財而賤義重物而輕人伏請貢士至元日列在方物之前以備充庭之禮制曰可又曰開元中詔謂州}
  - {type: page-break, offset: 33, content: '', id: KR3k0012_WYG_629-3a, image: WYG0898/WYG0898-0633c.png}
  - {type: variant, offset: 33, length: 1, content: 鄉, krp: 有能習二經通大義者綜一史知本末者通三教宗旨究精微者善六書文字辨聲象者傳雅曲度和六律五音者韜畧學孫呉識天時人事者暢於詞氣聦於受領善敷奏吐納者咸令所司博採明試朕親擇焉又曰長壽二年左拾遺劉承慶上䟽曰伏見比年已來天下諸州所貢物至元日皆陳在御前唯貢人獨於朝堂拜列則金帛羽毛昇於玉陛之下賢良文學弃彼金門之外恐所謂貴財而賤義重物而輕人伏請貢人至元日列在方物之前以備充庭之禮制曰可又曰開元中詔諸州郷貢進士見訖冝令引就國子監謁先師學官爲之開講質問疑義仍令所司優厚設食兩館及監内得解舉人亦准此其曰清官五品巳上及朝集使並徃觀禮即爲常式謁先師自此始也又曰開元中國子祭酒楊瑒上言曰伏聞承前之例毎年應舉常有千數及第兩監不過一二十人臣恐三千學徒虚費官廩兩監博士濫糜天禄臣竊見入仕諸色出身毎歳向二千餘人方於明經進士多十餘倍自然服勤道業之士不及胥}
  - {type: variant, offset: 34, length: 0, content: '', WYG: 貢進士見訖宜令領就國子監謁先師學官為之開讀質問疑義仍令所司優厚設食兩舘及監内得舉人亦準此其朝日官五品已上及朝集使並徃觀禮即為常式謁先師自此始也又曰開元中國子祭酒楊瑒上言曰伏聞承前之例毎年應舉常有千數及第兩監不過一二十人臣恐三千學徒虗費官廪兩監博士濫糜天禄臣竊見入仕諸色出身毎嵗尚二千餘人方於明經進士多十餘倍自然服勤道業之士不及胥}
