  - {type: variant, offset: 711, length: 7, content: 初置孝弟官二千, SBCK: 正月蓄文藻之思科彭景直及第抱儒素之業科李文愿及第長壽三年四月臨難不顧徇節寕􅀖科薛稷冦泚及第證聖元年長才廣度沉迹下僚科張猗及第通天元年文蓺優長科韓璘及第神功元年九月絶倫科蘇頲崔􅀇童􅀽仁敬何鳯孟温禮洪子與盧從原趙不欺及苐大足元年理選使孟詵試拔萃科崔翹鄭微及第少疾惡科馮万}
  - {type: variant, offset: 711, length: 0, content: '', WYG: 七月勅超與處分明經請减兩選伏請每嵗甄奨不過數人庶使經術漸興人知教本勅㫖明經義策全通者令所司具名聞奏續商量處分餘依議又曰建中}
  - {type: variant, offset: 711, length: 7, content: 初置孝弟官二千, krp: 正月蓄文藻之思科彭景直及第抱儒素之業科李文愿及第長壽三年四月臨難不顧徇節寕邦科薛稷冦泚及第證聖元年長才廣度沉迹下僚科張猗及第通天元年文蓺優長科韓璘及第神功元年九月絶倫科蘇頲崔玄童袁仁敬何鳯孟温禮洪子與盧從原趙不欺及苐大足元年理選使孟詵試拔萃科崔翹鄭微及第少疾惡科馮万}
  - {type: variant, offset: 712, length: 0, content: '', WYG: 尚書左丞權知禮部貢舉顧少連奏伏以取士之科以明經為首教人之本則義理為先至于帖書及以對策皆形文字並易考尋試義之時獨令口對對答之失覆視無慿黜退之中流議遂起伏請準建中二年十二月勅以所問録於紙上各令直書其義不假文言仍請依經䟽對勅㫖宜依元和二年十二月禮部貢院奏五經舉人請罷試口義準舊試墨義十條五經通六便以入選詔從之又曰建中三年四月勅禮部應進士舉人等自今以後如試官并不合選諸色出身人有應舉者宜吿於舉司陳状準例考試如才堪及第者送名中書門下重加考覆如實才堪郎令所司追納吿身注毁官甲準例與及第至選日仍稍優與處分其正員官不在舉限又曰貞元中兵部侍郎陸贄權知貢舉時崔元翰梁肅文藝冠時贄輸心於肅與元翰遂}
  - {type: page-break, offset: 712, content: '', id: KR3k0012_WYG_629-8b, image: WYG0898/WYG0898-0636b.png}
  - {type: page-break, offset: 712, content: '', id: KR3k0012_WYG_629-9a, image: WYG0898/WYG0898-0636c.png}
  - {type: variant, offset: 713, length: 0, content: '', WYG: 之首選升第之日雖衆望不惬然一嵗選士纔十四五數年之内居臺省者十餘人又曰元和初四月以起居舍人翰林學士王涯為都官員外郎吏郎員外郎韋貫之為果州刺史先是䇿賢良詔楊於陵鄭敬李益與貫之同考覆是時牛僧孺皇甫湜並李宗閔條對甚直無所畏避考官第其策皆居三等權幸或惡其詆己而不中第者乃註觧其策同為唱誹又言涯居翰林其甥皇甫湜中選考覈之際不先上言故同坐焉居數日貫之再黜巴州司馬涯虢州司馬楊於陵遂出為廣州節度裴垍時為翰林學士居中覆視無所同異及為貴倖泣訴請罪于上上不得已罷垍翰林學士除戸部侍郎又曰元和中權知禮部侍郎庾承宣奏臣有親屬應明經進士舉者請準舊例送考功考試從之又曰長慶元年勅今年錢徽下士鄭朗等一十四人宜令中書舍人王起主客郎中知制誥白居易等重試覆落十人三月丁未詔曰國家設文學之科夲求才實苟容僥倖則異至公訪問近日浮薄之徒扇為朋黨謂之闗節干擾主司毎嵗策名無不先定永言敗俗深用興懐鄭朗等昨令重試不求深僻題目貴觀學藝淺深孤竹管是祭天之樂出于周禮正經閲其程試之文都不知其夲事詞律鄙淺蕪累何多其孔温業等三人粗通可與及第其餘落第今後禮部舉人宜準開元二十五年勅及第人所試雜文并策先送中書門下詳覆又曰長慶中禮部侍郎王起奏曰伏以禮部放牓已是成名中書重覆尚未及第若重覆之中萬一不定則放牓之後逺近誤傳其於事理實為非便臣伏請毎年進士堪及第者夲司考試訖其詩賦先送中書門下詳覆後勅却下本司然後準舊例大字放榜從之又曰太和初以散騎常侍馮宿太常少卿賈餗庫部郎中龎嚴為考官䇿第二十二人而前進士劉蕡策最切直不居是選其間指陳時事不避貴近言詞激切士林感動雖晁董無以過也而考官有所畏忌不敢上聞随例擯斥識者之議喧然不平守道正人傳其文至有相對而泣者諌官等或将其䇿白于宰臣宰臣怯憚亦不敢為之明白登科人李郃者深有所愧抗奏請譲官于蕡事竟不行天復初李季述敗起居郎羅衮上疏請追贈蕡於是下詔贈左諌議大夫仍訪子孫叙用初蕡條對制策言宦官權盛後必為患及是果然也又曰太和中禮部侍郎李漢奏準太和七年八月初貢舉人不要試詩賦䇿目先帖大經小經共十帖次對正義十道次試論義各一首訖考覈放及第又曰太和八年中書門下奏進士放榜舊例禮部侍郎皆将及第人名先呈宰相然後放榜伏以委任有司固當精慎宰臣先知取舍事匪至公今年以後請便令放榜不用先呈人名其及第人所試文及鄉貫三代名諱並當日送中書門下便令定例又曰㑹昌三年勅禮部所放進士及第人數自今後但㨿才堪者即與不要限人數毎年止于十人五人摠得又曰㑹昌四年中書門下奏朝廷設文學之科以求髦俊䑓閣清選莫不由茲近縁覈實不在於鄉閭超名頗雜於非類致有䟦扈之地請計交通将澄化源在舉明憲臣等商量今日以後舉人於禮部納家状後望依前五人自相保其衣冠則以親戚故舊乆同逰處者其江湖之士則以封壌接近素所諸知者為保如有缺}
