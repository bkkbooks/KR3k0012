  - {type: variant, offset: 38, length: 1, content: 教, SBCK: 其効官豈識先王之禮義陛下設學斆務以勸進之有司爲限約務以黜退之臣之微誠實所未曉今監司課試十巳退其八九考功及第十又不収一二􅀂長以此爲限恐儒風漸墜小道將興􅀂以岀身人多應湏諸色都減豈在獨抑明經進士上然之又曰開元中勑今之明經進士則古之孝廉秀才近日已來殊乖本意進士以聲韻爲學多昧古今明經以帖誦爲功罕窮旨趣安得爲敦本復古經明行脩以此登科非選士取賢之道其明經自今巳後每經冝帖十取通五巳上免舊試一帖仍按問大義十條取六已上免試經䇿十條令􅀂時務䇿三道取粗有文性者與及第其進士冝停小經准明經帖大經十帖取通四巳上然後准例試􅄂文䇿考通與及第其明經中有明五經巳上試無不通者進士中兼有精通一史能試䇿十條得六巳上者委所司奏聽進止其應試進士等唱第訖具所試􅄂文䇿及送中書門下詳覆}
  - {type: page-break, offset: 38, content: '', id: KR3k0012_SBCK_629-3a}
  - {type: variant, offset: 38, length: 1, content: 教, WYG: 其效官豈識先王之禮義陛下設學斆務以勸進之有司課試十已退其八九考功及第十又不收一二若長以此為限恐儒風漸墜小道将興若以出身人多應湏諸色都减豈在獨抑明經進士上然之又曰開元中勅今之明經進士則古之孝亷秀才近日以來殊乖本意進士以聲韻為學多昧古今明經以帖誦為功罕窮㫖趣安得為敦本復古經明行修以此登科非選士取賢之道其明經自今以後每經宜帖十取通五以上免舊試一帖仍案問大義十條取六以上免試經策十條今若時務策三道取粗有文性者與及第其進士宜停小考與通及第其明經中有明五經已上試無不通進士中兼有精通一史能試策十條得六以上者委所司奏聼進止其應試進士唱第訖具所試雜文及策送中書門下詳覆}
  - {type: page-break, offset: 38, content: '', id: KR3k0012_WYG_629-4a, image: WYG0898/WYG0898-0634a.png}
