  - {type: variant, offset: 1339, length: 808, content: 王所繇昌也故詔執事興廉舉孝庶幾成風夫十室之邑必有忠信三人並行厥有我師今或至闔郡而不薦一人是化不下究而積行之君子壅於上聞也究竟也言見壅遏不得聞於天子也且進賢受上賞蔽賢蒙顯戮古之道也其與中二千石禮官博士議不舉者罪是時天下慎法莫敢謬舉而貢士蓋鮮故有斯詔有司奏議曰古者諸侯貢士壹適謂之好德再適謂之賢賢三適謂之有功迺加九錫不貢士一則黜爵再則黜地三而黜爵削地矣夫附下罔上者死附上罔下者刑與聞國政而無益於民者斥在上位而不能進賢者退其不舉孝不奉詔當以不敬論為其不求士報國也不察廉為不勝任也當免奏可凡國之官非傅相其地既自署置又調屬僚及部人之賢者舉為秀才廉吏而貢於王庭多拜為郎居三署無常員或至千人屬光祿勳故卿校牧守居閑待詔或郡國貢送公車徵起悉在焉光祿勳復為三署中銓第郎吏歲舉秀才廉吏出於他官以補缺員後漢制同又元封五年詔曰蓋有非常之功必待非常之人故馬或奔踶而致千里踶蹈也奔踶者乘之即奔立則踶人也踶音徒計反士或有負俗之累而立功名負俗謂被代譏論也累音力瑞反夫泛駕之馬泛覆也音芳勇反字本作覂復通用耳覆駕者言馬有逸氣而不脩軌徹也跅弛之士跅者無檢局也弛者放廢不遵度禮也跅音吐各反弛音式爾反亦在御之而已其令州縣察吏人有茂材異等茂材異等者超等軼群不與凡同可為將相及使絕國者絕遠之國初公孫弘以儒術為丞相天下之學靡然嚮風時太常孔臧等曰請太常博士官置弟子五十人復其身太常擇人年十八以上儀狀端正者補博士弟子郡國縣道邑有好文學敬長上肅政教順鄉里出入不悖所聞二千石謹察可者常以計偕詣太常得受業如弟子一歲皆輒通一藝以上補文學掌故缺其高第可以為郎中者太常籍奏即有秀異等輒以名聞其不事學若不材及不能通一蓺輒罷之而諸不稱者罰又曰孝昭始元初遣故廷尉王平等五人前為此官今不居皆謂之故持節行郡國行下更反舉賢良孝宣帝時諫大夫王吉上言曰今使吏得任子弟子弟以父兄任為郎率多驕驁不通古今驁傲同音至於積功理人無益於人此伐擅所為作也伐檀詩篇名剌不用賢也宜明選求賢除任子弟之令又曰孝元帝永光元, SBCK: ''}
