  - {type: variant, offset: 31, length: 0, content: '', SBCK: 不徳群臣莫吾逮吾國幾於亡乎朕發詔徴天下俊異􅂊以淺近問之咸不能荅海内賢哲將無其人耶朕甚憂之又曰貞觀中考功貟外郎王師旦知舉時兾州進士張昌齡王公直並有俊才聲振京邑而師旦考其文䇿全下舉朝不知所以及奏等第太宗怪無昌齡等名因召師旦問之曰此輩誠有詞華然其體性輕薄文章浮艶必不成令器臣􅀂擢之恐後生相效有變陛下風雅帝以爲名言後並如其􅀃又曰貞觀中文皇帝甞私幸端門見進士綴行而出喜曰天下英雄入吾彀中矣又曰調露二年劉思立除考功貟外郎先時進土但試䇿而巳思立以其膚淺奏請帖經及試􅄂文自後因以爲常又曰載􅀄元年試貢舉人}
  - {type: page-break, offset: 31, content: '', id: KR3k0012_SBCK_629-1b}
  - {type: variant, offset: 31, length: 0, content: '', WYG: 不徳羣臣莫吾逮吾國幾於亡乎朕發詔徴天下俊異纔以淺近問之咸不能答海内名哲將無一人耶朕甚憂之又曰貞觀中考功員外郎王師旦知舉時冀州進士張昌齡王公瑾並有俊才聲振京邑而師旦考其文策全下舉朝不知所以及奏等第太宗怪無昌齡等名因召師旦問之曰此輩誠有詞華然其體性輕薄文章浮艷必不成令器臣若擢之恐後生相效有變陛下風雅帝以為名言後並如其説又曰貞觀中文皇帝嘗私幸端門見進士綴行而出喜曰天下英雄入吾彀中矣又曰調露二年劉思立除考功員外郎先時進士但試策而已思立以其膚淺奏請帖經及試雜文自後因以為常又曰載初元年試貢舉人}
  - {type: page-break, offset: 31, content: '', id: KR3k0012_WYG_629-2a, image: WYG0898/WYG0898-0633a.png}
  - {type: variant, offset: 31, length: 0, content: '', krp: 不徳群臣莫吾逮吾國幾於亡乎朕發詔徴天下俊異纔以淺近問之咸不能荅海内賢哲將無其人耶朕甚憂之又曰貞觀中考功貟外郎王師旦知舉時兾州進士張昌齡王公直並有俊才聲振京邑而師旦考其文䇿全下舉朝不知所以及奏等第太宗怪無昌齡等名因召師旦問之曰此輩誠有詞華然其體性輕薄文章浮艶必不成令器臣若擢之恐後生相效有變陛下風雅帝以爲名言後並如其說又曰貞觀中文皇帝甞私幸端門見進士綴行而出喜曰天下英雄入吾彀中矣又曰調露二年劉思立除考功貟外郎先時進土但試䇿而巳思立以其膚淺奏請帖經及試雜文自後因以爲常又曰載𥘉元年試貢舉人}
  - {type: variant, offset: 32, length: 0, content: '', SBCK: 洛城殿前數日方畢殿前試人自兹始也又曰景雲中制曰四方選集群才輻湊操斧伐柯求之不逺}
  - {type: variant, offset: 32, length: 0, content: '', WYG: 洛城殿前數日方畢殿前試人自兹始也又曰景雲中制四方選集羣才輻輳操斧柯求之不逺}
