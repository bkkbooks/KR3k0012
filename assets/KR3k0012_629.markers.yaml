  - {type: variant, offset: 865, length: 0, content: '', SBCK: 科蘇晉宋務光寇泚盧怡吕恂及第景龍三年抱器懷能科夏侯銛及第茂才異等科王敬從盧重􅀇及第景雲二年文以經國科􅀽暉韓朝宗及第藏名􅀒俗科李俊之及第先天元年文經􅀖國科韓休及第藻思清華科趙冬曦及苐􅀉以宣風則能興化變俗科郭璘之及第道侔伊吕科張九齡及第手筆俊拔超越軰流科杜昱張子漸張秀明常無名趙居貞賈登郍巨及苐開元二年}
