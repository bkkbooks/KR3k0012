  - {type: variant, offset: 153, length: 1, content: 若, SBCK: 之􅀜節干擾主司毎歳䇿名無不先定永言敗俗深用興懷鄭㓪等昨令重試不求深僻題目貴觀學蓻淺深􅀌竹管是􅀕天之樂岀於周禮正經閱其程試之文都不知其夲事詞律鄙淺蕪纇可知其孔温業等三人粗通可與及第其餘落第}
  - {type: variant, offset: 153, length: 0, content: '', krp: 之關節干擾主司毎歳䇿名無不先定永言敗俗深用興懷鄭㓪等昨令重試不求深僻題目貴觀學蓻淺深孤竹管是祭天之樂岀於周禮正經閱其程試之文都不知其夲事詞律鄙淺蕪纇可知其孔温業等三人粗通可與及第其餘落第今後禮部舉人冝准開元二十五年勑及第人所試雜文并䇿先送中書門下詳覆又曰長慶中禮部侍郎王起奏曰伏以禮部放牓巳是成名中書重覆尚未及第}
  - {type: variant, offset: 154, length: 1, content: 今, krp: 重覆}
  - {type: variant, offset: 155, length: 0, content: '', SBCK: 後禮部舉人冝准開元二十五年勑及第人所試􅄂文并䇿先送中書門下詳覆又曰長慶中禮部侍郎王起奏曰伏以禮部放牓巳是成名中書重覆尚未及第􅀂重覆}
  - {type: variant, offset: 156, length: 3, content: 舉茂才, SBCK: 中万一不定則放牓之後逺近誤傳其於事理實爲非便臣伏請毎年進士堪及第者夲司考試訖其詩賦先送中書門下詳覆後勑却下本司然後准舊例大字放牓從之又曰太和􅀄以散騎常侍馮􅀫太常少卿賈餗庫部郎中龐嚴爲考官䇿第二十二人而前進士劉蕡䇿最切直不居是選其間指陳時事不避貴近言詞激切士林感動雖􅄯董無以過}
