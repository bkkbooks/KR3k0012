  - {type: variant, offset: 303, length: 375, content: 學大學升於司徒者不征於鄉升於學者不征於司徒曰造士不征不給其繇役造成也能習禮則為成士大樂正論造士之秀者以告于王而升諸司馬曰進士司馬夏官卿主邦政者進受爵祿者司馬辨論官材論進士之賢者以告於王而定其論各署其所長論定然後官之任官然後爵之命之位定然後祿之又曾子問曰凡語于郊者語謂論說於郊學必取賢歛才焉或以德進或以事舉或以言楊大樂正論造士之秀者升諸司馬曰進士謂此矣又射義曰古者天子之制諸侯歲獻貢士於天子天子試之於射宮其容體比於禮其節比於樂而中多者得與於祭其容體不比於禮其節不比於樂而中少者不得與於祭數與於祭而君有慶數不與於祭而君有讓天子將祭必先習射於澤澤者所以擇士也已射於澤而后射於射宮射中者得與於祭不中者不得與於祭漢書曰高帝十一年詔曰賢士大夫既與我定有天下而不與吾共安利之可乎有肯從我遊者吾能尊顯之以布告天下御史中執法下郡守其有意稱明法者必身勸為之駕詣丞相府署其, WYG: 並量}
