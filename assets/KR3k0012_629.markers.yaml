  - {type: variant, offset: 715, length: 0, content: '', WYG: 之行資朋黨之勢迹由邪徑言渉多端者並不在就試之限如容情故自相掩蔽有人紏舉其同保人並三年不得赴舉仍委禮部明為戒勵編入舉格勅㫖依奏又曰大中初禮部侍郎魏扶放及第二十三人續奏堪及第二人封彦卿崔瑑鄭延休等皆以文藝為衆所知其父皆在重任不敢選取其所試詩賦並封奉進止令翰林學士户部侍郎知制誥韋琮等考盡合程度其月二十三日奉進止並付所司放及第有司考試只合在公如渉狥私自有刑典從今已後但依常例取舍不得别有奏聞又曰大中初勅自今放進士牓後杏園任依舊宴所司不得禁制先是武宗好廵逰曲江亭禁人宴聚故也又曰大中九年吏部試宏辭舉人漏洩題目為御史所劾侍郎裴諗及國子祭酒郎中周敬罰兩月俸考}
