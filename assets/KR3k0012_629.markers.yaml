  - {type: variant, offset: 152, length: 0, content: '', SBCK: 並量行業授官又曰寳應􅀄禮部侍郎楊綰奏貢舉條孝廉各令精通一經其取左氏傳公羊榖梁禮記周禮儀禮毛詩尚書周易任通一經每經問義二十條皆取傍通諸義務窮根夲試䇿三道問古今理體及當時要務取堪行用者仍毎日一道三道畢日經義及䇿全通爲上第其上第者望付吏部便與官其問義毎十條通七䇿通二爲中第與出身下者罷之又論語孝經皆聖人深旨孟子亦儒門之逹者其學官望兼習此三者共爲一經其試如上秀才舉望令精通五經問義二十條對䇿曰試一道全通者爲上第送名中書門下請超與處分問義十條通七策通四爲中第中第者送吏部與官下者罷之孝悌力田但能熟讀一經言音典切即令所司舉送試通便與出身今年舉人或舊業旣習理難速改或逺州所送身巳在途事湏収􅅄不可中廢其今秋舉人中有情願依舊業舉者亦聽今年之後一依新格勑旨進士明經置來日乆今頓令改業恐難有其人諸色舉人冝與舊法兼行又曰建中􅀄中書舎人權知禮部貢舉趙賛奏應口問大義明經等舉人明經之目義以爲先比來相承唯務習帖至於義理少有能通經術􅐛衰莫不由此今􅀂頓取大義恐全少其人欲且因循又無以勸學請約舉司舊例稍示考義之難承前問義不形文字落第之後喧競者多臣今請以所問録於紙上各令直書其義不假文言旣與䇿有殊又事堪微證慿此取捨庶歸至公如有義䇿全通者五經舉人請准廣徳元年七月勑超與處分明經請減兩選伏請每歳甄奬不過數人庻使經術漸興人知教夲勑旨明經義䇿全通者令所司具名聞奏續啇量處分餘依又曰建中􅀄尚書左選權知禮部貢舉顧少連奏㐲以取士之科以明經爲首教人之夲則義理爲先至於帖書及以對䇿皆形文字並易考尋試義之時獨令考對對荅之失覆視無慿黜退之中流議遂起伏請准建中二年十二月勑以所問録於紙上各令直書其義不假文言仍請依經䟽對勑旨冝依元和二年十二月禮部貢院奏五經舉人請罷試口義准舊試墨義十條五經通六便放入䇿詔從之又曰建中三年四月勑禮部應進士舉人等自今巳後如試官并不合選諸色岀身人有應舉者冝先於舉司陳狀准例考試如才堪及第者送名中書門下重加考覈如實不堪即令所司追納告身注毁官甲准例與及第至選日仍稍優與處分其正貟官不在舉限又曰貞元中兵部侍郎陸贄權知貢舉時崔元翰梁肅文蓺冠時贄輸心於肅與元翰推薦蓺實之士􅂛第之日雖衆望不愜然一􅀊選士纔十四五數年之内居臺省者十餘人又曰元和􅀄四月以起居舎人翰林學士王涯爲都官貟外郎吏部貟外郎韋貫之爲果州刺史先是䇿賢良詔揚於陵鄭敬李益與貫之同考覆是時牛僧孺皇甫湜李宗閔條對甚直無所畏避考官第其䇿皆居三等權幸或惡其詆巳而不中第者乃注解其䇿同爲唱誹又言涯居翰林其甥皇甫湜中選考覈之際不先上言故同坐焉居數日貫之再黜巴州司馬涯􅉑州司馬楊於陵遂出爲廣州節度裴垍時爲翰林學士居中覆視無所同異及爲貴倖泣訴請罪於上上不得巳罷垍翰林學士除户部侍郎又曰元和中權知禮部侍郎􅁃承宣奏臣有親屬應明經進士舉者請准舊例送考功考試從之又曰長慶元年勑今年錢徽下進士鄭㓪等一十四人冝令中書舎人王起主客郎中知制誥白居易等重試覆落十人三月丁未詔曰國家設文學之科本求才實苟容僥倖則異至公訪聞近日浮薄之徒扇爲朋黨}
