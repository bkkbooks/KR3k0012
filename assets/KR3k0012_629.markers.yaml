  - {type: variant, offset: 871, length: 368, content: 其理申商韓非蘇秦張儀之言亂國政者皆罷之又曰元光元年舉董仲舒對策曰今郡守縣令民之師帥所使承流而宣化也故師帥不賢則王德不宣恩澤不流今吏既亡教訓於下或不承用主上之法暴虐百姓與姦為市言小吏有為姦欺者守令不舉乃反與之交易求利也貧窮寡弱冤苦失職甚不稱陛下之意夫長吏多出於郎中中郎吏二千石子弟選郎吏又以富貲未必賢也且古所謂功者以其任官稱職為差非所謂積日累久也故小材雖累日不離於小官賢材雖未久不害為輔佐是以有司竭力盡知務理其業而以赴功今則不然累日以取貴積久以致官是以廉恥貿亂賢不肖混殽也諸侯列卿郡守二千石各擇其吏民之賢者歲貢各二人以給宿衛且以觀大臣之能所貢賢者有賞不肖者有罰夫如是諸侯吏二千石皆盡心於求賢天下之士可得而官使也授之以官以使其材無以日月為功實試用賢能為上量材而授官錄德而定位錄德存視之也則廉恥殊路賢不肖異處矣帝因是令郡國舉孝廉各一人又限以四, WYG: 逸淪屠釣}
