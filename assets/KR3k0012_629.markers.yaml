  - {type: variant, offset: 692, length: 2, content: 惠帝, WYG: 寶應初禮部侍郎楊綰奏貢舉條孝亷各令精通一經其取左氏傳公羊榖梁禮記周禮儀禮毛詩尚書周易任通一經每經問義十條皆取傍通諸義務窮根夲試策三道問古今理體及當時要務取堪行用者仍每日一道三道畢日經義及策全通為上第其上第者望付吏部便與官其問義毎十條通八策通二為中第與出身下者罷之又論語孝經皆聖人深㫖孟子亦儒門之逹者其學官望兼習此三者共為一經其試如上秀才舉望令精通五經問義十條對䇿日試一道全通者為上第送名中書門下請超與處分問義十條通八策通}
