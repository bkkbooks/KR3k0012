  - {type: variant, offset: 176, length: 4, content: 鄉老及鄉, SBCK: 白登科人李邵者深有所愧抗表請讓官於蕡事竟不行天復􅀄劉季􅄒敗起居郎羅衮上䟽請追贈蕡於是下詔贈左諌議}
