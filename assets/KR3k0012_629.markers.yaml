  - {type: variant, offset: 74, length: 0, content: '', WYG: 劉嶢上疏曰國家以禮部為考秀之門考文章於甲乙故天下響應驅馳於才藝不務於徳行夫徳行者可以化人成俗才藝者可以約法立名故有朝登甲科而夕陥刑辟制法守度使之然也陛下焉得不改而張之至如日誦萬言何闗理體文成七歩未足化人昔子張學干禄仲尼曰言寡尤行寡悔禄在其中矣又曰行有餘力}
