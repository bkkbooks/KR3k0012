  - {type: variant, offset: 1897, length: 250, content: 人復其身太常擇人年十八以上儀狀端正者補博士弟子郡國縣道邑有好文學敬長上肅政教順鄉里出入不悖所聞二千石謹察可者常以計偕詣太常得受業如弟子一歲皆輒通一藝以上補文學掌故缺其高第可以為郎中者太常籍奏即有秀異等輒以名聞其不事學若不材及不能通一蓺輒罷之而諸不稱者罰又曰孝昭始元初遣故廷尉王平等五人前為此官今不居皆謂之故持節行郡國行下更反舉賢良孝宣帝時諫大夫王吉上言曰今使吏得任子弟子弟以父兄任為郎率多驕驁不通古今驁傲同音至於積功理人無益於人此伐擅所為作也伐檀詩篇名剌不用賢也宜明選求賢除任子弟之令又曰孝元帝永光元, WYG: 三}
