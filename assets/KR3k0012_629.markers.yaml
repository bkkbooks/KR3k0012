  - {type: variant, offset: 3695, length: 1168, content: 十人皆補郎舍人時尚書今左雄議改察舉之制限年四十以上儒者試經學文吏試章奏如有顏面子奇之類不拘年齒尚書僕射胡廣尚書郭虔等駮之曰選舉因才無拘定制六奇之策不出經學鄭產之政非必章奏甘奇著用年乖強仕終賈楊聲亦在弱冠漢承周秦兼覽殷夏祖德師經參雜霸軌聖主賢臣代以致理貢舉之制莫或廻革今以一臣之言不可剗戾舊章竟從雄義於是雄上言郡國孝廉古之貢士出則宰人宣恊風教若其面牆則無所施用孔子曰四十不惑禮稱強仕請自今孝廉年不滿四十不得察舉皆先詣公府諸生試家法文吏課牋奏副之端門練其虛實以觀異能以美風俗有不承科令者正其罪法若有茂才異行自不拘年齒帝從之乃班下郡國明年有廣陵孝廉徐淑年未及舉臺郎凝詰之對曰詔書有如顏回子奇不拘年齒是故本郡以臣充選郎不能屈雄詰之曰昔顏回問一知十孝廉聞一知幾耶淑無以對乃遣還郡於是濟陰太守胡廣等十餘人皆坐謬舉免黜唯汝南陳蕃潁川李膺下邳陳球等三十餘人得拜郎中自是牧守畏慄莫敢輕舉迄于永嘉十餘年間察選清平多得其人雄又奏徵海內名儒為博士使公卿子弟為諸生有志操者加其俸祿及汝南謝廉河南趙建年始十二各能通經雄並奏拜童子郎自是負書來學雲集京師又桓帝詔曰孝廉廉吏皆當典城牧人禁姦舉善興化之本常必由之詔書連下分明懇惻而在所翫習遂至怠慢選舉乖錯害及元元頃雖頗繩正猶未懲改方今淮夷未殄軍師屢出百姓疲瘁困於徵發庶望群吏惠我勞人蠲滌貪穢以祈休祥其令秩滿百石十歲以上有殊才異行乃得忝選贓吏子孫不得察舉杜絕邪偽請託之源令廉白守道者得信其操信音申古字通又曰初平四年試儒生四十餘人上第賜位郎中次太子舍人下第者罷之詔曰孔子歎學之不講則所識日忘今耆儒年踰六十去離本土營求糧資不得專業結童入學白首空歸長委農野永絕榮望朕甚愍焉其依科罷者聽為太子舍人齊書左僕射王儉請解領選謂禇彥回曰選曹之始近自漢末今若反古使州郡貢計三府辟士與眾共之猶賢一人之意古者選眾今則不然奇材絕智所以見遺於草澤也梁書天監中沈約上䟽曰當今士子繁多略以萬計常患官少才多無地以處秀才自別是一種仕官非若漢代取人之例也假使秀才對五問可稱孝廉荅一策能過此乃雕蟲小道何關理功得失以此求才徒虛語爾後魏書孝文時韓麒麟子明宗上言曰前代取士必先正名故有賢良方正之稱今州郡貢察徒有秀孝之名無秀孝之實而朝廷但撿其有門地不復彈坐如此則可別貢門地以敘士人何假置秀孝之名也夫門地者是其父祖之貴烈亦何益於皇家茍有奇才雖屠釣奴虜之賤亦可用之茍非其人雖三后之胄自墜於皂隸矣或云代無奇才不若取士於門此亦失矣豈可以世無周邵便廢宰相而不置哉但當校其寸長銖重者即先敘之則賢才無遺矣北齊書曰課試之法中書策秀才集書策考貢士考功郎中策廉良天子常服乘輿出坐於朝堂中楹秀才各以班草對字有脫誤者呼起立席後書有濫劣者飲墨水一升文理孟浪者奪席脫容刀後周書曰宣帝大成元年詔州舉高才博學者為秀才郡舉經明行脩者為孝廉上州歲一人下州三歲一人隋書曰文帝開皇中制諸州貢士歲三人工商不得入仕, SBCK: ''}
