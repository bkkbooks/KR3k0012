  - {type: variant, offset: 3383, length: 1, content: 和, SBCK: 范􅂛奏云伏見太原周黨東海王良山陽王戎使者三到乃肯就車脫衣解􅄚昇于華轂晉書曰宣王􅀄欲追諸葛於関中多蒺藜乃使軍吏二千人着軟材木􅄚前行然後卒進焉晉宣}
