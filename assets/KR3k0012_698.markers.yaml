  - {type: variant, offset: 3471, length: 0, content: '', SBCK: 靴詣州言之諧召城外諸嫗以靴示之紿曰有乗馬人於路􅀍賊刼害遺此靴焉得}
  - {type: variant, offset: 3471, length: 0, content: '', krp: 靴詣州言之諧召城外諸嫗以靴示之紿曰有乗馬人於路𬒳賊刼害遺此靴焉得}
