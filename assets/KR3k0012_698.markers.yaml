  - {type: variant, offset: 676, length: 777, content: 履至著而不疑晉惠帝起居注曰帝還洛陽至陵下謁無履取左右履著下拜趙錄曰佛圖澄卒葬後郭門吏報石季龍云是師攜一履西去季龍發其墓唯見一履與一石後魏書曰王遵業從容恬素若處丘園嘗著穿履好事者多毀新履以學之宋書曰益州道士邵碩元徽二年忽告人云吾命終因臥而死後人見碩在荊州上明以一隻故履縛左腳而行甚疾遂不知所之齊書曰高祖儉素宮人盡令著紫絲履太公金匱履之書曰行必慮正六韜崇侯虎曰今周伯昌懷仁而善謀冠雖弊禮加於首履雖新法以踐地可及其未成而圖之又曰昔帝堯王天下黼衣絓履不弊不更為也晏子曰公問曰子近市識貴賤乎時公繁刑晏子曰踊貴履賤公愀然遂緩刑又曰景公為履黃金之綦飾以銀連以珠良玉之約其長尺又曰景公為履飾以金玉服以聽朝履重僕不能舉之問曰天寒乎晏子曰古之制衣服冬輕而煖夏重而清金玉之履是重而寒也公入徹履孫卿子曰大布之衣簏紃之履可以養體也莊子曰儒者冠圓冠者知天時履方屨者知地形又曰曾子居衛捉𥘞而肘見納履而踵決韓子曰鄭人有欲買履者先自度足而置其坐往市而忘操之見履乃曰吾忘度足乃歸取之市罷不得履人曰何不試以足曰寧信度數無自信也又曰文王履係解視左右盡賢無可使係者因俛而係之又曰魯人身善織履其妻善織縞而徙於越或謂之曰子必窮履飾足也而越人跣縞為冠之也而越人被髮欲不窮可得乎賈子曰天子黑方履諸侯素方履大夫素圓履賈誼書曰昔楚昭王與吳戰楚軍敗昭王走而履決失之行三十步復旋取左右問曰何惜此一踦履乎王曰楚國雖貧豈愛一踦履哉惡與偕出弗與俱反也自是之後楚國之俗無相棄者又曰履雖鮮弗加之於枕冠雖弊弗以苴履又曰二世胡亥之為公子曰詔置酒享群臣召諸子賜食先罷胡亥下階群臣陳履狀善者因行踐敗而去諸侯聞之者莫不太息及二世即位皆知天下必棄之淮南子曰禹之趍時冠挂而弗顧履遺而不取鹽鐵論曰古者庶人鹿菲草履今富者韋沓絲履風俗通論數曰踦者奇也履舄之一也夢書曰履襪為子屬體末也若夢得履襪者必有子息也履者為男襪者為女也西京雜記曰趙飛鷰為皇, krp: ''}
