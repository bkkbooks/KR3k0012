  - {type: variant, offset: 2754, length: 421, content: 憶左傳曰楚子次于乾谿兩雪王皮冠秦復陶秦所遺羽衣也翠被以翠羽飾被豹舄以豹皮為履執鞭以出三禮六服圖曰王后翬衣玄舄榆翟赤舄鞠衣著履鞠衣以下皆履之三禮圖曰複下曰舄單下曰履夏葛冬皮也說苑曰襄成君始封之時衣翠衣帶玉佩玉劍履縞舄典論曰中常侍張讓子奉為太醫令與人飲酒輒掣引衣掌發露形體以為戲樂將罷又亂其舄履無不顛倒漢武內傳曰西王母履文鳳之舄列仙傳曰安期先生瑯琊阜鄉人秦始皇請見與語三日三夜賜金壁千萬出於阜鄉皆置去留書以赤玉舄一枚以報拾遺錄曰秦王子嬰寢於望夷宮夜夢有人長文鬚鬢絕青納王舄而乘丹車告云天下當亂王乃殺趙高所夢則始皇之靈所著舄則安期所遺者列仙傳曰黃帝葬橋山山崩無尸唯劍舄存衝波傳曰足履萬錢之舄漂如日光宛如遊龍風俗通曰孝文身履革舄而衣弋綈又曰俗說明帝時尚書郎鄴令王喬每月朔常詣臺朝帝怪其來數而無車馬密令太史候望言其臨至時常有雙鳧從東南飛來因舉羅得一隻舄使上方識是四年中所賜尚書履也杜氏幽求曰褒衣博帶高冠厚舄佩以珠璣結之纓蕤陳思王七啟曰金華之舄動趾遺光襪, WYG: 脚}
