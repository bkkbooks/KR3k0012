  - {type: variant, offset: 1472, length: 1, content: 為, WYG: 綵織}
  - {type: variant, offset: 1474, length: 735, content: 帝侍郎常著輕絲履又曰匡衡邑人有說詩者衡從與語質疑邑人推服到履而去拾遺錄曰穆王起春宵之宮西王母來焉納丹豹文履魏武帝遺令曰諸舍中可學作組履賣之又內式令曰吏民多製文繡之服履絲不得過絳紫金黃絲織履前於江陵得雜綵絲履以與家約當著盡此履不得效作也晉令曰土卒百工履色無過綠青白婢履色無過紅青古儈古會切賣者皆當著巾帖額題所儈賣者及姓名一足著黑履一足著白履東宮舊事曰太子妃有絳地絞履一緉漢舊儀曰乘輿帶七尺斬蛇劍履虎尾約履徐乾古履儀曰正會大司馬問劍履上殿義徐言所以遂見從著履上殿時人見咸譏云古無履但有舄今當著舄上殿不宜著履案周禮天王赤舄黑舄后素葛履鄭君注曰複下曰舄單下曰履是則古有履也蔡謨荅臺符分別履舄之名事曰被符小會義注侍臣劍履升殿而摯虞決疑言劍舄履之名宜審謹案今時所謂履者自漢以前皆名屨屨左傳曰踊貴履賤禮曰戶外有二屨不言二履賈誼曰冠雖弊不以苴屨亦不言苴履言履者猶足所履踐耳詩云糺糺葛屨可以履霜舄者一物之別名履者足踐之通稱稱先代以來優崇重臣言劍履則包舄也又大臣昇殿不唯朝會或私覿獨見臨時所著不必是舄故揔言履以明不跣而已摯虞中朝宿臣多識往行親覩其禮退而書之即是晉之故典令決疑言舄者書時事也儀注言履者舉揔名也尋文揔意所稱雖異其制一也鄧德明南康記曰昔有慮躭仕州為治中當元會至曉不及朝化為白鵠至閣前廻翔欲不威儀以帚擲之得一雙履躭驚還就列內外左右莫不駭異時步騭為廣州剌史意甚惡之便以狀聞遂至誅滅荊州記曰興安水邊平石上有石履搜神記曰宮亭湖孤石有一佑客下都經其下見二女子云可為妾買兩緉絲履自厚相報佑客至都與置之並一箱置履在內留廟中去兼一書一刀忘而和留之及下去乘舟忽有鯉魚躍入剖之得刀與書幽明錄曰晉太寧元年餘杭人姓王失其名往上舍過廟乞福既去亡履已行五六里嬾復更反取一白衣人持履後至云宮使還君化為鵠飛入田中, WYG: 靴}
