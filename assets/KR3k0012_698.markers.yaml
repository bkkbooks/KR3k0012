  - {type: punctuation, offset: 3421, content: 「, id: KR3k0012_CHANT_698-bkkpn1187}
  - {type: variant, offset: 3421, length: 0, content: '', SBCK: 祖約好財阮孚好着蠟􅄚同是累而未判其得失有詣約見正料財物客至屏當不盡餘兩小簏着背後傾身障之意未能平或有詣阮正見蠟􅄚因歎曰未知一生當着幾量􅄚神色閑暢於是勝􅀒始分又曰石勒擊劉曜使人着䥫􅄚施釘登城晉中興徴祥􅀃曰舊爲􅄚者齒皆逹名曰露夘泰元中忽不復徹名隂夘亦服妖也識者以爲夘謀也必有隂謀烈宗末驃􅀐叅軍􅀽恱之始有隂謀之事及隆安遂致大亂宋書曰謝靈運好山水㝷山陟嶺必造幽峻巖嶂數十重莫不備盡登躡常着木􅄚上山則去其前齒下則去其後齒又曰虞玩之髙帝鎮東府朝廷致敬玩之爲少府猶躋􅄚造席髙帝取􅄚視之訛黒針銳蒵斷以芒接之問曰卿此􅄚巳幾載玩之曰􅀄釋􅄄拜征北行佐買之着巳三十年貧士竟不易辦髙帝咨嗟因賜以新􅄚玩之不受問其故荅曰公之賜恩華俱重但􅆱簮弊席復不可遺所以不敢當帝善之又曰劉凝之有甞認其着􅄚􅀏曰僕着巳敗今家中覔新者償君此人後田中得所失送還不肯復取齊書曰沈麟士昔甞行路隣人認其所着􅄚麟士曰是卿􅄚耶即跣而反隣人得􅄚送前者還之麟士曰非卿􅄚耶􅀏而受之蕭子顯齊書曰襄陽有盗發古塚者傳云是楚王冢􅀗玉􅄚玉屏風梁書曰范廉爲呉興太守廣陵髙爽有儉薄才客於廉委以}
  - {type: page-break, offset: 3421, content: '', id: KR3k0012_SBCK_698-3a}
  - {type: page-break, offset: 3421, content: '', id: KR3k0012_SBCK_698-3b}
  - {type: variant, offset: 3421, length: 0, content: '', krp: 祖約好財阮孚好着蠟屐同是累而未判其得失有詣約見正料財物客至屏當不盡餘兩小簏着背後傾身障之意未能平或有詣阮正見蠟屐因歎曰未知一生當着幾量屐神色閑暢於是勝負始分又曰石勒擊劉曜使人着䥫屐施釘登城晉中興徴祥說曰舊爲屐者齒皆逹名曰露夘泰元中忽不復徹名隂夘亦服妖也識者以爲夘謀也必有隂謀烈宗末驃騎叅軍袁恱之始有隂謀之事及隆安遂致大亂宋書曰謝靈運好山水㝷山陟嶺必造幽峻巖嶂數十重莫不備盡登躡常着木屐上山則去其前齒下則去其後齒又曰虞玩之髙帝鎮東府朝廷致敬玩之爲少府猶躋屐造席髙帝取屐視之訛黒針銳蒵斷以芒接之問曰卿此屐巳幾載玩之曰𥘉釋褐拜征北行佐買之着巳三十年貧士竟不易辦髙帝咨嗟因賜以新屐玩之不受問其故荅曰公之賜恩華俱重但蓍簮弊席復不可遺所以不敢當帝善之又曰劉凝之有甞認其着屐笑曰僕着巳敗今家中覔新者償君此人後田中得所失送還不肯復取齊書曰沈麟士昔甞行路隣人認其所着屐麟士曰是卿屐耶即跣而反隣人得屐送前者還之麟士曰非卿屐耶笑而受之蕭子顯齊書曰襄陽有盗發古塚者傳云是楚王冢獲玉屐玉屏風梁書曰范廉爲呉興太守廣陵髙爽有儉薄才客於廉委以}
  - {type: variant, offset: 3422, length: 0, content: '', SBCK: 記爽甞有求不遂乃爲􅄚断以喻廉曰㓨鼻不知啑蹋面不知瞋齧齒作歩數持此得勝人譏其不計恥辱以此取名位論語隱義注曰孔子至蔡解於客舎人夜有取孔子一􅃗屐去盗者置屐於受盗家孔子屐長一尺四寸與凢人屐異孔藂子曰孔穿振方屐見平原君宋元嘉起居注曰劉禎彈廣州刺史韋朗贓有白荆屐六七十量風俗通曰延嘉中京師長者皆着木屐婦女始嫁作漆􅀞􅄚五色綵爲系後黨事起九族俱繫婦人挃盖木屐之像丗􅀃曰}
  - {type: page-break, offset: 3422, content: '', id: KR3k0012_SBCK_698-4a}
  - {type: variant, offset: 3422, length: 0, content: '', krp: 記爽甞有求不遂乃爲屐断以喻廉曰㓨鼻不知啑蹋面不知瞋齧齒作歩數持此得勝人譏其不計恥辱以此取名位論語隱義注曰孔子至蔡解於客舎人夜有取孔子一隻屐去盗者置屐於受盗家孔子屐長一尺四寸與凢人屐異孔藂子曰孔穿振方屐見平原君宋元嘉起居注曰劉禎彈廣州刺史韋朗贓有白荆屐六七十量風俗通曰延嘉中京師長者皆着木屐婦女始嫁作漆畫屐五色綵爲系後黨事起九族俱繫婦人挃盖木屐之像丗說曰}
  - {type: variant, offset: 3423, length: 4, content: 伐崇至鳳, SBCK: 子敬兄弟見郄公躡履問訊甚脩外生禮及嘉賔死着髙履儀容輕慢每命坐皆云有事不暇坐郄公􅁣然曰若使嘉賔不死䑕軰敢爾語林曰鄭􅀇在馬融門下業成辭歸融心忌之鄭􅀇亦疑有追乃坐橋下㩀屐融果轉式逐之告左右曰􅀇在上下水上而據木此必死矣遂罷追矣竟以免華陽國志曰何隨家飬竹人盗其筍隨行見恐盗者覺挈屐而歸}
  - {type: variant, offset: 3423, length: 4, content: 伐崇至鳳, krp: 子敬兄弟見郄公躡履問訊甚脩外生禮及嘉賔死着髙履儀容輕慢每命坐皆云有事不暇坐郄公慨然曰若使嘉賔不死䑕軰敢爾語林曰鄭玄在馬融門下業成辭歸融心忌之鄭玄亦疑有追乃坐橋下㩀屐融果轉式逐之告左右曰玄在上下水上而據木此必死矣遂罷追矣竟以免華陽國志曰何隨家飬竹人盗其筍隨行見恐盗者覺挈屐而歸}
