  - {type: variant, offset: 3266, length: 0, content: '', WYG: 屩經以青芒行山便於用故越人重之捜神記曰元康之末太安之間江浦之域有敗屩自聚於道多或至四五千兩人散去之投林草中明日視之悉復聚矣或云貍銜而聚之世之所說屩者人之賤服而當勞辱下民之象也敗者疲敝之象也道者地理四方所以交通王命所由往來也今敗屩聚於道者象下民疲病将相聚為亂絶四方而壅王命臨海水土記曰屩魚長一尺如屩形俗說曰劉貞長少時居丹徒家至貧時方回数出南射堂射劉徃市賣屩路經射堂邉過人無}
  - {type: page-break, offset: 3266, content: '', id: KR3k0012_WYG_698-13b, image: WYG0899/WYG0899-0251b.png}
  - {type: variant, offset: 3267, length: 5, content: 能而賢定陶, WYG: 看射劉過初不廻顧方回異之遣問信荅曰老母朝來未得食至市貨屩不得展詣后過劉招之始來與共語覺其佳笑林曰南方人至京師者人戒之曰汝得物唯食慎勿問其名也後詣主人入門内見馬矢便食惡臭乃歩進見敗屩棄於路因復嚼殊不可咽顧伴曰且止人言不可皆信後詣貴官為設饌因相視曰故是首物且當勿食屧音爕宋書曰袁粲為丹陽尹歩屧白陽郊野間遇一士人便呼與飲明日此人謂被知到門求進粲曰昨飲酒無偶􅂓相要耳竟不與相見齊書曰江泌字士倩濟陽人也少貧好學晝則斫屧為業夜則随月光讀書光斜則握升室梁書曰臨川}
