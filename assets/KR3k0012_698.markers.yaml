  - {type: variant, offset: 3383, length: 1, content: 和, krp: 范升奏云伏見太原周黨東海王良山陽王戎使者三到乃肯就車脫衣解屐昇于華轂晉書曰宣王𥘉欲追諸葛於関中多蒺藜乃使軍吏二千人着軟材木屐前行然後卒進焉晉宣}
  - {type: variant, offset: 3385, length: 4, content: 召諸儒侍, SBCK: 雜教云當預作大平木􅄚遂賤時有蒺藜􅄚行蒺藜悉着屐底又曰謝安遣弟石及從子􅀇征符堅所在克捷安方對客圍碁有驛書到碁畢還内過户限心喜不覺􅄚折齒又曰王述性急當食雞子以箸刺之不得便怒擲於地雞子圎轉不止便下以􅄚齒踏之不得嗔甚掇口}
  - {type: variant, offset: 3385, length: 4, content: 召諸儒侍, krp: 雜教云當預作大平木屐遂賤時有蒺藜屐行蒺藜悉着屐底又曰謝安遣弟石及從子玄征符堅所在克捷安方對客圍碁有驛書到碁畢還内過户限心喜不覺屐折齒又曰王述性急當食雞子以箸刺之不得便怒擲於地雞子圎轉不止便下以屐齒踏之不得嗔甚掇口}
