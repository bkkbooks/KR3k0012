  - {type: variant, offset: 1888, length: 577, content: 則包舄也又大臣昇殿不唯朝會或私覿獨見臨時所著不必是舄故揔言履以明不跣而已摯虞中朝宿臣多識往行親覩其禮退而書之即是晉之故典令決疑言舄者書時事也儀注言履者舉揔名也尋文揔意所稱雖異其制一也鄧德明南康記曰昔有慮躭仕州為治中當元會至曉不及朝化為白鵠至閣前廻翔欲不威儀以帚擲之得一雙履躭驚還就列內外左右莫不駭異時步騭為廣州剌史意甚惡之便以狀聞遂至誅滅荊州記曰興安水邊平石上有石履搜神記曰宮亭湖孤石有一佑客下都經其下見二女子云可為妾買兩緉絲履自厚相報佑客至都與置之並一箱置履在內留廟中去兼一書一刀忘而和留之及下去乘舟忽有鯉魚躍入剖之得刀與書幽明錄曰晉太寧元年餘杭人姓王失其名往上舍過廟乞福既去亡履已行五六里嬾復更反取一白衣人持履後至云宮使還君化為鵠飛入田中列仙傳曰嘯父冀州人在曲周市補履數十年不老人奇之又曰昭帝既葬鉤弋夫人空棺無屍但有絲履列異傳曰胡母班為太山府君齎書詣河伯貽其青絲履甚精巧也漢武內傳曰七月七日西王母降履玄瓊鳳文之舄列女傳曰翟方進學於京師後母憐其幼隨之長安織履以給之皇甫謚高士傳曰陳仲字子終自齊適楚楚王欲以為相其妻子曰家織履以食淡然而無為樂在其中矣謝使者秦嘉與婦淑書曰今枉虎龍組緹履一緉高文惠婦與文惠書曰今聊奉組生履一緉曹植賀冬表曰獻白文履七緉襪百副崔寔四民月令曰八月制韋履十月作白履劉楨魯都賦曰纖纖絲履粲爛鮮新表以文組綴以朱蠙曹植洛神賦曰踐遠遊之人履曳, SBCK: ''}
