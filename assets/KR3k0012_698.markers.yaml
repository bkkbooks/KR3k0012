  - {type: variant, offset: 24, length: 70, content: 抱足也複其下曰舄舄腊也久立地濕故複其下使乾腊也不借言賤易有宜各自畜不假借之也齊人曰搏借搏借猶把鮓鹿之貌也曰鹿絲麻韋草皆同名鹿麤措也言所以安措, WYG: 拘}
