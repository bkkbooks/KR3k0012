  - {type: 'tls:seg', offset: 100, content: '', id: KR3k0012_CHANT_698-2a.4}
  - {type: variant, offset: 100, length: 0, content: '', WYG: 也一曰鞮也詩曰葛屦五兩冠綏䨇止又葛屦曰紏紏葛屦可以履霜周禮曰屦人掌王及后之服屦為赤舄黒舄赤繶黄繶青句素屦葛屦􅃨下曰舄单下曰屦古人言屦以人言屦以通于单勾當為約赤繶通于􅃨下為下縁也黄繶以赤黄之絲辨外内命夫命婦之命屦功屦散屦功屦次命屦散屦去飾者大戴禮曰入於戸未嘗越屦是髙柴之行也禮曰侍坐於長者屦不上堂觧屦不敢當階就屦地而舉之屏于側向長者而履跪而遷屦俯而納屦又曰戸外有二屦言聞則入言不聞則不入毋踐屦毋踖席又曰國家靡君子不履絲屦左傳曰齊侯逰于姑棼遂田于貝丘貝丘齊地見大豕從者曰公子彭生也公怒曰彭生敢見射之豕人立而啼公懼墜於車傷}
  - {type: page-break, offset: 100, content: '', id: KR3k0012_WYG_698-2a, image: WYG0899/WYG0899-0245c.png}
  - {type: page-break, offset: 100, content: '', id: KR3k0012_WYG_698-2b, image: WYG0899/WYG0899-0245d.png}
  - {type: variant, offset: 101, length: 0, content: '', WYG: 䘮屦反求屦於徒人費弗得鞭之見血又曰楚子使申舟聘于齊曰無假道于宋及宋華元曰過我而不假道鄙我也鄙我亡也亡一也乃殺之楚子聞之投􅃑而起屦及於窒皇劍及於寝門之外又曰齊晉戰于鞍郤克傷矢流血及屦未絶皷音又曰呉伐越越子禦之大敗之虛姑浮以戈擊闔廬傷将指取其一屨榖梁傳曰公弟叔盻其曰弟叔盻賢之也宣公殺赤而非之織􅋰而食終身不食宣公之食孟子曰許行自楚之􅅬其徒数十人皆衣褐捆􅋰織席以為食屐釋名曰屐搘以踐泥也為兩足搘以踐泥也帛屐作支如屩者也不曰帛屩而曰帛屐者屩不可以踐泥屐可以踐泥也故謂之屐漢書曰袁盎使呉吳王使圍守之乃力决帳直出屐行七十里東觀漢記曰范昇奏云伏見太原周黨東海王良山陽王戎使者三到乃肯就車脱衣觧屐昇于華轂晉書曰宣王初欲追諸葛於闗中多蒺藜乃使軍吏二千着軟材木屐前行然後進晉宣帝雜教云當預作太平木屐遇踐時有蒺藜悉着屐蒺藜着屐底又曰謝安遣弟石及從子𤣥征符堅}
  - {type: page-break, offset: 101, content: '', id: KR3k0012_WYG_698-3a, image: WYG0899/WYG0899-0246a.png}
  - {type: page-break, offset: 101, content: '', id: KR3k0012_WYG_698-3b, image: WYG0899/WYG0899-0246b.png}
  - {type: variant, offset: 102, length: 1, content: 依, WYG: 在皆克安方對客圍碁有驛書到碁畢還内過戸限心喜不覺屐齒折又曰王述性急嘗食鷄子以箸刺之不得便怒擲於地鷄子圎轉不止便下以屐齒踏之不得嗔甚掇口中嚼而吐之又曰祖約好財阮孚好着蠟屐同是累而未判其得失有詣約見正料財物客至屏當不盡餘两小簏着背後傾身障之意未能平或有詣阮見正蠟屐因歎曰未知一生當着幾量屐神色閑暢於是勝負始分又曰石勒擊劉曜使人着鉄屐施釘登城晉中興徴祥說曰舊為屐者齒皆逹名曰露卯泰元中忽不復徹名陰卯亦服妖}
  - {type: page-break, offset: 102, content: '', id: KR3k0012_WYG_698-4a, image: WYG0899/WYG0899-0246c.png}
  - {type: page-break, offset: 102, content: '', id: KR3k0012_WYG_698-4b, image: WYG0899/WYG0899-0246d.png}
  - {type: punctuation, offset: 104, content: 。, id: KR3k0012_CHANT_698-bkkpn33}
  - {type: 'tls:seg', offset: 104, content: '', id: KR3k0012_CHANT_698-2a.5}
  - {type: variant, offset: 104, length: 3, content: 靸小兒, WYG: 識者以為卯謀也必有陰謀烈宗末驃騎恭軍袁恱之始有陰謀之事及隆安遂致大􅅍宋書曰謝靈運好山水尋山陟嶺必造幽峻岩嶂数十里莫不備盡登躡常着木屐上山則去其前齒下則去其後齒又曰虞玩之髙帝鎮東府朝廷致敬玩之為少府猶躡屐造席髙帝取屐視之訛黒釘脱蒵斷以草接之問曰卿此屐已幾載玩之曰初釋褐拜征北行佐買之着已三十年貧士竟不易辦髙帝咨嗟因賜以新屐玩之不受問其故荅曰公之賜恩華俱重但舊簮弊席復不可遺所以不敢當帝善之又曰劉凝之有嘗認其著屐笑曰僕著已敗今家中覔新者償君此人後田中得所失送還不肯復取齊書曰沈麟士昔嘗行路隣人認其所著屐麟士曰是卿屐耶即跣而反隣人得屐送前者還之麟士曰非卿屐耶笑而受之蕭子顯齊書曰襄陽有盗發古塜者傳云是楚王冢獲玊屐玉屏風梁書曰范亷為呉興太守廣陵髙爽有險薄才客於亷委以文記爽嘗有求不遂乃為屐謎以喻亷曰刺鼻不知啑蹋面不知瞋齧齒作歩数持此得勝人譏其不計耻辱以此取名位論語隠義注曰孔子至蔡觧於客舎人夜有取孔子一隻屐去盗者置屐於受盗家孔子屐長一尺四寸與凢人屐異孔叢子曰孔穿振方屐見平原君宗元嘉起居注曰劉禎弹廣州刺史韋朗􅂍有白荆屐六七十量風俗通曰延加中京師長者皆着木屐婦女始嫁作漆􅀞屐五色綵為系後黨事起九族俱繫婦人桎盖木屐之像世說曰王子敬兄弟見郄公躡屐問訙甚修外生禮及嘉賔死着髙屐儀容輕慢毎命坐皆云有事不暇坐郄公慨然曰若使嘉賔不死䑕軰敢爾語林曰鄭𤣥在馬融門下業成辭歸融心忌之鄭𤣥亦疑有追乃坐橋下㨿屐融果轉式逐之告左右曰𤣥在土下水上而㨿木必死矣遂罷追竟以免華陽國志曰何随家養竹人盗其筍随行見恐盗者覺挈屐而歸皇甫謐髙士傳曰袁閎字夏甫汝南人也築室於庭首不著布身無单衣足著木屐汝南先賢傳曰戴良嫁女布裳木屐秦記曰苻健皇始四年新平縣有長人見語民張靖曰苻氏應天受命當太平健以為妖妄下靖獄是月河渭溢浦津監冦登於河中得隻屐長七尺三寸跡稱}
