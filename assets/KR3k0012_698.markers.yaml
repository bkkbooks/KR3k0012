  - {type: variant, offset: 3470, length: 0, content: '', SBCK: 築室於庭首不着布身無單衣足着木屐汝南先賢傳曰戴良嫁女布裳木屐􅁗記曰符健皇始四年新平縣有長人見語民張靖曰符氏應天受命當太平健以爲妖妄下靖獄是月河渭蒲坂津竪寇登於河中得􅃗屐長七尺二寸稱履五指長尺餘指尺􅀷寸登以獻健因赦靖劉欣期交州記曰趙嫗者九真軍安縣女子乳長數尺不嫁入山聚羣盗常着金摛踶屐􅁃仲雍荆州記云劉盛公枝江人桓司空臨州與上佐遊於靈溪盛公詣市還着皂盖布裙以杖荷􅄚詣桓司空神仙傳曰左慈見孫討逆着鞭駈馬慈着木􅄚䇿杖徐歩然終不能及乃止搜神記曰昔作屐婦人圎頭男子方頭盖作意欲别男女也太康婦人皆方頭􅄚與男無别集異記曰廣平游先期妄見一人着赤袴褶知是其魅乃以刀斫之乃死良乆方變是所常着履異􅁐曰介子推逃禄隱跡枹樹燒死文公拊木哀嗟伐而製屐每懷割股之功俯視其屐曰悲乎足下足下之稱將起於此又曰丹陽縣有梅姑廟姑生時有道術能着屐行水上後􅀒道法壻怒殺之投其屍於水上乃隨波流漂至今廟處晦望之日時見水霧中曖然有屐夢書曰麄屐爲使令卑賤􅀋也夢得麄屐得僮使也王襄僮約曰持斧入山斷輮裁轅若有餘材當作俎几木屐屣􅀃文曰屣鞮屬也鞮革履也史記曰漢孝武帝云使朕誠得如黄帝視弃妻子如脫屣耳魏志曰王粲字仲宣蔡邕見而竒之賔客盈坐聞王到倒屣迎之後漢書曰皇甫規有當丗重望郷人有行賄爲郡守謁規規卧不起聞王符至遂倒屣而迎春秋後語曰魏太子擊逢文侯之師田子方於朝歌朝歌紂之所都金衛州地引車避下謁之田子方不爲禮太子擊因問曰富貴者驕人乎貧賤者驕人乎子方曰貧賤者驕人耳夫諸侯而驕則失國大夫而驕則失家冨貴者安敢驕人貧賤驕人耳行不合言不從則去之楚越􅀂脫屣然太子不懌而去淮南子曰堯之有天下也年衰志悶舉天下而傳之舜猶却行而脫屣孟子曰舜視弃天下猶弃弊屣也丗􅀃曰何晏爲吏部尚書王弼未弱冠徃見之晏倒屣迎之鞾與靴同釋名曰鞾夲胡服也趙武靈王始服之北齊書曰鄭太妃􅀄與神武避葛榮同走并州􅀒困燃馬屎自作鞾又曰任王諧爲并州刺史有婦人臨汾水浣衣有乗馬人換其新靴而去婦人持}
