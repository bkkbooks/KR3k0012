  - {type: variant, offset: 2703, length: 125, content: 鄭玄曰王告服有九舄有三等赤舄為上冕服之舄也王后亦服六唯祭服有舄鄭司農云赤繶黃繶黃繶以黃赤云絲為下緣繶音憶左傳曰楚子次于乾谿兩雪王皮冠秦復陶秦所遺羽衣也翠被以翠羽飾被豹舄以豹皮為履執鞭以出三禮六服圖曰王后翬衣玄舄榆翟赤舄鞠衣著履鞠衣以下皆履之三禮圖曰複, SBCK: 􅃨}
