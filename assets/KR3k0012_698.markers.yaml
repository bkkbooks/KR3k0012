  - {type: variant, offset: 1750, length: 0, content: '', krp: 古人言屨以通於複今人言屨以通於單句當爲約赤繶黄繶以赤黄之絲爲下縁也辨外内命夫命婦之屨功屨散屨功屨次命屨散屨去飾著大戴禮曰入於户未嘗越屨}
  - {type: variant, offset: 1751, length: 0, content: '', krp: 髙柴之行也禮曰侍坐於長者屨不上堂解屨不敢當階就屨跪而舉之屏於側向長者而屨跪而遷屨俯而納屨又曰户外有二屨言聞}
