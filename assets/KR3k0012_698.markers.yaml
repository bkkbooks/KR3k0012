  - {type: variant, offset: 1454, length: 100, content: 其弟上遺同心七寶綦履又曰度安世年十五為成帝侍郎常著輕絲履又曰匡衡邑人有說詩者衡從與語質疑邑人推服到履而去拾遺錄曰穆王起春宵之宮西王母來焉納丹豹文履魏武帝遺令曰諸舍中可學作組履賣之又內式令曰吏民多製文繡, krp: ''}
