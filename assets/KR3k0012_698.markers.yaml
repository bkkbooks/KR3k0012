  - {type: variant, offset: 2428, length: 325, content: 白履劉楨魯都賦曰纖纖絲履粲爛鮮新表以文組綴以朱蠙曹植洛神賦曰踐遠遊之人履曳霜綃之輕裙古樂府詩曰君子防未然不處嫌疑間瓜田不納履李下不正冠張華輕薄篇曰足下黃金履手中雙莫耶甄述女詩曰足躡承雲履豊趺暠春錦古詩曰頭上金釵十二行足下絲履五文章傅玄履銘曰戒之哉念履正無履邪正者吉之路邪者凶之徵賈誼弔屈原文曰章甫薦履漸不可久嗟若先生獨離此咎舄崔豹古今注曰舄以木置履下乾腊不畏泥溺也方言曰履中有木者謂之複舄自關而東謂之複履其上單者謂之宛下單者謂之鞮詩曰公孫碩膚赤舄几几又南有嘉魚車攻曰赤芾金舄箋云金舄黃朱色也周禮天官下曰屨人掌主及后之服屨為赤舄黑舄赤繶黃繶青句素屨葛屨鄭玄曰王告服有九舄有三等赤舄為上冕服之舄也王后亦服六唯祭服有舄鄭司農云赤繶黃繶黃繶以黃赤云絲為下緣繶, WYG: 衣屩}
