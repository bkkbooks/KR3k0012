  - {type: variant, offset: 108, length: 0, content: '', WYG: 五指長尺餘文深一寸登以獻健因赦靖劉欣期交州記曰趙嫗者九真軍安縣女子乳長数尺不嫁入山聚羣盗常着金擒踶屐庾仲雍荆州記云劉盛公枝江人桓司空臨州與上佐逰於靈溪盛公詣市還着皂盖布裙以杖荷屐詣桓司空神仙傳曰左慈見孫討逆孫著鞭驅馬慈著木屐䇿杖徐歩然終不能及乃止捜神記曰昔作屐婦人圓頭男子方頭盖作意欲别男女也太康婦人皆方頭屐與男無異集異記曰廣平游先期妄見一人着赤袴褶知是其魅乃以刀斫之乃死良久方變是所常着屐異􅁐曰介子推逃禄隠跡抱樹燒死文公拊木哀嗟伐而製屐毎懷割股之功俯視其屐曰悲乎足下足下之稱實起於此又曰丹陽縣有梅姑廟姑生時有道術能着屐行水上後負道法婿怒殺之投其屍於水上乃随波流漂至今廟處晦望之日時見水霧中暧然有屐夣書曰粗屐為使令卑賤􅁼也夣得麄屐得僮使之也王褒僮約曰持斧入山斷輮裁轅若有餘材當作爼几木屐屣說文曰屣鞮属}
