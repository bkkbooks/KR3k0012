  - {type: variant, offset: 3440, length: 188, content: 公問焉文王曰吾聞亡君所與處盡其役寡人雖不肖所與處皆先君之人也故無令結之漢舊儀曰凡齋玄豹襪耕用青襪會稽典錄曰賀劭為人美容止與人交久益敬之在官府常著襪希見其足崔浩女儀曰近古婦以冬至日進履襪於舅姑張衡南都賦曰羅襪躡跡而容與曹植洛神賦曰凌波微步羅襪生塵也皇甫規與馬融書曰謹上襪一量以通微薄秦嘉婦與嘉書曰今奉細布襪二量高文惠婦與文惠書曰今奉織成襪一量曹植賀冬表曰獻襪七量并為襪頌曰玉趾既, WYG: 平}
