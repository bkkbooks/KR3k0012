  - {type: variant, offset: 3246, length: 2, content: 中山, SBCK: 􅀽盎使呉呉}
  - {type: variant, offset: 3246, length: 0, content: '', WYG: 江夏劉勤貧作屦供食常作一量縷㫁勤置不賣出行妻賣以糴米勤歸而炊熟怪問何所得米妻以實告勤責妻曰賣毁物欺取其直也因弃不食仕至司徒宋書曰劉敬宣嘗夜與僚佐宴空}
  - {type: variant, offset: 3246, length: 2, content: 中山, krp: 袁盎使呉呉}
  - {type: variant, offset: 3247, length: 3, content: 山王來, WYG: 有投一隻芒屩於坐墜敬宣食盤上長三尺一寸已經人著耳鼻間並欲壊頃之敬宣叅軍司馬道賜反敬宣為其所害又曰張暢在彭城為魏太武所圍太武遣李伯至城欲與暢語李伯君南土膏粱何為着屩君而着此使将士云何暢曰膏梁之言武誠為愧但以不武受命統軍戎陣之間不容綏服齊書曰沈瑀為餘姚令瑀初至富吏皆鮮衣美服自彰别瑀怒曰汝等下縣吏何得自擬貴人悉使着芒屩粗布侍立終日足有蹉趺輙加榜捶又曰禇彦回幼有清譽宋元嘉末魏軍逼𤓰歩百姓咸負擔而立時父湛之為丹陽尹使其子弟並着芒屩於齋前習行或譏之湛之曰安不忘危彦回時年十餘甚有慙色梁書曰侯景即位童謡曰脫青􅂁着芒屩荆州太子挺􅀿着又曰何㸃方尚書乘柴車躡草屩恣心所適致醉而歸陳書曰沈衆武帝時兼起部尚書監起太極殿恒卧布袍芒屩以麻䋲為帶}
