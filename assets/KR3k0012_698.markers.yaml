  - {type: variant, offset: 2955, length: 183, content: 赤玉舄一枚以報拾遺錄曰秦王子嬰寢於望夷宮夜夢有人長文鬚鬢絕青納王舄而乘丹車告云天下當亂王乃殺趙高所夢則始皇之靈所著舄則安期所遺者列仙傳曰黃帝葬橋山山崩無尸唯劍舄存衝波傳曰足履萬錢之舄漂如日光宛如遊龍風俗通曰孝文身履革舄而衣弋綈又曰俗說明帝時尚書郎鄴令王喬每月朔常詣臺朝帝怪其來數而無車馬密令太史候望言其臨至時常有雙鳧從東南飛來因舉羅得一隻舄使上方識是四年中所賜尚書履, krp: 供飲食}
