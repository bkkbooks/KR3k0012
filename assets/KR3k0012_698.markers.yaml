  - {type: variant, offset: 124, length: 1730, content: 於則作履扉於則黃帝臣草曰扉麻曰履也方言曰絲作之麻作之不借組者謂之履屨朝鮮洌水之上謂之邛角南方江沔之間總謂之麤梁益謂之屣或謂之䋀下几反一音盡履其通語也徐士邳沂之間今下邳沂音圻謂之叩角緉𦄍上兩下爽閞之東西或謂之緉或謂之𦄍其通語也史記曰張良嘗遊於下邳圯上有一老父至良所墮其履圯下顧謂良曰孺子下取之父曰履我良業為取履因長跪進之又曰東郭先生待詔公車貧困飢寒衣幣不完行雪中履屨有上無下足盡踐地道中人笑之又曰趙平原君使人於春申君欲誇楚為瑇瑁簪刀劍之室飾以珠玉而春申君客三千餘人其上客皆躡珠履趙使大慚又曰淳于髡曰杯盤狼籍履舄交錯漢書曰王莽好高冠厚履又曰鄭宗哀帝擢為尚書僕射數諫爭每見曳革履上笑曰我識鄭尚書履聲魏志曰曹公令曰議者以祠廟當解履吾受賜命帶劍不解履上殿今有事于廟而解履是尊先公而替王命敬父祖而簡君主也吾不敢脫履上殿蜀志曰先主少孤織履為業曹公罵云賣履舍長又曰劉琰妻胡入賀太后后特留胡經月乃出胡有美色琰疑其與後主有私呼卒伍伯撾胡以履搏面胡具以言告琰坐下獄有司議曰卒非撾妻之人面非受履之地琰竟棄市晉書曰夜武庫火累代之寶皆焚焉孔子履漢祖斬蛇劍王莽頭並失又曰符健時霖雨河水溢浦津監寇登得一履於河長七尺三寸內指跡長一尺深三寸續晉漢陽春秋曰江州剌史王弘造陶淵明無履弘從人脫履以給之語左右為彭澤作履左右請履度淵明於眾坐伸腳令度及履至著而不疑晉惠帝起居注曰帝還洛陽至陵下謁無履取左右履著下拜趙錄曰佛圖澄卒葬後郭門吏報石季龍云是師攜一履西去季龍發其墓唯見一履與一石後魏書曰王遵業從容恬素若處丘園嘗著穿履好事者多毀新履以學之宋書曰益州道士邵碩元徽二年忽告人云吾命終因臥而死後人見碩在荊州上明以一隻故履縛左腳而行甚疾遂不知所之齊書曰高祖儉素宮人盡令著紫絲履太公金匱履之書曰行必慮正六韜崇侯虎曰今周伯昌懷仁而善謀冠雖弊禮加於首履雖新法以踐地可及其未成而圖之又曰昔帝堯王天下黼衣絓履不弊不更為也晏子曰公問曰子近市識貴賤乎時公繁刑晏子曰踊貴履賤公愀然遂緩刑又曰景公為履黃金之綦飾以銀連以珠良玉之約其長尺又曰景公為履飾以金玉服以聽朝履重僕不能舉之問曰天寒乎晏子曰古之制衣服冬輕而煖夏重而清金玉之履是重而寒也公入徹履孫卿子曰大布之衣簏紃之履可以養體也莊子曰儒者冠圓冠者知天時履方屨者知地形又曰曾子居衛捉𥘞而肘見納履而踵決韓子曰鄭人有欲買履者先自度足而置其坐往市而忘操之見履乃曰吾忘度足乃歸取之市罷不得履人曰何不試以足曰寧信度數無自信也又曰文王履係解視左右盡賢無可使係者因俛而係之又曰魯人身善織履其妻善織縞而徙於越或謂之曰子必窮履飾足也而越人跣縞為冠之也而越人被髮欲不窮可得乎賈子曰天子黑方履諸侯素方履大夫素圓履賈誼書曰昔楚昭王與吳戰楚軍敗昭王走而履決失之行三十步復旋取左右問曰何惜此一踦履乎王曰楚國雖貧豈愛一踦履哉惡與偕出弗與俱反也自是之後楚國之俗無相棄者又曰履雖鮮弗加之於枕冠雖弊弗以苴履又曰二世胡亥之為公子曰詔置酒享群臣召諸子賜食先罷胡亥下階群臣陳履狀善者因行踐敗而去諸侯聞之者莫不太息及二世即位皆知天下必棄之淮南子曰禹之趍時冠挂而弗顧履遺而不取鹽鐵論曰古者庶人鹿菲草履今富者韋沓絲履風俗通論數曰踦者奇也履舄之一也夢書曰履襪為子屬體末也若夢得履襪者必有子息也履者為男襪者為女也西京雜記曰趙飛鷰為皇后其弟上遺同心七寶綦履又曰度安世年十五為成帝侍郎常著輕絲履又曰匡衡邑人有說詩者衡從與語質疑邑人推服到履而去拾遺錄曰穆王起春宵之宮西王母來焉納丹豹文履魏武帝遺令曰諸舍中可學作組履賣之又內式令曰吏民多製文繡之服履絲不得過絳紫金黃絲織履前於江陵得雜綵絲履以與家約當著盡此履不得效作也晉令曰土卒百工履色無過綠青白婢履色無過紅青古儈古會切賣者皆當著巾帖額題所儈賣者及姓名一足著黑履一足著白履東宮舊事曰太子妃有絳地絞履一緉漢舊儀曰乘輿帶七尺斬蛇劍履虎尾約履徐乾古履儀曰正會大司馬問劍履上殿義徐言所以遂見從著履上殿時人見咸譏云古無履但有舄今當著舄上殿不宜著履案周禮天王赤舄黑舄后素葛履鄭君注曰複下曰舄單下曰履是則古有履也蔡謨荅臺符分別履舄之名事曰被符小會義注侍臣劍履升殿而摯虞決疑言劍舄履之名宜審謹案今時所謂履者自漢以前皆名屨屨左傳曰踊貴履賤禮曰戶外有二屨不言二履賈誼曰冠雖弊不以苴屨亦不言苴履言履者猶足所履踐耳詩云, SBCK: ''}
