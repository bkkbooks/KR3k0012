  - {type: variant, offset: 3646, length: 2, content: 襪銘, SBCK: 屩供食常作一量屨斷勤置不賣出行妻賣以糴米勤歸炊熟恠問何所得米妻以實告勤責曰妻賣毀物欺取其直也因弃不食仕至司徒宋書曰劉敬宣嘗夜與僚佐宴空中有投一􅃗芒屩於坐墜敬宣食盤上長三尺寸巳經人着耳鼻間並欲壞頃之敬宣叅軍司馬道賜反敬宣爲其所害又曰張暢在彭城爲魏太武所圍太武遣李孝伯至城欲與暢語李伯曰君南􅁟膏梁何爲着屩君而着此使將士云何暢曰膏梁之言武誠爲愧但以不武受命統軍戎陣之間不容綏服齊書曰沈瑀爲餘姚令瑀􅀄至富吏皆鮮衣美服自彰別瑀怒曰汝等下縣吏何得自擬貴人悉使著芒屩麄布侍立終日足有蹉跌輙加榜捶又曰禇彦回㓜有清譽宋元嘉末魏軍逼􅀲歩百姓咸􅀒擔而立時父湛之爲丹陽尹使其子弟並着芒屩於齋前習行或譏之湛之曰安不忘危彦回時年十餘甚有慙色梁書曰侯景即位童謡曰脫青􅂁着芒屩荆州天子定應着又曰何􅀧方尚書乗柴車躡草屩恣心所適致醉而歸陳書曰沈衆武帝時兼吏部尚書􅁥起太極殿恒卧布袍芒屩以麻䋲爲帶朝士咸共誚其所爲唐書曰孟元陽起於陳許軍中理戎整肅曲環主屯作西華元陽芒屩立稻田中湏役者退而方去風土記曰美朱爽之輕履篾龍舄之文章爽藤也赤色縁木而長大如箭竿越人以爲屩經以青芒行山草便於用靴故越人重之捜神記曰元康之末至太安之間江浦之域有敗屩自聚於道多或至四五十兩人散去之投林草中明日視之悉復矣民或云見狸銜而聚之丗之所􅀃屩者人之賤服而當勞辱下民之象也敗者疲弊之像也道者地理四方所以交通王命所由徃來也今敗屩聚於道者象下民疲病將相聚爲乱絶四方而壅王命臨海水􅁟記曰屩魚長一尺狀如屩形俗説曰劉真長少時居丹徒家至貧劇方回數出南射堂射劉往市賣屩路經射堂邊過人無不看射劉過􅀄不迴頋方回異之遣問信荅云老母朝來未得食至市貨屩不得展詣後過劇呼之使來與共語覺其佳􅀏林曰南方人至京師者人戒之曰汝得物唯食愼勿問其名也後詣主人入門内見馬矢便食惡臭乃歩進見敗屩弃於路因復嚼殊不可咽頋伴曰且止人言不可皆信後詣貴官爲設饌因相視曰故是首物且當勿食􅓏音爕宋書曰􅀽粲爲丹陽尹歩􅓏白陽郊野間遇一士人便呼與飲明日此人謂􅀍知到門求進粲曰昨飲酒無偶聊相要耳竟不與相見齊書曰江泌字士倩濟陽人也少貧好學書則斫􅓏爲業夜則讀書隨月光光斜則握卷升屋梁書曰臨川王宏奢侈過度後庭數百十人皆極天下之選所倖江無畏服玩侔於齊東昏潘妃寳􅓏直千萬太平御覽卷第六百九十八}
