  - {type: variant, offset: 2965, length: 528, content: 盜以泉府同貨而歛賖同者謂民貨不售則為歛而買之民無貨則貫而子之凡會同師役市司帥賈師而從治其市政掌其賣儥之事儥買也會同師役必市者大眾所在來物以備之質人掌成市之貨賄人民牛馬兵器珍異凡賣儥者質劑焉大市以質小市以劑鄭玄曰質劑月平賈也質大賈劑小賈玄謂質劑者為之劵書藏之也又曰賈師凡國之賣儥各帥其屬而嗣掌其月禮記曲禮曰君子雖貧不鬻祭器左傳昭七曰公在乾侯平子每歲賈馬賈買也具從者之衣履而歸之于乾侯公執歸馬者賣之賣其馬用不歸馬史記曰子貢既學於仲尼退而仕衛鬻財於曹魯之間戰國策曰燕昭王見郭隗曰齊因孤國之亂而襲破燕對曰古之人君以千金求千里馬者三年不得涓人請求之三月得千里馬馬已死五百金買其首反以報君君大怒對曰死馬尚市況生馬乎朞年千里馬至者二漢書曰漢興接秦之弊諸侯並起民失作業而大飢饉米石五千人相食死者過半高祖令人無得賣子就食蜀漢天下既定民無蓋藏蘇林曰無物可蓋藏又曰衛青比年學擊胡賦稅既不足以奉戰士有司請令民得買爵及贖禁錮免罪請買賞官名曰武功爵級七十萬又曰桑弘羊置平准於京師當天下委輸王官治車諸器比市給大農大農諸官盡籠天下之貨物貴則賣之賤則買之如富商大賈亡所牟大利牟取又曰禹貢尚書欲令近臣自諸曹侍中以上家無得私販賣者又曰中平元年初賣官自關內侯以下至虎賁羽林入錢各有差公千萬卿五百萬, WYG: ''}
