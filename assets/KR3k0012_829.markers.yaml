  - {type: variant, offset: 15, length: 6, content: 皮角筋骨入于, WYG: 業而卒乘輯睦事不奸矣奸犯也又成公下曰荀罃之在楚鄭賈人有將寘諸禇中以出既謀之未行而楚人歸之賈人如晉荀罃善視之如實出已賈人曰吾無其功敢有其實乎吾小人不可以誣君子遂適齊左𫝊昭元曰魯曽阜曰賈而欲贏而惡囂乎又昭公曰子干歸韓子問於叔向曰子干其濟乎對曰難宣子曰同惡相求如市賈焉何難對曰無與同好誰與同惡言棄疾本不與子干同好則亦不得同惡又昭公六曰臧㑹奔郈郈魴假使為賈正焉又昭公十六年曰鄭子産對韓宣子曰昔我先君桓公與商人皆出自周庸次比耦以艾殺此地斬之蓬蒿藜藿而共處之世有盟誓以相信也曰爾無我叛我無强賈母或匄奪爾有利市寶賄我勿與知恃此質誓故能相保以至於今今吾子以好來辱而謂敝邑强奪商人是教敝邑背盟誓也毋乃不可乎又定公下曰衛}
