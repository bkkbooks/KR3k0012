  - {type: variant, offset: 914, length: 19, content: 百萬乃益釀醇酒買刀劍衣服少年來酤者皆賖, WYG: 諫止不聴即脫身為傭嵗餘得錢帛歸以}
  - {type: variant, offset: 915, length: 715, content: 萬乃益釀醇酒買刀劍衣服少年來酤者皆賖與之視其乏者輒假衣裳不問多少又曰劉寬嘗坐客遣蒼頭市酒遷久大醉而還遷久猶良久也客不堪之罵曰畜產寬須臾遣人視奴疑必自殺顧左右曰此人也罵言畜產辱孰甚焉故吾懼其死也又曰崔寔初父卒剽賣田宅起家瑩立碑頌廣雅曰剽削也音疋妙反葬訖資產竭盡因窮困以酤釀販鬻為業時人多以此譏之寔終不改亦取足而已不致盈餘吳志曰潘璋字文章性愽蕩嗜酒居貧好賒酤債家至門輒言後豪當相還宋書曰吏部尚書庾仲文尚書中令奴酤酃酒利其百十後魏書曰鄭羲為西兗州刺史多所受納政以賄成性又嗇恡人有禮餉者不與盃酒臠肉西門受羊酒東門酤賣之唐書曰建中三年初搉酒天下悉令官釀斛收直三千米雖賤不得減二千委州縣綜領醨薄私釀罪有差以京師王者都特免其搉又曰和元十四年湖州刺史李應奏先是官酤酒代百姓納搉歲月既久為弊滋深伏望許令百姓自酤取登舊額仍許入兩稅隨貫均出依舊例折納輕貨送上都許搉酒錢舊皆隨兩稅徵眾戶自貞元已來有土者競為進奉故上言百姓困弊納輸不充請置官坊酤酒以代之既得請則嚴設酒法閭閻之人舉手觸禁而官收厚利以濟其私為害之日久矣及李應奏罷議者謂宰臣能因一州之請推為天下之法則其弊革矣韓子曰宋有酤酒者升概甚平遇客甚謹為酒甚美懸旗甚高然而酒酸不售怪其故問所知閭長者楊青青曰汝狗猛也曰狗猛也何故不售曰人畏焉或令孺子懷錢挈壺往酤而狗迎齕之酒所以酸而不售夫國亦有狗猛欲道之士懷其術而往欲以明萬乘之主臣為狗猛迎而齕之如此則主所以蔽賢士所以不用也賈誼新書曰鄒穆公視民如子及死酤家不售酒童子不謳歌列仙傳曰酒客者梁市上酒家客也作酒常美日售萬錢有過主人逐之主人酒更酸敗遂至貧窮又曰女凡者陳留酤酒婦也作酒甚美遇仙人過飲以素書五卷為質久開書乃養性交接之術閉房與諸少年飲酒與宿止行文書法顏色更好如, SBCK: ''}
