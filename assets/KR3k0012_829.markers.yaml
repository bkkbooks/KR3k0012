  - {type: variant, offset: 152, length: 254, content: 隱晉書曰愍懷太子令人屠肉自已分齊手揣輕重斤兩不差公曰其母本屠家女齊書曰王敬則少時屠狗商販遍於三吳後為吳興太守入烏程從市過見屠肉枅歎是我少時在此作也召故人飲酒說平生不以屑也蕭子顯齊書曰帝於芳樂苑立市太官每旦進酒肉雜肴使宮人屠酤周書曰太祖常遊上黨有市屠壯健眾多畏憚太祖氣凌淩之嘗醉命屠進几割肉小不如意叱之屠坦其腹謂太祖曰爾豪則刺我太祖即剚其腹市人駭觀執之屬吏李繼韜惜而逸之孔叢子曰子高謂齊王曰昔臣嘗行臨淄市見屠商焉身脩八尺鬚髯如戟市易之男女未有敬之者無德故也莊子曰楚昭王謂司馬子綦曰屠羊說居處卑賤陳義甚高子為我延, WYG: 賞}
