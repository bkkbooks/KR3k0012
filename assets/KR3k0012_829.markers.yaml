  - {type: variant, offset: 5018, length: 192, content: 家易者駔者其首辛也駔音子郎切儈音貢外切後漢書曰吳漢字子顏家貧給事縣為亭長王莽末以賓客犯法乃亡命至漁陽資用乏以販馬為業續漢書曰平原王君公以明道深曉陰陽懷德滅行和光同塵不為皎皎之操王葬世退身儈牛自給有似蜀之嚴君平搜神記曰羊公字雍伯雒陽人本以儈賣為業性篤孝父母終葬無終山遂家焉晉令曰儈賣者皆當著巾白帖額題所儈賣者及姓名一足著白履一足著黑履淮南子曰叚于木晉國之大駔詩慎注曰馬駔市儈也而為文侯師, WYG: 十九}
