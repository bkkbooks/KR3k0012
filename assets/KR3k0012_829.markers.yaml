  - {type: variant, offset: 687, length: 3, content: 關東鄙, SBCK: 宓犧之制杵臼萬民以濟及後人加巧因延力借身重以踐碓而利十倍杵臼又復設機􅀜用驢嬴牛馬及役水而舂其利乃且百倍崔贛易林曰蹇之革曰折挺舂稷君不得食頭養病根無益於病嚴欣期交州記曰糠頭山在合浦海口傳云越王舂米於此積糠所成石虎鄴中記曰有舂車作木人反行碓於車上動則木人踏碓舂行十里成米一斛俗記曰王慶孫爲襄陽都督後之鎮爾時􅃆中蠻盛断道縳得王去將還家}
