  - {type: variant, offset: 34, length: 14, content: 魏公子母忌請朱亥奪晉鄙軍亥笑, SBCK: 禮宗廟之事君親割夫人親舂漢書刑法志}
  - {type: variant, offset: 34, length: 0, content: '', WYG: 吕不韋𫝊曰不韋陽翟大賈人也徃來販賤賣貴家累千金又曰白圭周人也與僮僕同苦樂趨時若猛獸鷙鳥之發故曰吾治生産猶伊尹吕尚之謀孫呉用兵商鞅行法是也其智不足與權變勇不足以决斷仁不能以取予强不能有所守雖欲學吾術終不告之矣葢天下言治生者祖白圭又曰齊俗賤奴虜而刁間獨愛貴之桀黠奴人之所患也唯刁間収取使之逐魚鹽商賈之利或連車騎交守相然愈益任之終得其力起富數千萬故曰寜爵無刁言其能使豪奴自饒而盡其力也漢書髙祖詔曰賈人無得衣錦繡綺縠絺紵􅄢操兵騎馬又曰陳豨反上聞豨將皆故賈人曰吾知與之矣乃多以金購豨將豨將多降又曰周人之失巧為趍利喜為商賈富人則商賈為利又曰通財鬻貨曰商又諺曰以貧求富農不如工工不如商刺繡文不如倚市門此言末業貧者之資也貪賈三之廉賈五之}
