  - {type: variant, offset: 34, length: 14, content: 魏公子母忌請朱亥奪晉鄙軍亥笑, krp: 禮宗廟之事君親割夫人親舂漢書刑法志}
  - {type: variant, offset: 35, length: 0, content: '', WYG: 志曰王烈字彦方於時名聞在邴原管寧之右辟}
  - {type: variant, offset: 36, length: 0, content: '', WYG: 孫度長史以商賈自穢太祖命為丞相椽徵未至卒梁書曰范雲為始興内史入境撫以恩德罷去亭候商賈露宿南史曰陸驗少而貧苦落魄無行邑人郁吉卿者甚富驗傾身事之吉卿貸以錢米驗借以商販遂致千金因出郡下散貲以事權貴北史曰和士開母喪託附者咸闕富商丁周嚴興等並為義孝有一士人在闕出謂人曰嚴興之南丁周之北有一朝士號哭甚哀聞者𫝊之士知而大怒管}
