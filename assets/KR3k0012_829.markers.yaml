  - {type: variant, offset: 4, length: 1, content: 屠, SBCK: 尺曰尋又曰齊管仲曰昔聖王處商就市井夫商羣萃而州處察其四時四時所用者豫資之而􅁥其郷之資􅁥親資財視其貴賤有無以知其市之賈負任檐何脊曰􅀒肩曰檐任抱何揭服牛軺馬以周四方周偏以其所有易其所無市賤鬻貴市取鬻賣旦暮從事於此以􅅚其子弟相語以利相示以頼頼嬴相陳以知賈少而習焉其心安焉不見異物而遷焉是故其父兄之教不肅而成其子弟之學不勞而能夫是故商子􅁪爲商又曰越大夫種曰臣聞之賈人賈人買賤賣貴者夏則資皮冬則資絺絺􅁑精曰絺麄曰綌旱則資舟水則資車以待乏也白虎通曰商賈何謂也商之爲言􅃴其逺近度其有無通四方商賈之爲言固也固有用物以待民來以求其利者也論衡曰揚子雲作法言蜀冨賈人賷錢十萬願載於書子雲不聽夫富無仁義之行猶園中之鹿欄中之牛安得妄載異苑曰晉陵曲阿楊晚資財數千萬三呉人召取直爲商估治生輒得倍冝或行長江卒遇暴風及刼盗者􅀂捉晚錢多􅀗免濟晚死後先所埋金悉移去隣人陳家嘗晨起見門外忽有百許萬鏹封題是楊晚姓字然後知財物聚散必由天運􅀒販禮記曲禮曰夫禮者自卑而尊人雖􅀒販者必有尊也而况冨貴乎負販者尤輕恌志利冝􅀂無禮然尚書大傳曰舜販於須丘漢書曰灌嬰睢陽販繒者􅀃苑曰鮑叔身死管仲舉上袵而哭之泣下如􅀨從者曰非君臣父子也管仲曰非夫子所知也吾嘗與鮑子貧販於南陽吾三辱於市不以我爲怯知我故有所明也魏志曰弘農董遇字季直性質訥而好學興平中􅀜中擾亂與兄季忠依將軍叚煨耒耜負販而常挾持經書投閑習讀其兄􅀏之而不改後魏書曰景穆季年頗親近左右營立田園以収其利髙允諌曰夫天下者殿下之天下冨有四海何求而不􅀗而乃與販夫販婦競此尺寸傭賃左傳襄公二十七年曰崔氏之亂在二十五年申鮮虞求奔僕賃於野以喪莊公爲齊莊公服喪冬楚人召之遂如楚爲右尹傳言楚能用賢史記曰倪寛貧無資用常爲弟子都養時間行傭賃以給衣食行常帶經止息則誦習之又曰范睢微時弊衣間歩見須賈須賈見之驚曰叔今何事范睢曰臣爲傭賃賈哀之留與坐飲食乃取一綈􅂁以賜之漢書曰欒布梁人彭越爲家人時常興布遊窮困賣傭於齊爲酒家保數嵗別去而布爲人所略賣爲奴又曰匡衡字稚圭東海人父丗農夫至行衡好學家貧傭作以供資用後漢書曰鄭均好黄老書兄仲爲縣遊徼頗受禮遺均數諌止不聽即脫身爲傭歳餘得錢帛歸以與兄曰物盡可復得爲吏坐􅂍終身􅂢弃兄感其言遂爲廉㓗謝承後漢書曰施延字君子少爲諸生明於五經家貧母老周流傭賃避地於廬江臨湖縣種􅀲後復到呉郡海塩取卒月直賃作半路亭下以養其母是時呉㑹未分山隂馮敷爲督郵到縣延持箒徃敷知其賢者下車謝使入亭請與飯食訖脫衣與之餉餞不受華嶠後漢書曰范式爲荆州刺史友人南陽孔嵩家貧親老乃變名姓傭爲新野阿里街卒式行部到新野而縣選嵩爲道騶迎式式見而識之呼嵩把臂謂子曰非孔仲山􅁘對之歎息語及平生曰昔與子俱曳長􅅂遊集帝學吾蒙國恩致位牧伯而子懷道隱身處於卒伍不亦惜乎昔侯嬴長守於賤業晨門肆志於抱􅀜子居九夷不患其陋貧者士之冝豈爲鄙哉勑縣代嵩嵩以爲先傭未竟不肯去東觀漢記曰公沙穆來遊大學無資糧乃變服客傭爲呉祐賃春祐與語大驚遂共定交於杵臼之間又曰􅀄梁鴻於大家單伯通家傭舂爲事歸其妻具食不敢於鴻前仰視舉案常齊眉伯通察而異之曰彼傭能使其妻敬之又曰班超字仲升家貧恒爲官傭冩書嘗輟書投筆歎曰大丈夫當効傅介子張騫立功異域以取封侯安能乆事筆硯乎呉志曰闞澤字德潤㑹稽山隂人也家丗農夫至澤好學家貧無資常與人傭書以供􅁓筆所冩旣畢誦讀亦周齊書曰張敬兒之爲襄陽府將也家貧毎休假輙傭賃自給嘗爲城東呉泰家檐水通泰所愛婢事發將􅀍泰殺逃賣棺材中以盖加上乃免又曰王僧孺篤愛墳籍家貧常傭書以養毎冩畢諷誦亦了又曰馮道根少􅀌家貧傭賃以養母行得甘肥未嘗先食必遽還以遺母南史曰呉逵經飢荒男女死者三十人唯逵夫妻􅀗全家徒四壁立冬無􅀍袴晝則傭賃夜則伐木燒塼妻亦同逵此誠無有懈倦漢皇德頌曰侯瑾字子瑜燉煌人少􅀌貧依宗人居性篤學􅁪慵作爲資暮還􅂺􅅡柴讀書檐釋名曰檐任也力所勝任也後漢書曰趙孝字長平父普王莽時爲田禾將軍任孝爲郎毎告歸常白衣步擔從長安還欲止郵亭亭長先時聞孝當過以有長者客掃洒待之孝旣至不自名長不肯内問曰聞田禾將軍子當從長安來何時至乎孝曰㝷到矣於是遂去東觀漢記曰馬成爲郯令上征河北成嬴衣歩檐渡河詣上魏志曰曹休年十餘􅀊喪父獨與一客檐喪假葬携將老母渡江至呉魏略曰吴禧字子牙京兆人也丗單家貧少好學􅀄平中三輔亂禧南客荆州不以荒擾擔􅀒經書毎以採稆餘日則誦習之晉書曰郭文字文舉少愛山水尚嘉遁洛陽䧟乃歩擔入呉興餘姚大辟山中獵者時徃􅀉􅀫文夜爲檐水而無勌色又曰譙秀字元彦在蜀遇范賁蕭敬相繼作亂秀乃避難宕渠郷里宗族旅慿之者以百數秀年出八十衆欲代之􅀒檐秀曰各有老弱當先營護吾氣力猶足自堪豈以垂朽之年累諸君也又曰王澄字平子兄衍妻郭氏性貪鄙欲令婢路上檐糞澄年十四諌郭以爲不可又曰董養字仲道見洛陽東北歩廣里地䧟有二鵝出焉其蒼者飛去白者不能飛知白者國家之象頋謂謝阮季曰易稱知幾其神君等可􅀷藏矣乃與妻荷檐入蜀莫知所終齊書曰桓康隨武帝在贑縣㤗始􅀄武帝起義爲郡所縶衆皆散康裝檐一頭貯穆后一頭貯文惠太子竟陵王子良自􅀒置山中與門客蕭欣祗等四十餘人相結破郡獄出武帝梁書曰司馬申太清之難父母俱没因此自擔土菜食終身後魏書曰髙允性好文學擔笈􅀒書千里就業方言曰嬴旅荷騰擔也齊楚陳宋之間曰嬴燕之外郊越之東甌呉之外鄙謂之旅南楚謂之嬴自􅀜而西隴冀以徃謂之荷凡以驢馬駝載物者謂之負他音大亦謂之荷郭璞注曰今江東單檐兩頭物爲騰莊子嬴糧起之擔者用膂力因以名之先賢行狀曰平原王烈字彦考國中有盗牛者牛主得而放之盗者曰子旣放我幸無使王烈聞之間年國中行路老父負檐重有人代檐行數十里至家而去問姓名不語頃之老父失劒於路有人得而守之至暮劒主還見之乃代檐人也老父曰子前代吾檐不得姓名今復守吾劒子誠賢人可語吾姓名以告王烈使人問之乃昔時盗牛人也烈使國人表其廬而異焉舂􅀃文曰舂擣粟也}
