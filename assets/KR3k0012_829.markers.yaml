  - {type: variant, offset: 2696, length: 268, content: 如早索我於枯魚之肆楊子法言曰好書不能要諸仲尼書肆也李軌注曰賣書市也書不經非書也語林曰王仲祖少有三達覽鏡自翫曰王開山郍生此兒又酷貧帽敗自以形美乃入帽肆就帽嫗戲乃得新帽店世說曰阮脩字宣子常步行以一百錢桂杖頭至酒店上便獨酣暢崔豹古今注曰店置也以置貨鬻之物賣買周禮地官下曰泉府掌以市之征布歛市之不售貨之滯於民用者以其賈買之物揭而書之以待不時而買者賣者各從其抵都鄙從其主國人郊人從其有司然後予之又曰司市掌市之治教以量度成賈而徵儥儥買也物有定賈則買者來也以質劑結信而止訟質劑謂兩書一札而別之也以賈民禁偽而除詐以賈民為之者知物之情偽與實詐以刑罰禁虣而, WYG: 肯}
