  - {type: variant, offset: 4153, length: 170, content: 馬氏兄弟五人共居此地作五門客舍因以為名主養豬賣豬故民為之語曰苑中三公鉅下二卿五門藿藿但聞豚聲三輔黃圖曰元始四年起明堂辟雍長安城南北為會市但列槐樹數百行為隊無牆屋諸生朔望會此市各持其郡所出貨物及經書傳記笙磬器物相與賣買雍容揖讓或論議槐下董卓別傳曰呂布殺卓百姓相對欣喜抃舞皆賣家中珠環衣服床榻以買酒食自相慶賀長安酒肉為之踊貴漢武內傳曰帝先有玉板, WYG: 成米}
