  - {type: variant, offset: 3732, length: 358, content: 嫂亡無以葬自賣為十天客以營冢槨從祖弟敬夫妻荒年被略賣江北達之有田十畝貨以贖之南史曰會稽寒人陳氏有三女無男祖父母年八九十老無所知又篤癃病每不安其室遇寒飢三女相率於西湖採菱蒪更日至市貨賣未嘗虧怠鄉里稱為義門北史曰齊常景躭好經史愛翫文詞若遇新異之書殷勤求訪或復貨買不問價之貴賤必以得為期晏子春秋曰靈公好婦人丈夫飾者國盡服之公使禁之曰女子以男飾者裂其衣斷其帶裂衣斷帶相望不止公問晏子晏子曰公服之於內而禁之於外猶懸牛首於門鬻馬肉於市公曰善使內勿服不環月而國人莫服韓子曰楚人賣珠於鄭為木蘭之櫝薰以桂椒綴以珠玉飾以玫瑰緝以翡翠鄭人買其櫝還其珠可謂善賣櫝不可謂善鬻珠又曰宋之富賈有監止子者與人爭買百金之璞因佯失而毀之負其百金而理其毀得千溢焉又曰諺所謂傭自賣哀而不售士自譽辨而不信者也又曰田脩教其子田章曰主賣官爵臣賣知力故曰自恃無恃人, WYG: ''}
