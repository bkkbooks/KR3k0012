  - {type: variant, offset: 4594, length: 423, content: 晉後記曰成都王圍京邑城中魚肉無出營巷賣死驢馬肉雜死人肉賣之車頻秦書曰王猛攻鄴慕容評拒猛而恒賣水與軍人眾思為亂猛因得敗之周景式廬山記曰山有康皇廟廟有銅馬一枚道士丁玄真取擲置澗中經宿復還丁乃賣與遠村人買者盡病即送還悉愈列仙傳曰安期生瑯琊阜鄉人賣藥海邊秦始皇請見與語三日三夜賜金璧數千萬風俗通曰夜糴俗說市買者當清旦而行日中交易所有夕時便罷無人也今乃夜糴穀明癡騃不足也凡靳不敏惠者曰夜糴傳子曰靈帝牓門賣官崔烈入錢五百萬取司徒語林曰蘇峻新平帑藏空猶餘數千端分麤練王公謂諸公曰國家凋弊貢御不至但恐賣練不售吾當與諸賢各製練服之月日間賣遂大售端至一金應璩新詩曰太官有餘廚大小無不賣豈徒脯與糗醯醢及鹽豉劉超讓表曰臣家理應用一純色牛連市素不如意外廄猥牛中牛色有任用者臣有正陌三萬錢五疋布乞以買此牛詔曰監此不足賣與宜便賜之然義與前後辭讓不妄受一賜今亦必復不受可聽如所啟駔儈說文曰駔馬儈也漢書曰子貸金錢千貫節駔儈孟康曰節節物貴賤也謂除估儈其節利比於千乘之家師古曰儈者合會, WYG: ''}
