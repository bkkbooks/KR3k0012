  - {type: variant, offset: 3790, length: 1420, content: 十老無所知又篤癃病每不安其室遇寒飢三女相率於西湖採菱蒪更日至市貨賣未嘗虧怠鄉里稱為義門北史曰齊常景躭好經史愛翫文詞若遇新異之書殷勤求訪或復貨買不問價之貴賤必以得為期晏子春秋曰靈公好婦人丈夫飾者國盡服之公使禁之曰女子以男飾者裂其衣斷其帶裂衣斷帶相望不止公問晏子晏子曰公服之於內而禁之於外猶懸牛首於門鬻馬肉於市公曰善使內勿服不環月而國人莫服韓子曰楚人賣珠於鄭為木蘭之櫝薰以桂椒綴以珠玉飾以玫瑰緝以翡翠鄭人買其櫝還其珠可謂善賣櫝不可謂善鬻珠又曰宋之富賈有監止子者與人爭買百金之璞因佯失而毀之負其百金而理其毀得千溢焉又曰諺所謂傭自賣哀而不售士自譽辨而不信者也又曰田脩教其子田章曰主賣官爵臣賣知力故曰自恃無恃人淮南子曰郢人有鬻其母者為請於買者曰此母老矣幸善食之而無多苦也此行大不義而欲為小義也三輔決錄曰五門子孫凡民之五門今在河南西四十里馬氏兄弟五人共居此地作五門客舍因以為名主養豬賣豬故民為之語曰苑中三公鉅下二卿五門藿藿但聞豚聲三輔黃圖曰元始四年起明堂辟雍長安城南北為會市但列槐樹數百行為隊無牆屋諸生朔望會此市各持其郡所出貨物及經書傳記笙磬器物相與賣買雍容揖讓或論議槐下董卓別傳曰呂布殺卓百姓相對欣喜抃舞皆賣家中珠環衣服床榻以買酒食自相慶賀長安酒肉為之踊貴漢武內傳曰帝先有玉板一枝杖是西胡王所獻帝甚愛之崩後故以入槨其年有人於扶風郿市中買得者帝時左右侍人識之以告有司詰問云見市中一人於巷賣之責三十疋即雇交直實不識賣主姓名皇甫謐高士傳曰毛公薛公皆趙人也遭戰國之亂二人俱以處士隱於邯鄲市毛公隱為愽徒薛公隱於賣膠又曰韓康字伯休京兆霸陵人常採藥名山賣於長安市口不二價三十餘年時女子從買藥康守價不與女子怒曰是韓伯休耶乃不二價康歎曰我本避名今小女子皆知有何用藥為乃遁霸陵山中搜神記曰南陽宗定伯少年夜行逢鬼鬼問為誰定伯欺云我亦鬼遂共為侶赴宛行極困相檐問鬼曰畏何物曰唯不喜人唾欲至宛便擔鬼著酒瓮上徑詣宛市鬼化為羊恐其變並唾之賣得錢千五百晉後記曰成都王圍京邑城中魚肉無出營巷賣死驢馬肉雜死人肉賣之車頻秦書曰王猛攻鄴慕容評拒猛而恒賣水與軍人眾思為亂猛因得敗之周景式廬山記曰山有康皇廟廟有銅馬一枚道士丁玄真取擲置澗中經宿復還丁乃賣與遠村人買者盡病即送還悉愈列仙傳曰安期生瑯琊阜鄉人賣藥海邊秦始皇請見與語三日三夜賜金璧數千萬風俗通曰夜糴俗說市買者當清旦而行日中交易所有夕時便罷無人也今乃夜糴穀明癡騃不足也凡靳不敏惠者曰夜糴傳子曰靈帝牓門賣官崔烈入錢五百萬取司徒語林曰蘇峻新平帑藏空猶餘數千端分麤練王公謂諸公曰國家凋弊貢御不至但恐賣練不售吾當與諸賢各製練服之月日間賣遂大售端至一金應璩新詩曰太官有餘廚大小無不賣豈徒脯與糗醯醢及鹽豉劉超讓表曰臣家理應用一純色牛連市素不如意外廄猥牛中牛色有任用者臣有正陌三萬錢五疋布乞以買此牛詔曰監此不足賣與宜便賜之然義與前後辭讓不妄受一賜今亦必復不受可聽如所啟駔儈說文曰駔馬儈也漢書曰子貸金錢千貫節駔儈孟康曰節節物貴賤也謂除估儈其節利比於千乘之家師古曰儈者合會二家易者駔者其首辛也駔音子郎切儈音貢外切後漢書曰吳漢字子顏家貧給事縣為亭長王莽末以賓客犯法乃亡命至漁陽資用乏以販馬為業續漢書曰平原王君公以明道深曉陰陽懷德滅行和光同塵不為皎皎之操王葬世退身儈牛自給有似蜀之嚴君平搜神記曰羊公字雍伯雒陽人本以儈賣為業性篤孝父母終葬無終山遂家焉晉令曰儈賣者皆當著巾白帖額題所儈賣者及姓名一足著白履一足著黑履淮南子曰叚于木晉國之大駔詩慎注曰馬駔市儈也而為文侯師, SBCK: ''}
