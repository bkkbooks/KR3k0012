  - {type: variant, offset: 873, length: 2, content: 武帝, WYG: 灌嬰睢陽販繒者説苑曰鮑叔身死管仲舉上袵而哭之泣下如雨從者曰非君臣父子也管仲曰非夫子所知也吾嘗與鮑子貧販於南陽吾三辱於市不以我為怯知我欲有所明也魏志曰𢎞農董遇字季直性質訥而好學興平中關中擾亂與兄季忠依將軍叚煨采梠負販而常挾持經書投閑習讀其兄笑之不改後魏書曰景穆季年頗親近左右營立田園以収其利髙允諫曰夫}
