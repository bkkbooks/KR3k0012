  - {type: variant, offset: 4094, length: 1, content: 郢, WYG: 量粟而舂數米而炊可以治家而不可以治國傅子曰夷吾為政士三妻者逐於境外三嫁者入於舂𨽻也國語曰天子禘郊之事必自射其牲牲牛王后必自舂粢諸侯宗廟之事必自射牛刲羊撃豕刲刺撃殺夫}
  - {type: page-break, offset: 4094, content: '', id: KR3k0012_WYG_829-14a, image: WYG0900/WYG0900-0342c.png}
  - {type: variant, offset: 4096, length: 0, content: '', WYG: 必自舂其盛世本曰雍父作舂吕氏春秋曰赤冀作舂桓子新論曰宓儀之制杵臼萬民以濟及後人加功因延力借身重以踐碓而利十倍杵舂又復設機關用驢驘牛馬及役水而舂其力乃且百倍焦貢易林曰蹇之革曰折挺舂稷君不得食頭養病根無益於病嚴欣期交州記曰糠頭山在合浦海口𫝊云越王舂米於此積糠所成石虎鄴中記曰}
  - {type: page-break, offset: 4096, content: '', id: KR3k0012_WYG_829-14b, image: WYG0900/WYG0900-0342d.png}
  - {type: variant, offset: 4097, length: 6, content: 鬻其母者為請, WYG: 舂車作木人及行碓}
