  - {type: variant, offset: 876, length: 0, content: '', WYG: 下者殿下之天下富有四海何求而不獲而乃與販夫販婦競此尺寸乎傭賃左𫝊襄公二十七年曰崔氏之亂申鮮虞來奔僕賃於野以喪莊公冬楚人召之遂如楚為令尹史記曰倪寛貧無資用常為弟子都養時間行賃以給衣食行常帶經止息則誦習之又曰范雎微行弊衣間步見須賈須賈見之驚曰叔今何事范雎曰臣為傭賃賈哀之留與坐飲食乃取一綈袍以賜之}
