  - {type: variant, offset: 1632, length: 2157, content: 時仙人後過之笑曰盜道無師有翅不飛遂追仙人去曹植樂府歌曰市肉取肥酤酒取醇交觴接盃以致殷勤盧漢書曰司馬相如與卓文君馳歸成都家徒四壁立文君久之不樂謂長卿曰弟俱如臨卭弟旦也從昆弟假貸猶足以為生何至自苦如此相如與俱之臨卭盡賣車騎買酒舍乃令文君當盧郭璞曰盧酒也師古曰賣酒之處累土為盧以居酒瓮四邊隆起其一面高形如鍛盧故名盧耳又曰霍光秉政趙廣漢事光及薨後廣漢為京兆尹心知微指發長安吏自將與俱至光子禹弟直突入其門搜索私屠酤椎破盧罌又曰魯匡曰今絕天下之酒則無以行禮相養放而亡限費財傷民請法古令官作酒以千五百石為一率開一盧以賣如淳曰酒家開肆得客設酒盧故以盧名肆臣瓚案盧酒瓮世說曰阮公邑家婦有美色當盧酤酒阮與王安豐常從婦飲酒既醉便眠其婦側夫始殊疑之伺察終無他意又曰王濬冲為尚書令著公服乘軺車經黃公酒盧下廻顧謂後車客曰吾與嵇叔夜阮嗣宗共酣飲於盧竹林之遊亦預其末自嵇生阮公亡以來便為時所羈紲今日視此雖近邈若山河南史曰齊謝幾卿性通脫會意便行不拘朝憲嘗預樂遊苑宴不得醉而還因詣道邊酒盧停車褰幔與車前三騶對飲時觀者如堵幾卿處之自若肆周禮天官內宰之職曰凡建國佐后立市設其次置其敘正其肆又地官下曰肆長各掌其肆之政令陳其貨賄名相近者相遠也實相近者相邇也而平正之爾亦近也俱是物也使惡者遠善善自相近鄭司農云謂若殊王之屬俱名為珠俱名為王而賈或百萬或數萬恐農夫愚民見欺故別異令相遠使賈人不得雜亂以欺人左傳襄三十年曰伯有死於羊肆羊肆市列子產禭之枕之股而哭之歛而殯諸伯有之臣在市側者既而葬諸斗城論語曰百工居肆以成其事君子學以致其道包曰言百工處其肆則事成猶君子學以致其道續漢書曰孝靈皇帝於後宮與人列肆販賣使偷盜爭鬥上視以為樂謝承後漢書曰郭秦拔申屠子龍於漆工之中嘉許偉康於屠酤之肆袁山松後漢書曰世祖怜盆子賞甚厚以為趙王郎中後疾失明賜滎陽均輸官地以為列肆使食稅終其身晉中興徵祥記曰烈宗世會稽王輔政於府內園中穿池築山山池之間處處有肆使婢酤賣肉於其中道子將見幸乘舡至酒肆輒攜入肆買酒肉狀如市鄽以為笑樂梁書曰呂僧珍為南兗州刺史從父兄子先以販葱為業僧珍至乃棄業求州官僧珍曰吾荷國恩重無以報効汝等自有常分豈可妄求叨越當速反葱肆耳皇甫謐高士傳曰許邵名知人歷客舍則知虞求賢人幘肆則拔楚子昭晉令曰坐盧肆者皆不得宿肆上殷氏世傳曰蓋寬字元祚河南鄭廉始出寒賤未知名君見而友之廉父常居肆乃就拜其父於市眾皆驚由是顯名位至司徒楚辭曰連蕙若以為佩過鮑肆而失香張衡西京賦曰彼肆人之男女麗靡奢于許史繁欽嘲應德璉文曰應溫德云昔與季叔才俱到富波飲於酒肆日暮留宿主人有養女年十五肥頭赤面形似鮮卑偶悅之夜與姦通便生足下莊子曰曾不如早索我於枯魚之肆楊子法言曰好書不能要諸仲尼書肆也李軌注曰賣書市也書不經非書也語林曰王仲祖少有三達覽鏡自翫曰王開山郍生此兒又酷貧帽敗自以形美乃入帽肆就帽嫗戲乃得新帽店世說曰阮脩字宣子常步行以一百錢桂杖頭至酒店上便獨酣暢崔豹古今注曰店置也以置貨鬻之物賣買周禮地官下曰泉府掌以市之征布歛市之不售貨之滯於民用者以其賈買之物揭而書之以待不時而買者賣者各從其抵都鄙從其主國人郊人從其有司然後予之又曰司市掌市之治教以量度成賈而徵儥儥買也物有定賈則買者來也以質劑結信而止訟質劑謂兩書一札而別之也以賈民禁偽而除詐以賈民為之者知物之情偽與實詐以刑罰禁虣而去盜以泉府同貨而歛賖同者謂民貨不售則為歛而買之民無貨則貫而子之凡會同師役市司帥賈師而從治其市政掌其賣儥之事儥買也會同師役必市者大眾所在來物以備之質人掌成市之貨賄人民牛馬兵器珍異凡賣儥者質劑焉大市以質小市以劑鄭玄曰質劑月平賈也質大賈劑小賈玄謂質劑者為之劵書藏之也又曰賈師凡國之賣儥各帥其屬而嗣掌其月禮記曲禮曰君子雖貧不鬻祭器左傳昭七曰公在乾侯平子每歲賈馬賈買也具從者之衣履而歸之于乾侯公執歸馬者賣之賣其馬用不歸馬史記曰子貢既學於仲尼退而仕衛鬻財於曹魯之間戰國策曰燕昭王見郭隗曰齊因孤國之亂而襲破燕對曰古之人君以千金求千里馬者三年不得涓人請求之三月得千里馬馬已死五百金買其首反以報君君大怒對曰死馬尚市況生馬乎朞年千里馬至者二漢書曰漢興接秦之弊諸侯並起民失作業而大飢饉米石五千人相食死者過半高祖令人無得賣子就食蜀漢天下既定民無蓋藏蘇林曰無物可蓋藏又曰衛青比年學擊胡賦稅既不足以奉戰士有司請令民得買爵及贖禁錮免罪請買賞官名曰武功爵級七十萬又曰桑弘羊置平准於京師當天下委輸王官治車諸器比市給大農大農諸官盡籠天下之貨物貴則賣之賤則買之如富商大賈亡所牟大利牟取又曰禹貢尚書欲令近臣自諸曹侍中以上家無得私販賣者又曰中平元年初賣官自關內侯以下至虎賁羽林入錢各有差公千萬卿五百萬東觀漢記曰光武嘗與朱祐昔買蜜合藥上追念之即賜祐白密一石問今憶與朕長安時共買蜜乎又曰郭舟從師長買繻入函谷關乃慨然歎曰丹不乘使者車終不出關又曰司空宋弘常受俸得盬豉千斛遣諸生迎取上河令糶之盬賤諸生不糶弘怒便遣及其賤悉糶賣不與民爭利謝承後漢書曰靈帝數遊戲於西園令後宮綵女為客主身為商賈謝承後漢書曰張揩字公超治嚴氏春秋家貧無以為業嘗乘驢車至縣賣藥足給食者輒還鄉王隱晉書曰劉寔字子真平原人少貧苦糠飯繩索作牛衣賣手繩口誦齊書曰朱文濟字敬達吳興人自賣以葬母太守謝瀹命為儒林不就又曰吳達之義興人也嫂亡無以葬自賣為十天客以營冢槨從祖弟敬夫妻荒年被略賣江北達之有田十畝貨以贖之南史曰會稽寒人陳氏有三女無男祖父母年八, SBCK: ''}
