  - {type: variant, offset: 11, length: 3, content: 凡屠歛, WYG: 秦師及滑鄭商人弦髙將市於周遇之以乘韋先牛十二犒師曰寡君聞吾子將歩師出於敝邑敢犒從者不腆敝邑為從者之淹居則具一日之積行則備一夕之衛且使遽告于鄭又宣公下曰荆尸而舉荆楚也尸陳也楚武王始更為此陳法遂以為名也商農工賈不敗}
