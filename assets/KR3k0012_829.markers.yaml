  - {type: variant, offset: 1053, length: 1264, content: 業時人多以此譏之寔終不改亦取足而已不致盈餘吳志曰潘璋字文章性愽蕩嗜酒居貧好賒酤債家至門輒言後豪當相還宋書曰吏部尚書庾仲文尚書中令奴酤酃酒利其百十後魏書曰鄭羲為西兗州刺史多所受納政以賄成性又嗇恡人有禮餉者不與盃酒臠肉西門受羊酒東門酤賣之唐書曰建中三年初搉酒天下悉令官釀斛收直三千米雖賤不得減二千委州縣綜領醨薄私釀罪有差以京師王者都特免其搉又曰和元十四年湖州刺史李應奏先是官酤酒代百姓納搉歲月既久為弊滋深伏望許令百姓自酤取登舊額仍許入兩稅隨貫均出依舊例折納輕貨送上都許搉酒錢舊皆隨兩稅徵眾戶自貞元已來有土者競為進奉故上言百姓困弊納輸不充請置官坊酤酒以代之既得請則嚴設酒法閭閻之人舉手觸禁而官收厚利以濟其私為害之日久矣及李應奏罷議者謂宰臣能因一州之請推為天下之法則其弊革矣韓子曰宋有酤酒者升概甚平遇客甚謹為酒甚美懸旗甚高然而酒酸不售怪其故問所知閭長者楊青青曰汝狗猛也曰狗猛也何故不售曰人畏焉或令孺子懷錢挈壺往酤而狗迎齕之酒所以酸而不售夫國亦有狗猛欲道之士懷其術而往欲以明萬乘之主臣為狗猛迎而齕之如此則主所以蔽賢士所以不用也賈誼新書曰鄒穆公視民如子及死酤家不售酒童子不謳歌列仙傳曰酒客者梁市上酒家客也作酒常美日售萬錢有過主人逐之主人酒更酸敗遂至貧窮又曰女凡者陳留酤酒婦也作酒甚美遇仙人過飲以素書五卷為質久開書乃養性交接之術閉房與諸少年飲酒與宿止行文書法顏色更好如二十時仙人後過之笑曰盜道無師有翅不飛遂追仙人去曹植樂府歌曰市肉取肥酤酒取醇交觴接盃以致殷勤盧漢書曰司馬相如與卓文君馳歸成都家徒四壁立文君久之不樂謂長卿曰弟俱如臨卭弟旦也從昆弟假貸猶足以為生何至自苦如此相如與俱之臨卭盡賣車騎買酒舍乃令文君當盧郭璞曰盧酒也師古曰賣酒之處累土為盧以居酒瓮四邊隆起其一面高形如鍛盧故名盧耳又曰霍光秉政趙廣漢事光及薨後廣漢為京兆尹心知微指發長安吏自將與俱至光子禹弟直突入其門搜索私屠酤椎破盧罌又曰魯匡曰今絕天下之酒則無以行禮相養放而亡限費財傷民請法古令官作酒以千五百石為一率開一盧以賣如淳曰酒家開肆得客設酒盧故以盧名肆臣瓚案盧酒瓮世說曰阮公邑家婦有美色當盧酤酒阮與王安豐常從婦飲酒既醉便眠其婦側夫始殊疑之伺察終無他意又曰王濬冲為尚書令著公服乘軺車經黃公酒盧下廻顧謂後車客曰吾與嵇叔夜阮嗣宗共酣飲於盧竹林之遊亦預其末自嵇生阮公亡以來便為時所羈紲今日視此雖近邈若山河南史曰齊謝幾卿性通脫會意便行不拘朝憲嘗預樂遊苑宴不得醉而還因詣道邊酒盧停車褰幔與車前三騶對飲時觀者如堵幾卿處之自若肆周禮天官內宰之職曰凡建國佐后立市設其次置其敘正其肆又地官下曰肆長各掌其肆之政令陳其貨賄名相近者相遠也實相近者相邇也而平正之爾亦近也俱是物也使惡者遠善善自相近鄭司農云謂若殊王之屬俱名為珠俱名為王而賈或百萬或數萬恐農夫愚民見欺故別異令相遠使賈人不得雜亂以欺人左傳襄三十年曰伯有死於羊肆羊肆市列子產禭之枕之股而哭之歛而殯諸伯有之臣在市側者既而葬諸斗城論語曰百工居肆以成其事君子學以致其道包曰言百工處其肆則事成猶君子學以致其道續漢書曰孝靈皇帝於後宮與人列肆販賣使偷盜爭鬥上視以為樂, WYG: 亷潔}
