  - {type: variant, offset: 4324, length: 193, content: 枝杖是西胡王所獻帝甚愛之崩後故以入槨其年有人於扶風郿市中買得者帝時左右侍人識之以告有司詰問云見市中一人於巷賣之責三十疋即雇交直實不識賣主姓名皇甫謐高士傳曰毛公薛公皆趙人也遭戰國之亂二人俱以處士隱於邯鄲市毛公隱為愽徒薛公隱於賣膠又曰韓康字伯休京兆霸陵人常採藥名山賣於長安市口不二價三十餘年時女子從買藥康守價不與女子怒曰是韓伯休耶乃不二價康歎曰我本避名今小女子皆知有何用藥為乃遁霸陵山中搜神, WYG: 斛俗}
