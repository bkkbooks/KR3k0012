  - {type: variant, offset: 3, length: 0, content: '', SBCK: 九商賈􅀒販傭賃檐舂商賈左傳僖公下曰􅁗師及滑鄭商人􅁌髙將市於周遇之以乗韋先牛十二犒師啇行賈也乗四韋先韋乃入牛古者將献遣於人必有以先之曰寡君聞吾子將歩師出於敝邑敢犒從者不腆敝邑爲從者之淹居則具一日之積腆厚也淹乆也積芻末菜薪行則備一夕之衛且使遽告于鄭遽傳車又宣公下曰荆尸而舉荆楚也尸陳也楚武王始更爲北陳法遂以爲名也商農工賈不敗其業而卒乗輯睦歩曰卒車曰乗事不奸矣奸犯也又成公下曰荀罃之在楚鄭賈人有將寘諸禇中以出旣謀之未行而楚人謂歸之賈人如晉荀罃善視之如實出巳賈人曰吾無其功敢有其實乎吾小人不可以厚誣君子遂􅃴齊左傳昭元曰魯曽阜曰賈而欲贏而惡􅅝乎言譬如啇賈求贏利者不淂惡諠􅅝之声又昭公曰子干歸韓宣子問於叔向曰子干其濟乎對曰難宣子曰同惡相求如市賈焉何難宣子謂弃疾親恃子干共同好惡故言如市賈同利以相求對曰無與同好誰與同惡言弁疾本不與子干同好則亦不得同惡又昭公六曰臧㑹奔郈郈魴假使爲賈正焉郈在東平无塩縣東南魴假郈邑大夫賈正掌貨物使有常賈􅀂市吏又昭公十六年曰鄭子産對韓宣子曰昔我先君桓公與商人皆岀自周鄭本在周畿内桓公東遷并與啇人俱庸次比耦庸用也次更相從耦耕以艾殺此地斬之蓬蒿藜藿而共處之丗有盟誓以相信也曰爾無我叛我無強賈无強市其物母或匄奪爾有利市寳賄我勿與知恃此質誓故能相保以至於今今吾子以好來辱而謂敝邑強奪商人是教敝邑背盟誓也毋乃不可乎又定公下曰衛王孫賈曰苟衛國有難工商未甞不爲患使皆行而後可欲以激怒國人公以告大夫乃皆將行之史記曰吕不韋傳曰不韋陽翟大賈人也徃來販賤賣貴家累千金又曰白圭周人也與僮僕同苦樂趨時􅀂猛獸摯鳥之發故曰吾治告生産猶伊尹吕尚之謀孫呉用兵商鞅行法是也其智不足以權變勇不足以英斷仁不能以取予強不能有所守雖欲學吾術終不告之矣盖天下言治生者祖白圭也又曰齊俗賤奴虜而刁間獨爱貴之桀􅃛奴人之所患也唯刁間収取使之逐漁塩商賈之利或連􅀐交守相然愈益任之終得其力起冨數千萬故曰寕爵無刁孟康曰刁間能畜豪奴奴或有連車􅀐交守相奴自謂寕欲免去作民有爵耶无將止爲刀氏作奴乎无發声助也言其能使豪奴自饒而盡其力也漢書曰髙祖詔曰賈人無得衣錦繡綺􅜄絺􅄢操兵􅀐馬又曰陳稀反上聞狶將皆故賈人曰吾知與之乃多以金購狶將狶將多降又曰周人之巧失爲趨利喜爲商賈富人則商賈爲利又曰通財鬻貨曰商又諺曰以貧求富農不如工工不如商刺繡文不如􅀝市門此言末業貧者之資也貪賈三之廉賈五之貪賈未當賣而賣末可買而買故得利少而十得其三廉賈貴乃賣賤乃買故十得五也魏志曰王烈字彦考於時名聞在邴原管寜之右辟公孫度長史以商賈白穢太祖命爲丞相􅁺徴未至卒也齊書曰范雲爲始興内史入境撫以恩德罷去亭候􅔾賈露􅀫梁書曰陸驗少而貧􅀂落拓無行邑人郁􅁻卿者甚富驗傾身事之􅁻卿貸以錢米驗借以商販遂致千金因出郡下散貲以事權貴北史曰和士開母喪託附者咸徃喪哭鄴中富商丁周嚴興等並爲義孝有一士人在􅂘限封孝琰入弔岀謂人曰嚴興之南丁周之北有一朝士號叫甚哀聞者傳之士開知而大怒管子曰商人通賈倍道兼行以夜續日千里而不逺者利在前也魯連子連却􅁗軍平原君欲封之終不肯受平原君乃置酒酒酣起前以千金爲壽先生􅀏曰所貴天下之士者爲人排患釋難解人之締結即有取是商賈之事連不忍爲也尸子曰子貢衛之賈人也韓子曰鄙諺曰長􅃑善舞多資善賈此言多資易爲工也又曰􅁗韓攻魏昭夘西􅀃罷之齊荆攻魏夘東􅀃罷之魏襄王養之以五車將軍養以五乗使爲將軍夘曰伯夷以將軍葬於首山之下而天下曰夫以伯夷之賢與其稱仁而以將軍葬是手力不掩也今臣罷四國之兵而王乃與臣五乗此其稱功猶嬴勝而履屩嬴利也謂賈也嬴利倍勝今以薄賞報大功猶嬴勝之人履屩也淮南子曰賈多端則貧工多􅇊則窮心不一也賈多端非一國語曰晉叔向對韓宣子曰夫絳之冨商韋藩木楗以過於朝韋藩韋蔽前也木楗木檐唯其功庸少也言无功庸雖冨不得服朝服過於朝而能金玉其車文錯其服文文纎縷也言商之財足以金玉其車文錯其服以无爵位故不得爲其上爲藩木楗是能行諸侯賄言其財賄足以交於諸侯而無㝷尺之禄無大績於民故也績功也}
