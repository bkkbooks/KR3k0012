  - {type: variant, offset: 3611, length: 1, content: 靈, WYG: 趙孝字長平父普王莽時為田禾將軍任孝為郎每告歸常白衣步擔從長安逺欲止郵亭亭先時聞孝當過以有長者客洒掃待之孝既至不自名長不肯内問曰聞田禾將軍子當從長安來何時至乎孝曰尋到矣於是遂去東觀漢記曰馬成為剡令上征河北成臝衣步擔渡河渚上魏志曰曹休年十餘嵗喪父獨與一客擔喪假葬擕將老母渡江至吳魏畧曰隗禧字子牙京兆人也家世單貧少好學初平中三輔亂禧南客荆州不以荒擾擔負經書每以採梠餘日則誦習之晉書曰郭文字文舉少愛山水尚嘉遁洛陽陷乃步擔避餘杭大滌山中獵者時往寄宿文夜為擔水而無倦色又曰譙秀字元彦在蜀遇范賁蕭敬相繼作亂秀乃避難宕渠中隣里宗族憑之者以百數秀年八十衆欲代之負擔秀曰各有士弱當先營䕶吾氣力猶足自起不以垂朽之年累諸君也又曰王澄字平子兄衍妻郭氏性貪鄙欲令婢路上擔糞澄年十四諌郭以為不可又曰董養字仲道見洛陽東北步廣里地陷有二鵝出焉其蒼者飛去白者不能飛知白者國家之象顧謂謝鯤阮孚曰易稱知幾其神君等可􅀷藏矣乃與妻荷擔入蜀莫知所終齊書曰桓康隨武}
