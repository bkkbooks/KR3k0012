  - {type: variant, offset: 2557, length: 0, content: '', SBCK: 髙帝元年始爲漢王都南鄭屬漢中秦厲王所置在禹貢梁州之域北逹雍南跨巴蜀與秦同分二年北徙櫟陽故􅁗獻公之所居後居萬年故屬馮翊今京兆縣也都長安􅁗咸陽之地今京兆所治縣也其城狹小至惠帝元年始更築廣五年乃成光武以武信侯進封蕭王在禹貢徐州之域於周以封子姓之别附庸事在春秋於漢屬豫州今沛國蕭是也及即位於鄗更名髙邑建}
