  - {type: variant, offset: 1677, length: 762, content: 尉又曰大中二年以起居郎駙馬都尉鄭顥尚萬壽公主詔曰女人之德雅合慎修嚴奉舅姑夙夜勤事此婦之節也先王制禮貴賤同遵既已下嫁臣寮儀則須依古典萬壽公主婦禮宜依士庶又曰弘化公主宗室女貞觀十三年降吐谷渾慕容諸曷鉢又曰文成公主宗室女貞觀十五年封降於吐蕃贊普弄贊命禮部尚書江夏王道宗送之弄贊親迎于河源見主人子婿禮甚謹歎大國服飾禮儀之美俯仰有媿沮之色謂所親曰我祖父未有通婚大國者今我得尚大唐公主當築一城以誇示後世仍遣酋豪子弟請入國學以習詩書從之又曰貞元三年遣廻紇使合闕將軍歸其國初合闕將其君命請婚於我上許以咸安公主嫁之命公主見合闕於麟德殿且命齋公主畫圖就示可汗以馬價絹五萬疋還之許其互市而去以殿中監嗣王湛然為送咸安公主使仍兼婚禮使四年廻紇公主兼使者至自本蕃上御延喜門禁婦人及車輿觀者時廻紇可汗喜於和親其禮甚恭乃上言曰昔為兄弟今即子壻子壻半子也彼猶父此猶子父若患於西戎子當遣兵除之又曰太和公主長慶元年封為公主冊為廻紇可敦出降愛登里邏骨沒密施合毗伽保義可汗初保義可汗既立遣使求婚遂封第九妹為永安公主將以降嫁其年保義可汗卒冊九姓廻鶻為崇德可汗五月遣使請迎所許嫁公主朝廷封第五妹為太和公主以降今廻紇焉雖狄人固請永安而終不許故命中書舍人王起就鴻臚寺以宣喻焉列仙傳曰朱仲會稽市販珠人高后募三寸珠乃詣闕上之珠好過度賜五百金魯元公主私以七百金從仲求珠獻四寸之珠又曰蕭史善吹簫教秦穆公女作鳳聲公為作鳳臺令夫妻止其上一旦皆隨鳳飛去荀氏家傳曰荀羨字令則年十五擬國婚之選君不欲連姻帝室乃遠遁長沙監司追尋不獲已遂尚尋陽公主世說曰桓武平蜀以李勢女為妾有寵嘗著齋後溫尚南康長公主主始不知之既聞乃伺溫不在率數十婢拔白刃往李所故欲斫之見李梳頭髮垂委地姿貌端麗乃徐下地結髮歛手向主曰國破家亡以至今日若能見殺實猶生之年神色閑正辭氣悽婉主於是擲刀前抱之阿姊我見汝不能不憐何況老奴遂善遇之, SBCK: ''}
