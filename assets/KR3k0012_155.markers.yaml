  - {type: variant, offset: 983, length: 293, content: 生特承恩寵初永隆年降駙馬薛紹垂拱中被誣告與諸王連謀誅死則天乃殺武攸暨之妻以配主焉公主豐碩方額廣頤多權略則天以為類己每預謀議神龍年誅張易之有謀進號鎮國太平公主賞錫不可勝紀二年置公主府時中宗韋后上官昭容用事皆以為智謀不及公主甚憚之公主日益豪橫唐隆元年玄宗清內難公主又預其謀令男崇簡從之與玄宗尊立睿宗公主頻著大勳益尊重加實封五千戶通前一萬戶每入奏事坐語移日所言皆聽軍國大政事必參決如不朝謁即宰臣就第議其可否公主由是驕恣田園遍於近甸貨殖流於江淮公主懼玄宗英武乃連結將相專謀異計時宰相七人五出公主門先天二年玄宗漸危逼乃勒兵誅其黨蕭至忠等公主遁入山寺數日方出賜死于家藉其家財貨山積珍奇寶物侔於御府又, SBCK: 居宮}
