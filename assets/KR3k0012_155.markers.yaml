  - {type: variant, offset: 2443, length: 0, content: '', WYG: 丘之絶髙大者為京謂非人力所能成乃天地性自然也京師義亦取此帝王世紀曰宓羲為天子都陳在禹貢豫州之域西望外方東及明緒於周陳胡公所封故春秋傳曰陳太昊之墟也於漢屬淮陽今陳國是也神農氏亦都陳又營曲阜故春秋稱魯大庭氏之庫黄帝都涿鹿於周官幽州之域在漢為上谷而世本云涿鹿在彭城南然則上谷本名彭城今上谷有涿鹿縣及蚩尤城阪泉地又有黄帝祠皆黄帝戰蚩尤之處也或曰黄帝都有熊今河南新鄭是也少昊氏自窮桑登位故春秋傳曰世不失職遂濟窮桑登帝在魯北後徙曲阜於周為魯在禹貢徐州蒙羽之野奎婁之分降婁之次周以之封伯禽春秋傳曰命伯禽而封少昊之墟是以書叙稱魯公伯禽宅曲阜是也顓頊氏自窮桑徙商丘於周為衞在禹貢冀州太行之東北踰崇山及兖州桑土之野營室東壁之分豕韋之次故春秋傳曰衞顓頊之墟也謂之帝丘今東郡濮陽是也帝嚳氏都宅今河南偃師是也禹貢外方之城嵩之北或言在梁非也帝堯氏始封於唐今中山唐縣是也堯山在焉唐水在西北入唐河南有望都縣山即堯母慶都之所居也相去五十里都山一名頭山北登堯山南望都山故名其縣曰望都而地里志堯山在唐南山中張晏以堯山實在唐東北望都界堯都之徙涿鹿世本云在彭城南今上谷郡北自有彭城非宋彭城也後乂徙晉陽今太原縣是也於周禮在并州之域及為天子都平陽於風詩為唐國武王子叔虞封焉更名唐故吳季札聞唐之歌曰思深哉其有陶唐氏之遺民乎帝舜其所營都或言蒲阪即河東縣帝王世紀曰夏鯀封崇伯故春秋傳曰謂之有崇伯鯀國在秦晉之間左氏傳曰趙穿侵崇是也禹受封為夏伯在禹貢豫州外方之南角氐之分壽星之次於秦漢屬潁川本衞地今河南陽翟是也受禪都平陽或在安邑或在晉陽於漢平陽安邑皆屬河東晉陽屬太原在冀州太行恒山之西太原太嶽之野叅代之分實沈之次於周為晉今司𨽻并州之域也相徙商丘於周為衞成公夢康叔曰相奪予享是也少康中興復還舊都故春秋傳曰復禹之迹不失舊物是也世本又言夏后居陽城本在大梁之南於戰國大梁魏都今陳留浚儀是也按經傳曰夏與堯舜同在河北冀州之域不在河南也故五子歌曰惟彼陶唐有此冀方今失厥道亂其紀綱乃底滅亡言自禹至太康與唐虞不易都域也然則居陽城者自為禹避商均時非都也故戰國策稱桀之居左天門之險右天谿之陽成臯在其北伊洛在其南吳起對魏武侯亦言桀之居左河濟右太華伊闕在其南羊腸在其北按地理志至上黨商都有天井闗即天門也有羊腸坂在太原晉陽西北九十里為通西上郡闗即吳起之所云也帝王世紀曰商契始封於商在禹貢太華之陽上洛商是也世本契大居畨相徙商丘本顓頊之墟故陶唐氏之火正閼伯之所居也故春秋傳曰閼伯居商丘祀大火相因之故商王大火謂之辰故辰為商星今濮陽是也然則契之所封商丘商洛是也商土於周為衞商是也而學者以商丘為契封謬矣湯始居亳學者咸以亳本帝嚳之墟在禹貢豫州洛河之間今河南偃師西二十里尸陽之陽亭是也以為考之事實甚失其正孟子稱湯居亳與葛為鄰按地里志今梁國寧陵之葛鄉是也湯地七十里葛又伯耳封域有制葛伯不祀湯使亳衆為之耕有童子餉食葛伯奪而殺之計寧陵至偃師八百里而使亳衆為耕童子餉食非其理也今梁自有二亳南亳在穀熟北亳在蒙非偃師也故古文仲虺之誥曰乃葛伯仇餉初征自葛即孟子之言是也湯又盟諸侯於景亳然則二亳皆在梁矣春秋㑹于亳是也太甲既立不明伊尹放諸桐世本又言太甲從上司馬在鄴西南按詩書太甲無遷都之文桐宫其在斯乎仲丁徙囂或曰今河南敖倉是也故書序曰仲丁徙于囂河亶甲徙相在河北故書序曰河亶甲居相是也祖乙徙耿為河所毁故書序曰祖乙圯于耿今河東有耿鄉是也及盤庚立復南居亳之殷地故書序曰將治亳殷今偃師也然則殷有三亳二亳在梁國一亳在河南南亳偃師即湯都也蒙為北亳即景亳湯所盟地偃師為西亳即盤庚所徙者也故立政篇曰三亳阪尹是也武丁徙朝歌於周為衞今河内縣也紂自朝歌北築沙丘臺沙丘地理志在鉅鹿東北七十里邯鄲國屬趙於禹貢在冀州大陸之野昴畢之分大梁之次至今民俗歌謡男女淫縱猶有紂之餘風世稱趙女之美是也又曰周后稷始封邰今扶風是也及公劉徙居邑於豳今新平漆之東北有豳亭是也故詩稱篤公劉于豳斯館至太王避狄循漆水踰梁山徙邑於岐山之陽西北岐城舊址是也故詩稱率西水滸至於岐下南有周原故始改號曰周王季徙郢故書序曰維周王季宅郢是也故孟子稱文王生於畢郢西夷人也暨文王受命徙都於豐在今京兆之西是也故詩有云既伐於崇作邑於豐及武王伐紂營洛邑而定鼎焉今洛陽西南洛水之北有鼎中觀是也周公相成王以豐偏處西方貢道不均乃使召公卜居洛水之陽以即土中故援神契曰八方之廣周洛為中於是遂築新邑營定九鼎以洛邑為王之東都故周書有曰我乃卜澗水東􅈆水西唯洛食是為王城名曰東周故公羊傳曰王城者何東周也地理志王城本郟鄏之地是以或謂之郟鄏故春秋傳曰成王定鼎于郟鄏是也今河南郟鄏東門名鼎門盖九鼎所徙入也成王既卜營洛邑建明堂朝諸侯復還豐鎬故書序曰成王既黜殷命還歸在豐至懿王徙太丘秦謂之廢丘今京兆槐里是也世本曰懿王居太丘厲王淫亂出居于彘今河東永安是也平王即位徙居洛邑洛誥所謂新邑也國語曰幽王滅周乃東遷本殷之畿内有禹貢豫州之域河洛􅈆澗之間周於南柳七星張之分鶉火之次也及敬王避子朝之亂東居成周故春秋經曰天王入于成周是也後六年王室定遂徙都成周是後晉又率諸侯之徒修繕其城以成周城小不受王都故壞翟泉而廣焉翟泉地在成周東北今洛陽城中有周王塜是也至赧王又徙居西周而失位又曰秦非子始封於秦故秦本紀稱周孝王曰朕其分土為附庸邑之秦今隴西秦亭是也𤣥孫莊公徙廢丘周懿王之所都今槐里是也及襄公始受豐之地}
