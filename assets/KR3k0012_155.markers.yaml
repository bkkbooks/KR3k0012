  - {type: variant, offset: 2950, length: 508, content: 號齊職儀曰凡尚公主必拜駙馬都尉魏晉已來因為瞻准蓋以王姬之重庶姓之輕若不如其等級寧可合巹而酳所以假駙馬之位乃配於皇女也今公主早薨伉儷已絕既無禮數致疑何須駙馬之授案杜預尚晉宣帝第二女晉武踐祚而主已亡泰始中追贈公主元凱無復駙馬之號梁文帝女新安穆公主早薨天監初王氏無追拜之事遠近二例足以校明無勞此授宜追贈陳侯時以議為當後魏書曰陸昕之風望端雅尚獻文女常山公主拜駙馬都尉又曰馮誕字子正與高祖同歲幼侍書學特蒙親待尚高祖妹樂安公主拜駙馬都尉高祖寵誕同輿而載同按而食同席而坐又曰宿石高宗時為中散嘗從獵高祖親欲射虎石叩馬而諫引高宗馬至原上後虎騰躍殺人詔曰石為忠臣而控馬切諫免虎之害後有犯罪宥而勿治尚上谷公主拜駙馬都尉又曰萬安國代人父振尚高陽長公主拜駙馬都尉遷散騎常侍馮翊公安國少明敏有姿貌以國甥復尚河南公主拜駙馬都尉遷散騎常侍顯祖特親寵之與同臥起為立第宅賞賜至鉅萬超拜大司馬大將軍封安成王唐書曰文宗儉素嘗駙馬都尉韋處仁入見巾夾羅巾以進上謂曰本慕卿門戶清素故俯從選尚如此巾服從他諸戚為之卿不須為也又官品志曰駙馬奉車騎三都尉並無員駙馬以加尚公主者無班秩語林曰何晏字平叔以主壻拜駙馬都尉美姿儀帝每疑其傅粉後夏月賜以湯餅大汗出以朱衣自拭之尤皎然, SBCK: 百五十五}
