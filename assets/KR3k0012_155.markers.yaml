  - {type: variant, offset: 2443, length: 0, content: '', SBCK: 京謂非人力所能成天地性自然也京師義亦取此帝王丗紀曰宓羲爲天子都陳在禹貢豫州之域西望外方東及明緒於周陳胡公所封故春秋傳曰陳太昊之墟也於漢屬淮陽今陳國是也神農氏亦都陳又營曲阜故春秋稱魯大庭氏之庫黄帝都涿鹿於周官幽州之域在漢爲上谷而丗本云涿鹿在彭城南然則上谷本名彭城今上谷有涿鹿縣及􅃖尤城阪泉地又有黄帝祠皆黄帝戰􅃖尤之處也或曰黄帝都有熊今河南新鄭是也少昊民自窮桑登位故春秋傳曰丗不失職遂濟窮桑登帝位在魯北後徙曲阜於周爲魯在禹貢徐州蒙羽之野奎婁之分降婁之次周以封伯禽故春秋傳曰命伯禽而封少昊之墟是以書叙稱魯公伯禽宅曲阜是也顓頊氏自窮桑徙商丘於周爲衛在禹貢兾州太行之東北踰常山及兖州桑土之野營室東壁之分豕韋之次故春秋傳曰衛顓頊之墟也謂之帝丘今東郡濮陽是也帝嚳氏都宅今河南偃師是也禹貢外方之城嵩之北或言在梁非也帝堯氏始封於唐今中山唐縣是也堯山在焉唐水在西北入唐河南有望都縣山即堯母慶都之所居也相去五十里都山一名亘山北登堯山南望都山故名其縣曰望都而地理志堯山在唐南山中張晏以堯山實在唐北地理志堯之以後徙􅃰鹿丗本云在彭城南今上谷郡北自有彭城非宋彭城也後又徙晉陽今太原縣也於周禮在并州之域及爲天子都平陽於詩風爲唐國武王子叔虞封焉更名唐故呉季扎聞唐之歌曰思深哉其有陶唐氏之遺氏乎帝舜其所營都或言蒲阪即河東縣帝王丗紀曰夏鯀封崇伯故春秋傳曰謂之有崇伯鯀國在秦晉之間左氏傳曰趙穿侵崇是也禹受封爲夏伯在禹貢豫州外方南角亢氐之分壽星之次於􅁗漢屬潁川本韓地今河南陽翟是也受禪都平陽或在安邑或在晉陽於漢平陽安邑皆屬河東晉陽屬太原在兾州大行􅁪山之西太原太嶽之野叅代之分實沉之次於周爲晉今司􅀠并州之域也相徙商丘於周爲衛成公夢康叔曰相奪子享是也少康中興復還舊都故春秋傳曰復禹之迹不失舊物是也丗夲又言夏后居陽城夲在大梁之南於戰國大梁魏都今陳留浚儀是也案經傳曰夏與堯舜同在河北兾州之域不在河南也故五子歌曰惟彼陶唐有此兾方今失厥道亂其紀綱乃底滅亡言自禹至太康與唐虞不易都域也然則居陽城者自謂禹避商均時非都也故戰國䇿稱桀之居左天門之險右天谿之陽成臯在其北伊洛出其南呉起對魏武侯亦言桀之居左河濟右太華伊闕在其南羊腸在其北案地理志上黨啇都有天井關即天門也有羊腸坂在太原晉陽西北九十里爲通西上郡關即呉起之所云也洛皆在陽城非都審矣帝王丗紀曰商契始封於商在禹貢太華之陽上洛商是也丗夲契居畨相徙商丘夲顓頊之墟故陶唐氏之火正閼伯之所居也故春秋傳曰閼伯居啇丘祀大火相因之故商王大火謂之辰故辰爲商星今濮陽是也然則契之所封商丘商洛是也商土於周爲衛商是也而學者以商丘爲契封謬矣湯始居亳學者咸以亳本帝嚳之墟在禹貢豫州洛河之間今河南偃師西二十里尸卿之陽亭是也以經考之事實甚失其正孟子稱湯居亳與􅁑爲鄰案地理志葛今梁國寧陵之􅁑郷是也湯地七十里􅁑又伯耳封域有制􅁑伯不祀湯使亳衆爲之耕有童子餉食􅁑伯奪而殺之計寜陵至偃師八百里而使亳衆爲耕童子餉食非其理也今梁自有二亳南亳在􅂖熟北亳在蒙非偃師也故古文仲虺之誥曰乃􅁑伯仇餉􅀄征自􅁑即孟子之言是也湯又盟諸侯于景亳然則二亳皆在梁矣春秋㑹于亳是也太甲旣立不明伊尹放諸桐丗夲又言太甲從上司馬在鄴西南案詩書太甲無遷都之文桐宫其在斯乎仲丁徙囂或曰今河南之敖倉是也故書序曰仲丁徙于囂河亶甲徙相在河北故書序曰河亶甲居相是也祖乙徙耿爲河所毀故書序曰祖乙圯于耿今河東有耿郷是也及盤庚立復南居亳之殷地故書序曰將治亳殷今偃師是也然則殷有三亳二亳在梁國一亳在河南南亳偃師即湯都也􅀩爲北亳即景亳湯所盟地偃師爲西亳即盤庚所徙者也故立政篇曰三亳坂尹是也武丁徙朝歌於周爲衛今河内縣也紂自朝歌北築沙丘臺沙丘地理志在鉅鹿東北七十里邯鄲國屬趙於禹貢在兾州大陸之野􅄧畢之分大梁之次至今民俗歌謡男女􅁋縱猶有紂之餘風丗稱趙女之美是也又曰周后稷始封邰今扶風是也及公劉徙邑於􅃎今新平漆之東北有􅃎亭是也故詩稱篤公劉于􅃎斯館至太王避狄循􅃮水踰梁山徙邑於歧山之陽西北歧城舊趾是也故詩稱率西水滸至于歧下南有周原故始改號曰周王季徙程故書序曰維周王季宅程是也故孟子稱文王生於畢郢西夷人也曁文王受命徙都於酆在今京兆之西是也故稱伐戎於崇作邑於酆及武王伐紂營洛邑而定鼎焉今洛陽西南洛水之北有鼎中觀是也周公相成王以酆鎬偏處西方之貢不均乃使邵公卜居洛水之陽以即土中故援神契曰八方之廣周洛爲中於是遂築新邑營定九鼎以爲王之東都之洛邑故周書稱我乃卜澗水東􅈆水西唯洛食是爲王城名曰東周故公羊傳曰王城者何東周也地理志王城本郟鄏之地是以或謂之郟鄏故春秋傳曰成王定鼎于郟鄏河南是也今郟鄏東門名鼎門蓋九鼎所從入也成王旣卜營洛邑建明堂朝諸侯復還酆鄗故書序曰成王旣黜殷命還歸在鄷至懿王徙大丘􅁗謂之廢丘今京兆槐里是也丗夲曰懿王居大丘厲王淫亂出于彘今河東永安是也平王即位徙居洛洛誥所謂新邑也國語曰幽王滅周乃東遷夲殷之畿内在禹貢豫州外方之域河洛􅈆澗之間周於南栁七星張之分鶉火之次也及敬王避子朝之亂東居成周故春秋經曰天王入于成周是也後六年王室定遂徙都成周是後晉又率諸侯之徒修繕其城以成周城小不受王都故壞翟泉而廣焉翟泉地在成周東北今洛陽城中有周王冢是也至報王又徙居西周而失位又曰秦非子始封於􅁗故􅁗夲紀稱周孝王曰朕分之土邑􅁗夲隴西􅁗谷亭是也􅀇孫莊公徙廢丘周懿王之所都今槐里是也及襄公始受酆之地}
