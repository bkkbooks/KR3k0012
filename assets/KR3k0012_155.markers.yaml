  - {type: variant, offset: 1277, length: 399, content: 唐隆元年勑公主置府近有勑揔停太平公主有崇保社稷功其鎮國太平公主府即宜依舊酸棗縣袁楚客奏記於中書令魏元忠曰女有內男有外男女有別剛柔分矣中外斯隔陰陽著矣豈可相濫哉然而幕府者丈夫之職非婦人之事今諸公主並開府建僚崇置官秩若以女處男職所謂長陰而抑陽也而望陰陽不僣風雨不爽其可得乎竊謂非致遠之計乖久安之策書曰事不師古以克永世匪說攸聞此之謂也君侯不正雅之哉又曰安樂公主韋后所生初中宗遷於房州欲及州境生於路次性惠敏容質秀絕中宗韋后愛寵日深恣其所欲奏請無不允許恃寵驕縱權傾天下自王侯宰相以下除拜多出其門所營第宅并造安樂佛寺擬於宮掖城西造定昆池於庄延袤數里出降之時以皇后仗發於宮中中宗與韋后御安福門觀之及韋庶人敗與駙馬武延秀皆斬之追貶為悖逆庶人又曰武延秀武承嗣之弟子也時武崇訓為安樂公主壻即延秀之從父兄也數引至主第延秀久陷蕃中解突厥語常於主第唱突厥歌作胡旋舞有姿媚主甚喜及崇訓死延秀得幸尚主拜席日授太常卿兼右衛將軍駙馬, SBCK: ''}
