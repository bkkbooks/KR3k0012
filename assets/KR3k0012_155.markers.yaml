  - {type: variant, offset: 2622, length: 6, content: 諸葛瞻字思遠, SBCK: 河東平陽堯所都河東太陽虞所都太保後潁川陽翟夏禹國弘農陜􅉑所都王季後河南偃師尸郷湯所都魯國薛奚仲所都河南洛陽周公遷殷民曰成周河南武王遷九鼎周公營之以爲王城平王所都河南鞏東周所都扶風槐里周懿王所都扶風郇邑􅃎郷公劉所封左馮翊櫟陽秦獻公所封扶風雍秦惠王所都晉書云晉都洛陽至永嘉南遷居}
