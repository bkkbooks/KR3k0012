  - {type: variant, offset: 320, length: 616, content: 甚眾得兵七萬人公主間使以聞使者至高祖大悅及義軍渡河公主引精兵萬餘與太宗會於渭北與其駙馬柴紹各置幕府營中號為娘子軍京城平封為平陽公主以獨有功每賞賜異於他主及薨謚曰昭又曰竇誕竇抗弟三子也尚高祖女襄陽公主竇氏自武德至今再為外戚尚主者八人女為王妃六人唐世貴盛莫與為比又曰房玄齡之子遺愛尚高陽公主玄齡病上表諫征遼太宗見表謂玄齡子婦高陽公主曰此人危惙如此尚能憂我國家又曰房遺愛尚太宗女高陽公主拜駙馬都尉初主有寵於太宗遺愛既驕恣謀黜遺直而奪其封爵永徵中誣告遺直無禮於己高宗令長孫無忌鞫其事因得公主與遺愛謀反之狀遺愛伏誅公主賜自盡又曰杜如晦之子荷以功臣子尚城陽公主賜爵襄陽郡公授尚乘奉御貞觀中與太子承乾謀反坐斬又曰高士廉子以履行尚太宗女東陽公主拜駙馬都尉遭父艱居喪以孝聞太宗手詔敦喻曰古人立孝毀不滅身聞卿絕粒殊乖大禮幸抑摧裂之情割傷生之累俄起為衛尉卿又曰蕭瑀子銳尚太宗襄城公主公主雅有禮度太宗每令諸公主凡厥所為皆視其楷則又令所司別為營弟公主辭曰婦人事舅姑如事父母若居處不同則定省多闕再三固讓乃止又曰王珪子敬直尚南平公主禮有婦見舅姑之儀自近代公主出降此禮皆廢珪曰今主上欽明動循法制吾受公主謁見豈為身榮所以成國家之美耳遂與其妻就位而坐令公主親執笲行盥饋之道禮成而退是後公主下降有舅姑者皆備婦禮自珪始也又曰貞觀中長樂公主出降太宗以皇后所生勑有司資送倍於永嘉長公主秘書監魏徵諫曰不可昔漢明帝欲封其子云我子豈得與先帝子等可半楚淮陽前史以為美談天子姊妹為長公主, SBCK: ''}
