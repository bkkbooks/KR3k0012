  - {type: variant, offset: 4474, length: 154, content: 升行禮登歌帷外王公已下就位於山足帷皆用錦繡在位者瞻望或誚焉又曰永淳二年上以風眩轉加停封中嶽上自東封之後皇后盛贊行中嶽之禮每下詔輒年飢寇至而罷於是嵩山之下營奉天宮以為有事之漸時有童謠曰嵩高凡幾層不畏登不得但畏不得登及是禮物畢備竟以疾加而還又曰則天后萬歲登封元年臘月甲申上登封于嵩嶽大赦天下改元大酺丁亥禪於少室山, SBCK: 示羣臣}
