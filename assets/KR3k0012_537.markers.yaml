  - {type: variant, offset: 1410, length: 0, content: '', SBCK: 詩史歷春秋􅀂夫聲管不發雅頌罔記崔駰北廵頌曰元和三年正月上旣畢郊祠之事乃東廵出於河内經青兖之郊逥冀州遂禮北嶽聖澤流浹􅀺元􅀍德嘉瑞並集乃作頌曰張衡廵狩頌曰􅀄吉帝將狩於岱嶽展􅁩省方觀風設教丙寅朏率群賔備法駕以祖於東門乙酉觀禮於魯而休齊焉己丑届于靈宫是日有鳯􅀟集于臺馬融東巡頌曰敷六典經八成爕和萬殊㹅領神明􅀋乎上帝柴乎三辰禋祠乎六宗祗燎乎羣神籍田毛詩閔子載芟曰載芟春籍田而祈社稷也周禮天官上甸師曰掌帥其屬而耕耨王籍以時入之以供粢盛又天官}
