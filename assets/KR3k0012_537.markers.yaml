  - {type: 'tls:seg', offset: 1650, content: '', id: KR3k0012_CHANT_537-7a.21}
  - {type: variant, offset: 1650, length: 558, content: 宜順承天慶垂萬世之基上然之乃自制儀采儒術以文焉又郊祀志曰初上欲治明堂奉高旁未曉其制度濟南人公玉帶上黃帝時明堂圖於是上令奉高作明堂汶上如帶圖及是歲脩封則祠太一五帝於明堂上坐令高皇帝祠坐對之公玉帶曰黃帝時雖封太山然風后封鯀歧伯令黃帝封東太山韋昭曰別有小太山在陰一名介山臣瓚安鄭志朱虛界中有小太山是也汾陰子推所焚故名介山也不以介為大也禪凡山合符然後不死天子既令設祠具至東太山太山卑小不稱其聲乃令祠官禮之而不封焉其後令帶奉祠候神物復還太山脩五年之禮如前而加禪祠石閭石閭者在太山下趾南方方士言僊人閭也故上親禪焉其後五年復至太山脩封還過祭恒山自封太山後十二歲而周遍於五嶽四瀆矣後五年復至太山脩封武帝五脩封又曰太初元年十二月禪蒿里裏服虔曰山名在太山下太初三年春正月東巡海上夏四月還脩封太山禪石閭天漢三年受計還幸北地祠常山瘞玄玉鄧展曰瘞埋也又曰太始四年春三月甲申脩封丙戍禪石閭夏四月幸不其如淳曰其音基不其山名因以為縣祠神人于交門宮應劭曰神人蓬萊仙人之屬也晉灼曰瑯琊縣有交門宮武帝所造若有嚮坐拜者作交門之歌師古曰如有神人景象嚮祠坐而拜也又曰司馬相如既病免家居茂陵天子曰相如病甚可往從悉取其書若不然後之矣使所忠往而相如已死家無遺書問其妻對曰長卿未嘗有書也時時著書人又取去長卿未死時為一卷書曰有使來求當奏之其遺扎書言封禪事所忠奏焉天子異之, SBCK: ''}
