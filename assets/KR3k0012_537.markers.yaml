  - {type: variant, offset: 4691, length: 5, content: 太一神策周, SBCK: 親率群臣籍於千畒之甸禮也於是乃使甸師清畿野廬掃路封人壝宫掌舎設枒青壇蔚其嶽立翠幙黯以雲布結崇基之靈祉啓四塗之廣阼任豫籍田賦曰瞻望圭景咫尺三川􅃡彼帝籍百有餘年曹植籍田論曰春耕于籍田郎中令侍寡人焉顧}
