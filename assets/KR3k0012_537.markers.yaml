  - {type: variant, offset: 46, length: 4, content: 館鄭玄注, WYG: 廵狩至於岱宗柴積柴以燎望秩於山川秩者如其秩以祭之也肆覲東后恊時月正日恊和同律度量衡同齊同也脩五禮五玊五等諸侯瑞玊璧也三帛𤣥曛黄二生羊雁一死雉也䞇如五器卒乃復五器上五玊禮終則還之三帛以下不還五月南廵狩至於南嶽如岱禮南嶽衡山八月西廵狩至於西嶽如初禮西嶽華山十有一月朔廵狩至於北嶽如西禮朔北方北嶽恒山歸格於藝祖用特藝稱也尚書大傳}
