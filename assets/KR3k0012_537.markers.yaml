  - {type: variant, offset: 2806, length: 341, content: 陳後西上畢帝升壇尚書令奉玉牒檢皇帝以寸二分璽親封之訖太常命人發壇上石尚書令奉藏玉牒已復石覆訖尚書令以五寸印封石檢事畢皇帝拜群臣稱萬歲令人立所刻石碑乃復道下二十五日甲午禪祭地於梁陰以高后配山川群神從如元始中北郊故事東觀漢記曰中元元年正月群臣復奏言登封告成為民報德百王所同陛下輒距絕不許臣下不敢頌功述德謹按河雒讖書赤漢九世當巡封太山凡三十六事陛下遂以仲月令辰巡岱嶽之正禮奉圖雒之明文以祈靈瑞以為兆民於是許焉至太山乃復議曰國家德薄災異仍至圖讖蓋如此邪上東巡狩至太山有司復奏河圖讖記表章赤漢九世尤著明後凡三十六事司馬彪續漢書曰河圖會昌符云漢太興之道在九代之王封乎太山刻石著紀禪于梁父退省考功典略曰建武三十年有司奏封禪詔曰災異連仍日月薄蝕百姓怨歎而有事於太山汙七十二代編錄以羊皮雜貂裘何彊顏耶, SBCK: 耕}
