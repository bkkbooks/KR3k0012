  - {type: variant, offset: 2562, length: 150, content: 垂後無窮以為萬民也丞天之敬章圖書之瑞尤宜顯著今因舊封竄寄故石下恐非重命之義受命中興宜當特異以明天意遂使太山郡及魯趣石工直取完青石無五色時以印工不能刻玉牒欲用丹漆書之會求得刻玉者遂刻書書秘刻方石中令容玉牒二月上至奉高遣御史與蘭臺令史將工先上山刻石碑文二十二日辛卯晨燎祭天於太山下南方群臣皆從用樂皆如南郊, SBCK: 子}
