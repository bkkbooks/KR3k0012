  - {type: variant, offset: 5, length: 0, content: '', SBCK: 禮五玉五等諸侯瑞圭璧也三帛􅀇纁黄二牲羊鴈一死雉也贄如五器卒乃復五器上五玉礼終則還之三帛以下不還五月南巡狩至於南嶽如岱禮南嶽衡山八月西巡狩至于西嶽如􅀄禮西嶽華山十有一月朔巡狩至于北嶽如􅀄禮朔北方北獄恒山歸格於藝祖用特藝祢也尚書大傳曰元祀巡狩四嶽八伯壇四奥沉四海封十有二山肇十有二州毛詩清廟曰時邁巡狩告祭柴望也巡狩告􅀕者天子巡行郡囯至方嶽之下而}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_537-1b}
  - {type: variant, offset: 5, length: 0, content: '', krp: 禮五玉五等諸侯瑞圭璧也三帛玄纁黄二牲羊鴈一死雉也贄如五器卒乃復五器上五玉礼終則還之三帛以下不還五月南巡狩至於南嶽如岱禮南嶽衡山八月西巡狩至于西嶽如𥘉禮西嶽華山十有一月朔巡狩至于北嶽如𥘉禮朔北方北獄恒山歸格於藝祖用特藝祢也尚書大傳曰元祀巡狩四嶽八伯壇四奥沉四海封十有二山肇十有二州毛詩清廟曰時邁巡狩告祭柴望也巡狩告祭者天子巡行郡囯至方嶽之下而}
