  - {type: variant, offset: 4677, length: 12, content: 飲福酒中書令張說進稱天賜, SBCK: 命羣牧守相述職班教順陽宣化烝􅀺允示訓德歌功觀事樂業是歳甘露降黄龍見海外有克捷之師方内有豊穰之慶農有餘粟女有餘布遐狄來享殊俗内附穆乎有太平之風潘岳籍田賦曰伊晉之四年}
