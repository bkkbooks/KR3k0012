  - {type: variant, offset: 3690, length: 2, content: 廢壞, SBCK: 何可量處千畒考上元辰朕當親率百辟致禮郊甸庶幾誠素獎􅀍斯民又曰籍田皇帝冠通天冠朱紘青介幘衣青紗衮侍中陪乗奉車即秉轡又曰車駕至籍田侍中跪奏降車臨壇大司農跪奏先農巳享請皇帝親耕太史令讃曰皇帝親耕三推三反於是羣臣以次耕王公五等開國諸侯五推五反􅀌卿大夫七推七反士九推九反籍田令率其屬耕竟畒灑種即耰齊書禮志曰}
