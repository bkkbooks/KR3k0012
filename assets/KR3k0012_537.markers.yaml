  body:
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 六巡狩籍田巡狩易觀卦曰風行地上觀先王以省方􅀚民設教也尚書舜典曰歳二月東巡狩至于岱宗柴積柴以燎望秩于山川秩者如其秩次之奈也肆覲東后恊時月正日恊和同律度量衡同齊同也脩}
  - {type: variant, offset: 4, length: 8, content: 五封禪河圖真紀鉤, WYG: 六廵狩籍田廵狩易觀卦}
  - {type: variant, offset: 4, length: 0, content: '', krp: 六巡狩籍田巡狩易觀卦曰風行地上觀先王以省方觀民設教也尚書舜典曰歳二月東巡狩至于岱宗柴積柴以燎望秩于山川秩者如其秩次之奈也肆覲東后恊時月正日恊和同律度量衡同齊同也脩}
