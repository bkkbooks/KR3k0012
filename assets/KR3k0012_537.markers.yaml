  - {type: variant, offset: 1550, length: 1, content: 壽, SBCK: 帝故諸侯勤以輔事於天子注言無事而居位食禄是不義而冨且貴禮記外傳曰籍者借也天子耕千畒但三推發耒三岱而止借民力治之所耕之榖藏於神倉以供事天地宗廟神祇人鬼之用也天子以身先天下所以勸下民也以建寅之月而郊北郊即祈榖之祭郊而後耕郊用辛日擇吉日而耕用亥日享先農而後籍田國語曰周宣王即位不籍千畒虢文公諌曰夫民之大事在農上帝之粢盛於是乎出民之蕃庶於是乎生是故稷爲大官古者太史順時􅓊出土氣震發先時九日太史告稷曰陽氣俱烝土膏其動稷以告王王即齋宫百官御事王耕一墢}
  - {type: page-break, offset: 1550, content: '', id: KR3k0012_SBCK_537-6b}
