  - {type: variant, offset: 5273, length: 211, content: 功成封禪以告太平也所以必於太山何萬物之所交代之處也必於其一何因高告順其類也故升封者增高也下禪梁甫之基廣厚也刻石記號者著己之功跡也天以高為尊地以厚為德故增太山之高以放天附梁甫之基以報地明天之所命功成事就有益天地若高者加高厚者加厚矣或曰封者金泥銀繩或曰石泥金繩封以印璽故孔子曰升太山觀易姓而王可得而數者七十餘君風俗通曰封太山禪梁父說岱宗上有金篋玉策能知人年壽脩短武帝探得十八倒讀曰八十其後果用考長桓譚新論曰太山之上有刻石凡千八, SBCK: 御覽卷第五}
