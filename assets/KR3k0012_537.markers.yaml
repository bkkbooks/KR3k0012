  - {type: variant, offset: 1540, length: 9, content: 從禪還坐明堂群臣更, SBCK: 三推公五推卿諸侯九推反乃執爵于大寢三公九卿諸侯大夫皆御命曰勞酒又祭義曰昔天子爲籍田千畒冕而朱紘躬秉耒耜諸侯爲籍百畒冕而青紘躬秉耒耜以事天地山川社稷先公醴酪粢盛於是乎取之敬之至也又祭義曰耕籍所以教諸侯之養也又祭統曰天子親耕於南郊以供粢盛王后􅅙於北郊以供冕服天子諸侯非莫耕也王后夫人非莫􅅙也身致其誠信而巳矣又表記曰天子親耕粢盛秬鬯以事}
