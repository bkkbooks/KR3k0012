  - {type: variant, offset: 1405, length: 4, content: 尺高九尺, WYG: 年正月上既畢郊祀之事乃東廵出於河内納青兖之郊廻冀州禮北嶽聖澤流浃黎元被徳嘉瑞並集張衡廵狩頌曰初吉帝将狩於岱嶽展誼省方觀風設教丙寅朏率羣賓偹法駕以祖於東門乙酉觀禮於魯而休齊焉己丒召於靈宫是日有鳳雙集於䑓馬融東廵頌曰敷六典經八成燮和萬殊總領神明類乎上帝柴乎三辰禋祠乎六宗祗燎乎羣神籍田毛詩閔予載芟曰載芟春籍田而祈社稷也周禮天官上甸師曰掌帥}
