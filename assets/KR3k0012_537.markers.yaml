  - {type: variant, offset: 2328, length: 233, content: 奏當用方石再累置壇中皆方五尺一枚厚一尺用玉牒書藏方石牒厚五寸長尺三寸廣五寸有玉牒十枚列於方石旁東西南北各三皆長三尺廣一尺厚七寸檢中刻三處深四寸方五寸有蓋檢用金縷五周以水銀和金為泥刻玉璽一枚方寸一分一枚方五寸石四角有距石皆再累一枚長一丈厚一尺廣二尺皆在壇上其下用距十八枚皆高三尺厚一尺廣二尺如小碑環壇立之去三步距石下皆有石跗入地四尺又用石碑高九尺廣三尺五寸厚尺二寸立壇丙地去壇三尺以刻書上以用石功難又欲及二月封故詔松因故封石空檢更加封而已松上䟽爭之以為登封之禮今告功皇, SBCK: 請行事訖就耕位}
