  - {type: variant, offset: 1648, length: 57, content: 節也宜順承天慶垂萬世之基上然之乃自制儀采儒術以文焉又郊祀志曰初上欲治明堂奉高旁未曉其制度濟南人公玉帶上黃帝時明堂圖, WYG: ''}
