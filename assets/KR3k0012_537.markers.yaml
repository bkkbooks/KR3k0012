  - {type: variant, offset: 920, length: 7, content: 封禪為蒲車惡傷, SBCK: 天子廵狩之禮布在方䇿至􅁗漢廵幸或以厭望氣之祥或以希神仙之應煩擾之役多非舊典惟後漢諸帝頗有古禮焉魏文帝值三分初創方隅事多皇輿亟動略無寜歳盖應時之務又非舊章也明帝凡三東廵所過存問髙年恤人疾苦或賜榖帛有古廵幸之風焉齊王正始元年巡洛陽縣賜髙年力田各有差又曰元嘉四年二月太祖東巡至丹徒告覲園陵三月幸丹徒離宮升京城北頋饗父老舊勲于丹徒行宫加賜衣裳各有差蠲丹徒縣其年租賦宋書文帝行丹徒詔吾生在此城及盧循肆亂害流茲境先帝以桑梓根本寔同休慼復以䝉弱猥預艱難情義繾綣夷險備經遺蹤舊物猶存心目歳月不居逝踰三紀時人故老與運遷落眷惟旣徃倍􅀷感歎越絶書曰禹巡狩大越見􅂄老納詩書審銓衡平斗斛孟子曰夏諺曰吾王不逰吾何以休吾王不預吾何以助一逰一豫爲諸侯度也又曰晏子對齊景公曰天子適諸侯曰廵狩春省耕而􅀘不足秋省歛而助不給也孔叢子曰古者天子將巡狩必造于祖禰命告群祀及社稷畿内名}
  - {type: page-break, offset: 920, content: '', id: KR3k0012_SBCK_537-4a}
  - {type: variant, offset: 920, length: 2, content: 封禪, WYG: 天子廵狩之禮布在方䇿至秦漢廵幸或以厭望氣之祥或以希神仙之應煩擾之役多非舊典惟後漢諸帝頗有古禮焉魏文帝值参分初創方隅事多皇輿亟動畧無寧嵗盖應時之務又非舊章也明帝凡三東廵所過存問髙年恤人疾苦或賜榖布帛有古廵幸之風焉齊正始元年廵洛陽縣賜髙年力田各有差又曰元嘉四年二月太祖東廵至丹徒告覲園陵三月幸丹徒離宫升京城北顧饗父老舊勲於丹徒行宫加賜衣裳各有差蠲丹徒縣其年租賦宋書曰文帝幸丹徒詔吾生在此城及盧循肆亂害流茲境先帝以桑梓根本寔同休戚復以䝉弱猥預艱難情義繾綣夷險備經遺蹤舊物猶存心目嵗月不居遊踰三紀時人故老與運遷落眷惟既往倍深感歎越絶書曰禹廵狩大越見耆老納詩書審銓衡平斗斛孟子曰夏諺曰吾王不遊吾何以休吾王不豫吾何以助一遊一豫}
