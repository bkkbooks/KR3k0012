  - {type: variant, offset: 3152, length: 2, content: 魏明, SBCK: 武}
  - {type: variant, offset: 3152, length: 264, content: 魏明帝黃初中護軍蔣濟表曰夫帝王大禮巡狩為先昭祖楊禰封禪為首是以自古革命受符未有不蹈梁父登太山刊無竟之名紀天人之際者也宜下公卿廣撰其禮卜年考時昭告上帝以副天下之望帝詔曰聞蔣濟斯言使吾汗出流自開闢以來封禪者七十餘君耳故太史公曰雖有受命之君而功有不洽是以中間其遠者千有餘年近者數百載其儀闕不可得記吾何德之脩敢庶茲乎濟豈謂世無管仲以吾有桓公登太山之志乎吾不敢欺天也濟之所言華則榮矣非助我者也公卿侍中尚書侍省之而已勿有所議天子雖拒濟議而實使高堂隆草封禪之儀以天下未一不欲便行大禮會隆卒不復行之魏志曰帝聞隆沒歎曰天不欲成吾事堂生捨我亡也又曰, WYG: ''}
  - {type: variant, offset: 3152, length: 2, content: 魏明, krp: 武}
  - {type: variant, offset: 3155, length: 2, content: 黃初, SBCK: 末有司奏古諸侯耕籍百畒躬執耒耜以奉社稷宗廟勸率農功今諸王臨國冝依之竟不施行又江彪傳曰哀帝即位欲躬自籍田彪以禮廢日乆儀注不存}
