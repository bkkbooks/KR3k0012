  - {type: variant, offset: 4276, length: 179, content: 都三年正月戊辰朔車駕至太山親祀昊天上帝於封祀壇以高祖太宗配饗已巳帝升山行封禪之禮庚午禪於社首祭皇地祇以太穆太皇太后配饗皇后為亞獻越國太妃燕氏為終獻辛未御降禪壇壬申御朝覲受朝賀改元乾封又曰麟德三年登封太山先是皇后抗表曰封禪舊儀祭皇地祗以太后昭配而皆以公卿行事詳求至理有紊徽章望以展禮之日揔率六宮內外命婦親奉奠獻從之至時遂以皇后為亞獻越國太妃燕氏為終獻帝行初獻之, SBCK: 郊}
