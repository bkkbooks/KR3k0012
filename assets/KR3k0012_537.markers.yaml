  - {type: variant, offset: 5485, length: 195, content: 餘處而可識知者七十有二袁准正論曰封禪之言唯周官有三大封之文齊桓公欲封禪聞管仲言而止焚燎祭天皆王者之事非諸侯之所為也是以學者疑焉後秦一主漢二君脩封禪之事其制為封土方丈餘崇於太山之上皆不見於經秦漢之事未可專管仲云禹禪會稽告天則同祭地不得異也會稽而可禪四嶽皆可封也夫洛陽者天地之所合嵩高者六合之中也今處天地之中而告於嵩高可也奚必於太山王嬰古今通論曰太山上為天門值戶戶為明堂聖帝受天官之宮也王者即位, SBCK: ''}
