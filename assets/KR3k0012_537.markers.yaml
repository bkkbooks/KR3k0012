  - {type: variant, offset: 4676, length: 0, content: '', SBCK: 曰朕憂人知勤勞俯同九推而止自是公卿巳下皆過於古五經要義曰天子籍田千畒以供上帝之粢盛常孟春啓蟄即郊之後身率公卿大夫而親耕焉所以先百姓而致孝敬􅀃文曰帝籍千畒者使民如借故謂之籍從耒昔聲應劭漢官儀曰天子東耕之日率三公九卿戴青幘冠青衣載青旂駕蒼龍徃岀種堂天子升壇公卿耕訖天子耕於壇舉耒三應劭漢官儀曰天子升壇公卿耕訖嗇夫下種凡􅁛籍田爲千畒亦曰帝籍亦曰耕籍亦曰東耕亦曰親耕亦曰王籍六典曰凡籍田所収九榖納于神倉以供粢盛五齊三酒之用􅀂有餘及穰稁供飼犧牲焉又曰兩漢及魏晉並有其禮過江草創未暇至宋始有也黄瓊上書曰先農之禮所冝躬親以迎春和以致時雨論衡曰立春東耕爲土象人男女各二秉耒鋤或立土牛象人土中未必而耕也從氣應時示率下也東京賦曰躬三推於天田脩帝籍之千畒繆襲許昌宫賦曰太和六年春上旣躬耕帝籍發趾乎千畒以帥先萬國}
