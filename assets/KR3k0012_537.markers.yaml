  - {type: variant, offset: 4697, length: 17, content: 復始永綏兆人帝拜稽首山上作圓臺四階, SBCK: ''}
  - {type: variant, offset: 4697, length: 379, content: 復始永綏兆人帝拜稽首山上作圓臺四階謂之䃭王中金泥䃭際以天下同文之印封之然後焚柴燎發群臣稱萬歲傳呼從山頂至山下振動天地鸞輅還山下之齊宮有慶雲隨馬祥風繞輅中書令張說等賀上曰朕以薄德恭膺大寶雲物休祐皆是卿輔弼之力君臣相保勉副天心長如今日不敢矜怠說等又曰聖心誠懇昨夜齋則息風收雨今朝封祀則天清日暖復有祥風助樂卿雲引燎靈跡盛事千古未聞辛卯祀皇地祗于社首之太折壇睿宗皇帝配享藏玉冊於石䃭如封祀壇之儀初上登山至齋宮其夕陰雲慘冽勁風四起裂幕折柱寒氣切骨上露立祈請仰天自誓曰某身有過請即降罰萬人無福亦請某為當罪應時風上天地清晏及升壇休氣四塞登封飄若天外及禪社首五色雲見日重輪又曰開元十三年登封太山上因問玉牒之文前代帝王何故秘之賀知章曰玉牒本是通於神明之意前代帝王祈求各異或禱年筭或思神仙其事微密故外人莫知之上曰朕今此行皆為蒼生祈福更無秘請宜將玉牒出示百寮其詞曰有唐天子臣某敢昭, WYG: ''}
  - {type: variant, offset: 4697, length: 17, content: 復始永綏兆人帝拜稽首山上作圓臺四階, krp: ''}
