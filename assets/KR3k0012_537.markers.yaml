  - {type: variant, offset: 1626, length: 1, content: 薦, WYG: 山川社稷先公醴酪粢盛於是乎取之敬之至也又祭義曰耕籍所以教諸侯之養也又祭綂曰天子親耕於南郊以供粢盛王后蠶於北郊以供冕服天子諸侯非莫耕也王后夫人非莫蠶也身致其誠信而已矣又表記曰天子親耕粢盛俎豆以事上帝故諸侯勤以輔事於天子注言無事而居位食祿是不義而富貴}
