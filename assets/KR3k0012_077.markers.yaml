  - {type: variant, offset: 1763, length: 0, content: '', SBCK: 不可勝量又曰大傳􅀃遂人爲遂皇伏戲爲戲皇神農爲農皇也遂人以火紀火陽也陽尊故託遂皇於天伏戯以人事紀故託戲皇以人蓋天非人不固人非天不成也神農悉地力植􅂖故託農皇於地天地人之道備而三五之運興矣又曰五帝易傳禮記春秋國語太史公記黄帝顓頊帝嚳帝堯帝舜是五帝也謹案易尚書大傳天立五帝以爲相四時施生法度明察春夏慶賞秋冬刑罰}
