  - {type: variant, offset: 2469, length: 1655, content: 九代之君法制不一號令不同然俱王天下者何也必國富而粟多也夫富國多粟生於農故先王貴之晏子曰古者有紩衣攣領而王天下者有處層巢窟穴而王天下者老子曰聖人處無為之事行不言之教萬物作而不辭生於不有為而不恃功成而不居夫唯不居是以不去又曰不尚賢使民不爭不貴難得之貨使民不為盜不見可欲使心不亂是以聖人之治虛其心實其腹弱其志強其骨常使民無知無欲使夫知者不敢為也無為則無不治也又曰道大天大地大王亦大域中有四大而王居其一又曰聖人無常心以百姓心為心善者吾善之不善者吾亦善之得善矣信者吾信之不信者吾亦信之得信矣聖人在天下歙然為天下渾其心百姓皆注其耳目聖人皆孩之又曰聖人之言云我無為而民自化我無事而民自富我好靜而民自正我無欲而民自朴又曰聖人執左契而不責於人故有德司契無德司徹聖人之心與百姓心猶左右契耳契來則合故上下相親怨用不作後世不能執左契以應物而守常徹以軌民用此來和必有餘怨矣又曰江海所以能為百谷王者以其善下之也是以聖人欲上人也必以其言下之欲先人也必以其身後之故處上弗害是以天下樂推而不厭也董子曰為天子不可不承天意必順其道然後為安又曰古之造文字者三畫而謂之王三畫者天地人也連其中者通其道也孟子曰人皆有不忍人之心言人人皆有不忍加惡於人之心也先王有不忍人之心斯有不忍人之政矣以不忍人之心行不忍人之政治天下可運之掌上也又曰五霸者三王之罪人也趙臺卿章句曰五霸大國康政以率諸侯也齊桓晉文秦襄楚莊是也三王夏禹啇湯周文王也今之諸侯五霸之罪人也天子討而不伐諸侯伐而不討孫卿子曰人君者隆禮尊賢而王重法愛人而霸好利多詐而危欲近四旁莫如中央故王者必居天下之中也又曰粹而王駮而霸無一焉而亡又曰國者天下之利用也人主者天下之利勢也得道以持之則大安大榮積善之源也不得道以持之則大危也義立而王信立而霸權謀立而亡行一不義殺一無罪而得天下仁者不為也莊子曰盜跖曰古之禽獸多而人民少於是人皆巢居以避之晝拾橡栗暮栖木上故命之曰有巢氏之古者人不知衣服夏則多積薪冬則煬之故命之曰知生之人神農之代臥則居居起則于于知其母不知其父與麋鹿同處耕而食織而衣無有相害之心此至德之隆也又曰夫帝王之德以天地為宗以道德為主以無為為常無為也則用天下而有餘又曰天道運而無所積故万物成帝道運而無所積故天下歸聖道運而無所積故海內服此三者恣物之性而無所牽滯明於天道於聖六通四辟帝王之德者夫靈靜恬淡寂寞無為者萬物之本以此處上帝王天子之德又曰廣成子曰得吾道者上為皇而下為王郭璞曰皇王之稱隨世之上下耳其於得通變之道以應無窮一也失吾道者上見光而下為土失無窮之道則自信於一變而不能均同上下矣故俯仰異心也又曰赫胥氏之時民居不知所為行不知所之含哺而熙鼓腹而遊民能以此矣又曰昔容成氏大庭氏柏皇氏中央氏栗陸氏驪連氏軒轅氏赫胥氏尊盧氏祝融氏伏犧神農氏當是時也民結繩而用之郭象曰足以紀要而已也甘其食美其服適故常甘當故常美若思夫侈靡則無時慷矣樂其俗安其鄰國相望雞狗之音相聞民至老死而相往來無求之至也若此時則至治也已又曰古之王天下者知雖落天下不自慮也辯雖彫萬物不自說也能雖窮海內不自為也天不產而萬物化地不長而萬物育帝王無為天下功故曰莫神於天莫富於地莫大於帝王故曰帝王之德配天地此乘天地馳萬物而用人君之道也又曰至德之世不尚賢不使能民如野鹿正而不知以為義相愛而不知以為義實而不知以為忠當而不知以為信又曰聖人之靜也非曰其靜者善故靜也萬物無足以橈心者故靜也郭象曰橈亂也夫靈靜恬淡寂寞無為者天地之平而道德之至也故帝王聖人休焉唐子曰君人者秉南面之尊操殺生之柄威如秋霜恩如春養何求而不得何化而不從君人者當以江海為腹山林為面當使觀者不知江河藏山何有蘇子曰天子坐九重之內樹塞其門旒以翳明衡以隱聽鸞以柳馳陸子曰三皇垂策而五帝繁手唐虞按轡禹湯馳轅雖使周公御衡仲尼促節固不已也孫綽子曰道一者帝德充者王依仁仗義者霸無為而治者道也為能不侍者德也存三亡國仁也責貢不入義也慎子曰昔者天子手能依而宰夫設服足能行而相者導進口能言而行人稱辭故無失言失禮也又曰古者立天子貴之者非以利一人曰天下無一貴則理無由通通理為天下也故立天子為天下也非立天下為天子也立國君以為國也非立國以為君也, SBCK: 七}
