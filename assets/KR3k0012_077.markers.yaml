  - {type: variant, offset: 229, length: 0, content: '', SBCK: 聖人有貴尺之璧而重寸之隂時難得而易失也禹之趨時也履遺而弗納冠掛而不頋非爭其先也而争其得時也是故聖人守清道而抱雌節清和静也雌柔弱也因循應變常後而不先柔弱以靜舒安以定舒詳也攻大磨堅莫能與之爭攻大磨堅喻難也又曰帝者體太一}
  - {type: variant, offset: 229, length: 0, content: '', WYG: 聖人不貴尺璧而重寸隂時難得而易失也禹之趨時也履遺而弗納冠掛而不顧非爭其先也而爭其得時也是故聖人守清道而抱雌節清和静也雌柔弱也因循應變常後而不先柔弱以静舒安以定舒詳也攻大磨堅莫能與之爭攻大磨堅喻難也又曰帝者體太一}
