  - {type: variant, offset: 189, length: 1, content: 興, SBCK: 天地大矣生而弗成子而弗有髙曰天大地大生育民人巳不爲不以爲巳子子成遂萬物不以爲巳有也萬物皆􅀍其澤得其利而莫知其所由始由從也萬物皆蒙天地之澤而得其利時父老無徭役之勞擊壤}
  - {type: variant, offset: 189, length: 1, content: 興, WYG: 天地大矣生而弗成子而弗有天地至大生育人民不以為己子也成遂萬物不以為己有也萬物皆被其澤得其利而莫知其所由始此三皇五帝之德也又曰黄帝曰茫茫昧昧因天之威與元同氣髙誘曰茫茫昧昧廣大貎也因天之威無不敗也與元同氣無不恊也故曰同氣賢}
  - {type: variant, offset: 189, length: 1, content: 興, krp: 天地大矣生而弗成子而弗有髙曰天大地大生育民人巳不爲不以爲巳子子成遂萬物不以爲巳有也萬物皆𬒳其澤得其利而莫知其所由始由從也萬物皆蒙天地之澤而得其利時父老無徭役之勞擊壤}
  - {type: variant, offset: 191, length: 0, content: '', SBCK: 里陌自以爲然故曰莫知其所從始者也此三皇五帝之德也又曰黃帝曰芒芒昧昧因天之威與元同氣髙誘曰芒芒昧昧廣大貌也因天之威無不敗也與元同氣無不恊也故曰同氣賢於同義同義賢於同力同力賢於同居帝者同氣同元氣也王者同義同}
  - {type: variant, offset: 191, length: 0, content: '', WYG: 同義同義賢於同力同力賢於同居帝者同氣同元氣也王者同義同}
