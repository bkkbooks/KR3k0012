  - {type: variant, offset: 294, length: 0, content: '', WYG: 立五帝以為相四時施生法度明察春夏慶賞秋冬刑罰帝者任德設刑以則像之言其能行大道舉措審諦也黄帝者先也厚也中和之色德施四季與地同功故先王以别之也顓者專也頊者信也慤也言其承文易之以質使天下遵化皆貴貞慤也嚳者考也成也言其考明法度美譽醇然若酒之芬香也堯者高也言其隆興煥炳最高明也舜者准也循也言其准行道以循堯緒也又}
