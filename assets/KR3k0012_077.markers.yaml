  - {type: variant, offset: 817, length: 863, content: 曰故聖人作則必以天地為本以陰陽為端以四時為柄以日星為紀以月為量鬼神以為徒五行以為質禮義以為器人情以為田四靈以為畜又曰故聖王脩義之柄禮之序以治人情故人情者聖人之田也禮斗威儀曰帝者得其英華王者得其根核霸者得其附支故帝道不行不能王王道不行不能霸霸道不行不能守其身禮含文嘉曰山澤者三皇五帝之感應也春秋演孔圖曰正氣為帝間氣為臣宮商為姓秀氣為人正氣為若木則人得蒼龍之形靈威仰之氣史則得朱鳥之形赤熛怒之氣以生之又曰天子皆五帝精寶各有題序次運相據起必有神靈符紀諸神扶助使開階立遂遂當作燧燧道也又曰王者常置圖籙坐旁以自正春秋元命苞曰皇者煌煌也道爛然顯明帝者諦也春秋文耀鉤曰王者往也神所向往人所歸樂春秋運斗樞曰宓犧女媧神農是謂三皇也皇者合元履中開陰布網指天畫地神化潛通春秋合誠圖曰大帝之精起三河之州中土之腴又曰大帝冠五彩衣青衣黑下裳抱日月日在上月在下黃色正方居曰間名曰五光正黃而名之曰五光者蓋以黃為質而眾彩就飾之故曰五色此大帝人象旁文也春秋保乾圖曰天子至尊也神精與天地通血氣含五帝精人受天地氣而主故神精與天地通天愛之子之也春秋佐助期曰天子法斗諸侯應宿春秋潛潭巴曰天子有三寶謂璿璣玉衡得其度也春秋繁露曰德侔天地者稱皇帝天佑而子之號稱天子孝經授神契曰王德珍文備象連表萬精曲飾題類設術脩經躬仁尚義祖禮行信握權仁智順道形人俱在至德孝經鉤命決曰三皇步五帝驟三王馳五霸騖或稱帝王接上稱天子明以爵事天接下稱帝王明以號令臣下論語摘褰聖承進曰帝不先義任道德王不先力尚仁義霸不先正尚武力論語撰考讖曰考靈差德知堯步舜驟禹馳湯騖德有優劣故曰行轉疾也家語曰孔子觀乎明堂覩四門之墉有堯舜桀紂之象又有周公相成王之圖孔子謂從者曰夫明鏡所以察形往古所以知今又曰季康子問於孔子曰舊聞五帝之名而不知其實請問何謂孔子曰昔丘也聞諸老聃天有五行木金火水及土分時化育以成萬物其神謂之五帝古之王者易代改號取法五行五行更王終始相生亦象其義也故其生為明王者而死配五行白虎通曰帝王者號也號者古之表也所以表功明德號令臣下德合天者稱帝仁義合者稱王別優劣也又曰皇君也美也大也天人之揔美大之稱也時質惣稱之漢書, WYG: ''}
