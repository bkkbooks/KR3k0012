  - {type: variant, offset: 225, length: 0, content: '', WYG: 德之世謂太古三皇之時其暝乎混淆之域而徙倚乎瀾漫之宇提挈天地委萬物以鴻濛為景性而浡楊乎無畛崖之際是故聖人呼吸隂陽之氣而羣生莫不喁喁然仰其德和順止當此之時莫不領理决離隱愍而自成渾渾若若純樸未散滂薄為一而萬物大優是故雖有明知無所用之又曰古者至德之世賈便其肆農樂其業大夫安其職而處士循其道當此之時風雨不毁折草木不夭死九鼎重王者之德休明則鼎重姦回淫亂則鼎輕也珠玉潤澤洛出丹書河出録圖故許由方回堯使方回求子列藥得之善卷披衣得達其道何也其主有欲利天下之心是以人得自樂其間四子之才非能盡大蓋今之世也然莫能與之同光者遇唐虞之時也又曰人主之居如日月之明也天下之所同側目而視傾耳而聽延頸舉踵而望也是故非淡泊無以明志非寧静無以致逺非寛大無以亷覆非慈厚無以懷衆非平正無以制斷又曰古者有鍪而綣領以王天下者矣古者蓋三皇以前也鍪頭著叟鍪㡌言未知制冠也綣領皮衣屈而袂之如今胡家常襲文攝以為領也一說鍪放髪也綣領頸而已皆無飾也其德生而不辱刑措不用也予而不奪予其則也不奪無所欲求於民也天下不非其服同懷其德非猶譏也懷歸當此之時隂陽和平風雨時節萬物蕃息政不虚生無夭折鳥鵲之巢可俯而探也禽獸可羇而從也從猶牽也豈必褒衣博帶句襟委貌章甫哉又曰國之所以存者道德也道德施行民悅其化故國存也家之所以亡者理塞也理道堯無百户之郭舜無植錐之地以有天下禹無十人之衆湯無七里之分以王諸侯文王處岐周之間地方不過百里而立為天子者有王}
