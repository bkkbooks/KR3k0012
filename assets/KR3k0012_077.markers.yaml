  - {type: variant, offset: 231, length: 0, content: '', SBCK: 法隂陽霸者則四時君者用六律體太一者牢籠天地彈􅎹山川含􅄍隂陽中曳四時紀綱八極經緯六合覆露照導普汜而無私普天汜衆也無私愛増言皆公也翾飛蠕動莫不仰德而生法隂陽者承天地之和形萬殊之體含氣化物以成垀􅀋垀形也盈縮卷舒淪於不測盈長縮短卷屈舒散入於不可測盡之源也終始虚滿轉於無源則四時者春生夏長秋收冬藏取與有節出入有時開闔張翕不失其序喜怒剛柔不離其理用六律者生之與殺賞之與罰與之與奪非此無道也明四時六律之君非用此上事其餘無池道也又曰古之立帝王者非以奉養其欲也聖人之踐位者非以供樂其身也爲}
