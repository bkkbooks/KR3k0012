  - {type: variant, offset: 3247, length: 857, content: 巢氏之古者人不知衣服夏則多積薪冬則煬之故命之曰知生之人神農之代臥則居居起則于于知其母不知其父與麋鹿同處耕而食織而衣無有相害之心此至德之隆也又曰夫帝王之德以天地為宗以道德為主以無為為常無為也則用天下而有餘又曰天道運而無所積故万物成帝道運而無所積故天下歸聖道運而無所積故海內服此三者恣物之性而無所牽滯明於天道於聖六通四辟帝王之德者夫靈靜恬淡寂寞無為者萬物之本以此處上帝王天子之德又曰廣成子曰得吾道者上為皇而下為王郭璞曰皇王之稱隨世之上下耳其於得通變之道以應無窮一也失吾道者上見光而下為土失無窮之道則自信於一變而不能均同上下矣故俯仰異心也又曰赫胥氏之時民居不知所為行不知所之含哺而熙鼓腹而遊民能以此矣又曰昔容成氏大庭氏柏皇氏中央氏栗陸氏驪連氏軒轅氏赫胥氏尊盧氏祝融氏伏犧神農氏當是時也民結繩而用之郭象曰足以紀要而已也甘其食美其服適故常甘當故常美若思夫侈靡則無時慷矣樂其俗安其鄰國相望雞狗之音相聞民至老死而相往來無求之至也若此時則至治也已又曰古之王天下者知雖落天下不自慮也辯雖彫萬物不自說也能雖窮海內不自為也天不產而萬物化地不長而萬物育帝王無為天下功故曰莫神於天莫富於地莫大於帝王故曰帝王之德配天地此乘天地馳萬物而用人君之道也又曰至德之世不尚賢不使能民如野鹿正而不知以為義相愛而不知以為義實而不知以為忠當而不知以為信又曰聖人之靜也非曰其靜者善故靜也萬物無足以橈心者故靜也郭象曰橈亂也夫靈靜恬淡寂寞無為者天地之平而道德之至也故帝王聖人休焉唐子曰君人者秉南面之尊操殺生之柄威如秋霜恩如春養何求而不得何化而不從君人者當以江海為腹山林為面當使觀者不知江河藏山何有蘇子曰天子坐九重之內樹塞其門旒以翳明衡以隱聽鸞以柳馳陸子曰三皇垂策而五帝繁手唐虞按轡禹湯馳轅雖使周公御衡仲尼促節固不已也孫綽子曰道一者帝德充者王依仁仗義者霸無為而治者道也為能不侍者德也存三亡國仁也責貢不入義也慎子曰昔者天子手能依而宰夫設服足能行而相者導進口能言而行人稱辭故無失言失禮也又曰古者立天子貴之者非以利一人曰天下無一貴則理無由通通理為天下也故立天子為天下也非立, WYG: ''}
