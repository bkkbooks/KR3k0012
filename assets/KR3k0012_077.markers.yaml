  - {type: variant, offset: 1704, length: 797, content: 可與為惡是謂上智桀紂龍逢比干欲與為善則誅子華崇侯與之為惡則行不可與為善可與為惡是為下愚應劭漢官儀曰皇者大帝言其煌煌盛美帝者德象天地言其能行天道舉措審諦父天母地為天下主漢雜事曰漢有天下號曰皇帝自稱朕人臣稱之曰陛下其命令制詔衣冠車馬器械百物曰乘輿所在曰行在所至曰幸所居曰某禁中所進曰御天子至尊不敢褻瀆之故託於乘輿天子以天下為家不以京師宮室為常處則當乘輿以行天下猶調之車駕今雖在京師京師言行在所巡狩天下所奏事處皆為宮在長安則曰長安宮在泰山則曰奉商宮唯當時所至帝王世紀曰天子至尊之定名也應神受命為天所子故謂之天子故孔子曰天子之德感天地洞八方是以功合神者稱皇德合天地稱帝義名曰稱王韋曜洞紀曰自天地剖判君世宰人可得而言者唯庖犧畫卦神農作稼黃帝輿服最為昭顯其餘非書記所述難可紀焉六韜曰王者之道如龍之首高居而遠望深視而審聽神其形而散其精若天高而不可極若淵深而不可測故可怒而不怒臣乃為虎不可殺而不殺大賊乃發又曰昔柏皇氏栗陸氏驪連氏軒轅氏赫胥氏尊盧氏祝融氏此古之王者也未使民民化未賞民民勸此皆古之善為政者也至於伏羲氏神農氏教民而不誅黃帝堯舜誅而不怒古之不變者有苗有之堯化而取之堯德衰舜化而受之舜德禹化而取之太公伏符陰謀曰武王曰三皇之治母禮義而民利之何也太公曰三皇之時近之則利去之則病所謂上聖神德而治其次教而化之近聖賞罰之管子曰黃帝立明臺之議上觀於賢也堯有衢室之問下聽於人也舜有告善之旌而主不蔽也禹立建鼓於朝而備評謠也湯有總街之庭觀人誹也武王有靈臺之復賢者進也古聖帝明王所以有而勿失得而勿亡也又曰明一者皇察道者帝通德者王謀得兵勝者霸又曰桓子問曰三王者既殺其君矣今言仁義則必以三王為法度不識其故何也對曰昔者禹平治天下及桀而亂之湯放桀以定禹功也湯平治天下及紂百亂之武王伐紂以定湯功也善之伐不善自古至今未有改之君何疑焉又曰言室滿室言堂滿堂是謂聖王又曰昔者七十九代之君法制不一號令不同然俱王天下者何也必國富而粟多也夫富國多粟, WYG: ''}
