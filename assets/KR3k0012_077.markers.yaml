  - {type: variant, offset: 225, length: 0, content: '', SBCK: 德之世謂太古三皇之時其瞑乎混淆之域而徙􅀝乎瀾澷之宇提挈天地委萬物以鴻濛爲景性而浡楊乎無畛崖之際是故聖人呼吸隂陽之氣而群生莫不喁喁然仰其德和順止當此之時莫不領理決離隱􅉖而自成渾渾􅀂􅀂純樸未散滂薄爲一而萬物大優是故雖有明知無所用之又曰古者至德之世賈便其肆農樂其業大夫安其職而處士循其道當此之時風􅀨不毀折草木不夭死九鼎重王者之德休明則鼎重姦因􅁋乱則鼎輕也珠玉潤澤洛出丹書河出緑圖故許由方囬堯使方囬求子列藥得之善卷披衣得逹其道何則世主有欲利天下之心是以人得自樂其間四子之材非能盡大蓋今之世也然莫能與之同光者遇唐虞之時也又曰人主之居如日月之明也天下之所同側目而視傾耳而聽延頸舉踵而望也是故非淡漠無以明德非寕靜無以致逺非寛大無以兼覆非慈厚無以懷衆非平正無以制斷又曰古者有鍪而綣領以王天下者矣古者蓋三皇以前也鍪頭着兠鍪帽言未知制冠也綣領皮衣屈而􅃑之如今胡家韋襲文攝以爲領也一􅀃鍪放髪也綣繞頸而巳皆無飾也其徳生而不辱刑措不用也予而不奪予其則也不奪無所徴求於民也天下不非其服同懷其德非猶譏也懷歸當此之時隂陽和平風􅀨時節萬物蕃息政不虐生無天折烏鵲之巢可俯而􅊥也禽獸可羇而從也從猶牽也豈必襃衣博帶句􅁭委貌章甫哉又曰國之所以存者道德也道德施行民􅀃其化故國存也家之所以亡者理塞也理道堯無百户之郭舜無植錐之地以有天下禹無十人之衆湯無七里之分以王諸侯文王處歧周之間地方不過百里而立爲天子者有王}
