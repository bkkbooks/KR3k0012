  - {type: variant, offset: 1786, length: 0, content: '', SBCK: 遵化皆貴貞慤也嚳者考也成也言其考明法度醇羙嚳然􅀂酒之芬香也堯者髙也言其隆興煥炳最髙明也舜者准也循也言其准行道以循堯緒也又曰禮號謚記􅀃夏禹殷湯周武王是三王也禹者輔也輔續舜後庶績洪茂自堯以上王者子孫據國而起功德浸盛故造羙謚舜禹夲以白衣砥行顯名升爲天子雖復制謚不如名著故國名焉湯者攘也言其禳除不䡄改亳爲啇成就王道天下熾昌文武皆以其長夫擅國之謂王能制殺生之威之謂王王者徃也天下所歸徃也又曰易稱天先春而後秋地先生而後凋日月先光而後幽是以王者則之亦先教而後刑三皇結繩五帝􅀞像三王肉刑霸丗黜巧此言歩驟稍有優劣也傅子曰庖犧神農順民之性育之者也黃帝除民之害救之者也舜治天下垂拱無爲者以咎繇旣舉而不仁逺也禹治洪水冠桂不頋者不以下憂累其上也湯去三靣之網歸之者四十國文王葬城隅之枯骨天下懷其仁所惠者小所感者大仁心先之也又曰不使不仁加乎天下用武勝殘而百姓以濟此仁形於撥亂黃帝是也時有萬物必丗而後仁此著於治平堯舜是也周生烈子曰居堯舜之位而不行唐虞之政者猶反衣狐白歩牽騄耳黃石公三略曰夫三皇無言化流四海故天下無所歸功帝者躰天則地有言有令而天下太平君臣讓功四海行焉王者制人道德降心服志設矩備衰有察察之政甲兵之事備而無争戰血刃之用天下太平君無疑於}
