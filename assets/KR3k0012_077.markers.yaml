  - {type: variant, offset: 283, length: 0, content: '', WYG: 人盟又曰聖人在上位者賞罰不施而天下賔服日計之不足而嵗計之有餘譬若百梅足為百人酸一梅不足為一人酸也又曰使堯度舜}
