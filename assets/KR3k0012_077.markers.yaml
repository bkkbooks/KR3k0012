  - {type: variant, offset: 1791, length: 1, content: 漢, SBCK: 任德者縱任義者橫縱成者王橫成者霸王兵法天霸兵法地天者德不可量地者威不可圗不量不圖者萬物之父母也􅀽子正論曰堯舜之人比屋可封非盡善也猶在防之水非不流也桀紂之人比屋可誅非盡􅁖也猶在壑之水非不停也班彪王命論曰帝王之作必有明聖顯懿之德豐㓛厚利積累之業然後精誠通于神明流澤加於生民故能爲􅀑神福所向天下所歸徃未見運丗無本功德不紀而能倔起在斯立者也傅彦林王令叙曰帝王之起必}
  - {type: variant, offset: 1791, length: 1, content: 漢, krp: 任德者縱任義者橫縱成者王橫成者霸王兵法天霸兵法地天者德不可量地者威不可圗不量不圖者萬物之父母也袁子正論曰堯舜之人比屋可封非盡善也猶在防之水非不流也桀紂之人比屋可誅非盡悪也猶在壑之水非不停也班彪王命論曰帝王之作必有明聖顯懿之德豐㓛厚利積累之業然後精誠通于神明流澤加於生民故能爲鬼神福所向天下所歸徃未見運丗無本功德不紀而能倔起在斯立者也傅彦林王令叙曰帝王之起必}
