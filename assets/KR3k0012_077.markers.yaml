  - {type: variant, offset: 696, length: 257, content: 王天下有三重其寡過矣乎三重三王之禮也又曰孔子曰大道之行也與三代之英丘未之逮也而有志焉大道謂五帝時也大道之行也天下為公選賢與能講信脩睦故人不獨親其親不獨子其子使老有所終壯有所用幼有所長是故謀閉而不興盜竊亂賊而不作故外戶而不閉是謂大同同猶和平也又曰故聖人作則必以天地為本以陰陽為端以四時為柄以日星為紀以月為量鬼神以為徒五行以為質禮義以為器人情以為田四靈以為畜又曰故聖王脩義之柄禮之序以治人情故人情者聖人之田也禮斗威儀曰帝者得其英華王者得其根核霸者得其附支故帝道不行不能王王道不行不能霸霸道不行不能守其身禮含文嘉曰山澤者, SBCK: 夫上古稱}
