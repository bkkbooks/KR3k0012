  - {type: variant, offset: 445, length: 0, content: '', WYG: 舜治天下垂拱無為者以咎繇既舉而不仁逺也禹治洪水冠挂不顧者不以下憂累其上也湯去三面之網歸之者四十國文王葬城隅之枯骨天下懷其仁所惠者小所感者大仁心先之也又曰不使不仁加乎天下用武勝殘而百姓以濟此仁形於撥亂黄帝是也時有萬物必世而後仁此著於治平堯舜是也周生烈子曰居堯舜之位而不行唐虞之政者猶反衣狐白步牽騄耳黄石公三畧曰夫三皇無言化流四海}
