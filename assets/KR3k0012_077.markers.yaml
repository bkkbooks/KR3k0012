  - {type: variant, offset: 284, length: 13, content: 復始窮則反本尚書大傳曰三王, SBCK: 壤土草芥而巳誰貴}
  - {type: page-break, offset: 284, content: '', id: KR3k0012_SBCK_077-4b}
  - {type: variant, offset: 284, length: 6, content: 復始窮則反本, WYG: 可使桀度堯是猶以升量石也又曰同氣者帝同義者王同力者亡又曰太古二皇許植曰庖犧神農德於中央德覆天地而和隂陽節四時調五行虹蜺不出賊星不行五星逆行謂之賊星也又曰人主者以天下之目視以天下之耳聽以天下之智慮以天下之力動是故號令能下究而臣情得上聞百官修通羣臣輻凑喜不以賞賜怒不以罪誅故威令立而不廢聰明光而不蔽法令察而不苛耳目達而不闇善否之情陳於前而無所逆揚子法言曰五常者帝王之事古寧有書不由筆言不由舌哉桓譚新論曰儒者或曰圖王不成其弊可以霸此言未是也傳曰孔氏門人五尺童子不言五霸事者惡其違仁義而尚權詐也又曰夫上古稱三皇五帝而次有三王五霸此皆天下君之冠首也故言三皇以道治五帝用德化三王由仁義五伯以權智其說之曰無制令刑罰謂之皇有制令而無刑罰謂之帝賞善誅惡諸侯朝事謂之王興兵約盟以信義矯世謂之伯也論衡曰古之帝王建鴻德者須鴻筆之臣褒頌紀德也潜夫論曰天作道皇作極臣作輔人作基又曰王之政普覆兼愛吉凶禍福與人共之春秋運斗樞曰皇天不言四時行焉百物生焉垂拱無為謹言而民不違道德𤣥泊有皇天故曰皇皇者中也光也合元履中開隂布綱上合皇極其施光明指天畫地神化潜通煌煌盛美不可勝量又曰大傳說燧人為燧皇伏羲為羲皇神農為農皇也燧人以火紀火陽也陽尊故託燧皇於天伏羲以人事紀故託羲皇以人蓋天非人不固人非天不成也神農悉地力植穀故託農皇於地天地人之道備而三皇之運興矣又曰五帝易傳禮記春秋國語太史公記黄帝顓頊帝嚳帝堯帝舜是五帝也謹按易}
