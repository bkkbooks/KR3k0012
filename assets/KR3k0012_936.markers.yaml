  body:
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 八魚下鯉魚鰋魚鱣魚鮪魚䱎䲛魚魚下辛氏三秦記曰昆明池人釣魚綸絶而去夢於漢武求去其釣明日遊戲於池見大魚衘索帝曰昨所夢也取而去之帝後得明珠玄中記曰東方之東海有大魚焉行海者一日逢魚頭}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 八鯉魚鰋魚鱣魚鮪魚䱎䲛魚魚下辛氏三秦記曰昆明池人釣魚綸絶而去夢於漢武求去其釣明日逰戱於池見大魚銜索帝曰昨所夢也取而去之帝後得明珠𤣥中記曰東方之東海有大魚焉行海者一日逢魚頭}
