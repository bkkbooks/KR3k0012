  - {type: variant, offset: 4, length: 0, content: '', SBCK: 日遇尾其産則三百里水爲血永嘉郡記曰青田溪冬天水􅀬如湯衆}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 日遇尾其產則三百里為血永嘉郡記曰青田溪冬天水熱如湯衆}
  - {type: variant, offset: 4, length: 0, content: '', krp: 日遇尾其産則三百里水爲血永嘉郡記曰青田溪冬天水熱如湯衆}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 歸之名魚倉三齊記曰青城山始皇􅀕此山築石城入海三十里射魚水四里變赤如血于今猶爾盛弘之荆州記曰長沙湖郷連水邊有石魚形􅀂鯉相重沓如雲母炙之作魚腥林邑國記曰飛魚翼如蟬飛則凌雲沉泳海底王子年拾遺録曰􅌡洲一名魂洲亦曰環洲有洞淵廣千里有魚身長千丈鱗色蘭徧鼻有角時鼔舞戲或有逺而望者見水間有五色雲}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_936-1b}
  - {type: variant, offset: 5, length: 3, content: 上星經, WYG: 歸之名魚倉三齊記}
  - {type: variant, offset: 5, length: 0, content: '', krp: 歸之名魚倉三齊記曰青城山始皇祭此山築石城入海三十里射魚水四里變赤如血于今猶爾盛弘之荆州記曰長沙湖郷連水邊有石魚形若鯉相重沓如雲母炙之作魚腥林邑國記曰飛魚翼如蟬飛則凌雲沉泳海底王子年拾遺録曰􅌡洲一名魂洲亦曰環洲有洞淵廣千里有魚身長千丈鱗色蘭徧鼻有角時鼔舞戲或有逺而望者見水間有五色雲}
