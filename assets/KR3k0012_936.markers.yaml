  - {type: variant, offset: 62, length: 185, content: 魚而忘筌也毛詩曰潛季冬薦魚春獻鮪也冬魚之性定春鮪新來宜薦又魚藻曰魚在在藻有頒其首毛云頒大首皃也禮記曲禮曰凡登宗廟槀魚曰商祭鮮魚曰脡祭尚書益稷曰暨鳥獸魚鼈咸若注微物咸順之左傳昭元劉子曰善哉禹功明德遠矣微禹吾其魚乎又昭元曰魚鹽蜃蛤弗加於海春秋運斗樞曰四方煩擾小民失恩虎銜魚爾雅曰魚有力者鰴強大多力者音暉魚枕謂之丁枕在魚頭骨中形似篆書丁字可作印魚腸謂之乙魚尾謂之丙此皆似篆書字, SBCK: 百薄故}
