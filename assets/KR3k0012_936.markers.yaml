  - {type: variant, offset: 3046, length: 843, content: 谷之廣上池宜於君王下池宜於民臣畜魚三年其利可以致千萬越國當富盈新序曰楚人有獻魚於楚王者曰今日漁獲食之不盡賣之不售棄之又惜故來獻之左右曰鄙哉辭也楚王曰子不知漁者仁人也蓋聞囷倉粟有餘者國有饑民後宮多幽女者下民多曠夫餘衍之蓄藂於府庫者境內多貧乏之民皆失君之道故庖有肥肉廄有肥馬民有饑色亡國之君藏於府庫寡人聞之久矣未能行也漁者知之其以喻寡人也且今行之矣於是乃遣使恤鰥寡故漁者獻餘魚而楚國賴之風俗通曰城門失火禍及池中漁俗說池中漁人姓字居近城門城失火延及其家謹案百家書宋城門失火因汲取池中水以沃灌之池中空竭魚悉露死喻惡之滋并中傷重謹也又曰伯魚之生適有饋孔子魚者嘉以為瑞故名鯉字伯魚論衡曰釣者刻木為魚丹漆其身迎水浮之水動作魚似真真魚並來會藂土龍之象何必不能致兩耶又曰彭蠡之濱以魚食犬顏氏家訓曰山中人不信有大魚大如木海上人不信有大木大如魚又曰江陵高偉隨顏之推入齊地凡數年向幽州淀中捕魚後病見群魚囓之而死三輔故事曰武帝作昆明池學水戰法後昭帝小不能復征討於池中養魚以給諸陵祠餘付長安市魚乃賤先賢傳曰蔡君仲至孝母喪居墓側天且下神魚四頭置墓前以祭蕭廣濟孝子傳曰巴郡杜孝後在成都母喜食生魚孝於官得生鮮截竹銅盛魚一頭置江中妻得之笑曰是我壻寄乃以進母又曰陳玄陳太子也後母譖之陳侯令自投遼水魚負之以出玄曰我罪人也故求死耳魚乃去西京雜記曰昆明池刻石為魚每雷雨魚嘗鳴吼鬐尾皆動漢代祈雨往往有驗又曰昔人有東海遊者隨風浪莫知所之一日一夜得一孤洲共侶歡然下石植纜登洲煮食食未熟而洲沒在舡者斫纜舡復飄蕩向者孤洲大魚也怒棹楊鬐吹波吐浪去疾風雲在洲上死者十餘人神仙傳曰葛玄見賣大魚者玄謂曰蹔煩此魚到河伯處魚主曰魚已死玄曰無苦乃以丹書紙內魚口中擲水中有頃魚還躍上岸得書青黑如木葉又與吳王坐樓上見作請雨社人玄曰雨易得耳即書符著社中一時之間大雨流潦帝曰水中可有魚乎玄復書符擲水中須臾有大魚數百頭使人治食之水經曰魚復溪中有魚其頭似羊豐肉少骨美於餘魚又曰扶南國有鮮色魚黑色身長五丈頭如馬首伺人入水便來為害廣志曰武陽小魚大如針號一斤千頭蜀人以為醬, SBCK: ''}
