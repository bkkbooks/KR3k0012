  - {type: variant, offset: 505, length: 0, content: '', SBCK: 虵鱣者卿大夫服之象也數三者法三台先生自此􅂛矣淮南子曰牛蹄之涔不生鱣鯉抱朴子曰探鷰窠而求鳯􅆑搜井底而捕鱣魚雖加至勤其非所有也水經曰漢水又東爲鱣湍洪波奔盪崩浪雲頺􅂄舊言有鱣魚􅁬鰭遡流望濤直上至此則爆失濟故因名湍矣又曰鱣鮪鯉也出鞏穴三月則上渡龍門得渡爲龍矣否則􅀧額而還張衡西京賦曰鱣鮪鱮鮦郭璞江賦曰魚則叔鮪王鱣孫綽望海賦曰文鯉黃鱣鮪魚爾雅曰鮥音洛鮛音叔鮪鮪鱣属也大者名王鮪小者名鮛鮪}
  - {type: page-break, offset: 505, content: '', id: KR3k0012_SBCK_936-8b}
