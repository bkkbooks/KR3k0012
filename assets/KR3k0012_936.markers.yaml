  - {type: variant, offset: 26, length: 4, content: 周易姤卦, SBCK: 因鳴吼吹沬其一鰓掛山巔七日山爲之折不能去鳴聲爲雷氣爲風涎沬爲霧又}
  - {type: variant, offset: 26, length: 0, content: '', WYG: 口可容舟名曰摩竭崔豹古今注曰水君状如人乘馬衆魚𨗳從一名魚伯大水有之漢末有人扵河際見之人馬皆有鱗甲如大鯉魚但手足别耳目鼻與人不殊見人良久入水而沒博物志曰呉王江行食膾有餘棄扵江中流化而為魚今江中有名呉王餘膾魚者長四寸大者如箸猶作膾形嶺南異物志曰南方清晨望海中二山如黛海人云去㟁兩廂各六百里一旦暴風雷霧露皆腥雜以泥涎七日方已属有人從山来說云大魚因鳴吼吹沫其一鰓掛山巔七日山為之折不能去鳴聲為雷氣為風涎沫為霧又曰海中所生魚蜃置陰處有光初見之以為恠異土人嘗推其義盖醎水所生海水中遇陰晦波如燃火滿海以物擊之迸散如星嶺表録異曰新瀧等州山田揀荒平處以鋤鍬開為町畽伺春雨邱中貯水即先買鯇魚子散扵田内一二年後魚兒長大食草根並盡既為􅍄田又収魚利乃種稻且無稗草乃齊民之上術也異苑曰永嘉有人斷水捕魚宰牲祈祭了無所獲将棄罷之其夕夢見老公云諸君何不少停夜聞㹠聲驚起共看乃是大魚剉以為鮓頓得百薄故因以百薄為瀨水述異記曰桓沖為江州遣人}
