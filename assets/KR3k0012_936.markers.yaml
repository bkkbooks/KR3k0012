  - {type: variant, offset: 343, length: 1, content: 世, SBCK: 姜詩字士遊性至孝母常飲江水兒取水溺死恐毋知詐云行學俄而涌泉出舎側并旦出鯉一􅀟謝承後漢書曰羊續好食生魚爲南陽太守丞侯儉貢鯉續受而懸之一歳儉復致一枚續乃以所懸枯魚以示儉終身不復食魚晉書曰王祥性至孝早䘮親繼母朱氏不慈數譛之由是失愛於母父有疾衣不解帶湯藥必親甞母欲生魚時天寒水凍祥解衣將剖氷求之氷忽自解􅀟鯉躍出持之而歸又曰劉聦將趙染爲索綝所敗殺其長史魯徽劉曜聞之曰蹄涔不容尺鯉染之謂也齊書曰崔}
  - {type: page-break, offset: 343, content: '', id: KR3k0012_SBCK_936-4a}
  - {type: variant, offset: 343, length: 1, content: 世, WYG: 姜詩字士逰性至孝母常飲江水兒取水溺死恐母知詐云行學俄而涌泉出舍側井且出鯉一雙謝承後漢書曰羊續好食生魚為南陽太守丞侯儉貢鯉續受而懸之一歳儉復致一枚續乃以所懸枯魚以示儉終身不復食魚晉書曰王祥性至孝早喪親繼母朱氏不慈數譛之由是失愛於父母有疾衣不解帶湯藥必親嘗母欲生魚時天寒水凍祥解衣将剖冰求之冰忽自解雙鯉躍出持之而歸又曰劉聰時趙染為索綝所敗殺其長史魯徽劉曜聞之曰蹄涔不容尺鯉染之謂也齊書曰崔}
