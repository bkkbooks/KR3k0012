  - {type: variant, offset: 1309, length: 645, content: 西宮見魚躍焉問其故漁者曰此當乳也於是中網而止又曰開元二十一年衢州獲魚有鉻獻之侍中裴光庭等奏曰魚龍為圖河洛所出比之盛明彼何足云又曰吐蕃國在吐谷渾西界其春夏軍糧資海魚以給之國語曰周文太子發耆鮑魚太公為其傅曰鮑魚不登俎豆豈有非禮而可養太子老子曰魚不可脫於淵國之利器不可以示人文子曰川廣者魚大山高者獸脩故魚不可以無餌釣獸不可以空器召又曰因所貴而貴之物無不貴因所賤而賤之物無不賤故不放魚於木沉鳥於淵鄧析書曰夫水濁則無掉尾之魚政苛則無逸樂之士列子曰八紘之北有溟海魚廣千里其長稱焉孟子曰有餽生魚於子產子產使校人畜之池反命曰始舍之圉圉焉少則洋洋焉子產曰得其所哉校人曰孰謂子產智吾既烹而食之矣又曰故為淵敺魚者獺也為叢敺雀者鸇也魯連子曰古善魚者宿沙習子使魚生於山則雖十宿沙不得一魚焉宿沙非闇於魚道者彼山非魚之所生也莊子曰泉涸魚相與處於陸相煦以濕相濡以洙不如相忘於江湖也又曰莊子與惠子遊於濠梁之上莊子曰儵出遊從容是魚之樂也惠子曰子魚安知樂莊子曰子非我安知我不知魚之樂也又曰吞舟之魚蕩而失水則螻蟻能制之故鳥飛不厭高魚鱉不厭深又曰朽爪化為魚物之變也又曰任公子蹲會稽釣東海朞年而大魚食之公子得若魚淅河以東蒼梧以北無不厭若魚者又曰井魚不可語海夏蟲不可語冰符子曰太公涓釣於隱溪五十有六而未嘗得一魚魯連聞而觀焉太公涓跽而隱崖不餌而釣仰詠俯吟暮則釋竿其𣍿所處石皆若曰其跗觸崖若路魯連曰釣所本以在魚無魚何釣太公曰不見康王父之釣耶念蓬萊釣巨海摧岸投輪五百年矣未嘗得一魚方吾猶一朝耳顧子曰昔宋人臨萬仞之淵釣數寸之鱗魚將食釣不知膝之自, SBCK: 寢廟}
