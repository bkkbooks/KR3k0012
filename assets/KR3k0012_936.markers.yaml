  - {type: 'tls:seg', offset: 358, content: '', id: KR3k0012_CHANT_936-9a.4}
  - {type: variant, offset: 359, length: 0, content: '', SBCK: 􅁀雨子英上騰去歳歳來歸故舎食飲見妻子魚復來迎之如此七年故吴中門戸作神魚子英祠續述征記曰梁孝王家中有數尺水有大鯉人謂有靈不敢犯宣城記曰臨城縣盖山有舒姑泉相傳云昔舒氏女未嫁與其父採薪此女坐處化爲清泉其母云此女好音樂乃往絃歌而泉涌有朱鯉一􅀟及命作樂泉故涌出河洛記曰諺云伊洛魴鯉天下最美洛口黃魚天下不如崔豹古今注曰兖州人謂赤鯉爲玄駒白鯉爲白驥黃鯉爲黃雉搜神記曰宫亭􅀌石有估客至都因市一刀置神廟中而忘取至湖中忽有一鯉跳入舡}
  - {type: variant, offset: 359, length: 0, content: '', WYG: 殊而鱗之數一家語云孔子娶於宋开官氏女一歲而生伯魚伯魚生三日魯昭公以鯉魚賜孔子孔子榮君之賜因名子曰鯉字伯魚曹植辯道論曰甘始言取鯉魚一雙令一者含藥俱投沸膏中有藥者奮尾逰行沈浮有若處淵其一者已􅍄而可噉余時問始可試否言是藥去此萬里非自行不能得也陶朱公飬魚經曰威王聘朱公問之曰公徙家不一輙累億金何術乎朱公曰夫治生之法有五水畜第一所謂水畜者魚也以六畆地為池池中為九州即求懷子鯉魚長三尺者二十頭牡鯉四頭以二月上旬庚日納池中水中無聲魚必生所以飬鯉者不相食易長又貴也魏武四時食制曰郫縣子魚黄鱗赤尾出稻田可以為醬列仙傳曰吕尚釣於磻溪三年不獲比周曰可止矣尚曰非所及果得大鯉有兵鈴在腹中又曰㳙子齊人也好餌芝术食其精者三百年乃見於齊著天地人經四十八篇後釣於河澤得鯉魚賜中符隱於岩山能致風雨又曰琴髙趙人也以鼔琴為永康王舍人行治鼔之術浮㳺冀州涿郡間二百餘年後辭入涿水中取龍子與諸弟子期之期曰皆潔齋候於水旁設祠屋果乘赤鯉来出祠中且有萬人觀之留一月復入水去又曰子英者舒鄉人善入水捕魚得赤鯉魚愛其色持著魚池中數以米榖食之一年長丈餘遂生角有翅翼子英恠畏拜謝之魚言我迎汝耳上我背與汝俱去即大暴雨子英上騰去歳歳来歸故舍英欲見妻子魚復来迎之如此七年故呉中門户作神魚子英祠續述征記曰梁孝王家中有數尺水有大鯉人謂有靈不敢犯宣城記曰臨城縣盖山有舒始泉相傳云昔舒氏女未嫁與其父採薪此女好音樂乃作絃歌而泉涌有朱鯉一雙躍出河洛記曰諺云伊洛魴鯉天下最美洛口黄魚天下不如崔豹古今注曰兖州人呼赤鯉為赤驥青鯉為青馬黒鯉為黒駒白鯉為白騏黄鯉為黄雄續搜神記曰謝允從武當山還在桓宣武座言及左元放為曹公致鱸魚允便云此可得耳求大瓮盛水朱書符授水中俄有二鯉鼔鬐在水中又曰㑹稽缺音􅀢縣有女子姓呉字望子為蘇侯神所受望子心有所欲輒空中得之望子嘗思膾一雙鮮鯉應心而至幽明録曰孫權時南方遣吏獻犀簮吏過宫亭湖失之詣神下敎求簮而盛簮器便在神前神云臨入石頭當相還去達石頭三尺鯉魚跳入船吏}
