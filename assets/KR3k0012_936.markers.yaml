  - {type: variant, offset: 345, length: 3, content: 率鄧禹, SBCK: 思自相國從事中郎遷齊國内史髙帝旣爲齊王置酒爲樂羹膾既至祖思曰此味故爲南北所推侍中沈季文曰羮膾吴食非祖思所解祖思曰鼈鯉似非勾吴之詩文季曰千里蓴羮豈􅀜魯衛帝甚恱曰蓴羮故應還沈南史曰梁南郡太守劉之亨甞夢二人姓李詣之乞命未之解也其明日仲夏有遺生鯉魚二頭之亨曰必夢中所感也乃放之其夜又夢來謝恩云當令君延筭淮南子曰詹公之釣千歳之鯉詹公詹何古得道善釣者又曰牛蹄之踵無盈尺之鯉踵牛踐處符子曰務光自投盧盧川之伯以赤鯉送之金樓子曰五尺之鯉一寸之鯉但大小殊鱗之數}
