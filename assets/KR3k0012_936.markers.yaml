  - {type: variant, offset: 1829, length: 169, content: 隱溪五十有六而未嘗得一魚魯連聞而觀焉太公涓跽而隱崖不餌而釣仰詠俯吟暮則釋竿其𣍿所處石皆若曰其跗觸崖若路魯連曰釣所本以在魚無魚何釣太公曰不見康王父之釣耶念蓬萊釣巨海摧岸投輪五百年矣未嘗得一魚方吾猶一朝耳顧子曰昔宋人臨萬仞之淵釣數寸之鱗魚將食釣不知膝之自進有頃墮而死利能誘也韓子曰公儀休相魯而嗜魚一邦皆爭買魚而獻之公儀子不受曰夫唯嗜魚固不受也, WYG: 寝廟逢時美味}
