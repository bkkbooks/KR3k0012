  - {type: variant, offset: 2022, length: 272, content: 鳥動而高魚動而下又曰上求材臣殘木上求魚臣乾谷又曰欲致魚者先通水欲致鳥者先樹木水積而魚藂木茂而鳥集又曰林中不賣薪湖上不鬻魚有所餘也又曰俎之先生魚豆之先泰羹此皆不快於耳目不適於口腹而先王貴之先本後末也又曰使葉落者風搖之使水濁者魚撓之又曰惠子從車百乘以過孟諸莊子見之而棄餘魚疾惠子故也又曰月者陰之宗是以月毀則魚腦減又曰楚王亡其猨而林木為之殘猨捷躁依木而處故殘林以求之也宋君亡其珠而池魚為之殫殫盡也又曰為魚德者非挈而入淵為猨賜者非負而緣木縱其所之而已又曰畜池魚者必去猵音編獺養禽獸者必去豺狼又曰臨河羨魚不若歸家織網羨願也又曰爭魚者濡逐獸者趨非樂之也故至, SBCK: ''}
