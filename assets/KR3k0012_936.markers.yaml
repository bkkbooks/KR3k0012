  - {type: variant, offset: 357, length: 1, content: 奉, WYG: 之亨嘗夢二人姓李詣之乞命未之解也其明日仲夏有遺生鯉魚二頭之亨曰必夢中所感也乃放之其夜亦夢来謝恩云當令君延夀淮南子曰詹公之釣千歳之鯉古得道善釣者又曰牛蹄之涔無盈尺之鯉蹄中踐處符子曰務光自投盧川盧川之伯以赤鯉送之金樓子曰五尺之鯉一寸之鯉小}
