  - {type: 'tls:seg', offset: 20, content: '', id: KR3k0012_CHANT_936-1a.6}
  - {type: variant, offset: 23, length: 1, content: 出, SBCK: 之間後世聖人以魚爲神化之物以玄字合於魚爲鮌字崔豹古今注曰水君狀如人乗馬衆魚導從一名魚伯大水有之漢末有人於河際見之人馬皆有鱗甲如大鯉魚但手足别耳目鼻與人不殊見人良乆入水而没􅀶物志曰呉王江行食膾有餘棄於江中流化而爲魚今江中有名吴王餘鱠魚者長四寸大者如箸猶作鱠形嶺南異物志曰南方嘗晴望海中二山如黛海人云去岸兩廂各六百里一旦暴風雷旦霧露皆腥雜以泥涎七日方巳屬有人從山來􅀃云}
  - {type: page-break, offset: 23, content: '', id: KR3k0012_SBCK_936-2a}
  - {type: variant, offset: 23, length: 1, content: 出, WYG: 之間華夷志曰海中}
  - {type: page-break, offset: 23, content: '', id: KR3k0012_WYG_936-2b, image: WYG0901/WYG0901-0313d.png}
  - {type: variant, offset: 23, length: 1, content: 出, krp: 之間後世聖人以魚爲神化之物以玄字合於魚爲鮌字崔豹古今注曰水君狀如人乗馬衆魚導從一名魚伯大水有之漢末有人於河際見之人馬皆有鱗甲如大鯉魚但手足别耳目鼻與人不殊見人良乆入水而没博物志曰呉王江行食膾有餘棄於江中流化而爲魚今江中有名吴王餘鱠魚者長四寸大者如箸猶作鱠形嶺南異物志曰南方嘗晴望海中二山如黛海人云去岸兩廂各六百里一旦暴風雷旦霧露皆腥雜以泥涎七日方巳屬有人從山來說云}
