  - {type: variant, offset: 295, length: 0, content: '', SBCK: 書刀湖中正㠶忽有鯉魚跳入舡破魚得書刀焉廣五行記曰唐儀鳯元年􅀶州僧正滿行同凢俗數頭於房作鱠食之至夜四更忽聞䆫外有􅁀風聲乃夢一佛二佛二金剛語滿云爾是何物小兒將穢汚伽藍金剛手執棒滿閉目因而兩目不開矣又曰曹宋二州西界大劑陂村人陳君少小爲捕魚業於後得患恒􅀍衆魚所食痛苦不能自持若}
