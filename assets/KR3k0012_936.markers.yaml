  - {type: variant, offset: 382, length: 5, content: 竊言劉公真, SBCK: 滿忽有大魚似鯉而頭一角長尺餘鱗正赤從清冷水岀頭長三尺許入横瀆逆流西北十餘里不没入通濟渠于時夾兩岸隨看者數百人皆謂赤龍大鯉從淵而出此亦唐柞將興之兆楊衒之洛陽伽藍記曰京師語曰伊洛鯉魴貴於牛羊廣五行記曰隋煬帝大業􅀄爲詩令宫人唱之曰三月三日向江頭正見鯉魚江上游意欲垂釣徃撩取恐是蛟龍還復休鯉魚即唐之國姓俄而唐有}
