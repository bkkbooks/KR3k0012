  - {type: variant, offset: 9, length: 1, content: 天, SBCK: 夏鯀治水無功沉於羽淵化爲玄}
  - {type: variant, offset: 9, length: 1, content: 天, WYG: 青城山始皇登此山築石城入海三十里射}
  - {type: variant, offset: 9, length: 1, content: 天, krp: 夏鯀治水無功沉於羽淵化爲玄}
  - {type: variant, offset: 11, length: 4, content: 一星在尾, SBCK: 大千丈}
  - {type: variant, offset: 11, length: 0, content: '', WYG: 水四里變色如血于今猶爾盛𢎞之荆州記曰長沙湖鄉連水邉有石魚形若鯉相重杳如雲母炙之作魚脯林邑國記曰飛魚翼如蟬飛則凌雲沉泳海底王子年拾遺録曰嬴洲}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_WYG_936-2a, image: WYG0901/WYG0901-0313c.png}
  - {type: variant, offset: 11, length: 4, content: 一星在尾, krp: 大千丈}
  - {type: variant, offset: 12, length: 3, content: 星在尾, WYG: 名魂洲亦曰環洲洞洲廣千里中有魚身長千丈鱗色斕班鼻有角時鼓舞戱水中逺而望者見水間有五色雲就而視之乃此魚噴水為雲也又曰夏鯀治水無功沈於羽淵化為元魚大千丈}
  - {type: variant, offset: 16, length: 5, content: 河中星明則, SBCK: 遂死横於}
  - {type: variant, offset: 16, length: 5, content: 河中星明則, WYG: 遂死横扵}
