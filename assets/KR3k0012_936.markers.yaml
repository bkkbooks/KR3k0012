  - {type: variant, offset: 813, length: 782, content: 三石頭弘之常垂綸於此經過者不識之或問魚師得魚賣不弘之曰亦不得得亦不賣日夕載魚入上虞郭經親故各以一兩頭置門而去沈約宋書曰明帝太始二年幸華林園天淵池白魚躍入御舟齊書曰中興元年義師下未至竟陵三十里魚長三尺躍入御舡中梁書曰張昭字德明幼有孝性父漠常患消渴嗜鮮魚昭乃身自結網捕魚以供朝夕又曰王固聘魏因晏饗昆明池魏人以南人嗜魚大設罟網固以佛法呪之遂一鱗不獲崔鴻十六國春秋前涼錄曰金城太守胡勗叛張軌遣都護宗毅治中令狐瀏討之濟河中流白魚入舡瀏曰魚鱗物虜必解甲歸我矣勗請降軌宥之後魏書曰高祖幸清徽堂因之流化池高祖曰此池中亦有佳魚任城王澄曰此所謂魚在在藻有頒其首高祖曰且取王在靈沼於牣魚躍北史曰陸政性至孝其母吳人好食魚北土魚少政求之嘗苦難得後宅忽有泉出而魚遂得以供膳時人因謂其泉為孝泉隋書曰虞孝仁性奢華常以駱駞負函盛水養魚而自給又曰大業中納言楊達言於遼水造御舟有白魚躍入舟內又曰乞伏慧為潭桂二州總管其俗輕剽慧躬行朴素以矯之風化大洽曾見人以簺音賽捕魚者出絹買而放之唐書曰真臘國地饒瘴癘毒蠚音適海中大魚半出望之如山又曰太宗幸蒲州刺史趙元楷課父老服黃紗單衣迎謁路左又潛飼羊百餘口魚數百頭將餽貴戚太宗知而數之又曰太宗觀漁於西宮見魚躍焉問其故漁者曰此當乳也於是中網而止又曰開元二十一年衢州獲魚有鉻獻之侍中裴光庭等奏曰魚龍為圖河洛所出比之盛明彼何足云又曰吐蕃國在吐谷渾西界其春夏軍糧資海魚以給之國語曰周文太子發耆鮑魚太公為其傅曰鮑魚不登俎豆豈有非禮而可養太子老子曰魚不可脫於淵國之利器不可以示人文子曰川廣者魚大山高者獸脩故魚不可以無餌釣獸不可以空器召又曰因所貴而貴之物無不貴因所賤而賤之物無不賤故不放魚於木沉鳥於淵鄧析書曰夫水濁則無掉尾之魚政苛則無逸樂之士列子曰八紘之北有溟海魚廣千里其長稱焉孟子曰有餽生魚於子產子產使校人畜之池反命曰始舍之圉圉焉少則洋洋焉子產曰得其所哉校人曰孰謂子產智吾既烹而食之, WYG: 湍}
