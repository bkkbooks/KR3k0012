  - {type: variant, offset: 2074, length: 407, content: 不賣薪湖上不鬻魚有所餘也又曰俎之先生魚豆之先泰羹此皆不快於耳目不適於口腹而先王貴之先本後末也又曰使葉落者風搖之使水濁者魚撓之又曰惠子從車百乘以過孟諸莊子見之而棄餘魚疾惠子故也又曰月者陰之宗是以月毀則魚腦減又曰楚王亡其猨而林木為之殘猨捷躁依木而處故殘林以求之也宋君亡其珠而池魚為之殫殫盡也又曰為魚德者非挈而入淵為猨賜者非負而緣木縱其所之而已又曰畜池魚者必去猵音編獺養禽獸者必去豺狼又曰臨河羨魚不若歸家織網羨願也又曰爭魚者濡逐獸者趨非樂之也故至言去言至為無為又曰故天之且風草木未動而鳥已翔矣鳥巢知風也其且雨也陰曀未集而魚已噞矣魚潛知雨也又曰燿蟬者務在明其火釣魚者務在芳其餌明其火者所以燿而致之也芳其餌者所以誘而利之也又曰季子治亶父三年季子子賤而巫馬期衣短褐易容貌往觀化焉易服而往微以視之也見夜魚者釋之巫馬期問焉曰凡子所為魚者欲得也今得而釋之何也魚者對曰季子不欲人取小魚也所得者小魚是以釋之巫馬期歸以報孔子曰季子之德至矣, WYG: ''}
