  - {type: variant, offset: 2497, length: 315, content: 藥者俱投沸膏中猛火之上其衘藥者浮戲瀺灂不死又曰丹陽水有丹魚先夏至十日夜伺之魚先浮水側赤光上照取此魚血以塗足可以步行水上金樓子曰專諸學炙魚香聞數里王僚索魚炙專諸持一利剛刀藏著魚腹中晏子春秋曰景公射質堂上唱善者一口弦章入公曰吾失晏子未嘗聞吾不善章曰臣聞君好臣服君嗜臣食尺蠖食黃身黃食蒼身蒼君其食謟人言乎公曰善賜弦章魚五十乘弦章歸魚車塞途章撫其僕曰曩之唱善者皆欲此魚也固辭不受戰國策曰靖郭君將城薛齊人有請一言者靖郭君見之趨進曰海大魚因反走君使更言之曰海大魚網不能止釣不能牽蕩而失水則螻蟻得意今齊亦君之水也靖郭君乃止又曰魏王與龍陽君共舡而釣龍陽君得十餘魚而涕下曰臣之始得魚也臣甚嘉之後得大者令臣且欲棄前所得者今以臣之凶惡也而得為王拂枕席夫, SBCK: ''}
