  - {type: variant, offset: 349, length: 1, content: 擊, SBCK: 家語曰孔子娶于宋并官氏女一歳而生伯魚伯魚生三日魯昭公以鯉魚賜孔子孔子榮君之貺因名子曰鯉字伯魚曹植辨道論曰甘始言取鯉魚一􅀟令一者含藥俱投沸膏中有藥者奮尾皷鰭遊行沉浮有􅀂處淵其一者巳熟而可噉余時問言可試不言是藥去此踰萬里非自行不能得也慱物志同陶朱公養魚經曰威}
  - {type: variant, offset: 349, length: 1, content: 擊, krp: 家語曰孔子娶于宋并官氏女一歳而生伯魚伯魚生三日魯昭公以鯉魚賜孔子孔子榮君之貺因名子曰鯉字伯魚曹植辨道論曰甘始言取鯉魚一雙令一者含藥俱投沸膏中有藥者奮尾皷鰭遊行沉浮有若處淵其一者巳熟而可噉余時問言可試不言是藥去此踰萬里非自行不能得也慱物志同陶朱公養魚經曰威}
  - {type: variant, offset: 351, length: 7, content: 郎橫野將軍劉奉, SBCK: 聘朱公問之曰公住足千萬家累億金何術乎朱公曰夫治生之法有五水畜第一所謂水畜者魚也以六􅅿地爲池池中有九洲即求懷子鯉魚長三尺者二十頭壯鯉四頭以二月上旬庚日内池水中令英恠畏拜謝之魚言我迎汝耳上我背與汝俱去即}
