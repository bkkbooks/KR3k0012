  - {type: variant, offset: 34, length: 0, content: '', SBCK: 其食半又春官曰太宗伯職曰公執桓圭晉書曰陶侃有善相者師圭謂侃曰君左手中指有堅理當爲公􅀂徹於上貴不可言侃以針決之見血灑壁而爲公字以􅁓裛手公字愈明後魏書曰許洛陽爲鴈門太守家田三生嘉禾皆異壟合頴丗祖善之進爵北地公魏咸熈元年相國晉王奏建五等諸公地方七十五里邑一千八百戸置相一人典祠典書典衛典禮各一人妾六人車前司馬十人旅賁四十人侯封周易豫卦曰豫利建侯行師􅂏曰豫順以動故天地如之而况建侯行師乎又比卦曰地上有水比先王以建萬國親諸侯又屯卦曰盤桓利居貞利建侯周書曰能樹名生物與天道俱謂之侯周禮春官大宗伯職}
