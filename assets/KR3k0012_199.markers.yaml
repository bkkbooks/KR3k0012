  - {type: variant, offset: 2372, length: 76, content: 晉書曰長樂馮恢父為弘農太守愛少子淑欲以爵傳之恢父終服闋乃還鄉里結草為廬陽瘖不能言淑得襲爵恢始仕管子曰爵不尊祿不重者不與圖難犯危以其道為未可以求之也是故先, krp: 兄即}
