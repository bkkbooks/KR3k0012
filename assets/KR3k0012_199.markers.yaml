  - {type: variant, offset: 3939, length: 343, content: 者以為燕王群臣知上欲王綰皆曰太尉長安侯綰常從平定天下功最多可王上乃立綰為燕王諸侯得幸莫如燕王者漢十年陳豨反漢既斬豨其禆將降言燕王綰使范齊通謀豨所上使使召綰綰稱病又謂其幸臣曰非劉氏而王者獨我與長沙耳今上病屬任呂后呂后婦人專欲事誅異姓王者及大功臣乃稱病不行高祖崩遂亡入匈奴又曰吳芮秦時番陽令甚得江湖間民心號曰番君天下之初叛秦也黥布歸芮芮以女妻之因率越人舉兵以應諸侯沛公攻南陽迺遇芮之將梅鋗呼玄切與偕攻析酈降之及項羽相王以芮率百越佐諸侯從入關故立芮為衡山王項籍死上以鋗有功於入武關故德芮徙為長沙王都臨湘又曰惠帝崩立孝惠後宮子為帝呂太后臨朝稱制遂立周呂侯子台為呂王台弟產為梁王建城侯釋之子祿為趙王台子通為燕王又封諸呂凡六人皆為列侯太后病困以趙王祿為上將軍居北軍梁王產為相國居南軍戒產祿曰高祖與大, SBCK: ''}
