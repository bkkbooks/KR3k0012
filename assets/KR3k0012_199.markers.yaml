  - {type: variant, offset: 2014, length: 0, content: '', SBCK: 姓封毛詩駉閟宫曰乃命魯公俾侯于東奄有􅀛蒙遂荒大東左傳僖中曰昔周公弟二叔之不咸故封建親戚以蕃屏周管蔡郕霍魯衛毛聃郜雍曹滕畢原鄷郇文之昭也文昭十六國也邘鄑應韓武之穆也武穆四國凡蔣邢茅胙􅀕周公之㣧也周公㣧六國也又昭公上曰武王邑姜娠大叔夢天謂巳余命而子曰虞將與之唐及生文在手曰虞遂以命之}
  - {type: page-break, offset: 2014, content: '', id: KR3k0012_SBCK_199-5a}
  - {type: variant, offset: 2014, length: 0, content: '', WYG: 姓封毛詩閟宫曰乃命魯公俾侯于東奄有龜蒙遂荒大東𫝊曰昔周公弔二叔之不咸故封建親戚以蕃屏周管蔡郕霍魯衛毛􅅨郜雍曹滕畢原酆郇文之昭也文昭十六國也䢴晉應韓武之穆也武穆四國凡蔣邢茅胙祭周公之𦙍也周公𦙍六國也又曰武王邑姜娠太叔夣天謂已余命而子曰虞將與之唐及生文在手曰虞遂以命之}
