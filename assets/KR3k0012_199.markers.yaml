  - {type: punctuation, offset: 1428, content: 「, id: KR3k0012_CHANT_199-bkkpn373}
  - {type: variant, offset: 1428, length: 528, content: 王者即位先封賢者憂民之急也故列土分疆非為諸侯張官設府非為卿大夫皆為民也封諸侯以夏何陽氣盛養故以封諸侯盛養賢也立人君陽德之盛者也又曰受命之王致太平之美群臣上下之功故盡封之乃中興征伐大功皆封所以褒大功也盛德之士亦封之所以尊有德封者必試之為附庸三年有功因而封之五十里凡士有功者亦為附庸附世其位大夫有功成封五十里卿成封七十里公成封百里又曰公居百里侯居七十里何封示之優賢義欲褒尊而上之何以知殷家侯不過七十里曰土有三等有百里七十里五十里公卿大夫者何謂也內爵稱也為爵稱公卿大夫何爵者量其職盡其才公之為言公正無私也卿之為言章也善明也大夫之為言大扶扶進人也王充論衡曰堯舜之人可比屋而封桀紂之人可比屋而誅曹植遷都賦曰余初封平原轉出臨淄中命鄄城遂徙雍丘改邑浚儀而末將適于東阿號則六易居實三遷連遇瘠土衣食不繼爵易中孚卦曰鳴鶴在陰其子和之我有好爵吾與爾縻之左傳襄公三年曰齊莊公為勇爵設爵位以命勇士殖綽郭最欲與焉州綽曰東閭之役臣左驂迫還於門中識其枚數識門枚數其可與乎公曰子為晉君也對曰臣為隸新然二子者譬之禽獸臣食其肉而寢其皮矣言嘗射得之也白虎通曰爵五等者法五行或三等者法三光或法三或法五何質者據天故象三光文者據地故法五行禮含文嘉曰殷爵三等周爵五等各有宜也王制曰王者之制爵祿凡五等謂公侯, SBCK: ''}
