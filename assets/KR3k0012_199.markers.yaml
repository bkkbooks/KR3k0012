  - {type: variant, offset: 4431, length: 290, content: 損魏朝之望虧晉王之德君子愛人以禮吾不為也及入顗遂拜而祥獨長揖帝曰今日方知君見顧之重矣北齊書曰尉景之子粲少歷顯職體性麤武天寶初封庫狄干等為王粲以不預王爵大恚恨十餘日閉門不朝帝怪遣就宅問之隔門謂使人曰天子不封粲父作王粲不如死使云須開門受勑粲遂彎弓隔門欲刺使者使者以狀聞之文宣使叚韶諭旨粲見韶唯撫膺大哭不答一言文宣親詣其宅慰之方復朝請尋追封景長樂王唐書曰安祿山死朝廷欲圖大舉詔郭子儀帥師趨京城師於潏水之西與賊將安太清安守忠戰後從元帥廣平王率蕃漢之師十五萬進收長安京師老幼百萬夾道懽叫涕泣而言曰不圖今日復見官軍是時河東河西河南所盜郡邑皆平以功加司徒封代國公入朝天子遣兵仗戎容迎于灞上肅宗勞, SBCK: 議}
