  - {type: variant, offset: 2799, length: 126, content: 其功大通於王室列者言其功德列著乃饗爵也王粲爵論曰爵自一級轉登十級而為列侯譬猶秩自百石轉遷而至於公也而近世賞人皆不由等級從無爵封無列侯原其所以爵廢故也司馬法曰賞不踰時欲民速觀為善之利也近世爵廢人有小功無以賞也乃積累焉頒事足乃封侯非所以速為而及時也上觀古比, WYG: 受}
