  - {type: variant, offset: 2801, length: 1105, content: 大通於王室列者言其功德列著乃饗爵也王粲爵論曰爵自一級轉登十級而為列侯譬猶秩自百石轉遷而至於公也而近世賞人皆不由等級從無爵封無列侯原其所以爵廢故也司馬法曰賞不踰時欲民速觀為善之利也近世爵廢人有小功無以賞也乃積累焉頒事足乃封侯非所以速為而及時也上觀古比高祖功臣及白起衛鞅皆稍賜爵為五大夫客卿庶長以至於侯非一頓而封也夫稍稍賜爵與功大小相稱而俱登既得其義且侯次有緒使慕進者逐之不倦矣異姓王封漢書曰高祖定天下功臣異姓王者八國張耳吳芮彭越黥布臧荼盧綰與兩韓信皆徼一時之權變以詐力成功咸得裂土南面稱孤見疑強大懷不自安事窮勢迫卒謀叛逆終於滅亡張耳以知全至子亦失國唯吳芮之起不失正道故能傳號五世以無嗣絕澤流支庶有以矣夫以其不用詐力也漢書曰張耳大梁人也少時及魏公子母忌為客嘗亡命遊外黃外黃富人女甚美庸奴其夫亡邸父客父客謂曰必欲求賢夫從張耳女聽為請決嫁之女家厚奉給耳耳故致千里客官為外黃令高祖為布衣時嘗從耳遊秦滅魏故購求耳千金耳變姓名之陳為里監門後項羽素亦聞耳賢迺分趙立耳為常山王田榮襲耳耳敗走漢漢二年遣耳與韓信擊破趙井陘斬陳餘泜水上四年夏立耳為趙王耳薨子敖嗣立為王又曰韓信平齊使人言漢王曰齊夸詐多變反覆之國南邊楚不為假王以填音鎮之其勢不定今權輕不足以安之臣請自立為假王當是時楚方急圍漢王於滎陽使者發書漢王大怒罵曰吾困於此旦暮望而來佐我乃欲自立為王張良陳平從後躡漢王足因附耳語曰漢方不利寧能禁信之自王乎不如因立善遇之使自為守不然變生漢王亦寤因復罵曰大丈夫定諸侯即為真王耳何以假為遣張良立信為齊王徵其兵使擊楚又曰彭越字仲昌邑人也常漁鉅野澤中為盜陳勝起歲餘澤間少年相聚百餘人往從越請仲為長乃行略地收諸侯散卒得千餘人沛公之從北擊昌邑越助之昌邑未下沛公引兵西越亦將其眾居鉅野澤中項籍入關王諸侯還歸越眾萬餘人無所屬齊王田榮叛項王漢乃使人賜越將軍印使下濟陰以擊楚大破楚軍漢二年拜越為魏相國將兵略定梁地漢王之敗彭城解而西也越皆亡其所下城獨將其兵北居河上漢三年越常往來為漢游兵擊楚項王與漢王相距滎陽越攻下睢陽外黃十七城漢王追楚為項籍所敗固陵迺謂留侯曰諸侯兵不從為之奈何留侯曰彭越本定梁地功多始君王以魏豹故拜越為相國今豹死亡後且越亦欲王而君王不蚤定今取睢陽以北至穀城皆許以王彭越則兵至矣於是漢王發使使越如留侯策使者至越乃引兵會垓下項籍死立越為梁王都定陶又曰項羽入咸陽黥布為前鋒項王封諸將立布為九江王後與隨何俱歸漢漢王方踞床洗而召布入見布大怒悔來欲自殺出就舍張御飲食從官如漢王居布又大喜過望漢益分布兵而與俱北收兵至成皋四年秋七月立布為淮南王又曰盧綰豐人也與高祖同里及高祖初起沛綰以客從入漢中為將軍項籍死使綰別將劉賈擊臨江王共尉還從擊燕王臧荼皆破平時諸侯, SBCK: ''}
