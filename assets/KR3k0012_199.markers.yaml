  - {type: variant, offset: 2098, length: 0, content: '', SBCK: 漢興之􅀄尊王子弟大啓九國京師内史凡十五郡公主列侯頗邑其中而國大者跨州兼郡小者連城數十也又曰髙祖封兄喜爲代王匈奴入代廢爲合陽侯子濞爲呉王又曰吕后封楚王郢爲下邳侯齊王肥子章朱虚侯興居東牟侯又曰孝文封齊王肥子十人爲侯淮南王長子四人爲侯後改封王又曰孝景封楚王子四人爲侯梁王子二人爲侯又曰淮南厲王死後孝文憐淮南王有子四人年皆七八歳廼封子安爲阜陵侯子勃爲安陽侯子賜爲陽周侯子良爲東城侯又曰梁孝王死竇太后泣極哀不食帝哀懼不知所爲與長公主計之迺分梁爲五國盡立孝王男五人爲王女五人皆令食湯沐邑奏之太后太后迺恱爲帝一食又曰孝武帝令諸王推恩分子弟諸王子孫一百七十七人爲侯又曰武帝以子􅀪爲齊王子旦燕王子胥廣陵王子髆昌邑王髆子賀爲昭帝後即位二十七日廢歸故縣又曰武帝使御史大夫張湯䇿立子閎爲齊王曰於戲小子閎受兹青社朕承祖考維稽古建爾國家封於東土丗爲漢蕃輔立子旦爲燕王曰小子旦受兹􅀇社建爾國家封于北土子胥爲廣陵王曰小子胥受兹赤社建爾國家封于南土又曰宣帝詔曰蓋聞象有罪舜封之其封昌邑王賀爲海昏侯又曰宣帝封子厥爲淮陽王宇爲東平王囂爲楚王竟爲中山王廣陵王子胥􅀪爲髙密王又曰昭帝封諸王子孫十二人宣帝封六十三人元帝封四十八人成帝封四十三人哀帝封九人平帝封四十八人爲侯續漢書曰靈帝封河間王子庾爲濟南王奉帝父孝仁祀魏志曰明帝大和六年春二月詔曰古之帝王封建諸侯所以藩屏王室也詩不云乎懷德惟寧宗子維城􅁗漢繼周或強或弱俱失厥中大魏創業諸王開國隨時之冝未有定制非所以永爲後法也其改封諸侯王皆以郡爲國晉起居注曰武帝詔皇子􅁉生七歳矣得疾封始平王又曰武帝詔安平獻王孫承昔以父早亡不建大祚以縣封之今以三縣封爲武邑王又曰}
