  - {type: variant, offset: 2381, length: 393, content: 弘農太守愛少子淑欲以爵傳之恢父終服闋乃還鄉里結草為廬陽瘖不能言淑得襲爵恢始仕管子曰爵不尊祿不重者不與圖難犯危以其道為未可以求之也是故先王制軒冕足以著貴賤不求其美設爵祿足以守其服不求其觀使君子食於道小人食於力孟子曰有天爵者有人爵者仁義忠信樂善不倦此天爵也公卿大夫人爵也天爵以德人爵以祿古之人修天爵而人爵從之今之人脩其天爵以要人爵既得人爵而棄其天爵則惑之甚者也商君書曰明王之所貴唯爵其賞不榮則民急其列不顯則民不事爵易得也則民不貴淮南子曰爵祿者人臣之銜轡說苑曰晉文公出亡周流天下舟之僑去虞而從文公文公反國擇可爵而爵之擇可祿而祿之僑獨不與焉文公酌諸大夫酒酒酣公曰二三子盍為寡人賦乎舟之僑曰君子為賦小人請陳其辭辭曰有龍矯矯頓失其所一虵從之周流天下龍反其淵虵寧其處公懼然曰子欲爵也請待旦日之朝子欲祿耶請今命廩人之僑曰請而得其賞廉者不受也言盡而名至仁者不為也遂退終身誦甫田之詩風俗通曰漢武帝諱徹改曰通, WYG: 益靖}
