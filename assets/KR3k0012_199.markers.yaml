  - {type: punctuation, offset: 2080, content: 「, id: KR3k0012_CHANT_199-bkkpn573}
  - {type: variant, offset: 2080, length: 0, content: '', SBCK: 武王封呉周章之弟虞仲於虞列爲諸侯十二丗而爲晉所滅又曰周公旦武王之弟佐武王平紂而封於少皥之墟曲阜是爲魯公凡四十四丗而楚考烈王滅魯又曰管叔鮮蔡叔度武王之弟武王巳尅殷封鮮於管封度於蔡周公誅武庚殺管叔放蔡叔蔡旣遷而死其子曰胡胡乃改行率德周公言於成王復封于蔡凡二十五丗至侯齊而楚惠王滅蔡又曰曹叔振鐸者武王弟也武王巳尅殷封振鐸於曹凡二十四丗至伯陽而宋滅曹又曰衛康叔者武王弟也周公以成王之命伐武庚放蔡叔殺管叔以殷餘民封康叔爲衛君凡三十九丗至君角而}
  - {type: page-break, offset: 2080, content: '', id: KR3k0012_SBCK_199-5b}
  - {type: variant, offset: 2080, length: 0, content: '', WYG: 武王封吴周章之弟虞仲於虞列為諸侯十二世而為晉所滅又曰周公旦武王之弟佐武王平紂而封於少皥之墟曲阜是為魯公凡四十四世而楚考烈王滅魯又曰管叔鮮蔡叔度武王之弟武王巳克殷封鮮於管封度於蔡周公誅武庚殺管叔放蔡叔蔡既遷而死其子曰胡胡乃改行率徳周公言於成王復封於蔡凡二十五世至侯齊而楚恵王滅蔡又曰曹叔振鐸者武王弟也武王已克殷封振鐸於曹凡二十四世至伯陽而宋滅曹又曰衞康叔者武王弟也周公以成王之命伐武庚放蔡叔殺管叔以殷餘民封康叔為衞君凡三十九世至君角而}
