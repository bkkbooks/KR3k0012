  - {type: variant, offset: 1996, length: 1, content: 後, SBCK: 子封周禮春官典命職曰子男五命其國家宫室車旗衣服禮儀皆以五爲節又曰春官大宗伯職曰子執榖璧魏志曰蔣愷濟之孫也咸熈中開建五等以濟著勲前朝改封愷爲下蔡子又曰咸熈元年相國晉王奏五等諸子地方五十里邑八百户相一人典詞令典書丞典衛丞各一人妾三人車前司馬四人旅賁二十人齊書曰王敬則封重安縣子邑三百五十户敬則少時於草中射獵有虫如烏豆集其身擿去乃脫處皆流血敬則惡之詣道士卜道士曰不湏憂此封侯之瑞也敬則聞之喜故出都自效至是如言環濟要略曰子獨孳孳栖下之}
