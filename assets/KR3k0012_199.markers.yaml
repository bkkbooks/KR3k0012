  - {type: variant, offset: 1102, length: 236, content: 來諸用秦者皆應穰之類也故勝戰則大臣尊益地則私封立說苑曰鄭桓公東會封於鄭舍於宋東之逆旅逆旅之叟從外來曰客將焉之曰會封於鄭逆旅之叟曰吾聞之時難得而易失也今客之寢安殆非會封者也鄭桓公聞之援轡自駕其僕接術而載之袁子曰今有卿相之才居三公之位循其治政以寧國家未必封侯也今軍政之法斬一牙門將者封侯夫斬一將之功孰與安寧天下者安寧天下者不爵斬一將之功者封侯失賞之意也又曰春秋鄭莊公封母弟於京祭仲曰都城過制國之害也其後卒相攻伐國內大亂故過度則有強臣之禍鄙小則有微弱之憂秦以列國之勢而并天下自以, SBCK: 悲耳賢}
