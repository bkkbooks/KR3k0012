  - {type: variant, offset: 2080, length: 0, content: '', krp: 武王封呉周章之弟虞仲於虞列爲諸侯十二丗而爲晉所滅又曰周公旦武王之弟佐武王平紂而封於少皥之墟曲阜是爲魯公凡四十四丗而楚考烈王滅魯又曰管叔鮮蔡叔度武王之弟武王巳尅殷封鮮於管封度於蔡周公誅武庚殺管叔放蔡叔蔡旣遷而死其子曰胡胡乃改行率德周公言於成王復封于蔡凡二十五丗至侯齊而楚惠王滅蔡又曰曹叔振鐸者武王弟也武王巳尅殷封振鐸於曹凡二十四丗至伯陽而宋滅曹又曰衛康叔者武王弟也周公以成王之命伐武庚放蔡叔殺管叔以殷餘民封康叔爲衛君凡三十九丗至君角而}
  - {type: variant, offset: 2081, length: 2, content: 始皇, SBCK: 并天下廢爲庶人又曰晉叔虞者成王之弟成王與叔虞戲削桐葉爲珪以唐封汝史佚因言請擇日立叔虞成王曰吾與之戲耳史佚曰天子無戲言遂封叔虞於唐唐在河汾之東三十五丗至靖公而韓魏趙三分其地又曰鄭桓公友者周厲王庶子封於鄭二十}
