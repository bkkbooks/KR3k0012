  - {type: variant, offset: 4677, length: 2, content: 曜帶, WYG: 后縱兵夫為將能識此之機變知彼之物情亦何慮功不建鬭不勝哉又曰敵有十五形可擊新集始至行陣未定未食雖已結陣須饋食不順逆風向月建後至敵后來不得山川地勢利奔走行陣无次用力不齊陣布不均不戒我示弱誘之戰不設備勤勞倍道兼行人馬未息衣}
  - {type: variant, offset: 4680, length: 0, content: '', WYG: 馳路維乗不整將離大將已去獨任小將素不威服長路趨戰争利晝暮不息候濟半渡疾擊不暇貪利求勝不暇畫陣險路泥濘阻夾車馬單行左右難救擾亂行列失序進退不齊縱不相載横不相對或坐或立驚怖卒然相逢都无備預鼓譟掩甲三軍震攝不定陣數移動人馬數顧師有}
  - {type: page-break, offset: 4680, content: '', id: KR3k0012_WYG_291-12a, image: WYG0895/WYG0895-0547c.png}
  - {type: variant, offset: 4681, length: 2, content: 萬攻, WYG: 過勇而輕死可暴貪而好利可遣仁而不忍可勞知而不怯可窘信而喜信可誑亷而愛人可侮慢而心緩可襲剛而自用可誘懦志多疑可惑孫子曰軍傍有險阻蔣潢井生葭葦小林翳薈者必謹覆索之此伏奸之所藏處也險者}
  - {type: punctuation, offset: 4682, content: ，, id: KR3k0012_CHANT_291-bkkpn1148}
