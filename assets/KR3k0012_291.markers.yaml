  - {type: variant, offset: 4684, length: 1, content: 城, WYG: 髙一下之地阻者草蔣水草之藂生潢者池也井者下也葭葦者衆木所居也翳薈者可以屏籠蔽處也此以上相地形此以下察敵情也翳薈草木之相蒙蔽可以藏兵處反覆索之也敵近}
  - {type: page-break, offset: 4684, content: '', id: KR3k0012_WYG_291-12b, image: WYG0895/WYG0895-0547d.png}
