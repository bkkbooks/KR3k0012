  - {type: variant, offset: 868, length: 391, content: 眾誰適從此行也晉師必敗楚改乘轅而北之次於菅以待之晉師在敖鄗之間敖五勞反鄗許各反晉魏錡求公族未得欲為公族大夫而怒欲敗晉師請致師不許請使許之使所吏反遂往請戰而還趙旃求卿未得挑戰不許請召盟許之與魏錡皆命而往郄克曰二憾往矣弗備必敗隨會曰若二子怒楚楚人乘我喪師無日矣乘猶登也不如備之楚之無惡除備而盟何損於好若以惡來有備不敗且雖諸侯相見軍衛不徹警也先縠不可不肯設備隨會使鞏朔韓穿帥七覆于敖前帥將也覆為伏兵七處故上軍不敗而中軍下軍皆敗績又曰吳師伐楚州來楚救之吳人禦諸鍾離楚將子瑕卒楚師熸吳楚之間謂火滅為熸軍之重主喪亡故其軍人無復氣勢也熸子廉反吳將公子光曰諸侯從於楚者眾而皆小國也畏楚而不獲己是以來吾聞之作事威剋其愛雖小必濟剋勝也軍事尚威胡沈之君幼而狂性無常也陳大夫齧壯而頑頓與許蔡疾楚政大將死其師熸薳越為帥帥賤多寵政令不壹越非正卿也軍多寵人政令不壹於越也七國同役而不同心七國楚頓胡沈蔡陳許也帥賤而, SBCK: ''}
