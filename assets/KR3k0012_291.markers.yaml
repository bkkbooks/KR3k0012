  - {type: variant, offset: 4397, length: 0, content: '', WYG: 曰士馬驍雄示我以羸弱陣伍齊肅示我以不戰見小利佯為不敢爭伏竒兵故誘以奔北内實嚴警外為弛慢恣行間諜託以忠告或使使以相忿或厚賂以相悦移師則減竈舍營則偃旗智足以及謀勇足以及怒非得地而不舍非全軍而不侵以多擊少必取於晨朝以寡擊衆必候於日暮如此則兵多詭狀將有深圖理雖曲為防慎不可入其規畫故傳曰見可而進知難而退軍之善政也但敵故無小蜂蠆有毒且鳥窮則喙獸窮猶觸者皆自衛其生命而求免於禍難也若困而不鬭乃知不逮於鳥獸其能將乎必須料敵制勝誡於小利然後可立大功矣或又問曰所謂料敵者何對曰凡料敵者料其彼我之形定乎得失之計始可出兵而决於}
