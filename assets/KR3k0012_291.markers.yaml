  - {type: 'tls:seg', offset: 3297, content: '', id: KR3k0012_CHANT_291-18a.6}
  - {type: variant, offset: 3297, length: 1, content: 鮑, WYG: 賊必喪膽如吾計者指日取之衆皆從賢乃率敢死士三百人分為兩道乗夜鼓譟而出羣賊大驚一戰而敗狼遁走追斬之後魏書曰李順使涼州還世祖問蒙遜政教得失順曰蒙遜專威河右三十許年雖不能貽厥將來猶足以終其一世但前歳表許十月送曇元䜟及臣往迎便乖本意不忠不}
  - {type: variant, offset: 3299, length: 1, content: 諫, WYG: 於是殆甚以臣觀之不復周矣世祖}
  - {type: punctuation, offset: 3301, content: ：, id: KR3k0012_CHANT_291-bkkpn837}
  - {type: 'tls:seg', offset: 3301, content: '', id: KR3k0012_CHANT_291-18a.7}
  - {type: punctuation, offset: 3301, content: 『, id: KR3k0012_CHANT_291-bkkpn838}
  - {type: variant, offset: 3301, length: 0, content: '', WYG: 若如卿言則效在無逺其子必復襲世襲世之後早晩當滅順曰臣畧見其子並非俊才能保一隅敦煌太守牧犍噐性粗立若繼蒙遜者必此人也然比之於父僉謂不逮殆天所用資聖明也已而蒙遜死問至世祖謂順曰卿言蒙遜死}
  - {type: page-break, offset: 3301, content: '', id: KR3k0012_WYG_291-3b, image: WYG0895/WYG0895-0543b.png}
  - {type: variant, offset: 3302, length: 9, content: 賊眾百萬百姓皆震恐, WYG: 則騐矣又言牧犍立何其妙哉想朕克凉州亦當不逺於是賜絹千疋廐馬一疋進號安西將軍寵待彌厚唐書曰武德初劉武周據太原使其將宋金剛屯於河東太宗征之謂諸將曰金剛懸軍千里深入吾地精兵驍將非其所統但統一枝遊騎耳吾逆知其不能濟事也吾何慮焉當使之自退諸將苐觀之且兵法曰彼客我主彼利速戰我惟持久待之彼不戰自走矣金剛率衆挑戰不得鋭氣既挫}
  - {type: page-break, offset: 3302, content: '', id: KR3k0012_WYG_291-4a, image: WYG0895/WYG0895-0543c.png}
  - {type: punctuation, offset: 3306, content: ，, id: KR3k0012_CHANT_291-bkkpn839}
  - {type: 'tls:seg', offset: 3306, content: '', id: KR3k0012_CHANT_291-18a.8}
  - {type: punctuation, offset: 3311, content: ，, id: KR3k0012_CHANT_291-bkkpn840}
  - {type: 'tls:seg', offset: 3311, content: '', id: KR3k0012_CHANT_291-18a.9}
  - {type: punctuation, offset: 3316, content: ，, id: KR3k0012_CHANT_291-bkkpn841}
  - {type: 'tls:seg', offset: 3316, content: '', id: KR3k0012_CHANT_291-18a.10}
  - {type: variant, offset: 3316, length: 0, content: '', WYG: 俱有離心金剛謂其衆曰我軍深入利在速戰今進}
  - {type: variant, offset: 3317, length: 1, content: 可, WYG: 能戰退恐}
  - {type: variant, offset: 3319, length: 13, content: 也觀賊眾群輩相隨軍無輜重唯, WYG: 兵躡其後柰何太宗謂諸將曰武周自據太原專倚金剛}
  - {type: punctuation, offset: 3320, content: 。, id: KR3k0012_CHANT_291-bkkpn842}
  - {type: 'tls:seg', offset: 3320, content: '', id: KR3k0012_CHANT_291-18a.11}
  - {type: punctuation, offset: 3327, content: ，, id: KR3k0012_CHANT_291-bkkpn843}
  - {type: 'tls:seg', offset: 3327, content: '', id: KR3k0012_CHANT_291-18a.12}
  - {type: punctuation, offset: 3331, content: ，, id: KR3k0012_CHANT_291-bkkpn844}
  - {type: 'tls:seg', offset: 3331, content: '', id: KR3k0012_CHANT_291-18a.13}
  - {type: variant, offset: 3333, length: 1, content: 抄, WYG: 為捍蔽金剛雖衆内實空虛虜}
  - {type: punctuation, offset: 3337, content: 。, id: KR3k0012_CHANT_291-bkkpn845}
  - {type: 'tls:seg', offset: 3337, content: '', id: KR3k0012_CHANT_291-18a.14}
  - {type: variant, offset: 3337, length: 0, content: '', WYG: 意在速戰我堅營蓄鋭以挫其鋒分兵汾隰衝其心腹彼粮盡計窮自當遁走當待此幾未宜速戰於是遣劉𢎞等絶其粮道其衆遂亂金剛果遁又曰武德中李靖隨河間王孝公討蕭銑師至於清江尅銑荆門遣其將乗勝入北江銑悉兵以拒之孝公將戰李靖止之曰楚之輕鋭難與争鋒}
  - {type: page-break, offset: 3337, content: '', id: KR3k0012_WYG_291-4b, image: WYG0895/WYG0895-0543d.png}
  - {type: variant, offset: 3338, length: 0, content: '', WYG: 新失荆門盡兵出戰此救敗之師也非其本圖勢}
  - {type: variant, offset: 3339, length: 0, content: '', WYG: 能久一日不戰賊必兩分留輕兵以抗我退羸師以自守此即勢虧力弱擊之必捷孝公不從遣靖安營自以鋭師水戰孝公果敗於南岸又曰隋末王世充殺其主越王侗自僭偽號太宗率師討之世充求援於河北竇建德將全軍赴之諸將計曰王世充據有東都患者在於乏食建德親總軍旅來拒我師亦當盡彼驍雄期於奮决}
  - {type: page-break, offset: 3339, content: '', id: KR3k0012_WYG_291-5a, image: WYG0895/WYG0895-0544a.png}
  - {type: variant, offset: 3340, length: 3, content: 蓄士眾, WYG: 縱其至此兩寇相連轉河北}
  - {type: variant, offset: 3344, length: 4, content: 力先為固, WYG: 粮以相資給則伊洛之間戰鬭不已今宜分兵}
  - {type: punctuation, offset: 3345, content: ，, id: KR3k0012_CHANT_291-bkkpn846}
  - {type: 'tls:seg', offset: 3345, content: '', id: KR3k0012_CHANT_291-18a.15}
  - {type: punctuation, offset: 3349, content: ，, id: KR3k0012_CHANT_291-bkkpn847}
  - {type: 'tls:seg', offset: 3349, content: '', id: KR3k0012_CHANT_291-18a.16}
  - {type: variant, offset: 3349, length: 2, content: 使彼, WYG: 營深其溝防即世充}
  - {type: variant, offset: 3353, length: 0, content: '', WYG: 慎勿出兵大王親選猛鋭先據城皋之險偃兵坐甲以待其至彼以疲弊之師當我堂堂之勢一戰必克建德既破則世充自下}
  - {type: page-break, offset: 3353, content: '', id: KR3k0012_WYG_291-5b, image: WYG0895/WYG0895-0544b.png}
  - {type: variant, offset: 3354, length: 2, content: 得攻, WYG: 過兩旬夏鄭二主可面縛於麾下矣若退兵自守計之下也秦王喜曰合吾意是日出師據虎牢卒擒建德又曰隋煬帝為突厥所圍郡縣皆發赴援時太宗年未弱冠召募從軍𨽻屯衛將軍雲定興師將發太宗勸之多賫旗鼓設疑兵以威突厥定興初不納太宗謂之曰始畢掃其境内敢圍天子本疑國家倉卒無援忽見旗鼓之盛必謂救兵雲集今者師進可前後相次令數十里間連亘不絶晝}
  - {type: page-break, offset: 3354, content: '', id: KR3k0012_WYG_291-6a, image: WYG0895/WYG0895-0544c.png}
  - {type: punctuation, offset: 3355, content: ，, id: KR3k0012_CHANT_291-bkkpn848}
  - {type: 'tls:seg', offset: 3355, content: '', id: KR3k0012_CHANT_291-18a.17}
  - {type: variant, offset: 3357, length: 0, content: '', WYG: 旗旛相續夜則鉦鼓相應以張形勢賊見必懼望塵而退此計之上也不然則為所輕悉軍來戰公必不支矣定興悦而從焉將次崞縣突厥候騎馳告始畢曰兵大至遂解圍而退果如所籌又曰太宗遣李靖經畧突厥以張公謹副公謹因言突厥可取之狀曰頡利縱慾肆情窮凶極暴誅害良善悦近小人此即主昏於上其可取一也又其别部同羅僕骨迴紇延佗之類並自立君長將圖反噬此則衆反於下其可取二也突利被疑輕騎自免招設出討匹馬不歸欲谷喪師立足無地則兵挫將敗其可取三也塞北寒霜早餱粮乏絶天降之災因以饑饉其可取四也頡利踈其突厥委諸胡人胡人翻覆是其常性大軍一臨内必生變其可取五也華人入北其類實多比聞自相嘯聚保據阻險師出塞垣自然有應其可取六也太宗深納之及破定襄敗頡利頗預謀畧進爵為國公又曰元和十年王師討淮西鎮州節度使王承宗淄青節度使李師道謀撓王師遣刺客於京城殺宰相武元衡憲宗怒命御史中丞裴度為宰相專主兵機以誅三盜時淮西鎮冀兩道用軍度支儲運供餉不暇復又諸軍玩冦隂與賊通冀朝廷力竭即行赦雪議者患之宰相韋貫之奏曰陛下豈不知建中之事乎天下兵始於蔡急魏應齊趙同惡德宗率天下兵令馬燧李抱真急擊之物力既屈朱泚乗間為亂朱滔南向指闕致使梁漢為府奉天有行皆陛下出所聞見非他也}
