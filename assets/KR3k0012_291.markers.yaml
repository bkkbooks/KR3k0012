  - {type: variant, offset: 3465, length: 543, content: 曹公違之而敗又曰後漢末張遼屯長社軍中有謀反者夜驚起亂火一軍盡擾遼謂左右勿動是不一營盡反必有造變者欲以動亂人耳乃令軍中不反者安陣遼將親兵數十人中陣而立有頃定即得首謀者殺之張遼審計立擒賊首亦同料敵之義又曰後漢末曹公征荊州劉琮降得其水軍及步軍遂遺書孫權云今將水軍十八萬與將軍會獵於長州之菀將士聞之恐權延見群下問計咸曰曹操託名漢相挾天子以征四方動以朝庭為辭今日拒之事更不順且將軍大勢可以距操者長江也劉表理水軍艨艟鬭艦千數操悉浮以沿江兼有步兵水陸俱下此則上江之險與我共之矣而勢力眾寡愚謂大計不如迎之權將周瑜曰操雖名漢相其實漢賊將軍神武雄才兼杖父兄遺烈據有江東地方千里兵精足用英豪樂業尚當橫行天下為漢家除殘去穢況操自送死豈可迎之耶請為將軍籌之使北土已安操無內憂能曠日持久來爭疆場又能與我校勝負於舡楫可也今北土既未安而加以馬超韓遂在關西為操後患且捨鞍馬杖舟楫與吳越爭衡本非中國所長又今盛寒馬無藁草驅中國士眾遠涉江湖不曾習水土必生疾病此數四者用兵之患也而操皆冒行之瑜得請精兵三萬人徑進夏口保為將軍破之權曰老賊欲廢漢自立久矣但忌二袁呂布劉表與孤耳今諸英雄已滅唯孤尚存孤與老賊勢不兩立君言當擊甚與孤合權拔刀斫前奏案曰諸將吏敢復言迎曹操者與此案同果有赤壁之捷焉又曰蜀大將諸葛亮悉眾十萬由斜谷出始平據武功五丈原, WYG: ''}
