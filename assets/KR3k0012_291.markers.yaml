  - {type: variant, offset: 8, length: 1, content: 孫, krp: 䇿移郭内居民退保子城峻其陴堞以待援至是其中䇿若難於移動據守羅郭是其下䇿儉曰揣繹定出何䇿謹曰必用其下䇿儉曰彼弃上而用下何也對曰蕭氏保據江南綿歷數紀屬中原多故未遑外略又以我有齊氏之患必謂力不能分且繹懦而無謀多疑少断人難慮始皆戀邑居旣惡遷移當保羅郭所以用下䇿也謹乃令中山公護及楊忠等率精騎先據江津断其走路梁人堅木柵於外城廣輸六十里㝷而謹至悉衆圍之梁主屢遣兵於城出戰輙爲謹所破旬六日外城自䧟梁主退保子城翌日率其太子以下靣縳出降㝷殺之又曰後魏末原州民豆盧狼害都督大野樹兒等據州城反州人李賢乃招集豪傑謀曰賊起倉卒便誅二將其勢雖盛其志巳驕然其政令莫施唯以殘剥爲業夫以羇據之賊而馭烏合之衆勢自離解今若從中擊之賊必喪膽如吾計者指日取之衆皆從賢乃率敢死士三百人分爲兩道乗夜鼓譟而出羣賊大驚一戰而敗狼遁走追斬之後魏書曰李順使涼州還丗祖問蒙遜政敎得失順曰蒙遜專威河右三十許年雖不能貽厥將來獨足以終其一丗但前歳表許十月送曇元䜟及臣往迎便乖夲意不忠不信於是而甚以臣觀之不復周矣丗祖曰若如卿言則效在不逺其子必復丗襲之後又問曰早晚當滅順曰臣略見其子並非俊才能保一隅如燉煌太牧犍器性粗立若繼䝉遜者必此人也然比之於父僉謂不逮殆天所用資聖明也旣而䝉遜死問至丗祖謂順曰卿言䝉遜死今則驗矣又言牧犍立何其妙哉晚克涼州知當不逺於是賜絹千疋廐馬一疋進號安西將軍寵待弥厚唐書曰武德𥘉劉武周據太原使其將宋金剛屯於河東太宗往征之謂諸將曰金剛懸軍千里深入吾地精兵驍將皆在於武周自據太原專倚金剛以爲捍蔽金剛雖衆内實空虚虜掠爲資意在速戰我堅營蓄銳以挫其鋒分兵汾隰衝其心腹彼糧盡計窮自當遁走當待此機未冝速戰於是遣劉弘等絶其糧道其衆遂餧金剛果遁又曰武德中李靖隨河間王孝恭討蕭銑師至于清江尅銑荆門遣其將乗勝入北江銑悉兵以拒之孝恭將戰李靖止之曰楚之輕銳難與爭鋒今新失荆門盡兵岀戰此救敗之師也非其夲圖勢不能乆一日不戰賊必兩分留輕兵以抗我退羸師以自守此即勢虧力弱擊之必捷孝恭不從遣靖按營自以銳師水戰孝恭果敗于南岸又曰隋末王丗充殺其主越王侗自僭僞號太宗率師討之丗充求援于河北竇建德將全軍赴之諸將以二賊合勢衆寡不敵冝退舎以避之行臺郎中薛收獨進計曰王丗充據有東都府庫填積其下兵士皆是江淮精銳其所患者在於乏食耳是以爲我所持求戰不可建德親揔軍旅來拒我師亦當盡彼驍雄期於奮決若縱其至此兩㓂相連轉河北之糧以相資給則伊洛之間戰鬪不巳今冝分兵守營深其溝防即丗充欲戰愼勿出兵大王親選猛銳先據成臯之險訓兵坐甲以待其至彼以疲弊之師當我堂堂之勢一戰必克建德旣破則丗充自下不過兩旬夏鄭二主可靣縳於麾下矣若退兵自守計之下也秦王喜曰合吾意是日出師據虎牢卒擒建德又曰隋焬帝爲突厥所圍郡縣皆發赴援時太宗年未弱冠召募從軍隷屯衛將軍雲定興師將發太宗勸之多賫旗鼔設疑兵以威突厥定興𥘉不納太宗謂之曰始畢掃其境内敢圍天子夲疑國家倉卒無援忽見旗鼔之盛必謂救兵雲集今者師進可前後相次令數十里間連亘不絶晝則旗幡相續夜則鉦鼔相應以張形勢賊見必懼望塵而退此計之上也不然則爲所輕悉軍來戰公必不支矣定興恱而從焉將次崞縣突厥候騎馳告始畢曰兵大至遂解圍而退果如所籌又曰太宗遣李靖經略突厥以張公謹副公謹因言突厥可取之狀曰頡利縱慾肆情窮凶極暴誅害良善昵近小人此即主昏於上其可取一也又其别部同羅㒒骨廻紇延陀之類並自立君長將圖反噬此則衆叛於下其可取二也頡利𬒳疑輕騎自免柘設出討疋馬不㱕欲谷喪師立足無地則兵挫將敗其可取三也塞北霜早糇糧乏絶天降之災因以饑饉其可取四也頡利踈其突厥委諸胡人胡人翻覆是其常性大軍一臨内必生變其可取五也華人入北其類實多比聞自相嘯聚保據山險師出塞垣自然有應其可取六也太宗深納之及破定襄敗頡利頗預謀略進爵爲國公又曰元和十年王師討淮西鎭州鎮度使王承宗淄青節度李師道謀撓王師遣刺客於京城煞宰相武元衡憲宗怒命御史中丞裴度爲宰相專主兵機以誅三盗時淮西鎭兾兩道用軍度支儲運供餉不暇復又諸軍玩㓂隂與賊通兾朝廷力竭即行赦雪議者患之宰相韋貫之奏曰陛下豈不知建中之事乎天下兵始於蔡急魏應齊趙同惡德宗率天下兵令馬燧李抱真急撃之物力旣屈朱泚乗間爲乱朱滔南向指闕致使梁漢爲府奉天有行皆陛下親所聞見非他也不能忍待次第速於滅賊故也陛下獨不能寛嵗月之計俟拔蔡而圍鎭耶上深然之而巳下詔矣後擒元濟而承宗服果如貫之所籌漢晉春秋曰亮圍祁山招鮮卑軻比能等至故北地石城以應亮於是魏大司馬曹眞有疾司馬宣王自荆州入朝魏明帝曰西方事重非君莫可付者乃使西屯長安都督張郃費曜戴陵郭淮等宣王使曜陵留精兵四千上邽餘衆悉出西救祁山郃欲分駐雍宣王曰料前軍獨能當之者將軍言是也不能當而分爲前後此楚之三軍所以爲黥布擒也遂進亮分兵留攻自逆宣王于上邽郭淮費曜邀亮亮破之因大芟其麥宣王遇於上邽之東歛兵依嶮軍不得交亮引兵而還宣王㝷亮至於鹵城張郃曰彼逺來逆我請戦不得謂我利在不戰欲以長計制之也且祁山大軍以近人情自固可止屯於此分爲竒兵亦岀其後不冝進前而不敢逼坐失民望也今亮懸軍食少亦行去矣宣王不從固㝷亮旣至又登山掘營不肯戰賈詡魏平數請救且曰公畏蜀如畏虎奈天下笑何宣王病之諸將咸請戰五月辛巳乃使張郃攻無當監何平於南國自案中道向亮亮使魏延髙翔呉班赴距大破之獲甲首三千級鎧五千領宣王還保營袁希之漢表傳曰丞相亮出軍圍祁連山始以木牛運糧魏司馬宣王張郃救祁連山夏六月亮粮盡軍還至于青封木門郃追之亮駐軍削大樹皮題曰張郃死此樹下豫令兵夾道以數千強弩備之郃果自見千弩俱發射郃而死韓}
