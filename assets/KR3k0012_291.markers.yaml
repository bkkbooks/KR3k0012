  - {type: variant, offset: 1877, length: 450, content: 卿相惡子重子反王卒以舊罷老不代鄭陣而不整不整列蠻軍而不陣蠻夷從楚者不結陣陣不違晦晦月終陰之盡也故兵家以為忌在陣而囂囂譁喧也合而加囂陣合宜靖而益其聲各顧其後莫有鬭心舊不必良以犯天忌我必克之終敗楚于𨻳陵史記曰龐涓追孫臏臏量其行暮當至馬陵道狹而旁多阻險可伏兵乃大斫樹白而書之曰龐涓死此下於是令齊軍善射者萬弩夾道而伏期曰見火起而俱發龐涓夜至斫樹下見白書乃鑽火燭之讀書未畢齊軍萬弩俱發魏軍大亂龐涓自知智窮兵敗乃自刎曰遂成豎子之名又曰漢王在漢中拜韓信為大將信因問王曰今東嚮爭權天下豈非項王耶漢王曰然曰大王自料勇悍仁彊孰與項王漢王默然良久曰不如也信再拜賀曰惟信亦為大王不如也然臣嘗事之請言項王之為人也項王喑噁叱咤千人皆廢喑音陰噁烏路切叱尺栗切咤陟訝切然不能任屬賢將此特匹夫之勇耳項王見人恭敬慈愛言語姁姁人有疾病涕泣分食飲至使人有功當封爵者刻印刓刓五元切忍不能與此所謂婦人之仁也項王雖霸天下而臣諸侯不居關中而都彭城背義帝之約而以親愛王諸侯不平諸侯之見項王遷逐義帝置江南亦皆歸逐其主而自王善地項王所過無不殘滅者天下多怨, SBCK: ''}
