  - {type: variant, offset: 4803, length: 0, content: '', WYG: 先暴而後畏其衆者不情之至也先行悍暴於士卒而后欲畏己者此將不情之極也來委謝者欲休息也戰未相伏而下其意氣相委謝者欲休息也兵怒而相迎久而不合又不相去謹而察之備其伏也此必有間諜也又曰凡敵有不卜而與戰有不占而避之疾風大寒早興㝠遷剖冰濟渡盛夏炎熱興役無間行饑驅渇務取於逺師久無粮士衆怨怒妖祥疑惑上不能止軍資既竭時多霖注欲掠無所師衆不多地土不利人馬疾疫道逺日暮士卒勞倦饑未及食解甲而息將薄吏輕士卒不固三軍數驚師徒無助陳而未定舍而未畢行坂渉險半隠半出諸如此類擊而勿疑若土地廣大人衆富盛上愛其下惠施流布賞信行察發正得時行陣居列任賢}
