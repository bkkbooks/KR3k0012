  - {type: variant, offset: 2435, length: 770, content: 餘萬唯獨邯欣翳得脫章邯司馬欣董翳秦父兄怨此三人痛入骨髓今楚彊以威王此三人秦民莫愛也大王之入武關秋毫無所害除秦苛法與秦民約法三章耳秦民無不欲得大王王秦者於諸侯之約大王當王關中關中人咸知大王失職入漢中秦人無不恨者今大王舉而東三秦可傳檄而定也於是漢王大喜自以為得信晚遂聽信計定秦滅項又曰項籍圍漢王於滎陽城久之漢王患之請割滎陽以西以和項王不聽漢王謂陳平曰天下紛紛何時定乎陳平曰然項王為人恭敬愛人士之廉節好禮者多歸之至於行賞功爵邑重之言愛惜之士亦以此不附今大王慢而少禮士廉節者不來然大王能饒人以爵邑士之頑鈍嗜利無恥者亦多歸漢王誠各去其兩短襲其兩長天下指麾可定矣又曰漢王與項籍約中分天下漢王欲西歸張良陳平說曰漢有天下太半而諸侯皆附之楚兵疲食盡此天亡之時也不因其飢而遂取之今釋不取所謂養虎自遺患也從之終滅羽漢書曰陳王拜項梁為楚上柱國梁自號武信君乃使宋義於齊道遇齊使者高陵君顯張晏曰顯名高陵縣名也曰公將見武信君乎曰然義曰臣論武信君軍必敗公徐行則免疾行及禍章邯夜銜枚擊楚大破之定陶梁死宋義所遇齊使者高陵君顯見楚懷王曰宋義論武信君必敗數日果破未戰先見敗徵此可謂知兵矣召宋義與計事而悅之因以為上將又曰西域都護為烏孫兵所圍上召陳湯問之湯曰烏孫瓦合不能久攻詘指計其日不出五日當有吉語聞果四日軍書言已解又曰黥布反帝召薛公問對曰使布出於上計東取吳西取楚并齊取魯傳檄燕趙固守其所山東非漢之有也出中計東取吳西取楚并韓取魏據敖倉之粟塞成皋之口勝敗之數未可知也出下計東取吳西取下蔡歸重於越身歸長沙陛下高枕而臥漢無事矣上曰是計將安出對曰必出下計布故酈山之徒也酈音離自致万乘之主此皆為身不顧後為百姓萬代慮也故曰出下計上自將東擊布布之初反謂其將曰上老矣厭兵必不能來使諸將獨患淮陰彭越今皆已死餘不足畏也故遂反果如薛公籌之東擊荊荊王劉賈敗死時賈都丹徒也漢終破布通典曰後漢末曹公擊馬超始賊每, SBCK: ''}
