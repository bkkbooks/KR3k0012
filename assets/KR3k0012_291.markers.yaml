  - {type: variant, offset: 3206, length: 1794, content: 部到公輒有喜色賊破之後諸將問故公荅曰關中長遠若賊各依險阻征之不一二年不可定也今皆來集其眾雖多莫相歸服軍無適主一舉可滅為功差易吾是以喜又曰後漢末青州黃巾眾百餘萬人起兗州界刺史劉岱欲擊之鮑信諫曰今賊眾百萬百姓皆震恐士卒無鬭志不可敵也觀賊眾群輩相隨軍無輜重唯以抄掠為資今不若蓄士眾之力先為固守使彼欲戰不得攻則不能其勢必離散然後選精銳據其要害擊之可破也岱不從遂與戰果為所殺劉岱為之而敗又曰後漢末荀攸從曹公征張繡攸言曰繡與劉表相持為強然繡以遊軍仰食表不能供也勢必離不如緩軍以待之可誘而致也不從表果救之軍不利曹公謂攸曰不用君言至是曹公違之而敗又曰後漢末張遼屯長社軍中有謀反者夜驚起亂火一軍盡擾遼謂左右勿動是不一營盡反必有造變者欲以動亂人耳乃令軍中不反者安陣遼將親兵數十人中陣而立有頃定即得首謀者殺之張遼審計立擒賊首亦同料敵之義又曰後漢末曹公征荊州劉琮降得其水軍及步軍遂遺書孫權云今將水軍十八萬與將軍會獵於長州之菀將士聞之恐權延見群下問計咸曰曹操託名漢相挾天子以征四方動以朝庭為辭今日拒之事更不順且將軍大勢可以距操者長江也劉表理水軍艨艟鬭艦千數操悉浮以沿江兼有步兵水陸俱下此則上江之險與我共之矣而勢力眾寡愚謂大計不如迎之權將周瑜曰操雖名漢相其實漢賊將軍神武雄才兼杖父兄遺烈據有江東地方千里兵精足用英豪樂業尚當橫行天下為漢家除殘去穢況操自送死豈可迎之耶請為將軍籌之使北土已安操無內憂能曠日持久來爭疆場又能與我校勝負於舡楫可也今北土既未安而加以馬超韓遂在關西為操後患且捨鞍馬杖舟楫與吳越爭衡本非中國所長又今盛寒馬無藁草驅中國士眾遠涉江湖不曾習水土必生疾病此數四者用兵之患也而操皆冒行之瑜得請精兵三萬人徑進夏口保為將軍破之權曰老賊欲廢漢自立久矣但忌二袁呂布劉表與孤耳今諸英雄已滅唯孤尚存孤與老賊勢不兩立君言當擊甚與孤合權拔刀斫前奏案曰諸將吏敢復言迎曹操者與此案同果有赤壁之捷焉又曰蜀大將諸葛亮悉眾十萬由斜谷出始平據武功五丈原魏大將司馬宣王帥師拒之與亮對於渭南亮分兵屯田為久駐之本耕者雜於渭濱而百姓安堵軍無私焉屢使交書復致巾幗婦人之飾以怒宣王王亦屢表請戰魏使衛尉辛毗持節勒懿及軍吏以下不許出戰姜維謂亮曰辛毗杖節而到賊不復出矣亮曰彼無戰心所以固請者爾惑於眾耳將在軍君命有所不受茍能制吾豈千里請戰耶宣王使二千餘人就軍營東西角大聲稱萬歲亮使問之荅曰吳朝有使至請降亮謂曰計吳朝必無降法卿是六十老翁何煩詭誑如此懿與亮相持百餘日亮卒於軍中及軍退懿追焉亮長史楊儀結陣反旗鳴鼓若將向懿者懿遽退不敢逼經二日乃行其營壘曰天下奇才也懿乃追之儀多布鐵蒺藜懿使軍士二千人著軟材平底木履前行蒺藜悉著履然馬步徑進追至赤岸方知審問百姓為之諺曰死諸葛走生仲達懿笑曰吾便料生不便料死故也孔明料吳下降明矣司馬不料亮死暗也吳志曰魏使大司馬曹仁步騎數萬向濡須為欲東攻羨溪朱桓分兵赴羨溪仁軍進拒濡須桓聞追羨溪兵未到而仁奄至諸將各懼桓喻之曰凡兩軍交對勝負在將不在眾寡兵法所以稱客倍而主人半者謂俱在平原無城池之守又謂士眾勇怯齊等故耳今仁既非智勇又久涉人馬罷困桓與諸軍共據高城南臨大江北陪山陵以逸待勞以主制客此百戰百勝之勢雖曹丕自來尚不足憂況仁等耶桓因偃旗鼓外示虛弱以誘仁果遣其子太攻濡須分遣將軍常雕王雙等乘油舡襲中州桓自拒太太燒營退梟雕首生虜雙送武昌臨陣及溺死者千餘人十六國春秋曰前趙劉曜敗石勒將石季龍于高候今絳州聞喜縣界也遂圍洛陽勒將親救程遐等固諫曰劉曜乘勝兵盛難與爭鋒金墉糧豐攻之未可卒拔曜軍千里勢不支久不可親動動無萬全大業去矣勒大怒按劍叱遐等出召徐光而謂之曰劉曜乘高堆之勢團守洛陽庸人之情皆謂其鋒不可當也然曜帶甲十萬攻一城而百日不剋師老卒殆以我初銳擊之可一戰而擒若洛陽不守曜必送死冀州自河以北席卷北向吾事去矣程遐等不欲吾親行卿以為何如光對曰劉曜乘高堆之勢不能進臨襄國更攻金墉此其無能為也懸軍三時無攻戰之利若鸞旗親駕必覩旌奔敗定天下之計在今一舉勒笑曰光之言是也使內外戒嚴有諫者斬命石堪石聰桃豹等各統見眾會滎陽使石季龍進據石門以左衛石邃都督中軍事勒統步騎四萬赴金墉勒謂徐光曜盛兵城皋間上計也阻洛水其次也坐守洛陽者成擒也勒諸軍至城皋勒見曜無守軍大悅乃卷甲銜枚詭道兼路出于鞏訾之間知曜陳其軍十餘萬人于城西彌悅勒入自宣門昇故太極前殿季龍步卒三萬自城北而西攻其軍石堪石聰等各以精兵騎八千城西而北擊其前鋒大戰於西陽門勒躬貫甲冑出自閶闔夾擊之曜軍大潰於陣擒曜以徇于軍也, SBCK: ''}
