  - {type: variant, offset: 4700, length: 2, content: 可一, WYG: 其所處者多平利也衆樹動者來也斬拔樹木除道進來故動衆草多障者疑也結草為陣欲使我度稠草中多障蔽者敵必逃去恐追及多作障蔽使人疑有伏也鳥起者伏也下有伏兵住藏觸鳥而驚起獸駭者覆也敵廣張陣兾來覆我故獸驚駭也塵高而鋭者車來也車馬行疾速塵上衝故高也卑而廣者徒來也散而條達者薪採來也塵散衍而條達各行所來也少往來者營軍者也少塵少也辭卑而益備者進也其人來使辭卑使必進來間視之敵増備也辭强而進驅者退也詭詐也來驅馳无所畏是欲退輕車先出居其側者陣也陣兵欲戰也輕車馳車在陣側無約而請和者謀也未有要約而使來請和者有間謀也奔走而陳兵者期也自與偏將期也半進半退者誘也倚仗而立者饑也倚仗予}
