  - {type: variant, offset: 1424, length: 236, content: 從之三國奔三國許蔡頓也楚師大奔也又曰晉侯將伐虢大夫士蒍曰不可虢公驕若驟得勝於我棄其民棄民不養之無眾而後伐之欲禦我誰與夫禮樂慈愛戰所蓄也夫民讓事樂和愛親哀喪而後可使也上之吏民以義讓哀樂為本言不可以力強虢弗蓄也亟戰將飢言虢不蓄義讓而力戰也後終為晉所滅又曰秦伯伐晉晉將趙盾禦之上軍佐臾駢曰秦不能久請深壘固軍以待之秦人欲戰秦伯謂士會曰若何而戰晉士會棄秦對曰趙氏新出其屬曰臾駢必實為此謀將以老我師也臾駢趙盾屬大夫新出佐上軍趙有側室曰穿晉君之壻也側室枝子有寵而弱不在軍事弱年少又未嘗涉, SBCK: 進}
