  - {type: variant, offset: 3279, length: 6, content: 黃巾眾百餘萬, WYG: 民豆盧狼害都督大野樹兒等據州城反州}
  - {type: variant, offset: 3286, length: 0, content: '', WYG: 李賢乃招集豪傑謀曰賊}
  - {type: variant, offset: 3287, length: 8, content: 兗州界刺史劉岱欲, WYG: 倉卒便誅二將其勢雖盛其志已驕然其政令莫施惟以殘剝為業夫以霸據之賊而馭烏合之衆勢自離解今若從中}
  - {type: page-break, offset: 3287, content: '', id: KR3k0012_WYG_291-3a, image: WYG0895/WYG0895-0543a.png}
  - {type: punctuation, offset: 3290, content: ，, id: KR3k0012_CHANT_291-bkkpn835}
