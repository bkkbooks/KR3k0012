  - {type: variant, offset: 296, length: 772, content: 將能料敵以少合眾以弱擊強兵無選鋒曰北其勢若此必走北之兵也夫料敵制勝計極險易利害遠近上將之道也知此而用戰者必勝不知此而用戰者必敗夫唯無慮而易於敵者必擒於人也已無智慮而外易人者必為人擒故策之而知得失之計策度敵情觀其所施則計數知候之而知動靜之理喜怒動作察其舉止則情理可知也故知動靜權變為勝形之而知死生之地形相敵情觀其所得而知之角之而知不足有餘之處角量也角量彼我軍馬之使則長短可知又曰兵者詭道兵無常形以詭詐為道故校之以五計而索其情一曰度二曰量三曰數四曰稱五曰勝勝敗之數用兵之法當此事稱量敵之情也地生度因地形度形勢度生量量生數知其遠近廣狹知其數量數生稱稱量敵與已稱生勝稱量人之故知其勢勝負所在也故勝兵若以鎰稱銖敗兵若以銖稱鎰輕不能相舉動也勝之戰者人也若決水於千仞之谿者形也仞七尺也其勢疾也左傳曰吳子入越越子以甲楯五千保于會稽請行成伍員曰不可臣聞務德莫如滋去疾莫如盡違天而長讎雖悔之不可矣王不聽退而告人曰二十年之外吳其為沼乎又曰吳師在陳楚大夫皆懼子西曰二三子恤不相睦無患矣昔闔盧食不貳味居不重席勤恤其民而與之勞逸今聞夫差次有臺榭陂池焉宿有妃嬙嬪御焉視民如讎而用之日新夫差先自敗也已安能敗我者也又曰楚子伐鄭晉師救之楚子北師次于郔郔鄭北地郔音延聞晉師濟河楚子欲還伍參言於楚子曰晉之從政者新未能行令其佐先縠剛愎不仁未肯用命其三帥者專行不獲欲專其所行而不得聽而無上眾誰適從此行也晉師必敗楚改乘轅而北之次於菅以待之晉師在敖鄗之間敖五勞反鄗許各反晉魏錡求公族未得欲為公族大夫而怒欲敗晉師請致師不許請使許之使所吏反遂往請戰而還趙旃求卿未得挑戰不許請召盟許之與魏錡皆命而往郄克曰二憾往矣弗備必敗隨會曰若二子怒楚楚人乘我喪師無日矣乘猶登也不如備之楚之無惡除備而盟何損於好若以惡來有備不敗且雖諸侯相見軍衛不徹警也先縠不可不肯設備隨會使鞏朔韓穿帥七覆于敖前帥將也覆為伏兵七處故上, WYG: ''}
