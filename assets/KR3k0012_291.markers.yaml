  - {type: variant, offset: 3081, length: 0, content: '', WYG: 明徹曰兵貴在速而彼結營不進自挫其鋒吾知其不敢戰明矣於是躬擐甲胄疾攻一鼓而尅壽陽又曰西魏遣將于謹討梁元帝於江陵長孫儉問謹曰為蕭繹之計將欲如何謹曰耀兵漢沔席卷度江直據丹陽是其上䇿移郭内居民退保子城峻其陴堞以待援至是其中䇿若難於移動據守羅郭是其下䇿儉曰揣繹定出何䇿謹曰必用其下䇿儉曰彼棄上而用下何也}
