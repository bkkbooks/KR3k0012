  - {type: variant, offset: 484, length: 0, content: '', SBCK: 敵有十五形可擊新集始至行陣未定未食雖已結陣須饋食不順逆風向月建後至敵後來不得山川地勢利奔走行陣失次用力不齊陣布不均不戒我亦弱誘敵之不設備勤勞倍道兼行人馬未息衣甲馳路雖陣不整將離大將巳去獨任小吏素不威服長路趨戰爭利畫暮不息􅀱濟半渡疾擊不暇貪利求勝不暇盡陣險路泥濘阻狹車馬单行左右難救擾亂行列失序進退不齊縱不相戴横不相對或坐或立驚怖卒阨相逢都無備擬鼓譟掩擊三軍震懾不定陣數移動人馬數顧師有十過勇而輕死可暴貪而好利可遺仁而不忍可勞知而心法可窘信而喜信人可誑廉㓗而愛人可侮慢也未有要約而使來請和有間謀也奔走而陣}
