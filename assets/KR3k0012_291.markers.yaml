  - {type: variant, offset: 4676, length: 0, content: '', WYG: 時逢大敵而不可鬭也彼將愚昧而政令不行士馬雖多而衆心不一鋒甲雖廣而兵刄不堅居地無固而粮運不繼卒無决戰之志傍無軍馬之援此可襲而取之抑又聞之統戎行師攻城野戰當須料敵}
