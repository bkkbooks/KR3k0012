  - {type: variant, offset: 1135, length: 1942, content: 子光曰諸侯從於楚者眾而皆小國也畏楚而不獲己是以來吾聞之作事威剋其愛雖小必濟剋勝也軍事尚威胡沈之君幼而狂性無常也陳大夫齧壯而頑頓與許蔡疾楚政大將死其師熸薳越為帥帥賤多寵政令不壹越非正卿也軍多寵人政令不壹於越也七國同役而不同心七國楚頓胡沈蔡陳許也帥賤而不能整無大威命楚可敗也先分師以犯胡沈與陳必先奔諸侯之師乃搖心矣諸侯乖亂楚必大奔請先者去備薄威示之以不整以誘之後者敦陳整旅敦厚吳子從之戰于雞父音甫吳子以罪人三千先犯胡沈與陳囚徒不習戰以示不整也三國爭之吳為三軍以擊之其後中軍從王光帥右軍掩餘帥左軍吳之罪人或奔或止三國亂吳師擊之敗獲胡沈之君及陳大夫舍胡沈之囚使奔許與蔡頓曰吾君死矣師譟而從之三國奔三國許蔡頓也楚師大奔也又曰晉侯將伐虢大夫士蒍曰不可虢公驕若驟得勝於我棄其民棄民不養之無眾而後伐之欲禦我誰與夫禮樂慈愛戰所蓄也夫民讓事樂和愛親哀喪而後可使也上之吏民以義讓哀樂為本言不可以力強虢弗蓄也亟戰將飢言虢不蓄義讓而力戰也後終為晉所滅又曰秦伯伐晉晉將趙盾禦之上軍佐臾駢曰秦不能久請深壘固軍以待之秦人欲戰秦伯謂士會曰若何而戰晉士會棄秦對曰趙氏新出其屬曰臾駢必實為此謀將以老我師也臾駢趙盾屬大夫新出佐上軍趙有側室曰穿晉君之壻也側室枝子有寵而弱不在軍事弱年少又未嘗涉知軍之事好勇而狂且惡臾駢之佐上軍也若使輕者隸焉其可也隸暫往而追退秦軍掩晉上軍趙穿追之不及上軍不動趙獨追之返怒曰裹糧坐甲固敵是求敵至不擊將何俟軍吏曰將有待也待可擊之穿曰我不知謀將獨出乃以其屬出趙盾曰秦獲穿也獲一卿矣晉自有數位從卿者秦以勝歸我何以報乃皆出戰交綏而退司馬法曰逐奔不遠從綏不及逐奔不遠則難誘從綏不及則難陷然則古名退軍為綏秦晉亦未能堅戰短兵未致爭而爾退故曰交綏也又曰晉師伐楚四月甲午晦楚晨壓晉軍而陣晉大夫郄至曰楚有六間古莧切其二卿相惡子重子反王卒以舊罷老不代鄭陣而不整不整列蠻軍而不陣蠻夷從楚者不結陣陣不違晦晦月終陰之盡也故兵家以為忌在陣而囂囂譁喧也合而加囂陣合宜靖而益其聲各顧其後莫有鬭心舊不必良以犯天忌我必克之終敗楚于𨻳陵史記曰龐涓追孫臏臏量其行暮當至馬陵道狹而旁多阻險可伏兵乃大斫樹白而書之曰龐涓死此下於是令齊軍善射者萬弩夾道而伏期曰見火起而俱發龐涓夜至斫樹下見白書乃鑽火燭之讀書未畢齊軍萬弩俱發魏軍大亂龐涓自知智窮兵敗乃自刎曰遂成豎子之名又曰漢王在漢中拜韓信為大將信因問王曰今東嚮爭權天下豈非項王耶漢王曰然曰大王自料勇悍仁彊孰與項王漢王默然良久曰不如也信再拜賀曰惟信亦為大王不如也然臣嘗事之請言項王之為人也項王喑噁叱咤千人皆廢喑音陰噁烏路切叱尺栗切咤陟訝切然不能任屬賢將此特匹夫之勇耳項王見人恭敬慈愛言語姁姁人有疾病涕泣分食飲至使人有功當封爵者刻印刓刓五元切忍不能與此所謂婦人之仁也項王雖霸天下而臣諸侯不居關中而都彭城背義帝之約而以親愛王諸侯不平諸侯之見項王遷逐義帝置江南亦皆歸逐其主而自王善地項王所過無不殘滅者天下多怨百姓不親附特劫於威彊耳名雖為霸實失天下心故曰其彊易弱今大王誠能返其道任天下武勇何所不誅以天下城邑封功臣何所不服以義兵從思東歸之士何所不剋且三秦王為秦將將秦子弟數歲矣所殺亡不可勝計又欺其眾降諸侯至新安項王詐坑秦降卒二十餘萬唯獨邯欣翳得脫章邯司馬欣董翳秦父兄怨此三人痛入骨髓今楚彊以威王此三人秦民莫愛也大王之入武關秋毫無所害除秦苛法與秦民約法三章耳秦民無不欲得大王王秦者於諸侯之約大王當王關中關中人咸知大王失職入漢中秦人無不恨者今大王舉而東三秦可傳檄而定也於是漢王大喜自以為得信晚遂聽信計定秦滅項又曰項籍圍漢王於滎陽城久之漢王患之請割滎陽以西以和項王不聽漢王謂陳平曰天下紛紛何時定乎陳平曰然項王為人恭敬愛人士之廉節好禮者多歸之至於行賞功爵邑重之言愛惜之士亦以此不附今大王慢而少禮士廉節者不來然大王能饒人以爵邑士之頑鈍嗜利無恥者亦多歸漢王誠各去其兩短襲其兩長天下指麾可定矣又曰漢王與項籍約中分天下漢王欲西歸張良陳平說曰漢有天下太半而諸侯皆附之楚兵疲食盡此天亡之時也不因其飢而遂取之今釋不取所謂養虎自遺患也從之終滅羽漢書曰陳王拜項梁為楚上柱國梁自號武信君乃使宋義於齊道遇齊使者高陵君顯張晏曰顯名高陵縣名也曰公將見武信君乎曰然義曰臣論武信君軍必敗公徐行則免疾行及禍章邯夜銜枚擊楚大破之定陶梁死宋義所遇齊使者高陵君顯見楚懷王曰宋義論武信君必敗數日果破未戰先見敗徵此可謂知兵矣召宋義與計事而悅之因以為上將又曰西域都護為烏孫兵所圍上召陳湯問之湯曰烏孫瓦合不能久攻詘指計其日不出五日當有吉語聞果四日軍書言已解又曰黥布反帝召薛公問對曰使布出於上計東取吳西取楚并齊取魯傳檄燕趙固守其所山東非漢之有也出中計東取吳西取楚并韓取魏據敖倉之粟塞成皋之口勝敗之數未可知也出下計東取吳西取下蔡歸重於越身歸長沙陛下高枕而臥漢無事矣上曰是, WYG: ''}
