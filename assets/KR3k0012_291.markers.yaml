  - {type: variant, offset: 7, length: 0, content: '', SBCK: 下宋書曰晉義熈五年二月僞燕主慕容超大掠淮北三月帝抗表北伐以丹陽尹孟昶􅁥中軍留府事乃浮淮入泗五月至下邳留舩歩軍進琅瑘所過築城留守超大將公孫五樓請断大峴堅壁清野以待超不從􅀄謀是役議者以爲賊􅀂嚴守大峴軍無所資何能自返帝曰不然鮮卑性貪略不及逺旣幸其勝且愛其榖必將引我且亦輕戰師一入峴吾何患焉及入峴帝舉手指天曰事濟矣衆問其故帝曰師旣過險士有必死之志餘糧栖畒軍無匱乏之憂勝可必矣通典曰陳將呉明徹進逼壽陽北齊將王琳拒守又遣大將皮景和率兵數十萬來援去壽春三十里頓軍不進諸將咸曰堅城未抜大援在近不審公計將安出明徹曰兵貴在速而彼結營不進自挫其鋒吾知其不敢戰明矣於是躬擐甲胄疾攻一鼓而尅壽陽又曰西魏遣將于謹討梁元帝於江陵長孫儉問謹曰爲蕭繹之計將欲如何謹曰耀兵漢􅃆席卷度江直據丹陽是其}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_SBCK_291-1b}
  - {type: variant, offset: 7, length: 1, content: 上, WYG: 下料敵下宋書曰晉義熈五年二月偽燕王慕容超大掠淮北三月帝抗表北伐以丹陽尹孟昶監中軍留府事乃浮淮入泗五月至下邳留船步軍進瑯琊所過築城留守超大將軍公}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_WYG_291-1b, image: WYG0895/WYG0895-0542b.png}
  - {type: variant, offset: 7, length: 0, content: '', krp: 下宋書曰晉義熈五年二月僞燕主慕容超大掠淮北三月帝抗表北伐以丹陽尹孟昶監中軍留府事乃浮淮入泗五月至下邳留舩歩軍進琅瑘所過築城留守超大將公孫五樓請断大峴堅壁清野以待超不從𥘉謀是役議者以爲賊若嚴守大峴軍無所資何能自返帝曰不然鮮卑性貪略不及逺旣幸其勝且愛其榖必將引我且亦輕戰師一入峴吾何患焉及入峴帝舉手指天曰事濟矣衆問其故帝曰師旣過險士有必死之志餘糧栖畒軍無匱乏之憂勝可必矣通典曰陳將呉明徹進逼壽陽北齊將王琳拒守又遣大將皮景和率兵數十萬來援去壽春三十里頓軍不進諸將咸曰堅城未抜大援在近不審公計將安出明徹曰兵貴在速而彼結營不進自挫其鋒吾知其不敢戰明矣於是躬擐甲胄疾攻一鼓而尅壽陽又曰西魏遣將于謹討梁元帝於江陵長孫儉問謹曰爲蕭繹之計將欲如何謹曰耀兵漢沔席卷度江直據丹陽是其}
