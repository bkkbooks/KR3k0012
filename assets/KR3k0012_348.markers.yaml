  - {type: variant, offset: 4716, length: 0, content: '', SBCK: 弓弓無法准故任巧由意弩有法准故易有善抱朴子曰秋以弓弩在前太公六韜曰䧟堅陣敗強敵以大黃叅連弩大扶月車三十六乗才士強弩矛㦸爲翼太公兵法曰神后加四仲者以爲明堂宫時天一出遊八極之外行窈􅄀之中日照其前月照其後當此之時天一自持玉弩執法承相刻不道者崔寔政論曰永平建􅀄之際去戰未乆官兵勁利有蔡太僕之弩擅名天下風俗通曰汲令應郴一作余祖父郴夏至日請主簿杜宣賜酒時北壁上懸赤弩照於杯中見其形如虵宣惡之然不敢不飲因得胷腹病攻治不差郴後知之過宣家問疾之由以爲虵入腹中郴遶㕔事思惟良乆頋懸弩曰此是乎乃扶宣來於故處設酒杯中致復有虵因謂宣曰北壁上弩影耳非有他怪宣意解病即瘳又曰臧文仲家欲炊而失釡及弓弩自行十洲記曰續弦膠或各連金􅅺此膠能属連弓弩斷絃連刀劒斷折之金膠連使人挽製他處即斷此終不復脫天漢二年帝事北海祠􅁪山西國王使至獻膠四兩吉光毛裘武帝受以付庫不知膠裘二物之妙}
