  - {type: variant, offset: 2762, length: 0, content: '', SBCK: 李希烈旣䧟汴州乗勝東侵連䧟陳留雍丘頓軍寜陵期下宋州會食浙西節度韓滉命王拪矅將強弩數千夜入寧陵希烈不之知晨朝弩矢及希烈坐悵希烈驚曰此江淮弩士今入矣遂不敢東希烈夜敗晉諸公讃曰都官從事程偉案􅃺羊琇音酉所犯狼籍琇即遣家人持銅弩牙首入重法時人皆謂琇有權智丗祖詔免琇官英雄記曰王匡字公節}
  - {type: variant, offset: 2762, length: 0, content: '', WYG: 李希烈既䧟汴州乗勝東侵連䧟陳留㕍丘頓軍寜陵期下宋州㑹食浙西節度韓滉命王栖曜將弩數千夜入陵希烈不之知晨朝弩矢及希烈坐帳希烈驚曰此江淮弩士今入矣遂不敢東希烈夜敗晉諸公讃曰都官從事程偉案狀羊琇音酉所犯狼籍琇即遣家人持銅弩牙首入重法時人皆謂琇有權智世祖詔遷琇官英雄記曰王匡字公節}
