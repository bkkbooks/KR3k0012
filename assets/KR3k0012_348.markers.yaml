  - {type: variant, offset: 3694, length: 182, content: 烏滸人土有竹皮厚寸餘破以作弓長四尺名曰弧弓廣志曰緣沉古弓名愽物志曰徐偃王既治其國仁義著聞欲舟行上國乃通溝陳蔡之間得朱弓矢以己得天瑞遂因名為號自稱徐偃王列女傳曰晉平公使工人為弓三年乃成射不穿一扎公怒將殺工其妻繁人之女也見公曰妾之夫造此弓亦勞矣幹生太山之阿一日三覩陰三覩陽傅以燕牛之角纏以荊麋之䈥糊以河魚之膠此四者天下選也而不穿一孔是君不能射也而反欲殺妾之夫不亦謬乎妾, SBCK: 臣}
