  - {type: variant, offset: 1682, length: 257, content: 王熊繹僻在荊山唯是桃弧棘矢以供禦王事穀梁曰八年盜竊大弓大弓者武王之戎弓也周公受賜藏之魯崔贛易林曰桃弓葦戟除殘去惡郭璞毛詩拾遺曰象弭魚服毛云弭弓反未彆者以象骨為上蓋俗說文誤也左傳曰左執鞭弭弭者弓之別名謂以象牙為弓今西方有以犀角及鹿角為弓者春秋佐助期曰天弓主司弓弩之張神名推亡史記曰上迎寶鼎於中山有路弓乘矢集獲壇下又曰黃帝騎龍上天小臣不得上悉持龍髯髯拔墮墮黃帝之弓百姓望帝抱其弓而號後世因名其弓曰烏號又曰漢高祖擒韓信信曰高鳥盡良弓藏敵國滅謀臣亡天下已定我固當烹又曰子貢說越王以兵從吳伐齊越王乃使以秦屈盧之弓步光之劍以賀, SBCK: 驅}
