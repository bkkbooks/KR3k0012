  - {type: variant, offset: 4241, length: 298, content: 望之三年之後如輪覩物皆丘山也乃以燕角之弧朔蓬之幹射之貫虱之心而懸不絕孟子曰不仁不智無禮無義人役也人役而恥為役猶弓人而恥為弓孔藂子曰楚王張繁弱之弓載忘歸之矢射蛟兕於雲夢胡非子曰一人曰吾弓良無所用矢一人曰吾矢善無所用弓羿聞之曰非弓何以往矢非矢何以中的令合弓矢而教之射孫卿子曰繁弱鉅黍古之良弓也廣雅又云又曰天子雕弓諸侯彤弓大夫黑弓禮也魯連子曰楚王成章華臺酌諸侯酒魯君先至楚王悅之與大曲之弓闕子曰宋景公謂弓人曰為弓亦遟矣對曰臣不得見公矣公曰何也臣之精盡於弓矣獻弓而歸三日而死公張弓登虎圈之臺東面而射矢踰西霜之山集彭城之東其餘力逸勁飲羽於石梁夫盡精於一弓而身為夭死况治天下奈何其獨也尸子曰鴻鶴在上扞弓鞹彏同, WYG: 強}
