  - {type: variant, offset: 3263, length: 385, content: 外劉向說苑曰齊攻魯子貢見哀公謂求救於吳公曰奚先君寶之用子貢曰使吾寶而與我師是不可恃也於是以楊幹麻䈥之弓六往江表傳曰高句麗王遣使貢孫權角弓吳時外國傳曰扶南之先女人為主名柳葉有摸趺國人字混慎好事神一心不懈神感至意夜夢人賜神弓一張教載賈人舶入海混慎晨入廟於神樹下得弓便載大船入海神廻風令至扶南柳葉欲刦取之混慎舉神弓而射焉貫船通度柳葉懼伏混慎因至扶南鄴中記曰石虎女騎皆手持雌黃宛轉角弓遁甲開山圖曰河東有獨頭山多青檀可以為良弓括地圖曰神弓在南山石泥渚中三禮圖曰彤弓天子所用玈弓卿已下所用也崔豹輿服注曰兩漢京兆河南尹及執金吾司隸校尉皆使人導引傳呼行者止坐者起四人持角弓走者射之有乘高闚者亦射之晉魏設弓而不用焉古史考曰烏號柘樹枝長而烏集將飛枝彈烏烏乃號呼以柘為弓因名曰烏號風俗通曰烏號弓者柘桑之枝枝條暢茂烏登其上垂下著地烏適飛去從後撥殺取以為弓因名烏號耳又曰白鷴古弓名出邊崖類聚沈懷遠, SBCK: 乎}
