  - {type: variant, offset: 2763, length: 1, content: 宗, WYG: 山人以任俠聞辟大將軍何進府使匡於徐州發強弩五百西詣京師㑹進敗匡還鄉又曰袁紹擊公孫瓉先令麴義領精兵八百強弩千張以為前登又曰袁尚使審配守鄴城曹操進軍攻鄴生獲配}
