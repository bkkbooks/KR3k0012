  - {type: variant, offset: 4756, length: 250, content: 竟多羿古諸侯有窮之君也逢蒙羿弟子皆攻射而百發百中故曰之巧要取竟逐也何則以所持之小也又曰淇衛箘路箘箭竹也出於淇地衛箭羽也飾以銀雖有薄縞然獨猶不能穿也若假之䈥角之力弓弩之勢則貫兕甲而經於革楯矣又曰曲張弓名也一名彷徨弓又曰宛轉弓今之弭弓是也呂氏春秋曰齊宣王好射說人之謂己能用強弓也其嘗所用弓不過三石以示左右左右皆試引之中間而止至於一半而止皆曰此不下九石非王孰能用是宣王所用不過三石而終身自以為用九石豈不悲哉非直士其孰能不阿主故亂國之主患存乎用三石為九石又曰萬人操弓共射一招招無不中招謂的也杜夷幽求曰弓折由射, SBCK: 危極武}
