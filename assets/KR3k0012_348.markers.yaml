  - {type: variant, offset: 465, length: 1, content: 和, WYG: 若虞機張往省括于度則釋尚書帝命驗曰王弩發驚天下秦有枉矢西流枉矢即弩星也兵趙主天下見}
  - {type: variant, offset: 465, length: 1, content: 和, krp: 若虞機張徃省括于度則釋尚書帝命驗曰玉弩發驚天下秦有徃矢西流抂矢即弩星也兵精主天下見}
  - {type: variant, offset: 467, length: 8, content: 弓在東房孔安國注, SBCK: 而驚西流􅁗滅也賤􅀋出髙將下賊􅀋謂秦始皇也吕不韋之妻任身而􅁗襄王納之生始皇髙謂丞相趙髙也始皇出趙髙下言天生之也賤或爲賊史記}
