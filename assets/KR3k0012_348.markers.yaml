  - {type: variant, offset: 2426, length: 333, content: 一張沈約宋書曰蕭思話為梁州太祖賜以弓琴手勑曰丈人頃何所作事務之暇故以琴書為娛耳并往桑弓一張材理乃快先所常用既久廢射又多病略當不能制之便成老公令人歎息良材美器宜在盡用之地丈人真無所與讓也梁書曰羊侃膂力絕人所用弓至二十石馬上用六石弓三國典略曰齊綦連猛有勇力梁使來聘有武藝人求欲相角猛帶兩鞬左右馳射併取四弓疊而挽之梁人嗟服後魏書曰傅融性豪爽有三子靈慶靈根靈越並有才力融以此自負謂足為一時之雄嘗謂人曰吾昨夜夢有一駿馬無堪乘者人曰何由得人乘之有一人曰唯有傅靈慶堪乘此馬又有弓一張亦無人堪引有一人曰唯有傅靈根可以彎此弓又有數紙文書人皆讀不能解此文有一人曰唯有傅靈越可以解之融意謂其三子文武材幹堪以駕馭當世常密謂鄉人曰汝聞之不鬲䖝之子有三靈此圖讖之文也好事者然之故豪勇之士多相歸附, SBCK: ''}
