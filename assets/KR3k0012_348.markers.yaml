  - {type: variant, offset: 89, length: 219, content: 無緣可以解驂觚也弲許緣切角弓也弧木弓也一曰往體寡來體多曰孤弨尺招切又勑朝切弓反也𢑆音權弓曲也𢐲音遙弓便利也張施弓絃也彏烏郭切弓急張也弸拍生切又鄙矜切弓強貌也彎持弓關矢也㢨一弧切滿弓有所向也弘弓聲也又曰韣音獨韔音暢弓衣也又曰角𧤗音端獸狀似豕角善為弓出胡尸國一曰出休尸國山海經曰少皞生般始為弓矢郭璞注曰般音班世本云牟夷作矢揮作弓弓矢一器作者兩人於義有疑此言般作之是也帝後賜羿彤弓素矰以扶下國以射除患扶助下國也世本曰揮作弓宋衷注曰揮黃帝臣也孫卿, WYG: 谿}
