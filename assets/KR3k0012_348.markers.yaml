  - {type: variant, offset: 5208, length: 200, content: 進繁氏久彌工已悲軒主跡復挹楚王風楊師道奉和詠弓詩曰霜重麟膠勁風高月影圓烏飛隨帝輦鴈落逐鳴絃齊王融謝武陵王賜弓啟曰殿下摛藻蕙樓暢藝蘭苑敷積玉於風筵疊連珠於月的兔園掩秀鄴水慚奇融揖讓未工濫陪升飲之賞操弧反正謬奉招賢之錫文韜鏤景逸幹梢雲玩溢百齡佩流千載晉稽合木弓銘曰烏號之撲豐條足理弦弧走栝截飛駭止射隼高墻出必有擬既用禦武亦以招士李尤良弓銘曰弓矢之作爰自曩時鄉射載禮招命在詩妙稱顏高巧發由基不爭之美亦以辦儀, SBCK: 及竄}
