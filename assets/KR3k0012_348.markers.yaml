  - {type: variant, offset: 3678, length: 1, content: 似, SBCK: 生於彈彈生於古之孝子臣聞楚琴氏以弓矢之勢不足以威天下遂乃撗弓着臂施機設郭加之以力郭爲方城守臣子也敖爲人君命所起也關爲守禦撿去止也錡音竒又音蟻爲侍從聽人主也辭爲道路通所使也弓爲將軍王重􅀒也弦爲軍師禦戰士也矢爲飛容主教使也金爲穿敵徃不止也衛爲副使正道里也驃爲都尉執左右也鳥不得飛獸不得走}
