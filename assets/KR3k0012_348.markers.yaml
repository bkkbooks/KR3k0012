  - {type: variant, offset: 2768, length: 1, content: 朕, WYG: 吾近行圍弩何多也配曰猶恨其}
  - {type: variant, offset: 2770, length: 4, content: 好弓矢自, WYG: 日南傳曰南越王尉佗攻安陽安陽王有神人睾音髙通}
