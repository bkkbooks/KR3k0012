  - {type: variant, offset: 4200, length: 181, content: 者舉之列子曰紀昌學射於飛衛飛衛曰爾先學不瞚而後能又使學視小如大紀昌氂懸虱於牖南面而望之三年之後如輪覩物皆丘山也乃以燕角之弧朔蓬之幹射之貫虱之心而懸不絕孟子曰不仁不智無禮無義人役也人役而恥為役猶弓人而恥為弓孔藂子曰楚王張繁弱之弓載忘歸之矢射蛟兕於雲夢胡非子曰一人曰吾弓良無所用矢一人曰吾矢善無所用弓羿聞之曰非弓何以往矢非矢何以中的令合弓矢而教之射孫卿子曰繁弱鉅黍古, SBCK: ''}
