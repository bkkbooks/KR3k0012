  - {type: variant, offset: 2775, length: 0, content: '', WYG: 安陽王治神弩一張一發萬人死三發殺三萬人佗退遣太子始降安陽不知通神人遇無道理通去始有姿容端美安陽王女眉珠恱其貌而通之始與珠入庫盜鋸截神弩亡歸報佗佗出其非意安陽王弩折兵挫浮海奔竄華陽國志曰秦襄王時有一白虎常從郡遊巴蜀傷害千餘人昭王乃重募有}
  - {type: variant, offset: 2776, length: 1, content: 盡, WYG: 殺虎者賞邑萬家閬中夷廖中能作白的之弩乃登樓射殺白虎昭王嘉之以}
  - {type: variant, offset: 2778, length: 1, content: 妙, WYG: 夷不欲封刻石盟要曰秦犯夷輸黄龍一雙夷犯秦輸清酒一鍾夷人安之又曰鄧芝征涪陵見𤣥猿抱子在樹上引弩射之中猿母其子為㧞箭以木葉塞瘡芝乃歎息曰嘻吾違物之性其將死矣投弩水中芝後果死㑹稽典録曰鍾離權謂朱育曰大皇帝以中國多騎欲以當之然吳神鋒弩射三里貫洞三四馬騎敢}
