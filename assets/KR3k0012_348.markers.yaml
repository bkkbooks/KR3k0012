  - {type: variant, offset: 4717, length: 0, content: '', SBCK: 以上貢不竒稽留使未遣之帝幸華林苑射虎而弩絃斷使者從駕因上膠一分使口濡以續絃帝驚乃使武士數人對掣終日不斷膠青色如碧玉吉光毛裘黃色盖神馬之􅀋也裘入水經月不沉入火不焦帝方重之厚賂使者而遣之趙公王琚音居教射經曰弩古有黃連百竹八檐􅀟弓之}
