  - {type: punctuation, offset: 622, content: 「, id: KR3k0012_CHANT_348-bkkpn263}
  - {type: variant, offset: 625, length: 918, content: 弓者張弓尚䈥弛弓尚角弓有往來體皆欲其下曲隤然左手執簫右手承拊簫弭頭也尊卑垂帨帨佩巾也罄折則佩垂授之儀尊卑一也又曰越棘大弓天子之戎器也又曰良弓之子必學為箕又曰武王克商後干戈弓矢包之以虎皮周禮曰司弓矢掌六弓四弩八矢之法辯其名物而掌其守藏與其出入仲春獻弓弩仲秋獻矢箙弓弩成於和矢服成於堅也箙盛矢器也以獸皮為之及其頒之王弓弧弓以授射甲革椹音砧質者夾弓庾弓以授射豻音岸又俄塞切侯鳥獸者唐弓大弓以授學射者及使者勞者王弧夾庾唐大兵者弓異體之名往體寡來體多曰王弧往體多來體寡曰夾庾天子之弓合九而成規諸侯合七而成規大夫合五而成規士合三而成規句者謂之敝弓凡祭祀共射牲之弓矢射牲者示親殺也國語曰郊之事天子必自射其牲澤共射椹質之弓矢鄭司農云澤澤宮也所以習射選士之處也射義曰天子將至必先習射於澤者所以擇士也大射燕射共弓矢如數又曰庭氏掌射國中之妖鳥馬融傳曰國中妖鳥梟雞惡聲之鳥也若不見其鳥獸則以救日之方與救月之矢夜射之獸虎狼㘁鳴也救日食則伐鼓北面射太陰救月蝕則伐鼓南面射太陽以此弓矢射之若其神也則以太陰之弓與扭枉矢射之枉矢名也又曰弓長六尺謂之庇軹五尺謂之庇輪四尺謂之庇軫軹轂木也又曰弓人為弓取六材必以其時六材既聚巧者和之幹也者以為遠也角也者以為疾也筋也者以為深也膠也者以為和也絲也者以為固也漆也者以為受霜露也六材之力相得而足凡取幹之道七柘為上檍音億次之檿桑次之山桑也橘次之木瓜次之荊次之竹為下凡相幹欲赤黑而陽聲赤黑則嚮心陽聲則遠根陽猶清也凡柝幹射遠者用勢射深者用直凡為弓冬析幹而春液角夏治䈥秋合材冬定體為弓長六尺有六寸謂之上制上士服之弓長六尺有三寸謂之中制中士服之弓長六尺謂之下制下士服之人各以其形皃大小用此弓也又曰弓力有三均謂之九和安弓危矢危弓安矢儀禮曰射告賓曰弓矢既具有司請射賓與大夫弓倚于西序矢在弓下左傳曰王賜晉文公彤弓一彤矢百玈弓十玈矢千又曰武王克商作頌曰載櫜弓矢又曰楚子享公于新臺使長鬣者好以大屈宴好之賜也大屈弓名又曰舟堅射陳武子中手舟堅季氏之臣也失弓而罵武子罵也又曰周公相王室以尹天下於周為睦分魯公以大路大旂夏后氏之璜封父之繁弱封父古之諸侯也繁弱大弓名也封之於少昊之墟又曰魯伐齊士皆坐列顏高之弓六鈞皆分取傳而觀之顏高魯人也三十斤為鈞六鈞一百八十斤也故異, SBCK: 榮}
