  - {type: variant, offset: 2780, length: 0, content: '', WYG: 之乎南越志曰龍川有營澗嘗有銅弩牙流出水皆以銀黄雕鏤取之者祀而後}
  - {type: page-break, offset: 2780, content: '', id: KR3k0012_WYG_348-8a, image: WYG0896/WYG0896-0126c.png}
