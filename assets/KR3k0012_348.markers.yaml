  - {type: variant, offset: 3264, length: 921, content: 劉向說苑曰齊攻魯子貢見哀公謂求救於吳公曰奚先君寶之用子貢曰使吾寶而與我師是不可恃也於是以楊幹麻䈥之弓六往江表傳曰高句麗王遣使貢孫權角弓吳時外國傳曰扶南之先女人為主名柳葉有摸趺國人字混慎好事神一心不懈神感至意夜夢人賜神弓一張教載賈人舶入海混慎晨入廟於神樹下得弓便載大船入海神廻風令至扶南柳葉欲刦取之混慎舉神弓而射焉貫船通度柳葉懼伏混慎因至扶南鄴中記曰石虎女騎皆手持雌黃宛轉角弓遁甲開山圖曰河東有獨頭山多青檀可以為良弓括地圖曰神弓在南山石泥渚中三禮圖曰彤弓天子所用玈弓卿已下所用也崔豹輿服注曰兩漢京兆河南尹及執金吾司隸校尉皆使人導引傳呼行者止坐者起四人持角弓走者射之有乘高闚者亦射之晉魏設弓而不用焉古史考曰烏號柘樹枝長而烏集將飛枝彈烏烏乃號呼以柘為弓因名曰烏號風俗通曰烏號弓者柘桑之枝枝條暢茂烏登其上垂下著地烏適飛去從後撥殺取以為弓因名烏號耳又曰白鷴古弓名出邊崖類聚沈懷遠南越志曰宋昌縣有棘竹長十尋俚人取以為弓又曰沙麻竹人削以為弓弓似弩淮南所謂浮子弩也南州異物志曰烏滸人土有竹皮厚寸餘破以作弓長四尺名曰弧弓廣志曰緣沉古弓名愽物志曰徐偃王既治其國仁義著聞欲舟行上國乃通溝陳蔡之間得朱弓矢以己得天瑞遂因名為號自稱徐偃王列女傳曰晉平公使工人為弓三年乃成射不穿一扎公怒將殺工其妻繁人之女也見公曰妾之夫造此弓亦勞矣幹生太山之阿一日三覩陰三覩陽傅以燕牛之角纏以荊麋之䈥糊以河魚之膠此四者天下選也而不穿一孔是君不能射也而反欲殺妾之夫不亦謬乎妾聞射之道左手如拒右手如附枝右手發之左手不知此射之道也公以其言為儀而穿七孔弓工立得出賜金三鎰綦母遽注曰繁人官名孔鎧孔也燕角善楚䈥何膠粘也管公明別傳曰信都令家中婦女盡驚更牙疾病使公明為占之卦成語曰君北室床西頭當有兩死男人一鬼持矛一鬼持弓箭頭在壁中腳在壁外持矛者主刺頭故頭重痛不得舉持弓箭者主射胸腹故心中懸痛不得飲食晝則浮遊夜還病人故驚恐若徙其屍柩便皆丁強於是令歸室中果得兩楸棺中有角弓及數箭物已久遠木消爛徙骸埋之合家皆愈洞林曰曲阿令趙元瞻兒字虎舒從吾學卜自求蓍作卦見吾有盛艾小陵龜欲得之不與語之曰當作卦相為致此物令自來復數日果有一龜入廄虎舒後見吾言偶有一物試可占之若得當再拜輸一好角弓即便作卦曰案卦之是為龜虎舒奉弓起再拜老, WYG: 文}
