  - {type: variant, offset: 756, length: 573, content: 曰長孫儉為荊州揔管嘗指闕奏事時值大雪遂立於雪中待報自旦達暮竟無惰容其奉公勤至皆此類也又曰赫連達遷大將軍夏州揔管三州五防諸軍事達雖非文吏然性質直遵守法度輕於鞭撻而重慎死罪性又廉儉邊境胡民或饋達以羊者達欲招納異類報以繒帛主司請用官物達曰羊入我廚物出官庫是欺上也命取私帛與之識者嘉其仁恕焉北史曰韋孝寬為延州揔管兄敻至州與孝寬相見將別孝寬以所乘馬及轡勒與敻敻以其華飾心不欲之謂孝寬曰昔人不棄遺簪墜履者惡與之同出而不與同歸吾之操行雖不逮前烈然捨舊策新亦非吾志也乃乘舊馬以歸隋書曰元褒為原州揔管有啇人為賊所劫其人疑同宿者而執之褒察其色寬而辭正遂捨其人啇詣闕訟褒受金縱賊上遣使窮治之使者薄責褒曰何故利金而捨盜也褒便即引咎初無異詞使者與褒俱詣京師遂坐免官其盜尋發於他所上謂褒曰公朝廷舊人位望隆重受金捨賊非善事何至自誣也曰臣受委一州不能息盜賊臣之罪一也州民為人所謗不付法司懸即放免臣之罪二也牽率愚臣無顧刑法不持文書約束至令為物所疑臣之罪三也臣有三罪何所逃責臣又不言受賂使者復將有所窮究然則縲絏橫及良善重臣之罪是以自誣上歎異之稱為長者又曰元景山為豪州揔管先是州民王迴洛張季真等聚結亡命每為劫盜前後牧守不能制景山下車遂捕之迴洛季真挺身奔江南擒其黨與數百人皆斬之法令明肅盜賊屏迹稱為大治又曰韋世康嘗因侍宴再拜陳讓曰臣無尺寸之功位亞台鉉今犬馬齒截不益明時恐先朝露無以塞責願, SBCK: ''}
