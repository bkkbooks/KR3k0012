  - {type: variant, offset: 1818, length: 821, content: 諸將以為然安率眾先鋒大破陳師高祖嘉之唐書曰田留安拜魏州揔管劉闥之亂也來攻州城于時山東豪猾多殺長吏以應賊百姓兇人咸懷異志凡諸守皆以心腹自衛多所猜防由是上下情隔怨叛者多留安獨撫結所部示無疑阻凡有白事者無間踈遠皆至臥內謂人曰吾與卿輩同為國守自宜一心無為疑貳也必欲棄同即異背順歸逆亦任卿輩斬吾頭而去矣城中父老相誡勵子弟曰田公以赤心相付何得負之由是人情遂固州人苑竹林者劉闥之黨也初有異圖留安陰知之而不發其事因引置左右委以關鑰竹林感其意遂歸心焉卒收其力用又曰劉世讓拜廣州揔管將之官高祖問以備邊之策世讓荅曰突厥比數南寇者徒以馬邑為其中路耳如臣計者於崞城置一智勇之將多貯金帛有來降者厚賞賜之數出奇兵掠其城下踐其禾稼敗其生業不出歲餘彼當無食馬邑不足圖也高祖曰非公無可任者可馳驛至彼善為經略世讓於是以兵臨馬邑高滿政以其地來降突厥患之遣曹繁陁來詣中國言世讓與可汗通謀將為亂由是得罪籍沒其家及突厥來降言世讓初無逆謀始原其妻子都督護漢書曰宣帝時匈奴日逐王欲降漢使人與鄭吉相聞吉發渠犁龜茲諸國五萬人迎日逐王吉送三千人小王將十三人隨吉至阿曲頗有亡者吉追斬之將詣京漢封日逐王為德歸侯吉既破車師降日逐威震西域遂并護車師以西故號為都護都護之置自吉始焉上嘉其功乃下詔曰都護西域騎都尉鄭吉撫循外蠻宣明威信封吉為安遠侯漢之號令班於西域始自張騫成於鄭吉也又曰叚會宗為人好大節而功名為西域都護與谷永相友善永閔其老復遠出與書戒之曰足下以柔遠之靈德復典都護之重職甚休願吾子因循舊貫無求奇功萬里之外以身為本願詳思愚言又曰元帝時甘延壽為西域都護陳湯為副郅支單于數困辱漢使湯與延壽謀曰郅支所在絕遠無金城強弩之守如發屯田吏士從烏孫直詣其城可以成功延壽欲奏之湯曰國家與公卿議大策非凡所見必不從會延壽久病湯獨矯制發兵延壽聞之欲止焉湯怒按劍叱延壽曰大眾已集豎子欲沮眾耶延壽遂從之部勒行陣益置楊威白虎合騎之校張晏曰西域陣法之名也即日引軍分行遂斬郅支單于頭送京師延壽封茂成侯湯封關內侯功大賞少為石顯匡衡所抑應劭, WYG: ''}
