  - {type: variant, offset: 11, length: 3, content: 杜預為, SBCK: 内史周官􅁗因之掌治京師景帝二年分置左右内史武帝太􅀄元年更名京兆尹張晏曰地髙曰京左傳曰莫之與京十億曰兆尹者正也祑二千石銀印青綬進賢兩梁冠絳朝服佩水蒼玉又曰趙廣漢字子}
  - {type: variant, offset: 11, length: 2, content: 杜預, WYG: 内史周官秦因之掌治京師景帝二年分置左右内史武帝太初元年更名京兆尹張晏曰地髙曰京左𫝊曰莫之與京十億曰兆尹者正也秩二千石銀印青綬進賢兩梁冠綘朝服佩水蒼玉又曰趙廣漢字子都涿郡人也守京兆廣漢}
  - {type: variant, offset: 11, length: 3, content: 杜預為, krp: 内史周官秦因之掌治京師景帝二年分置左右内史武帝太𥘉元年更名京兆尹張晏曰地髙曰京左傳曰莫之與京十億曰兆尹者正也祑二千石銀印青綬進賢兩梁冠絳朝服佩水蒼玉又曰趙廣漢字子}
  - {type: variant, offset: 14, length: 6, content: 都督荊州諸軍, WYG: 人强力天性精於吏職見吏民或夜不寢至旦又善為鈎距以得}
  - {type: variant, offset: 15, length: 5, content: 督荊州諸軍, SBCK: 涿郡人也守京兆尹廣漢爲人強力天性精於吏職見使吏民或夜不寢至旦尤善爲鈎鉅以得}
