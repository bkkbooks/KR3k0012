  - {type: variant, offset: 1653, length: 568, content: 制補授給帳內五百人賜帛五百疋發傳送其家累改封康郡公熙至部大弘恩信其溪洞渠帥更相謂曰前時揔管皆以兵威相脅今者乃以手教相諭我輩其可違乎於是相率歸附先是州縣生梗長吏多不得之官寄政於揔管府熙悉遣之為建城邑開設學校華夷感敬稱為大化又曰李安領行軍揔管率蜀兵順流東下時陳人屯白沙安謂諸將曰水戰非北人所長今陳人依險泊舩必輕我而無備以夜襲之賊可破也諸將以為然安率眾先鋒大破陳師高祖嘉之唐書曰田留安拜魏州揔管劉闥之亂也來攻州城于時山東豪猾多殺長吏以應賊百姓兇人咸懷異志凡諸守皆以心腹自衛多所猜防由是上下情隔怨叛者多留安獨撫結所部示無疑阻凡有白事者無間踈遠皆至臥內謂人曰吾與卿輩同為國守自宜一心無為疑貳也必欲棄同即異背順歸逆亦任卿輩斬吾頭而去矣城中父老相誡勵子弟曰田公以赤心相付何得負之由是人情遂固州人苑竹林者劉闥之黨也初有異圖留安陰知之而不發其事因引置左右委以關鑰竹林感其意遂歸心焉卒收其力用又曰劉世讓拜廣州揔管將之官高祖問以備邊之策世讓荅曰突厥比數南寇者徒以馬邑為其中路耳如臣計者於崞城置一智勇之將多貯金帛有來降者厚賞賜之數出奇兵掠其城下踐其禾稼敗其生業不出歲餘彼當無食馬邑不足圖也高祖曰非公無可任者可馳驛至彼善為經略世讓於是以兵臨馬邑高滿政以其地來降突厥患之遣曹繁陁來詣中國言世讓與可汗通謀將為亂由是得罪籍沒其家及突厥來降言世讓初無逆謀始原其妻子都督護, SBCK: 後}
