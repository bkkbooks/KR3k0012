  - {type: variant, offset: 661, length: 3, content: 宋璟轉, SBCK: 􅀽安爲河南尹政号嚴明然未曽以􅂍罪鞫人常稱曰凡學士者髙則望宰相下則希牧守養人於聖丗曰尹不忍爲也聞之者感激自厲在職十年京師肅然名重於朝廷又曰張酺入爲河南尹竇景家人復擊傷市卒吏捕得之景怒遣緹􅀐侯海等五百人毆傷市承說文曰緹帛丹黄色也漢官儀曰執金吾有緹􅀐酺部吏楊章等窮究正海罪徙朔方景忿怒乃移書辟章等六人爲執金吾吏欲固執之章等惶恐入白酺願自引贓罪以辝景命酺即上言其􅃺竇太后詔報自今執金吾辟吏皆勿遣又曰楊彪遷侍中京兆尹光和中黄門令甫使門生於郡界辜攉官財物七千餘萬華嶠書曰甫使門生翹辜榷解見靈帝紀彪發其姦言之司􅀠校尉陽球因此奏誅甫天下莫不愜心又曰延篤字叔固及邊鳯皆爲京兆尹並有能名語曰前有張趙後有邊延張趙即趙}
