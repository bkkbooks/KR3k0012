  - {type: variant, offset: 739, length: 296, content: 法施關鍵使人推之百姓賴焉揔管後周書曰長孫儉為荊州揔管嘗指闕奏事時值大雪遂立於雪中待報自旦達暮竟無惰容其奉公勤至皆此類也又曰赫連達遷大將軍夏州揔管三州五防諸軍事達雖非文吏然性質直遵守法度輕於鞭撻而重慎死罪性又廉儉邊境胡民或饋達以羊者達欲招納異類報以繒帛主司請用官物達曰羊入我廚物出官庫是欺上也命取私帛與之識者嘉其仁恕焉北史曰韋孝寬為延州揔管兄敻至州與孝寬相見將別孝寬以所乘馬及轡勒與敻敻以其華飾心不欲之謂孝寬曰昔人不棄遺簪墜履者惡與之同出而不與同歸吾之操行雖不逮前烈然捨舊策新亦非吾志也乃乘舊馬以歸隋書曰元褒為原州揔管有啇人為賊所劫其人疑同宿者而執之褒察其色寬而辭正遂捨其人啇詣闕訟褒受金縱賊上, WYG: 景怒}
