  - {type: variant, offset: 2650, length: 0, content: '', SBCK: 増曰太守丗祖中興徙都洛陽改号爲尹尹正也詩云赫赫師尹魏志曰鄭渾字文公爲京兆尹渾以百姓新集爲制移居之法使兼復者與單輕者相伍温信與􅀌老爲比勤稼穡明禁令以發姦者由是民安於農而盗息又曰􅀓嘏字蘭石爲河南尹内掌帝都外統京畿兼主六卿六遂之士其民異方雜居多豪門大族啇賈胡貃天下四㑹利之所聚而姧之所生也前尹司馬舉其綱而太簡次尹劉静綜其綱而太宏後尹李勝毀常法以收一時之聲嘏立司馬之綱統裁劉氏之綱目以經緯之李氏所毀以漸􅀘之郡有七百吏半非舊也河南俗黨五官掾功曹典􅃟職皆授其夲國人無用異􅀖人者嘏各舉其良而用之分官曹之職次考栲之其治以德教爲夲然持法有􅁪而不可犯見理識情獄訟不枉檟楚而得其實不爲小惠有所薦逹及大益於民事皆隱其端迹􅀂不由巳出故當時無赫赫之名使民乆而後安者也又曰司馬芝字子華爲河南尹教群下曰蓋君設教不能使吏必不犯也吏能犯教而不能使君必不聞也夫設教而犯君之劣也犯教而聞吏之禍也君劣於上吏禍於下此政事所以不理也可不勉之哉於是下吏莫不自厲又曰劉馥字子靖出爲河南尹散􅀐常侍應璩以書與子靖曰入作納言出臨京任冨民之術日引月長王隱晉書曰樂廣字彦輔爲河南尹故郡中前多恠後人皆於廊下郵􅀓中治事無敢在㕔事者唯廣處之自􅀂白戸自􅐬二子凱模等懾怖廣使掘牆孔得狸乃絶代者乃相承入止又曰􅁃純字謀甫太}
