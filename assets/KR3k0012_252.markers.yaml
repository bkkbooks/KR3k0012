  - {type: punctuation, offset: 1230, content: 、, id: KR3k0012_CHANT_252-bkkpn312}
  - {type: variant, offset: 1234, length: 425, content: 聚結亡命每為劫盜前後牧守不能制景山下車遂捕之迴洛季真挺身奔江南擒其黨與數百人皆斬之法令明肅盜賊屏迹稱為大治又曰韋世康嘗因侍宴再拜陳讓曰臣無尺寸之功位亞台鉉今犬馬齒截不益明時恐先朝露無以塞責願乞骸骨退避賢能上曰朕夙夜庶幾求賢若渴冀與公共治天下以致太平今之所請深乖本望縱令䈥力衰謝猶屈公臥治一隅於是出拜荊州揔管時天下唯置四大揔管并楊益三州並親王臨統唯荊州委於世康時論以為美世康為政簡靜百姓愛悅合境無訟又曰韋藝遷營州揔管藝容皃瓌偉每夷狄參謁必整儀衛盛服以見之獨坐蒲一塌蕃人畏懼莫敢仰視又曰薛道衡聲名藉甚一時仁壽中楊素專掌朝政道衡既與素善上不欲道衡久知機密因而檢校襄州揔管道衡久蒙驅策一旦違離不勝悲戀兼之哽咽高祖愴然改容曰爾光陰晚暮侍奉誠勞朕欲令爾將攝兼撫氓俗今爾之去朕如斷一臂於是齎物三百叚九鐶金帶并時服一襲馬十疋慰勉遣之又曰樊子蓋轉循州揔管許以便宜從事十八年入朝奏嶺南地圖賜以良馬雜物又曰令孤熙拜桂州揔管十七州諸軍事許以便宜從事刺史已下官得承制補授給帳內, WYG: ''}
