  - {type: variant, offset: 2643, length: 0, content: '', SBCK: 河南尹所治周地也洛陽本成周周之衰微分爲東}
  - {type: variant, offset: 2643, length: 0, content: '', WYG: 執金吾有緹騎酺部吏楊章等窮究正海罪徙朔方景忿怨乃移書辟章等六人為執金吾吏欲思報之章等惶恐入白酺願引賍罪以辭景命酺即上言其狀竇太后詔報自今執金吾辟吏皆勿遣又曰楊彪遷侍中京兆尹光和中黄門令甫使門生於郡界辜𣙜官財物七十餘萬華嶠書曰甫使門生翹辜𣙜觧見靈帝紀彪發其姦言之司隸校尉陽球因此奏誅甫天下莫不愜心又曰延篤字叔堅及邊鳯皆為京兆尹並有能名語曰前有張趙後有邊延張趙即廣漢及張敞也又曰梁冀為河南尹居職暴恣多非法父商所親客洛陽令吕放頗與商言及冀之短商以讓冀冀即遣人於道刺殺放而恐商知之乃推疑放怨仇請以放弟禹為洛陽令安慰放家欲以滅口使捕之盡滅其宗親賔客百餘人㵼又曰王梁為河南尹穿渠引糓水注洛陽城下東寫鞏川及渠成而水不流七年有司劾奏之梁慙懼上書乞骸骨謝承後漢書曰周暢字伯時性仁慈為河南尹永初二年夏旱乆禱無應暢自収葬洛陽城旁客死骸骨凡萬餘人應時㴻雨嵗乃豐稔袁崧後漢書曰延篤字叔堅南陽人也為京兆尹正身率下民不忍欺應邵漢官儀曰河南尹所治周地也洛陽本成周周之衰㣲分為東}
