  - {type: variant, offset: 2774, length: 245, content: 徒雖以三公假節領州郡然無都督之號也三國時亦有都護中都護左右都護將軍兼督諸軍猶是舊制意也黃初三年上軍大將曹真始都督中外諸軍事揔諸軍高貴卿公正元二年晉文帝都督中外諸軍事尋加大都督之號太始中置小都督江左亦時有也吳朝鎮將揔兵亦曰都督大軍出為二部則曰左右都督分武昌為兩部亦曰左右部大督其揔一者則曰大都督又繞帳羽林無難之屬隨事有督無常號也至諸葛恪以下輔政乃都督中外諸軍事蜀關羽在江陵亦督軍州至張飛姜維亦為中外都督如吳魏也晉氏以來宰輔任重者為中外大都督方伯望隆者亦如大都督之號凡諸都督雖軍號有輕重無假節也, SBCK: 獨入焉}
