  - {type: variant, offset: 21, length: 5, content: 南土美而謠, SBCK: 情蘇峻曰鈎得其情吏不得去鉅鈎者設如欲知馬價則先問狗次問羊又問牛然後及馬參伍其價以􅀋相凖則知馬之賤貴不失實矣銖兩之姧皆知之長安少年數人㑹窮里空㑹謀共刼人坐語未訖廣漢使捕治具服廉明威制豪強百姓追思歌之至今又曰元始五年有一男子乗黄犢車建黄旐衣黄䄡䄖逕來詣北闕自謂衛太子京兆雋不疑後到叱從吏使收縛}
