  - {type: variant, offset: 2331, length: 201, content: 詔曰都護西域騎都尉鄭吉撫循外蠻宣明威信封吉為安遠侯漢之號令班於西域始自張騫成於鄭吉也又曰叚會宗為人好大節而功名為西域都護與谷永相友善永閔其老復遠出與書戒之曰足下以柔遠之靈德復典都護之重職甚休願吾子因循舊貫無求奇功萬里之外以身為本願詳思愚言又曰元帝時甘延壽為西域都護陳湯為副郅支單于數困辱漢使湯與延壽謀曰郅支所在絕遠無金城強弩之守如發屯田吏士從烏孫直詣其城可以成功延壽欲奏之湯曰國家與公卿議大策非凡所見必, SBCK: 民}
