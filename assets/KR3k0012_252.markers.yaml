  - {type: variant, offset: 3027, length: 0, content: '', SBCK: 伐以太尉元丕廣陵王羽留守京師並加持節又曰荀頽大駕行幸三州頽留守京師沙門法秀謀反頽率禁兵収掩畢􅀗内外晏然駕還飲至文明太后曰當􅈛之日卿􅀂持疑不即収捕處分失所則事成不測矣今京畿不擾宗廟社稷安者實卿之功也隋書曰楊瓉平齊之役諸王咸從留瓉居守帝謂之曰六府事殷一以相付重朕將遂事東方無西頋之憂矣其見親信如此唐書曰儀鳯元年司農卿韋弘機爲東}
