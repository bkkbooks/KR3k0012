  - {type: variant, offset: 3022, length: 0, content: '', krp: 開元𥘉改雍州長史爲京兆尹揔理衆務又曰鄭珣瑜出爲河南尹珣瑜旣入境官吏以逼降延曰珣瑜到即後於事乃送所獻}
  - {type: variant, offset: 3023, length: 0, content: '', SBCK: 賫印於路以例告珣瑜曰未上官不可遽有進獻及旣上即過時矣遂不獻又曰郭英乂時嚴武卒元載薦英乂代之遂兼成都尹充劒南節度使英乂到成都肆行不䡄無所忌憚玄宗舊宫置爲道士觀内有玄宗鑄金真容及乗輿侍衛圖􅀞先是節度使毎至皆先拜而後視事英乂以觀地有形勝乃入居之其真容及圖􅀞悉遭毀壞見者無不憤怒又曰英乂爲成都尹頗恣狂蕩聚女人􅀐鑪擊毬製鈿驢鞍及諸服用皆侈靡裝飾日費數萬以爲􅀏樂未甞問百姓間事人頗㤪之又曰許孟容爲京兆尹神䇿軍吏李昱假貸長安冨人錢八千貫满三歳不償孟容遣吏收捕械繫尅日命還之曰不及其當死自興元巳後禁軍有功又中貴之尤有渥恩者方得護軍故軍士日益横府縣不能制孟容剛正不懼以法繩之一軍盡驚􅁈訴於上立命中使宣旨令送夲軍孟容繫之不遣中使再至乃執奏曰臣誠知不奉詔當誅然臣職司輦轂合爲陛下彈抑豪強錢未盡輸昱不可得上以其守正許之自此豪右歛迹威望大震又曰劉栖楚爲京兆尹摧抑豪右不頋患難事無大小必設鈎鉅故時人重之或稱其機變徃徃有􅀋於西漢時趙廣漢者又曰李傑爲河南尹傑旣勤於聽理毎有訴列雖衢路當食無廢處斷由是官無留事人吏愛之先是河汴之間有梁公堰年乆堰破江淮􅈇運不通傑奏調發汴鄭丁夫以濬之省功速就公私深以爲利刻石水濵以紀其績又曰栁仲郢爲河南尹以寛惠爲政言事者以爲不􅀋京兆之政仲郢曰輦轂之下彈壓爲先郡邑之治惠養爲夲何取􅀋耶又曰蘇震爲太常卿是歳東都􅂄老表乞行幸上重違其心選勤舊勲賢爲之牧守遂以震爲河南尹兼御史中丞仍充東都畿甸觀察使英雄記曰董卓廢少帝自公卿巳下莫不卑下於卓唯京兆尹盖勲長揖争禮見者皆爲失色李爕別傳曰爕字德公京兆人拜京兆尹吏民愛敬乃作歌曰我府君道教舉恩如春威如虎愛如母訓如父李郃別傳曰鄧騭弟豹爲將作大匠河南尹缺豹欲得之上及騭兄弟亦欲用難便召拜下詔令公卿舉騭以旨遣人諷公卿悉舉豹李郃曰司􅈻河南尹當整頓京師檢御貴戚今反使親家爲之必不可爲後法公舉司􅈻羊浸不舉豹豹竟不得尹恨公卿不舉對士大夫曰李公寕能不舉我故我不得尹耶莊子曰孫叔敖能以爵禄爲巳害故三爲令尹三去令尹而色不變語林曰蘇峻新平温􅁃諸公以朝廷􅀄復京尹冝得望實唯孔君平可以處之孔固辭二公逼諭甚苦孔敖然曰先帝大漸卿軰身侍御床口行詔令孔垣尓時正璅臣耳何與國家事不可今日䘮亂而猥見逼迫吾爼豆上腐􅁏任人割截耶􅁃愧不能荅說􅁐曰楚令尹子文之族干法者廷理釋之子文責之曰吾豈爲私意耶何廷理之駮於法也不寘刑地吾將死廷理懼遂刑其人國人聞之曰􅀂令尹之公也吾黨何憂乃相與作歌曰子文之族犯國法程廷理釋之子文不聽通典曰凡帝王所都皆曰尹南朝曰丹陽尹後魏􅀄曰代尹東魏曰魏尹北齊曰清都尹楊雄河南尹箴曰茫茫天區畫兾爲京啇邑翼翼四方之經爰作卿士以尹王州風化攸興萬國承流梁邵陵王讓丹陽尹􅀄表曰臣進非民譽退異宗英尸居戎號已紊彛典况京兆五守西漢難追河南二尹東京罕繼審已循涯自知莫可街談巷議尤見不勝梁􅁃肩吾爲南康王讓丹陽尹表曰臣聞劒鏤七星非有司天之用縑圖五嶽寕識崇朝之雲是知䇿彼泥龍不能令其逐日乗斯流馬安可使其奔電方今振鷺盈庭白駒空谷惟帝念功惟明克允君子之國罕聞其讓石門之水獲免於貪少尹唐書曰李憕爲東京少尹時蕭胤爲尹依􅀝權貴蒞事多不法憕以公直正之人用繄頼又道士孫甑生以左道求進託以修功德徃來嵩山求請無度憕必挫之五代史後唐書曰李承勲累遷至太原少尹劉守光之僣號也莊宗遣承勲徃使伺其亹端承勲至幽州見守光如藩方交聘之禮謁者曰燕王爲帝矣可行朝禮承勲曰吾大國使人太原亞尹是唐帝除授燕主自可臣其部人安可臣我哉守光聞之不恱拘留於獄數日出而訊之曰臣我乎承勲曰燕君能臣我王則我臣之吾有死而巳安敢辱命㑹王師討守光承勲竟没於燕中留守東觀漢記曰和帝南廵祠園廟張禹以太尉留守北宫太官朝夕送食後漢書曰車駕征張歩留伏湛居守時蒸􅀕髙廟冬􅀕日蒸也而河南尹司􅀠校尉於廟中争論湛不舉奏坐䇿免呉志曰孫權征新城使登居守}
