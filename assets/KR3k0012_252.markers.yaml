  - {type: variant, offset: 2650, length: 0, content: '', WYG: 増守曰太守世祖中興徙都洛陽改號為尹尹正也詩云赫赫師尹魏志曰鄭渾字文公為京兆尹渾以百姓新集為制移居之禁令法使兼複者與單輕者相伍温信者與孤老者為比勤稼穡明禁令以發姦者由是民安於農而盗息又曰𫝊嘏字蘭石為河南尹内掌帝都外統宗畿兼古六鄉六遂之士其民異方雜居多豪門大族商賈胡貊天下四會利之所聚而奸之所生也前尹司馬芝舉其綱而太簡次尹劉靜綜其目而太宻後尹李勝毁常法以収一時之聲嘏立司馬之綱統裁劉氏之綱目以經緯之李氏所毁以漸補之郡有七百吏半非舊也河南俗黨五官掾功曺典選職皆授其本國人無用異邦人者嘏各舉其良而用之分官曹之職以次考核之其治以徳教為本然持法有恒而不可犯見理知情獄訟不任夏楚而得其實不為小惠有所薦逹及益於民事皆隠其端迹若不由已出故當時無赫赫之名使民久而後安者也又曰司馬芝字子華為河南尹教羣下曰盖君設教不能使吏必不犯也吏能犯教而不能使君必不聞也夫設教而犯君之劣也犯教而聞吏之禍也君劣於上吏禍於下此政事所以不理也可不各勉之哉於是下吏莫不自厲又曰劉馥字子靖出為河南尹散騎常侍應璩以書與子靖曰入作納言出臨京任當民之術日引月長王隠晉書曰樂廣字彦輔為河南尹故郡中前多怪後人皆於廊下郵𫝊中治事無敢在㕔事者惟廣處之白日户自閉二子凱模等懾怖廣使掘墻孔得狸乃絶代者乃相承入止又曰庾純字謀甫太}
