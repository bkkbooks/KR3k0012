  - {type: variant, offset: 2367, length: 0, content: '', SBCK: 意又曰谷永字子雲便於筆札故時人云谷子雲之筆札婁君卿之脣舌後漢書曰鄧奉反於南陽趙熹素與奉善數遺書切責之而䜛者因言熹與奉合謀帝以爲疑及奉敗帝得熹書乃驚曰趙熹真長者也即徴熹引見賜鞍馬待詔公車又曰竇章字伯向好學有文與馬融崔瑗同好更相推薦融與竇書曰孟陵奴來賜書見手迹歡喜何量次於面也書雖一􅁓八行行七字呉録曰王宏爲兾州刺史不發私書不交豪族號曰王獨坐蜀}
