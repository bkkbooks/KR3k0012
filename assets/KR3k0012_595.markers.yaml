  - {type: variant, offset: 2176, length: 0, content: '', SBCK: 天寳中崔昌上封推五行之運以國家合承周漢其周隨不合爲二王後請廢詔下尚書省集公卿議昌獨見之明群議不屈㑹集賢院學士衛包抗表陳論議之夜四星聚於尾􅀫天意昭然上心遂定求殷周漢後爲三恪廢韓介酅等公以昌爲左賛善大夫又曰張平叔判度支平叔欲以征利中上意以希大任請加監榷貴集州郡時宰不能奪因下其議韋處厚奏議發十難以詰之上然後深知害人乃止平叔繇是始踈獨斷曰有疑事公卿百官㑹議􅀂臺閣有正處而獨執異意者曰駮議曰某官某甲議以爲如是下言臣愚戅議異其非駮議不得言議異金樓子曰余後爲江州副君賜報曰京師有語云論議當如湘東王仕宦當如王克克時始爲僕射領選也牋􅀃}
  - {type: page-break, offset: 2176, content: '', id: KR3k0012_SBCK_595-5b}
