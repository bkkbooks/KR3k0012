  - {type: variant, offset: 1584, length: 212, content: 魏文帝與吳質書曰孔璋章表殊健微為繁富世說曰司馬景王令中書令虞松鬆作表再呈輒不可意令松更定松思竭不能改心存之形於顏色鍾會察其憂問松松以實荅會取為定五字松悅服以示景王景王曰不當爾耶誰所定也曰鍾會向亦欲啟之會公見問不敢饗其能王曰如此可大用可令來會平旦入見至二鼓乃出出後王獨拊手歎息曰此真王佐材也博物志曰漢承秦法群臣上書皆云昧死王莽慕古法改曰稽首光武因而不改朝臣曰稽首輕宜稽首再拜奏陸士衡文賦曰奏平徹以閑雅漢書雜事曰秦初之制改書為奏, SBCK: ''}
