  - {type: variant, offset: 2313, length: 2, content: 孔光, krp: 四書辭若對面又子服敬叔進弔書於滕君故知行人絜辭多𬒳翰墨及七國獻書詭麗輻湊漢來筆札辭音紛紜觀史遷}
  - {type: variant, offset: 2314, length: 1, content: 光, WYG: 記}
  - {type: variant, offset: 2316, length: 0, content: '', SBCK: 報任安東方之謁公孫楊惲之酬㑹宗子雲之荅劉歆志氣盤桓各含珠采並杼軸乎尺素㧕揚乎寸心逮後漢書記則崔瑗尤善魏之元瑜號稱翩翩文舉屬音半簡必録休璉好事留意翰辭抑其次也嵇康絶交實志髙而文偉矣趙壹贈離乃少年之激昻也至如陳遵占辭百封各意祢衡代書親踈得冝斯皆尺牘之文也詳諸書體本在盡言所以散鬰陶詠風采固冝滌蕩以任氣優㳺以懌懷文明從容亦心聲之獻酬也􅀂夫尊貴差序則肅以節文自戰圓巳前君臣同書􅁗漢立儀始有表}
  - {type: variant, offset: 2316, length: 5, content: 奏董賢則實, WYG: 為式既上規乎表亦下睨乎書使敬而不懾簡而無傲清美以惠}
  - {type: variant, offset: 2316, length: 3, content: 奏董賢, krp: 報任安東方之謁公孫楊惲之酬㑹宗子雲之荅劉歆志氣盤桓各含珠采並杼軸乎尺素㧕揚乎寸心逮後漢書記}
  - {type: variant, offset: 2317, length: 3, content: 董賢則, SBCK: 王公國内亦稱奏書張敞奏書於膠后其辭義羙哉迄至後漢稍有名品公府奏記而郡將奉牋也漢書曰蘇武與常惠使匈奴􅀍留昭帝即位數使至匈奴常惠請其守者與俱得夜見漢使具自陳道教使者謂單于言天子射上林中得鴈足有係帛書言武等在某澤中使者大喜如惠語單于單于視左右而敬謝漢使曰武等}
