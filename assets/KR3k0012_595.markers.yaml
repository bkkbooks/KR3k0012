  - {type: variant, offset: 2321, length: 17, content: 其奸回路粹之奏孔融則誣其釁惡名儒之, SBCK: 在於是遣還漢又曰陳遵容皃竒偉略渉傳記贍於文辭善書}
  - {type: variant, offset: 2321, length: 5, content: 其奸回路粹, krp: 志髙而文偉矣趙壹贈離乃少年}
  - {type: variant, offset: 2322, length: 4, content: 奸回路粹, WYG: 才彪蔚以文其響盖牋記}
