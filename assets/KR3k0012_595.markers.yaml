  - {type: variant, offset: 2260, length: 0, content: '', SBCK: 事之末或云謹啓自晉來盛啓用兼表奏陳政事言旣奏之異條讓爵謝恩亦表之别幹必辯要輕清文而不侈亦啓之大略也晉書曰山濤爲吏部濤所奏甄抜人物各爲題目時稱山公啓事書記文心雕龍曰大舜云書用識哉}
