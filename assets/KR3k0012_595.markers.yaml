  - {type: variant, offset: 27, length: 1, content: 表, WYG: 研求名理而論難生焉論貴於允理不求支離若稽康之論成文者矣文心雕龍曰論者倫也倫理無爽則聖意不墜昔仲尼微言門人追記故仰其經目稱為論語蓋羣論立名始於茲矣論者彌綸羣言而研精一理也是以莊周齊物以論為名不韋春秋六論昭列至如石渠論藝白虎通講聚述聖言通經論家之正體也及班彪王命嚴尤三將敷述昭情善入史體魏之初霸術兼名法傳嘏王粲校練名理迄至正始務欲守文而何晏之徒始盛𤣥論於是􅅨周當路與尼父争塗矣詳觀蘭石之才性仲宣之去代叔夜之辨聲太初之本𤣥輔嗣之兩例平叔之二論並師心獨見鋒頴精宻蓋論之英也至如李康運命同論衡而過之陸機辨亡效過秦而不及然亦美矣原夫論之為體所以辨正然否窮有數追究無形鑚堅求通鈎深取極乃百慮之筌蹄萬事之權衡也故其義貴圓通詞忌枝碎必使心與理合彌縫莫見其隙詞共心宻敵人不知所乗斯其要也是以論譬折薪貴能破理斤利者越理而横斷詞辨者反義而取通覧文雖巧而檢迹如妄惟君子能通天下之志安可以曲論哉漢書曰班彪遭王莾亂避地隴右時隗􅅝據隴右􅅝問彪曰往者周亡戰國並争天下分裂意者縱横之事復起於今乎將承運迭興在一人也願先生論之彪既感􅅝言又愍狂狡之不息乃著王命論以救時難後漢書曰王符耿介不同於俗因而憤恚著書以議於世不欲彰名號曰潜夫論又曰仲長統字公理每論古今世俗行事恒發憤歎息因著論名曰昌言晉書裴頠傳曰頠深患時俗放蕩不尊儒術何晏阮籍素有重名於世口談浮虛不遵禮法尸禄耽寵仕不事事至王衍之徒聲譽大盛位高勢重不以物務自嬰遂相傚效風教陵遲乃著崇有之論以釋其蔽又范喬傳曰光禄大夫李銓嘗論揚雄才學優於劉向喬以為向定一代之書正羣籍之篇使雄當之故非所長遂著揚劉優劣論又曰董養字仲道陳留浚儀人也太始初到洛下不干榮禄及楊后廢養因遊太學升堂歎曰建斯堂也將何為乎毎見國家赦書謀反大逆皆赦至於殺祖父母父母不赦者以為王法所不容也柰何公卿處議文餙禮典以至此乎夫人之理既㓕大亂作矣因著無化論以非之又曰魯褒字元道元康之後綱紀大壊褒傷時貪鄙乃隠姓名著錢神論其畧曰市井便易不患耗折親之如兄字曰孔方失之則貧弱得之則冨强無翼而飛無足而走觧嚴毅之顔開難發之口錢多者處前錢少者居後京邑衣冠疲勞講肄厭聞清談對之睡寐見我家兄莫不驚視又成公綏亦著錢神論梁書曰范縝字子真南陽武隂人也齊景陵王子良盛招賔客縝豫焉子良性好釋教而縝不信因著神威論以明之子良集僧難之而不能屈王筠難縝曰嗚呼范子曾不知其先祖神靈所在縝答曰嗚呼王子知其先祖神靈所在而不能殺身以從之又曰劉峻見任昉諸子西華等兄弟流離不能自振平生舊交莫有收恤西華冬月著葛巾帔練裙路逢峻峻泫然矜之因廣朱公叔絶交論到溉見其書抵几於地終身恨之後周書柳虬時人論文體者有今古之異虬以時有古今非文有古今乃為文質論隋書曰開皇之末國家殷盛朝野皆以遼東為意劉炫以為遼東不可伐作撫邊論以諷焉當時莫有悟者及大業之季三征不克炫言方騐典論曰余觀賈誼過秦論發周秦之得失通古今之制義洽以三代之風潤以聖人之化斯可謂作者矣抱朴子曰洪造穹天論云天形窮隆如笠冐地若謂天北方逺者是北方星宜細於三方矣語録曰宋岱為靑州刺史著無鬼論甚精莫能屈後有書生詣岱談論次及無鬼論書生乃拂衣而去曰君絶我軰血食二十餘年以君有青牛髯奴所以未得相困今奴已死可得相制矣言終而去明日岱亡議說文曰議語也又曰論難也周易節卦曰君子以制度數議徳行文心雕龍曰周爰咨謀是謂為議議之言宜審事冝也易之節卦君子以制度數議徳行周書曰議事以制政乃弗迷議貴節制經典之體也昔管仲稱軒轅有明臺之議則其來逺矣洪水之難尭咨四岳宅揆之舉舜疇五臣三代所興詢及芻蕘春秋釋宋魯桓務議及趙靈胡服而季父争論商鞅變法而甘龍交辦雖憲章無筭而同異足觀迄至有漢始立駮議駮者雜也雜議不純故曰駮也自兩漢文明楷式昭備藹藹多士發言盈庭若賈誼之徧代諸生可謂捷於議也至如主父之駮挾弓安國之辨匈奴賈捐之陳於朱崖劉歆之辨於祖宗雖質文不同得事要矣若乃張敏之斷輕侮郭躬之議擅誅程曉之駮校事司馬芝之議貨錢何曾蠲出女之科秦秀定賈充之謚事實允當可謂達議體矣漢世善駮則應劭為首晉代能議則傅咸為宗然仲瑗博古而銓貫有叙長虞識治而屬辭枝繁及陸機斷議亦有鋒頴而腴辭不剪頗累文骨亦各有美風格存焉夫動先擬議明用稽疑所以敬慎羣務弛張治術故其大體所資必樞紐經典采事實於前代觀變通於當今理不謬揺其枝字不妄舒其藻郊祀必洞於理戎事宜練於兵田榖先曉於農斷訟務精於律然後標以顯議約以正辭文以辨㓗為能不以繁縟為巧事以明覈為美不以深隠為竒此綱領之大要也若不逹政體而舞筆㺯文支離搆辭穿鑿㑹巧空騁其華固為事實所擯設得其理亦為浮辭所埋矣昔秦女嫁晉從文衣之媵晉人貴媵而賤女楚珠鬻鄭鄭為薰桂之櫝鄭人買櫝而還珠若文浮於理末勝其本則秦女楚珠復在於茲矣李充翰林論曰在朝辨政而議奏出}
