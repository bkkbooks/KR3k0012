  - {type: variant, offset: 1285, length: 858, content: 略曰周武帝下令上書者並為表於皇太子已下稱啟後周書曰柳慶領記室時北雍州獻白鹿群臣欲草表陳賀尚書蘇綽謂慶曰近代已來文章華靡逮于江左彌復輕薄洛陽後進祖述不已相公柄民軌物君職典文房宜製此表以革前弊慶操筆立成辭兼文質綽讀而笑曰枳橘猶自可移況才子也隋書曰魏楊遵彥命李德林製讓尚書令表援筆立成不加治點因大相賞異以示吏部郎中陸卬云已見其文筆浩浩如河之東注比來所見後生制作乃涓澮之流耳邛仍命其子乂與德林周旋戒乂汝每事宜師此人以為模楷唐書曰令狐楚為太原掌記鄭儋在鎮暴卒不及指撝後事軍中喧譁將欲有變中夜忽數十騎持刃迫楚至軍門諸將逼之令草遺表楚在白刃之中搦管立成讀示三軍無不感泣由是名聲益重典論曰陳琳阮瑀之章表書記今之俊也魏文帝與吳質書曰孔璋章表殊健微為繁富世說曰司馬景王令中書令虞松鬆作表再呈輒不可意令松更定松思竭不能改心存之形於顏色鍾會察其憂問松松以實荅會取為定五字松悅服以示景王景王曰不當爾耶誰所定也曰鍾會向亦欲啟之會公見問不敢饗其能王曰如此可大用可令來會平旦入見至二鼓乃出出後王獨拊手歎息曰此真王佐材也博物志曰漢承秦法群臣上書皆云昧死王莽慕古法改曰稽首光武因而不改朝臣曰稽首輕宜稽首再拜奏陸士衡文賦曰奏平徹以閑雅漢書雜事曰秦初之制改書為奏又曰群臣奏事上書皆為兩通一詣后一詣帝凡群臣之書通於天子者四品一曰章二曰奏三曰表四曰駮議文心雕龍曰昔陶唐之臣敷奏以言秦漢附之上書稱奏陳政事獻典儀上急變劾愆謬揔謂之奏奏者進也敷于下情進乎上也秦始皇立奏而法家少文觀王綰之奏德辭質而義近李斯之奏驪山事略而意誣故無膏潤形於篇章矣自漢來奏事或稱上䟽儒雅繼踵殊采可觀若夫賈誼之務農晁錯之兵術匡衡之定郊王吉之勸禮溫舒之緩獄谷永之陳仙理既切至辭亦通辦可謂識大體矣後漢群臣嘉言罔伏楊秉耿介於災異陳蕃憤懣於尺一骨骾得焉張衡指摘於史讖蔡邕銓列於朝儀博雅明焉魏代名臣文理迭興若高堂天文黃觀教學王朗節省甄毅考課亦盡節而知治矣晉氏多難世交屯夷劉頌殷勤於時務溫嶠懇惻於費役並體國之忠規矣夫奏之為筆固以明允篤誠為本辯析踈通為首強志足以成務博見足以窮理酌古御今治繁揔要此其體也典略, WYG: 畧}
