  - {type: variant, offset: 2665, length: 4, content: 恬奏劾溫, SBCK: 戾不復可識謂揩爲詐晉陽春秋曰劉弘爲荆州刺史毎有興發手書郡國叮嚀欵宻故莫不感恱顚倒㳟赴咸曰得公一􅁓書賢於十部從事也沈約宋書曰劉穆之朱齡石並便尺牘嘗於髙祖坐與齡石共荅書自旦至日中穆之得百凾齡石得八十凾而穆之應對無廢又曰徐湛之善於尺牘音詞流暢南齊書曰周顒字彦倫善尺牘沈攸之送絶交書太祖口授令顒裁荅齊春秋曰呉都張融字思光臨終及葬徴士何􅀧使汝南風周英爲書與融謝􅊪見歎曰此書雖漂宕不倫亦有破的後周書曰梁臺性果敢有志操不過識百字口占書詞意可觀又曰栁慶時父僧習爲潁川郡地接都畿民多豪右將選官皆依􅀝貴勢競來請託選用未定僧習謂子曰權貴請託吾並不用其使欲還皆湏有荅汝等各以意爲吾作書也慶乃具書草云下官受委}
  - {type: page-break, offset: 2665, content: '', id: KR3k0012_SBCK_595-10a}
  - {type: variant, offset: 2665, length: 4, content: 恬奏劾溫, WYG: 戾不復可識謂楷為詐晉陽春秋曰劉𢎞為荆州刺史每有興發手書守相丁寧欵宻故莫不感悦㒹倒爭赴咸曰得公一紙書賢於十部從事也沈約宋書曰劉穆之朱齡石並便尺牘嘗於高祖坐與齡石共答書自旦至日中穆之得百凾齡石得八十凾而穆之應對無廢又曰徐湛之善於尺牘音詞流暢南齊書曰周顒字彦倫善尺牘沈攸之送絶交書太祖口授令顒裁答齊春秋曰吳都張融字思光臨終及葬徴士何㸃使汝南周英為書與融謝􅊪見歎曰此書雖漂宕不倫亦有破的後周書曰梁䑓性果敢有志操不過識千餘字口占書啟辭意可觀又曰柳慶時父僧習為潁州郡地接都畿民多豪右將選官皆依倚貴勢競來請託選用未定僧習謂子曰權貴請託吾並不用其使欲還皆須有答汝等各以意為吾作書也慶乃具書草云下官受委}
