  - {type: variant, offset: 2352, length: 0, content: '', krp: 郡將奉牋也漢書曰蘇武與常惠使匈奴𬒳留昭帝即位數使至匈奴常惠請其守者與俱得夜見漢使具自陳道教使者謂單于言天子射上林中得鴈足有係帛書言武等在某澤中使者大喜如惠語單于單于視左右而敬謝漢使曰武等實在於是遣還漢又曰陳遵容皃竒偉略渉傳記贍於文}
