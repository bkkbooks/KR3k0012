  - {type: variant, offset: 2692, length: 298, content: 孝廉辟司隸都官從事京邑肅然毅將彈河南尹司隸不許曰攫獸之犬鼷蹈其背毅曰既能攫獸不能殺鼠何損於犬投傅其背而去南史曰徐陵為御史中丞時安成王頊為司空以帝弟之尊權傾朝野直兵鮑僧叡假王威風抑塞辭訟大臣莫敢言陵乃奏彈之文帝見陵服章嚴肅若不可犯為歛容正坐陵進讀奏狀時安成王殿上侍立仰視文帝流汗失色陵遣殿中侍史引王下殿自是朝廷肅然隋書曰郎茂為尚書左丞時工部尚書宇文愷左翊衛大將軍于仲文競河東鋃窟茂奏劾之曰臣聞貴賤殊禮仕農異業所以人知局分家識廉恥宇文愷位望已隆祿錫優厚拔葵去職寂爾無聞求利下交曾無愧色仲文大將宿衛近臣趨侍階庭朝夕聞道虞芮之風抑而不慕分銖之利知而必爭何以貽範庶寮示民軌物若不糺繩將虧政教愷與仲文竟坐得罪, SBCK: 報後}
  - {type: variant, offset: 2692, length: 298, content: 孝廉辟司隸都官從事京邑肅然毅將彈河南尹司隸不許曰攫獸之犬鼷蹈其背毅曰既能攫獸不能殺鼠何損於犬投傅其背而去南史曰徐陵為御史中丞時安成王頊為司空以帝弟之尊權傾朝野直兵鮑僧叡假王威風抑塞辭訟大臣莫敢言陵乃奏彈之文帝見陵服章嚴肅若不可犯為歛容正坐陵進讀奏狀時安成王殿上侍立仰視文帝流汗失色陵遣殿中侍史引王下殿自是朝廷肅然隋書曰郎茂為尚書左丞時工部尚書宇文愷左翊衛大將軍于仲文競河東鋃窟茂奏劾之曰臣聞貴賤殊禮仕農異業所以人知局分家識廉恥宇文愷位望已隆祿錫優厚拔葵去職寂爾無聞求利下交曾無愧色仲文大將宿衛近臣趨侍階庭朝夕聞道虞芮之風抑而不慕分銖之利知而必爭何以貽範庶寮示民軌物若不糺繩將虧政教愷與仲文竟坐得罪, WYG: 報後}
