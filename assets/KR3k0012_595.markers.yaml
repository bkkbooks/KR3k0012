  - {type: variant, offset: 3248, length: 166, content: 問義方以毀辱大臣貶為萊州司戶參軍初義方謂其母曰姦臣當路懷祿而曠官不忠老母在堂犯難以危身不孝進退惶惑所以未能決也母曰吾聞王陵母自殺以成子之義汝若事君盡忠立名千載吾死不恨也及義方將赴萊州義府謂之曰王學士得御史是義府所舉今日之事豈無愧乎對曰義方為公不為私昔孔子為魯司寇七日誅少正卯於兩觀之下今義方任御史旬有六日不能除姦臣於雙闕之前實以為愧, SBCK: 滅}
