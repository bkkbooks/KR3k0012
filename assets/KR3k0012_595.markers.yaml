  - {type: variant, offset: 3052, length: 3, content: 軌待御, krp: 㳟負恩其間論列是非交相聘荅者數百篇警䇿之句播在人口文士稱之天復中太祖與朱温脩好遣張特致書𥘉叙相失之由毒手尊拳之句温怡然大笑謂幕}
