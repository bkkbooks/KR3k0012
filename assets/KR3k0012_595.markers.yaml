  - {type: variant, offset: 2578, length: 1, content: 中, WYG: 字子均生長戎旅手不能書所識不過十字而口授作書皆有法度使人讀史漢諸傳聽之畧知其義徃徃論說不失其指晉書曰荀朂與裴秀羊祜共官機宻時將發使聘吳並遣當時文士作書與孫皓帝用朂所作皓既報命和親帝謂朂曰君前作書使吳思順勝十萬之衆也又曰簡文輔政引髙崧}
