  - {type: variant, offset: 606, length: 3, content: 謨使典, SBCK: 以至此乎天人之理旣滅大亂作矣因著元化論以非之又曰魯褒字元道元康之後綱紀大壞褒傷時貪鄙乃隱姓名著錢神論其略曰市井便易不患耗折親之如兄字曰孔方失之則貧弱得之則冨強無翼}
