  - {type: variant, offset: 51, length: 1231, content: 諸葛亮之表劉主裴公之辭侍中羊公之讓開府可謂德音矣文心雕龍曰堯咨四岳舜命八元並陳詞帝庭匪假書翰然則敷奏以言即章表之義也至太甲既立伊尹書戒思庸歸亳又作書以讚文翰事斯見矣降及七國未變古式言事於主皆稱上書秦初定制改書曰奏漢初定制則有四品一曰章二曰奏三曰表四曰駮議章以謝恩奏以案劾表以陳請議以執異章者明也詩云為章于天謂文明也其在文物青赤曰章表者摽也禮有表記謂德見于儀其在器式揆景曰表表章之目蓋取諸此也案七略蓻文謠詠必錄章表奏議經國樞要然闕而不纂者乃各有故事布在職司也前漢表謝遺篇寡存及後漢察舉必試章奏左雄表議臺閣為式胡廣章奏天下第一並當時之傑筆也觀伯始謁陵之章足見其典文美焉昔文受策三辭從命是以漢末讓表以三為斷曹公稱表表不止三讓又勿得浮華所以魏初章表指事造實求其靡麗則未足矣如文舉之薦禰衡氣揚采飛孔明之辭後主志盡文壯雖華實異旨並表之英也琳瑀章表有譽當時孔璋稱健則其摽也陳思之表獨冠群才觀其體贍而律調辭清而志顯應物製巧隨變生趣執轡有餘故能緩急應節矣迨晉初筆札則張華為儁其三讓公封理同辭要引義比事必得其偶及羊公之辭開府有譽於前談庾公之讓中書信美於往載序志聯類有文雅焉劉琨勸進張駮自敘文致耿介並陳事之美表也原夫章表之為用所以對揚王庭照明心曲既其身文且亦國華章以造闕風矩應明表以致策骨采宜耀循名課實以文為本者也是以章式炳賁志在典謨使典而非略明而不淺表體多苞情位屢遷必雅義以扇其風清文以驅其麗然懇惻者辭為心使浮侈者情為文出必使繁約得正華實相勝脣吻不滯則中律矣子貢云心以制之言以結之蓋一辭意也東觀漢記曰馬援征尋陽山賊上書除其竹林譬如嬰兒頭多蟣虱而剔之書奏上大悅出尚璽書數日黃門取頭虱章持入張璠漢記曰周舉上書言得失尚書郭度見之歎息上䟽願退位避舉常置其章於坐吳志曰東萊太史慈字子義為郡奏曹史會郡與州有隙先聞者為善時州章已出郡守選慈以行至洛詣公車見州吏欲始通章慈曰章題署得無誤耶取視之先懷書刀截敗其章因共亡去遁還通章州遂受短由是知名晉書曰樂廣善清言而不長於筆將讓尹請潘岳為表岳曰當得君意廣乃作二百句語述己之志岳因取次比之便成名筆時人咸云若廣不假岳之筆岳不取廣之旨無以成斯美也後魏書曰董紹傳孝武崩周文與百官推奉文帝上表勸進令呂思禮薛憕作表前後再奏帝尚執謙衝不許周文曰為文能動至尊唯董公耳乃命紹為第三表操筆便成表奏周文曰開進人意亦當如此也又曰胡方回為北鎮司馬為鎮脩表有所稱慶世祖覽而嗟美問誰所作既知方回召為中書博士賜爵臨涇子又曰邢劭善屬每一文初出京師為之紙貴讀誦俄遍遠近于時袁翻與范陽祖瑩位望通顯文筆之美見稱先達以劭藻思華贍深共嫉之每洛中貴人拜職多憑劭為謝章表嘗有一貴勝初授官大事賓食翻與劭俱在坐翻意主人託其為讓表遂命劭作之翻甚不悅每告人云邢家小兒常客作章表自買黃紙寫而送之劭恐為翻所害乃辭以疾北齊書曰盧詢祖有術學文章華美為後生之俊舉秀才至鄴趙郡李祖勳嘗宴諸文士齊文宣使小黃門勑祖勳曰蠕蠕既破何無賀表使者佇立待之諸賓皆為表詢祖俄頃便成其詞云昔十萬橫行樊將軍請而受屈五千深入李都尉去以不歸時重其工, WYG: ''}
