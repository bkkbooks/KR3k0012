  - {type: variant, offset: 2173, length: 0, content: '', SBCK: 又曰齊主命立三恪朝士議之太子少傅魏收爲議衆皆同之吏部侍郎崔瞻以父與收有隙乃別立議收讀瞻議畢􅀏而不荅瞻曰瞻議􅀂是湏賛所長瞻議􅀂非湏詰所短何容讀國士議文直如此冷􅀏收但慙而竟無言又曰齊魏收嘗在議曹與諸愽士引據漢書論宗廟事􅀶士􅀏之收便忿取韋􅀇成傳抵之而起􅀶士夜共披㝷遲明乃來謝曰不謂玄成如此學也南史曰馬褧梁天監􅀄詔通儒定五禮有司舉褧脩嘉禮除尚書祠部郎時創定禮樂褧所建議多見施行兼中書通事舎人每􅁻凶禮當時名儒明山賔賀㻛等疑不能斷者皆取决也}
