  - {type: variant, offset: 2574, length: 0, content: '', WYG: 劉卞字叔龍東平湏昌人也本兵家子質直少言為縣小吏功曹夜醉如厠使卞執燭不從功曹銜之以它事補亭子有祖秀才者於亭中作與刺史牋乆不成卞教之數言卓犖有大致秀才謂縣令曰卞公府掾之精者云}
  - {type: page-break, offset: 2574, content: '', id: KR3k0012_WYG_595-10a, image: WYG0898/WYG0898-0421a.png}
  - {type: variant, offset: 2575, length: 1, content: 曾, WYG: 以為亭子令即召為門下吏異苑曰河内荀儒字君林乗氷省舅氏䧟河而死兄倫字君文求尸積日不得設祭水側又投牋與河伯經一宿岸側水開尸手執牋浮出倫牋謝之博物志曰鄭𤣥注毛詩曰牋不觧此意或云毛公嘗為北海𤣥是此郡人故以為敬耳世説曰郄司空在北府桓宣武惡其居兵權㕁於事機素暗遣牋詣桓方欲共奬王室修復園陵世子}
  - {type: page-break, offset: 2575, content: '', id: KR3k0012_WYG_595-10b, image: WYG0898/WYG0898-0421b.png}
  - {type: variant, offset: 2576, length: 2, content: 嘉平, SBCK: 爲三公人以小􅁓爲書者勑記室勿報又曰何綏字伯蔚曾之孫也位至侍}
  - {type: variant, offset: 2576, length: 2, content: 嘉平, krp: 爲三公人以小𥿄爲書者勑記室勿報又曰何綏字伯蔚曾之孫也位至侍}
  - {type: variant, offset: 2577, length: 0, content: '', WYG: 賔出行道上聞信至急遣取牋視之竟寸寸毁裂便回車還依帳中卧更作箋自陳老病不復堪人間欲乞閒地自飬宣武大喜即發詔轉為都督五郡守㑹稽啓說文曰啓傳信也服䖍通俗文曰官信曰啟張璠漢記曰董卓呼三臺尚書以下自詣卓啓事然後得行文心雕龍曰啓者開也高宗云啓乃心沃朕心盖其義也孝景諱啟故兩漢無稱至魏國牋記始云啟聞奏事之末或云謹啟自晉來盛啟用兼表奏陳政言事既奏之異條讓爵謝恩亦表之别幹必歛散入規促其音節辨要輕清文而不侈亦啟之大畧也書記文心雕龍曰大舜云書用識哉所以記時事也盖聖賢言辭總為之書書之為體主言者也揚雄曰言心聲也書心畫也聲畫形君子小人見矣故書者舒也舒布其言陳之簡牘取象乎史貴在明决而已三代政暇文翰頗疎春秋聘繁書介彌盛繞朝贈士㑹以策子家與趙宣以書巫臣之遺子反子産之諫范宣詳觀四書辭若對靣又子服敬叔進弔書於滕君固知行人挈辭多被翰墨及七國獻書詭麗輻凑漢来筆札辭㫖紛紜觀史遷之報任安東方之難公孫楊惲之酬會宗子雲之答劉歆志氣盤桓各含殊采並杼軸乎尺素抑揚乎寸心逮後漢書記則崔瑗尤善魏之元愉號稱翩翩文舉屬章半簡必錄休璉好事留意辭翰抑其次也嵇康絶交實志高而文偉矣趙至叙離廼少年之激切也至如陳遵占辭百封各意禰衡代書親踈得宜斯皆尺牘之偏才也詳總書體本在盡言所以散欝陶託風采固宜條暢以任氣優游以懌懐文明從容亦心聲之獻酬也若夫尊貴差序則肅以節文自戰國以前君臣同書秦漢立儀始有表奏王公國内亦稱奏書張敞奏書於膠后其義美矣迄至後漢稍有名品公府奏記而郡將奏牋也漢書曰蘇武與常惠使匈奴被留昭帝即位數使使至匈奴常惠請其守者與俱得夜見漢使具自陳道教使者謂單于言天子射上林得鴈足有係帛書言武等在某澤中使者大喜如惠語單于視左右而驚謝漢使曰武等實在于是遣還漢又曰陳遵容貌竒偉備渉傳記贍於文辭性善書與人尺牘皆以為榮為河内太守既至官遣吏西上召善書吏十人於前治私書謝京師故人遵慿几口占且省官事書數百封親踈各有意又曰谷永字子雲便於筆札故時人云谷子雲之筆札樓君卿之脣舌後漢書曰鄧奉反於南陽趙熹素與奉善数遣書切責之而䜛者因言熹與奉合謀帝以為疑及奉敗帝得熹書乃驚曰趙熹真長者也即召熹引見賜鞍馬待詔公車又曰竇章字伯向好學有文與馬融崔瑗同好更相推薦融與竇書曰孟陵奴來賜書見手迹歡喜何量見於面也書雖兩紙紙八行行七字吳錄曰王宏為翼州刺史不發私書不畏豪族號曰王獨坐蜀志曰先主辟馬良為椽後遣使吳良請亮曰今銜國命恊穆二家幸為良介於孫將軍亮曰君試自為文良即為草曰寡君遣掾馬良通聘繼好以紹昆吾豕韋之勲其人吉士荆楚之令鮮於造次之華而有克終之美願降心存納以慰將命權敬待之又曰王}
