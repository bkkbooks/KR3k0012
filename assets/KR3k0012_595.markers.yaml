  - {type: variant, offset: 605, length: 0, content: '', SBCK: 一人也願先生論之彪旣感囂言又愍狂狡之不息乃著王命論以救其時難後漢書曰王符耿介不同於俗困而憤恚著書以譏於世不欲彰名號曰潜夫論又曰仲長統字公理每論古今世俗行事恒發憤歎息因著論名曰昌言晉書裴頠傳曰頠深患時俗放蕩不遵儒術何晏阮籍素有重名於世口談浮虚不遵禮法尸禄躭寵仕不事事至王衍之徒聲譽大盛位髙勢重不以物務自嬰遂相放效風教陵遟乃著崇有之論以釋其蔽又范喬傳光禄大夫李銓嘗論楊雄才學優於劉向喬以爲立一代之書正群籍之篇使雄當之故非所長遂著楊劉優劣論又曰董養字仲道陳留俊儀人也太始􅀄到洛下不干榮禄及楊后廢養因遊太學􅂛堂歎曰建斯堂也將何爲乎毎見國家赦書謀反逆者赦至於祖父母不赦以爲王法所不容也柰何公卿處議文飾禮}
  - {type: page-break, offset: 605, content: '', id: KR3k0012_SBCK_595-2a}
