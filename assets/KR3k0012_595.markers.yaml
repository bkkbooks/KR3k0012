  - {type: variant, offset: 2259, length: 0, content: '', SBCK: 德音矣黃香奉牋於江夏亦肅恭之遺式矣公幹牋記文麗而䂓益子桓不論故世所共遺􅀂略名取實則有羙於爲詩矣劉廙謝恩喻切以至陸機自叙情周而巧牋之善者也原牋記之爲式旣上窺乎表亦下睨乎書使敬而不懾簡而無傲清靡以惠其才彪蔚以文其響盖箋記之分也晉書曰劉卞字叔龍東平湏昌人也本兵家子質直少言爲縣小吏功曹夜醉如厠使卞執燭不從功曹衘之以它事􅀘亭子有祖秀才者於亭中作與刺史箋乆不成卞教之數言卓􅕸有大致秀才謂縣令曰卞公府椽之精者卿云何以爲亭子令即召爲門下吏異苑曰河内荀儒字君林乗冰省舅氏陷河而死兄倫爲文求尸積日不得設􅀕水側又投牋與河伯經一􅀫岸側冰開尸手執牋浮出倫又牋謝之愽物志曰鄭玄注毛詩曰箋不解此意或云毛公嘗爲北海􅀇是此郡人故以爲敬丗􅀃曰郗司空在北府桓宣武惡其居兵權於事素暗遣牋詣桓方欲共奬王室修復園陵世子嘉賔出行道上聞信至急遣取牋視之竟寸寸毁裂便廽車解衣帳中卧更作牋自陳老病不復堪人間欲乞閑地自養宣武大喜即發詔轉爲督王部守㑹稽啓􅀃文曰啓傳信也服䖍通俗文曰官信曰啓張璠漢紀曰董卓呼三臺尚書以下自詣卓啓事然後得行文心雕龍曰啓者開也髙宗云啓乃心沃朕心盖其義也孝景諱啓後兩漢無稱至魏國牋記始云啓聞}
