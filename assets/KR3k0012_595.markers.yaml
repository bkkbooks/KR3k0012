  - {type: variant, offset: 2312, length: 0, content: '', krp: 楊雄曰言心聲也書心畫也聲畫形君子小人見矣故書者舒也舒布其言染之簡牘取象乎夬貴在明决而巳三代政暇文翰頗踈春秋聘繁書令弥盛繞朝贈士㑹以䇿子家弔趙宣以書巫臣之責子反子産之諫范宣詳}
  - {type: variant, offset: 2313, length: 2, content: 孔光, SBCK: 四書辭􅀂對面又子服敬叔進弔書於滕君故知行人絜辭多􅀍翰墨及七國獻書詭麗輻湊漢來筆札辭音紛紜觀史遷}
