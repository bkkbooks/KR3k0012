  - {type: variant, offset: 2658, length: 2, content: 溫屯, SBCK: 温擅率衆北伐簡文忌之松曰冝致書喻以禍福自當廻斾便於坐爲書革曰㓂讎冝平時㑹冝接此實爲國逺圗經略之大莫能加斯非足下而誰又曰王㳟將舉兵討譙王尚之以謀告殷仲堪桓􅀇􅀇等從之推㳟爲盟主尅期同赴京師時内外疑阻津邏嚴急仲堪之信因􅁃揩逹之以斜絹爲書内箭簳}
