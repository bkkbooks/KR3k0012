  - {type: variant, offset: 3056, length: 0, content: '', SBCK: 敬翔曰李公斗絶一隅削弱如此襲􅁻一函抵二十萬兵勢所謂彼有人可當也如吾之智筭得襲􅁻之筆才虎傅翼矣翔􅎼然而退魯連子曰燕伐齊取七十餘城唯莒與即墨不下齊田單以即墨破燕軍殺將軍􅀐刧復齊城唯􅂓城不下燕將守城數月魯仲連乃爲書著之於矢以射城中遺燕將書燕將得書泣三日乃自殺韓子曰鄭人有遺燕相國書者夜火不明因謂持燭者曰舉燭而誤於書中云舉燭非書意也燕相國受書而恱之曰舉燭髙明者舉賢而任之因以之治也皇甫謚髙士傳曰光武徴嚴光至司徒侯霸使西之曹屬侯子道奉書光不起於牀上箕踞發書讀訖問子道曰君房素癡今爲三公寕小差否子道曰位居台鼎足不癡也光曰遣卿來何言子道曰公聞先生至區區欲即詣迫於典司是以不􅀗願因日暮自屈語言光曰卿言不癡是非癡語天子徴我三辭乃來人主尚不見當見人臣乎子道求報光曰我手不得書乃口授之曰君房足下位至鼎司甚善懷仁輔義天下恱阿䛕順旨􅆎領絶無它言使者嫌少可更足光曰買菜乎求益耶魯國先賢志曰孔翊爲洛陽令置器水於前庭得私書皆投其中一無所發彈治貴戚無所廽避典略曰太祖嘗使阮瑀作書與韓遂於馬上其具草書成呈之太祖攬筆欲有所定而竟不能増損語林曰殷洪喬作䂊章郡臨去郡人因􅀉百餘函書至石頭悉擲水中因視祝之曰沉者自沉浮者自浮殷洪喬不能作逹書郵魏文帝與呉質書曰元瑜書記翩翩致足樂也魏文帝集曰上平定漢中族父都尉還書與余盛稱彼上地形勢觀其詞知陳琳所爲李充起居誡曰牀頭書䟽亦不足視或是他私宻事不欲令人見見之縱不能宣誰與明之􅀂有泄露則傷之者至矣􅄞康與山濤書曰素不便書不喜作書而人間事堆案盈几不相酬荅則犯教傷義欲自勉強則不能乆堪延篤荅}
