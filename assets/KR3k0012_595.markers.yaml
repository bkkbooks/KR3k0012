  - {type: 'tls:seg', offset: 2324, content: '', id: KR3k0012_CHANT_595-19a.22}
  - {type: variant, offset: 2327, length: 243, content: 奏孔融則誣其釁惡名儒之與儉士固殊心焉若夫傅咸果勁而辭案堅深劉隗切正而劾文闊略各有志也後之彈事迭相斟酌惟新日用而舊淮不羗然甲人欲全矢人欲傷術在糺惡勢入剛峭詩剌讒人投畀豺虎禮疾無禮方之鸚猩墨翟非儒目以羊彘孟軻譏墨比諸禽獸詩禮儒墨既其如此奏劾嚴文孰云能免是以近世為文競於詆訶吹毛取瑕剌骨為戾覆似善詈多失折衷若能闢禮門以懸規摽義路以植矩然後踰墻者折肱捷徑者滅跡何必躁言醜句詬病為巧哉是以丘範運衡宜明體惡必使理有典刑辭有風軌揔法家之裁秉儒家之文不畏強禦氣留墨中無縱詭隨聲動簡外乃稱絕席之雄直方之舉, WYG: 分}
  - {type: variant, offset: 2327, length: 10, content: 奏孔融則誣其釁惡名儒, krp: 激昻也至如陳遵占辭百封各意祢衡代書親踈得冝斯皆尺牘}
