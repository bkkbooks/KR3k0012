  - {type: variant, offset: 1040, length: 258, content: 博士賜爵臨涇子又曰邢劭善屬每一文初出京師為之紙貴讀誦俄遍遠近于時袁翻與范陽祖瑩位望通顯文筆之美見稱先達以劭藻思華贍深共嫉之每洛中貴人拜職多憑劭為謝章表嘗有一貴勝初授官大事賓食翻與劭俱在坐翻意主人託其為讓表遂命劭作之翻甚不悅每告人云邢家小兒常客作章表自買黃紙寫而送之劭恐為翻所害乃辭以疾北齊書曰盧詢祖有術學文章華美為後生之俊舉秀才至鄴趙郡李祖勳嘗宴諸文士齊文宣使小黃門勑祖勳曰蠕蠕既破何無賀表使者佇立待之諸賓皆為表詢祖俄頃便成其詞云昔十萬橫行樊將軍請而受屈五千深入李都尉去以不歸時重其工三國典略曰周武帝下令上書者並為表, SBCK: 抵凡}
