  - {type: variant, offset: 1582, length: 1, content: 俊, SBCK: 滯義治以三代之風潤以聖人之化斯可謂作者矣抱朴子曰洪造穹天論云天形穹隆如笠冒地􅀂謂天北方逺者視北方星冝細於三方矣語林曰宋岱爲青州刺史著無􅀑論甚精莫能屈後有書生詣岱談論次及無􅀑論書生乃拂衣而去曰君絶我軰血食二十餘年以君有青牛髯奴所以未得相困今奴巳死今得相制矣言終而失明日岱亡又幽明録曰阮瞻亦著無􅀑論俄而􅀑見而瞻死議􅀃文曰議語}
