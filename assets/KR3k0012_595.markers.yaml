  - {type: variant, offset: 3419, length: 462, content: 二年御史臺奏請知彈御史被彈即向下承次監奏或有故不到即殿中侍御史於侍御史下立以備其闕臣伏以朝官入閤失儀知彈侍御史先合彈奏若彈奏失錯向上侍御史及中丞大夫遞相彈奏奏畢復入本班侯監奏出閤然合待罪此乃殿庭舊制於事為宜今若移一殿中於知彈侍御史下防向上數人失錯如或殿中自錯則又更立何人只合知彈御史便了不必更羗殿中況乖故實終慮駮雜伏請自今已後依閤內故事縱知彈御史自有錯失不被彈奏候班退監奏畢然後出待罪冀從易永得遵行從之駮奏李充翰林論曰駮不以華藻為先世以傳長虞美奏駮事為邦之司直矣晉書嵇紹傳曰陳淮薨太常奏謚紹駮曰謚號所以垂之不朽大行受大名細行受細名文武顯於功德靈厲表其闇蔽自頃禮官恊情謚不依本准謚為過宜謚曰繆事下太常時雖不從朝廷憚焉唐書曰許孟容遷給事中論駮無所憚貞元末方鎮殂歿其主留務判官雖不得代位亦例皆超擢𥧲以為常十八年浙東判官武試大理評事齊揔由是拜衢州剌史孟容以揔無出人才一旦超為郡守非舊制也封還詔書時久絕論駮及孟容舉職班行為之惴恐德宗開悟召對慰勉遂寢其事又曰李藩為給事中制勑有不可遂於黃勑後批之吏曰宜別連白紙藩曰別以白紙是文狀豈曰批勑也, SBCK: 五}
