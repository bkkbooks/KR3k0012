  - {type: variant, offset: 3838, length: 0, content: '', SBCK: 景星見春秋佐􅂇期曰虞舜之時景星出房春秋孔演圖曰天子舉賢則景星放於天又曰王者徳政海内冨昌則鎮星入闕闕華闕之門當帝坐春秋元命苞曰老人星者治平則見見則主壽帝以秋分候之南郊又曰帝位明即畢星光大也春秋文耀鈎曰老人星見則主安下不見則兵起又曰王者安静則老人星見春秋運斗樞曰王政和平則老人星臨國萬民以歌孝經援神契曰徳至天則斗極明又曰天子刑于四海徳洞淪􅁳八方神化則斗霣精又曰神靈滋液百􅡋寳用有景星又曰鎮星舎房符明道興宋均曰符驗明而道興年豊也又曰太白合表四夷從服之象宋均曰合表從中道也太白進退主侯兵合從中道無進退孝經内事曰天子行孝徳則景星見又曰王者動得天度止得地意從容中道隂陽合度則太微五帝座星明以光也又曰王者得禮之制不傷財不害民君臣和草木昆蟲各象正性則三台爲齊明不闊不狹如其度宋均云君臣制度宫室車旗多少各有科品則應也又曰王者敬諸父有差則大角光明以􅀭宋均云諸父伯仲叔季也斗爲帝車帝所乗也角堅剛而居帝前帝敬諸父感天應之也又曰王者逺嫌別微殊貴賤抑驕臣息亂子則屏星爲之明以潤帝座章而光宋均云屏星五帝座爲之明以潤章大也又曰天子得雲臺之禮則五車均明河行不離其常宋均云天子考察天氣􅀂梓愼見星之祲者也所以獲福禳災五車主五榖民禳災得福民無飢寒之困五榖星之明以應之河􅀂離常則有决溢之憂則九榖失所殖矣又曰昆弟有親親之思則鈎鈴不離房宋均云鈎鈴逺房則踈闊今昆弟相親故天相近明其友也又曰王者厚長㓜各得其正則房心有德星應之宋均云房心爲天子明堂布政之宫長㓜厚則政教著明房心應之而時也風史記曰黃帝行德天爲之起風從西北東必以庚辛一秋中五至大赦三至小赦也唐書曰肅宗在平凉未知所適㑹朔方留後杜鴻漸奉牋迎上又河西行軍司馬裴冕勸上治兵於靈武以圗進取上發平凉至豊寜南見黄河天壍之固欲整軍北渡以保豊寧忽大風飛沙跬歩之間不辨人物及回軍趍靈武風沙頓止天地廓清尚書大傳曰王者徳及皇天則祥風起又曰舜將禪禹于時八風脩通禮斗威儀曰王者乗火而王其政昇平則祥風至宋均云即景風其來長養萬物符瑞圖曰翔風者瑞風也一名景風春爲發生夏爲長盈秋爲収藏尽爲安寧春秋繁露曰王者思及金石則凉風出孝經援神契曰王者徳八方則祥風至王充論衡曰王者太平則五日一風風不嗚條風角曰風清明髙不及地二三尺此下有聖人或清明其來乆長而不動揺樹木枝葉此龍徳在其下晉陽春秋曰劉􅁉平慕容超將鎭下邳聞盧循反何無忌敗乃還次山陽造楊子江問行人曰朝廷如何對曰則尚未至劉公􅀂還無所憂也􅁉將濟而風急衆咸難之􅁉曰吾有天命風當自息如天不助覆溺何足可怯即命登舟舟移而風止雨禮斗威儀曰君乗金而王其政平則嘉雨時至春秋􅀃題辭曰大節二十四小節十二功徳分也故一歳三十六雨塩鐵論曰太平之丗則雨不破塊旬日一雨雨必以夜符瑞圖曰周公時天下太平當此之時旬而一雨雨必以夜又曰靈雨者遇歳亢旱責躬引咎理察􅁈枉退去貪殘側身修政則降以靈雨非誠感瑞則非靈也又曰昔殷湯之丗天下大旱以六條自責於是大雨淮南子曰神農之丗甘雨以時五榖蕃殖尸子曰神農氏治天下欲雨則雨五日爲谷雨旬五日爲行雨萬物咸利故謂之神雲史記曰􅀂煙非煙􅀂雲非雲郁郁紛紛蕭索輪囷是謂慶雲嘉氣也漢書曰武帝封禪夜有白雲封中出魏書曰文帝生時有雲氣青色而圎如車蓋當其上終日望者以爲至貴之證宋書曰丗祖在江州起義建牙軍門有紫雲二段落于牙上唐書曰玄宗甞出畋有紫雲在其上從者望而得之又曰肅宗自奉天而北夕次永壽有白雲起西北長數丈如樓閣之􅃺識者以爲天子之氣尚書中􅀱曰堯徳清平乃沉壁於河白雲起禮斗威儀曰景雲景明也言雲氣光明也又曰周成王治平觀於河青雲浮春秋孔演圖曰黄帝將興黄雲􅂛於堂孝經援神契曰王者徳至山陵則景雲出又曰天子孝則景雲見孫氏瑞應圖曰景雲見者太平之應也符瑞圖曰矞慶雲也内赤外黄一曰矞雲矞音橘也帝王丗紀曰黄帝有景雲之瑞以雲紀官又曰堯母慶都生而神異有黄雲覆上漢武故事曰帝幸梁父祀地山上有白雲如蓋又曰宣帝祀甘泉有紫雲從西北來散於殿前歸藏曰大昊之盛有白雲出自蒼梧入于大梁徐爰宋書曰髙祖北征至洛陽常有紫雲見於軍上霧史記曰髙祖至平城匈奴圍上七日大霧漢人徃來故不􅁴帝王丗紀曰黃帝五十年秋七}
