  - {type: variant, offset: 1509, length: 1578, content: 沉為豫州刺史下教求直言之士主簿禇䂮曰堯舜周公所以能致忠諫者以其帎誠之心著也冰炭不言而冷熱之質自明者以其有實也若好忠直如冰炭之自然則諤諤之臣將濟濟而盈庭逆耳之言不求而自至矣又曰孫登住宜陽山自作炭人見之知非常人與語登不應後魏書曰高聰卒有妓十餘人有子無子皆令燒指吞炭出家為尼邵氏家傳曰邵貞字德方山陰人性詳審赴張氏葬或落生炭於貞履中坐人謂貞不見疾呼貞因不為廻顧神仙傳曰嚴青會稽人也於山中作炭忽有人與青一卷素書曰汝骨應得道長生故授神書也齊地記曰東南盧水水側有勝火木方人俗音曰挺木經野火燒之不死炭亦不滅東方有不灰之木豫章記曰豊城縣葛鄉有石炭二百頃可燃以炊爨交州記曰竈頭山越人炊爨之處掘而得炭淮南子曰譬猶冰炭鉤繩也何時而可合冰寒炭熱鉤繩曲直無時得今人曰懸羽與炭而知燥濕之氣燥故炭輕溫故炭重又曰夫濕之至也莫見其形而炭已重矣風之至也莫見其象而木已動矣又曰天下莫相憎於膠膝膠漆相持不解故曰憎一曰膠入漆中則敗漆入膠中亦敗膠以多少推之故曰相憎也而莫相愛於冰炭冰得炭則解解歸水復其性炭得冰則保其炭故曰相愛也膠膝相賊冰炭相息也抱朴子曰柳乃速朽者也而燔之為炭則億載而不敗呂氏春秋曰豫讓欲報襄子滅鬢去眉變其形容作乞人往乞於其妻曰然貌無似吾夫者其因何類吾夫之甚讓乃吞炭而變其聲異苑曰信安鄭徽年少時登前橋仿佯見一老翁以小囊與徽云此是君命慎勿零落若有破碎便為凶兆言訖失所在徽密開看是一挺炭意乃秘之雖家人不之知也永初三年年六十病篤語弟子云吾齒盡矣可試啟此囊見炭碎析於是遂亡桓譚新論曰舉火夜作燃炭乾牆王況釋時論曰融融者皆趍熱之士得鑪冶之門者唯挾炭之子鹽鐵論曰冰炭不可以同器語林曰洛下少林木炭止如粟狀羊琇驕豪乃擣小炭為屑以物和之作獸形後何召之徒共集乃以溫酒火熱既猛獸皆開口向人赫赫然諸豪相矜皆服而効之賈誼鵬鳥賦曰天地為鑪兮造化為工陰陽為炭兮萬物為銅灰周禮曰蟈氏掌去蛙黽焚壯鞠以灰洒之則死壯鞠鞠不華者齊魯之間謂蛙為黽耿黽也蟈與耿黽尤怒鳴為聒人耳去之其煙被之則凡水蟲無聲杜子春云假令風從東方來則於水東面為煙令煙西行彼之水上又曰慌力見切帛以欄為灰渥淳諸帛實其澤器淫之以蜃渥讀如繒人渥管之渥以欄木之灰漸釋其帛也杜子春云淫當為泥書亦或為湛鄭司農云澤器謂澤之器謂澤之器蜃清其灰而盝力瀆切之而揮之清澄也於灰登而盝晞之晞而揮去其蜃史記曰秦商鞅作苛法有棄灰於道者刑之漢書曰韓安國坐抵罪獄吏田甲辱之安國曰死灰獨不復燃乎甲曰燃即溺之又曰武帝穿昆明池得黑灰有外國胡云此是天地劫灰之餘也問東方朔信然後漢書曰楊琰為零陵太守時蒼梧群賊攻劫琰制車數十乘置灰車中從風散灰賊不得視因以敗之魏略曰文欽為廬江太守為都督王陵所奏欽訴曹爽爽謂曰陵責卿載灰兩舡何為乎聞足下起染舍故燒作灰耳吳錄曰張舉字子清為句章令有婦殺夫者因焚屋言燒死其弟疑而訟之舉按屍開口視之無灰令人取豬兩頭殺一生而俱焚之開視其口所殺者無灰生者有灰乃明夫先死婦後燒之婦遂首服焉晉書曰鳩摩羅什天笁人也中書監張資病驍騎將軍呂光愽營救療有外國道人羅又云能差資病光喜給賜甚厚羅什以其誑詐告資曰又不能為益徒煩費耳冥運雖隱可以事試也乃以五色絲作繩結之燒為灰末投水中灰若出水還成繩者病不可愈須臾灰聚浮出復為繩又療果無効少日資云少日猶無幾時隋書曰齊神武霸府田曹參軍信都芳深有巧思能以管候氣仰觀雲色嘗與人對語即指天曰孟春之氣至矣人往驗管而飛灰已應每月所候言皆無爽又為輪扇二十四埋地中以測二十四氣每一氣感則一扇自動他扇並住與管灰相應若符契焉又曰開皇九年平陳後高祖遣毛爽及蔡子元于普明等以候節氣依古於三重密室之內以木為案十有二具每取律呂之管隨十二辰位置于案上而以土埋之上平於地中實葭莩之灰以輕緹素覆律口每其月氣至與律冥符則灰飛衝素散灰出外而氣應有早晚灰飛有多少或初入月其氣即應或至中下旬間氣始應者或灰飛出三五夜而盡或終一月而上末高祖異之以問牛弘弘對曰灰飛半出為和氣吹灰全出為猛氣吹灰不能出為衰氣和氣應, SBCK: ''}
