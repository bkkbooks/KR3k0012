  - {type: variant, offset: 3839, length: 1, content: 暈, krp: 庚申天大霧三日帝之洛水上見大魚負圖書露後漢書曰光武建武十二年甘露降南行唐又曰明帝永平十七年春正月甘露降於甘陵又曰明帝永平十七年甘露降泉陵洮陽二縣二縣属零陵泉陵城在今永州零陵縣北洗陽故城在湘原縣西北東觀漢記曰光武時甘露降四十五日宋書曰文帝元嘉中甘露頻降狀如細雪唐書曰武徳九年四月二十三日甘露降于中華殿之桐樹泫氷雪以示群臣又曰貞元十年正月西川奏當管甘露降松栢竹藂等二千四百四十二處尚書中候曰堯時甘露降孝經援神契曰王者徳至天則降甘露禮斗威儀曰君治政則軒轅之精散爲甘露降又曰人君乗土王其政太平則甘露春秋運斗樞曰天樞得則甘露濁孫氏瑞應圖曰耆老得敬則松栢受甘露尊賢老不失細微則竹葦受甘露又曰甘露者味清而甘降則草木暢茂食之令人壽又曰王者徳至於天和氣感則甘露降於松栢白虎通曰甘露者美露也降則物無不盛論衡曰甘露味如飴王者太平之應鶡冠子曰聖徳上及太清下及萬靈則膏露下晉中興徴祥記曰甘露仁澤也凝如脂甘如飴王者徳至於天則降吕氏春秋曰隂陽之和不長一類甘露時雨不私一物山海經曰軒丘鳯卵民食之甘露民食之所欲自從魏明帝與東河王詔曰昔先帝時甘露屢降仁壽殿前自吾建承露盤以來甘露復降芳林園雷史記曰髙祖母劉媪甞遊大澤之陂夢與神遇時雷電冥晦見蛟龍上巳而有姙遂産髙祖河圖曰黄帝以雷精起尚書中候曰秦穆公岀狩天震大雷下有火化爲白雀衘丹書集公車曰秦伯覇也氣史記曰秦始皇曰東南有天子氣於是東遊以厭當之又曰髙祖隱於芒碭山澤間吕后與人俱求常得之髙祖恠問后后曰季所居上常有雲氣故從徃常得漢書曰宣帝繫獄望氣者言長安獄有天子氣詔繫者殺之内謁者令郭穰夜至郡獄邴吉拒使者不得入後漢書曰望氣者蘇伯河爲王莽使至南陽遥見望春亭郭唶曰唶音子夜切氣佳哉鬰鬱葱葱然東觀漢記曰和帝時十一月夜白氣長三丈起圖東北軍市西域象竒踈勒二國歸義魏書曰武宣卞皇后琅邪開陽人文帝母也以漢延熹二年十二月乙己生齊郡白亭有黄氣滿室移日父敬侯恠之以問卜者王旦曰此吉祥也晉書曰天子氣森森然感華蓋或如龍如馬宋書曰明帝太始二年六月日入後有黄白氣東西竟天光明潤澤也楚漢春秋曰項王在鴻門亞父諌曰吾使人望沛公其氣衝天五彩相繆或似人此非人臣之氣不若殺之應劭漢官儀曰丗祖封禪乆有白氣一丈東南極望正直壇所有青氣上與天属遥望不見顛瑞命之符也光漢書郊祀志曰武帝祀汾隂汾隂傍有光如降上遂立后土祠於汾隂又曰郊太一祠上有光又曰宣帝祠丗宗神光興於殿旁神光又興於房中如燭狀東觀漢記曰李軼等䜟言劉氏當復起李氏爲輔遂市兵弩絳衣赤㥽歸舊廬望見廬南有若火光以爲人持火呼之光遂盛曈曈上属天有頃不見上異之後魏書曰太祖武皇帝母曰獻明賀皇后夢日岀室内寤而光明属天歆然有感乃生於叅合之北其夜復有光明又曰髙祖孝文皇帝母曰李夫人皇興元年八月生平城紫宫神光照室天地氤氲和氣充塞尚書中候曰堯沉壁於河榮光岀符瑞圖曰玉燭者瑞光也見則四時之色洞如燭也又曰景者光也亦曰象也光而可象應行而臻故茂徳内彰則瑞光外燭又曰昌光者瑞光也見於天漢髙受命昌光出􅎮又曰榮光者瑞光也其光五彩焉出於水上又曰五光彩者天見五色三光重輝輝于地也春秋合誠圖曰五光垂彩天下大嘉人尚書中候洛師謀曰吕尚岀遊于戊午有赤人雄出赤人水神授吾簡丹書曰命遊吕吾我也由用也禮含文嘉曰禹卑宫室盡力乎溝洫百馨用成神龍靈龜馴伏玉女降魏志曰咸熈二年晉太子襲位襄武縣言有大人見長丈餘跡長三尺一寸白髮著黄單衣黄巾柱杖呼民語云今當太平瑞應圖曰真人者黄帝時遊於池王者有茂徳不貪貨利則金人垂舡遊王後池神龍魚河圖曰黄帝攝政蚩尤兄弟八十一人並獸身人語銅頭鐡額食沙石造兵杖威震天下誅殺無道不仁不慈黄帝行天下事仰天而歎天遣玄女下授黃帝兵信神符而令制伏蚩尤蚩尤歸臣因使鎮兵以制八方尚書中候曰堯使禹治水禹辭天地重功帝欽擇人帝曰出爾命圖爾乃天言天使汝治水非我禹臨河觀有白靣長人魚身岀曰吾河精也表曰文命治淫水表安也言曰文治治淫决之水臣河圖去入淵河圖謂括地象漢書曰武帝太始四年三月幸不其如淳日其音基不其山名因以爲縣祠神人于交門宫應劭曰神人蓬萊仙人之屬也晉灼曰琅邪縣有交門漢武帝所造若有嚮坐拜者作交門之歌山海經曰有人首蛇身長如轅左右有首衣紫衣冠名曰延維人主得而食之伯天下即于虵也瑞應圖曰黄帝時西王母使乗白鹿來獻白環一本云帝舜時西王母遣使獻玉環又曰二羙母者蓋神女也周穆王時持酒來酌之管子曰桓公北征孤竹未至卑耳溪十里援弓將射未敢發見人物具焉右祛不走馬管仲曰臣聞登山之神有俞兒者長尺人物具焉覇王之君與走馬前道也祛衣其前水右祛示從右渉至溪如所言公拜焉曰仲父之聖若此莊子曰齊桓公遊於澤管仲御公見鬼仲曰澤有委虵其大如轂其長如轅紫衣朱冠見人則舉其首而立見之者殆乎覇公曰此寡人之所見也墨子曰鄭繆公晝日處廟有神入門而左鳥身素服面狀正方繆公乃懼神曰無奔帝享汝明徳使錫汝壽十年使君國昌公問神神曰予爲勾芒太平御覽卷第八百七十二}
