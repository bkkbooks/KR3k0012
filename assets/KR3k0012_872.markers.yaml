  - {type: variant, offset: 3362, length: 313, content: 有哉淮南子曰月暈以蘆灰環之缺一面則暈亦闕一面焉又曰爛灰生繩又曰仲夏之日無燒灰草木盡成無暴布無爛之也又曰夫吹灰而欲無昧涉水而欲無濡不可得也又曰女媧殺黑龍以濟冀州黑龍為冀州害積盧灰以止淫水盧黑也一曰葦灰也又曰伐薪而為炭燔草而為灰抱朴子曰吳世姚光者有火術吳主試之積荻數千束里之因猛火而燔荻了盡謂光當已化為煙燼而光端坐灰中振衣而起把一卷書吳主取其書視之不能解也又曰外國作水精盌實是合五百種灰以作之今交廣多有其法六韜曰武王伐殷得二大夫而問之殷國將亡亦有妭乎其一人對曰殷國常雨血雨灰血石武王曰大災妖也其一人曰是非大妖也殷國大妖三十七章雨血雨灰血石臣不為妖災武王踧然而問三十七章之妖對曰殷君好射人喜以人餧虎喜割人心喜殺婦喜殺人父孤人之子吳越, WYG: 威儀矣}
