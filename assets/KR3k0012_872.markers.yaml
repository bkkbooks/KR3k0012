  - {type: variant, offset: 3834, length: 3, content: 畫遺灰, krp: 王者上感皇天}
  - {type: variant, offset: 3835, length: 2, content: 遺灰, WYG: 其像以制八方尚書中候曰堯使禹治水禹辭天地重功帝欽擇人帝曰禹爾命圖乃天言天使汝治水非我禹臨河觀有白靣長人魚身出曰吾河精也表曰文命治滛水表命也言命汝治此滛水授禹河圖去入淵漢書曰武帝太始四年三月幸不其山祠神人於交門宫若有嚮坐拜者作交門之歌山海經曰有人首蛇身長如轅左右有首衣紫衣冠名曰延維人主得而食之伯天下瑞應圖曰黄帝時西王母使乗白鹿來獻白環一本云帝舜時西王母遣使獻玉環又曰二羙母者蓋神女也周穆王時持酒來酌之管子曰桓公北征􅋃竹未至卑耳溪十里援弓將射未能發見人物具焉冠右祛衣走馬前疾管仲曰臣聞登山之神有俞兒者長尺人物具焉霸王之君興登山神見走馬前疾道也祛衣示前有水右祛示從右渉至溪如所言公拜焉曰仲父之聖若此莊子曰齊桓公遊於澤管仲御公見鬼仲曰澤有委蛇其大如轂其長如轅紫衣朱冠見人}
