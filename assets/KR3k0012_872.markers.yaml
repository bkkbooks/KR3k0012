  - {type: variant, offset: 565, length: 224, content: 風急因命縱火煙乃張天許邁別傳曰邁少名暎高平閻慶等皆就暎受學暎曰閻君可服氣以斷穀彭君宜餌藥以益氣慶等將去暎為燒香以五色煙出暎亦自去莫知所在列仙傳曰甯封子黃帝時人也為帝陶正有神人遇之為其掌火能出五色煙三秦記曰秦始皇葬驪山牧羊童失火燒之三月煙不絕廣古今五行記曰前涼御史宋詡房壁中煙出掘而視之別柱燋然詡謂弟澄曰柱之為字左木右主宋字含木木燋宋破而主存此災之大者也宜思防之其後張邕誅宋混諸黨王子年拾遺記曰員嶠之山四百里有池周一千里色隨四時變中有神龜八足六眼背負, SBCK: 斗}
