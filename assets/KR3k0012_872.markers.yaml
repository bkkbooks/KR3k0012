  - {type: variant, offset: 3838, length: 2, content: 月暈, WYG: 捧其首而立見之者殆乎覇公曰此寡人之所見也墨子曰鄭繆公盡日處廟有神入門而左烏身素服靣狀正方繆公乃懼神曰無奔帝享汝明徳使錫汝壽十年使君國昌公問神神曰子爲勾芒太平御覽卷八百七十二}
