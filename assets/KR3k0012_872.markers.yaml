  - {type: variant, offset: 244, length: 244, content: 有司奏庭燎在公車門外今更集議舊在端門內依舊門內施詔曰尚書奏九年庭燎當在端門內明帝時在公車門外可依舊安趙書曰石勒造燎高十丈上盤置燎下盤安人以燎絙繳上下石虎鄴中記曰石虎正會殿庭中端門外及閶闔門前設庭燎各二合六處皆六丈說苑曰齊桓公設庭燎為士之欲造見者期年而士不至東野鄙人有以九九之術見者桓公曰九九足以見乎對曰臣非以九九為足以見巨聞主君設庭燎以待士期年而不至夫士所以不至者以君天下賢君也四方之士皆自論不及君故不至也夫九九薄能耳而君猶禮之況賢於九九者乎桓公曰善禮之期月而士至煙說文曰煙火氣也焆焆然也, SBCK: ''}
