  - {type: variant, offset: 3096, length: 175, content: 臣縱衰氣應者其君暴高祖駮之曰臣縱君暴其政不平非月別而有異也今十二月律於一歲內應並不同安得暴君縱臣若斯之甚也弘不能對莊子曰鄭有巫曰季咸知人之死生存亡禍福壽夭期以歲月旬日若神鄭人見之皆棄而走不喜自聞死日列子見之而心醉歸以告壺子曰嘗試與來以吾示之明日列子與之見壺子出而咸謂列子曰嘻子之先生死矣不活矣不可以旬數矣吾見怪焉見濕灰焉濕灰均其寂魄化此乃至人無感之時, SBCK: 餘六星耀光四起宫斗北斗魁星}
