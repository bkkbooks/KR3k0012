  - {type: variant, offset: 3838, length: 0, content: '', krp: 景星見春秋佐助期曰虞舜之時景星出房春秋孔演圖曰天子舉賢則景星放於天又曰王者徳政海内冨昌則鎮星入闕闕華闕之門當帝坐春秋元命苞曰老人星者治平則見見則主壽帝以秋分候之南郊又曰帝位明即畢星光大也春秋文耀鈎曰老人星見則主安下不見則兵起又曰王者安静則老人星見春秋運斗樞曰王政和平則老人星臨國萬民以歌孝經援神契曰徳至天則斗極明又曰天子刑于四海徳洞淪冥八方神化則斗霣精又曰神靈滋液百􅡋寳用有景星又曰鎮星舎房符明道興宋均曰符驗明而道興年豊也又曰太白合表四夷從服之象宋均曰合表從中道也太白進退主侯兵合從中道無進退孝經内事曰天子行孝徳則景星見又曰王者動得天度止得地意從容中道隂陽合度則太微五帝座星明以光也又曰王者得禮之制不傷財不害民君臣和草木昆蟲各象正性則三台爲齊明不闊不狹如其度宋均云君臣制度宫室車旗多少各有科品則應也又曰王者敬諸父有差則大角光明以揚宋均云諸父伯仲叔季也斗爲帝車帝所乗也角堅剛而居帝前帝敬諸父感天應之也又曰王者逺嫌別微殊貴賤抑驕臣息亂子則屏星爲之明以潤帝座章而光宋均云屏星五帝座爲之明以潤章大也又曰天子得雲臺之禮則五車均明河行不離其常宋均云天子考察天氣若梓愼見星之祲者也所以獲福禳災五車主五榖民禳災得福民無飢寒之困五榖星之明以應之河若離常則有决溢之憂則九榖失所殖矣又曰昆弟有親親之思則鈎鈴不離房宋均云鈎鈴逺房則踈闊今昆弟相親故天相近明其友也又曰王者厚長㓜各得其正則房心有德星應之宋均云房心爲天子明堂布政之宫長㓜厚則政教著明房心應之而時也風史記曰黃帝行德天爲之起風從西北東必以庚辛一秋中五至大赦三至小赦也唐書曰肅宗在平凉未知所適㑹朔方留後杜鴻漸奉牋迎上又河西行軍司馬裴冕勸上治兵於靈武以圗進取上發平凉至豊寜南見黄河天壍之固欲整軍北渡以保豊寧忽大風飛沙跬歩之間不辨人物及回軍趍靈武風沙頓止天地廓清尚書大傳曰王者徳及皇天則祥風起又曰舜將禪禹于時八風脩通禮斗威儀曰王者乗火而王其政昇平則祥風至宋均云即景風其來長養萬物符瑞圖曰翔風者瑞風也一名景風春爲發生夏爲長盈秋爲収藏尽爲安寧春秋繁露曰王者思及金石則凉風出孝經援神契曰王者徳八方則祥風至王充論衡曰王者太平則五日一風風不嗚條風角曰風清明髙不及地二三尺此下有聖人或清明其來乆長而不動揺樹木枝葉此龍徳在其下晉陽春秋曰劉𥙿平慕容超將鎭下邳聞盧循反何無忌敗乃還次山陽造楊子江問行人曰朝廷如何對曰則尚未至劉公若還無所憂也𥙿將濟而風急衆咸難之𥙿曰吾有天命風當自息如天不助覆溺何足可怯即命登舟舟移而風止雨禮斗威儀曰君乗金而王其政平則嘉雨時至春秋說題辭曰大節二十四小節十二功徳分也故一歳三十六雨塩鐵論曰太平之丗則雨不破塊旬日一雨雨必以夜符瑞圖曰周公時天下太平當此之時旬而一雨雨必以夜又曰靈雨者遇歳亢旱責躬引咎理察冤枉退去貪殘側身修政則降以靈雨非誠感瑞則非靈也又曰昔殷湯之丗天下大旱以六條自責於是大雨淮南子曰神農之丗甘雨以時五榖蕃殖尸子曰神農氏治天下欲雨則雨五日爲谷雨旬五日爲行雨萬物咸利故謂之神雲史記曰若煙非煙若雲非雲郁郁紛紛蕭索輪囷是謂慶雲嘉氣也漢書曰武帝封禪夜有白雲封中出魏書曰文帝生時有雲氣青色而圎如車蓋當其上終日望者以爲至貴之證宋書曰丗祖在江州起義建牙軍門有紫雲二段落于牙上唐書曰玄宗甞出畋有紫雲在其上從者望而得之又曰肅宗自奉天而北夕次永壽有白雲起西北長數丈如樓閣之狀識者以爲天子之氣尚書中候曰堯徳清平乃沉壁於河白雲起禮斗威儀曰景雲景明也言雲氣光明也又曰周成王治平觀於河青雲浮春秋孔演圖曰黄帝將興黄雲升於堂孝經援神契曰王者徳至山陵則景雲出又曰天子孝則景雲見孫氏瑞應圖曰景雲見者太平之應也符瑞圖曰矞慶雲也内赤外黄一曰矞雲矞音橘也帝王丗紀曰黄帝有景雲之瑞以雲紀官又曰堯母慶都生而神異有黄雲覆上漢武故事曰帝幸梁父祀地山上有白雲如蓋又曰宣帝祀甘泉有紫雲從西北來散於殿前歸藏曰大昊之盛有白雲出自蒼梧入于大梁徐爰宋書曰髙祖北征至洛陽常有紫雲見於軍上霧史記曰髙祖至平城匈奴圍上七日大霧漢人徃來故不覺帝王丗紀曰黃帝五十年秋七}
  - {type: variant, offset: 3839, length: 1, content: 暈, SBCK: 庚申天大霧三日帝之洛水上見大魚􅀒圖書露後漢書曰光武建武十二年甘露降南行唐又曰明帝永平十七年春正月甘露降於甘陵又曰明帝永平十七年甘露降泉陵洮陽二縣二縣属零陵泉陵城在今永州零陵縣北洗陽故城在湘原縣西北東觀漢記曰光武時甘露降四十五日宋書曰文帝元嘉中甘露頻降􅃺如細雪唐書曰武徳九年四月二十三日甘露降于中華殿之桐樹泫氷雪以示群臣又曰貞元十年正月西川奏當管甘露降松栢竹藂等二千四百四十二處尚書中􅀱曰堯時甘露降孝經援神契曰王者徳至天則降甘露禮斗威儀曰君治政則軒轅之精散爲甘露降又曰人君乗土王其政太平則甘露春秋運斗樞曰天樞得則甘露濁孫氏瑞應圖曰􅂄老得敬則松栢受甘露尊賢老不失細微則竹葦受甘露又曰甘露者味清而甘降則草木暢茂食之令人壽又曰王者徳至於天和氣感則甘露降於松栢白虎通曰甘露者美露也降則物無不盛論衡曰甘露味如飴王者太平之應鶡冠子曰聖徳上及太清下及萬靈則膏露下晉中興徴祥記曰甘露仁澤也凝如脂甘如飴王者徳至於天則降吕氏春秋曰隂陽之和不長一􅀋甘露時雨不私一物山海經曰軒丘鳯􅆑民食之甘露民食之所欲自從魏明帝與東河王詔曰昔先帝時甘露屢降仁壽殿前自吾建承露盤以來甘露復降芳林園雷史記曰髙祖母劉媪甞遊大澤之陂夢與神遇時雷電􅁳晦見蛟龍上巳而有姙遂産髙祖河圖曰黄帝以雷精起尚書中􅀱曰􅁗穆公岀狩天震大雷下有火化爲白雀衘丹書集公車曰􅁗伯覇也氣史記曰􅁗始皇曰東南有天子氣於是東遊以厭當之又曰髙祖隱於芒碭山澤間吕后與人俱求常得之髙祖恠問后后曰季所居上常有雲氣故從徃常得漢書曰宣帝繫獄望氣者言長安獄有天子氣詔繫者殺之内謁者令郭穰夜至郡獄邴􅁻拒使者不得入後漢書曰望氣者蘇伯河爲王莽使至南陽遥見望春亭郭唶曰唶音子夜切氣佳哉鬰鬱葱葱然東觀漢記曰和帝時十一月夜白氣長三丈起圖東北軍市西域象竒踈勒二國歸義魏書曰武宣卞皇后琅邪開陽人文帝母也以漢延熹二年十二月乙己生齊郡白亭有黄氣滿室移日父敬侯恠之以問卜者王旦曰此􅁻祥也晉書曰天子氣森森然感華蓋或如龍如馬宋書曰明帝太始二年六月日入後有黄白氣東西竟天光明潤澤也楚漢春秋曰項王在鴻門亞父諌曰吾使人望沛公其氣衝天五彩相繆或似人此非人臣之氣不􅀂殺之應劭漢官儀曰丗祖封禪乆有白氣一丈東南極望正直壇所有青氣上與天属遥望不見顛瑞命之符也光漢書郊祀志曰武帝祀汾隂汾隂傍有光如降上遂立后土祠於汾隂又曰郊太一祠上有光又曰宣帝祠丗宗神光興於殿旁神光又興於房中如燭狀東觀漢記曰李軼等䜟言劉氏當復起李氏爲輔遂市兵弩絳衣赤㥽歸舊廬望見廬南有若火光以爲人持火呼之光遂盛曈曈上属天有頃不見上異之後魏書曰太祖武皇帝母曰獻明賀皇后夢日岀室内寤而光明属天歆然有感乃生於叅合之北其夜復有光明又曰髙祖孝文皇帝母曰李夫人皇興元年八月生平城紫宫神光照室天地氤氲和氣充塞尚書中􅀱曰堯沉壁於河榮光岀符瑞圖曰玉燭者瑞光也見則四時之色洞如燭也又曰景者光也亦曰象也光而可象應行而臻故茂徳内彰則瑞光外燭又曰昌光者瑞光也見於天漢髙受命昌光出􅎮又曰榮光者瑞光也其光五彩焉出於水上又曰五光彩者天見五色三光重輝輝于地也春秋合誠圖曰五光垂彩天下大嘉人尚書中􅀱洛師謀曰吕尚岀遊于戊午有赤人雄出赤人水神授吾簡丹書曰命遊吕吾我也由用也禮含文嘉曰禹卑宫室盡力乎溝洫百馨用成神龍靈􅀛馴伏玉女降魏志曰咸熈二年晉太子襲位襄武縣言有大人見長丈餘跡長三尺一寸白髮著黄單衣黄巾柱杖呼民語云今當太平瑞應圖曰真人者黄帝時遊於池王者有茂徳不貪貨利則金人垂舡遊王後池神龍魚河圖曰黄帝攝政􅃖尤兄弟八十一人並獸身人語銅頭鐡額食沙石造兵杖威震天下誅殺無道不仁不慈黄帝行天下事仰天而歎天遣玄女下授黃帝兵信神符而令制伏􅃖尤􅃖尤歸臣因使鎮兵以制八方尚書中􅀱曰堯使禹治水禹辭天地重功帝欽擇人帝曰出爾命圖爾乃天言天使汝治水非我禹臨河觀有白靣長人魚身岀曰吾河精也表曰文命治􅁋水表安也言曰文治治􅁋决之水臣河圖去入淵河圖謂括地象漢書曰武帝太始四年三月幸不其如淳日其音基不其山名因以爲縣祠神人于交門宫應劭曰神人蓬萊仙人之屬也晉灼曰琅邪縣有交門漢武帝所造􅀂有嚮坐拜者作交門之歌山海經曰有人首蛇身長如轅左右有首衣紫衣冠名曰延維人主得而食之伯天下即于虵也瑞應圖曰黄帝時西王母使乗白鹿來獻白環一本云帝舜時西王母遣使獻玉環又曰二羙母者蓋神女也周穆王時持酒來酌之管子曰桓公北征􅀌竹未至卑耳溪十里援弓將射未敢發見人物具焉右祛不走馬管仲曰臣聞登山之神有俞兒者長尺人物具焉覇王之君與走馬前道也祛衣其前水右祛示從右渉至溪如所言公拜焉曰仲父之聖􅀂此莊子曰齊桓公遊於澤管仲御公見􅀑仲曰澤有委虵其大如轂其長如轅紫衣朱冠見人則舉其首而立見之者殆乎覇公曰此寡人之所見也墨子曰鄭繆公晝日處廟有神入門而左鳥身素服面狀正方繆公乃懼神曰無奔帝享汝明徳使􅃬汝壽十年使君國昌公問神神曰予爲勾芒太平御覽卷第八百七十二}
