markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', SBCK: 太平御覽卷第八百七十二休徴部一叙休徴日月星風雨雲霧露雷氣光人神叙休徴書曰休徴叙美行之驗曰肅時雨􅀂君行敬則時雨順之曰乂時􅊙􅀂君行政治敗時暘順之曰哲時燠若君能照哲則時煖順之曰謀時寒若君能謀則時寒順之曰聖時風􅀂君能通理則時風順之禮曰國家將興必有禎祥又曰用民必順不奪農時故無水旱昆蟲之災民無凶飢妖孽之疾言大順之時隂陽和也又曰四靈以爲畜故飲食有由也何謂四靈麟鳯􅀛龍謂之四靈又曰天降膏露地岀醴泉山出器車河岀馬圖鳯凰麒麟皆在郊棷典藪同也􅀛龍在宫沼其餘鳥獸之􅆑胎皆可俯而闚也則是無故非有他事使之言也先王能脩禮以逹順故此順之實也又曰􅂛中于天而鳯皇降􅀛龍假功成而太平隂陽氣和而致象物假音格又曰享帝於郊而風雨節寒暑時五行木爲雨金爲陽}
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_872-1a}
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_872-1b}
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書太平御覽卷八百七十二宋李昉等撰休徴部一叙休徴日月星風雨雲霧露雷氣光人神叙休徴書曰休徴曰肅時雨若曰乂時𤾉若曰哲時燠若曰謀時寒若曰聖時風若禮曰國家將興必有禎祥又曰用民必順故無水旱昆蟲之災民無㓙饑妖孽之疾又曰四靈以爲畜故飲食有由也何謂四靈麟鳯龜龍謂之四靈又曰天降膏露地出醴泉山出噐車河出馬圖鳯凰麒麟皆在郊棷棷聚草也龜龍在宫沼其餘鳥獸之卵胎可俯而闚也則是無故非有他事使之然也先王能修禮以達義體信以達順故此順之實也又曰升中于天而鳯凰降龜龍假又曰享帝于郊而風雨莭寒暑時黄帝太階六符經曰三階平則隂陽和風雨時社稷咸獲其宜天下大安是謂太平韓詩外𫝊曰成王之時有三苗貫桑而生爲一秀大幾滿車長幾充箱成王問周公曰此何物也周公曰三苖同爲一秀意者天下殆同一也比期三年果越裳氏重九譯而至獻白雉於周公曰道路悠逺山川幽深恐使人之未達也故重譯而來周公辭曰吾何以見賜也譯曰吾受命國之黄髪曰乆矣天之不迅風疾雨也海之不波溢也三年於兹矣意者中國殆有聖人盍徃朝之於是周公乃敬求其所以來故大雅云於萬斯年不遐有佐又曰祥者福之先見者也風角占曰福先見曰祥春秋繁露曰王者人之始也王正則元氣和順風雨時景星見黄龍下又曰五帝三王之治天下不敢有君民之心什一而税教以愛使以忠敬長老親親而尊尊不奪民時使民不過嵗三日民家給人足無怨望忿怒之患故天爲下甘露朱草生醴泉出風雨時嘉禾興鳯凰麒麟遊于郊日孫氏瑞應圖曰君賢得土地則日有黄抱又曰揚光者人君不假臣下之權則日揚光又曰王者動不失日揚光也符瑞圗曰日二黄人守者外國八方自來降也尸子曰少皥氏邑於窮桑日五色互照窮桑易説曰日者至陽之精象君徳𤣥黄照耀五色無主春秋潛潭巴曰君徳應陽君臣得道度則日含王字含王字者日中有王字也王者徳象日光所照無不及也春秋考異郵曰黄帝將興有黄雀赤頭立於日傍黄帝曰黄者土精赤者}
