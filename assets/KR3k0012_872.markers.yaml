  - {type: variant, offset: 498, length: 2, content: 井水, SBCK: 君乗上而王其政太平則月黃而多輝禮瑞應圖曰昔太清之治丗也昭明于日月禮含文嘉曰人君政尊則日月貞明春秋潜潭巴曰君臣和得道叶度則日月大光明天下和平上下俱昌延年益壽星孫氏瑞應圖曰景星者大星也狀如半月生於晦朔助月爲明玉者不私於人則見又曰王者徳至幽微則景星見又曰景星者星之精也先後月岀於西方王者不私人以官使賢者在位則見佐月爲明又曰王者孝行之}
