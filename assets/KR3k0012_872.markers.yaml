  - {type: variant, offset: 498, length: 2, content: 井水, WYG: 君乗土而王其政太平則月黄而多輝禮瑞應圗曰昔太清之治世也昭明于日月禮含文嘉曰人君政尊而制命則日月貞明春秋潛潭巴曰君臣和得道叶度則日月大光明天下和平上下俱昌延年益夀星孫氏瑞應圖曰景星者大星也狀如半月生於晦朔助月爲明王者不私於人則見又曰王者徳至幽㣲則景星出又曰景星者星之精也先後月出於西方王者不私人以官使賢者在位則見佐月爲明又曰王者孝行之}
