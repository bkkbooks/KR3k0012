  - {type: variant, offset: 3274, length: 147, content: 南郭子綦隱几而坐仰天而噓嗒焉似喪其偶荅焉解體若失其配疋也顏子成游立侍乎前曰何居乎形固可使如槁木而心固可使如死灰乎死灰槁木取其寂寞無情耳夫任自然而志是非者其體中獨任天真而已又何所有哉淮南子曰月暈以蘆灰環之缺一面則暈亦闕一面焉又曰爛灰生繩又曰仲夏之日無燒灰草木盡成無暴布無爛之也又曰夫吹灰而欲無昧涉, SBCK: 君乗}
