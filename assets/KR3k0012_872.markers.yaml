  - {type: variant, offset: 826, length: 407, content: 此石常浮於水邊方數百里其色多紅燒之有煙數百里升天則成香雲香雲遍潤則成香雨又曰晉文公焚林以求介推有白鵶繞繞而噪或集介子之側火不能焚晉人嘉之為立臺號曰思煙列子曰秦之西有義渠之國者其親戚死聚柴積而焚之煙上謂之登遐然後成為孝子抱朴子曰伯喈識絃音於煙燼之餘也淮南子曰冬至甲子受制木用事火煙青七十二日丙子受制火用事火煙赤七十二日戊子受制土用事火煙黃七十二日庚子受制金用事火煙白七十二日壬子受制水用事火煙黑西域諸國志曰屈茨國有山夜則有光火晝則恒煙焉風俗通曰亂如俗如縕者糞除不潔草芥集眾火就燒之謂之縕言其煙氣縕縕取其希有淆亂鍾會芻蕘論曰焚林成煙其似於雲顏延之廷詰曰火含煙而妨火桂懷囊而蠹殘桂然大勝滅蠹壯則桂折焦贛易林夫之小過曰十里望煙散煙日分形體滅亡終不見君炭說文曰炭燒木也記曰季秋草木黃落乃伐薪為炭左傳曰邾子在門臺門上有臺臨庭閽以瓶水沃庭邾子望見之怒閽曰夷射姑旋焉旋小便也命執之見其不潔執射姑也弗得滋怒自投于床廢于鑪炭爛遂卒廢墮, SBCK: 􅀂將霣}
