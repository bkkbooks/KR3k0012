  - {type: variant, offset: 1, length: 11, content: 部四庭燎說文曰庭燎火燭, WYG: 榮爵者賞也余當立大功乎黄雀者桑}
  - {type: variant, offset: 1, length: 4, content: 部四庭燎, krp: 爲燠水爲寒土爲風黄帝太階六符經曰三階平則隂陽和風雨時社稷咸獲其冝天下大安是謂太平韓詩外傳曰成王之時有三苗貫桑而生爲一秀大幾滿車長幾充箱成王問周公曰此何物也周公曰三苗同爲一秀意者天下殆同一也此期三年果有越裳氏重九譯而至獻白雉於周公曰道路悠逺山川幽深恐使人之未逹也故重譯而來周公辭曰吾何以見賜也譯曰吾受命國之黄髮日乆矣天下之不迅風疾雨也海之不波溢也三年於兹矣意者中國殆聖人蓋徃朝之於是周公乃敬其所來故小雅云有黭淒淒興雲祁祁以是知太平無飄風暴雨亦明矣又曰祥者福之先見者也風角占日福先見日祥春秋繁露曰王者人之始也王正則元氣和順風雨時景星見黄龍下又曰五帝三王之理云天下不敢有君民之心什一而稅教以愛使以忠敬長老親親而尊尊不奪民時使民不過歳三日民家給人足無怨望忿怒之患故天爲下甘露朱草生醴泉出風雨時嘉禾興鳯凰騏驎遊于郊日孫氏瑞應圖曰君賢得土地則日有黄抱又曰楊光者人君不假臣之權則日楊光又曰王者動不失日楊光也符瑞圖曰日二黄人守者外國人方自來降也又曰少皥氏邑於窮桑日五色牙照窮桑易}
