  - {type: variant, offset: 2601, length: 978, content: 景道君乘赤雲車太上飛行羽經曰中和之真駕錦輿茅君內傳曰王母乘綠景輿玉光八景經曰東方始景道君乘青雲之車駕蒼龍又曰南方玄景道君乘五色雲車駕鳳皇又曰南方靈景道君乘赤雲車西南方元景道君乘紫雲車駕六龍西方明景道君乘白雲車駕白虎北方玄和道君乘珠玉之車金根經曰玉帝君乘碧霞九鳳飛行之輿玉清隱書曰太微君登八瓊之輦傾蓋霞城又曰東北方道君葛獻乘八輿飛龜車下治人泥丸宮登真隱訣曰太元真人乘白虎輿有八色雲軿真誥曰仙人許玉斧乘一新青犢車又曰王眉壽小妹中候夫人乘白牛車上清九真中經內訣曰南極老人丹陵上真迎以綠雲之輿蓋西極老人素靈于期迎以黃颷車人元老人中央上玄迎以曲晨之蓋五老一合俱升紫靈王君傳曰王君乘虎輦金蓋玉輪出入上清受事太素南岳魏夫人傳曰夫人乘虎輦玉輿隱輪之車真誥曰南岳夫人駕九蓋之軿搜神記曰玉女成智瓊駕輜軿車從八婢闕五符經曰鐘止上有金臺七寶紫闕元氣之所舍天帝君所治處也殿太洞玉經曰大暉者玉清天中殿名也上皇王真之所遊處也太平經曰大空瓊臺洞真之殿金華之內侍女眾真之所處靈書紫文上經曰有太空瓊臺丹玕之殿靈寶赤書曰妙行真人詣元始受赤書五篇真文於是元始命眾真入太定金臺玉寶之殿九光華房紫書金根經曰有黃金殿玄妙內篇曰有七寶殿堂太洞玉經曰有羽景之堂在太無之庭玉容者太上之明堂也洞景金玄經曰玉帝命太微天帝君坐萬靈於房軒散華香於玉宇留連八瓊之室曲宴九琳之堂外國放品經曰有光碧之堂臺大洞玉經訣曰西田之瑤臺大帝所處有玉清臺也又有散花臺太上玉京經曰玉京有七寶宮宮有七寶玄臺即太上治所又有天寶臺上清經曰有紫碧玄臺大洞真經曰上清真人惣仙大司馬長生法師登太常滄浪山洞臺中雙玉穴酣飲紫明芝液真誥曰有玉華室有刻石真人五勝文曰駕飛龍於西華之臺謁拜帝真赤書玉訣經曰太玄上宮太素真人常以春分之日會諸仙官於崑崙瑤臺校定靈寶真經又曰陽臺真人常以立冬之日會諸仙官玉女於靈寶陽臺之上校定學道簿籙本行經曰有尋真玉臺眾篇經曰帝尊引眾真人集太空金臺內音玉字經曰九層之臺處乎玉京之山煥乎玄都之上有太真玉印又曰馥朗天中玉京玄臺之別號西靈真人常誦無量洞章遊行其上大洞玉經曰九天之上有明真臺茅君內傳曰辰中真人帶廷生符於滄浪之臺導引三光經曰定光真人在皇曾天絕觀臺中導引元氣又曰九變真人在玉完天誥陽無臺中又曰導仙真人在何童天華林蔭雲臺中又曰雲華真人在平育天玄唱寶蓋臺中又曰陽王真人在太真臺中又曰法氣真人在飛臺中又曰澤嬰真人在越衡天無極觀臺中真誥曰, WYG: ''}
