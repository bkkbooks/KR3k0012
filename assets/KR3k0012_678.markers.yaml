  - {type: variant, offset: 59, length: 0, content: '', SBCK: 昔上元以隠文授}
  - {type: variant, offset: 60, length: 16, content: 微紫房中有一童子名于景精字會元當, SBCK: 和玉女玉女授㓜陽君以文封於九疑洞室登眞隠訣曰太極}
  - {type: variant, offset: 60, length: 4, content: 微紫房中, WYG: 上王經隠注寳訣衆經之祖也太上令傳太極諸侯公王卿伯未得此位不得之矣道士}
  - {type: variant, offset: 60, length: 4, content: 微紫房中, krp: 上玉經隱注寳訣衆經之祖也太上令傳太極諸侯公王卿伯未得此位不得之矣道士}
  - {type: variant, offset: 65, length: 0, content: '', WYG: 見此書則皆應為仙公也𤣥籙宿名將定焉靈寳真}
  - {type: variant, offset: 65, length: 0, content: '', krp: 見此書則皆應爲仙公也玄籙宿名將定焉靈寳眞}
  - {type: variant, offset: 66, length: 109, content: 童子名于景精字會元當帝君之前捧赤玉案上有所主命籍又曰太一公子白元司命桃君五人皆著朱衣絳巾各捧一白玉案上有所主簡玉清隱書曰太微天帝君進拜於帝皇之几又曰上皇帝君乃推几偃詠虛眺太空吟玉清之隱書歌元景之靈章揚音霞際清微玉桭太洞, WYG: ''}
