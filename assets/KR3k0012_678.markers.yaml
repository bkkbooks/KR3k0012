  - {type: 'tls:seg', offset: 4158, content: '', id: KR3k0012_CHANT_678-64a.7}
  - {type: variant, offset: 4159, length: 3, content: 諸得道, krp: 領寳經乗虎斾虎輦金盖玉輪八景飛輿杖九色節出入上清受事太素寢宴太極南岳魏夫}
  - {type: variant, offset: 4163, length: 0, content: '', krp: 師之撰傳顯於丗南岳魏夫人内傳曰夫人姓魏諱華存字賢安任城人晉司徒文康公魏舒女也少讀老莊春秋三傳五經百子事常別居一園獨立閑處服餌胡麻父母偪之強適太保公椽南陽劉㓜彦疇昔之志存而不虧後㓜彦爲修武令隨之縣舎閑齋別寢入室百日所期仙靈季冬月夜半四真人來降于室太極真人安度明東華青童君碧海景林莫清虚真人王子登於是夫人拜乞長生度丗青童君曰此清虚真人者爾之師也當}
  - {type: variant, offset: 4164, length: 8, content: 鍊品目戶諸天內音, krp: 業焉景林真曰爾應爲紫虚元君上真司命封南岳夫人也夫人謝曰此是婢子有幸賜以性命自陳畢東華小童指而笑曰丹心苦哉於是清虚真人王君乃命侍女華散條李明瓮䓁川披雲藴開玉笈出太上寳文八}
