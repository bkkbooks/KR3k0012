  - {type: variant, offset: 78, length: 0, content: '', SBCK: 寳章者東海靑童君授㳙子以封掌名山㳙子剖鯉所獲是太上召三一守形也以朱書素佩}
  - {type: variant, offset: 79, length: 5, content: 前捧赤玉案, SBCK: 左肘勿經履汙穢佩之八年而三一俱見矣三一者三元真一君也授其封掌之教又曰李翼字仲甫以七變法傳左慈慈修之以變化万端此經在茅眞人傳後道士以還丹方殊祕故畧出別爲一卷茅君傳曰太眞元君西母授􅀃明堂玄眞經云太}
  - {type: punctuation, offset: 80, content: ，, id: KR3k0012_CHANT_678-bkkpn24}
  - {type: 'tls:seg', offset: 80, content: '', id: KR3k0012_CHANT_678-2a.7}
