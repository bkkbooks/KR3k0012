  - {type: variant, offset: 4124, length: 134, content: 清淨致無為之意即道為舍也䆫諸天內音經曰天真皇人開寒靈之䆫又曰南極玄䆫主諸得道人受鍊品目戶諸天內音經曰九玄丈人封於玉京紫戶之內洞景金玄經有玉戶門大洞玉經曰太素在幽玄之上九宮列金門於太素之天瓊羽之門蘭室上清宮中門戶名也大上有瓊羽之門四明門者上清玉帝之南門也紫書金根經曰東華, WYG: 相迎矣}
