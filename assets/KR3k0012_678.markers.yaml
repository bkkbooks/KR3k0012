  - {type: variant, offset: 338, length: 3, content: 局腳案, WYG: 一人應得此文者有仙籙宿命者也欲有所授當擇其人入諸名山八極周流天下鬼神無敢犯之者太清元始天中之王母初學道之師也又曰皇人者太帝所使出娥媚山黄帝徃授真一伍牙法抱朴子曰黄帝東至清邱過風山見紫府先生受三皇内文}
  - {type: page-break, offset: 338, content: '', id: KR3k0012_WYG_678-2a, image: WYG0899/WYG0899-0102a.png}
  - {type: variant, offset: 338, length: 3, content: 局腳案, krp: 一人應得此文者皆有仙籙宿命者也欲有所授當擇其人入諸名山八極周流天下鬼神無敢犯之者太清元始天中之王母𥘉學道之師也又曰皇人者太帝所使在峨嵋山黄帝徃授眞一五牙法抱朴子曰黄帝東至青丘過風山見紫府先生受三皇内文}
  - {type: punctuation, offset: 341, content: ，, id: KR3k0012_CHANT_678-bkkpn117}
