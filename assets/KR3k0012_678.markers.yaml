  - {type: variant, offset: 4305, length: 0, content: '', WYG: 本絹素書緘之甚宻題云大魏真君二年七月七日道士冠謙之藏之名山用傳同好筌竟不曉其義因入秦至驪山下逄一老母髽髻當頂餘髪半垂弊衣扶杖神状甚異路傍見遺火燒樹因自語}
