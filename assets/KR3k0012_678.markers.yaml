  - {type: variant, offset: 2921, length: 0, content: '', SBCK: 此清虚真人者爾之師也當受業焉景林真曰爾應爲紫虚元君上真司命封}
  - {type: substitution, offset: 2922, original: 岳, replacement: 嶽, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-20630}}
  - {type: variant, offset: 2925, length: 0, content: '', SBCK: 也夫人謝曰此是婢子有幸賜以性命自陳畢東華小童指而􅀏曰丹心苦哉於是清虚真人王君乃命侍女華散條李明瓮䓁川披雲藴開玉笈出太上寳文八經隱書大洞真經靈書八道紫度炎光石精玉馬神真虎文髙仙羽玄三十一卷即手授夫人也王君昔學道在陽洛山遇南極夫人西城王君授此三十一卷經行之成真人今所授者是南極西城之夲經也陽洛山有洞臺是清虚之别宫也王君當授魏夫人經之時起立北向而誓曰太上三玄九皇髙真太帝太帝使教子魏華存於是景林真又授夫人黄庭内景經一名太上琴心一名大帝金書一名東華玉篇令晝夜誦之王君又告曰子􅀂不在山中隱身齋戒則大洞眞經不可妄讀也至于虎經龍書八素隱文之屬竒祕玄奥􅀂不齋戒絶丗不可施行子今且可誦黄庭内經歩躡七元存五星之神而巳人間行之亦足感通變化欲成際㑹我有以相迎矣方諸青童怡然小留四眞吟唱乃命北寒玉女宋聮㳙彈九氣之璈東華玉女煙景珠擊西盈之鐘雲林玉女賈屈庭吹鳯戾之簫飛玄玉女鮮于靈金拊九合玉節王君乃語夫人曰訣諸要訖乃別去夫人守静日進在丗八十三年以晉成帝咸和九年王君與東華青童來降時歳在甲午二眞人與夫人藥題曰隠遷白醫川神散石精金光化形靈丸使稱疾忽行尅期有定俱㑹陽洛宮言畢二眞人去夫人即服藥因稱脚疾閉目寢息飲而不食到七日其夜半之後太一玄仙遣飈車來迎}
