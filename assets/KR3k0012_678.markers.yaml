  - {type: variant, offset: 41, length: 4, content: 眾真宴禮, SBCK: 􅀂道士得祕聖之經皆當杜祕於一人之口者即眞靈之文將墜於獨見何縁得存於永代乎傳授但當必得其人豈可祕而不出是斯文永翳也太極經曰太上玉經隱注寳訣衆經之祖也太上令傳太極諸侯公王卿伯未得此位不得之矣道士有見此書則皆應爲仙公也玄籙􅀫名將定焉靈寳眞一經曰太靈眞人告太極左宮仙公曰吾昔授太上靈寳洞玄自然太眞上寳經爲太極眞人依太上法傳授於人定志經曰元始告右玄眞人曰汝授此經可擇其人傳之弥布無外三皇經曰百萬人中或有一人應得此文者皆有仙籙􅀫命者也欲有所授當擇其人入諸名山八極周流天下􅀑神無敢犯之者太清元始天中之王母􅀄學道之師也又曰皇人者太帝所使在峨嵋山黄帝徃授眞一五牙法抱朴子曰黄帝東至青丘過風山見紫府先生受三皇内文以刼召萬神南至圎壠䕃建木觀百靈西至中黄子受九加之方過崆峒從廣成子授自然之經北至洪隄上具茨見大隗君黄蓋童子受神芝圖還陟王屋得神丹注記至峨嵋山見黄人於玉堂問眞一之道曰夫長生仙方惟有金液守形却惡獨有眞一之道古人尤重也黄帝自然體道者也猶復陟王屋而受丹經登崆峒而問廣成徃具茨而事大隗適東岱而奉中黄入金谷而咨子心論道飬而證玄素精推歩而授雷􅄮窮神姦記而白澤相地理而書青烏救傷殘而綴金冶故能畢該秘要窮盡道眞按神仙經云昔黄帝老子奉事元君元君以受要訣况乎不建彼二君者安能自得仙度丗者乎按荆山經及龍首記皆云黄帝服神丹又曰彭祖八百年安期千年斯其壽之過人逺矣􅀂果有不死之道彼何不遂仙乎豈非禀命受氣偶得其多者乎按彭祖經云佐堯曆夏至啇爲大夫啇王從受還年之術行之有効欲殺彭祖以絶其術祖覺而逃去去時年八百又曰紫微玄宮玉飛天眞書太清元始授西母佩之位登仙宗眞人衛從又曰玄洲仙伯􅀜天万仙眞書東海小童授以得道人佩之一名仙人道籙一名鳯眞籙太玄登仙盟文又崑崙墉臺靈飛太眞大上丈人以授得道者佩之周行五岳山神授職一名五岳兵符佩之金石爲開又曰蓬來髙上眞書成青天上皇以傳􅇞封佩此眞符横行江海一名蓬萊太玄玉札一名九流眞書北陵丈人授以馬師皇致龍來又天帝丈人黄上眞書佩之知吉㐫未兆之事上清經曰上清眞人登}
