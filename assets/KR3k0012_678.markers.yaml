  - {type: variant, offset: 1461, length: 3, content: 黃雲者, krp: 城赤城羅浮句曲林屋括蒼崑崙蓬萊􅌡州方丈滄浪白山八停之屬也五岳及諸名山皆有洞室或三十里二十里十里岳洞方百里也句曲山秦時名爲句金壇以洞天内有金壇百丈因以致名也漢靈帝時勑郡縣採句曲之金以充武庫孫權時又遣宿衛人採金常輸官句曲山毎至三月十八日十二月二日東卿司命茅君當}
