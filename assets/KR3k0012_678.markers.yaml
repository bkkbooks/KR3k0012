  - {type: variant, offset: 1121, length: 125, content: 王母方諸青童君並乘綠景之輿駕神虎之軿同造茅盈於句曲之山金璮之陰又曰飛仙祕道招五辰之晨常能行之十五年則南極老人丹陵上真迎以綠雲之輦西極老人素靈子期迎以黃颷之車北極老人玄上仙皇迎以玄景之龍東極老人扶陽公子迎以青軿之輦中元老人上玄子迎以曲晨之蓋五老會合俱升, SBCK: 詣}
