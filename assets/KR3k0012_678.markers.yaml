  - {type: page-break, offset: 2925, content: '', id: KR3k0012_SBCK_678-7b}
  - {type: variant, offset: 2926, length: 0, content: '', SBCK: 氣騁御徑入帷寢其時子弟侍疾衆親滿側莫之覺也夫人遂用藏景之法託形劒化徐登飈輪徑之陽洛居隱元之臺志栖上元誠感九天丹心真契澄神太素夫人遂北詣上清宫太微天帝遣九宫太眞侍玉元晨郎李明期授夫人神鳯之章使封山召雲中央黄老君遣正一羽晨侯公陽子明授夫人龍衣虎帶丹靑飛裙十絶華幡使川登行上清攝眞命仙三素髙元君遣左華九成夫人范定英授夫人流金火鈴}
