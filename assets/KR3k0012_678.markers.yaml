  - {type: variant, offset: 4258, length: 0, content: '', krp: 玉篇令晝夜誦之王君又告曰子若不在山中隱身齋戒則大洞眞經不可妄讀也至于虎經龍書八素隱文之屬竒祕玄奥若不齋戒絶丗不可施行子今且可誦黄庭内經歩躡七元存五星之神而巳人間行之亦足感通變化欲成際㑹我有以相迎矣}
  - {type: variant, offset: 4262, length: 1, content: 宮, WYG: 怡然小留四真吟唱乃命北寒玉女宋聮涓弹九氣之璈東華玉女煙景珠繫西盈之鍾林云玉女賈屈庭吹鳳戾之簫飛𤣥玉女鮮子靈今拊九合玉節王君乃語夫人曰訣諸要訖乃别去夫人守静日進在世八十三年以晉成帝咸利九年王君與東華青童來降時嵗在甲午二真人與夫人藥題曰隱遷白醫川神散石精金光化形靈丸使稱疾忽行尅期}
  - {type: variant, offset: 4262, length: 0, content: '', krp: 怡然小留四眞吟唱乃命北寒玉女宋聮㳙彈九氣之璈東華玉女煙景珠擊西盈之鐘雲林玉女賈屈庭吹鳯戾之簫飛玄玉女鮮于靈金拊九合玉節王君乃語夫人曰訣諸要訖乃別去夫人守静日進在丗八十三年以晉成帝咸和九年王君與東華青童來降時歳在甲午二眞人與夫人藥題曰隠遷白醫川神散石精金光化形靈丸使稱疾忽行尅期有定俱㑹陽洛}
  - {type: variant, offset: 4263, length: 0, content: '', krp: 言畢二眞人去夫人即服藥因稱脚疾閉目寢息飲而不食到七日其夜半之後太一玄仙遣飈車來迎駕氣騁御徑入帷寢其時子弟侍疾衆親滿側莫之覺也夫人遂用藏景之法託形劒化徐登飈輪徑之陽洛居隱元之臺志栖上元誠感九天丹心真契澄神太素夫人遂北詣上清宫太微天帝遣九宫太眞侍玉元晨郎李明期授夫人神鳯之章使封山召雲中央黄老君遣正一羽晨侯公陽子明授夫人龍衣虎帶丹靑飛裙十絶華幡使川登行上清攝眞命仙三素髙元君遣左華九成夫人范定英授夫人流金火鈴九蓋之軿使彈制万魔飛輪太無太上玉晨大道君遣繡衣使者孟六竒授九色之節雙珠月明神虎之符錦旂虎旌使位主羣神以威六天太素三元君遣保禁仙都衷文堅右嬪元姬趙約羅授夫人西華玉女三百八景飛輿玄景九龍使侍衛執巾上詣三清扶桑太帝君遣八玄仙伯柯原首五方天帝君簡肅正等授夫人玉札金文位爲紫虚元君領上眞司命使主諸學道死生圖籍攝御之官關校罪考金關後聖君命仙伯牙叔平授夫人青瓊之板丹緑爲文位爲南岳夫人比秩仙公給曲晨飛蓋以遊九宫使治天台大霍山洞臺之中主下訓奉道教授當爲眞仙者令一月再登玉清三登太素四謁玉晨宫宴扶桑之髙臺於是夫人授王母之命且還王屋山小}
  - {type: variant, offset: 4264, length: 0, content: '', WYG: 定俱㑹陽洛宫言畢二真人去夫人即服藥因稱脚疾閉目􅆍息飲而不食到七日其夜半之後太一𤣥仙遣飈車來迎駕氣聘御徑入帷􅆍其時子弟侍疾衆親滿側莫之覺也夫人遂用藏景之法託形劒化徐登飈輪徑之陽洛居隱元之臺志栖上元誠感九天丹心真氣澄神太素夫人遂北詣上清宫太微天帝遣九宫太真侍玉元晨郎李明期授夫人神鳳之章使封山召云中央黄老君遣正一羽晨侯公陽子明授夫人龍衣虎帯丹青飛裙十絶華幡使川登行上清攝真命仙三素髙元君遣左華九成夫人范定英授夫人流金火鈴九蓋之軿使彈制萬魔引輪太旡太玉晨大道君遣繡衣使者孟}
