  - {type: variant, offset: 235, length: 307, content: 案上請寶文以授眾真也洞神經曰拂拭几案置經於前也像名經曰東方上尊憑七寶鳳文之曲几敷說道要真經法輪經曰三真立空之案以七寶懸覆經上眾篇經曰元始上尊凝真遐想撫几高抗命召五帝論定陰陽推數劫會移校河源檢籙天度洞神經曰有局腳案以置經符也太上黃素經曰凡修受大洞真經雌一奇文者恒置經於几格潔靜之處九幽經曰帝尊在九清妙境三元宮中御三氣之華寶雲玉座惣校圖籙拔濟諸苦二十四生圖曰披九光玉蘊出金書紫字玉文丹章三部八景二十四生圖盛以白玉立空之按九色之中飛文錦蓋懸覆經上龍飛尺素隱訣曰太微天帝君命羽仙侍郎捧金案以請飛行羽章也上清真文王經朝文曰有流明大靈侍言玉案十二枚又始內傳曰諸天各奉蓮華座以寶蓋覆之神仙傳曰黃老遣仙官玉女持金案玉杯盛藥以賜沈羲, SBCK: 人}
