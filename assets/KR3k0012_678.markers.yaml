  - {type: variant, offset: 1830, length: 441, content: 曰真皇參駕黃霞周行四方飛蓋綠軿上造金闕靈寶赤書曰詣天真人乘碧霞玉輿太洞真經曰太上乘一景之輿受九暉太晨隱符上清隱書龍文經曰王母乘九蓋華輿眾真侍衛紫文經曰方諸東玄東海青童大君齊戒於丹闕黃房之內三年乘碧雲輿太元真人傳曰有班龍之輿金真玉光經曰有玉輦又上清三天列紀有紫輦太洞玉經曰青童君乘雕玉之軿司禁真伯乘日月之軿又曰太極元君乘陵羽之車太上經曰有白鸞之車茅君內傳曰東海青童君乘颷車葛玄傳曰鶴鳴山石室中設自然座有金華蓋又曰五帝真人並乘八景玉輿二十四生圖經曰後聖李君遊西河歷觀八方值元始乘八景玉輿駕玄龍而來李君問天書玉字未究妙章元始俾極道真於是吐洞玄內觀玉符以授之變化經曰景輿丹軿紫軒九天帝王所乘也上清訣曰玄母乘三素之輿又曰元父所控赤羽飛車左御絳鸞右駕紫鳳尸素訣曰太微天帝君登白鸞之車駕黑羽之鳳遊碧水之境大洞玉經曰皇上帝垂明玉之輪轉宴於日中矣茅君內傳曰無上道君成給八景瓊輿鳳璽金真曲晨飛蓋又曰青華小童道君乘碧霞之輿又曰上真君赤帝乘絳琳碧輦又曰太清真君乘青龍紫羽蓋又曰太元真人杖紫雲之節乘班龍之轝白, SBCK: 乗}
