  - {type: variant, offset: 47, length: 2, content: 屈節, SBCK: 滄浪山諸太極眞人授以丹青玉鑪錬雲根經三元布經曰昔寗玄甫受此經}
  - {type: variant, offset: 50, length: 3, content: 几前太, SBCK: 皇上眞人九年祕藏白空山齋戒百日忽見其巖有王文銀簡今封}
  - {type: variant, offset: 50, length: 2, content: 几前, WYG: 獨見何縁得存於永代乎傳授但當必得其人豈可秘而不出是斯文永翳也}
  - {type: variant, offset: 50, length: 2, content: 几前, krp: 一人之口者即眞靈之文將墜於獨見何縁得存於永代乎傳授但當必得其人豈可祕而不出是斯文永翳也}
