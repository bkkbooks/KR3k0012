  - {type: variant, offset: 4154, length: 0, content: '', krp: 西極揔真君者茅司命之師也生於啇末服青精䭀飯九轉丹用曲晨劒解之道治西城山宫年三十着繡衣芙蓉冠把鈴帶劒一漢元帝時降陽洛山授玉清虚上經三十一卷晉時又降魏夫人於陽洛臺毎以三月十二月亦同來句曲推校學仙别有傳未顯於丗神仙傳云降蔡經家者是此君也又曰清虗王真人揔真王君弟子南岳魏夫人師漢元帝時辭家人華隂山九年太極真人降授二法後入地胏山終南山一名地胏又登陽洛山平帝時}
  - {type: variant, offset: 4156, length: 0, content: '', krp: 夫人西城王君同降授上經三十一卷王君共詣}
  - {type: variant, offset: 4157, length: 1, content: 䆫, krp: 洲請書真名乃還西城修行道成於是乗飛飊車遊行天下後登白空山詣紫清太素三元君受流金火鈴豁落七元八景飛晨神筞玉璽畢又還西城太上遣賜繡羽晨盖雙珠月明素羽瓊干丹紱錦旌太素又遣賫成命之書以爲太素清虗真人治玉屋山}
  - {type: substitution, offset: 4157, original: 䆫, replacement: 窗, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19377}}
