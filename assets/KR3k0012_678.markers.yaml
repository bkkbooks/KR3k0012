  - {type: variant, offset: 1247, length: 84, content: 虛此五老蓋五星之真人也非如裴君星中五帝之公又異乎雲牙五方之老上學之法順之者飛仙也又曰八道祕言者道有八條其言高妙閑心靜室寥朗虛真亦將得見丹景之氣三素飛雲八輿朱輦紫霞瓊輪上, SBCK: ''}
  - {type: punctuation, offset: 1248, content: ，, id: KR3k0012_CHANT_678-bkkpn362}
