  - {type: variant, offset: 3712, length: 323, content: 中觀靈書經曰有洞靈之觀金字題觀四面又有九靈之觀紫陽之觀又紫微上宮有通陽之觀主得度之人功德輕重宮三元品戒經曰九氣始凝三光發明結青黃白之氣置上元三宮太洞玉經曰太初有華陽之宮會方之宮小有真天中有萬華之宮玉君之治所玉晨宮中有玉映之宮又有元君六淵之宮黃老圓華之宮上清真陽之宮太極上宮主眾仙誦詠室大洞玉經曰太霞之中有白雲之室太虛元君所處三皇經曰蜀郡西峨嵋山石室舊有三皇文此文不與天下眾文同百萬人中未有一人得者龜山元籙曰有瓊瑤之室外國放品經云有瓊華之室洞景金玄經曰八瓊之室又三華寶曜內真上經曰玉室上清經有碧室房大洞玉經曰三華城者玉清之房名也在玉城之中陽安元君所處無上真人內傳曰有流雲九色之房仙公內傳曰崑崙山上有積石瑤房太上紫書籙曰白玉母入於龜山王闕處於青玉宮中, krp: 宫}
