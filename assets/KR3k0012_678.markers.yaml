  - {type: variant, offset: 1052, length: 0, content: '', WYG: 起拜稽首而立命坐復席上元乃𠡠侍女出紫錦囊開緑金之笈三元流珠經丹景道精經隱地八術經太極緑景經曰凢四部以傳固衷西王母𠡠侍女季方明出丹瓊之凾披雲珠之笈以玉佩金璫太霄隱書洞飛二景内真符以傳司命茅君上元曰阿母隱書之妙上真内經天仙所寳封之金臺佩入太㣲動則八景玉輿静則晏寝金堂此文妙矣阿環太極緑經等可以致明月黄華得白日之赤精也及西母上元俱去惟王君獨留經日於}
