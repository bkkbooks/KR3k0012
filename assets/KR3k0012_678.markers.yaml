  - {type: 'tls:seg', offset: 84, content: '', id: KR3k0012_CHANT_678-2a.8}
  - {type: variant, offset: 85, length: 0, content: '', SBCK: 立玄􅀟神四明玄眞内映明堂外清吞息二暉長生神精上􅀘司命監御万靈六華充溢撤視黄寜此四十字即玄眞之本經也其後王母惣眞更演􅀃行事之法猶如九眞中經惟以龍書爲主也太上刻於鳯臺南軒非惣眞弟子不教非司命之玄挺不傳又曰西母携王君茅盈以詣固􅂨之宮固􅂨盈二弟也西母撫背告之曰汝道雖成所聞未足我}
  - {type: page-break, offset: 85, content: '', id: KR3k0012_SBCK_678-3b}
  - {type: variant, offset: 87, length: 1, content: 主, SBCK: 授汝乃遣侍女郭宻香與上元夫人相聞云但不相見四千餘年天事勞我致以罕面可暫來否當此相待上元夫人遣一侍女荅曰阿環再拜上問起居逺隔絳河擾以官事遂違顔色近五千年仰戀光潤情係無違宻香至奉信承降尊於茅固處聞}
  - {type: variant, offset: 89, length: 2, content: 籍又, SBCK: 之際即當飾駕先􅀍太常君勑使詣希林校定三元之籙正尓暫徃如是當還還便束帶願暫少留茅固因問王母不審上元夫人何眞也}
