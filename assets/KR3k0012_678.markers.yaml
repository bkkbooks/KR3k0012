  - {type: variant, offset: 746, length: 300, content: 內傳曰白玉龜山連玉床帳西母處之太上黃素方曰青精執在紫巫之山化王之室內有玉案也洞真七聖玄記曰左仙上䟽九天帝王七聖几下飛行羽經曰修存三一道法坐金床玉几金爐玉匕太真人詩曰太微啟玉案列仙傳曰太室山中有地仙邛䟽臥床几案真誥曰鹿跡山中有絕洞洞中自有石床石榻曲夾輿輦太上飛行羽書曰玉清則上清之高真上清則太清之高神太清則飛仙之高靈凡行玉清之道出則諸天侍衛建七色之節駕紫雲軒十二玉輪六師啟路飛龍翼轅行上清之道出則五帝侍衛建紫毛之節駕飛雲丹車位准上清左右仙卿行太清之道出則五帝侍衛建五色之節駕龍輿白虬啟道太極參軒又曰王惣真為茅盈召朱冠使者二人乘流景之輿蒼虵把綠節仗瓊竿羽旄橫曰朱雲翳景使者並繡衣芙蓉冠持紫素之書各百字以付, WYG: 勑}
