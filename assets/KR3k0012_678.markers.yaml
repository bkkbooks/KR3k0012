  - {type: variant, offset: 1248, length: 7, content: 此五老蓋五星之, WYG: ''}
  - {type: variant, offset: 1257, length: 750, content: 也非如裴君星中五帝之公又異乎雲牙五方之老上學之法順之者飛仙也又曰八道祕言者道有八條其言高妙閑心靜室寥朗虛真亦將得見丹景之氣三素飛雲八輿朱輦紫霞瓊輪上清靜眄廻轡三元高皇秉節靈童攀轅太素擁蓋南極臨軒於是溟光外映象燭太虛子能見之不煩凝霜濯華玄腴金丹也一道祕言曰以八節日清朝北望清朝小早於清且也有紫綠白雲者是為三元君三素飛雲也其時三元君乘八輿上詣天帝玉清君也子候見當再拜自陳乞侍輪轂二道祕言曰以八節日夜半東北望有玄青黃雲者是為太極天帝君乘八景之輿上詣高上玉皇三道祕言曰以甲子上旬戊辰已巳之日清旦西北望有紫青黃雲者是為太極真君三素雲也其時太極真君及上真人乘玄景綠輿上詣紫微宮四道祕言曰以甲戍上旬戊寅巳卯之日清旦東南望有赤白青雲者是為扶桑太帝君三素雲也其時扶桑太帝君乘光明八道之輦上詣紫微宮五道祕言曰以甲申上旬戊子巳丑之日清旦正西望見白赤紫雲者是為太素上真白帝君三素雲也其時太素上真人白帝君乘脩條玉輦上詣玉天玄皇高真也六道祕言曰甲午上旬戊戍巳亥之日清旦正南望有青赤黃雲者是為南極上真赤帝君其時乘絳琳碧輦上詣閬風臺七道祕言曰以甲辰上旬戊申巳酉之日清旦西南望見綠紫青雲者是為上清真人時乘玄景八光丹輦上詣高上天帝八道祕言曰以甲寅上旬戊午巳未之日清旦正東望有朱碧黃雲者是太虛上真人其時乘徘徊玉輿上詣大帝君八節日見三素雲者紫雲在上綠雲次之白雲在下共相沓也子謹視之移度經曰真皇參駕黃霞周行四方飛蓋綠軿上造金闕靈寶赤書曰詣天真人乘碧霞玉輿太洞真經曰太上乘一景之輿受九暉太晨隱符上清隱書龍文經曰王母乘九蓋華輿眾真侍衛紫文經曰方諸東玄東海青童大君齊戒於丹闕黃房之內三年乘碧雲輿太元真人傳曰有班龍之輿金真玉光經曰有玉輦又上清三天列紀有紫輦太洞玉經曰青童君乘雕玉之軿司禁真伯乘日月之軿又曰太極元君乘陵羽之車太上經曰有白鸞之車茅君內傳曰, WYG: ''}
