  - {type: variant, offset: 4279, length: 0, content: '', WYG: 城真人王方平太虛真人赤松子桐栢真人王子喬並降小有清虛上宫絳房之中各命侍女金石發響於是西母徘徊起立折腰俯唱曰哀此去留㑹刼盡天地傾家㑹絳阿内相與樂未央歌畢湏臾司命神仙諸𨽻屬及南岳神靈迎官並至西王母等與夫人俱同去詣天台霍山臺登真隱訣曰太㣲天帝金虎符太上玉真保皇道君以授於太上太微天帝君又曰太一}
