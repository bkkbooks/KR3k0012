  - {type: variant, offset: 2065, length: 535, content: 始乘八景玉輿駕玄龍而來李君問天書玉字未究妙章元始俾極道真於是吐洞玄內觀玉符以授之變化經曰景輿丹軿紫軒九天帝王所乘也上清訣曰玄母乘三素之輿又曰元父所控赤羽飛車左御絳鸞右駕紫鳳尸素訣曰太微天帝君登白鸞之車駕黑羽之鳳遊碧水之境大洞玉經曰皇上帝垂明玉之輪轉宴於日中矣茅君內傳曰無上道君成給八景瓊輿鳳璽金真曲晨飛蓋又曰青華小童道君乘碧霞之輿又曰上真君赤帝乘絳琳碧輦又曰太清真君乘青龍紫羽蓋又曰太元真人杖紫雲之節乘班龍之轝白虎之軿曲晨寶蓋又曰太素真君乘虎旗虎輦金蓋玉輪仗九色之節出入太清金真上光經曰太上大道君乘瓊輿碧輦和太道君乘白雲之車又云玄和道君驂駕玄龍太洞玉經曰八皇老君乘黃琅之車把紫鳳之節入太老之室萬華先生乘三素之景羽明之軿宴寢萬乘之室八素章曰四老廻錦軿萬仙朝帝房茅君內傳曰朱官使者駕蒼虬把綠杖真誥曰紫元夫人乘羽寶雲車駕九龍女騎九千披錦服青羽裙自然經曰龍轡昂昂雲蓋巍巍仙童玉女與我昇龍太上真經曰東方青帝九龍雲輿空洞經曰元始天尊從諸天人並乘玉輦瓊輪元始五老赤書玉篇真文序曰太上道君十方至真乘五色玉輪九色龍妙行真人乘象雲玉輦上詣玉都中極真人常乘象輪車上飛真人常乘九色龍遊玉清雲中飛天之神乘碧霞之輦遊於玉隆之天黑帝君乘四景之輿三元布經曰元始上尊乘紫輦茅君內傳曰王君乘九蓋之輦洞天經曰, WYG: ''}
