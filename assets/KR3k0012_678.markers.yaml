  - {type: variant, offset: 3864, length: 259, content: 白雲之室太虛元君所處三皇經曰蜀郡西峨嵋山石室舊有三皇文此文不與天下眾文同百萬人中未有一人得者龜山元籙曰有瓊瑤之室外國放品經云有瓊華之室洞景金玄經曰八瓊之室又三華寶曜內真上經曰玉室上清經有碧室房大洞玉經曰三華城者玉清之房名也在玉城之中陽安元君所處無上真人內傳曰有流雲九色之房仙公內傳曰崑崙山上有積石瑤房太上紫書籙曰白玉母入於龜山王闕處於青玉宮中朱紫之房靈寶赤書曰有九光華房外國放品經曰紫翠丹房舍道典曰道之清淨者吾舍也道因天清而清之因地靜而靜之因日月之光而明之因星辰之行而正之因萬物之性而消息之萬物中人為貴能使形無事神無體, WYG: ''}
