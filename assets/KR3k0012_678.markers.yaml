  - {type: variant, offset: 1052, length: 0, content: '', krp: 起拜稽首而立命坐復席上元乃勑侍女出紫錦囊開緑金之笈三元流珠經丹景道精經隱地八術經太極緑景經凢四部以傳固衷西王母勑侍女李方明出丹瓊之凾披雲珠之笈以玉珮金璫太霄隠書洞飛二景内眞符以傳司命茅君上元曰阿母隠書之妙上眞内經天仙所寳封之金臺佩入太微動則八景玉輿静則宴寢金堂此丈妙矣阿環太極緑經等可以致明月黄華得白日之赤精也及西母上元俱去惟王君獨留經日於}
  - {type: variant, offset: 1053, length: 0, content: '', WYG: 盈與二弟訣别而與王君俱去到赤城玉洞之府告二弟曰吾今去便有局任不得復數相徃來句曲山治所也漢光武建武七年三月丁巳遣使者吳倫賫黄金五十斤置於茅三君廟下四時祠}
