  - {type: variant, offset: 342, length: 1, content: 置, WYG: 刼召萬神南至壠䕃建木觀百靈西至中黄子受之九加之方過崆峒從廣成子授自然之}
  - {type: variant, offset: 342, length: 1, content: 置, krp: 刼召萬神南至圎壠䕃建木觀百靈西至中黄子受九加之方過崆峒從廣成子授自然之}
  - {type: variant, offset: 344, length: 1, content: 符, WYG: 北至洪堤上具茨見大隗君黄盖童子受神芝圖還陟王屋得神丹注記室峨嵋山見黄人於玉堂問真一之道曰夫長生仙方惟有金液守形却惡獨有真一之道右人猶重}
  - {type: page-break, offset: 344, content: '', id: KR3k0012_WYG_678-2b, image: WYG0899/WYG0899-0102b.png}
  - {type: variant, offset: 344, length: 0, content: '', krp: 北至洪隄上具茨見大隗君黄蓋童子受神芝圖還陟王屋得神丹注記至峨嵋山見黄人於玉堂問眞一之道曰夫長生仙方惟有金液守形却惡獨有眞一之道古人尤重也黄帝自然體道者也猶復陟王屋而受丹經登崆峒而問廣成徃具茨而事大隗適東岱而奉中黄入金谷而咨子心論道飬而證玄素精推歩而授雷𡵨窮神姦記而白澤相地理而書青烏救傷殘而綴金冶故能畢該秘要窮盡道眞按神仙經云昔黄帝老子奉事元君元君以受要訣况乎不建彼二君者安能自得仙度丗者乎按荆山經及龍首記皆云黄帝服神丹又曰彭祖八百年安期千年斯其壽之過人逺矣若果有不死之道彼何不遂仙乎豈非禀命受氣偶得其多者乎按彭祖經云佐堯曆夏至啇爲大夫啇王從受還年之術行之有効欲殺彭祖以絶其術祖覺而逃去去時年八百又曰紫微玄宮玉飛天眞書太清元始授西母佩之位登仙宗眞人衛從又曰玄洲仙伯關天万仙眞書東海小童授以得道人佩之一名仙人道籙一名鳯眞籙太玄登仙盟文又崑崙墉臺靈飛太眞大上丈人以授得道者佩之周行五岳山神授職一名五岳兵}
  - {type: variant, offset: 345, length: 0, content: '', krp: 佩之金石爲開又曰蓬來髙上眞書成青天上皇以傳寗封佩此眞符横行江海一名蓬萊太玄玉札一名九流眞書北陵丈人授以馬師皇致龍來又天帝丈人黄上眞書佩之知吉㐫未兆之事上清經曰上清眞人登大帝滄浪山諸太極眞人授以丹青玉鑪錬雲根經三元布經曰昔寗玄甫受此經於皇上眞人九年祕藏白空山齋戒百日忽見其巖有王文銀簡今封一通於白空山中夲行經曰丹靈眞人遇玄和先生受靈寳赤書五氣玄文黒帝眞文一篇髙玄經曰昔上元以隠文授太和玉女玉女授㓜陽君以文封於九疑洞室登眞隠訣曰太極帝君寳章者東海靑童君授㳙子以封掌名山㳙子剖鯉所獲是太上召三一守形也以朱書素佩之左肘勿經履汙穢佩之八年而三一俱見矣三一者三元真一君也授其封掌之教又曰李翼字仲甫以七變法傳左慈慈修之以變化万端此經在茅眞人傳後道士以還丹方殊祕故畧出別爲一卷茅君傳曰太眞元君西母授說明堂玄眞經云太上立玄雙神四明玄眞内映明堂外清吞息二暉長生神精上𥙷司命監御万靈六華充溢撤視黄寜此四十字即玄眞之本經也其後王母惣眞更演說行事之法猶如九眞中經惟以龍書爲主}
