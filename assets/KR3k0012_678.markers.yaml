  - {type: variant, offset: 4279, length: 0, content: '', krp: 母徘徊起立折腰俯唱曰哀此去留㑹刼盡天地傾嘉㑹絳阿内相與樂未央歌畢湏臾司命神仙諸隷屬及南岳神靈迎官並至西母等與夫人同去詣天台霍山臺登真隠訣曰太微天帝金虎符太上玉眞保皇道君以授於太上太微天帝君又曰太一}
  - {type: variant, offset: 4281, length: 3, content: 洞門北, WYG: 璽金真虎符方丈臺昭靈李夫人治方丈臺第十三朱舘中以晉興寜中降陽君曵紫錦衣帯虎神虎符流金鈴帯青玉色綬}
