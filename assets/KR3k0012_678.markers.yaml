  - {type: variant, offset: 1148, length: 0, content: '', WYG: 以水其門令得徃來上下也句曲洞天東通林屋北通岱宗西通峨嵋南通江浮皆大道也其間小徑新路阡陌沙㑹非一處也漢建陽之末左慈聞江東有此山故尋之齋戒三月而登山乃得其門入洞虛造隂宫二茅君授以神芝三種慈周旋洞室經年制度甚肅歎曰不圖天下復有如此之異乎至於地中洞天有三十六所王屋委羽西城酉𤣥青城赤城羅浮句曲林屋括蒼崑崙􅅫萊瀛州方丈滄浪白山八停之屬也五岳及諸名山皆有洞室或三十里二十里十里岳洞方百里也句曲山秦時名爲句}
