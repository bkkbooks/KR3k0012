  - {type: variant, offset: 4271, length: 3, content: 千里東, WYG: 元君遣使禁仙都衷文堅右嬪元姬趙約羅授夫人西華玉女三百八景飛輿𤣥景九龍使侍衞執巾上詣三清扶桑太常君遣八𤣥仙伯柯元首五方天帝君簡肅正等授夫人玉扎金文位爲紫虛元君領上真司命使主諸學道死生圖籍攝御之官闗校罪考金闗後聖君命仙伯牙叔平授夫人青瓊之板丹緑爲文位爲南岳夫人此秩仙公給曲晨飛盖以遊九宫使治天台大霍山洞臺之中主下訓奉道教授當爲真仙者令一月再登玉清三登登太素四謁玉晨宫宴扶桑之高臺於是夫人授王母之命且還王屋山小}
