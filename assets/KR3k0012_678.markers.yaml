  - {type: variant, offset: 399, length: 158, content: 校圖籙拔濟諸苦二十四生圖曰披九光玉蘊出金書紫字玉文丹章三部八景二十四生圖盛以白玉立空之按九色之中飛文錦蓋懸覆經上龍飛尺素隱訣曰太微天帝君命羽仙侍郎捧金案以請飛行羽章也上清真文王經朝文曰有流明大靈侍言玉案十二枚又始內傳曰諸天各奉蓮華座以寶蓋覆之神仙傳曰黃老遣仙官玉女持金案玉杯盛藥以賜沈羲又曰淮南王為八公進金玉之几執門, krp: 眞}
