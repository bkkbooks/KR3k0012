  - {type: variant, offset: 4275, length: 3, content: 青華門, WYG: 之中更齋戒三月九微元君龜山王母}
  - {type: variant, offset: 4275, length: 3, content: 青華門, krp: 清虗上宫絳房之中各命侍女金石發響於是}
