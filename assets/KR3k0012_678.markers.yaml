  - {type: variant, offset: 224, length: 0, content: '', SBCK: 太霄隠書洞飛二景内眞符以傳司命茅君上元曰阿母隠書之妙上眞内經天仙所寳封之金臺佩入太微動則八景玉輿静則宴寢金堂此丈妙矣阿環太極緑經等可以致明月黄華得白日之赤精也及西母上元俱去惟王君獨留經日於是盈與二弟訣別而與王君俱去到赤城玉洞之府告二弟曰吾今去便有局任不得復數相徃來句曲山是治所也漢光武建武七年三月丁巳遣使者呉倫賫黄金五十斤置于茅三君廟下四時祠以太牢至明帝永平二年詔丹陽句容茅眞人廟使營護脩守時邑人通呼此廟爲白鵠廟句曲之洞宫有五門石堦曲山以水其門令得徃來上下也句曲洞天東通林屋北通岱宗西通峨嵋南通羅浮皆大道也其間小徑新路阡陌沙澮非一處也漢建安之未左慈聞江東有此山故㝷之齊戒三月而登山乃得其門入洞虚造隂宮二茅君授以神芝三種慈周旋洞室經年制度甚肅歎曰不圖天下復有如此之異乎至于地中洞天有三十六所王屋委羽西城西玄青城赤城羅浮句曲林屋括蒼崑崙蓬萊􅌡州方丈滄浪白山八停之屬也五岳及諸名山皆有洞室或三十里二十里十里岳洞方百里也句曲山􅁗時名爲句金壇以洞天内有金壇百丈因以致名也漢靈帝時勑郡縣採句曲之金以充武庫孫權時又遣􅀫衛人採金常輸官句曲山毎至三月十八日十二月二日東卿司命茅君當是日請㧾真玉君大虚眞人東海青童君㑹于句曲之上好道者欲求神仙冝先齋戒俟此日登山陳乞也茅君即授以要道得入洞門又曰紫微元靈白玉􅀛臺九靈太真元君即西王母也上宰揔真王君東卿司命茅君之師右莢紫微夫人之母也居崑崙墉臺別治白玉􅀛山青琳之宫朱紫之房首戴華勝􅆎帶虎章葆盖沓暎羽旌􅄻庭以漢平帝時來降句曲華陽宫授司命茅君玉佩金璫經又奬教中小二君至晉成帝時與金闕聖君同降陽洛隠元臺授魏夫人玉清隠書四卷又穆天子傳所載詣西王母及降漢武者皆是也别有傳紀名靈鏡洞玄}
