  - {type: variant, offset: 3589, length: 0, content: '', WYG: 即西王母也上帝惣真玉君東卿司命茅君之師古英紫㣲夫人之母也居崑崙墉臺别治白玉龜山青琳之宫朱紫之房首戴華勝腰帯虎章葆盖沓映羽旌䕃庭以漢平帝時來降句曲華陽宫授司命茅君玉佩金璫經又奨教中小二君至晉成帝時與金闕聖君同降洛陽洛隱元臺授魏夫人玉清隱書四卷又穆天子傳所載詣西王母及降漢武帝者皆是也别有傳紀名靈鏡洞𤣥上經或曰大有妙經即今所存中元輔卿手執者是未顯於世主訓教天下學真之人又曰西極惣真君者茅司命之師也生於商末服青精􅀈飯九轉丹用曲晨劒觧之道治西域山宫年三十着綉衣芙蓉冠把鈴帯劒一漢元帝時降陽洛山授玉清虛上經三十一卷晉時又降魏夫人洛陽終臺每次三月十二月亦同來句曲推校學仙别有傳未顯於世神仙傳云降蔡經家者是此君也又曰清虛王真人惣真王君弟子南岳魏夫人師漢元帝時辭家人華隂山九年太極真人降授二法入地肺山終南山一名地肺又登陽洛山平帝時南極夫人西城王君同降授上經三十一卷王君其詣𤣥州請書真名乃還西城修行道成於是乗飛飈車逰行天下後登白空山詣紫清太素三元君受流金火鈴豁落七元八景飛晨神䇿玉璽畢又還西城太上遣賜綉羽晨盖雙珠月明素羽瓊干丹紼錦旌太素又遣賫成命之書以爲太素清虛真人治玉屋山主領寳經乗虎斾虎輦金盖玉輪八景飛輿杖九色節出入上清受事太素寝宴太極南岳魏夫人師之撰傳顯於世南岳魏夫人内傳曰夫人姓魏諱華存字賢安任城人晉司徒文康公魏舒女也少讀老荘春秋三傳五經百子事常别居一園獨立閑處服餌胡床父母偪之彊適太保公椽南陽劉幼彦疇昔之志存而不虧後幼彦爲脩武令隨之縣舎閑齋别􅆍入室百日所期仙靈季冬月夜半四真人來降於室太極真人安度明東華青童君碧海景林真清虛真人王子登於是夫人拜乞長生度世青童君曰此清虛真人者爾之師也當受業焉景林真曰爾應爲紫虛元君上真司命}
