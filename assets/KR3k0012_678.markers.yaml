  - {type: variant, offset: 1162, length: 107, content: 晨常能行之十五年則南極老人丹陵上真迎以綠雲之輦西極老人素靈子期迎以黃颷之車北極老人玄上仙皇迎以玄景之龍東極老人扶陽公子迎以青軿之輦中元老人上玄子迎以曲晨之蓋五老會合俱升紫虛此五老蓋五星之真人也非如裴君星中五帝之公又, krp: ''}
