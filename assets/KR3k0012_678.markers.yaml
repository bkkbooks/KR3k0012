  - {type: variant, offset: 691, length: 0, content: '', WYG: 撫背告之曰汝道雖成所聞未足我有所授汝乃遣侍女郭宻香與上元夫人相聞云但不相見四千餘年天事勞我致以愆靣可暫來否當此相待上元夫人遣一侍女荅曰阿環再拜上問起居逺隔絳河擾以官事遂違顔色近五千年仰戀光潤情係無違宻香至奉信承降尊於茅固處聞命之際即當飾駕先被太帝君𠡠使詣希林校定三元之脉正爾暫徃如是當還還便束帶願暫少留茅固回問王母不審上元夫人何真也曰三天真皇之母上元之髙真統領十方玉女之名籙者也及上元夫人來聞雲中簫鼓聲龍馬嘶鳴既至從者甚衆皆女子齊年十六七容色明逸多服青綾之衣光彩奪目上元年未笄天姿絶艶服赤霜之袍被青錦裘}
