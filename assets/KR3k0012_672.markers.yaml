  - {type: variant, offset: 2526, length: 0, content: '', WYG: 充溢徹視黄寧凡四十字太上刻於鳯臺南軒也非揔真弟子而不教非司命之徒而不傳也太上眞官用日霞之道挹二景之法使通靈致貞體生玊映役命萬神上昇帝房昔鍾山真公用此𤣥真法耳王君乃將盈歸西域依承眞訣按而行之三年之中面生玉澤後王君又賜盈九轉還丹及方一首立壇結盟約不得傳泄乃遣命歸告曰復百年求我於南岳將授汝仙官於呉越盈後得仙居句曲山邦人因改句曲之名為茅君之山時茅有二弟聞盈方信有仙矣棄官而去渡江求兄相見告二弟真訣十八年道成因使更齋戒三年授以上道使存明堂𤣥眞之氣盈乃啟王君有說二弟得為仙之法要當受籙佩𢃄眞極之符王君錫𤣥水玉液絳日丹芝可使二弟齋戒三月而服之盈命飈車與二弟詣青州諸書名金簡又詣西城洞宫朝見揔眞上宰次南詣衡山之朱臺謁太虛赤眞人歸方諸請地仙二眞之䇿造赤城受眞變神符又之羅霍求華旌繡幡又上登九宫詣金闕之下受聖君之書頓首於闕下三月於是聖君九㣲太眞上相王大司命高晨師青童君使上詣太上請朱冠使}
  - {type: page-break, offset: 2526, content: '', id: KR3k0012_WYG_672-8a, image: WYG0899/WYG0899-0054a.png}
  - {type: page-break, offset: 2526, content: '', id: KR3k0012_WYG_672-8b, image: WYG0899/WYG0899-0054b.png}
