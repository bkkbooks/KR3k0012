  - {type: variant, offset: 724, length: 1630, content: 氣凝液鎮生五藏長養魂魄真上藥也真人云此愈於鍊八石餌雲母也真人鍊形於太陽易皃於三官者此之謂也又曰太極真人青精䭀飯方按彭祖傳云大宛有青精先生能一日九食亦能終歲不飢即是此矣真上仙之妙方斷穀之奇靈也清虛真人說霍山中有學道者鄧伯元王玄甫受服青精石飯吞日景之法能夜中書又仙人龍伯高受服青䭀方醉亡隱處方臺又定錄君命告椽云次服䭀飯兼穀勿違益髓除患肌膚充肥又掾書告長史覔米藥來山染作飯恐草燥又長史與大掾書令餉小掾白米是染作飯凡此六事有書者也太極真人青精十石䭀飯上仙靈方王君注解其後大書者是太素本經及西梁口訣墨注者是清虛王君所釋南岳魏夫人敷撰而使司命楊君書之五真共成一法足稱靈妙矣上元寶經曰子食草木之王氣與神通子食青燭之津此之謂也此太素所傳太極所撰上真靈仙之至要不同餘術也服䭀飯百害不能傷疾疫不能干去諸思念絕滅三尸耳目聰明行步輕捷能隱化遁變長服益壽茅司命大君語二弟云宜服四扇散昔黃帝授風后卻老還少之道也我昔授之於高丘先生今以相付耳又語小弟保命君曰卿宜服王母四童散此反嬰之祕道也體中少損宜服此方以補腦耳按小茅君服時已一百二十歲也夫此二方皆妙法也當齋戒修制又曰裴君受支子元服食茯苓之法焦山蔣山人所傳能長生久視修合之際須謹密齋戒裴君又受支子元胡麻之法蔣先生惟服此二方位為仙真此二方書與世少異裴君所祕用者驗而有實凡服伏苓胡麻之方甚眾此法既真人所經用真人手所書記必當最神勝於諸法若能常服仙道可期但患人服未覺甚益便不服之故少有剋終之効若體先不虛損及年少之時當服伏苓若年三十歲當服胡麻蔣先生曰此二方是大有之要法長生神仙之祕寶也大有者謂委羽山洞天大有宮中之書法彼人當有服之者寶玄經云伏苓治少胡麻治老合以齋戒服以朝早卉醴華腴密也百卉之花以成腴醴五公謂為卉醴華英火精水寶火精伏苓也性熱而合火伏苓則其精矣水寶胡口麻也性冷色黑而含津澤故謂之水寶和以為一還精歸寶此之謂也裴君以年少時所用故服伏苓也清虛真人年十二便受此方于時未必虧損所以云服伏苓夜視有光也二方同耳皆長年之奇方也若合二物倍用密共煎搗為丸乃隹按青精方伏苓禁食酸此專用伏苓不必禁酸味又曰清虛王真人授南岳魏夫人穀仙甘草丸方魏夫人少多病疾王君於脩武縣中告夫人曰學道者當去病先令五藏充盈耳目聰明乃可存思服御耳按王君初降真之時是晉元康九年冬於汲郡脩武縣廨內夫人時應年四十八也夫人按而服之及隱景去世之時年八十三歲也此晉成帝咸和八年甲午歲則夫人從服藥已來三十五年矣其間或不必常相續也了無復他患先疹都愈髮不白齒不落耳目聰明常月中書道家章符夫人既為女官祭酒故猶以章符示跡耳存思入室動百日數十日了不覺勞既在俗世家事相亂欲脩齋研誦便託以入室也食飲通快四體充盈即甘草丸之驗也謂之穀仙方脾胃既和則能食而不害膚充而精察起居調節無溢利之患矣食穀而得仙故謂之穀仙也此本九宮右真公郭少金撰集此方諸宮久已有之至郭氏更撰集次第序說所治耳猶如青精乃太素之法而今謂太極真人也學仙道者宜先服之昔少金以此方授介象又授劉根張陵等數十人亦稱此丸為少金丸宜齋戒修合併無毒無所禁食一年大益無責旦夕之効也俗人亦皆可服之又曰雲芝英不擇日而修合治三尸伏疾服食一劑則穀虫死則三尸枯若道士固食穀者乃宜服也穀虫既滅使人食穀而無病過飽而不傷去尸虫之藥甚多莫出於此昔修羊公稷丘子東方朔崔文子商丘子但服此藥以恊穀而皆得仙也漢景帝及武帝求索東方朔脩羊公祕方終不傳又曰北海公涓子名姓不顯青童君弟子蘇林之師也少餌木黃精授守一玄丹之道在世二千八百年玄洲上卿蘇林字子玄涓子弟子也同紫陽之師濮陽曲水人年二十餘辭家學道後授三元真一遊變人間又曰太清正一真人張道陵沛國人本大儒漢延光四年始學道至漢末於鳥鵠山仙官來降授以正一盟威之教施化領民之法號天師即真誥云奉張道陵正一平氣者是也天師靈寶伍符序及太清金液丹序並佳筆別有傳已行於世又曰服五石者亦能一日九食百關流淳亦能終歲不飢還老反嬰遇食則食不食亦平真上仙之妙方斷穀之奇靈也陶隱居注云雖一日九食而吸饗流變不為滓終歲不飯而容色更鮮又云吸引之易感無貴於七曜修行之早成不過於九道保守之堅固莫踰於鎮生, SBCK: ''}
