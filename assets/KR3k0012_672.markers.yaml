  - {type: variant, offset: 2355, length: 375, content: 用之急防無起於渾神藥石之速効豈勝於青精祈拜之感孰賢於朝謝也又曰服五石鎮五藏不壞又曰九苞鳳腦太極隱芝丹鑪金液紫華虹英太清九轉五雲之漿東瀛白香滄浪青錢高丘餘精積石飛田能使人壽考琴高先生受鎮氣益命之道又行補腦反丹之法寶劍上終曰太極曲晨八景丸服之能飛行太虛又曰太虛真人服四極雲牙也又曰飛龍雲腴方鍊五石之華膏身有玉光能夜書此樂愈於八石之餌又曰服日月之華者欲得恒食竹筍竹筍者日華之胎也一名太明又欲恒食松葉松者木之秀也欲服日月當食此物氣以感運也太虛真人云松柏者木之秀又曰真人挹五方元晨之暉食九霞之精注曰謂清晨之元氣始暉之霞精曰陽數九謂之九霞本文云神光內耀朱華外陳太上黃素經曰凡道士臨食常上饗太和太平經曰青童君採飛根吞日景空洞靈章云朝飡五雲氣夕噏三晨光又云食黃琬紫真之飴真誥曰崑崙有絳山石髓玉樹之實又曰上清金闕靈書紫文採服陰華吞月精之法昔授之於大微天帝君一名黃氣陽精, SBCK: ''}
