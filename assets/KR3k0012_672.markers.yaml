  - {type: variant, offset: 2435, length: 14, content: 田能使人壽考琴高先生受鎮氣益, WYG: 行大墟王母命西域王揔貞一則解釋𤣥眞之經又自敷演金璫之經口授於盈曰金璫者上清之華蓋隂景之内貞玊珮者太上之隠𤣥洞飛之寳章得其道者上陟雲漢宴􅃦太極元始太常之言是太宵二景隠書玉佩金璫之文章也又有隂陽二景内眞符與本文相隨太上法惟令授諸司命于玉札𤣥挺緑字刋金黄映内曜案素書上清與當為上卿之君司}
