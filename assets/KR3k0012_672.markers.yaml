  - {type: variant, offset: 2937, length: 0, content: '', SBCK: 紫蘂明珠之丹開元廻化混尓而分隂陽屢變其道自然玄圖七轉至九而還大黄首篇是曰玉虚上眞保之命曰元經上清洞眞玉經曰太上八景章皆刻於東華仙臺不宣於丗其受帝君九隂訣􅉀用素􅁝絳幣此曰暉之誓也其受太上結隣章盟用碧幣此月華之誓也太一帝君洞眞玄經曰有玉女在太上六合紫房之内侍衛太丹隱書}
