  - {type: variant, offset: 1377, length: 701, content: 洞天大有宮中之書法彼人當有服之者寶玄經云伏苓治少胡麻治老合以齋戒服以朝早卉醴華腴密也百卉之花以成腴醴五公謂為卉醴華英火精水寶火精伏苓也性熱而合火伏苓則其精矣水寶胡口麻也性冷色黑而含津澤故謂之水寶和以為一還精歸寶此之謂也裴君以年少時所用故服伏苓也清虛真人年十二便受此方于時未必虧損所以云服伏苓夜視有光也二方同耳皆長年之奇方也若合二物倍用密共煎搗為丸乃隹按青精方伏苓禁食酸此專用伏苓不必禁酸味又曰清虛王真人授南岳魏夫人穀仙甘草丸方魏夫人少多病疾王君於脩武縣中告夫人曰學道者當去病先令五藏充盈耳目聰明乃可存思服御耳按王君初降真之時是晉元康九年冬於汲郡脩武縣廨內夫人時應年四十八也夫人按而服之及隱景去世之時年八十三歲也此晉成帝咸和八年甲午歲則夫人從服藥已來三十五年矣其間或不必常相續也了無復他患先疹都愈髮不白齒不落耳目聰明常月中書道家章符夫人既為女官祭酒故猶以章符示跡耳存思入室動百日數十日了不覺勞既在俗世家事相亂欲脩齋研誦便託以入室也食飲通快四體充盈即甘草丸之驗也謂之穀仙方脾胃既和則能食而不害膚充而精察起居調節無溢利之患矣食穀而得仙故謂之穀仙也此本九宮右真公郭少金撰集此方諸宮久已有之至郭氏更撰集次第序說所治耳猶如青精乃太素之法而今謂太極真人也學仙道者宜先服之昔少金以此方授介象又授劉根張陵等數十人亦稱此丸為少金丸宜齋戒修合併無毒無所禁食一年大益無責旦夕之効也俗人亦皆可服之又曰雲芝英不擇日而修合治三尸伏疾服食一劑則穀虫死則三尸枯若道士固食穀者乃宜服也穀虫既滅使人食穀而無病過飽而不傷去尸虫之藥甚多莫出於此昔修羊公稷丘子東方朔崔文子商丘子但服此藥以恊穀而皆得仙也漢景帝及武帝求索東方朔脩羊公祕方終不傳又曰北, WYG: 隊}
