  - {type: variant, offset: 2738, length: 0, content: '', WYG: 云酆都山洞中玉帝隠銘凡九十一言刻石書酆都山洞天六宫北壁六洞萬神之靈也又云玉清隠書洞景金𤣥之章刻石隠銘此音發於自然之篇九天玊章其詞幽奥非始學凡夫所可竟通非太帝下降不得演究此銘也又金根經云凡修金𤣥當佩隠銘玉帝七聖𤣥記}
