  - {type: variant, offset: 2740, length: 1, content: 為, SBCK: 家言神仙事穆天子傳曰􅂛崑崙之墟以觀黄帝之宫具齋戒以祀登舂山即玄圃也崑崙之山地方二千里有曽城九重是謂閬風玄圃山海經云明明崑崙玄圃其上穆天子勒銘於玄圃以昭後世天子與王母觴於瑶池之上王母爲謡白雲在天於是天子升于崦嵫日入處山也乃紀迹於崦山茅盈傳曰王母謂茅盈曰王珮金璫之道太極玄眞之經能之者皆飛行太虚王母命西城王惣眞一一解釋玄眞之經又自敷演金璫之經口授於盈曰金璫者上清之華蓋隂景之内眞玉珮者太上之隱玄洞飛之寳章得其}
  - {type: page-break, offset: 2740, content: '', id: KR3k0012_SBCK_672-4b}
  - {type: variant, offset: 2740, length: 1, content: 為, krp: 家言神仙事穆天子傳曰升崑崙之墟以觀黄帝之宫具齋戒以祀登舂山即玄圃也崑崙之山地方二千里有曽城九重是謂閬風玄圃山海經云明明崑崙玄圃其上穆天子勒銘於玄圃以昭後世天子與王母觴於瑶池之上王母爲謡白雲在天於是天子升于崦嵫日入處山也乃紀迹於崦山茅盈傳曰王母謂茅盈曰王珮金璫之道太極玄眞之經能之者皆飛行太虚王母命西城王惣眞一一解釋玄眞之經又自敷演金璫之經口授於盈曰金璫者上清之華蓋隂景之内眞玉珮者太上之隱玄洞飛之寳章得其}
  - {type: variant, offset: 2741, length: 9, content: 道者酒肉最為大忌酒, WYG: 太平}
  - {type: punctuation, offset: 2743, content: ，, id: KR3k0012_CHANT_672-bkkpn536}
  - {type: 'tls:seg', offset: 2743, content: '', id: KR3k0012_CHANT_672-16a.10}
  - {type: variant, offset: 2743, length: 4, content: 酒肉最為, SBCK: 上陟雲漢宴寢太極元始太常之言是太宵二景隱書玉珮金璫之文章也又有隂陽二景内眞符與本文相隨太上法惟令授諸司命子玉札玄挺緑字刋金黄暎内曜素書上清與當爲上卿之君司命之任矣然不先聞明堂玄眞之道亦未由得太宵隱書也玄眞之道是食日月之法錬五神之術耳其經曰太上玄玄􅀟神四明玄眞内映明堂外清吞息二暉長生神精上􅀘司命􅁥御萬靈六華充溢徹視黄寧凢四十字太上刻於鳯臺南闕也非㹅眞弟子而不教非司命之挺而不傳也太上眞官用日霞之道挹二景之法使通靈致眞體生玉映役命萬神上昇帝房昔鍾山眞公用此玄眞法耳王君乃將盈歸西城依承眞訣按而行之三年之中面生玉澤後王君又賜盈九轉還丹及方一首立壇結盟約不得傳泄乃遣令歸告曰復百年求我於南岳將授汝仙官於呉越盈後得仙居句曲山􅀖人因改句曲之名爲茅君之山時茅君二弟聞盈方信有仙矣弃官而去渡江求兄相見告二弟眞訣一十八年道成因使更齋戒三年授以上道使存明堂玄眞之氣盈乃啓王君自說二弟得爲地仙之法要當受籙佩帶眞極之符王君賜玄水玉液絳日丹芝可使二弟齋戒三月而服之盈命颷車與二弟詣青洲請書名金簡又詣西城洞宫朝見㹅眞上􅌠次南詣衡山之朱臺謁太虚赤眞人歸方諸請地仙二眞之䇿造赤城受眞變神符又之羅霍求華旌繡幡又上登九宫詣金闕之下受聖君之書頓首於闕下三月於是聖君命九微太眞上相王}
