  - {type: variant, offset: 4, length: 0, content: '', SBCK: 皇内文五岳眞形圖古者仙官志人尊祕此道非有仙名者不授也受之四十年一傳傳之訣朱而􅉀委信爲約諸名山五岳皆以此書但藏於石室幽隱之地應得道者入山精誠思之則山神自開山令人見之如帛仲理者於山中得之是也有此書者當湏清㓗毎有所爲必先白之如奉君父其經曰有三皇文者辟邪惡􅀑温疫横禍又次有玉女隱微一卷可化形爲飛龍􅄂獸金玉木石興致雲雨之􅀋亦大術也其淮南鴻寳萬畢之書不能過也鄭君􅀶極五經知道者也兼綜九宫三棊推歩天下河雒與洛同䜟緯太和元年知季辰之亂江南將鼎沸負笈將仙藥東入霍山莫所知之又曰家有五岳真形圖辟惡人不能害又曰黄老玄聖深識獨見開祕文於名山受仙經於神人蹶埃塵以遣累凌太遐以髙躋金石􅀛鶴與之等壽念有志於將來􅉖信者之無聞垂以方法炳然著明淺見之徒區區所守甘於􅖋而酣於醨知飲食過度而速病而不能節知極情恣慾而致殞而不能割神仙可得安能信乎按仙經以爲諸得仙者皆其受命偶值神仙之氣自然所禀故胎育之中巳含道性及其有識心好其事必遇明師而得其法不然則不信不求求亦不得夫百年之壽三萬餘日㓜弱則未有所知衰邁則懽樂並廢童蒙昏老除數十年而險厄憂病又相尋焉居丗之年畧銷其半人凢得壽不過五六十咄丁骨切嗟咸盡除哀憂昏耄六七千日耳頋眄巳盡况於全百年者萬無一焉諦而念之亦無􅀏夏虫朝􅌲也蓋知道者所至悲也太上太宵琅書曰道本無形應感生象大象無象象妙難明故見眞文結空成字又曰大上眞人靈寳祕文内符者九天眞王三天眞皇以授帝嚳藏於鍾山北阿夏禹治水畢詣鍾山鍾山眞人以授之禹還㑹稽更撰定爲二通一通藏苗山山湏萬年刼㑹乃出一通絹冩付雲水洞室湏甲申期至令與理水傅伯長等又曰呉王闔閭十二年正月使龍威丈人入包山洞庭取之以岀有符而無說又齊人樂子長受之於霍林仙人韓衆乃敷演}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_672-1b}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_672-2a}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_672-2b}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 皇内文五岳真形圖也古之仙官至人尊秘此道非有仙名者不授也受之四十年一傳傳之㰱血而盟委信為約諸名山五岳皆有此書但藏於石室幽隠之地應得道者入山誠精思之則山神自開山令人見之如帛仲理者於山中得之是也有此書者常置清潔之處每有所為必先白之如奉君父其經曰有三皇文者辟群邪惡鬼瘟疫横殃飛禍又次有玊女隱微一卷可化形為飛禽走獸金玉水石興致雲雨之類亦大術也其淮南鴻寳萬畢皆無及此書者也鄭君博極五經知道者也兼綜九宫三竒推歩天文河雒與洛同䜟記太安元年知季世之亂江南將鼎沸負笈將仙藥東入霍山莫知所在又曰家有五岳眞形圗辟惡人不能害又曰黄老𤣥聖深識獨見開秘文於名山受仙經於神人蹶挨塵以遣累陵太遐以髙躋金石龜鶴與之等壽念有志於將來愍信者之無聞垂以方法炳然著明淺見之徒區區所守甘於蓼而酣於醨知飲食過度而速病而不能節知極情恣慾而致損而不能割神仙可得安能信乎按仙經以為諸得仙者皆其受命偶值神仙之氣自然所禀故胎育之中已含道性及其有誠心好事仙其必遇明師而得其法不然也則不信不求求亦不得夫百年之壽三萬餘日㓜弱則未有所知衰邁則歡樂並廢童䝉昏耄除數十年而險厄憂病相尋代有居世之年畧銷其半計定得百年者善笑平和則不過五六十年咄丁骨反嗟㓕盡哀憂昏老六七千日耳顧盻已盡矣况未百年者萬未有一乎諦而念之亦無以笑夏蟲朝菌也盖不知道者所至悲矣太上太霄琅書曰道本無形應感生象大象無象象妙難明故見真文結空成字又曰太上眞人靈寳秘文内符者九天真王三天真皇以授帝嚳藏於鍾山北阿夏禹治水畢詣鍾山鍾山真人以授之禹還㑹稽更撰定為二通一通藏苖山山􅀈須萬年刼㑹又出一通付雲水洞室須甲申期至令與理水傳伯長等又曰呉王闔閭十二年正月使龍威丈人入包山洞庭取之以出有符而無說又齊人樂子長受之於霍林山人韓衆乃敷演}
