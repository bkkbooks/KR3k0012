  - {type: variant, offset: 2809, length: 714, content: 斤以合九華丹又曰治明期與後漢末人張正禮在衡山中受服王君虹景丹積三十餘年又曰趙廣信陽城人也魏末來剡山受服氣法守玄中之道後服九華丹又曰朱孺子吳末人入赤水山服菊花餌木又受西歸子入室存泥丸法三十三章又曰鄭景世與張重華俱晉初人也在灊山受行守五藏含日法服胡麻及玄丹又曰馬明生臨淄人為縣吏逐賊被傷太真夫人以靈元救得差後師安期生受服太清丹又曰王玄甫沛人與鄧伯元俱在霍山受服青精石飯吞日丹景之法又曰黃山訣云養性服食藥物不欲食䔉及石榴子道士自不可食列仙傳曰赤將子轝者黃帝時人不食五穀而食百草華又曰天仙偓佺者槐山採藥人也好食松實體生毛目方能飛行及走馬又曰務光夏時人耳長七寸好琴服蒲韭根又曰涓子齊人好餌朮著天地之經三十八篇後釣於澤得符鯉中隱宕山能致風雨吉伯陽九仙法淮南王少得其文不能解也其琴心三篇有旨焉又曰劉景前漢時人也從邯鄲張君受餌雲母知其吉凶抱朴子曰修道餌藥及隱居入山不得入小法者多遇害萬物之老者悉能為怪常試人耳惟不能於鏡中易其真形耳是以古之入山道士皆以明鏡徑九寸已上懸於背後則老魅不敢近人或有來試人者則當顧視鏡中是列仙山神者如人形是鳥獸邪鬼亦見昔人有於蜀雲臺山石室中忽有一人著黃練單衣葛巾至其前於是人顧鏡中乃鹿也因叱而成鹿徑去又林慮山下有一亭每宿者或死或病常夜有十數人衣或白或黑或婦人男子後郅伯夷過宿明燭而坐夜半果見密以鏡照之乃群犬也伯夷乃執燭起詐誤以燭燼落其衣聞燎毛遂以刀剌殺一犬餘駭去每入山須擇吉日抱朴子曰天地之情狀陰陽之吉凶茫茫乎其亦難詳也吾亦不必謂之有又亦不敢保其無然黃帝呂望皆所信伏近代嚴君平司馬遷皆所據用而經傳有歷剛曰吉日有自來矣王者立太史官封拜置立有事宗廟社稷郊祀天地皆擇其日也按玉鈐經云欲入山不可不知遁甲之祕術而不為人委曲說其事也, WYG: ''}
