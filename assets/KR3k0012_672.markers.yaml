  - {type: variant, offset: 5, length: 2, content: 餌下, SBCK: 御之方藏於東海北隂之室太一金液經者按劒經序云髙丘子服金液水長史書云欲合金液意皆是此方今有葛洪注是郗愔黄素書又有别訣一卷此亦太清上丹法也}
