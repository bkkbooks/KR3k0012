  - {type: variant, offset: 2527, length: 0, content: '', WYG: 下拜二弟於金闕下受二弟眞簡而還又曰神仙經黄白方二十五卷千有餘首然率多深㣲難知可觧分明者少許耳世人多疑此事為虛誕不信神仙者正同耳余昔從鄭君受九丹及金液經因復求授黄白中經五卷鄭君言曾與左慈於廬江銅山中試作皆成也然齋㓗禁忌之勤苦與合九丹神仙藥無異也俗人多譏余好攻異端謂余}
