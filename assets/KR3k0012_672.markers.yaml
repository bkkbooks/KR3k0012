  - {type: variant, offset: 2537, length: 0, content: '', WYG: 齋戒太史又連在官終不能得􅁪歎息言人間不足處也太眞科曰清虛小有天王撰三天正法經金液經曰太初混元皇經以陳上眞絳晨封之三篋至道之大合符天圖三丹要言大皇所紀之秘玉堂勿傳其㫖太眞𤣥丹經刻于清虛之堂太皇君之寳章也命曰紫蘂明珠之丹開元廻化混爾而分隂陽屢變其道自然𤣥圃七轉至九而還大黄首篇是曰玉虛上眞保之命曰元經也上清洞眞玉經曰太上八景章皆刻于東華仙臺不宣於世其受帝君九隂訣盟用素絲絳幣此日暉之誓也其受太上結隣章盟用碧幣此月}
