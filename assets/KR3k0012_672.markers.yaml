  - {type: variant, offset: 3314, length: 185, content: 林慮山下有一亭每宿者或死或病常夜有十數人衣或白或黑或婦人男子後郅伯夷過宿明燭而坐夜半果見密以鏡照之乃群犬也伯夷乃執燭起詐誤以燭燼落其衣聞燎毛遂以刀剌殺一犬餘駭去每入山須擇吉日抱朴子曰天地之情狀陰陽之吉凶茫茫乎其亦難詳也吾亦不必謂之有又亦不敢保其無然黃帝呂望皆所信伏近代嚴君平司馬遷皆所據用而經傳有歷剛曰吉日有自來矣王者立太史官封拜置立有事宗廟社稷郊祀天地皆擇其日也按玉鈐, SBCK: 金根}
