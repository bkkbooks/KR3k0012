  - {type: variant, offset: 12, length: 176, content: 太極真人昔以神方一首傳長里先生先生姓薛自號長里周武王時人也先生以傳西域揔真王君即金闕聖君之上宰也按䭀飯方受西梁真人所傳時在大宛北谷今長里傳九轉乃周初間是為受服䭀飯三四百年後乃合此丹蓋司命劍經序也惣真王君傳太元真人即東卿司命茅大君也以漢武帝天漢三年受之時年四十八後又以付二弟并各賜成丹一劑司命既傳二弟而不載於此當以王君命使付非正次傳授也自二君以後惟定籙與, SBCK: ''}
