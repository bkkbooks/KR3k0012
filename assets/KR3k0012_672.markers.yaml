  body:
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 四仙經上仙經曰九轉丹金液經守一訣皆在崑崙五城内藏以玉凾書以金札封以紫泥印以中章抱朴子曰余聞鄭君言道書之重者莫過於}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 四仙經上仙經曰九轉丹金液經守一訣皆在崑崙五城之内藏以玉函封以金札封以紫泥印以中章抱朴子曰余聞鄭君言道書之重者莫過於}
