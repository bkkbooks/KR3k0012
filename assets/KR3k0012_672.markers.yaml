  - {type: variant, offset: 2414, length: 0, content: '', WYG: 飛行之羽以超虛空劉向列仙傳叙曰列仙傳漢光禄大夫劉向所撰也初武帝好方士淮南王安亦招賔客有枕中鴻寳之書先是安謀叛伏誅向父德為武帝治淮南獄得其書向㓜而讀之以為竒及宣帝即位修武帝故事向與王褒等以通􅀶有俊才進侍左右向又見淮南鑄金之術上言黄金可成上使向與典尚方鑄金費多不驗下吏當死兄湯成侯安民乞入國户半贖向罪上亦竒其材得减死論詔為黄門侍郎講五經於石渠至成帝時向既司典籍見上頗修神仙事遂修上古以來及三代秦漢􅀶採諸家言神仙事穆天子傳曰升崑崙之墟以觀黄帝之宫具齋戒以祀登舂山即𤣥圃也崑崙之地方二千里有層城}
