  - {type: punctuation, offset: 2739, content: 「, id: KR3k0012_CHANT_672-bkkpn535}
  - {type: variant, offset: 2739, length: 0, content: '', SBCK: 寳神經裴清虚裴眞君也錦囊中書也侍者常所帶者裴昔從紫微夫人受此書也又曰玄圃北壇西瑶之上臺也天眞祕文盡在其内又曰九華眞妃與紫微王夫人南岳魏夫人同降眞妃坐良乆乃命侍女發檢囊中出二卷書付楊君一上清玉霞紫映内觀隱書一上清還晨歸童曰暉中玄書此是三元八㑹之書楊君旣䆒識眞字令作􅈻字顯之耳道有八素眞經太上之隱書也又有九眞中經老君之祕言也黄書亦要長生之訣也青要紫書金根衆文玉清眞訣三九素言丹景道精隱地八術白簡青籙紫度炎老此皆道之經也又有飛歩七元天綱之經七變神法七轉之經又大洞眞經三十九篇太丹隱書八禀十訣天􅀜三圖七星移度九丹變化胎精中記九赤班符封山隧海金液神丹太極隱芝五行祕符曲素辝訣黄水月華佪水玉精水陽青英絳樹青實琅玕華丹天皇象符以合元氣白羽紫蓋以遊五岳三皇内文以召天地神靈玉佩金璫以登太極素奏丹符以召六甲金眞王光以映天下八景之輿遊行太清飛行之羽以超虚空劉向列仙傳叙曰列仙傳漢光禄大夫劉向所撰也􅀄武帝好方士淮南王安亦招賔客有枕中鴻寳之書先是安謀叛伏誅向父德爲武帝治淮南獄得其書向㓜而讀之以爲竒及宣帝即位修武帝故事向與王褒等以通􅀶有俊才進侍左右向又見淮南鑄金之術上言黄金可成上使向與典尚方鑄金費多不驗下吏當死兄安陽成侯安民乞入國户半贖向罪上亦竒其材得减死論詔爲黄門侍郎講五經於石渠至成帝時向旣司典籍見上頗脩神仙事遂修上古以來及三代􅁗漢􅀶採}
  - {type: page-break, offset: 2739, content: '', id: KR3k0012_SBCK_672-3b}
