  - {type: variant, offset: 53, length: 20, content: 狂恒雨若僣恒陽若豫恒燠若急恒寒若蒙恒風若, SBCK: 犯居其旁曰守經之爲歴相撃爲闘張晏曰彗所以除舊布新也孛氣似彗飛流謂飛星流星也孟康曰飛絶迹而去之流光跡相連也又曰孝昭元始中太白入太微西藩第一星北出東藩第一星東北下去太微者天庭也太白行其中宫問當閉大將􅀍甲兵邪臣伏誅後有流星下燕萬載宫極東去李竒曰極屋梁也三輔名爲極也法曰國恐有誅其後左將軍上官桀驃􅀐將軍安與長公主燕刺王謀作亂咸伏誅又曰建始四年七月熒惑踰歳星居其東北半寸所如連李時歳星在関星西四尺所熒惑􅀄從畢口大星東北徃數日至徃疾去遟占曰熒惑與歳星闘有病君飢歳而後旱傷麥民食榆皮二年十月壬申太皇太后避時昆明東觀又曰綏和二年春熒惑守心丞相翟方進欲塞灾異自殺客星}
  - {type: page-break, offset: 53, content: '', id: KR3k0012_SBCK_875-2a}
