  - {type: variant, offset: 1432, length: 142, content: 反時為災又曰定公元年諸侯之大夫城成周三旬而畢乃歸諸侯之成齊高張後不從諸侯晉女叔寬曰周萇弘齊高張皆將不免萇弘違天天既厭周德萇弘欲遷都以延其祚故曰違天高子違人天之所壞不可支也眾之所為不可奸也為哀三年周人殺萇弘六年高張來魯天裂哀氏易妭占曰天裂陽不足下害上之象天裂見人兵起國亡天開見光流血滂滂, SBCK: 狗}
