  - {type: variant, offset: 362, length: 0, content: '', SBCK: 有大䘮又曰光和元年八日彗星出亢池入天市中長數尺稍長五六丈赤色經歷十餘􅀫八十餘日乃消於天苑中彗除天市將徙帝將易都至􅀄平元年獻帝遷都長安又曰孝獻􅀄平九年十月有星孛于東井與􅀑魁入軒轅太微十一年正月有孛于斗首在斗中尾貫紫宫及北辰占曰彗掃太微紫宫人主易位其後魏文帝受禪十二月辛夘有星孛于鶉尾荆州分也時荆州牧劉表專據荆州從事周羣以爲荆州牧將死而失士明年秋表卒以小子琮以代曹公將攻荆州琮懼舉軍詣公降晏子春秋曰景公謂晏子曰彗星向吾國我是以悲晏子曰居穿池欲深廣爲臺欲髙大誅戮如􅄷讎孛又將至彗星容可拒乎懼緩刑罰三十七日彗去尉繚子曰昔楚將軍子心與齊人戰未合夜彗星出柄在齊所在勝不可擊子心曰彗星何知明日與齊人戰大破之淮南子曰鯨魚死而彗星出天狗占曰狗者守禦之􅀋天狗所降以戒守禦也出入無時下則有伏屍流血其流星墮地有聲野雉皆鳴或羣狗皆吠或流散化爲雲一曰流星有聲如}
