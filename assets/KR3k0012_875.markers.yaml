  - {type: variant, offset: 2164, length: 3, content: 李凱舉, WYG: 文欽果反皇覽冢墓記曰蚩尤冢在東郡壽張縣闗鄉城中髙七丈民常十月祠之有赤氣出如絳名爲蚩尤旗獄漢河圖稽燿鈎曰鎮星散爲獄漢春秋合誠圖曰獄漢主逐王獄漢鎮星之精史記天官書曰獄漢星出正北北方之野星去地可六丈而赤數動察之中青此四野星所出出非其方其下有}
