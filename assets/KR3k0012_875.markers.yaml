  - {type: variant, offset: 1023, length: 407, content: 非殷國之大妭也殷國之大妭四十七章殷君喜殺人喜以人飴虎喜割人心喜殺孕婦喜殺人之父孤人之子喜刑禍喜以信欺欺者為忠忠諫者不賞以君子為下小人為上以佞辯為相為政急令暴取萬民愁苦好田獵畢弋走狗飾馬喜脩池臺宮七十有三所大宮百里善為酒池糟丘而牛飲者三千人喜聽讒用譽無功者賞無尺丈無錙銖無秤衡無功賞無罪誅此殷國之妭也白虎通曰災異者何也災之為言傷也隨事而誅異之為言怪也先發感動何以言災者有所害也說苑曰趙簡子問於翟封餘曰吾聞翟雨䖟穀三日雨血三日馬生牛牛生馬信乎曰信簡子曰災足亡國乎封曰雨䖟穀三日䖟風之所飄也雨血三日鷙鳥擊於上也馬生牛牛生馬雜收也此非翟之災也簡子曰然則翟之妖奚也對曰其君幼弱其大臣比黨以求祿其百官肆斷而無常其政令不竟而數改此其妖也京氏別對災異曰五穀無實何君無仁德臣懷叛戾華飾虛舉薦賢實不相副內為蘇秦之行外以夷齊之語故致五穀多無實朝無賢害氣傷穡不救國大飢其救也選明經舉茂才改往脩來退去貪狼施恩行惠賞賜勞臣此災乃銷矣天左傳宣下, SBCK: ''}
