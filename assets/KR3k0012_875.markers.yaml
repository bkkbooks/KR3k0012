  - {type: variant, offset: 900, length: 1, content: 凡, SBCK: 七國之兵戰於梁地故天狗先降梁壘見以其象也狗者守禦之􅀋也所降以惑守禦也史記曰􅁗孝公十二年星晝墜}
  - {type: variant, offset: 900, length: 1, content: 凡, WYG: 七國之兵戰於梁地故天狗先降梁壘見以其象也狗者守禦之類也所降以戒守禦也史記曰秦孝公十二年星晝墜}
  - {type: variant, offset: 900, length: 1, content: 凡, krp: 七國之兵戰於梁地故天狗先降梁壘見以其象也狗者守禦之類也所降以惑守禦也史記曰秦孝公十二年星晝墜}
  - {type: variant, offset: 902, length: 3, content: 所害謂, SBCK: 聲至十七年􅁗韓大戰擒晉惠王又天官書曰天狗􅃺大如奔星有聲其止地􅀋狗地望}
  - {type: variant, offset: 902, length: 19, content: 所害謂之災無所害而異於常謂之異故災為已, WYG: 聲}
  - {type: variant, offset: 902, length: 3, content: 所害謂, krp: 聲至十七年秦韓大戰擒晉惠王又天官書曰天狗狀大如奔星有聲其止地類狗地望}
  - {type: variant, offset: 906, length: 1, content: 災, SBCK: 如火光炎炎衝天其下圎如數頃田處上瓮見則有黄色千里破軍殺將洪範五行傳同漢書天文志曰孝昭元年二月乙酉祥雲如狗赤色星三枚夾漢書西行占曰太白散爲天狗爲卒起卒起見禍}
