  - {type: variant, offset: 77, length: 2, content: 內虵, WYG: 元元年四月客星大如瓜色青白在南斗第二星東可四尺占曰爲水饑其五月渤海水大溢六月關東大饑民多饑死琅邪郡人相食二年五月客星見昴分居卷舌東可五尺青白色炎長三寸占曰天下有妄言者其十二月鉅鹿都尉謝君男詐爲神人論死後漢書曰天文志曰孝安永初四年六月丙子客星大如李蒼白芒氣長二尺西南指上階星上階爲三公後太尉張敏免官又曰中平五年六月丁夘客星如三升椀出貫索西南行入天市至尾而消占曰客星入天市爲貴人喪謝承後漢書曰吳郡周敞師事京房爲石顯所譖謂敞曰吾死後三十日客星必出天市即吾無辜也死後果如言孛星左傳曰文十四年有孛星入于北斗周内史叔服曰不出七年宋齊晉之君皆將死亂又曰昭十七年冬有星孛于大辰西及漢申須曰彗所以除舊布新也天事恒象今除于火火出必布焉諸侯其有火災乎梓慎曰徃年吾見之是其徴也火出而見今兹火出而章必火入而伏其居火也乆矣其}
