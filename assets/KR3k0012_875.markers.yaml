  - {type: punctuation, offset: 1634, content: 「, id: KR3k0012_CHANT_875-bkkpn481}
  - {type: variant, offset: 1634, length: 319, content: 成帝咸和四年冬天裂西北時蘇峻之子以萬人入吳興天下有兵關中轉亂明年石勒僣位又曰穆帝昇平五年天裂廣數丈聲如雷又哀帝初即位天中裂黃三四丈聲如雷野雉皆雊時帝荒疾不識萬機太后臨朝桓溫專政崔鴻十六國春秋曰前趙劉曜建元初天裂廣一丈長五十餘丈時四方交戰隋書曰梁武帝太清中天裂西北長十丈闊二丈光出如電聲如雷明年侯景陷臺城天開漢志曰惠帝二年天開東北長二十餘丈廣十丈後有呂后廢二少帝諸呂作亂蕭子顯齊書曰齊東昏侯永元中夜天開黃色明照頃有物絳色如小漸大如倉廩聲如雷墜太湖野雉皆雊其年東昏見廢隋書曰陳後主至德初天開西北至東南其內有黃雜色聲如雷後年章大寶舉兵反陳竟國亡天光書紀年曰周昭王末年夜有五色光貫紫微其年王南巡不退漢書曰成帝元延元年四月無雲有雷聲光四下至昏乃止晉, SBCK: ''}
