  - {type: variant, offset: 36, length: 7, content: 吉凶悔吝生乎動, SBCK: 卷舌主口語熒惑臨之下多亂謀國君以口舌之害起㓂又曰熒惑守軒轅貴妾爭又曰熒惑守營室羣妃闘漢書天文志曰五星所行合散犯守歷陵闘蝕彗孛飛流皆隂之精本於地而發于天也孟康曰合同舎也散謂五星有變則其精散爲妖星也犯七寸之内光芒相及陵相冐過也蝕星月相陵不見}
