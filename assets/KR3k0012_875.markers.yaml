  - {type: variant, offset: 908, length: 7, content: 所害而異於常謂, SBCK: 時四月昌邑王賀行􅁋僻大將軍霍光白皇太后廢賀又曰成帝綏和元年四月日晡時天有星殷如雷聲有流星如缶長十餘丈皎然赤白從日下東南去或如盂或如雞子熠熠如雨下至地止郡國皆言星隕爲王者失􅀔諸侯起伯}
