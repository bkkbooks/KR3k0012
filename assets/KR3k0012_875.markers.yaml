  - {type: variant, offset: 235, length: 3, content: 蔣蔣此, WYG: 于東井輿鬼入軒轅太㣲十一年正月有星孛于斗首在斗中尾貫紫宫及北辰占曰彗掃太㣲紫宫人主易位其後魏文帝受禪十二月辛卯有星孛于鶉尾荆州分也時荆州牧劉表専據荆州從事周羣以爲荆州牧將死而失土明年秋表卒以小子琮自代曹公將攻荆州琮懼舉州詣公降晏子春秋曰景公謂晏子曰彗星向吾國我是以悲晏子曰君穿池欲深廣爲臺欲髙大誅戮如仇讎孛將又至彗星容可拒乎公懼緩刑罰三十七日彗去尉繚子曰昔楚將公子心與齊人戰未合夜彗星出明日與齊人戰大破之淮南子曰鯨魚死彗星出天狗占曰狗者守禦之類天狗所降以戒守禦也出入無時下則有伏屍流血其流星墮地有聲野雉}
