  - {type: variant, offset: 9, length: 7, content: 履霜堅冰至文言, SBCK: 􅀊星失渡何人君不仁春殺無辜則歳星失度其救也慈仁敬讓廣恩惠施無犯四時則歳星承度熒惑失度何人君内無法禮輕薄房室外行慢易歛奪民財則熒惑失度其救也爵賢位徳養㓜廪􅀌命樂師趣鞉鼔合歡欣熒惑還度天心得矣太白失度何人君薄恩無義懦弱不勝任則太白失度其救也舉有義任威用武則太白復兵氣消矣鎮星失度何人君内無仁義外多華飾則鎭星失度其救也治社稷修明堂近方直之人此災自消也辰星失度何人君内無仁義外多華飭則辰星失度其救也明刑慎罰審法必中尚書考靈耀}
