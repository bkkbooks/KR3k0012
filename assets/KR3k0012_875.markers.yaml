  - {type: variant, offset: 932, length: 1, content: 災, SBCK: 狗又曰後漢光武建武十一年春有流星大如日從太微岀入北斗魁中第六星色白傍有小星射者十餘枚後有聲如雷頃止斗魁主殺伐是年吴漢臧宮破公孫述於成都十二年春有大星如缶出柳西南行入􅀌將滅時分爲十餘叚如遺火􅃺湏􅁷有聲殷殷如雷柳爲周狐爲􅁗蜀是年使大司馬吴漢從洛陽發南陽卒泝江而上擊蜀白帝公孫􅄒數萬人又曰中元元年冬有大流星從西南向東北行有聲如雷其年中郎將竇固將西征又曰順帝永和三年有流星大如斗從西北東行長八九尺赤黄有聲隆隆如雷是時大將軍梁啇與常侍張逵曹騰孟賁等争權矯制収騰順帝寤逵等奔走或自刺或解貂蟬投草中逃亡之應漢獻帝春秋曰􅀄平四年六月流星起織女東南行天市中虵行有尾長七八丈色赤照}
