  - {type: variant, offset: 1952, length: 0, content: '', WYG: 郡國皆言星隕為王者失勢諸侯起伯之異其後王莾專政簒位又曰哀帝建平元年正月日出時有物著天白廣如一疋布長四丈餘西南行聲如雷一刻止名曰天狗後漢書曰光武建武十年三月有流星大如月從太㣲出入北斗魁中第六星色白傍有小星射者十餘枚後有聲如雷食頃止斗魁主殺伐是年吳漢臧宫破公孫述於成都十二月有大星如缶出桞西南行入軫將滅時分爲十餘叚如遺火狀須臾有聲殷殷如雷柳爲周軫爲秦蜀是年使大司馬吳漢從洛陽發南陽沂江而上擊公孫述殺數萬人又曰中元二年冬有大流星從西南向東北行有聲如雷其年中郎將竇固將西征又曰順帝永和三年有流星大如斗從西北東行長八九尺色赤黄有聲隆隆如雷是時大將軍梁商父子秉勢中常侍張逵等與曹騰孟賁爭權矯制收騰順帝寤解騰賁縛逵等奔走或自刺或解貂蟬投草中逃亡之應漢獻帝春秋曰初平四年六月流星起織女東南行天市中蛇行有尾長七八尺色赤照地又流星如斛長六七尺小者六七枚隨之光照地又流星西北行有聲如雷望之如火入照地是曰天狗}
