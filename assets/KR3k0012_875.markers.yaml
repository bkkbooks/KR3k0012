  - {type: variant, offset: 2097, length: 0, content: '', SBCK: 南行占曰以亂伐亂北斗主殺伐是後趙王倫殺司空張華廢賈后終自屠滅又曰太熈元年有枉矢西南流懷帝永嘉四年劉聦嘉平三年星起牽牛委曲虵形入紫宫其光照地其年帝爲劉聦所害後三年聦死國亡又曰􅉖帝建興三年枉矢自文昌北流至斗東如一疋布綘虵行有手足因變爲雲氣如人象二臂一足至五年北平人吴祚聚衆千人立沙門爲天子四年帝降劉曜又曰元帝大興三年枉矢出虚危没翼大寧二年王敦殺譙王承及甘卓又曰穆帝昇平二年枉矢自東南流于西北其長半天時所在擁兵政非己岀隋書曰齊昬侯永光三年春枉矢晝見西方長十餘丈其年梁武舉兵東昬遇害又曰隋煬帝大業十二年枉失二出北斗魁委曲虵形注於南斗後二年宇文化及於江都僣號許王世充於東都殺恭帝僣號鄭􅃖尤旗河圖稽燿鈎曰熒惑散爲􅃖尤旗主惑亂河圖提劉子曰帝將怒􅃖尤出乎四野史記曰天官書曰􅃖尤之旗􅀋彗而後曲象旗見則王者征伐四方魏志曰嘉平四年六持節奉法駕迎髙貴郷公元城是歳白氣經天大將軍司馬景王問王蕭其故肅曰此􅃖尤之旗也東南其有亂乎君􅀂修己以安百姓則天下樂安者歸徳倡亂者先亡矣明年鎮東將軍母丘儉揚州刺史使文欽果反皇覽􅃁墓記曰􅃖尤􅃁在東郡壽張縣闕郷城中髙七丈民常十月祠之有赤氣出如降名爲􅃖尤旗獄漢河圖稽燿鈎曰塡星散爲獄漢春秋合誠圖曰獄漢主逐王獄漢塡星精所爲史記天官書曰獄漢星孟康曰青中赤下有三彗蹤横亦鎮星之精一名咸漢也岀正北北方之野星去地可六丈而赤數動察之中有青所出非其方其下有兵衡不利五殘河圖稽燿鈎曰鎭星散爲五殘主奔亡春秋合誠圖曰五殘主岀亡春秋考異郵曰五殘􅀋辰星有角見則政在伯史記天官書曰五殘星岀正東方東方之野星狀􅀋辰星去地可五六七文所岀非其方其下有兵衡不利山海經曰西王母是司天之五殘國皇河圖稽燿鈎曰歳星之精流爲國皇主内難春秋考異郵曰國皇大而赤􅀋南極見則兵起天下急宋極均注曰南老人星也續漢書天文志曰靈帝光和中國皇見東南角去地一二丈如炬火十餘日占曰國皇爲内亂外兵䘮其後黄巾張角何進􅀽紹董卓亂燔燒宫室遷西京格澤廣雅曰格澤妖氣史記天官書曰格澤星者如炎火之􅃺黄白起地而上下太上兊其見不種而穫不有土功必有大咎旬始河圖稽燿鈎曰填星散爲旬始主招横春秋合誠圖曰旬始主争兵春秋考異郵曰旬始照其下必有滅主廣稚曰旬始妖氣也史記天官書曰旬始岀於北斗旁狀如雄雞其色青黒象㐲鼈楚辭逺遊集曰重陽入帝宮造旬始而觀清都司馬相如大人賦曰垂旬始以爲􅃤孟康曰旬始氣如雄雞在北斗傍懸於葆􅁲以爲十二旒􅃤音所衘切營頭占曰流星晝行亡君之戒一曰流星晝名營頭營頭而下流血滂滂一曰有雲如懷山墮所謂營頭之星其所墮覆軍流血續漢書天文志曰王莽地皇四年遣王㝷王邑將兵至昆陽圍城數重晝有雲氣如懷山墮軍上軍人皆厭所謂營頭之星也占曰營頭之所墮其下覆軍流血三千里是時光武將兵數千人赴救昆陽擊二公㑹天大風飛屋瓦雨如注水二公亂敗死者數萬人晉書曰惠帝大和二年星晝流矢北下光變目}
