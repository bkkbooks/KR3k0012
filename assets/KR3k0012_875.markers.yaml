  - {type: variant, offset: 76, length: 0, content: '', WYG: 昭十年春王正月有星出于婺女客星也鄭禆竈言於子産曰七月戊子晉侯將死今兹嵗在顓頊之虛嵗嵗星也顓頊之虛謂𤣥枵姜氏任氏實守其地姜齊姓任薛姓二國守𤣥枵之地居其維首而有妖星焉告邑姜也客星居𤣥枵之維首邑姜齊太公女晉唐叔之母星占婺女爲既嫁之女織女爲處女邑姜齊之既嫁女妖星在婺女齊得嵗故知禍歸邑姜邑姜晉之妣也天以七紀二十八宿四七戊子逄公以登星斯於是乎出逄公殷諸侯居齊地者逄公將死妖星出婺女時非嵗星所在故齊自當禍而以戊子日卒吾是以譏之至時晉平公卒漢書曰}
