  - {type: variant, offset: 2512, length: 186, content: 年大陰在庚辰江充詭其變天鳴所坼四時禮記月令曰孟春行夏令則雨水不時草木早落國時有恐行秋令則人有大疫猋風暴雨揔至藜莠蓬蒿並興行冬令則水潦為敗雪霜大摯首種不入仲春行秋冬則其國大水寒氣揔至寇戎來征行冬令則陽氣不勝麥乃不熟民多相掠行夏令則國乃大旱煖氣早來蟲螟為害季春行冬令則寒氣時發草木皆肅國有大恐行夏令則人多疾疫時雨不降山陵不收行秋冬則天多沉陰淫雨早降兵革並起孟夏行秋令則苦雨數來, SBCK: ''}
