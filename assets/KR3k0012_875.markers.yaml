  - {type: variant, offset: 76, length: 3, content: 初內虵, SBCK: 昭十年春王正月有星出于婺女客星也鄭禆竈言於子産曰七月戊子晉君將死今兹歳在顓頊之虚歳歳星也顓頊之虚謂玄枵姜氏任氏實守其地姜齊姓任薛姓齊二國守玄枵之地居其維首而有妖星焉告邑姜也客星玄枵之維首姜邑齊大公安晉唐叔之母星占婺女爲旣嫁之女織女爲處女邑姜齊之翫嫁女妖星在􅄔女齊得歳故知禍歸邑姜邑姜晉之妣也天以七紀二十八􅀫靣七戊子逢公以登星斯於是乎出逄公殷諸侯君齊地者逢公將死妖星岀婺女時非歳星所在故齊自當禍而以戊子曰卒吾是以譏之至時晉平公卒漢書曰元帝􅀄元元年四月客星大如􅀲色青白在南斗第二星東可四尺占曰爲水飢其月㴾海水大溢六月􅀜東大飢民多飢死瑯瑘人相食二年五月客星見􅄧分居卷舌東可五尺青白色炎長三寸占曰天下有妄言者其十二月鉅鹿都尉謝君男詐爲神人論死續漢書天文志曰孝安永􅀄四年六月甲子客星大如李蒼白芒氣長二尺西南指上階星上階爲三公後太尉張禹司空張敏皆免官又曰中平五年六月丁夘客星如三升椀出貫索西南行入天市至尾而消占曰客星入天市爲貴人䘮謝承後漢書曰吴郡周敞師事京房爲趙顯所譛謂敞曰吾死後三十日客星必出天市即吾無辜也死後果如言孛左傳曰文十四年有星孛入于北斗周内史叔服曰不出七年宋齊晉之君皆將死亂又曰昭十七年冬有星孛于大辰西及漢申湏曰彗所以除舊布新也天事象今除於火火出必布焉諸候其有火災乎梓慎曰徃年吾見之是其徴也火出而見今兹火出而章必火入而伏其居火也乆矣其}
