  - {type: variant, offset: 2029, length: 1, content: 崩, SBCK: 狗下於郿山於其下講武厭之帝將至有兎驚馬帝肥墜馬而死又曰武成清河三年春天狗南流下宋地彭城其年妖人反於鄴入北城刼太師彭城王浟爲主浟不從見害又曰周宣王大象元年五月有流星大如二斗器云從太微端門流入}
