  - {type: variant, offset: 2150, length: 0, content: '', WYG: 大業十二年枉矢二出北斗魁委曲蛇行注於南斗後二年宇文化及於江都僭號許王世充於東都殺恭帝僭號鄭蚩尤旗河圖稽燿鈎曰熒惑散爲蚩尤旗主惑亂河圖提劉子曰帝將怒蚩尤出乎四野史記曰}
