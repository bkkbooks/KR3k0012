  - {type: variant, offset: 1570, length: 144, content: 流血滂滂晉書曰惠帝元康中天西北裂時人主昏闇賈后專政又曰大安中天裂為二聲如雷是時長沙王奉帝出拒成都王頴河間王顒迭威專命僣亂之象又曰成帝咸和四年冬天裂西北時蘇峻之子以萬人入吳興天下有兵關中轉亂明年石勒僣位又曰穆帝昇平五年天裂廣數丈聲如雷又哀帝初即位天中裂黃三四丈聲如雷野雉皆雊時帝荒疾不識萬機, WYG: 白皇}
