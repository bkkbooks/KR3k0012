  - {type: variant, offset: 80, length: 0, content: '', SBCK: 不然乎火出於夏爲三月於啇爲四月於周爲五月夏數得天􅀂火作其四國當之六物之占在宋衛陳鄭乎宋大辰之虚也陳大皥之虚也鄭祝融之虚也皆火房也星孛及漢漢水祥也衛顓頊之虚也故爲帝丘其星爲大水水火之壯也其以丙子􅀂壬午作乎水火所以合也􅀂火入而伏必以壬午不過其見之月鄭禆竈言於子産曰宋衛陳鄭將同日火􅀂我用瓘􅕸玉瓉鄭必不火子産弗與後四國皆火春秋孔演圖曰海精死彗星出宋均注曰海精鯨魚彗星出則國樞橛春秋考異郵曰鯨魚死彗星合宋均注曰鯨魚隂物生於水今出而死是時有兵相殺之祥也故天應之以妖彗也春秋合誠圖曰赤彗火精如火曜長七尺孝經鈎命决曰周襄王不能事其母弟彗入斗亡其度孝經内記曰彗星北斗禍大起在三台臣害君在太微君害臣在天獄諸侯作禍彗行所指其國大惡四彗在月中者君有徳天下欣心大豊盛爾雅曰彗星爲􅍴楚緘切搶楚􅁃切河圖帝通紀曰彗星者天之旗河圖稽燿鈎曰五星散爲五色之彗戰國䇿曰唐睢謂􅁗王曰專諸刺王僚彗星襲月史記曰􅁗始皇十五年彗星四見大者八十日長或竟天其後􅁗遂滅六王并中國}
