  - {type: variant, offset: 6, length: 1, content: 下, SBCK: 先兄舉丗以爲􅀏今處姊未適人而君先行可乎對曰妾姉髙行殊邈未遇良匹不如鄙薄茍然而巳又問南郡學窮道奥文爲辭宗而所在之識輙以資財爲損何耶對曰孔子大聖不免武叔之毀子路至賢猶有伯寮之愬家君固其冝也蜀志曰􅀄孫權以妹妻蜀先主孫氏性才捷剛猛有諸兄之風侍婢百餘人皆執刀劒而侍立先主心常凛凛然也}
