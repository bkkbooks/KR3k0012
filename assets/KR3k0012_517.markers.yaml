  - {type: variant, offset: 218, length: 0, content: '', SBCK: 父亡盲女臨屍一呌眼皆血出小妺娥䑛之其左眼即開愈時人皆以爲孝感所致也梁典曰長廣橋者宋武帝姉昔賣紗籴米還橋小不敢過無舡得渡日晚宋武帝大飢乆方見姉􅀒米還乃謂姉曰􅀂異曰冨貴當長廣此橋遂爲名也新子曰梁車新爲鄴令其姉徃見之值暮郭門閉遂踰郭而入梁車新因刖其足趙成侯以爲不􅄌遂奪璽免官應劭風俗通曰郝廉太原人飢寒不受人衣食曽過姉家飰留五十文置席下而去丗􅀃曰郗嘉賔死婦弟欲迎其姉還姉終不肯歸曰生縱不得與郗郎同室死寜不同穴也又曰􅀽彦道有二姉一適殷源一適謝祖甞語桓宣武切恨不更有一人配卿也王子年拾遺曰賈逵年六歳其姉聞隣家讀書日日抱逵就籬聽之逵年十歲乃暗誦六經父曰吾未甞教尓安得}
