  - {type: variant, offset: 3, length: 1, content: 六, krp: 七姊妺舅姑㛐叔娣姒姊妺爾雅曰女子先生爲姊後生爲妹毛詩曰泉水曰問我諸姑遂及伯姊禮記檀弓曰孔子與門人立栱而尚右二三子亦尚右孔子曰二三子之嗜學也我則有姊之䘮故也二三子皆尚左左傳成上曰潞子嬰兒之夫人晉景公之姊也鄷舒爲政而殺之又傷潞子之目晉侯欲伐之諸大夫皆曰不可鄷舒有三雋才不如待後之人伯宗曰必伐之狄有五罪雋才雖多其何𥙷焉遂㓕潞鄷舒奔衛衛人歸請晉晉人殺之又昭元曰鄭徐吴犯之妹美公孫楚聘之矣公孫黒又使強委禽焉犯懼告子産子産曰是國無政非子之患也惟所欲與犯請于二子使女擇焉子晢盛飾而入布弊而出哲公孫黑子南戎服而入左右射超乗而出女自房觀之曰子晢信羙矣抑子南夫也子南公孫楚字夫夫婦婦所謂順也適子南氏焉又定上曰吴伐楚楚昭王取其妹以岀渉濉水鍾建負之以從復國王將嫁季芉季芉辭曰所以爲女子逺丈夫也鍾建負我矣王遂使妻鍾建以爲樂尹春秋感精符曰人主含天地據璣衡齊七政秉八極父天母地}
