  - {type: variant, offset: 1232, length: 24, content: 中舍人寅新安太守鏡征北將軍弟永廣州刺史辨俱知名謂, WYG: 持一青囊授含含開}
  - {type: variant, offset: 1235, length: 129, content: 寅新安太守鏡征北將軍弟永廣州刺史辨俱知名謂之張氏五龍隋書曰廬昌衡小字龍子風神澹雅容止可法博涉經史工草行書從弟思道小字釋奴宗中俱稱英妙故幽州為之語曰盧家千里釋奴龍子唐書曰溫大雅歷遷黃門侍郎弟彥博為中書侍郎對居近侍議者榮之高祖從容謂曰我起義晉陽為卿一門耳大雅將改, SBCK: 㛐亡無以具}
