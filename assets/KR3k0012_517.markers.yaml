  - {type: variant, offset: 219, length: 7, content: 值年飢穀貴悝蔬, SBCK: 墳五典誦之乎對曰姉甞抱于籬邊聽隣家讀書因記得而誦之簫韶太清記曰劉孝儀諸妺文彩艶質甚於神人也荆州圖南北岸曰屈原之郷里原旣流放忽然歸郷人喜恱因名南岸曰歸郷岸原有姉聞原還亦來歸責其矯丗郷人又名其北岸曰姉歸岸舅姑釋名曰夫之父曰舅舅言乆也父老之稱也夫之母曰姑姑言故也爾雅曰婦稱夫之父曰舅稱夫之母曰姑姑舅在則曰君舅君姑殁則曰先舅先姑禮記檀弓曰婦人不飾不敢見舅姑又内則曰婦事舅姑如事父母雞􅀄鳴咸盥漱櫛蹝笄緫衣紳左佩紛恱刀礪小觽金燧右佩箴管線纊施縏袠大觽木燧衿䙬綦屨以適舅姑之所及所下氣怡聲問衣燠寒疾痛苛癢而敬抑搔之又曰婦將有事大小必請於舅姑不敢專行也儀禮婚禮曰舅饗送者以一獻禮酬以束錦姑饗婦人送酬亦如之左傳襄元曰魯齊姜薨􅀄穆姜使擇美檟以自爲櫬與頌琴季文子取以葬君子曰非禮也禮無所逆婦飬姑者也􅃜姑以成婦逆莫大焉穆姜成公母禮姜成公婦也列女傳曰鄒孟軻旣娶將入室其婦祖而内孟子不恱遂去不入婦辭孟母求去曰妾聞夫婦之道私室不與焉今妾􅀼惰在室而夫子見妾悖然不恱是客妾也婦人之義盖不客􅀫請歸於父母姑召軻而謂之曰夫禮將上堂聲必􅀭所以戒人也將入户視必下恐見人過今子不察於禮而責於妻不亦逺乎孟子遂留其婦謝之君子謂孟母知禮而明姑婦之道㛐叔釋名曰㛐叟也老稱也叟縮也人及物老皆小縮於舊也叔少也㓜者稱也叔亦俶也見㛐俶然却退也爾雅曰女子謂兄之妻爲㛐弟之妻爲婦禮記曲禮曰㛐叔不通問又檀弓曰子思之哭㛐也爲位婦人倡踊又曰㛐叔之無服也盖推之逺之也又􅄂記曰㛐不撫叔叔不撫㛐史記曰蘇􅁗洛陽人從􅀑谷歸大困窮困兄㛐姉妹妻皆􅀏之不爲下機􅁗乃閉室不出讀周書隂符後合六國從約并力相六國北報趙過洛陽車􅀐輜重擬於王者乃歸昆弟㛐側目不敢仰視􅁗謂㛐曰何前踞而後恭㛐匍匐以靣伏地謝曰見季子位髙金多也漢書曰髙祖長兄伯妻髙祖微時甞避事時與賔友過其丘㛐丘空也無壻日丘乃寡㛐也㛐厭叔引客來}
