  - {type: variant, offset: 2646, length: 272, content: 假貸有不悅之色見金而喜兄乃惻然感悟棄妻還金海內先賢傳曰范丹字史雲讓財千萬與三弟風俗通曰陳留太守泰山吳文章少與兄伯武相失二十年後相會下邳市中爭計共鬭伯武毆之文章欲報心悽悵手不能興觀者笑之更相借問乃親兄也相持啼泣觀者復曰兄得校弟不得報兄向者所笑乃其義也典論曰劉表疾病其子琦還省疾琦性慈孝其弟恐琦見表父子相感更有託後之意謂曰將軍命君撫臨江夏為國東藩其任至重今釋眾而歸必見譴怒傷歎以增其疾非孝敬也遂遏于戶外使不得見琦流涕而去江微陳留志曰李銓字玄機平丘人也少聰惠有志行銓兄全前母子後母甚不愛也而衣食皆使下銓銓始年五歲覺己衣勝兄即脫不著須兄得與己同然後服之, SBCK: 娶於申公巫臣氏}
