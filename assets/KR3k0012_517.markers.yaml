  body:
  - {type: variant, offset: 3, length: 1, content: 六, SBCK: 七姊妺舅姑㛐叔娣姒姊妺爾雅曰女子先生爲姊後生爲妹毛詩曰泉水曰問我諸姑遂及伯姊禮記檀弓曰孔子與門人立栱而尚右二三子亦尚右孔子曰二三子之􅄝學也我則有姊之䘮故也二三子皆尚左左傳成上曰潞子嬰兒之夫人晉景公之姊也鄷舒爲政而殺之又傷潞子之目晉侯欲伐之諸大夫皆曰不可鄷舒有三雋才不如待後之人伯宗曰必伐之狄有五罪雋才雖多其何􅀘焉遂㓕潞鄷舒奔衛衛人歸請晉晉人殺之又昭元曰鄭徐吴犯之妹美公孫楚聘之矣公孫黒又使強委禽焉犯懼告子産子産曰是國無政非子之患也惟所欲與犯請于二子使女擇焉子晢盛飾而入布弊而出哲公孫黑子南戎服而入左右射超乗而出女自房觀之曰子晢信羙矣抑子南夫也子南公孫楚字夫夫婦婦所謂順也適子南氏焉又定上曰吴伐楚楚昭王取其妹以岀渉濉水鍾建􅀒之以從復國王將嫁季芉季芉辭曰所以爲女子逺丈夫也鍾建􅀒我矣王遂使妻鍾建以爲樂尹春秋感精符曰人主含天地據璣衡齊七政秉八極父天母地}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_517-1b}
  - {type: variant, offset: 3, length: 1, content: 六, WYG: 七姊妹舅姑嫂叔娣姒姊妹爾雅曰女子先生為姊後生為妹詩泉水曰問我諸姑遂及伯姊禮記檀弓曰孔子與門人立拱而尚右二三子亦皆尚右孔子曰二三子之嗜學也我則有姊之䘮故也二三子皆尚左左傳成公上曰潞子嬰兒之夫人晉景公之姊也酆舒為政而殺之又傷潞子之目晉侯欲伐之諸大夫皆曰不可酆舒有三雋才伯宗曰必伐之狄有五罪雋才雖多其何補焉遂滅潞酆舒奔衛衞人歸諸晉晉人殺之又昭元曰鄭徐吾犯之妹美公孫楚聘之矣公孫黑又使强委禽焉犯懼告子産子産曰是國無政非子之患也惟所欲與犯請於二子使女擇焉子晢盛飾而入布幣而出晢公西黒子南戎服而入左右射超乗而出女自房觀之曰子晢信美矣抑子南夫也子南公孫楚字夫夫婦婦所謂順也適子南氏焉又定公上曰吳伐楚楚昭王取其妹以出涉濉水鍾建負之以從後復國王将嫁季芊季芊辭曰所以為女子逺丈夫也鍾建負我矣王遂使妻鍾建以為樂尹春秋感精符曰人主含天地據璣衡齊七政秉八極父天母地}
