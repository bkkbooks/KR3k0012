  - {type: variant, offset: 1365, length: 557, content: 其祖父筮者曰葬於此地害兄而福弟大雅曰若得家弟永康我將含笑入地葬訖歲餘而卒又曰張嘉貞為并州長史為政嚴肅甚為人吏所畏開元初因奏事至京師上聞其善政數賞慰嘉貞因奏曰臣少孤兄弟相依以至今日臣弟嘉祐今授鄯州別駕與臣各在一方同心離居魂絕萬里乞移就臣側近臣兄弟盡力報國死無所恨上嘉其友愛特改嘉祐為忻州刺史又曰韋述弟迪學業亦亞於述尤精三禮與述對為學士迪同為禮官時人榮之又曰張道源族孫楚金少有志行事親以孝聞初與兄越石同預鄉貢進士州司將罷越石而薦楚金楚金辭曰以順則越石長以才則楚金不如固請俱退時李勣為都督歎曰貢士本求才行相推如此何嫌雙舉也乃俱薦擢第又曰李遜幼孤寓居江陵與其弟建皆安貧苦易衣併食講習不倦遜兄造知二弟賢日為營丐成其志業建先遜一年卒兄弟同致休顯士君子多之又曰楊汝士為劍南東川節度使時宗人嗣復鎮西川兄弟對居節制時人榮之又曰薛膺友悌弟齊為李絳山東西道從事絳遇害齊中飛矢墜於城下膺時為左補闕聞難不及請馳馬以赴齊歿膺與兄弟褒庠處喪過禮朝之卿大夫暨搢紳者往弔繼路聞其哀號弔者悲不能自持膺去左補闕庠去河南縣尉直弘文館與褒皆屏居外野布巾終喪蹈名教者推之續晉陽秋曰王岷有俊才與兄列並有名而聲出珣右時人為之語曰法護非不佳阿彌難為兄韋昭吳書曰劉繇長子基遭家多難嬰丁困苦潛處味道不以為慼與群弟居常夜臥早起妻妾稀見其面諸弟敬憚事之猶父不妄交遊門無雜賓, WYG: ''}
