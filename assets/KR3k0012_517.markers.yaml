  - {type: variant, offset: 5, length: 0, content: '', SBCK: 日姊月史記曰聶政爲嚴仲子殺韓相俠累因自披面披抉眼出膓以死韓取政屍􅁀於市購之曰有能言殺俠累者與千金政姉嫈聞之乃伏屍􅂘曰是軹深井里聶政也妾奈何畏殁身之誅滅賢人之名乃大呼天者三遂死於政旁也又曰萬石君石􅁬髙祖問曰君有何人對曰有姊善鼔琴髙祖乃召爲美人又曰張敬叔姊善皷琴髙祖召爲宫人徙其家就戚里戚里在長安與親戚別居故曰戚里漢書曰李延年妹絶美延年侍上酒酣歌曰北方有佳人絶丗而獨立一顧傾人城再顧傾人國不惜傾城傾國佳人難再得武帝聞之乃召入宫又曰􅁗彭字伯平爲山陽太守民江伯欲嫁寡姊姊乃引鎌自割伯因前救姊觸鎌傷姊遂亡縣正論法彭曰救無惡志乃輕罪之謝承後漢書曰范冉姊病徃看之姊爲設飰冉留錢一百文姊使人追還之冉竟不受又曰曹壽妻班超之妺也超字仲叔扶風人爲都護在絶域年老思入關妺乃上書曰妾兄超延命沙漠三十餘年骨􅁏生離不復相識書奏帝乃徴還又曰宋弘字仲子爲司空帝姉胡陽公主新寡帝與論朝臣羙惡以觀其意主曰宋弘容德莫及帝曰方圖之後引弘入令主坐屏風後因謂弘曰貴易交冨易妻人情乎弘曰貧賤之交不可忘糟糠之妻不下堂帝謂主曰事不諧矣又曰汝南􅀽隗妻馬融之女少有才辨融家丗豐豪裝遣甚盛及􅀄成禮隗謂之曰婦奉箕箒而巳何乃過珍麗對曰慈親垂愛不敢逆命君欲雹宣梁鴻之行者妾亦請從少紹孟光之事又問曰}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_517-2a}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_517-2b}
  - {type: variant, offset: 5, length: 15, content: 弟下晉書王覽字玄通母朱氏遇前妻, WYG: 日姊月史記曰聶政為嚴仲}
