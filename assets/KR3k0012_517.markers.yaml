  - {type: variant, offset: 168, length: 0, content: '', WYG: 問南郡學窮道奥文為辭宗而所在之職輙以資財為損何耶對曰孔子大聖不免武叔之毁子路至賢猶有伯寮之愬家君固其宜也蜀志曰初孫權以妹妻蜀先主孫氏才性剛猛有諸兄之風侍婢百餘人皆執刀劒而侍立先主心常凛然也晉書曰郭奕字大業太原人遷雍州刺史有寡姊隨其之官姊下僮多有奸犯而為人所糾奕接省畢曰丈夫豈當以老姊求名遣而不問又曰桑虞字子深衛人年十四䘮父哀毁過禮以米百粒糝藜藿其姊喻之曰滅性非孝子對曰藜藿雜米足以勝哀又曰凉州刺史羊欣姊喪未經旬車騎長史韓預强聘其女為妻張酺為御史中丞請貶預以清風俗論者稱之又曰陳統字元方弟絃字偉方俱清秀知名姊妹四人並有美才姊適東莞徐氏生邈及二姊適同郡劉氏文章最盛又曰慕容垂妻叚氏字元妃光祿大夫叚儀女婉惠有志操常謂妹季妃曰我終不作凢人妻季妃曰我不作庸婦隣人聞笑之後燕王納元妃為室范陽王德聘季妃並如其言又曰王凝之妻謝氏名道藴安西将軍奕之女也聪明有才辨同郡張𤣥妹亦有才質適顧氏謝𤣥每以之敵道藴有濟尼者遊於二家或問之答}
