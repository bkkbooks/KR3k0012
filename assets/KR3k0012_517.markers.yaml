  - {type: variant, offset: 1225, length: 3, content: 張岱少, WYG: 王澄字平子衍季弟也衍妻郭氏性貪鄙令婢於路擔糞澄年十四諫郭郭大怒謂澄曰昔先人臨終之日以小郎囑新婦不以新婦囑小郎因捉其衣裾欲杖之澄懼踰忩而走得脫又曰王凝之妻謝氏字道韞奕之女也聪識有才辨凝之弟獻之嘗}
  - {type: variant, offset: 1229, length: 2, content: 兄太, WYG: 賔客談議詞理将屈道韞使婢白獻之曰新婦欲與小郎解圍乃以青綾步障自蔽申獻之前義客遂不能屈也又曰晉中書令王珉與嫂婢私通嫂撻甚苦婢素善歌而珉好執白團扇故製白團扇歌又曰顔含字𢎞都嫂老而失明含奉養如親束帶側侍嫂病困湏蚺蛇膽求之不獲憂歎盈懐方獨坐愁苦忽有一童}
