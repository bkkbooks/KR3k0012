  - {type: variant, offset: 581, length: 44, content: 從高祖馳遣呼述須至乃歡及景仁有疾述盡心視湯藥飲食必嘗而後進不解帶不盥櫛者累旬景仁深懷悊愧, SBCK: 能屈}
  - {type: variant, offset: 581, length: 640, content: 從高祖馳遣呼述須至乃歡及景仁有疾述盡心視湯藥飲食必嘗而後進不解帶不盥櫛者累旬景仁深懷悊愧也又曰張暢弟收為猘音冀犬所傷醫言食蝦蟆鱠即愈收甚難之暢含笑先嘗收因啖得差又曰庾登之字元龍頴川鄢陵人也少以強濟自立為吳郡太守坐事免官弟炳之為臨川內史登之隨弟之郡優遊自適又曰江夷字茂遠濟陽考城人也夷少自操厲為吳郡太守以兄疾去官後遷右僕射又曰陶潛與弟子書以言其志并為訓戒曰汝輩稚小家貧無役柴水之勞何時可免念之在心若何可言然雖不同生當思四海皆兄弟之義鮑叔敬仲分財無猜歸生伍舉班荊道舊遂能以敗為成因喪立功他人尚爾況共父之人哉頴川韓元長漢末名士身處卿佐八十而終兄弟同居至于沒齒濟北汜稚春晉時操行人也七世同財家無怨色詩曰高山仰止景行行止汝其慎哉又曰孔顗字思遠不尚嬌飾服用麤敗終不改易時吳郡顧顗之亦尚儉素衣裘器服皆擇其陋者宋世清約稱此二人顗弟道存從弟微頗營業二弟請假東還輜重十餘舫皆是絹紙席之屬顗見之命上置岸側命左右取火燒之盡乃去道存代顗為江夏內史時都邑米貴道存慮顗甚乏遣吏載伍百斛米餉之顗呼吏載米還彼吏曰都下米貴乞於此貨之不聽吏乃載米而去又曰蔡廓罷豫章郡還起二宅先成東宅與弟軌又曰徐湛之年數歲時與弟淳之共車牛奔車環左右人馳來赴之湛之先令取弟眾咸歎其幼而有識又曰謝弘微寬重有雅量不以喜慍改色有蔡湛之者及見太傅兄弟謂人曰弘微白類中郎而性似文靖齊書曰衡陽元王道度太祖長兄也與太祖俱受學雷次宗宣帝問二兒學業次宗荅曰其兄外朗其弟內潤皆良璞也又曰劉璡兄瓛夜隔壁呼璡共語璡不荅方下床著衣立然後應瓛問其久璡曰向束帶未竟其操, WYG: 啻}
