  - {type: variant, offset: 221, length: 5, content: 飢穀貴悝蔬, WYG: 曰魯齊姜薨初穆姜使擇美檟以自為櫬與頌琴季文子取以葬君子曰非禮也禮無所逆婦養姑者也虧姑以成婦逆莫大焉穆姜成公母齊姜成公婦也列女傳曰鄒孟軻既娶將入室其婦袒而在内孟子不恱遂去不入婦辭孟母求去曰妾聞夫婦之道私室不與焉今妾竊惰在室而夫子見妾悖然不恱是客妾也婦人之義蓋不客宿請歸於父母姑召軻而謂之曰夫禮將上堂聲必揚所以戒人將入戸視必下恐見人之過今子不察於禮而責於妻不亦逺乎孟子遂留其婦謝之君子謂孟母知禮而明姑婦之道嫂叔釋名曰嫂叟也老稱也叟縮也人及物老皆小縮於舊也叔少也幼者稱也叔亦俶也見嫂俶然却退也爾雅曰女子謂兄之妻為嫂弟之妻為婦禮記曲禮曰嫂叔不通問又檀弓曰子思之哭嫂也為位婦人倡俑又曰嫂叔之無服也蓋推而逺之也又雜記曰嫂不撫叔叔不撫嫂史記曰蘇秦洛陽人從鬼谷歸大困窮兄嫂姊妹妻皆笑之不為下機秦乃閉室不出讀周書隂符後合六國從約并相六國比報趙過洛陽車騎輜重擬於王者乃歸昆弟嫂側目不敢仰視秦謂嫂曰何前踞而後恭嫂匍匐面伏地謝曰見季子位髙金多也漢書曰髙祖長兄伯妻髙祖微時當避事時與賔友過其丘嫂丘空也無婿曰丘乃寡婦也嫂厭叔引客來}
