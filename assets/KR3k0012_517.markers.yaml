  - {type: variant, offset: 218, length: 0, content: '', WYG: 父亡盲女臨屍一呌眼皆血出小妹為䑛之左眼即開愈時人皆以為孝感所致也梁典曰長廣橋者宋武帝姊昔賣鈔糴米還橋小不敢過無船得渡日晚宋帝大饑久方見姊負米還乃謂姊曰若異日富貴當長廣此橋遂為名也唐書曰徐勣姊疾病為姊煮粥火燃其鬚姊曰僕妾多矣何自苦如此勣曰姊老矣弟亦老矣顧欲常煮粥豈可得哉非為無僕妾新子曰梁車新為鄴令其姊徃見之值暮郭門閉遂踰郭而入梁車新因刖其足趙成侯以為不慈遂奪璽免官應劭風俗通曰郝原太原人饑寒不受人衣食曾過姊家飰留五十文置席下而去世説曰郗嘉賓死婦弟欲迎其姊還姊終不肯歸曰生縱不得與郗郎同室死寕不同穴也又曰袁彦道有二姊一適殷源一適謝祖常語桓宣武曰切恨不更有一人配卿也王子年拾遺曰賈逵年六嵗其姊聞鄰家讀書日日抱逵就籬聽之逵年十嵗乃暗誦六經父曰吾未嘗教爾安得}
