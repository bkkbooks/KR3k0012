  - {type: variant, offset: 1959, length: 138, content: 諸葛瑾弟亮及從弟誕並有盛名各在一國于時以為蜀得其龍吳得其虎魏得其狗誕在魏與夏侯玄齊名瑾仕吳吳朝服其弘雅又曰謝弈作剡令有一老翁犯法謝以醇酒罰之乃至醉而猶未已太傅時年七八歲著青布袴在兄膝邊坐諫曰阿兄老翁可奈何故取作此謝於是改容曰阿奴欲放去耶即遣之會稽典錄曰謝淵字休德山陰人其先鉅鹿, SBCK: 髙鳯爲}
