  - {type: variant, offset: 2118, length: 384, content: 俱興兄咨字休度少以質行自立幹局見稱官至海昌都尉淵起於衰末兄弟脩德貧無慼容歷位建威將軍又曰鍾牧字子幹牧兄駰計吏少與同郡謝贊吳郡顧譚齊名牧童齔時號為遲訥嘗謂人曰牧必勝我不可輕也時人皆以為不然三輔決錄曰張宇穆之第二子也以父功當封自言兩目失明天子信之乃封弟恭其小弟好戲無度放散家財宇悉以所得千萬與之天子聞而嘉之又知其讓封徵拜議郎說苑曰宋襄公茲父為桓公太子桓公有後妻子曰公子目夷公愛之茲父為公愛之也欲立之請於公曰請使目夷立臣為之相以佐之公曰何故也對曰臣自知不足以處目夷之上公不許強以許公許之將立公子目夷目夷辭曰兄立而弟在下是其義也今弟立而兄在下不義而使目夷為之目夷將逃之衛茲父從之三年桓公有疾使人召茲父曰若不來是使我以憂死也茲父乃反公復立之以為太子然後目夷召茲父歸楚國先賢博曰陰興字君陵南陽新野人也拜衛尉薨時封興長子慶為嗣陽侯次子傅為濦強侯傅弟員丹皆為郎慶少修儒術推所居第宅奴婢, SBCK: ''}
