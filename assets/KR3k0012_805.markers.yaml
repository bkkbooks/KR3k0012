  - {type: variant, offset: 828, length: 0, content: '', SBCK: 愛之也故曰不貴其師不愛其資雖知大迷又曰堂谿空見昭侯曰今有白玉之巵而無當有瓦巵而有當君渴將何以飲君曰以瓦巵堂谿空曰白玉之巵美而君不以飲者以其無當􅁘君曰然堂谿空曰爲人主而漏泄其羣臣之語譬猶玉巵之無當也堂谿空每見而出昭侯必獨卧惟恐蔑言泄於妻妾淮南子曰琬琰之玉存汗泥之中雖廉者不釋也又曰崑崙山曽城九重有珠樹玉樹又曰鍾山之玉炊以爐炭三日三夜而色澤不変得天地之精又曰王璞不猒厚又曰白玉不雕美珠不文質有餘也又曰兩堅不能相加兩強不能相伏故梧桐斷馬角截梨玉言柔勝剛又曰玉待濫諸而成器濫諸珎玉之名也言物有待賤而貴隨巢子曰幽厲之時奚禄山壞天賜玉玦於羿遂以殘其身以此爲福而禍抱朴子曰吴時發廣陵大􅃁兵人共舉死人以􅀝璧有一玉長一尺形似冬􅀲從人懷中頽出墮地玉可以爲珠酒及地榆酒化之爲水亦可燒以爲粉服一年以上入水不沾入火不灼又曰玉脂生玉之山膏流出萬年以上則凝而成之鮮明如水精以無心草木和之湏􅁷成水服之一升得干歳玉服玄真者其命不極玄眞玉別名也服玉當得于闐白玉赤松子以玄虫而漬玉爲水服之故得乗烟霞上下也又曰中山諺曰稱人字者金玉也知其物則不爲害賈子曰德有天理曰道性神明命之所生而能象德者獨玉也符子曰荆山不貴玉鮫人不貴珠穆天子傳曰天子大朝黄之山披啚視典用觀天子之寳器玉果石以美玉謂女果者璿珠璿玉􅀋音又曰天子北征東還乃循黒水至於羣玉之山先王所謂䇿府天子於是取玉枝三乗玉器服物於是載玉萬􅃗也又曰赤烏氏美人之地寳玉之所在也山海經曰珏二王相合珏音角琩琉夷蠻係耳玉也稷契之山及鹿臺山其上多白玉瑜次之山多嬰垣之玉泰冒之山洛水岀焉其中多藻玉宻山之上丹水岀焉其中多王膏其源沸湯黄帝是食玉膏之所出五色乃清五味乃馨堅栗精宻澤而有光五色發作以和柔剛天地􅀑神是食是饗}
