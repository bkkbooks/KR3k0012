  - {type: variant, offset: 6, length: 4, content: 尚書堯典, WYG: 奏言張氏以子儀在時分財子弟不合爭奪然張氏宅與親仁宅皆子儀家事子儀有大勲伏望陛下赦而勿問使私自引逺上從之時人賞其識大體也又}
