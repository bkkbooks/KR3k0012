  - {type: variant, offset: 3683, length: 493, content: 餘頗有麤黑者亦挾盛以還至而觀之皆光潤可玩預乃椎七十枚為屑食之餘多惠人後預及聞者更求玉於前處皆無所見翊公源懷弟得其玉琢為器佩皆鮮明可寶預服經年云有効驗而世事寢食皆不禁節又加好酒損志及疾篤謂妻子曰吾酒色不絕自致於死非藥過也然吾尸體必當異勿速殯令後人知飡服之妙時七月中旬長安毒熱預屍四宿而體色不變其妻常氏以玉珠二枚唅之口閉常謂曰君自云飡玉有神驗何不受唅言訖齒啟納珠因虛其口都無穢氣舉歛棺堅直不傾委死時有遺玉屑數升囊盛納諸棺中又曰高祐為中書侍郎時有人於零丘得玉印一以獻詔以示祐祐曰印上有籀書二字文曰守壽壽者命也我獲其命亦是歸我之徵又曰穆弼有風格善自位置高祖初定代族欲以弼為國子助教弼辭曰先臣以來蒙恩累世比校徒流實用慚屈高祖曰朕欲厲胄子故屈卿先白玉投泥豈能相污弼曰既遇明時恥沉於泥滓又曰孝昌中於廣平王第掘得古玉印勑召祖瑩與李琰之令辯何世之物瑩云此是于闐國王晉泰康中所獻乃以墨塗字觀之果如瑩言時人稱為愽物後周書曰武帝保定中晉公護獲玉斗以獻北史曰于謹平江陵獲大玉徑四尺圍七尺及諸輿輦法物以獻又曰隋文時王邵上表云稽覽圖史又云政道則陰物變為陽物鄭玄注云葱為韭亦是謹案自六年已來遠近山石多變為玉石為陰玉為陽, WYG: 五}
