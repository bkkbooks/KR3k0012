  - {type: variant, offset: 1025, length: 1529, content: 得禮制則澤谷之中有白玉焉禮斗威儀曰君乘金而王則紫玉見於深山左詩桓公曰初虞叔有玉虞公求旃不獻既而悔之曰周諺有之疋夫無罪懷璧其罪吾焉用此以其賈害乃獻之又莊公曰虢公晉侯朝王享禮命之宥命之以幣物有助也皆玉五瑴非禮也又僖上曰天王使邵武公內史過賜晉侯命受玉惰過歸告王曰晉侯其無後乎事具錫命門又僖下曰楚子玉自為瓊弁玉纓未之服也先戰夢河神謂己曰畀余賜汝孟諸之麋弗致也大心與子西使榮黃諫弗聽榮季曰死而利國猶或為之況瓊玉乎是糞土也而可以濟師將何愛焉弗聽又僖下曰晉侯執衛侯歸之于京師使醫衍酖衛侯甯俞貨醫使薄其酖不死公為之納玉於王與晉侯皆十瑴王許之乃釋衛侯又文公下曰秦伯使西乞術來聘且言將伐晉襄仲辭玉事具奉使部又曰莒太子僕以其寶玉來奔又成上曰晉及齊戰于鞍齊師敗齊侯使賓媚人賂以紀甗玉磬與地不可則聽客之所為又襄十五年曰宋人或得玉獻諸子罕子罕弗受獻玉者曰以示玉人玉人能治玉者玉人以為寶也故敢獻之子罕曰我以不貪為寶爾以玉為寶若以與我皆喪寶也不若人有其寶稽首而告曰小人懷璧不可以越鄉言必謂盜所害納此以請死也請免死子罕寘諸其里使玉人為之攻之攻治也富而後使復其所賣玉得富又襄公十八年晉侯伐齊將濟河獻子以朱絲玉二瑴雙玉曰瑴而禱曰齊環怙恃其險負其眾庶環齊靈公名負依也棄好背盟陵虐神主神主民也謂數伐魯民人曾臣彪將率諸侯以討焉彪晉平公名稱臣者明上有天子以謙告臣曾臣猶末臣其官臣偃實先後之守官之臣偃獻子名茍捷有功無作神羞羞恥也官臣偃無敢復濟偃信巫言故以死自誓唯爾有神裁之沈玉而濟又昭七年曰燕暨齊平燕人歸燕姬嫁玉與齊侯賂以瑤罋玉櫝斝耳不克而還瑤玉也櫝匱也斝耳玉爵又曰公賜公衍羔裘使獻龍輔於齊侯龍輔玉名遂入羔裘齊侯喜與之陽穀陽穀齊邑又曰公疾徧賜大夫從公者大夫不受賜子家子雙琥琥玉器一環一璧輕服細好之服受之大夫皆受其賜巳未公薨子家反賜於府人曰吾不敢逆君命也大夫皆反其賜又昭十六年曰晉韓起聘于鄭宣子有環其一在鄭商玉環同工共朴自共為雙宣子謁諸鄭伯謁請子子產弗與曰非官府之守器也寡君不知子太叔子羽謂子產曰韓子亦無幾求言所求少晉國亦未可以貳晉國韓子不可偷也偷薄也若屬有讒人交鬥其間鬼神而助之以興其凶怒悔之何及吾子何愛於一環其以取憎於大國也盍求而與之子產曰吾非偷晉而有二心將終事之是以弗與忠信故也僑聞君子非無賄之難立而無令名之患僑聞為國非不能事大字小之難無禮以定其位之患夫大國之人令於小國而皆獲其求將何以給之一共一否為罪滋大大國之求無禮以斥之何饜之有吾且為鄙邑則失位矣不復成國若韓子奉命以使而求玉焉貪淫甚矣獨非罪乎出一玉以起二罪吾又失位韓子成貪將焉用之且吾以玉賈罪不亦銳乎銳細小也韓宣子私覲於子產以玉與馬曰子命起舍夫玉是賜我玉而免吾死也敢不藉手以拜以玉為藉手拜謝子產又昭十七年曰鄭裨竈言於子產曰宋衛陳鄭將同日火若我用瓘斝玉瓚鄭必不火子產弗與以為天災流行非禮所息故也為明年宋衛陳災傳又定上曰蔡昭侯為兩佩與兩裘佩佩玉也以如楚獻一佩一裘於昭王昭王服之以享蔡侯又曰蔡侯歸及漢執玉而沈曰余所有濟漢而南者有若大川自誓言若後渡漢當受禍明如大川又曰季平子行東野還未至丙申卒于房陽虎將以璵璠歛璵璠美玉君所賜仲梁懷弗與曰改步改玉昭公之出孫行君事佩璵與祭宗廟今定公立復臣位改君步則亦當去璵璠陽虎欲逐之告公山不狃曰彼為君也子何怨焉又定下曰邾隱公來朝子貢觀焉邾子執玉高其容仰公受玉卑其容俯玉朝者之贄子貢曰以禮觀之二君者皆有死亡焉又曰陽虎脫甲如宮取寶玉大弓以出又哀上曰衛太子禱曰大命不敢請佩玉不敢愛又曰吳申叔儀乞糧於公孫有山氏曰佩玉藥兮余無所繫之穀梁傳隱公曰賵玉曰唅春秋孔演圖曰孔子論經有鳥化為書孔子奉以告天赤爵集書上化為玉刻曰孔提命作應法春秋說題辭曰孔子以受黃玉葬魯城北毛詩國風曰將翱將翔佩玉鏘鏘將將鳴玉而後行又竹竿曰巧笑之瑳佩玉之郍瑳巧笑貌郍行, SBCK: 飲食}
