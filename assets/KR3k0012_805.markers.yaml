  body:
  - {type: variant, offset: 1, length: 2, content: 寶部, WYG: 可竒云先使吐蕃所得又曰憲宗時庄宅使許逺振得玉類珽以進上悦命賜絹}
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 四玉下唐書曰太宗甞謂魏徴曰玉雖有美質在於石間不值良工􅅣磨與瓦礫不別􅀂遇良工即爲萬代之寳朕雖無美質爲公所切磋勞公約朕以仁義弘朕以道德使朕功業至此公亦足爲良匠耳又曰髙宗朝封禪太嶽造玉􅁽}
  - {type: variant, offset: 3, length: 0, content: '', krp: 四玉下唐書曰太宗甞謂魏徴曰玉雖有美質在於石間不值良工琢磨與瓦礫不別若遇良工即爲萬代之寳朕雖無美質爲公所切磋勞公約朕以仁義弘朕以道德使朕功業至此公亦足爲良匠耳又曰髙宗朝封禪太嶽造玉冊}
  - {type: xml-element, offset: 4, content: '', id: KR3k0012_CHANT_805-bkkxmlele1}
