  - {type: variant, offset: 31, length: 2, content: 璣衡, WYG: 創造蒼璧等九器祭訖具而藏之其餘燎玉請依常制管子曰夫玊之所以貴者九徳出焉温潤以澤仁也隣以理者智也堅而不蹙義也廉而不劌行也鮮而不垢潔也折而不撓勇也瑕瑜皆見情也茂華光澤並通而不相陵容也叩之其音清専徹逺純而不殺辭也是以人主貴之藏以為寳剖以為符瑞文子曰鄭人謂玉未理者璞周人謂䑕未腊者璞周人懷璞問鄭賈曰欲之乎出其璞視之乃䑕璞范子計然曰玊英出藍田列子曰穆}
  - {type: page-break, offset: 31, content: '', id: KR3k0012_WYG_805-3b, image: WYG0900/WYG0900-0146d.png}
  - {type: page-break, offset: 31, content: '', id: KR3k0012_WYG_805-4a, image: WYG0900/WYG0900-0147a.png}
