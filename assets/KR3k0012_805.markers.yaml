  - {type: variant, offset: 214, length: 275, content: 玉周書曰武王俘商舊寶玉萬四千佩玉億有八萬周禮天官下曰玉府掌王之金玉玩好兵器凡良貨賄之藏共王之服玉佩玉珠玉齊則共食玉玉是陽精之純者食之所禦水氣又春官上大宗伯曰玉作六器以禮天地四方以蒼璧禮天以黃琮禮地以青珪禮東方以赤璋禮南方以白琥禮西方以玄璜禮北方儀禮聘禮曰凡執玉無籍者襲鄭玄注云籍言脩也大戴禮曰玉在山而木潤淵生珠而崖不枯珠者陰中之陽也破勝火玉者陽中之陰也破勝水禮記月令曰孟春之月天子衣青衣服蒼玉又曲禮上曰受珠玉者以掬又曰執玉爵者弗揮又曰執玉不趍志重玉也又檀弓曰石駘仲卒駘仲衛大夫石碏之族無適子有庶子六人卜所以為後者莫適立也曰沐浴佩玉則兆言齊潔則得吉兆也, WYG: 管}
