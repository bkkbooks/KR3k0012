  - {type: variant, offset: 3566, length: 6, content: 少曾充使林邑, krp: 白頭公柱杖光耀照人也白頭公白王也搜神記曰呉王夫差女名玉童子韓重有道術女恱之結氣死葬于昌門之外重至冡前哭祭女見形將重入冡臨去取崑崙玉孟以送重燉煌髙納之郡府紀年曰桀伐岷山岷山女尼慮反千桀二女曰琬曰琰桀愛二女無子刻其名於苕華之玉苕是琬華是琰石虎鄴中記曰後宫別坊中有小形玉床又曰石虎以宫人爲女官用玉案文書涼州記曰盗發張駿陵得玉樽玉簫玉笛法顯記曰師子國有玉像齊諧記曰餘杭縣南卷中有一人姓沈名路入山}
  - {type: punctuation, offset: 3572, content: ，, id: KR3k0012_CHANT_805-bkkpn1274}
  - {type: 'tls:seg', offset: 3572, content: '', id: KR3k0012_CHANT_805-49a.16}
  - {type: variant, offset: 3574, length: 0, content: '', SBCK: 玉肫從此以後所向如意家遂殷冨異􅁐曰􅀳東􅌡玉騰字元邁以永嘉元年鎭鄴天雪門前方數十歩融液不積騰恠掘之得玉馬髙一尺許口齒缺騰以馬者國姓爲􅁻瑞或謂馬無齒則不復食又曰弘農楊子陽太元􅀄聞土中聲掘得玉肫録異傳曰江巖常到呉採藥及冨春縣淸泉山􅀯遥見一美女紫衣獨踞石而歌聲有碣石之音巖徃未及數十步輙去女處唯見所踞石耳如此數日巖乃擊破石遂從石中得一紫玉廣長一尺後不復見女又曰邴浪者安樂人行到松滋縣九田山見一鳥形如雉而色正赤集山巖石上鳴聲如吹笙浪即射中之鳥仍入石穴中浪遂鑿石得一赤玉狀如鳥形十洲記曰周穆王時西胡獻玉杯是白玉之精光明照夕置杯於庭中皆明旦而水汁滿於杯中汁甘而香美斯靈器也又曰瀛州有玉膏如酒名曰玉酒飲之令人長生􅀶物志曰得好玉用合玉漿廣志曰白玉美可照而出交州青玉出樓國碧玉出夫餘梁四公記曰扶桑國使使貢觀日玉大如鏡方圎尺餘明澈如琉璃映日以觀見日中宫殿皎然分明地鏡圖曰二月中草木光生下垂者下有}
  - {type: page-break, offset: 3574, content: '', id: KR3k0012_SBCK_805-8b}
  - {type: variant, offset: 3574, length: 0, content: '', WYG: 紫玉廣長一尺後不復見女又曰邴浪者安樂人行到松滋縣九田山見一鳥形如雉而色正赤集山岩石上鳴聲如吹笙浪即射中之鳥仍入石宂中浪遂鑿石得一赤玉狀如鳥形十洲記曰周穆玉時西湖獻玊杯是白玉之精光明照夕以杯扵庭中比明旦而水汁滿扵杯中汁甘而香美斯靈器也又曰瀛州有玊膏如酒名曰玊酒飲之令人長生博物志曰得好鼓玊用梁四公記曰扶桑國使使貢觀日玊大鏡方圓尺餘明澈如琉璃映日以觀見日中宫殿皎然分明地境圖曰二月中草木光生下垂者下有}
  - {type: page-break, offset: 3574, content: '', id: KR3k0012_WYG_805-14a, image: WYG0900/WYG0900-0152a.png}
  - {type: variant, offset: 3574, length: 0, content: '', krp: 玉肫從此以後所向如意家遂殷冨異苑曰晉東􅌡玉騰字元邁以永嘉元年鎭鄴天雪門前方數十歩融液不積騰恠掘之得玉馬髙一尺許口齒缺騰以馬者國姓爲吉瑞或謂馬無齒則不復食又曰弘農楊子陽太元𥘉聞土中聲掘得玉肫録異傳曰江巖常到呉採藥及冨春縣淸泉山南遥見一美女紫衣獨踞石而歌聲有碣石之音巖徃未及數十步輙去女處唯見所踞石耳如此數日巖乃擊破石遂從石中得一紫玉廣長一尺後不復見女又曰邴浪者安樂人行到松滋縣九田山見一鳥形如雉而色正赤集山巖石上鳴聲如吹笙浪即射中之鳥仍入石穴中浪遂鑿石得一赤玉狀如鳥形十洲記曰周穆王時西胡獻玉杯是白玉之精光明照夕置杯於庭中皆明旦而水汁滿於杯中汁甘而香美斯靈器也又曰瀛州有玉膏如酒名曰玉酒飲之令人長生博物志曰得好玉用合玉漿廣志曰白玉美可照而出交州青玉出樓國碧玉出夫餘梁四公記曰扶桑國使使貢觀日玉大如鏡方圎尺餘明澈如琉璃映日以觀見日中宫殿皎然分明地鏡圖曰二月中草木光生下垂者下有}
  - {type: punctuation, offset: 3576, content: ，, id: KR3k0012_CHANT_805-bkkpn1275}
