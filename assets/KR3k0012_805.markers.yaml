  - {type: 'tls:seg', offset: 43, content: '', id: KR3k0012_CHANT_805-1a.14}
  - {type: variant, offset: 43, length: 2, content: 七政, WYG: 千金長食上大夫禄也鬼谷子曰鄭人之取玊也載司南之車為其不惑也尸子曰水方折者有玊圓折者有珠又曰玊者色不如雪澤不如雨潤不如膏光不如燭鄒子曰夫珠生扵南海玊生扵湏彌無足而至者人好之也士有足而不至者以人不好也韓子曰楚人卞和得玊璞扵楚山獻厲王王使人相之曰石也王以和為慢刖右足及武王即位又獻之復相曰石也刖左足及文王即位和乃抱其璞而哭扵楚山三}
  - {type: page-break, offset: 43, content: '', id: KR3k0012_WYG_805-5a, image: WYG0900/WYG0900-0147c.png}
  - {type: punctuation, offset: 45, content: ，, id: KR3k0012_CHANT_805-bkkpn19}
  - {type: 'tls:seg', offset: 45, content: '', id: KR3k0012_CHANT_805-1a.15}
  - {type: variant, offset: 46, length: 8, content: 月五星各異政舜察, WYG: 三夜泣盡繼之以血王使玊人治之得寳玊焉名曰和氏之璧又曰周有玊版紂令膠鬲索之文王不予費仲來求因予之是膠鬲賢而費仲無道也周惡賢者之得志也故予費仲文王舉太公扵渭濵者貴之也而資仲玉版者愛之也故曰不貴其師不愛其資難知大迷又曰堂谿公見昭侯曰令有白玉之巵而無當有瓦巵而有當君渇將何以飲君曰以瓦巵堂谿公曰白玊之巵美而君不以飲者以其無當耶君曰然堂谿公曰爲人主而漏泄其群臣之語譬猶玉巵之無當也堂谿公每見而出昭侯必獨卧惟恐夢言泄扵妻妾淮南子曰琬琰之玊存汙泥之中雖廉者不釋也又曰崑崙山曾城九重有珠樹玊樹又曰鍾山之玉炊以爐灰三日三夜而色澤不變得}
