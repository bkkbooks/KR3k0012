  - {type: variant, offset: 798, length: 1, content: 為, SBCK: 朕精禋郊壇嚴敬宗廟奉惟新之祚庇太平之人則人力普存備物以享安可以珉代玉惜費事神況國家之冨有萬方之助􅀕闕典必脩無文咸祑豈於天地宗廟奠王有虧自今巳後禮神六器宗廟奠玉並用眞玉諸祀用珉如以玉難得大者寕小其制度以取其眞又曰憲宗時隰州刺史吳暈獻玉杯一頗珎竒云先使吐蕃所得又曰憲宗時㽵宅使許遂振得玉􅀋珽以進上恱命賜絹三百疋又曰貞元六年盧羣入拜侍御史有人誣告故尚父子儀嬖人張氏宅中有寳玉者張氏兄弟又與尚父子孫相告訐詔促其獄羣上奏言張氏以子儀在時分財子弟不合爭奪然張氏宅與親仁宅皆子儀家事子儀有大勲伏望陛下赦而勿問使私自引退上從之時人賞其識大體也又曰大和中文王命中使以白玉帶就幽州賜李載義亦殊恩也又曰開成中王起議今國家郊天報地祀神之玉常用守經據古禮神之玉則無臣等請詔下有司精求美玉創造蒼璧等九器􅀕訖具而藏之其餘燎王請依常制管子曰夫}
