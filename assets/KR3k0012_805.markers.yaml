  - {type: variant, offset: 3528, length: 0, content: '', WYG: 如意太子因問君君曰秦王以金陵有天子氣象處處埋寳物以當王土之氣此抑是也文士傳曰劉禎字公幹少有才辨常豫魏文帝座見甄后不伏武帝嘗怒配上方武帝輦至上方觀作署禎故匡坐正色磨石不仰武帝問曰石何如禎因得喻已自理跪乃曰石出自荆山元岩之巔外有五色之章内有含和之性磨之不加瑩雕之不增美禀氣堅貞受兹自然顧其理枉屈紆繞猶不得中武帝顧左右大笑即日還宫赦禎復署吏列仙傳曰赤松子者神農時雨師也服水玉教神農能入火不燒神仙𫝊曰沈羲為仙人所迎見老松公以金案玉盤賜羲搜神記曰孔子作春秋制孝經既成齋戒告天天降赤虹化為黄玊長二尺上有文又曰羊公雍伯雒陽人性篤孝父母終𦵏無終山遂居焉山八十里上無水公汲水作義漿於坂頭行者皆飲之三年有一人就飲以斗石子與之使至髙平好地有石處種石其中公未娶又語汝後當得好婦語畢不見後種其石數嵗時時往視玉子生人莫知有徐氏北平著姓女甚有名時人求多不許公乃試求徐氏徐氏以爲狂乃戲云以白璧一雙來當聽為婚公至所種石中得五雙白璧以贄徐氏徐氏大驚遂以女妻公天子異之拜爲大夫扵種玉處}
