  - {type: variant, offset: 110, length: 1, content: 雍, WYG: 言物有待賤而貴隨巢子曰幽厲之時奚禄山壞天賜玊玦扵羿遂以賤其身以此為福而禍抱朴子曰呉時發廣陵大冢兵人共舉死人似倚玉有以一玉長一尺形似東𤓰從人懷中頽出墮地玉可以為珠酒及地榆酒化之為水亦可燒以為粉服一年以上入水不沾入火不灼又曰玉脂生玉之山膏流出萬年以上則凝而成之鮮明如水精以無心草木和之湏臾成水服之一升得千嵗王服元真者其命不及𤣥真玉别名也服玉當得于闐白赤松子以元蟲而漬玊為水服之故得乘烟霞上下也又曰中山猿有稱人字者金玉也知其物則不為害也賈子曰徳有天理曰道性神明命之所生而能象徳者獨玉也符子曰荆山不貴玉鮫人不貴珠穆天子𫝊曰天子大朝黃之山披圖視典用觀天子之寳器玊果石以美玉謂果者璿珠璿玊類音旋又曰天子北征東還乃循黒水至扵群玉之山先王所謂策府天子扵是取玉板三乘玊器服物扵是載玊乃反也又曰赤鳥氏美人之地寳玉之所在也山海經曰珏二玉相合琉璃夷蠻係耳玉也稷契之山及鹿臺山其上多白玊榆次之山多嬰垣之玉㤗昌之山洛水出焉扵中多藻玉宻山之上丹水出焉其中多玉膏其源沸湯黄帝是食玊膏之所出五色乃清五味乃馨堅栗精宻澤而有光五色發作以和柔剛天地鬼神是食是饗君子服之以禦不祥龍首之山若水出焉其中多美玉於臯之山明水出焉其中多蒼玉平邱在三桑東爰有遺玉帝王世紀曰有鷰飛而遺卵簡翟與妹競取覆以玉筐又曰周武王代殷為天子登臺見玉王曰誰之玊或曰諸侯之玊王不取反歸之天下聞之曰王廉扵財矣又曰紂敗績登鹿臺䝉寳衣玉席投扵火而死漢武故事曰上起神屋前庭植玊樹以珊瑚為枝碧玉為華葉子青赤以珠玉為之空其中如小鈴鎗鎗有聲也漢武内𫝊曰西王母云昌城玊蘂夜山火玊又曰長}
