  - {type: variant, offset: 3577, length: 0, content: '', WYG: 三四}
  - {type: variant, offset: 3578, length: 1, content: 四, WYG: 又曰温嶠取姑女下玉鏡臺一枝是後為劉越石長使征劉聰所得語林曰平子從荆州下王敦欲殺之平子恒𢃄一玉枕故不得殺敦後矯平子左右而闕持闕下床去遂殺平子本草經曰玊泉一名玊體臨死服呉氏本草曰白玊體如白頭公明皇雜録曰天后嘗召諸皇孫坐扵殿上觀其嬉戲因出西國所貢玉鐶釵盃盤列扵前後縱令争取以觀其志莫不争取竟厚有所獲獨上端坐略不爲動后大竒之撫其背曰此兒當爲太平天子因命取玉龍子以賜玉龍子太宗扵晉陽宫得之文徳皇后常置之衣箱中及太帝載誕之三日后以珠絡衣褓并玊龍子賜其後常藏之内府雖其廣不數}
