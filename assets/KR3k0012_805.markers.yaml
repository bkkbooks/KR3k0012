  - {type: variant, offset: 121, length: 0, content: '', WYG: 珠也瑯玕珠之類也鹽鐡論曰南越以孔雀珥門户崑山之旁以玉抵鳥雀桓譚新論曰雒陽季㓜賔有小玉檢謁衛者文子伯素好玉器見而竒之使予報以三萬錢請貿焉㓜賔曰我與好事長者𫝊之已顧十萬非三萬錢玉也余驚駭云我若扵路見此千錢亦不市也故知之與不知相去甚逺王逸正部論曰或問玉符曰赤如雞冠黃如蒸粟白如脂昉黒如純漆玊之符也魏文帝與鍾繇書亦出也矯世論曰白玉之肖牙者惟離婁能察之白虎通曰玉者象君子之徳燥不輕濕不重是以人君寳之應邵漢官儀曰封禪壇有玉龜郭子橫洞冥記曰元鼎元年起招靈閣有一女神留一玉釵以與帝帝以賜趙媫妤至昭帝元鳳中宫人猶見此釵共謀欲碎之明視釵匣惟見白鷰直升天後宫人常作玉釵因名玉鷰釵言其吉祥西京雜記曰髙祖初入咸陽宫周行庫藏金玉寳珠不可勝言其尤驚異者有青玉五枝燈髙七尺五寸下作蟠螭以口含燈然則鱗甲}
