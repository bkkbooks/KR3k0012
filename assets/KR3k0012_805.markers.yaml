  - {type: variant, offset: 4002, length: 0, content: '', SBCK: 體如白頭公明皇􅄂録曰天后甞召諸皇孫坐於殿上觀其嬉戯因出西國所貢玉環釧盃盤列於前後縱令爭取以觀其志莫不奔竟厚有所􅀗獨上端坐略不爲動后大竒之撫其背曰此兒當爲太平天子因命取玉龍子以賜玉龍子太宗於晉陽宫得之文德皇后常置之衣箱中及大帝載誕之三日后以珠絡衣褓并玉龍子賜焉其後常藏之内府雖其廣不數寸而温潤精巧非人間所有及上即位毎京師􅄽雨必䖍誠祈禱將有霖􅍂逼而視之􅀂奮鱗鬛開元中三輔大旱上復祈禱而渉旬無􅀨上宻}
