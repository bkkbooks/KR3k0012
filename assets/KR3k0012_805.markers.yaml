  - {type: variant, offset: 813, length: 3, content: 多故賤, SBCK: 乎出其璞視之乃䑕璞范子計然曰玉英出藍田列子曰穆王征西戎西戎獻昆吾之劒赤刀切玉如切泥又曰宋人有爲其君以玉爲楮葉者三年而成鋒鍜莖葉毫芒繁澤亂之楮葉中不可別也此人遂以巧食宋國尹文子曰魏田父有於野得玉徑尺弗知其玉也以告鄰人鄰人詐之曰此恠石也畜之弗利田父雖疑猶録置於廡下其夜玉明照一室其家大怖遽而弃之於野隣人盗之以獻魏玉魏王召玉工相之玉工望玉再拜却立曰敢賀大王得天下之寳臣所未常見王問價玉工日此無價以當之五城之都僅可一觀王立賜獻者千金長食上大夫禄也􅀑谷子曰鄭人之取玉也載司􅀯之車爲其不惑也尸子曰水方折者有玉圎折者有珠又曰玉者色不如雪澤不如􅀨潤不如膏光不如燭鄒子曰夫珠生於南海玉出於湏彌無足而至者人好}
