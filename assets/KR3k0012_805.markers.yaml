  - {type: variant, offset: 490, length: 288, content: 人者則沐浴佩玉石祁子曰孰有執親之喪而沐浴佩玉者乎不沐浴佩玉心正且知禮又月令曰孟春之月天子衣青衣服蒼玉又玉藻曰古之君子必佩玉右徵角左宮羽玉聲所中也徵角在右事也民也可以勞宮羽在左宮也物也宜逸趨以采齊路門外之樂節也門外謂之趨齊當楚薺之薺齊行以肆夏登堂之樂節周還仲規反行也宜圓折還中矩曲行也宜方進則揖之退則揚之然後玉鏘鳴也揖之謂小免見於前也揚之謂小仰見於後也鏘聲貌又曰君子無故玉不去身君子於玉比德焉故謂喪與災天子佩白玉而玄組綬公侯佩山玄玉而朱組綬大夫佩水蒼玉而純組綬世祖佩瑜玉而綦組綬士佩瓀玟而縕組綬玉有山玄水蒼者視之文色所似也綬者所以佩玉相承受也又學記曰玉不琢不成器人不學不知道又聘, WYG: 經通}
