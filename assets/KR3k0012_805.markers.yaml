  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_805-1a.2}
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 枚皆以金編每牒長一尺二寸廣一寸二分厚三分刻}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 百疋又曰貞元六年盧群入拜侍御史有人誣告故尚父子儀嬖人張氏宅中有寳}
  - {type: variant, offset: 4, length: 0, content: '', krp: 枚皆以金編每牒長一尺二寸廣一寸二分厚三分刻}
  - {type: variant, offset: 5, length: 5, content: 上尚書堯典, SBCK: 塡金爲字又爲玉匱一以藏正坐玉􅁽金匱二以藏配坐玉􅁽各一尺三寸并玉檢方五寸當繩􅆞處刻爲五道當璽處刻深二分方一寸二分爲黄金繩以􅆞金玉匱各五周爲金泥以泥之爲玉璽一枚方一寸二分文同受命至以封玉匱又天寳中詔}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_805-1b}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 者張氏兄弟又與尚父子孫相告訐促具獄辭}
  - {type: variant, offset: 5, length: 5, content: 上尚書堯典, krp: 塡金爲字又爲玉匱一以藏正坐玉冊金匱二以藏配坐玉冊各一尺三寸并玉檢方五寸當繩纏處刻爲五道當璽處刻深二分方一寸二分爲黄金繩以纏金玉匱各五周爲金泥以泥之爲玉璽一枚方一寸二分文同受命至以封玉匱又天寳中詔}
