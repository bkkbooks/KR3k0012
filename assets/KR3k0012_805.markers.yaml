  - {type: variant, offset: 2678, length: 260, content: 玉有瑛華宋均曰尊卑不失其服玉者英華也論語子罕曰子貢曰有美玉於斯韞櫝而藏諸求善價而沽諸子曰沽之哉沽之哉我待價者也寧有自訟賣之道乎我居而待價者又季氏曰孔子曰求虎兕出於柙龜玉毀於櫝中是誰之過與逸論語曰璠璵魯之寶玉也孔子曰美哉璠璵遠而望之煥若也近而視之瑟若也一則理勝一則孚勝又曰玉十謂之區治玉謂之琢亦謂之雕雙王為瑴五瑴為區雕治璞也瑴音角瑳玉色鮮白也瑩玉色也瑛玉光也瓊赤玉也璿瑾瑜美玉也璑舞三采玉也玲瑲琤瑝鍠玉聲也璬玉佩玉也瑱充耳也璪玉飾以水藻也史記曰范蠡事越王勾踐二十餘年竟滅吳范蠡曰君行令臣行意乃載其輕寶珠玉乘舟浮海行終不反漢, SBCK: 岀雒}
