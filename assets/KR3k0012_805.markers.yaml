  - {type: variant, offset: 3528, length: 0, content: '', SBCK: 如意太皇帝以問君君曰􅁗皇以金陵有天子氣處處埋寳物以當王士之氣此抑是也文士傳曰劉楨字公幹少有才辯常豫魏文帝座見甄后不伏武帝甞怒配上方武帝輦至上方觀作署楨故匡坐正色磨石不仰武帝問曰石何如楨因得喻己自理跪對曰石出自荆山玄巖之巔外有五色之章内有含和之珎摩之不加瑩雕之不増羙禀氣堅貞受兹自然顧其理枉屈紆繞猶不得中武帝顧左右大􅀏即日還宫赦楨復署吏列山傳曰赤松子者神農時􅀨師也服水玉教神農能入火不燒神仙傳曰沈羲爲仙人所迎見老公以金案玉盤賜羲搜神記曰孔子作春秋制孝經旣成齊戒告天天降赤虹化爲黄玉長二尺上有文又曰羊公雍伯雒陽人性篤孝父母終葬無終山遂居焉山髙八十里上無水公汲水作義漿於坂頭行者皆飲之三年有一人就飲以石子一斗與之使至髙平好地有石處種之玉當生其中羊公未娶又語汝後當得好婦語畢不見後種其石數歳時時徃視玉子生人莫知有徐氏在北平著姓女甚有名時人求多不許公乃試求徐氏徐氏以爲狂乃戯云以白璧一􅀟來當聽爲㛰公至所種石中得一􅃗白璧以贄徐氏徐氏大驚遂以女妻公天子異之拜爲大夫於種玉處}
  - {type: page-break, offset: 3528, content: '', id: KR3k0012_SBCK_805-7a}
