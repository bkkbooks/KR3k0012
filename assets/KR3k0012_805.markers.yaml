  front:
  - {type: variant, offset: 0, length: 2, content: 珍寶, SBCK: 太平御覽卷第八百五珎寳}
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_805-1a}
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書太平御覽卷八百五宋李昉等撰珎寳部四玉下唐書曰太宗嘗謂魏徴曰玉雖有美質在扵石間不值良工琢磨與瓦礫不别若遇良工即為萬代之寳朕雖無美質為公所切磋勞公約朕以仁義𢎞朕以道徳使朕功業至此亦足為良匠耳又曰髙宗朝封禪太嶽造玉册三枚皆以金編每牒長一尺二寸廣一寸二分厚三分刻玉填金為字又為玊匱一以藏正坐玊册金匱二以藏配坐玊册各一尺三寸並玊檢方五寸當繩纒處刻為五道當璽處刻深二寸方一寸二分爲黃金繩以纒金玉匱各五周為金泥以泥之為玊璽一枚方一寸二分文同受命璽以封玊匱又天寳中詔曰禮神以玊者葢取其精潔表裏温潤合徳為器有象正辭乃信以逹馨香其在璧頃來禮神六器及宗廟奠玉自馮紹王奏後有司並皆用珉禮所謂君子貴玊而賤珉不可用也朕精禋郊壇嚴敬宗廟奉惟新之祚康太平之人則神力普存備物以享安可以珉代玉惜費事神况國家之富有萬方之助祭闕典必修無文咸秩豈扵天地宗廟奠玊有虧自今以後禮神六器宗廟奠玉並用真玊諸祀用珉如以玊難得大者寜小其制度以取其真又曰憲宗時隰州刺史呉暈獻玊杯一頗}
