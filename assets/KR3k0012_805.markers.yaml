  - {type: variant, offset: 834, length: 0, content: '', SBCK: 􅀛郭子横洞􅄀記曰元鼎元年起招靈閣有一神女留一玉􅁫以與帝帝以賜趙婕妤至昭帝元鳯中宫人猶見此􅁫共謀欲碎之明視􅁫匣唯見白鷰直􅂛天後宫人常作玉􅁫因名玉鷰􅁫言其吉祥西京􅄂記曰髙祖􅀄入咸陽宫周行庫藏金玉珎寳不可勝言其尤驚異者有青玉五枚燈髙七尺五寸下作蟠螭以口含燈然則鱗甲皆動煥爛盈室}
  - {type: variant, offset: 834, length: 0, content: '', krp: 龜郭子横洞冥記曰元鼎元年起招靈閣有一神女留一玉釵以與帝帝以賜趙婕妤至昭帝元鳯中宫人猶見此釵共謀欲碎之明視釵匣唯見白鷰直升天後宫人常作玉釵因名玉鷰釵言其吉祥西京雜記曰髙祖𥘉入咸陽宫周行庫藏金玉珎寳不可勝言其尤驚異者有青玉五枚燈髙七尺五寸下作蟠螭以口含燈然則鱗甲皆動煥爛盈室}
