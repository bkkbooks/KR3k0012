  - {type: variant, offset: 830, length: 1, content: 比, SBCK: 服之以禦不祥龍首之山弱水出焉其中多美玉放臯之山明水出焉其中多蒼玉平丘在三桑東爰有遺玉帝王丗紀曰有鷰飛而遺􅆑簡翟與妹競取覆以玉筐又曰周武王伐殷爲天子登臺見玉王曰誰之玉或曰諸侯之玉王不取反歸之天下聞之曰王廉於財矣又曰紂敗績登鹿臺蒙寳衣玉席投於火而死漢武故事曰上起神屋前庭植玉樹以􅃢瑚爲枝碧玉爲葉華子青赤以珠玉爲之空其中如小鈴鎗有聲也漢武内傳曰西王母云昌城王女夜山火玉又曰長州一名青丘仙草靈藥甘液玉英美所不有漢書儀曰􅀕天用玉几論衡曰玉變爲石珠變爲礫毁謗使然也採玉者破石㧞玉選士者弃惡取善又曰璆琳瑯璆玉也琳珠也琅玕珠之􅀋也鹽鐵論曰南越以孔雀珥門户崑山之旁以王抵鳥鵲桓譚新論曰雒陽季㓜賔有小玉撿衛謁者史子伯素好玉器見而竒之使予報以三萬錢請買焉㓜賔曰我與好事長者􅀶之已雇十萬非三萬錢主也余驚駭云我􅀂於路見此千錢亦不市也故知之與不知相去甚逺王逸正部論曰或問玉符曰赤如鷄冠黄如蒸栗白如脂肪黒如純􅃮玉之符也魏文帝與鍾書亦出也矯丗論曰白玉之肖牙者唯離婁能察之白虎通曰玉者象君子之}
