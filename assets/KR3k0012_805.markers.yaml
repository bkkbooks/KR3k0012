  - {type: variant, offset: 3576, length: 54, content: 方尺四寸甚有光彩藏之海島垂六十歲忻逢明政今願奉之挺曰吾雖德謝古人未能以玉為寶遣舡隨取光潤果然迄不肯受乃表送都, SBCK: ''}
  - {type: variant, offset: 3576, length: 0, content: '', WYG: 又曰玊石之精也其存石中若山中石潤而浸旁有水其居地氣青而浮其氣白如圓光轉其地中常潤白玉圓光之精名曰委狀如美女衣青衣見之以桃戈刺之而呼其名則可得也夜行見女子載燭行者潜從其所已則入石石中有玉世説曰長沙王從封常山至國穿井入地四尺得白玊}
