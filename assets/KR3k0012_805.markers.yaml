  - {type: variant, offset: 3582, length: 0, content: '', WYG: 及上即位每京師􅄽雨必􅐚誠祔禱將有霖􅍂逼而視之若奮鱗鬛開元中三輔大旱上御祈禱而渉旬無雨上宻投南内之龍池俄而雲物暴起風雨隨作上幸西蜀車駕次渭水將渡駐蹕於水濵左右侍御或有臨流濯㺯者扵沙中得之上聞驚喜視之泫然流涕曰此吾昔時所寳玉龍子自後每夜中}
