  - {type: variant, offset: 2940, length: 435, content: 陳平求見漢王拜平為都尉綘灌等或讒平曰雖美丈夫如冠玉耳又曰文帝始幸雍新垣平以望氣見平使人持玉柸闕下獻之平言上曰闕下有寶玉氣果有獻玉柸者又郊祀志曰宣帝祀河東之明年鳳凰集祋祤於所集處得寶玉乃起萬壽宮又曰王莽就國孔休守新都相休謁見莽莽進其玉具寶劍休不肯受莽因曰誠見君面有瘢美玉可以滅獻其璏耳即解其璏休復辭莽遂椎碎之自裏以進休也後漢書曰孝明帝時汴渠成故行幸滎陽巡行河渠薦嘉玉潔牲以禮河神續漢書曰桓帝時光祿吏舍下夜有青氣視之得玉鉤玦各一鉤長七寸三分玦五寸四分身中皆雕鏤又曰三老五更杖玉杖民年七十授之以玉杖華嶠後漢書曰嘉平中袁逢為三老賜玉杖范曄後漢書曰梁冀金玉珠璣異方珍怪積藏室魏志曰漢時夫餘王葬用玉鉀常豫以付玄莬郡王死則迎取以葬公淵伏誅玄莬庫猶有玉鉀一具今夫餘庫有玉璧珪瓚數代之物傳世以為寶耆老言先代之所賜也魏略曰大秦國出采玉五色玉夫餘國出赤玉晉書曰中興東遷舊章多闕而冕旒飾以翡翠珊瑚及雜珠等顧和奏舊冕十有二旒皆用玉珠今用雜珠等非禮若不能玉可用白琁成帝於是始下太常改之沈約宋書曰紫玉, SBCK: ''}
