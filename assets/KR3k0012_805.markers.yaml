  - {type: variant, offset: 820, length: 1, content: 寡, krp: 曰石也王以和爲慢刖右足及武王即位又獻之復相曰石也次刖左足及文王即位和乃抱其璞而哭於楚山三日三夜泣盡繼之以血王使玉人治之得寳玉焉名曰和氏之璧又曰周有玉版紂令膠鬲索之文王不予費仲來求因予之是膠鬲賢而費仲無道也周惡賢者之得志也}
