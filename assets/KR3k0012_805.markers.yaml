  - {type: variant, offset: 34, length: 0, content: '', WYG: 征西戎西戎獻昆吾之劒赤刀切玊如切泥又曰宋人為其君以玊為楮葉}
  - {type: variant, offset: 35, length: 0, content: '', SBCK: 蓋取其精絜表以温潤合德爲器有象}
  - {type: variant, offset: 35, length: 1, content: 正, WYG: 三年而成絳鎩莖葉毫芒繁澤亂之楮葉中不可别也此人遂以巧食宋國尹文子曰魏田父有扵野得玊徑尺弗知其玉也以告隣人隣人詐之曰此恠石也畜之弗利田父雖疑猶録置扵廡下其夜玊明照一室其家大怖遽而棄之扵野隣人盗之以獻魏王魏王召玊工相之玉工望王再拜却立曰敢賀大王得}
  - {type: page-break, offset: 35, content: '', id: KR3k0012_WYG_805-4b, image: WYG0900/WYG0900-0147b.png}
  - {type: variant, offset: 35, length: 0, content: '', krp: 蓋取其精絜表以温潤合德爲器有象}
  - {type: variant, offset: 36, length: 115, content: 天之器可轉運者七政日月五星各異政舜察天文齊七政審己當天心與否又胤征曰火炎崑崗玉石俱焚山脊曰崗崑山出玉言火逸而害玉又禹貢曰華陽黑水惟梁州厥貢璆璆玉名也雍州厥貢惟球琳瑯玕球琳皆玉名琅玉玕石而似珠又顧命曰成王被冕服馮玉几又曰大玉夷玉天球, SBCK: 辭乃信以逹馨香其}
  - {type: variant, offset: 36, length: 115, content: 天之器可轉運者七政日月五星各異政舜察天文齊七政審己當天心與否又胤征曰火炎崑崗玉石俱焚山脊曰崗崑山出玉言火逸而害玉又禹貢曰華陽黑水惟梁州厥貢璆璆玉名也雍州厥貢惟球琳瑯玕球琳皆玉名琅玉玕石而似珠又顧命曰成王被冕服馮玉几又曰大玉夷玉天球, krp: 辭乃信以逹馨香其}
