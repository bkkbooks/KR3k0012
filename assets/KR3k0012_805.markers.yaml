  - {type: variant, offset: 3566, length: 6, content: 少曾充使林邑, SBCK: 白頭公柱杖光耀照人也白頭公白王也搜神記曰呉王夫差女名玉童子韓重有道術女恱之結氣死葬于昌門之外重至􅃁前􅂘􅀕女見形將重入􅃁臨去取崑崙玉孟以送重燉煌髙納之郡府紀年曰桀伐岷山岷山女尼慮反千桀二女曰琬曰琰桀愛二女無子刻其名於苕華之玉苕是琬華是琰石虎鄴中記曰後宫別坊中有小形玉床又曰石虎以宫人爲女官用玉案文書涼州記曰盗發張駿陵得玉樽玉簫玉笛法顯記曰師子國有玉像齊諧記曰餘杭縣南卷中有一人姓沈名路入山}
  - {type: page-break, offset: 3566, content: '', id: KR3k0012_SBCK_805-8a}
  - {type: variant, offset: 3566, length: 6, content: 少曾充使林邑, WYG: 白頭公柱杖光輝照人也白頭公白玉也搜神記曰呉王夫差女名玊童子韓重有道術女悦之結氣死𦵏扵昌門之外重至冢前哭祭女見形將重入冢臨去取崑崙玉盂以送重燉煌髙納之郡府紀年曰桀伐岷山岷山王女于桀二女曰琬曰琰桀愛二女無子刻其名扵苕華之玊苕是琬華是琰石虎鄴中記曰後宫别坊中有小形玊床又曰石虎以宫人為女官用玉案文書凉州記曰盗發張駿陵得玉樽玉笛玉簫廣志曰白玉美可照面出交州青玉出夫餘異苑曰晉東瀛王騰字元邁以永嘉元年鎮鄴天雪門前方數十步融液不積騰恠掘之得玉馬髙一尺許口齒缺騰以馬者國姓為吉祥或謂馬無齒則不復食又曰𢎞農楊子陽太元初聞土中聲掘得玉肫録異𫝊曰江巖常到呉採藥及富春縣清泉山南遥見一美女紫衣獨踞石而歌聲有碣石之音巖往未及數十歩輒去女惟見所踞石耳如此數日巖乃擊破石遂從石中}
