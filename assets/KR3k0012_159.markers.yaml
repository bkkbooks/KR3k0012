  - {type: variant, offset: 36, length: 757, content: 魏惠王自安邑里徙大梁今浚儀縣按後漢書大梁城魏惠王所築漢書曰酈食其說高祖曰陳留天下之衝四通五達之郊又曰文帝以皇子武為梁王都大梁後東徙睢陽注曰睢陽今宋州也後漢書曰明帝永平十五年東巡至大梁春秋後語曰蘇秦去韓之魏說襄王曰大王之地南有鴻溝陳留汝南郾邵陵舞陽新都東譙潁煮棗無䟽鴻溝今在譙縣潁今潁州煮棗今曹州宛可地無疏或作無咠未詳所在西有長蛇之地史記作長城之地今武原縣有長城北有河水卷燕酸棗地方千里田舍廬廡之數無所不畜牧人民之眾牛馬之多夜行不絕𨋮𨋮殷殷車馬聲也𨋮火宏切夫魏天下之強國也王天下之賢王也郡國志曰東魏孝靜帝以此置梁州周宣帝改為汴州以其臨汴水為名也隋大業十三年州廢以開封浚儀屬鄭州隋亂陷賊唐武德四年平王世充復置汴州五代史曰梁開平元年梁祖初開國升汴州為開封府建名東京元管開封浚儀陳留雍丘封丘尉氏六縣至是割滑州之酸棗長垣鄭州之中牟武陽宋州之襄邑曹州之戴邑許州之扶溝𨻳陵陳州之太康九縣隸焉天后唐復降為汴州以宣武軍為額其陽武長垣扶溝考城等四縣仍且隸汴州其天余五縣卻還本部晉天復中復升為東京復以前五縣隸之漢周並因之太康地記曰豫州之分其人得中和之氣性安舒其俗阜其人和今俗多寬慢漢志曰開封逢池在東北或曰宋之逢澤也瓚曰汲郡古文梁惠王廢逢忌之藪以賜民今浚儀是也史記曰王稽與范睢言曰先王待我于三亭之南三亭今屬浚儀陳留風俗儀傳曰阮簡為開封令有劫賊外白甚急簡方圍棊長嘯曰局上有天動甚急徐廣史記音義曰秦孝公會諸侯於蓬澤圖經曰浚儀有高陽故城顓頊高陽氏佐少昊有功封於此城又曰浚儀有信陵亭在城內即魏公子無忌勝天慨之地左傳曰韓起送女於楚還過鄭鄭伯勞諸國今圍城是也漢志曰陳留郡鄭邑天后為陳所併故曰陳留瓚曰宋亦有留彭城留是也留屬陳故稱陳留也古史考曰伊尹生於空桑陳留有空桑故城家語曰孔子南遊於楚至阿谷之隧使子貢奉觴從女子乞飲今陳留有阿谷水漢志曰雍丘屬陳留故杞國, SBCK: ''}
