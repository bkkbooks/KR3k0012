  - {type: variant, offset: 3122, length: 3, content: 即古虢, SBCK: 天下有變當爲兵衝冝亟去無乆留郷人多懷􅁟猶豫㑹兾州牧韓馥迎彧獨將宗族至兾州後董卓遣李催等岀關東所過虜掠至潁川郷人留者多見殺略陳州十道志曰陳州淮陽郡置在菀丘縣元和郡}
