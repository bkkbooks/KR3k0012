  - {type: variant, offset: 3129, length: 3, content: 時屬韓, SBCK: 後漢改爲陳國毛詩陳風曰坎其擊鼓宛丘之下又曰東門之池可以漚麻注水經曰東門池水至清而不耗不生諸草爾雅曰陳有宛丘又曰丘上有丘爲宛丘漢書曰髙帝十一年立子友爲淮陽王罷潁川郡以益之七賢傳曰漢武出淮陽到監郷帝問陳翼曰此名爲何翼曰監郷上曰何欺乎翼曰臣言不欺􅀂不欺佩刀當生白毛􅀂欺則無毛視之刃果有毛監郷在盧江縣潁州十道志曰潁州汝隂郡置在汝隂縣元和郡縣圖曰禹貢豫州之域春秋胡子國楚滅之}
