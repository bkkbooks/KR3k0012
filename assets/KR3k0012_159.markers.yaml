  - {type: variant, offset: 3118, length: 2, content: 分陜, SBCK: 請釋泰山之祀而祀周公以㤗山之祊易許田仐有魯故城在長社縣後漢書曰宋寵爲潁川太守問功曹鄭凱曰聞貴郡山川多産竒秀前賢往哲可得聞乎凱對曰鄙郡禀嵩髙之靈中岳之精是以聖賢龍蟠俊乂鳯集昔許由巢父恥受堯禪洗耳河濵重道輕帝邈丗髙蹈樊仲父者志㓗心遐恥山河之功賤天下之重抗節叅雲公儀許由俱出陽城留侯張良竒謀輔丗􅀇笇入微濟生民之命恢帝王之略功成而不居爵厚而不受岀于父城胡元安體曽參之至行履樂正之純業喪親泣血骨立形存精神通於神明雉兎集於左右出潁陽彪義山英姿秀偉逸才挺出究孔子之房隩存文武於將墜出於昆陽杜伯夷經學著於師門政事熈於國朝清身不茍有於陵之操損巳存公有公儀之節岀定陵又曰獻帝建安元年遷都許魏略曰黄􅀄五年文帝東征留郭后於永始臺霖􅀨百餘日城樓多壞有司請移后曰昔楚昭王出遊貞姜留漸臺江水至使者迎而無符不出卒没今帝在逺未有急奈何移也又景福殿賦曰鎭以崇臺寔曰永始臺在許昌縣魏志曰荀彧字文􅀂潁川潁隂人也董卓之亂彧謂父老曰潁川四戰}
