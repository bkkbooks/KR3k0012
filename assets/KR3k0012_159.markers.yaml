  - {type: variant, offset: 1134, length: 513, content: 馴養猛獸漢志曰外黃屬陳留郡張晏曰魏郡有內黃故加外耳瓚曰縣有黃溝故依之也左傳曰惠公敗宋師于黃杜注外黃縣東有黃城陳留風俗傳曰沛公起兵野戰喪皇妣於皇鄉天下平定乃使使者以梓宮招魂於野有丹蛇自天灑濯入梓宮其俗處仍有遺天發其處在小黃屬陳留漢志曰長垣屬陳留郡莽曰長固孟康曰春秋會于匡今匡城是晉地道記云長垣故衛故匡城地孔子厄處也地道記曰承匡城在縣西左傳文十一年會晉卻𡙇于承匡是也漢志曰鄢屬陳留莽曰順通左傳隱公曰鄭伯克叚于鄢又鄭太叔侵鄭至于廩延注曰縣北有延津天后漢地理志曰即酸棗也戰國策云齊欲發卒取周九鼎顏率曰夫梁之君臣欲得九鼎謀於沙海之上為日久矣沙海屬浚儀陳留風俗傳曰縣有蒼頡師曠城其城有列仙吹臺梁王增天築之以為吹臺俗號繁臺史記曰大梁城有十二門東門曰夷門隱士侯嬴年七十家貧為大梁夷門抱關者魏公子無忌厚遺之不肯受水經曰大禹塞滎陽澤開渠以通淮泗名莨菪渠至汴渠也漢平帝時河汴決壞後明帝遣使者修治汴渠至隋大業中更令開導名通濟渠引河水入汴口自大梁之東引入泗連于淮至江都宮入于海亦謂之御河河畔築御道植柳煬帝巡幸乘龍舟而往江都自楊益湘南至交廣閩中公私漕運商旅軸轤相接隋書曰大業元年以汴水迂曲廻復稍難自大梁城西南鑿渠引汴水入號通濟渠西京河南府十道志曰洛州周之, SBCK: 先人}
