  - {type: variant, offset: 3168, length: 0, content: '', SBCK: 舉胡以爲魯卿士故魯國治復封胡于蔡是爲蔡仲輿地志曰新蔡縣蔡平侯自上蔡徙都之故曰新蔡漢志曰汝南郡髙帝置王莽曰汝汾又曰鮦陽屬汝南郡在銅水之陽也鮦音紂又曰呉房夲房子國也楚靈王遷房于楚呉王闔閭弟夫槩王犇楚楚封於此爲堂谿氏以封呉故曰呉房史記􅂫秦􅀃韓王曰韓之劒㦸出堂谿又曰李斯上蔡人也二丗二年七月具斯五刑論要斬咸陽市斯出獄與其中子俱執頋謂子曰吾欲與客復牽黄犬出上蔡東門逐校兎可得乎}
  - {type: page-break, offset: 3168, content: '', id: KR3k0012_SBCK_159-9a}
  - {type: variant, offset: 3168, length: 0, content: '', WYG: 舉胡以爲魯卿士故魯國治復封胡于蔡是爲蔡仲輿地志曰新蔡縣平侯自上蔡徙都之故曰新蔡漢志曰汝南郡高帝置王莽曰汝汾又曰鮦陽屬汝郡在銅水之陽也鮦音紂又曰吳房本房子國也楚靈王遷房于楚吳王闔閭弟夫槩亡犇楚楚封於此爲堂谿氏以封吳故曰吳房史記蘇秦説韓王曰韓之劍㦸岀堂谿又曰李斯上蔡人也二世二年七月具斯五刑論要斬咸陽市斯岀獄與其中子俱執顧謂子曰吾欲與客復牽黃犬岀上蔡東門逐狡兔可得乎}
