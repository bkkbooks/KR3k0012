  - {type: variant, offset: 3, length: 0, content: '', WYG: 記曰盧氏西虢之别也遁甲開山圖曰盧氏山宜五穀可以避水災因山以名縣汝州十道志曰汝州臨汝郡禹貢豫州之域春秋時爲周王畿及鄭楚之地十三州志曰戰國時梁屬魏秦置三十六郡屬三川郡漢爲河南郡之梁縣也左傳昭二十九年傳曰陶唐氏既衰其後有劉累學擾龍于豢龍氏以事孔甲能飲食之夏后嘉之賜氏曰御龍龍一雌死潛醢以食夏后饗之而使求之懼而遷于魯縣即魯山縣也又曰楚白公之亂葉公率國人攻白公白公奔山縊死葉公遂邑焉即今葉縣也家語曰葉公好龍窓壁背畫龍形眞龍爲降葉公見之喪魄漢書曰漢王至成臯轅生説漢王曰漢楚相拒滎陽數歲漢常困願王岀武關項王必引南走王深壁令滎陽成臯且休息使韓信等輯河北地連燕齊君王乃復走滎陽如此則楚所備者多漢得休息王從其計岀兵宛葉間左傳曰邘晉應韓武之穆也注曰應城在襄城城父縣西南韓詩外傳曰周成王與弟戲以桐葉爲珪以封汝周公曰天子無戲言王應時而封曰應侯今應城是也鄭州十道志曰鄭州滎陽郡禹貢豫州之境秦兼天下爲三川郡帝王世紀曰黃帝都於有熊今新鄭是也漢志曰新鄭本高辛氏大正祝融之墟國語曰鄭桓公爲司徒問於史伯曰王室多故余懼及焉何以逃死史伯對曰王室將危戎翟必昌不可福也當成周者南有荆蠻申吕應鄧陳蔡隋唐北有衛燕翟鮮虞路泉徐蒲鮮虞姬姓路泉徐蒲皆赤翟隗姓也西有虢晉隗霍楊魏芮八國姬姓也東有齊魯曹宋滕鄒莒是非王之父子母弟甥舅也皆蠻夷戎狄之人也非親作頑不可入也其濟洛河潁之間乎言此四水之間可逃是其子男之國虢之國虢鄶爲大虢東虢仲之後鄶姬姓虢叔恃勢鄶仲恃險皆有淫侈怠慢之心加以貪冒君若以周難之故寄孥與賄焉不敢不許孥妻子賄財也周亂如是驕而貪必將背君君若以成周之衆奉辭伐罪無不克矣克二邑鄢弊補丹依㽥厯華君之土也言克虢鄶此八邑可得若前華後河右洛左濟主芣醜而食溱洧芣醜山名主爲神主之也修典則以守之可以少固公説乃東孥與賄虢鄶受之十邑皆可寄也後桓公之子武公竟取十邑之地而主之今河南新鄭是十邑謂前八邑及虢鄶韓詩外傳曰鄭國俗以二月桃花下水時㑹于溱洧之}
