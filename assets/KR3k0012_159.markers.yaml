  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_159-1a}
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書太平御覽卷一百五十九宋李昉等撰州郡部五虢州汝州鄭州宋州曹州亳州單州許州陳州潁州蔡州虢州十道志曰虢州𢎞農郡禹貢豫州之域春秋為虢地七國時秦韓之境秦為三川郡漢元鼎中置𢎞農郡左傳曰晉人以屈産之乘垂棘之璧假道於虞以伐虢漢志曰武帝置𢎞農縣於秦故函谷闗山嶺下戴延之西征記曰函者道形如函也帝王世紀曰虢有三焉周興封虢仲於西虢此其地也封虢叔於東虢即成臯是也今陜郡平陸縣是北虢漢書曰楊僕爲樓舩將軍耻爲關外人於是徙關新安割秦}
