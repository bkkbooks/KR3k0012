  - {type: variant, offset: 5, length: 2, content: 京開, krp: 屯鞏雒以距楚酈食其曰夫敖倉天下轉輸乆矣臣聞其下藏粟甚多楚人抜滎陽不能堅守敖倉此天所以資漢願足下急進兵攻滎陽據敖倉之粟即天下知所歸矣晉書曰阮籍甞登廣武見劉項戰處歎曰時無英主使竪子成名其地在滎陽地道記曰陽武滎陽有博浪沙張良爲韓擊秦始皇處宋州十道記曰宋州睢陽郡理宋城縣虞舜十二州爲豫州之境周爲青州之域武王}
  - {type: variant, offset: 8, length: 1, content: 府, SBCK: 微子之邑後爲齊楚魏所滅三分其地魏得其梁陳留齊得濟隂東平楚得沛梁即今州地禮記曰武王克殷下車而封殷之後於宋禹貢曰導荷澤􅀍孟豬孟豬澤在今虞城縣明都澤是􅀶物志曰宋北至泗水南迄睢渦有孟豬之澤碭山之基}
  - {type: page-break, offset: 8, content: '', id: KR3k0012_SBCK_159-4a}
  - {type: variant, offset: 8, length: 1, content: 府, WYG: 微子之邑後爲齊楚魏所滅三分其地魏得其梁陳留齊得濟隂東平楚得沛梁即今州也禮記曰武王克殷下車而封殷之後於宋禹貢曰導菏澤被孟瀦孟瀦澤在今虞城縣博物志曰宋北至泗水南迄睢渦有孟瀦之澤碭山之基元和郡國志曰秦併天下改爲碭郡後改爲梁國漢文帝封子武爲梁王自漢至晉爲梁國屬豫州宋改爲梁都隋於睢陽置宋州唐書曰天寳末祿山亂兩河郡縣多所隱没張巡許逺守睢陽城賊將尹子竒併力攻圍踰年不下城中食盡竟爲賊所陷巡等抗詞不撓遂被害陳留風俗傳曰宋之地猶有先王遺風重厚多仁好稼穡惡衣食以致蓄藏史記曰梁孝王築東苑三百里是曰免園又爲複道自宫屬諸平臺三十餘里圖經曰梁王有修竹園園中竹木天下之選集諸方遊士各爲賦故館有鄒枚之號又有鴈騖池周迴四里亦梁王所鑿又有清泠池有釣臺謂之清泠臺漢志曰寧陵屬陳留莽曰康善孟康曰故葛伯國今葛鄉是也漢書曰梁孝王武以孝文十二年徙梁梁爲大國居天下膏腴地北界秦山西至高陽四十餘城多大縣於是孝王築東苑方三百餘里廣睢陽城七十里大治宫室爲複道自宫連屬於平臺三十餘里曹州十道志曰曹州濟隂郡理濟隂縣禹貢豫州之域周爲曹國地後屬宋七國時屬齊漢爲濟隂郡地在濟水之南故以爲名曹詩曰薈兮蔚兮南山朝隮左傳僖二十八年曰晉侯圍曹門焉多死曹人尸諸城上磔晉死人於城上晉侯患之聽輿人之誦曰移舍於墓言將發塚曹人兇懼因其兇也而攻之入曹而分衛之田以賜宋人晉侯有疾曹伯之豎侯獳貨筮史使曰以曹爲解齊桓公爲㑹而封異姓今君爲㑹而滅同姓曹叔振鐸文之昭也先君唐叔武之穆也且合諸侯而滅兄弟非禮也公説復曹伯尚書曰夏師敗績遂伐三鬷俘厥寳玉孔安國曰三鬷國名今定陶也水經曰菏水俗謂之五丈溝經定陶漢書曰高祖五年春三月甲午即皇帝位於定陶汜水之陽左傳曰衛孫蒯田于隧飲馬于重丘重丘人毁瓶因詬之重丘今乗氏縣亳州十道志曰亳州譙郡置在譙縣禹貢豫州之域春秋時陳國之譙邑六國時屬楚秦爲碭郡地漢爲譙縣屬沛郡左傳曰楚成得臣帥師伐陳遂取焦夷杜注焦今譙國史記曰周武王封神農之後於譙國漢書地理志曰王莽以譙爲延成亭魏志曰後漢熹平五年黃龍見譙太史令單颺以爲其國當有王者興不及五十年亦當復見文帝即位果如其言以先人舊都立爲譙國與長安許昌鄴洛陽號爲五都元和郡國志曰後魏立南兖州周武改爲亳州魏畧曰太祖於譙東五十里澤中築起精舍讀書射獵閉絶賓客史記曰老子苦縣人也苦縣即今真原縣也單州五代史曰單州本單父縣梁爲輝州後唐同光二年復舊𨽻宋州周廣順中割𨽻曹州史記曰宓不齊字子賤爲單父宰反命於孔子曰國有賢不齊者五人教不齊所以治者孔子曰惜哉不齊所治者小所治者大則庶幾矣吕氏春秋曰宓子賤治單父彈鳴琴身不下堂而單父治許州十道志曰許州許昌郡禹貢豫州之域周爲許國左傳曰許太岳之𦙍也説文曰許炎帝之後也武王伐紂時封之也漢志曰潁川許縣舊許國也魏畧曰後漢建安元年太祖迎獻帝都於許即此邑也魏文帝即位改許昌縣焉左傳曰鄭伯請釋泰山之祀而祀周公以泰山之祊易許田後漢書曰宋寵爲潁川太守問功曹鄭凱曰聞貴郡山川多産竒秀前賢往哲可得聞乎凱對曰鄙郡稟嵩高之靈中岳之精是以聖賢龍蟠俊乂鳯集昔許由巢父恥受堯禪洗耳河濱重道輕帝邈世高蹈樊仲父者志堅心遐恥山河之功賤天地之重抗節㕘雲公儀許由俱岀陽城留侯張良竒謀輔世𤣥算入微濟生民之命恢帝王之畧功成而不居爵厚而不受岀于父城胡元安體曽參之志行履樂正之純業喪親泣血骨立形存精神通於神明雉兔集於左右岀潁陽彪義山英姿秀偉逸才挺岀究孔子之房隩存文武於將墜岀於昆陽杜伯夷經學見於師門政事熙於國朝清身不茍有於陵之操損己存公有公儀之節岀定陵又曰獻帝建安元年遷都許魏畧曰黃初五年文帝東征留郭后於永始臺霖雨百餘日城樓多壞有司請移后曰昔楚昭王岀遊貞姜留漸臺江水至使者迎而無符不岀即没今帝在逺未有急禁何移也又景福殿賦曰鎭以崇臺實曰永始臺在許昌縣魏志曰荀彧字文若潁川潁隂人也董卓之亂彧謂父老曰潁川四戰之地天下有變當爲兵衝宜急去無乆留鄉人皆懷土猶豫㑹冀州牧韓馥迎彧獨將宗族至冀州後董卓遣李儒等岀關東所過虜掠至潁川鄉人留者多見殺畧陳州十道志曰陳州淮陽郡置在宛丘縣}
