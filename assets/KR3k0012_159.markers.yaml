  - {type: variant, offset: 2433, length: 571, content: 郡多不均平百姓嗟怨帝見陳留牘上有書視之云潁川弘農可問河南南陽不可問帝怒時顯宗為東海公年十二言曰吏受郡勑當欲以墾田相方耳帝問曰何故言河陽南陽不可問對曰河南帝城多近臣南陽帝鄉多近親又曰梁鴻登北邙山作五噫之歌曰登彼北邙兮噫覽觀帝京兮噫宮室崔嵬兮噫寥寥未央兮噫人之劬勞兮噫魏志曰明帝即位欲平北邙山令登觀臺見孟津廷尉辛毗諫曰天地之性高高下下今而反之既非其理若九河盛溢洪水為害丘陵皆夷何以禦之乃止晉書曰武帝問尚書郎虞摯三日曲水事摯曰漢章帝時平原徐肇以三月初生三女至三日俱亡一村以為怪乃相攜至水邊洗除因流水以濫觴遂以成俗帝曰若如所說非嘉事也尚書郎束晳對曰虞摯小生未究其本此事起自周公卜成洛邑因流水泛酒故逸詩羽觴隨波流及秦昭王時三月上巳日置酒河曲遂有金人自泉而出捧水心劍於王曰令君制有西夏此即其處因立為曲水焉二漢相沿為盛集帝嘉晳對隋書曰煬帝命僕射楊素等營構宮室大業元年遂成新都而徙居之今洛陽宮是也洛陽地圖曰鞏在洛水之間鞏固也言四面有山可以鞏固也朱超石與兄書曰洛下道路本好青槐暎蔭可愛陸機洛陽記曰洛陽有銅駞街漢鑄銅駞二枚在宮南四會道相對俗語曰金馬門外集眾賢銅駞陌上集少年水經曰伊水東北過伊闕昔大禹䟽龍門以通水兩山相對望之如闕伊水歷其間謂之伊闕穆天子傳曰天子射鳥有獸在葭中七萃之士高賁戎擒之以獻天子命畜之東虞曰虎牢唐諱虎故改武其後又名成皋十道志曰壽安縣漢宜陽縣也, SBCK: ''}
