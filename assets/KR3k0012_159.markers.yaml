  - {type: variant, offset: 5, length: 2, content: 京開, SBCK: 屯鞏雒以距楚酈食其曰夫敖倉天下轉輸乆矣臣聞其下藏粟甚多楚人抜滎陽不能堅守敖倉此天所以資漢願足下急進兵攻滎陽據敖倉之粟即天下知所歸矣晉書曰阮籍甞登廣武見劉項戰處歎曰時無英主使竪子成名其地在滎陽地道記曰陽武滎陽有博浪沙張良爲韓擊􅁗始皇處宋州十道記曰宋州睢陽郡理宋城縣虞舜十二州爲豫州之境周爲青州之域武王}
