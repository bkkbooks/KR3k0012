  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第一百五十九州郡部五}
  body:
  - {type: variant, offset: 2, length: 0, content: '', WYG: 南陽二郡之西境於故函谷置𢎞農郡漢書郊祀志曰黃帝以首山之銅鑄鼎於荆山之下後名其地爲鼎湖郡國縣}
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 中虢汝鄭宋曹亳單許陳頴蔡虢州十道志曰虢州弘農郡禹貢䂊州之域春秋爲虢地七國時秦韓之境秦併天下爲三川郡漢元鼎中置弘農郡左傳僖二年曰晉荀息以屈産之乗垂􅁄之璧以假道於虞以伐虢應劭漢官儀云弘大也所以廣大農業也漢志曰武帝置弘農縣於􅁗故函谷􅀜山嶺下戴延之西征記曰函者道形如函也孫卿子曰􅁗有松柏之塞是也帝王丗紀曰虢有三焉周興封虢仲於西虢此其地也封虢叔於東虢即成臯是也今陜郡平陸縣是北虢漢書曰楊僕爲樓舩將軍恥爲􅀜外人於是徙關新安割􅁗河南南陽二郡之西境於故函谷置弘農郡漢書郊祀志曰黄帝以首山之銅鑄鼎於荆山之下後名其地爲鼎湖今胡城縣也郡國縣道記曰盧氏西虢之別也遁甲開山圗曰盧氏山冝五榖可以避水災因山以名縣汝州十道志曰汝州臨汝郡禹貢豫州之域春秋時爲周王畿及鄭楚之地十三州志曰戰國時梁屬魏秦置三十六郡屬三川郡漢爲河南郡之梁縣也左傳昭二十九年傳曰陶唐氏旣衰其後有劉累學擾龍于豢龍氏以事孔甲能飲食之夏后嘉之賜氏曰御龍一雌死濳􅊽以食夏后夏后饗之而使求之懼而遷于魯縣即魯山縣也又曰楚白公之亂葉公率國人攻白公白公奔山縊死葉公遂邑焉即今葉縣也家語曰葉公好龍䆫壁皆􅀞龍形眞龍爲降葉公見而喪魄漢書曰漢王至成臯轅生􅀃漢王曰漢楚相拒滎陽數歳漢常困願君王岀武􅀜項王必引南走王深壁令滎陽成臯且休息使韓信等輯河北地連燕齊君王乃復走滎陽如此則楚所備者多漢得休息王從其計出兵宛葉間左傳曰邘晉應韓武之穆也注曰應城在襄城城父縣西南韓詩外傳曰周成王與弟戯以桐葉爲珪以封汝周公曰天子無戲言王應時而封曰應侯今應城是也鄭州十道志曰鄭州滎陽郡禹貢豫州之境秦兼天下爲三川郡帝王丗紀曰黄帝都於有熊今新鄭是也漢志曰新鄭夲髙辛氏火正祝融之墟國語曰鄭桓公爲司徒問於史伯曰王室多故余懼及焉何以逃死史伯對曰王室將卑戎翟必昌不可偪也當成周者南有荆蠻申呂應鄧陳蔡隋唐北有衛燕翟鮮虞路泉徐蒲鮮虞􅁎姓路泉徐蒲皆赤翟隗姓也西有虞虢晉隗霍楊魏芮八國􅁎姓也東有齊魯曹宋滕鄒莒是非王之友子母弟甥舅也皆則蠻夷戎狄之人也非親作頑不可入也其濟洛河頴之間乎言此四水之間可逃是其子男之國虢鄶爲大虢東虢仲之後鄶􅁎姓虢叔恃勢鄶仲恃險皆有淫侈怠慢之心加之以貪冒君􅀂以周難之故􅀉孥與賄焉不敢不許學妻子賄財也周亂而是驕而貪必將背君君􅀂以成周之衆奉辭伐罪無不克矣克二邑鄢弊􅀘舟依柔歷華君之土也言克虢鄶此八邑可得􅀂前華後河右洛左濟主芣騩而食溱洧芣醜山名主為神主也修典刑以守之可以少固公􅀃乃東孥與賄虢鄶受之十邑皆有􅀉也後桓公之子武公竟取十邑之地而居之今河南新鄭是十邑謂前八邑及虢鄶韓詩外傳曰鄭國俗以二月桃花水下時㑹于溱洧之}
