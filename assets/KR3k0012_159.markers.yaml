  - {type: variant, offset: 1649, length: 114, content: 禹貢豫州之域尚書洛誥曰召公既相宅周公往營成周使來告卜作洛誥予惟乙卯朝至于洛師我卜河朔黎水我乃卜澗水車瀍水西惟洛食又卜湹水東亦惟洛食言先卜河北黎水不吉又卜澗瀍之間乃吉周禮司徒職曰以土圭之法測土深正日影以求地中日南則景短多暑日北則景, SBCK: 立爲譙國與}
