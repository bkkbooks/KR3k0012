  - {type: variant, offset: 3136, length: 1, content: 屬, SBCK: 爲潁川郡在漢州則汝南郡之汝隂縣也魏晉於此置汝隂郡後魏改置潁州毛詩曰遵彼汝墳伐其條枚史記曰蒙恬伐楚􅃦丘今汝隂縣有寢丘故城在焉吕氏春秋曰楚孫叔敖戒其子曰我死王必封汝無受利地荆楚之間有寢丘其地爲不利可長有也其子從之楚封功臣二葉而滅唯寢丘不奪一名沈丘蔡州十道志曰蔡州汝陽郡禹貢豫州也圖經曰春秋時爲沈蔡二國之地後爲楚魏二國之境秦兼天下以其地爲}
