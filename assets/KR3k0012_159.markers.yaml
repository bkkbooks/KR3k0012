  - {type: variant, offset: 282, length: 1367, content: 東魏孝靜帝以此置梁州周宣帝改為汴州以其臨汴水為名也隋大業十三年州廢以開封浚儀屬鄭州隋亂陷賊唐武德四年平王世充復置汴州五代史曰梁開平元年梁祖初開國升汴州為開封府建名東京元管開封浚儀陳留雍丘封丘尉氏六縣至是割滑州之酸棗長垣鄭州之中牟武陽宋州之襄邑曹州之戴邑許州之扶溝𨻳陵陳州之太康九縣隸焉天后唐復降為汴州以宣武軍為額其陽武長垣扶溝考城等四縣仍且隸汴州其天余五縣卻還本部晉天復中復升為東京復以前五縣隸之漢周並因之太康地記曰豫州之分其人得中和之氣性安舒其俗阜其人和今俗多寬慢漢志曰開封逢池在東北或曰宋之逢澤也瓚曰汲郡古文梁惠王廢逢忌之藪以賜民今浚儀是也史記曰王稽與范睢言曰先王待我于三亭之南三亭今屬浚儀陳留風俗儀傳曰阮簡為開封令有劫賊外白甚急簡方圍棊長嘯曰局上有天動甚急徐廣史記音義曰秦孝公會諸侯於蓬澤圖經曰浚儀有高陽故城顓頊高陽氏佐少昊有功封於此城又曰浚儀有信陵亭在城內即魏公子無忌勝天慨之地左傳曰韓起送女於楚還過鄭鄭伯勞諸國今圍城是也漢志曰陳留郡鄭邑天后為陳所併故曰陳留瓚曰宋亦有留彭城留是也留屬陳故稱陳留也古史考曰伊尹生於空桑陳留有空桑故城家語曰孔子南遊於楚至阿谷之隧使子貢奉觴從女子乞飲今陳留有阿谷水漢志曰雍丘屬陳留故杞國周武王封禹天后東樓公左傳曰衛侯伐鄭至于鳴天雁在雍丘有鳴天雁亭左傳曰齊桓公會諸侯于葵丘今在雍丘縣漢志曰東昏陳留郡莽改曰東明又曰襄邑屬陳留有服官莽曰襄平師古曰襄邑宋地本承匡襄陵鄉宋葬公所葬故曰襄陵秦始皇以承匡卑濕故徙縣於襄陵謂之襄邑縣陳留風俗傳曰襄邑縣南有渙水睢水傳曰睢渙之水出文章故有黻黻藻錦日月華蟲以奉天子宗廟御服焉左傳曰宣二年鄭破宋師于大棘杜預曰在襄邑天后漢地理志曰陳留郡已吾有大棘鄉國都記云封丘衛地故燕之延鄉也高祖與項羽戰戰於延鄉有翟母免其難故以延鄉封翟母焉漢志曰封丘屬陳留郡孟康曰春秋時敗翟于長丘今翟溝是也漢志曰尉氏屬陳留郡應劭曰古獄官曰尉氏鄭之別邑也瓚曰鄭大夫尉氏之邑遂以為邑師古曰鄭大夫尉氏亦以掌獄之官故為族耳後漢地理志曰陳留郡尉氏有陵樹鄉鄉北有澤澤有天子苑囿有秦樂廄漢以馴養猛獸漢志曰外黃屬陳留郡張晏曰魏郡有內黃故加外耳瓚曰縣有黃溝故依之也左傳曰惠公敗宋師于黃杜注外黃縣東有黃城陳留風俗傳曰沛公起兵野戰喪皇妣於皇鄉天下平定乃使使者以梓宮招魂於野有丹蛇自天灑濯入梓宮其俗處仍有遺天發其處在小黃屬陳留漢志曰長垣屬陳留郡莽曰長固孟康曰春秋會于匡今匡城是晉地道記云長垣故衛故匡城地孔子厄處也地道記曰承匡城在縣西左傳文十一年會晉卻𡙇于承匡是也漢志曰鄢屬陳留莽曰順通左傳隱公曰鄭伯克叚于鄢又鄭太叔侵鄭至于廩延注曰縣北有延津天后漢地理志曰即酸棗也戰國策云齊欲發卒取周九鼎顏率曰夫梁之君臣欲得九鼎謀於沙海之上為日久矣沙海屬浚儀陳留風俗傳曰縣有蒼頡師曠城其城有列仙吹臺梁王增天築之以為吹臺俗號繁臺史記曰大梁城有十二門東門曰夷門隱士侯嬴年七十家貧為大梁夷門抱關者魏公子無忌厚遺之不肯受水經曰大禹塞滎陽澤開渠以通淮泗名莨菪渠至汴渠也漢平帝時河汴決壞後明帝遣使者修治汴渠至隋大業中更令開導名通濟渠引河水入汴口自大梁之東引入泗連于淮至江都宮入于海亦謂之御河河畔築御道植柳煬帝巡幸乘龍舟而往江都自楊益湘南至交廣閩中公私漕運商旅軸轤相接隋書曰大業元年以汴水迂曲廻復稍難自大梁城西南鑿渠引汴水入號通濟渠西京河南府十道志曰洛州周之舊都, WYG: ''}
