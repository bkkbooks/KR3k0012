  - {type: variant, offset: 1874, length: 368, content: 之湊也孝經援神契曰八方之廣周洛為中於是遂築新邑營定九鼎以為王之東都漢書曰高祖欲都洛陽戍卒婁敬求見上曰陛下都洛陽欲與周室比隆哉上曰然敬曰陛下取天下與周室異周之先自后稷積德十餘世公劉避狄居豳大王以狄伐故去豳之歧國人爭歸之文王為西伯武王伐紂八百諸侯不期而會成王即位周公之屬輔相焉乃營成周於洛邑以為天下中四方納貢道里均有德則以王無德則易以亡凡居此者欲務以德致人不令後世驕奢以虐民也及周之襄乃分為二天下莫朝周不能制形勢弱也今陛下用兵取天下百姓肝塗地而欲比隆周室臣以為不侔矣不如都秦帝以問張良良曰洛陽雖險其中不過百里四面受敵此非用武之國不如都關中婁敬之說是也愽物志曰周在中樞三河之分風雨所起四險之國武王克殷定鼎郟鄏以為東都皇甫謐帝王世紀曰周公相成王以酆鎬偏在西方職貢不均乃使邵公卜居洛水之陽以即中土元和郡縣志曰河南府三代皆為都邑周公營之為成周秦為三, WYG: 爲潁}
