  - {type: variant, offset: 649, length: 215, content: 孔策子曰先君相魯三月政化既行頌曰褒衣章甫實獲我所章甫襃衣惠我無私列仙傳曰稷丘君泰山下道士漢武帝東巡君乃冠章甫擁琴而見之牟追釋名曰牟追牟冐也言其刑冐髮追追然也周禮春官曰追帥掌王后之首服為副編次追衡笄鄭司農云追冠名也禮曰牟追夏后氏之道也副者婦人之首服衡維持冠者儀禮士冠禮曰母追夏后氏之道也白虎通曰夏正十三月其飾最大故為無追無追者言其追大也制冠法天天色玄不失其質夏之冠色純玄收釋名曰收夏后氏冠名也言收歛髮也白虎通曰夏收而祭謂之收者十三月, SBCK: 時}
