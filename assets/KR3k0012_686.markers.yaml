  - {type: punctuation, offset: 1050, content: 「, id: KR3k0012_CHANT_686-bkkpn417}
  - {type: variant, offset: 1050, length: 0, content: '', SBCK: 黄帝戴黄冕周禮曰弁師掌王之五冕朱裏延紐冕綖之覆也紐小鼻貫所貫五采繅十有二就繅合五色􅁝爲之垂之延之前後各十有二所謂邃延也就成也繩之每一匝而貫五采土十二斿則十二王也又曰司服掌王之服祀昊天上帝則大裘而冕祀五帝亦如之六服同冕享先王則衮冕享先公射享則鷩冕祀四望山川則毳冕􅀕社稷五祀則絺冕􅀕羣小五祀則}
  - {type: variant, offset: 1050, length: 2, content: 玄冠, WYG: 黄帝戴黄冕周禮曰弁師掌王之五冕朱裏延紐延冕之覆也紐小鼻笄所貫也五采繅十有二就繅合五色絲為之垂于延之前後各十有二所謂邃延也就成也繩之毎}
  - {type: variant, offset: 1050, length: 0, content: '', krp: 黄帝戴黄冕周禮曰弁師掌王之五冕朱裏延紐冕綖之覆也紐小鼻貫所貫五采繅十有二就繅合五色絲爲之垂之延之前後各十有二所謂邃延也就成也繩之每一匝而貫五采土十二斿則十二王也又曰司服掌王之服祀昊天上帝則大裘而冕祀五帝亦如之六服同冕享先王則衮冕享先公射享則鷩冕祀四望山川則毳冕祭社稷五祀則絺冕祭羣小五祀則}
