  - {type: variant, offset: 1065, length: 0, content: '', SBCK: 又曰玄冕齋戒􅀑神隂陽也隂陽夫婦又曰天子之冕朱緑藻十有二諸侯九上大夫七下大夫五士三此以文爲貴也又曰魏文侯問於子}
  - {type: page-break, offset: 1065, content: '', id: KR3k0012_SBCK_686-2a}
  - {type: variant, offset: 1065, length: 0, content: '', WYG: 又曰王戴冕璪十有二旒則天數也又曰𤣥冕齋戒鬼神隂陽也又曰天子之冕朱緑藻十有二諸侯九上大夫七下大夫五士三此以文為貴也又曰魏文侯問於子}
  - {type: variant, offset: 1065, length: 0, content: '', krp: 又曰玄冕齋戒鬼神隂陽也隂陽夫婦又曰天子之冕朱緑藻十有二諸侯九上大夫七下大夫五士三此以文爲貴也又曰魏文侯問於子}
  - {type: variant, offset: 1067, length: 2, content: 母追, SBCK: 吾端冕而聽古樂則唯恐卧鄭玄曰端玄衣又曰君子端冕則有敬色大戴禮曰古者冕而前旒所以蔽明主黃纊塞耳所以揜聽也書曰王麻冕黼裳由賔階隮鄭玄曰三十升布冠也卿士􅀖君麻冕蟻裳入即位蟻謂色玄也太保太史太宗皆麻冕􅊮裳左傳曰晉士㑹帥師滅赤狄晉侯請于王以冠冕命士㑹將中軍且爲太傅又曰公還及方城季武子使公冶問問公起居公冶季氏屬大夫公與公冶冕服以卿玄冕賞之固讓而後受公冶疾聚其臣曰我死必無以冕服歛非德賞也言公畏季氏而賞其使非以我有徳又曰王使詹桓伯辭於晉曰我在伯父猶衣服之有冠冕木土之有夲源民人之有謀主伯父若裂冠毀冕抜夲塞源專弃謀主雖戎狄其何有余一人論語曰子曰禹吾無間然矣菲飲食而致孝乎􅀑神惡衣服而致美乎黼冕又曰子曰行夏之時乗}
  - {type: page-break, offset: 1067, content: '', id: KR3k0012_SBCK_686-2b}
  - {type: variant, offset: 1067, length: 2, content: 母追, WYG: 吾端冕而聽古樂則惟恐卧鄭𤣥曰端𤣥衣又曰君子端冕則有敬色大戴禮曰古者冕而前旒所以蔽明黈纊塞耳所以揜聴書曰王麻冕黼裳由賓階隮鄭康成曰三升布冠也卿士邦君麻冕蟻裳入即位蟻謂色𤣥也太保太史太宗皆麻冕彤裳𫝊曰晉士㑹帥師滅赤狄晉侯請于王以黻冕命士㑹將中軍且為太傅又曰公還及方城季武子使公冶問問公起居公冶季氏屬大夫公與公冶冕服以卿𤣥冕賞之固辭而後受公冶疾聚其臣曰我死必無以冕服斂非徳賞也又曰王使詹桓伯辭於晉曰我在伯父猶衣服之有冠冕水木之有本源民人之有謀主伯父若裂冠毁冕拔本塞源專棄謀主雖戎狄其何有余一人論語曰子曰禹吾無間然矣菲飲食而致孝乎鬼神惡衣服而致美乎黻冕又曰行夏之時乗}
