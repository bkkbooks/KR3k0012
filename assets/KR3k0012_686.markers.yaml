  - {type: variant, offset: 2291, length: 2, content: 方山, SBCK: 爵弁一名冕廣八寸長二寸如爵形前小後大其上似爵頭色有収持笄所謂夏収殷􅒐况羽切者也祠天地五郊明堂雲翹舞樂人服之詩曰淑人君子其帶伊􅁝其帶伊􅁝其弁伊騏毛萇日騏其文也弁皮弁也又曰有匪君子充耳琇瑩㑹弁如星弁皮弁所以㑹髪也又曰有頍丘弭切者弁實維伊何又曰側弁峩峩屢儛傞傞禮曰三王共皮弁素服又曰􅀕之日王皮弁以聽􅀕報又曰太學始教皮弁􅀕菜示敬道也又曰古者天子諸侯必有公桑大昕之朝君皮弁素積卜三宫夫人桑于公桑左傳曰楚子玉自爲瓊弁玉纓未之服也先戰夢河神謂巳曰􅂌予予賜汝孟諸之麋又曰天王使劉定公勞趙孟於頴館於洛汭劉子曰美哉禹功明德逺矣微禹吾其魚乎吾與子弁冕端委以治民臨諸侯禹之力也周禮曰司服掌王之􅁻㐫衣服凢兵事韋弁服鄭玄曰以韎韋爲弁也春秋傳曰晉郄至衣韎韋之跗注是也眡朝則皮弁服鄭玄日視朝視内外之事也皮弁之服十五􅂛白布衣積素以爲裳也凢甸}
  - {type: page-break, offset: 2291, content: '', id: KR3k0012_SBCK_686-6b}
  - {type: page-break, offset: 2291, content: '', id: KR3k0012_SBCK_686-7a}
  - {type: variant, offset: 2291, length: 2, content: 方山, WYG: 爵弁一名冕廣八寸長二寸如爵形前小後大其上似爵頭色有收持笄所謂夏收殷冔况羽切者也祠天地五郊明堂雲翹舞樂人服之詩曰淑人君子其帶伊絲其弁伊騏又曰有匪君子充耳琇瑩㑹弁如星又曰有頍者弁實維伊何又曰側弁之俄屢舞傞傞禮曰三王共皮弁素積又曰祭之日王皮弁以聽祭報又曰太學始教皮弁祭莱示敬道也又曰古者天子諸侯必有公桑大昕之朝君皮弁素積卜三宫夫人世婦之吉者桑于公桑左傳曰楚子玉自為瓊弁玉纓未之服也先戰夢河神謂已曰畀予予賜汝孟諸之麋又曰天王使劉定公勞趙孟於頴館於洛汭劉子曰美哉禹功明徳逺矣微禹吾其魚乎吾與子弁冕端委以治民臨諸侯禹之力也周禮曰司服掌王之吉凶衣服凡兵事韋弁服鄭𤣥曰以韎韋為弁也春秋傳曰晋郄至衣韎之跗注是也眡朝則皮弁服鄭𤣥曰視朝視内外之事也皮弁之服十五升白布衣積素以為裳也凡甸}
