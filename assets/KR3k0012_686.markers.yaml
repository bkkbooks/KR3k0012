  - {type: variant, offset: 225, length: 283, content: 尚書兩梁禮無文徐廣輿服志雜注曰天子雜服介幘五梁進賢冠太子諸王三梁進賢冠北齊書曰文襄嗣業以前司徒侯景進賢冠賜李繪曰卿但直心事孤當用卿為三公勿學侯景叛也遠遊冠三禮圖曰遠遊冠諸王所服徐廣輿服雜注曰天子雜服遠游冠太子及諸王遠遊冠制似通天也天子五梁太子三梁董巴漢輿服志曰遠遊冠制如通天有展䇶橫之于前無山張鏡宋東宮儀記曰皇太子遠遊冠翠緌魏文帝與于禁詔曰昔漢高脫衣以衣韓信光武解綬以帶李忠誠皆人主當時貴敬功勞今以遠遊冠與將軍梁書曰天監十四年正月朔旦帝臨軒冠太子于太極殿舊制太子著遠遊冠金蟬翠緌纓至是詔加金博山淮南子曰楚莊王通梁組纓高誘曰通梁遠遊冠羅浮山記曰王方平著遠遊冠五色綬章甫, WYG: ''}
