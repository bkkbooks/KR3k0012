  - {type: variant, offset: 1108, length: 2, content: 玄端, WYG: 六等之冕皆有黈纊黄錦為之其大如橘自皇太子以下並犀導青纓纓說文曰纓冠系也釋名纓頸也自上而下繫於頸也禮曰𤣥冠丹組纓諸侯之齊冠也𤣥冠綦組纓士之齊冠也又曰𤣥冠紫纓自魯桓公始也傳曰石乞孟黶敵子路以戈擊之斷纓子路曰君子死冠不免不使冠在地結纓而死漢舊儀曰冠髙山之冠飛羽之纓漢書曰終軍字子雲濟南人上書請受長纓必羈南越王而致之闕下乃使使越越王舉國内属又曰江充見犬臺宫晋灼曰黄圖上林有犬臺宫也冠襌纚歩揺冠飛翮之纓張宴曰冠禪纓小歩則揺纓隨冠而動若鳥翮然晋書曰石季龍子儀陽公鑒時鎮闗中役煩賦重失闗右之和其女官李松勸鑒文武有長髪者拔為冠纓餘以給宫人季龍聞之大怒以其右僕射張離為雍州刺史以察之信然徴鑒還鄴収松下廷尉後魏書曰李彪嘗使齊着大頭纓纓裾至腰張融笑之曰北國士大夫㡌裾亦有等級不彪曰上士至腰中士至膝下士之徒盖髪而已山海經曰拘纓之國一手把纓管子曰桓公親郊管仲詘纓㨗袵孟子曰孺子歌曰滄浪之水清兮可以濯我纓楚詞亦同莊子曰昔趙恵文王喜劔太子患之募左右孰能說王左右曰莊子當能太子乃使人以千金奉莊子不受與使者俱徃太子曰吾王所見唯劔士篷頭突鬢冠曼胡之纓短後}
