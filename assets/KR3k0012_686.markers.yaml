  - {type: variant, offset: 1061, length: 3, content: 其遺象, SBCK: 天數}
  - {type: variant, offset: 1061, length: 3, content: 其遺象, WYG: 大裘而冕祀五帝亦如之六服同冕享先王則衮冕享先公饗射則鷩冕祀四望山川則毳冕祭社稷五祀則絺冕祭羣小五祀則𤣥冕禮曰有虞氏皇而祭周人冕而祭皇冕属畫羽飾之又曰諸侯冕而舞大武諸侯之僣禮}
