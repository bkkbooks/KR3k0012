  - {type: variant, offset: 1106, length: 0, content: '', SBCK: 子曰有人於此􅀍􅄄而懷玉如何子曰國無道隱者可也國有道則衮冕而執玉五經通義曰冕制柰何禮器曰冕冠長六寸廣八寸貟前冕緇布在上五采組十二旒夏殷之冕如周制矣其旒色異夏冕黒白赤組旒殷冕黒黄青組旒應劭漢官儀曰周冕與古冕畧等周加垂旒天子前後垂真白珠各十二蔡邕獨斷曰漢明帝採尚書臯繇及周官禮記以定冕制皆廣七寸長尺二寸係白珠于其端十二旒三公及諸侯九旒卿七旒又曰祀天地明堂平冕崔豹古今注云牛亨問曰冕旒如繁露何也荅曰綴而下垂如露之繁多故曰繁露摰氏決疑要注曰秦除六冕之制明帝漢明帝也永平中使諸儒案古文始復造衮冕符子曰龍逢諌桀曰臣觀君之冕非冕冕危石觀君之履非履履春冰未有冠危石而不壓蹈春氷而不䧟也陳壽益部􅂄舊傳曰郭賀拜荆州刺史明帝廵狩到南陽特見嗟嘆賜以三公之服黼黻旒冕勑去幨露冕使百姓見此衣服以彰其德何法盛晉中興曰􅀄中興儀服不備又冕旒飾以翡翠珊瑚雜珠顧和奏舊冕十二旒皆用玉今不能得玉可用白琁珠於是始下太常治改王智􅀷宋記曰明帝詔曰朕以大冕郊祀天宗祀明堂以法冕祀太廟元正大㑹}
  - {type: page-break, offset: 1106, content: '', id: KR3k0012_SBCK_686-3a}
