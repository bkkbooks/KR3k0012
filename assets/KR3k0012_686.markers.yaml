  - {type: variant, offset: 1237, length: 1048, content: 縞帶委貌冠女碧衣戴勝皆無縫高山冠三禮圖曰高山冠一曰側注高九寸鐵為卷梁秦制行人使者所服今謁者服之續漢輿服志曰安帝立太子太子謁高廟洗馬冠高山冠侍御史奏謂不宜事下有司尚書陳忠奏洗馬職如謁者服其服先帝之舊也奏可謁者古一名洗馬董巴漢輿服志曰高山冠一曰側注如通天謁者僕射所服太博南郡胡廣說曰高山冠蓋齊王冠也秦滅齊以其君冠賜近臣謁者服之傅子曰魏明帝以高山制似通天遠遊乃毀變先形令行人使者服之會稽先賢像讚曰綦母文後為交阯剌史詔賜高山冠法冠三禮圖曰法冠一曰柱後惠文一曰獬豸冠柱高五寸以縱裹鐵柱卷秦制法官服之禮不記蔡邕獨斷曰法冠秦制執法者服之天子冠通天漢制之侍中中常侍皆冠惠文加貂附蟬董巴漢輿服志曰太傅胡公說春秋左氏傳有南冠而縶者則楚冠也秦滅楚以其服賜執法近臣御史服之又曰武冠一曰武弁大冠侍中中常侍加黃金璫附蟬為文貂尾為飭謂之趙惠文冠國語曰定王使單襄公聘於宋假道於陳陳靈公與孔寧儀行父南冠以如夏氏留賓不見單子歸告王曰陳侯棄袞冕而南冠以出不亦彝簡乎簡略彝常也言簡略常服犯先王之令國其亡乎賈逵曰南冠楚冠也漢書曰張敞弟武為梁相敞遣吏送之曰何以治梁武曰馭黠馬者利其銜榮當以柱後惠文彈治之耳秦獄吏冠柱後惠文冠如淳曰蟪蟬也冠細如蟬翅今御史冠也又曰昌邑王賀短衣大袴冠惠文冠服虔曰武冠也趙惠文所服故號惠文應劭漢官儀曰侍御史周官也為柱下史冠法冠一曰柱後以鐵為柱言其審固不撓或說古有獬豸獸主觸不直故執憲者以其角形為冠耳唐書曰侍御史朱放請復置朱衣豸冠於內廓有犯者御史服以彈後御史張著服之以彈京兆尹嚴郢武弁三禮圖曰武弁大冠也士服之或曰千歲涸澤之神名慶忌冠大冠乘小車馬好疾馳齊人服之董巴漢輿服志曰武冠一曰武弁大冠武官冠之侍中常侍加黃金璫附蟬為飾謂之趙惠文冠蔡邕獨斷曰武冠或曰繁冠今謂之大冠魏志曰陳思王植上䟽曰臣若得辭遠遊戴武弁解朱組佩青紱乃臣之至願也徐爰宋志曰武弁世謂籠冠也鶡冠應劭漢官儀曰虎賁冠插鶡尾鶡鷙鳥中之果勁者也每所攫撮應爪摧碎尾上黨所貢董巴漢輿服志曰武冠加雙鶡尾為鶡冠羽林虎賁冠之鶡鷄勇鬥死乃止故趙武靈王以表武士秦施用之劉向七略曰鶡冠子常居深山以鶡為冠故號冠子卻敵冠三禮圖曰卻敵冠前廣四寸後三寸衛士服之董巴漢輿服志曰卻敵冠制似進賢衛士服之卻非冠三禮圖曰卻非冠宮殿門僕射服高五寸禮不記又司馬彪續漢書云插以鷰尾董巴漢輿服志曰卻非冠似長冠巧士冠三禮圖曰巧士冠前高五寸後相通掃除從官服之禮不記董巴漢輿服志曰巧士冠高七寸不常服唯郊天黃門從官四人冠之在鹵簿中次乘輿車前以備官者四星方山冠三禮圖曰五彩方山冠各以其綵縠為之祠廟天子八佾樂五行舞人所服, SBCK: ''}
