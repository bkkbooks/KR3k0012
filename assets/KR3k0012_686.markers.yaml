  - {type: variant, offset: 1107, length: 0, content: '', krp: 諸侯以絺冕小㑹宴饗餞送諸侯臨軒命王公以繡冕征伐不賔講武校獵隋書曰六等之冕皆有黈纊黄綿爲之其大如橘自皇太子以下並犀導青纓纓說文曰纓冠系也緌系冠纓也釋名曰纓頸也自上而下繫於頸也禮}
