  - {type: variant, offset: 162, length: 227, content: 之服也前高七寸後三寸長八寸公侯三梁中二千石已下至博士兩梁千石已下至小史私學弟子皆一梁宗室劉氏亦兩梁蔡邕獨斷曰進賢冠文官服之漢制尚書兩梁禮無文徐廣輿服志雜注曰天子雜服介幘五梁進賢冠太子諸王三梁進賢冠北齊書曰文襄嗣業以前司徒侯景進賢冠賜李繪曰卿但直心事孤當用卿為三公勿學侯景叛也遠遊冠三禮圖曰遠遊冠諸王所服徐廣輿服雜注曰天子雜服遠游冠太子及諸王遠遊冠制似通天也天子五梁太子三梁董巴漢輿服志曰遠遊冠制如通天有展䇶橫之于前無山張鏡宋東宮儀記曰皇太子遠遊冠翠緌魏文, SBCK: 黄}
