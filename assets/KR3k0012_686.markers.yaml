  - {type: variant, offset: 1109, length: 1, content: 端, SBCK: 冠丹組纓諸侯之齋冠也玄冠綦組纓士之齋冠也又曰玄冠紫纓自魯桓公始也傳曰石乞盂黶敵子路以戈擊之斷纓子路曰君子死冠不免不使冠在地結纓而死漢書曰冠髙山之冠飛羽之纓又曰終軍字子雲濟南人上書請受長纓必羇南越王而致之闕下乃使使越越王舉國内屬又曰江充召見犬臺宮晉灼日黄圖上林有犬臺宮也冠蟬纚歩摇冠飛翮之纓張晏曰冠蟬纓小歩則揺纓隨冠而動若鳥翮然晉書曰石季龍子義陽公鑒時鎮􅀜中􅃥煩賦重失􅀜右之和其女官李松勸鑒文武有長髮者㧞爲冠纓餘以給宫人季龍聞之大怒以其右僕射張離爲雍州刺史以察之信然徴鑒還鄴収松下廷尉後魏書曰李彪嘗使齊着大頭纓纓􅅂至􅆎張融􅀏之曰北國士大夫帽􅅂亦有等級不彪曰上士至􅆎中士至頸下士之徒盖髮而巳山海經曰拘纓之國一手把纓管子曰桓公親郊管仲詘纓捷祍孟子曰孺子歌曰滄浪之水清兮可以濯我纓楚詞亦同莊子曰昔趙惠文王喜劒太子患之募左右孰能􅀃王左右曰莊子當能太子乃使人以千金奉莊予莊子不受與使者俱徃太子曰吾王所見唯劒士蓬頭突􅁂冠曼胡之纓短後}
