  - {type: punctuation, offset: 1117, content: 《, id: KR3k0012_CHANT_686-bkkpn439}
  - {type: variant, offset: 1117, length: 0, content: '', SBCK: 淮南子曰聖人見鳥獸髯胡之制作緌纓之首飾韓子曰鄒君好服長纓左右皆作長纓纓甚貴鄒君患之問左右左右對曰君服之百姓亦多服是故貴鄒君因先自斷其纓而出國中皆不服長纓􅀃苑曰楚莊王賜群臣酒日暮燭滅乃有人引美人之衣者美人援絶其冠纓告王趣火來視絶纓者王曰賜人酒使醉失禮柰何欲顯婦人之節而辱士乎乃命皆絶去其冠纓尉繚子曰天子玄冠玄纓諸侯素冠素纓自大夫以下皆皂冠皂纓後漢崔駰達指曰有事則褰裳濡足無事則攝纓整衿魏徐幹齊都賦曰纎纚細纓輕配蟬翼自尊及卑湏我元服晉陸機詩曰冠冕無醜士長纓皆雋民晉成公綏七唱曰瓊弁曜首玉纓照目宋謝靈運七濟曰翠緌媚眉朱裳妍形劉梁七舉曰華組之纓從風紛紜弁釋名曰弁如兩手相合拚時也以爵韋爲之謂之爵弁以鹿皮爲之謂之皮弁以韎韋爲之謂之韋弁也系本曰魯昭公作弁宋均日作素弁也五經通義曰皮弁冠前後玉飾}
