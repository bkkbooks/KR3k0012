  - {type: variant, offset: 3, length: 0, content: '', WYG: 四頭痛心痛腹痛咽痛并噎煩懣勞悸眩暍頭痛毛詩伯兮曰願言思伯甘心首疾又小弁曰心之憂矣疢如疾首周官疾醫曰春時有痟首之疾史記曰西域有大小頭痛山赤土身熱之坂令人頭痛嘔吐風俗通曰田家老母市餅置道邉石人頭上既而忘之人以為神能治病轉以相語頭痛者磨石人頭腹痛者磨石人腹後餅母為說乃止心痛易說曰冬至氣當至不至則多心痛左傳昭上曰醫和謂晉侯曰明滛心疾北史曰裴訥之為平原公開府功曹掌書記從至并州其母在鄴忽得心痛訥之是日不勝思慕心亦驚痛乃請急而還當時以為孝感唐書曰劉敦儒母有心痛疾日須鞭箠數人乃安子弟僕使不堪其苦唯敦儒侍養不懈體常流血莊子曰西施病心而嚬其里醜人見而美之歸亦捧心而嚬其里之富人見之堅閉門而不出貧人見之挈妻子而走賈誼書曰楚惠王食寒葅中有水蛭雖欲發之恐宰夫得罪當死遂吞之因得心疾甚乃言所中令尹賀曰隂徳必須陽報是夜惠王欬而蛭出心腹之病皆除俗説曰阮光祿大兄喪哀過遂得失心病服除後經年病瘳續捜神記曰李子豫少善醫方當代稱其通靈許永為豫州刺史鎮歴陽其弟患心腹堅痛十餘年殆死忽自夜聞屏風後有鬼謂腹中鬼曰何不促殺之不然明日李子豫當從此過以赤丸打汝汝其死矣腹中鬼對曰吾不畏之於是許永使人候子豫果來未入門病者自聞腹中呻吟聲及子豫入視曰鬼病也遂於巾箱中出八毒赤丸子與服須㬰腹中雷鳴鼓轉大利數行遂差今八毒丸方是也幽明録曰顧長康在江陵愛一女子還家長康思之不已乃畫作女形簮著壁上簮處正刺心女行十里忽心痛如刺不能進腹痛左傳宣下曰楚子伐蕭蕭潰還無社與司馬夘言號申叔展還無社蕭大夫司馬邜申叔展皆楚大夫也無社欲叛以求免死無社素識叔展故因夘使呼之叔展曰有麥麴乎曰無有山鞠窮乎曰無麥麴鞠窮所以禦濕河魚腹疾柰何言無禦濕藥將病曰目於眢井而拯之無社意觧欲入井故使叔展視虛廢井而求拯左傳曰晉侯有疾秦醫云雨滛腹疾捜神記曰淮南書佐劉雅夢見青蜥蜴從屋落其腹内因苦腹痛病華佗别傳曰有人病腹中切痛十餘日鬚眉落佗令破腹視脾果半腐壞刮去惡以膏傅瘡飲之以藥百日平復咽痛并噎易曰大寒氣當至而不至則多咽痛漢書曰昌邑王被徴至長安左右令哭王曰吾嗌痛不肯哭魏志曰有人病咽塞嗜食而不下華佗令取餅家蒜虀大酢頓飲}
