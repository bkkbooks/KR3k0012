  - {type: variant, offset: 2725, length: 431, content: 導河內人也兄弟三人並得時疾其宅有鵲巢旦夕翔鳴聞其諠噪俱惡之念云差當治此鳥既差果張取鵲斷舌而殺之兄弟悉得啞疾吃說文曰吃言語難也方言云𧮈極吃也或謂之軋或謂之嬰郭璞曰軋穀氣不利也江東名吃為嘆也漢書曰魯恭王餘口吃難言又曰馬相如吃而善著書又曰揚雄為人簡易口不能劇談劇甚也一說劇遽疾言也言吃不能疾言也鄭玄自序曰趙商子字子聲河內溫人愽學有秀才能講難而吃不能劇談管子曰吾畏事不敢為事畏言不敢為言故行年六十如老吃耳新序曰周昌者沛人以軍功封汾陰侯御史大夫高帝欲廢惠帝立戚夫人子如意群臣固爭莫能得昌廷爭之強上問其說昌為人吃曰臣口不能言然臣則知其不可也陛下雖欲廢太子臣期期不奉詔世說曰魏明帝口吃少言而內明斷世說曰鄧艾口吃語稱艾艾晉文王戲之曰艾艾為是幾艾鄧荅曰鳳兮鳳兮故是一鳳禿禮記曰禿者不免穀梁傳曰魯季孫行父禿聘于齊齊使禿者御音迓蔡邕獨斷曰古幘無巾如今半幘而已王莽乃始施巾故語曰王頭禿幘㡛施屋秦書曰符堅徵隱士張臣和至長安堅賜以衣冠和辭曰年老頭禿不可加冠野服而入既見求歸矣齆釋名曰鼻塞曰齆, WYG: 隠}
