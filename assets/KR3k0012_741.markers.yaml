  - {type: variant, offset: 297, length: 610, content: 六變不為聾夫設談藪曰後魏中書侍郎裴敬憲字伯茂敬憲新搆山亭與賓客集謂邢子才曰山池始就願為一名子才曰海中有蓬萊山仙人之所居宜名蓬萊裴聾也敬憲患耳故以戲之憲初不晤於後覺忻然謂子才曰長忌及戶高則無憲公但大語聾亦何嫌盲廣雅曰矇瞍瞽盲也方言曰半盲為睺呼鉤反說文曰盲目無眸也眇一目小也眺目不正也瞎目病也睞童子不正也眄目偏合也青目病主醫音縊也瞍無目也周易履卦曰六三眇能視跛能履象曰眇能視不足以與明也跛能履不足以與行也毛詩臣工有瞽曰有瞽有瞽在周之庭禮記檀弓上曰子夏喪其子而喪其明明目精也曾子弔之曰吾聞之朋友喪明則哭之曾子哭子夏亦哭曰天乎子之無罪也曾子怒曰商女何無罪也吾與女事夫子於洙泗之間退而老於西河之上使西河之民疑女於夫子爾罪一也喪爾親使民未有聞焉爾罪二也喪爾子而喪爾明爾罪三也而曰女何無罪與子夏投其杖而拜曰吾過矣吾過矣又仲尼燕居曰治國而無禮譬猶瞽之無相與倀倀乎其何之韓詩外傳曰海之上有勇士曰菑丘訢以勇遊於天下過神淵飲馬其僕曰飲馬此者必死訢言飲之其僕以其言飲之馬果死菑丘拔劍而入三日三夜殺二蛟一龍而去雷神隨而擊之十日十夜眇其左目漢書曰杜欽字子夏少好經書家富而目偏盲故不好為史茂陵杜業與同姓字俱以才能稱京師衣冠謂欽為盲杜子夏以相別欽惡之為小冠高廣二寸由是京師謂欽為小冠杜子夏業為大冠杜子夏東觀漢記曰杜篤仕郡文學掾以目疾二十餘年不窺京師魏略曰夏侯惇從征呂布為流矢所中傷左目時夏侯淵與惇俱為軍師軍中號惇為盲夏侯惇惡之每照鏡恚怒輒撲鏡著地魏略曰, WYG: 呈}
