  - {type: variant, offset: 4321, length: 231, content: 太後從之又曰趙平原君家樓臨民家民家有躄者盤散行及散音珊平原君美人居樓上臨見大笑之明日躄者至平原君門請曰臣不幸有跛躄之疾而君之後宮臨而笑臣臣願得笑者頭平原曰諾及躄者去平原君笑曰豎子欲以一笑之故殺吾美人不亦甚乎終不殺居歲餘門下客稍稍引去過半平原君怪之一人前對曰以君之不殺笑躄者於是平原君斬所笑美人頭造躄者而謝焉漢書賈誼上書曰天下之勢方病大瘇非徒病瘇又苦𨂂盩𨂂腳掌盩古戾字謂反戾也又曰方今天下又類辟且病痱辟足疾痱音肥風疾也夫辟者一面痛痱者一方痛又曰哀帝有痿痺如淳曰兩足, SBCK: 熱望炎治}
