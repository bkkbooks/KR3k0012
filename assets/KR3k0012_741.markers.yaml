  - {type: variant, offset: 1795, length: 929, content: 皆免及圍解而盲疾俱復莊子曰連叔謂肩吾子曰夫瞽者不知文章之觀又曰目之與形吾不知其異也盲者不能自見又曰許由曰夫眇者無以與乎眉目顏色之好尹文子曰瞽者無目而耳不可以𥉻察視也精於聽也又曰聾者不歌無以自樂盲者不觀無以接物韓子曰寐則盲者不知覺而使之視則窮矣淮南子曰今夫盲者行於道遇君子則易道遇小人則陷於溝壑桓譚新論曰余為典樂大夫得樂家記言文帝時得魏文侯時樂人竇公年百八十歲兩目皆盲帝問其何服食至此對曰臣年十三失明父母教為樂鼓琴不導引不知壽得若何余以為竇公少盲專一內視故抱朴子曰魏武收左慈慈走入市吏傳言慈一目眇葛巾單衣於是一市皆然也又曰董君異以玉醴與盲人服之而愈世說曰顧愷畫殷荊州形殷不許顧曰明府正當嫌眼耳明點童子飛白拂上若輕雲之蔽月又曰桓南郡與殷荊州語次因作危言桓公曰矛頭浙米劍頭炊殷云百歲老公攀枯枝井上轆轤臥小兒殷有一參軍云盲人騎瞎馬臨深池殷曰咄咄逼人仲堪眇故也法顯記曰祗洹精舍西北四里有榛名曰得眼本有五百盲人依精舍住佛為說法盡還得眼盲人歡喜刺杖著地頭面作禮杖遂生長大世重之無敢伐者遂以得眼為名楚辭九章曰離婁微睇瞽以為無明蔡邕瞽師賦曰夫何矇昧坐瞽兮心窮忽以鬱伊目冥而無睹兮羗永煩以悲愁瘖啞釋名曰瘖唵也唵然無聲也漢書曰韓延壽待下吏恩施甚厚而約誓明或欺負之者延壽自刻責吏聞者自傷悔其縣尉至自刺死及門下掾自剄人救不死因瘖不能言延壽聞之對掾吏涕泣遣吏醫治又曰呂后斷戚夫人手足去眼董耳飲瘖藥吳書曰程普殺叛者數百人皆使投火即日病瘖百餘日卒文子曰皋陶瘖而為士師淮南子曰瘖者可使守圉不可使通語又曰夫人大怒破陰大喜墜陽滿氣發瘖驚怖為狂又曰水氣多瘖黃帝素問曰瘖者何病岐伯曰胞之絡脈何以言之胞絡繫於腎少陰脈實腎繫舌本故不能言續搜神記曰沛國一士人姓周生三兒向應可語便啞皆七八歲有一人經門過來乞問主人此是何聲云是僕兒頻生三子皆啞不能語客曰君冥罪還內省我於外待君主人異其言知非常人便入內思良久而出謂客曰昔為小兒時當床上有鷰巢中有三子其母從外食哺子子輒出頭作聲受之積日如此時屋下攀得及巢試以指內巢中鷰子亦出口承之乃取三蒺梨各與其子吞之既死其母尋還不復見其子出戶徘徊悲鳴而去有此事今甚悔之客曰是矣便問其三兒言語周正異苑曰高惠清隆安中為太傅主簿忽晝日有群鼠更相衘尾自屋梁相連至地清尋得瘖疾數日而亡靈驗記曰, WYG: ''}
