  - {type: variant, offset: 3345, length: 308, content: 又曰決物治齲君子不與兔缺續晉陽秋曰魏詠之生而兔缺相者云後當貴年十八聞荊州殷仲堪帳下有術人能治之因西上仲堪與語令師看焉師曰可割補之但應百日食粥不語笑詠之曰半年不語亦當治之況百日也師為治而差宋書曰孝武狎侮群臣各有稱目多髯者謂之羊短長肥瘦皆有比擬顏師伯缺齒號之曰齴癭說文曰癭頸瘤也崔贛易林曰癭瘤瘍𤸁為身害傷范曄後漢書曰真定王劉揚造作讖記云赤九之後癭揚為主楊病癭欲以惑眾魏略曰賈逵前在弘農與校尉爭公事不得理乃發憤生癭後所病稍大自啟欲割之太祖惜逵恐其不活教謝主簿吾聞十人割癭九人死逵猶行其意而癭愈大宋書曰杜預病癭初攻江陵吳人以瓠壺繫狗頸示之山海經曰天帝之山有草如葵名曰杜衡食之已癭愽物志曰山居之民多癭又稽康養生論曰頸處險而癭莊, SBCK: 抱朴}
