  - {type: variant, offset: 10, length: 8, content: 聞也從耳從龍秦晉, SBCK: 及淮南子曰有以噎死者而禁天下之食有以車爲敗者而禁天下之乗不亦悖哉廣五行記曰永徽中絳州有一僧病噎都不下食如此數年臨終命其弟子云吾氣絶之後便可開吾胷喉視有何物欲知其根本言終而卒弟子依其言開視胷中得一物形似魚而有兩頭遍體悉是肉鱗弟子致鉢中跳躍不止戯以諸味致鉢中雖不見食湏􅁷悉化成水又以諸毒藥内之皆隨銷化時夏中藍熟寺衆於水次作淀有一僧徃因以少淀致鉢中此䖝怖懼遶鉢馳走須􅁷化成水丗傳以淀水療噎煩懣方言曰朝鮮洌水之間煩懣}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_SBCK_741-3b}
  - {type: variant, offset: 10, length: 8, content: 聞也從耳從龍秦晉, WYG: 及淮南子曰有以噎死者而禁天下之食有以車為敗者而禁天下之乗不亦悖哉廣五行記曰永徽中絳州有一僧病噎都不下食如此數年臨終命其子弟云吾氣絶之後便可開吾胷喉視有何物欲知其根夲言終而卒子弟依其言開視胷中得一物形似魚而有兩頭遍體悉是肉鱗子弟致鉢中跳躍不止戯以諸味致鉢中雖不見食須㬰悉化成水又以諸毒藥内之皆隨銷化時夏中炎熱寺衆於水次作淀有一僧住因以少淀致鉢中此蟲怖懼遶鉢馳走須㬰化成水世傳以淀水療噎煩懣方言曰朝鮮洌水之間煩懣}
