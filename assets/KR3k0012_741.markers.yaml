  - {type: variant, offset: 3655, length: 334, content: 闉跂支離無脤甕盎大癭典術曰服食天門冬治癭除百病傴僂禮記喪服四制曰傴者不袒穀梁傳成公曰曹公子手僂聘於齊齊使傴者御蕭同姪子處臺笑之孫卿子曰周公僂背莊子曰子輿病曲僂頤隱於臍肩高於頂淮南子曰木氣多僂疣贅說文曰疣贅也釋名曰疣丘也出皮上聚高如地之有丘也贅橫生一內著體梁書曰武帝丁嬪生而有赤誌體又多疣及帝納之無何並失莊子曰彼以生為附贅懸疣以死為決疣漬瘇癰夫若然者惡知死生先後之所在也太玄經曰割疣贅惡不得大山海經曰單孤之山滑水出焉中有滑魚狀如鱓其音如梧食之已疣又曰旄山有鱃魚狀如鱧食之者不疣瘤釋名曰瘤流也聚而生瘤腫也魏略曰晉景帝先苦瘤自割之會母丘儉反而瘤發及儉走竟以自終蔡謨表曰臣先有瘤腫在腰上十數年初無患苦忽自潰晉書曰趙王倫得異鳥問皆不知名宮西有素衣小兒言是服劉鳥倫使錄小兒并鳥置牢, SBCK: 指冰}
