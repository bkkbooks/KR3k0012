  - {type: variant, offset: 150, length: 146, content: 捕男子周慮藘素有名字與敏善過候敏敏坐繫免官出乃歎曰瘖聾之徒真世之有道者也何謂察察而遇斯禍也老子曰五音令人耳聾莊子曰耳之與形吾不知其異也而聾者不能自聞淮南子曰土地各以類生水氣多瘖風氣多聾說苑曰仲尼曰非其地而樹之不生非其人而語之不聽得其人如聚沙而雨之非其人若聚聾而鼓之抱朴子曰豹狐之裘不為負薪施九, WYG: 及檄草}
