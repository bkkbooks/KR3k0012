  body:
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 四頭痛心痛腹痛咽痛并噎煩懣勞悸眩暍頭痛毛詩伯􅀆曰願言思伯甘心首疾又小弁曰心之憂矣疢如疾首周官疾醫曰春時有痟首之疾史記曰西域有大小頭痛山赤􅁟身􅀬之坂令人頭痛歐吐風俗通曰田家老母市餅置道邊石人頭上旣而忘之人以爲神能治病轉以相語頭痛者磨石人頭腹痛者磨石人腹後餅母爲􅀃乃止心痛易􅀃曰冬至氣當至不至則多心痛左傳昭上曰醫和謂晉侯曰朋滛心疾北史曰裴訥之爲平原公開府墨曹掌書記從至井州其母在鄴忽得心痛訥之是日不勝思慕心亦驚痛乃請急而還當時以爲孝感唐書曰劉敦儒母有心痛疾日須鞭箠數人乃安子弟僕使不堪其苦唯敦儒侍養不解體常流血莊子曰西施病心而嚬其里醜人見而美之歸亦捧心而嚬其里之富人見之堅閉門而不出貧人見之挈妻子而走賈誼書曰楚惠王食寒菹中有水蛭雖欲發之恐宰夫得罪當死遂吞之因得心疾甚乃言所中令尹賀曰隂德必須陽報是夜惠王欬而蛭出心腹之病皆除俗􅀃曰阮光禄大兒喪哀過遂得病心服除後經年病瘳續捜神記曰李子豫少善醫方當代稱其通靈許永爲豫州刺史鎮歷陽其弟患心腹堅痛十餘年殆死忽自夜聞屏風後有􅀑謂腹中􅀑曰何不促殺之不然明日李子豫當從此過以赤丸打汝汝其死矣腹中􅀑對曰吾不畏之於是許永使人候子豫果來未入門病者自聞腹中呻吟聲及子豫入視曰􅀑病也遂於巾箱中岀八毒赤丸子與服須􅁷腹中雷鳴鼓轉大利數行遂差今八毒丸方是也幽明録曰顧長康在江陵愛一女子還家長康思之不巳乃􅀞作女形􅆪着壁上􅆪處正刺心女行十里忽心痛如刺不能進腹痛左傳宣下曰楚子伐蕭蕭潰還無社與司馬夘言號申叔展還無社蕭大夫司馬夘申叔展皆楚大夫也無社欲叛以求免死無社素識叔展故因夘使呼之曰有麥麴乎曰無有山鞠窮乎曰無麥麴鞠窮所以禦㬎河魚腹疾奈何言無禦濕藥將病曰目於眢井而拯之無社意解欲入井故使叔展視虚廢井而求拯左傳曰晉侯有疾􅁗醫云雨􅁋腹疾搜神記曰淮南書佐劉稚夢見青刺蜴從屋落其腹内因苦腹病華佗別傳曰有人病腹中切痛十餘日􅁂眉落佗令破腹視脾果半腐壞刮去惡以膏􅀓瘡飲之以藥百日平復事具醫門咽痛并噎易􅀃曰大寒氣當至而不至則多咽痛漢書曰昌邑王􅀍徴至長安左右令哭王曰吾嗌痛不肯哭魏志曰有人病咽塞􅄝食而不下華佗令取餅家䔉韲頓飲}
