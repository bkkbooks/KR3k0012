  - {type: variant, offset: 920, length: 642, content: 愛女妻之以問五官將曰女人觀貌而禮目不便誠恐愛女未必悅也以為不如與伏波子楙太祖從之尋辟儀為掾到與論議嘉其才明曰丁掾好士也即使其兩目盲當與女何況但眇乎沈約宋書曰景王嬰孩時有目疾宣王令華陀治之出眼瞳割去疾而內之以藥梁書曰鄱陽王恢有孝性初鎮蜀所生費太妃猶停都後於都不豫恢未之知一夜忽夢還侍疾及覺憂惶廢寢食俄而信至太妃已瘳後有目疾久廢視瞻有道人慧龍得療眼術恢請之及至空中忽見聖僧及慧龍下針豁然開目咸謂精神所致也又曰江紑甫鳩反字含潔幼有孝性年十三父蒨患眼紑侍疾將朞月衣不解帶夜夢一僧云患眼者飲慧眼水必差及覺說之莫能解者紑第三叔祿與草堂寺智者法師善往訪之智者曰無量壽經云慧眼見真蒨乃因智者荅捨同夏縣界牛屯里舍為寺乞賜嘉名勑荅云純臣孝子往往感應晉時顏含遂見冥中送藥近見智者以卿第二息云飲慧眼水慧眼則五眼之一號可以慧眼為名及就創造泄故井水清冽異於恒泉依夢中取水洗眼及煮藥稍覺有瘳因此遂差時人謂之孝感又曰元帝字世誠武帝第七子也初武帝夢眇目僧執香爐稱託生王宮既而采女石氏侍始褰戶慢有風廻裙梁武帝意感幸之乃生元帝賜采女姓曰阮進為脩容脩容常失珠謂是左右所盜乃炙魚目不知其珠孝元吞之信宿之間珠遂便出一目致眇魚之報焉南史曰梁湘東王於江東泛舟顧而言曰今可稱有樂功曹劉源曰帝子降兮北渚王作色曰當道目眇眇兮愁予耶坐者股慄酒遂不酣又邵陵王賦詩戲之曰湘東有一病非啞復非聾相思下隻淚望直有全功後魏書曰祖班以罪徙於光州別駕張奉禮希大臣意上言班雖為流囚常與刺史對坐勑報曰牢掌奉禮曰牢者地牢也乃為深坑置諸內夜中以蕪青子燭熏眼因此失明, SBCK: 亭歷犬血散立愈}
