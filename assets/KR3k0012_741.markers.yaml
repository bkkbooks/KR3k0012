  - {type: variant, offset: 1658, length: 1672, content: 死則大王那得復見瞎狗前石笑曰瞎狗不足污刀活之文子曰師曠瞽而為太師列子曰宋人有好行仁義者三世不懈家無故黑牛生白犢以問孔子孔子曰此吉祥也以薦上帝居一年其父無故而盲牛又復生白犢子又問孔子孔子曰吉祥也復教以祭居一年其子又盲其後楚攻宋圍城民易子而食折骸而炊丁壯皆乘城戰死者太半父子有疾皆免及圍解而盲疾俱復莊子曰連叔謂肩吾子曰夫瞽者不知文章之觀又曰目之與形吾不知其異也盲者不能自見又曰許由曰夫眇者無以與乎眉目顏色之好尹文子曰瞽者無目而耳不可以𥉻察視也精於聽也又曰聾者不歌無以自樂盲者不觀無以接物韓子曰寐則盲者不知覺而使之視則窮矣淮南子曰今夫盲者行於道遇君子則易道遇小人則陷於溝壑桓譚新論曰余為典樂大夫得樂家記言文帝時得魏文侯時樂人竇公年百八十歲兩目皆盲帝問其何服食至此對曰臣年十三失明父母教為樂鼓琴不導引不知壽得若何余以為竇公少盲專一內視故抱朴子曰魏武收左慈慈走入市吏傳言慈一目眇葛巾單衣於是一市皆然也又曰董君異以玉醴與盲人服之而愈世說曰顧愷畫殷荊州形殷不許顧曰明府正當嫌眼耳明點童子飛白拂上若輕雲之蔽月又曰桓南郡與殷荊州語次因作危言桓公曰矛頭浙米劍頭炊殷云百歲老公攀枯枝井上轆轤臥小兒殷有一參軍云盲人騎瞎馬臨深池殷曰咄咄逼人仲堪眇故也法顯記曰祗洹精舍西北四里有榛名曰得眼本有五百盲人依精舍住佛為說法盡還得眼盲人歡喜刺杖著地頭面作禮杖遂生長大世重之無敢伐者遂以得眼為名楚辭九章曰離婁微睇瞽以為無明蔡邕瞽師賦曰夫何矇昧坐瞽兮心窮忽以鬱伊目冥而無睹兮羗永煩以悲愁瘖啞釋名曰瘖唵也唵然無聲也漢書曰韓延壽待下吏恩施甚厚而約誓明或欺負之者延壽自刻責吏聞者自傷悔其縣尉至自刺死及門下掾自剄人救不死因瘖不能言延壽聞之對掾吏涕泣遣吏醫治又曰呂后斷戚夫人手足去眼董耳飲瘖藥吳書曰程普殺叛者數百人皆使投火即日病瘖百餘日卒文子曰皋陶瘖而為士師淮南子曰瘖者可使守圉不可使通語又曰夫人大怒破陰大喜墜陽滿氣發瘖驚怖為狂又曰水氣多瘖黃帝素問曰瘖者何病岐伯曰胞之絡脈何以言之胞絡繫於腎少陰脈實腎繫舌本故不能言續搜神記曰沛國一士人姓周生三兒向應可語便啞皆七八歲有一人經門過來乞問主人此是何聲云是僕兒頻生三子皆啞不能語客曰君冥罪還內省我於外待君主人異其言知非常人便入內思良久而出謂客曰昔為小兒時當床上有鷰巢中有三子其母從外食哺子子輒出頭作聲受之積日如此時屋下攀得及巢試以指內巢中鷰子亦出口承之乃取三蒺梨各與其子吞之既死其母尋還不復見其子出戶徘徊悲鳴而去有此事今甚悔之客曰是矣便問其三兒言語周正異苑曰高惠清隆安中為太傅主簿忽晝日有群鼠更相衘尾自屋梁相連至地清尋得瘖疾數日而亡靈驗記曰王導河內人也兄弟三人並得時疾其宅有鵲巢旦夕翔鳴聞其諠噪俱惡之念云差當治此鳥既差果張取鵲斷舌而殺之兄弟悉得啞疾吃說文曰吃言語難也方言云𧮈極吃也或謂之軋或謂之嬰郭璞曰軋穀氣不利也江東名吃為嘆也漢書曰魯恭王餘口吃難言又曰馬相如吃而善著書又曰揚雄為人簡易口不能劇談劇甚也一說劇遽疾言也言吃不能疾言也鄭玄自序曰趙商子字子聲河內溫人愽學有秀才能講難而吃不能劇談管子曰吾畏事不敢為事畏言不敢為言故行年六十如老吃耳新序曰周昌者沛人以軍功封汾陰侯御史大夫高帝欲廢惠帝立戚夫人子如意群臣固爭莫能得昌廷爭之強上問其說昌為人吃曰臣口不能言然臣則知其不可也陛下雖欲廢太子臣期期不奉詔世說曰魏明帝口吃少言而內明斷世說曰鄧艾口吃語稱艾艾晉文王戲之曰艾艾為是幾艾鄧荅曰鳳兮鳳兮故是一鳳禿禮記曰禿者不免穀梁傳曰魯季孫行父禿聘于齊齊使禿者御音迓蔡邕獨斷曰古幘無巾如今半幘而已王莽乃始施巾故語曰王頭禿幘㡛施屋秦書曰符堅徵隱士張臣和至長安堅賜以衣冠和辭曰年老頭禿不可加冠野服而入既見求歸矣齆釋名曰鼻塞曰齆晉書曰謝安字安石本能為洛下書生詠有鼻疾故其音濁名流愛其詠而不能及或手掩鼻以斅之也崔鴻春秋後趙錄曰王謨字思賢齆鼻言不清暢尫短無威儀將拜曲陽令石勒疑之長史曰請試之政教嚴明百城尤最幽明錄曰晉司空桓豁在荊州有參軍教鸜鵒令語遂無所不名當大會令効人語有一人齆鼻語難學因以頭內甕中以効焉齲齒釋名曰齲朽也蟲齧之齒缺朽也續漢書曰桓帝元嘉中京師婦女作齲齒笑齲齒笑者齒痛, SBCK: ''}
