  - {type: variant, offset: 8, length: 1, content: 聾, SBCK: 單張之山有鳥曰鴉食之巳嗌郭曰嗌咽也戰國䇿曰噎而後穿井何及於急續漢書禮儀志曰三老五更仲秋之月賜以玉杖端以鳩爲飾鳩者不噎之鳥欲老人不噎也晏子曰夫愚人多悔不肖者自賢猶臨難而遽鑄兵臨噎而遽掘井雖速}
  - {type: variant, offset: 8, length: 1, content: 聾, WYG: 單張之山有鳥曰雅食之已嗌戰國䇿曰噎而後穿井何及於急續漢書禮儀志曰三老五更仲秋之月賜以玉杖端以鳩為飾鳩者不噎之鳥欲老人不噎也晏子曰夫愚人多悔不肖者自賢猶臨難而遽鑄兵臨噎而遽掘井雖速}
