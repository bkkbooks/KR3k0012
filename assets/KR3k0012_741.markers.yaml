  - {type: variant, offset: 3990, length: 290, content: 明旦開視並失所在倫目上有瘤時以為祅焉沈約宋書曰朱齡石舅頭有大瘤齡石伺舅眠密往割之舅即死列女傳曰齊宿瘤者東郭採桑之女項有大瘤故以名焉閔王出而女採桑如故王召問之對曰受之父母教採桑不教觀王王曰此奇女也內以為后女死後燕遂屠齊跛躄方言曰自關西秦晉之間凡蹇謂之逴勑略反周易歸妹初九曰歸妹以娣跛能履禮記喪服四制曰跛者不踊身有痼疾不可備禮也左傳宣公下曰晉侯使郄克會于齊傾公帷婦人使觀之郄子登婦人笑於房跛而登故笑之又穀梁傳成公曰衛孫良夫跛郄克眇聘於齊齊使跛者御跛蕭同叔子處臺笑之春秋後語曰秦攻趙急求救於齊齊王曰必長安君為質長安君者太后之小子也太后愛之不肯遣大臣強諫太后怒左師觸龍請見太后曰老臣病足曾, SBCK: ''}
