  - {type: variant, offset: 355, length: 1515, content: 巧禮記曲禮上曰侍食於長者主人親饋則拜而食主人不親饋則不拜而食共食不飽無流歠鄭玄注曰流歠有似貪也無咤食咤陟嫁切毋囓骨毋反魚肉毋投與狗骨毋固獲飲自得曰固爭自取曰獲毋刺齒又曰凡進食之禮左殽右胾食居人之左羹居人之右皆便食也殽骨體也胾切肉也食飯屬也居之左右明其近也殽在俎胾在豆膾炙處外醯醬處內殽胾之外內也近醯醬者食之主膾炙皆在豆也葱㳿處末㳿烝葱也處醯醬之左言末者殊加也在豆酒醬處右處羹之右此言若酒若漿耳兩有之則左酒右醬也以脯脩置者左朐右末亦便食也屈中曰俱其俱切又曰齊大飢黔敖為食於路以待餓者而食之有餓者蒙袂輯屨貿貿然來黔敖左奉食右執飲曰嗟來食揚其目而視曰子唯不食嗟來之食以至於斯也從而謝之終不食而死風俗通曰齊人不食而死也又曰食於有喪者之側未嘗飽也助哀戚也又曰庶人春薦韭夏薦麥秋薦黍冬薦稻韭以卯麥以魚黍以豚稻以鴈庶人無常牲取與新物相宜而已又曰文王之為太子朝於王季日三食上必在視寒煖之節在察也食下問所膳問所食者命上宰曰未有原應曰諾然後退未猶物也原再也勿有所再進為其失飪臭味惡也退久其寢也又曰朝夕之食上世子必在視寒煖之節食下問所膳羞必知所進以命膳宰然後退羞必所進必知親所食也若內豎言疾則世子親齊玄而養親猶自也養疾者齊玄冠玄端也膳宰之饌必敬視之疾者之食齊和所欲或異疾之藥必親嘗之試毒也嘗饌善則世子亦能食善謂多於前嘗饌寡世子亦不能飽又不及武王一飯再飯又曰古者未有火化食草木之實鳥獸之肉飲其血茹其毛後聖有作然後修火之利以炮以燔以烹以炙以為醴酪又曰夫禮之初始諸飲食其燔黍捭豚捭卜麥切汙尊而杯飲汙鳥莘切杯步侯切蕢桴而土鼓蕢苦對切猶若可以致其敬於鬼神言其物雖質略有齊敬之心則可以薦羞於鬼神鬼饗德不饗味也又曰天子一食諸侯再大夫三又曰不食雛鼈狼去膓狗去腎狸去正脊兔去凥狐去首豚去腦魚去乙鼈去醜皆為不利人也又曰膳目諸膳也膷臐曉膷音香臐許云切曉許堯切牛炙醢牛胾醢牛膾羊炙胾醢豕炙醢豕胾芥醬魚膾雉兔鶉鷃此上大夫之禮庶羞二十豆也以公食大夫禮饌校之則曉牛炙間不得有醢醢衍字也又以鷃為鴽也玉藻曰侍食於先生異爵者後察先飯謙也客祭主人辭曰不足祭也祭者盛食人饌也客飡主人辭以䟽飱者之言麤也又曰父命呼唯而不諾手執業則投之食在口則吐之又曰若賜之食而君客之則命之祭然後祭雖見賓客猶不敢備禮也侍食則正不祭也先飯辨嘗羞飲而俟侯君食而後食之患也將食臣先嘗孝也若有嘗羞者則俟君命之食然後食飯飲而俟不祭侍食不嘗羞膳敢備禮也不飯飲利寧存也將食也君命之羞羞近者辟貪味也命之品嘗之然後唯所欲必先編嘗之凡嘗遠食必順近食從近如也君未覆手不敢飧覆手食也以循咡已飧勸食也君既食又飯飧不敢先君飽飯飧者三飯也臣勸君奴如是可食也君既徹執飯與醬乃出授從者食於尊前親徹也凡侑食不盡食於人不飽謙也又學記曰雖有嘉肴弗食不知其旨也雖有至道弗學不知其善也旨美也又雜記曰孔子曰吾食於少施氏而飽少施氏食我以禮言貴其以禮待己而為之飽也時人倨慢若季氏則不以禮矣少施氏魯惠公子施父之後吾祭作而辭曰䟽食不足祭也吾飧作而辭曰䟽食也不敢以傷吾子納幣一束束五兩兩五尋又坊記曰故食禮主人親饋則客不祭故君親饋則客不祭故君子茍無禮雖美不食焉左傳曰晉公子重耳過衛衛文公不禮焉出於五鹿五鹿鄖地乞食於野人與之塊公子怒欲鞭之子犯曰天賜也得士有天賜稽首受而載之又曰楚伐庸出師旬有五日百濮乃罷濮夷無屯聚見難則散歸自廬以往振廩同食往往伐庸也振發也廩倉也同食上下無異饌也又曰初宣子田於首山舍于翳桑田獵也桑桑之多蔭翳者首山在河東浦板縣東南見靈輒餓問其病曰不食三日矣食之舍其半問之曰官三年矣官學也未知母之存否今近焉去家近請以遺之使盡之而為之簞食與肉簞笥也寘諸橐以與之既而與為公介靈輒為公甲士倒戟以禦公徒而免之問其故對曰翳桑之餓人也問其名居問所居不告不退不望報也遂自亡也輒亦, SBCK: ''}
