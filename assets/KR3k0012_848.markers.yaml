  - {type: variant, offset: 3333, length: 3, content: 鮑宣上, SBCK: 元欽曽託青州人髙僧壽爲子求師師至未幾逃去欽以讓僧壽僧夀性滑稽乃謂欽曰凢人絶粒七日乃死始終五朝便尓逃遁去食就信實有所闕欽乃大慙於是待客稍厚又曰崔敬友恭寛接下循身勵節自景明巳降頻歳不登飢寒請匄者取足而去又置逆旅於蕭然山南大路之北設食以供行者又曰刁少雍字季仲少聦頴有孝行尤爲祖父紹先所愛紹先性􅄝羊肝常呼少雍共食及紹先卒少雍終身不食肝北齊}
