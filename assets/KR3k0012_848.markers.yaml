  - {type: variant, offset: 6, length: 1, content: 周, SBCK: 將行勑諸子且勿食至㑹所賜饌曰旰食不至有飢色上誡之曰汝曹少長豊佚不見百姓艱難今使爾識飢苦又曰文帝以謝弘微能膳羞毎就求食弘微與親舊經營乃進之後親人問上所御弘微不荅別以餘語酬之時人比之漢丗孔光又曰謝弘微兄曜卒弘微哀戚過}
