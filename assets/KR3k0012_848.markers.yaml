  - {type: variant, offset: 118, length: 236, content: 玉犀也又天官食醫曰掌和王之六膳百羞百醬八珍之齊凡食齊眡春時飲宜溫羹齊眡夏時羹宜熱醬齊眡秋時醬宜涼飲齊眡冬時飲宜寒凡和春多酸夏多苦秋多辛冬多鹹調以滑甘凡會膳食之宜牛宜稌羊宜黍豕宜稷犬宜梁鳥宜麥魚宜苽凡君子之食恒放焉又曰內饔掌王及后世子膳羞之割烹煎和之事辨體名肉物辨百品味之物割肆解由也烹煮也煎和成數選百羞醬物珍物以侯饋先進其中御者共后及世子之膳羞膳夫掌之又曰小宰凡朝覲會同賓客以牢禮之法掌其牢禮委積膳獻飲食賓賜之飡牽與其陳數又曰大宗伯以飲食之禮親宗族兄弟大戴禮曰食穀者必智惠, SBCK: 盡歡}
