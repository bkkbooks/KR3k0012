  - {type: variant, offset: 3056, length: 5, content: 東方朔詔賜, WYG: 盧彪為太子詹事魏收常來詣之訪以洛京舊事不待食而起云難為子費彪固留之良乆食至但有粟同葵菜木碗盛之片脯而已所待侍從亦盡設食一與此皆同又曰楊愔幼時為季父暐大嗟異顧謂賔客曰此兒恬裕有我家風宅内有茂竹遂為愔於林邉别葺一室命獨處其中常同盤具盛饌以飯之因以督勵諸子曰汝輩但如遵彦謹慎自得竹林别室同盤重肉}
