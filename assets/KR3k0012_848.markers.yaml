  - {type: variant, offset: 2837, length: 3, content: 齊必變, SBCK: 孔休源到都寓於宗人少府孔登㑹以祠事入廟侍中范雲一與相遇深加褒賞曰不期忽覯清風頓祛鄙􅈔觀天披霧驗之今日後雲命駕到少府登便拂筵整席謂當詣巳備水陸之品雲駐筋命休源及至取其常膳正有赤倉米飯蒸䱒音醃魚雲}
