  - {type: variant, offset: 3618, length: 1, content: 既, SBCK: 殷勤敦譬方漸順旨由是髙祖食必喚叡同案其見愍惜如此又曰文宣昬逸常山王演固諫大􅀍歐撻閉口不食太后極憂之常謂左右曰儻小兒死柰我老母何於是毎問王疾謂曰努力強食當以王晞還汝乃釋晞令往王抱晞曰吾氣息惙然恐不能相見晞流涕曰天道神明豈令殿下遂斃此舎至尊親爲人兄尊爲人主安可與計殿下不食太后亦不食殿下縱不自惜不惜太后乎言未卒王強坐而飯晞由是得免遂還爲王友又曰楊休之除中山太守先是韋道建宋欽道代爲定州長史帶中山太守並立制禮之宫出行不得過百姓飲食有者即數錢酬之休之常以爲非及至郡復相因循或問其故休之曰吾昔非之者爲其失仁義今日行之者自欲避嫌疑豈是夙心直是}
