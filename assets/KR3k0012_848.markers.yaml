  - {type: variant, offset: 3043, length: 0, content: '', WYG: 本石家諸王故第今王修之鳯因言曰今王之膳菓肴百品而外有糟糠之民非是小兒所可同大王之味也桓彌加歎賞又南燕録曰濟南尹鸞身長九尺腰帶十圍貫甲跨馬}
  - {type: page-break, offset: 3043, content: '', id: KR3k0012_WYG_848-9b, image: WYG0900/WYG0900-0485d.png}
  - {type: variant, offset: 3043, length: 0, content: '', krp: 夲石家諸王故第今王脩之室無常人何煩過好桓大竒之毎食必與之同案鳯辭日今王之膳兼肴百品而外有糟糠之民非是小兒所可同大王之味也桓彌加歎賞又南燕録曰濟南尹鸞身長九尺腰帯十圍貫甲跨馬}
  - {type: variant, offset: 3044, length: 2, content: 足君, WYG: 據鞍蹬慕容德見而竒其魁偉賜之以食一進斛餘德驚曰}
  - {type: variant, offset: 3044, length: 16, content: 足君所食乎條侯免冠謝又曰東方朔詔, krp: 據鞍由蹬慕容德見而竒其魁偉}
  - {type: variant, offset: 3047, length: 0, content: '', WYG: 噉如此非耕能飽且才貌不凡堪為貴人可以一縣試之於是拜逢陵長政理脩明大收民譽燕録曰少帝建熈六年上谷人公孫凡乆隠昌黎之域冬衣單布寝土牀上夏則併飡茹於一器停使蛆臭然後乃}
  - {type: page-break, offset: 3047, content: '', id: KR3k0012_WYG_848-10a, image: WYG0900/WYG0900-0486a.png}
  - {type: variant, offset: 3048, length: 5, content: 乎條侯免冠, WYG: 人咸異之莫能測也後魏書曰裴安祖年八九嵗就師講至鹿鳴篇語諸兄云鹿得食相呼而况人也自此未曽獨食又曰髙閭嘗造胡叟家遇叟短褐曳柴從田歸舎為閭設酒食皆自手辦案其舘宇卑陋圍墻褊局而飯菜精潔醢醬調羮見其妾並哀跛𦕈衣布穿敝閭見其貧以衣物直十餘疋贈之亦無辭}
