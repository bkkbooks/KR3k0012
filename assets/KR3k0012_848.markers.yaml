  - {type: variant, offset: 108, length: 81, content: 精御水氣也鄭司農云食玉犀也又天官食醫曰掌和王之六膳百羞百醬八珍之齊凡食齊眡春時飲宜溫羹齊眡夏時羹宜熱醬齊眡秋時醬宜涼飲齊眡冬時飲宜寒凡和春多酸夏多苦秋多辛冬多鹹調, WYG: 甚厚不}
