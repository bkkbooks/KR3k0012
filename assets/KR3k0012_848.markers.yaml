  - {type: variant, offset: 1939, length: 286, content: 待之食使者使者豹之介而後食言其忠也又曰晉侯合諸侯楊干亂行魏綘戮其僕晉侯以綘為能以刑佐民矣反役與之禮食使佐新軍群臣族會禮食也又曰衛獻公戒孫文子甯惠子食勸戒二子欲共讌食皆服而朝日旰不召而射鴻於囿二子從之不釋皮冠而與之言二子怒又曰魏獻子為政以魏戊為梗楊大夫梗楊人有獄魏戊不能斷以獄上上魏子也其太宗賂以女樂訟者大宗魏子將受之戊謂閻沒汝寬二人魏子大夫曰主以不賄聞於諸侯若受梗楊人賄莫甚焉吾子必諫皆許諾退朝待於廷魏子朝君退而待於魏子之庭饋入召之召大失食比置三歎既食使坐魏子曰吾聞諸伯叔諺曰唯食忘憂吾子置食之間三歎何也同辭而對曰或賜二小人酒不夕食或他人也言飢也饋之始至恐其不足是以歎中置, SBCK: 樵採}
