  body:
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 六食中王隠晉書曰何曽食日近萬錢猶曰無下箸處子劭驕奢簡貴有父風衣裘服翫新故巨積食必盡四方珍異一日之供以二萬爲限時論以爲太常御膳無以加之又曰皇甫謐姑子梁栁爲城陽太守或􅂆謐送謐曰栁爲布衣過吾送迎不出門食不過塩菜貧不以酒肉爲禮也今作郡而送豈古人之道哉晉書曰王導子恱疾篤導憂念特至不食積日忽見一人形狀甚偉􅀍甲持刀導問君是何人曰僕是蔣侯也公児不佳欲爲請命故來耳公勿復憂因求食遂噉數斗食畢勃然謂導曰中書患非可救者言訖不見恱亦殞絶又曰衛將軍謝安欲詣陸納納兄子俶怪納無辦乃宻作數十人饌安至納設菜菓而俶下精飲食納怒客去杖俶四十又曰郄鑒字道徴永嘉亂在卿里窮餒郷人以鑒名徳傳共餉之時兄子邁外生周翼並小常携之就食郷人曰恐不兼有所存鑒乃獨徃食訖飯着兩頰邊􅍭還與二児後並得存同過江邁位至護軍翼爲剡令鑒薨追撫育之恩解職而歸席苫心䘮三年又曰􅁃衮父亡作筥賣以養母母見其勤曰我無所食對曰母食不甘衮將何居母感而安之宋書曰謝景仁爲桓玄驍􅀐將軍時宋武帝爲桓循撫事軍中兵叅軍甞詣景仁諮事景仁與語恱因留帝食食未辨而景仁爲玄所召玄累促俄頃間􅀐詔績至帝屢求去景仁不許曰主上見待要應有方我欲與客食豈不得待竟安飽食然後應召帝甚感之又曰謝景仁愛弟音酣而憎弟述甞設饌請宋武帝希帝命豫坐而帝召述述知非景仁夙意又慮非帝命之請急不從帝馳遣呼述湏至乃飡其見重如此及景仁疾􅄒盡心視湯藥飲食必甞而後進衣不解帶不盥櫛者累旬景仁􅀷感愧焉又曰劉穆之少時家貧誕節􅄝酒食不修抅撿好徃妻兄弟乞食多見辱不以為耻其妻江嗣女甚明識每禁不令徃江氏後有慶㑹嘱勿來穆之猶徃食畢求㯽榔江氏兄弟戯之曰㯽榔消食君乃常飢何忽湏此妻復截髮市肴饌爲其兄弟以餉穆之自此不對穆之梳沐後穆之䆠逹而性更奢豪食必方丈且輙爲十人饌未甞獨飡每至食不過}
