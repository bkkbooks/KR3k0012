  - {type: variant, offset: 4050, length: 389, content: 已魏志曰典韋好酒食飲啖兼人每賜食於前大飲長歠左右相屬人益乃供太祖壯之又曰漢末中常侍唐衡弟為京兆虎牙都尉入謁尹尹欲修主人勑外為市買功曹趙息啟云左悺子弟來為虎牙非德選不足為持酤買宜隨中舍菜食而已魏志曰文帝為太后弟康起第成太后至第請諸家外親設下廚無異膳太后左右菜食粟飯無魚肉其儉約如此也又曰扈累者嘉平中年八十九歲若六七十者縣官以孤老日給廩五升五升不足食頗行傭作以裨之糧盡復出人與不敢食不求美衣弊縕故後一二年病亡又曰諸葛亮出斜谷與司馬宣王對壘宣王見亮使唯問其寢食及其事之繁簡戎事使對曰諸葛公夙興夜寐二十罰已上皆親覽焉所啖食不至數升宣王曰亮體斃矣其能久乎又曰沐並字德信河間人也少孤苦袁紹父子時始為吏名有志介嘗過姊為殺鷄炊黍而不留也正始中為三府長史時吳使朱然諸葛瑾攻圍樊城遣舡兵於峴山東斫材牂牁人兵作食有先熟者呼後熟者言其食來後熟者荅言不也呼者曰欲作沐德信耶其名流布播於異域如此雖自華夏不知, SBCK: 止議}
