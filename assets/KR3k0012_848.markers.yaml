  - {type: variant, offset: 2863, length: 1, content: 語, SBCK: 過乾魚數片而巳又曰何裔侈於味食必方丈後稍去其甚者猶食白魚䱉脯糖蟹以爲非見生物疑食蚶蠣使門人議之學生鍾玩曰䱉之就脯但驟於屈申蟹之將糖躁擾弥甚仁人用意深懷如怛至於車螯蚶蠣眉目内闕慙渾沌之􅀉獷殻外緘非金人之慎不悴不榮曽草木之不􅀂無香無臭與瓦礫其何筭故冝長充庖厨永爲口實陳書曰徐孝克爲國子􅀕酒毎侍宴無所食噉至席散當其前膳羞損减帝宻記以問中書舎人管斌斌自是伺之見孝克取珎菓内紳帶中斌當時莫識其意後㝷訪方知其以遺母斌以啓宣帝嗟嘆良乆乃勑自今宴享孝克前饌並遣將還以餉其母時論美之崔鴻後趙録曰石虎召姚弋仲弋仲輕􅀐至鄴引入領軍省賜以御食仲怒曰國家有賊召我擊之官當見我問方畧以破賊而食我我來覔食耶乃引見又後燕録曰王鳯字道翔冝都王桓之子也桓好脩宫室鳯年八歳左右枹之隨桓周行殿觀桓問之曰此苐好不鳯􅀏曰此夲石家諸王故第今王脩之室無常人何煩過好桓大竒之毎食必與之同案鳯辭日今王之膳兼肴百品而外有糟糠之民非是小兒所可同大王之味也桓彌加歎賞又南燕録曰濟南尹鸞身長九尺腰帯十圍貫甲跨馬不據鞍由蹬慕容德見而竒其魁偉賜之以食一進斛餘德驚曰所噉如此非耕能飽且才皃不凢堪爲貴人可以一縣試之於是拜逢陵長政理脩明大􅀵民譽燕書曰少帝建熈六年上谷人公孫几乆隱昌􅀺之域冬衣單布}
