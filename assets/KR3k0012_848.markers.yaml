  - {type: variant, offset: 4441, length: 182, content: 為前世人江表傳曰南陽樊伷為武昌部從事誘導諸夷叛屬劉備孫權召問潘濬濬曰以五千兵往吳擒矣權曰卿何以輕之濬曰伷昔為州人設饌比至日中食不可得而十餘自起此亦侏儒觀一節之驗權即遣將五千兵往果平武昌吳志曰步騭字子山世亂避難江東單身窮困與廣陵衛旌同年相善俱以種爪自給晝勤四體夜誦經傳會稽焦征羗郡之豪族人客放縱騭與旌寄食其地懼為所侵乃共修刺奉瓜以奏征羗方內臥駐之移時旌欲去騭止之曰本, SBCK: 爲厚禄重賜}
