  - {type: variant, offset: 2982, length: 2, content: 丈夫, WYG: 國家有賊召我撃之官當見我問方畧以破賊而食我我來覔食耶乃引見後燕録曰慕容鳯字道翔宜都王桓之子桓好修宫室鳯年八嵗左右抱之隨桓周行殿觀桓問之曰此第好}
  - {type: variant, offset: 2982, length: 2, content: 丈夫, krp: 國家有賊召我擊之官當見我問方畧以破賊而食我我來覔食耶乃引見又後燕録曰王鳯字道翔冝都王桓之子也桓好脩宫室鳯年八歳左右枹之隨桓周行殿觀桓問之曰此苐好}
  - {type: variant, offset: 2985, length: 55, content: 能自食吾哀王孫而進食豈望報乎又曰景帝居禁中召條侯周亞夫賜食獨置大胾無切肉又不置箸條侯心不平顧謂尚席取著景帝視而, WYG: 鳯}
