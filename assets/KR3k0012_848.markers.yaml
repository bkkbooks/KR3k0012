  - {type: variant, offset: 94, length: 5, content: 齊則玉府供, WYG: 義真居武帝憂使帳下備膳劉湛禁之義真乃使左右人買魚肉珍羞于齋内别立厨帳㑹湛入因命㬉酒炙車螯湛正色曰公當今日不宜有此設義真曰寒甚杯酒亦何傷長史事同一家望不為議酒至湛起曰既不能以禮自處又不能以禮處人又曰江夏王義恭㓜為武帝所鍾愛帝性儉諸子飲食不過五盞盤義恭須求果食日中無筭得未嘗噉急以與傍人諸王未嘗敢求求亦不得又曰文帝宴於武帳堂上帳行勅諸子且勿食至㑹所賜饌日旰食不至有饑色上誡之曰汝曹少長豐佚不見百姓艱難今使爾識有饑之苦又曰文帝以謝𢎞㣲能膳羞每就求食𢎞㣲與親舊經營乃進之後親人問上所御𢎞㣲不答别以餘語酧之時人比之漢世孔光又曰謝𢎞㣲兄曜卒𢎞㣲哀戚過禮服雖除猶不噉魚肉沙門釋惠琳嘗與之食見其猶蔬素謂曰檀越素既多病即吉猶未復膳若以無益傷生豈所望於得理𢎞㣲疾曰衣冠之變禮不可踰在心之哀實未能已遂廢食歔欷不自勝又曰前廢帝常以木槽盛飯内坑中諸雜食攪令和合掘地為坑穽實之以泥水倮明帝内坑中以槽食置前令以口就槽中食之用為歡笑又曰宗慤累遷豫州刺史監五州諸軍事先是鄉人庾業家富豪侈侯服}
