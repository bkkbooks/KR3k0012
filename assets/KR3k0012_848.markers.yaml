  - {type: 'tls:seg', offset: 21, content: '', id: KR3k0012_CHANT_848-1a.5}
  - {type: variant, offset: 22, length: 0, content: '', SBCK: 無益傷生豈所望於得理弘微曰衣冠之變禮不可踰在心之哀寶未能巳遂廢食歔欷不自勝又曰前廢帝常以木槽盛飯内諸􅄂食攪令和合掘地爲坑穽實之以泥水以糟食置前令以口就槽中食之用爲歡􅀏又曰宗慤累遷豫州刺史監五州諸軍事先是郷人􅁃業家冨豪侈侯服玉食與賔客相對膳必方丈而爲慤設粟飯菜爼謂客曰宗上軍串古患切噉麄食慤致飽而退􅀄無異辭至是業爲慤長史帶梁郡慤待之甚厚不以昔事爲嫌又曰沈攸之戰敗與第二子文和至華容之魽頭村投州吏家此吏甞爲攸之所鞭待攸之甚厚不以徃罰爲怨殺豚薦食旣而村人欲取攸之於櫟林與文和俱自經死又曰􅀽􅉖孫爲吏部郎孝建元年文帝詔曰羣臣並於中興寺八􅀜齊中食竟􅉖孫別與黄門郎張淹更進魚􅁏食尚書令何尚之奉法素謹宻以白孝武孝武使御史中丞王謙之糾奏並免官又曰阮佃夫奢侈中書舎人劉休甞詣之遇佃夫出行中路相逢要休同返就席便命施設一時珎肴莫不畢備凢諸火齊並皆始熟肴胾數十種佃夫常作數十人饌以待賔客故造次便辨􅀋皆如此雖晉丗王石不能過也又曰郭原平}
  - {type: page-break, offset: 22, content: '', id: KR3k0012_SBCK_848-3a}
  - {type: page-break, offset: 22, content: '', id: KR3k0012_SBCK_848-3b}
  - {type: variant, offset: 22, length: 0, content: '', krp: 無益傷生豈所望於得理弘微曰衣冠之變禮不可踰在心之哀寶未能巳遂廢食歔欷不自勝又曰前廢帝常以木槽盛飯内諸雜食攪令和合掘地爲坑穽實之以泥水以糟食置前令以口就槽中食之用爲歡笑又曰宗慤累遷豫州刺史監五州諸軍事先是郷人庾業家冨豪侈侯服玉食與賔客相對膳必方丈而爲慤設粟飯菜爼謂客曰宗上軍串古患切噉麄食慤致飽而退𥘉無異辭至是業爲慤長史帶梁郡慤待之甚厚不以昔事爲嫌又曰沈攸之戰敗與第二子文和至華容之魽頭村投州吏家此吏甞爲攸之所鞭待攸之甚厚不以徃罰爲怨殺豚薦食旣而村人欲取攸之於櫟林與文和俱自經死又曰袁愍孫爲吏部郎孝建元年文帝詔曰羣臣並於中興寺八關齊中食竟愍孫別與黄門郎張淹更進魚肉食尚書令何尚之奉法素謹宻以白孝武孝武使御史中丞王謙之糾奏並免官又曰阮佃夫奢侈中書舎人劉休甞詣之遇佃夫出行中路相逢要休同返就席便命施設一時珎肴莫不畢備凢諸火齊並皆始熟肴胾數十種佃夫常作數十人饌以待賔客故造次便辨類皆如此雖晉丗王石不能過也又曰郭原平}
  - {type: variant, offset: 23, length: 0, content: '', SBCK: 親必以巳力傭賃以給供養主人設食原平以家貧父母不辦有肴味唯飡塩飯而巳􅀂家或無食則虚中竟日義不獨飽湏日暮作畢受直歸家於里糴買然後舉㸑齊書曰陳顯達髙帝即位拜護將軍後御膳不宰牲顯逹上熊蒸一盤上即以充飯又曰武帝收沙門寳誌在獄中語獄吏曰門外有兩輿食金鉢盛飯汝可取之果是文惠太子及竟陵}
  - {type: page-break, offset: 23, content: '', id: KR3k0012_SBCK_848-4a}
  - {type: variant, offset: 23, length: 0, content: '', WYG: 母母見其勤曰我無所食對曰母食不甘衮将何居母感而安之宋書曰謝景仁為桓𤣥驍騎將軍時宋武帝為桓修撫軍中兵叅軍嘗詣景仁諮事景仁與語悦因留帝食食未辦而景仁為𤣥所召𤣥累促俄傾間騎詔續至帝屢求去景仁不許曰主上見待要應有方我欲與客食豈不得待安坐飽食然後應詔帝甚感之又曰謝景仁愛弟甝而憎弟述嘗設饌請宋武帝希帝命命甝預坐而帝召述述知非景仁夙意又慮非帝命之請急不從帝馳遣呼述須至乃飡其見重如此及景仁疾述盡心視湯藥飲食必嘗而後退衣不解帶不盥櫛者累旬景仁深感愧焉又曰劉穆之少時家貧誕節嗜酒食不脩拘檢好往妻兄弟乞食多見辱不以為恥其妻江嗣女甚明識每禁不令往江氏後有慶㑹囑勿來穆之猶往食畢求㯽榔江氏兄弟戲之曰㯽榔消食君乃常饑何忽須此妻復截髮市肴饌為其兄弟以餉穆之自此不對穆之梳沐後穆之宦逹而更性奢豪食必方丈且輙為十人饌未嘗獨飡每至食時客止十人已還帳下依嘗下食以此為常常白帝曰穆之家本貧賤贍生多闕叨忝已來雖存損約而朝夕所須㣲為過豐此外無一毫負公又曰}
