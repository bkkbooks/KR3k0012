  - {type: variant, offset: 2986, length: 218, content: 自食吾哀王孫而進食豈望報乎又曰景帝居禁中召條侯周亞夫賜食獨置大胾無切肉又不置箸條侯心不平顧謂尚席取著景帝視而笑曰此不足君所食乎條侯免冠謝又曰東方朔詔賜之食於前飯已盡懷其餘肉持去衣盡汙古史考曰始有燔炙人褁肉燒之曰炮故食取名焉及神農時民食穀釋米加于燒石之上而食及黃帝始有釜甑火食之道成戰國策曰蘇秦之楚三月迺得見王談卒辭行楚王曰先王不遠千里而臨寡人曾弗肯留願聞其說對曰楚國食貴於玉薪貴於桂謁者難見於鬼王難見於帝今令臣食玉炊桂因鬼見帝其可得乎漢, SBCK: 測也後魏}
