  - {type: variant, offset: 2278, length: 553, content: 獻子辭梗楊人又曰叔孫穆子食慶封慶封汜祭有余示有所先也汜祭遠散所祭不共穆子不說使工為之誦芧鴟工樂師芧鴟逸詩刺不敬亦不知又曰晉悼夫人食與人之城祀者與眾也城祀在往年綘縣人或年長矣無子而往與於食又曰華亥與其妻必盥而食所質公子者後食公與夫人每日必適華氏食公子而後歸又曰昔闔廬在國天有菑厲親巡孤寡而共其乏困在軍熟食者分而後敢食必須軍士皆分熟食不敢先食分猶編也其所嘗者卒乘與焉所嘗甘珍非常食又曰衛侯為虎幄於藉圃於藉田之圃新造幄幕皆以虎獸為飾成求令名者而與之始食焉太子請使良夫以良夫應為令名良夫乘衷甸兩壯衷甸一轅鄉車紫衣狐裘紫衣君服至袒喪不釋劍而食食而熱故偏袒亦不敬太子使牽以退數之以三罪而殺之又曰左師每食擊鍾聞鍾聲公曰夫子將食詩曰民之失德乾餱以餱食也箋云德言過乎又曰民之質矣日用飲食質成又生民曰克岐克嶷以就口食韓詩外傳曰子夏過曾子食之子夏曰不為公費乎曾子曰有三費飲食不在其中少而學長而忘之一費事君而輕負久交中絕三費舜典曰咨十有二牧曰食哉惟時王肅注曰食哉者所以重之民又洪範曰八政一曰食又曰惟辟玉食孔安國曰玉食美食周書曰甘食美衣使長貧尚書大傳曰八政何以先食食者萬物之始人之所本者也易曰雲上於天需君子以飲食讌樂需飲食之道也九五需于酒食貞吉又曰噬嗑食也頤中有物曰噬嗑又曰山下有雷頤君子慎言語節飲食論語曰一簞食一瓢飲人不堪其憂回也, SBCK: 恒}
