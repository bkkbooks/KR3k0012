  - {type: variant, offset: 1361, length: 331, content: 及於近郊賊皆歇鞍解甲元適攻之而所將人吏無甲反為所敗從者皆走還元適猶與戰遂為所執縛之於樹將加屠戮從直聞之遂跣至父所不懼鋒刃以身蔽父群賊集矢射之身如蝟毛又中數十刃體無完處從直死之而州兵大至父乃免國史補曰杜羔有至性其父為河北一尉而卒母非嫡經亂不知所之羔常抱終身之戚會兄為澤潞判官常鞫獄於私第有老婦辨對見羔時出入竊謂人曰此少年狀類吾夫語問之乃羔母也自此迎侍而歸又往求先人之墓邑中故老已盡不知所詢館於佛寺日夜悲泣忽視屋柱煙煤之下見字數行拂而視之乃其父遺跡言我子孫若求吾墓當於某村某家問之羔號泣而往果有老父八十餘指其丘壠因得歸葬羔官至工部尚書致仕朝野僉載曰蘇頲為中書舍人父右僕射瓌卒頲哀毀過禮有勑起復頲表固辭不起上使黃門侍郎李日知就宅喻旨終坐無言乃奏曰臣見瘠病嬴瘦殆不勝哀臣, SBCK: ''}
