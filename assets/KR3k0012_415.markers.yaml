  - {type: variant, offset: 8, length: 4, content: 汝南先賢, WYG: 詔賜物百段仍令史官編錄之又曰楊紹宗妻王氏華州華陰人也初年二歳所生母亡為繼母鞠養至年十五父又征遼而没繼母尋亦卒乃收所生母及繼母屍柩並立父形像招魂遷葬訖又廬於墓側陪其祖母及父墳永徽中詔曰故楊紹宗妻王氏因心為孝率性成道年廹桑榆筋力衰謝以徃在隋時父沒遼西招魂遷葬負土成墳又葬其祖父母等竭此老年親加板築痛結晨昏哀感行路永言志行嘉尚良深宜標其門閭用旌敏徳賜物三十段粟五十石又曰孝女賈氏濮州鄄城人也始年十五其父為宗人元基所害其弟强仁年幼賈氏撫育之誓以不嫁及强仁成童思其報復乃候元基殺之取其心肝以祭父墓遣强仁自列於縣有司斷以極刑賈詣闕自陳已為請代强仁死高宗哀之特制賈氏及强仁免罪移其家於洛陽又曰汴州李氏孝女年八歳父卒柩殯在堂十餘載毎日哭泣無限及長母欲嫁之遂截髪自誓請在家終養及喪母號毁殆至滅性家無丈夫自營棺槨州里欽其至孝送葬者千餘人葬畢廬於墓側蓬頭跣足負土成墳手植松柏數百株季昶列上其状制特表其閭賜以粟帛顔氏家訓曰張建女三歳喪母靈牀上屛風平生舊物屋漏沾濕出曝曬之女子一見伏牀流涕家人怪其不起乃往抱薦蓆淹潰精神傷沮不能飲食將以問醫醫胗脉云女腸斷矣因爾便吐血數日而亡中外憐之莫不悲歎宣州圖經曰宛陵管氏女名瑶年十七與母同寢母為虎所負去瑶哀呌隨之因囓虎耳墮方捨其母瑶即負母歸家氣絶武帝表其門以旌孝行王韶之孝子}
