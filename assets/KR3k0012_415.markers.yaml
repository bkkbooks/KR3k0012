  - {type: variant, offset: 3110, length: 548, content: 年二十五卒于家里人謂其封為夏侯孝子之墓又曰盧操字安節河東人幼勤學九歲通孝經論語隨義解釋黌音橫中父老謂之聰明兒事繼母張氏以孝聞張有三子而操同產二人張氏厚於三子命操常執勤主炊為三子設席操弟多以疾辭臥舍不出而操服勤不以勞倦張誨其子讀書咸以驕志三人每出張命操隨驢以摧之操執鞭引繩如僮僕三子復謂曰隨驢何如我讀書操曰不讀書所以逐驢後三子嗜酒佚蕩不敢抵忤於人或至及門詬詈詞及母氏而操為涕泣拜而解之惡少年咸曰不謂三賊有令弟某無故及長者門羅拜操而去繼母終其二子己亡而操訓養踰於未亡日哀毀過禮廬於墓側每夕有狐貍羅列散於廬左右欲且而去者三年時人以操在野野獸為之衛侍非孝感通於神明其孰能逮於此服闋明經擢第歸上塚盡以報揚名之義里巷榮之調為臨渙縣尉毗佐以寬仁吏民至今稱焉操以官舍都屋尊老所處不敢寧居唯西廡而已都屋設几筵神座祀之出必告反必面過其庭鞫躬如也入門恭謹其家居常若奉尊者無大噱咄責之音同寮服之操每旦具冠帶搢紳讀孝經一篇然後視事忌日則增其數讀至喪親章號咽不勝哀追感之心如新丁故操子昭有文名於世次子雲恭謹有父風高尚好學又曰劉師貞字文通彭城人也蚤失其母及長不記容狀哀慕之心不拘月制至忌辰終日涕泣未嘗寢食忽夢見其狀謂之曰我乃母也若孝通神明故我得建乃處師貞夢中大哭多覺哀號逾甚乃作偶人象以事之朝夕起居反告如常每薦親新然後食時人語, SBCK: 益部􅂄舊傳}
