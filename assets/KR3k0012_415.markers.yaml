  - {type: variant, offset: 944, length: 0, content: '', SBCK: 而嫁未有子其夫當從戎属孝婦曰我有老母吾不還汝肯善視吾母乎婦曰諾夫果死婦養姑不衰父母將嫁之孝婦曰受人之託豈可棄哉因欲自殺父母懼不敢嫁之養姑二十八年姑年八十四壽乃盡賣其田宅以葬之列女後傳曰珠崖二義者珠崖令之後妻及前妻女也女名􅀄生十三珠崖多珠継母連大珠以爲係臂及令死當送喪還法内珠於奩入􅀜者死継母棄之其子男九歳取之置}
