  - {type: variant, offset: 87, length: 193, content: 行六年喪喪過于哀既而弟子求分異居苞不能止乃中分其財奴婢引其老者曰與我共事久居不能使也田廬取其荒者曰吾少時所治意所戀也器物取朽敗者曰我素所服食身口所安弟子數破其產續復賑給又曰李篤字君淵汝南上蔡人家貧夜賃寫書為母買肉一斤梁米一升妻子茹菜有室無蕃又曰周盤字堅伯安成人江夏都尉遺腹子也居貧約而養母儉薄誦詩至汝墳末章慨然而歎又曰李鴻字太孫上蔡人閨門孝友弟仲為從父非報讎繫獄鴻便割髮詣縣通記乞代弟即, SBCK: 公姑並}
