  - {type: variant, offset: 3976, length: 4, content: 云始飲鴆, SBCK: 􅄬于鑪中赫然属天於是金液沸湧溢於鑪口娥所躡三履浮出於鑪身則化矣其金汁塞鑪而下遂成溝渠泉注二十里入于江水其所收金凢億萬斤溝渠中䥫至今仍存故吴俗毎治銅䥫必先爲娥立祠享而祈福歙州圖經曰章頊歙縣合陽郷人也妻程氏與二女入山採葉程爲暴虎衘囓去二女􅁈呌挽其衣裙與虎爭力虎乃捨之程由是獲全時刺史劉賛嘉之給湯藥蠲户稅改郷爲孝女宣室}
