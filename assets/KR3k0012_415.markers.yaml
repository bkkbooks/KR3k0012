  - {type: variant, offset: 3674, length: 270, content: 福年老患目師貞朝夕膳食非手則福不能食居處號為嚴潔或問其故師貞曰居處不莊非孝也師貞偶疾臥其父福暮食不安師貞歘然起號曰是夜食之不精羞果餅生生所致因師貞驚起而愈兄有疾經旬不差師貞衣不解結日一食為讀道釋經夢神人曰若兄苦風取胡王使者酒漬服愈師貞自求之藥肆皆不曉因夢其母曰胡王使者羗活也覺而求之兄遂疾愈後老妣繼喪六年有雙白雀棲飛戶間除几筵之日與師貞啁頓翅狀若號咷躃踴久乃去續定命錄曰賈直言父道德宗朝漏泄禁中事帝怒賜鴆酒直言白中使請自執器以飲父因自飲之立死酒自左足洞出復生使具奏流其父并直言於南海遇赦還以勁直聞為鄆帥縻以郡職劉悟殄東平之強直言之謀也朝廷以, SBCK: 江和爲縣}
