  - {type: variant, offset: 41, length: 0, content: '', SBCK: 誓以不嫁及強仁成童思共報復乃􅀱玄基煞之取其心肝以􅀕父墓遣強仁自列於縣有司斷以極刑賈詣闕自陳巳爲請代強仁死髙宗哀之特制賈氏及強仁免罪移其家於洛陽又曰汴州李氏孝女年八歳父卒柩殯在堂十餘載毎日哭泣無限及年長母欲嫁之遂截髮自誓請在家終養及喪母號毁殆至㓕性家無丈夫自營棺槨州里欽其至孝送葬者千餘人葬畢廬於墓側蓬頭跣足􅀒土成墳手植松栢數百株李昶列上其􅃺制特表其閭賜以粟帛顔氏家訓曰張建女三歳喪母靈牀上屏風平生舊物屋漏沾濕}
