  - {type: variant, offset: 3972, length: 0, content: '', SBCK: 生男二人並數歳乃各爲作囊盛珠環以係兒臂數爲訣別之辝家人毎防閑之}
  - {type: variant, offset: 3972, length: 0, content: '', WYG: 愛槐令吏守之犯槐者刑傷之者死有不聞命遇而犯之者吏收而拘之將加罪焉其女子往晏子之家説曰賤妾請有道於相國妾聞明君不為禽獸傷人今君以樹木之故殺妾父孤妾身恐害明君之政損明君之義晏子明日早朝而復於君公令吏罷守槐之役出犯槐之囚紀聞曰吳宣城郡青陽縣有梅根冶孝女李娥廟居㑹阜之巔林木秀茂周廻十里土人不敢樵採敬而事之日薦蘋藻娥父吳大帝時為鐵官冶以鑄軍器一夕鍊金鑪竭而金不出時吳方草創法令至嚴諸耗折官物十萬即坐斬倍又沒入其家而娥父所損折數過十萬娥年十五痛傷之因火烈遂自投于爐中赫然屬天於是金液沸湧溢於鑪口娥所躡二履浮出於鑪身則化矣其金汁塞鑪而下遂成溝渠泉注二十里入于江水其所收金凡億萬斤溝渠中鐵至今仍存故吳俗每治銅鐵必先為娥立祠享而祈福歙州圖}
  - {type: page-break, offset: 3972, content: '', id: KR3k0012_WYG_415-10a, image: WYG0896/WYG0896-0639a.png}
  - {type: page-break, offset: 3972, content: '', id: KR3k0012_WYG_415-10b, image: WYG0896/WYG0896-0639b.png}
  - {type: variant, offset: 3972, length: 0, content: '', krp: 生男二人並數歳乃各爲作囊盛珠環以係兒臂數爲訣別之辝家人毎防閑之}
  - {type: variant, offset: 3973, length: 0, content: '', SBCK: 百許日後稍懈雄因乗小舡於父墮處慟哭遂自􅄬水死弟賢其夕夢雄告}
  - {type: variant, offset: 3973, length: 0, content: '', WYG: 曰章頊歙縣合陽鄉人也妻程氏與二女入山採藥程為暴虎銜囓去二女寃呌挽其衣裙與虎爭力虎乃捨}
  - {type: variant, offset: 3973, length: 0, content: '', krp: 百許日後稍懈雄因乗小舡於父墮處慟哭遂自投水死弟賢其夕夢雄告}
  - {type: variant, offset: 3974, length: 0, content: '', SBCK: 却後六日當共父出至期伺之果與父相持浮於江上部縣長表言爲雄立碑圖像其形焉續述征記曰梁鄒城西有籠水發源長城山直北流於梁鄒西注濟或云齊之孝婦誠感神明湧泉發室内}
  - {type: variant, offset: 3974, length: 0, content: '', WYG: 程由是獲全時刺史劉賛嘉之給湯藥蠲户稅改鄉為孝女宣室志曰鄭邯耕民也天寶中母病人教令啖杏實可愈其妻楊氏曰此非時之物須勞苦以求之冀上天哀憫而賜子其傭耕侍疾吾欲徧於邑里訪之庶比於解叔謙丁公藤之感也乃至鄰郡易君子之衣而行忽於道傍莾穢中見一杏實悲喜再拜取之潔滌而歸奉其姑曰他郡有人憫其}
