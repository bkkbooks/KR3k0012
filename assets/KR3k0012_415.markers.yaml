  - {type: variant, offset: 685, length: 256, content: 少喪考妣不及供養乃刻木為人髣髴親形事之若生朝夕定省後鄰人張叔妻從蘭妻借看蘭妻跪投木人木人不悅不以借之叔醉疾來酣罵木人杖敲其頭蘭還見木人色不懌乃問其妻具以告之即奮劍殺張叔吏捕蘭蘭辭木人去木人見蘭為之垂淚郡縣嘉其至孝通於神明圖其形像於雲臺也孝子傳曰蔡邕性純孝母常帶病三年邕自非寒暑變節未嘗解襟帶不寢寐者七旬又曰鮑得小子曰昴至孝過人初得疾經涉數年常俯伏左右衣不解帶蕭廣濟孝子傳曰施延字君子少盡色養之道赤眉之際將母到吳郡海鹽賃為半路亭每取卒月直以供養督郵馮敷知其賢與飲食論道餉錢并不受王烈之安成記曰縣有孝子符表以孝聞天下, SBCK: ''}
