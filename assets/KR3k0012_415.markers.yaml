  - {type: variant, offset: 37, length: 3, content: 憎苞分, krp: 沒繼母㝷亦卒王乃收所生母及繼母屍柩并立父形像招魂遷葬訖又廬於墓側陪其祖母及父墳永徽中詔曰故楊紹宗妻王氏因心爲孝率性成道年迫桑榆筋力衰謝以徃在隋朝父沒遼左招魂遷葬負土成墳又葬其祖父母等竭此老年親加板築痛結晨昏哀感行路永言志行嘉尚良深冝摽其門閭用旌敏德賜物三十叚粟五十碩又曰孝女賈氏濮州鄄城人也始年十五其父爲宗人玄基所害其弟強仁年㓜賈氏撫育}
