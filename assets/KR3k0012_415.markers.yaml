  - {type: variant, offset: 3970, length: 1, content: 話, WYG: 防閑之經百許日後稍懈雄因乗小船於父墮處慟哭遂自投水死弟賢其夕夢雄告之却後六日當共父出至期伺之果與父相持浮於江上郡縣長表言為雄立碑圖像其形焉續述征記曰梁鄒城西有籠水發源長城山直北流於梁鄒西注濟或云濟之孝婦誠感神明湧泉發室内事具水部晏子春秋曰景公}
