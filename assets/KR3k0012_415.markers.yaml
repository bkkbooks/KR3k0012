  - {type: variant, offset: 6, length: 0, content: '', SBCK: 人縈㝡小父犯罪當刑乃罵其女曰生女不生男緩急非有益也縈自傷涕泣隨父至長安詣北闕上書曰父爲吏齊中皆稱㢘平今坐法當刑妾傷死者不可復生刑者不可復續雖欲改過自新其道無由妾願􅃿爲官奴以贖父之刑使得自新漢文帝憐悲其意原其父罪漢書曰東海有}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 人縈最小父犯死罪當刑乃罵其女曰生女不生男緩急非有益也縈自傷涕泣隨父至長安詣北闕上書曰妾父為吏齊中皆稱㢘平今坐法當刑妾傷死者不可復生刑者不可復屬雖欲改過自新其道無由妾願没為官奴以贖父之刑使得自新漢文帝憐悲其意原其父罪漢書曰東海有}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_WYG_415-1b, image: WYG0896/WYG0896-0634d.png}
  - {type: variant, offset: 6, length: 0, content: '', krp: 人縈㝡小父犯罪當刑乃罵其女曰生女不生男緩急非有益也縈自傷涕泣隨父至長安詣北闕上書曰父爲吏齊中皆稱㢘平今坐法當刑妾傷死者不可復生刑者不可復續雖欲改過自新其道無由妾願沒爲官奴以贖父之刑使得自新漢文帝憐悲其意原其父罪漢書曰東海有}
  - {type: variant, offset: 7, length: 3, content: 下汝南, SBCK: 婦少寡無子養姑甚謹姑欲嫁之終不肯姑告鄰人曰孝婦養我勤苦我老乆累丁壯奈何其後姑自縊死姑女告吏曰婦殺我母吏捕孝婦自經服罪于公以爲此婦養姑孝聞必不煞也太守不聽于公争之不能得乃抱其獄哭於府上因辭疾去遂煞孝婦郡中枯旱三年後太守至于公曰孝婦不當死前太守強断之當在是乎於是太守煞牛自􅀕婦冢天立大雨後漢書和熹鄧皇后諱綏太􅀓禹之孫也父訓護羗校尉母隂氏光烈皇后從弟女也后年五歳太􅀓夫人愛之自爲翦髪夫人年髙目眊誤傷后額忍痛不言左右見者怪而問之后曰非不痛也太夫人哀憐爲断髮難傷老人意故忍之耳晉書曰衛瓘及禍太保主簿劉瑶等冒難収瓘而葬之楚王偉之伏誅也瓘女與國臣書曰}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_SBCK_415-1b}
  - {type: variant, offset: 7, length: 0, content: '', WYG: 婦寡無子養姑甚謹姑欲嫁之終不肯姑告鄰人曰孝婦養我勤苦我老久累于壯奈何其後姑自縊死姑女告曰婦殺我母吏捕孝婦自經服罪于公以為此婦養姑孝聞必不殺也太守不聽于公爭之不能得乃抱其獄哭於府上因辭疾去遂殺孝婦郡中枯旱三年後太守至于公曰孝婦不當死前太守强斷之當在是乎於是太守殺牛自祭婦塜天立大雨後漢書和熹鄧皇后諱緩太傅禹之孫也父訓䕶羌校尉母隂氏光烈皇后從弟女也后年五歳太傅夫人愛之自為剪髪夫人年高目瞑誤傷后額忍痛不言左右見者怪而問之后曰非不痛也太夫人哀憐為斷髪難傷老人意故忍之耳晉書曰衛瓘及禍太保主簿劉繇等冐難收瓘而葬之楚王偉之伏誅也瓘女與國臣書先君名諡未顯無異凡人每怪一國蔑然無言春秋之失其咎安在悲憤感慨故以示意繇等執黄幡撾登聞鼓上言又曰㑹稽寒人陳氏有三女無男祖父母年八九十老無所知又篤癃病毋不安其室遇寒饑女相率於西湖採菱更日至市貨賣未嘗虧怠鄉里稱為義門多欲取為婦長女自傷㷀獨誓不肯行祖母尋相繼卒三女自營殯葬為菴舎屋墓側又曰永興概中里王氏女年五歳得毒病兩目皆盲性至孝年二十父死臨屍一叫眼皆血出小妹娥䑛其血左目即開時人稱為孝感唐書曰劉寂妻夏侯氏滑州胙城人字碎金父長雲為鹽城縣丞因疾喪明碎金遂求離其夫以終侍養經十五年兼事後母至以孝聞及父卒毁瘠殆不勝喪披髪徒跣負土成墳廬於墓側毎日一食如此者積年貞觀中有制表其門閭賜以粟帛又曰于敏直妻張氏營州都督晥城公儉之女也數歳時父母微有疾即觀察顔色不離左右晝夜省侍宛若成人及稍成長恭順彌甚適延壽公于欽明子敏直初聞儉有疾便即號踴自傷期於必死儉卒後㓙問至號哭一慟而絶高宗}
