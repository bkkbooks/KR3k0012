  - {type: variant, offset: 1719, length: 1148, content: 語錄曰韋溫文宗朝欲以為翰林學士韋以先父遺命懇辭上後謂次對官曰韋溫朕每欲用之皆辭許又安用韋溫聲色俱厲戶部侍郎崔蠡進曰韋溫稟其父遺命耳上曰溫父不令其子在翰林是亂命也豈謂之理乎崔曰凡人子能遵理命已是至孝況能稟亂命而不改者此則尤可嘉之陛下不可怪也上曰然乃止又曰路隋年在齠齓喪其父至十許歲其母問曰識爾父否隋嗚咽無言不識也母曰只爾一面隋後殞絕以至成人終身不攬鏡加以至行純古士大夫推之朱崖慕其德以愛女適隋之子李太尉家有路郎隋之子也官至當州守生資唯有琴十張史係曰盧昭美字子明范陽人五歲念孝經論語與童輩為師事之禮至於父母字坐則起而言母劉因往兄之家飲酒歸夜連吐昭美憂形于色取其吐嘗之或詰其故昭美對曰母自外食寧不知其毒邪行超撫而歎曰盧氏之家有曾子矣時同里大稱河東裴安特異之此昭美於蔡順過之母卒父蚤亡家貧無以葬殯訖乃傭為無極酒家保得月資學女弟令備奠祭酒家怪其衣服藍縷得直不以時價古鬻字責之昭美且以情對言發涕泗從橫酒嫗為之咄嗟輟食謂其四子曰我為乃家婦生不貧矣又幸不以若父鎡錤上音茲下音其鋤也方成衣食而日日意錢顧乃家財充若費乎我卒若必不如此月傭摧辱為母也四子俯伏母盡以緣身衣被釵釧與昭美令葬其母赦其傭免之昭美歸悉以營奉母袝焉又計其祥禫所費市之餘金復齎還酒嫗其妻欲止之奚不留為給家財盡復為傭兒乎昭美恕欲出其妻其兄深勸止之然雖同室終不面焉妻亦悔過發憤而卒又曰孟元方字弘規東平鉅野人八歲聰悟過人父友南陽鄧恪來省會其父出遊鄰縣母命元方接對恪見群犬互噪戲元方曰郎子姓孟近犬必猛為余叱之元方曰尊客之前不叱狗恪曰小兒解書語元方曰鄧老樹村中來真田舍則不知書恪大慚後至父來謂之曰為孺子所辱賴無人見元方應曰子見父知豈無人乎年十八明經擢第父母相次而卒元方五十日未嘗有笑容唯以讀書為業頌詩至蓼莪篇必哀咽號咷情慕不已則必徑往冢所抱樹而哭或日暮則止棲柏庭亦無恐懼之色會昌末有盜發其塚而元方在河內夜夢告之往到鉅野修奉畢捕其盜手殺以祭而鄉里以為元方殺人鉅野令收捕之搒音彭又甫孟切掠無一辭盜塚家愈稱冤移獄及郡將按致其罪會賊家鬻物於市為他塚家所識又擒其弟焉太守然後知元方無罪赦之而責其令或問元方曰何不自明元方曰手殺之何故自明後終于家又曰毛摽字表玄宣城漂水人少八歲潁悟異於眾子日誦五百言母鍾氏連年病疾摽日夜祗奉諸兄悉寢唯摽在母床側隨呻吟之聲至于枕前衣不解帶蓬頭垢面畿虱盈身曾不搔視親戚大嗟異迎名醫嚴顒與母診脈才言不濟摽號哭頓地顒佯言可救郎中善祗奉顒退而告曰嗟乎此子孝德若是而親疾不可救天道奚處嗟歎良久翌日母終摽伏母手號哭不食三日家人倉卒之際遺燭致焚舉家出避火惟摽抱其柩涕泣火為之飛去鄰舍柩得免莫不異之將葬摽嬴瘠杖不能起扶持方行猶蹈雪跣步四十里太守命縣宰就視致粟帛給遺及摽病革誡其子貞曰吾以家門修飾遂及於此吾生無益於人死固不害於人唯宜薄葬止於周身貞奉其教行之卿里稱, SBCK: 内}
