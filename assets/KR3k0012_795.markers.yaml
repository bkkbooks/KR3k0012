  - {type: variant, offset: 4919, length: 8, content: 卑路斯為都督是後, SBCK: 郍陵提婆身着真珠頗􅀺車渠􅃢瑚琥珀纓絡耳垂金鈎玉璫佩寳裝服突坐師子床其堂内散花香大臣及諸左右並坐於地持兵}
  - {type: variant, offset: 4919, length: 2, content: 卑路, WYG: 郍陵提婆身着真珠玻璃車渠珊瑚琥珀纓絡耳垂金鈎玊璫佩寳裝服飾坐獅子床其堂内散花香大臣及諸左右並坐扵地持兵數百列侍其側宫中有七層之樓覆以銅瓦欄檻楹栿皆飾珠寳樓之四角各懸銅槽下有金龍激水上樓注扵槽中從龍口而出狀如飛泉又曰貞觀中衛尉丞李義表往使天竺塗經其國郍陵提婆見之大喜與義表同出觀阿耆婆沴池週廻三十餘歩水常沸浦雖流潦暴集爍石焦金來賞者咸以物投之即生煙熖懸釡而炊湏臾而熱大食唐書曰大食國本在波}
