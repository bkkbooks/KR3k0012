  - {type: variant, offset: 3718, length: 304, content: 後以吐谷渾為氏又曰豺立自號沙州刺史部內有黃沙周廻數百里不生草木因號沙州梁書曰武帝天監十三年其王休運籌遣使獻金裝馬腦鍾二口又表於益州立九層佛寺詔許焉十五年又遣使獻赤舞龍駒及方物隋書曰其王以皂為帽妻戴金花其器械衣服略與中國同其王公貴人多戴羃䍦婦人裙襦辮髮綴以珠貝國無常稅殺人及盜馬者死餘坐則徵物以贖罪風俗頗同突厥有大夌粟豆青海周迴千餘里中有小山其俗至冬輒放牝馬於其上言得龍種吐谷渾嘗得波斯草馬放入海因生驄駒能日行千里故時稱青海驄馬又曰開皇十六年以光化公主妻吐名渾王伏允上表欲稱公主為天后上不許唐書曰隋煬帝時其王伏允來犯塞煬帝親惣六軍以討之伏允以數千騎潛於泥嶺而遁其仙頭王率男女十餘萬口來降煬帝立其質子順為王送之本, WYG: ''}
