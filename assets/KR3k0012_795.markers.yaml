  - {type: variant, offset: 4357, length: 211, content: 里戶十餘万河經其城中南流土地平正出金鍮石珊瑚琥珀車渠馬腦多大真珠頗梨瑠璃水精瑟瑟金剛火齊鑌鐵銅錫朱砂水銀綾錦疊毼氍毹毾㲪赤麞皮及鬱金蘇合青木等香胡椒畢撥石蜜千年棗香附子訶黎勒無食子鹽綠雌黃等風物氣候暑熱家自藏水地多沙磧引水溉灌其五穀及鳥獸等與中夏略同唯無稻黍稷土出名馬大驢及駞往往有一日能行七百里富室至有數千頭又出白象師子大鳥卯形如橐駞有兩翼飛而不能高食草與肉亦能噉火其王姓波氏名斯坐金羊床戴金花冠衣錦袍織成帔飾以真珠寶物, SBCK: 萬人皆善戰}
