  - {type: variant, offset: 244, length: 369, content: 與眾羗絕遠不復交通其後子孫分別各自為種任隨所之或為釐厘牛種越嶲羗是也或為白馬種廣漢羗是也或為參狼種武都羗是也忍及弟舞獨留湟中並娶妻忍生九子為九種舞生十七子為十七種羗之興盛從此起矣又曰忍子研立時秦孝公雄強威服羗戎孝公使太子駟率戎狄九十二國朝周顯王研豪健故羗中號其後為研種及秦始皇時務并六國以諸侯為事兵不西行故種人得以繁息又曰武帝征伐四夷開地廣境北卻匈奴西逐諸羗及渡河湟築令居塞初開河西別置四郡酒泉武威張掖敦煌通道玉門隔絕羗胡使南北不得交關於是鄣塞亭燧出長城外數千里又曰建武九年隗囂死司徒掾班彪上言今涼州部皆有降羗羗胡被髮左袵而與漢人雜處習俗既異言語不通數為小吏點民所見侵奪窮恚無聊故致反叛夫蠻夷寇亂皆為此也舊制益州部置蠻夷騎都尉幽州部置領烏桓校尉涼州部置護羗校尉皆持節領護理其怨結歲時巡行問所疾苦又數遣使驛通導動靜使塞外羗夷為吏耳目州郡因此, SBCK: 衆}
