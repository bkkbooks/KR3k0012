  - {type: variant, offset: 199, length: 1, content: 忍, SBCK: 昆莫弥皆王號也故烏孫國有塞種大月氐種始張騫言烏孫本與大月氐共在燉煌間今烏孫強大可厚賂招令東居故地妻以公主以制匈奴武帝即位令騫齎金幣往賜昆莫於是使獻馬願尚公主元封中遣江都王建女細君爲公主以妻焉公主別理宫室居歳}
