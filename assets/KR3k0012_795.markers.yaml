  - {type: variant, offset: 3094, length: 175, content: 國邊荒境被髮左袵今大隋統御宇宙平一孤既沐浴和風庶均大化其庶人以上皆宜解辮削袵帝聞而善之下詔曰光祿大夫弁國公高昌王伯雅本自諸華世祚西壤昔因多難剪為胡服自我皇隋平一宇宙伯雅踰沙重阻奉貢來庭削袵曳裾變夷從夏可賜衣冠仍頒製造之式唐書曰高昌有草名白疊其實類蠒國人採之織以為布又曰武德七年其王文泰又獻狗雌雄各一高六寸長尺餘性甚惠云本出拂䔉國中國拂䔉狗自此始也又曰, SBCK: 便行李}
