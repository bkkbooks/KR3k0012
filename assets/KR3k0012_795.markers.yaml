  - {type: variant, offset: 2089, length: 319, content: 之則依固自守其俗語不與中國及羗胡同各自有姓如中國之姓其服尚青俗能織布善田種畜羊豕馬牛婚姻六禮知書䟽多知中國之語言與中國之姓其服尚青又曰漢武元封三年氐人反遣兵討破之分徙酒泉郡元鳳初復叛遣大鴻臚田廣明討破之又曰魏武之初諸氐戎叛乃令夏侯妙才討之因徙武都之種於秦川以御蜀虜風俗通曰氐言抵冒貪饕至死好利樂在山谿本西南夷之別種號曰白馬孝武帝遣中郎將郭昌等引兵征之降服以為武都郡晉華陰令江統西戎論曰春秋之義內諸夏而外夷狄以其言論不通贄幣不同種類乖殊或居絕域之外山河嶇險阻之地與中國壤之表崎斷土隔不相侵涉賦役不及正朔不加故曰天子有道守在四夷又曰匈奴求守邊塞而俟應陳其不可單于屈膝未央蕭望之議以不臣是以有道之君不攻夷狄也車師北史曰車師國一名前部其王居交河城, SBCK: ''}
