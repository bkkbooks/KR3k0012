  - {type: variant, offset: 1615, length: 187, content: 將軍霍去病破匈奴取西河地開湟中於是月氏來降與漢民錯居雖依附縣官而首鼠兩端其後漢兵戰鬭隨勢強弱被服飲食言語略與羌同亦以父名母姓為種其大種有七莊子曰羗人死燔而揚其灰風俗通曰羗本西戎卑賤者也主牧羊故羗字從羊人因以為號無君臣上下健者為豪不能相一種別群分彊者凌弱轉相抄盜男子戰死以為吉病終者謂之凶范曄西域論曰張奐盛稱戎狄一氣所生不宜誅盡流血汙野傷和致妖是何言之迂乎羗雖外患實深內疾苦攻, WYG: 追}
