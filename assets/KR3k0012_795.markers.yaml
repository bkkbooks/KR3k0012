  - {type: variant, offset: 3380, length: 1, content: 虜, SBCK: 東十里有佛塔周三百五十歩髙八十丈自佛塔􅀄建計至後魏武定八年八百四十二年所謂百丈佛圖也佛䔉唐書曰佛䔉國一名大秦在西海之上東南與波斯接地方萬餘里列城四百邑連屬其宫宇柱梲多以水精瑠璃爲之有貴臣十二人共理國政常使一人將囊隨王車百姓有事即以書投囊中王還宫省發理其枉直其王無常人簡賢者而立之國中災異及風雨不時輙廢而更立王冠形如烏舉翼冠及纓絡皆綴以珠寳著錦繡衣前不開􅁭坐金花床有一鳥似鵝其毛緑色常在王邊􅀝枕上坐毎進食有毒其鳥輙鳴其都城疊石爲之尤絶髙峻凡有十萬餘户南臨大海城東面有一大門其髙二十餘丈自上及下飾以黄金光輝昭爛連曜數里自外至王室凡有大門三重列異寳雕飾第三門之樓中懸一大金秤以金九十三枚属於衡端以􅀱日之十二時焉爲一金人其大如人立於側每至一時其金丸輙落鏗然發聲引唱以紀日時毫􅁵無失其殿以瑟瑟爲柱黄金爲地象牙爲門扇香木爲棟梁其俗無瓦擣白石爲末羅之塗握上其堅宻光潤還如玉石至於盛暑之節人厭􅅝熱乃引水潜流上遍於屋宇機制巧宻人莫之知觀者唯聞屋上泉鳴俄見四簷飛溜懸波如瀑布激氣成凉風其巧妙如此風俗}
