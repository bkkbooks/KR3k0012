  - {type: variant, offset: 2724, length: 269, content: 白鹽其形如玉高昌人取以為枕貢之中國又曰後魏文成帝和平六年高昌人立麴嘉為王嘉宇靈鳳金城榆中人遣使獻珠象白黑貂裘名馬鹽枕等宣武延昌中以嘉為持節平西將軍瓜州刺史又曰後魏孝明熙平初遣使朝貢獻詔曰卿地隔關山境接荒漢頻請朝援徙國內遷雖來誠可嘉於理未恊何者彼之甿庶是漢魏遺黎自晉氏不綱因難播越成家立國世積已久惡徙重遷人懷戀舊今若動之恐異同之變爰在時腋不得便如來表也又曰後魏孝明正光元年遣使奉表自以邊遐不習典誥求借五經諸史并請國子助教劉爕以為愽士明帝許之又曰其國至隋城周迴一千八百四十步於坐室盡魯哀公問政於孔子之像又曰服飾丈夫從胡法婦人裙襦頭上作髻文字亦, WYG: ''}
