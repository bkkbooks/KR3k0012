  - {type: variant, offset: 940, length: 597, content: 七千餘人擊之戰於臨洮斬首千餘級餘皆率種人降進封賢都鄉侯自是涼州無事至四年尚書僕射虞翊上䟽曰臣聞子孫以奉祖為孝君上以安民為明此高宗周宣所以上配湯武也禹貢雍州之域厥田惟上且沃野千里穀稼充積又有龜茲鹽池以為民利上郡龜茲縣有鹽官即雍州之域也水草豐美土宜產牧牛馬衘尾群羊塞道北阻山河乘阨據險因渠以溉水舂河漕水舂即水碓也用功省而軍糧饒足故孝武皇帝及世祖築朔方西河置上郡皆為此也而建元無妄之災眾羗內潰郡縣兵荒二十餘年棄沃壤之饒損自然之財不可謂利離河山之阻守無險之處難以為固今三郡未復園陵單外園陵謂長安諸園陵也單外謂旡守固也而公卿選懦容頭過身張解設難但計所費不圖其安宜開聖德考從所長書奏帝乃復三郡使謁者郭璜督促徙者各歸舊縣結城郭置候驛既而激河浚渠為屯田省內郡費歲一億計遂令安定北地上郡及隴西金城常儲穀粟令周數年又曰順帝永和四年以宋機為并州刺史劉康為涼州刺史並當之職大將軍梁商謂機等曰戎狄荒服蠻夷要服言其荒忽無常而統領之道亦無常法臨事制宜略依其俗今二君性素疾惡欲分白明黑孔子曰人而不仁疾之已甚亂也況戎狄乎其務安羗胡防其大故忍其小過機等天性虐刻遂不能從到州之日多所擾發五年夏雜種羗等遂反叛攻金城與西塞及湟中雜種羌大寇三輔殺害長吏機康並坐徵又曰自爰劍後子孫支分凡百五十種其九種在賜支河首已西及在蜀漢徼北唯參狼在武都其五十二種衰少不能自立分散為附落或絕滅無後或引而遠去其八十九種唯燒當種㝡強勝兵十餘萬其餘大者萬餘人小者, SBCK: ''}
