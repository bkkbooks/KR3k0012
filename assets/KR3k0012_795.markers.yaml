  - {type: 'tls:seg', offset: 2574, content: '', id: KR3k0012_CHANT_795-21a.5}
  - {type: variant, offset: 2574, length: 0, content: '', SBCK: 五千餘􅀐小者千餘􅀐織􅏚牛尾及􅗑䍽羊毛以爲屋服裘􅄄􅀍氈以爲上飾俗尚武力無法令各爲生業有戰則相屯聚無徭賦不相往來牧養􅏚牛猪以爲供食不知稼穡無文字但推草木以記年歳時三年一聚㑹殺牛羊以􅀕天人年八十巳上死者以爲令終親戚不􅂘少而死者則云夭枉共悲􅂘之有琵琶撗吹擊􅇲爲節唐書曰党項羗在古析支之地漢西羗之別種也魏晉之後西羗微弱或臣中國或竄山野自周氏滅宕昌鄧至之後党項始強其界東至松州西接葉護南雜舂桑迷桑等羗北連吐谷渾處山谷間延亘三千里其種毎姓別爲部落一姓之中復爲小部落大者萬􅀐小者千􅀐不相統一有細封氏費聽氏頗超氏野辝氏采擒氏拓拔氏最爲強族俗皆土著居有棟宇其屋織􅏚毛及羊毛覆之毎年一易俗尚武無法令賦役其人多壽年至百五六十歳不事産業好爲盗㸦相凌刼尤重復讎􅀂讎人未得必蓬頭垢面跣足􅂼食要斬讎人而後復常男女並衣裘􅄄仍披大氈養馿羊以供其食不知耕稼土無五􅂖氣􅀱多風寒五月草始生八月霜雪降求大麥於他界醖以爲酒妻其庻母及伯叔母嫂子弟之婦􅁋穢蒸報諸夷中㝡爲甚自周及隋或叛或朝常爲邊患貞觀三年南㑹州都督鄭元璹遣使招諭其酋長細封歩頼舉部内附太宗降璽書慰撫之歩頼因即來朝宴賜甚厚列其地爲􅁤州拜歩頼爲刺史仍請率所部封吐谷渾其後諸姓酋長相次率部落皆來内属請同編户太宗厚加撫慰列其地爲崌音居奉巖逺四州各拜其首領爲刺史又曰有黒党項在於赤水之西李靖之擊吐谷渾也渾主伏允奔于黒党項居以空閑之地及吐谷渾舉國内属黒党項酋長号敦善王因貢方物又有雪山之下及白狗舂乗白蘭等諸羗焉􅂄北史曰焉􅂄國在}
