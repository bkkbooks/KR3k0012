  - {type: variant, offset: 4142, length: 145, content: 爰命六軍申茲九伐義存活國情非黷武其子大寧王慕容順隋氏之甥志懷明悟長自中土幸慕華風爰見時機深識逆順以其愎諫違眾獨陷迷途遂誅邪臣存茲大計翻然改轍代父歸罪忠孝之美深有可嘉子能立功足以補過既往之釁持宜原免然其建國西鄙已歷年代既從廢絕情所未忍繼其宗祀允歸令嗣可封順為西平郡王仍授趉九物切胡呂鳥甘豆可汗, SBCK: 綾綺}
