  - {type: variant, offset: 3487, length: 216, content: 太宗不從遂以其地置西州又置安西都護府留兵以鎮之吐谷渾後魏書曰吐谷渾慕容氏者本遼西鮮卑徙河步歸有二子長曰吐谷渾少曰若洛廆代統部落別為慕容氏步歸之存貧分戶百以給吐谷穀渾渾與洛廆二部馬鬥相傷洛廆怒謂渾曰何不分部令相遠渾曰馬是畜耳而何怒及求別甚易今當去汝萬里之外廆悔謝留之渾曰先公之世卜筮當有二子亭福並流子孫我是卑庶理無並大今以馬致隔天所啟也試驅馬令東若還我當有隨即命擁馬皆悲鳴西走遂西渡隴止于甘松之南廆追悔之作吐谷渾河干歌徙何以兄為河干也, SBCK: ''}
