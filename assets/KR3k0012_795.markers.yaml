  - {type: variant, offset: 4916, length: 1, content: 授, SBCK: 及州八十縣一百軍府百二十六仍於其國立碑以紀聖徳帝從之泥婆羅唐書曰泥婆羅在吐蕃西其俗剪髮與眉齊穿耳揎以竹筒牛角緩至肩者以爲姣麗食用手無匙筯其器皆銅多啇賈少田作以銅爲錢皆文爲馬牛不穿孔衣服以一幅布蔽身日數盥漱以板爲屋璧皆雕􅀞俗重􅀶戯好吹蠡擊鼓頗解推測盈虚兼通歴術事五天神䥴石爲像毎日清水浴神烹羊而􅀕}
