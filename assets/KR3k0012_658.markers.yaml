  - {type: variant, offset: 1533, length: 0, content: '', krp: 以三橋舊宅爲光宅寺勑周興嗣與陸倕各製寺碑及成俱奏帝以興嗣所製自題又曰江紑字含潔幼有孝性年十三父蒨患眼紑侍疾將朞月衣不解帶夜夢一僧云患眼者飲惠眼水必差及覺說之莫能解者與草堂寺智者法師善往訪之智者曰無量壽經云慧眼見眞能度彼岸蒨乃因智者啓}
  - {type: variant, offset: 1534, length: 0, content: '', SBCK: 同夏縣界牛屯里舎爲寺乞賜嘉名勑荅曰近見智者云慧眼則五眼之一號可以惠眼爲名及就創造㳿故井水淸冽異於常水夢中取水洗眼及煑藥稍覺有瘳因此遂得差南史日王懿字仲德父苗仕苻堅至二千石苻堅之敗仲德年十七及兄叡同起義兵與慕容垂戰敗被重創走與家屬相失路經大澤困未能去卧林中有一小兒青衣年可七八歲騎牛行見仲德驚日漢己食未仲德言飢小兒去須􅁷復來得飯與之食畢欲行而暴雨莫知津徑有一白狼至前仰天而號號訖銜仲德衣因渡水仲德隨後得濟與叡相及渡河至滑臺復爲翟遼所留積年仲德欲南歸乃棄遼奔泰山晉太元末徙居彭城宋元嘉九年又爲徐州刺史仲德三臨徐州威德著於彭城立佛寺作白狼童子像於塔中以在河北所遇也又日波斯國城外佛寺二三百所梁大通二年遣使獻佛牙又日劉孝綽與到漑兄弟甚狎漑少􅀌}
  - {type: page-break, offset: 1534, content: '', id: KR3k0012_SBCK_658-5b}
  - {type: page-break, offset: 1534, content: '', id: KR3k0012_SBCK_658-6a}
  - {type: variant, offset: 1534, length: 0, content: '', WYG: 同夏縣界牛屯里舎為寺乞賜嘉名勑答曰近見智者云慧眼水慧眼則五眼之一號可以慧眼為名及就創造泄故井井水清冽異於常泉依夢取水洗眼及煑藥稍覺有瘳因此遂差南史曰玉懿字仲徳父苖事符堅至二千石符堅之敗仲徳年十七及兄叡同起義兵與慕容垂戰敗被重創走與家属相失路經大澤困未能起卧林中有一小兒青衣年可七八嵗騎牛行見仲徳驚曰漢已食未仲徳言飢小兒去湏臾復来得飯與之食畢欲行而暴雨莫知津逕有一白狼至前仰天而號號訖䘖仲徳衣因渡水仲徳随後得濟與叡相及渡河至滑臺復為翟遼所留積年仲徳欲南歸乃棄遼奔泰山晉太元末徙居彭城宋元嘉九年又為徐州刺史仲徳三臨徐州威徳著於彭城立佛寺作白狼童子像於塔中以在河北所遇也又曰波斯國城外佛寺二三百所梁大通二年遣使獻佛牙又曰劉孝綽與到溉兄弟甚狎溉少孤}
