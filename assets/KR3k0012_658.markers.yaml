  - {type: variant, offset: 6, length: 1, content: 曰, SBCK: 侍郎每求試邊州武帝以其輕脫無威望抑而不許普通五年徙臨海郡行至上虞勑追還令受菩薩戒旣至恂恂盡禮改意蹈道持戒又精潔帝甚善之北齊書日趙隱字彦深專意􅀇門崇敬佛道雖年期頥常持戒行髙僧傳日弗若多羅此云功德華􅄢賔人也少出家專精十誦律部僞秦中振錫入􅀜}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_SBCK_658-1b}
  - {type: variant, offset: 6, length: 1, content: 曰, krp: 侍郎每求試邊州武帝以其輕脫無威望抑而不許普通五年徙臨海郡行至上虞勑追還令受菩薩戒旣至恂恂盡禮改意蹈道持戒又精潔帝甚善之北齊書日趙隱字彦深專意玄門崇敬佛道雖年期頥常持戒行髙僧傳日弗若多羅此云功德華罽賔人也少出家專精十誦律部僞秦中振錫入關}
