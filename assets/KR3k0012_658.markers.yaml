  - {type: variant, offset: 7, length: 0, content: '', WYG: 武帝盛於佛教朝賢多啓求受戒江革精信因果而帝未知謂革不奉佛法乃賜革覺意詩五百字又手勑革曰果報不可不信革因乞受菩蕯戒又曰陶𢎞景曽夢佛受其菩提記名名為勝力菩薩乃詣鄮縣阿育王塔自誓受五大戒大同年卒遺令不湏沭浴以大袈裟覆衾蒙首足弟子遵而行之又曰陸杲素信佛法持戒甚精著沙門傳三十卷又曰蕭昱字子真歴位中書侍郎每求試邉州武帝以其輕脱無威望抑而不許普通五年徙臨海郡行至上虞有𠡠追還且令受菩薩戒既至恂恂盡禮改意蹈道持戒又精潔帝甚善之北齊書曰趙隠字彦深專意𤣥門崇敬佛道雖年踰期頥常持戒行髙僧傳曰佛若多羅此云功徳華􅄢賔人也少岀家專精十誦律部偽秦𢎞始中振錫入關}
