  - {type: variant, offset: 2508, length: 390, content: 日夢檀像入國因發詔往迎像按佛遊天竺記及優填王經云佛上忉利天一夏為母說法王臣思見優填國王遣三十二匠及齎旃檀請大目連神力運往令圖佛相既如所願圖了還返坐高五尺在祇洹寺至今供養帝欲迎請此像遣決勝將軍郝騫等八十人應募往達具狀祈請舍衛王曰此中天正像不可適邊乃命三十二匠更刻紫檀人圖一相卯時運手至午便就相好具足而像頂放光降微細雨并有異香故優填王經云真身既隱次二像現普為眾生深作利益者是也騫等負第二像行數萬里度大海冒涉風波隨浪至山糧食又盡所將人眾及傳送者身多亡歿逢諸猛獸一心念佛乃聞像後有甲胄聲又聞鍾聲岩側有僧端坐樹下登負像下置其前僧起禮像騫等禮僧僧授澡罐令飲並得飽滿僧曰此像名三藐三佛陁金毗羅王自從至彼大作佛事語頃失之爾夜僉夢見神曉共圖之至天鑒十年四月五日騫等達于揚都帝與百僚迎還太極殿至大清三年湘東王在江陵即位遣人從揚都迎上至荊都後梁大定八年城北靜陵造大明寺乃以像歸之今見在多有傳寫流被京國云, SBCK: ''}
