  - {type: variant, offset: 1546, length: 137, content: 量壽像長一丈八尺及鑄而銅不足帝又給功德銅三千斤臺內送銅未至像處已見銅車到鑪所於是就冶一灌便足在後臺司銅至方知向來送銅靈感所致及開模像以成丈九而相好不差又有大錢二枚見在衣絛竟不銷鑠其年欲移像還寺未移前淮中估客每夜輒聞大橋上如有人修道路往視不見人俄而像度光彩輝煥觀者莫不歸心北齊, SBCK: 數唐}
