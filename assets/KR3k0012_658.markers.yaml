  - {type: variant, offset: 3, length: 2, content: 經晉, SBCK: 百字又手勑革日果報不可不信革因乞受菩薩戒又日陶􅀪景曾夢佛授其菩薩記云名爲勝力菩薩乃詣鄮縣阿育王塔自誓受五大戒大同二年卒遺令不須沐浴以大袈裟覆衾蒙首足弟子遵而行之又日陸杲素信佛法持戒甚精著沙門傳三十卷又日蕭昱字子眞厯位中}
