  - {type: variant, offset: 1533, length: 0, content: '', SBCK: 以三橋舊宅爲光宅寺勑周興嗣與陸倕各製寺碑及成俱奏帝以興嗣所製自題又曰江紑字含潔幼有孝性年十三父蒨患眼紑侍疾將朞月衣不解帶夜夢一僧云患眼者飲惠眼水必差及􅁴說之莫能解者與草堂寺智者法師善往訪之智者曰無量壽經云慧眼見眞能度彼岸蒨乃因智者啓}
  - {type: variant, offset: 1533, length: 0, content: '', WYG: 以三橋舊宅為光宅寺𠡠周興嗣與陸倕各製寺碑及成俱奏帝以興嗣所製自題又曰江紑字含潔幼有孝性年十三父蒨患眼紑侍疾將期月衣不觧帯夜夢一僧云患眼者飲慧眼水必瘥及覺説之莫能觧者與草堂寺智者法師善徃訪之智者曰無量夀經云慧眼見真能度彼岸蒨乃因智者啓}
