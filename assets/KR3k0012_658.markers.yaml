  - {type: variant, offset: 1534, length: 0, content: '', krp: 同夏縣界牛屯里舎爲寺乞賜嘉名勑荅曰近見智者云慧眼則五眼之一號可以惠眼爲名及就創造㳿故井水淸冽異於常水夢中取水洗眼及煑藥稍覺有瘳因此遂得差南史日王懿字仲德父苗仕苻堅至二千石苻堅之敗仲德年十七及兄叡同起義兵與慕容垂戰敗被重創走與家屬相失路經大澤困未能去卧林中有一小兒青衣年可七八歲騎牛行見仲德驚日漢己食未仲德言飢小兒去須臾復來得飯與之食畢欲行而暴雨莫知津徑有一白狼至前仰天而號號訖銜仲德衣因渡水仲德隨後得濟與叡相及渡河至滑臺復爲翟遼所留積年仲德欲南歸乃棄遼奔泰山晉太元末徙居彭城宋元嘉九年又爲徐州刺史仲德三臨徐州威德著於彭城立佛寺作白狼童子像於塔中以在河北所遇也又日波斯國城外佛寺二三百所梁大通二年遣使獻佛牙又日劉孝綽與到漑兄弟甚狎漑少孤}
