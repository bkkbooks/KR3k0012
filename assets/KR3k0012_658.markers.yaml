  - {type: variant, offset: 670, length: 0, content: '', SBCK: 渡江更脩飾之其後有西河離石縣胡人劉薩阿遇疾暴亡七日更蘇說云觀世音語云汝縁未盡當得活可作沙門洛下齋丹陽㑹稽並有阿育王塔可往禮拜忽然醒寤因此出家名惠達遊行至丹陽未知塔處及登越城四望見長千里氣色因就禮拜果是先阿育王塔所屢放光明由是定知必有舎利集衆就掘得三石碑有鐵函函中有銀函函中又有盛三舎利及爪髮長一丈七尺詔遣沙門釋雲隨使往迎之先是武帝改造阿育王等塔出舊塔下舎利及佛爪髮髮青紺色衆僧以手伸之隨手長短放之則旋屈爲蠡形按}
