  - {type: variant, offset: 669, length: 0, content: '', SBCK: 必死勿當其鋒家無一全汝冝修福建塔寺可穰之若未暇立寺可杖頭刻作塔形見有氣來可擬之尚悟懼未及造塔寺遂刻小塔施杖頭􅁪置左右後果有異氛遥見西南從天而下始如車輪漸弥大直衝尚家尚以杖指之氣便廻散闔門獲全氣所經處數里無復孑遺遂於永和四年捨宅造寺名莊嚴寺宋大明中路太后於宣陽門外造莊嚴寺改此爲謝鎭西寺又日阿育王寺塔阿育王卽鐡輪王王閻浮提一天下佛滅後一日一夜役􅀑神造八萬四千塔此卽其一吳時居其地以爲精舎孫綝尋除毁之塔亦同滅吳平後諸道人復於舊處建立焉晉元帝}
