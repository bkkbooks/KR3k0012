  - {type: variant, offset: 52, length: 7, content: 及沙門僧肇曇順, WYG: 共譯十誦都畢支曰吾當更行無律敎處於是遊化餘方不知所卒毘婆羅論曰善分别戒名為毘尼藏大智論曰諸羅漢問誰能明了集毘尼藏皆言優婆離持律苐一請就師子坐問佛在何處説初毘尼戒優婆離言我聞佛在毘舎離爾時湏隣那迦藍陀長者子初犯戒以是因縁故結初罪如是二百五十戒義三部七法八法尼律増一開雜部菩部如是}
