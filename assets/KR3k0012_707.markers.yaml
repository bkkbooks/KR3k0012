  - {type: variant, offset: 2279, length: 0, content: '', WYG: 記曰趙飛燕為皇后其女弟上遺鴛鴦被晉陸雲與兄機書曰一日按行曹公器物有寒夏被有七枚海内先賢傳曰姜肱字伯淮事繼母年少肱兄弟感凱風之孝同被而寢不入室以慰母心也邊讓别傳曰讓字元禮才辯俊逸孔融薦於魏武曰邊讓為九州之牧則不足為單衣襜褕則有餘益部耆舊傳曰王忳字少林於客舍見諸生疾甚困謂忳曰腰下有黃金十斤願以相與乞収藏屍骸未及問其姓名呼吸困絶忳賣金一斤以給棺柩餘九斤置生腰下後署大度亭長到亭有白馬一疋入亭中其日大風有一繡被隨風而來後忳乗馬馬突入金彦父家彦父見曰真得盗矣忳}
  - {type: page-break, offset: 2279, content: '', id: KR3k0012_WYG_707-13b, image: WYG0899/WYG0899-0306b.png}
  - {type: variant, offset: 2279, length: 0, content: '', krp: 記曰趙飛鷰爲皇后其女弟上遺鴛鴦𬒳晉陸雲與兄機書曰一日按行曹公器物有寒夏被七枚海内先賢傳曰姜肱字伯淮事繼母年少肱兄弟感凱風之孝同𬒳而寢不入室以慰母心也邊讓别傳曰讓字元禮才辯俊逸孔融薦於魏武曰邊讓爲九州之𬒳則不足爲單衣䄡則有餘益部耆舊傳曰王忳字少林於客舎見諸生疾甚困謂忳曰腰下有金十斤願以相與乞收藏屍骸未及問其姓名呼吸困絶忳賣金一斤以給棺柩餘九斤置生腰下後署大度亭長到亭有白大馬一疋入亭中其日大風有一繡𬒳隨風來而後忳乗馬馬突入金彦父家彦父見曰眞得盗矣忳}
