  - {type: variant, offset: 2244, length: 158, content: 在金屋太室以彩玉為床馬明先生別傳曰明生隨神女還岱宗石室中金床玉几西京雜說曰武帝為七寶床雜寶屏風別寶帳設於柱宮中時人謂為寶宮又曰昭陽殿設玉床又曰韓嫣以玳瑁為床拾遺錄曰董偃常臥延清之室畫石為床石文如畫體甚輕出郅支國上設紫瑠璃帳火齊屏風又曰石季倫屑沉水之香如塵沬布置象床上使所愛者踐之無跡則賜真珠百琲珠百枚曰琲若有跡者則節, SBCK: 問}
