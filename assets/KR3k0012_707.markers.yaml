  - {type: variant, offset: 1582, length: 5, content: 禇彥回詣愿, WYG: 枕歸之明夕復取其簮又以歸之齊師大駭還師而去越絶書曰越王問范子曰寡人已問隂陽之事榖之貴賤可得而知乎曰陽者主榖貴隂者主榖賤故當寒而不寒榖為之暴貴當温而不温榖為之暴賤王曰善書帛藏之枕中以為國寶范子曰堯舜禹湯皆有預見之明雖有㓙年而民不窮王曰善以丹書置之枕中以為邦貴東宫舊事曰皇太子納妃有龍頭髻枕銀環鉤副之蔡質漢官儀曰尚書郎直給通中枕西京雜記曰趙飛鷰為皇后其女弟上遺虎珀枕龜文枕拾遺録曰魏咸熈二年宫中夜夜有異或吼呼驚人乃有傷害者詔使宦者闇中伺候有白虎毛色淨宻以戈投虎即中左目俄而徃取虎已隱形更搜覓乃於藏中得一玉虎枕左目有血帝嗟其大異問諸大臣答云昔誅梁冀得玉虎枕一枚云此枕單池國所獻臆下有題云帝辛九年獻帝辛紂也金玉久而有神神仙傳曰泰山父者漢武帝東廵狩見父頭頂白光高數尺帝呼問之曰有道士教臣作神枕有三十二竅以應二十四氣八竅應八風臣行之轉少而齒生列異傳曰景初中咸陽縣吏王臣夜倦枕枕卧有頃聞竈下有呼曰承約何以不來頭下應曰我見枕不得動汝來就我飲至乃缶也集異記中曰劉𤣥暮忽見一人著烏袴褶取火照之面首有七孔面莽黧然乃請師筮之師曰此是君家先世物久則為魅劉因執縛以刀砍數下變為一枕乃是先祖時枕異苑曰滕放枕文石枕卧忽暴雷震其枕傍人莫不為之怖懾而放㣲覺有聲不怖也其所枕葢六安也楚宋玉髙唐賦曰宋玉嘗遊髙唐怠而晝寢夢見一婦人曰妾巫山之女願薦枕蓆司馬相如長門賦曰搏芳若以為枕蓆荃蘭而為香又美人賦曰髙茵重席角枕横施劉向别録曰向有芳松枕賦後漢張紘瓌林枕賦曰有卓爾之珠瓌超詭異以邈絶且其色也如芸之黄其為香也如蘭之芳其文彩也霜地金莖紫葉而紅榮蔡邕警枕銘曰應龍蟠蟄潛徳保靈制器像物示有其形哲人降鑒居安慮傾崔駰六安枕銘曰枕有規矩恭一其徳承元寧躬終始不忒六安言六面安也蘇彦楠榴枕銘曰珍木之竒文鬱理鮮廉稜方正密滑貞堅卞敬宗作無患枕讃無患木名也又言枕之無患也江文通詩曰撫枕懐百慮被說文曰衾大被也釋名曰被所以被覆人也衾也其下廣大如岸之受人也論語曰必有寢衣長一身有半詩曰錦衾爛兮又曰肅肅宵征抱衾與裯傳曰楚子次于乾谿雨雪楚王皮冠秦復陶翠被豹舄皮鞭以出史記曰王章字仲卿疾無被卧牛衣中又曰汲黯曰公孫𢎞位至三公俸禄甚厚為布被此詐也上問𢎞𢎞謝曰有之夫九卿與臣善者無黯過然今日廷詰臣誠中臣之病夫以三公為布被餙詐以釣名且臣聞管仲相齊有三歸侈擬於君桓公亦覇晏嬰相景公食不重肉妾不衣絲齊國亦治今臣位為御史大夫而為布被自九卿以下至小吏無差誠如黯言且無汲黯忠陛下安聞此言天子以為謙讓愈益厚之漢書曰廣川王去疾妃昭信甚妒王愛姬陶望卿昭信妒之譛於王曰望卿有姦因即言郎中令卧錦被王信之繫殺之又曰李夫人疾篤上自臨候之夫人䝉被謝曰妾久寢病形貌壊不可見帝願以王及兄弟為託又曰霍光薨詔賜繡被百領後漢書曰祭遵奉公家無私財布被夫人裳不加綵又曰宣乘性節儉常服布被蔬食華嶠後漢書曰樂崧為郎獨宿直臺上無被帝推被與之袁山松後漢書曰范丹為莱蕪長去官無被空囊自隨也謝承漢書曰京兆朱寵字仲威為太尉家貧卧布被朝廷賜錦被卧兼布被又曰羊續字興祖為南陽太守以清率下唯卧一幅布綯敗糊紙補之東觀漢記曰王良為大司徒在位清儉妻子不入官舍布被瓦器又曰馮豹字仲文後母惡之嘗因豹夜卧引刀砍之正值其起中被獲免又曰馮豹每奏事未報嘗卧省門下或從昏至明天子黙使小黃門持被覆之曰勿驚之漢官典職曰尚書郎入直供青練白綾被或錦被魏書曰文帝詔朝臣三代大夫知被服五代大夫知飲食此言被服飲食難曉也晉陽秋曰景帝有目疾文鴦之來攻驚而目出懼六軍恐䝉以被痛甚齧被破晉書曰魏舒為尚書郎時欲沙汰即官有非其才者罷之舒乃曰吾即其人也襆被徑出論者咸有愧色又曰楊駿被誅初駿徴髙士孫登遺以布被登截被於門外大呼曰砍判旬日託疾死及是其言果騐又曰光逸字孟祖為博昌小吏令使之冐雨還令}
