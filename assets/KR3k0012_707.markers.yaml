  - {type: variant, offset: 1582, length: 5, content: 禇彥回詣愿, SBCK: 枕歸之明夕復取其簮又以歸之齊師大駭還師而去越絶書曰越王問范子曰寡人巳問隂陽之事􅂖之貴賤可得而知乎曰陽者主􅂖貴隂者主􅂖賤故當寒而不寒􅂖爲之􅁀貴當温而不温者􅂖爲之􅁀賤王曰善書帛藏之枕中以爲國寳范子曰堯舜禹湯皆有預見之明雖有凶年而民不窮王曰善以丹書置之枕中以爲􅀖貴東宫舊事曰皇太子納妃有龍頭舊髻枕銀鐶鈎副之蔡質漢官儀曰尚書郎直給通中枕西京􅄂記曰趙飛燕爲皇后其女弟上遺虎珀枕􅀛文枕拾遺録曰魏咸熈二年宫中夜夜有異或吼呼驚人乃有傷害者詔使宦者闇中伺候有白虎毛色净宻以戈投虎即中左目俄而往取虎巳隱形更搜覔乃於藏中得一玉虎枕左目有血帝嗟其大異問諸大臣荅云昔誅梁兾得玉虎枕一枚云此枕單池國所獻臆下有題云帝辛九年獻帝辛紂也金玉乆而有神神仙傳曰㤗山父者漢武帝東廵狩見父頭頂白光髙數尺帝呼問之曰有道士教臣作神枕枕有三十二物二十四物以應二十四氣八物應八風臣行之轉少而齒生列異傳曰景􅀄中咸陽縣吏王臣夜倦枕枕卧有頃聞􅍳下有呼曰文納何不以之頭下應曰我見枕不得動汝來就我至乃飲􅇲也集異記曰中山劉玄暮忽見一人着烏袴褶取火照之靣首無七孔靣莽黨然乃請師筮之師曰此是君家先丗物乆則爲魅劉因執􅅞刀斫數下變爲一枕乃是其先祖時枕異苑曰滕放枕文石枕卧忽􅁀雷震其枕傍人莫不爲之怖懾微􅁴有聲不爲驚也楚宋玉髙唐賦曰楚王嘗遊髙唐怠而晝寢夢見一婦人曰妾巫山之女也願薦椀蓆司馬相如長門賦曰􅅮芳若以爲枕席荃蘭而爲香又美人賦曰髙茵重設角枕横施劉向別録曰向有芳松枕賦後漢張紘瓌林枕賦曰有卓爾之殊瓌超詭異以邈絶且其色也如芸之黄其爲香也如蘭之芳其文綵也霜地金莖紫葉而紅榮蔡邕警枕銘曰應龍蟠蟄潜德保靈制器像物示有其形哲人降鑒居安慮傾崔駰六安枕銘曰枕有規矩恭一其德承元寕躬終始不􅑯六安言六靣安也蘇彦楠榴枕銘曰珎木之竒文鬰理鮮廉稜方正宻滑貞堅卞敬宗作無患枕讃無患木名也言人枕之無患也江文通詩曰撫枕懷百慮􅀍說文曰衾大被也釋名曰􅀍所以􅀍覆人也衾也其下廣大如岸一受人也論語曰必有寢衣長一身有半詩曰錦衾爛􅀆又曰肅肅霄征抱衾與裯裯單􅀍也傳曰楚子次于乾谿􅀨雪楚王皮冠􅁗復陶翠被豹舄執鞭以出史記曰王章字仲卿疾無􅀍卧牛衣中又曰汲黯曰公孫弘位至三公俸禄甚厚爲布􅀍此詐也上問弘弘謝曰有之夫九卿與臣善者無過黯然今日廷詰臣誠中臣之病夫以三公爲布􅀍飾詐以釣名且臣聞管仲相齊有三歸侈擬於君桓公亦霸晏嬰相景公食不重肉妾不衣􅁝齊國亦治今臣位爲御史大夫而爲布􅀍自九卿以下至小吏無差誠如黯言且無汲黯申之陛下安聞此言天子以爲謙讓愈益厚之漢書曰廣川王去疾妃昭信甚砳王愛􅁎陶望卿昭信妬之譛於王曰望卿視有姦窺即言郎中令卧錦􅀍王信之擊殺之又曰李夫人病篤上自臨候之夫人蒙􅀍謝曰妾乆寢病形貌壞不可以見帝願以王及兄弟爲託又曰霍光薨詔賜繡􅀍百領後漢書曰􅀕遵奉公家無私財布􅀍夫人裳不加綵又曰宣秉性節儉常服布􅀍􅂼食華嶠後漢書曰樂崧爲郎獨宿眞臺上無􅀍帝推􅀍與之􅀽山松後漢書曰范丹爲萊蕪長去官無􅀍空囊自隨也謝承漢書曰京兆朱寵字仲威爲太尉家貧卧布􅀍朝廷賜錦􅀍卧兼布􅀍又曰羊續字興祖爲南陽太守以清率下唯卧一幅布綯敗糊􅁓􅀘之綯與禂同東觀漢記曰王良爲大司徒在位恭儉妻子不入官舎布被瓦器又曰馮豹字仲文後母惡之嘗因豹夜卧引刀斫之正值其起中􅀍獲免又曰馮豹毎奏事未報常服省閣下或從昏至明天子黙使小黄門持􅀍覆之曰勿驚之漢官典職曰尚書郎入直供青練白綾􅀍或錦被魏書曰文帝詔朝臣三代大夫知􅀍服五代大夫知飲食此言􅀍服飲食難曉也晉陽春秋曰景帝有目疾文鴦之來攻驚而目出懼六軍恐䝉以􅀍痛甚齧被破晉書曰魏舒爲尚書郎或有非其人論者欲有沙汰之言舒乃曰吾即其人也襆被徑出論者咸自愧之也又曰楊駿􅀍誅􅀄駿徴髙士孫登遺以布􅀍登截􅀍於門外大呼曰斫刾旬日託疾死及是其言果驗又曰光逸字孟祖爲博昌小吏令使之冒􅀨還令}
