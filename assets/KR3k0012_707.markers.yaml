  - {type: variant, offset: 1525, length: 1, content: 士, SBCK: 况重於此者也梁書曰王茂爲雍州長史人或譛茂反武帝弗之信令鄭紹叔徃候之遇其卧因問疾茂曰我病可耳紹叔曰都下殺害日甚使君家門塗炭今欲起義長史那猶卧茂因擲枕起即袴褶隨紹叔入見武帝唐書曰玄宗嘗製}
