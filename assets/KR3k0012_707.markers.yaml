  - {type: variant, offset: 3635, length: 136, content: 越城移此領軍府壘北樓與南掖門相對嘗登樓望戰城中遙見麾蓋縱神鋒弩射之矢貫胡床左右皆失色公則曰虜幾中吾腳談笑如初又曰侯景既篡位時著白紗帽而尚披青袍頭插象牙梳殿上常設胡床及荃蹄著鞾垂腳坐北齊書曰武成胡后與沙門曇獻通布金錢於獻席下又掛寶裝胡床於獻屋壁武成平生之所御者也庾肩吾賦胡床, SBCK: 後賔客絶百許日古}
