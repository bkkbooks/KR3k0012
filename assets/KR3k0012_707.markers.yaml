  - {type: variant, offset: 161, length: 181, content: 乃生男子載寢之床禮曰曾子寢疾樂正子春坐於床下曾元曾申坐於足童子隅坐而執燭童子曰華而睆大夫之簀與華蓋也簀床第也曾子曰然斯季孫之賜也我未之能易也元起易簀命元起也曾元曰夫子之病革音棘矣不可以變幸而至於旦請敬易之曾子曰爾之愛我也不如彼君子之愛人也以德細人之愛人也以姑息吾何求哉吾得正而斃焉斯已矣舉扶而易之反席未安而沒左傳曰齊無知弒其君殺孟陽于床注云陽小臣代公居床事具逐門, SBCK: 角枕粲􅀆錦衣爛􅀆}
