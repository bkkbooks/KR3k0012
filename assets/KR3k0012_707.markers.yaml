  - {type: variant, offset: 562, length: 4, content: 袁術僣號, SBCK: 樂崧天性朴忠家貧爲郎嘗獨直臺上無􅀍枕杫祉音思漬切謂爼九也蜀漢之郊日祉食糟糠帝毎夜入臺輙見崧問其故甚嘉之自此詔太常賜尚書以下朝夕飡給幃帳東觀漢記曰黄香事親暑則扇枕寒則以身温席後漢書曰魏髙昌有白塩其形如玉髙昌}
