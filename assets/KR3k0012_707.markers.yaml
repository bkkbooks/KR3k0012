  - {type: variant, offset: 1575, length: 5, content: 虞愿除後軍, SBCK: 貴妃姉虢國夫人豪侈尤甚所枕照夜枕不知其價夜中照廡其光如晝尸子曰孝子一夕五起視親衣之厚薄枕之髙下淮南子曰楚將子發好伎道之士有善偷者往見子發子發禮之無幾齊伐楚偷夜出盗其齊}
