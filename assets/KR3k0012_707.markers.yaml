  - {type: variant, offset: 2281, length: 2, content: 武帝, WYG: 卿有何隂徳因念塟諸生事且說形狀彦父曰真我子也忳即以被馬歸之彦父不受遣迎生喪金具存焉列女後傳曰江夏孟宗少遊學與同學共處母}
  - {type: variant, offset: 2281, length: 25, content: 武帝為七寶床雜寶屏風別寶帳設於柱宮中時人謂為寶宮又, krp: 卿有何隂德}
  - {type: variant, offset: 2284, length: 171, content: 七寶床雜寶屏風別寶帳設於柱宮中時人謂為寶宮又曰昭陽殿設玉床又曰韓嫣以玳瑁為床拾遺錄曰董偃常臥延清之室畫石為床石文如畫體甚輕出郅支國上設紫瑠璃帳火齊屏風又曰石季倫屑沉水之香如塵沬布置象床上使所愛者踐之無跡則賜真珠百琲珠百枚曰琲若有跡者則節其飲食令體弱故閨中相戲曰爾非細骨輕軀那得百琲真珠又曰頻斯國有楓林林東有大石室可容萬人坐壁上剋為三皇之像天皇, WYG: 作}
