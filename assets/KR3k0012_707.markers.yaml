  - {type: variant, offset: 3029, length: 516, content: 下則獨擅一榻須枕臥語無所為屈吳志曰周瑜薦魯肅孫權引肅合榻對飲言議宋議書曰當陽侯劉彥節既貴士子自非三署不得上方榻時以此少之又曰顏延之為祕書監光祿勳太常時沙門釋惠林以才學為文帝所賞朝廷政事多與之謀遂士庶歸仰上每引見常升獨榻延之甚嫉焉因醉曰昔子同驂乘表絲正色此三台之座豈可使刑餘居之上變色又曰五瞻字明遠一字叔鸞負氣慠俗好貶裁人物仕宋為王府參軍常詣劉彥節直登榻曰君侯是公孫僕是公子引滿促膝唯余二人彥節外雖酬之意甚不悅齊書曰孔休源字慶緒愽學為晉安王府長史甚得人譽王深相倚仗常於中齋別施榻云此是孔長史坐人莫得預焉其見敬如此馬魏書曰元順為吏部尚書右僕射上省登階向榻見榻甚故問都令史徐忤起曰此榻曾見先王坐順即哽塞涕泗交流久而不能言遂令換之梁書曰臨汝侯猷為益州頗僣濫客筵內遂有香燈都稜切不置連榻武帝知之以此為僣還都以憂愧成疾卒唐書曰玄宗命太常韋縚讀時令每月一篇每孟月朔日上御宣政殿側置一榻東置面案令韋縚坐而讀之又曰李峴為相元載於政事堂置榻邀宣事中官坐峴至叱左右去榻唐高士傳曰管寧自越海及歸常坐一木榻積五十餘年未嘗箕服榻上當膝處皆穿郭子曰杜預拜鎮南將軍朝士悉至客皆在連榻于稚舒後至曰杜元凱復以連榻坐客不坐便去列仙傳曰脩羊公者魏人也止華陰山石室有懸石榻臥, SBCK: 錦􅀍䝉}
