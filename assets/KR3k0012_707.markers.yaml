  - {type: variant, offset: 2536, length: 158, content: 誼所坐床也西征記曰金鄉焦氏山北有漢司隸校尉曾峻塚前有石床長八尺瑩摩鮮明叩之即鳴時太尉從事中郎傅珍之諮議參軍周室穆折石床各取一頭為曾氏之後所訟鄴中記曰石虎御床辟方三丈其餘床皆局腳高下六寸後宮別坊中有小形玉床又有轉關床射鳥獸異物志曰麡齎柴二音狼狀如麋而角向前入林則得之角正四據人因以作踞床異苑曰沙門支法存有八尺沉香板床剌, SBCK: 刺}
