  - {type: variant, offset: 443, length: 370, content: 起盧植征之連戰破賊張角等走保廣宗植築圍鑿塹造作雲梯垂當拔之帝遣小黃門左豊詣軍觀賊形勢或勸植以賂送豊植不肯豊還言於帝曰廣宗賊易破耳盧中郎固壘息軍以緩天誅帝怒遂檻車徵植袁山松後漢書曰朱儁擊黃巾賊趙弘於南陽斬之賊復以韓忠為師儁兵力少不能急攻乃先起土山以臨之因偽脩攻具曜兵於西南儁身自披甲將精卒乘其東北遂得入城忠乞降東觀漢記曰初王莽之遣王尋王邑也欲盛威武以震山東甲衛衝輣干戈旌旗戰攻之具甚盛後尋邑環昆陽城作營圍之數重雲車十餘文瞰城中或為地突或衝車撞城積弩射城中矢如雨下城中負戶而汲又曰伯升作攻城鬥車上曰兵法但有所圖畫者不可用伯升遂作後有司馬犯軍令當斬坐鬥車上又曰隗囂破後有五谿六種寇侵見便鈔掠退阻營塹來歙乃大治攻具衝車度塹遂與五谿戰大破之又曰吳漢常獨厲吏士治兵事上時令人視吳公何謂還言方脩攻具上曰吳公隱若一敵國矣魏志曰太祖戰不利復壁袁紹為高櫓起土山, SBCK: ''}
