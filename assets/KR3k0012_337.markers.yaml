  - {type: variant, offset: 1235, length: 0, content: '', SBCK: 于祖浦石頭城施鹿角以禦盧循司馬彪戰略曰遼東太守公孫淵反明帝召太尉司馬公討之軍到襄平公圍之北面東面有圍不合連車置水中積石鎮其上以鹿角塞之魏武帝表曰臣前遣討河内獲嘉諸屯􅀗生口辭云河内有一神人宋金生令諸屯皆云鹿角不湏守吾使狗爲汝守不從其言者即夜聞有軍兵聲明日視屯下但見虎跡臣輙部武猛都尉吕納將兵掩捉得生口輙行軍法諸􅁑亮教曰前到武都一日鹿角壞刀斧千餘枚頼賊巳走􅀂未走無所復用晉宣帝教曰今日當將作四千人東爲三軍作營壍壘又當將斧三百枚破樹木作鹿角塞諸郵漏處諸􅁑亮軍令曰敵以來進持鹿角兵悉却在連衝後敵巳附鹿角裏兵但得進踞以矛㦸刺之不得起住起住妨弩魏武軍䇿令曰夏侯淵今月賊燒都鹿角鹿角去本營十五里淵將四百兵行鹿角}
