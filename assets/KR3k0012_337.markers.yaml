  - {type: variant, offset: 1627, length: 2102, content: 月乃屠城斬誕又曰元嘉二十七年虜主佛狸遂攻圍懸瓠行汝南郡事廣陵陳憲嬰城自守虜多作高樓施弩以射城內飛矢雨下城中負戶以汲又毀佛圖取金像以為大鉤施之衝車端以牽樓作蝦蟆車以填塹憲督厲將士固女牆而戰賊死者屍與城等又曰偽燕主慕容超尚書郎張綱乞師於姚興自長安返太山守申宣執送之綱有巧思先是帝修攻具城上人曰汝不得張綱何能為也及至升諸樓車以示之故城內莫不失色超既求救不獲綱反見虜乃求稱藩割大峴為界獻馬千疋不聽又曰十月張綱修攻具成設飛樓懸梯木幔板屋冠以皮弓矢無所用之劉毅遣上黨太守趙恢以千餘人來援帝夜潛遣軍會之明旦恢眾五千方道而進每晉使將到輒復如之六年二月丁亥屠廣固孫嚴宋書曰柳元景等北討諸軍攻具進兵城下偽弘農太守李初古拔嬰城自固諸軍鼓噪陵城衝車四臨數道俱攻先登生擒李初古拔沈休文宋書曰晉安王子勛反以殷琰督豫州刺史大宋遣輔國將軍劉勔用草茅苞土擲以塞塹城內以火箭射之草未及燃後土續至塹便欲滿隊主趙法進計以鐵珠子灌之珠子流滑悉緣隙得入草於是火然勔乃作大蝦蟆車載土牛皮蒙之三百人推以塞塹琰戶曹參軍虞挹之造拋車擊之以石車悉破壞宋起居注曰劉道符露板曰七月二十日部率眾車虎士攻城鉤車至城東南樓下逆賊程天祚等道窮數迫仍乞降附齊書曰殷琰反帝遣輔國將軍劉勔西討之築長圍創攻道於東南角并作大蝦蟆車載土牛皮蒙之百人推以塞壍琰乃始降三國典略曰侯景作尖項木驢攻城石不能破也羊侃作雉尾炬灌以膏臘取擲焚之乃退梁書曰侯景為曲頂木驢攻城矢石所不能制羊侃作短尾炬施鐵鏃以油灌之擲驢上焚之俄盡賊又東西起二土山以臨城城中震駭侃命為地道潛引其土山不能立又作登城樓高十餘丈欲臨射城中侃曰車高壍虛彼來必倒可臥而觀之及車動果倒眾皆服焉賊既頻攻不捷乃築長圍朱异張綰議出擊之帝以問侃侃曰不可賊多日攻城既不能下故立長圍欲引城中降者耳今擊之出人若少不足當賊若多則一旦失利門隘橋小必大致挫衂不從遂使千餘人出戰未及交鋒望風退走果以爭橋赴水死者太半矣隋書曰遼東之役何稠攝右屯衝將軍領御營弩手三萬人時工部尚書宇文愷造遼水橋不成師未得濟右屯衝大將軍麥鐵杖因而遇害帝遣稠造橋二日而就初稠製行殿及六合城至是帝於遼左與賊相對夜中施之其城周迴八里城及女垣各高十仞上布甲士立仗建旗四隅置闕面別一觀觀下三門遲明而畢高麗望見謂若神功是歲加金紫光祿大夫唐書曰姜礭為交何道行軍副總管率眾數千先大軍出伊吾趣柳城谷依山採木造攻城器械其地有班超紀功碑礭磨去其文刊頌國功而去陶公故事曰臣侃言郭默狂狡肆行凶虐負阻城險用稽天誅臣土山陵其城樓櫓攻具備設宋先朝故事曰慕容超大將垣遵踰城歸順高祖使遵等治攻城橦車築長圍高三丈外三重壍周遷輿服雜事曰轒轀今之橦車也其下四輪從中權之至敵城下又曰漢世祖造大戰車駕數牛上設樓櫓置疆塞之外以拒匈奴酈善長水經注曰交州刺史檀和之軍次區粟進逼城飛梯雲橋懸樓登壘鉦鼓大作風烈火颺城摧眾陷斬區粟王范扶龍首十五已上坑截無赦太公六韜曰凡三軍有大器攻圍邑有轒轀臨衝城中則有雲梯飛樓又曰凡三軍行師領眾旦則有雲梯遠望夜則有雲火萬炬又曰武王寢疾十日太公負王乃駕騖窴之車周旦為御至于孟津大黃參連弩大才扶咠車並戰具也飛鳧赤莖白羽以鐵為首雷影青莖赤羽以銅為首副也晝則為光夜則為星方頭鐵搥重八斤亦軍備也大柯斧重八斤一名鐵鉞軍備也行馬廣二丈二十具渡溝飛橋廣五尺轉關鹿盧八具天舡一名天潢以濟丈水也鷹爪方凶鐵把柄長七尺天陣日月斗柄杓左一右一仰背天陣地陣丘陵水泉有左右前後之利人陣車馬文武積楹臨衝攻城國邑雲梯飛樓視城中也武衝大櫓三軍所須雲火萬炬以防火也吹鳴箛威振萬里也太公金匱曰武王問太公今民吏未安賢者未定何以安之太公曰不須兵器可以守國耒耜是其弓弩鋤耙是其矛戟簦笠是其兜鍪鏁斧是其攻具太公覆車拭法曰諸出軍行將屯營置陳必法天之圓法北辰為上將角為衝車訾為鈇鉞敵當衝車者敗當鈇鉞者亂又曰諸出軍行將屯守攻陳設壇祠禱戎器皿塗金鼓神攻具必以斗加四季時令朱雀所居神與今日日上神王相而克莊子曰梁麗可衝城不可以室穴言殊器也墨子曰備衝法絞善麻長八丈內有大樹則擊之用斧長六尺令有力者斬之又曰墨子自齊至郢見楚王楚王曰公輸般為我雲梯取宋矣墨子乃見公輸般解帶為城以褋為械公輸九設攻城之具機變墨子九拒之械盡墨子禦有餘公輸屈曰吾知拒子矣墨子曰子不過欲殺臣臣之弟子禽滑氂三百人已持臣守禦之器在宋城上而待楚矣又曰禽子問雲梯既施為之柰何墨子曰雲梯者重器也矢石沙炭以雨之薪火湯水以濟之如此則雲梯之功敗尸子又載般為蒙天之階階成將以攻宋墨子請獻十金般曰吾義固不殺人墨子再拜傅子序馬鈞曰鈞石車敵人於樹邊懸濕牛皮中之則墮石不能連續而欲作一輪懸大石數十以機鼓輪為常則懸石飛擊敵城使首尾電至嘗試以車輪懸瓴數十飛之數百步矣曹植征東賦曰循櫓於清流汜雲梯而容與禽元帥于中舟振靈威於東野陳琳武軍賦序曰廻天軍於易水之陽以討瓚焉鴻溝參周鹿菰十里荐之以棘迺建脩櫓于青霄竁深隧下三泉飛梯雲衝神鉤之具不在吳孫之篇三略六韜之術者凡數十事祕莫得聞也乃作武軍賦曰鉤車轇轕九牛轉牽雷呴激折櫓倒垣其攻也則飛梯行臨雲閣虛構上通紫霓下過三壚繁欽為史叔良作移零陵檄曰金鼓震天丹旗曜野巨堙既設袁宏祖逖碑曰逖為豫州刺史薨時君柩未旋群寇圍城衝櫓既附城將降矣勇士五百撫戈同泣非祖侯之為吾誰為死并力齊赴卷甲宵起遂陷堅陣負伐而反, WYG: ''}
