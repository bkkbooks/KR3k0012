  - {type: variant, offset: 856, length: 11, content: 伯道守陳倉城為諸葛亮所, SBCK: 仲權爲偏將軍大和中在長安及子午之役霸占爲前鋒蜀人望知其是霸也指下兵攻之霸手戰鹿角間頼救然後解魏志曰徐晃討關羽於樊羽自將歩􅀐五千出戰晃擊之退走遂追與俱入}
  - {type: variant, offset: 856, length: 2, content: 伯道, WYG: 仲權為偏將軍太和中在長安及子午之役霸召為前鋒蜀人望知其是霸也指下兵攻之霸手戰鹿角間賴救至然後解魏志曰徐晃討雲長於樊關自將歩騎五千出戰晃擊之退走遂追與俱入圍破之或自投沔水死魏太祖令曰賊為壍鹿角十重將軍致戰全勝遂陷賊圍將軍之功踰孫武穰苴虞溥江表傳曰曹公出濡湏甘寧拔曹公鹿角踰壘入斬數十人王隠晉書曰馬隆為武威太}
  - {type: page-break, offset: 856, content: '', id: KR3k0012_WYG_337-8a, image: WYG0896/WYG0896-0039a.png}
