  - {type: variant, offset: 49, length: 0, content: '', SBCK: 梯首冠雙轆轤枕城而上謂之飛雲梯又曰大木爲牀下安四獨輪床上建􅀟陛間撗括中立獨竿首如桔槹狀其竿髙下長短大小以城爲凖竿首以窠盛石大小多少隨力所制人挽其端投之其推轉逐便而用之亦可埋脚著地而用其旋風四脚亦隨事而用之謂之抛車又曰作轉軸車車上定十二石弩以䥫鈎縄連轉車行軸轉引弩持滿弦挂牙上弩爲七衢中衢大箭一鏃刄長七寸廣五寸箭簳長三尺圍五寸以鐵鍱音業爲羽左右各三箭次小於中箭其牙一發諸箭齊起及七百歩所中城壘無不摧隕樓櫓亦顚墜謂之車弩又曰以木爲脊長一丈徑一尺五寸下安六脚下闊而上尖髙七尺内可容六人以濕牛皮蒙之人蔽其下舁直抵城下木石鐵火所不能敗用攻其城謂之尖頭木驢又曰於城外起土爲山乗城而上古謂之土山今之壘道用生牛皮作小屋并四面蒙之屋中置運土人以防攻擊}
  - {type: page-break, offset: 49, content: '', id: KR3k0012_SBCK_337-1b}
  - {type: page-break, offset: 49, content: '', id: KR3k0012_SBCK_337-2a}
  - {type: variant, offset: 49, length: 0, content: '', WYG: 梯首冠雙轆轤枕城而上謂之飛雲梯又曰大木為牀下安四獨輪牀上建雙陛間横括中立獨竿首如桔橰狀其竿髙下長短大小以城為凖竿首以窠盛石大小多少隨力所制人挽其端投之其推轉逐便而用之亦可埋脚著地而用其旋風四脚亦隨事而用之謂之抛車又曰作轉軸車車上定十二日弩以鐵鉤繩連轉車行軸轉引弩持滿弦推牙上弩為七衢中衢大箭一鏃刃長七寸廣五寸箭簳長三尺圍五寸以鐵鍱音常為羽左右各三箭次小於中箭其牙一發諸箭齊起及七百歩所攻城壘無不摧損樓櫓亦顛墜謂之車弩又曰以木為脊長一丈徑一尺五寸下安六脚下濶而上尖髙七尺内可容六人以濕牛皮蒙之人蔽其下畀直抵城下木石鐵火所不能敗用攻其城謂之尖頭木驢又曰於城下起土為山乗城而上古謂之土山合之壘道用生牛皮作小屋并四面蒙之屋中置運土人以防攻擊}
