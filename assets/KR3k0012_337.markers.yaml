  - {type: variant, offset: 149, length: 451, content: 將輪有刃衡著劍以相振懼宋均曰衡陷敵之車也輪有刃鑿輪著刃也衡馬軛也後漢書曰王尋王邑攻光武嚴尤說王邑曰昆陽城小而堅今假號者在宛函進大兵亟急也紀力切彼必奔走宛敗昆陽自服邑曰吾昔以虎牙將軍圍翟義坐不生得以見責讓翟義字文仲方進少子為東郡太守王莽居攝義心惡之乃立東平雲子義自號柱天大將軍以誅莽乃使孫建王邑等將兵擊義破之義士自殺故坐不生得今將百萬之眾遇城而不能下何謂耶遇或謂過也遂圍之數十重列營百數雲車十餘丈雲車即樓車稱雲其高也昇之以望敵備墨子云般輸為雲梯之械瞰臨城中俯視曰瞰旗幟蔽野廣雅曰幟幡也埃塵連天鉦鼓之聲聞數百里說文曰鉦鐃也似鉦或為地道衝輣撞城衝撞車也詩臨衝閑閑許慎曰輣樓車也輣步耕切又曰黃巾賊起盧植征之連戰破賊張角等走保廣宗植築圍鑿塹造作雲梯垂當拔之帝遣小黃門左豊詣軍觀賊形勢或勸植以賂送豊植不肯豊還言於帝曰廣宗賊易破耳盧中郎固壘息軍以緩天誅帝怒遂檻車徵植袁山松後漢書曰朱儁擊黃巾賊趙弘於南陽斬之賊復以韓忠為師儁兵力少不能急攻乃先起土山以臨之因偽脩攻具曜兵於西南儁身自披甲將精卒乘其東北遂得入城忠乞降東觀漢, WYG: 本}
