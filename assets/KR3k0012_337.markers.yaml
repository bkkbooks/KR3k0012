  - {type: variant, offset: 856, length: 11, content: 伯道守陳倉城為諸葛亮所, krp: 仲權爲偏將軍大和中在長安及子午之役霸占爲前鋒蜀人望知其是霸也指下兵攻之霸手戰鹿角間頼救然後解魏志曰徐晃討關羽於樊羽自將歩騎五千出戰晃擊之退走遂追與俱入}
