  - {type: variant, offset: 1273, length: 353, content: 國春秋曰吳王皓聞師之將興也乃使劉恪守牛渚使張悌造攻車於戲場又曰劉𥙿攻南燕得燕人張綱治攻具既成設飛橋懸梯被以牛皮火石不能害攻城之士得肆力焉和范漢趙記曰麟嘉三年太子粲討趙同郭默於洛陽默使耿稚等夜北渡河襲太子營飛梯騰柵而入太子勒兵於東北穿柵而出又曰光初二年石勒召幽冀之眾十餘萬人造攻車飛梯攻平陽小城今上遣騎萬五千曳柴楊塵曀於山谷尋汾州向平陽內外擊之勒師潰高閭燕志曰光始五年春慕容熙與符后征高麗至遼東為衝車馳道以攻之崔鴻前涼錄曰麻秋晉攻抱罕圍塹數重雲梯拋車地突百道皆通於內亦起雲梯拋車穿地以應之秋眾傷數萬崔鴻後涼錄曰將軍竇茍從呂光攻龜茲每登雲梯入地道墜落蘇而復上車頻秦書曰茍長圍襄陽作飛雲車攻城剋之沈約宋書曰竟陵王誕據廣陵反世祖使慶之塞塹造道立行樓土山并諸攻具時夏雨不得攻城上使御史中丞庾徽之奏慶官以激之自四月至于, WYG: ''}
