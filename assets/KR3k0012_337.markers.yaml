  - {type: variant, offset: 1817, length: 258, content: 千疋不聽又曰十月張綱修攻具成設飛樓懸梯木幔板屋冠以皮弓矢無所用之劉毅遣上黨太守趙恢以千餘人來援帝夜潛遣軍會之明旦恢眾五千方道而進每晉使將到輒復如之六年二月丁亥屠廣固孫嚴宋書曰柳元景等北討諸軍攻具進兵城下偽弘農太守李初古拔嬰城自固諸軍鼓噪陵城衝車四臨數道俱攻先登生擒李初古拔沈休文宋書曰晉安王子勛反以殷琰督豫州刺史大宋遣輔國將軍劉勔用草茅苞土擲以塞塹城內以火箭射之草未及燃後土續至塹便欲滿隊主趙法進計以鐵珠子灌之珠子流滑悉緣隙得入草於是火然勔乃作大蝦蟆車載土牛皮蒙之三百人推以塞塹琰戶曹參軍虞挹之造拋車擊之以石車悉破壞, SBCK: 搶斷截衢巷}
