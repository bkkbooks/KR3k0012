  - {type: variant, offset: 3415, length: 314, content: 金般曰吾義固不殺人墨子再拜傅子序馬鈞曰鈞石車敵人於樹邊懸濕牛皮中之則墮石不能連續而欲作一輪懸大石數十以機鼓輪為常則懸石飛擊敵城使首尾電至嘗試以車輪懸瓴數十飛之數百步矣曹植征東賦曰循櫓於清流汜雲梯而容與禽元帥于中舟振靈威於東野陳琳武軍賦序曰廻天軍於易水之陽以討瓚焉鴻溝參周鹿菰十里荐之以棘迺建脩櫓于青霄竁深隧下三泉飛梯雲衝神鉤之具不在吳孫之篇三略六韜之術者凡數十事祕莫得聞也乃作武軍賦曰鉤車轇轕九牛轉牽雷呴激折櫓倒垣其攻也則飛梯行臨雲閣虛構上通紫霓下過三壚繁欽為史叔良作移零陵檄曰金鼓震天丹旗曜野巨堙既設袁宏祖逖碑曰逖為豫州刺史薨時君柩未旋群寇圍城衝櫓既附城將降矣勇士五百撫戈同泣非祖侯之為吾誰為死并力齊赴卷甲宵起遂陷堅陣負伐而反, SBCK: 七}
