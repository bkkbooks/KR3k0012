  - {type: variant, offset: 867, length: 0, content: '', WYG: 復用晋宣帝教曰今日當將作四子人東為三軍作營塹壘又當將斧三百枚破樹木作鹿角塞諸郵漏處諸葛亮軍令曰敵以來進持鹿角兵悉却在連衝後敵已附鹿角裏兵但得進踞以矛㦸刺之不得此住起住妨弩魏武軍䇿令曰夏侯淵今月賊燒却鹿角鹿角去本營十五里淵將四百兵行鹿角因使士補之賊山上望見從谷中卒出淵使兵與鬬賊遂繞出其後兵退而淵未至甚可傷淵本非能用兵也軍中呼為白地將軍為督帥尚不當親戰况補鹿角乎王曠與楊州論討陳敏計曰賊今下屯固横江又云復據烏江皆塹壘彭排鹿角歩安嚴峻以襲歴陽諸軍辛昞洛戍時與桓郎牋曰桓振武今下官將千二百人掩襲營值天洪雨噐仗沾濕塹廣深丈餘鹿角五重樓櫓嚴設自四更三唱攻逼至小食時不剋箛槍張楫廣雅曰􅀢謂之箛槍服䖍通俗文曰剡葦傷盗謂之槍何承天纂文曰􅀢謂箛槍謝靈運自理表曰星言奔馳歸滑陛下及經山隂也方衛彰赫彭排馬捨斷截衢巷宋起居注曰㤗始三年有司奏賊帥劉胡等旋南城蘭道令馬歩萬餘人樹排槍陌山從東五道直來攻營杜預秦川軍事曰臣嘗聞邊人説虜專以騎為冦穿塹不如作馬塪馬塪法坑方三尺錯平穿之虜騎非下馬平治則終不得入又其外蹊要路亦可隨作摀施槍塪中訖薄覆其上如此則虜當築地而行不敢輙徃來也蔡謨與何驃騎書曰公失櫓上人吾亦具之矣在深草中立櫓無故以樐自標令賊見之而自不得見賊賊不病癡何故不來取耶今令數百歩内皆露見布竹箛如蝟毛賊不能飛何得卒至邪弋張揖埤蒼曰栱大弋也許慎説文曰樴弋也橜弋也太公六韜曰委環鐵弋鐵長三丈三尺左傳曰齊人戰獲臧堅使宿沙衛唁之曰無死堅曰使刑臣禮於士以杙抉其傷而死司馬彪戰畧曰遼東太守公孫淵反太尉司馬討之軍到襄平去城百步穿重塹豎連栅安諸營立樓櫓其近水沙地不得作}
