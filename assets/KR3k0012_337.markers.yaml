  - {type: variant, offset: 2082, length: 305, content: 符露板曰七月二十日部率眾車虎士攻城鉤車至城東南樓下逆賊程天祚等道窮數迫仍乞降附齊書曰殷琰反帝遣輔國將軍劉勔西討之築長圍創攻道於東南角并作大蝦蟆車載土牛皮蒙之百人推以塞壍琰乃始降三國典略曰侯景作尖項木驢攻城石不能破也羊侃作雉尾炬灌以膏臘取擲焚之乃退梁書曰侯景為曲頂木驢攻城矢石所不能制羊侃作短尾炬施鐵鏃以油灌之擲驢上焚之俄盡賊又東西起二土山以臨城城中震駭侃命為地道潛引其土山不能立又作登城樓高十餘丈欲臨射城中侃曰車高壍虛彼來必倒可臥而觀之及車動果倒眾皆服焉賊既頻攻不捷乃築長圍朱异張綰議出擊之帝以問侃侃曰不可賊多日攻城既不能下故立長圍欲引城中降者耳今擊之出人若少不足當賊若多則一旦失利門隘橋小必大致挫衂不從遂使千, SBCK: 領馬歩萬}
  - {type: variant, offset: 2082, length: 305, content: 符露板曰七月二十日部率眾車虎士攻城鉤車至城東南樓下逆賊程天祚等道窮數迫仍乞降附齊書曰殷琰反帝遣輔國將軍劉勔西討之築長圍創攻道於東南角并作大蝦蟆車載土牛皮蒙之百人推以塞壍琰乃始降三國典略曰侯景作尖項木驢攻城石不能破也羊侃作雉尾炬灌以膏臘取擲焚之乃退梁書曰侯景為曲頂木驢攻城矢石所不能制羊侃作短尾炬施鐵鏃以油灌之擲驢上焚之俄盡賊又東西起二土山以臨城城中震駭侃命為地道潛引其土山不能立又作登城樓高十餘丈欲臨射城中侃曰車高壍虛彼來必倒可臥而觀之及車動果倒眾皆服焉賊既頻攻不捷乃築長圍朱异張綰議出擊之帝以問侃侃曰不可賊多日攻城既不能下故立長圍欲引城中降者耳今擊之出人若少不足當賊若多則一旦失利門隘橋小必大致挫衂不從遂使千, krp: 領馬歩萬}
