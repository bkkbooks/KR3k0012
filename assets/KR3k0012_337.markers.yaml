  - {type: variant, offset: 2817, length: 304, content: 凡三軍行師領眾旦則有雲梯遠望夜則有雲火萬炬又曰武王寢疾十日太公負王乃駕騖窴之車周旦為御至于孟津大黃參連弩大才扶咠車並戰具也飛鳧赤莖白羽以鐵為首雷影青莖赤羽以銅為首副也晝則為光夜則為星方頭鐵搥重八斤亦軍備也大柯斧重八斤一名鐵鉞軍備也行馬廣二丈二十具渡溝飛橋廣五尺轉關鹿盧八具天舡一名天潢以濟丈水也鷹爪方凶鐵把柄長七尺天陣日月斗柄杓左一右一仰背天陣地陣丘陵水泉有左右前後之利人陣車馬文武積楹臨衝攻城國邑雲梯飛樓視城中也武衝大櫓三軍所須雲火萬炬以防火也吹鳴箛威振萬里也太公金匱曰武王問太公今民吏未安賢者未定何以安之太公曰不須兵器可以守國耒耜是其弓弩鋤耙是其矛戟簦笠是其兜鍪鏁斧是其攻具太公覆車拭法曰諸出軍行將屯營置, SBCK: 賀齊討賊}
