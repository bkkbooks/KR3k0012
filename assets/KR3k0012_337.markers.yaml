  - {type: variant, offset: 80, length: 1, content: 獻, SBCK: 爲号令魏武本紀曰上與􅀽紹軍}
  - {type: variant, offset: 80, length: 68, content: 獻於楚楚子使反其言三而後許登諸樓車所謂雲梯使呼宋人而告遂致其君命楚子舍之以歸春秋感精符曰齊晉並爭吳楚更謀不守諸侯之節競行天子之事作衡車厲, WYG: 為號令魏}
  - {type: variant, offset: 80, length: 1, content: 獻, krp: 爲号令魏武本紀曰上與袁紹軍}
  - {type: variant, offset: 82, length: 360, content: 楚楚子使反其言三而後許登諸樓車所謂雲梯使呼宋人而告遂致其君命楚子舍之以歸春秋感精符曰齊晉並爭吳楚更謀不守諸侯之節競行天子之事作衡車厲武將輪有刃衡著劍以相振懼宋均曰衡陷敵之車也輪有刃鑿輪著刃也衡馬軛也後漢書曰王尋王邑攻光武嚴尤說王邑曰昆陽城小而堅今假號者在宛函進大兵亟急也紀力切彼必奔走宛敗昆陽自服邑曰吾昔以虎牙將軍圍翟義坐不生得以見責讓翟義字文仲方進少子為東郡太守王莽居攝義心惡之乃立東平雲子義自號柱天大將軍以誅莽乃使孫建王邑等將兵擊義破之義士自殺故坐不生得今將百萬之眾遇城而不能下何謂耶遇或謂過也遂圍之數十重列營百數雲車十餘丈雲車即樓車稱雲其高也昇之以望敵備墨子云般輸為雲梯之械瞰臨城中俯視曰瞰旗幟蔽野廣雅曰幟幡也埃塵連天鉦鼓之聲聞數百里說文曰鉦鐃也似鉦或為地道衝輣撞城衝撞車也詩臨衝閑閑許慎曰輣樓車也輣步耕切又曰黃巾, SBCK: 官度}
  - {type: variant, offset: 82, length: 6, content: 楚楚子使反其, krp: 官度賊射營中行者皆𬒳田衆皆恐上令傳}
