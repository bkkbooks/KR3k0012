  - {type: variant, offset: 49, length: 0, content: '', krp: 梯首冠雙轆轤枕城而上謂之飛雲梯又曰大木爲牀下安四獨輪床上建雙陛間撗括中立獨竿首如桔槹狀其竿髙下長短大小以城爲凖竿首以窠盛石大小多少隨力所制人挽其端投之其推轉逐便而用之亦可埋脚著地而用其旋風四脚亦隨事而用之謂之抛車又曰作轉軸車車上定十二石弩以䥫鈎縄連轉車行軸轉引弩持滿弦挂牙上弩爲七衢中衢大箭一鏃刄長七寸廣五寸箭簳長三尺圍五寸以鐵鍱音業爲羽左右各三箭次小於中箭其牙一發諸箭齊起及七百歩所中城壘無不摧隕樓櫓亦顚墜謂之車弩又曰以木爲脊長一丈徑一尺五寸下安六脚下闊而上尖髙七尺内可容六人以濕牛皮蒙之人蔽其下舁直抵城下木石鐵火所不能敗用攻其城謂之尖頭木驢又曰於城外起土爲山乗城而上古謂之土山今之壘道用生牛皮作小屋并四面蒙之屋中置運土人以防攻擊}
  - {type: variant, offset: 50, length: 0, content: '', SBCK: 土山則孫子所謂距閩鑿地爲道行於城下用攻其城徃徃建柱積薪於柱間而燒之柱折城摧謂之地道又曰以八輪車上樹髙竿竿上安轆轤以䋲挽板屋上竿首以窺城中版屋方四尺髙五尺有十二孔四面列布車可進退圜城而行於營中逺視亦謂之巢車如鳥之巢即今之版屋}
  - {type: variant, offset: 50, length: 0, content: '', WYG: 土山則孫子所謂距閩鑿地為道行於城下用攻其城徃徃建柱積薪於柱間而燒之柱折城摧謂之地道又曰以八輪車上樹髙竿竿上安轆轤以繩挽板屋上竿首以窺城中版屋方四尺髙五尺有十二孔四面列布車可進退城而行於營中逺視亦謂之巢車如鳥之巢即今之版屋}
  - {type: page-break, offset: 50, content: '', id: KR3k0012_WYG_337-3a, image: WYG0896/WYG0896-0036c.png}
  - {type: variant, offset: 50, length: 0, content: '', krp: 土山則孫子所謂距閩鑿地爲道行於城下用攻其城徃徃建柱積薪於柱間而燒之柱折城摧謂之地道又曰以八輪車上樹髙竿竿上安轆轤以䋲挽板屋上竿首以窺城中版屋方四尺髙五尺有十二孔四面列布車可進退圜城而行於營中逺視亦謂之巢車如鳥之巢即今之版屋}
  - {type: punctuation, offset: 51, content: 。, id: KR3k0012_CHANT_337-bkkpn18}
  - {type: 'tls:seg', offset: 51, content: '', id: KR3k0012_CHANT_337-1a.16}
  - {type: variant, offset: 51, length: 0, content: '', SBCK: 以版爲慢立桔橰於四輪車上懸幔逼城堞間使趫捷者大白隂經曰使趫卒蔽之蟻附而上矢石所不能及謂之木幔又守城篇曰禽滑􅁵問墨翟守城之具墨翟荅以五六十事皆煩冗不便於用其後韋孝窺守晉州羊偘守臺城皆約封胡子􅇊巧之術法古不妙非合今之用也今述所便於事者如後渭浚湟深池増城修堞懸門懸板爲重門也又曰突門於城中對敵營自鑿城内爲闇門多少}
  - {type: page-break, offset: 51, content: '', id: KR3k0012_SBCK_337-2b}
  - {type: variant, offset: 51, length: 0, content: '', WYG: 以版為幔立桔橰於四輪車上懸幔逼城堞間使趫捷太白隂經曰使趫卒蔽之蟻附而上矢石所不能及謂之木幔又守城篇曰禽滑釐問墨翟守戍之具墨翟荅以五六十事皆煩冗不便於用其後韋孝寛守晋川羊侃臺城皆約封胡子伎巧之術法古不妙非今之用也今述所便於事者如後渭浚湟深城增城懸門懸門為重門也又曰突門於城中對敵營自鑿城内為闇門多少}
  - {type: page-break, offset: 51, content: '', id: KR3k0012_WYG_337-3b, image: WYG0896/WYG0896-0036d.png}
  - {type: variant, offset: 51, length: 0, content: '', krp: 以版爲慢立桔橰於四輪車上懸幔逼城堞間使趫捷者大白隂經曰使趫卒蔽之蟻附而上矢石所不能及謂之木幔又守城篇曰禽滑釐問墨翟守城之具墨翟荅以五六十事皆煩冗不便於用其後韋孝窺守晉州羊偘守臺城皆約封胡子伎巧之術法古不妙非合今之用也今述所便於事者如後渭浚湟深池増城修堞懸門懸板爲重門也又曰突門於城中對敵營自鑿城内爲闇門多少}
  - {type: punctuation, offset: 52, content: ，, id: KR3k0012_CHANT_337-bkkpn19}
  - {type: 'tls:seg', offset: 52, content: '', id: KR3k0012_CHANT_337-1a.17}
  - {type: variant, offset: 52, length: 1, content: 臨, SBCK: 事令五六寸勿穿或於中夜或於敵􅀄來營列未定精􅀐從突門躍出擊其無俻襲其不意又曰塗扇以泥塗城門扇厚可三寸俻火又曰鑿門爲敵所逼門先自鑿門扇爲數十孔出強弩射之長矛刺之則敵不得近門又曰塗棧以泥塗門上木棧厚可五寸俻火又曰轉關橋一梁爲橋梁端着撗括去其橋轉人馬不得渡皆傾水中􅁗用此橋而殺燕丹又曰積石􅇱抛石大小隨事又曰樓櫓却敵上建候樓以板爲之跳出爲櫓笓籬戰隔於女墻上跳出椓去墻三尺内着撗括㧻端安轄以荆柳編爲之長一丈闊五尺懸椓端用遮矢石又曰布㡢以􅃨布爲幄以弱竿懸挂於女墻外去墻外七八尺以折抛石之勢矢石不復及墻又曰木弩以黄連桑柘爲弩弓長一丈二尺徑七寸兩弰二寸以絞}
  - {type: page-break, offset: 52, content: '', id: KR3k0012_SBCK_337-3a}
  - {type: variant, offset: 52, length: 1, content: 臨, WYG: 事令五六寸勿穿武於中夜或於敵初或營列未定精騎從突門躍出擊其無備襲其不意又曰塗扇以泥塗城門扇厚可三寸備火又曰鑿門為敵所過門先自鑿門扇為數十孔出强弩射之長矛刺之則敵不得近門又曰塗棧以泥塗門上木棧厚可五寸備火又曰轉關橋一梁為橋梁端着横栝去其橋轉人馬不得渡皆傾水秦用此橋而殺燕丹又曰積石備抛石大小随事又曰樓櫓却敵上建候樓以板為之跳出為櫓離戰隔於女墻上跳出㭬去墻三尺内着横括㭬端安轄以荆栁編為之長一丈闊五尺懸㭬端用遮矢石又曰布幔以複布為幔以弱竿懸挂於女墻外去墻外七八尺以折抛石之勢矢石不復及墻又曰木弩以黄連桑柘為弩弓長一丈二尺徑七寸兩弰二寸以絞}
