  - {type: variant, offset: 859, length: 2, content: 陳倉, WYG: 之郡作八陣圖地廣則鹿角車營進攻則木屋抱輪並戰並前虜弗能逼干寳晋記曰曹爽留車駕宿伊水南伐木為鹿角砦發屯田兵數千人以為衛習鑿齒漢晋陽秋曰曹芳謁曹叡墓於大石山曹爽兄弟皆從於是司馬懿閉四}
  - {type: punctuation, offset: 862, content: ，, id: KR3k0012_CHANT_337-bkkpn265}
  - {type: 'tls:seg', offset: 862, content: '', id: KR3k0012_CHANT_337-10a.5}
  - {type: variant, offset: 862, length: 0, content: '', WYG: 遂與太尉蔣濟俱屯於洛水南浮橋奏罷爽兄弟不知所}
  - {type: variant, offset: 863, length: 0, content: '', WYG: 芳還宿伊水南發屯田數千人樹鹿角為營晉惠帝起居注曰王浚乗勝追石超軍扵斥丘超持重不與戰以鹿角為營晋起居注曰義熈六年築壘起城于祖浦石頭城施鹿角以禦盧循司馬彪戰畧曰遼東太守公孫淵反明帝召太尉司馬懿討之軍到襄平公圍之北面東面有圍不合連車置水中積石鎮其上以鹿角塞之魏武帝表曰臣前遣討河内獲嘉之屯獲生口辭云河内有一神人宋金生合諸屯皆云鹿角不湏守吾使狗為汝守不從其言者即夜聞有軍兵聲明日視屯下但見虎跡臣輙部武猛都尉吕納將兵掩捉得生輙行軍法}
