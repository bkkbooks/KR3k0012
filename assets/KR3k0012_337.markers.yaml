  - {type: variant, offset: 52, length: 1, content: 臨, krp: 事令五六寸勿穿或於中夜或於敵𥘉來營列未定精騎從突門躍出擊其無俻襲其不意又曰塗扇以泥塗城門扇厚可三寸俻火又曰鑿門爲敵所逼門先自鑿門扇爲數十孔出強弩射之長矛刺之則敵不得近門又曰塗棧以泥塗門上木棧厚可五寸俻火又曰轉關橋一梁爲橋梁端着撗括去其橋轉人馬不得渡皆傾水中秦用此橋而殺燕丹又曰積石備抛石大小隨事又曰樓櫓却敵上建候樓以板爲之跳出爲櫓笓籬戰隔於女墻上跳出椓去墻三尺内着撗括㧻端安轄以荆柳編爲之長一丈闊五尺懸椓端用遮矢石又曰布㡢以複布爲幄以弱竿懸挂於女墻外去墻外七八尺以折抛石之勢矢石不復及墻又曰木弩以黄連桑柘爲弩弓長一丈二尺徑七寸兩弰二寸以絞}
  - {type: variant, offset: 54, length: 0, content: '', SBCK: 張之大矢一發聲如雷吼敗隊之卒又曰鷰尾炬􅅞葦草爲炬尾分爲兩歧如鷰尾狀以油臈灌之加火從城墜下便􅀐木驢而燒之又曰松明以木明燒之夜以鐵鏁縋下廵城照敵人乗城而上又曰脂油燭炬燃燈秉燭於城中四衢要路門户晨夜不得絶明用備非常又曰行爐融鐡汁爐舁行於城上以灑敵人又曰遊火以鐵筐盛火加脂臈鐵鏁懸縋下燒穴中孔城人又曰􅁅越糠粃因風於城上擲之以眯敵人目因以鐵汁灑之又曰連捧如打禾連拁狀用打女墻外上城敵人又曰扠竿如槍刄爲兩歧用义飛梯及人又曰鈞竿如槍刄兩旁有曲刄可以鈎塔又曰油囊盛水於城上擲安火車中嚢敗火盛又曰天井敵攻城爲地道來乃自於城道上直下穿井以邀之積薪安井中以火薫之敵人自焦灼又曰地聽於城内八方穿鑿井各􅀷二丈令頭覆戴新甕於井中坐聽則城外百歩之内有孔城地道者並聲聞甕中而辯知方所近逺矣又曰䥫莢杖狀如䥫蒺䔧要路水中置之以刺人馬又曰䧟馬坈坈長五尺闊一尺􅀷三尺坈中埋鹿角槍竹籖其坈十字相交狀如鈎鏁以覆芻草葦木加之􅁟種草實令生苗蒙覆其上軍城營壘要路皆設之衛公兵法曰坈如亞字相連以草及細塵覆其上又曰拒馬槍以木徑一尺長短隨事十字鑿孔從撗安槍一作檢長一丈銳其端可以塞城門要路巷人馬不得奔馳又曰木柵爲敵所逼不及築城壘或因山河險勢多石少土不住版堞乃建立木柵方圎髙下隨事􅀷埋木根重複弥縫其闕内重加短木爲閣道柱外重長出四尺爲女墻皆泥塗之内七尺又立閣道内柱上布板木爲棧立欄竿行於柵上懸門擁墻壕壍拒馬防守一如城壘法太白隂經曰蜀钁鐵塹鏨蜀钁短柄钁}
