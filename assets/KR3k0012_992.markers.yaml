  - {type: variant, offset: 1503, length: 521, content: 州記曰隴西襄武縣出黃耆本草經曰黃耆味甘微溫生山谷黃連廣雅曰王連黃連也范子計然曰黃連出蜀都黃肥堅者善神仙傳曰封君達服黃連五十餘年入鳥鼠山服練水銀百餘歲常騎青牛行民間有疾病者不問識與不識皆與藥即差又曰黑穴公服黃連得仙名山記曰扶容石草多黃連湘州記曰邵陵夫夷縣衡山出黃連永嘉記曰松陽縣草有黃連覆地土人取者必禱祠若失神意則化為異物本草經曰黃連一名王連味苦寒生川谷治熱氣目痛皆傷泣出明目生巫陽吳氏本草曰黃連神農歧伯黃帝雷公苦無毒李氏小寒或生蜀郡太山之陽防己范子計然曰防己出漢中旬陽本草經曰防己一名石解味辛平無毒治風寒溫瘧熱氣通湊理利九竅生漢中吳氏本草經曰木防己一名解離一名解燕神農辛黃帝歧伯桐君苦無毒李氏大寒如葛莖蔓延如芃白根外黃似桔梗內黑文如車輻解二月八月十月採葉根王不留行本草經曰王不留行味苦平生山谷久服輕身能老生太山崔寔四民月令曰八月采王不留行世說曰衛江州在尋陽劉孝標注云衛展為江州刺史有知舊人投之都不料理唯餉王不留行一斤此人得餉命駕吳氏本草經曰王不留行一名王不流行神農苦平歧伯雷公甘三月八月採徐長卿本草經曰徐長卿一名鬼督郵味辛溫生山谷治鬼物百精蠱毒疾疫邪氣溫鬼久服強悍輕身生太山吳氏本草曰徐長卿一名石下長卿神農雷公辛或生隴西三月採奄閭本草經曰奄閭, WYG: 皮}
