  - {type: variant, offset: 2337, length: 1, content: 太, SBCK: 邯鄲上蔡正月生葉細圎青黒黄白五月黄花六月實黒二月十月採根日乾琅邪者良大黄廣雅曰黄良大黄也盛弘之荆州記曰建平出大黄本草經曰大黄味苦寒生山谷治下瘀血閉寒􅀬破癥瘕積聚留飲􅀫食蕩滌膓胃安五藏推陳致新通利水榖道調中食生河西吴氏本草曰大黄一名黄良一名火參一名膚如神農雷公苦有毒扁鵲苦無毒季氏小寒爲中將軍或生蜀郡北部或隴西二月卷生生黄赤葉四四相當黄莖髙三尺許三月華黄五月實黒三月採根根有黄汁切隂乾石斛盛弘之荆州記曰隋郡永陽縣有龍石}
