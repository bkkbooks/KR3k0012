  - {type: variant, offset: 2114, length: 2, content: 盧茹, SBCK: 曰岑皮一名􅁗皮神農雷公黄帝歧伯酸無毒季氏小寒或生􅁈句水邊二月八月採淮南萬畢術曰岑皮致水枳實山海經曰北嶽之山其上多枳晏子春秋曰晏子使楚楚王使縛一人過問曰縛者何爲者耶對曰齊人坐盗王視晏子曰齊人故善盗乎晏子對曰橘生江南過北爲枳水土異也今民生於齊不盗入楚則盗得無楚之水土使民盗耶崔寔四民月令曰九月九日収枳實本草經曰枳實味苦寒生川澤治大風在皮膚中如麻豆苦癢除寒􅀬結止利長肌􅁏利五藏益氣輕身生河内吴氏本草曰枳實苦雷公酸無毒季氏大寒九月十月採隂乾防風本草經曰防風一名銅芒甘温生川澤治大風頭眩痛目盲無所見煩滿風行周身骨節疼痛乆服輕身生沙苑}
