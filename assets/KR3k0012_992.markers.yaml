  - {type: variant, offset: 844, length: 1180, content: 沙參一名知母味苦微寒生川谷治血積驚氣除寒熱補中益肺氣生河內吳氏本草曰白沙參一名苦心一名識美一名虎須一名白參一名志取一名文虎神農黃帝扁鵲無毒歧伯鹹李氏大寒生河內川谷或般陽瀆山三月生如葵葉青實白如芥根大白如蕪菁三月採紫參本草經曰紫參一名壯蒙苦寒無毒治心腹積藂寒熱邪氣利大便通九竅生河西及冤句治牛病生林陽建康記曰建康縣出紫參范子計然曰紫參出三輔赤青色者善苦參本草經曰苦參一名水槐茱萸西京雜記曰漢武帝宮人賈佩蘭云在宮時九月九日佩茱萸飲菊花酒令人長壽地理志曰九月九日為絲茱萸囊戴之臂上風土記曰俗上九月九日謂為上九茱萸到此日氣烈熟色赤可折茱萸囊以插頭云辟惡氣禦冬續齊諧記曰汝南桓景隨費長房遊學累年房謂之曰九月九日汝家有災厄宜令急去家人各作絳囊盛茱萸以繫臂上登高飲菊花酒此禍可消景如言舉家登高山夕還見鷄犬牛羊一時暴死房聞之曰此代矣今世人每至此日登高山飲酒戴茱萸囊是也唐廣古今五行記曰晉懷帝時無錫縣有四株茱萸樹生狀若連理郭璞卜云延陵有鼴鼠後當有拔樹儻有此東南數百里有作逆者及樹生而徐馥作亂本草經曰茱萸一名藙音毅味辛溫生川谷間湊理根去三蟲久服輕身生上谷晉宮閣名曰華林園茱萸三十六株范子計然曰茱萸出三輔山茱萸本草經曰山茱萸一名蜀酸棗平生山谷治心下邪氣寒熱溫中逐寒濕去三蟲久服輕身生漢中建康記曰建康出山茱萸范子計然曰山茱萸出三輔吳氏本草曰山茱萸一名鬾音伎實一名鼠矢一名雞足神農黃帝雷公扁鵲酸無毒歧伯辛一經酸或生冤句琅邪或東海承縣葉如梅有剌毛二月華如杏四月實如酸棗赤五月採實占斯本草經曰占斯一名虞及味苦杜仲吳氏本草曰杜仲一名木綿一名思仲黃耆秦州記曰隴西襄武縣出黃耆本草經曰黃耆味甘微溫生山谷黃連廣雅曰王連黃連也范子計然曰黃連出蜀都黃肥堅者善神仙傳曰封君達服黃連五十餘年入鳥鼠山服練水銀百餘歲常騎青牛行民間有疾病者不問識與不識皆與藥即差又曰黑穴公服黃連得仙名山記曰扶容石草多黃連湘州記曰邵陵夫夷縣衡山出黃連永嘉記曰松陽縣草有黃連覆地土人取者必禱祠若失神意則化為異物本草經曰黃連一名王連味苦寒生川谷治熱氣目痛皆傷泣出明目生巫陽吳氏本草曰黃連神農歧伯黃帝雷公苦無毒李氏小寒或生蜀郡太山之陽防己范子計然曰防己出漢中旬陽本草經曰防己一名石解味辛平無毒治風寒溫瘧熱氣通湊理利九竅生漢中吳氏本草經曰木防己一名解離一名解燕神農辛黃帝歧伯桐君苦無毒李氏大寒如葛莖蔓延如芃白根外黃似桔梗內黑文如車輻解二月八月十月採葉根王不留行本草經曰王不留行味苦平生山谷久服輕身能老生太山崔寔四民月令曰八月采王不留行世說曰衛江州在尋陽劉孝標注云衛展為江州刺史有知舊人投之都不料理唯餉王不留行一斤此人得餉命駕吳氏本草經曰王不留行一名王不流行神農苦平歧伯雷公甘三月八月採徐長卿本草經曰徐長卿一名鬼督郵味辛溫生山谷治鬼物百精蠱毒疾疫邪氣溫鬼久服強悍輕身生太山吳氏本草曰徐長卿一名石下長卿神農雷公辛或生隴西三月採奄閭本草經曰奄閭, SBCK: 􅁗皮}
