  - {type: variant, offset: 3185, length: 3, content: 沌音篆, SBCK: 隋平陳立䖍州以䖍化水而得名也圖經曰贑縣章貢二水􅀟流至縣合爲贑水其間置邑因以名縣十道志曰南康縣本漢南野地吴録曰南野縣有大􅁃山九嶺嶠以通廣州建州十道志曰建州建安郡古閩越之地􅁗閩中郡漢屬㑹稽吴分置建安郡陳屬閩州隋平陳屬泉州}
