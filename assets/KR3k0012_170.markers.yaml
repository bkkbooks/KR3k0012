  - {type: variant, offset: 913, length: 283, content: 鍾離郡禹貢楊州之域春秋時為鍾離子國戰國時屬吳秦置三十六郡屬九江郡漢置鍾離春秋成十五年曰叔孫僑如會吳于鍾離始通吳也始與中國接又昭十四曰楚子為舟師以略吳疆遂滅巢及鍾離史記曰楚平王十年吳之邊邑卑梁女與楚邊邑鍾離小童爭桑兩家交怒相攻楚伐梁人卑梁大夫怒發兵攻鍾離楚王聞之大怒吳亦發兵使公子光攻楚遂滅鍾離莊子曰莊子與惠子遊於濠梁水上見儵魚出遊從容莊子曰是魚樂乎惠子曰子非魚安知魚之樂耶莊子曰子非我安知我不知魚之樂也史記曰昔禹會諸侯於塗山執玉帛者萬國十道志曰塗山在臨淮郡西又曰招義縣本漢臨淮縣漢志曰淮陵縣屬臨淮郡莽曰淮陸壽州元和郡縣志曰壽州壽春郡禹貢楊州之域秦併天下為九江郡漢為淮, WYG: ''}
