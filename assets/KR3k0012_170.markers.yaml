  - {type: 'tls:seg', offset: 3151, content: '', id: KR3k0012_CHANT_170-62a.11}
  - {type: variant, offset: 3153, length: 2, content: 鄖國, SBCK: 時吴地􅁗爲九江郡漢爲豫章郡豫章記曰太康中望氣者云豫章廣陵有天子氣故封􅉖懷大子爲廣陵王領鎮軍以鎮豫章後永興中懷帝遂以豫章王登天王位隨平陳罷郡爲洪州撫州十道志曰撫州臨川郡禹貢楊州}
  - {type: variant, offset: 3153, length: 2, content: 鄖國, krp: 時吴地秦爲九江郡漢爲豫章郡豫章記曰太康中望氣者云豫章廣陵有天子氣故封愍懷大子爲廣陵王領鎮軍以鎮豫章後永興中懷帝遂以豫章王登天王位隨平陳罷郡爲洪州撫州十道志曰撫州臨川郡禹貢楊州}
  - {type: variant, offset: 3156, length: 0, content: '', SBCK: 域春秋時吴地􅁗屬九江郡漢立南昌縣今州即南昌縣地後漢分南昌立臨汝縣吴太平二年分豫章之臨汝南城縣立臨川郡即今州也隋平陳置撫州晉書曰王羲之嘗爲臨川内史置宅於郡城東偏旁臨廽溪時據層阜荀伯子臨川記曰王右軍故宅其地爽塏山川􅀂􅀞每至重陽日二千石巳下多遊萃於斯舊井及墨池並在漢地理志曰髙帝六年命大將軍灌嬰立洪州其年分洪州南境立南城縣以其在郡城之南故曰南城吉州十道志曰吉州廬陵郡春秋時爲吴}
  - {type: page-break, offset: 3156, content: '', id: KR3k0012_SBCK_170-9b}
  - {type: variant, offset: 3156, length: 0, content: '', krp: 域春秋時吴地秦屬九江郡漢立南昌縣今州即南昌縣地後漢分南昌立臨汝縣吴太平二年分豫章之臨汝南城縣立臨川郡即今州也隋平陳置撫州晉書曰王羲之嘗爲臨川内史置宅於郡城東偏旁臨廽溪時據層阜荀伯子臨川記曰王右軍故宅其地爽塏山川若畫每至重陽日二千石巳下多遊萃於斯舊井及墨池並在漢地理志曰髙帝六年命大將軍灌嬰立洪州其年分洪州南境立南城縣以其在郡城之南故曰南城吉州十道志曰吉州廬陵郡春秋時爲吴}
