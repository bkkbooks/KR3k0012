  - {type: variant, offset: 3169, length: 0, content: '', SBCK: 雷次宗豫章記曰靈帝末楊州刺史劉遵上書請置廬陵鄱陽二郡獻帝􅀄平二年始立郡圖徑曰隋平陳改廬陵郡置􅁻州以􅁻陽山爲郡名􅀽州十道志曰􅀽州冝春郡禹貢楊州之域春秋時吴}
