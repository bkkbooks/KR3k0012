  - {type: variant, offset: 1811, length: 363, content: 有歷水故曰歷陽淮南子曰歷陽之都一夕為湖漢明帝時歷陽淪為麻湖十道志曰麻湖在縣西十里漢書曰漢軍追項羽至江東城烏江亭長艤舟待之廬州元和郡縣志曰廬江郡古廬子國也春秋舒國之地十道志曰戰國時其地屬楚秦置三十六郡屬九江郡漢為合肥縣左傳魯僖公四年曰徐人取舒杜預注云舒國今廬江舒縣也尚書仲虺曰成湯放桀于南巢魏志曰青龍元年滿寵為楊州都督請於合肥城西三十里置新城表曰合肥城南臨江湖北達壽春賊攻圍之得據水為勢官兵救之當先破賊大軍然後圍乃得解賊往甚易兵救甚難今城西三十里有奇險可依立城固守此所謂引賊平地而椅其歸路也詔從之廬江記曰人物語音風土明茂皆勝淮左諸郡漢志曰廬江郡故淮南文帝十六年別為國領縣十二又曰龍舒屬廬江郡應劭曰群舒邑也又曰居巢屬廬江應劭曰春秋楚人圍巢巢國也左傳昭二十五年曰楚子使熊相禖郭巢為巢築城郭也郡國志曰濡須水出自巢湖謂之馬尾溝十道志曰慎, WYG: 康}
