  - {type: variant, offset: 3147, length: 1, content: 荊, SBCK: 楊荆二州之境尚書禹貢彭蠡旣瀦又曰九江孔殷周景式廬山記曰柴桑彭澤之郊古三苗國舊廬江地㝷陽記曰春秋時吴之西境後吴爲楚滅更爲楚地􅁗屬廬江郡漢屬淮南國晉武太康十年因江水之名而置江州成帝咸和元年移理湓城即今郡是晉地道記曰㝷陽陸通五嶺北導長江逺行岷漢亦一都㑹也洪州十道志曰洪州豫章郡禹貢楊}
  - {type: page-break, offset: 3147, content: '', id: KR3k0012_SBCK_170-9a}
  - {type: variant, offset: 3147, length: 1, content: 荊, krp: 楊荆二州之境尚書禹貢彭蠡旣瀦又曰九江孔殷周景式廬山記曰柴桑彭澤之郊古三苗國舊廬江地㝷陽記曰春秋時吴之西境後吴爲楚滅更爲楚地秦屬廬江郡漢屬淮南國晉武太康十年因江水之名而置江州成帝咸和元年移理湓城即今郡是晉地道記曰㝷陽陸通五嶺北導長江逺行岷漢亦一都㑹也洪州十道志曰洪州豫章郡禹貢楊}
