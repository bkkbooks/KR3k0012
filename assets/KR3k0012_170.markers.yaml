  - {type: variant, offset: 2840, length: 204, content: 九江郡漢為西陽縣左傳僖五年曰楚人滅弦弦在弋陽縣弦子奔黃漢志曰西陽屬江夏郡又曰屬江夏故弦子國音汰又徒系反圖經曰定城縣春秋黃子國也十三州志曰定城置在古黃子國南十二里十道志曰定城本漢弋陽縣漢志曰弋陽侯國屬汝南郡在弋山西北故黃國今黃城是也十道志曰固始縣本寢丘孫叔敖所封之邑也又曰殷城縣本漢期思縣也漢志曰期思屬汝南郡故蔣國也左氏傳曰凡蔣周公之也安州十道志曰安州安陸郡春秋䢵子之國雲夢之澤在焉後楚滅䢵封鬭辛為鄖公則其地也, SBCK: 越}
