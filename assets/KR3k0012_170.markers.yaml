  - {type: variant, offset: 2177, length: 255, content: 浚遒縣漢志曰浚遒屬九江郡浚音峻遒音才由反舒州釋例曰舒有五名舒庸舒龍舒州舒鳩舒城其實一也左傳定二年曰吳子使舒鳩民誘楚人元和郡縣志曰舒州桐安郡禹貢楊州之域春秋時皖國也十道志曰春秋時為楚東鄙戰國時屬楚秦置三十六郡為江夏郡史記曰皖匽姓咎繇之後也春秋時楚滅之漢志曰皖屬廬江郡續漢書郡國志曰廬江郡自舒縣徙居皖魏志曰正始二年孫權遣諸葛恪屯皖城以伺邊隙吳志曰曹公遣朱光為廬江太守屯皖大開稻田呂蒙上言曰皖地肥美若一收熟彼眾必增加是數歲操態見矣宜早除之於是親征皖破之宋書州郡志曰晉安帝於舊皖城置懷寧縣圖經曰桐城春秋時桐國也亦漢樅陽, WYG: 南野}
