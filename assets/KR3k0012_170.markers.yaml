  - {type: variant, offset: 3201, length: 3, content: 逾于沔, SBCK: 勾踐六代孫爲楚所併其後有無諸以其境南泉山之地因而都之稱閩越王至孫繇又以東海隅之地稱越王俱是㑹稽之域遂有三越之稱圖經曰梁承聖二年封蕭基爲長樂侯於此十道志日福州長樂郡亦閩越地􅁗爲閩中郡}
