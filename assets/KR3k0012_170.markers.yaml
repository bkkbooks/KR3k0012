  - {type: variant, offset: 51, length: 163, content: 江都國建武元年復曰楊州左氏哀九年曰吳城邗溝通江淮也魏志曰黃初六年征吳幸廣陵城臨江觀兵見江濤歎曰天所以限南北也隋書曰義寧元年詔修江都宮治龍舟鳳舸黃龍赤艦樓舡萬艘以幸江都為錦帆黻帳作泛龍舟春江花月夜等曲以幸之因而都焉宋書曰徐湛之為楊州起風亭月吹觀臺琴室以為遊宴焉又曰楊州刺史王謐薨高帝次應入輔劉毅等不欲帝入議以中軍謝混為州欲令帝於, WYG: ''}
