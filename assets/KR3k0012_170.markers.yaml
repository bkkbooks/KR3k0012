  - {type: variant, offset: 3053, length: 1, content: 為, SBCK: 爲㑹稽鄣二郡之地漢􅀄爲荆國故荆王劉賈所都之地吴王濞誅以其地併入江都國武帝又分屬丹陽㑹稽二郡之地左氏傳曰襄王二十八年齊慶封奔吴吴句餘予之朱方後漢書曰建安中吴大帝自吴徙都於京十六年遷都秣陵復於京口置京督以鎮焉吴志曰京督所統蕃衛尤要是以吴爲重鎮圖經曰其城因山爲壘縁江爲境尓雅曰丘絶髙曰京因謂之京口吴録地理曰􅁗時望氣者云其地有天子氣始皇使赭衣徒三千人鑿坑敗其􅀔改云丹徒圖經曰丹陽本漢曲阿縣也漢志曰曲阿故雲陽莽曰風美屬㑹稽郡史記曰􅁗始皇改雲陽爲曲阿輿地志曰曲阿縣屬朱方南徐之境􅁗有史官奏東南有王氣在雲陽故鑿北岡截直道使曲以猒其氣故曰曲阿又曰丹徒界内土堅緊如蠟諺云生東吴死丹徒言吴多産出可以攝生自奉養丹徒地可以葬吴志曰岑昏鑿丹徒至雲陽而杜野小辛間皆斬絶陵襲功力艱辛杜野屬丹徒小辛屬曲阿圖經曰唐垂拱四年立金山縣後改名金壇取邑界句曲之山金壇之陵以爲號眞誥曰地胏似洛中北邙山土水似長安丹鳯門外井泉之味河圖曰乃有地胏土良水清句曲之山金壇之陵常州十道志曰常州毗陵郡禹貢楊州之域春秋時屬吴後屬越戰國屬楚􅁗漢爲毗陵縣屬㑹稽郡輿地志曰晉陵縣春秋時吴之延陵邑也季札譲位耕於此因以封之漢改爲毗陵漢志曰毗陵縣屬㑹稽郡季札所居舊爲延陵漢改之也莽曰毗壇輿地志曰東海王越丗子名毗中宗爲越所表遣渡江故改此爲晉陵又曰吴越之間謂荆爲楚􅁗以子楚改爲陽羡其地本名小震居在荆溪之北故云陽羡周處風土記曰陽羡本無荆溪吴郡郡境震澤之㑹也其地理則三江之雄潤五湖之􅃾表吴越春秋曰周改爲陽羡漢志曰無錫屬㑹稽郡莽曰有錫周處風土記曰周武王追封周章於吴又封章小子斌於無錫也圖經曰昔有䜟述其地云無錫寕天下平有錫兵天下爭故名之􅂫州十道志曰蘇州吴郡禹貢楊州之域周爲􅁗吴國至闔閭強盛始都於此後爲越所滅􅁗併天下爲㑹稽郡釋名曰吴虞也太伯封於此以虞志也郡國志曰俗好用劔輕死蓋湛盧钃鏤干將要離之遺風焉東北有海鹽縣復有章山之銅擅三江五湖之利亦江東一都會也越絶書曰闔閭起姑蘇臺三年聚材五年乃成髙見三百里漢志曰吴屬㑹稽郡周太伯所邑也具區澤在其西王莽曰􅁗位十道志曰嘉興縣本􅁗由拳縣也漢志曰由拳屬㑹稽郡應劭曰古之檇里檇子遂反吴録地里志曰吴王時此地本名長水􅁗改曰由拳續漢志曰屬呉郡呉黄龍五年嘉禾生於由拳改縣曰禾興後以太子名和改曰嘉興圖經曰華亭縣本嘉興縣地天寳十年置因華亭谷爲名晉書曰陸機􅀍誅臨刑歎曰華亭唳鶴不可得聞輿地志曰吴大帝以陸遜爲華亭侯以其所居爲封也華亭谷出佳魚蓴菜故陸機云千里蓴羹未下鹽䜴湖州十道志曰湖州吴興郡禹貢楊州之域防風氏之國也春秋時爲吴地後屬越越爲楚所滅後屬楚􅁗漢屬㑹稽郡國語魯語曰吴伐越隳㑹稽獲骨節專車骨節長專檀一車也吴子使來好聘且問於仲尼曰骨何爲大仲尼曰禹戮防風氏其骨節專車客曰防風何守也仲尼曰汪芸氏之君也守封禺之山汪芒長翟國名封嵎山在吴郡永安縣郡國志曰五湖之表州以爲名也漢志曰烏程屬㑹稽郡有歐陽亭郡國志曰古有烏氏程氏居此能醖酒故以名縣地理志曰武康縣本烏程之餘下郷地漢末童謡曰天子當興東南三餘之間吴乃改㑹稽之餘曁爲永興分餘不爲永安以恊謡言吴興記曰長城縣吴王闔閭使弟夫槩居此築城狹而長晉武帝置縣因長城以名縣杭州十道志曰杭州餘杭郡禹貢楊州之域春秋時吴越地􅁗漢屬㑹稽郡史記曰楚威王伐越殺王無疆尽取故吴地至浙江又曰始皇三十七年東遊丹陽至錢塘漢志曰錢塘屬㑹稽郡西部都尉治王莽曰泉亭劉道眞錢塘記曰昔縣境逼近江流縣在靈山下至今基趾猶存郡議曹華信乃立塘以防海水募有能致土石者即與錢及成縣境􅂪利乃遷此地於是爲錢塘縣漢志曰於朁屬丹陽郡朁音潜吴録地里志云縣西朁山蓋因山以立名舊朁字無水至隋加水漢志曰餘杭屬㑹稽郡莽曰進睦吴興記曰􅁗始皇三十七年將上㑹稽塗出此因立爲縣郡國志曰夏禹東去捨杭登陸於此仍以爲名十道志曰鹽官本漢海由拳二縣境漢志曰海鹽屬㑹稽郡故武原郷有鹽官睦州十道志曰睦州新定郡禹貢楊州之域春秋時越國􅁗屬丹陽郡漢爲歙縣地吴志曰大帝以後漢建安十三年使威武中郎將賀齊討丹陽􅉳歙山賊平定之分歙始新新定􅀺陽休陽四縣并􅉳歙六縣圖經曰隋置睦州取俗阜人和内外輯睦爲義十道志曰桐廬縣吴黄武四年分冨春置以桐溪側有大椅樹垂條偃蓋傍䕃數􅅿逺望似廬因謂之桐廬縣漢志曰冨春屬㑹稽郡莽曰誅􅀊鄂州十道志曰鄂州武昌郡禹貢荆州之域春秋時楚地􅁗屬}
