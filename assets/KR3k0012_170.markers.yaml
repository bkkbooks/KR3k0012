  - {type: variant, offset: 558, length: 0, content: '', WYG: 屬越越為楚所併又屬楚秦為鄣郡漢為丹陽郡地理志曰武帝元狩元年改鄣郡為丹陽郡屬揚州理宛城即今郡是也吳書曰孫皓以牛渚為督以何植為使而禦晉軍桓𤣥傳曰𤣥居南州大築齋第以郡在國南故曰南州齊州郡志曰梁承聖元年置南豫州十道志曰隋開皇中改南豫州為宣州漢志曰涇縣屬丹陽郡韋昭曰涇水出蕪湖圖經曰南陵縣有赭圻屯在縣西北晉書曰桓温入參朝政自荆州還至赭圻遂城赭圻鎮十道志曰南陵有鵲州春秋左氏傳曰昭五年楚伐吳吳敗之鵲岸廬江舒縣有鵲尾渚漢志溧陽縣屬丹陽郡溧水所出也又曰當塗縣侯國屬九江郡莽曰山聚應劭曰禹娶塗山有禹墟焉春秋左氏傳曰禹㑹諸侯於塗山晉書州郡志曰西晉愍懷之亂瑯琊王出鎮揚州因渡江南卜金陵建大業衣冠禮樂州郡邑名並隨渡江從北地當塗來江南自東晉始也金陵記曰姑熟之南淮曲之陽置南豫州六代英雄迭居於此以斯地為上游焉池州圖經曰池州池陽郡禹貢揚州之域春秋及秦漢為鄣郡之地吳為石城縣隋為秋浦縣唐武德中置池州三國志曰吳黄武二年封韓當為石城侯輿地志曰梁昭明太子以水出魚美故名其水為貴池又曰梁大同二年置石埭因貴池有兩石埭遂以為名潤州十道志曰潤州丹陽郡禹貢揚州之域春秋時吳國地謂之朱方吳為越所併地屬}
