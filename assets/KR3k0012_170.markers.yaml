  - {type: variant, offset: 1361, length: 302, content: 郢又項羽本紀曰羽封英布為九江王都六盡有江淮之地漢書曰六故國也屬六安國咎繇後為楚所滅如谿水首受沘東北至壽春入芍陂沘音匕芍音雞左傳文五年曰楚成大心仲歸帥師滅六仲歸于家冬楚公子燮滅蓼蓼今安豐蓼縣臧文仲聞六與蓼滅曰皋陶庭堅不祀忽諸德之不建民之無援哀哉漢志曰壽春合肥受南北湖皮革鮑木之輸亦一都會也鮑鮑魚也木謂楓柵之屬壽春記曰三國時江淮為戰爭之地其間數百里無復人居晉平吳其民乃還本土復立為淮南郡齊書曰高祖初遣垣崇祖鎮壽陽謂之曰我新有天下魏必送劉昶為辭壽春賊之所衝深為之備既而果然乃敗還十道志曰霍丘縣本漢松滋縣也漢志曰松滋侯國屬廬江郡莽曰誦善十道志曰霍山縣滋縣也漢志曰灊縣屬廬江郡天柱山在南史記曰吳王闔閭四年伐楚取灊滁, SBCK: 池}
