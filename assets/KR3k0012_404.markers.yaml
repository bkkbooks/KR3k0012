  - {type: variant, offset: 739, length: 0, content: '', SBCK: 善人者不善人之師孫卿子曰干將莫耶鉅闕辟閭此皆古之良劒也然而不加砥礪則不能利不得人力則不能斷驊騮騏􅂹纎離緑耳此皆古之良馬也然而必前有衘轡之制後有鞭策之戚加之造父之御然後一日而致千里夫人雖有性質美而心辯智必將求賢師而事之擇良友而友之又曰國將興必尊師重􅀓尊師重􅀓則法度存師術有四傳習不與焉尊嚴而憚可以爲師􅂄艾而信可以爲師誦􅀃不懈可以爲師知微而論可以爲師又曰夫逹師之教也弟子安焉樂焉休焉遊焉肅焉嚴焉此六者得於學則邪僻之}
