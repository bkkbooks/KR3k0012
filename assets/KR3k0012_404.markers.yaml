  - {type: variant, offset: 543, length: 0, content: '', SBCK: 旣生不免乎水火母之罪也成童不就師傳父之罪也就師學問無方心老不通師之罪也論語爲政}
  - {type: variant, offset: 543, length: 0, content: '', WYG: 既生不免乎水火母之罪也成童不就師傅父之罪也就師學問無方心志不通師之罪也論語為政篇温故而知新可以為師矣又述而篇三人行必有我師焉孔叢子}
  - {type: page-break, offset: 543, content: '', id: KR3k0012_WYG_404-3b, image: WYG0896/WYG0896-0559d.png}
  - {type: variant, offset: 543, length: 0, content: '', krp: 旣生不免乎水火母之罪也成童不就師傳父之罪也就師學問無方心老不通師之罪也論語爲政}
