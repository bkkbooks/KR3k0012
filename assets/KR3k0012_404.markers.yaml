  - {type: variant, offset: 2569, length: 264, content: 不納報丕書曰僕以德為寶足下以位為寶各寶其寶於此敬宜也老子曰上德不德是以有德下德不失德是以無德上德之人唯道用其德故能有德下德而德之必有失焉文子曰山高者其木脩地廣者其德厚又曰閉九竅滅志意棄聰明反無識含陽吐陰而與萬物同德也莊子曰至德之世不尚賢不使能韓子曰善為吏者樹德不能為吏者樹怨孟子曰周于利者凶年不能殺周于德者邪世不能亂鶡冠子曰德及萬人者謂之豪德過百人者謂之英孔叢子曰晏子長不過六尺齊國莫不宗焉趙文子身如不勝衣相晉國以寧諸侯敬服其德故也楊子法言曰耕道而得道獵德而得德傅子曰上德之人其濟萬物也猶天之有春秋時至自生非德之力太公金匱曰德行, SBCK: 信}
