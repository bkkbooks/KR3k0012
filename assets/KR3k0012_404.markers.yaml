  - {type: variant, offset: 1486, length: 974, content: 者將昭德塞違以臨照百官猶懼或失之故昭令德以示子孫又僖公中曰庸勳親親暱近尊賢德之大者也又曰德以柔中國刑以威四夷又曰太上以德撫民又文公上曰孝敬忠信為吉德盜賊奸藏為凶德又宣公上曰楚子觀兵于周疆定王使王孫滿勞楚子楚子問鼎之大小輕重焉對曰在德不在鼎又成公上曰四王之王也禹湯文武樹德而濟同欲焉又襄公四曰太上有立德其次有立功又昭公三曰盛德必百世毛詩蕩烝民曰德輶如毛民鮮克舉之尚書舜典曰玄德升聞乃命以位玄謂幽潛潛行道德升聞天朝遂見徵用又大禹謨曰皋陶邁種德德乃降黎民懷之邁行種布也皋陶布行其德下治於民民歸服之又曰惟德動天無遠不屆又伊訓曰德日新萬邦惟懷志自滿九族乃離又曰爾惟德罔小萬邦惟慶爾惟不德罔大墜厥宗又太甲曰德惟治否德亂為政以德則治不以德則亂又咸有一德曰非天私我有商惟天佑于一德非商求于下民惟民歸于一德德惟一動罔不吉德二三動罔不凶又秦誓曰同力度德同德度義力鈞則有德者勝德鈞則秉義者強又曰受有億兆夷人離心離德予有亂臣十人同心同德又曰樹德務滋除惡務本立德務滋長去惡務除本又洪範五福四曰攸好德所好者德福之道又旅獒曰玩人喪德玩物喪志以人為戲弄則喪其德又蔡仲之命曰皇天無親惟德是輔又周官曰作德心逸曰休作偽心勞日拙為德直道而行於心逸豫而名日美又君陳曰黍稷非馨明德惟馨周易坤卦象曰地勢坤君子以厚德載物又繫辭曰富有之謂大業日新之謂盛德論語為政曰為政以德譬如北辰居其所而眾星拱之德者無為猶北辰之不移而眾星拱之又里仁子曰德不孤必有鄰又先進曰德行顏回閔子騫冉伯牛仲弓又憲問恥曰有德者必有言有言者不必有德又曰驥不稱其力稱其德也驥古之善馬也德謂在五御之威儀又季氏曰遠人不服則修文德以來之尚書大傳曰有德者尊其位而重其祿史記曰一年種之以榖十年樹之以木百年來之以德東觀漢記曰張湛字子孝右扶風人以篤行純淑鄉里歸德雖居幽室闇處自整頓三輔以為儀表又曰淳于恭字孟孫北海淳于人以謙儉推讓為節人有刈恭禾見之念其愧因伏草中至去乃起恭家井在門外上有盆鄰里牧牛兒爭飲牛恭惡其爭多置器其上為預汲水滿之小兒復爭恭各語其家父母父母乃禁怒之里落皆化而不爭三輔決錄曰馮豹字德文母為父所出後母遇之甚酷豹事之愈謹時人為之語曰道德彬彬馬德文王隱晉書曰庚袞字叔襃穎川人少遭大疫二兄亡次兄毗又疫其癘氣方熾袞父母諸弟皆出避家袞獨不出諸父強之不可曰袞性不畏病納漿粥扶持不捨晝夜省柩哀臨十有餘旬病暨歇家乃反而袞亦無患害宗黨歎曰異哉此子能守, SBCK: 聖}
