  - {type: punctuation, offset: 544, content: 『, id: KR3k0012_CHANT_404-bkkpn188}
  - {type: variant, offset: 544, length: 0, content: '', SBCK: 温故而知新可以爲師矣又述而曰三}
  - {type: variant, offset: 544, length: 0, content: '', WYG: 子思居魯穆公師而尊之春秋後語曰甘羅請張唐相燕吕不韋叱曰我自請不行汝安能行之甘羅曰夫項槖十歲為孔子師今臣十二歲矣君其試臣何遽叱乎史記曰孔子既没弟子思慕有若狀似孔子弟子相與立為師師之如夫子時又曰曹參為齊相乃避堂舍盖公而師之齊果大治又曰鄒子如燕昭王擁篲先驅請列弟子之座而受業築碣石宫身親往師之又曰文王為西伯鬻熊者為文王師有功於文王及武王㓕殷未之封也成王學勤事之後封其曾孫熊繹為楚子漢書曰初梁相褚大通五經為博士時倪寛為弟子及御史大夫缺徴褚大大自以為得御史大夫至雒陽聞倪寛為之褚大笑及至與寛議封禪於上前大不能及退而服曰上誠知}
  - {type: page-break, offset: 544, content: '', id: KR3k0012_WYG_404-4a, image: WYG0896/WYG0896-0560a.png}
  - {type: variant, offset: 544, length: 0, content: '', krp: 温故而知新可以爲師矣又述而曰三}
  - {type: variant, offset: 545, length: 0, content: '', SBCK: 行必有我師焉孔叢子曰子思居魯穆公師而尊之春秋後語曰甘羅請張唐相燕吕不韋叱曰我自請不行汝安}
  - {type: variant, offset: 545, length: 6, content: 能弘道非道弘, WYG: 也又曰龔勝既歸鄉里二千石長吏初到官皆至其家如師弟子之禮又曰嚴彭祖字公子東海下邳人與顔安樂俱事眭孟弟子百餘人唯彭祖安樂為明質問疑誼各持所見孟曰春秋之意在二子矣孟死彭祖安樂各顓門教授又曰竇皇后兄弟長君少君絳侯灌將軍等曰吾属命乃懸兩人此兩人所出微不可不為擇師傅於是乃選長老之有行者與居長君少君由此為退讓君子不敢以富貴驕}
  - {type: page-break, offset: 545, content: '', id: KR3k0012_WYG_404-4b, image: WYG0896/WYG0896-0560b.png}
  - {type: page-break, offset: 545, content: '', id: KR3k0012_WYG_404-5a, image: WYG0896/WYG0896-0560c.png}
  - {type: variant, offset: 545, length: 0, content: '', krp: 行必有我師焉孔叢子曰子思居魯穆公師而尊之春秋後語曰甘羅請張唐相燕吕不韋叱曰我自請不行汝安}
  - {type: variant, offset: 546, length: 5, content: 弘道非道弘, SBCK: 行之甘羅曰夫項橐七歳爲孔子師今臣十二歳矣曰君其試臣何遽叱乎史記曰孔子旣没弟子思慕有若狀似孔子弟子相與立爲師師之如夫子時又曰曹叅爲齊相乃避正堂舎蓋公而師之齊果大治又曰鄒子如燕昭王擁篲先駈請列弟子之座而受業築碣石宫身往親師之又曰文王爲西伯鬻熊者爲文王師有功於文王及武王㓕殷未之封也成王學勤事之後封其曽孫熊繹爲楚子漢書曰􅀄梁相禇大通五經爲􅀶士時倪寛爲弟子及御史大夫缺徴禇大夫自以爲得御史大夫至雒陽聞倪寛爲之禇大􅀏乃至與寛議封禪於上前大不能及退而服曰上誠知人也又曰龔勝旣歸郷里二千石長吏􅀄到官皆至其家如師弟子之禮又曰嚴彭祖字公子東海下邳人與顔安樂俱事眭孟弟子百餘人唯彭祖安樂爲明質問疑􅁩各持所見孟曰春秋之意在二子矣孟死彭祖安樂各顓門教授又曰竇皇后兄弟長君少君絳侯灌將軍等曰吾属命乃懸兩人此兩人所出微不可不爲擇師傳於是乃選長者之有行者與居長君少君由此爲退讓君子不敢以冨貴驕}
  - {type: page-break, offset: 546, content: '', id: KR3k0012_SBCK_404-2b}
  - {type: page-break, offset: 546, content: '', id: KR3k0012_SBCK_404-3a}
