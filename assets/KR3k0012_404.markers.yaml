  - {type: variant, offset: 4452, length: 135, content: 餘人又曰虞詡字升卿祖經為縣獄吏決獄平嘗曰東海于公高其里門而其子定國卒至丞相吾決獄六十年矣雖不及于公其庶幾乎吾子孫何必不為九卿耶故字詡曰升卿謝承後漢書曰陳重字景公豫章宜春人舉孝廉在郎署有郎負息錢數十萬債主日至煎求無已重乃密以錢代還郎後覺知而厚辭謝之重曰非我之為將有同姓名者, SBCK: 四卷}
  - {type: variant, offset: 4452, length: 673, content: 餘人又曰虞詡字升卿祖經為縣獄吏決獄平嘗曰東海于公高其里門而其子定國卒至丞相吾決獄六十年矣雖不及于公其庶幾乎吾子孫何必不為九卿耶故字詡曰升卿謝承後漢書曰陳重字景公豫章宜春人舉孝廉在郎署有郎負息錢數十萬債主日至煎求無已重乃密以錢代還郎後覺知而厚辭謝之重曰非我之為將有同姓名者終不言惠吳志曰鍾離牧字子幹會稽山陰人少居永興自墾稻田二十餘畝臨熟而縣民識之牧曰本以田荒故墾之耳遂以稻與縣人沈約宋書曰沈道虔吳興武康人少仁愛好老易郡州府凡十二命皆不就有人竊其園菜者外還見之乃自逃隱候竊者取足去後乃出唐書曰載初中徐有功為大理丞時酷吏來俊臣等搆陷無辜公卿震恐有功獨存平恕詔下大理者有功皆議出之前後濟活數十百家呂氏春秋曰宋景公時熒惑在心問子韋子韋對曰禍在君可移宰相公曰宰相所與治國家曰移於民公曰民死誰與為君曰移於歲公曰歲飢民必死子韋北面再拜曰君有至德之言三天必賞君熒感果三徙舍賈誼書曰楚惠王食寒葅得水蛭王不欲以飲食傷人乃吞之令尹避席再拜而賀曰臣聞天道無親唯德是輔是夜惠王之後溷而蛭出其久病心腸之積皆愈又曰孫叔敖之為兒也出遊歸遂憂而不食其母問其故泣而對曰今旦見兩頭虵恐死其母曰今虵安在曰敖聞見兩頭虵者必死吾恐人又見之殺而埋之母曰無憂汝不死矣吾聞有陰德者天必報之以福果不死矣高士傳曰初晉宣帝布衣時與胡昭有舊昭同郡周士等謀欲害帝昭聞而涉險邀士於齊澠之間止士不肯昭泣以示誠士感義乃止昭雖有陰德於帝口終不言續齊諧記曰楊寶年九歲時至華陰山北見一黃雀為鵶鳧所摶墜於樹下為螻蟻所困寶取之以歸置巾箱中唯食以黃花百餘日毛羽成乃飛去其夜有黃衣童子向寶再拜曰我王母使者君仁愛救拯實感成濟以白環, WYG: ''}
