  - {type: variant, offset: 995, length: 0, content: '', SBCK: 也少受春秋於少府丁子然以節操稱建武二十八年趙孝王聞其名遣大夫賫玉帛聘望爲師不受邴原别傳曰原舊能飲酒自行後八九年間酒不向口單行􅀒笈苦身持力至陳留則師韓子助潁川宗陳仲躬涿郡則盧子幹臨歸師友以原不飲酒㑹米肉送原原曰本能飲酒但以荒思廢業故斷}
