  - {type: variant, offset: 563, length: 1, content: 天, SBCK: 張禹成就弟子尤著者淮陽彭宣至大司空沛郡戴崇至少府九卿宣爲人恭儉有法度而崇愷悌多智二人有異行禹心親愛敬宣而踈之崇毎候禹常責師置酒設樂與弟子相娱禹將崇入後堂飯食婦女相對作優人管絃鏗鏘極樂昏夜乃罷而宣之來也禹見之於便坐講論經義日晏賜食不過一􅁏巵酒相對宣未甞得至後堂及兩人皆聞知自得服䖍日各為得冝也又曰晁錯潁川人也學申啇刑名於軹張恢生所軹縣之儒生姓張名恢與洛陽宋孟劉帶同師以文學爲太常掌固又曰孔霸亦治尚書事太傅夏侯勝昭帝末年爲􅀶士宣帝時爲太中大夫以選授皇太子經遷詹事髙宻相元帝即位徴霸以師爵􅀜内侯號褒成君常為師教帝今成就故曰褒成君又曰張禹􅀄爲師以上難數對己問經爲論語章句獻之後漢書曰廉范􅀄師事薛漢後辟公府㑹薛漢坐楚王事誅故人門生莫敢収視范獨往収歛之吏聞顯宗大怒召入詰責范叩頭曰臣無狀愚戅心爲漢等皆己伏誅不勝師資之情罪當萬死因貰之謝承後漢書曰董春字紀陽㑹稽餘姚人少好學師事侍中􅀕酒王君仲受古文尚書後詣京房授易究極聖旨條列科義後還爲師立精舎逺方門徒學者常數百人東觀漢記曰顯宗即位尊桓榮以師禮常幸太常府令榮坐東面設几杖㑹百官驃􅀐將軍東平王蒼以}
