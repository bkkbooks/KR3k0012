  - {type: variant, offset: 993, length: 1, content: 聖, SBCK: 段干木晉之大駔爲文侯師海内先賢傳曰仇覽字季智郭太賫刺從之曰暮求留􅀫明旦太下床朝之曰君非太友乃太師也荀氏家傳曰爽字慈明㓜而歧嶷大學儒林咸歎服之年十二太尉杜喬師焉江微陳留志曰樓望字次子雍丘}
  - {type: variant, offset: 993, length: 1, content: 聖, WYG: 段干木晉之大駔為文侯師海内先賢傳曰仇覽字季智郭太齎刺從之曰暮求留宿明旦太下床拜之曰君非太友乃太師也荀氏家傳曰爽字慈名幼而岐嶷大學儒林咸嘆服之年十二太尉杜喬師焉江微陳留志曰樓望字次子雍邱}
