  - {type: variant, offset: 2834, length: 663, content: 福德廢則覆易參同契曰道成德就潛伏俟時海內先賢行狀曰王烈字伯善時有盜牛者主得之盜者曰我邂逅迷惑從今將改子既赦宥幸無使王烈聞之又曰戴良字叔鸞高才磥硌英聲遠播少者懷之長者慕之鄉里搢紳下至黎庶莫有忿爭之家又曰徐孺子徵聘未嘗出門赴喪不遠萬里常事江夏黃公薨往會其葬家貧無以自供齎磨鏡具自隨每至所在賃磨取資然後得前既至設祭哭畢而返陳仲舉為豫章太守召之則到饋之則受但不服事以成其節又曰仇覽字季智學通五經選為亭長民有孫元少孤與母居詣覽告元不孝覽謝遣之屬母歸勿言方為教之後覽齎禮詣元為陳孝子供養之意元遂感激卒為孝子時令河內王渙政尚清嚴聞覽得元不治心獨望之乃問覽在亭不治不孝得無失鷹鸇之志乎對曰竊以鷹鸇不如鳳皇故不為也渙感覽言用損威刑會稽典錄曰鄭弘字巨為郡督郵上計史時計掾勾章任尚居素溫富乘鮮車駕肥馬弘恒在後尚輒罵弘無慍容弘尚在京師遊學還郡俱見府君府君所問弘無不對而尚不知出又問弘掾行道數相折辱何以不荅弘謝曰過奉顯使無光國之美馬羸行遲恐失期賀以相催促自是其宜愚聞兩虎俱鬭大者必傷小者必死兩為無益故不敢荅府君歎曰此謂長者太守所不能也汝南先賢傳曰黃憲字叔度不矜名以詭時不抗行以矯俗闚其門者莫敢踐其庭覩其流者不能測其深時人論曰顏淵復生乎襄陽耆舊記曰龐德公子奐字世文晉太康中為牂牁太守去官歸鄉里居荊南白沙鄉里人宗敬之相語曰我家池中龍種來里中化其德少壯皆代老者擔陳寔別傳曰寔字仲躬潁川人自為兒童不為戲弄等類所歸寔在鄉閭平心率物其有諍訟輒求判正曉譬曲直返無怨者至乃歎曰寧為刑罰所加不為陳君所斷時歲荒民儉有盜夜入其室止於梁上寔陰見之乃起自整拂呼命子孫正色訓之曰夫, SBCK: ''}
