  - {type: variant, offset: 588, length: 1, content: 貢, WYG: 􅇓伏道傍候車駕過泣涕辭請有感帝心詔曰乞楊生師即為放出升范􅁮後漢書曰歐陽歙字正思樂安千乗人為大司徒坐汝南贓罪千餘萬發覺下獄平原孔震年十七聞獄當斷馳之京師行到河内獲嘉縣自繋上書求代歙死曰伏見臣師大司徒歐陽歙為儒宗八世博士乞殺臣以代歙命書奏而歙已死獄中又曰鄭𤣥字康成北海髙密人也事扶風馬融融門徒四百餘人升堂進者五十餘生融素驕貴𤣥在門下三年不得見乃使髙業弟子傳授於𤣥日夜尋誦未嘗息倦㑹融集諸生考論圖說聞𤣥善算乃召見於樓上𤣥因從質諸疑義問畢辭歸融喟然謂門人曰鄭生今去吾道東矣又曰鍾皓字季明潁川長社人以篤行稱為士大夫所慕李膺嘗歎曰鍾君至徳可師魏志曰夏侯惇字元讓年十四就師學人有辱其師者惇殺之又曰荀攸字公達文帝在東宫太祖謂曰荀公逹人之師表汝當盡禮敬之攸曾病世子問病獨拜床下其見尊異如此晉書曰魏髙貴鄉公之入學也將崇先典乃命王祥為三老侍中鄭小同為五更祥南面几杖以師道自居帝北面乞言又曰王承為東海王越記室越與世子毘書曰嫻習禮度不如式瞻儀形諷味遺言不如親承音㫖王參軍人倫師表爾其師之徐爰宋書曰武帝登祚加顔延之金章紫綬領湘東王師後魏書曰陽平王之子欽託髙僧壽為子求師師至未幾逃去欽以讓僧夀僧夀性滑稽乃謂欽曰凡人絶粒七日乃死始經五朝便爾逃遁去欽乃大慙於是待客稍厚之裴景仁前秦記曰苻堅幸太學問博士經典博士盧壼對曰周官禮注未有其師韋逞母宋傳其父業得周官音義自非此母無可授後堅於是就宋立誦室書堂生徒百二十人隔絳紗幔而授業焉拜宋爵號宣文君賜侍婢十人崔鴻後秦録曰初姚泓之為太子受經太學博士淳于岐岐病在家泓以師者人之表範傳先聖之訓加在三之義不可以不重親詣省拜於牀下又前燕録曰劉瓉字彦真平原人經學博通為世純儒貞清非禮不動慕容廆重其徳學使太子皝師事之又後趙録曰張躍清河武城人也學敏才逹雅善清談勒偉其儀辯拜世子衛軍長史勅世子曰張長史人之表範汝其師之案世說或曰王趙鄧三叅軍人倫師表爾其師之謂王安期鄧伯道趙禮之也唐書曰賀徳仁越州山隂人少與從兄徳基俱事國子祭酒周宏正咸以詞學見稱時人語曰學行可師賀徳基文質彬彬賀徳仁徳仁仕陳至吳興王友入隋授豫王府記室叅軍王以師資禮之恩遇甚厚又曰員半千本名餘慶與彦同師事學士王義方甚嘉重之嘗謂曰五百年生一賢足下當之矣因改名半千及義方卒半千與萬先皆制師服告畢而去六韜}
