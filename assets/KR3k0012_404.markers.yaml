  - {type: variant, offset: 588, length: 1, content: 貢, SBCK: 潜伏道傍􅀱車駕過泣涕辭請有感帝心詔曰乞楊生師即爲放出升范曄後漢書曰歐陽歙字王思樂安千乗人爲大司徒坐汝南􅂍罪千餘萬發覺下獄平原孔震年十七聞獄當斷馳之京師行到河内􅀗嘉縣自繫上書求代歙死曰伏見臣師大司徒歐陽歙爲儒宗八丗􅀶士乞殺臣以代歙命書奏而歙己死獄中又曰鄭玄字康成北海髙宻人也事扶風馬融融門徒四百餘人􅂛堂進者五十餘生融素驕貴玄在門下三年不得見乃使髙業弟子傳授於玄日夜尋誦未甞怠倦㑹融集諸生考論圖􅀃聞玄善筭乃召見於樓上玄因從質諸疑義問畢辭歸融喟然謂諸門人曰鄭生今去吾道東矣又曰鍾皓字季明潁川長社人以篤行稱爲士大夫所慕李膺常歎曰鍾君至徳可師魏志曰夏侯惇字元讓年十四就師學人有辱其師者惇殺之又曰荀攸字公逹文帝在東宫太祖謂曰荀公逹人之師表汝當盡禮敬之攸曽病世子問病獨拜床下其見尊異如此晉書曰魏髙貴郷公之入學也將崇先典乃命王祥爲三老侍中鄭小同爲五更祥南靣几杖以師道自居帝北靣乞言又曰王承爲東海王越記室越興世子毗書曰習禮度不如式瞻儀形諷味遺言不如親承音旨王叅軍人倫師表尔其師之徐爰宋書曰武帝登祚加顔延之金章紫綬領湘東王師後魏書曰陽平王之子欽託高僧壽爲子求師師至未幾逃去欽以讓僧壽僧壽性滑稽乃謂欽曰凡人絶粒七日乃死始經五朝便爾逃遁去欽乃大慙於是待客稍厚之裴景仁前􅁗記曰符堅幸太學問􅀶士經典􅀶士盧壼對曰周官禮注未有其師韋逞母宋傳其父業得周官音義自非此母無可授後堅於是就宋立講室書堂生徒百二十人隔綘紗幔而授業焉拜宋爵號宣文君賜侍婢十人崔鴻後秦録曰􅀄姚泓之爲太子受經於太學􅀶士淳于歧歧病在家泓以師者人之表範傳先聖之訓加在三之義不可以不重親詣省疾拜於牀下又前燕錄曰劉讃字彦真平原人也經學􅀶通爲世純儒貞清非禮不動慕容廆重其徳學使太子晃師事之又後趙録曰張躍清河武城人也學敏才逹雅善清談勤偉其儀辯拜世子衛軍長吏勑世子曰張長史人之表範汝其師之案世􅀃或曰王趙鄧王㕘軍人倫師表􅈛其師之謂王安期鄧伯道趙禮之也唐書曰賀徳仁越州山隂人少與從兄徳基俱事國子􅀕酒周弘正咸以詞學見稱時人語曰學行可師賀徳基文質彬彬賀徳仁徳仁仕陳至吴興王友入隋授豫章王府記室叅軍王以師資禮之恩遇甚厚又曰貟半千本名餘慶與彦先同師事學士王義方甚嘉重之嘗謂曰五百年生一賢足下當之矣因改名半千及義方卒半千與彦先皆制師服䘮畢而去六韜}
