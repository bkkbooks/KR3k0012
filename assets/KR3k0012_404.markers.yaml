  - {type: variant, offset: 5126, length: 606, content: 枚與寶曰令君子孫絜白位登三公事當如此數矣會稽典錄曰鄭弘為靈文鄉嗇夫民有弟用兄錢者未還之嫂詣弘訴之弘賣中單即今之汗衫也為叔還錢兄聞之慚愧遣其婢索錢還弘弘不受又曰夏香字曼卿永興人門側有大井傍設水甕里中兒童各競飲牛爭水共鬭香預為汲水多置器甕由是無爭專以德化香至四節先慶酌二親退齎酒肴勞問里中父老以此為常益都耆舊記曰王忳常詣京師於空舍中見一書生疾困愍而視之書生謂忳曰我當到洛而得病命在須臾腰下有金十斤願以相贈死後乞藏骸骨未及問姓名而絕忳即鬻金一斤營其殯葬餘金悉置棺下人無知者後歸數年縣署忳大度亭長初到之日有馬馳入亭中其日風飄一繡被復墮忳前即言於縣馬遂奔走牽忳入他舍主人見之喜曰今擒盜矣問忳得馬忳說其狀并繡被主人悵然良久乃曰被隨飄風與馬俱亡卿何陰德而致此二物忳自念有葬書生事因為說之道書生形皃及埋金之處主人驚曰是我子姓金名彥前往京師不知所在何意卿乃葬之犬恩久不報天以此彰卿德耳忳悉以被馬還之彥父不取又厚遺忳忳辭讓而去時彥父為州從事因告新都令假忳休息與俱迎彥喪餘金且存由是顯名後漢亦載廣州先賢傳曰羅威字德仁南海番禺人也有鄰家牛數食其田禾既不可止遂為斷芻多著牛家門中不令人知數如此牛主驚怪不知為誰陰察求之乃覺是威自後更相約率收拾牛犢不敢復踐傷於威田豫章耆舊志曰施陽字季儒遷舒令及之官道經江夏遇寇賊興起劫奪陽物賊去後車上席下尚有五千錢追以與賊荀氏家傳曰荀遂字仲陽夫人有至行時歲荒飢有餘米糶之夫人恒掾斛籴者傾量輒過本時人號曰斛夫人, WYG: ''}
