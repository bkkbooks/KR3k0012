  - {type: variant, offset: 3806, length: 495, content: 武子疾命顆曰必嫁是疾病則曰必為殉及卒顆嫁之曰病疾則亂吾從其治也及輔氏之役顆見老人結草以亢杜回亢禦也杜回躓而顛故獲之夜夢之曰余而所嫁婦人之父也爾用先人之治命余是以報漢書曰于定國父于公為縣獄吏郡決曹獄平羅文法者于公所決皆不恨其閭門壞父老方共治之于公謂曰少高大閭門令容駟馬高蓋車我治獄多陰德未曾有所冤子孫必有興者至定國為丞相又曰邴吉字少卿魯國人為丞相寬大好禮初吉有陰德於孝宣帝微時帝即位眾莫知之吉亦不言吉從大將軍長史遷至御史大夫帝聞將封之會吉病甚將使人加綬而封之及其生也太子太傅夏侯勝曰此未死也臣聞有陰德者必饗其樂以及子孫今未獲其樂而病非其死病也後果愈乃封博陽侯終饗其祿後漢書曰何敞六代祖比干學尚書於晁錯注云比干字少卿經明行脩兼通法律為汝陰縣獄吏決曹掾平活數千人後為丹陽都尉征和三年三月辛亥天大陰雨比干在家日中夢貴客車騎滿門覺以語妻語未已而門有老嫗年可八十餘頭白求寄避雨雨甚而衣履不霑雨漬止送至門乃謂比干曰公有陰德今天賜公策以廣公之子孫因出懷中符策狀如簡長九寸凡九百九十杖以授比干曰子孫佩印綬者如此筭又曰和熹鄧后叔父陔言常聞活千人者子孫有封兄訓為謁者使修石臼河歲活數千人大道可信家必蒙福初太傅禹歎, SBCK: ''}
