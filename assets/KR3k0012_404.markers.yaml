  - {type: variant, offset: 1509, length: 2792, content: 孫又僖公中曰庸勳親親暱近尊賢德之大者也又曰德以柔中國刑以威四夷又曰太上以德撫民又文公上曰孝敬忠信為吉德盜賊奸藏為凶德又宣公上曰楚子觀兵于周疆定王使王孫滿勞楚子楚子問鼎之大小輕重焉對曰在德不在鼎又成公上曰四王之王也禹湯文武樹德而濟同欲焉又襄公四曰太上有立德其次有立功又昭公三曰盛德必百世毛詩蕩烝民曰德輶如毛民鮮克舉之尚書舜典曰玄德升聞乃命以位玄謂幽潛潛行道德升聞天朝遂見徵用又大禹謨曰皋陶邁種德德乃降黎民懷之邁行種布也皋陶布行其德下治於民民歸服之又曰惟德動天無遠不屆又伊訓曰德日新萬邦惟懷志自滿九族乃離又曰爾惟德罔小萬邦惟慶爾惟不德罔大墜厥宗又太甲曰德惟治否德亂為政以德則治不以德則亂又咸有一德曰非天私我有商惟天佑于一德非商求于下民惟民歸于一德德惟一動罔不吉德二三動罔不凶又秦誓曰同力度德同德度義力鈞則有德者勝德鈞則秉義者強又曰受有億兆夷人離心離德予有亂臣十人同心同德又曰樹德務滋除惡務本立德務滋長去惡務除本又洪範五福四曰攸好德所好者德福之道又旅獒曰玩人喪德玩物喪志以人為戲弄則喪其德又蔡仲之命曰皇天無親惟德是輔又周官曰作德心逸曰休作偽心勞日拙為德直道而行於心逸豫而名日美又君陳曰黍稷非馨明德惟馨周易坤卦象曰地勢坤君子以厚德載物又繫辭曰富有之謂大業日新之謂盛德論語為政曰為政以德譬如北辰居其所而眾星拱之德者無為猶北辰之不移而眾星拱之又里仁子曰德不孤必有鄰又先進曰德行顏回閔子騫冉伯牛仲弓又憲問恥曰有德者必有言有言者不必有德又曰驥不稱其力稱其德也驥古之善馬也德謂在五御之威儀又季氏曰遠人不服則修文德以來之尚書大傳曰有德者尊其位而重其祿史記曰一年種之以榖十年樹之以木百年來之以德東觀漢記曰張湛字子孝右扶風人以篤行純淑鄉里歸德雖居幽室闇處自整頓三輔以為儀表又曰淳于恭字孟孫北海淳于人以謙儉推讓為節人有刈恭禾見之念其愧因伏草中至去乃起恭家井在門外上有盆鄰里牧牛兒爭飲牛恭惡其爭多置器其上為預汲水滿之小兒復爭恭各語其家父母父母乃禁怒之里落皆化而不爭三輔決錄曰馮豹字德文母為父所出後母遇之甚酷豹事之愈謹時人為之語曰道德彬彬馬德文王隱晉書曰庚袞字叔襃穎川人少遭大疫二兄亡次兄毗又疫其癘氣方熾袞父母諸弟皆出避家袞獨不出諸父強之不可曰袞性不畏病納漿粥扶持不捨晝夜省柩哀臨十有餘旬病暨歇家乃反而袞亦無患害宗黨歎曰異哉此子能守人之所不能守能行人之所不能行晉中興書曰衛玠字叔寶常以人有不及可以情恕非意相干可以理遣故終身不見其喜慍齊書曰張緒字思曼為吏部尚書每朝見太祖目送之謂王儉曰緒以位尊我我以德貴緒又曰王秀之字伯奮為南郡內史州西曹荀丕欲交秀之拒而不納報丕書曰僕以德為寶足下以位為寶各寶其寶於此敬宜也老子曰上德不德是以有德下德不失德是以無德上德之人唯道用其德故能有德下德而德之必有失焉文子曰山高者其木脩地廣者其德厚又曰閉九竅滅志意棄聰明反無識含陽吐陰而與萬物同德也莊子曰至德之世不尚賢不使能韓子曰善為吏者樹德不能為吏者樹怨孟子曰周于利者凶年不能殺周于德者邪世不能亂鶡冠子曰德及萬人者謂之豪德過百人者謂之英孔叢子曰晏子長不過六尺齊國莫不宗焉趙文子身如不勝衣相晉國以寧諸侯敬服其德故也楊子法言曰耕道而得道獵德而得德傅子曰上德之人其濟萬物也猶天之有春秋時至自生非德之力太公金匱曰德行則福德廢則覆易參同契曰道成德就潛伏俟時海內先賢行狀曰王烈字伯善時有盜牛者主得之盜者曰我邂逅迷惑從今將改子既赦宥幸無使王烈聞之又曰戴良字叔鸞高才磥硌英聲遠播少者懷之長者慕之鄉里搢紳下至黎庶莫有忿爭之家又曰徐孺子徵聘未嘗出門赴喪不遠萬里常事江夏黃公薨往會其葬家貧無以自供齎磨鏡具自隨每至所在賃磨取資然後得前既至設祭哭畢而返陳仲舉為豫章太守召之則到饋之則受但不服事以成其節又曰仇覽字季智學通五經選為亭長民有孫元少孤與母居詣覽告元不孝覽謝遣之屬母歸勿言方為教之後覽齎禮詣元為陳孝子供養之意元遂感激卒為孝子時令河內王渙政尚清嚴聞覽得元不治心獨望之乃問覽在亭不治不孝得無失鷹鸇之志乎對曰竊以鷹鸇不如鳳皇故不為也渙感覽言用損威刑會稽典錄曰鄭弘字巨為郡督郵上計史時計掾勾章任尚居素溫富乘鮮車駕肥馬弘恒在後尚輒罵弘無慍容弘尚在京師遊學還郡俱見府君府君所問弘無不對而尚不知出又問弘掾行道數相折辱何以不荅弘謝曰過奉顯使無光國之美馬羸行遲恐失期賀以相催促自是其宜愚聞兩虎俱鬭大者必傷小者必死兩為無益故不敢荅府君歎曰此謂長者太守所不能也汝南先賢傳曰黃憲字叔度不矜名以詭時不抗行以矯俗闚其門者莫敢踐其庭覩其流者不能測其深時人論曰顏淵復生乎襄陽耆舊記曰龐德公子奐字世文晉太康中為牂牁太守去官歸鄉里居荊南白沙鄉里人宗敬之相語曰我家池中龍種來里中化其德少壯皆代老者擔陳寔別傳曰寔字仲躬潁川人自為兒童不為戲弄等類所歸寔在鄉閭平心率物其有諍訟輒求判正曉譬曲直返無怨者至乃歎曰寧為刑罰所加不為陳君所斷時歲荒民儉有盜夜入其室止於梁上寔陰見之乃起自整拂呼命子孫正色訓之曰夫人不可不自勉不善之人未必本惡習與性成遂至於此如梁上君子矣盜大驚自投於地稽首歸罪寔徐譬之曰視君狀皃不似惡人宜深剋己反善然此當由困貧令遺絹二疋自是縣無復盜竊荀氏家傳曰荀彧德行周備名重天下海內英俊咸嘉焉又曰鍾繇以為顏子既沒能備九德百行不二其過者唯荀彧乎或問繇曰君推荀君比之顏子自以不及其可得聞乎繇曰夫明君師臣其次友之以太祖之聰明每大事常先諮之荀彧是則古師友之義也吾等受命而行猶或不盡去固遠耶潘勗別傳曰勗寬賢容眾與天下人等休戚同有無不以家財為己有任嘏別傳曰嘏字照先樂安人幼以至性見稱遇荒亂家貧賣魚會官發魚魚貴數倍嘏取直如常會太祖創業召海內至德嘏應其舉為臨淄侯庶子陰德左傳宣公下曰魏顆敗秦師于輔氏獲杜回秦之力人也初武子有嬖妾無子武子疾命顆曰必嫁是疾病則曰必為殉及卒顆嫁之曰病疾則亂吾從其治也及輔氏之役顆見老人結草以亢杜回亢禦也杜回躓而顛故獲之夜夢之曰余而所嫁婦人之父也爾用先人之治命余是以報漢書曰于定國父于公為縣獄吏郡決曹獄平羅文法者于公所決皆不恨其閭門壞父老方共治之于公謂曰少高大閭門令容駟馬高蓋車我治獄多陰德未曾有所冤子孫必有興者至定國為丞相又曰邴吉字少卿魯國人為丞相寬大好禮初吉有陰德於孝宣帝微時帝即位眾莫知之吉亦不言吉從大將軍長史遷至御史大夫帝聞將封之會吉病甚將使人加綬而封之及其生也太子太傅夏侯勝曰此未死也臣聞有陰德者必饗其樂以及子孫今未獲其樂而病非其死病也後果愈乃封博陽侯終饗其祿後漢書曰何敞六代祖比干學尚書於晁錯注云比干字少卿經明行脩兼通法律為汝陰縣獄吏決曹掾平活數千人後為丹陽都尉征和三年三月辛亥天大陰雨比干在家日中夢貴客車騎滿門覺以語妻語未已而門有老嫗年可八十餘頭白求寄避雨雨甚而衣履不霑雨漬止送至門乃謂比干曰公有陰德今天賜公策以廣公之子孫因出懷中符策狀如簡長九寸凡九百九十杖以授比干曰子孫佩印綬者如此筭又曰和熹鄧后叔父陔言常聞活千人者子孫有封兄訓為謁者使修石臼河歲活數千人大道可信家必蒙福初太傅禹歎, WYG: ''}
