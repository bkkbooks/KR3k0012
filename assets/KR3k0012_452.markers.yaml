  - {type: variant, offset: 228, length: 0, content: '', WYG: 如意為太子昌諫曰陛下若廢嫡立庶臣不敢奉詔髙祖乃止後太子立是為惠帝拜昌為太傅又曰薛廣徳為御史大夫元帝永元中行幸不已廣徳乃上書諫曰臣竊見關東人民流離陛下日撞亡秦之鐘聴鄭衛之樂馳騁干戈恣獵于田野不恤百姓臣誠悼之今士卒暴露從官勞倦願陛下亟返宫與天下同憂樂上即日還宫又帝欲酹祭宗廟出便橋欲御樓船廣徳乃當車免冠頓首諫曰陛下宜從橋上帝曰大夫冠廣徳曰陛下不聴臣臣自刎頸以血汚車輪陛下不得入宗廟矣帝不恱先驅光禄大夫張猛前曰臣聞主聖臣直乘船危從橋安聖主不渉危不履虛御史大夫言可用上曰曉人不當如此耶乃從橋又曰劉向為宗正時西域都䕶甘延壽副校尉陳湯矯制發胡漢兵四萬攻郅支單于斬首傳送京師名王已下一千五百一十八級生虜百四十五人降虜千餘人上議其功丞相匡衡石顯等皆以延壽與湯擅興師矯制幸得不誅不宜加爵土上欲従之向乃上疏諫文多不載扵是上乃赦湯與延壽等矯制罪封延壽義城侯長水校尉湯為關内侯實封三百户又曰貢禹字少翁瑯琊人累為諫議大夫時嵗不登郡國多困禹乃進諫曰今關東諸道禾稼不稔江淮浙右人民流離父子不保願陛下蠲賦稅常貢減太官之食去角觚諸戯廢不急務役速下詔命以蘇疲人上恱之遷禹為御史大夫禹自治憲司数陳得失又言官家奴婢十餘萬人稅良民以給之率脂膏以滑之嵗費鉅萬扵國無益宜請免為庶人從之又奏武帝始臨天下犯法者贖罪入榖者補吏是以官私懼亂盗賊並起玉石混雜真偽不分今欲興至理致太平宜除贖法以進賢良則天下治矣上大恱行之賜禹錢百萬又曰劉輔為諫議大夫成帝欲立趙媫妤為后輔疏曰今陛下觸情縦慾傾扵卑賤之女欲以母天下豈不畏于天乎上怒使掖庭中縛之谷永等上書訟之上乃減死又曰谷永時成帝好微行不止永乃諫曰陛下棄萬乘之至尊樂家人之賤事厭髙美之尊號好匹夫之卑業使供衛之臣執干戈守其空宫使公卿百僚不知陛下所在忽有變将柰社稷何帝歛容而止又曰耿育關内侯陳湯被䜛奪爵黜之燉煌郡育上書諍曰陳湯昔年討絶域不覊之君雪國家累年之恥自古及今安有比哉今被䜛黜老棄燉煌復為遺虜所笑誠可痛哉至今奉使外夷者未嘗不陳郅支之誅夷以揚漢國之威稜豈可以授人之功充人之身開倖門快讒佞者乎帝遂詔湯還京師復舊爵又曰鄭崇字子游髙宻大族哀帝時為尚書僕射数諫諍陳得失每奏事嘗曵革履上笑曰我識鄭尚書履聲崇每以董賢貴寵過度陳諫由是得罪上因責崇曰君門如市何乃欲禁切主上用人乎崇曰臣門如市臣心如水又曰朱雲成帝封諸舅王鳯等五人同日為侯傾壊朝政京兆尹王章以直言見誅安昌侯張禹以依違任事雲為槐里令頗銜之乃諫曰今朝廷大臣上不能匡君下不能益人皆尸禄耳不可以事君請尚方劔㫁佞臣頭一人勵其餘上問曰誰}
