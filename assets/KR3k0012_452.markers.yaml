  - {type: variant, offset: 2666, length: 0, content: '', WYG: 王尊為隗囂将世祖遣來歙往諭之囂不從命而執之欲殺害尊諫曰臣聞為國者慎器與名為家者畏怨重禍慎名器則下服其命輕怨禍則上受其殃今将軍遣子質漢内懐他志名器逆矣而更謀誅其使怨禍結矣古者列國兵交使在其間所以兵貴和而不在戰也何况承王命藉重質而犯之哉且來歙雖單車逺使而漢帝之外兄害之無損扵彼滅之有害扵吾昔宋執楚使者卒有析骸易子之禍小國猶不辱况萬乘之主乎遂不敢害以禮遣之又曰張敏字伯逹河間鄚人累為尚書建初中有侮辱人父者而子殺之肅宗貸其死刑時定其議敏議曰夫死生之决宜從上下猶天之四時有生有殺若開相容恕著之為定法者則是故設奸萌生長罪隟今欲趨生反開殺路一人不死天下受弊記曰利一害百人去城郭王者承天地順四時法聖人從經律願陛下留意下民考尋利害天下幸甚從之又曰爰延字季平外黄人性質直遷侍中帝逰上林苑從容問延曰朕何如主也對曰為漢中主帝曰何以言之對曰尚書令陳蕃任事則治中常侍豫政則亂是以知陛下可與為善可以為非帝曰嗚呼昔朱雲庭折欄檻今侍中面稱朕過何代無竒人哉敬聞命矣又曰杜根字伯堅潁川人永初元年為郎時和熹鄧后臨朝權在外戚根以安帝年長宜親政事與同舍郎上書直諫太后大怒令盛根扵囊殿上}
