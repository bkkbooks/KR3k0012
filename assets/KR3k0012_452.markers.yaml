  - {type: variant, offset: 229, length: 0, content: '', SBCK: 雲曰張禹上大怒曰小臣居下訕上庭辱師傅罪死不赦御史將下雲攀折殿檻大呼曰臣願得從龍逢比干遊於地下免事桀紂之主死不恨矣將軍辛慶忌叩頭流血極諌得免所司理檻帝曰勿理以旌直臣又曰王宏爲侍中哀帝寵董賢爲大司馬衛將軍事是時賢年二十二上置酒與賢父親屬宴飲上放酒從容視賢而􅀏曰吾欲法堯禪舜何如時宏在坐進諌曰昔周成戲以桐葉封弟叔虞於晉周公入曰天子無戲言耳今天下乃髙帝之天下非陛下之天下也陛下以藩王入奉嗣孝成皇帝後當承宗廟傳子孫於無窮豈得以戲言將髙祖社稷輸人耶上黙然不恱終以失㫖貶爲郞署又曰郅都景帝時爲中郎敢直諌面折大臣於朝嘗從上入上林賈姬在厠野􅇾入厠上目郅都不行上欲自持兵救賈姬都伏上前曰一姬死更一姬進天下所少寧賈姬乎陛下縱自輕奈宗廟太后何上還彘亦不傷賈姬太后聞嘉之賜都金百斤上亦賜金百斤又曰梅福上書諌成帝曰天下民}
