  - {type: variant, offset: 1867, length: 265, content: 子弟功臣自為枝輔今陛下有海內而子弟為匹夫卒有田常六卿之臣無輔弼何以相救哉事不師古而能長久者非所聞也又曰沛公入秦宮室帷帳狗馬重寶婦女以千數意欲留居之樊噲諫沛公出舍沛公不聽張良曰夫秦無道故沛公得至此矣為天下除殘賊宜縞素為資今始入秦即安其樂此所謂助桀為虐且忠言逆耳利於行良藥苦口利於病願聽樊噲言沛公乃還軍灞上又曰高帝欲以趙王如意易太子叔孫通諫上曰太子仁孝天下皆聞之呂后與陛下攻苦食淡其可背哉必廢嫡立少臣願先伏誅以頸血汙地高帝曰公罷矣吾直戲耳叔孫通曰太子天下本一搖天下振動奈何以天下戲又曰司馬相如嘗從上至長楊獵是時天子方好自擊熊彘馳獸相如, WYG: 賞踰制蕃}
