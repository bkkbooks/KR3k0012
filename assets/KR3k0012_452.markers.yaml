  - {type: variant, offset: 1571, length: 295, content: 其天下諸侯有爭臣五人雖無道不失其國大夫有爭臣三人雖無道不失其家士有爭友則身不離於令名父有爭子則身不陷於不義史記曰主父偃上書闕下朝奏暮召入見所言九事其八事為律令一事諫伐匈奴其辭曰臣聞明主不惡切諫以博觀忠臣不敢避重誅以直言是故事無遺策而功流萬代又曰趙高親近胡亥曰毀惡蒙氏求其罪過舉殺之子嬰諫曰君誅殺忠臣而立無節行之人是內使群臣不相信而外令鬭士之意離也臣竊以為不可胡亥弗聽又曰趙肅侯遊大陵出於鹿門大夫戊午扣馬諫曰耕事方急一日不作百日不食肅侯下車而謝之又曰秦夷郡縣城銷兵刃不復用不立子弟為王功臣為諸侯者使後無攻戰之患始皇三十四年置酒咸陽宮博士僕射周青臣等頌稱始皇威德齊人淳于越進諫曰臣聞之殷周千餘歲, WYG: 序}
