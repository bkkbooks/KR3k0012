  - {type: variant, offset: 228, length: 0, content: '', SBCK: 如意爲太子昌諫之曰陛下􅀂廢嫡立庶臣不敢奉詔髙祖乃止後太子立是爲惠帝拜昌爲太傅又曰薜廣德爲御史大夫元帝永光中行幸不已廣德乃上書諫曰臣竊見􅀜東人民流離陛下日撞亡􅁗之鍾聽鄭衛之樂馳騁干戈恣獵于田野不恤百姓臣誠悼之今士卒暴露從官勞倦願陛下亟返宮與天下同憂樂上即日還宮又帝欲酎􅀕宗廟岀便門橋欲御樓舡廣德乃當車免冠頓首諫曰陛下冝從橋上帝曰夫夫冠廣德曰陛下不聽臣臣自刎頸以血汚車輪陛下不得入宗廟矣帝不恱先驅光禄大夫張猛前曰臣聞主聖臣直乗舡危從橋安聖主不涉危不履虚御史大夫言可用上曰曉人不當如此乃從橋又曰劉向爲宗正時西域都護甘延壽副校尉陳湯矯制發胡漢兵四萬攻郅支單于斬首傳送京師名王已下七千五百人一十八級生虜百四十五人降虜千餘人上議其功丞相匡衡石顯等皆以延夀與湯擅興師矯制幸得不誅不冝加爵土上欲從之向乃上䟽極諌文多不載於是上乃赦湯與延壽等矯制罪封延壽爲義城侯長水校尉湯爲􅀜內侯食實封三百户又曰貢禹字少翁瑯瑘人累爲諌議大夫時歳不登郡國多困禹乃進諌曰今􅀜東諸道禾稼不稔江淮浙右人民流離父子不保願陛下蠲賦稅常貢減太官之食去角觝諸戲廢不急務役速下詔命以􅂫疲人上恱之遷禹爲御史大夫禹自治憲司數陳得失又言官家奴婢十餘萬人稅良民以給之率脂膏以滑之歳費鉅萬於國無益冝請免爲庶人從之又奏武帝始臨天下犯法者贖罪入榖者補吏是以官私俱亂盗賊並起玉石混􅄂眞僞不分今欲興至理致太平冝除贖法以進賢良則天下治矣上大恱行之賜禹錢百萬又曰劉輔爲諌議大夫成帝欲立趙婕妤爲后輔䟽曰今陛下觸情縱慾傾於卑賤之女欲以母天下豈不畏于天乎上怒使掖庭中縛之谷永等上書訟之上乃減死又曰谷永時成帝好微行不止永乃諌曰陛下弃萬乗之至尊樂家人之賤事厭髙美之尊號好疋夫之卑業使拱衛之臣執干戈守其空宫使公卿百寮不知陛下所在忽有變將奈社稷何帝歛容而止又曰耿育􅀜内侯陳湯􅀍䜛奪爵黜之燉煌郡育上書諍曰陳湯昔年討絶域不羇之君雪國家累年之恥自古及今安有比哉今􅀍䜛黜老弃燉煌復爲遺虜所􅀏誠可痛哉至今奉使外夷者未甞不陳以郅支之誅夷以􅀭漢國之威稜豈可以授人之功弃人之身開倖門路快䜛佞者乎帝遂詔湯還京師復舊爵又曰鄭崇字子㳺髙密大族哀帝時爲尚書僕射數見諌諍陳得失每奏事嘗曵革履上􅀏曰我識鄭尚書履聲崇每以董賢貴寵過度陳諫由是得罪上因責崇曰君門如市何乃欲禁切主上用人乎崇曰臣門如市臣心如水矣又曰朱雲成帝封諸舅王鳯等五人同日爲侯傾壞朝政京兆尹王章以直言見誅安昌侯張禹以依違任事雲爲槐里令頗衘之乃諌曰今朝廷大臣上不能匡君下不能益人皆尸禄耳不可以事君臣請尚方劒斷佞臣頭一人勵其餘上問曰誰}
