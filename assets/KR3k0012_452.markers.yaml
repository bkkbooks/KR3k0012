  - {type: variant, offset: 797, length: 1843, content: 後於魯乎君違不忘諫之以德又曰初鬻拳強諫楚子楚子弗從臨之以兵懼而從之鬻拳曰吾懼君以兵罪莫大焉遂自刖也楚人以為大閽謂之太伯使其後掌之其後鬻拳之孫又曰莊公如齊觀社非禮也曹劌諫曰不可夫禮所以整民也故會以正班爵之義師長幼之序征伐以討其不然諸侯有王王有巡狩有四方也以大習之大習會朝之禮君舉必書書而不法後嗣何觀公不聽又曰丹桓宮之楹丹雕桓宮桓公廟楹謂之柱刻其桷經書刻桓宮桷桷謂之榱榱掾也皆非禮也御孫諫曰臣聞之儉德之恭也侈惡之大也先君有恭德而君納諸大惡無乃不可乎秋哀姜至公使宗婦覿用幣御孫諫曰男贄大者玉帛公侯伯子男執玉至諸侯世子附庸孫孤執帛也小者禽鳥卿執羔大夫執鴈士執雉以章物也女贄不過榛栗棗脩以告虔也榛小栗也脩脯也虔敬也皆取名以示敬也今男女同贄是無別也男女之別國之大節也由夫人亂之無乃不可乎又曰晉侯假道於虞以伐虢宮之奇諫曰虢虞之表也虢亡虞必從之晉不可啟寇不可翫一之謂甚其可再乎諺所謂輔車相依脣亡齒寒者其虞虢之謂也輔頰輔也車牙車也又曰晉靈公不君厚歛以雕牆從臺上彈人而觀其避丸宰夫胹熊蹯不熟殺之寘諸畚使婦人載之以過朝趙盾士季見其手問其故而患之將諫士季曰諫而不入則莫之繼也會請先入則子繼之三進及溜而後視之曰吾知所過矣將改之猶不改宣子驟諫公患之又曰晉師為楚所敗師歸桓子請死晉侯欲許之士貞子諫曰不可城濮之役師三日穀文公猶有憂色左右曰有喜而憂如有憂而喜乎公曰得臣猶在憂未歇也困獸猶鬭況國相乎及楚殺子玉子玉得臣公喜而後可知也曰莫余毒也是晉再勝而楚再敗也楚以是再世不競今天或者大警晉也而又殺林父重楚勝其無乃久不競乎穀梁曰陳靈公通於夏徵舒之家公孫寧儀行父亦通於其家或襦以相戲於朝泄冶聞之入諫曰使國人聞之則猶可使仁人聞之則不可君愧於泄冶不能用其言而殺之周禮地官保氏掌諫王惡諫者以禮義正之論語曰事父母幾諫孝經曰曾子曰敢問子從父之令可謂孝乎子曰是何言歟是何言歟昔者天子有爭臣七人雖無道不失其天下諸侯有爭臣五人雖無道不失其國大夫有爭臣三人雖無道不失其家士有爭友則身不離於令名父有爭子則身不陷於不義史記曰主父偃上書闕下朝奏暮召入見所言九事其八事為律令一事諫伐匈奴其辭曰臣聞明主不惡切諫以博觀忠臣不敢避重誅以直言是故事無遺策而功流萬代又曰趙高親近胡亥曰毀惡蒙氏求其罪過舉殺之子嬰諫曰君誅殺忠臣而立無節行之人是內使群臣不相信而外令鬭士之意離也臣竊以為不可胡亥弗聽又曰趙肅侯遊大陵出於鹿門大夫戊午扣馬諫曰耕事方急一日不作百日不食肅侯下車而謝之又曰秦夷郡縣城銷兵刃不復用不立子弟為王功臣為諸侯者使後無攻戰之患始皇三十四年置酒咸陽宮博士僕射周青臣等頌稱始皇威德齊人淳于越進諫曰臣聞之殷周千餘歲封子弟功臣自為枝輔今陛下有海內而子弟為匹夫卒有田常六卿之臣無輔弼何以相救哉事不師古而能長久者非所聞也又曰沛公入秦宮室帷帳狗馬重寶婦女以千數意欲留居之樊噲諫沛公出舍沛公不聽張良曰夫秦無道故沛公得至此矣為天下除殘賊宜縞素為資今始入秦即安其樂此所謂助桀為虐且忠言逆耳利於行良藥苦口利於病願聽樊噲言沛公乃還軍灞上又曰高帝欲以趙王如意易太子叔孫通諫上曰太子仁孝天下皆聞之呂后與陛下攻苦食淡其可背哉必廢嫡立少臣願先伏誅以頸血汙地高帝曰公罷矣吾直戲耳叔孫通曰太子天下本一搖天下振動奈何以天下戲又曰司馬相如嘗從上至長楊獵是時天子方好自擊熊彘馳獸相如上䟽諫曰臣聞物有同類而殊能者故力稱烏獲捷言慶忌勇期賁育臣之愚以為人誠有之獸亦宜然今陛下好陵阻險射猛獸卒然遇軼材之獸駭不存之地犯屬車之清塵是胡越起於轂下而羌夷接軫也又曰楚莊王即位三年不出號令日夜為樂令國中曰有敢諫者死無赦伍舉入諫莊王左抱鄭姬右抱越女坐鐘鼓之間伍舉曰願有進隱曰有鳥在於阜三年不飛不鳴是何鳥也莊子曰三年不飛飛將冲天三年不鳴鳴將驚人舉退矣吾知之矣居數月淫益大甚蘇從乃入諫王曰若聞令乎對曰煞身以明君臣之願也於是乃罷淫樂聽政所誅者數百人所進者數百人任伍舉蘇從以政國人大悅又曰孫叔敖病且死屬其子曰我死必貧困往見優孟言我孫叔敖子也居數年其子窮困負薪逢優孟與言曰我孫叔敖子也父且死時屬我貧困往見優孟孟曰若無遠有所之即為叔敖衣冠抵掌談語歲餘像孫叔敖楚王及左右不能別也莊王置酒優孟前為壽莊王大驚以為孫叔敖復生也欲以為相優孟曰請歸與婦計之三日而為相莊王許之三日優孟復來王曰婦言何對曰婦言慎無為楚相孫叔敖盡忠為廉以治楚楚王以得霸今死其子無立錐之地貧困負薪以自飲食必如孫叔敖不如自殺於是莊王謝優孟乃召孫叔敖子封寢丘侯四百戶以奉其祀又曰優旃者秦倡侏儒也二世立欲漆其城優旃曰善主上雖無言臣固將請之漆城雖於百姓愁費然佳哉漆城光蕩蕩寇來, SBCK: ''}
