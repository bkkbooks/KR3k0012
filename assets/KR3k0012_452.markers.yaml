  - {type: variant, offset: 300, length: 260, content: 魏戊為梗陽大夫梗陽人有獄魏戊不能斷以其獄上大宗賂以女樂訟者之大宗也魏子將受之魏戊謂閻沒汝寬曰二子晉大夫魏子之屬主以不賄聞於諸侯若受梗陽人賂賄莫甚焉吾子必諫皆許諾退朝待於庭饋入召之召二大夫食此置三歎既食使坐魏子曰吾聞諸伯叔諺曰唯食忘憂吾子置食之間三歎何也同辭對曰昨或賜二小人酒不夕食昨飲酒醉故不夕食饋之始至恐其不足是以歎中置自咎曰豈將軍食之而有不足是以再歎及饋之畢願以小人之腹為君子之心屬厭而已獻子辭梗陽人屬足也小人二子自謂小人腹飢則恐食之不足厭飽則恐君亡君子居尊官食重祿而知不足故顯以其腹為君子之心又曰公將如棠觀漁臧僖伯, WYG: 青簡寫尚書章句佑}
