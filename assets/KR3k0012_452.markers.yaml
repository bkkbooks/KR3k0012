  - {type: variant, offset: 3114, length: 336, content: 䟽諫曰大王不好書術而樂逸遊口倦乎叱咤手苦於轡捶身勞乎車輿朝則冒霜露晝則被塵埃夏則為大暑之所暴炙冬則為風寒之所侵薄以耎脆之玉體犯勤勞之煩毒夫廣廈之下細氈之上明師居前勸誦在後上論唐虞之際下及殷周之盛考仁聖之風習治國之道訢訢焉發憤忘食日新厥德其樂豈徒衘撅之間哉又曰鮑宣每居位嘗上書諫民有七亡而無一得欲望國安誠難也民有七死而無一生欲望刑厝誠難也陛下擢臣巖穴誠冀有益毫毛豈徒欲臣美食太官重高門之地哉又曰龔遂字少卿山陽人以明經為昌邑郎中令王動作不正遂為人忠厚剛毅有大節內諫爭於王外責傅相引經義陳禍福至於涕泣蹇蹇亡已面剌王過王至掩耳起走曰郎中令善愧人及國中皆畏憚焉王嘗與騮奴宰人遊戲飲食過度遂入見王涕泣膝行左右御皆出涕王曰郎中令何為遂曰臣痛社稷之危也又曰張敞為膠東相王太后數出遊獵敞上書, WYG: 疏極}
  - {type: substitution, offset: 3114, original: 䟽, replacement: 疏, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-3186}}
  - {type: variant, offset: 3115, length: 335, content: 諫曰大王不好書術而樂逸遊口倦乎叱咤手苦於轡捶身勞乎車輿朝則冒霜露晝則被塵埃夏則為大暑之所暴炙冬則為風寒之所侵薄以耎脆之玉體犯勤勞之煩毒夫廣廈之下細氈之上明師居前勸誦在後上論唐虞之際下及殷周之盛考仁聖之風習治國之道訢訢焉發憤忘食日新厥德其樂豈徒衘撅之間哉又曰鮑宣每居位嘗上書諫民有七亡而無一得欲望國安誠難也民有七死而無一生欲望刑厝誠難也陛下擢臣巖穴誠冀有益毫毛豈徒欲臣美食太官重高門之地哉又曰龔遂字少卿山陽人以明經為昌邑郎中令王動作不正遂為人忠厚剛毅有大節內諫爭於王外責傅相引經義陳禍福至於涕泣蹇蹇亡已面剌王過王至掩耳起走曰郎中令善愧人及國中皆畏憚焉王嘗與騮奴宰人遊戲飲食過度遂入見王涕泣膝行左右御皆出涕王曰郎中令何為遂曰臣痛社稷之危也又曰張敞為膠東相王太后數出遊獵敞上書, SBCK: 極}
