  - {type: variant, offset: 2332, length: 331, content: 明君臣之願也於是乃罷淫樂聽政所誅者數百人所進者數百人任伍舉蘇從以政國人大悅又曰孫叔敖病且死屬其子曰我死必貧困往見優孟言我孫叔敖子也居數年其子窮困負薪逢優孟與言曰我孫叔敖子也父且死時屬我貧困往見優孟孟曰若無遠有所之即為叔敖衣冠抵掌談語歲餘像孫叔敖楚王及左右不能別也莊王置酒優孟前為壽莊王大驚以為孫叔敖復生也欲以為相優孟曰請歸與婦計之三日而為相莊王許之三日優孟復來王曰婦言何對曰婦言慎無為楚相孫叔敖盡忠為廉以治楚楚王以得霸今死其子無立錐之地貧困負薪以自飲食必如孫叔敖不如自殺於是莊王謝優孟乃召孫叔敖子封寢丘侯四百戶以奉其祀又曰優旃者秦倡侏儒也二世立欲漆其城優旃曰善主上雖無言臣固將請之漆城雖於百姓愁費然佳哉漆城光蕩蕩寇來不得上即欲就之易為漆耳固難為蔭室於是二世以其故, WYG: 頭軔乘輿帝遂}
