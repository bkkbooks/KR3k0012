  - {type: variant, offset: 283, length: 3, content: 去順效, SBCK: 今後宫之女豈不以貧人國乎且聚而不御必生憂怨之感以致兵革水旱之因也上知之而不能用爲佞所害又曰申屠剛字巨卿茂陵人累遷尚書令帝嘗欲岀遊剛以隴蜀未平不冝宴逸諌不聽乃以頭軔乗輿帝遂止又曰王尊爲隗囂將丗祖遣來歙徃諭之囂不從命而執之欲煞害尊諌曰臣聞爲國者愼器與名爲家者畏怨重禍慎名器則下服其命輕怨禍則上受其殃今將軍遣子質漢内懷他志名器}
