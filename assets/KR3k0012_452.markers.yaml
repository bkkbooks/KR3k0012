  - {type: variant, offset: 8, length: 0, content: '', SBCK: 二漢書曰文帝幸上林皇后愼夫人從其在禁中常同坐及坐郎署􅀽盎却愼夫人坐因前􅀃曰臣聞今陛下旣已立后愼夫人迺妾妾主豈可以同坐哉不見人􅇾乎於是上迺恱愼夫人賜盎金五十斤盎以數直諫不得乆居中調爲隴西都尉又曰元帝時左將軍史丹護太子家事竟寧元年上􅃦疾傅昭儀及定陶王常在左右而皇后太子希得進見丹直入卧内頓首伏青蒲上涕泣曰皇太子以適長立積十餘年名號繫於百姓今者道路流言以爲太子有動摇之議審􅀂此臣願先賜死以示羣臣應劭注曰以青規地曰青蒲自非皇后不得至此又曰項羽發使立沛公爲漢王王巴蜀沛公怒不許蕭何諫曰雖漢中之惡猶不愈於死乎王曰何為乃死也何曰今衆不如百戰百敗不死何俟周書曰天與不取反受其咎天漢其稱美乎夫能屈}
