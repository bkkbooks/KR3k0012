  - {type: variant, offset: 636, length: 89, content: 宋華督已殺孔父而弒殤公召莊公于鄭而立之以親鄭以郜大鼎賂公納于太廟非禮也臧哀伯諫曰君人者將昭德塞違以臨照百官猶懼或失之故昭令德以示子孫夫德儉而有度升降而有數文物以紀之聲明以發之百官, SBCK: 銚期重}
  - {type: variant, offset: 636, length: 776, content: 宋華督已殺孔父而弒殤公召莊公于鄭而立之以親鄭以郜大鼎賂公納于太廟非禮也臧哀伯諫曰君人者將昭德塞違以臨照百官猶懼或失之故昭令德以示子孫夫德儉而有度升降而有數文物以紀之聲明以發之百官於是乎戒懼而不敢易紀律今滅德立違而寘其賂器於太廟以明示百官百官象之又何誅焉國家之敗由官邪也官之失德寵賂章也郜鼎在廟章甚孰焉周內史聞之曰臧孫達其有後於魯乎君違不忘諫之以德又曰初鬻拳強諫楚子楚子弗從臨之以兵懼而從之鬻拳曰吾懼君以兵罪莫大焉遂自刖也楚人以為大閽謂之太伯使其後掌之其後鬻拳之孫又曰莊公如齊觀社非禮也曹劌諫曰不可夫禮所以整民也故會以正班爵之義師長幼之序征伐以討其不然諸侯有王王有巡狩有四方也以大習之大習會朝之禮君舉必書書而不法後嗣何觀公不聽又曰丹桓宮之楹丹雕桓宮桓公廟楹謂之柱刻其桷經書刻桓宮桷桷謂之榱榱掾也皆非禮也御孫諫曰臣聞之儉德之恭也侈惡之大也先君有恭德而君納諸大惡無乃不可乎秋哀姜至公使宗婦覿用幣御孫諫曰男贄大者玉帛公侯伯子男執玉至諸侯世子附庸孫孤執帛也小者禽鳥卿執羔大夫執鴈士執雉以章物也女贄不過榛栗棗脩以告虔也榛小栗也脩脯也虔敬也皆取名以示敬也今男女同贄是無別也男女之別國之大節也由夫人亂之無乃不可乎又曰晉侯假道於虞以伐虢宮之奇諫曰虢虞之表也虢亡虞必從之晉不可啟寇不可翫一之謂甚其可再乎諺所謂輔車相依脣亡齒寒者其虞虢之謂也輔頰輔也車牙車也又曰晉靈公不君厚歛以雕牆從臺上彈人而觀其避丸宰夫胹熊蹯不熟殺之寘諸畚使婦人載之以過朝趙盾士季見其手問其故而患之將諫士季曰諫而不入則莫之繼也會請先入則子繼之三進及溜而後視之曰吾知所過矣將改之猶不改宣子驟諫公患之又曰晉師為楚所敗師歸桓子請死晉侯欲許之士貞子諫曰不可城濮之役師三日穀文公猶有憂色左右曰有喜而憂如有憂而喜乎公曰得臣猶在憂未歇也困獸猶鬭況國相乎及楚殺子玉子玉得臣公喜而後可知也曰莫余毒也是晉再勝而楚再敗也楚以是再, WYG: 吴氏}
