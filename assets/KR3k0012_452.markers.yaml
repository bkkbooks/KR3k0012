  - {type: variant, offset: 551, length: 1, content: 公, SBCK: 杜根字伯堅潁川人永􅀄元年爲郎時和喜鄧后臨朝權在外戚根以安帝年長冝親政事與同舎郞上書直諌太后大怒令盛根於囊殿上武士撲殺之執法者以根素知名私語行事人使不加力旣而載出根得􅂫太后使人撿覆根詐死三日目中生蛆因得免又曰李雲字行祖甘陵人爲白馬令衆災頻降雲素剛直憂國}
  - {type: variant, offset: 551, length: 1, content: 公, krp: 杜根字伯堅潁川人永𥘉元年爲郎時和喜鄧后臨朝權在外戚根以安帝年長冝親政事與同舎郞上書直諌太后大怒令盛根於囊殿上武士撲殺之執法者以根素知名私語行事人使不加力旣而載出根得蘇太后使人撿覆根詐死三日目中生蛆因得免又曰李雲字行祖甘陵人爲白馬令衆災頻降雲素剛直憂國}
