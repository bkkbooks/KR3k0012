  - {type: variant, offset: 3725, length: 450, content: 部將率同時十道並出窮追匈奴因分其地立呼韓邪十五子莽將嚴尤諫曰周宣存時獫狁內侵至于涇陽命將征之盡境而還其視戎狄之侵譬猶蚊蝱之螫馳之而已故天下稱明是為中策漢武帝選將治兵輕糧深入遠戍雖有剋獲之功胡輒報之兵連禍結三十餘年中國罷耗匈奴亦創而天下稱武是為下策秦始皇不忍小恥而輕民力築長城之固延袤萬餘里轉輸之所行起於負海疆境既完中國內竭以喪社稷是為無策莽不聽轉兵穀如故天下騷動又曰王莽新即位立威而窮追匈奴莽將嚴尤諫曰今天下遭陽九之阨比年飢饉此一難也不然奉軍糧二難也胡地沙鹵多乏水草三難也胡地秋冬甚寒春夏甚風此四難也輜重自隨虜徐遁逃五難也功必不成莽不聽又曰成帝時王氏擅權群臣莫敢言梅福上書諫曰昔高祖納善若不及從諫如轉圜此高祖所以無敵於天下也又曰梅乘上書諫吳王曰夫以一縷之任係千鈞之重上縣之無極之高下垂之不測之泉雖甚愚之人猶知其絕也又曰谷永上䟽諫成帝曰臣聞三代之所以隕社稷皆由婦人與群惡願陛下追觀夏商周秦所失也又曰伍被楚人諫淮南王曰昔伍子胥諫吳王吳王不用迺曰臣今見麋鹿游姑蘇之臺也今臣亦將見宮中生荊棘露霑衣也因流涕而起, SBCK: ''}
