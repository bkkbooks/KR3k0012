  - {type: variant, offset: 279, length: 3, content: 謂六順, SBCK: 疑下爲權戚所望此章􅀂成載必兼兩昔馬援以薏苡興謗王陽以衣囊邀名嫌疑之戒願留意焉恢撫其首曰呉氏丗不乏季子者後漢書曰陳蕃爲太尉桓帝未朝綱失序封賞踰制蕃上䟽諌曰臣聞諸侯上象七曜下應九土以藩屏王室髙祖非功臣不侯今寵臣以非義受邑左右以無材傳賞守位不料其德列土莫紀其功乃至一門之内侯者數人後宫之中數千采女肉食錦衣脂油粉黛不可勝計鄙諺曰盗不入五女之門以貧人家}
