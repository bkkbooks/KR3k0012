  - {type: variant, offset: 365, length: 211, content: 經笥但欲眠思經事寐與周公通情夢與孔子同意師而可嘲出何典記嘲者大慚吳志曰諸葛瑾字子瑜面長似驢吳王使優人牽驢入題其上曰諸葛子瑜瑾子恪請筆益兩字曰之驢人伏其敏權即以驢賜恪蜀志曰先主與劉璋會涪時張裕為璋從事侍坐其人饒鬚先主嘲之曰昔吾居涿縣時多毛姓東西南北皆諸毛也裕即荅曰昔有士作上黨潞長遷為涿郡令者去官還家時人與書欲曙潞則失涿欲署涿則失潞乃署曰潞涿君先主無鬚故裕以此及之晉書曰范甯嘗患目痛就中書侍郎張湛求方湛因嘲之曰右方宋陽里子少, WYG: 歡喜進賢用能各}
