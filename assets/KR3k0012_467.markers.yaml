  - {type: variant, offset: 3771, length: 1, content: 鴦, krp: 知晉室當復又夢丸土服之覺而喜曰丸者桓也桓旣吞矣吾當復夲土乎齊書曰謝超宗詣東府門自通其日風慘太祖謂四座曰此客至使人不衣自暖矣超宗旣坐飲酒數廵辭氣横出太祖對之甚歡崔鴻後秦録曰秦末祅星見于東井尹緯知秦將㓕心喜踴躍向天再拜唐書陸贄從幸山南道途艱險扈從不及}
  - {type: variant, offset: 3773, length: 0, content: '', SBCK: 帝相失一夕不至上喻軍士曰得贄者賞千金翌日贄謁見上喜形於顔色其寵待如此周書曰人有五氣喜氣内畜雖欲隠之陽喜必見喜色油然以岀又曰師曠見太子晉曰願聞一言王子應之曰吾聞太師將來吾心甚喜旣巳見子喜而又懼吾年甚少見子而懾盡忘吾度韓詩外傳曰曽子曰吾甞仕爲吏禄不過鍾釡尚猶欣欣而喜者非以爲多也樂其逮親也張勃呉錄曰長沙桓王在歴陽遣書呼周瑜瑜將兵五百人舡粮器仗星夜馳赴王大喜執瑜手曰卿至諧矣又曰呉王之女有所怨王者遂自殺王痛之葬於昌門外文}
