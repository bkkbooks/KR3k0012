  - {type: variant, offset: 651, length: 453, content: 凡六物熬以神火下以氣篩蘊於胸中七日然後納諸方寸脩之一時近能數其目睫遠視尺捶之餘長服不已洞見牆壁之外非惟明目乃亦延年又謝敷傳曰初月犯少微一名處士星占者以隱士當之譙國戴逵有美才時人憂之俄而敷死故會稽人士以嘲吳人云吳中高士便是求死不得死又曰謝萬有才名為會稽王道子驃騎長史嘗因侍坐于時月夜明淨道子歎以為佳萬率爾曰意謂不如微雲點綴道子因戲萬曰卿居心不淨乃復彊欲滓穢太清耶又曰何充性好釋典崇修佛寺供給沙門糜費巨億而不𠫤親友貧乏無所施遺以此獲譏於世阮裕常戲之曰卿志大宇宙勇邁終古充問其故裕曰我圖數千戶郡尚不能得卿圖作佛不亦大乎又曰陸雲與荀隱素未相識嘗會張華坐華曰今日相遇可勿為常談雲因撫手曰雲間陸士龍隱曰日下荀鳴鶴鳴鶴隱字也雲又曰既開青雲覩白雉何不張爾弓挾爾矢隱曰本謂是雲龍騤騤乃是山鹿野糜獸微弩彊是以發遲華撫手大笑又曰袁山松欲以女妻謝混王珣曰卿莫近禁臠初元帝始鎮建業公私窘罄每得一扽以為珍膳項下一臠尤美輒以薦帝群下未嘗敢食于時呼為禁臠故珣以為戲混果尚主又曰郄詵遷雍州刺史東堂會送武帝問詵卿自以為何如詵對曰臣舉賢良對策為, WYG: 歡喜}
