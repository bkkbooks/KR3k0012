  - {type: variant, offset: 3766, length: 4, content: 段疋磾弟, SBCK: 石珩問􅀽甫壽春以西何以常旱東何以􅁪水甫曰東是呉人新附積憂成隂西是中國新平呉珎寳羙人皆入志􅄹心滿長歡故旱孫嚴宋書曰劉宣字万壽彭城人也素曉天}
  - {type: variant, offset: 3766, length: 4, content: 段疋磾弟, krp: 石珩問袁甫壽春以西何以常旱東何以恒水甫曰東是呉人新附積憂成隂西是中國新平呉珎寳羙人皆入志盈心滿長歡故旱孫嚴宋書曰劉宣字万壽彭城人也素曉天}
  - {type: variant, offset: 3771, length: 1, content: 鴦, SBCK: 知晉室當復又夢丸土服之覺而喜曰丸者桓也桓旣吞矣吾當復夲􅁟乎齊書曰謝超宗詣東府門自通其日風􅃤太祖謂四座曰此客至使人不衣自暖矣超宗旣坐飲酒數廵辭氣横出太祖對之甚歡崔鴻後􅁗録曰􅁗末祅星見于東井尹緯知􅁗將㓕心喜踴躍向天再拜唐書陸贄從幸山南道途艱險扈從不及}
