  - {type: variant, offset: 2149, length: 808, content: 之天子無戲言天子言則史書之工誦之士稱之於是遂封虞于唐裴啟語林曰劉道真遭亂於河側自牽舡見一老嫗採櫓劉謂之曰女子何不調機利杼而採櫓女荅曰丈夫何不跨馬揮鞭而牽舡又曰祖士言與鍾雅相調鍾語祖曰我汝潁之士利如錐卿燕代之士鈍如槌祖曰以我鈍搥打爾利錐鍾曰自有神錐不可得打祖曰既有神錐亦有神搥鍾遂屈劉義慶世說曰謝太傳始有東山之志祖公見藥中有遠志公問謝此藥又曰小草何以一物二稱謝未即荅郝參軍荅曰處則為遠志出則為小草謝公殊有愧色又曰鄧艾口吃語艾艾晉文王戲之曰為云艾艾故是幾艾鄧荅曰鳳兮鳳兮故是一鳳諸葛恪別傳曰孫權嘗宴見蜀使費禕逆勑群臣使至伏勿起禕至權輟食而群下不起禕嘲之曰鳳凰來翔騏驎吐哺驢騾無知伏食如故恪荅曰愛植梧桐以待鳳凰是何燕雀自稱來翔何不彈射使還故鄉劉昭幼童傳曰張玄字祖希年八歲虧齒先達知其不常故戲之君口復何為開狗竇玄荅云正使君輩從中入罵詈釋名曰罵迫也以惡言被迫人也又曰詈歷也以惡言相彌歷音力智反左傳曰冉堅射陳武子中手失弓而罵戰國策曰宋康王時有雀生鸇於城之陬使史占之曰小而生巨必霸天下王大喜於是滅滕伐薛取淮北之地逾自信欲霸之亟成故射天笞地斬社稷而焚滅之曰威服天下鬼神罵國老諫者為無頭之冠以是示勇國人大駭齊聞而伐之史記曰陳狶將趙利守東垣高祖攻之月餘不下卒眾罵高祖高祖怒城降令出罵者斬不罵者原之漢書曰項羽拔滎陽城生得周苛羽謂苛為我將以公為上將軍苛罵曰若不趍降漢今為虜矣又曰陳狶反上自至邯鄲令周昌選趙壯士可令將者昌見四人上嫚罵曰豎子能為將乎四人慚伏地上以為將又曰張湯以更定律令為廷尉汲黯於上前憤發罵曰天下刀筆吏不可以為公卿果然又曰王莽自立使安陽侯王舜素傳國璽太后知為莽求怒罵之曰我漢家老寡婦旦暮且死欲與此璽俱葬終不可得又曰魏豹叛漢王謂酈生曰緩頰往說之豹曰人生一世間若白駒過隙今漢王嫚侮人罵詈諸侯群臣如奴耳吾不忍復見又曰張敖為趙王高祖從平城過趙王旦暮自上食高祖箕踞罵詈甚慢之趙相貫高等怒說敖曰今王事皇帝甚恭而皇帝無禮請為王殺之又曰韓信平齊, WYG: 伊尹}
