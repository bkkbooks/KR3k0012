  - {type: variant, offset: 11, length: 6, content: 嘲相調戲相弄, SBCK: 喜不言而恱曰喜從壴口壴音知句切易曰上九傾否先否後喜尚書曰股肱喜哉元首起哉毛詩曰風雨如晦鷄鳴不已旣見君子云胡不喜又曰我有嘉賔中心喜之又曰菁菁者莪樂育才也君子能長育人才則天下喜樂之也禮記曰樂者音之所由生也其夲在人心之感於物是故其喜心感者其聲發以散又曰人喜則斯陶陶欝陶也陶斯詠詠斯揺又曰何謂人情喜怒哀樂愛惡欲七者弗學而能}
