  - {type: variant, offset: 130, length: 4, content: 君子學道, SBCK: 非樂其貴然喜下人得吾也又曰龍且與韓信夾濰水陣信乃夜令人爲萬餘囊滿盛沙水壅上流引軍半渡擊龍且佯不勝還走龍且果喜曰固知韓信怯也追信渡水信使人决壅囊水大至擊殺龍且又曰慶雲喜氣也又曰吕后謂髙祖曰季所居之上常有雲氣故從性常得季髙祖心喜又曰邑中人民甞俱岀獵任安爲人分麋鹿雉兎衆人皆喜曰無傷也任少卿分}
