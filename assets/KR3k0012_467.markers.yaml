  - {type: variant, offset: 335, length: 1426, content: 邊孝先腹便便嬾讀書伹欲眠韶潛聞之應時對曰邊為姓先為字腹便便五經笥但欲眠思經事寐與周公通情夢與孔子同意師而可嘲出何典記嘲者大慚吳志曰諸葛瑾字子瑜面長似驢吳王使優人牽驢入題其上曰諸葛子瑜瑾子恪請筆益兩字曰之驢人伏其敏權即以驢賜恪蜀志曰先主與劉璋會涪時張裕為璋從事侍坐其人饒鬚先主嘲之曰昔吾居涿縣時多毛姓東西南北皆諸毛也裕即荅曰昔有士作上黨潞長遷為涿郡令者去官還家時人與書欲曙潞則失涿欲署涿則失潞乃署曰潞涿君先主無鬚故裕以此及之晉書曰范甯嘗患目痛就中書侍郎張湛求方湛因嘲之曰右方宋陽里子少得其術以授魯東門伯東門伯以授左丘明遂世世相傳及漢杜子春鄭康成魏高堂隆晉左太沖凡此諸賢並有目疾得此方云用損讀書一減思慮二專內視三簡外觀四旦晚起五夜早眠六凡六物熬以神火下以氣篩蘊於胸中七日然後納諸方寸脩之一時近能數其目睫遠視尺捶之餘長服不已洞見牆壁之外非惟明目乃亦延年又謝敷傳曰初月犯少微一名處士星占者以隱士當之譙國戴逵有美才時人憂之俄而敷死故會稽人士以嘲吳人云吳中高士便是求死不得死又曰謝萬有才名為會稽王道子驃騎長史嘗因侍坐于時月夜明淨道子歎以為佳萬率爾曰意謂不如微雲點綴道子因戲萬曰卿居心不淨乃復彊欲滓穢太清耶又曰何充性好釋典崇修佛寺供給沙門糜費巨億而不𠫤親友貧乏無所施遺以此獲譏於世阮裕常戲之曰卿志大宇宙勇邁終古充問其故裕曰我圖數千戶郡尚不能得卿圖作佛不亦大乎又曰陸雲與荀隱素未相識嘗會張華坐華曰今日相遇可勿為常談雲因撫手曰雲間陸士龍隱曰日下荀鳴鶴鳴鶴隱字也雲又曰既開青雲覩白雉何不張爾弓挾爾矢隱曰本謂是雲龍騤騤乃是山鹿野糜獸微弩彊是以發遲華撫手大笑又曰袁山松欲以女妻謝混王珣曰卿莫近禁臠初元帝始鎮建業公私窘罄每得一扽以為珍膳項下一臠尤美輒以薦帝群下未嘗敢食于時呼為禁臠故珣以為戲混果尚主又曰郄詵遷雍州刺史東堂會送武帝問詵卿自以為何如詵對曰臣舉賢良對策為天下第一猶桂林一枝崑山之片玉帝笑侍中奏免詵詔曰與戲耳不足罪又曰張憑字長宗祖鎮蒼梧太守憑年數歲鎮謂其父曰我不如汝有佳兒憑曰阿翁詎宜以子戲父耶又曰郄超為桓溫參軍時王珣為溫主簿亦為所重府中語曰髯參軍短主簿能令公喜能令公怒超髯珣短故也又曰潘京為州所辟因謁見問策探得不孝字刺史戲京曰辟士為不孝耶京舉荅板曰今為忠臣不得復為孝子沈約宋書曰何承天除著作郎時年已老諸佐郎並名家少年荀伯子嘲之曰呼為妳母承天曰卿當云鳳凰將九子嬭母何言耶又曰袁淑憙為誇誕每為時人所嘲始興王濬嘗送錢三萬餉淑一宿復遣追取謂使人謬誤欲以戲淑齊書曰陵澄當世稱為碩學讀易三年不解義欲操宋書終不就王儉戲之曰陸公書廚也又曰庾杲之清貧自業食唯有韭菹𤅢韭生韭雜菜或戲之曰誰謂庾郎貧食常有二十七種言三九也又曰謝超宗送湘州刺史王僧虔閣道壞墜水僕射王儉嘗牛驚跣下車超宗撫掌笑戲曰落水三公墮車僕射梁書曰朱异遍治五經涉獵文史博弈書筭皆其所長年二十詣尚書令沈約誡之因戲异曰卿年少何乃不廉异逡巡未達約乃曰天下唯有文義棊書卿一時將去可謂不廉也陳書曰徐陵使魏魏人授館宴賓是日甚熱其主客魏收嘲陵曰今日之熱當因徐常侍來陵即荅曰昔王肅至此為魏始制禮儀今我來聘使卿復知寒暑收大慚隋書曰何妥少機警八歲遊國學助教顧良戲之曰汝姓何是荷葉之荷是河水之河妥應聲荅曰先生姓顧是眷顧之顧是新故之故眾咸異之隋書曰麥鐵杖考功郎竇一嘲之曰麥是何姓鐵杖應聲對曰麥豆不殊那忽相怪竇赧然無以應之時人以為敏惠又曰鄭譯少為太祖所親恒令與諸子遊集年十餘歲嘗詣相府司錄李長宗於眾中戲之譯歛容謂長宗曰明公位望不輕瞻仰斯屬輒相玩狎無乃喪, SBCK: ''}
  - {type: variant, offset: 335, length: 2, content: 邊孝, WYG: 徳曜又曰上幸長安祠髙廟十一陵厯覽宫館舊處㑹郡縣吏勞賜作樂者有縣三老大言陛下入東都臣望顔色儀數如}
