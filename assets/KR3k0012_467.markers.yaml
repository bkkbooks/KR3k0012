  - {type: variant, offset: 121, length: 1, content: 昔, SBCK: 陽子華而不實言而無謀是以難及於身子何喜焉戰國䇿曰吕他亡西周之東周盡輸西周之情於東周東周大喜又曰孟甞君出行至楚楚獻象牀郢之登徒直送之不欲徃見孟甞門人公孫戊曰臣郢之登徒直送象牀象牀之直千金傷此􅀂髮標賣妻息不足以償足下能使僕無行先人有寳劒願獻之戊曰諾入見孟甞曰五國所以皆致相印於君以國事累君}
