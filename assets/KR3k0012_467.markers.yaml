  - {type: variant, offset: 3985, length: 4, content: 文帝詔上, SBCK: 太祖爲司空辟原署東閤􅀕酒太祖北伐三郡克單于還太祖曰􅀌返鄴守諸君必將來迎其不來者獨邴􅀕酒耳言訖未乆而原先至門下通謁太祖大喜􅄃履而起逺出迎原曰賢者誠難則度􅀌謂君將不能來而逺自屈誠副飢虚之心零陵先賢傳曰劉巴入益益州牧劉璋見而驚喜毎有事咨問璋遣法正迎劉備巴諌曰􅇱雄人入必有爲不可内也旣入巴復諌曰􅀂使備討張魯是放虎於山林璋不聽巴閉門稱疾備攻成都令軍中曰其有害巴者誅及三族及得巴甚喜列異記曰華子魚爲諸生􅀉􅀫入門外主人婦夜生頃兩吏詣門便辟易却相謂曰公在此躊蹰良乆一吏曰籍當定柰何住乃前向子魚拜相將入入出並行共語曰當與幾歳一人曰當三歳子魚後故徃視之兒果巳死子魚喜曰我固當公後果爲太尉西京􅄂記曰樊}
  - {type: page-break, offset: 3985, content: '', id: KR3k0012_SBCK_467-8a}
  - {type: variant, offset: 3985, length: 4, content: 文帝詔上, krp: 太祖爲司空辟原署東閤祭酒太祖北伐三郡克單于還太祖曰孤返鄴守諸君必將來迎其不來者獨邴祭酒耳言訖未乆而原先至門下通謁太祖大喜攬履而起逺出迎原曰賢者誠難則度孤謂君將不能來而逺自屈誠副飢虚之心零陵先賢傳曰劉巴入益益州牧劉璋見而驚喜毎有事咨問璋遣法正迎劉備巴諌曰備雄人入必有爲不可内也旣入巴復諌曰若使備討張魯是放虎於山林璋不聽巴閉門稱疾備攻成都令軍中曰其有害巴者誅及三族及得巴甚喜列異記曰華子魚爲諸生寄宿入門外主人婦夜生頃兩吏詣門便辟易却相謂曰公在此躊蹰良乆一吏曰籍當定柰何住乃前向子魚拜相將入入出並行共語曰當與幾歳一人曰當三歳子魚後故徃視之兒果巳死子魚喜曰我固當公後果爲太尉西京雜記曰樊}
  - {type: variant, offset: 3991, length: 3, content: 及特進, SBCK: 噲問陸賈曰自古人君皆云受命於天云有瑞應豈有是乎賈應之曰有之夫目􅽋得酒食火花得錢財鴉鵲噪則行人至蜘蛛集而百事喜也晉朝雜事曰明帝入幘不正元帝自爲正之明帝大喜莊子曰凢交近則靡}
