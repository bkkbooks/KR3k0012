  - {type: variant, offset: 3737, length: 462, content: 百入營省堅堅臥與相見無何卒然而起按劍罵咨遂執斬之王隱晉書曰段疋磾弟文鴦與石勒戰所乘馬乏勒呼曰大兄久望共同天不違願今日相見何復戰請釋伏語鴦罵曰汝為虐久應死吾兄不能用吾計故令汝得至此吾寧死不忍為汝所擒遂下馬與戰山海經曰若山有獸焉名曰山膏其狀如豚赤若丹火善罵好罵也賈誼新書曰紂自謂天王而桀自謂天父已滅之後民以相罵禰衡別傳曰禰衡著寬布單衣練巾坐曹操大營門下以杖捶地數罵責操及其先祖無所不至營令史入啟言外有狂生禰衡言語悖逆請案科治操聞之嘿然良久乃勑外具上廄馬三疋并騎二人挾將送置荊州黃祖遂令殺之吳質別傳曰魏文帝詔上將軍及特進以下皆會質所上將軍曹真肥顉軍朱鑠瘦質召優使說肥瘦真扣刀瞋目言俳敢說吾斬爾遂罵質案劍曰曹子丹吳質吞爾不搖喉何敢恃勢驕耶揚雄方言曰荊淮海岱雜齊之間罵奴曰賊罵婢曰獲桓譚新論曰哀帝時有老人范蘭言年三百歲初與人相見則喜而相應和再三則罵而逐入列女傳曰安定皇甫規妻年盛色美董卓娉以輜軿百乘乃輕服詣卓門跪自陳請卓使侍者悉杖刀圍之妻知不免乃立罵卓曰君羗胡之種毒害天下猶未足耶敢欲行非禮於爾君夫人乎卓乃以其頭懸車軛鞭樸交至遂死車下, WYG: 十七}
