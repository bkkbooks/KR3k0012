  - {type: variant, offset: 1762, length: 1388, content: 也長宗甚異之唐書曰蘇世長高祖嘗嘲之曰名長意短口正心邪棄忠貞於鄭國忘信義於吾家世長對曰名長意短實如聖旨口正心邪未敢奉詔昔竇融以河西降漢十世封侯臣以山南歸國唯蒙屯監即日擢拜諫議大夫晏子春秋曰晏子短小使楚楚人為小門於大門側而延晏子晏子不入日使狗國者從狗門入今日臣使楚不當從狗門入王曰齊無人耶對曰齊之臨淄張袂成帷揮汗成雨何為齊無人使賢者使賢王不肖者使不肖王嬰不肖故使耳莊子曰惠子始與莊子相見而問乎莊子曰今日自以為見鳳凰而徒遭燕雀耳坐者俱笑孔叢子曰平原君與子高飲強子高酒曰昔有遺諺堯舜千鍾孔子百觚子路溘溘尚飲百榼古之聖賢無不能飲也吾子何辭焉子高曰以穿所聞賢聖以道德為人未聞以飲也平原君曰即如先生言則此言何生子高曰生於嗜酒者蓋其勸勵采戲之辭非實然也平原欣然曰吾弗戲子無所聞此雅言也呂氏春秋曰成王與唐叔虞燕居援梧葉以為珪授虞曰此封汝虞喜以告周公公請曰天子封耶成王曰余一人與虞戲尔周公曰臣聞之天子無戲言天子言則史書之工誦之士稱之於是遂封虞于唐裴啟語林曰劉道真遭亂於河側自牽舡見一老嫗採櫓劉謂之曰女子何不調機利杼而採櫓女荅曰丈夫何不跨馬揮鞭而牽舡又曰祖士言與鍾雅相調鍾語祖曰我汝潁之士利如錐卿燕代之士鈍如槌祖曰以我鈍搥打爾利錐鍾曰自有神錐不可得打祖曰既有神錐亦有神搥鍾遂屈劉義慶世說曰謝太傳始有東山之志祖公見藥中有遠志公問謝此藥又曰小草何以一物二稱謝未即荅郝參軍荅曰處則為遠志出則為小草謝公殊有愧色又曰鄧艾口吃語艾艾晉文王戲之曰為云艾艾故是幾艾鄧荅曰鳳兮鳳兮故是一鳳諸葛恪別傳曰孫權嘗宴見蜀使費禕逆勑群臣使至伏勿起禕至權輟食而群下不起禕嘲之曰鳳凰來翔騏驎吐哺驢騾無知伏食如故恪荅曰愛植梧桐以待鳳凰是何燕雀自稱來翔何不彈射使還故鄉劉昭幼童傳曰張玄字祖希年八歲虧齒先達知其不常故戲之君口復何為開狗竇玄荅云正使君輩從中入罵詈釋名曰罵迫也以惡言被迫人也又曰詈歷也以惡言相彌歷音力智反左傳曰冉堅射陳武子中手失弓而罵戰國策曰宋康王時有雀生鸇於城之陬使史占之曰小而生巨必霸天下王大喜於是滅滕伐薛取淮北之地逾自信欲霸之亟成故射天笞地斬社稷而焚滅之曰威服天下鬼神罵國老諫者為無頭之冠以是示勇國人大駭齊聞而伐之史記曰陳狶將趙利守東垣高祖攻之月餘不下卒眾罵高祖高祖怒城降令出罵者斬不罵者原之漢書曰項羽拔滎陽城生得周苛羽謂苛為我將以公為上將軍苛罵曰若不趍降漢今為虜矣又曰陳狶反上自至邯鄲令周昌選趙壯士可令將者昌見四人上嫚罵曰豎子能為將乎四人慚伏地上以為將又曰張湯以更定律令為廷尉汲黯於上前憤發罵曰天下刀筆吏不可以為公卿果然又曰王莽自立使安陽侯王舜素傳國璽太后知為莽求怒罵之曰我漢家老寡婦旦暮且死欲與此璽俱葬終不可得又曰魏豹叛漢王謂酈生曰緩頰往說之豹曰人生一世間若白駒過隙今漢王嫚侮人罵詈諸侯群臣如奴耳吾不忍復見又曰張敖為趙王高祖從平城過趙王旦暮自上食高祖箕踞罵詈甚慢之趙相貫高等怒說敖曰今王事皇帝甚恭而皇帝無禮請為王殺之又曰韓信平齊使人請自立為假王漢王大怒詈曰吾困於此望若來佐我乃欲自立為王張良陳平附耳語之漢王寤因復罵曰大丈夫即為真王耳何以假為又曰田蚡取燕王女為夫人太后詔召列侯宗室皆往賀灌夫行酒次至臨汝侯灌賢方與程不識耳語又不避席夫乃罵曰賢平生毀程不直一錢今長者為壽乃效女兒曹沾囁耳語耶又曰黥布反上自征謂布何苦而反布曰欲為帝耳上怒罵之遂戰破布陣又曰呂后召趙王周昌令王稱疾不行呂后大罵昌曰爾不知我之怨戚氏乎而不遣趙王也, SBCK: 曜孟光}
