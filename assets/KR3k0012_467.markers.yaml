  - {type: variant, offset: 3193, length: 444, content: 尺劍取天下此非天命乎命乃在天雖扁鵲何益又曰陸賈時時前說稱詩書高帝罵曰我乃馬上得之安事詩書乎賈曰馬上得之寧可馬上治之乎范曄後漢書曰王允與呂布謀令騎都尉李肅并勇士千餘人於掖門內以待董卓卓將出馬驚不行肅以戟剌之墜車顧大呼曰呂布何在布曰有詔討賊卓大罵曰庸狗敢如是耶又曰李𠐶等共追乘輿大戰恒農東澗射聲校尉祖雋被瘡隨馬李𠐶謂左右曰尚可活不雋罵之曰汝等凶逆逼迫天子亂臣賊子未有如汝者𠐶使殺之續漢書曰董卓為司空辟蔡邕稱疾不就卓大怒詈曰我力能族人邕不得已及到署祭酒東觀漢記曰劉寬嘗坐客遣蒼頭市酒迂久大醉而還詈曰畜生寬遣人視奴疑必自殺魏志曰諸葛恪圍合肥新城中遣士劉整出圍傳消息為賊所得栲問所傳語整罵曰死狗此何言也我當必死為魏國鬼不茍求活逐汝去又曰龐德與曹仁討關羽為羽所得羽謂曰我欲以卿為將何不早降德罵羽曰豎子何謂降也遂為羽所殺又曰劉備為豫州舉袁渙為茂才後復為呂布所拘布欲使渙作書詈辱備渙不可再三強之不許布大怒以兵脅渙曰為之則生不為則死渙顏色不變笑而應之曰渙聞唯德可以辱人不聞以罵且他日之事劉將軍猶今日之事將軍, WYG: 喜}
