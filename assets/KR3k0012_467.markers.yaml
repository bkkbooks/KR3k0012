  - {type: variant, offset: 1855, length: 3, content: 晏子短, WYG: 曹公與袁紹相拒遣人招張繡繡欲歸紹賈詡勸繡歸曹公繡曰紹强又曹公與吾有讎不可詡曰此乃所以宜從之也夫有覇王之志者固將釋大怨明徳於四海也繡從之歸曹公曹公見之喜執詡手曰使我信重於天下者君也檀道鸞續晉陽秋曰初苻堅南冦京師大震謝𤣥入問討禦之方謝安夷然無懼色𤣥等既破賊有驛書至安方對客圍棋看書既畢攝放床上了無喜色還棋如故客問之安徐答曰}
