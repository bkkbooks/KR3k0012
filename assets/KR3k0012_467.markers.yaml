  - {type: variant, offset: 1859, length: 4, content: 使楚楚人, WYG: 兒軰遂已破賊客罷還内過户安心喜甚不覺屐齒之折其矯情鎮物如此太公六韜曰因其所喜以順其志又曰文王拘羑里求天下珍怪而獻之紂大喜殺牛而賜之曹操别𫝊曰拜操典軍都尉還譙沛士卒共叛襲擊之操得脱身亡走竄平河亭長舍稱曹濟南處士卧養足創八九日謂亭長曰曹濟南雖敗存亡未可知公幸能以車牛相送往還四五日吾厚報公亭長乃以車牛送操未至譙數十里騎求操者多操開帷叱之皆大喜始悟是操雷煥别𫝊曰張華以煥}
