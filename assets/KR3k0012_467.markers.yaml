  - {type: variant, offset: 3854, length: 1, content: 狀, SBCK: 必是也昭王大喜胡冲呉暦曰太史慈字子義於神亭戰敗爲孫䇿所執䇿素聞其名即解縳諮問進取之術慈曰州郡新破士卒離心􅀂儻分散難復合聚欲出宣恩安集恐不合尊旨䇿長跪荅曰誠夲心所望也明日日中望君來還諸將皆疑䇿曰太史子義青州名士以信義爲先終不欺䇿明日大㑹諸將預設酒食立竿視中而慈至䇿大懽喜常與叅論軍事司馬彪九州春秋曰曹公與􅀽紹相距遣人招張繡繡欲歸紹賈詡勸繡歸曹公繡曰紹強又曹公與吾有讎不可詡曰此乃所以冝從之也夫有霸王之志者固將釋大怨明德於四海也繡從之歸曹公曹公見之喜執詡手曰使我信重於天下者君也檀道鸞續晉陽秋曰􅀄符堅南冦京師大震謝玄入問討禦之方謝安夷然無懼色􅀇等旣破賊有驛書至安方對客圍棊看書旣畢攝放牀上了無喜色還棊}
