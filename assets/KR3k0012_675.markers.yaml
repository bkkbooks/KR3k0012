  - {type: variant, offset: 3, length: 2, content: 六理, WYG: 七冠幘帗褐褵袍裘衣珮綬板笏帬鈴杖節履舄帷帳席冠真誥曰有一老人著綉裳戴芙蓉冠倚赤九節杖而立芙蓉冠郎禮之爵弁粗欲相似但不知真人以何物作之耳自非已成真不得冠此又曰逺逰冠相栢真人戴此冠女貞已笄者亦戴冠惟曰王母百戴􅁟勝又女真未笄者則三環角結或飛雲編結餘髮垂兩眉至腰目中也龍冠金精巾虎巾青巾虎文巾金巾巾此真冠巾之名不詳其製又曰男真未冠貞並飛天交結道學傳曰王母二玉女侍王母上殿戴火眞晨纓之冠履𤣥瓊鳯文之舄又曰孟景翼字輔明義嘉構難景翼星夜徃赴經行失道時一人黄衣黄冠任其前引路既得道乃失}
