  - {type: variant, offset: 202, length: 2, content: 所居, WYG: 巾芙蓉冠上清元籙曰九天元父戴寳天之冠太上五帝内真經曰青帝君建九元通天冠又曰赤帝君建三氣𤣥梁寳冠又曰白帝君建七氣明光寳冠又曰黒帝君建五氣𤣥晨之冠又曰黄帝君黄晨通天冠佩黄晨越元之策帶靈飛紫綬太上飛行羽經曰九晨君建飛精玉帶衣九色之鳯帔又曰元晨君建飛天玉冠衣九龍天衣又曰華蓋晨君建𤣥晨寶冠衣丹錦飛裳又曰上晨君建𤣥精玉冠衣𤣥羽飛裳又曰華晨君建員冠寶冠衣青羽飛裳太上飛行寶經曰靈飛妃元皇夫人建晨纓寶冠昇𤣥經曰仙入定子明著黄褐𤣥巾太洞玉訣曰皇初紫元天中真人採朱錦之服巾緑霞之冠山西經曰玉女建白冠洞神經曰天皇君戴九色冠地皇君戴二晨玉冠執元皇定籙策人皇君戴七色冠報上皇保命玉策}
