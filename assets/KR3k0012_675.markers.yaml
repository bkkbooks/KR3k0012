  - {type: variant, offset: 1637, length: 5, content: 空瓊臺太平, WYG: 元真人杖紫毛節紫㣲王夫人與一神女俱降神女著雲錦䄜上丹下青文采相照腰有緑繡𢃄𢃄係十餘小鈴鈴青色黄色更相叅厠左𢃄玉珮珮如人間之珮但㡬小耳衣服倐倐有光照映色室内如日中視雲母也雲髮鬒鬂整頓絶倫髮在頂中垂餘髮至腰指金丸白珠約臂視之年可堪十三四左右兩侍女其一侍女著朱衣𢃄青章囊手中又持一錦囊囊長尺餘以盛書十餘卷以白玊檢上刻字云清神虎内真紫元丹章其一侍女著青衣捧一白箱以絳𢃄絡之箱以象牙箱形二侍女年可堪十七八整飾非常又曰裴真人從者持青毛之節一童𢃄繡嚢周君從者持黄毛之節無囊二君各有六童又曰東卿大臣見絳侍從七人一人執紫毛節一人執華幡一名十絶靈幡一人𢃄緑章囊三人捧牙箱一人握流金鈴侍者並朱衣東卿形甚少於二弟二弟著青錦繡帬紫毛帔巾芙蓉冠二弟並同來倚立東卿命坐言語良乆時乙丑歳晉興寧三年七月四日降於楊君之家也又曰先}
