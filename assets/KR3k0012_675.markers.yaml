  - {type: variant, offset: 127, length: 0, content: '', SBCK: 王眞九天丈人建飛精百變之冠佩九元道眞之䇿又曰上三天玉童建三華寳曜洞天玉冠四明科曰凢脩上清道經大洞眞經入宣之日當身冠法服又曰凢女子學}
