  - {type: variant, offset: 127, length: 0, content: '', krp: 王眞九天丈人建飛精百變之冠佩九元道眞之䇿又曰上三天玉童建三華寳曜洞天玉冠四明科曰凢脩上清道經大洞眞經入宣之日當身冠法服又曰凢女子學}
  - {type: variant, offset: 130, length: 1, content: 境, SBCK: 法受寳經玉訣脩行大洞皆元君夫人之位入宣之曰當冠元君之服万眞束帶玉童玉女各二十人其掌法服無此服不得􅂛於上清洞神經曰受道之人皆玄冠草履傳授經曰老子去周左慈在魏並葛巾單裙不著􅄄又曰陸先生云對上下接謂之俯仰之格披􅄄二服也又云冠戴二儀衣􅀍四象故謂之法服道學傳曰西母結大華之髻戴太眞晨纓之冠履玄瓊鳯文之舃上清變化經云紫映玉霄眞玉建建華天冠帶交金之鈎又曰上皇玉靈君建七曜華冠佩舟文紫綬又曰皇上帝君建七色朱精華冠又曰太素髙虗上極紫皇建七寳冠帶神精交蛇之綬又曰虚明紫蘭中元髙嵉君建三華之冠帶流金紫章又曰太素眞君建紫晨巾乗靑龍紫羽蓋玉珮金璫經曰元始天王披九色離羅之帔帶寳冠又曰太帝建七氣朱冠又曰太岳君建三寳九光夜冠又曰華山君建六元通神飛冠佩交靈之綬又曰嵩髙君建中元黄晨玉冠佩黄神中皇之章又曰玉佩帝君建紫冠眞誥曰上元夫人服赤霜􅂁披靑毛錦裘頭作三角髻散髮至於􅆎戴元晨夜月之冠帶六山火玉之佩􅆎鳯文琳華太綬執流黄揮精之釼上清變化經曰太元眞人巾芙蓉冠上清元籙曰}
