  - {type: variant, offset: 1637, length: 5, content: 空瓊臺太平, SBCK: 元眞人杖紫毛之節紫微王夫人與一神女俱降神女着雲錦樆上丹下青文采相照􅆎有緑繡帶帶係十餘小鈴鈴青色黄色更相叅厠左帶玉珮珮如人間珮珮但幾小耳衣服倐倐有光照映室内如日中視雲母也雲髮鬒􅁂整頓絶倫髻在頂中垂餘髮至􅆎指着金鐶白珠約臂視之年可堪十三四左右两侍女其一侍女着朱衣帶青章囊手中又持一錦囊囊長尺餘以盛書十餘卷以白玉檢上刻字云玉清神虎内眞紫元丹章其一侍女着青衣捧一白箱以絳帶絡之箱似象牙箱形二侍女年可堪十七八整飾非常又曰裴眞人從者持青毛之節一童帶繡囊周君從者持黄毛之節無囊二君各有六童又曰東卿大臣見降侍從七人一人執紫毛節一人執華幡一名十絶靈幡一人帶緑章囊三人捧牙箱一人握流金鈴侍者並朱衣東卿形甚少於二弟二弟著青錦繡帬紫毛帔巾芙蓉冠二弟並同來􅀝立東卿命坐言語良乆時乙丑歳晉興寜三年七月四日降於楊君之家也又曰先}
