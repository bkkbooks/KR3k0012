  - {type: variant, offset: 3237, length: 1, content: 預, SBCK: 輕裘緩帶身不􅀍甲鈴閤之下侍衛者不過十數又曰劉道規爲荆州刺史桓玄餘黨荀林屯江津桓謙軍屯枝江二宼交逼乆絶都邑之問荆楚旣桓氏義舊並懷異心道規乃㑹將士告之曰桓謙今在近畿聞諸君頗有去就之計吾東來文武足以濟事若欲去者夲不相禁因夜開城門逹暁不閉衆咸憚服莫有去者又曰劉􅁉爲將北伐後秦姚泓烏宏反以擅道濟爲前鋒至洛陽凢㧞城破壘俘四千餘人議者謂應以戮爲京觀道濟曰伐罪吊民正在今日皆釋而}
