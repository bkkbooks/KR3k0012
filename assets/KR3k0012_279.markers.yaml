  - {type: variant, offset: 926, length: 253, content: 北軍北軍中候一人六百石掌臨五營黎陽雍營緣邊十二郡騎士漢官儀曰光武中興以幽冀并州兵騎克定天下故於𥠖陽五營以謁者監之又曰扶風郡尉部在雍縣以涼州近羗數犯三輔將兵衛護故俗稱雍營及羗胡兵出塞明年憲與秉各將四千騎及南匈奴左谷蠡王師子師子其名也萬騎出朔方雞鹿塞南單于屯屠河屯屠河單于名將萬餘騎出滿夷谷度遼將軍鄧鴻鄧禹少子及緣邊義從羗胡八千騎與左賢王安國萬騎出棝陽塞棝陽在五原郡棝音固皆會𣵠郡山憲分遣副校尉閻盤司馬耿夔耿譚將左谷蠡王師子右呼衍王須訾等呼衍其號因以為姓匈奴貴種也今呼延姓是其後須訾各精騎萬餘與北單于戰於稽落山, SBCK: ''}
