  - {type: variant, offset: 3188, length: 0, content: '', SBCK: 敵也丗􅀃曰桓石虎小字鎮惡常從征枋頭車􅀐冲没左右莫能先救宣武問汝叔落賊汝知否虎聞氣甚􅁬䇿馬於万衆中置冲還三軍歎服河朔遂以其威時有患瘧者怖之多愈因斷瘧焉燉煌實録曰宋質直破虜有威名兒啼恐之即止虜相恚曰使汝行逢宋都督信義左傳曰曹衞告絶於楚子玉怒從晉師晉退軍吏曰以君避臣辱也且楚師老矣何故退子犯曰師直爲壯曲爲老豈在乆乎微楚之惠不及此重耳過楚楚成王有贈送之惠退三舎避之所以報也一舍三十里初楚子云若反國何以報我故以退三舎爲報又曰晉文公圍原命三曰之粮原不降命去之諜出曰原將降矣軍吏請待公曰信國之寳也民之所庇也得原失信何以庇之所亡滋多退三舎而原降又曰晋將荀呉伐鮮虞圍鼓鼔白狄之别也鼓人或請以城叛呉曰吾聞諸叔向好惡不愆民知所適事無不濟也愆過適㱕或以吾城叛吾所甚惡也人以城來吾獨何好焉賞所甚惡若所好何無復加所好也若其弗賞是失信也何以庇民力能則進否則退量力而行吾不可以欲城而邇姦也所喪滋多使鼓人殺叛人而繕守備圍鼓三月鼓人或請降使其民見曰猶有食色軍吏曰􅀗城而不取勤民而頓兵何以事君呉曰所以事君也􅀗一邑而教民怠將焉用邑邑以賈怠不如完舊完猶保守也賈音估完户官切賈怠無卒卒終棄舊不祥鼓人能事其君我亦能事吾君德義不爽爽差好惡不愆城可獲而民知義所知義所在也荀呉必其能􅀗故因以示義有死命而無二心不亦可乎鼓人告食竭力盡而後取之尅鼔而返不戮一人史記曰􅁗末天下兵起范増􅀃項梁曰陳勝敗固當夫􅁗滅六國楚最無罪}
  - {type: page-break, offset: 3188, content: '', id: KR3k0012_SBCK_279-4a}
  - {type: page-break, offset: 3188, content: '', id: KR3k0012_SBCK_279-4b}
  - {type: variant, offset: 3188, length: 0, content: '', WYG: 敵也世説曰桓石䖍小字鎮惡嘗從征枋頭車騎冲没陳左右莫能先救宣武問汝叔落賊汝知不石䖍聞之氣甚奮策馬於數萬衆中徑致冲還三軍歎服河朔後以其名㫁瘧燉煌實録曰宋質直破敵有威名兒啼恐之即止敵相恚曰使汝行逢宋都督信義左𫝊曰曹衞告絶於楚子玉怒從晉師晉師退軍吏曰以君避臣辱也且楚師老矣何故退子犯曰師直為壮曲為老豈在乆乎㣲楚之惠不及此重耳過楚楚成王有贈送之惠退三舍避之所以報也一舍三十里初楚子云若反國何以報我故以退三舍為報又曰晉文公圍原命三日之糧原不降命去之諜出曰原將降矣軍吏請待公曰信國之寳也民之所庇也得原失信何以庇之所亡滋多退一舍而原降又曰晉將荀呉伐鮮虞圍鼓鼓白狄之別名鼓人或請以城叛吴曰吾聞諸叔向好惡不愆民知所適事無不濟愆過適歸也或以為城叛吾所甚惡也人以城來吾獨何好焉賞所甚惡若所好何無復加所好也若其弗賞是失信也何以庇民力能則進否則退量力而行吾不可以欲城而邇姦所䘮滋多使鼓人殺叛人而繕守備圍鼔三月鼓人或請降使其民見曰猶有食色軍吏曰獲城而不取勤民而頓兵何以事君吴曰所以事君也獲一邑而教民怠將焉用邑邑以賈怠不如完舊完猶保守也賈音古完戸官反賈怠無卒卒終棄舊不祥鼔人能事其君吾亦能事吾君徳義不爽爽差好惡不愆城可獲而民知義所知義所在也荀吴必其能獲故因以示義有死命而無二心不亦可乎鼓人告食竭力盡而後取之克鼓而返不戮一人史記曰秦末天下兵起范増說項梁曰陳勝敗固當夫秦滅六國楚最無罪}
