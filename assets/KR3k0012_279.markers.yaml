  - {type: variant, offset: 234, length: 430, content: 逐單于東破胡滅澹林西抑強秦南支韓魏當是之時趙幾霸會趙王遷其母倡也王遷立乃用郭開讒卒誅李牧令顏聚代之是以兵破士北為秦所滅今臣竊聞魏尚為雲中守其軍市租盡以給士卒出私養錢五日一殺牛饗賓客軍吏舍人是以匈奴遠避不近雲中之塞虜嘗一入尚率車騎擊之所殺甚眾夫士卒盡家人子起田中從軍安知尺籍伍符終日力戰斬首捕虜上功莫府一言不相應文吏以法繩之其賞不行而吏奉法必用臣愚以為陛下法太明賞太輕罰太重且雲中守魏尚坐上功首虜差六級陛下下之吏削其爵罰之由此言之陛下雖得廉頗李牧不能用文帝說是日令馮唐持節赦魏尚復以為雲中守而受唐為車騎都尉又曰武帝以李廣為未央衛尉而程不識亦為長樂衛尉不識故與廣俱嘗屯邊而廣行無部伍行陣就善水草屯舍止人人自便不擊刀斗以自衛莫府省約束文籍事然亦遠斥候未嘗遇害程不識正部曲行伍營陣擊刀斗士吏理軍簿至明軍不得休息然亦未嘗遇害不識曰李廣軍極簡易然虜卒犯之無以禁也而其士卒亦佚樂咸樂為之死我軍雖煩擾然虜亦不得犯我是時漢邊郡李廣程不識皆為名將然匈奴畏廣士卒亦多樂從廣而苦程不識, SBCK: 平界}
