  - {type: variant, offset: 3327, length: 2, content: 測徐, WYG: 又曰劉道規為荆州刺史桓𤣥餘黨荀林屯江津桓謙軍屯枝江二冦交逼乆絶都邑之問荆楚既桓氏義舊並懐異心道規乃㑹將士吿之曰桓謙今在近畿聞諸軍頗有去就之計吾東來文武足以濟事若欲去者本不相禁因夜開城門達曉不閉衆咸憚服莫有去者又曰劉裕為將北伐後秦姚泓烏宏反以檀道濟為前鋒至洛陽凡㧞城破壘俘四千餘人議者謂應以戮為京觀道濟曰伐罪弔民在今日皆釋而遣之於是戎狄感恱相}
