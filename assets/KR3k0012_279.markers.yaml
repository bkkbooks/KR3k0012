  - {type: variant, offset: 1913, length: 712, content: 利其大都護偏何鮮卑名也遣使奉獻願得歸化彤慰納賞賜稍復親附其異種滿離高句驪之屬遂駱驛款塞上貂裘好馬帝輒倍其賞賜其後偏何邑落諸豪並歸義願自效彤曰審欲立功當歸擊匈奴斬送頭首乃信耳偏何等皆仰天指心曰必自效即擊匈奴左伊袟訾部斬首二千餘級持頭詣郡其後歲歲相攻輒送首級又曰烏桓鮮卑追思祭彤無已每朝賀京師常過冢拜謁仰天號泣乃去遼東吏人為立祠四時奉祭焉又曰耿恭以踈勒城傍有澗水可固五月乃引兵據之七月匈奴復攻恭慕先登數千人直馳之朝騎散走匈奴遂於城下擁絕澗水恭於城中穿井十五丈不得水吏士渴乏笮馬糞汁而飲之笮謂壓笮也恭仰歎曰聞昔貳師將軍拔佩刀刺山飛泉涌出貳師大宛中城名昔武帝時使李廣利代大宛至貳師城因以為號今漢德神明豈有窮哉乃整衣服向井再拜為吏士禱有頃水泉奔出眾皆稱萬歲乃令吏士揚水以示虜又曰光武至薊聞邯鄲兵方到光武將欲南歸召官屬計議耿弇曰今兵從南來不可南行漁陽太守彭寵公之邑人寵南陽宛人也上谷太守即弇公也發此兩都控弦萬騎邯鄲不足慮也光武官屬腹心皆不肯曰死尚南首奈何北行入囊中漁陽上谷北椄塞垣至彼路窮如入囊也光武指弇曰是我北道主人也又曰耿夔為大將軍左校尉將騎八百出居延塞直奔北單于庭於金微山斬閼氏名王已下五千餘級單于與數騎脫亡盡獲其匈奴珍寶財畜去塞五千餘里而還自漢出師所未嘗至也又曰班超在䟽勒將還中國䟽勒舉國憂恐其都尉黎弇曰漢使棄我我必復為龜茲所滅耳誠不忍見漢去因以刀自剄超還至于寘王侯以下皆號泣曰依漢使如父母誠不可去㸦抱超馬腳不得所行超恐于寘終不聽其東又欲遂本志乃更還䟽勒䟽勒兩城自超去後復降龜茲而與尉頭連兵尉頭國居尉頭谷去長安八千六百五十里南與䟽勒接衣服類烏孫也超捕斬反者擊破尉頭又曰叚頴破羗窮山深谷之中斬其渠師以下萬九千級獲牛馬騾驢氈裘廬帳什, SBCK: ''}
