  - {type: variant, offset: 3190, length: 4, content: 易帖但須, krp: 其言迺赦外黄當坑者而東至睢陽聞之皆争下又曰漢王至洛陽新城三老董公遮說漢王以義帝死請發喪漢王從之髙祖大哭遂爲義帝發喪臨三日發使者告諸侯曰天下共立義帝北靣事之今項王放殺義帝江南大逆無道寡人親爲發喪諸侯皆縞素發國内兵収三河士南浮江漢以下願從諸侯王擊楚之殺義帝者於是諸侯多從之後漢書曰更始𥘉光武爲蕭王定河北諸賊銅馬餘衆降封其渠帥爲列侯降者猶不自安光武知其意令各歸營勒兵乃自乘輕騎案行部陣降者更相語曰蕭王推赤心置人腹中安得不投死乎投死猶言致也由是皆服蜀志曰明帝自征蜀至長安遣張郃諸軍勁卒四十餘万向劒閣諸葛亮有戰士万二千時魏軍始陣兵適交叅佐咸以敵衆強多非力所制控權停下兵并聲勢亮曰吾聞用武行師以大信爲夲得原失信古人所惜去者束裝以待期妻子企踵而計日乃勑速遣於是去者感恱願留}
