  - {type: variant, offset: 3215, length: 3, content: 宇文測, SBCK: 羊祜爲征南大將軍督荆州諸軍事祜以孟獻營武牢而鄭人懼晏嬰城東陽而萊子服乃進據險要開建五城収膏􅃾之地奪呉人之資石城以西盡爲晉有自是前後降者不絶乃増修德信以懷柔􅀄附􅁣然有吞呉之心毎與呉人交兵尅日方戰不爲掩襲之計將帥有欲進譎詐之䇿者輙飲以醇酒使不得言人有掠呉二兒爲俘者祜遣送還其家後呉將夏詳邵頭等來降二兒之父亦率其屬與俱呉將陳尚潘景來宼祜追斬之美其死節而厚加殯歛景尚子弟迎喪祜以禮遣還呉將鄧香掠夏口祜募生縳香旣至宥之香感其恩率部曲而降祜出軍}
  - {type: page-break, offset: 3215, content: '', id: KR3k0012_SBCK_279-6b}
  - {type: variant, offset: 3215, length: 3, content: 宇文測, WYG: 羊祜為征南大將軍督荆州諸軍事祜以孟獻營武牢而鄭人懼晏嬰城東陽而萊子服乃進據險要開建五城取膏腴之地奪吴人之資石城以西盡為晉有自是前後降者不絶乃増脩徳信以懐柔初附慨然有吞吴之心每與吴人交兵剋日方戰不為掩襲之計將帥有欲進譎詐之䇿者輒飲以醇酒使不得言人有掠吴二兒為俘者祜遣送其家後吴將夏祥邵顗等來降二兒之父亦率其属與俱吴將陳尚潘景來冦祜追斬之美其死節而厚加殯斂景尚子弟迎䘮祜以禮遣還吴將鄧香掠夏口祜募生縳香既至宥之香感其恩率部曲而降祜出軍}
