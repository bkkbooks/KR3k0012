  - {type: page-break, offset: 3189, content: '', id: KR3k0012_WYG_279-8b, image: WYG0895/WYG0895-0471d.png}
  - {type: variant, offset: 3189, length: 0, content: '', krp: 懷王入秦不返楚人憐之至今曰楚雖三户亡秦必楚今陳勝首事不立楚後而自立其勢不長今君起江楚蜂起之將皆争附君者以君丗丗楚將爲能復立楚之後也乃求楚懷王孫心立爲懷王以從民欲也又曰漢楚相持之際項羽擊陳留外黄外黄不下數日降羽悉令男子年十五以上詣城東欲坑之外黄令舎人兒年十三令之舎人兒也以其㓜弱故孫其父徃說羽曰彭越強刼外黄強音其兩反外黄恐故且降待大王大王至又皆坑之百姓豈有所歸心哉從此以東梁地十餘城皆恐莫肯下矣羽}
  - {type: variant, offset: 3190, length: 4, content: 易帖但須, SBCK: 其言迺赦外黄當坑者而東至睢陽聞之皆争下又曰漢王至洛陽新城三老董公遮􅀃漢王以義帝死請發喪漢王從之髙祖大哭遂爲義帝發喪臨三日發使者告諸侯曰天下共立義帝北靣事之今項王放殺義帝江南大逆無道寡人親爲發喪諸侯皆縞素發國内兵収三河士南浮江漢以下願從諸侯王擊楚之殺義帝者於是諸侯多從之後漢書曰更始􅀄光武爲蕭王定河北諸賊銅馬餘衆降封其渠帥爲列侯降者猶不自安光武知其意令各歸營勒兵乃自乘輕􅀐案行部陣降者更相語曰蕭王推赤心置人腹中安得不投死乎投死猶言致也由是皆服蜀志曰明帝自征蜀至長安遣張郃諸軍勁卒四十餘万向劒閣諸􅁑亮有戰士万二千時魏軍始陣兵適交叅佐咸以敵衆強多非力所制控權停下兵并聲勢亮曰吾聞用武行師以大信爲夲得原失信古人所惜去者束裝以待期妻子企踵而計日乃勑速遣於是去者感恱願留}
  - {type: page-break, offset: 3190, content: '', id: KR3k0012_SBCK_279-5b}
  - {type: variant, offset: 3190, length: 4, content: 易帖但須, WYG: 其言廼赦外黄當坑者而東至睢陽聞之皆争下項王又曰漢王至洛陽新城三老董公遮說漢王以義帝死故漢王聞之袒而大哭遂為義帝發䘮臨三日發使者告諸侯曰天下共立義帝北面事之今項羽放殺義帝於江南大逆無道寡人親為發䘮諸侯皆縞素悉發關内兵收三河士南浮江漢以下願從諸侯王擊楚之殺義帝者後漢書曰更始初光武為蕭王定河北諸賊銅馬餘衆降封其渠帥為列侯降者猶不安光武知其意令各歸營勒兵乃自乗輕騎案行部陣降者更相語曰蕭王推赤心置人腹中安得不投死乎投死猶言致死由是皆服三國志明帝自征蜀至長安遣張郃諸軍勁卒四十餘萬向劍閣諸葛亮有戰士萬二千更下兵者八千時魏軍始陣畨兵適交參佐咸以敵衆强多非力所制控權停下兵并聲勢亮曰吾聞用武行師以大信為本得原失信古人所惜去者束装以待其妻子企踵而計日乃勅速遣於是去者感恱逗留}
