  - {type: variant, offset: 3236, length: 0, content: '', SBCK: 呉人翕然恱服稱爲羊公不之名也祜與陸抗相對使命交通抗稱祜之徳量雖樂毅諸􅁑孔明不能過也抗嘗病祐饋之藥抗服之無疑心士多諌抗抗曰羊祜豈酖人者時談以爲華元子反復見於今抗毎告其戍曰彼專爲德我專爲􅁀是不戰而自服也各保分界而巳無求細利孫皓聞二境交和以詰抗抗曰一邑一郷不可以無信義况大國乎臣不如此正是彰其徳於祜無傷也又曰羊祜在軍}
