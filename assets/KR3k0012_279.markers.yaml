  - {type: variant, offset: 3189, length: 0, content: '', SBCK: 懷王入􅁗不返楚人憐之至今曰楚雖三户亡秦必楚今陳勝首事不立楚後而自立其􅀔不長今君起江楚蜂起之將皆争附君者以君丗丗楚將爲能復立楚之後也乃求楚懷王孫心立爲懷王以從民欲也又曰漢楚相持之際項羽擊陳留外黄外黄不下數日降羽悉令男子年十五以上詣城東欲坑之外黄令舎人兒年十三令之舎人兒也以其㓜弱故孫其父徃􅀃羽曰彭越強刼外黄強音其兩反外黄恐故且降待大王大王至又皆坑之百姓豈有所歸心哉從此以東梁地十餘城皆恐莫肯下矣羽}
  - {type: page-break, offset: 3189, content: '', id: KR3k0012_SBCK_279-5a}
  - {type: variant, offset: 3189, length: 0, content: '', WYG: 懐王入秦不返楚人憐之至今曰楚雖三户亡秦必楚今陳勝首事不立楚後而自立其勢不長今君起江東楚蠭起之将皆争附君者以君世世楚將為能復立楚之後也乃求楚懐王孫心立為楚懐王從民所欲也項籍本紀曰項王乃東行擊陳㽞外黄外黄不下數日降羽悉令男子年十五已下詣城東欲阬之外黄令舍人兒年十三令之舍人兒也以其㓜弱故係其父徃說羽曰彭城强刼外黄强音其兩反外黄恐故且降待大王大王至又皆阬之百姓豈有歸心從此以東梁地十餘城皆恐莫肯下矣項王}
