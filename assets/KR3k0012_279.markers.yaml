  - {type: variant, offset: 3562, length: 2, content: 長帥, SBCK: 生人之樂又曰裴度旣平淮西以蔡卒爲牙兵或以爲反側之子其心未安不可自去其備度􅀏而荅曰吾受命爲彰義軍節度使元惡就擒蔡人即吾人也蔡之父老無不感泣申光之民即時平定又曰李愬襲蔡州旣􅀗李祐又解其縛而客禮之愬乘間常召祐及人而語義亦降將也夲名憲愬改之軍中多以諌愬愬益親祐始募敢死者三十人以爲突將愬自教習之將襲元濟㑹􅀨水自五月}
