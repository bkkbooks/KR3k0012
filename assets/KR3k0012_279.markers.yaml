  - {type: variant, offset: 1226, length: 673, content: 萬頭於是溫犢須日逐溫吾夫渠王抑鞮等八十一部率降者前後二十餘萬人憲秉遂登燕然山去塞三千餘里刻石勒功紀漢威德令班固作銘又曰馬援討五溪蠻軍次下雋下雋縣名屬長沙國故城今辰州沅陵縣雋音字兗反有兩道可入從壺頭則路近而水嶮壺頭山名也今在辰州沅陵東武陵記曰此山頭與東海方壺山相似神仙多所遊集固名壺頭山也從充則塗夷而運遠充縣名屬武陵郡充音昌容反帝初以為疑及軍至耿舒欲充道援以為棄日費糧不如進壺頭搤其喉咽搤持也充賊自破以事上之帝從援策三月進營壺頭賊乘高守隘水疾舡不得上會暑甚士卒多疾死援亦中病遂困乃穿岸為室以避炎氣武陵記曰壺頭山邊有石窟即援所室也室內有地如百斛舡大云是援之餘靈也賊每升險鼓譟援輒曳足以觀之左右哀其壯意莫不為之流涕又曰初馬援軍還將至故人多迎勞之平陵人孟冀名有計謀於坐賀援謂之曰吾望子有善言反同眾人耶昔伏波將軍路愽德開置七郡裁封數百戶漢書曰平南越以為南海蒼梧鬱林合浦交阯九真日南朱崖儋耳九郡今此言七郡則與前書不同也今我微勞猥饗大縣功薄賞厚何以能長久乎先生奚用相濟冀曰愚不及援曰方今匈奴烏桓尚擾北邊欲自請擊之男兒要當死於邊野以馬革裹屍還葬耳何能臥床上在兒女子手中耶冀曰諒為列士當如此矣又曰鄧訓卒官吏人羗胡愛惜旦夕臨者日數千人戎俗父母死恥悲泣皆騎馬歌呼至聞訓卒莫不吼號或以刀自割又殺其犬馬牛羊曰鄧使君已死我曹亦俱死耳前烏桓吏士皆奔走道路訓往烏桓校尉時吏士也至空城郭吏執不聽以狀白校尉徐傿傿歎息曰此義也傿音於建反乃釋之遂家家為訓立祠每有疾病輒請禱求福又曰竇固復出玉門擊西域詔耿秉及騎尉劉張皆去符傳以屬固專將兵者並有符傳擬合之取信今去符皆受固之節度也固遂破曰山降, WYG: ''}
