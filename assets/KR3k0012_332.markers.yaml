  - {type: variant, offset: 5532, length: 0, content: '', SBCK: 丞充荆襄等遂租庸使㑹襄州禆將康楚元張嘉延擁衆爲叛􅇯黨萬餘人自稱楚義王襄州刺史王政棄城遁走嘉延又南襲破江陵漢􅃆饋運阻絶朝廷旰食倫乃調兵駐鄧州界康楚元􅇯黨有來降必原加賞數日後楚元衆頗怠倫進軍擊之生擒楚元以獻餘衆悉走収租庸錢物僅二百萬貫並免失墜又曰元和中塩䥫使王播進陳許軍琵琶溝運圖先是中官李重秀奉命視之還言可以通漕至郾城下北潁口水運千里而近及上覽圗詔韓弘發卒以通汴河於是舡勝三百石皆入潁又曰開成􅀄以王彦威判度支甞紫宸廷奏曰臣自掌計司按見管錢􅂖文簿皆量入以爲出使經費必足無所刻削且百口之家有歳蓄而軍用錢物一切通用悉隨色額占定終歳支給無毫􅁵之􅆧儻臣一旦愚迷欲自欺竊亦不可得也名曰度支占額圖旣而又進供軍國曰起至徳乾元之際迄於貞觀元和之􅀄天下有觀察者十節度者二十有九防禦者四經略者三掎角之師犬牙相制}
  - {type: page-break, offset: 5532, content: '', id: KR3k0012_SBCK_332-6a}
