  - {type: variant, offset: 5323, length: 1, content: 強, SBCK: 過蒲津渉洛至許原西魏將周文帝軍至沙􅁐齊神武聞周文帝至引軍來㑹詰朝候􅀐告齊神武軍且至周文帝部將李弼曰彼衆我寡不可平地置陣此東十里有渭曲可先據以待之遂進軍至渭曲背水東西爲陣合戰大破之北史曰安同從道武征姚平於紫壁姚興悉衆救平同進計曰汾東有蒙坑東西三百餘里徑路不通姚興來必定汾西乗髙臨下直至紫壁如此則㓂内外勢接冝截汾爲南北浮橋乗西岸築圍旣固賊至無所施其智力矣從之興果視平屠滅而不能救隋書曰文帝􅀄突厥㓂蘭州隋將賀婁子幹率衆拒之至可洛峐音哀山與賊相遇賊衆甚}
  - {type: page-break, offset: 5323, content: '', id: KR3k0012_SBCK_332-3b}
  - {type: variant, offset: 5323, length: 1, content: 強, krp: 過蒲津渉洛至許原西魏將周文帝軍至沙苑齊神武聞周文帝至引軍來㑹詰朝候騎告齊神武軍且至周文帝部將李弼曰彼衆我寡不可平地置陣此東十里有渭曲可先據以待之遂進軍至渭曲背水東西爲陣合戰大破之北史曰安同從道武征姚平於紫壁姚興悉衆救平同進計曰汾東有蒙坑東西三百餘里徑路不通姚興來必定汾西乗髙臨下直至紫壁如此則㓂内外勢接冝截汾爲南北浮橋乗西岸築圍旣固賊至無所施其智力矣從之興果視平屠滅而不能救隋書曰文帝𥘉突厥㓂蘭州隋將賀婁子幹率衆拒之至可洛峐音哀山與賊相遇賊衆甚}
  - {type: punctuation, offset: 5325, content: ，, id: KR3k0012_CHANT_332-bkkpn1100}
  - {type: 'tls:seg', offset: 5325, content: '', id: KR3k0012_CHANT_332-24a.9}
  - {type: variant, offset: 5325, length: 0, content: '', SBCK: 子幹阻川爲營賊軍不得水數日人馬甚弊縱擊大破之唐書曰盛彦師鎭冝陽㑹李密叛彦師率兵邀之令其衆曰唯我馬首是瞻遂踰洛水入南山令持弓弩者乗髙挾路持刀楯者伏於溪谷之間又令曰待賊半度而擊之所邵皆􅀏曰賊向洛州何爲守此彦師曰吾籌之熟矣李密聲徃洛州其實欲南走襄城就張善相耳􅀂賊先入谷口我自後追之路險難以展力吾今先據要害此賊乃成擒也密果至知有伏乃踰山南上彦師邀擊之封􅁑國公漕運孫子曰不盡知用兵之害則不得盡知用兵之利故善用兵之者役不再籍粮不再載取用於國因粮於敵故軍食可足兵甲戰具取用國中粮因敵也故國之貧於師者逺師輸也逺輸則百姓貧兵事轉運千里之外財費於道路人有困窮者也近師則貴賣貴賣則百姓虚虚則竭近軍師市多非常之賣當時貧費以􅃐未利然後財貨殫盡國家虚也竭則􅇥於丘役力屈中原内虚於家丘十六非也百姓財皆盡兵不解運粮盡力於原野百姓之費十去其七所破費也公家之用破車疲馬甲胄弓矢㦸楯矛櫓兵牛大車十去其六計較之也故智將務食於敵食敵一鍾當吾二十鍾六斛四斗爲鍾計}
  - {type: page-break, offset: 5325, content: '', id: KR3k0012_SBCK_332-4a}
