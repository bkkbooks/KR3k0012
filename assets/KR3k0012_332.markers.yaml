  - {type: variant, offset: 5117, length: 0, content: '', WYG: 密果至知有伏乃於山南上彦師邀擊之封葛國公漕運孫子曰不盡知用兵之害則不得盡知用兵之利故善用兵者役不再藉糧不再載取用於國因糧於敵故軍食可足兵甲戰具取用國中粮因敵也故國之貧於師者師逺踰也逺輸也百姓貧兵事轉運千里之外財費于道路人有困窮者也近師則貴賣貴賣則百姓虛虛則竭近軍師士多非常之賣當時貧費以趣末利然後財貨殫盡國家虛也竭則急於兵役力屈中原内虛於家兵十六充伍急則百姓盡持兵結連不觧内外力殫百姓之費十去其七所破費也公家之用破車疲馬甲胄弓矢㦸楯干櫓兵牛大車十去五六計較之也故智將務食於敵食敵一鍾當吾二十鍾六斛四斗為鍾計千里計運二十鍾而致一鍾於軍中也􅠇稈一石當吾二十石􅠇豆稈槀一石百二十觔也轉輸之發買二十石乃得一石也後漢書曰永平中理滹沱石臼河從都慮至羊腸倉酈元水經注云汾陽故城積粟謂之羊腸倉在晉陽西北石磴縈委若羊腸焉故以為名今嵐州界羊腸坂是也石臼河水名欲令通漕水運曰漕太原吏人苦役連年無成轉運所經三百八十九隘前後沒死者不可勝算建初三年拜鄧訓謁者監領其事訓考量隠括隠審量括之也知大功難立具以上言肅宗從之遂罷其役更用驢輦嵗省費億萬計全活徒士數千人又曰第五種拜髙宻侯相是時徐兖二州盜賊羣聚髙宻在二州之交種乃六儲粮稸勤厲吏士賊聞憚之又詔報朱浮曰徃年赤眉䟦扈長安䟦扈猶暴横也吾策其無榖必東來歸降今度此反虜勢無乆全其中必有内相斬者今軍資未充故須候麥耳又來歙上書曰公孫述以隴西天水為藩蔽故得延命假息今二郡平蕩則述智計窮矣宜益選兵馬儲積資糧昔趙之將帥多賈人髙帝縣之以重賞髙帝十年陳豨反於趙代}
