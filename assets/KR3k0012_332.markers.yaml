  - {type: variant, offset: 5138, length: 0, content: '', WYG: 行白虹貫日皆變之大者不可以輕動動而不㨗為禍更深吾將久而斃之且曜與石勒相攻亂亦不能久積七十餘日軍糧竭遣辛巖督運於金城𦙍聞之大恱謂其將士曰韓瑛之衆十倍於吾糧廪將懸難以持久今分兵運糧可謂天授吾若敗辛巖瑛等自潰彼衆我寡且以死}
