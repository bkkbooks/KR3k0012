  - {type: variant, offset: 5832, length: 0, content: '', SBCK: 聚羗胡質任㓂逼諸郡魏將陳泰禦之泰謂諸將曰麴城雖固去蜀險逺當須運粮羗夷患維勞役必未肯附今圍而取之可不血刄而拔其城雖其來救山道險阻非行兵之地乃使鄧艾等進兵圍之断其運道及城外流水安等挑戰不許將士困窘分粮聚雪以稽日月維果來救出自牛頭與泰相對泰曰兵法貴在不戰而屈人今絶牛頭維無返道則我之擒也諸軍各堅壘勿}
