  - {type: variant, offset: 4942, length: 0, content: '', WYG: 輕戰緯曰先帝登遐人情尚優不行思奮之力梟殄逆䜿大事去矣遂與登戰大破之登衆渴死者十二三其夜大潰又曰夏赫連勃勃屯依力川後秦姚興將王奚聚羗胡二千餘户於勅竒堡勃勃進攻之奚驍悍有膂力短兵接戰勃勃之衆多為所傷於是揠斷其水堡人窘怕執奚出降宋史曰宋武帝伐姚泓沈林子參征西軍事加建武將軍統軍為前鋒從汴入河偽并州刺史河東太守尹昭據蒲坂林子於陜城與冠軍檀道濟同攻蒲坂龍驤王鎮惡攻道關姚泓聞大軍至遣偽平西姚紹}
  - {type: page-break, offset: 4942, content: '', id: KR3k0012_WYG_332-4a, image: WYG0896/WYG0896-0004a.png}
  - {type: variant, offset: 4943, length: 0, content: '', WYG: 據潼關林謂道濟曰潼關不逺所謂形勝之地鎮惡孤軍勢危力屈若使姚紹據之則難圗}
  - {type: page-break, offset: 4943, content: '', id: KR3k0012_WYG_332-4b, image: WYG0896/WYG0896-0004b.png}
  - {type: punctuation, offset: 4944, content: ，, id: KR3k0012_CHANT_332-bkkpn1017}
  - {type: 'tls:seg', offset: 4944, content: '', id: KR3k0012_CHANT_332-23a.9}
  - {type: variant, offset: 4944, length: 0, content: '', WYG: 及其未至當并力爭之若潼關㨗尹昭可不戰而服道濟從之後周書曰東魏將齊神武伐西魏軍過蒲津涉洛至許源西魏將周文帝軍至汝宛齊神武聞周文帝至引軍來㑹詰朝候騎告齊神武軍且至周文部將李弼曰彼衆我寡不可平地置陣此東十里有渭曲可先據以待之遂進軍至渭曲背水東西為陣合戰大破之北史曰安同從道武征姚夏於紫壁姚興悉衆救平同進計曰汾東有蒙坑東西三百餘里徑路不通姚興來必定汾西乗髙臨下直至紫壁如此則冦内外勢接}
  - {type: page-break, offset: 4944, content: '', id: KR3k0012_WYG_332-5a, image: WYG0896/WYG0896-0004c.png}
  - {type: variant, offset: 4945, length: 4, content: 據大峴使, WYG: 截汾為南北浮橋乗西岸築圍既固賊至無所施其智力矣從之興果視平徒滅而不能救隋書曰煬帝初突厥冦蘭州隋將賀爰子幹率率衆拒之至可洛垓音哀山與賊相遇賊衆甚盛子幹阻前川為營賊軍}
  - {type: variant, offset: 4951, length: 0, content: '', WYG: 水數日人馬甚弊縱擊大敗之唐書曰盛彦師鎮宜陽㑹李密叛彦師率兵徼之令其衆曰唯我馬首是瞻遂踰洛水}
  - {type: page-break, offset: 4951, content: '', id: KR3k0012_WYG_332-5b, image: WYG0896/WYG0896-0004d.png}
