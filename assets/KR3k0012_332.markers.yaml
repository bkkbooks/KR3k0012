  - {type: variant, offset: 1422, length: 633, content: 之縣官為贖其民如是則邑里相救赴胡不避死非以德上也欲全親戚而利其財也此與東方之戍卒不習地勢而心畏胡者功相萬也以陛下之時徙民實邊使遠方亡屯戍之憂塞下之民父子相保亡係虜之患利施後世名稱聖明其與秦之行怨民相去遠矣上從其言募民徙實塞下錯復言陛下幸募人以實塞下使屯戍之事益省輸將之費益寡甚大惠也下吏誠能稱厚惠奉明詔存卹所徙之老弱善遇其壯士和輯其心而勿侵刻使先至者安樂而不思故鄉則貧民相募而勸往矣臣聞古之徙遠方以實廣虛也相其陰陽之和嘗其水泉之味審其土地之宜觀其草木之饒然後營邑立城製里割宅通田作之道正阡陌之界先為立室家有一堂二內門戶之閉置器物焉民有所居作有所用此民所以輕去故鄉而勸之新邑也為置醫巫以救疾病以脩祭祀男女有昏生死相恤墳墓相從種樹畜豕室屋完安此所以使民樂其樂處而有長居之心也臣又聞古之制邊縣以備敵也使五家為伍伍有長十長一里里有假士四里一連連有假五百十連一邑邑有假候皆擇其邑之賢才有禮讓習地形悉知民心者居則習民以射法出則教民於應敵故卒伍成於內則軍正定於外服習已成勿令遷徙幼則同遊長則共事夜戰聲相知則足以相救晝戰目相見則足以相識懽愛之心足以相死如此而勸以厚賞威以重罰則前死不還踵矣所徙之民非壯有材力但費衣糧不可用也雖有材力不得良吏猶亡功也又曰王莽將嚴尤上言曰匈奴為害久矣周秦漢征之然皆未有得上策者也周得中策漢得下策秦無策焉當周宣王時獫狁內侵至於涇陽命將征之盡境而還其視戎狄之內侵譬蚊䖟之螫驅之而已故天下稱明是為中策漢武帝選將練兵約齎糧深入遠戍雖有克獲之功胡輒報之兵連禍結三十, SBCK: 音}
