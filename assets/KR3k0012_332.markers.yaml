  - {type: 'tls:seg', offset: 4912, content: '', id: KR3k0012_CHANT_332-23a.4}
  - {type: variant, offset: 4912, length: 338, content: 超召群臣議拒晉師大將公孫五樓曰吳兵輕果所利在速戰初鋒勇銳不可爭也宜據大峴使不得入曠日延時沮其銳氣徐簡精騎二千循海而南絕其糧運別勑叚暉率兗州之軍緣山東下腹背擊之上策也各命守宰依險自校其資儲之外餘悉焚蕩芟除粟苗使敵無所資堅壁清野以待其釁中策也縱賊入覘出城逆戰下策也超曰吾京都殷盛戶口眾多非可一時入守青苗布野非可卒芟設使芟苗城守以全性命朕所不能今據五州強帶山河之固戰車萬乘鐵馬万群縱令過峴至於平地徐以精騎踐之此成擒也其將慕容鎮曰若如聖旨必須平原用馬便宜出峴逆戰戰而不勝猶可退守不宜縱敵入峴自貽窘逼昔成安君不守井陘之險終屈於韓信諸葛瞻不據束馬之嶮卒擒於鄧艾臣以為天時不如地利阻守大峴策之上也超不從乃令攝莒梁父二戍循城隍簡士馬蓄銳以待之其夏晉師次東莞超遣其左軍叚暉等步騎五萬進據臨昫俄而, SBCK: ''}
  - {type: variant, offset: 4912, length: 6, content: 超召群臣議拒, WYG: ''}
