  - {type: variant, offset: 5834, length: 0, content: '', SBCK: 自南度白水循水而東使諸將截其還路維懼遁走安等孤懸遂皆降崔鴻十六國春秋曰前趙劉曜遣將劉㣧西伐張駿之武威駿將遣辛巗韓瑛音英東拒劉胤屯于狄道城韓瑛進度沃于嶺辛巗曰我掘衆數萬籍玄羗之銳冝速戰以滅之不尓乆則變生瑛曰自夏末以來太白犯月辰星逆行白虹貫日皆變之大者不可以輕動動而不捷爲禍更􅀷吾將乆而斃之且曜與石勒}
