  - {type: variant, offset: 3815, length: 358, content: 器興常平倉定穀價較塩運制課調內以利國外以救邊者五十餘條皆納焉宋書曰文帝元嘉中每歲為後魏侵境令朝臣愽議何承天陳備邊之要其大略一曰移遠就近以實內地二曰浚復城隍以增岨防三曰纂偶車牛以飭戎械四曰計丁課役勿使有闕唐書曰高祖與群臣言備邊之事將作大匠于筠進曰未若多造舡艦於五原靈武置舟師於黃河之中足以斷其入寇之中路中書侍郎溫彥愽又進曰昔魏文帝掘長壍以遏匈奴亦由因循其事高祖並從之於是遣將軍桑顯和壍斷北邊要路又徵江南習水之士更發卒於靈州造戰舡塞險左傳曰蔡侯吳子唐侯伐楚舍舟于淮汭自豫章與楚夾漢章漢東江地北名楚左司馬沈尹戍謂楚將子常曰子沿漢而與之上下沿緣也緣漢上下遮使勿度也我悉方城外以毀其舟以方城外人毀吳所舍舟也還塞大隧直轅冥阨三者漢東三隘路阨烏革切子濟漢而伐之我自後擊之必大敗之既謀而行楚大夫武成黑謂子常曰吳用木也我用革也用軍器也, SBCK: 乗勝}
