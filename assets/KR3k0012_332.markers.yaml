  - {type: 'tls:seg', offset: 5127, content: '', id: KR3k0012_CHANT_332-23a.47}
  - {type: variant, offset: 5128, length: 0, content: '', WYG: 盡銳攻之將軍深溝髙壘使輕兵絶淮泗之口塞吳饟式亮切道使吳梁相弊而糧食竭乃以全軍強制其疲極破吳必矣亞夫言於帝許之遂破吳軍又曰王莽末天下亂光武兄伯升起兵討莽為莽將甄音真阜梁丘賜所敗復收㑹兵衆還保棘陽阜賜乗勝留輜重於籃鄉引精兵十萬南渡潢淳臨泚水潢音黃泚音毗阻兩川間為營絶後橋示無還心伯升於是大饗軍士設盟約休卒三日為六部潛師夜起襲取藍鄉盡獲其輜重明日漢軍自西南攻甄阜下江兵自東南攻梁丘賜至食時陣潰遂斬阜賜後漢書曰韓遂敗走榆中榆中縣屬金城郡張温乃遣周慎將三萬人追討之温參軍事孫堅堅權之父也說慎曰賊城中無糧當外轉糧食堅願得萬人斷其運道將軍以大兵繼後賊必困乏而不敢戰若走入𦍑中并力討之涼州可定也慎不從引軍圍榆中城而韓章遂分屯葵園陜反絶其粮道慎懼乃棄城而退又曰曹公與袁紹相持官渡沮受言於紹曰北兵數衆多然而果勁不及南市榖虛少而貨財不及北南利在於急戰北利在於緩待宜曠以日月紹不從連營稍前逼官渡合戰曹公軍不利復壁紹為髙櫓起土山射營中背䝉楯衆大懼曹公乃為發石車擊紹樓皆破衆號霹靂車紹為地道欲襲曹公營輙於内為長壍以拒之又遣騎兵襲擊紹運車大破之盡焚其榖㑹紹遣將于瓊等將兵萬餘人北迎軍沮受說紹可遣將别為軍與袁以絶曹公之粮紹復不從瓊宿烏巢去紹軍四十里紹謀士許攸奔曹公攸謂曹公曰孤軍獨守外無求索危急之時也今袁氏輜重有萬餘兩而無嚴備可輕兵襲之不慮而至燔其積聚不過三日袁氏自敗也公乃選精銳馬步秉袁氏旗幟夜銜枚縳馬口從間道出人負束薪時有問者詒之詒音怡曰袁公恐曹操掠後軍兵以益備聞者信之既至輜重圍屯燎薪火光亘天地破瓊等悉斬之數日紹棄甲而遁蜀志曰姜維率衆侵魏依維山築二城使牙門將勾安李韶等守之聚羗胡質甚冦逼諸郡魏將陳泰禦之泰謂諸將曰麴城雖固去蜀險逺當}
