  - {type: variant, offset: 5123, length: 0, content: '', WYG: 貞元十五年令江淮轉運米每年米宜運二百萬石已來雖有此命而運米竟不過四十萬石又曰韋倫拜商州刺史兼御史中丞充荆襄等道租庸使㑹襄州禆將康楚元張加延擁衆為叛凶黨萬餘人自稱楚義王襄州刺史王政棄城遁走加延又南襲破江陵漢沔饋運阻絶朝廷旰食倫乃調兵駐鄧州界康楚元兇黨有來降必厚加賞數日後楚元衆頗怠倫進軍擊之生擒楚元以獻餘衆悉走收租庸錢物僅二百萬貫並免失墜又曰元和中鹽鐵使王播進陳許軍琵琶溝運圗先是中官李重秀奉命視之還言可以通漕至郾城下北潁口水運千里而近及上覽圗詔韓𢎞發卒以通汴河於是船勝三百石入潁又曰開成初以王彦成判度支嘗紫宸廷奏曰臣自掌計司按見管錢榖文簿皆量入以為出使經費必足無所刻削且八口之家有嵗蓄而軍用錢物一切通用悉隨色額占定終嵗之給無毫釐之差倘臣一旦愚迷欲自欺竊亦不可得也名曰度支占額圗既而又進供軍國自起至徳乾元之際迄於貞觀元和之初天下有觀察者十節度者二十有九防禦者四考經畧者三掎角之師大牙相制大都通邑無不有兵都記中外各額至八十餘萬長慶户口凡三百三十五萬以額約九十九萬通計三户資一兵合計天下租賦一嵗所入總不過三千五百餘萬而上供之數三之一焉二分之中二給衣賜自劉使兵等衣賜之外其餘四十萬衆仰給度支伏以時逢理安運屬神聖然而兵不可弭食哉惟時憂勤之端兵食自切臣謬司邦計遽奉睿圗輙纂事功庶禆聖覽又曰黃巢既來圍陳郡三百日關東仍嵗無耕稼人餓倚􅉹壁間賊俘人而食日殺數千賊有舂磨砦為石碓數數生納人於臼碎之合骨而食其流毒如是又曰秦宗權以蔡州叛所至屠殘人物燔燒郡邑西至關内東極青齊南出江淮北至衛滑魚瀾鳥散人煙斷絶荆榛蔽野賊既乏食啖人為儲軍士四出則鹽屍而從三國典畧曰陳覇先遣錢明領水軍出江寧浦要擊齊人糧運盡獲其船於是齊軍大餒殺馬驢而食之既而陳師以糧運不繼調市人餽軍建康令孔煥以麥屑為飯用荷葉裹之信宿之間得數萬裹以給兵士㑹陳蒨遣送米三千石鴨千頭覇先即炊黍煑鴨誓申一戰計糧分肉人獲數臠絶糧道漢書曰景帝初吳楚七國反以太尉周亞夫將亞夫問客鄧都尉曰䇿安出客曰吳楚兵銳甚難與爭鋒而剽輕不能久莫}
