  - {type: variant, offset: 2056, length: 1499, content: 年中國罷耗匈奴亦衂而天下稱武是為下策秦始皇不忍小恥而輕民力築長城之固延袤萬里轉輸之行起於負海疆境既完中國內竭以喪社稷是為無策今天下遭陽九之阨比年飢饉西北邊尤甚發三十萬眾具三百日糧東援海岱南取江淮然後能備計其道里二年尚未集合兵先至者聚居暴露師老械弊勢不可用此一難也邊既空虛不能奉軍糧內調郡國不相及屬此二難也計一人三百日糧用備十八斛非牛刀不能勝也牛又當齎食加二十斛重也胡沙鹵多乏水草以往事揆之軍出未滿百日牛必物故且盡其餘糧人不勝此三難也胡地秋冬甚寒春夏甚風釜鑊音富薪炭重不可勝食糒音備飲水以歷四時師有疾病之憂勢不能久此四難也輜重自隨則輕銳者少不得疾行虜徐遁不能及幸而逢虜要遮前後危殆不測此五難也大用民力功不可必臣伏憂之又班固論曰書云蠻夷猾夏詩稱戎狄是膺春秋有道守在四夷久矣狄之為患也故自漢興忠信嘉謀之臣曷嘗不運籌策相與爭於廟堂之上乎高祖時劉敬呂后時樊噲季布孝文時賈誼晁錯孝武時王恢韓安國朱買臣公孫弘董仲舒人持所見各有同異然揔其要歸兩科而已搢紳之儒則守和親介胃之士則言征伐皆偏見一時之利害而未究匈奴之終始自漢興以至于今曠世歷年詘伸異變強弱相反是故其詳可得而言也昔和親之論發於劉敬是時天下初定新遭平城之難故從其言約法和親賂遺單于冀以救安邊境孝惠高后遵而不違匈奴寇盜不為衰止而單于反以驕倨逮至孝文與通關市妻以漢女增厚其賂歲以千金而匈奴數背約束邊境屢被其害是以文帝中年赫然發憤遂貯戎服親御鞍馬徙六郡良家材力之士馳射上林講習戰陣聚天下精兵軍於廣武顧問馮唐與論將帥喟然歎息思古名臣此則和親無益已然之明効矣仲舒親見四世之事猶復欲守舊文頗增其約以為義動君子利動貪人如匈奴者非可以仁義說也獨可說以厚利結之於天耳故與之厚利以說其意與盟於天以牢其約質其愛子以累其心匈奴雖欲展轉柰失重利何柰殺愛子何夫賦歛行賂不足以當三軍之費城郭之固無異於貞士之約而使邊城守境之民父兄緩帶稚子咽哺胡馬不窺於長城而羽檄不行於中國不亦便於天下乎察仲舒之論考諸行事乃知未合於當時而有闕於後世也當孝武時雖征伐剋獲而士馬亦略相當雖開河南之野建朔方之郡亦棄造陽之北九百餘里匈奴人民每來降漢單于亦輒拘留漢使以相報復其桀驁尚如斯安肯以愛子為質乎此不合當時之言也若不置質定約和親是雖襲孝文既往之悔而長匈奴無已之詐也夫邊城不選守境武略之臣脩鄣隊備塞之具厲長戟勁弩之械恃吾所以待邊寇而務賦歛於民遠行貨賂割剝百姓以奉寇讎信甘言守空約而幾胡馬之窺不已過乎至孝宣之世承武帝當擊之威值匈奴百年之運因其壞亂幾亡之阨權時施宜覆以威德然後單于稽首臣服遣子入侍三世稱蕃賓於漢廷是時邊城晏閉牛馬布野三世無犬吠之驚黎庶忘干戈之役後六十餘載之間遭王莽篡位始開邊隙單于由是歸怨自絕莽遂斬其侍子邊境之禍搆矣故呼韓耶始朝於漢漢議其禮蕭望之曰戎狄荒服言其慌忽無常至亦宜待以客禮讓而不臣如後嗣遁逃竄伏使於中國不為叛臣及孝元時議罷守塞之備應以為不可云盛不忘衰安必思危遠見識微之明矣單于咸棄其愛子昧利不顧侵掠所獲歲巨計而和親賂遺不過千金安在其不棄質而失重利也仲舒之言漏於是矣夫規事建議不圖萬世之因而偏恃一時之事者未可以經遠若乃征伐之功秦漢行事嚴尤論之當矣故先王度中土立封畿分九州列五服物土貢制外內或脩刑政或脩文德遠近之勢異也是以春秋內諸夏而外夷狄夷狄之人貪而好利被髮左袵人面獸心其與中國殊章服異習飲食不同言語不通僻居北垂寒露之野逐草隨畜射獵為生隔以山川擁以沙漠天地之所以絕內外也是故聖王禽獸畜之不與約誓不就攻伐約之以費賂而見欺攻之則勞師而招寇其地不可耕而食也其民不可臣而畜也是以外而不內踈而不戚政教不及其人正朔不加其國來則德而禦之去則備而守之其慕義而貢獻則接之禮讓羇縻不絕使曲在彼蓋聖人制禦蠻夷之常道也, SBCK: ''}
