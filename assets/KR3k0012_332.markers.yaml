  - {type: variant, offset: 5664, length: 268, content: 賊并力將若之何秦府記室薛收進曰世充據東都府庫填積所患者在於乏食是以為我所持建德親惣十餘萬眾來拒王師亦當盡彼驍雄期於速戰若縱其兩寇相連轉河北之積以相資給則伊洛間戰鬥不已大王今欲親率猛銳先據城皋之險訓兵坐甲當彼疲弊之眾一戰必剋建德破則世充自下不過數旬二國之君可面縛麾下蕭瑀等柰何遂請退兵太宗曰善而從之留齊王元吉圍世充親率三千五百人趣武牢守之與戰相持二十餘日五月建德謀伺官軍芻盡牧馬於河北必將襲武牢太宗聞之遂牧馬千餘疋於河渚間以誘之詰朝建德果悉眾而至陣於汜水東太宗候陣久卒饑令宇文士及率騎經賊陣之西馳而南上賊陣動因而諸軍奮擊之大潰竟如太宗本策, WYG: ''}
