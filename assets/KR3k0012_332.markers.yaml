  - {type: variant, offset: 5119, length: 2, content: 慕容, WYG: 多賈人帝多以金購豨將皆降今西州新破兵人疲饉若招以財榖則其衆可奪臣知國家所給非一用度不足然有不得已也帝然之於是大轉糧運詔歙率征西大將軍馮異建威大將軍耿弇虎牙六將軍蓋延揚武將軍馬成武威將軍劉尚入天水東觀漢記曰來歙征公孫述詔於􅊈積榖六萬斛驢四百頭負䭾蜀志曰諸葛亮悉大衆出斜谷以流馬運糧據武功五丈原與司馬宣王對於渭南亮每患粮運不繼是以分兵屯田晉書載記曰羅尚委城遁李雄遂克成都於時雄軍飢甚乃率衆就榖於郪掘野䑕等食之晉書曰祖逖伐陳留太子陳州石季龍救之徙陳州還襄國留姚豹等守州故城住西臺逖遣將韓潛等}
