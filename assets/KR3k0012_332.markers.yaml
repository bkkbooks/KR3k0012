  - {type: variant, offset: 5826, length: 0, content: '', SBCK: 餘萬而上供之數三之一焉三分之中二給衣賜自留使兵士衣賜之外其餘四十萬衆仰給度支伏以時逢理安運属神聖然而兵不可弭食哉惟時憂勤之端兵食是功臣謬司􅀖計䖍奉睿圖輙纂事功庶禆聖覽又曰黄巢旣來圍陳郡三百日關東仍歳無耕稼}
  - {type: page-break, offset: 5826, content: '', id: KR3k0012_SBCK_332-6b}
  - {type: variant, offset: 5826, length: 0, content: '', krp: 餘萬而上供之數三之一焉三分之中二給衣賜自留使兵士衣賜之外其餘四十萬衆仰給度支伏以時逢理安運属神聖然而兵不可弭食哉惟時憂勤之端兵食是功臣謬司邦計䖍奉睿圖輙纂事功庶禆聖覽又曰黄巢旣來圍陳郡三百日關東仍歳無耕稼}
  - {type: variant, offset: 5827, length: 1, content: 趣, SBCK: 餓􅀝牆壁間賊俘人而食日殺數千賊有㫪磨砦爲巨碓數百生納人於臼粹之合骨而食其流毒􅀂是又曰􅁗宗權以蔡州叛所至屠殘人物燔燒郡邑西至關内東極青齊南出江淮北至衛滑魚爛鳥散人煙断絶荆榛蔽野賊旣乏食啖人爲儲軍士四出則塩屍而從三國典略曰陳覇先遣錢明領水軍出江寕浦要擊齊人糧運盡獲其舡於是齊軍大餒殺馬驢而食之又曰以粮運不継調市人餽軍建康令孔奐以麥屑爲飯用荷葉裏之室􅀫之間得數萬褁以給兵士㑹陳蒨遣送米三千石鴨千頭霸先即炊􅁰煑鴨誓申一戰計糧分肉人􅀗數臠絶粮道漢書曰景帝􅀄呉楚七國反以太尉周亞夫問父綘侯客鄧都尉曰䇿安出客曰呉楚兵銳甚難與争鋒而剽輕不能乆莫􅀂引兵東北壁昌邑以梁委呉呉必盡銳攻之將軍深溝髙壘使輕兵絶淮泗之口塞呉饟式亮切道使呉梁相弊而粮食竭乃以全軍強制其疲極破呉必矣亞夫言於帝許之遂破呉軍又曰王莽末天下亂光}
  - {type: page-break, offset: 5827, content: '', id: KR3k0012_SBCK_332-7a}
  - {type: variant, offset: 5827, length: 1, content: 趣, krp: 餓倚牆壁間賊俘人而食日殺數千賊有㫪磨砦爲巨碓數百生納人於臼粹之合骨而食其流毒若是又曰秦宗權以蔡州叛所至屠殘人物燔燒郡邑西至關内東極青齊南出江淮北至衛滑魚爛鳥散人煙断絶荆榛蔽野賊旣乏食啖人爲儲軍士四出則塩屍而從三國典略曰陳覇先遣錢明領水軍出江寕浦要擊齊人糧運盡獲其舡於是齊軍大餒殺馬驢而食之又曰以粮運不継調市人餽軍建康令孔奐以麥屑爲飯用荷葉裏之室宿之間得數萬褁以給兵士㑹陳蒨遣送米三千石鴨千頭霸先即炊黍煑鴨誓申一戰計糧分肉人獲數臠絶粮道漢書曰景帝𥘉呉楚七國反以太尉周亞夫問父綘侯客鄧都尉曰䇿安出客曰呉楚兵銳甚難與争鋒而剽輕不能乆莫若引兵東北壁昌邑以梁委呉呉必盡銳攻之將軍深溝髙壘使輕兵絶淮泗之口塞呉饟式亮切道使呉梁相弊而粮食竭乃以全軍強制其疲極破呉必矣亞夫言於帝許之遂破呉軍又曰王莽末天下亂光}
  - {type: variant, offset: 5829, length: 1, content: 牢, SBCK: 兄伯升起兵討莽爲莾將甄音眞阜梁丘賜所敗復収㑹兵衆還保􅁄陽阜賜乗勝留輜重於藍郷引精兵十萬南度潢淳臨泚水潢音黄􆇕音毗阻兩川間爲營絶後橋示無還心伯升於是大饗軍士設盟約休卒三日爲六部潜師夜起襲取藍郷盡􅀗其輜重明晨漢軍自西南攻甄阜下江兵自東南攻梁丘賜至食時陣潰遂斬阜賜後漢書曰韓遂敗走榆中榆沖縣属金城郡張温乃遣周愼將三萬人追討之温叅軍事孫堅堅權之父也􅀃愼曰賊城中無糓當外轉粮食堅願得萬人断其運道將軍以大兵継後賊必困乏而不敢戰􅀂走入羗中并力討之則凉州可定也愼不從引軍圍榆中城而邊章遂分屯葵園峽反断愼運道愼懼乃棄重而退又曰曹公與􅀽紹相持官度沮授言於紹曰北兵數衆俎側居切而果勁不及南南􅂖虚少而貨財不及北南利在於急戰北利在於緩持冝曠以日月紹不從連營稍前逼官度合戰曹公軍不利復壁紹爲髙櫓起土山射營中皆蒙楯衆大懼曹公乃爲發石車擊紹樓皆破衆號霹靈車紹爲地道欲襲曹公營公輙於内爲長壍以拒之又遣􅀐兵襲擊紹運車大破之盡焚其􅂖㑹紹遣淳于瓊等將兵萬餘人北迎運沮授說紹可遣將別爲軍於表以絶曹公之抄紹復不從瓊􅀫鳥巢去紹軍四十里紹謀士許攸奔曹公攸謂曹公曰􅀌軍獨守外無求索危急之時也今􅀽氏輜重有萬餘兩而無巖備可輕兵襲之不慮而至燔其積聚不過三日􅀽氏自敗也公乃選精銳馬歩秉􅀽氏旗幟夜衘枚縳馬口從間道出人􅀒束薪時有問者紿之紿音怠曰􅀽公恐曹操掠後軍兵以益備聞者信之旣至輜重圍屯燎薪火光亘天地破瓊等悉斬之數日紹弃甲而遁蜀志曰姜維率衆侵魏依麴山築二城使牙門將勾安李韶等}
