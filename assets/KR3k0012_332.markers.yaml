  - {type: variant, offset: 5129, length: 5, content: 平原用馬便, WYG: 運糧羗夷患維勞役未必肯附今圍而取之可不血刅而拔其城雖其來救山道險阻非行兵之地乃使鄧艾等進兵圍之斷其運道及城外流水安等挑戰不許將士困窘分糧不足以稽日月維果來救出自牛頭與泰相對泰曰兵法貴在不戰而屈人今絶牛頭維無返道則我之擒也諸君各堅壘勿與戰自南渡白水循水而東使諸將截其還路維懼遁走安等孤懸遂皆降崔鴻十六國春秋曰前趙劉曜遣將劉𦙍西伐張駿之武威駿遣將辛􅺰韓瑛音英東拒劉𦙍屯於狄道城韓瑛進渡沃于嶺辛巖曰我擁衆數萬籍𤣥羗之銳}
