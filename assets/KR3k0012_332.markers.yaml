  - {type: variant, offset: 4693, length: 2, content: 曹公, SBCK: 諸􅁑亮出斜谷是時魏將司馬宣王屯渭南郭淮䇿亮必争北原􅀂亮跨渭登原連兵北山隔絶隴道揺盪人夷非國之利也宣王善之淮遂屯北原塹壘未城蜀兵大至淮逆擊走之魏志曰諸􅁑誕胡遵等伐呉攻東興呉將諸􅁑恪率軍拒之及恪上岸部將丁奉與唐咨吕據留賛俱從山西上奉曰今軍行遟􅀂敵據便地則難與争鋒矣乃令諸}
  - {type: page-break, offset: 4693, content: '', id: KR3k0012_SBCK_332-2a}
  - {type: variant, offset: 4693, length: 2, content: 曹公, WYG: 諸葛亮出斜谷是時魏將司馬宣王屯渭南郭淮䇿亮必爭北原若亮跨渭登原連兵北山隔絶隴道揺盪人夷非國之利也宣王善之淮遂屯北原塹壘未成蜀兵大至淮遂擊走之吳志曰魏遣諸葛誕胡遵等攻東興吳將諸葛恪率軍拒之及恪上岸部將丁奉與唐咨吕據留贊俱從山西上奉曰今軍行遲若敵據便地則難與爭鋒矣乃令諸}
