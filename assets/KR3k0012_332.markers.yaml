  - {type: variant, offset: 4927, length: 1, content: 吳, WYG: 宜進據川源晉軍至而失水亦不能戰以臨朐有巨筏水去城四十里五樓馳據之龍驤將軍孟龍符領騎居前奔往爭之五樓乃退因而大敗崔鴻十六國春秋曰後秦姚興與前秦符登相持登自大陌向廢橋興乃自將精騎以拒登使將尹緯領步軍據廢橋以抗登困急攻緯緯將出戰興遣使謂緯曰}
