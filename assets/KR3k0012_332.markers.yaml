  - {type: variant, offset: 5270, length: 5, content: 超奔還廣固, SBCK: 崔鴻十六國春秋曰後􅁗姚興與前秦符登相持登自六陌向廢橋興乃自將精􅀐以迫登使將尹緯領歩軍據廢橋以抗登困急攻緯緯將出戰興遣使謂緯曰兵法不戰而制人者盖謂此也符登窮㓂特冝持重不可輕戰緯曰先帝登遐人情尚擾不因思􅁬之力梟殄逆豎大事去失矣遂與登戰大破之登衆渇死者十二三其夜大潰又曰夏赫連勃勃屯依力川後􅁗姚興將王奚聚羗胡三千餘户于勑竒堡勃勃進攻之奚驍悍有膂力短兵接戰勃勃之衆多爲所傷於是堰斷其水堡人窘迫執奚出降梁史曰}
