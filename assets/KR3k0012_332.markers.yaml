  - {type: variant, offset: 5142, length: 0, content: '', WYG: 㨗當無疋馬得還於是咸奮遣騎三千襲巖於沃於嶺大敗之瑛軍遂潰死者三萬餘人三國典畧曰周王思政固守潁川思政運米數百車欲向孔城齊大都督破六韓常與洛州刺史可朱渾寶願前後要襲獲之乃啟於齊王澄曰常自鎮河陽已來頻出關口大谷二道所有要害莫不知悉請於形}
