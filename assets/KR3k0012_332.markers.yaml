  - {type: variant, offset: 4355, length: 248, content: 要謹備勿懈潛探其情密候其怠以利誘之禁其牧採久無所得自然變改待離其故奪其所愛漢書曰匈奴呼韓耶單于來朝元帝以後宮良家子王嬙音墻字昭君賜單于單于歡喜上書願保塞上谷以西至燉煌請罷邊備以休天子人民帝下有司議郎中侯應上言以為不可其略曰自周秦興以來匈奴寇侵甚矣其北邊有陰山東西千餘里本冒頓單于依阻其中至孝武帝出師征伐斥奪此地攘之於漠北建塞徼起亭隧築外城設屯戍以守之然後邊境少安夫夷狄之情困則卑順強則驕逆天性也前已罷外城省亭隧今纔足以候視通烽火而已安不忘危不可復罷且中國尚建關梁以制諸侯所以絕臣下之覬慾起塞以來百, SBCK: 者}
