  - {type: variant, offset: 5864, length: 0, content: '', SBCK: 大恱謂其將士曰韓瑛之衆十倍於吾粮􅅒將懸難以持乆今分兵運粮可謂天授吾􅀂敗辛巗英等自潰彼衆我寡冝以死戰戰而不捷當無疋馬得還咸奮於是率􅀐三千襲巗於沃于嶺大敗之瑛軍}
  - {type: variant, offset: 5864, length: 2, content: 遂牧, krp: 大恱謂其將士曰韓瑛之衆十倍於吾粮廩將懸難以持乆今分兵運粮可謂天授吾若敗辛巗英等自潰彼衆我寡冝以死戰戰而不捷當無疋}
  - {type: variant, offset: 5865, length: 1, content: 牧, SBCK: 潰死者三萬餘人三國典略曰周王思政固守潁川思政運米數百車欲向孔城齊大都督破六韓常與洛州刺史可朱渾寳願前後要襲􅀗之乃啓于齊王澄曰常自鎭河陽巳來頻出關口大谷二道所有要害莫不知悉請於形勝之處營築城戍安置士}
  - {type: variant, offset: 5867, length: 7, content: 千餘疋於河渚間, SBCK: 截其徃來彼之咽喉旣断潁城吞滅可期且孔城}
