  - {type: variant, offset: 5231, length: 429, content: 莞超遣其左軍叚暉等步騎五萬進據臨昫俄而晉師度峴慕容超懼率四萬就叚暉等于臨昫戰敗超奔還廣固宋武圍廣固數月而破燕地悉平後魏書曰遣將伐後燕慕寶已平并州潞川頻勝寶在中山引群臣議之中尹符謨曰魏軍強盛千里轉鬥乘勝而來勇氣兼倍若逸騎平原形勢彌盛殆難為敵宜杜嶮拒之中書令眭邃曰魏軍多騎師剽銳眭息為切馬上齎糧不過旬月宜令郡縣聚千為一堡深溝高壘清野待之至無所掠資食既罄不過六旬自然窮退尚書封懿曰今魏師十萬天下之勍敵也百姓雖欲營聚不足自固是則聚糧集兵以資強寇且動眾心示之以弱岨闕拒戰計之上也慕容麟曰魏今乘勝氣銳其鋒不可當宜謹守設備待其弊而乘之於是脩城積粟為持久之備魏攻中山不剋進據愽陵魯口諸將覩風而奔郡縣悉降于魏唐書曰武德中大宗圍王世充於東都世充勢窮竇建德自北來救諸將及蕭瑀等咸請且退師避之太宗不許曰世充糧盡內外離心我當不勞攻擊坐收其弊耳建德新破海公將驕卒惰今我據武牢扼其襟要若賊恃勝冒險爭鋒吾當破賊若不戰旬月之間世充自潰彼敗我振足以臨之一行兩定在於斯舉若不速進賊入武牢諸城新附必, WYG: 道斷絶亦}
