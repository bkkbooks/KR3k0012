  - {type: variant, offset: 5122, length: 0, content: '', WYG: 東陳同大城賊從南門入放牧逖軍開東門相守四旬逖以布囊盛土如米狀使千餘人運上臺又令數人擔米為疲極而息於道賊果逐之皆棄擔而走賊就獲米謂逖士衆豐飽而胡成飢久益懼無復膽氣石勒將劉文堂以驢千頭運糧以饋姚豹逖遣韓錢馮鑄等追擊於汴盡獲姚豹宵退據東燕唐書}
