  - {type: variant, offset: 680, length: 696, content: 前各亦逐高要處安置斥候以視動靜又曰諸軍營隊伍每夜分更令人巡探人不得高聲唱號行者敲弓一下坐者扣矟三下方擲軍號以相應會當營界探周而復始擲號錯失便即決罰當軍折衝果毅並押鋪宿盡更巡探相分付虞候及中軍官人通探都巡又曰諸軍下定每營夜別置外探每營折衝果毅相知作次每夜別四人各領五騎馬於營四面去營十里外遊弈以備非常如有驚急奔馳報軍又曰令人枕空胡祿臥有人馬行三十里外東西南北皆響見於胡祿中名曰地聽則先防備又曰諸兵馬既逼賊庭探候事須明審諸營住及營行前後及左右廂助上五里著馬兩騎十里更加兩騎十五里更加兩騎至三十里一道用人馬十二騎若兵多發引稍長肋上即是更量加一兩道使令相見其乘馬人每令遙相見常接高行各執一方面異旗無賊此旗常卷見賊即速展軍營見旗展即知賊至須覔穩處既知賊來得設機伏整齊部伍迎前戰其最遠及次遠人須與好馬乘騎不然被賊捉將備邊漢書曰晁錯上言守邊備塞曰胡人衣食之業不著於地其勢易以擾亂邊境何以明之胡人食肉飲酪衣皮毛非有城郭田宅之歸居如飛鳥走獸於曠野美草甘水則止草盡水竭則移以是觀之往來轉徙時至時去此胡人之生業而中國所以離南畝也今使胡人數處轉牧行獵於塞下或當燕代或當上郡北地隴西以候備塞之卒卒少則入陛下不救則邊民絕望而有降敵之心如救之少發則不足多發遠縣纔至則胡人已去聚而不罷為費甚大罷之則胡復入如此連年則中國貧苦而民不安矣陛下幸憂邊境遣將吏發卒以治塞甚大惠也然今遠方之卒守塞一歲而更不知胡人之態不如選常居者家室田作且以備之其要害之處通川之道調立城邑無下千家為居中周虎落先為室屋具田器乃募罪人及免徒復作令居之不足募以丁奴婢贖罪及輸奴婢欲以拜爵者不足乃募民之欲往者皆賜高爵復其家與冬夏衣廩食能自給而止其亡夫苦妻者縣官買, SBCK: 遂解閼}
