  - {type: variant, offset: 2194, length: 7, content: 禁淫祀著無鬼論, SBCK: 吉翰遷爲南徐州先於蜀中載一青牛每常自乗􅁪於目前養視翰遘疾多日牛亦不肯食及亡牛流涕滂沱􅁻氏喪未還都先遣駈牛向宅牛不肯行知其異即待䘮喪旣下舡便隨去又曰桓沖鎮江陵正會夕當烹牛牛忽孰視帳下都督甚乆目中泣下都督呪之曰汝若能向我跪者當啓活也牛應聲而拜衆甚異之都督復謂曰汝若須活遍拜衆人者直徃牛涕殞如雨遂拜不止值沖醉不得啓遂殺牛沖醉止得啓沖聞之歎息都督痛加鞭罰又曰護軍琅邪王華}
