  - {type: variant, offset: 2203, length: 1, content: 書, SBCK: 牛甚快常乗之齒巳長華後夢牛語之曰衰老不復堪苦載載二人尚可過此必死華謂偶尓夢與三人同載還府此牛果死神仙傳曰呉有徐隨居丹徒左慈過隨門下有􅀫客六七欺慈云徐公不在慈去客皆見牛在楊樹杪車轂中皆}
