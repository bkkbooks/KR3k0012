  - {type: variant, offset: 1027, length: 1164, content: 其子又盲其後楚攻宋圍其城民易子而食之折骸而炊之丁壯皆乘城戰死者太半此人父子有疾皆免也呂氏春秋曰昔葛天氏之樂三人操牛尾投足以歌八闋注事具樂部又曰使烏獲疾引牛尾尾絕力單而牛不行逆也使五尺豎子引其捲而恣所之順也又曰亂國之妖有牛馬言韓子曰商太宰嘗使庶子行市還云市門多車太宰召市吏問曰市何多牛馬耶吏怪太宰是神知又曰詹何坐弟子侍有牛鳴於門外弟子曰是黑牛也而白在其蹄詹何曰然黑牛也而白在其頭使人視之果黑牛而以布褁其角尸子曰夫龍門魚之難太行牛之難以德報怨行之難也淮南子曰牛跂蹄而戴角馬被髦而全足者天也絡馬之口穿牛之鼻者人也又曰剝牛皮鞹以為鼓正三軍之眾然為牛計者不若服軛也又曰城上視牛如羊如豕所居高也又曰戴角者無上齒無角者膏而兌前豕馬之屬前小有角者脂而兌後牛羊後小又曰季春之月乃合騾牛騰馬游牝于牧又曰取牛膽塗熱釜即鳴矣又曰牛膽塗目莫知其誰注曰取八歲黃牛膽桂二寸著膽中百日以成因使巧工刻象人丈夫著目下為女子著頭上為小兒著頤下盛以五綵囊先宿齋無令人知也尹文子曰語曰好牛不可察也好則物之通稱牛則物之定形以通稱隨定形不可不察也重白而憎黑嗜甘而逆苦能定名則萬事不亂也卞子曰郭林宗謂仇季智曰子嘗有過否季智曰吾嘗飯牛牛不食搏牛一下說苑曰秦穆公使賈人載鹽徵諸賈人百里奚以五羖羊之皮將車之秦秦穆公觀鹽見百里奚牛肥也對曰臣飲食以時使之不以暴有險先後之以身是以肥也穆公知其君子也乃以為上卿張溫自表曰昔百里奚賢秦繆公欲干之繆公好牛奚因賃官以養牛蹄上乘肉三寸公使禽息行牛息入言之公不信怒息復言之公又怒吏曰再怒其主罪當刖使守門公出禽息跪而請之曰夫養牛者願君勿忘也公乃問百里曰臣之長非養牛者也乃養民也公視牛察之則賢人也遂與同車而出謝禽息息曰所以不死者君未知客也今已知之矣乃觸門而死抱朴子曰南方水牛無冬夏常臥雪中又曰智禽御以逆網水牛結陣而卻虎矣說苑曰齊桓公出獵逐鹿入山谷中見一老父問曰此何谷也曰愚公之谷曰何也曰畜牸牛子大賣之買駒少年曰牛不能生馬遂持駒去旁人聞以臣為愚因以為谷也管子曰此臣之過也使堯在上皋陶為大理者安有取人駒乎論衡曰十圍之牛為牧豎所驅又曰牡馬見雌牛不相合者異類也風俗通曰賣牛勿握角令不集按恐觸人人不取也又曰秦昭王使李冰為蜀守開成都兩江溉田江神歲取童女二人為婦冰自以其女與神為婚徑至神祠勸神酒柸但澹淡不耗冰厲聲責之因忽不見良久有兩蒼牛鬥於岸旁有頃冰還流汗謂官屬曰吾鬥大極不當相助也南向要中正白者我綬也主簿㓨殺北面者江神遂死又曰丁壯小犢跳梁弄角飲水數石生芻十束當風露夜至死不曲愽物志曰介葛盧聞牛鳴知生三犢盡為犧牲嵇叔夜以為無此皆先儒妄說又曰蜀牛不施繩右前曰排左側曰促而牛解人語又曰九真有神牛生谿上里時時共鬥即海沸而昏或出鬥岸上人家牛皆怖人或遮捕即霹靂號曰神牛洞林記曰義興叔保得傷寒垂死令郭璞占之不吉令求白牛厭之求不得璞為致之即曰白牛從西來逢叔保大驚遂病差語林曰宋岱為青, SBCK: 益}
