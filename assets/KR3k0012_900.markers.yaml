  - {type: variant, offset: 313, length: 432, content: 失至魏世高堂生傳晉高祖宣皇帝其後王愷秘其書又曰牛歧胡壽歧牽兩腋眼下分為三去角近行駃眼欲得大眼中有白脈貫童子最快頸骨長且大駃壁堂欲得闊壁堂病服間也倚欲得如絆馬聚而正也膺廷欲得廣膺廷胸前天關欲得成天關背接骨雋骨欲得垂眷也央欲得下蘭株欲得大尾株豐岳欲得大膝株骨垂星欲得有怒肉垂星蹄上也肉覆蹄間名怒肉力柱欲得大而成當車骨也懸蹄欲得如八字陽鹽欲得廣陽鹽者夾尾株前兩膁上常有似鳴者有黃也洞胡無壽珠淵無壽遊毛當目下也上池有亂毛妨主凶上池角中央也身欲得如卷大膁踈難飴龍頭突目好跳豪筋欲得成就豪筋腳後橫筋也毛欲得短密若長踈不耐寒氣尾不用至地尾毛少骨多者有力月𣍿上肉欲得豎角欲得細鼻如鏡鼻難牽口方易飴漦府方易飴莊子曰聲氏之牛夜云而遇夔止而問焉曰我尚有四足動而不善子一足而起踊何以然夔曰以吾一足王於子矣莊子曰夫氂牛其大如垂天之雲此能為大矣而不能執鼠又曰魯聞顏闔得道之人使幣致焉顏闔守廬麤布之衣而自飯牛魯君之使者問此顏闔家耶闔曰然使者致幣闔對曰恐聽謬而遺使者罪不若審之使者還反復求之則不得, SBCK: 􅁴}
