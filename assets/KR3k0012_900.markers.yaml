  - {type: variant, offset: 751, length: 0, content: '', WYG: 方岳又指一石曰此山亦好但不如向耳亦當世出刺史也言訖便不見太尉墓之皆如其言劉敬叔異苑曰余以義熙十三年為長沙景王驃騎叅軍在西州得一黄牛時將貨之便晝夜衘草不食淹涙瘦瘠又曰即墨有古冡或發之有金牛塞墓門不可移動犯之則大禍異物志曰合浦牛如槖駞案頂上有特骨大如覆斗足犍疾其行如馬日三百里列仙傳曰陽都女者市上酤酒家女也生而眉連耳細而長皆言此天人也㑹犢子牽一黄犢來過都女悦之遂留相奉侍都女隨犢子出取桃李一宿而返皆連兠甘美郭季産集異記曰兖州人船行忽見水上有浮鎖牽取得數十許丈乃得一白牛與常牛無異而形甚光鮮可愛人知是神物乃放之於是入水鎖亦隨去干寶捜神記曰晉大興元年武陽太守王諒牛生子一頭八足兩尾而共一腹又曰武都故道有怒特祠上生梓樹焉秦}
