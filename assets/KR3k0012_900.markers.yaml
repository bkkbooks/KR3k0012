  - {type: variant, offset: 169, length: 0, content: '', SBCK: 成都􅁗道得石牛力也後遣氶相張儀等隨石牛道伐蜀也楊龍驤洛陽記曰石牛在城西石虎當衰石牛夜喚聲聞三十里事奏虎虎遣人打落牛兩耳尾以鐵釘釘四脚今具存劉道眞錢塘記曰明聖湖有金牛嘗有見者神化莫測遂以名湖凉州異物志曰有水牛育於河中鬱林異物志曰周留者其實水牛蒼毛豕身角􅀂擔矛衛護其犢與虎爲讎又曰周留牛毛青大腹銳頭青尾其狀似猪齊地記曰}
  - {type: page-break, offset: 169, content: '', id: KR3k0012_SBCK_900-3a}
  - {type: variant, offset: 169, length: 0, content: '', WYG: 成都秦道得石牛力也後遣丞相張儀等隨石牛道伐蜀楊龍驤洛陽記曰石牛在城西石虎當衰石牛夜喚聲聞三十里事奏虎虎遣人打落牛耳及尾以鐵釘釘四脚今具存劉道真錢塘記曰明聖湖有金牛嘗有見者神化莫測遂以名湖涼州異物志曰有水牛育於河中鬱林異物志曰州宿者其實水牛蒼毛豕身角若擔矛衞䕶其犢與虎為讐又曰周留牛毛青大腹鋭頭青尾其狀似豬齊地記曰}
