  - {type: variant, offset: 748, length: 3, content: 庖丁為, SBCK: 陶太尉微時喪當葬家貧親自營作塼有一班牸牛載塼致忽然失去便自尋覔忽於道中逢一老翁問云君欲何所覓太尉具荅更舉手指云向於山崗上見一牛眠山圩中必是君牛此牛所眠處便好作墓安墳當之致之極貴小復不當位極人臣丗爲方嶽矣又指一山云此山亦好但不如向耳亦當丗出刺史也言訖便不復見太尉墓之皆如其言劉敬叔異􅁐曰余以義熈十三年爲長沙景王驃􅀐叅軍在西州得一黄牛時將貨之便晝夜銜草不食流淚瘦􅇤又曰即墨有古冡或發之有金牛塞埏門不可移動犯之則㫬也異物志曰合浦牛如橐駞案項上有特骨大如覆斗足揵疾其行如馬日行三百里列仙傳曰陽都女者市上酤酒家女也生而眉連耳細而長衆以爲異皆言此天人也㑹犢子牽一黄犢來過都女恱之遂留相奉侍都女隨犢子出取桃一􅀫而反郭季産集異記曰兖州人舡行忽見水上有浮鎻牽取得數十許丈乃得一白牛與常牛無異而形甚光鮮可愛人知是神物乃放之牛於是入水鎻亦隨去于寳搜神記曰晉大興元年武陽太守王諒牛生子一頭八足兩尾而共一腹又曰武都故道有祠􅁟生梓樹焉􅁗}
