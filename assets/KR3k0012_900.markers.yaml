  - {type: variant, offset: 833, length: 193, content: 或聘莊子莊子應其使曰子見夫犧牛乎衣以文繡食以芻菽及其牽入於太廟雖欲為狐犢其可得乎孟子曰臣聞胡齕云王坐於堂上有牽牛而過堂下者王見之曰牛何之對曰將以釁鍾王不忍見其觳觫欲以羊易之是見牛而不見羊也晏子春秋曰今公之牛老於蘭罕不勝服也車蠹於瓦石不服乘也列子曰宋人有好行義者三世不懈家無故而黑牛生白犢以問孔子孔子曰此吉祥也以享上帝居一年其父無故而盲牛又復生白犢其父令其子問孔子孔子曰吉祥也復以祭居一年, SBCK: 元嘉}
