  - {type: variant, offset: 170, length: 0, content: '', krp: 萊牛島上嘗以五月}
  - {type: variant, offset: 171, length: 2, content: 流波, SBCK: 牛産乳海牛形似牛而無角騂色虎聲爪牙亦如虎脚似鼉魚尾似鮎魚尾長尺餘其皮甚軟可供百用牛見人奔入水以杖擊鼻則得之史苓武昌郡記曰武昌牛崗古老相傳云有金牛出此今半巳崩破坈大數十丈牛因躍出踐崗邊石遺迹尚在常璩華陽國志曰牛飲水者昔程鄭於此飲牛江爲之竭因以爲名劉欣期交州記曰九眞居風山夷人有一嫗向田見金牛出食斫得鼻鎻長丈餘後人徃徃見牛夜出光曜數十里也盛弘之荆州記曰䴏尾洲南有龍龐二洲二洲之間舊云多異魚而投􅅈揮網輒便桂絶有水客沉而視之見有石牛二頭常爲網害故網絶焉酈道元注水經曰陽城東八十里有牧牛山下有九十九泉即滄河之上源也􅂄舊云山下夲有百泉競發有一神牛駭身自山而降下飲泉竭故}
