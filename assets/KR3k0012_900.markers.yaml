  - {type: variant, offset: 161, length: 1, content: 帝, krp: 髙士傳曰民有牛暴管寜田者寧爲牽着凉處自飲食還牛主主得牛大慙先賢行狀曰}
  - {type: variant, offset: 162, length: 0, content: '', WYG: 出逰河上忽有一青牛従河中出人驚走太尉何公時為尉中將軍有勇走逆牛見公走還何公以左手挽牛足右手持斧斫牛頭而殺之青牛者萬年之木也嵩髙記云山有大松或千嵗其精變為青牛蜀}
  - {type: variant, offset: 163, length: 1, content: 世, SBCK: 烈字彦老通識逹人時國中有盗牛者牛主得之盗者曰我邂逅迷惑從今巳後將改過子旣巳赦宥幸無使王烈知之人有以告烈烈以布一端遺之間年中行路老父擔重有人代擔行數十里欲至家置之而去問姓名不以告老父復行失劒於路有人行而遇之欲置而去懼後人得之遂守之至暮劒主還見之即前擔人也老父攬其􅃑曰子前代吾擔不得姓名今子復守吾劒未若子之仁者請告吾姓名吾將以告王烈乃語之而去老父以告烈烈曰丗有仁人吾未之見使人推之乃昔時盗牛人也廣州先賢傳曰羅威字德仁南海番禺人隣家牛數入食其禾旣不可逐又爲斷芻多着牛家門中不令人知數數如此牛主驚怪不知爲誰隂廣求乃覺是威自後更相約率檢犢不敢復侵威田玄中記曰大月支及西胡有牛名曰反牛今日割取其肉三四斤明日其肉巳復創即愈也又曰萬􅀊樹精爲青牛漢桓嘗岀遊河上忽有一青牛從河中出人驚走太尉何公時爲中尉將軍有勇刀走逆牛見公走還河公以左手挽牛足右手持斧斫牛頭而殺之此青牛者萬年之木也嵩髙記云山有大松或千嵗其精變爲青牛蜀王夲}
