  - {type: variant, offset: 175, length: 3, content: 奇獸狀, SBCK: 其名裴氏廣州記曰有石牛毎旱殺牛以血和泥泥石牛背旣畢則雨洗牛背􅅺盡方止顧微廣州記曰陽縣里民有一児年十五六牧牛牛忽䑛此児隨所䑛處肉悉白浄而甚快遂聽牛日日䑛之兒俄而病死其家葬児殺此牛以供賔客凡食此牛肉者男女二十餘人悉變爲虎笁法眞登羅山䟽曰増成縣南有烈清洲洲南又有牛潭漁人見金牛常出水盤石上義熈中縣民張安釣此潭於石上躡得金鏁大}
