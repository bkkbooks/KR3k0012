  - {type: variant, offset: 161, length: 0, content: '', WYG: 高士傳曰民有牛暴管寧田者寧為牽著涼處自飲食還牛主主得牛大慙先賢行狀曰王烈字彦光通識逹人時國中有盜牛者牛主得之盜者曰我邂逅迷惑従今已後將改過子既已赦宥幸無使王烈知之人有以告烈烈以布一端遺之間年中行路老人擔重有人代擔行數十里欲至家置之而去問姓字不以告老父復行失劍於路有人行而遇之欲置而去懼後人得之遂守之至暮劍主還見之即前擔人也老父􅀈其袂曰子前代吾擔不得姓名今子復守吾劒未若子之仁者請告吾姓名吾將以告王烈乃語之而去老父以告烈烈曰世有仁人吾未之見使人推之乃昔時盜牛人也廣州先賢傳曰羅威字德仁南海番禺人隣家牛數入食其禾既不可逐乃為斷芻多著牛家門中不令人知數如此牛主驚怪不知為誰隂廣求乃覺是威自後更相約率檢犢不敢復侵威田𤣥中記曰大月支及西湖有牛名曰反牛今日割取其肉三四斤明日其肉已復瘡即愈也又曰萬嵗樹精為青牛漢桓}
  - {type: page-break, offset: 161, content: '', id: KR3k0012_WYG_900-3a, image: WYG0901/WYG0901-0050a.png}
