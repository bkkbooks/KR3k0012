  - {type: variant, offset: 752, length: 2, content: 惠君, SBCK: 公二十七年使人伐之樹創隨合經日不斷文公乃益發卒持斧者四十人猶不斷疲還息其一人傷足不能去卧樹下聞􅀑相與言勞乎攻戰其一人曰何足爲勞又曰􅁗公必將不休如之何荅曰􅁗公其如子何又曰赭衣􅁅坌子如之何黙然無言卧者以告於是令工皆衣赭隨斫創坌以􅁅樹斷化爲牛使􅀐擊之不勝或墮於地髻}
