  - {type: variant, offset: 881, length: 2, content: 消消, SBCK: 追吴師及之陳弃疾謂工尹啇陽曰王事也子手弓子射諸射之斃一人韔弓丑亮切韔弓衣止其御曰朝不坐燕不與殺三人亦足以反命矣朝燕于寢大夫坐於上士立於下然則啇陽與御者皆土也孔子曰殺人之中又有禮焉善之又曰孔子云士使之射不能則辭以疾懸弧之義也男子生而設弧於門左示有射道而未能也又曰射有似乎君子失諸正鵠反求諸其身反求於其身不以怨人也盡曰正皮曰鵠也又曰孔子射於矍相之圃蓋觀者如堵墻矍相地名也樹菜􅂼曰圃射至於司馬使子路執弓矢岀延射曰賁房吻切軍之將亡國之大夫與爲人後者不入其餘皆入蓋去者半入者半先行飲酒禮將射弓以司馬子路執弓矢延射則爲司射也賁讀爲僨僨猶覆則也又使公罔之裘序􅀧楊觶而語曰㓜壯孝悌􅂄耋好禮不從流俗修身以俟死者不在此位也蓋去者半處者半序㸃楊觶而語曰好學不倦好禮不變耄期音基稱道不亂者不在此位也蓋僅有存焉之發聲也射畢又使此二人舉觶者古者於旅也語語謂􅀃美理也三十曰壯􅂄耋皆老也流俗失俗也處猶留也不可以在此賔位序􅀧或爲徐􅀧壯或爲將耄期或爲旄動又曰射之爲言繹也或曰舎也繹者各繹己之志也故心平體正持弓矢審固持弓矢審固則射中矣故曰爲人父者以爲父鵠爲人子者以爲子鵠爲人君者以爲君鵠爲人臣者以爲臣鵠故射者各射巳之鵠故天子大射謂之射侯射侯者射爲諸侯也射中則得爲諸侯射不中不得爲諸侯大射將􅀕擇士之射也以爲某鵠者將射還視侯}
