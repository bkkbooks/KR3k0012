  - {type: variant, offset: 863, length: 4, content: 司馬相如, krp: 鄧禹十三男各令習一藝梁書曰栁惲字文暢早}
  - {type: variant, offset: 865, length: 1, content: 相, WYG: 使子路執弓矢出延射曰賁軍之將亡國之大夫與人後者不入其餘皆入盖去者半又使公罔之裘序㸃揚觶而語曰㓜壯孝弟耆耋好禮不從流俗修身以俟死者不在此位也盖去者半處者半序㸃揚觶而語曰好學不倦好禮不變耄期稱道不亂者不在此位也盖僅有存者又曰射之為言繹也或曰舍也繹者各繹已之志也故心平體正持弓矢審固則射中矣故曰為人父者以為父鵠為人子者以為子鵠為人君者以為君鵠為人臣者以為臣鵠故射者各射已之鵠故天子之大射謂之射侯射侯者射為諸侯也射中則得為諸侯射不中不得為諸侯天子將祭必先習射於澤澤者所以擇士也已射於澤而後射於射宫射中者得與於祭不中者不得與於祭不得與於祭者有讓削以地得與祭者有慶益以地進爵絀地是也故男子生桑弧蓬矢六以射天地四方天地四方者男子之所有事也故必先有志於其所有事然後敢用榖也左傳曰晉楚將戰潘尫之黨與養由基蹲甲而射之徹七札焉以示王曰君有二臣}
