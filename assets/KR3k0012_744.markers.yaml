  - {type: variant, offset: 973, length: 237, content: 晉書裴楷有渴利疾不樂處勢王渾為楷請當見將養不違其志不聽及疾詔遣黃門郎王衍省疾楷廻眸矚之曰竟未見識衍深歎其神雋南史何點少時嘗患渴逾歲不逾後在吳中石佛寺建講所晝寢夢一道人形貌非常授丸一掬夢中服之而差唐書鄧玄挺綜銓選無藻鑒之明又患消渴人因號為鄧渴王子年拾遺錄曰晉武為撫軍時羗人姚馥字世芬姚襄即其祖也好啜嚼濁糟言渴於醇酒群輩常狎之呼為渴羗為朝歌邑長馥辭之帝曰朝歌紂之故鄉地有酒池故使老羗不復呼飲交州記曰浮石體虛而輕煮飲止渴淮南子曰嫁女於疾痟渴者夫死後則難可復處以為故妨之後人不要蹶逆, WYG: ''}
