  - {type: variant, offset: 3294, length: 1193, content: 七年竟不愈齊亡歲以痢疾終魏武令曰凡山水甚強寒飲之皆令人痢陰痿漢書曰膠西王端為人賤戾又陰痿一近婦人病數月又曰周仁為人陰重不泄張晏曰陰重不泄下濕故溺袴是以得此官者入後宮魏志公孫康死子晃淵皆小眾以康弟恭嗣恭陰消為閹人劣弱不能治國淵脅奪恭位晉書南陽王摸世子保體質豐偉嘗自秤重八百斤素喜睡痿疾不能御婦人宋書曰明帝素肥晚年痿疾不能御內陽病左傳襄三曰楚子使薳子馮為令尹訪於申叔豫申叔豫曰國多寵王弱國不可為也遂以疾辭方暑闕地下冰而床焉重繭衣裘鮮食而寢楚子使醫視之復曰瘠則甚矣而血氣未動言無疾史記曰廉頗云我為趙將有攻城野戰之功而藺相如徒以口舌為勞而位居我上相如聞不肯與會每朝時常稱病不欲與爭列續漢書曰楊彪見漢祚將終自以累世為公卿恥為魏臣遂稱足疾不復行范曄後漢書曰高詡字季回父容哀平間為光祿大夫詡以父任為郎世傳魯詩以信行清操知名王莽篡位父子稱盲逃不仕莽又曰封觀者以兄名位未顯恥先受之遂稱風疾瘖不能言火起燒屋徐出避之忍而不告謝承後漢書曰沛國陳禁性不好榮建武中拜議郎引見賜食禁陽眼目無所見以肉投羹中出又撐柱乃歸魏末傳曰李滕為荊州刺史曹爽令別司馬懿懿使婢進粥持杯而飲粥皆流出謂爽曰太傅非復可濟令人愴然故爽不復設備曹瞞傳云太祖少飛膺走狗游蕩無度其叔父數言之於嵩太祖患之後逢叔父於路乃佯敗面喎口叔父怪問其故太祖曰卒中風叔父告嵩嵩驚呼太祖太祖貌如故嵩問曰叔父言汝中風已差乎太祖曰初不中風但失叔父愛故見罔爾嵩乃疑自後叔父所言嵩不復信晉書曹爽專權宣帝稱疾何曾亦謝病爽誅曾乃起視事又曰鍾會將反於蜀使衛瓘慰勞諸軍瓘心欲去且堅其意曰卿三軍主宜自行會曰卿先行吾當後出瓘便下殿會悔遣之使呼瓘瓘辭眩疾動詐仆地北出閤數十信追之瓘至外廨服鹽湯大吐瓘素羸便以困篤會遣所親人及醫視之皆言不起會由是無所憚晉陽秋曰宣帝初不欲屈節曹氏辭以風疾不能起魏武使人往微刺之以觀信否宣帝堅臥不動晉書曰王戎族弟敦有高名戎惡之敦每候戎輒託疾不見敦後果為逆亂其鑒賞先見如此又曰長樂馮恢父為弘農太守愛少子淑欲以爵傳之恢父終服闕乃還鄉里結草為廬陽瘖不能言淑得襲爵恢始仕為博士祭酒隋書曰郭衍為洪州總管晉王鎮淮海因召衍陰共計議又恐人疑無故來往託以衍妻患癭王妃蕭氏有術能療之以狀奏高祖高祖聽衍共妻向江都往來無度唐書曰安祿山陷西京王維佯中風失音賊猶強授偽官後蒙原罪又曰王徽傳黃巢入潼關僖宗出幸徽與同列崔沆豆盧瑑僕射干琮至曙方知遂相與奔馳赴行在徽夜落荊榛中隱於崔谷為賊所得迫還京師將授之偽命徽示以足折口瘖雖曰刃環之初無懼色賊令輿歸第命毉二視之月餘守視者稍怠徽乃雜於負販竄之河中遣人間道奉絹表入蜀天子嘉之詔授光祿大夫守兵部尚書嵇康高士傳曰王莽徵孔休休飲血於使者前吐之為病篤遂不行益部耆舊傳曰公孫述僭號徵犍為任永君許以大位永君故託以清盲妻於面前淫若不見子入井忍情不問述伏誅永君澡浴引鏡照形曰世適平目即清妻乃自殺馮信季成亦不受公孫述聘託清盲十三年侍婢於面前淫而不問述誅取紙作書婢因自殺, SBCK: 四}
