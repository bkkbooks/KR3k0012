  - {type: variant, offset: 887, length: 0, content: '', SBCK: 得爲諸侯爲有慶也不得爲諸侯謂有譲也天子將􅀕必先習射於澤澤者所以擇士也已射於澤而后射於射宫射中者得與於􅀕不中者不得與於􅀕不得與於􅀕者有讓削以地得與於􅀕者有慶益以地進爵絀地是也澤宫名也士謂諸侯朝者諸臣及所貢士也皆先令習射於澤巳乃射宫課中否也諸侯有慶者先進爵有讓者先削地也故男子生桑弧蓬矢六以射天地四方天地四方者男子之所有事也故必先有志於其所有事然後敢用榖也左傳曰晉楚將戰潘尫乏子黨與養由基蹲甲而射之徹七禮焉蹲聚以示王曰君有二臣如此何憂於戰王怒曰大辱國詰朝尓射死藝言汝以射自多必當以藝死也吕錡夢射日中之退入於􅅺吕錡魏錡也占之曰􅁎姓日也異姓月也射而中之退入於􅅺亦必死矣及戰射恭王中目王召養由基與之二矢使射吕錡中項伏弢他力切弓衣也以一矢復命言一發而中又曰衛獻公出奔􅀄尹公他學射於􅁃公差􅁃公差學射於公孫丁二子追公二子也與差也爲孫氏逐也公孫丁御公子魚曰射爲背師不射爲戮射而禮乎子魚􅁃公差也禮射不求中也射兩軥而還軥車軛卷者今俗謂之軥心木尹公他曰子爲師我則逺矣乃反之他不從丁學故曰逺始與公差具退悔而獨還射丁公孫丁授公轡而射之貫臂貫手公他臂又曰吴子諸樊伐楚以報舟師之役門于巢攻巢門也巢牛臣曰吴王勇而輕􅀂啓之親門啓開門也我獲射之必殪殪死也是君也死疆其少安從之吴子門焉牛臣隱於短墻以射之卒又曰昔賈大夫惡貌醜也娶妻而美三年不言御以如臯射雉獲之其妻始􅀏而言}
