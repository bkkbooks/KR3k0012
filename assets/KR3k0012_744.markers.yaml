  - {type: variant, offset: 60, length: 460, content: 霍亂之疾幽明錄曰某郡張甲者與司徒蔡謨舊有親僑住謨家蹔數宿行過期不反謨晝眠夢甲云暫行忽暴病患心腹脹滿不得吐痢某時死亡又云我病名乾霍亂自可治也但人莫知其藥故令身死謨曰何以治之甲曰取蜘蛛生斷去腳吞之即愈謨覺使人往甲行所驗之果死問主人病與時日皆與夢符後有乾霍亂者謨試用輒差疰釋名曰疰人死一人復得氣相灌注也范汪方曰凡九十種寒戶疰此病隨月盛衰人有三百六十餘脈走入皮中或右或左如人所刺遂至於死死尸相注或至滅門瘧說文曰瘧熱寒並作也痁熱瘧也疾二日一發易說曰立春氣當至不至則多疾瘧白露當降不降民多溫瘧周禮天官疾醫曰秋時有瘧寒疾禮記月令曰孟秋行夏令民多瘧疾左傳昭二十年傳曰齊侯疥遂痁痁瘧疾也期而不瘳諸侯之賓問疾者多在多在齊也梁丘據與裔款言於公曰吾事鬼神豐於先君今君疾病為諸侯憂是祝史之罪也盍誅於祝固史嚚以辭賓欲殺嚚固以謝問疾之賓公悅告晏子晏子諫之乃止東觀漢記曰鄧訓遷護烏桓校尉吏士嘗大病瘧轉易至數十人訓身主湯藥咸得平愈又曰景丹從上至懷病瘧在上前瘧病上曰聞壯士不瘧漢大將軍反瘧病耶使小黃門扶起賜醫藥歸洛陽病遂加抱朴子曰獮猴之鬼令人疾瘧山海經曰陽, SBCK: 􅇊藝}
