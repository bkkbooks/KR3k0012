  - {type: variant, offset: 1050, length: 3, content: 晝寢夢, SBCK: 作弓矢玄謂日月之食隂陽相勝之變也於日食則射太隂月食則射太陽􅀂神也則以太隂之弓與枉矢射之神謂非鳥獸之聲􅀂或叫于宋大廟譆譆出岀者又曰王大射則共虎侯熊侯豹侯設其鵠諸侯則共熊侯豹侯卿大夫則共麋侯皆設其鵠大射者爲祭祀射王將有郊廟之事與􅀖國所貢之士可以與祭者射者可以觀徳行其容躰比於禮其節比於樂而中多者得與於􅀕凢大射各於其射宫侯者其所射也以虎豹熊麋之皮飭其側所謂皮侯三之大射虎侯王所自射也熊侯諸侯所射豹侯卿大夫以下所射諸侯之大射熊侯諸侯所自射豹侯羣臣所射卿大夫之大射麋侯君臣共射焉又曰保氏掌養國子以道教之五射五射}
  - {type: variant, offset: 1050, length: 3, content: 晝寢夢, krp: 作弓矢玄謂日月之食隂陽相勝之變也於日食則射太隂月食則射太陽若神也則以太隂之弓與枉矢射之神謂非鳥獸之聲若或叫于宋大廟譆譆出岀者又曰王大射則共虎侯熊侯豹侯設其鵠諸侯則共熊侯豹侯卿大夫則共麋侯皆設其鵠大射者爲祭祀射王將有郊廟之事與邦國所貢之士可以與祭者射者可以觀徳行其容躰比於禮其節比於樂而中多者得與於祭凢大射各於其射宫侯者其所射也以虎豹熊麋之皮飭其側所謂皮侯三之大射虎侯王所自射也熊侯諸侯所射豹侯卿大夫以下所射諸侯之大射熊侯諸侯所自射豹侯羣臣所射卿大夫之大射麋侯君臣共射焉又曰保氏掌養國子以道教之五射五射}
