  - {type: variant, offset: 1044, length: 5, content: 石佛寺建講, SBCK: 之祅鳥􅀂不見鳥獸則以救日之弓與救月之矢夜射之不見鳥獸謂夜來鳴呼爲恠者獸狐狼之屬鄭司農云救日之弓救月之矢謂日月食}
