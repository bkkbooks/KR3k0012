  - {type: variant, offset: 1033, length: 5, content: 嘗患渴逾歲, SBCK: 教之舞凡射王以騶虞爲節諸侯以貍首爲節大夫以采蘋爲節士以采繁爲節騶虞采蘋采䌓皆樂章名在囯風召南爲貍首在樂記又曰王以六耦射三侯三獲三容樂以騶虞九節五正諸侯以四耦射二侯二獲二容樂以貍首七節三正􅀌卿大夫以三耦射一侯一獲一容樂以采蘋五節二正士以三耦射犴侯一獲一容樂以采蘋五節二正鄭司農云三侯虎熊豹也容者乏也待􅀗者所蔽也九節析羽九重設於長杠正所射也􅀂王大射則以貍歩張三侯鄭司農云貍歩謂}
