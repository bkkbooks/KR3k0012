  - {type: variant, offset: 863, length: 4, content: 司馬相如, SBCK: 鄧禹十三男各令習一藝梁書曰栁惲字文暢早}
  - {type: variant, offset: 863, length: 0, content: '', WYG: 鄧禹十三男各人習一藝梁書曰栁惲字文暢早有令名少工篇什彈琴為士流第一帝謂周捨曰吾聞君子不可求備至於桞惲可謂具美分其才藝足了十人又曰朱异字彦和通覽五經渉獵子史博奕書筭尤善沈約面試皆妙乃戯异曰君何不亷天下有藝君一時持去可謂不亷也後魏書曰祖珽字孝徴裴讓之字士禮俱崇文學邢劭省中為之語曰多伎多能祖孝徴能賦能詩裴讓之皆一時之美也後趙録曰張材伎烏譚部人也善棊博蹴踘鬭雞諸伎身長八尺飲酒石餘不亂射上中論藝記曰射以平志御以和心書以綴事數以理煩李顒㳺藝箴曰邈矣姬旦惟藝之淵易曰弦木為弧剡木為矢弧矢之利以威天下蓋取諸暌睽乖也物乖則爭弧矢之用所以威乖爭也又曰公用射隼於髙墉之上獲之无不利子曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有動而不括是以出而有獲語成器而動者也括結也君子待時而動則無結閡之患也詩曰既張我弓又挾我矢又曰終日射侯不出正兮禮曰工尹商陽與陳棄疾追吴師及之陳棄疾謂工尹商陽曰王事也子手弓射諸射之斃一人韔止其御曰朝不坐燕不與殺三人亦足以反命矣孔子曰殺人之中又有禮焉善之又曰孔子云君使士射不能則辭以疾懸弧之義也又曰射有似乎君子失諸正鵠反求諸其身又曰孔子射於矍相之圃盖觀者如堵墻射至於}
