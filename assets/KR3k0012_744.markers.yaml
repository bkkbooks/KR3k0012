  - {type: variant, offset: 1041, length: 0, content: '', SBCK: 以矢行吿卒令取矢鄭司農云射人王令人去侯所而立於後也以矢行告射人以矢行髙下左右告於王者也又曰射鳥氏掌射鳥鳥謂中膳羞者鳬鴈鳴鴞之屬也􅀕祀以弓矢敺烏鳶凡賔客㑹同軍旅亦如之烏鳶善鈔盗便汗人射則取矢矢}
  - {type: variant, offset: 1041, length: 0, content: '', krp: 以矢行吿卒令取矢鄭司農云射人王令人去侯所而立於後也以矢行告射人以矢行髙下左右告於王者也又曰射鳥氏掌射鳥鳥謂中膳羞者鳬鴈鳴鴞之屬也祭祀以弓矢敺烏鳶凡賔客㑹同軍旅亦如之烏鳶善鈔盗便汗人射則取矢矢}
  - {type: variant, offset: 1042, length: 1, content: 吳, SBCK: 侯髙則以并夾取之鄭司農云王射則射鳥氏主取其矢在侯髙者矢着侯髙人手不能及則以并夾取之并夾鍼箭具夾讀爲習故司弓矢職曰大射燕射共弓矢并甲又曰庭氏掌射國}
