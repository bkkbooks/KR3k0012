  - {type: variant, offset: 1510, length: 4, content: 吳郡媯晧, SBCK: 王寵善射十發十中皆同處焉又曰董卓膂力過人􅀟帶兩鞬左右馳射爲羌胡所畏魏志曰挹婁國古肅愼氏之國也善射入人目又曰文帝共上常獵爲虎所逐顧射應聲而倒太祖壯其摯勇使將武􅀐魏略曰成公英從太祖出獵有三鹿走過太祖命英射之三發三鹿皆應弦而倒吴志曰太史慈}
  - {type: variant, offset: 1510, length: 4, content: 吳郡媯晧, WYG: 王寵善射十發十中皆同處焉又曰董卓膂力過人雙帶兩鞬左右馳射為羗胡所畏魏志曰挹婁國古肅慎氏之國也善射入人目又曰文帝獵為虎所逐顧射應聲而倒太祖壯其摰勇吏將武騎魏畧曰成公英從太祖出獵有三鹿走過太祖命英射之三發三鹿皆應弦而倒吴志曰太史慈}
  - {type: page-break, offset: 1510, content: '', id: KR3k0012_WYG_744-10a, image: WYG0899/WYG0899-0551a.png}
  - {type: variant, offset: 1510, length: 4, content: 吳郡媯晧, krp: 王寵善射十發十中皆同處焉又曰董卓膂力過人雙帶兩鞬左右馳射爲羌胡所畏魏志曰挹婁國古肅愼氏之國也善射入人目又曰文帝共上常獵爲虎所逐顧射應聲而倒太祖壯其摯勇使將武騎魏略曰成公英從太祖出獵有三鹿走過太祖命英射之三發三鹿皆應弦而倒吴志曰太史慈}
  - {type: variant, offset: 1515, length: 1, content: 元, SBCK: 子義􅀄北海相孔融以黄巾㓂􅁀出屯都昌爲賊管亥所圍慈乃帶䭈攝弓上馬將兩􅀐自隨各作一的持之開門直出外軍圍下左右人並驚駭兵馬牙岀慈引馬至城下塹内植所持的各一出射之射畢徑入門晨復如此圍下人或}
  - {type: variant, offset: 1515, length: 1, content: 元, WYG: 子義初北海相孔融以黄巾冦暴出屯都昌為賊管亥所圍慈乃帶鞬攝弓上馬將兩騎自隨各作一的持之開門直出外圍下左右人並驚駭兵馬互出慈引馬至城下塹内植所持的各一出射之射畢徑入門明晨復如此圍下人或}
  - {type: page-break, offset: 1515, content: '', id: KR3k0012_WYG_744-10b, image: WYG0899/WYG0899-0551b.png}
  - {type: variant, offset: 1515, length: 1, content: 元, krp: 子義𥘉北海相孔融以黄巾㓂暴出屯都昌爲賊管亥所圍慈乃帶䭈攝弓上馬將兩騎自隨各作一的持之開門直出外軍圍下左右人並驚駭兵馬牙岀慈引馬至城下塹内植所持的各一出射之射畢徑入門晨復如此圍下人或}
  - {type: punctuation, offset: 1517, content: ，, id: KR3k0012_CHANT_744-bkkpn548}
  - {type: 'tls:seg', offset: 1517, content: '', id: KR3k0012_CHANT_744-25a.7}
  - {type: variant, offset: 1517, length: 0, content: '', SBCK: 或卧故慈復植的射之畢復入門明晨復岀如此無復起者於是鞭馬直突圍中馳去此賊覺知慈行巳過又射數人皆應弦而倒故無敢追者慈猿臂善射弦不虚發甞從孫䇿討麻保賊賊於屯裏縁樓上行罵以手持樓棼慈引弓射之矢貫手着棼圍外萬餘人莫不稱善}
  - {type: page-break, offset: 1517, content: '', id: KR3k0012_SBCK_744-7b}
  - {type: variant, offset: 1517, length: 0, content: '', WYG: 或卧慈復植的射之畢復入門明晨復出如此無復起者於是鞭馬直突圍中馳去比賊覺知慈行已過又射數人皆應弦而倒故無敢追者慈猿臂善射弦不虛發嘗從孫䇿討麻保賊賊於屯裏縁樓上行詈以手持樓棼慈引弓射之矢貫手著棼圍外萬餘人莫不稱善}
  - {type: variant, offset: 1517, length: 0, content: '', krp: 或卧故慈復植的射之畢復入門明晨復岀如此無復起者於是鞭馬直突圍中馳去此賊覺知慈行巳過又射數人皆應弦而倒故無敢追者慈猿臂善射弦不虚發甞從孫䇿討麻保賊賊於屯裏縁樓上行罵以手持樓棼慈引弓射之矢貫手着棼圍外萬餘人莫不稱善}
  - {type: variant, offset: 1518, length: 1, content: 母, SBCK: 妙如此晉書曰劉曜字永明身長九尺六寸垂手過膝雄武有膂力射鐡入一寸焉時號神射也又曰􅁃翼時有衆萬詔加都督征討諸軍事師次襄陽大㑹僚佐陳旌甲親授弧矢曰我之行也善此射矣遂三起三疊徒衆屬目其氣十倍又曰􅁃翼鎮武昌謝尚數詣翼諮謀軍事甞與翼共射翼曰卿􅀂破的當以鼓吹相賞尚應聲中之翼即以其副鼓吹給之又曰楊濟遷太子太傳濟有才藝常從帝校獵北邙山下與侍中王濟俱着布袴褶􅀐馬執角弓在輦前猛獸突岀帝令濟射之應弦而倒須􅁷復一岀濟受詔又射殺之六軍大呌稱快又曰魏舒累遷後將軍鍾毓長史毎與叅佐射舒常爲畫籌而巳後遇朋人不足以舒滿數毓􅀄不知其善射舒容貌閑雅發無不中舉坐愕然莫有敵者毓歎而謝曰吾之不足以盡卿才有如此射矣一又曰江州刺史􅁃恱隆安中爲司徒長史曾}
  - {type: page-break, offset: 1518, content: '', id: KR3k0012_SBCK_744-8a}
