  - {type: variant, offset: 2266, length: 888, content: 熨背訓至太官門為求火不得乃以口噓其背復呼同廬郎共更噓至朝遂愈瘕龍魚河圖曰犬狗魚鳥不熟食之成瘕易說曰白露氣當至不至太陰脈盛人多瘕疝宋書徐文伯傳宋明帝宮人患腰痛牽心每至輒氣欲絕眾毉以為肉瘕文伯曰此髮瘕以油投之即吐得物如髮稍引之長三尺頭已成蛇能動懸柱上水滴盡一髮而已病都差山海經曰麗麂之水其中多有育沛佩之無瘕疾郭曰育沛未聞列仙傳曰玄俗者常餌巴豆雲母賣藥於都市河間王病瘕玄俗脈之下蛇十餘頭俗言王病六世餘殃非王所招也曰王嘗放鹿鹿是麟母仁心感天故遭俗耳續搜神記曰太尉郗公鎮丹徒嘗出獵時二月中蕨始生有一甲士折一莖食之即覺心中淡淡欲吐因歸家仍成心腹疾半年許忽大吐吐一蛇長尺餘尚活動搖乃掛著屋簷前汁稍稍出蛇漸燋小經一宿視之成一莖蕨猶昔所食也病遂除差又曰桓宣武時有一督將因時行病後虛熱更能飲復茗必一斛二升乃飽人苦勸復啜五升乃大吐向所飲都盡有一物隨吐後出如斗大試以一斛二升複茗洗之此物噏之都盡而正覺小脹又增五升便悉混然後從口中涌出既吐此物病遂差或問之曰此何病荅曰此病名斛二瘕又曰昔有一人與奴俱得心瘕病奴既死割剖腹視得一白鼈赤眼甚鮮明乃試以諸毒藥澆灌之并內藥於鼈口無損乃繫鼈於床腳有客乘白馬來看之溺濺鼈惶遽疾走避溺既繫之不得去乃縮頸藏腳不敢動病者察之謂其子曰吾疾或可救乃試取白馬溺以灌鼈鼈消滅成數升水病者乃頓飲升餘白馬溺病即豁然除異苑曰章安有人元嘉中噉鴨肉乃成瘕病胸滿面赤不得飲食醫令服秫米潘須臾煩悶吐一鴨鶵身喙翅皆以成就唯左腳故綴昔所食肉病遂獲差志怪曰有人得瘕病腹晝夜切痛臨終勑其子云吾氣絕後可剖視之其子不忍違割之得一銅酒鎗容數合後華佗聞其病而解之便出巾櫛中藥以投鎗鎗即消成酒痺春秋考異郵曰痺在喉壽命凶漢書曰哀帝即位痿痺又曰馮野王弟立為東海太守下濕病痺天子聞之徙為平原太守晉書皇甫謐字士安得風痺疾猶手不輟卷後魏書臨淮王潭孫孚好酒後遇風患手足不隨口不能言乃左手畫地作字乞解所任唐書曰處羅可汗欲分兵大掠中國群下多諫處羅曰我父失國賴隋得立恩不可忘時處羅久疾痺隋義城公主有五石餌之俄而處羅發疽死痔釋名曰痔食也蠱食之也山海經曰天帝山有鳥其狀如鶉黑文而赤翁郭璞注云翁頸下毛也名曰櫟食之已痔又虎蛟可以為痔郭璞注為, SBCK: ''}
