  - {type: page-break, offset: 520, content: '', id: KR3k0012_WYG_744-2a, image: WYG0899/WYG0899-0547a.png}
  - {type: variant, offset: 521, length: 338, content: 山多若華華實如苽味酸甘食之已瘧玄晏春秋曰夏四月予瘧于河南歸于新安不瘳世說曰中朝有小兒其父患瘧行乞藥人曰尊侯明德君子何以病瘧荅曰來病君子所以為瘧列異傳曰陽蕤字聖卿逃瘧神祠有人呼言杜卸杜卸聖卿應曰諾起至戶口人曰取此書去得素書一卷皆譴劾百神法乃差錄異傳曰嘉興令吳士季瘧經武昌廟遣人辭謝乞斷瘧鬼去廟二十里臥夢見塘上一人乘馬追呼行太急速至季舡下馬與吏共入舡後縛取一小兒去夢覺瘧即斷又曰弘父患瘧經年後獨至田舍瘧發有數小兒持公首腳公見因陽瞑忽起捉得一兒化成黃鷁餘者皆走仍縛以還家懸著䆫上明當殺食之比曉失鷁瘧遂斷于時有瘧者但呼弘公便斷甄異傳曰吳興張安病正發覺有物在被上病便更甚安自力舉被捉之物化成鳥如鵂鶹瘧登時愈盛弘之荊州記曰始興含淮縣有翁水下流有聖鼓橫在川側上下船人刺篙有撞之者皆得瘧疾消渴, SBCK: 嶠}
