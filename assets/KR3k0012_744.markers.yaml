  - {type: variant, offset: 1447, length: 2, content: 飲酒, SBCK: 豹侯五十歩畿内諸侯大射君熊侯九十歩卿大夫參侯七十歩士豻五旦切侯五十歩天子卿大夫射君臣共射一麋侯五十歩諸侯卿大夫亦如之天子及諸侯之士皆無大射叅侯者以豹皮爲鵠以麋皮爲飾叅之爲言􅄂也豻侯者以胡大皮爲鵠亦以爲飾又曰天子賔射亦三侯天子射五正侯諸侯射三正侯卿大夫射二正侯諸侯賔射二侯君三正卿大夫賔射君臣共射一侯二正士與士賔射豻侯二正士不得􅀞雲氣故以豻皮飾其側也畿内諸侯與外國同其侯道亦如之又曰天子燕射天子熊侯諸侯卿大夫士虎豹侯諸侯燕射君亦熊侯卿大夫亦冝叅侯士鹿豕卿大夫與其臣燕射君臣共射虎豹侯士燕射亦冝豹侯􅀞鹿豕}
