  - {type: variant, offset: 1611, length: 261, content: 於眠處大吐以為大醉不復疑沈約宋書曰蕭惠開除府加給事性素剛益不得志發病嘔血有物如肝肺者甚多孟宗別傳曰孟宗為光祿勳嘗大會公先少飲酒偶有強者飲一杯便吐時令峻急凡有醉吐者皆傳詔司察公吐麥飯察者以聞上乃歎息詔問食麥飯意宗荅曰臣家足有米飯耳直愚性所安其德行純素如此列子曰東方有人焉曰爰旌目將有適也而餓於道狐父之盜曰丘見而下壺飧以餔之爰旌目三餔而後能視曰子何為者也曰我狐父之人丘也爰旌目曰譆汝非盜耶胡為而食我吾義不食子食也兩手據地而嘔不出客客而死水疾東觀漢記曰東平王蒼到國後病水氣喘逆上遣太醫丞相視之小黃門侍疾置驛馬傳起居以千里為程晏子, SBCK: 巳齊}
