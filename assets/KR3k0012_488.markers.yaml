  - {type: variant, offset: 422, length: 144, content: 聞之曰善哉覘國者乎又曰朋友之墓有宿草而不哭焉宿草陳根也謂朞年又曰曾申問於曾子曰哭父母有常聲乎曾子曰中路嬰兒失其母焉何常聲之有言其若小兒亡母啼號安得常聲乎又曰斬衰之哭若往而不反齊縗之哭若往而反大功之哭三曲而偯小功緦麻哀容可也左傳曰衛叔武將沐聞君至喜捉髮走出前驅射而殺之公知其無罪也枕其股而哭, SBCK: 行}
