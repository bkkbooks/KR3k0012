  - {type: variant, offset: 3638, length: 194, content: 有九年矣今將還國夫人不喜哭何對曰邊豆茵席所資者也而棄之顏色犁黑手足胼胝所以執勞苦者也而皆後之不勝其哀故哭也文公曰禍福利害有不與舅氏共之者有如河水魏文典論曰上洛都尉王琰獲高幹以封侯其妻哭於內為琰富貴更取妾故也語林曰王武子葬夕孫子荊哭之甚悲賓客莫不為垂涕哭畢向靈座曰卿常好驢鳴今為君作驢鳴既作聲似真賓客大笑孫聞笑顧謂曰諸君不死令主武子死乎賓客莫不皆怒須更之間或悲或笑或怒古詩曰啼呼哭泣如吹胡笳, SBCK: 八}
