  - {type: variant, offset: 9, length: 0, content: '', SBCK: 聲相接呉守邊將士亦爲之泣隋書曰李穆從太祖擊齊師於邙山太祖臨陣墮馬穆突圍而進以馬䇿擊太祖而詈之授以從􅀐潰圍俱出賊見其輕侮謂太祖非貴人遂緩之以故免旣而與穆相對泣顧謂左右曰成我事者其此人乎又曰李崇守永隆英果有籌筭膽力過人􅀄以父賢勲封廻樂縣侯時年尚小拜爵之日親族相賀崇獨泣賢怪而問之對曰無勲於國而㓜少封侯當報主恩不得終於孝養是以悲耳賢由此大竒之孔藂子曰費子陽謂子思曰吾念周室將滅涕泣不可禁也子思曰然今以一人之身憂丗之不治而涕泣不禁是憂河水之濁而以泣清之也其爲無益莫大焉又曰子髙曰泣有二焉大姧之人以泣自信婦人懦夫以泣著愛尸子曰曽子每讀䘮禮泣沾􅁭吕氏春秋曰呉起治西河之外王錯譛於魏武侯使人召之呉起至於岸門岸門邑名止車而望西河泣數行而下其僕謂吳起曰􅀼觀公之意釋天下􅀂釋躧今去西河而泣何也呉起曰今君聽讒人之言而不知我西河之爲􅁗不乆矣魏國從此削乎起果去入楚有間西河入􅁗說􅁐曰聖人於天下也譬猶一堂之上今满堂飲酒有一人向隅而泣則一堂之人皆不樂矣又曰禹出見辜人問而泣之左右問其故禹曰堯舜之民皆以尭舜之心爲心今吾爲君百姓皆以其心爲心是以痛之又曰蔡威公閉門而哭三日泣盡繼以血其隣窺牆問曰何故哭悲荅曰吾國且亡吾聞病之將死不可爲良醫國之將亡不可爲計謀吾數諌吾君不用是知將亡續晉陽秋曰司馬文王問劉禪曰頗思蜀不禪曰此間樂不思蜀也郄正見禪曰􅀂王後問冝泣有以荅㑹王復問禪曰先人墳墓逺在隴蜀乃心西望無日不思因閉眼王曰何乃似郄正語耶禪驚視曰如尊命汝南先賢傳曰蔡順母畏雷後卒每有雷震順輙環塚泣曰順在此王充論衡曰昔周人有仕不遇年老白首涕泣於塗者人或問何爲泣乎對曰吾仕數不遇自傷年老失時是以泣又曰蘇􅁗張儀學從横之術於􅄦谷先生先生曰能􅀃我泣出則能分人主之地矣􅁗􅀃􅀑谷先生泣沾􅁭劉向新序曰周舎事趙簡子居無幾舎死簡子與諸大夫飲酒酣泣曰百羊之皮不如一狐之腋衆人之唯唯不如周舎之諤諤自舎死未甞聞吾非也吾國幾亡乎是以垂泣也文士傳曰張叔序字彦真遇黨錮去官道逢其友人相與語天下云嫉害忠良豈但道之不行恐將不免二人相向而泣有老人過嗟曰二大夫何泣之悲哉龍不隱鱗鳯不藏羽羅網髙懸憂在機後泣將何及二人欲與之語不頋而去梁江淹泣賦曰秋日之光流子以傷露離披而殺草風清冷而繞堂慮尺折而寸斷䰟一逝而九傷欷潺湲兮沬䄂泣嗚咽兮染裳㝷夫景君齊山荆公燕市孟甞聞琴馬遷廢史少卿悼躬夷甫傷子皆泣緒如絲詎能仰視後漢張奐與張公超書曰下筆愴恨泣先言流悲毛詩曰春日遲遲采繁祁祁女心傷悲家語曰閔子三年之䘮畢見孔子孔子與之琴撫弦切切而悲史記曰項王軍垓下兵少食盡漢四靣皆楚歌項王乃大驚曰漢巳盡得楚矣乃悲歌慷􅁣范曄後漢書曰明帝甞謁原陵夜夢先帝太后如平生忻對旣寤悲不能寤明旦遂率百官上陵帝徒歩前伏御􅇃視太后鏡奩中物感慟悲泣左右皆泣莫能仰視也呉録曰張武父業爲郡門下􅁺還家遇賊闘死武時㓜不識父每至節日輙持父遺劒到亡處設􅀕悲動路人呉志曰顧雍爲相十九年年七十六卒􅀄疾微時權令醫趙泉視之拜其少子濟爲􅀐都尉雍間悲曰泉善别死生吾必不起故上欲及吾自見濟拜也晉書曰羊祜樂山水每因風景必造峴山置酒言詠終日不倦甞􅁣然歎息顧謂從事中郎鄒湛等曰自有宇宙便有此山由來賢逹勝士登此逺望如我與卿者多矣皆湮滅無聞使人悲傷如歲後有知魂魄猶應登此也湛曰公德冠四海道嗣前哲令望必與此山俱傳至􅀂湛輩乃當如此公言耳莊子曰宋桓侯築蘇宫使蔡謳爲土唱也觀者數百倍去之無有悲色君乃賞蔡吕氏春秋曰周有申喜亡其母聞乞人歌於門下而悲之動於顔色謂門者内乞人歌者自見而問焉與之語是其母也淮南子曰木葉落而長年悲列女傳曰魯七室邑之四者一邑七宫也過時未適人當穆公之時君老太子㓜女􅀝柱而嘯傍人聞之心莫不爲之慘慘者隣人婦謂曰何嘯之悲欲嫁乎吾爲子求偶七室女曰豈爲嫁之故不樂而悲哉吾憂魯君老而太子少也秦州記曰隴西郡東一百六十里得隴山山東人西􅃥升此而顧瞻者莫不悲思楚辭曰悲者秋之爲氣兮草木揺落而變衰漢李陵與􅂫武書曰胡地玄冰邊土􅃤烈但聞悲風蕭條之聲胡笳互動牧馬悲鳴吟嘯成羣邊聲四起晨坐聽之不覺淚下嗟吁子卿陵獨何心能不悲哉梁􅁃信哀江南賦序曰不無危苦之辭唯以悲哀爲主啼爾雅曰猩猩小而好啼郭璞云聲似小兒啼左傳曰齊襄公田于貝丘見豕從者曰公子彭生也公怒曰彭生敢見射之豕人立而啼漢書曰王莽避火宣室前殿火輙隨之宫人婦女啼呼曰當柰何東觀漢記曰劉盆子字于秊十五􅀍髪徒跣卒見衆拜恐怖啼泣又曰樂恢字伯竒父親爲縣吏有罪令欲殺之恢年十一常伏寺東門外凍地晝夜啼泣令乃出親魏略曰張遼爲孫權所圍遼潰圍出復入權衆破走由是威震江東兒啼不肯止者其父母以遼恐之晉書曰桓温字元子宣城太守彛之子也生未朞而太原温嶠見之曰此兒有竒骨可試使啼及聞其聲曰眞英物也蔡琰别傳曰琰在胡中十三年有二男捨之而歸作詩云家旣迎兮當歸寕兒呼母兮啼失聲我掩耳兮不忍聴風俗通曰桓帝元嘉中婦人作啼粧者薄拭目下作啼處起梁兾家天下皆效之天戒若曰兾婦女將收啼也語林曰董昭爲魏武帝重臣後失􅀔文明丗入爲衛尉昭乃厚加意於侏儒正朝大㑹侏儒作董衛尉啼靣言昔太祖時事舉坐大􅀏明帝悵然不怡月中爲司徒又曰胡廣本姓黄五月生父母置諸甕中投之于江胡翁見甕流下聞有小兒啼聲徃取因以爲子遂登三司涕說文曰涕鼻液也易曰齎咨涕洟無咎毛詩曰眷言頋之澘焉出涕又曰之子于歸逺送于野瞻望弗及泣涕如雨}
