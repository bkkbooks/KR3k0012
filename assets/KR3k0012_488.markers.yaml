  - {type: variant, offset: 2752, length: 241, content: 子社稷危矣百姓誰告文子曰九夷八狄之哭異聲而皆哀列子曰李梁之死楊朱望其門而不哭盡生性之道以至於亡故無所哀隨梧之死楊朱撫其尸而哭生不幸而死故可哀也又曰將陰夢火將病夢食飲酒者憂歌儛者哭又曰韓娥東之齊過逆旅旅人辱之韓娥因曼聲哭曼聲長引一里老幼悲愁垂涕相對孟子曰華周杞梁之妻善哭其夫而變國俗韓子曰子產晨出聞婦人哭撫其御手而聽之有間使執而問焉則手殺其夫者異日御問夫子何以知之曰凡人之於其所親愛也始疾而憂臨死而懼已死而哀今夫已死不哀而懼是以知其奸也淮南子曰故哭之發於口涕之出於鼻此皆憤於中而形於外, SBCK: ''}
