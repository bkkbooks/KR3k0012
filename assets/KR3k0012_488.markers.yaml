  - {type: variant, offset: 3255, length: 159, content: 民嚮方道而哭沽家不售其酒屠者罷刑而歸遨童不謳歌舂者不相杵博物志曰文王以周公為灌壇令朞季風不鳴條文王夢見一婦人甚美當道哭曰我東太山女嫁為西海婦而灌壇令當路有道德吾不敢以風雨過列女傳曰齊人杞梁襲莒戰而死其妻乃就夫尸於城下哭之七日而城崩妻遂投淄水而死車頻秦書曰符登率萬人直到姚萇營下同聲向哭哀號動地萇心惡之與其眾議亦哭相應說, SBCK: 皆流涕􅀃}
