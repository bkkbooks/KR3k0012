  - {type: variant, offset: 949, length: 906, content: 何並字子廉為頴川太守代陵陽嚴詡官屬祖道詡據地哭曰吾哀頴川士我以柔弱徵必選剛猛代代到將有僵仆者故相弔耳並至果大殺戮又曰王莽末兵起莽憂不知所出崔發言周禮及春秋左氏國有大災則哭以厭之故易稱先號咷而後笑宜呼嗟告天莽自知敗乃率群臣南郊陳符命本末仰天撫心大哭諸生小民會旦夕哭為設飧粥甚悲哀及能誦策文者除以為郎至五千餘人謝承後漢書曰許慶字子伯家貧為郡督郵乘牛車鄉里號曰軺車督郵慶嘗與友人談論漢無統嗣幸臣專勢世俗衰薄賢者放退慨然據地悲哭時稱許子伯哭世華嶠後漢書曰趙一造河南尹羊陟不得見一以公卿中非陟無足與託名日往其門尋陟自強通陟臥未起一逕上堂臨之曰竊伏西州抱高風舊矣乃今方遇而便忽然柰何命也因舉聲哭堂下大驚陟延與語大奇之明往詣一柴車草屏露宿其傍左右皆驚愕東觀漢記曰逢萌素明陰陽知莽將敗攜家屬於遼東乃首戴盆盎哭於市言曰新乎新乎遂潛藏漢名臣奏曰漢得陰山匈奴長老過之未嘗不哭魏志曰太祖擊黃巾濟北相鮑信鬭死購求信喪不得乃刻木如信形狀祭而哭焉又曰初蘇則及臨淄侯植聞魏氏代漢皆發憤悲哭文帝聞植如此而不聞則也嘗從容曰吾應天受禪而聞有哭者則謂為見問鬢髯悉張欲正論以對待中傅巽搯則搯音苦洽曰不謂卿也乃止吳志曰孫策薨以事授權權哭未及息策長史張昭謂權曰孝廉此寧哭時耶乃改易權服扶令上馬晉書曰顧榮素好琴及卒家人常置琴於靈座吳郡張翰哭之慟既而上床鼓琴數曲撫琴而歎曰顧彥先復能賞此不因又慟哭不弔喪主而去又曰顧愷之桓溫引為大司馬參軍甚見親昵溫薨後愷之拜溫墓賦詩云山崩溟海竭魚鳥將何依或問之曰卿重桓公乃爾哭狀其可見乎荅曰聲如振雷破山淚如傾河注海又曰阮籍居喪骨立幾致滅性裴楷往弔之籍散髮箕踞醉而直視楷弔哭畢便去或問楷凡弔者主哭客乃為禮籍既不哭君何為哭楷曰阮方外之士故不崇禮典我俗中之士故以軌儀自居又曰秦秀性忌讒佞疾之如讎素輕鄙賈充及伐吳之役聞其為大都督謂所親曰充文案小才乃居伐國大任吾將哭以送師或止秀曰昔蹇叔知秦軍必敗故哭送其子耳今吳君無道國有自亡之形群卒踐境將不戰而潰子之哭也既為不知乃有不救之罪於是乃止又曰魏舒子混字延廣清慧有才行為太子舍人年二十七先舒卒朝野咸為舒悲舒每哀慟退而歎曰吾不及莊生遠矣豈以無益自損乎遂不復哭又曰王敦起郭璞為記室參軍是時頴川陳述為大, SBCK: 李}
  - {type: variant, offset: 949, length: 5, content: 何並字子廉, WYG: 李將軍恂恂如鄙人口不能出辭及死之日天下知與弗知皆}
