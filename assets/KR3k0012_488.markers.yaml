  - {type: variant, offset: 2082, length: 40, content: 悲不自勝既而語康伯曰汝後若居銓衡當用如此輩人及康伯為吏部尚書追隱之晉中興書曰征北, SBCK: 彼其心誠信於士}
  - {type: variant, offset: 2082, length: 1331, content: 悲不自勝既而語康伯曰汝後若居銓衡當用如此輩人及康伯為吏部尚書追隱之晉中興書曰征北大將軍褚裒遣督護王堪迎流民軍次岱陂為石遵所破死傷過半裒還京聞哭聲甚眾問何哭之多左右曰岱陂之役也裒恥恨發疾而薨沈約宋書曰劉慎字德願為秦郡太守德願為性麤率世祖所狎侮上寵姬殷氏葬畢至墓謂德願曰卿哭貴妃若悲者當加厚賞德願應聲便號慟撫膺擗踴涕泗交橫上甚悅以為豫州刺史上又令醫術人羊志哭殷氏志亦嗚咽他日有問志者卿郍得此副急淚志時新喪愛姬荅曰我爾日哭亡妾耳崔鴻前燕錄曰高商渤海人也剛毅嚴重好學有事幹為范陽太守聞兄開戰沒悲哭歐血病不能起扶杖乃行慕容雋召見商泣謂左右曰自古友于之篤未有如商者也拜昌黎太守商泣曰臣兄亡於此郡臣故不忍為之雋愍而授遼西陳書曰張昭有至性及父卒兄弟並不衣錦帛不食鹽醋日唯食一升麥屑粥而已每一感慟必致敺血鄰里聞其哭聲皆為之涕泣隋書曰周羅㬋進授大將軍其年冬帝幸雒陽陳主卒羅㬋請一臨哭帝許之縗絰送至墓所葬還釋服而後入朝帝甚嘉尚世論稱其有禮唐書曰有鄭人唐衢者應進士久而不第能為歌詩意多感發見人文章有所傷歎者讀訖必哭涕泗不能己每與人言論既相別發聲一號音詞哀切聞之者莫不悽然泣下嘗客遊太原屬戎帥軍宴衢得預會酒酣言事抗音而哭一席不樂為之罷會故世稱唐衢善哭為名流稱重若此終不登一命而卒又曰李光弼兼范陽長史河北節度使拔趙郡自祿山反常山為戰場死人蔽野光弼酹其屍而哭之又曰韋昭度知政事與李磎並命時宰相崔昭緯專政惡李磎之為人降制之日令知制誥劉崇魯哭麻以沮之晏子春秋曰景公游臨淄聞晏子卒公乘而驅之自以為遲下車而趁知不若車之速又乘比至國四下而趍行哭至伏尸號曰今天降禍齊國不加寡人加於夫子社稷危矣百姓誰告文子曰九夷八狄之哭異聲而皆哀列子曰李梁之死楊朱望其門而不哭盡生性之道以至於亡故無所哀隨梧之死楊朱撫其尸而哭生不幸而死故可哀也又曰將陰夢火將病夢食飲酒者憂歌儛者哭又曰韓娥東之齊過逆旅旅人辱之韓娥因曼聲哭曼聲長引一里老幼悲愁垂涕相對孟子曰華周杞梁之妻善哭其夫而變國俗韓子曰子產晨出聞婦人哭撫其御手而聽之有間使執而問焉則手殺其夫者異日御問夫子何以知之曰凡人之於其所親愛也始疾而憂臨死而懼已死而哀今夫已死不哀而懼是以知其奸也淮南子曰故哭之發於口涕之出於鼻此皆憤於中而形於外也又曰楊子見衢而哭之為其可以南可以北韓詩外傳曰孔子行聞哭聲甚悲孔子曰驅之前有賢者至則皋魚也被褐擁鎌哭於道傍孔子避車而與之言曰子非有喪何哭悲也皋魚曰吾失之三少而好學周流諸侯以後吾親失之一也高吾志簡吾事不事庸君失之二也少擇交遊寡於親友老而無託失之三也樹欲靜而風不止子欲養而親不待往而不可追者年也去而不可得見者親也吾請從此辭矣立槁而死又曰孔子出遊少原之野有婦人中澤而哭其音甚哀孔子使弟子問焉婦人曰嚮者刈蓍薪亡吾簪吾是以哀弟子曰刈蓍薪而亡簪有何悲焉婦人曰非悲傷亡簪也哀其亡故賈誼新書曰鄒穆公死鄒之百姓若失慈父行吟三月四境之鄰於鄒者士民嚮方道而哭沽家不售其酒屠者罷刑而歸遨童不謳歌舂者不相杵博物志曰文王以周公為灌壇令朞季風不鳴條文王夢見一婦人甚美當道哭曰我東太山女嫁為西海婦而灌壇令當路有道德吾不敢以風雨過列女傳曰齊人杞梁襲莒戰而死其妻乃就夫尸於城下哭之七日而城崩妻遂投淄水而死車頻秦書曰符登率萬人直到姚萇營下同聲向哭哀號動地萇心惡之與其眾議亦哭相應, WYG: ''}
