  - {type: variant, offset: 1092, length: 228, content: 者除以為郎至五千餘人謝承後漢書曰許慶字子伯家貧為郡督郵乘牛車鄉里號曰軺車督郵慶嘗與友人談論漢無統嗣幸臣專勢世俗衰薄賢者放退慨然據地悲哭時稱許子伯哭世華嶠後漢書曰趙一造河南尹羊陟不得見一以公卿中非陟無足與託名日往其門尋陟自強通陟臥未起一逕上堂臨之曰竊伏西州抱高風舊矣乃今方遇而便忽然柰何命也因舉聲哭堂下大驚陟延與語大奇之明往詣一柴車草屏露宿其傍左右皆驚愕東觀漢記曰逢萌素明陰陽知莽將敗攜家屬於遼東乃首戴盆盎哭於市言曰新乎新乎遂潛藏漢名臣奏曰漢得陰山匈奴長老過, WYG: 讀}
