  - {type: variant, offset: 7, length: 1, content: 八, WYG: 九泣屯附啼涕附泣說文曰泣無聲出涕也易曰乗馬班如泣血漣如詩曰瞻望弗及佇立以泣禮記曰髙子羔執親之喪泣血三年未嘗見齒君子以為難又曰弁人有其母死而孺子泣者孔子曰哀則哀矣而難為繼也左傳曰楚令尹子元欲蠱文夫人為舘於其宫側而振萬焉夫人聞之泣曰先君以是舞也習戎備也今令尹不尋諸仇讎而置舘於未亡人之側不亦異乎又曰叔孫婼聘於宋宋公與之宴飲酒樂宋公使昭子右坐語相泣樂祁佐退而告人曰今兹君與叔孫其皆死乎吾聞之哀樂而樂哀皆心喪也何以能乆又曰宋公子地有白馬四公嬖向魋魋欲之公取而朱其尾鬛以與之地怒使其徒奪之魋懼將走公閉門而泣之目盡腫國語曰叔向見司馬侯之子撫之而泣曰自其父死也吾蔑與比而事君也昔者其父始之我終之我始之夫子終之史記曰荆軻與髙漸離飲於燕市酒酣漸離擊筑軻和而歌之於市中相樂已而相泣傍若無人又曰戚姬愛幸生趙王如意嘗従髙祖於闗東日夜啼泣欲立如意為太子又曰竇皇后兄長君弟曰竇廣國字少君年五歲時家貧為人所略賣之長安聞皇后新立廣國上書自陳后言之文帝召見具言其故於是后持之而泣交横下侍御左右皆伏地泣助皇后悲哀又曰漢髙帝欲自擊陳豨蒯成侯周緤泣曰始滅秦定天下未嘗自行是為無人可使者乎漢書曰上朝東宫趙談參乗袁盎伏車前曰聞天子所共六尺輿皆天下豪英今漢雖乏人陛下獨奈何與刀鋸之餘載於是上遣下談泣下車又曰李陵與蘇武别置酒起舞歌曰萬里兮度沙漠為君將兮奮匈奴路窮絶兮矢刃摧士衆滅兮名已頺老母已死雖欲報恩將安歸陵泣數行與武訣又曰髙祖破黥布軍還過沛置酒沛宮酒酣上慷慨傷懐泣下數行東觀漢紀曰更始害齊武王光武飲食語笑如平常獨居輙不御酒肉枕席有涕泣處又曰來歙與蓋延攻公孫述將王元破之蜀人大懼使刺歙歙未死馳告蓋延延見歙伏悲不能仰視歙叱曰呼巨卿欲屬以軍事而反效兒女子涕泣乎延收淚强起受所誡歙自書表投筆抽刃而死又曰章帝東廵狩祠泰山還幸東平王宫涕泣沾襟楚漢春秋曰惠帝崩吕太后欲為髙墳使従未央宫坐而見之諸將諫不許東陽侯垂泣曰若陛下日夜見惠帝塜悲哀流涕無已是傷生也臣竊哀之於是太后乃止吳志曰孟宗為驃騎朱據軍吏將母在營既不得志又夜雨屋漏因起涕泣以謝母母曰但當自勉之何足泣也晉書曰羊祜卒南州人罷市}
