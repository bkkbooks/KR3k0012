  body:
  - {type: variant, offset: 7, length: 1, content: 八, SBCK: 九泣悲啼涕泣􅀃文曰泣無聲出涕也易曰乗馬班如泣血漣如詩曰瞻望弗及佇立以泣又曰不見復關泣涕漣漣禮記曰髙子羔執親之䘮泣血三年未甞見齒君子以爲難又曰弁人有其母死而孺子泣者孔子曰哀則哀矣而難爲繼也左傳曰楚令尹子元欲蠱文夫人爲館於其宫側而振萬焉夫人聞之泣曰先君以是舞也習戎備也今令尹不㝷諸仇讎而置館於未亡人之側不亦異乎又曰叔孫婼聘于宋宋公與之宴飲酒樂宋公使昭子右坐右相泣樂祁佐退而告人曰今兹君與叔孫其皆死乎吾聞之哀樂而樂哀皆䘮心也何以能乆又曰宋公子地有白馬四公嬖向魋魋欲之公取而朱其尾鬛以與之地怒使其徒奪之魋懼將走公閉門而泣之目盡腫國語曰叔向見司馬侯之子撫之而泣曰自其父死也吾蔑與比而事君也昔者其父始之我終之我始之夫子終之史記曰荆軻與髙漸離飲於燕市酒酣漸離擊筑軻和而歌之於市中相樂巳而相泣傍􅀂無人又曰戚􅁎愛幸生趙王如意甞從髙祖於關東日夜啼泣欲立如意爲太子又曰竇皇后兄長君弟曰竇廣國字少君年五歳時家貧爲人所略賣之長安聞皇后新立廣國上書自陳后言之文帝召見具言其故於是后持之而涕泣交撗下侍御左右皆伏地泣助皇后悲哀又曰漢髙帝欲自擊陳狶蒯成侯周􅔗泣曰始滅􅁗定天下未甞自行是爲無人可使者乎漢書曰上朝東宫趙談叅乗􅀽盎伏車前曰聞天子所共六尺輿皆天下豪英今漢雖乏人陛下獨柰何與刀鋸之餘載於是上遣下談泣下車又曰李陵與蘇武別置酒起舞歌曰萬里兮度沙漠爲君將兮􅁬匈奴路窮絶兮矢刃摧士衆滅兮名巳頺老母巳死雖欲報恩將安歸陵泣下數行因與武决又曰髙祖破黥布軍還過沛置酒沛宫酒酣上慷􅁣傷懷泣下數行東觀漢記曰更始害齊武王光武飲食語􅀏如平常獨居輙不衘酒肉枕席有涕泣處又曰來歙與盖延攻公孫述將王元破之蜀人大懼使刺歙歙未死馳告盖延延見歙伏悲不能仰視歙叱曰故呼卿欲屬以軍事而返効兒女子泣涕乎延収淚強起受所誡歙自書表投筆抽刃而死又曰章帝東廵狩祠㤗山還幸東平王宫涕泣沾􅁭楚漢春秋曰惠帝崩吕太后欲爲髙墳使從未央宫坐而見之諸將諌不許東陽侯垂泣曰陛下日夜見惠帝塚悲哀流涕無己是傷生也臣􅀼哀之於是太后乃止呉志曰孟宗爲驃􅀐朱據軍吏將母在營旣不得志又夜雨屋漏因起涕泣以謝母母曰但當自勉之何足泣也晉書曰羊祜卒南州人罷市}
