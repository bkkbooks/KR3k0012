  - {type: variant, offset: 1484, length: 234, content: 常置琴於靈座吳郡張翰哭之慟既而上床鼓琴數曲撫琴而歎曰顧彥先復能賞此不因又慟哭不弔喪主而去又曰顧愷之桓溫引為大司馬參軍甚見親昵溫薨後愷之拜溫墓賦詩云山崩溟海竭魚鳥將何依或問之曰卿重桓公乃爾哭狀其可見乎荅曰聲如振雷破山淚如傾河注海又曰阮籍居喪骨立幾致滅性裴楷往弔之籍散髮箕踞醉而直視楷弔哭畢便去或問楷凡弔者主哭客乃為禮籍既不哭君何為哭楷曰阮方外之士故不崇禮典我俗中之士故以軌儀自居又曰秦秀性忌讒佞疾之如讎素輕鄙賈充及伐吳之役聞其為大都督謂所親曰充文案小才乃居伐國大任吾將哭, WYG: 皆白衣冠}
