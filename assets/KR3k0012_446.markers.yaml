  - {type: variant, offset: 116, length: 0, content: '', SBCK: 准曰喬當及卿髦少减也又使詣廣廣性清淳愛髦有神撿謂准曰喬自及卿然髦亦清出准歎曰我二兒之優劣乃裴樂之優劣也論者以爲喬雖有髙韻而神檢不足樂爲得之矣又曰劉頌守廷尉時尚書令史扈寅非罪下獄詔使考竟頌執據無罪寅遂得免時人以頌比張釋之乎又曰和嶠遷頴川太守爲政清簡甚得百姓懽心太􅀓從事中朗廋敳見而歎曰嶠森森如千丈松雖磥砢多節目施之大厦有棟梁之用又曰郗鑒傳云王敦嘗謂曰樂彦輔短才耳後生流宕言違名檢考之以實豈勝武秋耶鑒曰擬人必於其倫彦輔道韻平淡體識冲粹處傾危之朝不可得而親踈及愍懷太}
