  - {type: variant, offset: 1695, length: 350, content: 輔仁義之俗所謂不扶自直不鏤自雕至於稺者爰自江南卑薄之城而角立傑出宜當為先袁山松後漢書曰王允字子師太原人世仕州郡郭林宗嘗見允而奇之曰王生一日千里王佐才也遂與友善允至司徒范曄後漢書曰許劭嘗到潁川多長者之遊唯不詣陳蕃蕃喪妻還葬鄉人畢至而劭獨不往或問其故劭曰太丘道廣廣則難周仲舉性峻峻則少通故不造其多所裁量若此曹操微時常卑辭厚禮求為己助劭鄙其為人而不肯對操乃伺隙脅劭不得已曰君清平之奸賊亂世之英雄操大悅而劭與從兄靖俱有高名好共覈論鄉黨人物每月更其品題故汝南俗有月旦評焉魏志曰盧欽著書稱徐邈曰徐公志高行潔才綽氣猛聖人以清為難而徐公之所易也或問欽徐公當武帝之時為通自在涼州及還京都人以為介何也欽荅曰往者毛孝先崔季珪用事貴清素之士徐公不改其常故人以為通比來天下奢靡轉相放效而徐公雅尚自若不與俗同故前日之通乃今日之介, SBCK: 反}
