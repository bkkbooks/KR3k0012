  - {type: variant, offset: 114, length: 0, content: '', SBCK: 嵇紹始入或謂王戎曰昨於稠人中始見􅄞紹昂昂然􅀂野鶴之在雞羣戎曰君復未見其父耳又曰王戎㓜而頴悟神彩秀徹視日不昡裴楷見而目之曰戎眼爛爛如巖下電又曰張翰有清才善屬文而縱任不拘時人號爲江東歩兵又曰劉毅轉司頴校尉紏正豪右京師肅然司部守令望風投印綬者甚衆時人以毅方之諸葛豐蓋寛饒又曰樂廣少與􅀪農􅀭准相善准之二}
