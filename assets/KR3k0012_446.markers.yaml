  - {type: variant, offset: 495, length: 1, content: 得, SBCK: 君之逺易牙竪刀常之巫衛公子啓方也公曰昜牙烹其子以慊寡人慊快也猶尚可疑邪管仲對曰人之情非不愛其子子之忍將何有於君公又曰竪刀自害以近寡人猶尚可疑耶管仲對曰人之情非不愛其身其身之忍又將何有於君公又曰常之巫審於死生能去病病猶尚可疑耶管仲對曰死生命也痾病夲也君不用其命守其本而待常之巫彼將以此無不爲也公又曰衛公子啓方事寡人十五年其父死不敢歸􅂘猶尚可疑耶管仲對曰人之情無不愛其父父之忍將何有於君公曰諾管仲死盡逐之食不甘官不治病不起朝不肅居三年公曰仲父不亦過乎復召而反之}
  - {type: page-break, offset: 495, content: '', id: KR3k0012_SBCK_446-7b}
  - {type: variant, offset: 495, length: 1, content: 得, WYG: 君之逺易牙竪刁常之巫衛公子啓方也公曰易牙烹其子以慊寡人慊快也猶尚可疑邪􅃹仲對曰人之情非不愛其子子之忍將何有於君公又曰竪刁自害以近寡人猶尚可疑耶􅃹仲對曰人之情非不愛其身其身之忍又將何有於君公又曰常之巫審於死生能去痾病猶尚可疑耶􅃹仲對曰死生命也痾病本也君不用其命守其本而待常之巫彼將以此無不爲也公又曰衛公子啓方事寡人十五年其父死不敢歸哭猶尚可疑耶􅃹仲對曰人之情無不愛其父父之忍將何有於君公曰諾􅃹仲死盡逐之食不甘官不治病不起朝不肅居三年公曰仲父不亦過乎復召而反之}
