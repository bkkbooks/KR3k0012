  - {type: variant, offset: 116, length: 0, content: '', WYG: 凖曰喬當及卿髦少減也又使詣廣廣性清淳愛髦有神檢謂凖曰喬自及卿然髦亦清出凖歎曰我二兒之優劣乃裴樂之優劣也論者以為喬雖有高韻而神檢不足樂為得之也矣又曰劉頌守廷尉時尚書令史扈寅非罪下獄詔使考竟頌執據無罪扈寅遂得免時人以頌比張釋之又曰和嶠遷穎川太守為政清簡甚得百姓懽心太𫝊從事中郎庾敱見而嘆曰嶠森森如千丈松雖磥砢多節目施之大厦有棟梁之用又曰郄鑒𫝊云王敦甞謂曰樂彦輔短才而後生流宕言違名檢考之以實豈勝武秋耶鑒曰擬人必於其倫彦輔道韻平淡體識冲粹處傾危之朝不可得而親疎及愍懷太}
