  - {type: variant, offset: 484, length: 9, content: 孔子北遊農山顏回侍, SBCK: 馮定字介夫􅀫之弟也儀貌壯偉與􅀫俱有文學而定過之貞元中皆舉進士時人比之漢朝二馮君呂氏春秋曰管仲有病桓公徃問之曰仲父之病病矣將何以敎寡人管仲對}
  - {type: variant, offset: 484, length: 9, content: 孔子北遊農山顏回侍, WYG: 馮定字介夫宿之弟也儀貌壯偉與宿俱有文學而定過之貞元中皆舉進士時人比之漢朝二馮君吕氏春秋曰􅃹仲有病桓公往問之曰仲父之病深矣將何以教寡人􅃹仲對}
