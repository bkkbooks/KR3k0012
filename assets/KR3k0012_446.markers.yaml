  - {type: variant, offset: 117, length: 1, content: 產, WYG: 之廢柔而有正武秋失節之士何可同日而言敦曰愍懷廢徙之際交有危機之急又何能以死守之乎以此相方其不減明矣鑒曰丈夫既潔身北面豈可偷生屈節靦顔天壤耶又曰孫登𫝊云嵇康從之遊三年問其所圗終不荅康每歎息將别謂曰先生竟无言乎登乃曰子識火乎火生而有光而不用其光果在於用光人生而有才不用其才而果在於用才用光在乎得薪所以保其曜用才在於識真所以全其年今子才多識寡難乎免於今之世去矣子无求乎康不能用果遭非命又曰王湛𫝊云武帝亦以湛為癡每見濟輙調之曰卿家癡叔死未濟常无以荅及是帝又問如初濟曰臣叔殊不癡因稱其美帝曰誰比濟曰山濤以下魏舒以上時人謂湛上方山濤不足下比魏舒有餘湛聞曰欲處我季孟之間乎又曰陸機天才秀逸辭藻𢎞麗張華常謂之曰人常恨才而子更患其多又曰陸雲刺史周浚召為從事謂人曰陸士龍當今顔子也又曰王衍雋秀有令望希心𤣥逺未甞語利王敦過江常稱之曰夷甫處衆中如珠玉在瓦石間顧愷之作畫贊亦稱衍岩岩清峙壁立千􅌇又曰杜乂性純和美姿容有盛名於江左王羲之見而目之曰膚若凝脂眼如㸃漆此神仙中人也桓彛亦曰衛玠神清杜乂形清又曰郭文傳云温嶠嘗稱曰文有賢人之性而無賢人之才柳下惠何琦之亞乎又曰羅含謝尚與含爲方外之好乃稱曰羅君章可謂湘中之琳琅又曰羅含桓温嘗與寮屬讌㑹含後至温問衆座曰此何如人或曰可謂荆楚之把梓桓曰此自是江左之秀豈唯荆楚而已又曰薛兼少與同郡紀瞻廣陵閔鴻吳郡頋榮㑹稽賀循齊名號爲五儁初入洛司空張華見而竒之曰皆南金也又曰郄超傳云沙門支遁以清淡著名于時風流勝貴莫不崇敬以爲造微之功足參諸正始而遁常重超以爲一時之雋又曰郄超爲桓温參軍謝安與王坦之常詣温論事温令超帳中卧聽之風動帳開安笑曰郄生可謂入幕之賔矣又曰周顗傳曰庾亮嘗謂顗曰諸人咸以君方樂廣顗曰何乃刻畫無鹽唐突西施也又曰應詹弱冠知名性質素𢎞雅雖犯而弗之校以學藝文章稱司徒何邵見之曰君子哉若人又曰桓温豪爽有風槩姿貌甚偉面有七星少與沛國劉惔善常稱之曰温眼如紫石稜鬢作蝟毛􅀈孫仲謀晉宣王之流亞也又曰劉惔寓居京口家貧織芒屨以爲飬雖蓽門陋巷宴如也人未之識唯王導深器之後稍知名論者比之袁羊惔喜還告其母其母聪明婦人也謂之曰此非汝比勿受之又有方之范汪者惔復喜母又不聽及惔年德轉昇論者遂比之荀粲又曰荀松弱冠太原王濟甚相器重以方其外祖陳羣袁侃謂侃弟奥曰近見荀監子清虛名理當不及父德性純粹是賢兄軰人也又曰成公簡字宗舒東郡人也世二千石性清素不求榮利潜心味道罔有干其志者黙識過人張茂先每言公簡清静比揚子雲黙識擬張安世又曰謝安總角神識沉敏風宇修暢善行書弱冠詣王濛清言良乆既去濛子修曰向客何如大人濛曰此客亹亹而來逼人王導亦深器之由是有重名又曰謝萬善屬文叙漁父屈原季王賈誼楚老龔勝孫登嵇康四隐四顯爲八賢論其㫖以處者爲優出者爲劣以示孫綽綽與往反以體公識逺者則出處同歸又曰韓康伯傳云庾􅛱名重一時少所推服常稱康伯及王坦之曰思理倫和我敬韓康伯志力疆正吾愧王文度又曰王獻之嘗與兄徽之俱詣謝安徽之多言俗事獻之寒温而已既出客問安王氏兄弟優劣安曰小者佳客問其故安曰吉人之辭寡又曰禇裒與杜乂俱有盛名冠于中興譙國桓彛見而目之曰季冶有皮裏春秋言其外無臧否而内有所褒貶也又曰王恭美姿儀人多愛悦或目云濯濯如春月柳嘗被鶴氅裘渉雪而行孟昶窺見之歎曰此真神仙中人也又曰王恭字孝伯少有美譽清辯過人自負才地髙華恒有宰輔之望與王忱齊名友善慕劉惔之爲人謝安常曰王恭人地可以爲將相宋書曰謝𢎞㣲叔父混特所敬貴號爲㣲子常云何逺持操負氣阿容愽而無檢曜恃才而持操不篤晦自知而納善不周設復功濟三才終亦以此爲恨至如㣲子吾無間然又曰㣲子異不傷物同不害正若年造六十必至公輔又曰龔祈不應徵辟風姿端雅容止可觀中書郎范述見而嘆曰此荆楚仙人也蕭子顯齊書曰王孫祐父逺爲光禄勲宋世爲之語曰王逺如屏風屈曲能蔽風露陳書周𢎞正叔父捨每與談論輙異之曰觀汝神情頴悟清理警發後世知名當出吾右又曰髙祖在京城嘗與諸將讌桓僧明周文育侯安都爲壽各稱功伐髙祖曰卿等悉良將也然而並有所短桓公志大而識闇狎下而驕尊矜功不收其拙周侯交不擇人而推心過差居危履險猜防不設侯郎慠誕而無厭輕佻而肆志並非全身之道后卒皆如其言隋書曰元諧以髙熲有宰相之具嘗言於上曰楊素麄踈蘇威怯愞元胄元旻正似鴨耳可以付社稷者唯獨髙熲又曰蘇威治書侍御史梁毗以威領五職安繁戀劇無舉賢自代之心抗表劾威上曰蘇威朝夕孜孜志存逺大舉賢有闕何遽迫之顧謂威曰用之則行舍之則藏唯我與爾有是夫因謂朝臣曰蘇威不值我無以措其言我不得蘇威何以行其道楊素才辯無雙至若斟酌古今助我宣化非威之匹也蘇威若逢亂世商山四晧豈易屈哉又曰楊逹爲人𢎞厚有局度楊素每言曰}
