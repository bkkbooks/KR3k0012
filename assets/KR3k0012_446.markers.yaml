  - {type: variant, offset: 497, length: 1, content: 王, SBCK: 年公有病常之巫從中曰公將以某日薨昜牙竪刀相與作乱公令衛公子啓方以書社四十人衛公􅁣焉歎涕曰管子}
  - {type: variant, offset: 497, length: 1, content: 王, WYG: 年公有病常之巫從中曰公將以某日薨易牙竪刁相與作亂公令衛公子啓方以書社四十人入衛公慨焉歎涕曰􅃹仲}
  - {type: variant, offset: 497, length: 1, content: 王, krp: 年公有病常之巫從中曰公將以某日薨昜牙竪刀相與作乱公令衛公子啓方以書社四十人衛公慨焉歎涕曰管子}
  - {type: variant, offset: 499, length: 1, content: 主, SBCK: 人之所見豈不逺哉􅀂死者有知我何面目以見仲父乎蒙衣􅃑}
  - {type: variant, offset: 499, length: 0, content: '', WYG: 人之所見豈不逺哉若死者有知我何面目以見仲父乎蒙衣袂而死絶于壽宫又曰吳起謂商文曰事君果有命矣商文曰何謂也吳起曰治四境之内成訓教變習俗使君臣有義父子有序子與我孰賢商文曰吾不若子曰今日置質爲臣其}
  - {type: page-break, offset: 499, content: '', id: KR3k0012_WYG_446-12b, image: WYG0897/WYG0897-0107d.png}
  - {type: variant, offset: 499, length: 1, content: 主, krp: 人之所見豈不逺哉若死者有知我何面目以見仲父乎蒙衣𬒮}
  - {type: variant, offset: 500, length: 0, content: '', WYG: 安重今日釋璽辭官其主安輕子與我孰賢商文曰吾不若子曰援桴一鼔敵人在前使三軍之士樂死若生子與我孰賢商文曰吾不若子吳起曰三者子皆不吾若也位在吾上命矣夫商文曰善子問我常我亦問子變世主少羣臣相疑黔首不定當此之時屬之我乎屬之子乎吳起黙然不對少間曰然商文曰是吾所以加於子之上也崔鴻前京録曰張茂謂馬岌曰劉曜自古可方誰等軰也岌謂曰曹孟徳之流茂黙然岌曰孟德公族也劉曜戎狄難易不同曜殆過之茂曰曜可方吕布闗公}
  - {type: page-break, offset: 500, content: '', id: KR3k0012_WYG_446-13a, image: WYG0897/WYG0897-0108a.png}
  - {type: variant, offset: 501, length: 2, content: 輔相, SBCK: 死絶于壽宫又曰呉起謂啇文曰事君果有命矣啇文曰何謂也呉起曰治四境}
