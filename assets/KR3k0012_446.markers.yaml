  - {type: variant, offset: 2553, length: 650, content: 同少康功德雖美至如高祖臣等以為優帝曰未必創業者皆優紹繼者咸劣少康中宗中興之美論德覈實諸漢祖吾見其優未聞其劣少康生於滅亡之後降為諸侯能布其德而兆其謀卒滅過戈復禹之績非至德豈能濟斯漢祖因土崩之勢專任智力為人子則數危其親為人君則囚擊賢相為人父則不能衛其子身沒之後社稷幾傾若與少康易時而處或未能復大禹之績推此言之宜高夏康而下漢祖矣帝又曰夫太上立德其次立功漢祖功高未若少康武烈之威豈必降於漢祖哉但夏書淪亡舊文殘缺故勳美闕而罔載向令墳典俱存行事詳備亦豈有異同之論哉於是群臣咸悅服也又曰胡綜論吳朝俊士英才卓越超踰倫疋則諸葛恪清識知機達究幽微則顧譚淑辯宏達言能釋結則謝景究學甄微游夏同科則范慎羊道恪才而踈譚精而俱景辯而校後恪譚果以強吳人論綜言而有徵蜀志曰大鴻臚張征作默記諸葛亮與司馬宣王書曰漢朝傾覆天下分崩豪傑之士竟希神器魏氏跨中土劉氏據益州並稱兵海內為世霸王諸葛司馬二相遭值際會託身盟主或收功於蜀漢或聞名於伊洛丕備既沒後嗣即統各受保阿之任輔翼幼主亦一國之守臣霸王之賢佐也歷前世以觀近事二相優劣可得而詳也孔明起巴蜀之地蹈一州之士方之大國其戰士人民蓋有九分之一也提步卒數萬長驅祁山慨然有飲馬河雒之志仲達據天下十倍之地仗兼并之眾據牢城擁精銳無擒敵之意務自保而已使彼孔明若此而不亡則涼雍不解甲中國不解鞍勝負之策亦決矣方之司馬不亦優乎吳志曰孫權與陸遜論周瑜魯肅及呂蒙曰公瑾雄烈膽略兼人遂破孟德開拓荊州邈焉難繼君今繼之子敬東來孤與宴語便及大略帝王之策一決也後孟德率數十萬眾水步俱下孤請諸將問其所宜子布文表俱言而遣迎之子敬即駮言, SBCK: 濁}
