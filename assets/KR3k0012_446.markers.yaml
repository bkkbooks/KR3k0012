  - {type: variant, offset: 3329, length: 1423, content: 也急論議則傷人爭名勢則敗友重朋黨則蔽主務欲速則失德此四者不除未有能全者也當世君子能不然者亦比有之豈獨古人乎然論其絕異未若顧豫章諸葛使君步丞相嚴衛尉張奮威之為美也論語言夫子恂恂然善誘人又曰成人之美不成人之惡豫章有之矣望之儼然即之也溫聽其言也厲使君體之矣恭而不猛丞相嚴履之矣學不求祿心無茍得衛尉奮威蹈之矣此吾君雖德實有差輕重不同至於趨舍大檢不犯四者俱一揆也昔丁謂出於孤家吳粲由於牧豎豫章楊其美以並隆全之列是以人無幽滯而風俗厚焉使君丞相衛尉三君昔以布衣俱相友善論者因名敘其優劣初先衛尉次丞相而後使君也其後並事明主經營世務出處之才儀有不同先後之名須反其初比世常人所決懃也至於三君分好卒無虧損豈非古哉又魯橫江昔仗萬兵屯據陸口當世之美業也能與不能孰不願焉而橫江既亡衛尉應其選自以才非將帥深辭固讓終於不就後徙九列遷典八座榮不足以自奉至於二君皆位為上將窮富極貴衛尉既無求欲二君又不稱薦各守所志保其名好孔子曰君子矜而不爭群而不黨斯有風矣又奮威之名亦三君之次也當一方之戍受上將之任與使君丞相不異也然歷國事論功勞實有先後故爵位之榮殊焉而奮威將處此決能明其部分心無失道之欲事無充詘之求每升朝堂循禮而動辭氣蹇蹇罔不惟忠叔嗣雖親貴言憂其敗蔡文雖疏賤談稱其賢女配太子受禮若弔慷慨之趨唯篤人物成敗得失皆如所慮可謂守道見機好古之士也若乃經國家當軍旅於馳騖之際立霸王之功此五君者未為過人至其純粹履道求不茍得升降當世保全名行邈然絕俗實有所師故粗論其事以示後之君子又曰薛瑩王蕃器量綽異弘博多通樓玄清白節操文理條暢賀邵厲行貞潔機理清要韋曜篤學好古博見群籍有記述之才胡冲以為玄邵蕃一時清妙略無優劣必不得已玄宜在先邵當次之華覈詩賦之才有過於曜典誥不及也王隱晉書曰河南郭象著文稱嵇紹父死在非罪曾無耿介貪位死闇主義不足多曾以問郄公曰王襃之父亦非罪死襃猶辭徵紹不辭用誰為多少郄公曰王勝於嵇或曰魏晉所殺子皆仕官何以無非也荅曰殛鯀興禹禹不辭興者以鯀犯罪也若以時君所殺為當耶則同於禹以不當耶則同於嵇又曰世皆以嵇見危授命荅曰紀信代漢高之死可謂見危授命如嵇偏善其一可也以備體論之則未得也又曰顧榮謂中宗曰陸士元貞正清貴金相玉質甘季思忠款誠盡加以膽幹殊快殷慶元質略有明規文武可用榮族兄公讓明亮守節困不易操會楊彥明謝行言皆服膺儒教足為民望賀生沉潛青雲之士陶恭兄弟才力雖少實事極佳凡此諸人皆南金也中宗納之又曰衛玠妻父樂廣有海內重名議者以為婦公冰清女壻玉潤又曰裴憲字景思陳郡謝鯤潁川庾鼓皆俊朗士也見而奇之相謂曰裴憲鯁亮宏達通機識命不知其何如父然至於深弘保素不以世物嬰心者其殆過之又曰裴楷嘗目夏侯玄云肅肅如入宗廟中但見禮樂器鍾會如觀武庫森森迫見矛戟在前傅嘏汪翔靡所不見山濤若登山臨下幽然深遠又曰杜預在內七年損益萬機不可勝數朝野稱美號曰杜武庫言其無所不有也又杜預傳云時王濟解相馬又甚愛之而和嶠頗聚歛預常稱濟有馬癖嶠有錢癖武帝聞之謂預曰卿有何癖對曰臣有左傳癖又曰裴楷風神高邁容儀俊爽博涉群書特精理義時人謂之玉人又曰見裴叔則如近玉山暎照于人也又裴楷傳云吏部郎缺文帝問其人於鍾會會曰裴楷清通王戎簡要皆其選也又曰阮裕除東陽太守尋徵侍中不就還剡山有肥遁之志有以問王羲之羲之曰此公近不驚寵辱雖古之沉冥何以過此時人云裕骨氣不如逸少簡秀不如真長韶潤不如仲祖思致不如殷浩而兼有諸人之美又曰謝安義在輔導雖會稽王道子亦賴弼諧之益時彊敵寇境邊書續至梁益不守樊鄧陷沒安每鎮以和靖御以長筭德政既行文武用命不存小察弘以大綱威懷外著人皆比之王導而文雅過之, SBCK: 十六}
