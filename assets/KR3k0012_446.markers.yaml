  - {type: variant, offset: 1340, length: 0, content: '', SBCK: 子􅀄逺矣􅀂提桴鼓㑹於軍門使百姓喜勇當與議之可陳武别傳曰武時人無察者頓丘閭遐薦之於軍府或問武當今可與誰爲輩遐曰方謝道堅不足比徐丗璋有餘道堅丗璋皆同時知名士也武聞之􅀏曰乃處我季孟之間乎衛玠别傳曰永和中舟陽尹劉眞長鎮西將軍謝仁祖啇略中朝士人遂及於玠或問杜􅀪治得方衛洗馬不謝曰安得相比其間可容數人丗􅀃曰􅄞中散語趙景眞卿瞳子白黒分明有白起之風限量小狹趙荅曰尺表能審琁衡之度寸管能測徃復之晷何必在大伹問識何如耳又曰諸名士共洛水上戯還樂令問王夷甫曰今日共㸔樂不王曰裴僕射善談名理混有雅具}
