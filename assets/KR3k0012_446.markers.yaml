  - {type: variant, offset: 116, length: 0, content: '', krp: 准曰喬當及卿髦少减也又使詣廣廣性清淳愛髦有神撿謂准曰喬自及卿然髦亦清出准歎曰我二兒之優劣乃裴樂之優劣也論者以爲喬雖有髙韻而神檢不足樂爲得之矣又曰劉頌守廷尉時尚書令史扈寅非罪下獄詔使考竟頌執據無罪寅遂得免時人以頌比張釋之乎又曰和嶠遷頴川太守爲政清簡甚得百姓懽心太傳從事中朗廋敳見而歎曰嶠森森如千丈松雖磥砢多節目施之大厦有棟梁之用又曰郗鑒傳云王敦嘗謂曰樂彦輔短才耳後生流宕言違名檢考之以實豈勝武秋耶鑒曰擬人必於其倫彦輔道韻平淡體識冲粹處傾危之朝不可得而親踈及愍懷太}
  - {type: variant, offset: 117, length: 1, content: 產, SBCK: 之廢柔而有正武秋失節之士何可同日而言敦曰愍懷廢徙之際交有危機之急人何能以死守之乎以此相方其不减明矣又曰孫登傳云􅄞康從之遊三年問其所圖終不荅康毎歎息將别謂曰先生竟無言乎登乃曰子識火乎火生而有光而不用其光果在於用光人生而有才不用其才而果在於用才故用光在乎得薪所以保其曜用才在於識眞所以全其年今子才多識寡難乎免於今之丗去矣子無求手康不能用果遭非命又曰王湛傳云武帝亦以湛爲癡毎見濟輙調之曰卿家癡叔死未濟常無以荅及是帝又問如􅀄濟曰臣叔殊不癡因稱其羙帝曰誰比濟曰山濤以下魏舒以上時人謂湛上方山濤不足下比魏舒有餘湛聞曰欲處我季孟之間乎又曰陸機天才秀逸辭藻宏麗張華嘗謂之曰人常恨才少而子更患其多又曰陸雲刺史周浚召爲從事謂人曰陸士龍當今顔子也又曰王衍雋秀有令望虚心􅀇逺未嘗語利王敦過江常稱之曰夷甫處衆中如珠玉在瓦石間顧愷之作􅀞賛亦稱衍巖巖清峙壁立千仭又曰杜乂性純和羙姿容有盛名於江左王羲之見而目之曰膚􅀂凝脂眼如􅀧􅃮此神仙中人也桓彛亦曰衛玠神清杜乂形清又曰郭文傳温嶠嘗稱曰文有賢人之性而無賢人之才柳下惠梁􅄾之亞乎又曰羅含謝尚與含爲方外之好乃稱曰羅君章可謂湘中之琳琅又曰羅含桓温嘗與寮屬讌㑹含後至温問衆座曰此何如人或曰可謂荆楚之􅂎梓桓曰此自江左之秀豈唯荆楚而巳又曰薛兼少與同郡紀瞻廣陵閔鴻呉郡顧榮㑹稽賀循齊名號爲五儁􅀄入洛司空張華見而竒之曰皆南金也又曰郄超傳云沙門支遁以清談著名于時風流勝貴莫不崇敬以爲造微之功足參諸正始而遁常重超以爲一時之儁又曰郄超爲桓温參軍謝安與王坦之常詣温論事温令超帳中卧聽之風動帳開安􅀏曰郄生可謂入幕之賔矣又曰周顗傳曰􅁃亮嘗謂顗曰諸人咸以君方樂廣顗曰何乃刻􅀞無鹽唐突西施也又曰應詹弱冠知名性質素􅀪雅雖犯而弗之校以學藝文章稱司徒何邵見之曰君子哉􅀂人又曰桓温豪爽有風槩姿貌甚偉面有七星少與沛國劉惔善帝稱之曰温眼如紫石稜􅁂作蝟毛磔張格孫仲謀晉宣王之流亞也又曰劉惔寓居京口家貧織芒履以爲養雖蓽門陋巷晏如也人未之識唯王導􅀷器之後稍知名論者比之􅀽羊惔憙還吿其母其母聦明婦人也謂之曰此非汝比勿受之又有方之范汪者惔復憙母又不聽及惔年德轉昇論者遂比之荀粲又曰荀崧弱冠太原王濟甚相器重以方其外祖陳郡􅀽偘謂偘弟奥曰近見荀監子清虚名理當不及父德性純粹是賢兄軰人也又曰成公簡字宗舒東郡人也丗二千石性清素不求榮利潛心味道罔有干其志者黙識過人張茂先毎言公簡清静比楊子雲黙識擬張安丗又曰謝安揔角神識沉敏風宇脩暢善行書弱冠詣王濛清言良乆旣去濛子脩曰向客何如大人濛曰此亹亹而來逼人王導亦􅀷器之由是有重名又曰謝萬善屬文叙漁父屈原季王賈􅁩楚老龔勝孫登􅄞康四隱四顯爲八賢論其旨以處者爲優出者爲劣以示孫綽綽與徃反以體公識逺者則出處同歸又曰韓康伯傳云􅁃龢名重一時少所推服常稱康伯及王坦之曰思理倫和我敬韓康伯志力彊正吾愧王文度又曰王獻之嘗與兄徽之俱詣謝安徽之多言俗事獻之寒温而巳旣出客問安王氏兄弟優劣安曰小者佳客問其故安曰吉人之辭寡又曰禇裒與杜乂俱有盛名冠于中興譙國桓彛見而目之曰季冶有皮裏陽秋言其外無臧否而內有所褒貶也又曰王恭羙姿儀人多愛恱或目云濯濯如春月柳甞􅀍鶴氅裘渉雪而行孟永窺見之歎曰此真神仙中人也又曰王恭字孝伯少有羙譽清辯過人自􅀒才地髙華􅁪有宰輔之望與王忱齊名友善慕劉惔之爲人謝安常曰王恭才地可以爲將相宋書曰謝􅀪微叔父混特所敬貴號爲微子常云何逺剛躁􅀒氣阿容􅀶而無檢曜恃才而持操不篤晦自知而納善不周設復功濟三才終亦以此爲恨至如微子吾無間然又云微子異不傷物同不害正􅀂年造六十必至公輔又曰龔祈不應徴辟祈風姿端雅容止可觀中書郎范述見而歎曰此荆楚仙人也蕭子顯齊書曰王僧祐父逺爲光禄勲宋丗爲之語曰王逺如屏風屈曲能蔽風露陳書周􅀪正叔父捨毎與談論輙異之日觀汝神情頴晤清理警發後丗知名當出吾右又曰髙祖在京城嘗與諸將讌杜僧明周文育侯安都爲壽各稱功伐髙祖曰卿等悉良將也然而並有所短杜公志大而識闇狎下而嬌尊矜功不収其拙周侯交不擇人而推心過差居危履險猜防不設侯郎慠誕而無猒輕佻而肆志並非全身之道耳卒皆如其言隋書曰元善以髙頴有宰相之具嘗言於上曰楊素麤踈蘇威怯愞元胃元旻正似鴨耳可以付社稷者唯獨髙頴又曰蘇威治書侍御史梁毗以威領五職安繁戀劇無舉賢自代之心抗表劾威上曰蘇威朝夕孜孜志有逺大舉賢不闕何遽迫之顧謂威曰用之則行舎之則藏唯我與爾有是夫因謂朝臣曰蘇威不值我無以措其言我不得蘇威何以行其道楊素才辯無􅀟至􅀂斟酌古今助我宣化非威之匹也􅂫威􅀂逢乱丗南山四皓豈易屈哉又曰楊逹爲人􅀪厚有局度楊素毎言曰}
