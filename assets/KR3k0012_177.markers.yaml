  - {type: variant, offset: 952, length: 692, content: 每年刺史三月上旬於此泉起曲水流杯堂引泉水為祓禊之所臨時構造事竟毀除其流杯堂本在壘城西郡國誌王屋縣有孔子學堂西南七里有石室臨大河水勢湍急五里之間寂無水聲如似聽義又曰齊桓公宮城西門外有講堂齊宣王立此學也故稱為稷下學莒子如齊盟于稷門此也宋永初山川古今記永康縣縉雲堂黃帝練丹處又曰費北有積弩堂益州記文翁學堂在城南羊頭山記太學堂洛陽南開陽門外長十丈廣三丈堂前石經四部本碑凡四十八枚西尚書周易公羊十六碑南禮記五碑東論語三碑有諫議大夫馬日磾碑議郎蔡邕銘又曰聖壽堂石虎造玉佩八百大小鏡二萬枚丁香末為泥油瓦四面垂金鈴一萬枚去鄴三十里聞響十洲記曰崑崙山有光碧之堂西王母所居郡國志雞陂之側即春申君子假居之殿也後太守居之以數失火故塗以雌黃遂名黃堂說苑曰聖人之於天下譬如一堂之上也今有滿堂飲酒者一人獨纍然向隅而泣則一堂之人皆不樂矣管子曰堂上遠於百里門廷遠於萬里今步者一日百里之情通堂上有事十日而君不聞步者十日千里之情通堂下有事一月而君不聞步者百日萬里之情通門庭有事朞年而君不聞此謂遠於萬里也漢武內傳曰上元夫人言西王母有六甲之術用之可以遊景雲之宮登流霞之堂漢武故事曰玉堂去地十二丈基階皆用玉東京賦金華玉堂白虎麒麟潘尼詩曰鸞鳳棲堂廡不若翔廖廓文選天台山賦玉堂蔭暎乎高隅楚辭曰魚鱗屋兮龍堂古詩云黃金為君門白玉為君堂庭中生桂樹華燈何煌煌堂皇附漢書曰坐堂皇上室而無四壁曰皇也廣雅曰堂皇合殿也洛陽記曰洛陽宮有桃間堂皇杏間堂皇杏間堂皇竹間堂皇李間堂皇魚梁堂皇醴泉堂皇百戲堂皇晉宮闕名曰洛陽宮有水碓堂皇擇果堂皇陸機四言詩序曰太子宴朝士於宣猷堂皇遂命機賦詩樓爾雅曰狹而脩曲日樓說文曰樓重屋也樔澤中守草樓也釋名曰樓有戶牖諸孔婁婁然, WYG: 臺}
