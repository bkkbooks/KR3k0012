  - {type: variant, offset: 2470, length: 4, content: 坐候樓樓, WYG: 白茅焉栢常騫夜用事明日問公曰今昔聞梟聲乎公曰一鳴而不復聞使人往視之梟當陛布翼伏地而死家語曰楚王將遊荆臺司馬子期諫王怒令尹子西駕於殿下曰今荆臺之觀不可失也王喜子西}
