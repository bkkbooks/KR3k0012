  - {type: variant, offset: 53, length: 0, content: '', SBCK: 千餘人資給衆費一岀私禄并取郡四姓子弟皆充學生課讀五經又起學臺功用弥廣又曰凉張茂築靈釣臺周輪八十餘堵其髙九仞武陵人閻魯夜叩門呼曰武公遣我來曰何故勞百姓築臺乎姑臧令辛巖以魯妖妄請殺之茂曰吾信勞人魯稱先君之令何謂妖乎太府主簿馬魴曰今丗難未夷唯當􅀪尚道素不冝勞役崇飾臺榭比年巳來轉覺衆務日奢於往昔所經營輕違雅度實非士女所望於明公茂曰吾過也命止作役崔鴻十六國春秋夏録曰赫連勃勃大破南凉傉檀于百井殺衆數萬以人頭爲京觀號曰髑髏臺韓子曰景公與晏子游少海登栢寢之臺望其國曰羙哉煥乎後丗將孰有之晏子曰其田氏乎曰寡人有國如田氏有之爲之奈何對曰君􅀂欲奪之則近賢逺不肖治其煩亂綏其刑罰振貧窮恤􅀌寡行惠而好儉民將歸君雖十田氏其如君何又曰越王伐吴先宣言吾聞吴王築如皇之臺掘淵泉之池罷苦百姓剪財貨以盡民力余爲民誅之幽明録曰海中有金臺出水百丈結構巧麗窮極神功横巖雲渚竦曜星河也晏子春秋曰景公起大臺歳寒役者皆凍晏子遂如臺執扑鞭其不務者曰吾細人也皆有闔廬以避燥濕寒暑今君爲一臺而不速成國人皆以晏子助君虐也晏子歸而君令罷役仲尼曰古之善爲臣者羙名歸之君災禍歸之身陸賈新語曰楚靈王作乾溪之臺立百仭之髙欲登浮雲窺天上王孫子曰昔衛靈公坐重華之臺侍御數百隨珠照曰羅衣從風仲叔御諌曰昔桀行此而滅紂用此以亡今四境内侵諸侯加兵土地日削内寵無乃太盛歟公下席再拜曰寡人過矣於是岀宫女數百人百姓大恱子貢聞之曰所謂能受諫也賈子曰翟王使使之楚楚王誇之饗于章華之臺三休乃至南雍州記曰隆中諸葛亮故宅有舊井一今涸無水盛􅀪之記云宅西有三間屋基跡極髙云是孔明避水臺先有人姓董居之滅門後無復敢有住者齊建武中有人修井得一石枕髙一尺二寸長九寸獻晉安王習鑿齒又爲宅銘今宅院見在樓觀本記曰尹喜宅南山阜上先館舎即大夫觀望之臺也昔老君於此山騰空時人因號曰老子陵盖非墳墓也故爾雅云大陸曰阜大阜曰陵此之謂矣新序曰桀作瑶臺殫百姓之財伊尹諌之桀曰吾有天下猶天之有曰日亡吾亡矣又曰魏王將欲爲中天之臺曰敢諌者死許綰入曰聞大王將爲中天之臺願加一力王曰子何力能加曰臣聞天與地相去萬五千里今王因而半之當立七千五百里髙其趾當方八千里盡王之地不足以爲臺趾古者堯舜建諸侯五千里王必願爲臺必起兵伐諸侯盡有其地猶不足又伐四夷得方八千里乃足以爲臺趾材木之積人徒之衆食廪之輸以千萬億度八千里之外當盡農畒之地足以奉給王臺具者巳備乃可作王黙然而罷又曰紂爲鹿臺十年乃成大三里髙千尺臨望雲雨故天下叛沈懷逺南越志曰熈安縣東南有圎岡髙十丈四面爲羊膓道論者曰尉佗登此望漢而朝名曰朝臺也裴淵廣州記曰尉佗築臺以朝漢室圎基千歩直峭百丈螺道登進頂上三畒朔望􅂛拜號爲朝臺戴延之西征記曰許昌城本許由所居大城東北九里有許由臺髙六丈廣三十歩長六十歩由耻聞堯讓而登此山邑人慕徳故立此臺管子曰囷倉寡而臺榭繁者藏不足以供其費臺榭相望者其上下相怨也三輔故事曰未央宫前有東山臺釣臺倉池中漸臺轉詩外傳曰趙簡子有臣曰周舎立於門下抱筆執牘從之書過簡子與之居無幾而死後與諸大夫飲於洪波之臺酒酣泣曰千羊之皮不如一狐之腋衆人之唯唯不如周舎之諤諤今舎死吾亡無日矣􅀃苑楚莊王與晉戰勝之懼諸侯之畏巳也乃築爲五仭之臺臺成而觴諸侯諸侯請約莊王曰我薄徳之人也諸侯請爲觴皆仰而曰將將之臺窅窅其謀我言而不尚諸侯伐之於是逺者來朝近者入賔又曰齊景公爲露寢之臺成而不適焉栢常騫曰爲臺甚急臺成君何爲不適焉公曰然梟昔鳴昔鳴者其聲無不爲也吾惡之甚是以不適焉栢常騫曰臣請禳而去之公曰何其對曰築新室爲置白茅焉公使爲室置白茅焉栢常騫夜用事明問公曰今昔聞梟聲乎公曰一鳴而不復聞使人徃視之梟當陛布翼伏地而死家語曰楚王將游荆臺司馬子期諌王怒令尹子西駕於殿下曰今荆臺之觀不可失也王喜子西岀從十里還引轡而止曰夫子期忠臣也若臣䛕臣也願王賞忠而誅䛕也王乃還五經異義曰天子有三臺靈臺以觀天文時臺以觀四時施化囿臺以觀鳥獸魚鼈諸侯卑不得觀天文無靈臺但有時臺囿臺歸藏夏后曰啓筮享神於晉之靈臺作璿臺山海經曰享神於大陵而上釣臺老子曰九層之臺起於累土又曰衆人熈熈如春登臺伏滔地記曰瑯瑘城東南十里有郎山即古郎瑘臺也􅁗始皇二十八年至瑯瑘大樂之留三月作瑯瑘臺臺赤􅀌山也然髙顯出於衆山之上髙五里下周二十餘里山上壘石爲臺石形如塼長八尺廣四尺厚尺半三級而上級髙三丈上級平敞二百餘歩刋石立碑紀􅁗功徳漢武帝亦登此臺吴越春秋曰楚靈王立建章華之臺與羣臣登焉王曰臺美乎伍舉曰臣聞國君服寵以爲美安民以爲樂克聽以爲聦致逺以爲明不聞土水之崇髙蟲鏤之刻􅀞金石之清音􅁝竹之悽唳以之爲美昔先莊王爲匏居之臺髙不過望國氛大不過容宴豆士不妨守備用不煩官府民不敗時務官不易朝市今君爲此臺七年國人怨焉財用盡焉年􅂖敗焉百姓煩焉諸侯忿怨卿士訕譏豈前王之所盛人君之所美者乎臣之誠愚不知所謂也靈王納之即除工去飾不遊於臺又曰范蠡於東武山起遊臺其上東南爲司馬門立増樓冠其山巔以爲靈臺起離宫於淮陽中􅀫臺在於髙平駕臺在於成丘立苑於樂野燕臺在於石室齊臺在於襟山勾踐之岀遊也休息石臺食於冷厨又曰吴王闔閭治宫室立射臺於安里華池在平昌南城宫在長樂闔閭出逰卧秋冬治於城中春夏治於姑胥之臺且食䱉山晝逰胥臺射於鷗陂馳於遊臺興樂石城又曰越得神木一􅀟大二十圍長五十尋陽爲文梓隂爲楩柟巧工施校制以規繩雕治圎轉刻削磨礱分以丹青錯􅀞文章嬰以白壁鏤以黄金􅃺􅀋龍虵文彩生光乃使大夫種獻之於吴王曰東海役臣臣􅀌勾踐使臣種敢因下吏聞於左右頼大王之力竊爲小殿有餘材再拜獻之吴王大恱子胥諌曰王勿受昔者桀爲靈臺紂起鹿臺隂陽不和寒暑不時五榖不熟自取其灾民虚國變遂取滅亡大王受之後必爲越所戮吴王不聽遂受而起姑胥之臺三年聚材五年乃成髙見二百里行歩之人道死巷􅂘不輟嗟嘻之聲民疲士苦人不聊生帝王世紀曰周􅎼王雖居}
