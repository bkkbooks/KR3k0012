  - {type: variant, offset: 2562, length: 0, content: '', WYG: 楚靈王建立章華之臺與羣臣登焉王曰臺美夫伍舉曰臣聞國君服寵以為美安民以為樂克聽以為聰致逺以為明不聞土木之崇髙彤鏤刻畫金石之清音絲竹之嘹唳以為美昔前王為匏居之臺髙不過望國氛大不過容宴豆士不妨守備用不煩官府民不敗時務官不易朝市今君為此臺七年國人怨焉財用盡焉年糓敗焉百姓煩焉諸侯忿怨卿士訕譏豈前王之所盛人君之所美者乎臣之誠愚不知所謂也靈王納之即除工去飾不遊於臺又曰}
  - {type: page-break, offset: 2562, content: '', id: KR3k0012_WYG_177-12b, image: WYG0894/WYG0894-0593b.png}
  - {type: variant, offset: 2564, length: 0, content: '', WYG: 於東武山起遊臺於上東南}
  - {type: variant, offset: 2565, length: 0, content: '', WYG: 司馬門立層樓冠其山巔以為靈臺起離宫於淮陽中宿臺在於髙平駕臺在於成丘立苑在於樂野燕臺在於石室齊臺在於襟山}
  - {type: variant, offset: 2567, length: 42, content: 立飛翼樓以象天門為兩蟉繞棟以象龍甬羊頭山記曰原城西門南角有萬歲樓俗傳飛入江常以鐵鏁維, WYG: ''}
