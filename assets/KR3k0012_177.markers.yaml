  - {type: 'tls:seg', offset: 1934, content: '', id: KR3k0012_CHANT_177-32a.4}
  - {type: variant, offset: 1935, length: 2, content: 婢綠, WYG: 罷役仲尼曰古今善為臣者美名歸之君災禍歸之身陸賈新語曰楚靈王作乾谿之臺立百仞之髙欲登浮雲窺天上王孫子曰昔衛靈公坐重華之臺侍御數百隨}
  - {type: substitution, offset: 1936, original: 綠, replacement: 緑, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-4558}}
  - {type: variant, offset: 1938, length: 3, content: 作歌舞, WYG: 照日羅衣從風仲叔圉諌曰桀行此而滅紂用此以亡今四境内侵諸侯加兵土地日削内寵無乃太盛歟公下席再拜曰寡人過矣}
  - {type: page-break, offset: 1938, content: '', id: KR3k0012_WYG_177-8a, image: WYG0894/WYG0894-0591a.png}
  - {type: variant, offset: 1942, length: 7, content: 上孫秀求綠珠不, WYG: 是出宫女數百人百姓大悦子貢聞之曰所謂能受諫者也賈子曰翟王使之楚楚王誇之饗於章華之臺三休乃至南雍州記曰隆中諸葛亮故宅有舊井一今涸無水盛宏之記云宅西有三間屋基跡極高云是孔明避暑臺先有人姓董居之滅門後無復敢有住者齊建武中有人修井}
