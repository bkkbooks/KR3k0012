  - {type: variant, offset: 2469, length: 0, content: '', WYG: 長六十步由恥聞堯讓而登此山邑人慕德故立此臺管子曰囷倉寡而臺榭繁有藏不足以供其費臺榭相望者其上下相怨也三輔故事曰未央宫前有東山臺釣臺倉池中有漸臺韓詩外傳曰趙簡子有臣曰周舍吏於門下抱筆執牘從之書過簡子與之居無幾死後與諸大夫飲於洪波之臺酒酣泣曰千羊之皮不如一狐之腋衆人之唯唯不如周舍之諤諤今舍死吾亡無日矣説苑曰楚莊王與晉戰勝懼諸侯之攻已也乃築為五仞之臺臺成以觴諸侯諸侯請約莊王曰我薄德之人也諸侯請為觴皆仰而曰將將之臺窨窨其謀我言而不尚諸侯伐之於是逺者來朝近者入賓又曰齊景公為露寢之臺成而不通焉栢常騫曰為臺甚急臺成君何不通焉公曰然昔者梟鳴其聲不無為也吾惡之甚是以不通焉栢常騫曰臣請禳而去之公問曰何其對曰築新室為}
