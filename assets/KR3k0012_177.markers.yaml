  - {type: variant, offset: 1909, length: 1, content: 小, WYG: 樂其上史記云漢武帝元封二年公孫卿言於帝曰仙人好樓居帝乃使卿持節候仙人作通天臺髙三十丈雷雨悉在其下去長安三百里望見長安城武帝祭天臺舞八歳童女三百人置祠具招仙人祭天已令人升通天臺以候天神天神既下所祭若大流星乃舉烽火而就行宫望拜上有承露盤仙人掌擎玉杯承雲表之露元鳯間臺自毁而椽桷皆化為龍鳯隨風雨飛去西京賦云通天表而竦峙經百常而基擢上班華以交分下刻峭而若削也又藝文志云曲臺記后倉記七篇如淳注曰行禮射曲臺后倉為記故曰曲臺禮又曰趙武靈王建藂臺於邯鄲又曰文帝嘗欲作露臺計之直百金曰百金中民十家之産也吾奉先帝宫室惟恐羞之何以臺為又曰貳師擊右賢王召李陵使為貳師將軍輜重陵召見武臺師古曰未央宫有武臺叩頭自請曰臣所將屯邊者皆荆楚勇士竒材劒客也力扼虎射命中願得自當一隊到蘭干山南以分單于兵毋令專鄉貳師軍上曰將軍惡相屬邪吾發軍多無騎予女陵對曰無所事騎師古曰猶言不事多騎也臣願以少擊衆步兵五千涉單于庭上壯而拜之後漢書曰永平初馬援女立為皇后顯宗圖畵建初中名臣列將於雲臺雲臺在南宫以椒房故獨不及援東平王蒼觀圖言於帝曰何不畫伏波像帝笑而不言魏志曰武帝建安十五年作銅雀臺十八年作金虎臺又作冰井臺魏畧云黄初五年文帝東征留郭后於永始臺霖雨城}
