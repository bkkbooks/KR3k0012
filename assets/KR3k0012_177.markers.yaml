  - {type: variant, offset: 2762, length: 1, content: 作, WYG: 戮吳王不聽遂受而起姑胥之臺三年聚材五年乃成髙見二百里行步之人道死巷哭不輟嗟嘻之聲民疲士苦人不聊生帝王世紀曰周赧王雖居天子之位為諸侯所侵逼與家人無異貰於民無以歸之乃上臺以避之故周人因名臺曰逃債臺故洛陽南宫謻臺是}
