  - {type: punctuation, offset: 552, content: 「, id: KR3k0012_CHANT_177-bkkpn179}
  - {type: variant, offset: 552, length: 499, content: 若干惠事母以孝聞周文嘗造射堂新成與諸將宴射惠歎曰親老矣何時辨此周文聞之即日徙堂於惠宅論衡曰王者之堂墨子稱堯舜堂高三尺儒家以為卑下假使之然高三尺之堂蓂莢生於階下須臨堂察之乃知莢數夫起視堂下之莢孰與懸日曆於扆坐顧輒見之也風俗通曰殿堂象東井形刻作荷蓤蓤水物也所以厭火晉宮閣名曰洛陽宮有則百堂螽斯堂休徵堂延祿堂仁壽堂綏福堂含芳堂樂日堂椒華堂芳音堂顯成堂承光堂五福堂嘉寧堂瑞應圖帝琴堂前有二橘樹連理改琴堂為連理堂華陽國志曰文翁立講堂作石室一曰玉堂在城南初堂遇火太守更脩立又增二石室虞氏家記曰虞潭為右衛將軍太夫人年高求解職被詔不聽特假百日迎母東歸起養堂親親集會作詩言志齊地記曰臨淄城西門外有古講堂基柱猶存齊宣王脩文學處也拾遺記曰董偃常臥延清之堂設火齊屏風又曰海人獻龍膏為燈於燕昭王王坐通雲之堂具澄王子年拾遺記漢武息於延涼室臥夢李夫人授帝蘅蕪之香帝驚起而香氣猶著衣枕歷月不歇帝彌思涕乃改延涼室為遺芬夢堂襄沔記白馬泉每年刺史三月上旬於此泉起曲水流杯堂引泉水為祓禊之所臨時構造事竟毀除其流杯堂本在壘城西郡國誌王屋縣有孔子學堂西南七里有石室臨大河水勢湍急五里之間寂無水聲如似聽義又曰齊桓公宮城西門外有講堂齊宣王立此學也, SBCK: 逃債臺}
