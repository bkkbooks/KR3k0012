  - {type: variant, offset: 1930, length: 0, content: '', WYG: 汝南文成王亮大妃伏氏嘗以病祓於洛亮兄弟三人侍從並持節鼓吹震耀洛濱武帝登凌雲臺望見曰伏妃可謂富貴矣又曰范甯為豫章太守大設庠序遣往交州採磬}
  - {type: page-break, offset: 1930, content: '', id: KR3k0012_WYG_177-6a, image: WYG0894/WYG0894-0590a.png}
  - {type: variant, offset: 1931, length: 0, content: '', WYG: 以供學用改革舊制不拘常憲逺近至者千餘人資給衆費一出私禄并取郡四姓子弟皆充學生講討五經又起學臺功用彌廣又曰凉張茂築靈釣臺周輪八十餘歩其高九仞武陵人閻魯夜叩門呼曰武公遣我來曰何故勞百姓築臺乎姑臧令辛巖以魯妖妄請殺之茂曰吾信勞人魯稱先君之令何謂妖乎大府主簿馬魴曰今世難未夷唯當𢎞尚道素不宜勞役}
  - {type: page-break, offset: 1931, content: '', id: KR3k0012_WYG_177-6b, image: WYG0894/WYG0894-0590b.png}
  - {type: variant, offset: 1932, length: 0, content: '', WYG: 飾臺榭比年以來轉覺衆務日奢於往每所經營輕為權度實非士庶所望於明公茂曰吾過也命止}
  - {type: variant, offset: 1933, length: 1, content: 樓, WYG: 役崔鴻十六國春秋夏録曰赫連勃勃大破南凉傉檀於百井殺衆萬餘以人頭為京觀號曰髑髏臺韓子曰景公與晏子遊少海登北桓寢之臺望其國曰美哉煥乎後世將孰有之晏子曰其田氏乎曰寡人之國如田氏有之為之奈何對曰君欲奪之則近賢逺不肖治其煩亂緩其刑罰振貧窮恤孤寡行惠而好儉民將歸君雖十田氏其如君何又曰越王伐吳先宣言吾聞吳王築如皇之臺掘淵泉之池罷苦百姓剪財貨以盡民力余為民誅之幽明録曰海中有金臺出水百丈結構巧麗窮極神功横巖雲渚竦曜星河也晏子春秋曰景公起大臺歲寒役者皆凍晏子遂如臺執扑鞭其不務者曰吾細人也皆有闔廬以避燥濕今君為一臺而不速成國人皆以晏子助君虐也晏子歸而君}
  - {type: page-break, offset: 1933, content: '', id: KR3k0012_WYG_177-7a, image: WYG0894/WYG0894-0590c.png}
  - {type: page-break, offset: 1933, content: '', id: KR3k0012_WYG_177-7b, image: WYG0894/WYG0894-0590d.png}
