  - {type: variant, offset: 1533, length: 1330, content: 洛陽宮有桃間堂皇杏間堂皇杏間堂皇竹間堂皇李間堂皇魚梁堂皇醴泉堂皇百戲堂皇晉宮闕名曰洛陽宮有水碓堂皇擇果堂皇陸機四言詩序曰太子宴朝士於宣猷堂皇遂命機賦詩樓爾雅曰狹而脩曲日樓說文曰樓重屋也樔澤中守草樓也釋名曰樓有戶牖諸孔婁婁然也史記曰方士言武帝曰黃帝為五城十二樓以候神人帝乃立神明臺井幹樓高五十丈輦道相屬漢書曰濟南人公玉帶上皇帝明堂圖圖中有一殿四面無壁以茅蓋通水園宮垣為複道上有樓從西南入蓋樓之始也又郊祀志云其南有玉堂壁門大鳥之屬立神明臺井幹樓高五十丈輦道相屬焉顏師古注云漢宮閣䟽云神臺高五十丈上有九室東觀漢記云公孫述造十層赤樓也後漢書張奐傳初奐為武威太守其妻懷孕夢帶奐印綬登樓而歌占者曰必將生男復臨茲郡命終此樓既而生子猛以建安中為武威太守殺刺史州兵圍之急猛恥見擒乃登樓自焚而死又曰黃昌為郡守陜縣彭氏造高樓臨道昌行縣彭氏婦人輒升高樓而觀昌乃殺之蜀志曰周群作小樓多令奴更直臺上視天纔有一氣即白群晉書曰石崇作樓令婢綠珠作歌舞於上孫秀求綠珠不得及崇被收方在樓上謂珠曰吾今為汝死矣珠乃墜樓而死又曰於石頭東城內起高樓加累入於霄漢連堞帶於積水署曰入漢樓宋書曰大明元年五月壬子紫氣出景陽樓狀如煙廻薄久之詔改景陽為景雲樓趙書云趙染襲長安秦王業奔射鴈樓格戰至天明不拔齊書曰東昏侯後宮起仙華神仙玉壽諸殿窮盡雕綵以麝香雜香塗壁時世祖於樓上施青漆世謂之青樓帝曰武帝不巧何不純用瑠璃又曰焦度嘗戰敗逃于宮亭湖中江州刺史王景文誘降復拒沈攸之於郢城登樓詈辱攸之攸之攻不能下至今呼此樓為焦度樓也又魏虜傳云虜自佛貍世至萬民世增雕飾正殿西築臺謂之白樓樓南又有伺星樓梁書處士陶弘景傳云弘景止于句容之句曲山永明初更築三層樓弘景處其上弟子居其中賓客至其下又曰武帝大同十年幸蘭陵因賦歸舊鄉詩己酉幸京口城北固樓曰此不足以固守然北望江山實為壯觀乃改名北顧因幸廻賓亭宴帝鄉故老及迎候者少長數千人各齎錢三千丈與之周書曰長孫儉傳云為荊州刺史人安其業吏人表請為儉構清德樓樹碑刻頌朝議許焉盛弘之荊州記云西鄂城東有三女稚歿三女造此樓於墓所老君本記云周康王時文始真人結草為樓占星候氣登真隱訣云長綿樓上太清上宮名玉晨道君所居吳越春秋云會稽郡小城勾踐築周千一百二十步西北立為龍翼樓世說云桓征西治江陵城甚麗顧長康曰遙望層城丹樓如霞墨子云偏城三十步置坐候樓樓出堞四尺百步一木樓樓前面九尺高七尺二百步一立樓去城中二丈五尺洛陽地記曰洛陽城內西北角有金墉城東北角有樓高百尺魏文帝造也盛弘之荊州記曰荊州城西百餘步有丹霞樓臨川康王之置吳越春秋曰范蠡為勾踐立飛翼樓以象天門為兩蟉繞棟以象龍甬羊頭山記曰原城西門南角有萬歲樓俗傳飛入江常以鐵鏁維之又樓上時見一道白氣如煙刺史必死輕者貶謫州人至今為常候郡國誌定州安縣城上樓謂之神女樓又曰馬邑白樓即後魏納姚興女為后后悲思因造此樓登望飾以鈆粉故名之又曰金華縣因山為名城南臨溪水高阜上有樓名曰玄暢樓宋沈約造以吟詠於此處韋述兩京新記曰上陽宮有麗青臺浴曰樓十洲記曰崑崙山有玉樓十二層虞氏家記曰吳小城白門蓋吳王闔閭所作也至秦始皇帝守宮吏燭鷰窟失火燒宮而此樓故存瀨鄉記曰老子廟有皇天樓九柱樓靜念樓皆畫仙人雲氣袁彥伯羅山䟽曰仰望石樓眇然在雲中金陵地記吳嘉禾元年於桂林苑落星山起三重樓名曰落星樓吳都賦曰享戎旅於落星之樓世說曰, SBCK: ''}
