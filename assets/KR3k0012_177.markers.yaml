  - {type: variant, offset: 98, length: 433, content: 下尚書大傳曰天子堂廣九雉諸侯七雉伯子男五雉雉三尺也續漢書曰中平二年造萬金堂於西園三十國春秋西涼傳曰李暠於南門外臨水起堂名曰靖恭堂以議朝政閱武事堂成圖讚自古明王忠臣孝子貞女暠自為序以明鑒戒文武群寮亦皆圖焉是月白雀翔于靖恭堂暠頌之梁書曰高祖五年改閱武堂為德陽堂改聽訟堂為議賢堂後魏書任城王澄從高祖於觀德殿高祖曰躬以觀德次之凝閑堂高祖曰名要有義此堂天子閑居之義不可縱奢以忘儉自安以忘危故此堂後作茅茨堂謂李冲曰此東曰步元廡西日遊凱廡此坐雖非唐堯之君卿等當無媿於元凱冲對曰臣既遭唐堯之君不敢辭元凱之譽高祖曰光景垂落朕同宗則有載考之義卿等將出無遠何得默爾示聽德音即命黃門郎崔光郭雅邢巒崔休等賦詩言志燭至公辭高祖曰在夜載考宗族之義卿等且還朕與諸王宗室欲成此夜飲和苞漢趙記曰劉聰嘉平三年廷尉陳元達極諫聰怒將斬之聰時幸逍遙園李中堂元達抱堂下樹叫曰臣所言者社稷之計聰免之於是易李中堂為愧賢堂北史齊文襄於鄴東起山池遊觀河澗王孝瑜遂於第作水堂龍舟植幡矟於舟上數集諸弟宴射為樂武成幸其第見而悅, SBCK: 避}
