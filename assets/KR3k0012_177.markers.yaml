  - {type: variant, offset: 2760, length: 0, content: '', WYG: 閤治宮室立射臺於安里華池在平昌南城宫在長樂闔}
  - {type: variant, offset: 2761, length: 0, content: '', WYG: 出入逰卧秋冬治於城中春夏治於姑蘓之臺旦食䱉山晝遊蘓臺射於鷗陂馳於遊臺興樂石城走犬長洲又曰越得神木一雙大二十圍長五十尋陽為文梓隂為楩柟巧工施技制以規繩雕治圓轉刻削磨礱分為丹青錯畫文章嬰以白璧鏤以黄金状類龍蛇文彩生光乃使大夫種獻之於吳王曰東海役臣孤勾踐使臣種敢因下吏聞於左右賴大王之力竊為小殿有餘材再拜獻之吳王大悦子胥諫曰王勿受昔者桀為靈臺紂起鹿臺隂陽不和寒暑不時五穀不熟自取其灾民虛國變遂取滅亡大王受之後必為越}
