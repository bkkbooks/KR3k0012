  - {type: variant, offset: 1975, length: 7, content: 於石頭東城內起, WYG: 魏王將欲為中天之臺曰敢諫者死許綰入曰聞大王將有中天之臺願加萬億王曰何力能加曰臣聞天與地相去五千里因而半之當立七千今王者百里}
