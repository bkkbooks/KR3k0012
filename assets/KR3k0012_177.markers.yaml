  - {type: variant, offset: 46, length: 0, content: '', SBCK: 晉靈公不君從臺上彈人觀其避丸者又曰楚子成章華之臺願與諸侯落之又曰有虵自泉臺出入于國如先君之數八月聲姜薨毀泉臺也史記曰􅁗皇作瑯瑘臺刋石頌德又曰晉靈公造九層之臺孫息曰臣能累十二棊加一鷄子於上公曰危哉息曰公造九層之臺三年不成實危於此公乃止又曰趙武靈王爲野臺以望齊中之山境徐廣注野一作望齊也又曰蜀寡婦清其先得丹穴徐廣曰涪陵出丹也而擅其利數世家亦不訾謂其多不可訾量清寡婦也能守其業用財自衛不見侵犯􅁗皇帝以爲貞婦而爲築女懷清臺又曰淮南王安立思仙臺又曰楚靈王爲章華之臺伍舉諌曰昔楚莊王爲匏居之臺髙不過望國氛大不過容宴豆又曰燕昭王置千金於臺上以延天下士謂之黄金臺又曰子路聞蒯聵入馳徃入城造蒯聵蒯聵與孔悝登臺子路曰君焉用孔悝請得而殺之蒯聵弗聽於是子路欲燔臺蒯聵懼乃下石乞壷黶攻子路斷纓子路曰君子死冠不免結纓而死又曰漢武帝起栢梁臺髙數十丈悉以香栢香聞數十里漢書郊祀志曰王莽篡位二年好神仙事以方士言起八風臺於宫中臺成作樂其上史記云漢武帝元封二年公孫卿言於帝曰仙人好樓居帝乃使卿持節候神作通天臺髙三十丈雷雨悉在其下去長安三百里望見長安城武帝􅀕天臺舞八歳童女三百人置祠具招仙人􅀕天巳令人􅂛通天臺以候天神天神旣下􅀕所若大流星乃舉烽火而就竹宫望拜上有承露盤仙人掌擎玉盃承雲表之露元鳯間臺自毀椽桷皆化爲龍鳯隨風􅀨飛去西京賦云通天眇而竦峙經百常而基擢上班華以交紛下刻峭而􅀂削也又藝文志曰曲臺記后倉記七篇如淳注曰行}
