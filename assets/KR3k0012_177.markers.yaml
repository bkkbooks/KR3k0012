  - {type: variant, offset: 141, length: 810, content: 春秋西涼傳曰李暠於南門外臨水起堂名曰靖恭堂以議朝政閱武事堂成圖讚自古明王忠臣孝子貞女暠自為序以明鑒戒文武群寮亦皆圖焉是月白雀翔于靖恭堂暠頌之梁書曰高祖五年改閱武堂為德陽堂改聽訟堂為議賢堂後魏書任城王澄從高祖於觀德殿高祖曰躬以觀德次之凝閑堂高祖曰名要有義此堂天子閑居之義不可縱奢以忘儉自安以忘危故此堂後作茅茨堂謂李冲曰此東曰步元廡西日遊凱廡此坐雖非唐堯之君卿等當無媿於元凱冲對曰臣既遭唐堯之君不敢辭元凱之譽高祖曰光景垂落朕同宗則有載考之義卿等將出無遠何得默爾示聽德音即命黃門郎崔光郭雅邢巒崔休等賦詩言志燭至公辭高祖曰在夜載考宗族之義卿等且還朕與諸王宗室欲成此夜飲和苞漢趙記曰劉聰嘉平三年廷尉陳元達極諫聰怒將斬之聰時幸逍遙園李中堂元達抱堂下樹叫曰臣所言者社稷之計聰免之於是易李中堂為愧賢堂北史齊文襄於鄴東起山池遊觀河澗王孝瑜遂於第作水堂龍舟植幡矟於舟上數集諸弟宴射為樂武成幸其第見而悅之故盛興後園之翫習於是貴賤慕效處處營造又曰若干惠事母以孝聞周文嘗造射堂新成與諸將宴射惠歎曰親老矣何時辨此周文聞之即日徙堂於惠宅論衡曰王者之堂墨子稱堯舜堂高三尺儒家以為卑下假使之然高三尺之堂蓂莢生於階下須臨堂察之乃知莢數夫起視堂下之莢孰與懸日曆於扆坐顧輒見之也風俗通曰殿堂象東井形刻作荷蓤蓤水物也所以厭火晉宮閣名曰洛陽宮有則百堂螽斯堂休徵堂延祿堂仁壽堂綏福堂含芳堂樂日堂椒華堂芳音堂顯成堂承光堂五福堂嘉寧堂瑞應圖帝琴堂前有二橘樹連理改琴堂為連理堂華陽國志曰文翁立講堂作石室一曰玉堂在城南初堂遇火太守更脩立又增二石室虞氏家記曰虞潭為右衛將軍太夫人年高求解職被詔不聽特假百日迎母東歸起養堂親親集會作詩言志齊地記曰臨淄城西門外有古講堂基柱猶存齊宣王脩文學處也拾遺記曰董偃常臥延清之堂設火齊屏風又曰海人獻龍膏為燈於燕昭王王坐通雲之堂具澄王子年拾遺記漢武息於延涼室臥夢李夫人授帝蘅蕪之香帝驚起而香氣猶著衣枕歷月不歇帝彌思涕乃改延涼室為遺芬夢堂襄沔記白馬, WYG: 聲姜薨毁}
