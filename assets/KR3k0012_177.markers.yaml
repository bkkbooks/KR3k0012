  - {type: variant, offset: 1922, length: 5, content: 一氣即白群, WYG: 急而移止奈何也何晏景福殿賦曰鎮以崇臺實曰永始複道重閣猖狂是俟吳志曰孫權於武昌臨釣臺飲酒大忻歡使人以水灑羣臣曰今日酣飲醉墮臺乃止張昭曰紂為糟丘酒池長夜之飲當時亦以為樂不以為惡權有慚色而罷}
