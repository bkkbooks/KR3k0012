  - {type: variant, offset: 38, length: 6, content: 將上堂聲必楊, SBCK: 宋平公築臺妨於農収子罕請俟農功之畢公弗許築者謳曰澤門之楯實興我役邑中之黔實慰我心子罕黒居邑中子罕聞之親執朴以行築而扶其不勉者曰吾儕小人皆有闔廬以避燥濕寒暑今君爲一臺而不速成何以爲役謳者乃止}
