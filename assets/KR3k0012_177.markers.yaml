  - {type: variant, offset: 46, length: 8, content: 禮有以高為貴者天, WYG: 晉靈公不君從臺上彈人而觀其避丸也又曰楚}
  - {type: variant, offset: 46, length: 0, content: '', krp: 晉靈公不君從臺上彈人觀其避丸者又曰楚子成章華之臺願與諸侯落之又曰有虵自泉臺出入于國如先君之數八月聲姜薨毀泉臺也史記曰秦皇作瑯瑘臺刋石頌德又曰晉靈公造九層之臺孫息曰臣能累十二棊加一鷄子於上公曰危哉息曰公造九層之臺三年不成實危於此公乃止又曰趙武靈王爲野臺以望齊中之山境徐廣注野一作望齊也又曰蜀寡婦清其先得丹穴徐廣曰涪陵出丹也而擅其利數世家亦不訾謂其多不可訾量清寡婦也能守其業用財自衛不見侵犯秦皇帝以爲貞婦而爲築女懷清臺又曰淮南王安立思仙臺又曰楚靈王爲章華之臺伍舉諌曰昔楚莊王爲匏居之臺髙不過望國氛大不過容宴豆又曰燕昭王置千金於臺上以延天下士謂之黄金臺又曰子路聞蒯聵入馳徃入城造蒯聵蒯聵與孔悝登臺子路曰君焉用孔悝請得而殺之蒯聵弗聽於是子路欲燔臺蒯聵懼乃下石乞壷黶攻子路斷纓子路曰君子死冠不免結纓而死又曰漢武帝起栢梁臺髙數十丈悉以香栢香聞數十里漢書郊祀志曰王莽篡位二年好神仙事以方士言起八風臺於宫中臺成作樂其上史記云漢武帝元封二年公孫卿言於帝曰仙人好樓居帝乃使卿持節候神作通天臺髙三十丈雷雨悉在其下去長安三百里望見長安城武帝祭天臺舞八歳童女三百人置祠具招仙人祭天巳令人升通天臺以候天神天神旣下祭所若大流星乃舉烽火而就竹宫望拜上有承露盤仙人掌擎玉盃承雲表之露元鳯間臺自毀椽桷皆化爲龍鳯隨風雨飛去西京賦云通天眇而竦峙經百常而基擢上班華以交紛下刻峭而若削也又藝文志曰曲臺記后倉記七篇如淳注曰行}
  - {type: variant, offset: 47, length: 0, content: '', SBCK: 射曲臺后倉爲記故曰曲臺又曰趙武靈王建藂臺於邯鄲又曰文帝甞欲作露臺計之直百金曰百金中民十家之産也吾奉先帝宫室常恐羞之何以臺爲又曰貳師撃右賢王召李陵使爲貳師將軍輜重陵召見武臺師古日末央宫}
  - {type: page-break, offset: 47, content: '', id: KR3k0012_SBCK_177-3a}
  - {type: variant, offset: 47, length: 0, content: '', krp: 射曲臺后倉爲記故曰曲臺又曰趙武靈王建藂臺於邯鄲又曰文帝甞欲作露臺計之直百金曰百金中民十家之産也吾奉先帝宫室常恐羞之何以臺爲又曰貳師撃右賢王召李陵使爲貳師將軍輜重陵召見武臺師古日末央宫}
  - {type: variant, offset: 48, length: 0, content: '', SBCK: 武臺也叩頭自請曰臣所將屯邊者皆荆楚勇士竒材劒客也力扼虎射命中願得自當一隊到蘭于山南}
  - {type: variant, offset: 48, length: 0, content: '', krp: 武臺也叩頭自請曰臣所將屯邊者皆荆楚勇士竒材劒客也力扼虎射命中願得自當一隊到蘭于山南}
  - {type: variant, offset: 49, length: 2, content: 高為, SBCK: 分單于兵母令專郷貳師軍上曰將軍惡相屬邪吾發軍多無􅀐予女陵對曰無所事􅀐師古曰猶言不事復􅀐也臣願以少擊衆歩兵五千渉單于庭上壯而拜之後漢書曰永平􅀄馬援女立爲皇后顯宗圖􅀞建􅀄中名臣列將於雲臺雲臺在南宫以椒房故獨不及援東平王蒼觀圖言於帝曰何不􅀞伏波像帝􅀏而不言魏志曰武紀建安十五年作銅雀臺十八年作金虎臺又作冰井臺魏略云黄􅀄五年文帝東征留郭后於永始臺霖雨城樓多壞有司請移止后曰昔楚昭王出遊貞姜留漸臺江水至使迎而無符不去卒没今帝在逺未有急而便移止奈何也何晏景福殿賦曰鎮以崇臺實曰永始􅃨道重閣猖狂是俟吴志曰孫權於武昌臨釣臺飲酒大忻歡使人以水灑羣臣曰今日酣飲醉墮臺乃止張昭曰紂爲糟丘酒池長夜之飲當時亦以爲樂不以爲惡權有慙色而罷晉書曰汝南文成王亮太妃伏氏甞有小疾祓於落水亮兄弟三人侍從並持節鼔吹震耀洛濵武帝登凌雲臺望見曰伏妃洛可謂冨}
