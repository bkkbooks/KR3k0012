  - {type: variant, offset: 1958, length: 0, content: '', WYG: 仙館舍即大夫觀望之臺也昔老君於此山騰宅時人因號曰老子陵蓋非墳墓也故爾雅云大陸曰阜大阜曰陵此之}
  - {type: variant, offset: 1959, length: 1, content: 珠, WYG: 也新序曰桀作瑶臺殫百姓之財伊尹諫之桀}
