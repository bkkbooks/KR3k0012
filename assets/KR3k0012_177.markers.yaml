  - {type: variant, offset: 2025, length: 239, content: 詔改景陽為景雲樓趙書云趙染襲長安秦王業奔射鴈樓格戰至天明不拔齊書曰東昏侯後宮起仙華神仙玉壽諸殿窮盡雕綵以麝香雜香塗壁時世祖於樓上施青漆世謂之青樓帝曰武帝不巧何不純用瑠璃又曰焦度嘗戰敗逃于宮亭湖中江州刺史王景文誘降復拒沈攸之於郢城登樓詈辱攸之攸之攻不能下至今呼此樓為焦度樓也又魏虜傳云虜自佛貍世至萬民世增雕飾正殿西築臺謂之白樓樓南又有伺星樓梁書處士陶弘景傳云弘景止于句容之句曲山永明初更築三層樓弘景處其上弟子居其中賓客至其下又曰武帝大同十年幸蘭陵因賦歸舊鄉詩己酉幸京口城北固樓曰此, WYG: 地}
