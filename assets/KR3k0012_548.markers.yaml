  - {type: variant, offset: 772, length: 348, content: 薄也蓋有受我而厚之者欲其一心厚之者姑姊妹嫁大功夫為妻期又檀弓曰成人有兄死而不為襄者聞子皋將為成宰遂為襄成人曰蠶則績而蟹有匡范則冠而蟬有緌兄則死而子皋為之襄蚩兄死者言其襄之不為兄死如蟹有匡蟬有緌不為蠶之績范之冠也范蜂也蟬蜩也緌謂蜩喙長在賜下又喪服小記曰近臣君服斯服矣其餘從而服不從而稅除喪者先重者易服者易輕者斬襄之葛齊襄之葛與大功之麻同又曰服問曰三年之喪已練矣有朞之喪既葬矣則帶其故葛帶絰朞之絰服其功襄有大功之喪亦如之小功無變也無所變於大功齊斬之服不用輕累重麻之有本者變三年之葛有本謂大功以上也小功以下澡麻斷本既練遇麻斷本者於免絰之既免去絰每可以絰必絰既絰則去之禮統曰天子諸侯皆為貴臣妾服三月適夫人為八妾服三月八妾為夫人服與舅姑同家語曰門人疑所以服夫子者子貢曰昔夫子之喪顏淵若喪子而無服喪子路亦然請, WYG: ''}
