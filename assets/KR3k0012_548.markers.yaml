  - {type: variant, offset: 3516, length: 2, content: 宋書, WYG: 人自取之也夫寢處不安飲食不給勞逸過度者疾共殺之居下位而上干其君嗜酒欲物而求不止者刑共殺之少以犯衆弱以侮強忿怒不量力者兵共殺之此三死者非命也又曰民有五死聖人能去三不能除其二飢渴死者可去也凍寒死者可去也雖五兵共死者可去也夀命死者不可去也癰疽死者不可去也三者可去二不可去論衡曰人之死者不可去也三者二者食齊輪者猶未死者知感也又}
