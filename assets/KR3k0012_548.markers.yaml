  - {type: variant, offset: 3241, length: 0, content: '', WYG: 雜記曰大夫居廬士居堊室又喪大記曰父母之喪居倚廬不塗寢苫枕凷非喪事不言君為廬宫之宫謂圍障大夫士䄠之既𦵏柱楣塗廬不於顯者君大夫士皆宫之又問喪曰成壙而歸不敢入處室居于倚廬哀親之在}
