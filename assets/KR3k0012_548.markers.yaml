  - {type: variant, offset: 3244, length: 3, content: 絰者實, WYG: 王琳汝南上蔡人十嵗失父母弟季年七嵗兄弟二人哭泣哀聲不絶在塚側作廬不妄出入重凶門附儀禮士喪禮曰重木刋鑿之甸人置重于中庭三分庭一在南夏祝取鬻餘飯盛用二鬲于西牆下冪用疏布久之及用䩣懸于重冪用葦席北面袵帶用䩣賀之結于後祝置于庭中近南名為重今之凶門是其象}
  - {type: variant, offset: 3244, length: 1, content: 絰, krp: 重}
