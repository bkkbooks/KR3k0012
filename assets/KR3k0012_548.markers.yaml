  - {type: variant, offset: 3246, length: 0, content: '', krp: 未葬之前以代主也猶以生事之未忍作木主主以存神也設重於庭懸瓦鬲以養病之米淅之爲沐則煑之爲粥}
  - {type: variant, offset: 3247, length: 0, content: '', SBCK: 之重用葦席盖之􅀑神依而飲食始死之奠但用但未有黍稷故}
  - {type: variant, offset: 3247, length: 0, content: '', krp: 之重用葦席盖之鬼神依而飲食始死之奠但用但未有黍稷故}
