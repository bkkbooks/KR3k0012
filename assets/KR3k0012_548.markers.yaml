  - {type: variant, offset: 221, length: 0, content: '', SBCK: 命則去杖大夫之命則輯杖內子爲夫人之命去杖爲丗婦之命授人杖大夫有君命去杖此指大夫之子也而云大夫者通實大夫有父母之䘮也授人杖與使人執之同也士之䘮二日而殯三日之朝主人杖婦人皆杖於君命夫人之命如大夫於大夫丗婦之命如大夫士二日而殯者下大夫也士之禮死與徃日生與來日此二日於死者亦得三日也婦人皆杖謂主婦容妾爲君女子子在室者子皆杖不以即位才謂凡庶子也不以即位與去秋同也大夫士哭殯則杖哭柩則輯杖􅂘殯謂旣塗也􅂘柩謂啓後也大夫士之子於父父也尊近哭殯可以杖子􅂘諸侯之子於父父也君也尊逺杖不入廟門也棄杖者斷而棄之於隱者杖以䘮至尊爲人得而褒之又問䘮曰或問曰杖者何也怪其義各異曰竹桐一也故爲父苴杖竹也爲母削杖削桐也言所以杖者義一也顧所用異耳或問曰杖者以何爲也怪所爲施曰孝子䘮親􅂘泣無數服勤三年身病體羸以杖扶病也言得杖乃能起也則父在不敢杖矣尊者在故也堂上不杖辟尊之處也堂上不趨示不遽地此孝子之志也人情之實也禮義之經也非從天降也非從地出也人情而巳矣父在不杖謂爲母也尊者不杖辟尊渚之處不杖有事不趨皆爲其感動使之􅁨歳也矣又䘮服四制曰杖者何也爵也三日授子杖五日授大夫杖七日授土杖或曰擔主或曰輔病婦人童子不杖不能病也白虎通曰所以杖竹桐何取其名也竹慼也桐痛也父以竹母以桐竹陽也桐隂也竹斷而用之質故爲隂也韓子曰儒執䘮三年大毀扶杖丗主以爲孝而禮之幗髽儀禮䘮服曰女子子在室爲父}
