  - {type: variant, offset: 3528, length: 20, content: 職武帝伐劉毅起為輔國將軍誕固辭以墨絰從行, SBCK: 三不能除其二飢渇死者可去也凍寒死者可去也雖五兵死者可去也壽命死者不可去也癕疽死者不可去也三者可去二者不可去論衡曰人之死也猶火之滅也而燿不照人死而智不慧二者不齊論者猶謂死有知惑也又曰王莽之時省五經章句皆爲二十萬􅀶士弟子郭略夜定舊􅀃死於燭下精思不任脉絶氣滅也楊泉物理論曰人含氣而生精盡而死猶澌也滅也譬如火焉薪盡而火滅則無光矣故滅火之餘無遺炎矣人死之後無遺魂矣太平御覧卷第五百四十八}
