  - {type: 'tls:seg', offset: 3248, content: '', id: KR3k0012_CHANT_548-39a.5}
  - {type: variant, offset: 3248, length: 0, content: '', SBCK: 黍稷在下之中如生時也殷人作主之後聮其重懸之於廟梁去髙祖之廟親盡則埋之周人將葬重隨柩而朝廟之外柩而埋之於階間而後作主也凶門南史孔琳之議曰凶門栢裝不岀禮典起自末代積習生常遂成舊俗兄人士䘮儀多岀閭里每有此須動十數萬損人財力而義無所取至於寒庶則人思自竭雖復室如懸磬莫不傾産殫財所謂葬之以禮其此之謂乎冝一罷凶門之式王肅䘮服要記曰魯哀公葬父孔子問寧設衰門乎哀公曰衰門起於禹禹治水故}
  - {type: variant, offset: 3248, length: 0, content: '', WYG: 禮既虞而作主今未有主故以重當主本為喪設非以}
  - {type: variant, offset: 3248, length: 0, content: '', krp: 黍稷在下之中如生時也殷人作主之後聮其重懸之於廟梁去髙祖之廟親盡則埋之周人將葬重隨柩而朝廟之外柩而埋之於階間而後作主也凶門南史孔琳之議曰凶門栢裝不岀禮典起自末代積習生常遂成舊俗兄人士䘮儀多岀閭里每有此須動十數萬損人財力而義無所取至於寒庶則人思自竭雖復室如懸磬莫不傾産殫財所謂葬之以禮其此之謂乎冝一罷凶門之式王肅䘮服要記曰魯哀公葬父孔子問寧設衰門乎哀公曰衰門起於禹禹治水故}
  - {type: page-break, offset: 3249, content: '', id: KR3k0012_WYG_548-7a, image: WYG0898/WYG0898-0102a.png}
  - {type: variant, offset: 3250, length: 0, content: '', SBCK: 門閭以紀其功吾父無功何用此焉韋弘與蔡謨牋問凶門曰父在母䘮應立凶門不又問與父别止立凶門愚意猶所疑厭於父故也今於父大門之内别立凶門便爲父一家}
  - {type: page-break, offset: 3250, content: '', id: KR3k0012_SBCK_548-5a}
  - {type: variant, offset: 3250, length: 0, content: '', WYG: 門恐不應以尊卑厭降也禮命士以上父子異宫今卑私之喪皆别開門亦不知今人如此者皆}
  - {type: variant, offset: 3250, length: 0, content: '', krp: 門閭以紀其功吾父無功何用此焉韋弘與蔡謨牋問凶門曰父在母䘮應立凶門不又問與父别止立凶門愚意猶所疑厭於父故也今於父大門之内别立凶門便爲父一家}
