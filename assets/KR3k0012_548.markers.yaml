  - {type: variant, offset: 2155, length: 269, content: 凡命婦共其服共喪襄亦如之儀禮喪服曰斬襄者不緝也冠繩纓條屬冠六升外畢鍜而勿灰齊襄者緝也又曰䟽襄裳齊傳曰問者曰何冠也曰齊襄大功冠其襄也緦麻小功冠其襄也帶緣各視其冠又曰緦者十五升抽其半有事其縷無事其布曰緦也錫襄者何也麻之有錫者也者十五升抽其半無事其縷有事其布曰錫又曰凡襄外削幅裳內削幅幅三枸削殺也若齊裳內襄外員廣出於適寸員在背上適辟領也員出於辟領外傍一寸也適博四寸出於襄襄長六寸愽四寸禮記檀弓曰襄與其不當物也寧無襄惡其亂禮不當物謂精麤廣狹不應法制齊襄不以邊坐又檀弓曰古者冠縮縫今也衡縫縮從也今禮制衡讀為橫今冠橫縫以其辟積多故喪冠之反吉非古也解時, SBCK: ''}
