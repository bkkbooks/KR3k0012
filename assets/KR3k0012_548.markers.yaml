  - {type: variant, offset: 3389, length: 1, content: 僖, WYG: 定下曰齊侯伐晉敝無存之父將室之辭以與其弟曰此役也不死反必娶于髙國先登求自門出死于霤下又哀上曰簡子巡列曰畢萬匹夫也七戰皆獲有馬百乗死于牖下畢萬晉獻公卿也死于牖下言得夀終羣子勉之死不在冦言有命也又哀下曰太子聞之懼下石乞孟黶敵子路以戈擊之斷纓子路曰君子死冠不免結纓而死孔子聞衛亂曰柴也其来由也其死矣又哀}
