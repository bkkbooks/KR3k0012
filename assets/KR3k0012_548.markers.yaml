  - {type: variant, offset: 3520, length: 7, content: 誕為吳國史母憂, SBCK: 樂不能過也􅀃苑曰齊景公岀而見殣謂晏子曰此何死對曰餧而死公曰噫寡人之無德也亦甚矣晏子曰君之德著而不彰何爲無德景公曰何謂也對曰君之德及後宫與臺榭之玩君之鴈食以菽粟君之宫內自樂延及後宫之族何爲其無德也顧臣有請於君由君之意自樂之心推與百姓同之則何殣之有又曰子貢問孔子人死有知將無知也孔子曰吾欲言死人有知也恐孝子妨生以送死也吾欲言死人無知也恐不孝子孫棄親不葬也賜欲知人死有時將無知也死徐自知之猶未晩也又曰魯哀公問孔子曰有智者壽平對曰然人有三死而非命也者人自取之也夫寢處不時飲食不節勞逸過度者疾共殺之居下位而上干其君嗜酒欲物而求不止者刑共殺之少以犯衆弱以侮強忿怒不量力者兵共殺之此三死者非命也又曰民有五死聖人能}
