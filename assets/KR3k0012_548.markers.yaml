  - {type: variant, offset: 3180, length: 3, content: 斬襄絞, SBCK: 問䘮成壙而歸不敢入處室居於􅀝廬哀親之在外也白虎通曰父母之䘮􅀝廬於中門外東墻下户北又曰婦人不居􅀝廬天子七日諸侯五曰卿大夫三日而成服居門外東壁爲廬王肅䘮服要記曰魯哀公葬父孔子問曰寧設菰廬乎哀公曰菰廬起太伯太伯出奔聞古公崩還赴䘮故作菰廬以彰其尸吾父無太伯之罪何用此爲孝子傳曰王琳汝南上蔡人十􅀊失父母弟季年七歳兄弟二人􅂘泣哀聲不絶在冡側作廬不妄岀入餘見孝部重㐫門附儀禮士䘮禮曰重木刋鑿之甸人置重于中庭參分庭一在南夏祝取鬻餘飯盛用二鬲于西牆下幂用䟽布乆之擊用靲懸于重幂用葦席北靣左祍}
