  - {type: variant, offset: 3392, length: 0, content: '', SBCK: 齊侯伐}
  - {type: variant, offset: 3393, length: 1, content: 襄, SBCK: 敝無存之父將室之辭以與其弟曰此役也不死反必娶於髙國先登求自門出死於霤下又哀上曰簡于廵列曰畢萬匹夫也七戰皆獲有馬百乗死於牖下畢萬􅀳獻}
  - {type: variant, offset: 3393, length: 1, content: 襄, WYG: 荀瑶帥師圍鄭鄭人俘酅魁壘賂之以知政閉其口而死穀梁傳隠}
  - {type: variant, offset: 3393, length: 1, content: 襄, krp: 荀瑶帥師圍鄭人浮􅈶魁壘賂之以知政閉其口而死榖梁傳隱}
  - {type: variant, offset: 3395, length: 0, content: '', SBCK: 卿也死於牖下言得壽中羣子勉之死不在宼言有命也又哀下曰太子聞之懼下石乞盂壓敬子路以戈}
  - {type: variant, offset: 3395, length: 5, content: 擊秦師於殽, WYG: 曰髙厚曰崩尊曰崩天}
  - {type: variant, offset: 3395, length: 1, content: 擊, krp: 曰髙厚曰崩尊曰崩天子之崩以尊之也其崩之何也以在民上故崩之也春秋說題辭曰天子曰崩崩之爲言殞也諸侯稱薨薨之爲言奄然而亡大夫曰卒精輝終卒卒之爲言絶絶於邦也士曰不禄失其忠也不禄之言削名章也庶人曰死魂魄去心死之爲言精爽窮也白虎通又載爾雅曰崩薨無禄卒殂落殪死也論語里仁曰子曰朝聞道夕死可矣言將至死不聞世之有道又子罕曰子疾病子路使門人爲臣病間曰乆矣哉由之行詐也且予與其死於臣之手也無寧死於二三子之手乎且子縱不得大葬予死於道路乎又先進曰顔淵死子曰噫天喪予天喪予子哭之慟從者曰子慟矣曰有慟乎非夫人之爲慟而誰爲又先進曰季路曰敢問死曰未知生焉知死鬼神及死事難明語之無益故不荅又季氏曰齊景公有馬千駟死之日民無德而稱焉伯夷叔齊餓于首陽之下民到于今稱之五經通義曰崩薨從何王以來乎曰從周何以言之尚書曰放勲乃殂落舜曰陟方乃死武王旣王是以知武王以前未稱崩薨也至成王太平乃制崩薨之著尚書曰翌日乙丑成王崩釋名曰漢以來謂死爲物故言其諸物皆就朽故史記曰}
  - {type: variant, offset: 3396, length: 0, content: '', SBCK: 之斷纓子路曰君子死冠不免結纓而死孔子聞衛亂曰柴也其來乎由其死矣及哀下曰􅀳荀瑶帥師圍鄭人浮􅈶魁壘賂之以知政閉其口而死榖梁傳隱公曰髙厚曰崩尊曰崩天子之崩以尊之也其崩之何也以在民上故崩之也春秋􅀃題辭曰天子曰崩崩之爲言殞也諸侯稱薨薨之爲言􅍕然而亡大夫曰卒精輝終卒卒之爲言絶絶於􅀖也士曰不禄失其忠也不禄之言削名章也庶人曰死魂魄去心死之爲言精爽窮也白虎通又載爾雅曰崩薨無禄卒殂落殪死也論語里仁曰子曰朝聞道夕死可矣言將至死不聞世之有道又子罕曰子疾病子路使門人爲臣病間曰乆矣哉由之行詐也且予與其死於臣之手也無寧死於二三子之手乎且子縱不得大葬予死於道路乎又先進曰顔淵死子曰噫天喪予天喪予子哭之慟從者曰子慟矣曰有慟乎非夫人之爲慟而誰爲又先進曰季路曰敢問死曰未知生焉知死􅀑神及死事難明語之無益故不荅又季氏曰齊景公有馬千駟死之日民無德而稱焉伯夷叔齊餓于首陽之下民到于今稱之五經通義曰崩薨從何王以來乎曰從周何以言之尚書曰放勲乃殂落舜曰陟方乃死武王旣王是以知武王以前未稱崩薨也至成王太平乃制崩薨之著尚書曰翌日乙丑成王崩釋名曰漢以來謂死爲物故言其諸物皆就朽故史記曰}
