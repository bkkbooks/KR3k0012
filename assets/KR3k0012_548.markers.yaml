  - {type: variant, offset: 2556, length: 186, content: 事其縷者先加灰錫治其麻縷為布則不治也哀在外故有事其布者則不治其縷哀在內也為布之從即先治也緦者如絲也錫襄者先緝錫白之謂也疑襄者疑其布是絲也疑襄錫襄二者君之弔服也又曰吉冠之布倍於衣也朝服十五升則冠三十升是也今喪冠升數少喪禮簡斬襄三升冠六升升者登也轉祖訓耳凡麻八十縷為十升至六升即為成布也凡言受以成布者既葬之後漸去麤受細齊衰四升冠七升又有䟽襄即三升半之襄也䟽亦麤也其布在齊斬之間, SBCK: 縱髽形葩髽}
