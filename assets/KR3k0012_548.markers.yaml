  - {type: variant, offset: 3519, length: 0, content: '', SBCK: 張預每羡古人飡玉之法乃採訪藍田躬徃攻掘得􅀂環璧雜器形者大小百餘至而觀之皆光潤可玩預乃椎七十枚爲屑日服食之餘多惠人後乃聞者更求玉於故處皆無所見馮翊公源懷等得其玉􅅣爲器珮皆鮮明可寳預服延年云有效驗而世事寢食皆不禁節又加之好酒損志及疾篤謂妻子曰服玉􅀂能屏居山林排棄嗜欲或當大得神力而吾酒色不絶自致於死非藥過也然吾尸體必當有異勿使速殯令後人知飡服之妙時七月中旬長安毒􅀬預停尸四宿而體色不變其妻常氏以玉珠二枚唅之口閉常謂之曰君自云飡玉有神驗何故不受唅也言訖齒啓納珠因嘘屬其口都無穢氣舉斂於棺堅直不傾委死猶有遺玉屑數􅂛囊盛納諸棺中文子曰老子曰聖人同死生愚人亦同死生聖人之同死生知於分理也愚人同死生不知利害所在莊子曰人之生氣也聚則爲生散則爲死又曰夫大塊載我以形勞我以生佚我以老息我以死故善吾生者乃所以善吾死也又曰莊子之楚見空髑髏髐然有形檄以馬捶因而問之曰夫子貪生失理而爲此乎將子有亡國之事鈇􅃏之誅而爲此乎於是語卒援髑髏㭠而卧夜半髑髏見夢曰子之談者似辯士諸子所言皆生人之累也死則無此矣子欲聞死之􅀃乎莊子曰然髑髏曰死無君於上無臣於下亦無四時之事縱然以天地爲春秋雖南面}
