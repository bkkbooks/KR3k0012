  - {type: variant, offset: 3522, length: 26, content: 吳國史母憂去職武帝伐劉毅起為輔國將軍誕固辭以墨絰從行, WYG: 二千石博士弟子郭略夜定舊説死燭下精思不任脈絶氣滅也楊泉物理論曰人含氣而生精盡而死猶澌滅也譬如火焉薪盡而火滅則光無矣人死之後無遺魂也太平御覽卷五百四十八}
