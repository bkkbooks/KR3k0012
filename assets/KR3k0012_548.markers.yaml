  - {type: variant, offset: 201, length: 0, content: '', WYG: 母其主喪者不杖則子一人杖女子在室亦童子也無男昆弟使同姓為攝主不杖則子一人杖也謂長女也許嫁二十而笄笄為成人成人正杖也又曰庶子不以杖即位不遍子也位朝夕哭位也父不主庶子之喪則孫以杖即位可也祖不厭孫孫得伸也父在庶子為妻以杖即位可也舅不主妾之喪子得伸也又雜記下曰古者貴賤皆杖叔孫武叔朝見輪人以其杖闗轂而輠輪者于是有爵而後杖也又喪大記曰君之喪三日子夫人杖五日既殯授大夫世婦杖子大夫寢門之外杖寢門之内輯之夫人世婦在其次則杖即位則使人執之子有王命則去杖國君之命則輯杖聴卜有事於尸則去杖大夫於君所則輯杖於大夫所則杖大夫之喪三日之朝既殯主人主婦室老皆杖大夫有君命則去杖大夫之命則輯杖内子為夫人之命去杖為世婦之命授人杖大夫有君命去杖此指大夫之子也而云大夫者通實大夫有父母之喪也授人杖以使人執之冊也士之喪二日而殯三日之朝主人杖婦人皆杖於君命夫人之命如大夫於大夫世婦之命如大夫士二日而殯者下大夫也士之禮死與往日生與来日此二日於死者亦得三日也婦人皆杖謂主婦容妾為君}
