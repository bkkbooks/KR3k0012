  - {type: variant, offset: 3242, length: 0, content: '', WYG: 也白虎通曰父母之喪倚廬于中門外東牆下戸北又曰婦人不居倚廬天子七日諸侯五日卿大夫三日而成服居門外東壁為廬王肅喪服要記曰魯哀公𦵏父孔子問曰寧設菰廬乎哀公曰菰廬起大伯大伯出奔聞古公崩還赴喪故作菰廬以彰其尸吾父無大伯之罪何用此為孝子}
  - {type: page-break, offset: 3242, content: '', id: KR3k0012_WYG_548-6b, image: WYG0898/WYG0898-0101d.png}
