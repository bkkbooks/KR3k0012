  - {type: variant, offset: 3509, length: 0, content: '', WYG: 為臣病間曰久矣哉由之行詐也且予與其死於}
  - {type: variant, offset: 3511, length: 1, content: 盛, WYG: 手也無寧死於二三子之手乎且予縱不得大𦵏予死於道路乎又先進曰顔淵死子曰噫天喪予天喪予子哭之慟從者曰子慟矣曰有慟乎非夫人之為慟而誰為文子老子曰聖人同死生愚人亦同死生聖人之同死生知于分理也愚人同死生不知利害所在莊子曰人之生也氣聚則為生氣散則為死又曰夫大塊載我以形勞我以生佚我以老息我以死故善吾生者乃所以善吾死也又曰莊子之楚見空髑髏髐然有形檄以馬棰因而問之曰夫子貪生失理而為此乎將子有亡國之事鈇鉞之誅而為此乎于是語卒援髑髏枕而卧夜半髑髏見夢曰子之談者似辨士諸子所言皆人生之累也死則無此矣子欲聞死之説乎莊子曰然髑髏曰死無君于上無臣于下亦無四時之事從然以天地為春秋雖南面之樂不能過也説苑曰齊景公出而見殣謂晏子曰此何死對曰餒而死公曰噫寡人之無徳也亦甚矣晏子曰君之徳著而不彰何為無徳景公曰何謂也對曰君之徳及後宫與臺榭之玩君之鴈食以菽粟君之宫内自樂延及後宫之族何為其無徳也顧臣有請于君由君之意自樂之心推與百姓同之則何殣之有又曰子貢問孔子人死有知將無知也孔子曰吾欲言死人有知也恐孝子妨生以送死也吾欲言死人無知也恐不孝子孫棄親不𦵏也賜欲知人死有知將無知也死徐自知之猶}
