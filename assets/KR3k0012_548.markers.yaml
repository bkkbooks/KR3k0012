  - {type: variant, offset: 204, length: 0, content: '', SBCK: 在室亦童子也無男昆弟使同姓爲攝主不杖則子一人杖謂長女也許}
  - {type: variant, offset: 204, length: 2, content: 嫁及, WYG: ''}
  - {type: variant, offset: 204, length: 0, content: '', krp: 在室亦童子也無男昆弟使同姓爲攝主不杖則子一人杖謂長女也許}
  - {type: variant, offset: 205, length: 1, content: 及, SBCK: 二十而笄笄爲成人成人正杖也又䘮服小記曰庶子不以杖即位下適子也位朝夕􅂘位也父不主庶子之䘮則孫以杖即位可也祖不厭孫孫得神也父}
  - {type: variant, offset: 205, length: 1, content: 及, krp: 二十而笄笄爲成人成人正杖也又䘮服小記曰庶子不以杖即位下適子也位朝夕哭位也父不主庶子之䘮則孫以杖即位可也祖不厭孫孫得神也父}
  - {type: variant, offset: 207, length: 1, content: 父, SBCK: 庶子爲妻以杖即位可也舅不主妾}
  - {type: variant, offset: 207, length: 0, content: '', WYG: 室者子皆杖不以即位子謂凡庶子也不以即位與去杖同也大夫士哭殯則杖哭柩則輯杖哭殯謂既𦵏也哭柩謂啓後也大夫士之子於}
  - {type: variant, offset: 207, length: 1, content: 父, krp: 庶子爲妻以杖即位可也舅不主妾}
  - {type: variant, offset: 208, length: 0, content: '', WYG: 母也遵近哭殯可以杖子哭諸侯}
  - {type: variant, offset: 209, length: 5, content: 室為父公士, SBCK: 䘮子得神也又􅄂記上曰古者貴賤皆杖叔孫武叔朝見輪人以其杖􅀜轂而輠輪者於是有爵而后杖也又䘮大紀曰}
  - {type: variant, offset: 209, length: 0, content: '', WYG: 子于父母也遵逺杖不入于廟門也棄杖者斷而棄之於隠者杖以喪至遵為人得而褒之又問喪曰或問曰杖者何也怪其義各異曰竹桐一也故為父苴杖苴杖竹也為母削杖削杖桐也言所以杖者義一也顧所用異耳或曰杖者以何為也怪所為施曰孝子喪親哭泣無數服勤三年身病體羸以杖扶病也言扶杖乃能起也則父在不敢杖矣尊者在故也堂上不杖辟尊者之處也堂上不趨示不遽也此孝子之志也人情之實也禮義之經也非從天降也非從地出也人情而已矣父在不杖謂為母也尊者不杖辟尊者之處不杖有事不趨皆為不感動使之憂慼也又喪服四制曰杖者何也爵也三日授子杖五日授大夫杖七日授士杖或曰擔主或曰輔病婦人童子不杖不能病也白虎通曰所以杖竹桐何取其名也竹戚也桐痛也父以竹母以桐竹陽也桐陰也竹斷而用之質故為陰也韓子曰儒執喪三大毁扶杖世主以為孝而禮之幗髽儀禮喪服曰女子子在}
