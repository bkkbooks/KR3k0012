  - {type: variant, offset: 1252, length: 106, content: 子思曰子雖未臣魯父母之國也先君宗廟在焉奈何弗服子思曰吾豈愛乎禮弗得也縣子曰請問之荅曰臣而出國君不掃其宗廟則不為之服又曰司徒文子改葬其叔父問服於子思子思曰禮父母改葬緦既葬而除不忍無服送至親也非父母無服無服則弔服加麻, WYG: 太廣爾助語}
