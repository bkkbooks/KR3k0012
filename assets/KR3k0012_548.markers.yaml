  - {type: variant, offset: 1361, length: 793, content: 人有同歲上計而卒欲為之服問於季立季立曰思好者其緦乎昔諸侯大夫共會事於王及以君命同盟霸主其死也則皆有哭臨之禮今之上計上覲天子有交醼之忻同名綈素上記先君下祿子弟相敦以好相厲以義又數相往來特有思親比之朋友不亦重乎白虎通曰弟子為師服者弟子有君臣父子朋友之道也故生竭敬而親之死則哀痛之恩深義重故為之服入則絰出則否習鑿齒漢晉春秋曰初文帝之崩也羊祜謂傅玄曰三年之喪雖貴遂服自天子達而漢文除之毀禮傷義常以為歎今上天縱至孝有曾閔之性雖奪其服而實行喪禮喪禮行除服何為耶若因此革魏之薄而興先王之法以敦厚風俗垂之百代不亦美乎玄曰漢文以來世乃淺薄不能行國君之喪因而除之數百年一旦復古恐難行也祜曰就不能使天下如禮且使主上遂服不猶善乎玄曰若主上不除而下除此為但有父子無君臣三綱之道虧矣君子曰傅玄知無君臣之傷教而不知兼無父子之為重豈不蔽惑哉漢廢君臣之喪不降父子之服故四海黎庶莫不盡於其新三綱之道二服恒用於私室而王者獨盡廢之豈所以孝治天下乎詩云猶之未遠其傅玄之謂也摯虞新禮議曰虞謹案古者諸侯臨君其國臣諸父兄之諸侯未同于古未同于古則其尊未全不宜使絕朞之制而令傍親服斬襄之重也諸侯既然則公孫之爵亦宜如舊又曰喪無弟子為師服之制新禮弟子為師襄臣虞謹案自古無服師之禮故仲尼之喪門人疑所服子貢曰昔夫子喪顏淵若喪子而無服請喪夫子若父而無服遂心喪三年此則懷三年之哀而無齊襄之制也出則絰居則否所謂弔加麻也先聖為禮必易從而可傳師從之義誠重而服制之若歷代相襲不以為疑宜定親新禮無服如舊摯虞決疑要注曰禮故臣為舊君齊襄三月謂策名委質稱臣吏者也見察舉而不為吏者弔服加麻襄冠毛詩羔裘曰素冠剌不能三年也庶見素冠兮棘人欒欒兮箋云時無三年之恩於父母廢其喪禮故冀幸一見素冠急於哀慼也周禮春官小宗伯曰王崩懸襄冠之式于路門之外肆師之職大喪禁外內男女之衰不中法者又夏官太僕曰大喪懸首服之法於宮酋服之法謂免髽笄總長短之數於宮門示四方也又天官內司服曰共后之衣服及九殯世, SBCK: ''}
