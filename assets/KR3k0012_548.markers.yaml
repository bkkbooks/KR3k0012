  - {type: variant, offset: 1017, length: 342, content: 也小功以下澡麻斷本既練遇麻斷本者於免絰之既免去絰每可以絰必絰既絰則去之禮統曰天子諸侯皆為貴臣妾服三月適夫人為八妾服三月八妾為夫人服與舅姑同家語曰門人疑所以服夫子者子貢曰昔夫子之喪顏淵若喪子而無服喪子路亦然請喪夫子若喪父而無服於是弟子皆服而加麻出有所之則猶絰孔叢子曰秦莊子死孟武伯問於孔子曰古者同僚有服乎曰然同僚有相友之義貴賤殊等不為同官聞諸老聃昔虢叔閎夭友太顛散宜生南宮括五臣者同僚比德以贊文武及虢叔死四人者為服友之服古達禮者行之又曰子思居衛魯穆公卒縣子使乎衛聞喪而服謂子思曰子雖未臣魯父母之國也先君宗廟在焉奈何弗服子思曰吾豈愛乎禮弗得也縣子曰請問之荅曰臣而出國君不掃其宗廟則不為之服又曰司徒文子改葬其叔父問服於子思子思曰禮父母改葬緦既葬而除不忍無服送至親也非父母無服無服則弔服加麻又, SBCK: ''}
