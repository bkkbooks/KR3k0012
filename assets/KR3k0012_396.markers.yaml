  - {type: variant, offset: 361, length: 0, content: '', SBCK: 夜渉溺死者千有餘人淮南子曰與溺者金玉不如與之一尋常之纒又曰父溺則􅄃父髮而整之非敢憍侮以救死也􅀃苑曰梁相死惠子欲之梁渡河而遽墮水中舩人救之曰居舩檝之間而溺無我則子死矣子何能相梁乎惠子曰居廣艘長檝之間則不如子至安國家全社稷子之比我䝉䝉如未視之駒曹毗神女杜蘭香傳曰神女姓杜字蘭香自云家昔在青草湖風溺大小盡没香時年三歳西王母接而養之於崑崙之山於今千歳矣異苑曰蜀郡張貞行舡覆溺死貞婦黄因投江就之積十四曰執夫手俱浮出又曰河内荀儒字君林乗􅖅省舅氏䧟河而死兄倫求尸積日不得設􅀕冰側牋與河伯投牋一􅀫岸側冰開尸首執牋浮出倫又牋謝又曰頴川荀茂逺景平中至南康夜夢一人頭有一角爲逺筮云君􅀂至都必得官問是何職荅曰官生于林於是而寤未解所况因復􅄰又夢部伍至楊州水門墮水而死作棺旣成逺入中自試恨小即見殯瘞葬渚次悵然驚覺以告母兄舩至水門過果落江而殞䘮儀一如其夢幽明錄曰蔡廓作䂊章郡未發大兒始迎婦在渚次兒欲渡婦舡衣挂舡頭遂墮水即没徐羡之作楊州登勑兩岸厚賞漁人及昆崙共尋覔至二更不得婦哀泣之間髣髴如夢聞聲告之曰吾今在卿舡下以告婢婢白之令水工没覔果見坐在舡下􅀄出水顔色如平生三輔決録曰文帝竇后名猗清河觀津人也父遭􅁗之亂隱身漁釣墜淵而卒景帝即位后登尊號遣使者更填父所墜淵而築起大墳觀津城南青山是也益部􅂄舊傳曰孝女叔光雄者犍爲人也父泥和永建􅀄爲縣功曹乗舡墮水物故尸䘮不歸號泣晝夜心不圖存所生男女二人並數歳雄乃各爲囊盛珠環以繫兒數爲訣別之辭家人毎防閑之後稍懈因乗小舡於父堕處慟􅂘遂自投水死弟賢其夕夢雄告之却後六日當共父同出至期伺之果與父相持江上郡縣表上爲雄立碑圖像其形焉愽物志曰澹臺子羽渡水子溺死將葬之㓕明日此命也吾豈與螻蟻爲親戚魚鼈爲仇讎遂以葬之又曰南郡冝城王子山到太山從鮑子真學筭到魯賦靈光殿歸渡湘水溺死時年二十許其弟子玉親見之樂府解曰公無渡河}
