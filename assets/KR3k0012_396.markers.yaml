  - {type: variant, offset: 825, length: 0, content: '', SBCK: 昔者孔子殁子夏子游子張以有􅀂似聖人欲以所事孔子事之強曽子曽子曰不可江漢以濯之秋陽以􅁀之皜皜乎不可尚已劉昭㓜童傳曰漢孝昭帝諱弗陵武帝少子也年五六歳壯大武帝云􅀋我甚竒之江表傳曰孫皓夫人死皓哀􅉖葬於苑中皓治喪於内半年不出國人見葬太奢麗皆謂皓巳死所葬者是也皓舅子何都顔狀似皓云都代立也孔融別傳曰融爲太中大夫虎賁士皃似蔡邕每酒酣輒引與同坐曰雖無老成人尚有典刑續搜神記曰吴興施續爲吴尋陽督能言論有門生亦有意理常秉無􅀑論門生後渡江忽有一單衣白帢}
