  - {type: variant, offset: 2830, length: 3, content: 父善游, SBCK: 刻其形像以旁求之旅於民間􅀃築􅀓巖之野惟肖􅀓氏之巖在虞虢之界肖似所夢之形也史記曰孟甞君將入􅁗賔客諌不聽蘇代謂曰今旦代從外來見木偶人與土偶人相與語木偶人曰天雨子􅀅敗矣土偶人曰我生於土敗即歸土今天雨流子而行未知所止息也今􅁗虎狼國也而君欲徃如有不得還無乃爲土偶人所􅀏乎孟常君乃止國語曰越㓕吴范蠡遂乗輕舟而浮於五湖莫知其終極越王命工以良金冩范蠡之狀朝禮之環㑹稽三百里以爲范蠡地春秋後語曰􅁗欲攻安邑恐齊救之則以宋委於齊曰宋王無道爲木人以像寡人射其靣寡人地絶兵逺不能攻也王苟能破宋有之寡人如自得之戰國䇿曰孟甞君將入􅁗􅂫􅁗謂曰今臣經緇上有土偶人與桃梗人相與語桃梗謂􅁟偶人曰子西岸土也八月雨降淄水至則子殘矣曰吾殘則復西岸子東園梗也刻削爲人淄水至而去漂然將何所之矣孟甞乃止漢書曰匈奴畏郅都之威刻木像都之狀交弓射之莫能中魏志曰鮑信與太祖擊黄巾信乃闘死太祖購求信䘮不得乃刻木如信形􅀕而哭之魏略曰時苗字德胄鉅鹿人少清白爲人疾惡出爲壽春令令行風靡楊州治在其縣時蔣濟爲治中苗以􅀄至任欲謁濟濟素好酒適㑹其醉不能見苗苗怨恨還刻木爲人署曰酒徒蔣濟立之於壇旦夕射之江表傳曰孫權}
  - {type: page-break, offset: 2830, content: '', id: KR3k0012_SBCK_396-8a}
  - {type: page-break, offset: 2830, content: '', id: KR3k0012_SBCK_396-8b}
  - {type: variant, offset: 2830, length: 3, content: 父善游, WYG: 刻其形像以旁求之放於民間説築傅巖之野惟肖傅氏之巖在虞虢之界肖似所夢之形也史記曰孟嘗君將入秦賔客諫不聽蘇代謂曰今旦代從外來見木偶人與土偶人相與語木偶人曰天雨子將敗矣土偶人曰我生於土敗即歸土今天雨流子而行未知所止息也今秦虎狼國也而君欲往如有不得還無乃為土偶人所笑乎孟嘗君乃止國語曰越滅呉范蠡遂乘輕舟而浮於五湖莫知其終極越王命工以良金寫范蠡之狀朝禮之環㑹稽三百里以為范蠡地春秋後語曰秦欲攻安邑恐齊救之則以宋委於齊曰宋王無道為木人以像寡人射其面寡人地絶兵逺不能攻也王苟能破宋有之寡人如自得之戰國策曰孟嘗君將入秦蘇秦謂曰今臣經淄上有土偶人與桃梗人相與語桃梗謂土偶人曰子西岸土也八月雨降淄水至則子殘矣曰吾殘則復西岸子東園梗也刻削為人淄水至則去漂然將何所知矣孟嘗乃止漢書曰匈奴畏郅都之威刻木像都之狀交弓射之莫能中魏志曰鮑信與太祖擊黄巾信乃鬭死太祖購求信䘮不得乃刻木如信形祭而哭之魏畧曰時苖字徳胄鉅鹿人少清白為人疾惡出為壽春令令行風靡揚州治在其縣時蔣濟為治中苗以初至任欲謁濟濟素好酒適㑹其醉不能見苗苗恚恨還刻木為人署曰酒徒蔣濟立之於壇旦夕射之江表傳曰孫權}
