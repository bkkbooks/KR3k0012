  - {type: variant, offset: 826, length: 0, content: '', SBCK: 來因共言語遂及􅀑神客辞屈乃語曰僕便是􅀑何以云無受使來取君門生請乞酸苦􅀑問有似君者不云施續下都督與僕相似􅀑許}
