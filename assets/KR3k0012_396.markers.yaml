  - {type: variant, offset: 825, length: 0, content: '', WYG: 昔者孔子殁子夏子游子張以有若似聖人欲以所事孔子事之强曽子曽子曰不可江漢以濯之秋陽以暴之皜皜乎不可尚也劉昭幼童傳曰漢孝昭帝諱弗陵武帝少子也年五六歳壯大多智武帝云類我甚竒之江表傳曰孫皓夫人死皓哀愍葬於苑中皓治䘮於内半年不出國人見葬大奢麗皆為皓已死所葬者是也皓舅子何都顔狀似皓云都代立也孔融别傳曰融為大中大夫虎賁士貎似蔡邕每酒酣輒引與同坐曰雖無老成人尚有典刑續捜神記曰呉興施續為呉潯陽督能言論有門生亦有意理常秉無鬼論門生後渡江忽有一單衣白帢}
