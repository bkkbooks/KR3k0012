  - {type: variant, offset: 1764, length: 711, content: 白韓子曰燕人李季好遠遊其妻私通他人季忽歸私通者在內其妻令被髮直出門季曰何人耶妻曰無人季曰吾見鬼耶妻曰宣五牲屎浴季曰諾乃浴以狗屎說苑曰秦繆公見百里奚牛肥公曰牛何以肥對曰臣飲食之以時使之不暴有嶮先後之以身是以牛肥公知其君子令有司具沐浴為衣冠坐與語公大悅外國圖曰方江之上暑濕生男子三年而死有黃水婦人入浴出則乳矣去九嶷二萬四千里丘淵之征齊道理記曰朱靈城東有管寧舊宅宅前有水是寧常所澡浴處石虎鄴中記曰石虎金華殿後有虎皇后浴室三間徘徊及宇櫨枰隱起彤采刻鏤彫文粲麗四月八日九龍衘水浴太子之像又太武殿前溝水注浴時溝中先安銅籠䟽其次用葛其次用紗相去六七步斷水又安玉盤受十斛又安銅龜飲穢水出後腳入諸公主第溝亦出建春門東又顯陽殿後有皇后浴池上作石室引外溝水注之室中臨池上有石床世說曰桓車騎不好著新衣浴訖婦固送新衣桓冲也車騎大怒催使將去婦便持還傳語云衣不經新何由而故桓大笑而著之幽明錄曰桓溫內懷無君之心時比丘尼從遠來夏五月尼在別室浴溫竊窺之見尼祼身先以刀自破腹出五藏次斷兩足及斬頭手有頃浴竟溫問向窺見尼何得自殘毀如此尼云公作天子亦當如是溫惆悵不悅盥說文曰盥洒面也澡洒手也先洒足也尚書顧命曰盥以異同秉璋以酢太保以盥手洗異同實酒禮記內則曰子事父母雞初鳴咸盥漱又曰進盥少者奉槃長者奉水請沃盥盥卒授巾槃盛盥水者左傳僖中曰懷羸奉迤沃盥既而揮之懷羸怒曰秦晉疋也何以卑我後漢書曰劉寬簡略嗜酒不好盥浴澡手曰盥京師以為諺唐書曰虞世南受學於吳郡顧野王經十餘年精思不倦或累旬不盥櫛莊子曰陽子居遇老子老子中道仰天歎曰始以汝為可教也今不可也陽子居不荅至舍進盥漱巾櫛脫履戶外膝行而前曰向者弟子欲請問夫子夫子行不問今間矣請問其過管子曰冬日不盥非愛水也夏日不煬非愛火也為不適於身, SBCK: 甲罷}
