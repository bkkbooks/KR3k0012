  - {type: variant, offset: 987, length: 462, content: 當有人欲代湯者呂氏春秋曰昔者禹一沐而三捉髮一食而三起以禮有道之士淮南子曰湯沐具而蟣虱相吊大廈成而鷰雀相賀六韜曰文王聞殺崇侯虎歸至酆令具湯沐論衡曰子日沐令人愛卯日沐令人白頭案人之愛憎頭之白黑在乎自然但使嫫母子日沐能令人愛耶使十五童子卯日沐能令髮白耶世本曰秦穆公作沐異苑曰北海任詡字彥期從軍十年乃歸臨還握粟出卜師云非屋莫宿非食時莫沐詡結伴數十暮遇雷相庇於巖下竊憶非屋莫宿之戒遂負檐櫛沐巖崩壓停者悉死至家妻先與外人通情謀共殺之請以濕髮為識婦宵則勸詡令沐復憶非食時莫沐之忌收髮而止婦慚愧負怍乃自沐焉散髮同寢通者夜來不知婦也斬首而去楚辭曰浴蘭湯兮沐芳華采衣兮若英又漁父曰吾聞新沐者必彈冠新浴者必振衣安能以身之察察受物之汶汶乎浴說文曰浴洒身也禮記內則曰五日則燂湯請浴外內不共湢音逼浴湢浴室也禮記儒行曰儒有澡身而浴德常自清潔於身沐浴於德也左傳僖中曰晉公子重耳及曹曹共公聞其駢脅欲觀其祼浴薄而觀之又文下曰齊懿公之為太子也與邴歜之父爭田不勝及即位乃掘而刖之而使歜僕僕御納閻職之妻而使職參乘五月公游于申池二人浴于池歜以朴柣職朴箠柣擊職怒歜曰人奪, SBCK: 夫歌予和}
