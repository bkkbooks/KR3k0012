  - {type: variant, offset: 2827, length: 1, content: 此, WYG: 官家甚似劉司空温大悦即出外修整衣冠又入呼問我何䖏似司空婢荅曰眼甚似恨小面甚似恨薄鬚甚似恨赤形甚似恨短聲甚似恨雌宣武於是㢮冠解帶不覺惽然而睡不怡者數日偶像説文曰偶人也尚書説命曰髙宗夢得説使百工營求諸野得諸傅巖王庸作書以誥曰以台正于四方台恐徳弗類兹故弗言恭黙思道夢帝賚予良弼}
