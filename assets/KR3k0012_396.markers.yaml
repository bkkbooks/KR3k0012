  - {type: variant, offset: 2827, length: 1, content: 此, SBCK: 官家甚似劉司空温大恱即出外脩整衣冠又入呼問我何處似司空婢荅曰眼甚似恨小面甚似恨薄䰅甚似恨赤形甚似恨短聲甚似恨雌宣武於是㢮冠解帶不覺惛然而睡不怡者數日偶像􅀃文曰偶人也尚書􅀃命曰髙宗夢得􅀃使百工營求諸野得諸􅀓巖王庸作書以誥曰以台正于四方台恐德弗類兹故弗言恭黙思道夢帝頼子良弼}
