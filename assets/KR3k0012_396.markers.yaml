  - {type: variant, offset: 302, length: 2, content: 陳逆, SBCK: 僅免於死魏志曰管輅族兄孝國居在斥丘輅徃從之與二客㑹客去後輅謂國曰此二人天庭及口耳之間同有凶氣累變俱起􅀟宅流魄于海骨歸于家少許時並當死也復數十日二人飲酒醉夜共載牛渴下道入漳河中皆即溺死也又曰帝幸許昌杜畿居守受詔作御樓舡於陶河試舡遇風没帝爲之流涕詔曰昔􅄀勤其官而水死稷勤百榖而山死故尚書僕射杜畿於孟津試舩遂至覆没忠之至也朕甚􅉖焉追贈太僕謚曰戴侯吴録曰孫䇿討黄祖表曰臣討黄祖斬首二萬餘級其赴水溺死二萬餘口舩六十餘艘財物山積唐書曰封德彛隋開皇末江南作亂内史令楊素徃征之署爲行軍記室泊舩海曲素夜召之德彛墜於水中人救免溺乃易衣以見竟􅃦不言素後知問其故荅曰私事也所以不白素甚嗟異之莊}
