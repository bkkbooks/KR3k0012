  - {type: variant, offset: 770, length: 1, content: 景, WYG: 孝靈皇帝王美人生皇子協協生十餘日何皇后妬殺美人靈帝母永樂董太后攝養協號曰董侯董侯似靈帝八嵗能讀詩書魏志曰初髙勾麗王生能開目視國人惡之及長果㓙虐數鈔曽孫位生亦能開目視國人惡之勾麗呼相似為位以似其曽祖故名曰位晉書曰桓𤣥聞義軍起憂懼曰何無忌劉牢之外甥酷似其舅共舉大事何慮不成又曰蜀人王富作亂郡縣討平之初諸葛孔明有盛徳于蜀土子瞻又身死王事蜀人思之謂瞻不死故將謂王富曰君狀貎甚似諸葛孔明子因此思尅復以扼巴蜀晉中興書曰王允之字淵猷年在惣角從伯敦知之謂為似已入則共寢檀道鸞晉陽秋曰初議以無隠之為黄門郎而隠之貎似太宗上不忍見故改焉齊書曰謝宏㣲性嚴正舉止必修禮度時有蔡湛之者及見謝安兄弟謂人曰宏㣲貎類中郎而性似文靖梁書曰王筠字元禮瑯琊人年十六為芍藥賦沈約曰王郎神似袁}
