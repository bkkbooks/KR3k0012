  - {type: variant, offset: 770, length: 1, content: 景, SBCK: 孝靈皇帝王羙人生皇子恊恊生十餘日何皇后妬殺羙人靈帝母永樂董太后攝養恊號曰董侯董侯八􅀊能讀詩書魏志曰􅀄髙勾麗王生能開目視國人惡之及長果凶虐數冠鈔曽孫位生亦能開目視國人惡之勾麗呼相似爲位以似其曽祖故名曰位晉書曰桓玄聞義軍起憂懼曰何無忌劉牢之外生酷似其舅共舉大事何慮不成又曰蜀人王冨作亂郡縣討平之􅀄諸葛孔明有盛德于蜀土子瞻又身死王事蜀人思之爲瞻不死故將謂王冨曰君狀貌甚似諸葛亮君因此思尅復以覇巴蜀晉中興書曰王允之字淵猷年在揔角從伯敦知之謂爲似已入則共寢檀道鸞晉陽秋曰􅀄議以吴隱之爲黄門郎而隱之皃似太宗上不忍見故攻焉齊書曰謝弘微性嚴正舉止必脩禮度時有蔡湛之者及見謝安兄弟謂人曰弘微皃􅀋中郎而性似文靖梁書曰王筠字元禮琅瑘人年十六爲芍藥賦沈約曰王郎非唯額似􅀽}
