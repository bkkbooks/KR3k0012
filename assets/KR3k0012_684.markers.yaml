  - {type: variant, offset: 1800, length: 687, content: 如此者三允曰印雖始成而已被辱問送印者果懷之而墜于廁又曰平原太守劉邠取印囊及山鷄毛著器中使管輅筮之輅曰內方外圓五色成文合寶守信出則有章此印囊也又曰咸熙元年鎮西將軍衛瓘上雍州兵於成都縣得璧玉印各一印文似成信字依周成王歸禾之義宣示百官相國府吳志曰劉禪襲位諸葛亮秉政與權連和時事所宜權輒輒令陸遜報語并刻權印以置其所權每與禪亮書常過示遜輕重可否有所不安便令改以封行之晉書曰孔愉封餘不亭侯愉曾行經餘不亭見籠龜於路者買而放之溪中流左顧者數四及是鑄侯印而左顧三改如初印工告愉愉悟乃佩焉又曰趙王倫僣位而以茍且之惠取悅人情金銀冶鑄不給於印故有白板之侯君子恥服其章宋書曰孔琳之為尚書左丞楊州中從事史所居著績時責眾官獻便宜琳建言曰夫璽印者所以辨章官爵立契符信官莫大於皇帝爵莫尊於公侯而傳國之璽歷代遞用襲封之印弈世相傳貴在仍舊無取改作今世唯尉一職獨用一印至內外群官每遷悉改討尋其義私所未達若謂官各異姓與傳襲不同則未若異代之為殊也若論其名器雖有公卿之貴未若帝王之重若以或有誅夷之臣忌其凶穢則漢用秦璽延祚四百未聞以子嬰身戮國亡而棄之不佩帝王公侯之尊不疑於傳璽人臣眾僚之卑何嫌於即印載籍未聞其說推別自乖其准而終年刻鑄喪功消實金銀銅炭之費不可稱言非所以因循舊貫易簡之道愚請眾官即用一印無煩改作若新置官官多印少又或零失然後乃鑄則仰禆天府非唯小益齊書曰巴西人趙續伯反奉其鄉人李弘為聖王弘乘佛輿以五綵裹青石誑百姓云天與己玉印當王蜀後敗梁書曰何思澄自廷尉正遷治書侍御史宋齊已來此職甚輕天監初始重其選車前依尚書二丞給三騶執盛印青囊舊事糺彈印綬在前故也又曰王瑩拜將軍印工鑄其印六鑄而龜六毀既成鎮空不實補而用之居職六日暴卒, SBCK: 飾}
