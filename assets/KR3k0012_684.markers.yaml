  - {type: variant, offset: 33, length: 0, content: '', SBCK: 縞冠素紕㐫服之象也垂長緌明非旣祥玄冠縞武不齒之服也所放不帥教者居冠屬武謂燕居冠也著冠於武少威儀自天子下達有事然後緌燕無事者去飾又曰玄冠紫緌自魯桓公始也盖僣宋王者之後服也緌當用績又冠義曰冠者禮之始也古者冠禮筮日筮賔所以敬冠事敬冠事所以重禮重禮所以爲國本也傳曰狄人滅衛齊桓公封衛于楚丘衛國忘亡忘其滅亡之困衛文公大布之衣大帛之冠用諸侯諒闇之服又曰鄭子華之弟子臧奔宋好聚鷸冠鷸鳥名聚鷸羽爲冠}
