  - {type: variant, offset: 2773, length: 183, content: 大將軍黃金印龜紐文曰章御史大夫章匈奴單于黃金印橐駞紐文曰章御史二千石銀印龜紐文曰章千石六百石四百石皆銅印鼻紐文曰印章二百石以上皆為通官印續漢禮儀志曰印璽柙金鏤大貴人長公主銅鏤江表傳曰吳歷陵縣有名山臨水高百丈其上三十丈有七穿相傳謂之石印石印神有三郎時歷陵長表言石印文發孫皓大喜遣使祭歷陵使者以高梯上省印文詐以朱書曰楚九州都楊作天子還以印文啟皓皓曰太平之主非孫復誰以印綬, WYG: ''}
