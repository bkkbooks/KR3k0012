  - {type: variant, offset: 2770, length: 1, content: 印, SBCK: 與曰以粟易之曰許于奚爲不自織曰害於耕韓子曰齊桓公飲酒遺其冠耻之三日不朝管仲曰此有國者之耻公胡不雪之以政公曰善因發囷倉賜貧窮論囹圄出薄罪處三日而民謌之曰公胡不復遺其冠乎晏子春秋曰景公爲巨冠長衣以聽朝淮南子曰莊王誅史里孫叔敖制冠澣衣史里侫臣也惡人死自知當見用故作冠澣衣又曰楚莊王好觟胡瓦切冠楚國効之也許愼注曰今力土冠又曰冠之於人也寒不能煖風弗能鄣暴不能敵然而戴冠履屨者其所自託者然又曰魯人身善制冠妾善織履徃徙於越而大困以有用遊於不用之郷也􅃈語曰范獻子卜獵命人占之其繇也曰君子得黿小人遺冠范獻子獵而無得遺其豹冠語林曰}
  - {type: page-break, offset: 2770, content: '', id: KR3k0012_SBCK_684-7a}
