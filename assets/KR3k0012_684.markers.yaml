  - {type: variant, offset: 30, length: 1, content: 驗, WYG: 服又曰術氏冠有五綵衣青𤣥裳前員其制差池四重趙氏靈王好服之今不施用也白虎通曰人所以有冠者卷也所以卷持髪也人懷五德莫不貴德示成禮有修餙文章故制冠以餙首别成人也三禮圖曰緇布冠始冠之冠也太古冠布齊則緇之今武冠則其遺象也太古未有絲繒始麻布耳又曰建華冠祠天地五郊八佾舞人服之以鐡為柱卷貫雜大珠九枚禮記檀弓曰古者冠縮縫今也衡縫縮從也今禮制衡讀為横今冠横縫以其辟積多故喪冠之反吉非古也時人之喪冠縮縫古冠耳又郊特牲曰冠義始冠之冠緇布冠也始冠三加冠先加緇布冠太古冠布齊則緇之其緌也齊則緇之鬼神重幽闇也孔子曰吾未之聞也冠而敝之可也三代改制齊冠不用適子冠於阼以著代也醮於客位嘉有成也三加彌尊諭其志也始加緇布冠次皮弁次爵弁冠益尊而志益大也冠而字之敬其名也委貌周道也章甫殷道也毋追上音牟下音堆夏后氏之道也周弁殷冔夏收三王共皮弁素積所不易於先代又曰黄衣黄冠而祭息田夫也野夫黄冠黄冠草服也以息民象季秋草木黄落又曰玉藻始冠緇布冠自諸侯下逹冠而敝之可也本大古耳非時王之法服也𤣥冠朱組纓天子之冠也緇布冠繢緌諸侯之冠也皆始冠之冠也𤣥冠委貌緌諸侯緇布冠有緌尊者飾也繢或作繪緌或作㽔𤣥冠丹組纓諸侯之齊冠也𤣥冠綦組纓士之齊冠也言齊時所服也四命以上齋祭異冠也縞冠𤣥武子姓之冠謂父有喪服子為之不純吉也武冠卷也古者冠卷也縞冠素紕既祥之冠也紕縁邊也紕讀如埤益之埤既祥之冠也已祥祭而祭之服也垂緌五寸惰㳺之士也惰㳺罷民}
