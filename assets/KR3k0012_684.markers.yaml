  - {type: variant, offset: 3620, length: 134, content: 可八九仲將問長文從誰得法長文曰本出漢世又印工宗養以法語程申伯相印經曰印有八角十二芒印欲得周正上穩下平光明潔清如此皆吉夢書曰印鉤為人子所保也夢見印鉤人得子含吞印鉤懷妊婦也失印子傷墮傅玄印銘曰惟昔先王配天垂則乃設印章作信萬國取象晷儀是銘是刻文明慎密直方其德本立道生歸乎玄黑, SBCK: 四}
