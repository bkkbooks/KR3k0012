  - {type: variant, offset: 27, length: 4, content: 封物為驗, SBCK: 貫韜髪也董巴漢輿服志曰上古穴居野處衣毛而冐皮未有制度後世聖人易之以􅁝麻觀翬翟之文榮華之色乃染帛以効之始作五綵成爲五緌又曰術氏冠有五彩衣青玄裳前貟其制差池四重趙氏靈王好服之今不施用也白虎通曰人所以有冠者也所以持髪也人懷五德莫不貴德示成禮有脩飾文章故制冠以飾首別成人也三禮圗曰緇布冠始冠之冠也太古冠布齋則緇之今武冠則其遺象也太古未有􅁝繒始麻布耳又曰建華冠祠天地五郊八佾舞人服之以䥫爲柱卷貫雜大珠九枚禮記檀弓曰古者冠縮縫今也衡縫縮從也今禮制衡讀爲横今冠横縫以其辟積多故䘮冠之反􅁻非古也解時人之喪冠縮縫古冠耳又郊特牲曰冠義始冠之緇布之冠也始冠三加先加緇布冠太古冠布齋則緇之其緌也齋則緇之􅀑神重幽闇也孔子曰吾未之聞也冠而敝之可也三代改制齋冠不用適子冠於阼以著代也醮於客位加有成也三加彌尊喻其志也始加緇布冠次皮弁次爵弁冠益尊而志益大也冠而字之敬其名也委貌周道也章甫殷道也母追上音牟下音堆夏后氏之道也周弁殷冔音詡夏収三王共皮弁素積所不易於先代又曰黄衣黄冠而􅀕息田夫也野夫黄冠黄冠草服也以息民服象季秋草木黄落又玉藻曰始冠緇布冠自諸侯下達冠而敝之可也本大古耳非時王之法服也玄冠朱組纓天子之冠也緇布冠繢緌諸侯之冠也皆始冠之冠也玄冠委皃委諸侯緇布冠有緌尊者飾也繢或作繪緌或作㽔玄冠丹組纓諸侯之齋冠也玄冠綦組纓士之齋冠也言齋時所服也四命巳上齋􅀕異冠也縞冠玄武子姓之冠也謂父有䘮服子爲之不純􅁻也武冠卷也古者冠卷也縞冠素紕旣祥之冠也紕縁􅁁也紕讀如埤益之埤旣祥之冠也巳祥祭而服之也垂緌五寸惰游之士也惰㳺罷民}
