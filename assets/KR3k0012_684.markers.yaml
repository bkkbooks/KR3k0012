  - {type: variant, offset: 2602, length: 0, content: '', SBCK: 官配五方臣請冠上加一星衣從方色國語曰定王使單襄聘于宋遂假道於陳以聘于楚及陳陳靈公與孔寗儀行父南冠以如夏氏單子歸告王曰陳我大􅁎之後也棄衮冕而南冠以出不亦簡彛乎言簡畧常服也家語曰哀公問孔子曰昔舜何冠孔子不對公曰有問於子不對何也對曰舜之爲君好生惡殺任能授賢君舎此不遵而冠是問是以緩對又曰大夫請罪用白冠􅈊纓周書曰成王}
