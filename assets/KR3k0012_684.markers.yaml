  - {type: variant, offset: 771, length: 420, content: 印綬就加勝輒推不受曰吾受漢家厚恩無以報今老矣旦暮入地豈宜以一身事二姓下見故主哉又曰王莽篡位遣五威將王駿率甄阜等六人多齎金帛遺單于諭曉以受命代漢狀因易單于印故文曰匈奴單于璽莽更曰新匈奴單于章詔命令上故印左姑夕侯蘇從旁謂單于曰未見新印文宜勿與單于曰印文何由變更遂解故印綬奉上將率受著新綬不能視印飲食至夜迺罷右率陳饒謂諸將率曰嚮者姑夕侯疑印文幾令單于不與人如令視印見其變改必求故印此非辭說所能距也即引斧椎壞之明日單于果遣右骨都侯當白將率曰漢賜單于璽言璽不言章又無漢字諸王以下迺有漢言章今即去璽加新與臣下無別願得故印將率示以故印謂曰新室順天制作單于宜承天命奉新室之制當還白單于知已無可奈何又多得賂遣即遣弟右賢王奉馬牛隨將率入謝又曰王莽篡位莽皇孫功崇公宗坐自畫容貌被服天子衣冠刻印三一曰維祉冠存巳夏處南山藏薄水祉福也冠存巳夏處南山就陰涼也藏薄冰亦陰二曰肅聖寶繼莽自謂舜後能肅敬得天寶龜宗欲繼之也三曰德封昌圖宗自言以德見封當昌熾受圖籍也後事發案驗宗自殺, SBCK: 待陽薦陽薦禹於成帝召爲大夫}
