  - {type: variant, offset: 3143, length: 363, content: 事等級遂多遷補轉徙如流能否無以著黜陟不得彰此為治之大弊也漢法官人不得真秩京房為魏郡太守以八百石居之魏初用輕貧先亦試守不稱則繼以左遷然則雋才登進無能降退此則所謂有知必試而使人以器者也臣以為今宜大併郡守等級使同古者明試守左遷之例官人之理盡則士必量能而受爵矣桓溫集略表曰今天下分崩喪亂殄瘁雖道隆中興而戶口彫寡近方漢時不當一郡之民民戶既少則勢不多而當必同古制百官備職實非大易隨時之宜且設官以理務務寡則官省官省以國治則職顯而人清故光武初興多所併省諸葛亮相蜀簡才併官此皆達治之成規今日之所先也宜從權制併官省職愚謂門下三省祕書著作通可減半古以九卿綜事不專尚書故重九棘也今事歸內臺則九卿為虛設之位唯太常廷尉職不可闕其諸員外散官及軍府參佐職無所掌者皆併若車駕郊廟籍田之屬凡諸大事於禮宜置者臨時權兼事訖則罷職既併則官少而才精職理則無害民而治道康矣, SBCK: 四}
