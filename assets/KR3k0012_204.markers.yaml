  - {type: variant, offset: 215, length: 195, content: 祖也問何故以鳥為官也郯子曰吾祖也我知之昔黃帝氏以雲紀故為雲師而雲名黃帝軒轅氏姬姓之祖也黃帝受命有雲瑞故以雲紀事百官師長皆以雲為名號也炎帝氏以火紀故為火師而火名神農姜姓之祖也有火瑞故以火紀事名官也共工氏以水紀故為水師而水名共工以諸侯霸九州者在神農前太昊後亦受水瑞以水名官也太皞氏以龍紀故為龍師而龍名太皞伏羲氏風姓之祖也有龍瑞故以龍命官也我高祖少皞摯之立也鳳鳥適至故紀於鳥為鳥師而鳥名自顓頊以來, SBCK: 此}
