  - {type: variant, offset: 456, length: 301, content: 乃命羲和欽若昊天曆象日月星辰敬授人時羲氏和氏世掌天地四時之官使敬順天時以授人也分命羲仲宅嵎夷曰晹谷羲仲居治東方之官宅居也東表之地稱嵎夷寅賓出日平秩東作使敬導出日平均次序東作之事以務農也申命羲叔宅南交羲叔居治南方之官南交言夏與春交平秩南訛敬致訛化也平存南方化育之事敬行其教以致其功分命和仲宅西曰昧谷居治西方之官寅餞納日平秩西成餞送也西方萬物成平序其攻助成物也申命和叔宅朔方曰幽都平在朔易都謂所聚也易謂歲改易於北方平均在察其政以順天常允釐百工庶績咸熙定四時成歲以告時援事則眾功皆廣又舜典曰咨四嶽有能奮庸熙帝之載奮起也有能起發其功廣堯之事也使宅百揆亮采惠疇亮信惠順也使君百揆之官信立其功順其事者誰乎僉曰伯禹作, SBCK: 大}
