  - {type: variant, offset: 4, length: 4, content: 揔敘官禮, SBCK: 舉千里止君園池食君魚鼈啄君忝梁無此五德猶貴之以其所從來者逺也臣將去君黃鵠舉矣哀公曰止吾將書子之言也饒曰臣聞食其食者不毀其器䕃其樹者不折其枝有臣不用何書其言遂去之燕燕用爲相三年燕政大治哀公喟然太息爲之避寢左傳曰仲虺居薛爲湯左相又曰齊桓公置射鈎而使管仲相國語曰季文子相宣公成公無衣帛之妾無食粟之馬仲孫他諌曰子爲魯上卿相二君矣妾無衣帛馬不食粟人其以子爲愛且不華國乎文子曰吾亦願之然吾觀國人其父兄之食麤衣惡而我羙妾與馬無乃非相人乎且吾聞之以徳榮爲華不聞以妾與馬文子以告孟獻子獻子囚之七日自是子服之妾衣不過七􅂛之布馬餼不過稂莠餼米也稂童粮史}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_204-1b}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_204-2a}
  - {type: variant, offset: 4, length: 5, content: 揔敘官禮記, WYG: 舉千里止君園池食君魚鼈啄君黍梁無此五徳猶貴之以其所從来者逺也臣将去若黄鵠舉矣哀公曰止吾将書子之言也饒曰臣聞食其食者不毁其器䕃其樹者不折其枝有臣不用何書其言遂去之燕燕用為相三年燕政大治哀公喟然嘆息為之避寝左傳曰仲虺居薛為湯左相又曰齊桓公置射鈎而使管仲相國語曰季文子相宣公成公無衣帛之妾無食粟之馬仲孫他諫曰子為魯上卿相二君矣妾無衣帛馬不食粟人其以子為愛且不華國乎文子曰吾亦願之然吾觀國人其父兄之食粗而衣惡者猶多矣吾是以不敢又曰石奢楚昭王相也堅直㢘正無所避行縣道有殺人者相追之乃其父也縱其父還自繫使人言之王曰殺人者臣之父也夫以父立政不孝也廢法縱罪非忠也臣罪當死王曰追而不及不當伏罪奢曰不私其父非孝也不奉王法非忠也王赦罪上惠也伏誅而死臣職也遂不受命自刎而死又曰五羖大夫之相秦也勞不坐乘暑不張盖行國中不驅車乘不操干戈功名藏於府庫徳行施於後世五羖大夫死國中男女流涕童子不歌謡舂者不相杵又曰秦荘襄王薨太子政立尊吕不韋為相國號稱仲父又曰二世誅李斯乃拜趙高為中丞相事無大小皆決之又曰趙高為丞相欲為亂恐羣臣不聽乃先設騐持鹿獻於二世曰馬也二世笑曰丞相誤耶謂鹿為馬問左右或黙或言馬以阿順趙高或言鹿者高因隂中以法又曰韋丞相賢者魯人以讀術為吏至大鴻臚有相工相之當至丞相有男四人相之至第二子名元成相工曰此子貴當封侯丞相曰我為丞相有長子是安從得之後賢竟為丞相病死而長子有罪論不得嗣而立元成又曰魏相者濟隂人以文吏至丞相其人好武令諸吏帶劔前奏事或有不帶劔者當入奏事乃借劔而敢入又曰匡衡為御史大夫嵗餘韋丞相死代為丞相封樂安侯衡十年之間不出長安城門位至丞相豈非遇時而合也漢書曰陳平武陽人周勃沛人高帝即位以勃為右丞相以平為左丞相帝問勃曰一嵗决獄錢榖出入㡬何勃不知汗出浹背上問平平}
