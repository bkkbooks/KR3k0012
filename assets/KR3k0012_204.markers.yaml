  - {type: punctuation, offset: 10, content: 「, id: KR3k0012_CHANT_204-bkkpn4}
  - {type: variant, offset: 10, length: 0, content: '', SBCK: 黃帝得六相而天地治神明至黃帝得􅃖尤而明天道得太常而察地利得奢龍而辨東方得祝融而辨南方得風后而辨西方得后土而辨北方謂之六相又曰堯舉八凱倉舒隤敳檮戭大臨尨降庭堅仲容叔逹爲八凱即垂益禹臯陶之倫也庭堅即臯陶字也使主后土后土地官也以揆百事莫不時叙地平天成揆度成亦平也舉八元伯􅁬仲堪叔獻季仲伯虎仲熊叔豹季狸爲八元也使布五敎于四方内平外成内諸夏外夷狄謂之十六相亦曰十六族又曰􅁗悼武王二年始置丞相官樗里疾甘茂爲左右丞相又曰鄭以子産爲相一年竪子不戲狎班白不提挈童子不犁畔二年市不豫賈三年門不夜閇道不拾遺四年田器不歸五年土無尺籍喪期不令而治鄭二十六年而死丁壯號哭老人兒啼子産去我死乎民將安歸又曰公儀休爲魯相客}
  - {type: variant, offset: 10, length: 0, content: '', krp: 黃帝得六相而天地治神明至黃帝得蚩尤而明天道得太常而察地利得奢龍而辨東方得祝融而辨南方得風后而辨西方得后土而辨北方謂之六相又曰堯舉八凱倉舒隤敳檮戭大臨尨降庭堅仲容叔逹爲八凱即垂益禹臯陶之倫也庭堅即臯陶字也使主后土后土地官也以揆百事莫不時叙地平天成揆度成亦平也舉八元伯奮仲堪叔獻季仲伯虎仲熊叔豹季狸爲八元也使布五敎于四方内平外成内諸夏外夷狄謂之十六相亦曰十六族又曰秦悼武王二年始置丞相官樗里疾甘茂爲左右丞相又曰鄭以子産爲相一年竪子不戲狎班白不提挈童子不犁畔二年市不豫賈三年門不夜閇道不拾遺四年田器不歸五年土無尺籍喪期不令而治鄭二十六年而死丁壯號哭老人兒啼子産去我死乎民將安歸又曰公儀休爲魯相客}
  - {type: variant, offset: 11, length: 3, content: 虞氏官, SBCK: 遺魚者不受客曰聞君嗜魚何故不受相曰以嗜魚故今爲相能自給魚今受而魚誰復給我魚故不受食茹抜其園葵而弃之見布好而出其家婦燔其機云欲令農士工女安其所豈可害其貨乎又曰石奢楚昭王相也堅直廉士無所避行縣道有殺人者相追之乃其父也縱其父還自繫使人言之於王曰殺人者臣之父也夫以父立政不孝也廢法縱罪非忠也臣罪當死王曰追而不及不當伏罪奢曰不􅀻其父非孝也不奉主法非忠也王赦罪上惠也伏誅而死臣職也遂不受令自刎而死又曰五羖大夫之相􅁗也勞不坐乗暑不張蓋行國中不驅車乗不操干戈功名藏於府庫德行施於後丗五羖大夫死國中男女流涕童子不歌謡舂者不相杵又曰秦莊襄王薨太子政立尊吕不韋爲相國號稱仲父又曰二丗亡誅李斯乃拜趙髙爲中丞相事無大小皆決之又曰趙髙爲丞相欲爲亂恐羣臣不聽乃先設驗持鹿獻於二丗曰馬也二丗􅀏曰丞相誤耶謂鹿爲馬問左右或黙或言馬以阿順趙髙或言鹿髙因隂中諸言鹿者以法又曰韋丞相賢者魯人以讀書術爲吏至大鴻臚有相工相之當至丞相有男四人相之至第二子名􅀇成相工曰此子貴當封侯丞相曰我爲丞相有長子是安從得之後賢竟爲丞相病死而長子有罪論不得嗣而立􅀇成又曰魏相者濟隂人以文吏至丞相其人好武令諸吏帶劒前奏事或有不帶劒者當入奏事乃借劒而敢入又曰匡衡爲御史大夫歳餘韋丞相死代爲丞相封樂安侯衡十年之間不岀長安城門至丞相豈非遇時而合也漢書曰陳平陽武人周勃沛人髙帝即位以勃爲右丞相以平爲左丞相帝問勃曰一歳決獄錢榖岀入幾何勃不知汗出浹背上問平平曰有主者上曰主者誰曰决獄責廷尉錢榖責治粟內史上曰君所主何事平曰臣主佐天子理隂陽調四時理万物撫四夷上曰善於是出勃語平曰君獨不早教我乎又曰蕭何沛人陳狶反上自將聞吕后用何計誅韓信拜何相國何病惠帝自臨視何疾因問君百歳後誰可代君對曰知臣莫若主帝曰曹叅何如何曰帝得之矣臣雖死無恨矣又曰曹叅沛人聞蕭何薨告舎人趨治裝吾當入相使者果召叅爲相擇郡國長史訥文辭謹厚者爲丞相史叅日夜飲酒賔客見叅不事事皆欲有言至者叅輙飲以醇酒醉而後去終莫得開說又曰蕭何拜相國益封五千户卒五百人爲衛衆人皆賀邵平獨弔謂何曰禍自此始也何乃讓封悉以家財佐軍上喜又曰張蒼免相文帝以皇后弟竇廣國賢有行欲相之恐天下以吾􅀻廣國乆念不可而髙帝時大臣餘見無可者乃以御史大夫申屠嘉爲丞相嘉爲人廉直門不受􅀻謁時太中大夫鄧通方愛幸賞賜累鉅万文帝常燕飲通家是時嘉入朝而通居上旁有怠慢之禮嘉奏事畢因言曰陛下幸愛其臣則冨貴之至於朝廷之禮不可以不肅朝罷嘉爲檄召通通至詣丞相府免冠徒跣頓首謝嘉嘉坐自如弗爲禮責曰夫朝廷者髙皇帝之朝廷通小臣戲殿上大不敬當斬使吏今行斬之如淳曰嘉語其吏日今便行斬之上度丞相巳困通使使持節召通而謝丞相此吾弄臣君􅇚之又曰公孫􅀪頴川人武帝以􅀪爲丞相掌列侯唯􅀪無爵詔封平津郷侯六百}
