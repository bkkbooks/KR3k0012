  - {type: variant, offset: 11, length: 3, content: 虞氏官, WYG: 主者上曰主者誰曰決獄責廷尉錢榖責治粟内史上曰君所主何事平曰臣主佐天子理隂陽調四時理萬物撫四夷上曰善於是出勃語平曰君獨不早教我乎又曰蕭何沛人陳豨反上自将聞吕后用何計誅韓信拜何相國何病惠帝自臨視何疾因問君百嵗後誰可代君對曰知臣莫若主帝曰曹參何如何曰帝得之矣臣雖死無恨矣又曰曹參沛人聞蕭何薨告舍人趨治装吾當入相使者果召參為相擇郡國長史訥文辭謹厚者為丞相史參日夜飲酒賔客見参不事皆欲有言至者参輙飲以醇醉而後去終莫聞説又曰蕭何拜相國益封五千户兵卒五百人為衞衆人皆賀召平獨吊謂何曰禍自此始也何乃讓封悉以家財佐軍上喜又曰張蒼免相文帝以皇后弟竇廣國賢有行欲相之恐天下以吾私廣國乆念不可高帝時大臣餘見無可者乃以御史大夫申屠嘉為丞相嘉為人廣直門不受私謁時大中大夫鄧通方愛幸賞賜累鉅萬文帝常燕飲通家是時嘉入朝而通居上旁有怠慢之意嘉奏事畢因言曰陛下幸愛其臣則富貴之至於朝廷之禮不可以不肅朝罷嘉為檄召通通至詣丞相府免冠徒跣頓首謝嘉嘉坐自如弗為禮責曰夫朝廷者高皇帝之朝廷通小臣戯殿上大不敬當斬使吏令行斬之如淳曰嘉語其吏曰今便行斬之上度丞相已困通使使持莭召通而謝丞相此吾弄臣君釋之又曰公孫𢎞潁川人武帝以𢎞為丞相掌列侯唯𢎞無爵詔封平津鄉侯六百}
