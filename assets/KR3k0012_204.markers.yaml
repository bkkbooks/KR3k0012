  - {type: variant, offset: 1870, length: 625, content: 命三年置仙人愽士官典煮練百藥天錫元年八月初置六謁官准古六卿其秩五品屬官有大夫秩六品大夫屬官有元士秩七品元士屬官有署令長秩八品令長屬官有署丞秩九品又減五等之爵始分為四曰王公侯子除伯男二號初帝欲法純質每於制定官號多不依周漢舊名或取諸身或取諸物或以民事皆擬遠古雲鳥之義諸曹走使謂之鳧鴨取飛之迅疾也以伺察候占官謂之白鷺亦取其延頸遠望也自餘之官義皆類此神瑞元年春置八大人官大人下置三屬官揔理萬機故世號八公太常二年夏置六部大人官有天地東西南北部皆以諸公為之大人置三屬官自太祖至高祖其內外百官屢有減置或事出當時不為常目如萬騎飛鴻常忠直意將軍之徒是也賈誼新書曰王者官人有六等一曰師二曰友三曰大臣四曰左右五曰侍御六曰厮役知足以為源泉行足以為儀表問焉則應求焉則得者謂之師智足以為礲礪行足以為輔助明於進賢敢於退不肖內相匡正外相楊美謂之友智足以謀國事行足以為民率仁足以合上下之忻國有法則退而守之君有難則能死之者大臣也脩身正行不愆於鄉曲言語談說不怍於朝廷智能不困於事業服一介之使能合兩君之忻執戟居前能舉君之過失不難以死持之者左右之臣也不貪於財不淫於色事君不敢有二心居則不敢泄君之謀君有過失雖不能正諫以其死持之而愁悴有憂色者侍御之臣也唯諛之行唯言之聽以睚眥之間事君者厮役也通典曰唐開元中刊定職次著之為格蓋尚書省以統會眾務舉持綱目門下省以侍從獻替規駮非宜中書省以獻納制冊敷揚宣勞祕書省以監錄圖書殿中省以供修膳服內侍省以承旨奉引尚書門下中書祕書殿中內侍凡六省御史臺以肅清僚庶九等太常, SBCK: 遥}
