  - {type: variant, offset: 1253, length: 300, content: 惟王建國辨方正位體國經野設官分職以為民極極中也令天下之人各得其中又周官曰宗伯以九儀之命正邦國之位一命受職受職治職事再命受服受服受祭衣服為上士三命受位列位於王臣也王之上土亦三命也四命受器受祭器為上大夫也五命賜則則法也六命賜官此王六命之卿賜官者使得自置其臣治家如諸侯也七命賜國出就侯伯之國八命作牧謂侯伯有功德者加命得專征代於諸侯九命作伯上公有功德者加命為二伯得征伐五侯九伯也鄭司農云長諸侯為方伯也尚書大傳曰古者天子三公每一公三卿佐之每一卿三大夫佐之每一大夫三元士佐之故有三公九卿二十七大夫八十一元士所與為天下者若此而巳自公至元士凡百二十此夏時之官也家語曰古之御天下者以六官揔治焉冢宰之官以成道治官所以成道, SBCK: 山濤薨魏舒領}
