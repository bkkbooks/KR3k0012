  - {type: variant, offset: 2961, length: 181, content: 千石其有殊效者輒璽書勉勵或賜爵進秩禮遇豐厚得為治大體所以遠蹤三代也及至東京雖漸優顯令僕出為郡守鍾離意黃香胡廣是也郡守入為三公虞延第五倫鮑昱是也自魏朝名守杜畿滿寵田預胡質等郡或二十年或秩中二千石假節猶不去郡或還不易方此亦古人茍善其事雖沒世不徙官之義也漢魏以來內官之貴於今最隆太始以前多以散官補臺郎亦經補黃門中書郎而今皆數等而後至眾職率亦如此陵遲之俗未及篤尚之風未洽, SBCK: ''}
