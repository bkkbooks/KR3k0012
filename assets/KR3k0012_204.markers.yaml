  body:
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 二丞相上尚書曰成湯居亳初置二相以伊尹仲虺爲之又君奭曰我聞在昔成湯旣受命則有伊尹格于皇天又說命曰髙宗夢得說使百工營求諸野說築傳巖之野爰立作相置諸左右命之曰若金用汝作礪若濟巨川用汝作舟楫若歳大旱用汝作霖􅀨啓乃心沃朕心若藥不瞑􅅭厥疾弗瘳韓詩外傳曰田饒事魯哀公而不見察田饒謂哀公曰臣將去君黃鵠舉矣哀公曰何謂也饒曰君獨不見雞乎雖有五德君猶曰滿而食之者何以其所從來者近也夫黃鵠}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 二丞相上丞相上尚書君奭我聞在昔成湯既受命則有伊尹格于皇天又説命曰高宗夢得説使百工營求諸野説築傅巖之野惟肖爰立作相王置諸其左右命之曰朝夕納誨以輔台徳若金用汝作礪若濟巨川用汝作舟楫若嵗大旱用汝作霖雨啓乃心沃朕心若藥弗瞑眩厥疾弗瘳若跣弗視地厥足用傷韓詩外𫝊曰田饒事魯哀公而不見察田饒謂哀公曰臣将去若黄鵠舉矣哀公曰何謂也饒曰君獨不見鷄乎雖有五徳君猶日捕而食之者何以其所從来者近也夫黄鵠}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_WYG_204-1b, image: WYG0894/WYG0894-0781d.png}
  - {type: variant, offset: 3, length: 0, content: '', krp: 二丞相上尚書曰成湯居亳初置二相以伊尹仲虺爲之又君奭曰我聞在昔成湯旣受命則有伊尹格于皇天又說命曰髙宗夢得說使百工營求諸野說築傳巖之野爰立作相置諸左右命之曰若金用汝作礪若濟巨川用汝作舟楫若歳大旱用汝作霖雨啓乃心沃朕心若藥不瞑眩厥疾弗瘳韓詩外傳曰田饒事魯哀公而不見察田饒謂哀公曰臣將去君黃鵠舉矣哀公曰何謂也饒曰君獨不見雞乎雖有五德君猶曰滿而食之者何以其所從來者近也夫黃鵠}
