  - {type: variant, offset: 435, length: 1, content: 國, SBCK: 王啇字子威涿郡人爲丞相有威重長八尺餘身體鴻大容貌過人河平四年單于來朝引見白虎殿丞相啇坐未央庭中單于前拜謁啇啇起離席與言單于仰視啇貌大畏之遷延却退天子聞而歎曰此眞漢相也又曰邴吉爲丞相常出逢􅃲者死傷横道吉不問又逢人逐牛牛喘息吐舌止駐使􅀐吏問逐牛行幾里吏怪之吉曰人􅃲殺傷長安令亰兆尹所當禁吾備宰相不親小事方春少陽用事未可以􅀬恐牛近行此時氣失節三公典調隂陽職所憂也又曰薛宣爲丞相相府辭訟例不滿萬錢不爲移書後皆遵用薛侯故事然官屬譏其煩碎無大體不稱賢相也又曰韋賢字長孺爲丞相年七十餘乞罷歸賜第丞相致仕自賢始也又曰田蚡爲丞相絀黃老刑名百}
  - {type: page-break, offset: 435, content: '', id: KR3k0012_SBCK_204-5b}
  - {type: variant, offset: 435, length: 1, content: 國, WYG: 王商字子威涿郡人為丞相有威重長八尺餘身體鴻大容貎過人河平四年單于来朝引見白虎殿丞相商坐未央庭中單于前拜謁商商起離席與言單于仰視商貎大畏之遷延却退天子聞而嘆曰此真漢相也又曰邴吉為丞相常出逢鬭者死傷横道吉不問又逢人逐牛牛喘息吐舌止駐使騎吏問逐牛行㡬里吏恠之吉曰人鬭殺傷長安令京兆尹所當禁吾偹宰相不親小事方春少陽用事未可以熱恐牛近行此時氣失節三公典調隂陽之所憂也又曰薛宣為丞相相府辭訟例不滿萬錢不為移書後皆遵用薛侯故事然官属譏其煩碎無大體不稱賢相也又曰韋賢字長孺為丞相年七十餘乞罷歸賜第丞相致仕自賢始也又曰田蚡為丞相黜黄老刑名百}
