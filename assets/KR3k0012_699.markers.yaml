  - {type: variant, offset: 2644, length: 1, content: 屩, WYG: 此樂使人忘死不知老之将至今来揚州作貴人動轉不得路行開車幔小人輙言不可閉置車中如三日新婦此悒悒使人無氣又曰栁惔甚重婦頗成畏惮性愛音樂女妓精䴡畧不敢視僕射張稷於惔狎宻而為惔妻所敬稷每詣惔必先相聞夫人惔每欲見妓但因稷請奏其妻隔幔坐妓然後出惔因得㽞目六韜曰将冬不服裘夏不操扇天雨不張帳盖名曰禮将不躬服禮無以知士卒寒暑也軍令曰戰時皆取舡上布幔布衣漬水中積聚之賊有炬火火箭以掩㓕之拾遺録曰周穆王時鸞章錦幔者摩連國獻焉錦文如鸞翔又曰呉主趙夫人巧妙無䨇權居昭陽宫倦暑乃褰紫絹之帷夫人曰此不足貴也權使夫人措其思焉荅曰妾欲窮慮盡思能使下絹帷而清風自入視外无有蔽礙列侍者飄然自凉若馭風而行權稱善夫人乃披髮以神膠續之神膠出欝夷國接弓之弦百絶百續乃織為羅縠累月而成裁之為幔内外視之飄飄如烟氣}
