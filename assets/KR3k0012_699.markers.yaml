  - {type: variant, offset: 783, length: 473, content: 不得便怒擲於地雞子圓轉不止便下以屐齒踏之不得嗔甚掇口中嚼而吐之又曰祖約好財阮孚好著蠟屐同是累而未判其得失有詣約見正料財物客至屏當不盡餘兩小簏著背後傾身障之意未能平或有詣阮正見蠟屐因歎曰未知一生當著幾量屐神色閑暢於是勝負始分又曰石勒擊劉曜使人著鐵屐施釘登城晉中興徵祥說曰舊為屐者齒皆達名曰露卯泰元中忽不復徹名陰卯亦服妖也識者以為卯謀也必有陰謀烈宗末驃騎參軍袁悅之始有陰謀之事及隆安遂致大亂宋書曰謝靈運好山水尋山陟嶺必造幽峻巖嶂數十重莫不備盡登躡常著木屐上山則去其前齒下則去其後齒又曰虞玩之高帝鎮東府朝廷致敬玩之為少府猶躋屐造席高帝取屐視之訛黑針銳蒵斷以芒接之問曰卿此屐已幾載玩之曰初釋褐拜征北行佐買之著已三十年貧士竟不易辦高帝咨嗟因賜以新屐玩之不受問其故荅曰公之賜恩華俱重但蓍簪弊席復不可遺所以不敢當帝善之又曰劉凝之有嘗認其著屐笑曰僕著已敗今家中覔新者償君此人後田中得所失送還不肯復取齊書曰沈麟士昔嘗行路鄰人認其所著屐麟士曰是卿屐耶即跣而反鄰人得屐送前者還之麟士曰非卿屐耶笑而受之蕭子顯齊書曰襄陽有盜發古冢者傳云是楚王冢獲玉屐玉屏風梁書曰范廉為吳興, SBCK: 燕丹}
