  - {type: variant, offset: 2640, length: 0, content: '', SBCK: 廣雅曰幔掩也東觀漢記曰岑彭與呉漢圍隗􅅝壅谷水以縑幔盛土爲堤灌城宋書曰晉安王子勛叛逆取所乗車除脚以爲輦其夕有鴞集其幔梁書曰曹景宗爲揚州刺史性躁動不能沉黙岀行常欲褰車帷幔左右輙諌以位望隆重人所具瞻不冝然景宗謂所親曰我昔在郷里平澤中逐麞數助射之此樂使人忘死不知老之將至今來楊州作貴人動轉不得路行開車幔小人輙言不可開置車中如三日新婦此悒悒使人無氣又曰栁惔音談甚重婦頗成畏憚性愛音樂女妓精麗畧不敢視僕射張稷與惔狎宻而爲惔妻賞敬稷每詣惔必先相聞夫人惔每欲見妓但因稷請奏其妻隔幔坐妓然後}
  - {type: page-break, offset: 2640, content: '', id: KR3k0012_SBCK_699-6a}
  - {type: variant, offset: 2640, length: 0, content: '', WYG: 漫漫相連綴之言也廣雅曰幔掩也東觀漢記曰岑彭與呉漢圍隗囂擁谷水以縑幔盛土為堤灌城宋書晋安王子勛叛逆取所乘車除脚以為輦其夕有鴞集其幔梁書曰曹景宗為楊州刺史性躁動不能沉黙}
  - {type: variant, offset: 2640, length: 0, content: '', krp: 廣雅曰幔掩也東觀漢記曰岑彭與呉漢圍隗囂壅谷水以縑幔盛土爲堤灌城宋書曰晉安王子勛叛逆取所乗車除脚以爲輦其夕有鴞集其幔梁書曰曹景宗爲揚州刺史性躁動不能沉黙岀行常欲褰車帷幔左右輙諌以位望隆重人所具瞻不冝然景宗謂所親曰我昔在郷里平澤中逐麞數助射之此樂使人忘死不知老之將至今來楊州作貴人動轉不得路行開車幔小人輙言不可開置車中如三日新婦此悒悒使人無氣又曰栁惔音談甚重婦頗成畏憚性愛音樂女妓精麗畧不敢視僕射張稷與惔狎宻而爲惔妻賞敬稷每詣惔必先相聞夫人惔每欲見妓但因稷請奏其妻隔幔坐妓然後}
  - {type: variant, offset: 2641, length: 0, content: '', SBCK: 惔因得留目六韜曰將冬不服裘夏不操扇天􅀨不張帳盖名曰禮將不躬禮無以知士卒寒暑也軍令曰戰時皆取舡上布幔布衣漬水中積聚之賊有炬火火箭以掩滅之拾遺録曰周穆王時鸞章錦幔者摩連國獻焉錦文如鸞翔又曰呉主趙夫人巧妙無􅀟權居昭陽宫倦暑乃褰紫絹之帷夫人曰此不足貴也權使夫人厝其思焉荅曰妄欲窮慮盡思能使下絹帷而清風自入視外無有蔽礙列侍者飄然自凉若馭風而}
  - {type: page-break, offset: 2641, content: '', id: KR3k0012_SBCK_699-6b}
