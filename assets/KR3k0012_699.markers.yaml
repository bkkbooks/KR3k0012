  - {type: variant, offset: 1987, length: 507, content: 曖然有屐夢書曰麤屐為使令卑賤類也夢得麤屐得僮使也王襄僮約曰持斧入山斷輮裁轅若有餘材當作俎几木屐屣說文曰屣鞮屬也鞮革履也史記曰漢孝武帝云使朕誠得如黃帝視棄妻子如脫屣耳魏志曰王粲字仲宣蔡邕見而奇之賓客盈坐聞王到倒屣迎之後漢書曰皇甫規有當世重望鄉人有行賄為郡守謁規規臥不起聞王符至遂倒屣而迎春秋後語曰魏太子擊逢文侯之師田子方於朝歌朝歌紂之所都金衛州地引車避下謁之田子方不為禮太子擊因問曰富貴者驕人乎貧賤者驕人乎子方曰貧賤者驕人耳夫諸侯而驕則失國大夫而驕則失家富貴者安敢驕人貧賤驕人耳行不合言不從則去之楚越若脫屣然太子不懌而去淮南子曰堯之有天下也年衰志悶舉天下而傳之舜猶卻行而脫屣孟子曰舜視棄天下猶棄弊屣也世說曰何晏為吏部尚書王弼未弱冠往見之晏倒屣迎之鞾釋名曰鞾本胡服也趙武靈王始服之北齊書曰鄭太妃初與神武避葛榮同走并州負困燃馬屎自作鞾又曰任王諧為并州剌史有婦人臨汾水浣衣有乘馬人換其新靴而去婦人持故靴詣州言之諧召城外諸嫗以靴示之紿曰有乘馬人於路被賊劫害遺此靴焉得無親屬乎一嫗撫膺哭曰兒昨著此靴向妻家如其語捕獲一時稱明察後魏書曰有人遺趙柔鞾數百枚柔與子善明鬻之於市有人從柔買柔索絹三十疋有商人知其賤與柔三十疋善明欲取之柔曰, SBCK: ''}
