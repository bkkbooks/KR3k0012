  - {type: variant, offset: 3139, length: 313, content: 輕履篾龍舄之文章爽藤也赤色緣木而長大如箭竿越人以為屩經以青芒行山草便於用靴故越人重之搜神記曰元康之末至太安之間江浦之域有敗屩自聚於道多或至四五十兩人散去之投林草中明日視之悉復矣民或云見狸銜而聚之世之所說屩者人之賤服而當勞辱下民之象也敗者疲弊之像也道者地理四方所以交通王命所由往來也今敗屩聚於道者象下民疲病將相聚為亂絕四方而壅王命臨海水土記曰屩魚長一尺狀如屩形俗說曰劉真長少時居丹徒家至貧劇方回數出南射堂射劉往市賣屩路經射堂邊過人無不看射劉過初不迴顧方回異之遣問信荅云老母朝來未得食至市貨屩不得展詣後過劇呼之使來與共語覺其佳笑林曰南方人至京師者人戒之曰汝得物唯食慎勿問其名也後詣主人入門內見馬矢便食惡臭乃步進見敗屩棄於路因復嚼殊, SBCK: 制}
  - {type: variant, offset: 3139, length: 23, content: 輕履篾龍舄之文章爽藤也赤色緣木而長大如箭竿越人, WYG: 制不可}
