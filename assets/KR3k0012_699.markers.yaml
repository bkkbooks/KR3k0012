  - {type: variant, offset: 25, length: 574, content: 鞮也詩曰葛屨五兩冠綏雙止葛屨服之賤者也冠綏服之尊者箋云以喻不宜同處又葛屨曰糺糺葛屨可以履霜夏葛履冬皮履莫非所以履霜周禮曰屨人掌王及后之服履為赤舄黑舄赤繶黃繶青句素屨葛屨複下曰舄單下曰履古人言履以通於複今人言履以通於單句當為絢赤繶黃繶以赤黃之絲為下緣也辨外內命夫命婦之屨功屨散屨功屨次命屨散屨去飾著大戴禮曰入於戶未嘗越屨是高柴之行也禮曰侍坐於長者屨不上堂解屨不敢當階就屨跪而舉之屏於側向長者而屨跪而遷屨俯而納屨又曰戶外有二屨言聞則入言不聞則不入毋踐屨毋踖席又曰國家靡敝君子不履絲屨左傳曰齊侯遊于姑棼遂田于貝丘貝丘齊地見大豕從者曰公子彭生也公怒曰彭生敢見射之豕人立而啼公懼墜於車傷足喪屨反誅屨於徒人費弗得鞭之見血又曰楚子使申舟使于齊曰無假道于宋及宋華元曰過我而不假道鄙我也鄙我亡也亡一也乃殺之楚子聞之投袂而起屨及於窒皇劍及於寢門之外又曰齊晉戰于鞌郤克傷於矢流血及屨未絕鼓音又曰吳伐越越子禦之大敗之靈姑浮以戈擊闔廬靈姑浮越大夫闔廬吳王傷將指取其一履其足大指見斬遂失履姑浮取之穀梁傳曰公弟叔盻其曰弟叔盻賢之也宣公殺赤而非之宣公殺子赤叔盻非責云織屨而食終身不食宣公之食孟子曰許行自楚之滕其徒數十人皆衣褐梱屨織席以為食梱音閫猶叩椓也織履欲使堅故叩之賣履席以供飲食也屐釋名曰屐搘以踐泥也為兩足搘以踐泥也帛屐作之如屩者也不曰帛屩而曰帛屐者屩不可以踐泥屐可以踐泥也故, SBCK: 幬}
