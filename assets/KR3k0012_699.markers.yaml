  - {type: variant, offset: 1367, length: 40, content: 孔穿振方屐見平原君宋元嘉起居注曰劉禎彈廣州剌史韋朗贓有白荊屐六七十量風俗通曰延嘉, SBCK: 􅁗始皇置髙漸離於帳}
  - {type: variant, offset: 1367, length: 5, content: 孔穿振方屐, WYG: 蔡伯喈到江東得論衡中國諸儒覺其談論更逺疑得異書求其帳中隠處果得之傅子曰太祖武皇帝魏武帝愍嫁娶之僣上公主適人不過皁帳郭子曰許侍中顧司空俱作王丞相從事常夜在丞相飲酒二人歡極丞相便使入己帳中眠顧至曉猶展轉不得熟寐許上床便大鼾丞相語諸客曰此中亦是難眠耳東宫舊事曰皇太子納妃有熟絳綾帳綘絹幄又曰東齊夏施烏紗单帳四率坊洗馬坊烏練帳三輔舊事曰秦時奢侈縑帳綺帷木衣綈繡土被朱紫漢武故事曰上以琉璃珠玉明月夜光雜錯天下珍寳為甲帳其次為乙帳甲以居神乙以自居桓譚新論曰李少君置武帝李夫人神影於帳中令帝觀}
