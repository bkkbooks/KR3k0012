  - {type: variant, offset: 1640, length: 2, content: 珊瑚, SBCK: 車渠出天笁國古車渠椀賦曰車渠玉属多纎理縟文出於西國其俗寳之小以繫頸大以爲器王粲車渠椀賦曰􅄂玄黄以爲質似乾坤之未分兼五德之上美超衆寳而絶倫陳思王車渠盌賦曰唯盌之所生于涼風之峻湄光如激電景􅀂浮星河神恠之瓌瑋信一覽而九驚王處道車渠觶賦曰温􅀂騰螭之􅂛天曜似遊鴻之逺臻頗􅀺梁四公子記曰扶南大舶從西天笁國來賣碧頗􅀺鏡面廣一尺五寸重四十斤内外皎潔置五色物於其上向明視之不見其質問其價約錢百萬貫文帝令有司筭之傾府庫當之不足其商人言此色界天王有福樂事天澍大雨雨衆寳如山納之山藏取之難得以大獸肉投之藏中肉爛􅀋寳一鳥衘出而此寳焉舉國不識無敢酬其價者唐書曰髙宗上元二年十二月拔汗那王獻碧頗􅀺及地黄􅀛兹白王素稽獻金頗􅀺天笁記曰大雪山中有寳山諸七寶並生取可得唯頗􅀺寳生髙峯難得玄中記曰大􅁗國有五色頗􅀺紅色㝡貴十洲記曰崑崙山上有紅碧頗􅀺宫名七寳堂是也水精廣雅曰水精謂之石英續漢書曰哀牢夷出水精魏略曰大􅁗國一名􅀺難宫室皆水精爲柱食器亦然廣志曰水精}
