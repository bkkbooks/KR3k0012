  - {type: page-break, offset: 1640, content: '', id: KR3k0012_SBCK_808-6a}
  - {type: variant, offset: 1640, length: 2, content: 珊瑚, WYG: 車渠出天竺國古車渠椀賦曰車渠玉属多纎理縟文出于西國其俗寳之小以繫頸大以為器王粲車渠椀賦曰雜𤣥黄以為質似乾坤之未分兼五徳之上美超衆寳而絶倫陳思王車渠盌賦曰惟盌之所生於涼風之浚湄光如激電景若浮星何神怪之瓌瑋信一覧而九驚王處道車渠觶賦曰温若騰螭之升天曜似遊鴻之逺臻頗黎梁四公子記曰扶南大舶從西天竺國來賣碧頗黎鏡面廣一尺五寸重四十斤内外皎㓗置五色物於其上向明視之不見其質問其價約錢百萬貫文帝令有司筭之傾府庫當之不足其商人言此色界天王有福樂事天㴻大雨雨衆寳山納之山藏取之難得以大獸肉投之藏中肉爛類寳一鳥衘出而得此寳焉舉國不識無敢酬其價者唐書曰髙宗上元二年十二月㧞汗船王般碧頗黎及地黄龜兹白玉素稽獻銀頗黎天竺記曰大雪山中有寳山諸七寳並生取可得唯頗黎寳生髙峰難得𤣥中記曰大秦國有五色頗黎紅色最貴十州記曰崑崙山上有紅碧頗黎宫色七寳堂是也水精廣雅曰水精謂之石英續漢書曰衰牢夷出水精魏略曰大秦國一名黎難宫室皆水精為柱食器亦然廣志曰水精}
