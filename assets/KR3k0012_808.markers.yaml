  - {type: variant, offset: 2992, length: 561, content: 紫貝㝡為美者出交州大貝出巨延州與行賈貿易萬震南州異物志曰乃有大貝奇姿難儔大貝文貝也交趾以南海中皆有之素質紫飾文若羅朱不磨不瑩彩輝光浮思雕莫加欲琢靡踰在昔姬伯用免其拘徐哀南方記曰班貝羸大者圍之得六十小者圍之得五十在於海邊捕魚人時有得之者大貝出諸簿巨延州土地採賣之以易絳青劉欣期交州記曰大貝出日南如酒杯小貝貝齒也善治毒俱有紫色南州異物志曰交趾北南海中有大文貝質白而文紫色天姿自然不假雕琢瑩而光色煥爛相貝經曰相經朱仲受之於琴高琴高乘魚浮于河海水產必究仲學先於琴高而得其法獻珠於漢武云不知所以嚴助為會稽太守仲又云遺助以徑尺之貝并致此文於助曰黃帝唐堯夏禹二代之貞瑞靈奇之秘寶其有次此者貝盈尺狀如赤電黑雲謂之紫貝素質紅黑謂之珠貝有青地綠文謂之綬貝黑文黃畫謂之霞貝紫愈疾珠明目綬清氣鄣霞伏蛆蟲不能延齡增壽其禦害一也復有下此者鷹喙蟬脊以逐溫去水無奇功貝大者如輪文王請大秦貝徑半尋穆王得其殼懸於昭觀秦穆公以遺燕黽可以明目遠宜玉宜金南貝如珠璣或曰駮其性寒其味甘巴水毒浮貝使人寡無以近婦人黑白各半是也濯使人善驚無以親童子黃脣點齒有赤駮是也雖貝使病瘧黑鼻無皮是也䂃貝使人胎消勿以示孕婦赤帶通脊是也慧貝使人善忘勿以近熾內殼赤絡是也醟貝使童子愚女淫有青脣赤鼻是也碧貝使人盜脊上有縷句脣是也雨則重霽則輕委貝使志強夜行伏迷鬼狼豹百獸赤中員是也雨則輕霽則重, SBCK: ''}
