  - {type: variant, offset: 1789, length: 506, content: 春秋考異郵曰承石取鐵瑇瑁吸類相致也芥也音若史記曰趙使使於春申君欲誇楚為瑇琩簪劍器悉飾以瑇瑁又曰江南出丹沙犀象瑇瑁珠璣漢書西域傳贊曰故能覩犀布瑇瑁則建珠崖七郡感蒟醬竹枝則開牂牁越嶲續漢書輿服志曰貴人助蚕瑇瑁釵范曄後漢書賈琮傳云交趾土多珍產明璣翠羽象犀瑇瑁異香美木之屬莫不自出前後刺史率多無清行有司舉琮為交趾刺史又曰和熹鄧皇后臨朝上方珠玉犀象瑇琩雕鏤之物皆絕又曰天笁國出象犀玳瑁也吳錄曰嶺南盧賓縣漲海中玳瑁似龜而大吳錄曰魏使以馬求易珠璣翡翠玳瑁孫權曰此皆孤所不用而得馬若何而不聽晉命曰士卒百工不得服犀玳瑁齊書曰少帝夜醉乘馬從西步廊向北馳走如此兩三將倒臨汝侯坦之諫不從執馬椌帝運拳擊擊垣之著到地坦之與曹道剛扶抱還壽春殿瑇瑁床上臥齊書曰廬陵王子卿為荊州刺史在鎮營造服飾多違制度作瑇瑁乘具詔責之令速送都唐書曰憲宗朝訶陵國獻僧祗女二人瑇瑁榼生犀物等西京雜記曰韓嫣以玳瑁為床南方異物志曰玳瑁如龜生南海大者加籧篨背上有鱗大如扇發取鱗因見其文欲以作器則煮之刀截任意所為冷乃以梟魚皮籍治之後以枯木條葉瑩之乃有光輝廣志曰玳瑁形似龜出南海巨延州司馬相如紫虛賦曰網瑇瑁釣紫貝張衡東京賦曰翡翠不裂玳瑁不簇孫德施南榴枕賦曰委之玳瑁席停之象牙床, SBCK: ''}
