  - {type: variant, offset: 1390, length: 1, content: 尺, WYG: 説拾遺記曰昔漢武寳鼎元年西方貢珍􅀈有琥珀鷰置之靜室自於室内鳴翔又曰吳主聞潘夫人有色令進其圖圖成吳主見之驚喜以琥珀如意撫大即折曰此神女也因納之又曰孫引為悅鄧夫人月下舞水精如意誤傷其頰令太醫療之以白獺骨和琥珀末塗之遂差神農本草經曰取雞卵㱭黄白渾雜者熟煮及尚軟隨意刻作物以苦酒漬數宿既堅内粉中佳者亂真矣左思蜀都賦曰琥珀丹青珠江瑕英潘尼詩曰駕言遊西岳寓目二華山金樓琥珀階象榻瑇瑁筵中有神秀士不知幾何年馬瑙廣雅曰馬瑙石次玉也魏畧曰大秦國多馬腦凉州記曰吕纂咸和二年盗發張陵得馬腦鍾榼北齊書曰武平中除傅伏為東雍州刺史㑹周克并州遣韋孝寛來招伏曰并州已平故遣公兒來報便宜執下授上大將軍武鄉郡開國公即給告身以金馬瑙二酒鐘為信伏不受北史曰梁主蕭詧曾獻馬瑙鍾周文帝執之顧丞即曰能擲樗蒲頭盧者便與鍾已經數人不得頃至薛端乃執樗蒲頭而言曰非為此鍾可貴但思露其誠耳五子皆黒文帝大悦即以賜之古今注曰魏武帝以瑪瑙石為瑪瑙勒拾遺記曰帝顓頊時有丹邱國獻瑪瑙罋以盛甘露充於厨丹邱之地有夜又駒䟦之鬼能以赤瑪瑙為瓶盂及樂器皆精妙于中國有者}
