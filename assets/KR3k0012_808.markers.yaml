  - {type: variant, offset: 1623, length: 2, content: 珊瑚, SBCK: 琉璃出黄支斯調大􅁗日南諸國南州異物志曰琉璃夲質是石欲作器以自然􅁅治之自然􅁅狀如黄􅁅生南海濵亦可浣衣用之不湏淋但投之水中滑如苔石不得此􅁅則不可釋十洲記曰方文山上有琉璃宫杜篤論都賦曰槌蜯蛤辟琉璃諸葛恢集曰詔荅恢今致琉璃枕一傳咸汚巵賦曰人有遺余琉璃巵者小兒竊弄墮之不潔意旣惜之人有感物之汙辱乃喪}
  - {type: variant, offset: 1623, length: 2, content: 珊瑚, WYG: 琉璃出黄支斯調大秦日南諸國南州異物志曰琉璃本質是石欲作器以自然灰治之自然灰狀如黄灰生南海濵亦可浣衣用之不須淋但投之水中滑如苔石不得此灰則不可釋十州記曰方丈山土有琉璃宫杜篤論都賦曰槌蜯蛤碎琉璃諸葛恢集曰詔荅恢今致琉璃枕一𫝊咸汚巵賦曰人有遺予琉璃巵者小兒竊弄墮之不潔意既惜之人有感物之汙辱乃䘮}
