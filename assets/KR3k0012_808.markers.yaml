  - {type: variant, offset: 590, length: 511, content: 贈之玉佩珠璜瓚說文曰瓚三玉一石也天子用全純玉也上公用駹四玉一石侯用瓚伯用將玉石半相將也尚書文侯命曰平王錫晉文侯秬鬯圭瓚作文侯之命毛詩文王旱麓曰瑟彼玉瓚黃流在中玉瓚圭瓚也黃金所以流鬯也圭瓚之狀以圭為柄黃金為勺青金為外朱中央毛詩大雅江漢曰釐爾圭瓚秬鬯一卣告于文人釐賜也周禮春官小宗伯曰凡祭祀賓客以時將瓚果將送也猶奉也祭祀以時奉而授王賓客以時奉而授宗伯天子圭瓚諸侯璋瓚又冬官下玉人曰裸圭有瓚以祀廟禮記王制曰諸侯賜圭瓚然後為鬯未賜圭瓚則資鬯於天子得其器乃敢為其事圭瓚鬯爵也鬯秬酒也又明堂位曰季夏三月以禘禮祀周公於太廟灌用玉瓚大圭又祭統曰君執圭瓚裸尸大宗執璋瓚亞裸及迎牲左傳昭四曰有星孛于大辰西及漢鄭裨竈言於子產曰宋衛陳鄭將同日火若我以瓘斝玉瓚鄭必不火瓘圭也斝王斝瓚勺也欲穰火子產不與漢書曰王莽加九命秬鬯圭瓚魏志曰天子命魏文踐祚錫命孫權秬鬯圭瓚北史曰于謹受華州刺史賜秬鬯一卣珪瓚副焉白虎通曰圭瓚鬯宗廟之盛禮也瑁尚書顧命曰乃受同瑁王受瑁為主受同以蔡周禮冬官下玉人曰天子執瑁四寸以朝諸侯玉以瑁之似犁冠也白虎通曰天子執瑁以朝諸侯瑁之為言冒也上有所覆下有所冒也珊瑚說文曰珊瑚色赤生於海中或生於山也孝經援神契曰珊瑚鉤瑞寶也神靈滋液百珍寶用則見, WYG: 琥琥珀}
