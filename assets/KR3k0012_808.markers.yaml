  - {type: variant, offset: 1432, length: 4, content: 堂前庭植, SBCK: 屋扉悉以白琉璃作之光照洞徹又曰漢成帝爲趙飛鷰造服湯殿緑琉璃爲户魏略曰大􅁗國出赤白黒黄青緑紺縹紅紫十種琉璃魏書曰天笁國人商販至京自云能鑄石爲五色琉璃於是採礪山石於京師鑄之旣成光澤美於西方來者乃詔爲行殿容百餘人光色映徹觀者見之莫不驚駭以爲神明所作自此國中琉璃遂賤人不復珎之呉暦曰黃龍扶南諸外國來獻琉璃􅀳書曰王濟豪侈帝常幸濟宅供饌甚豐悉貯琉璃器中帝甚美又曰汝南王醼公卿以琉璃鍾行酒酒及崔洪洪不肯執問其故曰慮有執}
