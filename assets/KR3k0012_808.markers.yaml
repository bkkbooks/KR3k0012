  - {type: variant, offset: 2686, length: 1, content: 文, SBCK: 王莽侍中待詔有􅀃莽鴟自虎吻犲狼聲者莽誅待詔而封告者後常翳雲母屏風非親近莫得見范曄後漢書曰鄭弘爲太尉弟五倫爲司空􅀄倫爲㑹稽召弘署督郵毎朝弘曲躬自卑}
  - {type: variant, offset: 2686, length: 1, content: 文, WYG: 王莾侍中侍詔有說莾鴟目虎吻豺狼聲者莾誅待詔而封告者後常翳雲母屏風非親近莫得見范􅁮後漢書曰鄭𢎞為太尉第五倫為司空初倫為㑹稽召𢎞署督郵每朝𢎞曲躬自卑}
