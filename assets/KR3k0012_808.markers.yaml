  - {type: variant, offset: 1265, length: 158, content: 為墻璧水精為柱礎也宋書曰劉勔為鬱林太守勔既至隨宜剪定大致名馬并獻珊瑚宋紀曰大明六年鬱林郡獻珊瑚連理樹南史曰扶南國梁天監二年跋摩復遣使送珊瑚佛像并獻方物又曰波斯國有鹹池生珊瑚樹長一二尺亦有虎珀馬腦真珠玟瑰等國內不以為珍西京雜記曰積草池中有珊瑚樹高一丈二尺一本云三柯上四百六十二條是南越國王趙他所獻號為烽火樹至夜光景昭然, SBCK: ''}
