  - {type: variant, offset: 420, length: 4, content: 周公相王, SBCK: 戰闘用琥虎魄廣雅曰琥魄珠也生地中其上及旁不生草淺者五尺深者八九尺大如斛削去皮成琥魄􅀄時如桃膠凝堅乃成其方人以爲枕出􅀶南縣典略曰大􅁗國多琥魄續漢書曰哀牢夷出光珠琥魄呉書曰虞翻少好學有高氣年十二客有候其兄者不遇遇翻翻追書與曰僕聞虎珀不取腐芥慈石不受曲針過而不存不亦冝乎客得書竒之由是見稱沈約宋書曰武帝時寧州常獻虎珀枕甚光麗時將北征以虎珀治金瘡上大恱命擣碎分付諸將西京􅄂記曰宣帝有身毒寳鏡一枚大如八銖錢常以虎珀笥盛之異物志曰虎珀之夲成松膠也或以作杯瓶華陽國志曰珠穴出光珠虎珀能吸芥西域諸囯志曰珠穴出麋盧水邊沙中有短腰蜂窠燒治以爲虎珀玄中記曰楓脂輪入地中千秋爲虎珀􅀶物志曰松脂淪入地中千年化爲茯苓千年化爲琥珀虎珀一名紅珠今太山有茯苓而無虎珀益州永昌出虎珀而無茯苓或復云燒蜂窼所作未詳此二􅀃拾遺記曰昔漢武寳鼎元年西方貢珎恠青虎珀鷰置之静}
