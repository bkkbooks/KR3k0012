  - {type: variant, offset: 420, length: 169, content: 周公相王室以尹天下於周為睦分魯公以大路大旂夏后氏之璜杜預注曰璜美玉名又哀下曰宋向魋出奔衛公父文伯攻之求夏后氏之璜與之他玉而奔齊白虎通曰璜以徵召位在北方又曰何謂五玉玉謂圭璧琮璜璋又曰孔子卒受魯君璜玉葬墎之北文子曰夏后之璜不能無纇淮南子曰夏后氏之璜不能無考考暇又曰精神可寶非直夏后之璜楚辭曰璜臺十成誰可極焉璜石次玉傅玄歌詩曰有所思兮在天一方何, WYG: 戰鬬}
