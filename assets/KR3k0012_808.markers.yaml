  - {type: variant, offset: 2707, length: 0, content: '', SBCK: 尉遲敬德遂飛練金石閑居服雲母粉淮南萬畢術曰雲母入地千歳不朽雲母在足無踐􅁄注曰取大雲母塗足下踐􅁄不能刺淮南子曰雲母來水雲母石可致水抱朴子曰雲母五色其多青者名雲英冝以春服之多赤者名雲珠冝以夏服之多白者名雲液冝以秋服之多黒者名雲母冝以冬服之但有青黄二色者名雲沙冝以季夏服之皛皛純白者名磷石可四時長服又曰呉景帝戍將於廣陵掘冢有人如生棺中雲母厚尺許西京􅄂記曰晉幽公冢甚髙美門􅀜皆是石坐撥除深入乃得雲母深處見百餘尸縱横相枕籍皆不朽唯一男子餘皆女子或坐或立或卧衣服形色不異生人又曰成帝設雲母帳雲幄雲幕於甘泉紫殿丗謂之三雲殿晉公卿禮族曰賜太牢安平}
