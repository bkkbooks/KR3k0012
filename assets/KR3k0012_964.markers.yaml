  - {type: variant, offset: 1323, length: 273, content: 若群鳳之鳴漢竹廣志曰永昌有漢竹圍三尺餘利竹廣志曰西南出利竹林於竹竹譜曰林於竹葉薄而廣晉竹吳越春秋曰吳王聞越王盡心自守賜之以書增之以封越王乃使大夫齎葛布十萬狐皮五雙晉竹十庾以荅封禮沛竹東方朔神異經曰南方荒中有沛竹其長百丈圍二丈五六尺厚八九寸可以為舡其子美食之可以已瘡癘張茂先曰子笋也棘竹竹譜曰棘竹生交州諸郡藂生初有數十莖大者二尺圍肉至厚幾於實中夷人破以為弓枝節皆有㓨彼人種以為城卒不可攻萬震異物志所謂種為藩落阻過曾墉者也或卒倒根出大如十石物從橫相承狀如繰車一名笆竹見三倉筍味落人鬢髮沈懷遠南越志曰宋昌縣有棘竹長十尋大如甕其間短者輒六七丈也為竹叢薄葉, SBCK: ''}
