  - {type: variant, offset: 516, length: 8, content: 命伶倫為律伶倫自, SBCK: 别号多風陽氣畜積萬物散解果實不成故士逹作爲五絃之瑟以來隂氣以定羣生士逹朱㐮氏臣杜蘭香傳曰神女姓杜名蘭香降張碩常食粟飯并有非時果碩食之亦不甘然一食可七八日不飢鄴中記曰石虎有華林園種衆果民間有名果虎作蝦蟇車四搏掘根面去一丈􅀷一丈合土載之植之無不生闞駰十三州記曰舎衛國在月氏南萬里果}
  - {type: variant, offset: 516, length: 3, content: 命伶倫, WYG: 别號多風陽氣畜積萬物散解果實不成故士逹作}
  - {type: variant, offset: 516, length: 8, content: 命伶倫為律伶倫自, krp: 别号多風陽氣畜積萬物散解果實不成故士逹作爲五絃之瑟以來隂氣以定羣生士逹朱㐮氏臣杜蘭香傳曰神女姓杜名蘭香降張碩常食粟飯并有非時果碩食之亦不甘然一食可七八日不飢鄴中記曰石虎有華林園種衆果民間有名果虎作蝦蟇車四搏掘根面去一丈深一丈合土載之植之無不生闞駰十三州記曰舎衛國在月氏南萬里果}
  - {type: variant, offset: 520, length: 4, content: 律伶倫自, WYG: 五弦之琴以來陽氣以定群生士逹朱㐮氏臣杜蘭香傳曰神女姓杜名蘭香降張碩家食粟飯并有時果碩食之亦不甘然一食可七八日不飢鄴中記曰石虎有華林園種衆果民間有名果虎作蝦蟇車四摶掘根靣去一丈深一丈合土載之植之無不生闞駰十三州記曰舍衛國在月氏南萬里果}
