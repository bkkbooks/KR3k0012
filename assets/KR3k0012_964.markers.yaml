  - {type: variant, offset: 2028, length: 9, content: 至孝母好食竹笋宗入, SBCK: 詔嚴遵詣行所遇蜀郡獻橘栗上令公卿以下各以手所及取遵獨不取上曰不敢取者誰尊對曰君賜臣以禮臣奉君以忠今賜無所主臣是以不取西京雜記曰上林苑有侯栗榛栗瑰栗嶧陽栗嶧陽太守曹寵所獻大如拳三􅁗記曰漢武帝果園有大栗十五枚及一􅂛水經注曰汝水灣中有地數頃上有栗園栗小殊不並固安之實也然歳貢三百石以充天府水渚即栗洲也樹髙茂望􅀂屯雲積氣矣}
