  - {type: variant, offset: 1832, length: 1, content: 醢, WYG: 曰饋食之籩其實栗禮記内則曰栗曰撰之左傳曰女贄不過榛栗􅀥脩以告䖍也論語曰哀公問社於宰我宰我對曰夏后氏以松殷人以栢周人以栗曰使民戰栗爾雅曰栵栭樹如槲樕而庳小子如細栗可食今江東亦呼為栭栗漢書曰種千樹栗其人與千户侯等謝承後漢書曰豫章宗度拜定陵令縣人杜伯夷清髙不仕度與談論致􅀥栗而已魏略曰太子與鍾繇書曰竊見玉書稱美玉赤擬雞冠黃侔蒸栗魏志曰東夷魏國出大栗如棃宋書曰劉秀之為丹陽尹先是秀之從叔穆之為丹陽與子弟㕔事上宴㕔事柱有一穿穆之謂子弟及秀之曰汝等試以栗遥擲柱入穿者後必得此郡惟秀之獨入焉其言遂騐晉書曰王恭幼敏悟年數嵗時祖母戱諸孫散栗於床羣兒競之恭獨不取問其故對曰不取自當得賜由是中表異之梁書曰沈約常侍宴㑹豫州獻栗徑寸帝竒之問衆栗事多少與約各䟽所知約少帝三事約出謂}
