  - {type: variant, offset: 1539, length: 247, content: 十石物從橫相承狀如繰車一名笆竹見三倉筍味落人鬢髮沈懷遠南越志曰宋昌縣有棘竹長十尋大如甕其間短者輒六七丈也為竹叢薄葉下有釣剌或有條末如芒針南州異物志曰棘竹節有棘剌嶺表錄異曰南土有剌竹即枝上有剌南人呼剌為剌勒自根橫生枝條展轉如織雖野火焚燒只燎細枝嫩葉春叢生轉復牢密邕州舊以剌竹為牆蠻蜒來侵竟不能入䈏竹竹譜曰䈏與由衙厥體俱洪圍或累尺䈏實衙空南越之居梁柱是供異物志曰有竹曰䈏其大數圍節間相去扃促中實滿堅強以為屋榱斷截便以為棟梁不復加斤斧也弓竹竹譜曰弓竹出東垂諸山簜竹尚書禹貢曰篠簜既敷爾雅曰簜竹竹別名也, WYG: 杼子}
