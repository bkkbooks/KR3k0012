  - {type: variant, offset: 1893, length: 0, content: '', SBCK: 章宗度拜定陵令縣人杜伯夷清髙不仕度與談論致􅀥栗而巳魏略曰太子與鍾繇書曰竊見玉書稱羙玉赤擬雞冠黄侔蒸栗魏志曰東夷韓國岀大栗如梨宋書曰劉秀之爲丹陽尹先是秀之從叔穆之爲丹陽與子弟㕔事上宴㕔事柱有一穿穆之謂子弟及秀之曰汝等試以栗遥擲柱入穿者後必得此郡唯秀之獨入焉其言遂驗又曰王恭㓜敏悟年數歳時祖母諸孫姪散栗於牀羣兒競之㤗獨不取問其故對曰不取自當得賜由是中表異之梁書曰沈約甞侍宴㑹豫}
  - {type: page-break, offset: 1893, content: '', id: KR3k0012_SBCK_964-4a}
  - {type: variant, offset: 1893, length: 0, content: '', krp: 章宗度拜定陵令縣人杜伯夷清髙不仕度與談論致棗栗而巳魏略曰太子與鍾繇書曰竊見玉書稱羙玉赤擬雞冠黄侔蒸栗魏志曰東夷韓國岀大栗如梨宋書曰劉秀之爲丹陽尹先是秀之從叔穆之爲丹陽與子弟㕔事上宴㕔事柱有一穿穆之謂子弟及秀之曰汝等試以栗遥擲柱入穿者後必得此郡唯秀之獨入焉其言遂驗又曰王恭㓜敏悟年數歳時祖母諸孫姪散栗於牀羣兒競之㤗獨不取問其故對曰不取自當得賜由是中表異之梁書曰沈約甞侍宴㑹豫}
  - {type: variant, offset: 1894, length: 1, content: 刺, SBCK: 獻栗俓寸半竒之問衆栗事多少與約各䟽所知約少帝三事約出謂人曰此公護前不譲即羞死帝以其言不遜欲抵其罪徐勉固諌乃止又曰蕭琛甞預御筵醉伏上以􅀥投琛琛乃取栗擲上中靣御}
