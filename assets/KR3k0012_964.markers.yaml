  - {type: variant, offset: 349, length: 160, content: 東陽留道先元嘉四年䈥竹林忽生連理野人無知謂為禍崇斫殺之鉤端竹山海經曰嶓冢之山囂水之北多鉤端竹筇竹漢書曰張騫至大夏見筇竹杖問之云賈人市之身毒國山海經曰龜山多狹竹郭璞曰即筇竹竹譜曰筇竹高節實中狀若人剡俗謂之扶老竹廣志云出南廣邛都縣羅浮山記曰邛竹本出邛山張騫西至大夏所見也而此山左右時有之鄉老多以為杖種龍竹廣志曰種龍竹任作笛呂, SBCK: 王丞相儉帳下甘果盈溢渉春敗爛吕}
