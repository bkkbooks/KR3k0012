  front:
  - {type: variant, offset: 0, length: 4, content: 竹下桂竹, SBCK: 太平御覽卷第九百六十四果部一果栗果易解卦曰天地解而雷雨作雷􅀨作而百果草木皆甲坼爾雅曰果不熟曰荒周禮天官上甸師職曰甸師供野果之属禮記曲禮上曰賜果於君前其有核者懷其核又玉藻曰果實未熟不鬻於市凡食果實後君子火熟者先君子春秋元命苞曰織女星主果謝承後漢書曰劉祐字伯祖中山安國人仕郡爲主簿郡將小子常出錢付之市買果實祐悉以買筆墨書具與之華嶠後漢書曰桓榮爲􅀶士㑹庭中詔賜竒果受賜者懷之榮獨舉手奉以拜光武􅀏指之曰此真儒生也陳書曰徐孝克折侍宴無折所折食敢折至食折散當其折前折膳折羞折損减帝宻記以問中書舎人管斌斌自是伺之見孝克以珎果内紳帶中斌當時莫識其意後尋訪方知其以遺母斌以啓宣帝嗟嘆良乆乃勑自今宴享孝克前饌並遣將還以餉其母時論美之北史曰後魏淮陽王欣好營産業多所樹藝京師名果皆岀其園唐書曰李泳爲河陽所至以貪殘爲務犒宴所陳果實以木刻彩繢之􅀃文曰在木曰果在草曰蓏郎果切}
