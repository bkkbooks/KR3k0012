  - {type: variant, offset: 789, length: 329, content: 涕揮竹竹盡班今下雋有班皮竹篔簹顧微廣州記曰箄竹一名篔簹節長一丈吳錄曰始興曲江縣有篔簹竹圍尺五寸節相去六七尺夷人以為布葛異苑曰建安有篔簹竹節中有人長尺許頭足皆具竹譜曰篔簹竹大者中作甑苦竹永嘉郡記曰樂成縣民張薦者隱居頤志不應辟命家有苦竹數十頃在竹中為屋恒居其中王右軍聞而造之薦逃避竹中不與相見一郡號為高士射筒竹竹譜曰射筒竹薄肌而長中著箭因以為名沙麻竹南越志曰沙麻竹人削以為弓弓似弩淮南所謂溪子弩也或曰蘇麻竹或曰麤麻竹嶺表錄異曰沙摩竹廣桂皆植大如茶盌竹厚而空小一人止擎一莖堪為茅屋之椽梁也其種者即釤其竿每截二尺許釘入土不逾月而生根葉明年長牙笋不三載而為林蓋土地所宜也南人俺以鹽為笋笴石麻竹裴淵廣州記曰石麻竹勁利削為刀切象皮如截芋笣竹顧微廣州記曰平鄉縣有笣竹堪作布吳, SBCK: 駕輦車又蜀}
