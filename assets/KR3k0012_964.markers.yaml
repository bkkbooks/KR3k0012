  - {type: variant, offset: 1900, length: 6, content: 為桓玄將馮該, SBCK: 以戰栗莊子曰宋有狙公者好飬猿者恐衆狙之不馴於巳也先誑之曰與􅀂茅茅栗也朝三而暮四足乎衆狙皆超然而怒范子計然曰栗岀三輔莊子曰莊周遊乎調陵之燓樊蕃暏一異鵲感周之顙而集于栗林感觸也又曰古者禽獸多而人民少於是皆巢居以避之晝拾橡栗暮棲木上故命曰有巢氏之民國語曰夫婦䞇不過􅀥栗以告䖍也􅀥取蚤起栗取欲栗䖍敬也曲禮婦人之贄脯脩􅀥栗也韓子曰􅁗餓應候謂王曰五苑之果蔬橡􅀥栗以活民請發之王曰今發五苑以活民是使有功與無功爭取也人生而亂不如死治􅀃苑曰田饒曰果園梨栗後宫婦人摭以相擿而士曽不得一甞且夫財者君之}
