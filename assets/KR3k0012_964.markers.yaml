  - {type: variant, offset: 8, length: 129, content: 雲山有桂竹甚毒傷人必死郭璞曰始興小桂縣出桂竹也箭竹爾雅曰東南之美者有會稽之竹箭焉禮記曰禮之於人也如竹箭之有筠也事具禮部說文曰箭矢竹也戴凱之竹譜曰箭竹高者一丈節間三尺堅勁中為矢桃枝竹爾雅曰桃枝四寸有節今桃枝節間相去多四寸竹譜曰桃枝竹皮滑而黃可以為席山海經曰嶓冢, SBCK: 不周}
