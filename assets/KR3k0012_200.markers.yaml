  - {type: 'tls:seg', offset: 461, content: '', id: KR3k0012_CHANT_200-10a.7}
  - {type: variant, offset: 461, length: 0, content: '', SBCK: 張良未甞有戰闘功髙}
  - {type: variant, offset: 461, length: 0, content: '', WYG: 二十餘人皆為列侯其餘各以次受封及復死事之孤輕重各有差又曰曹洪字子亷以功封野王侯文}
  - {type: page-break, offset: 461, content: '', id: KR3k0012_WYG_200-12a, image: WYG0894/WYG0894-0758a.png}
  - {type: variant, offset: 461, length: 0, content: '', krp: 張良未甞有戰闘功髙}
  - {type: variant, offset: 462, length: 5, content: 令各言所樂, SBCK: 曰運籌䇿帷幄中决勝千里外子房功也乃封良爲留侯與蕭何等俱封六年上巳封大功臣二十餘人其餘日夜爭功未決未得行封上在雒陽南宫從􅃨道如淳曰上下有道故謂之􅃨也韋昭曰間道也望見}
  - {type: page-break, offset: 462, content: '', id: KR3k0012_SBCK_200-5a}
  - {type: variant, offset: 462, length: 3, content: 令各言, WYG: 時坐事削明帝即位更封樂成侯又曰曹休字文烈自荆州北歸太祖曰此吾家千里駒也文帝録前後功封為東亭侯又曰曹真字子丹以功封邵陵侯真少舉宗人尊鄉人朱讃並事太祖尊早亡真愍之乞分食邑封尊子等詔曰大司馬有叔向撫孤之仁晏平仲乆要之義聴分賜尊子等爵闗内侯及真薨明帝悉封真五子皆列侯又曰太祖自栁城還稱荀攸前後謀謨曰昔高祖使張子房自擇齊三萬户今孤亦欲使君自擇}
  - {type: page-break, offset: 462, content: '', id: KR3k0012_WYG_200-12b, image: WYG0894/WYG0894-0758b.png}
  - {type: variant, offset: 462, length: 5, content: 令各言所樂, krp: 曰運籌䇿帷幄中决勝千里外子房功也乃封良爲留侯與蕭何等俱封六年上巳封大功臣二十餘人其餘日夜爭功未決未得行封上在雒陽南宫從複道如淳曰上下有道故謂之複也韋昭曰間道也望見}
  - {type: variant, offset: 466, length: 1, content: 樂, WYG: 封又曰太祖見賈詡執手曰使我信重於天下者子也表為執金吾封都亭侯文帝即位又封詡小子訪為列侯又曰郭嘉字奉孝冀州平封齊陽亭侯及薨太祖表曰臣䇿未决嘉輔成之平定天下其功為最増邑并前千户又曰張既字徳容詔曰卿勲非但破胡乃永寧河右使吾長無西顧之念徙封西鄉侯又曰任峻字伯逺為典農中郎大興屯田軍國致饒太祖以峻功高表封都亭侯又曰張遼字文逺以功封都亭侯又討陳蘭梅成等入􅏦山中蘭等壁其上遼力戰平之太祖論}
  - {type: page-break, offset: 466, content: '', id: KR3k0012_WYG_200-13a, image: WYG0894/WYG0894-0758c.png}
  - {type: punctuation, offset: 467, content: ，, id: KR3k0012_CHANT_200-bkkpn176}
  - {type: 'tls:seg', offset: 467, content: '', id: KR3k0012_CHANT_200-10a.8}
  - {type: variant, offset: 469, length: 0, content: '', SBCK: 徃徃相與坐沙中語上曰此何語留侯曰此謀反耳上曰爲之奈何留侯曰上平生所憎羣臣所共知誰最甚者上曰雍齒數甞窘辱我留侯曰今急先封雍齒以示羣臣於是上置酒封雍齒爲什方侯}
  - {type: variant, offset: 469, length: 0, content: '', WYG: 功曰登天山以取蘭成盪寇功也乃増邑文帝又分封兄汎及一子列侯明帝踐阼進封晉陽侯及薨詔曰合肥之役遼以歩卒八百破賊十萬自古未之有也其分遼邑賜一子爵闗内侯又曰太祖表封荀攸曰前尅敵}
  - {type: page-break, offset: 469, content: '', id: KR3k0012_WYG_200-13b, image: WYG0894/WYG0894-0758d.png}
  - {type: variant, offset: 469, length: 0, content: '', krp: 徃徃相與坐沙中語上曰此何語留侯曰此謀反耳上曰爲之奈何留侯曰上平生所憎羣臣所共知誰最甚者上曰雍齒數甞窘辱我留侯曰今急先封雍齒以示羣臣於是上置酒封雍齒爲什方侯}
  - {type: variant, offset: 470, length: 2, content: 占豐, SBCK: 曰雍齒且侯我屬無患矣又曰髙祖以蕭何功最盛封爲鄼侯所食}
  - {type: variant, offset: 470, length: 7, content: 占豐邑美縣唯綝, WYG: 攸之謀也於是封攸陵陽亭侯又曰太祖謂于禁曰溝水之難吾焉能也將軍在亂能正雖古之名將何以加之乃録前後功封夀亭侯又曰文帝踐阼進張郃為鄭侯明帝詔曰賊亮以巴蜀之衆將軍所向克定乃益户并前四千三百户郃前後有功明帝分郃户封四子列侯又曰朱靈字文博先封鄃侯文帝詔曰將軍佐命先帝威過方召平生所志}
