  - {type: variant, offset: 1895, length: 441, content: 十二世而為晉所滅又曰周公旦武王之弟佐武王平紂而封於少皞之墟曲阜是為魯公凡四十四世而楚考烈王滅魯又曰管叔鮮蔡叔度武王之弟武王巳克殷封鮮於管封度於蔡周公誅武庚殺管叔放蔡叔蔡既遷而死其子曰胡胡乃改行率德周公言於成王復封于蔡凡二十五世至侯齊而楚惠王滅蔡又曰曹叔振鐸者武王弟也武王巳克殷封振鐸於曹凡二十四世至伯陽而宋滅曹又曰衛康叔者武王弟也周公以成王之命伐武庚放蔡叔殺管叔以殷餘民封康叔為衛君凡三十九世至君角而秦并天下廢為庶人又曰晉叔虞者成王之弟成王與叔虞戲削桐葉為珪以唐封汝史佚因言請擇日立叔虞成王曰吾與之戲耳史佚曰天子無戲言遂封叔虞於唐唐在河汾之東三十五世至靖公而韓魏趙三分其地又曰鄭桓公友者周厲王庶子封於鄭二十四世至鄭君乙而韓哀侯滅鄭併其地又曰越王勾踐其先苗胤夏后少康之子封會稽以奉守禹之祀斷髮文身二十餘世至子勾踐立滅吳稱霸後十世閩君搖佐諸侯平秦高祖以搖為楚王漢書曰漢興之初尊王子弟大啟九國京師內史凡十五郡公主列侯頗邑其中而國大者跨州兼郡小者連城數十也又曰高祖封兄喜為代王匈奴入代廢為合, SBCK: 卞郭益}
