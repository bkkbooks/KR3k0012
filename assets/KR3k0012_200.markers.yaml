  - {type: variant, offset: 703, length: 13, content: 諸將博士丁恭議曰古帝王封諸, SBCK: 猾}
  - {type: variant, offset: 703, length: 444, content: 諸將博士丁恭議曰古帝王封諸侯不過百里故利以建侯取法於雷又曰陰興遷侍中賜爵關內侯帝後召興欲封之置印綬於前興固讓曰臣未有先登陷陣之功而一家數人並蒙爵士令天下觖望誠為盈溢臣蒙陛下責之恩深至厚富貴巳極不可復加至誠不願帝嘉興之讓不奪其志又曰傅昌嗣建初中遭母憂因上書以國貧不願之封乞錢五十萬為關內侯肅宗怒貶為關內侯竟不賜錢魏志曰張魯自巴中將其餘眾降封魯及五子皆為列侯又曰文帝黃初二年分三公戶邑封子弟各一人為列侯又咸熙元年晉王奏建五等諸侯地七十里邑千六百戶官屬同諸公妾五人車前司馬八人旅賁三十六人吳志曰全琮字子璜劉備將關羽圍逼襄陽琮上䟽陳羽可討之計權時巳與呂蒙陰議襲之恐事泄故寢琮表不荅及擒羽權置酒公安顧謂琮曰君前陳此孤雖不相荅今日之捷亦君之功也於是封華亭侯晉書曰高貴鄉公將攻文帝召王沈及王業告之沈馳白帝以功封安平侯邑二千戶沈既不忠於主甚為眾論所非又曰衛瓘都督幽州以其離間二虜功賜子亭侯瓘乞以封弟未受命而亡子客受封為亭侯瓘六男無爵悉讓於弟遠近稱之隋書曰李崇字永隆英果有籌筭膽力過人後周元年以父賢勳封廻樂, WYG: 度汙}
