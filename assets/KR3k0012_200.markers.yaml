  - {type: variant, offset: 874, length: 0, content: '', SBCK: 復死事之􅀌輕重各有差又曰曹洪字子廉以功封野王侯文帝時坐事削明帝即位更封樂成侯又曰曹沐字文烈自荆州北歸太祖曰此吾家千里駒也文帝録前後功封爲東亭侯又曰曹眞字子丹以功封邵陵侯眞少舉宗人遵郷人朱讃並事太祖遵讃早亡眞愍之乞分食邑封遵子等詔曰大司馬有叔向撫􅀌之仁晏平乆要之分聽分賜遵等子爵開内侯及眞薨明帝悉封眞}
  - {type: page-break, offset: 874, content: '', id: KR3k0012_SBCK_200-7b}
  - {type: variant, offset: 874, length: 0, content: '', krp: 復死事之孤輕重各有差又曰曹洪字子廉以功封野王侯文帝時坐事削明帝即位更封樂成侯又曰曹沐字文烈自荆州北歸太祖曰此吾家千里駒也文帝録前後功封爲東亭侯又曰曹眞字子丹以功封邵陵侯眞少舉宗人遵郷人朱讃並事太祖遵讃早亡眞愍之乞分食邑封遵子等詔曰大司馬有叔向撫孤之仁晏平乆要之分聽分賜遵等子爵開内侯及眞薨明帝悉封眞}
  - {type: variant, offset: 877, length: 0, content: '', SBCK: 列侯又曰太祖自栁城還稱荀攸前後謀謨曰昔髙祖使張子房自擇齊三萬户今􅀌亦欲君自擇所封又曰太祖見賈詡執手曰使我信重於天下者子也表爲執金吾封都亭侯文帝即位又封詡小子訪爲列侯又曰郭嘉字奉孝兾州平封齊陽亭侯及薨太祖表曰臣策未决嘉輔成之平定天下謀功爲最増邑并前千户又曰張旣字德容詔曰卿勲非但破胡乃永寧河右使吾長無西顧之念徙封西郷侯又曰任峻字伯逺爲典農中郎大興屯田軍國致饒太祖以峻功髙表封都亭侯又曰張遼字文逺}
  - {type: page-break, offset: 877, content: '', id: KR3k0012_SBCK_200-8a}
  - {type: variant, offset: 877, length: 0, content: '', krp: 列侯又曰太祖自栁城還稱荀攸前後謀謨曰昔髙祖使張子房自擇齊三萬户今孤亦欲君自擇所封又曰太祖見賈詡執手曰使我信重於天下者子也表爲執金吾封都亭侯文帝即位又封詡小子訪爲列侯又曰郭嘉字奉孝兾州平封齊陽亭侯及薨太祖表曰臣策未决嘉輔成之平定天下謀功爲最増邑并前千户又曰張旣字德容詔曰卿勲非但破胡乃永寧河右使吾長無西顧之念徙封西郷侯又曰任峻字伯逺爲典農中郎大興屯田軍國致饒太祖以峻功髙表封都亭侯又曰張遼字文逺}
  - {type: variant, offset: 878, length: 0, content: '', SBCK: 盪冦將軍以功封都亭侯又討陳蘭梅成等入􅈞山中蘭等壁其上遼力戰平之太祖論諸將功曰登天山以取蘭成盪寇功也乃増邑文帝又分封兄汎及一子}
  - {type: variant, offset: 878, length: 0, content: '', krp: 盪冦將軍以功封都亭侯又討陳蘭梅成等入灊山中蘭等壁其上遼力戰平之太祖論諸將功曰登天山以取蘭成盪寇功也乃増邑文帝又分封兄汎及一子}
  - {type: variant, offset: 879, length: 0, content: '', SBCK: 侯帝踐祚進封晉陽侯及薨詔曰合肥之役遼以歩卒八百破賊十萬自古未之有也其分遼邑賜一子爵関内侯又曰太祖表封荀攸曰前尅敵皆攸之謀也於是封攸陵樹亭侯又曰太祖謂于禁曰淯水之難吾焉能也將軍在亂能整雖古之名將何以加之乃録前後功封壽亭}
