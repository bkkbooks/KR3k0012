  - {type: variant, offset: 485, length: 0, content: '', SBCK: 蕭何未甞有汗馬之勞反居臣等上何也帝曰諸君知獵乎追殺獸者狗也而發蹤指示獸處者人也今諸君徒能得獸耳功狗也至如蕭何發蹤功人也且諸君獨以隨我多者兩三人何舉宗數十}
  - {type: variant, offset: 485, length: 0, content: '', krp: 蕭何未甞有汗馬之勞反居臣等上何也帝曰諸君知獵乎追殺獸者狗也而發蹤指示獸處者人也今諸君徒能得獸耳功狗也至如蕭何發蹤功人也且諸君獨以隨我多者兩三人何舉宗數十}
  - {type: variant, offset: 487, length: 2, content: 欲縣, SBCK: 隨我功不可忘也皆曰平陽侯曹叅身􅀍七十創攻城略地功最多冝第一鄂君進曰羣臣議皆誤陛下雖亡山東何常全􅀜中以待陛下此萬丗之功奈何以一旦之功而加萬丗之功哉蕭何第一曹叅次之上曰吾聞進賢受上賞蕭何功雖髙得鄂君乃益明封鄂君故所食􅀜内侯邑封爲安平侯又曰髙祖封項伯等四人爲列侯賜姓劉氏又曰項羽􅀍十餘瘡顧見漢􅀐司馬吕馬童曰􅀂非吾故人乎馬童面之指王翳曰此項王也羽迺曰吾聞漢購我頭千金邑萬户吾爲公得之乃自剄王翳取其頭亂相蹂蹈爭羽相殺者數十人最後楊喜吕馬童吕勝楊武各得一體故分其地以封五人皆爲列侯又曰陳豨反上自至邯鄲喜曰豨不南據邯鄲北阻漳水吾知其無能爲矣上令周昌選趙壯士可令將者因見四人上嫚罵曰竪}
