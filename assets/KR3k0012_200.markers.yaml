  front:
  - {type: variant, offset: 0, length: 0, content: '', SBCK: 太平御覽卷第二百}
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_200-1a}
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書太平御覽卷二百宋李昉等撰}
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_200-1a, image: WYG0894/WYG0894-0752c.png}
  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第二百}
  body:
  - {type: variant, offset: 3, length: 1, content: 二, SBCK: 三以}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 三以公相封功臣封以公相封漢書在恩澤表魏氏羣臣封并見此篇也漢書曰高祖撥亂誅暴庶事草創行賞授位以能為次叙至於孝武元功宿將畧盡上亦興文學進㧞幽隠公孫𢎞自海濵而登宰相自是之後宰相畢侯又曰漢帝以列侯為丞相唯公孫𢎞無爵為丞相上於是下詔封丞相平津侯其後以為故事丞相封侯自𢎞始也又曰武帝時田千秋為高廟郎上書訟衛太子寃上亦頗知太子惶恐感悟召千秋曰父子之間人所難言此高廟神靈使公教我當遂為吾輔拜千秋大鴻臚數月為丞相封富民侯又曰朱博以丞相封}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_WYG_200-1b, image: WYG0894/WYG0894-0752d.png}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_WYG_200-2a, image: WYG0894/WYG0894-0753a.png}
  - {type: variant, offset: 3, length: 1, content: 二, krp: 三以}
  - {type: xml-element, offset: 4, content: '', id: KR3k0012_CHANT_200-bkkxmlele1}
  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_200-1a.1}
  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_200-1a.2}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 千五百户上書故事不過千户還千五百户魏志曰王朗字景興文帝即位授司空進封平鄉侯子肅嗣初文帝分朗邑封一子列侯朗乞封兄子詳又曰崔林為司空封陽安亭侯邑六百户三}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 相}
  - {type: variant, offset: 5, length: 0, content: '', krp: 相}
  - {type: xml-element, offset: 6, content: '', id: KR3k0012_CHANT_200-bkkxmlele2}
  - {type: xml-element, offset: 6, content: '', id: KR3k0012_CHANT_200-bkkxmlele3}
  - {type: 'tls:seg', offset: 6, content: '', id: KR3k0012_CHANT_200-1a.3}
  - {type: variant, offset: 6, length: 6, content: 韋昭辯釋名曰, SBCK: 功臣封以}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 列侯自林始也臣松之有言漢封丞相已為荀悅所譏魏封三公其不同矣又曰曹爽以大將軍輔政封武安侯邑萬二千户又曰陳羣以鎮軍録尚書受遺詔進封潁隂侯又曰何巙字叔龍為太子少傅太傅文帝踐阼封陽亭侯三百户病乞遜位詔曰以親則君有輔弼之勲以賢則君有淳固之茂又曰劉放字子葉為中書監掌機宻進封魏夀亭侯孫資為中書令封洛陽侯太和末資决䇿伐公孫淵進左鄉侯遼東平定以叅謀之功各封大縣放方城侯資中郡侯齊王即位以决定大謀並増邑子一人亭侯又曰衛凱為漢侍中勸讃禪代之義為文誥之命文帝踐祚封陽平亭侯明帝即位進閿鄉侯又曰桓楷為尚書令封亭鄉侯及病文帝自臨省謂之曰吾方託六尺之孤寄天下之命卿勉之徙封安樂鄉侯又曰胡質薨家無餘財唯賜衣書箧而已追封陽陵亭侯又曰盧毓衛臻徐宣喬和洽常林杜襲裴潜韓暨高文恵王觀辛毗劉靖王基並以列卿尚書封侯又曰漢制凡人君特所寵念皆賜之封邑及丞相初拜亦錫茅土號曰恩澤出自於情非至公之封也中興以来無有封者功臣封周禮夏官曰司勲掌六卿封地之法以等其功王功曰勲國功曰功事功曰勞治功曰力戰功曰多克敵出竒若韓信陳平者凡有功者銘書於王之太常史記曰古之人功有五品以徳立宗廟定社稷曰勲以言曰勞用力曰功明其等曰伐積日曰閱又曰太公望文王立以為師文王作酆邑天下三分有其二及武王克紂太公之謀居多於是武王封尚父於齊營邱成王時管蔡作亂淮夷叛周乃使召康公命太公東至海西至河南至穆陵北至無棣五侯九伯汝實征之齊由此得専征伐為大國二十八世又曰召公奭與周同姓武王滅殷封召公於燕其在成王時自陕以西召公主之自陕以東周公主之四十三世秦始皇滅之又曰楚出自帝顓頊高陽後呉回居火正為祝融吳回生陸終陸終子六人少曰季連季連之苗𦙍曰鬻子鬻子事周文王早卒當成王之時舉文武勤勞之嗣乃封其後熊繹於楚以子男之國三十世至負芻而秦滅楚又曰魏者畢公高之後畢公高與周同姓武王封之於畢其後曰畢萬事晉獻公伐霍取魏滅之因以魏封畢萬為大夫卜偃曰畢萬之後必大萬盈數也魏大名也以是始賞天啟之矣其後魏獻子舒為晉卿至魏文侯為諸侯子武立與韓趙共滅晉國三分其地又七世至王假秦滅魏又曰韓與周同姓其後世事晉得封於韓原曰韓武子武子三世有韓厥從封姓為韓氏六世至景侯䖍始列為諸侯及孫哀侯與趙魏共滅晉三分其地八世至王安而秦滅韓又曰趙氏之先與秦共祖造父事周穆王攻徐破之乃賜以趙城七世叔𢃄去周入晉趙氏五世而至趙夙夙生衰衰生盾並為大夫其後趙鞅是為簡子始大又四世而至列侯籍始立為諸侯三世至敬侯與韓魏共滅晉分其地又七世至幽王繆降秦而趙滅又曰陳完者陳厲公佗之子完後奔齊為田氏齊懿氏欲妻之卜之曰是謂鳳凰子飛和鳴鏘鏘有媯之後將育于姜八世之後莫之與京卒妻之完卒諡為敬仲六世而至田常田常殺齊敬公立簡公弟平乃割齊安平以東為已封封邑大於齊至曽孫和遂遷齊康公於海上而田和立為齊侯五世至王建為秦所滅又曰西戎與申侯伐周殺幽王驪山下秦襄公將兵救周避犬戎難東徙雒邑襄公以兵送周平王平王封襄公為諸侯賜之岐以西之地於是始國與諸侯通又曰樂毅并䕶趙楚韓魏燕之兵以伐齊破之追至於臨淄齊湣王走保於莒樂毅獨留狥齊攻入臨淄盡取齊寳財物祭噐輸之燕燕昭王大悦親至濟上勞軍行賞饗士封毅於昌國號昌國君漢書曰項羽佯尊懐王為義帝實不用其命二月羽自立為西楚覇王王梁楚地九郡都彭城背約更立沛公為漢王巴蜀漢中四十一縣都南鄭三分闗中立秦三將章邯為雍王都廢丘縣名今槐里是司馬欣為塞王}
