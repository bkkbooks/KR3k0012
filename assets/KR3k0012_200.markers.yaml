  - {type: variant, offset: 452, length: 6, content: 拜河南太守及, WYG: 所征必克豈吾功哉乃賢士大夫之力也天下雖未悉定吾要與賢士大夫共定之而専饗其勞苦何以安焉其保定功行封於是大}
  - {type: variant, offset: 453, length: 0, content: '', SBCK: 千秋大鴻臚數月爲丞相封富民侯又曰朱愽以丞相封二千五百户上書故事不過千户還千五百户魏志曰王朗字景興文帝即位授司空進封平郷侯子肅嗣􅀄文帝分朗邑封一子列侯朗乞封兄子詳又曰崔林爲司空封陽安亭侯邑六百户三公封列侯自林始也臣松之有爲漢封丞相巳爲荀恱所譏魏封三公其末同也又曰曹爽以大將軍輔政封武安侯邑萬二千户又曰陳羣以鎭軍録尚書受遺詔進封頴隂侯又曰何夔字叔龍爲太子少傅太僕文帝踐祚封陽亭侯三百户病乞遜位詔曰以親則君有輔弼之勲以賢則君有淳固之茂又曰劉放字子棄爲中書監掌機密進封魏壽亭侯孫資爲中書令封樂陽亭侯太和末資決䇿伐公孫淵進左郷侯遼東平定又以叅謀之功各封大縣放方城侯資中郡侯齊王即位以决定大謀並増邑子一人亭侯又曰衛覬爲漢侍中勸讃禪代之義爲文誥之命文帝踐祚封陽告亭侯明帝即位進閿郷侯又曰桓楷爲尚書令封亭郷侯及病文帝自臨省謂之曰吾方託六尺之􅀌􅀉天下之命卿勉之徙封安樂郷侯又曰胡質薨家無餘財唯賜衣書篋而巳追封陽陵亭侯又曰盧毓衛臻徐宣陳矯和洽常林杜襲裴濳韓曁髙文惠王觀辛毗劉靖王基並以列卿尚書封侯又曰漢制凡人君特所寵念皆賜之封邑及丞相􅀄拜亦錫茅土號曰恩澤出自私情非至公之封也中興以來無有封者功臣封周禮夏官曰司勲司勲掌六卿賞地之法以等其功王功曰勲國功曰功民功曰庸事功曰勞治功曰力戰功曰多克敵岀竒􅀂韓信陳平者凡有功者銘書於王之太常史記曰古之人功有五品以德立宗廟定社稷曰勲以言曰勞用力曰功明其等曰閥積功曰閱又曰太公望文王立以爲師文王作酆邑天下三分有其二及武王克紂太公之謀居多於是武王封尚父於齊營丘成王時及管蔡作亂淮夷叛周乃使邵康公封太公東至海西至}
