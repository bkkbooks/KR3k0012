  - {type: substitution, offset: 8, original: 辯, replacement: 辨, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-4109}}
  - {type: punctuation, offset: 11, content: 》, id: KR3k0012_CHANT_200-bkkpn2}
  - {type: variant, offset: 11, length: 0, content: '', WYG: 桃林塞也都櫟陽董翳為翟王文穎}
  - {type: punctuation, offset: 12, content: ：, id: KR3k0012_CHANT_200-bkkpn3}
  - {type: 'tls:seg', offset: 12, content: '', id: KR3k0012_CHANT_200-1a.4}
  - {type: punctuation, offset: 12, content: 「, id: KR3k0012_CHANT_200-bkkpn4}
  - {type: variant, offset: 12, length: 0, content: '', WYG: 本上郡秦所置項羽更名為翟也都高奴楚將瑕丘申陽為河南王都雒陽趙將司馬卬為殷王都朝歌當陽君英布為九江王都六懐上柱國共敖為臨江王本南郡改為臨江國都江陵藩君吴芮為衡山王都邾文穎曰邾音朱縣名故齊王建孫田安為濟北王徙魏王豹為西魏王都平陽徙燕王韓廣為遼王燕王臧荼為燕王都薊徙齊王田市為膠東王齊將田都為齊王趙歇為代王趙相張耳為常山王也又曰漢四年立韓信為齊王徙為楚王五年以九江王英布為淮南王盧綰為燕王韓信為代王彭越為梁王又曰尅項八載天下乃平始論功侯者四十有三人時人民流散王}
  - {type: page-break, offset: 12, content: '', id: KR3k0012_WYG_200-7a, image: WYG0894/WYG0894-0755c.png}
  - {type: page-break, offset: 12, content: '', id: KR3k0012_WYG_200-7b, image: WYG0894/WYG0894-0755d.png}
