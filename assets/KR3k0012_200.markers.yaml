  - {type: variant, offset: 3104, length: 245, content: 長平侯四子皆封侯貴震天下天下歌曰生男無喜生女無怒獨不見衛子夫霸天下漢書曰文帝封太后弟薄昭為軹侯又封王舅駟鈞為侯又曰景帝封太后弟姪竇廣國為章武侯竇彭祖為南皮侯竇嬰以破吳楚功封魏其侯后弟王信為益靖侯又曰武帝封太后同母弟田蚡為武安侯勝周陽侯皇后弟衛青以伐匈奴封長平侯皇后姊子霍去病以伐匈奴封冠軍侯漢書曰元帝封王皇后父禁為平陽侯薨長子鳳嗣又曰王音既以從舅越親用事小心親職歲餘上下詔封音為安陽侯食邑與五侯等俱三千戶又曰成帝封太后兄子莽為新都侯宣帝悼皇考皇舅孫史丹為武陽侯皇后兄趙欽為新成侯父趙臨為成陽, SBCK: 度汗縣}
