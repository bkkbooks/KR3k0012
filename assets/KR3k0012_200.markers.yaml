  - {type: 'tls:seg', offset: 13, content: '', id: KR3k0012_CHANT_200-1a.5}
  - {type: variant, offset: 13, length: 47, content: 直也取其正直無私易師卦曰大君有命開國承家周書能移於眾與百姓同之謂公周禮地官曰大司徒職曰諸公之地, SBCK: 相}
  - {type: variant, offset: 13, length: 1, content: 直, WYG: 侯不過萬家封爵之誓曰使黄河如𢃄太山如礪於是申以丹書之信重以白馬之盟藏諸宗廟副在有司迨文景四五世間流民既歸户口亦息列侯大者三四萬户小國自倍其後子孫驕恣忘其先祖之艱難多陷法禁訖於孝武後元之年靡有孑遺又曰漢封功臣張良未嘗有戰鬬功高帝曰運籌䇿帷幄中决勝千里外子房功}
  - {type: variant, offset: 13, length: 47, content: 直也取其正直無私易師卦曰大君有命開國承家周書能移於眾與百姓同之謂公周禮地官曰大司徒職曰諸公之地, krp: 相}
  - {type: punctuation, offset: 15, content: ；, id: KR3k0012_CHANT_200-bkkpn6}
  - {type: 'tls:seg', offset: 15, content: '', id: KR3k0012_CHANT_200-1a.6}
  - {type: variant, offset: 15, length: 0, content: '', WYG: 乃封良為留侯與蕭何俱封六年上已封大功臣二十餘人其餘日夜争功未决未得行封上在雒陽南宫從複道如淳曰上下有道故謂之複也韋昭日間道也望見諸將往往相與坐沙中語上曰此何為留侯曰此謀反耳上曰為將奈何留侯曰上平生所憎羣臣所其知誰最甚者上曰雍齒數嘗窘辱我留侯曰今急先封雍齒以示羣臣於是上置酒封雍齒為什方侯皆曰雍齒且侯我屬無患矣又曰高祖以蕭何功最盛封為鄼侯所食邑多功臣皆曰蕭何未嘗有汗馬之勞反居臣等上何也帝曰諸君知獵乎追殺獸者狗也至於發縱指示獸處者人也今諸君徒能得獸耳功狗也至如蕭何發縱功人也且諸君獨以隨我多者兩三人何舉宗數十人皆隨我功不可忘也皆曰平陽侯曹參身被七十創攻城畧地功最多宜第一鄂君進曰羣臣議皆誤陛下雖亡山東何常全闗中以待陛下此萬世之功奈何以一旦之功而加萬世之功哉蕭何第一曹參次之上曰吾聞進賢受上賞蕭何功雖高得鄂君乃益明封鄂君故所食闗内侯邑封為安平侯又曰高祖封項伯等四人為列侯賜姓劉氏又曰項羽被十餘創顧見漢騎司馬吕馬童曰若非吾故人乎馬童靣之指王翳曰此項王也羽迺曰吾聞漢搆我頭千金邑萬户吾為公得之乃自剄王翳}
  - {type: page-break, offset: 15, content: '', id: KR3k0012_WYG_200-8a, image: WYG0894/WYG0894-0756a.png}
