  - {type: variant, offset: 547, length: 2, content: 韓歆, krp: 文帝詔曰方大臣諸吕迫朕朕狐疑皆止朕唯中尉宋昌勸朕朕巳得保守宗廟已尊昌爲衛將軍其}
  - {type: variant, offset: 550, length: 2, content: 扶陽, SBCK: 昌爲壯武}
  - {type: variant, offset: 550, length: 1, content: 扶, WYG: 闗内亭侯為闗公所得罵公而死太祖悲之封其二子為列侯又曰徐邈字景山西域流通荒戎入貢皆邈勲也以功封都亭侯又曰王㫤字文舒討諸葛誕誕誅詔曰昔孫臏佐趙輸大梁兵驟進此所以成兵勢也増邑四千七百户吳志曰駱統字公緒初曹仁攻濡須使别將常雕等襲中洲統與嚴圭共拒破之封新陽亭侯晉書曰苻堅南寇桓伊與冠軍將軍謝元輔國將軍謝琰俱破堅於肥水以功封永循縣侯進右軍將軍賜錢百萬袍表千端王隠晉書曰封宣帝為武平侯公孫淵平又増封舞陽昆陽二縣又曰封文帝為高都侯大始元年詔曰昔唐虞三代之盛暨於漢魏創制度褒崇元勲班爵行賞與國同體施禄逮下萬邦咸乂朕以寡徳登於天位託於王公之上腹心股肱文臣武臣光齊帝業余嘉乃勲慶賞之行其用宜速又曰張華傳曰華以建䇿功加右光禄大夫開府儀同三司固辭不受詔聴之及更論平吴之功封華郡公三千户主者擇近郡平土詳依典制施行華譲前後十餘頻繁懇誠詔不聴遂受封晉中興書曰元帝以佐命功封周玘烏程公又封王敦武昌公又曰孔愉字敬康以討華軼功封愉餘下亭侯初愉少時嘗得一龜放於餘溪中流左顧者數過及鑄侯印見龜左顧更鑄猶然印工以聞愉悟遂佩焉又曰明帝以平錢鳳功封温嶠始興公蘇峻邵陵侯劉泉泉陵侯應詹觀寧侯卞郭益}
