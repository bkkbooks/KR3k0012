  - {type: variant, offset: 3488, length: 611, content: 戶增防防身帶三綬寵貴至盛又曰鄧訓自中興後累世寵貴凡侯者二十九人貴盛莫比後漢書曰明德馬后詔不得封外戚章帝省詔悲歎復重請曰漢興舅氏之封侯猶皇子之為王也太皇誠存謙虛奈何令臣獨不加恩三舅乎且衛尉年尊兩校尉有大病衛尉太后兄瘳兩校尉兄防兄光也如令不諱使臣長抱刻骨之恨宜及吉時不可稽留太后報曰吾反覆念之思令兩善豈徒欲獲謙讓之名而使帝受不外施之嫌哉以恩澤封爵外家為外施也昔竇太后欲封王皇后之兄竇太后文帝后也王皇后景帝后也兄即王信後封為蓋侯丞相條侯言受高祖約無軍功非劉氏不侯條侯周亞夫也前書曰高帝與功臣約非劉氏不王非功不侯如違約天下共擊之今馬氏無功於國豈得與陰郭中興之后等耶後漢書曰陰識封陰鄉侯二年以征伐軍功增封識讓曰天下初定將帥有功者眾臣託屬掖庭乃加爵邑不可以示天下帝甚美之魏志黃初二年詔曰后族之家不得橫受芧土之爵以此詔傳後世若有違背天下共誅之魏志曰明帝追封甄后父逸安成鄉侯兄豫襲封後改為魏昌侯子暢嗣父封暢弟溫韡艷皆列侯又以後亡從孫黃合葬帝愛女淑追封黃列侯吳志曰孫皓元年十二月封后父滕牧為高密侯舅何等三人皆列侯王隱晉書曰武帝封楊后父鎮軍將軍楊駿為臨晉侯后母太原龐為安昌鄉君太學生王鈴曰侯稱臨晉後必制國也駿漸驕傲胡奮語駿曰卿恃女更豪耶人與天家婚未有不滅門者早晚事耳駿曰卿女復不在天家耶奮曰我女與卿女作婢何能增損又曰楊駿以父超居重位自鎮軍將軍遷車騎將軍封臨晉侯識者議之曰夫建諸侯所以藩屏王室也后妃所以供粢盛弘內教也后父始封而以臨晉為侯兆於亂也, SBCK: ''}
