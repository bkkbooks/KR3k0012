  - {type: variant, offset: 866, length: 1, content: 將, SBCK: 賜淵子五人皆爵関内侯又太祖令曰吾起義兵誅暴乱於今十九年所征必尅豈吾功哉乃賢士大夫之力也天下雖未悉定吾要與賢士大夫共定之而專饗其勞吾何以安焉其保定功行封於是大封功臣二十餘人皆爲列侯}
