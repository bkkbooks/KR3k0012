  - {type: variant, offset: 633, length: 0, content: '', SBCK: 韓王信入匈奴與太子俱至頽當城生子因名頽當至孝文時降封弓髙侯頽當孽孫嫣貴幸顯當時丗嫣弟􅀃以校尉征匈奴封龍額侯又曰景帝封功臣衛綰直不疑等十九人綰封建陵侯不疑塞侯又曰張賀爲掖庭令而宣帝以皇曽孫時收養掖庭恩甚密焉及宣帝即位而賀巳死宣帝追恩乃封其家爲恩德侯置守冢二百人東􅀚漢記曰光武功臣鄧禹等二十八人皆爲侯封餘功臣一百八十九人又曰李通上司空印綬以特進奉朝請乆之有司奏請付諸皇子上感通首創大謀因封通少子雄爲邵陵侯又日}
