  - {type: variant, offset: 1258, length: 2841, content: 戶妾四人車前司馬八人旅賁二十八人後周書曰王勇論討茹茹功別封永固縣伯邑五百戶時有別封者例聽回授次子勇獨請封兄子元興時人義之子封周禮春官典命職曰子男五命其國家宮室車旗衣服禮儀皆以五為節又曰春官大宗伯職曰子執榖璧魏志曰蔣愷濟之孫也咸熙中開建五等以濟著勳前朝改封愷為下蔡子又曰咸熙元年相國晉王奏王等諸子地方五十里邑八百戶相一人典詞令典書丞典衛丞各一人妾三人車前司馬四人旅賁二十人齊書曰王敬則封重安縣子邑三百五十戶敬則少時於草中射獵有蟲如鳥豆集其身擿去乃脫處皆流血敬則惡之詣道士卜道士曰不須憂此封侯之瑞也敬則聞之喜故出都自效至是如言環濟要略曰子獨孳孳栖下之稱也男封周禮地官大司徒職曰諸男之地封疆方百里其食者四之一又春官典命職曰男執蒲璧環濟要略曰男任也任治事受王命為君也魏志曰咸熙元年相國晉王奏建五等男地方三十五里邑四百戶相一人典祠長典書丞各一人妾二人車前司馬二人旅賁十二人又次國男方二十五里邑二百戶同姓封毛詩駉閟宮曰乃命魯公俾侯于東奄有龜蒙遂荒大東左傳僖中曰昔周公弔二叔之不咸故封建親戚以蕃屏周管蔡郕霍魯衛毛聃郜雍曹滕畢原酆郇文之昭也文昭十六國也邘鄑應韓武之穆也武穆四國凡蔣邢茅胙祭周公之胤也周公胤六國也又昭公上曰武王邑姜娠大叔夢天謂巳余命而子曰虞將與之唐及生文在手曰虞遂以命之史記曰吳太伯太伯弟仲雍皆周大王之子而季歷之兄二人知大王欲立季歷乃適荊蠻以避季歷義而歸之千餘家立為吳太伯太伯無子而仲雍代立五世武王克商求太伯仲雍之後得周章周章巳君吳因而封之又曰武王封吳周章之弟虞仲於虞列為諸侯十二世而為晉所滅又曰周公旦武王之弟佐武王平紂而封於少皞之墟曲阜是為魯公凡四十四世而楚考烈王滅魯又曰管叔鮮蔡叔度武王之弟武王巳克殷封鮮於管封度於蔡周公誅武庚殺管叔放蔡叔蔡既遷而死其子曰胡胡乃改行率德周公言於成王復封于蔡凡二十五世至侯齊而楚惠王滅蔡又曰曹叔振鐸者武王弟也武王巳克殷封振鐸於曹凡二十四世至伯陽而宋滅曹又曰衛康叔者武王弟也周公以成王之命伐武庚放蔡叔殺管叔以殷餘民封康叔為衛君凡三十九世至君角而秦并天下廢為庶人又曰晉叔虞者成王之弟成王與叔虞戲削桐葉為珪以唐封汝史佚因言請擇日立叔虞成王曰吾與之戲耳史佚曰天子無戲言遂封叔虞於唐唐在河汾之東三十五世至靖公而韓魏趙三分其地又曰鄭桓公友者周厲王庶子封於鄭二十四世至鄭君乙而韓哀侯滅鄭併其地又曰越王勾踐其先苗胤夏后少康之子封會稽以奉守禹之祀斷髮文身二十餘世至子勾踐立滅吳稱霸後十世閩君搖佐諸侯平秦高祖以搖為楚王漢書曰漢興之初尊王子弟大啟九國京師內史凡十五郡公主列侯頗邑其中而國大者跨州兼郡小者連城數十也又曰高祖封兄喜為代王匈奴入代廢為合陽侯子濞為吳王又曰呂后封楚王郢為下邳侯齊王肥子章朱虛侯興居東牟侯又曰孝文封齊王肥子十人為侯淮南王長子四人為侯後改封王又曰孝景封楚王子四人為侯梁王子二人為侯又曰淮南厲王死後孝文憐淮南王有子四人年皆七八歲迺封子安為阜陵侯子勃為安陽侯子賜為陽周侯子良為東城侯又曰梁孝王死竇太后泣極哀不食帝哀懼不知所為與長公主計之迺分梁為五國盡立孝王男五人為王女五人皆令食湯沐邑奏之太后太后迺悅為帝一食又曰孝武帝令諸王推恩分子弟諸王子孫一百七十七人為侯又曰武帝以子弘為齊王子旦燕王子胥廣陵王子髆昌邑王髆子賀為昭帝後即位二十七日廢歸故縣又曰武帝使御史大夫張湯策立子閎為齊王曰於戲小子閎受茲青社朕承祖考維稽古建爾國家封於東土世為漢蕃輔立子旦為燕王曰小子旦受茲玄社建爾國家封于北土子胥為廣陵王曰小子胥受茲赤社建爾國家封于南土又曰宣帝詔曰蓋聞象有罪舜封之其封昌邑王賀為海昏侯又曰宣帝封子厥為淮陽王宇為東平王囂為楚王竟為中山王廣陵王子胥弘為高密王又曰昭帝封諸王子孫十二人宣帝封六十三人元帝封四十八人成帝封四十三人哀帝封九人平帝封四十八人為侯續漢書曰靈帝封河間王子庾為濟南王奉帝父孝仁祀魏志曰明帝大和六年春二月詔曰古之帝王封建諸侯所以藩屏王室也詩不云乎懷德惟寧宗子維城秦漢繼周或強或弱俱失厥中大魏創業諸王開國隨時之宜未有定制非所以永為後法也其改封諸侯王皆以郡為國晉起居注曰武帝詔皇子裕生七歲矣得疾封始平王又曰武帝詔安平獻王孫承昔以父早亡不建大祚以縣封之今以三縣封為武邑王又曰惠帝詔侍中司馬討楊駿之功封東海王食六縣晉百官名曰武帝以齊王蕤為遼東王紹皇弟定國後贊為廣陵王紹弟廣德後陳留風俗傳曰周成王戲其弟桐葉之封周公曰君無二言遂封之於唐唐侯常慎其德其詩曰媚茲一人唐侯慎德是也華陽國志曰武帝封子頴為成都王以蜀廣漢犍為汶山十萬戶為王國易蜀郡太守號為成都內史外戚封史記曰武帝衛后弟青封長平侯四子皆封侯貴震天下天下歌曰生男無喜生女無怒獨不見衛子夫霸天下漢書曰文帝封太后弟薄昭為軹侯又封王舅駟鈞為侯又曰景帝封太后弟姪竇廣國為章武侯竇彭祖為南皮侯竇嬰以破吳楚功封魏其侯后弟王信為益靖侯又曰武帝封太后同母弟田蚡為武安侯勝周陽侯皇后弟衛青以伐匈奴封長平侯皇后姊子霍去病以伐匈奴封冠軍侯漢書曰元帝封王皇后父禁為平陽侯薨長子鳳嗣又曰王音既以從舅越親用事小心親職歲餘上下詔封音為安陽侯食邑與五侯等俱三千戶又曰成帝封太后兄子莽為新都侯宣帝悼皇考皇舅孫史丹為武陽侯皇后兄趙欽為新成侯父趙臨為成陽侯太后姊子淳于長定陵侯中山王舅馮參為宜陽侯又曰哀帝欲封祖母傅太后從弟商鄭崇諫曰孝武皇帝封親舅五侯天為赤黃晝昏日中有黑氣今祖母從昆弟二人巳侯許皇后父高武侯以三公封尚有因綠今欲復封商壞亂制度逆天人心非傅氏之福東觀漢記曰封馬防兄弟三人各六千戶為頴陽侯特以勳勞綏定西羌以襄城美亭一千二百戶增防防身帶三綬寵貴至盛又曰鄧訓自中興後累世寵貴凡侯者二十九人貴盛莫比後漢書曰明德馬后詔不得封外戚章帝省詔悲歎復重請曰漢興舅氏之封侯猶皇子之為王也太皇誠存謙虛奈何令臣獨不加恩三舅乎且衛尉年尊兩校尉有大病衛尉太后兄瘳兩校尉兄防兄光也如令不諱使臣長抱刻骨之恨宜及吉時不可稽留太后報曰吾反覆念之思令兩善豈徒欲獲謙讓之名而使帝受不外施之嫌哉以恩澤封爵外家為外施也昔竇太后欲封王皇后之兄竇太后文帝后也王皇后景帝后也兄即王信後封為蓋侯丞相條侯言受高祖約無軍功非劉氏不侯條侯周亞夫也前書曰高帝與功臣約非劉氏不王非功不侯如違約天下共擊之今馬氏無功於國豈得與陰郭中興之后等耶後漢書曰陰識封陰鄉侯二年以征伐軍功增封識讓曰天下初定將帥有功者眾臣託屬掖庭乃加爵邑不可以示天下帝甚美之魏志黃初二年詔曰后族之家不得橫受芧土之爵以此詔傳後世若有違背天下共誅之魏志曰明帝追封甄后父逸安成鄉侯兄豫襲封後改為魏昌侯子暢嗣父封暢弟溫韡艷皆列侯又以後亡從孫黃合葬帝愛女淑追封黃列侯吳志曰孫皓元年十二月封后父滕牧為高密侯舅何等三人皆列侯王隱晉書曰武帝封楊后父鎮軍將軍楊駿為臨晉侯后母太原龐為安昌鄉君太學生王鈴曰侯稱臨晉後必制國也駿漸驕傲胡奮語駿曰卿恃女更豪耶人與天家婚未有不滅門者早晚事耳駿曰卿女復不在天家耶奮曰我女與卿女作婢何能增損又曰楊駿以父超居重位自鎮軍將軍遷車騎將軍封臨晉侯識者議之曰夫建諸侯所以藩屏王室也后妃所以供粢盛弘內教也后父始封而以臨晉為侯兆於亂也, WYG: ''}
