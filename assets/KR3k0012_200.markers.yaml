  - {type: variant, offset: 17, length: 72, content: 正直無私易師卦曰大君有命開國承家周書能移於眾與百姓同之謂公周禮地官曰大司徒職曰諸公之地封土方五百里其食半又春官曰太宗伯職曰公執桓圭晉書曰陶侃有善, WYG: 頭亂}
