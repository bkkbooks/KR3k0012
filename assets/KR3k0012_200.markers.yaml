  - {type: variant, offset: 633, length: 1, content: 建, WYG: 成帝以平蘇峻功封公者三人侯者八人又以討郭黙功封者三人穆帝以平蜀功封桓温臨賀公又曰哀帝以平闗洛功封桓冲豐城公海西公以平袁真功賜桓温子偉為西昌公又曰安帝以興復功封劉裕等二十三人裕昌謀封豫章公萬户劉毅南平公五千户何無忌安成公劉道規華容公晉起居注曰太康元年詔曰張華前與故太傅創謀大計部分方䇿有謀謨之勲封廣}
