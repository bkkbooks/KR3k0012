  - {type: variant, offset: 456, length: 2, content: 守及, SBCK: 山如礪於是申以丹書之信重以白馬之盟藏諸宗廟副在有司迨文景四五丗間流民旣歸户口亦息列侯大者三四萬户小國自倍其後子孫驕恣忘其先祖之艱難多䧟法禁訖干孝武後元之年靡有孑遺又曰漢}
  - {type: variant, offset: 456, length: 2, content: 守及, krp: 山如礪於是申以丹書之信重以白馬之盟藏諸宗廟副在有司迨文景四五丗間流民旣歸户口亦息列侯大者三四萬户小國自倍其後子孫驕恣忘其先祖之艱難多䧟法禁訖干孝武後元之年靡有孑遺又曰漢}
