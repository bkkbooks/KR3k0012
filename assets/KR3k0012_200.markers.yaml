  - {type: variant, offset: 453, length: 0, content: '', krp: 千秋大鴻臚數月爲丞相封富民侯又曰朱愽以丞相封二千五百户上書故事不過千户還千五百户魏志曰王朗字景興文帝即位授司空進封平郷侯子肅嗣𥘉文帝分朗邑封一子列侯朗乞封兄子詳又曰崔林爲司空封陽安亭侯邑六百户三公封列侯自林始也臣松之有爲漢封丞相巳爲荀恱所譏魏封三公其末同也又曰曹爽以大將軍輔政封武安侯邑萬二千户又曰陳羣以鎭軍録尚書受遺詔進封頴隂侯又曰何夔字叔龍爲太子少傅太僕文帝踐祚封陽亭侯三百户病乞遜位詔曰以親則君有輔弼之勲以賢則君有淳固之茂又曰劉放字子棄爲中書監掌機密進封魏壽亭侯孫資爲中書令封樂陽亭侯太和末資決䇿伐公孫淵進左郷侯遼東平定又以叅謀之功各封大縣放方城侯資中郡侯齊王即位以决定大謀並増邑子一人亭侯又曰衛覬爲漢侍中勸讃禪代之義爲文誥之命文帝踐祚封陽告亭侯明帝即位進閿郷侯又曰桓楷爲尚書令封亭郷侯及病文帝自臨省謂之曰吾方託六尺之孤寄天下之命卿勉之徙封安樂郷侯又曰胡質薨家無餘財唯賜衣書篋而巳追封陽陵亭侯又曰盧毓衛臻徐宣陳矯和洽常林杜襲裴濳韓曁髙文惠王觀辛毗劉靖王基並以列卿尚書封侯又曰漢制凡人君特所寵念皆賜之封邑及丞相𥘉拜亦錫茅土號曰恩澤出自私情非至公之封也中興以來無有封者功臣封周禮夏官曰司勲司勲掌六卿賞地之法以等其功王功曰勲國功曰功民功曰庸事功曰勞治功曰力戰功曰多克敵岀竒若韓信陳平者凡有功者銘書於王之太常史記曰古之人功有五品以德立宗廟定社稷曰勲以言曰勞用力曰功明其等曰閥積功曰閱又曰太公望文王立以爲師文王作酆邑天下三分有其二及武王克紂太公之謀居多於是武王封尚父於齊營丘成王時及管蔡作亂淮夷叛周乃使邵康公封太公東至海西至}
  - {type: variant, offset: 455, length: 0, content: '', SBCK: 至穆陵北至無捸五侯九伯汝實征之齊由此得征伐爲大國二十八丗又曰邵公奭與周同姓武王之滅殷封邵公於燕其在成王時自陜以西邵公主之自陜以東周公主之四十三丗􅁗始皇滅之又曰楚出自帝顓頊髙陽後呉廻居火正爲祝融呉廻生陸終陸終子六人少曰季連季連之苗胤曰鬻子鬻子事周文王早卒當成王之時舉文武勤勞之嗣乃封其後熊繹於楚以子男之國三十丗至負芻而􅁗滅楚又曰魏者畢公髙之後畢公髙與周同姓武王封之於畢其後曰畢萬事晉獻公伐霍耿魏滅之因以魏封畢萬爲大夫卜偃曰畢萬之後必大萬盈數也魏大名也以是始賞天啓之矣其後魏獻子並爲晉卿至魏文侯爲諸侯子武立與韓趙共滅晉而三分其地又七丗至王假􅁗滅魏又曰韓與周同姓其後丗事晉得封於韓原曰韓武子武子三丗有韓厥從封姓爲韓氏六丗至景侯䖍始列爲諸侯及孫哀侯與趙魏共滅晉三分其地八丗至王安而秦滅韓又曰趙氏之先與秦共祖造父事周穆王攻徐破之乃賜以趙城七丗叔帶去周入晉趙氏五丗而至趙夙夙生襄襄生盾並爲大夫其後趙鞅是爲簡子始大又四丗而至列侯籍始立爲諸侯三丗至敬與韓魏共滅晉分其地又七丗至幽王繆降秦而趙滅又曰陳完者陳厲公他之子完後奔齊爲田氏齊懿氏欲妻之卜之曰是謂鳯皇于飛和鳴鏘鏘有嬀之後將育于姜八丗之後莫之與京卒妻之完卒謚爲敬仲六丗而至田常田常殺齊敬公立簡公弟平乃割齊安平以東爲巳封封邑大於齊至曽孫和遂遷齊康公於海上而田和立爲齊侯五丗至王建爲秦所滅又曰西戎與申侯伐周殺幽王驪山下爲秦㐮公將兵救周周避犬戎難東徙雒邑㐮公以兵送周平王平王封㐮公爲諸侯賜之歧以西之地於是始國與諸侯通又曰樂毅并趙楚韓魏燕之兵以伐齊破之追至于臨淄齊涽王走保於莒樂毅獨留徇齊攻入臨淄盡以寳貨財物􅀕器輸之燕昭王大恱親至濟上勞軍行賞饗士封毅於昌國號爲昌國君漢書曰項羽佯尊懷王爲義帝實不用其命二月羽自立爲西楚霸王王梁楚地九郡都彭城背約更立沛公爲漢王王巴蜀漢中四十一縣都南鄭三分􅀜中立􅁗三將章邯爲雍王都廢丘縣名今槐里是司馬欣爲塞王韋昭曰在長安東名桃林塞也都櫟陽董翳爲翟王文頴曰夲上縣􅁗所置項羽更名爲翟也都髙奴楚將瑕丘申陽爲河南王都雒陽趙將司馬卬爲殷王都朝歌當陽君英布爲九江王都六懷王柱國共敖爲臨江王夲南郡改爲臨江國都江陵畨君呉芮爲衡山王都邾文頴曰邾音朱縣名故齊王建孫田安爲濟北王徙魏王豹爲西魏王都平陽徙燕王韓廣爲遼王燕將臧荼爲燕王都薊徙齊王田市爲膠東王齊將田都爲齊王趙歇爲代王趙相張耳爲常山王也又曰漢四年立韓信爲齊王後徙爲楚王五年以九江王英布爲淮南王盧綰爲燕王韓王信爲代王彭越爲梁王又曰尅項八載天下乃平始論功侯者四十有三人時人民散亡大侯不過萬家封爵之誓曰使黄河如帶}
