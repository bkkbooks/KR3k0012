  - {type: variant, offset: 1092, length: 256, content: 封弟未受命而亡子客受封為亭侯瓘六男無爵悉讓於弟遠近稱之隋書曰李崇字永隆英果有籌筭膽力過人後周元年以父賢勳封廻樂縣侯時年尚小拜爵之日親族相賀崇獨泣賢怪而問之對曰無勳於國而幼少封侯當報主恩不得終於奉養是以悲耳賢由是大奇之伯封周書曰率眾時作謂之伯周禮春官太宗伯職曰伯執躬圭孝經援神契曰伯白也魏志曰咸熙元年春晉王秦建五等作地方六十里邑千二百戶妾四人車前司馬八人旅賁二十八人後周書曰王勇論討茹茹功別封永固縣伯邑五百戶時有別封者例聽回授次子勇獨請封兄子元興時人義之子封周禮春官典命職曰子男五命其國家宮室車旗衣服禮儀皆以五為節, SBCK: 聞愉悟遂佩焉}
