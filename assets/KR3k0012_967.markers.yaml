  - {type: variant, offset: 1446, length: 0, content: '', SBCK: 􅀑對持葦索取不祥之􅀑食之今人正朝作兩桃人法乎此也􅀃􅁐曰公孫僑相鄭路不拾遺桃李垂街人不敢取又曰孟甞君將入西􅁗賔客諌之百通則不聽也曰以人事諌我我盡知之􅀂以􅀑道則殺之謁者入曰有客以􅀑道聞客曰臣之來也過於淄水之上見一土耦人方與木梗人語木梗謂土耦人曰子先土也持予以爲耦人遇天大雨水潦並至子必沮壞應曰我沮乃反吾真耳今子東園之挑也刻子以爲梗遇天大雨水潦並至必浮子泛泛乎不知所止今􅁗四塞之國也有虎狼之心恐其木梗之患於是孟甞君逡廵而退而以應卒不敢西嚮􅁗晏子春秋曰公孫接田開強古冶子事景公勇而無禮晏子言於公公餽之二桃曰三子計功而食公孫接田開強先言功援桃而起古冶子又言其功令三子反桃二子慙而自殺古冶子曰耻人以言夸其聲不義也亦反其桃契領而死山海經曰夸父山北有林名曰桃林廣圎三百里其中多馬桃林今在弘農閿郷南饒野馬塩鐵論曰夫桃李}
  - {type: page-break, offset: 1446, content: '', id: KR3k0012_SBCK_967-3a}
  - {type: page-break, offset: 1446, content: '', id: KR3k0012_SBCK_967-3b}
  - {type: variant, offset: 1446, length: 0, content: '', WYG: 鬼對持葦索取不祥之鬼食之今人正朝作兩桃人法乎此也說苑曰公孫僑相鄭路不拾遺桃李垂街人不敢取又曰孟嘗君將入西秦賔客諫之百通不聽也曰以人事諫我我盡知之若以鬼道則殺之謁者入曰有客以鬼道問客曰臣之來也過於淄水之上一土偶人方與木偶人語木偶人謂土偶人曰子先土也持子以為偶人遇天大雨水潦並至子必沮壊應曰我沮乃反吾真耳今子東園之桃也刻子以為梗遇天大雨水潦並至必浮子泛泛乎不知所止今秦四塞之國也有虎狼之心恐有木梗之患於是孟嘗君逡巡而退卒不敢西嚮秦晏子春秋曰公孫接田開疆古冶子事景公勇而無禮晏子言於公公饋之二桃曰三子計功而食公孫接田開疆先言功援桃而起古冶子又言其功令二子反桃二子慚而自殺古冶子曰耻人以言夸其聲不義也亦反其桃契領而死山海經曰夸父山北有林名曰桃林廣圍三百里其中多馬鹽鐵論曰夫桃李}
