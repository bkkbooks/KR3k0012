  - {type: variant, offset: 1982, length: 161, content: 味不同水土異也今民生於齊不盜入楚得無俲楚民善盜耶王笑曰寡人取病焉又曰晏子使楚楚王進橘置削晏子并食不剖王曰橘當云剖對曰臣聞之賜人主前者瓜桃不削橘柚不剖今者萬乘無教故不敢剖臣非不知也莊子曰三王五帝之禮義法度譬猶樝梨橘柚其味相反而皆可適於口淮南子曰夫橘樹之江北化而為橙呂氏春秋曰常山之北投淵之上有百菓焉群鳥所食箕山之東青馬之所有, SBCK: 甚}
