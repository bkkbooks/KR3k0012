  - {type: variant, offset: 2607, length: 1, content: 康, SBCK: 郡江陵郡有􅀥樹一年忽生桃李􅀥三種花子幽􅁳録曰剡縣劉晟音成阮肇共入天台山取榖皮迷不得返十三日粮食乏盡飢餧殆死望山上有一桃大有子實而絶巖􅃉澗永無登路扳音班縁藤􅁑然後得上各啖數桃而不飢下山一大溪邊有二女資質妙絶因要還家勑婢云劉阮二郎向雖得瓊實猶尚虛弊可速作食遂停半年懷土思}
