  - {type: variant, offset: 1460, length: 3, content: 廉范為, SBCK: 桃爲守禦辟不祥夢見桃者守禦官神農經曰玉桃服之長生不死􅀂不得早服之臨死日服之其尸畢天地不朽王粛䘮服要記曰昔者魯哀公祖載其父孔子問曰寕設三桃湯乎荅曰不也桃者起於衛靈公有女嫁楚乳母送新婦就夫家道聞夫死乳母欲將新婦還新婦曰女有三從今属於人死當卒哀因駕素車白馬進到夫家治三桃湯以沐死者出東北隅禮三終使死者不恨吾父無所恨何用三桃湯焉漢舊儀曰山海經稱東海之中度朔山山上有大桃屈蟠三千里東北間百􅀑所岀入也上有二神人一曰神荼二曰欎壘主領万􅄦􅁖害之􅀑執以葦索以食虎黄帝乃立大桃人於門户􅀞神荼欎壘與虎葦索以禦􅀑四王起事曰惠帝征}
