  - {type: variant, offset: 1796, length: 184, content: 一株死可覔補之因出後園閤真兵倒地仍失手板南史曰虞願始數歲家中橘樹冬熟諸兒競來取之願獨不取家人皆異之三國典略曰梁侯景未平王僧辯獻嘉橘一帶二十五子于湘東王王荅之曰昔文康獻橘十有二子用今方古彼有慚色今景之兇惡既稔凱歌之聲已及嘉瑞遠臻但增鯁慰晏子曰晏子使楚楚王謂其左右曰晏嬰習辤者也吾欲傷之坐定而縛一人至問何為曰齊人坐盜王視晏子曰齊人善盜乎晏子對曰嬰聞橘生於淮北則為枳枝葉徒似, SBCK: ''}
