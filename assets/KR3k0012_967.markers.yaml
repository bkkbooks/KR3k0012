  - {type: variant, offset: 2144, length: 271, content: 櫨焉箕山許由隱所青馬崑崙山東矣江浦之橘雲夢之柚漢上之菤所以致之菤菤且也音卷山海經曰洞庭之山其木多橘正論曰橘柚之貢堯舜不嘗山龍華蟲帝王不以為褻服而命臣餘黃甘厭文繡者蓋以萬數者也鹽鐵論曰孝武皇帝平百越以為園圃而民皆厭橘柚宋躬孝子傳曰王靈之廬陵西昌人喪父母二十年鹽酢不入其口所住屋夜有光廷中橘樹隆冬三實會稽先賢傳曰嚴遵從光武遇蜀郡獻橘栗上持付公卿遵獨不取已具甘中水經曰劉備時巴郡結舫水居者五百家縣有甘橘官荔支園夏至則熟二千石常設廚膳命士大夫共會樹下食之縣北有稻田出御米也南夷志曰甘橘大釐城有之其味甚酸穹贆音飄有橘大如覆杯湘州記曰泉陵縣有焦山山上多橘, SBCK: ''}
