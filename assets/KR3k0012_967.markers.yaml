  - {type: variant, offset: 1447, length: 2, content: 墮地, SBCK: 多者來年爲之穰新序曰魏文侯見萁季從者食其園桃萁季禁之文侯曰萁季豈愛桃哉是教我下無犯上也典術曰桃者五木之精也故厭伏邪氣者也桃之精生在􅀑門制百􅀑故今作桃人梗著門}
  - {type: variant, offset: 1447, length: 2, content: 墮地, WYG: 多者來年為之穣新序曰魏文侯見箕季從者食其園桃箕季禁之文侯曰箕季豈愛桃哉是教我下無犯上也典術曰桃者五木之精也能厭伏邪氣者也桃之精生在鬼門制百鬼故令作桃鞭人着}
