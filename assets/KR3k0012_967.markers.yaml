  - {type: variant, offset: 1708, length: 4, content: 橘亦嘉味, krp: 石壁下臨不測去上三四丈桃大有實陵謂諸弟子曰得此桃者當吿以道要弟子皆流汗無敢視者升曰神人所護何險}
  - {type: variant, offset: 1713, length: 1, content: 流, SBCK: 有乃從上自擲正投桃樹取桃滿懷而石壁峻峭不得還乃擲桃上得二百枚陵分桃賜諸弟子餘二枚陵自食一留一以侍􅂛陵乃申手引􅂛􅂛忽見還以向一桃與􅂛又曰髙丘公服桃膠得仙鐘離意别傳曰周書言􅁗史趙覬以私恨告園民吴旦生盗食宗廟御桃旦生對曰民不敢食也王曰剖其腹出其桃史記惡而書之曰桃食之當有遺核王不知此而剖人腹以求桃非理也風俗通曰黄帝書稱上古之時兄弟二人曰荼與鬰律度朔山上桃樹下簡百􅀑􅀑妄榾音骨人則援以葦索執以食虎於是縣官以臘除夕飾桃人垂葦索交􅀞虎於門效前事也玄中記曰木子之大者有積石山之桃實焉大如十斛籠嵩髙山記曰魏文帝時嵇叔夜胡昭在此學桃樹見在王子年拾遺記曰漢明帝時常獻巨核桃此桃霜下結花隆暑方熟常使植於霜林園俗謂相陵故聲之誤也又磅磄山去扶桑五萬里日所不及其地寒有桃樹千圍其花青黒色萬歳一實陶潜桃源記曰}
