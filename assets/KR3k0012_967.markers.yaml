  - {type: 'tls:seg', offset: 170, content: '', id: KR3k0012_CHANT_967-3a.12}
  - {type: variant, offset: 173, length: 246, content: 敢解衣每侍御座屏氣鞠躬果食未嘗舉筯嘗醉後取一甘食武帝笑謂曰卿今日便是大有所進祿外令月給錢十萬唐書曰羅浮甘子開元中始有山僧種於南樓寺其後常資進獻幸蜀幸奉天之歲皆不結實又曰天寶中中書門下奏曰臣等今日因奏事承德音聞江南為橘江北為枳蓋以地氣有殊物性因變朕近於宮內種甘子樹數株今秋已來結實一百五十顆乃與江南及蜀道所進無別亦可謂稍異也晉令曰閬中縣置守黃甘吏一人風土記曰甘橘之屬滋味甜美特異者也有黃者有者者謂之壺甘廣志曰甘有二十一核有成都平蒂甘大如升色蒼黃犍為南安縣出黃甘神異經曰東方朔云東南外有建春山其上, SBCK: 華倉庫}
