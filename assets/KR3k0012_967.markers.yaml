  - {type: variant, offset: 1704, length: 0, content: '', SBCK: 桃七枚大如雞􅆑形圎色青以呈王母王母以五枚與帝自食二枚西京􅄂記曰上林苑有􅁗桃櫻桃緗核桃霜桃霜下乃堪食金城桃胡桃綺葉挑含桃紫文桃妬記曰武陽女嫁阮宣武妬忌家有一株桃樹華葉灼耀宣歎羙之即便大怒使婢取刀斫樹摧折其華関令尹喜内傳曰喜從老子西遊省太真王母共食碧桃列仙傳曰師門者嘯父弟子也亦能使火食桃李葩夏孔甲爲不能順其心意殺而埋之外野一日風雨迎之訖}
  - {type: variant, offset: 1704, length: 0, content: '', WYG: 桃七枚大如雞卵形圓色青以呈王母王母以五桃與帝自食二桃西京雜記曰上林苑有奉桃櫻桃緗桃核桃霜桃金城桃胡桃綺桃含桃紫文桃妒記曰武陰女嫁阮宣武妬忌家有一株桃樹華葉灼耀宣嘆美之即便大怒使婢取刀斫樹摧折其華関令尹喜内傳曰喜從老子西遊省太真王母共食碧桃列仙傳曰師門者嘯父弟子也亦能使火食桃李葩夏孔甲為不能順其心意殺而埋之外野一日風雨迎之訖}
  - {type: page-break, offset: 1704, content: '', id: KR3k0012_WYG_967-7b, image: WYG0901/WYG0901-0515b.png}
  - {type: variant, offset: 1704, length: 0, content: '', krp: 桃七枚大如雞卵形圎色青以呈王母王母以五枚與帝自食二枚西京雜記曰上林苑有秦桃櫻桃緗核桃霜桃霜下乃堪食金城桃胡桃綺葉挑含桃紫文桃妬記曰武陽女嫁阮宣武妬忌家有一株桃樹華葉灼耀宣歎羙之即便大怒使婢取刀斫樹摧折其華関令尹喜内傳曰喜從老子西遊省太真王母共食碧桃列仙傳曰師門者嘯父弟子也亦能使火食桃李葩夏孔甲爲不能順其心意殺而埋之外野一日風雨迎之訖}
  - {type: variant, offset: 1705, length: 2, content: 嘉朱, SBCK: 山木皆焚孔甲祠而禱之未還而道死又曰􅁑由蜀羗人周成王丗好刻木作羊賣之一旦􅀐羊入蜀中王侯貴人追之上綏山皆得仙故里諺曰得綏仙一桃雖不能得仙亦足以豪又曰陽都女隨犢子出種桃李一􅀫而返後數十年見在潘山下冬賣桃菓神仙傳曰樊夫人與夫劉綱俱有道術各自言勝中庭有兩大桃樹夫妻各呪其一桃便闘綱所呪桃走出籬外又曰張陵沛人也有天神降之遂服丹能變化有趙􅂛就陵受學陵以七事試者陵與諸弟子登雲臺山絶巖上有一桃樹大如臂旁}
