  - {type: variant, offset: 126, length: 123, content: 元嘉末魏太武征彭城遣使送九種鹽并胡鼓仍求黃甘梁書曰呂僧珍既有大勳任總心膂性甚恭慎當直禁中盛暑不敢解衣每侍御座屏氣鞠躬果食未嘗舉筯嘗醉後取一甘食武帝笑謂曰卿今日便是大有所進祿外令月給錢十萬唐書曰羅浮甘子開元中始有山僧種於南樓寺其後常資進獻幸蜀幸奉天, WYG: 投我以木桃報}
