  - {type: variant, offset: 1701, length: 0, content: '', SBCK: 母種三千年桃結子此兒不良巳三過偷之矣後西王母下岀桃七枚母自啖二以五枚與帝帝留核着前王母問曰用此何爲上曰此桃羙欲種之母歎曰此桃三千年一着子非下土所植也後上殺諸道士妖妄}
  - {type: variant, offset: 1701, length: 0, content: '', WYG: 母種桃三千年結子此兒不良已三過偷之矣後西王母乃出桃七枚母自啖二以五枚與帝帝留核着前王母問曰用此何為上曰此桃美欲種之母歎曰此桃三千年一着子非下土所植也後上殺諸道士妖妄}
  - {type: variant, offset: 1701, length: 0, content: '', krp: 母種三千年桃結子此兒不良巳三過偷之矣後西王母下岀桃七枚母自啖二以五枚與帝帝留核着前王母問曰用此何爲上曰此桃羙欲種之母歎曰此桃三千年一着子非下土所植也後上殺諸道士妖妄}
  - {type: variant, offset: 1702, length: 1, content: 德, SBCK: 百余人西王母遣使謂上曰求仙信邪欲見神人而殺戮吾與帝絶矣又致三桃曰食此可得極壽漢武内傳曰西王母以七月七日降於帝宫命侍女索桃湏􅁷以玉盤}
  - {type: page-break, offset: 1702, content: '', id: KR3k0012_SBCK_967-4b}
  - {type: variant, offset: 1702, length: 1, content: 德, WYG: 百餘人西王母遣使謂上曰求仙信耶欲見神人而殺戮吾與帝絶矣又致三桃曰食此可得極壽漢武内傳曰西王母以七月七日降於帝宫命侍女索桃須臾以玉盤}
