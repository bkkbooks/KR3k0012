  - {type: variant, offset: 420, length: 758, content: 美甘樹京口記曰京城東門射堂前柑樹十餘株盧諶祭法曰冬祠用柑襄陽記曰李衡字叔平為丹陽太守衡每欲治家妻輒不聽後密遣十人於武陵龍陽洲上作宅種柑千樹臨死勑兒曰汝母惡治家故窮如是吾州里有千頭木奴不責汝衣食歲上一疋絹亦足用矣及衡甘成歲得絹數千疋荊州記曰枝江有名甘宜都郡舊江北有甘園名宜都甘湘州記曰州故大城內有陶侃廟地是賈誼故宅誼時種甘猶有存者崔豹古今注曰甘實形如石榴者謂為壺甘也唐新語曰益州每歲進甘子皆以紙裹之他時長吏嫌紙不敬代之細布既而恐甘子為布所損每懷憂懼俄有御史甘子布至長吏以為推布裹甘子事懼曰果為所推及子布到驛長吏但敘以布裹甘子為敬子布初不之知久而方晤聞者莫不大笑又曰安祿山將反宰臣韋見素請以平章事追之玄宗許焉草詔訖中留之遣中使輔璆琳送甘子且觀其變璆琳受賂而還因言無反狀玄宗謂宰臣曰祿山必無二心詔本朕已焚矣異苑曰河內司馬元胤元嘉中為新淦令喪官月旦設祭甘化而為鳶又曰南康皈美山石城內有甘橘橙柚就食其實任意取足脫持歸者便遇大虺或顛仆失俓家人啖之亦病述異記曰南康郡有東望山營民入山頂有湖清深又有菓林周四里許眾菓畢植間無雜木行列整齊如人功也甘子熟三人共食致飽訖懷二枚欲以示外人便還尋覔向逕廻旋半日迷不能得即聞空中語云放雙甘乃聽汝去懷甘者恐怖放甘於地轉眄即見歸逕乃相與俱卻返廣古今五行記曰唐高宗調露中連州見一甘樹四月中有子如拳大剖之有兩頭虵又曰唐光宅中李崇真任益州刺史廳事前有甘樹有子大如雞子晚熟微小有孔如針郡官咸異之方欲將進久而方罷因剖之得一赤班虵長尺餘崇真後為兵所殺王廙洛都賦曰若夫黃甘荔支殊遠之珍雖非方土之所產重九譯而來臻潘安仁笙賦曰披黃苞以授甘傾縹瓷以酌醽張載詩曰三巴黃甘瓜州素禁渴者所思銘之裳帶郭璞柚讚曰厥苞橘柚精者曰甘孔坦表曰天恩例賜酃酒黃甘不勝受遇謹表以聞張衡七辨曰離支黃甘宗炳甘頌曰煌煌嘉實磊如景星南金其色隨侯厥形橘, SBCK: 火}
