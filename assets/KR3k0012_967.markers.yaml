  - {type: variant, offset: 354, length: 434, content: 屬滋味甜美特異者也有黃者有者者謂之壺甘廣志曰甘有二十一核有成都平蒂甘大如升色蒼黃犍為南安縣出黃甘神異經曰東方朔云東南外有建春山其上多美甘樹京口記曰京城東門射堂前柑樹十餘株盧諶祭法曰冬祠用柑襄陽記曰李衡字叔平為丹陽太守衡每欲治家妻輒不聽後密遣十人於武陵龍陽洲上作宅種柑千樹臨死勑兒曰汝母惡治家故窮如是吾州里有千頭木奴不責汝衣食歲上一疋絹亦足用矣及衡甘成歲得絹數千疋荊州記曰枝江有名甘宜都郡舊江北有甘園名宜都甘湘州記曰州故大城內有陶侃廟地是賈誼故宅誼時種甘猶有存者崔豹古今注曰甘實形如石榴者謂為壺甘也唐新語曰益州每歲進甘子皆以紙裹之他時長吏嫌紙不敬代之細布既而恐甘子為布所損每懷憂懼俄有御史甘子布至長吏以為推布裹甘子事懼曰果為所推及子布到驛長吏但敘以布裹甘子為敬子布初不之知久而方晤聞者莫不大笑又曰安祿山將反宰臣韋見素請以平章事追之玄宗許焉草詔訖中留之遣中使輔璆琳送甘子且觀其變璆琳受賂而還因言無反狀玄宗謂宰臣曰祿山必無二心詔本朕已焚矣異苑曰河內司馬元胤元嘉中為新淦令喪官, WYG: ''}
