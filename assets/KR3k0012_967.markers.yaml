  - {type: variant, offset: 1441, length: 4, content: 時風吹動, SBCK: 斫髙廟桃湯赤鞭灑屋淮南子曰王子慶忌死於劒羿死於桃棓棓大杖以桃木爲之以繫殺羿猶是巳來􅀑畏桃也抱朴子曰桃膠以桑木􅁅漬服之百病愈乆乆身有光在晦夜之地如月岀也多服之則可以斷榖矣又内篇曰五原蔡誕入山而還欺家云到崑崙山有玉桃形如丗間桃但光明洞徹而堅湏玉井水洗之便軟而可食金樓子曰東南有桃都山山上有􅀣樹上有雞日􅀄出照此桃天雞即鳴天下之雞感之而鳴樹下有}
  - {type: page-break, offset: 1441, content: '', id: KR3k0012_SBCK_967-2b}
  - {type: variant, offset: 1441, length: 4, content: 時風吹動, WYG: 斫髙廟以桃湯赤鞭灑屋淮南子曰王子慶忌死於劍羿死於桃棓抱朴子曰桃膠以桑木灰漬服之百病愈久服身有光在晦夜之地如月出也多服之則可以㫁穀矣又内篇曰五原蔡誕入山而返欺家云到崑崙山有玉桃形如世間桃但光明洞徹而堅須玉井水洗之便軟而可食金樓子曰東南有桃都山山有樹樹上有鷄日初出照此桃天鷄即鳴天下之鷄感之而鳴樹下有}
