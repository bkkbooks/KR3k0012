  - {type: variant, offset: 789, length: 471, content: 旦設祭甘化而為鳶又曰南康皈美山石城內有甘橘橙柚就食其實任意取足脫持歸者便遇大虺或顛仆失俓家人啖之亦病述異記曰南康郡有東望山營民入山頂有湖清深又有菓林周四里許眾菓畢植間無雜木行列整齊如人功也甘子熟三人共食致飽訖懷二枚欲以示外人便還尋覔向逕廻旋半日迷不能得即聞空中語云放雙甘乃聽汝去懷甘者恐怖放甘於地轉眄即見歸逕乃相與俱卻返廣古今五行記曰唐高宗調露中連州見一甘樹四月中有子如拳大剖之有兩頭虵又曰唐光宅中李崇真任益州刺史廳事前有甘樹有子大如雞子晚熟微小有孔如針郡官咸異之方欲將進久而方罷因剖之得一赤班虵長尺餘崇真後為兵所殺王廙洛都賦曰若夫黃甘荔支殊遠之珍雖非方土之所產重九譯而來臻潘安仁笙賦曰披黃苞以授甘傾縹瓷以酌醽張載詩曰三巴黃甘瓜州素禁渴者所思銘之裳帶郭璞柚讚曰厥苞橘柚精者曰甘孔坦表曰天恩例賜酃酒黃甘不勝受遇謹表以聞張衡七辨曰離支黃甘宗炳甘頌曰煌煌嘉實磊如景星南金其色隨侯厥形橘焦贛易林剝之屯曰北山有萊橘柚所藂荷囊戴畚盈我筐筥尚書禹貢曰淮海惟楊州厥苞橘柚錫貢小曰橘大曰柚其所苞而致者也錫命乃貢言不嘗也周禮冬官上考工記曰橘踰淮而北為枳此地氣然也, WYG: 桃始華}
