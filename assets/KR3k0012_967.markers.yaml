  - {type: variant, offset: 1553, length: 105, content: 拜辭墮地術謂曰陸郎作賓客而懷橘乎績跪荅曰欲歸遺母術大奇之吳錄地理志曰朱光祿為建安郡中庭有橘冬月樹上覆裹之至明年春夏色變青黑味尤絕美上林賦云盧橘夏熟盧黑也蓋近是也吳曆曰吳王饋魏文帝大橘魏文帝詔群臣曰南方有橘酢正裂, SBCK: 石超使}
