  - {type: variant, offset: 1427, length: 7, content: 實熟數垂室內嚴, SBCK: 半啖君君曰愛我哉忘其口而啖寡人及彌子瑕色衰愛㢮得罪於君曰是固甞啖我以餘桃又曰孔子侍坐於魯哀公哀公賜之桃與􅁰仲尼先飯􅁰而後食桃公曰以􅁰雪桃也對曰􅁰五榖之長果六而桃爲下君子不以貴雪賤梅子曰王莽畏漢髙神靈}
