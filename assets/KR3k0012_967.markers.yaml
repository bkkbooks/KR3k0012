  - {type: variant, offset: 10, length: 111, content: 丹陽張磐字子石為廬江太守尋陽令嘗餉一奩甘其小男年七歲就取一枚磐奪取付外卒以兩枚與之磐奪兒甘鞭卒曰何故行賂於吾子宋書曰彭城王義康時四方獻饋皆以上品薦義康而以次者供御上嘗冬月啖甘歎其味並劣義康在坐曰今年甘殊有佳者遣人還東府取甘, SBCK: 驚蟄}
