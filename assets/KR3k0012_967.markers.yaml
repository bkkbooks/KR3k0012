  - {type: variant, offset: 1708, length: 4, content: 橘亦嘉味, SBCK: 石壁下臨不測去上三四丈桃大有實陵謂諸弟子曰得此桃者當吿以道要弟子皆流汗無敢視者􅂛曰神人所護何險}
