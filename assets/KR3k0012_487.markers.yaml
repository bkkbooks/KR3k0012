  - {type: variant, offset: 148, length: 0, content: '', krp: 去曰無苛政夫子曰小子識之苛政猛於虎又曰陽門之介夫死司城子罕入而哭之哀晉人之覘宋者反報於晉侯曰陽門之介夫死子罕哭之哀而民說殆未可伐也孔子聞之曰善哉覘國者乎又曰朋友之墓有宿草而不哭焉宿草陳根也謂朞年又曰曽申問於曽子曰哭父母有常聲乎曽子曰中路嬰兒失其母焉何常聲之有言其若小兒亡母啼號安}
  - {type: variant, offset: 149, length: 3, content: 行絕糧, SBCK: 常聲乎又曰斬衰之哭􅀂徃而不反齊縗之哭若徃而反大功之哭三曲而偯小功緦麻哀容可也左傳曰衛叔武將沭聞君至喜捉髪走出前驅射而殺之公知其無罪也杭其股而哭之又曰孟明西乞白乙使出師于東門之外蹇叔哭之曰孟子吾見師之出而不見其入又曰秦伯素服郊次嚮師而哭曰􅀌違蹇叔以辱二三子􅀌之罪也又曰子産歸未至聞子皮卒哭且曰吾巳無為為善矣唯夫子知我又曰昭二十一年七月日蝕大夫叔輙莅事而哭昭子曰叔輙將死矣非所哭也八月叔輙卒又曰申包胥如􅁗乞師􅁗伯使辭焉曰寡人聞命矣子姑就館將圖而告對曰寡君對越在草莽未獲所伏下臣何敢即安立依於庭牆而哭日夜不絶聲勺飲不入口}
  - {type: page-break, offset: 149, content: '', id: KR3k0012_SBCK_487-2b}
  - {type: variant, offset: 149, length: 0, content: '', WYG: 見一以公卿中非陟無足與託名日徃其門尋陟自强通陟卧未起一徑上堂臨之曰竊伏西州抱髙風舊矣乃今方遇而便恝然奈何命也因舉聲哭堂下大驚陟延與語大竒之明徃詣一柴車草屏露宿其傍左右皆驚愕東觀漢記曰逢萌素明隂陽知莽將敗擕家屬於遼東乃首戴盆盎哭于市曰新乎遂潜藏漢名臣奏曰漢得隂山匈奴長老過之未嘗不哭魏志曰太祖擊黄中濟北相鮑信鬭死購求信喪不得乃刻木如信形狀祭而哭焉又曰初蘇則及臨淄侯植聞魏氏代漢皆發憤悲哭文帝聞植如此而不聞則也嘗従容曰吾應天受禪而聞有哭者則謂為見問鬂髯悉張欲正論以對𫝊巽搯則搯音苦合曰不謂卿也乃止吳志曰孫策薨以事授權權哭未及息策長史張昭謂權曰孝㢘此寧哭時耶乃改易權服扶令上馬晉書曰顧榮素好琴及卒家人常置琴於虛座吳郡張翰哭之慟既而上牀鼓琴數曲撫琴而歎曰顧彦先復能賞此不因又慟哭不弔喪主而去又曰顧愷之桓温引為大司馬叅軍甚見親昵温薨後愷之拜温墓賦詩曰山崩溟海竭魚鳥將何依或問之曰卿重桓公乃爾哭狀其可見乎答曰聲如振雷破山淚如傾河注海又曰阮籍居喪骨立幾致滅性裴楷徃弔之籍散髮箕踞醉而直視楷弔哭畢便去或問楷凡弔者主哭客乃為禮籍既不哭君何哭楷曰阮方外之士故不崇禮典我俗中之士故以軌儀自居又曰秦秀性忌讒佞疾之如讎素輕鄙賈充及伐吳之役聞其為大都督謂所親曰充文案小才乃居伐國大任吾將哭以送師或止秀曰昔蹇叔知秦軍必敗故哭送其子今吳君無道國有自亡之形郡卒踐境將不戰而潰子之哭也既為不知乃有不赦之罪於是乃止又曰魏舒子混字延廣清慧有才}
