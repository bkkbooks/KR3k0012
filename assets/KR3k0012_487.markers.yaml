  - {type: variant, offset: 1361, length: 205, content: 一窮鳥戢翼原野罩網加上機穽在下前見蒼隼後逼驅者繳彈張右羿弓彀左飛丸激矢交集於我思飛不得欲鳴不可舉頭畏觸搖足恐墮內獨怖急乍冰乍火琴操曰孔子使顏淵執轡到匡郭外孔子既似陽虎以為今復來至乃相率圍孔子數日不解弟子皆有飢色於是孔子仰天而嘆曰君子固亦窮乎子路聞孔子之言悲感勃然大怒張目奮劍聲如鍾鼓顧謂二三子曰使吾有此厄也司馬彪與山巨源書曰根拔失據託命此別告求矜愍許見賑恤窮人易感悲喜兼懷承命之後情過挾纊孔舒元在窮記曰遣信與義, SBCK: 事幹爲范}
