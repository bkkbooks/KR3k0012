  - {type: variant, offset: 1061, length: 299, content: 召而語之今丘也抱仁義之道以遭世之暴其何窮之為也尸子曰湯復於湯丘文王幽於姜里武王羈於王門越王棲於會稽秦繆公敗於殽塞齊桓公遇賊晉文公出走故三王資於辱而五伯得於困也韓子曰魯人身善織履妻善織縞而徙於越或謂之曰子必窮矣履為人履之也而越人乘舟縞為人冠之也而越人被髮欲無窮可得乎燕丹子曰樊將軍以窮歸我而丹賣之心不忍也淮南子曰今夫窮鄙之社也叩盆拊缻相和而歌自以為樂矣窮鄙之社窮巷之小社也嘗試為之擊建鼓撞巨鍾乃始知其缻之足羞矣新序曰甯戚欲干齊桓公窮困無以自進於是為商歌宿於郭門之外擊牛角而歌桓公聞之曰異哉之歌非常人也雜道書曰地肺之山其下生草名曰救窮如竹冬夏不枯取而食之可絕穀不食令人長生服之三十日行及走馬趙壹窮鳥賦曰, SBCK: 剛毅嚴重好學}
