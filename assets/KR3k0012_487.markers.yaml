  - {type: variant, offset: 1875, length: 1, content: 昔, SBCK: 刈􅆱薪而亡簮有何悲焉婦人曰非悲傷亡簮也哀其亡故賈􅁩新書曰鄒穆公死鄒之百姓􅀂失慈父行吟三月四境之隣於鄒者士民嚮方道而哭沽家不售其酒屠者罷刑而歸遨童不謳歌舂者不相杵愽物志曰文王以周公爲灌壇令朞秊風不鳴條文王夢見一婦人甚美當道哭曰我東太山女嫁爲西海婦而灌壇令當路有道德}
  - {type: variant, offset: 1875, length: 1, content: 昔, WYG: 今天降禍齊國不加寡人加於夫子社稷危矣百姓誰告文子曰九夷八狄之哭異聲而皆哀列子曰李良之死楊朱望其門而不哭盡生性之道以至於亡故無所哀隨梧之死楊朱撫其尸而哭生不幸而死故可哀也又曰將隂夢火將病夢食飲酒者憂歌舞者哭又曰韓娥東之齊過逆旅旅人辱之韓娥因曼聲哭曼聲長引一里老幼悲愁垂涕相對孟子曰華周杞梁之妻善哭其夫而變國俗韓子曰子産晨出聞婦人哭撫其御手而聽之有間使執而問焉則手殺其夫者異日御問夫子何以知之曰凡人之於其所親愛也始疾而憂臨死而懼已死而哀今夫已死不哀而懼是以知其奸也淮南子曰故哭之發於口涕之出於鼻此皆憤於中而形於外也又曰楊子見衢而哭之為其可以南可以北韓詩外𫝊曰孔子行聞哭聲甚悲孔子曰驅之前有賢者至則臯魚也被褐擁鐮哭於道旁孔子避車而與之言曰子非有喪何哭悲也臯魚曰}
