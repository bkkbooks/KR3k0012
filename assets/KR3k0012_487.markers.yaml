  - {type: variant, offset: 148, length: 0, content: '', SBCK: 去曰無苛政夫子曰小子識之苛政猛於虎又曰陽門之介夫死司城子罕入而哭之哀晉人之覘宋者反報於晉侯曰陽門之介夫死子罕哭之哀而民􅀃殆未可伐也孔子聞之曰善哉覘國者乎又曰朋友之墓有􅀫草而不哭焉􅀫草陳根也謂朞年又曰曽申問於曽子曰哭父母有常聲乎曽子曰中路嬰兒失其母焉何常聲之有言其若小兒亡母啼號安}
