  - {type: variant, offset: 1859, length: 0, content: '', SBCK: 游臨淄聞晏子卒公乘而驅之自以爲遟下車而趍知不若車之速又乗比至國四下而趍行哭至伏尸號曰今天降禍齊國不加寡人加於夫子社稷危矣百姓誰告文子曰九夷八狄之哭異聲而皆哀列子曰李梁之死楊朱望其門而不􅂘盡生性之道以至於亡故無所哀隨梧之死楊朱撫其尸而哭生不幸而死故可哀也又曰將隂夢火將病夢食飲酒者憂歌儛者哭又曰韓娥東之齊過逆旅旅人辱之韓娥因曼聲哭曼聲長引一里老㓜悲愁垂涕相對孟子曰華周􅂎梁之妻善哭其夫而變國俗韓子曰子産晨出聞婦人哭撫其御手而聽之有間使執而問焉則手殺其夫者異日御問夫子何以知之曰凡人之於其所親愛也始疾而憂臨死而懼巳死而哀今夫巳死不哀而懼是以知其姧也淮南子曰故哭之發於口涕之出於鼻此皆憤於中而形於外也又曰楊子見衢而哭之爲其可以南可以北韓詩外傳曰孔子行聞哭聲甚悲孔子曰驅之前有賢者至則臯魚也􅀍􅄄擁鎌哭於道傍孔子避車而與之言曰子非有䘮何哭悲也臯魚曰吾失之三少而好學周流諸侯以後吾親失之一也髙吾志簡吾事不事庸君失之二也少擇交遊寡於親友老而無託失之三也樹欲静而風不止子欲養而親不待往而不可追者年也去而不可得見者親也吾請從此辭矣立槁而死又曰孔子}
