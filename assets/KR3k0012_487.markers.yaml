  - {type: variant, offset: 2263, length: 1427, content: 曰翳桑之餓人也問其名居不告而退論語季氏曰齊景公有馬千駟死之日民無德而稱焉伯夷叔齊餓于首陽之下民到于今稱之史記曰趙主父遊沙丘公子章作亂李兌起兵敗之章往走主父兌因圍主父宮令宮人後出者夷主父不得出探雀鷇而食之三月遂餓死沙丘營又曰上使善相人相鄧通曰當貧餓死文帝曰能富通者在我何謂貧於是賜鄧通蜀嚴道銅山得自鑄錢景帝立有告鄧通盜出徼外鑄錢下吏驗問頗有遂案盡沒入一簪不得著身遂餓死又曰條侯周亞夫為河內守時許負相之曰後三歲而侯八歲為將相持國柄貴矣於人臣無兩其後九歲而君餓死負指其口有從理入口此餓死法也三崴其兄絳侯有罪文帝擇絳侯子賢者皆推亞夫乃封亞夫為條侯卒餓死又曰趙王友以諸呂女為后弗愛太后怒召趙王置邸弗與食趙王餓遂幽死戰國策曰楚伐中山中山君亡走有二人挈戈隨其後曰臣父嘗餓且死君下壺飧餔臣父臣父曰中山有事女必死之故來死君也漢書曰朱買臣獨行歌道中負薪墓間故妻與夫家俱上塚見買臣飢寒呼飯食之又曰蘇武字子卿杜陵人使匈奴匈奴必欲降之乃出置大窖中絕不與飲食天雨雪武齧雪與氈毛并咽之數日不死匈奴以為神乃徙武北海上無人之處使牧羝羊粟食不至掘野鼠草實而食之又曰元帝即位天下大水關東郡十一尤甚二年齊地飢穀石三十餘萬民多飢死琅琊郡人相食又曰王莽末赤眉遂燒長安宮室市里害更始民飢餓相食死者數十萬長安為虛城中無行人宗廟園林皆發掘唯霸陵完東觀漢記曰王莽末南方枯旱民多飢餓群盜入野澤掘鳧茨食之又曰建武九年正月隗囂餓出城飡糗腹脹死又曰朱勃上書理馬援曰八年車駕討隗囂唯獨狄道為國堅守然民飢饉啖弩煮履寄命漏刻又曰上問第五倫曰聞卿為吏撾妻父不過從兄飯寧有之也倫對曰臣三娶妻皆無父臣生遭饑擾攘米石萬錢不敢妄過人飯又曰王郎起上自薊東南馳晨夜草舍至饒陽無蔞亭時天寒冽眾皆飢疲馮異上豆粥明旦上謂諸將曰昨得公孫豆粥飢寒俱解又曰鄧禹與赤眉戰赤眉佯敗棄輜重走皆載土以豆覆其上兵士飢爭取之赤眉引還擊之軍潰亂時百姓饑人相食黃金一斤易豆五升道路斷隔委輸不至軍士悉以菓實為糧又曰耿恭在䟽勒城救兵不至數月食盡窮困乃煮鎧弩食其筋革謝承後漢書曰天下亂人相食趙孝弟禮為餓賊所得孝聞之即自縛詣賊曰禮久餓羸瘦不如孝肥飽賊大驚並放之袁山松後漢書曰赤眉入長安掖庭中有數百千人自更始敗閉殿門不出掘庭中蘆菔根捕池中魚食之死因埋宮中有故祠甘泉樂人尚共擊鼓歌儛衣服鮮明見盆子叩頭言飢盆子使中黃門廩之粟數升後盆子去皆餓死范曄後漢書曰鄧禹威稍損又乏食歸附者離散而赤眉復還入長安禹與戰敗走至高陵軍士飢餓皆食棗菜漢獻帝傳曰車駕至洛陽是時宮室燒盡百官披荊棘依丘牆間州郡各擁強兵而委輸不至群僚飢乏尚書郎以下自出採穭或餓死牆壁間吳志曰袁術在壽春穀石百餘萬載金錢之市求糴市無米而棄錢去百姓飢寒以桑椹蝗蟲為乾飯王隱晉書曰永嘉五年洛中大飢五月摯虞餓死又曰劉琨與王丞相牋曰不得進軍者實困無食殘民鳥散擁髮徒跣木弓一張荊矢十發編草盛糧不盈二日夏即桑椹冬則營豆視此哀歎使人氣索恐吳孫韓白猶或難之況以琨怯弱凡才而當率此以殄強寇晉中興書曰王尼字季孫洛陽覆沒避亂江夏王澄時為荊州刺史見之欣喜厚供給之尼早喪婦止有一息不用居宅唯畜露車牛一乘每行輒使兒御暮則宿車上無有定處澄卒荊州飢荒尼殺牛壞車煮之遂父子餒死晏子春秋曰越石父凍餓為人臣僕三年矣晏子解左驂贖之文子曰神農之法大夫丁壯不耕天下有受其餓者孟子曰陳仲居於陵三日不食耳目無聞見井上有李螬食實者過半矣匍匐往將食之三咽而後耳目有聞見韓子曰秦大餓應侯謂王曰吾苑之草蔬橡菓棗栗足以活民請發之王曰今發吾苑以活民是使有功與無功爭取也人生而亂不如死而治, WYG: ''}
