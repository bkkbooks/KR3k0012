  - {type: variant, offset: 352, length: 0, content: '', krp: 左氏國有大灾則哭以厭之故易稱先號咷而後笑冝呼嗟告天莽自知敗乃率群臣南郊陳符命本末仰天撫心大哭諸生小民㑹旦夕哭爲設飱粥甚悲哀及能誦䇿文者除以爲郎至五千餘人謝承後漢書曰許慶字子伯家貧爲郡督郵乗牛車郷里號曰軺車督郵慶甞與友人談論漢無統嗣幸臣專勢世俗衰薄賢者放退慨然據地悲哭時稱許子伯哭丗華嶠後漢書曰趙一造河南尹羊陟不得見一以公卿中非陟無足與託名日徃其門㝷陟自強通陟卧未起一徑上堂臨之曰竊伏西州抱髙風舊矣乃今方遇而便忽然柰何命也因舉聲哭堂下大驚陟延與語大竒之明徃詣一柴車草屏露宿其傍左右皆驚愕東觀漢記曰逢萌素明隂陽知莽將敗携家屬於遼東乃首戴盆盎哭於市言曰新乎新乎遂潜藏漢名臣奏曰漢得隂山匈奴長老過之未甞不哭魏志曰太祖擊黄巾濟北相鮑信鬪死購求信䘮不得乃刻木如信形狀祭而哭焉又曰𥘉蘇則及臨淄侯植聞魏氏代漢皆發憤悲哭文帝聞植如此而不聞則也甞從容曰吾應天受禪而聞有哭者則謂爲見問鬢髯悉張欲正論以對侍中傳巽搯則搯音苦治曰不謂卿也乃止呉志曰孫䇿薨以事授權權哭未及息䇿長史張昭謂權曰孝廉此寧哭時耶乃改易權服扶令上馬晉書曰顧榮素好琴及卒家人常置琴於靈座呉郡張翰哭之慟旣而上牀鼔琴數曲撫琴而歎曰顧彦先復能賞此不因又慟哭不弔䘮主而去又曰顧愷之桓温引爲大司馬叅軍甚見親昵温薨後愷之拜温墓賦詩云山崩溟海竭魚鳥將何依或問之曰卿重桓公乃爾哭狀其可見乎荅曰聲如振雷破山淚如傾河注海又曰阮籍居䘮骨立幾致滅性裴楷徃弔之籍散髮箕踞醉而直視楷弔哭畢便去或問楷凢弔者主哭客乃爲禮籍旣不哭君何為哭楷曰阮方外之士故不崇禮典我俗中之士故以軌儀自居又曰秦秀性忌䜛佞疾之如讎素輕鄙賈充及伐吴之役聞其爲大都督謂所親曰充文案小才乃居伐國大任吾將哭以送師或止秀曰昔蹇叔知秦軍必敗故哭送其子耳今呉君無道國有自亡之形群卒踐境將不戰而潰子之哭也旣爲不知乃有不救之罪於是乃止又曰魏舒子混字延廣清慧有才行爲太子舎人年二十七先舒卒朝野咸爲舒悲舒每哀慟退而歎曰吾不及莊生逺矣豈以無益自損乎遂不復哭又}
