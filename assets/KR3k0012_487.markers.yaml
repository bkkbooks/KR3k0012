  - {type: variant, offset: 306, length: 364, content: 給其衣食三歲餘王病賜武馬畜服匿穹廬窮廬旃廬也王死後人眾徙去其冬丁零盜武牛羊武復大窮漢獻帝春秋曰王朗降孫策策令使者詰朗曰問逆賊王朗朗受國恩當云何報德朗對曰身輕罪重死有餘辜申脰就羈蹴足入絆叱咤聽聲東西唯命魏氏春秋曰初宣王使何晏治曹爽等獄宣王曰凡有八族晏䟽丁鄧等七姓宣王曰未也晏窮急乃曰豈謂晏乎宣王曰是也乃收晏魏末傳曰曹爽兄弟歸家勑洛陽縣發民八百人使尉部圍爽第四角作高樓令人在上望視爽兄弟舉動爽計窮愁悶持彈到後園中樓上人便唱故大將軍東行爽還廳事上蜀志曰先主伐吳先主敗引退道隔黃權不得還降魏魏文帝謂權曰君捨逆歸順欲追蹤陳韓耶權對曰臣過受劉氏厚遇降吳不可還蜀無路是以歸命敗軍之將免死為幸何古人之可慕文帝善之蜀志曰許靖為許邵排擯不得齒敘以馬磨自給王隱晉書曰上攻張方決千金堰水碓不作發王公家奴婢手舂給兵男子自十三以上皆從役於是公私窮踧米石萬錢, WYG: 遂厯清顯}
