  - {type: variant, offset: 3445, length: 525, content: 難之況以琨怯弱凡才而當率此以殄強寇晉中興書曰王尼字季孫洛陽覆沒避亂江夏王澄時為荊州刺史見之欣喜厚供給之尼早喪婦止有一息不用居宅唯畜露車牛一乘每行輒使兒御暮則宿車上無有定處澄卒荊州飢荒尼殺牛壞車煮之遂父子餒死晏子春秋曰越石父凍餓為人臣僕三年矣晏子解左驂贖之文子曰神農之法大夫丁壯不耕天下有受其餓者孟子曰陳仲居於陵三日不食耳目無聞見井上有李螬食實者過半矣匍匐往將食之三咽而後耳目有聞見韓子曰秦大餓應侯謂王曰吾苑之草蔬橡菓棗栗足以活民請發之王曰今發吾苑以活民是使有功與無功爭取也人生而亂不如死而治賈誼新書曰虢君驕恣晉伐之出走逃於山中遂餓死為禽獸食之風俗通曰俗說大餓不在一車飯謂正得一車飯不復活也符子曰惠子家窮餓數日不舉火乃見梁王王曰夏麥方熟請以割子可乎惠子曰施方來遇群川之水長有一人溺流而下呼施救之施應曰吾不善游方將為子告急於東越之王簡其善游者以救子可乎溺人曰我得一瓢之力則活矣子方告急於東越之王簡其善游者以救我是不如求我於重淵之下魚龍之腹矣世說曰郗公遭永嘉喪亂窮餒鄉人共食之公常攜兄子外甥二小兒往食鄉人曰各自窮餒以君之賢共欲存君耳恐不能兼食公於是獨往食訖輒含飯著頰還吐與二兒後並得存幽明錄曰樂安縣故市經荒亂人民餓死枯骸填地每至天陰將雨輒聞吟嘯呻歎聲聒於耳, SBCK: 􅀏或怒}
