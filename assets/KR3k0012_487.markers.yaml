  - {type: variant, offset: 145, length: 0, content: '', SBCK: 曰知禮矣䘮夫不夜􅂘嫌思情性也文伯之䘮敬姜據其牀而不哭曰昔者吾有斯子也吾將以爲賢人也吾未甞以就公室今及其死也朋友諸臣未有出涕者而内人皆行哭失聲斯子也必多曠於禮矣夫又曰}
  - {type: variant, offset: 145, length: 0, content: '', WYG: 曰知禮矣喪夫不夜哭嫌思情性也文伯之喪敬姜據其牀而不哭曰昔者吾有斯子也吾將以為賢人也吾未嘗以就公室今及其死也朋友諸臣未有出涕者而内人皆行哭失聲斯子也必多曠於禮矣夫又曰}
  - {type: variant, offset: 145, length: 0, content: '', krp: 曰知禮矣䘮夫不夜哭嫌思情性也文伯之䘮敬姜據其牀而不哭曰昔者吾有斯子也吾將以爲賢人也吾未甞以就公室今及其死也朋友諸臣未有出涕者而内人皆行哭失聲斯子也必多曠於禮矣夫又曰}
  - {type: variant, offset: 147, length: 0, content: '', SBCK: 過㤗山側有婦人哭於墓者而哀夫子式而聽之使子貢問之曰子之哭一似重有憂者曰然昔吾舅死於虎吾夫又死焉今吾子又死焉夫子曰何爲}
  - {type: variant, offset: 147, length: 0, content: '', WYG: 過泰山側有婦人哭于墓者而哀孔子式聴之使子貢問之曰子之哭一似重有憂者曰然昔吾舅死於虎吾夫又死焉今吾子又死焉夫子曰何為不去曰無苛政夫子曰小子識之苛政猛於虎也又曰陽門之介夫死司城子罕入而哭之哀晉人之覘宋者反報於晉侯曰陽門之介夫死子罕哭之哀而民說殆未可伐也孔子聞之曰善哉覘國者乎又曰朋友之墓宿草而不哭焉宿草陳根也謂期年又曰曾申問於曾子曰哭父母有常聲乎曾子曰中路嬰兒失其母焉何常聲之有言其若小兒亡母啼號安得常聲乎又曰斬衰之哭若徃而不返齊縗之哭若徃而反大功之哭三曲而偯小功緦麻哀容可也左傳曰衛叔武將沐聞君至喜捉髮走出前驅射而殺之公知其無罪也枕其股而哭之又曰孟明西乞白乙使帥師于東門之外蹇叔哭之曰孟子吾見師之出而不見其入也又曰秦伯素服郊次嚮師而哭之曰孤違蹇叔以辱二三子孤之罪也又曰子産歸未至聞子皮卒哭且曰吾已無為為善矣唯夫子知我又曰昭二十一年七月日蝕大夫叔輙莅事而哭昭子曰叔輙將死矣非所哭也八月叔輙卒又曰申包胥如秦乞師秦伯使辭焉曰寡人聞命矣子姑就館將圖而告對曰寡君越在草莽未獲所伏下臣何敢即安立依於庭墻而哭日夜不絶聲勺飲不入口七日秦師乃出論語曰顔淵死子哭之慟從者曰子慟矣曰有慟乎非夫人之為慟而誰為家語曰公父文伯卒其妻妾皆行哭失聲敬姜戒之曰吾聞好外者士死之好内者女死之今吾子早夭吾惡其好内聞也史記曰髙祖夜經宅中前有大蛇當逕抜劒斬蛇後人來至蛇所有一老嫗夜哭人問何哭嫗曰人殺吾子吾子白帝子也化為蛇當道今者赤帝子斬之故哭人以嫗為不誠欲以苦之因忽不見又曰鄭相子産卒鄭人皆哭泣悲之如亡親戚孔子與子産如兄弟及聞死為泣曰古之遺愛也漢書曰何並字子㢘為潁川太守代陵陽嚴詡官屬祖道詡據地哭曰吾哀潁川士我以柔弱徵必選剛猛代代到將有僵仆者故相弔耳並至果大殺戮又曰王莽末兵起莽憂不知所出崔發言周禮及春秋左氏國有大災則哭以厭之故易稱先號咷而後笑宜呼嗟告天莽自知敗及率郡臣南郊陳符命本末仰天撫心大哭諸生小民㑹旦夕哭為設飱粥甚悲哀及能誦策文者除以為郎至五千餘人謝承後漢書曰許慶字子伯家貧為郡督郵乗牛車鄉里號曰軺車督郵慶嘗與友人談論漢無統嗣幸臣専勢世俗衰薄賢者放退慨然據地悲哭時稱許子伯哭臣華㠐後漢書曰趙一造河南尹羊陟}
