  - {type: variant, offset: 2708, length: 582, content: 處使牧羝羊粟食不至掘野鼠草實而食之又曰元帝即位天下大水關東郡十一尤甚二年齊地飢穀石三十餘萬民多飢死琅琊郡人相食又曰王莽末赤眉遂燒長安宮室市里害更始民飢餓相食死者數十萬長安為虛城中無行人宗廟園林皆發掘唯霸陵完東觀漢記曰王莽末南方枯旱民多飢餓群盜入野澤掘鳧茨食之又曰建武九年正月隗囂餓出城飡糗腹脹死又曰朱勃上書理馬援曰八年車駕討隗囂唯獨狄道為國堅守然民飢饉啖弩煮履寄命漏刻又曰上問第五倫曰聞卿為吏撾妻父不過從兄飯寧有之也倫對曰臣三娶妻皆無父臣生遭饑擾攘米石萬錢不敢妄過人飯又曰王郎起上自薊東南馳晨夜草舍至饒陽無蔞亭時天寒冽眾皆飢疲馮異上豆粥明旦上謂諸將曰昨得公孫豆粥飢寒俱解又曰鄧禹與赤眉戰赤眉佯敗棄輜重走皆載土以豆覆其上兵士飢爭取之赤眉引還擊之軍潰亂時百姓饑人相食黃金一斤易豆五升道路斷隔委輸不至軍士悉以菓實為糧又曰耿恭在䟽勒城救兵不至數月食盡窮困乃煮鎧弩食其筋革謝承後漢書曰天下亂人相食趙孝弟禮為餓賊所得孝聞之即自縛詣賊曰禮久餓羸瘦不如孝肥飽賊大驚並放之袁山松後漢書曰赤眉入長安掖庭中有數百千人自更始敗閉殿門不出掘庭中蘆菔根捕池中魚食之死因埋宮中有故祠甘泉樂人尚共擊鼓歌儛衣服鮮明見盆子叩頭言飢盆子使中黃門廩之粟數升後盆子去皆餓死范曄後漢書曰鄧禹威稍損又乏食歸附者離散而赤眉復還入長安禹與戰敗走至高陵軍士飢餓皆食棗菜漢獻帝傳曰車駕至洛陽是時宮室燒盡百官披荊棘依丘牆, SBCK: ''}
