  - {type: variant, offset: 1083, length: 483, content: 也尸子曰湯復於湯丘文王幽於姜里武王羈於王門越王棲於會稽秦繆公敗於殽塞齊桓公遇賊晉文公出走故三王資於辱而五伯得於困也韓子曰魯人身善織履妻善織縞而徙於越或謂之曰子必窮矣履為人履之也而越人乘舟縞為人冠之也而越人被髮欲無窮可得乎燕丹子曰樊將軍以窮歸我而丹賣之心不忍也淮南子曰今夫窮鄙之社也叩盆拊缻相和而歌自以為樂矣窮鄙之社窮巷之小社也嘗試為之擊建鼓撞巨鍾乃始知其缻之足羞矣新序曰甯戚欲干齊桓公窮困無以自進於是為商歌宿於郭門之外擊牛角而歌桓公聞之曰異哉之歌非常人也雜道書曰地肺之山其下生草名曰救窮如竹冬夏不枯取而食之可絕穀不食令人長生服之三十日行及走馬趙壹窮鳥賦曰有一窮鳥戢翼原野罩網加上機穽在下前見蒼隼後逼驅者繳彈張右羿弓彀左飛丸激矢交集於我思飛不得欲鳴不可舉頭畏觸搖足恐墮內獨怖急乍冰乍火琴操曰孔子使顏淵執轡到匡郭外孔子既似陽虎以為今復來至乃相率圍孔子數日不解弟子皆有飢色於是孔子仰天而嘆曰君子固亦窮乎子路聞孔子之言悲感勃然大怒張目奮劍聲如鍾鼓顧謂二三子曰使吾有此厄也司馬彪與山巨源書曰根拔失據託命此別告求矜愍許見賑恤窮人易感悲喜兼懷承命之後情過挾纊孔舒元在窮記曰遣信與義, WYG: 范}
