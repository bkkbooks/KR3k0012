  - {type: variant, offset: 4138, length: 1, content: 昔, WYG: 摩竭陀國正月十五日僧徒俗衆雲集觀佛舎利放光雨花唐蘇味道正月十五日夜詩曰火樹銀花合星橋鐵鏁開暗塵隨馬去明月逐人來遊騎皆穠李行歌盡落梅金吾不禁夜玉漏莫相催又崔液正月望夜遊詩曰玉漏銅壺且莫催鐵關金鏁徹明開誰家見月能閒坐何處聞燈不看來又神燈佛火百輪張刻像圖形七寳裝影􅂻如開金口說空中似散玉毫光又金勒銀鞍控紫騮玉輪朱幰駕青牛驂驔始散東城曲倐忽還逢南陌頭晦日荆楚歲時記曰元日至于月晦並為酺聚飲食每月皆}
  - {type: page-break, offset: 4138, content: '', id: KR3k0012_WYG_030-6a, image: WYG0893/WYG0893-0257c.png}
  - {type: variant, offset: 4140, length: 0, content: '', WYG: 弦望晦朔以正月初年時俗重以為節士女汎舟或臨水宴樂玉燭寳典曰元日至月晦人並為酺食渡水士女悉湔裳酹酒於水湄以為度厄今世人唯晦日臨河解除婦人或湔裙後魏}
  - {type: page-break, offset: 4140, content: '', id: KR3k0012_WYG_030-6b, image: WYG0893/WYG0893-0257d.png}
  - {type: variant, offset: 4141, length: 2, content: 躭仕, WYG: 元明晦日汎舟應詔詩曰輕灰吹上管落蓂飄下蔕遲遲春日華晼晼年光麗北齊魏收晦日汎舟應詔詩曰裊裊春枝弱關關新鳥呼棹唱忽逶迤菱歌時顧慕睿賞方月色宴言忘日暮逰豫慰人心照臨康國步唐太宗月晦詩晦魄移中律凝暄起麗城罩雲朝蓋上穿露曉珠呈笑樹花分色啼枝鳥合聲披襟勤眺望極目暢春情中和節唐書云貞元五年正月十一日詔曰四序嘉辰厯代増置漢宗上巳晉紀重陽或説禳除雖因舊俗與衆宴樂誠合當時朕以春方發生候維仲月勾萌畢逹天地同和俾共昭蘇宜均暢茂自今已後以二月一日為中和節内外官司並休假一日先勅百寮以三令節集㑹今宜以中和節代晦日中和之節自兹始也又曰其月二月八日中書侍郎李秘奏伏以仲春初吉制嘉節以徴之更晦日於徃月之終揆明辰於來月之始請令文武百辟是日進農書司農獻穜稑之種三公戚里上春服士庶以刀尺相遺村舍作中和酒祭勾芒神聚㑹宴樂名為享勾芒祈年穀仍望各下}
  - {type: page-break, offset: 4141, content: '', id: KR3k0012_WYG_030-7a, image: WYG0893/WYG0893-0258a.png}
