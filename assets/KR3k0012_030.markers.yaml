  - {type: variant, offset: 4906, length: 17, content: 日往月來元正首祚大簇告辰微陽始布罄, SBCK: 永和九年歳在癸丑暮春之􅀄㑹于㑹稽山隂之蘭亭修禊事也群賢畢至少長咸集此地有崇山峻嶺茂林脩竹又有清流激湍映帶左右引以爲流觴曲水列坐其次雖}
  - {type: variant, offset: 4906, length: 17, content: 日往月來元正首祚大簇告辰微陽始布罄, krp: 永和九年歳在癸丑暮春之𥘉㑹于㑹稽山隂之蘭亭修禊事也群賢畢至少長咸集此地有崇山峻嶺茂林脩竹又有清流激湍映帶左右引以爲流觴曲水列坐其次雖}
  - {type: variant, offset: 4907, length: 1, content: 往, WYG: 纒胃維}
  - {type: variant, offset: 4909, length: 0, content: '', WYG: 軌青陸皇祗發生之始后王布和之辰思對上靈之心以答庶萌之願有詔掌故爰命司厯獻洛飲之禮具上巳之儀南除輦道北清禁林略亭皋跨芝瀍宛太液懷層山松石峻垝葱翠隂烟於是離宮衛設别殿周徼然後升秘駕引緹騎搖玉鸞發流吹天動神移淵渟雲委以降于行所禮也梁沈約三日率爾成篇曰麗日屬元已年芳具在斯開花已匝樹流鶯復滿枝洛陽繁華子長安輕薄兒東出千金堰西臨鴈鶩陂遊絲映空轉髙栁拂地垂絲幘文照曜紫燕光陸離清晨戲伊水薄暮宿蘭池象筵鳴寳瑟金瓶泛羽巵寧憶春蠶起日暮桑欲萎梁簡文帝三月曲水詩序曰竊以周城洛邑自流水以禊除晉集華林同文軌而髙宴莫不禮具義舉㳫舉重規昭動神明雍熈鍾石是節也上巳屬辰餘萌達壤倉庚應律女夷司候爾乃分階樹羽䟽泉泛爵羽觴沿泝蕙肴㳫}
