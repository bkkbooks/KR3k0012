  - {type: variant, offset: 1238, length: 1509, content: 至為正殷以日至三十日為正夏以日至六十日為正天有三統土有三正統水也統者所以序生也三正者所以統天也是故三統三正也若循連環周則又始窮則反本也夏以孟春為正者貴形也春秋感精符曰人統月建寅物生之端謂之人統夏以為正漢書云於律太蔟為人純也白虎通曰正朔三何夫天有三微之月也三微者何言陽氣始施黃泉而未上也十一月陽氣始養黃泉之下万物皆赫赫然感陽之氣也故周為天正色尚赤十二月之時萬物時牙而白故殷為地正色尚白正月之時萬物始達孚甲而出皆黑人得加力故夏為人正色尚黑也後之人不以二三月為正者以其萬物不齊莫有所立故必以三微月也漢官儀曰正月旦天子御德陽殿臨軒公卿大夫百官各陪位朝賀蠻貊胡羗朝貢必見屬郡計吏皆陛覲又曰元日朝賀三公拜璧殿上獻壽觴又曰正月朔賀三公奉璧上殿臨西北太常贊曰皇帝為王公興三公伏皇帝坐乃前進璧古語曰御坐則起此之謂也魏略曰正始元年南風大起數十日發屋折樹動太極殿東閣正旦大會又甚傾杯案曾休將誅之徵也典略曰魏明帝使愽士馬均作司南車水轉百戲正月朝造巨獸魚龍蔓延弄馬倒騎備如漢西京故事晉起居注曰太始元年詔曰朕遭憫凶奉承洪業追慕罔極正日雖當受朝其伎樂一切勿有所設又殿前反宇及武帳織成帷之屬皆不須施又曰太始四年正月上臨軒朝群臣於太極殿前詔安平王載輿車昇殿上迎拜於阼階王坐上親奉觴上壽皆如家人之禮王拜上皆跪而止之又曰永和元年正月辛未朔雨不會甲戍皇太后登太極前殿施紗幃鄣與上臨嚮群臣又曰咸康四年尚書倉部奏下揚州調胡米一升至五年正旦進御詔停又曰十二月丙子正旦會百僚增賜綠醽酒人二升又曰咸康七年十二月尚書樂謨奏八年正會儀注唯作鼓鍾其餘伎樂盡不作詔曰若元日大嚮萬國朝宗庭廢鍾鼓之奏朕聞起居之節朝無磬折之音賓無蹈履之度其於事儀不亦闕乎卿諸人當准量輕重以制事中則情典並隨國無滯儀矣又曰永和中廷尉王彪之與揚州刺史殷浩書曰太史上元日合朔談者或有疑應卻會與否昔建元元年亦元日合朔庾車騎寫劉孔才所論為不得禮茍令從之是勝人之一失何者禮云諸侯旅見天子入門不得終禮而廢者四太廟大饗蝕后之喪雨沾服失容尋此四事之指自謂諸侯雖巳入門而卒暴有之則不得終禮非為先存其事而僥倖史官推術錯謬故不豫廢朝禮也夫三辰有災莫大日蝕史官告譴而無懼容不修豫防之禮而廢消救之術方大饗華夷君臣相慶豈復是將虔天災罪巳之謂且檢之事實合朔之儀至尊靜躬殿堂不聽政事冕服御坐門闥之制與元會禮異自不得兼行當權其事宜合朔之禮不輕於元會元會有可卻之禮唯合朔無可廢之義謂應依建元故事卻元會浩從之竟卻會又曰咸和二年正月饗萬國有鷗鳥五集殿明年蘇峻反三齊略曰滎陽有免井漢沛公避項羽追逃於井中有雙鳩集其上人云沛公逃入井羽曰井中有人鳩不集其上遂下道沛公遂免難後漢世元日放鳩蓋為此也列子曰邯鄲之民以正月之旦獻鳩於簡子簡子大悅厚賞之客問其故簡子曰正旦放生示有恩也客曰民知君欲放之故竟而捕之死者眾矣君而欲生之不若禁民勿捕捕而放之恩不過不相捕矣簡子曰善孔叢子曰邯鄲民以正月旦獻雀於趙王而綴以五綵王大悅申叔告子順子順曰王何以為也對曰正旦放之求有生也子順曰此委巷之鄙事非先王之法且又不順夫雀者取其名則宜受之於上不宜取之於下一國之王受民雀將何悅焉淮南子曰以日冬至數至來歲正月朔日五十日者民食足不滿五十日日減一升有餘日日益一斗四時纂要曰此占最有據也世說曰元帝正會引王丞相登御床王公固辭中宗引之彌苦文獻曰文獻王導謚太陽與萬物同輝臣下何以瞻仰乃止又曰陶公作荊州時勑舡官使鋸木屑不限多少悉藏之時咸不解此意後正會值積雪會日始晴廳事前除雪地甚潤濕於是悉用木屑覆之都無所妨桂陽列仙傳曰成武丁正旦大會以酒沃庭中有司問其故對曰臨武縣失火以酒救之遣驗果然又曰永寧元年西南夷獻樂及幻人能吐火自支解易牛馬頭時元會作之於庭安帝與群臣觀大奇之唯陳禪獨離席曰帝王之庭不宜作夷狄伎荊, WYG: 荆}
