  - {type: variant, offset: 4104, length: 1, content: 立, WYG: 勅金吾弛禁前後各一日以覩燈花若晝日世説正月十五日禰衡嘗被魏武謫為鼓吏}
  - {type: variant, offset: 4106, length: 4, content: 糞掃籩令, WYG: 此日試鼓漁陽桴作漁陽三撾淵淵有金石聲後漢書註云文士傳曰衡擊鼓為漁陽三撾蹋地來前躡鼓脚容態不常鼔節甚悲易衣畢復擊鼓三撾而去至今有漁陽撾自衡始也青瑣集曰徐徳言之妻陳叔寳之妹封樂昌公主才色冠絶時陳政方亂德言知不相保謂其妻曰以君之容國亡必入權豪之家倘情縁未斷猶兾相見宜有以信之乃破一鏡}
