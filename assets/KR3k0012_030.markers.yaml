  - {type: variant, offset: 7, length: 0, content: '', SBCK: 爲羊五日爲牛六日爲馬七日爲人以七種菜爲羮翦綵爲人或鏤金薄爲人以貼屏風亦戴之頭􅁂董勛問禮俗云人入新年形容改從新又造華勝相遺起於晉代見賈充李夫人典戒云像瑞圖金勝之形又取像西王母戴勝也舊以正月七日爲人故名爲人日今北人此日亦有諱食菜者與楚食正反剪綵鏤金薄爲人皆符人日之意與正旦鏤雞於戸同北人亦有至人日諱食故歳菜唯食新菜者又餘日不刻牛羊狗猪馬之像而二日獨施人雞此則未喻郭縁生􅄒征記云壽張縣安民山魏東平王鑿山頂爲㑹望處刻銘於壁文字猶在所載銘辞即此處老子云衆人熈熈如登春臺如享大牢楚詞云目極千里傷春心則春日登臨自古爲適但不知七日竟起何代晉代桓温參軍張望亦有正月七日登高詩近代巳來南北同耳北人此日食煎餅於庭中作之云薰大未知所出也雜五行}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_SBCK_030-1b}
