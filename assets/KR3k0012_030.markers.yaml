  - {type: variant, offset: 5059, length: 2, content: 草木, SBCK: 秘駕引緹􅀐揺玉鸞發流吹天動神移淵渟雲委以降于行所禮也梁沈約三日率尓成篇曰麗日属元已年芳具在斯開花巳匝樹流鸎復滿枝洛陽繁華子長安輕薄兒東出千金堰西臨鴈鶩陂遊絲映空轉髙栁拂地垂絲萍文照曜紫鷰光陸離清晨戯伊水薄暮􅀫蘭池象筵排寳瑟金瓶泛羽巵寧憶春蠶起日暮桑欲萎梁簡文帝三月曲水詩序曰竊以周成洛邑自流水以禊除晉集華林同文􅁤而髙宴莫不禮具義舉沓矩重規照動神明雍熈鍾石是節也上巳属辰餘}
