  - {type: variant, offset: 4288, length: 138, content: 落毛羽以肉翮而飛能搏逐猛虎使妖惡不能為害食以瑗膏或一歲數來或數歲不至國人莫不掃洒門戶以望重精之集其來至之時國人或刻鑄金寶為此鳥之狀置於戶牖之間則魑魅鬼類自然退伏今人每歲元日刻畫為雞於戶牖之上者蓋重精之遺像也西京雜記曰漢置宗廟飲酎用九十大牢皇帝侍祠以正月旦作酒八月成名曰酎一曰醞, SBCK: 禊處}
