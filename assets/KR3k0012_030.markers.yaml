  - {type: variant, offset: 3466, length: 0, content: '', WYG: 以七種莱為羮剪綵為人或鏤金箔為人以貼屏風亦戴之頭鬢董勛曰像人入新年形容改舊從新又造花勝相遺起於晉代見賈充李夫人典戒云像瑞圗金勝之形又取像西王母戴勝也舊以正月七日為人故名為人日今北人此日亦有諱食菜者與楚食正反剪綵鏤金箔為人皆符人日之意與}
