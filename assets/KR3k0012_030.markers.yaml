  - {type: variant, offset: 3538, length: 562, content: 間人於此日向辰至門前呼牛馬雞畜令來乃置粟豆於灰散之宅內云以招牛馬未知所出也於是長幼悉正衣冠以次拜賀進椒酒飲桃湯及柏故以桃湯柏葉為酒董勛云俗以歲首用椒酒椒性芬香人中為葯咒而飲之亦一時之禮故於此日採椒花以貢尊者晉海西令又問董勛曰俗人正日飲酒先飲小者何也勛云俗人小者得歲先酒賀之老者失歲故後與酒然則從小起義在於斯乎其敷子散出葛洪練化篇方用柏子人麻人細辛乾薑附子等分為散井花水服之又方江夏劉次卿受彈鬼九方武都雄黃丹沙二兩五物合搗洋五兩蜡和令謂如彈丸正月旦令男左女右帶之又云敷子散出胡洽方於是下五辛菜膠牙糖各進一雞子梁有天下不食葷荊自此不復食雞子以從常則周處風土記云正旦當生吞雞子一枚謂之練形又晨啖五辛菜以助發五藏氣則行之久矣膠牙者蓋以使其牢固不動今北人亦如之熬麻子大豆兼糖散之案練化篇云正月旦吞雞子赤豆各七枚辟溫氣又肘後方云且及七日吞麻子小豆各二七枚消疾疫張仲景方云歲有惡氣中人不幸便死取大豆二七枚雞子白麻并酒吞之然麻豆之設當起於此今則熬之未知所據也又以錢貫繫床腳廻以投糞掃上云令如願一錄異記云有啇人區明者過彭澤湖有車馬自稱青洪君要明過厚禮之問何所須有人教之但乞如願及問以此言荅之青洪君甚惜如願不得以許之乃其婢也既而送出自爾啇人或有所求如願並為即得後至正旦如願起晚乃打如願如願走入糞中啇人以杖打糞掃喚如願竟不還也如此願遺事今北人正月, SBCK: ''}
