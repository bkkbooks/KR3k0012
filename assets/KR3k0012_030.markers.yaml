  - {type: variant, offset: 5088, length: 1, content: 象, SBCK: 勾芒御昊春沽洗應時月元巳啓良辰明從自逺至童冠八九人伶人理新樂膳工獻時珎春醴踰九醖冬青過十旬晉閭丘冲三月三日應詔詩曰暮春之月春服旣成􅂛陽潤土冰渙川􅄹餘萌逹壤嘉木敷榮后皇宣遊旣讌且寧光光華輦侁侁從臣上䕃丹幄下藉文茵臨池挹盥濯故絜新俯鏡清流仰睇天津藹藹華林巖巖景陽嶪嶪峻宇弈弈飛梁垂䕃倒景􅀂翶􅀂翔浩浩白水汎汎龍舟皇在靈沼百辟周遊激櫂清歌鼓枻行謳聞樂咸和具醉斯柔在昔帝虞德􅀍遐荒千鏚在庭苗人來王今我哲后古聖齊芳惠此中國}
