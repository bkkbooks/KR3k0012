  - {type: variant, offset: 3618, length: 0, content: '', WYG: 立宅東南角謂成曰此地是君蠶室我即地神矣正月半日可作白粥泛膏于上以祭之當令君家蠶桑百倍言訖而去絶失所在或謂作膏粥已後年大得蠶世人正月半作粥禱之加以肉覆其上登屋食之祝云登膏糜挾鼠腦欲來不來待我三蠶老則似為蠶攘鼠與齊諧記相符又覆肉亦是覆膋之理石虎鄴}
