  - {type: variant, offset: 4245, length: 2, content: 鸞鳳, WYG: 去冬至一百六日陸翽鄴中記曰寒食三日作醴酪又煑粳米及麥為酪搗杏仁煑作粥案玉燭寳典今日悉為大麥粥研杏仁為酪引餳沃之又孫楚祭子推文云醴酪二盂是其事也又并州俗冬至一百五日為介子推斷火冷食三日作乾粥是今之糗也范蔚宗後漢書曰周舉遷并州刺史太原一郡舊俗以介子推焚骸有龍忌之禁至其月咸言神靈不樂舉火舉移書於子推廟云春中食寒一月老小不堪今則三日}
  - {type: page-break, offset: 4245, content: '', id: KR3k0012_WYG_030-10a, image: WYG0893/WYG0893-0259c.png}
  - {type: variant, offset: 4248, length: 0, content: '', WYG: 已魏武帝刑罰令曰聞太原上黨西河鴈門冬至後皆沍寒之地老少羸弱將有不堪之患令人不得食寒若犯者家長半歲刑主吏百日刑令長罰一月俸周裴汝南先賢傳曰太原舊俗以介子推焚骸一月寒食莫敢烟爨劉向别錄曰寒食蹋蹴黄帝所作本兵勢也或云起於戰國與鞠毬同古人蹋蹴以為戲古今藝術圖云寒食鞦韆本北方山戎之戲以習輕趫者也又按周舉移書及魏武刑罰令陸翽鄴中記並云寒食斷火起於子推琴操所云子綏綏即推也又五月五日與今有異皆因流俗所傳據左傳及史記並無介子推被焚之事按周禮司烜氏仲春以木鐸脩火禁於國中註云為季春將出火也今寒食准節氣是仲春之末清明是三月之節然則禁火葢周之舊制玉燭寳典曰寒食此節城市尤多鬭雞之戲左傳有季郈鬭雞其}
  - {type: page-break, offset: 4248, content: '', id: KR3k0012_WYG_030-10b, image: WYG0893/WYG0893-0259d.png}
