  - {type: variant, offset: 11, length: 1, content: 上, SBCK: 七}
  - {type: variant, offset: 11, length: 244, content: 上日受終于文祖上日朔日也終謂堯終帝位之事文祖者堯文德之祖廟又曰正月元日受格于文祖月正正月元日上日也舜服堯喪三年畢將即政故復至文祖廟告又曰正月朔旦受命于神宗受舜終事之命神宗文祖之宗廟言神尊之也率百官若帝之初順舜初攝帝位故事奉行之漢書曰正月朔歲首立春四時之首又曰哀帝時鮑宣以正旦日蝕地震上書曰陛下父事天母事地子養庶人今父虧明母震動子詠言三朝始小民正月朔日俗忌器破尚惡之況日之虧缺乎三朝日月歲也東觀漢記曰戴憑字次仲為侍中正旦朝賀百僚畢會帝令群臣能說經史更相難詰義有不通輒奪其席以益通者憑遂重坐五, WYG: ''}
  - {type: variant, offset: 11, length: 1, content: 上, krp: 七}
  - {type: variant, offset: 13, length: 27, content: 受終于文祖上日朔日也終謂堯終帝位之事文祖者堯文德之祖廟, SBCK: 男吞赤豆七顆女呑二七顆竟年無病}
