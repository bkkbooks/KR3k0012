  - {type: variant, offset: 2857, length: 0, content: '', SBCK: 其月二十八日中書侍郎李泌奏伏以仲春􅀄吉制嘉節以徴之更晦日於往月之終揆明辰於來月之始請令文武百辟以是日進農書司農獻穜稑之穜三公戚里上春服士庶以刀尺相遺村社作中和酒祭勾芒神聚㑹宴樂名爲饗勾芒祈年􅂖仍望各下州府所在頒行從之又云貞元六年上以中和節宴百寮於曲江上賦詩以賜之百官皆和焉是歳戴叔倫爲容州刺史素有詩名上乃令録其詩以賜之社孝經緯曰社土地之主也土地闊不可盡􅀕故封工爲社以報功也禮記月令曰二月之節是月也擇}
  - {type: page-break, offset: 2857, content: '', id: KR3k0012_SBCK_030-5a}
  - {type: variant, offset: 2857, length: 0, content: '', krp: 其月二十八日中書侍郎李泌奏伏以仲春𥘉吉制嘉節以徴之更晦日於往月之終揆明辰於來月之始請令文武百辟以是日進農書司農獻穜稑之穜三公戚里上春服士庶以刀尺相遺村社作中和酒祭勾芒神聚㑹宴樂名爲饗勾芒祈年糓仍望各下州府所在頒行從之又云貞元六年上以中和節宴百寮於曲江上賦詩以賜之百官皆和焉是歳戴叔倫爲容州刺史素有詩名上乃令録其詩以賜之社孝經緯曰社土地之主也土地闊不可盡祭故封工爲社以報功也禮記月令曰二月之節是月也擇}
  - {type: variant, offset: 2859, length: 5, content: 服桃湯桃者, SBCK: 命人社爲祀社稷也春事興故祭之以祈農祥元日謂近春分前後戊日元吉也又曰王爲群姓立社曰太社􅁟自立社曰皇社諸侯爲百姓立社曰國社自立社曰侯社大夫巳下立社曰置社尚書曰用命則賞于祖不用命則戮于社社主隂隂主殺論語曰魯哀公問社於宰我對白夏后氏以松殷人以栢周人以栗曰使民戰史記曰共工氏之子爲后土能平水土故祀以爲社故天子曰大社必受霜露風雨以逹天地之氣也社所以親地也地載万物天垂象取法於天所以尊天而親地也社共粢盛所以報本反始也漢書曰陳平爲里中社宰分􅁏甚均父老善之平曰使平得宰天下亦如此􅁏又曰髙祖天下定詔御史令治榆社春用羊彘祠之魏志曰王脩年七歳䘮母母以社日亡來年隣里社脩感念母悲哀其隣里聞爲之罷社晉書曰阮脩字宣子伐社樹或止之籍曰或社爲樹伐樹則社移樹而爲社伐樹則社亡也荆楚歳時記曰社日四隣並結綜㑹社牲醪爲屋於樹下先􅀕神然後饗其昨鄭氏云百家共一社今百家所社綜即共立之社也寒食荆楚歳時記曰去冬節一百}
