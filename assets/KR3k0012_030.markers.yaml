  - {type: variant, offset: 1691, length: 635, content: 雖當受朝其伎樂一切勿有所設又殿前反宇及武帳織成帷之屬皆不須施又曰太始四年正月上臨軒朝群臣於太極殿前詔安平王載輿車昇殿上迎拜於阼階王坐上親奉觴上壽皆如家人之禮王拜上皆跪而止之又曰永和元年正月辛未朔雨不會甲戍皇太后登太極前殿施紗幃鄣與上臨嚮群臣又曰咸康四年尚書倉部奏下揚州調胡米一升至五年正旦進御詔停又曰十二月丙子正旦會百僚增賜綠醽酒人二升又曰咸康七年十二月尚書樂謨奏八年正會儀注唯作鼓鍾其餘伎樂盡不作詔曰若元日大嚮萬國朝宗庭廢鍾鼓之奏朕聞起居之節朝無磬折之音賓無蹈履之度其於事儀不亦闕乎卿諸人當准量輕重以制事中則情典並隨國無滯儀矣又曰永和中廷尉王彪之與揚州刺史殷浩書曰太史上元日合朔談者或有疑應卻會與否昔建元元年亦元日合朔庾車騎寫劉孔才所論為不得禮茍令從之是勝人之一失何者禮云諸侯旅見天子入門不得終禮而廢者四太廟大饗蝕后之喪雨沾服失容尋此四事之指自謂諸侯雖巳入門而卒暴有之則不得終禮非為先存其事而僥倖史官推術錯謬故不豫廢朝禮也夫三辰有災莫大日蝕史官告譴而無懼容不修豫防之禮而廢消救之術方大饗華夷君臣相慶豈復是將虔天災罪巳之謂且檢之事實合朔之儀至尊靜躬殿堂不聽政事冕服御坐門闥之制與元會禮異自不得兼行當權其事宜合朔之禮不輕於元會元會有可卻之禮唯合朔無可廢之義謂應依建元故事卻元會浩從之竟卻會又曰咸和二年正月饗萬國有鷗鳥五集殿明年蘇峻反三齊略曰滎陽有免井漢沛公避項羽追逃於井中有雙鳩集其上人云沛公逃入井羽曰井中有人鳩不集其上遂下道沛公遂免難後漢世元日放鳩蓋為此也列子曰邯鄲之民, SBCK: 必}
