  - {type: variant, offset: 2895, length: 0, content: '', SBCK: 而巳魏武帝明罰令曰聞太原上黨西河鴈門冬至後百有五日皆􅴟寒之地老少羸弱將有不堪之患令人不得寒食􅀂犯者家長半歳刑主吏百日刑令長奪一月俸周斐汝南先賢傳曰太原舊俗以介子推焚骸一月寒食莫敢煙㸑劉向別録曰寒食蹋蹴黄帝所造夲兵勢也或云起於戰國案鞠與毬同古人蹋蹴以爲戯古今藝術圖云寒食鞦韆夲北方山戎之戯以習輕趫者也又按周舉移書及魏武明罰令陸翽鄴中記並云寒食断火起於子推琴操所云子綏綏即推也又云五月五日與今有異皆因流俗所傳據左傳及史記並無介子推􅀍焚之事案周禮司烜氏仲春以木鐸脩火禁于國中注云爲季春將出火也今寒食准節氣是仲春之末清明是}
