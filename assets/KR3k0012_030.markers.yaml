  - {type: variant, offset: 42, length: 0, content: '', SBCK: 宋武帝女壽陽公主人日卧於含章殿簷下梅花落公主額上成五出花拂之不去皇后留之看得幾時經三日洗之乃落宫女竒其異竟效之今梅花粧是也談藪曰北齊髙祖七日􅂛髙宴羣臣問曰何故名人日魏收對以董勛}
  - {type: variant, offset: 42, length: 0, content: '', krp: 宋武帝女壽陽公主人日卧於含章殿簷下梅花落公主額上成五出花拂之不去皇后留之看得幾時經三日洗之乃落宫女竒其異竟效之今梅花粧是也談藪曰北齊髙祖七日升髙宴羣臣問曰何故名人日魏收對以董勛}
  - {type: variant, offset: 44, length: 733, content: 元日受格于文祖月正正月元日上日也舜服堯喪三年畢將即政故復至文祖廟告又曰正月朔旦受命于神宗受舜終事之命神宗文祖之宗廟言神尊之也率百官若帝之初順舜初攝帝位故事奉行之漢書曰正月朔歲首立春四時之首又曰哀帝時鮑宣以正旦日蝕地震上書曰陛下父事天母事地子養庶人今父虧明母震動子詠言三朝始小民正月朔日俗忌器破尚惡之況日之虧缺乎三朝日月歲也東觀漢記曰戴憑字次仲為侍中正旦朝賀百僚畢會帝令群臣能說經史更相難詰義有不通輒奪其席以益通者憑遂重坐五十餘席後漢書陳翔拜侍御史時正旦朝賀大將軍梁冀威儀不整翔奏冀恃貴不敬請收治罪時人奇之續漢書曰永平四年詔曰比來水旱饑饉加有軍旅正旦無陳朝賀之儀又曰歲正日為大射朝受賀其儀夜漏未盡七刻鍾鳴受賀及贄公侯璧中二千石羔千六百石鴈四百石已下雉百官賀正曰二千石已上上殿稱萬歲舉觴御食司空奉羹大司農奉飯奏食舉之樂百官奏畢宴飲作樂魏書曰建安中劉邵為計吏詣許太史言正旦當日蝕邵時在荀彧所坐者數十人或云當廢或云宜卻會邵曰梓慎禆竈古之良史猶占水火錯失天時然則聖人垂制不為變豫廢朝禮者或災消異伏或推術謬誤也彧善其言勑朝會如故日亦不食臧榮緒晉書曰熊遠議曰履端元日正始之初有識之士於是觀禮樂榮耳目之觀崇玩弄之好又曰晉元會設白獸樽於殿上樽蓋上施白獸若有能獻直言者則發此樽飲酒案禮白獸樽乃杜舉之遺式也為白獸蓋後代所為示不忌憚也晉載記曰南燕慕容超末年正會群臣於正殿方奏樂超歎曲終不已其年為宋高祖所擒沈約宋書曰舊時歲朔常設葦茭桃梗磔於宮及百寺之門以穰惡氣又曰孝武帝大明五年正月旦雪江夏至義恭以衣承雪作六出花進以為瑞帝大悅又曰元嘉三十年正月旦上朝萬國平旦東南有青黑雲氣非常廣數丈過北覆暎宮上北齊書神武既平并州爾朱兆北保秀容神武揚聲討兆既出而止者數四兆意怠神武揣其歲首當宴會遣竇泰以精騎襲之, SBCK: ''}
