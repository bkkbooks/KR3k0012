  - {type: variant, offset: 256, length: 578, content: 餘席後漢書陳翔拜侍御史時正旦朝賀大將軍梁冀威儀不整翔奏冀恃貴不敬請收治罪時人奇之續漢書曰永平四年詔曰比來水旱饑饉加有軍旅正旦無陳朝賀之儀又曰歲正日為大射朝受賀其儀夜漏未盡七刻鍾鳴受賀及贄公侯璧中二千石羔千六百石鴈四百石已下雉百官賀正曰二千石已上上殿稱萬歲舉觴御食司空奉羹大司農奉飯奏食舉之樂百官奏畢宴飲作樂魏書曰建安中劉邵為計吏詣許太史言正旦當日蝕邵時在荀彧所坐者數十人或云當廢或云宜卻會邵曰梓慎禆竈古之良史猶占水火錯失天時然則聖人垂制不為變豫廢朝禮者或災消異伏或推術謬誤也彧善其言勑朝會如故日亦不食臧榮緒晉書曰熊遠議曰履端元日正始之初有識之士於是觀禮樂榮耳目之觀崇玩弄之好又曰晉元會設白獸樽於殿上樽蓋上施白獸若有能獻直言者則發此樽飲酒案禮白獸樽乃杜舉之遺式也為白獸蓋後代所為示不忌憚也晉載記曰南燕慕容超末年正會群臣於正殿方奏樂超歎曲終不已其年為宋高祖所擒沈約宋書曰舊時歲朔常設葦茭桃梗磔於宮及百寺之門以穰惡氣又曰孝武帝大明五年正月旦雪江夏至義恭以衣承雪作六出花進以為瑞帝大悅又曰元嘉三十年正月旦上朝萬國平旦東南有青黑雲氣非常廣數丈過北覆暎宮上北齊書神武既平并州爾朱兆北保秀容神武揚聲討兆既出而止者數四兆意怠神武揣其歲首當宴會遣竇泰以精騎襲之一日一夜行三百里神武繼至兆軍人因宴饗休息驚走遂破之兆自殺又曰張華原為兗州刺史獄有繫囚時謂之曰三元之始念卿幽閉今給假, WYG: ''}
