  - {type: variant, offset: 4271, length: 1, content: 鳥, WYG: 日桐不華歲有大寒田鼠不化國多貪殘虹不見婦人亂色戴勝不降桑政教不平唐李崇嗣寒食詩曰普天皆滅熖匝地盡藏烟不知何處火來就客心然又宋之問途中寒食詩曰馬上逢寒食途中屬暮春可憐江浦望不見洛橋人又沈佺期嶺表逢寒食詩曰嶺外逢寒食春來不見餳洛陽新甲子何日是清明三月三日詩曰溱與洧方渙渙兮渙渙盛貌也謂三月内桃花水下之時水為至盛也士與女方秉蕳兮秉執也藺蘭也當此盛流之時士與女衆方執蘭拂除邪惡鄭國之俗三月上巳之辰於此水之上招魂續魄除拂不祥故時人願與所悦者俱住觀之漢書曰武帝即位數年無子平陽公主求良家女十餘人飾置於家帝祓霸上還過平陽公主見所偫美人帝不悦既飲謳者進帝獨悦衛子夫孟康云祓除也今三月上巳祓禊是也又漢書禮儀志曰三月上巳日宮人並禊飲於東流水又太后春幸蠶館率皇后列侯夫人桑遵㶚水而祓除又三月上巳官民皆潔於東流水上洗濯祓除去宿垢爲大潔潔者言陽氣布暢萬物既出始潔之也續漢書曰上巳大㑹賔從於薄落津後漢書梁商上巳日㑹賔客於洛水酒酣繼以薤露坐者聞皆掩泣周舉曰此所謂哀樂失時非其所也殃將及乎商至秋果薨魏志曰袁紹三月上巳大㑹賔從於薄落津聞魏郡兵及黑山賊于毒等數萬人共覆鄴城殺守坐中客家在鄴者皆憂怖失色或起而泣紹容貌自若不改常度又晉中興書曰王導謂從兄敦曰王仁德未著而名位猶輕兄名已振宜有以共相匡舉㑹三月三日中宗出禊乗肩輦敦導並騎從紀瞻使人覘之既聞敦導騎從乃大驚自出拜於道左右中宗從容謂導曰卿吾之蕭何也宋書曰武帝三月三日登八公山劉安故臺望城郭如疋帛之繞藂花也崔鴻十六國春秋曰李暠三月三日讌於曲水命羣僚賦詩暠為之序荆楚歲時記曰三月三日士人並出江渚池沼間為流盃曲水宴續齊諧記曰晉武帝問尚書郎摯虞曰三日曲水其義何指答曰漢章帝時平原徐肇以三月初生三女至三日而俱亡}
