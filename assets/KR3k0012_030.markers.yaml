  - {type: variant, offset: 846, length: 640, content: 囚果應期而至梁書曰天監四十年正月朔旦帝臨軒冠太子於太極殿舊制太子著遠遊冠金蟬翠緌纓至是別加昭明太子冠金愽山冠以太子美姿容善舉止故也唐書曰貞元六年正月戊戍朔先是有司奏元日太陽虧遂罷朝會至時不食百僚稱賀又曰天后朝王方慶議告朔儀曰今每歲首元日通天宮受朝讀時令布政事京官九品以上諸州朝集使等咸列於庭此聽朔之禮畢又曰新羅俗以元日拜日月神易通卦驗曰正月五更人整衣冠於家庭中爆竹帖畫雞子或鏤五色土於戶上厭不祥也尚書大傳曰正月上日受終于文祖在琁璣玉衡以齊七政琁璣者何也傳曰琁者還也機者幾也微也其變微微而所動者大謂之琁璣是故琁璣謂之北極受謂舜也上日元日又曰夏以孟春為正殷以季冬為正周以仲冬為正夏以平旦為朔殷以雞鳴為朔周以夜半為朔不以二三月後為正者萬物不齊莫適所立故必以三微月之三正之相承若連環也又曰周以至動殷以萌夏以牙謂三王之正也至動冬至日物動也物有三變故正色有三天有三生三死異時生者怕異時死是故周以日至為正殷以日至三十日為正夏以日至六十日為正天有三統土有三正統水也統者所以序生也三正者所以統天也是故三統三正也若循連環周則又始窮則反本也夏以孟春為正者貴形也春秋感精符曰人統月建寅物生之端謂之人統夏以為正漢書云於律太蔟為人純也白虎通曰正朔三何夫天有三微之月也三微者何言陽氣始施黃泉而未上也十一月陽氣始養黃泉之下万物皆赫赫然感陽之氣也故周為天正色尚赤十二月之時萬物時牙而白故殷為地正色尚白正月之時萬物始達孚甲而出皆黑人得加力故夏為人正色尚黑也後之人不以二三月為正者以其萬物不齊莫有所立故必以三微月也漢官, SBCK: 劉臻妻陳氏進見}
