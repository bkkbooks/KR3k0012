  - {type: variant, offset: 4145, length: 72, content: 治中少學仙術身能奮飛每夕輒凌虛歸家曉則還州嘗赴元會至曉不及預朝列化為白鵠至閣前廻翔欲下威儀以箒擲之得一隻履躭乃驚還就列內外左右莫不駭異時步隲為廣, WYG: 容}
