  - {type: variant, offset: 3606, length: 0, content: '', WYG: 天地初開以一日作雞七日作人也劉臻妻陳氏進見儀曰正月七日上人勝於人魏東平王是日登夀張安仁山銘曰正月七日厥日惟人䇿我良駟陟彼安仁隋陽休之正月七日登髙侍宴詩曰廣殿麗年輝上林起春色風生拂雕輦雲廻浮綺翼隋薛道衡人日思歸詩曰入春纔七日離家已二年人歸落鴈後思發在花前晉李充正月七日登剡西寺詩曰命駕升西山寓目眺原疇正月十五日史記樂書曰漢家祀太乙以昬時祀到明今人正月望日夜遊觀燈是其遺事荆楚歲時記曰正月十五日作豆糜加油膋其上以祀門戸按齊諧記曰正月十五日有神降陳氏之宅云是蠶室若能見祭當令蠶桑百倍疑非其事祭門備之七祀今州里風}
