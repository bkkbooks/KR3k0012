  - {type: variant, offset: 2926, length: 1, content: 得, SBCK: 覘之旣聞敦導􅀐從乃大驚自出拜於道左中宗從容謂導曰卿吾之蕭何也宋書曰武帝三月三日登八公山劉安故臺望日城郭如疋帛之繞藂花也崔鴻十六國春秋曰李暠三日讌于曲水命羣僚賦詩暠爲之序韓詩曰溱與洧方洹洹􅀆洹洹盛皃也謂三月桃花水下之時至盛也惟士與女方秉蕳􅀆秉執也蕳蘭也當此盛流之時衆士與衆女方執蘭拂除邪􅁖鄭國之俗三月上巳之辰此雨水之上招魂續魄拂除不祥故詩人願與所恱者俱往觀之荆楚歳時記曰三月三日四人並出江渚池沼間爲流杯曲水宴續齊諧記曰晉武帝問尚書郎摯虞曰三日曲水其義何指荅曰漢章帝時平原徐肇}
  - {type: variant, offset: 2926, length: 1, content: 得, krp: 覘之旣聞敦導騎從乃大驚自出拜於道左中宗從容謂導曰卿吾之蕭何也宋書曰武帝三月三日登八公山劉安故臺望日城郭如疋帛之繞藂花也崔鴻十六國春秋曰李暠三日讌于曲水命羣僚賦詩暠爲之序韓詩曰溱與洧方洹洹兮洹洹盛皃也謂三月桃花水下之時至盛也惟士與女方秉蕳兮秉執也蕳蘭也當此盛流之時衆士與衆女方執蘭拂除邪悪鄭國之俗三月上巳之辰此雨水之上招魂續魄拂除不祥故詩人願與所恱者俱往觀之荆楚歳時記曰三月三日四人並出江渚池沼間爲流杯曲水宴續齊諧記曰晉武帝問尚書郎摯虞曰三日曲水其義何指荅曰漢章帝時平原徐肇}
