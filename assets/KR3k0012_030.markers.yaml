  - {type: variant, offset: 4233, length: 4, content: 子年拾遺, WYG: 為羣姓立社曰太社王自立社曰皇社諸侯為百姓立社曰國社自立社曰侯社大夫以下立社曰置社尚書曰用命賞于祖不用命戮于社社主隂隂主殺也論語曰魯哀公問社於宰我宰我對曰夏后氏以松殷人以栢周人以栗曰使民戰栗史}
