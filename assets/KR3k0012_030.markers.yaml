  - {type: variant, offset: 4119, length: 168, content: 治腰痛意者亦為如願故事耳鄧德明南康記曰昔有盧躭仕州為治中少學仙術身能奮飛每夕輒凌虛歸家曉則還州嘗赴元會至曉不及預朝列化為白鵠至閣前廻翔欲下威儀以箒擲之得一隻履躭乃驚還就列內外左右莫不駭異時步隲為廣州刺史意甚惡之便以狀聞遂至誅滅王子年拾遺記曰堯在位七年有鸞鳳而來集麒麟遊於藪澤鴟梟逃於絕漠有祇友之國獻重明之鳥一名重精雙晴在目狀如雞鳴似鳳時, SBCK: 爲}
  - {type: variant, offset: 4119, length: 4, content: 治腰痛意, WYG: 正月望日賣於都市我當在即以是日訪之及陳亡其妻果如楊素之家德言遂以正月望日訪於都市有蒼頭賣半鏡}
