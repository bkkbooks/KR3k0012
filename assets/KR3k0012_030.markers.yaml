  - {type: variant, offset: 2896, length: 1, content: 元, SBCK: 月之􅀄然即禁火盖周之舊制玉燭寳典曰寒食此節城市尤多􅋐雞􅆑之戯左傳有季郈􅋐雞其來逺矣同書時訓曰清明}
  - {type: page-break, offset: 2896, content: '', id: KR3k0012_SBCK_030-7a}
  - {type: variant, offset: 2896, length: 1, content: 元, krp: 月之𥘉然即禁火盖周之舊制玉燭寳典曰寒食此節城市尤多鬪雞卵之戯左傳有季郈鬪雞其來逺矣同書時訓曰清明}
  - {type: variant, offset: 2899, length: 0, content: '', SBCK: 桐不華歳有大寒曰䑕不化國多貪殘虹不見婦人亂色戴勝不降桑政教不平唐李崇嗣寒食詩曰普天皆滅熖匝地盡藏煙不知何處火來就客心燃又宋之問途中寒食詩曰馬上逢寒食途中属暮春可憐江浦望不見洛橋人又沈佺期嶺表逢寒食詩曰嶺外逢寒食春來不見􅄳洛陽新甲子何日是清明三月三日漢書曰武帝即位數年無子平陽公主求良家女十餘人飾置於家帝祓灞上而過焉還平陽主主見所待美人帝不恱旣飲謳者進帝獨恱衛子夫􅀿劭云祓除}
  - {type: variant, offset: 2899, length: 465, content: 也元始也雞鳴而起案周書緯通卦云雞陽鳥也以為人候四時使人得以翹首結帶正衣常也注云案禮內則云子事父母婦事舅姑雞初鳴咸盥漱櫛纚笄則惟其常非獨此日但元正之朝存亡慶吊官有朝賀私有祭享虔恭宜早復位於餘辰所以標而異焉先於庭前爆竹帖畫雞或斫鏤五綵及土雞於戶上莊周云有掛雞於戶懸葦炭於其上樹桃其旁而鬼畏之括地圖曰桃都山有大桃樹盤屈三千里上有金雞日照此則鳴下有二神一名郁一名壘並執葦索以伺不祥之鬼得則殺之又曰崔氏月令云過獵一日是謂小歲拜賀君親進椒酒從小起按成子安椒花銘曰肇惟歲首月正元日厥味惟新蠲除百疾是知小歲用之周處風土記曰元日造五辛盤正元日五熏鍊形注曰五辛所以發五藏氣莊子曰春月飲酒茹蔥以通五藏又曰乃有雞子五熏練形正旦皆當生吞雞子一枚謂之練形又晨食五辛菜以助發五藏氣又玄中記曰今人正朝作兩桃人立門旁以雄雞毛置索中蓋遺勇也應劭風俗通曰有桃人葦炭畫虎郁壘以此鬼食虎今或畫虎於門此並其事猛獸之聲有如爆竹神異經云西方深山中有人焉其長尺餘性不畏人犯之令人寒熱名曰山臊以竹著火掛熚音必扑也而山臊驚憚玄黃經云謂此鬼是也俗人以爆竹起於庭燎不應濫於王者魏時人問議郎, WYG: ''}
  - {type: variant, offset: 2899, length: 0, content: '', krp: 桐不華歳有大寒曰䑕不化國多貪殘虹不見婦人亂色戴勝不降桑政教不平唐李崇嗣寒食詩曰普天皆滅熖匝地盡藏煙不知何處火來就客心燃又宋之問途中寒食詩曰馬上逢寒食途中属暮春可憐江浦望不見洛橋人又沈佺期嶺表逢寒食詩曰嶺外逢寒食春來不見餳洛陽新甲子何日是清明三月三日漢書曰武帝即位數年無子平陽公主求良家女十餘人飾置於家帝祓灞上而過焉還平陽主主見所待美人帝不恱旣飲謳者進帝獨恱衛子夫應劭云祓除}
