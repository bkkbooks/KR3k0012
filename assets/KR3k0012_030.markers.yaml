  - {type: variant, offset: 2851, length: 3, content: 卻癘疫, SBCK: 管落蓂飄下蔕遲遲春色華晼晼年光麗北齊魏收晦日泛舟應詔詩曰裊裊春枝弱􅀜􅀜新鳥呼棹唱忽逶迤菱歌詩顧慕睿賞方月色宴言忘日暮猶豫慰人心照臨康國歩唐太宗月晦詩晦魄移中律凝暄起麗城􅇁雲朝盖上穿露暁珠呈􅀏樹花分色啼枝鳥合聲披􅁭勤眺望極目暢春情中和節唐書云貞元五年正月十一日詔曰四序嘉辰歴代増置漢宗上巳晉紀重陽或􅀃穰除雖因舊俗與衆宴樂誠洽當時朕以春方發生􅀱維仲月勾萌畢逹天地同和俾其昭􅂫冝均暢茂自今已後以二月一日爲中和節内外官司並休假一日先勑百寮以三令節集㑹今冝以中和節代晦日中和之節自兹始}
