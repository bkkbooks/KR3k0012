  - {type: variant, offset: 4239, length: 1, content: 堯, WYG: 共工氏之子為后土能平水土故祀以為社故天子曰大社必受霜露風雨以逹天地之氣也社所以親地也地載萬物天垂萬象取法於天所以尊天而親地也社共粢盛所以報本反始也漢書曰陳平為里中社宰分肉甚均父老善之平曰使平得宰天下亦如此肉矣又髙祖定天下詔御史令治獄社春用羊彘祀之魏志曰王修年七歲喪母母以社日亡來年隣里社修感母悲哀其隣里聞之為罷社晉書曰阮脩字宣子伐社樹或止之脩曰若社而為樹伐樹則社亡若樹而為社伐樹則社移矣荆楚歲時記曰社日四隣並結綜㑹社牲醪為屋於樹下先祭神然後饗其胙王氏云百家共一社今百家所社綜即共立之社也寒食荆楚歲時記曰去冬節一百五日即有疾風甚雨謂之寒食據厯合}
