  - {type: variant, offset: 2903, length: 2, content: 雞鳴, SBCK: 續漢志曰上已大㑹賔從於薄落津後漢書曰梁啇上已日㑹賔客於洛水酒酣継以薤露坐者聞之皆爲掩泣曰此所謂哀樂失時非其所也殃將及乎啇至秋果薨魏志曰􅀽紹三月上已大㑹賔從於簿落津聞魏郡兵及黒山賊于毒等數萬人共覆鄴城殺守坐中客家在鄴者皆憂怖失色或起}
