  - {type: variant, offset: 1647, length: 4, content: 朝造巨獸, SBCK: 半有神降陳氏之宅云是蠶室􅀂能見祭當令蠶桑百倍疑非其事􅀕門備之七祠今州里風俗望日祠門其法先以楊枝挿門而􅀕之齊諧記曰吴縣張成見一婦人立宅東南角謂成曰此地是君􅁞室我即地神矣正月半日可作白粥泛膏於上以祭之當令君家蚕桑百倍言訖而去絶失所在或爲作膏粥巳後年年大得蚕世人正月半作粥禱之加以􅁏覆其上登屋食之呪云登膏糜挾䑕腦欲來不來待我三蚕老則以爲蚕襄鼠與齊諧記相符又覆􅁏亦是覆膋之理石虎鄴中記正月十五日有登髙之㑹則登髙又非今世而然者也其夕則迎紫姑以卜劉敬叔異苑云紫姑夲人家妾爲大婦所妬正月十五日感激而死故世人作其形迎之云子壻不在云是其壻曹夫人巳行云是其姑紫姑可出異苑又云於厠間或猪欄邊迎之捉之覺重是神來也平昌孟氏甞以此日迎之遂穿室而自尓正著以敗衣盖爲此也洞覽云帝嚳女將死云生平好樂至正月可以見迎又其事也俗云溷厠之間必湏浄然後能致紫姑異苑曰世人以十五日迎紫姑捉者覺重便是神來奠設酒果亦􅁴皃輝輝有色即跳躁不住能占衆事卜將來蚕桑又善射鈎好即大舞惡則仰眠平昌孟氏􅁪不信躬試往捉便自躍穿頂求失所在也唐兩京新記云正月十五日夜勑金吾㢮禁前後各一日以看燈光􅀂晝日世􅀃正月十五日祢衡甞􅀍魏武謫爲鼓吏於此日試鼓漁陽桴作}
