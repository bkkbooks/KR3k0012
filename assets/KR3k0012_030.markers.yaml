  - {type: variant, offset: 4657, length: 243, content: 謂仁於用心謂非正旦則禁殺崔寔四人月令曰元日進椒柏酒椒是玉衡星精服之令人身輕能音柰老柏是仙藥又云進酒次第當從小起以年少者為先又曰正月之朔是謂正月躬率妻孥絜祀祖禰及祀日進酒降神畢乃室家尊卑無大無小以次列于先祖之前子婦曾孫各上椒酒於家長稱觴舉壽欣欣如也玉燭寶典曰正月為端春秋傳曰履端於始也其一日為元日元者善之長也先王體元以居正又元者元也始也一也首也亦云上日亦云正朝亦云三元歲之元時之元日之元亦云三朔尚書大傳曰夏以平明為朔殷以雞鳴為朔周以夜半為朔又曰元日造桃板著戶謂之仙木像鬱壘山桃樹百鬼畏之王, SBCK: 聽晉}
