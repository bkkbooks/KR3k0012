  - {type: variant, offset: 3229, length: 308, content: 今人正朝作兩桃人立門旁以雄雞毛置索中蓋遺勇也應劭風俗通曰有桃人葦炭畫虎郁壘以此鬼食虎今或畫虎於門此並其事猛獸之聲有如爆竹神異經云西方深山中有人焉其長尺餘性不畏人犯之令人寒熱名曰山臊以竹著火掛熚音必扑也而山臊驚憚玄黃經云謂此鬼是也俗人以爆竹起於庭燎不應濫於王者魏時人問議郎董勛云今正臈月門前作煙火桃人絞索松柏殺雞著門戶逐疫禮也荅云禮十二月索室逐疫衅門戶磔雞漢火行故作火助行氣桃鬼所惡畫作人首可以有所收縛不死之祥勛又云正月一日為雞二日為狗三日為羊四日為豬五日為牛六日為馬七日為人正旦畫雞於門七日帖人於帳當為此日今一日不殺雞二日不殺狗三日不殺羊四日不殺豬五日不殺牛六日不殺馬七日不行刑亦此義但古乃畫雞令畏鬼今則不殺未知孰是, SBCK: 城}
