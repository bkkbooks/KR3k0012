  - {type: variant, offset: 2900, length: 1, content: 元, SBCK: 今月上巳祓禊是也又漢書禮儀志曰三月上巳日官人並禊飲於東流水又曰太后春幸蚕舘率皇后列侯夫人桒遵灞水而祓除又曰三月上巳官民皆㓗於東流水上自洗濯祓除去􅀫垢爲大㓗㓗者言陽氣布暢萬物記出}
