  - {type: variant, offset: 567, length: 4, content: 蘞初生合, SBCK: 安乾粔籹之倫盧諶􅀕法曰四時祠皆用安乾特􅄳禮記内則曰􅀥栗飴􅁡以甘之方言曰􅄳謂之張皇即乾飴也飴謂之䬵音該􅄳謂之餹江東皆言餹也凢飴謂之􅄳自􅀜而東陳魏宋楚衛之間通語􅀃文曰飴}
  - {type: page-break, offset: 567, content: '', id: KR3k0012_SBCK_852-1b}
  - {type: variant, offset: 567, length: 2, content: 蘞初, WYG: 乾安粔籹之倫盧諶祭法曰四時祠皆用乾安特餳禮記内則曰棗栗飴蜜以餌之方言曰餳謂之餦餭飴謂之䬵餳謂之餹凡飴謂之餳自闗而東陳宋楚衛之間通語説文曰飴米糵煎也餳飴和饊也釋名曰餳洋也煮米消爛洋洋然也飴小弱於餳形怡怡然也哺餔也如餳而濁可餔也後漢書曰明徳馬皇后報章帝曰吾但當含飴弄孫不能復關政矣東觀漢記曰野王獻甘膠膏餳每作大發吏以為􅀈利弊閎知之臨夢奏焉四王起事曰恵帝到華隂河間王遣使上甘菓甘餔每二百幅幽明録曰王𦙍祖安國張顯等以太元中乗船見仙人賜糖飴餅大如比輪錢厚二分淮南子曰栁下恵見飴曰可以養}
