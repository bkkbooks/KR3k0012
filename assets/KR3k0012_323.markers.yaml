  - {type: variant, offset: 1536, length: 4, content: 鍾會為鎮, SBCK: 太祖在長安使曹仁討􅀜羽於樊又遣于禁助仁秋大霖􅀨漢水溢平地水數丈禁等七軍皆没禁與諸將登髙望水無所廽避羽乗大舟就攻禁遂降㑹孫權擒羽獲其衆禁復在呉文帝踐祚權稱藩遣之帝引見禁􅂡髮皓白形容憔悴泣涕頓首帝慰喻以荀林父孟明視之事魏書詔曰昔荀林父敗績於邲孟明喪師於郩晉秦不替使復其位後晉獲狄士􅁗覇}
