  - {type: variant, offset: 3095, length: 4, content: 攻翟勝左, SBCK: 賊馬上刺取擲著汾陽中諸内叅曰彼亦天子我亦天子彼能懸軍逺來我何爲守壍示弱齊主曰此言是也使讓郍肱曰尓富貴足惜性命􅁘乃填壍南引帝大喜齊主親戰東偏頗有退者淑妃怖曰軍敗矣穆提婆進曰大家去大家去齊主以淑妃奔髙梁􅀜奚長樂諌曰半進半退戰家常體今兵衆全整未有傷敗陛下捨比安之御馬一動}
