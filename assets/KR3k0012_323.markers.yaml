  - {type: variant, offset: 2645, length: 393, content: 以強為弱故老子曰道冲而用之有弗盈也鄧析子曰百戰百勝黃帝之師也韓詩外傳曰孔子歎平仲云身不出罇俎之門而折衝千里之外注云衝衝車也謂敵人設此以臨城大臣謀於廟堂遙以折之古司馬兵法曰大捷不賞上下皆不伐善捷勝也一軍皆勝上下俱不取功也上茍不伐善則不驕矣下荀不伐善則不差矣上下不伐善此讓之至也大敗不誅上下皆以不善在己也敗者負也一軍奔北人皆有罪故不誅上下俱過上茍以不善在己必悔其上過上下分惡若此讓之至也又曰凡戰以力久以氣勝有力者任重則可久可久即可怠以固久以危勝營壘次舍器械具備行陣堅守可以久也乘危乃以死易生戰攻之心定矣本心固新氣勝無畏疑心本堅固養而不勞故能制勝以甲固以兵勝甲以杵矣兵以斬獲敵甲堅則固兵利則勝也凡車以密固徒以坐勝車卒眾則密陣步卒眾則坐陣兼以重固以輕勝車步兼也以重卒持堅以輕卒攻取故勝也呂氏春秋曰凡兵也者貴其因也因也者因敵之險以為己固因敵之謀以為己事能審因而加勝則不可窮矣勝不可窮之謂神神則能而, WYG: ''}
