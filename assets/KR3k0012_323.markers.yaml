  - {type: punctuation, offset: 2581, content: 「, id: KR3k0012_CHANT_323-bkkpn678}
  - {type: variant, offset: 2584, length: 252, content: 苗禹伐共工湯伐有夏文王伐崇武王伐紂遠方慕義兵不血刃墨子曰墨子為守使公輸般服而不肯以兵知墨子雖善為兵而不肯以知兵聞也善持勝者以強為弱故老子曰道冲而用之有弗盈也鄧析子曰百戰百勝黃帝之師也韓詩外傳曰孔子歎平仲云身不出罇俎之門而折衝千里之外注云衝衝車也謂敵人設此以臨城大臣謀於廟堂遙以折之古司馬兵法曰大捷不賞上下皆不伐善捷勝也一軍皆勝上下俱不取功也上茍不伐善則不驕矣下荀不伐善則不差矣上下不伐善此讓之至也大敗不誅上下皆以不善在己也敗者負也一軍奔北人皆有罪故不誅上下俱過上茍以不善在己必悔其上過上下分惡若此讓之至也, SBCK: 二三}
