  - {type: variant, offset: 1621, length: 7, content: 魏國初建荀攸為, krp: 符堅率衆百萬屯壽陽列陣淝水謝玄謂符融曰臨水爲陣是不欲速戰請君稍却堅遂麾使陣退衆因亂不能止玄以精銳决戰堅衆奔潰聞風聲鶴唳皆以爲王師至草行露宿飢凍以死獲堅乗輿雲母車軍資山積又曰符堅望八公山上草木皆類人形又見王師部陣謂融曰此亦勍敵也憮然有懼色及敗軍騎遁于淮北飢甚人有進壷飱者曰臣聞白龍厭天地之樂而見困豫且今蒙塵之難豈自天乎晉中興書曰謝琰爲㑹稽内史督五郡事隆安四年孫恩攻上虞進及刑浦上黨太守張䖍碩戰敗于刑浦人情震懼群賊銳進咸以冝持重嚴備且列水軍於南湖又應分軍設伏以待之琰不聽外白賊至時}
