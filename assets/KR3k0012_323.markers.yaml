  - {type: variant, offset: 3560, length: 0, content: '', SBCK: 於邲晉師敗績荀林父將歸請死景公將許之士貞伯曰不可城濮之役晉勝于荆夫文公猶有憂色曰子玉猶存憂未歇也困獸猶􅋐况國相乎及荆殺子玉乃憙今天或者大警晉也林父之事君進思盡忠退思􅀘過社稷之衛也今殺之是重荆勝也景公曰善乃使復將潘安仁汧馬督誄序曰昔乗兵之戰縣賁父御魯莊公馬驚敗績賁父曰他日未甞敗績今而敗績是}
