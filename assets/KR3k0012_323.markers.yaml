  - {type: variant, offset: 1524, length: 7, content: 朕謀謨帷幄決勝, SBCK: 二十四􅀐還詣冝陽謝上大司徒梁侯印綬有詔歸侯印綬數月拜右將軍又曰鄧弘與赤眉大戰移日赤眉佯敗棄輜重走車皆載土以豆覆其上兵士飢争取之赤眉引兵還擊弘􅀪軍潰亂馮異與禹合兵救之赤眉小却異以士卒飢倦可且休禹不聽復戰大爲所敗又曰龐萌反攻殺楚郡太守引軍襲敗盖延延走北渡泗水破舟擑壞津梁僅而得免又曰公孫瓉爲􅀽紹所圍遣子續求救于黒山賊張燕燕率兵十萬三道來救瓉未及至瓉乃宻使行人齎書告續曰昔周末䘮亂僵屍蔽地以意而推猶爲否也不圗今日親當其鋒􅀽氏之攻􅃺􅀂􅀑神梯衡舞於樓上鼔角鳴於地中日窮月急不遑啓處汝當碎首於張燕馳以告急父子天性不言而動言相感也且厲五}
  - {type: page-break, offset: 1524, content: '', id: KR3k0012_SBCK_323-3a}
