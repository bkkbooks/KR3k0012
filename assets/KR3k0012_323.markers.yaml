  - {type: variant, offset: 481, length: 806, content: 不量重復而應形無窮動而應也又曰知勝有五知可戰與不可以戰者勝能料知敵情審其虛實者勝知眾寡之用者勝言兵之形有眾而不可擊寡或可以弱制強而能變之者勝也春秋傳曰師克在和不在眾上下同者勝言君臣和同勇而欲戰者勝也故孟子曰天時不如地利地利不如人和以虞待不虞者勝虞度也以我有法度之師擊彼無法度之兵故春秋傳曰不備不虞不可以出師將能而君不御者勝司馬法曰進退唯時無曰寡人將既精能曉練兵勢君能專任事不從中御也此五者知勝之道故曰知己知彼百戰不殆審知彼強弱之勢雖不至百戰實無危殆也不知彼知己一勝一負雖不知敵之形勢恃己能剋之者勝負各半也不知彼不知己每戰必殆外不料敵內不知己用戰必危也知地知天勝乃可全知地形之便知天時孤虛向皆晦暝風雲之譎詭也左傳曰楚屈瑕將盟貳軫貳軫二國名也鄖人軍於蒲騷楚莫敖曰莫敖官名盍請濟師盍何也何不濟益師對曰師克在和不在眾也啇周之不敵君之所聞也武王有亂臣十人紂有億兆之眾莫敖曰卜之對曰卜以決疑不疑何卜遂敗鄖師于蒲騷又曰秦伯以璧祈戰于河注禱河求勝也戰國策曰魏武侯問吳起曰兵以何勝曰以理為勝曰不在眾乎起曰法令不明賞罰不信聞鼓不進聞金不止雖有百萬之師何益於用所為理者居則有禮動則有威進不可當退不可追前却如節左右應麾雖絕成陣雖散成行投之無所往天下莫敢當又曰韓魏之君不朝于齊鄒忌為齊相田忌為將使田忌伐魏三戰三勝又曰或說齊閔王曰臣之所聞戰攻之道於師者雖有百萬之軍比之堂上雖孫吳之將擒之戶內千丈之城拔之罇俎之間百尺之衝折之袵席之上史記曰張儀東說齊閔王曰臣聞之齊與魯三戰而魯三勝國以危亡隨其後雖有勝之名而有危之實是何也齊大而魯小也又曰魏以太子申為上將軍伐齊過外黃徐子謂太子曰自將攻齊太子曰勝則富不過有魏貴不益為王若戰不勝齊則萬世無魏矣此臣之百戰百勝也漢書曰廣武君謂韓信曰成安君有百戰百勝之計一日而失之軍敗鄗下身死汦水上又曰高祖置酒雒陽南宮上曰吾所以有天下者何項氏之所以失天下者何王陵對曰陛下嫚而侮人項羽仁而敬人然陛下使人攻城略地所降下者因以與, SBCK: ''}
