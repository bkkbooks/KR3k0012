  - {type: variant, offset: 2152, length: 2, content: 僣稱, WYG: 時周文見齊神武出旗鼔識之乃募取勇士三千令賀㧞勝摠之犯其軍適與齊神武相遇時募士皆用短兵接戰勝逐齊神武數里刃垂及之㑹勝馬為流矢所中死比副騎至齊神武已免去隋書曰煬帝使宇文述將兵東濟薩水去平壤城三十里因山為營文德復遣使偽降請述曰若旋師者當奉髙元朝行在所述見士卒疲弊不可復戰又平壤險固卒難致力遂因其詐而還衆半濟賊擊後軍於是}
