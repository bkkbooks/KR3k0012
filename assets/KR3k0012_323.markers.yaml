  - {type: variant, offset: 3123, length: 1, content: 襄, SBCK: 長筭逺略老夫事也摩訶失色而退一旬之間我兵益至摩訶又請明徹曰今求不得進退無路􅀂潜軍突圍未足爲耻願公率歩乗車輿徐行摩訶領鐵􅀐數千􅀐前後必當使公安逹京邑明徹曰弟之此計乃良圖也然老夫受脤專征不能戰勝攻取今􅀍圍逼慙寡無地且歩軍旣多吾爲惣督必湏身居其後相率兼行遂欲破堰大軍以舫載馬北譙州刺史裴}
