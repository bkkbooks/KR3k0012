  - {type: variant, offset: 157, length: 323, content: 天下曰軍善非善之善也交爭勝也太公曰爭勝白刃之中非良將也故舉秋毫不為多力見日月不為明目聞雷霆不為聰耳見易聞也古人所謂善戰者勝勝易勝者也原微易勝攻其可勝不攻其不可勝也故善戰者之所勝也無勇攻敵兵形未成服之無赫赫之功也又曰善戰者立於不敢敗之地而不失敵之敗勝者也故勝兵先勝而後求戰敗兵先戰而後求勝善用兵者脩道而保法故能為勝攻之政善用兵者先自脩理不可勝之道保法度不失敵之亂敗也又曰勝可知而不可為也敵雖眾可使無鬥故策之而知得失之計候之而知動靜之理形之而知死生之地角之而知有餘不足之處角量之也故兵形之極至於無形無形則深淵不能闚也而智者不能謀也因形而作勝於眾眾不能知也因地形而立勝人皆知我所以勝之形而莫知吾所以制勝之形也人皆知吾所以勝莫知吾因敵形制此勝也故兵戰勝不, SBCK: ''}
