  - {type: variant, offset: 1543, length: 3, content: 假節都, SBCK: 晉書曰陸機河橋之戰始臨戎而牙旗折意甚惡之列軍自朝歌至于河橋鼓聲聞數百里􅗛魏以來出師之盛未甞有也長沙王乂奉天子與機戰於鹿苑軍大敗赴七里澗而死者如積焉又曰張駿爲凉州牧西域長史李栢請討叛將趙真爲真所敗議者以栢造謀致敗請誅之駿曰吾每念漢丗宗之殺王恢不如􅁗穆之赦孟明竟以减死論群心咸恱又曰孫恩爲劉􅁉所擊窮蹙乃赴海自沉妖黨及妓妾謂之水仙投水從死者百數餘衆以恩妹夫盧循爲主又曰盧循旣敗走召妓妾問曰我今將自殺誰能同者多云雀䑕貪生就死實難有云官尚當死某豈願生於是悉配諸辭死者因投于水同黨盡誅又曰符堅敗走劉牢之進屯鄄城討諸未服河南諸城堡承風歸順者甚衆符堅子丕據鄴爲慕容垂所逼請降牢之引兵救之垂聞軍至出新興城北走牢之與沛郡太守田次追之行二里至五橋澤中急取輜重軍稍亂爲垂所擊牢之敗績士卒殱焉牢之䇿馬跳五丈澗得脫㑹丕救至因入臨濟集亡散兵復少振牢之以軍敗徴而還又曰符堅敗壽春單􅀐遁還於淮北飢甚人有進壷食豚髀者堅食之大恱曰昔公孫豆粥何以加也命賜帛十疋又曰母丘儉文欽反司馬景王遣鄧艾}
