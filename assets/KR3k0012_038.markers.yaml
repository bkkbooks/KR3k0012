  - {type: variant, offset: 4325, length: 0, content: '', krp: 黃帝取密山之玉筞投之鍾山之陰以爲玉鍾又曰鍾山其子曰鼓此亦神名名之爲鍾山之子耳其類皆見歸藏啓筮也其狀人面而龍身帝乃戮之鍾山之東也又曰鍾山之神名曰燭陰燭龍也是燭九陰也視爲晝瞑爲夜吹爲冬呼爲夏魯女生列傳曰鍾山之棗其大如缾十洲記曰北海外有鍾山自生千芝及神草此洲受太玄生符録仙家數十萬耕田種芝草課計頃畝種稻玄中記曰北方有鍾山焉山上有石首如人首左目爲日右目爲月開左目爲晝開右目爲夜開口爲春夏閉口爲秋冬淮南子曰鍾山之玉灼之以鑪炭三日三夜其色不變論衡曰鍾山之上以玉抵鵲彭蠡之濵以魚食犬玉山穆天子傳曰天子西征來還乃循}
