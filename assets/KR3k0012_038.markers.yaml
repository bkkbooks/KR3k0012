  - {type: variant, offset: 3236, length: 4, content: 說苑並載, SBCK: 曰夫山萬人之所觀仰材用生焉寳藏植焉飛禽萃焉走獸伏焉育物群而不倦有似夫仁人志士是仁者所以樂山}
  - {type: variant, offset: 3236, length: 0, content: '', krp: 曰夫山萬人之所觀仰材用生焉寳藏植焉飛禽萃焉走獸伏焉育物群而不倦有似夫仁人志士是仁者所以樂山也尚書大傳曰孔子曰夫山者嵬嵬然草木生焉鳥獸蕃焉財用殖焉四方皆無私與焉出雲雨以通乎天地之間隂陽和合雨露之澤萬物以成百姓以饗此仁者之樂于山也國語曰禹封九山山者土之聚也河圖曰嶓冢山上爲狼星武開山爲地門上爲天髙星主囹圄荆山爲地雌上爲軒轅星大別爲地理以天合地以通三危山在鳥獸之西南上爲天范星歧山在崑崙東南爲地乳上爲天麋星汶山之地爲井絡帝以㑹昌神以建福上爲天井桐栢山爲地穴鳥䑕同穴山之幹也上爲掩畢星熊耳山地門也精上爲畢附耳星莊子曰凾車之獸分而離山不免網罟之患又曰山積卑而成髙管子曰凢天下名山五千三百七十出鐡之山三千六百有九上有丹砂者下有黄金上有磁石者下有銅金上有緑石者下有鈆錫上有赭下有鐡淮南子曰牛蹄之涔無徑尺之鯉魅父之山無文林營宇狹小而不能容巨大也孫卿子曰不登髙山不知天之髙不臨深谿不知地之厚不聞先王之道不知學問之爲大吕氏春秋曰何謂九山㑹稽泰山㑹稽今㑹稽也泰山今泰山郡是爲東岳也王屋首山泰華𡵨山太行羊腸孟門𡵨山在右扶風美陽縣西北周家所邑也太行在河内野王縣北羊賜其山盤紆如羊腸狀在太行晉陽北孟門太行是}
  - {type: punctuation, offset: 3238, content: 》, id: KR3k0012_CHANT_038-bkkpn1001}
  - {type: variant, offset: 3238, length: 2, content: 並載, krp: 曰土積成山則豫章生焉又曰五嶽者何謂}
  - {type: punctuation, offset: 3241, content: 。, id: KR3k0012_CHANT_038-bkkpn1002}
  - {type: xml-element, offset: 3241, content: '', id: KR3k0012_CHANT_038-bkkxmlele124}
  - {type: xml-element, offset: 3241, content: '', id: KR3k0012_CHANT_038-bkkxmlele125}
  - {type: 'tls:seg', offset: 3241, content: '', id: KR3k0012_CHANT_038-37a.1}
  - {type: 'tls:seg', offset: 3241, content: '', id: KR3k0012_CHANT_038-37a.2}
  - {type: punctuation, offset: 3241, content: 《, id: KR3k0012_CHANT_038-bkkpn1003}
  - {type: variant, offset: 3241, length: 1, content: 申, SBCK: 尚書大傳曰孔}
  - {type: variant, offset: 3241, length: 1, content: 申, krp: 泰山東嶽也霍山南嶽也華山西嶽也恒山北嶽也嵩髙山中嶽也五嶽何以視三公能大布雲雨焉能大歛雲雨焉觸石而出膚寸而合不崇朝而雨天下施得愽大故視三公也白虎通曰東岱山岱者言萬物相代於東方南衡山者上承景宿銓徳均物故曰衡也西華山華者獲也萬物熟成乃有獲也北恒山恒常也言萬物伏藏於北方有常度也中嵩山嵩者髙也言峻大矣處中以領四方地鏡曰入名山必齋五十日牽白犬抱白雞以白塩一升山神大喜芝草異藥寳玉爲出未到山百歩呼曰林兵此山王主者名知之却百邪關令尹喜内傳曰五百歲天下名山一開開時金玉之精涌出晏子春秋曰齊大旱景公召群臣問曰天下不雨矣民且有飢色吾卜旅在髙山廣澤寡人欲祠靈山可乎晏}
  - {type: punctuation, offset: 3243, content: 》, id: KR3k0012_CHANT_038-bkkpn1004}
  - {type: punctuation, offset: 3244, content: ：, id: KR3k0012_CHANT_038-bkkpn1005}
  - {type: 'tls:seg', offset: 3244, content: '', id: KR3k0012_CHANT_038-37a.3}
  - {type: punctuation, offset: 3244, content: 「, id: KR3k0012_CHANT_038-bkkpn1006}
  - {type: variant, offset: 3244, length: 0, content: '', SBCK: 夫山者嵬嵬然草木生焉鳥獸蕃焉財用殖焉}
  - {type: variant, offset: 3244, length: 0, content: '', krp: 夫靈山以石爲身以草木爲毛髮天不雨髪毛將焦身將熱獨不欲雨乎祠之何益山海經曰周穆王周歴}
  - {type: variant, offset: 3245, length: 5, content: 海之內六合, SBCK: 方皆無私與焉出雲雨以通乎天地}
  - {type: variant, offset: 3245, length: 0, content: '', krp: 荒名山大川靡不登躋東昇天夫之堂西宴王母之廬列子傳曰共工與顓頊争天下怒而觸不周山魏志曰明帝起景陽山於芳林園晉書顧凱之好遊㑹稽人問山川之美對曰千巖競秀萬壑争流宋書曰謝靈運好登山常着木屐上山則去前齒下山則去後齒漢書曰李廣利刺山而泉涌楚詞曰山中兮不可以乆留古詩曰上山採蘼蕪下山逢故夫崑崙山爾雅曰西北之美者有崑崙之璆琳琅玕焉史記曰禹本紀言河出崑崙其上有澧泉華池漢書曰張安丗房中歌詩云天馬來兮開逺門竦余身兮遊崑崙愽物志曰崑崙從廣萬一千里神物集也出五色雲氣五色流水其白水東南流入中國名爲河也河圖括地象曰崑崙之山爲地首上爲握契滿爲四瀆横爲地軸上爲天鎭立爲八柱河圖始闔圖曰崑崙之墟有五城十二樓河水出四維多玉龍魚河圖曰崑崙山天中柱也紀年曰周穆王十七年西征至崑崙丘見西王母穆天子傳曰天子昇於崑崙之丘以觀黄帝之宫増封於崑崙山上又曰天子遂宿于崑崙之阿赤水之陽山}
  - {type: variant, offset: 3246, length: 0, content: '', krp: 經曰周穆王至崑崙}
  - {type: variant, offset: 3247, length: 3, content: 內六合, krp: 丘遊軒轅}
  - {type: punctuation, offset: 3248, content: 、, id: KR3k0012_CHANT_038-bkkpn1007}
  - {type: variant, offset: 3251, length: 1, content: 間, krp: 宫晀鍾山之嶺勒石西王母之山紀迹玄圃之上又}
  - {type: variant, offset: 3252, length: 0, content: '', SBCK: 隂陽和合雨露之澤萬物以成百姓以饗此仁者之樂于山也國語}
  - {type: variant, offset: 3253, length: 2, content: 奚貴, SBCK: 禹封九山山者土之聚也河圖}
