  - {type: variant, offset: 4358, length: 0, content: '', SBCK: 眞君宫􅀇中記曰東南之大者有巨鼇焉以背􅀒蓬萊山列子曰渤海之東有大海其中有山一曰岱輿二曰貟嶠三曰方壺四曰瀛州五曰蓬萊其上臺觀皆金玉禽獸皆純縞珠玕之樹皆聚生實皆有滋味食之不老不死人皆仙聖一日一夕飛翔來徃山海經曰蓬萊山海中之神山非有道者不至列仙傳曰安期生琅琊阜郷人時人皆言千歲秦始皇與語賜金壁數千萬岀阜郷亭皆置去留以赤玉舄一量爲報曰後千歲求我蓬萊山}
