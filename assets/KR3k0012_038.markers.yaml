  - {type: variant, offset: 2836, length: 11, content: 林父資喪葬舊塋負土作墳, WYG: 房中歌詩云天馬來兮開逺門竦余身兮遊崑崙博物志曰崑喬從廣一千里神山也出五色雲氣五色流水其白泉水東南流入中國名為河也河圖括地象曰崑崙之山為地首上為握契滿為四瀆横為地軸上為天鎮立為八柱河圖括地象曰崑崙之墟有五城十二樓河水出焉四維多玉龍魚河圗曰崑崙山天中柱也紀年曰周穆王十七年西征至崑崙丘見西王母穆天子傳曰天子昇於崑崙之丘以觀黄帝之宫増封於崑崙山上又曰天子遂宿於崑崙之阿赤水之陽山海經曰周穆王至崑崙之丘逰軒轅之宫眺鍾山之嶺勒石西王母之山紀迹𤣥圃之上又曰槐江之山實惟帝之平圃南望崑崙其光熊熊有木焉其狀如棠而黄華赤實其味如李而無核名曰沙棠食之令人}
