  - {type: variant, offset: 2848, length: 3, content: 役僮僕, WYG: 溺草木之美者沙棠也又曰崑崙之墟方八百里髙萬仞上有木木長五尋大五圍旁有井以玉為楹檻欄楹有五門門有開明獸守之百神所在又曰崑崙之丘有神人面虎身文尾其下有弱水泉徐整長厯曰北斗當崑崙上真人關尹内傳曰萬億萬嵗有}
