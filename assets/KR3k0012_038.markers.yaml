  - {type: variant, offset: 2860, length: 1, content: 竹, WYG: 子者神農時雨師也服水石以教神農能入火不燒至崑崙山上常止西王母石室中隨風雨上下炎帝少女追之亦得仙俱去至髙辛時復為雨師今之雨師是又曰王母者神人也人面蓬頭髪虎牙豹尾善嘯穴居名西王母在崑崙山下神仙傳曰東郭延者山陽人服雲母散能夜書有數十人乘虎豹來迎比鄰盡見之與親友辭别而去云詣崑崙山神異經曰崑崙有銅柱焉其髙入天所謂天柱也圍三千里周圓如削銅柱下有屋壁方百丈搜神記曰崑崙之山是惟帝之下都環以炎火山十洲記曰崑崙號曰崑陵山也上有金臺玉闕元氣之所合天帝君治處𤣥元記曰崑崙西南山周環三萬里巨蛇繞之得三周蛇長九萬里尸子曰赤縣神州實為崑崙之墟玉紅之草}
