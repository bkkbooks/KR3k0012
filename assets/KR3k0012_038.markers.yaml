  - {type: variant, offset: 2938, length: 324, content: 言作陵不便乃徙作昌陵取土十餘里土與粟同價關中記曰未央宮蕭何所造周廻二十三里䟽龍首山土為殿基殿基出長安城上也宣城記曰江矩吳時為廬江太守以清稱徵還舡輕皆載土時歲暮逐除者就乞所獲甚少江乃語之逐除人見而去盛弘之荊州記曰武當縣有一谿岸土色鮮黃乃可噉義興記曰陽羨縣塘西潛壤中有黃土色如精金法顯記曰阿育王昔在小兒時當道戲遇迦葉佛乞食小兒欣喜即以一掬土施佛佛持還泥經行地因此果報作鐵輪王晉太康地記城陽姑募縣有五色土吳郡記曰吳縣餘杭山出白土光潤如玉墨子曰啇王紂不德兼夜十日雨土於亳孫卿子曰子貢問於孔子賜未知為人下者其猶土也深掘之而得甘泉樹之而五穀蕃草木植焉禽獸育焉生則主焉死則入焉多其功而不得為人下者猶土也韓詩外傳說苑並載也申子曰四海之內六合之間曰奚貴曰貴土土食之本, WYG: 蘋}
