  - {type: variant, offset: 3261, length: 1, content: 本, SBCK: 令人不溺草之美者沙棠之實又曰崑崙之墟方八百里髙萬仞上有木木長五㝷大五圍面有井以玉爲檻檻欄面有五門門有開明獸守之百神所在又曰崑崙之丘有神人面虎身文尾其下有弱水泉徐整長暦曰北斗當崑崙上眞人􅀜尹内傳曰萬億萬歳有一大水崑崙飛浮是時飛仙迎取天王及善民安之山上也葛仙公傳曰崑崙山一日􅀇圃臺一曰積石瑶房一曰閬風臺一曰華蓋一曰天柱皆仙人所居列仙傳赤松子者神農時􅀨師也服水石以教神農能入火不燒至崑崙山止常上西王母石室中隨風􅀨上下炎帝少女追之亦得仙俱去至髙辛時復爲􅀨師今之􅀨師是也又曰西王母者神人也人面蓬頭髪虎爪豹尾善肅空居名西王母在崑崙山下神仙傳曰東郭延者山陽人也服雲飛散能夜書有數十人乗虎豹來迎比隣盡見之與親友辭別而去云詣崑崙山神異經曰崑崙有銅柱焉其髙入天所謂天柱也圍三千里貟周如削銅柱下有屋壁方百丈搜神記曰崑崙之山是惟帝之下都環以炎火山十洲記曰昆陵崑崙山也上有金臺玉闕亦元氣之所合天帝君治處􅀇元記曰崑崙西南山周廽三萬里巨虵繞之得三周虵長九萬里尸子曰赤縣州者寔爲崑崙之墟玉紅之草生焉食其一實而醉卧三百歲而後寤吕氏春秋曰菜之美者有崑崙之蘋}
