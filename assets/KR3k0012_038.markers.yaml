  - {type: variant, offset: 3565, length: 211, content: 故少人士每以三品為中正山海經曰洪水滔天鯀竊帝息壤以堙洪水不待帝命祝融殺鯀于羽郊郭璞注曰息壤謂土自長故可以堰水也漢元帝時臨除縣北埇長六里高二丈即息壤類帝王世紀曰禹葬會稽下不及泉上不通臭既葬收餘壤為壟蕭廣濟孝子傳曰巴郡文讓母死墳土未足耕一畝地為壤群鳥數千銜所作壤以著墳上關中記曰長安地皆黑壤城今赤如火堅如石韓子曰蟻冬居山之陽夏居山之陰蟻壤寸而有水乃掘遂得水塊禮記檀弓上曰寢苫枕塊左傳曰晉文公過衛出五鹿乞食於野野人予之塊公怒咎犯, SBCK: 荅}
