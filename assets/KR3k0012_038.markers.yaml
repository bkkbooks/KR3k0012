  - {type: variant, offset: 3432, length: 120, content: 土飯瓦胾不療於飢壤說文曰壤軟土也尚書康誥曰賓奉珪弊執壤奠孔安國注曰賓諸侯執壤地所出而奠贄尚書孔安國注曰土無塊曰壤周禮地官上司徒職曰大司徒辦十二壤之物而名其種教稼穡樹蓺史記曰李斯上書曰太山不讓土壤故能成其高河海不擇細流故能就其深王隱晉書曰解結, SBCK: 蔡誕者自云􅀍謫至崑崙􅀄誕還人}
