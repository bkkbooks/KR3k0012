  - {type: variant, offset: 4447, length: 4, content: 復揚塵老, WYG: 變為桑田蓬萊之清淺也方丈山漢書曰太液池有方丈瀛洲象海中神山焉列仙傳服閭者不知何人常止莒往瀛海邊諸祠中有三仙人於祠中博賭瓜使服閭擔黄白𤓰數十頭教令瞑目及覺乃在方丈山瀛洲山史記封禪書曰齊宣王燕昭王使人求蓬萊方丈瀛洲此三神山傳在海中去人不逺望之如雲中及至則三山反在水中欲至風引船而去莫能至者仙人不死藥皆在焉黄金白玉為宫闕終南山書曰終南惇物至于鳥鼠謂終南惇物二山西出至于鳥鼠山詩曰終南何有有條有枚漢書曰太一山又為終南山五經要義太一山在扶風武功縣則終南太一不得為一山明矣葢終南南山之總名太一山之别號唐書曰盧藏用初隠終南山後出仕道士司馬}
