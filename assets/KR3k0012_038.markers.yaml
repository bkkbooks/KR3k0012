  - {type: variant, offset: 3780, length: 425, content: 稽首受而載之國語曰楚靈王於乾溪彷徨於山林枕疇人之股疇人枕王以璞而去之賈遠曰璞瑰也徐整長曆曰黃帝時風不鳴條雨不破塊也淮南子曰土勝水者非一墣塞江也許慎注曰璞塊也塵詩曰無將大車維塵冥冥禮記曰前有埃塵則載鳴鳶鄭玄注曰鳴則將風又曰為長者糞之禮必加箒於箕上以袂拘而退其塵不及長者左傳曰晉楚戰狐毛設二斾而退之欒枝使曳柴而偽遁曳柴起塵詐言聚眾走又曰潘黨望其塵使騁而告曰晉師至矣楚人懼遂出陳史記曰鉤弋夫人死雲陽暴風揚塵漢書酷吏傳曰長安中姦猾浸多受財報仇相與探丸得赤丸者斫武吏黑者斫文吏城中薄暮塵起死傷橫道枹鼓不息謝承後漢書曰范雲為萊蕪長閭里歌之曰甑中生塵范史雲魏志曰歲朝西北大雲風塵埃蔽天十餘日間何晏乃誅晉書王導傳庾亮以望重地逼出鎮於外南蠻校尉陶稱聞說亮當舉兵勸導密為之防導曰吾與元規休戚是同悠悠之談宜絕智者之口元規若來吾便角巾還第復何懼哉時亮執朝廷之權趍向者多歸之導內不能平常遇西風塵起舉扇自蔽徐曰元規塵汙人家語曰顏回拾甑中塵博物志曰徐州人謂塵土為蓬塊吳人謂塵土為坱, SBCK: ''}
