  - {type: variant, offset: 2852, length: 7, content: 夕間土壤高五尺, WYG: 大水崑崙飛浮是時飛仙迎取天王及善民安之山上也葛仙公傳曰崑崙山一曰𤣥圃臺一曰積石瑶房一曰閬風臺一曰華蓋一曰天柱皆仙人所居列仙傳曰赤}
