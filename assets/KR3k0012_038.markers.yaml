  - {type: variant, offset: 4491, length: 2, content: 昧涉, SBCK: 祠宇終南山未備禮秩命有司即時建立􅀜中記曰終南山一名中南言在矢中居都之南也又曰終南太一左右三十里内名福地皇甫謐髙士傳曰四皓共入啇洛隱地肺山以待天下定漢髙祖徴之不至乃深自匿終南山辛氏三秦記曰太一在驪山西去長安二百里山之秀者也中有石室常有一道士不食五􅂖自言太一之精齋㓗乃得見之其􅃺似仙人山一名地肺可避洪}
