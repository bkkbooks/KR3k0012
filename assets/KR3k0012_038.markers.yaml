  - {type: variant, offset: 3256, length: 1, content: 貴, SBCK: 嶓冢山上爲狼星武開山爲地門上爲天髙星主囹圄荆山爲地雌上爲軒轅星大別爲地理以天合地以通三危山在鳥獸之西南上爲天范星歧山在崑崙東南爲地乳上爲天麋星汶山之地爲井絡帝以㑹昌神以建福上爲天井桐栢山爲地穴鳥䑕同穴山之幹也上爲掩畢星熊耳山地門也精上爲畢附耳星莊子曰凾車之獸分而離山不免網􅅈之患又曰山積卑而成髙管子曰凢天下名山五千三百七十出鐡之山三千六百有九上有丹砂者下有黄金上有磁石者下有銅金上有緑石者下有鈆錫上有赭下有鐡淮南子曰牛蹄之涔無徑尺之鯉魅父之山無文林營宇狹小而不能容巨大也孫卿子曰不登髙山不知天之髙不臨深谿不知地之厚不聞先王之道不知學問之爲大吕氏春秋曰何謂九山㑹稽泰山㑹稽今㑹稽也泰山今泰山郡是爲東岳也王屋首山泰華􅄮山太行羊腸孟門􅄮山在右扶風美陽縣西北周家所邑也太行在河内野王縣北羊賜其山盤紆如羊腸􅃺在太行晉陽北孟門太行是􅀃苑曰}
