  - {type: variant, offset: 1924, length: 1, content: 息, WYG: 能容巨大也孫卿子曰不登髙山不知天之髙不臨深谿不知地之厚不聞先王之道不知學問之大吕氏春秋曰何謂九山㑹計泰山㑹計即㑹稽也泰山在陽山郡是為東岳王屋首山泰華岐山太行羊腸孟門岐山在扶風美陽縣西北周家所邑也太行在河内野王縣北羊腸其山盤紆如羊賜狀在太行晋陽北孟門太行是也說苑曰土積成山則豫章生焉}
