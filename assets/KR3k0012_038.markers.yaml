  - {type: variant, offset: 2374, length: 217, content: 既覺而喜曰丸者桓也桓既吞矣我復本土也旬日中聞桓玄敗得來歸世本曰稟君名務相姓巴與樊氏暉氏相氏鄭氏凡五姓俱出皆爭神以土為舡雕丈畫之而浮水中其舡浮因立為君佗舡不能浮獨稟君舡浮因立為君蜀王本紀曰蜀王獵於褒谷見秦王以金一笥遺蜀王蜀王報以禮物盡化為土秦王大怒臣下拜賀曰土地也今秦當得蜀矣崔鴻十六國春秋後趙錄曰建武十二年沙門吳進言於帝曰胡運將衰晉當復興當苦役晉人以厭其氣帝於是使尚書張郡發近郡男女十六萬車十萬乘運土築華林園及長墟一作墻于鄴北廣長五里, WYG: ''}
