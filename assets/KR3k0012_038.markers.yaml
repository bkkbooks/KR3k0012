  - {type: variant, offset: 2832, length: 3, content: 宗承字, WYG: 共工與顓頊爭天下怒而觸不周山魏志曰明帝起景陽山於芳林園晋書曰顧愷之好遊㑹稽人問山川之美對曰千巖競秀萬壑争流宋書曰謝靈運好登山常著木屐上山則去前齒下山則去後齒漢書曰李廣利刺山而泉涌楚詞曰山中兮不可以乆留古詩曰上山採蘼蕪下山逢故夫崑崙山爾雅曰西北之美者有崑崙之璆琳瑯玕焉史記夏禹本紀曰河出崑崙其上有澧泉華池漢書曰張安}
