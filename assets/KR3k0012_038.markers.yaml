  - {type: variant, offset: 4442, length: 3, content: 聖人言, WYG: 自接侍以來三見}
  - {type: variant, offset: 4442, length: 3, content: 聖人言, krp: 自接侍巳來三見海水變爲桑田蓬萊之清淺也方丈山漢書曰太液池有方丈瀛洲象}
  - {type: variant, offset: 4447, length: 4, content: 復揚塵老, SBCK: 神山焉仙傳曰服閭者不知何許人常止莒徃來海邊諸祠中有三仙人於祠中􅀶賭􅀲使服閭檐黄􅀲十枚令瞑目乃止方丈山在蓬萊山南時徃莒取珎寳賣之瀛洲山史記封禪書曰齊宣王燕昭王使人求蓬萊方文瀛洲此三神山傳在海中去人不逺望之如雲中及至則三山返在水下欲至則風引舡而去莫能至者仙人不死藥皆在焉黄金白銀爲宫􅏱終南山書曰終南惇物至於鳥䑕謂終南惇物二山西出至于鳥鼠山詩曰終南何有有條有枚漢書曰太一山又爲終南山五經要義太一山在扶風武功縣則終南太一不得爲一山明矣蓋終南南山之惣名太一山之別號唐書曰盧藏用􅀄隱終南山後出仕道士司馬}
