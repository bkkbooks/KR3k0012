  - {type: variant, offset: 1915, length: 0, content: '', WYG: 河圖曰嶓冡山上為狼星武關山為地門上為天髙星主囹圄荆山為地雌上為軒轅星大别為地理天以合地以通三危山在鳥鼠之西南上為天苑星政山在崑崙東南為地乳上為天糜星汶山之地為井絡帝以㑹昌神以建福上為天井星桐栢為地穴鳥鼠同穴山之幹也上為掩畢星熊耳山地門也精上為畢莊子曰函車之獸分而離山不免網罟之患}
