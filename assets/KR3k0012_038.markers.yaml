  - {type: variant, offset: 4351, length: 3, content: 黃帝夢, SBCK: 崑崙之北玉山之神人身虎首豹尾蓬頭外國圖曰西王母國前弱水中有玉山白兎闞駰十洲記曰赤水西有白玉山山有西王母堂室蓬萊山漢書王莽傳曰有竒士}
  - {type: page-break, offset: 4351, content: '', id: KR3k0012_SBCK_038-8a}
  - {type: variant, offset: 4351, length: 1, content: 黃, WYG: 崑崙之北玉山之神人身虎首豹尾蓬頭外國圖曰西王母國前弱水中有玉山白兎闞駰十三洲記曰赤水西有白玉山山有西王母堂室蓬萊山漢書王莽傳曰有竒士大十圍自言巨無霸出於蓬萊山軺車不能載三馬不能勝焉武}
  - {type: page-break, offset: 4351, content: '', id: KR3k0012_WYG_038-13a, image: WYG0893/WYG0893-0327a.png}
  - {type: variant, offset: 4351, length: 3, content: 黃帝夢, krp: 崑崙之北玉山之神人身虎首豹尾蓬頭外國圖曰西王母國前弱水中有玉山白兎闞駰十洲記曰赤水西有白玉山山有西王母堂室蓬萊山漢書王莽傳曰有竒士}
  - {type: variant, offset: 4353, length: 1, content: 夢, WYG: 紀曰太初元年十二月祀后土臨渤海望祀蓬萊十洲記曰蓬萊山外别有海謂之溟海無風而洪波百丈有九氣丈人九天真君宫𤣥中記曰東海之}
  - {type: page-break, offset: 4353, content: '', id: KR3k0012_WYG_038-13b, image: WYG0893/WYG0893-0327b.png}
  - {type: variant, offset: 4355, length: 0, content: '', SBCK: 十圍自言巨無霸出於蓬萊山軺車不能載三馬不能勝又武記曰太􅀄元年十二月祀后土東臨渤海望祀蓬萊十洲記曰蓬萊山外别􅀒海謂之溟海無}
  - {type: variant, offset: 4355, length: 3, content: 風吹天, WYG: 者有巨鼇焉以背負蓬莱山列子曰渤海之東有大海其中有山一曰岱輿二曰貟嶠三曰方壺四曰瀛洲五曰蓬莱山上臺觀皆金玉禽獸皆純縞珠玕之樹皆聚生實皆有滋味食之不老不死人皆仙聖一日一夕飛翔來往山海經曰蓬萊山海中之神山非有道者不至列仙傳曰安期生瑯琊阜鄉人時人皆言千嵗秦始皇與語賜金璧數千萬出阜鄉亭皆置去留以赤玉舄一量為報曰後千嵗求我蓬萊山}
