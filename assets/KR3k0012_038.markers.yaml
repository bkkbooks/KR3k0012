  - {type: 'tls:seg', offset: 3258, content: '', id: KR3k0012_CHANT_038-37a.6}
  - {type: variant, offset: 3258, length: 1, content: 土, SBCK: 積成山則豫章生焉又曰五嶽者何謂也泰山東嶽也霍山南嶽也華山西嶽也􅁪山北嶽也嵩髙山中嶽也五嶽何以視三公能大布雲雨焉能大歛雲雨焉觸石而出膚寸而合不崇朝而雨天下施得愽大故視三公也白虎通曰東岱山岱者言萬物相代於東方南衡山者上承景宿銓徳均物故曰衡也西華山華者獲也萬物熟成乃有􅀗也北􅁪山􅁪常也言萬物伏藏於北方有常度也中嵩山嵩者髙也言峻大矣處中以領四方地鏡曰入名山必齋五十日牽白犬抱白雞以白塩一􅂛山神大喜芝草異藥寳玉爲出未到山百歩呼曰林兵此山王主者名知之却百邪􅀜令尹喜内傳曰五百歲天下名山一開開時金玉之精涌出晏子春秋曰齊大旱景公召群臣問曰天下不雨矣民且有飢色吾卜旅在髙山廣澤寡人欲祠靈山可乎晏子曰夫靈山以石爲身以草木爲毛髮天不􅀨髪毛將焦身將熱獨不欲雨乎祠之何益山海經曰周穆王周歴四荒名山大川靡不登躋東昇天夫之堂西宴王母之廬列子傳曰共工與顓頊争天下怒而觸不周山魏志曰明帝起景陽山於芳林園晉書顧凱之好遊㑹稽人問山川之美對曰千巖競秀萬壑争流宋書曰謝靈運好登山常着木􅄚上山則去前齒下山則去後齒漢書曰李廣利刺山而泉涌楚詞曰山中􅀆不可以乆留古詩曰上山採蘼蕪下山逢故夫崑崙山爾雅曰西北之美者有崑崙之璆琳琅玕焉史記曰禹本紀言河出崑崙其上有澧泉華池漢書曰張安丗房中歌詩云天馬來􅀆開逺門竦余身􅀆遊崑崙愽物志曰崑崙從廣萬一千里神物集也出五色雲氣五色流水其白水東南流入中國名爲河也河圖括地象曰崑崙之山爲地首上爲握契滿爲四瀆横爲地軸上爲天鎭立爲八柱河圖始闔圖曰崑崙之墟有五城十二樓河水出四維多玉龍魚河圖曰崑崙山天中柱也紀年曰周穆王十七年西征至崑崙丘見西王母穆天子傳曰天子昇於崑崙之丘以觀黄帝之宫増封於崑崙山上又曰天子遂宿于崑崙之阿赤水之陽山海經曰周穆王至崑崙之丘遊軒轅之宫晀鍾山之嶺勒石西王母之山紀迹􅀇圃之上又曰槐江之山實惟帝之平圃南望崑崙其光熊熊有木焉其􅃺如棠而黄華赤實其味如李而無核名曰沙棠}
