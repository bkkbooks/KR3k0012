  body:
  - {type: variant, offset: 2, length: 254, content: 二地下淮南子曰東方之極自碣石碣石山在東北海中過朝鮮朝鮮東夷貫大人之國東方有大人之國也東至日出之次扶木之池青土樹木之野皆日所出之地太皞勾芒所司者萬二千里其令曰挺群禁開閉闔通窮窒達障塞行優游棄怨惡解役罪免憂患休罰刑開關梁宣出財和外怨撫四方行柔惠止剛強南方之極自北戶烏孫之界北戶日在其北嚮以為戶貫顓頊之國南方有顓頊之國也南至委火炎風之野赤帝祝融之所司者萬二千里帝赤著明審諟也祝屬也融工也萬物盛長屬續而工也其令曰爵有德賞有功惠賢良救飢渴舉力農振貧窮惠孤寡養老疾出大祿行大賞起毀宗立無後封建侯立賢輔中央之極自崑崙東絕恒, SBCK: 三叙}
