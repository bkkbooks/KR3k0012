  - {type: variant, offset: 994, length: 282, content: 游乎岡䍚之野北息乎沉墨之鄉西窮冥冥之黨東開澒濛之光此其下無地而上無天聽焉無聞視焉無眴此其外猶有汰沃之汜汰沃四海與天之際流聲也汜崖也其餘一舉而千萬里千萬里狀沐之外也吾猶未能之在吾尚未至此地今子游始於此乃語窮觀豈不亦遠哉然子處矣哉吾與汗漫期於九垓之上汗漫不可知之妞九垓九天也吾不可以久居士舉臂而竦身遂入雲中盧敖仰而視之弗見乃止駕止其所駕而居尸子曰八極之內有君長者東西二萬八千里南北二萬六千里故曰天左舒而起牽牛地右闢而起畢昂孟子曰天子之地方千里不方千里不足以待諸侯諸侯之地方百里不方百里不足以守宗廟呂氏春秋曰凡四極之內東西五億有九萬七千里南北五億有九萬七千里又曰長廬子曰, SBCK: ''}
