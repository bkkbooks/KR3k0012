  - {type: variant, offset: 1937, length: 1294, content: 之名而不知其所謂敢問孔子曰人生有魂氣有魄氣氣也者神之盛也眾生必死死必歸土此之謂鬼魂氣歸天此之謂神戰國策曰孟嘗君將入秦蘇秦曰臣來過於淄上有土偶人與桃梗相與語桃梗語人曰子岸上土也八月降雨淄水至則汝殘則復為岸矣今子淄水至則水漂何所之也漢書張釋之傳曰文帝拜釋之為廷尉人有盜高廟坐前玉環文帝怒下廷尉治奏當棄市上大怒釋之頓首謝曰假令愚民盜長陵一柸土陛下復何以加其法乎後漢書曰朱浮與彭寵書曰亦猶河濱之人捧土以塞孟津謝承後漢書曰東郡趙咨病自置小素棺使人取乾黃土二十石細擣篩之遺令亡後置土棺底厚一尺內屍於中以土壅上又曰范訓母亡以布囊盛土負以成壙魏志曰魏明帝起芳林園建昭陽殿公卿以下至於學生莫不展力帝乃躬自握土以率之後魏書曰高昴父次同語人曰吾四子皆五服我死後豈有人與我一鍬土邪及次同死昴大起塚對之曰此老公子平生畏無一鍬土今日被壓竟知之否唐書天寶十三載冊楊國忠為司空其日雨土江表傳曰孫權討袁術舉兵攻晥城術閉門自守糧食乏盡士女或丸土而吞之晉安帝紀曰劉敬宣在鮮卑夢丸土而服之既而占焉或荅曰此服土吞丸也既覺而喜曰丸者桓也桓既吞矣我復本土也旬日中聞桓玄敗得來歸世本曰稟君名務相姓巴與樊氏暉氏相氏鄭氏凡五姓俱出皆爭神以土為舡雕丈畫之而浮水中其舡浮因立為君佗舡不能浮獨稟君舡浮因立為君蜀王本紀曰蜀王獵於褒谷見秦王以金一笥遺蜀王蜀王報以禮物盡化為土秦王大怒臣下拜賀曰土地也今秦當得蜀矣崔鴻十六國春秋後趙錄曰建武十二年沙門吳進言於帝曰胡運將衰晉當復興當苦役晉人以厭其氣帝於是使尚書張郡發近郡男女十六萬車十萬乘運土築華林園及長墟一作墻于鄴北廣長五里白虎通曰土在中央中央者主吐含萬物聖證論曰孔鼂云能吐生百穀謂之土河圖挺佐輔曰自此百世之後地高天下山陵消去不風不雨不寒不暑民復食土皆知其母不知其父雷煥別傳曰煥與張華見異氣起牛斗之間煥曰此寶劍也拜煥豐城令到縣掘屋基入四十餘尺得一石函中有雙劍琢錯文采翳而未明君初經南昌遣人取西山北巖下土二升黃白色拭劍光艷照耀莫不驚愕張公得劍喜置坐側曰此土南昌西山北巖土也不如華陰山赤土封一斤與君荅書云詳觀劍體真干將也君更用赤土磨拭逾益精明晉書符堅傳初秦之未亂也關中土無火而煙氣火起數十里月餘不滅宋躬孝子傳曰宗承字世林父資喪葬舊塋負土作墳不役僮僕一夕間土壤高五尺松竹生焉荊州先德傳曰羅獻守巴東吳遣盛曼說獻合從之計詣獻求借城門獻遣參軍楊宗謾曰城中土一撮不可得何言城門乎三輔舊事曰成帝作延陵及起廟竇將軍有青竹田在廟南恐犯蹈之言作陵不便乃徙作昌陵取土十餘里土與粟同價關中記曰未央宮蕭何所造周廻二十三里䟽龍首山土為殿基殿基出長安城上也宣城記曰江矩吳時為廬江太守以清稱徵還舡輕皆載土時歲暮逐除者就乞所獲甚少江乃語之逐除人見而去盛弘之荊州記曰武當縣有一谿岸土色鮮黃乃可噉義興記曰陽羨縣塘西潛壤中有黃土色如精金法顯記曰阿育王昔在小兒時當道戲遇迦葉佛乞食小兒欣喜即以一掬土施佛佛持還泥經行地因此果報作鐵輪王晉太康地記城陽姑募縣有五色土吳郡記曰吳縣餘杭山出白土光潤如玉墨子曰啇王紂不德兼夜十日雨土於亳孫卿子曰子貢問於孔子賜未知為人下者其猶土也深掘之而得甘泉樹之而五穀蕃草木植焉禽獸育焉生則主焉死則入焉多其功而不得為人下者猶土, SBCK: ''}
