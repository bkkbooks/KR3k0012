  - {type: variant, offset: 1285, length: 711, content: 大莊嚴論世中未有訪之香爐乃藏公所常用又於寺內立明珠柱柱乃七日夜放光昭明太子欽其德遣舍人何思澄致手令以襃美之又曰建平王大球簡文第十七子也性明惠夙成初侯景圍臺城武帝素歸心釋教每發誓願恒云若有眾生應受諸苦諱身當代時大球年甫七歲聞而驚謂母曰官家尚爾兒安敢辭乃六時禮佛亦曰凡有眾生應獲苦報悉大球代受其早惠如此又曰大中元年都下疫甚帝於重雲殿為萬姓設救苦齋以身為禱九日辛未幸同泰寺設四部無遮大會上釋服御法衣清淨大捨以便省為房用素瓦器乘小車私人執役甲午昇法座為大眾講涅槃經癸卯群臣以億萬奉贖眾僧默然乙酉百辟詣寺東門奉表請還宮三請乃許帝三荅書前後並稱頓首中大同元年三月幸同泰寺講三惠經乃捨身為奴皇太子已下群臣出錢億億萬奉贖是夜同泰寺為天火所燒略盡二年帝昇光嚴殿講三惠經又捨身群臣以億萬奉贖僧眾嘿然百辟詣鳳莊門上表請帝帝三荅皆稱頓首丁亥服袞冕還宮高祖自初捨身後或書經坐禪盡日不食又於元光殿坐師子座講金字經又曰貞陽侯明俘執至魏魏帝引見明及諸將送晉陽渤海王高澄禮明甚重謂曰王與梁主和好十有餘年聞彼禮佛文常云為魏主及先王此甚是梁主厚意不謂一朝失信致使紛擾因欲與梁通和又曰初武帝軍東下用不足建安王偉取襄陽寺銅佛以為錢富僧藏鏹多加毒害後遂惡疾性多恩惠尤愍窮之每祁寒積雪則遣人載樵米隨乏絕者賦給之晚年崇信佛理尤精玄學著二暗義製性情幾神等論義僧寵及周捨殷鈞陸倕並名精解而不能屈又曰到溉少有美名家門雍睦兄弟特相友愛初與弟洽洹同居一齋洽卒後便捨宅為寺蔣山有延賢寺溉家世所立溉所得祿俸皆充二寺因斷腥膻終身蔬食別營小室朝夕僧徒禮誦武帝每月三致淨饌恩禮甚篤性不好交遊及臥疾門可羅雀太清二年卒臨終勒子孫薄葬之禮言訖便屏家人請僧讀經讚唄及卒顏色如恒手屈二指即佛道所云得果, WYG: ''}
