  body:
  - {type: variant, offset: 2, length: 2, content: 二奉, SBCK: 三僧玄僧上僧宋書僧道生彭城人㓜而聦悟年十五便能講經及長有異解立頓悟義時人推服元嘉十一年卒於廬山又曰徐湛之爲南兖州刺史招集文士盡遊玩之適時有沙門釋休善属文湛之與之甚厚孝武命使還俗姓湯位至楊州從事又曰沙門慧琳􅁗郡􅁗縣人姓劉氏少出家住治城寺有才章兼内外之學爲廬陵王義真所知甞著均善論頗貶裁}
  - {type: variant, offset: 2, length: 8, content: 二奉佛袁宏後漢紀, WYG: 三僧宋書}
