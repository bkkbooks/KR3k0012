  - {type: variant, offset: 3322, length: 1, content: 由, SBCK: 許也於宋太始中見之出入鍾山徃來都邑年巳五六十矣宋齊之交稍顯靈迹􅀍髪徒跣語嘿不論或􅀍錦􅂁飲啖同於凡俗􅁪以鏡銅剪刀鑷属柱杖􅀒之好爲懴記所謂志公符是也天監十三年卒將死忽移寺金剛像出置户外語人云菩薩當去旬日無疾而終先是琅瑘王筠至莊嚴寺寳誌遇之與交言􅂬飲至亡勑令筠爲碑蓋先􅁴也洛陽伽藍記曰沙門寳公不知何許人也刑皃寢陋心識通逹過去未來預覩三丗發言似䜟不}
