  - {type: variant, offset: 3305, length: 0, content: '', WYG: 經為中軰助衆為下軰道安傳曰初魏晉沙門依師為姓故性各不同安以為大師之夲莫遵釋迦乃以釋命氏後獲増一阿含經果稱四河上入海無復河名既符於經遂為永式異僧上晋書曰鳩摩羅什天竺人也世為國相父鳩摩羅炎聰懿有大莭将嗣相位乃辭出家東度葱嶺龜兹王聞其名郊迎之請為國師王有妹年二十才悟明敏諸國交聘並不許及見炎心欲當之乃逼以妻焉既而羅什在胎其母慧觧倍常及年七嵗母遂與俱出家羅什從師受經日誦千偈義亦自通年十二其母携到沙勒國王甚重之遂停沙勒一年博覧五經為性率達不拘小檢專以大乘為化諸學者共師焉年二十龜兹王迎之還國廣説諸經四逺學徒莫之能抗西域諸國咸伏羅什神儁符堅聞之乃遣呂光率兵伐龜兹謂光曰若獲羅什即馳馹送之光還至梁州聞符堅為姚萇所害於是竊號河右羅什在梁州積年姚興破呂隆乃迎羅什待以國師之禮嘗講經於草堂寺忽下高座謂興曰有二小兒登吾肩慾鄣須婦人興召宫女進之一交而生二子焉又曰沙門曇霍秃髮傉檀時從河南来持一錫杖令人跪曰此是般若眼奉之可以得道人或藏其錫杖曇瞿大哭數聲閉目湏臾起而取之咸竒其神異莫能測也後兵亂不知所在又曰佛圗澄天竺人也姓帛氏少學道妙通𤣥術永嘉四年来適洛陽自云百有餘嵗常服氣自飬能積日不食善誦咒能役使鬼神以油麻雜菌支塗掌千里外事皆徹見掌中如對面焉腹旁有一孔常以絮塞之每夜讀書則拔絮孔中出光照於一堂又常齋時平旦至流水側從腹旁孔中引出五臟六腑洗之還内腹中卒於鄴宫寺後有沙門從雍州来稱見澄西入關石季龍掘而}
