  - {type: variant, offset: 536, length: 547, content: 黑無一又得者為之發病非意此音猥來入耳其見重如此齊書曰竟陵王子良嘗招致名僧講論佛法造經唄新聲又文惠太子同好釋氏甚相友悌子良敬信尤篤數於邸園營齋戒大集朝臣眾僧至賦食行水或躬親其事世頗以為失宰相體武帝不豫子良啟進沙門於殿戶前誦經武帝為感夢見優曇鉢花于經案宣旨使御府以銅為華插御床四角又曰晉安王子懋字雲昌武帝第七子也廉讓好學年七歲時母阮淑媛嘗病危篤請僧行道有獻花供佛者眾僧以銅罌盛水漬其莖欲花不萎子懋流涕禮佛曰若使阿姨因此和勝願諸佛令花竟齋不萎七日齋畢花更鮮紅視罌中稍有根鬚又曰吳興有項羽神護郡廳太守到郡必須祀以軛下牛李安人奉佛法不與神牛著履上廳事又於廳上設入關齋俄而牛死又曰滕曇恭南昌人也年五歲母楊氏患熱思食寒瓜土俗所不產曇恭歷訪不能得銜悲哀切俄遇一桑門問其故曇恭具以告桑門曰我有兩瓜分一相遺還以與母舉室驚異尋訪桑門莫知所在及父母卒晝夜哀慟時忽有神光自門而起俄見佛像及夾侍之儀容光顯著自門而入曇恭家人大小咸共禮拜久之乃滅遠近道俗咸傳之梁書曰廬江何伯璵與弟幼璵俱厲節操伯璵卒幼璵好佛法剪落長齋持行精苦兄弟年並八十餘又曰范雲從父母兄縝字子真時竟陵王子良盛招賓客縝亦預焉子良精信釋教而縝盛稱無佛子良曰君不信因果何得有富貴貧賤縝荅曰人生如樹花同發隨風而墮自有拂簾幌墮於茵席之上有閡籬墻落於溷糞之中墮茵席者殿下, SBCK: 馬寺}
