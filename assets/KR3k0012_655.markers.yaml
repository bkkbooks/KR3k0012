  - {type: variant, offset: 11, length: 1, content: 楚, SBCK: 吾今夕當死壷中大錢一千以通九泉之路蠟燭一鋌以照七尺之尸至夜而亡時人以爲知命建康實録曰沙門支遁字道林常隱跡東山不遊人事好飬鷹馬而不乗放人或譏之遁曰貧道爱其神駿耳卒後戴安道常經其墓歎曰徳音未逺而拱木巳積盖神理綿綿不與氣運俱盡耳支遁傳云本姓關氏陳留人或云河東林慮人㓜有神理聦明秀徹􅀄至京師太原}
