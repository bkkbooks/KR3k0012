  - {type: variant, offset: 2072, length: 8, content: 劉慧斐字宣文彭城, SBCK: 康僧㑹其先康居人吴地􅀄染大法風化末全僧㑹欲使道振江左乃杖錫東遊以吴赤烏十年􅀄達建業營立䒢茨設像行道時吴􅀄見沙門疑爲矯異有司奏曰有胡人入境自稱沙門容服非常事應檢察權曰昔漢明帝夢神號稱爲佛彼之所事豈非其遺風耶即召僧㑹詰問有靈驗否㑹曰如來遷逝忽逾千載遺骨舎利神曜無方昔阿育起塔八萬四千塔寺之興以表遺化也㑹乃㓗齋静室以銅瓶加几燒香禮請三七日果􅀗舎利權大歎服即爲建塔號建􅀄寺名其地爲佛陁里又曰帛尸梨宻多羅此云告攴西域人呼爲髙座傳云國王之子當承継丗而以國讓弟遂爲沙門宻天姿髙朗風神超邁晉亦嘉􅀄始到中國值亂仍過江上建􅀄寺丞相王導一見而竒之以爲吾之徒也宻常在石子崗東行道頭陁旣卒因葬于此成帝懷其風爲樹刹於􅊘後有􅀜右沙門來遊乃於家處起寺陳郡謝混賛成其業仍曰髙座寺也又曰釋道安姓衛氏常山扶柳}
  - {type: page-break, offset: 2072, content: '', id: KR3k0012_SBCK_655-3a}
  - {type: variant, offset: 2072, length: 8, content: 劉慧斐字宣文彭城, WYG: 康僧㑹其先康居人呉地初染大法風化未全僧㑹欲使道振江左乃杖錫東遊以呉赤烏十年初達建業宮立茆茨設像行道時呉國初見沙門疑為矯異有司奏曰有胡人入境自稱沙門容服非常事應檢察權曰昔漢明帝夢神號稱為佛彼之所事豈非其遺風耶即召㑹詰問有何靈騐㑹曰如来遷逝忽逾千載遺骨舎利神曜无方昔阿育起塔八萬四千夫塔寺之興以表遺化也㑹乃潔齋净室以銅瓶加几燒香禮請三七日果獲舎利權大歡服即為建塔號建初寺名其地為佛陁里又曰帛尸梨宻多羅此云吉支西域人時人呼為高座傳云國王之子當承繼世而以國讓弟遂為沙門宻天姿高朗風神超邁晉永嘉初始到中國值亂仍過江止建初寺丞相王導一見而竒之以為吾之徒也宻常在石子崗東行頭陁既卒因葬于此成帝懐其風為樹刹冡所後有關右沙門来遊乃於冡處起寺陳郡謝混賛成其業追旌徳事仍曰高座寺也又曰釋道安姓衛民常山扶桞}
