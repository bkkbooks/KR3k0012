  - {type: variant, offset: 2300, length: 533, content: 因寢忽驚覺曰願公復來不可久駐顏色不變言終而亡舉室咸聞空中唱上行先生已去彌弛淨域矣武帝聞而下詔謚節處士以顯高烈又曰張孝秀字文逸長六尺餘白晳美鬚眉仕州中從事史後歸山居東林寺有田數十頃部曲數百人率以力田盡供山眾博涉群書專精釋典僧有虧戒律者集眾佛前作羯磨而笞之多能改過又曰馬樞字理要扶風郿人也博極經史尤善佛教邵陵王綸為南徐州剌史素聞其名引為學士綸時自講大品經令樞講維摩老子周易同日發題道俗聽者二千人王欲極觀優劣乃謂眾曰與馬學士論議必使屈服不得空立主客於是學者各起問端樞依次剖判開其宗旨論者拱默聽授而已綸甚佳之陳書曰後主沈皇后諱婺華身居儉約唯尋閱圖史及釋典為事常遇歲旱自暴而誦佛經應時雨降陳亡入隋及煬帝崩自廣陵過江於毗陵天靜寺為尼名觀音又曰孫瑒常於山齋設講肆集玄儒之士冬夏資奉為學者所稱而處己率易不以名位驕物時皇興寺朗法師該通釋典瑒每造講筵時有抗論法侶莫不傾心又曰徐陵少而崇信釋教經論多所解釋後主在東宮令陵講大品經義學名僧自遠雲集每講筵商較四座莫能與之抗又曰徐孝克後東遊居錢塘之仕義里與論釋典遂通三論每日二時旦講佛經晚講禮傳道俗受旨數百人天嘉中除剡令非其好也太建四年徵為祕書丞不就乃蔬食長齋持菩薩戒晝夜講誦法華經陳亡入長安隋文帝聞名行召令於尚書都堂講金剛般若經尋授國子博士以疾, SBCK: ''}
