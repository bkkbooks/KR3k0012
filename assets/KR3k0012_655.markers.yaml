  - {type: variant, offset: 5, length: 2, content: 袁宏, SBCK: 法云有白學先生以爲中國聖人經綸百丗其徳弘矣智周萬變天人之理盡矣道無隱旨教罔遺筌聦迪哲何􅀒於殊論哉有黑學道士陋之謂不照幽􅁳之途弗及來生之化雖尚虛心未能虛事不逮西域之深也爲主客酬荅其歸以爲六度與五教並行信順與慈悲齊伍論行於丗文帝見論賞之元嘉中遂叅懽要朝廷大事皆與議焉權侔宰相㑹稽孔顗常詣之􅁣然歎曰遂有黑衣宰相可謂冠履失所矣齊書曰趙僧岩北海人􅋁廓無常人不能測}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_655-1b}
  - {type: variant, offset: 5, length: 2, content: 袁宏, krp: 法云有白學先生以爲中國聖人經綸百丗其徳弘矣智周萬變天人之理盡矣道無隱旨教罔遺筌聦迪哲何負於殊論哉有黑學道士陋之謂不照幽冥之途弗及來生之化雖尚虛心未能虛事不逮西域之深也爲主客酬荅其歸以爲六度與五教並行信順與慈悲齊伍論行於丗文帝見論賞之元嘉中遂叅懽要朝廷大事皆與議焉權侔宰相㑹稽孔顗常詣之慨然歎曰遂有黑衣宰相可謂冠履失所矣齊書曰趙僧岩北海人寥廓無常人不能測}
