  - {type: 'tls:seg', offset: 176, content: '', id: KR3k0012_CHANT_655-2a.9}
  - {type: variant, offset: 181, length: 343, content: 世阮𥙿常戲之曰卿志大宇宙男邁終古充問其故𥙿曰我圖數千戶郡尚不能得卿圖作佛不亦大乎于時郗愔及弟曇奉天師道而充與弟准崇信釋氏謝萬譏之云一郗謟於道二何佞於佛世說亦云又曰王恭性雖抗直而闇於機會自矜貴不閑用兵尤信佛道臨刑猶誦經神色無懼宋書謝靈運傳曰會稽太守孟顗事佛精懇而為靈運所譏嘗謂顗曰得道應須惠業文人生天當在靈運前成佛必在靈運後顗深恨此言又曰袁粲字景倩幼孤祖哀之名曰愍孫孝武即位稍遷尚書吏部郎文帝諱日君臣並於中興寺八關齋中食竟愍孫別與黃門郎張淹更進魚肉食尚書令何尚之奉法素謹密以白孝武並免官又曰范泰暮年事佛甚精於宅西立祗洹精舍又曰宋明帝頗好玄理以周顒有辭義引入殿內親近宿直帝所為慘毒之事顒不敢顯誦經中因緣罪福事帝亦為之止顒音辭辯麗長於佛理著三宗論言空假義西涼州智林道人遺顒書深相贊美言捉塵尾來, SBCK: 洛陽騰譯}
