  - {type: variant, offset: 3305, length: 0, content: '', SBCK: 經爲中軰助衆爲下軰道安傳曰􅀄魏晉沙門依師爲姓故姓各不同安以爲大師之本莫尊釋迦乃以釋命氏後獲增一阿含經果稱四河入海無復河名旣懸與經符遂爲永式異僧上晉書曰鳩摩羅什天笁人也丗爲國相父鳩摩炎聦懿有大節將嗣相位乃辭出家東度葱領􅀛兹王聞其名郊迎之請爲國師王有妹年十二才悟明敏諸國交聘並不許及見炎心欲當之乃逼以妻焉旣而羅什在胎其母慧解倍常及年七歳母遂與俱出家羅什從師受經曰誦千偈義亦自通年十二其母携到沙勒國王甚重之遂停沙勒一年慱覽五經爲性率達不拘小檢專以大乗爲化諸學者共師焉年二十􅀛兹王迎之還國廣說諸經四逺學徒莫之能杭西域諸國咸伏羅什神雋符堅聞之乃遣吕光率兵伐􅀛兹謂光曰􅀂獲羅什即馳驛送之光還至涼州聞符堅爲姚萇所害於是竊號河右羅什在涼州積年姚興破吕隆乃迎羅什待以國師之禮甞講經于草堂寺忽下髙座謂興曰有二小兒登吾肩欲鄣湏婦人興以宫女進之生二子焉又曰沙門曇瞿秃髪傉檀時從河南來持一錫杖令人跪曰此是波􅀂眼奉之可以得道或人藏其錫杖曇瞿大哭數聲開目湏􅁷起而取之咸竒其神異莫能測也後兵亂不知所如又曰佛圖澄天笁人也姓白氏少學道妙通玄術永嘉四年來適洛陽自云百有餘歳常服氣自養能積日不食善誦神呪能役使􅀑神以油麻雜茵支􅂗掌千里外事皆徹見掌中如對面焉腹旁有一孔常以絮塞之毎夜讀書則拔絮孔中出光照于一室又常齋時平旦流水側從腹旁孔中引出五藏六腑洗之還内腹中卒於鄴宫寺復有沙門從雍州來稱見澄西入􅀜石季龍掘而}
  - {type: page-break, offset: 3305, content: '', id: KR3k0012_SBCK_655-6b}
  - {type: page-break, offset: 3305, content: '', id: KR3k0012_SBCK_655-7a}
