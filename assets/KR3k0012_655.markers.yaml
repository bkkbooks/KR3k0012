  - {type: variant, offset: 3303, length: 0, content: '', krp: 陛下羅刹化臨水必自見之如其言果見群羅刹在其後於是乃禁断鷹鷂造佛寺断屠殺不食肉又曰}
  - {type: variant, offset: 3304, length: 0, content: '', SBCK: 南周捨清信士也學通内外兼有口才謂沙門法雲曰孔子不飲盗泉之水法師何以捉鍮石香鑪荅曰檀越旣能載纛貧道何爲不執鍮僕射徐孝嗣修緝髙座寺多在􅀍宴息法雲曰法師亦治蕭寺日夕逰此二寺隣椄而不相徃來嗣常謂法師常在髙座不遊髙座寺荅曰檀越旣事蕭門何不至蕭寺又曰魏李恕聘梁沙門重公椄恕曰向來全無􅉁膎户佳切恕父名諧以爲犯諱恕曰短髪粗踈重公曰貧道短髪沙門種􅀋以君交聘二國不辨膎諧重公常謁髙祖問曰弟子聞在外有四聲何者爲是重公應聲荅曰天保寺刹及出向劉孝綽道以此爲能綽曰何如道天子萬福髙僧傳曰三藏法師玄奬陳留人姓陳氏貞觀􅀄肇自咸京誓徃西國窮覽聖迹經六載至摩伽陁城凢十二年備歴聖君龍庭之文就嶺之祕皆研機覩奥矣又造伽葉結集之墟千聖道成之樹䖍心頂禮焚香散花設大施㑹於是五天億衆十八國王獻氈投珠積如山岳咸稱法師爲大乗也及東歸太宗詔留於弘福道塲乃召名徳僧靈潤等二十人譯梵自萻薩戒至摩訶般􅀂㹅七十四部一千三百餘軸法師身長八尺眉目踈朗九所遊歴一百二十八國長阿含經曰凢沙門衣鉢隨身譬如飛鳥四十二章經曰僧行道如牛􅀒深􅅺中疲極不敢左右頋增一阿含經曰沙門皆草蓐爲床又曰四河入海無復河名四姓爲沙門皆稱釋種無爲經曰沙門有三坐禪爲上軰}
  - {type: page-break, offset: 3304, content: '', id: KR3k0012_SBCK_655-5b}
  - {type: page-break, offset: 3304, content: '', id: KR3k0012_SBCK_655-6a}
  - {type: variant, offset: 3304, length: 0, content: '', WYG: 南周捨清信士也學通内外兼有才口謂沙門法雲曰孔子不飲盗泉之水法師何以捉鍮石香爐答曰檀越既能載纛貧道何為不執鍮僕射徐孝嗣修緝高座寺多在彼晏息法雲曰法師亦治蕭寺日夕遊此二寺隣接而不相徃来孝嗣嘗謂法師曰常在髙座不遊髙座寺答曰檀越既事蕭門何不至蕭寺又曰魏李恕聘梁沙門重公接恕曰向来余無葅膎户佳切恕父名諧以為犯諱怒曰短髪粗疎重公曰貧道短髪沙門種類以君交聘二國不辨膎諧重公常謁髙祖問曰弟子聞在外有四聲何者為是重公應聲答曰天保寺刹及出劉孝綽道以此為能綽曰何如道天子萬福唐髙僧傳曰三藏法師𤣥装陳留人姓陳氏貞觀初肇自咸京誓徃西國窮覧聖迹經六載至摩伽陁城凡十二年備歴聖君龍庭之文鷲嶺之秘皆研機覩奥矣又造迦葉結集之墟千聖道成之樹䖍心頂禮焚香散花設大施念於是五天億衆十八國王獻氊投珠積如山岳咸稱法師為大乗也及東歸太宗詔留於𢎞福道塲乃詔名徳僧靈潤等二十人譯梵自菩薩戒至摩訶般若總七十四部一千三百餘軸法師身長八尺眉目疎朗凡所遊歴一百二十八國長阿含經曰凡沙門衣鉢随身譬如飛鳥四十二章經曰僧行道如牛負深泥中疲極不敢左右顧増一阿含經曰沙門皆草蓐為牀又曰四河入海無復河名四姓為沙門皆稱釋種無為經曰沙門有三坐禅為上軰}
