  - {type: variant, offset: 3470, length: 2, content: 崔光, SBCK: 匠此宫者從忉利天來成便還天上矣又曰犍陁勒者夲西域人來至洛陽積年雖敬其風操而終莫能測後謂衆僧曰洛東南有槃鴟山山有寺廟處基摭猶存可共修立衆未之信試遂撿視入山到一處四靣平坦勒示云此山寺基也即掘之果得寺下石基後示講堂僧房處如言皆驗衆咸驚歎因共修立焉又曰釋曇始􅀜中人晉孝武太元末賫經律數十部徃遼東宣化顯授三乗髙句驪聞道之始也義熈􅀄復還關中始足白於靣雖跣渉泥水未}
  - {type: page-break, offset: 3470, content: '', id: KR3k0012_SBCK_655-8b}
  - {type: variant, offset: 3470, length: 2, content: 崔光, WYG: 匠此宫者從㣼利天来成便還天上矣又曰犍陁勒者夲西域人来至洛陽積年衆雖敬其風操而終莫能測後謂衆僧曰洛東南有槃鵄山山有寺廟處基址猶存可共修立衆未之信試遂檢視入山到一處四面平坦勒示云此山寺基也即掘之果得寺下石其後講堂僧房處如言皆騐衆咸驚歎因共修立焉又曰釋曇始關中人晉孝武太元末賫經律數十部往遼東宣化顯授三乗髙句驪問道之始也義初復還関中足白於面雖屡渉泥水未嘗沾汚天下咸稱白足和尚又曰釋法成凉州人十六岀家學經律不餌五穀唯食松脂隠居巖穴習禪為務後小疾便告衆云亡}
  - {type: page-break, offset: 3470, content: '', id: KR3k0012_WYG_655-13b, image: WYG0898/WYG0898-0814b.png}
  - {type: page-break, offset: 3470, content: '', id: KR3k0012_WYG_655-14a, image: WYG0898/WYG0898-0814c.png}
  - {type: variant, offset: 3470, length: 2, content: 崔光, krp: 匠此宫者從忉利天來成便還天上矣又曰犍陁勒者夲西域人來至洛陽積年雖敬其風操而終莫能測後謂衆僧曰洛東南有槃鴟山山有寺廟處基摭猶存可共修立衆未之信試遂撿視入山到一處四靣平坦勒示云此山寺基也即掘之果得寺下石基後示講堂僧房處如言皆驗衆咸驚歎因共修立焉又曰釋曇始關中人晉孝武太元末賫經律數十部徃遼東宣化顯授三乗髙句驪聞道之始也義熈𥘉復還關中始足白於靣雖跣渉泥水未}
  - {type: variant, offset: 3473, length: 0, content: '', SBCK: 沾濕天下咸稱白足和尚又曰釋法成涼州人十六出家學經律不餌五􅂖唯食松脂隱居岩穴習禪爲務後小疾便告衆云亡常誦寳積經於是自力誦之始得半卷氣劣不堪乃令人讀之一遍裁竟合掌而卒侍疾十餘人咸見空有紺馬􅀒金棺昇空而逝又曰笁曇猷燉煌人少苦行習禪定逰江左止剡之石城山乞食坐禪後有神見形詣猷曰師威徳旣重來止此山弟子輙推室以相奉天台山懸崖峻峙峯嶺切天古老相傳云上有釋舎得道者居之雖有石槗跨澗而撗石断之自終古以來無得至者猷行至槗所聞空中聲曰知君誠篤今未得度却後十日自當來也猷毎恨不得度石洞開度槁少許覩精舎神僧果如前所說因共燒香中食食畢神僧謂猷曰却後十年自當來此今得住於是而返又曰釋曇諦其先康居人母黄氏}
  - {type: page-break, offset: 3473, content: '', id: KR3k0012_SBCK_655-9a}
  - {type: variant, offset: 3473, length: 0, content: '', WYG: 誦寳積經於是自力誦之始得半卷氣劣不堪乃令人讀之一遍裁竟合掌而卒侍疾十餘人咸見空有紺馬負金棺昇空而逰又曰竺曇猷燉煌人少苦行習禪定逰江左止剡之石城山乞食㘴禪後有神見形詣猷曰師威徳既重来止此山弟子輙推室以相奉天台山懸崖峻峙峰嶺挿天古老相傳云上有精舎得道者居之雖有石跨澗而横石斷之自終古以来無得至者猷行至橋所聞空聲曰知君誠篤今未得度却後十日自當来也猷每恨不得度石洞間度橋少許覩精舎神僧果如前所説因共燒香中食食畢神僧謂猷曰却後十年自當来此今未得主於是而返又曰釋曇諦其先康居人母黄氏}
  - {type: page-break, offset: 3473, content: '', id: KR3k0012_WYG_655-14b, image: WYG0898/WYG0898-0814d.png}
  - {type: variant, offset: 3473, length: 0, content: '', krp: 沾濕天下咸稱白足和尚又曰釋法成涼州人十六出家學經律不餌五糓唯食松脂隱居岩穴習禪爲務後小疾便告衆云亡常誦寳積經於是自力誦之始得半卷氣劣不堪乃令人讀之一遍裁竟合掌而卒侍疾十餘人咸見空有紺馬負金棺昇空而逝又曰笁曇猷燉煌人少苦行習禪定逰江左止剡之石城山乞食坐禪後有神見形詣猷曰師威徳旣重來止此山弟子輙推室以相奉天台山懸崖峻峙峯嶺切天古老相傳云上有釋舎得道者居之雖有石槗跨澗而撗石断之自終古以來無得至者猷行至槗所聞空中聲曰知君誠篤今未得度却後十日自當來也猷毎恨不得度石洞開度槁少許覩精舎神僧果如前所說因共燒香中食食畢神僧謂猷曰却後十年自當來此今得住於是而返又曰釋曇諦其先康居人母黄氏}
  - {type: variant, offset: 3474, length: 4, content: 坐讀佛經, SBCK: 寢夢見一僧呼黄爲母􅀉一塵尾并鐵鏤書鎮二枚眠覺見兩物具存因而懷孕生諦諦年五歳以塵尾等示之諦曰􅁗王所餉母曰汝置何處荅曰不億至年十歳出家學不從師悟自天發後見僧㗉音畧法師㗉曰即先師弘􅁴法師㗉晚入吴居虎丘寺唐髙僧傳曰萬廻姓張氏閿郷人其形如愚蒙其跡乃神聖苦樂貴賤不􅀜其心歌哭隱顯不恒其性剃髪褐衣遊伽藍年十歳}
