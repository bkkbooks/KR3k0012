  - {type: variant, offset: 1038, length: 663, content: 黃帝崩葬橋山武帝巡朔方還祭黃帝冢曰吾聞黃帝不死今有冢何也左右曰黃帝已上天群臣藏其衣冠故有冢帝曰吾誠得如黃帝視去妻子如脫屣也又曰樗里子卒葬渭南章臺之東曰後百歲當有天子之宮夾我墓至漢興長樂宮在其東未央宮在其西武庫正直其墓漢書曰朱買臣獨行歌道中負薪墓間故妻與夫家俱上冢見買臣飢寒呼飯飲之又曰驃騎將軍霍去病卒夫子悼之發屬國玄甲軍陳自長安至茂陵為冢像祁連山又曰嚴延年東海下邳人為河南太守母來見執因大驚謂延年曰天道神明人不可獨殺我不自意當老見壯子被刑戮也行矣為汝東歸掃除墓地耳遂去歸郡見昆弟宗人復為言之後歲餘果敗東海莫不賢其母又曰哀帝令將作為董賢起冢營義陵傍內便房剛柏題湊外為徼道周垣數里闕罘罳甚盛罘音浮罳音思又曰莽奏貶傅太后號為定陶恭王母丁姬莽復言恭王母丁姬不臣妾至葬渭陵冢高與元帝山齊諸發恭王母及丁姬冢取其璽綬消滅徙恭王母歸定陶葬恭主冢次而葬丁姬復其故太后以為既已之事不須復發莽固爭之后詔曰因改故棺為致槨作冢祠以太牢謁者護既發傅太后冢崩壓殺數百人開丁姬槨火出四五丈吏卒以水沃滅乃得入燒燔槨中器物開傅后棺臭聞數里公卿在位皆阿莽旨入錢帛追子弟及諸生四夷凡十餘萬人操持作具助將作掘平恭王母丁姬冢二旬間皆平莽又周棘其豦以為世戒云時有群鷰數千銜土投丁姬穿中又曰張賀為掖庭令及宣帝即位賀已死子又早亡上追思賀恩封其家恩德置守冢二百家又曰夏侯勝字公長遷太傅卒官賜冢塋葬平陵太后為素服五日報師傅之恩儒者以為榮又曰原涉自以先人墳墓儉約非孝也迺大治冢舍周閤重門初武帝時京兆曹氏葬茂陵伐其道為京兆阡涉墓之西買地開道立署曰南陽阡人不肯從謂之原氏阡東觀漢記曰帝感, SBCK: ''}
