  - {type: variant, offset: 159, length: 0, content: '', SBCK: 華元冢在華原陳留小黄縣城北呉越春秋曰虎丘者呉王闔閭墓也下池廣六十歩􅀷一丈五赤銅椁三重中池廣六尺金鴈玉鳬諸膓魚膓之劒以送焉取}
  - {type: variant, offset: 159, length: 0, content: '', WYG: 華元冢在華原陳留小黄縣城北吴越春秋曰虎丘者吴王闔閭墓也下池廣六十步深一丈五尺銅棺三重中池廣六尺有金雁玉鳬專諸魚腸之劒以送焉取丘臨海潮千萬人築治之以葬後金精上地為白虎據墳故以虎丘名之越傳曰禹到大越上苗山更名山曰會稽因死葬焉穿地深七尺上無㵼泄下無流水壇高三尺土階三等周圍方一畆華陽國志曰周失綱紀蜀先稱王有名􅅙藂其目縱死作石階石棺國人化之故俗以石棺椁為縱目人冢又曰蜀有五丁能移山舉萬鈞其王薨輙立大石長三丈重十鈞為墓誌又曰蜀遣使朝秦秦惠王許嫁五女於蜀蜀遣五丁力}
