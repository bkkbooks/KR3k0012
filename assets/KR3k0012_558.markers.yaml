  - {type: variant, offset: 2830, length: 316, content: 年行幸江寧經司徒劉穆之墓遣使致祭焉後魏書曰李冲字思順高祖時為尚書僕射卒葬覆舟山近杜預冢高祖之意也後車駕自鄴還洛經冲墓左右以聞高祖臥疾望墳掩淚又曰傅永字脩常登北邙於平坦豦奮矛躍馬盤旋瞻望有終焉之志遠慕杜預近好李冲王肅欲附葬於墓遂買左右地數畝遺勑子叔偉曰此吾之永宅也禮系曰天子墳高三雉諸侯半之卿大夫八尺士四尺天子樹松諸侯樹柏卿大夫樹楊士樹榆尊卑差也楚漢春秋曰惠帝崩呂太后欲為高墳使從未央宮坐而見之諸將諫不許東陽侯垂泣曰日夜見惠帝冢悲哀流涕無以死傷生也臣竊哀之於是太后乃止蕭方等三十國春秋曰晉義熙九年盜發故驃騎將軍卞壺墓剖棺掠之壺屍面如生兩手悉拳爪生達背戰國策曰齊宣王見顏觸曰觸前觸亦曰王前王作色曰士貴乎觸曰士貴昔秦攻齊令曰有敢去柳下季壟, SBCK: 百}
