  - {type: variant, offset: 1855, length: 705, content: 早孤以至孝稱值天下亂野無煙火而郍刑獨在家側每賊過見其尚幼而有志節奇而哀之後漢書曰楊震字伯起改葬華陰遠近畢至先葬日有鳥高丈餘喪前悲鳴葬畢乃去於是立石鳥象於其墓所又曰郭伋徵太中大夫卒時年八十六帝親臨賜冢塋地又曰種暠上音冲下音杲為遼東郡薨并涼邊民咸為發哀匈奴聞暠卒舉國傷惜單于每入朝賀見墳墓輒哭祭又曰帝祠章陵過湖陽祠樊重墓追爵謚為壽張敬侯立廟於湖陽車駕每南巡常幸其墓賞賜大會又曰韓稜遷南陽太守特聽得過家上冢鄉里以為榮又曰蔡順母平生畏雷自亡後每有雷震順輒圜冢泣曰順在此後太守鮑眾舉孝廉順不能遠離墳墓遂不就又曰溫序拜謁者遷護羗校尉序行部至襄武為隗囂別將茍字所拘劫仗劍而死序主簿韓遵從事王忠持屍歸殮光武聞而憐之命忠送喪到洛陽城傍為冢地賜穀千斛縑五百疋除三子為郎中長子壽服竟為邸平侯相夢序告之曰久客思鄉里壽即棄官上書乞骸骨歸葬帝許之乃反舊塋焉魏略曰曹操微時人莫知之唯橋玄見而異焉謂曰今天下將亂安生民者其在君乎操感其知己及後經過玄墓輒悽愴致祭魏志曰管輅過母丘儉墓下倚樹哀吟曰玄武藏頭倉龍無足白虎衘尸朱雀悲哭四危以備法當滅族卒如其言又曰幽州牧劉虞署田疇為從事奉使未至虞已為公孫瓚所害及至謁祭虞墓陳章表哭泣而去吳書曰孫堅家于富春葬於城東冢上數有光怪雲氣五色王隱晉書曰初太康元年汲縣民盜發魏安釐王冢得竹書漆字又曰交廣記吳將呂岱為廣州遣掘尉他冢費損無獲他雖僣侈然慎終其身乃令後不知其豦鑒於牧堅所殘也又曰愍帝建興中曹嶷發景公及管仲冢尸並不朽繒帛可服珍寶巨萬又曰金鄉縣比鑿石為冢云得曰虵白兔及得金故曰金人又曰王褒字偉元少立操尚父為晉文王所害絕世不仕立屋墓側以教授為務旦夕常至墓前朝拜輒悲號斷絕墓前一柏樹褒常所攀涕所著樹色與凡樹不同書曰滕修, SBCK: ''}
