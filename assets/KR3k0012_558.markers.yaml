  - {type: variant, offset: 101, length: 0, content: '', WYG: 不朽者也吕氏春秋曰世之為丘壟也其大若山其樹若林以此觀世示富則可矣以此為死則不可自古及今未有不亡之國者則是無不掘之墳也是故大墓無不掘者而世争}
