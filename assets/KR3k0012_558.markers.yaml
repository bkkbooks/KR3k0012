  - {type: variant, offset: 215, length: 424, content: 前處昭穆之中央以爵等為丘封之度與樹數別尊卑也王公曰丘諸臣封漢律曰列侯墳高四尺關內侯以下至庶人各有差大喪記有曰請庶甫竁遂為之尸竁尸絹切又士納切葬穿壙也又音毳及竁以度為丘遂共喪之窆器及葬言鸞車象人鸞車巾車所飾遣車也亦設鸞於象人謂以芻為人言問其不如法度者及窆報斧以涖臨下棺也遂入藏凶器正墓域守墓蹕墓域守墓禁位謂丘封所居前後之禁所為榮限凡祭墓為尸凡諸侯及諸臣葬於墓者授之兆為之蹕均其禁又曰墓大夫掌凡邦墓之域為之圖凡邦中之墓地民所葬地令國民族葬而掌其禁令族葬各徒其親凡爭墓地者聽其獄訟師其屬而巡墓厲居其中之室以守之厲營限遮列處禮曰適墓不登壟為甘不敬壟冢也墓塋域助葬必執紼葬喪之大事紼引車索又曰孔子既得合葬於防言既得者少孤不知其墓曰吾聞之古者墓而不墳墓謂兆域土之高者曰墳也今丘也東西南北之人不可以不識音志也於是封之崇四尺四尺蓋周之制也孔子先反當脩虞事門人後雨甚至後持封也孔子問焉曰爾來何遲也曰防墓崩孔子不應三三言之以孔子弗問孔子泫然流涕曰吾聞之也古不脩墓脩猶治, SBCK: 十六丗孫}
