  - {type: variant, offset: 162, length: 0, content: '', SBCK: 金精上地爲白虎據墳故以爲虎丘越傳曰禹到大越上苗山更名山曰㑹稽因死葬焉穿壙􅀷七尺上無寫泄下無流水壇髙三尺土階三等周方一􅅿華陽國志曰周失綱紀蜀先稱王有名􅅙藂其目縱死作石階石棺國人化之故俗以石棺椁爲縱目人冢又曰蜀有五丁能移山舉萬鈞其王薨輙立大石長三丈重千鈞爲墓志又曰蜀遣使朝􅁗􅁗惠王許嫁五女於蜀蜀遣五丁力士奉迎虵山崩同時壓殺五丁及􅁗五女蜀王痛傷命曰五婦冢今其人或名五丁冢又曰武都有一丈夫化爲女子美而艶盖山精也蜀王納爲妃不習水土欲去王必留之乃作東平之歌以樂之無幾殁故王哀之乃遣五丁之武都擔士爲妃作冢三輔决録曰竇后父名猗遭􅁗亂隱身鈎魚墜淵而卒后登尊號遣使者於父墜所築起大墳丗􅀃曰戴公見林法師墓曰德音未逺而拱木巳積冀神理綿綿不與氣運俱盡耳又曰黄􅀄末呉人發長沙王呉芮冢}
