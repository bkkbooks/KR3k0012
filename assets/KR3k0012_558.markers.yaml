  - {type: variant, offset: 160, length: 1, content: 居, SBCK: 臨海潮千萬人築治之以葬}
  - {type: variant, offset: 160, length: 2, content: 居後, WYG: 奉迎蛇山崩同時厭殺五丁及秦五女蜀王痛傷命曰五婦塜今其人或名五丁塚又曰武都有一丈夫化為女子美而艶葢山精也蜀王納為妃不習水土欲去王必留之乃作東平之歌以樂之無幾殁故王哀之乃遣五丁之武都擔土為妃作冢三輔夾録曰竇后父名倚遭秦亂隠身釣魚隊淵而卒后登尊號遣使者於父墜所築起大墳世說曰戴公見林法師墓曰徳音未逺而拱木已積冀神理綿綿不與氣運俱盡耳又曰黄初末吴人發長沙王吴芮冢}
