  - {type: variant, offset: 90, length: 0, content: '', krp: 大獲寳物客竊取以遺山圗山圗不受簿以還官齊書曰栁丗隆曉數術於倪塘創墓與賔客踐履十往五往常坐豦及卒墓工圗墓取其坐豦焉又曰王倫之爲豫章太守下車祭徐孺子許子將墓又曰𥘉荀伯玉微時有善相墓者謂其父曰君墓當丗暴貴者但不得乆耳又出失行女子伯玉聞之曰朝聞道夕死可矣頃之伯玉姑當嫁明日應行今夕逃隨}
  - {type: variant, offset: 91, length: 1, content: 掌, SBCK: 去尋求不能得後出家爲尼伯玉卒敗亡又曰冨陽人唐㝢之僑居桐廬父祖相傳啚墓爲業㝢之自云其冢墓有王氣山中得金轉相誑惑永明二年冬㝢之聚黨遂䧟冨陽至錢塘又曰始興王鑑鎮蜀於州園地得古冢無復棺但有石椁銅器十餘種並古形玉璧三枚珎寳甚多不可皆識金銀爲蚕形者數斗又以朱砂爲阜水銀爲池左右咸勸取之鑑曰皇太子昔在雍有發古冢者得玉鏡玉屏風玉匣之屬皆將還都吾意常不同乃遣功曹何佇之爲起墳諸寳物一不得犯又曰宜都王鑑鎭姑熟于時人發桓温女冢得金巾箱織金􅑪爲嚴器又有金蚕銀蠒等物甚多條以啓聞欎林勑以賜之鑑曰今取往物後取今物如此循環豈可熟念使長史蔡約自徃脩復纎毫不犯又曰文惠太子鎮雍州有盗發古冢者相傳云是楚王冢大􅀗寳物玉履玉屏風竹書青絲綸簡廣數分長二丈皮節如新有得十餘簡以示王僧䖍云是科斗書考工記周官所闕文也南史曰齊前將軍陳天福坐討唐寓之於錢塘掠奪百姓財物棄市先是天福將行令家人預作壽冢未至東又信催速就冢成而得罪因以葬焉梁書曰丁貴嬪薨昭明太子遣人求得善墓地將斬草有賣地者因閫人俞三副求市􅀂得錢三百萬與之三副密啓武帝言太子所得地不如今所得地於帝􅁻帝末年多忌便命市之葬畢有道士善圗墓云地不利長子􅀂厭伏或可申延乃爲蠟鵝及諸物埋墓側長子位有宫􅁥鮑邈之魏雅者二人􅀄並爲太子所愛邈之晚見踈於雅宻啓武帝云雅爲太子厭禱帝宻遣檢􅀧果得鵝等物大驚將窮其事徐勉固諌得止唯誅道士又曰蕭斆太清􅀄爲梁州長史梁州有古墓名曰尖冢或云張騫墳欲有發者輙聞鼓角與外相拒堆埋者懼而退斆謂無此理求自􅁥督及開唯有銀鏤銅鏡方尺唐書曰代宗時號州刺史王竒光上言閿郷縣女媧墓去天寳末失所在今一夜河上側近忽聞風雷声曉見其墓踊出上有􅀟栁樹下有巨石其栁各髙丈餘又曰天后西幸京師路經楊􅀇感墓上誦李百藥過玄感墓詩云劒有萬人敵文爲一代英除昏志不遂僣亂道難平歎曰百藥唯解綴文不識大義又曰韓恩復則天朝爲太常慱士定南郊儀注云太妃鼓吹排羣邪守大體國家頼之睿宗朝爲給事活嚴善思於雷霆之下拒武三思於䧟附之中􅀇宗御筆題碑云有唐忠孝韓長}
