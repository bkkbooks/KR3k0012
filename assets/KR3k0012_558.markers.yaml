  - {type: variant, offset: 53, length: 0, content: '', SBCK: 王􅀇謨從弟􅀇象位下邳太守好發冢地無完椁時人間垣内有小冢墳上殆平毎朝日􅀄升見一女子立冢上近視則亡或以告􅀇象便命發之有一棺尚全有金蚕銅人以百數剖棺見一女子可二十姿質􅀂生卧而言曰我東海王家女應生資財相奉幸勿見害女臂有玉釧斬臂取之於是女復死又曰大明三年孝}
  - {type: variant, offset: 53, length: 0, content: '', WYG: 王𤣥謨從弟𤣥象位下邳太守好發塜地無完椁時人間垣内有小塜墳上始平每朝日初升見一女子立塜上近則亡或以吿𤣥象便命發之有一棺尚全有金蠶銅人以百數剖棺見一女子可二十姿質若生卧而言曰我東海王家女應生資財相奉幸勿見害女臂有玉釧斬臂取之於是女復死又曰大明三年孝}
  - {type: page-break, offset: 53, content: '', id: KR3k0012_WYG_558-1b, image: WYG0898/WYG0898-0163b.png}
  - {type: variant, offset: 53, length: 0, content: '', krp: 王玄謨從弟玄象位下邳太守好發冢地無完椁時人間垣内有小冢墳上殆平毎朝日𥘉升見一女子立冢上近視則亡或以告玄象便命發之有一棺尚全有金蚕銅人以百數剖棺見一女子可二十姿質若生卧而言曰我東海王家女應生資財相奉幸勿見害女臂有玉釧斬臂取之於是女復死又曰大明三年孝}
  - {type: variant, offset: 54, length: 0, content: '', SBCK: 幸籍田經􅀽湛墓使致􅀕増守墓五户又曰何承天􅀶見古今爲一時所重張永甞開􅀇武湖遇古冢冢上得一銅斗有柄文帝以訪於朝士承天曰此亡新威斗}
  - {type: page-break, offset: 54, content: '', id: KR3k0012_SBCK_558-1b}
  - {type: variant, offset: 54, length: 0, content: '', WYG: 幸籍田經袁湛墓使致祭増守墓五户又曰何承天博見古今為一時所重張永甞開𤣥武湖遇古塜塜上得一銅斗有柄文帝以訪於朝士承天曰此亡新威斗}
  - {type: variant, offset: 54, length: 0, content: '', krp: 幸籍田經袁湛墓使致祭増守墓五户又曰何承天博見古今爲一時所重張永甞開玄武湖遇古冢冢上得一銅斗有柄文帝以訪於朝士承天曰此亡新威斗}
