  - {type: variant, offset: 95, length: 0, content: '', SBCK: 墓晝夜號哭未浹日夢寐有指導焉遂發壠果得舊記驗又曰盧坦爲侍御史㑹李錡反有司請毀錡祖父廟墓坦甞爲錡從事乃上言曰淮安王神通有功於草昧且古之父子兄弟罪不相及況以錡故可累五代祖乎乃不毀因賜神通墓五戸以備洒掃白虎通曰春秋之義王者墳髙三仞樹以松諸侯半之樹以栢大夫八尺樹以欒士四尺樹以槐庶人無墳樹以楊栁晏子曰梁丘據死景公召晏子告之據曰忠臣愛我欲厚葬之髙大其壟晏子對曰不可公遂止列子曰燕人長於楚老而還過晉國同行者給之指城曰此燕國之城其人愀然變容指社曰此􅀂里之社􅀂猶汝也乃喟然而歎指舎曰此君先人之廬乃泫然而泣指壠曰􅀂先人之冢其哭不自禁同行者啞然大􅀏曰余等給君乃晉國耳其人慙及至燕國之城社眞見先人之廬冢悲心更微􅀓子曰太原民發冢破棺中有婦人將出與語生人也視其冢上木三十􅀊不知此婦人三十􅀊常生}
  - {type: page-break, offset: 95, content: '', id: KR3k0012_SBCK_558-4a}
  - {type: variant, offset: 95, length: 0, content: '', WYG: 墓晝夜號哭未浹日夢寐有指遵焉遂發壟果得舊記驗又曰盧坦為侍御史會李錡反有司請毀錡祖父廟墓坦常為錡從事乃上言曰淮安王神通有功於草昧且古人之父子兄弟罪不相及况以錡故可累五代祖乎乃不毀因賜神道守墓五户以備洒掃白虎通曰春秋之義王者墳高三仞樹以松諸侯半之樹以栢大夫八尺樹以欒士四尺樹以槐庶人無墳樹以楊晏子曰梁丘據死景公召晏子吿之曰據忠臣愛我欲厚葬之高大其壟晏子對曰不可公遂止列子曰燕人長於楚老而還過晉國同行者紿晉之城指曰此燕國之城其人愀然變容紿指社曰此若里之社若猶汝也乃喟然而嘆指舎曰此若先人之廬乃泫然而泣指壟曰若先人墓其哭不自禁同行者啞然大笑曰余等紿乃晉國耳其人大慚及至燕國之城社真見先人之廬塜悲心更微傅子曰太原人發塜破棺中有婦人將出與語生人也視其塜上木三十歲不知此婦人三十歲常生}
