  - {type: punctuation, offset: 89, content: 「, id: KR3k0012_CHANT_558-bkkpn40}
  - {type: variant, offset: 89, length: 0, content: '', SBCK: 張􅁉曽祖澄當葬父郭璞爲占墓地葬某豦年過百􅀊位至三司而子孫不蕃某豦年幾减半裁卿校而後累丗貴顯澄乃葬其劣豦位至光禄年六十四而亡其子孫遂昌又曰周山圗爲淮南太守時盗發桓温}
  - {type: variant, offset: 89, length: 0, content: '', WYG: 張裕曽祖澄當葬父郭璞為占墓地葬某處年過百歲位至三司而子孫不蕃某處年幾減半位裁卿校而後累世貴顯澄乃葬其劣處位光禄年六十四而亡其後子孫遂昌又曰周山圖為淮南太守時盗發桓温塜大得寳物客竊取以遺山圖山圖不受簿而還官齊書曰栁世隆曉數術於倪塘創墓與賓客踐履十往五往有常坐處及卒墓正取其坐處焉又曰王倫之為豫章太守下車祭徐孺子許子將墓又曰初荀伯玉微時有善相墓者謂其父曰君墓當出暴貴者但不乆耳又出失行女子伯玉聞之曰朝聞道夕死可矣頃而伯玉姊當嫁明日應行今夕逃隨人去尋求不能得後出家為尼伯玉卒敗亡又曰富陽人唐㝢之僑居桐廬父祖相傳圖墓為業㝢之自云其塜墓有王氣山中得金轉相誑惑永明二年冬㝢之聚黨遂陷富陽至錢塘又曰始興王鑑鎮蜀於州園地得古塜無復棺但有石椁銅器十餘種並古形玉璧三枚珍寳甚多不可皆識金銀為蠶形者數斗又以朱沙為阜水銀為池左右咸勸取之鑑曰皇太子昔在雍有發古塜者得玉鏡玉屏風玉匣之屬皆將還都吾意常不同乃遣功曹何佇之為起墳諸寳物一不得犯又曰宜都王鑑鎮姑熟于時人發桓温女}
