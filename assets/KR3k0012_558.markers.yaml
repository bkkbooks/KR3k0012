  - {type: variant, offset: 89, length: 0, content: '', krp: 張𥙿曽祖澄當葬父郭璞爲占墓地葬某豦年過百歲位至三司而子孫不蕃某豦年幾减半裁卿校而後累丗貴顯澄乃葬其劣豦位至光禄年六十四而亡其子孫遂昌又曰周山圗爲淮南太守時盗發桓温}
  - {type: variant, offset: 90, length: 0, content: '', SBCK: 大􅀗寳物客􅀼取以遺山圗山圗不受簿以還官齊書曰栁丗隆曉數術於倪塘創墓與賔客踐履十往五往常坐豦及卒墓工圗墓取其坐豦焉又曰王倫之爲豫章太守下車􅀕徐孺子許子將墓又曰􅀄荀伯玉微時有善相墓者謂其父曰君墓當丗暴貴者但不得乆耳又出失行女子伯玉聞之曰朝聞道夕死可矣頃之伯玉姑當嫁明日應行今夕逃隨}
  - {type: page-break, offset: 90, content: '', id: KR3k0012_SBCK_558-2a}
  - {type: variant, offset: 90, length: 0, content: '', WYG: 得金巾箱織金篾為嚴器又有金蠶銀璽等物甚多條以啓聞鬱林勅以賜之鑑曰今取往物後取今物如此循環豈可熟念使長史蔡約自往脩復纎毫不犯又曰文惠太子鎮雍州有盗發古塜者相傳云是楚王塜大獲寳物玉履玉屏風青絲綸簡廣數分長二尺皮節如新有得十餘簡以示王僧䖍云是科斗書考工記曰周官所闕文也南史曰齊前將軍陳天福坐討唐㝢之於錢塘掠奪百姓財物棄市先是天福將行令家}
