  - {type: variant, offset: 1702, length: 150, content: 通首創大謀每幸南陽常遣使者以太牢祠通父冢又曰建武三年以皇祖皇考墓為昌陵後改為章陵因以舂陵為章陵縣二十六年春正月初作壽陵將作大匠竇融上言園陵廣袤無慮所用帝曰古帝王之葬皆陶人瓦器木車茅馬使後世之人不知其處太宗識終始之義景帝能遵孝道遭天下反覆而獨完其福豈不美哉今所制地不過二三頃無為陵地裁令流水而已又曰郍刐, SBCK: 善}
