  - {type: variant, offset: 3148, length: 205, content: 步而樵採者罪死不赦令曰有能得齊王頭封萬戶由是觀之生王之頭不如死士之壟崔鴻前趙錄曰張嵩壟西人也事母至孝母喪既葬於墓側哀感幽顯歲餘而墓地自裂棺亦自破母還蘇活方言曰冢秦晉之間謂之墳取名於大防也或謂之培音部或謂之愉音曳或謂之采古者卿大夫有菜地葬之因名云也或謂之垠或謂之壟有界埒似耕龔四名云也自關以東謂之丘小者謂之塿培塿亦高之所名之也大者謂之丘凡葬而無墳謂之墓言所不封也墓猶墓之所以安墓謂之撫撫謂規度墓地漢書曰初陵撫是也, SBCK: 八}
