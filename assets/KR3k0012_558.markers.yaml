  - {type: variant, offset: 103, length: 1, content: 圖, SBCK: 効也吕氏春秋曰丗之爲丘壟也其大􅀂山其樹􅀂林以此觀丗示冨則可矣以此爲死則不可自古及今未有不亡之國者則是無不掘之墓也是故大墓無不掘者而丗争爲之豈不悲哉堯葬於􅂖林通樹枝舜葬於紀市不變其肆禹葬於㑹稽不變人徒是故}
