  - {type: variant, offset: 1959, length: 569, content: 蘭根慰喻洛邑且觀帝之為人蘭根忌帝雅德還致毀謗竟從崔㥄音陵議廢帝於崇訓佛寺而立平陽王脩是為孝武帝五月帝殂於門下外省時年三十孝武帝詔百司赴會大鴻臚監護事葬用王禮加以九旒鑾輅黃屋左纛班劍百二十人後西魏追謚節閔皇帝後廢帝安定王後魏書曰後廢帝諱朗字仲哲章武王融第三子也母曰程氏少稱明司永安二年為肆州魯郡王後軍府司馬元曄之建明二年正月為冀州渤海太守及高歡起義兵將誅暴逆乃推載之冬十月即皇帝位於信都城西升壇柴燎大赦稱中興元年以高歡為侍中丞相都督中外諸軍事大將軍錄尚書大行臺增邑三萬戶以兼侍中撫河北大使高乾邕為侍中司空以前平北將軍通直散騎常侍高敖曹為驃騎大將軍儀同三司冀州刺史以終其身十一月高歡率師攻鄴城二年春正月拔鄴擒刺史劉誕二月以高歡為大丞相柱國大將軍太師增封三萬戶并前為六萬戶三月以齊文襄王起家為驃騎大將軍儀同三司車駕幸鄴閏月爾朱天光兆度律仲遠等屯於洹水之南高歡出頓紫陌爾朱兆率輕騎三千夜襲鄴城叩西門不剋退走高歡大破爾朱天光等四胡於韓陵前廢帝鎮軍將軍賀拔勝徐州刺史杜德於陣降爾朱兆走并州仲遠奔東郡天光度律將赴洛陽大都督斛斯椿賈顯智倍道先還夏四月椿等據河橋懼罪自效尋擒天光度律於河橋西北大行臺長孫稚都督賈顯智等率騎入京師執爾朱世隆彥伯斬於都街口送天光度律於高歡爾朱仲遠奔蕭衍車駕至河陽仍遜於別邸太昌元年五月封安定郡王邑一萬戶後以罪殂於門下外省時年二十, SBCK: ''}
