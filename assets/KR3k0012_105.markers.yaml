  - {type: variant, offset: 2530, length: 1416, content: 二年葬鄴西南野馬崗孝武皇帝後魏書曰孝武皇帝諱脩字孝則廣平武穆王懷之第三子母曰李氏性沉厚少言好武治封汝陽縣公拜通直散騎侍郎轉中書侍郎建義初除散騎常侍尋遷平東將軍兼太常卿又為鎮東將軍宗正卿永安三年封平陽王普泰初轉侍中鎮東將軍儀同三司兼尚書左僕射又加侍中尚書右僕射中興二年夏四月安定王自以踈遠未允四海之心請遜大位齊獻武王高歡與百寮會謂僉謂高祖不可無後乃共奉王即帝位於東郭之外自來陽雲龍門御太極前殿群臣朝賀禮畢升閶闔門大赦天下改中興二年為太昌元年帝以世易除復齊獻武王為大丞相大將軍還鄴車駕餞別於乾脯山殺大司馬汝南王悅大赦天下改太昌為永興以同太宗時號尋改為永熙二年春正月車駕幸崧高石窟靈巖寺十二月車駕狩於嵩陽遂幸溫湯車駕還宮三年春二月壬子大赦壬午封左衛將軍元斌之為頴川王夏四月癸丑日有蝕之五月丙戌直勳府庶子箱別六百人騎官箱別二百人閤內部曲數千人帝內圖高歡乃以斛斯椿為領軍使興王思玫等統之以為心膂軍謀朝政咸決於椿分置督將及河南關西諸刺史辛卯下詔戒嚴楊聲伐梁實謀北討秋七月己丑帝親總六軍率南陽王寶炬清河王亶廣陽王湛斛斯椿以五千騎宿於瀍西陽王別舍沙門都維郍惠臻負璽持千牛刀以從有牛百頭盡殺以食軍士眾知帝將出其夜亡者過半清河廣陽二王亦逃歸略陽公宇文泰遣都督駱超李賢和各領數百騎赴駱超先至甲戍賢和會帝於崤中己酉高歡入洛遣疋屢昭及河南尹元子思領左右侍官追帝請廻駕高昂率勁卒及帝於陜西帝楊鞭長騖至湖城飢渴甚有王思村人以麥飯壺漿獻帝甘之復一村十年帝至稠桑潼關大都督毛洪賓迎獻食八月宇文泰遣大都督趙貴梁禦甲騎二千來赴乃奉迎帝過河謂禦曰此水東流而朕西上若得重謁洛陽廟是卿等功也帝及左右皆流涕宇文泰迎於東陽帝勞之將士皆呼萬歲遂入長安以雍州公廨為宮大赦甲寅高歡推司徒清河王亶為大司馬承制總萬機居尚書省歡追車駕至潼關九月己酉歡東還洛陽帝親督眾攻潼關斬其行臺華長瑜冬十月高歡推清河王亶子善見為主徙都鄴是為東魏魏於此始分為二十二月帝崩時年二十五謚曰孝武葬雲陵文皇帝後魏書曰文皇帝諱寶炬孝文皇帝之孫京兆王愉之子也母曰楊氏帝正始初坐父愉罪兄弟皆幽宗正寺及宣武崩乃得雪正光中拜直問將軍時胡太后嬖寵帝與明帝謀誅之事泄免官武泰中封劭縣侯永安三年進封南陽王孝武即位拜太尉加侍中永熙二年進位太保開府尚書令三年孝武與高歡構難以帝中軍四面大都督及從入關拜太宰錄尚書事孝武崩丞相略陽公宇文泰率群公卿士奉表勸進三讓乃許焉大統元年春三月戊申帝即位於城西大赦改元追尊皇考為文景皇妣楊氏為后己酉進丞相略陽公宇文泰都督中外諸軍錄尚書事大行臺改封安定郡公以尚書令斛斯椿為太保廣平王贊為司徒乙卯立妃乙氏為皇后二年春正月辛亥祀南郊改以神元皇帝配東魏攻陷夏州三年冬十月安定公宇文泰大破東魏軍於沙苑拜泰柱國大將軍四年春正月辛酉拜天於清暉室終帝世遂為常二月東魏攻陷南汾頴豫廣四州廢皇后乙氏三月立蠕蠕而蠢切女都九閭氏為皇后大赦秋七月東魏將侯景等圍洛陽帝與安定公宇文泰東伐九月車駕至東伐五年冬十月於陽武門外懸鼓置紙筆以求得失六年春正月庚戌朝群臣自西遷至此禮樂始備七年十二月御憑雲觀引見諸王敘家人之禮手詔為宗誡十條以賜之八年春正月初置六軍十六年五月東魏靜帝遜位於齊秋七月安定公宇文泰東伐至恒農齊師不出乃還九月大赦十七年春正月庚戍帝崩于乾安殿時年四十五葬於永陵謚曰文皇帝廢帝後魏書曰廢帝名欽文皇帝之長子也母曰乙皇后大統元年正月乙卯立為皇太子十七年三月即皇帝位二年秋八月大將軍尉遟逈剋成都劍南平冬十一月安定公宇文泰殺尚書元烈, SBCK: ''}
