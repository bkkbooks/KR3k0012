  - {type: variant, offset: 43, length: 236, content: 勰有魯陽翼衛之功封帝武城縣開國公幼侍肅宗書於禁內及長風神秀慧姿貌甚美拜中書侍郎城門校尉兼給事黃門侍郎雅為肅宗所親待長直禁中遷散騎常侍御史中尉孝昌二年八月進封長樂王轉侍中中軍將軍及武太元年春二月肅宗崩大都督爾朱榮將兵向京師謀欲廢立以帝家有忠勳且兼人望陰與帝通榮乃帥眾來赴夏四月帝與兄弟夜北渡河會榮於河陽南濟河即帝位以兄彭城王紹為無上王弟霸成公子正為始平王榮為侍中都督中外諸軍事大將軍尚書令領軍將軍領左右衛封太原王百僚相率有司奉璽綬備法駕奉迎於河梁車駕巡河西至淘渚榮以兵權在已, SBCK: 爲主}
