  - {type: variant, offset: 5743, length: 1, content: 渤, WYG: 右一軍總管圮國公亮為右二軍總管隋國公楊堅為右三軍總管譙王儉為左一軍總管大將軍竇恭為左二軍總管廣化公丘崇為左三軍總管齊王憲陳王純為前軍六年春正月尉遲勒擒齊王及其太子恒於青州四月乙巳至自東伐列齊王於前其王公等並從車輦旗幟及器物以次陳於其後授大駕布六軍備凱樂獻俘於太廟京邑觀者皆稱萬嵗戊申封齊王為温國公宣政元年三月於蒲州置宫廢同州及長春宫甲戌初服常冠以皂紗為之加簮而不施纓導其制若今之折角巾也上大將軍郯國公王軌破陳師於吕梁擒其將呉明徹等俘斬三萬餘人五月己丑帝總戎北伐遣柱國平原公姬願東平公宇文静舉等率軍五道俱入發闗中公私驢馬悉從軍癸巳帝不豫止於雲陽宫丙申詔停諸軍事六月丁酉帝疾甚還京其夜崩於乘輿時年三十六諡曰武皇帝廟稱髙祖塟孝陵宣皇帝後周書曰宣皇帝諱贇字乾伯髙祖長子也母曰李太后武成元年生於同州保定元年五月丙子封魯國公建徳元年四月癸巳髙祖親告廟冠於阼階立為皇太子詔皇太子巡撫西土文宣皇后崩髙祖諒隂詔太子總朝政五旬而罷髙祖每巡幸四方太子常留監國五年二月又詔皇太子巡西土因討吐谷渾宣政元年六月丁酉髙祖崩戊戌太子即皇帝位尊皇后為皇太后大象元年春正月癸酉受朝於露門帝服通天冠絳紗袍羣臣皆服漢魏衣冠大赦改元大成初置四輔官以上柱國大冢宰越王盛為大前疑相州總管蜀國公尉遲逈為大右弼申國公李穆為大左輔大司馬隋國公楊堅為大後丞二月辛巳詔曰皇太子衍地居上嗣正統所歸逺慿積徳之休允協無疆之祚帝王之量不肅而成天祿之期不期已至朕今傳位於衍乃睠四}
