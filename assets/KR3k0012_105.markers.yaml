  - {type: variant, offset: 5039, length: 3, content: 徙新宮, WYG: 癸丑朔大㑹羣臣於紫極殿始用百戯三月辛酉重陽閣成㑹羣公列將卿大夫及突厥使者於芳林園賜錢帛各有差夏四月帝因食遇毒庚子大漸辛丑崩於延夀殿時年二十七諡曰明皇帝廟稱世宗葬昭陵武皇帝後周書曰髙祖武皇帝諱邕字禰羅突太祖第四子也母曰叱奴太后大統九年生於同州有神光照室㓜而孝敬聡敏有器質太祖異之曰成吾志者必此兒也年十二封輔城郡公孝閔帝踐祚拜大將軍出鎮同州世祖即位遷柱國授蒲州諸軍事蒲州刺史武成元年入為大司空治御正進封魯國公領宗師甚為世宗所親愛朝廷大事多共參議性沉深有逺識非因問終不敢言世宗每嘆曰夫人不言言必有中武成二年世宗崩遺詔傳位於帝帝固辭百官勸進乃從之壬寅即皇帝位}
