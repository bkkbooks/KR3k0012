  - {type: variant, offset: 3534, length: 316, content: 景皇妣楊氏為后己酉進丞相略陽公宇文泰都督中外諸軍錄尚書事大行臺改封安定郡公以尚書令斛斯椿為太保廣平王贊為司徒乙卯立妃乙氏為皇后二年春正月辛亥祀南郊改以神元皇帝配東魏攻陷夏州三年冬十月安定公宇文泰大破東魏軍於沙苑拜泰柱國大將軍四年春正月辛酉拜天於清暉室終帝世遂為常二月東魏攻陷南汾頴豫廣四州廢皇后乙氏三月立蠕蠕而蠢切女都九閭氏為皇后大赦秋七月東魏將侯景等圍洛陽帝與安定公宇文泰東伐九月車駕至東伐五年冬十月於陽武門外懸鼓置紙筆以求得失六年春正月庚戌朝群臣自西遷至此禮樂始備七年十二月御憑雲觀引見諸王敘家人之禮手詔為宗誡十條以賜之八年春正月初置六軍十六年五月東魏靜帝遜位於齊秋七月安定公宇文泰東伐至恒農齊師不出乃還九月大赦十七年春正月庚戍, WYG: ''}
