  - {type: variant, offset: 5039, length: 3, content: 徙新宮, SBCK: 癸丑朔大㑹羣臣於紫極殿始用百戯三月辛酉重陽閣成㑹羣公列將卿大夫及突厥使者於芳林園賜錢帛各有差夏四月帝因食遇毒庚子大漸辛􅐫崩於延壽殿時年二十七謚曰明皇帝廟稱丗宗葬昭陵武皇帝後周書曰髙祖武皇帝諱邕字祢羅突太祖第四子母曰叱奴太后大統九年生於同州有神光照室㓜而孝敬聦敏有器質太祖異之曰成吾志者必此兒也年十二封輔城郡公孝閔帝踐祚拜大將軍出鎮同州丗祖即位遷柱國授蒲州諸軍事蒲州刺史武成元年入爲大司空治御正進封魯國公領宗師甚爲丗宗所親愛朝廷大事多共叅議性沉深有逺識非因顧問終不輒言丗宗毎歎曰夫人不言言必有中武成二年丗宗崩遺詔傳位於帝帝固讓百官勸進乃從之壬寅即皇帝位}
