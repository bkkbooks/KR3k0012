  - {type: variant, offset: 3950, length: 176, content: 安定公宇文泰廢而立齊王廓帝自元烈之誅有怨言淮安王育廣平王贊等并垂泣諫帝不聽故及於辱恭皇帝後魏書曰恭皇帝諱廓文帝之第四子也大統十四年封為齊王廢帝三年正月即皇帝位改元十一月師滅梁戕土良切梁元帝梁太尉王僧辨奉元帝子方智為王承制居建業三年春正月丁丑初行周禮建六官以安定公宇文泰為太師冢宰以柱國李弼為大司徒以趙貴為太保大宗伯以尚書令獨狐信為大司馬以于謹為大司寇以, SBCK: 岳與}
