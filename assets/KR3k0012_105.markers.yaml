  - {type: variant, offset: 5728, length: 9, content: 太原公高洋如晉陽八, SBCK: 詔曰道德交䘮禮義嗣興襃四始於一言美三千於爲敬是以在上不驕處滿不溢冨貴所以長守􅀖國於焉乂安故能承天静地和民敬􅄦明並日月道合四時朕雖庸昧有志前古甲子乙邜禮云不樂萇弘表昆吾之稔杜蕢􅀂恠切有楊觶音寘之文自丗道喪亂禮儀紊毀此典茫然巳墜于地昔周王受命請聞顓頊廟有戒盈之器室爲復禮之銘矧伊末學而能忘此冝依是日有事停樂庶知爲君之難爲臣不易貽之後昆殷鍳斯在四}
