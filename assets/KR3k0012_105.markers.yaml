  - {type: variant, offset: 280, length: 943, content: 有異志乃害靈太后及幼主次害無上王紹始平王子正公卿已下二千餘人列騎衛帝遷於便幕車駕入宮御太極殿大赦天下改武太為建義元年是月汝南王悅北海王顥臨淮王彧前後奔蕭衍郢州史元願達據城叛五月加大將軍爾朱榮北道大行臺以尚書右僕射元榮為東道大使征東將軍光祿勳元欣副之循方黜陟先行後聞大將軍爾朱榮還晉陽帝餞於邙陰六月通直散騎常侍高乾邕及弟帥合流民起兵於齊州之太原頻破州軍詔東道大使元欣喻旨乃降是月葛榮飢使其僕射任褒帥車三萬餘乘南寇至沁水幽州平北府主簿河開邢果帥河北流民十餘萬戶反於青州之北海自署濮王年號天統詔諸有司馬伏從戎者職人優兩大階詔當親御六戎掃清燕代大將軍太原王爾朱榮帥精銳十萬為左軍上黨王天穆總眾八萬為前軍司徒公楊椿勒兵十萬為右軍司空公穆紹統卒八萬為後軍是月葛榮眾退屯相州之北七月齊獻武王於鄴西北招慰葛榮別帥稱王者七人眾萬餘降之加大將軍爾朱榮柱國大將軍錄尚書事光州人劉舉聚眾數千反於濮陽自稱皇武大將軍是月高平鎮人万俟墨其二音醜奴僣大位署置百官八月葛榮帥眾圍相州九月詔太尉公上黨王天穆討葛榮次於朝歌以征東將軍齊州刺史元欣為沛郡王柱國大將軍爾朱榮率騎七千討葛榮於滏口破擒之餘眾帥降冀定滄瀛殷五州平大赦天下已改為永安元年以柱國大將軍太原王爾朱榮為大丞相都督河北畿外諸軍事冬十月蕭衍以北海王顥為魏主年號孝基入據南兗之銍音質城二年夏四月上黨王天穆齊獻武王大破邢果於齊州之濟南果降送京師五月元顥剋梁國內外戒嚴癸酉元顥陷滎陽甲戍夜車駕北巡幸河內景子元顥入洛戊寅太原王爾朱榮會車駕於長子即日反斾上黨王天穆北渡河會車駕於河內秋七月都督爾朱兆賀拔勝從硤石夜濟破顥子冠受及安豐王延明軍元顥敗走車駕入居華林園昇大夏門大赦天下宴勞天柱大將軍爾朱榮上黨王天穆及北平來督於都亭出宮人三百繒錦雜綵數萬疋班賜有差三年春三月雍州刺史爾朱天光討醜奴蕭寶寅於安定破擒之囚送京師六月嚈噠國獻師子九月天柱大將軍爾朱榮上黨王天穆自晉陽來朝帝殺榮及天穆於明光殿大赦天下遣武衛將軍奚毅前燕州刺史侯淵帥眾鎮北中是夜左僕射爾朱世隆榮妻鄉郡長公主帥榮部曲焚西陽門出屯河陰攻河橋擒毅等屠害之據北中城南逼京邑十月通直散騎常侍假平西將軍都督李苗以火舡焚河橋爾朱世隆退走壬寅爾朱世隆停建興之高都爾朱兆自晉陽來會之共推太原太守行并州刺史長廣王曄為主大赦所部號年建明, SBCK: 揔}
