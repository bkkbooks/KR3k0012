  - {type: variant, offset: 5742, length: 2, content: 為渤, SBCK: 責躬罪巳問以治政得失五年十月乙酉帝㹅戎東伐以越王盛爲右一軍㹅管􅂎國公亮爲右二軍㹅管隋國公楊堅爲右三軍㹅􅃹譙王儉爲左一軍㹅管大將軍竇恭爲左二軍惣管廣化公丘崇爲左三軍㹅管齊王憲陳王純爲前軍六年春正月尉遟勒擒齊主及其太子􅁪於青州四月乙巳至自東伐列齊主於前其王公等並從車轝旗幟及器物以次陳於其後大駕布六軍備凱樂獻俘於太廟京邑觀者皆稱萬􅀊戊申封齊主爲温國公宣政元年三月於蒲州置宫廢同州及長春宫甲戌􅀄服常冠以皂紗爲之加簮而不施纓道其制􅀂今之折角巾也上大將軍郯國公王軌破陳師於吕梁擒其將呉明徹等俘斬三萬餘人五月己􅐫帝揔戎北伐遣柱國平原公􅁎願東平公宇文紳舉等率軍五道俱入發関中公私馬驢悉從軍癸巳帝不豫止於雲陽宫丙申詔停諸軍事六月丁酉帝疾甚還京其夜崩於乗輿時年三十六謚曰武皇帝廟稱髙祖葬孝陵宣皇帝後周書曰宣皇帝諱贇字乾伯髙祖長子也母曰李太后武成元年生於同州保定元年五月景午封魯國公建徳元年四月癸巳髙祖親告廟冠於阼階立爲皇太子詔皇太子廵撫西土文宣皇后崩髙祖諒闇詔太子㹅朝政五旬而罷髙祖毎廵幸四方太子常留􅁥國五年二月又詔皇太子廵西土因討吐谷渾宣政元年六月丁酉髙祖崩戊戍太子即皇帝位尊皇后爲皇太后大象元年春正月癸酉受朝於露門帝服通天冠絳紗􅂁羣臣皆服漢魏衣冠大赦改元大成􅀄置四輔官以上柱國大􅃁宰越王盛爲大前疑相州㹅管蜀國公尉遟逈爲大右弼申國公李穆爲大左輔大司馬隋國公楊堅爲大後丞二月辛巳詔曰皇太子衍地居上嗣正統所歸逺慿積德之休允恊無􅆠之祚帝王之量不肅而成天禄之期不謀巳至朕今傳位於衍乃睠四}
