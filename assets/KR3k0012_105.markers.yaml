  - {type: variant, offset: 5138, length: 273, content: 黑獺於邙山大破之擒西魏臨洮王森蜀郡王榮宗江夏王昇鉅鹿王闡譙郡王亮追奔至恒農而還豫洛二州平二年春正月渤海王高歡請在并州置晉陽宮以處配沒之口三月渤海王世子高澄為大將軍五年春正月渤海王高歡薨於晉陽司徒侯景反頴州刺史司馬世雲以城附之景入據頴城誘執豫州刺史高元成廣州刺史暴顯等司空韓軌驃騎大將軍儀同三司賀技仁驃騎大將軍儀同三司可朱渾道元左衛將軍劉豐等率眾討之景乃遣使降於西魏請師救援西魏遣其將李景和王思政帥騎赴之思政等入據頴川景乃出走豫州侯景復背西魏歸於蕭衍衍置景為河南王大將軍承制六月司徒韓軌司空可朱渾道元等自頴川班師大將軍高澄迎勞於石濟高澄還晉陽秋七月, SBCK: 武百官各増四級}
