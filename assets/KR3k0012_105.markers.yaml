  - {type: variant, offset: 4227, length: 0, content: '', krp: 關西大都督洛陽縣公承制封拜使持節如故七月丁未從帝洛陽率輕騎入關太祖備儀衛奉迎謁見東陽驛八月齊神武襲䧟潼關侵華隂太祖率諸軍屯霸上以待之齊神武留其將薛瑾守關而退太祖乃進軍襲瑾虜其卒七千還長安進位丞相冬十月齊神武推魏清河王亶子善見爲主徙都於鄴是爲東魏閏十二月魏}
  - {type: variant, offset: 4228, length: 9, content: 武既入關渤海王高歡, WYG: 閔踐祚進位柱國轉岐州諸軍事岐州刺史治有美政黎民懐之及孝閔帝廢晉公䕶遣使迎帝於岐州秋九月癸亥至京師止於舊邸甲子羣臣上表勸進備法駕}
  - {type: variant, offset: 4229, length: 1, content: 既, SBCK: 帝崩太祖立魏南陽王寳炬爲嗣是爲文皇帝大統十七年春三月魏文帝崩皇太子嗣位太祖以􅃁宰㹅百揆三年魏帝有怨言魏臨淮王育廣平王賛等垂泣諌之帝不聽於是太祖與公卿定議廢帝立齊王廓是爲恭帝元年夏四月帝大饗群臣魏史栁虬執簡書􅁻於朝曰廢帝文皇帝之嗣子年七􅀊文帝託於安定公曰是子也才由于公不才亦由于公公冝勉之公旣受兹重􅀉居元輔之任又納女爲皇后遂不能訓誨有成致令廢黜􅀒文皇帝付嘱之意此咎非安定公而誰太祖乃令太常盧辯作誥諭公卿曰嗚呼我羣后曁衆士維文皇帝以襁褓之嗣託於予訓之誨之庶厥有成而予岡能弗變厥心庸曁乎廢墜我文皇帝之志嗚呼兹咎予其焉避子實知之矧爾衆人之心哉惟予之顔豈惟今厚將恐來丗以子爲口實乙亥魏帝詔封太祖子邕爲輔城公憲爲安城公邑各二千户三年九月太祖有疾還至雲陽命中山公護受遺輔嗣子冬十月乙亥崩於雲陽宫還長安發喪時年五十二葬于成陵謚曰文公孝閔帝受禪追尊爲文王廟曰太祖武成元年追爲文皇帝孝閔皇帝後周書曰孝閔皇帝諱覺字陁羅足太祖第三子也母曰元皇后大統八年生於同州七􅀊封略陽郡公時有善相者史元華見帝退謂所親曰此公子有至貴之相但恨其夀不足以稱之耳魏恭帝三年三月命爲安定公丗子十月乙亥太祖崩景子丗子嗣位爲太師大􅃁􅌠十二月丁亥魏帝詔以歧陽之地封帝爲周公庚子禪位於帝元年春正月辛􅐫即天王位柴燎告天朝百官於路門追尊皇考文公爲文王皇妣爲文后大赦天下封魏帝爲宋公帝性剛果見晉公護執政深忌之司㑹李植軍司馬孫􅁪以先朝佐命}
