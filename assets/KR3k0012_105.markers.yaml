  - {type: variant, offset: 4303, length: 507, content: 規是以殷遷八城周卜三地吉凶有數隆替無恒事由於通變理出於不得已故也高祖孝文皇帝式觀乾象俯協人謀發自武州來幸嵩縣魏雖舊國其命惟新及正光之季國步孔棘喪亂不已寇賊相侵俾我生民無所措手今遠遵古式深驗時事考龜襲吉遷澤漳滏庶克隆洪基再昌寶曆主者明為條格及時發邁車駕北遷詔渤海三高歡留後部分以衛軍大將軍尚書令元弼為驃騎大將軍儀同三司洛州刺史鎮洛陽十一月車駕幸鄴是冬蕭衍以元慶和為鎮北將軍魏王入據平瀨鄉孝武崩於長安二年春正月渤海王高歡襲擊山胡劉蠡升大破之詔以高歡為相國假黃鉞劍履上殿入朝不趨王固讓不受三月高歡討劉蠡升斬之蠡升子南海王復僣帝號高歡進擊破擒之及其第西海王皇后夫人王公已下四百餘人并獲逋逃之民二萬餘戶八月發七萬六千人營新宮十二月車駕狩於鄴是歲西魏文帝大統元年三月春正月詔加渤海王高歡九錫之禮遣侍中元子思敦喻固讓乃止二月詔加渤海王世子澄使持節尚書令大行臺大都督秋七月大赦天下四年夏四月遷七帝神主入新廟大赦天下先是蕭衍因益州刺史傅和請好遣李諧等使於蕭衍冬十月西魏遣其大行臺元季海大都督獨孤如願逼洛州行軍事廣陽王湛棄城退還季海如願遂據金墉頴川長史賀若徽執刺史田迅西叛引西魏都督梁廻據城西魏又遣其都督趙繼宗右丞韋孝寬等攻陷豫州大象, SBCK: ''}
