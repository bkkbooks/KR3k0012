  - {type: variant, offset: 5745, length: 5, content: 王高澄舉哀, SBCK: 深合謳歌之望俾予一人髙蹈風塵之表萬方兆庶知朕意焉可大赦天下改大成年爲大象元年帝於是自稱天元皇帝所居稱天臺冕二十有四旒車服於鼓皆以二十四爲節内史御正皆置上大夫皇帝衍稱正陽宫置納言御正諸衛等官皆准天臺尊皇太后爲天元皇太后二年五月甲午夜帝備法駕幸天興宫乙未帝不豫還宫詔隋國公堅入侍疾巳酉大漸御正下大夫劉昉與内史上大夫鄭譯矯制以隋國公堅受遺輔政是日帝崩於天德殿時年二十二謚曰宣皇帝葬定陵靜皇帝後周書曰靜皇帝諱衍後改爲闡宣帝長子也母曰朱皇后建徳二年六月生}
