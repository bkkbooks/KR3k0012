  - {type: variant, offset: 3992, length: 0, content: '', WYG: 帝元年夏四月帝大饗羣臣魏史栁虬執簡書於朝曰廢帝文皇之嗣子年七嵗文帝託於安定公曰是子也才由於公不才亦由於公公其勉之公既受兹重寄居元輔之任又納女為皇后遂不能訓誨有成致令廢黜負文皇帝付嘱之意此咎非安定公而誰太祖乃令太常卿盧辯作誥諭公卿曰嗚呼我羣后暨衆士維文帝以襁褓之嗣託於予訓之誨之庶厥有成而予㒺能革變厥心庸暨乎廢墜我文皇帝之志嗚呼兹咎予其焉避予實知之矧爾衆人之心㢤惟予之顏豈惟今厚將恐來世以予為口實乙亥魏帝詔封太祖子邕為輔城公憲為安城公邑各二千户三年九月太祖有疾還至雲陽命中山公䕶受遺輔嗣子冬十月崩於雲陽宫還長安發喪時年五十三葬于城陵諡曰文公孝閔帝受禪追尊為文王廟曰太祖武成元年追尊為文皇帝孝閔}
