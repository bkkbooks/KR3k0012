  - {type: variant, offset: 4227, length: 0, content: '', SBCK: 􅀜西大都督洛陽縣公承制封拜使持節如故七月丁未從帝洛陽率輕􅀐入􅀜太祖備儀衛奉迎謁見東陽驛八月齊神武襲䧟潼關侵華隂太祖率諸軍屯霸上以待之齊神武留其將薛瑾守􅀜而退太祖乃進軍襲瑾虜其卒七千還長安進位丞相冬十月齊神武推魏清河王亶子善見爲主徙都於鄴是爲東魏閏十二月魏}
  - {type: variant, offset: 4227, length: 0, content: '', WYG: 冝州諸軍事冝州刺史魏恭帝三年授大將軍鎮隴右}
