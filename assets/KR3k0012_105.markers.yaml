  - {type: variant, offset: 4010, length: 0, content: '', WYG: 母曰元皇后大統八年生於同州七嵗封畧陽郡公時有善相者史元華見帝退謂所親曰此公子有至貴之相但恨其夀不足以稱之耳魏恭帝三年二月命為安定公世子十月乙亥太祖崩世子嗣位為太師大冢宰十二月丁亥魏帝詔以岐陽之地封帝為周公庚子禪位于帝元年春正月辛丑帝乃即天王位柴燎告天朝百官於路門追尊皇考文公為文王皇妣為文后大赦天下封魏帝為宋公帝性剛果見晉公䕶執政深忌之司㑹李植軍司馬孫􅁪以先朝佐命入侍左右亦疾䕶權重乃與宫伯乙弗鳯賀抜提等潜謀請帝誅䕶帝許之又引宫伯張光洛同謀光洛宻白䕶䕶乃出植為荆州刺史􅁪為潼州刺史鳯等遂不自安更奏帝將召羣臣入因此誅䕶光洛又白之時小司馬尉遲綱捴統宿衛兵䕶乃召綱共謀廢立令綱入殿中詐呼鳯等論事既至以次執送䕶第並誅之綱乃罷禁兵帝方悟無左右獨在内殿令宫人持兵自守䕶又遣大司馬賀蘭祥逼帝遜位遂幽舊邸月餘以弑崩時年十六䕶誅後諡孝閔皇帝陵曰靖陵明皇帝後周書曰明皇帝諱毓小名統萬突太祖長子也母曰姚夫人永熙三年太祖臨夏州生帝於統萬城因以名焉}
