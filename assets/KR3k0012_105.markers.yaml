  - {type: variant, offset: 116, length: 677, content: 年八月進封長樂王轉侍中中軍將軍及武太元年春二月肅宗崩大都督爾朱榮將兵向京師謀欲廢立以帝家有忠勳且兼人望陰與帝通榮乃帥眾來赴夏四月帝與兄弟夜北渡河會榮於河陽南濟河即帝位以兄彭城王紹為無上王弟霸成公子正為始平王榮為侍中都督中外諸軍事大將軍尚書令領軍將軍領左右衛封太原王百僚相率有司奉璽綬備法駕奉迎於河梁車駕巡河西至淘渚榮以兵權在已遂有異志乃害靈太后及幼主次害無上王紹始平王子正公卿已下二千餘人列騎衛帝遷於便幕車駕入宮御太極殿大赦天下改武太為建義元年是月汝南王悅北海王顥臨淮王彧前後奔蕭衍郢州史元願達據城叛五月加大將軍爾朱榮北道大行臺以尚書右僕射元榮為東道大使征東將軍光祿勳元欣副之循方黜陟先行後聞大將軍爾朱榮還晉陽帝餞於邙陰六月通直散騎常侍高乾邕及弟帥合流民起兵於齊州之太原頻破州軍詔東道大使元欣喻旨乃降是月葛榮飢使其僕射任褒帥車三萬餘乘南寇至沁水幽州平北府主簿河開邢果帥河北流民十餘萬戶反於青州之北海自署濮王年號天統詔諸有司馬伏從戎者職人優兩大階詔當親御六戎掃清燕代大將軍太原王爾朱榮帥精銳十萬為左軍上黨王天穆總眾八萬為前軍司徒公楊椿勒兵十萬為右軍司空公穆紹統卒八萬為後軍是月葛榮眾退屯相州之北七月齊獻武王於鄴西北招慰葛榮別帥稱王者七人眾萬餘降之加大將軍爾朱榮柱國大將軍錄尚書事光州人劉舉聚眾數千反於濮陽自稱皇武大將軍是月高平鎮人万俟墨其二音醜奴僣大位署置百官八月葛榮帥眾圍相州九月詔太尉公上黨王天穆討葛榮次於朝歌以征東將軍齊州刺史元欣為沛郡王柱國大將軍爾朱榮率騎七千討葛榮於滏口破擒之餘眾帥降冀定滄瀛殷五州平大赦天下已改為永安元年以柱國大將軍太原王爾朱榮, WYG: 部落世}
