  - {type: variant, offset: 1563, length: 151, content: 而父母老遂撤其環瑱誓不適人以奉養父母國人聞之莫不相率以孝請女為趙王后齊使候問使者曰北宮氏女嬰兒子無恙耶撤其環瑱至老不嫁以養父母此助王率民出於孝者也齊王聞之表其門以顯異焉異苑曰順陽南鄉縣楊豐與息女香於田穫粟豐為虎所噬香年甫十四手無寸刃乃搤虎頸豐因獲免香以誠孝致感猛獸為之逡巡太守平昌孟肇之賜資榖旌其門閭焉, SBCK: 封秩}
