  - {type: variant, offset: 903, length: 426, content: 往在隋朝父沒遼左招魂遷葬負土成墳又葬其祖父母等竭此老年親加板築痛結晨昏哀感行路永言志行嘉尚良深宜摽其門閭用旌敏德賜物三十段粟五十碩又曰孝女賈氏濮州鄄城人也始年十五其父為宗人玄基所害其弟強仁年幼賈氏撫育之誓以不嫁及強仁成童思共報復乃候玄基煞之取其心肝以祭父墓遣強仁自列於縣有司斷以極刑賈詣闕自陳己為請代強仁死高宗哀之特制賈氏及強仁免罪移其家於洛陽又曰汴州李氏孝女年八歲父卒柩殯在堂十餘載每日哭泣無限及年長母欲嫁之遂截髮自誓請在家終養及喪母號毀殆至滅性家無丈夫自營棺槨州里欽其至孝送葬者千餘人葬畢廬於墓側蓬頭跣足負土成墳手植松柏數百株李昶列上其狀制特表其閭賜以粟帛顏氏家訓曰張建女三歲喪母靈床上屏風平生舊物屋漏沾濕出曝曬之女子一見伏床流涕家人怪其不起乃往抱持薦席淚漬精神傷沮不能飲食將以問醫診脈云女腸斷矣因耳便吐血數日而亡中外憐之莫不悲歎宣州圖經曰宛陵管氏女名瑤年十七與母同寢母為虎所負去瑤哀叫隨之因囓虎耳墮方捨其母瑤即負母歸家氣絕武帝表其門以旌孝行王韶之, SBCK: 比焉蕭廣濟}
