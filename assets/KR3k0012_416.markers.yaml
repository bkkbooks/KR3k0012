  - {type: variant, offset: 2046, length: 6, content: 俄親君安為同, SBCK: 軍其兄遂犯法軍匿之知不能免乃請智者爲辭乞代兄遂之命因自經}
  - {type: variant, offset: 2046, length: 1, content: 俄, WYG: 軍其兄遂犯法軍匿之知不能免乃請智者為辭乞代兄遂之命因自經縣門官嘉其義乃捨遂罪又曰齊義繼母者齊二子之母也當宣王時有人鬭死於道者吏訊之二子立其傍吏問之兄曰我殺之弟曰非兄乃我殺之朞年不决言於相相不能决言於王王曰若皆赦之是縱有罪若皆殺之是誅無􅇳度其母能知子善惡試問其母聽其所欲殺活相召而問之其母泣而對曰殺少子相曰少子人所愛今欲殺之何也對曰少者妾之子長者前妻之子相言之於王王美其義皆赦其子又曰郃陽友娣者郃陽邑任延夀之妻也字季兒有三子季兒兄季宗與延夀爭葬父事延夀與友田建隂殺季宗建獨坐死延夀㑹赦乃以告季兒季兒曰嘻殺夫不義事兄之讎亦不義何面目以生季兒乃告大女曰汝父殺吾兄義不可以留又終不嫁矣吾去汝而死善視汝弟遂自經死海内先賢傳曰范丹字史雲清髙亮直讓財十萬與二為㑹稽先賢傳曰陳業字文理業兄渡海傾命同時依止者五六十人骨肉消瀾而不可記别業仰皇天誓后土曰聞}
