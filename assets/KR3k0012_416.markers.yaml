  - {type: variant, offset: 163, length: 0, content: '', WYG: 世前無狀相犯咎皆在荆不能相教兄既早没一子為嗣如令死者傷其滅絶今願殺身代之塞咎雖死已往猶謂更生怨家扶起荆曰許掾郡中稱為賢吾何敢相侵因遂委去又曰李鴻字奉遜禮信仁}
  - {type: variant, offset: 163, length: 0, content: '', krp: 前無狀相犯咎皆在荆不能相教兄旣早沒一子爲嗣如令死者傷其㓕絶今願殺身代之塞咎雖死巳徃猶謂更生怨家扶起荆曰許掾郡中稱爲賢吾何敢相侵因遂委去又曰李鴻字奉遜禮性仁}
  - {type: variant, offset: 164, length: 1, content: 婦, SBCK: 友于兄弟弟育爲人所侵辱育後隂結客報怨爲執法吏所得當伏罪時未有立嗣鴻爲太尉􅁺在京師傷育以}
  - {type: variant, offset: 164, length: 1, content: 婦, WYG: 友于兄弟弟育為人所侵辱育後隂結客報怨為執法吏所得當伏罪時未有立嗣鴻為太尉掾在京師傷育以義刷恥門户斷絶自分代育遂刻印還歸欲過家恐見妻子虧移其意到縣北亭預作記乞代育通記便飲酖而之縣令省記怛然驚感司馬彪續漢書曰山陽張儉以忠正為中常侍侯覽所忿疾覽為刋章下州郡召捕儉與孔融兄褒有舊亡投遇褒出時融年十五六儉少之不暇告也融知儉長者有窘迫色謂曰兄在外吾獨不能為君主乎因留舍藏之後事洩國相以下密就掩捕儉得脱走遂并收融及褒送獄融曰保納舍藏者融也融當坐之褒曰彼來投我罪我之由非弟之過我當坐之兄弟爭死郡縣疑不能决乃上讞詔書令褒坐焉融由是著名范曄後漢書曰姜肱字伯淮彭城廣戚人也家世名族肱與二弟仲海季江俱以孝行著聞其友愛天性常共卧起及各娶妻兄弟相戀不能别寢以繼嗣當立乃遞往就室焉又曰鍾皓字季明潁川長社人少以篤行稱公府連辟為二兄未仕避隠宻山王隠晉書曰徐苗字叔胄髙宻淳于人弟亡臨殯口中有癰潰膿血苗含去之晉中興書曰顔含字宏都琅琊人含次嫂繁氏老而失明含奉}
