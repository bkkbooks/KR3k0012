  - {type: variant, offset: 396, length: 204, content: 楚王偉之伏誅也瓘女與國臣書曰先君名謚未列無異凡人每怪王國蔑然無言春秋之失其咎安在悲憤感慨故以是意瑤等執黃幡撾登聞鼓上言又曰會稽寒人陳氏有三女無男祖父母年八九十老無所知又篤癃病母不安其室遇寒飢女相率於西湖採菱更日至市貨賣未嘗虧怠鄉里稱為義門多欲取為婦長女自傷焭獨誓不肯行祖母尋相繼卒三女自營殯葬為菴舍屋墓側又曰永興概中里王氏女年五歲得毒病兩目皆盲性至孝年二十父死臨屍一叫眼皆血出小妹娥舐其血左目即開時人稱為孝感, SBCK: 姜肱兄弟}
