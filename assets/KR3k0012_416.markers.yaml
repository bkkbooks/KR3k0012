  - {type: variant, offset: 8, length: 2, content: 史記, SBCK: 而美公奪之而生壽及朔朔與其母訴伋於公公全伋之齊使賊先待於隘而殺之壽􅀼其節而先徃賊殺之伋至}
  - {type: variant, offset: 8, length: 2, content: 史記, WYG: 而美公奪之而生夀及朔朔與其母訴伋於公公令伋之齊使賊先待於隘而殺之夀竊其節而先往賊殺之伋至}
