  - {type: variant, offset: 271, length: 9, content: 太守煞牛自祭婦冢天, SBCK: 以儁密受元直而去宻後亡儁勺飲不入口者五日雖服喪朞年而心喪六載又前燕録曰有司奏中山浦隂民劉洛縣差充征弟興私代背軍逃㱕州以夲名捕斬興􅍗郡列稱逃是興身請求代洛死洛又曰固陳巳實正名冝從憲辟兄弟爭命詳刑有疑暐曰洛應征輙留興冒名逃􅃥俱應極法但兄弟競死義情可嘉冝特原之南燕録曰有司奏沙門僧知夜入臨淄人冷平舎􅁋其寡嫂李氏平與弟安國殺之郡縣桉平兄弟以殺人論而平安國各引手殺譲生競死義形急難後􅁗録曰姚㐮與李雄戰馬中流矢死弟萇下馬以授襄曰汝可以免萇曰兄濟此竪子安敢害萇㑹救至俱免後魏書曰房景先沉敏方正事兄恭謹出告反面晨昏叅省側}
