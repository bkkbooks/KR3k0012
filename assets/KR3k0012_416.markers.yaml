  - {type: variant, offset: 2131, length: 196, content: 分治獄制罪君之常理何敢茍生以枉公法後遇赦得免太常張奐聞嘉之禮以束帛又曰潁川公孫何者公孫氏之女年十三怨家報其父父走得免何與母俱亡母先得見仇人甚悅爭欲取心何便馳出叩頭涕泣曰老母常有篤疾垂沒之人安足殘戮以塞忿哉我是其兒父母所憐不如殺我遂殺之而捨其母會稽典錄曰孝女曹娥者上虞人父盱能弦歌為巫五月五日於縣泝江濤迎婆娑神溺死不得屍骸娥年十四歲乃緣江號哭晝夜不絕聲旬有七日遂投江而死縣長改葬娥於道傍為立碑焉, SBCK: 陳壽}
