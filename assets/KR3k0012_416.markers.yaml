  - {type: variant, offset: 1723, length: 319, content: 陳之寡婦人也年十六而嫁未有子其夫當從戎屬孝婦曰我有老母吾不還汝肯善視吾母乎婦曰諾夫果死婦養姑不衰父母將嫁之孝婦曰受人之託豈可棄哉因欲自殺父母懼不敢嫁之養姑二十八年姑年八十四壽乃盡賣其田宅以葬之列女後傳曰珠崖二義者珠崖令之後妻及前妻女也女名初生十三珠崖多珠繼母連大珠以為係臂及令死當送喪還法內珠於奩入關者死繼母棄之其子男九歲取之置其母鏡奩中皆不知也及關候搜索得珠奩中吏曰誰當坐者初謂是其繼母取之乃白曰君不幸夫解係臂棄之初心惜之取置夫鏡奩中夫人不知也母亦為然憐之乃曰此珠妾之係臂也君不幸妾解之心不忍棄而置鏡奩中妾當坐因此哭哀動傍人閞吏執筆書不能就一字閞候垂涕終日不能乃曰母子有義如此吾寧可坐之不忍加文後訪訊乃九歲男兒內焉又曰酒泉龐孝婦者趙君安, SBCK: 同郡吕氏}
