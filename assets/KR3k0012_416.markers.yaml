  - {type: variant, offset: 6, length: 0, content: '', krp: 行}
  - {type: variant, offset: 7, length: 0, content: '', SBCK: 友睦姻任恤禮記曲禮曰親戚稱其慈也寮友稱其悌也又禮運曰兄良弟悌夫義婦聽家之肥也又檀弓上曰子路有姉之喪可以除之矣而弗除也孔子曰何弗除也曰吾寡兄弟而弗忍也孔子曰行道之人皆弗忍也子路聞之遂除之春秋左傳曰君義臣行父慈子孝兄友弟敬所謂六順毛詩􅁑屨陟岵曰陟彼崗􅀆聸望兄􅀆兄曰嗟予弟行􅃥夙夜必偕偕俱也又鹿鳴棠棣曰棠棣燕兄弟也閔管蔡之失道故作棠棣焉周公吊二叔之不咸而使兄弟恩䟽召公爲作此詩而歌以親之也棠棣之華蕚不韡韡箋云承華曰蕚不當作拊拊蕚足得華之光明其貌韡韡然盛也興者喻弟以敬事兄兄以榮覆弟恩義之敬亦韡韡然也凢今之人莫如兄弟又邶栢舟二子乗舟曰二子乗舟思伋壽也衛宣公之二子爭相爲死國人傷而思之而作是詩也二子乗舟汎汎其景二子伋壽也宣公爲伋娶於齊}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_SBCK_416-1b}
  - {type: variant, offset: 7, length: 0, content: '', WYG: 友睦婣任恤禮記曲禮曰親戚稱其慈也僚友稱其悌也又禮運曰兄良弟悌夫義婦聽家之肥也又檀弓上曰子路有姊之喪可以除之矣而弗除也孔子曰何弗除也曰吾寡兄弟而弗忍也孔子曰行道之人皆弗忍也子路聞之遂除之春秋左傳曰君義臣行父慈子孝兄愛弟敬所謂六順毛詩葛屨陟岵曰陟彼岡兮瞻望兄兮兄曰嗟予弟行役夙夜必偕偕俱也又鹿鳴常棣曰常棣燕兄弟也閔管蔡之失道故作常棣焉周公吊二叔之不咸而使兄弟恩疏召公為作此詩而歌以親之也常棣之華鄂不韡韡箋云承華者曰鄂不當作拊拊鄂足得華之光明其貎韡韡然盛也興者喻弟以敬事兄兄以榮覆弟恩義之顯亦韡韡然也凡今之人莫如兄弟又邶栢舟二子乗舟曰二子乗舟思伋夀也衛宣公之二子爭相為死國人傷而思之而作是詩也二子乗舟汎汎其景二子伋夀也宣公為伋娶於齊}
