  - {type: variant, offset: 2991, length: 184, content: 杏實悲喜再拜取之絜滌而歸奉其姑曰他郡有人憫其事遺此一實姑喜食之疾漸瘳明年夏忽一日雷風甚動其屋盧殷殷然不斷若在簷宇里人驚慴遁去者不可勝計楊氏泣告其姑曰去冬以莽穢中杏實奉姑紿為郡人所遺今天將謫妾以死從此別矣乃伸臂立於庭具訴其事詞未畢忽有聲若發其庭者雲物陰晦默不可辨既而楊氏覺其臂若捧千金重莫能舉久方開霽乃視之有二金龍長數尺蟠遶其左右臂龍頂上有字曰賜楊氏自是其家日豊至為富室, SBCK: 十六}
