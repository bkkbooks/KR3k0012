  - {type: variant, offset: 2562, length: 350, content: 子女往晏子之家說曰賤妾請有道於相國妾聞明君不為禽獸傷人今君以樹木之故殺妾父妾恐害明君之義晏子明日早朝而復於君公令吏罷守槐之役出犯槐之囚紀聞曰吳宣城郡青陽縣有梅根治孝女李娥廟居曾阜之巔林木秀茂周廻十里土人不敢樵採敬而事之日薦蘋藻娥父吳大帝時為鐵宮冶以鑄軍器一夕煉金竭鑪而金不出時吳方草創法令至嚴諸耗折官物十萬即坐斬倍又沒入其家而娥父所損折數過千萬娥年十五痛傷之因火烈遂自投于鑪中赫然屬天於是金液沸湧溢於鑪口娥所躡三履浮出於鑪身則化矣其金汁塞鑪而下遂成溝渠泉注二十里入于江水其所收金凡億萬斤溝渠中鐵至今仍存故吳俗每治銅鐵必先為娥立祠享而祈福歙州圖經曰章頊歙縣合陽鄉人也妻程氏與二女入山採葉程為暴虎銜囓去二女冤叫挽其衣裙與虎爭力虎乃捨之程由是獲全時刺史劉贊嘉之給湯藥蠲戶稅改鄉為孝女宣室志曰鄭邯耕民也天寶中, SBCK: ''}
