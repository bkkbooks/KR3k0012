  - {type: variant, offset: 2333, length: 6, content: 孝女雄者犍為, SBCK: 李孟元修昜論語大義略舉質性恭順與叔子就同居就有痼疾孟元推所有田園悉以讓就夫婦紡績以自供給江微陳留志曰李銓平丘}
  - {type: variant, offset: 2333, length: 5, content: 孝女雄者犍, WYG: 李孟元脩易論語大義畧舉質性恭順與叔子就同居就有痼疾孟元推所有田園悉以讓就夫婦紡績以自供給江微陳留志曰李銓平邱人也少聰慧有至行銓兄前母子後母甚不愛也而衣食皆使下銓銓始年五歳覺已衣服勝兄即脫不着須兄得已同然後服之其母遂不得有偏及長銓内匡順母外奉其兄故閨門雍睦}
