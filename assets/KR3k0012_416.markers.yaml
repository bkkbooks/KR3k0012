  - {type: variant, offset: 138, length: 0, content: '', SBCK: 卜式河南人也以田畜爲事有少弟式脫身出獨取羊百餘口田宅財物盡與弟式入山牧十餘年羊致千餘頭買田宅而弟盡破其産式輙復分與之又曰王啇字子威􅃰郡蠡吾人也啇爲太子中庶子以肅敬敦厚稱父薨啇嗣爲侯惟財以分異母諸弟身無所受}
  - {type: variant, offset: 138, length: 0, content: '', WYG: 卜式河南人也以田畜為事有少弟壯式脱身出獨取羊百餘田宅財物盡與弟式入山牧十餘年羊致千餘頭買田宅而弟盡破其産式輒復分與之又曰王商字子威涿郡蠡吾人也商為太子中庶子以肅敬敦厚稱父薨商嗣為侯推財以分異母諸弟身無所受}
