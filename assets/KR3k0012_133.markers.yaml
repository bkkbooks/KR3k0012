  - {type: variant, offset: 753, length: 1, content: 仍, WYG: 送喪還都至大庾嶺㑹有詔高祖為交州司馬領武平太守與刺史楊㬓南討十一年六月軍至交州賁衆數萬於蘇厯江口立城柵}
  - {type: variant, offset: 755, length: 0, content: '', WYG: 拒官軍㬓推高祖為前鋒所向摧陷賁走典徹湖於屈獠界立砦大造船艦充塞湖中衆軍憚之頓湖口不敢進夜江水暴起七丈注湖中奔流迅激高祖勒所部兵乗流先進衆軍鼓噪俱前賊衆大潰賁竄入屈獠洞中屈獠斬賁傳首京師是歳太清元年也除振逺將軍江西督護高安太守督七郡諸軍事二年冬侯景寇京師高祖將率兵赴援廣州刺史元景仲隂有異志將圖高祖高祖知其計與成州刺史王懐明行臺選郎殷外臣等密議戒嚴三年七月集義兵於南海馳檄以討景仲景仲窮蹙縊於閣下高祖迎蕭勃鎮廣州十一月高祖遣杜僧明胡穎將二千人頓於嶺上并厚結始興豪傑同謀義舉侯安都張偲等率千餘人來附蕭勃聞之遣鍾休恱說高祖曰侯景驍勇天下無敵前者授軍十萬士馬精强然而莫敢當鋒遂令羯賊得志以君疎外詎可暗投未若且住始興遥張聲勢保此泰山自求多福高祖泣謂休恱曰僕本庸虚蒙國成造往聞侯景渡江即欲赴援今京都覆沒主上蒙塵君辱臣死誰敢愛命君侯體則皇枝任崇方岳不能摧鋒萬里雪此寃痛見遣一軍猶賢乎已乃降後旨使人慨然僕行計決矣慿為披述乃遣使間道往江陵禀承軍期節度湘東王承制授高祖員外散騎常侍持節明威將軍交州刺史改封南野縣伯六月高祖修嶂頭古城徙居焉高州刺史李廷仕據大臯遣主帥杜平虜率千人入贛石魚梁高祖命周文育將兵擊走之廷仕奔寧都承制授高祖通直散騎常侍使持節信威將軍豫州刺史領豫章内史改封長城縣侯尋授散騎常侍使持節都督六郡諸軍事師將軍南江州刺史餘如故時寧都人劉藹等資廷仕舟艦兵仗將襲}
