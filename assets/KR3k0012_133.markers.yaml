  - {type: variant, offset: 1497, length: 1, content: 劍, WYG: 車騎將軍揚南徐二州刺史持節司空班劒鼓吹並如故仍詔高祖甲仗百人出入殿省震州刺史杜龕據吳興與義興太守韋載同舉兵反高祖命周文育率衆攻載於義興龕遣其從弟北叟將兵拒戰北叟敗歸義興二年正月癸未誅杜龕於吳興龕從弟北叟司馬沈孝敦並賜死二月庚申高祖遣侯安都周鐵武率舸艦備江州仍頓梁山起柵三月戊戌齊遣水軍儀同蕭軌厙狄伏連堯難宗東方老侍中裴英起東廣州刺史獨孤辟惡洛州刺史李希光并任約徐嗣徽等率衆十萬出柵口向梁山帳内盪主黄叢逆擊敗之燒其前軍船艦齊頓軍保蕪湖高祖遣定州刺史沈泰吳郡太守裴忌就侯安都共據梁山以禦之四月丁巳高祖詣梁山軍巡撫五月甲申齊兵發自蕪湖庚申至秣陵故治高祖遣周文育屯方山徐度頓馬牧杜稜頓大航南己亥高祖率宗室王侯及朝臣將帥於大司馬門外白虎闕下刑牲告天以齊人背約發言慷慨涕泗交流同盟皆莫能仰視士卒觀者益奮辛丑齊軍於秣陵故縣跨淮立橋柵引渡兵馬其夜至方山侯安都周文育徐度等各引兵還京師癸夘齊兵自方山進及兒塘游騎至臺周文育侯安都頓白土崗旗鼓相望都邑震駭高祖潛撤精兵三千配沈泰渡江襲齊行臺趙彦琛於瓜步獲舟艦百餘艘陳粟萬斛六月甲辰齊兵潛至鍾山龍尾丁未進至幕府山高祖命衆軍秣馬蓐食遲明攻之乙夘高祖率帳内麾下出幕府山南吳明徹沈泰等衆軍首尾齊舉縱兵大戰侯安都自白土崗引兵横出其後齊師大潰斬獲數千人相蹂藉而死者不可勝計生執徐嗣宗斬之以狥追奔至於臨沂其江乗攝山鍾山等諸軍相次克㨗七月庚子詔授高祖中書監司徒揚州刺史進爵為公增邑并前五千户并給油幢皂輪車是月侯瑱以江州入附遣侯安都鎮上流定南中諸郡八月癸夘太府卿何敳新州刺史華念各上玉璽一高祖表以送臺詔歸之高祖是日詔高祖食安吉武康二縣合五千戸九月進高祖位丞相録尚書事鎮衞大將軍改刺史為牧進封義興郡公丁未中散大夫王彭牋稱今月五日平旦於御路見龍迹自大社至象闕亘三四里庚申詔追贈高祖考侍中光禄大夫加金章紫綬封義興郡公諡曰恭十月甲戌敕丞相自今入問訊可施別榻以近扆坐二年正月壬寅天子朝萬國於太極東堂詔加高祖班劒十人八月甲午進高祖位太傅加黄鉞劒}
