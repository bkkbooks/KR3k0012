  - {type: variant, offset: 264, length: 342, content: 魏遣將劉昶王肅帥眾冠司州高祖為冠軍將軍帥所領自外進戰魏軍表裏受敵乃棄圍退走軍罷以高祖為右軍晉安王司馬淮陵太守還為太子中庶子領軍羽林監頃之出鎮石頭四年魏帝自率大眾寇雍州明帝令高祖赴援又遣崔惠景督諸軍高祖等並受節度明年三月惠景與高祖進行鄧城魏主率十萬餘騎奄至惠景軍死傷略盡唯高祖全師而歸俄以高祖行雍州府事明帝崩東昏即位始安王遙光徐孝嗣江杞更直內省分日帖勑高祖聞之謂從舅張弘策曰政出多門亂其階矣時高祖長兄懿罷益州還仍行郢州事乃使弘策詣郢陳計於懿曰若隙開釁起必中外土崩今得守外藩幸圖身計郢州控帶荊湘西注漢沔雍州士馬呼吸數萬虎視其間以觀天下此蓋萬全之策如不早圖之悔無及也懿聞之色變心不之許弘策還是歲至襄陽於是潛造器械多伐竹木沉於檀溪密為舟裝之備二年冬懿被害信至高祖密召長史王茂中兵呂僧珍等謀之以, SBCK: ''}
