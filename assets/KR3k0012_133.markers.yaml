  - {type: variant, offset: 1310, length: 1, content: 北, WYG: 王僧辯納之即位改元曰天成以晉安王為皇太子初齊之請納貞陽侯也高祖以為不可遣使詣僧辯苦爭之往返數四僧辯竟不從高祖居常憤恨密謂所親曰武帝雖磐石之宗逺播四海至於尅雪讎恥寧濟艱難唯孝元而已功業懋盛前代未聞我與王公俱受重寄語未絶音聲猶在耳豈期一旦便有異圖嗣主高祖之孫元皇之子海内屬目天下宅心竟有何辜坐致廢黜逺求夷狄假立非次觀其此情亦可知矣乃密具袍數千領及錦綵金銀以為賞賜之具九月壬寅高祖召徐度侯安都周文育等謀之仍部列將士分賞金帛水路俱進是夜發南}
