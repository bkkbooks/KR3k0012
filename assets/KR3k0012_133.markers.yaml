  - {type: variant, offset: 888, length: 0, content: '', WYG: 高祖與諸軍進尅姑熟仍次蔡州侯景登石頭城觀望形勢意甚不恱謂左右曰此軍上有紫氣不易可當乃以船艘貯石沈塞淮口緣淮作城自石頭迄青溪十餘里中樓雉相接諸將未有所決僧辯遣杜崱問計於高祖高祖曰前栁仲禮數十萬兵隔水而坐韋粲之在青溪竟不渡岸賊乃登高望之表裏俱盡肆其凶虐覆我王師今圍石頭須渡北岸諸將若不能當鋒請先往立柵高祖即於石頭西横隴築柵衆軍次連八城直出東北賊恐西州路斷亦於東北果林作五城以遏大路景率衆萬餘人鐵騎八百餘匹結陣而進乃命諸將分處置兵賊直衝王僧志僧志小縮高祖遣徐度領弩手二千横截其後賊乃却高祖與王琳杜龕等以鐵騎悉力乗之賊退據其柵景儀同盧輝略開石頭北門來降戴晃曹宣等攻破果林一城衆軍又尅其四城賊復還殊死戰又盡奪所得城柵高祖大怒親率攻之士卒騰柵而入賊復散走景與百餘騎棄矟執刀左右衝陣陣不動景衆大潰遂北至西明門景至闕下不敢入臺遣腹心取其二子而遁高祖率衆出廣陵應接㑹景將郭元建奔齊高祖納其部曲三千人而還僧辯啓高祖鎮京口五月齊遣辛術圍嚴超達於秦郡高祖命徐度領兵助其固守齊衆七萬填塹起土山穿地道攻之甚急高祖乃自率萬人解其圍縱兵四面擊齊軍弓弩亂發齊平秦王中流矢死斬首數百級齊人收兵退高祖振旅}
