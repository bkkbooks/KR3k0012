  - {type: variant, offset: 609, length: 286, content: 召僚佐集於廳事謂之曰昔武王會盟津皆曰紂可伐今昏主惡稔窮虐極暴誅戮朝賢罕有遺育生人塗炭天命殛之卿等同心疾惡共興義舉公侯將相良在茲日各盡勳效我不食言是日建牙於是收集得甲士萬餘人馬千餘匹船三百艘音騷出檀溪竹木裝艦東昏以劉山陽為巴西太守配精兵三千使過荊州就行事蕭頴胄以襲襄陽頴胄伏甲斬之送首於高祖仍以南康王尊號之議來告且曰時月未到當須來年二月遽便進兵恐非廟筭高祖荅曰所藉義心一時驍銳事事相接猶恐疑怠天時人謀有何不利處分已定安可中息三年二月南康王為相國以高祖為征東將軍高祖發襄陽移檄京邑高祖至竟陵命長史王茂與太守曹景宗為前軍輕兵濟江逼郢城張冲出軍迎戰茂等邀擊大破之三月南康王即帝位於, SBCK: ''}
