  - {type: variant, offset: 2988, length: 1829, content: 年封湘東郡王大同六年出為都督江州諸軍事江州刺史太清元年徙為都督荊雍湘司郢等九州諸軍事鎮西將軍荊州刺史三年三月侯景寇沒京師太子舍人蕭歆至江陵宣密詔以世祖為侍中假黃鉞大都督中外諸軍事司徒承制餘如故是月世祖徵兵於湘州湘州刺史河東王譽拒而不遣七月遣世子方等帥眾討譽戰敗又遣將軍鮑泉伐討譽九月雍州刺史岳陽王詧舉兵反來寇江陵世祖嬰城拒守詧將杜崱七力切及楊混各率其眾來降詧遁走鮑泉攻湘州不剋又遣左衛將軍王僧辯代將大寶元年五月王僧辯剋湘州斬河東王譽湘州平二年二月魏遣使來聘三月侯景悉兵西上會任約軍王僧辯帥眾屯巴陵景進寇巴陵世祖遣將軍胡僧祐陸法和帥眾下據任約敗景遂遁走僧辯帥軍追景所至皆捷八月僧辯下次湓城十月王僧辯等表稱侯景拭逆皇帝賊害太子宗室在寇庭者竝罹禍酷世祖奉諱大臨三月百官縞素司空南平王恪率宗室將軍胡僧祐率群寮並奉牋勸進世祖固讓三年二月王僧辯眾軍發自潯陽世祖馳檄告四方有能縛侯景及送首者封萬戶開國公三月王僧辯等平侯景傳其首於江陵告明堂太社四月益州刺史新除假黃鉞太尉武陵王紀竊位於蜀改號天正元年世祖遣司空蕭太拜謁塋陵修復社廟五月以尚書令征東將軍江州刺史王僧辯為司徒斬賊左僕射王偉尚書呂季略於江陵市是月魏遣太師潘洛辛等寇秦郡王僧辯遣杜崱帥眾拒之以陳霸先為征北大將軍南徐州刺史是月魏遣使賀平侯景八月蕭紀率巴蜀大眾東下遣護軍陸法和屯巴峽以拒之是月四方征鎮王公卿士復勸世祖即尊號表三上乃從之承聖元年十一月景子即皇帝位於江陵立太子方拒為皇太子追尊所生妣阮脩容為文宣太后二年西魏遣大將尉遲逈襲蹈益州三月以郢州刺史陸法和為司徒四月以征北大將軍陳霸先為司空九月魏遣其柱國萬紐于謹率大眾來寇冬十月魏軍至于襄陽蕭詧率眾會之內外戒嚴輿駕出行柵徵王僧辯等軍十一月魏軍至柵下徵廣州刺史王琳入援辛卯魏軍大攻世祖出枇杷門親臨陣督戰六軍敗績反者斬西門以納魏師城陷于西魏世祖見執十二月西魏害世祖遂崩焉時年四十七太子皆見害明年四月追尊元皇帝廟曰世祖梁書曰世祖聰悟俊朗天才英發年五六歲高祖問汝讀何書對曰能誦曲禮高祖曰汝試言之即誦上篇左右莫不驚歎既長好學愽揔群書下筆成章出言為論才辯敏速冠絕一時也侯景附侯景河朔人也少不羈高歡以為將軍雄勇冠時征伐數有大功嘗謂歡曰若假景三萬人當橫行天下要須縛取蕭衍老翁遣作太平寺主後高歡死景乃以河南降于梁高澄使慕容紹宗圍於長社景謂紹宗曰欲送客耶將定雄雌耶紹宗曰吾將決戰景乃令戰士皆被甲持短刀但低視斫人脛足遂敗紹宗軍禆將斛律光尤之紹宗曰吾戰多矣未見此賊之難相持連月景食盡其將暴顯等降紹宗景眾乃潰景與腹心數騎濟淮稍收散卒得馬步八百人晝夜兼行追軍不敢逼使謂紹宗曰景若就擒公復何用紹宗乃縱之遂攻壽陽下之而據其城梁武以為河南王招集戰士乃請錦萬匹為軍人作袍帝不與以青布給之又請娶於王謝武帝曰王謝門高非其偶可朱張已下訪之景恚曰會將吳兒女以配奴景既為朝廷所疑武帝使謂景曰譬如貧家畜十客尚能得志朕惟有一客致有忿言是朕之失也明日遂將兵於瀝陽濟江聞邵陵王綸督眾軍景乃謀於王偉偉曰莫若直掩京都臨賀反於內大王攻於外天下不足定也兵法曰遲巧不如拙速今便須進路不然邵陵及人景遂晨夜兼行至都百道攻城縱火焚諸城城中倉卒未有備乃鑿門樓下水沃火久之方滅景又於城南城西各起土山以臨城內內亦作兩山以應之簡文以下皆親執畚音本鍤楚洽切景又募人先為奴賞以不次朱异家黥奴踰城投賊景以為儀同使至闕下以誘城內乘馬披錦袍詬曰朱异五十年仕宦方得中領軍我始事侯王已為儀同使於是奴僮競出盡皆得志景決石闕前百道攻城晝夜不息城陷景自為丞相以甲士五百人自衛帶劍昇殿帝謂景曰卿父在戎得無勞乎景不對帝曰卿是何州人而至此又默然左右任約代對及出景謂約曰吾嘗據鞍對敵矢刃交下而意無怖今見蕭公使人自慴豈非天威難犯吾不可以再見之矣先是城中積屍不暇理瘞又有已死未斂或將死未絕景悉命聚而焚之尚書郎鮑正疾篤賊曳出而焚之宛轉火中久而方絕武帝崩立簡文又立豫章王景皆殺之遂篡位國號漢年稱太始王偉請立七廟景問何謂七廟偉曰古者天子祭七代祖考故致七廟并請七代諱勑太常具祭祀之禮景曰前代吾不復憶唯記得阿爺名大褾且在朔州伊郍得來噉眾聞咸笑景頻為王僧辯所破將走王偉按劍諫曰自古豈有走天子今宮中衛士尚可一戰寧可便走景曰我在此時打賀拔勝破葛榮揚名河朔與高王一種人今來直渡大江取臺城如反掌打邵陵王於北山摧柳仲禮於南岸皆爾所親見也今日之事恐是天士爾好守城吾當一決乃與百騎東走至松江乃與腹心數十人乘舸入海至湖豆州舍人羊鯤殺景景左足上有肉瘤狀似龜戰勝應剋捷則隱起分明如不勝則低是日瘤陷肉中遂傳首於江陵, SBCK: ''}
