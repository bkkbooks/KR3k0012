  - {type: variant, offset: 1497, length: 1, content: 劍, krp: 加司空陳霸先班劒二十人三月齊遣其上黨主髙渙送貞陽侯蕭淵明來主梁嗣至東關遣呉興太守裴之横與戰敗績之撗死王僧辯率衆出屯姑熟七月王僧辯納貞陽侯蕭淵明自採石濟江入于京師以帝爲皇太子九月司空陳霸先舉義襲殺王僧辯黜蕭淵明丙午帝即皇帝位十月詔改承聖四年爲紹泰元年大赦以貞陽侯淵明爲司徒封建安郡公以司空陳霸先爲尚書令尊所生夏貴妃爲皇太后立妃王氏爲皇后太平元年正月大赦四月齊軍水歩入丹陽縣至秣陵故治六月齊潜軍至蔣山北至玄武湖司空陳霸先授衆軍節度大破之七月陳霸先進位司徒九月改元大赦除司徒陳霸先爲丞相録尚書事二年四月齊遣使請和八月加丞相黄鉞領太傳劒履上殿九月爲相國揔百揆封十郡爲陳公備九錫之禮十月禪位于陳奉帝爲江隂王薨于外邸時年十六追謚敬皇帝史臣曰梁季横潰喪亂屢臻當此之時天暦去梁敬皇髙讓將同釋負焉後梁蕭察後梁宣帝諱察昭明太子第三子也封岳陽王授雍州刺史孝元𬒳西魏所害察遂爲魏附庸稱大定元年以蔡大寳爲相時人比劉備過孔明察性不好酒尤惡見婦人酷信佛法謂尚書宋如周曰卿可謗經如周踧踖上子六切下音迹自陳懼而出以告蔡大寳寳曰卿當不謗餘經不信法華耳如周乃悟經云隨喜面不狹長如周面狹且長故戯之耳察居處殘毀干戈日用在位八年憤惋而殂年四十子巋立蕭巋明帝諱巋宣帝第三子也聦明有器識大定元年爲太子宣帝崩太子即位號天保元年十五年周武帝平北齊得傳國璽巋入周賀武帝大㑹群臣及諸蕃客周武自彈琵琶令故齊主髙緯起舞逹摩支故安德王延宗悲不自勝緯舞訖勸巋巋乃起舞周武曰梁主乃能爲朕舞乎巋曰陛下旣自彈五絃臣何敢不同百獸周武大恱周武指齊氏故臣吒列長义謂巋曰是登陴罵朕者巋曰長义未能抱樂翻敢吠堯周武大笑𥘉雖禮接巋未深知之至是巋承聞乃陳父荷太祖拯救之恩并敘二國艱虞脣齒掎角之事辭理辯暢因涕泗交流周武亦爲歔欷自是禮遇日深賜雜繒百叚馬五匹并賜齊宫伎女遣歸國執巋手曰待破突厥必送梁王歸江東巋途經古跡莫不駐馬賦詩以敘其懷至于江陵凡三十首女爲秦晉王廣妃在位十四年而殂蕭琮琮明帝太子也旣立赦其封内改元寛運琮性廣仁有大度博學有文義兼善弓馬明年隋文徴琮入朝琮率其臣二百餘人朝于長安羣臣辭于送客堂琮下馬二執別莫不殞涕旣至隋文帝留之使崔弘度將兵攻江陵江陵不守於是國廢陳陳霸先陳書曰髙祖武皇帝諱霸先字興國小字法生呉長興城下若里人漢太丘長陳寔之後也丗居頴川寔玄孫凖晉太尉凖生匡匡生逹永嘉南遷爲丞相掾歴太子洗馬出爲長城令恱其山水遂家焉嘗謂所親曰此地山川秀麗當有王者興二百年後我子孫必鍾斯運髙祖以梁天監二年癸未歲生少倜儻有大志不治生産旣長讀兵書多武藝明逹果斷爲當時所推服嘗遊義興館於許氏夜夣天開數丈有四人朱衣捧日而至令髙祖開口納焉及覺腹中猶熱髙祖心獨負之大同𥘉新喻侯蕭映爲呉興太守甚重髙祖謂僚佐曰此人方將逺大及映爲廣州刺史髙祖爲中兵叅軍隨之鎮映令髙祖招集士馬衆至千人仍命髙祖監宋隆郡所部安化二縣元不賔髙祖討平之尋監西江督護髙要郡守先是武林侯蕭諮爲交州刺史以裒刻失衆心土人李賁連結數州豪傑同時反遣髙州刺史孫囧新州刺史盧子雄將兵擊之囧等不時而進皆敗於廣州伏誅子雄弟子略與囧子姪及其主帥杜天合杜僧明共舉兵執江南督護沈覬進㓂廣州晝夜苦攻州中震恐髙祖率精兵三千卷甲兼行以救之頻戰屢捷天合中流矢死賊衆大潰僧明遂降梁武帝深歎異焉授直閤將軍封新安子邑三百户仍遣畫工圗髙祖而觀之其年冬蕭映卒明年髙祖送喪還都至大庾領㑹有詔髙祖爲交州司馬領武平太守與刺史楊㬓匹妙切南討十一年六月軍至交州賁衆數萬於蘇歴江口立城柵以拒官軍㬓推髙祖爲前鋒所向摧䧟賁走典澈湖於屈獠界立砦音寨大造船艦充塞湖中衆軍憚之頓湖口不敢進夜江水暴起七文注湖中奔流迅激髙祖勒所部兵乗流先進衆軍鼓譟俱前賊衆大潰賁竄入屈獠洞中屈獠斬賁傳首京師是歲太清元年也除振逺將軍西江督護髙要太守督七郡諸軍事二年冬侯景㓂京師髙祖將率兵赴援廣州刺史元景仲隂有異志將圗髙祖髙祖知其計與成州刺史王懷明行臺選郎殷外臣等宻議誡嚴三年七月集義兵於南海馳檄以討景仲景仲窮蹙縊干閤下髙祖迎蕭勃鎮廣州十一月髙祖遣杜僧明胡頴將二千人頓干嶺上并厚結始興豪傑同謀義舉侯安都張偲音等率千餘人來附蕭勃聞之遣鍾休恱說髙祖曰侯景驍雄天下無敵前者援軍十萬士馬精強然而莫敢當鋒遂令羯賊得志以君踈外詎可闇投未若且住始興遥張聲勢保此㤗山自求多福髙祖泣謂休恱曰僕夲庸虚蒙國成造往聞侯景渡江即欲赴援今京都覆没主上蒙塵君辱臣死誰敢愛命君侯體則皇枝任崇方岳巳不能摧鋒萬里雪此冤痛見遣一軍猶賢乎巳乃降後旨使人慨然僕行計决矣慿爲披述乃遣使間道往江陵禀承軍期節度湘東王承制授髙祖貟外散騎常侍持節明威將軍交州刺史改封南野縣伯六月髙祖脩嶂頭古城徙居焉髙州刺史李遷仕據大臯遣主帥杜平虜率千人入贑音紺石魚梁髙祖命周文育將兵擊走之遷仕奔寧都承制授髙祖通直散騎常侍使持節信威將軍豫州刺史領豫章内史改封長城縣侯尋授散騎常侍使持節都督六郡諸軍事軍師將軍南江州刺史餘如故時寧都人劉藹等資遷仕舟艫兵仗將襲南康髙祖遣杜僧明等率二萬人據白口築城以禦之遷仕亦立城以相對二年三月僧明等攻拔其城生擒遷仕送南康髙祖斬之承制命髙祖進兵定江州仍授江州刺史餘如故六月髙祖發自南康觀者數萬人是時承制遣征都將軍王僧辯督衆軍討侯景八月僧辯軍次湓城髙祖率杜僧明等衆軍及南川豪師合三萬人將㑹焉時西軍乏食髙祖先貯軍粮五十萬石至是分三十萬以資之仍頓巴丘㑹侯景廢簡文帝立豫章嗣王㨂髙祖遣兼長史沈衮奉表于江陵勸進十一月承制授髙祖使持節都督㑹稽東陽新安臨海永嘉五郡諸軍事平東將軍楊州刺史領㑹稽太守豫章内史餘並如故三年正月髙祖率甲士三萬人強弩五千張舟艦二千乗發自豫章二月次桑落洲遣中記室參軍江元禮以事表江陵承制加髙祖鼓吹一部是時僧辯巳發湓城㑹髙祖于白茅灣乃登岸結壇刑牲盟約進軍次蕪湖侯景城主張黒弃城走三月髙祖與諸軍進尅姑熟仍次蔡州侯景登石頭城觀望形勢意甚不恱謂左右曰此軍上有紫氣不易可當乃以船䑰貯石沉塞淮口縁淮作城自石頭迄青溪十餘里中樓雉相接諸將未有所決僧辯遣杜崱問計於髙祖髙祖曰前柳仲禮數十萬兵隔水而坐韋粲之在清溪竟不渡岸賊乃登髙望之表裏俱盡肆其凶虐覆我王師今圍石頭湏渡北岸諸將若不能當鋒請先徃立柵髙祖即於石頭西横隴築柵衆軍次連八城直出東北賊恐西州路斷亦於東北果林作五城以遏大路景率衆萬餘人鐵騎八百餘匹結陣而進乃命諸將分處置兵賊直衝王僧志僧志小縮髙祖遣徐度領弩手二千横截其後賊乃却髙祖與王琳杜龕等以鐵騎悉力乗之賊退據其柵景儀同盧輝略開石頭北門來降盪主戴晃曹宣等攻拔果林一城衆軍又尅其四城賊復還殊死戰又盡奪所得城柵髙祖大怒親率攻之士卒騰柵而入賊復散走景與百餘騎弃矟執刀左右衝陣陣不動景衆大潰遂北至西明門景至闕下不敢入臺遣腹心取其二子而遁髙祖率衆出廣陵應接景將郭元建㑹元建奔齊髙祖納其部曲三千人而還僧辯啓髙祖鎮京口五月齊遣辛術圍嚴超逹於秦郡髙祖命徐度領兵助其固守齊衆七萬填壍起土山穿地道攻之甚急髙祖乃自率萬人解其圍縱兵四靣擊齊軍弓弩亂發齊平秦王中流矢死斬首數百級齊人収兵而退髙祖振旅南歸遣記室參軍劉夲仁獻捷于江陵承制授髙祖使持節散騎常侍都督南徐州諸軍事征北大將軍開府儀同三司南徐州刺史餘並如故及王僧辯率衆征陸納於湘州承制命髙祖代鎮楊州十一月湘東王即位于江陵改承聖元年明年湘州平髙祖旋鎮京口三年三月進髙祖司空餘如故十一月西魏攻䧟江陵髙祖與王僧辯等進啓江州請晉安王以太宰承制又遣長史謝哲奉牋勸進十二月晉安王至自潯陽入居朝堂給髙祖班劒二十人四年五月齊送貞陽侯淵明還主社稷王僧辯納之即位改元曰天成以晉安王爲皇太子𥘉齊之請納貞陽侯也髙祖以爲不可遣使詣僧辯苦爭之往返數四僧辯竟不從髙祖居常憤艱宻謂所親曰武皇雖盤石之宗逺布四海至于尅雪讎恥寧濟艱難唯孝元而巳功業懋盛前代未聞我與王公俱受重寄語未絶音聲猶在耳豈期一旦便有異圗嗣主髙祖之孫元皇之子海内屬目天下宅心竟有何辜㘴致廢黜逺求夷狄假立非次觀其此情亦可知矣乃宻具𫀆數千領及錦綵金銀以爲賞賜之具九月壬寅髙祖召徐度侯安都周文育等謀之仍部列將士分賞金帛水陸俱進是夜發南徐州討王僧辯甲辰髙祖歩軍至石頭前進遣勇士自城北踰入時僧辯方視事外白有兵俄而兵自内出僧辯遽走與其弟三子頠相遇俱岀閤左右尚數十人苦戰髙祖大兵尋至僧辯衆寡不敵走登城南門樓髙祖因風縱火僧辯窮迫乃就擒是夜縊僧辯及頠景午貞陽侯遜位百僚奉晉安王上表勸進十月巳酉晉安王即位改承聖四年爲紹康元年壬子詔授髙祖侍中大都督中外諸軍事車騎將軍楊南徐二州刺史持節司空班劒鼔吹並如故仍詔髙祖甲仗百人出入殿省震州刺史杜龕據呉興與義興太守韋載同舉兵反髙祖命周文育衆攻載于義興龕遣其從弟北叟將兵拒戰北叟敗歸義興二年正月癸未誅杜龕于呉興龕從弟北叟司馬沈孝敦並賜死二月庚申髙祖遣侯安都周鐵武率舸艦備江川仍頓梁山起柵二月戊戌齊遣水軍儀同蕭軌庫狄伏連堯難宇東方老侍中裴英起東廣州刺史獨孤辟惡洛州刺史李希光并任約徐嗣徽等率衆十萬出柵口向梁山帳内盪主黄叢逆擊敗之燒其前軍船艦齊頓軍保蕪湖髙祖遣定州刺史沈泰呉郡太守裴忌就侯安都共據梁山以禦之四月丁巳髙祖詣梁山軍廵撫五月甲申齊兵發自蕪湖景申至秣陵故治髙祖遣周文育屯方山徐度頓馬牧杜稜頓大航南巳亥髙祖率宗室王侯及朝臣將帥於大司馬門外白獸闕下刑牲告天以齊人背約發言慷慨涕泗交流同盟皆莫能仰視士卒觀者益奮辛丑齊軍於秣陵故縣跨淮立橋柵引渡兵馬其夜至方山侯安都周文育徐度等各引兵還京師癸未齊兵自方山進及皃塘游騎至臺周文育侯安都頓白土崗旗鼔相望都邑震駭髙祖潜撤精卒三千配沈泰渡江襲齊行臺趙彦深於瓜歩獲舟艦百餘艘陳粟萬斛六月壬辰齊兵潜至鍾山龍尾丁未進至幕府山髙祖命衆軍秣馬蓐食遲明攻之乙卯旦自率帳内麾下岀幕附山南呉明徹沈泰等衆軍首尾齊舉縱兵大戰侯安都自白下自引兵横出其後齊師大潰斬獲數千人相蹂藉而死者不可勝計生執徐嗣宗斬之以徇追奔至于臨沂其江乗攝山鍾山等諸軍相次克捷七月景子詔授髙祖中書監司徒揚州刺史進爵爲公增邑并前五千户并給油幢皂輪車是月侯瑱他甸切以江州入附遣侯安都鎮上流定南中諸郡八月癸夘太府卿何敳五耒切新州刺史華志各上玉璽一髙祖表以送臺詔歸之髙祖是日詔髙祖食安吉武康二縣合五千户九月進髙祖位丞相録尚書事鎭衛大將軍改刺史爲牧進封義興郡公丁未中散大夫王彭牋稱今月五日平旦於御路見龍迹自太里至象闕亘三四里庚申詔追贈髙祖考侍中光禄大夫加金章紫綬封義興郡公謚曰恭十月甲戌勑丞相自今入問訊可施别榻以近扆坐二年正月壬寅天子朝萬國于太極東堂詔加髙祖班劒十人八月甲午進髙祖位太傳加黄鉞劒}
