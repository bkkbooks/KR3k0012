  - {type: variant, offset: 9, length: 0, content: '', WYG: 蕭詧蕭巋蕭琮陳陳霸先梁肅方智梁書曰敬帝諱方智字慧相小字法真世祖第九子也太清三年封興梁侯承聖元年封晉安郡王二年出為平南將軍江州刺史三年十一月江陵陷太尉揚州刺史王僧辯司空南徐州刺史陳霸先定議以帝為太宰承制奉迎還京師四年二月至自尋陽入居朝堂以太尉王僧辯為中書監録尚書驃騎將軍都督中外諸軍事加司空陳霸先班劒二十人三月齊遣其上黨王高渙送貞陽侯蕭淵明來至東關帝遣吳興太守裴之横與戰敗績之横死王僧辯率衆出屯姑熟七月王僧辯納貞陽侯蕭淵明自采石濟江入於京師以帝為皇太子九月司空陳霸先舉義兵襲殺王僧辯黜蕭淵明丙午帝即皇帝位十月詔改承聖四年為紹泰元年大赦以貞陽侯淵明為司徒封建安郡公以司空陳霸先為尚書令尊母夏貴妃為皇太后立妃王氏為皇后太平元年正月大赦四月齊軍水步入丹陽縣至秣陵故治六月齊潛軍至蔣山北至𤣥武湖司空陳霸先授衆軍節度大破之七月陳霸先進位司徒九月改元大赦除司徒陳霸先為丞相録尚書事二年四月齊遣使請和八月加丞相黄鉞領太傅劒履上殿九月為相國總百揆封十郡為陳公備九錫之禮十月禪位於陳奉帝為江隂王薨於外邸時年十六追諡敬皇帝史臣曰梁季横潰喪亂屢臻當此之時天厯去矣敬皇高讓將同釋負焉後梁蕭詧梁書曰後梁宣帝諱詧昭明太子第三子也封岳陽王授雍州刺史孝元被西魏所害詧遂為魏附庸稱大定元年以蔡大寳為相時人比昭烈遇孔明詧性不好酒尤惡見婦人酷信佛法謂尚書宋如周曰卿何謗經如周踧踖自陳懼而出以告大寳寳曰卿當不謗餘經不信法華耳如周乃悟經云隨喜面不狹長如周面狹且長故戲之耳詧居處殘毁干戈日用在位八年憤惋而殂年四十子巋立蕭巋梁書曰明帝諱巋宣帝第三子也聰明有器識大定元年為太子宣帝崩太子即位號天保元年十五年周武帝平北齊得傳國璽巋入周賀武帝大㑹羣臣及諸藩客周武自彈琵琶令故齊主高緯起舞達摩及故安徳王延宗悲不自勝緯舞訖勸巋巋乃起舞周武曰梁主乃能為朕舞乎巋曰陛下既自彈五絃臣何敢不同百獸周武大恱周武指齊氏故臣北列長艾謂巋曰是登陴罵朕者巋曰長艾未能抱樂翻敢吠堯周武大笑初雖禮接巋未深知之至是巋承間乃陳父荷太祖拯救之恩并敘二國艱虞唇齒犄角之事辭理辯暢因涕泗交流周武亦為歔欷自是禮遇日深賜雜繒百段馬五匹并賜齊宫伎女遣歸國執巋手曰待破突厥必送梁王歸江東巋途經古跡莫不駐馬賦詩以敘其懐至於江陵凡三十首女為秦晉王廣妃在位十四年而殂蕭琮梁書曰琮明帝太子也既立赦其封内改元寛運琮性廣仁有大度博學有文義兼善弓馬明年隋文徴琮入朝琮率其臣二百餘人朝於長安羣臣辭於送客堂琮下馬執別莫不殞涕既至隋文帝留之使崔𢎞度將兵攻江陵江陵不守於是國廢陳陳霸先陳}
