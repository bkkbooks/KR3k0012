  - {type: variant, offset: 401, length: 323, content: 全師而歸俄以高祖行雍州府事明帝崩東昏即位始安王遙光徐孝嗣江杞更直內省分日帖勑高祖聞之謂從舅張弘策曰政出多門亂其階矣時高祖長兄懿罷益州還仍行郢州事乃使弘策詣郢陳計於懿曰若隙開釁起必中外土崩今得守外藩幸圖身計郢州控帶荊湘西注漢沔雍州士馬呼吸數萬虎視其間以觀天下此蓋萬全之策如不早圖之悔無及也懿聞之色變心不之許弘策還是歲至襄陽於是潛造器械多伐竹木沉於檀溪密為舟裝之備二年冬懿被害信至高祖密召長史王茂中兵呂僧珍等謀之以十一月召僚佐集於廳事謂之曰昔武王會盟津皆曰紂可伐今昏主惡稔窮虐極暴誅戮朝賢罕有遺育生人塗炭天命殛之卿等同心疾惡共興義舉公侯將相良在茲日各盡勳效我不食言是日建牙於是收集得甲士萬餘人馬千餘匹船三百艘音騷出檀溪竹木裝艦東昏以劉山陽為巴西太守配, WYG: 率}
