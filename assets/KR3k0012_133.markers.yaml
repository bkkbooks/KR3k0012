  - {type: variant, offset: 2465, length: 521, content: 子天監五年封晉安王中大通三年四月昭明太子薨五月立為皇太子太清三年五月高祖崩即皇帝位大寶元年正月大赦改元西魏寇安陸執同州刺史柳仲禮盡沒漢東之地二月邵陵王綸自尋陽至于夏口郢州刺史南平王恪以州讓綸侯景逼帝幸西州夏大飢人相食京師尤甚前司州刺史羊鴉仁自尚書省出奔西州八月湘東王繹遣領軍將軍王僧辨率眾逼郢州侯景自進位相國封二十郡為漢王邵陵王綸棄郢州走十月侯景自加宇宙大將軍都督六合諸軍事二年三月侯景自率眾西寇自石頭至新林舳艫相接四月西陽景分遣魏將宋子仙任約襲郢州閏月景進寇巴陵王僧辨連戰不能剋五月湘東王遣遊擊將軍胡僧祐信州刺史陸法和援巴陵景遣任約帥眾拒援軍六月僧祐等擊破任約擒之景解圍霄遁王僧辯督眾軍追景攻魯山城剋之七月景還至京師王僧辯軍次湓城八月侯景遣衛尉卿彭雋率兵入殿廢帝為晉安王幽于永福省害皇太子大器潯陽王大心及潯陽王諸子二十人矯詔禪于豫章嗣王棟大赦改元十月帝崩于永福省時年四十九賊偽謚曰明皇帝廟稱高宗明年三月王僧辯率百官奉梓宮昇朝堂世祖追崇為簡文皇帝廟曰太宗葬莊陵梁書曰太宗見幽縶題自序云有梁正士蘭陵蕭世讚立身行道終始如一風雨如晦雞鳴不已弗欺暗室豈況三光數至於此命也如何又為連珠二首文甚悽愴蕭繹梁書曰世祖孝元皇帝諱繹字世誠小字七符高祖第七子也天監, SBCK: ''}
