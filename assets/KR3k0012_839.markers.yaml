  - {type: variant, offset: 2717, length: 6, content: 盜因感悟棄麥, krp: 晉書曰杜預脩邵信臣遺跡激用滍淯諸水以浸稻田萬餘頃分疆刋石使有定分公私同利衆庶頼之號曰杜父舊水道又曰惠帝征成都王狼狽左脚三指折匐入稻苗中頼侍中嵇紹以身趕之又曰郭翻字長翔武昌隱士也不交丗事唯以漁釣射獵爲娱貧無業欲墾荒田先立表題經年無主然後乃作稻將熟有認之者悉與之縣令聞}
  - {type: variant, offset: 2719, length: 0, content: '', WYG: 地為時三月榆莢時雨髙地强土可種禾薄田不能糞者以原蠶矢雜禾種之則禾不蟲崔寔四民月令曰三月二日可種稹禾夢書曰禾稼為財用之所出夢見禾吉財氣生廣志曰渠禾蔓生寔如葵子米粉白如麵為饘粥牛食之肥六月種九月熟}
  - {type: variant, offset: 2720, length: 2, content: 悟棄, WYG: 禾扶䟽生寔似大}
