  - {type: variant, offset: 2869, length: 151, content: 突擊也三三三謂六月三日也舞了者謂元衡之卒也又曰西女國每十月令巫者齎肴詣山中散糟麥於空犬呪呼鳥俄而鳥如雞飛入巫者之懷因割腹而視之每有一穀來歲必登若有霜雪必有災異其俗信之名為鳥卜又曰吐谷渾地氣大寒不生秔稻有青稞還瓦切麥䝁音勞豆小麥喬麥莊子曰大儒以詩禮發冢小儒曰口中有珠詩曰青青之麥生於陵坂生不布施死何含珠為, SBCK: 足食}
