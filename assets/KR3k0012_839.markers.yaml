  - {type: variant, offset: 551, length: 164, content: 史弟道存代覬為後軍長史江夏內史時東土大旱都邑米貴一升將百錢道存慮覬甚乏遣使載五百斛米餉之覬呼使謂之曰我在彼三載去官之日不辦有路糧卿至彼未幾郍能便得此米即可載還彼吏曰自古已來無有載米上水者都下米貴乞於此貨之不聽吏乃載米而去梁書曰庾詵嘗乘舟從𣸭中山舍還載米一百五十石有人寄載四十石及至宅寄載者曰君四十斛我百五十斛詵嘿然不言恣其取足鄰, SBCK: 充箱}
