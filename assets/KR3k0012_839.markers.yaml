  - {type: variant, offset: 3289, length: 0, content: '', krp: 如此者不䔉益息也先時者大夲而莖葉格對對等短秱短穗多粃厚糠薄米多芒後時者纎莖而不滋厚糠多粃辟米不得待定熟仰天而死又曰史起爲鄴令民大𬒳其利相與歌之曰鄴有聖令爲史公決漳水兮灌鄴旁終古斥鹵兮生稻粱呉越春秋曰越王勾踐復興師伐吴吴王敗晝夜馳走三日飢頋見生稻而取食之抱朴子曰南海晉安九熟之稲㑹稽典録曰夏香有盗刈其稻者香助爲收之盗者慙送}
  - {type: variant, offset: 3290, length: 2, content: 息使, krp: 還香香不受風土記曰穰稻之紫莖稴稴衘二音稻之有青穟米皆青白者也水經曰任延爲九眞太守教民耕蓺法與華同名曰田種白榖七月大作十月登熟名赤田種赤榖十二月作四月登熟所謂兩熟之稻也丗說曰晉簡文見田中稻苗不識問}
