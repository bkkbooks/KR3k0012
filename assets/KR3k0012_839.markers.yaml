  - {type: variant, offset: 2370, length: 1, content: 扶, SBCK: 穗長一尺餘穗上粒重疊如連珠又曰馬燧大暦四年爲懷州刺史乗兵亂後其夏大旱人失耕種燧乃務教化將吏有父母者燧輙造之施敬収􅄟􅁀骨去其煩苛至秋田中生穭禾人頗便之穞音吕禾􅄪生也又曰元和中東川觀察使潘孟陽上言龍州武安川中嘉禾生有麟食之復生麟之來一鹿引之羣鹿隨焉光華不可正視􅀞工就圖之并嘉禾一函以獻淮南子曰后稷辟􅁟墾草以爲百姓力農然而不能使禾冬生又曰洛水輕利而冝禾又曰夫子見禾之三變夫子孔子也三變始於粟粟生於苗苗成於穗也滔滔然曰狐郷丘而死我其首禾乎禾穗垂而向根君子不忘夲也吕氏春秋曰飯之美也􅀇山之禾山海經曰崑崙墟上有禾禾長五尋郭璞注曰木禾榖頴也白虎通曰德至於地則嘉禾生嘉禾者大禾也􅀃文曰禾嘉榖也二月始生八月而熟得時之中故謂之禾木也木王而生金王而死稹早種也頴禾末也榖禾皮也稈禾莖也稾稈也㑹稽典録曰沈勲身自耕耘以供衣食人有盗穫其禾勲見而避之明日更収拾送致其家盗者愧懼齋還不受六韜曰人主好田獵則歳多大}
  - {type: page-break, offset: 2370, content: '', id: KR3k0012_SBCK_839-4a}
