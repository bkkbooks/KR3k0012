  - {type: variant, offset: 3794, length: 2, content: 啖麥, SBCK: 海陵縣扶江接海多糜獸千千爲羣掘食草根其處成泥名麋畯民人隨此畯種稻不耕而􅀗其收百倍任昉􅄒異記曰夏禹時天雨稻古詩云安得天雨稻飼我天下民物理論曰稻者漑種之㹅名養生要集曰秔稻屬也稻亦秔之㹅名也道家方藥有用稻米秔米此則是兩物也稻米粒白如霜味苦主温服之}
  - {type: variant, offset: 3794, length: 2, content: 啖麥, WYG: 海陵縣扶江接海多麋獸十千為羣掘食草根其處成泥名麋畯民人随此畯種稲不耕而穫其收百倍蔡邕月令曰十月穫稲九月熟者謂之半夏稲任昉述異記曰夏禹時天雨稲古詩云安得天雨稲飼我天下民物理論曰稻者溉種之總名養生要集曰秔稲屬也稻亦秔之總名也道家方藥有用稲米秔米此則是兩物也稻米粒白如霜味苦主温服之}
