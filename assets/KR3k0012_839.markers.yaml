  - {type: variant, offset: 3802, length: 2, content: 近世, SBCK: 國秔再熟之稻郷貢八䖝之綿盧毓冀州論曰河内好稻秔與粳通用􅀃文曰秔稻屬也宋書曰陶濳爲彭澤令公田悉令吏種秫妻子固請種粳乃使五十􅅿種粳陳書曰徐孝克所生母患欲粳米爲粥不能辦母亡後孝克遂常啖麥}
  - {type: variant, offset: 3802, length: 1, content: 近, WYG: 國税再熟之稲鄉貢八蠶之綿盧毓冀州論曰河内好稲秔與粳通用説文曰秔稲屬也宋書曰陶潜為彭澤令公田悉令吏種秫妻子固請乃使五十畆種粳陳書曰徐孝克所生母患疾欲粳米為粥不能常辦母亾後孝克遂常啖麥有遺粳米者對而悲泣終身不復食焉後魏書曰安同遼東郡人也太宗使同與長孫嵩並理人訟}
