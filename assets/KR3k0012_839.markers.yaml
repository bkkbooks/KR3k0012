  - {type: variant, offset: 130, length: 118, content: 輔大旱帝避正殿請雨遣使者洗囚徒原輕繫洗謂蕩滌也是時穀一斛五十萬豆麥一斛二十萬人相食啖白骨委積帝使御史侯汶出太倉米豆為飢人作麋粥經日而死者無數帝疑賑卹有虛乃親於御坐前量試作麋乃知非實袁宏漢記曰時勑侍中劉艾取米豆五升於御前作麋得滿三盂於是謂, SBCK: 禾稻秔秫禾}
