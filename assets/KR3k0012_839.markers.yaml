  - {type: variant, offset: 2717, length: 6, content: 盜因感悟棄麥, SBCK: 晉書曰杜預脩邵信臣遺跡激用滍淯諸水以浸稻田萬餘頃分疆刋石使有定分公私同利衆庶頼之號曰杜父舊水道又曰惠帝征成都王狼狽左脚三指折匐入稻苗中頼侍中􅄞紹以身趕之又曰郭翻字長翔武昌隱士也不交丗事唯以漁釣射獵爲娱貧無業欲墾荒田先立表題經年無主然後乃作稻將熟有認之者悉與之縣令聞}
  - {type: page-break, offset: 2717, content: '', id: KR3k0012_SBCK_839-6b}
  - {type: variant, offset: 2717, length: 1, content: 盜, WYG: 明日更収拾送致其家盗者愧懼齎還不受六韜曰人主好田獵則歳多大風禾榖不實鄭𤣥别傳曰𤣥年十六號曰神童民有獻嘉禾者欲表府文辭鄙畧𤣥為改作又著頌一篇侯相髙其才為修冠禮杜實大業拾遺録曰七年九月太原郡有獻禾一本三穂長八尺穂長三尺五寸大尺圍芒穂皆紫色鮮明可愛自禾已上二尺餘亦紫色有老人年八十餘以素木匣盛之賜物三十叚勑授嘉禾縣令續捜神記曰盧陵巴丘人文晁者世以田作為業秋収已過穫刈都畢明旦至田禾悉復滿湛然如初即更穫所穫盈倉而巨富廣五行記曰東魏孝静帝天保初四月禾夜生於帝銅硯中及明晨長數寸其年帝為髙洋所幽遇鴆而崩古今註曰和帝元年嘉禾生濟隂城陽一莖九穂安帝延光三年嘉禾生九真百五十六本一百六十八穂汜勝之書曰種禾無期}
  - {type: page-break, offset: 2717, content: '', id: KR3k0012_WYG_839-7b, image: WYG0900/WYG0900-0422b.png}
