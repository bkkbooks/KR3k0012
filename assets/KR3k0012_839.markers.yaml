  - {type: variant, offset: 2761, length: 1, content: 詡, SBCK: 惠太子幸東田觀穫稻文惠頋謂雲曰刈此甚快雲曰三時之務亦甚勤勞願殿下知稼穡之艱難無徇一朝之宴逸也文惠改容謝之南史曰孔琇之有吏能仕齊爲吴令有小兒年十歳偷刈隣家稻一束琇之付獄案罪或諌之琇之曰十歳便爲盗長大何所不爲縣中皆震肅梁書曰鄧元起甞至其西洱田舎有沙門造之乞於元起有稻幾二千斛悉以施之時人稱其有大度又曰陳伯之濟隂睢陵人也年十三四好着􅆩皮冠帶刺刀􅀱鄰里稻熟輒偷刈之甞爲田主所見呵之曰楚子莫動伯之曰君稻幸多取一檐何􅀂田主將執之}
  - {type: page-break, offset: 2761, content: '', id: KR3k0012_SBCK_839-7b}
  - {type: variant, offset: 2761, length: 1, content: 詡, WYG: 恵太子幸東田觀穫稲文恵顧謂雲曰刈此甚快雲曰三時之務亦甚勤勞願殿下知稼穡之艱難無徇一朝之宴逸也文恵改容謝之南史曰孔琇之有吏能仕齊為吳令有小兒年十歳偷刈隣家稲榖一束琇之付獄案罪或諫之琇之曰十歳便為盗長大何所不為縣中皆震肅梁書曰鄧元起嘗至其西沮田舍有沙門造之乞元起有稲幾二千斛悉以施之時人稱其有大度又曰陳伯之濟隂睢陵人也年十三四好着獺皮冠帶刺刀候隣里稲熟収刈之嘗為田主所見呵之曰楚子莫動伯之曰君稲幸熟取一擔何傷若田主將執之}
