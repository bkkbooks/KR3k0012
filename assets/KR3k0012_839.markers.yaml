  - {type: 'tls:seg', offset: 2721, content: '', id: KR3k0012_CHANT_839-37a.7}
  - {type: variant, offset: 2723, length: 0, content: '', WYG: 楊禾實似雚粒細也折右炊停即牙生此中國巴禾木稷也大禾髙一丈餘子如小豆出粟特國稻周禮夏官職方氏曰揚州宜稻青州宜麥禮記曲禮下曰祭宗廟之禮稻曰嘉蔬又月令曰季秋之月天子乃以犬嘗稻先薦寢廟又内則曰飲重醴清糟稲醴清糟黍醴清糟又内則曰取稲米舉糔息酒切溲所九切之小切狼臅昌録切膏以與稲米為酏之然切左傳昭五曰鄅人藉稲履行之也春秋説題辭曰稲之為言藉也稲冬含水盛其徳也故稲太隂精含水漸洳乃能化也江旁多稲固其宜也宋均注曰稲包裹也稲非水不生故曰隂精也孝􅀴援神契曰汚泉宜稲爾雅曰稌稲也今沛國呼稌也廣雅曰粢稲其穂謂之禾東觀漢記曰劉敞拜盧江都尉歳餘遭旱行縣人持稲皆枯吏强責之租敞應曰太守事也載枯稲至太守所酒數行以語太守太守曰無有敞以枯稲示之太守曰都尉事也敞怒叱太守曰䑕何敢爾也漢書曰鄧晨為汝南太守興鴻郄陂數千頃田鴻郄陂名今在豫州汝南縣東成帝時河東水波溢為害翟方進為丞相奏罷之江表傳曰孫亮五鳯元年交趾稗草化為稲呉志曰鍾離牧字子幹會稽山隂人少居永興自墾田種稲二十餘畆臨熟}
