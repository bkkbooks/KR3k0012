  - {type: variant, offset: 2519, length: 0, content: '', SBCK: 楊禾似藋粒細也折右炊停即牙生此中國巴禾木稷也火禾髙丈餘子如小豆出粟特特國稻周禮夏官職方氏曰楊州冝稻青州冝稻麥禮記曲禮下曰􅀕示廟之禮稻曰嘉􅂼又月令曰季秋之月天子乃以大甞稻先薦寢廟又内則曰飲重醴清糟稻醴清糟􅁰醴清糟又内則曰取稻米舉糔息酒切溲所九切之小切狼臅昌録切膏以與稻米爲酏之然切左傳昭五曰鄅音禹人藉稻履行之也春秋􅀃題辭曰稻之爲言藉也稻冬舎水盛其德也故稻太隂精含水漸洳乃能化也江旁多稻固其宜也宋均注曰稻苞裏也稻非水不生故曰隂精也孝經援神契曰汚泉冝稻尓雅曰稌稻也今沛國呼稌也廣雅曰粢稻其穗謂之禾東觀漢記曰劉敞拜廬江都尉歳餘遭旱行縣人持稻皆枯吏強責租敞應曰太守事也}
