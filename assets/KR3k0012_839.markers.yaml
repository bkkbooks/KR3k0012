  - {type: variant, offset: 3802, length: 2, content: 近世, krp: 國秔再熟之稻郷貢八䖝之綿盧毓冀州論曰河内好稻秔與粳通用說文曰秔稻屬也宋書曰陶濳爲彭澤令公田悉令吏種秫妻子固請種粳乃使五十畝種粳陳書曰徐孝克所生母患欲粳米爲粥不能辦母亡後孝克遂常啖麥}
  - {type: variant, offset: 3804, length: 0, content: '', WYG: 祖即位除清冀二州刺史同長子居典太倉事盗官粳米數石以養同大怒奏求戮居自劾不能訓子請罪太宗嘉而恕之詔長給同粳米神仙傳曰王烈字長休邯鄲人與稽叔夜入山遊􅃧烈後獨入太行山忽聞山東北如雷聲往視之見山破石中}
  - {type: variant, offset: 3805, length: 8, content: 田夫至巧削木為麥, SBCK: 遺粳米者孝克對而悲泣終身不復食焉後魏書曰安同遼東胡也太宗同與長孫嵩並理人訟丗祖即位除青冀二州刺史同長子居典太倉事盗官粳米數石以養同大怒奏求戮居自劾不能訓子請罪太宗嘉而恕遂詔長給同粳米神仙傳曰王烈字長休邯鄲人與􅄞叔夜}
