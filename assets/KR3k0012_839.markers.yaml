  - {type: variant, offset: 2453, length: 260, content: 方物在百濟東去長安九千八百里其人食麥又前涼錄曰永嘉元年嘉麥一莖九穗生姑臧三國典略曰李岳字祖仁官至中散大夫嘗為門客所說舉錢營生廣收大麥載赴晉陽候其寒食以求高價清明之日其車方達又從晉陽載化生向鄴城路逢大雨並化為泥息利既少乃至貧迫當世人士莫不笑之陳書曰侯景亂時吳明徹有粟麥三千餘斛而鄰里飢餒乃白諸兄曰今人不圖久奈何不與鄉里共此於是計口平分同其豐儉群盜聞而避焉賴以存者甚眾後周書曰大象末有強練師以無底囊歷長安市告乞市以米麥遺之隨即漏地人或問其故強練曰但令諸人見盛空耳及隋初遷都龍首山長安遂空矣隋書曰張文詡隱居嘗有人夜中竊刈其麥者, WYG: 禾勲}
