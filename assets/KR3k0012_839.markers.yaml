  - {type: variant, offset: 3, length: 126, content: 二米後漢書曰帝因西征隗囂至漆漆縣屬右扶風諸將多以王師之重不宜遠入險阻計猶豫未決會召馬援夜至帝大喜引入具以群議質之援因說隗囂將帥有土崩之勢兵進有必破之狀又於帝前聚米為山谷指畫形勢開示眾軍所從道徑往來分析昭然可曉帝曰虜在吾目中矣明旦遂進軍囂眾大潰又曰獻帝時, SBCK: ''}
