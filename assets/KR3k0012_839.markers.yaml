  - {type: variant, offset: 910, length: 448, content: 錦食必梁肉遠惟平生思季路負米之時可復得乎故序遺文垂示來世北史曰齊文宣帝崩當朝文士各作拘歌十首擇其善者而用之魏收陽休之祖孝徵等不過得一二首唯盧思道獨有八篇故時人稱為八美盧郎唐書曰李峴為京兆尹所在皆著聲績天寶十三載連雨六十餘日宰臣楊國忠惡其不附己以雨災歸咎京兆尹乃為長沙郡太守時京師米麥踴貴百姓謠言曰欲得米粟賤無過追李峴為其政得人心如此又曰張萬福為泗州刺史魏州飢父子相賣餓死者接道萬福曰魏州吾鄉里也安可不救令其兄子將米百車往餧之又使人於汴口求魏人自賣者給車牛贖而遣之又曰陽城嘗約其二弟云吾所得月俸汝可度吾家有幾口月食米當幾何買薪菜鹽米凡用幾錢先具之其餘悉以付酒媼無留也未嘗有所蓄積說苑曰子路曰負重道遠者不擇地而休家貧親老者不擇祿而仕昔者由事二親之時常食藜藿之實而為親負米百里之外親沒之後南遊於楚從車乘積粟萬鍾累茵而坐列鼎而食願食藜藿為親負米之時不可復得也枯魚御索幾何不蠹二親之壽忽如過隙草木欲長霜露不停賢者欲養二親不待故曰家貧親老不擇祿而仕也呂氏春秋曰孔子窮於陳蔡之間藜羹不糝七日不嘗粒晝寢顏回索米得, SBCK: 譯}
