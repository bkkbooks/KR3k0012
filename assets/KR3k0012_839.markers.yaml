  - {type: variant, offset: 2759, length: 1, content: 直, SBCK: 能譬繒中之好莫過錦錦不可以爲􅷏音滔榖中之美莫過稻稻不可以爲糜是以聖王使人必先以器苟非周材何能悉長黄覇馳名於州郡而息譽於京邑􅋝尉之材不爲三公自昔然也朂善之除松滋令宋書曰頋歡好學年六七歳家貧父使田中驅雀歡作黄雀賦而歸雀食稻過半父怒欲撻之見賦乃止齊書曰范雲甞從}
  - {type: page-break, offset: 2759, content: '', id: KR3k0012_SBCK_839-7a}
