  - {type: variant, offset: 3265, length: 1, content: 嘗, SBCK: 書令虞松作表輙不可意令松更定思竭不能改鍾會爲定五宇松深恱服宋謝莊讓中書令表曰伏惟陛下登馭震維臨齊璿政澤與風翔恩從雲動臣聞璧門天䆳鳯沼神深􅁝綸王言出納帝命自非望允當時譽宣庠塾未有謬垂曲寵空席兹榮在於平壯猶不可勉况今綿痼百志俱淪中書監魏志曰黄􅀄中改秘書爲中書以劉放爲監孫資爲令遂並掌機密歷文明齊王三世又曰蔣濟字子通時中書監令號爲專任濟上䟽曰大臣太重者國危左右太親者身弊古之至戒也徃者大臣秉事外內扇動陛下卓然自覽萬機莫不祗肅夫大臣匪不忠也然威權在下則衆心慢上􅀔之常也陛下旣巳察之於大臣願無忘於左右晉書曰荀勗守中書監毗賛朝政及遷尚書令勗乆在中書專管機事}
