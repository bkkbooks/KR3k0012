  - {type: variant, offset: 4264, length: 1, content: 姑, SBCK: 弟僧綽書曰闔門皆蒙時􅀻吾髙卧家巷遂至中書侍郎此足以闔棺矣又曰裴瓉風神髙邁爲中書侍郎出入禁門見者皆肅然改容北史曰趙彦深諷朝廷子堅爲中書侍郎頗招物議時馮子琮子慈明祖珽子君信並相繼居中書故時語云馮祖及趙穢我鳯池隋書曰元善拜內史侍郎上每望}
