  - {type: variant, offset: 3541, length: 353, content: 欲廣上林苑隆言堯舜至治廣德不務林苑帝後思其言徵為侍中益部耆舊傳曰蜀郡張寬字叔文漢武帝時為侍中從祀甘泉至渭橋有女人浴於渭水乳長七尺上怪其異遣問之女曰帝後第七車者知我所來時寬在第七車對曰天星主祭祀者齋戒不嚴則女人見又曰李固字子堅諫帝云臣一日會朝中見諸侍中皆諸家年少無一宿儒可顧問者乃進楊厚黃瓊三輔故事曰金日磾字翁叔封秺侯有忠勤之節七葉侍中文士傳曰張衡拜侍中恒居帷幄從容諷議拾遺左右竹林七賢傳曰山濤太始七年為侍中詔書曰濤清風淳履思心通遠宜侍帷幄盡規左右顏含別傳曰顏髦字君道儀狀嚴整風貌端美大司馬桓公歎曰顏侍中廊廟之望喉舌機要魏明帝先賢傳曰盧植字子幹拜侍中逆臣董卓議欲廢帝群僚之士唯卓是順獨植正色卓遂大怒欲害植議郎彭伯群與卓親入為卓議曰夫善人者天下之紀盧侍中海內大儒天下之望今先害之則天下怖卓遂止孔叢子曰孔臧與子琳, WYG: 减二員改爲内}
