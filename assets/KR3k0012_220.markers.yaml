  - {type: variant, offset: 3478, length: 144, content: 孔光不言溫室之樹每欽其餘風可庶幾也唐書官品志曰侍中高功者在職一年詔加侍中祭酒與侍郎高功者一人對掌禁令華陽國志曰譙隆為上林令武帝欲廣上林苑隆言堯舜至治廣德不務林苑帝後思其言徵為侍中益部耆舊傳曰蜀郡張寬字叔文漢武帝時為侍中從祀甘泉至渭橋有女人浴於渭水乳長七尺上怪其異遣問之女曰帝後第七車者知我, SBCK: 應謝}
