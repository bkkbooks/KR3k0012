  - {type: variant, offset: 3340, length: 2, content: 甄琛, WYG: 王濛字仲祖恬暢能言名理善𨽻書與劉恢爲中書侍郎太宗輔政濛恢並數侍接對號爲入室之賔恢字真長少清峻時人以濛比袁曜卿以恢比荀奉倩宋書曰王㣲與從弟僧綽書曰闔門皆蒙時私吾高卧家巷遂至中書侍郎此足以闔棺矣又曰裴瓚風神高邁遂爲中書侍郎岀入禁門皆肅然改容北史曰趙彦深諷朝廷以子堅為中書侍郎頗招物議時馮子琮子慈明祖珽子君信並相繼居中書故時語云馮祖及趙穢我鳯池隋書曰元善}
