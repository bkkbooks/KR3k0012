  - {type: variant, offset: 4262, length: 1, content: 咸, SBCK: 臧榮緒晉書曰夏侯孝􅀂爲野王令居邑累歳朝野多歎其屈除中書郎晉起居注曰今之士大夫多不樂出宰牧而好內官今皆先經外官治民著績然後入爲常伯中書郎曹嘉之晉紀曰汝南史曜字季茂爲山濤所知爲征南府小吏郷人周浚見曜而友之配之妺官至中書郎晉中興書曰孔演字元舒晉國􅀄建與􅁃亮俱􅀘中書侍郎于時中興肇建庶事草創演經學􅀶通又練識舊典朝議􅁤制多取正焉由是元明二帝並親愛之又曰顧榮齊王囧召爲主簿囧自擅威權榮知其必敗唯終日昏酒囧以榮爲中書郎又曰范寗爲臨淮太守徴拜中書侍郎專掌西省以職在機近固辭不許多以獻替有益治道又曰范寗拜中書侍郎時烈宗雅好文學而寗明習五經甚見親愛朝廷疑議輙諮訪之寗指朝士直言無諱又曰王濛字仲祖恬暢能言名理善􅀠書與劉恢爲中書侍郎太宗輔政濛恢並數侍接對號爲入室之賔恢字眞長少清峻時人以濛比􅀽曜卿以恢比荀奉倩宋書曰王徴與}
