  - {type: variant, offset: 2626, length: 0, content: '', SBCK: 書曰肅祖以温嶠爲散􅀐常侍侍講大寧􅀄手詔曰卿旣以令望忠允之懷著於周旋且文清而旨逺冝居深密今欲以卿爲中書令朝論咸以爲冝又曰}
  - {type: variant, offset: 2626, length: 0, content: '', WYG: 書曰肅祖以温嶠爲散騎常侍侍講大寧初手詔曰卿既以令望忠允之懷著於周旋且文清而㫖遠宜居深密今欲以卿爲中書令朝論咸以爲宜又曰}
