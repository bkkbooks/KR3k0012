  - {type: variant, offset: 228, length: 414, content: 以丹任為侍中又曰桑弘羊雒陽賈人子以心計年十五為侍中又曰霍去病以皇后姊子年十八為侍中善騎射又曰孝惠時侍中皆冠鵕鸃具帶傅脂粉矣又曰張良子辟強年十五為侍中又曰上官桀隴西人為中廄令上嘗疾及愈見馬多瘦怒曰汝以我不復見馬邪桀頓首曰臣聞聖體不安日夜憂惶意誠不在馬言未卒泣數行下帝以為忠親近之為侍中又曰衛尉金敞疾甚成帝拜子涉為侍中綠車載送衛尉府如淳曰載以皇孫車寵之也東觀漢記曰戴憑字次仲為侍中正旦朝賀百僚畢會帝令群臣能說經者更相難詰義有不通輒奪其席以益通者憑遂重坐五十餘席故京師為之語曰解經不窮戴侍中又曰馮魴字孝孫父子兄弟並帶青紫三代侍中後漢書曰趙典再遷為侍中時帝欲廣開鴻池典諫曰鴻池汎溉巳且百頃猶復增而深之非所以崇唐虞之約巳遵孝文之愛人也帝納其言而止又曰楊震孫奇靈帝時為侍中帝常從容問奇曰朕何如桓帝對曰陛下之於桓帝亦猶虞舜比德唐堯帝不悅曰卿強項真楊震子孫強項言不低屈也光武謂董宣為強項令也又曰朱穆因進見乃陳曰臣聞漢家舊典置侍中常侍各一人省尚書, SBCK: 敬}
