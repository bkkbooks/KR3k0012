  - {type: variant, offset: 2627, length: 3, content: 濬嘗問, SBCK: 洽字敬和顯宗時王洽爲中書令帝曰敬和清裁昔爲中書郎吾尚小數呼見意甚親之今以爲中書令欲共講文章之事也又曰禇裒授衛將軍中書令裒以中書銓管詔命不冝以親居之固讓晉令曰中書爲詔令記㑹時事典作文書也晉制曰中書令銅印墨綬進賢兩梁冠絳朝服佩水蒼玉乗軺車晉諸公讃曰陳准爲中書令張華爲監准與華俱處機密而推崇之每直日有詔書無小大輙先示華了不措意華得詔書不以示准省中號准爲中書五郎}
