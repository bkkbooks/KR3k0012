  - {type: variant, offset: 643, length: 522, content: 省覽黃門侍郎一人傳發書奏傳通皆用姓族引用土人有族望者自和熹太后以女主稱制不接公卿乃以閹人為常侍小黃門通命兩宮自此以來權傾人主窮困天下宜皆罷遣愽選耆儒宿德與參政事帝怒不應穆伏不肯起左右傳出傳聲令出也良久乃趨而去又曰爰延為侍中帝遊上林苑從容問延曰朕何如主也對曰陛下為漢中主帝曰何以言之對曰尚書令陳蕃任事則化中常侍黃門豫政則亂是以知陛下可與為善可與為非此中主之謂也帝曰昔朱雲廷折檻今侍中面稱朕違敬聞命矣又曰桓帝末侍中皇禪參乘上問貂璫何法不知所出又問地震云不為災還宮乃左遷議郎又曰王逸字叔師南郡宜城人也順帝時為侍中著楚辭章句行於代其賦誄書論及雜文凡二十一篇又作漢詩百二十三篇續漢書曰侍中比二千石無員漢官儀曰侍中左蟬右貂本秦丞相史往來殿內故謂之侍中分掌乘輿服物下至褻器虎子之屬武帝時孔安國為侍中以其儒者特聽掌御唾壺朝廷榮之至東京時屬少府亦無員駕出則一人負傳國璽操斬蛇劍參乘與中官俱止禁中謝承後漢書曰公孫曄拜愽士侍中國有疑事常使進見問其得失所陳皆據經依義補益國家深見省納又曰劉淑為侍中朝夕建議竭忠於朝補政二百餘事悉有篇章朝廷有疑事密詔問焉又曰周舉字宣光時詔遣八使巡行風俗皆選有威名者乃拜舉侍中與杜喬周翊馮羨欒巴張綱郭尊太尉長史劉班分行天下使同日而拜號曰八俊, SBCK: ''}
