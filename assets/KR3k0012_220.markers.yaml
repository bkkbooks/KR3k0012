  - {type: variant, offset: 4278, length: 2, content: 亦作, SBCK: 已甚無事也􅃆曰不然設官分職上下相維各申所見方爲濟理豈可俛黙偷安而爲懷禄士也自是每有制勑及曹事􅃆多所異同王濛别傳曰濛爲中書郎在職四年無人對以濛難與比肩故也鍾㑹母傳曰嘉平元年車駕朝髙平陵㑹爲中書郎從行宣王始舉兵衆人恐懼而夫人自􅀂嵇氏世家曰嵇含爲中書侍郎書檄雲集莫不立草通典曰隋􅀄爲内史侍郎四貟煬帝減}
