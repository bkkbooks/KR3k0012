  - {type: variant, offset: 2624, length: 1, content: 始, SBCK: 將辭之從兄朗之遺書曰弟今二十九便居清顯要任敢不敬以先旨爲弟啓義讓之路焉􅀂弟年至四五十之間雖復超登公輔亦非吾所豫况降此以還者耶洽遂不拜又曰温嶠上䟽曰臣才短學淺文義不通中書之職酬對無方斟酌重輕豈唯文䟽而巳自非望士良才何可妄居斯任累辭得止晉中}
