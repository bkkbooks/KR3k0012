  - {type: variant, offset: 4098, length: 228, content: 有名於世摯虞決疑要注曰晉武帝時彭權為侍中帝問侍臣旄頭之義何謂邪權對曰秦紀云秦國有奇怪觸山截水無不崩潰唯畏旄頭故使虎士執之以衛至尊山公啟事曰侍中太常河南尹並缺皆顯職宜必得其人右軍裴楷通理有才義僉論以為侍中才又啟云詔侍中缺當復得人誰可者雍州刺史郭弈左衛將軍王濟皆忠亮有美才侍中之最高者也傅咸詩序曰朗陵公何敬祖咸之從兄也國子祭酒王武子咸從姑之外孫何公既登侍中武子俄而亦作二賢相得甚欣咸亦慶之乃賦詩以申懷曰吾兄既鳳翔王子亦龍飛雙鸞游蘭渚二難揚清輝梁王筠為從兄讓侍中, WYG: 書郎}
