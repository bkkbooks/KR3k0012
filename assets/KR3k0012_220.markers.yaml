  - {type: variant, offset: 1394, length: 540, content: 典職曰侍中常伯選舊儒高德愽學洞達仰瞻俯視切問近對喻指公卿員八人在尚書僕射下尚書上漢雜事曰金敞為元帝侍中帝崩故事近臣皆隨陵為園敞世名忠孝太后使侍成帝魏志曰盧毓為侍中先是散騎常侍劉劭受詔定律未就毓上論曰古今制律之意以為法宜一正不宜有兩端使奸吏得容情及侍中高堂隆數以宮室事切諫帝不悅毓曰君明臣直古之聖王恐不聞其過故有敢諫之鼓近臣盡規此乃臣等所以不及隆隆諸生名為狂直陛下宜容之毓在職三年多所駮易又曰劉曄字子陽為侍中在朝略不交接時人或問其故曄荅曰魏室即祚尚新智者知命俗或未咸僕在漢為支葉於魏備腹心寡偶少徒於宜未失也又曰王粲字仲宣山陽高平人拜侍中愽物強識問無不對時舊儀弛廢方興造制度粲恒典之又曰蘇則拜侍中與董昭同寮嘗枕則膝臥則推之曰蘇則之膝非佞人之枕也又曰辛毗遷侍中于時帝欲徙冀州戶十萬貫于河南毗曰陛下不以臣不肖置之左右安得不與臣議帝不荅起入內毗隨而引其裾帝遂奮衣不還又曰蘇則與吉茂同隱於太白山後則為侍中侍中舊親省起居故俗謂之執虎子茂見則嘲曰仕進不止執虎子則笑曰誠不能效汝蹇蹇鹿車驅也蜀志曰宗預字德艷南陽人也預將命使吳孫權問預曰東之作與西譬猶一家而聞西更增白帝之守何也預對曰臣以為東益巴丘之戍西增白帝之守皆事勢宜然俱不足以相問也權大笑嘉其抗藎甚愛待之見敬亞於鄧芝費禕遷為侍中又曰關興字安國少有, SBCK: ''}
