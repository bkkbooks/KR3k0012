  - {type: variant, offset: 3293, length: 7, content: 羅結世祖初遷侍, SBCK: 孝文時蠕蠕如兖反國有喪帝遣髙閭爲書與之不叙凶事孝文謂曰卿爲}
  - {type: variant, offset: 3293, length: 4, content: 羅結世祖, WYG: 孝文時蠕蠕如袁反國有䘮帝遣高閭爲書與之不叙㓙事孝文謂曰卿爲中書監職典文詞若情思不至應謝所任環濟要畧曰中書掌内事密詔下州郡及邉將不由尚書者也後關百官岀益重有令僕射丞郎令史秩與尚書同陶氏職官要録曰中書監舊視僕射梁選簿書自宋已來比尚書令特進之流而無事任清貴華重大位多領之王導表曰臣乞得除中書監持節專壹所司竭誠保傅惟力是視詔曰昔者筍公曾從中書監爲尚書令人賀之乃發恚云奪我鳯凰池諸人何賀耶願足下處之勿疑王敦表曰中書令領軍庾亮清雅履正可中書監領軍如故中書侍郎六典曰中書侍郎掌貳令之職凡邦國之庶務朝廷之大政皆叅議焉凡臨軒冊命大臣令爲之使則持冊書以授之凡四夷來朝臨軒則授其表疏升於西階而奉之若獻贄幣則受之以授於所司魏志曰明帝詔舉中書郎謂吏部尚書盧毓曰得其人與不在盧生耳選舉莫取有名有名如畫地作餅不可噉也毓舉韓曁敦篤至行帝乃用之吳志曰孫琳求中書兩郎典知荆州諸事主者奏中書不應外岀休特聽之其所請求一皆給與也晉書曰華廙字長俊爲人清簡𢎞雅加以名家子孫以婦父盧毓典選至年四十五爲中書通事郎又曰華表子簡字奉駿有智器文藻官至中書郎又曰衞瓘爲中書郎時權臣專政瓘優游其間無所親疎甚爲傅嘏所重謂之寗武子臧榮緒晉書曰夏侯孝若爲野王令居邑累歲朝野多歎其屈除中書郎晉起居注曰今之士大夫多不樂岀宰牧而好内官今皆先經外官治民著績然後入爲常伯中書郎曹嘉之晉紀曰汝南史曜字季茂爲山濤所知爲征南府小吏鄉人周浚見曜而友之配之妹官至中書郎晉中興書曰孔演字元舒晉國}
