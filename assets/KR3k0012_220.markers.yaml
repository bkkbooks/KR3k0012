  - {type: variant, offset: 3210, length: 0, content: '', SBCK: 禇遂良拜中書令太宗寢疾召遂良及長孫無忌入卧内謂之曰卿等忠烈簡在朕心昔漢武􅀉霍光劉備託葛亮朕之後事一以委卿太子仁孝卿之所悉必湏盡誠輔佐永保宗社又頋謂太子曰無忌遂良在國家之事汝無憂矣又曰神龍元年改中書令曰紫微令又曰開元二年紫微令姚崇奏紫微舎人六貟每議事諸舎人同押連署狀進訖凡事有是非理均與奪人心旣異所見或殊抑使雷同情有不盡臣今啇量其事執見不同者望請别作啇量狀連本狀同奏􅀂狀語交牙恐煩聖思臣旣是官長望於兩狀後略言二理優劣奏聽進止則人各盡能官無留事勑曰可又曰張九齡爲中書令時天長節百寮上壽多獻珎異唯九齡進金鏡録五卷言前古興廢之道上賞異之薛瑩條列呉事曰胡冲意性調美心趣解暢有刀筆才閑於時事爲中書令雖不能匡矯亦自守不苟求容媚}
