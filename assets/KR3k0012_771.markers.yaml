  - {type: variant, offset: 1725, length: 193, content: 歌行晉棗據舡賦曰嘉聖王之神化理通微而達幽悼民萌之隔塞愍王教之不周立成器以備用因垂象以造舟濟迅波之絕軌越巨川之湍流運重固之滯質雖載沉而必浮且論器而比象似君子之淑清外質朴而無飾內空虛以受盈不辭勞而惡動不偷安以自寧且其行無轍趾止無所不疾而速忽若馳奔晉王叔之舟贊曰塗則騁車水惟用舟弱楫輕棹利涉濟求緬彼漁人鼓枻清謳後漢李尤舟楫銘曰舟楫之利譬猶輿馬載重歷遠以濟天下相風視波窮究川野安審懼慎終無不可艦, SBCK: 檀槳細堅櫓}
