  - {type: variant, offset: 2469, length: 2, content: 航方, SBCK: 竹索謂之笮茅索謂之索釋名曰引}
  - {type: variant, offset: 2469, length: 1, content: 航, WYG: 竹索謂之笮茅索謂之笮釋名引舟者曰笮笮作也起舟使動作也漢鼓吹曲曰桂樹為君船青絲為君笮木蘭為君棹黄金錯其間㠶釋名曰隨風張幔曰㠶使舟疾汎汎然韻集曰颿船張也颿音凡馬疾步也音義與帆同長沙耆舊傳曰夏隆仕郡時潘濬為南征太守遣隆脩書致禮濬飛帆中流力所不及隆乃於岸邉㧞刀大呼指濬為賊因此被收濬竒其以權變自通解縳賜以酒食吳時外國傳曰從加郍調州乗大伯舶張七帆時風一月餘日乃入秦大秦國也南州異物志曰外徼人隨舟大小或作四帆前後㳫載之有盧頭木葉如牖形長丈餘織以為帆其四帆不正前向皆使邪移相聚以取風吹風後者激而相射亦並得風力若急則隨宜城成之邪張相取風氣而無髙危之慮故行不避迅風激波所以能疾永嘉記云郡有石帆又有破石傳云古有神人以破石半為帆故名石帆吳郡録海記曰海虞縣有穿山下有洞空髙十丈廣十餘丈山皆在海中行侶舉帆從空中過陸景典語曰孤將與水軍一萬從風舉帆朝發海島暮至沓渚世說曰顧長康作殷荆州佐請假還東爾時例不給布帆顧苦求之然乃發至破冡便遭風大敗作牋與殷云地名破冡而出行人安稳布帆無恙馬融廣成頌曰然後}
