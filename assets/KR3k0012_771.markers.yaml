  - {type: variant, offset: 2475, length: 3, content: 誰謂河, SBCK: 桂樹爲君舡青􅁝爲君笮木蘭爲君棹黄金錯其間㠶釋名曰隨風張幔曰帆帆汎者舟疾汎汎然也韻集曰颿舡張也颿音凢馬疾歩也義以與㠶同長沙􅂄舊傳曰夏隆仕郡時潘濬爲南征太守遣隆脩書致禮濬飛㠶中流力所不及隆乃於岸邊抜刀大呼指濬爲賊因此􅀍收濬竒其以權変自通解縛賜以酒食吴時外國傳曰從加郍調州乗大伯舶張七㠶時風一月餘日乃入􅁗大􅁗國也南州異物志曰外徼人隨舟大小或作四㠶前後沓載之有盧頭木葉如牖形長丈餘織以爲㠶其四㠶不正前向皆使邪移相聚以取風吹風後者激而相射亦並得風力􅀂急則隨冝城減之邪張相取風氣而無髙危之慮故行不避迅風激波所以能疾永嘉記云郡有石帆又有破石傳云古有神人以破石半爲㠶故名石帆吴郡録海記曰海虞縣有穿山下有洞穴髙十丈}
