  - {type: variant, offset: 1938, length: 16, content: 洞冥記曰昆靈池中有淩波艦掖電艦吳, SBCK: 用旅力然後舟行也吴}
  - {type: variant, offset: 1938, length: 329, content: 洞冥記曰昆靈池中有淩波艦掖電艦吳志曰周瑜逆曹公部將黃公蓋取艨衝鬭艦數十艘實以薪草膏灌其中裏以帷幕上建牙旗同時發火時風猛火盛悉延燒岸上營曹公軍敗退晉中興書曰建興九年冬左將軍王敦遣振威將軍周訪廣武將軍趙誘受陶侃節度征蜀賊杜弢音韜大戰蜀賊以桔槔打沒侃艦二十餘艘人皆投水義熙起居注曰盧循新作八槽艦九枚起四層高十餘丈連營繕令曰諸私家不得有戰艦等舡艨衝釋名曰外狹而長曰艨衝吳志曰董襲討黃祖祖橫兩艨衝夾守沔口栟音并櫚音閭大紲繫石為碇軍不得前襲與陵統俱為前部各將敢死百人人被兩鎧乘舸舡突入艨衝裹身以刀斷兩紲艨衝方橫流大兵遂進又曰周瑜逆曹公部將黃蓋取艨衝鬭艦數十艦餘艦上艦門戶又曰將軍賀齊性奢綺好軍事所乘舡雕刻丹鏤青蓋綘居朦衝鬭艦之屬望之若山營繕令曰諸私家不得有蒙衝等舡餘具敘, WYG: 用旅力然後}
  - {type: variant, offset: 1938, length: 16, content: 洞冥記曰昆靈池中有淩波艦掖電艦吳, krp: 用旅力然後舟行也吴}
