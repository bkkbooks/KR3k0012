  - {type: variant, offset: 249, length: 447, content: 可用之大翼者當陵軍之車小翼者當陵軍之輕車突冐者當陵軍之衝車樓舡者當陵軍之行樓車也橋舡者當陵軍之輕足剽定騎也瑞應圖曰王者德盛則金人下乘舡遊王後池郡國誌曰越州百塗山有石舡一丈禹所乘者宋元嘉中有人於舡側得鐵履一量一云有聖姑從海中乘舟張石帆至此二物廟中有周時樂器名淳于銅作似鍾而有頸映水用芒刜音弗則鳴又曰硤州遠安縣江有狼尾灘有陸抗故城南有孤山袁山松為郡嘗登以四望大江如索帶舟舡如鳧鴈焉又曰相州魏縣景穆寺西有遭官有石竇橋鳴鶴飛集赤馬飛龍等舟西京雜記曰昆明池中有弋樹舡各數百艘舡上建樓櫓戈舡建戈矛四角迷垂用幡旄音餌旌葆麾蓋照灼涯涘又曰太液池中有鳴鶴舟容與舟清曠舟採菱舟說苑曰吳赤市使於知氏假道於衛甯文子具紵絺三百製將以送之大夫豹曰吳雖大國也不壤交假之道則亦敬矣又何禮焉甯文子不聽遂致之吳赤市至於知氏既得事將歸吳智伯命造舟為梁吳赤市曰吾聞天子濟于水造舟為梁諸侯維舟為梁大夫方舟臣之職也且敬太甚必有故使人視之則兵在後矣將以襲衛吳赤市曰衛假吾道而厚贈我我見難而不告是與為謀也稱疾而留使人告衛衛人警戒智伯聞之乃止也, SBCK: 還}
