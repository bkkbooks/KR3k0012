  - {type: variant, offset: 1423, length: 301, content: 知已選擇見舡最大樟材者六艘受五百里石從污水送付樊口王粲詩曰方舟浮大江日暮愁我心曹植詩曰何以汎舟媿無榜人嵇康詩曰淵淵綠水淪滑而逝汎汎虛舟載停載滯鼓枻投竿優遊卒歲梁王筠詠輕利舡應臨汝侯教詩曰君侯飾輕利搖蕩邁飛雲凌漾浮鷁采映木煥蛟文雷流已冠絕鳥逝復超群倏忽方千里戀茲岐路分陳張正見後湖泛舟詩曰上苑奢行樂滄池聊薄遊泛荇分蘭櫂槎觸桂舟殘虹收度雨缺岸上新流欲知有高趣長楊送夌秋又別韋諒賦得江潮泛別舟詩曰千里尋陽岸三翼木蘭舡鷁泛青鳧後雞鳴白鷺前涵花沒淺纜帶葉動深舡不言朝夕水獨自限神仙又與錢玄智泛舟詩曰高門事休沐朝野念逢迎還乘金谷水俱望洛陽城舟移洛女度楫動渭橋橫風高鴈已落雨霽水還清葉盡桐門淨花秋菊岸明欲奏江南曲聊習, SBCK: 赤檜升}
