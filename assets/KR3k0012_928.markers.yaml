  - {type: variant, offset: 978, length: 3, content: 主為西, SBCK: 大如孔雀喙長尺八九寸黄白黒色􅃺如人晝光飾似􅃮瑩磨尤益鮮明多持以飲酒出交趾九真劉欣期交州記曰䴌黄喙二尺餘南人以爲酒爵南越志曰䴌䮵一名越}
  - {type: variant, offset: 978, length: 2, content: 主為, WYG: 鵁音交或作獨又曰單張山有鳥状如雉而文首白翼黄足其名曰白鵺食之已嗌又曰小侯山有鳥其状如烏而白文名曰鴣􅨊姑習兩音又曰北號山有鳥其状如雞而白首鼠足虎爪名鬿雀食人又曰羭次山有鳥状如梟人面而一足名曰槖􅖦音肥冬見夏蟄服之不畏雷看其毛羽令人不畏雷鳥卵左傳哀公下曰子西曰勝如卵余翼而張之漢書曰武帝時大宛諸國獻大鳥應劭人如二石瓮條支國大鳥卵如瓮魏志曰清河令徐孝龍取十三種物着筐中使管輅射之先說雞子後謂蠶蛹遂一一名之吳志曰孫權太子嘗嘲諸葛恪曰元遜何不食馬矢恪曰願太子食雞卵權曰人令卿食馬矢卿使人食雞卵何也恪曰所出同耳權大笑晉書曰戴安道少時取鷄卵汁溲白瓦屑作鄭元碑文手刻字文既綺藻器亦妙絶唐書武徳中西蕃突厥葉䕶可汗遣使貢條支巨卵二又曰貞觀二十一年西蕃吐陸可汗獻金卵瓶鳥􅑹也雕刻作禽獸而塗以黄金山海經曰}
