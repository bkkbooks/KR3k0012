  - {type: variant, offset: 970, length: 0, content: '', SBCK: 鳥有冠名曰狂鳥孔融周歳論曰儀鳯屯集狂鳥穢之爾雅曰鶨䳢老郭璞注曰鴒鶨也俗謂之癡鳥鶨音丑眷切說文曰欺老鶨也左思蜀都賦曰鷩鴺}
  - {type: variant, offset: 970, length: 0, content: '', krp: 鳥有冠名曰狂鳥孔融周歳論曰儀鳯屯集狂鳥穢之爾雅曰鶨䳢老郭璞注曰鴒鶨也俗謂之癡鳥鶨音丑眷切說文曰欺老鶨也左思蜀都賦曰鷩鴺}
