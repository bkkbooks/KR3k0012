  - {type: variant, offset: 971, length: 0, content: '', SBCK: 栖綦母遂注曰鷩鴺鳥名如今山鷄其色班其鶵色異岀江東莊子曰周周銜羽以濟河司馬彪注周周河士鳥也頭重尾䡖是以銜他鳥羽如飛過何人之不可求益於物以􅀘其所短也笁法真登羅山䟽曰越王鳥􅃺似鳶口句末可受二􅂛許南人以爲酒器珎於文螺不踐地不飲江湖不唼百草不餌蟲魚唯噉木葉糞似董陸香山人遇之旣以爲香又治􅄂瘡南方草物志曰}
