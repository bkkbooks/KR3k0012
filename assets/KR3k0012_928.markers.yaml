  - {type: variant, offset: 1541, length: 2, content: 古者, SBCK: 􅜥唐屠郭璞注曰以鳥蒼白色臨海異物志曰焳鳴聲哀俗云繼母欲嫁因㸑使人守之母遂不還兒因呼母言䲴也又曰遊鳥如鵝大其色黒以青􅁝頭繫竹竿呼之即来入手俗言是東海神所養不可食也臨海異物志曰獨􆈼鳥如隼其色黒其鳴如人呼鷄聲爾雅曰鷚}
