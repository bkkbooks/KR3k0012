  - {type: variant, offset: 1531, length: 0, content: '', SBCK: 也色黒正月旦爲􅁡蜂周行諸山永安處蜂隨之􅁡母暮還入蜂中郭璞􅁡蜂賦曰大君以緫羣氏又恊氣於零雀毎先馳而葺宇畨巖穴之經略􅁡母一名零雀爾雅曰竭水狗又曰鴝頭鵁孫炎曰鳥鵁也又曰突鶦鳥孫炎曰榖鶦水鳥又曰鷏􅻀母也廣志曰蚊母吐蚊大如鳩嶺南異物志曰五嶺溪山深處有大鳥如鶬鸛常吐蚊子輙從口中飛去謂之吐蚊鳥說文曰䴌水鳥也南方草物狀曰孔貴如小母鷄臨海異物志曰獨春鳥聲似㫪聲聲多者五榖傷聲小者五榖熟又曰􅆻鳥蘭草占米之貴賤背廻􅆻其莖􅆻一度即解米百錢再度二百未􅆻仍五十隨􅆻多}
