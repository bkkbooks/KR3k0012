  - {type: variant, offset: 1127, length: 849, content: 童子化為青鳥飛去神仙傳曰東陵聖母廣陵海陵人杜氏妻也學劉綱道座在立亡杜公不信誣言聖母作奸收付獄聖母從窗中飛去於是遠近為立廟甚有神效常有一青鳥在祭所人有失物者青鳥便非集物上路無拾遺晉郭璞青鳥贊曰山名三危青鳥所解往來崑崙王母是隸穆王西征旋軫斯地治鳥搜神記曰越地深山有鳥大如鳩青色名曰治鳥穿大樹作窠如五六升器口徑數寸周飾以土堊赤白相分狀如射侯伐木者見此樹即避之或夜冥不見鳥亦知人不見己也鳴曰咄咄上去明日便急上去曰咄咄下去明日便宜急下去若不便去但言笑而已可止伐也若有穢惡及犯其所止者則虎害之白日見其形鳥形也夜聽其鳴亦鳥也時作人形長三尺入澗中取石蟹就人間火炙之越人謂此越祝之祖木客異物志曰木客鳥大如鵲數千百頭為群飛集有度不與眾鳥相廁人俗云木客白黃文者謂之君長有翼有綬飛高而正赤者在前謂之五伯居前正黑者謂之鈴下緗色而頳雜者謂之功曹左脇有白帶似鞶囊者謂之主簿長次君後其五曹官屬各有章色廬陵郡東有之惡鳥爾雅曰梟鵄郭璞注日土梟鳥少尾長醜為流粟史記曰古者天子常以春祠黃帝用一梟如淳曰漢使東郡送梟五月五日作梟羹以賜百官以其惡鳥故食之春秋後語曰蘇代謂魏王曰王獨不見夫博之所以貴梟乎博之豎者為梟楚詞云成梟而牟乎五白梟古堯切便則食不便則止今王曰事始已行不可更是何言歟王之用智不若梟乎至乃止其行後漢書曰朱浮與彭寵書曰惜乎棄休令之嘉名造鴟梟之逆謀晉書曰張重華為石季龍所攻重華掃境內使其征南將軍裴恒禦之恒壁于廣武欲以持久獘之張躭舉主簿謝艾兼資文武必能折衝禦侮殲殄凶類重華召艾艾曰昔耿弇不欲以賊遺君父黃權願以萬人當寇乞假臣兵七千為殿下吞王擢麻秋等重華大悅以艾為中堅將軍配步騎五千擊秋引師出振武夜有二梟鳴於牙中艾曰梟邀也六博得梟者勝今梟鳴牙中剋敵之兆於是進戰大破之斬首五千級又載記曰乞伏乾歸略于五谿有梟集于其手甚惡之六年為兄子公府所弒并其諸子十餘人北史李元忠性甚工彈嘗從文襄入謁魏帝有梟鳴殿下文襄命元忠彈之問得幾丸而落對曰一丸承大將軍意氣兩丸足矣如其言而落之唐書曰有梟晨鳴於張率更庭樹其妻以為不祥連唾之文收云急灑掃吾當改官言未畢賀者已在門, WYG: ''}
