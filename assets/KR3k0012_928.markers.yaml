  - {type: variant, offset: 3112, length: 234, content: 則知有吉凶凶者輒便鳴其家有殃莊子曰鵂鶹夜撮蚤察毫末晝暝目不見丘山殊性也淮南萬畢術曰鵄鵂致鳥取鵄鵂折其大羽絆其兩足以為媒張羅其旁鳥自藂矣南史曰侯景入臺城在昭陽殿廊下居處常有鵂鶹鳥鳴呼景惡之使人窮山野捕焉三國典略曰侯景矯豫章嗣王揀命禪位於己將拜受冊命忽有丹觜鵲集於冊書又夜有鵂鶹鳴於太極殿上景深以為惡自控弦伺之鴆廣雅曰鴆鳥雄曰運日雌曰陰諧東觀漢記曰公孫述欲徵李葉為博士葉故不起乃遣人持鴆不起便賜藥業乃飲鴆而死晉中興書曰烈宗詔曰次飛督王饒忽上吾鴆鳥一口云以辟惡此凶物豈宜妄進, WYG: ''}
