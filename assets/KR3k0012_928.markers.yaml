  - {type: variant, offset: 1592, length: 1, content: 王, krp: 翳鳥又曰青丘有鳥其狀如鳩名曰灌灌又曰禱過之山有鳥二足三面名瞿如又曰松果山有鳥名䳋渠又曰上申山鳥名當扈狀如雉食之不眴目又曰符遇之山其鳥名鴖可以衛火又曰英山有鳥狀如鶉食之巳癘名曰肥遺又曰宰塗山有鳥名曰數斯食之巳癭又曰崑崙丘有鳥名曰欽原蠹獸則死蠹木則枯又曰灌題山有鳥見人則躍名曰竦斯又曰梁渠之山有鳥名曰囂食之巳腹痛可以止衕治衕下也又曰陽山有鳥自爲牝牡名曰象虵又曰廆山有鳥名曰鴒䳩鈴要兩音其鳴自呼服之不脒又曰丑陽山有鳥名曰䳅鵌可以衛火又曰翼望山有鳥狀如烏三首六尾其名曰鵸䳜倚餘兩音服之使人不眯又以禦㓙又曰青要山有鳥名曰音窈窕之窈也狀如烏青身而朱目赤尾食之冝子又曰攻離山有鳥名曰嬰勺其狀如鵲赤喙白身其尾若勺似勺形其鳴自呼又曰鳥名青耕可以禦疫又曰天帝山有鳥其狀如鶉黒文而赤翁翁領下毛名曰櫟食之巳痔又曰翏山有鳥名鸓音畾其如鵠而兩首四足又曰北囂山有鳥狀如人面名曰􅜥鵑夜飛而晝伏又曰太行山有鳥焉其狀如鵲白身赤尾六足其名䴅音奔又曰馬城山有鳥狀如烏白首而身黄足其名曰鶌居食之不飢又曰號山有鳥名㝢狀如䑕又曰夢聮之山有鳥羣居而多飛其毛如雌雉名曰鵁鳥音交或作}
  - {type: variant, offset: 1594, length: 0, content: '', SBCK: 又曰畢張山有鳥狀如雉而文首白翼黄足名曰白䲽食之巳嗌又曰小侯山有鳥其狀如烏而白文名曰鴣􅨊姑習兩音又曰北號山有鳥其狀如鷄而白首䑕足虎􅀲名曰魁雀食人又曰羭次山有鳥狀如梟人面而一足名曰橐􅖦音肥冬夏蟄服之}
  - {type: variant, offset: 1594, length: 0, content: '', krp: 又曰畢張山有鳥狀如雉而文首白翼黄足名曰白䲽食之巳嗌又曰小侯山有鳥其狀如烏而白文名曰鴣􅨊姑習兩音又曰北號山有鳥其狀如鷄而白首䑕足虎瓜名曰魁雀食人又曰羭次山有鳥狀如梟人面而一足名曰橐􅖦音肥冬夏蟄服之}
  - {type: variant, offset: 1595, length: 3, content: 見夫博, SBCK: 畏雷看其毛羽令人不畏雷鳥􅆑左傳哀公下曰子西曰勝如􅆑余翼而張}
  - {type: variant, offset: 1595, length: 3, content: 見夫博, krp: 畏雷看其毛羽令人不畏雷鳥卵左傳哀公下曰子西曰勝如卵余翼而張}
  - {type: variant, offset: 1599, length: 60, content: 所以貴梟乎博之豎者為梟楚詞云成梟而牟乎五白梟古堯切便則食不便則止今王曰事始已行不可更是何言歟王之用智不若梟乎至乃止其行後, SBCK: ''}
