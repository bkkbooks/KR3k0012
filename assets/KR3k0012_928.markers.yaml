  - {type: variant, offset: 934, length: 1, content: 東, WYG: 獨􅀈鳥如隼其色黒其鳴如人呼雞聲爾雅曰鷚天籥也南方草物状曰金吉鳥大如小母雞臨海異物志曰有鳥耀儀名曰苦姑又曰除溪鳥小如鴝鵒甚黒天欲隂雨即鳴自言溪瀆又曰祖端端小鳥天欲雨即鳴抱朴子曰千秋鳥人面夀如其名魯連子曰南}
