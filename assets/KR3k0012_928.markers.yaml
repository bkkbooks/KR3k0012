  - {type: variant, offset: 915, length: 48, content: 環平公不去平公顧謂師曠曰是鳳耶師曠對曰東方有鳥名為端琦憎鳥而愛狐今吾君必衣狐裘以朝乎平公曰然青鳥, SBCK: 譟之}
  - {type: variant, offset: 915, length: 3, content: 環平公, WYG: 為鵌其鼠為鼵郭璞注曰鼵如人家鼠尾短鵌如鵽而小色黄黒穴入地三四尺鼠在内鳥在外今在隴西鳥鼠同穴山出臨海異物志曰江湖海鳥大如鸛喙長八寸潮上即鳴又曰䳽􅀢海鳥喙長八寸天欲風雨内喙於土中向風海師以為候鳴如嘯又曰蜜母小鳥也色黒正月旦為蜜蜂周行諸山求安處蜂隨之蜜母暮還入蜂中郭璞蜜蜂賦曰大君以總羣氏又協氣於零雀每先馳而葺宇畨巖穴之經略蜜母一名零雀爾雅曰鴗天狗又曰鴢頭鵁孫炎曰鳥鵁也又曰突鶦鳥孫炎曰糓鶦水鳥又曰鷏􅀢母也廣志曰蚊母吐蚊大如鳩嶺南異物志曰五嶺溪山深處大鳥如鶬觀常吐蚊子輒從口中飛去謂之吐蚊鳥說文曰䴌水鳥也南方草木狀曰孔貴如小母雞臨海異物志曰獨舂鳥聲似舂聲聲多者五穀傷聲少者五穀熟又曰契鳥蘭草占米之貴賤背廻契其筮契一度即斛米百錢再度二百契仍五十隨契多少以占知之爾雅曰􅜥唐屠郭璞註曰鳥蒼白色臨海異物志曰􅀈䲴鳴聲哀俗云有母欲嫁因爨使子守之母遂}
