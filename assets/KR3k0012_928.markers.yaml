  - {type: variant, offset: 973, length: 0, content: '', WYG: 足人面名瞿如又曰松果山有鳥名䳋渠又曰上申山鳥名當扈状如雉食之不眴目又曰符遇之山其鳥名䲭可以衛火又曰英山有鳥状如鶉食之已癘名曰肥遺又曰臯塗山有鳥名曰數斯食之已癭又曰崑崙山有鳥名曰欽原蠚獸則死蠚木則枯又曰灌題山有鳥見人則躍名曰竦斯又曰梁渠之山有鳥名曰囂食之已腹痛可以止衕治衕下也又曰陽山有鳥自為牝牡名曰象虵又曰廆山有鳥名曰鴒䳩鈴要兩音其鳴自呼服之不昧又曰丑陽山有鳥名曰􅀈䳜可以禦火又曰翼望山有鳥状如烏三首六尾其名曰鵸䳜􅀝餘兩音服之使人不厭又以禦凶又曰}
