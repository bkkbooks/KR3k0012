  - {type: variant, offset: 909, length: 4, content: 平公出朝, WYG: 太元中營道令何諧之於縣内得一鳥大如白鷺滕上及髀有銅環貫之環大小刻鏤如橄欖妙絶人工於時京師皆觀之嶺表録異曰有鳥形如野鵲翅羽黄綠間錯尾生兩枝長二尺餘直而不䮍唯尾稍有毛宛如箭羽因目之為帶箭鳥爾雅曰鳥鼠同穴}
