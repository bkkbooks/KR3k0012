  - {type: variant, offset: 2540, length: 425, content: 又曰翩彼飛鴞集于泮林食我桑椹懷我好音又詩義䟽曰鴞大如鳩綠色惡聲鳥也入人家凶賈誼所賦是也其肉甚美可為羹臛又可炙漢供銜物各隨其時唯鴞冬夏施以美故也莊子曰見卵而求時夜見彈而求鴞炙魏志曰夫鴞天下賤鳥也及其在林食椹則懷我好音晉書曰王羲之好鴞炙三國典略曰齊太后太上王武成之長子也母曰胡太后夢於海上坐玉盆日入裙下遂有娠生於并州其日有鴞鳴於產帳之上盛弘之荊州記曰巫縣有鳥如雌鷄其名為鴞廣志曰鴞楚鳩所生如驢巨虛種類不滋乳也鵩西京雜記曰賈誼在長沙鵩鳥集其承塵而鳴長沙俗以為鵩至人家主人當死誼作鵩鳥賦齊死生等榮辱以遣憂累焉賈誼鵩鳥賦曰誼為長沙王傅三年有鵩鳥飛入舍止于坐隅鵩似鴞不祥鳥也誼既謫居長沙長沙卑濕自傷悼以為壽不長為賦以自廣漢太常孔臧仲尼之後以才學知名作鴞賦曰季夏庚子思道靜居爰有飛鴞集我室隅異物之來吉凶是符昔在賈生有識之士忌茲鵩鳥卒用喪已咨我令考信道秉真變性生家謂之天神脩德滅邪化及其鄰梅陶鵩鳥賦序曰余既遭王敦之難遂見忌錄居于武昌其秋有野鳥入室感賈誼鵩鳥賦依而作焉, SBCK: 間}
