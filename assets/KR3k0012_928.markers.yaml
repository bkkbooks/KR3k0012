  - {type: variant, offset: 2193, length: 340, content: 聲無不為也吾惡之甚是以不通焉柏常騫曰臣請禳而去之公曰何具對曰築新室為置白茅焉公使為室成置白茅焉柏常騫夜用事明日問公曰今旦聞梟聲乎公曰一鳴而不復聞使人往視之梟當陛布翼伏地而死又曰梟逢鳩鳩曰子安之梟曰我將東徙鳩曰何故梟曰一鄉皆惡我鳴故徙也鳩曰更鳴則可不更鳴東徙亦惡子之聲桓譚新論曰王翁時男子畢康殺其母詔焚燒其屍暴其罪於天下余上封章言宣帝時公卿朝會丞相語次曰聞梟生子長旦食其母寧然有賢者應曰但聞烏子反哺耳丞相大慚君子之於鳥獸尚為之諱況人乎又曰余前為典樂大夫有梟鳴於庭樹府中皆懼余後與典謝侯爭鬭俱坐免說文曰梟不孝鳥也至日捕梟磔之趙壹解擯賦曰甑瓦可以令梟寂嶺表錄異曰北方梟鳴人家以為怪共惡之南中晝夜飛鳴與烏鵲無異桂林人羅取生鬻之家家養使捕鼠以為勝狸鴞禮記內則曰鵠鴞胖毛詩曰墓門有梅有鴞萃止夫, SBCK: 民野叚敗}
