  - {type: variant, offset: 974, length: 0, content: '', WYG: 要山}
  - {type: variant, offset: 975, length: 2, content: 居青, SBCK: 或名越王}
  - {type: variant, offset: 975, length: 0, content: '', WYG: 名曰鴢音􅆼窕之􅆼也状如鳬青身而朱目赤尾食之宜子又曰攻離山有鳥名曰嬰勺其状如鵲赤喙白身其尾若勺似頂勺形其鳴自呼又曰鳥名青耕可以禦疫又曰天帝山有鳥其状如鶉黒文而赤翁翁頭下毛名曰擽食之已痔又曰泰山有鸓音畾其形如鵠而兩首兩足又曰北囂山有鳥状如人面名曰􅜥鵑夜飛而晝伏又曰太行山有鳥焉其状如鵲白身赤尾六足其名䴅音奔又曰馬成山有鳥状如烏白首而身青黄足其名曰鶌鶋食之不飢又曰號山有鳥名寓状如鼠又曰蔓聯之中有鳥羣}
