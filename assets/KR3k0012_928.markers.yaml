  - {type: variant, offset: 1088, length: 134, content: 集臺上晉中興書曰顏含嫂病困須髯虵膽不能得含憂歎累曰忽有一童子持青囊授含乃虵膽也童子化為青鳥飛去神仙傳曰東陵聖母廣陵海陵人杜氏妻也學劉綱道座在立亡杜公不信誣言聖母作奸收付獄聖母從窗中飛去於是遠近為立廟甚有神效常有一青鳥在祭所人有失物者青鳥便非集物上路無拾遺晉郭璞青鳥贊曰, SBCK: 似孔雀背連錢文遊名}
