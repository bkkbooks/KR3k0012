  - {type: punctuation, offset: 87, content: 《, id: KR3k0012_CHANT_928-bkkpn27}
  - {type: variant, offset: 87, length: 251, content: 晏子曰景公謂晏子曰天有極大物乎對曰有鵬浮遊雲背凌蒼天該於天地漻漻乎不知其翮之所在也幽明錄曰楚文王好獵有一人獻一鷹擊鵬鶵事具鷹門異類傳曰漢武時西域獻黑鷹得鵬鶵東方朔識之晉書曰賈彪鵬鳥賦序曰余覽張安世鷦鷯賦以其質微處褻而陋以遠害愚以為未若大鵬栖形遐遠自育之全也此固禍福之機聊賦之云又曰阮脩大鵬贊曰蹌蹌大鵬誕自北溟假精靈鱗神化以生如雲之翼如山之形海運水擊扶搖上征又曰習鑿齒詣釋道安值眾僧齊眾皆捨缽歛衽唯道安食不輟鑿齒曰大鵬從南來眾鳥皆戢翼何忽凍老鴟腩腩低頭食鷖神異經曰北海有大鳥其高千里頭文曰天胸文曰鷄左翼文, SBCK: 土記}
