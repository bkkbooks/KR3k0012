  - {type: variant, offset: 3620, length: 280, content: 首曾為犬齧下一首常滴血血滴之家即有凶咎三國典略曰齊後園有九頭鳥見色赤似鴨而九頭皆鳴玄中記曰姑獲鳥夜飛晝藏蓋鬼神類衣毛為鳥脫毛為女人名為天帝少女一名夜行遊女一名釣星一名隱飛鳥無子喜取人子養之以為子人養小兒不可露其衣此鳥度即取兒也荊州為多昔豫章男子見田中有六七女人不知是鳥扶匐往先得其所解毛衣取藏之即往就諸鳥各走就毛衣衣此飛去一鳥獨不得去男子取以為婦生三女其母後使女問父取衣在積稻下得之衣之而飛去後以衣迎三女三女兒得衣飛去今謂之鬼車不孝鳥神異經曰不孝鳥狀如人身犬毛有齒豬牙額上有文曰不孝口下有文曰不慈鼻上有文曰不道左脇有文曰愛夫右脇有文曰憐婦故天立此異鳥以顯忠孝也, SBCK: 百二十八}
