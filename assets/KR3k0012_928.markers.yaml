  - {type: variant, offset: 895, length: 1, content: 丹, WYG: 名曰往鳥孔融周歲論曰儀屯集狂鳥穢之爾雅曰鶨䳢老郭璞註曰鴒鶨也俗謂之癡鳥鶨音丑眷切說文曰欺老􅀈也左思蜀都賦曰鷩鴺山棲綦每逺註曰鷩鴺鳥名今如山鷄其色班其雛色異出江東莊子曰周周銜羽以濟司馬彪註周周河上鳥也頭重尾輕是以銜他鳥羽如飛過何人之不可求益於物以補其所短也竺山真登羅山疏曰越王鳥狀似鳶口句末可受二升許南人以為酒器珍於文螺不踐地不飲江湖不唼百草不下餌蟲魚惟噉木葉糞似董陸香山人遇之既以為香又治雜瘡南方草木志曰有烏或名越王鳥大如孔雀}
