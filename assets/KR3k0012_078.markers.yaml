  - {type: variant, offset: 1171, length: 198, content: 也又曰人主之居如日月之明也天下之所同側目而視傾耳而聽延頸舉踵而望也是故非淡漠無以明德非寧靜無以致遠非寬大無以兼覆非慈厚無以懷眾非平正無以制斷又曰古者有鍪而綣領以王天下者矣古者蓋三皇以前也鍪頭著兜鍪帽言未知制冠也綣領皮衣屈而袂之如今胡家韋襲文攝以為領也一說鍪放鬆也綣繞頸而已皆無飾也其德生而不辱刑措不用也予而不奪予其則也不奪無所徵求於民也天下不非其服同懷其德非猶譏也懷歸當此之時陰陽和平風雨時節萬物, WYG: 五穀}
