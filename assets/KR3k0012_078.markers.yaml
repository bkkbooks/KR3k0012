  - {type: variant, offset: 1264, length: 702, content: 鍪頭著兜鍪帽言未知制冠也綣領皮衣屈而袂之如今胡家韋襲文攝以為領也一說鍪放鬆也綣繞頸而已皆無飾也其德生而不辱刑措不用也予而不奪予其則也不奪無所徵求於民也天下不非其服同懷其德非猶譏也懷歸當此之時陰陽和平風雨時節萬物蕃息政不虐生無天折烏鵲之巢可俯而探也禽獸可羇而從也猶牽也豈必褒衣搏帶句襟委貌章甫哉又曰國之所以存者道德也道德施行民說其化故國存也家之所以亡者理塞也理道堯無百戶之郭舜無植錐之地以有天下禹無十人之眾湯無七里之分以王諸侯文王處歧周之間地方不過百里而立為天子者有王道也又曰聖人有貴尺之璧而重寸之陰時難得而易失也禹之趨時也履遺而弗納冠掛而不顧非爭其先也而爭其得時也是故聖人守清道而抱雌節清和靜也雌柔弱也因循應變常後而不先柔弱以靜舒安以定舒詳也攻大磨堅莫能與之爭攻大磨堅喻難也又曰帝者體太一王者法陰陽霸者則四時君者用六律體太一者牢籠天地彈壓山川含吐陰陽中曳四時紀綱八極經緯六合覆露照導普汜而無私普天汜眾也無私愛憎言皆公也翾飛蠕動莫不仰德而生法陰陽者承天地之和形萬殊之體含氣化物以成垀類垀形也盈縮卷舒淪於不測盈長縮短卷屈舒散入於不可測盡之源也終始虛滿轉於無源則四時者春生夏長秋收冬藏取與有節出入有時開闔張翕不失其序喜怒剛柔不離其理用六律者生之與殺賞之與罰與之與奪非此無道也明四時六律之君非用此上事其餘無他道也又曰古之立帝王者非以奉養其欲也聖人之踐位者非以供樂其身也為天下強掩弱眾暴寡詐欺愚勇侵怯懷知而不相教積財而不以相分故立天子以齊一之又曰五帝三王之法籍風俗一世之跡也譬若土龍芻狗之始成文以青黃飾以綺繡纏以朱絲及其已用則壤土草芥而已誰貴之哉又曰神農無制令而人從唐虞有制令而無刑罰夏后氏不負言殷人誓周人盟又曰聖, SBCK: 燧皇丗謂燧}
