  - {type: variant, offset: 2542, length: 1, content: 人, SBCK: 宓爲密故号曰密犧一號雄皇氏在位一百一十年易下繫曰古者庖犧氏之王天下仰則觀象於天俯則觀法於地中觀鳥獸之文與天地之冝近取諸身逺取諸物於是始作八卦以通神明之德以􅀋萬物之情結繩而爲網􅅈以畋以漁蓋取諸离河圖曰伏犧禪於伯牛鑚木作火易坤靈圖曰宓犧時立元部民易理易通卦驗曰宓犧方牙蒼精作易無書以􅀞}
