  - {type: variant, offset: 2778, length: 192, content: 禮號謚記說夏禹殷湯周武王是三王也禹者輔也輔續舜後庶績洪茂自堯以上王者子孫據國而起功德浸盛故造美謚舜禹本以白衣砥行顯名升為天子雖復制謚不如名著故國名焉湯者禳也言其禳除不軌改亳為啇成就王道天下熾昌文武皆以其長夫擅國之謂王能制殺生之威之謂王王者往也天下所歸往也又曰易稱天先春而後秋地先生而後凋日月先光而後幽是以王者則之亦先教而後刑三皇結繩五帝畫像三王肉刑霸世黜巧此言步驟稍有優劣也傅子曰庖犧, WYG: ''}
