  - {type: variant, offset: 174, length: 0, content: '', WYG: 庖厨祭祀罟網魚畋瑟以象時神德通𤣥女媧氏帝王世紀曰女媧氏亦風姓也承庖羲制度亦蛇身人首一號女希是為女皇未有諸侯有共工氏任智刑以强伯而不王以水承木非行次故易不載歸藏曰昔女媧筮張雲幕枚占}
