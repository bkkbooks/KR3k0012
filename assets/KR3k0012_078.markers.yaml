  - {type: variant, offset: 208, length: 0, content: '', WYG: 力牧太山稽殺之以止雨也極者至也冀州九州中謂合四海之内積蘆灰以止淫水蘆葦也葦生於水故積聚其灰以止其淫水平地出水為淫水民生背方州抱周天方州地也和春陽夏殺秋約冬枕方寢繩方矩四寸也寢繩直身而卧也風俗通}
  - {type: variant, offset: 209, length: 0, content: '', WYG: 俗說天地開闢未有人民女媧摶黄土作人劇務力不暇供乃引繩於泥中舉以為人故富貴者黄土人也貧賤者絙也遁甲開山圖曰女媧氏沒大庭氏王有天下五氣異色次有柏皇氏中央氏栗陸氏驪連氏赫胥氏尊盧氏祝融氏混沌氏昊英氏有巢氏葛天氏隂康氏朱襄氏無懷氏凡十五代皆襲庖羲之號自無懷氏已上經史不載莫知都之所在共工氏水德君木火之間霸而不王女媧是三皇之稱三皇者多有不}
  - {type: page-break, offset: 209, content: '', id: KR3k0012_WYG_078-8b, image: WYG0893/WYG0893-0621d.png}
  - {type: variant, offset: 210, length: 0, content: '', WYG: 以太昊炎帝為二皇其一或稱女媧或稱祝融或稱共工未知孰是自女媧至無懷十五代合一萬七千七百八十七嵗魏陳王曹植女媧賛曰古之國君製造笙簧禮物未就軒轅纂成或云二君人首蛇形神化七十何德之靈炎帝神農氏帝王世紀曰神農氏姜姓也母曰任姒有喬氏之女名女登為少典妃遊於華陽有神龍首感女登於常生炎帝人身牛首長於姜水有聖德以火承木位在南方主夏故謂之炎帝都於陳作五絃之琴凡八世帝承帝臨帝明帝直帝來帝哀帝榆㒺又曰本起烈山或時稱之一號魁隗氏是為農皇或曰炎帝時諸侯夙沙氏叛不用命炎帝退而修德夙沙之民自攻其君而歸炎帝營都於魯重八卦之數究八八之體為六十四卦在位百二十年而崩葬長沙易下繫曰神農氏作斵木為耜揉木為耒耒耜之利以教天下蓋取諸益禮含文嘉曰神者信也農者濃也始作耒耜教民耕其德濃厚若神故謂神農也古史考曰炎帝有火應故置官司皆以火為名傳曰郯子曰炎帝以火紀故為火師而火名杜預注曰神農姜姓之祖也有火瑞以火紀事名官也春秋命厯序曰有神人名石耳蒼色大眉戴玉理日月清明有次序故神應和}
