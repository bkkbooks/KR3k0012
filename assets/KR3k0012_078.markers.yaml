  - {type: variant, offset: 175, length: 6, content: 威與元同氣高, WYG: 曰吉昭昭九州日月代極平均土地和合四國山海經曰女媧之腸化為神處粟廣之野郭璞注曰女媧古神女而帝者人面蛇身一日中七十變其腸化為此神粟廣野名也禮曰女媧之笙簧女媧三皇承宓羲者笙簧笙中之簧也世本曰女媧作笙簧也淮南子曰往古之時四極廢九州裂天不兼覆地不周載火濫焱而不滅水浩洋而不息猛獸食精民髙}
