  - {type: variant, offset: 219, length: 31, content: 同力同力賢於同居帝者同氣同元氣也王者同義同仁義也霸者同力同武力, WYG: 老龍吉神農隱几闔户晝瞑妸荷甘日中奓户而入曰老龍死矣神農隱几擁杖而起嚗然放杖而笑曰天知予僻陋慢誕故棄予而死已矣夫子無所發予之狂言而死已夫悟死不足驚故還放杖而笑尸子曰神農氏夫負妻戴以治天下堯曰朕之比神農猶旦之與昏}
