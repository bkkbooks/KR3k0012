  - {type: variant, offset: 2539, length: 0, content: '', SBCK: 禮含文嘉曰燧人始鑚木取火炮生爲熟令人無腹疾有異於禽獸遂天之意故爲燧人古史考曰古之􅀄人吮露精食草木實穴居野處山居則食鳥獸衣其羽皮飲血茹毛近水則食魚鼈螺蛤未有火化腥臊多害膓胃於是有聖人以火德王造作鑚燧出火教人熟食鑄金作刃民人大恱號曰燧人禮曰昔者先王未有火化食腥也食草木之實鳥獸之肉飲其血茹其毛此上古之時也後聖人有作作起然後脩火之利範金鉢作噐用合土瓦瓴甓及大以炮以燔以烹以炙以爲醴酪王子年拾遺録曰遂明國有大樹名燧屈盤万頃後世有聖人逰日月之外至於其國息此樹下有鳥啄樹粲然火出聖人感焉因用小枝鑚火號燧人氏太昊庖犧氏皇王世紀曰太昊帝庖犧氏風姓也虵身人首有聖德都陳作瑟三十六絃燧人氏没庖犧氏代之繼天而生首德於木爲百王先帝出於震未有所因故位在東方主春象日之明是稱太昊制嫁娶之禮取犧牲以充庖厨故號曰庖犧皇後世音􅍝故或謂之密犧一解云宓古}
