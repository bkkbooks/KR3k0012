  - {type: variant, offset: 3670, length: 3, content: 逢紂刳, SBCK: 􅁻神農隱机闔户晝􅊕妸荷甘日中奓户而入曰老龍死矣神農隱几擁杖而起嚗然放杖而􅀏曰天知予僻陋慢誕故弃予也而死巳悟死不足驚故還放杖􅀏尸子曰神農氏夫􅀒妻戴以治天下堯曰朕之}
