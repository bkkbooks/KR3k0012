  - {type: variant, offset: 4, length: 1, content: 敘, WYG: 頭號曰天靈治萬八千歲以木德王洞真記曰天皇十二頭一姓十二人也註曰古人質以頭為數猶今之數鳥獸以頭為計若曰十頭鹿非鹿十頭也徐整三五厯記曰溟涬始芽濛鴻滋萌歲起攝提元氣肇啟有神靈人十二頭號曰天皇春秋緯曰天皇地皇人皇兄弟九人分為九州長天下也河圖括地象曰天皇九翼題名旋復帝系譜曰天地初起即生天皇治萬八千嵗以木德王遁甲開山圖曰天皇被跡在柱州崑崙山下榮氏注曰天皇兄弟十二人身貌相類不可分别治在柱州崑崙也地皇項峻始學篇曰地皇十二頭各萬八千嵗洞紀曰地皇十二頭帝系譜曰地皇治一萬八千嵗以火德王二五厯紀曰有神聖十二頭號地皇遁甲開山圖曰地皇興於熊耳龍門山榮氏注曰地皇兄弟九人面貌皆如女子貌皆相類蛇身獸足生於龍門山中人皇春秋命厯序曰人皇氏九頭駕六羽乗雲車出谷口分九州朱均注曰九頭兄弟九人項峻始學篇曰人皇九頭兄弟各三分人各百嵗依山川土地之勢裁度為九州各居其一方因是而區别遁甲開山圖曰人皇起於刑馬榮氏注曰人皇兄弟九人生於刑馬山身有九也二五厯紀曰有神聖人九頭號人皇馬摠云一百六十五代合四萬五千六百年天皇地皇人皇為太古有巢氏禮曰昔先王未有宫室冬則居營窟夏則居橧巢鄭𤣥注曰冬則居土暑則聚薪柴居其上也項峻始學篇曰上古皆穴處有聖人教之巢居號大巢氏今南方人巢居北方人穴處古之遺俗也皇甫謐以為有巢在女媧之後韓子曰上古之世人民少而禽獸多人不勝禽獸蛇虺有聖人構木為巢以避羣害而人悅之使王天下號之曰有巢氏遁甲開山圖曰石樓山在琅琊昔有巢氏治此山南王天下百有餘代未詳年代也燧人氏無文籍未有甲厯紀年嵗易通卦驗曰燧皇始出握機矩表計㝠圖其刻曰蒼渠通靈鄭𤣥注曰矩法也燧皇也謂燧人在伏羲前作其圖謂之計㝠時無書刻石而謂之且刻曰蒼精渠肩之人能通神靈之意也尚書大傳曰燧人為燧皇燧人以火紀官火陽也陽尊故託燧皇於天禮含文嘉曰燧人始鑚木取火炮生為熟令人無腹疾有異於禽獸遂天之意故謂燧人古史考曰太古之初人吮露精食草木實穴居野處山則食鳥獸衣其羽皮飲血茹毛近水則食魚鼈螺蛤未有火化腥臊多害腸胃於是有聖人以火德王造作鑚燧出火教人熟食鑄金作刃民人大悅號曰燧人禮曰昔者先王未有火化食腥也食草木之實鳥獸之肉飲其血茹其毛此上古之時也後聖人有作作起然後修火之利范金鑄作器用合土瓦瓴甓及甒大以炮以燔以烹以炙以為醴酪王子年拾遺録曰遂明國有大樹名遂屈盤萬頃後世有聖人遊日月之外至於其國息此樹下有鳥啄樹粲然火出聖人感焉因用小枝鑚火號燧人氏太昊庖犧氏}
