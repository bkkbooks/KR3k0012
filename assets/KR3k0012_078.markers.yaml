  - {type: variant, offset: 300, length: 394, content: 五帝固相興矣廢勝者用事又曰蚩尤作兵也利其栻高誘曰蚩尤少昊氏之末九黎之君名也始作亂伐無罪殺無辜善用兵為無道非始造之也故非作兵者也未有蚩尤之時民固剝林木以戰矣勝者為長長率也長猶不足以治之故立君君又不足以治之故立天子又曰人固不能自知人主獨甚存亡安危勿求於外高誘曰言皆在已務在自知堯有欲諫之鼓欲諫者擊其鼓舜有誹謗之木書其過失於表木也湯有司過之士司主也過闕也武王有戒慎之鞀欲戒者搖其鞀猶恐不能自知尚恐不能自知過也今賢非堯舜湯武而有揜蔽之道奚由自知哉又曰五帝先道而後德故德莫盛焉三王先德而後事故功莫大焉五伯先事而後兵五伯昆吾大彭豕韋齊桓晉文是也故兵莫強焉又曰凡為天下治國家必務本而後末所謂本者非耕稼種植之謂也務本莫貴於孝人主尊孝則名章榮下服聽天下譽人臣孝則事君忠處官廉臨難死士民孝則耕耘疾守戰固不敗北三考三皇五帝之本務而萬事之紀也夫執一術而百善至百邪去天下從之者唯孝乎又曰古先聖王之所以導其民者先務於, WYG: 神}
