  - {type: variant, offset: 787, length: 348, content: 觀於上志古記也有天下者眾矣其得之必以公其失之必以偏凡主之立也生於公故鴻範曰無偏無黨又曰昔舜欲稽古而不成既足以成帝矣禹欲帝而不成既足以成王矣湯欲繼舜而不成既足以服田荒矣武王欲及湯而不成既足以為諸侯長矣董仲舒荅問曰三皇三才也五帝五常也三王三明也五霸五嶽也淮南子曰至德之世謂太古三皇之時其瞑乎混淆之域而徙倚乎瀾漫之宇提挈天地委萬物以鴻濛為景性而浡楊乎無畛崖之際是故聖人呼吸陰陽之氣而群生莫不喁喁然仰其德和順止當此之時莫不領理決離隱愍而自成渾渾若若純樸未散滂薄為一而萬物大優是故雖有明知無所用之又曰古者至德之世賈便其肆農樂其業大夫安其職而處士循其道當此之時風雨不毀折草木不夭死九鼎重王者之德休明則鼎重姦回淫亂則鼎輕也珠玉潤澤洛出丹書河出綠圖故許由方面堯使方面求子列藥得之善卷披衣得達其道何則世主有欲利天下, WYG: ''}
