  - {type: variant, offset: 8, length: 1, content: 呂, WYG: 仰則觀象於天俯則觀法於地中觀鳥獸之丈與天地之宜近取諸身逺取諸物於是始作八卦以通神明之德以類萬物之情又曰作結繩而為網罟以畋以漁蓋取諸離河圖曰伏犧禪於伯牛鑚木作火易坤靈圖曰宓犧時立允部民易理易通卦驗曰宓犧方牙蒼精作易無書以畫事鄭𤣥曰宓犧時質樸作易以為政令而不書但以畫其事之形象而已詩含神霧曰大跡出雷澤華胥履之生庖犧宋均注曰雷澤地名華胥伏羲母禮含文嘉曰伏者别也犧者獻也法也伏犧德洽上下天應之以鳥獸文章地應之以龜書伏犧乃則象作易卦左傳曰郯子曰太皥}
