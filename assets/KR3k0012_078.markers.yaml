  - {type: variant, offset: 2074, length: 488, content: 而和陰陽節四時調五行虹蜺不出賊星不行五星逆行謂之賊星也又曰人主者以天下之目視以天下之耳聽以天下之智慮以天下之力動是故號令能下究而臣情得上聞百官脩通群臣輻湊喜不以賞賜怒不以罪誅是故威立而不廢聰明光而不蔽法令察而不苛耳目達而不闇善否之情陳於前而無所逆楊子法言曰五常者帝王之筆舌寧有書不由筆言不由舌哉桓譚新論曰儒者或曰圖王不成其弊可以霸此言未是也傳曰孔氏門人五尺童子不言五伯事者惡其達仁義而尚權詐也又曰夫上古稱三皇五帝而次有三王五伯此皆天下君之冠首也故言三皇以道治而五帝用德化三王由仁義五伯以權智其說之曰無制令刑罰謂之皇有制令而無刑罰謂之帝賞善誅惡諸侯朝事謂之王興兵約盟以信義矯世謂之伯也論衡曰古之帝王建鴻德者須鴻筆之臣褒頌紀德也潛夫論曰天作道皇作極臣作輔人作基又曰王之政普覆兼愛吉凶禍福與人共之應劭風俗通曰春秋運斗樞曰皇天不言四時行焉百物生焉垂拱無為謹言而民不違道德玄泊有皇天故稱曰皇皇者中也光也合元履中開陰布綱上合皇極其施光明指天畫地神化潛通煌煌盛美不可勝量又曰大傳說遂人為遂皇伏戲為戲皇神農為農皇也遂人以火紀火陽也陽尊故託遂皇於天伏戲以人事紀故託戲皇以人蓋天非人不固人非天不成, WYG: ''}
