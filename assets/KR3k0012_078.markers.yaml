  - {type: variant, offset: 2890, length: 661, content: 之威之謂王王者往也天下所歸往也又曰易稱天先春而後秋地先生而後凋日月先光而後幽是以王者則之亦先教而後刑三皇結繩五帝畫像三王肉刑霸世黜巧此言步驟稍有優劣也傅子曰庖犧神農順民之性育之者也黃帝除民之害救之者也舜治天下拱無為者以咎繇既舉而不仁遠也禹治洪水冠桂不顧者不以下憂累其上也湯去三面之網歸之者四十國文王葬城隅之枯骨天下懷其仁所惠者小所感者大仁心先之也又曰不使不仁加乎天下用武勝殘而百姓以濟此仁形於撥亂黃帝是也時有萬物必世而後仁此著於治平堯舜是也周生烈子曰居堯舜之位而不行唐虞之政者猶反衣狐白步牽騄耳黃石公三略曰夫三皇無言化流四海故天下無所歸功帝者體天則地有言有令而天下太平君臣讓功四海行焉王者制人道德降心服志設矩備襄有察察之政甲兵之事備而無爭戰血刃之用天下太平君無疑於主國定主安臣以義退亦能美而無害又曰任德者縱任義者橫縱成者王橫成者霸王兵法天霸兵法地天者德不可量地者威不可圖不量不圖者萬物之父母也袁子正論曰堯舜之人比屋可封非盡善也猶在防之水非不流也桀紂之人比屋可誅非盡惡也猶在壑之水非不停也班彪王命論曰帝王之作必有明聖顯懿之德豐功厚利積累之業然後精誠通于神明流澤加於生民故能為鬼神福所向天下所歸往未見運世無本功德不紀而能倔起在斯立者也傅彥林王令敘曰帝王之起必有天下瑞應自然之符明統顯祚豐懿之業加以茂德成功賢智之助而後居世臨民為神所保祐永世所尊崇未見運敘無紀次勳澤不加於民而可力爭覬覦神器者也阮籍通老論曰三皇依道五帝仗德三皇施仁五霸行義強國任智蓋優劣之異薄厚之降也韓子曰明主制其臣下者二柄而已矣二柄者刑德也殺戮之謂刑慶賞之謂德也, SBCK: ''}
