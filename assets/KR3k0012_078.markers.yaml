  - {type: variant, offset: 168, length: 5, content: 芒芒昧昧因, WYG: 伏羲人頭蛇身以十月四日人定時生崔寔政論曰太昊之世設九庖之官魏陳王曹植庖羲賛曰木德風姓八卦創焉龍瑞名官法地象}
