  - {type: variant, offset: 3744, length: 306, content: 萬民皆尚同乎天子而不敢下比天子之所是必亦是之天子之所非必亦非之去而不善言學天子之善言去而不善行學天子之善行天子者固天下之仁人也舉天下萬民以法天子夫天下何說而不治哉又曰古者聖王制為衣服之法曰冬服紺緅之衣輕且煖夏服絺綌之服輕且清則止諸加費不加於民利者聖王弗為又曰天子者天下之窮貴也天下之窮富故富且貴者當天意而不可不順順天意者兼相愛交相利必得賞反天意者別相惡交相賊必得罰尸子曰人之欲見毛廧西施美其面也夫黃帝堯舜湯武美者非其面也人之欲觀焉其行也所欲聞焉其言也而言之與行皆在詩書矣又曰夫堯舜所起至治也湯武所起至亂也問其成功孰治則堯舜治問其孰難則湯武難又曰孔子曰商汝知君之君乎子夏曰魚失水則死水失魚猶為水也孔子曰商知之矣又曰, SBCK: ''}
