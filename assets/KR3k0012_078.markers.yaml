  - {type: variant, offset: 3657, length: 1, content: 殺, SBCK: 氏驪連氏赫胥氏尊盧氏祝融氏混沌氏昊英氏有巢氏􅁑天氏隂康氏朱襄氏無懷氏凢十五代皆襲庖犧之號自無懷氏巳上經史不載莫知都之所在共工氏水德居木火之間霸而不王女媧是三皇之一稱三皇者多有不同以太昊炎帝爲二皇其二或􅁛女媧或稱祝融或􅁛共工未知孰是自女媧至無懷十五代合一万七千七百八十七歳魏陳王曹植女媧賛曰古之國君製造笙簧禮物未就軒轅纂成或云二君人首虵形神化七十何德之靈炎帝神農氏帝王丗紀曰神農氏姜姓也母曰任姒有喬氏之女名登爲少典妃逰於華陽有神龍首感女登於常羊炎帝人身牛首長於姜水有聖德以火承木位在南方主夏故謂之炎帝都於陳作五􅃶之琴凢八丗帝承帝臨帝明帝直帝來帝哀帝揄岡又曰夲起烈山或時稱之一號魁隗氏是爲農皇或曰帝炎諸侯夙沙氏叛不用命炎帝退而修德夙沙之民自攻其君而歸炎帝營都于魯重八封之數究八八之體爲六十四卦在位百二十年而崩塟長沙易下繫曰神農氏作斵木爲耜楺木爲耒耒耜之利以教天下蓋取諸益禮含文嘉曰神者信也農者濃也始作耒耜教民耕其德濃厚􅀂神故爲神農也古史考曰炎帝以火應故置官師皆以火爲名傳曰郯子曰炎帝以火紀故爲火師而火名杜預注曰神農姜姓之祖也有火瑞以火紀事名官也春秋命曆序曰有神人名石耳倉色大眉戴玉理日月清明有次序故神應和氣以生也玉理猶玉英玉勝也駕六龍出地輔號皇神農始立地形甄度四海}
