  - {type: variant, offset: 914, length: 337, content: 子曰至德之世謂太古三皇之時其瞑乎混淆之域而徙倚乎瀾漫之宇提挈天地委萬物以鴻濛為景性而浡楊乎無畛崖之際是故聖人呼吸陰陽之氣而群生莫不喁喁然仰其德和順止當此之時莫不領理決離隱愍而自成渾渾若若純樸未散滂薄為一而萬物大優是故雖有明知無所用之又曰古者至德之世賈便其肆農樂其業大夫安其職而處士循其道當此之時風雨不毀折草木不夭死九鼎重王者之德休明則鼎重姦回淫亂則鼎輕也珠玉潤澤洛出丹書河出綠圖故許由方面堯使方面求子列藥得之善卷披衣得達其道何則世主有欲利天下之心是以人得自樂其間四子之材非能盡大蓋今之世也然莫能與之同光者遇唐虞之時也又曰人主之居如日月之明也天下之所同側目而視傾耳而聽延頸舉踵而望也是故非淡漠無以明德非寧靜無以致遠非寬大無以兼覆非慈厚無以懷眾非平正無以制斷又曰古者有鍪而綣領以, SBCK: ''}
