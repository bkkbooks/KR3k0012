  - {type: variant, offset: 7, length: 0, content: '', WYG: 世紀曰太昊帝庖犧氏風姓也蛇身人首有聖德都陳作瑟三十六絃燧人氏沒庖犧氏代之繼天而生首德於木為百王先帝出於震未有所因故位在東方主春象日之明是稱太昊制嫁娶之禮取犧牲以充庖厨故號曰庖犧皇後世音謬故或謂之宓犧一解云宓古伏字後誤以宓為密故號曰宓犧一號雄皇氏在位一百一十年易繫辭曰古者庖犧氏之王天}
