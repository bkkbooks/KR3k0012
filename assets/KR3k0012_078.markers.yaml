  - {type: variant, offset: 2278, length: 246, content: 五帝而次有三王五伯此皆天下君之冠首也故言三皇以道治而五帝用德化三王由仁義五伯以權智其說之曰無制令刑罰謂之皇有制令而無刑罰謂之帝賞善誅惡諸侯朝事謂之王興兵約盟以信義矯世謂之伯也論衡曰古之帝王建鴻德者須鴻筆之臣褒頌紀德也潛夫論曰天作道皇作極臣作輔人作基又曰王之政普覆兼愛吉凶禍福與人共之應劭風俗通曰春秋運斗樞曰皇天不言四時行焉百物生焉垂拱無為謹言而民不違道德玄泊有皇天故稱曰皇皇者中也光也合元履中開陰布綱上合皇極其施光明指天畫地神化潛通煌煌盛美不可勝量又曰大傳說遂人為遂皇伏戲為戲皇神農為農皇也遂, SBCK: 燧}
