  - {type: variant, offset: 211, length: 1, content: 賢, WYG: 以生也玉理猶玉英玉勝也駕六龍出地輔號皇神農始立地形甄度四海東西九十萬里南北八十一萬里所為如此其教如神農植樹木使民粒食故天下號曰皇神農也甄紀地形逺近山川林澤所至孝經鈎命訣曰任已感龍生帝魁任已帝魁之母也魁神農名已或作姒也典略曰武王伐紂封神農之後}
  - {type: page-break, offset: 211, content: '', id: KR3k0012_WYG_078-10b, image: WYG0893/WYG0893-0622d.png}
  - {type: variant, offset: 213, length: 193, content: 同義同義賢於同力同力賢於同居帝者同氣同元氣也王者同義同仁義也霸者同力同武力也又曰軍必有將所以壹之也高誘曰將主也國必有君所以壹之也天下必有天子所以壹之也天子必執一所以愽之也又曰五帝固相興矣廢勝者用事又曰蚩尤作兵也利其栻高誘曰蚩尤少昊氏之末九黎之君名也始作亂伐無罪殺無辜善用兵為無道非始造之也故非作兵者也未有蚩尤之時民固剝林木以戰矣勝者為長長率也長猶不足以治之故立君君又不足以治之故立天子又, SBCK: 龍門山中人皇春秋命暦序}
  - {type: page-break, offset: 213, content: '', id: KR3k0012_SBCK_078-2a}
  - {type: variant, offset: 213, length: 0, content: '', WYG: 譙文子曰赤帝為火灾故黄帝擒之越絶書曰神農不貪天下而天下共富之不以其智自貴於人而天下共尊之莊子曰妸荷甘與神農}
