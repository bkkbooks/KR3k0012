  - {type: variant, offset: 3174, length: 949, content: 君臣讓功四海行焉王者制人道德降心服志設矩備襄有察察之政甲兵之事備而無爭戰血刃之用天下太平君無疑於主國定主安臣以義退亦能美而無害又曰任德者縱任義者橫縱成者王橫成者霸王兵法天霸兵法地天者德不可量地者威不可圖不量不圖者萬物之父母也袁子正論曰堯舜之人比屋可封非盡善也猶在防之水非不流也桀紂之人比屋可誅非盡惡也猶在壑之水非不停也班彪王命論曰帝王之作必有明聖顯懿之德豐功厚利積累之業然後精誠通于神明流澤加於生民故能為鬼神福所向天下所歸往未見運世無本功德不紀而能倔起在斯立者也傅彥林王令敘曰帝王之起必有天下瑞應自然之符明統顯祚豐懿之業加以茂德成功賢智之助而後居世臨民為神所保祐永世所尊崇未見運敘無紀次勳澤不加於民而可力爭覬覦神器者也阮籍通老論曰三皇依道五帝仗德三皇施仁五霸行義強國任智蓋優劣之異薄厚之降也韓子曰明主制其臣下者二柄而已矣二柄者刑德也殺戮之謂刑慶賞之謂德也崔寔政論曰自堯舜之帝湯武之王皆賴明哲之佐愽物之臣故皋陶陳謨而唐虞以興伊箕作訓殷周以隆及繼體之君欲立中興之功者曷嘗不賴賢哲之謀乎鄧子曰堯置敢諫之鼓舜立誹謗之木湯有司直之人武有貳慎之銘此四君者聖人也而由此之勤至於栗陸殺東里子宿沙君戮箕文桀誅龍逢紂刳比干此四誅者亂君故其疾賢若仇是以賢愚之相較若百丈之谿萬仞之山若九地之下與重天之顛墨子曰古者民生未有刑政之時選擇天下之賢可者立以為天子又曰凡國之萬民皆尚同乎天子而不敢下比天子之所是必亦是之天子之所非必亦非之去而不善言學天子之善言去而不善行學天子之善行天子者固天下之仁人也舉天下萬民以法天子夫天下何說而不治哉又曰古者聖王制為衣服之法曰冬服紺緅之衣輕且煖夏服絺綌之服輕且清則止諸加費不加於民利者聖王弗為又曰天子者天下之窮貴也天下之窮富故富且貴者當天意而不可不順順天意者兼相愛交相利必得賞反天意者別相惡交相賊必得罰尸子曰人之欲見毛廧西施美其面也夫黃帝堯舜湯武美者非其面也人之欲觀焉其行也所欲聞焉其言也而言之與行皆在詩書矣又曰夫堯舜所起至治也湯武所起至亂也問其成功孰治則堯舜治問其孰難則湯武難又曰孔子曰商汝知君之君乎子夏曰魚失水則死水失魚猶為水也孔子曰商知之矣又曰治天下有四術一曰忠愛二曰無私三曰用賢四曰度量通財足用賢則多功無私百知之宗也忠愛父母之行也又曰堯舜黑禹脛不生毛文王至日仄不暇飲食故富有天下貴為天子矣, WYG: 御覽卷七十八}
