  - {type: variant, offset: 2544, length: 0, content: '', SBCK: 鄭􅀇曰宻犧時質樸柞易以爲政令而不書但以􅀞其事之形象而巳詩含神霧曰大跡出雷澤華胥履之生伏犧宋均注曰雷澤二名華胥伏犧母禮含文嘉曰伏者別也犧者獻也法也伏犧德洽上下天應之以鳥獸文章地應之以􅀛書伏犧乃則象作易卦傳曰郯子曰太皡氏以龍}
