  - {type: variant, offset: 252, length: 1417, content: 愽平郡禹貢兗州之域春秋時齊之西界聊攝地也戰國時為齊地秦漢為東郡地左傳齊晏子對景公曰聊攝以東其為人也多矣史記曰齊田單攻聊城歲餘士卒多死而聊不下魯仲連為書約之矢以遺城中燕將得魯連書泣三日猶與不能決乃自殺史記曰齊威王伐晉至愽陵徐廣注曰東郡之愽平也莫州十道志曰莫州大安郡其地歷代所屬與瀛州同唐景雲二年分瀛州置漢志曰鄚縣屬涿郡王莽曰言符郡國志曰鄚縣有易京城後漢末公孫瓚築京以自固圍壍十重以鐵為門諸將家家作樓以千計並高五六丈為袁紹所攻城樓皆陷沒圖經曰清苑縣本漢樂鄉縣也漢志曰樂鄉屬信都王莽曰樂丘史記曰漢高祖過趙問樂毅有後乎對曰有樂臣叔遂封樂叔於此後漢書曰獻帝初公孫瓚據幽州先是有童謠曰燕南垂趙北際中間不合大如礪唯有此中可避世瓚以易地當之乃築京以自固也深州元和郡縣圖曰深州饒陽郡禹貢冀州之域七國時為趙地秦為鉅鹿郡地漢為饒陽縣隋置深州以州西故深城為名也漢志曰饒陽屬涿郡在饒河之陽故名之又曰安平屬涿郡王莽曰廣望亭漢書高帝六年封鄂千秋為安平侯後漢書曰王郎起光武自薊東南馳晨夜草舍舍上宿也至饒陽無蔞力朱切亭時天寒烈眾皆飢疲馮異上豆粥明旦光武謂諸將曰昨作公孫豆粥飢寒俱解公孫異字易州十道志曰易州上谷郡禹貢冀州之域虞舜分冀州立并州則為并州之地春秋時燕趙之分秦併天下為上谷郡地漢置涿郡今州即涿郡之故安地也又曰易縣本漢故安縣也漢志曰故安屬涿郡漢書曰文帝封申屠嘉為故安侯九州記曰易縣西南三十里有送荊陘即荊軻入秦之路也河北記曰易縣前有五公城王潭不從王莽潭子興生五子避隱於此世祖並封為侯十道志曰淶水縣本漢遒縣也漢志曰遒屬涿郡莽曰遒屏漢書年表曰景帝封匈奴降王隱強為遒侯又曰容城屬涿郡莽曰深澤十道志曰遂城戰國時武遂縣漢之北新城史記曰趙悼襄王二年李牧將攻燕拔武遂漢志曰北新城屬中山國莽曰朔平土地十三州志曰河間有新城故此加北幽州十道志曰幽州范陽郡禹貢冀州之域虞舜十二州為幽州夏殷省併冀周復置幽州秦為漁陽上谷等五郡漢高分上谷置涿郡武帝開東夷又置玄莬樂浪二郡釋名曰幽州北幽昧之地故曰幽州晉地道記曰幽州因幽都以為名山海經曰北荒有幽都之山爾雅曰北方之美者幽都之筋角焉晉地道記曰舜以冀州南北廣大分燕北地為幽州漢志曰漁陽郡屬幽州莽曰通路史記曰顓頊都於帝丘其地北至幽陵又曰周武王之滅紂封召公於北燕世本曰居北燕宋忠曰有南燕故曰北郡國志曰箕星散為幽州分為燕國其氣躁急通齊趙渤海之間一都會也史記曰燕秦千樹栗與封侯等士馬所生有魚鹽桑棗之利後漢書曰公孫瓚破劉虞盡有幽州之地三國典略曰東魏薛琡嘗夢山上掛絲以告所善張亮曰山上絲幽字也君必為幽州後果如之禮記曰武王克商封黃帝之後於薊史記曰鄒子之燕昭王擁彗前驅請為弟子受業築碣石宮以處鄒子親往師之又曰昭王謂郭隗曰願得賢士以身事之隗曰王必欲致士先從隗始況賢於隗者豈遠千里哉於是昭王為隗改築宮而師事之樂毅自魏往鄒衍自齊往劇辛自趙往士爭歸燕漢志曰安次縣屬渤海郡又續漢志曰安次屬漁陽郡圖經曰武清縣本漢之雍奴縣也酈元注水經曰雍奴藪澤之名四面有水曰雍不流曰奴魏志曰張郃傳曰從擊譚於渤海別將圍雍奴大破之順州方輿志曰順州順義郡在范陽郡唐天寶初置又改為順義歸化二郡亦曰思順州歸順州方輿志曰歸順州其地乃燕之北境燕太子丹使荊軻獻地圖即謂此也即元順州之北境唐天寶初以置歸化順義二郡同領懷柔一縣復又立歸順州以理焉涿州圖經曰涿州涿郡古涿鹿之地舜十二州為幽州地禹貢為冀州之域春秋戰國為燕國之涿邑漢高帝置涿郡史記曰黃帝與蚩尤戰於涿鹿之野漢志曰涿郡高帝置莽曰垣輸屬幽州領縣二十九薊州圖經曰薊州漁陽, SBCK: 絳}
