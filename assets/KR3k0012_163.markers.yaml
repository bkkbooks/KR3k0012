  - {type: variant, offset: 1678, length: 1, content: 及, SBCK: 時屬晉戰國時爲魏地􅁗三十六郡爲河東郡後漢書曰章帝元和三年行幸安邑觀鹽池晉太康地志曰安邑有司鹽都尉別領兵五千圖經曰晉穆侯遷都於絳曽孫孝侯改絳爲翼翼爲晉之舊都後獻公復爲絳絳在今曲沃故城二里有絳邑故城是故絳在翼城東南有故翼城是也十道志曰正平縣有九原一名九原即趙簡子觀處禮記曰趙文子與叔譽觀于九原文子曰死者如可作也吾誰與歸叔譽曰其陽處父乎文子曰見利不顧其君其仁不足稱也我則隋武子乎利其君不志其身謀其身不遺其友漢書曰元鼎六年上幸緱氏至此聞南越破遂立爲聞喜縣圖經曰聞喜縣有董澤左傳曰董澤之蒲可勝旣乎晉州元和郡縣志曰晉州平陽郡禹貢冀州之域堯舜所都周爲冀州地春秋時其地屬晉}
