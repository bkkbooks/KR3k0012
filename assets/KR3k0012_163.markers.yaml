  - {type: variant, offset: 2417, length: 1, content: 為, SBCK: 時晉地六國時屬趙􅁗併天下屬太原郡左傳昭元年曰昔金天氏有裔子曰昧爲玄􅁳師生允格臺駘臺駘能業其官宣汾洮障大澤汾洮二水以處太原太原晉陽也帝用嘉之封諸汾川又曰昔髙辛氏有二子長曰閼伯次曰實沈居于曠林不相能地后帝不臧遷閼伯于商丘主辰啇人是因遷實沈于大夏主參唐人是因大夏今晉陽縣其季世曰唐叔虞及成王滅唐而封太叔焉故參爲晉星叔虞封唐是爲晉侯又昭二年曰齊陳無宇送女晉侯謂之必齊謂陳無宇非卿執諸中都中都晉邑在河西介休縣又僖二十四年曰晉侯賞從亡者介之推不言禄禄亦弗及遂隱而死晉侯求之不􅀗以緜上爲之田曰以志吾過且旌善人元和郡縣志曰子夏居西河吴起守西河皆爲此也禮記檀弓曰子夏䘮其子而䘮其明曽子弔之子夏哭曰天乎予之無罪也曽子怒曰商汝何無罪也吾與汝事夫子於洙泗之間退而老於西河之上使西河之民疑汝於夫子爾罪一也唐書曰髙祖􅀄起兵師次霍邑隋將宋金剛拒不得進屯軍賈胡堡㑹霖神語曰􅀂向霍邑當東南傍}
