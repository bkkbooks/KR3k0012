  - {type: variant, offset: 2785, length: 300, content: 王莽曰樂安亭後漢明帝改為厭次漢書東方朔傳曰朔平原厭次人也十道志曰滴河縣本漢朸縣也朸音力漢志曰朸屬平原郡莽曰張鄉十道志曰蒲臺本漢濕沃縣也漢志曰濕沃屬千乘郡莽曰近亭三齊記曰蒲臺高十八尺始皇所頓處臺下縈蒲擊馬今蒲猶縈也滄州十道志曰滄州景城郡禹貢兗州之域虞舜及周為幽州之域春秋時屬齊晉七國時屬齊趙秦併天下以齊地置齊郡以趙地置鉅鹿郡漢高帝分鉅鹿置渤海郡分齊郡置平原郡漢志曰渤海郡高帝置莽曰迎河在渤海之濱因以為名圖經曰渤海實滄州之地屬趙分居多漢書曰趙分地薄人眾丈夫相遇游戲悲歌慷慨起則椎剽掘塚作姦巧多弄物為倡優十三州志曰渤海風俗鷙戾高氣力輕姦兇十道志曰清池縣漢之浮陽縣也漢志曰浮陽屬渤海郡莽曰浮成十三州志曰浮陽浮, WYG: 汾}
