  - {type: variant, offset: 3328, length: 1, content: 夏, SBCK: 秀容城劉元海新築元海感神而生姿容秀美因以爲名蔚州元和郡縣志曰蔚州安邊郡禹貢冀州之域虞及周屬并州春秋時地屬晉戰國時屬趙􅁗漢爲代郡漢志曰靈丘屬代郡瓉曰靈丘之號在趙武靈王之前也漢書曰酈食其􅀃漢王曰杜白馬之}
  - {type: variant, offset: 3328, length: 2, content: 夏津, WYG: 忻州定㐮郡古并州之域春秋時為晉國戰國時為趙地秦漢為太原郡地今州即漢太原郡之陽曲縣也十道志曰忻州置在秀容}
  - {type: variant, offset: 3328, length: 1, content: 夏, krp: 秀容城劉元海新築元海感神而生姿容秀美因以爲名蔚州元和郡縣志曰蔚州安邊郡禹貢冀州之域虞及周屬并州春秋時地屬晉戰國時屬趙秦漢爲代郡漢志曰靈丘屬代郡瓉曰靈丘之號在趙武靈王之前也漢書曰酈食其說漢王曰杜白馬之}
  - {type: variant, offset: 3330, length: 0, content: '', SBCK: 距飛狐之口晉書曰建興中劉琨自代出飛狐口奔於安次朔州元和郡}
