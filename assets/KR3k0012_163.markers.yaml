  - {type: variant, offset: 2395, length: 0, content: '', SBCK: 郡本漢榖逺縣地元和郡縣志曰禹貢冀州之域春秋時其地屬晉戰國時屬韓在􅁗爲上黨郡地今州即漢上黨之榖逺屬地漢志曰榖逺屬上黨郡王莽曰􅂖近晉地記曰榖逺今名􅀌逺後代語訛耳十道志曰綿上縣亦榖逺縣之地以縣西有綿上地因名之舊屬介休縣隋分置綿上焉蓋晉介子推之地隰州圖經曰隰州大寜郡夏殷巳前其地與箕沁同在周爲晉之北鄙元和郡縣志曰禹貢冀州之域春秋時爲晉地七國時屬魏􅁗爲河東郡地漢爲蒲子縣屬河東郡國語曰驪􅁎謂晉獻公曰蒲與屈君之疆也不可以無主􅀂太子主蒲與屈乃可以威民而懼戎太子申生也二子重耳夷吾也蒲陽平蒲子縣郡國志曰以州前二里有泉下濕故取下濕之義爲名十道志曰永和縣本漢狐讘縣也漢志曰狐讘屬河東郡讘音之渉反慈州元和郡縣志曰慈州文成郡禹貢冀州之域春秋時晉之屈邑獻公子夷吾所居也􅁗併天下即河東郡之北屈縣漢志曰北屈王莽曰朕北應劭曰有南屈故稱北瓉曰汲郡古文翟章救鄭次于南屈左傳僖二年曰晉荀息請以屈産之乗與垂􅁄之壁假道於虞以伐虢屈地生良馬元和郡縣圖曰􅁻昌縣有姚襄城西臨黄河控帶龍門孟門之險周齊交争之地齊後主武平二年遣斛律明月破周兵於此城下郡國縣道記曰吕香本漢之北屈有騏縣漢志曰騏屬河東郡侯國汾州十道志曰汾州西河}
