  - {type: variant, offset: 94, length: 0, content: '', krp: 東太守文帝謂布曰河東吾股肱郡也慱物志曰河東有山澤近鹽沃土之人不才漢興少有名人魏志杜畿傳曰畿爲河東太守開置學官親執經教郡中化之自後河東多儒者閭閻}
  - {type: variant, offset: 95, length: 1, content: 間, WYG: 人不才少有名人魏志杜畿傳曰畿為河東太守開學宫後河東多儒者春秋左氏傳曰晉人謀去故絳諸大夫皆曰必居郇瑕氏之地郇瑕古國名河東解縣西北郇域沃饒而近鹽國利君樂不可失也韓獻子曰不可郇瑕氏土薄水淺其惡易覯易覯則民愁民愁墊隘於是乎有沈溺重膇之疾不如新田土厚水深居之不疾有汾澮以流其惡夫山澤林鹽國之寶也國饒則民驕佚近寶則公室乃貧不可謂樂公說從之郡國志曰猗氏縣猗頓所居之地猗頓魯窮士也問術於陶朱公公教之蓄五牸遂富漢因之名縣史記曰魏都安邑惠王三十}
