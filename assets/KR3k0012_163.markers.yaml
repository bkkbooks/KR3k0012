  - {type: variant, offset: 3331, length: 1, content: 本, SBCK: 志曰朔州馬邑郡屬禹貢冀州之域虞及周爲并州地春秋時爲北狄地戰國時屬趙􅁗爲鴈門郡}
  - {type: variant, offset: 3331, length: 1, content: 本, krp: 志曰朔州馬邑郡屬禹貢冀州之域虞及周爲并州地春秋時爲北狄地戰國時屬趙秦爲鴈門郡}
  - {type: variant, offset: 3333, length: 3, content: 鄃音戍, SBCK: 爲鴈門郡之馬邑也漢志曰馬邑屬鴈門郡王莽曰章昭晉太康地記曰􅁗時建此城輙崩不成有馬周旋馳走反覆父老異之因依以築城遂爲馬邑後魏書曰道武天興元年遷都平城孝文遷都之後於此置朔州冀州圖云趙武靈王胡服而征遂有獫狁之地漢髙帝以韓王信壯武乃以太原郡爲韓國徙信以備胡信以晉陽去塞逺請理馬邑上乃許之後匈奴圍信信數求救上賜書責信信懼以馬邑降胡雲州元和郡縣圖曰雲州雲中郡禹貢冀州之域虞及周爲并州之地春秋時爲北狄地戰國時其地屬趙其後屬􅁗鴈門郡地漢鴈門郡之平城}
  - {type: page-break, offset: 3333, content: '', id: KR3k0012_SBCK_163-10b}
  - {type: variant, offset: 3333, length: 3, content: 鄃音戍, WYG: 曲陽縣後漢末於此置九原縣十三州志曰漢末大亂匈奴侵邊自定㐮已西盡雲中鴈門之間迨至建安中丞相曹公集荒郡之户以為縣聚之九原界以立新興郡領九原等縣屬并州元和郡縣志曰秀容城劉元海新築元海感神而生姿容秀美因以為名蔚州元和郡縣志曰蔚州安邊郡禹貢冀州之域虞及周屬并州春秋時地屬晉戰國時屬趙秦漢為代州漢志曰靈丘屬代郡瓉曰靈丘之號在趙武靈王之前又漢書曰酈食其説漢王曰杜白馬之津距飛狐之口晉書曰建興中劉琨自代出飛狐口奔於安次朔州元和郡縣志曰朔州馬邑郡屬禹貢冀州之域虞及周為并地春秋時為北狄戰國時屬趙秦為鴈門郡之馬邑也漢志曰馬邑屬鴈門郡王莽曰章昭晉太康地記曰秦時建此城輙崩不成有馬周旋馳走反覆父老異之因依以築城遂為馬邑後魏書曰道武天興元年遷都平城孝文遷都之後於此置朔州冀州圗經曰趙武靈王胡服而征遂有獫狁之地漢髙帝以韓王信壮武乃以太原郡為韓國徙信以備胡信以晉陽去塞逺請理馬邑上乃許之後匈奴圍信信數求救上賜書責信信懼以馬邑降胡雲州元和郡縣圗曰雲州雲中郡禹貢冀州之域虞及周為并州之域春秋時為北狄地戰國時其地屬燕其後屬趙秦鴈門郡地漢鴈門郡之平城}
