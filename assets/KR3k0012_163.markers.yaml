  - {type: variant, offset: 2438, length: 3, content: 當營室, SBCK: 不生物曰鹵太康地記曰并州不以衛水爲號不以􅁪山爲稱而云并者蓋以在兩谷之間乎帝王世紀曰帝堯始封於唐又徙晉陽及爲天子都平陽平陽即今晉陽即太原也又曰禹自安邑都晉陽至桀徙都安邑至周成王以封弟叔虞是爲晉侯史記曰成王與叔虞戲削桐葉爲珪曰以是封汝周公請封於唐王曰吾戲耳周公曰天子無戲言遂以封之魏志曰髙祖圍􅀽尚於鄴時􅀽紹外生髙幹爲并州刺史牽招􅀃幹曰并州左有􅁪山之險右有大河之固北有強胡冝速迎尚併力觀變幹不從}
