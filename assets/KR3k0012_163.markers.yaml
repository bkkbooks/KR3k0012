  - {type: variant, offset: 2660, length: 0, content: '', WYG: 中國曰太原夷狄曰大鹵按晉大鹵太原大夏夏墟晉陽六名其實一也左傳曰晉荀吳敗狄於大鹵釋名曰地不生物曰鹵太康地記曰并州不以衛水為號不以恒山為稱而云并者盖以兩國之間乎帝王世紀曰帝堯始封於唐又徙晉陽及即帝位都平陽平陽乃今晉陽即太原也又曰禹自}
