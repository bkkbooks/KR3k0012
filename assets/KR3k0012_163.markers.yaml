  - {type: variant, offset: 1678, length: 1, content: 及, WYG: 時屬晉戰國時為魏地秦三十六郡為河東郡後漢書曰章帝元和三年行幸安邑觀鹽池晉太康地志曰安邑有司鹽都尉别領兵五千圖經曰晉穆侯遷都於絳其曾孫孝侯改絳為翼翼為晉之舊都後獻公復為絳絳在今曲沃故城二里有絳邑故城是故絳在翼城東南有故翼城是也十道志曰正平縣有九原一名九原即趙簡子觀處禮記曰趙文子與叔譽觀於九原文子曰死者如可作也吾誰與歸叔譽曰其陽處父乎文子曰行并植於晋國不殁其身其智不足稱也其舅犯乎文子曰見利不顧其君其仁不足稱也我則隨武子乎利其君不忘其身謀其身不遺其友漢書曰元鼎六年幸緱氏至此聞南越破遂立為聞喜縣圖經曰聞喜縣有董澤左傳曰董澤之蒲可勝既乎晉州元和郡縣志曰晉州平陽郡禹貢冀州之域堯舜所都周為冀州地春秋時屬晋}
