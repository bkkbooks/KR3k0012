  - {type: variant, offset: 1897, length: 2, content: 密雲, WYG: 以濩澤為名漢志曰濩澤屬河東郡禹貢析城山在其西南濩音胡郭反墨子曰舜漁於濩澤十道志曰晉城縣本漢髙都縣也漢志曰髙都屬上黨郡有天井闗元和郡縣志曰髙平縣本漢泫氏縣也泫音胡𤣥反漢志曰泫氏屬上黨泫水所出竹書紀年曰梁惠王九年晉取泫氏史記曰趙成侯十六年與韓魏分晉封晉君以端氏潞州元和郡縣志曰潞州上黨郡禹貢冀州之域殷為黎國春秋時屬晉又兼有潞子之國秦為上黨郡地左傳宣十五年曰潞子嬰兒之夫人晉景公之姊也鄷舒為政而殺之又傷潞子之目鄷舒潞相晉侯伐之滅潞鄷舒奔衛衛人歸晉晉人殺之戰國䇿曰秦有安邑則韓必無上黨以逺韓近趙故卒歸趙隋圖經曰上黨南陽古以為縣實都也漢志曰上黨郡秦置屬并州有上黨闗又曰壺闗屬上黨郡黎侯國今有黎亭釋名曰上黨黨所也在山上其所最髙故曰上黨上黨記曰髙下赤壌其地山阻百姓不居即此郡也圖經曰後周建徳七年于襄垣縣立潞州以其侵汾潞為名漢志曰長子縣屬上黨郡周史辛甲所封師古曰長讀長短之長竹書紀年曰梁惠王十二年鄭取屯留尚子即長子之地也左傳㐮公十八年晉人執衛行人石買於長子執孫蒯於屯留長子屬上黨又曰鄭伯如晉晉人執諸銅鞮晉太康地記曰銅鞮故晉大夫羊舌赤邑世號赤為銅鞮伯華漢以為縣遼州圗經曰遼州樂平}
