  - {type: variant, offset: 164, length: 271, content: 成於天列居錯峙各有攸屬中外之官帶名者百有二十可名者三百二十為星二千五百微星之數蓋一萬一千五百二十庶類蠢蠢咸得係命不然何以惣而理諸徐整長曆曰大星徑百里中星五十小星三十北斗七星間相去九千里皆在日月下天文要集曰七公天之相也三公廷尉之象也上星上公也次星中公也星明則七輔強天官星占曰歲星其國齊其位東方蒼帝之子人主之象也其色明而內實天下安寧夫歲星所居國人主有福不可加以兵歲星一曰攝提一曰重華一曰應星一曰經星一曰脩人歲星動人主怒無光仁道失歲星順行仁德加也歲星農官也主五穀春不勸農則歲星盈縮所在之國不可以罰小則民多病大則喜又曰熒惑主夏位在南赤帝之子方伯之象也, WYG: ''}
