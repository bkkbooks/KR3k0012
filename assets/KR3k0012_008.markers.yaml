  - {type: variant, offset: 1595, length: 481, content: 彗星為攙搶春秋考異郵曰鯨魚死而彗星出淮南子亦云尚書帝命驗曰天鼓動玉弩發天下驚史記曰蚩尤旗類彗而後曲象旗見則王者征伐四方又曰齊景公三十二年彗出公坐柏寢歎曰堂乎堂乎誰有此乎群臣皆泣晏子笑公怒晏子曰臣笑群臣諛甚景公曰彗星出東北當齊野寡人以憂晏子曰君高臺深池賦歛如弗得刑罰恐弗勝茀星將出彗星何懼乎公曰可穰乎晏子曰使神可祝而來亦可禳而去也百姓若怨以萬數而君令一人禳之安能勝眾口乎又天官書曰天狗狀如奔星有聲其下止地類狗望之如火光炎炎衝天其下圓如數頃田處上兌則黃色千里破軍殺將又曰長庚如一匹布著天見則兵起漢書曰獻帝初平四年有流星八九丈西北行有聲如雷望如火照地是曰天狗金門之山有赤犬其聲下者有兵也又曰哀帝建平二年彗出牽牛日月五星所從起曆數之元三正之始彗而出之改更之象也其後王莽篡國又曰枉矢類大流星虵行而蒼黑望如有毛又曰鄒陽上書曰衛先生為秦畫長平之事太白食昴昭王疑之漢書天文志曰凡月蝕五星其國皆亡歲以饑熒惑以亂鎮以殺太白強國以戰辰以女亂又曰始皇之時十五年間彗星四見久者八十日長或竟天後秦并六國外攘四夷死者如亂麻後漢書曰安帝永初二年正月太白晝見占云為強臣是時鄧氏方盛此其應也續漢書曰, SBCK: 朝霞炙瓊林夕影映}
