  - {type: variant, offset: 2077, length: 486, content: 帝光和中國星見東南如炬十餘日其後黃巾張角起袁紹董卓亂西漢詞圃曰項籍之敗星孛大角吳志曰孫權時有長星從東南出群星從之又曰司馬宣王圍公孫淵夜有大流星長數十丈墜襄平東及淵走當流星處斬之晉書曰張華為司空中台星拼少子韙勸華遜位華云天道玄遠須修德以應之孫氏晉陽秋曰有星赤而芒角自東北往西南沒于諸葛亮營俄而亮卒又曰會稽謝敷字慶緒隱若耶山初月犯少微星少微一名處士星時戴逵名著於敷時人憂之俄而敷死故會稽人士嘲曰吳中高士求死不得死宋書曰吳孫休永安元年有諸子群嬉中有異眼光芸爚爚外射諸兒問之曰我熒惑也將示爾三公歸于司馬言畢乃聳身而躍仰視之若曳一疋練有頃而沒後四年蜀亡六年魏廢二十一年吳平是歸司馬也又沈懷文傳曰時熒惑守南斗上乃廢西州舊館使西陽王子尚移居東城以厭之懷文曰天道示變宜應之以德今雖空西州恐無益也唐書曰有星孛于虛危歷于氏百餘日乃滅太宗謂群臣曰天見彗星是何祅也虞世南曰昔齊景公時有彗星見公問晏嬰對曰公穿池沼畏不深起臺榭畏不高行刑罰畏不重是以天見彗星為公誡耳景公懼而脩德後十六日而星沒臣聞天時不如地利地利不如人和若德義不脩雖獲麟鳳終是無補但政事無闕雖有災何損於時然願陛下勿以功高古人而自矜伐勿以, SBCK: 芝}
