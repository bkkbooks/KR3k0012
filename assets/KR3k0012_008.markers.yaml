  - {type: variant, offset: 38, length: 0, content: '', SBCK: 又曰武帝迎汾隂鼎至甘泉宫黃雲蓋其上又曰宣帝祠甘泉有頃紫雲從西北來散於殿前范曄後漢書曰樊英隱於壷山之陽曽有􅁀風從西方起英謂學者曰成都市火甚盛因含水西向漱之時客有從蜀郡來者云是日大火有黒雲卒從東方起湏􅁷大雨火滅魏志曰文帝生於沛國譙縣上有雲氣青色而圎蓋終日乃解望氣者以爲至貴人之證非人臣之氣蜀志曰劉備爲兒戯於桑樹}
  - {type: page-break, offset: 38, content: '', id: KR3k0012_SBCK_008-4b}
  - {type: variant, offset: 38, length: 0, content: '', WYG: 又武帝迎汾隂鼎至甘泉宫黃雲蓋其上又宣帝祠甘泉宫有頃紫雲從西北來散于前范蔚宗後漢書曰樊英隠壺山之陽曽有暴風從西方起英謂學者曰成都市火甚盛因含水西向噀之時客有從成都來者云是日大火有黒雲卒從東方起須臾大雨火滅魏志曰文帝生于沛國譙縣上有雲氣青色而圓蓋終日不觧望氣者以為至貴人之證非人臣之氣蜀志曰先主為兒戲於桑樹}
