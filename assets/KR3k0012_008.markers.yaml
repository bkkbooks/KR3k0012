  - {type: variant, offset: 5, length: 0, content: '', SBCK: 如磻石立冬隂雲岀而黒大雪隂雪出而分冬至日謹􅀱見雲送迎從其郷來􅀊美民和京房易飛候曰凡􅀱􅀨有黒雲如羣羊奔如飛鳥五日必􅀨又曰視四方常有大雲五色其下賢人隱也青雲潤澤蔽曰在西北爲舉賢良黃雲如覆車大豐也又曰凡􅀱􅀨以晦朔􅁌望有蒼黒雲細雲如杼軸蔽日月五日必􅀨尚書中候曰堯沉壁於}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 如蟠石立冬隂雲出而黒大雪降隂雲出而分冬至日謹候見雲送迎從其鄉来嵗美民和京房易飛候曰凡候雨有黒雲如羣羊奔如飛鳥五日必雨又視四方常有大雲五色其下賢人隱也青雲潤澤蔽日在西北為舉賢良黄雲如覆車大豐也又凡候雨以晦朔弦望有蒼黒雲起細雲如杼軸蔽日月五日必雨尚書中候曰堯沉璧于}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_008-4a, image: WYG0893/WYG0893-0094a.png}
  - {type: variant, offset: 5, length: 0, content: '', krp: 如磻石立冬隂雲岀而黒大雪隂雪出而分冬至日謹候見雲送迎從其郷來歲美民和京房易飛候曰凡候雨有黒雲如羣羊奔如飛鳥五日必雨又曰視四方常有大雲五色其下賢人隱也青雲潤澤蔽曰在西北爲舉賢良黃雲如覆車大豐也又曰凡候雨以晦朔弦望有蒼黒雲細雲如杼軸蔽日月五日必雨尚書中候曰堯沉壁於}
  - {type: variant, offset: 6, length: 0, content: '', SBCK: 白雲起迴風摇落又曰周成王舉堯舜禮沉璧于河白雲起而青雲浮至乃有蒼龍􅀒圖臨河也尚書大傳曰舜爲賔客禹爲主人百工相和而歌卿雲于時八風循通卿雲藂䕺注言和氣應也䕺或爲族又曰五岳皆觸石岀雲膚寸而合不崇朝而􅀨又曰舜時卿雲見於時百工和歌舜歌曰卿雲爛兮糺漫漫或以雲爲岀岫迴薄而難以名狀也禮統曰雲者運氣布恩普􅀶也禮斗威儀曰人君乗水而王其政和平則景雲見也又曰景明也言雲氣光明也又曰周成王治平觀於河青雲浮於河也春秋文耀鈎曰楚有蒼雲如霓圍軫七蟠中有荷斧之人向軫而蹲於是楚唐史畫遺􅁅而雲滅故曰唐史之䇿上滅蒼雲宋均注曰軫楚分也雲水氣􅁅火氣畫遺􅁅故雲滅春秋元命苞曰隂陽聚爲雲春秋􅀃題辭曰雲之爲言運也觸石而起謂之雲含陽而起以精運也春秋合誠}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_SBCK_008-3a}
