  body:
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 八雲霄漢霞雲釋名曰雲猶云云衆盛也􅀃文曰雲大澤之潤氣也又曰雲山川氣也從雨云象回轉形也霠於金反雲覆日也霃音沉渰於檢反雲乆隂也凄􅀨雲起也􅀨雲貌也詩云有渰凄凄興雨祁祁易曰雲行􅀨施品物流形又曰雲從龍風從虎聖人作而萬物覩又曰召雲者龍又曰雲上於天需又曰坎爲雲又曰宻雲不􅀨自我西郊宻静也雲靜止不加􅀨渝紂恩澤不加於民也不雨之灾自其君也西郊亦謂文王也詩曰薈兮蔚兮南山朝躋注曰薈蔚雲興貌南山曹南山躋升雲也又曰上天同雲􅀨雪紛紛又曰英英白雲露彼菅茅英英白雲皃露亦有雲言天地之氣無微不着無不覆養也禮曰天降時􅀨山川出雲又曰山林川谷丘陵能出雲爲風雨周禮曰保章氏以五色雲物辨吉凶之祲象占視曰旁雲氣青爲䖝白爲䘮赤爲兵荒黒爲水黄爲豊傳曰凡分至啓閉必書雲物爲備故也分謂春秋分至謂冬夏至啓立春夏也陽氣用事爲啓閉立秋冬也隂氣用事爲閉雲五雲也風氣日月星辰也分至啓閉天地之大節隂陽之分也故遂登觀臺望氣以審祅祥變禍亂之氣先見於八節書其雲物之形言其所致務爲之備也又曰魯哀公五年有雲如衆赤鳥夾日以飛三日楚使問周太史太史曰其當王身乎日爲君祅氣守之雲在楚若上禍不及他國也若禜之可移於令尹司馬也王曰除心腹之疾而寘諸股肱何益終不禜孔子曰楚昭王知天道矣不失國冝哉又曰黃帝氏以雲紀官故爲雲師而雲名有景雲之瑞公羊傳曰觸石而出膚寸而合不崇朝而徧􅀨乎天下者惟㤗山雲爾語曰不義而冨且貴於我如浮雲易通卦驗曰冬至陽雲岀箕如樹木之􅃺小寒合凍蒼陽雲出氐大寒降雪黑陽雲出心立春青陽雲出房如積水􅀨水黃陽雲出亢驚蟄赤陽雲出翼春分正陽雲出張如積白鵠清明白陽雲出奎榖􅀨大陽雲岀張如車蓋立夏常陽雲出觜赤如珠小滿上陽雲岀}
