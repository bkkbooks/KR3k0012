  - {type: variant, offset: 6, length: 0, content: '', krp: 白雲起迴風摇落又曰周成王舉堯舜禮沉璧于河白雲起而青雲浮至乃有蒼龍負圖臨河也尚書大傳曰舜爲賔客禹爲主人百工相和而歌卿雲于時八風循通卿雲藂䕺注言和氣應也䕺或爲族又曰五岳皆觸石岀雲膚寸而合不崇朝而雨又曰舜時卿雲見於時百工和歌舜歌曰卿雲爛兮糺漫漫或以雲爲岀岫迴薄而難以名狀也禮統曰雲者運氣布恩普博也禮斗威儀曰人君乗水而王其政和平則景雲見也又曰景明也言雲氣光明也又曰周成王治平觀於河青雲浮於河也春秋文耀鈎曰楚有蒼雲如霓圍軫七蟠中有荷斧之人向軫而蹲於是楚唐史畫遺灰而雲滅故曰唐史之䇿上滅蒼雲宋均注曰軫楚分也雲水氣灰火氣畫遺灰故雲滅春秋元命苞曰隂陽聚爲雲春秋說題辭曰雲之爲言運也觸石而起謂之雲含陽而起以精運也春秋合誠}
