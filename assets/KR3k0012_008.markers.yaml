  - {type: variant, offset: 948, length: 342, content: 則眾星齊常星亂則眾星墜矣崔豹古今注曰漢明帝為太子時令樂人作歌詩曰星重輝言太子比德故云重也庾闡詩曰玄景如映壁繁星如散錦瑞星易坤靈圖曰至德之萌五星若貫珠尚書中候曰帝堯即政景星出翼尚書考靈曜曰天地開闢元曆名月首甲子冬首日月五星俱起牽牛初日月若懸璧五星若編珠史記曰黃帝時景星見形如半月可以夜作又曰南極老人見則天下安漢書曰高祖初入關五星聚於東井秦分野司馬遷天官書曰景星其狀無常常出有道之國朱宣帝王世紀曰神農氏之末少昊氏娶附寶見大電光繞北斗極星照郊感附寶孕二十月生黃帝於壽丘魏志曰桓帝時有黃星見楚宋之分殷馗言後五十歲當有真人起梁沛間其鋒不可當其後五十年曹公破袁紹天下莫敵矣晉中興書曰元帝渡江歲鎮辰太白等四星聚於牛女間禹時鉤命決曰星累累若貫珠炳煥如連璧帝命驗曰有人雄起戴玉英履赤矛鄭玄注曰赤矛瑞星名, SBCK: 陽而含朝霞}
