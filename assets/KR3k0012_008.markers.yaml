  - {type: variant, offset: 1104, length: 186, content: 高祖初入關五星聚於東井秦分野司馬遷天官書曰景星其狀無常常出有道之國朱宣帝王世紀曰神農氏之末少昊氏娶附寶見大電光繞北斗極星照郊感附寶孕二十月生黃帝於壽丘魏志曰桓帝時有黃星見楚宋之分殷馗言後五十歲當有真人起梁沛間其鋒不可當其後五十年曹公破袁紹天下莫敵矣晉中興書曰元帝渡江歲鎮辰太白等四星聚於牛女間禹時鉤命決曰星累累若貫珠炳煥如連璧帝命驗曰有人雄起戴玉英履赤矛鄭玄注曰赤矛瑞星名, WYG: 潄正陽而含朝霞}
