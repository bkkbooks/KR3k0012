  - {type: variant, offset: 217, length: 438, content: 得係命不然何以惣而理諸徐整長曆曰大星徑百里中星五十小星三十北斗七星間相去九千里皆在日月下天文要集曰七公天之相也三公廷尉之象也上星上公也次星中公也星明則七輔強天官星占曰歲星其國齊其位東方蒼帝之子人主之象也其色明而內實天下安寧夫歲星所居國人主有福不可加以兵歲星一曰攝提一曰重華一曰應星一曰經星一曰脩人歲星動人主怒無光仁道失歲星順行仁德加也歲星農官也主五穀春不勸農則歲星盈縮所在之國不可以罰小則民多病大則喜又曰熒惑主夏位在南赤帝之子方伯之象也為天候主歲成敗司察祅孽所往有兵為亂為賊為疾為喪為饑為兵蓋天下不理也東西南北無有常出則有兵入則散周旋止息乃為死喪又曰鎮星主德女主之象也所居國有德不可以軍加也又曰辰星北之位黑帝之子宰相之祥也一名安調一名態星一名釣星一名伺晨主德常行四仲當出不出天下旱色黃五穀熟色白中謀泄色青大臣憂又曰太白位在西方白帝之子大將之象也一名天相一名大正一名大臣一名大皓一名明星又曰紫微者天之帝坐也一名天營一名長垣又曰北辰者一名天關一名北極極者紫宮太一坐也太微者天闔也南, SBCK: 陽}
