  - {type: variant, offset: 38, length: 0, content: '', krp: 又曰武帝迎汾隂鼎至甘泉宫黃雲蓋其上又曰宣帝祠甘泉有頃紫雲從西北來散於殿前范曄後漢書曰樊英隱於壷山之陽曽有暴風從西方起英謂學者曰成都市火甚盛因含水西向漱之時客有從蜀郡來者云是日大火有黒雲卒從東方起湏臾大雨火滅魏志曰文帝生於沛國譙縣上有雲氣青色而圎蓋終日乃解望氣者以爲至貴人之證非人臣之氣蜀志曰劉備爲兒戯於桑樹}
  - {type: variant, offset: 39, length: 3, content: 為靈星, SBCK: 上有雲覆童童如車蓋􅀳書曰樂廣有風姿衛瓘曰此人􅀂披雲霧而覩青天又曰阮咸性曠逹不拘顔延年五君詠曰仲容青雲器又曰咸和元年雲􅃲聲如􅁀風雨宋書曰大明八年宣太后陵前後數有光及五色雲芳香四滿又五采雲在松上如車蓋又曰孝康建元二年二月乙未日上有雲如錦文光色潤澤又曰丗祖在江州起義建牙軍有紫雲二叚落于身上穆天子傳曰天子觴西王母於瑶池}
  - {type: variant, offset: 39, length: 0, content: '', WYG: 上有雲覆童童如車蓋晉書曰樂廣有風姿衛瓘曰此人若披雲霧而覩青天又阮咸性曠達不拘顔延年五君詠曰仲容青雲噐又咸和元年雲鬬聲如暴風雨宋書曰大明八年宣太后陵前後數有光及五色雲芳香四滿又五彩在松如車蓋又孝康建元二年二月乙未日上有雲如錦文光色潤澤又世祖在江州起義建軍有紫雲二叚落于身上穆天子傳曰天子觴西王母于瑶池之上王母}
