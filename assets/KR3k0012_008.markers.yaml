  - {type: variant, offset: 127, length: 3, content: 君有德, SBCK: 津箕斗之間漢津也郭璞注曰津漢津也箕龍尾斗南斗天漢之津梁大戴禮曰夏小正月七日漢案户漢天河也案户言直南北也孝經援神契曰河者水之伯上應天漢史記天官書曰漢者金之散氣其夲曰水漢星多則多水少則旱孟康曰漢河漢也水生於金也漢書曰項羽封髙帝爲漢王帝不恱蕭何謀曰語曰天漢其稱甚羙願大王王漢撫其民還定三秦}
