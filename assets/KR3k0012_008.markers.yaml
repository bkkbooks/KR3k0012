  - {type: variant, offset: 4, length: 0, content: '', SBCK: 芒種長陽雲岀維夏至少隂雲出如水波小暑雲五色岀大暑隂雲出南赤北蒼正秋濁隂雲岀如赤繒處暑赤雲岀白露黃隂雲出秋分白隂雲出寒露正隂雲岀如冠纓霜降大隂雲出上如羊}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 芒種長陽雲出羅夏至少隂雲如水波萃萃小暑雲五色出大暑隂雲出南赤圵蒼立秋濁隂雲出如赤繒處暑赤雲出白露黄隂雲出秋分白隂雲出寒露正隂雲出如冠纓霜降大隂雲出上如羊}
  - {type: variant, offset: 4, length: 0, content: '', krp: 芒種長陽雲岀維夏至少隂雲出如水波小暑雲五色岀大暑隂雲出南赤北蒼正秋濁隂雲岀如赤繒處暑赤雲岀白露黃隂雲出秋分白隂雲出寒露正隂雲岀如冠纓霜降大隂雲出上如羊}
