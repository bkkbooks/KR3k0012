  - {type: variant, offset: 100, length: 18, content: 春斗為天關軫為地梁夏角為天關參為地梁, SBCK: 有雲如丹虵隨星後大戰殺將}
  - {type: variant, offset: 100, length: 1, content: 春, WYG: 有雲如丹蛇隨車後大戰殺將又韓雲如布趙雲如牛楚雲如日宋雲如車魯雲如馬吳雲如犬越雲如龍頭蜀雲如囷言當處雲似之又雲如雄雉或如雄鷄臨城其城必降魏武兵書按要曰孫子稱司雲氣非雲非烟非塵非霧形似鳥獸客吉主人忌韋頴秦書曰苻堅時有黄雲五色時以為瑞賜民酺五日黄子𤼵相雨書曰四方有濯魚雲疾者立雨遲者少雨雖至江漢雲疾者即日雨洛書曰蒼帝起青雲扶日赤帝起赤雲扶日黄帝起黄雲扶日白帝起白雲扶日軍國占候曰有黒雲似一疋布者其國兵起天文要集曰河有黒雲狀似船若一疋布維河不出十日大雨又北}
  - {type: page-break, offset: 100, content: '', id: KR3k0012_WYG_008-12a, image: WYG0893/WYG0893-0098a.png}
  - {type: variant, offset: 100, length: 18, content: 春斗為天關軫為地梁夏角為天關參為地梁, krp: 有雲如丹虵隨星後大戰殺將}
  - {type: punctuation, offset: 101, content: ，, id: KR3k0012_CHANT_008-bkkpn43}
  - {type: 'tls:seg', offset: 101, content: '', id: KR3k0012_CHANT_008-3a.4}
  - {type: variant, offset: 102, length: 0, content: '', WYG: 者不欲雲覆之有黒雲覆之天大雨地圖曰望石氣如浮雲其珠玉之精也京房風角要訣曰候雨法有黒雲如一疋帛向日中即日大雨二疋}
  - {type: page-break, offset: 102, content: '', id: KR3k0012_WYG_008-12b, image: WYG0893/WYG0893-0098b.png}
  - {type: variant, offset: 103, length: 0, content: '', WYG: 二日大雨三疋為三日大雨黄帝岐伯經曰岐伯乘絳雲之車駕十二白鹿㳺于蓬萊之上徐幹中論曰文王遇姜公于渭陽灼然如披雲見白日孫氏瑞應圖曰景雲者太平之應也一曰非氣非烟五色氤氲謂之慶雲瑞應圖曰矞雲也有狀外赤内黄歸藏曰有白雲自蒼梧入大梁論衡曰龍無雲雨不能叅}
  - {type: page-break, offset: 103, content: '', id: KR3k0012_WYG_008-13a, image: WYG0893/WYG0893-0098c.png}
  - {type: variant, offset: 104, length: 2, content: 關軫, WYG: 吳範占候風氣秘訣曰有青雲如雉臨城營軍散走山海經曰符陽之山怪雲所出陸賈新語曰邪臣之蔽賢猶浮雲之蔽日月也宋玉髙唐賦叙曰楚襄王與宋玉逰雲夢之臺髙唐之觀上有雲氣須臾之間變化無窮問曰此何氣也玉曰朝雲也昔者先王嘗逰髙唐怠而晝寢夢見婦人曰妾巫山之女也}
  - {type: page-break, offset: 104, content: '', id: KR3k0012_WYG_008-13b, image: WYG0893/WYG0893-0098d.png}
  - {type: punctuation, offset: 105, content: ，, id: KR3k0012_CHANT_008-bkkpn44}
  - {type: 'tls:seg', offset: 105, content: '', id: KR3k0012_CHANT_008-3a.5}
  - {type: variant, offset: 107, length: 0, content: '', WYG: 髙唐之客聞君逰髙唐願薦枕席王因幸之去而辭曰妾在巫山之陽髙丘之岨朝為行雲莫為行雨朝朝暮暮陽臺之下旦朝視之如言故為立廟號曰朝雲孫卿雲賦曰圎者中規方者中矩又託}
  - {type: variant, offset: 108, length: 3, content: 梁夏角, WYG: 而㳺宇反風而下雨楚辭曰青雲衣兮白霓裳又冠青雲之崔巍漢武帝秋風辭曰秋風起兮白雲飛司馬相如封禪頌曰自我天覆雲之油油魏文帝詩曰西北有浮雲亭亭似車蓋應瑒詩曰清朝浮四海日暮歸故山張孟陽詩曰流波戀舊浦行雲思故山傅𤣥詩曰浮雲合愁氣悲風坐自歎又𤣥歌詩曰青雲徘􅆦}
  - {type: page-break, offset: 108, content: '', id: KR3k0012_WYG_008-14a, image: WYG0893/WYG0893-0099a.png}
  - {type: punctuation, offset: 109, content: 。, id: KR3k0012_CHANT_008-bkkpn45}
  - {type: 'tls:seg', offset: 109, content: '', id: KR3k0012_CHANT_008-3a.6}
  - {type: punctuation, offset: 110, content: ，, id: KR3k0012_CHANT_008-bkkpn46}
  - {type: 'tls:seg', offset: 110, content: '', id: KR3k0012_CHANT_008-3a.7}
  - {type: variant, offset: 112, length: 0, content: '', WYG: 我愁腸又雲為車兮風為馬玉為山兮蘭在野雲無期兮風有止思心多端誰能理陸機雲賦曰望九畿以逺肆明皇極而永舒蔽陽光于暘谷間}
  - {type: page-break, offset: 112, content: '', id: KR3k0012_WYG_008-14b, image: WYG0893/WYG0893-0099b.png}
  - {type: variant, offset: 113, length: 1, content: 關, WYG: 文于帝居齊濛荒于無極等渾昧于太初又浮雲賦曰若層臺髙觀重樓疊閣或如鐘首之鬰律乍似塞門之寥廓若靈園之列樹攅寶耀之炳粲金柯分玉葉散龍逸蛟起熊厲虎戰鸞翔鳳翥鴻驚鶴奮成公綏雲賦曰舒則彌綸覆四海卷則消液入無形狎獵鱗次}
  - {type: punctuation, offset: 114, content: ，, id: KR3k0012_CHANT_008-bkkpn47}
  - {type: 'tls:seg', offset: 114, content: '', id: KR3k0012_CHANT_008-3a.8}
  - {type: variant, offset: 115, length: 3, content: 為地梁, WYG: 差交錯狀崔巍其不安吁可畏而欲落龍伸蠖屈蜿蜒逶迤連翩鳳飛虎轉相隨或繡文錦章依㣲要妙綿邈凌虛輕翔浮漂陶潜歸去来辭曰雲無心而出岫鳥倦飛而知還霄釋名曰霄青天也無雲氣而青碧者也}
  - {type: page-break, offset: 115, content: '', id: KR3k0012_WYG_008-15a, image: WYG0893/WYG0893-0099c.png}
