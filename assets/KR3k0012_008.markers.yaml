  - {type: variant, offset: 2, length: 0, content: '', WYG: 八雲霄漢霞雲釋名曰雲猶云云衆盛意也說文曰雲大澤之潤氣也又雲山川氣也從雨云象回轉形也霠於金反雲覆日也霃音沉渰於檢反雲久隂也凄雨雲起也雨雲貌也詩云有渰凄凄興雨祁祁易曰雲行雨施品物流行又雲從龍風從虎聖人作而萬物覩又召雲者龍又雲上于天需又坎為雲又宻雲不雨自我西郊宻静也雲靜止不渝紂恩澤不加于民也不雨之灾自其君也西郊亦謂文王也詩曰薈兮蔚兮南山朝隮注曰薈蔚雲興貌南山曹南山隮升雲也又上天同雲雨雪雰雰又英英白雲露彼菅茅英英白雲貌露亦有雲言天地之氣無㣲不著無不覆飬也禮曰天降時雨山川出雲又山林川谷丘陵能出雲為風雨周禮曰保章氏以五色雲物辨吉凶之祲祥鄭氏註曰占視日旁雲氣青為蟲白為䘮赤為兵荒黒為水黃為豐傳曰凡分至啓閉必書雲物為備故也分謂春秋分至謂冬夏至啟立春夏也陽氣用事為啓閉立秋冬也隂氣用事為閉雲五雲也風氣日月星辰也分至啓閉天地之大節隂陽之分也故遂登觀臺望氣以審妖祥變亂之氣先見於八節書其雲物之形言其所致務為之備也又魯哀公五年有雲如衆赤鳥夾日以飛三日楚使問周太史太史曰其當王身乎日為君妖氣守之雲在楚境上禍不及他國也禜之可移于令尹司馬也王曰除心腹之疾而置諸股肱何益終不禜孔子曰楚昭王知天道矣不失國宜哉又黄帝氏以雲紀官故為雲師而雲名有景雲之瑞公羊傳曰觸石而出膚寸而合不崇朝而徧雨乎天下者惟泰山雲爾語曰不義而富且貴於我如浮雲易通卦驗曰冬至陽雲出箕如樹木之状小寒合凍蒼陽雲出氐大寒降雪黒陽雲出心立春青陽雲出房如積水雨水黄陽雲出亢驚蟄赤陽雲出翼春分正陽雲出軫如積白鵠清明白陽雲出奎榖雨大陽雲出張如車蓋立夏初陽雲出觜赤如硃小滿上陽雲出}
