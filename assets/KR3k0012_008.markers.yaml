  - {type: variant, offset: 39, length: 3, content: 為靈星, krp: 上有雲覆童童如車蓋晉書曰樂廣有風姿衛瓘曰此人若披雲霧而覩青天又曰阮咸性曠逹不拘顔延年五君詠曰仲容青雲器又曰咸和元年雲鬪聲如暴風雨宋書曰大明八年宣太后陵前後數有光及五色雲芳香四滿又五采雲在松上如車蓋又曰孝康建元二年二月乙未日上有雲如錦文光色潤澤又曰丗祖在江州起義建牙軍有紫雲二叚落于身上穆天子傳曰天子觴西王母於瑶池}
  - {type: variant, offset: 40, length: 2, content: 靈星, WYG: 謡曰白雲在天丘陵自出道路悠逺山川閒}
  - {type: variant, offset: 43, length: 0, content: '', SBCK: 上王母爲謡曰白雲在天丘陵自出道路悠逺山川間之赤内青謂之矞雲雲二色曰矞亦瑞雲也矞以律反雨雲曰油雲孟子曰油然作雲霈然下雨雪雲曰同雲詩云上天同雲雨雲雰雰同雲謂雲隂竟天同爲一色雲師曰屏翳吕氏春秋曰屏翳曰雨師雲將亦雲之師司馬彪注莊子云雲將雲之主師劉澄之􅀭州記曰婁縣有馬鞍山天將􅀨輙有雲起來映此山山出雲應之乃大􅀨枹朴子玉䇿記曰千歳之􅀛五色具焉浮於蓮葉之上或在藂蓍之下其上時有白雲風土記曰烏程縣音卞山望氣云有黃氣紫雲大呉故改葬焉王子年拾遺記曰崐崘山有九層從上來一層有雲氣五色從下望之皆有城闕之象又曰崑崙者西方曰須彌山九層其第七層有景雲出以映朝日又曰爛石色紅似肺燒之有香煙聞數百里煙氣昇天則成香雲香雲遍潤則成香􅀨捜}
  - {type: page-break, offset: 43, content: '', id: KR3k0012_SBCK_008-5a}
  - {type: page-break, offset: 43, content: '', id: KR3k0012_SBCK_008-6a}
  - {type: page-break, offset: 43, content: '', id: KR3k0012_SBCK_008-6b}
  - {type: variant, offset: 43, length: 0, content: '', WYG: 東方朔别傳曰凡占長吏下車當視天有黄雲來覆車五榖大熟青雲致兵白雲致盗烏雲多水赤雲多火長沙耆舊傳曰祝陽為洛陽令時大旱告誡引罪紫雲忽起漢武帝内傳曰帝登尋真之臺齊戒到七月七日夜忽見天西南如白雲起直來趣宫須臾聞雲中簫鼓之聲復半食頃西王母至乘紫雲之輦臨發雲氣勃鬰盡為香氣漢武帝故事曰上幸梁父祠地主其日山上有白雲又有呼萬嵗聲封禪之上肅然白雲為蓋東方朔十洲記曰天漢三年月氏音支國獻}
  - {type: page-break, offset: 43, content: '', id: KR3k0012_WYG_008-8a, image: WYG0893/WYG0893-0096a.png}
  - {type: variant, offset: 43, length: 0, content: '', krp: 上王母爲謡曰白雲在天丘陵自出道路悠逺山川間之赤内青謂之矞雲雲二色曰矞亦瑞雲也矞以律反雨雲曰油雲孟子曰油然作雲霈然下雨雪雲曰同雲詩云上天同雲雨雲雰雰同雲謂雲隂竟天同爲一色雲師曰屏翳吕氏春秋曰屏翳曰雨師雲將亦雲之師司馬彪注莊子云雲將雲之主師劉澄之揚州記曰婁縣有馬鞍山天將雨輙有雲起來映此山山出雲應之乃大雨枹朴子玉䇿記曰千歳之龜五色具焉浮於蓮葉之上或在藂蓍之下其上時有白雲風土記曰烏程縣音卞山望氣云有黃氣紫雲大呉故改葬焉王子年拾遺記曰崐崘山有九層從上來一層有雲氣五色從下望之皆有城闕之象又曰崑崙者西方曰須彌山九層其第七層有景雲出以映朝日又曰爛石色紅似肺燒之有香煙聞數百里煙氣昇天則成香雲香雲遍潤則成香雨捜}
  - {type: punctuation, offset: 44, content: ，, id: KR3k0012_CHANT_008-bkkpn15}
  - {type: 'tls:seg', offset: 44, content: '', id: KR3k0012_CHANT_008-1a.11}
  - {type: variant, offset: 44, length: 2, content: 主得, SBCK: 記曰薊子訓至洛見公卿數十處去後皆白雲起王韶之始興記曰堯山長嶺望之如雲張野廬山記曰有白雲冠帶峯巖呼爲山帶洞􅁳記曰吉雲之國俗常以雲占吉凶有吉事則滿室五色照人着草木皆成五色露莊子曰廣成子謂黃帝白汝治天下雲氣不待族而雨草木不待黃而落奚足語至道又曰華封人謂堯曰夫聖人鶉居而鷇飲鳥行而無章章􅄒天下有道與物皆昌千歳厭丗去而上仙乗彼白雲至於帝郷抱朴子曰俗有見逰雲西馳而謂月之東行孟子曰油然作雲霈然下雨又曰湯一征自􅁑始天下從之人望之􅀂大旱之望雲霓淮南子曰周雲之巃力孔反嵸七孔反尞力交反摷}
  - {type: page-break, offset: 44, content: '', id: KR3k0012_SBCK_008-7a}
  - {type: variant, offset: 44, length: 0, content: '', WYG: 香使者曰國有常占東風入律百旬不休青雲干吕連月不散意中國將有好道君故捜竒藴而貢神香也西京雜記曰瑞雲曰慶雲曰景雲雲五色曰慶或曰卿雲雲外赤内青謂之矞雲雲三色曰矞亦瑞雲也矞以律反雨雲曰油雲孟子曰油然作雲沛然下雨雪雲曰同雲詩曰上天同雲雨雪雰雰同雲謂雲隂竟天同為一色雲師曰屏翳吕氏春秋曰屏翳曰雨師雲將亦雲之師司馬彪注荘子將雲之}
  - {type: page-break, offset: 44, content: '', id: KR3k0012_WYG_008-8b, image: WYG0893/WYG0893-0096b.png}
  - {type: variant, offset: 44, length: 2, content: 主得, krp: 記曰薊子訓至洛見公卿數十處去後皆白雲起王韶之始興記曰堯山長嶺望之如雲張野廬山記曰有白雲冠帶峯巖呼爲山帶洞冥記曰吉雲之國俗常以雲占吉凶有吉事則滿室五色照人着草木皆成五色露莊子曰廣成子謂黃帝白汝治天下雲氣不待族而雨草木不待黃而落奚足語至道又曰華封人謂堯曰夫聖人鶉居而鷇飲鳥行而無章章𫐠天下有道與物皆昌千歳厭丗去而上仙乗彼白雲至於帝郷抱朴子曰俗有見逰雲西馳而謂月之東行孟子曰油然作雲霈然下雨又曰湯一征自葛始天下從之人望之若大旱之望雲霓淮南子曰周雲之巃力孔反嵸七孔反尞力交反摷}
  - {type: variant, offset: 45, length: 1, content: 得, WYG: 師劉澄之揚州記曰婁縣有馬鞍山天將雨輙有雲来映此山山出雲應之乃大雨抱朴子玉策記曰千嵗之龜五色具焉浮于蓮葉之上或在藂蓍之下其上時有雲風}
