  - {type: variant, offset: 47, length: 0, content: '', SBCK: 交反彭歩光反薄而爲􅀨周雲宻也尞摷彭薄藴積之貌又曰伯益作井而龍登􅀇雲龍在黄泉下恐害及故去又曰山雲蒸柱礎潤又曰八極之雲是雨天下吕氏春秋曰山雲草莾水雲魚鱗旱雲煙火雨雲水氣無不比􅀋其所生以示人又曰至亂之化君相賊其雲狀有􅀂犬馬若白鵠車者遁甲開山圖曰遼東有襄平山多饒􅀑目之菜生而有神虎龍虵大魚守之雲氣覆之食之令人不飢榮氏注曰􅀑目菜形似魚守芝草常有氣如龍虎虵魚之狀}
  - {type: page-break, offset: 47, content: '', id: KR3k0012_SBCK_008-7b}
  - {type: variant, offset: 47, length: 0, content: '', WYG: 記曰烏程縣􅀈音卞山望氣云有黄氣紫雲人無敢卜𦵏焉王子年拾遺記曰崑崙山有九層其上每一層有雲氣五色從下望之皆有城闕之象又崑崙之西方曰須彌山九層其第七層有景雲出以映朝日又爛石色紅似肺燒之有香烟聞數百里烟氣升天則成香雲香雲遍潤則成香雨捜神記曰薊子訓至洛見公卿數十處去後皆白雲起王韶之始興記曰堯山長嶺望之如雲張野廬山記曰有白雲冠帶峯嵓呼為上帶洞㝠記曰吉雲之國俗常以雲占吉凶有吉事則滿室五色照人著草木皆成五色露莊子曰廣成子謂黄帝曰汝治天下雲氣不待族而雨草木不待黄而落奚足云至道又華封人謂堯曰夫聖人鶉居而鷇飲鳥行而無章迹也天下有道與物皆昌千嵗厭世去而上仙乘彼白雲至于帝鄉抱朴子曰俗有見逰雲西馳而謂月之東行孟子曰油然作雲沛然下雨又湯一征自葛始天下信之人望之若大早之望雲霓淮南子曰周室之雲巃力孔反嵸七孔反尞力交反摷士交反彭歩光反薄而為雨周室宻也尞摷彭薄藴積之貌又伯益作井而龍登𤣥雲龍在黄泉下恐害及故云又山雲蒸柱潤礎又八極之雲是雨天下吕氏春秋曰山雲草莽水雲魚鱗旱雲烟火雨雲水氣無不比類其所生以示人又至亂之世君臣相賊其雲有若犬馬若白鵠遁甲開山圖曰遼東有襄平山多饒鬼目之菜生而有神虎龍蛇大魚守之雲氣覆之食之令人不飢滎氏注曰鬼目菜形似魚守之常有氣如龍虎蛇魚之状}
