  - {type: variant, offset: 141, length: 5, content: 形如車蓋眾, SBCK: 漢中白水素女潜爲其炊以備飲食端後怪而潜􅀱之得見言曰天哀忍􅀌貧恭順使我相爲守舎今旣見便去留不可􅀶物志曰舊􅀃天河與海通近丗有居海者年年八月有人浮查來甚大徃反不失期此人乃多賫粮乗查去忽忽不覺晝夜奄至一處有城郭居舎望室中多見織婦見一丈夫牽牛渚次飲之驚問此人何由至此此人即問爲何處荅曰君可詣蜀嚴君平此人還問君平君平曰某年某月有客}
  - {type: variant, offset: 141, length: 5, content: 形如車蓋眾, WYG: 漢中白水素女潜為其炊以備飲食端後怪而潜候之得見言曰天哀汝孤貧恭順使我相為守舍今既見便去留不可博物志曰舊説云天河與海通近世有居海者年年八月有浮槎去來不失期人有多齎糧乘槎而去芒芒忽忽不覺晝夜奄至一處有城郭屋舎甚嚴遥望多織婦見一丈夫牽牛渚次飲之牽牛人乃驚問曰何由至此此人具道來意即問為何處答曰君還至蜀訪嚴君平則知之乃與一石而歸後至蜀問嚴君平君平曰此織女支機石也某年月日有客}
