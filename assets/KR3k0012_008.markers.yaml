  - {type: variant, offset: 893, length: 0, content: '', SBCK: 氣發而升精華上浮宛轉隨流名之曰天河一曰雲漢衆星岀焉集林曰昔有一人㝷河源見婦人浣紗以問之曰此天河也乃與一石而歸問嚴君平云此織女支機石也古詩曰河漢清且淺相去詎㡬許盈盈一水間脉脉不得語傳􅀇擬天問曰七月七日牽牛織女時㑹天河唐宋之間明河篇曰明河可望不可親願得乗槎一問津更將織女支機石還訪成都賣卜人霞漢武内傳曰上元夫人謂西王母曰阿瓊有六甲之術用之可以遊景雲之宫登流霞之堂十洲記曰崑崙山之上有瓊華之室紫翆丹房景雲燭日朱霞九光王子年拾遺曰燕昭王二年海人乗霞舟獻龍膏}
