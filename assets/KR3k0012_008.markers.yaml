  - {type: variant, offset: 21, length: 0, content: '', WYG: 舜之將興黄雲升于上又湯將興白雲入房白雲金精入湯房也孝經援神契曰王者徳至山陵則景雲見史曰天子孝則景雲見史記曰若烟非烟若雲非雲郁郁紛紛蕭索輪囷是謂卿雲卿雲喜氣也又髙祖過沛擊筑自為歌曰大風起兮雲飛揚威加海内兮歸故鄉安得猛士兮守四方又范増云髙祖之上有雲為龍虎之形此天子氣也又黃帝與蚩尤戰于涿鹿之野常有五色雲金枝玉葉止于帝上有花葩之象因作華蓋漢書郊祀志曰武帝封}
