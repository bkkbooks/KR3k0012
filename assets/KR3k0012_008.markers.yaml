  - {type: variant, offset: 1293, length: 3, content: 大星如, SBCK: 崙崑山有五色水赤水之氣上蒸爲霞而赫然論衡曰河東蒲坂項曼都好道學仙去三年而反家問其􅃺都曰欲飲食仙人輒飲我以流霞毎飲一柸數日不飢楊雄甘泉賦曰吸青雲之流霞兮飲􅀂木之露英王延壽魯靈光殿賦曰霞駮雲蔚􅀂隂若陽魏文帝辭曰丹霞蔽日彩}
