  - {type: variant, offset: 120, length: 0, content: '', SBCK: 韓雲如布趙雲如牛楚雲如日宋雲如車魯雲如馬衛雲如犬周雲如輪秦雲如羙人魏雲如䑕齊雲如絳衣越雲如龍頭蜀雲如囷言當處雲似之又曰雲如雄雉或如雄雞臨城其城必降魏武兵書節要曰孫子稱司雲氣非雲非煙非霧形似禽獸客吉主人忌韋頻秦書曰符堅時有黃雲五色時以爲瑞賜民酺五日黃子發相雨書曰}
  - {type: page-break, offset: 120, content: '', id: KR3k0012_SBCK_008-8a}
  - {type: variant, offset: 120, length: 0, content: '', WYG: 近天氣也關令尹喜内傳曰當喜在胎之始其母夢綘霄流繞其旁有長人謂曰汝咽之既覺口盈味既生雙光若日飛流滿堂良久不知所在抱朴子曰凌厲九霄淮南子曰隂陽為騶乘雲霄與造化俱廣雅曰赤霄常霄氣與造化俱雜字詁訓曰霄摩天赤氣也楚辭曰若王喬之乗雲載赤雲而凌青霄揚雄甘泉賦曰騰青霄而軼浮景孫楚鶴賦曰假使此鳥生自崑崙長于丹穴遨逰𤣥圃縹霄之際左思蜀都賦曰干青霄而秀出舒丹氣而為霞郭璞逰仙詩曰尋仙萬餘日今乃見子喬振髪載翠霞觧褐披絳霄漢詩曰倬彼雲漢昭回于天倬明也又倬彼雲漢為章于天傳曰昭公}
  - {type: page-break, offset: 120, content: '', id: KR3k0012_WYG_008-15b, image: WYG0893/WYG0893-0099d.png}
  - {type: page-break, offset: 120, content: '', id: KR3k0012_WYG_008-16a, image: WYG0893/WYG0893-0100a.png}
  - {type: variant, offset: 120, length: 0, content: '', krp: 韓雲如布趙雲如牛楚雲如日宋雲如車魯雲如馬衛雲如犬周雲如輪秦雲如羙人魏雲如䑕齊雲如絳衣越雲如龍頭蜀雲如囷言當處雲似之又曰雲如雄雉或如雄雞臨城其城必降魏武兵書節要曰孫子稱司雲氣非雲非煙非霧形似禽獸客吉主人忌韋頻秦書曰符堅時有黃雲五色時以爲瑞賜民酺五日黃子發相雨書曰}
  - {type: variant, offset: 121, length: 1, content: 箒, SBCK: 方有濯魚雲疾者立雨濯魚雲遟者雨少難至江漢雲疾者即日雨洛書曰蒼帝起青雲扶日赤帝起赤雲扶日黃帝起黄雲扶日白帝起白雲扶日軍國占􅃸曰􅀂王子曰有黒雲似一疋布者其國兵起天文要集曰河有黒雲􅃺似􅂳􅀂一疋布維河不出十日大雨又曰北斗者不欲雲覆之有黒雲覆之天大雨地圖曰望石氣如浮雲其珠玉之精也京房風角要訣曰􅃸雨法有黒雲如一疋帛日中即一日大雨二疋爲二日雨三疋爲三日雨黃帝岐伯經曰岐伯乗絳雲之車駕十二白鹿遊於蓬萊之上徐幹中論曰文王遇姜公於渭陽灼然如披雲見白日孫氏瑞應圖曰景雲者太平之應也一曰非氣非煙五色氛氲謂之慶雲瑞應圖曰矞雲瑞雲也有狀外赤内黃歸藏曰有白雲自蒼梧入大梁論衡曰龍無雲雨不能叅天吳範占􅀱風氣祕訣曰有青雲如雉兎臨城營軍敗走山海經曰符陽之山怪雲所岀陸賈新語曰邪臣之蔽賢猶浮雲之障日月也宋玉髙唐賦叙曰楚襄王與宋玉遊雲夢之臺髙唐之觀上有雲氣須􅁷之間變化無窮問曰此何氣也玉曰朝雲也昔者先王甞遊髙唐殆而晝寢夢見婦人曰妾巫山之女也爲髙唐之客聞君遊髙唐願薦枕席王因幸之去而辭曰妾在巫山之陽髙丘之岨旦爲朝雲暮爲行雨朝朝暮暮陽臺之下旦朝視之如言故爲立廟號曰朝雲孫卿雲賦曰圎者中䂓方者中矩又曰託地而㳺宇反風而下雨楚詞曰青雲衣兮白電裳又曰冠青雲之崔巍漢武帝秋風辭曰秋風起兮白雲飛司馬相如封禪頌曰自我天覆雲之油油雲行皃魏文帝詩曰西北有浮雲亭亭似車蓋應瑒詩曰清朝浮四海日暮歸故山張孟陽詩曰流波戀舊浦行雲思故山傳􅀇詩曰浮雲含愁氣悲風坐自嘆又􅀇歌詩曰青雲徘徊謂我愁又曰雲爲車兮風爲馬玉在山兮蘭在野雲無期兮風有止思心多端誰能理陸機雲賦曰望九畿以逺肆明皇極而永舒蔽陽光於晹谷闇天文於帝居齊濛荒於無極等渾昧於太初又浮雲賦曰􅀂層臺髙觀重樓疊閣或如種首之鬰律乍似塞門之寥廓􅀂靈園之列樹攅寳耀之炳粲金柯分玉葉散龍逸蛟起熊厲虎戰鸞翔鳯翥鴻鶴驚奮成公綏雲賦曰舒則弥綸覆四海卷則消液入無形狎獵鱗次叅差交錯􅃺崔巍其不安吁可畏而欲落龍伸蠖屈蜿蟬逶迤連翩鳯飛虎轉相隨或繡文錦章衣微要妙綿邈凌虚輕翔縹緲陶潜歸去來曰雲無心而出岫鳥倦飛而知還霄􅀜令尹喜内傳曰當喜在胎之始其母夢絳霄流繞其身有長人謂曰汝咽之旣覺口􅄹味屋生􅀟光􅀂日飛流滿堂良乆不知所在枹朴子曰凌厲九霄淮南子曰隂陽爲騶乗雲凌霄與造化俱廣雅曰赤霄常霄氣與造化俱許愼注曰霄其霧雜字詁訓曰霄摩天赤氣也楚辭曰􅀂王喬之乗雲載赤雲而陵青霄楊雄甘泉賦曰騰青霄而軼浮景孫楚鶴賦曰假使此鳥生島崑崙長於丹穴遊遨􅀇圃縹霄之際左思蜀都賦曰干青霄而透出舒丹氣而爲霞郭璞遊仙詩曰㝷仙萬餘日今乃見子喬振髮戴翠霞解􅄄披絳霄漢詩曰倬彼雲漢昭回于天倬明也又曰倬彼雲漢爲章于天傳曰昭公四年}
