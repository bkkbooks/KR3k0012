  - {type: variant, offset: 6, length: 0, content: '', WYG: 白雲起迴風揺漾又周成王舉堯舜禮沉璧于河白雲起而青雲浮至乃有蒼龍負圖臨河也尚書大傳曰舜為賔客禹為主人百工相和而歌卿雲于時八風循道卿雲藂藂注言和氣應也藂或為簇又五岳皆觸石出雲膚寸而合不崇朝而雨又舜時卿雲見于時百工和歌舜歌曰卿雲爛兮糺縵縵兮或以為雲出岫迴薄而難名状也禮統曰雲者運氣布恩普博也禮斗威儀曰人君乗水而王其政和平則景雲見也又景明也言雲氣光明也又周成王治平觀于河青雲浮于河也春秋文耀鈎曰楚有蒼雲如霓圍軫七蟠中有荷斧之人向軫而蹲于是楚唐史畫遺灰而雲滅故曰唐史之策上滅蒼雲宋均注曰軫楚分也雲水氣灰火氣畫遺灰故雲滅春秋元命苞曰隂陽聚為雲春秋説題辭曰雲之為言運也觸石而起謂之雲含陽而起以精運也春秋合誠}
