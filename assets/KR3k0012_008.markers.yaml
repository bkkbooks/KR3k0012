  - {type: variant, offset: 2588, length: 667, content: 年太白犯上相歷執法占者言今之三相皆不利始輕末重月餘李絳以足疾免明年十月李吉甫以暴疾卒九年六月武元衡為盜所害又曰李晟初屯渭橋時熒惑守歲久之方退賓介或勸曰今熒惑已退皇家之利也可速用兵晟曰天子外次人臣但當死節垂象玄遠吾安知天道耶至是謂參佐曰前者士大夫勸晟出兵非敢拒也且軍可用之不可使知之常聞五緯盈縮無準晟懼復來守歲則我軍不戰而自潰矣參佐歎服皆曰非所及也又曰傅弈相州鄴人也尤曉天文曆數隋開皇中以儀曹事漢王諒舉兵謂奕曰今茲熒惑入井是何祥也弈對曰天上黃道經其中正是熒惑行路所涉不為怪異若熒惑入地上井是為災也郭子橫洞冥記曰武帝嘗見彗星東方朔折指星之木以授帝帝以指彗彗遂沒星出之夜野獸皆鳴或說為獸鳴星呂氏春秋曰宋景公時熒惑在心公召子韋問焉子韋曰禍當君可移於相公曰相所與理國家也曰可移於百姓曰百姓死寡人將誰為君曰可移於歲公曰歲饑人餓必死焉為人君而殺其人誰以我為君乎子韋曰君有至德之言三天必三賞君熒惑必徙三舍後果三徙晏子春秋曰景公時熒惑守虛朞年去晏子曰虛齊之分野當強為善公乃去冤聚之獄振孤敬老行之三日而熒惑遷尉繚子曰昔楚將軍子正與齊戰未合初夜彗星出柄在齊所在勝不可擊子正曰彗何知明日與齊戰大破之天文錄曰積尸大陵之尸也石氏曰積尸明有大喪死人如立丘山也又曰孛星者彗星之屬也偏指曰彗芸氣四出曰孛孛謂孛孛然也又曰五星反羽其下之國不可久處反羽者光芸上大下小狀如反羽也又曰昴者天之耳也主西方故爾雅曰西陸昴也星讚曰昴主獄事典治囚也又胡星也一曰旄頭旄頭者天執罕畢前驅者之所罰也河圖稽耀鉤曰辰為枉矢流射所誅又曰熒惑散為蚩尤旗主惑亂又曰太白散為天狗主兵又曰歲星流為國皇主內難, SBCK: ''}
