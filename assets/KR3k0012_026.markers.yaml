  - {type: variant, offset: 2397, length: 3, content: 瑤光星, SBCK: 天統十一月建子天始施之端}
  - {type: variant, offset: 2397, length: 180, content: 瑤光星也散為鷹立秋之日鷹鸇擊三禮義宗曰七月立秋秋之言揫音湫聚也縮之意陰氣出地始殺万物故以秋為節名五經要義曰磬立秋之樂也白虎通曰磬者夷則之氣象万物之成月令占候圖曰立秋坤卦用事其神攝提二宮荊州分也晡時申西南涼風至黃雲如群羊宜粟穀若晴朗風雲不至万物不成望西南坤上有黃雲氣是正氣立秋應節万物皆榮豆穀熟赤氣出其右万物半死豆穀半收地動人民不安坤氣萬物不成地頻動牛馬多病應在, WYG: 天統}
