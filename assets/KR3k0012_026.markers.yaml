  - {type: variant, offset: 2668, length: 15, content: 孫寶為京兆尹請侯文為椽進見如賓, SBCK: 嚴延年字次卿爲河内太守冬月傳属縣囚㑹府下流血數里河南號爲屠伯又曰宋均爲九江守五日一聽事冬以日中夏以平旦後漢律暦志曰日行北陸謂之冬又曰季冬之月星廻歳終隂陽以交勞農大臘先臘一日大儺謂之逐疫漢舊儀曰顓頊有三子而去爲疫􅀑一居江水是爲一居苦水爲罔虺蜮一居人宫室區隅善驚小兒月令章句曰日行北方之􅀫北方大隂恐爲所抑故命有司大儺所以扶陽抑隂也盧植注}
  - {type: variant, offset: 2668, length: 2, content: 孫寶, WYG: 嚴延年字次卿爲河南太守冬月傳屬縣囚㑹府下流血數里河南號為屠伯又曰宋均為九江守五日一聽事冬以日中夏以平旦後漢律厯志曰日行北陸謂之冬又曰季冬之月星回歲終隂陽以交勞農大享臘先臘一日儺謂之逐疫漢舊儀曰顓頊氏有三子生而亡去為疫鬼一居江水是為虎一居若水是為㒺兩蜮鬼一居人宫室區隅漚庾善驚人小兒月令章句曰日行北方之宿北方太隂恐為所抑故命有司大儺所以扶陽抑隂也盧植禮記注曰所以逐衰而迎新又曰是月也立土牛六頭於國都郡縣城外丑地送大寒月令章句曰是月之昏建丑丑為牛寒將極故出其物類形象以示送達之且以示升陽也後漢書曰鍾離意辟大司徒侯霸掾詔令部送徒詣河内時冬寒徒病不能行路過𢎞農輙移屬縣使作徒衣縣不得已與之上書白狀意亦具以聞光武得奏以示霸曰君所使掾何乃仁於用心誠良吏也又曰汝南舊俗十月饗㑹百里内縣皆賫牛酒到府讌飲又曰叚熲對桓帝討先零東羗術畧曰三冬兩夏足以成之又曰黄香舉孝亷為郡五官貧無奴僕香身執勞苦冬無袴而親調滋味魏畧曰顔裴字文林}
