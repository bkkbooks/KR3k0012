  - {type: variant, offset: 2678, length: 2, content: 椽進, WYG: 冬寒氷炙筆硯風化大行又曰賈逵世為著姓少孤家貧冬常無袴又曰吉茂字叔暢從少至長冬則披裘夏則短褐臣役妻子室如懸磬又曰邴原就師學一冬講孝經論語自在齠齔有異及長金玉其行又曰董遇好學人從學遇不好教曰當先讀書百遍其義自}
