  - {type: 'tls:seg', offset: 318, content: '', id: KR3k0012_CHANT_026-6a.10}
  - {type: variant, offset: 318, length: 1, content: 歲, SBCK: 律應應鍾者姑洗之所生三分去一管長四寸七分其味鹹其􅆨杇凢􅆨味鹹杇者皆屬於水其祀行􅀕}
  - {type: variant, offset: 318, length: 0, content: '', WYG: 宜周官建寅之月懸法於象魏以示人四時之令皆以此為準故以建丑之月與公卿先飭之命有司大儺旁磔以送寒氣大儺爲歳終逐除隂疫以送寒氣故周官命方相氏率百𨽻索室驅疫以逐之旁磔磔犬於門春磔九門冬禮大故徧磔於十二門明扶陽抑隂之義犬屬金冬金盡春興春為木故殺金以助木氣也又曰季冬之月命告民出五種命農計耦耕修耒耜具田噐又曰是月也日窮於次月窮於紀星回于天數將㡬終}
  - {type: page-break, offset: 318, content: '', id: KR3k0012_WYG_026-4b, image: WYG0893/WYG0893-0228b.png}
  - {type: variant, offset: 318, length: 1, content: 歲, krp: 律應應鍾者姑洗之所生三分去一管長四寸七分其味鹹其臭杇凢臭味鹹杇者皆屬於水其祀行祭}
  - {type: variant, offset: 319, length: 0, content: '', WYG: 且更始專其農人無有所使又曰孟冬之月天子乃祈來年于天宗注云天宗日月星辰也又曰孟冬命有司循行積聚無有不歛坯城郭戒門閭又曰夫爲人子之禮冬温夏凊又曰冬之爲言中也中者藏也又曰國子春夏教詩書秋冬學羽籥又曰儒有居處齊莊坐起恭敬言必誠信行必篤敬道途不爭險易之利冬夏不爭隂陽之和又曰昔者}
  - {type: page-break, offset: 319, content: '', id: KR3k0012_WYG_026-5a, image: WYG0893/WYG0893-0228c.png}
  - {type: variant, offset: 320, length: 2, content: 春而, SBCK: 腎冬隂氣盛寒於外祀之於行從辟除之􅀋行謂道也􅀕先腎者隂謂在下腎亦在下凢祀行俎先進腎立冬之月水始冰}
  - {type: variant, offset: 320, length: 0, content: '', WYG: 王之未有宮室冬則居營窟夏則居橧巢大戴禮曰季冬聽獄論刑者所以正法又曰方冬三月草木落庶虞藏五糓必入于倉於時有事燕于皇祖考息國老六人以成冬事又曰司空司冬以制度制地事准撥山林規表行次畜水行表灌浸以節四時之事理地逺近以任民力以節民食又曰古者天子常以季冬考德以觀治亂德盛者治也德不盛者亂也德盛者得之也德不盛者失之也周禮曰小司寇孟冬祀司民獻民數於王王拜受之以圖國用而進退之司民星謂軒轅角也又曰凌人掌氷正歲十有二月令斬氷三其凌正歲季冬火星中大寒寒氷方盛之時}
  - {type: page-break, offset: 320, content: '', id: KR3k0012_WYG_026-5b, image: WYG0893/WYG0893-0228d.png}
  - {type: page-break, offset: 320, content: '', id: KR3k0012_WYG_026-6a, image: WYG0893/WYG0893-0229a.png}
  - {type: variant, offset: 320, length: 2, content: 春而, krp: 腎冬隂氣盛寒於外祀之於行從辟除之類行謂道也祭先腎者隂謂在下腎亦在下凢祀行俎先進腎立冬之月水始冰}
  - {type: variant, offset: 321, length: 0, content: '', WYG: 秋傳曰火星中}
  - {type: variant, offset: 322, length: 3, content: 後秋宮, WYG: 寒暑退凌氷室也三者}
  - {type: variant, offset: 323, length: 2, content: 秋宮, SBCK: 五日地始凍後五日野雞入大水爲蜃食􅁰與鴈冬味}
  - {type: variant, offset: 323, length: 2, content: 秋宮, krp: 五日地始凍後五日野雞入大水爲蜃食黍與鴈冬味}
