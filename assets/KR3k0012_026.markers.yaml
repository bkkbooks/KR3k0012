  - {type: variant, offset: 312, length: 1, content: 垂, SBCK: 其氣上騰與地絶也故月令曰天氣上騰地氣下降又曰冬終也物終成也􅀃文曰冬終也盡也字從􅂛古終字從仌古冰字書曰申命和叔宅朔方曰幽都平在朔易北稱朔亦稱方則三方見矣北稱幽則􅀯方稱明從可知也都謂所聚也易謂歳耿易於此也平均在察其政以從天常上揔言羲和敬順昊天此分别仲叔各有所掌也日短星􅄧以正仲冬日短冬至之日也昇白虎中星以七星並見正冬之三節厥民奥鳥獸氄毛奥室也民改歳入此室處以避風寒鳥獸皆生毛細毛以自温之又曰冬祁寒小民亦惟曰怨咨詩曰我有㫖蓄亦以禦冬又曰豊年之冬必有積雪又曰十月納禾稼􅁰稷穜稑上音童下音陸禾麻菽麥又曰二之日鑿冰沖沖冰盛水腹堅命取冰於山林中冲冲鑿冰之音二之日夏之十二月也又曰冬日烈烈飄風發發箋云烈烈猶栗烈也發發疾貌言王爲酷虐慘毒之政如冬之日烈烈矣又曰坎其擊鼓宛丘之下無冬無夏值其鷺羽值時也鷺鳥之羽可以爲翳箋云翳舞者所持以指麾坎其擊􅇲宛丘之道無冬無夏值其鷺翿翿亦翳也禮月令曰十月之節日在房立冬爲十月節昬虚中曉張中斗建亥位之􅀄其日壬癸壬癸属水主冬其帝顓頊其神􅀇􅁳昔顓頊氏以水德繼天而王故爲冬帝水正日􅀇􅁳故􅀇􅁳爲水神佐顓頊於冬其蟲介北方􅀇武介蟲之長九有甲之􅀋皆属於水故曰其蟲介介甲也其音羽三分啇去一以生羽羽數四十八属水以爲最清物之}
  - {type: page-break, offset: 312, content: '', id: KR3k0012_SBCK_026-1b}
  - {type: variant, offset: 312, length: 1, content: 垂, WYG: 其氣上騰與地絶也故月令曰天氣上騰地氣下降說文曰冬四時盡也字從夊古終字從仌古氷字書曰申命和叔宅朔方曰幽都平在朔易日短星昴以正仲冬厥民隩鳥獸氄毛又曰冬祁寒小民亦惟曰怨咨詩曰我有㫖蓄亦以禦冬又曰豐年之冬必有積雪又曰十月納禾稼黍稷穜稑上音童下音陸禾麻菽麥又曰二之日鑿氷沖沖又曰冬日烈烈飄風發發又曰坎其擊皷宛丘之下無冬無夏植其鷺羽坎其擊缶宛丘之道無冬無夏植其鷺翿禮月令曰十月之節日在房立冬爲十月節昏虛中曉張中斗建亥位之初其日壬癸壬癸屬水主冬其帝顓頊其神𤣥㝠昔顓頊氏以水繼天而王故爲冬帝水正曰𤣥㝠故𤣥㝠爲水神佐顓頊於冬其蟲介北方𤣥武介蟲之長凢有甲之類皆屬於水故曰其蟲介介甲也其音羽三分音去一以生羽數四十八屬水以爲最清物之}
