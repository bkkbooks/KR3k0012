  - {type: variant, offset: 425, length: 284, content: 八月後草木死者亦有玉梁元帝纂要曰秋曰白藏氣白而收藏万物亦曰收成万物成而收歛亦曰三秋九秋素秋素啇高啇天曰旻天旻愍也愍万物之彫零風曰啇風素風凄風高風涼風激風悲風景曰朗景澄景清景時曰凄辰霜辰霜辰可施九月節曰素節啇節草曰衰草木曰踈木衰林霜柯霜條七月孟秋亦曰初秋首秋上秋肇秋蘭秋八月仲秋亦曰仲啇九月季秋亦曰暮秋末暮啇季啇抄秋亦曰授衣此時婦功畢始授衣亦曰玄月盧公範饋餉儀曰凡八月旦上承露盤赤松子柏上露為囊以膏面皮古人用點炙枝以梨枝為之反銀盞中有朱砂銀枝子也盧公范者盧懷慎之家臨海異物志曰黃雀常以八月入海化為魚愽物志曰舊說天河與海通近世有人居海渚者年年至八月浮查來至甚大往返不失期其, WYG: 牧}
