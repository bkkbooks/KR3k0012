  - {type: 'tls:seg', offset: 314, content: '', id: KR3k0012_CHANT_026-6a.9}
  - {type: variant, offset: 314, length: 2, content: 聖人, SBCK: 也冬氣和}
  - {type: page-break, offset: 314, content: '', id: KR3k0012_SBCK_026-2a}
  - {type: variant, offset: 314, length: 1, content: 聖, WYG: 也冬炁和則羽聲調樂記曰羽亂則危其財匱也律中應鍾十月氣至則應鍾之律應應鍾者姑洗之所生三分去一管長四寸七分其味鹹其臭朽臭味鹹朽皆屬於水其祀行祭先腎冬隂氣充塞於外祀之於行從辟除之類行謂道也祭先腎者謂隂在下腎亦在下凡祀之爼先進腎立冬之月水始氷後五日地始凍後五日野雉入大水爲蜃食黍與鴈冬味之宜其器閎以奄太史以先立冬三日謁于天子曰某日立冬盛德在水天子乃迎冬北郊迎冬為祀黒帝叶光紀於北郊以顓頊配佐以𤣥㝠星三辰七宿從祀可以築城郭造宮室穿竇窖修囷倉謂改築城郭創造宮室修囷倉以備積貯天子始裘謂初衣寒衣又曰十月中氣日在尾小雪十月中氣昬危中曉翼中斗建亥位之中小雪之中虹藏不見後五日天氣上騰地氣下降後五日閉塞而成冬謹闗梁塞蹊徑蹊徑謂山澤禽獸道又曰十一月之節日在箕大雪為十一月之節昬營室中曉軫中斗建子位之初律中黄鍾十一月氣至則黄鍾之律應黄鍾者律之始也管長九寸其日其音其數並同孟冬大雪之日鶡旦不鳴後五日虎始交後五日荔挺出又曰十一月中氣日在南斗冬至為十一月中氣昬東壁中曉角中斗建子位之中冬至之日蚯蚓結後五日塵角觧後五日水泉動是月也祀昊天上帝於圜丘命有司祭馬步謂仲冬祭馬歩於大澤用剛日伐木取竹箭此時堅成可伐取又曰十二月之節日在南斗小寒為十二月之節昬奎中曉亢中斗建丑位之初律中大呂十二月氣至則大呂之律應大呂者蕤賔之生三分益一管長八寸四分其日其音其數並同孟冬小寒之日鴈北鄉後五日鵲始巢後五日野雉始雊天子乃命將帥講武習射角力講武角力校武士材力所以備畋獵之禮也天子乃厲飾執弓挾矢以獵厲飾謂衣戎服尚威武以獵修祭禽之禮謂所獵得禽獸以供蜡祭又曰十二月中氣日在婺女大寒爲十二月中氣昏婁中曉氐中斗建丑位之中大寒之日雞始乳後五日征鳥厲疾後五日水澤腹堅天子親往嘗魚時魚潔美氷方勝取而藏之春秋傳曰月在北陸而藏氷計耦耕修耒耜寒氣過農事將興出土牛以示農耕之早晚若立春在十二月望則䇿牛}
