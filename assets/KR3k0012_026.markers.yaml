  - {type: variant, offset: 1471, length: 888, content: 愁而不盡野有歸鷰隰有翔隼遊氣朝興槁葉夕殞於時乃屏輕篷釋纖絺藉莞蒻御夾衣庭樹槭所責切殞落貌以洒落勁風戾而吹帷蟬嘒嘒以寒吟鴈噰噰而南飛天晃朗而彌高日游腸而浸微何微陽之短晷覺涼夜之方永月朣朧以含光露凄清以凝冷熠燿熠燿螢也粲於階闥蟋蟀鳴于軒屏聽離鴻之晨吟望流火之餘景王期懷秋賦曰哀時來之慘悽悼秋氣之可悲古樂府歌詩曰秋風蕭蕭殺人出亦愁入亦愁胡地多飆風樹木何蕭蕭離家日趣遠衣帶日趣緩心思不能言膓中車輪轉魏應璩雜詩曰秋日苦促短遙夜邈綿綿貧士感此時慷慨不能眠晉陸機為顧彥先作詩曰肅肅素秋節湛湛濃露凝太陽夙夜降少陰忽已升又悼亡詩曰皦皦窗中月照我室南端清啇應秋至溽暑隨節闌懔懔涼氣升始覺夏衾單晉張載詩曰靈象運天機日月如激電秋風兼夜式微霜凄舊院嘉木殞蘭圃芳草悴芝菀嚶嚶南翔雁翩翩辭歸鷰玉肌隨爪素噓氣應口見歛襟思輕衣出入忘華扇覩物識時移顧己知節變晉孫綽詩曰蕭瑟仲秋月飂戾風雲高山居感時變遠詠興長謠踈林積涼氣虛岫結凝霄零露灑庭林密葉辭榮條撫茵悲先落攀松羨後凋宋劉鑠詩曰旻天清旦高秋氣發初涼白露下微津明月流素光凝煙泛城闕凄風入軒房朱華先零落綠草就芸黃纖羅還笥篋輕紈改衣裳宋江逌詩曰祝融解炎轡蓐收起涼駕長林悲素秋茂草思朱夏鳴鴈薄雲嶺蟋蟀吟深榭寒蟬向夕號驚飆激中夜感物增人懷悽然無忻暇宋謝惠連懷秋詩曰平生懷苦心矧復值秋晏皎皎天月明弈弈河宿爛蕭瑟含風蟬嘹唳度雲鴈寒啇動清閨孤燈曖幽幔又擣衣詩曰衡紀無淹度晷運倏如催白露滋園菊秋風落庭槐肅肅莎雞羽烈烈寒螿啼夕陰結空幕霄月皓中閨美人式常服端飭相招攜簪玉出北房鳴金步南階簷高砧響發楹長杵聲哀宋湯惠休白紵舞歌詩曰秋風嫋嫋入曲房羅帳含月思心傷蟋蟀夜鳴斷人腸長夜思君心飛揚它人相思君相忘錦衾瑤席為誰芳又古歌八變曰北風初秋至吹我章華臺浮云多暮色似從崦嵫來宋鮑昭荅湯惠休曰枯桑葉易零疲客心易驚今茲亦何早已聞絡緯鳴回風滅且起卷蓬息復征愴愴簟上寒凄凄帳裏清物色延暮思霜露逼朝榮百物方蕭瑟長嘆從此生又和王護軍秋夕詩曰散漫秋雲遠蕭蕭霜月寒驚風西北起孤鴈夜往還金氣方勁殺降陽微且殫泉涸甘井竭節役芳草殘何瑾悲秋夜曰欣莫欣兮春日悲莫悲兮秋夜立秋易說曰坤西南也主立秋京房易占曰立秋坤王主涼風用事, SBCK: 簡擇}
