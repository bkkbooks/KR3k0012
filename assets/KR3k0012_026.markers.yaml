  - {type: variant, offset: 2777, length: 0, content: '', krp: 供祭祀晉書曰王敦素憚周顗每見輒靣熱雖復冬月扇靣不得休又曰吴隠之冬月無𬒳常澣衣乃披絮勤苦同於貧庶隱之時爲牧守又曰公孫鳯字子鸞隠昌黎之九城冬夜草布寢處山林彈琴吟詠陶然自得又曰劉殷母王氏盛冬思堇而不言食不飽者一旬矣殷怪而問之母言其故殷時年九歳乃於澤中慟哭聲不絶者半日於是忽若有人云止聲殷收涙視地便有堇生焉因得斛餘而歸宋書曰朱百年與孔凱友善百年家室素貧母以冬月亡衣並無絮自此不衣綿帛甞寒時就凱宿衣悉裌布飲酒眠凱以卧具覆之百年不覺也旣覺引卧具去體謂凱曰綿定竒温因流涕悲慟凱亦爲之傷感也齊書曰沈瑀爲掦州從事湖熟縣方山埭髙峻冬月公私行旅以爲艱明帝使瑀循行乃開四港斷行客就作三日便辦又齊孝子王虚之庭中楊梅樹隆冬三實又每夜所居白光如燭墓左樹㮏一冬再實時人咸以爲孝感所致梁安城王蕭秀爲郢州刺史務行德義毎冬月常作袴𥜗以賜貧凍者又任昉素清貧卒後其子西華冬月著葛帔練裙道逢平原劉孝摽泫然矜之謂曰我當爲卿作計乃著廣絶交論以譏其舊交也吴越春秋曰越王念復吴怨非一旦也苦身勞心夜以接日卧則切之以蓼足漬之以水冬則抱冰韓詩外傳曰冬不浴非惡水清有餘也穆天子傳曰季冬甲戍天子東遊飲于留祁射于麗虎讀書于菞丘君舉必書也菞音犁獻酒于天子奏廣樂天子遺其靈鼓乃化爲黄虵周禮曰靈鼓四靣洪範所謂鼓妖嵇康髙士傳曰善卷古之賢人也舜以天下讓之善巷曰予}
  - {type: variant, offset: 2778, length: 10, content: 秋日貙膢時共劫更始前, SBCK: 宇宙之中冬則衣皮毛夏則衣絺􅁑何以天下爲哉汝南先賢傳曰周舉爲并州刺史太原一郡舊俗以介子推焚骨有龍忌之禁至其亡月咸言神靈不樂舉火由是土人每至冬中輙一月寒食莫敢煙㸑老少不堪歳多死者舉旣到乃作弔}
