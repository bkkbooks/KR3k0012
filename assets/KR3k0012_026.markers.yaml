  - {type: punctuation, offset: 13, content: 「, id: KR3k0012_CHANT_026-bkkpn4}
  - {type: variant, offset: 13, length: 296, content: 仲秋白露節盲風至秦人謂蓼風為盲風崔寔政論曰秋風厲而賞武臣顏氏家訓曰或問何故名治獄參軍為長流乎荅曰帝王代紀云帝少昊崩其神降于長流之山事出山海經於祀主秋按周禮秋官司寇主刑罰長流之職也漢魏捕賊椽耳晉宋已來始為參軍上屬司寇故取秋帝所居為嘉名焉夏小正曰八月丹鳥羞白鳥羞進也白鳥蚊蚋辰則伏辰房星鴽為鼠也九月內火漢舊儀曰八月飲酎車駕夕牲以繡衣之皇帝暮視牲以陰燧取水於月以陽燧取火於日為明水火左袒以水沃牛右肩手執鸞刀以切牛毛血薦之而即更衣李彫四部曰弔鳥山俗傳曰鳳死其上每至七月九日晦望群鳥常來集其上鳴呼也應劭風俗通曰周秦常以八月輶軒使采異俗方言藏之祕府劉歆鍾律書曰春宮秋律百卉必凋秋宮春律萬物必榮魏丁儀刑禮論, SBCK: 冬}
