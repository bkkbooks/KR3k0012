  - {type: variant, offset: 2763, length: 4, content: 申屠建等, SBCK: 鍾離意辟大司徒侯覇􅁺詔曰部送徒詣河内時冬寒徒病不能行路過引農輒移属縣使作徒衣縣不得巳}
  - {type: page-break, offset: 2763, content: '', id: KR3k0012_SBCK_026-7a}
  - {type: variant, offset: 2763, length: 4, content: 申屠建等, WYG: 王敦憚周顗每見輒面熱雖冬月扇面不休又曰吳隱之冬月無被常蓋衣披絮勤苦同於貧庶隠之時為牧守又曰公孫鳳字子鸞隠昌黎九成山冬夏草布寢處山林弹琴吟咏陶然自得又曰劉殷母王氏盛冬思堇而不言食不飽者一旬矣殷怪而問之母言其故殷時年九歲乃於澤中慟哭聲不絶者半日於是忽然有人云止聲殷収淚視地便有堇生焉因得斛餘而歸宋書曰朱百年}
  - {type: page-break, offset: 2763, content: '', id: KR3k0012_WYG_026-12b, image: WYG0893/WYG0893-0232b.png}
  - {type: variant, offset: 2763, length: 4, content: 申屠建等, krp: 鍾離意辟大司徒侯覇掾詔曰部送徒詣河内時冬寒徒病不能行路過引農輒移属縣使作徒衣縣不得巳}
  - {type: variant, offset: 2768, length: 0, content: '', SBCK: 之上書言狀意亦具以聞光武得奏以見覇曰君所使椽何乃仁於用心誠良吏也又曰汝南舊俗十月饗㑹百里内縣皆賫牛酒到府讌飲又曰叚熲對桓帝討先零東羗術略曰三冬兩夏足以破之又曰黄香父兄爲郡五官貧無奴僕香身執勤苦冬無袴而親極滋味魏略曰顔斐字文林爲京兆尹課民當輸租時車各因便致薪兩束爲冬寒冰炙筆硯風化大行又曰賈逵世爲著姓少􅀌貧冬常無袴又曰􅁻茂字叔暢從少至長冬則披裘夏則短􅄄臣役妻子室如懸磬又曰邴原就師學一冬講孝經論語自在齠齓有異及長金玉其行又曰董遇好學人從學遇不肯教曰當先讀書百遍義自見從者云苦難得暇日遇曰當以三餘冬歳之餘夜隂日之餘吴志曰左臺}
  - {type: page-break, offset: 2768, content: '', id: KR3k0012_SBCK_026-7b}
  - {type: variant, offset: 2768, length: 1, content: 御, WYG: 孔覬友善百年家室素貧母以冬月亡衣並無絮自此不衣綿帛嘗寒時就覬宿衣悉裌布飲酒眠覬以卧具覆之百年不覺也既覺引卧具去體謂覬曰綿定竒温因流涕悲痛覬亦為之傷感也齊書曰沈瑀為揚州從事湖屬縣方山埭髙峻冬月公私行旅以為難明帝使瑀循行乃開四港斷行客就作三日便辦又曰孝子王虛之庭中楊梅樹隆冬三實又毎夜所居白光如燭墓左柰樹一冬再實時人咸以為孝感所致梁書曰安成王秀為郢州刺}
  - {type: page-break, offset: 2768, content: '', id: KR3k0012_WYG_026-13a, image: WYG0893/WYG0893-0232c.png}
  - {type: variant, offset: 2768, length: 0, content: '', krp: 之上書言狀意亦具以聞光武得奏以見覇曰君所使椽何乃仁於用心誠良吏也又曰汝南舊俗十月饗㑹百里内縣皆賫牛酒到府讌飲又曰叚熲對桓帝討先零東羗術略曰三冬兩夏足以破之又曰黄香父兄爲郡五官貧無奴僕香身執勤苦冬無袴而親極滋味魏略曰顔斐字文林爲京兆尹課民當輸租時車各因便致薪兩束爲冬寒冰炙筆硯風化大行又曰賈逵世爲著姓少孤貧冬常無袴又曰吉茂字叔暢從少至長冬則披裘夏則短褐臣役妻子室如懸磬又曰邴原就師學一冬講孝經論語自在齠齓有異及長金玉其行又曰董遇好學人從學遇不肯教曰當先讀書百遍義自見從者云苦難得暇日遇曰當以三餘冬歳之餘夜隂日之餘吴志曰左臺}
  - {type: variant, offset: 2770, length: 6, content: 大夫隗囂合欲, SBCK: 孟宗有孝道母性􅄝筍及母亡冬節至宗入林哀泣而筍生得}
  - {type: variant, offset: 2770, length: 6, content: 大夫隗囂合欲, WYG: 務行德義每冬月常作袴襦}
  - {type: variant, offset: 2770, length: 6, content: 大夫隗囂合欲, krp: 孟宗有孝道母性嗜筍及母亡冬節至宗入林哀泣而筍生得}
  - {type: punctuation, offset: 2775, content: ，, id: KR3k0012_CHANT_026-bkkpn784}
  - {type: 'tls:seg', offset: 2775, content: '', id: KR3k0012_CHANT_026-39a.4}
  - {type: variant, offset: 2777, length: 0, content: '', SBCK: 供􅀕祀晉書曰王敦素憚周顗每見輒靣熱雖復冬月扇靣不得休又曰吴隠之冬月無􅀍常澣衣乃披絮勤苦同於貧庶隱之時爲牧守又曰公孫鳯字子鸞隠昌􅀺之九城冬夜草布寢處山林彈琴吟詠陶然自得又曰劉殷母王氏盛冬思堇而不言食不飽者一旬矣殷怪而問之母言其故殷時年九歳乃於澤中慟􅂘聲不絶者半日於是忽􅀂有人云止聲殷收涙視地便有堇生焉因得斛餘而歸宋書曰朱百年與孔凱友善百年家室素貧母以冬月亡衣並無絮自此不衣綿帛甞寒時就凱􅀫衣悉裌布飲酒眠凱以卧具覆之百年不􅁴也旣􅁴引卧具去體謂凱曰綿定竒温因流涕悲慟凱亦爲之傷感也齊書曰沈瑀爲掦州從事湖熟縣方山埭髙峻冬月公私行旅以爲艱明帝使瑀循行乃開四港斷行客就作三日便辦又齊孝子王虚之庭中楊梅樹隆冬三實又每夜所居白光如燭墓左樹㮏一冬再實時人咸以爲孝感所致梁安城王蕭秀爲郢州刺史務行德義毎冬月常作袴􅃭以賜貧凍者又任昉素清貧卒後其子西華冬月著􅁑帔練裙道逢平原劉孝摽􅊄然矜之謂曰我當爲卿作計乃著廣絶交論以譏其舊交也吴越春秋曰越王念復吴怨非一旦也苦身勞心夜以接日卧則切之以蓼足漬之以水冬則抱冰韓詩外傳曰冬不浴非惡水清有餘也穆天子傳曰季冬甲戍天子東遊飲于留祁射于麗虎讀書于菞丘君舉必書也菞音犁獻酒于天子奏廣樂天子遺其靈鼓乃化爲黄虵周禮曰靈鼓四靣洪範所謂鼓妖􅄞康髙士傳曰善卷古之賢人也舜以天下讓之善巷曰予}
  - {type: page-break, offset: 2777, content: '', id: KR3k0012_SBCK_026-8a}
  - {type: page-break, offset: 2777, content: '', id: KR3k0012_SBCK_026-8b}
  - {type: variant, offset: 2777, length: 0, content: '', WYG: 賜貧凍者又曰任昉素清貧卒後其子西華冬月著葛帔練裙道逢平原劉孝標泫然矜之謂曰我當為卿作計乃著廣絶交論以譏其舊交也吳越春秋曰越王念復吳怨非一旦也苦身勞心夜以接日目卧則攻之以蓼足寒則漬之以水冬常抱氷韓詩外傳曰冬不浴非惡水情有餒也穆天子傳曰季冬甲戌天子冬遊飲于留祁射于麗虎讀書于菞丘君舉必書也菞音犁西王母獻酒于天子天子遺其靈鼓乃化為黄蛇周禮曰靈鼓四面洪範以為鼓妖嵇康髙士傳曰善卷古之賢人也舜以天下讓之善卷曰予}
