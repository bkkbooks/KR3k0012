  - {type: variant, offset: 2364, length: 1, content: 立, SBCK: 大雪魚􅀒冰鄭􅀇曰魚冰上近冰也易通統圖曰日冬行北方黒道曰北陸京房易曰冬至坎王廣莫風用事人君决大刑斷獄訟繕宫殿尚書大傳曰殷以季冬爲正月又曰周以仲冬爲正又曰北方者何也伏方也伏方也者萬物之方伏物之方伏則何以爲之冬冬者中也中也者物方藏於中也故曰北方冬也陽盛則吁荼萬物而養之外也隂盛則吁吸萬物而藏之内也吁茶氣出而温吁吸氣入則寒温則生寒則殺也故曰吁吸者也隂陽之交接萬物之終始尚書大傳曰冬者􅄧昬中可以收歛盖藏田獵斷伐當告乎天子而天子賦之民故天子􅀯靣而視四星之中知民之緩急急則不賦籍不舉力役籍公家之常徭故曰敬授民時此之謂也又曰辯在朔易曰短朔始也傳曰天子以冬命三公謹盖藏閉門閭固封境入山澤日臘以順天道以佐冬固藏也詩含神霧曰魏地處季冬之位土地平夷又曰唐地處孟冬之位得常山太岳之風音中羽其地磽确上苦交切下苦角切而收故其民儉而好畜此唐堯之所起三禮義宗曰冬日壬癸者壬任也癸揆也言萬物更任生於黄泉皆有法度也又曰十二月小寒爲節者亦刑於大寒故爲之小言時寒氣猶未是極也大寒爲中者上刑於小故謂之大自十一月一陽支􅀄起至此始徹隂氣出地方盡寒氣併在上寒氣之逆極故謂大寒也逸禮曰冬則衣黒衣佩􅀇玉乗􅀇輅駕鐵驪載􅀇旗以迎冬于北郊其􅀕先豕居明堂後廟啓北户春}
