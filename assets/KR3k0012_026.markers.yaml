  - {type: variant, offset: 410, length: 0, content: '', SBCK: 氣日在尾小雪爲十月中氣昬危中曉翼中斗建亥位之中小雪之中虹藏不見後五日天氣上騰地氣下降後五日閉塞而成冬謹􅀜梁塞蹊徑蹊徑謂山澤禽獸道又曰十一月之節日在箕大雪爲十一月之節昬營室中曉軫中斗建子位之􅀄律中黄鍾十一月氣至則黃鍾之律􅀿黄鍾者律之始也管長九寸其日其音其數並同孟冬大雪之日鶡鳥不鳴後五日虎始交後五日茘挺出十一月中氣日在南斗冬至爲十一月中氣昬東壁中曉角中斗建子位之中冬至之日蚯蚓結後五日麋角解後五日水泉動是月也祀昊天上帝於圎丘謂冬至日祀昊天上帝於圎丘以髙祖神堯皇帝配坐以五方帝及日月星辰及内外星官等從祀於壇命有司􅀕馬歩謂仲冬􅀕馬步於大澤用剛日伐木取竹箭此時堅成可伐取又曰十二月之節日在南斗小寒爲十二月之節昬奎中暁亢中斗建丑位之中律中大吕十二月氣至則大吕之律應大吕者㽔賔之生三分益一管長八寸四分其日其音其數並同孟冬小寒之日鴈北郷後五日鵲始巢後五日野雉始雊天子乃命將帥講武習射角力講武角力校武士材力所以備畋獵之禮天子乃厲飾執弓挾矢以獵厲飾謂衣戎服尚威武以獵修􅀕禽之禮謂所獵得禽獸以供䄍祭又曰十二月中氣日在湏女大寒爲十二月中氣昬婁中曉氐中斗建丑位之中大寒之日雞始乳後五日鷙鳥厲病後五日水澤腹堅天子親徃嘗魚時魚㓗美冰方盛取而藏之春秋傳曰月在北陸而藏冰計耦耕修耒耜寒氣過農事將興出土牛以示農耕之早晚若立春在十二月望則䇿牛人近前示其農早也立春在十二月晦及正月朔則䇿牛人當中示其農平也立春近正月望則䇿牛人近後示其農晚也天子乃與公卿大夫共􅅚國典論時令以待來歳之冝周官建寅之月懸法於象魏以示人四時之令皆以此爲準故以建丑之月與公卿先飭之命有司大儺旁磔以送寒氣大難爲歳終逐除隂疫以送寒氣故周官命方相氏率百隸索室駈疫以逐之旁謂磔犬於門春磔九門冬禮大故徧磔於十二門所以扶陽抑隂之義犬属金冬盡春興春爲木故殺金以助木氣禮曰季冬之月命告人出五種命農計耦耕修耒耜具田器又曰是月也日窮于次月窮于紀星廽于天數將幾終歳且更始專其農人無有所使又曰孟冬之月天子乃祈來年于天宗注云天宗日月星辰也又曰孟冬命有司循行積聚坯城郭戒門閭又曰夫爲人子之禮冬温夏清又曰冬之爲言中也中者藏也又曰國子冬夏教以詩書秋冬學羽籥又曰儒有居處齊莊其坐起恭敬言必誠信行必篤敬道途不争險易之利冬夏不爭隂陽之和又曰昔者先王未有宫室冬則居營窟夏則居曽巢大戴禮曰季冬聽獄論刑者所以正法又曰方冬三月}
