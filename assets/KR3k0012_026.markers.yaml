  - {type: variant, offset: 314, length: 2, content: 聖人, krp: 也冬氣和}
  - {type: variant, offset: 316, length: 0, content: '', WYG: 近前示其農早也立春在十二月晦及正月朔}
  - {type: variant, offset: 317, length: 0, content: '', SBCK: 羽聲調樂記曰羽乱則危其財匱律中應鍾十月氣至則應鍾}
  - {type: variant, offset: 317, length: 0, content: '', WYG: 策牛人當中示其農中也立春近正月朔則策牛人近後示其農晚也天子乃與公卿大夫共飭國典論時令以待來歳}
  - {type: variant, offset: 317, length: 0, content: '', krp: 羽聲調樂記曰羽乱則危其財匱律中應鍾十月氣至則應鍾}
