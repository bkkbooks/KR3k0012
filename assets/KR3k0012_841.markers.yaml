  - {type: variant, offset: 62, length: 0, content: '', krp: 之胡豆是也龍魚河圗曰歳暮夕四更取二十豆子二十七麻子家人頭髮少合麻豆著井中呪勑井吏其家竟年不遭傷寒辟五温鬼史記曰張儀說韓王曰韓地險悪山居五榖所生非菽而麥民之食大抵飯菽藿羹一歳不収民不饜糟糠又曰棄爲兒時好種樹麻菽麻菽美東觀漢記曰閔仲叔太原人也與周黨相友黨毎過仲叔共唅菽飲水無菜茹又曰赤眉平後百姓飢餓人相食黄金一斤易豆五升又曰光武二年㓂恂爲潁川郡大生旅豆収得一萬餘斛以應給諸營又曰鄧禹攻赤眉陽敗弃輜重走車皆載土以豆覆其上兵士飢争取之又曰劉平甞爲餓賊所得平叩頭曰老母飢少氣待平爲命願得還飯母馳來就死賊即遣去母己食平曰向與賊期義不可欺乃復徃賊驚怪其信義曰不忍食汝平旣免脫乃摭莢得三升豆以謝賊恩又曰倪萌字子明齊國臨淄人兄爲赤眉賊所得賊欲殺啖之萌詣賊叩頭言兄年老羸瘠不肥徤願代兄賊義而不啖命歸求豆來贖兄萌歸不能得豆復自縛詣賊賊遂放之後漢書曰丗祖自薊東南至饒陽蕪蔞亭馮異獻豆粥一又曰馮異破延岑時百姓飢餓人相食黄金一斤易豆五斗道路斷隔委輸不至軍士悉以果實爲粮又曰獻帝在長安榖貴豆一斛二十餘萬又曰汝南有舊鴻郄陂成帝時丞相翟方進毀之時人歌曰敗我陂者翟子威飴我大豆烹我芋魁方進宇子威芋魁芋根也漢名臣奏曰丞相薛宣曰陛下八月酎祠嘉美上昇皇天報應茂陵寢廟上食日玄鳥來至集吐所含大豆紫黒色食物之象也蜀志曰彭羕與諸葛亮書先民有言左手據天下之圖右手刎咽喉愚夫不爲况僕頗別菽魏志曰華佗還家太祖累書呼佗佗恃能饜事猶不上道託妻疾太祖大怒使徃視若妻信疾賜小豆四十斛吴志曰孫權北征使陸遜與諸葛瑾攻襄陽陸遜遣親人韓扁賫表報遇敵於}
  - {type: variant, offset: 63, length: 0, content: '', SBCK: 中羅得扁瑾聞之甚懼書與遜云大駕以旋賊得韓扁具知吾闊狹且當急去遜未荅方催人種豆與諸將弈棊射戲如常又曰趙逹善笇使人取小豆數􅂛播之席上立處其數驗覆果信計飛蝗射隱伏無不中王隱晉書曰時王浚稱制邊陲潜使人問霍原原不荅浚旣衘之又有遼}
  - {type: variant, offset: 63, length: 0, content: '', WYG: 中邏得扁瑾聞之甚懼書與遜云大駕已旋賊得韓扁具知吾濶狹且當急去遜未答方催人種豆與諸將奕棊射戲如常又曰趙逹善筭使人取小豆數升播之席上立處其數驗覆果信計飛蝗射隠伏無不中王隠晉書曰時王浚稱制邉郵􅅗使人問霍原原不逹浚既銜之又有遼}
