  - {type: variant, offset: 2185, length: 240, content: 粟今齊國丈夫耕女子織夜以接日不足以奉上而君側雕文刻鏤之觀此無當之管也曾子曰曾子魯君饋之粟辭不受使者曰子無求於人人自致之曰與人者驕人受人者畏人縱子不以是驕我我能無畏乎與富而畏人不若貧而無屈墨子曰世俗之君子視義士不若視負粟者今有人於此負粟息於路側欲起而不能君子見之無長少貴賤必起之何重故也今為義之君子奉承先王之道以語之縱不說而行又從而非毀之則是世俗之君子視義士不若視負粟者莊子曰周家貧貸粟於監河侯侯曰待我得邑金將貸子周作色曰周昨來有呼周者視轍中有一鮒魚曰我東海之波臣也君豈有斗升水活我, WYG: 恤}
