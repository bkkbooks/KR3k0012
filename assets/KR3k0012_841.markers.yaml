  - {type: variant, offset: 2654, length: 4, content: 疾疫畜粟, SBCK: 所以叛由偏之也君如察臣嬰之言推君之盛徳公布之於天下則湯武可爲也一殣何足恤哉吕氏春秋曰得時之菽長莖而短足其莢二七以爲族多枝數節競葉嗇實二七十四實也大菽則圎小菽則􅅮以芳稱之重食之息以香如此}
