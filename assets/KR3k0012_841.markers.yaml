  - {type: variant, offset: 72, length: 1, content: 稷, SBCK: 庫狄伏連之家口百數盛夏之日料以倉米二􅂛不給塩菜常有飢色冬至之日親表稱賀其妻爲設豆餅伏連問此豆何因而得妻對向於食馬豆中分减充用伏連大怒典馬掌食之人並加杖罰唐書曰裴諝爲河東道租庸等使時大旱諝請入計代宗召見問搉酤之利一歳幾何諝乆之不對帝復問之對曰臣有所思帝曰何思對曰臣自河東來其間三百里見農夫愁歎榖菽未種誠爲陛下憂之而乃責臣以利故臣未敢即對又曰貞元中李元諒爲隴右節度使開部下荒田數十里勸軍士樹藝歳収菽}
  - {type: variant, offset: 72, length: 1, content: 稷, WYG: 裴諝為河東道租庸等使時大旱諝請入計代宗召見問𣙜酤之利一歳㡬何諝久而不對帝復問之對曰臣有所思帝曰何思對曰臣自河東来其間三百里見農夫愁歎菽}
