  - {type: variant, offset: 3595, length: 0, content: '', SBCK: 魏王花木志曰交州記木豆岀徐僮間子美似烏頭大葉似栁一年種數年采唐明皇􅄂録曰盧懷慎清身素不營産業常器重宋璟及盧從愿見之甚喜留連永日命設食有蒸豆兩甌菜數爼而已此外脩然無辨孔融教髙宻令曰志士鄧子然告困焉得愛釡􅁃之間以傷烈士之心今與豆三斛後乏復言曺子建鷂雀賦曰言雀者但食牛矢中豆馬矢中}
