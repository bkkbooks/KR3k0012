  - {type: variant, offset: 3224, length: 1, content: 欲, SBCK: 大豆保􅀊易爲冝古所以備凶年也種大豆率人五畒大豆忌申夘三月榆莢時雨髙田可種大豆夏至後二十日尚可種小豆不保歳難得宜椹黒時種畒五􅂛豆生布葉鋤之生五六葉又鋤之治養美田􅅿可得十石一斗大豆有萬千粒又曰夏至二十日可種豆帶甲而生不用深耕豆花憎見曰則黄爛而根焦矣}
