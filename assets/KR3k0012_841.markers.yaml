  - {type: variant, offset: 2648, length: 4, content: 鬻棺者欲, SBCK: 河水中調而冝菽又曰孟夏仲夏天子衣紫衣乗赤騮赤馬黒髦也食菽與雞􅀃菀曰齊景公嘗賞賜及後宫文繡􅀍臺榭菽粟食鳬鴈出而見殣謂晏子曰此何爲死晏子曰此餒而死公曰嘻寡人之無德也何甚矣對曰君之德著而彰何爲無德也景公曰何爲也對曰君之德及後宫與臺榭君之玩物衣以文繡君之鳬鴈食以菽粟君之營内自樂延及後宫之族何謂其仁徳也頃臣願有請於君之意自樂之心推而與百姓同之則何殣之有君不推此而苟營内好私使財貨偏有所聚菽粟幣帛腐於囷府惠不遍加于百姓公心不周乎萬國則桀紂之所以亡也夫士}
