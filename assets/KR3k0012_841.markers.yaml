  - {type: variant, offset: 3596, length: 5, content: 養腎氣杜寶, SBCK: 葛龔薦戴昱曰兄弟同居二十餘年及爲宗老所分昱持妻子逃舊業入虞澤裙穫野豆以自賑給麻毛詩􅁰離丘中有麻曰丘中有麻彼留子嗟禮記月令曰仲秋之月天子乃以犬甞麻先薦寢廟鄭􅀇注曰麻新黂爾雅曰黂枲實孫炎注曰黂麻子音汾吕氏春秋曰得時之麻必以長䟽節而危陽小本而莖堅厚枲以均後熟多榮日夜分復生如此者不蝗蝗虫不食麻節也東觀漢記曰周黨遺閔仲叔生麻叔歎曰我欲省煩耳受而不食齊書曰宣帝陳皇后生髙帝髙帝年二歳乳人乏乳后夢人以兩甌麻粥與之􅁴而乳驚因此豊足淮南子曰三秋之月天子衣白衣乗白輅食麻與}
