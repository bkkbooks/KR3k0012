  - {type: variant, offset: 64, length: 1, content: 呼, SBCK: 内徒三百餘人依山爲賊意欲刼原爲主亦未能行時有謡曰天子在何許近在豆田中浚以爲豆者霍也浚遂害原懸其首諸生悲哭其中宋書曰廢帝子業景和􅀄人種紫花草及豆皆化爲白花俄而帝見廢之應南史曰傳琰爲山隂令有二野父争雞琰各問雞所食一人云}
  - {type: variant, offset: 64, length: 1, content: 呼, WYG: 内徙三十餘人依山為賊意欲刦浚為首者霍也浚遂害原懸其首諸生悲哭其中宋書曰廢帝子業景和初人種紫花草及豆皆化為白花俄而帝見廢之應南史曰傅琰為山隂令有二野父爭雞琰各問雞所食一人云}
