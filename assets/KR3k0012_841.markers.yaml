  - {type: variant, offset: 95, length: 1929, content: 稷廣志曰破減稷逼麥稷此二者以四月熟本草曰稷米甘而無毒益志氣補不足鄭氏婚禮謁文讚曰稷為天官盧毓冀州論曰真定好稷地產不為無珍也粟歸藏曰剝良人得其玉小人得其粟河圖說微曰蒼帝起天雨粟也說文曰粟嘉穀實也粟之為言續也爾雅曰虋赤苗芭白苗虋赤粱粟也芑白粱粟也虋音門芑音起尚書仲虺之誥曰肇我邦于有夏若苗之有莠若粟之有粃孔安國注曰始我商家國於夏世欲見剪除若莠生苗粃在粟恐被鋤治傷之也毛詩曰握粟出卜自何能穀又小宛曰交交桑扈率場啄粟周禮地官下曰倉人掌粟入之藏鄭玄注曰九穀盡藏以粟為主禮記曲禮上曰獻粟者執右契契券要古尊也禮記祭法曰父母既歿必求仁者之粟以祀之謂禮終左傳僖上曰冬晉荐饑乞糴于秦秦輸粟于晉自雍及絳相繼命之曰汎舟之役又襄元曰季文子卒大夫入歛無衣帛之妾無食粟之馬又襄六曰鄭子皮即位於是鄭飢而未及麥民病子皮以子展之命餼國人粟戶一鍾又昭六曰夏會于黃父謀王室也王室有子朝亂謀定之也趙簡子令諸侯之大夫輸王粟春秋佐助期曰粟神名許給姓慶天又說題辭曰高而平者為原平者和故宜粟又曰粟助陽扶性粟之為言續也粟五變一變而以陽生為苗二變而秀為禾三變而粲然謂之粟四變入臼米出甲五變而蒸飯可食宋均注曰粟受五行氣而五變故乃成可食陽以一立為法故粟積大一分穗長一尺文以七烈精以五立故其字粟為粟西者金所立米者陽精故西字合米而為粟宋均注曰續為續陽生長也受五行氣故有變春秋潛潭巴曰天雨粟無德者興有德者不祿小人進大臣辱公羊傳僖上曰秋齊侯宋公江人黃人會於陽穀桓公無障谷無貯粟何休注曰有無相通穀梁傳莊公曰諸侯無粟諸侯相歸粟正也論語雍也曰子華使於齊冉有為其母請粟子曰與之釜請益曰與之庾原思為之宰與之粟九百辤子曰無以與爾鄰里鄉黨乎周書曰神農之時天雨粟神農耕而種之作陶冶斤斧破木為耜鉏耨以墾草莽然後五穀興以助菓蓏之實史記曰武王平殷亂天下宗周伯夷叔齊恥之義不食周粟又曰宣曲任氏之先為督道倉吏秦之敗豪傑皆爭金玉而任氏獨害倉粟楚漢相拒滎陽民不得耕種米石至萬金而豪傑金玉盡歸任氏任氏以此起富又曰漢興七十餘年之間國家無事非遇水旱之災太倉之粟新陳相因充溢露積於外至腐敗不可食也又曰文帝徙淮南王道死民歌曰一斗粟尚可舂一尺帛尚可縫兄弟兩人不能相容又汲黯傳曰河內失火上使黯往視之還報曰河內人或父子相食臣謹發河南倉粟以賑貧乏上賢而釋之史記曰大將軍青遂至窴顏山趙信城得匈奴積粟食軍軍留一月而還悉燒其城餘粟以歸漢書曰酈食其說齊王曰漢英豪賢才皆樂為之用諸侯之兵四面而至蜀漢之粟方舩而下又曰公孫弘起家徒步為丞相故人高賀從之食以脫粟米飯覆以布被賀怨曰何用故人富貴為脫粟布被我自有之乃退又曰主父偃諫伐匈奴曰秦皇使天下飛蒭輓粟起於東睡琅耶負海之郡轉月北河率三十鍾而致一石又曰秦將王離涉河圍鉅鹿章邯軍其南築通道而輸之粟又曰神農之教曰有石城十仞湯池百步帶甲百萬而亡粟弗能守汜勝之書又又東方朔傳曰侏儒長三尺俸一囊粟錢二百四十臣長九尺餘亦俸一囊粟錢二百四十侏儒飽欲死臣朔飢欲死又曰賈捐之上書曰武帝元狩六年太倉之粟紅腐不可食謝承後漢書曰丹易方儲字聖明曉風角占候為章句長民田還置餘粟二石及刀鋤於田陌聖明曰求亡去疑其鄰家儲曰此人非偷自呼縣功曹語曰君何取粟置家後積茭中功曹款服後漢書王符潛夫論曰富貴則背親捐舊喪其本心朽貫千萬而不忍賜人一錢積粟腐倉不忍貸人一升後魏書曰任城王雲為冀州刺史雲留心政事甚得下情於是合城長吏請輸絹五尺粟五升以報雲恩高祖嘉之又曰世祖引高允與論刑政言甚稱旨因問允曰萬機之務何者為先是時多禁封良田又京師遊食者眾允因言曰地方一里則為田三頃若勤之則畝益三升不勤則畝損三升方百里損益數率為粟二百二十二萬斛況以天下之廣乎若公私有儲雖遇飢年復何憂哉世祖善之遂除田禁又曰韋胐字尊顯少有志業年十八辟州主簿時屬歲儉胐以家粟造粥以飼飢人所活甚眾後周書曰王罷為華州刺史時關中大飢徵稅民間穀食以供軍費或隱匿者令遞相告多被篣捶以是人有逃散唯罷信著於人莫有隱者得粟不少唐書曰始平人宗士朓負粟一石委於大倉而去云願少益軍國高祖嘉之賚物百叚晉史曰高祖明而難犯事多親決嘗有店婦與軍士墾訴無以自明帝為鞠吏曰雖屬官吾可市而代之兩訟未分何以為斷可殺馬刳腸而視其粟有則軍士誅無則婦人死遂殺馬馬腸無粟因戮其婦境內肅然莫敢以欺漢實錄曰王周性寬恕不忤物情初刺信都州城西橋敗覆民租車周曰橋梁不飾子之過也乃還其所沉粟出私財以修之孔叢子曰子思居貧其友饋之粟者受二車焉或獻樽酒束脩子思曰為費而無當也或曰子取人粟而辭酒是辭少而受多也於義則無名於分則不全行之何也子思曰然伋不幸而貧於財及至困乏將絕先人之祀夫所以受粟為周乏也酒酺則所以飲讌也方乏於食而乃飲讌非義也吾豈以為介哉度義而行之又曰季桓子以粟十鍾餼夫子夫子受而班門人之無者子貢曰季孫以夫子貧故致粟今而施人無乃乖彼意乎子曰吾受而不辭為季孫之惠受不為富惠於一人豈若數百人哉, WYG: 菽}
