  - {type: variant, offset: 61, length: 0, content: '', SBCK: 孫叔然以為大豆按春秋齊侯獻戎捷榖傳曰戎菽也管子亦云北戎山戎岀冬葱及戒菽布之天下}
  - {type: variant, offset: 61, length: 0, content: '', WYG: 孫炎以為大豆按春秋齊侯獻戎㨗穀梁傳曰戎菽也管子亦云北戎山出冬葱及戎菽布之天下}
  - {type: variant, offset: 61, length: 0, content: '', krp: 孫叔然以為大豆按春秋齊侯獻戎捷榖傳曰戎菽也管子亦云北戎山戎岀冬葱及戒菽布之天下}
  - {type: variant, offset: 62, length: 0, content: '', SBCK: 之胡豆是也龍魚河圗曰歳暮夕四更取二十豆子二十七麻子家人頭髮少合麻豆著井中呪勑井吏其家竟年不遭傷寒辟五温􅀑史記曰張儀􅀃韓王曰韓地險􅁖山居五榖所生非菽而麥民之食大抵飯菽藿羹一歳不収民不饜糟糠又曰棄爲兒時好種樹麻菽麻菽美東觀漢記曰閔仲叔太原人也與周黨相友黨毎過仲叔共唅菽飲水無菜茹又曰赤眉平後百姓飢餓人相食黄金一斤易豆五升又曰光武二年㓂恂爲潁川郡大生旅豆収得一萬餘斛以應給諸營又曰鄧禹攻赤眉陽敗弃輜重走車皆載土以豆覆其上兵士飢争取之又曰劉平甞爲餓賊所得平叩頭曰老母飢少氣待平爲命願得還飯母馳來就死賊即遣去母己食平曰向與賊期義不可欺乃復徃賊驚怪其信義曰不忍食汝平旣免脫乃摭莢得三􅂛豆以謝賊恩又曰倪萌字子明齊國臨淄人兄爲赤眉賊所得賊欲殺啖之萌詣賊叩頭言兄年老羸瘠不肥徤願代兄賊義而不啖命歸求豆來贖兄萌歸不能得豆復自􅅞詣賊賊遂放之後漢書曰丗祖自薊東南至饒陽蕪蔞亭馮異獻豆粥一又曰馮異破延岑時百姓飢餓人相食黄金一斤易豆五斗道路斷隔委輸不至軍士悉以果實爲粮又曰獻帝在長安榖貴豆一斛二十餘萬又曰汝南有舊鴻郄陂成帝時丞相翟方進毀之時人歌曰敗我陂者翟子威飴我大豆烹我芋魁方進宇子威芋魁芋根也漢名臣奏曰丞相薛宣曰陛下八月酎祠嘉美上昇皇天報應茂陵寢廟上食日􅀇鳥來至集吐所含大豆紫黒色食物之象也蜀志曰彭羕與諸葛亮書先民有言左手據天下之圖右手刎咽喉愚夫不爲况僕頗別菽魏志曰華佗還家太祖累書呼佗佗恃能饜事猶不上道託妻疾太祖大怒使徃視􅀂妻信疾賜小豆四十斛吴志曰孫權北征使陸遜與諸葛瑾攻襄陽陸遜遣親人韓扁賫表報遇敵於}
