  - {type: variant, offset: 62, length: 0, content: '', WYG: 胡豆是也龍魚河圖曰歳暮夕四更取二十豆子二十七麻子家人頭髪少合麻豆著井中呪𠡠井使其家竟年不遭傷寒辟五瘟鬼史記曰張儀説韓王曰韓地險惡山居五榖所生非菽而麥民之食大抵飯菽藿羮一歳不收民不饜糟糠又曰棄為兒時好種樹麻菽麻菽美東觀漢記曰閔仲叔太原人也與周黨相友黨每過仲叔共啜菽飲水無菜茹又曰赤眉平後百姓飢餓人相食黄金一斤易豆五升又曰光武二十年㓂恂為潁川郡大生旅豆收得一萬餘斛以應給諸營又曰鄧禹攻赤眉陽敗棄輜重走車皆載土以豆覆其上軍士飢爭取之又曰劉平嘗為餓賊所得平叩頭曰老母飢少氣待平為命願得還飯母馳來就死賊即遣去母已食平曰向與賊期義不可欺乃復往賊驚怪其信義曰不忍食汝平既免脫乃摭莢得三升豆以謝恩又曰倪萌字子明齊國臨淄人兄為赤眉賊所得賊欲殺啖之萌詣賊叩頭言兄年老羸瘠不肥徤願代兄賊義而不啖命歸求豆来贖兄萌歸不能得豆復自縛詣賊賊遂放之後漢書曰世祖自薊東南至饒陽蕪蔞亭馮異獻豆粥又曰馮異擊延岑時百姓饑餓人相食黄金一斤易豆五升道路隔斷委輸不至軍士悉以果實為糧又曰獻帝在長安榖貴豆一斛二十餘萬又曰汝南有舊鴻郄陂成帝時丞相翟方進毁之時人歌曰敗我陂者翟子威飴我大豆烹我芋魁方進字子威芋魁芋根也漢名臣奏曰丞相薛宣曰陛下八月酎祠嘉美上昇皇天報應茂陵寢廟薦食日𤣥鳥来至集吐所含大豆紫黑色食物之象也蜀志曰彭羕與諸葛亮書先民有言左手據天下之圖右手折咽喉愚夫不為况僕頗别菽麥魏志曰華佗還家太祖累書呼佗佗恃能饜事猶不上道託妻疾太祖大怒使人往視若妻信疾賜小豆四十斛呉志曰孫權北征使陸遜與諸葛瑾攻襄陽陸遜遣親人韓扁賫表奉報遇敵於}
