  - {type: variant, offset: 51, length: 0, content: '', SBCK: 姓樂春秋􅀃題辭曰菽者属也春生秋熟理通體屬也菽赤黒隂生陽大體應節小變赤象陽色也宋均注曰隂陽而春夏也大體謂多黒也小變謂時之然也孝經援神契曰赤土冝菽}
