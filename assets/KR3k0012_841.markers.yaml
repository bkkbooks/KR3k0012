  - {type: variant, offset: 3678, length: 310, content: 斗此地經為粟田蟻運粟下於此穴當時朝野之士以綽為聖任昉述異記曰光武興洛陽斗粟萬錢人死者相枕漢末大飢江淮間童謠曰大兵如市人死如林持金易粟粟貴於金洛中謠云雖有千黃金無如我斗粟斗粟自可飽千金何所直袁紹在冀州時滿市黃金而無斗粟餓者相食人為之語虎豹之口不如飢人劉備在荊州粟與金同價永嘉之亂洛中飢荒懷帝遣人觀市珠玉金銀填委市門而無粟麥袁宏上表云田畝由是丘墟都市化為珠玉又曰晉末荊州久雨粟化為蟲蟲害民春秋云穀之飛為蟲是也中郎王義興表曰臣聞堯生神禾而晉有蟲粟陛下自以聖德何如也帝有慚色又曰宋高祖之初當晉末飢饉之後既即位而江表二千餘里野粟生焉又曰淮南諸山石穀生石上生穀也袁安公云石穀藥名穗之尤小者是也應翊像讚序曰赤眉賊攻其所居城翊盡以私穀數, SBCK: 百四}
