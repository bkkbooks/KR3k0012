  - {type: page-break, offset: 2203, content: '', id: KR3k0012_SBCK_066-9a}
  - {type: variant, offset: 2203, length: 93, content: 臨水經臨賀縣東又南至郡左以合賀水故有臨賀之稱焉靳江湘州記曰靳江在新東縣西八里水出衡山縣界紫嘉山東流入湘江二百八十里昔楚大夫靳向所封之地因以名之資水湘州記曰資水一名茱萸江又水經云資水東北過, WYG: ''}
