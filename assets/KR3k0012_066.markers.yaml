  - {type: variant, offset: 383, length: 0, content: '', WYG: 淮南子曰夫厯陽之都一夕化而為湖勇力聖智與不肖者同命無遺脫也荆南志曰髙沙湖在枚廻洲上翠澤平皛胡了切水陸彌曠芰荷殷生鱗羽滋阜湖南林野清曠可以栖託故徴士宗炳昔常家焉北有小水自湖通江謂之曽口是也渚宫舊事云江陵城西二十里高沙湖其中多湖魚又曰五葉湖昔湖側有主人張姓五葉同居因以為名九江記曰彭蠡湖在潯陽縣東南與都昌縣分界湖心有大孤山郡國志云彭蠡湖週廽四百五十里内有石高數十丈大禹刻其石以記功焉又有乞烏隨船行舟人擲飯接之高下不失一粒今此烏㳂江靈廟多有不獨在彭蠡湖矣又曰鶴門湖者陶侃㣲時䘮母忽有二客來弔化為雙白鶴飛去後因以為名丹陽記曰吳孫皓寳鼎元年丹陽縣宣騫之母年八十浴於後湖化為黿後湖又名練湖在縣北百二十歩輿地志曰曲阿出名酒皆云後湖水所釀故醇冽也今按湖水上承丹徒陳敏後湖上馬林溪水色白味甘又云練塘陳敏所立遏高陵水以後為後湖語林曰禇公逰曲阿後湖狂風忽起船傾禇公已醉乃曰此舫人皆無可以招天譴者唯有孫興公多塵滓正當以厭天欲耳便欲捉孫擲水中孫懼無計唯大呼曰季野卿念我禇公禇彦囬也季野彦囬子也伏㴞登故臺詩序曰夫差姑蘇臺東有丹湖萬頃内有金銀塘方輿記曰銅船湖馬援鑄銅船五隻一㽞此湖中四隻將過海征林邑潭幽明録曰碩縣下有眩潭以視之眩人眼因以為名傍有田陂昔有人船行過此陂見一死蛟在陂上不得下無何見一人長壯烏衣立於岸側語行人云吾昨下陂不過而死可為報眩潭行人曰眩潭無人云何可報烏衣人云但至潭便大言之行如其言湏㬰潭中有號泣聲又曰晉元熈中桂陽郡}
