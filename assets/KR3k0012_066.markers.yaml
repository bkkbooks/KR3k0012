  - {type: variant, offset: 1551, length: 648, content: 曰淮水北去縣一里源從宣州東南漂水縣烏剎橋西入百五十里輿地志云秦始皇巡會稽鑿斷山阜此淮即所鑿也亦名秦淮孫盛晉春秋亦云是秦所鑿王導令郭璞筮即此淮也又稱未至方山有直瀆行三十許里以地形論之誰發源詰屈不類人功則始皇所掘宜此瀆也丹陽記云建康有淮源出華山入江徐爰釋問云淮水西北貫都輿地志云淮水發源於華山在丹陽湖姑熟之界西北流經建康秣陵二縣之間縈紆京邑之內至于石頭入江懸流三百許里浙江山海經曰浙江出三天子都在率東西北入海餘暨南郭璞注云按地理浙江出黔縣南率中東入海今之浙江是也率即歙耳餘暨縣名虞喜志林注曰今錢塘江口折山正居江中潮水投山下折而曲一云江有反濤水勢折歸故云浙江史記云江水至會稽山陰為浙江是也三江郡國志曰禹貢三江吳郡南松江錢塘江是也禹貢曰三江既入震澤厎定韋昭曰三江謂吳郡南松江錢塘江浦陽江虞氏志林云江於彭蠡分為三是即韋說為謬按江自太湖出于海屈曲七百里出鱸魚即吳左慈為王釣者縠江輿地志曰縠江其水波瀾交錯狀似羅縠之文因以為名若下水輿地志曰南岸曰上若北岸曰下若乃村名也村人取若下水以釀酒醇美勝於雲陽吳錄曰長城若下酒張協七命云荊南烏程即此酒也霅水輿地志曰霅水亦若水之異名也水深不可測俗謂之洺水又山海經云浮玉之山茗水出其陰中多鮆魚今亦謂之霅鳥水是也紫溪吳興記曰邑有文山水東南流為紫溪輿地志云以為水紫色也又云紫溪中央水有赤色盤石長百餘丈望之如霞名曰赤瀨水公山江水郡國志曰公山江水有橘自然泛來行人噉之恣飽則可將去則病不竭泉永嘉地記曰山北有泉眾泉旱竭此泉不乾故以名山東有瀑布長數十丈遊者云山頂有大湖中有孤岩獨立皆號孤房臨水, SBCK: 潭}
