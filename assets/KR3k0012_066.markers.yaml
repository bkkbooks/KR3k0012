  - {type: variant, offset: 374, length: 0, content: '', SBCK: 三女墳在郭西云闔閭食蒸魚羮留半賜三女三女怨自殺王痛之􅁙於郭西文石爲槨金印玉牒銀樽朱盤悉以送􅁙又云盤郢之劒或曰湛鑪之劒夜飛適楚以水繞墳因名女墳湖又云􅁙女時有白鶴舞呉市因入羡門悉化爲犬錢塘記曰去邑十里有詔息湖古老相傳昔􅁗始皇廵狩經塗暫憇因詔以息爲名周景式廬山記曰山頂有一窮湖湖足頳尾鯉鬐皆傷剥而又有一故艑槽崇山峻逺非舟檝所㳺豈深谷爲陵而此物不與丘壑同遷乎顧微廣州記曰廬山上有一湖至甲戌日輙聞山有鼔角聲劉澄之􅀭州記曰新城縣東有俱山山上有湖湖中有白鵝一隻時時飛來不可常見劉楨京口記曰龍目湖􅁗王東游觀地勢云此有天子氣使赭衣徒鑿湖中長岡使斷因改爲丹徒今水北注江也梁典曰武帝望京峴山盤紆似龍掘其右爲龍目二湖徐州先賢傳曰句踐滅呉謂范蠡曰吾將與子分國而有之蠡曰君行令臣行意乃乗扁舟浮五湖而不返水經注曰武強縣􅂄􅀫云邑人有行於途有一小虵疑其有靈持而養之名曰檐生長而吞噬人里中患之遂捕繫獄檐生􅀒而奔邑淪爲湖縣長及吏咸爲魚矣今縣東北半許里有淵謂之郎君淵􅂄􅀫又言縣淪之日其子東奔又䧟於此故淵得郎君之目矣神異經曰北方荒外有湖方千里平滿無髙下有魚長七八尺刑狀如鯉而目赤晝在湖中夜化爲人刺之不入煑之不死以烏梅二七煑之即熟食之可以愈邪病又曰北方荒中有石湖方千里無凸凹上直結反下於交反平滿無髙下岸深五丈餘􅁪氷唯夏至左右五六十日解耳又曰東南海中烜洲上有温胡其中唯有鯽魚焉長八尺食之宜暑而避寒郡國志曰潤州遏陂有湖名龍目湖京口出好酒人習戰故桓温云京口土瘠人窶無可戀唯酒可飲兵可用耳㑹稽記曰}
