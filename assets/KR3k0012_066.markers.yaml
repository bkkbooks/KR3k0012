  - {type: variant, offset: 378, length: 0, content: '', SBCK: 隂南湖縈帶郊郭白水翠巖㸦相映發有若圖􅀞南徐州記曰子英常於芙蓉湖捕魚得赤鯉持歸以榖養一年遂生角翅魚云我來迎汝子英􅀐之即乗風􅀨騰而上天故列仙傳云毎經數載来歸見妻子魚復來迎如是數十迴而不還芙蓉湖即射貴湖也又名上湖呉地記曰臨平湖在臨平山南呉志曰歸命侯天璽元年呉郡言臨平湖自漢末草􅁾擁塞今更除平古老相傳云此湖塞天下亂此湖開天下平又湖邊得石函凾中有小石青色長四寸廣二寸餘刻上作皇帝字於是改年大赦俄而􅀳平呉孫盛以爲元皇中興之符歙}
  - {type: page-break, offset: 378, content: '', id: KR3k0012_SBCK_066-5b}
  - {type: variant, offset: 378, length: 0, content: '', WYG: 陰南湖縈帶郊郭白水翠巖互相暎發有若圖畫南徐州記曰子英常於芙蓉湖捕魚得赤鯉持歸以榖飬一年遂生两翅魚云我來迎汝子英騎之即乘風雨騰而上天故列仙傳云毎經數載來歸見妻子魚復來迎如是數十廽而不返芙蓉湖即射貴湖也又名上湖吳地記曰臨平湖在臨平山南吳志曰歸命侯天璽元年吳郡言臨平湖自漢末草穢擁塞今更除平故老相傳云此湖塞天下亂此湖開天下平又湖邊得䂖函函中有小石青色長四寸廣二寸餘刻上作皇帝字於是改年大赦俄而晋平吳孫盛以為元皇中興之符歙}
