  - {type: variant, offset: 460, length: 0, content: '', SBCK: 下昔有長者於此潭以釣爲事􅁪作漁父歌其聲慷􅁣忽聞綸動須􅁷一物形似小水牛眼光如鏡或言水犀浮躍逐綸角帶金繅釣客因引得鏁出水數十丈鏁斷餘數丈盡是珎寳羅浮山記曰牛潭深洞無極北岸有石周圍三丈許漁人見牛自水而出盤於此石枹朴子曰昔石頭水有大黿常在潭中因名此爲黿潭能作魅行病於人呉有道士戴昞者乃以越章封埿偏投潭水中良乆有大黿徑長丈餘浮出不敢動乃格殺之而病人並愈又}
