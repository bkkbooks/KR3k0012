  - {type: variant, offset: 369, length: 0, content: '', SBCK: 隋時貢於洛楊州記曰太湖一名震澤一名笠澤一名洞庭史記三苗之國左洞庭右彭蠡裴駰注云今湖中苞山有石穴其深洞無知其極者名洞庭洞庭對曰彭蠡則知因此穴之名通呼洞庭彭蠡即宫庭湖名也越絶書云太湖周三萬六千里在呉興也荆州記曰宫亭即彭蠡澤也謂之彭澤湖一名匯孩賄切澤在豫章郡青草湖一名洞庭湖洞庭湖亦謂之太湖在巴陵郡雲夢澤一名巴丘湖凢此並昭昭尤著又廣大也干寳捜神記曰由權縣􅁗時長水縣始皇時童謡曰城門有血城當䧟没爲湖有嫗聞之朝徃窺門將欲􅅞之嫗言其故後門侍以犬血塗門嫗見血走去忽有大水欲没縣主簿令幹入白令令曰可忽作魚幹曰明府亦作魚遂淪爲湖鄭緝之永嘉記曰懷北縣有蔣公湖父老云先代有􅀕祀祈請者湖輙下大魚與之􅁗州記曰武都郡前有湖義熈􅀄有白龍於湖升天盛弘之荆州記曰宫亭湖廟神甚有靈驗塗旅經過無不祈禱能使湖中分風而忛南北又曰巴陵南有青草湖周廻數百里日月出没其中湖南有青草山故因以爲名劉澄之荆州記曰華容縣東南有雲夢澤一名巴丘湖荆州之藪也劉澄之豫州記曰陳縣地有芍陂湖魏將王陵與呉將張休交戰處也黄閔武陵記曰有湖名爲丹陂周廻數百頃清波澄映洲嶼相望武昌記曰武昌長湖通江夏有水冬則涸于時靡所産植陶太尉立塘以遏水於此常自不竭因取瑯琊郡隔湖魚菱以着湖内菱甚甘美異於他故所産鮒魚乃長三尺劉道眞錢塘記曰明聖湖在縣南去縣三里父老相傳有金牛時見神化莫測故以明聖垂名西京雜記曰顧翶少失父事母好食雕胡飯常帥子女躬自採擷還家導水鑿川供養毎有􅄹儲家近太湖湖中乃生雕胡無復􅄂草蟲鳥不敢至焉遂得以爲養郡縣表其閭舎江乗地記曰滆湖中有嘉魚美蓴劉欣期交州記曰有一湖去舎浦四十里毎隂􅀨日百姓見有銅舩出水上又有一牛在湖中以鷄酒爲􅀕便大獲魚􅀂此禮不設唯得牛糞而巳述征記曰􅁊冲爲江州刺史遣人周行廬山兾覩靈異旣陟崇巘有一湖匝生桑樹有白鵠湖中有赤鱗魚使者渴極欲徃飲水有赤鱗魚張鬐向之使者不敢飲南康記曰空山上有平湖湖中有艑音便底浮在湖中動揺便起風雨鄭緝之東陽記曰北山去郡三十餘里有赤松廟故老相傳云其下有居民曰徐公者甞登嶺至此處見湖水二人共􅀶於湖間自稱赤松子安期先生有一壷酌酒以飲徐公公醉而􅄰其側比醒不復見劉澄之豫州記曰城父縣有巢湖湖周五里湖中有三山湖南有四鼎山戰國䇿曰􅁗與荆戰大破之取洞庭五渚呉地記曰呉王􅁙女取土成湖}
