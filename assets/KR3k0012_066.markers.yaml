  - {type: variant, offset: 369, length: 0, content: '', WYG: 隨時貢於洛揚州記曰太湖一名震澤一名笠澤一名洞庭史記三苗之國左洞庭右彭蠡裴駰注云今湖中苞山有名穴其深洞無知其極者名洞庭彭蠡則無因此穴之名通呼洞庭彭蠡即宫庭湖名也越絶書云太湖周一萬六千頃在吳興也荆州記曰宫庭即彭蠡澤也謂之彭澤湖一名匪孩賄切澤在豫章郡青草湖一名洞庭湖洞庭湖亦謂之太湖在巴陵郡雲夢澤一名巴丘湖凢此並昭昭尤著又廣大也干寳捜神記曰由拳縣秦時長水縣始皇時童謡曰城門有血城當陷沒為湖有嫗聞之朝往窺門將欲縛之嫗言其故後門將以犬血塗門嫗見血走去忽有大水欲沒縣主簿令幹入白令令曰何忽作魚幹曰明府亦作魚遂淪為湖鄭緝之永嘉記曰懐北縣有蔣公湖父老云先代有祭祀祈請者湖輙下大魚與之秦州記曰武都郡前有湖義熙初有白龍於湖升天盛宏之荆州記曰宫亭湖廟神甚有靈騐塗旅經過無不祈禱能使湖中分風而㠶南北又曰巴陵南有青草湖周廻數百里日月出沒其中湖南有青草山故因以為名劉澄之荆州記曰華容縣東南有雲夢澤一名巴丘湖荆州之藪也劉澄之豫州記曰陳縣地有芍陂湖魏將王陵與吳將張休交戰處也黄關五陵記曰有湖名為丹陂週圍數百頃青波澄映洲嶼相望武昌記曰武昌長湖通江夏有水冬則涸昔時靡所産植陶太尉立塘以遏水於此常自不竭因取瑯琊郡滆湖魚菱以著湖内菱甚甘美異於他處所産鮒魚乃長三尺劉道真錢塘記曰明聖湖在縣南去縣三里父老相傳有金牛時見神化莫測故以明聖垂名西京雜記曰顧翺少失父事母母好食雕胡飯常帥子女躬自採擷還家導水鑿川供養每有盈儲家近太湖湖中乃生雕胡無復雜草蟲鳥不敢至焉遂得以為飬郡縣表其閭舎江乗地記曰滆湖中有嘉魚美蓴劉欣期交州記曰有一湖去合浦四十里每陰雨日百姓見有銅船出水又有一牛在湖中以鷄酒為祭便大獲魚若此禮不設唯得牛糞而已述征記曰栢冲為江州刺史遣人周行廬山冀覩靈異既陟崇巘有一湖匝生桑樹有白鵠湖中有赤鱗魚使者渇極欲往飲有群白鱗魚張鬐向之使者不敢飲南康記曰廬山上有平湖湖中有艑音便底在湖心中動揺便風雨鄭緝之東陽記曰北山去郡三十餘里有赤松廟故老相傳曰其下有居民曰徐公者嘗登嶺至此處見湖水二人碁愽於湖間自稱赤松子安期先生有一壺酌酒以飲徐公公醉而寐其側比醒不復見劉澄之豫州記曰城父縣有巢湖湖週五里湖中有三山南有四鼎山戰國䇿曰秦與荆戰大破之取洞庭五湖吳地記曰吳王葬女取土成湖}
