  - {type: variant, offset: 2273, length: 507, content: 之資水湘州記曰資水一名茱萸江又水經云資水東北過益陽應劭曰縣在益水之陽今無益水誠資水之殊目郡國志云資水岸有石頭城即吳將周瑜築也枉水湘州記曰枉山在郡東十七里有枉水出焉山西溪溪口有小灣謂之枉渚山上有楚祠存焉沅水水經曰沅水出牂牁且蘭縣為旁溝水東北至鐔城縣為沅水又曰沅水之北有奇山山有秀峰上枝綠蘿濛幕頹巖臨水實釣渚漁詠之勝也其幽響若鍾音信神仙之所居滄浪水永初山川記曰漢水古為滄浪即漁父所云滄浪之水清今滄浪水合流出鐔城北界山此蓋後人名之非古滄浪也湘水說文曰湘水出零陵陽海山北入江湘中記曰湘水至清雖深五六丈見底了了然石子如摴蒲矣五色鮮明白沙如雪赤岸如朝霞綠竹生焉上葉甚密下踈遼常如有風氣淮南子曰所謂樂者豈必躬釣瀟湘水經注曰湘水又經南津城西對橘洲諺曰昭潭無底橘洲浮又按郡國志云湘水邊有水魚山本名立石山高八十丈闊十里石色黑而重疊每發一重則有自然魚形女人多刻畫為戲長數寸燒之魚膏腥汨水水經注曰汨水西經玉笥山又西為屈潭即羅潭也屈原懷沙自沉於此故潭以屈為名賈誼史遷皆嘗經此弭楫沿波投弔於潭五美水湘中記曰五美水在長沙縣東二十五里光武時有五美女居於此溪之側後因為名灕水臨桂圖經曰灕水出縣南二十里柘山之陰西北流至縣西南合零渠五里始分為二水昔秦命, SBCK: 太平}
