  - {type: variant, offset: 288, length: 2, content: 范柏, SBCK: 㑹稽太守孟顗事佛精懇而爲謝靈運所輕嘗謂顗曰得道應湏惠業文人生天當在靈運前成佛必在靈運後顗深恨之㑹稽東郭有廻踵湖靈運求决以爲田顗堅執不與又求始寜岯崲湖爲田顗又固執靈運謂顗非存利民正慮決湖多害生命言論毀傷與顗遂搆讐􅂩唐書曰禇無量字弘度杭州鹽官人也㓜􅀌貧厲志好學家近臨平湖時湖中有龍􅃲傾里閈就觀之無量時}
