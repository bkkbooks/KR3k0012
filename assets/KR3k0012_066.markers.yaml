  - {type: variant, offset: 383, length: 0, content: '', SBCK: 淮南子曰夫歷陽之都一夕化而爲湖勇力聖智與不肖者同命無遺脫也荆南志曰髙沙湖在枚迴洲上翠澤平皛胡了切水陸彌曠芰荷殷生鱗羽滋阜湖南林野清曠可以栖託故徴士宗炳昔常家焉北有小水自湖通江謂之曽口是也渚宫故事曰江陵城西二十里髙沙湖其中多魚又曰五葉湖昔湖測有主人張披五葉同居因以爲名九江記曰彭蠡湖在㝷陽縣東南與都昌縣分界湖心有大􅀌山案郡國志彭蠡湖周廽四百五十里内有石髙數十丈大禹刻其石以記功焉又有乞烏隨船行舟人擲􅅮飯接之髙下不失一粒今此烏㳂江靈廟多有不獨在彭蠡湖尓郡國志曰鶴門湖者陶侃微時䘮母忽有二客來吊化爲􅀟白鶴飛去後因以爲名丹陽記曰呉孫皓寶鼎元年丹陽縣宣騫之母年八十浴於後湖化爲黿後湖又名練湖在縣北百二十歩輿地志曰曲阿出名酒皆云後湖水所釀故醇烈也今按湖水上承丹徒陳驪覆􅂳山馬林溪水色白味甘輿地志云練塘陳敏所立遏髙陵水以溪爲後湖語林曰禇公遊曲阿後湖狂風忽起􅂳傾禇公巳醉乃曰此舫人皆無可以招天譴者唯有孫興公多塵滓正當以厭天欲耳便欲捉孫擲水中孫懼無計唯大呼曰季野卿念我褚公禇彦回也季野彦回字也伏滔登故臺詩序曰夫差姑蘇臺東有丹湖萬頃内有金銀塘方輿記曰銅􅂳湖馬援鑄銅􅂳五隻一留此湖中四隻將過海征林邑潭幽明録曰碩縣下有􅅭潭以視之􅅭人眼因以爲名傍有田陂昔有人舡行過此陂見一死蛟在陂上不得下無何見一人長壯烏衣立於岸側語行人云吾昨下陂不過而死可爲報􅅭潭行人曰􅅭潭無人云何可報烏衣人云但至潭便大言之行人如其旨須􅁷潭中有􅃅泣聲又曰􅀳元熈中桂陽郡}
