  - {type: variant, offset: 890, length: 376, content: 也源出嶓冢山湟水漢書地理志曰臨羌縣西北至塞外有西王母石室西海鹽池北則湟水所出東至允吾入河湟河亦名樂都水也縣有土樓山無石而高在縣南又有養女嶺被羌多禱而祈女又有牛心堆皆湟水源山名沮水水經曰沮水出漢中房陵縣淮山東南過臨沮縣至枝江縣入于江注云沮陽縣西北景山即荊山之首也山海經曰金玉是出亦沮水之所導也漳水山海經曰漳水出臨沮縣東荊山東南過蓼亭又南過章鄉南至枝江縣北入于沮傳曰江漢沮漳楚之望也王仲宣登樓賦曰夾清漳之通浦倚曲沮之長江雷水水經曰南經大雷戍西注大江謂之大雷口一泒東南流入江謂之小雷口也宋鮑明遠登大雷岸與妹書乃此地又孝子傳云孟宗為雷池監作鮓一器以遺母母不納豫章圖經曰蜀水在豐城縣北按漢書地理志曰蜀水源出縣內小界山東東流入南昌縣漳水合耆老傳云仙人許遜為蜀旌陽縣令有奇術晉末人皆疾癘多往蜀詣遜請救遜與一器水投於上流疾者飲之無不愈也邑人敬其神異故以蜀水為名鄱陽源水, SBCK: 梓潭焉}
