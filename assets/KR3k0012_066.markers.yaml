  - {type: variant, offset: 130, length: 155, content: 蘇林曰泉方四十里湛然不流冬夏不增不減不生草木能興云致雨民旱禱之周地記曰楊班為姚萇將居黃梁谷其西有小谷由來無水夜忽有人聲云湫神移徙借車牛如有影響至西谷中忽有水方二百步其水深淺不測冬夏湛然每水旱百姓祈福屢應也魚龍水水經注曰有一水出縣西山人謂曰小隴山其水東北流歷澗注以成潭出五色魚俗以為龍而莫敢捕採謂是水為魚龍水廉水, SBCK: ''}
