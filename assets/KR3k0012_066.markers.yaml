  - {type: variant, offset: 578, length: 224, content: 立死非此時中則人多悶吐唯五月上伏即無害故諸葛武侯征越嶲上䟽云五月渡瀘深入不毛之地又按地記云今昆明道渡所見有武侯道在又按十道記云水浚急而多巉石土人以牛皮為船方涉津涘弱水說文曰弱水自張掖刪丹西至酒泉合黎餘波入于流沙玄中記曰天下之弱者崑崙之弱水焉鳩毛不能起黑水張掖記曰黑水出縣界雞山亦名玄圃昔娥氏女簡狄浴於玄丘之水即黑水也大柳谷水魏氏春秋曰明帝青龍三年張掖郡刪舟縣金山大柳谷有玄川湓涌寶石出焉有石馬即魏為晉代之符也洮水漢書地理志曰洮水出西羌中北至枹音夫罕, SBCK: ''}
