  - {type: variant, offset: 2817, length: 165, content: 里穿度城今城南流者是因秦舊瀆耳至寶曆初渠道崩壞舟楫不通觀察使李渤遂疊石造堤分二水每水置石斗門一使制之在人開閉開灕水則全入於桂江擁桂江則盡歸於湘水修仁水始興記曰修仁水西南注連水北有三楓亭五渡水齊范雲為始興太守至修仁水酌而飲之賦詩曰三楓何習習五渡何悠悠且飲修仁水不挹階邪流慈廉江交州記曰慈廉江者昔有李祖仁居此兄弟十人並慈孝廉讓因此名江, SBCK: 六}
