  - {type: 'tls:seg', offset: 379, content: '', id: KR3k0012_CHANT_066-6a.9}
  - {type: variant, offset: 379, length: 0, content: '', SBCK: 圖經曰黄墩湖在縣西南其湖有蜃常與吕湖蜃闘程靈銑好勇而善射夢蜃化爲人告之曰吾爲吕湖蜃所厄君能助吾必厚報束帛練者吾也明日靈銑彎弧助之正中後蜃不知所之後人名其處爲蜃灘時有一道人詣靈銑母求食食訖曰勞母設食今當爲求善墓地使母隨行上山以白石識其地曰葬此可以􅁀貴矣靈銑因移父葬其所侯景亂靈銑率郡郷萬餘衆保新安因隨陳武帝有竒功及陳武受梁禪靈銑以佐命功臣與周文昱侯安都爲三傑按靈銑宅在湖東二里徐爰釋問曰􅀇武湖夲桑泊􅀳元帝創爲北湖宋以􅀠舟師京都記云從北望鍾山從宫亭湖望廬岳齊武帝理水軍於此中號曰昆明池故沈約登覆舟山詩云南瞻儲胥館北望昆明池即此尓永嘉末有龍見於湖内故改爲􅀇武湖豫章記曰檐石湖在州東北其湖水中有兩石山有孔如人穿擔狀古老云壯士擔此兩石置湖中因以爲名輿地志曰安成有蜜湖中有􅁝蓴鯽魚爲時所重并有石窟容百人㘴其魚味甘如蜜因此爲名在}
  - {type: page-break, offset: 379, content: '', id: KR3k0012_SBCK_066-6a}
  - {type: variant, offset: 379, length: 0, content: '', WYG: 圖經曰篁墩湖在縣西南其湖有蜃常與吕湖蜃鬬程靈銑好勇而善射夢蜃化為人告之曰吾為吕湖蜃所厄君能助吾必厚報束白練者吾也明日靈銑彎弧助之正中後蜃不知所之後人名其處為蜃灘時有一道人詣靈銑母求食訖曰勞母設食今當為求善墓地使母隨行上山以白䂖識其地曰葬此可以暴貴矣靈銑因移父葬其所侯景亂靈銑率郡鄉萬餘衆保新安因隨陳武帝有竒功及陳武受梁禪靈銑以佐命功臣與周文昱侯安都為三傑按靈銑宅在湖東二里徐愛釋問曰𤣥武湖本桑泊晉元帝太興元年創為北湖京都記云從北望鍾山似宫亭湖望盧岳齊武帝習水軍於此中號曰昆眀池故沈約登覆舟山詩云南瞻儲胥舘北望昆明池即此爾永嘉末有龍見於湖内故改為𤣥武湖豫章記曰擔䂖湖在州東北其湖水中有兩䂖山有孔如人穿擔䂖故老云壯士擔此兩䂖置湖中因以為名輿地志曰安城有宻湖中有蓴菜鯽魚為時所重並有石窟容百人坐其魚味甘如蜜因此為名在}
  - {type: page-break, offset: 379, content: '', id: KR3k0012_WYG_066-10a, image: WYG0893/WYG0893-0544c.png}
