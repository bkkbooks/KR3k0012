  - {type: variant, offset: 374, length: 0, content: '', WYG: 三女墳在郭西云闔閭食蒸魚㽜半賜三女三女怨自殺王痛之遂𦵏於郭西文石為槨金印玉牒銀尊珠盤凡諸珍異悉以送𦵏以水繞墳因謂之女墳湖又曰𦵏女之時有白鶴舞於吳市中因入羡門悉化為犬錢塘記曰去邑十里有詔息湖故老相傳昔秦始皇廵狩經塗暫憇因以詔息為名周景式廬山記曰山頂有一窮湖湖足赭鯉尾鬐皆傷剥而又有一故艑槽崇山峻逺非舟檝所逰豈深谷為陵而此物與丘壑同遷乎顧㣲廣州記曰廬山上有湖至甲戌日輙聞山有鼓角聲劉澄之揚州記曰新城縣東有俱山山上有湖湖中有白鵝一隻時時飛來不可常見劉楨東陽記曰龍目湖秦王東游觀地勢云此有天子氣使赭衣徒鑿湖中長岡使斷因改為丹徒今水北注江也梁典曰武帝望京峴山盤紆似龍掘其右為龍目二湖徐州先賢傳曰勾踐滅吳謂范蠡曰吾將與子分國而有之蠡曰君行令臣行志乃乘扁舟浮五湖而不返水經注曰武強縣耆宿云邑人有行於道見一小蛇疑其有靈持而飬之名曰擔生長而吞噬人里中患之遂捕繫獄擔生負而奔邑淪為湖縣長及吏咸為魚矣今縣東北半里許有淵謂之郎君淵耆宿又言縣淪之日其子東奔又䧟於此故淵得郎君之名矣神異經曰北方荒外有湖方千里平滿無髙下有魚長七八尺形狀如鯉而目赤晝在湖中夜化為人刺之不入煑之不死以烏梅二七煑之即熟食之可以愈邪病又曰北方荒中有石湖方千里無凸凹上直結反下於交反平滿無髙下岸深五尺餘恒氷唯夏至左右五六十日觧耳又曰東南海中烜洲上有温湖其中唯有鯽魚焉長八尺食之宜暑而避寒郡國志曰潤州遏陂有湖名龍目湖京口出好酒人習戰故桓温云京口土瘠人窶無可戀唯酒可飲兵可用耳會稽記曰}
