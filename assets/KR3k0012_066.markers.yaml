  - {type: variant, offset: 2309, length: 181, content: 益水誠資水之殊目郡國志云資水岸有石頭城即吳將周瑜築也枉水湘州記曰枉山在郡東十七里有枉水出焉山西溪溪口有小灣謂之枉渚山上有楚祠存焉沅水水經曰沅水出牂牁且蘭縣為旁溝水東北至鐔城縣為沅水又曰沅水之北有奇山山有秀峰上枝綠蘿濛幕頹巖臨水實釣渚漁詠之勝也其幽響若鍾音信神仙之所居滄浪水永初山川記曰漢水古為滄浪即漁父所云滄浪之水清今滄浪水合流出鐔城北界山此蓋後人名之非古滄浪也, WYG: 底}
