  - {type: variant, offset: 5, length: 1, content: 說, SBCK: 有角而不能觸麞一名􅍪青州人謂􅍪爲麞抱朴子曰麞兎入軍中當徙之又曰山中稱赤吏者麞也吕氏春秋曰使麞疾走馬弗及也而得之者時願也瑞應圗曰宋}
  - {type: variant, offset: 5, length: 1, content: 說, WYG: 有角而不能觸麞一名麕青州人謂麕為麞抱朴子曰麞入軍中當遷徙之又曰山中稱赤吏者麞也吕氏春秋曰使麞疾走馬弗及也而得之者時顧也瑞應圖曰宋元嘉華林園養麞生二百子}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_WYG_907-1b, image: WYG0901/WYG0901-0092b.png}
  - {type: variant, offset: 5, length: 0, content: '', krp: 有角而不能觸麞一名􅍪青州人謂􅍪爲麞抱朴子曰麞兎入軍中當徙之又曰山中稱赤吏者麞也吕氏春秋曰使麞疾走馬弗及也而得之者時願也瑞應圗曰宋文元嘉二十五年華林園飬麞生二百子文帝又獲青麞晉起居注曰咸寧中白麞見魏郡後諸州各送白麞異苑曰青州劉幡元嘉𥘉射得一麞剖肚藏以草塞之厥然起走幡怪而拔塞湏臾復還倒如此三焉幡宻録此種求類治傷痍多愈北史曰後魏廣平王懷甞獵於河北馬塲間逐一麞入草命人圍遶將自射之田巳先經燒不見其出遂失麞所在唯有塼塔存焉懷乃悵然動仁恕之心解鷹放犬遂不復獵蕭廣濟孝子傳曰蕭國遭喪有鵠遊其庭至暮而玄麞暮入其門與馬犬侣至旦而去王𫐠上白麞表曰所領阮藻之於江寧縣界得白麞一頭毛色鮮㓗異於類誠嘉祥也􅍪几筠切爾雅曰􅍪牡麌牝麋音栗其子麆音助其跡解絶有力豜音肩}
  - {type: punctuation, offset: 7, content: 》, id: KR3k0012_CHANT_907-bkkpn2}
  - {type: variant, offset: 7, length: 0, content: '', SBCK: 元嘉二十五年華林園飬麞生二百子文帝又獲青麞晉起居注}
  - {type: variant, offset: 7, length: 0, content: '', WYG: 帝又獲青麞晉起居注}
