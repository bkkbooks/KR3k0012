  - {type: variant, offset: 3534, length: 139, content: 靡上下天地與神合謀周禮天官獸人曰獸人夏獻麋左傳宣下曰晉楚戰楚致晉師晉人逐之左右角之樂伯左射馬而右射人角不能進矢一而已麋興於前射麋麗龜晉鮑癸當其後使攝叔奉麋獻焉又曰魯莊公十七年多麋害稼又哀十四年傳曰宋桓魋之寵害於公將討之召左師曰跡人來告曰逢澤有介麋焉離騷曰麋何食兮庭中蛟何為兮水裔, WYG: 兎以背毛飛也}
