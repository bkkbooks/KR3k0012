  - {type: variant, offset: 2274, length: 0, content: '', SBCK: 此殿下冝速副天人之望也於是大赦改咸和三年曰大和王隱晉書曰慕容皝田于南鄙見父老曰此非獵所言卒不見旣明日又出見白兎馳射之墜馬于石即死後魏書曰有兎入於後宮撿問門官無從得入太祖恠之令崔浩推其咎徵浩以爲當有隣國貢嬪嬙者明年姚興果來獻女三國典略曰周命尉遟逈伐蜀帥甲士一萬二千􅀐萬疋自散􅀜由固道而入太祖送於城西見一走兎命弟中領軍網射之網誓曰􅀂獲此兎必當破蜀俄而獲兎太祖喜曰事平之日賞汝佳口及剋蜀乃賜侍婢二人隋書曰華秋汲郡臨河人也㓜喪父事母以孝聞家貧傭賃爲飬其母卒秋髮盡秃落廬於墓側􅀒土成墳有人欲助之者秋輒拜而止之大業􅀄調狐皮郡縣大獵有一兎人逐之奔入秋廬中匿秋膝下獵人至廬所異而免之自尓此兎常􅀫廬中馴其左右郡縣嘉其孝感具以狀聞春秋考異尤曰熒惑不明雉生兎焉春秋運斗樞曰行失揺}
  - {type: page-break, offset: 2274, content: '', id: KR3k0012_SBCK_907-3b}
  - {type: page-break, offset: 2274, content: '', id: KR3k0012_SBCK_907-4a}
  - {type: variant, offset: 2274, length: 37, content: 光暉王者孝道則至又曰王者承先聖法度無所遺失則白鹿來禮斗威儀曰君乘水而正其政, WYG: 此殿下宜速應天人之望也於是大赦改咸}
  - {type: variant, offset: 2274, length: 0, content: '', krp: 此殿下冝速副天人之望也於是大赦改咸和三年曰大和王隱晉書曰慕容皝田于南鄙見父老曰此非獵所言卒不見旣明日又出見白兎馳射之墜馬于石即死後魏書曰有兎入於後宮撿問門官無從得入太祖恠之令崔浩推其咎徵浩以爲當有隣國貢嬪嬙者明年姚興果來獻女三國典略曰周命尉遟逈伐蜀帥甲士一萬二千騎萬疋自散關由固道而入太祖送於城西見一走兎命弟中領軍網射之網誓曰若獲此兎必當破蜀俄而獲兎太祖喜曰事平之日賞汝佳口及剋蜀乃賜侍婢二人隋書曰華秋汲郡臨河人也㓜喪父事母以孝聞家貧傭賃爲飬其母卒秋髮盡秃落廬於墓側負土成墳有人欲助之者秋輒拜而止之大業𥘉調狐皮郡縣大獵有一兎人逐之奔入秋廬中匿秋膝下獵人至廬所異而免之自尓此兎常宿廬中馴其左右郡縣嘉其孝感具以狀聞春秋考異尤曰熒惑不明雉生兎焉春秋運斗樞曰行失揺}
