  - {type: variant, offset: 3703, length: 0, content: '', WYG: 楚王佩玦}
  - {type: variant, offset: 3704, length: 1, content: 麋, WYG: 兎馬速玦破乃取兩玦重而著之其破愈疾述異記曰殷紂之時大龜生毛兎生角兵甲中興之兆也春秋後語曰昔齊有良兎曰東郭俊本或作狡曰以其善走故俊一日走百里有良狗韓子獹黒犬也獹讀如盧也亦一日而走百里使人遥見而指屬指屬猶指縦也屬音之欲切則雖韓獹不及良兎躡跡而蹤之則雖東郭不能離也春秋後語曰淳于髠説齊威王曰韓子獹者天下之壯犬也東郭俊者海内之狡兎也韓子獹逐東郭俊環山者三騰山者五兎極於前而犬疲於後犬兎俱疲各死其處田父見而獲之無勞倦之苦而擅其功今齊魏相持頓兵敝衆臣恐强秦大楚乗其後而有田父之功威王懼而罷兵又曰莊辛對楚王曰臣聞鄙諺曰見兎而顧犬未為晚也亡羊而補牢未為遲也又曰馮鍰謂孟嘗君曰聞狡兎有三窟范子計然曰兎毛出𤣥莵樂浪竹書紀年曰昭王十九年天大曀雉兎皆震宣王三十年有兎舞鎬風俗通曰食兎髕音牝者令人面生䯣食得髕者賞以寒酒按秦法言好車裂抽脅黔首飲泣永歎故食兎髕以為嘉瑞全己之髕也所以有賞耳古今注曰成帝建平元年山陽得白兎目赤如朱京房妖占曰兎止城上邑必虛入宫生子空虛廣志曰漢諸郡獻兎毫書鴻都門題惟趙國毫中用論衡曰兎䑛雄毫而孕及其生子従口中出又博物志曰兎望月而孕兎吐子舊有此説余目所見也又曰儒者言月中兎夫月中水也兎在水中無不死者夫兎月氣也又曰姙娠}
