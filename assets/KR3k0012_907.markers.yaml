  - {type: variant, offset: 1853, length: 271, content: 人曰向薪者夢得鹿而不知其處吾今得之管子曰桓公問管子楚之強國舉兵伐之恐力不能過奈何對曰公貴買其鹿公即為百里之城使人載錢二千萬求生鹿於楚人楚人釋其耕農而田鹿管子告楚人賈曰為我致生鹿賜子金百斤什至金千斤尸子曰鹿走而無顧六馬不能望其塵謂不反顧也呂氏春秋曰晏子遭崔杼之患其僕將馳晏子安之曰疾必不生徐必不死鹿生於山命懸於廚今嬰有所懸也抱朴子曰昔張盍蹹音沓及儒甯成二人並精思於蜀雲臺山石室中忽有一人著黃練單衣葛巾到其前曰勞乎道士乃辛苦幽深於是二人顧視於鏡中乃見是鹿也因問曰汝是草中老鹿何敢詐為人形也言絕即還成鹿而走去瀨鄉記李母碑曰老子乘白鹿下託於李母韓詩外, SBCK: ''}
