  - {type: variant, offset: 179, length: 1421, content: 苹又蕩桑柔曰瞻彼中林甥甥其鹿左傳文下曰晉侯不見鄭伯以為貳於楚鄭家使執訊而告趙宣子曰古人有言曰畏首畏尾身其餘幾又曰鹿死不擇音小國之事大國也德則其人也不德則其鹿也挺而走險急何能擇又襄十四年傳曰范宣子執戎子駒支數之曰今諸侯之事我寡君不如昔者蓋言語漏洩則職汝之由戎子駒支曰昔文公與秦伐鄭秦人竊與鄭盟於是乎有殽之師晉御其上戎亢其下秦師不復我諸戎實然譬如捕鹿晉人角之諸戎掎之與晉踣之禮記月令曰仲夏鹿角解又禮器曰居澤者不以鹿豕為禮史記曰趙高欲為亂恐群臣不聽乃先驗持鹿於二世曰馬也二世笑曰丞相誤耶謂鹿為馬問左右左右或言馬以阿趙高或言鹿高因陰中言鹿者以法又曰邑中人民俱出獵任安常為人分麋鹿雉兔部署大小劇易眾人皆喜鹿而曰無傷也任少卿分別平又曰古者皮幣諸侯以聘享漢武帝乃以白鹿皮方尺緣以藻繢為幣直四十萬王侯朝覲享聘必以為薦璧然後得行漢書曰蒯通教韓信反高祖高祖召通至問曰汝何教韓信反耶蒯通曰臣聞狗各吠非其主當彼時臣以知齊王不知陛下且秦失其鹿天下共逐之高才者先得又曰伍被諫淮南王曰昔子胥諫吳王吳王不用迺曰臣今見麋鹿遊姑蘇之臺今臣亦見宮中生荊棘也東方朔別傳曰武帝時有殺上林鹿者下有司收殺之朔時在旁曰是固當死者三使陛下以鹿殺人一當死天下聞陛下重鹿賤人二當死匈奴有急須鹿觸之三當死帝默而赦之范曄後漢書曰雲南縣有神鹿兩頭食毒草華陽國志曰熊蒼山有神鹿食毒謝承後漢書曰鄭弘為臨淮太守行春兩白鹿隨車俠轂而行弘怪問主簿黃國鹿為吉凶國拜賀曰聞三公車畫作鹿明府當為宰相後弘果為太尉魏志曰蘇則從文帝獵失鹿帝大怒踞胡床拔刀悉收行督吏將斬之則諫之乃止晉書曰許孜字季義東陽吳寧人也二親沒棄妻宿墓所列植松柏亙五六里時有鹿犯其松栽孜悲歎曰鹿獨不念我乎明日忽見鹿為猛獸所殺置於所犯栽下孜悵惋不已乃作塚埋於隧側猛獸即孜前自投而死孜益歎息復埋之又曰謝鯤在豫章嘗行經空亭中夜宿此亭舊每殺人將晚有黃衣人呼鯤字令開戶鯤澹然無懼色便於窗中度手牽之膊斷視之鹿也尋即獲焉後此亭無復妖怪晉中興書曰陶淡字處淨太尉侃之孫一身孑然無有同產齠齓之時雅好導飬謂仙道可祈至年十五六便服食絕穀不婚娶居長沙臨湘縣下去家十里於山中立小草屋裁足容身時還家設小床常獨坐不與人共於野得白鹿子馴而養之至七八歲恒與之俱往還後遂不復還家又曰殷仲堪上白鹿表曰巴陵縣青水山得白鹿一頭白者正色鹿者景福嘉義晉書載記曰石勒嘗傭於武安臨水為遊軍所囚會有群鹿傍過軍人競逐之勒乃獲免俄而又見一父老謂勒曰向群鹿者我也君應為中州主故相救耳勒拜而受命蕭子顯齊書曰始興盧度隱居西昌三顧山鳥獸隨之夜有鹿觸其壁度曰汝勿壞我壁鹿應聲去南史四夷傳曰扶南有鹿車國人養鹿如中國畜牛以乳為酪隋書曰開皇十七年群鹿入殿門馴擾侍衛之內後周書曰文帝獵於邙山圍不齊獸多越逸帝怒諸將股慄俄有一鹿亦突圍而走賀若敦躍馬逐之鹿上東原棄馬步逐山半便及掣之而下帝大悅諸將免罪唐書曰太宗幸懷州乙未狩於濟源之陵上親御狐矢太宗曰古者先驅以供宗廟今所獲鹿宜令有司造脯醢以充薦享又曰褚禇無量丁母憂解職廬於墓側其所植松柏時有鹿犯之無量泣而言曰山中眾草不少何忍犯吾先塋樹栽因通夕守護俄有群鹿馴狎不復侵害魏名臣奏曰時殺禁地鹿者死郎中黃觀上䟽曰臣深思陛下所以不早取此鹿誠欲使亟蕃息然後大取以為軍國之用也然臣切以為今鹿但有日耗終無得多也魏末傳曰明帝為平原王母甄后妬文帝殺之欲不立為太子嘗從帝獵見鹿子母帝射鹿母語明帝射鹿子明帝曰陛下既已殺其母臣不忍復殺其子因大涕泣帝放弓矢由是立太子意定國語曰周穆王征犬戎得四白鹿而荒服者不至史記又載, SBCK: ''}
