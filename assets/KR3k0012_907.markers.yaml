  - {type: variant, offset: 2530, length: 8, content: 漢成帝末年宮中雨, SBCK: 殷紂之時大􅀛生毛兎生角兵甲將興兆也春秋後語曰昔齊有良兎曰東郭俊本或作狡兎以其善走故曰俊}
  - {type: variant, offset: 2530, length: 1, content: 漢, krp: 殷紂之時大龜生毛兎生角兵甲將興兆也春秋後語曰昔齊有良兎曰東郭俊本或作狡兎以其善走故曰俊一日走百里有良狗曰韓子獹黒犬也獹讀如盧也亦一日而走百里使人遥見而指屬指属猶指蹤也属音之欲切則雖韓獹不及良兎躡跡而蹤之則雖東郭不能離也春秋後語曰淳于髠說齊威王曰韓子獹天下之壯犬也東郭俊者海内之狡兎也韓子獹逐東郭俊環山者三騰山者五兎極於前而犬疲於後犬兎俱疲各死其處田父見而獲之無勞倦之苦而擅其功今齊魏相持頓兵弊衆臣恐強秦大楚乘其後而有田父之功也威王懼而罷兵又曰㽵辛對楚王曰臣聞鄙諺曰見兎而頋犬未爲晩也亡羊而𥙷牢未爲遲也又曰馮煖謂孟嘗君曰聞狡兎有三穴范子計然曰兎毫出玄莵樂浪書紀年曰昭王十九年天大曀雉兎皆震宣王三十年有兎舞鎬風俗通曰食兎􅩋音牝者令人靣生􅩋食得􅩋者賞以寒酒按秦法言好車裂抽脅黔首飲泣永歎故食兎􅩋以爲嘉瑞全巳之􅩋也所以有賞耳古今注曰}
