  - {type: variant, offset: 3676, length: 1, content: 鰌, WYG: 蹄者所以獲兎也得兎而忘蹄蹄者取兎網韓子曰宋人有耕者田中有株兎走觸折頭而死因釋耕守株冀復得兎為宋國笑慎子曰一兎走街百人追之積兎於市過而不視非不欲得定不爭也文子曰飛鳥返鄉兎走歸窟狐死首丘抱朴子曰兎壽千嵗五百歳其色白又曰山中夘日稱丈人者兎也又曰采女丹法以兎血和丹}
