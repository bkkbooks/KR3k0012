  - {type: variant, offset: 1644, length: 208, content: 天子征于菹側魚切臺狎菹之獸於是有白鹿一迕音悟乘逸走出天子乘渠黃之乘馳焉山海經曰上申之山其獸多白鹿辛氏三秦記曰有白鹿原周平王時白鹿出此原太公六韜曰取天下若逐野鹿得其鹿天下共食肉莊子曰至德之世不尚賢不使能民如野鹿韓子曰夫馬似鹿者而題千金有百金之馬而無一金之鹿者馬為人用而鹿不為人用列子曰鄭人有薪於野者遇駭鹿卻而擊之斃恐人見之遽而藏諸隍中覆之以𧆀不勝其喜俄而遺其所藏之處遂以為夢焉從塗而詠其事傍人有聞者用其言而取之既歸告其, SBCK: 宗}
