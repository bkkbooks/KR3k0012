  - {type: variant, offset: 2268, length: 2, content: 能壽, SBCK: 瑞獸王者盛德則至典略曰兎者明月之精詩小雅曰巧言躍躍毚兎遇犬獲之又國風有兎曰有兎爰爰雉離于羅爰爰緩意又小雅瓠葉曰有兎斯首炮之燔之斯白也字或作鮮史記曰李斯出獄頋謂其子曰吾欲與尓復牽黄犬俱出上蔡東門逐狡兎其可得乎又曰范雎謂􅁗昭王曰夫以􅁗而治諸侯譬􅀂縱韓盧而摶蹇兎也謝承後漢書曰儒叔林爲東郡太守赤烏巢於屋梁兎産於􅇃下又曰方儲字聖明丹陽歙人㓜喪父事母母死􅀒土成墳種樹千株鸞鳥栖集其上白兎遊其下范曄後漢書曰南徼外蠻夷獻白雉兎又曰蔡邕性篤孝母嘗滯病三年邕自非寒暑節變未嘗解衿帶不寢寐七旬母卒廬於􅃁側動静以禮有兎馴擾其室傍漢獻帝春秋曰張楊大將睦固屯於射犬巫戒之曰將軍本名白兎兎見犬必驚不宜屯此固不從司空曰兎入犬城伹當取遂進軍擊平之張璠漢記曰梁冀起兎􅁐於河南移檄所調發生兎刻其毛以爲識民有犯者罪至死西域嘗有賈胡來不知禁誤殺一兎轉相告坐死者十餘人也晉書載記曰石勒時茬叔之切平令師歡獲黒兎獻之於勒或以爲勒龍飛革命之祥於晉以水承金兎隂精}
  - {type: page-break, offset: 2268, content: '', id: KR3k0012_SBCK_907-3a}
  - {type: variant, offset: 2268, length: 2, content: 能壽, WYG: 瑞獸王者盛徳則至典略曰者明月之精詩小雅巧言曰躍躍毚遇犬獲之又國風曰有爰爰雉離於羅爰爰緩急意又小雅瓠葉曰有斯首炮之燔之斯白也史記曰李斯出獄頋謂其子曰吾欲與爾復牽黄犬俱出上蔡東門逐狡其可得乎又曰范雎謂秦王曰夫以秦而治諸侯譬如縦韓盧而搏蹇也謝承後漢書曰儒叔林為東郡太守赤烏巢扵屋梁白産於床下又曰方儲字聖明丹陽歙人幼䘮父事母母死負土成墳種樹千株鸞鳥栖集其上白兎遊其下范􅁮後漢書曰南徼外蠻夷獻白雉又曰蔡邕性篤孝母嘗滯病三年邕自非寒暑莭變未嘗解衿帶不寢寐七旬母卒廬於塜側動靜循禮有馴擾其室傍漢獻帝春秋曰張楊大將陸固屯於謝犬巫戒之曰將軍本名曰兎兎見犬必驚不宜屯此固不從司空曰兎入犬城但當敗遂進軍擊平之張璠漢記曰梁冀起兎苑於河南移檄所在調發生兎刻其毛以為識民有犯之者罪至死西域嘗有賈人来不知禁誤殺一兎轉相吿坐死者十餘人也晉書載記曰石勒時荏叙之切平令師歡獲黑兎獻之扵勒或以為勒龍飛革命之祥於晉以水承金兎隂精}
