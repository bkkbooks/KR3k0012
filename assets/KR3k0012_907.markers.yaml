  - {type: variant, offset: 2880, length: 62, content: 水搜神記曰淮南陳氏於江西種豆忽見二女子姿色甚美著紫纈襦青裙天雨而衣不濡其壁先挂一銅鏡中見二鹿以刀斫獲之以為脯宣驗記曰吳唐廬陵, WYG: ''}
