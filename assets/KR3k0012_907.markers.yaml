  - {type: variant, offset: 2842, length: 1195, content: 林西苑中射工尚得脯腊之黃鶴摩天極高飛後宮尚得烹煮之金樓子曰夏禹之時神鹿行於河水搜神記曰淮南陳氏於江西種豆忽見二女子姿色甚美著紫纈襦青裙天雨而衣不濡其壁先挂一銅鏡中見二鹿以刀斫獲之以為脯宣驗記曰吳唐廬陵人也少好驅媒獵射發無不中家以致富後春月將兒出射正值麋鹿將麑母覺有人氣呼麑漸出麑不知所猥逕前就媒唐射麑即死鹿母驚還悲鳴唐乃自藏於草中出麑致淨地鹿母直來地俯仰頓伏絕而復起唐又射鹿母應弦而倒至前場復逢一鹿上弩將放忽發箭反激還中其子唐擲弩抱兒撫膺而哭聞空中呼曰吳唐鹿之愛子與汝何異唐驚聽不知所在高堂隆集曰近日有司宣令有殺禁地鹿者身死財產沒官有能先覺白者賞賜之此為重禽獸而賤人過於齊宣矣杜祭酒別傳曰君弟子三人隨道士邢邁入宣城涇縣白水山去縣七十里餌朮黃精經歷年所有鹿走依舍邊伏眠邁等怪之乃為虎所逼邁乃呪虎退鹿經日乃去南中八郡志曰麋冷縣深山中有大虵長數丈圍三尺於樹上野鹿過便低頭繞之鹿於是有頃而死先含水濡之令濡乃合頭角併吞之訖便不能動至數日鹿乃消盡虵自繞樹鹿角骨悉鑽皮出飬瘡得一月乃愈永初山川記曰髯虵吞鹿至角乃止交州記曰合浦口有麚角當額上載科藤一株三四條長可一尋射師從禽每見而不敢射蕭廣濟孝子傳曰伍襲字世公丁父憂廬墓側有一鹿每襲哭輒踞墳而悲鳴廣州先賢傳曰丁茂字仲慮交阯人至孝母終負土治冢列樹松柏白鹿遊乎左右又曰唐頌字德雅番禺人遭喪六年廬於墓次白鹿拾食冢邊習鑿齒襄陽記曰習郁從光武幸黎丘與光武通夢見蘇頷神帝嘉之使立祠二石鹿夾道口百姓謂之鹿門麋爾雅釋獸曰麋牡麔牝麎其子䴠其跡躔絕有力狄麋音眉麔平表切麎音臣䴠於道切說文曰麋鹿屬也冬至解角春秋運斗樞曰搖光星散為麋春秋命歷序曰有人黃頭大腹出天齊號曰皇次駕六飛靡上下天地與神合謀周禮天官獸人曰獸人夏獻麋左傳宣下曰晉楚戰楚致晉師晉人逐之左右角之樂伯左射馬而右射人角不能進矢一而已麋興於前射麋麗龜晉鮑癸當其後使攝叔奉麋獻焉又曰魯莊公十七年多麋害稼又哀十四年傳曰宋桓魋之寵害於公將討之召左師曰跡人來告曰逢澤有介麋焉離騷曰麋何食兮庭中蛟何為兮水裔莊子曰鰌與魚遊麋與鹿淮南子曰孕婦見兔其子缺脣見麋而子四日又曰逐麋者不顧雉兔新序曰晉文公逐麋而失之問農夫古老古老以足指如是往公問其故對曰虎豹厭閑而近人故得魚鱉厭深而之淺故得諸侯厭眾而亡其國文公懼歸有悅色欒貞子問焉公曰今日逐麋失之而得善言故忻也魏略曰文帝將受禪有白麋見戴延之西征記曰徽音殿西南姚興起波若臺有逍遙園西去三百步有鹿子苑羗王飬麋鹿數百頭麂爾雅曰麂音几大麕九筠切旄毛狗足旄毛㺜長山海經曰女几之山有獸多麕郭璞曰麕似麞而大孫氏瑞應圖曰晉中興書元帝時有二白麂見于南昌郡臨海記曰郡西北候官山有三足麂其聲嘶嗄二千石官長將有代謝則嗄麂鳴矣民以為常占未曾一失麈說文曰塵鹿屬也大而一角搜神記曰馮乘虞蕩夜獵見一大麈射之麈便云虞蕩汝射殺我耶明晨得一麈而入少時蕩死鄱陽記曰李嬰弟縚音韜二人善於用弩嘗得大麈解其四腳懸著樹間以臟為炙烈於火上方欲共食山, SBCK: 陛}
