  - {type: variant, offset: 2972, length: 286, content: 覺有人氣呼麑漸出麑不知所猥逕前就媒唐射麑即死鹿母驚還悲鳴唐乃自藏於草中出麑致淨地鹿母直來地俯仰頓伏絕而復起唐又射鹿母應弦而倒至前場復逢一鹿上弩將放忽發箭反激還中其子唐擲弩抱兒撫膺而哭聞空中呼曰吳唐鹿之愛子與汝何異唐驚聽不知所在高堂隆集曰近日有司宣令有殺禁地鹿者身死財產沒官有能先覺白者賞賜之此為重禽獸而賤人過於齊宣矣杜祭酒別傳曰君弟子三人隨道士邢邁入宣城涇縣白水山去縣七十里餌朮黃精經歷年所有鹿走依舍邊伏眠邁等怪之乃為虎所逼邁乃呪虎退鹿經日乃去南中八郡志曰麋冷縣深山中有大虵長數丈圍三尺於樹上野鹿過便低頭繞之鹿於是有頃而死先含水濡之令濡乃合頭角併吞之訖便不能動至數日鹿乃消, WYG: 卒秋髪}
