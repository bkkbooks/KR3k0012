  - {type: variant, offset: 3898, length: 1, content: 二, WYG: 恭軍夜坐忽見屋棟樑間有一伏兎張目切齒而向之甚可畏惡兎来轉近遂引刀而斫之正中於兎而實反傷其膝流血滂沱深怪此意合家中悉蔵刀刄不以自近後忽復見如前意廽惑復𦂳刀重斫因傷委頓幸刀不利故不至死再過而止傅𤣥歌辭曰兎擣藥月間安足道神烏􅃧雲間安足道楚辭天問曰夜光何徳死則又育夜光月也育生也古豔歌曰焭焭}
