  - {type: variant, offset: 2638, length: 241, content: 江所獻博物志曰雲南郡出茶首茶首其音為蔡茂是兩頭鹿名也獸似鹿兩頭其腹中胎常以四月中取可以治虵虺毒永昌亦有之異苑曰鄱陽樂安彭世咸康中以捕射為業入山輒與兒俱世後忽蹙然倒地變成一白鹿咷蹻而去其子終身不復捉弩至孫復襲此事曾射得一鹿兩角間有道家七星符其祖名字鄉居年存焉覩之懊悔遂斷獵伏侯古今注曰漢明帝永平九年三角鹿出江陵孝和帝永元十二年豫章餘干得白鹿高丈九寸楚辭曰青莎雜樹薠音煩草靃靡白鹿麕麚或騰或倚樂府歌詩曰白鹿乃在上林西苑中射工尚得脯腊之黃鶴摩天極高飛後宮尚得烹煮之金樓子曰夏禹之時神鹿行於, WYG: ''}
