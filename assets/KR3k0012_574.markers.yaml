  - {type: variant, offset: 2450, length: 6, content: 秦青響遏行雲, SBCK: 曰陶唐氏陽多滯伏民氣壅閼故爲舞以宣導之樂苑曰羽調有柘枝曲啇調有掘柘枝此舞因曲爲名用二女童鮮衣帽帽施金鈴抃轉有}
  - {type: variant, offset: 2450, length: 124, content: 秦青響遏行雲聲振林木薛談秦青弟子韓娥齊人餘響遶梁三日已上三人列子王豹處於淇而河西善謳綿駒處高堂而齊右善歌瓠梁見淮南子魯人虞公見劉向別錄李延年見漢書古歌曲有陽陵白露朝日魚麗白水白雲江南陽春淮南駕辨綠水陽阿採菱下俚巴人並見襄陽耆舊轉及梁元帝纂要八闋葛天, WYG: 曰陶唐}
