  - {type: variant, offset: 2842, length: 238, content: 時歌出於子夜子夜歌古有女名子夜造此歌上聲歌亦名捉住哀悲之古曲白紵歌起於吳孫皓時作襄陽白銅鞮歌前溪歌晉車騎將軍沈玩所作歎聞歌晉穆帝初歌畢輒呼歎聞因以為名團扇歌晉中書令王珉與嫂婢芳姿有私愛甚篤苦捶撻之婢素善歌而珉之好捉白團扇因見珉之歌曰白團扇顦顇非昔容羞與郎相見願得隨郎手因風從方便後人因歌之丁督護歌彭城內史徐逵之為魯軌所殺府內督護丁旿收殯歛之逵之妻晉公主呼問事每問輒歎息曰丁督護其聲哀切後人因為曲焉懊惱歌崇安初人間訛謠之曲又云石崇為綠珠作古有絲布澀難縫一曲而已宋太祖謂之中朝曲也, WYG: ''}
