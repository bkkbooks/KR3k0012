  - {type: variant, offset: 2329, length: 0, content: '', SBCK: 一丈黄踈單衣角巾來詣之翩翻舉其兩手並舞而來語何云君甞見韶舞不此是韶舞且舞且去尋逐徑向山山有穴裁容人即入穴何亦隨之見有良田數十頃何遂墾作以爲丗業子孫于今賴之搜神記曰太康中天下爲晉丗寕之舞其舞抑手以執杯盤而反覆之反覆至危也杯盤酒食器也而名晉丗寕者言時人茍且酒食之間而其智不及逺如噐在手也英雄記曰建安中曹操於南皮攻􅀽譚斬之操作皷吹自稱萬歳於馬上舞十二年攻烏桓蹹頓一戰斬蹹頓首繫馬鞍於馬上抃舞}
  - {type: page-break, offset: 2329, content: '', id: KR3k0012_SBCK_574-6b}
  - {type: variant, offset: 2329, length: 0, content: '', WYG: 一丈黄疎單衣角巾來詣之翩翻舉其兩手並舞而來語何云君嘗見韶舞否且舞且去尋逐徑向山山有穴裁容人即入穴何亦隨之見有良田數十頃遂墾作以為世業子孫于今頼之搜神記曰太康中天下為晉世寕之舞其舞抑手以執杯盤而反覆之反覆至危也杯盤酒器也而名晉世寕者言時人苟且酒食之間而其智不及遠如器在手也英雄記曰建安中曹操於南皮攻袁譚斬之操作鼓吹自稱萬嵗於馬上舞十二年攻烏桓蹹頓一戰斬蹹頓首繫馬鞍作馬抃舞}
