  - {type: variant, offset: 92, length: 1, content: 博, SBCK: 舞仕者属焉凢􅀕祀賔客舞其燕樂籥師掌教國子舞羽吹籥文舞有持羽吹籥舞者所謂籥舞文王丗子曰冬斈羽籥詩曰左手執籥右手秉翟也􅀕祀則鼔羽籥之舞鼔之者􅁪􅁪為之節賔饗則亦如之又曰地官旄人掌教舞散樂舞夷樂散樂野人爲樂之善者也夷樂四夷之樂也左傳隠公曰舞所以節八音而行八風也又莊公曰王子頽樂及徧舞又昭三曰晉侯與諸侯宴于温使大夫舞曰歌詩必􅀋髙厚之詩不􅀋大夫盟髙厚髙厚逃歸又隠公曰考仲子之宫將万焉公問羽舞數於衆仲對曰天子用八諸侯用六大夫四}
