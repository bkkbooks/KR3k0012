  - {type: variant, offset: 276, length: 2, content: 幽蘭, WYG: 沐猴舞失禮許伯為謝乃解後漢書曰光武平隴蜀増廣郊祀髙皇帝配食樂奏青陽朱明西皓𤣥冥雲翹育命舞北郊及祀明堂並奏樂如南郊迎時氣五郊春歌青陽夏歌朱明並舞雲翹之舞秋歌西皓冬歌𤣥㝠並舞育命之舞季夏歌朱明兼舞二舞又曰蔡邕坐上章事徙及歸将就還路五原太守王智餞之酒酣智起舞屬邕邕不為報智者中常侍王甫之弟智銜之密告邕怨於囚放謗訕朝廷邕慮卒不免禍乃亡命江海遠迹呉㑹呉書曰凌統怒甘寜殺其父操寕常備統不與相見權亦命統不得讐之嘗於吕蒙舎㑹酒酣乃以劍舞寕起曰寕能雙㦸舞蒙曰寕雖能未若蒙上之也因操劍持楯以身蔽之後權知統意因令寕将兵徙屯中洲又曰陸遜破曹休上與羣僚大㑹酒酣命遜舞解所着白鼯子裘賜之又曰陶謙為舒令郡守張磐謙耻為之屈磐舞屬謙謙不為起强之乃舞舞不轉磐曰不當轉耶曰轉則勝人宋書樂志曰鞞舞}
