  - {type: variant, offset: 33, length: 3, content: 將何悟, WYG: 執以手袖為威儀也籥師掌教國子舞羽吹籥文舞有持羽吹籥舞者所謂籥舞文王世子曰冬學羽籥詩曰左手執籥右手秉翟也祭祀則鼓羽籥之舞鼓之者恒之為節賔饗則亦如之又曰春官旄人掌教舞散樂舞夷樂散樂野人為樂之善者也夷樂四夷之樂也凡四方之舞仕者屬焉凡祭祀賔客舞其燕樂左傳隱公曰舞所以節八音而行八風也又荘公曰王子頺樂及徧舞又昭王曰晉侯與諸侯宴於温使大夫舞曰歌詩必類髙厚之詩不類大夫盟髙厚髙厚逃歸又隱公曰考仲子之宫将萬焉公問羽舞數於衆仲對曰天子用八諸侯用六大夫四士二夫舞所以節八音而行八風也故自八已下公從之又荘公曰楚令尹子元欲蠱文夫人聞泣曰先君以是舞也習戎備也}
