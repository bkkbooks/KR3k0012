  - {type: variant, offset: 2731, length: 2, content: 歌曲, WYG: 圜丘方澤太廟祠享然後用此舞餘祭並停又曰大足元年天后幸京師同州刺史蘇瓌進聖主還京樂舞上御行宫樓觀之賜以束帛令編於樂府沈志曰江右初}
