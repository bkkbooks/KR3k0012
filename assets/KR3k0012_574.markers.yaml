  - {type: variant, offset: 1774, length: 175, content: 俟賓客正月上午有八老公詣門求見王曰群娥子復來也公知不見乃更形為八童子王驚見之盛禮設樂以享八公援琴而絃歌曰明明上天照四海兮知我好之公來下兮公將與余生毛羽兮升騰青雲蹈梁甫兮觀見三光過北斗兮驅乘風雲使玉女兮今所謂淮南操是也幽明錄曰勾章人至東野還暮不至門見路傍有小屋燈火因投寄宿止宿有一小女不欲與丈夫共宿呼鄰家女自伴夜共彈琴箜篌至曉此人謝去問其姓字女不荅彈絃, WYG: 受㑹}
