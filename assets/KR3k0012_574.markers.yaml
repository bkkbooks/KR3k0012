  - {type: variant, offset: 1149, length: 408, content: 命西河女也加減其節奏頗有新聲未進間先印可於青青潛令紅於屏風後聽之紅乃以小豆數合以記其節拍樂工歌罷青因入問紅何如紅曰已唱得矣青出給云某有女弟子久曾唱非新曲也即令隔屏唱之一聲不失樂工大驚異遂請相見歎伏不已兼云此曲先有一聲不穩今已正矣尋達上聽翌日召入宜春院寵澤隆異宮中號為記曲娘子尋為才人一日內史奏韋青卒上告紅紅乃於上前嗚呼奏云妾本風塵丐者一旦老父死有所歸致身入內皆自韋青妾不忍忘其恩因一慟而絕上嘉歎久之即贈昭儀又曰韋青本士人也嘗自為詩云三代掌綸誥一身能唱歌青官至金吾將軍明皇雜錄曰唐玄宗自巴蜀迴因夜闌登勤政樓憑欄南望煙月滿目上因自歌曰庭前琪樹已堪攀塞外征人殊未還蓋盧思道之詞也歌歇上問有舊人乎逮明為我訪來翌日力士潛求於里中因召與同至則果梨園弟子也其夜上復與乘月登樓左右唯力士及貴妃侍者紅桃在焉遂命歌涼州詞貴妃所製上親御玉笛為之倚曲曲罷相覩無不掩泣上因廣其曲今涼州傳於人間者益加怨切焉又曰樂工李龜年恃恩寓於東都大起第宅僣侈, WYG: 短}
