  - {type: variant, offset: 2466, length: 3, content: 韓娥齊, SBCK: 明皇在位甞令教舞馬四百疋分爲左右部目爲某家寵某家嬌時塞外亦以善馬來貢者上俾之教習無不曲盡其妙因命衣以文繡絡以金鈴飾其鬛間雜以珠玉其曲謂之傾盃樂者數十曲􅁬首鼓尾縱横應節又施三層板床乗馬而上抃轉如飛或命壯士舉一榻馬舞於榻上樂工數十}
