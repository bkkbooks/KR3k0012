  - {type: variant, offset: 2582, length: 0, content: '', SBCK: 巳髙常乗歩輦父老進曰前時上皇過此常馳逐從禽今何不爲上曰吾老矣豈復堪此父老士女聞之莫不悲泣新豊市有女伶曰謝阿蠻善舞凌波曲常出入宫中楊貴妃遇之甚厚亦遊於國忠及諸姨宅上至華清宫復令召焉舞罷阿蠻因出金粟裝臂環云此貴妃所與上持之悽怨出涕左右莫不嗚咽又曰舞者樂之容}
