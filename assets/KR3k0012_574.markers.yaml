  - {type: variant, offset: 2359, length: 1, content: 志, WYG: 吾為之舞太師曰瞑臣不習范昭趍而出公問晏子晏子曰昭非不知禮也欲慚吾君臣公問太師太師曰成周之樂天子樂范昭人臣而舞之臣故不為昭歸報晉平公}
  - {type: variant, offset: 2359, length: 1, content: 志, krp: 吾爲之舞太師曰暝臣不習范昭趍而出公問晏子晏子曰昭非不知禮也欲慙吾君臣公問太師太師曰成周之樂天子樂范昭人臣而舞之臣故不爲昭歸報晉平公}
