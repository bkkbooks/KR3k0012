  body:
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 二舞毛詩甫田賔之􅀄筵曰舎其坐遷屢舞僊僊側弁之俄屢舞傞傞又宛丘東門之枌刺幽公也風化之所行男女棄其舊業歌舞於市井爾尚書曰苗民逆命帝乃誕敷文德舞干羽于兩階干楯羽翳也皆舞者之所執也又顧命曰胤之舞衣在西房孔安囯日胤囯所爲舞者衣中法制尚書大傳曰惟丙午王建師及鼔譟前歌後舞禮記曰治民勞者其舞行綴逺治民逸者其舞行綴短故􅀚其舞知其德民勞則德薄鄼相去逺舞人少也民逸則德盛鄼相去近舞人多也又曰天子宫懸四面舞行八佾諸侯軒懸三面舞行六佾大夫判懸二面舞行四佾士特懸}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_574-1b}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 二舞毛詩賔之初筵曰舎其坐遷屢舞僊僊側弁之俄屢舞傞傞又宛丘東門之枌刺陳公也風化之所行男女棄其舊業歌舞於市井爾尚書曰苗民逆命帝乃誕敷文徳舞干羽于兩階干楯羽翳也皆舞者之所執也又顧命曰𦙍之舞衣在西房孔安國曰𦙍之所為舞者衣中法制尚書大傳曰惟丙午王建師及鼓譟前歌後舞禮記曰治民勞者其舞行綴遠治民逸者其舞行綴短故觀其舞知其徳民勞則徳薄鄼相去遠舞人少也民逸則徳盛鄼相去近舞人多也又曰天子宫懸四面舞行八佾諸侯軒懸三面舞行六佾大夫判懸二面舞行四佾士特懸}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_WYG_574-1b, image: WYG0898/WYG0898-0273b.png}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_WYG_574-2a, image: WYG0898/WYG0898-0273c.png}
  - {type: variant, offset: 3, length: 0, content: '', krp: 二舞毛詩甫田賔之𥘉筵曰舎其坐遷屢舞僊僊側弁之俄屢舞傞傞又宛丘東門之枌刺幽公也風化之所行男女棄其舊業歌舞於市井爾尚書曰苗民逆命帝乃誕敷文德舞干羽于兩階干楯羽翳也皆舞者之所執也又顧命曰胤之舞衣在西房孔安囯日胤囯所爲舞者衣中法制尚書大傳曰惟丙午王建師及鼔譟前歌後舞禮記曰治民勞者其舞行綴逺治民逸者其舞行綴短故觀其舞知其德民勞則德薄鄼相去逺舞人少也民逸則德盛鄼相去近舞人多也又曰天子宫懸四面舞行八佾諸侯軒懸三面舞行六佾大夫判懸二面舞行四佾士特懸}
  - {type: xml-element, offset: 4, content: '', id: KR3k0012_CHANT_574-bkkxmlele1}
  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_574-1a.1}
  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_574-1a.2}
  - {type: variant, offset: 4, length: 8, content: 歌四司馬相如琴歌, SBCK: 面舞行二佾又}
  - {type: variant, offset: 4, length: 1, content: 歌, WYG: 面舞行二佾又曰季夏六月以禘禮祀周公於太廟朱干玉戚冕而舞大武皮弁素幘褐而舞大夏又曰夫樂者象成者也象成功而為樂者也㹅干而山立㹅持干楯山立不也動武王之事也發揚蹈厲太公之志也志在鷹揚武亂皆坐周召之治也武亂武之禮也皆坐以象其人無事且夫武始而北出象觀兵盟津時也再成而滅商成猶奏也再奏象克殷時三成而南誅紂已而南也}
  - {type: variant, offset: 4, length: 8, content: 歌四司馬相如琴歌, krp: 面舞行二佾又}
  - {type: xml-element, offset: 6, content: '', id: KR3k0012_CHANT_574-bkkxmlele2}
  - {type: xml-element, offset: 6, content: '', id: KR3k0012_CHANT_574-bkkxmlele3}
  - {type: 'tls:seg', offset: 6, content: '', id: KR3k0012_CHANT_574-1a.3}
  - {type: variant, offset: 6, length: 3, content: 司馬相, WYG: 成而南國是疆有南國疆界也五成而分周公左召公右分陜東西而理六成而復綴以崇六奏象兵還振旅也復綴反位止也崇充也凡六奏以充武天子夾振之而四伐盛威於中國也夾振之者王将夾舞者振木鐸以為節也武舞戰也象四伐者伐四方也每奏四伐一擊一刺為一伐也周禮地官曰舞師掌教兵舞帥而舞山川之祭祀教帗音拂舞帥而舞社稷之祭祀教羽舞帥而舞四方之祭祀教皇舞帥而舞旱暵之事四方祭祀謂四望也旱暵之事謂雩也春官樂師掌教國子小舞謂以幼少時教舞内則曰十三舞勺成童舞象二十舞大夏也凡舞有帗舞有羽舞有皇舞有旄舞有干舞有人舞帗舞者全羽皇羽舞者析羽舞者以羽帽覆頭上衣飾翡翠之羽旄舞者旄牛之尾干舞者兵舞人舞手舞社稷以帗宗廟以羽四方以皇辟雍以旄兵事以干星辰以人舞子持之是也皇雜五采羽}
