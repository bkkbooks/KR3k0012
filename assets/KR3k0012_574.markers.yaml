  - {type: variant, offset: 710, length: 3, content: 開元中, SBCK: 東夷之樂持矛舞助時生也南夷之樂持羽舞助時飬也西夷之樂持􅃏舞助時殺也北夷之樂持干舞助時藏也蔡邕月令章句曰天子省風以作樂舞所以節八音而行八風天子八佾諸侯六佾大夫四佾佾列也每佾八人每服冕而執戚}
