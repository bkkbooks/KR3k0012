  - {type: variant, offset: 1689, length: 260, content: 女婉出與著相見婉見著欣悅命婢瓊林令取琴出婉撫琴歌曰登廬山兮鬱嵯峨晞陽風兮拂紫霞招若人兮濯靈波欣良運兮暢雲柯彈鳴琴兮樂莫過雲龍會兮樂太和歌畢婉便還去搜神記日淮南王安設廚宰以俟賓客正月上午有八老公詣門求見王曰群娥子復來也公知不見乃更形為八童子王驚見之盛禮設樂以享八公援琴而絃歌曰明明上天照四海兮知我好之公來下兮公將與余生毛羽兮升騰青雲蹈梁甫兮觀見三光過北斗兮驅乘風雲使玉女兮今所謂淮南操是也幽明錄曰勾章人至東野還暮不至門見路傍有小屋燈火因投寄宿止宿有一小女不欲與丈夫共宿呼鄰家女自伴夜共彈琴箜篌至曉此人謝去問其姓字女不荅彈絃, SBCK: ''}
