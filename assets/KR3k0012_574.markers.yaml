  - {type: variant, offset: 319, length: 0, content: '', SBCK: 光武平隴蜀増廣郊祀髙皇帝配食樂奏清陽朱明西皓玄􅁳雲翹育命舞北郊及祀明堂並奏樂如南郊迎時氣五郊春歌靑陽夏歌朱明並舞雲翹之舞秋歌西皓冬歌玄􅁳並舞育命之舞季夏歌朱明兼舞二舞又曰蔡邕坐上章事徙及歸將就還路五原太}
  - {type: page-break, offset: 319, content: '', id: KR3k0012_SBCK_574-4a}
  - {type: variant, offset: 319, length: 3, content: 守宮王, WYG: 嵇康生性氣麄武元乂憚之康生知之懼不安肅宗朝太后於西林園宴文武坐酒酣迭舞次至康生乃為力士舞及於折旋每顧視太后舉手踏足瞋目傾首為殺摶之勢太后解其意而不敢言唐書馮定為太常少卿文宗每聴樂鄙鄭衛聲詔太常習開元中霓裳羽衣舞以雲韶樂和之舞曲成定㹅樂工閲於庭定立於其間文宗以其端凝若植問其姓氏翰林學士李珏對曰此馮定也太宗喜問曰豈非能為古章句者耶乃召升階文宗自吟定送客江西詩吟罷益喜因賜禁中瑞錦仍令大録所著古體詩以獻晉中興書曰殷融𢎞遠為司徒在西屬飲酒喜舞終日嘯咏未嘗以事務為懷齊書永明中舞人冠幘並簪筆武帝曰簪筆葢以記事受言舞不受言何事簪筆豈有服朝衣而足綦讌履於是去筆江表傳曰}
