  - {type: variant, offset: 2919, length: 134, content: 歌晉中書令王珉與嫂婢芳姿有私愛甚篤苦捶撻之婢素善歌而珉之好捉白團扇因見珉之歌曰白團扇顦顇非昔容羞與郎相見願得隨郎手因風從方便後人因歌之丁督護歌彭城內史徐逵之為魯軌所殺府內督護丁旿收殯歛之逵之妻晉公主呼問事每問輒歎息曰丁督護其聲哀切後人因為曲焉懊惱歌崇安初人間訛謠之曲又, SBCK: 鮑昭}
