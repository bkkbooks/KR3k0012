  - {type: variant, offset: 2726, length: 4, content: 錄晉宋已, SBCK: 録曰白紵舞案辭有巾􅂁之言紵夲吴地所岀冝是吴舞也􅀳徘徊歌曰交交白緒節節爲􅀟吴音呼緒爲紵疑白緒即自紵也釋智匠古今樂録曰大壯之舞曰武舞大觀之舞曰文舞通禮義纂曰漢儀拜陵食舉奏文始五行之舞唐制皇帝親行奠獻及薦服玩禮畢再拜辭退而巳拜陵奏舞漢代禮也又曰古者臣於其君有拜手稽首之禮自}
