  - {type: variant, offset: 354, length: 11, content: 戊午祖于北園博延眾賓迭, SBCK: 孫權極忻譚醉酒三起舞舞又不知止雍内怒之明日召譚訶責之君王以含垢爲德臣下以㳟謹爲節何有舞不復知止雖爲酒後亦爲恃恩謙虚不足損吾家者必汝也何承天三代樂序云正德大恱舞盖岀於三容樂然則其聲節有古之遺音也魏名臣}
