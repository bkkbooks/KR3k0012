  - {type: variant, offset: 252, length: 6, content: 乃遠乎遂設旨, SBCK: 以爲樂請以劒舞拔劒起舞項伯亦起舞以身蔽沛公又曰長沙定王發以其母微無寵故王卑濕貧國景帝後三年諸王來日有詔更前稱壽歌舞定王但張袖小舉手左右􅀏其拙上怪問之對日臣囯小地狹不足廻旋帝以武陵桂陽属焉又曰師經撫琴魏文侯躭之起舞經怒以琴撞文侯文侯大怒經曰臣撞桀紂之主不撞堯舜之君文侯恱掛琴於室爲戒又日孝景皇帝元年制詔御史盖聞歌者所以發德舞者所以明德髙廟始奏文始五行之舞漢書曰李陵在匈奴置}
  - {type: page-break, offset: 252, content: '', id: KR3k0012_SBCK_574-3a}
  - {type: variant, offset: 252, length: 2, content: 乃遠, WYG: 以為樂請以劍舞抜劍起舞項伯亦起舞以身蔽沛公又曰長沙定王發以其母微無寵故王卑室貧國景帝後三年諸王來朝有詔更前稱夀歌舞定王但張袖小舉手左右笑其拙上怪問之對曰臣國小地狹不足廻旋帝以武陵桂陽屬焉又曰師經撫琴魏文侯躭之起舞經怒以琴撞文侯文侯大怒經曰臣撞桀紂之主不撞堯舜之君文侯悦掛琴於室為戒又曰孝景皇帝元年制詔御史葢聞歌者所以發徳舞者所以明功髙廟酎奏武徳文始五行之舞漢書曰李陵在匈奴置酒與蘇武别曰異域之人一别長絶陵起舞屬之又曰髙祖廟奏武徳文始五行之舞武徳者象天下樂已行武以除亂也文始舞者本舜韶舞也髙祖更名曰文始示不相襲也又曰孝武李夫人本以倡進兄弟延年知音善歌舞延年侍上起舞曰北方有佳人絶世而獨立一顧傾人城再顧傾人國寕不知傾城與傾國佳人難再得上嘆息曰世豈有此人}
