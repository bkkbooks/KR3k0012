  - {type: variant, offset: 2576, length: 1, content: 歌, WYG: 始陽多滯伏民氣壅閼故為舞以宣導之樂苑曰羽調有柘枝曲商調有掘柘枝此舞因曲為名用二女童鮮衣帽㡌施金鈴抃轉有聲其來也於二蓮花之中藏之花折而後}
  - {type: punctuation, offset: 2577, content: ，, id: KR3k0012_CHANT_574-bkkpn723}
