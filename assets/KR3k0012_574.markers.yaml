  - {type: variant, offset: 13, length: 68, content: 鳳兮鳳兮歸故鄉遨遊四海索我皇時來通遇無所將何悟今夕升斯堂有艷淑女在此房室邇人遐毒我膓何緣交接為鴛鴦崔琦四皓頌曰昔南山四皓者蓋角里先生綺里, SBCK: ''}
  - {type: variant, offset: 13, length: 68, content: 鳳兮鳳兮歸故鄉遨遊四海索我皇時來通遇無所將何悟今夕升斯堂有艷淑女在此房室邇人遐毒我膓何緣交接為鴛鴦崔琦四皓頌曰昔南山四皓者蓋角里先生綺里, krp: ''}
