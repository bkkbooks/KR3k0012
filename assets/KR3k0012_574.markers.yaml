  - {type: variant, offset: 322, length: 0, content: '', SBCK: 甫之弟智衘之宻告邕怨於囚放謗訕朝廷邕慮卒不免禍乃亡命江海逺迹吴㑹魏志曰舞師馮肅曉知先代舞名吴書曰陵統怨甘寕殺其父操寕常避統不與相見權亦命統不得讎之甞於吕􅂪舎㑹酒酣乃以刃舞寕起曰寕能􅀟㦸舞蒙曰寕雖能未􅀂􅂪上之也因操刃持楯以身蔽之後權知統意因令寕將兵徙屯中洲又曰陸遜破曹休上與群僚大㑹酒酣命遜舞解所著白鼯子裘賜之又曰陶謙爲舒令郡守張磐謙耻爲之屈磐舞属謙謙不爲起強之乃舞舞不轉磐曰不當轉耶曰轉則勝人宋書樂志曰鞞舞之由來未詳所起漢代已於燕亭用之矣故曹植鞞歌漢靈帝時有李堅者善鞞舞遭亂播遷帝聞其舊伎召之堅旣中廢兼古曲多謬故知異代之文未必相襲也後魏書曰嵇康生性氣麄武元又憚之康生知之亦懼不安肅宗朝靈太后於西林園文武坐酒酣迭舞次至康生乃爲力士舞及於折旋每頋視太后舉手蹈足瞋目傾首爲殺􅅞之􅀔太后解其意而不敢言唐書馮定爲太常少卿文宗毎聽樂鄙鄭衛聲詔奉常習開元中霓裳羽衣舞以雲韶樂和之舞曲成定惣樂工閱於庭定立於其間文宗以其端凝􅀂植問其姓氏翰林學士李珏對曰此馮定也文宗喜問曰豈非能爲古章句者耶乃召􅂛階文宗自吟定送客西江詩吟罷益喜因賜禁中瑞錦仍令大録所著古體詩以獻晉中興書曰殷融弘逺爲司徒左西属飲酒善舞終日嘯詠未甞以事務爲懷齊書永明中舞人冠幘並簮筆武帝曰筆笏盖以記事受言舞不受言何事簮筆豈有服朝衣而足綦讌屨於是去筆江表傳曰}
