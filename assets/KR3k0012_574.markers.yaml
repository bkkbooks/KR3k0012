  - {type: variant, offset: 714, length: 26, content: 人許和子者本吉州永新縣樂家女也開元未進入宮因以永新名, WYG: 俯仰張翕}
  - {type: variant, offset: 714, length: 0, content: '', krp: 俯仰張翕之容行綴長短佾八}
  - {type: variant, offset: 715, length: 842, content: 許和子者本吉州永新縣樂家女也開元未進入宮因以永新名之藉於宜春院既美且惠善歌能變新聲韓娥李年延歿後千載曠其人至永新始繼其能遇高秋朗月臺殿清虛喉囀一聲響傳九陌明皇嘗獨召李謀吹苗逐其歌曲終管裂其妙如此一日賜大酺於勤政樓觀者數拾萬眾諠譁聚語莫得聞魚龍百戲之音上怒欲罷宴中官力士奏請命永新出樓歌一曲必可止喧上從之永新乃撩鬢舉袂直奏慢聲至是廣場敘寂若無一人義者聞之血湧愁者聞之膓絕洎漁陽之亂六宮星散永新為一士人所得韋青避地廣陵因月夜憑欄於小河上忽聞舟中唱水調者曰此永新故歌也乃登舟省之因與永新對泣久之青始晦其事後士人卒與其母之京師終於狹斜間又曰古之能者即有韓娥李延年莫愁莫愁者女子也樂府詩云莫愁在何處莫愁石城西艇子打兩催送莫愁來善歌者必先調其氣氤氳自臍間發至喉乃憶其詞即分抗墜之音既得其術即可致遏雲響谷之妙也又曰大曆初有才人張紅者本與父唱歌丐於衢路因過將軍韋青所居在昭國坊南門也青於看街窗中聞其歌喉寥亮仍有美色即納為姬其父亦舍於後戶優給之乃自傳其藝頴悟絕倫嘗有樂工自撰一曲即古曲長命西河女也加減其節奏頗有新聲未進間先印可於青青潛令紅於屏風後聽之紅乃以小豆數合以記其節拍樂工歌罷青因入問紅何如紅曰已唱得矣青出給云某有女弟子久曾唱非新曲也即令隔屏唱之一聲不失樂工大驚異遂請相見歎伏不已兼云此曲先有一聲不穩今已正矣尋達上聽翌日召入宜春院寵澤隆異宮中號為記曲娘子尋為才人一日內史奏韋青卒上告紅紅乃於上前嗚呼奏云妾本風塵丐者一旦老父死有所歸致身入內皆自韋青妾不忍忘其恩因一慟而絕上嘉歎久之即贈昭儀又曰韋青本士人也嘗自為詩云三代掌綸誥一身能唱歌青官至金吾將軍明皇雜錄曰唐玄宗自巴蜀迴因夜闌登勤政樓憑欄南望煙月滿目上因自歌曰庭前琪樹已堪攀塞外征人殊未還蓋盧思道之詞也歌歇上問有舊人乎逮明為我訪來翌日力士潛求於里中因召與同至則果梨園弟子也其夜上復與乘月登樓左右唯力士及貴妃侍者紅桃在焉遂命歌涼州詞貴妃所製上親御玉笛為之倚曲曲罷相覩無不掩泣上因廣其曲今涼州傳於人間者益加怨切焉又曰樂工李龜年恃恩寓於東都大起第宅僣侈, SBCK: ''}
