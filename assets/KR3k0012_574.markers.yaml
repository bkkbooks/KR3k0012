  - {type: punctuation, offset: 2578, content: 《, id: KR3k0012_CHANT_574-bkkpn724}
  - {type: variant, offset: 2578, length: 2, content: 呂氏, WYG: 對舞中之雅妙者也明皇雜録曰開元二年上於梨園自教法曲必盡其妙謂之皇帝梨園子弟明皇在位嘗令教舞馬四百疋分為左右部目為某家寵某家嬌時塞外亦以善馬來貢者俾之教習無不曲盡其妙因命衣以文繡絡以金鈴飾其鬛間雜以珠玉其曲謂之傾盃樂者數十曲奮首鼔尾縱横應節又施三層板床乗馬而上抃轉如飛或命壮士舉一榻馬舞於榻上樂工數十人立於左右前後皆衣以淡黄衫文玉帶必求少年而姿貌美秀者每千秋節嘗命舞於勤政樓下其後明皇既幸蜀舞馬亦散在人間禄山嘗見其舞而心愛之自是因以數十疋置於范陽其後轉為田承嗣所得而承嗣不知雜於戰馬置之外棧忽一日軍中大享士樂作馬舞不能自止厮養輩謂其妖擁篲以擊之馬謂其舞不中節抑揚頓挫尚存故態廐吏遂以為怪白承嗣承嗣命箠之甚酷馬舞益整鞭逾加終斃於櫪下時人亦有知其舞馬者懼田暴逆而不敢言又曰至徳中明皇復幸華清宫父老奉迎壺漿塞路時上}
