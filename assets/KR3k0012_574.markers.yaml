  - {type: variant, offset: 2357, length: 1, content: 古, SBCK: 從風也末曲游懷言支體緬曼􅀂入懷䄂也晏子春秋曰晉與攻齊使范昭徃觀景公觴之范昭請公之弃酌公曰諾告侍者酌樽進之晏子曰撤樽更之范昭起舞太師曰我不習昭曰調成周之}
  - {type: variant, offset: 2357, length: 1, content: 古, WYG: 從風也末曰旋懷言支體緬曼若入懷袖也晏子春秋曰晉欲攻齊使范昭往觀之景公觴之范昭請公之弁酌公曰諾告侍者酌樽進之晏子曰撤樽更之范昭起舞太師曰我不習昭曰調成周之}
  - {type: variant, offset: 2357, length: 1, content: 古, krp: 從風也末曲游懷言支體緬曼若入懷䄂也晏子春秋曰晉與攻齊使范昭徃觀景公觴之范昭請公之弃酌公曰諾告侍者酌樽進之晏子曰撤樽更之范昭起舞太師曰我不習昭曰調成周之}
  - {type: variant, offset: 2359, length: 1, content: 志, SBCK: 吾爲之舞太師曰􅊕臣不習范昭趍而出公問晏子晏子曰昭非不知禮也欲慙吾君臣公問太師太師曰成周之樂天子樂范昭人臣而舞之臣故不爲昭歸報晉平公}
