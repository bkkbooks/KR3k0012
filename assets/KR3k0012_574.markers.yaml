  - {type: variant, offset: 2329, length: 0, content: '', krp: 一丈黄踈單衣角巾來詣之翩翻舉其兩手並舞而來語何云君甞見韶舞不此是韶舞且舞且去尋逐徑向山山有穴裁容人即入穴何亦隨之見有良田數十頃何遂墾作以爲丗業子孫于今賴之搜神記曰太康中天下爲晉丗寕之舞其舞抑手以執杯盤而反覆之反覆至危也杯盤酒食器也而名晉丗寕者言時人茍且酒食之間而其智不及逺如噐在手也英雄記曰建安中曹操於南皮攻袁譚斬之操作皷吹自稱萬歳於馬上舞十二年攻烏桓蹹頓一戰斬蹹頓首繫馬鞍於馬上抃舞}
  - {type: variant, offset: 2330, length: 7, content: 丈著赭布袴布褶, SBCK: 巴記曰閞中有渝水賨民銳氣喜舞髙祖樂其猛銳數觀其舞使樂人羽之故名巴渝舞韓子曰長䄂善舞多財善賈王子年拾遺録曰燕昭王即位二年廣延國來獻善舞者二人一名旋波一名提漢並玉質凝膚體輕氣馥綽婉妙絶曠古無倫或行無迹影或經年不飢昭王處以單綃華幄飲以瑞珉之膏飴以丹泉之粟王登崇霞之䑓乃召二人}
  - {type: page-break, offset: 2330, content: '', id: KR3k0012_SBCK_574-7a}
