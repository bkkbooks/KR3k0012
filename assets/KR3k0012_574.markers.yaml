  - {type: variant, offset: 2728, length: 1, content: 宋, WYG: 徘徊歌曰交交白緒節節為雙呉音呼緒為苧疑白緒即白苧也釋智匠古今樂録曰大壮之舞曰武舞大觀之舞曰文舞通禮儀纂曰漢儀拜陵上食舉奏文始五行之舞唐制皇帝親行奠獻及薦服玩禮畢再拜退而已拜陵奏舞漢代之禮也又曰古者臣於君有拜手稽首之禮自後魏以來臣受恩皆以手舞足蹈以為歡喜之極也唐㑹要韋萬石曰武舞貞觀禮及今禮但郊廟祭饗奏武舞之樂即用之凡有六變一變象龍興參野二變象尅靜開中三變冬夏賔伏四變象江淮寕謐五變象獫狁讋服六變位㑹崇象立還振旅又曰龍朔元年三月一日上召李勣任雅相許國師張延師蘇定方阿史􅄼中于闐王伏闍雄上官儀等讌于城門觀屯營新教之舞名之一戎大定樂皆親征遼東用武之勢也又曰調露二年正月二十一日上御洛陽城南樓賜宴太常奏六合還淳之舞又曰上元三年十一月三日勅新造上元之舞先令大祠享皆将陳設自今}
