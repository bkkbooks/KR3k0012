  - {type: variant, offset: 1335, length: 542, content: 十辟公府九舉有道皆不就靈帝時曹節白帝徵肱隱身遯命浮桴入海名蓋天下幽明錄曰海中有金臺山高百丈結搆巧麗窮盡神工橫光嚴渚竦曜星門臺內有金机彫文備制十洲記曰扶桑在碧海之中北面一万里有大帝宮太真東王公所治處山外別有員海繞山員海水色正黑謂之溟海無風而洪波百丈唯飛仙能到其處玄中記曰天下之強者東海之沃焦焉水灌而不已沃焦者山名也在海東三萬里博物志曰舊說天河與海通近世有居海渚年年八月有浮查去來往反不失期此人乃立屋於查上齎糧乘查去忽不覺盡夜奄至一處有城廓屋舍望見室中多織婦見一丈夫牽牛渚次飲之驚問此人何由至此此人即問此為何處荅曰君可詣蜀問嚴君平此人還問君平曰某月有客星犯斗牛即此人到天河也崔鴻十六國春秋前燕錄曰慕容晃將乘海討其第仁襲其不意群臣以凌道危阻宜從陸路晃曰舊海水陵自仁反已來三凍皆成昔光武合滹沱之冰以濟大業天其或者欲乘此而剋之乎吾計決矣沮謀者斬二月晃親率三軍擒仁賜死東方朔十洲記曰祖洲東海中地方五百里上有不死草生瓊田中草似菰苗人已死者以草覆之皆活又曰扶桑在碧海中樹長數千尺一千餘圍兩兩同根更相依倚是以名扶桑關令內傳曰天有五億五萬五千五百五十里地亦如之各以四海為脈江釋名曰江公也小水流入其中所公共也說文曰江水出蜀湔氐徼外崏山又曰江至會稽郡為浙江尚書曰岷山導江東別為沱毛詩曰江有沱江有汜又曰滔滔江漢, SBCK: ''}
