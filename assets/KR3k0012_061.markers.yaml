  - {type: variant, offset: 2015, length: 983, content: 不敢渡豊祭神令子孫對母飲酒因醉臥便渡又曰吳郡王閎渡錢塘江遭風舡欲覆閎拔劍斫水罵伍子胥風息得濟續漢書曰張禹拜楊州刺史當遇江行部中土人皆以江有子胥之神難於濟涉禹厲聲言曰子胥如其有靈知吾志在理察枉訟豈危我哉遂鼓而過魏志文帝伐吳至長江而漢曰天固以限南北也晉書祖逖北渡江中流誓曰逖不靜中原而復濟者有如大江又曰吳猛年四十邑人丁義始授神方因還豫章江波甚急猛不假舟楫以白羽扇畫水而渡又曰王濬有奇略武帝謀伐吳詔濬造舡於蜀其木柿蔽江而下又曰陶侃語人曰大禹聖人乃惜寸陰至於眾人當惜分陰參佐以戲廢事者乃取其蒲博之具悉投于江莊子曰魚相忘於江湖孫卿子曰子路盛服見孔子孔子曰由是檐檐者何也昔者江出於汶山其始由源可以濫觴及其至江之津也不方舟不避風不可涉非唯下流大耶今汝衣服既盛顏色充盈天下且孰肯諫汝乎三十國春秋曰劉裕次山陽聞何無忌敗績卷甲兼行將濟江而風急眾咸難之裕曰若有天命風當自息如其天不助舟覆溺何足可怪即命登舟舟移而風止董覽吳地記曰夫差立子胥以忠諫見亡遂賜死浮尸于江夫差悔焉與群臣於江設祭列仙傳曰江妃二女遊於江濱逢鄭交甫遂解佩與交甫受珮而去去數十步懷中無佩女亦不見列女傳曰楚昭王貞姜者昭王夫人齊女也昭王出遊留夫人漸臺江水大至遣使者迎夫人忘持符夫人曰王與宮人約召必以符今使者不持符妾不敢行於是使者返取符未還臺已壞沉水而死又曰廣漢姜詩妻事姑至孝姑好飲江水水去家七里妻常雞鳴沂流而汲值風雪不時得水詩責遣之妻寄鄰家紡績以市珍味使鄰母遺姑詩聞追還舍側忽有涌泉出味如江水華陽國志又載論衡曰儒書言伍子胥恨吳王驅水為濤而溺殺今會稽錢塘丹徒江皆立子胥祠欲止其濤也袁山松宜都記曰對西陝南岸有山其峰孤秀人自山南上至頂俯臨大江如縈帶視舟舡如鳧鴈又曰大江清濁分流其水十丈見底視魚游如乘空淺處多五色石新序曰禹南濟于江黃龍負舟舟中之人失色禹仰視天而歎曰吾受命於天死生命也龍弭耳而逃吳錄曰步騭表言北降人說北多作而囊欲以盛沙塞大江吳主曰此曹必不敢來若不如孤言當以牛千頭為君作主人後見呂岱說騭言北欲以囊塞江輒失笑曰此江自開闢以來寧可以囊塞乎水經注曰昔吳郡太守張公直自九江守徵還道由廬山子女觀祠女戲廟像其妻夜夢神人致娉覺言於夫至明恐怖遽發舡引中流而不行妻曰愛一女而合門受禍也公直不忍遂令妻下女於江其妻布廗水上以其亡兄女代之而舡得進尋公直知兄女怒妻曰吾何面於當世也復下己女於水中將渡遙見二女於岸側傍有一吏立曰吾廬君主簿敬君之義悉還二女, SBCK: 通和冝麥}
