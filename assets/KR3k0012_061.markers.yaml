  - {type: variant, offset: 40, length: 0, content: '', SBCK: 一名鹽澤又曰長水校尉髙竝言河決率常於平原東郡左右其地形下而土䟽惡也聞禹理河本空此地以爲水猥近察秦漢河決曹衛之域不過百八十里可空此地勿以爲官亭民室張璠漢紀曰郭伋爲頴川太守光武詔曰賢能太守去帝城不逺河潤九里兾京師并蒙其福魏志曰􅀽紹渡河沮授臨舟歎曰上􅄹其志下務其功悠悠黄河吾其濟乎說􅁐曰甘茂使齊渡河舩人曰河水猶澗耳君不能渡何王之能說乎甘茂曰持擑隨流臣不􅀂子說萬乗之君子不如我􅁊譚新語曰大司馬張仲議曰河水濁一石水六斗泥而民競決河漑田令河不通利至三月桃花水至則決以其噎不泄也可禁民勿復引河韓詩外傳曰申徒狄非丗將自投於河崔嘉聞而止之曰聖人民之父母也今爲濡足之故不救溺人可乎申徒狄曰昔桀殺龍逄紂殺比干而亡天下呉殺子胥陳殺泄治而滅其國非無聖知不用故也遂􅀒石而沉於河河圖始開圖曰黄帝問風后曰余欲知河之始開風后曰河凢有五皆始開乎崑崙之墟愼子曰西河下龍門其流駃竹箭抱朴子曰撮攘不能塡決河升水不能冷原火又曰寸膠不能理黄河之濁尺水不能却蕭丘之火淮南子曰武王伐紂至孟津陽侯之波逆流而擊疾風晦􅁳人馬不相見於是武王左操黃􅃏右執白旄瞋目而麾曰余在天下誰敢害余意者於是風濟波罷又曰河以委虵委虵音逶迤故能逺山以陵遲故能髙道以優游故能化又曰水九折注海而流不絶者有崑崙之輸也風俗通曰河播也播爲九州也物理論曰河色黄衆川之流蓋濁之也百里一小曲千里一曲一直山海經曰從極之淵深三百仞唯冰夷􅁪都焉冰夷馮夷也淮南子曰馮夷得道以潜大川馮夷人面乗兩龍乗雲車駕二龍水經注曰禹理洪水觀於河見白面長人魚身出曰吾河精也授禹河圖而還於淵又曰昔澹臺子羽齎千金之璧渡河陽侯波起兩蛟挾舟子羽曰吾可以義求不可以威刼操劒斬蛟蛟死波休乃投璧於河三投而輙躍出乃毀璧而去示無恡意又曰崑崙在北去嵩髙五萬里地之中也髙萬一千里河水岀其東北蕭廣濟孝子傳曰三洲人者各一州人皆􅀌單焭獨三人闇㑹樹下息因相訪問老者曰寜可合爲斷金之業邪二人曰諾即相約爲父子因命二人於大澤中作舎且欲成父曰此不如河邊二人曰諾河邊舎幾成父曰又不如河中二人復填河二旬不立有一書生過之爲􅅞兩土肫投河中㑹父往呼止之曰甞見河可塡耶觀汝行耳相將而去明日俱至河邊望見河中土髙丈餘祥瑞河附禮記曰河岀馬圖言龍馬􅀒圖也河圖曰黄帝云余夢見兩龍授圖乃齊往河洛而求有魚折溜而止魚汎曰圖跪而受之運斗樞曰舜與諸侯觀河洛有黄龍􅀒圖岀置帝前䠠入水而前去䠠之遊反又音帶䠠去也拾遺記曰黄河千年一清聖王之大瑞也易乹鑿度曰帝王將起河水先清清變白白變赤赤變黒黒變黄各三日中候曰榮光出河休氣四塞滎光即五色論語曰河不出圖吾巳矣夫沉􅀕河附穆天子傳曰天子西狩獵獲白狐玄貉以􅀕于河}
