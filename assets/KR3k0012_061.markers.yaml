  - {type: variant, offset: 423, length: 2, content: 能為, SBCK: 錢帛發卒數十萬詔景與將作謁者王呉治渠防築隄修堨起自滎陽東至千乗海口千有餘里景乃商度地勢鑿山開澗防遏衡要踈決壅積十里一門水更相廽注無復潰漏之患明年渠成帝親隨廵行詔濵河郡國置河堤貟吏如西京舊制由是顯名王呉及諸從事者皆増秩一等順帝陽嘉中又自汴河口以東縁河積石爲堰通淮曰金堤靈帝建寜中又増修石門以遏渠口水盛則通注津耗則輟流淮春秋􅀃題辭曰淮出桐栢淮者均也均其務釋名曰淮圍也圍遶揚州北界東至海廣雅同􅀃文曰淮岀南陽平氏桐栢大復山東南水經注及山海經云淮水岀南陽平氏縣桐栢山其源初則涌岀復潜流三十里然後長騖東北經大復山從義陽郡北東過江夏平春縣北又東過新息縣南期思縣北至原鹿縣南與汝水合又東過廬江安豐縣與決水合東北至九江壽春縣東與頴水合壽春縣北與淝水合又東至當塗縣北與渦水合東北至下邳淮隂縣與泗水合東至廣陵淮浦縣而入海也近海數}
  - {type: page-break, offset: 423, content: '', id: KR3k0012_SBCK_061-7a}
  - {type: variant, offset: 423, length: 1, content: 能, WYG: 錢帛𤼵卒數十萬詔景與將作謁者王吳治渠築隄防修堨起自滎陽東至千乗海口千有餘里景乃商度地勢鑿山開澗防遏衝要疏決壅積十里一門水更相迴注無復潰漏之患明年渠成帝親自巡行詔濵河郡國置河堤員吏如西京舊制由是顯名王吳及諸從事者皆増秩一等順帝陽嘉中又自汴河口以東縁河積石}
