  - {type: variant, offset: 10, length: 1, content: 晦, SBCK: 經曰崑崙山縱廣萬里髙萬一千里去嵩山五萬里有青河白河赤河黒河環其墟其白水出其東北陬屈向東南流爲中國河河百里一小曲千里一大曲發原及中國大率常然東流潜行地下至規期山北流分爲兩源一出䓗嶺一出于闐其河復合東注蒲昌海復潜行地下南出積石山西南流又東廻入塞過燉煌酒泉張掖郡南與洮河合過安定北地郡北流過朔方郡西又南流過五原郡南又東流過雲中西河郡東又南流過上都河東郡西而出龍門汾水從東於此入河東即龍門所在吕氏春秋曰龍門未開河出孟門東大溢是謂洪水禹鑿龍門始南流至華隂潼􅀜與渭水合又東廻過砥柱砥柱山名河水分流包山而過山見水中􅀂柱然今陜州東河北陜縣三縣界及洛陽孟津所在至鞏縣與洛水合成皐與濟水合濟水出河北至王屋山而南截河渡正對成皐又東北流過武德與沁水合至􅀺陽信都信都今兾州絳水所在絳水亦曰潰水一曰漳水鉅鹿之北遂分爲九河鉅鹿今邢州大陸所在大陸澤名九河一曰徒駭二太史三馬頰四覆釡五胡蘇六簡七絜八鉤盤九鬲津又合爲一河而入海齊􅁊公塞九河以廣田居故館陶貝丘廣川信都東光河間以東城池九河舊跡猶存漢伐河決金堤南北多罹其害議者常欲求九河故迹而穿之未知其所是以班固云自兹距漢以亡其八枝}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_SBCK_061-1b}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_SBCK_061-2a}
  - {type: variant, offset: 10, length: 1, content: 晦, WYG: 經曰崑崙山縱廣萬里髙萬一千里去蒿山五萬里有青河白河赤河黒河環其墟其白水出其東北陬屈向東南流為中國河河百里一小曲千里一大曲發源及中國大率常然東流潜行地下至規期山北流分為兩源一出葱嶺一出于闐其河復合東注蒲昌海復潜行地下南出積石山西南流又東迴入塞過燉煌酒泉漲掖郡南與洮河合過安定北地郡北流過朔方郡西又南流過五原郡南又東流過雲中西河郡東又南流過上都河東郡西而出龍門汾水從東于北入河東即龍門所在吕氏春秋曰龍門未開河出孟門東大溢是謂洪水禹鑿龍門始南流至華隂潼闗與渭水合又東迴砥柱砥柱山名河水分流包山而過山見水中若柱然今陕州東河北陕縣三縣界及洛陽孟津所在至鞏縣與洛陽水合成臯與濟水合濟水出河北至王屋山而南截河渡正對成臯又東北流過武徳與沁水合至黎陽信都信都今冀州絳水所在絳水亦曰潰水一曰漳水鉅鹿之北遂分九河鉅鹿今郢州大陸所在大陸澤名九河一曰徒駭二太史三馬頰四覆釡五湖蘇六簡七潔八鉤盤九鬲津又合為一河而入海齊桓公塞九河以廣田居故館陶貝丘廣川信都東光河間東城地九河舊迹猶存漢代河決金堤南北多罹其害議者常欲求九河故迹而穿之未知其所是以班固云自兹距漢已亡其八枝河之故瀆自沙丘堰南分河出焉故尚書稱導河積石至于龍門今絳州龍門縣界南至于華隂北至于砥柱東至于孟津在洛北都道所奏古今以為津東過洛汭至于大伾洛汭今鞏縣在河洛合流之所}
