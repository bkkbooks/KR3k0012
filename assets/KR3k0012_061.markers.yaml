  - {type: variant, offset: 2677, length: 321, content: 都記曰對西陝南岸有山其峰孤秀人自山南上至頂俯臨大江如縈帶視舟舡如鳧鴈又曰大江清濁分流其水十丈見底視魚游如乘空淺處多五色石新序曰禹南濟于江黃龍負舟舟中之人失色禹仰視天而歎曰吾受命於天死生命也龍弭耳而逃吳錄曰步騭表言北降人說北多作而囊欲以盛沙塞大江吳主曰此曹必不敢來若不如孤言當以牛千頭為君作主人後見呂岱說騭言北欲以囊塞江輒失笑曰此江自開闢以來寧可以囊塞乎水經注曰昔吳郡太守張公直自九江守徵還道由廬山子女觀祠女戲廟像其妻夜夢神人致娉覺言於夫至明恐怖遽發舡引中流而不行妻曰愛一女而合門受禍也公直不忍遂令妻下女於江其妻布廗水上以其亡兄女代之而舡得進尋公直知兄女怒妻曰吾何面於當世也復下己女於水中將渡遙見二女於岸側傍有一吏立曰吾廬君主簿敬君之義悉還二女, WYG: 麥}
