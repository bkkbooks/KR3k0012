  - {type: variant, offset: 420, length: 0, content: '', SBCK: 河之大溢不過三日水經注曰漢平帝之丗河汴決壞未及得修汴渠東侵日月彌廣門閭故處皆水中也漢明帝永平十二年議治汴渠上乃引樂浪人王景問水形便景陳利害應對敏捷帝甚善之乃賜山}
