  - {type: variant, offset: 416, length: 1, content: 老, WYG: 法然亦救敗術也今據堅地作石隄東西水門但用木與土耳旱則開東方水門以溉田水則開西方髙門以分河此誠富國安民興利除害謂之中策茍繕完故隄増卑培原勞費無已數逢此害謂之最下䇿也又武帝元光中河水決頓丘發卒十萬救決河起龍淵宫武廟也自作之故言官吕氏春秋曰故龍門未開吕梁未𤼵河水來孟門大溢逆流名曰洪水禹乃決江疏河為彭蠡之障所活者千八百國此禹之功文}
