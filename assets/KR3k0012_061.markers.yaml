  - {type: variant, offset: 12, length: 0, content: '', SBCK: 河之故瀆自沙丘堰南分河出焉故尚書稱導河積石至于龍門今絳州龍門縣界南至于華隂北至于砥柱東至于孟津在洛北都道所湊古今以爲津東過洛汭至于大伾洛汭今鞏縣在河洛合流之所也大伾山今汜水縣即故成皐也山爯成曰伾北過絳水至于大陸其絳水今兾州信都大陸澤名今邢州鉅鹿又北播爲九河同爲逆河入海是也同合出九河又合爲一名爲逆河逆迎也言海口有潮夕潮以迎河水書曰九河旣道孔安國}
  - {type: variant, offset: 12, length: 0, content: '', WYG: 大伾山今汜水縣即故成臯也山再成曰伾北過絳水至于大陸其絳水今冀州信都大陸澤名今邢州鉅鹿又北播為九河同為逆河入海是也同合出九河又合為一名為逆河逆行也言海口有潮汐以迎河水書曰九河既道孔安國}
  - {type: variant, offset: 12, length: 0, content: '', krp: 河之故瀆自沙丘堰南分河出焉故尚書稱導河積石至于龍門今絳州龍門縣界南至于華隂北至于砥柱東至于孟津在洛北都道所湊古今以爲津東過洛汭至于大伾洛汭今鞏縣在河洛合流之所也大伾山今汜水縣即故成皐也山爯成曰伾北過絳水至于大陸其絳水今兾州信都大陸澤名今邢州鉅鹿又北播爲九河同爲逆河入海是也同合出九河又合爲一名爲逆河逆迎也言海口有潮夕潮以迎河水書曰九河旣道孔安國}
  - {type: variant, offset: 13, length: 3, content: 引穢濁, SBCK: 曰河水分爲九道詩曰關􅀜雎鳩在河之洲又曰新臺有泚河水瀰瀰又曰河水洋洋北流活活又曰誰謂河廣一葦航之誰謂送逺􅉥予望之又曰不敢􅁀虎不敢慿河大戴禮曰聖人有國則河不滿溢禮斗威儀曰君乗土而王}
