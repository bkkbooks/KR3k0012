  - {type: variant, offset: 675, length: 0, content: '', SBCK: 尚可活也周曰須我爲汝向南詣楚王決江淮以漑汝鮒魚曰今命在盆甕之中耳乃爲我見楚王決江淮以漑我汝即索我於枯魚之肆矣􅀳陽秋曰秦始皇}
  - {type: variant, offset: 675, length: 0, content: '', WYG: 尚可活也周曰須我為汝向南詣楚王決江淮以溉汝鮒魚曰今命在盆甕之中耳乃為我見楚王決江淮以溉我汝即索我于枯魚之肆矣晉陽秋曰秦始皇}
  - {type: variant, offset: 675, length: 0, content: '', krp: 尚可活也周曰須我爲汝向南詣楚王決江淮以漑汝鮒魚曰今命在盆甕之中耳乃爲我見楚王決江淮以漑我汝即索我於枯魚之肆矣晉陽秋曰秦始皇}
  - {type: variant, offset: 676, length: 1, content: 海, SBCK: 遊望氣者云五百年後金陵有天子氣於是始皇改曰秣陵塹北山以絶其􅀔今建康即秣陵西北界所塹即建康南淮也今謂}
  - {type: variant, offset: 676, length: 1, content: 海, WYG: 遊望氣者云五百年後金陵有天子氣於是始皇改曰秣陵塹北山以絶其勢今建康即秣陵西北界所塹即建康南淮也今謂}
  - {type: variant, offset: 676, length: 1, content: 海, krp: 遊望氣者云五百年後金陵有天子氣於是始皇改曰秣陵塹北山以絶其勢今建康即秣陵西北界所塹即建康南淮也今謂}
  - {type: variant, offset: 678, length: 222, content: 波神也君豈有斗升之水活我哉又曰北溟有魚其名曰鯤化為鳥其名曰鵬將徙於南溟擊水三千里又曰秋水時至百川灌河諸涯之間不辨牛馬河伯欣然自喜以天下之美為盡在己順流東行至於北海東面而視不見水端向若而歎北海若曰井蛙不可以語於海者拘於墟也夏虫不可以語於冰者篤於時也曲士不可以語於道者束於教也天下之水莫大於海萬川歸之不知何時止而不盈尾閭泄之不知何時已而不虛春秋不變水旱不加此過江河之流不可為量數司馬彪曰尾閭水之從海外出者也文子曰古之善為君者法海以象其大注下以成其廣, SBCK: 秦淮}
