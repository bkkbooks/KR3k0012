  - {type: variant, offset: 1456, length: 418, content: 去至父所父疑家中有故乘之而還後馬見女輒怒而奪擊父怪之密問女女具以告父父乃射殺馬𦢊皮於庭女之皮所以足蹙之曰爾馬而欲為婦自取屠割何如言未竟皮蹶然忽起卷女而行父還失後大樹之間得女及皮盡化為蠶績於樹上其蠒厚大異於常蠶鄰女取食養之其收亦倍今世或謂蠶為女兒古之遺語也真子曰廊廟之材蓋非一木之枝也狐白之裘蓋非一狐之皮也韓子曰翟人獻豊狐玄豹之皮於晉文又曰西門豹性急佩韋以緩己董安于心緩佩弦以自急常皮也楊子法言曰羊質虎皮見草而悅見豺而戰忘其皮之虎也䈥角周禮曰凡相角秋閷音殺者厚春閷者簿稺牛之角直而澤老牛之角紾而昔紾徒展切昔讀為交錯之錯疚疾險中牛有久疾則角裏傷瘠牛之角無澤少潤氣也角欲青白而豐末豐大也角長二尺有五寸三色不失理謂之牛戴牛三色本白中青末豐也牛戴牛角一直牛也又曰凡相筋欲小簡而長大結而澤則其為獸必剽以為弓則豈異於其獸筋欲敝之敝嚼之當孰也禮曰祭天地之牛角蠒栗宗廟之牛角握賓客之牛角尺左傳曰鼷鼠食郊牛角爾雅曰北方之美者幽都之筋角焉幽都山名謂野牛筋角也, SBCK: 斃貪餌吞釣釘}
