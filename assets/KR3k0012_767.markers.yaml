  - {type: variant, offset: 3296, length: 2, content: 逼暮, WYG: 燒甎伐木朞年中成七墓葬十三棺宋書曰范􅁮字蔚宗母如厠産之額為甎所傷故以甎為小字鄭緝之東陽記曰獨公冢在縣東八十里有冢臨溪其甎文曰筮言吉龜言凶三百年墮水中義熈中冢猶半在自後稍已崩盡續搜神記曰順陽范啓母喪當葬前母墓在順陽往迎之既至而墳壟雜沓難可識别}
