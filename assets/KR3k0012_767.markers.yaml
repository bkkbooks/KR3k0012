  - {type: variant, offset: 3412, length: 3, content: 宋太元, WYG: 晝獨處室有鳩自外入止前牀張氏惡之披懐而祝曰鳩爾來為我禍耶飛上承塵為我福耶来入我懐鳩翻入懐以手探之則不知鳩之所在而得一金鈎焉遂寳之自是之後子孫昌盛資財萬倍蜀賈客至長安}
