  body:
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 二板瓦甎塹蒭茭堊竿鈎釘鐷礪板􅁑洪神仙傳曰王逺字太平東海人也􅀶學六經尤明天文圖䜟河洛之要逆知天人盛衰之期九州􅁻凶漢桓帝聞之連徴不岀使郡國逼載以詣京師低頭閉口不肯荅乃題宫門扇板四百餘字皆說方來帝甚怒之使人削之外字去内字復見黒皆徹入板裏續捜神記曰聶支豫章新􅇭古暗切人少時貧常夜照見}
  - {type: variant, offset: 3, length: 523, content: 一膠周禮曰凡相膠欲朱色而昔昔也者深瑕而澤紾而摶廉摶圜也廉瑕嚴利也鹿膠青白馬膠赤白牛膠火赤鼠膠黑魚膠餌犀膠黃皆謂煮用其皮或用角也禮曰脂膠丹漆無或不良監工日號無作淫巧以蕩上心史記曰趙奢死藺相如病篤使廉頗攻秦秦敗趙軍秦之間言曰秦之所惡獨畏趙奢之子趙括為將耳趙王因以括代廉頗相如曰王以名而使括若膠柱而鼓瑟耳括徒能讀父書傳不知合變也趙王不聽遂將之漢書曰晁錯上書曰欲兵威者始於折膠秋至膠可折弓弩司用匈奴可以出軍謝承後漢書曰雷義與陳重為交鄉人為之語曰膠漆雖堅不如雷與陳帝王世紀曰昭王濟漢船人惡之以膠船進王中流膠舡解王沒于水中洲記曰鳳麟州以鳳啄及麟角合煎作膠名曰集弦膠一名連金泥膠青色如碧玉漢武時西王母使獻靈膠四兩帝不知其妙以付庫帝幸上林苑射虎而弩弦斷使從駕因取一分膠口濡以集弦射虎而帝使武士對挽終不脫勝未集時呂氏春秋曰桓公使人告魯曰管夷吾寡人之讎也願生得而親加手焉魯君許諾乃使吏鞹其拳膠其目以革囊其手也盛之以鴟夷置之革車孔融同歲論曰阿膠徑寸不能止黃河之濁本草經曰膠一名鹿角膠味甘平治傷中勞絕腰痛瘦補中益氣婦人無子曹植樂府歌曰膠漆至堅浸之則離皎皎素絲隨染色移君不我棄讒人所為漆書曰兗州厥貢漆絲豫州厥貢漆枲詩曰樹之榛栗椅桐梓漆史記曰豫讓為智伯報趙襄子吞炭漆身又曰秦, WYG: ''}
  - {type: variant, offset: 3, length: 0, content: '', krp: 二板瓦甎塹蒭茭堊竿鈎釘鐷礪板葛洪神仙傳曰王逺字太平東海人也博學六經尤明天文圖䜟河洛之要逆知天人盛衰之期九州吉凶漢桓帝聞之連徴不岀使郡國逼載以詣京師低頭閉口不肯荅乃題宫門扇板四百餘字皆說方來帝甚怒之使人削之外字去内字復見黒皆徹入板裏續捜神記曰聶支豫章新滏古暗切人少時貧常夜照見}
  - {type: xml-element, offset: 4, content: '', id: KR3k0012_CHANT_767-bkkxmlele1}
