  - {type: variant, offset: 221, length: 2, content: 膠漆, SBCK: 晉張載字孟陽甚醜毎出爲小兒擲瓦盈車葛洪神仙傳曰孫􅀶者河東人也有藏人亡奴在軍中者因以求之不得􅀶語奴主曰吾爲卿燒其營舎奴出走卿但諦伺取之於是􅀶以一赤瓦擲之湏􅁷火起張天奴果出走而得之􅀶乃以青瓦擲之火即㓕屋舎百物向巳燋燃者悉復如故靈􅀑志曰有士人姓鄒㘴齋中忽有一人通刺詣之題刺云舒甄仲旣去疑其非人㝷其刺曰吾知之矣是予舎西土瓦中人耳便徃令人將鏵掘之果於瓦器中得桐人長尺餘管子曰棟橈不勝任則屋覆而人不怨者其理然也弱子慈母之所愛也不以其理而下瓦則慈母笞之故其理動者}
