  - {type: variant, offset: 3545, length: 0, content: '', WYG: 絃死道邉曲如鈎乃封侯張衡賦曰仰飛纎􅌳俯釣長流觸矢而斃貪餌吞鈎釘魏畧曰晉宣王討王陵陵自知罪重試索棺釘以觀太傅意太傅給之陵夜呼掾屬與訣曰行年八十身名並㓕遂自殺盛𢎞之荆州記曰冠軍縣東有魏征南司馬張詹墓元嘉初尚儼然六年民飢始被發金銀}
