  - {type: variant, offset: 1228, length: 0, content: '', krp: 天地不仁以萬物爲蒭狗聖人不仁以百姓爲蒭狗趙壹嫉邪賦曰勢家多所冝欬唾自成珠𬒳褐懷金玉蘭蕙化爲蒭堊音惡禮曰在堊室之中不與㘴焉山海經曰慈聾之山其中有大谷是多白墨青堊謂有雜色之堊太公六韜曰昔帝堯王天下上世謂賢君其治則宮恒室屋不堊也莊子曰郢人堊漫其鼻端若蠅翼使匠石斵之運斤成風盡堊而鼻不傷郢人立而不失容竿詩曰籊籊竹竿以釣于淇籊籊長而殺也說}
