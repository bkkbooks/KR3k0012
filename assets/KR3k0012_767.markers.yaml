  - {type: variant, offset: 226, length: 0, content: '', SBCK: 爲怨不以其理動者下瓦必笞莊子曰師曠爲􅀳平公作清角一奏有雲從西北起再奏大雨大風隨之裂帷幕破爼豆墮廊瓦平公懼伏于室内抱朴子曰土柈瓦胾不可救飢甎爾雅曰瓴謂之甓甎也今江東呼甓甓音蒲歴切古史考曰烏曹氏作甎魏略曰扈累獨居道側以㼾瓦甎爲障施一厨牀食􅀫其中􅀳書曰吴興吴陸經痑癘死者十三在青唯逵夫妻家貧冬無􅀍袴晝傭賃夜還燒甎伐木朞年中成七墓葬十二喪宋書曰范曄字蔚宗母}
