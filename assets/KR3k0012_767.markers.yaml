  - {type: variant, offset: 2386, length: 352, content: 解毛可續而衣也陸機羽扇賦曰昔楚襄王會於章臺之上宋玉唐勒侍皆操白鵠之羽以為扇張載羽扇賦曰有翔雲之素鳥體自然之至潔飄縞羽毛清風擬妙姿於白雪蘧蒢方言曰簟粗者謂之蘧蒢晉書曰慕容暐見符堅曰暫屈鑾駕幸臣私第堅許之暐出王嘉曰推蘆作蘧蒢不成文章會天大雨不得殺羊堅與群臣莫之能解是夜大雨晨不果出三輔故事曰哀帝崩王莽奏發傳太后冢以蘧蒢裹屍還定陶倉庫令曰諸輸米麥二十斛蘧蒢一番皇甫謐篤終論曰死以蘧蒢裹屍麻繩約二頭筣笓魏略曰裴潛為尚書令妻子貧乏織筣笓以自供傅咸効事曰令史張濟案行城東見有新立屋間筣笓障二十丈推問是少府夏侯俊所作請免俊官笪方言曰荇戶當切篖音當自關而東周洛楚魏之間謂之倚佯自關而西謂之荇篖南楚之外謂之篖郭璞曰荇篖以蘧蒢直文而租江東呼為笪繩通俗丈曰合繩曰紏單展曰紉女鄰切織繩曰辮大繩曰絙古怕切易曰上古結繩而治後世聖人易, SBCK: 工鑄}
