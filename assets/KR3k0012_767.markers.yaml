  - {type: variant, offset: 793, length: 164, content: 成漆也一蕭廣濟孝子傳曰申屠勳字君遊少失父與母居家貧傭力供養作壽器用漆五六斛十年乃成何晏九州論曰平安好棗中山好栗真定好梨共汲好漆續述征記曰古之漆園在中牟今猶生漆樹也梁王時莊周為漆園吏則斯地南越志曰綏寧白水山多漆樹高十餘丈刻漆常上樹端雞鳴日出之始便刻之則有所得過此時陰氣淪陽氣升則無所獲也凡刻漆別有氏族以為業膺前緣木處胼胝如人腳也蠟, krp: 裂}
