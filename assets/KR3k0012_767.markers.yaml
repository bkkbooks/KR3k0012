  - {type: variant, offset: 1205, length: 3, content: 舍切山, krp: 餘意甚疑試令人以足撥灰中土兾得舊物果得一甎銘云順陽范堅}
  - {type: punctuation, offset: 1207, content: 。, id: KR3k0012_CHANT_767-bkkpn419}
