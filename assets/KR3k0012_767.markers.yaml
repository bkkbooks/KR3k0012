  - {type: variant, offset: 3546, length: 1, content: 絃, WYG: 漆之器爛然有二朱漆棺棺前垂竹簿簾以金釘之楊龍驤洛陽記曰石牛一頭在城西北九十里耆舊傳說往者石虎當襄國石牛夜喚聲聞三十里事奏虎虎遣人打落牛两耳及尾以鐵釘釘四腳今現存抱朴子曰呉有趙柄以大釘釘柱入尺許以氣吹之釘即躍出如弩箭之發鏶廣雅曰鏶謂之􅀈戈渉切說文曰鏶􅀈也礪詩曰周道如砥書曰揚州厥貢礪砥又曰若金用汝作礪史記曰封爵之誓曰黄河如帶泰山如礪蔡邕觀學曰木以}
  - {type: page-break, offset: 3546, content: '', id: KR3k0012_WYG_767-10a, image: WYG0899/WYG0899-0714a.png}
  - {type: page-break, offset: 3546, content: '', id: KR3k0012_WYG_767-10b, image: WYG0899/WYG0899-0714b.png}
