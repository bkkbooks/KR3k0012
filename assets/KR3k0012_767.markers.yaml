  - {type: variant, offset: 3548, length: 1, content: 清, WYG: 直金以淬剛必湏砥礪就其鋒鋩魏志曰殺幽州牧劉虞有童謡曰燕南垂趙北際中央不合平}
  - {type: variant, offset: 3550, length: 3, content: 玉壺水, WYG: 礪唯有此中可避世公孫瓉以易當之乃築京固守積穀三百萬斛廣志曰礪石出首陽山有紫白彩色出南昌者最善今武庫有數枚治御刀山海經曰髙梁之山多砥礪尸子曰鐵使平越之工鑄之以為劒而弗加砥礪則以刺不入擊不斷磨之以礱礪加之以黄砥則刺也無前擊也無下自是觀之礪之與弗礪其相去逺矣今人皆礪其劒而弗知礪其身夫學身之砥礪也太平御覽卷七百六十七}
