  - {type: variant, offset: 1415, length: 4, content: 舊說大古, SBCK: 京兆長安有張氏晝獨處室有鳩自外入止前牀張氏惡之披懷而祝曰鳩爾來爲我禍耶飛上承塵爲我福耶來入我懷鳩飜入懷以手探之則不知鳩之所在而得一金鈎焉遂寳之自是之後子孫昌盛資財萬倍蜀賈客至長安中聞之乃厚賂内婢婢竊鈎以與客張氏旣失鈎漸貧死喪而蜀客亦數罹窮厄不爲巳利或告之天命也不可以力求於是賫鈎以返張氏張氏復昌故􅀜西稱張氏鈎風俗通曰順帝}
