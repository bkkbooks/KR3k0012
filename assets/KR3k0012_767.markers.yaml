  - {type: variant, offset: 3408, length: 3, content: 武康徐, WYG: 豫章胡兹在蜀郡治宋㤗始四年空中忽有故冢墓甎青苔石灰擲其母前勢甚數舉家驚懼然終不中人旬日乃止語林曰陶太尉既作廣州優游無事常朝自運甓甎也於齋外暮運於齋内人問之陶曰吾方致力中原恐為爾優游不復堪事塹東觀漢記曰周紆字文通為渤海太守坐事免家貧身築塹以自給食蒭茭書曰峙乃蒭茭亡敢弗多詩曰生蒭一束其人如玉禮曰以足􅕚路馬蒭有誅聲類曰茭乾蒭也老子曰天地不仁以萬物為蒭狗聖人不仁以百姓為蒭狗趙壹娯邪賦曰勢家多所宜欬唾自成珠披褐懐金玉蘭􅈍化為蒭堊音惡禮曰在堊室之中不與坐焉山海經曰慈聾之山其中有大谷是多白墨青堊謂有雜色之堊太公六韜曰昔帝堯王天下上世謂賢君其治垣宫室屋不堊也莊子曰郢人堊漫其鼻端若蠅翼使匠石斵之運斤成風盡堊而鼻不傷郢人立而不失容竿詩曰籊籊竹竿以釣于淇說文曰竿竹挺也漢書曰斬木為兵掲竿為旗續漢書曰髙􅃫字文通南陽人妻将之田曝麥於庭令鳯䕶鷄然天暴風大雨鳯持竿誦經不覺潦水流麥妻還怪問鳯方悟博物志曰詹何以獨蠒之絲為綸芒針為鈎荆篠為竿剖粒為餌引盈車之魚於百仞之淵莊子曰楚王聘莊周於濮水之上莊子持竿不顧鈎史記曰桀有力能伸鈎索鐵搜神記曰京兆長安有張}
