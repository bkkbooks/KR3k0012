  - {type: variant, offset: 1209, length: 0, content: '', krp: 妻然後信之述異記曰豫章胡兹家在郡治宋㤗始四年空中忽有故冡墓甎青笞石灰着之礚然擲其母前其數或五三俱至舉家驚懼然終不中人旬日乃止語林曰陶太尉旣作廣州優遊無事常朝自運甓甎也於齋外暮運於齋内人問之陶曰吾方致力中原恐爲爾優遊不復堪事塹東觀漢記曰周紆字}
  - {type: variant, offset: 1210, length: 4, content: 皮焉郭璞, krp: 通爲渤海太守坐事免家貧身築塹以自給食蒭茭書}
