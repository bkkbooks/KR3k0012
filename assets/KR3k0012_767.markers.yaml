  - {type: variant, offset: 796, length: 326, content: 一蕭廣濟孝子傳曰申屠勳字君遊少失父與母居家貧傭力供養作壽器用漆五六斛十年乃成何晏九州論曰平安好棗中山好栗真定好梨共汲好漆續述征記曰古之漆園在中牟今猶生漆樹也梁王時莊周為漆園吏則斯地南越志曰綏寧白水山多漆樹高十餘丈刻漆常上樹端雞鳴日出之始便刻之則有所得過此時陰氣淪陽氣升則無所獲也凡刻漆別有氏族以為業膺前緣木處胼胝如人腳也蠟晉中興書曰王敦死祕不發喪褁屍以席塗之以蠟埋於齋中諸葛瑤等日縱酒淫樂愽物志曰荒年暫辟穀法伹食蠟半斤輒支十日不飢東阿王嘗錄甘始同寢處百日不食而容體自若此術術世說曰石季倫以蠟燭炊黃屑南方草物狀曰黃屑在山中藤生蔓延緣著樹木以九月中刮取根皮乾暴曰南黃屑最黃好歲以獻皮書曰梁州厥貢熊熊狐狸織皮左傳曰皮之不存毛將安傅又曰無綏子嘉父使孟樂如晉因孟, SBCK: ''}
