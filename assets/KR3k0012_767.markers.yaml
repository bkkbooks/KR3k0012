  - {type: 'tls:seg', offset: 4, content: '', id: KR3k0012_CHANT_767-1a.2}
  - {type: variant, offset: 4, length: 2, content: 膠周, SBCK: 白鹿射中之明㝷蹤血旣盡不知所在且巳飢極便卧一梓樹下仰見箭着樹枝視之乃是昨射箭恠其如此於是還家賫粮命子姪持斧以伐之樹微有血遂裁截爲板二板牽着破塘中板常沉地然時復浮岀輙家有􅁻慶毎欲致賔客輙便此板於中流欲没客大懼聶君呵之還復浮岀仕宦大如意位至丹陽太守在郡經時外司白云濤入石頭聶然聶君以板破中板來耳視之果然聶君以板來必有意即觧職歸家下舡便閉户二板挾兩邊一日至豫章自爾之後板岀便反有凶禍家大轗軻幽明録曰義熈中江乗聶湖忽有一板廣數尺長二丈餘􅁪停在此川溪採菱及捕魚者資此以自濟後有數人共乗板入湖試以刀斫即有血岀板仍没數人溺死瓦古史考曰夏丗昆吾氏作屋瓦}
