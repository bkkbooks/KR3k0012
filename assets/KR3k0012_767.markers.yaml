  - {type: variant, offset: 3294, length: 1, content: 京, WYG: 西北起再奏大雨大風隨之裂帷幕破爼豆堕廊瓦平公懼伏於室内抱朴子曰土蚌瓦胾不可救飢甎爾雅曰瓴謂之甓蒲歴切即甎也古史考曰鳥曹氏作甎魏畧曰扈累獨居道側以㼾甎為障施一厨牀食宿其中晉書曰呉興呉逵經疫癘合門死者十三唯逵夫妻家貧冬無衣被晝傭賃夜}
