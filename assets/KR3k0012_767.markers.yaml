  - {type: variant, offset: 3236, length: 5, content: 俱行道術各, WYG: 博學六經尤明天文圖䜟河洛之要逆知天人盛衰之期九州吉凶漢桓帝聞之連徴不出使郡國逼載以詣京師低頭閉目不肯荅乃題宫門扇板四百餘字皆說方來帝甚怒之使人削之外字去内字復見墨皆徹入板裏續搜神記曰聶支豫新淦古暗切人少時貧常夜照見一白鹿射中之明尋蹤血旣盡不知所在且已飢極便卧一梓樹下仰見箭着樹枝視之乃是昨射箭怪其如此於是還家賫糧命子姪持斧以伐之樹㣲有血遂裁截為板二板牽著坡塘中板常沈地然時復浮出輙家有吉慶每欲致賔客輙使此板於中流欲没客大懼聶君呵之還復浮出仕宦大如意位至丹陽太守在郡經時外司白云濤入石頭夜聞神語曰聶君板來來日視之果然聶君以板來必有意即解職歸家下船便閉戸二板夾兩邊一日至豫章}
