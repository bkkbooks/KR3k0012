  - {type: variant, offset: 3299, length: 0, content: '', WYG: 知何許袁彦仁時為豫州往看之因云聞有一人見鬼范即如言令物色覔之比墓中一人衣服顔状如之即開墓棺物皆爛塚中灰壤深尺餘意甚疑試令人以足撥灰中土兾}
