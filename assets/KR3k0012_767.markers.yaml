  - {type: variant, offset: 3290, length: 36, content: 忘姓名從京還逼暮不得至家遇雨宿廣屋中雨止月朗遙見一女子來至屋簷下便有悲歎, SBCK: 皆礪其劒而弗知礪其身夫學身}
  - {type: variant, offset: 3290, length: 3, content: 忘姓名, WYG: 通刺詣之題刺云舒甄仲既去疑其非人尋其刺曰吾知之矣是予舎西土瓦中人耳便往令人将鍤掘之果於瓦器中得桐人長尺餘管子曰棟橈不勝任則屋覆而人不怨者其理然也弱子慈母之所愛也不以其理而下瓦則慈母笞之故以理動者雖覆屋不為怨不以其理動者下瓦必笞莊子曰師曠為晉平公作清角一奏有雲}
