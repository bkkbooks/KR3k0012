  - {type: variant, offset: 208, length: 10, content: 雷義與陳重為交鄉人為, SBCK: 董卓作亂燒南北宫雒陽城無􅃗瓦尺木吴時外國傳曰大􅁗國以水精爲瓦􅀳起居注曰成都王討長沙王使陸機都督三十七萬衆圍洛陽四匝夜鼓譟京師屋瓦皆裂􅀳中興書曰㤗寧元年五月大廻風吹劉曜太廟瓦垣外數十歩其欒梁拱捂無離者瓦亦不毀曜素服五月繕治之淮南子曰以磁石之能連鐵也而求其引瓦則難矣漢武故事曰武帝起神明殿砌以文石用布爲瓦而淳􅃮其外四門並如}
  - {type: page-break, offset: 208, content: '', id: KR3k0012_SBCK_767-2b}
  - {type: variant, offset: 208, length: 64, content: 雷義與陳重為交鄉人為之語曰膠漆雖堅不如雷與陳帝王世紀曰昭王濟漢船人惡之以膠船進王中流膠舡解王沒于水中洲記曰鳳麟州以鳳啄及麟角合煎, krp: 董卓}
