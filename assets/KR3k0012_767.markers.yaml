  - {type: variant, offset: 527, length: 2695, content: 世立又欲漆其城優旃曰善上雖無言固將請之漆城城滑蕩蕩寇來不能上欲就之易為漆耳難為陰室於是二世笑而止戰國策曰三晉分智氏趙襄子怨智伯漆其頭以為飲器漢書殖貨志曰漆千大斗亦比千乘之家范曄後漢書曰樊重欲作器先種漆而鄉人笑之積以歲月皆得其用向之笑者皆取給焉莊子曰山木自寇也膏火自煎也桂可食故人伐之漆可用故人割之人皆知有用之用而莫知無用之用也韓子曰舜作食器斬山木而財之削鋸循其跡流漆墨其上諸侯以為益侈國之不服者十三又曰堯無膠漆之約於當世而道行山海經曰英鞮之山其上多出漆列仙傳曰丁次卿欲還峨眉山語主人丁氏云當相為作漆以甖十枚盛水覆口從次唾之百日乃發皆成漆也一蕭廣濟孝子傳曰申屠勳字君遊少失父與母居家貧傭力供養作壽器用漆五六斛十年乃成何晏九州論曰平安好棗中山好栗真定好梨共汲好漆續述征記曰古之漆園在中牟今猶生漆樹也梁王時莊周為漆園吏則斯地南越志曰綏寧白水山多漆樹高十餘丈刻漆常上樹端雞鳴日出之始便刻之則有所得過此時陰氣淪陽氣升則無所獲也凡刻漆別有氏族以為業膺前緣木處胼胝如人腳也蠟晉中興書曰王敦死祕不發喪褁屍以席塗之以蠟埋於齋中諸葛瑤等日縱酒淫樂愽物志曰荒年暫辟穀法伹食蠟半斤輒支十日不飢東阿王嘗錄甘始同寢處百日不食而容體自若此術術世說曰石季倫以蠟燭炊黃屑南方草物狀曰黃屑在山中藤生蔓延緣著樹木以九月中刮取根皮乾暴曰南黃屑最黃好歲以獻皮書曰梁州厥貢熊熊狐狸織皮左傳曰皮之不存毛將安傅又曰無綏子嘉父使孟樂如晉因孟莊子納虎豹之皮以和諸戎又曰齊莊公為勇爵殖綽郭最欲預焉自以為勇州綽曰東閭之役臣左驂迫還於門中識其枚數可以與於此乎然二子者譬於禽獸臣食其肉而寢處其皮矣爾雅曰東北之美者斥尺舍切山之文皮焉郭璞曰虎豹之屬皮有縟綵論語曰子曰文猶質也質猶文也虎豹之鞹猶犬羊之鞹也漢書曰元狩四年有司言用度不足請收銀錫白金及皮幣以足用應劭曰時國用不足以白鹿皮為幣朝覲以薦壁又曰荅布皮千石亦比千乘之家范曄後漢書曰李恂為兗州刺史以清約率下席羊皮臥布被遷張掖太守有威重名文子曰木強即折革強即裂神異經曰北方有曾冰萬里厚百丈有鼠在土中焉食草木肉重萬斤可以作脯食之已熱除熱病也其皮可以蒙鼓其聞千里有美尾可以來鼠此尾所在鼠即聚搜神記曰舊說大古時有人遠征家唯有一女并馬一疋女思父乃戲馬曰爾能為我迎得父吾將嫁汝馬乃絕軮而去至父所父疑家中有故乘之而還後馬見女輒怒而奪擊父怪之密問女女具以告父父乃射殺馬𦢊皮於庭女之皮所以足蹙之曰爾馬而欲為婦自取屠割何如言未竟皮蹶然忽起卷女而行父還失後大樹之間得女及皮盡化為蠶績於樹上其蠒厚大異於常蠶鄰女取食養之其收亦倍今世或謂蠶為女兒古之遺語也真子曰廊廟之材蓋非一木之枝也狐白之裘蓋非一狐之皮也韓子曰翟人獻豊狐玄豹之皮於晉文又曰西門豹性急佩韋以緩己董安于心緩佩弦以自急常皮也楊子法言曰羊質虎皮見草而悅見豺而戰忘其皮之虎也䈥角周禮曰凡相角秋閷音殺者厚春閷者簿稺牛之角直而澤老牛之角紾而昔紾徒展切昔讀為交錯之錯疚疾險中牛有久疾則角裏傷瘠牛之角無澤少潤氣也角欲青白而豐末豐大也角長二尺有五寸三色不失理謂之牛戴牛三色本白中青末豐也牛戴牛角一直牛也又曰凡相筋欲小簡而長大結而澤則其為獸必剽以為弓則豈異於其獸筋欲敝之敝嚼之當孰也禮曰祭天地之牛角蠒栗宗廟之牛角握賓客之牛角尺左傳曰鼷鼠食郊牛角爾雅曰北方之美者幽都之筋角焉幽都山名謂野牛筋角也魏略曰大秦國出駭雞犀角晉書曰王凱以帝舅奢豪有牛名八里百駿駭常瑩其蹄角後魏書曰桓帝英傑魁岸馬不能勝常乘安車駕大牛角容一石呂氏春秋曰甯戚飯牛扣角而歌淮南萬畢術曰燒角入山虎豹自遠東方朔占曰昔武帝亡劍不知取者誰無主名請朔往入宮見人持兩刺手中復持小牛角朔曰陛下宮中當有親林名字魚者取之帝曰有之即收考子魚服出劍帝曰朔何其工乎且說其占朔對曰入宮時見人持二刺手中復持小牛角因占之二木林字故知名字魚者取之齒書曰楊州厥貢齒革羽毛荊州厥貢毛齒詩曰元龜象齒大賂南金周禮曰荊州其利齒革禮曰季春之月令百工審五庫之量筋角齒羽無或不良左傳曰晉韓宣子為政諸侯之幣重鄭子產謂之曰象有齒以焚其身賄也宣子悅乃輕幣元嘉起居注曰彈廣州刺史韋朗象牙三十九枚羽毛書曰仲夏鳥獸希革夏時鳥獸毛羽希少改易革改也仲秋鳥獸毛毨毨理也毛更生整理仲冬鳥獸氄毛鳥獸皆生耎毳細毛以自溫焉又曰楊州荊州皆貢羽毛周禮曰九祈全羽為旒祈羽為旌左傳曰范宣子假羽毛於齊而弗歸齊人始貳析羽為旌因謂之羽毛尚書大傳曰夏成五服齒革羽毛器乃備魏志曰平原太守劉乂取印囊及山雞毛著器中令管輅筮之輅曰內方外圓五色成文含寶守信出則有章此印囊也高丘巖巖有鳥朱冠羽翼玄黃鳴不失晨此雞毛也列女傳曰老萊子隨其妻至於江南而止曰鳥獸之解毛可續而衣也陸機羽扇賦曰昔楚襄王會於章臺之上宋玉唐勒侍皆操白鵠之羽以為扇張載羽扇賦曰有翔雲之素鳥體自然之至潔飄縞羽毛清風擬妙姿於白雪蘧蒢方言曰簟粗者謂之蘧蒢晉書曰慕容暐見符堅曰暫屈鑾駕幸臣私第堅許之暐出王嘉曰推蘆作蘧蒢不成文章會天大雨不得殺羊堅與群臣莫之能解是夜大雨晨不果出三輔故事曰哀帝崩王莽奏發傳太后冢以蘧蒢裹屍還定陶倉庫令曰諸輸米麥二十斛蘧蒢一番皇甫謐篤終論曰死以蘧蒢裹屍麻繩約二頭筣笓魏略曰裴潛為尚書令妻子貧乏織筣笓以自供傅咸効事曰令史張濟案行城東見有新立屋間筣笓障二十丈推問是少府夏侯俊所作請免俊官笪方言曰荇戶當切篖音當自關而東周洛楚魏之間謂之倚佯自關而西謂之荇篖南楚之外謂之篖郭璞曰荇篖以蘧蒢直文而租江東呼為笪繩通俗丈曰合繩曰紏單展曰紉女鄰切織繩曰辮大繩曰絙古怕切易曰上古結繩而治後世聖人易之以書契書曰子臨兆民懍乎若朽索之馭六馬為人上者奈何不敬又曰木從繩則正后從諫則聖左傳曰吳伐齊齊公孫揮命其徒曰人尋約吳髮短約繩也八尺為尋吳欲以繩貫其首漢書曰龔遂為渤海太守盜賊不寧上問遂曰君欲何以息其盜賊遂曰選用賢良固欲安之臣聞治亂國猶治亂繩不可急唯緩之然後可治東觀漢記曰吳漢等圍朱鮪岑彭說鮪鮪從上下索曰必信可乘上彭趣索欲上鮪見其誠即許降後二日鮪將輕騎詣彭又曰許皇后父廣漢為官者丞上官桀謀反時廣漢部索其殿中廬有索長數尺可以縛人者數千枚滿人篋緘封廣漢索不得他吏往得之廣漢坐論為鬼薪輸掖庭後為暴室嗇夫晉書曰劉寔字子真平原人少貧苦賣牛衣以自給然好學手繩口誦愽通古今清身潔色州舉秀才皆不行後魏書曰楊大眼武都民王難當之孫少驍捷高祖征南李沖典選統校大眼往求冲不許大眼曰下官出一技便出長繩三丈繫於髻走繩直如絃馬馳不及冲曰千載已來未有若此遂用為軍主顧謂同僚曰吾之今日所謂蛟龍得水之秋不復與諸軍齊列矣武冠六軍淮泗之人以名止小兒蹄卒荊州刺史老子曰善繫者無繩約而不可解家語曰子貢問治民於孔子孔子曰懍焉如腐索之御忓馬文子曰夫繩之為度也可卷而懷之可引而伸之可直而布之長而不橫短而不窮直而不剛故聖人體之, WYG: 板瓦甎塹蒭茭堊竿鈎釘鐷􅀈板}
