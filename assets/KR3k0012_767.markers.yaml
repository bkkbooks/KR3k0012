  - {type: variant, offset: 3359, length: 194, content: 繩又斫屋上見一鬼西走向曙女氣方蘇能語家在前持此人將歸向女父母說其事或是天運使然因以女嫁與為妻異記曰武康徐氏宋太元中病瘧連治不斷有人告之曰可作數團飯出道頭呼傷死人姓名云為我斷瘧今以此團與汝擲之徑還勿反顧也病者如言乃呼晉故車騎將軍沈充須臾有乘馬導從而至問汝為何人而敢名官家因傳將去舉家尋覔經日乃於塚側叢棘下得之繩猶在時瘧遂獲痊傳玄九曲詩曰歲暮景邁時光絕安得長繩繫日月古詩曰直如朱絃繩清如玉壺水, SBCK: 第七百六十七}
