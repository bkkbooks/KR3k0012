  - {type: variant, offset: 1199, length: 1, content: 北, krp: 呼甓甓音蒲歴切古史考曰烏曹氏作甎魏略曰扈累獨居道側以㼾瓦甎爲障施一厨牀食宿其中晉書曰吴興吴陸經痑癘死者十三在青唯逵夫妻家貧冬無𬒳袴晝傭賃夜還燒甎伐木朞年中成七墓葬十二喪宋書曰范曄字蔚宗母如厠産}
  - {type: variant, offset: 1201, length: 3, content: 美者斥, krp: 額爲塼所傷故以塼爲小字鄭緝之東陽記曰獨公冡在縣東八十里有冡臨溪其甎文曰筮言吉龜言凶三百年墮水中義熈中冡猶半在自後稍已崩盡續捜神記曰順陽范啓母喪當葬前母墓在順陽徃迎之旣至而墳壟沓難可識別不知何許袁彦仁時爲豫州徃看之因云間有一人見鬼范即如言令物色覔之云此墓中一人衣服顔狀如之即開墓棺物皆爛塜中灰壤深}
