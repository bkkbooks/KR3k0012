  - {type: variant, offset: 2824, length: 454, content: 寧上問遂曰君欲何以息其盜賊遂曰選用賢良固欲安之臣聞治亂國猶治亂繩不可急唯緩之然後可治東觀漢記曰吳漢等圍朱鮪岑彭說鮪鮪從上下索曰必信可乘上彭趣索欲上鮪見其誠即許降後二日鮪將輕騎詣彭又曰許皇后父廣漢為官者丞上官桀謀反時廣漢部索其殿中廬有索長數尺可以縛人者數千枚滿人篋緘封廣漢索不得他吏往得之廣漢坐論為鬼薪輸掖庭後為暴室嗇夫晉書曰劉寔字子真平原人少貧苦賣牛衣以自給然好學手繩口誦愽通古今清身潔色州舉秀才皆不行後魏書曰楊大眼武都民王難當之孫少驍捷高祖征南李沖典選統校大眼往求冲不許大眼曰下官出一技便出長繩三丈繫於髻走繩直如絃馬馳不及冲曰千載已來未有若此遂用為軍主顧謂同僚曰吾之今日所謂蛟龍得水之秋不復與諸軍齊列矣武冠六軍淮泗之人以名止小兒蹄卒荊州刺史老子曰善繫者無繩約而不可解家語曰子貢問治民於孔子孔子曰懍焉如腐索之御忓馬文子曰夫繩之為度也可卷而懷之可引而伸之可直而布之長而不橫短而不窮直而不剛故聖人體之葛洪神仙傳曰樊夫人者劉剛妻也俱行道術各自言勝剛行見虎不敢起適欲捉往即噓之夫人往捉虎以面迫地不視失人以繩就繫虎頸曳, SBCK: 断磨}
