  - {type: variant, offset: 293, length: 283, content: 西王母使獻靈膠四兩帝不知其妙以付庫帝幸上林苑射虎而弩弦斷使從駕因取一分膠口濡以集弦射虎而帝使武士對挽終不脫勝未集時呂氏春秋曰桓公使人告魯曰管夷吾寡人之讎也願生得而親加手焉魯君許諾乃使吏鞹其拳膠其目以革囊其手也盛之以鴟夷置之革車孔融同歲論曰阿膠徑寸不能止黃河之濁本草經曰膠一名鹿角膠味甘平治傷中勞絕腰痛瘦補中益氣婦人無子曹植樂府歌曰膠漆至堅浸之則離皎皎素絲隨染色移君不我棄讒人所為漆書曰兗州厥貢漆絲豫州厥貢漆枲詩曰樹之榛栗椅桐梓漆史記曰豫讓為智伯報趙襄子吞炭漆身又曰秦二世立又欲漆其城優旃曰善上雖無言固將請之漆城城滑蕩蕩寇來不能上欲就之易為漆耳難為陰室於是二世笑而止戰, krp: 外}
