  - {type: variant, offset: 1877, length: 0, content: '', SBCK: 晉宣王討王陵陵自知罪重試索棺釘以觀太􅀓意太􅀓給之陵夜呼􅁺属與訣曰行年八十身名並滅遂自殺盛弘之荆州記曰冠軍縣東有魏征南司馬張詹墓元嘉􅀄尚儼然六年民飢始􅀍發金銀朱􅃮之器爛然有二朱􅃮棺棺前垂竹薄簾以金釘釘之楊龍驤洛陽記曰石牛一頭在城西北九重里􅂄舊傳􅀃者云石虎當襄國石牛夜喚聲三十里事奏虎虎遣人打落牛兩耳及尾以䥫釘釘四脚今見存抱朴子曰吴有趙炳以}
