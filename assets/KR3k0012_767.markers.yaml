  - {type: variant, offset: 3285, length: 2, content: 曲阿, WYG: 義熈中江乘聶湖忽有一板廣數尺長二丈餘恒停在此川溪採菱及捕魚者資以自濟後有數人共乘板入湖試以刀斫即有血出板仍没數人溺死瓦古史考曰夏世昆吾氏作屋瓦禮曰慕賢而容衆毁方而瓦合史記曰秦攻韓軍於武安西秦軍鼓噪勒兵武安屋瓦盡震漢書曰霍禹第巷端人見禹居堂屋上撒瓦投地就視亡有大怪之舉家憂愁未幾被誅續漢書曰董卓作亂燒南北宫雒陽城無隻瓦尺木呉時外國傳曰大秦國以水精為瓦晉起居注曰成都王討長沙王使陸機都督三十七萬衆圍洛陽四匝夜鼔噪京師屋瓦皆裂晉中興書曰㤗寧元年五月大廻風吹劉曜太廟瓦垣外數十歩其欒梁拱梧無離者瓦亦不毁曜素服五月繕治之淮南子曰以磁石之能運鐵也而求其引瓦則難矣漢武故事曰武帝起神明殿砌以文石用布為瓦而淳漆其外四門並如之說林曰晉張載字孟陽甚醜每出為小兒擲瓦盈車葛洪神僊傳曰孫博者河東人也有藏人亡奴在軍中者因以求之不得博語奴主曰吾為卿燒其營舎奴出走卿但諦伺取之於是博以一赤瓦擲之湏㬰火起張天果出走而得之博乃以青瓦擲之火即滅屋舎百物向已燋然者悉復如故靈鬼志曰人姓鄒坐齊中忽}
