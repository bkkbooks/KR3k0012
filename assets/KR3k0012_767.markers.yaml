  - {type: variant, offset: 511, length: 11, content: 讓為智伯報趙襄子吞炭漆, SBCK: 章胡兹家在郡治宋㤗始四年空中忽有故冡墓甎青笞石􅁅着之礚然擲其母前其數或五三俱至舉家驚懼然終不中人旬日乃止語林曰陶太尉旣作廣州優遊無事常朝自運甓甎也於齋外暮運於齋内人問之陶曰吾方致力中原恐爲爾優遊不復堪事塹東觀漢記曰周紆字文通爲渤海太守坐事免家貧}
