  - {type: variant, offset: 2645, length: 438, content: 王僧虔為尚書令嘗為飛白書題尚書壁曰圓行方止物之定質修之不已則溢高之不已則躓引之不已則遺是故去之宜疾當時嗟賞以比座右銘唐書曰劉洎除散騎常侍洎性踈俊敢言太宗工王羲之書尤善飛白嘗宴三品已上於玄武門帝操筆作飛白字賜群臣或乘酒爭取於帝手洎登御座引手得之皆奏曰洎登御床罪當死請付法帝笑而言曰昔聞婕妤辭輩今見常侍登床馬周太宗嘗以神筆賜周飛白書曰鸞鳳凌雲必資羽翼股肱之寄誠在忠良高宗為飛白書以賜侍臣賜戴至德曰泛洪源俟舟楫賜郝處俊曰飛九霄假六翮賜李玄敬曰資啟沃罄丹誠大業拾遺曰大業年煬帝將幸江都命越王侑留守東都宮女半不隨駕爭泣留帝攀車惜別指血染鞅帝不廻因飛白題二十字留賜宮妓云我夢江都好征遼亦偶然但留顏色在離別只今年唐會要曰貞觀十八年五日端午日太宗為飛白書作鸞鳳虬龍等字筆勢驚絕謂司徒長孫無忌吏部尚書楊師道曰五日舊俗必用服翫相賀朕今各賀君飛白扇二枚庶動清風以增美德書斷曰飛白書者後漢左中郎蔡邕所作也王隱王愔並云飛白變楷制也本是宮殿題署勢既勁大字宜輕微不滿名為飛白王僧虔云飛白八分之輕者雖有此說案, SBCK: ''}
