  - {type: variant, offset: 219, length: 0, content: '', krp: 囷七百四十九石六斗七合西囷六百九十七石八升遂署囷門後出米西囷六百九十七石九升中有一䑕大可一升東囷無差元禮後嵗復過廣漢以米數告之元理以手擊牀曰遂不知䑕之殊米不如剥面皮矣廣漢爲之取酒脯數斤元理復筭曰千牛産二百犢萬雞將産五百鶵羊豕鵝鴨皆道其數菓蓏盧果切肴蔌悉知其所乃曰如此貲業之廣何供具之薄廣漢慙曰有倉卒賔無倉卒主人元理曰俎上䒱㹠一頭厨中荔枝一盤皆可以爲設廣漢再拜謝罪入取之盡日爲歡其術後傳南季南季傳項滔滔傳子陸皆得其分數而失其玄妙焉老子曰善計者不用籌䇿尹文子曰凡數十百千萬億億萬千百十皆起於一推至億億無差矣山海經曰帝令竪亥歩自東極至於西極五億千選選萬也九千八百八十歩竪亥右手把筭左手指青丘曰五億十萬九千八百天地東西二億三萬三千里南北二億一千五百里天地相去一億五萬里也慱物志曰南郡冝城王子山到㤗山從鮑子真學筭異苑曰晉}
  - {type: variant, offset: 220, length: 1, content: 定, SBCK: 有越王餘筭䇿長尺許白者似骨黒者似角云越王行海作筭有餘弃之於水生焉風俗通曰十十謂之百十百謂之千十千謂之萬十萬謂之億十億謂之兆十兆謂之經十經謂之垓十垓謂之􅀘十􅀘謂之選十選謂之載十載謂之極有物者有事者紀於此矣過此徃者則其數可紀其名未之或聞也夫數一爲特侯竒􅃗二爲再兩偶􅀟三爲叅四爲乗賈􅁩書曰數度之道以六爲法數度之始始於微細有形之物莫細於毫是故立一毫以爲度十毫爲髮十髮爲􅁵十釐爲分十分爲寸十寸爲尺備於六故先王以爲天下用也周髀曰周公問於殷髙曰寡}
  - {type: page-break, offset: 220, content: '', id: KR3k0012_SBCK_750-4a}
  - {type: variant, offset: 220, length: 1, content: 定, WYG: 平有越王餘筭菜長尺許白者似骨黑者似角云越王行海作筭有餘棄之於水生焉風俗通曰十十謂之百十百謂之千十千謂之萬十萬謂之億十億謂之兆十兆謂之經十經謂之垓十垓謂之捕十捕謂之選十選謂之載十載謂之極有物者有事者紀於此矣過此往者則其數可紀其名未之或聞也夫數一為特侯竒隻二為再兩偶三為叄四為乘賈誼書曰數度之道以六為法數度之始始於微細有形之物莫細於毫是故立一毫以為度十毫為髮十髮為釐十釐為分十分為寸十寸為尺備於六故先王以為天下用也周髀曰周公問於殷髙曰寡}
