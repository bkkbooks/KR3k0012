  - {type: variant, offset: 2473, length: 171, content: 最知名玄之凝之徽之操之並工草書凝之妻謝蘊有才華亦善書甚為君舅重焉獻之猶善草書幼學於父次習於張爾後改變制度別刱其法率爾師心冥合天矩觀其逸志莫之與京齊謝朓字玄暉風華黼藻當時獨步書甚有聲草殊流美亦猶薄暮川上則餘霞照人晚春林中則飛花滿目宋蕭思話工書學於羊欣得其草妙崗連盡望勢不斷絕雖無奇峰壁立之秀可謂有巧矣袁昂云羊真孔草蕭行范篆各一時之妙也飛白書宋書, SBCK: 述􅀞}
