  - {type: variant, offset: 3537, length: 420, content: 至若高深之致質素之風俱不逮其師也然名為今古之獨步又曰張伯英章草書急就章字皆一筆而成合於自然可謂變化至極羊欣云張芝皇象鍾繇索靖時並號書聖張芝善章草書崔瑗云龍驤豹變青出於藍又刱為今草天縱尤異率意超曠無惜是非若清間長源流而無限縈迴崖谷任於造化至於蛟龍駭獸奔騰拏玃之勢心手隨變窈冥不知其所如也精熟神妙冠絕古今則百世不易之法式不可以智識不可以勤求若上士游乎沉默之鄉鸞鳳翔乎大皇之野韋仲將謂之草聖豈徒言哉又曰後漢張昶字文舒伯英季弟為黃門侍郎尤善章草家風不墜弈葉清華書類伯英時人謂之亞聖又曰後漢杜度字伯度京兆杜陵人也御史大夫延年曾孫章帝時為齊相善章草書雖史游始草書傳不紀其能又絕其跡刱其神妙其唯杜公乎韋誕杜氏傑有骨力而字畫微瘦崔氏法之書體甚濃結字工巧時有不及張芝嘉而學焉轉精其巧可謂草聖超前絕後獨步無雙矣行書書斷曰後漢頴川劉德升字君嗣造行書即正書之小偽務從簡易相間流行故謂之行書王愔云晉世以來工書者多以行書者名昔鍾元常善行狎書是也爾後王羲之獻之並造其極焉, SBCK: ''}
