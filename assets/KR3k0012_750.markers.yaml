  - {type: variant, offset: 2157, length: 301, content: 反難而遲失指多矣夫杜崔張子皆有超俗絕世之才愽學餘暇遊手于斯後世慕焉專用為務鑽堅仰高忘其罷勞夕惕不息昃不暇食十日一筆月數丸墨領袖如皁脣齒常黑雖處眾坐不遑談戲展指畫地見䚡蘇來切角中骨也出血猶不休輟然其為字無益工拙亦效嚬者之增醜學步者之失節也王右軍自敘草書勢曰昔秦時諸侯爭長簡檄相傳望烽走馹正以篆隸之難不救其速遂作赴急之書蓋今草書也其先出自杜氏以張為祖以衛為父索范者伯叔也二王父子可謂兄弟薄為庶息羊為僕隸自而敘之亦不失倉公觀鳥跡之意抑體有踈密意有倜儻或有飛走流注之勢驚竦峭絕之氣滔滔閑雅之容卓犖調宕之志百體千形而呈其巧豈可一概而論哉書斷曰如淳云作起草為藁姚察曰草猶麤書為本曰藁蓋刱文議出於此草書之先因於起草又, SBCK: 名􅀞録}
