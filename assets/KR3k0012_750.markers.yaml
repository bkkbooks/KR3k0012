canonical_identifier: bkk:krp/KR3k0012/bkk/v1/markers/750
seq: 750
markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', SBCK: 太平御覽卷第七百五十工藝部七數􅀞上數說文曰筭長六寸計曆數者也從弄竹言常弄乃不誤也易曰大衍之數五十大合天地之數凡五十有五言五十者舉成數天數二十有五地數三十凢天地之數五十有五此所以成變化而行􅀑神也周禮曰保氏養國子以道乃教之六藝六曰九數鄭司農曰九數方田粟米差分少廣啇工均輪方呈羸不足旁要今有重差勺桀句服也漢}
  - {type: page-break, offset: 0, content: '', id: KR3k0012_SBCK_750-1a}
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全}
  - {type: page-break, offset: 0, content: '', id: KR3k0012_WYG_750-1a, image: WYG0899/WYG0899-0584c.png}
  - {type: variant, offset: 0, length: 0, content: '', krp: 太平御覽卷第七百五十工藝部七數畫上數說文曰筭長六寸計曆數者也從弄竹言常弄乃不誤也易曰大衍之數五十大合天地之數凡五十有五言五十者舉成數天數二十有五地數三十凢天地之數五十有五此所以成變化而行鬼神也周禮曰保氏養國子以道乃教之六藝六曰九數鄭司農曰九數方田粟米差分少廣啇工均輪方呈羸不足旁要今有重差勺桀句服也漢}
  body:
  - {type: variant, offset: 1, length: 0, content: '', SBCK: 律歷志曰數者一十百千萬也所以筭數事物慎性命之理也又曰武帝時桑􅀪羊以計筭幸以心計年十三爲侍中又曰宣帝時大司農丞耿夀昌以善筭爲筭工得幸於上又曰計啇善爲筭著五行論筭術二十六卷又曰張蒼明習天}
  - {type: page-break, offset: 1, content: '', id: KR3k0012_SBCK_750-1b}
  - {type: variant, offset: 1, length: 0, content: '', WYG: 太平御覽卷七百五十宋李昉等撰工藝部七數畫上數說文曰筭長六寸計厯數者也從弄竹言常弄乃不誤也易曰大衍之數五十統舉天地之數凡五十有五言十者舉成數也天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也周禮曰保氏養國子以道乃敎之六藝六曰九數鄭司農曰九數方田粟米差分少廣商功均輸方程嬴不足旁要今有重差夕桀句股也漢書律厯志曰數者一十百千萬也所以筭數事物慎性命之理也又曰武帝時桑𢎞羊以計筭幸年十三為侍中又曰宣帝時大司農丞耿壽昌以善筭為工得幸於上又曰計商善為筭著五行論筭述二十六卷又曰張蒼明習天}
  - {type: page-break, offset: 1, content: '', id: KR3k0012_WYG_750-1b, image: WYG0899/WYG0899-0584d.png}
  - {type: page-break, offset: 1, content: '', id: KR3k0012_WYG_750-2a, image: WYG0899/WYG0899-0585a.png}
  - {type: variant, offset: 1, length: 0, content: '', krp: 律歷志曰數者一十百千萬也所以筭數事物慎性命之理也又曰武帝時桑弘羊以計筭幸以心計年十三爲侍中又曰宣帝時大司農丞耿夀昌以善筭爲筭工得幸於上又曰計啇善爲筭著五行論筭術二十六卷又曰張蒼明習天}
  - {type: xml-element, offset: 2, content: '', id: KR3k0012_CHANT_750-bkkxmlele1}
  - {type: 'tls:seg', offset: 2, content: '', id: KR3k0012_CHANT_750-1a.1}
  - {type: 'tls:seg', offset: 2, content: '', id: KR3k0012_CHANT_750-1a.2}
  - {type: variant, offset: 2, length: 2, content: 古文, SBCK: 圖書計籍又善筭律歷故令蒼以列侯居相府領主郡國上計者吴志曰顧譚每省簿書未甞下筭徒屈指心計盡發疑謬下吏以此服之又曰趙逹河南人也治九宫一筭之術究其微旨是以能應機立成對問􅀂神使人取小豆數􅂛播播布切之席上立言其數驗覆果信甞過知故知故爲之具食食畢謂曰倉卒乏酒又無嘉肴無以叙意如何逹因取盤中􅃗筋再三縱横之乃言卿東壁下有美酒一斛又有鹿􅁏三斤何以辭無主人􅀏曰以卿善射欲以相試耳遂岀酒酣飲又有書簡上作千萬數着空倉中封之令逹筭之逹云但有名無實其精微􅀂是逹寳惜其術自闞澤殷禮皆名儒善士屈節就學祕而不告也太史丞公孫􅅬師事之累年賫酒拜跪而請逹曰吾先人得此欲圖爲帝王師至仕來三丗不過太史郎誠不欲復傳之且此術微妙頭乗尾除一筭之法父子不相語􅀄孫權行師征伐毎令逹有所推歩皆如其言問其法終不言由此見非逹常􅀏謂諸星氣風術者曰當廻筭帷幕不岀户牖以知天道而反晝夜􅁀露以望氛祥不亦難乎無間引筭自投乃歎曰吾筭盡某年月日其終矣逹妻數見逹效聞而􅂘泣逹欲弭妻意乃更筭言向者謬誤耳尚未也後如期死權聞逹有書求之不得録問其女乃發逹棺一無所得法遂絶焉}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_SBCK_750-2a}
  - {type: variant, offset: 2, length: 2, content: 古文, WYG: 圖書計籍又善筭律厯故令蒼以列侯居相府領主郡國上計者吳志曰顧譚每省簿書未嘗下籌徒屈指心計盡發疑謬下吏以此服之又曰趙達河南人也治九宫一筭之術䆒其微㫖是以能應機立成對問若神使人取小豆數升播之席上立言其數驗覆果信嘗過其所知故知故為之具食食畢謂曰倉卒乏酒又無嘉肴無以叙意如何達因取盤中隻筯再三縱横之乃言卿東壁下有美酒一斛又有鹿肉三斤何以辭無主人笑曰以卿善筭欲以相試耳遂出酒酣飲又有書簡上作千萬數着空倉中封之令達筭之云但有名無實其精微若是達寳惜其術自闞澤殷禮皆名儒善士屈節就學秘而不告也太史丞公孫滕師事之累年賫酒拜跪而請達曰吾先人得此欲圖為帝王師至仕來三世不過太史郎誠不欲復傳之且此術微妙頭乗尾除一筭之法父子不相語初孫權行師征伐每令達有所推歩皆如其言問其法終不言由此見薄達常笑謂諸星氣風術者曰當廻筭帷幕不出户牖以知天道而反晝夜暴露以望氣祥不亦難乎無何引筭自校乃歎曰吾筭盡某年月日其終矣達妻數見達效聞而哭泣達欲弭妻意乃更筭言向者謬誤耳尚未也後如期死權聞達有書求之不得問其女乃發達棺一無所得法遂絶焉}
