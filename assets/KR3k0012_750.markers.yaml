  - {type: variant, offset: 14, length: 2, content: 監始, SBCK: 曰僧一行姓張氏公謹之孫也􅀄求訪師資以窮大衍至天台山國清寺見一院古松十數門有流水一行立於門屏間聞院僧於庭布筭聲而謂其徒曰今日當有弟子自逺求吾筭法巳合到門豈無人導逹也即除一筭又謂曰門前水當却西流弟子亦至一行承其言而趨入稽首請法盡授其術焉而門前水果却西流西京􅄂記曰安定嵩真明筭術成帝時人也真常以筭自尅其壽七十三真曰綏和元年正月二十五日晡時死矣}
  - {type: variant, offset: 14, length: 2, content: 監始, WYG: 曰僧一行姓張公謹之孫也初求訪師資以窮大衍至天台山國清寺見一院古松十數門有流水一行立於門屏間聞院僧於庭布筭聲而謂其徒曰今日當有弟子自遠求吾筭法也已合到門豈無人導達也即除一籌又謂曰門前水當却西流弟子亦至一行承其言而趨入稽首請法盡授其術焉而門前水果却西流西京雜記曰定安嵩真明筭術成帝時人也真常以筭自剋其壽七十三真曰綏和元年正月二十五日晡時死矣}
