  - {type: variant, offset: 1624, length: 0, content: '', SBCK: 桓温常使􅀞扇筆悟落因􅀞作爲烏駮特牛甚妙劉毅傳曰毅平桓􅀇入建康􅀄桓􅀇於南州起齋悉􅀞盤龍於其上號爲盤龍齋毅小字盤龍至是遂居之晉書曰韓支字景先鄧林婦病積年垂死醫巫皆息意支爲筮之使􅀞作野猪着卧處屏風上一􅀫覺佳於是遂差齊書曰滎陽毛惠逺善􅀞馬彭城劉瑱善􅀞婦人當丗並爲第一又曰齊王秀之字伯奮仕至侍中}
