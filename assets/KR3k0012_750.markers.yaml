  - {type: variant, offset: 1587, length: 3, content: 張超並, WYG: 光和元年置鴻都門學畫孔子及七十二弟子之像又曰明帝遣使天竺問佛道法遂於中國圖畫形像焉又曰顯宗圗畫建武中名臣列將於雲臺以椒房故謂馬后獨不及馬援東平王蒼觀圖言於帝曰何故不畫伏波像帝笑而不言又曰陳紀字元方遭父憂殆將滅性豫州刺史嘉其至行表上尚書圖象百城以厲風俗魏書曰曹休祖父嘗為吳郡太守休見壁上袓父畫下榻拜而涕泣魏氏春秋曰徐邈}
