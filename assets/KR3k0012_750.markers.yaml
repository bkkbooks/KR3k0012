  - {type: variant, offset: 219, length: 0, content: '', SBCK: 囷七百四十九石六斗七合西囷六百九十七石八􅂛遂署囷門後出米西囷六百九十七石九􅂛中有一䑕大可一􅂛東囷無差元禮後嵗復過廣漢以米數告之元理以手擊牀曰遂不知䑕之殊米不如剥面皮矣廣漢爲之取酒脯數斤元理復筭曰千牛産二百犢萬雞將産五百鶵羊豕鵝鴨皆道其數菓蓏盧果切肴蔌悉知其所乃曰如此貲業之廣何供具之薄廣漢慙曰有倉卒賔無倉卒主人元理曰俎上䒱㹠一頭厨中荔枝一盤皆可以爲設廣漢再拜謝罪入取之盡日爲歡其術後傳南季南季傳項滔滔傳子陸皆得其分數而失其􅀇妙焉老子曰善計者不用籌䇿尹文子曰凡數十百千萬億億萬千百十皆起於一推至億億無差矣山海經曰帝令竪亥歩自東極至於西極五億千選選萬也九千八百八十歩竪亥右手把筭左手指青丘曰五億十萬九千八百天地東西二億三萬三千里南北二億一千五百里天地相去一億五萬里也慱物志曰南郡冝城王子山到㤗山從鮑子真學筭異苑曰晉}
  - {type: page-break, offset: 219, content: '', id: KR3k0012_SBCK_750-3a}
  - {type: page-break, offset: 219, content: '', id: KR3k0012_SBCK_750-3b}
  - {type: variant, offset: 219, length: 0, content: '', WYG: 囷七百四十九石二升七合西囷六百九十七石八升遂署囷門後出米西囷六百九十七石九升中有一鼠大可一升東囷無差元理後嵗復過廣漢以米數告之元理以手擊牀曰遂不知鼠之殊米不如剥面皮矣廣漢為之取酒脯數斤元理復筭曰千牛產二百犢萬雞將產五萬雛羊豕鵝鴨皆如其數菓蓏肴䔩悉知其所乃曰此資業之廣何供饋之偏耶廣漢慙曰有倉卒賔無倉卒主人元理曰爼上蒸㹠一頭厨中荔枝一盤皆可以為設廣漢再拜謝罪入取之盡日為歡其術後傳南季季傳項滔滔傳子陸皆得其分數而失其𤣥妙焉老子曰善計者不用籌䇿尹文子曰數十百萬億億萬千百十皆起於一推之億億無差矣山海經曰帝令竪亥歩自東極至於西極五億千選選萬也九千八百八十歩竪亥右手把筆左手指青丘曰五億十萬九千八百博物志曰南郡宜城王子山到泰山從鮑子真學筭異苑曰晉}
