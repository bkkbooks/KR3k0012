  - {type: variant, offset: 222, length: 1, content: 官, SBCK: 聞子大夫善數數筭也語林曰鄭􅀇馬融門下三年不得見令髙足弟子傳授而巳融筭甞渾天合召􅀇令筭一轉便決衆咸駭服謝察微筭經曰易稱太極是生兩儀蓋數之先也自􅀠首作術容成造曆顯筭斯興故也一位筭法曰萬萬穰爲載數之極矣或問之曰何以數之爲載按孫子筭經云古者積錢上}
  - {type: variant, offset: 222, length: 1, content: 官, WYG: 聞子大夫善數語林曰鄭𤣥在馬融門下三年不得見令髙足弟子傳授而已融筭嘗渾天合召𤣥令筭一轉便决衆咸駭服謝察㣲筭經曰易稱太極是生兩儀蓋數之先也自𨽻首作術容成造厯顯筭斯興故也一位筭法曰萬萬穰為載數之極矣或問之曰何以數之為載按孫子筭經云古者積錢上}
  - {type: page-break, offset: 222, content: '', id: KR3k0012_WYG_750-6b, image: WYG0899/WYG0899-0587b.png}
  - {type: variant, offset: 222, length: 1, content: 官, krp: 聞子大夫善數數筭也語林曰鄭玄馬融門下三年不得見令髙足弟子傳授而巳融筭甞渾天合召玄令筭一轉便決衆咸駭服謝察微筭經曰易稱太極是生兩儀蓋數之先也自隷首作術容成造曆顯筭斯興故也一位筭法曰萬萬穰爲載數之極矣或問之曰何以數之爲載按孫子筭經云古者積錢上}
