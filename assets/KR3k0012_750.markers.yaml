  - {type: variant, offset: 1587, length: 3, content: 張超並, SBCK: 光和元年置酒鴻都門􅀞孔子及七十二弟子之像又曰明帝遣使天笁問佛道法遂於中國圗􅀞形像焉又曰顯宗圖􅀞建武中名臣列將於雲䑓以椒房故謂馬后獨不及馬援東平王蒼觀圗言於帝曰何故不􅀞伏波像帝􅀏而不言又曰陳紀字元方父憂殆將滅性豫州刺史嘉其至行上書􅀞像百城以厲俗魏書曰曹休祖父甞爲吴郡太守休見壁上祖父􅀞下榻拜而涕泣魏氏春秋曰徐邈}
