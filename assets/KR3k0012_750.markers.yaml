  - {type: variant, offset: 3171, length: 364, content: 勝寄冥通縹緲神仙之事也法書要錄曰飛白本是宮殿八分之輕者全用楷法吳時張弘好學不仕常著烏巾時人號為張烏巾此人特善飛白能書者鮮不好之章草書晉書曰王羲之書初不勝庾翼郄愔及其暮年方妙嘗以章草荅庾亮而翼深歎伏因與羲之書云吾昔有伯英章草十紙過江顛狽遂乃亡失常歎妙跡永絕忽見足下荅家兄書煥若神明頓還舊觀書斷曰章草書漢黃門令史史游所作也衛常李誕並云漢初而有草法不知其誰蕭子良云章草者漢齊相杜操始變藁法非也王愔云漢元帝時史游作急就章解散隸體麤書之漢俗簡惰漸以行之是也又曰索靖字幼安善章草出韋誕峻險過也有若山形中裂水勢懸流雪嶺孤松冰河危石其堅勁則古今不逮後漢徐幹字伯張善章草書班固與弟超書稱之曰得伯張書藁知識讀之莫不歎息實亦藝由己立名自人成後有蘇班者平陵人也五歲能書甚為伯張之所稱歎又曰後漢張伯英損益伯度章草亦猶逸少增減元帝真書雖潤色開華精於斷割美則, SBCK: 備三}
