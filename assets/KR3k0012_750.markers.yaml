  - {type: variant, offset: 1887, length: 1, content: 賀, SBCK: 張昌宗甞命􅀞工圗冩武三思及納言李嶠鳯閣侍郎蘇味道夏官侍郎李逈秀麟臺少􅁥王紹宗等十八人形像號爲髙士圗又曰薛稷善􅀞愽採古跡睿宗在藩留意於小學稷於是特見招引又曰韓滉尢工書兼善丹青以繪事非急務自晦其能未甞傳之又曰王維書􅀞特臻其妙筆蹤措思叅於造化而創意經圗即有所缺如山水平逺雲峯石色絶跡天機非繪者之所及也人有得奏樂圗者不}
  - {type: page-break, offset: 1887, content: '', id: KR3k0012_SBCK_750-7b}
  - {type: variant, offset: 1887, length: 1, content: 賀, WYG: 張昌宗嘗命畫工圖寫武三思及納言李嶠鳳閣侍郎蘇味道夏官侍郎李逈秀麟臺少監王紹宗等十八人形像號為髙士圖又曰薛稷善畫傅彩古跡睿宗在藩留意於小學稷於是特見招引又曰韓滉尤工書兼善丹青以繪事非急務自晦其能未嘗傳之又曰王維書畫特臻其妙筆蹤措思叅於造化而創意經圖即有所缺如山水平遠雲峰石色絶迹天機非繪者之所及也人有得奏樂圖者不}
