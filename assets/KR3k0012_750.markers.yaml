  - {type: variant, offset: 360, length: 1193, content: 為小篆著蒼頡篇七章雖帝王質文世有損益終以文代質漸就澆醨則三皇結繩五帝畫象三王肉刑斯可況也古文可為上古大篆為中古小篆為下古三古謂之實草隸謂之華妙極於華者羲獻精窮於實者籀籀史籀斯始皇以和氏之壁琢而為璽令斯書其文今泰山繹山及秦望等碑並其遺跡謂國之偉寶百世之法式斯小篆入神大篆入妙書斷曰大篆者周宣王大史史籀所作也或云柱下史始變古文或同或異謂之為篆篆者傳也傳其物理施之無窮鄄酆定六書三曰篆書八體書法一曰大篆又漢書藝文志史籀十五篇蓋此也又曰呂氏春秋云蒼頡造大篆非也若蒼頡造大篆則置古文何地即籀篆蓋其子孫是也又曰小篆者秦丞相李斯所作也增損大篆異同籀文謂之小篆亦曰秦篆蔡邕篆勢曰體有六篆妙巧入神或象龜文或化龍鱗紆體放尾長翅短身延頸脅翼勢似凌雲八分書唐書曰張廷珪與陳州刺史李邕親善屢上表薦之邕所撰碑碣之文必請廷珪八分書之甚為時人所重世論曰安定梁鵠字孟皇善八分書太祖使書信憧宮門牓題書斷曰八分書者秦羽人上谷王次仲所作也又曰後漢師宜官南陽人也靈帝好書徵天下工書於鴻都門至數百人八分稱宜官焉最大則一字徑文小則方寸千言甚矜其能而性嗜酒或時空至酒家因書壁以雇之觀者雲集酤酒多售隸書吳志曰張昭字布善隸書晉書曰王羲之尤善隸書為古今之冠論者稱其筆勢以為飄若遊雲矯若驚龍深為從伯敦導之所器重晉中興書曰李充字弘度母衛氏廷尉展之妹也充少孤母聰明有訓又善楷書妙參鍾索世咸重之充從兄咸亦善書沈約宋書曰文帝善為隸書又曰羊欣字敬元長隸書父不疑初為烏程令欣年十二時王獻之為吳興太守甚知愛之獻之嘗夏月入縣欣著新絹裙晝寢獻之書裙數幅而去欣本工書因此彌善齊書曰王僧虔善隸書宋文帝見其書素扇歎曰非唯跡逾子敬又當器雅過之齊書曰周顒少往外氏車騎將軍臧質家得衛常散隸書法學之甚能文惠太子使顒書玄圃茅齋壁國子祭酒何胤以倒薤書求就顒換之顒笑曰天下有道丘不與易也三國典略曰周白石縣男趙文深以題牓之功除魏興郡守文深字德本南陽宛人也少學楷隸有鍾王之則當時書唯文深及冀俊而已王褒尤善書文深慚恨形於言色後知好尚難及改習褒書竟無所成轉被譏誚謂之學步邯鄲焉至於碑榜人莫之逮褒亦推之宮殿樓閣皆其跡也世宗令至江陵書景福寺碑蕭察觀而美之陳書曰蕭引善隸書為當時所重高宗嘗披秦事指引署名曰此字筆勢翩翩似鳥之欲飛引謝曰此乃陛下假其羽毛耳唐書曰薛稷好古愽雅尤工隸書自貞觀永徽之際虞世南禇遂良時人宗其書跡自後罕能繼者稷外祖魏徵家圖籍多有虞禇舊跡稷銳精模倣筆能遒麗當時無及之者書斷曰隸書者秦下邽人程邈所作也邈字元岑始為縣獄吏得罪始皇幽繫雲陽獄中覃思十年益小篆方圓而為隸書三千字奏之始皇善之用為御史以奏事煩多篆家難成乃用隸書為隸人佐書故曰隸書又曰和帝時賈魴撰滂喜篇以蒼頡為上篇訓纂為中篇滂喜為下篇所謂三蒼也皆是隸字寫之隸法由茲而廣酈善長水經注曰臨淄人發古冢得棺前和外隱起為隸字言齊太公六代孫胡公之棺也唯三字是古餘同今書證知隸字出古非始於秦也成公綏隸勢曰蟲篆既繁草藁近偽適之中庸莫尚於隸草書, WYG: 涕泣}
