  - {type: variant, offset: 1624, length: 0, content: '', WYG: 桓溫常使書扇筆誤落因畫作為烏駮㹀牛甚妙劉毅傳曰毅平桓𤣥入建康初桓𤣥於南州起齋悉畫盤龍於其上號為盤龍齋毅小字盤龍至是遂居之晉書曰韓支字景先龍舒長鄧林婦病積年垂死醫巫皆息意支為筮之使畫作野猪着卧處屏風上一宿覺佳於是遂瘥齊書曰榮陽毛惠遠善畫馬彭城劉瑱善畫婦人當世稱為第一又曰齊王秀之字伯奮仕侍中}
  - {type: page-break, offset: 1624, content: '', id: KR3k0012_WYG_750-10b, image: WYG0899/WYG0899-0589b.png}
  - {type: variant, offset: 1624, length: 0, content: '', krp: 桓温常使畫扇筆悟落因畫作爲烏駮特牛甚妙劉毅傳曰毅平桓玄入建康𥘉桓玄於南州起齋悉畫盤龍於其上號爲盤龍齋毅小字盤龍至是遂居之晉書曰韓支字景先鄧林婦病積年垂死醫巫皆息意支爲筮之使畫作野猪着卧處屏風上一宿覺佳於是遂差齊書曰滎陽毛惠逺善畫馬彭城劉瑱善畫婦人當丗並爲第一又曰齊王秀之字伯奮仕至侍中}
  - {type: variant, offset: 1625, length: 2, content: 議者, SBCK: 宗測優遊秀之弥所欽慕乃令陸探微􅀞其形與巳相對又曰王亮字叔奉臨沂人也齊竟陵王良開西邸延賢俊使工􅀞其像亮亦豫焉梁書曰伏曼容素美風彩帝常}
