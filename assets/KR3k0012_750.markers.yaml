  - {type: variant, offset: 259, length: 3, content: 別篆書, WYG: 容下至於地地不能載天不能蓋地不能載故名曰載又曰按司馬遷史記云自秦孝公時商鞅獻三術内一開道阡陌以五尺為歩二百四十為畆又曰案千乘之圖周之制度司馬法六尺為歩歩百爲畝是古之制也發象筭經曰問云度之起起於何答曰度之起起於忽忽是神蟲口中吐絲名也十忽為一絲十絲為一毫筭經曰量之起起於何答曰量之起起於粟粟從隂陽而生從六甲而出故六粟為一圭十圭為一抄筭經曰秤之起起於何答曰秤之起起於黍黍是三稜草子也十黍為一絫十絫為一銖畫釋名曰畫繪也以五色繪物上也周禮曰畫繢之事雜五采東方謂之青南方謂之赤西方謂之白北方謂之黑天謂之𤣥地謂之黄青與白相次也赤與黑相次也𤣥與黄相次也凡畫繢之事後素工論語曰繪事後素史記曰武帝衛太子廢後上居甘泉宫召畫周公負成王圖於是左右羣臣知上意欲立少子也又曰甘露三年單于始入朝宣帝思股肱之美圖畫其人於麒麟閣法其狀貌署官爵姓名又曰李夫人早卒帝圖畫其形於甘泉宫}
