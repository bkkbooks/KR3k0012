  - {type: variant, offset: 1973, length: 5, content: 玉以工草稱, SBCK: 曰客有爲齊王􅀞者王問曰􅀞孰最難對曰狗馬最難孰曰最易對曰􅀑魅最易夫狗馬人之所知也旦暮覩}
  - {type: variant, offset: 1973, length: 5, content: 玉以工草稱, krp: 曰客有爲齊王畫者王問曰畫孰最難對曰狗馬最難孰曰最易對曰鬼魅最易夫狗馬人之所知也旦暮覩}
