  - {type: variant, offset: 1968, length: 0, content: '', SBCK: 羣􅆩競赴遂一時執得帝嘉之謂曰不聞卿知􅀞何其妙也荅曰臣亦未甞執筆人之所作者自可庶幾耳帝曰是善用所長者也西京􅄂記曰元帝後宫旣多不得常見乃使􅀞工圗其形按狀幸之諸宫人皆賂􅀞工多者十萬王嬙不肯遂不得見後匈奴求美女帝按圖以昭君行及召見貌爲第一帝悔之而名籍巳去乃按其事􅀞工弃市籍貲􅀞工有桂陵毛延夀冩人好醜老少必得其真安陵陳敝新豐劉白襲寛並工牛馬人形}
  - {type: page-break, offset: 1968, content: '', id: KR3k0012_SBCK_750-9a}
  - {type: variant, offset: 1968, length: 17, content: 杜伯度崔子玉以工草稱於前世襲與羅暉, WYG: 羣獺競赴遂一時執得帝嘉之謂曰不聞卿知畫何其妙也答曰臣}
  - {type: variant, offset: 1968, length: 0, content: '', krp: 羣獺競赴遂一時執得帝嘉之謂曰不聞卿知畫何其妙也荅曰臣亦未甞執筆人之所作者自可庶幾耳帝曰是善用所長者也西京雜記曰元帝後宫旣多不得常見乃使畫工圗其形按狀幸之諸宫人皆賂畫工多者十萬王嬙不肯遂不得見後匈奴求美女帝按圖以昭君行及召見貌爲第一帝悔之而名籍巳去乃按其事畫工弃市籍貲畫工有桂陵毛延夀冩人好醜老少必得其真安陵陳敝新豐劉白襲寛並工牛馬人形}
  - {type: variant, offset: 1969, length: 3, content: 伯度崔, SBCK: 楊望亦善􅀞尤善布色樊育亦善布色同日弃市京師􅀞工於是差稀拾遺記曰周靈王時有韓房者自渠胥國來獻王駞房長一文垂髮至膝周人見之如神明矣以丹砂􅀞左右手爲日月盈缺之勢不異眞焉可照百餘歩又噴水爲雲蔽􅃜其側靈王視之忽不知所在或云昇天又曰秦始皇二年謇㳙國獻善􅀞之者名烈啇口含丹黒噴壁即成龍雲之像以指歷地􅀂繩分矣轉手􅀂䂓方寸之内四瀆五岳列國莫不悉備􅀞爲鳯鸞皆軒軒􅀂行也韓}
  - {type: variant, offset: 1969, length: 3, content: 伯度崔, krp: 楊望亦善畫尤善布色樊育亦善布色同日弃市京師畫工於是差稀拾遺記曰周靈王時有韓房者自渠胥國來獻王駞房長一文垂髮至膝周人見之如神明矣以丹砂畫左右手爲日月盈缺之勢不異眞焉可照百餘歩又噴水爲雲蔽虧其側靈王視之忽不知所在或云昇天又曰秦始皇二年謇㳙國獻善畫之者名烈啇口含丹黒噴壁即成龍雲之像以指歷地若繩分矣轉手若䂓方寸之内四瀆五岳列國莫不悉備畫爲鳯鸞皆軒軒若行也韓}
