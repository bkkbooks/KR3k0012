  - {type: variant, offset: 1613, length: 2, content: 命廙, WYG: 曰明府正為眼耳若明㸃瞳子飛白拂其上使如輕雲之蔽月豈不美乎顧愷之常以一厨畫糊題其前寄桓𤣥𤣥紿之云未開愷之見封題如初但失其畫直云妙畫}
