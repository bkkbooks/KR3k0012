  - {type: variant, offset: 2238, length: 0, content: '', WYG: 若繩分矣轉手若規方寸之内四瀆五岳列國莫不悉備畫為鳳鸞皆軒軒若行也韓子曰客有為齊王畫者王問曰畫孰最難對曰狗馬最難孰為最易對曰鬼魅最易夫狗馬人之所知也旦暮覩於前不可類之故難也鬼魅無形無形者不可覩故易也淮南子曰畫西施之面者美而可悅覩孟賁之目者大而可畏又曰宋畫吳冶宋人工畫吳人工冶甚為㣲妙堯舜之聖不能及也抱朴子曰衛恊張黑有畫工之名華陽國志曰漢嘉郡以御雜夷宜炫耀之乃雕餙城牆華畫府寺及諸門作山神海靈窮竒鑿齒夷人出入恐騾馬或憚之趑趄說苑曰齊起九重之臺國中有能畫者則賜之錢狂卒敬君居常飢寒其妻端正敬君工畫貪賜畫錢去家日久思念其婦遂畫其像向之喜笑旁人}
