  - {type: variant, offset: 1966, length: 1, content: 先, SBCK: 清廉獨絶及卒列􅀞東觀三齊記略曰􅁗始皇求與海神相見神云我形醜約莫圗我形當與帝㑹始皇入海三十里與神相見左右有巧者潛以脚􅀞神形神怒帝負約乃令帝速去始皇即馬前脚猶立後脚隨䧟歩僅得登岸􅀞者溺死續齊諧記曰魏明帝遊洛水水中有白獺靡淨可憐見之輙去帝顧玩之終不可得侍中徐景山曰臣聞􅆩􅄝鯔魚乃不避死可以此􅃸之乃自􅀞板作兩生鯔音淄魚懸岸於}
