  - {type: variant, offset: 2109, length: 2, content: 法龜, WYG: 如神明矣以丹砂畫左右手為日月盈缺之勢不異真焉可照百餘歩又噴水為雲蔽虧其側靈王末年忽不知所在或云昇天又曰秦始皇二年騫霄國獻善畫者名裔口含丹青噴壁即成}
