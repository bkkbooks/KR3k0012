  - {type: variant, offset: 1620, length: 0, content: '', SBCK: 曰顧愷之尤善丹青謝安深重之爲有蒼生巳來未之有也愷之每􅀞人成數年不􅀧目睛人問其故荅曰四禮妍􅃖夲無􅀜於妙處傳神冩照正在阿堵物中甞恱一隣女挑之弗從廼圗其形於壁以􅁄針釘其心女遂患心痛愷之因致其情女從之遂宻毎重嵇康四言詩因爲之圗常云手揮五􅁌易目送歸鴻難毎冩人形妙絶於時甞圗裴楷像頰上加三毛觀者覺神明殊勝又爲謝鯤像在石巖裏云此子宜著丘壑中欲圗殷仲堪堪有目疾固辭愷之曰明府正爲眼耳􅀂明􅀧瞳子飛白拂上使如輕雲之蔽月豈不美乎顧愷之甞以一厨􅀞糊題其前􅀉桓􅀇所皆其深所珎者􅀇乃發其厨後竊取􅀞而緘閉如舊以還之紿云未開愷之見封題如􅀄但失其􅀞直云妙􅀞通靈變化而去亦猶人之登仙了無恠色又}
  - {type: page-break, offset: 1620, content: '', id: KR3k0012_SBCK_750-6a}
  - {type: variant, offset: 1620, length: 0, content: '', krp: 曰顧愷之尤善丹青謝安深重之爲有蒼生巳來未之有也愷之每畫人成數年不點目睛人問其故荅曰四禮妍蚩夲無關於妙處傳神冩照正在阿堵物中甞恱一隣女挑之弗從廼圗其形於壁以棘針釘其心女遂患心痛愷之因致其情女從之遂宻毎重嵇康四言詩因爲之圗常云手揮五弦易目送歸鴻難毎冩人形妙絶於時甞圗裴楷像頰上加三毛觀者覺神明殊勝又爲謝鯤像在石巖裏云此子宜著丘壑中欲圗殷仲堪堪有目疾固辭愷之曰明府正爲眼耳若明點瞳子飛白拂上使如輕雲之蔽月豈不美乎顧愷之甞以一厨畫糊題其前寄桓玄所皆其深所珎者玄乃發其厨後竊取畫而緘閉如舊以還之紿云未開愷之見封題如𥘉但失其畫直云妙畫通靈變化而去亦猶人之登仙了無恠色又}
