  - {type: variant, offset: 1883, length: 0, content: '', WYG: 其繇曰士刲羊亦无􅎺也女承筐亦無貺也西隣責言不可償也將嫁女於西遇不吉之卦故知有責讓之言不可報償也歸妹之暌猶無相也歸妹女嫁之卦也暌乖離之卦也震之離亦離之震為雷為火為嬴敗姫車說其輹火焚其旗不利行師敗于宗丘歸妹暌孤寇張之弧姪其從姑六年其逋逃歸其國而棄其家明年其死於髙梁之虛及惠公之在秦曰先君若從史蘇之占吾不及此夫韓簡侍曰龜象也筮數也物生而後有象象而後有滋滋而後有數先君之敗德及其可數乎史蘇是占勿從何益又僖}
  - {type: page-break, offset: 1883, content: '', id: KR3k0012_WYG_727-4b, image: WYG0899/WYG0899-0420b.png}
