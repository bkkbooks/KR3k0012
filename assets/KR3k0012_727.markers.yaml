  - {type: variant, offset: 992, length: 413, content: 澄以舟師還次於小平津北岸古塚崩骨見銘曰今卜高原千秋之後化為下泉當逢霸主必為改遷王曰古人之卜其何至也令更葬之又曰齊害其廢主濟南王也長廣王湛懼高元海為畫三策湛不能斷令鄭道謙吳導世等卜以決之道謙等曰不利舉事靜則吉又曰初鄴有賣卜者相趙隱當大貴及隱自黃門侍郎遷祕書監崔肇師呼卜者而問己焉卜者對曰公令望雖高爵位難進肇師不悅終如其言隋書曰獻皇后崩上令蕭吉卜擇葬所吉歷筮山原至一處云卜年二千卜世二百具圖而奏之上曰吉凶由人不在於地高緯父葬豈不卜乎國尋滅亡正如家墓田若不吉朕不當為天子若云不凶我弟不當戰沒然竟從吉言唐書曰王遠知事梁貞白先生陶弘景隱居茅山盡傳其符籙隋煬帝為晉王出鎮揚州遣人迎致及即位於東都起玉清觀以處之太宗之為秦王也既平王世充與記室房玄齡往詣之立枚以問其吉凶遠知指秦王之枚曰此當上應天命下濟蒼生者又指玄齡之枚云聖之輔也及太宗踐祚恩禮甚厚又曰城陽公主初適杜如晦之子荷荷貞觀中為尚衣奉御坐承乾事伏誅公主改適饒州剌史薛昱之子瓘將成婚太宗使, SBCK: 睦病卒巳復魄友爲}
