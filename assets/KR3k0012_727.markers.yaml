  - {type: variant, offset: 370, length: 2, content: 步熊, SBCK: 淳于智}
  - {type: variant, offset: 370, length: 1458, content: 步熊字叔羆陽平人少好卜筮術數門徒甚盛熊學舍側有燒死人吏疑是熊諸生失火持諸生急熊曰吾已為卜得其人矣使從道南行當有一人來問得火主來者便縛之吏如熊言果是耕人自言草惡難耕故燒之忽風起延燒實不知草中有人又鄰人兒遠行或告已死其父母號哭制服熊為卜剋日當還如期果至宋書曰蔡興宗初為郢府參軍彭城顏敬以式卜曰亥年當作某官有大字者不可受也及有開府之授而太歲在亥果薨於光祿大夫又曰荀伯玉為晉安王子勛鎮軍行參軍泰始初還都賣卜自業齊書曰王敬則少時於草中射獵有蟲如烏豆集其身摘去乃脫其處皆流血敬則惡之詣道士卜道士曰此封侯瑞也敬則聞之喜故出都自効又曰柳世隆善卜別龜甲價至萬永明初世隆曰永明九年我亡後三年丘山崩齊亦於此季矣屏人命典籤李黨取筆及高齒屐題簾箔旌曰永明十一年因流涕謂黨曰汝當見吾不見也梁書曰吉士瞻年逾四十忽忽不得志乃就江陵卜者王先生計祿命王生曰君擁旄仗節非一州後一年當得戎馬大郡三國典略曰梁武昌太守朱賈臣聞元帝議遷都入勸梁主云建鄴舊都塋陵攸在荊鎮邊疆非王者宅願陛下勿疑致後悔也臣家在荊州豈不願陛下但恐是臣富貴非陛下富貴耳乃召卜者杜景豪決去留遇兆不吉荅云未去景豪退而言曰此兆為鬼賊所留也事具京都部又曰周文育隨盧安興征俚獠有功除南海令監州王勵深委任之勵被代文育與俱下至大庾嶺詣卜者卜者曰君北下不過作令長南入則為公侯文育曰足錢便可誰望公侯之事卜人曰君須臾當暴得銀至二千兩若不見信以此為驗其夕宿逆旅有賈人求與文育博文育勝之得銀二千兩旦辭勵勵問其故文育以告勵乃遣之又曰東魏相齊王澄以舟師還次於小平津北岸古塚崩骨見銘曰今卜高原千秋之後化為下泉當逢霸主必為改遷王曰古人之卜其何至也令更葬之又曰齊害其廢主濟南王也長廣王湛懼高元海為畫三策湛不能斷令鄭道謙吳導世等卜以決之道謙等曰不利舉事靜則吉又曰初鄴有賣卜者相趙隱當大貴及隱自黃門侍郎遷祕書監崔肇師呼卜者而問己焉卜者對曰公令望雖高爵位難進肇師不悅終如其言隋書曰獻皇后崩上令蕭吉卜擇葬所吉歷筮山原至一處云卜年二千卜世二百具圖而奏之上曰吉凶由人不在於地高緯父葬豈不卜乎國尋滅亡正如家墓田若不吉朕不當為天子若云不凶我弟不當戰沒然竟從吉言唐書曰王遠知事梁貞白先生陶弘景隱居茅山盡傳其符籙隋煬帝為晉王出鎮揚州遣人迎致及即位於東都起玉清觀以處之太宗之為秦王也既平王世充與記室房玄齡往詣之立枚以問其吉凶遠知指秦王之枚曰此當上應天命下濟蒼生者又指玄齡之枚云聖之輔也及太宗踐祚恩禮甚厚又曰城陽公主初適杜如晦之子荷荷貞觀中為尚衣奉御坐承乾事伏誅公主改適饒州剌史薛昱之子瓘將成婚太宗使卜之卜人曰兩火俱食始則同榮末亦雙悴若晝日行合卺之禮則終吉太宗將從之馬周諫曰臣聞朝謁以朝思相戒也講習以晝思相成也讌飲以昃思相歡也婚合以夜思相親也是以上下有威內外有規動息有時吉凶有儀先王之教不可黷也今陛下欲謀其始而亂其終不可為也夫卜筮者所以定猶豫決嫌疑若黷禮亂常先王所不用也太宗又從其言而止又曰憲宗嘗謂李絳曰卜筮之事習者罕精或中或否近日風俗尤更崇尚何也對曰臣聞古先哲王畏天命示不敢專邦國有大事可疑者故謀於卿士庶人決於卜筮俱吉則行之末俗浮偽辜以徼福正行慮危邪謀覬安持疑昏惑謂小數能決之而愚夫愚婦假時日鬼神者欲利欺詐參之見聞用以剌射小近其事神而異之近者風尚卜筮此誠弊俗聖旨所及實辨邪源但存而不論弊斯息矣六韜曰文王卜田史偏曰卜田渭陽將大得焉非熊非羆非虎非狼兆曰得公侯天遺汝師以之佐昌施及三王大吉又曰文王問散宜生卜代殷吉乎鐕龜龜不兆祖行之日雨轖至軫行之日幟折為三散宜生曰此凶四不祥不可舉事太公進曰非子之所知也龜不兆聖人生天地之閒承衰亂而起龜者枯骨蓍者朽草不足, WYG: 巫環}
