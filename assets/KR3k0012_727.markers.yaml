  - {type: variant, offset: 1835, length: 0, content: '', SBCK: 施如前囊復脹滿因急縛囊口懸着樹閒二十許}
  - {type: variant, offset: 1835, length: 10, content: 日雨轖至軫是洗濯甲兵, WYG: 後}
  - {type: variant, offset: 1835, length: 0, content: '', krp: 施如前囊復脹滿因急縛囊口懸着樹閒二十許}
  - {type: punctuation, offset: 1836, content: ，, id: KR3k0012_CHANT_727-bkkpn501}
  - {type: 'tls:seg', offset: 1836, content: '', id: KR3k0012_CHANT_727-17a.27}
  - {type: variant, offset: 1836, length: 356, content: 雨轖至軫是洗濯甲兵也行之日幟折為三此軍分為三如此斬紂首之象國語曰晉獻公卜伐驪戎史蘇占之曰勝不吉公曰何謂也遇兆挾以銜骨齒牙為猾遇見也挾會也骨所以鯁刺人猾弄也齒牙謂兆端左右折有似齒牙中有從畫故曰銜骨骨在口中齒牙弄之以象讒口之為害也禮太卜掌龜大夫占色史占墨戎夏交捽兆有二畫外象戎內象諸夏夏謂晉也兆端會齒牙交有似捽捽交對也交捽是交勝也臣故云言晉勝戎戎復勝晉且懼有口齒牙銜骨皆在口也攜人國移心焉攜離公曰何口之有口在寡人寡人弗受誰敢興之對曰茍可以攜其入也必甘逞而不知故胡可壅也期何逞快壅防也甘言人耳心以為快而不知其惡何可止也公不聽遂伐剋之克勝獲驪姬以歸有寵立為夫人春秋後語曰二世夢白虎齧其左驂殺之心惡怪之卜云涇水為祟鬼物為災曰祟音思醉切又曰鄒忌與田忌不相善公孫閔謂鄒忌曰何不詐令人操千金卜於市曰我田忌之人也吾三戰而三勝聲威天, SBCK: 漸消}
