  - {type: variant, offset: 3912, length: 1, content: 國, WYG: 萬於是家業用展病者亦愈又曰韓友字光景廬江舒人也善卜占行京費厭勝之術龍舒長鄧子林婦病積年垂死醫巫皆息友為筮之使畫作野猪象著卧處屏風上一宿覺佳於是遂差舒縣廷掾王睦病卒已復魄友為卜之令以丹畫板作日月置床頭及卧虎皮馬鄣泥上登時愈劉世則女病鬼魅積年巫為祈禱伐空冢故城間得鼉數十猶不差友筮之令作布囊女發時張囊著牕牖間友閉戸作氣}
