  - {type: variant, offset: 42, length: 0, content: '', SBCK: 傳日若煩數溷瀆或不精嚴神不吿也或觀卦察兆占不得也或􅀛不神蓍不靈此其所以過差聖人不得專用也􅀛筮共違于人神靈不祐也漢書日宣帝八月飲酎行祠孝昭廟先驅旄頭劒挺墮首拂泥中刃向乘輿車馬驚於是召梁丘賀筮之有兵謀不吉上還使有司行祠是時霍氏外孫代郡太守任宣坐謀反誅宣子章爲公車丞亡在渭城中夜􅀇服入廟居郞閒執戟立廟門待上至欲爲逆事發伏誅後漢書日許曼者汝南平輿人也祖父峻字季山善卜占之術多有顯驗時人方之前代京房自云少嘗篤病三年不愈乃謁太山請命太山主人生死故請命也行遇道士張巨君授以方術所著易林至今行於代曼少傳峻學􅁊帝時隴西太守馬緄始拜郡開綬筒有兩赤虵分南北走緄令曼筮之卦成象曼日三歲之後君當爲邊將官有東名當東北行三千里復五年更爲大將軍南征延熹元年緄出爲遼東太守討鮮卑至五年復拜車騎將軍擊武陵蠻賊皆如占其餘多此類云東觀漢記日沛獻王輔善京氏易永平五年京師少雨上饗雲臺自作卦以周易林占之其䟽日蟻封穴戸大雨將至上以問輔輔上書日蹇艮下坎上艮爲山坎爲水山出雲爲雨蟻穴居知雨將至故以蟻爲興又曰孝順梁皇后永建三年春三月丙午選入掖庭相工通見之瞿然驚駭却再拜賀日此所謂日角偃月相之極貴臣所未嘗見太史卜之兆得戴房又筮之得坤之比又日明德皇后嘗乆病至卜者家爲卦問咎祟所在卜者卦定釋蓍仰}
  - {type: page-break, offset: 42, content: '', id: KR3k0012_SBCK_727-7b}
  - {type: variant, offset: 42, length: 0, content: '', krp: 傳日若煩數溷瀆或不精嚴神不吿也或觀卦察兆占不得也或龜不神蓍不靈此其所以過差聖人不得專用也龜筮共違于人神靈不祐也漢書日宣帝八月飲酎行祠孝昭廟先驅旄頭劒挺墮首拂泥中刃向乘輿車馬驚於是召梁丘賀筮之有兵謀不吉上還使有司行祠是時霍氏外孫代郡太守任宣坐謀反誅宣子章爲公車丞亡在渭城中夜玄服入廟居郞閒執戟立廟門待上至欲爲逆事發伏誅後漢書日許曼者汝南平輿人也祖父峻字季山善卜占之術多有顯驗時人方之前代京房自云少嘗篤病三年不愈乃謁太山請命太山主人生死故請命也行遇道士張巨君授以方術所著易林至今行於代曼少傳峻學桓帝時隴西太守馬緄始拜郡開綬筒有兩赤虵分南北走緄令曼筮之卦成象曼日三歲之後君當爲邊將官有東名當東北行三千里復五年更爲大將軍南征延熹元年緄出爲遼東太守討鮮卑至五年復拜車騎將軍擊武陵蠻賊皆如占其餘多此類云東觀漢記日沛獻王輔善京氏易永平五年京師少雨上饗雲臺自作卦以周易林占之其䟽日蟻封穴戸大雨將至上以問輔輔上書日蹇艮下坎上艮爲山坎爲水山出雲爲雨蟻穴居知雨將至故以蟻爲興又曰孝順梁皇后永建三年春三月丙午選入掖庭相工通見之瞿然驚駭却再拜賀日此所謂日角偃月相之極貴臣所未嘗見太史卜之兆得戴房又筮之得坤之比又日明德皇后嘗乆病至卜者家爲卦問咎祟所在卜者卦定釋蓍仰}
  - {type: variant, offset: 43, length: 1, content: 文, SBCK: 歎息卜者乃日此女明年小疾必將貴遂爲帝妃不可言也魏志日管輅父爲利漕利漕民郭恩兄弟三人皆得躄疾不知何故使輅筮其所由輅日卦中有君本墓中有女􅀑非君伯母當叔母也昔飢荒之世當有利其數斗米者排著井中嘖嘖有聲推一大石下破其頭􅀌䰟􅁈痛自訴於天於是恩涕泣服罪又日管輅往見安平太守王基基令作卦輅日當有賤婦人生一男兒墮地便走入竈中死又牀上當有一大蛇銜筆小大共視須􅁷便去又鳥來入室與鷰共鬬鷰死鳥去有此三恠基大驚問其吉凶輅日直官舎乆遠魑魅魍魎爲恠耳兒生便走非能自走直宋無忌之妖將其入竈也大蛇銜筆直老書佐耳烏與鷰􅃲直老鈴下耳今卦見其象而不見其凶非妖咎之徵自無所憂也後卒無患又日館陶令諸葛原遷新興太守管輅往祖餞賔客並㑹原自起取鷰夘蜂窠蜘蛛著於器中使射覆卦成輅日第一物含氣須變依于宇堂雄雌以形分翼翅舒張此鷰􅆑也第二物家室倒懸門戸衆多藏精育毒得秋乃化此蜂窠也第三物觳觫長足吐絲成羅尋網求食利在昏夜此蜘蛛也舉坐驚歎又日管輅舉秀才吏部尚書何晏請之日聞君蓍爻神妙試爲作一卦知位當至三公不又問連夜夢青蠅數十頭來鼻上驅之不肯去有何意故輅日夫飛鴞天下賤鳥及其在林食椹則懷我好音況輅心非草木不敢不盡忠昔元凱之弻重華宣慈惠和周公之翼成王坐而待旦故能流光六合萬國咸寧此乃履道之休應非}
