  - {type: variant, offset: 2500, length: 1, content: 智, WYG: 命之及巴師至將卜帥王曰寧如志何卜焉使帥師而行敗巴師于鄾故封子國於析君子曰惠王知志夏書曰官占惟先蔽志昆命于元龜其是之謂乎志曰聖人}
  - {type: variant, offset: 2502, length: 9, content: 能及明不能見得無數, WYG: 煩}
