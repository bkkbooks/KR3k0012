  - {type: variant, offset: 2001, length: 471, content: 云言晉勝戎戎復勝晉且懼有口齒牙銜骨皆在口也攜人國移心焉攜離公曰何口之有口在寡人寡人弗受誰敢興之對曰茍可以攜其入也必甘逞而不知故胡可壅也期何逞快壅防也甘言人耳心以為快而不知其惡何可止也公不聽遂伐剋之克勝獲驪姬以歸有寵立為夫人春秋後語曰二世夢白虎齧其左驂殺之心惡怪之卜云涇水為祟鬼物為災曰祟音思醉切又曰鄒忌與田忌不相善公孫閔謂鄒忌曰何不詐令人操千金卜於市曰我田忌之人也吾三戰而三勝聲威天下欲為大事亦吉乎卜者出因令人捕焉卜者驗其辭於王之所鄒忌從之田忌懼無以自白遂率其徒攻臨菑欲殺鄒忌不勝而奔說苑曰成王卜洛事曰昔有周成王之卜居成周也其命龜曰予一人兼有天下辟就百姓敢無中土乎使予有罪則四方伐之無難得也周公卜居曲阜其命龜曰作邑乎山之陽賢則茂昌不賢則速亡季孫行父戒其子也曰吾欲室之夾於兩社之閒也使吾後世有不能事上者使其朁之益速如是則曰賢則茂昌不賢則速亡安有擇地而封哉示有天固也又曰孔子問漆雕馬人曰子事臧文仲武仲孺子容三大夫者孰為賢馬人對曰藏文氏家有龜焉名曰蔡文仲立三年為一兆焉武仲立三年為二兆焉孺子容立三年為三兆焉馬人見之矣若夫三大夫之賢不賢馬人不識也孔子, WYG: ''}
