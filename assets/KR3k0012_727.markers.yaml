  - {type: variant, offset: 2193, length: 1400, content: 欲為大事亦吉乎卜者出因令人捕焉卜者驗其辭於王之所鄒忌從之田忌懼無以自白遂率其徒攻臨菑欲殺鄒忌不勝而奔說苑曰成王卜洛事曰昔有周成王之卜居成周也其命龜曰予一人兼有天下辟就百姓敢無中土乎使予有罪則四方伐之無難得也周公卜居曲阜其命龜曰作邑乎山之陽賢則茂昌不賢則速亡季孫行父戒其子也曰吾欲室之夾於兩社之閒也使吾後世有不能事上者使其朁之益速如是則曰賢則茂昌不賢則速亡安有擇地而封哉示有天固也又曰孔子問漆雕馬人曰子事臧文仲武仲孺子容三大夫者孰為賢馬人對曰藏文氏家有龜焉名曰蔡文仲立三年為一兆焉武仲立三年為二兆焉孺子容立三年為三兆焉馬人見之矣若夫三大夫之賢不賢馬人不識也孔子曰君子哉漆雕氏之子其言人美也隱而顯其言人之過也又微而著故智不能及明不能見得無數卜乎楚辭卜居曰屈原既放三年不得復見竭智盡忠而蔽障於讒心煩慮亂不知所從往見太卜鄭詹尹曰余有所疑願因先生決之詹尹乃端策拂龜曰君何以教之原曰吾寧梱梱款款朴以忠乎將送往勞來斯無窮乎寧誅鋤草茅以力耕乎將遊大人以成名乎寧正言不諱以危身乎將從俗富貴以偷生乎寧超然高舉以保真乎將哫音足柴粟斯喔咿嚅唲以事婦人乎寧廉潔正直以自清乎將突梯滑稽如脂如韋以潔楹乎寧昂昂若千里之駒乎將泛泛若水中之鳧隨波上下偷以全吾軀乎寧與騏驎杭軛乎將隨駑馬之跡乎寧與黃鵠比翼乎將與雞鶩爭食乎此孰吉孰凶何去何從世溷濁而不清蟬翼為重千鈞為輕黃鍾毀棄瓦釜雷鳴讒人高張賢士無名吁嗟默默兮誰知吾之廉貞詹尹乃釋策而謝曰夫尺有所短寸有所長物有所不足知有所不明數有所不逮神有所不通用君之心行君之意龜策誠不能知此事司馬遷與任安書曰僕先人非有丹書剖符之功依倚卜祝之閒人主以排優遇之白虎通曰乾草槁骨眾多獨以蓍龜何龜之言久也蓍之言耆也尚書洪範五行傳曰此禽獸草木之久而能知吉凶也蔡邕月令章句曰太卜官名以牲祠龜策塗以牲血謂之釁者龜甲所以卜也蓍草所以筮也三禮圖曰龜以春灼後左夏灼前左秋灼前右冬灼後右楚焞他昆切以荊為然以灼龜正以荊者凡木心皆圜而荊心方是以用之抱朴子曰卜者小數飾福者謂知來之妙異苑曰會稽餘姚錢祐以元嘉四年五月二日夜出屋後為虎所取十八日乃自還說虎初取之時至一官府入重門見一人憑机而坐形貌偉壯左右侍者三十余人謂祐曰吾欲使汝知術數之法故令虎迎汝無懼也留十五日晝夜語諸要術盡教道之方祐受法畢便遣令還而不知道即使人送出門仍見歸路既得還家大知卜占無幽不驗經年乃卒又日北海任詡字彥期從軍遠征十年乃歸臨還握粟出卜師云非屋莫宿非時莫沐詡結伴數十共行遇雷雨不可蒙冒相與庇於巖下想非屋莫宿之戒遂負擔櫛沐於是巖崩壓伴死至家妻先與外人通謀共殺之請以濕髮為認婦宵則勸詡令沐復憶非時莫沐之忌收髮而止婦心慚負詐乃自沐髲而同寢通者夜來不知婦也斬首而去述異記曰宋車騎將軍南譙王劉義宜鎮荊州府吏蔡鑯音光善卜能悉驗時有妙見精究如神公嘗在內齋見一白鼠緣屋命左右射之內置函中時侍者六人悉驅入齋後小小戶內別呼人召鑯鑯至使卜函中物謂曰中則厚賞僻加重罰鑯卜兆成笑曰知之矣公曰何鑯曰兌色之鼠背明向戶彎弧射之絕其左股孕五子三雄二雌若謂不信剖腹立知公使剖鼠腹皆如鑯言即賜錢一萬蠡卜春秋後語曰蘇秦事鬼谷子學終辭歸道乏困行以燕人蠡卜傳說自給燕人用蠡卜秦託此以取資自給傅會事以為詞說各解臧獲之裘臧獲役人解其衣裘以賞其怪說之言也虎卜博物志虎知衝破又能畫地卜今人有畫物上下者推其奇偶謂虎卜雞卜史記曰越巫立越祀而以雞卜鳥卜隋書曰女國在蔥嶺之南其國俗事何脩羅神及樹神歲初以人祭或用獼猴祭畢入山祝之, SBCK: 開視}
