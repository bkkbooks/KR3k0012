  - {type: variant, offset: 3910, length: 1, content: 夫, WYG: 淳于智字叔平濟北人也性沉深有思義少為諸生善易髙平劉柔夜卧䑕齧其左手中指意甚惡之以問智智為筮之曰䑕本欲殺君而不能當相為使之反死乃以朱書其手腕横文後二寸為田字辟方一寸二分使夜露手以卧明旦有大䑕伏死手前譙國夏侯藻母病困五皷中出詣智卜有一狐當門向之嘷喚藻愁愕遂馳詣智智曰其禍甚急君速歸在狐嘷處撫心啼哭令家人驚恠大小畢出一人不出啼哭勿休然後其禍僅可救也藻如之母亦扶病而出啼家人既集堂屋五間猝然暴崩䕶軍張邵母病篤筮之使西出市沭猴繫母臂令傍人搥拍恒使作聲三日三夜放出邵從之其猴出門即為犬所咋死母於此漸差又曰上黨鮑瑗家多䘮病貧苦或謂之曰淳于叔平神人也君何不試就卜知禍所在瑗性質直不信卜筮曰人生有命豈卜筮所移㑹智適來應思逺謂之曰君有通靈之思而但為貴人用此君寒士貧苦多屯蹇可為一卦智乃令詹作卦卦成謂瑗曰為君安宅者女子耶瑗曰是也此人安宅失宜既害其身又令君不利君舍東北有大桑樹君徑至市入門數十步當有一人持荆馬鞭者當就請買還以懸此桑樹三年當暴得財也瑗承其言詣市果得馬鞭懸之正三年浚井得錢十萬銅鉄雜器復可二十}
