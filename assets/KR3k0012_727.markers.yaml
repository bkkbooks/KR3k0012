  - {type: variant, offset: 3512, length: 0, content: '', WYG: 魏志曰管輅父為利漕利漕民郭恩兄弟三人皆得躄疾不知何故使輅筮其所由輅曰卦中有君本墓中有女鬼非君伯母當叔母也昔饑荒之世當有利其數斗米者排著井中嘖嘖有聲推一大石下破其頭孤魂寃痛自訴於天於是恩涕泣服罪又曰管輅往見安平太守王基令作卦輅曰當有賤婦人生一男兒墮地便走入竈中死又床上當有一大蛇銜筆小大共視須㬰便去又烏來入室與鷰共鬭鷰死烏去有此三恠基大驚問其吉凶輅曰直客舍久逺魑魅魍魎為恠兒生便走非能自走直宋無忌之妖將其入竈也大蛇銜筆直老書佐耳烏與鷰鬭直老鈴下耳今卦見其象而不見凶知非妖咎之徴自無所憂也後卒無恙又曰舘陶令諸葛原遷新興太守管輅往祖餞賔客並㑹之原自起取燕卵蜂巢蜘蛛著於器中使射覆卦成輅曰第一物含氣須變依于宇堂雄雌以形翅翼舒張此燕卵也第二物家室倒懸門戸衆多藏精育毒得秋乃化此蜂窠也第三物觳觫長足吐絲成羅尋網求食利在昏夜此蜘蛛也舉坐驚喜又曰管輅舉秀才吏部尚書何晏請之曰聞君蓍爻神妙試為作一卦知位當至三公不又問夜連夢青蠅數十頭來鼻上驅之不肯去有何意故輅曰夫飛鴞天下賤鳥及其在林食椹則懷我好音况輅心非草木不敢不盡忠昔元凱之弼重華宣慈惠和周公之翼成王坐而待旦故能流光六合萬國咸寧此乃履道之休應非卜筮之所明也今君侯位重山嶽勢若雷電而懐德者鮮畏威者衆殆非小心翼翼多福之人又鼻者艮此天中之山臣松之案相書鼻為天中鼻有山象故曰天中之山髙而不危所以長守貴也今青蠅臭惡而集之焉位峻者顛輕豪者亡不可不思害盈之數盛衰之期是故山在地中曰謙雷在天上曰壯謙則裒多益寡壯則非禮不履未有損已而不光大行非而不傷敗願君侯上追文王六爻之㫖下思尼父彖象之義然後三公可决青蠅可驅也又管輅過魏郡太守鍾毓共論易義輅因言卜可知君生死之日毓使筮其生日月如言無蹉跌毓大愕曰君可畏人也命以付天不以付君遂不復筮又曰平原太守劉邠取印囊及山鷄毛著器中使筮輅曰内方外圓五色成文含寶守信出則有章此印囊也髙嶽巖巖有鳥朱身羽翼𤣥黄鳴不失晨此山鷄毛也又曰清河令徐季龍使人行獵令管輅筮其所得輅曰當獲小獸復非食禽雖有爪牙㣲而不彊雖有文章蔚而不明非}
