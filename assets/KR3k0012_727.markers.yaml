  - {type: variant, offset: 20, length: 2, content: 郭璞, SBCK: 不過三求吉不過三也卜筮不相襲也卜不吉則又筮筮不吉則又卜是瀆􅀛筮卜筮者先聖之所以使民信時日敬􅀑神畏法令決嫌疑定猶豫也又表記日天子無筮謂岀征巡狩也天子至尊大事皆用卜春秋傳日先王卜征伍年襲其祥也諸侯有守筮守筮守国之筮也有事則用天子道以筮諸侯非其國不以筮左傳公曰初懿氏卜妻敬仲懿氏陳大夫也􅀛日􅁲其妻占之日吉鳯雌雄相和而鳴鏘鏘敬伸夫妻相隨適齊有聲譽有嬀之後朱育于姜嬀陳姓也姜齊姓也五世其昌並爲正卿八世之後莫之與京京大也陳厲公蔡岀也姉姊之子日岀也故蔡人殺五父而立之五父陳它生敬仲其少也周内史有以周易見陳侯者周太史也陳侯使筮之遇觀之否日是謂觀國之光利用賔于王此其代陳有國乎不在此其在異國乎非在其身在其子孫光遠而自他有耀者也坤土也巽風也乾天也風爲天於土上山也巽變爲乾故日風爲天自二至四有艮象艮爲山也有山之材而照之以天光於是乎居士上故日觀國之光利用賔于王庭實旅百奉之以玉帛天地之美具焉故曰利用賔于王艮爲門庭乾爲金玉坤爲布帛諸侯朝王陳贄幣之象也旅陳也百言物備也已矣猶有觀焉故曰其在後乎因觀文以博占故言猶有觀非在已之言故知在子孫也風行而著於土故曰其在異國乎若在異國必姜姓也姜太嶽之後也山嶽則配天物莫能兩大陳衰此其昌乎變而象艮故知當興於太嶽之後也得太嶽之權則有配天之大功故知陳必衰也又閔公曰晉獻公以魏賜畢萬卜偃曰畢萬之後必大卜偃晉掌卜大夫也萬盈數也魏大名也以是始賞天啓之矣天子曰兆民諸侯曰萬民今名之大以從盈數其必有衆初畢萬筮仕於晉遇屯之比辛廖占之吉辛廖晉大夫也屯固比入吉孰大焉其必蕃昌震爲土車從馬足居之兄長之母覆之衆歸之六體不可易合而能固安而能殺此公侯之卦也公侯之子孫必復其始又閔公曰成季之將生也􅁊公使卜楚丘之父卜之日男也其名曰友在公之右在右言用事閒于兩社爲公室輔兩社同社毫社也兩社之閒朝廷執政所在季氏亡則魯不昌又筮之遇大有之乾曰同復于父敬如君所及生有文在其手曰友遂以命之又僖上日秦伯伐晉卜徙父筮之吉涉河侯車敗詰之秦伯涉河則晉侯車敗則秦伯不解謂敗在己故詰之對曰乃大吉也三敗必獲晉君其卦遇蠱曰千乘三去三去之餘獲其雄狐夫蠱必其君也於周易卦利涉大川往有事也亦秦勝晉之卦也今此所言葢卜筮書雜辭以狐蟲爲君其義欲以喻晉惠公其象未聞蠱之貞風也其悔山也内卦為貞外卦爲悔歲云秋矣我落具實而取其材所以克也今歲巳秋風吹落山木之實則爲人所取實落材亡不敗何待三敗及韓晉侯車三壞也又曰初晉獻公筮嫁伯􅁎於秦遇歸妹之睽史蘇占之曰不吉其繇日士卦羊亦無血也女承筐亦無貺也周易歸妹上六爻辭也􅎺血也貺賜也判羊士之功承筐筐女之職也離爲中女震爲長男故稱上女也西隣責言不可償也將嫁女於西而遇不吉之卦故知有責讓之言不可報償也歸妹之睽猶無相也歸妹女嫁之卦也睽乖離之象故曰無相相助也震之離亦離之震爲雷爲火爲嬴敗􅁎車􅀃其輹火焚其旗不利行師敗于宗丘歸妹睽孤寇之張弧姪其從姑六年其逋逃歸其國而棄其家明年其死於髙梁之虚及惠公之在秦曰先君若從史蘇之占吾不及此矣韓􅂤侍曰􅀛象也筮數也物生而後有象象而後有滋滋而後有數先君之敗德其可數乎史蘇是占勿從何益又僖中日狐偃言於晉侯曰求諸侯莫如勤王諸侯信之且大義也繼文之業而信宜於諸侯今爲可矣使卜偃卜之曰吉遇黄帝戰于阪泉之兆公曰吾不堪也對曰周禮未改今之王古之帝也公日筮之遇大有之睽日吉湡公用享于天子之卦戰克而王饗吉孰大焉且是卦也天爲澤以當日天子降心以逆公不亦可乎大有去睽而復亦其所也又成下日晉楚將戰苗賁皇言於晉侯日楚之良在其中軍王族而巳請分良以擊其左右而三軍萃於王卒必大敗之公日筮之史日吉其卦遇復日南國蹙射其元王中厥目復陽長之卦陽氣起子南行推隂故日南国蹙也南國蹙􅀔則離受其咎離爲諸侯又爲日陽氣激南飛失之象故日射其元國蹙王傷不敗何待公}
