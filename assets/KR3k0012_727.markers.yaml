  - {type: variant, offset: 1832, length: 1, content: 祖, WYG: 鄭𤣥曰此九巫讀皆當為筮字之誤也凡國之大事先筮而後卜禮記曲禮曰假爾太龜有常假爾太筮有常卜筮不過三求吉不過三也卜筮不相襲也卜不吉則又筮筮不吉則又卜是瀆龜筮也卜筮者先聖之所以使民信時日敬鬼神畏法令决嫌疑定猶豫也又表記曰天子無筮謂出征廵狩也天子至尊大事皆用卜也諸侯有守筮守筮守國之筮有事則用天子道以筮諸侯非其國不以筮左傳莊公曰初懿氏卜妻敬仲懿氏陳大夫也龜曰卜其妻占之曰吉是謂鳯凰于飛和鳴鏘鏘有媯之後將育于姜媯陳姓也姜齊姓也五世其昌並于正卿十世之後莫之與京京大也陳厲公蔡出也姊妹之子曰出也故蔡人殺五父而立之五父陳它生敬仲其少也周内史有以周易見陳侯者周太史也陳侯使筮之遇觀之否曰是謂觀國之光利用賔于王此其代陳有國乎不在此其在異國乎非此其身在其子孫光逺而自他有耀者也坤土也巽風也乾天也風為天於土上山也有山之材而照之以天光於是乎居土上故曰觀國之光利用賔于王庭實旅百奉之玉帛天地之美具焉故曰利用賔于王猶有觀焉故曰其在後乎因觀文以傳占故言有非在已之言故知在子孫也風}
