  - {type: variant, offset: 47, length: 12, content: 術禳災轉禍通致無方雖京房, SBCK: 所明也今君侯位重山嶽􅀔若雷電而懷德者鮮畏威者衆殆非小心翼翼多福之人又鼻者艮此天中之山臣松之案相書鼻爲天中鼻有山象故日天中之山高而不危所以長守貴也今青蠅臭惡而集之焉位峻者顛輕豪者亡不可不思害盈之數盛衰之期是故山在地中日謙雷在天上日壯謙則裒多益寡壯則非禮不履未有損巳而不光大行非而不傷敗願君侯上追文王六爻之㫖下思尼父􅂏象之義然後三公可決靑蠅可驅也又}
