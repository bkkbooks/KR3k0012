  - {type: variant, offset: 64, length: 282, content: 也璞門人趙載嘗竊青囊書未及讀而為火所焚又曰宣城邊洪以四月中就韓友卜家中安否友日卿家有兵殃其禍甚重可伐七十束柴積於庚地至七月丁酉放火燒之咎可消也不尒其凶難言洪即聚柴至日大風不敢發火洪後為廣陽領校遭母喪歸家友來投之時日已暮告從者速裝束吾當夜去從者曰今日已暝數十里何急復去友曰非汝所知也此閒血覆地寧可復住洪苦留之不待食而去其夜洪欻發狂絞殺兩子并殺婦人斫父妾二人皆被創因出亡走明日其族往收殯亡者尋索洪數日於宅前林中得之己自經死宣城太守殷祐病友筮之曰七月晦日將有太鸜鳥來集廳事上宜勤伺取若獲者為善不獲將成禍祐乃謹為其備至日果有大鸜束尾九尺來集廳事上掩捕得祐仍遷石頭督護後為吳, SBCK: 魏}
