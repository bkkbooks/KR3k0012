  - {type: variant, offset: 3513, length: 3, content: 卜博物, WYG: 非熊其名曰狸獵人暮歸果如輅言又曰鄧艾當伐蜀夢坐山上而有流水以問殄虜䕶軍爰邵邵曰易卦山上有水曰蹇蹇繇曰蹇利西南不利東北孔子曰蹇利西南往有功也不利東北其道窮也往必尅蜀殆不還乎艾憮然不樂吳}
