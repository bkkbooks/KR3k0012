  - {type: variant, offset: 28, length: 4, content: 青囊中書, WYG: 辨}
  - {type: variant, offset: 28, length: 2, content: 青囊, krp: 八爲占故言遇艮之八也史日是謂艮之隨震下兊上隨史疑占易遇入爲不利故更以周易占變爻得隨卦而論之隨其岀也史謂隨非閑固之卦君必速岀姜日亡亡無也是於周易有日隨元亨利貞无咎元善之長也亨嘉之㑹也利義之和也貞事之幹也體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事然故不可誣也是以雖隨无咎今我婦人而與於亂固在下位婦人卑於丈夫而有不仁不可謂元不靖國家不可謂亨作而害身不可謂利棄位而姣姣淫之别名不可謂貞有四德者雖隨而无咎我皆无之豈隨也哉我則取惡能无咎乎必死於此弗得岀矣又襄四日齊棠公之妻東郭偃之姊也棠公齊棠邑大夫可也偃臣崔武子棠公死偃御武子以弔焉見棠姜而美之使偃娶之爲巳娶也偃日男女辨姓今君川自丁成岀自相不可武子筮之遇困之太過史皆日吉示陳文子日走從風坎爲}
  - {type: variant, offset: 31, length: 3, content: 書九卷, SBCK: 男故日夫也變而爲巽故日從風也風隕妻不可娶也風能隕落變隕落故不可也且其繇日困于石據于蒺䔧入于其宫不見其妻凶用六三爻辭也困于石往不濟也據于䔧蒺所恃傷也入于其宫不見其妻凶無所歸也崔子日􅊔也何害先夫當之矣寡婦日􅊔言棠公巳當此凶也遂取之又昭二日初穆子之生也荘叔以周易筮之莊叔穆子父得臣也遇明夷之謙以示卜楚丘楚丘􅁲人姓名也楚丘日是將行行出奔也而歸為子祀奉祭祀也以䜛人入其名日牛卒以餒死明夷日也日之數十故有十時亦當十位自王已下其二爲公其三爲􅀸日上其中食日爲二旦日爲三明夷之謙明而未融其當旦乎故日爲子祀日之謙當鳥故日明夷于飛明而未融故日垂其翼象日之動故日君子于行當三在旦故日三日不食離火也艮山也離爲火火焚山山敗於人爲言敗言爲讒故日有攸往主人有言言必讒也純離為牛世亂讒勝勝將適離山焚則離勝故日其名日牛謙不足飛不翔垂不峻翼不廣故日其爲子後乎吾子亞􅀸也抑少不終又日衛襄公嬖人婤姶上音周下音闔生子名之日元孔成子以周易筮之日元尚享衛國主其社稷遇屯又日余尚立縶尚克嘉之遇屯之比以示史朝史朝日元亨又何疑焉成子日非長之謂乎對日康叔名之可謂長矣孟非人也將不列於宗不可謂長且其繇日利建侯嗣吉何建建非嗣也二卦皆云子其建之康叔命之二卦告之筮襲於夢武王所用也弗從何為又昭三日南蒯之將叛也枚筮之遇坤之比日黃裳元吉以爲大吉也示子服惠伯日即欲有事何如惠伯日吾嘗學此矣忠信之事則可不然必敗外疆内溫忠也和以卒貞信也故日黄裳元吉黃中之色也裳下之飾也元善之長也中不忠不得其色下不共不得其飾事不善不得其極外内倡和爲忠率事以信爲共供養三德爲善非此三者弗當且夫易不可以占險將何事也且可飾乎中美能黃上美爲元下美則裳參成可筮猶有闕也筮雖吉未也又哀下日衛侯夢于北宮見人登昆吾之觀􅀍髪北面而譟日登此昆吾之虛緜緜生之􅀲余爲渾良夫呌天無辜公親筮之胥彌赦占之日不害}
