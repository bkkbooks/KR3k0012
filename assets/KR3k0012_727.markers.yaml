  - {type: variant, offset: 3433, length: 8, content: 鑯言即賜錢一萬蠡, WYG: 占其餘多此類云東觀漢記曰沛獻王輔善京氏易永平五年京師少雨上饗雲臺自作卦以周易林占之其䟽曰蟻封穴戸大雨將至上以問輔輔上書曰蹇艮下坎上艮為山坎為水山出雲為雨蟻穴居知雨將至故以蟻為興又曰孝順梁皇后永建三年春三月丙午𨕖入掖庭相工通見之瞿然驚駭却再拜賀曰此所謂日角偃月相之極貴臣所未嘗見太史}
