  - {type: variant, offset: 378, length: 0, content: '', krp: 也性沉深有思義}
  - {type: variant, offset: 379, length: 1, content: 好, SBCK: 爲諸生善易髙平劉柔夜臥鼠齧其左手中指意甚惡之以問智智爲筮之曰鼠本欲殺君而不能當相爲使之反死乃以朱書其手腕横文後二寸爲田字辟方一寸二分使夜露手臥以其明有大鼠伏死手前譙國夏侯藻母病因五鼓中岀詣智卜有一狐當門向之嘷喚藻愁愕遂馳詣智智曰其禍甚急君速歸在狐嘷處撫心啼哭令家人驚恠大小畢出一人不出啼哭勿休然後其禍僅可救也藻如之母亦扶病而岀啼家人旣集堂屋五閒捽然暴崩護軍張劭母病篤智筮之使西出市外猴繫母臂令傍人搥拍􅁪使作聲三日三夜放去劭從之其猴岀門卽爲犬所咋死母於此漸差又曰上黨鮑瑗家多喪病貧苦或謂之曰淳于叔平神人也君何不試就卜知禍所在瑗性質直不信}
