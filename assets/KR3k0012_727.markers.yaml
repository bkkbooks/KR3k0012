  - {type: variant, offset: 1871, length: 0, content: '', WYG: 以魏賜畢萬}
  - {type: variant, offset: 1872, length: 0, content: '', WYG: 偃曰畢萬之後必大卜偃晉掌卜大夫也萬盈數也魏大名也以是始賞天啓之矣天子曰兆民諸侯曰萬民今名之大以從盈數其必有衆初畢萬筮仕於晉遇屯之比辛廖占之曰吉辛廖晉大夫也屯固比入吉孰大焉其必蕃昌震為土車從馬足居之兄長之母覆之衆歸之六體不易合而能固安而能殺公侯之卦也公侯之子孫必復其始又閔公曰成季之將生也桓公使卜楚丘之父卜之曰男也其名曰友在公之右在右言用事間于兩社為公室輔兩社之間朝廷執政所在季氏亡則魯不昌又筮之遇大有之乾曰同復于父敬如君所及生有文在其手曰友遂以命之又僖公曰秦伯}
