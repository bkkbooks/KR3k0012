  - {type: variant, offset: 37, length: 0, content: '', krp: 之宗也分而爲二以象兩掛一以象三揲之以四以象四時歸奇於扐以象閏五歲再閠故再扐而後掛奇凡四揲之餘不足復揲者也分而爲二旣揲之餘合掛於一故日再扐而後掛凡閏十九年七閏爲一章五歲再閏者二故略舉其凡也天數五五奇也地數五五竒合爲二十五五位相得而各有合天數二十有五地數三十五耦合爲三十凡天地之數五十有五此所以成變化而行鬼神也變化以此成鬼神以此行乾之策二百一十有六陽爻六一爻三十六策六爻二百一十六策坤之策百四十有四隂爻六一爻二十四策六爻百四十四策凡三百有六十當期之日二篇之策萬有一千五百二十當萬物之数也二篇三百八十四爻隂陽各半合萬一千五百二十䇿}
  - {type: variant, offset: 38, length: 2, content: 遂洞, SBCK: 故四營而成易分而爲二以象兩一營也卦一以象三二營也揲之以四三營也歸奇於扐四營也十有八變而成卦八卦而小成引而伸之伸之六十四卦觸􅀋而長之天下之能事畢矣顯道顯明也神德行由神以成其用是故可與酬酢可與祐神矣可以應對萬物之求助成神化之功也酬酢應對也又日耆之德圎而神卦之德方以知神以知來知以藏往探賾索隱鉤深致遠以定天下之吉凶成天下之亹亹者莫大乎蓍􅀛歸藏日蓍末大於本爲上吉蒿末大於本次吉荆末大於本次吉箭末大於本次吉竹末大於本次吉􅆱一五神蒿二四神荆三三神箭四二神竹五一神筮五犯皆臧五筮之神明皆聚焉洪範}
  - {type: page-break, offset: 38, content: '', id: KR3k0012_SBCK_727-7a}
  - {type: variant, offset: 38, length: 2, content: 遂洞, krp: 故四營而成易分而爲二以象兩一營也卦一以象三二營也揲之以四三營也歸奇於扐四營也十有八變而成卦八卦而小成引而伸之伸之六十四卦觸類而長之天下之能事畢矣顯道顯明也神德行由神以成其用是故可與酬酢可與祐神矣可以應對萬物之求助成神化之功也酬酢應對也又日耆之德圎而神卦之德方以知神以知來知以藏往探賾索隱鉤深致遠以定天下之吉凶成天下之亹亹者莫大乎蓍龜歸藏日蓍末大於本爲上吉蒿末大於本次吉荆末大於本次吉箭末大於本次吉竹末大於本次吉蓍一五神蒿二四神荆三三神箭四二神竹五一神筮五犯皆臧五筮之神明皆聚焉洪範}
