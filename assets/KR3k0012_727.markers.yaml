  - {type: variant, offset: 351, length: 5, content: 占神効甚多, SBCK: 可知君生死之日毓使筮其生日月如言無蹉跌毓大􅕎日君可畏人也命以付天不以付君遂不復問又日平原太守劉邠取印囊及山雞毛着器中使筮輅日内方外圎五色成文含寶守信岀則有章此印囊也高岳巖巖有鳥朱身羽翼􅀇黄鳴不失晨此山雞毛也又日淸河令徐季龍使人行獵令管輅筮其所得輅日當獲其小獸復非食禽雖有爪牙微}
