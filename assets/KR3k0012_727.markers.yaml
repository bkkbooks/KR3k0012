  - {type: variant, offset: 363, length: 2, content: 皆驗, SBCK: 疆雖有文章蔚而不明非虎非雉其名日狸獵人暮歸果如輅言又日鄧艾當伐蜀夢坐山上而有流水以問殄虜護軍􅀽紹紹日易卦山上有水日蹇蹇繇日蹇利西南不利東北孔子日蹇利西南往有功也不利東北其道窮也往必尅蜀殆不還乎艾憮然不樂吳志日虞翻字仲翔㑹稽人嘗與孔融書示以所著易注融荅書日聞延陵之理樂覩吾子之理易乃知東南之美者非徒㑹稽之竹箭也可謂探􅞾窮通矣􅀜羽旣敗權使筮遇節之臨翻日不出三日必當斷頭果如其言權日􅀸不及伏義可與東方朔為比矣又日陸杭之克歩闡孫皓意張乃使尚廣筮并天下遇同人之頤對曰吉庚子歲靑蓋當入洛陽故皓不脩其政而常有窺上國之志}
