  - {type: variant, offset: 2475, length: 4, content: 哉漆雕氏, WYG: 于行當三在旦故曰三日不食離火也艮山也離為火火焚山山敗於人為言敗言為讒故曰有攸往主人有言言必讒也純離為牛世亂讒勝勝將適離山焚則離勝故曰其名曰牛謙不足飛不翔垂不峻翼不廣故曰其為子後乎吾子亞卿也抑少不終又曰衛襄公嬖人婤姶生子名}
  - {type: punctuation, offset: 2476, content: ，, id: KR3k0012_CHANT_727-bkkpn687}
  - {type: 'tls:seg', offset: 2476, content: '', id: KR3k0012_CHANT_727-22a.21}
  - {type: variant, offset: 2480, length: 0, content: '', WYG: 曰元孔成子以周易筮之曰元尚享衛國主其社稷遇屯又曰余尚立縶尚克嘉之遇屯之比以示史朝史朝曰元亨又何疑焉成子曰非長之謂乎對曰康叔名之可謂長矣孟非人也將不列於宗不可謂長且其繇曰利建侯嗣吉何建建非嗣也二卦皆云}
  - {type: page-break, offset: 2480, content: '', id: KR3k0012_WYG_727-7b, image: WYG0899/WYG0899-0421d.png}
  - {type: punctuation, offset: 2481, content: ！, id: KR3k0012_CHANT_727-bkkpn688}
  - {type: 'tls:seg', offset: 2481, content: '', id: KR3k0012_CHANT_727-22a.22}
  - {type: variant, offset: 2482, length: 2, content: 言人, WYG: 建之康叔命之二卦告之筮襲於夢武王所用也弗從何為又昭公曰南蒯之將叛也枚筮之遇坤之比曰黄裳元吉以為大吉也示子服惠伯曰即欲有事何如惠伯曰吾嘗學此矣忠信之事則可不然必敗外彊内温忠也和以率貞信也故曰黄裳元吉黄中之色也裳下之飾也元善之長也中不忠不得其色下不共不得其飾事不善不得其極外内倡和為忠率事以信為共供養三德為善非此三者弗當且夫易不可以占險將何事也且可飾乎中}
  - {type: page-break, offset: 2482, content: '', id: KR3k0012_WYG_727-8a, image: WYG0899/WYG0899-0422a.png}
  - {type: variant, offset: 2485, length: 0, content: '', WYG: 能黄上美為元下美則裳叅成可筮猶有闕}
  - {type: punctuation, offset: 2486, content: ，, id: KR3k0012_CHANT_727-bkkpn689}
  - {type: 'tls:seg', offset: 2486, content: '', id: KR3k0012_CHANT_727-22a.23}
  - {type: variant, offset: 2486, length: 8, content: 隱而顯其言人之過, WYG: 筮雖吉未}
  - {type: punctuation, offset: 2489, content: ；, id: KR3k0012_CHANT_727-bkkpn690}
  - {type: 'tls:seg', offset: 2489, content: '', id: KR3k0012_CHANT_727-22a.24}
  - {type: punctuation, offset: 2495, content: ，, id: KR3k0012_CHANT_727-bkkpn691}
  - {type: 'tls:seg', offset: 2495, content: '', id: KR3k0012_CHANT_727-22a.25}
  - {type: variant, offset: 2496, length: 1, content: 微, WYG: 哀公曰衛侯夢于北宫見人登昆吾之觀被髪北面}
  - {type: variant, offset: 2498, length: 1, content: 著, WYG: 譟曰登此昆吾之虛綿綿生之𤓰余為渾良夫呌天無辜公親筮之胥彌赦占之曰不害與之邑寘之而迯奔宋衛侯貞卜其繇曰如魚窺音頳尾衡流而方羊裔焉大國滅之將亡闔門塞竇乃自後踰又曰巴人伐楚圍鄾初右司馬子國之卜也觀瞻曰如志}
  - {type: page-break, offset: 2498, content: '', id: KR3k0012_WYG_727-8b, image: WYG0899/WYG0899-0422b.png}
