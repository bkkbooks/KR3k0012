  - {type: variant, offset: 27, length: 0, content: '', krp: 徙從居東宫事在成十六年始往而筮之遇艮之八艮下艮上艮周禮大卜掌三易然則用連山歸周易也二易折亡}
  - {type: variant, offset: 28, length: 2, content: 青囊, SBCK: 八爲占故言遇艮之八也史日是謂艮之隨震下兊上隨史疑占易遇入爲不利故更以周易占變爻得隨卦而論之隨其岀也史謂隨非閑固之卦君必速岀姜日亡亡無也是於周易有日隨元亨利貞无咎元善之長也亨嘉之㑹也利義之和也貞事之幹也體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事然故不可誣也是以雖隨无咎今我婦人而與於亂固在下位婦人卑於丈夫而有不仁不可謂元不靖國家不可謂亨作而害身不可謂利棄位而姣姣淫之别名不可謂貞有四德者雖隨而无咎我皆无之豈隨也哉我則取惡能无咎乎必死於此弗得岀矣又襄四日齊棠公之妻東郭偃之姊也棠公齊棠邑大夫可也偃臣崔武子棠公死偃御武子以弔焉見棠姜而美之使偃娶之爲巳娶也偃日男女辨姓今君川自丁成岀自相不可武子筮之遇困之太過史皆日吉示陳文子日走從風坎爲}
