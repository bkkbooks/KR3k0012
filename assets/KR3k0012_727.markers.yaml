  - {type: variant, offset: 655, length: 277, content: 丘山崩齊亦於此季矣屏人命典籤李黨取筆及高齒屐題簾箔旌曰永明十一年因流涕謂黨曰汝當見吾不見也梁書曰吉士瞻年逾四十忽忽不得志乃就江陵卜者王先生計祿命王生曰君擁旄仗節非一州後一年當得戎馬大郡三國典略曰梁武昌太守朱賈臣聞元帝議遷都入勸梁主云建鄴舊都塋陵攸在荊鎮邊疆非王者宅願陛下勿疑致後悔也臣家在荊州豈不願陛下但恐是臣富貴非陛下富貴耳乃召卜者杜景豪決去留遇兆不吉荅云未去景豪退而言曰此兆為鬼賊所留也事具京都部又曰周文育隨盧安興征俚獠有功除南海令監州王勵深委任之勵被代文育與俱下至大庾嶺詣卜者卜者曰君北下不過作令長南入則為公侯文育曰足錢便可誰望公侯之事卜人曰君須臾, SBCK: ''}
