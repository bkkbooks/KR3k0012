  - {type: variant, offset: 2614, length: 267, content: 寧正言不諱以危身乎將從俗富貴以偷生乎寧超然高舉以保真乎將哫音足柴粟斯喔咿嚅唲以事婦人乎寧廉潔正直以自清乎將突梯滑稽如脂如韋以潔楹乎寧昂昂若千里之駒乎將泛泛若水中之鳧隨波上下偷以全吾軀乎寧與騏驎杭軛乎將隨駑馬之跡乎寧與黃鵠比翼乎將與雞鶩爭食乎此孰吉孰凶何去何從世溷濁而不清蟬翼為重千鈞為輕黃鍾毀棄瓦釜雷鳴讒人高張賢士無名吁嗟默默兮誰知吾之廉貞詹尹乃釋策而謝曰夫尺有所短寸有所長物有所不足知有所不明數有所不逮神有所不通用君之心行君之意龜策誠不能知此事司馬遷與任安書曰僕先人非有丹書剖符之功依倚卜祝之閒人主以排優遇之白虎通曰乾草槁骨眾多獨以, WYG: ''}
