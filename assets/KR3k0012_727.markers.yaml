  - {type: variant, offset: 1873, length: 2, content: 驪戎, WYG: 晉卜徒父筮之吉涉河侯車敗詰之秦伯涉河則晉侯車敗秦伯不解謂敗在已故詰之對曰乃大吉也三敗必獲晉君其卦遇蠱曰千乗三去三去之餘獲其雄狐夫狐蠱必其君也於周易卦利涉大川往有事亦秦勝晉之卦也蠱之貞風也其悔山也嵗云秋矣我落其實而取其材所以克也今嵗已秋風吹落山木之實則為人所取實落材亡不敗何待三敗及韓晉矦車三壞也又曰初晉獻公筮嫁伯姫於秦遇歸妹之暌}
  - {type: page-break, offset: 1873, content: '', id: KR3k0012_WYG_727-4a, image: WYG0899/WYG0899-0420a.png}
