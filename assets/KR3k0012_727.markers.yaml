  - {type: variant, offset: 37, length: 0, content: '', SBCK: 之宗也分而爲二以象兩掛一以象三揲之以四以象四時歸奇於扐以象閏五歲再閠故再扐而後掛奇凡四揲之餘不足復揲者也分而爲二旣揲之餘合掛於一故日再扐而後掛凡閏十九年七閏爲一章五歲再閏者二故略舉其凡也天數五五奇也地數五五竒合爲二十五五位相得而各有合天數二十有五地數三十五耦合爲三十凡天地之數五十有五此所以成變化而行鬼神也變化以此成鬼神以此行乾之策二百一十有六陽爻六一爻三十六策六爻二百一十六策坤之策百四十有四隂爻六一爻二十四策六爻百四十四策凡三百有六十當期之日二篇之策萬有一千五百二十當萬物之数也二篇三百八十四爻隂陽各半合萬一千五百二十䇿}
