  - {type: variant, offset: 382, length: 1, content: 術, SBCK: 日人生有命豈卜筮所移㑹智適來應思遠謂之曰君有通靈之思而但爲貴人用此君寒士貧苦多屯蹇可爲一卦智乃令詹作卦卦成謂瑗曰爲君安宅者女子耶瑗日是也此人安宅失冝旣害其身又令君不利君舎東北有大桑樹君徑至市入門}
