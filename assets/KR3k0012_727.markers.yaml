  - {type: punctuation, offset: 1885, content: 『, id: KR3k0012_CHANT_727-bkkpn522}
  - {type: variant, offset: 1885, length: 0, content: '', WYG: 狐偃言於晉侯曰求諸侯莫如勤王諸侯信之且大義也繼文之業而信宣於諸侯今為可矣使卜偃卜之曰吉遇黄帝戰於阪泉之兆公曰吾不堪也對曰周禮未改今之王古之帝也公曰筮之遇大有之暌曰吉遇公用享於天子之卦戰克而王饗吉孰大焉且是卦也天為澤以當日天子降心以逆公不亦可乎大有去暌而復亦其所也又成公曰晉楚將戰苗賁皇言於晉侯曰楚之良在其中軍王族而已請分良以擊其左右而三軍萃於王卒必大敗之公曰筮之史曰吉其卦遇復曰南國蹙射其元王中厥目復陽長之卦陽氣于南行推隂故曰南國蹙也南國蹙勢則離受其咎故曰王中厥目為諸侯又為日陽氣激南飛矢之象故曰射其元國蹙王傷不敗}
  - {type: page-break, offset: 1885, content: '', id: KR3k0012_WYG_727-5a, image: WYG0899/WYG0899-0420c.png}
  - {type: variant, offset: 1886, length: 0, content: '', WYG: 待公從之又襄公曰穆姜薨于東宫始往而筮之遇艮之八史曰是}
  - {type: page-break, offset: 1886, content: '', id: KR3k0012_WYG_727-5b, image: WYG0899/WYG0899-0420d.png}
  - {type: variant, offset: 1887, length: 0, content: '', WYG: 艮之隨隨其出也君必速出姜曰亡是於周易有曰隨元亨利貞无咎元善之長也亨嘉之㑹也義利之和也貞事之幹也體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事然故不可誣也是以雖隨無咎今我婦人而與於亂固在下位婦人卑於丈夫而有不仁不可謂元不靖國家不可謂亨作而害身不可謂利棄位而姣姣淫之别名不可謂貞有四徳者隨而無咎我皆无之豈隨也哉我則取惡能無咎乎必死於此弗得出矣又襄公曰齊棠公之妻東郭偃之姊也棠公齊棠邑大夫也偃臣崔武子棠公死偃御武子以弔焉見棠姜而美之使偃取之為已娶也偃曰男女辨姓今君出自丁成出自桓不可武子筮之遇困之大過史皆曰吉示陳文子文子曰夫從風坎為中男坎曰夫也變而為巽故曰從風也風隕妻不可娶也風能隕落變隕落故不可也且其繇曰困于石據于蒺藜入于其宫不見其妻凶困六三爻辭也困于石往不濟也據于蒺藜所恃傷也入于其宫不見其妻凶無所歸也崔子曰􅄔也何害先夫當之矣寡婦曰婺言棠公已當此凶也遂取之又昭公曰初穆子之生也莊叔以周易筮之莊叔穆子父得臣}
