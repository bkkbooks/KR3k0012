  - {type: variant, offset: 3672, length: 299, content: 二棊卜異苑曰十二棊卜出自張文成受法於黃石公行師用兵萬不失一逮至東方朔密以占眾事自此以後祕而不傳晉寧康初襄城寺法味道人忽見一老公著黃皮衣竹筒盛此書以授法味無何失所在遂復流於世齊書曰江謐出為鎮北長史東海太守未發憂甚乃以靈碁經占卦云有客南來金椀玉杯上使御史太夫沈沖奏謐前後罪收付廷尉賜死果以金甖盛藥鴆之竹卜荊楚歲時記曰秋分以牲祠社其供帳盛於仲春之月社之餘胙悉貢饋鄉里周於族社餘之會其在茲乎此其會也擲教於社神以占來歲豐儉或折竹以卜楚詞曰索瓊茅以筵篿楚人折竹結草以卜謂為籌也牛蹄卜晉書曰夫餘國若有軍事殺牛祭天以其蹄占吉凶蹄解者為凶合者為吉楊方五經鉤沉曰東夷之人以牛骨占事呈吉示凶無往不中牛非智之物骨者若此之效, SBCK: 七}
