  - {type: 'tls:seg', offset: 36, content: '', id: KR3k0012_CHANT_727-1a.9}
  - {type: variant, offset: 36, length: 0, content: '', SBCK: 邑寘之而逃奔宋衛侯貞卜其繇日如魚竀音頳尾衡流而方羊裔焉大國滅之將亡闔門塞竇乃自後踰又日巴人伐楚圍鄾初右司馬子國之卜也觀瞻日如志故命之及巴師至將卜帥王日寧如志何卜焉使帥師而行敗巴師于鄾故封子國於析君子日惠王知志夏書日官占惟先蔽志昆命于元􅀛其是之謂乎志日聖人不煩卜筮惠王其有焉又日晉荀瑶伐齊將戰長武子請卜知伯日君告于天子而卜之以守􅀛於宗祧吉矣吾又何卜焉且齊人取我英丘君命瑶非敢燿武也治英丘也以辭伐罪足矣何必卜周易上繫辭日大衍之數五十其用四十有九王弻日演天地之數所賴者五十也其用四十有九則其一不用而用以之通非數而數以之成斯易之大極也四十有九數之極也夫無不可以無明必因於有故常於有物之極而必明其所}
