  - {type: variant, offset: 1166, length: 6, content: 下不成守此足, WYG: 麥又前秦録曰初符健聞桓温之來伐也芟麥}
  - {type: punctuation, offset: 1167, content: ；, id: KR3k0012_CHANT_838-bkkpn402}
  - {type: 'tls:seg', offset: 1167, content: '', id: KR3k0012_CHANT_838-17a.13}
  - {type: variant, offset: 1168, length: 442, content: 成守此足以畢老又曰王莽末天下大飢建武二年天下野穀旅生麻菽尤盛魏志曰自遭荒亂率乏糧穀曹公曰夫定國之術在於強兵足食秦人以急農兼天下孝武以屯田定西域此先世之良式也是歲乃募民屯田許下得穀百萬斛於是郡列置田官所在積穀又曰袁曜卿為魏國郎中令及卒太祖為之流涕賜穀二千斛一教以太倉穀千斛賜郎中令家一教以垣下穀千斛與曜卿家外不解其意教曰以太倉穀者官法也以垣下穀者親舊也又曰袁譚以王循為別駕太祖破鄴藉沒審配等家財物貲以萬數破南皮閱循家穀不滿十斛又曰高堂隆諫祿賜穀帛人主之所以惠養吏民而為之司命若令有廢是奪其命又曰甄皇后三歲失父後天下兵亂飢饉百姓皆賣金銀珠金寶物時后家大有儲穀頗以買之后年十餘歲白母曰今世亂而多買寶物匹夫無罪懷璧為罪又左右皆飢乏不如以穀振給親族鄰里廣為恩惠舉家稱善曹瞞傳曰太祖嘗賦廩穀不足私謂主者如何主者曰可以小斛以足之後軍中言太祖欺眾太祖謂主者曰借汝一死厭眾乃殉曰小斛盜官穀即斬之江表傳曰諸葛亮聞恪代徐詳書與陸遜曰家兄年老而恪性踈今使典主糧穀糧穀軍之要最僕雖在遠竊用不安足下特為啟至尊轉之, krp: 取}
