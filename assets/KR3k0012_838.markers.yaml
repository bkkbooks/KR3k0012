  body:
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 二米麥米後漢書曰帝因西征隗囂至􅃮􅃮縣屬右扶風諸將多以王師之重不冝逺入險阻計猶豫未决㑹召馬援夜至帝大喜引入具以群議質之援因􅀃隗􅅝將帥有土崩之勢兵進有必破之狀又於帝前聚米爲山谷􅃌畫形勢開示衆軍所從道徑徃來分析昭然可暁帝曰虜在吾目中矣明旦遂進軍囂衆大潰又曰獻帝時三輔大旱帝避正殿請雨遣使者洗囚徒原輕繫洗謂蕩滌也是時􅂖}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 二米麥米後漢書曰帝因西征隗囂至􅃮􅃮縣屬古扶風諸將多以王師之重不宜逺入險阻計猶豫未决會召馬援夜至帝大喜引入具以羣議質之援因説隗囂將帥有土崩之勢兵進有必破之狀又於帝前聚米為山谷指畫形勢開示衆軍所従道徑往来分析昭然可曉帝曰虜在吾目中矣明旦遂進軍囂衆大潰又獻帝時三輔大旱帝避正殿請雨遣使者洗囚徒原輕繫洗謂蕩滌也是時榖}
