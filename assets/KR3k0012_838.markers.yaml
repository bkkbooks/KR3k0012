  - {type: variant, offset: 1615, length: 5, content: 鄧攸為吳郡, krp: 王褒宇偉元諸生有宻爲褒刈麥者褒遂弃之於是莫敢復佐晋書載記曰京兆杜洪竊據長安自稱晉征北將軍雍州刺史戎夏多歸之符健宻圗關中懼洪知之乃僞愛石祗宫室於枋頭課所部種麥示無西意有知而不耕種者健殺之以徇晉起居注曰咸康三年河北謡曰麥入土殺石虎又曰}
  - {type: variant, offset: 1621, length: 2, content: 守吳, krp: 康十年嘉麥生扶風郿一莖四穟収實三倍崔鴻十六國春秋前凉録曰張駿九年雨五稼榖于武威燉煌種之皆生因名天麥又前秦録曰𥘉符健聞桓温之來伐也芟麥以待之故温掠無所得軍}
