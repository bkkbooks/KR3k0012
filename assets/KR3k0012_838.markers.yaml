  - {type: variant, offset: 1649, length: 2, content: 後梁, SBCK: 李岳字祖仁官至中散大夫甞爲門客所􅀃舉錢營生廣收大麥載赴晉陽􅀱其寒食以求髙價清明之日其車方逹又從晋陽載化生向鄴城路逢大雨並化爲泥息利旣少乃至貧迫當丗人士莫不􅀏之陳書曰侯景亂時吴明徹}
