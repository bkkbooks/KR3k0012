  - {type: variant, offset: 1884, length: 0, content: '', SBCK: 開元十三年河南府壽安縣人劉懷家有大麥六􅅿先熟與衆麥殊色其中有兩歧三歧四歧六歧者又曰元和九年六月三日宰臣武元衡爲盗所害先是}
  - {type: variant, offset: 1884, length: 0, content: '', WYG: 開元十三年河南府夀安縣人劉懐家有大麥六畆先熟與衆麥殊色其中有兩岐三岐四岐六岐者又曰元和九年六月三日宰臣武元衡為盗所害先是}
  - {type: variant, offset: 1884, length: 0, content: '', krp: 開元十三年河南府壽安縣人劉懷家有大麥六畝先熟與衆麥殊色其中有兩歧三歧四歧六歧者又曰元和九年六月三日宰臣武元衡爲盗所害先是}
  - {type: variant, offset: 1885, length: 3, content: 壽二年, SBCK: 安謡曰打麥麥打三三三旣而旋其䄂曰舞了也解者謂打麥者打麥時也麥打者蓋謂闇中突擊也三三三謂六月三日也舞了者謂}
  - {type: page-break, offset: 1885, content: '', id: KR3k0012_SBCK_838-7a}
  - {type: variant, offset: 1885, length: 1, content: 壽, WYG: 安謡曰打麥麥打三三三既而旋其袖曰舞了也解者謂打麥者打麥時也麥打者盖謂闇中掊擊也三三三謂六月三日也舞了者謂元衡之卒也又曰西女國每十月令巫者賫肴詣山中散糟麥於空大呪呼鳥俄而鳥如雞飛入巫者之懐因割腹而視之每有一榖来歳必登若有霜雪必有災異其俗信之名為鳥卜又曰吐谷地氣大寒不生秔稻有青䴹還瓦切麥䝁音勞豆小麥蒿麥莊子曰大儒以詩禮發冡小儒口中有珠詩曰青青之麥生於陵陂生不布施死何含珠為淮南子曰濟水通河而宜麥又曰三春之月天子衣青衣乗青龍食麥與羊秦子曰孔文舉為北海相有人母病瘥思食新麥家無有乃盗隣熟麥而進之孔舉聞特賞之家語曰宓子賤為單父宰百姓化之齊人攻魯道由單父父老謂曰麥已熟矣今齊冦至不及人人自収其麥請放民皆使出穫傅郭之麥可以益糧且不資㓂三請而宓子不聽俄而㓂逮扵麥季孫聞之怒使人譲之宓子蹙然曰今兹無麥明年可樹若使不耕者得穫是民樂有㓂也且單父一歳之麥於魯不加强䘮之不加弱使民有自取之心其瘡必數世不息季孫聞之赧然媿曰邑若可入吾豈忍見宓子哉廣雅曰大麥麰也小麥麳也呂氏春秋曰得時之麥長穂而頸黑}
