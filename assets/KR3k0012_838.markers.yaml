  - {type: variant, offset: 3072, length: 58, content: 遭疾風之俱飛衰穀集中國中國見之謂天雨穀世要論曰學不勤則不知道耕不力則不得穀又曰服一綵則念女工勞御一穀則恤農夫勤兵書曰, SBCK: 麥以爲}
  - {type: variant, offset: 3072, length: 185, content: 遭疾風之俱飛衰穀集中國中國見之謂天雨穀世要論曰學不勤則不知道耕不力則不得穀又曰服一綵則念女工勞御一穀則恤農夫勤兵書曰軍中地生五穀將軍得天道大吉夢書曰五穀為財飲食物夢見穀得財吉五穀入家家當盛殷氏世傳曰殷謖字伯起遭世喪亂埋穀數百石後謖為賊所執見掠責具以穀告之賊猶嫌其未實欲刃焉謖乃詈曰卿行劫害當知人心豈有出財還自殺耶則知其誠遂免羊祜別傳曰祜周行賊境七百餘里往反四十餘日刈賊穀, WYG: 麥}
