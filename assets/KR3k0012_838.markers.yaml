  - {type: 'tls:seg', offset: 27, content: '', id: KR3k0012_CHANT_838-1a.8}
  - {type: variant, offset: 29, length: 2, content: 嘉穀, SBCK: 經序曰余備位台􅉗與叅大謀賞獲豐厚牛羊盖澤貨累巨萬衣則重錦食必梁􅁏逺惟平生思季路負米之時可復得乎故序遺文垂示來丗北史曰齊文宣帝崩當朝文士各作挽歌十首擇其善者而用之魏収陽休之祖孝徴等不過得一二首唯盧思道獨有八篇故時人稱爲八美盧郎唐書曰李峴爲京兆尹所在皆著聲績天寳十三載連雨六十餘日宰臣楊國忠惡其不附己以雨灾歸咎京兆尹乃爲長沙郡太守時京師米麥踴貴百姓謡言曰欲得米粟賤無過追李峴爲其政得人心如此又曰張万福爲泗州刺史魏州飢父子相賣餓死者接道万福曰魏州吾郷里也安可不救令其兄子將米百車徃餧之又使人於汴口求魏人自賣者給車牛贖而遣之又曰陽城嘗約其二弟云吾所得月俸汝可度吾家有幾口月食米當幾何買薪菜塩米凡用幾錢先具之其餘悉以付酒媪無留也未甞有所蓄積􅀃苑曰子路曰負重道逺者不擇地而休家貧親老者不擇禄而仕昔者由事二親之時常食藜藿之實而爲親􅀒米百里之外親没之後南遊於楚從車乗積粟萬鍾累茵而坐列鼎而食願食藜藿爲親􅀒米之時不可復得也枯魚衘索幾何不蠧二親之壽忽如過􅂩草木欲長霜露不停賢者欲養二親不待故曰家貧親老不擇禄而仕也吕氏春秋曰孔子窮於陳蔡之間藜羮不糝七日不甞粒晝寢顔回索米得而來爨之幾熟孔子望見顔回攫其甑中而飯之選間食熟謁孔子而進食孔子起曰今者夢見先君食㓗欲饋回曰可嚮者㶼煤入甑中回以爲弃之則不可置之則不㓗因攫而食之孔子歎曰人所信者目也而目猶不可信所恃者心也而心猶不足恃弟子記之知人固不易水經曰㑹稽有射的山逺望狀􅀂射侯故謂射的的之西有石室名之爲射堂年登否常占射的以爲貴賤之准的明則米賤的闇則米貴故諺云射的白斛米百射的􅀇斛米千麥}
