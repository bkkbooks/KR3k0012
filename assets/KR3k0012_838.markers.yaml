  - {type: variant, offset: 29, length: 2, content: 嘉穀, WYG: 經序曰余備位台鉉與叅大謀賞獲豐厚牛羊盖澤貨累巨萬衣則重錦食必粱肉逺惟平生思季路負米之時可復得乎故序遺文垂示來世北史曰齊文宣帝崩當朝文士各作挽歌十首擇其善者而用之魏收陽休之祖孝徴等不過得一二首惟盧思道獨有八篇故時人稱為八美盧郎唐書曰李峴為京兆尹所在皆著聲績天寳十三載連雨六十餘日宰臣楊國忠惡其不附己以雨災歸咎京兆尹乃為長沙郡太守時京師米麥踴貴百姓謡言曰欲得米粟賤無過追李峴其為政得人心如此又曰張萬福為泗州刺史魏州飢父子相賣餓死者接道福曰魏州吾鄉里也安可不救令其兄子將米百車往饟於汴口求魏人自賣者給車牛贖而遣之又曰陽城常約其二弟云吾所得月俸汝可度吾家有㡬口月食米當㡬何買薪菜鹽米凡用㡬錢先具之其餘悉以付酒媪無留也未嘗有所蓄積説苑子路曰負重道逺不擇地而休家貧親老不擇禄而仕昔者由事二親之時常食藜藿之實而為親負米百里之外親沒之後南遊於楚従車百乗積粟萬鍾累茵而坐列鼎而食願食藜藿為親負米之時不可復得也枯魚銜索幾何不蠧二親之壽忽如過隙草木欲長霜露不停賢者欲養二親不待故曰家貧親老不擇禄而仕也呂氏春秋曰孔子窮於陳蔡之間藜羮不糁七日不嘗粒晝寐顔回索米得而来㸑之㡬熟孔子望見顔回攫其甑中而飯之選間食熟謁孔子而進食孔子起曰今者夢見先君食潔欲饋回曰不可嚮者㶼煤入甑中囘以為棄之則不可置之則不潔因攫而食之孔子歎曰人所信者目也而目猶不可信所恃者心也而心猶不足恃弟子記之知人故不易水經注會稽有射的山逺望狀若射侯故謂射的的之西有石室名之為射堂年登否常占射的以為貴賤之准的明則米賤的闇則米貴故諺云射的白斛米百射的𤣥斛米千麥}
