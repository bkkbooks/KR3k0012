  - {type: variant, offset: 4, length: 3, content: 穀周易, SBCK: 斛五十萬豆麥一斛二十萬人相食啖白骨委積帝使御史侯汶岀太倉米豆爲飢人作麋粥經日而死者無數帝疑賑䘏有虚乃親於御坐前量試作麋乃知非實􅀽宏漢記}
