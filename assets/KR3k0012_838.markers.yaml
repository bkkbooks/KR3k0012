  - {type: variant, offset: 23, length: 5, content: 稷降播種農, SBCK: 米豆五􅂛得麋三盂而人委頓何也使侍中劉艾岀讓有司於是尚書令以下皆詣省閣謝奏収侯汶考實詔曰未忍致汶于理可杖五十自是之後多得全濟宋書曰晉平王休祐素無才能強梁自用大明之丗年尚少未得自專至是貪􅁋好財色在荆州裒刻所在多營財貨以短錢一百賦民田登就求白米一斛米粒皆令徹白若有破折者悉郍簡不受民間糴此米一升一百至時又不受米評米責錢凡諸求利皆悉如此又曰徐齊耕􅀳陵人也元嘉二十一年大旱人飢耕詣縣陳辤以米千斛助官振貸縣爲言上當時議以耕比漢卜式詔書襃美酬以縣令大明八年東土飢東海嚴成東􅁐王道益各以私榖五百餘斛助官振䘏梁書曰任昉爲新安太守爲政清省吏民便之卒於官唯有桃花米二十斛無以爲歛遺言不許將新安一物還都南史曰孔覬後爲司徒左長史弟道存代覬爲後軍長史江夏内史時東土大旱都邑米貴一􅂛將百錢道存慮覬甚乏遣使載五百斛米餉之覬呼使謂之曰我在彼三載去官之日不辦有路粮卿至彼未幾郍能便得此米即可載還彼吏曰自古已來無有載米上水者都下米貴乞於此貨之不聽吏乃載米而去梁書曰􅁃詵甞乗舟從􅹛中山舎還載米一百五十石有人寄載四十石及至宅􅀉載者曰君四十斛我百五十斛詵嘿然不言恣其取足隣人有􅀍執爲盗見劾妄疑詵矜之乃以書質錢二萬令門生詐爲其親代之酬備隣人獲免謝詵曰矜天下無辜豈其謝也又曰張率􅄝酒不事於家務尤忘懷在新安遣家僮載米三千石還呉宅及至耗太多率問其故荅曰雀䑕耗率􅀏而言曰壯哉雀䑕竟不研問南史隱逸傳曰陶潜爲彭澤令郡遣督郵至縣吏白應束帶見之潜歎曰我不能爲五斗米折腰向郷里小人即日解印綬去職賦歸去來以遂其志後魏書曰崔浩自饌}
  - {type: page-break, offset: 23, content: '', id: KR3k0012_SBCK_838-2a}
  - {type: page-break, offset: 23, content: '', id: KR3k0012_SBCK_838-2b}
  - {type: variant, offset: 23, length: 5, content: 稷降播種農, WYG: 米豆五升得糜三盂而人委頓何也使侍中劉艾出讓有司於是尚書令以下皆詣省閤奏收侯汶考實詔曰未忍致汶于理可杖五十自是之後多得全濟宋書曰晋平王休祐素無才能强梁自用大明之世年尚少未得自專至是貪滛好財色在荆州裒刻所在多營財貨以短錢一百賦民曰登就求白米一斛米粒皆令徹白若有破折者悉刪簡不受民糴此米一升一日至時又不受米評米責錢凡諸求利皆悉如此南史曰徐耕晉陵人也元嘉二十一年大旱人飢耕詣縣陳辭以米千斛助官振貸縣為言上當時議以耕比漢卜式詔書褒美酧以縣令大明八年東土飢東海嚴成東莞王道益各以私榖五百餘斛助官賑䘏梁書曰任昉為新安太守為政清省吏民便之卒於官唯有桃花米二十斛無以為歛遺言不許將新安一物還都南史曰孔顗後為司徒左長史弟道存代顗為後軍長史江夏内史時東土大旱都邑米貴一升將百錢道存慮顗甚乏遣使載五百斛米餉之顗呼吏謂之曰我在彼三載去官之日不辦有路糧郎至彼未㡬那能便得此耶可載還彼吏曰自古以来無有載米上水者都下米貴乞扵此貨之不聽吏乃載米而去梁書曰庾詵常乗舟自中山還舍載米一百五十石有人寄載四十石及至宅寄載者曰君四十斛我百五十斛詵嘿然不言恣其取足鄰人有被執為盗見劾妄欵詵矜之乃以書質錢二萬令門生詐為其親代之酬鄰人獲免謝詵曰矜天下無辜豈期謝也又曰張率嗜酒不事於家務尤忘懐在新安遣家僮載米三千石還呉宅及至耗一半率問其故答曰省䑕耗率笑而言曰壯哉雀䑕竟不追問南史隱逸傳曰陶􅅗為彭澤令郡遣督郵至縣吏白應束帶見之潜歎曰我不能為五斗米折腰向鄉里小兒即日觧印綬賦歸去来辭以遂其志後魏書曰崔浩自撰}
