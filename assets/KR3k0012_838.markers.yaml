  - {type: variant, offset: 2518, length: 325, content: 金樓子曰鬻官者欲民之死蓄穀者欲歲之飢船漏水入囊洞內虛也說苑曰楚魏會於晉陽將以伐齊王患之使人召淳于髡曰楚魏謀欲伐齊願先生與寡人共之淳于髡大笑而不應三問而不應王怫然作色曰先生以寡人國為戲乎淳于髡對曰臣不敢以王國為戲也臣笑鄰之祠田也以篋飲與一鮒魚其祝曰下田洿耶得穀百車蟹戶買反堁口對反者宜禾臣笑其所以祠者少而求者多王曰善賜之千金革車百乘立為上卿山海經曰都廣之野百穀自生冬夏播琴郭璞注曰其城方三百里蓋天地之中素女所出也播琴猶播殖方俗言耳揚雄方言曰凡以火乾五穀之類出自山東齊楚以往曰熬隴冀以往曰㷶平力切秦晉之間曰焣創眇切楊泉物理論曰穀氣勝元氣其人肥而不壽養性之術常使穀氣少則病不生矣梁者黍稷之惣名也稻者溉種之惣名菽者眾豆之惣名三穀各二十種為六十䟽果之實助穀各二, WYG: ''}
