  - {type: variant, offset: 3, length: 0, content: '', krp: 二米麥米後漢書曰帝因西征隗囂至􅃮􅃮縣屬右扶風諸將多以王師之重不冝逺入險阻計猶豫未决㑹召馬援夜至帝大喜引入具以群議質之援因說隗囂將帥有土崩之勢兵進有必破之狀又於帝前聚米爲山谷指畫形勢開示衆軍所從道徑徃來分析昭然可暁帝曰虜在吾目中矣明旦遂進軍囂衆大潰又曰獻帝時三輔大旱帝避正殿請雨遣使者洗囚徒原輕繫洗謂蕩滌也是時糓}
