  - {type: variant, offset: 4476, length: 0, content: '', SBCK: 於是羣公上尊號爲太上皇帝軍國大事咸以奏聞始將傳政使内叅乗子尚乗驛送詔書於鄴子尚出晉陽城見人􅀐馬隨後忽失之尚未至鄴而其言巳布矣天統四年十二月辛未太上皇帝崩於鄴宫乾壽堂時年三十二謚曰武成皇帝廟號丗祖葬永平陵後主髙緯北齊書曰後主諱緯字仁綱武成皇帝之長子也母曰胡皇后夢於海上㘴玉盆日入裙下遂有娠天保七年五月五日生帝於并州邸帝少羙容儀武成特所愛寵拜王丗子及武城入纂太業立爲皇太子河清四年武成禪位於帝天統元年乙酉夏四月景子皇帝即位於晉陽宫大赦改河清四年爲天統三年二月壬寅朔帝加元服大赦四年秋周人來通和太上皇帝詔侍中斛斯文略報聘于周十二月辛未太上皇帝崩武平三年二月侍中祖珽爲左僕射是月敕撰􅀇洲􅁐御覽後改名聖壽御覽三月辛酉詔文武官五品以上各舉一人秋七月戊辰誅左丞相咸陽王斛律光及其弟幽州行臺荆山公豐樂}
  - {type: page-break, offset: 4476, content: '', id: KR3k0012_SBCK_131-5b}
  - {type: variant, offset: 4476, length: 0, content: '', WYG: 於是羣公上尊號為太上皇帝軍國大事咸以奏聞始將傳政使内參乗子尚乗馹送詔書於鄴子尚出晉陽城見人騎馬隨後忽失之尚未至鄴而其言已布矣天統四年十二月辛未太上皇帝崩於鄴宫乾夀堂時年三十二諡曰武成皇帝廟號世祖塟永平陵高緯北齊書曰後主諱緯字仁綱武成皇帝之長子也母曰胡皇后夢於海上坐玉盆日入裙下遂有娠天保七年五月五日生帝於并州邸帝少美容儀武成特所愛寵拜王世子及武成入纂大業立為皇太子河清四年武成禪位於帝天統元年乙酉夏四月丙子皇帝即位於晉陽宫大赦改河清四年為天統三年二月壬寅朔帝加元服大赦四年秋周人來通和太上皇帝詔侍中斛斯文略報聘於周十二月辛未太上皇帝崩武平三年二月侍中祖珽為左僕射是月敕撰𤣥洲苑御覽後改名聖夀堂御覽三月辛酉詔文武官五品已上各舉一人秋七月戊辰誅左丞相咸陽王斛律光及其弟幽州行臺荆山公豐樂}
