  - {type: variant, offset: 3525, length: 0, content: '', WYG: 録尚書事三月甲寅詔軍國事皆申晉陽禀大丞相常山王規笇秋八月太皇太后令廢帝為濟南王以大丞相常山王演入纂大統是日王居別宫皇建二年九月殂於晉陽時年十七諡閔悼王高演北齊書曰孝昭皇帝演字延安神武皇帝第六子文宣皇帝之母弟也幼而英特早有大成之量武明皇太后早所愛重魏元象元年封常山郡公天保初進爵為王五年除并省尚書令帝善斷割長於文理省内畏服七年從文宣還鄴以尚書奏事有異同令帝與朝臣先論定得失然後敷奏帝長於政術剖斷咸盡其理文宣嘆重之八年轉司空録尚書事九年除大司馬仍錄尚書文宣崩帝居禁中護喪事幼主即位乃即朝班除太傅}
