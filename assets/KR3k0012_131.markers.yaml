  - {type: variant, offset: 4469, length: 0, content: '', SBCK: 大赦四月乙巳青州刺史上言今月庚寅河濟清以河濟清改大寧二年爲河清二年癸未春正月乙卯帝詔臨朝堂䇿試秀才以太子少􅀓魏収爲兼尚書右僕射十二月大雨雪連月南北千餘里平地數尺雪晝下雨血於太原四年三月彗星見有物隕於殿庭如赤􅃮鼓帶小鈴殿上石自起兩兩相對又有神見於後園萬壽堂前山穴中其體壯大不辨其面兩齒絶白長出於脣帝直􅀫嬪御巳下七百人咸見焉帝又夢之夏四月戊午大將軍東安}
