  - {type: variant, offset: 13, length: 1391, content: 高祖神武皇帝姓高氏諱歡字賀六渾渤海蓨人也六世祖隱晉玄菟太守皇考樹性通率不事家業住居白道南數有赤光紫氣之異鄰人以為怪勸徙居以避之皇考曰安知非吉居之自若及神武生而皇妣韓氏殂養於同產姊婿鎮獄隊尉景家神武既累世北邊故習其俗遂同鮮卑長而深沉有大度輕財重士為豪俠所宗目有精光長頭高權齒白如玉少有人傑素家貧及娉武明皇后始有馬得給鎮將遼西叚長常奇神武貌謂曰君有康濟之才終不徒然便以子孫為託神武自隊主轉輪為函使嘗乘驛過建興雲霧晝晦雷聲隨之半日乃絕若有神應者每行道路往來無風塵之色又嘗夢履眾星而行覺而內喜為函使六年每至洛陽給令史麻祥使祥嘗以肉啗神武神武性不立食坐而進之祥以為慢已笞神武四十及自洛陽還傾產以結客親故怪問之荅曰吾至洛陽宿衛羽林相率焚領軍張彝宅朝廷懼其亂而不問為政若此事可知也財物豈可常守耶自是乃有澄清天下之志與懷朔省事雲中司馬子如及秀容人劉貴中山人賈顯智為奔走之友懷朔戶曹史孫騰外兵史侯景亦相友結孝昌元年歸爾朱榮於秀容先是劉貴事榮盛言神武美至是始得見以憔悴故未之奇也貴乃為神武更衣復求見焉因隨榮之廄廄有惡馬榮命剪之神武乃不加羈絆而剪竟不蹄齧已而起曰御惡人亦如此馬矣榮遂坐神武於床下屏左右而訪時事神武曰聞公有馬十二谷色別為群將此竟何用也榮曰但言爾意神武曰方今天子愚弱太后淫亂孽寵擅命朝政不行以明公雄武乘時奮發討鄭儼徐紇而清帝側霸業可舉鞭而成此賀六渾之意也榮大悅語自日中至夜半乃出自是每參軍謀既而榮以神武為親信都督于時魏明帝銜鄭儼徐紇逼靈太后未敢制私使榮舉兵內向榮以神武為前鋒至上黨明帝又私詔停之及帝暴崩榮遂入洛邑將篡位神武諫恐不聽請鑄像卜之鑄不成乃止孝莊帝立以定策勳封銅鞮伯榮嘗問左右曰一日無我誰可主軍皆稱爾朱兆榮曰此正可統三千騎以還堪代我主眾者唯賀六渾耳因誡兆曰爾非其匹終當為其子穿鼻乃以神武為晉州刺史於是大聚斂因劉貴貨榮下要人盡得其意州庫角無故自鳴神武異之無幾而孝莊誅榮及爾朱兆自晉陽將舉兵赴洛召神武使長史孫騰辭以蜀汾胡欲反不可委去兆恨焉騰命神武曰兆舉兵犯上此大賊也吾不能久事之自是始有圖兆計及兆入洛執莊帝以北神武聞之大驚又使孫騰偽賀兆因密覘孝莊所在將劫以舉義不果乃以書喻之言不宜執天子以受惡名於海內兆不納殺帝而與爾朱世隆等立長廣王曄改元建明封神武為平陽郡公魏普泰元年二月神武自領軍次信都高乾封隆之開門以待遂據冀州是月爾朱度律廢元曄而立節閔帝欲羈縻神武三月乃白節閔帝封神武為勃海王徵使入覲神武辭四月癸巳又加授東道大行臺第一鎮人酋長龐蒼鷹自太原來奔神武以為行臺郎尋以為安州刺史神武自向山東養士繕甲禁兵侵掠百姓歸心乃詐為書云爾朱兆將以六鎮人配契胡為部曲眾皆愁為并州符徵兵討步落稽發萬人將遣之孫騰尉景為請留如此者再神武親送之郊雪涕執別人號慟哭聲動地神武乃喻之曰與爾俱失鄉客義同一家不意在上乃爾徵召直向西已當死後軍期又當死配國人又當死奈何眾曰唯有反耳神武曰反急計須推一人為主眾願奉神武神武曰爾鄉里難制不見葛榮乎雖百萬眾無刑法終自灰滅今以吾為主當與前異不得欺漢兒不得犯軍令生死任吾則可不爾不能為取笑天下眾皆頓顙死生唯命神武曰若不得已明日推牛饗士喻以討爾朱兆之意封隆之進曰千載一時普天幸甚神武曰討賊大順也極時大業也吾雖不武以死繼之何敢讓焉六月庚子建義於信都乃抗表罪狀爾朱氏世隆等祕表不通八月爾朱兆攻陷殷州李元忠來奔孫騰以為朝廷隔絕不權立天子則眾望無所係十月壬寅奉章武王融子渤海太守朗為皇帝年號中興是為, SBCK: ''}
