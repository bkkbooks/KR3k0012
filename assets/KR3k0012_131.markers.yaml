  - {type: variant, offset: 4363, length: 0, content: '', WYG: 考求得失搜訪賢良二年十一月甲辰詔曰朕嬰此暴疾奄忽無逮今嗣子沖眇未嫻政術社稷業重理歸上徳右丞相長廣王湛硏機測化體道居宗人雄之望海内瞻仰同胞共氣家國所慿可遣尚書左僕射趙郡王叡喻旨徴王統兹大寳先是帝不豫而無闕聽覽是日崩於晉陽宫時年二十七大寧元年閏十二月癸夘梓宫還鄴上諡曰孝昭皇帝塟於文靖陵帝聰敏有識度深沈能斷不可窺測身長八尺腰帶十圍儀望風表逈然獨秀自居臺省留心政術嫻明簿領吏所不逮及正位宸居彌所尅勵輕徭薄賦勤恤人隱内無私寵外收人物雖后父位亦特進無別日是臨朝務知人之善惡毎訪問左右冀獲直言曾問舍人裴澤在外議論得失澤率爾對曰陛下聰明至公自可逺侔古昔而有識之士咸言傷細帝王之度頗為未𢎞帝笑曰誠如卿言朕初臨萬機慮不周悉故致爾耳此事安可久行恐後又嫌疎漏澤因被寵遇其樂聞過也如此趙郡王叡與厙狄顯安侍坐帝曰須拔我同堂弟顯安我親姑子今序家人禮除君臣之敬可言我之不逮顯安曰陛下多妄言曰若何對曰陛下昔見文宣以馬鞭撻人常以為非而今行之非妄言耶帝握其手謝之又使直言對曰陛下太細天子乃更似吏帝曰朕甚知之然無法來久將整之以至無為耳又問王晞晞答如顯安皆從容受納高湛北齊書曰世祖武成皇帝諱湛神武皇帝第九子孝昭皇帝之母弟儀表瓌傑神武尤所鍾愛神武方招懐荒逺乃為帝聘蠕蠕太子菴羅辰女號隣和公主帝時年八歳冠服端}
