  - {type: variant, offset: 4673, length: 2, content: 親戎, WYG: 至圍所十二月戊申周武帝來救晉州庚戌戰於城南齊軍大敗帝棄軍先還癸丑入晉陽憂懼不知所之甲寅大赦帝謂朝臣曰周師甚盛若何羣臣咸曰天命未改一得一失自古皆然宜停百賦安朝野收遺兵背城死戰以存社稷帝意猶豫欲向北朔州乃留安徳王延宗廣寧王孝珩等守晉陽若晉陽不守即欲奔突厥羣臣皆曰不可帝不從其言開府儀同三司賀㧞伏恩封輔相慕容鍾葵等與宿衞近臣三十餘人西奔周師乙夘詔募兵遣安徳王延宗為左廣寧王孝珩為右延宗入見帝告欲向北朔州延宗泣諫不從帝密遣王康徳與中人齊紹等送皇太后皇太子於北朔州丙辰帝幸城南軍勞將士其夜欲遁諸將不從丁巳大赦改武平七年為隆化元年其日穆提婆降周詔除安徳王延宗為相國委以備禦延宗流涕受命帝乃夜斬五龍門而}
