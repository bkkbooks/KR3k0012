  - {type: variant, offset: 4671, length: 1, content: 寅, SBCK: 辰帝幸城南軍勞將士其夜欲遁諸將不從丁巳大赦改武平七年爲隆化元年其日穆提婆降周詔除安德王延宗爲相國委以備禦延宗流涕受命帝乃夜斬五龍門而出欲走突厥從官多散領軍梅勝郎叩馬諌乃廻之鄴時唯阿郍肱等十餘􅀐廣寧王孝珩襄城王彦道續至得數十人同行戊午延宗從衆議即皇帝位於晉陽改隆化爲德昌元年庚申帝入鄴辛酉延宗與周師戰於晉陽大敗爲周師所虜帝遣募人重加官賞雖有此言而竟不出物廣寧王孝珩奏請出宫人及􅈿寳班賜將士帝不恱斛律孝卿居中受委帶甲以處分請}
