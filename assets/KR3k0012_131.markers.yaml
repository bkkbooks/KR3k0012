  - {type: variant, offset: 5382, length: 229, content: 餘里先是發丁匠三十餘萬營三臺於鄴下因其舊基而高愽之大起宮室及遊豫園至是三臺成改銅爵曰金鳳金武曰聖應水井曰崇光十一月甲午帝登三臺御乾象殿朝讌群臣並命賦詩以新宮成故也十年春正月甲寅帝如遼陽甘露寺二月景戍帝於甘露寺禪居深觀唯軍國大政奏聞三月景辰帝至自遼陽十月甲午帝暴崩於晉陽宮還京師葬武寧陵謚曰文宣皇帝廟號高祖武平初又改廟號顯祖先是帝問泰山道士曰吾得幾年為天子荅曰得三十年帝曰十年十月十日得非三十也吾甚畏之過此無慮人生有死又何致惜但憐正道尚幼人將奪之耳帝及期而崩年, SBCK: ''}
