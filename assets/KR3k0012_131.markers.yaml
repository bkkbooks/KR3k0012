  - {type: variant, offset: 1438, length: 1869, content: 城陷入地永熙元年正月壬午拔鄴城據之廢帝進神武大丞相柱國大將軍太師是時青州建義大都督崔靈珍大都督耿翔皆遣使歸附行汾州事劉貴棄城來降閏三月爾朱天光自長安兆自并州度律自洛陽仲遠自東郡同會鄴眾號二十萬挾洹水而軍節閔以長孫承業為大行臺揔總督焉神武令封隆之守鄴自出頓紫陌時馬不滿二千步兵不至三萬眾寡不敵乃於韓陵為圓陣連牛驢以塞歸道於是將士皆為死志四面合擊之爾朱兆責神武以背己神武曰本勠力者共輔王室今帝何在兆曰永安枉害天柱我報讎耳神武曰我昔日親聞天柱計汝在戶前立豈得言不反耶且以君殺臣何報之有今日義絕矣乃合戰大敗之四月斛斯椿執天光度律以送洛陽長孫承業遣都督賈顯智張歡入洛陽執世隆彥伯斬之兆奔并州仲遠奔梁州遂死焉時兇蠹既除朝廷慶悅既而神武至洛陽廢節閔及中興主而立孝武孝武既即位授神武大丞相天柱大將軍太師世襲定州刺史增封并前十五萬戶神武辭天柱減戶五萬壬辰還鄴魏帝餞于乾脯山執手而別七月壬寅神武帥師北伐爾朱兆封隆之言侍中斛斯椿賀拔勝賈顯智等往事爾朱普皆反噬今在京師寵任必構禍隙神武深以為然乃歸天光度律於京師斬之遂自滏口入爾朱兆大掠晉陽北保秀容并州平神武以晉陽四塞乃建大丞相府而定居焉爾朱兆既至秀容分兵守險出入冠抄神武揚聲討之師出止者數四兆意怠神武揣其歲首當宴會遣竇泰以精騎馳之一日一夜行三百里神武以大軍繼之二年正月竇泰奄至爾朱兆庭軍人因宴休惰忽見泰軍驚走追破之於赤洪嶺兆自縊神武親臨厚葬之慕容紹宗以爾朱榮妻子及餘眾自保焉突城降神武以義故待之甚厚神武之入洛也爾朱仲遠部下都督橋寧張子期自滑臺歸命神武以其助亂且數反覆皆斬之斛斯椿由是內不自安乃與南陵王寶炬及武衛將軍元毗魏光王思政構神武於魏帝帝舍人元士弼又奏神武受敕大不敬於是魏帝與神武隙矣天平元年正月魏帝下詔罪狀神武為北伐經營神武亦勒馬宣告曰孤遇爾朱擅權舉大義於四海奉戴主上義貫幽明橫為斛斯椿讒構以誠節為逆首昔晉趙鞅興晉陽之甲誅君側惡人今者南邁誅椿而已以高昂為前鋒曰若用司空言豈有今日之舉司馬子如荅神武曰本欲立小者正為此耳魏帝徵兵關右召賀拔勝赴行在所遣大行臺長孫承業大都督頴川王斌之斛斯椿共鎮武牢七月魏帝躬率大眾屯河橋神武至河北十餘里再遣口申誠款魏帝不報神武乃引軍渡河魏帝問計於群臣或云南依賀拔勝或云西就關中或云守洛口死戰未決而元斌之與斛斯椿爭權不睦斌之棄椿徑還紿帝云神武兵至即日魏帝遜位於長安己酉神武入洛陽止於永寧寺八月神武以萬機不可曠廢乃與百僚議以清河王亶為大司馬居尚書下舍而承制決事焉神武尋至弘農遂西剋潼關九月庚寅神武還至洛陽乃遣僧道榮奉表關中又不答乃集百僚沙門耆老議所推立以為自孝昌衰亂國統中絕神主靡依昭穆夫序遂議立清河王世子善見議定白清河王王曰天子無父茍使兒立不惜餘生乃立之是為孝靜帝魏於是始分為二神武以孝武既西恐逼崤陜洛陽復在河外接近梁境如向晉陽形勢不能相接議遷鄴護軍祖營贊焉詔下三日車駕便發戶四十萬狼狽就道神武留洛陽部分事畢還晉陽自是軍國政務皆歸相府二年正月魏帝褒詔以神武為相國假黃鉞劍履上殿入朝不趨神武固辭四年十一月壬辰神武西討自蒲津濟眾二十萬周文軍於沙苑神武以地阨少卻西人鼓噪而進軍大亂棄器甲十有八萬神武跨橐駞候船以歸元象元年三月辛酉神武固請解丞相魏帝許之四月庚寅神武朝于鄴壬辰還晉陽興和元年七月丁丑魏帝進神武為相國錄尚書事固讓乃止十一月神武以新宮成朝於鄴魏帝與神武讌射武定四年八月癸巳神武將西征自鄴會兵晉陽九月神武圍王壁以桃西師不敢西魏晉州刺史韋孝寬守王壁頓軍五旬城不拔死者七萬人聚為一冢有星墜於神武營眾驢並鳴士皆讋懼神武有疾十一月庚子輿疾班師庚戍遣太原公洋鎮鄴辛亥徵世子澄至晉陽有惡鳥集亭樹世子使斛斯律光射殺之己卯神武以無功表解都督中外諸軍事魏帝優詔許焉是時西魏言神武中弩神武聞之乃勉坐見諸貴使斛律金勑勤歌神武自和之哀感流涕侯景素輕世子嘗謂司馬子如曰王在吾不敢有異王無吾不能與鮮卑小兒共事子如掩其口至是世子為神武書召景景先與神武約得書書微點乃來書至無點景不至又聞神武疾遂擁兵自固神武謂世子曰我雖疾爾面更有餘憂色何也世子未對又問曰豈非憂侯景叛耶曰然神武曰景專制河南十四年矣常有飛揚跋扈志顧我能養豈為汝駕御也今四方未定勿遽發哀庫狄干鮮卑老公斛律金勑勤老公並性純道直終不負汝可朱渾道元劉豊生遠來投我必無異心賀拔焉過兒樸實無罪過潘樂和厚汝兄弟當得其力韓軌少戇宜寬借之彭樂心腹難得宜防護之少堪敵侯景者唯有慕容紹宗我故不貴之留以與汝宜深加殊禮委以經略之事五年正月朔日蝕神武曰日蝕其為我耶死亦何恨景午陳啟於魏帝是日崩於晉陽時年五十二祕不發喪天保初追崇為獻武帝廟號太祖高澄北齊書曰世祖文襄皇帝諱澄字子惠神武, SBCK: ''}
