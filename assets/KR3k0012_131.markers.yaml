  - {type: variant, offset: 4805, length: 4, content: 意威權當, SBCK: 統故事傳位㓜主帝自稱太上皇㓜主名恒帝之長子也母曰穆皇后武平元年六月生於鄴其年十月立爲皇太子隆化二年正月乙亥即皇帝位時年八􅀊改元爲承光元年大赦於是黄門侍郎顔之推中書侍郎薛道衡侍中陳徳信等勸太上皇往河外募兵更爲經略􅀂不濟南􅄬陳國從之丁丑太皇太后太上皇自鄴先趣濟州周師漸逼癸未㓜主又自出鄴東巳丑周師至紫陌橋癸巳燒城西門太上皇將百餘􅀐東走乙亥渡河入濟州其日㓜主禪位於大丞相任城王湝令侍中斛律孝卿送禪文及璽綬於瀛州孝卿仍以之}
