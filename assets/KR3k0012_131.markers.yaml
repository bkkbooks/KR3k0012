  - {type: variant, offset: 4363, length: 0, content: '', SBCK: 考求得失捜訪賢良二年十一月甲辰詔曰朕嬰此􅁀疾奄忽無逺今嗣子冲眇未聞政術社稷業重理歸上德右丞相長廣王研機測化體道居宗人雄之望海内瞻仰同胞共氣家國所慿可遣尚書左僕射趙郡王叡喻旨徴王統兹大寳先是帝不豫而無闕聽覽是日崩於晉陽宫時年二十七大寧元年閏十二月癸夘梓宫還鄴上謚曰孝昭皇帝葬於文野陵帝聦敏有識度深沉能斷不可窺測身長八尺腰帶十圍儀望風表逈然獨秀自居臺省留心政術閑明簿領吏所不逮及正位宸居彌所尅勵輕傜薄賦勤恤人隱内無私寵外収人物雖后父位亦特進無別日􅉴臨朝務知人之善惡毎訪問左右冀獲直言曽問舎人裴澤在外議論得失澤率爾對曰陛下聦明至公自可逺侔古昔而有識之士咸言傷細帝王之度頗爲未弘帝􅀏曰誠如卿言朕􅀄臨萬機慮不周悉故致爾耳此事度可乆行恐後又嫌踈漏澤因􅀍寵遇其樂聞過也如此趙郡王叡與庫狄安侍坐帝曰湏抜我同堂弟顯安我親姑子今序家人禮除君臣之敬可言我之不逮顯安曰陛下多妄言曰􅀂何對曰陛下昔見文宣以馬鞭撻人常以爲非而今行之非妄言耶帝握其手謝之又使直言對曰陛下太細天子乃更似吏帝曰朕甚知之然無法來乆將整之以至無爲耳又問王晞晞荅如顯安皆從容受納髙湛北齊書曰丗祖武成皇帝諱湛神武皇帝第九子孝昭皇帝之母弟也儀表瓌傑神武尤所鍾愛神武方招懷荒逺乃爲帝娉蠕蠕而蠢切太子菴烏含切羅辰女隣和公主帝時年八􅀊冠服端}
