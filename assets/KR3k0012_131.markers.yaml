  - {type: variant, offset: 5053, length: 248, content: 轜車幾下釘者數焉發丁匠三十萬人營三臺於鄴構木高二十七丈兩棟相去二百餘步工匠危怯皆繫繩自防帝登脊疾走無怖畏時復雅舞折旋中節傍人見者莫不寒心帝沉湎日甚婁太后舉杖擊之曰如此父生如此兒帝曰天子母豈不如共壻眠時即當嫁老母與胡太后大怒自此不復開顏帝免冠辭謝乃設席於地脫背就罰苦請笞腳五十因此戒酒一旬還復如初又令元黃頭與諸國自金鳳臺各乘紙鴟以飛黃頭至紫陌乃墯於地凡所殺害或支解或火燒或投水蓋以萬數又誅元氏或父母為主或身常貴盛皆斬於東市凡七百餘人悉投屍漳水剖魚者多獲爪甲都下為之久不食魚七年秋自河西揔秦戍築長城東, SBCK: ''}
