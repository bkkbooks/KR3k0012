  - {type: variant, offset: 683, length: 2, content: 占聞, SBCK: 入殯者以置椁中制服三月由是著名流稱上國矣仁惻周公曰文王在鄗召太子發日吾語汝童牛不服童馬不馳是謂大仁樂嘉耀稽曰仁者有惻隱之心夲生於木仁生於木故惻隱出於自然也禮記表記曰中心􅉃怛愛人之仁也左傳文下曰邾文公卜遷于繹史曰利於民而不利於}
  - {type: variant, offset: 683, length: 2, content: 占聞, WYG: 入殯者以置槨中制服三月由是著名流稱上國矣仁惻周公曰文王在鄗召太子發曰吾與汝童牛不服童馬不馳是謂大仁樂喜耀稽曰仁者有惻隠之心本生於木仁生於木故惻隠出於自然也禮記表記曰中心􅉃怛愛人之仁也左傳文下曰邾文公卜遷于繹史曰利於民而不利於}
