  - {type: variant, offset: 2102, length: 162, content: 王敦作逆石頭城既陷王師敗績周顗往詣敦敦曰伯仁卿負我顗曰公戎車犯順下官親帥六軍不能其事使王旅摧敗以此負公敦憚其正辭不知所荅顗與戴淵俱披收路經太廟顗大言曰天地先帝之靈臣忠於社稷王敦無道陵虐天下神祗有靈當速殺敦無令縱毒以傾王室語未終人以戟傷其口不得復言血流至踵顏色不變士庶藂觀皆為流涕於石頭南門外石上害之蕭子顯齊書曰王敬則轉安城王, WYG: 桓}
