  - {type: variant, offset: 676, length: 4, content: 崔杼殺莊, SBCK: 夫仁天之尊爵人之安宅又曰爲冨不仁矣爲仁不富矣又曰爲天下得人謂之仁又曰三代之得天下也以仁其失天下也以不仁國之所以廢興存亡者亦然天子不仁不保四海諸侯不仁不報社稷卿大夫不仁不保宗廟士庶人不仁不保四體今惡死亡而樂不仁是猶恐醉而彊酒也又曰仁則榮不仁則辱今惡辱而居不仁是猶惡濕而居下又曰仁之勝不仁猶水之勝火荀卿子曰仁義禮善之於人譬之􅀂貨財粟米之於家也多有之者冨少有之者貧無有之者窮尸子曰仁則人親之義則人尊之智則人用之也又曰文王四乳是謂至仁六韜曰仁之所在者天下歸之吕氏春秋曰工尹他爲荆使於宋司城子罕觴之南家之牆犨於前不直猶犨岀西家之潦經其宫而不止工尹他問其故子罕曰南家二人也爲鞔鞔履一日靷也吾將徙之其父曰吾將鞔以食三丗矣今徙是宋國之求鞔者不可吾將不食也是弗徙也西家髙吾痺潦之經吾宫也利故弗禁也工尹他歸荆適攻宋工尹他諌於荆王曰宋不可攻其主賢其相仁故釋宋攻鄭新序曰魏文侯曰仁人者國之寳也國有仁人則羣臣不爭姚信士緯曰孟軻驅丗士於仁義之域行者歩中正之途抱朴子曰仁者爲政之脂粉刑者御丗之轡䇿符子曰春秋華林傳曰不知不言其所以仁延篤仁孝論曰夫仁之有孝猶四體之有心腹枝葉之有本根仁以枝葉扶䟽爲大孝猶心體充實爲先曹植仁孝論曰且禽獸悉知愛其母知其孝也唯白虎驎騏稱仁獸者以其明盛衰知治亂也孝者施近仁者及逺逸士傳曰髙鳯隣里有爭財􅋐者兵刃相加鳯脫衣巾爲叩頭曰仁義遜讓不可廢也㑹稽典録曰陳囂字子}
