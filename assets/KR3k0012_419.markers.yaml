  - {type: variant, offset: 2283, length: 205, content: 祖有威名歸誠奉事每下直輒往領軍府夜著青衣扶匍道路為太祖聽察崔鴻十六國春秋前涼錄曰麻秋以書誘致宛成都尉宋矩矩至謂秋曰辭父事君當立功義功義不立當守名節矩終不背主覆宗偷生於世乃先殺妻子自刎而死秋曰義士也命吏人葬之重華嘉其誠節賜振威將軍又曰前燉煌太守幸憑隴西人也唯有一子髦至狄道省墓遇辛宴反叛為宴所執憑勸張茂討宴茂曰髦在彼如何憑曰人臣奉主豈顧子乎茂曰汝純臣賜爵閞內侯又前趙錄曰王廣永嘉之亂藂族避世及為楊州刺史被蠻賊圍一, WYG: 平御覽卷四}
