  - {type: variant, offset: 607, length: 0, content: '', SBCK: 四仁者有聖仁者有智仁者有德仁者有謙史記曰帝堯其仁如天其知如神又曰孔子適周問禮於老子辭去老子送之曰吾聞冨貴者送人以財仁人者送人以言吾不能冨貴􅀼仁人之號送子以言又曰髙祖仁而愛人喜施意豁如也漢書曰何武爲人仁厚後漢書曰王莽末虞延從女弟年在孩乳其母不能活之棄於溝中延聞其號聲哀而收之養至成人范瞱後漢書曰劉寛字文饒弘農人遷南陽太守温仁多恕吏人愆過但用蒲鞭罰之示辱而巳又曰宣秉所得俸禄輙以收養親族其􅀌弱者分與田地自無擔石之儲前漢書音義曰齊人名小􅑥爲擔今江淮人謂一石爲一擔擔音丁濫切齊書曰虞愿爲晉安太守郡岀蚺虵膽可用爲藥有人餉愿愿放之二十餘里一夜虵還歸床下復送四十里經還復故處愿令人更送遟明乃復歸如此􅄪三時以爲仁義之心所致又曰江泌字士清性行仁義衣􅁦虱多以緜褁致之食菜不食心以其有生意也崔鴻後燕録曰趙秋字子武汲郡朝歌人也輕財好施隣人李玄度母死家貧無以葬秋謂其兄曰赴死生救不足仁之本也家有二牛以與之玄度得以葬他年秋夜行見一老母遺秋金一餅曰子能葬我是以相報子五十巳後當冨貴不可言勿忘玄度也老子曰}
  - {type: page-break, offset: 607, content: '', id: KR3k0012_SBCK_419-3b}
