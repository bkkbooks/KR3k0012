  - {type: variant, offset: 2020, length: 6, content: 王敦欲謗帝以, SBCK: 劉驎之􅀯陽人少有信義去家百餘里有一獨媪病將死歎息謂人曰誰當埋我唯有劉長史耳何由令知驎之先聞其有患故徃候之值其命終乃身爲治棺殯送之其仁愛惻隱􅀂此㑹稽典録曰盛􅁻字君逹山隂人拜廷尉􅁻性多仁恩務在哀矜每至冬月罪當斷夜省刑􅃺其妻執燭􅁻手持丹筆夫妻相向垂泣所當平決􅀂無繼嗣􅁻令其妻妾得入經營使有遺􅀋視事十二年天下稱其有恩列女傳曰雋}
  - {type: variant, offset: 2020, length: 6, content: 王敦欲謗帝以, WYG: 劉驎之南陽人少有信義去家百餘里有一孤姥病將死歎息謂人曰誰當埋我唯有劉長史耳何由令知驎之先聞其有患故往候之值其命終乃身為營棺殯送之其仁愛惻隠若此㑹稽典録曰盛吉字君達山隂人拜廷尉吉性多仁恩務在哀矜毎至冬月罪當斷夜省刑狀其妻執燭吉手持丹筆夫妻相向垂泣所當平活若無繼嗣吉令其妻妾得入經營使有遺類視事十二年天下稱其有恩列女傳曰雋}
