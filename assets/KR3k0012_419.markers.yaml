  - {type: variant, offset: 681, length: 1, content: 陳, SBCK: 山隂人也同縣車嫗年八十餘無子慕􅅝仁義欲求􅀉命􅅝以車嫗有財産未敢便許乃諮於長者長者僉曰其冝􅅝遂迎嫗朝夕定省如其所親出家財以供餚膳嫗以壽終囂殯斂畢皆勉其奴令守嫗墓財物付與嫗内外宗族衣國}
