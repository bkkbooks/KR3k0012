  - {type: variant, offset: 131, length: 1, content: 檀, SBCK: 曰仁者以財發身不仁者以身發財又儒行曰温良者仁之本敬愼者仁之地寛􅁉者仁之作遜接者仁之能禮節者仁之貌言談者仁之文歌樂者仁之和分散者仁之施儒皆兼此而有之猶且不敢言仁也又郷飲酒義曰天地温厚之氣始於東北盛於東南此天地之仁義也毛詩生民曰行葦忠厚也周家忠厚仁及草木尚書太甲曰民罔常懷懷于有仁民所歸無常以仁政爲常又泰誓曰雖有周親不如仁人論語里仁曰里仁爲美居仁者之里是爲美擇不處仁焉得智求善居而不處於仁者之里不得爲有智又曰君子無終食之間違仁造次必於是顚沛必於是又顔淵曰顔淵問仁子曰克巳復禮爲仁一日克巳復禮天下歸仁焉爲仁由巳而由人乎哉顔淵曰請問其目子曰非禮勿視非禮勿聽非禮勿言非禮勿動顔淵曰囬雖不敏請事斯語矣又顔淵曰仲弓問仁子曰出門如見大賔使民如承大􅀕巳所不欲勿施於人在􅀖無怨在家無怨仲}
