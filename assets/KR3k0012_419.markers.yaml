  - {type: punctuation, offset: 171, content: 「, id: KR3k0012_CHANT_419-bkkpn68}
  - {type: variant, offset: 171, length: 384, content: 衛州吁弒桓公石厚從州吁如陳石碏使告于陳曰此二人者實弒寡君敢即圖之陳人執之而請蒞于衛君子曰石碏純臣也惡州吁而厚與焉大義滅親其是之謂乎又僖公上曰晉獻公使荀息傅奚齊公疾召之曰以是藐諸孤言其幼賤與諸子縣藐辱在大夫其若之何對曰臣竭其股肱之力加之以忠貞公曰何謂忠貞對曰公家之利知無不為忠也送往事居耦俱無猜貞也又僖公中曰晉惠公卒懷公立命從亡人亡人重耳期朞而不至無赦狐突之子毛及偃從重耳在秦不召懷公執狐突曰子來則免對曰子之能仕父教之忠古之制也策名委質貳乃辟也貳二心辟罪也今臣之子名在重耳有年數矣若又召之教之貳也父教子貳何以事君又宣公上曰楚子滅若敖氏令尹子文其孫箴尹克黃箴尹官名使於齊還及宋聞亂其人曰不可以入矣其入克黃從臣箴尹曰棄君之命獨誰受之遂歸復命而自拘於司敗又襄公二年曰楚子囊將死遺言謂子庚必城郢楚徙都郢未有城郭君子謂子囊忠君薨不忘增其名謂前年謚君為恭也將死不忘衛社稷可不謂忠乎忠, SBCK: ''}
