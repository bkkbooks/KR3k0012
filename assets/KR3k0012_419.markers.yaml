  - {type: variant, offset: 2020, length: 6, content: 王敦欲謗帝以, krp: 劉驎之南陽人少有信義去家百餘里有一獨媪病將死歎息謂人曰誰當埋我唯有劉長史耳何由令知驎之先聞其有患故徃候之值其命終乃身爲治棺殯送之其仁愛惻隱若此㑹稽典録曰盛吉字君逹山隂人拜廷尉吉性多仁恩務在哀矜每至冬月罪當斷夜省刑狀其妻執燭吉手持丹筆夫妻相向垂泣所當平決若無繼嗣吉令其妻妾得入經營使有遺類視事十二年天下稱其有恩列女傳曰雋}
