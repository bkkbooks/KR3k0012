  - {type: variant, offset: 2082, length: 6, content: 至性可稱敦嘿, WYG: 四端猶有四體也莊子曰古公亶父居豳狄人攻之事之以皮帛而不受事之以珠玉而不受狄而所求者地古公亶父曰與人兄居而殺其弟與人父居而殺其子吾不忍也子皆免居矣為吾臣與為狄臣奚以異且吾聞之君子不以所用害所養因杖䇿而去民相連而從之遂成國於岐山下也尸子曰巫馬期為荆使於巴見擔酖問之是何以曰所以酖人也於是請買之金不足又益之車馬已得之盡注之於江韓子曰仁者謂其中心忻}
