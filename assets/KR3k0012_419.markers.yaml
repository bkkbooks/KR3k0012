  - {type: variant, offset: 587, length: 0, content: '', SBCK: 子執仁志先行後言千里之外皆兄弟也尚書考靈耀曰春行仁政順天之常尚書大傳曰子張曰仁者何樂於山也孔子曰夫山者􅠇然髙􅠇然髙則何樂焉夫山草木生焉鳥獸蕃焉財用殖焉生財用而無私爲四方皆伐焉毎無私予焉岀雲風以通乎天地之間隂陽和合雨露之澤萬物以成百姓以饗此仁者之所樂於山者也又曰周人以仁接民而天下莫不仁故曰文}
