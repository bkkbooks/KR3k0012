  - {type: variant, offset: 2491, length: 1485, content: 日外救不至糧食罄絕雞犬雀鼠靡有將士泣曰將軍忠於本朝故有今難豈有背將軍理哉眾相枕而死者五千人又南涼錄曰振武將軍尉賢政固守浩亹不下熾盤招之曰樂都已潰卿妻子皆在吾聞孤城獨守何所為也政曰受涼王厚恩為國家藩屏雖知樂都已陷妻子為擒先歸獲賞後順受誅然不知主存亡未敢歸命妻子小事豈動懷盤乃遣虎臺手書喻政政曰為國儲不能盡忠反面縛於人棄父負君虧萬世之業賢政義士豈如汝乎三國典略曰齊平東雍州刺史傅伏堅守不降帝遣韋孝寬將伏子仁寬招伏曰并州已平故遣公兒來報今授上大將軍武卿郡公以金馬腦二酒鍾為信公宜急下伏不受謂孝寬曰事君有死無貳此兒為臣不忠為子不孝願即斬以示天下帝又遣高阿郍肱等百餘人臨汾召伏伏出軍隔水相見問至尊何在阿郍肱曰已被捉獲別路入閞伏仰天大哭率眾入城於廳事前北面哀號良久乃降帝見之曰何不早下伏流涕而對曰臣三代被任草命不能自死羞見天地帝執其手曰為臣當若此朕乎齊國唯見公一人乃自食一羊肋以骨賜伏曰骨親肉踈所以相付授上儀同也唐書曰隋屈突通與竇琮戰於稠桑通結陣以自固竇琮縱通子壽令往諭之通大呼曰昔與汝為父子今與汝為仇讎命左右射之桑顯和呼其眾曰京師陷矣汝並閞西人欲何所去眾皆釋仗通知不免乃下馬東南向再拜號哭曰臣力屈兵敗不負陛下天地神祇實所鑒察遂擒通送于長安高祖謂曰何相見晚耶通泣對曰通不盡人臣之節力屈而至此高祖曰隋室忠臣也命釋之又曰馮立事隱太子太子誅左右悉散立歎曰豈有人生受其恩死逃其難立乃率兵犯玄武門殺將軍敬君弘謂其徒曰微以報太子矣遂解兵而遁俄來請罪太宗數之立對曰出身事主期之効命當戰之日無所顧憚因戲欷悲不自勝太宗宥之立謂所親曰逢莫大之恩終當以死奉荅俄而突厥至便橋立率數百人力戰殺獲甚眾太宗深嘉歎之又曰安金藏為太常工人時睿宗為皇嗣或有誣告皇嗣潛有異謀者則天令來逡臣桉之左右不勝楚毒皆欲自誣唯金藏大呼謂俊臣曰公既不信金藏言請剖心以明皇嗣不反則引佩刀自剖其胸五藏並出流血被地氣遂絕則天聞之令舁入宮中遣醫人卻內五藏以桑白皮縱合之傳藥經宿乃蘇則天臨視歎曰吾有子不能自明不如爾之忠也即令停推睿宗由是獲免新序曰陳恒弒簡公而盟盟者完其家召他入曰不盟是弒父母也盟之是無君臣之禮乃盟以免父母死而自殺以禮其君又曰智伯之時有士曰長兒子魚絕智伯而去之三年將東之魯而道聞智伯死曰吾聞忠臣無餘祿吾聞智伯之死動吾心餘祿加於我至今尚存將往吾佐之遂反而死之續說苑曰趙苞漢靈帝時為武威守夷戎畏其果毅母及妻子自郡來遇鮮卑萬騎入塞為其所掠苞出擊賊陳步騎二萬鮮卑恐懼出母示苞苞悲號謂母曰為子無狀欲以微祿奉養不圖作禍今為王臣不得顧私母曰人各有命何得毀忠節耶立忠榮親孝莫大焉行矣勉之苞瞋目援桴虜眾碎斬其師伏屍十里母妻子皆為賊所害苞收母殯歛奏請歸葬天子策弔封為列侯葬訖謂鄉人曰食祿避難不忠殺母全義不孝何面目立於天下遂自殺又曰宦者田鵬事齊至內侍中齊主走青州圖入陳出覘為周人所獲歐問齊主所在紿云已去周人折其支每折一支辭色逾厲四支俱絕而死許肅別傳曰肅為愍帝侍中左衛將軍麴武將與肅齊心拒守而外救已退城遂陷沒逼愍帝送于平陽肅後冒難侍左右劉載乃以帝為歸漢王頃之陰行鳩毒帝因食心悶欲見許侍中肅馳詣賊相見帝已不復能語肅曰不審陛下尚識臣不帝猶能執肅手流涕肅歔欷登床帝遂殂於扶抱之中晝夜號泣哀感異類載外欲明已不害乃偽責諸臣欲盡誅之群臣迸竄唯肅獨曰備位故臣願乞得殯殮然後就戮載特聽許事訖詣載曰國亂不能匡君亡弗能死舉自莫非愧恥將何顏以存所以忍辱正以山陵未畢故耳微情已敘甘就刑戮賊議之曰此晉之忠臣宜加甄賞載遂從議故得全免庾珉別傳曰珉字子居位列侍中劉曜作亂京都傾覆珉時直在省謂僚佐曰吾必死此屋內既天在子蒙塵珉與許遐等侍從曜設會使帝行酒珉至帝前乃慨然流涕曜曰此動人心即時遇害, SBCK: 九}
