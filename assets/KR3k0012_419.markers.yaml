  - {type: variant, offset: 849, length: 147, content: 制詔御史長沙王忠其定著甲令臣瓚曰漢以芮忠故特王之非故時令也又曰匈奴求和親群臣議上前博士狄山曰和親便上問張湯湯曰此愚儒無知狄山曰臣固愚忠若御史大夫湯乃詐忠又曰王莽既篡使者即拜龔勝為講學祭酒勝曰吾受漢家厚恩無以仰報今年老矣旦暮入地豈一身事二姓下見故主哉勝因勑以棺斂喪事語畢遂不復開口飲食積十四日而死, SBCK: ''}
