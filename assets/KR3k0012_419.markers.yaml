  - {type: variant, offset: 677, length: 2, content: 杼殺, WYG: 鴻後燕録曰趙秋字子武汲郡朝歌人也輕財好施鄰人李元度母死家貧無以葬秋謂其兄曰赴死生救不足仁之本也家有二牛以與之元度得以葬他年秋夜行見一老母遺秋金一餅曰子能葬我是以相報子五十以後當富貴不可言勿忘元度也老子曰大道廢有仁義文子曰積惠重厚使萬物忻忻樂其性者仁也}
  - {type: page-break, offset: 677, content: '', id: KR3k0012_WYG_419-6b, image: WYG0896/WYG0896-0664d.png}
  - {type: variant, offset: 680, length: 0, content: '', WYG: 子曰仁義先王之蘧廬蘧廬猶傳舎也可以一宿而不可以久處古人假道於仁託宿於義莊子曰義人利物之謂仁曾子曰伯夷叔齊仁者也鬻子曰除天下之害謂之仁孟子曰齊宣王問交鄰國有道乎對曰唯仁者能以大事小故湯事葛文王事昆夷又曰君行仁政斯民親其上而死其長矣又曰當今之時萬乗之國行仁政民之悅之猶解倒懸也又曰夫仁天之尊爵人之安宅又曰為富不仁矣為仁不富矣又曰為天下得人謂之仁又曰三代之得天下也以仁其失天下也以不仁國之所以廢興存亡者亦然天子不仁不保四海諸侯不仁不保社稷卿大夫不仁不保宗廟士庶人不仁不保四體今惡死亡而樂不仁是猶惡醉而强酒也又曰仁則榮不仁則辱今惡辱而居不仁是猶惡濕而居下又曰仁之勝不仁猶水之勝火荀卿子曰仁義禮善之於仁譬之若貨財粟米之於家也多有之者富少有之者貧無有之者窮尹子曰仁則人親之義則人尊之智則人用之也又曰文王四乳是謂至仁六韜曰仁之所在者天下歸之呂氏春秋曰士尹池為荆使於宋司城子罕觴之南家之牆犨於前不直猶曲出西家之潦經其宫而不止士尹池問其故子罕曰南家工人也為鞔百也鞔履一曰靷也吾將徙之其父曰吾為鞔以食三世矣今徙是宋國之求鞔者不知吾處也吾將不食也是弗徙也西家髙吾宫庳潦之經吾宫也利故弗禁也士尹池歸荆適攻宋士尹池諫於荆王曰宋不可攻其主賢其相仁故釋宋攻鄭新序魏文侯曰仁人者國之寳也國有仁人則羣臣不爭姚信士緯曰孟軻驅世士於仁義之域行者步中正之途抱朴子曰仁者為政之脂粉刑者御世之轡策符子曰春秋華林傳曰不知不言其所以仁延篤仁孝論曰夫人之有孝猶四體之有心腹枝葉之有本根仁以枝葉扶疏為大孝以心體充實為先也曹植仁孝論曰且禽獸悉知愛其母知其孝也唯白虎騏驎稱仁獸者以其明盛衰知治亂也孝者施近仁者及逺逸士傳曰高鳯隣里有爭財鬭者兵刃相加鳯脫衣巾為叩頭曰仁義遜讓不可廢也㑹稽典錄曰陳囂字子}
