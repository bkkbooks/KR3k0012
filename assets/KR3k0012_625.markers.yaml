  - {type: variant, offset: 712, length: 0, content: '', WYG: 齊君子也其才任覇王之佐屈莭而治單父将以自試意者宓子以此諌乎公悟太息曰此寡人之不肖也寡人亂宓子之政而責其善者數矣㣲二吏則寡人無以知過微夫子則寡人無由自悟遽發所爱之使吿宓子曰自今以徃單父非魯有也從子之制有便於人者子决之五年一言其要宓子敬奉詔遂得行其政于是單父治焉}
  - {type: page-break, offset: 712, content: '', id: KR3k0012_WYG_625-4a, image: WYG0898/WYG0898-0611c.png}
  - {type: variant, offset: 713, length: 0, content: '', WYG: 敦厚明親親尚篤敬施至仁加誠懇致忠信百姓化之又曰孔子兄之子蔑者與宓子賤皆仕孔子徃過蔑}
  - {type: variant, offset: 714, length: 1, content: 誅, WYG: 問之曰自子之仕何得何亡對曰未有所得而亡者三王事若聾聾宜為襲言前後柏因襲學焉得習言不得學習也是學不明也奉禄少饘粥不及親戚是􅇧肉益踈也公事多急不得弔死問疾是朋友道闕也其亡者三即如此也孔子不悦徃過子賤問如孔蔑對曰自來仕無所亡而所得者三始誦之今得而行}
  - {type: page-break, offset: 714, content: '', id: KR3k0012_WYG_625-4b, image: WYG0898/WYG0898-0611d.png}
