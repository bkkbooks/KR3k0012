  - {type: variant, offset: 691, length: 213, content: 之道孫卿子曰魯有子訟父者康子曰殺之孔子曰不教而誅之是虐殺不辜三軍之敗不可誅也獄犴不治不可刑也上陳教而先服之則百姓從風矣先教而後刑則民知罪矣夫一仞之墻民不能踰百仞之山童子升而遊焉陵遟久矣能謂民弗踰乎訟者聞之乃請無訟莊子曰至德之世山無蹊隧澤無舟梁烏鵲之巢可攀援而闚又曰聞在宥天下不聞治天下在之者恐天下之淫其性也宥之者恐天下之遷其德也天下不淫其性不遷其德豈有治天下者哉不淫不遷無為守分性既正矣德又定焉人皆治道何勞布政有治天下者哉昔堯, SBCK: ''}
