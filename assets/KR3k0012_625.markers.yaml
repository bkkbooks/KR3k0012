  - {type: variant, offset: 1282, length: 420, content: 國而晦晦而行行而止故一言正而天下定一言倚而天下靡商君書曰善治者使跖可信不能治者使伯夷可疑韓子曰或曰景公不知用勢師曠晏子不知除患夫獵者託車輿之安用六馬之足使王良左轡則身不勞而易及輕獸國者君之車勢者君之馬不乘君之車不因馬之利釋車而下走者也故曰景公不知用勢之主師曠晏子不知除患之臣也又曰桓公謂管仲曰官少而索者眾索求也寡人憂之管仲曰君無聽左右之請因能而授祿因功而與官人莫敢索君何憂焉又曰夫堯舜在上位雖有十桀紂不能亂者勢治也桀紂在上位雖有十堯而不能治者勢亂也又曰故善毛嬙西施之美無益吾面用脂澤粉黛則倍其初明法度必賞罰則國富而治法度賞罰者國之脂澤粉黛也孔叢子曰夫子適齊晏子就其館既燕而私焉曰齊其危夫譬若載無轄之車以臨千仞之谿其不顛覆亦難冀也子吾心也以齊為遊息之館當或可救子幸不吾隱也夫子曰死病不可為醫夫政令者人君之銜轡所以制下也今齊君失之已久也子雖欲挾其輈而扶其輪良弗及也抑猶可以沒齊君及子身過此而往齊其田氏矣又曰定公問曰周書所謂庸庸祇祇畏畏顯民何謂也, SBCK: 蒲三年}
