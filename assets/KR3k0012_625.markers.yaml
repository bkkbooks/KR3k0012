  - {type: variant, offset: 920, length: 1, content: 是, SBCK: 舉善授能官方定物方常物事亡其常官以定百事正名育􅀋正名正上下服位之名育􅀋長育善􅀋昭舊族昭明舊臣有功者之善愛親戚明賢良明顯尊貴寵國之責臣尊禮之賞功勞事耇老禮賔旅旅客友故舊故舊公子時胥藉狐箕欒郄栢先羊舌董韓寔掌近官舊十一性晉之舊旅近官朝廷諸􅁎之良掌其中官諸姫同姓中官内官異姓之能掌其逺官逺官縣鄙公食貢大夫食邑士食田受公田庶人食力各由其力工啇食官工百工啇官賈周禮府藏皆有賈人以知物賈食官官禀之皂􅈻食職士臣皂皂臣與與臣􅈻食職名以其職大小食禄也官宰食加官宰家臣加夫夫之加田也論語原憲爲之宰政平民阜財用}
  - {type: page-break, offset: 920, content: '', id: KR3k0012_SBCK_625-5b}
  - {type: variant, offset: 920, length: 1, content: 是, WYG: 舉善授能官方定物方常物事立其常官以定百事正名育類正明上下服位之名長育善類昭舊族昭明舊臣有功者之善爱親戚明賢良明顕尊貴寵國之貴臣尊禮之賞功勞事耉老禮賓旅友故舊胥籍狐箕欒郤柏先羊舌董韓實掌近官舊十二姓晉之舊族近官朝官諸姬之良掌其中官諸姬同姓中官内官異姓之能掌其逺官公食貢大夫食邑士食田受公田庶人食力各食其力工商食官工百工商官賈周禮府藏皆有賈人以知物賈食官官給廪餼皁𨽻食職士臣皁皁臣輿輿臣𨽻食職各以其職大小食禄也官宰食加官宰家臣加大夫之加田也論語原憲為之宰政平民阜財用}
