  - {type: variant, offset: 920, length: 1, content: 是, krp: 舉善授能官方定物方常物事亡其常官以定百事正名育類正名正上下服位之名育類長育善類昭舊族昭明舊臣有功者之善愛親戚明賢良明顯尊貴寵國之責臣尊禮之賞功勞事耇老禮賔旅旅客友故舊故舊公子時胥藉狐箕欒郄栢先羊舌董韓寔掌近官舊十一性晉之舊旅近官朝廷諸姬之良掌其中官諸姫同姓中官内官異姓之能掌其逺官逺官縣鄙公食貢大夫食邑士食田受公田庶人食力各由其力工啇食官工百工啇官賈周禮府藏皆有賈人以知物賈食官官禀之皂隷食職士臣皂皂臣與與臣隷食職名以其職大小食禄也官宰食加官宰家臣加夫夫之加田也論語原憲爲之宰政平民阜財用}
  - {type: variant, offset: 922, length: 1, content: 恬, SBCK: 匱阜安吕氏春秋曰呉起行魏武侯自送之絶河謂呉起曰先生將何以治之西河對曰以忠以信以勇以敢武侯曰四者足矣請以四者恃先生又曰宓子賤治單父彈鳴琴身不下堂而單父治巫馬期以星出以星入日夜不居以身親之而單父亦治巫馬期問其故於宓子宓子曰我之謂任力任力者固勞任人者固逸子則君子矣又曰使民無欲上雖賢不用失無欲者其視爲天子與􅈻同彭祖與殤子同天子至貴}
