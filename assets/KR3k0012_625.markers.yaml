  - {type: variant, offset: 916, length: 1, content: 樂, SBCK: 資無與無財輕􅀜易道通啇寛農輕関輕其稅易道除盗賊通啇利旅寛農寛其政不奪其時茂穡勸分省用足財茂勉稼穡也勸有分無也省減減國用足財備㓙年利器明德以厚民性利利器用明明德教厚民性厚}
  - {type: variant, offset: 916, length: 1, content: 樂, WYG: 方行於天下方横以誅無道以屏周室屏藩天下大國之君莫之能禦禦當又曰晉文公元年春屬百官賦職任功屬㑹賦授也授職事任有功棄責薄斂施舍分寡棄責不求其償也分寡分給所少也救乏振淹匡困資旡救乏濟匱乏振淹起淹滯匡困扶其危資旡給其用輕闗易道通商寛農輕闗輕其税易道除盜賊通商利行旅寛農寛其政不奪其時茂穡勸分省用足財茂勉稼穡也勸有分無也省減省身用足財備㓙年利器明徳以厚民性利其器用明其徳教厚民性厚}
