  - {type: variant, offset: 724, length: 1, content: 敗, WYG: 如一言其滛侈非禮制也姪娣之属者稱曰嬪妃官也陳妾數百陳列食必梁肉衣必文繡戎士凍餒戎車待遊車之裂戎士待臣妾之餘戎車兵車遊車逰戲之車裂殘也優笑在前賢材在後是以國家}
