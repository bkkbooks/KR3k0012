  - {type: punctuation, offset: 115, content: 「, id: KR3k0012_CHANT_625-bkkpn36}
  - {type: variant, offset: 115, length: 2, content: 凡牧, SBCK: 孔子兄之子蔑者與宓子賤皆仕孔子徃過蔑而問之曰自子之仕何得何亡對曰未有所得而亡者三王事􅀂聾聾冝爲襲言前後相因襲學焉得習言不得學習也是學不得明也奉禄少饘粥不及親戚是骨􅁏益踈也公事多急不得弔死問疾是朋友道闕也其亡者三即謂此也孔子不恱徃過子賤問如孔蔑對曰自來仕無所亡而所得者三始誦之今得而行之是學益明也奉禄所供􅀍及親戚是骨􅁏益親有公事而兼以弔死問疾是朋友信篤也孔子喟然謂子賤曰君子哉􅀂人􅀂人猶是人也魯無君子於焉取斯國語曰齊桓公親逆管仲于郊而與之坐問焉曰昔吾先君襄公築臺以爲髙位居髙臺以自尊田狩畢弋不聽國政卑聖侮士而唯女是崇九妃六嬪正適稱妃言九者尊之如一明其淫侈非禮制也姪娣之屬皆稱望嬪婦官也陳妾數百陳列食必梁肉衣必文繡戎士凍餒戎車待遊車之裂戎士待陳妾之餘戎車兵車遊車遊戲之車裂殘也優􅀏在前賢材在後優􅀏車倡非是以國家不日引引申不月長長益恐宗社不掃除社稷不血食敢問爲此􅀂何爲治管子對曰昔吾先王昭王穆王丗法文武逺績以成名周管之先績功也言昭王雖有所闕猶能世法文王武王之典以成其功名也合羣叟比校}
  - {type: page-break, offset: 115, content: '', id: KR3k0012_SBCK_625-3a}
  - {type: page-break, offset: 115, content: '', id: KR3k0012_SBCK_625-3b}
  - {type: variant, offset: 115, length: 2, content: 凡牧, WYG: 子貢問於孔子曰昔者齊君問政於夫子夫子曰政在節財魯君問政於夫子夫子曰政在諭臣葉公問政於夫子夫子曰政在恱近而來逺三者之問一也夫子應之不同然則政有異乎孔子曰各因其事也齊君為國奢于臺榭淫于苑囿五官伎樂不懈于時一旦而賜人以千乗之家者三故曰政在節財魯君有三人孟孫叔孫季孫内比周以愚其君外距諸侯之賔以蔽其明故曰政在諭臣夫荆之地廣而都狹民有離心莫安其居故曰政在恱近而來逺此三者皆所以為政又曰閔子騫為費宰問政於孔子孔子曰以徳以法夫徳法者御民之具猶御馬之銜勒也子騫曰敢問古之政孔子曰古之政者天子以内史為左右手内史掌王八柄及叙事之法受納訪以詔王治以徳為銜勒以百官為轡以刑罰為策以萬民為馬故御天下數百年而不失善御馬者正銜勒齊轡策御}
