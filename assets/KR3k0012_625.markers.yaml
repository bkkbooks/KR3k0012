  - {type: variant, offset: 2350, length: 1432, content: 知其不肖亦望其如此也子思曰希旨容媚則君親之中正弼非則君䟽之夫能使人富貴貧賤者君也在朝之士孰肯舍其所以見親而取其所以見䟽乎是故競求射君之心而莫有非君之者此臣所謂無非也公曰然乎寡人之過也今知改矣荅曰君弗能焉口順而心不懌者臨事必痝君雖有命臣未敢受也又曰信陵君問曰古之善為國至於無訟其道何由荅曰由乎政善也上下勤德而和德無不化俗無不和眾之所譽政之所是也眾之所毀政之所非也毀譽是非與政相應所以無訟也又曰子順相魏改嬖寵之官以事賢才奪其不任之祿以賜有功諸喪職者不悅造謗言文咨以告且曰夫不善前政而有成孰與變之而起謗哉子順曰民之不可與慮始久矣古之善為政者其初不能無謗子產相鄭三年而後謗止吾先君之相魯三月而後謗止今吾為政日新雖不及聖賢庸知謗止獨無時乎文咨曰子產之謗嘗亦聞之未識先君之謗何也子順曰先君初相魯魯人頌曰麛裘而芾投之無戾芾而麛裘投之無郵及三月政化既行民又作頌曰袞衣章甫實獲我所章甫袞衣惠我無私文咨喜曰乃今知先生不異乎聖賢矣又曰新桓固謂子順曰賢者所在必興化致治今子相魏未聞異政而即自退其身者志不得乎何去之速也荅曰以無異政所以自退也且死病無良醫今秦有吞食天下之心以義事之故不獲安救亡不暇何化之興昔伊摯在夏呂望在商而二國不治豈伊呂之不欲哉勢不可也又曰尹魯謂子魯子之讀先王之書將奚以為荅曰為治世世治則助之行道世亂則獨治其身治之至也又曰建初元年大旱天子憂之問群臣政教得失子豊乃上䟽曰臣聞為不善而災報得其應也為善而災至遭時運之會耳非政所治也昔成湯遭旱因自責省畋散積減御損膳而大有年意者陛下未為成湯之事焉天子納其言淮南子曰治國者若耨田去害苗而已今沐者墮髮而猶為之不已以其所去者少所利者多又曰聖主之治也猶造父之御也和輯乎轡衘之際而緩急乎唇吻之和正度乎胸臆之中而執節乎掌握之間內得於中心而外合於馬志是故能進能退履繩而還曲中規取道致遠而氣力有餘誠得其術也是權勢者人主之車輿也大臣者人主之四馬也體離車輿之安而手失四馬之心能無危者古今未之聞也是故輿馬不調王梁不能以取道理君臣不和唐虞不能為治執術以御之則管晏之知盡矣明分以視之則跖蹻之姦止矣又曰惠子為惠王為國法惠王梁惠王也惠子惠王師也已成而示之諸先生示為國法先生皆善之奏之惠王惠王甚說之以示翟璜曰善惠王曰善可行乎翟璜曰不可惠王曰善而不可行何也翟璜對曰今夫舉大木者前呼邪許後亦應之此舉重勸力之歌也豈無鄭衛激楚之音哉然而不用者不若取是其宜也治國者禮不文辯故老子曰法令滋章盜賊多有此之謂也又曰田駢以道術說齊王齊王應曰寡人之治齊國也道術難以除患願聞國之政田駢對曰臣之言無政而可以為政譬之若林木無林而可以為林願王察其所謂而自取齊國之政焉已雖無除其患天地之間六合之內可陶冶而變化也齊國之政何足問哉又曰昔者五帝三王之蒞政施教必用參五何謂參五仰取象於天俯取度於地中取法於人乃立明堂之朝行明堂之令明堂布政之宮有十二月之政令以調陰陽之氣而和四時之節以辟疾病之蕃俯視地理以制度量察陵水澤肥墩高下之宜立事生財已除飢寒之患中之考乎德以制禮樂行仁義之道以治人倫而除暴亂之禍乃澄列金木水火土之性澄清故立父子親而成家別清濁五音六律相生之數以立君臣之義而成國察四時季孟之序立長幼之禮而成官此之謂參制君臣之義父子之親夫妻之辯長幼之序朋友之際此之謂五乃裂地而州之分職而治之築城而君之割宅而異之分財而衣食之立太學而教誨之夙興夜寐而勞力之此治之紀綱也然得其人則舉失其人則廢又曰天地之生物也有本末其養物也有先後人之於治國也豈得無終始故仁義者治之本也今不知事脩其本而務治其末是釋其根而灌其枝也且法之生, SBCK: 擾}
