  - {type: variant, offset: 161, length: 70, content: 歸餌渴馬之走飲又曰堯舜之民非生而治桀紂之民非生而亂故治亂在上也又曰聖人設度量置儀法如天地之堅如列星之固如日月之明如四時之信然故令往而民從之老, SBCK: 􅀂何管}
