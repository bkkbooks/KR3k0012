  - {type: variant, offset: 161, length: 470, content: 歸餌渴馬之走飲又曰堯舜之民非生而治桀紂之民非生而亂故治亂在上也又曰聖人設度量置儀法如天地之堅如列星之固如日月之明如四時之信然故令往而民從之老子曰治大國若烹小鮮烹小鮮不敢橈恐其縻也治國煩則亂治身煩則精神散以道蒞天下者其鬼不神以道德治天下則鬼不敢見其精神以犯人也又曰聖人虛其心實其腹弱其志強其骨常使民無知無欲使夫知者不敢為也為無為則無不治矣又曰聖人無恒心以百姓心為心善者吾善之不善者吾亦善之信者吾信之不信者吾亦信之欲善信者吾因而善信之不善信者吾亦以善信教之聖人在天下惵惵為天下惲其心聖人治天下常惵惵心同惲用心皆為天下百姓皆注其耳目聖人皆孩之百姓頌注耳目以觀聽聖人聖人視百姓如嬰兒又曰以政治國以奇用兵以無事取天下以政教治國以奇計用兵皆不合道惟無事可以取天下吾何以知天下其然哉以此以此下文知之天下多忌諱而民彌貧國多忌諱人失作業故貧人多伎巧奇物滋起法令滋章盜賊多有法令益明竊盜為姦盡成盜賊故聖人云我無為而民自化我無事而民自富我好靜而民自正我無欲而民自朴老子曰其政悶悶其民淳淳其政察察其民𡙇𡙇文子曰水濁則魚險政苛則民亂墨子曰葉公子高問政於仲尼曰善為政者, krp: ''}
