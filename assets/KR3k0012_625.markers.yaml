  - {type: variant, offset: 717, length: 2, content: 虐殺, WYG: 學益明也奉禄所供被及親戚是骨肉益親也有公事而兼以弔死問疾是朋友益篤也孔子喟然謂子賤曰君子哉若人若人謂是人也魯無君子斯焉取斯國語曰齊桓公親迎管仲于郊而與之坐問焉曰昔吾先君㐮公築臺以為髙位居髙䑓以自尊田狩畢弋}
  - {type: page-break, offset: 717, content: '', id: KR3k0012_WYG_625-5a, image: WYG0898/WYG0898-0612a.png}
  - {type: variant, offset: 720, length: 3, content: 辜三軍, WYG: 聼國政卑聖侮士而惟女是崇九妃六嬪正嫡稱妃言九者尊}
