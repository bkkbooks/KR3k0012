  - {type: variant, offset: 67, length: 0, content: '', SBCK: 急者莫大乎使民冨且夀也公曰爲之柰何孔子曰省力役薄賦歛則民冨矣敦禮教逺罪戾則民夀矣又曰子貢問於孔子曰昔者齊君問政於夫子夫子曰政在節財魯君問政於夫子夫子曰政在諭臣葉公問政於夫子夫子曰政在恱近而來逺三者之問一也夫子應之不同然則政有異端乎孔子曰各因其事也齊君爲國奢于臺榭􅁋于苑囿􅇊樂不解於時一旦而賜人以千乗之家者三故曰政在節財魯君有三人孟叔叔孫季叔内比周以愚其君外讎諸侠之賔以蔽其明故曰政在諭臣夫荊之地廣而教狹民有離心莫安其居故曰政在恱近而來逺此三者皆}
  - {type: page-break, offset: 67, content: '', id: KR3k0012_SBCK_625-1b}
  - {type: variant, offset: 67, length: 4, content: 所行在順, WYG: 急者莫大乎使}
  - {type: variant, offset: 67, length: 0, content: '', krp: 急者莫大乎使民冨且夀也公曰爲之柰何孔子曰省力役薄賦歛則民冨矣敦禮教逺罪戾則民夀矣又曰子貢問於孔子曰昔者齊君問政於夫子夫子曰政在節財魯君問政於夫子夫子曰政在諭臣葉公問政於夫子夫子曰政在恱近而來逺三者之問一也夫子應之不同然則政有異端乎孔子曰各因其事也齊君爲國奢于臺榭淫于苑囿伎樂不解於時一旦而賜人以千乗之家者三故曰政在節財魯君有三人孟叔叔孫季叔内比周以愚其君外讎諸侠之賔以蔽其明故曰政在諭臣夫荊之地廣而教狹民有離心莫安其居故曰政在恱近而來逺此三者皆}
  - {type: variant, offset: 68, length: 0, content: '', SBCK: 以爲政又曰閔子騫爲費宰問政於孔子孔子曰以徳以法夫徳法者御民之具猶御馬之銜勒也子騫曰敢問古之政孔子曰古之政者天子以内史爲左右手内史掌手八柄及叙事之受納以語王聽治以德爲銜勒以百官爲轡以刑罪爲䇿以萬民爲馬故御天下數百年而不失善御馬者正銜勒齊轡䇿善御民者一其德法正其百官刑不用而天下治又曰子游問於孔子曰子亟言子産之惠可得聞乎孔子曰惠在愛民而已子游曰愛民之謂德教何翅於惠哉孔子曰夫子産者猶衆人之母也食之弗能教也子游曰其事可言乎孔子曰子産以其乘車濟冬渉者盡愛而無教也又曰孔子謂宓子賤曰子治單父衆恱子何施而得之對曰不齊之治也父恤其子其子恤諸􅀌而哀䘮紀孔子曰善小節也小民附矣猶未足也曰不齊所父事者三人所兄事者五人所友事者十一人孔子曰父事三人可以教孝矣兄事五人可以教悌矣友事十一人可以舉善矣中節也中節人附矣猶未足也曰此地民有賢於不齊者五人不齊事之而禀度焉皆教不齊所以治之之道孔子歎曰其大者乃於此乎有矣又曰孔子􅀄仕爲中都宰中都魯邑名也爲飬生送死之節長㓜異食如五十異粮強弱異任謂力作之事各從所任弱困也男女別􅂗路不拾遺器不雕僞市不二價如各其貨不相欺狂爲四寸棺五寸槨因丘陵爲墳不封不樹}
  - {type: page-break, offset: 68, content: '', id: KR3k0012_SBCK_625-2a}
