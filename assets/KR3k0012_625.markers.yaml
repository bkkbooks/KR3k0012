  - {type: variant, offset: 2015, length: 216, content: 而動於彼御之良也無轡而用策則馬失道矣文子曰以御言之左手執轡右手運用不亦速乎若任轡無策馬何懼哉子曰吾聞古之善御者執轡如組兩驂如舞非策之助也是以先王盛於禮而薄於刑故民從命也廢禮而尚刑民彌暴矣又曰子思問於夫子曰亟問夫子之詔正俗化民之政莫善於禮樂也管子任法以治齊而天下稱仁焉是法與禮樂異用而同功也何必但禮樂哉子曰堯舜之化百世不輟仁愛之風遠矣管仲之智足以定法材非管氏而專任法終必亂成矣又曰孟軻問子思曰堯舜文武之道可力而致乎子思曰彼人也我人也稱, SBCK: ''}
