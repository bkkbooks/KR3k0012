  - {type: variant, offset: 909, length: 0, content: '', SBCK: 叅其國而伍其鄙叅三國也也郊以内也伍伍也鄙郊以外謂三分國都以爲三軍五分其鄙以爲五屬聖王謂􅀂湯武定民之居成民之事}
  - {type: variant, offset: 909, length: 0, content: '', WYG: 参其國而伍其鄙参三也國郊以内也伍五也鄙郊以外謂三分其國以為三軍五分其鄙以為五属聖主謂若湯武定民之居成民之事}
  - {type: variant, offset: 909, length: 0, content: '', krp: 叅其國而伍其鄙叅三國也也郊以内也伍伍也鄙郊以外謂三分國都以爲三軍五分其鄙以爲五屬聖王謂若湯武定民之居成民之事}
  - {type: variant, offset: 910, length: 0, content: '', SBCK: 四民各居其職􅀂公就官府農就田野所以成其事陵爲之終以爲葬地而愼用其六柄焉柄夲六柄生殺貧冨貴賤又曰齊桓公問管仲曰國安矣吾欲事於諸侯其可乎管子對曰未可君􅀂正卒伍脩甲兵周禮五人爲五百人爲卒今管子亦以五人爲鼓有髙子之鼔春以捜振旅春田日搜旅整衆也周禮仲春教振旅遂以搜田秋以獮治兵秋田目狝周禮仲秋教治兵遂以狝田也是故卒伍整於里軍旅整於郊内教旣成令勿使遷徙遷徙猶改更伍之人􅀕祀同福死䘮同恤恤憂禍災共之人與人相疇疇疋丗同居少同遊故夜戰聲相聞足以不乖晝戰目相見足以相識其歡欣足以相死致死以相救居同樂行同與和同死同哀是故守則同固戰則同強君有此士也三萬人方行於}
  - {type: page-break, offset: 910, content: '', id: KR3k0012_SBCK_625-4a}
  - {type: page-break, offset: 910, content: '', id: KR3k0012_SBCK_625-5a}
  - {type: variant, offset: 910, length: 0, content: '', WYG: 四民各居其職若工就官府農就田野所以成其事陵為之終以為𦵏地而慎用其六柄焉又曰齊桓公問管仲曰國安矣吾欲事于諸侯其可乎管子對曰未可君若正卒伍修甲兵周禮五人為伍百人為卒今管子亦以五人為伍而以三百人為卒則大國亦将正卒伍修甲兵則難以速得志矣君有攻伐之噐小國諸侯有守禦之偹則難以速得志矣君若欲速得志於}
  - {type: page-break, offset: 910, content: '', id: KR3k0012_WYG_625-6a, image: WYG0898/WYG0898-0612c.png}
  - {type: variant, offset: 910, length: 0, content: '', krp: 四民各居其職若公就官府農就田野所以成其事陵爲之終以爲葬地而愼用其六柄焉柄夲六柄生殺貧冨貴賤又曰齊桓公問管仲曰國安矣吾欲事於諸侯其可乎管子對曰未可君若正卒伍脩甲兵周禮五人爲五百人爲卒今管子亦以五人爲鼓有髙子之鼔春以捜振旅春田日搜旅整衆也周禮仲春教振旅遂以搜田秋以獮治兵秋田目狝周禮仲秋教治兵遂以狝田也是故卒伍整於里軍旅整於郊内教旣成令勿使遷徙遷徙猶改更伍之人祭祀同福死䘮同恤恤憂禍災共之人與人相疇疇疋丗同居少同遊故夜戰聲相聞足以不乖晝戰目相見足以相識其歡欣足以相死致死以相救居同樂行同與和同死同哀是故守則同固戰則同強君有此士也三萬人方行於}
  - {type: variant, offset: 912, length: 3, content: 欣欣焉, SBCK: 方横以誅無道以屏周室屏蕃天下大國之君莫之能禦禦當又曰晉文公元年春屬百官賦職任功屬㑹賦授也授職事任有功弃責薄歛施舎分寡注當云弃責除􅀫責也施施徳也舎舎禁也分寡分少財也救乏振滯匡困資無救折救乏絶振極淹滯之士匡正困窮之}
  - {type: variant, offset: 912, length: 0, content: '', WYG: 諸侯則事可以隐令可以寄政事戎事隐匿寄托也匿軍令託于國政若有征伐隣國不知桓公曰為之若何管子對曰作内政而寄軍令焉内政國政治國政以寄軍令桓公曰善管子於是制國五家為軌軌為之長軌中一人為之長十軌為里里有司為立有司四里為連連為之長十連為鄉鄉有良人焉良人鄉人又為大夫也以為軍令為軍常令五家為軌故五人為伍軌長帥之居則為軌出則為伍所謂寄政十軌為里故五十人為小戎里有司帥之小戎兵車此有司之所乗故曰小戎詩云小戎俴收古者戎車一乗歩卒七十二人四里為連故二百人為卒連長帥之十里為鄉故二千人為旅鄉良人帥之五鄉一帥故萬人為一軍五鄉之師帥之五鄉毎一軍有五鄉也鄉師􅀸也萬人為一軍齊制也周則萬二千五百人為軍師長也三軍故有中軍之鼓有國子之鼓有髙子之鼓春以蒐振旅春田曰蒐旅整衆也周禮仲春教振旅遂以蒐田秋以獮治兵秋田曰獮周禮仲秋教治兵遂以獮田也是故卒伍整於里軍旅整於郊内教既成令勿使遷徙遷徙猶更改伍之人祭祀同福死䘮同恤恤憂禍灾共之人與人相疇疇匹世同居少同遊故夜戰聲相聞足以不乖晝戰目相見足以相識其歡}
