  - {type: variant, offset: 75, length: 4, content: 所廢在逆, WYG: 奈何孔子曰省力役薄賦斂則}
  - {type: variant, offset: 75, length: 0, content: '', krp: 近吏二人與之俱至官令二吏書方書輒掣其肘書不善則從而怒之二吏患焉辭請歸魯子賤曰子之書不善子勉歸之矣二吏歸報於君曰宓子賤使臣書而掣臣肘書惡而又怒臣邑吏皆笑之此臣}
  - {type: variant, offset: 76, length: 12, content: 廢在逆民心民惡憂勞我佚樂, SBCK: 以去}
