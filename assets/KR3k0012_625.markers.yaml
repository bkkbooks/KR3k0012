  - {type: variant, offset: 729, length: 3, content: 獄犴不, WYG: 言昭王雖有所闕猶能世法文武之典以成其功名也合羣叟比校民之有道者合㑹叟老比方校考也謂考其徳行道藝而興賢設象以為民紀式權以相應式用也權平也}
