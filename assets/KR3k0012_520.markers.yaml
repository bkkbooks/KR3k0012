  - {type: variant, offset: 3462, length: 1, content: 為, SBCK: 君前在東坐欲擅斬徐州衆人謂君難爲作下今羞爲吕屈是復難爲作上範怒觸其首乃以刀鐶撞其腹妻其懷孕遂傷胎死又曰常林字伯槐河内人也少好學爲諸生帶經鋤其妻常自餉饋雖在田野相敬如賔􅀳書曰元康中梁國}
