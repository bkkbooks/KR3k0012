  - {type: variant, offset: 2814, length: 458, content: 遂告祭仲曰雍氏舍其室而將享子于郊吾惑之以告祭仲殺雍紏尸諸周氏之汪公載以出曰謀及婦人宜其死也又文下曰趙穿晉君之壻也論語曰子謂公治長可妻也雖在縲紲之中非其罪也以其子妻之南容三復白圭孔子以其兄之子妻之史記曰陳餘者大梁人好儒術數遊趙富人公乘氏以其女妻之知餘非庸人漢書曰京房字君明東郡人習易淮陽憲王舅張博從京房受學以女妻房房與相親後漢書曰馬融扶風人為人美辭貌有俊才初京兆摯恂以儒術教授隱于南山不應徵聘從其游學通經籍恂遂奇融才以女妻之晉書曰韓謐字長深母賈氏賈充少女也父壽自德真南陽人美貌充辟為司空掾充讌賓僚女從青璅中窺見壽悅焉感想發於寤寐有婢往壽家說其光彩豔逸壽聞動心令通慇懃壽勁捷過人至夕踰垣而入家人莫知唯充覺女悅暢異於常日時西域有貢香每著人衣一月不歇帝甚貴之唯以賜充女密盜以遺壽僚佐與充宴聞香芬馥自此充意女與壽通乃夜半佯有盜驚起行之唯東北角有狐貍行處充考問女左右知之充遂因妻焉又曰郤鑒使門生求女壻於王導導令自東廂徧觀諸子門生歸謂鑒曰王氏諸少年並佳然聞信至咸自矜待唯一人在東床坦腹食獨若不聞鑒曰此正佳壻也訪之乃義之也宋書曰劉秀, WYG: 太平御覽卷五百二}
