  - {type: variant, offset: 2550, length: 2, content: 楊姬, WYG: 馮良有志行與妻子相遇如君臣又曰曹操攻吕布布欲降而陳宫等自以負罪於操深沮其計謂布曰曹公逺来勢不能乆将軍若以歩騎出屯於外宫将餘衆閉守於内若向将軍宫引兵而攻其背若但攻城則将軍救於外可破也布然之布妻曰昔曹氏待公臺如赤子猶舎而歸我今将軍厚公臺不過於曹而欲委全城捐妻子孤軍逺出乎若一旦有變妾豈為将軍妻哉布乃止又曰酈炎風病恍惚性至孝遭母憂疾甚發動妻始産而驚死妻家訟之收繋獄炎病不能治對遂死獄中尚書盧植為之誄讃以昭其懿又曰公孫述連徴任永馮信並託青盲以避世難永妻媱於前匿情無言見子入井忍而不救信侍婢亦對信姦通及聞述誅皆盥洗更視曰世適平目即清媱者皆自殺又曰周澤為太守嘗卧疾齋居其妻哀澤老病闚問所苦澤大怒以妻干犯齋禁自收送詔獄謝罪世疑其偽激時人為之語曰生世不諧作太常妻一嵗三百六十日三百五十九日齋一日不齋醉如泥又曰戴封字平仲年十五詣太學師事東海申君申君卒送喪到東海邊嘗經其家父母以封當還預為娶妻封蹔過拜親不宿而去又曰河南尹王調洛陽令李阜與竇憲厚善縱放自由尚書僕射樂恢劾奏調阜并及司𨽻校尉諸所刺舉無所廻避貴戚惡之妻每諫恢曰昔人有容身避害何必以言取怨恢嘆曰吾忍素餐立人之朝乎又曰更始尚書謝躬初其妻知世祖不平常戒躬曰君與劉公積不相能而信其虛談不為之備終受制躬不納竟為世祖所擒又曰河南樂羊子之妻者不知何氏之女也羊子嘗行路得遺金一餅還以與妻妻曰妾聞志士不飲盗泉之水亷者不受嗟来之食况拾遺求利以汚其行乎羊子大慙乃捐金於野而逺尋師學一年来歸妻跪問其故羊子曰乆行懐思無他異也妻乃引刀趨機而言曰此織}
