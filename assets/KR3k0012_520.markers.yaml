  - {type: variant, offset: 1734, length: 132, content: 命由此李氏遂得為方雅之族又曰胡奮字玄威安定人為護軍太始末武帝怠於政事而躭於顏色大採公卿女以為六宮奮女選為貴人唯有一男為南陽王友早亡及聞女為貴人哭曰老奴不死唯有二子男入九地之下女升九天之上嘗謂后父楊駿曰卿恃女更豪耶見前代與帝家婚未有不滅門者見君所措益速禍耳駿曰卿女不, WYG: 婦則罪}
