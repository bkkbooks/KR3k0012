  - {type: variant, offset: 3025, length: 1, content: 晉, SBCK: 裝送甚盛宣不恱謂妻曰少君冨驕而吾貧不敢當妻曰大人以生守約故使妾侍巾櫛旣承君子惟命是從乃悉歸御服更衣短布裳與宣共挽鹿車歸郷里拜姑提瓮出汲後漢}
  - {type: page-break, offset: 3025, content: '', id: KR3k0012_SBCK_520-6a}
  - {type: variant, offset: 3025, length: 0, content: '', krp: 裝送甚盛宣不恱謂妻曰少君冨驕而吾貧不敢當妻曰大人以生守約故使妾侍巾櫛旣承君子惟命是從乃悉歸御服更衣短布裳與宣共挽鹿車歸郷里拜姑提瓮出汲後漢書曰班昭作女誡馬融善之令妻女習焉又曰沛周郁妻者字阿閑於婦道而郁驕淫輕躁多行無禮郁父偉謂阿曰新婦賢者女當以道正夫郁之不改新婦過也阿拜而受命退謂左右曰我無樊衛二姬之行故君以責我我言而不用君必謂我不奉教令則罪在我矣若言而見用是爲子違父而從婦則罪在彼矣乃自殺又曰馮良有志行與妻子相遇如君臣又曰曹操攻吕布布欲降而陳宫等自以負罪於操深沮其計謂布曰曹公逺來勢不能乆將軍若以歩騎出屯於外宫將餘衆閉守於内若向將軍宫引兵而攻其背若但攻城則將軍救於外可破也布然之布妻曰昔曹氏待公䑓如赤子猶舎而歸我今將軍厚公䑓不過於曹而欲委全城捐妻子孤軍逺出乎若一旦有變妾豈得爲將軍妻哉布乃止又曰酈炎風病慌忽性至孝遭母憂疾甚發動妻始産而驚死妻家訟之收繫獄炎病不能治對遂死獄中尚書盧植爲之誄讃以昭其懿又曰公孫述連徴任永馮信並託清盲以避丗難永妻媱於前匿情無言見子入井忍而不救信侍婢亦對信姦通及聞𫐠誅皆盥洗更視曰丗適平自即清媱者皆自殺又曰周澤爲太守甞卧疾齋宫其妻哀澤老病闚問所苦澤大怒以妻干犯齋禁遂收送詔獄謝罪丗疑其詭激時人爲之語曰生丗不諧作太常妻一歳三百六十日三百五十九日齋一日不齋醉如泥又曰載封字平仲年十五詣太常師事東海申君申君卒送䘮到東海邊甞經其家父母以封當還豫爲娶妻封蹔過拜親不宿而去又曰河南尹王調洛陽令李阜與竇憲厚善縱舎自由尚書僕射樂恢劾奏調阜并及司隷校尉諸所刺舉無所廻避貴戚悪之妻毎諌恢曰昔人有容身避害何必以言取怨恢歎曰吾忍素餐立人之朝乎又曰更始尚書謝躬𥘉其妻知丗祖不平常戒躬曰君與劉公積不相能而信其虚談不爲之俻終受制矣躬不納竟爲丗祖所擒又曰河南樂羊子之妻者不知何氏之女也羊子甞行路得遺金一鉼還以與妻妻曰妾聞志士不飲盗泉之水廉者不受嗟來之食况拾遺求利以汗其行乎羊子大慙乃捐金於野而逺㝷師學一年來歸妻跪問其故羊子曰乆行懷思無佗異也妻乃引刀趍機而言此織生自蠶蠒成於機杼一絲而累以至於寸累寸不已遂成丈匹今若斷斯織也則損失成功稽廢時月夫子積學當日知所忘以就懿德若中道而歸何異斷斯織乎羊子感其言復還終業遂七年不返又曰魏朗字仲英入爲尚書舉動皆有禮序室家相待如賔與子孫如嚴君焉又曰曹丗叔妻班彪之姑名昭字惠召入宮號曰大家毎有貢獻遣大家作賦頌注列女傳著女誡及詩並行於時魏志曰𥘉司馬宣王勒兵從闕下趣武庫當曹爽門人逼車住爽妻劉氏怖出至廳事謂帳下守督曰公在外今兵起如何督曰夫人勿憂乃上門樓引弩注箭欲發將孫謙在後牽止之曰天下事未可知如此者一二宣王遂過又曰郭淮字伯濟太原河曲人拜車騎將軍封曲陽侯淮妻王陵之妹當從坐侍御史徃收羗胡渠師數千人叩頭請淮表留妻淮不從妻之道莫不流涕人人扼腕欲刼留之淮五子叩頭流血請淮淮不忍視乃遣妻還淮以書曰司馬宣王曰五子哀母不惜其身若無其母是無五子亦無淮也書至宣王亦宥之魏氏春秋曰許允爲吏部郎選郡守明帝疑其所用非次旨召入將加罪允妻阮氏跣出謂曰明主可以理奪難以情求允之入帝怒詰之對曰某郡太守雖滿文字先至年限在後日限在前帝取事視乃釋遣出望其衣敗曰清吏也賜之衣允之出爲鎮北也喜謂其妻曰吾知免矣妻曰禍見於此何免之有魚豢魏略曰桓範字彦則沛郡人也使持節督青徐諸軍鎮下邳與徐州刺史鄒歧爭屋引節欲斬歧爲𡵨所奏不直坐免當轉爲兾州刺史統属鎮北將軍吕昭爲其妻仲長曰我寜作諸卿向公長跪耳不能爲吕子展屈也其妻曰君前在東坐欲擅斬徐州衆人謂君難爲作下今羞爲吕屈是復難爲作上範怒觸其首乃以刀鐶撞其腹妻其懷孕遂傷胎死又曰常林字伯槐河内人也少好學爲諸生帶經鋤其妻常自餉饋雖在田野相敬如賔}
