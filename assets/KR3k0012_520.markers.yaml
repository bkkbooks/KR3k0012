  - {type: variant, offset: 206, length: 75, content: 本水一盆致於屏前自抱孫兒伏于戶下見逸民部又曰虞詡字升卿陳國人孝養祖母縣舉為順孫又曰馮氏兄弟形皆偉壯唯馮勤祖父偃長不滿七尺常恥短陋恐子孫似之乃為子伉娶長, SBCK: 夫}
  - {type: variant, offset: 206, length: 441, content: 本水一盆致於屏前自抱孫兒伏于戶下見逸民部又曰虞詡字升卿陳國人孝養祖母縣舉為順孫又曰馮氏兄弟形皆偉壯唯馮勤祖父偃長不滿七尺常恥短陋恐子孫似之乃為子伉娶長妻生勤勤長八尺三寸魏志曰王粲字仲宣山陽人蔡邕見而奇之時邕顯貴車馬填門粲在門邕倒屣迎之粲年幼皃弱短小座皆驚邕曰此王公之孫有異才吾不如也吾家所有書籍當悉與之晉書曰張憑字長宗祖鎮蒼梧太守憑年數歲鎮謂其父曰我不如汝汝有佳兒憑曰阿翁詎宜以子戲父乎又曰李密字令伯父早亡母改醮祖母劉氏躬撫養密奉事以孝謹聞有暇即講學志疲師事譙周周門人方之游夏太始初徵為洗馬密以祖母年老上表自陳曰母孫二人更相為命已具祖門中又曰李胤字伯祖敏為公孫度所迫浮海莫知所終子妻妻生胤遂絕房內以憂卒胤以祖不知所亡設木主以事之由是顯名宋齊語錄曰虞願字士恭會稽人祖為給事中中庭有橘樹冬熟子孫爭取願獨不取祖及家人並異之又曰張元字孝始祖喪明三年元每憂涕讀佛書以求福祐後見藥師經云盲者得視遂請七僧燃燈七日七夜轉藥師經行道每自責曰為孫不孝使祖喪明今以燈施普照法界願祖止見明元求代暗其夜夢一老, WYG: ''}
  - {type: variant, offset: 206, length: 75, content: 本水一盆致於屏前自抱孫兒伏于戶下見逸民部又曰虞詡字升卿陳國人孝養祖母縣舉為順孫又曰馮氏兄弟形皆偉壯唯馮勤祖父偃長不滿七尺常恥短陋恐子孫似之乃為子伉娶長, krp: 夫}
