  - {type: variant, offset: 2554, length: 7, content: 寒素父坐獄楊渙, WYG: 蠶繭成於機杼一絲而累以至於寸累寸不已遂成丈匹今若㫁斯織也則損失成功稽廢時月夫子積學當日知所亡以就懿徳若中道而歸何異㫁斯織乎羊子感其言復還終業遂七年不反又曰魏朗字仲明入}
