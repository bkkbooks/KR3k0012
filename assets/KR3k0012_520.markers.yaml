  - {type: variant, offset: 1964, length: 809, content: 愍懷太子妃太尉王衍之女字惠風太子廢衍請絕婚而歸惠風號泣行路流涕後劉曜陷洛陽以惠風賜其下將妻之惠風拔劍拒曰吾太尉之女太子之妃誓不為逆胡所辱遂害之又曰韋逞母宗氏家世儒學母早喪父躬養之及長授以周官音義謂曰世傳儒業無男可傳汝宜授之勿令絕世又曰吳隱之字處默濮陽人謝石請為將軍主簿隱之將嫁女石知其儉素令移廚帳就其家經營使者至方見賣犬此外蕭然無辦又曰靳康女不知何許人美姿容有志操劉曜誅靳氏訖將納其女為妾女曰陛下既誅其父母焉用妾為妾聞逆人之誅也尚污宮伐樹況其子女乎號泣請死曜慚乃固免之晏子春秋曰齊景公有所愛槐樹令吏守之犯槐者刑傷槐者死有不聞令而犯之者吏收之將加罪犯者之女說晏子曰妾聞明君不為禽獸以殺人今君以樹木之故殺妾父孤妾身恐害明君之政損明君之義晏子早朝而復其言於君公乃令吏罷守槐之役出犯槐之囚華陽國志曰荀崧小女灌幼有奇節崧為襄城太守為杜曾所圍力弱食盡欲投於故吏平南將軍石覽計無所出灌時年十三乃率勇士數十人踰城突圍夜出賊追甚急灌督厲將士且戰且前後得入曾陽山獲免得向覽乞師又為崧書與南中郎將周訪仍結弟兄訪即遣子撫率三千人會石覽俱救崧賊聞兵至散走灌之力也又曰王廣女美姿容性慷慨有丈夫之節廣仕劉聰為西楊州剌史蠻梅芳攻陷楊州廣被殺王年十五芳納之於闇室中擊芳不中芳曰何故反王曰劉畜我誅父賊吾聞之父讎不同天母讎不同地汝逆害人父母復以無禮凌人吾所以不死者欲誅汝爾所恨不得梟汝首於通達以塞大恥乃自殺又曰楊姬生自寒素父坐獄楊渙為尚書郎告歸姬乃邀道扣渙馬訟父罪言詞慷慨涕泣摧感渙愍之語郡縣令為出其父因奇其才為子文方以禮聘之汝南先賢傳曰戴良字叔鸞嫁五女皆布裙無緣蔡琰別傳曰琰邕之女年六歲邕夜中鼓琴絃絕琰曰第二絃邕乃故絕一絃琰曰第四絃邕曰汝偶得中之琰曰昔吳季禮觀樂知國之興亡師曠吹律識南風之不競由此言之何得不知邕奇之異苑曰順陽南鄉楊豊為虎所噬女香年十四手無寸刃直搤虎頭父遂得免子壻爾雅曰子之夫為壻壻之父為姻兩壻相謂為亞儀禮曰壻女子之夫傳曰何以服緦布之也左傳, SBCK: ''}
