  - {type: variant, offset: 143, length: 0, content: '', WYG: 晉重耳謂其妻曰待我二十五年不来乃嫁其妻笑曰犂二十五年吾冡上栢大矣雖然妾待子又曰易基乾坤詩始闗雎夫婦之際人道大倫也禮之用唯婚姻為重又曰}
  - {type: page-break, offset: 143, content: '', id: KR3k0012_WYG_520-7a, image: WYG0897/WYG0897-0636a.png}
  - {type: variant, offset: 144, length: 1, content: 蒼, WYG: 儀已學而逰說諸侯嘗從楚相飲已而楚相亡璧門下意儀曰儀貪無行資必此人盗相璧共執儀掠笞數百不服釋之其妻曰嘻子無讀書遊說安得此辱乎張儀謂妻曰視吾舌尚在否其妻笑曰舌在也儀曰足矣乃遂入秦秦王以為客卿又曰吴起好用兵事魯君齊人攻魯欲将起以起取齊女為妻而疑之起欲就功遂殺其妻以明不與齊魯卒以為将攻齊大破之又曰外黄富人女甚美嫁庸奴亡其夫徐廣曰一云其夫亡去抵}
  - {type: page-break, offset: 144, content: '', id: KR3k0012_WYG_520-7b, image: WYG0897/WYG0897-0636b.png}
  - {type: variant, offset: 146, length: 5, content: 不滿五尺蒼, WYG: 客如淳曰父時故賔客父客素知張耳乃卒為請决嫁之張耳是時脫身㳺女嫁厚奉給張耳以故致千里客及官魏為外黄令名由此益賢漢書曰楊惲報孫㑹宗云家夲秦也䏻為秦聲婦趙女也雅善鼔瑟又曰京兆尹張敞為婦畫眉}
