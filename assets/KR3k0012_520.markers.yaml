  - {type: variant, offset: 2866, length: 0, content: '', SBCK: 叔向適鄭􅞭薎惡欲觀叔向從使之収器者而徃立於堂下一言而善叔向聞之曰必􅞭明也下執其手以上曰昔賈大夫惡取妻而羙三年不言御以如臯射雉􅀗之其妻始􅀏而言賈大夫曰才之不可以巳也我不能射汝遂不言不笑也今夫子少不􅀭子􅀂不言吾幾失子矣又哀上曰齊侯伐􅀳夷儀弊無存之父將室之辭以與其弟無存齊人也室之爲取婦也曰此役也不死反必娶於髙國髙氏國氏齊貴族也無存欲必有功還取卿相之女也又成上曰齊􅀳戰于鞍齊師敗績齊侯見保者曰勉之齊師敗矣避女子女子曰}
  - {type: variant, offset: 2866, length: 0, content: '', krp: 三郤害伯宗譛而殺之𥘉伯宗毎朝其妻必戒之曰盗憎主人民惡其上子好直言必及於難又襄四曰齊棠公之妻東郭偃之姉也東郭偃臣崔武子棠公死偃御武子以弔焉見棠姜而美之美其色也使偃取之爲巳取也偃曰男女辨姓今}
  - {type: variant, offset: 2867, length: 0, content: '', SBCK: 免乎曰免矣曰銳司徒免乎曰免矣曰茍君與吾父免矣可􅀂何乃奔齊侯以爲有禮旣而問}
