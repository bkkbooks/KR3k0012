  - {type: variant, offset: 1867, length: 678, content: 天子家乎奮曰我女為卿作妾耳又曰羊躭妻辛氏字憲英魏侍中辛毗之女也聰明有才鑒初文帝為太子抱毗項曰知我喜否毗以告憲英英曰太子代君主社稷者也代君不可以不慼主國不可以不懼今宜慼而反喜何以能久魏其不昌乎又曰愍懷太子妃太尉王衍之女字惠風太子廢衍請絕婚而歸惠風號泣行路流涕後劉曜陷洛陽以惠風賜其下將妻之惠風拔劍拒曰吾太尉之女太子之妃誓不為逆胡所辱遂害之又曰韋逞母宗氏家世儒學母早喪父躬養之及長授以周官音義謂曰世傳儒業無男可傳汝宜授之勿令絕世又曰吳隱之字處默濮陽人謝石請為將軍主簿隱之將嫁女石知其儉素令移廚帳就其家經營使者至方見賣犬此外蕭然無辦又曰靳康女不知何許人美姿容有志操劉曜誅靳氏訖將納其女為妾女曰陛下既誅其父母焉用妾為妾聞逆人之誅也尚污宮伐樹況其子女乎號泣請死曜慚乃固免之晏子春秋曰齊景公有所愛槐樹令吏守之犯槐者刑傷槐者死有不聞令而犯之者吏收之將加罪犯者之女說晏子曰妾聞明君不為禽獸以殺人今君以樹木之故殺妾父孤妾身恐害明君之政損明君之義晏子早朝而復其言於君公乃令吏罷守槐之役出犯槐之囚華陽國志曰荀崧小女灌幼有奇節崧為襄城太守為杜曾所圍力弱食盡欲投於故吏平南將軍石覽計無所出灌時年十三乃率勇士數十人踰城突圍夜出賊追甚急灌督厲將士且戰且前後得入曾陽山獲免得向覽乞師又為崧書與南中郎將周訪仍結弟兄訪即遣子撫率三千人會石覽俱救崧賊聞兵至散走灌之力也又曰王廣女美姿容性慷慨有丈夫之節廣仕劉聰為西楊州剌史蠻梅芳攻陷楊州廣被殺王年十五芳納之於闇室中擊芳不中芳曰何故反王曰劉畜我誅父賊吾聞之父讎不同天母讎不同地汝逆害人父母復以無禮凌人吾所以不死者欲誅汝爾所恨不得梟汝首於通達以塞大恥, WYG: 彼矣}
