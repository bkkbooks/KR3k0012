  - {type: variant, offset: 715, length: 367, content: 覽文籍躬耕以孝見稱列子曰北山愚公者年且九十面山而居懲山北之寒出入之迂也遂率子孫荷檐叩石墾壤箕畚運於北海之尾河曲智叟笑而止之愚公長息曰雖我之死有子在焉子又生孫孫又生子子又生孫孫孫子子無窮匱也而山不加增何苦不平河曲智叟無以應之又曰舜問乎丞曰道可得而有夫道性命非汝有也是天地之委順也子孫非汝有也是天地之委蛻也陳留志曰范喬字伯孫年二歲祖父馨臨終執其手曰恨不見汝成人因以所用硯留與之後家人告喬喬執其硯涕泣孝子傳曰原穀者不知何許人祖年老父母厭患之意欲棄之穀年十五涕泣苦諫父母不從乃作輿舁棄之穀乃隨收輿歸父謂之曰爾焉用此凶具穀云後父老不能更作得是以取之耳父感悟愧懼乃載祖歸侍養剋己自責更成純孝穀為純孫又曰吳郡陸仲元者晉太尉玩曾孫自玩至仲四世為侍郎時人方之全張二族幽明錄曰許遜少孤不識祖墓傾心所感忽見祖語曰我死三十餘年於今得正葬是汝孝悌之至因舉標牓曰, SBCK: ''}
