  - {type: variant, offset: 3, length: 2, content: 九孫, WYG: 十夫妻釋名曰夫妻匹敵之義也士庶人曰妻妻齊也夫賤不足以尊稱故齊等言也易家人卦曰夫夫婦婦而家道正又序卦曰有天地然後有萬物有萬物然後有男女有男女然後有夫婦夫婦之道不可以不乆也故受之以恒恒者乆也詩衡門曰豈其食魚必河之魴豈其取妻必齊之姜豈其食魚必河之鯉豈其取妻必宋之子毛氏註曰何必大國之女然後可妻亦取貞順而已又草蟲曰喓喓草蟲趯趯阜螽未見君子憂心忡忡亦既見止亦既覯止我心則降言諸侯大夫妻能以禮自防也又采蘋曰于以采蘋南澗之濵于以采藻于彼行潦于以奠之宗室牖下誰其尸之有齊季女言大夫妻能奉祭祀也又碩人曰碩人其頎衣錦褧衣齊侯之子衛侯之妻又氓曰女也不爽士貳其行士也罔極二三其徳三嵗為婦靡室勞矣夙興夜寐靡有朝矣又棠棣曰妻子好合如鼔瑟琴兄弟既翕和樂且耽宜}
