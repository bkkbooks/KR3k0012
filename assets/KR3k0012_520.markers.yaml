  - {type: variant, offset: 138, length: 2, content: 哀孫, WYG: 於郤氏郤氏亾晉人歸之施氏逆諸河沈其二子婦人怒曰己不能庇其伉儷而亡之又不能字人之孤而殺之将何以終春秋漢含孳曰水火交感隂陽以設夫婦象也水火則隂陽也隂陽則夫婦也又曰妻象太隂臣法金位金隂中之剛故喻臣位水能純柔純柔妻象也戰國䇿曰鄒忌長八尺有餘身體逸麗朝服衣冠窺鏡謂其妻曰我孰與城北徐公美徐公齊國之美麗者也妻曰愈窺鏡而自視不如逺矣暮寝而思之吾妻之美我私我也}
