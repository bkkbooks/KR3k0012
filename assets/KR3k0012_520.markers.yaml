  - {type: variant, offset: 118, length: 0, content: '', WYG: 宜其妻父母曰是善事我子行夫婦之禮焉没身不衰又曰女子二十而嫁有故二十三而嫁故謂父母喪聘則為妻聘問也妻之言齊以禮見問則得與夫敵體奔則為妾又坊記曰取妻不娶同姓為其近禽獸也所以附逺厚别也左傳隐公曰鄭公子忽如陳逆婦媯辛亥以媯氏歸甲寅入於鄭陳鍼子送女先配而後祖鍼子曰是不為夫婦誣其祖矣非禮也何以能育禮逆婦必先告祖廟而後行鄭忽逆婦而後告廟故曰先配而後祖又荘公曰初懿氏卜妻敬仲其妻占之曰吉是謂鳯凰于飛和鳴鏘鏘有媯之後将育于姜五世其昌並為正卿八世之後莫之與京又僖公中曰狄人伐廧咎如赤狄之别種獲其二女叔隗季隗納諸晉公子公子以叔隗妻趙衰生盾文公妻趙衰生原同屏括樓嬰原屏樓三子之邑也趙姬逆盾與其母趙姬文公女也盾狄女叔隗之子也子餘辭子餘趙衰字也姬曰得寵而忘舊何以使人必逆之固請許之來以盾為才固請于公以為嫡子而使其三子下之以叔隗為内子而己下之卿之嫡妻為内子又荘公曰宋華父督見孔父之妻于路目逆而送之曰美而艶又曰楚子滅息以息媯歸生堵敖及成王焉未言未與王言楚子問之對曰我一婦人而事二夫縱不能死其又奚言又成公下曰晉三郤害伯宗譛而殺之初伯宗每朝其妻必戒之曰盗憎主人民惡其上子好直言必及於難又㐮二十五年齊棠公之妻東郭偃之姊也東郭偃臣崔武子棠公死偃御武子以弔焉見棠姜而美之美其色也使偃取之為己取也偃曰男女辨姓今君出自丁臣出自桓不可武子筮之遇困之大過以示陳文子文子曰夫從風風隕妻不可娶也且其繇曰困于石據于蒺藜入于其宫不見其妻凶崔子曰嫠也何􅊣先夫當之矣遂取之又僖公下曰初臼季使過冀見冀缺耨其妻饁之敬相待如賔與之歸言諸文公曰敬徳之聚也能敬必有徳徳以治民請君用之文公以為下軍大夫又昭公七年曰晉叔向適鄭鬷蔑惡欲觀叔向從使之収器者而徃立于堂下一言而善叔向聞之曰必鬷明也下執其手以上曰賈大夫惡取妻而美三年不言御以如皋射雉獲之其妻始笑而言賈大夫曰才之不}
