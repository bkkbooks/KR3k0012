  - {type: variant, offset: 1214, length: 7, content: 拜上右手右陰會, SBCK: 人時所學之事以爲法度也于以采蘋南澗之濵于以采藻于彼行潦于以奠之宗室牖下誰其尸之有齊季女尸主也齊敬也季少也又碩人曰碩人其頎衣錦聚衣齊侯之子衞侯之妻又氓曰女也不爽士貳其行士也罔極二三其德三歲爲婦靡室勞矣夙興夜寐靡有朝矣又棠棣曰妻子好合如鼓瑟琴好合志意合也合者如琴瑟之聲相應和也兄弟旣翕和樂且湛冝爾家室樂爾妻孥是究是圖亶其然乎又南山曰藝麻如之何横縱其􅅿取妻如之何必告父母取妻之禮議於生者卜於死者此之謂名析薪如之何匪斧不克取妻如之何匪媒不得此言取妻必待媒乃得也又韓弈曰韓侯取妻汾王之甥蹶父之子韓侯迎止于蹶之里百兩彭彭八鸞鏘鏘不顯其光諸娣從之祁祁如雲韓侯顧之爛其盈門如雲言衆多也諸侯一娶九女三國勝之諸娣衆妾也顧之曲顧道義也又思齊曰刑于寡妻至于兄弟以御于家􅀖言文王以禮法接待其妻至於宗族以此又能爲政治於家􅀖也禮記曰天子之妃曰后諸侯曰夫人大夫曰孺人士曰婦人婦人言服也庻人曰妻妻之言齊也又内則曰子甚冝其妻父母不􅀃岀冝猶善也子不冝其妻父母曰是善事我子行夫婦之禮焉没身不衰又曰女子二十而嫁有故二十三而嫁故謂父母䘮聘則爲妻聘問也妻之言齊以禮見問則得與夫敵耻奔則爲妾又坊記曰取妻不取同姓爲其近禽獸也所以附逺厚別}
