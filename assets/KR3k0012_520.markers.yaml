  - {type: variant, offset: 2588, length: 1, content: 語, WYG: 衣允之出為鎮北也喜謂其妻曰吾知免矣妻曰禍見於此何免之有魚豢魏略曰桓範字彦則沛}
  - {type: variant, offset: 2590, length: 2, content: 縣令, WYG: 人也使持節督青徐諸軍鎮下邳與徐州刺史鄒岐争屋引節欲斬岐}
  - {type: punctuation, offset: 2591, content: ，, id: KR3k0012_CHANT_520-bkkpn755}
  - {type: 'tls:seg', offset: 2591, content: '', id: KR3k0012_CHANT_520-32a.13}
  - {type: variant, offset: 2593, length: 1, content: 出, WYG: 岐所奏不直坐免當轉為冀州刺史属鎮北将軍吕昭謂}
  - {type: variant, offset: 2595, length: 3, content: 父因奇, WYG: 妻仲長曰我寕作諸卿向公長跪耳不能為吕子展屈也}
  - {type: page-break, offset: 2595, content: '', id: KR3k0012_WYG_520-13a, image: WYG0897/WYG0897-0639a.png}
