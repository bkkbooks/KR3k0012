  - {type: variant, offset: 6, length: 1, content: 雅, WYG: 室家樂爾妻孥是究是圖亶其然乎又南山曰藝麻如之何横從其畆取妻如之何必告父母取妻之禮議於生者卜於死者此之謂告析薪如之何匪斧不克取妻如之何匪媒不得此言取妻必待媒乃得也又韓奕曰韓侯取妻汾王之甥蹶父之子韓侯迎止于蹶之里百兩彭彭八鸞鏘鏘不顯其光諸娣從之祁祁如雲韓侯顧之爛其盈門又思齊曰刑于寡妻至于兄弟以御于家邦禮記曰天子之妃曰后諸侯曰夫人大夫曰孺人士曰婦人婦人言服也庶人曰妻妻之言齊也内則}
