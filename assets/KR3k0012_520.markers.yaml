  - {type: variant, offset: 1100, length: 402, content: 一侯及小縣長女禮記內則曰女子出門必擁蔽其面夜行以燭無燭則止又曰女子十年不出恒居內也姆教婉娩聽從婉謂言語也言語婉之言媚也媚謂容皃也執麻枲治絲繭織紝組訓學女事以共衣服觀於祭祀納酒漿籩豆葅醢醴相助奠當乃女時而知十有五年而笄二十而嫁凡女拜上右手右陰會也左傳襄五曰初宋芮司徒生女子赤而毛棄諸堤下恭姬之妾取以入長而美名之曰棄穀梁傳曰禮送女父不下堂母不出門父誡之曰謹慎從汝舅之言母誡之曰謹慎從汝姑之言諸母鞶紳誡之曰謹慎從汝父母之言無違宮事史記曰齊太倉令淳于公有罪當刑詔徙繫長安獄公無男有女五人將行罵曰生子不生男緩急非有益小女緹縈隨父至長安上書曰妾父為吏齊中皆稱其廉平今坐法當刑妾願入官沒為婢贖父之罪書奏天子悲憐其意遂為除肉刑漢書曰王章為京兆尹為大將軍王鳳所陷下廷尉獄妻子皆收章小女年十二夜起號哭曰每旦獄上呼囚常至九今八而止我家君素剛烈先死者必我君也及明問之果章死矣東觀漢記曰孝女郁字叔異五歲母不能食郁亦不肯食故字曰異也, WYG: 汲}
