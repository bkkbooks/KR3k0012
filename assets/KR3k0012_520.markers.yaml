  - {type: variant, offset: 15, length: 102, content: 子為曾孫曾孫之子為玄孫玄孫之子為來孫言有往來之親來孫之子為昆孫昆後也昆孫之子為仍孫仍重也仍孫之子為雲孫言輕遠若浮雲毛詩文王有聲曰貽厥孫謀以燕翼子禮記曲記曰君子抱孫不抱子此言孫可以為王父尸以孫與祖昭穆同也子, SBCK: 道}
