  - {type: variant, offset: 2621, length: 4, content: 女皆布裙, WYG: 日而官於陳五年乃歸未至家見路傍有美婦人採桑秋胡子恱之下車謂曰若曝獨採桑吾行道逺願託桑䕃下一飡於是下齎休焉婦人採桑不輟秋胡子謂曰力田不如逢年力桑不如見郎今吾有金願以與夫人婦人曰嘻夫採桑力作紡績織紝以供衣食奉二親養夫子而已矣吾不願人之金所願事上}
