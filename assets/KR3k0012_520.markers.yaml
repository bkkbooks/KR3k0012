  - {type: variant, offset: 3204, length: 5, content: 生求女壻於, SBCK: 人逼車住爽妻劉氏怖出至廳事謂帳下守督曰公在外今兵起如何督曰夫人勿憂乃上門樓引弩注箭欲發將孫謙在後牽止之曰天下事未可知如此者一二宣}
