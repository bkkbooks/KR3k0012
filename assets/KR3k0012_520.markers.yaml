  - {type: variant, offset: 3062, length: 135, content: 從青璅中窺見壽悅焉感想發於寤寐有婢往壽家說其光彩豔逸壽聞動心令通慇懃壽勁捷過人至夕踰垣而入家人莫知唯充覺女悅暢異於常日時西域有貢香每著人衣一月不歇帝甚貴之唯以賜充女密盜以遺壽僚佐與充宴聞香芬馥自此充意女與壽通乃夜半佯有盜驚起行之唯東北角有狐貍行處充考問女左右知之充遂因妻, SBCK: 習}
