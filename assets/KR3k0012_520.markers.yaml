  - {type: punctuation, offset: 2608, content: 《, id: KR3k0012_CHANT_520-bkkpn760}
  - {type: variant, offset: 2608, length: 0, content: '', WYG: 所在不能决祕書郎王導議曰此是非常事不得以常理斷之宜還前夫朝廷從其議又曰謝安妻劉惔妹也既見家門富貴而安獨静退乃謂曰丈夫不如此也安掩鼻曰恐不免耳世說又載又曰吳隐之為晉陵太守妻負薪冬月無被欲浣衣即披絮紡績以供朝夕又曰王凝之妻謝氏字道韞奕之女也初適凝之還甚不樂奕曰王郎逸少子不惡}
  - {type: page-break, offset: 2608, content: '', id: KR3k0012_WYG_520-14a, image: WYG0897/WYG0897-0639c.png}
  - {type: variant, offset: 2609, length: 2, content: 南先, WYG: 何恨也荅曰一門叔父則有阿大中郎羣從兄弟則有封胡羯末不意天壌之中乃有王郎又曰王導為丞相妻曹氏性妒導甚憚之乃宻營别館以處衆妾曹氏知而将往焉導恐妾被辱遽命駕猶遲之以所執麈尾柄驅牛而進司徒蔡謨聞之戯𨗳曰朝廷欲加公九錫導弗之覺但謙退而已謨曰不聞餘物惟有短轅犢車長柄麈尾導大怒謂人曰徃與羣}
  - {type: variant, offset: 2612, length: 0, content: '', WYG: 共遊洛中何曽聞有蔡克兒也崔鴻前秦録曰秦州刺史竇滔妻彭城令蘇道之女有才學織錦製廻文詩以贖夫罪劉向列女}
