  - {type: variant, offset: 2860, length: 0, content: '', SBCK: 莊公曰􅀄懿氏卜妻敬仲其妻占之曰􅁻是謂鳯凰于飛和鳴鏘鏘有嬀之後將育于姜五丗其昌並爲正卿八丗之後莫之與京又僖中曰狄人伐廧咎如赤狄之別種􅀗其二女叔隗季隗納諸􅀳公子公子以叔隗妻趙衰生盾}
  - {type: page-break, offset: 2860, content: '', id: KR3k0012_SBCK_520-3a}
  - {type: variant, offset: 2860, length: 0, content: '', krp: 莊公曰𥘉懿氏卜妻敬仲其妻占之曰吉是謂鳯凰于飛和鳴鏘鏘有嬀之後將育于姜五丗其昌並爲正卿八丗之後莫之與京又僖中曰狄人伐廧咎如赤狄之別種獲其二女叔隗季隗納諸晉公子公子以叔隗妻趙衰生盾}
  - {type: variant, offset: 2861, length: 0, content: '', SBCK: 公取季隗生伯儵後以妻趙衰生原同屏括樓嬰原屏樓三子之邑也趙􅁎逆盾與其母趙􅁎文公女也盾狄女釈隗之子也子餘辭子餘趙衰字也􅁎曰得寵而志舊何以使人必逆之固請許之來以盾爲才固請于公以爲嫡子而使其三子下之以叔隗爲内子而巳下之卿之嫡妻爲内子又昭元曰鄭徐吾犯之妹羙公孫楚聘之矣楚子南穆公孫也公孫黒又強使委禽焉禽鴈也納采用鴈犯懼告子産子産曰是國無政非子之患也唯所欲與犯請於二子請使女擇焉皆許之子晢盛飾而入布幣而出子晢公孫黑也子南戎服而入左右射超乘而出女自房觀之曰子晢信羙矣抑子南夫也夫夫婦婦所謂順也適子南氏又莊公曰宋華父督見孔父之妻于路目逆而送之曰美而艶又曰楚子滅息以息嬀歸生堵敖及成王焉未言未與王言楚子問之對曰吾一婦人而事二夫縱不能死其又奚言又成}
  - {type: page-break, offset: 2861, content: '', id: KR3k0012_SBCK_520-3b}
