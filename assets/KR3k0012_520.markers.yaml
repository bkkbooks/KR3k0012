  - {type: variant, offset: 2873, length: 0, content: '', krp: 困于石據于蒺藜入于其宫不見其妻凶崔}
  - {type: variant, offset: 2874, length: 1, content: 謂, krp: 曰婺矛牙也何害先夫當之矣遂取之又僖下曰𥘉臼季使過兾見兾鈌耨其妻饁之敬相待如賔與之歸言諸文}
