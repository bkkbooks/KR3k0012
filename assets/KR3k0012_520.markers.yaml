  - {type: variant, offset: 1467, length: 486, content: 及明問之果章死矣東觀漢記曰孝女郁字叔異五歲母不能食郁亦不肯食故字曰異也後漢書曰孔融被誅女年七歲幼弱遂得全寄住佗舍王人有遺肉汁男飲之女曰今日之禍豈得久活何賴肉味乎或有言於曹操收之將殺女謂兄曰若死而有知得見父母豈非志願乃延頸就刑晉書曰周顗母李氏名絡秀汝南人少時在室顗父俊為安東將軍時嘗出獵遇雨至絡秀之家會秀父兄不在絡秀見周俊至與一婢於內宰豬具數十人饌甚精而不聞人聲俊怪使覘之獨見一女甚美因求為妾其父兄不許絡秀曰門戶殄瘁何惜一女若連貴族將來庶有大益父兄遂許之生顗嵩謨而顗等才長絡秀謂之曰我屈節為汝家妾門戶計耳汝不與我家為親吾亦何惜餘年顗等從命由此李氏遂得為方雅之族又曰胡奮字玄威安定人為護軍太始末武帝怠於政事而躭於顏色大採公卿女以為六宮奮女選為貴人唯有一男為南陽王友早亡及聞女為貴人哭曰老奴不死唯有二子男入九地之下女升九天之上嘗謂后父楊駿曰卿恃女更豪耶見前代與帝家婚未有不滅門者見君所措益速禍耳駿曰卿女不在天子家乎奮曰我女為卿作妾耳又曰羊躭妻辛氏字憲英魏侍中辛毗之女也聰明有才鑒初文帝為太子抱毗項曰知我喜否毗以告憲英英曰太子代君主社稷者也代君不可以不慼主國不可以不懼今宜慼而反喜, SBCK: ''}
