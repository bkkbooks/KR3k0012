  - {type: variant, offset: 2893, length: 0, content: '', SBCK: 外弟爲大夫而嫁其外妹於施孝叔郄犨來聘求婦於聲伯聲伯奪施氏婦以與之婦人曰烏獸猶不失伉儷}
  - {type: variant, offset: 2893, length: 0, content: '', krp: 外弟爲大夫而嫁其外妹於施孝叔郄犨來聘求婦於聲伯聲伯奪施氏婦以與之婦人曰烏獸猶不失伉儷}
  - {type: variant, offset: 2894, length: 0, content: '', SBCK: 將􅀂何曰吾不能死亡婦人遂行生二子於郄氏郄氏亡􅀳人歸之施氏逆諸河沈其二子婦人怒曰已不能庇其伉儷而亡之又不能字人之􅀌而殺之將何以終春秋漢含孳曰水火交感隂陽以設夫婦象也水火則隂陽也隂陽則夫婦也又曰妻象太隂臣法金位金隂中之剛故喻臣位水能純柔純柔妻象也戰國䇿曰鄒忌長八尺有餘身體逸麗朝服衣冠窺鏡謂其妻曰我孰與城北徐公徐公齊國之美麗者也妻曰愈窺鏡而自視不如逺矣暮寢而思之吾}
