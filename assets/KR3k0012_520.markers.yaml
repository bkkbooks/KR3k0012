  - {type: variant, offset: 3469, length: 0, content: '', SBCK: 歸女家更以適人女不樂行其母逼強不得巳而去尋復病亡後其夫還逕至女墓不勝哀情便發塜開棺女遂活因與俱歸後聓聞知詣官争之所在不能决祕書郎王導議曰此是非常事不得以常理斷之冝還前夫朝廷從其議又曰謝安妻劉琰妹也旣見家門冨貴而安獨静退乃謂曰丈夫不如此也安掩鼻曰恐不免耳丗􅀃又載又曰吴隱之爲晉陵太守妻􅀒薪冬月無􅀍欲浣衣即披絮紡績以供朝夕又曰王凝之妻謝氏字道韞弈之女也􅀄適凝之還甚不樂弈曰王郎逸少子不惡汝何恨也荅曰一門叔父則有阿父中郎群從兄弟則有胡封羯末不意天壤之中乃有王郎又曰王導爲丞相妻曹氏性妬導甚憚之乃宻營别館以處衆妾曹氏知而將徃焉導恐妾􅀍辱遽命駕猶遟之以所執塵尾柄駈牛而進司徒蔡謨聞之戲導曰朝廷欲加公九卿之命弗之}
