  - {type: variant, offset: 128, length: 77, content: 祭稱孝子孝孫喪稱哀子哀孫史記曰張蒼父不滿五尺蒼長八尺蒼子復長八尺餘孫類長六尺後漢書曰龐參字仲連緱氏人拜漢陽太守郡民任棠有奇節隱教參到先候之棠不與言但拔薤一, SBCK: 采蘋}
  - {type: variant, offset: 128, length: 2, content: 祭稱, WYG: 魯聲伯之母不聘穆姜曰吾不以妾為姒生聲伯而出之嫁于齊管于奚生二子而寡以歸聲伯以其外弟為大夫而嫁其外妹於施}
  - {type: variant, offset: 128, length: 77, content: 祭稱孝子孝孫喪稱哀子哀孫史記曰張蒼父不滿五尺蒼長八尺蒼子復長八尺餘孫類長六尺後漢書曰龐參字仲連緱氏人拜漢陽太守郡民任棠有奇節隱教參到先候之棠不與言但拔薤一, krp: 采蘋}
  - {type: variant, offset: 131, length: 0, content: '', WYG: 叔郤犨来聘求婦於聲伯聲伯奪施氏婦以與之婦人曰鳥獸猶不失伉儷}
  - {type: variant, offset: 132, length: 5, content: 孝孫喪稱哀, WYG: 将若何曰吾不能死亡婦人遂行生二}
