  - {type: variant, offset: 2564, length: 0, content: '', WYG: 舉動皆有禮序室家相待如賔與子孫如嚴君焉又曰曹世叔妻班彪之女名昭字惠班召入宫號曰大家每有貢獻遣大家作賦頌注列女𫝊著女誡及詩並行於時魏志曰初司馬宣王勒兵從闕下趨武庫當曺爽門人逼車住爽妻劉氏即出至㕔事謂帳下守督曰公在外今兵起何如督曰夫人勿憂乃上門樓引弩注箭欲發将軍孫謙在後牽止之曰天下事未可知如此者一二宣王遂過又曰郭淮字伯濟太原河曲人拜車騎将軍封曲陽侯淮妻王陵之妹當從坐侍御史往收羌胡渠帥数千人叩頭請淮欲表留其妻淮不從妻就道莫不流涕人人扼腕刼留之淮五子叩頭流血請淮淮不忍視乃遣妻還淮以書白司馬宣王曰五子哀母不惜其身若無其母是無五子亦無淮也書至宣王亦宥之魏氏春秋曰許允為吏部}
  - {type: page-break, offset: 2564, content: '', id: KR3k0012_WYG_520-11b, image: WYG0897/WYG0897-0638b.png}
