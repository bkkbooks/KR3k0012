  - {type: variant, offset: 3028, length: 11, content: 韓謐字長深母賈氏賈充少, SBCK: 班昭作}
  - {type: variant, offset: 3028, length: 2, content: 韓謐, krp: 元康中梁國女子許嫁巳授禮聘尋而其夫戍長安經年不歸女家更以適人女不樂行其母逼強不得巳而去尋復病亡後其夫還逕至女墓不勝哀情便發塜開棺女遂活因與俱歸後聓聞知詣官争之所在不能决祕書郎王導議曰此是非常事不得以常理斷之冝還前夫朝廷從其議又曰謝安妻劉琰妹也旣見家門冨貴而安獨静退乃謂曰丈夫不如此也安掩鼻曰恐不免耳丗說又載又曰吴隱之爲晉陵太守妻負薪冬月無𬒳欲浣衣即披絮紡績以供朝夕又曰王凝之妻謝氏}
