  - {type: variant, offset: 120, length: 4, content: 為王父尸, SBCK: 不乆也故受之以􅁪􅁪者乆也毛詩衡門曰豈其食魚必河之魴豈其取妻必齊之姜豈其食魚必河之鯉豈其取妻必宋之子何必大囯之女然後可妻亦取貞順而巳}
  - {type: variant, offset: 120, length: 0, content: '', WYG: 已也我不能射汝遂不言不笑也夫今子少不揚子若不言吾㡬失子矣又哀公上曰齊侯伐晉夷儀敝無存之父将室之辭以與其弟無存齊人也室之}
  - {type: page-break, offset: 120, content: '', id: KR3k0012_WYG_520-5b, image: WYG0897/WYG0897-0635b.png}
  - {type: variant, offset: 120, length: 4, content: 為王父尸, krp: 不乆也故受之以恒恒者乆也毛詩衡門曰豈其食魚必河之魴豈其取妻必齊之姜豈其食魚必河之鯉豈其取妻必宋之子何必大囯之女然後可妻亦取貞順而巳}
  - {type: variant, offset: 121, length: 1, content: 王, WYG: 取婦也曰此役也不死反必娶於髙國高氏國氏齊貴族也無存欲必有功還娶卿相之女也又成公上曰齊晉戰于鞌齊師敗績齊侯見保者曰勉之齊師敗矣避女子女子曰君免乎曰免矣曰鋭司徒免乎曰免矣曰苟君與我}
  - {type: variant, offset: 123, length: 1, content: 尸, WYG: 免矣可若何乃奔齊侯以為有禮既而問之辟司徒之妻也予之石􅐎}
