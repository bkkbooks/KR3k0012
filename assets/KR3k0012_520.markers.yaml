  - {type: variant, offset: 3270, length: 20, content: 劉秀十餘歲時與諸兄戲忽有一大蛇來勢甚猛莫, SBCK: 司馬宣王曰五子哀母}
  - {type: variant, offset: 3270, length: 44, content: 劉秀十餘歲時與諸兄戲忽有一大蛇來勢甚猛莫不驚怖秀知獨不動眾共異焉東海何承天雅相知器以女妻, krp: 子}
  - {type: variant, offset: 3273, length: 380, content: 餘歲時與諸兄戲忽有一大蛇來勢甚猛莫不驚怖秀知獨不動眾共異焉東海何承天雅相知器以女妻之齊書曰謝眺為王敬則壻曾告敬則其女常懷刀欲報眺眺不敢相見及當拜吏部謙挹尤甚尚書郎范縝嘲曰卿人才無慚小選俱恨不可刑于寡妻眺有愧色及臨誅歎曰天道其不可昧乎我不殺王公因我而死三十國春秋曰前趙殷州剌史杜廣初為劉景廄卒以馬肥良引為直士侍立通夜末曾休倦景因問之廣流涕申曲有章條景執其手曰吾罪人也久負賢者謂妻曰為女求夫三年不覺廄中有麒麟於是妻之搜神記曰陽公字雍伯洛陽人至情篤孝父母終歿葬無終山陽公常為人補履終不取價無終山上無水陽公乃行車汲水作義漿居三年有一人就陽公飲出一升石子與之使向有平好地有石處種之玉當生其中并得好婦陽公後種其石數年時往看玉子生焉北平徐氏有女甚有名行人多求不許陽公有佚氣試求焉徐氏以為狂乃戲媒人曰雍伯能得白璧一雙來當聽為婚致命雍伯於種石中索得五雙白璧以至徐氏大驚遂以女妻之, WYG: ''}
