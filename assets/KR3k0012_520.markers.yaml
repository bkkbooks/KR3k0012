  - {type: variant, offset: 2601, length: 0, content: '', WYG: 作下今羞為吕屈是復難為作上範怒觸其實乃以刀鐶撞其腹妻時懐孕遂傷胎死又曰常林字伯槐河内人也少好學為諸生帶經而鋤其妻常自餉饋雖在田野相敬如賔晉書曰元康中梁國女}
  - {type: variant, offset: 2602, length: 3, content: 文方以, WYG: 許嫁已受}
  - {type: variant, offset: 2607, length: 0, content: '', WYG: 尋而其夫戍長安經年不歸女家更以適人女不樂行其母逼强不得已而去尋復病亡後其夫還逕至女墓不勝哀情便發塜開棺女遂活因與俱歸後夫聞知詣官争}
