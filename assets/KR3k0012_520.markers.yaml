  - {type: variant, offset: 3263, length: 0, content: '', krp: 女有才學織錦製廻文詩以贖夫罪劉向列女傳曰魯有秋胡子旣納妻五日而宦於陳五年}
  - {type: variant, offset: 3264, length: 4, content: 義之也宋, SBCK: 遣妻還淮以}
  - {type: variant, offset: 3264, length: 0, content: '', krp: 歸未至其家見路徬有美婦人方採桑葉秋胡子說之下車謂曰苦暴獨採桑吾行道逺願託桑䕃下一飡於是下齎休焉婦人採桑不輟秋胡子謂曰力田不如逢年力桑不如見郎今吾有金願以與夫人婦人曰嘻夫採力作紡績織絍以供衣食奉二親飬夫子而巳矣吾不願人之金所願願卿事上無有外意妾事夫家亦無淫佚之志子去矣収子之齎與子笥金秋胡子遂去歸至家奉金遺其母母使人呼其婦至乃向採桑者也胡秋子見之而慙婦曰子束髮脩身辭親徃仕五年乃還當驩喜乍馳乍驟揚塵疾至思見親今者乃說路旁婦人而下子之裝以金予之是忘母也忘母不孝好色淫泆是汙行不義夫事親不孝則事君不忠處家不義則治官不理孝義並亡於身必不遂妾不忍見不孝不}
  - {type: variant, offset: 3266, length: 0, content: '', krp: 人子改娶矣妾亦不嫁遂去東而走自投於河而死又曰晉宗伯妻者晉大夫伯宗之妻}
