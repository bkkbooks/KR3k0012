  - {type: variant, offset: 3200, length: 3, content: 郤鑒使, SBCK: 沛周郁妻者字阿閑於婦道而郁驕􅁋輕躁多行無禮郁父偉謂阿曰新婦賢者女當以道正夫郁之不改新婦過也阿拜而受命退謂左右曰我無樊衛二􅁎之行故君以責我我言而不用君必謂我不奉教令則罪在我矣􅀂言而見用是爲子違父而從婦則罪在彼矣乃自殺又曰馮良有志行與妻子相遇如君臣又曰曹操攻吕布布欲降而陳宫等自以􅀒罪於操深沮其計謂布曰曹公逺來􅀔不能乆將軍􅀂以歩􅀐出屯於外宫將餘衆閉守於内􅀂向將軍宫引兵而攻其背􅀂但攻城則將軍救於外可破也布然之布妻曰昔曹氏待公䑓如赤子猶舎而歸我今將軍厚公䑓不過於曹而欲委全城􅂢妻子􅀌軍逺出乎􅀂一旦有變妾豈得爲將軍妻哉布乃止又曰酈炎風病慌忽性至孝遭母憂疾甚發動妻始産而驚死妻家訟之􅀵繫獄炎病不能治對遂死獄中尚書盧植爲之誄讃以昭其懿又曰公孫述連徴任永馮信並託清盲以避丗難永妻媱於前匿情無言見子入井忍而不救信侍婢亦對信姦通及聞􅄒誅皆盥洗更視曰丗適平自即清媱者皆自殺又曰周澤爲太守甞卧疾齋宫其妻哀澤老病闚問所苦澤大怒以妻干犯齋禁遂收送詔獄謝罪丗疑其詭激時人爲之語曰生丗不諧作太常妻一歳三百六十日三百五十九日齋一日不齋醉如􅅺又曰載封字平仲年十五詣太常師事東海申君申君卒送䘮到東海邊甞經其家父母以封當還豫爲娶妻封蹔過拜親不􅀫而去又曰河南尹王調洛陽令李阜與竇憲厚善縱舎自由尚書僕射樂恢劾奏調阜并及司􅈻校尉諸所刺舉無所廻避貴戚􅁖之妻毎諌恢曰昔人有容身避害何必以言取怨恢歎曰吾忍素餐立人之朝乎又曰更始尚書謝躬􅀄其妻知丗祖不平常戒躬曰君與劉公積不相能而信其虚談不爲之俻終受制矣躬不納竟爲丗祖所擒又曰河南樂羊子之妻者不知何氏之女也羊子甞行路得遺金一鉼還以與妻妻曰妾聞志士不飲盗泉之水廉者不受嗟來之食况拾遺求利以汗其行乎羊子大慙乃􅂢金於野而逺㝷師學一年來歸妻跪問其故羊子曰乆行懷思無佗異也妻乃引刀趍機而言此織生自􅅙蠒成於機杼一􅁝而累以至於寸累寸不已遂成丈匹今􅀂斷斯織也則損失成功稽廢時月夫子積學當日知所忘以就懿德􅀂中道而歸何異斷斯織乎羊子感其言復還終業遂七年不返又曰魏朗字仲英入爲尚書舉動皆有禮序室家相待如賔與子孫如嚴君焉又曰曹丗叔妻班彪之姑名昭字惠召入宮號曰大家毎有貢獻遣大家作賦頌注列女傳著女誡及詩並行於時魏志曰􅀄司馬宣王勒兵從闕下趣武庫當曹爽}
