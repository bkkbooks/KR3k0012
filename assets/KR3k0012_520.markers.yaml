  - {type: variant, offset: 2877, length: 1, content: 長, krp: 民請君用之文公以爲下軍大夫又昭七曰晉叔向適鄭唆口鬲薎惡欲觀叔向從使之収器者而徃立於堂下一言而善叔向聞之曰必唆口鬲明也下執其手以上曰昔賈大夫惡取妻而羙三年不言御以如臯射雉獲之其妻始笑而言賈大夫曰才之不}
  - {type: variant, offset: 2879, length: 0, content: '', krp: 以巳也我不能射汝遂不言不笑也今夫子少不揚子若不言吾幾失子矣又哀上曰齊侯伐晉夷儀弊無存之父將室之辭以與其弟無存齊人也室之爲取婦也曰此役也不死反必娶於髙國髙氏國氏齊貴族也無存欲必有功還取卿相之女也又成上曰齊晉戰于鞍齊師敗績齊侯見保者曰勉之齊師敗矣避女子女子曰君免乎曰免矣曰銳司徒免乎曰免矣曰茍君與吾父免矣可若何乃奔齊侯以爲有禮旣而問之辟司徒之}
