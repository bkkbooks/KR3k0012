  - {type: variant, offset: 3400, length: 253, content: 國春秋曰前趙殷州剌史杜廣初為劉景廄卒以馬肥良引為直士侍立通夜末曾休倦景因問之廣流涕申曲有章條景執其手曰吾罪人也久負賢者謂妻曰為女求夫三年不覺廄中有麒麟於是妻之搜神記曰陽公字雍伯洛陽人至情篤孝父母終歿葬無終山陽公常為人補履終不取價無終山上無水陽公乃行車汲水作義漿居三年有一人就陽公飲出一升石子與之使向有平好地有石處種之玉當生其中并得好婦陽公後種其石數年時往看玉子生焉北平徐氏有女甚有名行人多求不許陽公有佚氣試求焉徐氏以為狂乃戲媒人曰雍伯能得白璧一雙來當聽為婚致命雍伯於種石中索得五雙白璧以至徐氏大驚遂以女妻之, krp: ''}
