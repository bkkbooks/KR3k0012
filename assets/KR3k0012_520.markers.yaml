  - {type: variant, offset: 3210, length: 9, content: 導導令自東廂徧觀諸, SBCK: 遂過又曰郭淮字伯濟太原河曲人拜車􅀐將軍封曲陽侯淮妻王陵之妹當從坐侍御史徃􅀵羗胡渠師數千人叩頭請淮表留妻淮不從妻之道莫不流涕人人扼腕欲刼留之淮五}
