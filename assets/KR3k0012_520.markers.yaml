  - {type: variant, offset: 2863, length: 2, content: 趙穿, SBCK: 􅀳三郤害伯宗譛而殺之􅀄伯宗毎朝其妻必戒之曰盗憎主人民惡其上子好直言必及於難又襄四曰齊棠公之妻東郭偃之姉也東郭偃臣崔武子棠公死偃御武子以弔焉見棠姜而美之美其色也使偃取之爲巳取也偃曰男女辨姓今君出自丁臣出自桓不可武子筮之遇困之大過以示陳文子文子曰夫從風風隕妻不可娶也且其繇曰困于石據于蒺藜入于其宫不見其妻凶崔子曰􅊔也何害先夫當之矣遂取之又僖下曰􅀄臼季使過兾見兾鈌耨其妻饁之敬相待如賔與之歸言諸文公曰敬德之聚也能敬必有德德以治民請君用之文公以爲下軍大夫又昭七曰}
  - {type: page-break, offset: 2863, content: '', id: KR3k0012_SBCK_520-4a}
  - {type: variant, offset: 2863, length: 2, content: 趙穿, krp: ''}
