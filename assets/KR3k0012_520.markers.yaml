  - {type: variant, offset: 2565, length: 3, content: 告歸姬, WYG: 𨕖郡守明帝疑其所用非次召入将加罪允妻阮氏跣足謂曰明主可以理奪難以情求允之入帝怒詰之對曰某郡太守雖滿文字先至年限在後日限在前帝取事視}
  - {type: page-break, offset: 2565, content: '', id: KR3k0012_WYG_520-12b, image: WYG0897/WYG0897-0638d.png}
