  - {type: variant, offset: 3473, length: 2, content: 麒麟, SBCK: 蔡克兒也崔鴻前􅁗録曰􅁗州刺史竇滔妻彭城令􅂫道之女有才學織錦製廻文詩以贖夫罪劉向列女傳曰魯有秋胡子旣納妻五日而宦於陳五年乃歸未至其家見路徬有美婦人方採桑葉秋胡子􅀃之下車謂曰苦􅁀獨採桑吾行道逺願託桑䕃下一飡}
