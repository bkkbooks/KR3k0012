  - {type: variant, offset: 4120, length: 1733, content: 日有白鵠飛來集普賢座前至行香畢乃去至二十一日將暮有黃衣者四人繞塔數匝忽然不見又曰支曇蘭晉太元中遊剡縣後憩始豐赤城山見一處林泉清曠而居之經于數日忽見一人長數丈呼蘭令去又見諸異形禽獸以恐蘭見蘭恬然自得乃屈膝禮拜云珠欺王是家舅令往韋鄉山就之推此處以相奉爾後三年忽聞車騎隱隱從者彌眾俄而有人著幘稱珠欺王通既前從其妻子男女等二十三人並形皃端正有逾於世既至蘭所暄涼訖蘭問住在何處荅曰在樂安縣韋鄉山久服風問與家累仰投乞授歸戒蘭即為授之受法竟嚫錢一萬密二器辭別而去便聞鳴笳動吹響振山谷禪眾十餘共所聞見又曰釋玄高母夢梵僧散華滿室覺便懷胎及生男家內忽有異香光明照壁迄旦乃息母以兒生瑞兆因名靈育出家改名玄高聰敏生知學不加思至年十五已為山僧說法受戒林陽堂山古老相傳云是群仙所宅高徙眾三百往居山舍多有靈異磬不擊而鳴香亦自然有氣應真仙士往往來遊學徒之中有玄紹者學究諸禪神力自在手指出水供高洗漱其水香靜倍異於常每得非世華香以獻三寶其靈如紹者有十一人西海有梵僧印亦從高受學志隘量褊得少為足便謂已得羅漢頓盡禪門高乃密以神力令印於定中備見十方無極世界諸佛說法不同印於一夏尋其所見永不能盡方知定水無底大生愧懼又曰釋僧同韜光晦跡人莫能知居寒山山在長安南四百里將殂告弟子日吾將去矣其夕見火從繩床後出燒身經二日方盡煙焰張天而房不燼弟子收遺灰架以塼塔又曰阿訶羅竭者多行頭陁獨宿山野晉惠帝元康元年乃西入止婁至山石室中坐禪此室水既遠時人欲為開澗竭曰不假相勞乃自起以左腳蹍尺展反室西壁陷沒指既拔足水從中出清香軟美四時不絕來飲者皆止飢渴除病又曰竺法慧本關中人晉康帝建元中至襄陽止羊叔子寺不受別請每乞食輒齎繩床自隨於閑曠之路則施之而坐時或遇雨以油帔自覆雨止唯見繩床不知慧所在訊問未息慧已在繩床每語弟子法照曰汝過去時折一雞腳其殃尋至俄而照為人所擲腳遂永疾又曰涉公西域人言未然之事驗若指掌以苻堅建元十一年至長安能以祕呪呪下神龍每旱堅常請之呪龍俄而龍下鉢中天輒大雨堅及群臣親就鉢觀之咸歎其異又曰杯渡者不知姓名常以木杯渡水因而為目不脩細行神力卓越世莫測其由來唯持一蘆圌子更無餘物向廣陵遇村舍有李家設八關齋先不相識乃直人齋堂而坐置蘆圌於中庭眾以其形陋無恭敬心李見蘆圌當道欲移置墻邊數人舉不能動渡食竟提之而去笑曰四天王福于李家于時有一豎子窺其圌中見四小兒並長四寸面目端正衣裳鮮潔於是追覓不知所在後三日乃見西界蒙籠樹下坐李禮拜請還家供養渡不堪持齋飲酒噉肉至於辛鱠與俗不殊清旦忽云欲得一袈裟中時令辨李即經營至中時未成渡云暫出至冥不返合境聞有異香疑之為怪處處覓渡乃見在北岩下敷敗袈裟於地臥之而死頭前腳後皆生蓮花花極鮮香邑共殯之後數日有人從北來云見渡負廬圌行向彭城乃共開棺唯見鞋履既至彭城有白衣黃欣深信佛法見渡禮拜請還處家家至貧但有麥飯而已渡甘之怡焉止得半年忽語欣云可覓蘆圌三十六枚吾須用之荅云此閒正可有十枚貧無以買恐不盡辦渡曰汝但檢覔宅中應有欣即窮檢果得三十六枚列之庭中雖有其數亦多破損比欣次第熟視皆新完渡密封之因語欣令開乃見錢帛皆滿可百許萬識者謂是杯渡分身他土所得嚫施迴以施欣欣受之皆為功德經一年許渡辭去欣為辦糧食明晨見糧食具存不知渡所在續高僧傳曰釋慧恭者益州成都人也與同寺慧遠結契勤學遠直詣長安恭往荊揚訪道從江左來還二人相遇欣歡共敘別離三十餘年同宿數夜遠言談泉湧恭竟無所道遠問恭曰離別多時今得相見慶此歡會伊何可論但覺仁者無所說將無所得耶恭對曰為性闇劣都無所解遠曰大無所解可不誦得一部經乎恭曰唯誦得觀世音經一卷遠厲聲曰觀世音經小兒皆能誦之何煩汝大許人且向為童子出家與遠立誓望登道果豈復三十餘年唯誦一卷經如指許大是非闇鈍嬾惰所為請與斷交願法師早去無增遠之煩惱也恭曰經卷雖小佛口所說遵敬者得無量福輕慢者得無量罪仰願暫息瞋心當為法師誦一遍即與長別遠大笑曰觀世音經是法華普門品遠己講之數百遍如何欲鬧人耳乎恭曰外書云人能弘道非道弘人但至心聽佛語豈得以人棄法乃於庭前結壇壇中安高座繞壇數匝頂禮昇高座遠不得已於簷下據胡床坐聽恭始發聲唱經題異香氛氳遍滿房宇及入經文天上作樂雨四種花樂則寥亮振空花則雰霏滿地誦經訖下座自為解座梵訖花樂方歇慧遠接足頂禮淚下交流謝曰慧遠臭穢死尸敢行天日之下乞蹔留賜見教誨恭曰非恭所能諸佛力耳即拂衣長揖沿流而去爾後訪問竟不知其所之, SBCK: ''}
