  - {type: variant, offset: 9, length: 0, content: '', SBCK: 日釋道安姓衛氏常山人初經出已乆而舊譯時謬致使深義隱沒未通每至講說唯敘大意安躬覽經典鈎深致逺並尋文比句爲起盡之義經義克明自安始也洛陽伽藍記日神􅀛九年十一月太后遣崇靈寺比丘惠生向西域取經凡得一百匕十部皆是大乘妙典湼槃經日是諸大乘經爲滿字無欠少之義也小乘諸教悉爲半字義未圎故云半字像晉書}
