  - {type: variant, offset: 137, length: 0, content: '', SBCK: 光趺始具初髙悝得像後行西域胡五人來詣悝日昔於天竺得阿肓王造像來至鄴下逢胡亂埋於河邊今尋覔失所五人嘗一夜俱夢見像日已出江東爲髙悝所得悝}
  - {type: variant, offset: 137, length: 0, content: '', WYG: 光趺始具初高悝得像後有西域僧五人来詣悝曰昔於天竺得阿育王造像来至鄴下逢時亂埋於河邉今尋覔失所五人常一夜夢見像曰已出江東為高悝所得悝}
  - {type: variant, offset: 137, length: 0, content: '', krp: 光趺始具初髙悝得像後行西域胡五人來詣悝日昔於天竺得阿肓王造像來至鄴下逢胡亂埋於河邊今尋覔失所五人嘗一夜俱夢見像日已出江東爲髙悝所得悝}
  - {type: variant, offset: 138, length: 1, content: 與, SBCK: 送此五僧至寺見像歔欷涕泣像便放光照燭殿宇像趺先有外國書莫有識者後有三藏那跋摩識之云是阿育王爲第四女所造也宋書日劉牢之子敬宣八歲喪母晝夜號泣四月八日見衆人灌佛乃下頭上金鏡爲母灌像因悲泣不自勝又日沉道䖍累世事佛推父祖舊宅爲寺至四月八日每設像之日輒舉家慟焉又日自漢世始有佛像形製未工戴逵特善其事顒亦參焉宋世子鑄丈六銅像於瓦官寺旣成面恨瘦工人亦不能改乃迎戴顒顒日非面瘦乃臂胛肥爾及減臂胛瘦患卽除無不歎服梁書日阮孝緒末年􅂼食斷酒􅁪供養石像先有損壞心欲補之罄心敬禮經一夜忽然完復衆並異之又日大通四年又造一丈六尺旃檀像量之剩二尺成丈八形次衣文及手足更重量又剩一尺五分至大通五年寺僧洽重量又剩七寸卽是長二丈矣大}
