  - {type: variant, offset: 3477, length: 962, content: 變天梯地龍之事不可勝數又曰天竺沙門僧伽達禪學深明來遊宋境嘗在中坐禪日時將迫念欲虛齋乃有群鳥銜果飛來授之達多思惟彌猴奉密佛亦受而食之今鳥授食何為不可於是授而進之又曰求郍跋陁羅此云功德賢中天竺人以大乘學故世號摩訶衍譙王欲請講華嚴經而跋陁自忖未善宋言有懷愧歎即旦夕禮懺於觀世音乞求冥應遂夢行人白衣持劍擎一人首來至其前曰何故憂耶跋陁具以事對荅曰無所多憂即以劍易首更安新頭語令迥轉曰得無痛也荅曰不痛豁然便覺心神喜悅且起道義皆通備領宋言於是就講又曰沙門寶意世居天竺以宋孝建中來止京師瓦官禪房恒於寺中樹下坐禪又曉經律時人號為三藏常轉側數百具子立知吉凶善能神呪以香塗掌亦見人往事宋祖施一銅唾壺高二尺許常在床前忽有人竊之意取竹蓆一領空卷之呪數通經于三夕唾壺還在蓆中莫測其然又曰竺法崇嘗遊湘州麓山山精化為夫人詣崇請戒捨所住山以為寺崇居之少時化洽湘土又曰釋法安一名慈欽未詳何許人善能開化愚蒙撥邪歸正晉義熙中新陽虎災縣有大社樹下築神廟左右居民以百數遭虎死者夕有一兩安嘗遊於其縣暮經此宿民以畏虎早閉門閭安徑之樹下通夜坐禪向曉聞虎負人而至投之樹北見安如喜驚跳伏安前安為說法授戒虎踞地不動有頃而去及旦村人追虎至樹下見安大驚謂是神人遂傳之一縣士庶莫不崇奉虎災由此遂息因改神廟留安立寺又曰釋曇邕於廬山之西南營立茅宇與弟子曇果澄思禪門嘗於一時果夢山神求受五戒果曰家師在此可往諮受少時邕見一人著單衣袷給風姿端雅從者二十餘人請受五戒邕以果先夢知是神仙乃為說法受戒神嚫以外國匕箸禮拜辭別倏忽不見又曰釋僧苞建三七日普賢齋懺至第十七日有白鵠飛來集普賢座前至行香畢乃去至二十一日將暮有黃衣者四人繞塔數匝忽然不見又曰支曇蘭晉太元中遊剡縣後憩始豐赤城山見一處林泉清曠而居之經于數日忽見一人長數丈呼蘭令去又見諸異形禽獸以恐蘭見蘭恬然自得乃屈膝禮拜云珠欺王是家舅令往韋鄉山就之推此處以相奉爾後三年忽聞車騎隱隱從者彌眾俄而有人著幘稱珠欺王通既前從其妻子男女等二十三人並形皃端正有逾於世既至蘭所暄涼訖蘭問住在何處荅曰在樂安縣韋鄉山久服風問與家累仰投乞授歸戒蘭即為授之受法竟嚫錢一萬密二器辭別而去便聞鳴笳動吹響振山谷禪眾十餘共所聞見又曰釋玄高母夢梵僧散華滿室覺便懷胎及生男家內忽有異香光明照壁迄旦乃息母以兒生瑞兆因名靈育出家改名玄高聰敏生知學不加思至年十五已為山僧說法受戒林陽堂山古老相, WYG: 騐}
