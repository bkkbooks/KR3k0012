  - {type: variant, offset: 311, length: 200, content: 並吾所治以布施故珍玩甚豐以瞋恚故墮此神報今見同學悲欣何言壽盡旦夕而醜形長大若於此捨命穢污江湖當渡山西澤中此身滅後恐墮地獄吾有絹干疋并雜寶物可為立法營塔使生善處也高曰故來相度何不出形神曰形甚醜異眾人必懼高曰但出眾不怪也神從床後出頭乃是大蟒不知尾之長至高膝邊高向之梵語數番贊唄數契蟒悲淚如雨須臾還隱高即取絹物辭別而去舟侶颺帆蟒復出身登山而望眾人舉手然後乃滅倏忽之頃便達豫章即以廟物為造東寺高去後神即命過暮, SBCK: ''}
