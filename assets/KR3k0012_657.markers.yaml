  - {type: variant, offset: 551, length: 1909, content: 竺曇摩羅剎此云法護其先月支人本姓支氏世居燉煌郡年八歲出家遂隨師至西域遊歷諸國遂通外國之言三十六種書亦如之以晉武之末隱居深山山有清泉恒取澡漱後有採薪者穢其水側俄頃而燥護乃徘徊歎曰人之無德遂使清泉輟流水若永竭真無以自給正當移去耳言訖而泉流滿澗法護以世居燉煌而化道周洽時人咸謂燉煌菩薩也又曰帛遠字法祖才思俊徹敏朗絕倫誦經日八九千言研味方等妙入幽微世俗墳典多所該貫晉惠之末太宰河閒王顒鎮關中虛心敬重待以師友之禮每至閑辰靜夜輒談講道德于時西府初建俊又甚盛能言之士咸伏其遠達後奄然命終群胡各起塔廟少時有一人姓李名通死而更蘇云見祖法師在閻羅王處為王講首楞嚴經云講畢往忉利天又見祭酒王浮被鎖械求祖讖悔昔祖平素之日與浮每爭邪正浮屢屈既瞋不自忍乃作老子化胡經以誣謗佛法殃有所歸故死方思悔又曰佛馱跋陁羅此云覺賢本姓釋迦氏維羅衛國甘露飯王之苗裔也父少亡賢三歲孤與母居五歲復喪母為外氏所養從祖鳩婆利聞其聰敏兼悼其孤露乃迎還度為沙彌至年十七與同學數人俱以習誦為業眾皆一月賢一日誦畢其師歎曰賢一日敵三十夫也及受具戒脩業精勤博學群經多所通達少以禪律馳名常與同學僧迦達多共遊罽賓同處積歲達多雖伏其才明而未測其為人也後於密室閉戶坐禪忽見賢來驚問何來荅云蹔至兜率致敬彌勒言訖便隱達多知是聖人未測淺深後屢見神變乃歸心祈問方知得不還果然常欲遊方弘化備觀風俗會有秦沙門智叡西至罽賓既要請苦遂愍而許焉於是既度蔥嶺路經六國國主矜其遠化並傾懷資奉至交趾乃附舶循海而行經一島下賢以手指山曰可止於此舶主曰客行惜日調風難遇不可停也行二百餘里忽風轉吹舶還向島下眾人方悟其神咸師事之於後闇夜之中忽令眾船俱發無肯從者賢自起收纜一舶獨發俄爾賊至留者悉被抄害頃之至青州東萊郡聞鳩摩羅什在長安即往從之什大悅秦太子泓欲聞賢說法乃要命群僧集論東宮羅什與賢數蕃往什問法云何空荅曰眾微成色色自無性故離色常空又問既以極微破色空微復去何破一微荅曰群師或折一微我意謂不爾又問微是常耶荅曰以一微故眾微空以眾微故一微空時寶雲譯出此語不解其意道俗咸謂賢之所計微塵是常餘日長安學僧復請更釋賢曰夫法不自生緣會故生緣一微故有眾微微自無性則為空矣寧可言不破一微常而不空乎此是問荅之大意也又曰曇無懺天竺人明解呪術所向皆驗西域號為大呪師後隨王王即天竺王也入山王渴須水不能得懺乃密呪石出水因贊曰大王聖化所感遂使枯石生泉鄰國聞者皆歎王德于時雨澤甚調百姓稱詠王悅其道深加優寵後至涼涼王沮渠蒙遜聞懺名呼與相見接待甚厚嘗告蒙遜云有鬼入聚落必多災疫遜不信欲躬見為驗懺即以術加之遜見而駭怖懺曰宜潔誠齋戒神呪以驅之乃讀呪三日謂遜曰鬼已去矣時境首有見鬼者云見數百疫鬼奔驟而逝境內獲安懺之力也又曰釋法顯姓龔平陽武陽人也三歲便度為沙彌十歲遭父母憂孝性過人葬事畢仍即還寺嘗與同學數十人於田中刈稻時有飢賊欲奪其穀諸沙彌悉走唯顯獨留語賊曰若欲須穀隨意所取但君等昔不布施故致飢貧今復奪人恐來世彌甚貧道預為君憂耳言訖即還賊棄穀而去及受大戒常慨經律舛闕誓志尋求以晉隆安三年西度流沙將至天竺去王舍城三十餘里有一寺逼暝過之顯欲詣耆闍崛山寺僧諫曰路甚艱阻多黑師子亟經噉人何由可至顯曰遠涉數萬里誓到靈鷲身命不期出息非保豈可使積年之誠既至而廢雖有險難吾不懼也眾莫能止乃遣兩僧送之既至山日將曛夕遂欲停宿兩僧色懼捨之而還顯獨留山中燒香禮拜翹感舊跡如覩聖儀至夜有三黑師子來蹲踞顯前舐脣搖尾顯誦經不輟一心念佛師子乃低頭下尾伏顯足前顯以手摩之呪曰若欲相害待我誦竟若見試者便可退矣師子良久乃去明晨乃還路窮幽梗止有一徑通行未至里餘忽逢一道人年可九十餘容服麤素而神氣儁遠顯雖覺其韻高而不悟是神人後又逢一少僧顯問曰向者耆年是誰耶荅云頭陁迦葉大弟子也顯方大恨更追至山所有橫石塞于室口遂不得人顯流涕而去又曰曇無竭此云法勇至罽賓國禮拜佛鉢住歲餘學梵書語求得觀世音受記經梵文一部復西行雖屢經危險而繫念所齎觀世音經未嘗暫廢將至舍衛國中野逢山象一群無竭稱名歸命即有師子從林中出象驚惶奔走後渡恒河值野牛一群嗚吼而來將欲害人無竭歸命如初尋有大鷲飛來野牛驚散其誠心所感在險克濟皆此類又曰釋智嚴晉義熙十三年宋武帝西伐長安剋捷旋斾塗出山東時始興公王恢從駕遊觀山川至嚴精舍見其同止三僧各坐繩床禪思湛然恢至良久不覺彈指三人開眼俄而還閉不與言恢心敬其奇訪諸耆老皆云此三僧隱居求志高潔法師也恢即啟宋武延請還都莫肯行者既屢請情至二人推嚴隨行恢道懷素篤禮事甚勤還都即住始興寺嚴性虛靜志避諠塵恢乃為於東郊起精舍即枳園寺也嚴在寺不受別請常分衛自資道化所被幽顯咸伏有見鬼者云見西州太社聞鬼相謂云嚴公當至當辟易此人未之解俄而嚴至聊問姓字果稱智嚴默而識之密加禮異又曰求郍跋摩此云功德鎧累世為王年十四便機見儁遠深有遠度仁愛汎博, WYG: ''}
