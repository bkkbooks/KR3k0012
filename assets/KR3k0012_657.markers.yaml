  - {type: variant, offset: 5578, length: 275, content: 餘年唯誦一卷經如指許大是非闇鈍嬾惰所為請與斷交願法師早去無增遠之煩惱也恭曰經卷雖小佛口所說遵敬者得無量福輕慢者得無量罪仰願暫息瞋心當為法師誦一遍即與長別遠大笑曰觀世音經是法華普門品遠己講之數百遍如何欲鬧人耳乎恭曰外書云人能弘道非道弘人但至心聽佛語豈得以人棄法乃於庭前結壇壇中安高座繞壇數匝頂禮昇高座遠不得已於簷下據胡床坐聽恭始發聲唱經題異香氛氳遍滿房宇及入經文天上作樂雨四種花樂則寥亮振空花則雰霏滿地誦經訖下座自為解座梵訖花樂方歇慧遠接足頂禮淚下交流謝曰慧遠臭穢死尸敢行天日之下乞蹔留賜見教誨恭曰非恭所能諸佛力耳即拂衣長揖沿流而去爾後訪問竟不知其所之, WYG: 七}
