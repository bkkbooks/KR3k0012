  - {type: variant, offset: 3739, length: 297, content: 具子立知吉凶善能神呪以香塗掌亦見人往事宋祖施一銅唾壺高二尺許常在床前忽有人竊之意取竹蓆一領空卷之呪數通經于三夕唾壺還在蓆中莫測其然又曰竺法崇嘗遊湘州麓山山精化為夫人詣崇請戒捨所住山以為寺崇居之少時化洽湘土又曰釋法安一名慈欽未詳何許人善能開化愚蒙撥邪歸正晉義熙中新陽虎災縣有大社樹下築神廟左右居民以百數遭虎死者夕有一兩安嘗遊於其縣暮經此宿民以畏虎早閉門閭安徑之樹下通夜坐禪向曉聞虎負人而至投之樹北見安如喜驚跳伏安前安為說法授戒虎踞地不動有頃而去及旦村人追虎至樹下見安大驚謂是神人遂傳之一縣士庶莫不崇奉虎災由此遂息因改神廟留安立寺又曰釋曇邕於廬山之西南營立茅宇與弟子曇果澄思禪門嘗於一時果夢山神求受, SBCK: ''}
