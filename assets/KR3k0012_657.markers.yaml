  - {type: variant, offset: 3280, length: 261, content: 于壁迄今猶有聲影之驗潔誠祈福莫不響應又曰釋智猛雍州新豐人每聞外國道人說天竺國有釋迦遺跡及方等經常慨然有感馳心遐外以為萬里咫尺千載可追遂發長安到罽賓國有五百羅漢常往返於阿耨達地有大阿羅漢見猛至歡喜猛諮問方士為說四天子事猛於奇沙國見佛文石唾壺又於此國見佛鉢光色紫紺四際盡然以香花供養頂戴發願鉢若有應能輕能重既而轉重力遂不堪及下鉢時復不覺重至迦維羅衛國見佛髮佛牙及肉髻骨佛影佛跡炳然具存其所遊踐究觀靈變天梯地龍之事不可勝數又曰天竺沙門僧伽達禪學深明來遊宋境嘗在中坐禪日時將迫念欲虛齋乃有群鳥銜果飛來授之達多思惟彌猴奉密佛亦受而食, SBCK: 歸}
