  - {type: variant, offset: 1282, length: 500, content: 群僧集論東宮羅什與賢數蕃往什問法云何空荅曰眾微成色色自無性故離色常空又問既以極微破色空微復去何破一微荅曰群師或折一微我意謂不爾又問微是常耶荅曰以一微故眾微空以眾微故一微空時寶雲譯出此語不解其意道俗咸謂賢之所計微塵是常餘日長安學僧復請更釋賢曰夫法不自生緣會故生緣一微故有眾微微自無性則為空矣寧可言不破一微常而不空乎此是問荅之大意也又曰曇無懺天竺人明解呪術所向皆驗西域號為大呪師後隨王王即天竺王也入山王渴須水不能得懺乃密呪石出水因贊曰大王聖化所感遂使枯石生泉鄰國聞者皆歎王德于時雨澤甚調百姓稱詠王悅其道深加優寵後至涼涼王沮渠蒙遜聞懺名呼與相見接待甚厚嘗告蒙遜云有鬼入聚落必多災疫遜不信欲躬見為驗懺即以術加之遜見而駭怖懺曰宜潔誠齋戒神呪以驅之乃讀呪三日謂遜曰鬼已去矣時境首有見鬼者云見數百疫鬼奔驟而逝境內獲安懺之力也又曰釋法顯姓龔平陽武陽人也三歲便度為沙彌十歲遭父母憂孝性過人葬事畢仍即還寺嘗與同學數十人於田中刈稻時有飢賊欲奪其穀諸沙彌悉走唯顯獨留語賊曰若欲須穀隨意所取但君等昔不布施故致飢貧今復奪人恐來世彌甚貧道預為君憂耳言訖即還賊棄穀而去及受大戒常慨經律舛闕誓志尋求以晉隆安三年西度流沙將至天竺去王舍城, SBCK: ''}
