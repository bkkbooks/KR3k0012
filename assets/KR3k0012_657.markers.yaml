  body:
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 五經像經晉書日姚興如逍遥園引沙門于澄􅀇堂􅃪鳩摩羅什演佛經羅什通辨夏言尋覽舊經多有乖謬不與胡本相應興與羅什及沙門僧肇曇順等八百人更出大品羅什持胡本興執舊經以相考校其新文異舊者皆會於理義續出諸經并諸論三百餘卷今之新經皆此羅什所譯興旣託意於佛道公卿已下莫不欽附沙門自逺而至者五千餘人起浮圗于永貴里立波若臺于中宮沙門坐禪者􅁪有千數州郡化之事佛者十室而九矣齊書日張緒爲中書令善談􅀇駕幸莊嚴寺聽僧達道人講維摩坐逺不聞緒言上難移緒乃遷僧達梁書日張稷出爲青兾二州刺史不得志嘗閉閤讀佛經又日劉勰字彦和早􅀌篤志好學家貧不婚娶依沙門僧祐居遂愽通經論因區別部􅀋録而序之定林寺經藏􅎰所定也勰爲文長於佛埋都下寺塔及名僧碑誌必請勰製文勑與惠震沙門於定林寺撰經證功畢遂求出家先燔鬚髮自誓勑許之乃變服改名惠地又日任孝恭少從蕭寺雲法師讀經論明佛理至是􅂼食齋戒信受甚篤而性頗自伐以才能尚人於流輩中多有忽略世以此少之又日皇侃性至孝常日誦孝經二十遍以擬觀世音經又曰梁蕭詧謂其度支尚書宋如問日卿何爲謗經如周踧踖自陳不謗詧又謂之如初如周懼出告蔡大寶大寶知其旨􅀏謂之日君當不謗餘經正應不信法華耳如周乃悟然法華云聞經隨喜面不狹長如周而狹且長由是詧有此戲陳書日王固清虚寡欲信佛法及丁所生憂遂終身􅂼食夜則坐禪晝誦佛經嘗聘魏宴于昆明池魏人以南人􅄝魚大設罟網固以佛法呪之遂一鱗不獲後魏書日裴宣髙祖曾令集沙門講佛經因命宣論難甚有理詣髙祖稱善唐書日韋綬字子章京兆人少有至性喪父刺血寫佛經又日貞元十}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_SBCK_657-1b}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_SBCK_657-2a}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 五經像經晉書曰姚興如逍遥園引諸沙門于澄𤣥堂聴鳩摩羅什演說佛經羅什通辨夏言尋覽舊經多有乖謬不與胡本相應興與羅什及沙門僧略僧遷道樹道叡道坦僧肇曇順等八百餘人更出大品羅什持胡本興執舊經以相考較其新文異舊者皆㑹於理義續出諸經并諸論三百餘卷今之新經皆比羅什所譯興既托意於佛道公卿以下莫不欽附沙門自逺而至者五千餘人起浮圗於永貴里立波若臺於宫中沙門坐禪者恒有千數州郡化之事佛者十室而九矣齊書曰張緒為中書令善談𤣥駕幸莊嚴寺聴僧達道人講維摩坐逺不聞諸言上難移緒乃遷僧達梁書曰張稷岀為青兾二州刺史而不得志嘗閉閣讀佛經又曰劉􅎰字彦和早孤篤志好學家貧不婚娶依沙門僧祐居遂博通經論因區别部類錄而序之今定林寺經藏􅎰所定也􅎰為文長于佛理都下寺塔及名僧碑誌必請製文𠡠與惠震沙門于定林寺撰經證功畢求遂出家先燔髪鬚自誓勑許之乃變服改名慧地又曰任孝恭少從蕭寺雲法師讀經論明佛理至是蔬食齋戒信受甚篤而性頗自伐以才能尚人於流軰中多有忽略世以此少之又曰皇偘性至孝常日誦孝經二十遍以擬觀世音經周書曰梁蕭詧謂其度支尚書宗如周曰卿何為謗經如周踖踧自陳不謗詧又謂之如初如周懼岀遇蔡大寳大寶知其㫖笑謂之曰君當不謗餘經正應不信法華耳如周乃悟法華經云聞經随喜面不狭長如周面狭且長由是詧有此戯陳書曰王固清虛寡欲信佛法及丁母憂遂終身蔬食夜則坐禪書誦佛經嘗聘魏宴于昆明池魏人以南人嗜魚大設罟網固以佛法咒之遂一鱗不獲後魏書曰裴宣髙祖曽令集沙門講經因命宣講難甚有理詣高祖稱善唐書曰韋綬字子章京兆人少有至性喪父刺血冩佛經又曰貞元十}
