  - {type: variant, offset: 2756, length: 122, content: 光儒童有布髮之形像始成之後每夕放光此山本多虎災自跋摩居之晝行夜往或值虎者以杖按頭戲之而去於是山旅水賓去來無梗嘗於別室入禪累日不出寺僧遣沙彌候之見一白師子緣柱而立亙室彌漫生青蓮華沙彌驚恐大呼往逐師子豁無所見後文帝重勑觀寺等復更敦請乃泛舟下都以元嘉, SBCK: ''}
  - {type: variant, offset: 2756, length: 122, content: 光儒童有布髮之形像始成之後每夕放光此山本多虎災自跋摩居之晝行夜往或值虎者以杖按頭戲之而去於是山旅水賓去來無梗嘗於別室入禪累日不出寺僧遣沙彌候之見一白師子緣柱而立亙室彌漫生青蓮華沙彌驚恐大呼往逐師子豁無所見後文帝重勑觀寺等復更敦請乃泛舟下都以元嘉, krp: ''}
  - {type: variant, offset: 2760, length: 716, content: 布髮之形像始成之後每夕放光此山本多虎災自跋摩居之晝行夜往或值虎者以杖按頭戲之而去於是山旅水賓去來無梗嘗於別室入禪累日不出寺僧遣沙彌候之見一白師子緣柱而立亙室彌漫生青蓮華沙彌驚恐大呼往逐師子豁無所見後文帝重勑觀寺等復更敦請乃泛舟下都以元嘉八年正月達于建業文帝引見因問曰弟子常欲持齋不殺迫以身殉物不獲從志法師既不遠萬里來化此國將何以教之跋摩曰夫道在心不在事法由己非由人且帝王與匹夫所脩各異匹夫身賤名劣言令不威若不剋己苦躬將何為則帝王以四海為家萬民為子出一嘉言則士庶咸悅布一善政則神人以和刑不夭命役無勞力乃則使風雨適時寒暖應節百穀滋繁桑麻鬱茂如此持齋亦以大矣不殺亦以眾矣寧在闕半日之飡全一禽之命然後方為弘濟耶帝乃撫兒歎曰夫俗人迷於遠理沙門滯於近教迷遠理者謂至道虛說滯近教者則拘攣篇章至如法師所言真謂開悟明達可與言天人之際矣乃勑住祇洹寺供給隆厚又曰曇摩密多此云法秀罽賓人也年至七歲神明澂正每見法事輒自然欣躍其親愛而異之遂令出家罽賓多出聖達屢值明師博貫群經特深禪法所得門戶極其微奧為人沉邃有慧解儀軌詳正生而連眉故世號連眉禪師少好遊方有如毗羅神王衛送遂至龜茲於中路欲迥乃現形告辭密多曰汝神力通變自在遊處將不相隨共往南方語畢即收影不現遂從至都即於上寺圖像于壁迄今猶有聲影之驗潔誠祈福莫不響應又曰釋智猛雍州新豐人每聞外國道人說天竺國有釋迦遺跡及方等經常慨然有感馳心遐外以為萬里咫尺千載可追遂發長安到罽賓國有五百羅漢常往返於阿耨達地有大阿羅漢見猛至歡喜猛諮問方士為說四天子事猛於奇沙國見佛文石唾壺又於此國見佛鉢光色紫紺四際盡然以香花供養頂戴發願鉢若有應能輕能重既而轉重力遂不堪及下鉢時復不覺重至迦維羅衛國見佛髮佛牙及肉髻骨佛影佛跡炳然具存其所遊踐究觀, WYG: ''}
