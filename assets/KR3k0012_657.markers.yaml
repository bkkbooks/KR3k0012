  - {type: variant, offset: 2309, length: 263, content: 莫肯行者既屢請情至二人推嚴隨行恢道懷素篤禮事甚勤還都即住始興寺嚴性虛靜志避諠塵恢乃為於東郊起精舍即枳園寺也嚴在寺不受別請常分衛自資道化所被幽顯咸伏有見鬼者云見西州太社聞鬼相謂云嚴公當至當辟易此人未之解俄而嚴至聊問姓字果稱智嚴默而識之密加禮異又曰求郍跋摩此云功德鎧累世為王年十四便機見儁遠深有遠度仁愛汎博崇德務善其母嘗須野肉令跋摩辨之跋摩曰有命之類莫不貪生夭彼之命非仁人矣母怒曰設令得罪吾當代汝跋摩他日煮油誤澆其指因謂母曰代兒忍痛母曰痛在汝身吾何能代跋摩曰眼前之苦尚不能代況三途耶母乃悔悟終身斷殺至年十八相工見而謂日君年三十當臨, SBCK: 後梁}
