  - {type: variant, offset: 4528, length: 876, content: 人西海有梵僧印亦從高受學志隘量褊得少為足便謂已得羅漢頓盡禪門高乃密以神力令印於定中備見十方無極世界諸佛說法不同印於一夏尋其所見永不能盡方知定水無底大生愧懼又曰釋僧同韜光晦跡人莫能知居寒山山在長安南四百里將殂告弟子日吾將去矣其夕見火從繩床後出燒身經二日方盡煙焰張天而房不燼弟子收遺灰架以塼塔又曰阿訶羅竭者多行頭陁獨宿山野晉惠帝元康元年乃西入止婁至山石室中坐禪此室水既遠時人欲為開澗竭曰不假相勞乃自起以左腳蹍尺展反室西壁陷沒指既拔足水從中出清香軟美四時不絕來飲者皆止飢渴除病又曰竺法慧本關中人晉康帝建元中至襄陽止羊叔子寺不受別請每乞食輒齎繩床自隨於閑曠之路則施之而坐時或遇雨以油帔自覆雨止唯見繩床不知慧所在訊問未息慧已在繩床每語弟子法照曰汝過去時折一雞腳其殃尋至俄而照為人所擲腳遂永疾又曰涉公西域人言未然之事驗若指掌以苻堅建元十一年至長安能以祕呪呪下神龍每旱堅常請之呪龍俄而龍下鉢中天輒大雨堅及群臣親就鉢觀之咸歎其異又曰杯渡者不知姓名常以木杯渡水因而為目不脩細行神力卓越世莫測其由來唯持一蘆圌子更無餘物向廣陵遇村舍有李家設八關齋先不相識乃直人齋堂而坐置蘆圌於中庭眾以其形陋無恭敬心李見蘆圌當道欲移置墻邊數人舉不能動渡食竟提之而去笑曰四天王福于李家于時有一豎子窺其圌中見四小兒並長四寸面目端正衣裳鮮潔於是追覓不知所在後三日乃見西界蒙籠樹下坐李禮拜請還家供養渡不堪持齋飲酒噉肉至於辛鱠與俗不殊清旦忽云欲得一袈裟中時令辨李即經營至中時未成渡云暫出至冥不返合境聞有異香疑之為怪處處覓渡乃見在北岩下敷敗袈裟於地臥之而死頭前腳後皆生蓮花花極鮮香邑共殯之後數日有人從北來云見渡負廬圌行向彭城乃共開棺唯見鞋履既至彭城有白衣黃欣深信佛法見渡禮拜請還處家家至貧但有麥飯而已渡甘之怡焉止得半年忽語欣云可覓蘆圌三十六枚吾須用之荅云此閒正可有十枚貧無以買恐不盡辦渡曰汝但檢覔宅中應有欣即窮檢果得三十六枚列之庭中雖有其數亦多破損比欣次第熟視皆新完渡密封之因語欣令開乃見錢帛皆滿可百許萬識者謂是杯渡分身他土所得嚫施迴以施欣欣受之皆為功德經一年許渡辭去欣為辦糧食明晨見糧食具存不知渡所在續, WYG: 也}
