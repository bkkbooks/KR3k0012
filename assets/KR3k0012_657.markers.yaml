  - {type: variant, offset: 5417, length: 1, content: 也, WYG: 曰當是阿育王像䧏我長沙寺焉即令弟子三人捧接迎至長沙寺其後罽賔禪師從蜀下入寺禮拜見像光上有梵字便曰是阿育王像何時来此時人方知翼之不謬又曰漢明帝使蔡愔於西域得畫釋迦竒像是優填王旃檀像既至雒明帝即令圗畫至清凉臺中及顯節陵上増一阿含經曰優填王𠡠國内巧匠㑹以牛頭旃檀作佛像形供飬晨夕禮拜是時波斯匿王聞優瑱王作佛像供飬亦召巧匠語言如来形體煌若金光當以真金作佛像即以紫磨作如来相亦五尺餘時閻浮提中始有二像法顯記曰僧尼羅國王以金等身而鑄像髻裝寳珠有盗者以梯取之像漸髙而不及盗歎其不救衆生像俯首而}
