  - {type: variant, offset: 3744, length: 187, content: 麮麥甘粥也釋名曰煮麥曰麮麮亦齲也熟煮之齲壞也急就曰甘麮殊美奏諸君肺䐣說文曰䐣切熟肉內於血中和也釋名曰肺䐣饡也全米糝之如膏鑽也盧湛祭法曰四時祠皆用肺䐣血䘓說文曰羊血曰䘓釋名曰血䘓以血作之增其酸豉之味使甚苦以消膏而加菹其中亦以消酒也盧湛祭法曰春夏秋祠皆用輱血熱洛河唐書曰安祿山思順翰並來朝玄宗使驃騎太將軍內侍高力士及中貴人供奉官於京城東駙馬崔惠童池亭宴會使射生官射鮮鹿取血煮其腸, SBCK: 寒具}
