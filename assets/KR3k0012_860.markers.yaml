  - {type: variant, offset: 547, length: 0, content: '', SBCK: 食經有髓餅法以髓脂合和麺崔寔四民月令曰五月距立秋無食煑餅及水溲餅夏月飲水時此二餅得水即冷堅不消不幸便爲食作傷寒矣以餅置水中則㵕唯酒溲之入則闌也王郎上劉纂等樗蒲曰左中郎樂林得纂麺􅁏共啖湯䴵繆襲􅀕儀曰夏祀以蒸餅盧諶􅀕法曰四時祠用㬅頭餲餅體牢九夏祠別用乳餅冬祠用白環餅荀氏四時列饌注日夏祠以薄液代㬅頭徐暢􅀕記曰舊五月麥熟薦新麥作起漱白餅明皇雜録曰武惠妃生日上與諸公主按舞於萬歳樓下上乗歩輦從􅃨道窺見衛士食畢以餅餌弃水竇中上大怒命髙力士杖殺之上方震怒左右莫敢言者寕王從容謂上曰從􅃨道窺見獲衛士之過而殺之恐人臣不能自安又失大體陛下志在勤儉愛物惡弃於地柰何性命至重重於殘飱者乎上蹶然大悟遽命赦之荆楚歳時記曰六月伏日並作湯餅名爲辟惡時鏡新書曰四月八日長沙市肆之人無子者供寺閣下羊􅁏薄餅結願以乞兒徃徃有驗束晳餅賦曰禮仲春之月天子食麥而朝事之籩煑麥爲麺内則諸饌不􅀃餅然則雖云食麥而未有䴵䴵之作也其來近矣􅀂夫安乾粔籹之倫糺耳狗后之屬釰帶案成餢飳髓燭或名生於里巷或法岀乎殊俗三春之􅀄隂陽交際寒氣旣消温不至􅀬于時享宴則㬅頭冝設呉囬司方純陽布暢服飾飲氷隨隂而凉此時爲餅莫􅀂薄壯啇風旣厲太火西移鳥獸氄毛樹木䟽枝肴饌尚温則起溲可施玄冬猛寒清晨之㑹涕凍􅈹中霜成口外充虚解戰湯餅爲最尓乃重羅之麮丘與切塵飛雪白膠黏䵑䈥䐧溔柔澤􅁏則羊膀豕脅脂膚相半臠􅀂縄首珠連礫散薑株葱本莑音封縷切判剉末椒蘭是灑是和塩漉䜴􅄃合樛亂於是火盛湯涌猛氣蒸作攘衣服振掌握搦俯摶􅋗弥離於指端手縈囬而交錯紛紛馺馺星分雹落籠無逆􅁏餅無流􅋗妹媮咧敕薄而不綻巂巂和和䑋色外見柔如春綿白􅀂秋練氣㪍鬰以􅀭布香飛散而逺遍行人失涎於下風童僕空爵而斜盻擎器者砥脣立侍者千咽􅈛乃換増濯以玄醢鈔以象著要虎丈叩􅂰遍據槃案財投而輙盡庖人叅潭而促遽手未及換増禮復至脣齒旣調口習咽利三籠之後轉更有次􅁃闡惡餅賦序曰范子常者造余􅀫曤鷄爲餅遟御之情甚虚竒嘉之味不實聊作惡餅賦以釋之弘君舉倉檄曰催厨人作茶䴵􅆈油煎葱例茶以絹當用輕羽拂取飛􅋗剛軟中適然後水引細如委綖白如秋練羮杯半在財得一咽十杯之後顔解體潤梁呉均餅􅀃曰宋公至長安得姚泓時故太官承程季者了了人也公曰今日之食何者最先季曰仲秋御景離蟬欲静變變曉風淒淒夜冷臣當此時唯能􅀃䴵公曰善季乃稱曰安定噎鳩之麥雒陽董德之磨河東長􅀂之葱隴西䑛背之牘枹音夫罕赤恥之羊張掖北門之䜴燃以銀屑煎以銀銚洞庭􅀒霜之橘􅄷池車帶之椒調以濟北之塩剉以新豊之雞細如華山玉屑白如梁甫銀渥旣聞香而口悶亦見色而心迷公曰善糗糒書曰峙乃糗粮亡敢弗逐峙具糗熬稻也儀禮曰四籩􅀥糗粟脯左傳曰陳轅頗賦公田嫁公女以爲巳大夫公逐之岀奔鄭道得其族轅咺進稻醴梁糗腵脯焉曰何其給也曰六成而具公羊曰公出奔齊國子執壷漿曰敢致糗從者公稽首以祍受􅀃文曰糒平祕切乾食也糗熬米也乆切釋名曰糗齲也飯而磨散之}
