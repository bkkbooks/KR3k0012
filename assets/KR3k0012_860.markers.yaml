  - {type: variant, offset: 3185, length: 394, content: 以祠門戶魏武帝苦寒行曰行行日已遠人馬同時飢擔橐以取薪斧冰持作糜唐新語曰李勣既貴其姉病必親為煮粥火爇其鬚姉曰僕妾多何自苦若是勣對曰豈為無人耶顧姉年老勣亦年老雖欲久為姉煮粥其可得乎膏糜國語曰勾踐載稻與脂於舟以行稻有膏糜國之孺子之遊者無不餔也無不歠也必問其名為後將用之續齊諧記曰吳縣張成夜起忽見一婦人立於宅東南角舉手招成成便往就之婦人曰此地是君家蠶室我即是此地之神明曰是正月半宜作白粥泛膏於上以祭也當令君蠶桑百倍言絕失所成如言為作膏白粥自此已後年年大得蠶今世人正月半作膏糜像此糝周易曰鼎折足覆公餗鄭玄曰糝謂之餗震又為竹竹萌曰荀荀者餗之米也詩云其餗唯何周禮曰醢人掌羞豆之實酏食糝食記曰犬羹莬羹和糝不蓼凡羹齊宜五味之和朱屑之糝蓼則不也又曰糝取牛羊豕之肉三如一小切之與稻米稻米二肉一合以為餌煎之此周禮糝食也說文曰糂以米和羹也糂與糝同宗躬孝子傳曰桑虞喪父十四日食百粒糝藜藿墨子曰孔子窮陳蔡之間藜蒸不糂𥻨, SBCK: 巨下汝}
