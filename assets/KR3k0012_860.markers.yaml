  - {type: variant, offset: 1016, length: 312, content: 進三呵德公姿無變容顏色殊悅林宗乃曰始見子之面今乃知卿心遂友善之卒為妙士宋書曰戴顒與兄教並隱遁有名中書令王綏嘗攜客之㪍等方進豆粥綏曰聞卿善琴試欲一聽不荅綏恨而去又曰何子平大明末東土飢荒繼以師旅家有大喪八年不得營葬晝夜號哭常如袒括之日冬不衣絮暑避清涼一日以數合米為粥不進鹽菜齊書曰宣考陳皇后生高帝高帝年二歲乳人乏乳后夢人以兩甌麻粥與之覺而乳驚因此豊足梁書曰昭明太子統母丁貴殯薨水漿不入口每哭慟絕武帝命中書舍人顧恊宣旨曰毀不滅性聖人之制不勝喪比於不孝有我在那得自毀如此耶即強進飲粥太子奉勑乃進數合自是至葬日進麥粥一升武帝又勑曰聞汝所進食過少轉羸瘦我比更無病正為汝胸中亦圮塞成疾故應加饘粥不使我恒懸心雖屢奉勑勸逼終喪日止一溢米不嘗菜, SBCK: ''}
