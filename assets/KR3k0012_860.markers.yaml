  - {type: variant, offset: 1391, length: 198, content: 又曰任昉為義興太守歲荒散私俸米豆為粥活三千餘人又曰王志天監初為丹陽尹時年飢每旦為粥於郡門以賦百姓眾悉稱惠又曰劉覽字孝智十六通老易位中書郎以所生母憂廬于墓再朞不嘗鹽酪食麥粥而已又曰有河南孝廉秦綿遭母喪送葬不忍復還鄉人為作菴仍止其中若遇有米食粥無米食菜而已又曰庾沙彌母劉氏亡水漿不入口累日初進大麥薄飲經十旬方為薄粥終喪不食鹽酢陳書曰張昭弟乾字玄明聰敏好學亦有至性父卒兄弟日唯食一升麥屑粥後魏書曰崔浩道, SBCK: 建}
