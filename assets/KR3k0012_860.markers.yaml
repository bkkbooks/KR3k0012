  - {type: variant, offset: 536, length: 3, content: 曹褒遷, SBCK: 光武問弟五倫曰聞卿爲市􅁺人有遺卿母一笥餅卿從外來見之奪母飼􅊥口中餅岀有之乎倫對曰實無此衆人以臣愚蔽故爲出此言耳英雄記曰李叔節與弟進先共在乗氏城中吕布詣乗氏城下叔節從城中岀詣布進先不肯出爲叔節殺數頭肥牛提數十石酒作萬枚胡餅先持勞客魏志曰漢末趙歧避難逃之河間不知姓字又轉詣北海着絮巾袴常於市中販胡餅孫賔碩時年二十餘乗犢車}
  - {type: page-break, offset: 536, content: '', id: KR3k0012_SBCK_860-1b}
  - {type: variant, offset: 536, length: 3, content: 曹褒遷, WYG: 光武問第五倫曰卿為市掾人有遺卿母百笥餅卿從外來見之奪母笥探口中餅出有之乎倫對曰實無此衆人以臣愚蔽故為出此言耳英雄記曰李叔節與弟進先共在乗氏城中吕布詣乗氏城下叔節從城中出詣布進先不肯出為叔節殺數頭肥牛提數十石酒作萬枚胡餅先持投客魏志曰漢末趙岐避難逃之河間不姓字又轉詣北海著絮巾袴常於市中販胡餅孫賔碩時年二十餘乗犢車}
  - {type: page-break, offset: 536, content: '', id: KR3k0012_WYG_860-2a, image: WYG0900/WYG0900-0526c.png}
  - {type: variant, offset: 536, length: 3, content: 曹褒遷, krp: 光武問弟五倫曰聞卿爲市掾人有遺卿母一笥餅卿從外來見之奪母飼探口中餅岀有之乎倫對曰實無此衆人以臣愚蔽故爲出此言耳英雄記曰李叔節與弟進先共在乗氏城中吕布詣乗氏城下叔節從城中岀詣布進先不肯出爲叔節殺數頭肥牛提數十石酒作萬枚胡餅先持勞客魏志曰漢末趙歧避難逃之河間不知姓字又轉詣北海着絮巾袴常於市中販胡餅孫賔碩時年二十餘乗犢車}
  - {type: variant, offset: 540, length: 0, content: '', SBCK: 􅀐入市觀見歧疑其非常人也因問之自有餅耶歧曰販之賔碩曰買幾錢賣幾錢歧曰買三十賣亦三十賔碩曰視處士之望非買餅者殆有故乃開車後户頋所將兩􅀐令下馬扶上之時歧以爲是唐氏耳目也甚怖面失色賔碩閇後户下前䄡謂之曰視處士􅃺皃旣非販餅者如今面色變動即不有重怨則當亡命我北海孫賔碩闔門百口又有百歳老母在堂勢能相度者也終不相􅀒必語我以實歧乃具告之賔碩遂載歧以駈歸又曰嚴翰字公仲學問特善春秋公羊司􅊢鍾繇不好公羊而奸左氏謂左氏爲太官而謂公羊爲賣餅家又曰盧毓爲吏部尚書時舉中書郎昭曰得其人與不在盧生耳選舉莫取有名名如􅀞地}
  - {type: page-break, offset: 540, content: '', id: KR3k0012_SBCK_860-2a}
  - {type: variant, offset: 540, length: 0, content: '', WYG: 騎入市觀見岐疑其非常人也因問之自有餅耶岐曰販之賔碩曰買幾錢賣幾錢岐曰買三十賣亦三十賔碩曰視處士之望非賣餅者殆有故乃開車後户顧所将兩騎令下馬扶上之時岐以為是唐氏耳目也甚怖面失色賔碩閑後户下前檐謂之曰視處士􅃺貌既非販餅者如今面色變動即不有重怨則當亡命我北海孫賔碩闔門百口又有百歲老母在堂勢能相度者也終不相負必語我以實岐乃具告之碩遂載岐以騎歸又曰嚴翰字公仲學問特善春秋司𨽻鍾繇不好公羊而好左氏謂左氏為太官而謂公羊為賣餅家又曰盧毓為吏部尚書時舉中書郎詔曰得其人與不在盧生耳選舉莫取有名名如畫地}
  - {type: page-break, offset: 540, content: '', id: KR3k0012_WYG_860-2b, image: WYG0900/WYG0900-0526d.png}
