  - {type: variant, offset: 545, length: 1, content: 襃, WYG: 王氏諸子皆俊令使選壻諸子皆餙容以待客羲之獨坦腹東床食胡餅神色自若使具以告虞卿曰此真吾子壻也問為誰果是逸少乃妻之晉陽秋曰惠帝崩由食餅也又曰王歡躭學貧寠或人惠蒸餅一顆以充一日妻子常有菜色宋書曰王恱之為吏部隣省有會同者遺恱之餅一甌辭不受曰此費誠小然少來不願當之蕭子顯齊書曰永明九年正月詔太廟四時祭荐宣皇帝麵起餅又曰何戢為司徒左長史太祖為領軍與戢來復往置歡宴上好水引餅戢令婦女躬自執事以設上焉梁書曰武帝嘗設大臣餅蔡樽在坐帝頻呼其姓名樽竟不答食餅如故帝覺其負氣乃改喚蔡尚書樽始放筯執笏曰呼帝曰卿向聾今何聰對曰臣預為右武職在納言陛下不應以名垂喚帝有慚色趙録曰石勒諱胡胡物皆改名胡餅曰摶鑪石虎改曰麻餅又曰石虎好食蒸餅常以乾􅀥胡桃瓤為心蒸之使圻裂方食及為冉閔所簒幽廢思其不裂者不可得後魏書曰胡叟不治産業常苦飢貧能不以為恥飬子字螟蛉以自結常作布嚢容三四斛飯噉醉飽便盛肉餅以付螟蛉見車馬華榮者視之蔑如也北齊書曰庫狄伏連冬至日親表稱賀其妻設豆餅問曰此豆餅何處得来妻對曰於食中減連大怒後周書曰樊深以父遇害因避難墜崖傷足絶食再宿後遇得一簞餅欲食之然念繼母年老患痺或免虜掠乃弗食夜中匍匐尋覔毋得相見因以饋母還復遁去改易姓名逰學於汾晉之間唐書曰僧萬廻閿鄉人也恢諧似狂發言屢中其兄戍邊五載母思之萬廻年㓜請詣兄所䇿竹馬去經宿而返白母曰兄還矣請辦餅更往迎之數日持襆乃戍子衣也尋而子至母大驚范子曰餅出三輔墨子曰魯陽文君云有人於此牧羊芻豢不可勝食也見人作餅即還而竊之楚四境之田蕪廣不可勝闢見宋鄭之門邑則還而竊之與彼異乎抱朴子曰莽之世賣餅小人皆得等級斗筲之徒兼金累紫揚子云確然忠貞之節形矣三輔舊事曰太上皇不樂闗中髙祖徙豐沛屠兒沽酒賣餅商人立為新豐縣故一縣多小人李固别傳曰質帝暴得疾云食煮餅腹中悶遂崩蔡質漢官儀曰尚書郎直太官供餅餌五熱𤣥晏春秋曰衛倫過予而讌論及於味倫稱侍中劉子揚食餅知鹽生精味之至也予曰昔師曠識勞薪易牙别淄澠子揚之妙抑末乎倫曰晉曠齊牙古之精也魏之子揚今妙也子何間焉語林曰何平叔面絶白魏文帝疑其着粉正夏月喚來與熱湯餅大汗出隨以朱衣自拭色轉皎然幽明録曰姚泓叔父大将軍紹總司戎正召胡僧問以以休咎僧乃以麵為大胡餅形徑一丈僧坐在上先食正西次食正北次食正南所餘卷而吞之訖便起去了無所言是歲五月楊盛大破姚軍於清水九月晉師北討掃定潁洛明年遂席卷鄷鎬生禽泓焉葛洪神仙傳曰壺公者從逺方來賣藥常懸一壺於坐上每日入後跳入壺中市掾費長房於樓上見之知非常人也身為掃除并進餅公令長房共跳入壺但見樓觀五色重門閣道侍者數十人京兆舊事曰蕭彪為巴郡守父老歸供養父嗜餅從至市立車下自進之廷尉决事曰廷尉上士張柱私賣餅為蘭臺令史所見方言曰餅謂之飥或謂之餦或謂之餛說文曰餅麵餈也雜五行書曰十月亥日食餅令人無}
