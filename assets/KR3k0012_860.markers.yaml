  body:
  - {type: variant, offset: 4, length: 62, content: 七糜粥周書曰黃帝始烹穀為粥記曰仲秋養衰授几杖行麋粥飲食行酒賜也又曰公叔文子卒其子請謚於君君曰昔者衛國凶飢夫子為粥與國之餓者是, SBCK: 八餅糗糒餌粢}
  - {type: variant, offset: 4, length: 290, content: 七糜粥周書曰黃帝始烹穀為粥記曰仲秋養衰授几杖行麋粥飲食行酒賜也又曰公叔文子卒其子請謚於君君曰昔者衛國凶飢夫子為粥與國之餓者是不亦惠乎又曰悼公之喪季昭子問於孟敬子曰為君何食悼公魯哀公之子昭子康子之曾孫名強敬子武伯之子名捷敬子曰食粥天下之達禮也又曰穆公之母卒穆公魯哀公之曾孫使人問於曾子曰如之何問居喪之禮曾子曾參之子名申對曰申也聞諸申之父曰哭泣之哀齊斬之情饘粥之食自天子達子喪父母尊卑同又曰親始死三日不舉火故鄰里為之麋粥以飲食之又曰君之喪子大夫公子眾士皆三日不食子大夫公子食粥納財朝一溢米莫一溢米食之無筭又曰大夫之喪主人室老子姓皆食粥左傳曰晉人執衛侯歸之于京師寘諸深室甯子納橐饘焉饘粥, WYG: 八}
  - {type: variant, offset: 4, length: 62, content: 七糜粥周書曰黃帝始烹穀為粥記曰仲秋養衰授几杖行麋粥飲食行酒賜也又曰公叔文子卒其子請謚於君君曰昔者衛國凶飢夫子為粥與國之餓者是, krp: 八餅糗糒餌粢}
