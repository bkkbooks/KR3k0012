  - {type: variant, offset: 547, length: 0, content: '', WYG: 食經有髓餅法以髓脂合和麵崔寔四民月令曰五月距立秋無食煮餅及水溲餅王郎上劉纂等樗蒲曰左中郎樂林得纂麵肉共啖湯餅繆襲祭儀曰夏祀以蒸餅盧諶祭法曰四時祀用㬅頭餅髓餅牢九夏祠别用乳餅冬祠用白環餅徐暢祭祀記曰舊五月麥熟薦新麥作起潄白餅明皇雜録曰武惠妃生日上與諸公主按舞於萬歲樓下上乗歩輦從複道窺見衛士食畢以餅餌棄水竇中上大怒命髙力士杖殺之上方震怒左右莫敢言者寧王從容謂上曰從複道窺見獲衛士之小過而殺之恐人臣不能自安又失大體陛下志在勤儉愛物惡棄於地柰何性命至重重於踐飱者乎上蹶然大悟遽命赦之荆楚歳時記曰六月伏日並作湯餅名為辟惡時鏡新書曰四月八日長沙市肆之人無子者供寺閣下羊肉薄餅結願以乞兒往往有驗束晳餅賦曰禮仲春之月天子食麥而朝事之籩煮麥為麵内則諸饌不說餅然則雖云食麥而未有餅餅之作也其來近矣若夫安乾粔籹之倫豚耳狗舌之屬劍帶案成餢飳髓燭或名生於里巷或法出乎殊俗三春之初陰陽交際寒氣既消温不至熱于時享宴則㬅頭宜設吴回司方純陽布暢服絺飲氷隨隂而凉此時為餅莫若薄壯商風既厲大火西移鳥獸氄毛樹木踈枝肴饌尚温則起溲可施𤣥冬猛寒清晨之㑹涕凍鼻中霜凝口外充虛解戰湯餅為最爾乃重羅之􅲑塵飛白雪膠黏䵑筯䐧溔柔澤肉則羊膀豕脅脂膚相半臠若蜿首珠連礫散薑枝葱本萃縷切判辛桂剉末椒蘭是畔和鹽漉䜴攬合樛亂于是火盛湯湧猛氣蒸作攘衣振服握搦拊搏麵彌離於指端手縈囬而交錯紛紛駁駁星分雹落籠無逆肉餅無流麵姝媮冽敕薄而不綻嶲如和䑋晶色外見柔如春綿白若秋練氣勃欝以揚布香飛散而逺遍行人失涎於下風童僕空噍而斜盻擎器者砥唇立侍者干咽爾乃換増濯以𤣥醢鈔以象著􅀈要虎丈叩膝遍據槃案財投而輙盡庖人叅潭而促遽手未及換増禮復至脣齒既調日習咽刮三籠之後轉更有次庾闡惡餅賦序曰范子常者造余宿曤鷄為餅遲御之情甚虛竒嘉之味不實􅂓佐惡餅賦以釋之𢎞君舉食檄曰催厨人作茶䴵熬油煎葱例茶以絹當用輕羽拂取飛麵剛軟中適然後水引細如委綖白如秋練羮杯半在財得一咽十杯之後顔解體潤梁吴均餅說曰宋公至長安得姚泓時故太官丞程季者了了人也公曰今日之食何者為先季曰仲秋御景離蟬欲静燮燮曉風凄凄夜冷臣當此時唯能說餅公曰善季乃稱曰安定噎鳩之麥雒陽董徳之磨河東長若之葱隴西䑛背之犢枹罕赤髓之羊張掖北門之豉燃以銀屑煎以銀銚洞庭負霜之橘仇池連蒂之椒調以濟北之鹽剉以新豐之雞細加華山玉屑白如梁甫銀埿既聞香而口悶亦見色而心迷公曰善糗糒書曰峙乃糗粻亡敢弗逮儀禮曰四籩􅀥糗栗脯左傳曰陳轅頗賦封田以嫁公女有餘以為己大器公逐之出奔鄭道暍其族轅咺進稻醴梁糗腵脯焉曰何其給也曰器成而具公羊曰公出奔齊國子執壺漿曰敢糗從者公稽首以衽受說文曰糒乾食也糗􅆈米也釋名曰糗齲也飯而磨散之}
