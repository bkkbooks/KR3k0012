  - {type: variant, offset: 545, length: 1, content: 襃, SBCK: 王氏諸子皆後令使選壻諸子皆飾容以待客羲之獨坦腹東床囓胡餅神色自􅀂使具以告虞卿曰此真吾子壻也問爲誰果是逸少乃妻之晉陽秋曰惠帝崩由食餅也又曰王􅂬躭學貧窭或人惠蒸餅一軸以充一日妻子常有菜色宋書曰王恱之爲吏部郎隣省有㑹同者遺恱之餅一甌辭不受曰此費誠小然少來不願當之蕭子顯齊書曰永明九年正月詔太廟四時􅀕薦宣皇帝􅋗起餅又曰何戢爲司徒左長史太祖爲領軍與戢來徃數置􅂬宴上好水引餅戢令婦女躬自執事以設上焉梁書曰武帝甞設大臣䴵蔡樽在坐帝頻呼其姓名樽竟不荅食餅如故帝覺其􅀒氣乃改喚蔡尚書樽始放筯執笏曰唯帝曰卿向聾今何聦對曰臣預爲右武且職在納言陛下不應以名垂喚帝有慙色也趙録曰石勒諱胡胡物皆改名胡餅曰􅅮鑪石虎改曰麻餅又曰石虎好食蒸餅常以乾􅀥胡桃瓤爲心蒸之使坼裂方食及爲冉閔所􅆲幽廢思其不裂者不可得後魏書曰胡􅅱不治産業常苦飢貧能不以爲耻養子字螟蛉以自結常作布囊容三四斛飲噉醉飽便盛􅁏餅以付螟蛉見車馬榮華者視之蔑如也北齊書曰庫狄連冬至日親表稱賀其妻爲設豆餅連問此豆餅何處得來妻對曰於食中减連大怒後周書曰樊􅀷以父遇宫因避難墜崖傷足絶食再􅀫後遇得一簞餅飲食之然念繼母年老患痺咸免虜掠乃弗食夜中匍匐尋覔母過得相見因以饋母還復遁去改易姓名遊學於汾晉之間唐書曰僧万廻閿郷人也恢諧以狂發言屢中其兄戍邊五載母思之万廻年㓜請詣兄所䇿竹馬去經歸而返白母曰兄還矣請辦餅更徃迎之數日持襆而至母發襆乃戌子衣也尋而子至母大驚范子曰餅岀三輔墨子曰魯陽文君云有人於此牧羊芻豢不可勝食也見人作餅即還然竊之楚四境之田蕪廣不可勝闢見宋鄭之門邑則還然竊之與彼異乎枹朴子曰莽之丗賣餅小人皆得等級斗筲之徒兼金累紫楊子雲確然忠貞之節形矣三輔舊事曰太上皇不樂關中髙祖徙豐沛屠兒沽酒賣餅啇人立爲新豐縣故一縣多小人李固別傳曰質帝􅁀得疾云食煑餅腹中悶遂崩蔡質漢官儀曰尚書郎直太官供餅餌五熟玄晏春秋曰衛倫過予而讌論及於味倫稱侍中劉子楊食餅知塩生精味之至也予曰昔師曠識勞薪易牙別淄渑子楊之妙抑末乎倫曰晉曠齊牙古之精也魏之子楊今之妙也子何間焉語林曰何平叔面絶白魏文帝疑其着粉正夏月喚來與􅀬湯餅大汗出隨以朱衣自拭色轉皎然幽明録曰姚泓叔父大將軍紹揔司戎政召胡僧問以休咎僧乃以麺爲大胡餅形徑一丈僧坐其上先食正西次食正北次食正南所餘卷而吞之訖便起去了無所言是歳五月楊盛大破姚軍於清水九月晉師北討掃定熲洛明年遂席卷鄷鎬生禽泓焉􅁑洪神仙傳曰壷公者從逺方來賣藥常懸一壷干坐上每日入後跳入壷中市􅁺費長房於樓上見之知非常也身爲掃除并進餅公令長房共跳入壷但見樓觀五色重門閣道侍者數十人京兆舊事曰蕭彪爲巴郡守父老歸供養父􅄝餅從至市立車下自進之廷尉決事曰廷尉上士張柱私賣餅爲蘭臺令史所見方言曰餅謂之飩徒昆切或謂之餦音張或謂之餛音渾􅀃文曰餅麺餈也雜五行書曰十月亥日食餅令人無}
