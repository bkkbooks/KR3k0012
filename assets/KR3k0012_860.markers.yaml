  - {type: variant, offset: 1590, length: 489, content: 季年威風嚴峻官省左右以微過得罪莫不逃避隱匿自下皆變浩獨恭勤不怠或終日不歸帝知之輒命賜以御粥又曰薛真度為豫州刺史景明初豫州大飢真度輒表曰別出倉米五十斛為粥救其甚者詔曰真度所表甚有憂濟百姓之意宜在極卹也又曰文明太后崩孝文五日不食楊椿諫曰聖人之禮毀不滅性縱陛下欲自賢於萬代其若宗廟何帝感其言乃一進粥又曰楊逸為光州刺史時災儉連歲逸欲以倉粟賑給而所司懼罪不敢逸曰國以人為本人以食為命假令以此獲戾吾所甘心遂出粟然後申表右僕射元羅已下謂公儲難闕並執不許尚書令臨淮王或以為宜貸二萬詔聽貸五萬逸既出粟之後其老小殘疾不能自存活者又於州門造粥飼之將死而得濟者以萬數帝聞而善逸又曰韋朏字遵顯少有志業年十八辟州主簿時屬歲儉朏以家粟造粥以飼飢人所活者甚眾又曰房景遠字升遐重然諾好施與儉分贍宗親又於通衢以粥食餓者存濟甚眾平原劉郁行造兗境忽遇劫賊已殺十餘人次至郁郁曰與君鄉近何忍見殺賊曰若言鄉里親親是誰郁曰齊州主簿房陽是我姨兄陽是遠小字賊曰我食其粥得活何得殺其親遂還衣服蒙活者二十餘人又曰李搔妹曰法行幼出家為尼後遭時大儉施糜粥於路北齊書曰李士謙遇年飢多有死者士謙罄家資為之糜粥賴以全活者萬計後周書曰皇甫遐字永賢, SBCK: 􅀄拜}
