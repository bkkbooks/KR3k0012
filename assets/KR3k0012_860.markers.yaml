  - {type: variant, offset: 2248, length: 184, content: 故治書覆汝汝豈誠臣豈孝子不誠不孝何以為人於是流涕嗚咽親持盂粥勸讓令食既而上表求哀詞情甚切上愍然為之改容獻皇后甚奇其意致請於上遂下詔可減死為民太公金匱曰武王伐紂都洛邑而雪深丈餘不知何五大夫乘馬車從兩騎止王門外師尚父使人持一器粥出開門而進曰先生大夫在內方對天子未有出時天寒故進熱粥以御寒莊子曰顏回有負郭之田五十畝足以供饘粥七略曰宣帝詔徵被公見誦楚辭被公年衰母老每一誦輒與粥, SBCK: 如}
