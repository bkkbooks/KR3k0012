  - {type: variant, offset: 548, length: 5, content: 致醫藥糜粥, SBCK: 齲碎也餱侯也候人飢者以飡之漢書曰李陵擊匈奴兵敗令軍士人持二􅂛糒一片氷相待東􅀚漢記曰嚴尤擊江賊世祖奉糗一斛脯三十朐又曰隗囂且病餓岀城飡糗糒腹張悉憤而死也又曰張禹廵行守舎止大樹下食糒乾飯屑飲水而巳後年貧人來歸者千餘戸又曰賀􅀇字文弘爲九江太守行縣齎持乾糒但就温湯而巳}
