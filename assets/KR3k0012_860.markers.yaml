  - {type: variant, offset: 2459, length: 436, content: 老父年尊絕意世仕遂不得避也魏武遺令曰吾夜半覺小不佳至明日飲粥汗出服當歸湯譙子法訓曰或曰母有疾使其妻為粥者妻不可以刀擊之夷其面可以為孝乎曰以刀刃妻其親必駭而有憂及之何有於孝郭子曰許允為吏部郎多用其鄉里帝遣虎賁收之婦云無憂尋還作粟粥待之語林曰石崇為客作豆粥咄嗟便辦王愷乃密貨崇帳中都督曰豆難煮唯豫作熟豆以白粥投之續搜神記曰劉他茍蒙在夏口忽有鬼來喜偷食劉即於他家煮治葛取二升汁蜜齎還家向夜令舉家糜食餘一甌因寫治葛汁著中於几上以甕覆至人定後聞鬼發甕啖糜須臾在屋頭吐至四更中寂然於此遂絕也徐廣晉記曰愍帝建興四年京城糧盡屑麴為粥以供帝食錄異傳曰周時尹氏貴盛五世不別會食數千人遭飢荒羅鼎作糜啜之聲聞數十里鄴中記曰并州之俗以冬至後百五日介子推斷火冷食三日乾粥中國為寒食涼州異物志曰高昌僻土有異於華寒服冷水暑啜羅闍闍受車切此郡人作糜粥啜之俗號闍也南越志曰陵廬城中有井半清半黃黃者甜滑宜作粥色如金似灰汁甚芬馨世說曰郄嘉賓三伏之月詣謝公炎暑重赫雖當風交扇猶霑汗流離謝著故練衣食熱白粥郄謂謝曰自非, SBCK: 賢}
