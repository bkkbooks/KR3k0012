  - {type: variant, offset: 284, length: 1, content: 平, krp: 求謀臣無乃後乎又曰吴夫差使王使孫苟告勞于周曰齊人爲不道不供承王事夫差不忍𬒳甲帶劒簦笠相望於女陵簦笠備雨器也天舎其裏齊師還言敗而還夫差豈敢自多又曰管仲曰今夫農羣萃而州處察其四時時雨旣至梜其槍刈耨鏄以旦暮從事於田野脫衣就㓛首戴茅蒲身衣裰襫音撥襫茅蒲簦笠也襏襫蓑也沾體塗足以從事於田野史記曰瞽瞍使舜上廪從下焚廪舜乃以雨笠自杆而下得不死}
  - {type: punctuation, offset: 286, content: 。, id: KR3k0012_CHANT_765-bkkpn96}
