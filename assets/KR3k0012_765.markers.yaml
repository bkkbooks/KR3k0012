  - {type: punctuation, offset: 17, content: ，, id: KR3k0012_CHANT_765-bkkpn7}
  - {type: 'tls:seg', offset: 17, content: '', id: KR3k0012_CHANT_765-1a.7}
  - {type: variant, offset: 18, length: 0, content: '', SBCK: 曰宋災樂喜爲司城以爲政陳畚梮具綆􅇲畚籠也􅀳中興書曰王猛少貧賤鬻畚爲事常至洛陽貨畚}
  - {type: variant, offset: 18, length: 0, content: '', krp: 曰宋災樂喜爲司城以爲政陳畚梮具綆缶畚籠也晉中興書曰王猛少貧賤鬻畚爲事常至洛陽貨畚}
  - {type: variant, offset: 19, length: 0, content: '', SBCK: 一人於市貴買其畚云家近在此可隨我取直猛隨去忽至深山中此人語猛且住樹下當先啓道君湏􅁷猛進見一老公踞牀髭鬢悉白侍從十許人引猛云大司馬公可進猛因拜老公曰王公何縁拜即十倍雇畚直遣人送猛岀山旣頋視乃是嵩髙山也淮南子曰禹之時天下大水禹身執畚鍤以爲民先韓詩外傳曰鮑焦衣弊膚見挈畚持􅂼遇子貢曰吾子何以至於此鮑焦曰天下之遺徳教者衆矣吾何以不至此子貢曰吾聞非其世者不至其利汚其君者不履其土今子非其世而持其􅂼乎鮑焦曰吾聞賢者易進而輕退廉士易愧而輕死乃􅂢其􅂼立枯於洛水之上斛量附廣雅曰斛謂之鼔方斛謂之角書曰恊時月正日同律度量衡合四時之氣}
  - {type: page-break, offset: 19, content: '', id: KR3k0012_SBCK_765-3a}
  - {type: page-break, offset: 19, content: '', id: KR3k0012_SBCK_765-3b}
  - {type: variant, offset: 19, length: 5, content: 節則用此釿, WYG: 箕載翕其舌禮曰凡為長者糞}
  - {type: variant, offset: 19, length: 0, content: '', krp: 一人於市貴買其畚云家近在此可隨我取直猛隨去忽至深山中此人語猛且住樹下當先啓道君湏臾猛進見一老公踞牀髭鬢悉白侍從十許人引猛云大司馬公可進猛因拜老公曰王公何縁拜即十倍雇畚直遣人送猛岀山旣頋視乃是嵩髙山也淮南子曰禹之時天下大水禹身執畚鍤以爲民先韓詩外傳曰鮑焦衣弊膚見挈畚持𬞞遇子貢曰吾子何以至於此鮑焦曰天下之遺徳教者衆矣吾何以不至此子貢曰吾聞非其世者不至其利汚其君者不履其土今子非其世而持其𬞞乎鮑焦曰吾聞賢者易進而輕退廉士易愧而輕死乃捐其𬞞立枯於洛水之上斛量附廣雅曰斛謂之鼔方斛謂之角書曰恊時月正日同律度量衡合四時之氣}
