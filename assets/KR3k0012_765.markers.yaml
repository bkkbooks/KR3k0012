  - {type: variant, offset: 758, length: 7, content: 劉伶常乘鹿車攜, SBCK: 虞卿觧其相印與魏齊間行走大梁欲因信陵君以走楚信陵君未肯見曰卿何人齊曰虞卿躡履檐簦}
  - {type: variant, offset: 758, length: 0, content: '', WYG: 汜埽曰埽埽席前曰拚拚方問切席不以鬛執箕膺擖又曰良弓之子必學為箕史記曰張儀說楚王曰大王誠能聽臣臣請使秦太子入質於楚楚太子質於秦請以秦女為大王箕帚之妾效萬室之都以為湯沐之邑又曰鄒子如燕昭王擁篲先驅請列子之坐而受業漢書曰秦為亂政虐刑殘滅天下北為長城之役南有五嶺之城内外搔動百姓罷音皮弊頭㑹箕歛計人頭數出榖以箕歛之以供軍費又曰上歸櫟陽五日一朝太公家令說曰天無二日土無二王帝雖子人主也太公雖父人臣也奈何令人主拜人臣如此則重威不行後上朝太公太公擁篲迎門郤止上大驚下扶太公太公曰帝人主也奈何以我亂天下法也又曰魏勃欲見齊相曹參無因常早掃參之門又曰賈誼上書曰秦人借父擾鋤慮有德色母取箕帚立而誶語晉書曰王獻之善𨽻書有父風以掃帚沾泥書大字方一丈甚善王隱晉書曰庾衮孤兄女曰芳將嫁美其服矣衮刈荆苕為箕帚焉召諸子于堂男女以班而謂芳曰汝少孤今汝適人将事舅姑洒掃庭内婦人之道故賜汝此匪器之美欲汝之温恭朝夕雖休勿休也齊書曰}
