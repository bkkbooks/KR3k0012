  - {type: variant, offset: 1326, length: 174, content: 古有行道人陌上見三叟年各百餘歲相與鋤禾莠住車問三叟何以得此壽上叟前致辭內中嫗貌醜中叟前致辭量腹節所受下叟前致辭暮臥不覆首要哉三叟言所以能長久錐左傳曰錐刀之末將盡爭之史記曰平原君曰夫賢士之處世譬若錐之處囊中其末立見戰國策曰蘇秦行而歸負書檐囊父母不與之秦歎曰皆秦之罪也乃夜發書陳篋數十得太公陰符伏而讀之欲睡引錐自刺其股血流至踵王隱晉書曰梅陶及鍾雅數記餘, SBCK: 靈溪可潜盤安}
