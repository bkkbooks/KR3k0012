  - {type: variant, offset: 211, length: 523, content: 目前大廈之器具矣夢書曰斤斧為選士取有材夢得斤斧選士來鏟釋名曰鏟平削也廣雅曰籤子簾切謂之鏟也鮑昭蕪城賦曰鏟利銅山鐁釋名曰鐁彌也有高下跡以此鐁彌其上而平之鑢說文曰鑢錯銅鐵也方言曰錯鑢互名也韓詩曰如磨如錯鎌釋名曰鎌廉也體廉薄其所刈稍稍取之似廉者也東觀漢記曰山陽郡人江伯欲嫁姉姉引鎌欲自割魏略曰孟康字公休為弘農太守時出按行勑吏卒各持鎌自刈馬草說苑曰孔子聞哭者聲甚悲進見之吾丘子也吾一曰虞擁鎌帶索而哭孔子問何哭之悲對曰吾有三失子曰願聞三失曰吾少好學周遍天下還後吾親亡是一失也素尚高節不事庸君臣節不遂二失也少擇交遊寡於親友老而無託是三失也請從此辭投水而死孔子曰弟子記之此足以為戒於是歸養親者十有二三風俗通曰鎌刀自揆積芻蕘之効鍠異苑曰長山郭悖元嘉十二年病亡後孫兒見悖著帽布裙在靈床上呼孫與語云今得七日假假滿便去今將二小兒捉僕在門可就取也孫求僕即得又云汝叔從都還得鍠犁鐴音辟可試取看便以呈之仍以兩鐵相加鎗鎗作聲語孫曰我無復歸緣從此而絕斨毛詩豳七月曰取彼斧斨以伐遠揚又破斧曰既破我斧又缺我斨鏵釋名曰鍤鍤地起土也或曰削能有所穿削也或曰鏵刳也刳地為坎也晉書安帝紀曰吳興王淡父為鄰人竇度所殺淡年十歲陰有復讎之志至年十八密索利鍤刃佯若耕耘經一橋下伺度舡行還伏杖於草中淡於橋, WYG: 箕}
