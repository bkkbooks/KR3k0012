  - {type: 'tls:seg', offset: 286, content: '', id: KR3k0012_CHANT_765-6a.7}
  - {type: variant, offset: 286, length: 1, content: 鑢, krp: 又曰虞卿觧其相印與魏齊間行走大梁欲因信陵君以走楚信陵君未肯見曰卿何人齊曰虞卿躡履檐簦一見趙王賜白璧一雙黄金百鎰再見拜爲上卿聞君急士之窮而歸公子吴志曰吕蒙汝南人代鄧當爲將定南郊約軍中不得于人家有所求取蒙麾下士是汝南人取民家一笠以覆官鎧蒙以爲犯軍令不可以郷里故廢法遂斬之晏子曰景公出遊曰嗚呼使古而無死何如晏子曰若使古而無死丁公太公將有齊國吾將戴笠衣褐以行畎畝之中也風土記曰越人結交約曰卿雖乗車我戴笠後日相逢下車揖盛弘之荆州記曰冝都有風穴樵人有冬過者置笠穴口風吹吸之經日還渉長陽溪而得其笠則知溪穴潜通矣馮敬通詣鄧禹牋曰今日裘與蓑孰急見雨則裘不用上堂則蓑不御此更爲適者也今敬通逢堂蓑之不御也本草曰敗天公主鬼注精魅此竹笠之敗也曹植九詠曰越江兮刈蘭暮秋兮薄寒𬒳蓑兮戴笠置露兮踐雚王褒撞約曰雨墮如注瓮板薜戴子公薜蓑衣也子公笠也桔橰通俗文曰機汲曰桔橰禮曰棒席如橋衡鄭玄曰井上桔橰衡在上低仰者也莊子曰子貢南逰楚漢隂見一丈人爲圃畦於漢隂鑿隧而入井抱甕而灌用力多而見功寡子貢曰鑿木爲機後重前輕挈水若流其名桔橰圃者曰聞有機事必有機心吾非不知羞不爲也又曰獨不見夫桔橰者乎引之則俯舎之則仰彼人之所引非引人者也故俯仰而不得罪於人汝南先賢傳曰蔡君仲井桔橰壤在母年命上憂不敢治而扶老生繞之扶老藤也生繞桔橰不湏治孝之感也揓枷青移架禮曰男女不同揓枷又曰不敢懸於夫之揮音揮揓竿謂之揓爾雅曰日竿謂之揓郭璞注曰衣架也古詩曰甖中無升米架上無懸衣梯}
