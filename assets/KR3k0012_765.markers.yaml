  - {type: variant, offset: 20, length: 0, content: '', SBCK: 月之大小月之甲乙齊一也律法制及尺丈斛斗斤兩皆均同周禮曰㮚氏俗作爲量改煎金賜}
  - {type: variant, offset: 20, length: 0, content: '', krp: 月之大小月之甲乙齊一也律法制及尺丈斛斗斤兩皆均同周禮曰㮚氏俗作爲量改煎金賜}
  - {type: variant, offset: 21, length: 3, content: 用此釿, SBCK: 不耗不耗然後權}
  - {type: variant, offset: 21, length: 3, content: 用此釿, krp: 不耗不耗然後權}
  - {type: variant, offset: 25, length: 0, content: '', SBCK: 權之然後凖之凖之然後量之其銘曰時文思索允臻其極喜量旣成以觀四國永啓厥後兹噐維則漢書曰量者龠合升斗斛也}
  - {type: variant, offset: 25, length: 185, content: 所以詳謹令減斧跡也崔鴻十六國春秋曰石虎馳獵無度晨出夜歸又多輕行躬行作所太子太保韋謏諫曰白龍魚服有豫且子居切之禍海若潛遊離葛陂之酷願陛下清宮蹕路思二神為先鑒不可忽天下之重輕行斤斧之間一旦有狂夫之變雖龍騰之勇不暇施也智士之計豈及設哉莊子曰郢人堊漫其鼻端若蠅翼使匠石斲之運斤成風盡堊而鼻不傷郢人立而不失容孫子曰何世之無才何才之無施良匠提斤斧造山林梁棟阿衡之材櫨柱楣椽之朴森然陳, WYG: 禮必加帚}
  - {type: variant, offset: 25, length: 0, content: '', krp: 權之然後凖之凖之然後量之其銘曰時文思索允臻其極喜量旣成以觀四國永啓厥後兹噐維則漢書曰量者龠合升斗斛也}
  - {type: variant, offset: 27, length: 6, content: 詳謹令減斧跡, SBCK: 量多少}
