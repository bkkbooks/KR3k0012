  - {type: variant, offset: 2230, length: 671, content: 丈不得水恭乃正衣冠向井再拜為吏士禱水身自率士負籠有飛泉涌出吏士驚喜皆稱萬歲晉中興徵祥說曰泰元中公王婦女髮緩鬢傾髻以為盛飭用髮豐多不可恒戴乃先於籠上榜之名曰假髻或曰假頭至於貧民不能自辯自號無頭就人借髻亦服之妖也無幾時烈宗晏駕而天下騷動二十年中兵革不息孫恩之亂刑斬無數桓玄之役死者萬計凡被戮之家多亡頭首沈約宋書曰廢帝狂悖無道誅害群臣公卿忌憚諸父並聚之殿內歐棰陵曳無復人理建安王休仁及太宗山陽王休祐形體並肥壯帝以竹籠盛而稱之續述征記曰梁鄒西有籠水發源長城山直北流於梁鄒西注濟水或云齊之孝婦誠感神明湧泉發於室內潛以績籠蔽之人莫之知由是無谷穀汲之勞姑及家人疑而嫉之值出而搜其室既無所覩試發此籠而泉遂濆涌流漂居宇所以名曰籠水也莊子曰一雀過羿羿必得之或以天下為之籠則雀無逃矣是故湯以庖籠伊尹秦穆公以五羊之皮籠百里奚以其所好籠之也淮南子曰張天下以為之籠因江海以為之罟何亡魚失鳥之有乎又曰狐裘負籠甚可怪也世說曰宋處宗甚有思理常得一長鳴雞愛而食之恒籠盛著䆫間雞遂作人語與處宗談論極有言思終日不輟處宗因此言巧大進楚辭曰鳳皇作鶉籠兮雖翕翅其不容傳咸班鳩賦敘云余楸蔚然成林閑居無為有時遊之顧見班鳩音聲可悅於見捕而畜之既已擾馴出之於籠無何失去後時時一來飛翔似如有戀聊為之賦成公綏鸚鵡賦曰小禽也以其能言解意故為人所愛成之以金籠升之以殿堂可謂珍之矣蓋乃未得鳥之性也古詩曰羅敷好蠶桑採桑城南隅青絲為籠繩桂枝為籠鉤沈約宋書曰廢帝狂悖無道誅害群公忌憚諸父並聚之殿內歐棰陵曳無復人理建安王休仁及太宗山陽王休祐形體並肥壯帝每以竹籠盛而稱之籯說文曰籯笭也漢書曰韋賢曰遺子黃金滿籯不如一經, SBCK: ''}
