  - {type: variant, offset: 766, length: 3, content: 壺酒使, SBCK: 見趙王賜白璧一􅀟黄金百鎰再見拜爲上卿聞君急士之窮而歸公子吴志曰吕蒙汝南}
  - {type: variant, offset: 766, length: 15, content: 壺酒使人荷鍤而隨之謂曰死便埋我, WYG: 介適女執箕箒於王宫}
