  - {type: variant, offset: 838, length: 1, content: 支, WYG: 詠曰越江兮刈蘭暮秋兮薄寒被蓑兮戴笠置露兮踐歡王褒僮約曰雨墜如注瓮扳薜戴子公薜蓑衣也子公笠也桔橰通俗文曰機汲曰桔橰禮曰捧席如橋衡井上有桔橰衡在土低仰者也莊子曰子貢南遊楚漢隂見一丈人為圃畦於漢隂}
