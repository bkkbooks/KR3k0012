  - {type: variant, offset: 785, length: 3, content: 故伊尹, WYG: 周鼎不㸑而不可賤掃箒日用而不足貴南越志曰鮑靚為南海太守嘗夕飛往羅浮山曉還有小吏晨洒掃忽見兩鵲飛入小齋吏箒擲}
  - {type: variant, offset: 789, length: 1, content: 興, SBCK: 中也風}
  - {type: variant, offset: 789, length: 3, content: 興土功, WYG: 墜於地視乃靚之履}
  - {type: variant, offset: 791, length: 0, content: '', SBCK: 記曰越人結交約曰卿雖乗車我戴笠後日相逢下車揖盛弘之荆州記曰冝都有風穴樵人有冬過者置笠穴口風吹吸之經日還渉長陽溪而得其笠則知溪穴潜通矣馮敬通詣鄧禹牋曰今日裘與蓑孰急見􅀨則裘不用上堂則蓑不御此更爲適者也今敬通逢堂蓑之不御也本草曰敗天公主􅀑注精魅此竹笠之敗也曹植九詠曰越江兮刈蘭暮秋兮薄寒􅀍蓑兮戴笠置露兮踐雚王褒撞約曰􅀨墮如注瓮板薜戴子公薜蓑衣也子公笠也桔橰通俗文曰機汲曰桔橰禮曰棒席如橋衡鄭玄曰井上桔橰衡在上低仰者也莊子曰子貢南逰楚漢隂見一丈人爲圃畦於漢隂鑿隧而入井抱甕而灌用力多而見}
  - {type: page-break, offset: 791, content: '', id: KR3k0012_SBCK_765-7a}
  - {type: variant, offset: 792, length: 3, content: 也脩腳, SBCK: 寡子貢曰鑿木爲機後重前輕挈水􅀂流其名桔橰圃}
