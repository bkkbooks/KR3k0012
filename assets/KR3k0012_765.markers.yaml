  - {type: variant, offset: 690, length: 475, content: 竇度所殺淡年十歲陰有復讎之志至年十八密索利鍤刃佯若耕耘經一橋下伺度舡行還伏杖於草中淡於橋上以鍤斫之而歸罪有司太守孔嚴義其孝勇上請宥之又曰劉伶常乘鹿車攜一壺酒使人荷鍤而隨之謂曰死便埋我淮南子曰故伊尹之興土功也脩腳者使之蹠音隻鏵強脊者使之負土長腳者蹠得土多鍤入土深也又曰禹身執畚鍤以為民先䟽河而導之九支鑿山而通九洛闢五湖而寧東海鋤說文曰鋤薅音蒿斫也钁大鋤也釋名曰鋤助也去穢助苗長齊人謂其柄為橿寄良切橿然正直也史記曰高后立諸呂為王擅權用事朱虛侯年二十有氣力忿劉氏不得職常入侍高后燕飲曰請為田歌太后笑曰若生而為王子安知田乎章曰臣知之太后曰試為言田意章曰深耕穊種立苗欲䟽非其種者鋤而去之呂后默然漢書曰雖有鎡錤上音茲下音基不如逢時鎡錤鋤雖有田基值時乃獲信矣樊噲夏侯灌嬰之徒方其鼓刀僕御販繒之時豈自知附驥尾勤功帝籍慶流子孫哉又曰倪寬受業孔安國貧無資賃作帶經而鋤伏息輒誦讀又曰龔遂為渤海太守遂盜賊諸持鋤鉤田器者為良人持杖器者為賊又曰嚴延年為河南太守京兆尹張敞聞延年用刑刻急以書諭之延年報曰河南天下咽喉二周餘獘莠盛苗穢何可不鋤也魏略曰常林為諸生帶經耕鋤其妻餉之相敬如賓, krp: 設階}
