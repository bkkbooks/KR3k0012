  - {type: variant, offset: 2072, length: 156, content: 續搜神記曰吳興人章茍者於田中耕乘小舡以歸籮魚鮭置舡中著菰裏有物輒已食盡如此非一後日磨鍜於菰蘆中見一大虵偷茍以鋘叉之中其虵籠史記曰宋元王二年江使神龜使於河至泉陽漁者豫且舉綱而囚之置籠中見夢於王曰我為江使於河伯而網當路豫且得我王有德義故來告愬又曰齊使淳于髡獻鵠於楚出邑門道飛其鵠揭空籠而獻之東觀漢記曰耿恭於䟽勒城穿井, SBCK: 太平御覽卷第七百六}
