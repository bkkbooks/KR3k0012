  - {type: variant, offset: 823, length: 8, content: 禹身執畚鍤以為民, SBCK: 獨不見夫桔橰者乎引之則俯舎之則仰彼人之所引非引人者也故俯仰而不得罪於人汝南}
  - {type: variant, offset: 823, length: 0, content: '', WYG: 宋災樂喜為司城以為政陳畚挶具綆缶畚箕籠也晉中興書曰王猛少貧賤鬻畚為事常至洛陽貨畚有一人於市貴買其畚云家近在此可隨我取直猛隨去忽至深山中此人語猛且住樹下當先啓道君須㬰猛進見一老翁踞牀髭鬢悉白侍從十許人引猛云大司馬公可進猛因拜老翁曰王公何縁拜即十倍直畚道君遣人送猛出山既顧視乃是嵩髙山也淮南子曰禹之時天下大水}
  - {type: punctuation, offset: 828, content: ，, id: KR3k0012_CHANT_765-bkkpn306}
