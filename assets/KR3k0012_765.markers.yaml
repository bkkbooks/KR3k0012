  - {type: variant, offset: 832, length: 2, content: 䟽河, SBCK: 賢傳曰蔡君仲井桔橰壤在母年命上憂不敢治}
  - {type: variant, offset: 832, length: 2, content: 䟽河, WYG: 韓詩外傳曰鮑焦衣敝膚見挈畚持蔬遇子貢子貢曰子何以至此鮑焦曰天下之遺德教者衆矣吾何以不至此子貢曰吾聞非其世者不生其利汚其君者不履其土今子非其世}
  - {type: page-break, offset: 832, content: '', id: KR3k0012_WYG_765-5a, image: WYG0899/WYG0899-0695a.png}
  - {type: substitution, offset: 832, original: 䟽, replacement: 疏, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19469}}
  - {type: variant, offset: 835, length: 1, content: 導, SBCK: 扶老生繞}
  - {type: variant, offset: 835, length: 1, content: 導, WYG: 持其蔬乎鮑焦曰吾聞賢者重進而輕退亷士易愧而輕死乃捐其蔬立槁於洛水}
  - {type: variant, offset: 837, length: 17, content: 九支鑿山而通九洛闢五湖而寧東海鋤說, SBCK: 扶老藤也生繞桔橰不湏治孝之感也揓枷青移架禮曰男女不同揓枷又曰不敢懸於夫之揮音揮揓竿謂之揓爾雅曰日竿謂之揓郭璞注曰衣架也古詩曰甖中無升米架上無懸衣梯􅀃}
  - {type: page-break, offset: 837, content: '', id: KR3k0012_SBCK_765-7b}
  - {type: variant, offset: 837, length: 0, content: '', WYG: 上斛廣雅曰斛謂之皷方斛謂之角書曰協時月正日同律度量衡合四時之氣節月之大小日之甲乙齊一也律法治丈尺又斛斗斤兩皆均同周禮曰㮚俗作中氏為量改煎金錫則不耗不耗然後權之權之然後凖之凖之然後量之其銘曰時文思索允臻其極嘉量既成以觀四國永啓厥後兹器維則漢書曰量者龠合升斗斛也所以量多少也本起於黄鍾之龠用度數審其容以子穀秬黍中者千有二百實其龠以井水凖其槩合龠為合十合為升十升為斗十斗為斛而五量嘉矣其法用銅方尺而圓其外旁有庣音祧焉其上為斛其下為斗左耳為升右耳為合合者合龠之量也升者登合之量也斗者聚升之量也斛者角斗平多少之量也夫量者龠於龠合於合登於升聚於斗角於斛也職在太倉大司農掌之後漢書曰第五倫為京兆主簿倫平銓衡正斗斛市無阿枉百姓恱服之魏志曰太祖常討賊廩榖不足私謂主者主者曰可小斛以足之太祖曰善後軍中言太祖欺衆太祖謂主者曰特當借汝死以厭衆不然事不觧遂斬之題屍曰冐小斛盜軍榖故斬之崔鴻十六國春秋後凉録曰吕光與龜兹王戰大敗之故大奢侈厚於養家有蒲桃酒或千斛經十年不敗士卒淪没酒藏者相繼荀氏别傳曰荀遂字仲陽隱居不仕時歲飢荒來糴者遂妻常昻其斛糴者歸量輙過其本時人號為昻斛夫人莊子曰聖人不死大盜不止為之斗斛以量之則并與斗斛而竊之權衡以稱之則并與權衡而竊之雖有軒冕之賞弗能勸斧鉞之威弗能禁剖斗折衡而民不爭天文要集曰斗星仰則天下斗斛不平覆則歲稔雜令曰諸量以秬黍中者容一千二百為龠一龠為合十合為升十升為斗十斗為斛楚辭曰世並舉而好朋一升斛而相量今之人皆好朋黨並相薦舉將其貪佞之心以量清潔之士衆比周而肩隨賢者逺害而隱藏㪷史記曰鴻門之㑹沛公使張良以玉㪷一雙予亞父亞父受玉斗撞而破之又曰田乞仕齊景公為大夫其收賦稅於民以小斗受之其粟予民以大斗行隂德於民而景公弗禁由是田氏得衆心宗族益强人思田氏漢書曰王莾攝政鑄作威斗威斗者以五石銅為之形若北斗長二尺五寸欲以厭勝衆兵旣成命有司負之莾出在前入則御旁說苑曰合升斗之微以滿倉廪王逸子曰自幽厲禮壊樂崩天綱弛絶諸侯力政轉相吞滅德不能懐威不能制至於赧王遂喪玉斗升漢書律厯志曰嘉量法用銅方尺而圎其外左耳為升右耳為合左傳曰齊舊四量豆區釡鍾四升為豆各自其四以登於釡釡十則鍾鍾乃大矣陳氏三量皆登一焉葛洪神仙傳曰王方平語蔡經家人曰吾欲賜汝等酒此乃出天厨其味醲非俗人所宜飲之或能爛人膓今當以水和之汝輩勿怪也乃以一升酒以一斛水攪之以賜經家家人飲之一升許皆醉良久蓑笠廣雅曰草謂之蓑簦謂之笠詩曰爾牧来思荷蓑荷笠又曰彼都人士臺笠緇撮禮曰大羅氏天子之掌鳥獸者也諸侯貢屬焉草笠而至尊野服也諸侯於蜡使使者戴草笠貢鳥獸也國語曰越王勾踐棲於㑹稽乃令三軍求通吳王謀臣大夫種曰譬如蓑笠時雨至必求之今君臣旣棲於㑹稽之上而求謀臣無乃後乎又曰呉王夫差使王孫滿告勞于周曰齊人為不道不供承王事夫差不忍被甲帶劒簦笠備雨器也相望於艾陵天舎其蓑齊師還言敗而還夫差豈敢自多又曰管仲曰今夫農羣萃而州處察其四時時雨既至挾其槍刈耨鏄以旦暮從事於田野脫衣就功首戴茅蒲身衣襏襫音撥奭茅蒲簦笠也撥襫蓑也沾體塗足以從事於田野史記曰瞽瞍使舜上廪從下焚廪舜乃以兩笠自扞而下得不死又曰虞卿觧其相印與魏齊間行走大梁欲因信陵君以走楚信陵君未肯見曰卿何人齊曰虞卿躡屩擔簦一見趙王賜白璧一雙黄金百鎰再見拜為上卿聞君急士之窮而歸公子呉志曰吕蒙汝南富坡人䝉襲南郡入城約軍中不得于人家有所求取蒙麾下士是汝南人取民家一笠以覆官鎧蒙以為犯軍令不可以鄉里故廢法遂斬之晏子曰景公出遊曰嗚呼使古而無死何如晏子曰若使古而無死丁公太公将有齊國吾將戴笠衣褐以行畎􅺅之中也風土記曰越人結交約曰卿雖乗車我戴笠後日相逢下車揖盛𢎞之荆州記曰冝都有風穴樵人有冬過者置笠穴口風吸之經日還渉長陽溪而得其笠則知溪穴潜通矣馮敬通詣鄧禹牋曰今日裘與蓑孰急見雨則裘不用上堂則蓑不御此更為􅃴者也今敬通逢堂蓑之不御也本草曰敗天公主鬼注精魅此竹笠之敗也曹植}
