  - {type: variant, offset: 1501, length: 518, content: 祖約輒困因謂之曰君汝頴之士利如錐我幽冀之士鈍如椎已具椎門中又曰王濬伐吳吳人於江險要害之處作鐵錐長丈餘暗置江中濬乃作大筏先行鐵錐輒著筏去又曰赫連勃勃勃性工巧然殘忍刻暴乃蒸土築城錐入一寸即殺作者錐若不入即殺行錐者而并築之管子曰女有一錐然後成為女孫卿子曰無置錐之地而公侯不能與之爭名仲尼是也莊子曰堯舜有天下子孫無置錐之地韓子曰堯舜無置錐之地於後世而德結呂氏春秋曰子產相鄭十八年刑三人殺三人錐刀之遺於道者莫之敢舉鑽尚書大傳曰古者中刑用鑽鑿物理論曰趙堯錐鑽之吏能探高祖深心致位丞相鉗漢書曰江充捕巫蠱燒鐵鉗灼強服之吳時外國傳曰扶南有訟者燒鐵令赤以鉗舉鐵著手行七步無罪者手不燒有罪者手即燋泥鏝爾雅曰鏝謂之圬郭璞注曰泥鏝也說文曰鏝鐵圬也左傳曰鄭子產相鄭伯如晉晉侯未之見子產使盡壞其館之垣而納車馬焉曰文公之為盟主也崇大諸侯之館圬人以時塓館宮室圬人塗者論語曰宰予晝寢子曰朽木不可雕也糞土之墻不可污也橙續晉陽秋曰何無忌母劉牢之姉也無忌與高祖謀夜於屏風裏制檄文母潛橙於屏風上窺之既知其謀大喜謂曰汝能如此吾讎恥雪矣世說曰謝中郎在壽陽敗臨奔走猶求王怗橙也籃集異記曰丹陽張承先家有鬼長為其取物會有客須蓴斤鯉魚二十頭鬼將一小兒持籃至驃騎街十字路小兒睡覺看籃中已有蒪鯉䈪, SBCK: 登雲梯杷朳}
  - {type: page-break, offset: 1501, content: '', id: KR3k0012_SBCK_765-8b}
