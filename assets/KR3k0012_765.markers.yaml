  - {type: 'tls:seg', offset: 34, content: '', id: KR3k0012_CHANT_765-2a.2}
  - {type: variant, offset: 34, length: 0, content: '', SBCK: 本起於黄鍾之龠以子榖秬􅁰中者千有二百實其龠二龠爲斛而五量嘉矣其法用銅方合十合爲一升十升爲斗十斗爲斛而五量嘉矣其法用銅方尺而圍其外旁有音祧焉其上爲斛下爲斗左耳爲升右耳爲合爲合龠之量也升者登合之量也斗者聚升之量也斛者角斗平多少之量也夫量者躍於龠合於合登於升聚於斗角於斛也職在太倉太司農掌之後漢書曰第伍倫爲京兆主簿倫平銓衡正斗斛市無阿枉百姓恱服之魏志曰太祖常討賊廪穀不足私謂主者主者曰可小斛以是之太祖曰善後軍中言太祖欺衆太祖謂主者曰特當借汝死以厭衆不然事不解遂斬之題屍曰用小斛盗軍榖故斬之}
  - {type: page-break, offset: 34, content: '', id: KR3k0012_SBCK_765-4a}
  - {type: variant, offset: 34, length: 0, content: '', krp: 本起於黄鍾之龠以子榖秬黍中者千有二百實其龠二龠爲斛而五量嘉矣其法用銅方合十合爲一升十升爲斗十斗爲斛而五量嘉矣其法用銅方尺而圍其外旁有音祧焉其上爲斛下爲斗左耳爲升右耳爲合爲合龠之量也升者登合之量也斗者聚升之量也斛者角斗平多少之量也夫量者躍於龠合於合登於升聚於斗角於斛也職在太倉太司農掌之後漢書曰第伍倫爲京兆主簿倫平銓衡正斗斛市無阿枉百姓恱服之魏志曰太祖常討賊廪穀不足私謂主者主者曰可小斛以是之太祖曰善後軍中言太祖欺衆太祖謂主者曰特當借汝死以厭衆不然事不解遂斬之題屍曰用小斛盗軍榖故斬之}
