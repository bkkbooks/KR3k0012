  - {type: variant, offset: 793, length: 3, content: 脩腳者, WYG: 西域志曰佛箒在月支國長三丈許似孔雀尾也異苑曰北海徐寔婢蘭義熈中忽患羸黄而自拂拭有異於常家共伺察見行掃箒從壁角來趣婢取而焚之婢即平復雜五行書曰常以正月三日買箕四枚懸堂上四壁令人治生大得治田蠶萬倍錢財自入季尤箕銘曰神農植谷以養蒸民箕主簸揚糠粃及陳畚左傳曰晉靈公不君宰夫胹熊蹯不熟殺之寘諸畚}
