  - {type: variant, offset: 785, length: 3, content: 故伊尹, SBCK: 景公出遊曰嗚呼使古而無死何如晏子曰􅀂使古而無死丁公太公將有齊國吾將戴笠衣􅄄以行畎􅅿}
