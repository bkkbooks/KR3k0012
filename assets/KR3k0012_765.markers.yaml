  - {type: variant, offset: 15, length: 0, content: '', SBCK: 以簸揚維南有箕載翁其舌禮曰凢爲長者糞之禮必加帚於箕上以􅃑拘而退其塵不及長者以箕自向而扱之又曰汜埽曰埽埽席前曰㭓㭓弗運切席不以鬛執箕膺擖鬛謂帚也恒埽地不㓗清也膺親也擖舌也持箕將去糞者以舌自卿擖以渉切又曰良弓之子必學爲箕史記曰張儀􅀃楚王曰大王誠能聽臣臣請使􅁗太子入質於楚楚太子質於􅁗請以􅁗女爲大王箕箒之妾効萬室之都以爲湯沐之邑又曰鄒子如燕昭王擁篲先驅請列子之坐而受業漢書曰􅁗爲亂政虐刑殘滅天下比爲長城之役南有五嶺之戍外内搔動百姓罷音皮弊頭㑹箕歛計人頭數出榖以箕歛之以供軍費又曰上歸櫟陽五日一朝太公家令􅀃曰天無二日土無二王帝雖子人主也太公雖父人臣也奈何令人主拜人臣如此則威重不行後上朝太公太公擁篲迎門却行上大驚下扶太公太公曰帝人主也奈何以我亂天下法也又曰魏勃欲見齊相曹叅無因常早掃叅之門又曰賈􅁩上書曰􅁗人借父櫌鋤而有}
  - {type: page-break, offset: 15, content: '', id: KR3k0012_SBCK_765-1b}
  - {type: variant, offset: 15, length: 3, content: 得削又, WYG: 以簸揚維南}
  - {type: variant, offset: 15, length: 0, content: '', krp: 以簸揚維南有箕載翁其舌禮曰凢爲長者糞之禮必加帚於箕上以𬒮拘而退其塵不及長者以箕自向而扱之又曰汜埽曰埽埽席前曰㭓㭓弗運切席不以鬛執箕膺擖鬛謂帚也恒埽地不㓗清也膺親也擖舌也持箕將去糞者以舌自卿擖以渉切又曰良弓之子必學爲箕史記曰張儀說楚王曰大王誠能聽臣臣請使秦太子入質於楚楚太子質於秦請以秦女爲大王箕箒之妾効萬室之都以爲湯沐之邑又曰鄒子如燕昭王擁篲先驅請列子之坐而受業漢書曰秦爲亂政虐刑殘滅天下比爲長城之役南有五嶺之戍外内搔動百姓罷音皮弊頭㑹箕歛計人頭數出榖以箕歛之以供軍費又曰上歸櫟陽五日一朝太公家令說曰天無二日土無二王帝雖子人主也太公雖父人臣也奈何令人主拜人臣如此則威重不行後上朝太公太公擁篲迎門却行上大驚下扶太公太公曰帝人主也奈何以我亂天下法也又曰魏勃欲見齊相曹叅無因常早掃叅之門又曰賈誼上書曰秦人借父櫌鋤而有}
  - {type: variant, offset: 16, length: 1, content: 削, SBCK: 色母取箕帚立而誶語晉書曰王獻之善􅈻書有父風以掃帚沾泥書大字方丈甚善王隱晉書曰􅁃衮􅀌兄女曰芳將嫁羙其服矣衮刈荆苕爲箕帚焉召諸子于堂男女以班而謂芳曰汝少􅀌今汝適人將事舅姑洒埽庭内婦人之道故賜汝此匪器之羙欲汝之温恭朝夕雖休勿休也齊書曰劉休妻王氏妬帝聞賜休妾勑與王氏杖二十令休於宅後開小店使王氏賣掃帚皂莢以辱之國語曰越王勾踐行成於吴曰一介適女執箕帚於王宫淮南子曰周鼎不㸑而不可賤掃帚日用而不足貴南越志曰鮑靚爲南海太守嘗夕飛徃羅浮山曉還有小吏晨洒掃忽見兩鵲飛入小齊吏帚擲之墜於地視乃靚之履也西域志曰佛帚在月支國長三尺許似孔雀尾也異苑曰北海徐寔婢蘭義熈中忽患羸黄而自拂拭有異於常家共伺察見竹掃帚從壁角來趣婢取而焚之婢即平復雜五行書曰常以正月三日買箕四枚懸堂上四壁令人治生大得治田􅁞萬倍錢財自入李尤箕銘曰神農殖榖以養蒸民箕主簸􅀭糠粃乃陳畚左傳曰晉靈公不君失君道宰夫臑音而熊蹯不熟殺之寘諸畚使婦人載以過朝}
