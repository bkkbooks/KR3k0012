  - {type: variant, offset: 849, length: 4, content: 寧東海鋤, WYG: 灌用力多而見功寡子貢曰鑿木為機後重前輕挈水若流其名桔橰圃者曰聞有機事必有機心吾非不知葢不為也又曰獨不見夫桔橰者乎引之則俯舎之則仰被人之所引非引人者也故俯仰而不得罪於人汝南先賢傳曰蔡君仲井桔槔壊母在每年命修不忍治而扶老生繞之扶老籐也椸枷音移架禮曰男女不同椸枷又曰不敢懸於夫之楎音揮椸竿謂之椸爾雅曰竿謂之箷古詩曰甖中無升米架上無懸衣梯}
