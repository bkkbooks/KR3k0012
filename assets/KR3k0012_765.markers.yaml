  - {type: variant, offset: 469, length: 220, content: 託是三失也請從此辭投水而死孔子曰弟子記之此足以為戒於是歸養親者十有二三風俗通曰鎌刀自揆積芻蕘之効鍠異苑曰長山郭悖元嘉十二年病亡後孫兒見悖著帽布裙在靈床上呼孫與語云今得七日假假滿便去今將二小兒捉僕在門可就取也孫求僕即得又云汝叔從都還得鍠犁鐴音辟可試取看便以呈之仍以兩鐵相加鎗鎗作聲語孫曰我無復歸緣從此而絕斨毛詩豳七月曰取彼斧斨以伐遠揚又破斧曰既破我斧又缺我斨鏵釋名曰鍤鍤地起土也或曰削能有所穿削也或曰鏵刳也刳地為坎也晉書安帝紀曰吳興王淡父為鄰, krp: 林麓則狄}
