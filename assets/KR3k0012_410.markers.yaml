  - {type: variant, offset: 537, length: 151, content: 聃昔虢叔閎夭太顛散宜生南宮括五者同寮比德以贊文武及虢叔死四人為服古之達禮者行之韓詩外傳曰宋玉因其友事襄王王待玉亦無異江表傳曰吳有程普者頗以年長數凌侮周瑜瑜折節下容終不之與交普後自敬服而親重之乃告人曰與周公瑾交若飲醇醪不覺自醉袁宏山濤別傳曰陳留阮籍譙國嵇康並高才遠識少有陪其契者濤初不識一與相遇便為神交列, SBCK: 蚌復岀明珠髙}
