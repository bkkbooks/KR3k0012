  - {type: variant, offset: 25, length: 7, content: 孰能知死生存亡, SBCK: 飛雖實武人愛慕足下足下雖天爵素高冝少降意巴曰丈夫處世當交四海英雄如何與兵子共語晉書曰解系字以連濟南人也系及二弟結育並清身㓗巳甚有聲譽時荀朂門宗弘盛朂諸子謂系等曰我與卿爲友應向我公拜朂曰我與君尊先使君親厚系曰不奉先君遺敎公若與先君厚徃日哀頓當垂書問親厚}
