  - {type: variant, offset: 1187, length: 65, content: 逢萌條房李雲王尊同時相友世號之四子海內先賢傳曰潁川鍾皓字季明為郡功曹時陳寔為西門亭長皓深禮之與同分義皓辤公府太守問誰可代君皓曰明府, SBCK: 足下見直木}
  - {type: variant, offset: 1187, length: 5, content: 逢萌條房李, WYG: 鶡冠者或曰楚人也隠居山林衣弊履穿以鶡為冠莫測其名因服成號著書言道家事馮煖嘗師事焉煖後顯於趙鶡冠子懼其薦已也乃與煖絶焉新序曰吳有士張胥鄙譚夫吾前交而後絶張胥鄙有罪拘将死譚夫吾合徒取之出於通而後知真夫吾輟行辭曰吾義不同子故前交而後絶吾聞之君子不以安肆志不為免易行吾今從子是安則肆志危則易也吾因子而生不若及拘而死闔廬聞之命吏釋之胥鄙辭曰吾義不因於譚夫吾故不受其任矣今利以是出誠以譚夫故免也遂觸裔而死譚夫吾聞之曰致任而不受佞也又知而出之愚也佞而不可以接上愚不可以事君吾行虛矣人惡以吾力王吾亦耻以比立於世乃絶頸而死後漢朱公叔絶交論曰世之務交逰也甚矣不愽于業不忌于居犯禍以追之背公以從之利進義退公輕私重劉孝標廣絶交論曰騁黄馬之劇談縱碧雞之雄辨於是有弱冠王孫綺紈公子道不挂於通人聲未遒於}
