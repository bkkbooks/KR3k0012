  - {type: variant, offset: 7, length: 2, content: 四莊, SBCK: 五請交不許世交父子交絶交交友五􅀓幹與張叔威書曰吾與足下義結紈素恩比同生東方朔與公孫弘書曰爵禄不相責以禮同􅀋之遊不以逺近爲故東門先生居蓬户空穴之中魏公子一朝以百􅀐造之吕望未甞與文王同席而坐一朝讓以天下半大丈夫相知何必接塵而遊垂髮齊年哉張奥與延叔堅書曰吾與叔堅剖心相知豈以流言相猜耶曹植離友詩曰王旅旋兮背故郷彼君子兮篤人綱騰駕行兮歸朔方馳原隰兮尋舊疆郭璞贈温嶠詩曰人亦有言松竹有林及爾臭味異夲同岑言以忘得交以淡成謝眺贈友人詩曰芳洲有杜若可以贈佳期清風動簾夜􅀌月照䆫時安得同携手酌酒賦新詩陸倕贈京邑僚友詩曰時逢世道泰騫足歩髙衢江間寒事早夜露傷秋草心屬姑􅂫臺目送邯鄲道李郭或同舟潘夏時方駕歡娱終美景敷文永清夜捉􅂰豈異人戚戚皆明婭蕭鈞晚景遊泛懷友詩曰龍門低御溝鳯轄轉芳州雲峯􅀄辯夏麥氣早迎秋山翠餘煙積川平晚照收浪隨文鷁轉波逐彩鴛浮風花輕未洛巖泉咽不流一辭金谷菀空想竹林遊潘岳詩曰投分􅀉石友白首同所歸古善哉行曰月没參横北斗䦨干親友在門忘寢與飡請交不許後漢書曰侯覇欲友王丹霸子見丹下車拜丹荅拜覇}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_SBCK_410-1b}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_SBCK_410-2a}
  - {type: variant, offset: 7, length: 2, content: 四莊, WYG: 五請友不許世交附父子交絶交交友五傅幹與張叔威書曰吾與足下義結執素恩比同生東方朔與公孫𢎞書曰爵禄不相責以禮同類之逺近為叔東門先生居蓬户空穴之中魏公子一朝以百騎馳造太公望未嘗與文王同席而坐一朝譲以天下半丈夫相知何必接塵而逰垂髪齊年哉張奥與延叔堅書曰吾與叔剖心相知當以流言相猜耶郭璞贈温嶠詩曰人亦有言松竹有林友亦臭味異本同岑言以文得交以淡成謝朓贈友人詩曰芳州有杜若可以訂佳期清風動簾夜孤月照忩時安得同携手酌酒賦新詩陸倕贈京邑僚友詩曰時逢世道㤗騫足歩髙衢江闗寒事早夜露傷秋草心属姑蘇臺目送邯鄲道李郭成同舟潘夏時方駕歡娯終美景敷文永清夜促膝豈異人戚戚皆姻婭蕭鈞晩景遊泛懐友詩曰龍門低御溝鳯轄轉芳洲雲峯初辨夏麥氣早迎秋山翠餘烟積川平晩照收浪隨文鷁轉波逐彩鳯浮風花輕未落巖泉咽不流一辭金谷苑空想竹林遊潘岳詩曰投分寄石友白首同所歸古善哉行日没參横北斗闌干親友在門㤀寢與餐請交不許後漢書曰侯覇欲友王丹覇子見丹下車拜丹答拜覇}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_WYG_410-1b, image: WYG0896/WYG0896-0596d.png}
