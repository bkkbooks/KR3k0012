  - {type: variant, offset: 785, length: 130, content: 傳曰杜京產建武初徵之產曰莊周持釣豈為白壁所回避不就會稽孔道微亦守志產與友善又曰薛彪之聞陶隱居委紱架石室與將負芻鄰居接宇彪歎曰彼二人者可為道友何為久滯東川於是命棹來歸便相就共住日夕講習又曰潘洪字文盛山陰人幼辭家入山修稟上法陶貞白見而悅之遂與投分共遊諸處尋求真書又, SBCK: 論}
