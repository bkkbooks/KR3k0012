  - {type: variant, offset: 12, length: 1, content: 祀, SBCK: 丹曰君房有是言丹未之許也又曰張霸遷侍中時皇后兄虎賁中郞將鄧騭當朝貴戚聞覇名行欲與爲交逡廵不荅衆􅀏其不識世務魏志曰將軍張遼與其護軍武周有隙遼就刺史温恢求交胡質質辭以疾遼岀遇質曰僕安意於君何以相􅀌如此質曰古人之交也多取知其不貪奔北知其不怯聞流言而不信故可終也武伯南身爲雅士徃者將軍稱之不輟於口今以睚䀝之恨反成嫌􅂩況質才薄豈能終好是以不願也遼感其言復與周平蜀志曰劉巴字}
  - {type: page-break, offset: 12, content: '', id: KR3k0012_SBCK_410-2b}
  - {type: variant, offset: 12, length: 1, content: 祀, WYG: 丹曰君房有是言丹未之許也又曰張覇遷侍中虎賁中郎將鄧隲當朝貴戚聞覇名行欲與為交逡廵不答衆笑其不識世務魏志将軍張遼與其䕶軍武周有隙就刺史温承求交吳質質辭之以疾遼出遇質曰僕委意於君何以相孤如此質曰古人之交也多取知其不貪奔北知其不怯聞流言而不信欲可終也武伯南身為雄士徃者将軍稱之不輟於口今以睚眦之恨反成嫌隙况質才薄豈能終好是以不願也遼感其言復與周平蜀志曰劉巴字}
