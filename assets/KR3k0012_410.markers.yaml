  - {type: variant, offset: 965, length: 9, content: 隱士南陽車遂字德陽, WYG: 徐廣青箱記曰相國掾調有盛名同郡任覽與調友善鄭衰謂覧曰諷姦雄必以禍終子宜絶之後諷果敗齊書曰初劉逖與祖班以文儀相得結陳雷之契又為俊耿班之女将免魏彦深也等以告逖仍付宻啟令其奏}
  - {type: variant, offset: 966, length: 0, content: '', SBCK: 居山林衣􅁦履穿以鶡爲冠莫測其名因服成號著書言道家事馮煖甞師事焉煖後顯於趙鶡冠子懼其薦已也乃與煖絶焉新序曰吴有}
