  - {type: variant, offset: 961, length: 2, content: 番禺, SBCK: 六年擢進士弟兄温與御史中丞髙元俗友善温請用澳爲御史謂澳曰高二十九持憲綱欲與汝相靣汝必得御史澳不荅温曰高君端士汝不可輕澳曰然恐無皇身御史終不詣元􅁉之門􅀽叔真隱士傳曰鶡冠者或曰楚}
  - {type: variant, offset: 961, length: 2, content: 番禺, krp: 六年擢進士弟兄温與御史中丞髙元俗友善温請用澳爲御史謂澳曰高二十九持憲綱欲與汝相靣汝必得御史澳不荅温曰高君端士汝不可輕澳曰然恐無皇身御史終不詣元𥙿之門袁叔真隱士傳曰鶡冠者或曰楚}
