  - {type: 'tls:seg', offset: 921, content: '', id: KR3k0012_CHANT_410-13a.5}
  - {type: variant, offset: 921, length: 0, content: '', SBCK: 與王右軍父子爲世外之交王亦辭榮好養生之事毎造逺遊未甞不彌日忘返束哲吊蕭孟恩文曰東海蕭惠字孟恩者父昔爲御史與哲先君同僚孟恩及哲旦夕同遊分義早著孟恩夫婦皆亡門無立嗣哲時有伯父從兄之憂未􅀗自往致文一篇以弔其魂絶交毛詩谷風曰谷風刺幽王也天下俗薄朋友道絶焉又曰伐木廢則朋友缺矣史記曰相國曹叅始微時與蕭何善及爲將相有􅂩又曰越石父賢在於縲紲之中晏子出遭塗解左􅆖贖之載歸弗謝入門乆之石父請絶晏子懼然攝衣冠謝曰晏雖不仁免子於厄何求絶之速也石父曰不然吾聞君子屈於不知已而伸於知已者方吾在縲紲之中彼不知我也夫子旣已感而贖我者是知已知已而無禮固不如縲紲之中漢書曰張耳陳餘始居約時相然信死豈頋問哉及據國争權卒相㓕亡􅀔利之交古人羞之蓋謂是矣又曰蕭育}
  - {type: page-break, offset: 921, content: '', id: KR3k0012_SBCK_410-5a}
  - {type: variant, offset: 921, length: 0, content: '', WYG: 與王右軍父子為世外之交王亦辭榮好飬生之事每造逺遊未嘗不彌日忘返束晢吊蕭孟思文曰東海蕭惠字孟思者父昔為御史與晢先君同僚孟思及晢且有同遊分義早着孟思夫婦皆云門無立副晢時有伯父役兄之憂未獲日致之一篇以予其媿絶交毛詩谷風曰谷風刺幽王也天下俗薄朋友道絶焉又曰伐木廢則朋友缺矣史記曰相國曹叅始㣲時與蕭何善及為将相有隙又曰越石父賢在縲絏之中晏子出遭之塗解左􅆖贖之載歸弗謝入閨久之石父請絶晏子戄然攝冠謝曰嬰雖不仁免子於厄何求絶之速也石父曰不然吾聞君子屈於知己而伸於知己者方吾在縲絏之中彼不知我也夫子既已感悟而贖我是知己知己而無禮固不如縲絏之中漢書曰張耳陳餘始居約時相然信死豈頋問哉及據國争權卒相滅亡勢利之交古人羞之盖謂是矣又曰蕭育}
