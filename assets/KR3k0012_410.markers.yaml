  - {type: variant, offset: 921, length: 0, content: '', krp: 與王右軍父子爲世外之交王亦辭榮好養生之事毎造逺遊未甞不彌日忘返束哲吊蕭孟恩文曰東海蕭惠字孟恩者父昔爲御史與哲先君同僚孟恩及哲旦夕同遊分義早著孟恩夫婦皆亡門無立嗣哲時有伯父從兄之憂未獲自往致文一篇以弔其魂絶交毛詩谷風曰谷風刺幽王也天下俗薄朋友道絶焉又曰伐木廢則朋友缺矣史記曰相國曹叅始微時與蕭何善及爲將相有隙又曰越石父賢在於縲紲之中晏子出遭塗解左驂贖之載歸弗謝入門乆之石父請絶晏子懼然攝衣冠謝曰晏雖不仁免子於厄何求絶之速也石父曰不然吾聞君子屈於不知已而伸於知已者方吾在縲紲之中彼不知我也夫子旣已感而贖我者是知已知已而無禮固不如縲紲之中漢書曰張耳陳餘始居約時相然信死豈頋問哉及據國争權卒相㓕亡勢利之交古人羞之蓋謂是矣又曰蕭育}
  - {type: variant, offset: 923, length: 1, content: 高, SBCK: 陳咸朱􅀶爲友著聞當世徃者有王貢故長安人語曰蕭朱結綬王貢彈冠言其相薦逹也始育與公卿子顯名咸最先進年二十餘爲御史中丞時朱􅀶尚爲杜陵亭長爲咸育所舉援後遂並歷刺史郡守相及爲九卿而􅀶先至將軍上卿歴位多於咸育遂至丞相育與􅀶後有􅂩不能終故世以友爲難也范曄後漢書曰許劭少峻名節好人倫多所賞識劭邑人李逹杜直有髙氣劭􅀄善之而後有隙東觀漢記曰梁鴻􅀄與京邑蕭友書約不爲陪臣及友爲郡吏鴻以書責之而去又曰王良字仲子東海人少清髙爲司徒司直以病歸一歳復徴至滎}
  - {type: page-break, offset: 923, content: '', id: KR3k0012_SBCK_410-5b}
  - {type: variant, offset: 923, length: 1, content: 高, WYG: 陳咸朱愽為友著聞當世徃者有王貢故長安人語曰蕭朱結綬王貢彈冠言其相薦達也始育以公卿子顯名咸最先進年二十餘為御史中丞時朱愽尚為杜陵亭長為咸育所舉援後遂並歴刺史郡守相友為九卿而愽先至将軍上卿歴位多於咸育遂至丞相育與愽後有隙不能終故世以友為難也范􅁮後漢書曰許初少厲名節好人倫多所賞識邵色又李達杜直有髙氣邵初善之而終有隙東觀漢記曰梁鴻初與京邑蕭友善約不為臣及友為郡吏鴻以書責之而去又曰王良字仲子東海人少清髙為司徒司直以病歸一嵗復徵至滎}
  - {type: page-break, offset: 923, content: '', id: KR3k0012_WYG_410-8b, image: WYG0896/WYG0896-0600b.png}
  - {type: variant, offset: 923, length: 1, content: 高, krp: 陳咸朱博爲友著聞當世徃者有王貢故長安人語曰蕭朱結綬王貢彈冠言其相薦逹也始育與公卿子顯名咸最先進年二十餘爲御史中丞時朱博尚爲杜陵亭長爲咸育所舉援後遂並歷刺史郡守相及爲九卿而博先至將軍上卿歴位多於咸育遂至丞相育與博後有隙不能終故世以友爲難也范曄後漢書曰許劭少峻名節好人倫多所賞識劭邑人李逹杜直有髙氣劭𥘉善之而後有隙東觀漢記曰梁鴻𥘉與京邑蕭友書約不爲陪臣及友爲郡吏鴻以書責之而去又曰王良字仲子東海人少清髙爲司徒司直以病歸一歳復徴至滎}
  - {type: variant, offset: 925, length: 7, content: 許詢並治高節同, SBCK: 疾篤不任進道乃過其友人友人不肯見曰不有忠言竒謀而取大位何其往來屑屑不憚煩也遂拒之良慙自後連徴輙稱疾魏}
