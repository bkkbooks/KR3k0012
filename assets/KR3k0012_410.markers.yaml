  - {type: variant, offset: 967, length: 3, content: 南陽車, SBCK: 張胥鄙譚夫吾前交而後絶張胥鄙有罪拘將死譚夫吾合徒取之岀於道而後知其夫吾輟行而辭曰吾義不同子故前交而後絶吾聞之君子不以安肆志不爲危易行吾今從子是安則肆志危則易行也吾因子而生子􅀂反拘而死闔廬聞之命吏釋之胥鄙辭曰吾義不同於譚夫吾故不受其任矣今利以是出誠以譚夫吾故免也}
