  - {type: variant, offset: 76, length: 326, content: 為友孟子曰舜上見帝帝館于貳宮迭為賓主是天子交匹夫也史記曰管夷吾鮑叔牙二人相友管仲曰吾始困時嘗與鮑叔賈分財利多自與鮑叔不以我為貪知我貧也吾嘗為鮑叔謀事而更窮困鮑叔不以我為愚知時有利不利也吾嘗三仕三見逐於君鮑叔不以我為不肖知我不遭時也吾嘗為君三戰三北鮑叔不以我為怯知我有老母也生我者父母知我者鮑叔也傅子曰杜畿至許見侍中耿紀共語終夜尚書令荀彧家與紀屋相比夜聞畿言異之至旦遣謂紀曰有國士何以居位既見畿如舊相識遂進畿於朝郭子曰冀州刺史楊准二子喬字國彥髦字士彥清平有識俱總角為成器准與裴頠樂廣友善遣見之頠謂准曰喬及卿髦小減也廣謂准曰喬自及卿髦尤精出准笑曰我二兒之優劣乃裴樂之優劣論者許之魯連子曰舜耕於歷山而交益陶於河濱而交禹孔叢子曰子高遊趙平原君客之有鄒文節與子高, SBCK: 崔􅂐孫駰復}
