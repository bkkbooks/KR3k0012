  - {type: variant, offset: 956, length: 4, content: 董正字伯, krp: 王弼爲人淺而不議物情𥘉與王黎荀融友善黎奪其黄門郞於是恨黎與融亦不終又曰管寜與華歆同學歆聞車馬聲岀門寜割席曰子非吾友也徐廣晉記曰相國掾魏諷有盛名同郡任覺與諷友善鄭袤謂覧曰諷姦雄必以禍終子冝絶之後諷果敗齊書曰𥘉劉逖與祖班以丈義相得結陳雷之契又爲弟俊聘班之女將免魏彦深等也以告逖仍付宻啓令其奏聞彦深等頗知之先自申理班由是疑逖告其所爲及班𬒳出逖遂遣弟離婚其輕交易絶如此唐書曰韋澳貫之之子也大}
