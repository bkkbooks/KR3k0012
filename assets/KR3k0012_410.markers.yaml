  - {type: variant, offset: 1284, length: 1768, content: 融已五十重衡才秀忘年也向秀別傳曰秀字子期少為同郡山濤所知又與譙國嵇康東平呂安友善其趍舍進止無不必同造事營生業亦不異常與康偶鍜於洛邑與呂安灌園於山陽收其餘利以供酒食之費或率爾相攜觀原野極遊浪之勢亦不計遠近或經日乃歸復脩常業郭林宗別傳曰郭泰字林宗入潁川則友李元禮至陳留則結符偉明之外黃則親韓子助過蒲亭則師仇季智也英雄記曰袁紹不妄通賓客好遊俠與張孟卓何伯求吳子卿許子遠伍德瑜等皆奔走之友不應辟命荊州記曰陸凱與范曄為友江南寄梅花一枝來諸長安與曄并贈詩曰折花奉驛使寄與隴頭人江南無所得聊贈一枝春虞預會稽典錄曰盛憲字孝章初為臺郎常出遊逢一童子容貌非常憲怪而問之是魯國孔融年十餘歲憲下車執融手載以歸舍與融談宴結為兄弟升堂拜母曰可賀憲母昔有憲憲今有弟又曰卓恕字公行上虞人也與人期約雖遭暴風疾雨無不至者嘗從建鄴辭太傅諸葛恪恪問何當復來恕荅曰某日當復親覲至是日恪停食候恕至時賓客會者皆以為稽建業相去千餘里道隔江湖豈得如期須臾恕至一坐盡驚又曰賀劭字興伯山陰人也為人美姿容動靜有常與人交久而敬之又曰虞倫字孝緒餘姚人也與駱瑗為彈冠之友吳錄曰步騭與衛於同年相善俱以種瓜自給晝勤四體夜誦經傳三輔決錄曰游殷為胡軫所害同郡吉伯房郭公休與殷同歲相善為緦麻三月趙歧三輔決錄曰蔣詡字元卿舍中三徑唯羊仲裘仲從之遊二仲皆雅廉逃名之士華陽國志曰洛陽慶鴻慷慨好義廉范與為刎頸之交時人稱曰前有管鮑後有慶廉陳留志曰韋庾字宣明襄邑人也常居園中故世謂之園公與河內軹人角里先生綺里季夏黃公為友皆修道潔己非義不踐當秦末避代入商洛山隱居自娛竹林七賢論曰嵇康字叔夜與東平呂安少相知友每一相思輒千里命駕又曰山濤與阮藉嵇康皆一面契若金蘭濤妻韓氏嘗問濤曰吾當年可為交者唯二人而已崔豹古今注曰鄭弘行宦京洛未至夜宿一壖如過而緣二切河邊地也於是逢舊友四人四顧荒郊村落絕遠酤酒無處情抱不申仍各以錢投水中依評共飲盡夕酣暢皆得大醉因名沉釀川劉向說苑曰伯牙子鼓琴其友鍾子期聽之方鼓琴而志在於太山鍾子期聽之曰善哉鼓琴巍巍乎若太山少選之間而志在流水鐘子期聽之曰善哉鼓琴湯湯乎若流水鍾子期死伯牙子屏琴絕絃終身不鼓以為時無足為鼓琴者說苑曰魏文侯歎田子方曰自友子方也君臣益親百姓益附吾是以知友士之功焉世說曰山公與嵇阮契若金蘭山公妻韓氏覺二人異於常欲窺之他日二人來妻竊窺之公曰二人何如妻曰君殊不如正當以識度相及耳公曰伊輩亦當以我為勝又曰華歆與管寧邴原相友曾共鋤園得金寧以鋤揮之與瓦礫無異歆掘而擲之又曰荀臣伯遠看友人疾值胡賊攻郡臣伯不忍去賊既至謂臣伯曰大軍至一郡並空汝何男子輕大軍而敢獨止臣伯曰有友人疾不忍委之寧以我身代友人之命賊知其賢自相謂言我輩無義之人而入有義之國疾促軍而還一郡並全又曰陸機赴假還洛輜重甚盛戴淵與年少掠之淵在岸上據胡床指揮左右皆得其宜淵既有風摽鋒潁雖處鄙事神氣獨異於眾機於舩屋上遙謂之曰卿才如此亦復作劫淵便流涕投劍歸機辭屬非常機彌重之便與定交咋筆薦焉又曰夏侯稱字義權年十六與文帝為布衣之交每讌氣凌一座辯士不能荅代之高者多從之遊又曰支道林喪法慶之後精神殞喪風味轉墜常謂人曰昔匠石廢斤於野人牙生輟絃於鍾子推己外求良不虛也冥契既逝發言莫賞中心蘊結余其亡矣卻後一年支遂亦隕又曰王爽與司馬太傅飲酒太傅醉呼王為小子王曰亡祖長史與簡文帝為布衣之交亡姊伉儷二宮何小子之有楊松玠談藪曰太原孫伯翳放情物外棲志丘壑與王令君高范將軍雲為莫逆之交琴操曰三士窮者其思革子之所作也其思革子戶文子叔衍子三人相與為友聞楚成王賢好士三人俱往見之於豪嶔巖之間卒逢飃風暴雨俱伏於空柳之下衣寒糧乏度不俱活三人相視歎曰與其飢寒俱死豈若并衣糧於一哉二子以革子為賢推衣與之革子曰生則同樂死則共之固辭二子曰吾相與猶左右手也左傷則右救右傷則左勞子不我受俱死無名可痛乎於是革子受之二子遂凍餓而死其思革子揭衣糧而去往見楚王王知其賢用旨酒嘉郩設鍾鼓樂之革子有憂悲之色楚王乃推樽罷樂升琴而進之其思革子援琴而鼓作相與別散之志孫楚牽招碑曰初君與劉備少長河朔英雄同契為刎頸之交有橫波截流柎翼橫飛之志俄而委質於太祖備遂鼎足於蜀漢所交非常為時所忌每自酌損乎季孟之間蔡邕真定真父碑曰其接友也審辯真偽明于知人度終始而後交情不踈而貌親夏侯湛鮑叔像贊曰鮑子愔愔式昭德音綢繆陳仲二人同心厥芳猶蘭其堅如金遙遙景跡君子攸欽周祗執友箴曰人亦可言貴則易交利重太山道輕鴻毛久而益敬見之晏平霜雪既至勁柏冬青, SBCK: ''}
