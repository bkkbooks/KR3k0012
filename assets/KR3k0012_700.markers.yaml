  - {type: variant, offset: 1929, length: 170, content: 人所具瞻不宜然景宗謂所親曰我昔在鄉里平澤中逐麞數助射之此樂使人忘死不知老之將至今來楊州作貴人動轉不得路行開車幔小人輒言不可開置車中如三日新婦此悒悒使人無氣又曰柳惔音談甚重婦頗成畏憚性愛音樂女妓精麗略不敢視僕射張稷與惔狎密而為惔妻賞敬稷每詣惔必先相聞夫人惔每欲見妓但因稷請奏其妻隔幔坐妓然後出惔因得留目六韜曰將冬不服棗夏不操扇天雨不張帳蓋名曰, SBCK: 帟}
