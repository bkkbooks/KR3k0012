  - {type: variant, offset: 608, length: 3, content: 高祖儉, SBCK: 毛惠}
  - {type: variant, offset: 608, length: 238, content: 高祖儉素內殿施黃紗帳又曰吐谷渾王河南其國多善馬有屋宇雜以百子帳即穹廬也隋書曰煬帝北巡欲誇戎狄令宇文愷為大帳其下坐數千人帝大悅賜物千段又造觀風行殿上容侍衛者數百人離合為之下施輪軸推移倏忽有若神功戎狄見之莫不驚駭唐書曰高祖時吳王杜伏威獻竹帳上以勞人不受又曰始畢可汗衙帳無故自破高祖曰此何祥也內史令蕭瑀進曰昔魏文帝幸許昌城門無故自壞帝惡之而返其年文帝崩始畢帳壞即其類也高祖然之抱朴子曰蔡伯喈到江東得論衡中國諸儒覺其談論更遠嫌得異書求其帳中隱處果得之傳子曰太祖武皇帝魏武帝愍嫁娶之僣上, WYG: 郄超字嘉賔桓}
