  - {type: variant, offset: 33, length: 0, content: '', krp: 居神以白珠爲簾箔玳瑁押之象牙爲蔑洞冥記曰漢武元鼎元年甘泉宮起招仙靈閣編翠羽麟毫以爲簾西京雜記曰漢諸陵寢皆以竹爲簾簾皆爲水文及龍鳯像又曰昭陽殿織珠爲簾風至聲如珩珮拾遺記曰石虎於太武殿前起樓髙十丈結珠爲簾垂五色玉珮至鏗鏘和鳴晉東宫故事曰簾箔皆以青布縁純三秦記曰明光宫在漸臺西以金玉珠璣爲簾箔叚龜龍涼州記曰吕纂時胡人發張駿塚得白珠薄簾汝南先賢傳曰范滂𬒳収曰願得一幡一薄埋於首陽山上不負皇天下不愧夷齊謝綽拾遺曰戴明寳歴朝寵倖家累千金大兒嬌滛爲五色珠簾明寳不能禁之崔寔政論曰珠璣玩飾匿若懐䄂丈繡蔽於帷簾夢書曰夢簾屏風蔽匿一身也唐國史𥙷曰尚書李廙有清德其妻劉晏妹也晏嘗造廙見其門簾甚弊乃暗度廣狹以麄竹織成不加縁飾將以贈廙三攜至門不敢發言而去帷說文曰在旁曰帷釋名曰帷圍也以自障圍也禮記曲禮曰帷簿之外不趨又曰弊帷不棄爲埋馬也又曰路馬死埋之以帷周禮春官下曰掌舎掌王之㑹同之舎帷宫設旌門謂王行晝止有所展肆若食息張帳爲官樹旌表門左傳曰齊歸公孫敖之喪爲孟氏且國故也爲惠叔毀請且國之之族故聽其歸殯而書之葬視共仲制如慶父皆以罪降聲巳不視帷堂而哭聲巳蕙叔母怨敖從莒女故帷堂又曰公孫歸父以襄仲之立也有寵欲去三桓以張公室與公謀而聘于晉欲以晉人去之冬公薨季子言於朝曰使我殺適立庶以失大援者仲也夫遂逐東門氏襄仲居東門子家還及笙子家歸父壇帷復命於介除地爲壇而張帷介副也使副反命於君又曰閭丘嬰以帷縛音篆其妻而載之與申鮮虞乗而出仁子莊公倍臣也鮮虞推而下之下嬰妻也曰君昏不能匡危不能救死不能死而知匿其眤匿藏也眤親也其誰納之又曰公孟有事於蓋獲之門外齊子氏帷於門外而伏甲焉禮記曰士喪君使人吊撤帷主人迎吊于寢門外}
