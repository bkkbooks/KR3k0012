  - {type: variant, offset: 2385, length: 432, content: 見誅世說曰庾太尉亮有兒年數歲溫太真常隱幔怛怛驚也之此兒神色恬然乃徐跪曰君侯何以為論者乃謂不減亮王融詠幔詩曰幸得與珠綴羃歷君之楹日暎不辭卷風來輒自輕每聚金鑪氣時駐玉琴聲但願置撙酒蘭釭當夜明幌說文曰櫎帷屏風之屬晉惠帝起居注曰有雲母幌鄴中記曰石虎太武殿西有崑華殿閣上輒開大䆫皆絳紗幌華延雋洛陽記曰洛陽城十八觀皆籠雲母幌幬說文曰幬單帳也謝承後漢書曰黃昌夏多蚊貧無幬傭債為作幬又曰羊續為廬江太守臥一幅布幬幬穿敗糊紙補之淮南子曰楚將子發求伎道之士楚有善為偷者願以伎自効子發禮之後齊伐楚偷乃夜解齊將之幬獻之子發因複還之齊將懼而退楚辭曰翡翠幬高堂紗版玄玉梁又曰翡翠珠被被爛衾齊光弱何拂壁羅幬張馬融廣成頌曰張雲帆施蜺幬曹植九詠曰蕙幬兮荃床床幨通俗文曰障床曰幨昌鹽切釋名曰床前帷曰幨幨垂也東宮舊事曰皇大子納妃有錄石綺絹裹床幨二青廬世說曰魏武帝少時常與袁紹好為遊俠觀人新婚因潛入主人園中夜叫呼云偷青廬中人皆出觀帝乃抽刀劫新婦與紹還出失道棘林中紹不能動帝復大叫偷人今在此紹惶迫自擲出遂俱免, WYG: 靣}
