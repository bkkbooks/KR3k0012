  - {type: punctuation, offset: 1341, content: 「, id: KR3k0012_CHANT_700-bkkpn418}
  - {type: variant, offset: 1341, length: 221, content: 陽道士葬巖室經數年尸猶儼然葛帳覆之幽明錄曰晉朱黃祖奉親至孝母病篤天漢開明有一老翁將小兒持箱自通即以兩丸藥賜母服之患頓消因停宿夜中廳事上有五色氣祭天琴歌清好祖往視之翁坐斗帳裹四角及頂上各有一大珠形如鵝子明彩炫耀馬融別傳曰融為通儒善鼓琴好吹笛達生任性不拘儒者節居宇器服多在侈飾常坐高堂施絳紗帳前授生徒後列女樂弟子次相傳授鮮有入其室者風俗通曰靈帝好胡服帳京師皆竟為之後董卓擁胡兵掠宮掖語林曰劉植詣石崇如廁見有絳文帳大床茵褥甚麗不得行乃更如他廁俗說曰, SBCK: 郄超字嘉賔}
