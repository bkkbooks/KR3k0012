  - {type: variant, offset: 847, length: 347, content: 主適人不過皂帳郭子曰許侍中顧司空俱作王丞相從事常夜在丞相許戲二人歡極丞相便使入己帳中眠顧至曉猶展轉不得熟寐許上床便大鼾丞相語諸客曰此中亦是難眠處耳東宮舊事曰皇太子納妃有熟絳綾帳絳絹幄又曰東齊夏施烏紗單帳四率坊洗馬坊烏練帳三輔事曰秦時奢侈綈帳綺繡土木朱紫漢武故事曰上以瑠璃珠玉明月夜光雜錯天下珍寶為甲帳其次為乙帳甲以居神乙以自居桓譚新論曰李少君置武帝李夫人神影於帳中令帝觀見之燕丹太子曰秦始皇置高漸離於帳中擊筑又時外國傳曰斯調王作白珠交結帳金床上天笁佛精舍天笁王見珠圓好意欲留焉臣下諫乃止拾遺錄曰蜀先主甘后坐於白絹帳中於外望之如月下聚雪益部耆舊傳曰翟酺上事云漢文帝連上事書囊以為帳惡聞紈素之聲神仙傳曰茅君當受神靈之職眾賓皆至忽然有素縑帳於屋下敷數重白氈金案玉柸人皆飽醉又曰茅君仙去民為立廟茅在帳中, WYG: ''}
