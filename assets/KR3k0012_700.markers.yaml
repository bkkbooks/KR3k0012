  - {type: variant, offset: 32, length: 0, content: '', SBCK: 曲或謂之麹自関以西謂之箔南楚謂之蓬薄漢書曰周勃以織薄曲爲業􅂫林曰薄一名曲也又曰嚴君平筮卜成都市日得百錢則閇肆下簾而授老子梁書曰夏侯亶性節儉不事華侈晚頗好音樂有妓妾十數人無􅀍服姿容毎有客常隔簾奏時謂簾曰夏侯妓衣齊書曰沈麟士字雲禎有髙尚之心居貧織簾誦書号爲織簾先生又曰栁丗隆善卜別􅀛甲價至萬永明􅀄丗隆曰永明九年我亡後三年丘山崩齊亦於此季矣屏人命典籖李黨取筆及髙齒屐題簾箔旌曰永明十一年因流涕謂黨曰汝當見吾不見也唐書曰張嘉貞蒲州猗氏人也弱冠應五經舉拜平郷尉坐事免歸侍御史張循憲爲河東採訪使薦嘉貞材堪憲官請以巳之官秩授之則天召見垂簾與之言嘉貞奏曰以臣草菜而得入謁九重是千載一遇也咫尺之間如隔雲霧竟不覩日月恐君臣之道有所未盡則天遽令卷簾與語大恱擢拜􅁥察御史又曰王鍔爲淮南作法軍中無一弃物至故簾亦令収之他日付舡坊以爲篸箬上作含切下而灼切他皆如此莊子曰河上有家貧窮緯蕭以爲業司馬彪注曰蕭蒿也織緯蒿爲薄簾也又曰張毅者髙門懸薄無不奏也漢武故事曰甲}
