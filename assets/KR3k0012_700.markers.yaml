  - {type: variant, offset: 1018, length: 1, content: 置, SBCK: 過市刑人赦夫人過市罸一幕丗子過市罸一帟命夫過市罰一盖命婦過市罰一帷謂諸侯及夫人丗子過其國市大夫内子過其都之市者人之所交利而行刑之處君子無故不遊觀之若遊觀之則施惠儀禮曰國君與卿圖事管人布幕寢門外左傳曰楚子元伐鄭楚師夜遁諜告曰楚幕有烏乃止諜間也鄭所使間候伺楚也幕帳也又曰呉季礼來聘過衛夜􅀫於戚戚子孫邑也聞鍾聲季子曰異哉夫子之在此猶燕之巢於幕上而又何樂乎文子聞之終身不聽琴瑟又曰晉人執季孫意如以幕蒙之漢書曰衛青征匈奴大尅}
