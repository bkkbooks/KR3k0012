  - {type: punctuation, offset: 1638, content: 「, id: KR3k0012_CHANT_700-bkkpn508}
  - {type: variant, offset: 1638, length: 4, content: 卞範為丹, SBCK: 劉穆之孫瑀仕官甚不得意至江陵與顔峻書曰朱循之三丗叛兵一日居荆州青油幕下作謝宣明靣唐書曰杜暹爲􅁥察御史徃磧西覆屯蕃人賷金以遺暹固辭不受左右言不可逆其情乃受而埋之幕下旣去乃移牒令取之黄石公三略曰軍幕未設將不言熱此謂之禮將說苑曰晏子謂景公曰合䟽縷之緯以成幕兵書曰將軍帳幕無故動敵人散走魚豢典畧曰孔子反衛見夫人在錦帷中孔子北靣稽首夫人自帷中再拜環佩之聲璆璆然王子年拾遺記曰漢成帝好微行於太液池傍起霄游宫鋪黒緹幕器服皆尚黒色漢武内傳曰李夫人旣死帝思之命工人作夫人形狀置於輕紗幕中宛然如生帝大恱楚辭曰離榭脩幕侍君之間間静潘安仁籍田賦曰青壇蔚其岳立翠幕黯似雲布張景洛}
