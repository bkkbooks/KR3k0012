  - {type: variant, offset: 140, length: 7, content: 上行幸諸國勑魴, SBCK: 郎將時休屠各及朔方烏丸並反燒度遼將軍門煙火相望兵衆大恐各欲亡走奐安坐}
  - {type: page-break, offset: 140, content: '', id: KR3k0012_SBCK_700-4b}
  - {type: variant, offset: 140, length: 0, content: '', WYG: 郎將時休屠各及朔方烏桓并反燒度遼将軍門煙火相望兵衆大恐各欲亡走奐安車帷中與弟子講書自若魏志曰司馬景王奏太后廢齊王芳曰帝於凌雲臺曲室中施帷見九親婦女呉志孫峻欲誅諸葛恪置酒伏兵於帷中晉書曰穆帝立年始二嵗皇太后禇氏設白紗帷於太極前殿抱帝臨軒晉陽秋曰武帝令曰殿前織成帷不湏施也宋書曰袁粲每經傅昭戸輙歎曰經其戸寂若無人披其帷其人斯在豈非名賢齊書曰毛惠素為少府卿性孝母服除後更修母所在處幃屏每月朔十五向帷悲泣傍人為之感傷終身如此呂氏春秋曰伍子胥将欲見呉王而不得客有言之於王子光者王子光見而惡其貌客以告子胥曰此易改也願令王子光居於堂}
