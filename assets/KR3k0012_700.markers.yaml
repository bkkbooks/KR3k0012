  - {type: variant, offset: 1195, length: 406, content: 人言鄴中記曰石虎御床辟方三丈冬月施熟錦流蘇斗帳四角安純金龍頭銜五色流蘇或用青綈光錦或用緋綈登高文錦或用紫綈大小錦絮以房子錦百二十斤白綈為裏名為裏複帳帳四角安純金銀鑿金香爐以石墨燒集和名香帳頂上安金連花花中懸金薄織成捥枕囊春秋但錦帳表以五色總為夾帳夏用紗羅或綦文丹羅或紫縠文為單帳鄧德明南康記曰陽道士葬巖室經數年尸猶儼然葛帳覆之幽明錄曰晉朱黃祖奉親至孝母病篤天漢開明有一老翁將小兒持箱自通即以兩丸藥賜母服之患頓消因停宿夜中廳事上有五色氣祭天琴歌清好祖往視之翁坐斗帳裹四角及頂上各有一大珠形如鵝子明彩炫耀馬融別傳曰融為通儒善鼓琴好吹笛達生任性不拘儒者節居宇器服多在侈飾常坐高堂施絳紗帳前授生徒後列女樂弟子次相傳授鮮有入其室者風俗通曰靈帝好胡服帳京師皆竟為之後董卓擁胡兵掠宮掖語林曰劉植詣石崇如廁見有絳文帳大床茵褥甚麗不得行乃更如他廁俗說曰桓玄在南州妾當產畏風應須帳桓曰不須作帳可以到夫人故帳與之世說曰郗超為桓溫參軍時, WYG: ''}
