  - {type: variant, offset: 32, length: 0, content: '', WYG: 筁或謂之麴自關以西謂之箔南楚謂之蓬箔漢書曰周勃以織曲為業又曰嚴君平筮卜成都市日得百錢則閉肆下簾而授老子梁書曰夏亶性莭儉不事華侈晩頗好音樂有妓妾十数人無被服姿容每有客常隔簾奏時謂簾曰夏侯妓衣齊書曰沈麟士字雲禎有高尚之心居貧織簾誦書號為織簾先生又曰栁世隆善卜别龜甲價至萬永明初世隆曰永明九年我亡後三年丘山崩齊亦於此季矣屏人命典籖李黨取筆及髙齒屐題簾箔旌曰永明十一年因流涕謂黨曰汝當見吾不見唐書曰張嘉貞蒲州猗氏人也弱冠應五經舉拜平郷尉坐事免歸侍御史張循憲為河東採訪使薦嘉貞材堪憲官請以已之官秩授之則天召見垂簾與之言嘉貞奏曰以臣草菜而得入謁九重是千載一遇也咫尺之間如隔雲霧竟不覩日月恐君臣之道有所未盡則天􅃍令卷簾與語大恱擢拜監察御史又曰王鍔為淮南作法軍中無一弃物至故簾亦令収之他日付舡以為簑箬他皆如此荘子曰河上有家窮緯蕭以為業又曰張毅者髙門懸薄無不走也漢武故事曰甲}
