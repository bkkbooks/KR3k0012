  - {type: variant, offset: 141, length: 0, content: '', WYG: 重帷而見之王子光許之子胥說之半王子光舉帷摶其手而與之坐淮南子曰先鍼而後縷可以成帷先縷而後緘不可以成衣漢武帝内傳曰七月七日宫掖之内張雲錦之帷燃九光之燈候西王母至也王母以紫錦為帷神仙傳曰淮南王見八公至足下及履迎之登思仙之臺張綺羅之帷西京雜記曰趙飛鷰為皇后其弟上遺金錯繡帷拾遺記曰漢安帝好㣲}
