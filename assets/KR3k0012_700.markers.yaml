  - {type: variant, offset: 1973, length: 411, content: 貴人動轉不得路行開車幔小人輒言不可開置車中如三日新婦此悒悒使人無氣又曰柳惔音談甚重婦頗成畏憚性愛音樂女妓精麗略不敢視僕射張稷與惔狎密而為惔妻賞敬稷每詣惔必先相聞夫人惔每欲見妓但因稷請奏其妻隔幔坐妓然後出惔因得留目六韜曰將冬不服棗夏不操扇天雨不張帳蓋名曰禮將不躬禮無以知士卒寒暑也軍令曰戰時皆取舡上布幔布衣漬水中積聚之賊有炬火火箭以掩滅之拾遺錄曰周穆王時鸞章錦幔者摩連國獻焉錦文如鸞翔又曰吳主趙夫人巧妙無雙權居昭陽宮倦暑乃褰紫絹之帷夫人曰此不足貴也權使夫人厝其思焉荅曰妄欲窮慮盡思能使下絹帷而清風自入視外無有蔽礙列侍者飄然自涼若馭風而行權稱善夫人乃扸髮以神膠續之神膠出鬱夷國接弓弩之弦百絕百續乃織為羅縠累月而成裁之為幔內外視之飄飄如煙氣輕動而房內自涼時權尚軍旅常以此幔自隨以為征幕舒之則廣縱一丈卷之內文漆忱中謂之絲絕秦記曰符堅以太常韋逞母宋傳其父業得周官音義乃就家立講堂書生百人隔紗幔而授業焉陸機別傳曰機夢黑幔繞車手決不開至, WYG: 謝宣}
