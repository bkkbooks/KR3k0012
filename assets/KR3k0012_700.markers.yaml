  - {type: variant, offset: 1636, length: 1, content: 又, SBCK: 書}
  - {type: variant, offset: 1636, length: 232, content: 又曰卞範為丹陽羊孚於南州蹔還往卞許云卞疾動不堪坐卞便開帳袚褥羊逕上卞大床枕入被下乃迴坐傾𣍿移辰達暮羊去卞執手曰我弟一理其卿卿莫負我魏武遺令曰吾與妓女皆著銅雀臺上施六尺床練帳月朝十五輒向帳作樂古詩曰紅羅複斗帳四角垂香囊柴子大七折曰錦衾內設羅幬繢帳也江淹別賦曰春宮悶此青苔色秋帳含茲明月光孔稚珪北山文曰蕙帳空兮夜鶴怨山人去兮曉猨驚離騷曰翡翠羽帳飾高堂劉玄休詩曰羅帳延秋月幔說文曰幔幕也釋名曰幔幔相連綴之言也廣雅曰幔掩也東觀漢記曰岑彭與吳漢圍隗囂壅谷水以縑幔盛土為堤灌城, WYG: ''}
  - {type: variant, offset: 1636, length: 1, content: 又, krp: 書}
