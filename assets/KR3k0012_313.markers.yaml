  - {type: variant, offset: 12, length: 1, content: 賈, SBCK: 文帝遣將賀􅀂弼伐陳後主令軍魯廣逹陳兵白土崗居衆軍之南偏鎭東大將軍任忠次之護軍樊毅都官尚書孔範又次之侍中車􅀐大將軍蕭摩訶軍最居北衆南北亘二十里首尾進退各不相知賀􅀂弼􅀄謂未戰將輕􅀐登山觀視形􅀔及見衆因馳下置陣廣逹首率所部進薄弼軍屢􅁍俄而}
