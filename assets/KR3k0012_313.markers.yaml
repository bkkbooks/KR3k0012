  - {type: variant, offset: 3432, length: 263, content: 亦去具裝馳入賊陣猛氣咆𠷺所向無敵當其鋒者無不應刃而倒如是數四每入眾無不披靡又曰高祖義軍進至覆舟東張疑兵以油帔冠株布蒲山谷帝先馳之將皆殊死戰無不當百呼聲動天地因風縱火煙焰張天謙等大敗齊書曰薛安都討魯爽及沈慶之濟江安都望見爽便躍馬大呼直往刺之應手而倒左右范雙斬爽首爽世裊猛咸云萬人敵安都單騎直入斬之而返時人皆云關羽斬顏良不足過也梁書曰大同初魏軍復圍南鄭杜懷瑤命第三子嶷帥二百人與魏前鋒戰於光道寺溪矢中其目失馬敵人交矟將至嶷斬其一騎躍而上馳以歸嶷旅力絕人便馬善射一日戰七八合所佩霜明朱弓四石餘力班絲纏矟長二丈五同心敢死士百七十人每出, SBCK: ''}
