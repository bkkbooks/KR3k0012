  - {type: variant, offset: 4419, length: 3, content: 遐為滎, SBCK: 簡子攻衛自將兵及戰且逺立又居於犀櫓之下鼓之而士不起簡子投桴而歎曰嗚呼士之弊一􅀂此乎行人燭過免胄横戈而進曰君不能耳士何弊之有簡子艴然作色曰寡人之無使而身自將是衆也子親謂寡人無能有􅀃則可無􅀃則死對曰昔吾先君獻公即位五年兼國十九用此士也惠公即位二年􅁋色􅁀嫚身好玉女􅁗人襲我去絳七十用此士也文公即位二年厎之以勇三年而士盡果敢城濮之戰五敗荆人圍衛取曹㧞石社定天子之位成尊名於天下用此士也亦有君不敢耳士何弊之有簡子乃去犀蔽屏櫓而立矢石之所及一鼓而士畢乗之簡子曰與吾得革車千乗也不如聞行人燭過之一言行人燭過可謂能諌其君矣又曰昔荆恭王與晉厲公戰於鄢陵荆師敗共王傷臨戰司馬子反渇而求飲竪}
  - {type: page-break, offset: 4419, content: '', id: KR3k0012_SBCK_313-6b}
  - {type: variant, offset: 4419, length: 1, content: 遐, WYG: 簡子攻衛自將兵及戰且逺立又居於犀櫓之下鼔之而士不起簡子投桴而嘆曰嗚呼士之弊一若此乎行人燭過免冑横戈而進曰君不能耳士何弊之有簡子艴然作色曰寡人之無使而身自將是衆也子親謂寡人無能有說則可無說則死對曰昔吾先君獻公即位五年兼國十九用此士也惠公即位二年淫色暴嫚身好玉女秦人襲我以至于敗用此士也文公即位二年底之以勇三年而士盡果敢城濮之戰五敗荆人圍衛取曹㧞石社定天子之位成尊名於天下用此士也君不能耳士何弊之有簡子乃去犀蔽屏櫓而立矢石之所一鼔而士畢乗之簡子曰與吾得革車千乗也不如聞行人燭過之一言行人燭過可謂能諫其君矣又曰昔楚共王與晉厲公戰於鄢陵楚師敗共王傷臨戰司馬子反渴而求飲竪陽榖操參酒而進之子反曰訾退酒也竪陽榖曰非酒子反曰訾退却竪陽榖又曰非酒也子反受而飲之子反性嗜酒甘而不能絶於口醉戰既罷共王欲復戰而謀使召子反子反辭以心疾共王駕而徃視之入幄中聞酒臭而還曰今日之戰不榖親侍所恃者司馬也而司馬又若此是忘荆國之社稷而不恤吾衆不榖無與商戰矣於是罷師去之斬司馬子反以}
