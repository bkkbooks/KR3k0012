  - {type: variant, offset: 3032, length: 350, content: 帳中與張蚝徐成等蚝七吏切跨馬運矛馳入評軍出入數四傍若無人搴旗斬將搴居輦反殺傷甚眾戰及日中評眾大敗俘斬五萬裴子野宋略曰左將軍劉康祖聞虜寇壽陽自虎牢率七千人來赴虜至者八萬騎康祖令軍中曰顧望者斬首轉步者斬足士皆用命賊死者萬餘血流沒踝流矢貫頸墮馬死宋書鄧琬傳曰殷孝祖屯軍鵲洲沈沖之謂陶亮曰昔孝祖梟將一戰便死孝祖與賊合戰每戰常以鼓盖自隨軍中人相謂曰殷統兵可謂死將矣今與賊交鋒而以羽儀自顯欲不斃得乎又曰傅弘之字仲度涼偽太子赫連瓌率眾襲長安弘之領步騎五千大破之瓌又抄渭南弘之又於寡婦渡破瓌獲賊二百及義真東歸赫連佛佛傾國追躡於青泥大戰弘之射貫甲冑氣冠三軍陣敗陷沒佛佛逼令降弘之不為屈也又高祖紀曰于時北師始還傷痍未復戰士纔數千賊眾十餘萬舳艫亘千里孟昶諸葛長仁懼欲擁天子過江帝曰今兵士雖少猶足一戰若其克濟臣主同休如其不然, SBCK: 延宗}
