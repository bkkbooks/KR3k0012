  - {type: variant, offset: 1832, length: 489, content: 振我為大臣以身殉國不亦可乎遂力戰而歿又曰明威將軍朱伺隨陶侃討杜弢有殊功石勒夏口之戰伺用鐵面自衛以弩的射賊大帥數人皆殺之賊挽船上岸於水邊作陣伺逐水上下以邀之箭中其脛氣色不變諸軍尋至賊潰追擊之皆棄船投水死者太半賊夜還長沙伺追至蒲沂不及而反加威遠將軍赤幢曲盖又曰朱伺劉浚與鄭攀戰楊口壘伺常所調弩忽噤不發伺甚惡之及賊攻陷北門伺退入船初浚開諸船底以木掩之名為船械伺既入賊舉鋌擿伺伺逆接鋌反以擿賊賊走上船屋大喚云賊帥在此伺從船底沉行五十步乃免又載記曰劉曜使其將軍平先丘中伯率勁騎追陳安安與壯士十餘騎於陜中格戰安左手奮七尺大刀右手執丈八虵矛近交則刀矛俱發輒害五六人遠則帶雙鞬左右馳射而走平先亦壯健絕人勇捷如飛與安搏戰三交奪其虵矛而退會日暮雨甚安棄馬與左右五六人步踰山嶺匿于嵠澗翌日尋之遂不知所在會連雨始霽輒振威呼延青尋其徑迹斬安于澗曲隴上歌之曰隴上壯士有陳安丈八虵矛左右槃戰始三交上虵矛東流之水名去不還劉曜命樂府歌又曰禿髮傉檀追赫連勃勃遣善射者射之中勃勃乃勒眾逆擊敗之追奔八十餘里殺傷萬計斬其大將十餘人以為京觀號髑髏臺還于嶺北又曰前秦符堅為姚萇所攻符堅率兵攻姚萇皆刻鋒鎧為死休字示以戰死為志每, WYG: ''}
