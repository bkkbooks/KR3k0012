  - {type: variant, offset: 2244, length: 259, content: 善射者射之中勃勃乃勒眾逆擊敗之追奔八十餘里殺傷萬計斬其大將十餘人以為京觀號髑髏臺還于嶺北又曰前秦符堅為姚萇所攻符堅率兵攻姚萇皆刻鋒鎧為死休字示以戰死為志每戰以長矟鉤刃為方圓大陣知有厚薄從中分配故人自為戰所向無前又曰後趙冉閔之亂石琨及張舉王朗率眾七萬伐鄴石閔帥騎千餘拒之城北閔執兩刃矛馳騎擊之皆應鋒摧潰斬級三千琨等大敗歸于冀州又曰朱伺善戰人或問之伺荅諸人以舌擊賊伺唯以刀耳又問曰將軍前後擊賊何以每得勝耶伺曰兩敵共對唯當忍之彼不能忍我能忍是以勝耳又曰周訪討江沔間賊杜曾訪有眾八千進至張陽曾銳氣甚盛訪曰先人有奪人之心善謀也使, SBCK: ''}
