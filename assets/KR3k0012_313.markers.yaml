  - {type: variant, offset: 4466, length: 0, content: '', SBCK: 濮之戰咎犯之謀也賞先季雍者何也文公言曰咎犯之言一時之權也季雍之言萬丗之利吾豈可以一時之權而先萬丗之利哉又曰敵潰而走後必可移適迫而不動名之曰奄遲擊之如雷霆斬之􅀂草木燿之􅀂火電欲疾以速人不及歩車不及以轉轂兵如植木弩如羊角人雖衆多􅀔莫敢格春秋感精符曰強傑並侵兵雷合龍門溺驂宋均曰龍門魯門也時與宋齊戰敗相殺血溺驂馬者也賈􅁩新書曰黄帝行道炎帝不聽故戰􅃰鹿之野血流漂杵三輔舊事曰武帝發兵攻衛太子連闘五日白虎門前溝中血流没足列女傳曰湯受命而伐桀戰于鳴條鳴條南夷地名桀師不戰湯遂放桀與末嬉嬖妾同舟浮海死於南巢之山諸􅁑亮兵法曰山陵之戰不仰其髙水上之戰不逆其流草上之戰不渉其深平地之戰不逆其虚此兵之利也故戰闘之利唯氣其形也衛公兵法曰凡事有形同而􅀔異者亦有勢同而形别者􅀂順其可則一舉而功濟如從未可則蹔動而必敗故孫臏曰計者因其􅀔而利導之兵法曰百里趨利則蹶上將}
