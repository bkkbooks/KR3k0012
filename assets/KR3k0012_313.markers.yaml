  - {type: variant, offset: 2506, length: 2, content: 恒督, SBCK: 孝逸領兵討之敬業率軍拒於下呵溪方成列敬業謂其徒曰自知衣甲非厚者居後衆乃爭退孝逸之師因其動譟而奔擊乃大破焉又曰建中􅀄田恱反以兵圍臨淄洺邢州詔以李晟爲神䇿先鋒都知兵馬使與河東節度使馬燧昭義軍節度使李抱真合兵救臨淄㝷加兼御史中丞河東昭義軍攻楊朝光於臨淄南晟與河東􅀐將李自良奉國擊悅於􅀟崗恱兵却遂斬朝光戰于臨淄諸軍皆却晟引軍渡淄水乗兵而濟横擊恱諸軍復振擊恱大破悅於洹水以功加檢校}
  - {type: page-break, offset: 2506, content: '', id: KR3k0012_SBCK_313-2b}
  - {type: variant, offset: 2506, length: 0, content: '', krp: 孝逸領兵討之敬業率軍拒於下呵溪方成列敬業謂其徒曰自知衣甲非厚者居後衆乃爭退孝逸之師因其動譟而奔擊乃大破焉又曰建中𥘉田恱反以兵圍臨淄洺邢州詔以李晟爲神䇿先鋒都知兵馬使與河東節度使馬燧昭義軍節度使李抱真合兵救臨淄㝷加兼御史中丞河東昭義軍攻楊朝光於臨淄南晟與河東騎將李自良奉國擊悅於雙崗恱兵却遂斬朝光戰于臨淄諸軍皆却晟引軍渡淄水乗兵而濟横擊恱諸軍復振擊恱大破悅於洹水以功加檢校左散騎常侍實封百户又曰德宗以李晟兼魏府左司馬居無何朱滔王武俊皆反聮兵救田悅悅深壁不戰以老王師時武俊遣兵圍康曰知於趙州晟乃獻狀請解趙州圍因合義武節度使張孝忠以軍圗范陽上大壯之乃加御史大夫俾禁兵將莫仁擢趙光銑杜季玼皆隷焉晟乃自魏州直趨趙州賊解圍而去晟留趙州三日與義武合軍而北略}
  - {type: substitution, offset: 2506, original: 恒, replacement: 恆, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-4383}}
  - {type: variant, offset: 2507, length: 9, content: 督左甄許朝督右甄訪, krp: 州圍朱滔將鄭景濟於清苑決水灌之田恱朱滔王武俊皆遣兵來救戰於白樓賊犯義武義武軍却晟引歩騎數百擊破之景濟所乗馬連中流矢踰月城中益急滔武俊大懼乃}
  - {type: variant, offset: 2509, length: 7, content: 甄許朝督右甄訪, SBCK: 散􅀐常侍實封百户又曰德宗以李晟兼魏府左司馬居無何朱滔王武俊皆反聮兵救田悅悅深壁不戰以老王師時武俊遣兵圍康曰知於趙州晟乃獻􅃺請解趙州圍因合義武節度使張孝忠以軍圗范陽上大壯之乃加御史大夫俾禁兵將莫仁擢趙光銑杜季玼皆􅈻焉晟乃}
