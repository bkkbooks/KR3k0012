  - {type: variant, offset: 4294, length: 0, content: '', krp: 人盈野爭城以戰殺人盈城此所爲率土地而食人肉罪不容於死也六韜曰以少擊衆必以日之暮以衆擊衆必以日之早穰苴兵法曰以戰去戰戰雖戰可也戰春不東秋不西月食還師所以止戰也古司馬兵法曰凡軍使法在巳曰專與下畏法曰法軍無小聽戰無小利小聽謂輕弱敵人稱其虚弱危敗昜勝以喜士衆沮備預也小利謂小敵擊誘於鉺數爲小戰也又曰凡五兵長以衛短短救長迭戰則乆皆戰則強迭更也言更息則可堪乆悉舉兵戰衆多者強孫子曰兵以詐立以利動以分合變者也兵一分合以敵爲變兵法詭詐以利動敵心或合離爲變化之術也故其疾如風言進退應機其徐如林不見利不前也如風吹林木小動而其大不移侵掠如火疾也抄掠財物如炎火之猛烈不動如山守也不信敵之誑惑安固如山}
  - {type: variant, offset: 4295, length: 1, content: 當, SBCK: 知如隂莫測如天之隂雲不見列􅀫之象動如雷霆盛猛速疾不及應也故太公曰疾雷不及掩耳疾電不及瞋目也指嚮分衆因敵而制勝也旌旗之所指向則往分離其師衆也先知迃直之計者勝此軍爭之法也又曰我專而敵分我專一而敵分散也我專爲一敵分爲十是以十共其一也我料見敵形審其虚實故所備者少專爲屯以我之專擊彼之散卒爲十共擊一也則我衆而敵寡我專爲一故衆敵分爲十故寡能以衆敵寡者則吾所與戰者約矣言約少而易勝吾所與戰之地不可知也言舉動㣲密情不可使彼知吾所舉不知吾所集也不可知則敵所備者多敵所備者多則吾所與戰者寡矣形藏敵疑則分離其衆備我也言少而易擊故也故備前則後寡備後則前寡備左則右寡備右則左寡無不備者無不寡言敵之所備者多則士卒無不分散而少寡者備人者也敵分散而少者皆先備人也衆者使人備已者也敵所以備多已者由我專而衆散故也故知戰之地知戰之日則千里而㑹戰以度量知空虚先知戰地之形又必戰之日則可千里期㑹先徃以待之若敵以先至不往可以勞之不知戰地不知戰日則左不能救右右不能救左前不能救後後不能救前而况逺者數十里近者數里乎敵以先居形勢之地已方趨利欲戰則}
  - {type: page-break, offset: 4295, content: '', id: KR3k0012_SBCK_313-5b}
  - {type: variant, offset: 4295, length: 1, content: 當, WYG: 知如隂難知如天之隂雲不知列宿之象動如雷霆盛猛疾撃不知所避故太公曰疾雷不及掩耳疾雷不及瞑目也指嚮分衆因敵而制勝也旌旗之所指向則分吾師衆也先知迂直之計者勝此軍争之法也又曰形人而我無形則我專而敵分我形一敵形十也我專為一敵分為十是以十攻其一也我見敵形審其虛實故所備者少專為一屯以我之專撃彼之散卒為十撃其一也則我衆而敵寡我專為一故衆敵分為十故寡能以衆敵寡者則吾之所與戰者約矣言約少而易勝吾所與戰之地不可知言舉動㣲宻不可使彼知吾所舉知吾所集也不可知則敵所備者多敵所備者多則吾所與戰者寡矣形藏故不測則分用其衆以備我少則易撃故也故備前則後寡備後則前寡備左則右寡備右則左寡無不備者無不寡言敵之所備者多則士卒無不分散而少寡者備人者也敵分散而少皆先備人者也衆者使人備己者也敵以多備己者由我分其衆散故也故知戰之地知戰之日則可千里而㑹戰以度量而知也先知戰地之形又知戰之日則可千里期㑹先往以待之若敵已先至不可以勞師夫善戰必知戰之日知戰之地度道設計分軍禦敵近者先進逺者後發千里之㑹同時而合若㑹都市其㑹地之日無令知之則所備處多備寡則專備多則分分則力散専則力并也不知戰地不知戰日則左不能救右右不能救左前不能救後後不能救前而况逺者數十里近者數里乎敵已先據形勢之地已方趨利欲戰則}
