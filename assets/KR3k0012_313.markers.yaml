  - {type: variant, offset: 397, length: 645, content: 亂溺死者數千人又曰張步攻耿弇營與劉歆等戰弇升王宮瓌臺望之臨淄本齊國所都即齊王宮中有環臺也東觀記作瓌臺視歆等鋒交乃引精兵以橫突步陣於東城下大破之飛矢中弇股以佩刀截之左右無知者又曰袁紹使麴安攻公孫瓚紹在後十數里聞瓚已破發鞍息馬唯衛帳下強弩數十張大戟士百許人瓚散兵二千餘騎卒至圍紹數重射矢雨下田豐扶紹使却入空垣紹脫兜鍪抵地曰大丈夫當前鬥死而返逃垣墻間耶促使諸弩並發多傷瓚騎眾不知是紹頗稍引却會麴義來迎騎乃散退又曰鄧禹還長安張宗夜將銳士入城襲赤眉中矛貫脾脾背上兩膊間又轉攻諸營保為流矢所激皆幾至於死又曰賈復從上擊青犢於射犬大戰至日中賊陣堅不却光武傳召復曰吏士皆飢可但朝飯復曰先破之然後食耳於是被羽先登被猶負也折羽為旌旌旗將軍所執先登先赴敵也所向皆靡賊乃敗走諸將咸服其勇又曰陳俊字子昭拜強弩將軍所向皆敗世祖曰戰將盡如此豈有憂乎魏志曰母丘儉字仲恭有幹策為幽州刺史度遼將軍儉以高句驪數侵叛督將軍出玄菟從道滑討之句驪王宮將步騎逆軍沸水上大戰宮連破走遂束馬懸車登九都山屠高麗所斬獲首虜以千數使玄菟太守王頎追過沷沮千餘里至肅慎界刻石紀功刊丸都之山銘不耐之城又曰代郡烏桓反以任城王彰為北中郎將行驍騎將軍臨發太祖誡彰曰居家為父子受事為君臣動以王法從事爾其誡之彰北征入涿郡界叛胡數千騎卒至時兵馬未集唯有步卒千人騎數百疋用田豫計固守要隟虜乃散退彰追之身自戰射胡騎應弦而倒者前後相屬戰過半日彰鎧中數箭意氣益廣乘勝逐北至于乘乾臣松之案乘乾縣名屬代郡今北虜居之號為乘乾郡去代二百餘里長史諸將皆以為新涉遠士馬疲又受節度不得過代, SBCK: 潰}
