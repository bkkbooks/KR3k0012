  - {type: variant, offset: 4294, length: 0, content: '', SBCK: 人􅄹野爭城以戰殺人􅄹城此所爲率土地而食人􅁏罪不容於死也六韜曰以少擊衆必以日之暮以衆擊衆必以日之早穰苴兵法曰以戰去戰戰雖戰可也戰春不東秋不西月食還師所以止戰也古司馬兵法曰凡軍使法在巳曰專與下畏法曰法軍無小聽戰無小利小聽謂輕弱敵人稱其虚弱危敗昜勝以喜士衆沮備預也小利謂小敵擊誘於鉺數爲小戰也又曰凡五兵長以衛短短救長迭戰則乆皆戰則強迭更也言更息則可堪乆悉舉兵戰衆多者強孫子曰兵以詐立以利動以分合變者也兵一分合以敵爲變兵法詭詐以利動敵心或合離爲變化之術也故其疾如風言進退應機其徐如林不見利不前也如風吹林木小動而其大不移侵掠如火疾也抄掠財物如炎火之猛烈不動如山守也不信敵之誑惑安固如山}
  - {type: page-break, offset: 4294, content: '', id: KR3k0012_SBCK_313-5a}
  - {type: variant, offset: 4294, length: 0, content: '', WYG: 人盈野爭城以戰殺人盈城此所謂率土地而食人肉罪不容於死六韜曰以少擊衆必以日之暮以衆擊衆必以日之早穰苴兵法曰以戰出戰雖戰可也戰春不東秋不西月食還師所以止戰也古司馬兵法曰凡軍使法在巳曰專無不畏法曰法軍無小聽戰無小利小聽謂輕聽敵人稱其虛弱危敗易勝以喜士衆沮備預也小利謂輕敵人誘於利數為戰也又曰凡五兵長以衛短短以救長更戰則乆皆戰則強更迭也孫子曰兵以詐立以利動以分合變者也兵之分合以敵為變兵法詭詐以利動敵心令離為變化之術也故其疾如風言進退機變其徐如林不見利不前也如林森然不亂之謂侵掠如火喻其猛烈之勢不可止遏也不動如山如山喻鎮静之形不可揺撼也}
  - {type: page-break, offset: 4294, content: '', id: KR3k0012_WYG_313-7b, image: WYG0895/WYG0895-0701b.png}
