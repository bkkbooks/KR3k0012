  - {type: variant, offset: 4469, length: 3, content: 夏雨頻, SBCK: 而趨利者半至善動敵者形之而敵從之與之而敵取之以竒動之以夲待之此戰􅀔之要術也􅀂我士卒以齊法令以行竒正以設置陣以定誓衆以畢上下巳怒天時巳應地利也據鼔角以震風􅀔巳順敵人雖衆其奈我哉譬虎之有牙兕之有角身不蔽捍手無寸刃而欲􅅮之􅀔不可觸其亦明矣故兵有三􅀔一曰氣􅀔二曰地􅀔三曰因􅀔􅀂將勇輕敵士卒樂戰三軍之衆志厲青雲氣等飄風聲如雷霆此所謂氣􅀔也􅀂􅀜山狹路大阜深澗龍虵蟠隂羊膓拘門一夫守險千人不過此所謂地􅀔也􅀂因敵怠慢勞役飢渇風波驚擾將吏縱横前營未舎後軍半濟此謂因􅀔也􅀂遇此􅀔當潜我形出其不意用竒設伏乗􅀔取勝是以良將用兵審於機􅀔而用兵仍湏鼔而怒之感而勇之賞而勸之激而􅀭之􅀂鷙之玃獸之􅅮必修其牙距度力而下逺則氣衰而不及近則形見而不得故良將之戰必整其三軍礪其鋒甲設其竒伏量其形􅀔遥則力疲而不及近則敵知而不應􅀂不通此機乃智不及於鳥獸亦何能取勝於勍㓂乎仍須怒士勵衆使之􅁬勇故能無強陣於前無堅城於外以弱勝強必因􅀔也楊子雲長楊賦曰髙祖奉命順斗極運天􅀜横巨海漂崑崙提劒而叱之所過麾城摲邑下將}
  - {type: page-break, offset: 4469, content: '', id: KR3k0012_SBCK_313-9a}
  - {type: variant, offset: 4469, length: 4, content: 夏雨頻降, WYG: 而趨利者軍半至善動敵者形之而敵從之與之而敵取之以行動之以本待之此戰勢之要術也若我士卒以齊法令以行竒正以設置陣以定誓衆已畢上下已怒天時已應地利已據鼔角以振風勢以順敵人雖衆其奈我何哉譬虎之有牙犀之有角身不蔽捍手無寸刃而欲搏之勢不可觸其亦明矣故兵有三勢一曰氣勢二曰地勢三曰因勢若將勇輕敵士卒樂戰三軍之衆志}
  - {type: page-break, offset: 4469, content: '', id: KR3k0012_WYG_313-14a, image: WYG0895/WYG0895-0704c.png}
  - {type: variant, offset: 4469, length: 3, content: 夏雨頻, krp: 而趨利者半至善動敵者形之而敵從之與之而敵取之以竒動之以夲待之此戰勢之要術也若我士卒以齊法令以行竒正以設置陣以定誓衆以畢上下巳怒天時巳應地利也據鼔角以震風勢巳順敵人雖衆其奈我哉譬虎之有牙兕之有角身不蔽捍手無寸刃而欲搏之勢不可觸其亦明矣故兵有三勢一曰氣勢二曰地勢三曰因勢若將勇輕敵士卒樂戰三軍之衆志厲青雲氣等飄風聲如雷霆此所謂氣勢也若關山狹路大阜深澗龍虵蟠隂羊膓拘門一夫守險千人不過此所謂地勢也若因敵怠慢勞役飢渇風波驚擾將吏縱横前營未舎後軍半濟此謂因勢也若遇此勢當潜我形出其不意用竒設伏乗勢取勝是以良將用兵審於機勢而用兵仍湏鼔而怒之感而勇之賞而勸之激而揚之若鷙之玃獸之搏必修其牙距度力而下逺則氣衰而不及近則形見而不得故良將之戰必整其三軍礪其鋒甲設其竒伏量其形勢遥則力疲而不及近則敵知而不應若不通此機乃智不及於鳥獸亦何能取勝於勍㓂乎仍須怒士勵衆使之奮勇故能無強陣於前無堅城於外以弱勝強必因勢也楊子雲長楊賦曰髙祖奉命順斗極運天關横巨海漂崑崙提劒而叱之所過麾城摲邑下將}
