  - {type: variant, offset: 4474, length: 1, content: 涉, WYG: 青雲氣等天風聲如雷霆此謂氣勢也若關山狹路大阜深澗龍蛇蟠隂羊腸狗門一夫守險千人不過此謂地勢也若因敵怠慢勞役饑渴號令不一將吏縱横前營未舍後軍半濟此謂因勢也若遇此勢當潜我形出其不意用竒設伏乗勢取勝是以良將用兵審其機勢而用之仍須鼔而怒之感而勇之賞而勸之激而揚之若鷙之攫獸之搏必脩其牙距仗力而下逺則氣衰而不及近則形見而不得故良將之戰必正其三軍礪其鋒甲設其竒伏量其形勢逺則力疲而不及近則敵知而不應若不通此機乃智不及于鳥獸亦何能取勝于勍㓂乎仍須怒士鼔衆使之奮勇故能無強陣于前無堅城于外以弱勝強必然勢也揚子雲}
