  - {type: variant, offset: 4423, length: 6, content: 太守時蕭衍將, SBCK: 榖操參酒而進之酒器受三升曰參子反曰訾退酒也竪陽􅂖曰非酒也子反曰訾退却竪陽􅂖又曰非酒也子反受而飲之子反之爲人也嗜酒甘而不能絶於口醉戰旣罷共王欲復戰而謀使召司}
  - {type: page-break, offset: 4423, content: '', id: KR3k0012_SBCK_313-7a}
  - {type: variant, offset: 4423, length: 6, content: 太守時蕭衍將, WYG: 榖之進酒也非以醉子反也其心以忠也而適足殺之故曰小忠大忠之敗也又曰齊與晉戰平阿之餘子亡㦸得矛退而去不自快謂路之人曰亡㦸得矛可以歸乎路之人曰㦸兵也矛亦兵也何為不可以歸餘子猶不自快也遇高堂之孤叔無孫叔姓無孫名平阿餘子當其}
  - {type: variant, offset: 4423, length: 6, content: 太守時蕭衍將, krp: 榖操參酒而進之酒器受三升曰參子反曰訾退酒也竪陽糓曰非酒也子反曰訾退却竪陽糓又曰非酒也子反受而飲之子反之爲人也嗜酒甘而不能絶於口醉戰旣罷共王欲復戰而謀使召司}
