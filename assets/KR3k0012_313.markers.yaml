  - {type: variant, offset: 4298, length: 8, content: 隊騎八人難當大驚, SBCK: 前後惑疑進退不能相救況數十里之間也故善用兵者譬如帥然帥然者常山之虵也擊其首則尾至擊其尾則首至擊其中則首尾俱至夫善戰也必知戰之日知戰之地度道設期分軍離卒逺者先進近者後發千里之㑹同時而合若㑹都市其㑹地之日無令敵知知之則所備處少知所備處多備寡則專備多則分分則力散專則力并也}
