  - {type: variant, offset: 1295, length: 299, content: 至日過中羽攻益急德謂督將成何曰吾聞良將不怯死以茍免烈士不毀節以求生今日我死日也戰益怒氣愈壯而水浸盛吏士皆降德與麾下將一人伍伯二人彎弓傅矢登小船欲還仁營水盛船覆失弓矢獨抱船覆水中為羽所得立而不跪羽謂曰卿兄在漢中我欲以卿為將不早降為德罵羽曰豎子何謂降也魏王帶甲百萬威振天下汝劉備庸才耳豈能敵耶我寧為國家鬼不為賊將也遂為羽所殺吳志曰孫權討黃祖祖橫兩蒙衝俠守沔口以栟櫚大紲繫石為磴上有千人以弩交射飛矢雨下軍不得前董襲與陵統俱為前部各將敢死百人被兩鎧乘大船突入蒙衝裹身以刀斫兩紲蒙衝橫流大兵遂進祖便開門走兵追斬之明日大會權舉觴屬襲曰今之會斷紲之功晉書曰劉毅等誅桓玄兵至竹里玄使其將皇甫敷吳甫之拒毅軍遇之於江乘, WYG: 于}
