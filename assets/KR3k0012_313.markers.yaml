  - {type: variant, offset: 4461, length: 4, content: 鮑口去胊, SBCK: 是不聽雍季之計而用咎犯之謀與楚人戰大破還賞有功者先季雍左右曰}
  - {type: variant, offset: 4461, length: 5, content: 鮑口去胊城, WYG: 是不聴雍季之計而用舅犯之謀與楚人戰大破之還賞有功者先雍季或問之文公言曰舅犯之言一時之權也雍季之言萬世之利也吾豈可以一時之權而先萬世之利哉又曰敵潰而走後必可移敵廹而不動名之曰奄遲擊之如雷霆斬之若草木燿之若火電欲疾以速人不及步車不及轉轂兵如植木弩如羊角人雖衆多勢莫敢格春秋感精符曰強傑並侵兵雷合龍門溺驂宋均曰龍門魯門也時與宋齊戰敗血溺驂馬也賈誼新書曰黄帝行道炎帝不聽故戰於涿鹿之野血流漂杵三輔􅃇事曰武帝發兵攻衛太子連鬬五日白虎門前溝中血流没足列女傳曰湯受命而伐桀戰于鳴條桀師敗湯遂放桀桀與妹喜嬖妾同舟浮海死於南巢之山諸葛亮兵法曰山陵之戰不仰其高水上之戰不逆其流草上之戰不渉其深平地之戰不逆其虛此兵之利也故戰鬭之利唯氣形也衛公兵法曰凢事有形同而勢異者亦有勢同而形異者若順其可則一舉而功濟如從未可則蹔動而必敗故孫臏曰計者因其勢而利道之兵法曰百里趨利則蹶上將}
