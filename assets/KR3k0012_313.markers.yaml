  - {type: variant, offset: 1101, length: 108, content: 之斬首獲生以千數彰乃倍常科大賜將士將士無不悅喜時鮮卑大人軻比能將數萬騎觀望強弱見彰力戰所向皆破乃請服北方悉平時太祖在長安召彰彰自代過鄴太子謂彰曰卿新有功今西見上勿宜自伐彰到如太子言歸功諸將太祖喜持彰鬚曰黃鬚兒竟大可用, WYG: 焉}
