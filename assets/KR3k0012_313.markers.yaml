  - {type: variant, offset: 1157, length: 1086, content: 祖在長安召彰彰自代過鄴太子謂彰曰卿新有功今西見上勿宜自伐彰到如太子言歸功諸將太祖喜持彰鬚曰黃鬚兒竟大可用又曰龐德與曹仁討關羽德屯沔北十里會天霖雨十餘日漢水暴溢樊下平地五六丈德與諸將避水上隄羽乘船攻之以大舡四面射隄上德披甲荷弓箭不虛發將軍董衝部曲將統超等欲降德皆收斬之自平旦力戰至日過中羽攻益急德謂督將成何曰吾聞良將不怯死以茍免烈士不毀節以求生今日我死日也戰益怒氣愈壯而水浸盛吏士皆降德與麾下將一人伍伯二人彎弓傅矢登小船欲還仁營水盛船覆失弓矢獨抱船覆水中為羽所得立而不跪羽謂曰卿兄在漢中我欲以卿為將不早降為德罵羽曰豎子何謂降也魏王帶甲百萬威振天下汝劉備庸才耳豈能敵耶我寧為國家鬼不為賊將也遂為羽所殺吳志曰孫權討黃祖祖橫兩蒙衝俠守沔口以栟櫚大紲繫石為磴上有千人以弩交射飛矢雨下軍不得前董襲與陵統俱為前部各將敢死百人被兩鎧乘大船突入蒙衝裹身以刀斫兩紲蒙衝橫流大兵遂進祖便開門走兵追斬之明日大會權舉觴屬襲曰今之會斷紲之功晉書曰劉毅等誅桓玄兵至竹里玄使其將皇甫敷吳甫之拒毅軍遇之於江乘臨陳斬甫之進至羅落橋又斬敷首玄大懼使使柏謙何澹之屯覆舟山毅等軍至嶈山𥙿使羸弱登山多張旗熾玄不之測益以危懼謙等士卒多北府人素懼伏𥙿莫敢出鬥𥙿與毅等分為數隊進突謙陳皆殊死戰無不一當百時東北風急毅軍放火烟塵張天鼓譟之音震駭京邑謙等諸軍一時奔散又曰周處攻齊萬年於六陌將戰處軍人未食齊王肜促命速進而絕其後繼處知必敗賦詩曰去去世事已策馬觀西戎藜藿甘粱黍期之克命終言畢而戰自旦及暮斬首萬計弦絕矢盡左右勸退處案劍曰此是吾効節受命之日何退之為且古者良將受命鑿凶門以出盖有進無退也今諸軍負信勢必不振我為大臣以身殉國不亦可乎遂力戰而歿又曰明威將軍朱伺隨陶侃討杜弢有殊功石勒夏口之戰伺用鐵面自衛以弩的射賊大帥數人皆殺之賊挽船上岸於水邊作陣伺逐水上下以邀之箭中其脛氣色不變諸軍尋至賊潰追擊之皆棄船投水死者太半賊夜還長沙伺追至蒲沂不及而反加威遠將軍赤幢曲盖又曰朱伺劉浚與鄭攀戰楊口壘伺常所調弩忽噤不發伺甚惡之及賊攻陷北門伺退入船初浚開諸船底以木掩之名為船械伺既入賊舉鋌擿伺伺逆接鋌反以擿賊賊走上船屋大喚云賊帥在此伺從船底沉行五十步乃免又載記曰劉曜使其將軍平先丘中伯率勁騎追陳安安與壯士十餘騎於陜中格戰安左手奮七尺大刀右手執丈八虵矛近交則刀矛俱發輒害五六人遠則帶雙鞬左右馳射而走平先亦壯健絕人勇捷如飛與安搏戰三交奪其虵矛而退會日暮雨甚安棄馬與左右五六人步踰山嶺匿于嵠澗翌日尋之遂不知所在會連雨始霽輒振威呼延青尋其徑迹斬安于澗曲隴上歌之曰隴上壯士有陳安丈八虵矛左右槃戰始三交上虵矛東流之水名去不還劉曜命樂府歌又曰禿髮傉檀追赫連勃勃, SBCK: 后}
