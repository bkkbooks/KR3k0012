  - {type: variant, offset: 2560, length: 401, content: 屬左甄力戰敗而復合胤馳馬告急訪怒叱令更進號哭還戰自辰至申兩甄皆敗訪選精銳八百人自行酒飲之勑不得輒動聞鼓音乃進賊未至三十步訪親鳴鼓將士皆騰躍奔赴曾遂大潰殺千餘人遂定漢沔又曰劉𥙿舉兵伐後秦姚泓王鎮惡為前鋒軍至渭橋鎮惡所乘皆蒙衝小艦鎮惡登岸渭水流急倏忽間諸艦悉逐流去時泓屯軍在長安城下猶數萬人鎮惡撫慰士卒曰卿諸人並家在江南此是長安門外去家萬里而舫乘衣糧並已逐流去豈復有生之計耶唯宜死戰可以立大功不然則無遺類矣乃身先士卒眾亦知無復退路莫不騰踊爭先泓眾一時奔潰即陷長安城崔鴻十六國春秋曰前秦符堅將王猛討前燕慕容暐暐遣將慕容評屯於潞川以拒之猛與評相持遣禆將郭慶以銳卒五千夜從間道出評營後傍山起火燒其輜重暐懼遣使讓評催之遣戰猛知評賣水鬻薪有可乘之會評又求戰乃陳於潞原而誓眾曰今與諸君深入賊地宜各勉進不可退也願戮力行間以報恩願受爵明君之朝慶觴父母之室不亦美乎眾皆勇奮破釜棄糧大呼競進猛覩評師之眾也惡之謂鄧羌曰今日之事非, WYG: ''}
