  - {type: variant, offset: 4293, length: 0, content: '', WYG: 安都乃免覇先乃自率其麾下出幕府山南吳明徹沈㤗等衆軍首尾擊之齊軍大潰自相蹂藉壅川塞谷莊子曰惠子見戴晉人曰有所謂蝸者君知之乎曰然有國於蝸之左角者曰觸氏有國於蝸之右角者曰蠻氏時相與爭地而戰伏尸數萬逐北旬有五日而後返誠知所爭者若此之細則天下無爭矣尸子曰廟戰者帝神化者王廟戰者法天道也神化者明四時也列子曰黄帝與炎帝戰于版泉之野率熊羆狼貙虎豹前驅鵰鶡鷹鳶為旗幟此以力使禽戰也孟子曰爭地以戰}
