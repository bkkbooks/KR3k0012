  - {type: variant, offset: 4430, length: 11, content: 仙琕率眾攻圍昫城戍主傅, SBCK: 子反子反辭以心疾共王駕而徃視之入幄中聞酒􅆨而還曰今日之戰不􅂖親侍所恃者司馬也而司馬又􅀂此是忘荆國之社稷而不恤吾衆不􅂖無與傷戰矣於是罷師去之斬司馬子反以爲戰故竪陽􅂖之進酒也非以醉子反也其心以忠也而適足殺之故曰小忠大忠之敗也又曰齊晉與戰平阿之餘子亡㦸得矛平阿齊邑餘子官氏退而去不自快謂路之人曰亡㦸得矛可以歸乎路之人曰㦸亦兵也矛亦兵也亡兵何爲不可以歸心猶不自快也遇髙堂之􅀌叔無孫􅀌特位尊也叔姓無孫名餘子當其馬前曰今者戰亡㦸得矛可以歸乎叔孫曰矛非㦸也㦸非矛也亡㦸得矛豈亢責也哉亢當平阿餘子曰嘻還反戰趨尚及之遂戰而死又曰呉起謂啇}
  - {type: page-break, offset: 4430, content: '', id: KR3k0012_SBCK_313-7b}
  - {type: variant, offset: 4430, length: 11, content: 仙琕率眾攻圍昫城戍主傅, WYG: 前曰今者戰亡㦸得矛可以歸乎叔孫曰矛非㦸也㦸非矛也亡㦸得矛豈無責也哉平阿餘子曰嘻還反戰趨尚及之遂戰而死又曰吳起謂商}
