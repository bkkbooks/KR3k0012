  - {type: variant, offset: 1099, length: 0, content: '', SBCK: 其弱必突過其陣自背而反擊之不無潰多用此而制勝思得其理深也又曰武德中李靖隨河間王孝恭討蕭銑於江陵不從靖謀致敗委舟}
  - {type: variant, offset: 1099, length: 0, content: '', WYG: 其弱必突過其陣自背而反擊之無不潰多用此而制勝思得其理深也又曰武徳中李靖隨河間王孝恭討蕭銑於江陵不從靖謀致敗賊委舟大掠人皆負重靖見其兵亂進兵擊之賊大敗又乗勝進入其郛郭攻其水城克之悉取其舟楫散於江中賊救兵見之謂城已䧟莫敢輕進銑内外阻絶城中擕貳由是懼而出降又曰光宅初武太后臨朝稱制徐敬業於揚州起兵以匡復皇家為辭月餘致精卒數萬太后遣將軍孝逸領兵討之敬業率軍拒於下阿溪方成列敬業謂其徒曰自知衣甲非厚者居後衆乃爭退孝逸之師因其動譟而奔擊乃}
