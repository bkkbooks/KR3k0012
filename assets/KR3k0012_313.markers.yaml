  - {type: variant, offset: 125, length: 6, content: 被瘡中額攝憤, SBCK: 從之思恩遂突擊殺數人直至㧞麾下短兵方接所從􅀐士退思恩爲㧞所殺㧞遂乗之義臣軍北者十餘里又曰煬帝征髙麗隋大將宇文􅄒與九軍過鴨緑水又東注薩水去髙麗平壤城三十里因山爲營髙麗國相乙支文德遣使僞降請􅄒曰遂旋師者奉其主髙元朝行在所􅄒見士卒疲弊不可}
