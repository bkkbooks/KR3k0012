  - {type: variant, offset: 4320, length: 4, content: 踈朗永平, SBCK: 也故三軍可奪氣將軍可奪心左氏傳言一鼓而作氣再而衰三而竭也是故朝氣鋭晝氣墮暮氣歸故善用兵者避其銳氣擊其墮歸也又曰勝者之兵先勝而後求戰敗者之兵先戰而後求勝又曰圍地則謀死地則戰疾戰則存不疾戰則亡者爲死地呉子曰用兵之道先明四輕二重使地輕馬使馬輕車使車輕人使人輕戰鋒銳甲堅則人輕戰吕氏春秋曰趙氏攻}
