  - {type: variant, offset: 4293, length: 0, content: '', SBCK: 安都乃免霸先自率帳内麾下出莫府山南呉明徹沈泰等衆軍首尾擊之齊人大潰自相蹂藉壅川塞谷莊子曰惠子見戴晉人戴晉人曰有所謂蝸者君知之乎曰然有國於蝸之左角者曰觸氏有國於蝸之右角者曰蠻氏時相與爭地而戰伏尸數萬逐北旬有五日而後返誠知所爭者􅀂此之細則天下無爭矣文子曰廟戰者帝神化者王廟戰者法天道也神化者明四時也列子曰黄帝與炎帝戰于阪泉之野率熊羆狼豹貙虎而前駈鵰鶡鷹鳶爲旗幟此以力使禽獸也孟子曰爭地以戰}
