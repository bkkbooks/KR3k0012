  - {type: variant, offset: 2970, length: 0, content: '', SBCK: 管子曰五沃之􅁟其木冝槐晏子春秋曰齊景公有所愛槐使守令犯槐者刑傷槐者死有醉而傷槐且加刑焉其女懼而告晏子曰妾恐鄰國聞之謂君愛槐而殘}
  - {type: variant, offset: 2970, length: 0, content: '', WYG: 管子曰五沃之土其木宜槐晏子春秋曰齊景公有所愛槐使}
  - {type: variant, offset: 2970, length: 0, content: '', krp: 管子曰五沃之土其木冝槐晏子春秋曰齊景公有所愛槐使守令犯槐者刑傷槐者死有醉而傷槐且加刑焉其女懼而告晏子曰妾恐鄰國聞之謂君愛槐而殘}
  - {type: variant, offset: 2971, length: 3, content: 啖松脂, SBCK: 可乎晏子入言之公出傷槐之囚罷其禁淮南子曰槐之生也入季春五日而兎目十日而䑕耳更旬而始規二旬葉成規葉始開也又曰九月官􅃸其樹槐是月繕修守備故官候樹槐槐懷也取懷近逺也又曰老槐生火又曰槐市學也樹以青槐燧人秋取槐檀之火天之所覆地之所載六合所包隂陽所照雨露所扶此皆生於父母所闕於一和也父天母地故槐榆與橘柚合而兄弟有廣與三危通爲一家抱朴子曰槐子新瓷合泥封之二十餘日其表皮皆爛乃洗之如大豆日服之此物至􅀘腦早服之令人髪}
  - {type: page-break, offset: 2971, content: '', id: KR3k0012_SBCK_954-8a}
  - {type: variant, offset: 2971, length: 3, content: 啖松脂, WYG: 守之令曰犯者刑傷者死有醉而傷槐且加刑焉其女懼而告晏子曰妾恐隣國聞之謂君愛槐而殘人可乎晏子入言之公出傷槐之囚罷其禁淮南子曰槐之生也入季春五日而兎目十日而䑕耳更旬而始規二旬成葉規葉始開也又曰九月官候其樹槐是月繕修守備故官候樹槐槐懐也取懐近遠也又曰槐老生火又曰槐市學也樹以青槐燧人秋取槐檀之火天之所覆地之所載六合所包隂陽所煦雨露所扶此皆生於父母而閲一和也父母天地故槐榆與橘柚合為兄弟有苖與三危通為一家抱朴子曰槐子新瓷合泥封之二十餘日其表皮皆爛乃涴之如大豆日服之此物最補腦早服之令人髮}
