  - {type: variant, offset: 2988, length: 16, content: 流潤飛津沉精幽結貞蕤含芳仰拂素雪, SBCK: 請樹槐於王門内有益者入無益者距之三輔黄圖曰元始四年起明堂辟雍爲愽士舎三十區爲㑹市但列槐樹數百行諸生朔望㑹此市各持其郡所出物及經書相與賣買雍雍揖讓論議槐下􅋲􅋲誾誾如也事具禮部學校篇焦贛易林家人之乾曰千歳槐身多斧斤汝南先賢傳曰新蔡鄭敬字子都爲郡功曹都尉髙懿㕔事前有槐樹有露􅀋甘露者懿問􅁺屬皆言是甘露敬獨曰明府政未能致甘露但樹汁耳懿不恱託疾而去楊衒之洛陽伽藍記曰李昌年廣陵王元淵􅀄除儀同三司緫衆北討葛榮夜夢着衮衣􅀝槐樹立以爲吉徴問於楊元慎元慎曰三公之祥淵甚恱之元愼退還告人曰廣陵死矣槐字木傍􅀑死後當得三公廣陵果爲􅁑榮所殺追贈司徒公終如其言太平御覽卷第九百五十四}
