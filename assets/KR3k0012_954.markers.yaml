  - {type: variant, offset: 1971, length: 329, content: 等其久也又曰謂夏必長而齊麥枯謂冬必彫而松柏茂符子曰符子與子登乎太山下臨千仞之淵上蔭百丈之松蕭蕭然神王乎一丘矣言不出乎耒耜心不過乎俗人其猶木犬守戶瓦雞伺晨矣先聖本記曰許由欲觀帝意曰帝坐華堂面雙闕君之榮顧亦得矣余坐華堂森然有松生於牖雖面雙闕無異乎回鸞之榮崑崙余安知其一所以取榮哉帝美由師之列仙傳曰伏生者當湯時為木正常食松脂自作石室周武王祠之偓佺好食松實能飛行逮走馬以松子遺堯不能服異苑曰漢末大亂宮人小黃門上墓樹上避兵食松柏實遂不復飢舉體生毛長尺許亂離既平魏武聞而始牧飬還食穀米齒落頭白少神境記曰滎陽南有石室室後有孤松千丈常有雙鵠晨必接翮夕輒偶影傳云昔有夫婦二人俱隱此室中年既數百化為雙鵠一者失之尋為人所害一者獨棲此松煢立哀唳玄中記曰松脂淪入地中千歲為伏神茯苓博物, WYG: 理}
