  - {type: variant, offset: 1779, length: 7, content: 今土木勝人臣懼, SBCK: 山海經曰三株樹生赤水上}
  - {type: variant, offset: 1779, length: 4, content: 今土木勝, WYG: 山海經曰三珠樹生赤水上其為樹如栢葉實皆為珠又曰白於之山其上多松栢穆天子傳曰甲申天子升於大北之隥而降休於兩栢之下有兩樹也東方朔傳曰武皇帝時閑居無事燕坐未央前殿天新雨朔執㦸在殿階獨語上呼問之答曰殿後栢樹上有鵲立枯枝上向東鳴問何以知立枯枝上朔曰新雨生枝滑枯枝澁是以知立枯枝上上大笑風俗通曰墓上樹栢路頭石虎周禮方相氏入􅇕敺魍像魍像好食亡}
  - {type: page-break, offset: 1779, content: '', id: KR3k0012_WYG_954-6a, image: WYG0901/WYG0901-0433c.png}
  - {type: variant, offset: 1779, length: 7, content: 今土木勝人臣懼, krp: 山海經曰三株樹生赤水上}
  - {type: punctuation, offset: 1784, content: ，, id: KR3k0012_CHANT_954-bkkpn598}
