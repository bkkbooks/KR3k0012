  - {type: variant, offset: 2962, length: 2, content: 古豔, SBCK: 洛陽發中梁松栢􅀼自悲誰能刻鏤此公輸與魯班􅀍之用丹􅃮薫用􅂫合香夲自南山栢今爲宫殿梁槐周禮曰朝士掌三槐三公位焉鄭玄曰槐之言懷言來人也又曰司烜氏掌冬取槐檀之火左傳曰趙宣子驟諌公患之使鉏麑賊之晨徃􅃦門闢矣盛服將朝尚早坐而假寐不解衣冠而睡麑退歎曰不忘恭敬民之主也賊民之主不忠弃君之命不信有一於此不如死也觸槐而卒春秋元命苞曰樹槐聽訟其下槐之言帰也情見帰實也春秋􅀃曰槐木者靈星之精爾雅曰懷槐大葉而黒槐樹葉大色黒者名爲槐守官槐葉晝聶霄忼郭璞曰守宫槐晝日聶合而夜布晉儒林􅀕酒杜行齊􅀃在明陵縣南有一樹似槐葉晝聚合相着夜則舒布即守宮折江東樹與此相反俗因合昏曉晝夜異其理等霄炕音忼聶合也炕張也合晝夜開也五經通義曰士冢樹槐國語曰董叔將娶於范氏叔向曰盍巳乎曰欲爲繫援焉他日董祁愬之范獻子曰不吾敬也獻子執而紡之於庭槐叔向過之曰子盍爲我請乎叔向曰欲而得之又何請焉紡懸也漢書曰昭帝建始四年山陽社中大槐樹吏人伐断之其夜復自立如故晉書曰符堅僣號自長安至于諸州夾路皆種槐柳百姓}
