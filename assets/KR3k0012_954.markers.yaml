  - {type: variant, offset: 647, length: 213, content: 柏丸丸松桷有梴梃楹有閑又曰山有喬松隰有游龍松木也龍紅草也又曰蔦與女蘿施于松柏又曰淇水悠悠檜楫松舟又曰如松柏之茂無不爾或承如松柏之枝葉常茂盛無衰落時也左傳曰晉侯使張骼輔躒致楚師求御于鄭欲得鄭人自御知其地利故也鄭人卜宛射犬吉子太叔戒之曰大國之人不可以與也言不可與等也欲使卑下人對曰無有眾寡其上一也太叔曰不然培塿無松柏培塿小阜松柏大木又曰楚郟敖即位王子圍為令尹康王弟鄭行人子羽曰是謂不宜必代之昌松柏之下其草不殖言楚君弱令尹強物不兩盛, SBCK: 栢}
