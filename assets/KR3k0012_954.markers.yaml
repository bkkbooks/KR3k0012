  - {type: variant, offset: 982, length: 84, content: 秦為馳道五十步三丈而樹厚築其外隱以金椎服虔曰作壁通道隱築也以鐵椎築之樹以青松為馳道之麗使其後世曾不得斜遙而託足焉應劭漢官儀曰秦始皇上封泰山逢疾風暴雨賴得抱樹因封其樹為五, SBCK: 朱愽爲御史}
  - {type: variant, offset: 982, length: 1, content: 秦, WYG: 昭帝時長安諸地栢樹枯倒者悉起生葉虫食作字公孫病已立後昭帝崩昌邑王即位二十七日被廢迎立宣帝帝名病已厥兆應焉東觀漢記曰李徇遭父母䘮六年躬自負土樹栢常住冡下謝承後漢書曰陳留虞延}
