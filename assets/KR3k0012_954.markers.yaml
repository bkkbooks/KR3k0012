  - {type: variant, offset: 2967, length: 2, content: 啖柏, SBCK: 府有老槐樹殷仲文對而歎曰此樹婆娑生意盡矣崔鴻前凉録曰􅀄河右不生楸槐栢􅃮張駿之丗取於㤗隴而植之終於皆死而酒泉宫之北隅有槐樹生焉李玄盛著槐樹賦沈約宋書曰孔子夜夢三槐之間豐沛之􅀖有赤氣驅車對楚西北街之見芻兒敵麟傷其左足薪而覆之梁書曰􅁃肩吾常服槐實年七十餘目看細字􅁂皆黒離亂之際奔于江陵後周書曰韋孝寛之爲雍州刺史先是路側一里置一土堠經􅀨頺毀毎湏修之自孝寛臨州乃勒部内當堠處植槐樹代之即免修復行旅又得芘䕃文帝後見恠問知之曰豈得一州獨爾當令天下同之於是令諸州道路一里種樹一株十里種三樹百里五樹焉隋書曰髙頴字昭玄領新都大監毎坐槐樹下以聽事多不依行列有司伐之特令存之勿去示於後人又曰士囬以孝聞開皇􅀄卒子士雄少質直孝友䘮父復廬於側􅀒􅁟成墳其庭前有一槐樹先甚欎茂及士雄居䘮樹遂枯死服闕還宅死槐復榮髙祖聞之歎其父子至孝下詔褒􅀭號其所居爲累德里唐書曰永崇二年太平公主降駙馬薛紹以萬年縣爲禮㑹之所公主輅車自興安門南至宣陽坊之西街夜設燎炬烈熖相屬夾路槐樹多有死者又曰正元中度支欲取兩京道中槐樹爲薪更栽小樹先下符牒渭南縣縣尉張造牒曰召伯所憩尚勿剪除先皇舊遊豈冝斬伐乃止又曰長慶中􅉑州刺史蕭祐奏湖城縣永方郷百姓閻酆五代同居家内槐一夲再生枝}
  - {type: page-break, offset: 2967, content: '', id: KR3k0012_SBCK_954-7a}
