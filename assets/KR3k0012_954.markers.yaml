  - {type: variant, offset: 1305, length: 5, content: 張譏字直言, SBCK: 魏蘭根丁母憂居䘮有孝稱將葬常山郡境先有董卓祠祠有栢樹蘭根以卓凶逆無道不應立祠至令乃伐栢以爲椁材人或勸之不伐蘭根盡取之了無疑懼又曰樊衛性至孝䘮父􅀒土成墳植栢方數十􅅿朝夕號慕又曰文宣王曽晉陽夜􅀫松門嶺有數株松皆巳千年枝葉踈茂似有神物所託文宣時巳􅀍酒向嶺瞋罵射中一株未幾枯死}
