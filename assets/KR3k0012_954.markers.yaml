  - {type: variant, offset: 2967, length: 2, content: 啖柏, WYG: 府有老槐樹殷仲文對而歎曰此樹婆娑生意盡矣崔鴻前凉録曰初河西不生楸槐栢張駿之世取於太原而植之終於皆死而酒泉宮之北隅有槐樹生焉李𤣥盛著槐樹賦沈約宋書曰孔子夜夢三槐之間豐沛之郊有赤烟氣驅車對楚西北觀之見芻兒敵麟傷其左足薪而覆之梁書曰庾肩吾常服槐實年七十餘目㸔細字鬚鬢皆黑離亂之際奔于江陵隋書曰髙熲字昭𤣥領新都大監毎坐槐樹下以聼事其樹不依行列有司欲伐之上令勿去以示後人唐書曰永崇二年太平公主降駙馬薛紹以萬年縣為禮會之所公主輅車自興安門出南至宣揚門之西夜設燎炬烈熖相屬夾路槐樹多有死者又曰貞元中度支欲取兩京道中槐樹為薪更栽小樹先下牒符渭南縣縣尉張造牒曰召伯所憇尚勿剪除先皇舊遊豈宜斬伐乃止又曰長慶中虢州刺史蕭佑奏湖城縣永房鄉百姓閻酆五代同居家内槐一本再生枝}
