  - {type: variant, offset: 1300, length: 3, content: 仙人陳, WYG: 梧桐雖有棲鳳之美而失後彫之節梁書侯景既陷臺城都下王侯庻姓廟樹咸見殘毁唯文宣太后廟四周栢樹獨欝茂及景簒南郊都官尚書李景略令伐此樹以立三橋斫南面十餘株再宿悉萌生便長數尺時既冬月翠茂如春賊乃大驚惡之使悉斫之識者以為昔僵柳起于上林乃表漢宣之應廟樹重青必彰異瑞北齊}
