  - {type: variant, offset: 50, length: 15, content: 為車輦之用此木生因洹之水則禹貢, krp: ''}
  - {type: variant, offset: 51, length: 191, content: 車輦之用此木生因洹之水則禹貢所謂因洹也其洹出甜波樹上有紫鷰黃鵠集其間實如細珠風吹枝如玉聲因以為名春夏馨香秋冬聲清有武事則如金革之響有文章則如琴瑟之響上以枝遍賜群臣百歲者皆以此枝頒賜人有疾者枝則汗出死者枝則折昔老聃在於周世言七百年枝未汗偓佺生於堯時已年三千歲植此竟未析上乃以枝賜朔朔曰臣已見枝三遍枯死死而復何啻於汗折而已哉里語曰年未半枝不汗此木五千歲一濕萬歲一枯縉雲之世此樹生於阿閣間, WYG: 舟}
