  - {type: variant, offset: 270, length: 163, content: 木木似青梧高十丈有朱露色如丹汁灑其葉落地皆成珠其枝似龍之倒垂亦曰珠枝樹此壇高八尺文錯雜金色虞喜志林曰東海之魚墜一鱗崑崙之木落一葉聖人皆能知王韶之始興記曰漢將滅越王築城伐木將運之一夜木數千件頓亡越亡之徵方言曰木細枝謂之杪江淮楊楚之間謂之篾鹽鐵論曰茂木之下無豐草大塊之間無美苗搜神記曰廬江舒縣陵亭有流水邊有大樹常有黃鳥數千枚巢其頭, SBCK: 誓}
