  - {type: variant, offset: 1248, length: 3, content: 張堪好, SBCK: 王儉字仲寳司徒􅀽粲見之歎曰宰相之門也栝栢豫章雖小巳有棟梁之器又曰江夏王鋒以明帝失權常忽忽不樂著脩栢賦以見其志曰旣殊羣而抗立亦含貞而挺主豈春日之自芳亦霜下而爲盛衝風不能摧其枝積雪不能改其性雖坎􅇄}
