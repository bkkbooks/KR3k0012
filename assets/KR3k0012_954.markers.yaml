  - {type: variant, offset: 1784, length: 2, content: 臣懼, WYG: 畏虎與栢列子傳曰延陵季子解𢃄劍掛徐君墓栢樹洞㝠記曰磅山之北有穴穴上有栢昔李少翁於閬隂移來此穴種此栢已見扶桑三枯海水涸竭帝覺遣人往穴掘不見}
  - {type: variant, offset: 1787, length: 3, content: 不安人, SBCK: 爲樹如栢葉實皆爲珠又曰白於之山其上多松栢穆天子傳曰甲申天子􅂛于大北之隥此太行山而降休于兩栢之下有兩樹}
  - {type: page-break, offset: 1787, content: '', id: KR3k0012_SBCK_954-4a}
  - {type: variant, offset: 1787, length: 14, content: 不安人也室成三年而智氏亡周書, WYG: 根唯見赤鷰飛入雲移栢植於通靈臺水經曰陘山有鄭祭仲冡廟舊有一枯栢樹望之青秀可喜從征記}
