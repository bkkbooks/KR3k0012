  - {type: variant, offset: 2962, length: 2, content: 古豔, WYG: 洛陽發中梁松栢竊自空誰能刻鏤此公輸與魯班被之用丹漆薰用蘇合香本是南山栢今為宮殿梁槐周禮曰朝士掌三槐三公位焉又曰司烜氏掌火冬取槐檀之火左傳曰趙宣子驟諫公患之使鉏麑賊之晨往寢門闢矣盛服將朝尚蚤坐而假寐麑退歎而言曰不忘恭敬民之主也賊民之主不忠棄君之命不信有一於此不如死也觸槐而死春秋元命苞曰樹槐聽訟其下槐之言歸也精見歸實也春秋説曰槐木者靈星之精爾雅曰櫰槐大葉而黒槐樹葉大色黑者謂之櫰守宫槐葉晝聶宵炕郭璞曰守宫槐晝日聶合而夜布晉儒林祭酒杜行者説在明陵縣南有一樹似槐葉盡聚合相着夜則舒布即守宫江東樹與相反俗因合昏曉晝夜異其種類炕音帆聶合也炕張也合晝夜合也五經通義曰士冢樹槐國語曰董叔將娶於范氏叔向曰盍已乎曰欲援繫焉他日董祁愬之范獻子曰不吾敬也獻子執而紡之於庭槐叔向過之曰子盍為我請乎叔向曰欲而得之何請焉紡懸也漢書曰昭帝元始四年山陽社中大槐樹吏人伐斷之其夜復自立如故晉書曰苻堅僭號自長安至于諸州夾路皆種槐栁百姓}
