  - {type: variant, offset: 1622, length: 142, content: 吾所倚者何樹嘉隱對曰松樹勣曰此槐也何忽言松嘉隱曰以公配木則為松樹無忌連問之吾所倚何樹嘉隱對曰槐樹無忌曰汝不能矯對耶嘉隱應聲曰何須矯對但取其以鬼配木耳穆天子傳曰天子升長松之磴山有長松也說苑曰智襄子為室美士茁夕焉智伯曰室美矣夫對曰美則美矣意臣亦有懼也智伯曰何懼對曰臣以康秉筆事君記有之曰高, SBCK: 髙}
