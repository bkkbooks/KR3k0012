  - {type: variant, offset: 801, length: 316, content: 死告舍人曰必樹吾墓上以梓梓可為器而抉吾眼於吳之東門上以觀越兵入吳也漢書曰元帝初元四年皇后曾祖父濟南平陵王伯墓門梓柱卒生枝葉上出劉向以為王氏代漢之象後漢書曰應順為冀州刺史廉直無私遷東平相賞罰必信吏不敢犯有梓樹生於聽事室上事後母至孝眾以為孝感之應說苑曰伯禽與康叔封朝于成王見周公三見而三笞康叔有駭色謂伯禽曰有商子者賢人也與子見之康叔封與伯禽見商子曰吾二子者朝乎成王見周公三見而三笞其說何也商子曰二子盍相與觀乎南山之陽有木焉名曰橋二子者往觀乎南山之陽見橋竦焉實而仰反以告乎商子商子曰橋者父道也商子曰二子盍相與觀乎南山之陰有木焉名曰梓二子者往觀乎南山之陰見梓勃焉實而俯反以告商子曰梓者子道也二子者明日見乎周公入門而趍登堂而跪周公拂其首勞而食, SBCK: 建都城}
