  - {type: variant, offset: 566, length: 126, content: 狗骨也又湛露曰湛湛露斯在彼杞棘左傳昭公曰聲子聘于晉還令尹子木與之語問晉政焉且曰晉大夫與楚孰賢對曰晉卿不如楚其大夫則賢皆卿材也如杞梓皮革自楚往也雖楚有材晉實用之周書曰太姒夢梓化為杞梓爾雅曰楰音俞鼠梓楸屬也今江東有虎梓毛詩小弁曰惟桑與梓必恭敬止又定之方中曰, WYG: 婆娑羅}
