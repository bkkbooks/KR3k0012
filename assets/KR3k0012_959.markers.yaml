  - {type: variant, offset: 1186, length: 435, content: 有文石取以扣樹當有應者以書與之鄭客如其言見宮闕如王者居謁者出受書入有頃云今年祖龍死山海經曰玉山碧山多梓木雞山美梓孟子曰拱把之桐梓人欲生之皆知所以養之者至於身不知所以養之者豈愛身不若桐梓哉漢武故事曰衛子夫入宮上曰吾昨夜夢子夫庭中生梓樹數株豈非天乎是日幸之有娠郭氏玄中記曰秦文公造長安宮面四百里南至終南山山有梓樹大數百圍蔭宮中公惡而伐之連日不剋輒大風雨夜有鬼問梓樹樹曰豈奈吾何鬼曰若使三百人披頭以絲繞樹豈不敗汝樹默然不應明日人上言秦王依此言伐之中有青牛逐之入澧水豫章記曰松陽門內有大梓樹大四十五圍樹先枯永嘉中一旦忽更榮華太興中元帝果繼大業楸爾雅曰槄音滔山榎今之山楸楸小葉曰榎音賈大而皵音鵲楸老乃皮麤皵者為楸也小而皵榎小而皮麤皵者為榎漢書曰淮北滎南河濟之間千樹楸與千戶侯等任昉述異記曰吳中有陸家白蓮種顧家班竹趙有韓氏酸棗中山有楸尸掌楸木者楸可為什器漢書貨殖志有千樹楸樅爾雅曰樅松葉松身郭璞注云今太廟梁用此木尸子所謂松柏之鼠不知堂室之有美樅魯連子曰松樅高千仞而無枝非憂王室無柱椒, SBCK: 矣荆}
