  - {type: variant, offset: 2353, length: 418, content: 疾肇惟歲首月正元日以介眉壽祈以初吉晉劉臻妻陳氏正旦獻椒花頌曰璇穹周迴三朝肇建美哉靈葩爰採爰獻聖容服之永壽於萬木蘭漢書曰孝桓帝元嘉元年芝生後庭木蘭上神仙傳曰北海于君病癩見市賣公姓白問之公云明日木蘭樹下當見卿明日往授素書二卷以消炎救病無不愈者郭子橫洞冥記曰元封三年大秦國獻花蹄牛飴以木蘭之葉使方國貢此葉此牛不甚食食一葉則累月不飢任昉述異記曰木蘭川在尋陽江中多木蘭樹昔吳王闔閭植木蘭於此用搆宮殿又曰七里洲中有魯班刻木蘭為舟至今在洲中詩家所云木蘭舟出於此離騷曰鴟鴞集於木蘭兮又曰朝飲木蘭之墜露夕飡秋菊之落英夜合風土記曰夜合葉晨舒而暮合一名合昏甘棠爾雅曰杜甘棠今之杜黎杜赤棠白赤棠棠色赤白各異其名毛詩曰甘棠美召伯也蔽芾甘棠勿剪勿伐召伯所茇思其人愛其樹又杕杜曰有杕之杜生于道周杜赤棠也欓宋春秋曰義熙八年太社欓樹生于壇側欓尚黑也宋水德忽生此一樹櫟爾雅曰櫟其實梂有梂彙自裹毛詩晨風曰山有苞櫟櫟木也莊子曰匠石之齊至曲園見櫟杜樹曰是不材木故若是之壽淮南子曰, SBCK: 五}
