  - {type: variant, offset: 693, length: 928, content: 之榛栗椅桐梓漆陸機毛詩䟽義曰北山有楰爾雅曰楰鼠梓其樹葉木理如楸山楸之異也今人謂之昔楸濕時脆燥而堅今永昌人謂鼠梓漢人謂之楰禮斗威儀曰君乘火而王其政和平楸梓為常生周書曰太姒夢太子發取周庭之梓樹於商闕間化為松杞史記曰子胥將死告舍人曰必樹吾墓上以梓梓可為器而抉吾眼於吳之東門上以觀越兵入吳也漢書曰元帝初元四年皇后曾祖父濟南平陵王伯墓門梓柱卒生枝葉上出劉向以為王氏代漢之象後漢書曰應順為冀州刺史廉直無私遷東平相賞罰必信吏不敢犯有梓樹生於聽事室上事後母至孝眾以為孝感之應說苑曰伯禽與康叔封朝于成王見周公三見而三笞康叔有駭色謂伯禽曰有商子者賢人也與子見之康叔封與伯禽見商子曰吾二子者朝乎成王見周公三見而三笞其說何也商子曰二子盍相與觀乎南山之陽有木焉名曰橋二子者往觀乎南山之陽見橋竦焉實而仰反以告乎商子商子曰橋者父道也商子曰二子盍相與觀乎南山之陰有木焉名曰梓二子者往觀乎南山之陰見梓勃焉實而俯反以告商子曰梓者子道也二子者明日見乎周公入門而趍登堂而跪周公拂其首勞而食之曰安見君子二子對曰見商子周公曰君子哉商子也樂資春秋後傳曰使者鄭客入函谷至平舒見素車白馬曰吾華山君願以一牘致滈池君子之咸陽過滈池見一大梓樹有文石取以扣樹當有應者以書與之鄭客如其言見宮闕如王者居謁者出受書入有頃云今年祖龍死山海經曰玉山碧山多梓木雞山美梓孟子曰拱把之桐梓人欲生之皆知所以養之者至於身不知所以養之者豈愛身不若桐梓哉漢武故事曰衛子夫入宮上曰吾昨夜夢子夫庭中生梓樹數株豈非天乎是日幸之有娠郭氏玄中記曰秦文公造長安宮面四百里南至終南山山有梓樹大數百圍蔭宮中公惡而伐之連日不剋輒大風雨夜有鬼問梓樹樹曰豈奈吾何鬼曰若使三百人披頭以絲繞樹豈不敗汝樹默然不應明日人上言秦王依此言伐之中有青牛逐之入澧水豫章記曰松陽門內有大梓樹大四十五圍樹先枯永嘉中一旦忽更榮華太興中元帝果繼大業楸爾雅曰槄音滔山榎今之山楸楸小葉曰榎音賈大而皵音鵲楸老乃皮麤皵者為楸也小而皵榎小而皮麤皵者為榎漢書曰淮北滎南河濟之間千樹楸與千戶侯等任昉述異記曰吳中有陸家白蓮種顧家班竹趙有韓氏酸棗中山有楸尸掌楸木者楸可為什器漢書貨殖志有千樹楸樅爾雅曰樅松葉松身郭璞注云今太廟梁用此木尸子所謂松柏之鼠不知堂室之有美樅魯連子曰松樅高千仞而無枝非憂王室無柱椒, WYG: 荆}
