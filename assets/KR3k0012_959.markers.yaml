  - {type: variant, offset: 1723, length: 519, content: 昭公也君子見沃之盛彊能脩其政知其蕃衍盛大子孫將有晉國焉椒聊之實蕃衍盈升彼已之子碩大無朋椒聊椒也陸機毛詩䟽義曰椒聊聊語助也椒樹似茱萸有針剌葉堅而滑澤蜀人作茶吳人作茗皆煮其葉以為香今成皋諸近山間謂竹葉椒樹亦如蜀椒小毒熱不中合藥也可著飲食中用蒸雞豚佳香東海諸島上椒樹枝葉皆相似子長而不圓甚香其味似橘皮島山麞鹿食此椒葉其肉自然作橘香也又東門之枌曰貽我握椒椒芬香也續漢書曰天笁國出石蜜胡椒黑鹽孫卿子曰民之親我驩若父母其好我芬若椒蘭應劭漢官儀曰皇后稱椒房取其實蔓延盈升以椒塗屋亦取其溫煖張璠漢記曰桓帝竇皇后崩中常侍曹節王甫欲以貴人禮葬太尉李固自扶輿起擣椒自隨謂妻子曰若太后不得配桓帝吾不生還矣魏氏春秋同異曰鍾繇嬖庶子會之母黜嫡夫人文帝命復焉繇恚忿飡椒致噤帝乃止齊書曰建武中王敬則於會稽反奉子恪為名而子恪奔走未知所在始安王遙光勸上併誅高武諸子孫於是並勑竟陵王昭胃等六十餘人入永福省令太醫煮椒二斛并命辦數十具棺材謂舍人沈徽孚曰椒熟則一時賜死期三更當殺之會上暫臥主書單攜啟依旨斃之徽孚堅執曰事須更審爾夕三更子恪徒跣奔至建陽門上聞驚覺曰故當未賜諸侯命耶徽孚以荅上撫床曰遙光幾誤人事及見子恪顧問流涕諸侯悉賜供饌世說曰石崇以椒為泥泥屋三君夫以赤石脂泥壁崔寔四民月, SBCK: ''}
