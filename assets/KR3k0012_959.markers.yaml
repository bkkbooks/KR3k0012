  - {type: variant, offset: 1655, length: 1, content: 椒, krp: 見麋鹿遊姑蘇之臺臣今亦將見宫中生荆棘露沾衣也東觀漢記曰尹勤治韓詩身牧豕事親至孝無有交遊門生荆棘後漢書曰鮑永爲魯郡太守時董憲別帥彭豐虞休皮常等各千餘人稱將軍不肯下頃之孔子闕里無故荆棘自除從講堂至于里門永異之謂府丞及魯令曰方今危急而闕里自開斯豈夫子欲令太守行禮助吾誅無道耶乃㑹人衆修郷射之禮請豐等共㑹觀視欲因此擒之豐等亦欲圖永乃持牛酒勞饗而潜挾兵器永覺之手格殺豐等擒破黨與帝嘉其略封爲關内侯晉書曰索靖拜酒泉太守惠帝即位賜爵關内侯有先識逺量知天下將亂指洛陽宫門銅駞歎曰㑹見汝在荆棘中耳老子曰師之所處荆棘生焉周景式孝子傳曰古有兄弟忽欲分異出門見三荆同株接葉連隂歎曰木猶欣然聚况我而殊哉遂還爲雍和一曰田真克弟神仙傳曰吴有徐隨居丹徒左慈過隨門下有宿客車六七乗欺慈云徐公不在慈去客皆見牛在楊}
  - {type: variant, offset: 1657, length: 0, content: '', SBCK: 杪車轂中皆生荆木長一二丈客懼入報隨隨曰此左公遣追之客逐慈叩頭謝客還見牛在故地無荆木也顧微廣州記曰撫納縣出金荆禮弓矢圖曰楚焞士敦反以荆爲之燃以灼正以荆者凢木心圎荆心方也地理志曰荆楚本多材因名地焉廣州記曰白荆堪爲履紫荆堪爲牀淮南萬畢術曰南山牡荆指病自愈節不相當有月暈時剋之杜寳大業拾遺録曰五年南方置北景林邑海隂三郡北景在林邑􅀯大海中與海隂接境其地東西一千餘里南北三百餘里海水四絶北去大岸三百餘里或云馬援鑄柱尚存地暑􅀬多大林木髙者數百㝷有金荆生於髙山峻阜大者十圍盤屈瘤蹙文如羙錦色艶於眞金中夏時有於海際得之工人數用甚精妙貴於沉檀􅁄毛詩湛露曰湛湛露斯在彼􅂎􅁄又黄鳥曰交交黄鳥止于􅁄又墓門曰墓門有􅁄斧以斯之周書曰太姒夢見商之庭産􅁄周禮秋官上曰朝士掌建􅀖外朝之法左九􅁄􅀌卿大夫位焉右九􅁄公侯伯子男位焉鄭玄曰樹􅁄以爲位者取其赤心而外刺象以赤心三刺也左傳昭公曰竪牛奔齊孟仲之子殺之投其首於寜風之􅁄上春秋元命苞曰樹􅁄聽訟其下者􅁄赤心有刺言治人者原心不失其赤實也後漢書曰馮異朝京師引見帝謂公卿曰是我起兵時主簿也爲吾披荆􅁄定􅀜中又曰仇覽字季智一名香陳留考城人也時考城令河内王渙政尚嚴猛聞覽以德化人署爲主簿後渙謝遣曰枳􅁄非鸞鳯所捿百里豈人賢之路今日太學曳長􅅂飛名譽皆主簿後耳以一月俸爲資勉卒景行晉書曰劉琨至并州荆􅁄成林犲狼滿道琨剪除荆􅁄収葬枯骸造府朝建市獄冦盗牙來掩襲甞以城門爲戰􅂣百姓􅀒楯以耕屬鞬而耨琨撫循勞來甚得物情又曰祖逖在河南公私豐贍士馬日滋方當推鋒越河掃淸兾朔㑹朝廷將遣戴􅀂思爲都督逖以􅀂思是吴人雖有才望無弘致逺識且巳剪荆􅁄収河南地而􅀂思雍容一旦來統之意甚怏怏又曰石季龍大饗羣臣於太武殿佛圖澄曰殿乎殿乎􅁄子成林將壞人衣龍殿石有􅁄生冉閔小字􅁄奴時龍養爲巳子又曰崔洪靖厲骨鯁爲尚書左丞時人爲之語曰}
