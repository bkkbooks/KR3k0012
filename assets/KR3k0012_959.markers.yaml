  - {type: variant, offset: 1659, length: 0, content: '', SBCK: 􅁄刺來自愽陵在南爲鷂在北爲鷹又曰顧愷之􅀞鄰女象以􅁄針釘之又曰姚萇符登師於渥源盡俘其衆乃掘符堅屍鞭撻荐之以􅁄坎土而埋之宋書曰􅀽淑上太祖書曰所謂捷鳥於烈火之上養魚於叢􅁄之中北齊書曰世祖爲後主擇師傅趙彦􅀷進馬敬德入爲侍講其妻夢猛獸將來向之敬德走超叢􅁄妻伏地不敢動敬德占之曰吾當得大官超􅁄過九卿也爾伏地夫人也隋書曰流求國居海島之中土人所居曰波羅檀洞壍柵三重環以流水樹􅁄爲藩韓子曰宋人爲燕王以􅁄刺之端爲沐猴者使王必三月齊而後觀之右御冶工謂王曰臣聞人主無十日不燕今王不能乆齊故以三月爲期也􅁄刺至小安可削乎王必察之王囚而問之果無有乃殺之冶人謂王曰士有虚名多􅁄刺之􅀃也吕氏春秋曰􅀥􅁄之有也裘狐之有也食􅁄之􅀥裘狐之皮先王固用非其有而巳有之湯武一日而盡有夏啇之地􅁗子曰踰枳􅁄之籬則有絓枉之患登椒桂之圃則有榮華之芳陳留􅂄舊傳曰魏尚􅀍繫詔獄有雀集獄􅁄上尚占曰夫􅁄樹者中心赤外有刺象我言有刺而赤心之至誠李嘗藥録曰􅁄}
