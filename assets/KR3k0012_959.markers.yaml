  - {type: variant, offset: 1652, length: 1, content: 椒, SBCK: 實者名曰牡荆又有山荆毛詩漢廣曰翹翹錯薪言刈其楚楚荆}
  - {type: variant, offset: 1652, length: 1, content: 椒, WYG: 實者名曰牡荆又有山荆左傳昭公曰伍舉入鄭聲子將入晋遇之於鄭郊班荆相與食而言復故班布}
  - {type: variant, offset: 1652, length: 1, content: 椒, krp: 實者名曰牡荆又有山荆毛詩漢廣曰翹翹錯薪言刈其楚楚荆}
  - {type: punctuation, offset: 1654, content: 。, id: KR3k0012_CHANT_959-bkkpn672}
  - {type: 'tls:seg', offset: 1654, content: '', id: KR3k0012_CHANT_959-28a.9}
  - {type: variant, offset: 1654, length: 0, content: '', SBCK: 又綢繆曰綢繆束楚三星在户左傳昭公曰伍舉入鄭聲子將如晉遇之於鄭郊班荆相與食而言復故班布也而荆坐地共議之史記曰廉頗肉􅃝􅀒荆因賔客至藺相如門謝罪卒與爲刎頸之交漢書曰淮南王安謀反伍􅀍諌曰昔子胥諌吴王云臣}
  - {type: page-break, offset: 1654, content: '', id: KR3k0012_SBCK_959-2b}
  - {type: variant, offset: 1654, length: 0, content: '', WYG: 布荆坐地共議之史記曰廉頗肉袒負荆因賔客至藺相如門謝罪卒與為刎頸之交漢書曰淮南王安謀反伍被諫曰昔子胥諫呉王云臣}
  - {type: variant, offset: 1654, length: 0, content: '', krp: 又綢繆曰綢繆束楚三星在户左傳昭公曰伍舉入鄭聲子將如晉遇之於鄭郊班荆相與食而言復故班布也而荆坐地共議之史記曰廉頗肉袒負荆因賔客至藺相如門謝罪卒與爲刎頸之交漢書曰淮南王安謀反伍𬒳諌曰昔子胥諌吴王云臣}
  - {type: variant, offset: 1655, length: 1, content: 椒, SBCK: 見麋鹿遊姑􅂫之臺臣今亦將見宫中生荆􅁄露沾衣也東觀漢記曰尹勤治韓詩身牧豕事親至孝無有交遊門生荆􅁄後漢書曰鮑永爲魯郡太守時董憲別帥彭豐虞休皮常等各千餘人稱將軍不肯下頃之孔子闕里無故荆􅁄自除從講堂至于里門永異之謂府丞及魯令曰方今危急而闕里自開斯豈夫子欲令太守行禮助吾誅無道耶乃㑹人衆修郷射之禮請豐等共㑹觀視欲因此擒之豐等亦欲圖永乃持牛酒勞饗而潜挾兵器永覺之手格殺豐等擒破黨與帝嘉其略封爲􅀜内侯晉書曰索靖拜酒泉太守惠帝即位賜爵􅀜内侯有先識逺量知天下將亂指洛陽宫門銅駞歎曰㑹見汝在荆􅁄中耳老子曰師之所處荆􅁄生焉周景式孝子傳曰古有兄弟忽欲分異出門見三荆同株接葉連隂歎曰木猶欣然聚况我而殊哉遂還爲雍和一曰田真克弟神仙傳曰吴有徐隨居丹徒左慈過隨門下有􅀫客車六七乗欺慈云徐公不在慈去客皆見牛在楊}
  - {type: page-break, offset: 1655, content: '', id: KR3k0012_SBCK_959-3a}
  - {type: variant, offset: 1655, length: 1, content: 椒, WYG: 見麋鹿逰姑蘇之臺臣今亦將見宫中生荆棘也東觀漢記曰尹勤治韓詩身收豕事親至孝無有交逰門生荆棘後漢書曰鮑永為魯郡太守時董憲别師彭豐虞休皮常等各千餘人稱將軍不肯下頃之孔子闕里無故荆棘自除從講堂至于里門永異之謂府丞及魯令曰方今危急而闕里自開斯豈夫子欲令太守行禮助吾誅無道耶乃㑹人衆修鄉射之禮請豐等共㑹觀視欲因此擒之豐等亦欲圖永乃持牛酒勞饗而潛挾兵器永覺之手格殺豐等擒其黨與帝嘉其畧封為闗内侯晉書曰索靖拜酒泉太守惠帝即位賜爵闗内侯有識逺量知天下將亂指洛陽宫門銅駝嘆曰㑹見汝在荆棘中耳老子曰師之所處荆棘生焉周景式孝子傳曰古有兄弟忽欲分異出門見三荆同株接葉連隂歎曰木猶欣然聚况我而殊哉遂還為雍和一曰田真兄弟神仙傳曰呉有徐隨居丹徒左慈過隨門下有宿客車六七乘欺慈曰徐公不在慈去客皆見牛在楊}
  - {type: page-break, offset: 1655, content: '', id: KR3k0012_WYG_959-4a, image: WYG0901/WYG0901-0465c.png}
  - {type: page-break, offset: 1655, content: '', id: KR3k0012_WYG_959-4b, image: WYG0901/WYG0901-0465d.png}
