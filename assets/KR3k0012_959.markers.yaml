  - {type: variant, offset: 2772, length: 378, content: 二月官獄其樹櫟水經曰若耶溪孤潭上有一櫟樹謝靈運與從弟惠連嘗遊之作連句題刻樹側橡後漢書曰李恂詣洛陽時歲荒司空張敏司徒魯恭等各遣子饋糧悉無所受徙居新關下拾橡實以自資橡櫟實也晉書曰摯虞從惠帝幸長安及東軍來迎百官奔散遂流離鄠杜之間轉入南山中糧絕飢甚拾橡實而食之又曰司馬元顯之討桓玄于時楊土飢虛運漕不繼玄斷江路商旅遂絕於是公私匱乏士卒唯給桴橡說苑曰莒穆公有臣朱厲附事穆公不見識焉冬處於山林食橡栗夏處於洲澤食菱藕穆公以難死朱厲附將往死之其友曰子事君而不見識焉今君難吾子死之意者其不可乎朱厲附曰始我以為君不吾知也今君死而我不死是果不知我也吾將死之以激天下不知其臣者遂往死淮南子曰高臺增榭接屋連桅非不麗也然而民無窟室狹廬所託於身者則明主不樂也肥膿甘脆非不香美也然而民有糟糠橡栗不接於口者則明主不甘也抱朴子曰假穀於夷齊之門告寒於黔婁之家所得者不過橡栗縕褐必無太牢之膳衣狐裘矣, SBCK: 九}
