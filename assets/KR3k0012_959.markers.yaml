  - {type: variant, offset: 1662, length: 0, content: '', WYG: 千嵗黄蘖根下有如三斛器去本株三丈細根相連大如縷和服之盡一丈則地仙支子漢書貨殖傳曰梔茜千石亦比千乘之家地鏡圖曰望氣見人家黄氣者支子樹也晉令曰諸官有秩支子守䕶者置吏一人晉宫閣名曰華林園支子五株逰名山志曰樓石山多支子也本草經曰支子一名木丹葉兩頭尖如樗蒲剥其子如蠒而黄赤葛洪治霍亂轉筋方曰燒支子二枚末服之立愈無患纂文曰無患木名也一名曰楺女收反婁實可去垢崔豹古今注曰程雅問櫨木名曰無患何也答曰昔有神巫曰瑶眊音􅀈能以符劾百鬼得鬼則以此木為棒棒殺之世人相傳此木為衆鬼所畏懼取此木為器以壓却邪魅故號曰無患卞敬宗無患枕讃曰爰兹素朴}
