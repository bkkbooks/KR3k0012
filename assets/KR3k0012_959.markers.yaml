  - {type: variant, offset: 1660, length: 0, content: '', SBCK: 是􅀥針丗人用門冬苗代之非其真也廣五行記曰隋文帝開皇末年代州人姓王仕爲驃􅀐將軍性好畋獵所殺無數有五男無女後有一女子端正􅀂􅀞見者皆竒之父母特加鍾愛郷里爭爲作好衣而與之女年七歳一旦失之􅀄疑鄰里戲藏之㝷訪終不見者諸兄逺覔去家三十餘里於􅁄中見之欲就抱取驚走馬追不及兄弟以十餘􅀐圍之而口中唯作兎聲抱歸家不能言而身體盡􅁄所傷母爲挑之得刺盈掬不食而死唐新語曰吕太一爲户部貟外郎户部與吏部鄰司吏部移牒令墻宇悉立􅁄以防令史交通太一牒報曰眷彼吏部銓綜之司當湏簡要清通何必堅籬挿􅁄省中賞其俊拔楚辭曰甘棠枯於豐草号藜􅁄樹於中庭君子晉宫閣名曰華林園君子樹三株廣志曰君子樹似檉松曹爽樹之於庭長生洛陽記曰明光殿前有長生木樹二株鄴中記曰金華殿後有石虎皇后浴室種􅀟長生樹丗謂之西王母長生樹萬年晉宫閣名曰華林園有萬年樹十四株謝􅀇暉詩曰風動萬年枝黃蘖􅀃文曰蘖黃木也永嘉郡記曰青田出枯楊所經山路左側木則黄蘖爲林草便黄連覆地土人徃伐黄蘖者皆有酒食禱祀禱祀􅀂有違失山神意二藥輙化爲異物不可復得淮南萬畢術曰蘗令面恱取蘗葉三寸土􅋎三枚}
