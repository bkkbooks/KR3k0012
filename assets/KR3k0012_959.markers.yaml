  - {type: variant, offset: 1659, length: 0, content: '', WYG: 棘刺來自博陵在南為鷂在北為鷹又曰顧愷之畫鄰女像以棘針釘之又曰姚萇敗符登師於渥源盡俘其衆乃握符堅屍鞭撻薦之以棘坎土而埋之宋書曰袁淑上太祖書曰所謂棲鳥於烈火之上養魚於叢棘之中北齊書曰世祖為後主擇師傅趙彦深進馬敬徳入為侍講其妻夢猛獸將來向之敬徳走超叢棘妻伏地不敢動敬徳占之曰吾當得大官超棘過九卿也爾伏地夫人也隋書曰琉球國居海島之中土人所居曰波羅檀洞塹柵三重環以流水樹棘為藩韓子曰宋人為燕王以棘刺之端投毋猴者使王必三月齋而後觀之右御治工謂王曰臣聞人主無十日不燕今王不能久齋故以三月為期也荆棘至小安可削乎王必察之王因而問之果無乃殺之治工又謂王曰士有虛名多棘刺之謂也吕氏春秋曰棗棘之有也裘狐之有也食棘之棗衣狐之皮先王固用非其有而已有之湯武一日而盡有夏商之地秦子曰踰枳棘之籬則有維柱之思登椒桂之圃則有榮華之芳陳留耆舊傳曰魏尚被繫詔獄有雀集獄棘上占曰夫棘樹者心赤外有刺象我言有刺而赤心之至誠李嘗藥録曰棘刺}
