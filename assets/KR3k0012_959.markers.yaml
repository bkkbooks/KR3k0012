  - {type: variant, offset: 1657, length: 0, content: '', WYG: 杪車轂中皆生荆木長一二丈客俱入報隨隨曰此左公遣追之客逐慈叩首謝客還見牛在故地無荆木也顧微廣州記曰撫納縣出金荆禮弓矢圖曰楚焞土敦反以荆為之燃以灼正以荆者凡木心圓荆心方也地理志曰荆本楚木名因名地焉廣州記曰白荆堪為履紫荆堪為牀淮南萬畢術曰南山牡荆指病自愈節不相當有月暈時尅之杜實大業拾遺録曰五年南方置北景林邑海隂三郡北景在林邑南大海中與海隂接境其地東西一千餘里南北三百餘里海水四絶北去大岸三百餘里或云馬援銅柱尚存地暑熱多大林木高者數百㝷有金荆生於高山峻阜大者十圍盤屈瘤蹙文如美錦色艶於真金中夏時有於海際得之工人取用甚精妙貴於沉檀棘毛詩湛露曰湛湛露斯在彼把棘又黄鳥曰交交黄鳥止于棘又墓門曰暮門有棘斧以斯之周書曰太姒夢見商之庭生棘周禮秋官曰朝士掌建邦外朝之灋左九棘孤卿大夫位焉右九棘公侯伯子男位焉鄭𤣥曰樹棘以為位者取其赤心而外能刺禦也左傳昭公曰豎牛奔齊孟仲之子殺之投其首於寜風之棘上春秋元命苞曰樹棘聽訟其下者棘赤心有刺焉制人者原心不失其赤實也後漢書曰馮異朝京師引見帝謂公卿曰是我起兵時主簿也為吾披荆棘定闗中又曰仇覽字季智一名香陳留考城人也時考城令河内王渙政尚嚴猛聞覽以徳化人署為主簿後渙謝遣曰枳棘非鸞鳳所棲百里豈大賢之路今日太學曵長裾飛名譽皆主簿後可以一月俸為資勉卒學行晉書曰劉琨至并州荆棘成林豺狼滿道琨剪除荆棘收葬枯骸造府朝建市獄冦盜時來掩襲嘗以城門為戰場百姓負楯以耕属鞬而耨琨撫循勞來甚得物情又曰祖逖在河南公私豐贍士馬日滋方當摧鋒越河掃清冀朔㑹朝廷將遣戴若思為都督逖以若思是呉人雖有材望無𢎞致逺識且已剪荆棘收河南地而若思雍容一旦來統之意甚不樂又曰石季龍大饗羣臣於大武殿佛圖澄曰殿乎殿乎棘子成林將壊人衣龍殿右果有棘生冉閔小字棘奴時龍養為己子又曰崔洪清厲骨鯁為尚書左丞時人為之語曰}
