  - {type: variant, offset: 386, length: 2, content: 梓橦, SBCK: 益昌郡土地所屬與金州同春秋戰國時並屬蜀侯漢葭萌縣地華陽國志曰昔蜀王封其弟於漢中號曰苴侯因命其地曰葭萌苴侯與巴王通好巴與蜀爲讎故蜀王怒伐苴苴奔巴求救於􅁗􅁗乃伐蜀遂滅蜀及巴苴置巴蜀二郡水經曰益昌有小劔城去大劔城三十里連山絶險飛閣通衢故謂之劔閣也蜀志曰先主使陳戒絶馬鳴閣魏武聞之喜曰此閣過漢中之平隂乃咽喉之要路馬鳴閣在益昌縣夔州十道志曰夔州雲安郡春秋時爲魚國􅁗併天下爲巴郡地漢爲魚復縣左傳曰庸蠻叛楚楚莊王伐之七遇皆北唯禆儵魚人實逐之杜曰禆儵魚三巴今魚復縣也漢志曰江􅀜都尉理魚復橘官郡國記曰白帝城即公孫述至魚復有白龍出井中因號魚復爲白帝城劉備因改魚復爲永安又後漢書公孫述自以承漢土德故號曰白帝城蜀志曰羅憲爲領軍守永安聞魏軍平蜀三日􅂘於都亭荆州圖副曰永安宫南一里渚下平磧上有諸􅁑孔明八陣圖聚細石爲之各髙五丈皆棊布相當中間相去九尺正中開南北巷悉廣五尺或爲人散亂及爲夏水所没至冬水退依然如故荆州記曰壘西聚石爲八行行八聚謂之八陣圖因曰八陣旣成自今行師不復敗後見莫能了之桓宣武伐蜀見之曰此常山虵􅀔也開州十道志曰開州盛山郡本漢朐䏰縣之地合州圖經曰合州巴川郡􅁗漢屬巴郡宋置東宕渠郡西魏置合州忠州十道志曰忠州南賔郡􅁟地所屬與􅇪州同譙周巴記曰後漢獻帝􅀄平六年臨江縣屬永寜郡建安中改永寜爲巴東郡臨江仍屬焉續漢志曰和帝永元中分枳縣置平都縣平者即今豊都縣也史記􅂫代曰楚得枳而國亡萬州十道志曰萬州南浦郡􅁟地所屬與通州同漢爲巴郡胊䏰縣地續漢志曰朐䏰屬巴郡朐音蠢䏰如尹切㝷江源記曰梁山東西數千里望之􅀂長雲垂天劔閣銘曰巖巖梁山積石峨峨又曰景穴有嘉魚其味甚美景穴在梁山縣栢枝山閬州圖經曰閬州閬中}
