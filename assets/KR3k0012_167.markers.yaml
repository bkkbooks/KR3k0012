  - {type: variant, offset: 1742, length: 330, content: 梁州之域漢武置十三州在益州之部周地圖記曰梁武陵王蕭紀於蒲水口改置邛州南郡邛來山因以為名史記曰蜀卓氏之先趙人秦破趙卓氏獨夫妻推輦而行曰吾聞汶山之下沃野有蹲鴟乃求遠遷致之臨邛因銅山鑄錢此也蜀記曰漢張鶱奉使尋河源得高節竹植於邛山號曰邛竹今緣山皆是可為杖蜀志曰臨邛有火井諸葛亮一窺更盛博物志曰後人以家火投之火即滅至今不然普州十道志曰普州安岳郡禹貢梁州之域漢武十三州在益州之部今州境則漢之資中牛鞞墊江後漢之德陽等四縣雅州十道志曰雅州廬山郡禹貢梁州之域漢武十三州在益州之部即秦嚴道縣也蜀記曰秦滅楚徙楚嚴王之族於此故謂之嚴道漢志曰嚴道屬蜀郡邛來山邛水所出東入青衣王莽曰嚴治郡國志曰漢源縣有離崖即蜀守李冰所鑿離堆即古雅也嚴道縣有九折坂即王陽廻轡之所瀘州十道志曰瀘州瀘川郡禹貢梁, WYG: 荆}
