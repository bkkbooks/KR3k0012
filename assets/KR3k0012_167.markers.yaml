  - {type: punctuation, offset: 13, content: 》, id: KR3k0012_CHANT_167-bkkpn7}
  - {type: variant, offset: 15, length: 142, content: 之域秦之蜀郡漢屬廣漠郡之梓橦縣華陽國志曰諸葛亮相蜀鑿石架空為飛閣道以通蜀漢即此郡三國志曰鄧艾伐蜀自陰平縣景谷步劍閣道懸車束馬逕出油江而至大漢是此地也蜀記曰梓橦縣有五婦山一名五婦臺秦遺蜀美女五人蜀遣五丁迎女至梓橦五丁蹋地大呼驚五女並化為石郡國志曰梓橦縣北有華容水則蜀都賦曰卻背華容是也緜, WYG: 歸州復州郢州鳯州成州武州興州宕州扶州文州利州䕫州開州合州忠州萬州閬州果州荆}
