  - {type: variant, offset: 2274, length: 0, content: '', WYG: 利州益昌郡土地所屬與金州同春秋戰國時並屬蜀侯漢葭萌縣也華陽國志曰昔蜀王封其弟於漢中號曰苴侯因命其地曰葭萌苴侯與巴王通好巴與蜀為讎故蜀王怒伐苴苴奔巴求救於秦秦乃伐蜀遂滅蜀及巴苴置巴蜀二郡水經曰益昌有小劍城去大劍城戍三十里連山絶險飛閣通衢故謂之劍閣也蜀志曰先主使陳戎絶馬鳴閣魏武聞之喜曰此閣迺漢中之平隂乃咽㗋之要路馬鳴閣在益昌縣䕫州十道志曰䕫州雲安郡春秋時為魚國秦併天下為巴郡地漢為魚復縣左傳曰庸蠻叛楚莊王伐之七遇皆北唯禆儵魚人實逐之杜曰禆儵魚庸三邑魚魚復縣漢志曰江闗都尉理魚復有橘官魚庸三邑魚魚復縣郡國記曰白帝城即公孫述至魚復有白龍出井中因號魚復為白帝城昭烈因改魚復為永安又後漢書公孫述自以承漢土德故號曰白帝城蜀志曰羅憲為領軍守永安聞魏軍平蜀三日哭於都亭荆州圖記曰永安宫南一里渚下平磧上有諸葛亮孔明八陣圖聚細石為之各髙五尺皆棊布相當中間相去九尺正中開南北巷}
