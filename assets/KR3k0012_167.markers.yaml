  - {type: variant, offset: 2492, length: 644, content: 接土蕃為夷落之極塞武德中羗夷內附因立奉州取其順奉王命為名嶲州十道志曰嶲州越嶲郡本益州西外夷漢初為邛都國史記曰西南夷滇以北居君長十數邛都最大漢志曰越嶲郡武帝元鼎六年開莽曰集嶲屬益州應劭曰故邛都國也有嶲水言越以此水彰休盛也九州要記曰嶲之西夷人身青而有文如龍鱗愽物志曰越嶲國有牛稍割取肉經日必復生如故又玄中記曰割而復生名曰及牛十道記曰越嶲有瀘水四時多瘴氣三四月間發人衝之立死非時中人多悶絕唯五月上伏即無害故諸葛亮征越嶲上䟽曰五月渡瀘深入不毛又地記曰今昆明道渡所見有武侯道在又十道記曰水浚而巉石土人以牛皮為舩方涉津涘九州要記曰臺登縣有奴諾川鸚鵡山黑水之間若水出其下即黃帝子昌意降居若水是此漢志曰旄牛屬蜀郡鮮水出徼外南入若水若水亦出徼外南至大祚旄牛即今臺登縣姚州十道志曰姚州云南郡蓋夷越之地亦為滇王國漢武開之置益州部有滇池澤後因為益州之雲南弄揀二縣也漢志曰益州郡武帝元封二年開王莽曰就新故滇王國也有滇池大澤又有弄揀縣焉華陽國志曰滇漢勾野夜郎葉榆同師舊堂侯王國以十數編髮左袵隨畜遷徙莫能相禦楚項襄王遣將軍莊蹻泝沆水出苴蘭以伐夜郎而秦奪楚黔中地無路反遂留王之是為莊王黎州圖經曰黎州洪源郡漢為沉黎郡宋齊以來並為沉黎郡後周破羗夷立黎州龍州十道志曰龍州江油郡秦漢及魏不置郡縣魏志曰景元四年諸軍征蜀鄧艾自陰平行無人之地七百餘里鑿山通道造作橋閣山高谷深至為險難艾以氈自裏轉推而下將士皆攀木緣崖魚貫而進先登至江油即此地也周地圖記曰江油帥楊李二姓各自稱蕃於梁至後魏武帝得其地置江油郡西魏於此立龍州松州十道志曰松州交川, WYG: 充}
