  - {type: variant, offset: 670, length: 984, content: 成都府古梁州巴濮庸蜀之地在秦為漢中巴蜀三郡地釋名曰益扼也所在之地險阨應劭地里風俗記曰疆壤益廣故號益州史記曰周太王逾梁山之歧山一年成邑二年成都故有成都之名又曰秦惠王時苴蜀相攻各告急於秦秦欲先伐韓司馬錯曰不如先伐蜀夫蜀戎狄之長也有桀之亂以秦攻之譬使豺狼逐群羊也又有禁止暴亂之名今攻韓周自知失九鼎韓自知亡三川二國併力合謀而求解于楚魏臣竊危之王曰善遂滅蜀漢書曰宣帝時方士上言益州部有金馬碧雞神帝令王褒入蜀祀之揚雄蜀王本紀曰蜀之先稱王者有蠶叢折權魚易俾明是時椎髻左衽不曉文字未有禮樂從開明已上至蠶叢凡四千歲次曰伯雍又次曰魚尾尾田於湔山得仙後有王曰杜宇出天墮山又有朱提氏女名曰利自江源而出為宇妻乃自立為蜀王號曰望帝移居郫邑十三州志曰當七國稱王獨杜宇稱帝於蜀以褒科為前門熊耳靈關為後戶玉壘峨眉為池澤汶山為畜牧中南為園苑時有荊人是後荊地有一死者名鼈冷其尸亡至汶山卻更生見望帝帝以為蜀相時巫山壅江蜀地洪水望帝使鼈冷鑿巫山治水有功望帝自以德薄乃委國禪鼈冷號曰開明遂自亡去化為子規故蜀人聞鳴曰我望帝也又云望帝使鼈冷治水而淫其妻冷還帝慚遂化為子規杜宇死時適二月而子規鳴故蜀人憐之皆起自開明已下五葉始立宗廟時蜀有五丁力士能徙山岳每一王死五丁輒為立大石以誌墓今石井是也號曰井里成都記曰郡城即秦惠王使張儀築以象咸陽沃野千里號曰陸海九州志曰益州城初累築不立忽有大龜周行旋走因其行築之遂得堅固故曰龜城南史曰宋太始初益州市橋忽生一洲有道士柳石見之曰當有貴王臨州必王勝喜也及齊永明二年武帝遣始興王為益州勝喜者即始興反語也續漢書郡國志曰益州部漢中巴廣漢蜀犍為越嶲䍧牁益永昌凡九郡華陽國志曰成都夷里橋南岸道西有城即錦城一曰錦官又曰錦里又曰蜀初少文教文翁為蜀郡太守立精舍學堂以隸其俗因是文教聿興今有文翁堂在大城內漢州圖經曰漢州德陽縣土地同益州秦屬蜀郡漢屬廣漢郡後漢因之兼置益州領郡十二蜀記曰益州謂之三蜀廣漢其一也後漢書曰雒城南每陰雨常有哭聲和帝時陳寵為太守聞之有勑令收葬骸骨哭聲遂絕蜀記曰金堂縣古有金舡沉江之東岸民於水中往往見之彭州十道志曰彭州濛陽郡本漢繁縣宋置晉壽陽圖經曰唐垂拱二年以九隴縣置彭州取古天彭關以為名周地圖記曰宋元嘉九年有樵人逐麚所趨險絕進入石穴行數十步豁然平博問是何所人荅云小成都後更往求之不知所在地理志曰九隴縣晉置以縣有九曲山為名蜀州十道志曰蜀州唐安郡本漢江源縣屬蜀郡莽曰邛原魏志曰蜀州鳴鶴山張, WYG: 竟}
