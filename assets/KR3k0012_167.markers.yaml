  - {type: variant, offset: 162, length: 0, content: '', SBCK: 武州武都郡土地所屬與成州同亦白馬氐之地漢書曰西南夷傳曰漢誅且蘭卭君并殺莋侯冉駹等皆震懼請臣置吏以爲廣西部至元鼎六年以白馬氐地爲武都郡隴右記曰武都紫水有泥其色紫而粘貢之用封璽書故詔誥有紫泥之美郡國志曰武都沮水之西有角弩谷即蜀將姜維勦五部溪蠻之所魚豢魏略曰文帝黄􅀄元年徙武都於美陽在今雍州好畤縣界武都故城是也興州十道志曰興州順政郡戰國時白馬氐之東境􅁗併天下爲蜀郡地漢元鼎六年置武都郡晉書曰懷帝永嘉中氐之人楊茂搜據武都郡子孫丞嗣爲氐王周地圖記曰郡有丙山山有穴即丙穴其口向丙因以爲名毎春三月上旬有魚長八九寸或二三日聮}
  - {type: page-break, offset: 162, content: '', id: KR3k0012_SBCK_167-5a}
