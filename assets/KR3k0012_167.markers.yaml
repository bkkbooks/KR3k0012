  - {type: variant, offset: 3899, length: 205, content: 道志曰資州資陽郡禹貢梁州之域漢為犍為郡之資中縣地周地圖記曰後魏廢帝二年於武康郡之陽安縣置資州陽安在今州北簡州界郡國志曰內江縣有水深百丈實郡川總會之所戎州十道志曰戎州南溪郡春秋僰侯國秦惠王破滇池始通五尺道漢武得蜀故使唐蒙理道於此而破䍧牁即此道也後為僰道縣以屬犍為郡郡國志曰南溪縣西三十里有魚津津南有鴛鴦坼益部耆舊傳曰僰道有張真者娶黃氏女名帛真因乘船過江船覆沒帛求夫尸不得自沉於水積十四日乃抱夫屍出於灘下故名鴛鴦坼, SBCK: 七}
