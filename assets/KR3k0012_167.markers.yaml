  - {type: variant, offset: 2113, length: 783, content: 地諸葛亮出師表曰五月渡瀘深入不毛茂州十道志曰茂州通化郡禹貢梁州之域本冉駹國漢以為郡史記曰南越破後冉駹等皆震懼請臣置吏以冉駹為汶山郡守翼州圖經曰翼州臨翼郡秦之土地與益州同二漢屬蜀郡本漢之蠶陵也漢志曰蠶陵屬蜀郡王莽曰步昌當州十道志曰當州江源郡禹貢梁州之域周為雍州之境後周書曰天和元年鴈門公紇干略於此討渾胡因置同昌郡悉州十道志曰悉州歸誠郡禹貢梁州之域古西羗地圖經曰唐顯慶三年割當州三十里左封縣界內有悉唐川因立為悉州靜州圖經曰靜州靜川郡土地與當州同唐永徽四年置靜州於唐縣以理夷落拓州圖經曰拓州蓬山郡土地與當州同唐顯慶三年於此置拓州取其開拓封疆為郡之名恭州圖經曰恭州化郡北接土蕃土地與當州同唐顯慶中置恭州取恭慕王化為名維州十道志曰維州維川郡蜀志曰姜維馬忠督將軍張嶷北討汶山叛羗即此也圖經曰武德中白茍羗首領以地內附因於姜維故城置維州以領之奉州圖經曰奉州雲山郡本蠻夷之地南接土蕃為夷落之極塞武德中羗夷內附因立奉州取其順奉王命為名嶲州十道志曰嶲州越嶲郡本益州西外夷漢初為邛都國史記曰西南夷滇以北居君長十數邛都最大漢志曰越嶲郡武帝元鼎六年開莽曰集嶲屬益州應劭曰故邛都國也有嶲水言越以此水彰休盛也九州要記曰嶲之西夷人身青而有文如龍鱗愽物志曰越嶲國有牛稍割取肉經日必復生如故又玄中記曰割而復生名曰及牛十道記曰越嶲有瀘水四時多瘴氣三四月間發人衝之立死非時中人多悶絕唯五月上伏即無害故諸葛亮征越嶲上䟽曰五月渡瀘深入不毛又地記曰今昆明道渡所見有武侯道在又十道記曰水浚而巉石土人以牛皮為舩方涉津涘九州要記曰臺登縣有奴諾川鸚鵡山黑水之間若水出其下即黃帝子昌意降居若水是此漢志曰旄牛屬蜀郡鮮水出徼外南入若水若水亦出徼外南至大祚旄牛即今臺登縣姚州十道志曰姚州云南郡蓋夷越之地亦為滇王國漢武開之置益州部有滇池澤後因為益州之雲南弄揀二縣也漢志曰益州郡武帝元封二年開王莽曰就新故滇王國也有滇池大澤又有弄揀縣焉, SBCK: ''}
