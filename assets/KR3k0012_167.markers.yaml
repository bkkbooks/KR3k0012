  - {type: variant, offset: 1518, length: 257, content: 彭州濛陽郡本漢繁縣宋置晉壽陽圖經曰唐垂拱二年以九隴縣置彭州取古天彭關以為名周地圖記曰宋元嘉九年有樵人逐麚所趨險絕進入石穴行數十步豁然平博問是何所人荅云小成都後更往求之不知所在地理志曰九隴縣晉置以縣有九曲山為名蜀州十道志曰蜀州唐安郡本漢江源縣屬蜀郡莽曰邛原魏志曰蜀州鳴鶴山張陵客蜀學道于此山造作符書以惑百姓又益州記張陵登仙之所傳云陵為蝮蛇所吸人以為登仙蜀記曰青州縣因山得名山上有黃帝授道壇又玄中記云山有穴潛行分為三道各通一處邛州十道志曰邛州臨邛郡禹貢梁州之域漢武置十三州在益州之部周地圖記曰梁武陵王蕭紀於蒲水口改置邛, SBCK: 果}
