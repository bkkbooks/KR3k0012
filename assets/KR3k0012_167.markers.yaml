  - {type: variant, offset: 2229, length: 2, content: 江源, WYG: 順政郡戰國時白馬氐之東境秦併天下為蜀郡地漢武元鼎六年置武都郡晉書曰懷帝永嘉中氐之人楊茂搜據武都郡子孫承嗣為氐王周地圖記曰郡有丙山山有穴即丙穴其口向丙因以為名每春三月上旬有魚長八九寸或二三日聮緜從穴出躍相傳名為嘉魚左太沖蜀都賦曰嘉魚出丙穴宕州十道志曰宕州懷道郡禹貢梁州之域古羌地周為雍州之境秦漢魏晉諸羌據之後漢書曰梁彌忿者宕昌羌也其先帝為豪祖勒自稱宕昌王彌忿世祖初求内附遂拜彌忿為宕昌王因封其地為宕昌藩即今宕州扶州十道志曰扶州同昌郡禹貢梁州之域實西戎之地周省梁入雍為雍州地秦漢魏晉並屬蕃夷後魏書曰廢帝前元年西逐吐谷渾定隂平於此置鄧州及鄧寧郡取前羌部落所居為之名時又置帖夷縣屬封統郡以戎夷寧帖為義也周地圖記曰後漢廢帝置同昌郡屬封統郡文州十道志曰文州隂平}
