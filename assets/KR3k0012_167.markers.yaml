  - {type: variant, offset: 2137, length: 2, content: 通化, WYG: 富水郡厯代所屬與竟陵郡同二漢屬江夏郡晉宋以來為竟陵郡地西魏屬安州後周武置郢州隨廢唐武德六年為郢州郡國志曰長壽縣武陵山春秋謂楚平王卒於樠木之下即此山也鳯州十道志曰鳳州河池郡土地所屬與金州同在秦隴西郡地漢為故道縣地故道今兩當縣是漢武改雍為涼後為涼州之地水經曰兩當縣水出陳倉縣之大散嶺西南流入故道川謂之故道水縣因水取名或云縣西有兩山相當故名之華陽國志曰河池一名仇池郭仲産秦州記云仇池山一名仇維山上有池似覆壺前志云是縣以山得名水經曰大散水流入黄花川黄花縣因水得名成州十道志曰成州同谷}
