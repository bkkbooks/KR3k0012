  - {type: variant, offset: 5, length: 0, content: '', SBCK: 十道志曰荆州江陵郡漢舊縣屬南郡禹貢曰荆及衡陽惟荆州北據荆山南及衡山之陽江漢朝宗于海二水經此州而入海有似於朝厥土惟塗泥厥田惟下中春秋元命苞曰􅎮散爲荆州分爲楚國荆之爲言強也陽盛物堅其氣急悍爾雅曰漢南曰荆州周官職方氏曰正南曰荆州其鎮曰衡山其藪澤曰雲夢其川江漢其浸潁湛其利丹銀齒革晉元康地記曰荆州於古蠻服之地漢書曰臨江閔王榮坐侵廟壖地爲宫上徴榮榮行祖於江陵北門旣上車軸折車廢江陵父老流涕言曰吾王不返矣王至詣中尉府郅都責訊王王恐自殺漢書地理志曰今之南郡江夏零陵桂陽武陵長沙及漢中汝南郡盡楚分也史記曰蘇􅁗􅀃威王曰楚西有黔中巫郡東有夏州海陵南有洞庭蒼梧北有陘塞郇陽地方五千里帶甲百萬車千乗􅀐萬疋粟支十年此霸王之資也淮南子曰楚地南卷沅湘北繞潁泗西苞巴蜀東裏郯邳潁汝以爲泗江漢以爲池垣之以鄧林緑之以方城山髙㝷雲霓􅀷谿肆無景十三州志曰漢章帝建􅀄二年徙鉅鹿王恭爲江陵王三公上言江陵在京師正南不可以封乃徙爲安六王盛弘之荆州記曰元嘉中以京師根本之所􅀉荆楚爲重鎮上流之所揔擬周之分陜晉宋以降此爲西陜釋名曰荆州取名於荆山又曰荆驚也南蠻數㓂常置警備左傳曰楚子西㳂漢泝江將入郢王在渚宫下見之十道志曰當陽縣舊縣屬南郡廣陽王子益之所封荆州記曰當陽本楚之舊邑左氏傳云楚潘崇伐麏至于錫穴潁容釋例云麏在當陽十道志曰公安縣漢孱陵縣地吴之南郡荆州記曰劉備敗於襄陽南奔荆州吴大帝封爲左將軍荆州牧城北而鎮之時人號備爲左公故名其城曰公安古今地名曰松滋縣古鳩兹地漢屬廬江郡峽州十道志曰夷陵郡春秋戰國時並楚地􅁗置三十六郡屬南郡魏武於此置臨江郡梁置冝州周武帝以州居三峽之口改爲峽州史記曰􅁗昭王二十九年􅁗將白起攻楚燒夷陵吴録曰蜀昭烈皇帝立冝都郡於西陵冝都記曰郡城即陸抗攻歩闡於此荆渚記曰夷陵郡居大江之上即西通全蜀故夷陵有安蜀古城吴志曰陸遜上䟽夷陵要害實國家之􅀜限􅀂失之非損一郡荆州亦可憂也十道志曰冝都縣本漢夷縣屬南郡􅀽山松冝都山川記南崔有山名荆門北對崖有山名虎牙故曰荆門虎牙即楚之西塞歸州十道志曰歸州巴東郡在周爲䕫子國屬楚􅁗併天下爲南郡之地漢置秭歸縣唐武德二年割䕫州之秭歸巴東二縣置歸州􅀽崧記曰屈原此縣人旣􅀍流放忽然暫歸其姉亦來因名其地爲秭歸稀與姊同三國志曰吴置建平郡即冝都之西部也晉王濬自蜀江㳂流伐吴守將吾彦表晧曰請増建平兵􅀂建平不下晉師終不敢過皓不從復州十道志曰復州竟陵郡禹貢荆州之域春秋戰國時屬楚􅁗兼天下屬南郡漢中十三州在州部即江夏之竟陵縣地唐武德五年爲復州郡國志曰􅃆陽縣即楚王地也}
