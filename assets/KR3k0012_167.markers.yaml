  - {type: variant, offset: 184, length: 1, content: 屬, WYG: 爾雅曰漢南曰荆州周官職方氏曰正南曰荆州其山鎮曰衡山其澤藪曰雲夢其川江漢其浸潁湛其利丹銀齒革晉元康地記曰荆州於古蠻服之地漢書曰臨江閔王榮坐侵廟壖地為宫上徵榮榮行祖於江陵北門既上車軸折車廢江陵父老流涕言曰吾王不返矣王至詣中尉府郅都責訊王王怒自殺漢書地理志南郡江夏零陵桂陽武陵長沙漢中汝南楚分也史記曰蘇秦說威王曰楚西有黔中巫郡東有夏州海陽南有洞庭蒼梧北有涇塞郇陽地方五千餘里帶甲百萬車千乘騎萬匹粟支十年此霸王之資也淮南子曰楚地南卷沅湘北繞潁泗西包巴}
