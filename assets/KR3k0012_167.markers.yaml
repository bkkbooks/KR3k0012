  - {type: punctuation, offset: 3338, content: 「, id: KR3k0012_CHANT_167-bkkpn1201}
  - {type: variant, offset: 3338, length: 422, content: 峨眉山兩山相對望之如峨眉簡州十道志曰簡州陽安郡禹貢梁州之域漢犍為之牛鞞縣地華陽國志曰牛鞞縣有陽明井今在郡北十里九州要記曰簡州在赤水之北今有絳水在州南周地圖記曰晉義熙末刺史朱齡石率建平人征蜀仍於東山立金戍後魏平蜀改為金水郡陵州十道志曰陵州仁壽郡禹貢梁州之域漢犍為郡之武陽縣東境也郡國志曰昔張陵於此得鹽井祠玉女於井內因謂之陵井郡因井得名益州記曰郡有東嵎三山相對去陵井百里郡國志曰有鼎鼻山周之九鼎淪一於此故後人往往見鼎耳因名之又曰郡有朝女山昔有朝祖女於此山得道今足跡尚存故名朝女山眉州十道志曰眉州通義郡禹貢梁州之域犍為郡之武陽南境周地圖記曰梁武帝太清二年武陵王蕭紀開通外水立青州於通誼郡南安縣北後魏二年平蜀三年改青州為眉州用莪眉山為名蜀記曰秦惠王使張儀司馬錯伐蜀蜀王開明拒之不利退至武陽見獲彭山縣即其地郡國志曰青神縣當羗蜀之要漢武使唐蒙破西南夷即路始於此榮州十道志曰榮州和義郡禹貢梁州之域漢為南安縣地屬犍為郡九州要記曰和義郡古夜郎之地有成都市漢武時南, SBCK: 貞元}
