  - {type: variant, offset: 8, length: 1, content: 普, SBCK: 􅁥利縣漢華容縣乾溪章華臺在焉郢州十道志曰郢州冨水郡歷代所屬與竟陵郡同二漢屬江夏郡晉宋以來爲竟陵郡地西魏屬}
  - {type: variant, offset: 8, length: 1, content: 普, krp: 監利縣漢華容縣乾溪章華臺在焉郢州十道志曰郢州冨水郡歷代所屬與竟陵郡同二漢屬江夏郡晉宋以來爲竟陵郡地西魏屬}
  - {type: variant, offset: 10, length: 0, content: '', SBCK: 州後周武帝置郢州隨廢唐武德六年爲郢州郡國志曰長壽縣武陵山春秋謂楚平王卒於樠木之下即此山也鳯州十道志曰鳯州河池郡土地所屬與金州同在􅁗隴西郡地漢爲故道縣地故道今兩當縣是漢武改雍爲凉後爲凉州之地水經曰兩當縣水出陳倉縣之大散嶺西南流入故道川謂之故道水縣因水取名或云縣西有兩山相當故名之華陽國志曰河池一名仇池郭仲産􅁗州記云仇池山一名仇維山上有池似覆壷前志云是縣以山得名水經曰大散水流入黄花川黄花縣因水得名成州十道志曰成州同谷}
