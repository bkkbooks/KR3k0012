  - {type: variant, offset: 2276, length: 2, content: 歸誠, WYG: 記曰壘西聚石為八行行八聚謂之八陣圖因曰八陣既成自今行師不復敗後見莫能了之桓宣武伐蜀見之曰此常山虵勢也開州十道志曰開州盛山郡本漢朐䏰縣之地合州圖經記曰合州巴川郡秦漢屬巴郡宋置東宕渠郡西魏置合州忠州十道志曰忠州南賔郡土地所屬與䕫州同譙周巴郡地記曰後漢獻帝初平六年臨江縣屬永寧郡建安中改永寧為巴東郡臨江仍舊焉續漢志曰和帝永元中分枳縣置平都縣史記蘇代曰楚得枳而國亡萬州十道志曰萬州南浦郡土地所屬與通州同漢為巴郡朐䏰縣地續漢志曰朐䏰屬巴郡尋江源記曰梁山東西數千里望之若長雲垂天劍閣銘曰巖巖梁山積石峨峨又曰丙穴有嘉魚其味甚美丙穴在梁山縣柏枝山閬州圖經曰閬州閬中}
