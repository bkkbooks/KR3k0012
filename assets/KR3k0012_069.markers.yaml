  - {type: variant, offset: 2503, length: 21, content: 龍魚川澤漲不測出五色雲俗以為靈而莫敢採捕因, SBCK: 益陽縣西有􅀜羽瀬所}
  - {type: variant, offset: 2503, length: 1, content: 龍, WYG: 益陽縣西有雲長瀬所謂關侯灘也南對甘寧故壘昔雲長屯軍水北孫權令魯肅甘寧拒之於是水寧謂肅曰彼聞吾咳唾之聲不敢渡也渡則成擒矣又何懼哉又曰漢水東為鱣湍洪波奔蕩崩浪雲頽故老言有鱣}
  - {type: page-break, offset: 2503, content: '', id: KR3k0012_WYG_069-10b, image: WYG0893/WYG0893-0565b.png}
