  - {type: variant, offset: 130, length: 4, content: 掌冰正歲, WYG: 有山行墜澗者無出路飢餓僅死見龜蛇甚多朝暮引頸向四方人因學之遂不復飢體殊輕便能登巖岸經數年復竦身舉臂遂超出澗上即便還家顔色悦澤頗更聰慧洎食穀啖滋味百日復其本質郡國志曰漢武元封二年有百羊出庸澗初出一羊野中婦人大驚拍手羊因止今俗生羊禁婦人拍手是也又水經曰吳房縣山澗有白羊淵淵水出羊又曰赤松澗在東陽赤松子逰金華山以火自燒而化故山上有赤松子之祠澗自山出故曰赤松澗}
