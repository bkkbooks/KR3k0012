  - {type: variant, offset: 2505, length: 10, content: 川澤漲不測出五色雲俗, WYG: 奮鬐遡流望濤直上至此則曝鰓失濟故名湍異苑曰永嘉郡有百簿瀬郡人斷水捕魚宰牲禱祭以祈多獲逾時了無所得衆侣忿怨棄業將罷其夕並夢見老公云諸君且可小停要思其宜夜忽聞有跳躍聲驚起共看乃是大魚剉}
