  - {type: variant, offset: 1218, length: 2, content: 冰井, WYG: 晉寧縣有龍莾洲父老云龍蛻骨於此洲其水今猶多龍骨山謙之丹陽記曰江寧縣南二十五里有列洲晉簡文帝為相時㑹桓温處也郡國志曰朝洲白嶼洲亦自浮來後㑹稽人姓丁識之云曾藏銅熨斗於上往取果得又曰潤州長命洲梁武放生處後魏使李諸來聘武帝問曰彼國亦放生否諸曰不取亦不放帝大慙荆州圖經曰襄陽縣南八里峴山東南一十里江中有蔡洲漢長水校尉蔡瑁所居宗族強盛共保蔡洲為王如所沒一宗都盡又曰武當縣西北四十里江有滄浪洲長四里中廣十三里禹貢稱漢水東流為滄浪水疑此洲是也方言曰水可居者為洲三輔謂之淤郭璞注曰上林賦云行於洲淤之浦輿地志曰伍子胥叛楚出闗於江上見漁父求渡時傍多人漁父歌曰日灼灼兮駸已馳與子期乎蘆之漪子胥既渡解百金之劒與漁父漁父曰楚購子粟五萬爵執圭豈百金之劒乎子胥曰勿令其露漁父知意遂覆舟而死其處是􅚒洲水路去洲一百九十里江夏記曰鸚鵡洲}
