  - {type: variant, offset: 128, length: 1, content: 凌, WYG: 両山夾水曰澗漢書曰沛公與項籍臨廣武澗而語數籍十罪東觀漢記曰耿恭以踈勒城傍有水徙居之匈奴來攻絶其澗水吏笮馬糞汁飲之水經註曰洛水東北流注于公路澗但世俗音訛號之曰光禄澗非也異苑曰苻堅為慕容冲所襲堅奔馳墮馬而落澗追兵幾及計無由出馬即踟蹰臨澗垂鞚與堅堅不能及馬又跪授焉堅攀之得登岸而走幽明録曰}
