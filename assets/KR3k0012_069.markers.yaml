  - {type: variant, offset: 1856, length: 643, content: 言夕至也一月之中天再東再西故潮水再大再小也又夏時日居南宿陰消陽盛而天高一萬五千里故夏潮大也冬時日居北宿陰盛陽消而天高一萬五千里故冬潮小也又春日居東宿天高一萬五千里故春潮漸起也秋日居西宿天高一萬五千里故秋潮漸減也又曰天河從北極分為兩頭至於南極其一經南斗中過其一經東斗中過兩河隨天轉入地下過而與下水相得又與海水合三水相蕩而天轉排之故激涌而成潮水又曰濤水者潮取物多者其力盛來遠者其勢大今潮水從東地廣道遠乍入狹處陵山觸岸從直赴曲其勢不泄故隆崇涌起而為濤俗人云濤是五子胥所作妄也子胥始死耳天地開闢已有濤水矣川說文曰川貫穿通流水也釋名曰川者穿地而流也易曰地險山川丘陵也王公設險以守其國又曰利涉大川書曰予決九川距四海王肅曰九川者九州之川也又曰若濟大川用汝作舟楫又曰九山刊旅九川滌源禮曰天降時雨山川出雲周禮曰楊州其川三江荊州其川江漢豫州其川滎洛青州其川淮泗兗州其川河泲雍州其川涇汭幽州其川河濟冀州其川漳并州其川呼沱又曰兩山之間必有川焉大川之間必有途焉大戴禮曰聖人有國則川澤不竭蔡邕月令章句曰眾流注海曰川國語曰幽王二年三川皆震又曰厲王虐國人謗王邵公告王日民不堪命矣王怒得衛巫使監謗者以告則殺之國莫敢言道路以目王喜告邵公曰吾能弭謗矣乃不敢言邵公曰是鄣之也防民之口甚於防川川壅而潰傷人必多民亦如之是故為川決之使導為民宣之使言語曰子在川上曰逝者如斯夫不舍晝夜竹書記年曰藍田川有漢臨江王榮塚景帝以罪徵之將行祖於江陵北門車軸折父老泣曰吾王不反矣榮至都中尉郅都急切責王王年少恐而自殺葬於是川有鷰數萬衘土置塚上百姓憐之, SBCK: ''}
