  - {type: variant, offset: 562, length: 1, content: 靈, SBCK: 殷仲堪爲荆州刺史先是仲堪遊於江濵見流棺接而葬焉旬日間門前之溝忽起成岸其夕有人通仲堪自稱徐伯云感君之惠無以報也仲堪因問門前之岸是何祥乎對曰水中有岸其名爲洲君將爲州言終而没至是果臨荆州王隱􅀳書曰朱崖在大海中遥望朱崖洲大如􅌲舉忛一日一夜至洲周匝二千里徑度七八百里可十萬家女多姣好長髮美􅁂呉録地理志曰呉富春縣有沙漲武烈爲郡吏赴府郷人餞之㑹於沙上父老曰此沙狹而長君後當爲長沙太守後果然因名孫洲呉志曰孫權遣衛温諸葛直將甲士萬人浮海求夷洲及亶洲在海中長老傳言􅁗始皇}
