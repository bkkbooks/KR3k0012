  - {type: variant, offset: 1205, length: 9, content: 六月持去經日猶堅也, WYG: 充百數僣號旬時身屠宗滅及其傾覆洲亦消毁至宋文帝在藩忽生一洲果龍飛江表斯有驗矣荆州圖副曰百里洲其上平廣土沃人豐湖澤所産足償儉歲又特宜五果甘柰梨蔗於此是出荆南志曰枝江縣界内洲大小凡三十七其十九有人居十八無人劉楨京口記曰嘉子洲西一里得貴洲周廻四十里許上多有居民昔魏文帝伐孫權至此洲南望曰彼人有焉而退因名曰貴洲}
