  - {type: variant, offset: 1171, length: 4, content: 冰室在宣, SBCK: 江寧縣南二十五里有列洲晉簡文帝爲相時㑹桓温處也郡國志白潮州白嶼洲亦自浮來後㑹稽人姓丁識之云曾藏銅熨斗於洲上徃取果得又曰潤州長命洲梁武放生處後魏使李諧來聘武帝問曰彼國亦放生否諧曰不取亦不放帝大慙荆州圖經曰襄}
