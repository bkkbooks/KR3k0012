  - {type: variant, offset: 1144, length: 2, content: 漢制, SBCK: 梁孝王􅇠園之中又有鴈池池有鶴洲諸宫館相連異樹恠獸靡不畢備王與宫人賔客弋釣其中呉地記曰長洲在姑蘇南大湖北岸闔閭所遊獵處也呉主遣徐祥至魏魏太祖謂祥曰􅀌比者願越横江之津與孫將軍遊姑蘇之上獵長洲之苑吾志足矣詳對曰大王欲奉至順}
  - {type: variant, offset: 1144, length: 8, content: 漢制以酒滴為書取, WYG: 梁孝王園之中又有鴈池池有鶴洲諸宫館相連異樹怪獸靡不畢備王與宫人賓客弋釣}
  - {type: page-break, offset: 1144, content: '', id: KR3k0012_WYG_069-5b, image: WYG0893/WYG0893-0562d.png}
  - {type: variant, offset: 1144, length: 2, content: 漢制, krp: 梁孝王兔園之中又有鴈池池有鶴洲諸宫館相連異樹恠獸靡不畢備王與宫人賔客弋釣其中呉地記曰長洲在姑蘇南大湖北岸闔閭所遊獵處也呉主遣徐祥至魏魏太祖謂祥曰孤比者願越横江之津與孫將軍遊姑蘇之上獵長洲之苑吾志足矣詳對曰大王欲奉至順}
  - {type: punctuation, offset: 1146, content: ，, id: KR3k0012_CHANT_069-bkkpn382}
  - {type: 'tls:seg', offset: 1146, content: '', id: KR3k0012_CHANT_069-18a.8}
  - {type: variant, offset: 1147, length: 5, content: 酒滴為書取, SBCK: 合諸侯􅀂越横江而遊姑蘇是踵亡􅁗而躡夫差恐天下之事去矣太祖􅀏曰徐生得無逆詐耶湘中記曰或曰昭潭無底橘洲浮昭潭湘水至深處也橘洲每大水諸洲悉没而橘洲獨存焉王韶之始興記曰城西百餘歩有棲霞樓臨川王營置清暑遊焉羅君章居之因名爲羅公洲樓下洲上菓竹交䕃長楊傍映髙梧前竦雖即城隍趣同丘壑盛弘之荆州記曰南江上有龍洲下有寵洲二洲之間舊云多魚而投􅅈揮網輙便掛絶乃有客没而視之中水有牛二頭常爲破網故魚者患之又曰江津東十餘里有中夏洲洲之首江之汜也故屈原云經夏首而西浮又二十餘里有涌口所謂閻敖遊涌而逸二水之間謂之夏洲首尾七百里又曰枝江縣西至上明東及江津}
  - {type: page-break, offset: 1147, content: '', id: KR3k0012_SBCK_069-4a}
  - {type: variant, offset: 1147, length: 5, content: 酒滴為書取, krp: 合諸侯若越横江而遊姑蘇是踵亡秦而躡夫差恐天下之事去矣太祖笑曰徐生得無逆詐耶湘中記曰或曰昭潭無底橘洲浮昭潭湘水至深處也橘洲每大水諸洲悉没而橘洲獨存焉王韶之始興記曰城西百餘歩有棲霞樓臨川王營置清暑遊焉羅君章居之因名爲羅公洲樓下洲上菓竹交䕃長楊傍映髙梧前竦雖即城隍趣同丘壑盛弘之荆州記曰南江上有龍洲下有寵洲二洲之間舊云多魚而投罟揮網輙便掛絶乃有客没而視之中水有牛二頭常爲破網故魚者患之又曰江津東十餘里有中夏洲洲之首江之汜也故屈原云經夏首而西浮又二十餘里有涌口所謂閻敖遊涌而逸二水之間謂之夏洲首尾七百里又曰枝江縣西至上明東及江津}
