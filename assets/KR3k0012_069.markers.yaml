  - {type: variant, offset: 59, length: 2, content: 負冰, SBCK: 洛水東北流注于公路澗但丗俗音訛號之曰光禄澗非也異苑曰符堅爲慕容冲所襲堅馳騧馬墮而落澗追兵幾及計無由出馬即踟蹰臨澗垂鞚與堅堅不能及馬又跪授焉堅攀之得登岸而走幽明録曰人有山行墜澗者無出路飢餓僅死見􅀛虵甚多朝暮引頸向四方人因學之遂不復飢體殊輕便能登巖岸經數年後竦身舉臂遂超出澗}
