  - {type: variant, offset: 1162, length: 6, content: 不冰也陸機洛, SBCK: 上平廣土沃人豊湖澤所産足穰儉􅀊又特冝五果甘柰梨蔗於此是出荆南志曰枝江縣界内洲大小凡三十七其十九有人居十八無人劉禎亰口記曰嘉子洲西一里得貴洲周廻四十里許上多有居民昔魏文帝伐孫權至此洲南望曰彼人有焉而退因名曰貴洲􅄒征記曰晉寧縣有龍莽洲父老云龍蛻骨於此洲其水今猶多龍骨山謙之丹}
