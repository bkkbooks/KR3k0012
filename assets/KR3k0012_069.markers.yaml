  - {type: variant, offset: 105, length: 406, content: 賓客供冰大喪供夷盤冰夷盤大盤夏班冰賜群臣也又曰凌人掌冰正歲十有二月令斬冰三其凌三其凌三倍其冰禮曰孟冬之月水始冰地始凍仲冬之月冰益壯地坼鶡鳥不鳴虎始交又曰立春之日東風解凍又五日蟄虫始振又五日魚上冰風不解凍號令不行魚不上冰兵甲不藏傳曰楚子使薳子馮為令尹遂以疾辭方暑闕地下冰而床焉重爾衣裘蠒袍也禮玉藻曰藻績為蠒縕為袍鮮食而寢楚子使醫視之復曰病則甚矣而血氣未動又曰春無冰梓慎曰今茲宋鄭其饑乎陰不勝陽也又曰日在北陸而藏冰西陸朝覿而出之其藏冰也深山窮谷固陰冱寒於是乎取之其出之也朝之祿位賓食喪祭於是乎用之其藏之也黑牡秬黍以享司寒其出之也桃弧棘矢以除其災祭寒而藏之獻羔而啟之火出而畢賦自命夫命婦至於老疾無不受冰山人取之縣人傅之輿人納之隸人藏之夫水以風壯而以風出而藏之也周其用之也徧則冬無愆陽夏無伏陰春無凄風秋無苦雨人不夭札孝經援神契曰高山之巔無樹深海之淵無冰剛太燥溫太柔也家語曰霜降而婦功成娶者行焉季秋霜降冰泮而農桑起婚禮殺焉, SBCK: ''}
