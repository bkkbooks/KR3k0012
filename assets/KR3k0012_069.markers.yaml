  - {type: variant, offset: 1499, length: 214, content: 治不善之民是猶薄冰當白日藂毛過猛火也抱朴子曰五玉不染而堅寒冰不礱而朗又曰蹈薄冰以待夏日登杇枝而須勁風新論曰畫水鏤冰與時消釋潮水說文曰潮朝也從水朝風土記曰俗說鯢一名海鰌長數千里穴居海底入穴則水溢為潮出穴則水入潮退出入有節故潮水有期祖台之志怪曰隆安中陳悝於江邊作魚䇻正匪切潮去於䇻中得一女人長六尺有容色無衣服水去不能動臥沙中與語不應人有就辱之悝夜夢云盾我是江黃昨失道落君䇻小人遂見加凌今當白尊神殺之悝不敢移潮來自逐水去奸者尋病死吳越, WYG: ''}
