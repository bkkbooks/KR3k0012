  - {type: variant, offset: 65, length: 0, content: '', SBCK: 又水經曰呉房縣山溪有白羊淵淵水出羊又曰赤松澗在東陽赤松子遊金華山以火自燒而化故山上有赤松子之祠澗自山出故曰赤松澗十道志曰廣武澗在今滎澤縣西又西征記三皇山上有三城謂東西廣武城相去二百餘歩隋河水從中東南流今無水今城東有髙壇即項羽㘴太公於上以示漢軍處一謂鴻溝盧氏嵩山記曰半馬澗人或云百馬澗亦曰拜馬澗故老傳王子􅀳得仙而馬還國人思之不見乃拜其馬於此也韓子曰董安于爲趙上地守行石阜山見深澗深百仞問其御左右曰人甞有入此乎曰無有嬰兒狂聾人入此乎曰無有牛馬犬彘入此乎曰無有安于歎曰吾能治矣使吾法之無赦猶入澗之必死則民莫之犯也洲}
