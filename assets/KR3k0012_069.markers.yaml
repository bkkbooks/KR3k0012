  - {type: variant, offset: 1204, length: 0, content: '', WYG: 又曰江津東十餘里有中夏洲洲之首江之汜也故屈原云經夏首而西浮又二十餘里有涌口所謂閻敖游涌而逸二水之間謂之夏洲首尾七百里又曰枝江縣西至上明東及江津其中有九十九洲楚諺曰洲不滿百故不出王者桓𤣥有問鼎之志乃增一為兩}
