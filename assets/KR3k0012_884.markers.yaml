  - {type: variant, offset: 235, length: 1, content: 夏, SBCK: 與婦相見言語悲喜恩情如生時良乆乃聞皷聲遂别而去捜神記曰漢九江何敞爲交趾刺史行部到蒼梧暮􅀫鵠奔亭夜未半有一女子從樓下呼曰妾本居廣信縣脩里人早失}
  - {type: variant, offset: 237, length: 4, content: 弗忌為宗, SBCK: 母無兄弟嫁與同縣施氏薄命先死有雜繒百二十疋及婢致冨一人妾􅀌窮羸弱不能自振欲之傍縣賣繒從同縣男子王}
  - {type: punctuation, offset: 242, content: ，, id: KR3k0012_CHANT_884-bkkpn88}
