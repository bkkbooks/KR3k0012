  - {type: variant, offset: 208, length: 1, content: 帝, SBCK: 願}
  - {type: variant, offset: 208, length: 84, content: 帝許我罰有罪矣斃於韓又文上曰有事於太廟躋僖公逆祀也於是夏父弗忌為宗伯曰吾見新鬼大故鬼小先大後小順也君子以為失禮又宣公曰楚司馬子良生子越椒子文曰是必滅若敖氏矣及將死泣曰鬼, WYG: 四時之運}
  - {type: variant, offset: 208, length: 596, content: 帝許我罰有罪矣斃於韓又文上曰有事於太廟躋僖公逆祀也於是夏父弗忌為宗伯曰吾見新鬼大故鬼小先大後小順也君子以為失禮又宣公曰楚司馬子良生子越椒子文曰是必滅若敖氏矣及將死泣曰鬼猶求食若敖氏之鬼不其餒而又宣公曰初魏武子有嬖妾無子武子疾命顆曰必嫁是疾病則曰必以為殉及卒顆嫁之及輔氏之役顆見老人結草以亢杜回杜回躓而顛故獲之夜夢之曰余而所嫁婦人之父也爾用先人之治命余是以報又成公曰晉侯夢大厲被髮及地搏膺而踊曰殺余孫不義厲鬼也趙氏之先祖也八年晉侯殺趙同趙括故怒余得請於帝矣壞大門及寢門而入公懼入于室又壞戶公覺召桑田巫巫言如夢巫云鬼怒如公所夢又昭二曰鄭子產聘于晉晉侯有疾韓宣子逆客私焉曰寡君寢疾於今三月矣並走群望有加而無瘳今夢黃熊入於寢門何厲鬼也對曰昔堯殛鯀于羽山其神化為黃熊以入于羽淵實為夏郊三代祀之晉為盟主其或者未之祀也乎宣子祀夏郊晉侯有間又昭二曰鄭人相驚以伯有曰伯有至矣則皆走不知所往鄭人殺伯有言其鬼至鑄刑書之歲二月或夢伯有介而行曰壬子余將殺帶也明年壬寅余又將殺叚也及壬子駟帶卒國人益懼齊及燕平之月壬寅公孫叚卒國人愈懼其明月子產立公孫泄及良止以撫之乃止子太叔問其故子產曰鬼有所歸乃不為厲吾為之歸也又哀上曰初曹人或夢眾君子立干社宮而謀亡曹曹叔鐸請待公孫疆許之旦而求之曹無之戒其子曰我死爾聞公孫疆為政必去之又哀下曰衛侯夢于北宮見人登昆吾之觀被髮北面而譟曰登此昆吾之虛綿綿生之瓜余為渾良夫叫天無辜大當免三死并數一, krp: 四}
