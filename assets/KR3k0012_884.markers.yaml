  - {type: variant, offset: 191, length: 0, content: '', WYG: 見帝涕泗云國家傾覆是曹爽夏侯𤣥訴寃得伸故也又曰謝靈運以元嘉五年忽見謝晦手提其頭來坐别床血色淋漓不可忍視又所服豹皮裘血淹滿篋及為臨川郡飯中數有大虫謝遂被誅又曰世有紫姑神古來相𫝊云是人家妾為大婦所妬毎以穢事相役正月十五日感激而死故世人以其日作其形夜於厠間或猪欄邊迎之祝曰子胥不在曹姑亦歸曹即其大婦也小姑可出戯投}
