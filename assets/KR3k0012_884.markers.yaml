  - {type: variant, offset: 133, length: 0, content: '', SBCK: 子元無嗣也又曰謝靈運以元嘉五年忽見謝晦手提其頭來坐別床血淋落不可忍視又所服豹皮裘血淹滿篋及爲臨川郡飯中歘有大䖝謝遂􅀍誅又曰丗有紫姑古來相傳云是人妾爲大婦所姤誣以穢事相􅃥正月十五日感激而死故丗人以其日作其形夜於厠間或豬欄邊迎之呪曰子胥不在曹失亦歸曹即其大婦也小姑可出戯捉者􅁴重便是神來奠設酒果赤􅁴貌輝輝有色即跳躁不住能占衆事卜行來蚕桑又善射鈎好則大舞惡即仰眠平昌孟氏恒不信躬試往捉自躍穿帳頂而去永失所在也丗􅀃曰㑹稽賀思令善彈琴嘗夜在月中坐臨風鳴彈忽有一人形器甚偉着械有􅃤色在中庭稱善便與共語自云是嵇中散謂賀云卿手下極快但於古法未備因授以廣陵散賀遂􅀓之于今不絶又曰阮脩字宣子論􅀑神有無或以人死有􅀑宣子獨以爲無曰今見􅀑者云着生時衣服􅀂人死有鬼衣服有鬼耶論者服焉列異傳曰南陽宗定伯年少時夜行逢鬼問曰誰􅀑曰鬼也􅀑曰卿復誰定伯欺之言我亦􅀑也欲至宛市􅀑言我亦欲至宛市共行數里􅀑言歩行太極可共迭相擔也定伯乃大喜􅀑便先檐定伯數里􅀑言卿太重定伯言我新死故重耳定伯因復擔􅀑􅀑略無重如是再三定伯復言我新死不知􅀑悉何所畏忌鬼荅曰唯不喜人唾於是共道遇水定伯命􅀑先渡聽之了無聲定伯自渡漼漼有聲􅀑復言何以作聲定伯曰新死不習渡水耳勿怪行欲至宛定伯便擔鬼至頭上急持之􅀑大呼聲咋咋索下不復聽之徑至宛市中着地化爲羊便賣之恐其變化乃唾之得錢千五百乃去于時名宗定伯賣鬼得錢千五百又曰任城公孫逹甘露中爲陳郡卒官}
