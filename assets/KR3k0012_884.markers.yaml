  - {type: variant, offset: 243, length: 1, content: 吾, SBCK: 夫人何從來車上所載丈夫何在何故獨行妾應曰何問之壽持妾臂曰年少愛有色兾可樂也妾懼怖不應壽即持刀刺脅下一瘡立死又刺致冨亦死壽掘樓下合埋妾在下婢在上取財物而去殺牛燒車車釭及牛骨貯在亭東井中妾旣􅁈死痛感皇天無所告訴故來自歸於明使君敞曰今欲發之汝何以爲驗女子曰妾上下着白衣青絲屨皆未杇也妾姓􅂫名娥願訪郷里以散骨歸死夫敞乃馳還令吏捕壽考問具服問廣信縣與娥語合壽父母兄弟皆捕繫獄敞表壽常律殺人不至於族然壽爲惡隱宻經年王法自所不免今鬼神訴者千載無一請皆斬之以明􅀑神以助隂教又曰盧充范陽人家西三十里有崔少府墓充年二十先冬至一日出宅西獵戯}
  - {type: page-break, offset: 243, content: '', id: KR3k0012_SBCK_884-4a}
  - {type: variant, offset: 245, length: 0, content: '', SBCK: 麞便射中之麞倒而起充遂逐不􅁴逺忽見道北一里許髙門瓦屋四周有如府舎不復見麞門中鈴下唱客前有一人投一襆}
  - {type: variant, offset: 246, length: 2, content: 鬼大, SBCK: 衣曰府君以此繫郎充便着已進見少府語充曰尊府君不以僕門鄙近得書爲君索小女爲㛰}
