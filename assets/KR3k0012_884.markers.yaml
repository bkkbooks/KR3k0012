  - {type: variant, offset: 1161, length: 2241, content: 術太守史祈以為妖乃執而數之曰若有神可願一驗根曰頗能使鬼乃左顧右嘯祈之亡父近親數十皆反縛在祈前向根叩頭曰小兒無狀分當萬死叱祈曰汝子孫不能光榮先祖而辱如此何不叩頭謝之祈哀驚悲泣頓首請罪根默然忽去不知所之王隱晉書曰鎮南劉弘以故刺史王毅子衡陽太守矩為廣州矩至長沙見一人長大著布單衣自持奏左岸上矩省奏云京兆杜靈之仍入舡共語稱敘稀闊矩問君京兆人何時發來荅曰朝發矩怪問京兆去此數千那得朝發今到杜荅曰僕曰天上在京兆去此乃數萬何止數千乎晉書曰鄒湛字潤甫嘗見一人自稱甄仲舒餘無所言如此非一久之乃悟曰宅西有積土敗瓦其中有死人甄仲舒者予舍西土瓦中人也撿之果然厚加歛葬葬畢遂夢此人來謝又曰蘇韶字孝先安平人也仕至中牟令卒韶伯父第九子節在車上晝日韶自外入乘馬日黑又介幩黃䟽單衣白襪絲履憑節車轅節謂兄弟曰中牟在此兄弟皆愕視無所見問韶君何由來韶曰吾欲改葬即求去數日又來兄弟遂與韶坐節曰若必改葬別自勑兒韶曰吾將為書節授筆韶不肯曰死者書與生者異為節作其字像胡書也乃笑喚節為書曰昔魏武侯浮於西河而下中流顧謂吳起曰美哉河山之固此魏國之寶也吾性愛好京洛每往來出入瞻視邙山樂哉萬世之基也北背孟津洋洋之河南望天邑濟濟之盛此志雖未言銘之於心矣不圖奄忽所懷未果前去十月便速改葬買數畝地便足矣節延韶入室設坐祀之不肯坐又無所饗謂韶曰中牟平生好酒可少飲韶手執盃飲盡曰佳酒也節視杯空既去杯酒乃如故前後三十餘來兄弟狎翫節問所疑韶言天上及地下事亦不能悉知也顏淵卜商今見在為脩文郎凡有八人鬼之聖者梁成賢者吳季子節問死何如生韶曰無異耳死者虛生者實此其異也節曰死者何不歸屍骸韶曰譬如斷卿一臂以投地就剝削之於卿有患乎死之去屍骸如此也節曰厚葬美墳死者樂乎韶曰無在也節曰若無在何改葬韶曰今我誠無所在但欲述生時意耳韶欲去節留之閉門下鏁鑰韶為之少住韶去節見門故閉韶已去矣韶與節別曰吾今見為脩文郎守職不下得來也節執手乃別自是遂絕續晉陽春秋曰襄陽羅友在桓溫府屢以貧乞祿溫以其誕肆許而不用同府人有得郡者溫為坐別友亦被命至尤晚溫問之曰出門於中路遇一鬼大見耶榆曰見汝送人作郡不見人送汝作郡友始怖終慚不覺淹緩溫笑而用之晉書曰周訪宿宮亭湖廟晨起如廁見一老父訪執之化為雄鴨晉陽春秋曰符堅未敗長安市鬼夜哭一月止前趙錄曰麟嘉三年螽斯則百堂災自此鬼哭二宮夜夜不絕崔鴻十六國春秋後趙錄曰魏豹字叔虎范陽人也遷中山太守所在有治名豹嬖妾先死豹後守于廩丘南妾形見與豹言翌日而卒後魏書曰先是河邊人夢神謂己曰爾朱家欲渡河用爾作灅波津令為之縮水脈月餘夢者死及兆至有行人自言知水淺深以草往往表插而導焉忽失所在兆遂策馬涉渡宋書曰劉伯龍少而貧薄及長歷位尚書左丞武陵太守貧窶尤甚嘗在家慨然召左右將營十一之方忽見一鬼在傍撫掌大笑伯龍歎曰貧窮固有命乃復為鬼所笑也遂止梁書曰范雲嘗與梁武同宿顧暠之舍妻方產鬼在外曰此中有王有相雲起曰王當仰屬相以見歸因是盡心推事老子曰以道蒞天下者其鬼不神鬼不敢見其精神以干犯人非其鬼不神其神不傷人其鬼非無精神也邪不入正不能傷自然莊子曰齊桓公田於澤管仲御見鬼焉公撫管仲之手曰仲父何見對曰臣無所見也公反誒詒為疾數日不出齊士有皇子告敖者曰公則自傷鬼惡能傷公夫忿滀之氣散而不反則為不足上而不下則使人善怒下而不上則使人善忘不上不下者中身當心則為病耳桓公曰然則有鬼乎曰有沉有履竈有髻戶內之煩壤雷霆處之水有岡象丘有莘山有夔野有彷徨澤有委虵公曰請問委虵之狀何如曰委虵其大如轂其長若轅紫衣而朱冠其為物也惡聞雷車之聲則捧首而立見之者其殆乎霸桓公囅然而笑曰寡人之所見者也墨子曰周宣王殺杜伯不以罪後宣王田於圃見杜伯執弓矢射宣王伏弓衣而死呂氏春秋曰梁北有黎丘部有奇鬼焉喜效人之子姪昆弟之扶邑丈人布之市醉而歸者黎丘之鬼效其子之狀扶而道苦之丈人歸酒醒而譙譙責也其子曰吾為汝父也豈為不慈哉我醉汝道苦我何故其子伏而觸地曰孽無此事也其父信之曰譆是必奇鬼我固聞之明日復於市欲遇而刺殺之則旦之市而醉其真子恐其父之不能返也遂往迎之丈人望見之拔劍而刺之韓詩外傳曰人死曰鬼鬼者歸也精氣歸於天肉歸於土血歸於水脈歸於澤聲歸於雷動作歸於風眼歸於日月骨歸於木筋歸於山齒歸於石膏歸於露髮歸於革呼吸之氣歸復於人淮南子曰蒼頡作書鬼夜哭董仲舒五行逆順曰人君簡宗廟不禱祀則鬼夜哭風俗通曰汝南周翁仲初為太尉椽婦產男及為北海相吏周先能見鬼書署為主簿使還致敬於本郡縣因告之曰事訖臘日可與小男俱侍祠主簿事還翁仲問之對曰但見屠人弊衣蠡髻而踞神座持刀割肉有衣冠青墨綬數人彷徨堂東西不進不知何故翁仲問妻曰何以養此子嫗大怒曰君常言兒體質聲氣喜學似我公欲死為作狂語翁仲具告之祠祭如此不具服子母立截嫗泣涕言昔以年長無男不自安實以女易屠者之男裨錢一萬此子年已十八遣歸其家迎其女女嫁為賣餅者妻後適隴西李文思文思官至南陽太守抱朴子曰按九鼎記及青靈經言人物之死俱有鬼也馬鬼常以晦夜出行狀如炎火玄中記曰姑獲鳥夜飛晝藏蓋鬼神類衣毛為飛鳥脫毛為女人名為帝少女一名夜遊一名鉤星一名隱飛鳥無子喜取人子養為子人養小兒不可露其衣此鳥度即取兒也荊州為多昔豫章男子見田中有六七女人不知是鳥匍匐往先得其毛藏之往就諸鳥諸鳥各走就毛衣衣之飛去一鳥獨不得去男子以為婦生三女其女母後令問父知衣在積稻下得衣飛去後以衣迎三女三女得衣亦飛去神異經曰東北方有鬼星石室三百戶而共一門石榜題曰鬼門晝日不開至暮即有人語有火青色又曰南方有人長三二尺裸形而目在頂上走行如風名曰魃所見之國大旱赤地千里一名旱母一名狢遇者得之投溷中乃死旱災銷也又曰西方深山有人焉長尺餘袒身捕鰕蟹性不畏人止宿喜依其火以炙鰕蟹伺人不在而盜人鹽以食蟹, SBCK: ''}
