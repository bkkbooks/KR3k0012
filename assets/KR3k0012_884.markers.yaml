  - {type: variant, offset: 700, length: 1, content: 哀, SBCK: 曰㑹稽句章人東野還暮不及門見路傍小屋燃火投􅀫止有一少女不欲與丈夫共􅀫呼隣人家女自伴夜共彈箜篌戯歌曰連綿葛}
  - {type: punctuation, offset: 702, content: 》, id: KR3k0012_CHANT_884-bkkpn244}
  - {type: variant, offset: 702, length: 0, content: '', SBCK: 藤一緩復一組汝欲知我姓姓陳名阿登明至東郭外有賣食母在肆中此人􅀉坐因􅀃昨夜所見母聞阿登驚}
