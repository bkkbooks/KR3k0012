  - {type: variant, offset: 3438, length: 5, content: 魅耳所在山, krp: 長數丈腰大數十圍髙冠玄衣郡將吉凶跂于雷門示憂喜之色謝氏一族憂喜必告弘道未遭母難數月鬼晨夕來臨及後轉吏部尚書拊掌三節舞自大門至}
