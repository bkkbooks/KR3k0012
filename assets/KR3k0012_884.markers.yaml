  - {type: 'tls:seg', offset: 683, content: '', id: KR3k0012_CHANT_884-9a.27}
  - {type: variant, offset: 683, length: 0, content: '', SBCK: 充悉以狀對別後四年三月充臨水戯忽見傍有犢車乍沉乍浮旣而上岸四坐皆見而充往問其車後户見崔氏女與三歳男共載女抱兒以還充又與金盌忽然不見充後乗車入市賣盌兾有識者有一婢識此還白大家曰市中見一人乗車賣崔氏女郎棺中金盌大家即崔氏親姨母也遣兒視之果如婢言乃語充曰昔我姨姉少府女未出而亡家親痛之贈一金盌着棺中可􅀃得盌本末充以事對此兒亦爲悲咽賫還白母母即令詣充家迎兒還諸親悉集兒有崔氏之狀又復似充之貌兒盌俱驗姨母曰我外生也即字温休温休者是幽㛰也遂成令器歷郡守其後植}
  - {type: page-break, offset: 683, content: '', id: KR3k0012_SBCK_884-4b}
  - {type: variant, offset: 684, length: 1, content: 產, SBCK: 毓有名天下又}
  - {type: punctuation, offset: 686, content: ：, id: KR3k0012_CHANT_884-bkkpn236}
  - {type: 'tls:seg', offset: 686, content: '', id: KR3k0012_CHANT_884-9a.28}
  - {type: punctuation, offset: 686, content: 『, id: KR3k0012_CHANT_884-bkkpn237}
  - {type: variant, offset: 686, length: 1, content: 鬼, SBCK: 麋笁嘗從路歸未至家數十里見路次有新婦從麋求􅀉載行一十餘里新婦謝去謂笁曰我天使也令往燒東海麋笁家感君載故以相語笁請之曰不得不燒君快去我緩行日中必發火笁乃急行至家使出其財物明日日中果火大發又曰臨川間諸山有妖物來常因大風雨有聲如嘯能射人有頃便腫大毒有雌雄雄急而雌緩急者不過半日間緩者經􅀫其方人常有以求之求之小晩則死俗名曰刀勞􅀑又曰永昌郡不韋縣有禁水水有毒氣唯十一月十二月可渡渉自正月至十月不可渡渡輙病殺人其氣有惡物不見其形作聲如}
  - {type: page-break, offset: 686, content: '', id: KR3k0012_SBCK_884-5a}
  - {type: variant, offset: 689, length: 1, content: 歸, SBCK: 􅄬擊中木則折中人則害人俗名􅀑彈文士傳曰左思􅀄作蜀都賦曰􅀑彈飛丸以䃒礰後又改易無此語又南中八部志曰永昌郡有禁水水有惡毒氣中物則有聲中樹木則折名􅀑彈中人則奄然青爛又曰下邳周式嘗至東海道逢一使持一卷書求􅀉載行十餘里謂式曰吾蹔有所過留書􅀉舡中愼勿發之去後式盗發視書皆諸死人録下條有式名湏􅁷使還式首道視書吏怒曰故以相告而勿視之式叩頭流血吏良乆曰感卿逺相載此書不可除卿今日巳去還家三年勿出門可度也勿道見吾書式還不出巳二年餘家皆恠之鄰人卒父怒使吊之式不得巳適出門便見此吏吏曰吾令汝三年勿出今而奈何吾求汝不見連相爲得鞭杖今巳見汝無可奈何三日中當相取也式還涕泣具道如此父故不信母晝夜與相守涕泣至三日日中時即死續搜神記曰淮南胡茂回能見鬼雖不喜見而不可止後行至楊州還歷陽城東有神祠中正值民將至祝祀之湏􅁷群􅀑叱曰上官來迸走出祠去囬頋見二沙門來入祠中諸􅀑兩兩三三相抱持在祠邊草中望沙門皆怖懼湏􅁷沙門去􅀑皆還祠中囬於是遂少奉佛又曰王伯陽家在京口家東有大冢傳是魯肅墓伯陽婦䘮}
  - {type: page-break, offset: 689, content: '', id: KR3k0012_SBCK_884-5b}
  - {type: page-break, offset: 689, content: '', id: KR3k0012_SBCK_884-6a}
  - {type: variant, offset: 689, length: 1, content: 歸, WYG: 終人物短脆豈能無窮如此數千語皆成文章兒}
