  - {type: variant, offset: 706, length: 11, content: 或夢眾君子立干社宮而謀, WYG: 死皆無知大人聰明殊特獨有神靈耶答曰存}
  - {type: variant, offset: 710, length: 17, content: 子立干社宮而謀亡曹曹叔鐸請待公孫疆, SBCK: 門生酸苦求之􅀑問有似君者不門生云施續下都督與僕相似􅀑}
