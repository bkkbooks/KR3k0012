  - {type: variant, offset: 965, length: 1, content: 鬼, krp: 而充往問其車後户見崔氏女與三歳男共載女抱兒以還充又與金盌忽然不見充後乗車入市賣盌兾有識者有一婢識此還白大家曰市中見一人乗車賣崔氏女郎棺中金盌大家即崔氏親姨母也遣兒視之果如婢言乃語充曰昔我姨姉少府女未出而亡家親痛之贈一金盌着棺中可說得盌本末充以事對此兒亦爲悲咽賫還白母母即令詣充家迎兒還諸親悉集兒有崔氏之狀又復似充之貌兒盌俱驗姨母曰我外生也即字温休温休者是幽㛰也遂成令器歷郡守其後植子毓有名天下又曰麋笁嘗從路歸未至家}
  - {type: punctuation, offset: 966, content: ，, id: KR3k0012_CHANT_884-bkkpn331}
  - {type: 'tls:seg', offset: 966, content: '', id: KR3k0012_CHANT_884-14a.9}
  - {type: variant, offset: 966, length: 0, content: '', WYG: 又曰永昌郡不韋縣有禁水水有毒氣唯十一月十二月可渡渉自正月至十月不可渡渡輙病殺人其氣有惡物不見其形作聲如有所投擊中木則折中人則害俗人名鬼弹文士𫝊曰左思初作蜀都賦曰鬼弹飛丸以䃒礰後又改易無此語又南中八部志曰永昌郡有禁水水有惡毒氣中物則有聲中樹木則折名鬼彈中人則奄然青爛又曰下邳周式嘗至東海道逄一吏持一卷書求式寄載行十餘里謂式曰吾蹔有所過留書寄船中慎勿發之去後式盗發視書皆諸死人録下條有式名須臾吏還式猶視書吏怒曰故以相告而勿視之式叩頭流血吏良久曰感卿逺相載此書不可除卿今日已去還家三年勿出門可度也勿道見吾書式還不出已二年餘家人皆怪之鄰人卒父怒使弔之式不得已適出門便見此吏吏曰吾令汝三年勿出今復奈何吾求汝不見連年為得鞭杖今已見汝無可奈何三日中當相取也式還涕泣具道如此父故不信母晝夜與相守涕泣至三日日中時即死續捜神記曰淮南胡茂回能見鬼雖不喜見而不可止後行至揚州還歴陽城東有神祠中正值民將巫祝祀之須臾羣鬼叱曰上官來各走出祠去回顧見二沙門來入祠中諸鬼兩兩三三相抱持在祠邊草中望沙門皆怖懼須臾沙門去鬼皆還祠中回於是遂奉佛又曰王伯陽家在京口家東有大冢𫝊是魯肅墓伯陽婦䘮乃平其墳以葬後}
