  - {type: variant, offset: 1157, length: 2, content: 劉根, SBCK: 木客頭靣語聲亦不全異人但手脚爪如鈎利髙巖絶峯然後居之能斫榜牽著樹上聚之昔有人欲就其買榜先置物樹下隨量多少取之􅀂合其意便將去亦不横犯也但終不與人靣對交語作市井死皆知殯歛之不令人見其形也葬棺法毎在髙岸樹杪或藏石窠中南康三營代舡兵往􅀃親覩葬所舞倡之節雖異於丗聽如風林汎響聲頻歌吹之和義熈中徐道覆南出遣人伐榜以裝舟艦木客乃獻其榜而不得見􅄒異記曰南康}
