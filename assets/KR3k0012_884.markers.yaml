  - {type: variant, offset: 962, length: 1, content: 祠, WYG: 見之於是與相見言語悲喜恩情如生時良久乃聞鼓聲遂别而去捜神記曰漢九江何敞為交趾刺史行部到蒼梧暮宿鵠奔亭夜未半有一女子從樓下呼曰妾本居廣信縣脩里人早失父母無兄弟嫁與同縣施氏薄命夫死有雜繒百二十疋及婢致富一人妾孤窮羸弱不能自振欲之傍縣賣繒從同縣男子王伯賃牛車一乗載繒妾乗車致富執轡乃以前年四月到亭外時日暮行人㫁絶不敢復進因止致富暴得腹痛妾之亭長舍乞漿取火而亭長龔夀操刀㦸來至車傍問妾曰夫人從何所來車上所載何物丈夫何在何故獨行妾應曰何勞問之夀持妾臂曰少年愛有色冀可樂也妾懼怖不應壽即持刀刺脅下一瘡立死又刺致富亦死壽掘樓下合埋妾在下婢在上取財物而去殺牛燒車車釭及牛骨貯在亭井中妾既寃死痛感皇天無所告訴故來自歸於明使君敞曰今欲發出汝屍以何為驗女子曰妾上下着白衣青絲屨皆未朽也妾姓蘇名娥願訪鄉里以散骨歸死夫敞乃馳還令吏捕捉考問具服問廣信縣與娥語合壽父母兄弟捕繋獄敞表壽常律殺人不至族然壽為惡隐宻經年王法自所不免令鬼神訴者千載無一請皆斬之以明鬼神以助陰教又曰盧充范陽人家西三十里有崔少府墓充年二十先冬至一日出宅西獵戯見麞便射中之麞倒復起充逐之不覺逺忽見道北一里許髙門瓦屋四周不復見麞門中鈴下唱客前有一人投一襆新衣曰府君以此遺郎充便着訖進見少府謂充曰尊府君不以僕門鄙近得書為君索小女為婚故相迎耳便以書示充父亡時充雖小然已識父手跡便歔欷無復辭便𠡠内盧郎已來即可使女郎莊嚴至黃昏内白女郎嚴竟崔語充君可至東廊女下車立席頭共拜時為三日給食三日畢崔謂充曰君可歸去女若生男當以相還生女當留自養勅外嚴車送客充便辭出至家母見問其故充悉以狀對别後四年三月充臨水戯忽見傍有犢車乍沉乍浮既而上岸同坐}
