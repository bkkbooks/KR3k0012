  - {type: variant, offset: 3566, length: 380, content: 鬼鬼道理妄興人禍荼與鬱壘縛以蘆索執以食虎幽明錄曰阮瞻常著無鬼論而一鬼通姓名作客詣之寒溫畢聊談名理客甚有才辨與言良久及鬼神事乃作色曰鬼神古今聖賢所共傳君何獨言無即僕便是鬼於是變為異形須臾便滅阮嘿然大惡之年餘卒又曰王輔嗣注易輒笑鄭玄為儒云老奴無意于時夜分忽聞外閤有著屐聲須臾進白于鄭玄責之曰君年少何以輒穿鑿文句而妄譏詆老子也極有忿色言竟便退輔嗣心生畏惡經少時遇厲病而卒又曰阮德如嘗於廁見一鬼長丈餘色黑而眼大著皂單衣平上幘去之咫尺德如心安定徐笑語之曰人言鬼可憎果然鬼即赧愧而退又曰晉世王彪之年少未官常獨坐齋前有竹忽聞有歎聲彪之惕然怪似其母因往看之見母衣服如昔彪之跪拜歔欷母曰汝方有奇厄自今已去當見一白狗若能東行出千里三年然後可得免災忽不復見彪之悲悵達旦既明獨見一白狗恒隨行止便經營行裝將往會稽及出千里外三年乃歸齋中復聞前聲往見母如先謂曰能用吾言故來慶汝汝自今已後年踰, SBCK: ''}
