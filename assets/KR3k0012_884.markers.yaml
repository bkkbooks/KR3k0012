  - {type: variant, offset: 242, length: 0, content: '', SBCK: 賃車牛一乗載繒妾乗車致冨執轡乃以前年四月到亭外時日暮行人斷絶不敢復進因止致冨􅁀得腹痛妾之亭長舎乞漿火而亭長龔壽操刀㦸來至車傍問妾}
