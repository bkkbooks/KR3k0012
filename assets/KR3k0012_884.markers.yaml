  - {type: variant, offset: 3405, length: 1, content: 㺑, SBCK: 都形如人長二尺餘黒色赤目髪黄􅀍之於深山樹中作窠窠形如堅鳥􅆑髙三尺許内甚澤五色鮮明二枚沓之中央相連士人云上者雄舎下者雌室旁悉開口如規體質虚輕頗似木筒中央以鳥毛爲褥此神能變化隱身罕覩}
  - {type: variant, offset: 3405, length: 694, content: 㺑其音自呌人常以竹著火中焷音朴音卑而山㺑皆驚犯之令人寒熱此雖人亦鬼魅耳所在山中皆有之齊諧記曰廣陵王瓊之為信安令在縣忽有一鬼自稱姓蔡名伯喈或復談議誦詩書知古今靡所不諳問是昔蔡邕不荅云非也與之同姓字耳問此伯喈今何在云在天上或下作仙人飛來去受福甚快非復疇昔也論衡曰上古之人有神荼鬱壘者昆弟二人生而執鬼居東海度朔山上亡桃樹下簡閱百鬼鬼道理妄興人禍荼與鬱壘縛以蘆索執以食虎幽明錄曰阮瞻常著無鬼論而一鬼通姓名作客詣之寒溫畢聊談名理客甚有才辨與言良久及鬼神事乃作色曰鬼神古今聖賢所共傳君何獨言無即僕便是鬼於是變為異形須臾便滅阮嘿然大惡之年餘卒又曰王輔嗣注易輒笑鄭玄為儒云老奴無意于時夜分忽聞外閤有著屐聲須臾進白于鄭玄責之曰君年少何以輒穿鑿文句而妄譏詆老子也極有忿色言竟便退輔嗣心生畏惡經少時遇厲病而卒又曰阮德如嘗於廁見一鬼長丈餘色黑而眼大著皂單衣平上幘去之咫尺德如心安定徐笑語之曰人言鬼可憎果然鬼即赧愧而退又曰晉世王彪之年少未官常獨坐齋前有竹忽聞有歎聲彪之惕然怪似其母因往看之見母衣服如昔彪之跪拜歔欷母曰汝方有奇厄自今已去當見一白狗若能東行出千里三年然後可得免災忽不復見彪之悲悵達旦既明獨見一白狗恒隨行止便經營行裝將往會稽及出千里外三年乃歸齋中復聞前聲往見母如先謂曰能用吾言故來慶汝汝自今已後年踰八十位班台司後皆如母言又曰殷仲宗以隆安初入蜀為毛璩參軍至涪陵郡暮宿在亭屋中忽有一鬼體上皆毛於窗櫺中執仲宗臂牽仲宗大呼左右來救之鬼乃去又曰河南楊起字聖卿少時病虐逃於社中得素書一卷譴劾百鬼法所劾輒效為日南太守母至則上見鬼頭長數尺以告聖卿曰此肅霜之神劾之出來變形如奴送書京師朝發暮反作使當千人之力又曰東昌縣山有物, WYG: 都}
