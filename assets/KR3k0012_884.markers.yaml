  - {type: variant, offset: 1033, length: 1, content: 侯, krp: 財物明日日中果火大發又曰臨川間諸山有妖物來常因大風雨有聲如嘯能射人有頃便腫大毒有雌雄雄急而雌緩急者不過半日間緩者經宿其方人常有以求之求之小晩則死俗名曰刀勞鬼又曰永昌郡不韋縣有禁水水有毒氣唯十一月十二月可渡渉自正月至十月不可渡渡輙病殺人其氣有惡物不見其形作聲如有所投擊中木則折中人則害人俗名鬼彈文士傳曰左思𥘉作蜀都賦曰鬼彈飛丸以䃒礰後又改易無此語又南中八部志曰永昌郡有禁水水有惡毒氣中物則有聲中樹木則折名鬼彈中人則奄然青爛又曰下邳周式嘗至東海道逢一使持一卷書求寄載行十餘里謂式曰吾蹔有所過留書寄舡中愼勿發之去後式盗發視書皆諸死人録下條有式名湏臾使還式首道視書吏怒曰故以相告而勿視之式叩頭流血吏良乆曰感卿逺相載此書不可除卿今日巳去還家三年勿出門可度也勿道見吾書式還不出巳二年餘家皆恠之鄰人卒父怒使吊之式不得巳適出門便見此吏吏曰吾令汝三年勿出今而奈何吾求汝不見連相爲得鞭杖今巳見汝無可奈何三日中當相取也式還涕泣具道如此父故不信母晝夜}
