  - {type: variant, offset: 965, length: 0, content: '', WYG: 充往開其車後户見崔氏女與三嵗男共戯女抱兒以還充又與金盌忽然不見充後乗車入市賣盌冀有識者有一婢識此還白大家曰市中見一人乗車賣崔氏女郎棺中金盌大家即崔氏親姨母也遣兒視之果如婢言乃語充曰昔我姨嫁少府生女未出而亡家親痛之贈一金盌著棺中可説得盌本末充以事對此兒亦為悲咽賫還白母母即令詣充迎兒還諸親悉集兒有崔氏之狀又復似充之貎兒盌俱驗姨母曰我外甥也即字温休温休者葢幽婚也遂成令器歴郡守其後植子毓有名又曰臨川間諸山有妖物來常因大風雨有聲如嘯能射人其所著者有頃便腫大毒有雌雄雄急而雌緩急者不過半日間緩者經宿其旁人常有以救之救之少遲則死俗名曰刀勞}
  - {type: page-break, offset: 965, content: '', id: KR3k0012_WYG_884-7a, image: WYG0900/WYG0900-0707a.png}
