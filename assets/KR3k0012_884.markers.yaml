  - {type: variant, offset: 691, length: 0, content: '', SBCK: 平其墳以葬後數年伯陽白日在㕔事見一貴人乗平肩輿將從數百人往來坐謂伯陽曰身是魯子敬安冢在此二百許年君何敢遽毀壞身冢因目左右何}
  - {type: variant, offset: 691, length: 11, content: 不為厲吾為之歸也又哀上, WYG: 問}
  - {type: variant, offset: 692, length: 4, content: 為厲吾為, SBCK: 舉手左右牽伯陽下牀以刀環築}
