  - {type: variant, offset: 192, length: 0, content: '', WYG: 覺重便是神來奠設酒果亦覺貌輝輝有色即跳躁不已能占衆事卜未來蚕桑又善射鈎好則大舞惡即仰眠平昌孟氏恒不信躬試往投便自躍穿屋}
  - {type: variant, offset: 193, length: 0, content: '', WYG: 去永失所在也世説曰㑹稽賀思令善弹琴嘗夜在月中坐臨風鳴彈忽有一人形器甚偉著械有􅆭色在中庭稱善便與共語自云是嵇中散謂賀云卿手下極快但於古法未備因授以廣陵散賀遂𫝊之于今不絶又曰阮脩字宣子論鬼神有無或以人死有鬼宣子獨以為無曰今}
