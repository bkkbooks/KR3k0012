  - {type: variant, offset: 1035, length: 1, content: 灌, krp: 相守涕泣至三日日中時即死續搜神記曰淮南胡茂回能見鬼雖不喜見而不可止後行至楊州還歷陽城東有神祠中正值民將至祝祀之湏臾群鬼叱曰上官來迸走出祠去囬頋見二沙門來入祠中諸鬼兩兩三三相抱持在祠邊草中望沙門皆怖懼湏臾沙門去鬼皆還祠中囬於是遂少奉佛又曰王伯陽家在京口家東有大冢傳是魯肅墓伯陽婦䘮乃平其墳以葬後數年伯陽白日在㕔事見一貴人乗平肩輿將從數百人往來坐謂伯陽曰身是魯子敬安冢在此二百許年君何敢遽毀壞身冢因目左右何不舉手左右牽伯陽下牀以刀環築之數伯而去伯陽良乆乃蘇其處皆發疽疽潰尋死又曰㑹稽句章人東野還暮不及門見路傍小屋燃火投宿止有一少女不欲與丈}
