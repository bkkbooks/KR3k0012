  - {type: variant, offset: 194, length: 0, content: '', WYG: 鬼者云着生時衣服若人死有鬼衣服亦有鬼耶論者服焉列異𫝊曰南陽宋定伯年少時夜行逢鬼問曰誰鬼曰鬼也鬼曰卿復誰定伯欺之言}
  - {type: variant, offset: 195, length: 2, content: 焉許, WYG: 亦鬼也欲至宛市鬼言我亦欲至宛市共行數里鬼言道逺歩行遲可迭相擔也定伯乃大喜鬼便先擔定伯數里鬼言卿大重定伯言我新死故重耳定伯因復擔鬼鬼畧無重如是再三定伯復言我新死不知鬼悉何所畏忌鬼答曰唯不喜人唾於是共行道遇水定伯命鬼先渡聽}
