  - {type: variant, offset: 967, length: 0, content: '', WYG: 年伯陽白日在聽事見一貴人乗平肩輿將從數百人徑來坐謂伯陽曰吾是魯子敬安冢在此二百許年君何致毁壊吾冢因目左右何不舉手左右牽伯陽下牀以刀環擊之數百而去登時絶死良久乃蘇其斫處皆發疽潰尋死又曰㑹稽句章人東野還暮不及至家見路旁小屋燃火投宿止}
