  - {type: variant, offset: 1622, length: 209, content: 也今拜乎上泰也雖違眾吾從下臣祭於君酬酢授爵當拜於堂下時臣驕泰故拜於堂上又鄉黨曰康子饋藥拜而受之曰丘未達不敢嘗饋進也拜受敬也未知其故故不敢嘗禮也家語曰子貢曰孔子為大司寇國廄焚有違火來者則拜士一大夫再曰其來者亦相弔之道吾為有司故拜之爾雅曰啟跪也郭璞注曰小跪也方言曰東齊青岱北燕之郊跪謂長鶩郭璞注曰今東郡人亦呼長跪為長鶩釋名曰跪危也兩膝隱地體危倪他跽忌也見所敬者不敢自安也拜於丈夫為趺跌然屈折下就地也於婦人為扶自相扶而上下也, SBCK: ''}
