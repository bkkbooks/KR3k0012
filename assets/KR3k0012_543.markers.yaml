  - {type: variant, offset: 262, length: 0, content: '', SBCK: 朝者孤卿特揖大夫以其等旅揖士旁三揖王還揖門左揖門右特揖一一楫之旅衆也大夫爵同者衆揖之公及􅀌卿大夫始入門右皆北靣東上王揖之乃就位三揖者士有上中下王揖之皆逡巡趍復位又秋官曰司儀掌九儀之賔客擯相之禮以詔儀容辭令揖讓之節出接賔曰擯入賛禮曰相以詔者以禮告王又秋官曰司議詔王儀南郷見諸侯土揖庻姓時揖異姓天揖同姓謂王旣祀方明諸侯上介皆奉其君之旂置于宫乃詔王升壇諸侯皆就其旂而立王揖之者定其位也庻姓無親}
