  - {type: variant, offset: 177, length: 83, content: 祝曰大祝辨九拜一曰稽首二曰頓首三曰空首四曰振動五曰吉拜六曰凶拜七曰奇拜八曰褒拜九曰肅拜以享右祭祀嵇首拜頭至地也頓首頭叩地空首拜頭至手所謂拜手也古拜拜而後稽顙謂齊衰不杖, SBCK: 夫}
