  - {type: variant, offset: 1404, length: 217, content: 弔衛人使太叔儀對曰群臣不佞得罪于寡君寡君不以即刑而悼棄之君不忘先君之好辱弔群臣敢拜君命之辱重拜大貺又昭四曰初楚恭王無冢適有寵子五人無適立焉乃大有事于群望而祈曰隨神擇於五人者使王社稷乃徧以璧見於群望曰當璧而拜者神所立也誰敢違之既乃與巴姬密埋璧於大室之庭巴姬恭王妾太室祖廟使五人齊而長幼入拜順長幼以次拜也康王跨之靈王肘加焉子于子哲皆遠之平王弱抱而入再拜皆厭紐孝經右契曰制作孝經道備使七十人弟子向北辰星而聲折孔子絳單衣向星而拜論語子罕曰拜下, SBCK: 知}
