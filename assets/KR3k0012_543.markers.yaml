  - {type: variant, offset: 2680, length: 442, content: 我乃松父友雖貴奈何失禮典略曰太子嘗請文學酒酣坐忻命夫人甄氏出拜坐眾人皆伏而劉楨獨平視太祖聞之收楨減死胡沖吳曆曰孫策繫豫章先遣虞翻說華歆歆葛巾迎策策謂歆府君德望遠近所歸策年幼稚宜脩子弟之禮便向歆拜魏志曰魯國孔融高才倨傲年在紀群之間先與紀友後與群交更為紀拜由是顯名魏志曰常林年七歲有父黨造門問林曰伯先在不汝何不拜對曰對子字父何拜之有又曰晉宣王以常林鄉邑耆德每為拜或謂林曰司馬公貴重君宜止之林曰司馬公自欲敦長幼之序為後生法貴非吾之所畏也拜非吾之所制也言者踧踖而退蜀志曰先主為漢中王許靖為太博丞相諸葛亮皆為之拜又曰伊籍隨元主入益州東使吳孫權聞其才辨欲逆折以辭籍適入拜權曰勞事無道之君籍即對曰一拜一起未足為勞吳志曰朱冶領吳郡舉孫權為孝廉後權歷位上將及為吳王冶每見權常親迎執板交拜又曰人誣樓玄謗訕政事華覈上䟽乞玄自新孫皓疾玄名聲復徙玄及子男據付交趾將張並使以戰自効陰別勑並令殺之據到交趾病死一身隨並討賊持刀見並輒拜並未忍殺會並暴疾卒玄殯歛並於器中見勑書還便自殺耳王隱晉書曰何曾為司徒與高鄭二公將見, SBCK: 􅀳}
