  body:
  - {type: variant, offset: 5, length: 166, content: 一拜說文曰拜首至地也尚書舜典曰帝曰俞咨垂汝作共工垂拜稽首讓于殳斨帝曰俞咨益汝作朕虞益拜稽首讓于朱虎熊羆帝曰俞咨伯汝作秩宗伯拜稽首讓于夔龍又大禹謨曰帝曰禹官占惟先蔽志昆命于元龜朕志先定詢謀僉同鬼神其依龜筮叶從卜不習吉禹拜稽首固辭又大禹謨曰益贊于禹曰惟德動天無遠弗屆滿招損謙受益時乃天道禹拜昌言曰俞班師振旅又益稷曰皋陶拜手稽首颺言曰念哉, SBCK: 二揖鐟賀揖}
