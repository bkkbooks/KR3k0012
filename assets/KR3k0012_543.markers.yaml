  - {type: variant, offset: 497, length: 708, content: 君言至則主人出拜君言之辱使者歸則必拜送于門外又曲禮曰介者不拜為其拜而莝拜莝則失容節莝猶詐也又曲禮下曰士有獻於國君問之曰安取彼再拜稽首而後對又檀弓上曰孔子曰拜而後稽顙頹乎其順也稽顙而後拜頎乎其至也頹頎懇至也此俱喪拜時人行之異禮又內則曰凡拜男尚右手女拜尚左手鄭玄注曰左陽右陰左傳僖公曰王使宰孔賜齊侯胙胙祭肉尊之此二王後曰天子有事于文武使孔賜伯舅胙天子謂異姓諸侯曰伯舅齊侯將下拜孔曰且有後命天子使孔曰以伯舅耋老加勞賜一級無下拜七十曰日耋級等也對曰天威不違顏咫尺言天監察不遠威嚴常在顏面之前八寸曰咫小白余敢貪天子之命無下拜小百齊侯名余身也恐隕越于下隕越顛墜也揚天王居上故言恐顛墜于下以遺天子羞敢不下拜下拜登受又僖中曰公賦河水公賦六月趙衰曰重耳拜賜公子降拜稽首公降一級而辭焉衰曰君稱所以佐天子者命重耳重耳敢不拜又文上曰公如晉及晉侯盟晉侯饗公賦菁菁者我菁菁者莪詩小雅取其既見君子樂且有儀莊叔以公降拜曰小國受命於大國敢不慎儀君貺之以大禮何樂如之抑小國之樂大國之惠也侯降辭登成拜公賦嘉樂嘉樂詩大雅取顯顯令德宜民宜人受祿於天又成公九年曰季文子如宋致女復命公享之賦韓弈之五章韓弈詩大雅篇名其五章言蹶父嫁女於韓後為女相所居莫如韓樂文子喻魯侯有蹶父之德宋公如韓侯宋土如韓樂穆姜出于房再拜曰大夫勤辱不忘先君以及嗣君施及未亡人穆姜伯姬母聞文子言宋樂喜而出謝其行勞婦人夫死自稱未亡人先君猶有望也言先君亦望文子之若此敢拜大夫之重勤又賦綠衣之卒章而入綠衣詩邶風也取其我思古人實獲我心喻文子言得己意又襄元曰穆叔如晉報智武子之聘也晉侯享之金奏肆夏之三不拜肆夏樂曲名工歌文王之三又不拜歌鹿鳴之三三拜韓獻子使行人子問之對曰三夏天子所以享元侯也使臣弗敢與聞文王, WYG: ''}
