  - {type: variant, offset: 3272, length: 1, content: 矣, krp: 也後魏書曰宗愛之任勢也威振四海甞召百司於都㘴王公巳下望庭畢拜髙允獨昇階由此觀之汲長孺可卧見衛青何杭禮之有向之所謂風節者得不謂此乎宋書禮志曰漢丗朝臣見三公並拜丞郎見八座皆持板揖事在漢儀南史曰袁憲陳武帝作相除司徒户曹𥘉謁遂抗禮長揖中書令王勵謂憲曰卿何矯衆不拜録公憲曰於理不應致拜衛尉趙知禮曰袁生舉止詳中故有陳汝之風白虎通曰朝禮奈何君出居内門之外天子揖諸侯持揖卿大夫膝下至地天子特揖三公靣揖卿略揖大夫士所以不拜何爲其屈尊者說文曰揖讓也一曰手着胷曰揖風土記曰越俗定交有禮皆於大樹下封壇祭以白犬呪曰卿雖乗車我載笠後日相逢下車揖文士傳曰趙壹郡舉計吏至京輦是時袁陽爲司徒宿間其名時延請之壹入閣揖而不拜陽問曰甞聞下郡討吏見漢三公不爲禮者乎壹曰昔酈食其髙陽白衣也而揖髙祖今壹關西男子其揖漢三公不亦可乎陽壯其言接之甚厚列子曰范氏門徒路遇乞兒馬醫弗敢辱也必下車而揖之尹文子曰越王勾踐謀報呉欲人之勇路逢怒鼃下車而揖之袁淮正論曰太祖破吕布袁渙在軍中陳羣父子見上拜唯袁渙獨髙揖不爲禮上嚴敬之鐟音簮摯虞決略録要注曰小㑹殿就席皆鐟頭而後坐鐟頭伏地也欲起亦先鐟頭賀周禮春官上宗伯曰以賀慶之禮親異姓之國鄭玄注曰異姓王婚姻甥舅也禮記玉藻曰有慶非君賜不賀鄭玄注曰唯君賜爲榮左傳僖下曰楚子將圍宋使子文治兵於暌終朝而畢不戮一人子王復治兵於蔿終日而畢鞭七人貫三人耳國老皆賀子文子文飲之酒蔿賈尚㓜後至不賀子文問之對曰不知所賀子之傳政於子玉曰以靖國也靖諸内而敗諸外所獲㡬何子玉之敗子之舉也舉以敗國將何賀焉又昭三曰叔弓如晉賀虒祁也賀宫也游吉相鄭伯以如晉亦賀虒祁也史趙見子大叔曰甚哉其相蒙也蒙欺也可弔也而又賀之子大叔曰若何弔也其非唯我賀將天下實賀言諸侯長晉非獨鄭國語曰晉簡子問於杜馳兹曰東方之士孰爲愈杜馳兹東方人爲晉大夫者蓋呉人也愈賢也杜馳兹拜曰敢賀簡子曰未應吾問何賀乎對曰臣聞之國家之將興也其君自以爲不足其亡也若有餘今主晉國之政而問及小人求乎賢人吾是以賀史記曰單父人吕公善沛令避讎從之客因家沛中豪傑吏令聞有客皆徃賀蕭何爲主吏令諸吏曰不滿千錢坐堂下髙祖爲亭長素易諸吏乃徃爲謁曰賀錢千萬實不挂一錢漢書曰田肯賀上曰甚善陛下得韓信又治秦中如淳曰時山東人謂關中爲秦中秦形勝之國也帶河阻山懸隔千里持㦸百萬秦得百二焉地勢便利其次以下兵於諸侯譬猶髙屋之上建瓴水也夫齊東有瑯瑘即墨之饒南有太山之固西有濁河之限北有渤海之利地方二千里持㦸百萬懸隔千里之外齊得十二焉此東西秦也非親子弟莫可使王齊者也上曰善賜金五百斤又曰盧綰與髙祖同里綰親與髙祖親太上皇相愛及生男髙祖與綰同日生里中持羊酒賀兩家及髙祖盧綰壯俱學書又相愛也里中嘉兩家及家親相愛也生子同日壯又相愛復賀兩家羊酒後漢書曰光武謂馮異曰我昨夜夢乗赤龍上天覺悟心中動悸異因下席再拜賀曰此天命發於精神心中動悸大三愼重之性也異遂與諸將定議上尊號東觀漢記曰上傳聞朱鮪破河内有項寇恂檄至上大喜曰吾知寇子翼可任也諸將軍賀因上尊號謝承後漢書曰鄭弘爲臨淮郡兩鹿隨車主簿拜賀曰聞三公轓盡作鹿明府必爲宰相弘果爲太尉漢雜事白冬至陽氣起君道長故賀夏至隂氣生君道衰故不賀魏志曰王粲爲丞相掾太祖置酒漢濵粲奉觴賀曰明公定冀州之日下車即其甲卒収其豪傑而用之以横行天下及平江漢司其賢俊而置之列位使海内迴心望風願治文武並用英雄畢力北三玉之舉呉志曰顧雍迎母於呉旣至孫䇿臨賀之親拜其母於庭公卿大臣畢㑹後太子又徃慶焉王隱}
