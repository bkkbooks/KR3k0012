  - {type: variant, offset: 4269, length: 322, content: 代以來記籍禮經無拜臣之制唯漢成帝拜張禹庸主凡臣不足為軌先帝拜司徒導以元皇興自蕃國布衣之交拜在人臣之故師而不改以君拜臣大教有違事應改正太后又詔曰帝幼少宜一遵先帝壺等又固爭云臣期不奉詔又反覆乃從外奏成帝拜王公時議曹疑於儀注博士杜瑗及陳舒議禮無以君拜臣下也小會崇謙非臣下所知無在儀注之制張闈受侯不拜國太妃表云昔為晉陵內史在東海國封內時世孫幼小太妃秉政前內史遷授除拜日及當之官皆上疏拜閤執純臣之禮闓自以雖爵有五等然執珪受瑞俱為列國無相臣之體又晉制拜列侯為相內史於天朝不曰陪於蕃國不稱臣臣以從古則懼有行簡之譏隨俗又恐失君臣之訓經國垂範宜有定淮乞出臣表下八座參詳荅報唐書曰田承嗣方跋扈佷傲無禮郭子儀嘗遣使至魏州承嗣輒望拜之指其膝謂使者曰茲膝不屈於人今為公拜, SBCK: ''}
