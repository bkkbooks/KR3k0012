  - {type: variant, offset: 3880, length: 388, content: 人皆集東掖門見待中王猛來真等望馬首拜之明日更見真乃卿猛猛曰昨拜朝卿何恭慢之相違真荅曰卿昨為賊朝是國士吾冥拜賊而卿國士亦何所怪也猛嘉之韓子曰禮者所以貌情也中心懷而不諭故疾趍卑拜以明之燕丹子曰田先生見太子太子側階而迎迎而再拜賈誼書曰受計之禮主所親拜者二聞生民之數則拜之聞登穀則拜之郭子曰陶公自上流來陶侃字士衡也赴蘇峻之難含怒於庾公庾公謂必戮己進退無計溫父乃勸詣陶公卿但俓拜必無他我為卿保之庾殊未了而不得不往乃從溫言詣陶至便拜庾風姿雅潤陶見拜不覺自起止之曰庾元規何緣拜陶士衡江統作謁拜議曰以為諸郡吏都無太守伯叔兄敬者近臣君服斯服然則朝幹佐以下左右者可從君而拜君所拜統士古者見賓主皆拜今自非君臣上下則不拜君之新親者唯幹佐小吏則可君拜斯拜矣君之諸父無道謂之事甲辰儀臣見諸王直恭敬而已無鞭板拜揖雖於皇帝為諸祖諸父其義皆同又河南河內諸郡吏前後亦為太守伯叔兄謁拜者其比甚眾矣尚書逸令曰卞壺等奏, SBCK: 四十}
