  - {type: variant, offset: 807, length: 512, content: 徒杠音江成十二月輿梁成民未病涉也徒杠獨木小橋可通徒行輿梁通車之橋十一月夏九月十二月夏十月鶡冠子曰斗柄北指天下皆冬鄧析子曰為君自當若冬日之陽夏日之陰萬物自歸莫之使也恬臥而功自成優游而政自治豈在振目搤腕手操鞭朴而後為治歟管子曰冬作土功發地藏則夏多暴雨秋霖不止鄒子曰冬取槐檀之火尸子曰冬為信北方為冬冬終也北方伏方也是萬物冬皆伏貴賤若一美惡不伐信之至也傳子曰夏令披裘冬令披褐雖有嚴令終不肯從者逆時也韓子曰帝堯之王天下冬月鹿裘又曰管仲隰朋從桓公而伐孤竹春往冬返迷惑失道管仲曰老馬可用也乃放老馬而隨之遂得道行山中無水隰朋曰蟻冬居山之陽夏居山之陰蟻壤一寸而仞有水乃掘地遂得水荀卿子曰天不為人之惡寒而輟其冬淮南子曰以冬鑠膠以夏造冰天道無私就也無私去也能者有餘拙者不足言以非時鑠膠造冰難也成天道無私就無私去能行道者有餘不能者不足又曰貧人冬則羊裘蔽體短褐不掩形而煬灶口冬日之陽夏日之陰萬物歸之而莫使之然冬日仁物歸陽夏日猛物歸陰非使之然自如是之也又曰稷辟土墾草以為百姓力農然不能使禾冬生豈其人事不至哉其勢不可也又曰孟冬之月招搖指亥爨松燧火改火也又曰冬為權權者所以權萬物也又曰閶闔風四十五日不周風至四十五日廣莫風至坎卦之風不周風至則修宮室繕邊城立冬, WYG: ''}
