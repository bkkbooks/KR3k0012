  - {type: variant, offset: 3298, length: 207, content: 急景凋年涼沙振野箕風動天巖巖苦霧皎皎悲泉冰塞長河雪滿群山既而昏雰夜歇景物澄廓星翻漢迴曉月將落感寒雞之早晨憐霜鴈之違漠臨驚風之蕭條對流光之照灼傅玄詩曰季冬時慘烈猛寒不可勝嚴風截人耳素雪墜地凝林上飛霜起波中自生冰未夕結重衾崇朝不敢興鮑昭登峴山詩曰孟冬十月交殺盛陰欲終風冽無勁草寒甚有凋松軍井冰晝結士馬氈夜重晨登峴山首霜霧凝未通王褒歲暮詩曰歲晚悲窮律他鄉念索除寂寞灰心盡推殘生意餘產空交道絕財殫密戚踈空悲趙一賦還著虞卿書, SBCK: 情繫帷幄拜表奉賀并獻紋履七量襪􅀂}
