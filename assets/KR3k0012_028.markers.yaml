  - {type: variant, offset: 582, length: 250, content: 敗越人裂地而封能不龜手一也或以封或不免於洴澼絖則所用之異也按絖古纊字絮也洴澼浣溧斫絮於水中也洴扶經切澼普歷切太公金匱曰夏桀之時有芩山之水桀常以十月發民鑿山穿陵通於河民諫曰孟冬鑿山穿陵是泄天氣發地之藏天子失道後必有敗桀殺之朞年芩山崩為大澤湯率諸侯伐之丈子曰冬冰可折夏條可結又曰國有饑者食不重味民有寒者冬不被裘與民同苦樂即天下無哀民列子曰瓠巴學琴於師襄當冬而叩徵絃以激賓陽光熾烈堅冰立散孟子曰子產聽治國之政以其乘輿濟人於溱洧孟子曰子產惠而不知為政歲十一月徒杠音江成十二月輿梁成民未病涉也徒杠獨木小橋可通徒, krp: 辟}
