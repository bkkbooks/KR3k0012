  - {type: variant, offset: 2499, length: 0, content: '', SBCK: 冬至氣當易之是以王者閉門閭啇旅不行以其陽氣乗踊長君壽益長是以冬賀也亦以日之行天至於巽維東􅀯角極之於此故曰冬至顔師古匡謬正俗曰鄭氏箋云鵲之作巢冬至加功至春乃成此言始起冬至加功力爲巢盖直言耳而劉昌宗周讀等音加爲架名從以搆架爲義則不應云架功也黄帝針炙經云冬至日風從南來者名爲虚賊傷人也周角書曰􅀱赦法冬至後盡丁巳之日有風從巳上來滿三日以上必有}
