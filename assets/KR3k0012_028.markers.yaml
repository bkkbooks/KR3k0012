  - {type: variant, offset: 4, length: 0, content: '', SBCK: 三立冬冬至立冬禮記月令曰孟冬之月是月也以立冬先三日太史謁於天子曰某日立冬盛德在水天子乃齊立冬之日親率公卿大夫以迎冬於北郊還反賞死事恤􅀌寡左傳曰仲足問郯子曰丹鳥氏司閉者也以立秋來立冬去易􅀃曰乾西北也主立冬易通卦驗曰立冬不周風至水始冰薺麥生鷰雀入水爲蛤京房易占曰立冬乾王不周風用事人君當興邊兵治城郭行刑决罪三禮義宗曰十月立冬爲節者冬終也立冬之時萬物終成爲節名小雪爲中者氣叙轉寒􅀨變成雪故以小雪爲節後漢書續禮儀志曰立冬之日夜漏未盡五刻京都百官皆衣皂迎氣於北郊家語曰魚游於水鳥游於雲故立冬則鷰雀入於海化爲蛤符瑞圖曰八風循通八方之風應時而至也立冬北方廣莫風至一名寒風周書時訓曰立冬十月節水始冰水若不冰即隂之有􅀒地始凍地􅀂不凍即災咎之徴野雞化蜃􅀂不爲蜃即時多媱婦五行休王論云立冬乾王坎相艮胎震没巽死离囚坤廢兊休冬至周易曰先王以至日閉􅀜啇旅不行后不省方謂夏至日冬至日也尚書曰日短星􅄧以正仲冬孔安國注曰日短冬至日也􅄧白武星亦以七星並見以正冬之三節也禮記曰仲冬之月日短至隂陽爭諸生蕩爭者隂方盛陽欲起也君子齋戒處必掩身身欲寜去聲色禁􅄝慾安形性事欲静以待隂陽之所定周禮曰冬至日在牽牛景長一丈三尺夏至日在東井景長尺有五寸又曰薙氏去草冬日至而夷之秋繩而芟之冬日至而耜之􅀂欲其化也則以水火變之謂以火燒其所芟薙之草巳而水之則其土亦和美矣月令季夏乃燒薙行水利以殺草奴以熱湯是其一時著之又曰司徒職曰日至之景尺有五寸謂之地中天地之所合也四時之所交也風􅀨之所㑹也隂陽之所和也然則百物阜安乃建王國焉制其畿方千里而封樹也景尺有五寸者南載日下萬五千里地輿星辰四遊􅂛障於三萬里之中是以半之得地之中也畿方千里取象於日一寸爲正樹樹木溝上所以表助阻固也鄭司農云土圭之長尺有五寸以夏至之日立八尺之表其景適與土圭等謂之地中今頴川陽城地爲然春秋左傳曰僖五年春王正月辛亥朔日南至周正今十一月冬至之日日南極公旣視朔遂登觀臺以望而書禮也視朔親告朔也觀臺臺上攝屋可以逺觀者也朔旦冬至暦數之所始治暦者因之則可以明其術數審别隂陽叙事訓民魯君不能常脩此禮故善公之得禮凢分至啓閉必書雲物分春秋分也至冬夏至也啓立春立夏閉立秋立冬雲物氣色災變也傳重申周典不言公者曰官掌其職爲備故也素察妖祥逆爲之備易通卦驗曰冬至之日見雲送迎從下嚮來歳美人民和不疾疫無雲送迎德薄歳惡故其雲赤者旱黒者水白者爲兵黄者有土功諸從日氣送迎其徴也又曰冬至始人主致八能之士或調黄鍾或調六律或調五行或調律暦或調隂陽或調正德鄭􅀇注曰致八能之士者言選於人衆之中取習曉者使之調焉諧調和之也又曰冬至始人主與羣臣左右從樂五日天下之衆亦家家從樂五日以迎日至之禮鄭􅀇注曰從者就也冬至君臣俱就大司樂之宮臨其肆樂􅀕天圜丘之樂以爲􅀕事莫大於此又曰冬至成天文鄭􅀇注云天文謂之三光運照行天下冬至而數訖於是時也􅀕而成之所以報也又曰冬至之日立八神樹八尺表日中視其晷如度者則歳美人和順晷不如度者歳惡晷入則水晷退則旱進}
