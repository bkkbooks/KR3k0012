  - {type: variant, offset: 14, length: 1, content: 德, WYG: 先生者於是始耕髙誘註曰菖蒲水草也又冬至日行逺道周四極命之曰𤣥明天又仲冬命之曰陽月陽氣在上人民空閒無所事作故曰陽月太𤣥經曰冬至及夜半以後者近𤣥之象也進而未及往而未至虛而未滿故謂之近𤣥也𤣥以子午為晝夜分冬至夜半以前癸亥之日也𤣥道好謙夜半以後天變雖進未及雖往未至猶在中虛而未盈滿也是為近𤣥則休也釋文曰冬至斗指子夜半時加午者也又調律者度竹為管蘆莩為灰列之九閉之中漠然無動寂然無聲㣲風不起纎塵不形冬至夜半黄鍾以應白虎通曰冬至廣莫風至斷大辟行刑獄也又冬至前後君子安身靜體百官絶事不聽政擇吉辰而後省事又冬至陽始起反大}
