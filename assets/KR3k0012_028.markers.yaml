  - {type: variant, offset: 5, length: 0, content: '', SBCK: 寸則月食進尺則日食進謂長於度也京房易妖占曰}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_028-3b}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 寸則月食進尺則日食進謂長於度也漢書曰宦者淳于陵渠復覆太初厯晦朔弦望皆最密日月如合璧五星如連珠孟康曰謂太初上元甲子夜半朔旦}
  - {type: variant, offset: 5, length: 0, content: '', krp: 寸則月食進尺則日食進謂長於度也京房易妖占曰}
  - {type: variant, offset: 6, length: 0, content: '', SBCK: 至繕宫殿封倉庫易􅀃曰坎北方也主冬至尚書考靈曜曰冬至日則五星俱起牽牛日月􅀂懸壁五星􅀂編珠孝經説曰斗指子爲冬至至有三義一者隂極之至二者陽氣始至三者日行南至故謂爲至孝經援神契曰冬至陽氣動又曰冬至日在外衡三禮義宗曰十一月大雪爲節者刑於小雪爲大雪時雪轉甚故以大雪名節冬至中者亦有三義一者隂極之至二者陽氣始至三者日行南至故謂之冬至也又曰冬至日􅀕天於圎丘玉用其蒼璧牲同玉色樂用夾鍾爲宫樂作六變五經通義曰冬至寢兵鼓啇旅不行君不聽政事曰冬至陽氣萌隂陽交精始成萬物氣微在}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_SBCK_028-4a}
  - {type: variant, offset: 6, length: 2, content: 下呂, WYG: 至時七曜皆㑹聚斗牽牛分度夜盡如合璧連珠也師古曰言其應候不差也又冬至陽氣起君道長故賀夏至隂氣起君道消故不賀司馬彪續漢書曰天子常以冬夏至日御前殿合八能之士陳八音聴樂均度晷景候鍾律權土炭効隂陽也續漢書禮儀志曰冬至前後君子安身靜體百官絶事不聴政擇吉辰而後省事聴事之日百官皆衣絳後漢書曰傅賢字仲舒遷廷尉每冬至斷獄遲廽流涕魏志曰黄初元年冬至日黄雀集于文昌殿前後魏崔浩女儀曰近古婦人常以冬至日上履襪於舅姑踐長至之義也西域諸國志曰天竺國以十月二十六日為冬至冬至則麥秀管子曰以冬至之日始數四十六日冬盡春始教民鑚燧謹竈泄所以夀人也淮南子曰冬至之日北宮御女黑色衣黑采擊磬石水王北方故處北宮其器鎩其畜彘鎩者却内像隂閉彘水畜又陽氣為火隂氣為水水勝故夏至濕火勝故冬至燥燥故炭輕濕故炭重又曰冬至井水盛盆水溢鵲始巢八尺之臬日中而景三尺吕}
