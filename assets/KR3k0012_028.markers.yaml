  - {type: variant, offset: 3053, length: 368, content: 白之氣干之色白而有野戰並作獄訟軍旅同時而興霜雪不時小兵時起土地侵削四鄙入堡輦下歲時記曰此月戶部奏大閱天下貢物於都堂其日放朝宰相與百官皆赴戶部宴饌一時特盛開元中曾以大閱一日貢物賜李林甫九州任土盡歸人臣之家國史書其事也晉陸機感時賦曰悲夫冬之為氣亦何憯懔以蕭索天悠悠而彌高霧鬱鬱而漠漠夜綿邈其難終日晼晚而易落敷曾雲之萎蕤墜零露之揮霍寒冽冽而浸興風謖謖而屢作謖起也所六切陸雲歲暮賦曰淪重陽於潛戶徵積陰於司寒袁宏北征賦曰于時天高地涸木落水凝繁霜夜灑勁風晨興日曖曖其已頹月亭亭而虛昇鮑昭舞鶴賦曰窮陰殺節急景凋年涼沙振野箕風動天巖巖苦霧皎皎悲泉冰塞長河雪滿群山既而昏雰夜歇景物澄廓星翻漢迴曉月將落感寒雞之早晨憐霜鴈之違漠臨驚風之蕭條對流光之照灼傅玄詩曰季冬時慘烈猛寒不可勝嚴風截人耳素雪墜地凝林上飛霜起波中自生冰未夕結重衾崇朝不敢興鮑昭登峴山詩曰孟冬, WYG: 平御覽卷二}
