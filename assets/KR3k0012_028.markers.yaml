  - {type: variant, offset: 1551, length: 414, content: 令正之谷九澤北方之澤夏大也晦暝也有凍寒積冰雪雹霜霰漂潤群水之野顓頊玄冥之所司者萬二千里顓頊黃帝之孫也以水德王天下號為高陽氏死為北方水德之帝其神玄冥者金天氏有適子曰昧為玄冥師死祀為主水之神也月令曰申群禁固閉藏修障塞繕關梁禁外徙斷罰刑守門閭大搜客止交遊禁夜樂早閉開以索姦人已得報之必固天節已幾刑殺無赦雖有盛尊之親斷以法度毋發藏毋釋罪應陰殺也又曰十月失政四月草木不實實長也語林曰羊稚舒冬日釀酒令人抱甕須臾復易人速成而味好說苑曰衛靈公天寒鑿池宛春諫曰天寒起役恐怠民也公曰寒乎春曰公衣狐裘坐熊席是以不寒民寒甚矣公乃罷役世說曰石崇為客冬天設萍虀王愷乃密賄崇帳下都督及御車人問所以對曰萍虀是搗韭根雜以麥苗耳殷芸小說曰晉孝武帝即位時年十三四冬天晝日不著複衣但著單絹裙衫五六重夜則累茵褥謝公云體宜令有常陛下晝過冷夜過熱非攝養之術帝曰夜靜故也謝公歎曰上理不減先帝崔鴻前趙錄曰王延九歲事母母冬月思生魚杖延流血延尋汾河扣凌而哭得魚而饋母山海經曰鍾山之神, SBCK: 一}
