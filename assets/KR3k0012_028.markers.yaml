  - {type: variant, offset: 2924, length: 239, content: 常而有芒角則民多疾疫隨之以喪亡國不昌也人君以冬時行春令則歲星之氣干之色青而君憂刑獄變動生死不當地踈不密人乃流亡虫蝗為災水泉咸竭民多疥癘胎夭多傷國多固疾斷獄官凶以冬行夏令則熒惑之氣干之色赤而小昧刑禍並起兵旱荐臻國多暴風方冬不雪不寒氛霧冥昧雷乃發聲以冬行秋令則太白之氣干之色白而有野戰並作獄訟軍旅同時而興霜雪不時小兵時起土地侵削四鄙入堡輦下歲時記曰此月戶部奏大閱天下貢物於都堂其日放朝宰相與百官皆赴戶部宴饌一時特盛開元中曾以大閱一日貢物賜李林甫九州任土盡歸人臣之家國史書其事也晉陸機, SBCK: 勝}
