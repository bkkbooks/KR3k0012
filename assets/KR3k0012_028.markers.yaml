  - {type: variant, offset: 1291, length: 74, content: 周風至四十五日廣莫風至坎卦之風不周風至則修宮室繕邊城立冬節土功其始故治宮室繕修邊城備寇難也廣莫風至則閉關梁斷罰刑象冬閉藏不通關梁也罰刑之凝者於是順時, krp: 聽政擇吉辰}
