  - {type: variant, offset: 6, length: 0, content: '', krp: 至繕宫殿封倉庫易說曰坎北方也主冬至尚書考靈曜曰冬至日則五星俱起牽牛日月若懸壁五星若編珠孝經説曰斗指子爲冬至至有三義一者隂極之至二者陽氣始至三者日行南至故謂爲至孝經援神契曰冬至陽氣動又曰冬至日在外衡三禮義宗曰十一月大雪爲節者刑於小雪爲大雪時雪轉甚故以大雪名節冬至中者亦有三義一者隂極之至二者陽氣始至三者日行南至故謂之冬至也又曰冬至日祭天於圎丘玉用其蒼璧牲同玉色樂用夾鍾爲宫樂作六變五經通義曰冬至寢兵鼓啇旅不行君不聽政事曰冬至陽氣萌隂陽交精始成萬物氣微在}
