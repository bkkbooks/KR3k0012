  - {type: variant, offset: 1320, length: 1149, content: 土功其始故治宮室繕修邊城備寇難也廣莫風至則閉關梁斷罰刑象冬閉藏不通關梁也罰刑之凝者於是順時而決之又曰古之君人者其慘怛於民也國有饑者食不重味民有寒者而冬不被裘與同饑寒冬伐薪蒸大者曰薪小者曰蒸以為民資資用又曰北方水也其帝顓頊顓頊黃帝之孫以水德王天下號曰高陽氏死託祀北方也其佐玄冥執權而治冬又曰冬行春令泄象春氣布散發泄也行夏令旱旱象陽炎行秋令霧秋氣陰故亂霧又曰太陰理秋則欲修備繕兵金德斷剛故修兵也太陰理冬則欲猛毅剛強純陽閉固水澤冰故剛強又曰北方之極自九澤窮夏晦之極北至令正之谷九澤北方之澤夏大也晦暝也有凍寒積冰雪雹霜霰漂潤群水之野顓頊玄冥之所司者萬二千里顓頊黃帝之孫也以水德王天下號為高陽氏死為北方水德之帝其神玄冥者金天氏有適子曰昧為玄冥師死祀為主水之神也月令曰申群禁固閉藏修障塞繕關梁禁外徙斷罰刑守門閭大搜客止交遊禁夜樂早閉開以索姦人已得報之必固天節已幾刑殺無赦雖有盛尊之親斷以法度毋發藏毋釋罪應陰殺也又曰十月失政四月草木不實實長也語林曰羊稚舒冬日釀酒令人抱甕須臾復易人速成而味好說苑曰衛靈公天寒鑿池宛春諫曰天寒起役恐怠民也公曰寒乎春曰公衣狐裘坐熊席是以不寒民寒甚矣公乃罷役世說曰石崇為客冬天設萍虀王愷乃密賄崇帳下都督及御車人問所以對曰萍虀是搗韭根雜以麥苗耳殷芸小說曰晉孝武帝即位時年十三四冬天晝日不著複衣但著單絹裙衫五六重夜則累茵褥謝公云體宜令有常陛下晝過冷夜過熱非攝養之術帝曰夜靜故也謝公歎曰上理不減先帝崔鴻前趙錄曰王延九歲事母母冬月思生魚杖延流血延尋汾河扣凌而哭得魚而饋母山海經曰鍾山之神名曰燭陰燭龍也是燭九月因名云視為晝暝為夜吹為冬呼為夏不飲不食不息息則為風息氣息也身長千里地鏡經曰十二月中草木獨有枝葉垂者下有美玉蔡邕月令章句曰冬終也萬物於是終也崔寔四人月令曰十月農事畢五穀既登家備儲畜乃順時令也祠令曰季冬藏冰仲春開冰並用黑牡秬黍祭司寒之神於冰室其開冰加以桃弧棘矢設於神座又曰七祀祀行以冬漢桓譚新論曰太原民以隆冬不火食五月雖有疾病急緩猶不敢犯為介之推故也漢崔寔政論曰僕前為五原太守土地不知緝績冬積草伏臥其中若見吏以草纏身令人酸鼻吾乃賣儲峙得二十餘萬詣鴈門廣武迎織師使巧手作機乃紡以教民織漢書于定國飲酒至數石不亂冬月治獄請讞飲酒益精明後漢書虞詡祖父經為郡縣獄吏案法平正務存寬恕每冬月上狀恒流涕隨之嘗稱曰東海于公高為里門而其子定國卒至丞相吾決獄六十年矣雖不及于公其庶乎子孫何必不為九卿耶故字詡昇卿晉皇甫謐玄晏春秋曰余家貧晝則愍於作勞夜則甘於寢寐以三時之務卷帙生塵篋不解緘唯季冬末纔得一旬學爾晉嵇康集序曰孫登於汲郡北山土窟中住夏則編草為裳冬則被髮自覆論衡曰夫雲出於丘山降散則為雨矣人見從上則謂之天雨水冬日天寒則雨凝為雪皆由雲氣發於丘山不從天降集於地明矣瑞應圖曰芝草常以六月生春夏紫秋白冬黑曆義䟽曰小寒, WYG: ''}
