  - {type: punctuation, offset: 7, content: 《, id: KR3k0012_CHANT_028-bkkpn1}
  - {type: variant, offset: 7, length: 1, content: 呂, SBCK: 不可動泄王者承天理故率天下静而不擾也史記曰冬至短極縣土􅁅孟康曰先冬至三日懸土􅁅於衡兩端輕重適均冬至日陽氣至則􅁅重夏至日隂氣至則土重晉灼曰蔡邕律暦記候鍾律權上土􅁅冬至陽氣應黄鍾通土􅁅輕而衡仰夏至隂氣應㽔賔通土􅁅重而衡低進退先後五日之中􅁅動麋解角蘭根出泉水踊晷以知日至要訣晷景又曰凢􅃸歳美􅁖􅀱謂歳始或冬至日産氣始萌臘明日人衆卒􅀊壹㑹歛食發陽氣故曰􅀄歳又曰黄帝得寳鼎宛朐問於􅁷區對曰帝得寳鼎神筴是歳巳酉朔旦冬至得天子紀終而復始於是黄帝迎日推筴後率世歳復朔旦冬至漢書曰宦者淳于陵渠覆太􅀄暦晦朔望最宻五星如連珠應劭注云謂太􅀄上元甲子夜半朔朝冬至七曜皆㑹牽牛又曰冬至陽氣起君道長故賀夏至隂氣起君道消故不賀司馬彪續漢書曰天子常以冬夏至日御前殿合八能之士陳八音聽樂均度晷景􅀱鍾律權土􅁅俲隂陽也續漢書禮儀志曰冬至前後君子安身静體百官絶事不聽政擇􅁻辰而後省事絶之日夜漏未盡五刻京都百官衣皂聽事之日百官皆衣綘後漢書曰傳賢字仲舒遷廷尉毎冬至断獄遲廻流涕魏文帝黄􅀄元年冬至日黄雀集于文昌殿前見曹植表左思魏都賦云翩翩黄雀衘書來誶綦母氏云黄鳥衘書具吾臺後魏崔浩女儀曰近古婦人常以冬至日上履襪於舅姑踐長至之義也晉書曰周嵩母李氏常冬至致酒舉觴賜三子曰吾夲渡江託足無所不謂爾等並貴列吾目前吾復何憂嵩起曰恐不如尊旨伯仁志大而才短名重而識闇好乗人之弊此非自全之道嵩性抗直亦不容於世唯阿奴碌碌當在阿母目下耳阿奴謨小字也後果如其言沈約宋書曰魏晉冬至日受萬國及百寮稱賀因小㑹其儀亞於歳朝也又曰冬至朝賀享祀皆如元日之儀又進履襪崔駟襪銘有建子之月助養元氣之事後魏北京司徒崔女儀云近古婦人常以冬至日進履襪於舅姑皆其事也襪亦作袜並亡伐反作赤豆粥荆楚記云共工氏有不才子以冬至日死爲人厲畏赤豆故作粥欀之南史曰梁傳􅄮爲始新令有囚當死㑹冬至􅄮乃放其還家獄曹􅁺固争曰古者有此今不可行􅄮曰其􅀂􅀒信縣令當坐竟如期而反太守深相歎異遽以􅃺聞梁書曰席闡出爲東陽太守在郡有能名冬至悉放獄中囚依期而至齊書曰庫狄伏連冬至之日親表稱賀其妻爲設豆餅伏連問此豆何因而得妻對曰於馬豆中分减伏連大怒唐􅀇宗實録曰上御含元殿受朝太史奏曰朔日至暦數之元嘉辰之㑹按樂計圖徴云朔日冬至聖主厚祚又按春秋精符云冬至隂雲祁寒有雲迎日者來歳大美此並聖德光􅀍上感天心請付有司以彰嘉瑞從之荆楚歳時記曰十一月冬至日作赤豆粥洽聞記曰赤土國直崖州南渡海經雞籠島冬至之日影在北夏至之日影在南開户皆向北西域諸國志曰天笁國以十一月六日爲冬至冬至則麥秀管子曰以冬至之日始數四十六冬盡春始教民鑚燧謹竈泄所以壽人也淮南子曰冬至之日北宫御女黒色衣黒采擊磬石水王北方故處北宮其鎩其畜􅇾鍛者即内象􅇾􅇾水畜又曰陽氣爲火隂氣爲水水勝故夏至濕火勝故冬至慘慘故􅁅重日冬至井水盛盆水溢鵲始巢八尺之脩日中而景文三尺又曰天文曰冬至日數來歳正月朔日滿五十者民食足不滿五十者减一􅂛餘日日益一􅂛其爲歳伺也伺候也吕}
