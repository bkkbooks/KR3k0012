  - {type: variant, offset: 120, length: 684, content: 寒十二月中雞始乳雞不乳即媱婦乳男鷙鳥厲疾鳥不厲疾即國不除人水澤腹堅不腹堅即言無所從梁元帝纂要曰冬日玄英亦曰安寧亦曰玄冬三冬九冬天曰上天風曰寒風勁風嚴風厲風哀風陰風景曰冬景寒景時曰寒辰節曰嚴節鳥曰寒鳥寒禽草曰寒卉黃草木曰寒木寒柯素木寒條又曰十月孟冬亦曰上冬亦曰陽月此時純陰用事嫌其無陽故曰陽月十二月季冬亦曰暮冬杪冬餘月暮節暮歲風俗通曰夏宮冬律雨雹必降冬宮夏律雷必發聲夫音樂至重所感者大故曰知禮樂之情者能作識禮樂之文者能述又曰趙仲讓為梁冀從事中郎冬月坐庭中向日解衣捕蚤又曰十月之應鍾何應者應也鍾者動也言萬物應陽而動不藏也論衡曰陰氣動於下而陰氣應之也又曰十二月律謂之大呂何大者太也呂拒也言陽氣欲出其陰不許也呂之言拒也依即拒難之也太玄經曰岡北方也冬也未有形也岡無也未有形故為岡也言冬萬物深藏黃泉莊子曰魯遽弟子曰我得夫子之道吾能冬爨鼎而夏造冰矣魯遽曰是直以陽召陽以陰召陰非吾所謂道也又曰古者民不知衣服夏多積薪冬則焬之故命之曰知生之民又曰宋人有善為不龜手之藥者世世以洴澼絖為事吳人有百金買不龜手之藥以說吳王越有難吳王使之將令與越人水戰大敗越人裂地而封能不龜手一也或以封或不免於洴澼絖則所用之異也按絖古纊字絮也洴澼浣溧斫絮於水中也洴扶經切澼普歷切太公金匱曰夏桀之時有芩山之水桀常以十月發民鑿山穿陵通於河民諫曰孟冬鑿山穿陵是泄天氣發地之藏天子失道後必有敗桀殺之朞年芩山崩為大澤湯率諸侯伐之丈子曰冬冰可折夏條可結又曰國有饑者食不重味民有寒者冬不被裘與民同苦樂即天下無哀民列子曰瓠巴學琴於師襄當冬而叩徵絃以激賓陽光熾烈堅冰立散孟子曰子產聽治國之政以其乘輿濟人於溱洧孟子曰子產惠而不知為政歲, WYG: 雪}
