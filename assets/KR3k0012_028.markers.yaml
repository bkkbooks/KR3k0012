  - {type: variant, offset: 2114, length: 238, content: 以冬漢桓譚新論曰太原民以隆冬不火食五月雖有疾病急緩猶不敢犯為介之推故也漢崔寔政論曰僕前為五原太守土地不知緝績冬積草伏臥其中若見吏以草纏身令人酸鼻吾乃賣儲峙得二十餘萬詣鴈門廣武迎織師使巧手作機乃紡以教民織漢書于定國飲酒至數石不亂冬月治獄請讞飲酒益精明後漢書虞詡祖父經為郡縣獄吏案法平正務存寬恕每冬月上狀恒流涕隨之嘗稱曰東海于公高為里門而其子定國卒至丞相吾決獄六十年矣雖不及于公其庶乎子孫何必不為九卿耶故字詡昇卿晉皇甫謐玄晏春秋曰余家貧晝則愍於作勞夜則甘於寢寐以三時之務卷帙生塵篋, SBCK: 麋角}
