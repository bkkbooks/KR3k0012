  - {type: variant, offset: 4, length: 0, content: '', WYG: 三立冬冬至立冬禮記月令曰孟冬之月是月也以立冬先三日太史謁於天子曰某日立冬盛德在水天子乃齋立冬之日親率公卿大夫以迎冬於北郊還乃賞死事恤孤寡左傳曰仲尼問郯子曰丹鳥氏司閉者也立秋來立冬至易通卦驗曰立冬不周風至水始氷薺麥生雀入水爲蛤京房易占曰立冬乾王不周風用事人君當興邊兵治城郭行刑决罪三禮義宗曰十月立冬為節者冬終也立冬之時萬物終成為節名小雪為中者氣序轉寒雨變成雪故以小雪為中家語曰魚遊於水鳥遊於雲故立冬則燕雀入於海化為蛤符瑞圖曰八風循通八方之風應時而至也立冬北方廣莫風至一名寒風周書時訓曰立冬十月節水始氷水若不氷即國用匱乏地始凍地若不凍即灾咎之徴野雉化為蜃若不爲蜃即時多婬婦五行休王論云立冬乾王坎相艮胎震沒巽死離囚坤廢兊休冬至周易曰先王以至日閉關商旅不行后不省方尚書曰日短星昴以正仲冬孔安國註曰日短冬至日也星􅄧西方白虎七宿之􅄧宿並見以正冬之三節也禮記曰仲冬之月日短至隂陽爭諸生蕩爭者隂方盛陽欲起也君子齋戒處必掩身身欲寧去聲色禁嗜欲安形性事欲靜以待隂陽之所定周禮曰冬至日在牽牛景長一丈三尺夏至日在東井景長尺有五寸又曰薙氏掌殺草春日生而萌之夏日至而夷之秋繩而芟之冬日至而耜之若欲其化也則以水火變之謂以火燒其所掌薙之草已而水之則其土亦和美矣月令季夏乃燒薙行水利以殺草如以熱湯可以糞田疇可以美土疆又司徒職曰夏至日之景尺有五寸謂之地中天地之所合也四時之所交也風雨之所㑹也隂陽之所和也然則萬物阜安乃建王國為制其畿方千里而封樹也春秋左傳曰僖公五年春正月辛亥朔日南至公既視朔遂登觀臺以望而書禮也凡分至啓閉必書雲物為備故也易通卦驗曰冬至之日見雲送迎從下嚮來歲大美人民和不疾疫無雲送迎德薄歳惡故其雲赤者旱黒者水白者為兵黄者有土功諸從日氣送迎其徴也又冬至始人主致八能之士或調黄鍾或調六律或調五行或調律厯或調隂陽或調正德鄭𤣥註曰致八能之士者言選於人衆之中取習曉者使之調為諧調和之意也又冬至始人主與羣臣左右從樂五日天下之衆亦家家從樂五日以迎日至之禮鄭𤣥註曰從者就也冬至君臣俱就大司樂之宫臨其肄樂祭天圜丘之樂以為祭事莫大於此又冬至成天文鄭𤣥註云天文謂之三光運照行天下冬至而數訖於是時也祭而成之所以報也又冬至之日立八神樹八尺表日中視其晷如度者則歳人和順晷不如度者歳惡晷入則水退則旱進}
