  - {type: variant, offset: 4061, length: 3, content: 李勢字, SBCK: 沮渠􅂪遜臨松盧水胡人其先丗爲匈奴左沮渠遂以官爲氏遜好學渉羣史雄烈有英略後涼龍飛二年遜伯父羅仇麴粥從吕光征河南光前軍大敗皆爲光所煞宗部㑹葬者萬餘人遜哭謂衆曰昔漢祚中微吾之乃祖翼奬竇融保寧河右吕王耄荒虐民無道豈可㘴觀成敗不上繼先祖安民之志下使二父有恨黃泉衆咸稱萬歳遂立盟約一旬之間衆至萬餘與從兄男成推建康太守叚業爲涼州牧康公改龍飛二年爲神璽元年業以遜爲張掖太守男成爲輔國大將軍委以軍國之任永安元年三月遜以爲業所憚内不自安請爲安西太守四月業收男成賜死遜聞男成死泣告衆曰男成忠於叚公枉見屠害諸君能爲報仇乎成素有恩信衆皆憤泣從之北至氐地衆餘一萬業遣右將軍田昴武衛將軍梁中庸等攻侯塢遜自氐地救之昴率􅀐五百歸遜軍遂大潰中庸來奔五月遜至張掖田昴兄}
