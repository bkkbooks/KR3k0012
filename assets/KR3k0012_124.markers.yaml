  - {type: variant, offset: 3142, length: 262, content: 而生蕩後羅氏汲水忽然而寐夢大虹繞其身遂有孕十四月而生雄常言二子若有先亡在者必大貴蕩以李流世卒雄長八尺三寸美容貌相工相之曰此君將貴其相有四目如重雲鼻如龜龍口方如器耳如相望法為貴人位過三公不疑雄少以烈氣聞識者皆器重之特稱益州牧以雄鎮梓潼又拜前將軍流薨雄稱大將軍益州牧治郫音皮城以西山范長生巖居穴處求遵養之志雄欲迎為君長生固辭曰推步太元五行大會甲子祚鍾於李非吾節也建興元年十月雄即成都王位於南郊大赦改元約法七章以叔父驤為太傅兄虎威為太保晏平元年三月范長生乘素與詣城雄迎于大門執版延坐長生請雄對坐即拜丞相尊曰范賢長生勸雄稱尊號夏六月, WYG: ''}
