  - {type: variant, offset: 2122, length: 171, content: 苗裔秦併天下以為黔中郡薄賦其人口歲出錢四十巴人謂賦為賨藏宗切遂因名焉及高祖為漢王始募賨民平定三秦既而不願出關求還鄉里高祖以其功復同豐沛更名其地為巴郡土有鹽漆之利民用殷阜俗性剽勇又善歌舞高祖愛其舞詔樂府習之今巴渝舞是也其後繁昌分為數十姓及魏武剋漢中特祖父虎歸魏魏武嘉之遷略一云洛陽陽拜虎等為將軍內徙者亦萬餘家散居隴右諸郡及三輔泓農所在號為巴人虎, SBCK: 長庶}
