  - {type: variant, offset: 3661, length: 0, content: '', SBCK: 十一月晉昌太守唐瑤移檄六郡推暠爲大將軍涼公領秦涼二州牧大赦改年追尊祖弇涼公父昶涼簡公以瑤爲征東將軍三年正月於南門起静恭堂以議朝政圖讃自古聖帝明王忠臣孝子烈士貞女親爲序頌以作鑒戒五年正月立泮宮増髙門學生百人四月燉煌有葛縁木而生作黃烏之形丗子譚卒九月立好歆爲丗子}
