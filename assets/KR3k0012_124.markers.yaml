  - {type: variant, offset: 4087, length: 1, content: 異, SBCK: 也昞曰聖人也遜曰聖人者不凝滯於物而能與丗推移畏于匡辱于陳伐樹削迹聖人固􅀂是乎昞不能對遜曰卿知其外未知其內昔魯人有浮海而失津者至于亶州仲尼及七十二子遊于海中與魯人一木杖令閇目乗}
