  - {type: variant, offset: 2511, length: 324, content: 以四千騎歸廞廞以庠為威寇將軍使斷北道庠素東羗良將曉兵陳軍部肅然廞惡其齊整煞之復以特為督將特兄弟既怨廞引兵歸綿竹廞恐朝廷討己遣長史費遠犍音虔為太守李苾蒲結切督萬餘人斷北道次綿竹之石亭特密收合得七千餘人夜襲遠軍遠軍大潰因放火燒之死者十八九進攻成都廞聞兵至驚懼不知所為李苾等夜斬關走出文武盡散廞獨與妻子乘小船走至廣都為其下人朱笁所煞先是梁州刺史羅尚聞廞叛上表稱廞非雄才又蜀人不願為亂事終無成願欲征之惠帝遣尚平西將軍益州刺史率七千餘人入蜀特等聞尚來甚懼使弟驤於道奉迎并貢寶物尚甚悅冬十月六郡流人推特行鎮北將軍承制封拜其弟流行鎮東將軍弟驤驍騎將軍少子雄為前將軍以相統領進兵攻尚於成都頻為特所敗乃阻長圍緣水作營自都安至犍為七百里與特相距大安二年都下推特為大將軍, WYG: 議僣即王位于謙光殿}
  - {type: variant, offset: 2511, length: 264, content: 以四千騎歸廞廞以庠為威寇將軍使斷北道庠素東羗良將曉兵陳軍部肅然廞惡其齊整煞之復以特為督將特兄弟既怨廞引兵歸綿竹廞恐朝廷討己遣長史費遠犍音虔為太守李苾蒲結切督萬餘人斷北道次綿竹之石亭特密收合得七千餘人夜襲遠軍遠軍大潰因放火燒之死者十八九進攻成都廞聞兵至驚懼不知所為李苾等夜斬關走出文武盡散廞獨與妻子乘小船走至廣都為其下人朱笁所煞先是梁州刺史羅尚聞廞叛上表稱廞非雄才又蜀人不願為亂事終無成願欲征之惠帝遣尚平西將軍益州刺史率七千餘人入蜀特等聞尚來甚懼使弟驤於道奉迎并貢寶物尚甚悅冬十月六郡流人推特行鎮北將軍承制封拜其弟流行鎮東將軍弟驤, krp: ''}
