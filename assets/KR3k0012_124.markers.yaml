  - {type: variant, offset: 4089, length: 2, content: 壽既, SBCK: 使歸告魯侯築城以備㓂魯人出海投杖水中乃龍也具以狀告魯侯不信俄而有羣䴏數萬銜土培城魯侯信之大城曲阜訖而齊㓂至攻魯不尅而還此其所以稱聖也義和元年十一月魏遣太常李愼拜遜太􅀓涼州牧涼王加九錫之禮三年夏四月遜寢疾立子茂䖍爲丗子薨於路寢五月葬元陵謚武宣王號太祖沮渠茂䖍崔洪十六國春秋北涼録曰沮渠茂䖍遜第三子聦頴好學和雅有度量義和三年立爲丗子加中外都督大將軍録尚書遜}
  - {type: variant, offset: 4089, length: 2, content: 壽既, WYG: 使歸告魯侯築城以偹冦魯人出海投杖水中乃龍也具以状告魯侯不信俄而有羣鷰數萬銜土培城魯侯信之大城曲阜訖而齊冦至攻魯不尅而還此其所以稱聖也義和元年十二月魏遣太常李慎拜遜太傅凉州牧凉王加九錫之禮三年夏四月遜寝疾立子茂虔為世子薨于路寝五月葬元陵諡武宣王廟號太祖沮渠茂虔崔鴻十六國春秋北凉録曰沮渠茂虔遜第三子聦頴好學和雅有度義和三年立為世子加中外都督大将軍録尚書事遜}
