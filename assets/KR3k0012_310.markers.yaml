  - {type: variant, offset: 1191, length: 788, content: 梁成王先等守洛澗詔加衛將軍安為征討大都督玄為前鋒都督徐兗青三州楊州之晉陵幽州之燕國諸軍事與叔父征虜將軍石從弟輔國將軍琰西中郎將桓伊龍驤將軍玄等拒之眾凡八萬玄先遣廣陵劉牢之五千人直指洛澗邸斬梁成及成弟雲步騎崩潰爭赴淮水斬首萬級生擒五千餘人十月符融進屯壽陽玄與琰等選精銳八千人決戰肥水南臨陣斬符融俘獲萬計得偽輦及雲母車其餘寶器山積錦罽數萬端牛馬驢騾駱駞十萬疋又曰符堅率眾五十萬向壽春謂融曰晉人若知朕來便一時還南固守長江雖百萬之眾無所用之今祕吾來令彼不知彼顧江東在此必當戰若其潰敗求守長江不復可得則吾事濟矣乃秘不言堅自來於是以小將旗列屯肥北晉征虜將軍謝石冠軍將軍謝玄輔國將軍謝琰西中郎將桓伊等並阻水南一時涉渡肥水融曰及吳未成列擊之必克也堅曰不然我長於步彼便於水今捨步入水是以所短擊其所長非良策矣可須彼過水一時擊之彼既背水進退無術乃可盡殺然後船舫渡江直指會稽觀禹朝萬國之處不亦樂乎列陣以待晉軍晉軍既濟戰于肥北堅被重瘡三軍潰亂堅馳還長安晉書曰劉毅泝江追桓玄戰於崢嶸洲于時官軍數千玄兵甚盛而玄懼有敗衂常漾輕舸於舫側故其眾莫有鬥心官軍乘風縱火盡銳爭先玄眾大潰又曰將軍王敦反兵至石頭欲攻晉將劉隗五罪切其將杜弘曰劉隗死士眾多未易可剋不如石頭其守將周禮少恩兵不為之用必敗禮敗隗自走敦從之禮果開城門納弘諸將與敦戰晉師大敗又曰前秦符堅率兵來伐晉將軍謝石謝玄拒之堅遣其尚書朱序說石等以眾盛欲脅而降之序謂石曰若秦百萬之眾皆至則莫可以敵也及其眾未集宜在速戰若挫其前鋒可以得志晉將遣使請戰許之堅師列陣逼肥水晉師不得度晉將使謂堅將符融曰君懸軍深入置陣逼水此持久之計豈欲戰者乎若小退師令將士周旋僕與君公緩轡而觀之不亦美也堅眾皆曰宜阻水莫令得上我眾彼寡勢必萬全堅曰但却軍令得過我以鐵騎向水逼而殺之不然因其濟水而覆之於是麾軍却陣軍遂奔退制之不可止玄以八千精卒度肥逼之融馳騎略陣馬倒被殺軍遂大敗晉師乘勝追擊死者相枕堅為, SBCK: 爲}
