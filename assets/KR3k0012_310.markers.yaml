  - {type: variant, offset: 3375, length: 161, content: 敗遂拔其城又曰後漢末曹公征張魯於漢中使張遼與樂進李典等將千餘人守合肥教與護軍薛悌署邊曰賊至乃發俄而吳主孫權率十萬眾圍合肥乃共發教教云若權至者張李將軍出戰樂將軍守護軍勿得與戰諸將皆疑遼曰公征在外比救至敗我必矣是以教及其未合逆擊之折其盛勢以安眾心然後可守成敗之機在此一戰諸君何疑李典亦與遼同於是遼夜募敢死之士得八百人椎牛饗將士, SBCK: 沮}
