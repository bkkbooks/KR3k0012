  - {type: variant, offset: 2008, length: 179, content: 王師不利崔鴻十六國春秋曰前秦符堅遣將呂光領兵伐龜茲光軍其城南五里為營深溝高壘廣設疑兵以木為人被之以甲羅之壘土龜茲王帛純嬰城自守乃傾國財寶請諸國來救溫宿尉頭等國王合七十餘萬眾以救之胡便弓馬善矛矟鎧如連鏁射不可入眾甚憚之諸將咸欲每營結陣按兵以拒之光曰彼眾我寡眾營又相遠勢分力散非良策也於是遷營相接陣為勾鏁之法精騎為遊軍彌縫其闕戰于城西大敗之純遁走王侯降者三十餘國, SBCK: 飛矢中郃右􅂰薨}
