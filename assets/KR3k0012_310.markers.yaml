  - {type: variant, offset: 5, length: 0, content: '', SBCK: 下戰不顧親戰傷戰下後周書梁臺傳曰時大軍圍洛陽乆而不㧞齊􅀐奄至齊公憲率兵禦之乃有數人爲敵所執巳去陣二百餘歩臺望見之憤怒單馬突入射殺兩人敵皆披靡執者遂得齊公憲毎歎曰梁臺果毅膽決不可及也又曰田弘討西平反羌及鳯州叛兵等並破之弘毎臨陣摧鋒直前身􅀍一百餘箭破骨者九馬􅀍十矟朝廷壯之又曰李標字靈傑長不􅄹五尺性果決有膽氣少事􅈛朱氏累遷右將軍魏孝武以摽從爲太祖帳内都督從復弘農破沙苑摽時跨馬運矛衝堅䧟陣隱身披甲之}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 下戰不顧親戰傷戰下後周書梁臺傳曰時大軍圍洛陽乆而不㧞齊騎奄至齊王憲率兵禦之乃有數人為敵所執已去陣二百餘步臺望見之憤怒單馬突入射殺兩人敵皆披靡執者得還齊王憲每歎曰梁臺果毅膽决不可及也又曰田𢎞討西平反羗及鳳州叛兵等並破之𢎞每臨陣摧鋒直前身被一百餘箭破骨者九馬被十矟朝廷壯之又曰李標字靈傑長不盈五尺性果决有膽氣少事尒朱氏累遷右將軍魏孝武特以標為太祖帳内都督從復𢎞農破沙苑標時跨馬運矛衝堅䧟陣隱身披甲之}
