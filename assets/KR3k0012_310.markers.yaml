  - {type: variant, offset: 955, length: 235, content: 襄陽犒軍十一年溫進征討大都督司冀諸軍事委以專征之任溫乃合眾治兵七月率眾伐羌十月溫次伊水羌師姚襄來逆軍屯于北遣使詣溫奉身歸命願勑前鋒小却當拜伏路左溫荅曰我自脩復中原展敬山陵無豫君事欲來相迫何復求卻於是方軌齊進襄率驍勇萬餘人距水前戰溫命小弟沖及諸將奮擊襄大敗奔北自相殺害死者數千越北芒而奔走溫屯故太極殿前賊周成率眾降溫徙入金墉謁先帝諸陵被侵毀者皆繕復之選陵令守護又曰謝玄進號冠軍將軍加領徐州刺史還于廣陵以功封東興縣侯八年玄至符堅傾國大出眾號百萬先遣符融慕容煒張蚝符方四師至潁, SBCK: 濡須}
