  - {type: variant, offset: 5, length: 0, content: '', krp: 下戰不顧親戰傷戰下後周書梁臺傳曰時大軍圍洛陽乆而不㧞齊騎奄至齊公憲率兵禦之乃有數人爲敵所執巳去陣二百餘歩臺望見之憤怒單馬突入射殺兩人敵皆披靡執者遂得齊公憲毎歎曰梁臺果毅膽決不可及也又曰田弘討西平反羌及鳯州叛兵等並破之弘毎臨陣摧鋒直前身𬒳一百餘箭破骨者九馬𬒳十矟朝廷壯之又曰李標字靈傑長不盈五尺性果決有膽氣少事爾朱氏累遷右將軍魏孝武以摽從爲太祖帳内都督從復弘農破沙苑摽時跨馬運矛衝堅䧟陣隱身披甲之}
