  - {type: variant, offset: 6, length: 0, content: '', WYG: 敵人見之皆曰避此小兒太祖初亦聞標驍悍未見其能至是方嗟歎之謂標曰使膽决如卿何必要湏八尺之軀也又曰賀若敦太祖時羣盗蜂起各據山谷大龜山賊張世顯潜來襲統敦挺身赴戰手斬七八賊乃退走父統大悅謂左右僚屬曰我少從軍旅戰陣非一如此兒膽畧者未見其人非惟成我門户亦當為國名將又曰王雅從戰邙山時大軍不利為敵所乗諸將皆引退雅獨廻騎拒之敵人見其無繼步騎競進雅左右奮擊斬九級敵衆稍却雅乃還軍太祖歎曰王雅舉身悉是膽也又曰蔡祐字承先從太祖戰於河橋祐乃下馬步鬬手殺數人左右勸乗馬以備急卒祐怒之曰丞相飬我如子今日豈以性命為念遂率左右十餘人齊大呼殺傷甚多敵以其無繼遂圍之十餘重謂祐曰觀君似是勇士但弛甲來降豈慮無富貴耶祐罵之曰死卒吾今取頭自當封公何假賊之官號也乃彎弓持滿四拒之東魏人弗敢逼乃募厚甲長刀者直進取祐去祐可三十步左右勸射之祐曰吾曹性命在一矢耳豈虛發哉敵人漸進可十步祐乃射之正中其面應弦而倒便以矟刺殺之因此戰數合惟失一人敵乃稍却祐徐引退是戰也我軍不利太祖已還祐至𢎞農夜中與太祖相見太祖呼之曰承先爾來吾無憂矣太祖心驚不得寢枕祐股上乃安又曰王雄從宇文䕶東征至邙山與齊將斛律明月接戰雄馳殺三人明月退走雄追之眀月左右皆散矢又盡惟餘一奴一矢在焉雄案矟不及明月者丈餘曰惜爾不殺得且住將爾見天子明月反射雄中額雄馬退走至營而死又曰耿豪本名令貴沙苑之戰豪殺傷甚多血染甲裳盡赤太祖見之歎曰令貴武猛所向無前觀其甲裳足以為驗不須更論級數也又曰王勇從討趙青雀平之論功居最除衛大將軍殷州刺史加通直散騎常侍兼太子武衛邙山之戰勇率敢死之士三百人並執短兵大呼直進出入衝擊殺傷甚多敵人無敢當者是役也大軍不利唯勇及王文逹耿令貴三人力戰皆有殊功太祖於是賞帛二千疋令自分之皆拜上州刺史以雍州岐州北雍州擬授勇等然州頗有優劣又令探籌取之勇遂得雍州文逹得岐州令貴得北雍州仍賜勇名為勇令貴名豪文逹名傑以彰其功又曰耿豪從太祖戰於邙山謂所部曰大丈夫見賊須右手㧞刀左手把矟直斫慎莫皺眉畏死遂大呼獨入敵人鋒刃亂下當時咸謂豪殁俄然奮刃而還戰數合當豪前者死傷相繼又謂左右曰吾豈樂殺人但壯士除賊不得不爾若不能殺賊又不為人所傷何異逐坐人也太祖嘉之拜北雍州刺史隋書曰突厥入㓂隋將楊素擊之先是諸將與虜戰每慮胡騎奔突皆戎車步騎相參并舁鹿角為方陣騎在其内素謂之曰此乃自固之道非取勝之方也於是悉除舊法令諸軍為騎陣突厥逹頭可汗聞之大喜率精騎十餘萬而至素奮擊大破之素多權畧乗機赴敵應變無方然大抵馭戎嚴整有犯軍令者立斬之無所寛貸每將臨㓂求人過失而斬之多者百餘人少不下十數流血盈前言笑自若及其對陣先令一二百人赴敵陷陣則已如不能陷陣而還者無問多少悉斬之又令二三百人復進還如向法將士股慄有必死之心由是戰無不勝時稱名將又曰張須陁將兵拒東郡賊翟讓前後三十餘戰每破走之轉滎陽守時李宻說讓取洛口倉讓憚須陁不敢進宻勸之讓遂與宻率兵逼滎陽須陁拒之讓懼而退須陁乗之逐北十餘里時李宻先伏數千人於林木間邀擊須陁軍遂敗績宻與讓合軍圍之須陀亂圍輙出左右不能盡出復躍馬入救之徃來數四衆皆散乃仰天曰兵敗如此何面見天子乎乃下馬戰死時年五十二其所部兵晝夜號泣數日不止又曰麥鐵杖遼東之役將渡遼謂其三子曰阿奴當備淺色黄衫吾荷國恩今是死日我既被殺爾當富貴唯誠與孝爾其勉之及濟橋未成陣去東岸尚數丈賊大至鐵杖跳上岸與賊戰死武賁郎將錢士雄孟金文亦死之左右更無及者帝為之流涕收得其屍又曰權襲慶仕周從武元皇帝與齊師戰于并州被圍百餘重襲慶力戰矢盡短兵相接殺傷甚衆於是刀矟皆折脱胄擲地向賊大罵曰何不來斫頭也賊遂殺之又曰高智惠作亂江南史萬嵗以行軍總管從楊素擊之萬嵗率衆二千自東陽别道而進踰嶺越海攻陷溪洞不可勝數前後七百餘戰轉鬬千餘里寂無聲問者十旬逺近皆以萬嵗為没萬嵗以水陸阻絶信使不通乃置書竹筒中浮之於水汲者得之以言於素素大悅上其事高祖嗟歎又曰宇文慶從周武帝攻河北先登攀堞與賊短兵接戰良久中石廼墮絶而復蘇帝勞之曰卿信餘勇可賈人也復從武帝援晉州其後齊師大至慶與宇文憲輕騎覘之與賊相遇為賊所窘憲挺身而遁慶退據汾橋衆賊爭進慶引弓射之所中人馬必倒賊乃稍却及破高緯㧞高辟克并州下信都擒高諧功並居最唐書曰高祖為山西河東撫慰大使至龍門縣有賊母端兒衆數千人奄至城下時諸軍無備為賊所乗高祖親率十餘騎横出擊之所射應弦而倒賊大潰逐北數十里伏屍相繼於道時高祖射七十發明日斬首築為京觀於屍上盡得所射箭其妙如此又曰至徳中宜春郡太守劉秋子率士卒攻賊兵盡矢窮秋子空拳大呼於軍前死戰而勝詔嘉其忠勇授淮陽太守又曰白孝徳胡人也驍悍有膽力乾元中事李光弼為偏裨史思明攻河陽使驍將劉龍仙率鐵騎五十臨河挑戰龍仙勇㨗自恃舉右足加馬鬛上手運兩矢嫚罵光弼登城望之諸將皆侍顧曰孰可取者僕固懐恩前請行光弼曰此非大將所為厯選其次無可者於是左右竊議曰孝徳可光弼聞之乃招孝德前問曰所加幾何人而可曰獨徃則可加人不可光弼曰壯哉終問所欲對曰願備五十騎於壁門候既入然後進及諸大將鼔譟以借威他無所用光弼撫其背以遣孝徳挾二矛䇿馬截流而渡半濟而懐恩賀曰克矣光弼曰未及何知其克懐恩曰觀其攬轡便辟可萬全者龍仙始見其獨來甚易之足不降鬛稍近將動孝徳揺手示之若使其不動然龍仙不測又止孝徳呼太尉使予致辭非他龍仙去三十步與之言䙝罵如初孝徳息馬伺便乆之因瞋目曰賊識我乎龍仙曰誰曰我國之大將白孝徳龍仙曰是何猪狗孝徳發聲虓然執矛突前城上萬鼓齊譟五十騎以繼進龍仙矢不及發環走堤上孝徳以匹馬逐之胡騎五十皆披靡若猛犬之獵羣狐也遂斬之提首而歸又曰王難得試衛尉卿至鳳翔為都知兵馬使兼知諸軍事嘗有裨將靳元曜當合戰墮馬呼難得俯馬救之賊射難得中眉皮穿下障難得乃㧞矢箭併皮掣棄之勇冠三軍由是士衆多附之五代周史曰王殷遷奉國右廂都指揮使漢祖受命從征杜重威於鄴下殷與劉詞皆率先力戰矢中於首久之出折鏃於口中以是漢祖嘉之三國典畧曰蠕蠕入冦齊主自晉陽討之騎虜散走大軍遂還齊主率二千餘騎為殿夜宿黄瓜堆茹茹别部數萬騎扣鞍而進四面圍逼麾下齊主安卧平明方起神色自若指畫軍行潰圍而出虜走追擊之㐲尸二十里獲菴羅衣妻子生口三萬餘令都督高阿那肱率騎數千塞其走道那肱以兵少請益齊主更减其半那肱率騎奮擊亦大尅㨗戰不顧親史記曰項王為高爼置太公其上告漢王曰今不急下吾烹太公漢王曰吾與項羽俱北面受命懐王約為兄弟吾翁即若翁必欲烹而翁幸分我一杯羮項王怒欲烹之項伯曰天下事未可知且為天下者不顧家雖殺之無益祗益禍耳項王從之}
