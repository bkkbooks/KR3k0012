  - {type: variant, offset: 6, length: 0, content: '', krp: 敵人見之皆曰避此小兒太祖𥘉亦聞摽驍悍未見其能至是方嗟歎之謂摽曰伹使膽決如此何必要須八尺之軀也又曰賀若敦太祖時群盗鋒起各據山谷大龜山賊張丗顯潜來襲統敦挺身赴戰手斬七八賊乃退走父統大悅謂左右僚屬曰我少從軍旅戰陣非一如此兒年時膽略者未見其人非唯成我門户亦當爲國名將又曰王雅從戰邙山時大軍不利爲敵所乗諸將皆引退雅獨廻騎拒之敵人見其無繼歩騎競進左右奮擊頻斬九級敵衆稍却雅乃還軍太祖歎曰王雅舉身悉是膽也又曰蔡祏字承先從太祖戰於河橋祏乃下馬歩闘手殺數人左右勸乗馬以備急卒祏怒之曰丞相飬我如子今日豈以性命爲念遂率左右十餘人齊聲大呼殺傷甚多敵以其無繼遂圍之十餘重謂祏曰觀君似是勇士但㢮甲來降豈慮無冨貴耶祏罵之曰死卒吾今取頭自當封公何假賊之官號也乃彎弓持滿四面拒之東魏人弗敢逼乃募厚甲長刀者直進取祏去祏可三十歩左右勸射之祏曰吾曹性命在一矢耳豈虚發哉敵人漸進可十歩祏乃射之正中其面應弦而倒便以矟刺殺之因此戰數合唯失一人敵乃稍却祏徐引退是戰也我軍不利太祖巳還祏至弘農夜中與太祖相見祏至字之曰承先尒來吾無憂矣太祖心驚不得寢枕祏股上乃安又曰王雄從晉公護東征至邙山與齊將斛律明月接戰雄馳殺三人明月退走雄追之明月左右皆散矢又盡唯餘一奴一矢在焉雄案矟不及明月者丈餘曰惜尓不殺得但住將尒見天子明月反射雄中額雄馬退走至營而薨又曰耿豪本名令貴沙苑之戰豪殺傷甚多血染甲裳盡赤太祖見之歎曰令貴武猛所向無前觀其甲裳足以爲驗不須更論級數也又曰王勇從討趙青雀平之論功居最除衛大將軍殷州刺史加通直散騎常侍兼太子武衛邙山之戰勇率敢死之士三百人並執短兵大呼直進出入衝擊殺傷甚多敵人無敢當者是役也大軍不利唯勇及王文逹耿令貴三人力戰皆有殊功太祖於是賞帛二千疋令自分之軍皆拜上州刺史以雍州歧州北雍州擬授勇等然州頗有優劣又令探籌取之勇遂得雍州文逹得歧州令貴得北雍州仍賜勇名爲勇令貴名豪文逹名傑以彰其功又曰耿豪從太祖戰於邙山豪謂所部曰大丈夫見賊須右手㧞刀左手把矟直斫慎莫皱眉畏死遂大呼獨入敵人鋒刃亂下當時咸謂豪殁俄然奮刃而還戰數合當豪前者死傷相繼又謂左右曰吾豈樂殺人但壯士除賊不得不尒若不能殺賊又不爲人所傷何異逐坐人也太祖嘉之拜北雍州刺史隋書曰突厥入冦隋將楊素擊之先是諸將與虜戰毎慮胡騎奔突皆戎車歩騎相參舁鹿角爲方陣騎在其内素謂之曰此乃自固之道非取勝之方也於是悉除舊法令諸軍爲騎陣突厥逹頭可汗聞之大喜率精騎十餘萬而至素奮擊大破之素多權略乗機赴敵應變無方然大抵馭戎嚴整有犯軍令者立斬之無所寛貸毎將臨冦求人過失而斬人多者萬餘人少不下千數流血盈前言笑自若及其對陣先令三百人赴敵䧟陣則巳如不能䧟陣而還者無問多少悉斬之又令二三百人復進還如向法將士股慄有必死之心由是戰無不勝時稱名將又曰張須陁將兵拒東郡賊翟讓前後三十餘戰毎破走之轉滎陽守時李宻說讓取洛口倉讓憚須陁不敢進宻勸之譲遂與宻率兵逼滎陽須陁拒之讓懼而退須陁乗之逐北十餘里時李宻先㐲數千人於林木間邀擊須陁軍遂敗績宻與讓合軍圍之須陁潰圍輙出左右不能盡出復躍馬入救之徃來數四衆皆散乃仰天曰兵敗如此何面見天子乎乃下馬戰死時年五十二其所部兵晝夜號泣數日不止又曰麥鐵杖遼東之役將渡遼謂其三子曰阿奴當備淺色黄衫吾荷國恩今是死日我旣𬒳殺爾當冨貴唯誠與孝爾其勉之及濟橋未成去東岸尚數丈賊大至鐵杖跳上岸與賊戰死武賁郎將錢士雄孟金又亦死之左右更無及者帝爲之流涕購得其屍又曰權襲慶仕周從武元皇帝與齊師戰於并州𬒳圍百餘重襲慶力戰矢盡短兵相接殺傷甚衆於是刀矟皆折脫胄擲地向賊大罵曰何不來斫頭也賊遂殺之又曰髙智惠作亂江南史萬歲以行軍揔管從楊素擊之萬歲率衆二千自東陽别道而進踰嶺越海攻䧟浮洞不可勝數前後七百餘戰轉鬪千餘里寂無聲聞者十旬逺近皆以萬歲爲没萬歲以水陸阻絶信使不通乃置書竹筒中浮之於水汲者得之以言於素素大恱上其事髙祖嗟歎又曰宇文慶從周武帝攻河隂先登攀堞與賊短兵接戰良乆中石廼墜絶而後蘇帝勞之曰卿之餘勇可以賈人也復從武帝抜晉州其後齊師大至慶與宇文憲輕騎覘卒與賊相遇爲賊所窘憲挺身而遁慶退據汾橋衆賊爭進慶引弓射之所中人馬必倒賊乃稍却及破髙緯抜髙辟克并州下信都擒髙諧功並居最唐書曰髙祖爲山西河東撫尉大使至龍門縣有賊母端兒衆數千人奄至城下時諸軍無備爲賊所乗髙祖親率十餘騎撗出擊之所射應弦而倒賊大潰逐北數十里伏屍相繼於道時髙祖射七十發明日斬首築爲京觀於屍上盡得所射箭其妙如此又曰至德中冝春郡太守劉秋子率士卒攻賊兵盡矢窮秋子張空拳大呼於軍前死戰而勝詔嘉其忠勇授淮陽太守又曰白孝德胡人也驍悍有膽力乹元中李光弼爲偏禆史思明攻河陽使騎將劉龍仙率鐵騎五十臨河挑戰龍仙勇捷自恃舉右足加馬鬛上手運兩矢嫚罵光弼登城望之諸將皆侍顧曰孰可取者僕固懷恩前請行光弼曰此非大將所爲歴選其次無可於是左右竊議曰孝德可光弼聞之乃招孝德前問可得乎孝德曰得光弼問所加幾何人而可曰獨往則可加人不可光弼曰壯哉終問所欲對曰願備五十騎於壁門候旣入然後進及諸大軍鼓譟以借威他無所用光弼撫其背以遣孝德挾二矛䇿馬截流而渡半濟而懷恩賀曰克矣光弼曰未及何知其克懷恩曰觀其攬跂便辟可萬全者龍仙始見其獨來甚易之足不降鬛稍近將動孝德揺手示之若使其不動然龍仙不測又止孝德呼太尉使予致辭非他龍仙去三十歩與之言䙝罵如𥘉孝德息馬伺便乆之因瞋目曰賊識我乎龍仙曰誰曰我國之大將白孝德龍仙曰是猪狗乎孝德發聲虓然執矛突前城上萬鼓齊噪五十騎以繼進龍仙矢不及發環走堤上孝德以疋馬逐之胡騎五十皆披靡若猛犬之獵群狐也遂斬之提首而歸又曰至難得試衛尉卿至鳯翔爲都知兵馬使兼興平軍事甞有禆將靳元矅當合戰墮馬呼難得難得俯馬救之賊射難得中眉皮穿下蔽目難得乃㧞去箭并皮掣棄之勇冠三軍由是士衆多附之五代周史曰王殷遷奉國右廂都指揮使漢祖受命從征杜重威於鄴下殷與劉詞皆率先力戰矢中於首乆之出折鏃於口中以是漢祖嘉之三國典略曰茹茹㓂肆齊王自晉陽討之虜騎散走大軍遂還齊主率二千餘騎爲殿夜宿黄爪堆茹茹别部數萬騎扣鞍而進四面圍逼麾下齊十二安卧平明方起神色自若指畫軍形潰圍而出虜騎追擊之伏尸二十里獲奄羅辰妻子生口三萬餘令都督髙阿那肱率騎數千塞其走道那肱以兵少請益齊主更減其半那肱騎奮擊亦大剋捷戰不顧親史記曰項王爲髙爼置太公其上告漢王曰今不急下吾烹太公漢王曰吾與項羽俱北面受懷王約爲兄弟吾翁即迺翁必欲烹而翁即幸分我一杯羮項王怒欲烹之項伯曰天下事未可知且爲天下者不顧家雖殺之無益祗益禍耳項王從之}
