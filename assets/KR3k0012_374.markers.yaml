  - {type: variant, offset: 1338, length: 4, content: 汝南李光, SBCK: 趙昱}
  - {type: variant, offset: 1338, length: 0, content: '', WYG: 趙昱字元達年十三母病二月昱慘慼消瘦眼不交睫列子曰晉國苦盜有郄雍者能察盜於眉睫之間而得其情晉使視盜千百無遺趙文子曰周諺有言見淵中魚不祥郄雍必死俄而羣盜殺之裴元新語曰尹氏之鏡數睫照形蒸食曾不如三錢竹簟髑髏説文曰髑髏頭也廣雅曰髑髏謂之顙顱也魏畧曰王忠先因饑噉人五官將戯因從駕出行過冢間無何命俳取道邊死人髑髏繫着忠馬戲笑莊子曰列子行食於道見百嵗髑髏搴蓬而指之曰唯予與}
