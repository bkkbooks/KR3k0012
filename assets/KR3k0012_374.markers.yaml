  - {type: variant, offset: 1339, length: 347, content: 南李光字伯明為兗州母亡後歸視床處得亡母亂髮光持悲號氣絕復續又曰獻帝幸弘農郭汜虜略百官婦女有美髮者皆斷取之又曰曹操逼獻帝廢伏后以尚書令華歆郗慮副勒兵入宮收后后閉戶藏壁中歆就牽后出時帝在外殿后被髮徒跣行泣過訣曰不能復相活耶帝曰我亦不知命在何時魏志曰曹仁討關羽於樊于禁助仁秋大霖雨漢水溢禁等軍沒禁遂降吳文帝踐祚權遣還引見禁鬢髮皓白形容憔悴拜安遠將軍欲遣使吳先令謁高陵帝預於陵屋圖禁降伏之狀禁見慚恚發疾薨魏略曰明帝既嗣立追痛甄后之薨故郭太后以憂暴崩甄后臨沒以帝屬李夫人夫人說甄后見譖之禍不獲大歛被髮覆面帝哀恨流涕命殯葬太后皆如甄后故事魏氏春秋曰明帝天姿秀出立髮委地口吃少言而沉毅好斷吴志曰留贊為將臨敵必被髮叫天自抗音而歌左右應之戰無不捷王隱晉書曰陶侃為吏鄱陽孝廉與親人過侃宿母截髮以供賓諸客歎曰非賢母不, WYG: 未嘗死未嘗}
