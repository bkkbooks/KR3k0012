  - {type: variant, offset: 584, length: 367, content: 適伊川見被髮而祭于野者曰不及百年此其戎乎其禮先亡矣僖公二十二年秦晉遷陸渾之戎於伊川又昭元年曰齊侯田于莒盧蒲嫳見泣且請曰余髮如此種種余奚能為嫳慶封之黨種種短也放之于境自言衰老不能復為之公曰諾子雅曰彼其髮短而心甚長其或寢處我矣嫳普篾切又昭七年曰昔有仍氏生女黰黑有仍古諸侯也美髮發為黰而甚美光可鑑髮膚光色可以照人名曰玄妻以髮黑故又哀上曰公會吳子伐齊將戰公孫夏命其徒歌虞殯虞殯送葬歌曲示死也陳子行命其徒具唅玉唅玉亦示必死公孫揮命其徒曰人尋約吴髮短約繩也八尺為尋吳髮欲以繩貫其首又哀上曰太伯端委以治周禮仲雍嗣之斷髮文身臝以為飾豈禮也哉言其權時制宜以辟災害非以為禮也又哀下曰初衛侯自城上見己氏之妻髮美使髡之以為呂姜髢呂姜莊公夫人髢髮也穀梁傳哀公曰吳夷狄之國斷髮文身斷髮避蛟龍也論語憲問曰子曰微管仲吾其被髮左袵矣孝經曰身體髮膚受之父母不敢毀傷孝之始, SBCK: 謀}
