  - {type: variant, offset: 1315, length: 1, content: 盆, SBCK: 元海姿儀魁偉身長八尺四寸􅂡長三尺餘當心有赤毫三根長三尺六寸又前􅁗録曰符堅每日自王丞相薨後􅂡髮中白王丞相猛也宋書曰山隂公主淫恣見禇彦回恱之以白帝帝令就之彦回不從主曰君髭􅂡如㦸何無丈夫意南史曰宋武帝狎侮群臣各有稱目多􅂡者謂之羊三國典略曰齊許惇長􅂡垂至帶省中號爲長鬛公文宣甞因酒酣握惇湏稱羙遂以刀截之唯留一握惇不敢復長人號爲齊髯公又曰侯景使宋}
