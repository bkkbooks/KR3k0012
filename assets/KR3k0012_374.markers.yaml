  - {type: variant, offset: 1317, length: 0, content: '', WYG: 仙等執梁湘東王世子方諸及中撫軍長史鮑泉司馬虞預于郢州是日子仙等至百姓奔告方諸以五色雜綵編鮑泉白鬚對之雙六弗之信也告者既衆方命闔門縣門未下子仙已入方諸等膜拜而鮑泉遁于牀下子仙窺見泉素鬚間綵疑愕憚之及其被執莫不驚笑又曰李庶黎陽人魏大司農諧之子也以清卞毎接梁客徐陵謂其徒曰江北唯有李庶可語耳庶無鬚髯人謂天閹崔諶嘗翫庶曰教弟種鬚取錐刺而為竅以馬尾揷之世説諸崔多惡疾以呼沲為墓田故庶荅之曰先以方廻施貴族藝眉有效然後樹鬚邢邵笑謂諶曰卿不諳李庶何故犯之又曰周太子贇有失徳柱國王軌因内宴上夀捋武帝鬚曰可愛好老公恨後嗣弱耳唐書曰太宗幸翠㣲宫授司農卿李緯為民部尚書房元齡時在亰城留守㑹有自亰師来者太宗問曰元齡聞李緯拜尚書如何對曰元齡但云李緯大好髭鬚更無他語太宗遽改授緯洛州刺史又曰李勣病騐方鬚灰可以療之太宗乃自剪鬚為其和藥勣頓首見血泣以陳謝帝曰吾為社稷計耳不煩深謝又曰李光弼母有鬚數十莖長五尺六寸晏子曰湯長頭而髯伊尹蓬頭而髯孫卿子曰傅説之狀秃無鬚眉莊子曰孔子往見盜跖歸到東門外遇柳下季曰數旦不見車馬有行色得㣲往見跖耶孔子曰然吾所謂無病而自灸也疾走料虎頭編虎鬚㡬不免虎口哉孔叢曰子髙曰臣見臨屠商馬身脩八尺鬚髯如㦸面正紅白㓜女不敬之無徳故也又曰子思如齊齊之嬖臣美鬚眉立乎側君指而言曰貌可相易寡人不惜此鬚眉於先生也子思荅曰非所願也但欲君修禮義富百姓使伋得寄孥於君之境内則其庸多矣吕氏春秋曰豫讓欲報趙襄子滅鬚去眉自刑以變容抱朴子曰有古彊者自言四千嵗敢為虛言云見堯為人長大美鬚髮風俗通曰不舉生鬢鬚子俗説人十四五乃當生鬢鬚今生而有人防害父母也謹按周書靈王生而有髭王甚聖神亦克修其職諸侯服享二世休和安在其有害乎世説曰鍾毓兄弟警悟過人毎有嘲語未嘗屈躓毓㑹語聞安陸能作調試共視之於是與弟盛飾共載從東至西門一女子笑曰車中央殊髙二鍾都不覺車後一門生云向已被嘲鍾愕然門生曰中央髙者兩頭羶毓兄弟多鬚故以此調之又曰郄超為桓温記室叅軍有竒才多髭髯荆州為之稱髯㕘軍語林曰庾公道王尼子非唯事事勝人布置鬚眉亦勝人我輩皆出其轅下俗説曰有人詣謝益夀云向在劉丹陽坐見一客殊毛謝曰正是我家阿瞻瞻多鬚故云爾廣陵列士傳曰劉瑜字季節舉方正對䇿髙第人呼為長鬚方正列仙傳曰丁次卿漢順帝時人至娶婦家未見禮異婦出謁客鬚髯欝然其家謝之次卿舉手向婦鬚髯即去郭璞洞林曰東中郎㕘軍周稚琰封蠶蛾蛓蟲使璞射之璞曰射覆得此大落度必是蠶蛾及毛蠧稚琰饒鬚故因以調之也睫説文曰睫映目旁毛也釋名曰睫接也垂於匡而相接也漢書曰袁盎曰陛下居代時太后嘗病三}
