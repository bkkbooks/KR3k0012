  - {type: variant, offset: 1317, length: 0, content: '', SBCK: 仙等執梁湘東王丗子方諸及中撫軍長史鮑泉司馬虞預于郢州是日子仙等至百姓奔告方諸以五色􅄂綵編鮑泉白􅂡對之􅀟六弗之信也告者旣衆方命闔門縣門未下子仙巳入方諸等膜拜而鮑泉遁于牀下子仙窺見泉素髯間綵疑愕憚之及其􅀍執莫不驚􅀏又曰李庶􅀺陽人魏大司農諧之子也以清卞毎接梁客徐陵謂其徒曰江北唯有李庶可語耳庶無􅂡髯人謂天閹崔諶甞翫庶曰教弟種􅂡取錐刺而爲竅以馬尾揷之丗傳諸崔多惡疾以呼沲爲墓田故庶荅之曰先以方廻施貴族藝眉有效然後樹􅂡邢邵􅀏謂諶曰卿不諳李庶何故犯之又曰周太子贇有失徳柱國王􅁤因内宴上壽捋武帝􅂡曰可愛好老公恨後嗣弱耳唐書曰太宗幸翠微宫授司農卿李緯爲民部尚書房􅀇齡時在京城留守㑹有自京師來者太宗問曰􅀇齡聞李緯拜尚書如何對曰􅀇齡但云李緯大好髭􅂡更無他語太宗遽改授緯洛州刺史又曰李勣病驗方􅂡􅁅可以療之太宗乃自剪􅂡爲其和藥勣頓首見血泣以陳謝帝曰吾爲社稷計耳不煩􅀷謝又曰李光弼母有􅂡數十莖長五六寸晏子曰湯長頭而髯伊尹蓬頭而髯孫卿子曰傅說之狀秃無􅂡眉莊子曰孔子徃見盗跖歸到東門外適遇柳下季曰不見車馬有行色得微徃見跖耶孔子曰然吾所謂無病而自炙疾走料虎頭編虎􅂡幾不免虎口哉孔叢曰子髙曰臣見臨屠啇焉身脩八尺􅂡髯如㦸面正紅白㓜女不敬之無徳故也又曰子思如齊齊之嬖臣羙􅂡眉立乎側君指而言曰貌可相易寡人不惜此􅂡眉於先生也子思荅曰非所願也但欲君修禮義冨百姓使伋得􅀉孥於君之境内則其庸多矣吕氏春秋曰豫讓欲報趙襄子滅􅂡去眉自刑以變容抱朴子曰有古疆者自言四千歳敢爲虛言云見堯爲人長大羙􅂡髮風俗通曰不舉生􅁂􅂡子俗說人十四五乃當生􅁂􅂡今生而有妨害父母也謹按周書靈王生而有髭王甚神聖亦克脩其職諸侯服享二丗休和安在其有害乎丗說曰鍾毓兄弟警悟過人毎有嘲語未甞屈躓毓語㑹聞安陵能作調試共視之於是與弟盛飾共載從東門至西門一女子􅀏曰車中央殊髙二鍾都不覺車後一門生云向已􅀍嘲鍾愕然門生曰中央髙者兩頭羝毓兄弟多􅂡故以此調之又曰郄超爲桓温記室叅軍有竒才多髭髯荆州爲之稱髯叅軍語林曰􅁃公道王尼子非唯事事勝人布置􅂡眉亦勝人我軰皆出其轅下俗􅀃曰有人詣謝益夀云向在劉丹陽坐見一客殊毛謝曰正是我家阿曕瞻多􅂡故云尓廣陵列士傳曰劉瑜字季節舉方正對䇿髙第人呼爲長􅂡方正列仙傳曰丁次卿漢順帝時人至娶婦家未見禮異婦出謁客􅂡髯􅊊然其家謝之次卿舉手向婦􅂡髯即去郭璞洞林曰東中郎叅軍周稚琰封􅁞蛾蛓蟲使璞射之璞曰射覆得此大落度必是􅁞蛾及毛蠹稚琰饒􅂡故因以調之也睫說文曰睫映目旁毛也釋名曰睫接也捶於匡而相接也漢書曰􅀽盎曰陛下居代時太后甞病二}
