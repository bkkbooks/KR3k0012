  - {type: variant, offset: 1278, length: 2, content: 和熹, SBCK: 温序拜謁者遷護羌校尉序行郡至襄武爲隗􅅝將苟宇所拘劫宇謂序曰子􅀂與我并慮同力天下可圖也序大怒叱宇因以節撾殺人宇曰此義士死節可賜以劒序受劒銜􅂡於口顧左右曰旣爲賊所逼殺無令􅂡汚土遂伏劒死續漢書曰司馬直字叔異㓗白羙􅂡髯容貌儼然郷閭奉之如神魏志曰􅀄􅂫則及臨淄侯植聞魏氏代漢皆發服悲哭文帝聞植如此常從容曰吾應天受禪而聞有哭者何也則謂爲見問髯悉張欲正論以對侍中傅選搯則曰不謂卿也乃止又曰崔琰聲姿髙暢眉目踈㓪􅂡長四尺甚有威重朝士瞻望而太祖亦嚴憚焉後有曰琰怨謗者罰爲徒􅀠使視之辝色無撓太祖令曰琰雖見刑而通賔客虬􅂡直視􅀂有所忽遂賜死又曰任城王章爲北中郎將討烏桓有功歸太祖喜捋章􅂡曰黄􅂡兒定大竒魏略曰劉雄鳴詣太祖太祖執其手謂曰􅀌方入關夢得一神人即汝耶乃厚賜之後亡太祖平漢中來降太祖捉其􅂡曰老賊眞得汝矣又曰任城王性剛勇而黄􅂡北伐烏丸王聞之曰我黄􅂡定可使劉備使劉封挑戰王罵曰賣履舎長而使假子拒汝公乎我黄􅂡來擊之呉録曰朱桓還屯濡須權祖之桓奉觴曰臣當逺去願一捋陛下􅂡無復恨權慿几前席桓進捋􅂡曰臣今日眞謂捋虎􅂡也獻帝春秋曰張遼問呉降人曰向有紫髯將軍長上短下大便馬善射是誰降人荅曰是孫㑹稽也蜀志曰張􅁉爲劉璋從事侍坐其人饒􅂡先主嘲之曰昔吾爲涿縣特多毛姓東西南北皆諸毛也涿令稱曰諸毛繞涿居乎􅁉荅曰昔有作上黨潞長遷爲涿令者去官還家時人與書欲署潞則失􅃰署􅃰則失潞乃署曰涿君先主無湏故􅁉以此及之也先主常銜其不遜後誅之又曰馬超來降關羽護前書問諸􅁑亮亮荅書曰孟超當與益德争先未􅀂髯羽之絶倫羽多􅂡故亮謂之髯晉書曰羊祜旣卒武帝素服哭之甚哀是日大寒帝涕淚霑􅂡皆爲冰焉}
