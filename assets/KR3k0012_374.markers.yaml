  - {type: variant, offset: 1278, length: 2, content: 和熹, WYG: 温序拜謁者遷䕶春校尉序行郡至襄武為隗囂將苟宇所拘劫宇謂序曰子若與我并慮同力天下可圖也序大怒叱宇因以節撾殺人宇曰此義士死節可賜以劒序受劒銜鬚於口顧左右曰既為賊所逼殺無令鬚汚土遂伏劒死續漢書曰司馬直字叔異潔白美鬚髯容貌儼然鄉閭奉之如神魏志曰初蘇則及臨淄侯植聞魏氏代漢皆發服悲哭文帝聞植如此常從容曰吾應天受禪而聞有哭者何也則謂為見聞鬚悉張欲正論以對侍中傳選搯則曰不謂卿也乃止又曰崔琰聲姿髙暢眉目踈朗鬚長四尺甚有威重朝士瞻望而太祖亦嚴憚焉後有白琰怨謗者罰為徒𨽻使視之辭色無撓太祖命曰琰雖見刑而通賔客虬鬚直視若有所忽遂賜死又曰任城王章為北中郎將討烏桓有功歸太祖喜捋章鬚曰黄鬚兒定大竒魏畧曰劉䧺鳴詣太祖太祖執其手謂曰孤方入關夣得一神人即汝耶乃厚賜之後亡太祖平漢中来降太祖捉其鬚曰老賊真得汝矣又曰任城王性剛勇而黄鬚北伐烏丸王聞之曰我黄鬚定可使𤣥徳使劉封挑戰王罵曰賣履舍長而使假子拒汝公乎黄鬚来擊之吳録曰朱桓還屯濡湏權祖之桓奉觴曰臣當逺去願一捋陛下鬚無復恨權憑几前朱桓進捋鬚曰臣今日真謂捋虎鬚也獻帝春秋曰張遼問吳降人曰向有紫髯將軍長上短下大便馬善射是誰降人荅曰是孫㑹稽也蜀志曰張裕為劉璋從事侍坐其人饒鬚先主嘲之曰昔吾家涿縣特多毛姓東西南北皆諸毛也涿令稱曰諸毛繞涿居乎裕荅曰昔有作上黨潞長遷為􅃰令者去官還家時人與書欲署潞則失路乃署曰潞涿君先主無鬚故裕以此及之也先主常銜其不遜後誅之又曰馬超来降雲長護前書問諸葛亮亮荅曰孟超當與翼徳争先未若髯翁之絶倫雲長多髭鬚故亮謂之髯晋書曰羊祜既卒武帝素服哭之甚哀是日大寒帝涕淚霑鬚皆為冰焉}
