  - {type: variant, offset: 1941, length: 305, content: 而髮皓白武帝問其故曰臣思愆於內而髮變於外當時稱之唐書曰高祖竇皇后生而髮垂過頸三歲髮與身齊又曰龜茲國男女皆剪髮垂與項齊唯王不剪髮新羅國其婦人髮繞頭以綵為飾髮甚長美家語曰顏回魯人字子淵年二十九髮早白韓子曰文公時宰人上炙而髮繞之事具炙門又曰昔齊桓宮中有三市婦倡三百被髮而御婦人淮南子曰萬術曰理髮竈前婦安夫家帝王世紀曰老聃初生而髮白故號老子呂氏春秋曰殷湯剋夏而大旱湯乃以身禱於桑林剪其髮自以為犧牲祈福於上帝山海經曰脩般民白民其人被髮曹瞞傳曰太祖嘗行過麥中令士卒無敗麥犯者死騎士皆下馬持麥以相付時太祖馬騰入麥中太祖曰制法而自犯之何以帥下然孤為軍帥不可殺請自刑因援劍割髮置地許逵別傳曰薊子訓齊人有神術人髮白者請子訓但與對坐, SBCK: 今名爲}
  - {type: variant, offset: 1941, length: 74, content: 而髮皓白武帝問其故曰臣思愆於內而髮變於外當時稱之唐書曰高祖竇皇后生而髮垂過頸三歲髮與身齊又曰龜茲國男女皆剪髮垂與項齊唯王不剪髮新羅國其婦人髮繞頭以綵, WYG: 今名}
