  - {type: variant, offset: 1801, length: 12, content: 卿犯鹵簿應髡刑節俛受剔覺, SBCK: 然髑髏曰死無君於上無臣於下亦無四時之事泛然以天地爲春秋雖南面王樂不能過也莊子不信曰吾使司命復生子形爲子骨肉肌膚反子父母妻子閭里知識子欲之乎髑髏􅀷矉蹙頞曰吾安能弃南面王樂而復爲人之勞乎南州異物志曰烏滸人得髑髏破之以飲酒盛弘之荆州記曰長沙浦坼縣有吕蒙冡中有髑髏極大蒙形旣長偉疑即蒙髑髏也裴淵之廣州記曰盧}
