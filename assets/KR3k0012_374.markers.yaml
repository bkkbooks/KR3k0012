  - {type: variant, offset: 2247, length: 1272, content: 語宿昔間髮皆黑樊英別傳曰英被髮忽拔刀斫舍中妻問故曰郄生道遇鈔郄生還云道遇賊賴被髮老人相救得全郄生名巡字仲信陳郡夏陽人能傳英業黃庭經曰髮神名蒼華列仙傳曰容成公黃帝善補導事髮白更黑甯先生稷丘君髮白更黑甯先生被髮鼓琴赤斧餌丹砂毛髮皆赤阮丘被髮覆耳成璜道士兒丘與老子黃庭經讀三遍通之俱入浮陽山白髮更黑鬚長三尺餘神異經曰東荒山中有大石室東王公居之長一丈頭髮皓白身人形而虎尾與一玉女更投壺又曰西方有人焉不飲不食被髮東走已往覆來其婦恒追掔錄之不肯聽止婦頭亦被髮名曰狂一名顛一名覆此人夫妻與天地俱生狂走東西以投晝夜異苑曰有人誤吞髮便得病但欲咽豬脂張口時喉中有一頭出受膏乃取小鉤餌而引之得一物長二尺餘其形似虵而悉是脂縣於屋間旬日融盡唯髮在焉列女傳曰吳伯陽妻顧昭君早寡剪髮以明志又曰樂羊學書其妻貞義截髮以供其費又曰廣漢馮季宰妻者李氏之女名珥字進早寡無嗣奉養繼姑守心純固以義自防珥母愍其孤苦陰有所許珥斷髮自明鄉人稱之陳留風俗傳曰小黃縣者宋地陽武東黃鄉也因黃水以名縣沛公起兵野戰喪皇妣于黃鄉天下平定乃使使者梓棺招魂幽野於是丹蛇在水自洒濯入梓棺其浴處有遺髮故謚曰昭靈夫人益部耆舊傳曰蜀郡公乘會妻同縣張氏女也會早卒後欲問者女乃斷髮割耳以明不嫁車頻秦書曰符堅建元十八年新羅國獻美女國在百濟東其人多美髮髮長丈餘林邑國記曰朱崖人多長髮漢時郡守貪殘縛婦女割頭取髮由是叛亂不復賓伏廣志曰黃頭夷髮黃如苕帚戴廷之西征記曰陜縣大城西北角水漫湧起勃鬱方數十丈有如物居水中父老云銅翁仲頭髮常與水齊晉軍至髮不復出唯見水黑嗟嗟有聲聲聞數里翁仲本在大司馬門外為賊所徙至此而沒譚藪曰後魏盧景裕生而頭髮白有四十九莖因名曰白頭王子年拾遺錄曰帝嚳高辛氏娶於諏氏女女生而髮與足齊墜地能言乃納於帝又曰張儀蘇秦二人共遞剪髮以相活或傭力寫書行遇聖人之文無以題記則以墨畫於掌內及股裹夜還更以竹寫之晉左思白髮賦曰星星白髮生於鬢垂雖非青蠅穢我光儀策名觀國以此見疵將鑷將拔好爵是縻白髮將拔惄然自訴稟命不幸值君年暮逼迫秋霜生而皓素如覽明鏡惕然見惡朝生晝拔何罪之故觀橋觀柚一皜一曄貴其素華匪尚綠葉願戢子手攝子之鑷咨尔白髮觀世之塗靡不追榮貴華賤枯赫赫閶闔藹藹紫廬弱冠來仕童髦獻謨甘羅乘軒子奇剖符英英終賈高論雲衢拔白就黑此自在吾白髮臨拔瞋目號呼何我之冤何子之愚甘羅自以辯惠見稱不以髮黑而名著賈生自以良才見異不以厚鬢而獲舉聞之先民國用老成二老歸周周道肅清四皓佐漢漢德光明何必去我然後要榮咨尔白髮事各有以尔之所言非不有理曩尊耆耋今薄舊齒皤皤榮期皓首田里雖有二毛河清難俟隨時之宜見歎孔子白髮辭盡誓以固窮昔臨玉顏今從飛蓬髮膚至昵尚不克終聊用擬辭比之國風鬢說文曰鬢頰髮也釋名曰其上連髮曰鬢鬢賓也賓崖也為面額之崖岸也晉書曰魏造凌雲殿榜未題匠誤釘之使韋仲將縣撜書之比訖髮鬢盡白還戒子孫宜絕此法撜音鐙神仙傳曰薊子訓鄉曲諸老鬢髮白者使宿昔之間皆黑崔豹古今注曰魏文帝宮人絕所愛者有莫瓊樹薛夜來陳尚衣陳巧笑瓊樹始制為蟬鬢望之縹緲如蟬翼故曰蟬鬢述異記曰尹雄年九十左鬢生角長半寸吳質表曰質已四十三矣白髮生鬢髻說文曰髻結髮也漢書曰尉他魋髻服虔注曰今兵推頭結也, SBCK: 冡}
