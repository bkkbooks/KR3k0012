  - {type: variant, offset: 3520, length: 164, content: 漢書五行志曰桓帝元嘉中京師婦女作墮馬髻墮馬髻者側在一邊自梁冀家所為京師背效天戒若曰冀婦女將收捕吏卒頓曳令髻傾邪東觀漢記曰梁鴻妻椎髻著布衣操作具而前鴻大喜曰此真梁鴻妻也能奉我矣字之曰德曜孟光又曰馬廖上表長樂宮曰長安語曰城中好高髻四方高一尺王隱晉書曰賈后作頡子髻太子見頡之象干寶晉紀曰初賈后造首紒以繒縛其髻天下化之名頡子紒也紒戶計切, SBCK: ''}
