  - {type: variant, offset: 2016, length: 230, content: 飾髮甚長美家語曰顏回魯人字子淵年二十九髮早白韓子曰文公時宰人上炙而髮繞之事具炙門又曰昔齊桓宮中有三市婦倡三百被髮而御婦人淮南子曰萬術曰理髮竈前婦安夫家帝王世紀曰老聃初生而髮白故號老子呂氏春秋曰殷湯剋夏而大旱湯乃以身禱於桑林剪其髮自以為犧牲祈福於上帝山海經曰脩般民白民其人被髮曹瞞傳曰太祖嘗行過麥中令士卒無敗麥犯者死騎士皆下馬持麥以相付時太祖馬騰入麥中太祖曰制法而自犯之何以帥下然孤為軍帥不可殺請自刑因援劍割髮置地許逵別傳曰薊子訓齊人有神術人髮白者請子訓但與對坐, WYG: ''}
