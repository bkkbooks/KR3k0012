  - {type: variant, offset: 1163, length: 0, content: '', SBCK: 康王之號又曰㝷陽柴桑縣城晉永和中有童謠呼爲平石城時人僉謂平滅石之徴也後桓􅀇􅆲位晉帝爲平固王恭帝爲石陽公俱遷於此城又曰㝷陽張允家在夲郡郡南有古城張少貧約屢徃遊憇忽有一老公來與張言因問之此城何名荅曰吾不知爲南郡城耳言訖便去不知所之張旣岀}
  - {type: variant, offset: 1163, length: 0, content: '', WYG: 康王之號又曰潯陽柴桑縣城晉永和中有童謡呼為平石城時人僉謂平滅石之徵也桓𤣥簒位晉帝為平固王恭帝為石陽公俱遷於此城又曰潯陽張允家在本郡郡南有古城張少貧約屢往逰憩忽有一老父來與張言因問之此城何名答曰吾不知為南郡城耳言訖便去不知所之張既出}
  - {type: variant, offset: 1163, length: 0, content: '', krp: 康王之號又曰㝷陽柴桑縣城晉永和中有童謠呼爲平石城時人僉謂平滅石之徴也後桓玄篡位晉帝爲平固王恭帝爲石陽公俱遷於此城又曰㝷陽張允家在夲郡郡南有古城張少貧約屢徃遊憇忽有一老公來與張言因問之此城何名荅曰吾不知爲南郡城耳言訖便去不知所之張旣岀}
