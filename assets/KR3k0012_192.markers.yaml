  - {type: variant, offset: 1177, length: 2, content: 藏庫, SBCK: 鹿城白沙城晉咸康中張魴甚有惠政白鹿羣游取一而獻之故因以爲名􅀽山松冝都記曰限山縣有山名下魚城四面絶崖兩道可上皆險山周廻可二十里上有林木池水里民種於山下􅀳永嘉亂土人登此避賊賊守之經年食魚擲下與賊以示不窮賊遂退散因以此爲下魚城呉地記曰咠門外越城者越來伐呉呉王}
