  - {type: variant, offset: 1177, length: 2, content: 藏庫, krp: 鹿城白沙城晉咸康中張魴甚有惠政白鹿羣游取一而獻之故因以爲名袁山松冝都記曰限山縣有山名下魚城四面絶崖兩道可上皆險山周廻可二十里上有林木池水里民種於山下晉永嘉亂土人登此避賊賊守之經年食魚擲下與賊以示不窮賊遂退散因以此爲下魚城呉地記曰咠門外越城者越來伐呉呉王}
  - {type: variant, offset: 1180, length: 0, content: '', SBCK: 姑􅂫築此城以逼之又有越來溪又曰越來溪西魚城者呉王旣遊姑蘇築此城以飬魚又曰魚城之西有故城長老云築以釀酒今俗人呼之爲苦酒城又曰匠門外鴨城者吳王築此城以飬鴨又曰婁門外鷄陂者呉王飬鷄城又曰海渚有呉王闔閭與越結怨相伐築城名曰南武城以禦越盛弘之荆州記曰馬牧城東三里有蜂城故老相傳云飢年民結侣拾蜂止憇其中故因爲城又云城隨門􅀔上大下尖其形似蜂故有蜂號二稱莫知所附故並載焉又曰當陽縣東南有麥城城東有驢磨城掎角城傳云伍員造此二城以攻麥城故假驢磨之名又曰樊城西北有鄾城即春秋所稱鄾子之國光武云宛最強鄾次之即謂此鄾城西北行十餘里鄧侯呉離之國爲楚文王所滅今爲鄧縣鄧城西百餘里有榖城伯綏之國城門有石人焉刋其腹云摩鞬愼莫言疑此亦周太廟金人緘口銘背之流也又曰秭歸縣西有楊城周廻十餘里即熊繹所居荆州圖記曰江夏郡所治夏口城其西南角因磯爲髙崇墉枕流上則過眺山川下則激浪﨑嶇是曰黄鵠磯寔舟人之所艱也又曰白帝城西臨大江東南髙二百丈西北髙一千丈又曰鄧城有樊城是樊仲山甫所封也又曰沌陽縣有却月城西一里有馬城也又曰夷陽縣南對岸有陸抗故城即山爲墉西面天險上有歩闡故城又曰新野郡魏三公城左右傳漢時三公餞離處也伏滔北征記曰梁國名故宋國微子所封城再重大城梁孝王所築孟粤北征記曰許昌在洛水之}
