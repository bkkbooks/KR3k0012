  - {type: variant, offset: 1199, length: 2, content: 名列, WYG: 五大夫城河北記云易縣有五公城王潭不從王莽潭子興生五子避隠於此世祖並封為侯元才北平侯顯才蒲平侯益才安嘉侯季才唐侯秀才中山侯號五侯其西三十里有五大夫城説與此同説苑曰中行穆子圍鼓人有以城叛來降者穆子不許軍吏曰師徒不勤得城何故不受穆}
