  - {type: variant, offset: 1176, length: 0, content: '', SBCK: 魯陽開水歴衡山西南經皇后城建武元年光武遣侍中􅀓俊持節迎光烈皇后於濟陽後發兵三百餘人􅀫衛皇后道路歸京師蓋稅舎所在故得其名矣又曰漢水東合甲水南流經金井城又曰漢水東經方石城在髙原上髙十餘丈四面臨平形若覆盆其城􅀫是流􅄂聚居故丗亦謂流􅄂城又曰易水西山寛中谷東經五大夫城昔北平侯王潭所居王莽之亂生五子並避亂隱居北山故其後居丗以爲五大夫城河北記云易縣有五公城王潭不從王莽潭子興生五子避隱於此丗祖並封爲侯元才北平侯顯才蒲平侯益才安嘉侯季才唐侯所謂中山五侯其西三十里有五大夫城說與此同說􅁐曰中行穆子圍鼔鼔人有以城叛來降者穆子不許軍吏曰師徒不勤得城何故不受穆子曰有以吾城叛者吾所惡也人以城來獨何賞􅁗州記曰天水郡治上邽城前有湖中冬夏中停無增减天水取名由此湖也又曰金城郡漢昭元始六年所置應劭云􅀄築城得金故曰金城凡城皆稱金言其固也故墨子稱金城湯池齊地記曰即墨城東西百八十里平昌城髙六丈有臺有井與荆水通失物於井得之於荆水又神龍出入焉故一名龍城三齊略記曰陽庭城東西二百五十里青城山􅁗始皇登此山造石城入河三十里臨海射魚方四百里水変血色今猶尓也􅄙道虎齊記曰不夜城在陽庭東南一百二十里淳于髠稱海童作妖城古有日夜出見於東境故萊子此城以不夜爲名異之夢書曰城爲人君一縣尊也夢見城者見人君也夢築新城有功名新序曰梁伯湎於酒􅁋於色心惛而耳塞好作大城而不居民罷甚武當山記曰魏興錫縣有長利城父老伯相傳云是長安土所築邑塞於餘城王韶之始興記曰有任將軍城􅁗南海尉任囂城也合逕有三城馬鞍城}
