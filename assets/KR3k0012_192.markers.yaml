  - {type: variant, offset: 2689, length: 1, content: 市, WYG: 城凡城皆稱金言其固也故墨子稱金城湯池齊地記曰即墨城東西百八十里平昌城髙六丈有臺有井與荆水通失物於井得之於荆水又神龍出入焉故一名龍城三齊記略曰陽庭城東西二百五十里青城山秦始皇登此山造石城入河三十里臨海射魚方四百里水變血色今猶爾也解道虎齊記曰不夜城在陽庭東南一百二十里淳于髠稱海童作妖城古有日夜出見於東境故莱子城此以不夜為名夣書曰城為人君一縣尊也夣見城者見人君也夣築新城有功名新序曰梁伯湎於酒滛於色心惛而耳塞志好為城而不居民罷甚武當山記曰魏興錫縣有長利城父老相傳云是長安土所築也王韶之始興記曰有任將軍城秦南海尉任囂城也合逕有三城}
  - {type: page-break, offset: 2689, content: '', id: KR3k0012_WYG_192-11b, image: WYG0894/WYG0894-0698b.png}
