  - {type: variant, offset: 677, length: 1, content: 趙, WYG: 朱序遷凉州刺史鎮襄陽符堅遣軍圍序序母韓氏自行城謂西北角當先弊遂領百餘婢及城中女丁築二十餘丈賊攻新築不敗遂引退襄陽謂之夫人城晉載記曰赫連勃勃以叱于呵利領將作大匠乃蒸土築城以錐刺之錐入一寸即殺作者不入即殺行錐者勃勃以為忠沈約宋書曰檀道濟見收脱幘投地曰乃壊汝萬里長城又曰氐師楊難當寇漢中魏興太守薛健保黄金城崔鴻十六國春秋北燕録曰初燕帝光始中丁零氐楊道獵於白鹿山為契丹所獲流漂塞外至大難北及黎大國逐水草而射獵為業至十月乃收葦以水澆令凍髙一丈五尺東北七十八里南北二十餘里名陵城居於其中又夏録曰赫連勃勃下書曰古人制起城邑或因山水或以義立名今城都已建萬堵斯作克城弗逺宜有美名朕方統一天下君臨萬國可以統萬為名燕書曰太祖皝光始八年下令唐柱等築龍城立門闕宫殿廟園籍田後遂改為龍城縣北齊書曰唐邕字道和為給事黄門中書舎人文宣出塞邕必陪從文宣嘗登幷州童子佛寺望幷州曰此何等城也或曰金城湯池天府之國也文宣曰我謂唐邕是金城此非也唐書曰景雲二年三月張仁愿於河北築三受降城先是朔方與突厥以河下為界北有拂雲祠突厥每入寇必禱祠候氷合而入時黙啜西擊仁愿奪取漠南城首尾相應以拂雲祠為中城東西相去各四百里背據津濟遥相應接北拓三百餘里於牛頭胡那山北置􅇏堠百八十自是突厥不得度山放牧朔方更無寇掠減鎮兵數萬人又曰天寳二年正月二十八日築神都羅城號曰金城又曰天寳六載十二月築㑹昌縣城又置百司及諸公卿邸第又曰建中元年五月築奉天城四年十月上避難于奉天初術士桑道茂奏請城奉天為}
