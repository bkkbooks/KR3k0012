  - {type: variant, offset: 677, length: 1, content: 趙, krp: 朱序遷梁州刺史鎭襄陽符堅遣軍圍序序母韓氏自行城謂西北角當先弊遂領百餘婢及城中女丁築二十餘丈賊攻新築不敗遂引退襄陽謂之夫人城晉載記曰赫連勃勃以叱于呵利領將作大匠乃蒸土築城以錐刺之錐入一寸即殺作者不入即殺行錐者勃勃以爲忠沈約宋書曰檀道濟見收脫幘投地曰乃壞汝万里長城又曰氐師楊難當㓂漢中魏興太守薛健據黄金城崔鴻十六國春秋北燕録曰𥘉後燕光帝始中丁靈民楊道獵於白鹿山爲契丹所獲流漂塞外至大難北及黎大國逐出草以射獵爲業至十月乃收葦爲城水澆令凍髙一丈五尺東北七八十里南北二十餘里名凌城居於其中又夏録曰赫連勃勃下書曰古人制起城邑或因山水或以義立名今都城巳建万堵斯作克成弗逺冝有美名朕方統一天下君臨万國可以統万爲名焉燕書曰太祖皝八年使唐柱等築龍城立門闕宮殿廟園籍田後遂改爲龍城縣北齊書曰唐邕字道和爲給事黄門中書舎人文宣岀塞邕必陪從文宣甞登并州童子佛寺望并州曰此何等城也或曰金城湯池天府之國也文宣曰我謂唐邕是金城此非也唐書曰景雲二年三月張仁愿於河北築三受降城先是朔方與突厥以河爲界北有佛雲祠突厥每入宼必禱祠候冰合而入時黙啜西擊仁愿乗虚奪取漠南之地築三城首尾相應以拂雲祠爲中城東西相去各四百里皆據津濟遥相應接北拓三百餘里於牛頭胡邦山北置烽候百八十自是突厥不得度山放牧朔方更無宼掠減鎭兵數万人又曰天寳二年正月二十八日築神都羅城號曰金城又曰天寳六載十二月築會昌城於陽所置百司及公卿邸第又曰建中元年五月築奉天城四年十月上避難于奉天𥘉術士桑道茂奏請城奉天爲}
  - {type: variant, offset: 679, length: 7, content: 倫既還謟事賈后, SBCK: 者之居至是方驗又曰貞元九年二月詔復築鹽州先是貞元三年城爲吐蕃所壞自後塞外無堡障犬戎入宼旣城之後邊患頓息五經異義曰天子之城髙九仞公侯七仞伯五仞子男三仞白虎通曰天子曰崇城言崇髙也諸侯曰干城言不敢自專禦於天子也周書曰周公作成周于土中立城方千六百二十丈郛方七十二里南繫洛水北}
