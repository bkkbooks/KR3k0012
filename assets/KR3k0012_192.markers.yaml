  - {type: variant, offset: 2691, length: 1, content: 市, WYG: 鞍城白鹿城晉咸康中張魴甚有恵政白鹿羣㳺取一而獻之故因此為名袁山松宜都記曰佷山縣有山名下魚城四面絶崖兩道可上皆險山周廻可二十里上有林木池水里許昔永嘉亂土人登此避賊賊守之經年食魚擲下與賊以示不窮賊遂退散因以此為下魚城吳地記曰閶門外越城者越來伐吳王}
  - {type: page-break, offset: 2691, content: '', id: KR3k0012_WYG_192-12b, image: WYG0894/WYG0894-0698d.png}
  - {type: variant, offset: 2693, length: 0, content: '', WYG: 姑蘇築此城以逼之又有越來溪又曰越來溪西魚城者吳王既逰姑蘇築此城以養魚又曰魚城之西有故城長老云築以釀酒今俗人呼之為酒城又曰婁門外鴨城者吳王築此城以養鴨又曰匠門外雞陂者吳王養雞城又曰海渚有吳王闔閭與越結怨相伐築城名曰南城以禦越盛𢎞之荆州記曰牧馬城}
