  - {type: variant, offset: 2674, length: 202, content: 東按金市在臨商觀西兌為金故曰金市馬市在東舊置丞焉又酈道元注水經云馬市即嵇康為司馬昭所害之處蜀本紀曰老子為關令尹喜著道經臨別曰子行道千日後於成都青羊肆尋吾今為青羊觀是也郡國志曰幽州有邠亭新論云添縣邠亭本大王所部其人相與夜市不為則有重害焉又曰始皇陵有銀蠶金鴈以多奇物故俗云秦王地市又曰郢城內有市名蒲胥故南齊校尉府也又曰越州梅市即梅福為市門卒之所又曰齊桓公宮內有七市韓娥東之齊乏糧過雍門鬻歌於市乃此也又曰雍州富, SBCK: 太}
