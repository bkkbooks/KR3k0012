  - {type: variant, offset: 825, length: 247, content: 富者在乎豐人非獨謂府庫盈倉廩實非上天所降皆資之於人人困則國虛矣洞冥記曰元狩四年將夕有黃髮叟懷內探徑尺玉以授帝帝以玉還寶庫即龍玉也王子年拾遺記曰縻笁用陶朱公計術日益億萬之利貲擬王家有寶庫千間世說曰郄公大聚歛錢數千萬嘉賓甚不同嘗朝且問訊郗家法子弟不坐因倚語移時遂及錢貨事郗云汝正當欲得我錢耳乃聽一日開庫任意用郗公始止謂損數百萬許嘉賓遂一日中乞與人都盡郗公聞之驚怪不能巳拾遺錄曰太上皇以寶劍賜高祖及呂后藏於瑤庫守者見白氣從戶中出如龍虵呂氏更瑤庫名曰靈金藏及諸呂擅權白氣亦滅惠帝即位以此貯禁兵名曰靈金府, SBCK: 紫塞}
