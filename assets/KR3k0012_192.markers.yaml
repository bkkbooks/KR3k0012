  - {type: variant, offset: 1182, length: 146, content: 有屋一百七十四間爾雅秋為白藏因以為名列子曰范氏之藏大火商丘開入火往還無難色埃不漫身不燋子華之客乃謝之晉摯虞武庫屋銘曰有財無義惟家之殃無愛糞土以毀五常張衡西京賦曰武庫禁兵設在蘭錡曹毗魏都賦曰百藏之庫戎儲攸歸潘岳詩曰微火不戎延我寶庫廄說文曰廄馬舍也釋名曰廄鳩也聚也牛馬之所聚也詩曰乘馬在廄左傳曰莊, SBCK: 方圎}
