  - {type: variant, offset: 1655, length: 1006, content: 西二十五里王莽使司徒王尋發長安宿此春秋佐助期曰廄星傳令神名詩時市古史考曰神農作市世本祝融作市說文曰市買賣之所也古今注曰闤市垣也闠市門也風俗通曰俗言市井者言至市鬻賣當須於井上洗濯令物鮮潔然後市案二十畝為一井今因井為市禮記曰用器不中度不鬻於市布帛精麤不中數幅廣狹不中量不鬻於市奸色亂正色不鬻於市也周禮曰大市日昃而市百族為主朝市朝時而市商買為主夕市夕時而市販夫販婦為主法云主者言其多也百族百姓也又曰凡國凶荒札喪則市無征又曰國君過市刑人赦夫人過市罰一幕世子過市罰一帟命夫過市罰一蓋命婦過市罰一帷注曰市者交利而行刑之處也君子無故不遊觀焉史記曰呂不韋撰春秋成牓於秦市曰有人能改一字者賜金三十斤後漢書曰張楷字公超通嚴氏春秋古文尚書門徒常數百人賓客慕之自父黨夙儒皆造門焉車馬填街黃門及貴戚之家皆起舍巷次以候過客來往之利楷疾其如此輒徙避之家貧無以為業常乘驢車至縣賣藥足給食者輒還鄉里司隸舉茂才除長陵令不之官隱居弘農山學者隨之所居成市後華陰山中遂有公超市又曰王充家貧無書嘗遊洛陽市閱所賣書一遍而誦之晉書曰羊祐疾漸篤乃舉杜預自代尋卒時年五十八帝素服哭之甚哀是日大寒帝涕淚霑鬚皆為冰南州人方市聞祜喪莫不號慟罷市巷哭者聲相接吳守邊將士亦為之泣其仁德感人如此韓子曰龐共與魏太子質於邯鄲共謂魏王曰今一人言市有虎王信乎王曰否二人言王信乎曰否三人言王信乎王曰寡人信矣共曰夫市無虎明矣三人言成市虎今邯鄲去魏遠於市謗臣者過於三人願王察之越絕書曰伍子胥至吳徒跣被髮乞於吳市三日市正疑之而導於闔閭曰市中有非常人徒跣被髮乞於吳市三日吳闔閭曰吾聞荊王殺其臣伍奢而非其罪其子胥勇且智彼必經諸侯之邦可以報其父之讎者王即使召子胥入吳王下階迎而唁數之曰吾知子非常人也何素窮如此子胥跪而垂泣曰胥父無罪而楚王殺之并其子子胥得道遁逃出走唯可以歸骸骨者唯大王哀之吳王曰諾上殿與語三日語無復者王乃令邦中無貴賤長少有不聽子胥教者猶不聽寡人之罪至死不赦又曰吳市者春申君所造闕兩城以為市在湖里班固兩都賦曰內則街衢洞達閭閻且千九市開場貨別隧分人不得顧車不得旋闐城溢郭傍流百廛紅塵四合煙雲相連宮闕記云長安市有九所各方二百六十六步六市在道西三市在道東西里為市凡九市致九州之人在突門夾橫橋大道南又有當市觀又曰旗亭樓在社門大道南又有當市觀張衡西京賦云郭開九市通闤帶闐旗亭五重俯察百隧是也又按郡國誌云長安大俠萬子夏居柳市司馬季主卜東市西市在醴泉坊隋曰利人市因有西市署洛陽記曰三市大市名也金市在大, SBCK: ''}
