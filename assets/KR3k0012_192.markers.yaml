  - {type: variant, offset: 2059, length: 328, content: 居成市後華陰山中遂有公超市又曰王充家貧無書嘗遊洛陽市閱所賣書一遍而誦之晉書曰羊祐疾漸篤乃舉杜預自代尋卒時年五十八帝素服哭之甚哀是日大寒帝涕淚霑鬚皆為冰南州人方市聞祜喪莫不號慟罷市巷哭者聲相接吳守邊將士亦為之泣其仁德感人如此韓子曰龐共與魏太子質於邯鄲共謂魏王曰今一人言市有虎王信乎王曰否二人言王信乎曰否三人言王信乎王曰寡人信矣共曰夫市無虎明矣三人言成市虎今邯鄲去魏遠於市謗臣者過於三人願王察之越絕書曰伍子胥至吳徒跣被髮乞於吳市三日市正疑之而導於闔閭曰市中有非常人徒跣被髮乞於吳市三日吳闔閭曰吾聞荊王殺其臣伍奢而非其罪其子胥勇且智彼必經諸侯之邦可以報其父之讎者王即使召子胥入吳王下階迎而唁數之曰吾知子非常人也何素窮如此子胥跪而垂泣曰胥父無罪而楚王殺之并其子子胥, WYG: 置應劭云初築城}
