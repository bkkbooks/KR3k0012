  - {type: variant, offset: 1804, length: 0, content: '', SBCK: 以戯弄臣􅀚王無意趙王城邑臣復取璧大王必欲急臣頭今與璧俱碎於柱矣王恐其破璧乃亂謝固請相如使從他道以璧還趙又曰張儀已學而游諸侯常從楚相飲已而楚相亡璧門下意儀掠笞數百不服釋}
  - {type: page-break, offset: 1804, content: '', id: KR3k0012_SBCK_806-5b}
  - {type: variant, offset: 1804, length: 0, content: '', krp: 以戯弄臣觀王無意趙王城邑臣復取璧大王必欲急臣頭今與璧俱碎於柱矣王恐其破璧乃亂謝固請相如使從他道以璧還趙又曰張儀已學而游諸侯常從楚相飲已而楚相亡璧門下意儀掠笞數百不服釋}
  - {type: variant, offset: 1805, length: 2, content: 地寶, SBCK: 又曰虞卿躡履擔橙一見趙王賜白璧一􅀟黄金百溢又曰始皇三十年有使者從関東夜過華隂平舒道有人持璧􅃒使者曰爲吾遺滈池君因言曰今年祖龍死使者問其故因忽不見使者奉璧具以聞始皇使御府視璧乃二十八年行渡江所沉璧也漢書曰迺以白鹿皮爲弊王侯朝對必以皮弊薦璧又天文志曰日月如合璧五星如連珠又曰沛公從百餘􅀐見項羽鴻門沛公如厠間道走軍服䖍曰走音奏使張良謝羽問沛公安在良曰聞將軍有意督過巳脫身去間至軍矣故使獻璧羽受之又曰文帝賜尉佗書及依佗因使者獻白璧一􅀟又曰王夫人者趙人幸武帝生子閎夫子死而帝痛之使者拜之曰皇帝謹使使太中大夫明奉璧一賜夫人爲齊王太后又曰王莽篡位冠軍張永獻符命銅璧言元后當爲宣室丈母後漢書曰驃􅀐將軍東平王蒼聞朱暉有義行辟爲􅁺正月旦蒼將朝當奉璧賀故事少府給璧是時隂就爲少府卿貴驕傲吏不奉法蒼坐朝堂漏且盡而求璧不可得顧謂􅁺属曰􅀂之何暉望見就主簿持璧即徃給之曰我數聞璧而未甞見試借􅀚之主簿授暉暉顧召令使奉之奉之於蒼主簿遽白就就曰朱􅁺義士勿復求更取璧蒼罷朝謂暉曰􅁺自視孰與藺相如晉書載記曰燕常山大樹自拔根下得璧七十三光色精竒有異常王慕容携以爲岳神之命遣其尚書郎叚勤以太牢犯之又石季龍起河橋於靈昌津採石爲中濟石無大小下輙隨流用功五百餘万而不成季龍遣致􅀕沉璧于河俄而所沉璧浮于渚上晏子春秋曰和氏之璧井里之朴耳老子曰雖有拱璧以先駟馬不如坐進此道孫卿子曰聘人以珪問士以璧魯連子曰楚成章華之臺酌諸侯酒魯君先至王恱之與不􅅣之璧莊子曰孔子問子桑雩曰吾見逐於魯伐樹於宋親而益踈何也對曰子獨不聞假之亡與假囯名也林回弃千金之璧􅀒赤子而趍彼以利合者迫窮相弃也天屬者迫窮相収韓子曰楚人和氏得璞}
