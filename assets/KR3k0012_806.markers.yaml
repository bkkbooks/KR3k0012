  - {type: variant, offset: 2459, length: 189, content: 西京雜記曰高祖初入咸陽宮周行庫藏金玉珍寶不可勝言其尤驚異者有青玉五枚燈高七尺五寸下作蟠螭以口含燈然則鱗甲皆動煥爛盈室焉又曰高祖初入咸陽周行庫藏見玉笛長二尺二寸二十九孔吹之則見車馬山林嶾嶙相次吹息不復見銘曰昭華之管事具樂部五經通義曰玉有五德溫潤而澤有似於智銳而不害有似於仁抑而不橈有似於義有瑕於內必見於外有似於信垂之如墜有似如禮瑞應圖曰玉甕者聖人之應也不汲自盈王者飲食有節則出雒書, SBCK: 􅀃}
