  - {type: 'tls:seg', offset: 1806, content: '', id: KR3k0012_CHANT_806-24a.12}
  - {type: variant, offset: 1808, length: 0, content: '', SBCK: 於荆山而獻之遂名和氏之璧又曰和氏之璧不飾以五采隨侯之珠不飾以黄金其質至羙物不足以飾之文子曰聖人不貴幸璧而貴寸隂不布施以求得不髙下以相假此古人之德也淮南子曰禹之趍時冠掛不顧故曰不貴尺璧而重寸隂又曰和氏之璧夏后之璜揖讓而進以合欣夜以投人則爲恐時與不時又曰得和氏之璧不􅀂以事}
