  - {type: variant, offset: 589, length: 0, content: '', WYG: 擇扵五人者使主社稷乃遍以璧見扵群望曰當璧而拜者神所立也誰敢違}
  - {type: variant, offset: 590, length: 454, content: 玉常用守經據古禮神之玉則無臣等請詔下有司精求美玉創造蒼璧等九器祭訖具而藏之其餘燎玉請依常制管子曰夫玉之所以貴者九德出焉溫潤以澤仁也鄰以理者智也堅而不蹙義也廉而不劌行也鮮而不垢潔也折而不撓勇也瑕適皆見情也茂華光澤並通而不相陵容也叩之其音清專徹遠純而不殺辭也是以人主貴之藏以為寶剖以為符瑞文子曰鄭人謂王未理者璞周人謂鼠未腊者璞周人懷璞問鄭賈曰欲之乎出其璞視之乃鼠璞范子計然曰玉英出藍田列子曰穆王征西戎西戎獻昆吾之劍赤刀切玉如切泥又曰宋人有為其君以玉為楮葉者三年而成鋒鍜莖葉毫芒繁澤亂之楮葉中不可別也此人遂以巧食宋國尹文子曰魏田父有於野得玉徑尺弗知其玉也以告鄰人鄰人詐之曰此怪石也畜之弗利田父雖疑猶錄置於廡下其夜玉明照一室其家大怖遽而棄之於野鄰人盜之以獻魏王魏王召玉工相之玉工望玉再拜卻立曰敢賀大王得天下之寶臣所未常見王問價玉工曰此無價以當之五城之都僅可一觀王立賜獻者千金長食上大夫祿也鬼谷子曰鄭人之取玉也載司南之車為其不惑也尸子曰水方折者有玉圓折者有珠又曰玉者色不如雪澤不如雨潤不如膏光不如燭鄒子曰夫珠生於南海玉, SBCK: 靈圭}
