  - {type: variant, offset: 1799, length: 2, content: 赤烏, krp: 東方爲圭之制上小下大狀如梨鋒太玄經曰破璧毁圭逢不幸楚辭曰三璋圭雜於甑窐兮璋圭王石也窐首携也楚辭曰三圭重侯三幸謂公侯伯璧說文曰璧瑞玉環也瑗太孔璧也璜半璧也爾雅曰肉倍好謂之璧好倍肉謂之瑗尚書金縢曰周公植璧秉珪乃告大王王季文王曰尓不許我我乃屏璧與珪又顧命曰弘璧琬琰在西序大璧琬琰之圭爲二重也尚書中候曰堯沉璧於河白雲起也毛詩淇澳曰有斐君子如金如錫如珪如璧又雲漢曰靡神不舉靡愛斯牲珪璧旣卒寕莫我聽周禮春官上大宗伯曰子執榖璧男執蒲璧以蒼璧禮天禮記曲禮下白操幣圭璧則尚左手又禮器曰束帛加璧尊德也左傳桓公曰鄭伯以璧假許田爲周公祊故也又曰疋夫無罪懷璧其罪又僖上曰晉荀息請以屈産之乗與垂棘之璧假道於虞以伐􅉑又曰楚子圍許許男面縛衘璧又曰𥘉申侯有寵於楚文王文王將死與之璧使行曰唯我知汝專利而無猒我死汝必速行又曰秦伯納重耳及河子犯以璧受公子曰臣負羈紲從君於天下臣之罪多矣臣猶知之而況君乎請由此亡公子曰所不與舅}
  - {type: punctuation, offset: 1802, content: ，, id: KR3k0012_CHANT_806-bkkpn516}
  - {type: 'tls:seg', offset: 1802, content: '', id: KR3k0012_CHANT_806-24a.11}
  - {type: variant, offset: 1802, length: 0, content: '', SBCK: 同心者有如白水投其璧於河又僖中曰晉公子重耳及曹僖􅀒覊之妻饋盤飱寘璧焉公子受飱反璧又文下曰􅁗伯以璧祈戰于河又成公上曰丑父寢於轏車轏士車蛇出於其下以肱擊之傷而匿之故不能推車而及爲韓厥所及欲爲右故匿其傷韓厥執縶馬前縶馬絆也執之脩臣僕之職再拜稽首奉觴加璧以進進觴璧亦以示敬又襄三曰諸侯取邾田自漷水歸之於我􅀳侯先歸公享晉六卿于蒲圃賄荀偃束錦加璧又襄六曰公薨于楚宫叔仲帶竊其拱璧以與御人納諸其懷而從取之由是得罪又襄二十八曰齊人求崔杼之尸將戮之不得叔孫穆子曰必得之武王有亂臣十人崔杼其有乎不十人不足以葬葬必湏十人崔氏不能令十人同必得旣崔氏之臣曰與我其拱璧崔杼大璧吾獻其柩於是得之又昭四年曰楚子以諸侯滅頼頼子面縛銜璧士􅃝輿櫬從之造於中軍中軍王所將王問諸椒舉對曰成王克許在僖六年許僖公如是親釋其縛受其璧焚其櫬王從之從㪯言遷頼於鄢鄢楚邑又曰楚共王無􅃁嫡有寵子五人無適立焉乃大有事于羣望而祈曰請神擇於五人者使主社稷乃遍以璧見於羣望曰當璧而拜者神所立也誰敢違之旣乃與巴􅁎宻埋璧於太室之庭使五人齋而長入拜康王跨之靈王肘加焉子干子晢皆逺之平主弱抱入再拜皆壓紐又哀下曰衛人岀莊公入於戎州巳氏􅀄公自城上見巳氏之妻髮美使髠之以爲吕姜髢旣入焉而視之璧曰活我吾與汝璧巳氏曰殺汝璧將焉徃遂殺之而取其璧史記曰鄒陽上書曰白圭顯於中山人惡之於魏文侯文侯賜以夜光之璧又曰臣聞明月之珠夜光之璧以闇投於道衆莫不按劒相眄者何則無因而至前也又曰趙惠文王得楚王和氏璧􅁗昭王使人遺趙王書願以十五城請易璧遂遣藺相如奉璧西入􅁗相如見􅁗王無意償趙城乃前曰璧有瑕請指示王王授璧相如因持璧却立􅀝柱怒髮上穿冠謂􅁗王曰趙王齋戒五日使臣奉璧今大王得璧傳之}
