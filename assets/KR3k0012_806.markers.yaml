  - {type: variant, offset: 282, length: 264, content: 用也朕精禋郊壇嚴敬宗廟奉惟新之祚庇太平之人則人力普存備物以享安可以珉代玉惜費事神沉國家之富有萬方之助祭闕典必脩無文咸祑豈於天地宗廟奠王有虧自今已後禮神六器宗廟奠玉並用真玉諸祀用珉如以玉難得大者寧小其制度以取其真又曰憲宗時隰州刺史吳暈獻玉杯一頗珍奇云先使吐蕃所得又曰憲宗時庄宅使許遂振得玉類珽以進上悅命賜絹三百疋又曰貞元六年盧群入拜侍御史有人誣告故尚父子儀嬖人張氏宅中有寶玉者張氏兄弟又與尚父子孫相告訐詔促其獄群上奏言張氏以子儀在時分財子弟不合爭奪然張氏宅與親仁宅皆子儀家事子儀有大勳伏望陛下赦而勿問使私自引退上從之時人賞其識大體, SBCK: 爲}
