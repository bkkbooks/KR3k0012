  - {type: variant, offset: 600, length: 1, content: 玉, WYG: 庭使五人齊而入拜康王跨之靈王肘加焉子干子晳皆逺之平王弱抱入再拜皆壓紐又哀下曰衛人出莊公入于戎州巳氏初公自城上見巳氏之妻髪美使髠之以為吕姜髢既入焉而示之璧曰活我吾與汝璧巳氏曰殺汝璧將焉往遂殺之而取其璧史記曰鄒陽上書曰白圭顯扵中山人惡之於魏文侯賜以夜光之璧又曰臣聞明月之珠夜光之璧以闇投扵道衆莫不按劒相盻者何}
