  - {type: variant, offset: 1018, length: 0, content: '', WYG: 趙人幸武帝生子閎夫子死而帝痛之使者拜之曰皇帝謹使大中大夫明奉璧一賜夫人為齊王太后又曰王莾簒位冠軍張永獻符命銅璧言元后當為宣室父母後漢書曰驃騎將軍東平王蒼聞朱暉有義行辟為掾正月旦蒼將朝當奉璧賀故事少府給璧是時隂就爲少府卿貴驕吏傲不奉法蒼坐朝堂漏盡而求璧不可得顧謂掾屬曰若之何暉望見就主簿持璧即往紿之曰我數聞璧而未見試借觀之主簿授暉暉顧召令使奉之奉之扵蒼主簿遽白就就曰朱掾義士勿復求更取璧蒼罷朝謂暉曰掾自視孰與藺相如晉書載記曰燕常山大樹自㧞根下得璧七十三光}
  - {type: page-break, offset: 1018, content: '', id: KR3k0012_WYG_806-10a, image: WYG0900/WYG0900-0158a.png}
  - {type: variant, offset: 1019, length: 0, content: '', WYG: 精竒有異常玊慕容擕以為岳神之命遣其尚書郎段勤以太牢祀之又石季龍起河橋扵靈昌津採石為中濟石無大小輙下隨流用功五百餘萬而不成季龍遣致祭沉璧扵河俄而所沉璧浮扵渚上晏子春秋曰和氏之璧井里之朴耳老子曰雖有拱璧以先駟馬}
