  - {type: punctuation, offset: 1092, content: 『, id: KR3k0012_CHANT_806-bkkpn298}
  - {type: variant, offset: 1092, length: 285, content: 石也王以和為慢刖右足及武王即位又獻之復相曰石也次刖左足及文王即位和乃抱其璞而哭於楚山三日三夜泣盡繼之以血王使玉人治之得寶玉焉名曰和氏之璧又曰周有玉版紂令膠鬲索之文王不予費仲來求因予之是膠鬲賢而費仲無道也周惡賢者之得志也故予費仲文王舉太公於渭濱者貴之也而資仲玉版者愛之也故曰不貴其師不愛其資雖知大迷又曰堂谿空見昭侯曰今有白玉之危而無當有瓦危而有當君渴將何以飲君曰以瓦巵堂谿空曰白玉之巵美而君不以飲者以其無當耶君曰然堂谿空曰為人主而漏泄其群臣之語譬猶玉巵之無當也堂谿空每見而出昭侯必獨臥惟恐蔑言泄於妻妾淮南子曰琬琰之玉存汙泥之中雖廉者不釋也又曰崑崙山曾城九重有珠樹玉樹又曰鍾, SBCK: 羭}
