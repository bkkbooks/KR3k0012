  - {type: variant, offset: 3321, length: 2, content: 盜發, SBCK: 宋公諮議王智先停栢谷遣􅀐送道人惠義䟽曰有金璧之瑞公遣迎取軍次于崤東金璧至脩壇拜受之又云兾州􅀶陵郡王次寺道人法稱告弟子普巖曰嵩髙皇帝語吾言江東有劉將軍是漢家苗裔當受天命吾以四十二璧金一餅與之璧數是劉氏卜丗之數也惠義以義熈十三年入嵩髙山即得璧金獻馬具嵩山門琴操曰楚昭王得和氏璧使大夫明光奉璧於趙郡中羊申甫知趙無反遺乃䜛之於王明光常背楚同趙今使奉璧何能述楚功德及明光還王怒之明光乃作歌曰楚明光魏文帝蔡伯喈女賦序曰家公與蔡伯喈有管鮑之好乃命使者周近持玄玉璧於匈奴贖其女還以妻屯田郡都尉董祀}
