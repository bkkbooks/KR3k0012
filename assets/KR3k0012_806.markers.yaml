  - {type: variant, offset: 3658, length: 388, content: 令人長生愽物志曰得好玉用合玉漿廣志曰白玉美可照而出交州青玉出樓國碧玉出夫餘梁四公記曰扶桑國使使貢觀日玉大如鏡方圓尺餘明澈如琉璃映日以觀見日中宮殿皎然分明地鏡圖曰二月中草木光生下垂者下有美玉又曰玉石之精也其在石中若山中石潤而浸旁有水其居地氣青而浮其氣白而圓光轉其地中常潤白玉圖曰玉之精名曰柔狀如美女衣青衣見之以桃戈刺之而呼其名則可得也夜行見女子戴燭行者潛從其所亡則入石石中有玉世說曰長沙王徙封常山至國穿井入地四丈得白玉方三四尺又曰溫嶠取姑女下玉鏡臺一枚是公為劉越石長史征劉聰所得語林曰平子從荊州下王敦敦欲殺之平子恒持一玉枕下床去故不得發敦後矯平子左右而借其玉枕持下宋去遂殺平子本草經曰玉泉一名玉醴臨死服五斤色不變吳氏本草曰白玉體如白頭公明皇雜錄曰天后嘗召諸皇孫坐於殿上觀其嬉戲因出西國所貢玉環釧盃盤列於前後縱令爭取以觀其志莫不奔竟厚有所獲獨上端坐略不為動后大奇之撫其背曰此兒當為, WYG: 連城璧}
