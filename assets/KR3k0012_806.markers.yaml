  - {type: variant, offset: 1516, length: 296, content: 倚璧有一玉長一尺形似冬瓜從人懷中頹出墮池玉可以為珠酒及地榆酒化之為水亦可燒以為粉服一年以上入水不沾入火不灼又曰玉脂生玉之山膏流出萬年以上則凝而成之鮮明如水精以無心草木和之須臾成水服之一升得千歲玉服玄真者其命不極玄真玉別名也服玉當得于闐白玉赤松子以玄虫而漬玉為水服之故得乘煙霞上下也又曰中山諺曰稱人字者金玉也知其物則不為害賈子曰德有天理曰道性神明命之所生而能象德者獨玉也符子曰荊山不貴玉鮫人不貴珠穆天子傳曰天子大朝黃之山披啚視典用觀天子之寶器玉果石以美玉謂女果者璿珠璿玉類音執又曰天子北征東還乃循黑水至於群玉之山先王所謂策府天子於是取玉枝三乘玉器服物於是載玉萬隻也又曰赤烏氏美人之地寶玉之所在也, WYG: 籍身}
