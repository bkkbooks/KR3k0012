  - {type: variant, offset: 4048, length: 153, content: 天子因命取玉龍子以賜玉龍子太宗於晉陽宮得之文德皇后常置之衣箱中及大帝載誕之三日后以珠絡衣裕并玉龍子賜焉其後常藏之內府雖其廣不數寸而溫潤精巧非人間所有及上即位每京師愆雨必虔誠祈禱將有霖霪逼而視之若奮鱗鬣開元中三輔大旱上復祈禱而涉旬無雨上密投南內之龍池俄而雲物暴起風雨隨作上幸西蜀車駕次渭水將渡駐蹕於水濱左右侍, SBCK: ''}
