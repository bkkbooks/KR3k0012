  - {type: 'tls:seg', offset: 577, content: '', id: KR3k0012_CHANT_806-6a.8}
  - {type: variant, offset: 577, length: 0, content: '', WYG: 軍中軍}
  - {type: variant, offset: 578, length: 10, content: 起議今國家郊天報地祀, WYG: 所將王問諸椒舉對曰成王尅許在僖六年許僖公如是親釋其縳受其璧焚其櫬玉從之從舉言遷頼于鄢鄢楚邑也又曰楚共王無冢嫡有寵子五人無適立焉乃大有事扵群望而祈曰請}
  - {type: page-break, offset: 578, content: '', id: KR3k0012_WYG_806-7b, image: WYG0900/WYG0900-0156d.png}
