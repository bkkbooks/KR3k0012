  - {type: variant, offset: 554, length: 0, content: '', WYG: 曰爾不許我我乃屏璧與珪又顧}
  - {type: variant, offset: 554, length: 19, content: 命中使以白玉帶就幽州賜李載義亦殊恩也又, krp: 伐殷墨子申徒狄}
  - {type: variant, offset: 555, length: 0, content: '', WYG: 曰𢎞璧琬琰在西序大璧琬琰之圭為三重也尚書}
  - {type: variant, offset: 556, length: 1, content: 使, WYG: 侯曰堯沉璧於河白雲起也毛詩淇澳曰有斐君子如金如錫如圭如璧又雲漢曰靡神不舉靡愛斯牲圭璧既卒寧莫我聽周禮春官上大宗伯曰子執榖璧男執蒲璧}
  - {type: variant, offset: 558, length: 13, content: 白玉帶就幽州賜李載義亦殊恩, WYG: 蒼璧禮天禮記曲禮下曰操幣圭璧則尚左手又禮器曰束帛加璧尊徳也左傳桓公曰鄭伯以璧假許田為周公祊故}
