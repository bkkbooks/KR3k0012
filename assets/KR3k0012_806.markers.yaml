  - {type: variant, offset: 1016, length: 1, content: 玉, WYG: 沛公從百餘騎見項羽鴻門沛公如厮間道走軍服􅐚曰走音奏使張良謝羽問沛公安在良曰聞將軍有意督過已脱身去間至軍矣故使獻璧羽受之又曰文帝賜尉佗書及衣佗因使獻白璧一雙又曰王夫人}
