  - {type: variant, offset: 106, length: 1, content: 廣, SBCK: 天子守之同爵名瑁所以冒者侯以齊瑞信方四寸邪刻之也尚書大傳曰古者圭必有冒故圭冒者天子與諸侯爲瑞諸侯執所受圭以朝天子無過者復得以歸有過者留其三年周禮春官上大宗伯曰以玉作六瑞以守􅀖國王執鎭圭公執桓圭諸侯執信圭伯執躬圭子執榖璧男執蒲璧馬融曰瑞信鎭圭尺有二寸王者執以事天地桓圭九寸信圭七寸躬圭七寸榖圭五寸蒲圭柔滑又春官上宗伯曰以青圭禮東方又典瑞曰玉搢大圭執鎭圭繅籍五采五就以朝日覜聘四圭有邸以禮天旅上帝四圭相連皆外嚮共}
  - {type: page-break, offset: 106, content: '', id: KR3k0012_SBCK_806-1b}
