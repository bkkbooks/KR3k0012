  - {type: variant, offset: 2665, length: 131, content: 逾祭服則玉英出胡綜別傳曰吳時掘得銅印以琉璃為蓋畫布雲母於其上開之得白玉如意太皇帝以問君君曰秦皇以金陵有天子氣處處埋寶物以當王士之氣此抑是也文士傳曰劉楨字公幹少有才辯常豫魏文帝座見甄后不伏武帝嘗怒配上方武帝輦至上方觀作署楨故匡坐正色磨石不仰武帝問曰石何如楨因得喻己, WYG: 斵}
