  - {type: variant, offset: 1816, length: 1, content: 玨, SBCK: 招揺之神祠用一璧穆天子傳曰天子賔於西王母乃執珪璧以見之帝王丗紀曰堯刻璧爲書東次於洛言當傳舜之意戰國䇿曰張儀爲􅁗破從連横􅀃楚王楚王遣車百乗獻駭雞之犀夜光之璧於􅁗王又曰齊欲伐魏魏使謂淳于髠曰弊邑寳璧二􅀟天馬二駟請致之髠入􅀃齊王曰魏齊之與國今伐之名醜而實危齊王乃不伐客謂齊王曰髠受魏璧馬王謂髠曰先生有之乎曰有之伐之事便魏雖刺髠於王何益􅀂誠不便魏雖封臣於王何損百姓無􅀍兵之患髠有璧馬之寳於主何傷又曰蘇􅁗􅀃趙王於華屋之下抵掌而談趙君封爲武安君受白璧百􅀟黄金萬溢河圖天靈曰趙王政以白璧沉河者有一黒公從河岀謂政曰祖龍來天寳開中有}
