  - {type: variant, offset: 1376, length: 77, content: 鍾山之玉炊以爐炭三日三夜而色澤不變得天地之精又曰玉璞不厭厚又曰白玉不雕美珠不文質有餘也又曰兩堅不能相加兩強不能相伏故梧桐斷馬角截梨玉言柔勝剛又曰玉待濫諸而, WYG: 璧瑗}
