  - {type: 'tls:seg', offset: 1380, content: '', id: KR3k0012_CHANT_806-17a.4}
  - {type: variant, offset: 1380, length: 1, content: 炊, SBCK: 祠}
  - {type: variant, offset: 1380, length: 1, content: 炊, krp: 祠}
  - {type: variant, offset: 1382, length: 331, content: 爐炭三日三夜而色澤不變得天地之精又曰玉璞不厭厚又曰白玉不雕美珠不文質有餘也又曰兩堅不能相加兩強不能相伏故梧桐斷馬角截梨玉言柔勝剛又曰玉待濫諸而成器濫諸珍玉之名也言物有待賤而貴隨巢子曰幽厲之時奚祿山壞天賜玉玦於羿遂以殘其身以此為福而禍抱朴子曰吳時發廣陵大冢兵人共舉死人以倚璧有一玉長一尺形似冬瓜從人懷中頹出墮池玉可以為珠酒及地榆酒化之為水亦可燒以為粉服一年以上入水不沾入火不灼又曰玉脂生玉之山膏流出萬年以上則凝而成之鮮明如水精以無心草木和之須臾成水服之一升得千歲玉服玄真者其命不極玄真玉別名也服玉當得于闐白玉赤松子以玄虫而漬玉為水服之故得乘煙霞上下也又曰中山諺曰稱人字者金玉也知其物則不為害賈子曰德有天理曰道性神明命之所生而能象德者獨玉也符子曰荊山不貴玉鮫人不貴珠, SBCK: 皇圭}
