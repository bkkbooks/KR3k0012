  - {type: punctuation, offset: 549, content: 「, id: KR3k0012_CHANT_806-bkkpn126}
  - {type: variant, offset: 549, length: 3, content: 大和中, SBCK: 韓侯入覲以其介圭入覲于王又嵩髙曰王遣申伯錫爾介圭圭長尺二寸謂之介非諸侯之圭故以爲寶諸侯之瑞圭自丸寸而下論語郷黨曰執圭鞠躬如也如不勝又雍也曰南容三復白圭孔子以其兄之子妻之墨子曰赤烏御圭降周之歧社曰天命周}
  - {type: variant, offset: 549, length: 0, content: '', WYG: 東方為圭之制上小下}
  - {type: variant, offset: 549, length: 3, content: 大和中, krp: 韓侯入覲以其介圭入覲于王又嵩髙曰王遣申伯錫爾介圭圭長尺二寸謂之介非諸侯之圭故以爲寶諸侯之瑞圭自丸寸而下論語郷黨曰執圭鞠躬如也如不勝又雍也曰南容三復白圭孔子以其兄之子妻之墨子曰赤烏御圭降周之歧社曰天命周}
  - {type: variant, offset: 550, length: 2, content: 和中, WYG: 狀如梨鋒太元經曰破璧毁圭逄不幸楚辭曰三璋圭雜扵甑窐兮窐音携也楚辭曰三圭重侯三圭謂公侯伯璧説文曰璧瑞玉環也瑗太孔璧也璜半璧也爾雅曰肉倍好謂之璧好倍肉謂之瑗尚書金縢曰周公植璧秉珪乃告太王王季}
  - {type: page-break, offset: 550, content: '', id: KR3k0012_WYG_806-5a, image: WYG0900/WYG0900-0155c.png}
