  - {type: variant, offset: 3347, length: 268, content: 餘杭縣南巷中有一人姓沈名路入山得一玉肫從此以後所向如意家遂殷富異苑曰晉東瀛王騰字元邁以永嘉元年鎮鄴天雪門前方數十步融液不積騰怪掘之得玉馬高一尺許口齒缺騰以馬者國姓為吉瑞或謂馬無齒則不復食又曰弘農楊子陽太元初聞土中聲掘得玉肫錄異傳曰江巖常到吳採藥及富春縣清泉山南遙見一美女紫衣獨踞石而歌聲有碣石之音巖往未及數十步輒去女處唯見所踞石耳如此數日巖乃擊破石遂從石中得一紫玉廣長一尺後不復見女又曰邴浪者安樂人行到松滋縣九田山見一鳥形如雉而色正赤集山巖石上鳴聲如吹笙浪即射中之鳥仍入石穴中浪遂鑿石得一赤玉狀如鳥形十洲記曰周穆王時西胡獻玉杯是白玉之精, WYG: 楚}
