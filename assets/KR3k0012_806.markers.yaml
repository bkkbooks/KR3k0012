  - {type: variant, offset: 1799, length: 2, content: 赤烏, SBCK: 東方爲圭之制上小下大狀如梨􅄡太玄經曰破璧毁圭逢不幸楚辭曰三璋圭􅄂於甑窐兮璋圭王石也窐首携也楚辭曰三圭重侯三􅄑謂公侯伯璧􅀃文曰璧瑞玉環也瑗太孔璧也璜半璧也爾雅曰肉倍好謂之璧好倍肉謂之瑗尚書金縢曰周公植璧秉珪乃告大王王季文王曰尓不許我我乃屏璧與珪又顧命曰弘璧琬琰在西序大璧琬琰之圭爲二重也尚書中候曰堯沉璧於河白雲起也毛詩淇澳曰有斐君子如金如錫如珪如璧又雲漢曰靡神不舉靡愛斯牲珪璧旣卒寕莫我聽周禮春官上大宗伯曰子執榖璧男執蒲璧以蒼璧禮天禮記曲禮下白操幣圭璧則尚左手又禮器曰束帛加璧尊德也左傳桓公曰鄭伯以璧假許田爲周公祊故也又曰疋夫無罪懷璧其罪又僖上曰􅀳荀息請以屈産之乗與垂􅁄之璧假道於虞以伐􅉑又曰楚子圍許許男面縛衘璧又曰􅀄申侯有寵於楚文王文王將死與之璧使行曰唯我知汝專利而無猒我死汝必速行又曰􅁗伯納重耳及河子犯以璧受公子曰臣􅀒羈紲從君於天下臣之罪多矣臣猶知之而況君乎請由此亡公子曰所不與舅}
