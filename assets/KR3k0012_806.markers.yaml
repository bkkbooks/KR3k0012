  - {type: variant, offset: 2927, length: 247, content: 齊戒告天天降赤虹化為黃玉長二尺上有文又曰羊公雍伯雒陽人性篤孝父母終葬無終山遂居焉山高八十里上無水公汲水作義漿於坂頭行者皆飲之三年有一人就飲以石子一斗與之使至高平好地有石處種之玉當生其中羊公未娶又語汝後當得好婦語畢不見後種其石數歲時時往視玉子生人莫知有徐氏在北平著姓女甚有名時人求多不許公乃試求徐氏徐氏以為狂乃戲云以白璧一雙來當聽為婚公至所種石中得一隻白璧以贄徐氏徐氏大驚遂以女妻公天子異之拜為大夫於種玉處四角作大石柱各一丈中央一頃地曰玉田續搜神記曰樂安高衛其孫雅之在廄中云有神來降自稱白頭公柱杖, SBCK: ''}
