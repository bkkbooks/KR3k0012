  - {type: variant, offset: 110, length: 8, content: 分厚三分刻玉填金, WYG: 寸肆陳牲器以祭也圭璧以祀日月星辰土圭以致四時日月封國則以土地土圭尺有五寸以求土中故謂土圭也鎮圭以徴守以恤凶荒榖圭以和難以聘女琬圭以治徳以結好琬圭九寸琬順也又秋官下小行人曰合六幣圭以馬也儀禮聘禮曰上介受圭屈受賈人禮記禮器曰諸侯以圭}
