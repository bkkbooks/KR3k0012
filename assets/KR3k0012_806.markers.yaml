  - {type: variant, offset: 574, length: 15, content: 開成中王起議今國家郊天報地祀神, SBCK: 周}
  - {type: variant, offset: 574, length: 1, content: 開, WYG: 匹夫無罪懷璧其罪又僖上曰晉荀息請以屈産之乘與垂棘之璧假道扵虞以伐虢又曰楚子圍許男面縳衘璧又曰初申侯有寵扵楚文王文王將死與之璧使行曰唯我知汝専利而無厭我死汝必速行又曰秦伯納重耳及河子犯以璧受公子曰臣負覊紲從君扵天下臣之罪多矣臣猶知之而况君乎請由此亡公子曰所不與舅氏同心者有如白水投其璧扵河又僖中曰晉公子重耳及曹僖負覊之妻饋盤飱寘璧焉公子受飱反璧又文下曰秦伯以璧祈戰于河又}
  - {type: page-break, offset: 574, content: '', id: KR3k0012_WYG_806-6a, image: WYG0900/WYG0900-0156a.png}
  - {type: page-break, offset: 574, content: '', id: KR3k0012_WYG_806-6b, image: WYG0900/WYG0900-0156b.png}
  - {type: variant, offset: 574, length: 15, content: 開成中王起議今國家郊天報地祀神, krp: 周}
  - {type: variant, offset: 576, length: 0, content: '', WYG: 公上曰丑父􅃦于轏車轏土車蛇出於其下以擊之肱傷而匿之故不能推車而及為韓厥所及丑父欲為右故匿傷韓厥執縶馬前縶馬絆也執之示修臣僕之職再拜稽首奉觴加璧以進進觴璧亦以示敬又襄二十八曰齊人求崔杼之尸將戮之不得叔孫穆子曰必得之武王有亂臣十人崔杼其有乎不十人不足以𦵏𦵏必十人崔氏不能令十人同故必得既崔氏之臣曰與我其拱璧崔有大璧吾獻其柩扵是得之又襄三曰諸侯取郜田自漷水歸之扵我晉侯先歸公享晉六卿于蒲圃賄荀偃束錦加璧又襄六曰公薨于楚宫叔仲帶竊其拱璧以與御人納諸其懷而從之取由是得罪又昭四曰楚子以諸侯滅頼頼子靣縳銜璧士袒輿襯從之造于}
  - {type: page-break, offset: 576, content: '', id: KR3k0012_WYG_806-7a, image: WYG0900/WYG0900-0156c.png}
