  - {type: variant, offset: 5, length: 0, content: '', SBCK: 日象三日䥴四日監五曰闇六曰瞢七曰彌八曰敘九日隮十日想故書弥作迷隮作資鄭司農曰祲陰陽氣}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 曰象三曰鐫四曰監五曰闇六曰瞢七曰彌八曰叙九曰隮十曰想祲陰陽氣}
  - {type: variant, offset: 5, length: 0, content: '', krp: 日象三日䥴四日監五曰闇六曰瞢七曰彌八曰敘九日隮十日想故書弥作迷隮作資鄭司農曰祲陰陽氣}
  - {type: variant, offset: 6, length: 0, content: '', SBCK: 侵也象者如赤鳥也鑴謂日旁氣四面反鄕如煇狀也監雲氣臨日也閽日月食也瞢日月瞢瞢無光也彌者白虹彌天也敘者雲有次序如山在日上也隮者升氣也想者煇光也􅀇謂鐫讀如童子佩鑴之鑴謂日旁氣刺日也監冠珥也彌氣冠日也隮虹也詩云朝隮于西想雜氣有似可形想掌安宅敘降宅居也降}
  - {type: variant, offset: 6, length: 2, content: 下唐, WYG: 侵也象者如赤鳥也鐫謂日旁氣四面反鄉如煇狀也監雲氣臨日也闇日月食也瞢日月瞢瞢無光也彌者白虹彌天也叙者雲有次序如山在日上也隮升氣也想煇光也𤣥謂鐫讀如童子佩鐫之鐫謂日旁氣刺日也監冠珥也彌氣貫日也隮虹也詩曰朝隮于西想雜氣有似可形想也掌安宅叙降正嵗則行事嵗終則弊其事左傳曰僖公五年正月辛亥朔日南至公既視朔遂登觀臺以望而}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_WYG_732-1b, image: WYG0899/WYG0899-0457b.png}
  - {type: variant, offset: 6, length: 0, content: '', krp: 侵也象者如赤鳥也鑴謂日旁氣四面反鄕如煇狀也監雲氣臨日也閽日月食也瞢日月瞢瞢無光也彌者白虹彌天也敘者雲有次序如山在日上也隮者升氣也想者煇光也玄謂鐫讀如童子佩鑴之鑴謂日旁氣刺日也監冠珥也彌氣冠日也隮虹也詩云朝隮于西想雜氣有似可形想掌安宅敘降宅居也降}
  - {type: xml-element, offset: 7, content: '', id: KR3k0012_CHANT_732-bkkxmlele2}
  - {type: xml-element, offset: 7, content: '', id: KR3k0012_CHANT_732-bkkxmlele3}
  - {type: 'tls:seg', offset: 7, content: '', id: KR3k0012_CHANT_732-1a.3}
  - {type: punctuation, offset: 7, content: 《, id: KR3k0012_CHANT_732-bkkpn1}
  - {type: variant, offset: 7, length: 1, content: 唐, SBCK: 也人見妖祥則不安主安其居處也次序其凶禍所下謂禳移之正歲則行事占夢以季冬贈惡夢此正月而行安宅之事所以順民歲終則弊其事弊斷也謂計其吉凶然否多少傳曰僖五年正月辛亥朔日南至公旣視朔遂登觀臺以望而}
  - {type: variant, offset: 7, length: 1, content: 唐, krp: 也人見妖祥則不安主安其居處也次序其凶禍所下謂禳移之正歲則行事占夢以季冬贈惡夢此正月而行安宅之事所以順民歲終則弊其事弊斷也謂計其吉凶然否多少傳曰僖五年正月辛亥朔日南至公旣視朔遂登觀臺以望而}
  - {type: punctuation, offset: 9, content: 》, id: KR3k0012_CHANT_732-bkkpn2}
  - {type: variant, offset: 9, length: 0, content: '', SBCK: 禮也視朔親告朔也觀臺臺上搆屋可以遠觀也朔旦冬至曆數之所始治曆者因此則可以明其術數審别隂陽敘事訓民魯君不能常脩此禮故善公之得禮也凡分至啓閉必書雲物分春秋分也至冬夏至也啓立春立夏閉立秋立冬雲物氣色災變也傳重申周典不言公者日官掌其職爲備故也素察妖祥逆爲之備叉襄二十八年日春無冰梓愼日今兹宋鄭其饑乎歲在星紀而淫於􅀇枵歲歲星也星紀在丑斗牛之次􅀇枵在子虛危之次十八年晉董叔日天道多在西北是歲歲星在亥至此年十一歲故在星紀明年乃當在􅀇枵今巳在􅀇枵淫行失次以有時菑陰不堪陽時菑無冰也盛陰用事而温無冰是隂不勝陽地氣發洩蛇乘龍蛇􅀇武之宿虛危之星龍歲星歲星木也木爲青龍失次出虚危下爲蛇所乘龍宋鄭之星也歲星本位任東方東方房心爲朱角亢爲鄭故以龍爲宋鄭之星也宋鄭必饑􅀇枵虛中也􅀇枵三宿虛星在其中枵耗名也土虛而民耗不饑何爲歳爲宋鄭之星今失常經入虚耗之次時復無冰地氣發洩故日土虛民耗也禆竈}
  - {type: page-break, offset: 9, content: '', id: KR3k0012_SBCK_732-1b}
  - {type: variant, offset: 9, length: 0, content: '', WYG: 禮也凡分至啟閉必書雲物為備故也書察妖祥逆為之備又襄二十八年}
  - {type: variant, offset: 9, length: 0, content: '', krp: 禮也視朔親告朔也觀臺臺上搆屋可以遠觀也朔旦冬至曆數之所始治曆者因此則可以明其術數審别隂陽敘事訓民魯君不能常脩此禮故善公之得禮也凡分至啓閉必書雲物分春秋分也至冬夏至也啓立春立夏閉立秋立冬雲物氣色災變也傳重申周典不言公者日官掌其職爲備故也素察妖祥逆爲之備叉襄二十八年日春無冰梓愼日今兹宋鄭其饑乎歲在星紀而淫於玄枵歲歲星也星紀在丑斗牛之次玄枵在子虛危之次十八年晉董叔日天道多在西北是歲歲星在亥至此年十一歲故在星紀明年乃當在玄枵今巳在玄枵淫行失次以有時菑陰不堪陽時菑無冰也盛陰用事而温無冰是隂不勝陽地氣發洩蛇乘龍蛇玄武之宿虛危之星龍歲星歲星木也木爲青龍失次出虚危下爲蛇所乘龍宋鄭之星也歲星本位任東方東方房心爲朱角亢爲鄭故以龍爲宋鄭之星也宋鄭必饑玄枵虛中也玄枵三宿虛星在其中枵耗名也土虛而民耗不饑何爲歳爲宋鄭之星今失常經入虚耗之次時復無冰地氣發洩故日土虛民耗也禆竈}
  - {type: punctuation, offset: 10, content: ：, id: KR3k0012_CHANT_732-bkkpn3}
  - {type: 'tls:seg', offset: 10, content: '', id: KR3k0012_CHANT_732-1a.4}
  - {type: punctuation, offset: 10, content: 「, id: KR3k0012_CHANT_732-bkkpn4}
  - {type: variant, offset: 10, length: 2, content: 高祖, SBCK: 今兹周王及楚子皆將死禍竈鄭大夫歲弃其次而旅於明年之次以害鳥帑周楚惡之旅客處也歲星弃星紀之次客在􅀇枵歲星所在其國有福失次於北禍衝在南南爲朱鳥鳥尾日帑鶉火鶉尾周楚之分故周王楚子受其咎俱論歲星過次梓慎則日宋鄭飢禆竈則日周楚王死傳故備舉以示卜占唯人所在也又日子蟜之卒也將葬公孫揮與禆竈晨會事焉會葬事過伯有氏其門上}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_SBCK_732-2a}
  - {type: variant, offset: 10, length: 2, content: 高祖, WYG: 春無氷梓慎曰今茲宋鄭其飢乎嵗在星紀而滛於𤣥枵以有時菑陰不堪陽蛇乘龍龍宋鄭之星也宋鄭必飢𤣥枵虛中也枵耗名也土虛而民耗不飢何為禆竈曰今茲周王及楚子皆將死嵗棄其次而旅於明年之次以害鳥帑周楚惡之又曰子蟜之卒也將葬公孫揮與禆竈晨㑹事焉過伯有氏其門上}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_WYG_732-2a, image: WYG0899/WYG0899-0457c.png}
  - {type: variant, offset: 10, length: 2, content: 高祖, krp: 今兹周王及楚子皆將死禍竈鄭大夫歲弃其次而旅於明年之次以害鳥帑周楚惡之旅客處也歲星弃星紀之次客在玄枵歲星所在其國有福失次於北禍衝在南南爲朱鳥鳥尾日帑鶉火鶉尾周楚之分故周王楚子受其咎俱論歲星過次梓慎則日宋鄭飢禆竈則日周楚王死傳故備舉以示卜占唯人所在也又日子蟜之卒也將葬公孫揮與禆竈晨會事焉會葬事過伯有氏其門上}
  - {type: variant, offset: 13, length: 0, content: '', SBCK: 莠子羽日其莠猶在乎子羽公孫俾以莠喻伯有侈知其不能乆存於是歲在降婁降婁中而旦裨竈指之日猶可以終歲指降婁也歲星十二年而一終歲不及此次也巳不及降婁及其亡也歲在娵訾之口娵訾營室東二十八年歲星淫在􅀇枵今三十年在娵訾是歳星停在􅀇枵二年其明年乃及降婁又曰昭七年夏四月甲辰朔日有食之晉侯問於士文伯日誰將當日食對日魯衛惡之衛大魯小公曰何故對曰去衛地如魯地衞地豕韋也魯地降婁也日食於豕韋之未及降婁之始乃息故在衛大在魯小也周四月今二月故曰在降婁也於是有灾魯實受之其大咎其衛君乎魯將上􅀸又曰夏四月陳灾鄭禆竈日五年陳將復封五十二年而遂亡子産問其故對曰陳水屬也陳顓頊之後故爲水屬火水妃也火畏水故爲之妃妃音配而楚所相也相治也楚之先祝融爲髙辛氏火正主治火事今火岀而火陳火心星也火出於周爲五月而以四月出者以}
  - {type: page-break, offset: 13, content: '', id: KR3k0012_SBCK_732-2b}
  - {type: variant, offset: 13, length: 11, content: 長安紫氣充庭神光照室體, WYG: 莠子羽曰其莠猶在乎於是嵗在降婁降婁中而旦嵗不及此次也已及其亡也嵗在娵訾之口其明年乃及降婁又曰昭七年夏四月甲辰朔日}
