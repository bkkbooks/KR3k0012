  - {type: variant, offset: 2118, length: 108, content: 安祿山反南犯洛陽僣稱偽位哥舒翰東守潼關累月奏冕為御史中丞追赴京冕又誥曰事驗矣冕又問三日之兆梁鳳曰東京日即自磨滅蜀川日亦不能久此閒日何轉分明不可說冕志之即潼關失守玄宗幸蜀肅宗北如靈武冕會之勸成策立改元為至德元年冕果為中, SBCK: 目盲以手摸}
  - {type: variant, offset: 2118, length: 308, content: 安祿山反南犯洛陽僣稱偽位哥舒翰東守潼關累月奏冕為御史中丞追赴京冕又誥曰事驗矣冕又問三日之兆梁鳳曰東京日即自磨滅蜀川日亦不能久此閒日何轉分明不可說冕志之即潼關失守玄宗幸蜀肅宗北如靈武冕會之勸成策立改元為至德元年冕果為中書侍郎平章事冕奏之肅宗召拜都水使者梁鳳在河隴謂呂諲曰判官骨相亦合得宰相須得一大驚怖即得諲後至驛責讓驛長榜之驛吏武將性麤猛持弓矢突入射諲再發幾中諲面諲逾牆得免以報梁鳳梁鳳曰此必入相逾年諲以黃門侍郎知政事梁鳳在鳳翔李揆盧允二人同見之俱素服自稱選人梁鳳謂之曰公等並至清望官那得云無官揆允以實對梁鳳遣二人行謂揆曰公從舍人即入相一年內事謂允曰公好即是吏部郎中及剋復兩京揆自中書舍人知吏部侍郎事入為中書侍郎平章事, WYG: 目盲}
