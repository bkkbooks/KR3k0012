  - {type: variant, offset: 2587, length: 262, content: 曰師曠見太子晉曰汝聲清浮汝色赤火色不壽王子曰後三年上賓於帝所汝慎母言殃將及汝師曠歸未及三年告死者至孔叢子曰魏安釐王問子順曰馬回之為人雖少文鯁亮直有丈夫大節也吾欲以為相可乎荅曰知臣莫若君何有不可至於亮直之節臣未明也聞諸孫卿其為人也長目而豕視者必體方而心員每以其法相人千百不失臣見回然甚疑其目王卒用之三月果詐得罪金樓子曰宣脩容善許負之術曾正會登樓還語人曰太尉今年必當不濟時靜惠王尚康勝或以為不然曰行步向前氣韻殊下若其不爾不復言相至其年末靜惠王薨及昭明入朝又云必無嗣立之相俄而昭明薨孫卿子曰古者有姑布子卿今世之梁有唐舉相人形狀顏色, WYG: ''}
