  body:
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 三占候周禮春官宗伯下日眡祲掌十煇之法以觀妖祥辨吉凶妖祥善惡之徵鄭司農云煇謂日光氣也眡音視一日祲}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 三占候周禮春官宗伯下曰眡䘲掌十煇之法以觀妖祥辯吉凶一曰祲}
  - {type: variant, offset: 4, length: 0, content: '', krp: 三占候周禮春官宗伯下日眡祲掌十煇之法以觀妖祥辨吉凶妖祥善惡之徵鄭司農云煇謂日光氣也眡音視一日祲}
