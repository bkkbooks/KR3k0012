  - {type: variant, offset: 53, length: 1, content: 為, SBCK: 布焉諸侯以火灾乎梓愼曰往年吾見之是其徵也火出而見今兹火岀而章必火入而伏其居火也乆矣其與不然乎火岀於夏爲三月於商爲四月於周爲五月夏數得天若火怍其四國當之六物之占在宋衛陳鄭乎宋大辰之虛也陳大皡之虛也鄭祝融之虚也皆火房也星孛及漢漢水祥也衛顓頊之虛也故爲帝丘其星爲大水水火之牡也其以丙子若壬午作乎水火所以合也若火入而伏必以壬午不過其見之月鄭禆竈言於子産日宋衛陳鄭將同日火若我用瓘斚玉瓚鄭必不火子産弗從十八年夏五月火始昏見丙子風梓愼曰是謂融風火之始也七日其火作乎戊寅風甚壬午大甚宋衛陳鄭皆火梓慎登大庭氏之庫以望之日宋衛陳鄭也數日皆來告火裨竈日不用吾言鄭又將火鄭}
  - {type: page-break, offset: 53, content: '', id: KR3k0012_SBCK_732-3a}
  - {type: variant, offset: 53, length: 0, content: '', WYG: 布焉諸侯其火灾乎梓慎曰往年吾見之是其徵也火出而見今茲火出而章必火入而伏其居火也久矣其與必然乎火出於夏}
