  - {type: variant, offset: 1556, length: 2, content: 少工, SBCK: 反執約兄子濟迸于石勒約府内地忽赤如丹洋日按河圗徵云地赤如丹血丸當有下反上者恐十月二十七日胡馬當來飮淮水至時石勒騎大至攻城大戰其日西風兵火俱發約大懼㑹風廻賊退時傳言勒遣騎向壽陽約欲送其家還江東洋日必無此事尋而傳言果妄征西將軍􅁃亮鎭武昌咸康三年洋言於亮曰武昌土地有山無林正可圗始不可居終山作八字數不及九昔吳用壬寅來止創立宫城至巳酉還下沬陵陶公亦涉八年土地盛衰有數人心去就有期不可移也公冝更擇吉處武昌不可乆住隋書日􅁃季才初仕梁元帝頗明星暦因共仰觀從容謂季才曰朕猶慮禍起蕭牆何方可息季才日頃天象吿變秦將入郢陛下冝留重臣作鎮荆峽整斾旋都以避其患帝初然之後與懍等議乃止俄而江陵陷滅髙祖爲丞}
