  - {type: variant, offset: 47, length: 0, content: '', krp: 七月戊子晉君將死今兹歲在顓頊之虛姜氏任實守其地居其維首而有妖星焉告邑姜也邑姜晉之妣也天以七紀戊子逢}
  - {type: variant, offset: 48, length: 4, content: 骨法非常, SBCK: 以登星斯於是乎出吾是以譏之又日有星孛于大長西及漢申須日彗所以除舊布新也天事􅁪象今除於火火出}
