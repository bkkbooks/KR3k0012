  - {type: variant, offset: 47, length: 0, content: '', SBCK: 七月戊子晉君將死今兹歲在顓頊之虛姜氏任實守其地居其維首而有妖星焉告邑姜也邑姜晉之妣也天以七紀戊子逢}
