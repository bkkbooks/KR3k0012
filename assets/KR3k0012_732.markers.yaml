  - {type: variant, offset: 2227, length: 622, content: 侍郎平章事冕奏之肅宗召拜都水使者梁鳳在河隴謂呂諲曰判官骨相亦合得宰相須得一大驚怖即得諲後至驛責讓驛長榜之驛吏武將性麤猛持弓矢突入射諲再發幾中諲面諲逾牆得免以報梁鳳梁鳳曰此必入相逾年諲以黃門侍郎知政事梁鳳在鳳翔李揆盧允二人同見之俱素服自稱選人梁鳳謂之曰公等並至清望官那得云無官揆允以實對梁鳳遣二人行謂揆曰公從舍人即入相一年內事謂允曰公好即是吏部郎中及剋復兩京揆自中書舍人知吏部侍郎事入為中書侍郎平章事乃以允為吏部郎中其驗多此類佯聾以自晦後冕為右僕射兼御史大夫成都尹劍南節度使有進止令將梁鳳行後病卒後周史曰周玄豹者本鄴人少為僧其師有知人之鑑從遊十餘年苦辛無憚師知其可教遂傳其祕旨既長還歸俗盧程寄褐嘗遊于燕與同志二人謁焉玄豹退謂鄉人張殷袞曰適二君子明年花發俱為故人唯彼道士他年甚貴來歲二子果零落於趙魏閒又二十年程登庸於鄴下周書曰師曠見太子晉曰汝聲清浮汝色赤火色不壽王子曰後三年上賓於帝所汝慎母言殃將及汝師曠歸未及三年告死者至孔叢子曰魏安釐王問子順曰馬回之為人雖少文鯁亮直有丈夫大節也吾欲以為相可乎荅曰知臣莫若君何有不可至於亮直之節臣未明也聞諸孫卿其為人也長目而豕視者必體方而心員每以其法相人千百不失臣見回然甚疑其目王卒用之三月果詐得罪金樓子曰宣脩容善許負之術曾正會登樓還語人曰太尉今年必當不濟時靜惠王尚康勝或以為不然曰行步向前氣韻殊下若其不爾不復言相至其年末靜惠王薨及昭明入朝又云必無嗣立之相俄而昭明薨孫卿子曰古者有姑布子卿今世之梁有唐舉相人形狀顏色, SBCK: ''}
