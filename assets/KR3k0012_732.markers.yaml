  - {type: variant, offset: 1548, length: 7, content: 張憬藏許州長社, SBCK: 有急發視之生到葭萌與吏爭津吏撾破從者頭生開筒得書言到葭萌與吏􅃲頭破者以此膏裹之生用其言創者卽愈生歎服乃還卒業翳遂隱居竄跡終于家晉書曰戴洋善方術司馬颺爲烏程令將赴職洋曰君深愼下吏颺後果坐吏免官洋又謂曰􅀸免官十一月當作郡加將軍至期爲太守搌武將軍颺賣宅將行洋止之曰君不得至當還不可無宅颺果爲徐龕所逼不得之郡元帝增颺衆二于使助祖逖洋勸不行乃稱病收付廷尉俄而因赦得出康帝將登祚使洋擇日洋以爲冝用三月二十四日景午太史令陳卓奏用二十二日昔越王用三月甲辰反國范蠡稱在陽之前當生盡岀上下盡空德將出遊刑入中宫今與此同洋曰越王爲吳所囚雖當時遜媚實懷怨懟故用甲辰乘德而歸留刑吳宫今大王內無含咎外無怨憤當承天洪命納祚無窮何爲追越王去國留殃故事耶乃從之咸和元年祖約南行路遇大雷雨西南來洋曰甲子西南天雷其下必失火將至夏汝南}
