  - {type: variant, offset: 2428, length: 158, content: 允為吏部郎中其驗多此類佯聾以自晦後冕為右僕射兼御史大夫成都尹劍南節度使有進止令將梁鳳行後病卒後周史曰周玄豹者本鄴人少為僧其師有知人之鑑從遊十餘年苦辛無憚師知其可教遂傳其祕旨既長還歸俗盧程寄褐嘗遊于燕與同志二人謁焉玄豹退謂鄉人張殷袞曰適二君子明年花發俱為故人唯彼道士他年甚貴來歲二子果零落於趙魏閒又二十年程登庸於鄴下周, WYG: 手摸}
