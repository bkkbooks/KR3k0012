  - {type: variant, offset: 14, length: 10, content: 安紫氣充庭神光照室體, SBCK: 厯推前年誤置閏逐楚而建陳也水得妃而興陳興則楚衰故曰逐楚而建陳妃以五成故曰五年妃合也五行各相妃合得五而成故五歲而陳復封爲十三年陳侯吴歸于陳傳歲五及鶉火而後陳卒亡楚克}
