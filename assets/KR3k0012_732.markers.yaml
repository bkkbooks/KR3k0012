  - {type: variant, offset: 1563, length: 4, content: 綱齊名太, SBCK: 時人事􅀸以爲何如季才日天道精微難可急察􅀼以人事卜之符兆已定季才縱言不可公豈復得爲箕頴之士乎高祖默然乆之因舉首曰吾今譬如騎獸誠不得下矣因賜雜綵五十疋絹二百叚日愧公此意冝善爲思之大定元年正月季才言日今月戊戌平旦靑氣如樓闕見於國城之上俄而變紫逆風西行氣經云天不能無雲而雨皇王不能無氣而立於今王氣已見須卽應之二月日岀卯入酉居天之正位謂之二八之門日者人君之象人君正位冝用二月其月十三日甲}
