  - {type: variant, offset: 1871, length: 129, content: 高智周之少也與來濟郝處俊孫處約同遊寓于揚州江都人石仲覽傾產以待之嘗引相工視濟等相工曰四人皆宰相也而石氏不及見焉然來早貴而末途屯躓高晚達而最為壽考夫速登者易顛徐進者少患天之道也仲覽貞觀末為兵部郎中卒後濟等乃貴皆如相工所言又曰金梁鳳不知何許人也天寶十三載客於河西, SBCK: 盧太翼}
