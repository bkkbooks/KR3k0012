  - {type: variant, offset: 2001, length: 115, content: 相人又言玄象時哥舒翰為節度使詔入京師裴冕為祠部郎中知河西留後左武威梁鳳謂冕曰玄象有變半年閒有兵起郎中此時當得中丞不拜中丞即得宰相不離天子左右大富貴冕曰公乃狂言冕何至此梁鳳曰有一日向東京一日入蜀川一日來朔方此時公得相冕懼其言深謝絕之, SBCK: 暦數}
