  - {type: variant, offset: 994, length: 549, content: 何如天綱曰公等骨法大勝往時終當俱受榮貴至九年被召入京共造天綱天綱謂杜公曰當即得三品要職年壽非天綱所知王韋兩公在後當得三品官兼有年壽然晚途皆不稱愜韋公尢甚淹至京拜御史大夫撿校吏部尚書王珪尋授侍中出為同州剌史韋挺歷御史大夫大常卿貶授象州剌史皆如天綱之言大業末竇軌客遊德陽嘗求問天綱天綱謂曰君額上伏犀貫玉枕輔角又成必於梁益州大樹功業武德初軌為益州行臺僕射引天綱深禮之天綱又謂軌曰骨法成就不異往時之言然目氣赤脈貫瞳子語則赤氣浮面如為將軍恐多殺人願深自誡慎武德九年軌坐事被徵將赴京謂天綱曰更得何官曰面上家人坐仍未見動輔角右畔光澤更有喜色至京必承恩還來此任其年果重授益州都督貞觀八年太宗聞其名召至九成宮時中書舍人岑文本令視之天綱曰舍人學堂成就眉覆過目文才振於海內頭又生骨猶未大成若得三品恐是損壽之徵文本官至中書令尋卒其年侍御史張行成馬周同問天綱天綱曰馬侍御伏犀貫腦兼有玉枕文背如負物當富貴不可言近古已來君臣道合罕有如公者公面色赤命門色暗耳後骨不起耳無根只恐非壽者周後位至中書令兼吏部尚書年四十八卒謂行成曰公五嶽四瀆成就下亭豐滿得官雖晚終居宰輔之地行成後至尚書右僕射天綱相人所中皆此類也申國公高士廉嘗謂曰君更作何官天綱曰自知相命今年四月盡矣果至是月而卒又曰劉仁軌初為陳倉尉相工袁天綱謂曰君相當位鄰台輔年將九十後果, SBCK: ''}
