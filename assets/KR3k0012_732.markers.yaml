  - {type: variant, offset: 3059, length: 160, content: 尺廣三寸名震天下若此之狀蓋遠代而求非一世之異也使形殊於外道合其中名震天下不亦宜乎語云無愛而戚憂必及之無慶而歡樂必還之此心有先動而神有先知則色有先見也故扁鵲見桓公知其將亡申叔見巫臣知其竊妻而逃也荀子以為天不知人事邪則周公有風雷之災宋景有三次之福知人事乎則楚昭有弗榮之應邾文無延期之報由是言之則天道之與相占可知而疑不可而無也, SBCK: 十二}
