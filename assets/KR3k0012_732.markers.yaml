  - {type: variant, offset: 894, length: 98, content: 武職復語淹等二十年外終恐三賢同被責黜暫去即還淹尋遷侍御史武德中為天策府兵曹文學館學士王珪為太子中允韋挺隋末與隱太子友善後太子引以為率至武德六年俱配流嶲州淹等至益州見天綱曰裘公洛邑之言則信矣未知今日, WYG: 告}
