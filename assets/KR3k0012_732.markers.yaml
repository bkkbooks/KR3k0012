  - {type: variant, offset: 121, length: 604, content: 性寬厚如愚而內敏仕隋歷通事舍人滄州長史煬帝時征為奉御時高祖為殿內少監深善之亟相往來情契愈昵弘道善相因言曰公天中伏犀下相接於眉此非人臣之相願深自愛高祖取弘道銀盆置之於地引弓射之謂弘道曰向言有驗當一發中之既發應弦而中弘道曰願公事驗之後賜償金盆高祖大悅又曰太宗年四歲時忽有書生自言善相詣高祖門曰公是貴人有大貴子因目太宗曰龍鳳之姿天日之表也公之貴以此兒後必由之而創功業年將二十必能濟世安民高祖聞其言甚懼及書生辭出使人捕欲殺之以滅口而不知所在高祖以為神陰採濟世安民之義遂以名焉又曰乙弗弘禮貝州高唐人也隋煬帝居藩召令相己弘禮跪而賀曰大王骨法非常必為萬乘之主誠願誡之在德煬帝即位召天下道術人置坊以居之仍令弘禮統攝帝見海內漸亂玄象錯謬內懷憂恐嘗謂弘禮曰卿昔相朕其言已驗且占相道術朕頗自知卿更相朕終當何如弘禮逡巡不敢荅帝迫之曰卿言與朕術不同罪當死弘禮曰臣本觀相書凡人之相有類於陛下者不得善終臣聞聖人不相故知凡聖不同耳自是帝常遣人監之不得與人交言又曰則天初在襁褓袁天綱來第中謂其母氏曰唯夫人骨法必生貴子乃召諸子令天綱相之見元慶元爽曰此二子皆保家之主官可至三品見韓國夫人曰此女亦大貴然不利其夫乳母時抱則天衣男子之服天綱曰此郎君子神形爽徹不易可知試令行看於是步於床前仍令舉目天綱大驚曰龍睛鳳頸貴人之極也更轉側視之曰若是女後當為天下之主也又曰乙拂弘禮善占相初泗州剌史薛大鼎隋時嘗坐事沒為奴貞觀初與數人詣弘禮次至大鼎曰君奴也欲何所相咸曰, SBCK: ''}
