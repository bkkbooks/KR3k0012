  - {type: variant, offset: 2819, length: 1, content: 鳩, krp: 行縣有羣雀鳴桑樹上宣謂吏曰前有覆車粟此雀相隨欲徃食行數里果有覆車粟張顯析言曰萬雀不及一鳯凰衆星不如一明月沙州記曰寒嶺去太陽川三十里便有雀䑕同穴雀亦如家雀色小白䑕亦如家䑕色如黄瓦無尾舞雀述異記曰周成王元年貝多國人獻舞雀周公命返之神雀漢武内傳曰西王母仙藥有昆丘神崔漢書曰宣帝元康三年詔曰前年夏神雀集雍今春五色鳥以萬數飛屬縣翺翔而舞欲集未下其令三輔母得以春夏擿巢探夘彈射飛鳥具爲令東觀漢記曰永安十七年公卿以神雀五色翔集京師奉觴上壽令賈逵作神雀頌崔豹古今注曰孝哀帝太𥘉三年㤗畤殿有雀五色頭冠長寸餘始到時鳥環其旁也隋書曰開皇十六年有神雀降於含章闥髙祖召百官賜醼告以此瑞許善心於座請紙筆製神雀頌奏之髙祖甚恱曰我見神雀共皇后觀之今且召公䓁入適述此事善心於座始知即能成頌文不加點筆不停毫常聞此言今見其事因賜物二百叚赤雀春秋孔演圖曰鳥化爲書孔子奉以告天赤雀書上化爲黄玉刻曰孔提命作法爲制赤雀集將受命制尚書中候曰赤雀衘丹書入豊止於昌前謝承後漢書曰琅琊董仲爲不其令赤雀乳㕔事前桑上民爲作歌頌呉録曰景帝永安六年赤雀見於豫章北齊書曰天保元年京師獲赤雀獻於南郊唐書曰武德中赤雀}
