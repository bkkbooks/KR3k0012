  - {type: variant, offset: 940, length: 1, content: 巢, WYG: 皮籠百里奚抱朴子曰千羊不能捍獨虎萬雀不能抵一鷹戰國策曰荘辛謂楚王曰夫雀俯啄白粒仰栖茂樹皷翅奮翼自以為無患與人無争也不知夫公子王孫左挾彈右攝丸以加其頸書栖乎茂樹夕調乎酸鹹晏子曰齊景公探雀􅑹􅑹弱故反之晏子再拜賀曰吾君有聖人之道矣君探􅑹􅑹弱故反之是長幼也禽獸若此而况人乎此聖人之道也家語曰孔子見羅者所得雀皆黄口也孔子曰黄口盡得大雀獨不得何也羅者對曰黄口從大雀者則不得大雀從黄口者}
