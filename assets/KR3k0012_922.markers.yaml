  - {type: variant, offset: 3985, length: 2, content: 鳥鷃, SBCK: 􅉖然命左右取之㱕致巾箱中養之唯食黄花百餘日毛羽成朝去暮還後忽與羣雀俱來哀鳴繞堂數日乃去及夕三更寳讀書未卧有黄衣童子向寳拜曰我王母使臣昔使蓬萊不慎爲鵄梟所搏君仁愛極救實成德濟今當受使南海不得奉侍極以悲傷以白環四枚與寳曰令君子孫㓗白且位登三事當如此環矣}
