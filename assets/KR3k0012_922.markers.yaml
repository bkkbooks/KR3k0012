  - {type: variant, offset: 1592, length: 3, content: 方湖千, SBCK: 雀飛入其手占者以爲封爵之祥益部􅂄舊傳曰楊宣爲河西太守行縣有羣雀鳴桑樹上宣謂吏曰前有覆車粟此雀相隨欲徃食行數}
