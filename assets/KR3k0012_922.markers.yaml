  - {type: variant, offset: 3973, length: 0, content: '', SBCK: 榮雀者賞萌余當立古詩曰桂樹華不實黄雀巢其顛說􅁐曰吴王欲伐荆有諌者死舎人少孺子欲諌不敢即懷操彈於後園露沾其衣如是三旦王曰子何來沾衣如此對曰園中有樹其上有蟬蟬髙居悲鳴飲露不知螳蜋在其後螳蜋委身曲附欲取蟬而不知黄雀在其旁黄雀延頸欲啄螳蜋不知彈丸在其下臣梜彈欲取黄雀不知露霑衣如此皆務欲得於前不顧於後患呉王乃罷漢武}
  - {type: variant, offset: 3973, length: 0, content: '', WYG: 熒雀者賞萌余當立古詩曰佳樹花不實黄雀巢其顛說苑曰呉王欲伐荆有諫者死舍人少孺子欲諫不敢懐丸操彈於後園露沾其衣如是三旦王曰子來何沾衣如此對曰園中有榆其端有蟬蟬髙居悲鳴飲露不知螳螂在其後螳螂委身曲跗欲取之而不知黄雀在其旁黄雀延頸欲啄螳螂不知臣操弓在其下臣操彈欲取黄雀不知露沾衣如此皆務貪得於前不顧於後呉王乃罷漢武}
