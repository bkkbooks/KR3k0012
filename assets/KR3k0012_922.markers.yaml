  - {type: variant, offset: 3789, length: 149, content: 所馮敬通與任武達書曰婦口如布穀孫卿子曰南方有鳥焉名曰蒙鳩以羽為巢而編之以髮繫之葦苕風至苕折子死卵破巢非不完也而繫者然南方草物狀曰番鳩生海邊土穴中里民常以臘月正月捕食味如蟹得過十餘不可復食合浦交阯九真有之鷃左傳曰郯子云少皞鷙以鳥名官青鳥氏司啟者也杜預注曰青鳥鶬鷃也立春鳴立冬去爾雅曰䲩鷃也郭璞注曰今鷃, SBCK: 冝則黄}
