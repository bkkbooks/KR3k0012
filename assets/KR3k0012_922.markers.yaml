  - {type: variant, offset: 3, length: 2, content: 八鵲, WYG: 九鷰白鷰赤鷰雀舞雀神雀赤雀黄雀青雀大雀鷰春秋運斗樞曰揺光星散為燕禮記曰仲春之月𤣥鳥至至之日以太牢祀於高禖天子親往左傳曰郯子云少皥時鳥師而鳥名𤣥鳥氏司分者也𤣥鳥鷰也春分來秋分去又曰吴公子札自衛如晉将宿於戚戚孫文子邑也聞鐘聲曰異哉夫子之在此也猶鷰之巢於幕上也詩曰燕燕衛莊姜送歸妾也鷰鷰于飛差池其羽之子于歸逺送于野鷰鷰于飛下上其音又曰天命𤣥鳥降而生商宅殷土芒芒𤣥鳥鳦也春分鳥降陽之升也昔有娀氏女簡狄配髙辛與之祈于郊禖而生契今故以𤣥鳥至而祠焉芒芒大貎也爾雅曰鷰鷰乙也史記曰帝嚳少妃有娀音嵩氏曰簡狄以春分𤣥鳥至之日祠于髙禖有𤣥鳥遺卵簡狄吞之生契又曰陳勝輟耕嘆曰燕雀安知鴻鵠之志哉又曰臨江閔王榮坐侵廟壖為宮上徵榮詣中尉府郅都責訊王王恐自殺葬藍田燕數萬衘土置冡上百姓憐之漢書名臣奏曰丞相薛宣奏曰茂陵寢上食日𤣥鳥來集吐所含大豆紫黑色翺翔殿上此陛下永與天無極天下幸甚又曰成帝和平二年大水有燕生雀又曰王莽開哀帝母丁姬冡有燕数千銜土投其窟中魏志曰余陶令諸葛原遷新興太守管輅祖餞之賔客並㑹自起取燕卵蜂窠蜘蛛著噐中使輅覆射卦成輅曰含氣須變依于室堂雄雌以分翅未舒張此燕卵也晉中興書曰中原䘮亂鄉人遂共推郗鍳為主與千餘家俱避難於魯國嶧山山有重險百姓飢饉野無生草時或掘野鼠蟄燕而食之晉書載記曰慕容儁時燕窠于雋正陽殿之西椒生雛三頭上有豎毛凡城獻異鳥五色成章儁謂羣僚曰是何祥也咸稱燕者燕鳥也首有毛冠者言大燕龍興冠通天章甫之象也巢正陽西椒者言至尊臨軒朝萬國之徵也三子者數應三統之騐也神鳥五色言聖朝将繼五行之籙以御四海者也儁覽之大恱南史曰㐮陽覇城王整之姊嫁為衛敬瑜妻年十六而敬瑜亡父母姑舅咸欲嫁之誓而不許乃截耳置槃中為誓乃止所住有燕巢常雙飛來去後忽孤飛女感其偏栖乃以縷繫脚為誌後歲此燕果復來猶帶前縷女復為詩曰昔年無偶去今春猶獨歸故人恩既重不忍復䨇飛雍州刺史西昌侯藻嘉其羙節乃起樓於門題曰貞義衛媍之閭又表於臺崔江北凉録曰昔魯人有浮海而失津者至於亶州見仲尼及七十子遊於海中與魯人一木杖令閉目乗之使歸告魯侯築城以備寇魯人出海投杖水中乃龍也具以狀告魯侯魯侯不信俄而羣燕數百銜土培城魯侯乃大城曲阜訖而齊寇至攻魯不克而還韓子曰天下無道攻擊不已甲生蟣虱燕雀處帷幄淮南子曰故先王之政四海之雲至而修封疆春分之後四海出雲蝦蟇鳴鷰雀降而逹路除道又曰大厦成而燕雀相賀呂氏春秋曰有娀氏有二佚女為九成之臺飲必皷帝令燕往視之鳴若隘隘二女為愛而爭摶之覆之玉筐少選發而視之少選者須臾之頃也燕遺二卵北飛遂不返二女作歌曰燕往飛寔始為北音北國之音冥驗記曰程徳度武昌人昔在潯陽夜見屋裏自明先有燕窠忽有小児長尺餘潔白從窠中出至床前曰却後三年當得長生之道尋闇而㓕甚祕宻之又曰沛國周氏子有瘖疾不能言有人來乞飲聞其児聲問之具以實告客曰君可還内思過周氏異其言知非常人良久云都不憶有罪過客曰試更思㓜時事入内食頃出曰記小時當床有燕窠中有三子母還哺之輙出取食屋下舉手得及指向巢中燕子亦出口承受乃取三蒺䔧各與之吞即死母還不見子悲鳴而去懼自悔責客變為道人之容曰君既自知悔罪今除矣便聞其児言語道人即不見廣雅曰􅜈𤣥鳥也說文曰燕𤣥鳥也布翅岐尾象形也齊魯之風作巢避戊己論衡曰燕鳥形也非氣也安得生人且燕之長不過五寸安能成七尺之形時或契母適欲懐脤遭吞燕卵好竒者因以為異耳揚子法言曰朱鳥䴉䴉歸其肆矣博物志曰人食燕肉不可入水為蛟龍所吞又曰燕避戊己不銜泥塗巢此非才智自然得之吳地記曰春申君都吳宫因加巧飾春申死吏照燕窟失火遂焚越絶書曰吳路西宫在長秋周一里二百二十六歩秦皇十二年守宫人照燕失火燒之蘇州􅊘墓記曰宋青州刺史郁泰𤣥字義貞好黄老性仁恕徳感禽獸初葬之日羣燕數千銜土於􅊘上􅊘髙與他有異村鄉嵗時迄今祭祀述異記曰五百歲燕生胡髯茅君内傳曰句曲山有神芝五種第三曰燕胎芝其色紫形如葵葉上有燕象如欲飛状光明洞澈食一株拜為太清仙君正一郎中崔豹古今注曰燕一名天女一名鷙鳥廣州志曰燕有三種於巖崖者為上燕湘中記曰零陵有石燕形相得雷風則飛頡頏如真燕談藪曰宋宣簡王景素鎮朱方常與劉璡同在小齋有燕集承塵飛鳴相追景素曰萬物各有性靈而獨賦於鱗羽乎若斯鳥也㳺則參於雲烟之上止則隠於林木之下飢則啄渇則飲形體無累乎物得失不闗於心一何樂乎九章筭術曰五雀六燕飛集於衡衡適平一雀一燕飛而易則雀重而燕輕白鷰宋元嘉起居注曰元年七月有白燕集於齊郡逰翔庭宇至九月乃去衆燕翼隨恒有數千陳書曰髙士馬樞目常黄能視闇中物有白燕一隻巢其庭樹馴狎欄廡時上几案春來秋去幾三十年抱朴子曰千歳燕戸向北其色白而尾屈陰乾之末服一頭得五百歳此肉芝也京房易卦曰山見白燕其君且得貴女今俗名燕為天女也續異記曰孫氏妻黄氏見一童子當前以釵擲之躍入雲去夜聞户外歌曰昔填夏家塜輦泥頭欲禿今寄黄氏居非意傷我目尋覔巢中得一白燕左目傷宦城記曰侍中紀昌睦初生有白燕一䨇出巢既表素質亦通宦途凉州記曰吕光太安三年白燕㳺酒泉郡黑燕列從王威列傳曰時有白燕來翔被令為賦赤鷰田俅子曰少昊氏之時有赤燕一雙飛集少昊氏之户遺其丹書雀春秋運斗樞紀曰揺光星散為雀}
