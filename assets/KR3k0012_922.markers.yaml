  - {type: variant, offset: 2819, length: 1, content: 鳩, WYG: 行縣有羣雀鳴桑樹上宣謂吏曰前有覆車粟此雀相隨欲往食之行數里視之果如其言張顯析言曰萬雀不及一鳳凰衆星不如一明月沙洲記曰寒嶺去大陽川三十里有雀鼠同穴雀亦如家雀色小白鼠亦如家鼠色如黄虺無尾舞雀述異記曰周成王元年貝多國人獻舞雀成王命反之神雀漢武内傳曰西王母仙藥有昆丘神雀漢書曰宣帝元康三年詔曰前年夏有神雀集雍今春五色鳥以萬數飛屬縣翺翔而舞欲集未下其令三輔毋得以春夏摘巢探卵彈射飛鳥著為令東觀漢記曰永安十七年公卿以神雀五色翔集京師奉觴上夀令賈逵作神雀頌崔豹古今注曰孝哀帝太初三年泰畤殿有雀五色頭冠長尺餘始到時鳥環其旁隋書曰開皇十六年有神雀降於含章闥髙祖召百官賜醼酧吿以此瑞許善心於座請紙筆製神雀頌奏之髙祖甚悅曰我見神雀共皇后觀之今且召公弟入適述此善心於座始知即能成頌文不加㸃筆不停毫嘗聞此言今見其事因賜物二百疋赤雀春秋孔演圖曰鳥化為書孔子奉以吿天赤雀集書上化為黄玉刻曰孔提命作應法為制赤雀集將受命制尚書中候曰赤雀含丹書止於昌前謝承恩漢書曰琅邪董仲為不其令赤雀乳㕔事前桑上民為作歌頌呉録曰景帝永安六年赤雀見於豫章北齊書曰天保元年京師獲赤雀獻於南郊唐書曰武徳中赤雀}
