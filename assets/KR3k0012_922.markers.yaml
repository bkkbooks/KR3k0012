  - {type: variant, offset: 334, length: 596, content: 傾朝澄見樹上鵲巢便脫衣上樹探𪆪而弄之神氣肅然傍若無人又曰涼李歆時通街大樹上有烏鵲爭巢鵲為烏所殺宋書曰徐羨之拜司空有雙鵲於太極殿東鴟尾鳴喚後魏書曰李崇為楊州刺史時有泉水湧於八公山頂壽春城中有魚無數從地湧出野鴨群飛入城與鵲爭巢北齊書曰武衛奚永洛與河內人張子信對坐有鵲鳴於庭樹鬭而墮焉子信曰鵲言不善向夕若有風從西南來歷樹拂堂角則有口舌事今夜有人喚必不得往子信去後果有風來至夜高儼使召永洛且云勑喚永洛欲赴其妻苦留稱墮馬腳折遂免於難又曰李孝貞字元操信州刺史希禮之子也嘗詠鵲其佳句云東立朝雨霽南飛夜月明為知音所賞隋書曰郭儁字弘文太原人家門雍睦七葉共居犬豕同乳烏鵲通巢時人以為義感州縣上其事上遣平昌公宇文㢸房密切詣其家勞問之御史柳彧巡省河北表其門閭又曰翟普林父母俱終哀毀殆將滅性廬於墓側有二鵲巢其廬前樹每入其蘆馴狎無所驚懼唐書曰高祖圍堯君素於蒲州糧盡人相食有烏鵲巢其發石車之上人心遂離為李楚客斬首傳之京師又曰大曆八年夏四月乾陵上仙觀天尊殿有雙鵲衘柴及泥補葺殿之隟壞凡一十五處宰臣等上賀曰臣聞孝至於天則祥發陵邑德被於物則化及鳥獸伏惟陛下因心廣教弘道極和時殷霜露之恩流行雲雨之澤故前聖垂裕歆於明誠皇天報貺錫以嘉應異鵲來感翔集可窺跡比人謀事歸神化望宣示中外編諸史冊又曰貞元四年中書省梧樹上有鵲以泥為巢又曰竇申宰相參之族子參特愛申每議除授多詢於申申或泄之以招權受賂每所至人謂之喜鵲又曰開成二年三月真興門外鵲巢於古冢, SBCK: ''}
