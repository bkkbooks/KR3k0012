  - {type: variant, offset: 2135, length: 364, content: 則孫炎曰鳺鴀一名祝鳩鶻鳩一名鳴鳩犍為舍人曰鳺鴀楚鳩今梁謂之班鳩也鵲音鶻周書時訓曰穀雨之日又五日鳴鳩拂其羽鳴鳩不拂其羽國不治兵後漢書曰楊由從人飲勑諸生酒三行嚴車去請問其趣由曰向社中木上有鳩鳥鬭兵之象由去後舍中有鬭者果殺二人也魏志曰管輅至郭恩家有飛鳩來在梁頭鳴甚急輅曰當有老公從東方來候肫一頭酒一壺主人雖喜當有小故明日果有客如所占而射鷄作食箭從樹間激中數歲女子流血驚怖梁書曰庾子與父域為巴西守卒於郡子與奉喪還鄉初發蜀有雙鳩巢舟中及至又栖廬側每聞哭泣之聲必飛翔簷宇悲鳴激切隋書曰李得饒性至孝父寢疾輒終日不食及丁憂水漿不入口五日後甘露降其庭樹有鳩巢其廬孔叢子曰邯鄲人正旦獻鳩於趙簡子厚賞之客曰正旦放鳩厚恩也得賞競捕之不如勿賞簡子曰善搜神記曰長安有張氏者晝獨處空室有鳩自外入止乎床張氏惡之披懷而祝之曰鳩今來為我禍耶飛上承塵為福耶來入我懷鳩, WYG: 雀}
