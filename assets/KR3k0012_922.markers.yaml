  - {type: variant, offset: 1586, length: 1, content: 山, SBCK: 野有鳥如丹雀自來吐五色氣氛氲如雲}
  - {type: variant, offset: 1586, length: 252, content: 山名環丘上有方湖千里多大鵲高一丈群飛於湖際衘不周之粟於環丘之上郭子橫洞冥記曰帝解鳩鴻之刀以賜東方朔刀長三尺朔曰此刀採首山之金鑄為此刀雄者以飛雌者獨在金出九陽清溪有鵲衘火於清溪之上廣異記曰南方赤帝女學道得仙居南陽愕山桑樹上正月一日衘柴作巢至十五日成或作白鵲或女人赤帝見之悲慟誘之不得以火焚之女即昇天因名帝女桑今人至十五日焚鵲巢作灰汁浴蠶子招絲象此也式經三十六禽變曰酉為烏鵲五行書曰燒鵲置酒中令家無盜賊山鵲爾雅曰鸒山鵲郭璞注曰似鵲而有文彩長尾觜腳皆赤鸒胡礭切說文曰鸒山鵲知來事也搜神記曰常山張顥為梁相天新雨後, krp: 野}
  - {type: variant, offset: 1588, length: 2, content: 環丘, SBCK: 曰慿霄雀能羣飛衘土成墳異苑曰}
