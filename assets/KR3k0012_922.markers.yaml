  - {type: variant, offset: 3, length: 2, content: 八鵲, krp: 九鷰白鷰赤鷰雀舞雀神雀赤雀黄雀青雀大雀鷰春秋運斗樞曰揺光星散爲鷰禮記曰仲春之月玄鳥至之日以太牢祠于髙禖天子親徃左傳曰郯子云少皥鳥師而鳥名玄鳥氏司分者也玄鳥鷰也春分來秋分去又曰吴公子禮自衛如晉將宿於戚戚孫文子之邑也聞鍾聲曰異哉夫子之在此也猶鷰之巢於幕上也言至危也詩曰鷰鷰衛莊姜送歸妾也鷰鷰于飛差池其羽之子于歸逺送于野鷰鷰于飛下上其音又曰天命玄鳥降而生啇宅殷土茫茫玄鳥乙鳥也春分鳥降湯之先祖有娀氏女簡狄配髙辛與之祈于郊禖而生契故本以玄鳥至而祠焉茫茫大貌也爾雅曰鷰鷰乙也注云齊曰鷰梁曰乙史記曰帝嚳少妃有娀氏娀音嵩曰簡狄以春分玄鳥至之日祠于髙媒有玄鳥遺卵簡狄吞之生契又曰陳勝輟耕歎曰鷰雀安知鴻鵠之志哉又曰臨江閔王榮坐侵廟壖爲宫上徴榮詣中尉府郅都責訊王王恐自殺葬藍田鷰數万衘土置冢上百姓憐之漢書名臣奏曰丞相薛宣對曰茂陵寢上食日玄鳥來集吐所含大豆紫墨色翶翔殿上此陛下永與天無極天下幸甚又曰成帝和平二年秋大水有鷰生雀又曰王莽開哀帝母丁姬冢有鷰數千衘土投其穿中魏志曰館陶令諸葛原遷新興太守管輅祖餞之賔客並㑹自起取鷰卵蜂窠蜘蛛着器中使輅覆射卦成輅曰含氣湏變依于宇堂雄雌以分趐未舒張此鷰卵也晉中興書曰中原䘮亂郷人遂共推郗鑒爲主與千餘家俱避難於魯國嶧山山有重險百姓飢饉野饌生草時或掘野䑕蟄鷰而食之晉書載記曰慕容㑺時鷰巢于㑺正陽殿之西椒生三雛頂上堅毛几城献異鳥五色成章儁謂羣僚曰是何祥也咸稱鷰者燕鳥也首有毛冠者言大燕龍興冠通天冕章甫之象也巢正陽西椒者言至尊臨軒朝萬國之徴也三子者數應三統之驗也神鳥五色言聖朝將繼五行之籙以御四海者也㑺覽之大恱南史曰襄陽覇城王整之姉嫁爲衛敬瑜妻年十六而敬瑜亡父母舅姑咸欲嫁之誓而不許乃截耳置盤中爲誓乃止所住户有鷰巢常雙來去後忽孤飛女感其偏栖乃以縷繫脚爲誌後歳此鷰果復更來猶帶前縷女復爲詩曰昔年無偶去今春猶獨歸故人恩旣重不忍復雙飛雍州刺史西昌侯藻嘉其美節乃起樓於門題曰貞義衛婦之閭又表於臺崔鴻北録曰昔魯人有浮海而失津者至于澶洲見仲尼及七十子遊于海中與魯人一木杖令閉目乗之使歸告魯侯築城以備㓂魯人出海投杖水中乃龍也具以狀告魯侯不信俄而有羣鷰數萬衘土培城魯侯信之大城曲阜訖而齊㓂至攻魯不克而還韓子曰天下無道攻擊不巳甲胄生蟣虱鷰雀處帷幄淮南子曰故先王之政四海之雲至而修封疆春分之後四海出雲蝦蟇鳴鷰降而逹路除道春分之後又曰大厦成而鷰雀相賀吕氏春秋曰有娀氏有二佚女爲九成之臺飲食必鼔帝令鷰徃視之鳴若謚隘二女愛而争搏之覆以玉筐少選髙誘注曰少選湏臾發而視之鷰遺二卵北飛遂不反二女作歌曰鷰徃飛實始爲北音北國之音也宣驗記曰程德度武昌人昔在潯陽夜見屋裏自明先有鷰窠忽有小兒長尺餘潔白從窠出至床前曰却後三年當得長生之道㝷闇而滅甚祕宻之又曰沛國周氏有三子瘖並不能言有人來乞飲聞其兒聲問之具以實對客曰君可還内思過旣異其言知非常人良乆云都不憶有罪過客曰試更思㓜時事入内食頃出曰記小兒時當床有鷰巢中有三子母還哺之輙出取食屋下舉手得及指内巢中鷰子亦出口承受乃取三蒺䔧各與之吞即死母還不見子悲鳴而去恒自悔責客變爲道人之容曰君旣自知悔罪今除矣便聞其兒言語周正即不見道人廣雅曰玄鳥鷰也說文曰鷰玄鳥也布翅拔尾象形也齊魯之鳯作巢避戊巳論衡曰鷰鳥也形似非氣也安得生人且鷰之長不過五寸安能成七尺之形契母適欲懷妊遭吞鷰卵好竒因以爲其生耳楊子法言曰朱鳥翾翾歸其肆矣侯苞注曰朱鳥鷰别名四海肆也博物志曰人食鷰肉不可入水爲蛟龍所吞又曰鷰戊巳日不衘泥塗巢此非才智自然得之吴地記曰春申君都吴宫因加巧飾春申死吏照鷰窟失火遂焚越絶書曰吴路西宫在長秋周一里二百二十六歩秦始皇十二年守宫者照鷰失火燒之蘇州塚墓記曰宋青州刺史郁㤗玄字義真好黄老故老相傳㤗性仁恕德感禽獸𥘉葬之日有羣鷰數千衘土於塚上今塚猶髙大與他有異村郷歳時迄今祭祀茅君内傳曰句曲山有神芝五種弟三名鷰貽芝其色紫形如葵藿葉上有鷰象如欲飛狀光明洞澈食一株拜爲太清龍虎仙君崔豹古今注曰鷰一名天女一名鷙鳥廣州志曰鷰有三種乳於巖崖者爲土鷰湘中記曰零陵有石鷰形似得雷風則飛鴶䲳如真鷰談數曰王景素甞與劉璡同在小齋有鷰集承塵飛鳴相追景素曰萬物各有性靈而獨賤於鱗羽乎若斯鳥也遊則叅於雲煙之上止則隱於林木之下飢則啄渇則飲形體無累乎物得失不關於心一何樂哉九章筭術曰五雀六鷰飛集于衡適平一雀一鷰飛而易處則雀重而鷰輕白鷰宋元嘉起居注曰元年七月有白鷰集於齊郡遊翔庭宇經九日乃去衆鷰翼隨恒有數千陳書曰髙士馬樞目常黄能視闇中物有白鷰一雙巢其庭樹馴狎欄廡時上几案春來秋去幾三十年抱朴子曰千歲鷰户向北其色白而尾屈隂乾之服一頭得五百歳此肉芝也京房易占曰山見白鷰其君且得貴女今俗名一爲天女也續異記曰孫氏妻見一童子當前以釵擲之躍入雲中夜聞户外歌曰昔填夏家冢輦泥頭欲秃今寄黄氏居非意傷我目㝷覔巢中得一白鷰左目傷宣城記曰侍中紀昌睦𥘉生有白鷰一雙出巢旣表素質官途亦通京州記曰吕光大安三年白鷰遊酒泉郡黒鷰列從王威別傳曰時有白鷰來翔𬒳令爲賦赤鷰田俅子曰少昊氏之時赤鷰一衘羽而飛集少昊氏之戸遺其丹書雀春秋運斗樞曰瑶光星散爲雀}
