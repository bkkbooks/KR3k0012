  - {type: variant, offset: 3981, length: 3, content: 鷃柔良, SBCK: 拜孫卿爲郎持節候神自大室至於東萊云見一人長五丈自稱巨公牽黄犬持黄雀欲謁天子因忽不見續齊諧曰弘農楊寳字文淵後漢名士也年九歳時至華隂北見一黄雀爲鵄梟所􅅮墜于樹下爲螻蟻所困寳見}
