  - {type: variant, offset: 1653, length: 0, content: '', SBCK: 父也下土祖拆共廟有司請祖期將行而飲食曰祖祖始也白虎通曰祖於庭何奪孝子之恩也祖始始載於庭也乗車辭祖禰故爲祖載也翣周禮夏官曰御僕大䘮持翣翣棺飾也持之者夾蜃車禮記檀弓下曰周人廧置翣鄭玄注云廧栁衣翣者車􅅚也又禮器曰天子七月而葬五重八翣諸侯五月而葬三重六翣大夫三月而葬再重四翣此以多爲}
  - {type: page-break, offset: 1653, content: '', id: KR3k0012_SBCK_552-5a}
  - {type: variant, offset: 1653, length: 0, content: '', WYG: 父也下士祖禰共廟有司請祖期將行而飲酒曰祖祖始也白虎通曰祖于庭何奪孝子之恩也祖始載于廷也乘車辭祖禰故為祖載也翣周禮夏官曰御僕大䘮持翣翣棺飾也持之者夾屬車禮記檀弓下曰周人廧置翣鄭𤣥注云廧柳衣翣者車飾也又禮器曰天子七月而葬五重八翣諸侯五月而葬再重四翣此以多為}
  - {type: page-break, offset: 1653, content: '', id: KR3k0012_WYG_552-8a, image: WYG0898/WYG0898-0126a.png}
  - {type: variant, offset: 1653, length: 0, content: '', krp: 父也下土祖拆共廟有司請祖期將行而飲食曰祖祖始也白虎通曰祖於庭何奪孝子之恩也祖始始載於庭也乗車辭祖禰故爲祖載也翣周禮夏官曰御僕大䘮持翣翣棺飾也持之者夾蜃車禮記檀弓下曰周人廧置翣鄭玄注云廧栁衣翣者車飾也又禮器曰天子七月而葬五重八翣諸侯五月而葬三重六翣大夫三月而葬再重四翣此以多爲}
  - {type: variant, offset: 1654, length: 0, content: '', SBCK: 也又䘮大記曰飾棺君黼翣二􅀞翣二大夫黼翣二􅀞翣二士􅀞翣二古史考曰周公作翣齊書曰張緒卒日無宅以殯遺命凶事不設栁翣莊子曰戰而死者其}
  - {type: variant, offset: 1654, length: 0, content: '', WYG: 也又䘮大記曰飾棺君黼翣二黻翣二畵翣二大夫黻翣二畫翣二士畫翣二古史考曰周公作翣齊書曰張緒卒日無宅以殯遺命凶事不設檟翣莊子曰戰而死者其}
