  - {type: variant, offset: 381, length: 0, content: '', WYG: 湯作木}
  - {type: variant, offset: 382, length: 0, content: '', WYG: 易土堲漢書曰始皇石椁中為遊又劉向上書曰棺椁之作自黄帝始也臣瓚注曰殷人作棺椁也始皇葬於驪山後牧兒亡羊羊入其藏牧}
