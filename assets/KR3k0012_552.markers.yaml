  - {type: variant, offset: 380, length: 0, content: '', WYG: 節左傳定公上曰魏獻子屬役於韓簡子原壽過簡子韓起孫不信原夀過周大夫也而田于大陸焚焉還卒于寗寗今修武縣也范獻子去其柏椁以其未復命而已范獻子代魏子為政去其栢椁示貶史記曰始皇葬驪山發北山石為椁又曰慎夫人鼓瑟上自倚瑟而歌意悽愴悲懐顧謂羣臣曰嗟乎北山石為椁用紵絮斮一作錯陳漆其間紵絮以漆著其間豈可動哉左右曰善張釋之前曰使其中有可欲者雖錮南山猶有郄使其中無可欲者雖無石椁有何慼焉文帝稱善古史考曰禹作土堲以周}
