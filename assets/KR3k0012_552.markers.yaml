  - {type: variant, offset: 1674, length: 267, content: 楊震數灱諫為樊豊等所譖遣歸本郡震行至城西凡陽亭謂諸子門人曰身死之日以雜木為棺單被裁足蓋形勿歸塚次勿設祭祠因飲酖而卒續漢書曰曹褒在射聲營舍有停棺椁不葬者百餘所褒親自履行愴然為買空地悉葬其無主者續漢書曰周盤字伯堅年七十三歲朝集諸生講論終日因令其二子曰吾日者夢見先師東里先生與我講於陰堂之奧而長歎豈吾齒之盡乎命終之日桐棺足以周身外槨足以周棺斂刑懸封濯衣幅巾編四寸簡寫堯典一篇并刀筆各一以置棺前示不忘聖道其月望無病忽終學者以為知命東觀漢記曰郭鳳字君張善說災異吉凶占應病先自知死日豫令弟子市棺斂具至其日如言卒東觀漢記曰耿秉薨賜朱棺玉衣東觀漢記曰, WYG: 大將軍}
