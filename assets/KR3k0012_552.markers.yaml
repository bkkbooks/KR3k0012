  - {type: variant, offset: 2528, length: 0, content: '', WYG: 開府給三十人晉書禮志曰漢魏故事大䘮及大臣之葬執紼者輓歌新禮以為輓歌出于漢武帝役人之勞歌聲哀切遂以為送終之禮雖音曲摧愴非經典所制違禮銜枚之義方在號慕不宜以歌為名除挽歌摯虞以為挽歌因唱和而為悽愴之聲銜枚所以全哀此亦足以感衆雖非經典所載是厯代故事詩稱君子作歌惟以告哀以歌為名無所嫌宜定新禮如舊續晉陽秋曰袁山松作行路難辭句婉麗聽者莫不流泪羊曇善倡樂桓伊能挽歌時稱爲三絶又曰武陵王晞未敗四五年善為挽歌自揺鈴使左右和之語林曰張湛好于齋前種松栢養鸜鵒袁山松出遊好令左右輓歌時人謂張屋下陳屍袁道上行殯謝綽拾遺録曰太祖嘗召顔延之傳詔頻日尋覔不值太祖曰但酒店中自當得也傳詔依㫖訪覔果見延之在酒肆躶身自挽歌了不對他日醉醒乃往宋書曰范􅁮為吏部郎元嘉元年彭城王大妃薨將葬祖夕僚故普集東府􅁮與司徒左曹屬王琛及弟司徒祭酒廣夜中酣飲開北牖聽輓歌為樂彭城王義康大怒左遷宣城太守梁書曰謝機卿普通六年詔西昌侯藻督衆軍北侵機卿啟求行擢為藻軍師長史軍至渦陽退敗機卿坐免官居白楊石井宅中交好者載酒}
