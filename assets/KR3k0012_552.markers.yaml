  - {type: variant, offset: 1170, length: 473, content: 公羊傳定公勻國君薨正棺於兩楹之間然後即位論語先進曰顏淵死顏路請子之車以為之槨欲得賣之以為顏淵作槨也顏路顏淵之父子曰才不才亦各言其子也鯉也死有棺而無槨吾不徒行以為之槨以吾從大夫之後不可徒行也鯉孔子子伯魚家語曰孔子之喪公西赤掌殯葬焉桐棺四寸柏槨五寸家語曰墨子葬法棺三寸足以朽骨衣三領足以朽肉掘地之深下無漏氣發洩於上襲之以明其所止也說文曰棺關也可以掩屍櫬附身棺也櫝匱也槥櫝也史記曰飛廉生惡來俱以材力事紂武王伐紂并殺惡來時飛廉為紂使北方還無所報為壇霍太山而報得石棺銘曰天令處父與發亂賜汝石棺死遂葬霍太山古史考曰舜作瓦棺湯作木棺漢書曰高祖下令士卒從軍死者為槥服虔曰槥音衛應劭曰小棺也今謂之櫝歸其縣縣給衣衾棺葬具致其尸於家縣官更給衣衾斂祠以少牢吏親葬漢書曰張湯自殺昆弟欲厚葬湯母曰湯為大臣被惡言死何厚葬為載以牛車有棺無槨上聞曰非此母不生此子漢書曰哀帝崩有司奏董賢乃自殺死後其父恭不悔過乃復以緲畫棺作時之色左蒼龍右白虎上著金銀曰月玉衣珠璧至尊無以加漢書曰王莽奏貶丁傅太后號改葬發取璽綬太后以為既往之事不須發莽固爭之太后詔曰因故棺為致槨作塚葬既開傅太后棺臭聞數里, SBCK: ''}
