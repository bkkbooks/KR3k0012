  - {type: variant, offset: 389, length: 6, content: 官百祀畿內百, WYG: 東北也椁有二重門間隱起青石方淨如鏡門扇數四博物志曰漢滕公薨公卿送至東都門外駟馬悲鳴掊地不行于蹄下得石椁有銘曰佳城鬱鬱三千年見白日吁嗟滕公居此室豫章記曰艾}
