  - {type: variant, offset: 2647, length: 270, content: 之岸其名為洲君將為也言終而沒唐書曰玄宗開元二十年自東都幸太原至太行坂路隘逢椑車問左右曰車中何物左右奏曰禮天子出則載禆車以從先王之制也上曰焉用此命焚之無椑自此始也莊子曰古之喪禮貴賤有儀上下有等天子棺槨七重諸侯五重大夫三重士再重墨子獨生不歌死不服桐棺三重而無槨以為法式慎子曰匠人成棺而無憎於人利在人也死呂氏春秋曰善棺槨所以備螻蟻也今世俗大亂人主踰侈非為死者慮亦所以相矜淮南子曰吾生有七尺之形死有一棺之土淮南子曰鬻棺者欲民之疾疫也蓄粟者欲歲之荒飢也鹽鐵論曰古者瓦棺堲周足以收形骸髮齒而已及其後桐棺不依桑棺不留今富者䋠題牆湊中者梓棺楩槨貧者繒囊緹橐, SBCK: ''}
