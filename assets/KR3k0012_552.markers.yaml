  - {type: variant, offset: 205, length: 1, content: 斯, SBCK: 藏物因以爲節左傳定上曰魏獻子屬伇於韓簡子原壽過簡子韓起孫不信也壽過周大夫也而田於大陸焚焉還卒於寗寗今脩武魏也范獻子去其栢椁以其未復命而田也范獻子伐魏子爲政去其栢椁是貶廣雅曰椁廓也史記曰始皇葬驪山發北山石爲椁又曰愼夫人鼓瑟上自􅀝瑟而歌意悽愴悲懷顧謂羣臣曰嗟乎北山石爲椁用紵絮斮一作錯陳􅃮其間紵絮以漆著其間豈可動哉左右曰善張釋之前曰使其中有可欲者雖錮南山猶有郄使其中無可欲者雖無石椁又何慼焉文帝稱善古史考曰禹作土堲以周棺湯作木椁昜土堲漢書曰始皇石椁中爲逰又劉向上書曰棺椁之作自黄帝始也臣瓉注曰殷人作棺椁也始皇葬於驪山後牧兒亡羊羊入其藏牧者持火照求羊失火燒其藏及椁續漢禮儀志曰侯王公主將軍特進薨使者治䘮作栢椁東觀漢記曰明帝自制石椁廣丈二尺長二丈五魏志曰夫餘國厚葬有椁無棺東沃沮其葬作大木椁長十餘丈開一頭作户舉家皆共椁刻木爲數魚豢魏略曰髙麗其死葬有椁無棺停䘮百日也越絶書曰闔閭葬銅椁三重二石僞事曰佛圖澄死時衆官皆殯歛以生所服錫杖鉢終内着棺中爲其理石作椁葬畢經年冉閔後故發椁開棺視之了不見醴骨處所唯見杖鉢存焉莊子曰衛靈公死卜葬沙丘而􅁻掘之數仞得石椁焉有銘曰不馮其子靈公奪而埋之郭縁生述征記曰桓魋石椁在九里山之東北也椁有二重門間隱起青石方淨如鏡門扇數四􅀶物志曰漢滕公薨公卿送至東都門四馬悲鳴掊地不行於蹄下得石椁有銘曰佳城鬱鬱三千年見白日吁嗟滕公居此室豫章記曰艾縣有一塜鑿青石以爲椁制度非常號曰楊栁塜歷代乆逺莫}
