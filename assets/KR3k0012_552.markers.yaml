  - {type: variant, offset: 383, length: 1, content: 斬, WYG: 持火照求羊失火燒其藏及椁續漢禮儀志曰侯王公主將軍特進薨吏者治䘮作栢椁東觀漢記曰明帝自制石椁廣丈二尺長二丈五魏志曰夫餘國厚葬有椁無棺東沃沮其葬作大木椁長十餘丈開一頭作户舉家皆共椁刻木為數魚豢魏畧曰髙麗其死葬有椁無棺停䘮百日也越絶書曰闔閭葬銅椁三重二石偽事曰佛圖澄死時衆官皆殯斂以生所服錫杖鉢終内著棺中為其埋石作椁葬畢終年冉閔後故發椁開棺視}
