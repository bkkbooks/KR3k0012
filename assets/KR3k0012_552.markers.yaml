  - {type: variant, offset: 3347, length: 242, content: 十載三月墜於懸獻巴蜀志曰獠夷死即立埋棺不臥設盛弘之荊州記曰冠軍縣東一里有張詹墓魏太和時人也刻碑背曰白楸之棺易朽之裳銅錢不入瓦器不藏嗟爾後人幸勿我傷自胡石之亂墳墓莫不夷毀此墓元嘉初猶儼然六年大水民飢始被發初開金銀錫銅之器爛然畢備有二朱漆棺棺前垂竹簿簾金釘釘之永嘉郡記曰樂成縣石堂水口先時有一漆棺逆水入溪十餘里便住有靈下人云是方姥甚有靈驗從征記曰劉表塚在高平郡表子琮擣四方珍香數十石著棺中蘇合消救之香莫不畢備永嘉中郡人衡熙發其墓表貌如生香聞數十里熙懼不敢犯陸機大墓賦曰覩洪檟而為槥槥小棺也, SBCK: ''}
