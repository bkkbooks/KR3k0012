  - {type: variant, offset: 190, length: 0, content: '', SBCK: 昔者夫子居於宋見桓司馬自爲石椁三年而不成夫子曰􅀂是其靡也死不如速朽之愈也死之欲速朽爲桓司馬言之禮記檀弓下曰孔子之故人曰原壤其母死夫子助之沐椁沐治也原壤登木曰乆矣予之不託於音也木椁材也託􅀉也謂叩物以作音也歌曰狸首之班然執女手之卷然􅀃人亂也夫子爲弗聞也者而過之從者曰子未可以巳乎夫子曰丘聞之親者無失其爲親也故者無失其爲故也又䘮大記曰君松椁大夫栢椁士􅄂木椁椁謂周棺者也天子栢椁以端長六尺}
  - {type: page-break, offset: 190, content: '', id: KR3k0012_SBCK_552-1b}
  - {type: variant, offset: 190, length: 0, content: '', WYG: 昔者}
  - {type: variant, offset: 190, length: 0, content: '', krp: 昔者夫子居於宋見桓司馬自爲石椁三年而不成夫子曰若是其靡也死不如速朽之愈也死之欲速朽爲桓司馬言之禮記檀弓下曰孔子之故人曰原壤其母死夫子助之沐椁沐治也原壤登木曰乆矣予之不託於音也木椁材也託寄也謂叩物以作音也歌曰狸首之班然執女手之卷然說人亂也夫子爲弗聞也者而過之從者曰子未可以巳乎夫子曰丘聞之親者無失其爲親也故者無失其爲故也又䘮大記曰君松椁大夫栢椁士雜木椁椁謂周棺者也天子栢椁以端長六尺}
  - {type: variant, offset: 192, length: 6, content: 制於中都四寸, WYG: 居于宋見桓司馬自為石椁三年而不成夫子曰若是其靡也死不如速朽}
