  - {type: variant, offset: 1661, length: 2, content: 雲氣, WYG: 旐周禮春官曰司常大䘮供銘旌建廞車之旌銘旌王則太常也禮記檀弓上曰銘明旌也以死者為不可别也故以其旗識之續漢書禮儀志曰禮登遐大旂之制長三仞十有二斿曳地畫日月昇龍書旐曰天子之柩賀循曰扛今之旐也古者以緇布為之今以絳繒題姓字而已不為畫飾也禮論曰問下殤葬墓有旐否徐邈答曰旐以題柩耳無不有旐晉書曰魏明悼后崩議書銘旌或欲去姓而書魏或欲兩書安平王孚以為經典正義皆不應書凡帝王皆因本國之名以為天子之號而與往代相别耳非為擇美名以自光也天稱皇天則帝稱皇帝地稱后土則后稱皇后此乃所同天地之號綂無二之尊名不待稱國號以自表不俟稱世族以自彰輓歌左傳哀}
