  - {type: variant, offset: 2529, length: 0, content: '', krp: 之客恒滿坐時左丞庚仲容亦免歸二人意相得並肆情誕縱或乗露車歴遊郊野酔則執鐸挽歌不屑物議莊子曰紼謳所生必於斥苦司馬彪注云紼引柩索也斥踈緩若用力也引紼所有謳者爲人用力慢緩不齊促急之也風俗通曰京師賔㛰嘉㑹酒酣之後續以挽歌譙周法訓曰挽歌者髙帝召田撗至尸郷自斃從者不敢哭而不勝其哀故作此歌以寄哀音焉于寳捜神記曰挽歌者䘮家之樂執紼者相和之聲也挽歌詞有薤露蒿里二章岀田橫門人橫自殺門人傷之爲悲歌言人如薤上露昜晞滅也亦謂人死精魂於蒿里古辭曰薤露朝露何昜晞明朝更復露人死一去何時歸二章曰蒿里誰家地聚斂精魂無賢愚鬼伯一何相催促人命不得少踟蹰至李延年乃分爲二曲薤露送王公貴人蒿里送士大夫庶人使挽柩者歌之又有長歌短歌言壽命長短不可妄求魏繆襲挽歌辭曰生時遊國都死没弃中野朝發髙堂上墓宿黄泉下白日入虞淵縣車息駟馬造化雖神明安能復存我形容稍歌滅齒髮行當墮自古皆有然誰能離此者陸機挽歌辭曰魂衣何盈盈旟旐何習習父母拊棺號兄弟扶筵泣靈轜動轇龍首矯崔嵬挽歌挾轂唱嘈嘈一何悲浮雲中容與飄風不能廻淵魚仰失梁征烏俯墜飛又曰中闈且勿諠聽我薤露詩生死各異倫祖載當有時舎爵兩楹位啓殯進靈轜餞飯觴莫舉出宿歸無期又曰重阜何崔嵬玄廬竄其間磅礴云四極穹崇効蒼天側聽隂溝涌卧觀天井懸壙霄何遼廓大暮安可晨人徃有返歳我行無歸年昔居四人宅今爲萬鬼隣昔爲七尺體今成灰與塵金王昔所佩鴻毛今不振豐肌享螻蟻形體永夷泯壽堂延魑魅虚無自相賔螻蟻爾何怨魑魅我何親撫心痛荼毒永歎莫爲陳宋陶潜挽歌辭曰荒草何茫茫白楊亦蕭蕭嚴霜九月中送我岀逺郊四靣無人居髙墳正嶕嶤馬爲仰天鳴風日自蕭條幽室一巳閉千年不復朝千年不復朝賢逹無柰何向來相送人各亦歸其家親戚或餘悲他人亦巳歌死去何所道託體同山阿又曰有生必有死早終非命促昨暮同爲人今旦在鬼録魂氣散何之枯形寄空木嬌兒索父號良友撫我哭顔延之挽歌辭曰令龜告明兆撒奠在方昏戒徒赴幽麥祖駕出髙門行行去城邑遥遥首丘園息鑣竟平𡑞稅駕列巖根北齊祖孝徴挽歌辭曰驅駟馬謁帝長楊宫旌懸白雲外騎獵紅塵中今來向漳浦素蓋轉悲風榮華與歌笑萬事盡成空隋盧思道鼓城王挽歌辭曰旭且禁門開隱隱靈輿發纔看鳯樓逈稍視龍山没猶陳五營騎尚聚三河卒容衛儼未歸空山照秋月又樂平長公主挽歌辭曰粧樓對馳道吹臺臨景舎風入上春朝月滿涼秋夜未言歌笑畢巳覺先榮謝何時洛水湄芝田解龍駕方相周禮夏官曰方相氏掌蒙熊皮黃金四目玄衣朱裳執戈楊揗帥百隷大䘮先匶及墓入壙以戈擊四隅歐方良壙穿中也方良罔兩也蔡質漢官儀曰隂太后崩前有方相及鳯皇車晉公卿禮秩曰上}
