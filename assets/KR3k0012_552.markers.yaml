  - {type: variant, offset: 1651, length: 0, content: '', SBCK: 肅䘮服要記曰魯哀}
  - {type: variant, offset: 1651, length: 0, content: '', WYG: 肅䘮記服要記曰魯哀}
  - {type: variant, offset: 1651, length: 0, content: '', krp: 肅䘮服要記曰魯哀}
  - {type: variant, offset: 1652, length: 0, content: '', SBCK: 葬父孔子問曰寧設桐人乎哀公曰桐人起於虞卿虞卿齊人遇惡繼母不得養父死不得葬知有過故作桐人吾父生得供養何用桐人爲陸機士庶挽歌辭曰埏埴爲塗車束薪作蒭靈明器周禮春官􅃁人曰大䘮入藏凶器凶器明器周禮夏官司兵曰大䘮廞五兵廞興作也興作明器之共禮記檀弓上曰宋襄公葬其夫人醯醢百甕曽子曰旣曰明器矣而又實之言名之爲明器與􅀕器皆實之是亂􅀑器與人器也又曰旣殯旬而布材與明器木工冝乾暗且預成材椁材也又曰之死而致死之不仁而不可爲也之死而致生之不知而不可爲也之徃也死之生之謂無知與有知也爲猶行也是故竹不成用瓦不成沬木不成斵成猶善也竹不可善用謂邊無滕味當作沫沬靧也琴瑟張而不平竽笙備而不和無宫啇之調有鍾磬而無簨簴不縣之也横日簨植曰簴其曰明器神明之也言神明死之也神明者非人所知拆其器如此又曰仲憲言於曽子曰夏后氏用明器示民無知也所謂致死之仲憲孔子弟子原憲殷人用􅀕器示民有知也所謂致生之周人兼用之示民疑也言使民疑於無知與有知曽子曰其不然乎其不然乎非其􅀃之非也夫明器􅀑器也􅀕器人器也夫古之人胡爲而死其親乎言仲憲之言三者皆非此或用􅀑器或用人器又檀弓下曰孔子謂明器者知䘮道矣備物而不可用也哀哉死者而用生者之器不殆於用殉乎哉其曰明器神明之也神明死者異於生人也釋名曰送死之器曰明器神明之器異於人鹽鐵論曰古者明器有形無實示人不用也今厚資多藏器用如生人並衣綈紈江逌表曰宣皇帝顧命終制山陵不設明器以貽後則景帝奉遵遺勑逮文明皇后崩武皇帝亦承前無所設施唯酺醢之奠瓦器而巳昔康皇帝玄宫内寳奩烏粥此盖太妃因巳之情實違先志累世之法今永欲以爲故事用此二物明衣􅀃文曰褮􅀑衣也褮讀如􅁑壘榮之縈穆天子傳曰贈用文錦明衣祖載周禮春官䘮祝曰掌大䘮及朝御柩乃奠朝將葬朝於祖考廟及祖􅅚棺及載遂御之祖將葬祖於庭禮記檀弓曰殯於客位祖於庭所以即逺也儀禮旣夕曰旣夕哭請啓期告于殯􅀫興設盥于祖廟門外祖}
