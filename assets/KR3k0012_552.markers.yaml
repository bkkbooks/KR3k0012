  - {type: variant, offset: 81, length: 100, content: 用薪者虞氏上陶夏后氏堲周大熟曰堲燒土治以周於棺殷人棺槨棺大也以木為之言槨大於棺殷人上棺周人牆置翣牆柳衣也凡此言後王之制文也周人以殷人之棺槨葬長殤以夏后氏之堲周葬中殤下殤以有虞氏之瓦棺葬無服之殤略未成人, SBCK: 椁}
