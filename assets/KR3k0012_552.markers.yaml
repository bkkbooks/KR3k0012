  - {type: variant, offset: 1652, length: 0, content: '', WYG: 葬父孔子問曰寧設桐人乎哀公曰桐人起于虞卿齊人遇惡繼母不得養父死不能葬知有過故作桐人吾父生得供養何桐人為陸機士庶輓歌辭曰埏埴為塗車束薪作芻靈明器周禮春官冡人曰大䘮入藏凶器凶器明器周禮夏官司兵曰大䘮廞五兵廞興作也興作明器之兵禮記檀弓上曰宋襄公葬其夫人醯醢百甕曽子曰既曰明器矣而又實之言公之為明器與祭器皆實之是亂鬼器與人器也又曰既殯旬而成材與明器木工宜乾暗宜預成材椁材也又曰知死而致死之不仁而不可為也知死而致生之不知而不可為也之彺也死之生之謂無知與有知也為猶行也是故竹不成用瓦不成味木不成斵成猶善也竹不可用善謂邊無膝味當作沫黒光也琴瑟張而不平竽笙備而不和無宫商之謂有鐘磬而無簨簴不懸之也横曰簨直曰簴其曰明器神明之也言神明死者也神明者非人所知故其器用如此也又曰仲憲言于曽子曰夏后氏用明器示民無知也所謂致死之仲憲孔子弟子原憲殷人用祭器示民有知也所謂致生之周人兼用之示民疑也言使民疑于無知與有知也曾子曰不然乎言其説之非也夫明器鬼器也祭器人器也夫古人胡為而死其親乎言仲憲之言三者皆非此或用鬼器或用人器又檀弓下曰孔子謂明器者知喪道矣備物而不可用也哀哉死者而用生者之器不殆於用殉乎哉其曰明器神明之也神明死者于生人也釋名曰送死之器曰明器神明之器異于人鹽鐵論曰古者明器有形無實示人不用也今厚資多藏用器如生人並衣綈紈江廸表曰宣皇帝顧命終詔山陵不設明器以貽後則景帝奏遵遺勅逮文明皇后崩武皇帝亦承前無所施設唯酺醢之奠瓦器而已昔康皇帝𤣥宮内寶奩烏粥此葢太妃因己之情實違先志累世之法今永欲以為故事用此二物明衣説文曰褮鬼衣也褮讀如葛纍縈之褮穆天子傳曰贈用文錦明衣祖載周禮春官䘮祝曰掌大䘮及朝御柩乃奠朝將葬朝于祖考廟及祖飾棺及載遂御之祖將葬祖于庭禮記檀弓曰殯于客位祖于庭所以即遠也儀禮既夕哭請啟期告于賔夙興設盥于祖廟門外祖}
