  - {type: variant, offset: 1654, length: 0, content: '', krp: 也又䘮大記曰飾棺君黼翣二畫翣二大夫黼翣二畫翣二士畫翣二古史考曰周公作翣齊書曰張緒卒日無宅以殯遺命凶事不設栁翣莊子曰戰而死者其}
  - {type: variant, offset: 1655, length: 0, content: '', SBCK: 之葬也不以翣資翣者武之所資也戰而死者無武也翣將安施耳世夲曰武王作翣董勛荅問曰翣似屏風人持隨䘮車前後左右也紼禮記雜記曰諸侯䘮執紼五百人四紼}
  - {type: page-break, offset: 1655, content: '', id: KR3k0012_SBCK_552-5b}
