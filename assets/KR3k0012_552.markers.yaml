  - {type: variant, offset: 2528, length: 0, content: '', SBCK: 開府給三十人晉書禮志曰漢魏故事大䘮及大臣之䘮執紼者挽歌新禮以爲挽歌岀於漢武帝役人之勞歌聲哀灱遂以爲送終之禮雖音曲摧愴非經典所制違禮衘枚之義方在號慕不冝以歌爲名除挽歌摯虞以爲挽歌因倡和而爲摧愴之聲衘枚所以全哀此亦以感衆雖非經典所載是歴代故事詩稱君子作歌惟以告哀以歌爲名無所嫌冝定新禮如舊續晉陽秋曰􅀽山松作行路難辭句婉麗聽者莫不流淚呉曇善倡樂桓伊能挽歌時稱爲三絶又曰武陵王晞未敗四五年喜爲挽歌自揺鈴使左右和之語林曰張湛好於齊前種松栢養鴝鵒􅀽山松岀遊好令左右挽歌時人謂張屋下陳尸􅀽道上行殯謝綽宋拾遺録曰太祖嘗召顔延之􅀓詔頻曰㝷覔不值太祖曰但酒店中求之自當得也傳詔依旨訪覔果見延之在酒肆躶身挽歌了不應對他日酒醒乃徃宋書曰范曄爲吏部郎元嘉元年彭城王太妃薨將葬祖夕僚故並集東府曄與司徒左曹屬王深及弟司徒祭酒廣夜中酣飲開北牖聽挽歌爲樂彭城王義康大怒左遷宜城太守梁書曰謝幾卿普通六年詔西昌侯藻督衆軍北侵幾卿啓求行擢爲藻軍師長史軍至渦陽退敗幾卿坐免官居自􅀭石井宅中交好者載酒}
