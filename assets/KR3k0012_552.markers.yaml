  - {type: variant, offset: 385, length: 614, content: 掌山澤之官百祀畿內百縣之祀以為棺槨斬伐也禮記檀弓上后木曰喪吾聞諸縣子曰夫喪不可不深長思也后木魯者孝公子惠伯鞏之後買棺外內易我死則亦然禮記檀弓下曰陳乾昔寢疾屬其兄弟而命其子尊己曰如我死則必大為我棺使吾二婢子夾我婢子妾也陳乾昔死其子曰以殉葬非禮也況又同棺乎弗果殺善尊己不陷父於不義也禮記喪大記曰君大棺八寸屬六寸捭四寸上大夫大棺八寸屬六寸下大夫大棺六寸屬四寸士棺六寸大棺棺之在表君裏棺用朱綠用雜金鐕大夫裏棺用玄綠用牛骨鐕士不綠鐕所以瑑著裏也君蓋用漆三衽三束大夫蓋用漆二衽二束士蓋不用漆二衽二束用漆者塗合牝牡中也衽小要君大夫鬊瓜實于綠中士埋之綠當為角聲之設角即謂棺之內也禮記外傳曰凡棺之重數從內數向外如席之重也兕革棺一各三寸內一重有水牛皮次兕皮二者合為一重都厚六寸一名椑棺又名櫬椑者堅如壁櫬者親於身也杝棺二厚八寸杝曰嘏木在椑棺之外屬棺三其厚四寸屬者施杝棺外大棺四厚六寸屬棺之列也屬棺大棺皆用梓也上公去水牛皮兕皮外有三重也侯伯已下去水兕杝棺外二重卿大夫唯屬棺與大棺一重士不言重唯棺而已左傳宣上曰鄭人討幽公之亂斷子家之棺以四年殺君故也斷薄其棺不使從卿禮左傳成上曰宋文公葬槨有四阿棺有翰檜杜預注曰翰旁飭檜上飭王禮左傳襄上曰齊姜薨初穆姜使擇美檟檟梓之屬以自為櫬與頌琴櫬棺也頌琴琴名猶言雅琴也皆欲以送納季文子取以葬君子曰非禮也禮無所逆婦養姑者也虧姑以成婦逆莫大焉穆姜成公母齊姜成公婦也左傳襄上曰定姒薨不殯于廟無櫬不虞櫬親身棺也季孫以定姒本賤既無備, SBCK: 明}
  - {type: variant, offset: 385, length: 1, content: 掌, WYG: 了不見骸骨處所唯見杖鉢存焉莊子曰衞靈公死卜葬沙丘而吉掘之數仞得石椁焉有銘曰不馮其子靈公奪而埋之廣雅曰椁廓也郭緣先述征記曰桓魋石椁在九里}
