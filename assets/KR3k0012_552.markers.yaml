  - {type: variant, offset: 1931, length: 588, content: 賜朱棺玉衣東觀漢記曰梁商薨賜東園朱壽器銀鏤玉匣東觀漢記曰長沙有義士古初遭父喪未葬鄰人火起及初舍棺不可移初冒火伏棺上會火滅東觀漢記曰大司徒歐陽歙坐在汝南贓罪死獄中歙掾陳元上書追訟之言甚切至帝乃賜棺木贈賻三千疋謝承後漢書曰徐翊為長沙郡將死遺令不受贈賻一疋私馬賣以買棺謝承後漢書曰和帝追封太后父梁松為褒親愍侯改殯賜東園畫棺玉匣衣衾而葬之魏志曰李𠐶等葬董卓於郿并收所焚屍之灰合斂於棺而葬之是日大風暴雨霆震卓墓水入藏漂其棺木魏志曰宣王討王陵赦罪陵自知罪重試索棺釘以觀大傳意竟給之遂自殺曹操別傳曰操破梁孝王棺收金寶天子聞之哀泣晉書曰夏侯湛將歿遺命小棺薄斂不脩封樹論者謂湛雖生不砥厲名節死則儉約令終是深達存亡之理也後魏書曰崔光韶誡子孫曰吾兄弟自幼及老衣服飲食未曾一片不同至於兒女官婚榮利之事未嘗不先以推弟弟頃橫禍權作松棺亦可以為吾作松棺使吾見之南史曰宋光祿大夫劉鎮之年三十許病篤已辦凶具既而疾愈因蓄棺以為壽九十餘乃亡此器方用宋書曰王敬則為既陽令初至既陽縣陸主山下宗侶十餘舡同發敬則舡獨不進乃令入水推之見烏漆棺敬則呪云若是吉使舡速進吾富貴當改葬爾舡須臾進入縣城收此棺葬之宋書曰袁昂為豫章內史丁所生母憂去職以喪還江路風潮暴駭昂乃縛衣著棺誓同沉溺及風止餘舡皆沒唯昂舡獲全咸謂精誠所致梁書曰衡陽宣王子簡位郢州剌史卒於官喪將引柩有聲議者欲開視王妃柳氏曰晉文已有前例不聞開棺無益亡者之生徒增生者之痛遂止, SBCK: ''}
