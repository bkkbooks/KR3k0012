  - {type: variant, offset: 1656, length: 7, content: 樟棺朱漆畫雲氣, SBCK: 衘枚紼引車索釋名曰從前引曰紼紼發也發車使行續漢書禮儀志曰禮登遐中黃門虎賁執紼又曰}
  - {type: variant, offset: 1656, length: 4, content: 樟棺朱漆, WYG: 銜枚紼引車之索也釋名曰從前引曰紼紼發也發車使行續漢書禮儀志曰禮登遐中黄門虎賁執紼又曰公卿以下子弟凡三百執紼白素幘委貌冠杜預集要曰凡輓天子六紼諸侯四大夫二士一旅旒賀循葬禮記曰大夫五旒吉委車之所建也通而已下不為龍}
  - {type: variant, offset: 1656, length: 4, content: 樟棺朱漆, krp: 衘枚紼引車索釋名曰從前引曰紼紼發也發車使行續漢書禮儀志曰禮登遐中黃門虎賁執紼又曰公卿巳下子弟凡三百人執紼白素幘委貌冠杜預要集曰凡挽天子六紼諸侯四大夫二士一旅旒賀循葬禮曰大夫五旒吉韋車之所建也通而已下不爲龍}
