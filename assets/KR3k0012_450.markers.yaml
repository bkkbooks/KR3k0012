  - {type: variant, offset: 12, length: 2, content: 銅馬, SBCK: 周公先謀於同姓同姓從然後謀於朋友朋友從然後謀於天下天下從然後加之蓍􅀛是以君子聖人謀義不謀不義故謀必成卜義不卜不義故卜必􅁻以義擊不義故戰必勝是以君子聖人謀則成戰則勝戰國䇿曰􅁗攻趙長平大破之而歸因使人索六城於趙講計未定婁緩新從􅁗來趙王與緩計曰與􅁗地何如勿與緩曰此非臣}
  - {type: variant, offset: 12, length: 2, content: 銅馬, WYG: 周公先謀於同姓同姓從然後謀於朋友朋友從然後謀於天下天下從然後加之蓍龜是以君子聖人謀義不謀不義故謀必成卜義不卜不義故卜必吉以義擊不義故戰必勝是以君子聖人謀則吉戰則勝戰國策曰秦攻趙長平大破之而歸因使人索六城於趙購計未定樓緩新從秦來趙王與緩計曰與秦地何如勿與緩曰此非臣}
