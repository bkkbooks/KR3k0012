  - {type: variant, offset: 460, length: 4, content: 過三十里, SBCK: 知也今旣巳知之矣乃輟圍衛也又曰鄭桓公將欲襲鄶先問鄶之辯智果敢之士書其名姓擇鄶之良臣}
  - {type: page-break, offset: 460, content: '', id: KR3k0012_SBCK_450-4a}
  - {type: variant, offset: 460, length: 1, content: 過, WYG: 知也今既已知之矣乃輟圍衛也又曰鄭桓公将欲襲鄶先問鄶之辯知果敢之士書其名姓擇鄶之良臣而與之為官爵之名而書之因為設壇於門外而埋之釁之以豭若盟状鄶君以為内難也盡殺其臣桓公因襲之遂取鄶又曰鄭桓公東㑹封於鄭暮舎於宋東之逆旅逆旅之叟外來曰客将焉之曰㑹封為鄭逆旅之叟曰吾聞之時難得而易失今客之寝安殆非封也鄭桓公授轡自駕其僕接御而載之行十日十夜而至焉釐何與之争封故以鄭桓公之賢微旅之叟以幾不㑹封也又曰趙簡子使成何渉他與靈公盟於傳澤靈公未喋盟成何渉他捘靈公之手而撙之靈公怒欲反趙王孫商曰君欲反趙不如與百姓同惡之公曰若何對曰請命臣令於國曰有姑姊女者家一人質於趙百姓必怨君因反之矣君曰善乃令之}
  - {type: page-break, offset: 460, content: '', id: KR3k0012_WYG_450-6b, image: WYG0897/WYG0897-0136d.png}
  - {type: variant, offset: 460, length: 4, content: 過三十里, krp: 知也今旣巳知之矣乃輟圍衛也又曰鄭桓公將欲襲鄶先問鄶之辯智果敢之士書其名姓擇鄶之良臣}
  - {type: variant, offset: 462, length: 2, content: 十里, WYG: 日遂徴之五日}
  - {type: punctuation, offset: 464, content: ，, id: KR3k0012_CHANT_450-bkkpn111}
  - {type: 'tls:seg', offset: 464, content: '', id: KR3k0012_CHANT_450-3a.58}
  - {type: variant, offset: 465, length: 6, content: 今日行二百何, SBCK: 與之爲官爵之名而書之因爲設壇於門外而埋之釁之以猳􅀂盟狀鄶君以爲内難}
  - {type: variant, offset: 465, length: 0, content: '', WYG: 令畢國人巷哭君乃召國大夫而謀曰趙為無道反之可乎大夫皆曰可乃出西門閉東門趙氏聞之縳涉他而斬之以謝於衛成何走燕子貢曰王孫商可謂善謀矣憎人而能害之有患而能處之欲用民而能附之一舉而三物具之可謂善謀矣又曰呉闔閭夫人姜氏齊景公以其子妻闔閭送諸郊泣曰余死不汝見矣孟子曰齊負海而縣山縱不能全収天下誰干我君愛則勿行公曰余有齊國之固不能以合諸侯又不能聼是生亂也寡人聞之不能令則莫若從且夫呉蜂蠆然不棄毒於人則不盡余恐棄毒於我也遂遣之又曰晉文公與荆人戰於城濮君問於咎犯咎犯對曰服義之君不足於信服戰之君不足於詐君慎之詐而已矣君問於雍季對曰焚林而畋得獸雖多而明年無復也乾澤而漁得魚雖多而明年無復也詐猶可於偷利而無報遂與荆人戰大敗之乃賞先雍季而後咎犯侍者曰城濮之戰咎犯之謀也君曰雍季之言百世之謀也咎犯之言一時之權也寡人既已行之矣又曰智伯圍晉陽絺疵謂智伯曰韓魏之君必反矣智伯曰何以知之對曰夫勝趙而三分其地}
