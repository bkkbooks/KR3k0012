  - {type: variant, offset: 2486, length: 247, content: 官之疲夫豈不仁機急故也兵法有不得已而用之方今海內版蕩人百其心急之則得其用緩之各懷所思可因其勞而成其逸何得緩之垂笑曰卿言當矣二人同心其利斷金行其謀而滅永又曰杜預以太康元年正月陳兵江陵遣參軍樊顯尹林鄧圭襄陽太守周奇等率眾循江西上授以節度旬日之間累剋城邑皆如預焉又曰杜預陳兵江陵遣周旨伍巢等率奇兵八百汎舟夜渡以襲樂鄉多張旗幟起大巴山出於要害之地以奪賊心吳都督孫歆震恐與伍延書曰北來諸軍乃飛渡江也後周書曰武帝保定元年汾晉之北離石之南悉是羌胡而地居齊境抄掠我東鄙朝廷患之韋孝寬乃於要害欲置大城以扼其吭興役, SBCK: 五}
