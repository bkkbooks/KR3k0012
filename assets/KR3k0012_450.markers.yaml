  - {type: variant, offset: 80, length: 1, content: 得, WYG: 不至未嘗見人如中山隂姬者不知者将以為神其容貎顔色過絶人矣乃其眉準頞權則犀角偃月彼乃帝王之后非諸侯之􅁎趙王大悅曰吾願請之何如對曰非臣所敢議願王無泄喜歸報中山君曰趙王非賢王也不好道徳而好聲色不好仁義而好勇力聞其乃欲請隂姬中山君作色不悅喜曰趙强國也請之必矣王不與之即社稷危與之即為諸侯笑王立為后以絶趙王意可也}
