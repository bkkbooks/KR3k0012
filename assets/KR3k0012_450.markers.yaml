  - {type: variant, offset: 565, length: 0, content: '', WYG: 将兵而徃東虜其衆問曰得無有昆弟故人乎見威公縛在虜中問曰若何以至於此應曰吾何以不至於此且吾聞之也言之者行之役也行之者言之主也汝能行我能言汝為主我為役吾亦何以不至於此哉窺牆者乃言之於楚王遂觧其縛與俱之楚故曰能言者未必能行能行者未必能言也又曰石乞侍坐屈建曰白公其為亂乎石乞曰是何言也白公至於室無榮所下士者三人與已相君臣者五人所與同衣食者千人白公之行若此何故為亂屈建曰此建之所為亂也以君子行則可與國家行過禮則國家疑之且苟不難下其臣必不難高其君矣建是以知夫子将為亂也處十月白公果亂又曰韓昭侯作髙門屈宜咎曰昭侯不出門曰何也曰不}
  - {type: page-break, offset: 565, content: '', id: KR3k0012_WYG_450-10a, image: WYG0897/WYG0897-0138c.png}
  - {type: variant, offset: 566, length: 0, content: '', WYG: 吾所謂不時者非時日也人固有利不利時昭侯嘗利矣不作髙門徃}
  - {type: variant, offset: 567, length: 3, content: 二十九, WYG: 秦㧞冝陽明年大旱民饑不以此時恤民之急也而顧反益以奢此謂福不重至禍必重來者也髙門成昭侯卒竟不出此門矣又曰田子顔自大術至乎平陵城下見人子問其父見人父問其子田子方曰其以平陵反乎吾聞行於内然}
