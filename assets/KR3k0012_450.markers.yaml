  - {type: variant, offset: 24, length: 4, content: 宜捨輕兵, WYG: 公叔且以國南合於楚楚韓為一魏氏不敢不聽是楚以三國謀秦也如此則伐秦之形成矣夫坐而待伐孰與伐人之利秦王曰善果下師於殽以救韓又曰中山隂姬與江姬争為后司馬喜請見隂姬公為畫計公稽首曰誠如君言喜即奉書詣中山王曰臣聞趙强即中山弱臣能弱趙而强中山中山王悅而見之喜曰臣願乞之趙觀其地形險阻人民貧富君臣賢不肖商𣙜為資未可豫陳也乃見趙王曰臣聞趙天下善為音容佳麗之所}
