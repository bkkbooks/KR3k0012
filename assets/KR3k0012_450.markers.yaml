  - {type: variant, offset: 604, length: 4, content: 義帝縞素, WYG: 福報怨以徳此之謂也又曰智伯請地於魏宣子宣子不與任增曰何為不與宣子曰彼無故}
  - {type: page-break, offset: 604, content: '', id: KR3k0012_WYG_450-12a, image: WYG0897/WYG0897-0139c.png}
  - {type: variant, offset: 609, length: 0, content: '', SBCK: 還誅近隣隣國不親非霸王之道君之所得山戎之寳器者中國之所鮮也不可以不進周公之廟乎桓公乃分山戎之寳獻之周公之廟明年起兵伐莒魯下令丁男悉發五尺童子皆至孔子曰聖人轉禍爲福報怨以德此之謂也又曰智伯請地於魏宣子宣子不與任增曰何爲不與宣子曰彼無故而請地也吾是以不與任增曰彼無故而請地者無故而與之是重欲無厭也彼喜必又請地於諸侯不與必怒而伐之宣子曰善遂與地智伯喜又請地於趙趙不與智伯怒圍晉陽韓魏合趙而反智氏智氏遂㓕又曰楚莊王與晉戰勝之懼諸侯之畏巳也乃築爲五仞之臺成而觴諸侯諸侯請爲觴皆仰而曰將將之臺窅窅其謀我言而不當諸侯伐之於是逺者來朝近者入賔又曰呉王夫差破越又將伐陳楚大夫皆懼曰昔闔閭能用其衆故伐我於栢舉今聞夫差又甚焉子西曰二三子胡不相睦也無患吴矣昔闔閭食不二味處不重席擇不取費在國}
  - {type: page-break, offset: 609, content: '', id: KR3k0012_SBCK_450-7b}
  - {type: variant, offset: 609, length: 0, content: '', WYG: 請地也吾是以不與任增曰彼無故而請地者無故而與之是重欲無厭也彼喜必又請地於諸侯不與必怒而伐之宣子曰善遂與地智伯喜又請地於趙趙不與智伯怒圍晉陽韓魏合趙而反智氏智氏遂㓕又曰楚荘王與晉戰勝之懼諸侯之畏已也乃築為五仭之臺成而觴諸侯諸侯請為觴皆仰而曰将将之臺窅窅其謀我言而不當諸侯伐之於是逺者來朝近者入賓又曰呉王夫差破越又将伐陳楚大夫皆懼曰昔闔閭能用其衆故伐我於栢舉今聞夫差又甚焉子西曰二三子患不相睦也無患呉矣昔闔閭食不二味䖏不重席擇不取費在國}
