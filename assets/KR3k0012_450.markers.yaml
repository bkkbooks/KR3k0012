  - {type: variant, offset: 558, length: 0, content: '', SBCK: 聞之時難得而易失今客之􅃦安殆非封也鄭桓公援轡自駕其僕接御而載之行十日十夜而至至􅁵何與之爭封故以鄭桓公之賢微旅之叟幾不會封也又曰趙簡}
  - {type: variant, offset: 558, length: 2, content: 子房, WYG: 國且亡曰何以知}
  - {type: variant, offset: 558, length: 0, content: '', krp: 聞之時難得而易失今客之寢安殆非封也鄭桓公援轡自駕其僕接御而載之行十日十夜而至至釐何與之爭封故以鄭桓公之賢微旅之叟幾不會封也又曰趙簡}
  - {type: variant, offset: 559, length: 1, content: 房, SBCK: 使成何渉他與衛靈公盟於專澤靈公未􅱷盟成何涉他捘靈公之手而撙之靈公怒欲反趙王孫啇曰君欲反趙不如與百姓同惡之公曰􅀂何對曰請命臣令於國曰有姑姊女者家一人質於趙百姓必怨君因反之矣君曰善乃令之三日遂徴之五日而令畢國人巷哭君乃召國大夫而謀曰趙爲無道反之可乎大夫皆曰可乃岀西門閉東門趙氏聞之􅅞渉他而斬之以謝於衛成何走燕子貢曰王孫啇可謂善謀矣憎人而能害之有患而能處之欲用民而能附之一舉而三物俱至可謂善謀矣又曰吴闔閭夫人姜氏齊景公以其子妻闔閭送諸郊泣曰余死不汝見矣髙夢子曰齊􅀒海而縣山縱不能全收天下誰干我君愛則勿行公曰余有齊國之固不能以令諸侯又不能聽是生亂}
