  - {type: variant, offset: 2185, length: 213, content: 營壘既而馳去敦方晝寢夢日環其營驚起曰必是鮮卑黃鬚奴來也使騎切遽而追之帝亦馳去馬有遺糞輒以冷水沃之時逆旅有賣飯媼帝以七寶鞭與之俄而追者至訊媼媼云去已遠矣因以鞭示之傳示遲留又見馬糞冷信已遠矣而止帝遂得免又曰偽趙張賓字孟孫趙郡中山人石勒初為劉元海授輔漢將軍賓謂所親曰吾歷觀諸將多矣獨胡將軍可以共成大事乃提劍軍門大呼請見勒勒初未可也漸見進重引為謀主機不虛發筭無遺策成勒之事皆賓之計勒常歎曰吾每臨大事吾意未了右侯已了及卒勒親臨哭之慟顧謂, SBCK: 相救如}
