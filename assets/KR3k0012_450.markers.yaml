  - {type: variant, offset: 2734, length: 1546, content: 萬甲士百人遣姚岳監之岳有難色謂孝寬曰國家每於境外築城未嘗不動大眾今深入胡境密邇齊師以兵百騎何以禦役孝寬曰事有萬途兵非一勢君但受成規無所憂也計築城十日即畢今齊君徵兵三日方集謀議之間自稽三日計其軍行二日不到我之城隍辦矣乃令築之齊人果如期而至界首疑有伏軍不敢進迫其夕岳令緣汾傍山處處舉火齊人謂有大軍因示自固猶豫之間土功已畢齊師乃退隋書曰上嘗問高頴取陳之策頴曰江北地寒田收差晚江南土熱水田旱熟量彼收穫之際徵士馬聲言掩襲彼必屯兵禦守足得廢其農時彼既藂兵我便解甲再三若此賊以為常後更集兵彼必不信猶豫之頃我乃濟師登陸而戰兵氣益倍又江南土薄舍多竹茅所有儲積皆非地窖密遣行人因風縱火待彼修立復更燒之不出數年自可財力俱盡上行其策由是陳人益弊又曰焚子蓋與宇文述陪宴積翠亭帝親以金杯屬子蓋酒曰良筭嘉謀俟公後動即以此杯賜公用為永年之瑞并綺羅百疋唐書曰劉武周戰于度索原軍敗賊徒進逼河東江夏王道宗時年十七從太宗率眾拒之太宗登玉璧城望賊顧謂道宗曰賊恃眾來邀我戰汝謂如何對曰群賊乘勝其鋒不可當易以計屈難與力競今深壁高壘以挫其鋒烏合之徒莫能持久糧運致竭自當離散可不戰而擒太宗曰汝意闇與我合後賊果食盡夜遁追及介州一戰滅之又曰張守珪為瓜州刺史領餘眾修築州城板堞裁立賊又暴至城下城中人相顧失色雖相率登陴略無守衛之意守珪曰彼眾我寡又瘡痍之後不可以矢石相持須以權道制之也乃於城上置酒作樂以會將士賊徒疑城中有備竟不敢攻城而退又曰裴行儉行至朔州知蕭嗣業以運糧被掠兵多餒死遂詐為糧車三百乘每車伏壯士五人各齎陌刀勁弩以嬴兵數百人援車兼伏精兵令居險以待之賊果大下嬴兵棄車散走賊驅車就泉井解鞍牧馬方擬取糧車中壯士齊發伏兵亦至殺獲殆盡餘眾奔潰自是續遣糧車無敢近之者及軍至單于之北際晚下營壕塹方周遽令移就崇岡將士皆以士眾方就安堵不可勞擾行儉不從更促之比夜風雨暴至前設營所水深丈餘將吏莫不歎服又曰裴行儉前後殺虜不可勝數偽可汗泥塾匐為其下所殺以其首來降又擒其大首領奉職而還餘黨走依糧山行儉既廻阿史郍佛念又偽稱可汗與溫傅合勢鳩集餘眾明年行儉復總諸軍討之頓軍於代州之陘口縱反間說佛念與溫傅令相猜貳佛念恐懼密送降款仍請自效行儉不泄其事而密表以聞數日有煙漲天而至斥候惶惑來白行儉召三軍謂曰此是佛念執溫傅來降非他然受降如受敵但須嚴備更遣單使迎前勞之少間佛念果率其屬縛溫傅軍門請罪盡平突厥餘黨高宗大悅遣戶部尚書崔知悌赴軍勞之又曰裴行儉至西州人吏郊迎行儉召其豪傑子弟千餘人隨己而西乃揚言紿其下曰今正炎蒸熱坂難冒涼秋之後方可漸行都支覘知之遂不設備行儉乃召四鎮諸蕃酋長豪傑謂曰憶昔此遊未嘗厭倦雖還京輦無時暫忘今因是行欲尋舊賞誰能從吾獵也是時蕃酋子弟投募者僅萬人行儉假為畋獵教試部伍數日遂倍道而進去都支部落十餘里先遣都支所親問其安否外示閑暇似非討襲續又使人趣召相見都支先與遮匐通謀秋中擬拒漢使卒聞軍到計無所出自率兒姪首領等五百餘騎就營來謁遂擒之是日傳其契箭諸部酋長悉來請命並執送碎葉城簡其精騎輕齎曉夜前進將虜遮匐途中果獲都支還使與遮匐使同來行儉釋遮匐行人令先往曉喻其主兼述都支已擒遮匐尋復來降於是將吏已下立碑於碎葉城以紀其功擒都支遮匐而還高宗廷勞之曰比以西服未寧遣卿總兵討逐孤軍深入經途萬里卿權略有聞誠節夙著兵不血刃而兇黨殄滅伐叛柔服深副朕委尋又賜宴謂行儉曰卿文武兼資今故授卿二職即日拜禮部尚書兼撿校右衛大將軍周書曰容容熙皆為利謀熙熙攘攘皆為利往九州春秋曰龐士元說劉備曰荊州荒殘人物殫盡東有吳孫北有曹氏鼎足之勢難以得志益州國富民強戶口有四郡兵馬所出畢具寶貨無求於外今可權借以定大事備曰今指與吾為水火者曹操也操以急吾以寬與反事乃可成耳今以小國而失信義於天下吾所不足取也士元曰權變之時固非一道所能定也兼弱攻昧五伯定事逆取順守報之以義事定之後封以大國何負於信今日不取終為人制耳備後遂行, SBCK: ''}
