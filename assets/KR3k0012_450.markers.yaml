  - {type: variant, offset: 561, length: 0, content: '', WYG: 應之曰吾聞病之将死不可為良醫國之将亡不可為計謀吾數諫吾君吾君不用是}
  - {type: variant, offset: 561, length: 28, content: 以為司馬時年二十九後太祖破黃巾漢獻帝自河東還洛陽彧勸太祖, krp: 寡人聞之不能令則莫若從且夫吴蜂蠆然不弃毒於人則不静余恐弃毒於我也遂遣之又}
