  - {type: variant, offset: 634, length: 71, content: 室今鸞駕旋軫東京榛蕪義士有存本之思兆人懷感舊之哀誠因此時奉主上以從民望大順也秉至公以服天下大略也仗弘毅以致英俊大德也四方雖有逆節其何能為太祖從, SBCK: 聽}
