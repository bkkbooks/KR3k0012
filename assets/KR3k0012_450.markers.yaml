  - {type: variant, offset: 1733, length: 208, content: 以正為尚書令吳志曰太史慈字子義東萊人避亂至遼東北海相孔融聞而奇之數遣餉饋其母融以黃巾寇暴出屯都昌為賊管彥所圍慈歸其母曰汝與孔北海未嘗相識汝去後贍卹過於故舊今被圍汝宜赴之慈單步至都昌夜因伺開間得入見融融欲告急平原相劉備城中人無由得出慈請行融難慈慈曰昔府君傾意老母母感遇遣慈赴急今眾人言不可豈府君憂顧之義老母遣慈意耶慈晨出下鞭直突圍馳去射殺數人應弦而倒無敢追者到平原說備備歛容曰孔北海知世間有劉備耶即遣兵三千隨慈擊賊遂退, SBCK: ''}
