  - {type: variant, offset: 592, length: 3, content: 納周襄, SBCK: 公與荆人戰於城濮君問於咎犯咎犯對曰服義之君不足於信服戰之君不足於詐君愼之詐而已矣君問於雍季對曰焚林而畋得獸雖多而明年無復也乾澤而漁得魚雖多而明年無復也詐猶可以偷利而無報遂與荆軍戰大敗之乃賞先雍季而後咎犯侍者曰城濮之戰咎犯之謀也君曰雍季之言百丗之謀也咎犯之言一時之權也寡人旣巳行之矣又曰智伯圍晉陽絺疵謂智伯曰韓魏之君必反矣智伯曰何以知之對曰夫勝趙而三分其地今城未没者三板臼竈生鼃人馬相食城降有日矣而韓魏之君無喜志而有憂色是非反何也明日智伯謂韓魏之君曰疵言君之反也韓魏之君曰必勝趙而三分其地今城將勝矣二家雖愚不弃羙利而佩約爲難不可成之事其勢可見也是疵必爲趙􅀃君且使君疑二主之心而不解於攻趙也今君聽䜛臣之言而離二主之交爲君惜之智伯岀欲殺絺疵絺疵逃韓魏之君果反又曰白圭之中山中山欲留之固辭而去又之齊齊}
