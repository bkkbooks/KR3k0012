  - {type: variant, offset: 813, length: 722, content: 方今天下大亂智者勞心之時也遂徵入為尚書操謂鍾繇曰公達非常人也吾得之與計事天下何憂哉以為軍帥征呂布至下邳攻之不拔太祖欲還攸曰布勇而無謀不可解遂生擒布太祖又與袁紹相拒於官渡攸勸擊紹將淳于瓊運糧遂破紹魏國初建為尚書令太祖謂文帝曰公達人之師表汝宜盡禮敬之又曰袁尚攻兄譚於平原留別駕審配守鄴為曹公所圍尚聞鄴急棄而救之求人入城計會事主簿李孚請行時圍甚急尚曰何辦孚曰多人不可三騎足矣尚遣之孚選溫信者得三人各給駿馬不示其謀令釋戎器著平常冠秉問事杖投暮直抵鄴城下自稱曹公巡歷圍壘所過失候者輒捶之自東西正出曹公營當城門復怒守圍者收縛之因直入城下配以縋引之孚與配相見既事了外圍益急孚因謂配曰城中榖少無用老弱不如驅出省穀也配乃夜簡得一千人皆令持白幡秉脂燭從三門而出請降孚將所來騎隨降人而出時守圍吏聞城中悉降火光照耀但共觀降不復視圍孚從北門突圍而歸報命於袁尚明旦曹公聞孚已出拊掌大笑鄴郡竟為曹公所取袁尚奔于遼東又曰郭嘉字奉孝潁川人詣太祖太祖與論天下事曰使孤成大業必此人也太祖用其計先擊呂布擒之太祖與袁紹相持於官渡孫策北襲楚眾並懼嘉料曰策輕而無備雖有百萬之眾無異獨行於中原也以吾觀之必死於匹夫之手策臨欲濟江果為許貢客所殺後太祖又用其計密襲盧龍塞大破單于又曰鄧艾字士載義陽人少孤貧每見高山大澤輒指畫軍營處所時人笑焉因計吏上見司馬宣王宣王奇之辟為掾景元四年秋詔諸軍征蜀艾授大將軍節度鍾會攻劍閣不下艾自陰平行無人之地七百餘里鑿山通道艾以氈自褁推轉而下進至江曲遂入成都降劉禪蜀志曰龐統字士元襄陽人守耒陽令在縣不治免官吳魯肅遺先主書曰士元非百里之才使處治中別駕始展驥足耳先主以為治中從事親待亞亮為軍帥中郎將亮留鎮荊州統隨入蜀劉璋與先主會統曰因此會執之則無用兵之勞先主曰初入地恩信未著, SBCK: ''}
