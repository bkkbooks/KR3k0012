  - {type: variant, offset: 237, length: 7, content: 始到謁河內太守, SBCK: 曰㒒不知所以江乙曰吾聞之以財事人者財盡而交踈以色事人者華落而愛衰今子之華有時而落子何以長幸無解於王乎安陵緾曰臣年少愚陋願委質於先王江乙曰獨從爲殉可耳安陵緾曰敬聞命矣江乙去君居朞年逢安陵緾謂曰前諭子者通之於王乎曰未可也居朞年江乙復見安陵緾曰子豈諭王乎安陵緾曰臣未得王之閒也江乙曰子出與王同車入與王同坐居三年言未得王之間子以吾之􅀃未可耳不恱而去其年共王獵江渚之野野火之起􅀂雲蜺虎狼之嘷􅀂雷霆有狂兕從南方來正觸王左􅆖王舉旌旄而使善射者射之一發兕死車下王大喜拊手而􅀏顧謂安陵緾曰吾萬歳之後子將誰與此樂乎安陵緾乃逡巡而却泣下沾衿曰萬歳之後臣將從爲殉安知樂此誰於是共王乃封安陵緾於車下三百戸故曰江乙善謀安陵緾知時也又曰智伯欲襲衛故遺之乗}
  - {type: page-break, offset: 237, content: '', id: KR3k0012_SBCK_450-3a}
  - {type: variant, offset: 237, length: 7, content: 始到謁河內太守, WYG: 曰僕不知所以江乙曰吾聞之以財事人者財盡而交疎以色事人者華落而愛衰今子色華有時而落子何以長幸無觧於王乎安陵纒曰臣年少愚陋願委知於先生江乙曰獨從為殉可耳安陵纒曰敬聞命矣江乙去君居期年逢安陵纒謂曰前諭子者通於楚王乎曰未可也居朞年江乙復見安陵纒曰子豈諭王乎安陵纒曰臣未得王之間也江乙曰子出與王同車入與王同坐居三年言未得王之間子以吾之說未可耳不悅而去其年共王獵江渚之野野火之起若雲蜺虎狼之嘷若雷霆有狂兕從南方來正觸王左驂王舉旌旄而使善射者射之一發兕死車下王大喜拊手而笑顧謂安陵纒曰吾萬嵗之後子将誰與此樂乎安陵纒乃逡巡而前泣下沾衿曰萬嵗之後臣将從為殉安知樂此誰與楚共王乃封安陵纒於車下三百戸故曰江乙善謀安陵纒知時也又曰智伯欲襲衛故遺之乗}
