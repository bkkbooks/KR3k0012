  - {type: variant, offset: 19, length: 1, content: 俊, SBCK: 曰雖然試言之緩曰緩新從􅁗來言勿與則非計也言與之則恐以臣之爲􅁗也故不敢對使臣得爲王計焉不如與之王曰諾虞卿見王王以緩言告之虞卿曰􅁗索六城於王王以五城以賂齊齊􅁗深讎也得王五城并力西擊􅁗是王一舉結二國之親而與􅁗易道也趙王曰善因發虞卿東見齊王與之謀􅁗婁緩聞之逃去又曰楚圍雍氏五月韓令使者求救於􅁗冠蓋相望􅁗師不下殽韓令靳尚使􅁗謂王曰韓之於􅁗也居爲隱蔽岀爲鴈行今韓已病矣􅁗師不下殽臣聞之脣亡者其齒寒願大王熟計之太后乃謂尚子曰妾事先王以其體加妾之身妾困弗支也盡置其身妾不重何也以其少有利焉今救韓日費千金獨不可使妾少有利耶靳尚歸報王王遣張翠張翠稱病日行一縣張翠至甘茂曰韓急矣先生病而來張翠曰韓未急也甘茂曰韓之急緩人莫弗知今先生言不急可乎翠曰韓急則折而入楚矣臣安敢來甘茂曰先生勿復言也乃入}
  - {type: page-break, offset: 19, content: '', id: KR3k0012_SBCK_450-1b}
  - {type: variant, offset: 19, length: 1, content: 俊, WYG: 曰雖然試言之緩曰緩新從秦來言勿與則非計也言與之則恐以臣之為秦也故不敢對使臣得為王計焉不如與之王曰諾虞卿見王王以緩言告之虞卿曰秦索六城於王王以五城賄齊齊秦深讎也得王五城併力西擊秦是王一舉擊三國之親而與秦易道也趙王曰善因發虞卿東見齊王與之謀秦樓緩聞之逃去又曰楚圍雍氏五月韓令使者求救於秦冠蓋相望秦師不下殽韓令尚靳使秦謂王曰韓之於秦也居為隠蔽出為鴈行今韓已病矣秦師不下殽臣聞之脣亡者其齒寒願大王熟計之太后乃謂尚子曰妾事先王以其髀加妾之身妾困弗支也盡置其身妾不重何也以其少有利焉今救韓日費千金獨不可使妾少有利耶尚靳歸報王遣張翠張翠稱病日行一縣張翠至甘茂曰韓急矣先生疾而來張翠曰韓未急也甘茂曰韓之急人莫弗知今先生言不急可乎翠曰韓急則折而入楚矣臣安敢來甘茂曰先生勿復言也乃入}
