  - {type: variant, offset: 592, length: 3, content: 納周襄, krp: 公與荆人戰於城濮君問於咎犯咎犯對曰服義之君不足於信服戰之君不足於詐君愼之詐而已矣君問於雍季對曰焚林而畋得獸雖多而明年無復也乾澤而漁得魚雖多而明年無復也詐猶可以偷利而無報遂與荆軍戰大敗之乃賞先雍季而後咎犯侍者曰城濮之戰咎犯之謀也君曰雍季之言百丗之謀也咎犯之言一時之權也寡人旣巳行之矣又曰智伯圍晉陽絺疵謂智伯曰韓魏之君必反矣智伯曰何以知之對曰夫勝趙而三分其地今城未没者三板臼竈生鼃人馬相食城降有日矣而韓魏之君無喜志而有憂色是非反何也明日智伯謂韓魏之君曰疵言君之反也韓魏之君曰必勝趙而三分其地今城將勝矣二家雖愚不弃羙利而佩約爲難不可成之事其勢可見也是疵必爲趙說君且使君疑二主之心而不解於攻趙也今君聽䜛臣之言而離二主之交爲君惜之智伯岀欲殺絺疵絺疵逃韓魏之君果反又曰白圭之中山中山欲留之固辭而去又之齊齊}
  - {type: variant, offset: 596, length: 0, content: '', SBCK: 亦欲留之又辭去人問其辭白圭曰二國將亡矣所學者國有五盡故莫之必忠則言盡矣莫之必譽則名盡矣莫之必愛則親盡矣行者無糧居者無食則財盡矣不能用人又不能自用則功盡矣國有此五者無辜必亡中山與齊皆當此􅀂使中山之與齊也聞五盡}
  - {type: variant, offset: 596, length: 0, content: '', WYG: 恐召梁公𢎞曰晉人勝智氏矣歸}
  - {type: variant, offset: 596, length: 0, content: '', krp: 亦欲留之又辭去人問其辭白圭曰二國將亡矣所學者國有五盡故莫之必忠則言盡矣莫之必譽則名盡矣莫之必愛則親盡矣行者無糧居者無食則財盡矣不能用人又不能自用則功盡矣國有此五者無辜必亡中山與齊皆當此若使中山之與齊也聞五盡}
  - {type: variant, offset: 597, length: 0, content: '', SBCK: 更之則必不亡也其患在不聞也雖聞又不信也然則人主之務在乎善聽而巳矣又曰下蔡威公閉門而哭三日三夜泣盡而繼之以血旁隣窺牆而問之曰子何故而哭悲􅀂此乎對曰吾國且亡曰何以知也應之曰吾聞病之將死不可爲良醫國之將亡不可爲計謀吾數諌吾君吾君不用是以知國之將亡也於是窺牆者聞其言則舉宗而去之於楚居數年楚王果舉兵伐蔡窺牆者爲司馬將兵而徃束虜其衆問曰得無有昆弟故人乎見威公􅅞在虜中問曰􅀂何以至於此應曰吾何以不至於此且吾聞之也言之者行之役也行之者言之主也汝能行我能言汝爲主我爲役吾亦何以不至於此哉窺牆者乃言之於楚王遂解其􅅞與俱之楚故曰能言者未必能行能行者未必能言也又曰石乞侍坐屈建曰白公其爲亂乎石乞曰是何言也白公至於室無榮所下士者三人與巳相君臣者五人所與同衣食者千人白公之行􅀂此何故爲亂屈建曰此建之所謂亂也以君子行則可於國家行過禮則國家疑之且苟不難下其臣必不難髙其君矣建是以知夫子將爲亂也處十月白公果亂也又曰韓昭侯作髙門屈冝咎曰昭侯不出此門曰何也曰不時吾所謂不時者非時日也人固有利不利昭侯嘗利矣不作髙門徃年􅁗抜冝陽明年大旱民饑不以此時恤民之急也而頋反益以奢此謂福不重至禍不重來者也髙門成昭侯卒竟不出此門矣又曰田子顔自大術至乎平陵城下見人子問其父見人父問其子田子方曰其以平陵反乎吾聞行於内然後施於外子顔欲使其衆甚矣後果以平陵叛又曰晉人巳勝智氏歸而繕甲治兵楚王恐召梁公弘曰晉人勝智氏矣歸而繕甲兵其以我爲事乎梁公曰不患害其在吴乎夫吴君恤民而同其勞使其民重上之令而人輕死以從上使如慮之戰臣登山以望之見其用百姓之信必也勿巳乎其備之􅀂何不聽明年闔廬襲郢又曰楚莊王欲伐陳使人視之使者曰陳不可伐也莊王曰何故對曰其城郭髙溝壑􅀷畜積多其國寜也王曰陳可伐也夫陳小國也而蓄多是賦歛重則民怨上矣城郭髙溝壑深則民力罷矣興兵伐之遂取陳又曰齊桓公將伐山戎􅀌竹使人請助於魯君進羣臣而謀皆曰師行數千里入蠻夷之地必不反矣於是魯許助之而不行齊巳伐山戎􅀌竹而欲移兵於魯管仲曰不可}
  - {type: page-break, offset: 597, content: '', id: KR3k0012_SBCK_450-6a}
  - {type: page-break, offset: 597, content: '', id: KR3k0012_SBCK_450-6b}
  - {type: page-break, offset: 597, content: '', id: KR3k0012_SBCK_450-7a}
  - {type: variant, offset: 597, length: 0, content: '', WYG: 繕甲兵其以我為事乎梁公曰不患晉害其在呉乎夫呉君恤民而同其勞使其民重上之令而人輕死以從上使如慮之戰臣登山以望之見其用百姓之信必也勿已乎其備之若何不聼明年闔閭襲郢又曰楚荘王欲伐陳使人視之使者曰陳不可伐也荘王曰何故對曰其城郭髙溝壑深蓄積多其國寜也王曰陳可伐也夫陳小國也而蓄多是賦歛重則民怨上矣城郭髙溝壑深則民力罷矣興兵伐之遂取陳又曰齊桓公将伐山戎孤竹使人請助於魯魯君進羣臣而謀皆曰師行數千里入蠻夷之地必不反矣於是魯許助之而不行齊已伐山戎孤竹而欲移兵於魯管仲曰不可}
