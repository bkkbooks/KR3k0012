  - {type: variant, offset: 599, length: 9, content: 願從漢高為義帝縞素, SBCK: 未親今有伐逺}
  - {type: variant, offset: 599, length: 4, content: 願從漢高, WYG: 未親今又伐逺而還誅近隣隣國不親非覇王之道君之所得山戎之寳器者中國之所鮮也不可以不進周公之廟也桓公乃分山戎之寳獻之周公之廟明年起兵伐莒魯下令丁男悉發五尺童子皆至孔子曰聖人轉禍}
