  - {type: 'tls:seg', offset: 31, content: '', id: KR3k0012_CHANT_996-1a.14}
  - {type: variant, offset: 34, length: 0, content: '', SBCK: 弘之荆州記曰酈縣北八里有菊水其源悉芳菊􅀍崖水甚甘馨太尉胡廣乆患風羸􅁪汲飲水後疾遂瘳年及百歳非唯天壽亦菊所延也名山記曰道士朱孺}
  - {type: variant, offset: 34, length: 0, content: '', WYG: 𢎞之荆州記曰酈縣北八里有菊水其源悉芳菊被崖間水甚甘馨太尉胡廣乆患風羸恒汲飲水後疾遂瘳年及百嵗非唯天夀亦菊所延也名山記曰道士朱孺}
  - {type: variant, offset: 34, length: 0, content: '', krp: 弘之荆州記曰酈縣北八里有菊水其源悉芳菊𬒳崖水甚甘馨太尉胡廣乆患風羸恒汲飲水後疾遂瘳年及百歳非唯天壽亦菊所延也名山記曰道士朱孺}
  - {type: variant, offset: 35, length: 1, content: 者, SBCK: 吴末入王笥山服菊花乗雲升天本草經曰菊有筋菊有白菊黄菊花一名節花一名􅀓公一名延年一名白花一名日精一名更生一名隂威一名朱羸一名女菊其菊有兩種一種紫莖氣香而味甘美葉可作羹爲真菊菊一種青莖而大作蒿艾氣味苦不堪食名薏非真菊也呉氏夲草經曰菊華一名女華一名女室淮南萬畢術曰以壯菊􅁅散池中蛙盡死楚辭曰朝飲木蘭之墜露兮夕飡秋菊之落英又曰春蘭兮秋菊長無絶兮終古鍾㑹菊賦曰縹幹緑葇青柯紅芒華實䂓圎芳頴四張故夫菊有五美焉圎華髙懸准天極也純黄不􅄂后土色也早殖晩登君子德也冒霜吐頴象勁直也流中輕體神仙食也潘尼秋菊賦曰汎流英於青醴似浮萍之隨波嵇康菊花銘曰煌煌丹菊暮秋彌榮親尊是御永祚億齡􅀂毛詩䟽曰􅀂饒也幽州謂之翹饒蔓生莖如勞豆而細葉似蒺䔧而青其華細緑色可生食味如小豆藿夲草經曰陵􅀂生下濕水中七八月華華紫似金紫草可以染帛煑沐頭髮即黒萱毛詩伯兮曰焉得諼草言樹之背背北堂也願言思伯使我心痗􅀃文曰萱忘憂草也崔豹古今注曰欲忘人之憂則贈以丹􅁄一名忘憂草也􅀶物志曰神農經曰上藥養性謂合歡蠲忿萱草忘憂風土記曰花曰冝男姙婦佩之必生男又名萱草本草經云萱一名忘憂一名冝男一名歧女録異記曰婦人帶冝男草生兒束晳發䝉記曰甘􅀥令人不惑萱草可以忘憂任昉述異記曰萱草一名紫萱又名忘憂草吴中書生謂之療愁嵇康飬生論云萱草忘憂苜蓿史記曰大宛有苜蓿草漢使取其實來於是天子始種苜蓿離宫別觀旁盡種蒲陶苜蓿極望漢書西域傳曰􅄢賔國有苜蓿大宛馬􅄝苜蓿武帝得其馬漢使採蒲挑苜蓿種歸天子益種離宫別館旁晉書曰華}
