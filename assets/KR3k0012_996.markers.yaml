  - {type: variant, offset: 883, length: 381, content: 得其葉以為羹君子得其材以為絺綌以為君子朝廷夏服吳越春秋曰採葛之婦人傷越王用心之苦也作苦何之歌其辭曰葛不連蔓葉台台嘗膽不苦味苦飴令我採葛以作絲說文曰葛絺綌草也本草經曰葛根一名鷄齊根味甘平生川谷治消渴身大熱嘔吐諸痺起陰氣解毒生汶山吳氏本草曰葛根神農甘生太山說苑曰綿綿之葛在於曠野良工得之以為絺綌良工不得枯死於野楚辭曰石磊磊兮葛蔓蔓思公子兮悵忘歸君思我兮不得聞藤爾雅曰諸慮山櫐今江東呼櫐為藤似葛而粗大也攝虎櫐今虎豆也纏蔓林樹而生英有尾㓨今江東呼之為獵攝二音涉也廣雅曰藟藤也易困上六曰困于葛虆于臲卼王弼注曰困於極而乘於剛下旡其應行則愈繞居不獲安故曰困于葛纍于臲卼者也毛詩南有樛木曰南有樛木葛藟纍之注云興也南南土也木下曲曰樛南土之葛藟茂盛箋云木枝以下垂之故葛也藟也得纍而蔓之而上下俱盛興者喻后妃能以意下逮眾妾詩義䟽曰纍蔓也似燕薁連蔓生蔓白色子赤可食酢而不美也幽州謂之推藟也, SBCK: 皆與千户侯等}
  - {type: variant, offset: 885, length: 112, content: 葉以為羹君子得其材以為絺綌以為君子朝廷夏服吳越春秋曰採葛之婦人傷越王用心之苦也作苦何之歌其辭曰葛不連蔓葉台台嘗膽不苦味苦飴令我採葛以作絲說文曰葛絺綌草也本草經曰葛根一名鷄齊根味甘平生川谷治消渴身大熱嘔吐諸痺起陰氣解毒生汶山吳, WYG: 他者色淺吴}
