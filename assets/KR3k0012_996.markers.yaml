  - {type: variant, offset: 21, length: 3, content: 黂枲麻, SBCK: 黄華周書曰寒露之日鴻鴈來賔又五日菊有黄華無華土不稼穡晉書曰羅含致仕還家階庭忽蘭菊藂生人以爲德行之感續晉陽秋曰陶淵明甞九月九日無酒出菊叢中摘􅄹把坐其側乆之望見一白衣人至乃王弘送酒即便就酌山海經曰九九之山其草多菊廣志曰菊有白菊風俗通曰南陽酈縣有甘谷谷中水甘美云其山上大有菊菜水從山流下得其滋液谷中三十餘家不復穿井仰飲此水上壽百二三十其中百餘七十八十名之爲夭司空王暢太尉劉寛太傅􅀽隗爲南陽太守聞有此事令酈月送水三十斛用飲食澡浴終然無益抱朴子曰劉生丹法用白菊花汁蓮花汁地血汁樗汁和丹蒸之服一年得五百歳仙方所謂日精又曰日精更生周􅄹皆一菊也而根莖花實異名或無効者以由不得真菊菊花與薏苡相似直以甘苦}
  - {type: page-break, offset: 21, content: '', id: KR3k0012_SBCK_996-1b}
  - {type: variant, offset: 21, length: 4, content: 黂枲麻別, WYG: 黄花周書曰寒露之日鴻鴈來賔又五日菊有黄華菊無黄華土不稼穡晉書曰羅含致仕還家階庭忽蘭菊藂生人以為德行之感續晉陽秋曰陶淵明嘗九月九日無酒出菊叢中摘盈把坐其側久之望見白衣人至乃王𢎞送酒即便就酌山海經曰女几之山其草多菊廣志曰菊有白菊風俗通曰南陽酈縣有甘谷谷中水甘美云其山上有大菊水從山上流下得其滋液谷中三十餘家不復穿井仰飲此水上夀百}
  - {type: page-break, offset: 21, content: '', id: KR3k0012_WYG_996-2a, image: WYG0901/WYG0901-0708c.png}
  - {type: variant, offset: 21, length: 3, content: 黂枲麻, krp: 黄華周書曰寒露之日鴻鴈來賔又五日菊有黄華無華土不稼穡晉書曰羅含致仕還家階庭忽蘭菊藂生人以爲德行之感續晉陽秋曰陶淵明甞九月九日無酒出菊叢中摘盈把坐其側乆之望見一白衣人至乃王弘送酒即便就酌山海經曰九九之山其草多菊廣志曰菊有白菊風俗通曰南陽酈縣有甘谷谷中水甘美云其山上大有菊菜水從山流下得其滋液谷中三十餘家不復穿井仰飲此水上壽百二三十其中百餘七十八十名之爲夭司空王暢太尉劉寛太傅袁隗爲南陽太守聞有此事令酈月送水三十斛用飲食澡浴終然無益抱朴子曰劉生丹法用白菊花汁蓮花汁地血汁樗汁和丹蒸之服一年得五百歳仙方所謂日精又曰日精更生周盈皆一菊也而根莖花實異名或無効者以由不得真菊菊花與薏苡相似直以甘苦}
