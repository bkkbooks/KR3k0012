  - {type: variant, offset: 558, length: 277, content: 種苴麻二月可糶麻子本草經曰麻蕡一名麻勃味平辛生川谷治七傷利五藏下血氣多食令人見鬼狂走久服輕身通神明麻子補中益氣久服肥健不老生太山吳氏本草經曰麻子中人神農歧伯辛雷公扁鵲無毒不欲牡厲白薇先藏地中者食殺人麻藍一名麻蕡一名青羊一名青葛神農辛歧伯有毒雷公甘畏牡厲白薇葉上有毒食之殺人麻勃一名麻花雷公辛無毒畏牡厲風俗通曰蓬生麻中不扶自直葛爾雅曰拔蘢葛也似葛蔓生有節江東呼為龍尾亦謂之虎葛細葉赤莖廣雅曰女青葛也毛詩關睢葛覃曰葛之覃兮施于中谷維葉萋萋毛曰覃延也葛所以為絺綌毛詩黍離葛藟曰綿綿葛藟在河之滸葛也藟也生於河之厓得其潤澤以長大而不絕又黍離採葛曰採葛懼讒也彼採葛一, WYG: 百}
