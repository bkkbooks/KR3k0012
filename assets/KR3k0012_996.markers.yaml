  - {type: variant, offset: 2571, length: 268, content: 或曰鬼桃葉似桃花白子如小麥毛詩羔裘隰有萇楚曰隰有萇楚猗儺其枝萇楚銚戈也說文曰長楚銚弋一名羊桃山海經曰豐山有木多羊桃而方莖郭璞注曰一名鬼桃治皮腫起羊蹄詩義䟽曰楊州謂羊蹄為蓫廣雅曰蓽菎羊蹄本草經曰羊蹄一名東方宿一名連蟲陸一名鬼目味苦寒生川澤治頭禿疥瘙陰熱無子生陳留鼠耳廣雅曰無心鼠耳也廣志曰鼠耳葉如耳縹色也鼠尾爾雅曰葝鼠尾孫炎曰鼠尾可染皂也葝巨盈切吳氏本草曰鼠尾一名葝一名山陵翹治痢也芄蘭爾雅曰雚芄蘭也郭璞注曰萼生斷之有白汁可噉也毛詩芄蘭曰芄蘭剌惠公也驕而無禮大夫剌之芄蘭之支芄蘭草也柔弱恒蔓延於地有所依緣則起詩義䟽曰芄蘭摩羅也幽州謂之爵瓢, SBCK: 太平御覽卷第九百九十六}
