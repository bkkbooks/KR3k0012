  - {type: variant, offset: 1273, length: 1275, content: 郭璞注曰今虎豆狸豆之屬櫐也齊書曰解叔謙字楚梁鴈門人也母有疾叔謙夜於庭中稽顙祈福聞空中語云此疾得丁公藤治便差即訪毉及草注皆無識者乃求訪至宜都遙見山中一老公伐木問其所用荅云此丁公藤療風尤驗叔謙便拜伏流涕具言來意此公愴然以數段與之并示以漬酒法叔謙受之尋視此人不復知處依法為酒母病即差梁書曰周弘正與子豫玄俱載入東郡乘小舩渡岸見藤花弘正挽而舩覆俱溺僅免豫玄遂得心驚疾汝南先賢傳曰蔡順字君仲至孝所居井桔槔歲久欲易之為在母年上不敢一旦忽生扶老藤遶之有鳩巢其上金樓子曰合浦有康頭山山有一頭鹿額上載科藤一枚四條直上各長一丈許雲南記曰雲南出藤其色如朱小者以為馬策大者可為柱杖崔豹古今注曰酒盃藤出西域藤大如臂去實皆可以酌酒自有文章映徹可愛實大如杯味如荳蔻香美消酒土人提酒來至藤下摘花酌酒以其實消酒其國人寶之不傳於中國張騫大宛國得之事在張騫出關志南方草物狀曰沉藤生子大如齏甌正月華苞仍連著實十月臘月熟色赤生食之甜酢生交趾九真毦至藤生山中大如苹蒿蔓衍居民採取剝之以作毦然不多出興古合浦簡子藤生緣樹木正月二月華四五月熟實如梨赤如雄鷄核如魚鱗取生食之味淡泊無甘苦出交趾合浦野藂藤緣樹木二月華苞仍連著實五六月熟子大如羹甌里民煮食其味甜酢出蒼梧科藤生金封山烏滸人往往賣之其色正赤又云以草染之出興古陳祈暢異物志曰葭蒱藤類延蔓他樹以自長養實大小長短如蓮菆側尤切著枝格間實外有殼又無核剝乃食之煮而暴之甜美食之不飢臨海異物志曰鍾藤附樹作根軟弱須緣樹而作上下條此藤既纏裹樹樹死且有惡汁藤盛成樹若木自然大者或至五十圍異物志曰科藤圍數寸重於竹可以為杖篾以縛舩及以為席勝於竹也始興記曰黃溪出科藤王韶之始興記曰晉中朝有質子將歸忽有人寄其書告曰吾家在觀亭廟石間有懸藤君扣藤家人必自出歸者如言果有二人出水取書并曰江伯令君前入水見屋舍甚麗今俗咸言觀亭有江伯神也水經又載顧徽廣州記曰科藤如栟櫚葉踈外皮青多棘㓨高五六丈者如五六寸竹小者如筆管破其外青皮得息即科藤藤類有十許種續斷草藤也一曰諾藤一曰水藤山行渴則止斷取汁飲之治人體有損絕沐則長髮去地一丈斷之輒更生根至地永不絕異苑曰隋郡永陽縣有山壁直千仞巖上有石室古名為神農窟窟前有百藥藂茇莫不畢備又別有異物藤花形如菱菜朝紫中綠脯黃暮青夜赤五色迭耀劉欣期交州記曰含水藤破之得水行者資以止渴裴淵廣州記曰力陳嶺民人居之伐舩為業隨樹所居就以成槽皆去水艱遠動有數里山生一草名曰膏藤津汁軟滑無物能比導地牽之如流五六丈舩數人便運嶺表錄異曰南土多野鹿藤苗有大如鷄子白者細於筋採為山貨流布海內儋臺瓊管百姓皆制藤線編以為幕其妙者亦挑紋為花藥魚鳥之狀業此納官以充賦稅女蘿爾雅曰唐蒙女蘿女蘿兔絲別曰名也詩曰爰采唐矣毛詩頗弁曰蔦與女蘿施于松柏蔦寄生也女蘿菟絲松蘿也菟瓜爾雅曰蔩菟瓜也郭璞注曰似土瓜也孫炎曰一名瓜裂也烏杷爾雅曰欔烏階也郭璞注曰即烏杷也子連相著狀如杷齒可以染皂羊齒爾雅曰綿馬羊齒郭璞注曰草細葉藂生而毛有似羊齒繅者以取蠒緒牛蘈爾雅曰藬大廻切牛蘈也郭璞注曰今江東呼牛蘈者高尺餘許方莖葉長而銳華紫縹色可淋以為飲孫炎曰車前草一名牛蘈狗毒爾雅曰蘻音繫狗毒樊光云俗語若如繫馬帚爾雅曰荓音洴馬帚也, SBCK: 蒐}
  - {type: variant, offset: 1273, length: 1275, content: 郭璞注曰今虎豆狸豆之屬櫐也齊書曰解叔謙字楚梁鴈門人也母有疾叔謙夜於庭中稽顙祈福聞空中語云此疾得丁公藤治便差即訪毉及草注皆無識者乃求訪至宜都遙見山中一老公伐木問其所用荅云此丁公藤療風尤驗叔謙便拜伏流涕具言來意此公愴然以數段與之并示以漬酒法叔謙受之尋視此人不復知處依法為酒母病即差梁書曰周弘正與子豫玄俱載入東郡乘小舩渡岸見藤花弘正挽而舩覆俱溺僅免豫玄遂得心驚疾汝南先賢傳曰蔡順字君仲至孝所居井桔槔歲久欲易之為在母年上不敢一旦忽生扶老藤遶之有鳩巢其上金樓子曰合浦有康頭山山有一頭鹿額上載科藤一枚四條直上各長一丈許雲南記曰雲南出藤其色如朱小者以為馬策大者可為柱杖崔豹古今注曰酒盃藤出西域藤大如臂去實皆可以酌酒自有文章映徹可愛實大如杯味如荳蔻香美消酒土人提酒來至藤下摘花酌酒以其實消酒其國人寶之不傳於中國張騫大宛國得之事在張騫出關志南方草物狀曰沉藤生子大如齏甌正月華苞仍連著實十月臘月熟色赤生食之甜酢生交趾九真毦至藤生山中大如苹蒿蔓衍居民採取剝之以作毦然不多出興古合浦簡子藤生緣樹木正月二月華四五月熟實如梨赤如雄鷄核如魚鱗取生食之味淡泊無甘苦出交趾合浦野藂藤緣樹木二月華苞仍連著實五六月熟子大如羹甌里民煮食其味甜酢出蒼梧科藤生金封山烏滸人往往賣之其色正赤又云以草染之出興古陳祈暢異物志曰葭蒱藤類延蔓他樹以自長養實大小長短如蓮菆側尤切著枝格間實外有殼又無核剝乃食之煮而暴之甜美食之不飢臨海異物志曰鍾藤附樹作根軟弱須緣樹而作上下條此藤既纏裹樹樹死且有惡汁藤盛成樹若木自然大者或至五十圍異物志曰科藤圍數寸重於竹可以為杖篾以縛舩及以為席勝於竹也始興記曰黃溪出科藤王韶之始興記曰晉中朝有質子將歸忽有人寄其書告曰吾家在觀亭廟石間有懸藤君扣藤家人必自出歸者如言果有二人出水取書并曰江伯令君前入水見屋舍甚麗今俗咸言觀亭有江伯神也水經又載顧徽廣州記曰科藤如栟櫚葉踈外皮青多棘㓨高五六丈者如五六寸竹小者如筆管破其外青皮得息即科藤藤類有十許種續斷草藤也一曰諾藤一曰水藤山行渴則止斷取汁飲之治人體有損絕沐則長髮去地一丈斷之輒更生根至地永不絕異苑曰隋郡永陽縣有山壁直千仞巖上有石室古名為神農窟窟前有百藥藂茇莫不畢備又別有異物藤花形如菱菜朝紫中綠脯黃暮青夜赤五色迭耀劉欣期交州記曰含水藤破之得水行者資以止渴裴淵廣州記曰力陳嶺民人居之伐舩為業隨樹所居就以成槽皆去水艱遠動有數里山生一草名曰膏藤津汁軟滑無物能比導地牽之如流五六丈舩數人便運嶺表錄異曰南土多野鹿藤苗有大如鷄子白者細於筋採為山貨流布海內儋臺瓊管百姓皆制藤線編以為幕其妙者亦挑紋為花藥魚鳥之狀業此納官以充賦稅女蘿爾雅曰唐蒙女蘿女蘿兔絲別曰名也詩曰爰采唐矣毛詩頗弁曰蔦與女蘿施于松柏蔦寄生也女蘿菟絲松蘿也菟瓜爾雅曰蔩菟瓜也郭璞注曰似土瓜也孫炎曰一名瓜裂也烏杷爾雅曰欔烏階也郭璞注曰即烏杷也子連相著狀如杷齒可以染皂羊齒爾雅曰綿馬羊齒郭璞注曰草細葉藂生而毛有似羊齒繅者以取蠒緒牛蘈爾雅曰藬大廻切牛蘈也郭璞注曰今江東呼牛蘈者高尺餘許方莖葉長而銳華紫縹色可淋以為飲孫炎曰車前草一名牛蘈狗毒爾雅曰蘻音繫狗毒樊光云俗語若如繫馬帚爾雅曰荓音洴馬帚也, krp: 蒐}
