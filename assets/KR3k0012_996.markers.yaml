  - {type: variant, offset: 405, length: 0, content: '', SBCK: 便斷頭曹公大喜定視之是一束茅耳盛弘之荆州記曰零陵郡有香茅桓公所以責楚廣州記曰董奉與士爕同處數積載思欲還䂊章爕情拘留不能免後乃託以病死爕開棺看乃是茅人楚辭曰蘭芷變而不芳兮荃蕙化而爲茅楊雄反騷曰費椒楫以要神兮又勤索彼瓊茅一莖三脊茅紫草爾雅曰藐芘草也}
