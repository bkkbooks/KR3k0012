  - {type: variant, offset: 403, length: 1, content: 願, SBCK: 堯爲天子衣不重帛食不兼味土階三尺茅茨不剪尹子曰湯禱旱素車白馬布衣身嬰白茅以身爲牲􅀃文曰茅菅也陸賈新語曰伊尹居􅀒薪之野修道德於茅廬之下風俗通曰謹案詩曰手如柔荑者茅始熟中穰也旣白且滑漢武故事曰帝拜欒大爲天道將軍使着羽衣立白茅上授玉印大亦羽衣立白茅上授印示不臣也神仙傳曰介象受氣禁術能茅屋上燃火煑雞使茅不焦又曰曹公捕左慈數日不}
  - {type: page-break, offset: 403, content: '', id: KR3k0012_SBCK_996-6a}
  - {type: variant, offset: 403, length: 1, content: 願, WYG: 堯為天子衣不重帛食不兼味土階三尺茅茨不剪尸子曰湯救旱素車白馬布衣身嬰白茅以身為牲說文曰茅菅也陸賈新語曰伊尹居負薪之野修道徳於茅廬之下風俗通曰謹按詩曰手如柔荑者茅始熟中穰也既白且滑漢武故事曰帝拜欒大為天道將軍使着羽衣立茅上授玊印大亦羽衣立白茅上受印示不臣也神仙傳曰介象受氣禁術能茅屋上燃火煮雞使茅不焦又曰曹公捕左慈有人見知便斬以獻曹公大喜定視之是一束茅耳盛𢎞之荆州記曰零陵郡有香茅桓公所以責楚廣州記曰董奉與士燮同處積載思欲還豫章爕情拘留不能免後乃託以病死爕開棺乃是茅人楚辭曰蘭芷變而不芳兮荃蕙化而為茅楊雄反騷曰費椒楫以要神兮又勤索彼瓊茅一莖三脊茅紫草爾雅曰藐茈也郭璞曰可以染紫一名茈䓞廣雅云廣雅曰紫艿紫草也艿音仍說文曰茈藐紫草山海經曰勞山多茈草一名紫英潯陽記曰石井山曽有行人見山上有採紫草者此人謂村人掲鍤而徃見山上人便去聞有呼昌容者曰人來取爾草既至山頂寂寞無所見列仙𫝊曰昌容常山之道士也自稱殷王子二百餘年而顔色如少能致紫草與染家}
