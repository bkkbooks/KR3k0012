  - {type: variant, offset: 25, length: 0, content: '', SBCK: 之耳菊甘而薏苦今所在真菊但爲少耳神仙傳曰康風子服甘菊花栢實散得仙􅀶物志曰菊有}
  - {type: page-break, offset: 25, content: '', id: KR3k0012_SBCK_996-2a}
  - {type: variant, offset: 25, length: 0, content: '', krp: 之耳菊甘而薏苦今所在真菊但爲少耳神仙傳曰康風子服甘菊花栢實散得仙博物志曰菊有}
  - {type: variant, offset: 26, length: 0, content: '', SBCK: 種苗花如一唯味小異苦者不冝服崔寔四民月令曰九月九日可採菊華王韶之神境記曰滎陽郡西有靈源山其澗生靈芝石茵巖有紫菊風土記曰日精者菭音苔蘠皆菊華莖之別}
  - {type: variant, offset: 26, length: 0, content: '', WYG: 三十年中百餘下七十八十}
  - {type: variant, offset: 26, length: 0, content: '', krp: 種苗花如一唯味小異苦者不冝服崔寔四民月令曰九月九日可採菊華王韶之神境記曰滎陽郡西有靈源山其澗生靈芝石茵巖有紫菊風土記曰日精者菭音苔蘠皆菊華莖之別}
  - {type: variant, offset: 27, length: 0, content: '', SBCK: 九月律中無射而數九俗向九日而用候時之草}
  - {type: variant, offset: 27, length: 0, content: '', WYG: 之為天司空王暢太尉劉寛太傅袁隗為南陽太守聞有此事令酈縣月送水三十斛用飲食澡浴終然無益抱朴子曰劉生丹法白菊花汁蓮花汁樗汁和丹蒸之服一年得五百歲仙方所謂日精又曰日精更生周盈皆一菊}
  - {type: page-break, offset: 27, content: '', id: KR3k0012_WYG_996-2b, image: WYG0901/WYG0901-0708d.png}
  - {type: variant, offset: 27, length: 0, content: '', krp: 九月律中無射而數九俗向九日而用候時之草}
  - {type: punctuation, offset: 28, content: 。, id: KR3k0012_CHANT_996-bkkpn16}
  - {type: 'tls:seg', offset: 28, content: '', id: KR3k0012_CHANT_996-1a.12}
  - {type: variant, offset: 28, length: 5, content: 茡麻母苴麻, SBCK: ''}
  - {type: variant, offset: 28, length: 5, content: 茡麻母苴麻, WYG: 而根莖花實異名或無效者以由不得真菊又曰菊花與苡薏相似直以甘苦别之耳菊甘而薏苦今所有真菊但為少耳神仙傳曰康風子服甘菊花栢實後得仙愽物志曰菊有二種苖花如一唯味小異苦者不冝服崔氏四民月令曰九月九日可採菊華王韶之神境記曰滎陽郡西有靈源山其澗生靈芝石茵巖有紫菊風土記曰日精菭音苔蘠皆菊華莖之别名九月律中無射而數九俗尚九日而用候時之草也}
