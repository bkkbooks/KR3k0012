  - {type: variant, offset: 35, length: 1, content: 者, WYG: 吴末入玊笥山服菊花乘雲升天本草經曰菊有筋菊有白菊花黄菊花一名節花一名傳公一名延年一名白花一名日精一名更生一名隂威一名朱羸一名女花其菊有兩種一種紫莖氣香而味甘美葉可作羮為真菊菊一種青莖而大作蒿艾氣味苦不堪食名薏非真菊也吴氏本草經曰菊華一名女華一名女室淮南萬畢術曰以牡菊灰散池中蛙盡死楚辭曰朝飲木蘭之墜露兮夕餐秋菊之落英又曰春蘭兮秋菊長無絶兮終古鍾㑹菊賦曰縹幹緑葉青柯紅芒芳實離離暉藻煌煌故夫菊有五美焉圓華髙縣凖天極也純黄不雜后土色也早植晚登君子徳也冐霜吐頴象勁直也流中輕體神仙食也潘尼秋菊賦曰汎流英於青醴似浮萍之隨波嵇含菊花銘曰煌煌丹菊暮秋彌榮親尊是御永作億齡苕毛詩疏曰苕饒也幽州謂之翹饒蔓生莖如勞豆而細葉似蒺䔧而青其華細緑色可生食味如小豆藿本草經曰陵蒔一名陵苕陸機疏云一名鼠尾生下濕水中七八月華華紫似今紫草可以染皂煮以沐頭髪即黑萱毛詩伯兮曰焉得諼草言樹之背背北堂也願言思伯使我心痗說文曰萱忘憂草也崔豹古今注曰欲忘人之憂則贈以丹棘一名忘憂草也愽物志曰神農經曰中藥養性謂合歡蠲忿萱草忘憂風土記曰花曰宜男姙婦佩之必生男又名萱草本草經曰萱一名忘憂一名宜男一名妓女録異記曰婦人𢃄宜男草生男束晢發蒙記曰甘棗令人不惑萱草可以忘憂任昉述異記曰萱草一名紫萱又名忘憂草吴中書生謂之療愁花嵇康養生論云萱草忘憂苜蓿史記大宛有苜蓿漢使取其實來於是天子始種苜蓿及天馬多外國使來衆離宮别觀旁盡種苜蓿極望漢書西域𫝊曰􅄢賔國有苜蓿大宛馬嗜苜蓿武帝得其馬漢使採蒲桃苜蓿種歸天子益種離宮别館旁晉書曰華}
