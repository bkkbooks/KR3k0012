  - {type: variant, offset: 84, length: 0, content: '', SBCK: 力見則其縣多土功土螻山海經曰崑崙之丘有獸焉其狀如羊而四角名曰土螻讙讙山海經曰翼望之山或作王翠有獸狀如狸一目而三尾名曰讙讙音歡或作原其音如百聲言其能作百種聲或日百物名也未祥是可以衘凶服之治癉黄癉病音旦也幽頞音遏山海經曰邊春之物有獸狀如禺而文背善􅀏見人則卧名曰幽頞或作妭也其鳴自呼也山海經圖讃曰幽頞似猴俾愚作智觸物則􅀏見人佯睡足訾山海經曰蔓聮之山有獸狀如禺而有鬛牛尾文臂馬蹄見人則􅀏名曰足訾其鳴自呼也那父山海經曰灌題之山有獸狀如牛而白尾音如叫如人叫喚名曰那父天馬山海經曰馬成之山有獸如白犬而黑頭見人則飛其名天馬其鳴自呼也音那或作能山海經曰甘􅀥之山有獸狀如數鼠而文題數鼠未詳名曰那食之治癭朏音普妹切山海經曰霍山有獸如狸白尾有鬛名朏畜之亡憂文山海經曰放皐之山有獸狀如蜂枝尾而反舌善呼名文開明山海經曰開明獸身􅀋虎而九首皆人面東郷立崑崙窮竒山海經曰封山有獸􅃺如牛而蝟毛名曰窮竒食人或云窮竒聞人闘乃􅂇不直者文王出}
