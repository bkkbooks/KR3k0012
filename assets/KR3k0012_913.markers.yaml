  - {type: variant, offset: 1763, length: 345, content: 遼東太守遣使詣孫權送貂皮千枚欲舉國歸吳晉書曰趙王倫篡位至於奴卒廝役亦加以爵位每朝會貂蟬盈坐時為之喭曰貂不足狗尾續異苑曰貂出句麗國常有一物共居穴或見之身貂類人長三尺能制貂愛樂刀子其俗人欲得貂皮以刀插穴口此物夜出皮置刀邊須人持皮去乃取刀隋書曰北室韋其俗以捕貂為業南室韋亦多貂貀說文曰貀獸無前足漢津能捕豺貀購百錢爾雅曰貀無前足郭璞注曰晉太康七年石陵扶夷縣檻得獸似狗貀文有角兩腳即此類也或曰豹似虎而黑無前兩足是也廣雅曰豹貀也唐書曰長慶中河東節度使李聽貢貀三頭貀猛揵之獸也穆宗好畋遊嘗詔諸道廣求此獸搜踐山谷郡縣告勞防虞籠檻甚於豺虎及至林苑往往噬人後穆宗亦盡令逐之及敬宗即位聽復獻之𤟤說文曰𤟤鼠出丁令胡以作裘魏略曰丁靈國出青𤟤子白𤟤子皮江表傳曰魏文帝遣使吳求𤟤皮豹犀群臣以非禮欲不與權勑付使山海經曰獄法, SBCK: 丹裏}
