  body:
  - {type: variant, offset: 4, length: 2, content: 四貍, SBCK: 五􅄂獸驒騱昆蹄蒙頌贙魋蜼鼰豦驨㚟石榖猶㹠竹㹠原天狗獜䝣獀鹿蜀􅀋猼訑狸力土螻讙讙幽鴳足訾那父天馬朏文開明窮竒褱彘䍺羬羊􅅝長古谿邊㺟犱狳渾沌檮杌無損綢齧鐵飛骸獸破鏡猯狖􅚦麡狼兩頭獸獑猢黄要含利兹白虎豹聆䑕壄羊猛氏飛遽射干獌狿蒲勞驒騱上音㒹下音奚􅀃文曰驒騱野馬屬史記曰匈奴畜則駃古穴切騠下奚切驒騱昆蹄}
  - {type: page-break, offset: 4, content: '', id: KR3k0012_SBCK_913-1b}
