  - {type: variant, offset: 2106, length: 2, content: 獄法, WYG: 縁光之山獸多㚟郭璞注曰㚟似兎而鹿脚青色也石豰説文曰豰呼木切類犬腰以上黄腰以下黑食獮猴或曰豰似䍧羊風土記曰石豰似狢而形短常捕取猴猨司馬相如上林賦曰獑胡豰蛫猶羊救切説文曰猶玃屬一曰隴西謂犬子為猶爾雅曰猶如麂善登木􅭼劉勰新論曰寒山有獸其名為􅭼其角當心俯而磨之潰心而死竹㹠徐褒南方記曰竹㹠野生長一丈三尺在土穴中常食竹根味如鴨肉原山海經曰翼望之山亦作土翠山有獸狀如狸一目三尾名曰原音奪衆聲言能作百種聲可以禦凶也天狗山海經曰隂山濁谷之水有獸出焉狀如狸或作狗白首名曰天狗可以禦凶獜音吝山海經曰依軲}
