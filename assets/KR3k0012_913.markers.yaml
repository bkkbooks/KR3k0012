  - {type: variant, offset: 2583, length: 0, content: '', WYG: 有獸如狸白尾有鬛名胐朏養之已憂文文山海經曰放臯之山有獸狀如蜂枝尾而反舌善呼其名曰文文開明山海經曰開明獸身類虎而九首皆人靣東嚮立出崑崙窮竒山海經曰邽山有獸狀如牛而蝟毛名曰窮竒食人或云窮竒聞人闘乃􅂇不直者文王出獵所獲張揖注上林賦曰窮竒其音如狗嘷神異記曰北有獸狀如虎有翼名窮竒猾褢山海經曰堯}
  - {type: page-break, offset: 2583, content: '', id: KR3k0012_WYG_913-8a, image: WYG0901/WYG0901-0132a.png}
  - {type: page-break, offset: 2583, content: '', id: KR3k0012_WYG_913-8b, image: WYG0901/WYG0901-0132b.png}
  - {type: variant, offset: 2584, length: 0, content: '', WYG: 之山有獸如人而彘鬛冬蟄名猾褢音如斵山木如人斵木聲見則其縣有役彘山海經曰浮玉之山有獸如虎而牛尾音如犬名曰彘羬羊山海經曰華山之背曰錢来山有獸狀如羊而馬尾名曰羬羊其脂可以已腊治體腊也􅅝山海經曰羭次之一山有獸狀如禺而長臂其名曰􅀢長右山海經曰長右之一山有獸如禺而四耳名長右因其山名音如吟見則郡縣大水谿邉山海經曰天帝之山有獸狀如狗名谿邉哉作遺席其皮者不蠱􅙱山海經曰臯塗之山有獸狀如鹿白尾馬足人手前兩脚似人手而四角名曰􅙱犰狳上音求下音余山海經曰餘峩之山有獸狀如兎鳥喙鴟目蛇尾見人則眠言陽死也其名曰犰狳其鳴自呼見則蟲蝗為敗渾沌東方朔神異經曰崑崙西有獸狀如犬長毛有目而不見有耳而不聞有腹而無五臓有腸直而不旋食物徑過人有徳行而往則牴觸之有凶徳而往則依憑之天使其然名曰渾沌一名無耳一名無心空居無為常咋尾回轉向天而笑檮杌東方朔神異經曰西方荒中有獸焉狀如虎而身大虎尾毛長一尺張華注曰言此獸毛皆如豪猪毛也人靣虎足口有猪牙尾長一丈八尺名曰檮杌㺊音㺊東方朔神異經曰北方有獸焉其狀如獅子食人吹人則病口中吹人名曰㺊恒近人村里入人居室百姓患苦天帝徙之北方荒中也無損神異經曰}
