  - {type: variant, offset: 24, length: 0, content: '', SBCK: 杻陽之山有獸􅃺如馬而白文頭如虎而長尾其音如謡如人歌其名曰鹿蜀佩之冝子孫山海經圖讃曰鹿蜀之獸馬質虎文驤首吟鳴矯矯騰群佩其皮毛子孫如雲􅀋山海經曰亶受之山有獸狀如}
  - {type: page-break, offset: 24, content: '', id: KR3k0012_SBCK_913-4a}
  - {type: variant, offset: 24, length: 0, content: '', krp: 杻陽之山有獸狀如馬而白文頭如虎而長尾其音如謡如人歌其名曰鹿蜀佩之冝子孫山海經圖讃曰鹿蜀之獸馬質虎文驤首吟鳴矯矯騰群佩其皮毛子孫如雲類山海經曰亶受之山有獸狀如}
  - {type: variant, offset: 25, length: 1, content: 首, SBCK: 而有髮其名曰􅀋自爲牝壯食者不妬猼訑上音摶下音他山海經曰基山有獸其狀如羊九尾四目其目在背名曰猼訑佩}
  - {type: variant, offset: 25, length: 1, content: 首, krp: 而有髮其名曰類自爲牝壯食者不妬猼訑上音摶下音他山海經曰基山有獸其狀如羊九尾四目其目在背名曰猼訑佩}
