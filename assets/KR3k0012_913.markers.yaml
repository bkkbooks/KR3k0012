  - {type: variant, offset: 2607, length: 3, content: 酒欲養, WYG: 􅚦力水切為二切異物志曰􅚦鼠屬捷勇於猨􅀈靣皮鼻微倒向上尾端分為兩條天雨便以挿鼻孔中水不入見人則顛倒投擲或墮地奔走無所㢠廻避觸樹衝石或至破頭折脛俗人罵恃力人云癡如􅚦又張揖注上林賦曰􅚦飛䑕也其狀如兎而䑕首以其髯飛郭璞曰鼯䑕也毛紫赤色飛且乳一名飛生麡狼上才兮切異物志曰麡狼狀似鹿而角前向入林掛角故恒在平淺草中肉肥香美逐入林則得}
