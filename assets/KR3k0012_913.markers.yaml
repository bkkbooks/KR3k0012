  - {type: variant, offset: 4, length: 2, content: 四貍, WYG: 五雜獸驒騱騉蹄蒙頌贙魋蜼鼳豦驨㚟石豰猶􅭼竹㹠原天狗獜䝣􅼚鹿蜀類猼訑狸力土螻讙幽頞足訾那父天馬㔮胐朏文文開明窮竒猾褢彘羬羊囂長右谿邉􅙱犰狳渾沌檮杌㺊無損綢齧鐡飛骸獸破鏡猯狖􅚦麡狼兩頭獸獑猢黄要含利兹白露犬耳䑕壄羊猛氏飛遽射干蟃蜒蒲牢驒騱上音顛下音奚説文曰驒騱野馬屬史記曰匈奴畜則駃吉穴切騠下奚切驒騱騉蹄}
