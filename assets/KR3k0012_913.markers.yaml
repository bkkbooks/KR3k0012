  - {type: variant, offset: 2699, length: 0, content: '', WYG: 其尾飛壄羊上移者切張揖注上林賦曰壄羊麢羊也似羊而青猛氏孟康注上林賦曰瑕蛤猛氏皆獸名郭璞曰今蜀中有獸狀如熊而小毛淺有光澤名猛氏飛遽張揖注上林賦曰飛遽天上神獸鹿頭而龍身射干郭璞注子虛賦曰騰逺射干張揖注曰騰逺獸也射干似狐能縁木蟃蜒上音萬}
