  - {type: variant, offset: 2587, length: 0, content: '', WYG: 狀如鹿豕頭有牙鹿尾善依人求五榖名曰無損其肉可作鮓使􅀈一作瀋肥美而咋肉不壊吞之不入􅀈盡更添復以作鮓如初愈美名曰不盡鮓一作鮮綢神異經曰西方深山有}
  - {type: page-break, offset: 2587, content: '', id: KR3k0012_WYG_913-11a, image: WYG0901/WYG0901-0133c.png}
  - {type: variant, offset: 2588, length: 5, content: 多柴獺山邊, WYG: 焉靣目手足毛色如猴體大如驢善縁髙木皆雌無雄名曰綢須人三合而有子要路強牽男人將上絶冡之上取菓并竊五榖食更合三畢而定十月乃生齧鐡神異經曰南方有獸角足大小狀如}
  - {type: page-break, offset: 2588, content: '', id: KR3k0012_WYG_913-11b, image: WYG0901/WYG0901-0133d.png}
