  - {type: variant, offset: 2417, length: 153, content: 為祥代宗使中官示於朝宰臣率百僚皆賀崔祐甫獨否中官詰其故荅曰此之失常也可吊不可賀中官徵其狀祐甫立草之略曰禮云迎貓為其食田鼠也以能除害故列祀典今反乳之是謂失常且貓受人食養而棄職不修亦何異法吏不勤觸邪疆吏不勤捍敵是天將垂戒故不敢賀眾皆伏代宗嘉其正直獺禮記月令曰孟春之月獺祭魚然後虞人入澤梁說文曰獺如小狗水居食魚偏, WYG: 已癭胐朏}
