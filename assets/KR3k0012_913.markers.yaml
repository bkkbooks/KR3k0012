  - {type: variant, offset: 1745, length: 7, content: 挹婁國出好貂今, SBCK: 逢伯雲}
  - {type: variant, offset: 1745, length: 194, content: 挹婁國出好貂今所謂挹婁貂是也江表傳曰遼東太守遣使詣孫權送貂皮千枚欲舉國歸吳晉書曰趙王倫篡位至於奴卒廝役亦加以爵位每朝會貂蟬盈坐時為之喭曰貂不足狗尾續異苑曰貂出句麗國常有一物共居穴或見之身貂類人長三尺能制貂愛樂刀子其俗人欲得貂皮以刀插穴口此物夜出皮置刀邊須人持皮去乃取刀隋書曰北室韋其俗以捕貂為業南室韋亦多貂貀說文曰貀獸無前足漢津能捕豺貀購百錢爾雅曰貀無前足郭璞注曰晉太康七年石陵扶夷縣檻得, krp: 獑猢}
