  - {type: variant, offset: 2594, length: 1, content: 故, WYG: 牛皮毛黒如漆食鐵飲水其糞可為兵器其利如鋼名齧鐡飛骸獸洞冥記曰漢武帝時翕韓國獻飛骸獸狀如鹿青色以寒青之絲為繩繫之獸死帝愛而不埋掛之於苑門皮毛皆爛朽骨色猶青時人咸知其神更以䋲繫其足閉於重觀後數日徃觀見䋲之所繫處在頭餘皆飛去}
  - {type: variant, offset: 2596, length: 2, content: 柴獺, WYG: 野人於草間得其骨脊皆能飛起取還以獻帝乃以野人所獻骨脊及頭尾之骨舂為粉以蝙蝠和為丸以療百病其丸夜視之有光服之體有光明破鏡漢書郊祀志曰古者天子常以春解祠祠黄帝用破鏡孟康曰獸名食父黄帝欲絶其類使祠皆用之破鏡如􅓔而虎眼猯音湍}
