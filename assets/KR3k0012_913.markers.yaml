  - {type: variant, offset: 2629, length: 0, content: '', WYG: 頭常以一頭食一頭行山中時有見之者獑猢上音斬下音胡蜀地志曰獑猢獸似猴為獸竒捷常在樹上歘焉騰躍百歩五十歩若鳥黄要蜀地志曰黄要獸一名墠㣲一名䖍己鼬身狐首生子長}
