  - {type: variant, offset: 281, length: 0, content: '', SBCK: 兩耳而不聞有腹而無五藏有膓直而不旋食而徑過人有德行而往抵􅠅音觸之人有凶惡而往依慿之天使}
  - {type: variant, offset: 281, length: 0, content: '', krp: 兩耳而不聞有腹而無五藏有膓直而不旋食而徑過人有德行而往抵􅠅音觸之人有凶惡而往依慿之天使}
  - {type: variant, offset: 282, length: 0, content: '', SBCK: 然名曰渾沌一名無耳一名無心所居無常咋尾囬轉向天而􅀏檮杌東方朔神異經曰西方荒中有獸焉狀如虎而身大虎毛長尺張華注曰言此獸毛皆如豪猪毛也人面虎足口有猪牙尾長一丈八尺名曰檮杌此獸食音羔東方朔神異經曰北方有獸焉其狀如師子食虎食人吹人則病口中吹人名曰􅁪近人村里入人居室中百姓患苦天帝徙之北方荒中也無損神異經曰南方有獸其狀如鹿豕}
  - {type: page-break, offset: 282, content: '', id: KR3k0012_SBCK_913-7a}
  - {type: variant, offset: 282, length: 0, content: '', krp: 然名曰渾沌一名無耳一名無心所居無常咋尾囬轉向天而笑檮杌東方朔神異經曰西方荒中有獸焉狀如虎而身大虎毛長尺張華注曰言此獸毛皆如豪猪毛也人面虎足口有猪牙尾長一丈八尺名曰檮杌此獸食音羔東方朔神異經曰北方有獸焉其狀如師子食虎食人吹人則病口中吹人名曰恒近人村里入人居室中百姓患苦天帝徙之北方荒中也無損神異經曰南方有獸其狀如鹿豕}
  - {type: punctuation, offset: 283, content: ，, id: KR3k0012_CHANT_913-bkkpn108}
  - {type: 'tls:seg', offset: 283, content: '', id: KR3k0012_CHANT_913-5a.20}
  - {type: variant, offset: 283, length: 0, content: '', SBCK: 有牙鹿尾善依人求五􅂖名曰無損其肉可作鮮使瀋吕審也肥美而鮮肉懷吞不入瀋盡更添肉使復以作鮮如􅀄愈乆而乃美名曰不盡鮮綢神異經曰西方深山有獸鳥面目手足毛色如猴體大如驢善縁髙木皆雌無雄名曰綢湏人三合而有子要路強牽男人將上絶冡之上取菓并􅀼五􅂖食更合三畢而定十月乃生齧䥫神異經曰南方有獸角足大小狀如水牛其毛黒如􅃮食鐵而飲水其糞可爲兵器其利如鋼名齧鐵飛駭獸洞􅁳記曰漢武帝時翕韓國献飛骸獸狀如鹿青色以寒青之􅁝爲繩繫之獸死帝愛而不埋掛之於苑門皮毛皆爛朽唯骨色猶青時人咸知其神更以繩繫其足閉於重觀後數月往􅀚唯見繩之所繫處頭尾皆背皆飛去有野人於草間得其斥脊皆能飛}
  - {type: page-break, offset: 283, content: '', id: KR3k0012_SBCK_913-7b}
  - {type: variant, offset: 283, length: 0, content: '', krp: 有牙鹿尾善依人求五糓名曰無損其肉可作鮮使瀋吕審也肥美而鮮肉懷吞不入瀋盡更添肉使復以作鮮如𥘉愈乆而乃美名曰不盡鮮綢神異經曰西方深山有獸鳥面目手足毛色如猴體大如驢善縁髙木皆雌無雄名曰綢湏人三合而有子要路強牽男人將上絶冡之上取菓并竊五糓食更合三畢而定十月乃生齧䥫神異經曰南方有獸角足大小狀如水牛其毛黒如􅃮食鐵而飲水其糞可爲兵器其利如鋼名齧鐵飛駭獸洞冥記曰漢武帝時翕韓國献飛骸獸狀如鹿青色以寒青之絲爲繩繫之獸死帝愛而不埋掛之於苑門皮毛皆爛朽唯骨色猶青時人咸知其神更以繩繫其足閉於重觀後數月往觀唯見繩之所繫處頭尾皆背皆飛去有野人於草間得其斥脊皆能飛}
  - {type: variant, offset: 284, length: 0, content: '', SBCK: 取還以獻帝乃以野人所獻骨脊及頭尾之骨春爲粉以蝙蝠和爲丸以療百疾其丸夜視之有光服之體有光明破鏡漢書郊祀志曰古者天子常以春解祠黄帝用破鏡孟康曰獸名食父如黄要欲絶其􅀋使祠用之破鏡如貙}
  - {type: page-break, offset: 284, content: '', id: KR3k0012_SBCK_913-8a}
  - {type: variant, offset: 284, length: 0, content: '', krp: 取還以獻帝乃以野人所獻骨脊及頭尾之骨春爲粉以蝙蝠和爲丸以療百疾其丸夜視之有光服之體有光明破鏡漢書郊祀志曰古者天子常以春解祠黄帝用破鏡孟康曰獸名食父如黄要欲絶其類使祠用之破鏡如貙}
