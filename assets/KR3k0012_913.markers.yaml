  - {type: variant, offset: 13, length: 1, content: 至, SBCK: 救}
  - {type: variant, offset: 13, length: 1, content: 至, krp: 救切爾雅曰卬鼻而長尾郭璞注曰似弥候而大黄黑色長數尺鼻露上面雨則自懸於樹以尾塞鼻或以兩指也鼰古聞切爾雅曰鼰䑕身長鬚而賊秦人謂之小驢郭璞曰鼰而鼠而馬喙一歳千斤爲物殘賤也豦音渠爾雅曰豦迅頭郭璞注曰今建平山中有豦如狗似猕猴多髯能舉石橋人驨爾雅曰驨音㩦如馬而一角不角者騏也㚟刄略}
  - {type: punctuation, offset: 15, content: 。, id: KR3k0012_CHANT_913-bkkpn8}
  - {type: xml-element, offset: 15, content: '', id: KR3k0012_CHANT_913-bkkxmlele4}
