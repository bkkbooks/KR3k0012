  - {type: variant, offset: 2146, length: 0, content: '', WYG: 馬質虎文驤首吟鳴矯矯騰羣佩其皮毛子孫如雲類山海經曰亶爰之山有獸狀如狸而有髦其名曰類自為牝牡食者不妬猼訑上音博下音他山海經曰基山有獸其狀如牛九尾四耳目在背名曰猼訑佩之不畏山海經圖讃曰猼訑似羊眼乃在背視之則竒推之無怪欲不恐懼厥皮可佩狸力山海經曰柜山有獸状如豚有距其音如狗吠其名曰狸力}
