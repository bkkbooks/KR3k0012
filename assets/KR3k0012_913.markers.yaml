  - {type: variant, offset: 252, length: 1664, content: 哉鼓琴身已成矣而曾未得其首也曾子曰吾晝臥見一貍見其身而不見其頭起而為之弦因曰殘形操淮南子曰貍頭似鼠以類推也許慎曰狸食鼠又曰狸頭止癙癙寒熱病也鷄頭止瘻抱朴子曰虎尾不負狸身象牙不出鼠穴本草曰狸肉甘無毒主風濕鬼毒氣皮中如針㓨歸藏曰昔者桀筮伐唐而枚占熒惑曰不吉彼為貍我為鼠勿用作事恐傷其父者也風俗通曰汝陽西門習武亭有鬼魅宿者輒死其厭者皆亡髮北部督郵西平郅伯夷到亭上樓宿誦六甲孝經易本記臥密拔劍解帶夜有正異者四五尺來覆伯夷以劍帶擊魅腳呼下燈照見一老狸正赤略無毛衣持下燒殺明旦發樓屋得所亡髮人百餘因此遂絕神仙傳曰欒巴為豫章太守先是廬山廟中有人言語飲酒投桮音杯能使宮亭湖中分風行者舉帆相逢巴未到十數日廟中神不復作聲不知所在巴到自上表說廟鬼詐稱天官欺損百姓積愆日夕罪當窮治乞以事付功曹臣身行捕逐如不治討恐其復遊行天下所在血食枉病良民責以重禱乃至所在推求山川社稷問鬼蹤跡此鬼乃到齊國為書生齊太守見之既有容美麗又有才辯學識論經說義時在齊人莫不見知太守亦不知是鬼乃以女妻之生一男巴到與太守相見語畢問曰聞卿有一女婿明五經諸子可得相見不太守請女婿詐病辭不出而巴求之不止婿告其婦言吾今日出必死如何女亦怪之不知何以巴知不敢出乃求奏板一枚并筆書符付太守曰以此與賢女婿自當出也女婿得符流涕與婦辤訣而出望見巴即身體已變為狸而面故是人也巴厲聲呵言死狸敢爾何不正汝真形即盡為狸巴復曰斬之亦不斬者而狸頭已斷於地又言取狸子來須臾太守女所生兒已復為狸子即又斬之巴辭還郡搜神記曰博陵劉伯祖為河東太守所止承塵上有神能語常呼伯祖與語及京師詔書告下消息輒預告伯祖伯祖問其所食啖欲得羊肝買羊肝於前切之臠隨刀不見盡兩羊肝有一老狸眇眇在案前持刀者欲舉刀斫之伯祖呼止自與著承塵上須臾大笑曰向者啖肝醉忽失形與府君相見大慚愧後伯祖當為司隸神復先語伯祖云某月某日詔書當到至期如言及入司隸府神隨逐在承塵上輒言省內事伯祖大恐怖語神曰今職在剌舉君左右貴人聞神在此因以相害神荅曰誠如府君所慮當相捨去遂即無聲幽明錄曰吳興戴眇家僮客姓王有少婦美色而眇中弟恒往就之客私懷忿怒具以白眇中郎作此甚為無理願尊勑語眇以問弟弟大罵曰何緣有此必是妖鬼勑令打殺客初猶不敢後來閉戶欲縛便變成大狸從窗中出又曰董仲舒常下帷獨詠有客來詣語遂移日舒知其非常客又云欲雨仲舒因此戲之曰巢居知風穴居知雨卿非狐狸則是鼷鼠客聞此言色動形壞化成老狐狸也隋王度古鏡記曰大業七年五月余自御史告歸河東適遇侯生卒而得一鏡六月余歸長安宿於主人程雄家新授寄一婢頗稱端麗各曰鸚鵡余整冠履引鏡自照鸚鵡遙見便叩頭流血云不敢住余召雄問其故雄曰兩日前有一客攜婢從東來來時病困因留寄於此不知婢之由也余疑其精魅以鏡逼之遂自陳云本是華山廟前長松下千歲老狸久行變惑罪當至死近為府君捕逐逃潛河渭之間為下邽陳思恭義女思恭妻鄭氏見養恩厚嫁鸚鵡與鄉人柴華意不相愜逃而去東至韓城遂為行人李無慠所執無傲麤人也遂劫鸚鵡遊行至此不意天鏡一照自隱無路然為人已久羞復故形願樂飲而忘形因匣鏡置酒悉召雄家鄰里與共飲宴此婢大醉起舞歌曰寶鏡寶鏡哀哉余命自我離形于今幾姓生雖可樂死不必傷何為眷戀守此一方歌畢化為狸而死述異記曰陳留董逸少時鄰女梁瑩年稚色豔逸愛慕傾魂貽椒獻寶瑩亦納而未獲果後逸鄰人鄭充在逸許宿二更中門前有叩掌聲充臥望之亦識瑩語逸梁瑩今來逸驚躍出迎把臂入舍逸與瑩寢瑩仍求去逸攬持不置申款達旦逸欲留之云為汝烝㹠作食竟去逸起閉戶絕帳瑩因變形為狸從梁上走去金樓子曰貍不可使棲處牛不可使捕鼠貂說文曰貂鼠屬也大而黃黑色出丁零國廣志曰貂出夫餘關山圖曰霍山南岳其獸多赤貂東觀漢記曰建武二十五年烏桓詣闕朝賀獻貂皮魏書曰鮮卑有貂豽女滑切鼲音魂子皮毛柔蠕故天下以為名裘魏志曰挹婁國出好貂今所謂挹婁貂是也江表傳曰遼東太守遣使詣孫權送貂皮千枚欲舉國歸吳晉書曰趙王倫篡位至於奴卒廝役亦加以爵位每朝會貂蟬盈坐時為之喭曰貂不足狗尾續異苑曰貂出句麗國常有一物共居穴或見之身貂類人長三尺能制貂愛樂刀子其俗人欲得貂皮以刀插穴口此物夜出皮置刀邊須人持皮去乃取刀隋書曰北室韋其俗以捕貂為業南室韋亦多貂貀說文曰貀獸無前足漢津能捕豺貀購百錢, WYG: 陞甗蒙頌}
