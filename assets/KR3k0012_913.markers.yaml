  - {type: variant, offset: 2764, length: 306, content: 神仙傳曰樊夫人者劉綱之妻也俱行道術各自言勝綱於是唾槃中水即作鯉魚夫人乃唾槃中使成獺而食魚綱每共試術事事不如永嘉地記曰濤山至高常有拾橡者見上有大湖又有自然石橋多獺異色鳥獸蝟孝經援神契曰蝟多剌故不使超踰抑揚爾雅曰蝟毛剌淮南子曰鵲屎中蝟爛而漆見蟹不糝淮南萬畢術曰蝟膏塗鐵柔不折華陽國志曰滇池縣有白蝟山無石而多蝟也北齊書曰成帝夢大蝟攻破鄴城故索境內以蝟膏絕之至後主名緯亡齊之徵廣五行記曰梁末蜀人費祕刈麥值暴風雨隱於巖石間避雨去家數里遙見前路有數婦人皆著紅紫襴古莧切衣歌吟而來祕竊怪野外何因有此心異之漸近寂然無聲去秘數步乃各住立少時悉轉向祕看之其面並無七孔唯垂鳥毛而已祕驚怖仆地至二更祕兒怪父不至把火尋覔見秘臥在道傍左側有, WYG: 太平御覽卷九百}
