  - {type: variant, offset: 2365, length: 306, content: 千生願得一日為貓阿武為鼠吾扼其喉以報今日即足矣武后聞之不說自是約六宮不許畜貓又曰朱泚軍中有貓乳鼠者泚獻之為祥代宗使中官示於朝宰臣率百僚皆賀崔祐甫獨否中官詰其故荅曰此之失常也可吊不可賀中官徵其狀祐甫立草之略曰禮云迎貓為其食田鼠也以能除害故列祀典今反乳之是謂失常且貓受人食養而棄職不修亦何異法吏不勤觸邪疆吏不勤捍敵是天將垂戒故不敢賀眾皆伏代宗嘉其正直獺禮記月令曰孟春之月獺祭魚然後虞人入澤梁說文曰獺如小狗水居食魚偏音編獺屬也遁甲開山圖曰霍山光南岳其獸多柴獺山邊水故有柴獺淮南子曰愛獺而飲之酒欲養之非其道言獺飲酒而敗風土記曰陽羨縣前有大橋下有白獺將有兵動獺出穴口向嗥也魏略曰南蠻皆用獺皮為其冠鹽鐵論曰水有猵音頻獺而池魚, SBCK: 㝷蒲}
