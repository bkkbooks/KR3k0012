  - {type: variant, offset: 297, length: 1, content: 貍, SBCK: 猯知曲穴亦鳥獸之智狖􅀃文曰䑕狖屬善旋吴録地里志曰建安陽縣多狖似猿而露鼻􅀨則以尾反塞鼻孔郡内及臨海皆有之􅚦力水力爲二切異物志曰􅚦之屬捷勇於猨豽面及鼻徴倒向上尾端分爲兩條天􅀨便以挿鼻孔中水不入性畏人見人則顚倒投擲或墮地奔走無所廽避觸樹衝石或至破}
  - {type: variant, offset: 297, length: 44, content: 貍頭似鼠以類推也許慎曰狸食鼠又曰狸頭止癙癙寒熱病也鷄頭止瘻抱朴子曰虎尾不負狸身象牙不出鼠, krp: 猯知曲}
  - {type: variant, offset: 299, length: 0, content: '', SBCK: 折脛俗人罵恃力人云癡如􅚦又張揖注上林賦曰飛􅚦飛䑕也其狀如􅇠而䑕首以其髯飛郭璞曰鼯䑕也毛紫赤色一名飛生麡狼上才􅀆切異物志曰麡狼􅃺}
