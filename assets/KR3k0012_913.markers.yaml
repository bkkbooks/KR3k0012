  - {type: 'tls:seg', offset: 15, content: '', id: KR3k0012_CHANT_913-1a.7}
  - {type: punctuation, offset: 15, content: 《, id: KR3k0012_CHANT_913-bkkpn9}
  - {type: variant, offset: 15, length: 1, content: 說, SBCK: 爾雅曰卬鼻而長尾郭璞注曰似弥候而大黄黑色長數尺鼻露上面􅀨則自懸於樹以尾塞鼻或以兩指也鼰古聞切爾雅曰鼰䑕身長􅂡而賊􅁗人謂之小驢郭璞曰鼰而鼠而馬喙一歳千斤爲物殘賤也豦音渠爾雅曰豦迅頭郭璞注曰今建平山中有豦如狗似猕猴多髯能舉石橋人驨爾雅曰驨音㩦如馬而一角不角者騏也㚟刄略切􅀃}
  - {type: page-break, offset: 15, content: '', id: KR3k0012_SBCK_913-2b}
  - {type: variant, offset: 15, length: 236, content: 說文曰狸伏獸也禮曰狸首之班然又曰狸去正脊魏志曰清河令徐季龍使人獵令管輅筮其所得輅曰當獲小獸雖有爪牙微而不疆雖有文章蔚而不相非虎非雉其名曰狸獵人暮歸果如輅言晉書曰樂廣為河南尹先是河南官舍多妖怪前尹皆不敢處正寢廣居之不疑嘗外戶自閉左右皆驚廣獨曰顧見牆有孔使人掘牆得貍而殺之其怪亦絕唐書曰武弘度士彠兄子也父卒廬于墓側晨夕哀號有野貍每至弘度齋時必來求食往來馴狎無驚懼時以為孝感玄中記曰鈆錫之精為狐狸子思子曰謂狐為狸者非直不知貍也忽得狐復失貍者也琴操曰曾子鼓琴墨子立外而聽之曲終入曰, WYG: 枝蹄趼}
  - {type: substitution, offset: 15, original: 說, replacement: 説, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-19811}}
  - {type: punctuation, offset: 17, content: 》, id: KR3k0012_CHANT_913-bkkpn10}
  - {type: punctuation, offset: 18, content: ：, id: KR3k0012_CHANT_913-bkkpn11}
  - {type: 'tls:seg', offset: 18, content: '', id: KR3k0012_CHANT_913-1a.8}
  - {type: punctuation, offset: 18, content: 「, id: KR3k0012_CHANT_913-bkkpn12}
  - {type: variant, offset: 18, length: 0, content: '', SBCK: 㚟獸似􅇠青色而大頭與􅇠同足與鹿同山海經曰湪光之山獸名㚟郭璞曰㚟似􅇠而鹿脚青色也石􅂖􅀃文曰􅂖大木切􅀋犬􅆎以上黄􅆎以下黒食母猴或曰􅂖似䍧羊風土記曰石􅂖似狢而形短常捕敢猴猨司馬相如上林賦曰獑音䜛猢榖音厄猶余救切􅀃文曰猶玃屬一曰隴西謂犬子爲猶爾雅曰猶如麂善登木㹠魯連子曰北方有獸名爲㹠生而角當心俯厲其角潰心而竹㹠徐哀南方記曰竹㹠野生長一尺三寸在土穴中常食竹根味如鴨肉原山海經曰翠望之山亦作王翠山有獸􅃺如}
  - {type: page-break, offset: 18, content: '', id: KR3k0012_SBCK_913-3a}
  - {type: page-break, offset: 18, content: '', id: KR3k0012_SBCK_913-3b}
  - {type: variant, offset: 18, length: 0, content: '', krp: 㚟獸似兔青色而大頭與兔同足與鹿同山海經曰湪光之山獸名㚟郭璞曰㚟似兔而鹿脚青色也石糓說文曰糓大木切類犬腰以上黄腰以下黒食母猴或曰糓似䍧羊風土記曰石糓似狢而形短常捕敢猴猨司馬相如上林賦曰獑音䜛猢榖音厄猶余救切說文曰猶玃屬一曰隴西謂犬子爲猶爾雅曰猶如麂善登木㹠魯連子曰北方有獸名爲㹠生而角當心俯厲其角潰心而竹㹠徐哀南方記曰竹㹠野生長一尺三寸在土穴中常食竹根味如鴨肉原山海經曰翠望之山亦作王翠山有獸狀如}
  - {type: punctuation, offset: 19, content: ，, id: KR3k0012_CHANT_913-bkkpn13}
  - {type: 'tls:seg', offset: 19, content: '', id: KR3k0012_CHANT_913-1a.9}
  - {type: variant, offset: 19, length: 1, content: 伏, SBCK: 一目二尾名曰原音音奪衆聲言能作百種聲可以禦凶也天狗山海經曰隂山濁谷之水出焉有狩􅃺如狸或作狗白首名曰天狗可以禦凶獜音鄰山海經日依軲之山有狩焉狀如虎有􅀲甲名曰獜言體有鮮甲也食之不畏風䝣獀上音渠下音獀山海經曰䝣獀}
