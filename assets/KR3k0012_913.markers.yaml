  - {type: variant, offset: 1919, length: 4, content: 貀無前足, WYG: 䝉頌猱狀郭璞曰即䝉貴也似蜼而小紫黑色可畜捕䑕勝猫九真日南皆出之贙爾雅曰贙乎犬切有力郭璞曰西海大秦國有養者似狗多力獷惡魋爾雅曰魋如小熊竊毛而黄蜼勅余切爾雅曰蜼卬鼻而長尾郭璞曰似獮猴而大黄黑色尾數尺鼻露向上雨則自懸於樹以尾塞鼻或以兩指也鼳古没切爾雅曰鼳䑕身長須而賊秦人謂之小驢郭璞曰鼳似鼠而馬蹄一嵗千斤為物殘賊豦音據爾雅曰豦􅌺頭}
