  - {type: variant, offset: 9, length: 3, content: 狸子𧳙, SBCK: 昆蹄研善升甗孫炎曰昆蹄之馬蹄平如研而善升山甗者郭璞日􅁗時有昆蹄死昆駼大胡切枝蹄研善升甗蒙頌爾雅曰蒙頌猱狀郭璞注曰即蒙貴也似雖而小紫黑色可畜捕䑕勝猫九真曰南出之猱猕猴之屬也贙爾雅曰贙乎大切有大力郭璞注曰出西海天秦國有飬之似山狗多力獷惡也魋爾雅曰魋如小熊􅀼毛而黄蜼}
  - {type: variant, offset: 9, length: 5, content: 狸子𧳙余至, WYG: 騉蹄趼善陞甗孫炎曰蹄似馬蹄平如研而善升山甗者郭璞曰秦時有騉蹄苑騉駼大胡}
  - {type: page-break, offset: 9, content: '', id: KR3k0012_WYG_913-2b, image: WYG0901/WYG0901-0129b.png}
  - {type: variant, offset: 9, length: 3, content: 狸子𧳙, krp: 昆蹄研善升甗孫炎曰昆蹄之馬蹄平如研而善升山甗者郭璞日秦時有昆蹄死昆駼大胡切枝蹄研善升甗蒙頌爾雅曰蒙頌猱狀郭璞注曰即蒙貴也似雖而小紫黑色可畜捕䑕勝猫九真曰南出之猱猕猴之屬也贙爾雅曰贙乎大切有大力郭璞注曰出西海天秦國有飬之似山狗多力獷惡也魋爾雅曰魋如小熊竊毛而黄蜼}
