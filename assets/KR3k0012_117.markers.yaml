  - {type: variant, offset: 330, length: 623, content: 郊廟禮畢御丹鳳門大赦改元二年春正月己丑宰相崔彥昭率文武百官上尊號上御正殿受冊四月海賊王郢攻剽浙西郡邑五月濮州賊首王仙芝聚徒於長垣縣其眾三千進陷濮州俘丁壯萬人鄆州節度使牛穜出兵擊之為賊所敗二年七月王仙芝寇掠河南十五州其眾數萬是月賊逼頴許攻攜曲下之四年三月冤朐賊黃巢聚數萬人攻鄆州陷之七月黃巢自沂海其徒數萬趍潁蔡入查牙山遂與王仙芝合七月賊陷隋州五年二月王仙芝餘黨攻江西招討使宋威出軍屢敗之仍宣詔書招諭仙芝仙芝致書於威求節鉞威偽許之仙芝令其大將尚君長蔡溫玉奉表入朝威乃斬君長溫玉以徇仙芝怒急攻洪州陷其郛宋威赴援與賊戰大敗之殺仙芝傳首京師廣明元年春正月乙卯朔上御宣政殿改元二月黃巢自衡永州下嶺陷湖南江西屬郡三月黃巢尚讓東下攻鄂州陷江南饒信等十五州七月渡江寇淮南十月乃悉眾渡淮巢自號率土大將軍其眾富足自淮已北整眾而行不剽財貨唯驅丁壯為兵十一月陷東都留守劉允章率分司官屬迎謁之賊供頓而去坊市晏然壬申陷虢州丙子犯潼關守關諸將望風自潰十二月辛巳賊據潼關時左軍中尉田令孜專政宰相盧雋曲事之相與誤謀以至傾敗令孜恐眾罪加已請貶攜官命學士王徽裴徹為相甲申宣制以戶部侍郎翰林學士王徽裴徹同平章事貶右僕射門下侍郎平章事盧攜為太子賓客攜聞賊至仰藥而死是日上與諸王妃后數百騎自子城由含光殿金光門出幸山南文武百寮不之知並無從行者京城晏然是日晡晚賊入京城時右驍衛大將軍張直方率武官十餘迎黃巢於坡頭壬辰黃巢據大內僣號大齊稱年號金統悉陳文物據丹鳳門偽赦中和元年春正月車駕在興元六月車駕幸, WYG: ''}
