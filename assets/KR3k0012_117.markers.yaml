  - {type: variant, offset: 5545, length: 1, content: 謚, SBCK: 是歳魏黄􅀄四年也景耀六年夏魏大興徒衆命征西將軍鄧艾數道並攻用光禄大夫譙周䇿奉書於艾後主輿襯自􅅞詣壘門艾解􅅞焚櫬延請相見因承制拜後主爲驃􅀐將軍諸圍守悉􅀍後主􅃙然後降下艾使後主止其故宫身往造焉後主乃舉家東遷在位凢四十年旣至洛陽䇿命爲安樂縣公食邑萬户賜絹萬疋奴婢百人後司馬文王與後主宴爲之作樂故蜀妓傍人皆爲感愴而後主喜􅀏自􅀂王謂賈充}
  - {type: variant, offset: 5545, length: 1, content: 謚, WYG: 是嵗魏黄初四年也景耀六年夏魏大興徒衆命征西將軍鄧艾數道並攻用光禄大夫譙周䇿奉書於艾後主輿櫬自縳詣壘門艾解縳焚櫬延請相見因奉制拜後主為驃騎將軍諸圍守悉被後主勅然後降下艾使後主止其故宫身往造焉後主乃舉家東遷在位凡四十年既至洛陽冊命為安樂縣公食邑萬户賜絹萬疋奴婢百人後司馬文王與後主宴為之作故蜀技樂旁人皆為感愴而後主喜笑自若王謂賈充}
