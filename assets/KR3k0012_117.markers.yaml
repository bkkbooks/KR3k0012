  - {type: variant, offset: 5555, length: 7, content: 濟陰縣之定陶鄉, SBCK: 洛陽魏略曰始備在小沛不意曹公卒至迫遽棄家属奔荆州禪時年數歳匿竄隨人西入漢中爲人所賣及建安十六年􅀜中破亂扶風人劉括避亂入漢中買得禪問知其良家子遂養爲子與娶婦生一子始禪與父相失時識其父字玄德比舎人有姓簡者及備得益州而簡爲將軍備遣簡到漢中舎都邸禪乃詣簡簡相驗訊事皆符驗簡喜以語張魯魯乃洗沐送詣益州備乃立爲太子始備以諸􅁑亮爲太子太傅及禪位以亮爲丞相委以諸爲請亮曰政由葛氏祭則寡人亮亦以禪未閑於政遂揔内外太平御覽卷第一百一十七}
  - {type: variant, offset: 5555, length: 3, content: 濟陰縣, WYG: 洛陽魏畧曰蜀主在小沛不意曹公卒至迫遽棄家屬奔荆州後主時年數嵗匿竄隨人西入漢中為人所賣及建安十六年關中破亂扶風人劉括避亂入漢中買得}
