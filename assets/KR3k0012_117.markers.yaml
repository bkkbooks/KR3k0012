  - {type: variant, offset: 955, length: 4586, content: 府西川節度使陳敬瑄自來迎奉之乙卯車駕至西蜀丁巳御成都府改廣明二年為中和元年大赦天下二年春正月天下勤王之師雲會京畿京師食盡賊食樹皮以金玉買人於行營之師人獲數百萬山谷避亂百姓多為諸軍之所執賣八月庚子賊同州防禦使朱溫殺其監軍嚴實與大將胡真謝曈等來降王鐸承制拜溫華州刺史三年四月庚子沙陁忠武義成義武等軍趍長安賊悉眾拒之於渭橋大敗而還李克用乘勝追之己卯黃巢收其殘眾由藍田關而遁庚辰收京城天下行營兵馬都監楊復光上章告捷行在四年七月癸酉賊將林言斬黃巢黃揆黃秉三人首級降時溥初徐將李師悅與賊戰于瑕丘賊殊死戰其眾殆盡林言與巢走至太山狼虎谷之襄王村懼追至併命乃斬賊降師悅壬午捷書至行在十二月丁亥朔大明宮留守王徽與留司百官上表請車駕還宮詔以來年正月還京光啟元年春正月車駕在成都府己卯還京三月丁卯車駕至京師御宣政殿大赦改元時李昌符據鳳翔王重榮據蒲陜諸葛爽據河陽洛陽孟方立據邢洺李克用據太原上黨朱全忠據汴滑秦宗權據許蔡時溥據徐泗朱瑄據鄆齊曹濮王敬武據淄青高駢據淮南八州秦彥據宣歙劉漢宏據浙東皆自擅兵賦迭相吞噬朝廷不能制江淮轉運路絕兩河江淮賦不上供但歲時獻奉而已國命所能制者河西山南劍南嶺南西道數十州大約郡將自擅常賦殆絕藩侯廢置不自朝廷王業於是蕩然五月宰臣蕭遘率文武百寮上徽號曰至德光烈孝皇帝御宣政殿受冊大赦十二月乙亥沙陁逼京師田令孜奉僖宗出幸鳳翔初黃巢據京師九衢三內宮室宛然及諸道兵破賊爭貨相攻縱火焚剽宮室居市里十焚六七賊平之後令京兆尹王徽經年補葺僅獲安堵至是亂兵復焚宮闕蕭條鞠為茂草矣二年春正月車駕在鳳翔李克用旋師河中與朱玫王重榮同上表請駕駐蹕鳳翔仍數田令孜之罪乃以飛龍使楊復恭知內樞密事戊子田令孜迫乘輿請幸興元庚寅車駕次寶雞授刑部尚書孔緯兼御史大夫令率從官赴行在時車駕夜出宰相蕭遘裴徹鄭昌圖及文武百寮不之知扈從不及故令孔緯從之蕭遘惡令孜弄權再亂京國因邠州奏事判官李松年至鳳翔乃令亟召朱玫迎奉癸己朱玫別領步騎五千至鳳翔令孜聞邠州軍至奉帝入大散關令禁軍守靈壁玫至禁軍潰散遂長驅追駕至遵途驛嗣襄王熅疾為玫所得時興元節度使石君涉聞車駕入關乃毀徹棧道柵絕險要車駕由他道僅達為邠州軍踵後崎嶇危殆者數四四月壬子朱玫李昌言迫宰相蕭遘等於鳳翔驛舍請嗣襄王熅權監軍國事玫自為大丞相兼左右神策十軍軍容使遂驅率文武百寮奉襄王還京師五月庚辰襄王僣即皇帝位年號建貞十二月朱玫將王行瑜受密詔自鳳州率眾還長安辛酉行瑜斬朱玫及其黨與數百人縱兵大掠是冬苦寒九衢積雪兵入之夜寒冽尤劇民吏剽剝之後僵凍而死者蔽地百官奉襄王奔河中王重榮紿稱迎奉執李熅斬之文德元年春正月車駕在鳳翔蔡賊孫儒斬秦彥華師鐸于高郵二月壬午車駕至京師戊子御承天門大赦改元宰臣韋昭度率文武百寮上徽號曰聖文睿德光武弘孝皇帝三月戊戍朔御正殿受冊庚子上暴不康壬寅大漸癸卯立親第壽王傑為皇太弟勾當軍國事是夕崩於武德殿壽二十七謚曰惠聖恭定孝皇帝廟號僖宗葬靖陵黃巢唐書曰黃巢曹州冤句人本以販鹽為事乾符中仍歲凶荒人饑為盜河南尤甚初里人王仙芝尚君長聚盜起於濮陽攻剽城邑陷曹濮及鄆州詔左金吾衛上將軍齊克讓為兗州節度使以本軍討仙芝仙芝懼引眾歷陳許襄鄧無少長皆虜之眾號三十萬三年七月陷江陵十月又遣將徐唐莒陷洪州時仙芝表請符不允以神策統軍使宋威為荊南節度招討使中使楊復光為監軍復光遣判官吳彥宏諭以朝旨釋罪別加官爵仙芝乃令尚君長詣闕請罪且求恩命時宋威害復光之功擒送闕斬之賊怒悉銳擊官軍威軍大敗復光收其餘眾以統之朝廷以王鐸代為招討五年八月收復荊州斬仙芝首獻於闕下先是君長弟讓以兄奉使見誅率部眾入查牙山黃巢揆昆仲八人率盜數千依讓月餘眾至數萬陷汝州大掠關東官軍加討屢為所敗其眾十餘萬尚讓乃與群盜推巢為王曰衝天大將軍署官屬藩鎮不能制時天下承平日久人不知兵僖宗以幼主臨朝號令出於臣下巢馳檄四方章奏論列皆指目朝政之弊巢徒黨既盛與仙芝為影援及仙芝敗東攻亳州不下乃襲破沂州虜之仙芝餘黨悉附焉時王鐸緩于攻取高駢鎮淮南表請詔討賊許之巢乃渡淮偽降于駢駢遣將張璘率兵受降于天長鎮巢擒璘殺之因虜其眾尋南陷湖湘遂據交廣託越州觀察使崔璆奏乞天平軍節度朝議不允又自表乞安南都護廣州節度亦不允是歲自春及夏其眾大疫死者十三四眾勸請北歸以圖大利廣明元年北踰五嶺犯湖湘江浙進逼廣陵高駢閉門自固所過鎮戍望風降賊九月渡淮十一月陷洛陽繼攻陜虢逼潼關陷華州留將喬鈐守之朝廷以田令孜率神策博野等軍十萬守潼關關之左有谷可通行人平時禁人出入謂之禁谷及賊至官軍但守潼關不坊禁谷尚讓林言率前鋒由禁谷而入夾攻潼關官軍大潰博野都徑還京師燔掠西市十二月三日僖宗夜自開遠門出趍駱谷四日賊至昭應五日陷京師時巢眾累年為盜行伍不勝其富遇窮民於路爭行施遺既入青門坊市聚觀尚讓慰曉市人曰黃王為生靈不似李家不惜汝輩但各安家業賊眾競投物遺人十三日巢僣位國號大齊仍御樓宣赦且陳符命曰唐帝知朕起義改元廣明以文字言之唐已無天分矣唐去丑口而安黃天意令黃在唐下乃黃家日月也土生金予以金王宜改年為金統中和元年二月尚讓寇鳳翔鄭畋出師禦之大敗賊於龍尾坡畋乃馳檄告諭天下藩鎮四月涇原行軍唐弘夫之師屯渭北河中王重榮之師屯沙苑易定王處存之師屯渭橋鄜延托跋思恭之師屯武功鳳翔鄭畋之師屯盩屋六月邠寧朱玫之師屯興平忠武之師三千屯武功是歲諸侯勤王之師四面俱會十二月宰臣王鐸率荊襄之師自行在至鄭畋帳下小校竇玫者驍敢無敵每夜率敢死之士百人直入京師放火燔諸門斬級而還賊人悚駭二年王處存合忠武之師敗賊將尚讓乘勝收京師賊遁去處存不為備是夜復為賊寇襲官軍不利九月賊將同州刺史朱溫降王重榮十一月李克用率代北之師自夏陽渡河屯沙苑三年正月敗黃揆於沙苑進營乾坑二月尚讓率眾十萬援華州克用合河中易定忠武之師戰於梁田坡大敗賊軍俘斬數萬乘勝攻華州塹柵以環之黃揆棄華州官軍收城四月八日克用合忠武騎將龐從遇賊於渭南決戰三捷大敗賊軍十日夜巢黨散走詰旦克用收京師巢賊出藍田七盤路東走關東五月巢賊先鋒將孟揩攻蔡州節度使秦宗權稱臣於賊遂攻陳許營於䫜濦水陳州刺史趙犨逆戰敗賊前鋒生擒孟揩斬之巢乃悉眾攻陳州營於是自唐鄧許汝孟洛鄭汴曹濮徐兗數十州畢罹其毒賊圍陳郡三百日關東仍歲無耕稼人餓倚牆壁間賊俘人而食趙犨求援於太原四年二月李克用率山西諸軍由蒲陜濟河會關東諸侯赴援陳州三月諸侯之師復集四月官軍敗賊於太康俘斬萬計收其四壁又敗賊將黃鄴於西華收其壁巢賊大恐收軍營於故陽里官軍進攻之五月大雨震電平地水深三尺壞賊壘賊自離散復聚於尉氏逼中牟翌日營汴水北是夜復大雨震雷溝塍漲溢賊分寇汴州李克用自鄭州引軍襲擊大敗之殘眾保胙縣冤句官軍追討賊無所保其將李讜張歸霸等各率部下降于大梁尚讓率部下萬人歸時溥賊自相猜間相殺於營中所殘者千人中夜遁去克用追擊至濟陰而旋賊散於兗鄆界黃巢入泰山徐帥時溥遣將張友與尚讓之眾掩捕之至狼虎谷巢將林言斬巢及二弟鄴揆等七人首并其妻子函送徐州昭宗景文皇帝唐書曰昭宗景文皇帝諱曄懿宗第七子母曰惠安太后王氏以咸通八年三月生於東內十三年封壽王名桀乾符四年授開府儀同三司幽州大都督幽州盧龍等軍節度使帝於僖宗母弟也尤相親睦自艱難播越嘗隨侍左右文德元年二月僖宗暴不豫初復宮闈人心傾矚遽聞被疾軍民駭愕及大漸之夕未知所立軍容楊復恭請以壽王監國遺詔立為皇太弟柩前即帝位時年二十二以司空韋昭度攝冢宰己丑見群臣始聽政帝攻書好文尤重儒術神氣雄後有會昌之遺風以先朝威武不振國命䆮微而尊禮大臣詳延道術意在恢張舊業號令天下即位之始中外稱之四月庚午追謚聖母惠安太后曰恭獻龍紀元年春正月上御武德殿受朝賀大赦改元文武臣寮進秩頒爵有羗五月漢州刺史王建陷成都府遷陳敬瑄于雅州建自稱西川兵馬留後用田令孜為監軍十一月己辛朔將有事於圓丘改名曰曄辛亥上宿齋於武德殿甲寅圓丘禮畢御承天門大赦大順元年春正月御武德殿受朝賀宰臣百寮上徽號曰聖文睿德光武弘孝皇帝禮畢大赦改元乾寧元年春正月上御武德殿受朝賀大赦改元二年五月甲子李茂貞王行瑜韓建等各率精甲數千人入覲京師大駭人皆亡竄吏不能止帝御安福門以俟之三帥既至拜舞樓下帝臨軒喻之曰卿等藩侯宜存臣節稱兵入朝不由奏請意在何也茂貞行瑜汗流洽背不能對唯韓建陳敘入覲之日上並召昇樓賜巵酒宴於同文殿茂貞行瑜極言南北司相傾深蠹時政請誅其太甚者乃貶宰相韋昭度李磎尋殺之殺曰官數人而去王行瑜留弟行約茂貞留假子閻圭各以兵二千人宿衛時三帥同謀廢帝立吉王聞太原起軍乃止留兵宿衛而還七月李克用舉軍渡河以討王行瑜李茂貞韓建等庚申同州節度使王行實棄郡入京師謂兩軍中尉駱全瓘劉景宣曰沙陁十萬至矣請奉車駕幸邠州且有城守時景宣對鳳翔癸亥夜閻圭與劉景宣子繼晟同州王行實縱火剽東市脅上出幸上聞亂登承天門遣諸王率禁兵禦之捧日都頭李筠率本軍侍衛樓前閻以鳳翔之卒攻李筠矢及御座之樓扉上懼下樓與親王公主內人數百幸永興坊李筠軍扈蹕都頭李君實以兵繼至乃與筠兩都兵士侍衛出啟夏門憩於華嚴寺以俟內人繼至其日晚幸莎城鎮京師士庶從幸者數十萬比至南山谷口暍死三之一至暮為盜寇掠慟哭之聲殷動山谷信宿宰相徐彥若王搏崔胤三人至乃移幸石門鎮之佛宮乃令知樞密劉光裕薛王知柔歸京師制置令禁軍以備宮禁丙寅李克用遣牙將閻諤奉表奔問奉屯軍河中候進止發赴邠州丁卯上遣內官張承業傳詔克用軍便令監太原行營兵馬發赴新平又令內官郄廷立傳詔涇州令張鐇起涇原之師會克用軍上在南山半月餘克用仍在河中未至渭北上懼鳳翔兵士劫遷乃令延王將御服鞍馬玉器等至河中宣諭八月李克用遣子存貞奉表行在請車駕還宮辛亥車駕還宮三年六月鳳翔軍犯京畿覃王拒之於婁館接戰不利秋七月岐軍逼京師諸王率禁兵奉車駕將幸太原癸巳次渭北華州韓建遣子允奉表起居請駐蹕華州乙未次下邽丙申駐蹕華州時歧軍犯京師宮室鄽閈鞠為灰燼光化元年八月車駕自華還京御端門大赦改元二年十一月左右軍中尉劉季述王仲先廢帝幽於東內問安宮請皇太子裕監國是日迎皇太子裕監國矯宣昭宗命稱上皇甲午宣上皇制太子登皇帝位十二月癸未夜護駕孫昭德周承誨等以兵攻劉季述王仲先攜其首詣東宮門呼曰逆賊王仲先已斬首訖請陛下出宮慰諭兵士宮人破鑰帝與后方得出天復元年正月昭宗反正登長樂門樓受朝賀四月甲戌有事於宗廟是日御長樂門大赦改元十月戊戍朱全忠引四鎮之師七萬赴河中京師聞之大恐民皆亡竄山谷十一月中尉韓全誨與鳳翔護駕都將李繼徽奉車駕出幸鳳翔三年正月車駕出鳳翔幸全忠軍全忠素服待罪泣下不自勝上親解玉帶賜之乙丑次扶風令朱友倫揔兵侍衛丁卯次興元宰臣崔胤率百官迎謁戊辰次咸陽己巳入京師天子素服哭于太廟改服冕旒謁九廟禮畢御長樂樓大赦天祐元年正月全忠率師屯河中遣牙將寇彥卿奉表請車駕遷都洛陽全忠令長安居人按籍遷居徹屋木自渭浮河而下連薨號哭月餘不息秦人大駡於路曰國賊崔胤朱溫傾覆社稷俾我及此天乎天乎丁巳車駕發京師癸亥次陜州全忠迎謁于路四月甲辰車駕由徽安門入朱全忠張全義宰相裴樞獨孤損前導是日大風雨土跬步不辨物色日暝稍止上謁太廟禮畢還宮御正殿宣勞從官衛士乙巳上御光政門大赦八月壬寅夜朱全忠令朱友恭氏叔琮蔣玄暉弒帝於椒殿帝自離長安日憂不測與皇后內人惟沉飲自寬時年三十八謚曰聖穆景文孝皇帝廟號昭宗葬和陵哀帝唐書曰哀帝諱柷昭宗第九子母曰積善太后何氏景福元年九月生乾寧四年封輝王名祚天復三年拜開府儀同三司充諸道兵馬元帥天祐元年八月昭宗遇弒翌日蔣玄暉矯宣遺詔又矯宣皇太后令皇太子柩前即位二年四月甲辰夜彗起北河貫文昌其長三丈在西北方十二月戊申全忠令知樞密王殷害皇太后何氏于積善宮四年二月禪位于梁全忠建國奉帝為濟陰王遷於曹州時太原幽州鳳翔西川猶稱天祐正朔天祐五年二月帝為全忠所害, WYG: ''}
