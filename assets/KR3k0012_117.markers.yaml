  - {type: variant, offset: 5547, length: 3, content: 哀皇帝, SBCK: 人之無情乃至於是雖使諸􅁑亮在亦不能輔之况姜維邪充曰不如是殿下何由并之他日王問禪曰頗思蜀否禪曰此間樂不思蜀也蜀故秘書令郄正聞之求見語禪曰王復問可言先人墳墓逺在隴蜀乃心西悲無日不思因閉其目㑹王復問禪}
  - {type: variant, offset: 5547, length: 3, content: 哀皇帝, WYG: 人之無情乃至於是乎雖使諸葛亮在亦不能輔之乆全况姜維耶充曰不如是殿下何由并之他日王問之曰頗思蜀否對曰此間樂不思蜀也蜀故秘書令郄正聞之求見語之曰若王復問可言先人墳墓逺在隴蜀乃心西悲無日不思因閉其目㑹王復問具}
