  - {type: variant, offset: 6, length: 5, content: 唐僖宗恭定, SBCK: 日一夜行三百餘里及於當陽之長坂先主弃妻子與諸􅁑亮張飛趙雲等数十􅀐走遣諸􅁑亮自結於孫權權遣周瑜等助之與曹公􅀾於赤壁大破之焚其舟舩羣下推先主爲荆州牧治公安益州牧劉璋内懷恐懼遣法正迎先主先主留諸􅁑亮􅀜羽等據荆州將歩卒数万人入益州璋推先主行大司馬領司􅀠校尉先主推璋行鎭西大將軍益州牧璋􅃙􅀜戍諸將文書勿復關通先主先主大怒進圍成都数十日璋出降蜀中殷盛豐樂先主置酒大饗士卒蜀城中金銀分與將士還其榖帛先主復領益州牧羣下尊先主爲漢中王還治成都魏文帝稱尊號傳聞漢帝見害先主乃發喪制服追謚曰孝􅉖}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_SBCK_117-4b}
  - {type: variant, offset: 6, length: 5, content: 唐僖宗恭定, WYG: 日一夜行三百餘里及於當陽之長坂先主棄妻子與諸葛亮張飛趙雲等數十騎走遣諸葛亮自結於孫權權遣周瑜等助之與曹公戰於赤壁大破之焚其舟船羣下推先主為荆州牧治公安益州牧劉璋内懐恐懼遣法正迎先主先主留諸葛亮雲長等據荆州將步卒數萬人入益州璋推先主行大司馬領司𨽻校尉先主亦推璋為鎮西大將軍領益州牧璋勅關戍諸將文書勿復關通先主先主大怒進圍成都數十日璋出降蜀中殷盛豐樂先主置酒大饗士卒蜀城中金銀分與將士還其榖帛先主復領益州牧羣下尊先主為漢中王還治成都魏文帝稱尊號或傳聞漢帝見害先主乃發喪制服追諡曰孝愍}
