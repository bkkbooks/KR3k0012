  - {type: variant, offset: 4, length: 0, content: '', krp: 千人益先主遂去揩㱕謙謙表先主爲豫州刺史屯小沛謙病謂别駕縻笁曰非劉備不能安此州謙死笁帥州人迎先主先主未敢當下邳陳登謂先主曰今漢室陵遟海内傾覆立功立事在於今日彼州殷富户口百万欲屈使君抚臨州事北海相孔融謂先主曰今日之事百姓与能天与不取悔不可追先主遂領徐州袁術來攻先主拒之於盱眙淮隂曹公表先主爲鎭東將軍封冝城亭侯是歳建安元年也先主与術相持經月吕布乗虚襲下邳守將曹豹反間迎布布虜先主妻子先主求和於布布還其妻子遣先主還小沛復合兵得万餘人布惡之自出攻先主先主敗走歸曹公曹公厚遇之以爲豫州牧曹公助先主圍布於下邳生擒布先主復得妻子從曹公還許表先主爲左將軍礼之逾重出則同輿入則同席衮術欲經徐州北就袁紹曹公遣先主督朱靈路招要等術未至術病死曹公從容謂先主曰天下英雄唯使君與操耳夲𥘉之徒不足数也先主方食失匕箸先主據下邳乃殺操徐州刺史曹胄留關羽守下邳身還小沛曹公東征先主敗績曹公盡收其衆虜先主妻子并擒關羽以歸先主走青州青州刺史袁譚先主故茂才也將歩騎迎先主先主隨譚到平原譚馳使白紹紹遣將道路奉迎身去鄴二百里與先主相見關羽亡歸先主曹公遣曹仁將騎擊先主先主還紹軍隂欲離紹乃說紹南連荆州收劉表紹遣先主將本兵至汝南遣麋笁孫乾與劉表相聞表自郊迎以上賔待之先主在荆州數年甞於表坐起至厠見髀裏肉生慨然䟽悌還坐表恠問備曰平常身不離鞍髀肉皆消今不復騎髀裏肉生日月若馳老將至矣而功業不建是以悲耳一日徐庶謂先主曰諸葛孔明卧龍也將軍豈不欲見乎先主曰可以俱来庶曰此人可就見不可屈致也宜枉駕頋之由是先主遂詣亮廬凢三見之因屏人曰漢室傾頽姧臣竊命孤不度德量力欲仗大義於天下而智術淺短遂用猖蹶然志由未巳君爲計將安出亮曰自董卓巳來豪傑並起跨州連郡者不可勝計曹操比於袁紹則名微而衆寡操遂能克紹以弱爲強非唯天時抑亦人事今操巳擁百万之衆挾天子而令諸侯此誠不可与爭鋒也孫權據有江東巳歷三代國險而民附賢能爲之用此可與爲援而不可圖也荆州北據漢江利盡南海東連呉㑹西通巴蜀此用武之國也而其主不能守殆天所以資將軍也益州隘塞沃野千里天府之土髙祖因之以成帝業劉璋暗弱張魯在北人殷國富而不知恤智能之士思得明君將軍旣帝室之胄信義著於四海㹅攬英雄思賢如渇若跨有荆益保其巖阻西和諸戎南撫夷越結好孫權内修政事天下有變則命上將將荆州之軍以向宛洛將軍身率益州之衆出於秦川百姓孰不簞食壼漿以迎將軍者乎誠如是則霸業可成漢室可興矣先主曰善於是與亮情好日宻關羽張飛不恱先主解之曰孤之有孔明如魚之有水也願諸君勿復言}
  - {type: variant, offset: 5, length: 0, content: '', SBCK: 二年曹公北征烏丸先主􅀃表襲許表不能用及曹公南征㑹表死子琮代立遣使請降先主屯樊城遂將其衆去過襄陽諸􅁑亮􅀃攻琮荆州可有先主曰荆州臨亡訟我以􅀌背信自濟死何靣目見劉荆州乎吾不忍也琮左右及荆州人多歸先主比到當陽衆且十萬輜重数千􅀨日行十餘里或謂先主曰宜速行保江陵今雖擁大衆􅀍甲者少若曹公兵至何以拒之先主曰夫濟大事者以人爲夲今人歸吾何忍弃去是時曹么又以江陵有軍實恐先主據之乃釋輜重輕軍到襄陽聞先主巳過曹公將精􅀐五千急追之}
  - {type: page-break, offset: 5, content: '', id: KR3k0012_SBCK_117-4a}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 二年曹公北征烏丸先主説表襲許表不能用及曹公南征㑹表死子琮代立遣使請降先主屯樊城遂將其衆去過㐮陽諸葛亮説先主攻琮有荆州先主曰劉荆州臨亡託我以孤背信自濟死何面目見劉荆州乎吾不忍也琮左右及荆州人多歸先主比到當陽衆且十萬輜重數千兩日行十餘里或謂先主曰宜速行保江陵今雖擁大衆被甲者少若曹公兵至何以拒之先主曰夫濟大事者以人為本今人歸吾吾何忍棄去是時曹公又以江陵有軍實恐先主據之乃釋輜重輕軍到㐮陽聞先主已過曹公將精騎五千急追}
