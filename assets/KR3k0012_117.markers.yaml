  - {type: variant, offset: 341, length: 0, content: '', SBCK: 年永安三年先主病篤託􅀌於丞相亮夏四月先主殂于永安宮時年六十三五月梓宮自永安還成都謚昭烈皇帝秋八月葬惠陵華陽國志曰漢末大乱雄傑並起若董卓呂布二􅀽韓馬張楊劉表之徒兼州董郡衆動万計叱咤之間皆自謂漢祖可踵桓文易邁而魏武神武肆略戡屠盪盡于時先主名微衆鮮而能龍興鳯舉假翼荆楚畨飛梁益建}
