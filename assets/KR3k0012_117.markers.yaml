  - {type: variant, offset: 5026, length: 515, content: 將李繼徽奉車駕出幸鳳翔三年正月車駕出鳳翔幸全忠軍全忠素服待罪泣下不自勝上親解玉帶賜之乙丑次扶風令朱友倫揔兵侍衛丁卯次興元宰臣崔胤率百官迎謁戊辰次咸陽己巳入京師天子素服哭于太廟改服冕旒謁九廟禮畢御長樂樓大赦天祐元年正月全忠率師屯河中遣牙將寇彥卿奉表請車駕遷都洛陽全忠令長安居人按籍遷居徹屋木自渭浮河而下連薨號哭月餘不息秦人大駡於路曰國賊崔胤朱溫傾覆社稷俾我及此天乎天乎丁巳車駕發京師癸亥次陜州全忠迎謁于路四月甲辰車駕由徽安門入朱全忠張全義宰相裴樞獨孤損前導是日大風雨土跬步不辨物色日暝稍止上謁太廟禮畢還宮御正殿宣勞從官衛士乙巳上御光政門大赦八月壬寅夜朱全忠令朱友恭氏叔琮蔣玄暉弒帝於椒殿帝自離長安日憂不測與皇后內人惟沉飲自寬時年三十八謚曰聖穆景文孝皇帝廟號昭宗葬和陵哀帝唐書曰哀帝諱柷昭宗第九子母曰積善太后何氏景福元年九月生乾寧四年封輝王名祚天復三年拜開府儀同三司充諸道兵馬元帥天祐元年八月昭宗遇弒翌日蔣玄暉矯宣遺詔又矯宣皇太后令皇太子柩前即位二年四月甲辰夜彗起北河貫文昌其長三丈在西北方十二月戊申全忠令知樞密王殷害皇太后何氏于積善宮四年二月禪位于梁全忠建國奉帝為濟陰王遷於曹州時太原幽州鳳翔西川猶稱天祐正朔天祐五年二月帝為全忠所害, SBCK: ''}
