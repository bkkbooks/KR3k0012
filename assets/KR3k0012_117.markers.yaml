  body:
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 勝之後也勝子貞元狩六年封􅃰縣陸城亭侯坐酎金失侯因家焉典畧云備夲臨邑侯枝属先主祖雄父􅀪丗仕州郡雄舉孝廉官至東郡􅁐令先主少􅀌母販履織席爲業舎東南角籬上有桑樹上髙五尺餘遥望重重如小車蓋往來者皆恠此樹非凢或謂當出貴人漢􅀳春秋曰􅃰人李定云此家必出貴人也先主少時與宗中諸兒於樹下戯言吾必當乗此羽葆蓋車叔父子敬謂曰汝勿妄語滅吾門矣年十五母使斈同宗劉德然遼西公孫瓉俱事故九江太守同郡盧植德然父元起常資給先主與德然等元起妻曰各自一家何能常尓耶起曰吾宗中有此兒非常人也瓉深與先主相友瓉年長先主以兄事之先主不甚樂讀書喜狗馬音樂美衣服身長七尺五寸垂臂下膝頋自見其耳少語言善下人喜怒不形於色好交結豪俠年少爭附之中山大啇張丗平􅂫􅀟等貲累千金販馬周旋於􅃰郡見而異之乃多與之金先主由是得用合徒衆靈帝末黃巾起州郡各舉義兵先主率其属從校尉鄒靖討賊有功除安喜尉大將軍何進遣都尉詣丹陽募兵先主與俱行至下邳遇賊力􅀾有功除下密丞復去官後爲髙唐尉遷爲令爲賊所破往奔公孫瓉表爲別}
  - {type: page-break, offset: 2, content: '', id: KR3k0012_SBCK_117-1b}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 勝之後也勝子負元狩六年封涿縣陸城亭侯坐酎金失侯因家焉典畧云備本臨邑侯支屬先主祖雄父𢎞世仕州郡雄舉孝亷官至東郡范令先主少孤與母販履織席為業舍東南角籬上有桑樹上髙五尺餘遙望重重如小車蓋往來者皆恠此樹非凡或謂當出貴人漢晉春秋曰涿人李定云此家必出貴人也先主少時與宗中諸兒於樹下戲言吾必當乗此羽葆蓋車叔父子敬曰汝勿妄語㓕吾門也年十五母使行學同宗劉徳然遼西公孫瓉俱事故九江太守同郡盧植徳然父元起常資給先主與徳然等元起妻曰各有一家何能常爾耶起曰吾宗中有此兒非常人也瓉深與先主相友瓉年長先主以兄事之先主不甚樂讀書喜狗馬音樂美衣服身長七尺五寸垂臂下膝顧自見耳少言語善下人喜怒不形于色好交結豪俠年少爭附之中山大商張世平蘓雙等貲累千金販馬周旋於涿郡見而異之乃多與之金財先主由是得用合徒衆靈帝末黄巾起州郡各舉義兵先主率其屬從校尉鄒靖討賊有功除安喜尉大將軍何進遣都尉毌丘毅詣丹陽募兵先主與俱行至下邳遇賊力戰有功除為下密丞復去官后為髙唐尉遷為令為賊所破往奔公孫瓉表為别}
