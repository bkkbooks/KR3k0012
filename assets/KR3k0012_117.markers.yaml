  - {type: variant, offset: 5, length: 0, content: '', krp: 二年曹公北征烏丸先主說表襲許表不能用及曹公南征㑹表死子琮代立遣使請降先主屯樊城遂將其衆去過襄陽諸葛亮說攻琮荆州可有先主曰荆州臨亡訟我以孤背信自濟死何靣目見劉荆州乎吾不忍也琮左右及荆州人多歸先主比到當陽衆且十萬輜重数千雨日行十餘里或謂先主曰宜速行保江陵今雖擁大衆𬒳甲者少若曹公兵至何以拒之先主曰夫濟大事者以人爲夲今人歸吾何忍弃去是時曹么又以江陵有軍實恐先主據之乃釋輜重輕軍到襄陽聞先主巳過曹公將精騎五千急追之}
