  - {type: variant, offset: 2, length: 0, content: '', krp: 勝之後也勝子貞元狩六年封涿縣陸城亭侯坐酎金失侯因家焉典畧云備夲臨邑侯枝属先主祖雄父弘丗仕州郡雄舉孝廉官至東郡苑令先主少孤母販履織席爲業舎東南角籬上有桑樹上髙五尺餘遥望重重如小車蓋往來者皆恠此樹非凢或謂當出貴人漢晉春秋曰涿人李定云此家必出貴人也先主少時與宗中諸兒於樹下戯言吾必當乗此羽葆蓋車叔父子敬謂曰汝勿妄語滅吾門矣年十五母使斈同宗劉德然遼西公孫瓉俱事故九江太守同郡盧植德然父元起常資給先主與德然等元起妻曰各自一家何能常尓耶起曰吾宗中有此兒非常人也瓉深與先主相友瓉年長先主以兄事之先主不甚樂讀書喜狗馬音樂美衣服身長七尺五寸垂臂下膝頋自見其耳少語言善下人喜怒不形於色好交結豪俠年少爭附之中山大啇張丗平蘇雙等貲累千金販馬周旋於涿郡見而異之乃多與之金先主由是得用合徒衆靈帝末黃巾起州郡各舉義兵先主率其属從校尉鄒靖討賊有功除安喜尉大將軍何進遣都尉詣丹陽募兵先主與俱行至下邳遇賊力戦有功除下密丞復去官後爲髙唐尉遷爲令爲賊所破往奔公孫瓉表爲別}
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 司馬使与青州刺史田楷拒兾州收􅀽紹数有功守平原令後領平原相郡民劉平素輕先主恥爲之下使客刺之客不忍刺語之而去其得人心如此􅀽紹攻公孫瓉先主與楷東屯齊曹公征徐州徐州牧陶勾遣使告急於楷楷与先主俱救之時先主有兵千餘人謙以丹陽兵}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_117-2a}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 司馬使為青州刺史田楷以拒冀州牧袁紹數有戰功試守平原令后領平原相郡民劉平素輕先主恥為之下使客刺之客不忍刺語之而去其得人心如此袁紹攻公孫瓉先主與田楷屯齊東曹公征徐州牧陶謙遣使告急於楷楷與先主俱救之時先主有兵千餘人謙以丹陽兵}
  - {type: variant, offset: 3, length: 0, content: '', krp: 司馬使与青州刺史田楷拒兾州收袁紹数有功守平原令後領平原相郡民劉平素輕先主恥爲之下使客刺之客不忍刺語之而去其得人心如此袁紹攻公孫瓉先主與楷東屯齊曹公征徐州徐州牧陶勾遣使告急於楷楷与先主俱救之時先主有兵千餘人謙以丹陽兵}
  - {type: variant, offset: 4, length: 0, content: '', SBCK: 千人益先主遂去揩㱕謙謙表先主爲豫州刺史屯小沛謙病謂别駕縻笁曰非劉備不能安此州謙死笁帥州人迎先主先主未敢當下邳陳登謂先主曰今漢室陵遟海内傾覆立功立事在於今日彼州殷富户口百万欲屈使君抚臨州事北海相孔融謂先主曰今日之事百姓与能天与不取悔不可追先主遂領徐州􅀽術來攻先主拒之於盱眙淮隂曹公表先主爲鎭東將軍封冝城亭侯是歳建安元年也先主与術相持經月吕布乗虚襲下邳守將曹豹反間迎布布虜先主妻子先主求和於布布還其妻子遣先主還小沛復合兵得万餘人布惡之自出攻先主先主敗走歸曹公曹公厚遇之以爲豫州牧曹公助先主圍布於下邳生擒布先主復得妻子從曹公還許表先主爲左將軍礼之逾重出則同輿入則同席衮術欲經徐州北就􅀽紹曹公遣先主督朱靈路招要等術未至術病死曹公從容謂先主曰天下英雄唯使君與操耳夲􅀄之徒不足数也先主方食失匕箸先主據下邳乃殺操徐州刺史曹胄留􅀜羽守下邳身還小沛曹公東征先主敗績曹公盡收其衆虜先主妻子并擒􅀜羽以歸先主走青州青州刺史􅀽譚先主故茂才也將歩􅀐迎先主先主隨譚到平原譚馳使白紹紹遣將道路奉迎身去鄴二百里與先主相見􅀜羽亡歸先主曹公遣曹仁將􅀐擊先主先主還紹軍隂欲離紹乃􅀃紹南連荆州收劉表紹遣先主將本兵至汝南遣麋笁孫乾與劉表相聞表自郊迎以上賔待之先主在荆州數年甞於表坐起至厠見髀裏肉生􅁣然䟽悌還坐表恠問備曰平常身不離鞍髀肉皆消今不復􅀐髀裏肉生日月若馳老將至矣而功業不建是以悲耳一日徐庶謂先主曰諸􅁑孔明卧龍也將軍豈不欲見乎先主曰可以俱来庶曰此人可就見不可屈致也宜枉駕頋之由是先主遂詣亮廬凢三見之因屏人曰漢室傾頽姧臣竊命􅀌不度德量力欲仗大義於天下而智術淺短遂用猖蹶然志由未巳君爲計將安出亮曰自董卓巳來豪傑並起跨州連郡者不可勝計曹操比於􅀽紹則名微而衆寡操遂能克紹以弱爲強非唯天時抑亦人事今操巳擁百万之衆挾天子而令諸侯此誠不可与爭鋒也孫權據有江東巳歷三代國險而民附賢能爲之用此可與爲援而不可圖也荆州北據漢江利盡南海東連呉㑹西通巴蜀此用武之國也而其主不能守殆天所以資將軍也益州隘塞沃野千里天府之土髙祖因之以成帝業劉璋暗弱張魯在北人殷國富而不知恤智能之士思得明君將軍旣帝室之胄信義著於四海㹅􅄃英雄思賢如渇若跨有荆益保其巖阻西和諸戎南撫夷越結好孫權内修政事天下有變則命上將將荆州之軍以向宛洛將軍身率益州之衆出於秦川百姓孰不簞食壼漿以迎將軍者乎誠如是則霸業可成漢室可興矣先主曰善於是與亮情好日宻􅀜羽張飛不恱先主解之曰􅀌之有孔明如魚之有水也願諸君勿復言}
