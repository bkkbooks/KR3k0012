  - {type: variant, offset: 2816, length: 0, content: '', WYG: 覆以屋晝夜㸐音燃火待温氣乃生奏罷之東觀漢記曰孔奮字君魚為姑臧長時天下亂河西獨安前長居官數月輙置貲產奮在姑臧四嵗財物不增惟老母極膳妻子但食葱菜或嘲奮曰置脂膏中不能自潤義熈起居注曰十年有司奏太常謝瞻遣四人還家種葱菜免官晉書曰居洛陽城十里内有園菜欲以當課聼引其長流灌紫葱}
