  - {type: variant, offset: 180, length: 531, content: 草菜可食通名為蔬也論語曰雖蔬食菜羹瓜祭必齊如也又曰飯蔬食飲水曲肱而枕之樂亦在其中矣尚書大傳曰煞君之室雖生美菜有義之士弗食後漢書曰劉平與母俱匿野澤中平朝出求食逢餓賊將烹之平叩頭曰今旦為老母求菜母老將平為命願得先歸食音嗣下同母畢還就死因涕泣賊見其至讓而遣之平還既食母訖因白曰屬與賊期義不可欺遂還詣賊眾皆大驚相謂曰常聞烈士乃今見之子去矣吾不忍食子於是得全又曰崔瑗愛士好賓客盛脩肴膳殫極滋味不問餘產居常蔬食菜羹而已謝承後漢書曰汝南鍾南嚴海君少時鄉人有入其園竊菜者明日拔菜悉遺鄉里鄉里人相約無復取菜者又曰彭城刀曜字子卿為漁陽相前相所種菜悉付還外魏志曰倭國地溫冬夏食生菜吳書曰趙咨使魏魏人曰聞江東有耑音端蹄菜作若為食咨曰當得倉助庾切鰷以作羹王隱晉書曰皇甫謚姑子梁柳為城陽太守或勸謚送之謚曰柳為布衣過吾吾送迎柳不出門食不過鹽菜貧不以酒肉為禮也今而送是貴城陽太守而賤梁鴻季也豈中古人之道哉又曰邵續為石勒所執身灌園鬻菜以供衣食勒屢遣察之歎曰此真高人矣不如是安足貴乎嘉其清苦賜穀帛每臨朝嗟歎以勵群官又曰桓溫性儉每讌唯下七奠拌菜果而已又曰吳隱之母喪哀毀嘗鹹葅以其味旨輟而棄之及為廣州清操踰勵常食不過菜及乾魚而已帷帳器服皆付外庫時人頗謂其矯然亦始終不易宋書曰張敷父在吳興亡成服凡十餘日始, WYG: ''}
