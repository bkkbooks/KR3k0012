  - {type: variant, offset: 2813, length: 0, content: '', SBCK: 百本薤後漢書曰龐叅爲南陽太守郡人任棠者有竒節隱居教授叅到先候之棠不與言但以薤}
  - {type: variant, offset: 2813, length: 2, content: 一畦, WYG: 五十本葱又曰郡信臣為少府先是官園種冬葱}
  - {type: variant, offset: 2813, length: 0, content: '', krp: 百本薤後漢書曰龐叅爲南陽太守郡人任棠者有竒節隱居教授叅到先候之棠不與言但以薤}
  - {type: variant, offset: 2814, length: 2, content: 畦韭, SBCK: 夲水一孟置户屏前自抱孫兒伏户下主簿白以爲倨叅思其微意良乆曰棠是欲暁太守也水者欲吾清也㧞大夲薤欲吾擊強宗也抱兒當户欲吾開門恤􅀌也於是歎息而還叅在職果能抑強助弱以惠政侍人魏略曰李孚字子憲爲諸生常種薤欲以成計有求索不與一莖亦不自食時人謂之能行意丗􅀃曰桓公座有叅軍猗音覊筯取物也蒸薤不時解其食者又不助而猗終不放舉座皆􅀏又曰􅂫峻亂􅁃公南奔見陶􅋲雅相重及食􅁃噉薤因留白陶問用此何爲􅁃云故可種於是尤歎列仙傳曰務光服蒲薤根荆州圗副曰筑陽縣有薤山山多野薤因以爲名古詞曰薤上朝露何易稀潘岳閑居賦曰白薤􅀒霜䔉爾雅曰􅏣力的切山䔉今山中多有此菜皆如人家所種􅀃文曰䔉菜之美者雲夢之葷菜東觀漢記曰李恂爲兖州刺史前刺史所種園小麥胡䔉悉付從事無所留謝承後漢書曰江夏費遂字子竒爲楊州刺史悉出前刺史所種小麥胡䔉付從事又曰太原閔仲叔者代稱節士雖同黨之㓗清自以弗及也同黨見其含菽飲水遺以生䔉受而不食王隱}
