  - {type: variant, offset: 2833, length: 2, content: 韭蓱, SBCK: 大䔉苜蓿三輔决録曰平陵范氏南陽舊語曰前隊大夫有范仲公塩豉䔉果共一筩言其廉儉也􅀽子正書曰􅀽子曰吾甞與陳子息於鄴東門之外見一老父方坐而食其子授之䔉食必有餘欲弃則惜欲持去則暑遂盡食於是大辛螫其膓胃兩目盡赤陳子􅀏之吾謂曰子之家中牛羊數千而不敢食天暑有喝}
