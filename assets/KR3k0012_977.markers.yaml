  - {type: variant, offset: 3294, length: 2, content: 赤韭, WYG: 丘者雎山上道士也衣裘髪覆耳耳長六七寸口中無齒日行四百里於山上種葱薤百餘年人不知也春秋元命包曰天門山有葱所種畦壠悉成行人㧞取者悉絶若請神而求能不㧞自出竒異辛香}
