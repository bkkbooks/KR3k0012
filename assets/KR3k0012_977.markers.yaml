  - {type: variant, offset: 3467, length: 3, content: 意何所, WYG: 不可啖生薑令兒多指嶺表録異曰山薑花莖葉即薑也根不堪食而于葉間吐花穗如麥粒嫩紅色南人選未拆開者以鹽淹藏入甜糟中經冬如琥珀香辛可重用為膾無加也又曰以鹽藏曝乾煎湯服}
