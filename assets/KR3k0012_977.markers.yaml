  - {type: variant, offset: 3311, length: 4, content: 交州平樂, WYG: 休循國居葱嶺其}
  - {type: variant, offset: 3317, length: 3, content: 龍穴傍, WYG: 大葱華陽國志曰曹公既與先主語先主方食失七箸㑹天震雷先主曰聖人言迅雷風烈必變良有以也曹公亦悔失言使人覘之見其方㧞葱公曰大耳公未之覺也其夜先主急去廣志曰有胡葱木葱巴南山川記曰有石䔉石葱續捜神記曰新野趙貞家園中種葱未經抽拔忽一日盡縮入地後經嵗餘貞之兄弟相次分散揚雄蜀都賦曰蔓茗熒郁翠藻青黄若離錦布繡望之無疆潘岳閒居賦曰菜則有葱韭䔉芋青笋紫薑堇薺甘旨蓼荽芬芳薤爾雅曰􅀈山薤今山中多有此菜皆如人家所種又曰薤鴻薈也漢書曰龔遂為渤海太守令民一口種百本薤後漢書曰龎參為南陽太守郡人任棠者有竒節隐居教授叅到先候之棠不與言但以薤一本水一盂置户屏前抱孫兒伏户下主簿白以為倨恭思其㣲意良乆曰棠是欲曉太守也水者欲吾清也㧞大本薤欲吾擊强宗也抱兒當户欲吾開門恤孤也于是歎息而還叅在職果能抑强􅂇弱以惠政待人魏畧曰李孚字子憲為諸}
  - {type: page-break, offset: 3317, content: '', id: KR3k0012_WYG_977-4a, image: WYG0901/WYG0901-0581a.png}
