  - {type: variant, offset: 2824, length: 8, content: 豆粥咄嗟便辦每冬, WYG: 韭梁書曰呂僧珍拜南兖州刺史從父兄子先以販葱為業僧珍至乃棄業求州官僧珍曰吾荷國恩重無以報効汝等自有常分豈可妄求叨越當速反葱肆耳金樓子曰名山之下生葱葱薤者是古人食石種也故語曰寜}
