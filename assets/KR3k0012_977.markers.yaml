  - {type: variant, offset: 2933, length: 3, content: 圍京邑, krp: 頴奉惠帝還洛陽道中於客舎作食宫人持斗餘粳米飯以供至尊大䔉塩䜴到獲嘉市麄米飯瓦盂盛之天子噉兩盂燥䔉數株塩豉而巳顔氏家訓曰三輔决録云前隊大夫范仲公塩豉䔉顆共一䇶顆當音魏顆之顆北土通呼物一叚爲一顆䔉是俗間常語耳故陳王雀鷂賦曰頭如䔉顆目似擘椒崔豹古今注曰䔉苑䔉也俗語謂之小䔉胡國有䔉十子共爲一株二籜裏之名爲胡䔉尤辛於小䔉俗人謂之大䔉冤報記曰梁廬陵王蕭績在荆州時常遣從事量括民田南陽樂孟卿亦充一使公府舎人韋破虜發遣試敕失王夲意及孟卿以數誤得罪破虜惶懼不敢引愆但誑孟卿公自爲當爲公分雪無勞訴也數日之間遂斬於市孟卿號呌無由自陳唯語人以𥿄筆隨殮死後少日破虜在糟上看牛忽見孟卿挈頭而入持一椀蒜韲與之破虜驚呼奔走不獲巳而服之因尓病未幾乃卒廣五行記曰唐咸亨四年洛州司户唐望之冬集計至五品進止未出間有僧來覔𥘉不相識延之共坐少頃間曰貧道出家人得飲食亦少以公名故闇相記能設一頓鱠否司户欣然即處分買魚此僧云㸔有䔉否司户家人云䔉盡僧云䔉盡去出即起晋之云䔉盡遣得買僧云䔉旣盡不可更住苦留不止司户果無疾暴亡延薦與李文徳書曰五折張騫大宛之䔉潘浞釣賦曰西戎之䔉南夷之薑茄梁書曰蔡樽爲吴興太守不飲郡井水齋前自種白莧紫茄以爲常餌詔襃其清加信武將軍杜寳大業拾遺録曰四年改胡牀爲交牀改胡瓜爲白露黄苽改茄子爲崑崙紫苽嶺南異物志曰南土無霜雪生物不復凋枯種茄子十年不死生子人皆攀縁摘之樹髙至二丈嶺表録異曰南中草菜經冬不衰故𬞞薗之中栽種茄子宿根有二三年者漸長枝幹乃爲大樹每夏秋熟則梯樹摘之三年後樹漸老子稀即伐去別栽嫰者薑春秋運斗樞曰琁星散爲薑失德逆時則薑有翼辛而不臭也援神契曰薑禦温菜也禮記檀弓上曰䘮有疾食肉飲酒必有草木之滋焉以爲薑桂之謂也論語郷黨曰不撤薑食撤去齊禁薫物薑卒而不臭故不去也韓詩外傳曰宋玉因其友見楚相楚相待之無以異讓其友其友曰夫薑挂因地而生不因地而辛女因媒而嫁不因媒而親子之於王未也何怨於我也史記曰萬家之}
