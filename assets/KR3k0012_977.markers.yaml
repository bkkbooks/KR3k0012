  - {type: punctuation, offset: 3404, content: 『, id: KR3k0012_CHANT_977-bkkpn1130}
  - {type: variant, offset: 3404, length: 0, content: '', WYG: 㸔有䔉否司戸家人云䔉盡僧云䔉盡去也乃起留之云䔉盡遣得買僧云䔉既盡不可更住苦留不可司户果無疾暴亡延薦與}
  - {type: variant, offset: 3405, length: 4, content: 令公一食, WYG: 文德書曰五折張騫大宛之䔉潘尼釣賦曰西戎之䔉南夷之薑茄梁書曰蔡撙為吳興太守不飲郡井水齋前自種白莧紫茄以為常餌詔褒其清加信武将軍杜寶大業拾遺録曰大業四年中命改茄子為崑崙紫苽嶺南異物志曰南土無霜雪生物不復凋枯種茄子}
  - {type: page-break, offset: 3405, content: '', id: KR3k0012_WYG_977-9a, image: WYG0901/WYG0901-0583c.png}
  - {type: variant, offset: 3410, length: 8, content: 八種人問其故元祐, WYG: 年不死攀縁摘之樹高至二丈嶺表録異}
