  - {type: punctuation, offset: 3395, content: 。, id: KR3k0012_CHANT_977-bkkpn1128}
  - {type: 'tls:seg', offset: 3395, content: '', id: KR3k0012_CHANT_977-53a.10}
  - {type: variant, offset: 3403, length: 0, content: '', WYG: 以紙筆隨殮死後少日破虜在槽上㸔牛忽見孟卿挈頭而入持一椀䔉韲與之破虜驚呼奔走不獲已而服之因爾病未幾乃卒唐五行記曰唐咸亨四年洛州司尸唐望之冬集計至五品進止未出間有僧來覓初不相識延之共坐少頃問曰貧道出家人得飲食亦少以公名故闇相記能設一頓鱠否司戸欣然即虛公置魚此僧}
  - {type: page-break, offset: 3403, content: '', id: KR3k0012_WYG_977-8b, image: WYG0901/WYG0901-0583b.png}
