  - {type: variant, offset: 712, length: 1779, content: 水漿葬畢不進鹽菜遂毀瘠成疾又曰宗愨以軍功封洮陽侯先是鄉人庾業家豪富侈侯服玉食與賓客相對膳必方丈而為愨設粟飯菜葅謂客曰宗軍人慣噉麤食愨致飽而退初無異辭至是為愨長史帶梁郡愨待之甚厚不以昔事為嫌又曰柳元景為三公時在朝勳貴多事產業唯元景獨無所營南岸有數十畝菜得錢三萬還宅元景怒曰我立此園菜以供家啖耳乃復賣以取錢奪百姓之利耶乃以錢乞守園人又曰王玄謨柳元景桓護之雖並北人而玄謨獨受老傖之目凡諸稱為四方書䟽亦如之嘗為玄謨作四時詩曰堇茹供春膳粟漿充夏飡匏醬調秋菜白醝解冬寒又曰朱脩之姊在鄉里飢寒不立脩之貴為刺史未曾供膳往姊為設菜羹麤飯以激之齊書曰晉永嘉五年曲陽縣市黃慶宅左右有園東南廣數丈每種菜輒鮮異雖加採拔更生夜恒有白光似懸絹道士傅德占使人掘之三尺獲玉印文曰長承萬福又曰宜都王鏗生三歲喪母及有識問母所在左右告以早亡便思慕蔬食自悲不識母又曰江泌性仁孝食菜不食心以其有生意唯食老葉而已南史隱逸傳曰沈道虔辟州府凡十二命皆不就有竊園菜者外還見之仍自逃隱待竊者去後乃出梁書曰武帝太官常膳唯以菜蔬圓案所陳不過三盞又武帝詔曰今雖無復牲腥猶有脯脩之類即之幽明義為未盡可更詳定悉薦時蔬左丞司馬筠等參議大餅代大脯餘悉用蔬菜帝從之三國典略曰梁蕭棟字吉豫章安王權之子也侯景以法駕迎棟時棟與其妃執鋤種菜忽然見逼駭愕久之後魏書曰甄琛母曹氏有孝性夫氏去家路踰百里每得魚肉菜菓珍羹口實者必令僮僕走奉其母乃後食焉又曰高閭曾造胡叟叟短褐曳柴從田歸舍為閭設濁酒蔬食皆手自辦案其館宇卑陋園疇褊局而飯菜精潔醯醬調美見其二妾並年衰跛眇衣布穿弊閭見其貧約以衣服直十餘疋贈之亦無辭愧又曰盧義僖性清儉不營財利雖居顯位每至困乏夌飯蔬食忻然甘之三國典略曰北齊主以鄴清風園賜穆提婆於是官無蔬菜賖買於人負錢三百萬其人訴焉斛律光曰此園賜提婆一家足不賜提婆百官足又曰庫狄士文為貝州刺史性清苦不受公料家無餘財其子嘗噉官廚餅士文枷之繫獄累日杖之一百步送還京僮僕無敢出門所買菜必於外境凡有出入皆封署其門親故絕跡慶吊不通隋書曰姚察陳亡入隋詔授秘書丞別勑成梁陳二史又勑於朱華門長參文帝察蔬菲別曰召入內殿賜果菜指謂朝臣曰朕聞姚察學行當今無比我平陳只得此一人唐書曰太宗回次易州界司馬陳元璹令百姓種蔬坑上而微火煦之欲其速生以擬供進太宗聞之責其謟媚詔免官又曰太宗時健達獻佛土菜一莖五葉花赤中心正黃而蘂子紫色泥婆羅獻波稜菜葉類紅藍實如蒺藜火熟之能益食味又有酢菜狀似芹而味香渾提蔥其狀猶蔥而甘辛又曰高宗時司農欲以冬藏餘菜賣之百姓以墨勑示僕射蘇良嗣良嗣判曰昔公儀相魯拔去園葵況臨御萬邦而敗蔬鬻菜事遂不行又曰王昇為刑部尚書性貪恡不常在公乃鬻公廨菜園收其價錢以自潤甚為時論所醜又曰中書園蔬日給於眾官者主事白常袞減其數崔祐甫怒訶主事曰此相公之命祐甫大詬曰門下侍郎安得理中書之蔬叱左右踣主事而拽之自是與袞常不平又曰貞元七年冬司農卿李模免官初司農當供三官冬菜二千車以度支給車直稍賤又阻雨菜敗模以度支為辭上責其不先聞故免之先是模奏司農菜不足請京兆府市之尹薛玨萬年令韋彤乃禁人私賣上命奪玨俸一月彤俸三月又曰貞元中奚陟為中書舍人以所得雜給均分省內官又躬親庶務下至園蔬皆悉自點閱人以為難而陟處之無倦莊子曰宣尼窮於陳蔡之間顏回擇菜孔藂子曰菜謂之蔬金樓子曰秦始皇聞鬼谷先生言因遣徐福入海求金菜玉蔬說苑曰楚文王伐鄧使王子革王子靈共捃菜二子出見老丈人戴畚乞焉不與搏而奪之王聞之令皆拘二子將煞之大夫辭曰取畚信有罪然煞之非其罪也君若何煞之言卒丈人造軍而言曰鄧為無道故伐之今君公之子搏而奪吾畚無道甚於鄧乎呼天而號群臣見之言曰討有罪而橫奪非所以禁暴也恃力虐老非所以教幼也愛子棄法非所以保國也私二子滅三行非所以從政也丈人舍之矣謝之軍門之外又曰楚莊王賜虞丘子菜田三百號曰國老以孫叔敖為今尹呂氏春秋曰菜之美者壽木之華枯姑之東赤木玄木之葉餘瞀之南有菜名嘉樹其色若碧桓譚新論曰董仲舒專精於述古年至六十餘不窺園井菜論行亦云山東六賢傳曰袁下字叔隰陬慮人種菜一園左右竊取度溝瀆下乃為之橋其敦義如此漢武內傳曰西王母云上仙之藥有碧海之狼菜孝子傳曰北平陽公輦水作漿兼以給過者公補履屩不取其直天神化為書生問云何不種菜曰無菜種即與數升公種之化為白璧餘皆為錢公得以娶婦廣州先賢傳曰丁密蒼梧人非家織布不衣非己耕種菜菓不食杜蘭香別傳曰香降張碩齎瓦榼酒七樏多菜而無他味亦有世間常菜輒有三種色或丹或紫一物與海蛤相類并有非時菜碩云, WYG: ''}
