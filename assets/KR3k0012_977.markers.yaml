  - {type: variant, offset: 3033, length: 438, content: 種韭言三九也三國世略曰北齊太上後宮無限衣皆珠玉一女歲費萬金寒月盡食韭牙莊子曰徐無鬼見武侯武侯曰先生居山食芋壓蔥韭今老病欲酒肉之味耶無鬼曰君為萬乘之主苦國以義耳目君病矣何勞吾乎列子曰老韭為莧老羭為猿魯連子曰市處者僕妾膾炙而食市饒也壅泉沃韭織屨之士從兄弟室父往而不得粗糒音備焉非愛其僕妾惡其室父也此其饒羨之與不足也說苑曰衛有一夫負缶入井灌韭終日一區鄧晢過教之曰有機重後輕前命曰桔槔終日訖九百區丈夫曰有機智必有機心我非不知不欲為也正論曰小民髮如韭剪復生頭如雞割復鳴吏不必可畏從來必可輕奈何欲望致州厝乎漢武內傳西王母曰仙次藥有八阮赤韭繆襲祭儀曰春祀和羹芼以韭水經曰交州平樂山多龍穴傍生野韭人往乞者神許則風吹制分隨偃而拔不得過越不偃而拔輒凶也楊衒知洛陽茄藍記曰李崇為尚書令儀同三司富傾天下僮僕千人而性多儉恡惡衣麤食食常無肉止有韭茹韭葅崇家客李元祐語人云李令公一食十八種人問其故元祐曰二九十八聞者大笑世以此為譏諸葛亮教張君嗣曰去婦不顧門萎韭不入園以婦人之性草菜之精猶有所恥想忠壯者意何所之, SBCK: ''}
