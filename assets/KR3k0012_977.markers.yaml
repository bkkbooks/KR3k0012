  - {type: variant, offset: 3359, length: 1, content: 崇, WYG: 恂}
  - {type: variant, offset: 3361, length: 1, content: 尚, WYG: 兖州刺史前刺史所種園中麥胡䔉悉付從事無所留謝承後漢}
  - {type: page-break, offset: 3361, content: '', id: KR3k0012_WYG_977-6a, image: WYG0901/WYG0901-0582a.png}
  - {type: variant, offset: 3363, length: 2, content: 令儀, WYG: 曰江夏費遂字子竒為揚州刺史悉出前刺史所種小麥胡䔉付從事又曰太原閔仲叔者代稱節士雖}
  - {type: variant, offset: 3366, length: 0, content: '', WYG: 黨之潔清自以弗及也同黨見其含菽飲水遺以生䔉受而不食王隐晉書曰郄詵母病苦車及亡不欲車載乃養雞種䔉得馬八匹輿棺至冡齊書曰豫章王大㑹賔僚張融食炙始畢人便去融欲求鹽䔉口終不言方揺食指半日乃息南史曰邵陵王使賊殺何智通既擒賊智通子敞之割炙食之即載出新亭四面火炙之燋熟敞車載錢設鹽䔉顧百姓食之撤一臠賞錢一千徒黨并母肉遂盡正部曰張騫使胡還得大䔉苜蓿抱朴子曰謂夏必長而䔉麥枯謂冬必凋而竹栢茂}
  - {type: page-break, offset: 3366, content: '', id: KR3k0012_WYG_977-6b, image: WYG0901/WYG0901-0582b.png}
  - {type: variant, offset: 3367, length: 3, content: 司富傾, WYG: 輔决録曰平陵范氏南陽舊語曰前隊大夫有范仲公鹽豉䔉果共一筩言其廉儉也袁子正書曰袁子曰吾嘗與陳子息于鄴東門之外見一老父方坐而食其子授之䔉食必有餘欲棄則惜欲持去則暑遂盡食于是火辛螫其腸胃兩目盡赤陳子笑之吾謂之曰子之家中牛羊數千而不敢食}
  - {type: page-break, offset: 3367, content: '', id: KR3k0012_WYG_977-7a, image: WYG0901/WYG0901-0582c.png}
  - {type: punctuation, offset: 3368, content: ，, id: KR3k0012_CHANT_977-bkkpn1121}
  - {type: 'tls:seg', offset: 3368, content: '', id: KR3k0012_CHANT_977-53a.4}
  - {type: variant, offset: 3371, length: 4, content: 下僮僕千, WYG: 暑有喝死者而後食之病子之軀亦猶是也晉四王起事曰成都王穎奉恵帝還洛陽道中於客舍作食宮}
  - {type: punctuation, offset: 3372, content: ，, id: KR3k0012_CHANT_977-bkkpn1122}
  - {type: 'tls:seg', offset: 3372, content: '', id: KR3k0012_CHANT_977-53a.5}
  - {type: punctuation, offset: 3376, content: ，, id: KR3k0012_CHANT_977-bkkpn1123}
  - {type: 'tls:seg', offset: 3376, content: '', id: KR3k0012_CHANT_977-53a.6}
  - {type: variant, offset: 3376, length: 0, content: '', WYG: 持粳米飯以供至尊大䔉鹽豉到獲嘉市麄米飯瓦盂盛之天子噉兩盂燥䔉數株鹽豉}
  - {type: variant, offset: 3377, length: 9, content: 性多儉恡惡衣麤食食, WYG: 已顏氏家訓曰三輔决録云前隊大夫范仲公鹽豉䔉果共一筩果當音魏顆之顆北土通呼物一段為一顆䔉果是俗間}
  - {type: page-break, offset: 3377, content: '', id: KR3k0012_WYG_977-7b, image: WYG0901/WYG0901-0582d.png}
  - {type: punctuation, offset: 3381, content: ，, id: KR3k0012_CHANT_977-bkkpn1124}
  - {type: 'tls:seg', offset: 3381, content: '', id: KR3k0012_CHANT_977-53a.7}
  - {type: punctuation, offset: 3385, content: ，, id: KR3k0012_CHANT_977-bkkpn1125}
  - {type: 'tls:seg', offset: 3385, content: '', id: KR3k0012_CHANT_977-53a.8}
  - {type: variant, offset: 3387, length: 0, content: '', WYG: 語耳故陳王鷂雀賦曰頭如䔉果目似花椒崔豹古今注曰䔉卵䔉也俗語謂之小䔉胡國有䔉十子共為一株籜幕裹之名為胡䔉尤辛于小䔉俗人謂之大䔉寃報記曰梁廬陵王蕭績在荆州時常遣從事量括民田南陽樂孟卿亦充一使公府舍人韋破虜遣試勅失主本意及孟卿以數誤得罪破虜惶懼不敢引􅄽但誑孟卿公自為當為公分雪}
  - {type: page-break, offset: 3387, content: '', id: KR3k0012_WYG_977-8a, image: WYG0901/WYG0901-0583a.png}
  - {type: variant, offset: 3388, length: 13, content: 肉止有韭茹韭葅崇家客李元祐, WYG: 勞訴也數日之間遂斬於市孟卿號呌無由自陳惟}
  - {type: punctuation, offset: 3389, content: ，, id: KR3k0012_CHANT_977-bkkpn1126}
  - {type: 'tls:seg', offset: 3389, content: '', id: KR3k0012_CHANT_977-53a.9}
