  - {type: variant, offset: 77, length: 23, content: 舅姑既沒則婦入三月乃奠菜沒終也奠菜者韭祭菜也蓋, SBCK: 凡進食之禮䓗葉處末又膾春}
  - {type: variant, offset: 77, length: 102, content: 舅姑既沒則婦入三月乃奠菜沒終也奠菜者韭祭菜也蓋用薰稱婦之姓曰某氏來婦敢奠嘉菜始為皇舅禮曰仲秋之月命有司趣民收歛務蓄菜始為禦冬之備也左傳曰蘋蘩蘊藻之菜可薦於鬼神可羞於王公爾雅曰菜謂之蔌蔬不熟為饉蔌菜總名見詩, WYG: ''}
