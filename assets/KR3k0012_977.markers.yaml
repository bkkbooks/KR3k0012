  - {type: variant, offset: 1626, length: 399, content: 生以擬供進太宗聞之責其謟媚詔免官又曰太宗時健達獻佛土菜一莖五葉花赤中心正黃而蘂子紫色泥婆羅獻波稜菜葉類紅藍實如蒺藜火熟之能益食味又有酢菜狀似芹而味香渾提蔥其狀猶蔥而甘辛又曰高宗時司農欲以冬藏餘菜賣之百姓以墨勑示僕射蘇良嗣良嗣判曰昔公儀相魯拔去園葵況臨御萬邦而敗蔬鬻菜事遂不行又曰王昇為刑部尚書性貪恡不常在公乃鬻公廨菜園收其價錢以自潤甚為時論所醜又曰中書園蔬日給於眾官者主事白常袞減其數崔祐甫怒訶主事曰此相公之命祐甫大詬曰門下侍郎安得理中書之蔬叱左右踣主事而拽之自是與袞常不平又曰貞元七年冬司農卿李模免官初司農當供三官冬菜二千車以度支給車直稍賤又阻雨菜敗模以度支為辭上責其不先聞故免之先是模奏司農菜不足請京兆府市之尹薛玨萬年令韋彤乃禁人私賣上命奪玨俸一月彤俸三月又曰貞元中奚陟為中書舍人以所得雜給均分省內官又躬親庶務下至園蔬皆悉自點閱人以為難而陟處之無倦莊子曰宣尼窮於陳蔡之間顏回擇菜孔藂子曰菜謂之蔬, SBCK: 反䓗肆耳}
