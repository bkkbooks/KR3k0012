  - {type: variant, offset: 3462, length: 4, content: 恥想忠壯, WYG: 如須臾得薑數斗還以問神人神人曰問李先生當知我博物志曰伏波将軍唐蜀人煞薑法先洒掃别麄細為三軰盛着籠中作沸湯没籠着湯中須臾取一塊横截㫁視其熟否既熟訖便内着甖中細𢷬米末以覆上令薑不見訖以向湯令復沸便相掩消息令甖中當自沸沸便隂乾之又曰姙娠}
