  - {type: variant, offset: 2984, length: 8, content: 春初旱韭秋暮晚菘, SBCK: 蜀薑豈不易得願差所使行者并付以直象自書一符以青竹杖使行人閇目􅀐杖杖止便買薑買薑畢復閉目此人承其言􅀐杖須􅁷止巳到成都不知是何處問从言是蜀市乃買薑于時吴使張温於市見之問曰與帝買薑於是甚驚作書􅀉家比人買薑畢捉書􅀐竹杖閉目復須􅁷巳還到吴厨下切膾亦適了也李先生傳曰郎中喬飜於牛渚遇神人意欲啖薑而市無之神人以絹數匹并書一牒付信入市門南下任意所如須􅁷得薑數斗還以問神人神人曰問李先生當知我􅀶物志曰伏波將軍唐資傳蜀人煞薑法先拪掃別麄細爲三輩盛着籠中作沸湯没籠着湯中須􅁷取一片横截断視如熱否裏旣熱訖便内着甖中細擣米末以覆上令薑不見訖以向湯令復沸使相淹消息視甖中當自沸沸便隂乾之}
  - {type: page-break, offset: 2984, content: '', id: KR3k0012_SBCK_977-7a}
  - {type: variant, offset: 2984, length: 8, content: 春初旱韭秋暮晚菘, krp: 蜀薑豈不易得願差所使行者并付以直象自書一符以青竹杖使行人閇目騎杖杖止便買薑買薑畢復閉目此人承其言騎杖須臾止巳到成都不知是何處問从言是蜀市乃買薑于時吴使張温於市見之問曰與帝買薑於是甚驚作書寄家比人買薑畢捉書騎竹杖閉目復須臾巳還到吴厨下切膾亦適了也李先生傳曰郎中喬飜於牛渚遇神人意欲啖薑而市無之神人以絹數匹并書一牒付信入市門南下任意所如須臾得薑數斗還以問神人神人曰問李先生當知我博物志曰伏波將軍唐資傳蜀人煞薑法先拪掃別麄細爲三輩盛着籠中作沸湯没籠着湯中須臾取一片横截断視如熱否裏旣熱訖便内着甖中細擣米末以覆上令薑不見訖以向湯令復沸使相淹消息視甖中當自沸沸便隂乾之}
