  - {type: variant, offset: 3321, length: 0, content: '', WYG: 常種薤欲以成計有求索不與一莖亦不自食時人謂之能行意世説曰桓公座有叅軍猗蒸薤不時解其食者又不􅂇而猗終不放舉座皆笑又曰蘇峻亂庾公南奔見陶侃雅相重及食庾噉薤因畱白陶問用此何為庾云故可種於是尤相稱歎列仙傳曰務光服蒲薤根荆州圖傳曰筑陽縣有薤山山多}
  - {type: page-break, offset: 3321, content: '', id: KR3k0012_WYG_977-5b, image: WYG0901/WYG0901-0581d.png}
  - {type: variant, offset: 3322, length: 1, content: 韭, WYG: 薤因以為名古詞曰薤上朝露亦何稀潘岳閒居賦曰白薤負霜䔉爾雅曰蒿山䔉今山中多有此菜皆如}
  - {type: punctuation, offset: 3323, content: 。, id: KR3k0012_CHANT_977-bkkpn1109}
  - {type: 'tls:seg', offset: 3323, content: '', id: KR3k0012_CHANT_977-52a.8}
  - {type: variant, offset: 3324, length: 2, content: 往乞, WYG: 家所種説文曰䔉菜之美}
  - {type: punctuation, offset: 3327, content: ，, id: KR3k0012_CHANT_977-bkkpn1110}
  - {type: 'tls:seg', offset: 3327, content: '', id: KR3k0012_CHANT_977-52a.9}
  - {type: variant, offset: 3327, length: 29, content: 神許則風吹制分隨偃而拔不得過越不偃而拔輒凶也楊衒知洛陽茄藍, WYG: 雲夢之葷菜東觀漢}
