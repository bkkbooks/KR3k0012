  - {type: variant, offset: 1278, length: 185, content: 羹口實者必令僮僕走奉其母乃後食焉又曰高閭曾造胡叟叟短褐曳柴從田歸舍為閭設濁酒蔬食皆手自辦案其館宇卑陋園疇褊局而飯菜精潔醯醬調美見其二妾並年衰跛眇衣布穿弊閭見其貧約以衣服直十餘疋贈之亦無辭愧又曰盧義僖性清儉不營財利雖居顯位每至困乏夌飯蔬食忻然甘之三國典略曰北齊主以鄴清風園賜穆提婆於是官無蔬菜賖買於人負錢三百萬其人訴焉斛律光曰此園賜提婆一家足不賜提婆百官足又曰庫狄士文為貝, SBCK: 拜南兖}
