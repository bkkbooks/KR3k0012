  - {type: 'tls:seg', offset: 3459, content: '', id: KR3k0012_CHANT_977-54a.7}
  - {type: variant, offset: 3461, length: 0, content: '', WYG: 二三年漸長枝幹乃為大樹毎夏秋熟則梯樹摘之三年後樹漸老子稀即伐去别栽嫩者薑春秋運斗樞曰旋星散為薑失德逆時即薑有翼辛而不臭也援神契曰薑禦温菜也禮記檀弓上曰䘮有疾食肉飲酒必有草木之滋焉以為薑桂之謂也論語鄉黨曰不撤薑食韓詩外傳曰宋玉因其友見楚相楚相待之無以異讓其友其友曰夫薑桂因地而生不因地而辛女因媒而嫁不因媒而親子之於王未也何怨于我也史記曰萬家之城千畦薑韭與千户侯等魏志曰倭國有薑不知其滋味齊書曰孔琇之為臨川太守在任清約罷郡還獻乾薑二斤武帝嫌其少知琇之清乃歎息梁書曰周捨應對辨㨗嘗居直語及嗜好裴子野言從來未嘗食薑捨應聲曰孔稱不撤裴乃不嘗一坐皆笑呂氏春秋曰和之美者楊樸之薑招揺之桂楊樸地名在蜀郡招揺山名在桂陽越駱之箘神仙傳曰吳孫權曰權使介象作變化種菜瓜百果皆立生可食先主論膾魚何者絶美象曰鯔魚先主曰先生論近道魚耳此出海中安可得乎象曰可得耳乃令人于殿庭中作方塪汲水滿之并求鈎餌之垂綸于塪中不過頃得鯔魚先主驚喜問象曰可食否象曰故為陛下取安敢取不可食之物使厨下切之先主曰聞蜀薑作韲至佳此間薑永不及也恨爾時無此薑爾象曰蜀薑豈不易得願差可使行者并付以直象自書一符以青竹杖使行人閉目騎杖杖止便買薑閉目此人承其言騎杖須臾止已到成都不知是何處問人人言是蜀市乃買薑于時吳使張温見之於市問曰與帝買薑于是甚驚作書寄家此人買薑畢捉書負薑騎杖閉目須臾已還到吳厨切膾亦適了也李先生傳曰郎中喬飜於羊渚遇神人意欲啖薑而市無之神人以絹數疋并書一牒付信入市門南下任意}
