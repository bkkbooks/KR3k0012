  - {type: variant, offset: 2068, length: 145, content: 子出見老丈人戴畚乞焉不與搏而奪之王聞之令皆拘二子將煞之大夫辭曰取畚信有罪然煞之非其罪也君若何煞之言卒丈人造軍而言曰鄧為無道故伐之今君公之子搏而奪吾畚無道甚於鄧乎呼天而號群臣見之言曰討有罪而橫奪非所以禁暴也恃力虐老非所以教幼也愛子棄法非所以保國也私二子滅三行非所以從政也丈人舍之矣謝之軍門之外, SBCK: 物可煑石}
