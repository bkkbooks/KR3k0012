  - {type: variant, offset: 3471, length: 0, content: '', WYG: 極能治冷氣蘇爾雅曰蘇桂荏也方言曰周鄭之間謂之公蕡湘沅之間謂之􅀢沙洲記曰乞佛虜不識五穀惟食蘇采本草經曰芥蒩一名水蘇吳氏曰假蘇一名䑕實一名薑芥也太平御覽卷九百七十七}
