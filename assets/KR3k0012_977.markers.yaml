  - {type: variant, offset: 710, length: 265, content: 始進水漿葬畢不進鹽菜遂毀瘠成疾又曰宗愨以軍功封洮陽侯先是鄉人庾業家豪富侈侯服玉食與賓客相對膳必方丈而為愨設粟飯菜葅謂客曰宗軍人慣噉麤食愨致飽而退初無異辭至是為愨長史帶梁郡愨待之甚厚不以昔事為嫌又曰柳元景為三公時在朝勳貴多事產業唯元景獨無所營南岸有數十畝菜得錢三萬還宅元景怒曰我立此園菜以供家啖耳乃復賣以取錢奪百姓之利耶乃以錢乞守園人又曰王玄謨柳元景桓護之雖並北人而玄謨獨受老傖之目凡諸稱為四方書䟽亦如之嘗為玄謨作四時詩曰堇茹供春膳粟漿充夏飡匏醬調秋菜白醝解冬寒又曰朱脩之姊在鄉里飢寒不立脩之貴為刺史未曾供膳往姊為設菜羹麤飯以激之齊, SBCK: 盛後周}
