  - {type: variant, offset: 245, length: 4, content: 於途傾蓋, SBCK: 者乎戰國䇿曰管燕得罪齊王謂其左右曰子孰能}
  - {type: page-break, offset: 245, content: '', id: KR3k0012_SBCK_475-1b}
  - {type: variant, offset: 245, length: 2, content: 於途, WYG: 孰能與我赴諸侯乎左右莫對管燕漣然流涕曰悲夫士何為其易得而難用也田需對曰士三食不得厭而君鵝鶩有餘食下宫蹈羅紈曵綺縠而士不得以為縁且財者君之所輕死者士之所重君不肯以輕與士而責士以所重事君非士易得而難用也又曰孟嘗君舎人有與君夫人相愛者或以聞孟嘗君曰覩貌相說者人之情也勿言君朞年乃召愛夫人者而謂之曰子與文遊久矣大官未可得小官公不欲衛君與文布衣之交請具車馬皮幣願公以此從衛君逰衛君欲約兵攻齊是人謂衛君曰孟嘗君不臣不肖以臣欺君今君約天下之兵攻齊是足下欺孟嘗君也願君勿以齊為心如不聽臣臣血湔足下衿衛君乃止乂曰中山之君所}
