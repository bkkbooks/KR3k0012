  - {type: 'tls:seg', offset: 1670, content: '', id: KR3k0012_CHANT_475-24a.5}
  - {type: variant, offset: 1674, length: 873, content: 舍勑賜尚書祿以終其壽故人號為白衣尚書又曰包咸字子良永平五年遷大鴻臚每進見錫以机杖入屏不趍贊事不名經傳有疑輒遣小黃門就舍即門顯宗以咸有師傅恩而素清苦常時賞賜珍玩束帛俸祿增於諸卿又曰徐稚字孺子豫章人家貧常自耕稼恭儉義讓所居服其德屢辟公府不起時陳蕃為太守以禮請署功曹稚不免之既謁而退蕃在郡不接賓客唯稚來特設一榻去則懸之後舉有道拜太原太守皆不就袁山松後漢書曰周璆字孟玉為樂城令逍遙無事縣中大治去官徵聘不至陳蕃為太守璆來置榻去懸之續漢書曰皇甫規安定人有以貨買鴈門太守還家書剌謁規規臥不迎既入而問曰卿前在郡食鴈美乎有頃白王符在門規素聞符名乃遽起衣不及帶屐履出迎援符手而還與同坐極忻時人為之語曰徒見二千石不如一縫腋言書生道義之為貴東觀漢記曰顯宗以張酺授皇太子經為東郡太守元和二年東巡狩幸東郡引酺及門生并郡縣掾吏並會夜中帝先備弟子之儀使酺講尚書一篇然後脩君臣之禮賞賜殊特又曰和帝永元三年詔曰高祖功臣蕭曹為首有傳世不絕之義曹相國容城侯無嗣朕甚閔焉望長陵東門見二臣之墓生既有節終不遠身可遣使者以中牢祠大鴻臚悉求近宜為嗣者又曰永平中江革為五官中郎將朝會帝詔使虎貴迎扶腋革每進拜上輒自禮之小有疾輒太官送食寵遇甚厚京師貴戚衛尉順陽侯馬廖侍中竇憲等各奉書致禮遺革終不發書無所當受上以此重之又曰東平憲王蒼上書表薦名士左馮翊桓虞等虛己禮下與參政事又曰上還幸祭遵營時遵病上為重茵席覆以御蓋又曰東平憲王蒼開東閤延英雄袁宏後漢記曰崔駰詣竇憲始及門憲倒屣迎之曰吾受詔交公公何得薄哉魏志曰文帝引故漢太尉楊彪待以客禮詔曰乃祖以來世著名節年過七十行不踰涯可謂老成人矣所宜寵異以彰舊德其賜公延年杖又曰太祖北征烏丸未至先遣使辟田疇又命田豫喻指疇戒其門下趍治裝門人謂曰昔袁公慕君禮命五至君義不屈今曹公使一來而君若恐弗及者何也疇嘆而應之曰此非君所識遂隨使者到軍署司空戶曹椽引見諮談明日出令曰田子泰非吾所宜吏者即舉茂才隨軍又曰管甯遇天下亂往遼東投公孫度度虛館以待之又曰鉅鹿張臶字子明養志不仕廣平太守盧毓到官三日綱紀白承前致板謁致臶毓教曰張先生所謂上不事天子下不友諸侯豈此板謁所可光飾哉但主簿奉書致羊酒之, WYG: ''}
