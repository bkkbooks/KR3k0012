  - {type: variant, offset: 1679, length: 1, content: 祿, SBCK: 令費韋中典軍胡濟等期遊宴嚴駕巳辨而郎中董恢詣允修敬恢年少官微見允停出逡廵求去允不許曰夲所}
  - {type: variant, offset: 1681, length: 1, content: 終, SBCK: 出者欲與同好逰談也今君巳自屈方展闊舎此之談就彼之宴非所謂也乃命解禕等罷駕不行}
  - {type: variant, offset: 1683, length: 2, content: 壽故, SBCK: 守正下士凢此􅀋也吴志曰顧邵當之豫章發在近路㑹張景病時送者百數邵辭賔客曰張仲節有疾􅀂不能來別恨不見之蹔還與訣諸君小相待其留心下士唯善所在皆此􅀋也王隠晉書曰王渾字􅀇仲平呉後據兩州呉}
