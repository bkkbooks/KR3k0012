  - {type: variant, offset: 1258, length: 365, content: 自裏以進休休乃受莽徵去欲見休休稱疾不見莽又曰大將軍既益尊然汲黯與亢禮或說黯曰天子欲群臣下大將軍尊貴誠重君不可不祥黯曰夫以大將軍有揖客反不重耶大將軍聞愈賢黯又曰梁孝王大營宮室為複道自宮連屬於平臺招延四方豪傑自山東遊士莫不至又曰光武側席以求幽人又曰沛公至高陽見酈食其沛公方踞使兩女子洗足食其入即長揖不拜曰足下必欲藂徒合兵誅無道秦不宜踞見長者於是沛公輟洗起衣延食其上坐又曰趙壹字元淑舉郡上計到京師司徒袁逢受計吏皆拜伏庭中莫敢仰視壹獨長揖而已逢令讓之曰計吏而揖三公何也對曰酈食其長揖漢王今揖三公何遽訝哉逢即歛衽下堂執其手延置上坐又曰井太春名丹少通五經善談難故京師為之語曰五經紛綸井太春守靜不交勢利建武中帝子沛獻王輔等五人皆好賓客請丹不能致信陽侯陰就光烈皇后弟也以外戚別使人要劫之丹不得已既至就故為設夌飯蔥菜之食丹推去曰以君侯能供養故來何為, SBCK: ''}
