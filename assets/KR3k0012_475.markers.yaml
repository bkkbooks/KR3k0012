  - {type: variant, offset: 3538, length: 662, content: 雙聘莊子欲以為相莊子曰獨不見未入廟之牲乎衣以文繡食以芻豢出則清道而行止則居帳之內此豈不貴乎及其不免於死宰執旌居前或持在後當此之時雖欲為孤犢從雞鼠遊豈可得乎僕聞之左手據天下之國右手刎其吭愚者不為也環濟吳記曰皇太子登字子高上為選置師傅妙簡俊秀於是諸葛恪張休顧譚陳表等以選入侍誦講詩書其待接僚屬以布衣之禮與恪休譚等咸同輿而載或共床而寢劉縚先聖本紀曰伊尹耕於有莘之野王馳往見之彭氏子諫曰伊尹賤人可徒致之君無辱車乘王曰夫一草之本可已天子病者天子難欣喜食之子誠不欲樂人病也遂黜彭氏之子皇甫士安高士傳曰老萊子楚人耕於蒙山之陽雚葭為牆蓬為屋板木為床蓍艾為席或言楚王楚王遂至老萊子之門曰寡人愚陋獨守宗廟先生幸臨之老萊曰僕山野之人不足以守政又曰亥唐者晉人也晉平公時朝多賢臣祁奚趙武師曠叔向皆為卿大夫名顯諸侯唐獨守道不官隱於窮巷平公聞其賢致禮與相見而請事焉平公待於門唐曰入公乃入唐曰坐公乃坐唐曰食公乃食唐之食公也雖蔬食菜羹公不敢不飽又曰朝福也者涿郡人以行義脩潔著名昭帝時大將軍霍光秉政表顯義士詔郡國條奏行狀天下得福等五人福治義最高以德行徵至京兆病不進會稽典略曰范蠡字少伯越之上將軍也本楚宛三戶人被髮佯狂倜儻負俗文種為宛令遣吏奉謁吏還白范蠡本國狂人生有此病種笑曰吾聞士有賢聖之資必有佯狂之議內有獨見之明外有不知之毀此固非二三子之所知也駕車而往蠡知種之必來謂兄嫂曰今日有客願假衣冠有項種至抵掌而談旁人觀者聳聽說苑曰鄒子說梁王曰伊尹有莘氏之勝臣湯立以為三公管仲城陰之狗盜齊桓以為仲父百里奚乞食於路穆公委之以致甯戚叩轅行歌桓公任之以國太公望出夫朝歌之屠年, SBCK: ''}
