  - {type: variant, offset: 2786, length: 234, content: 又曰太守王明以虞翻為功曹孫策征會稽復命為功曹待以交友之禮蜀志曰先主得諸葛亮情好日密關羽張飛不悅先主解之曰孤之有孔明猶魚之有水也又曰諸葛亮表曰先帝不以臣卑鄙猥自枉屈三顧臣於草廬之中諮臣以當世之務蕭子雲晉書曰明帝以太常桓榮為五更躬式其閭親行養老之禮崔鴻北涼錄曰且渠蒙遜令曰秘書郎中燉煌劉彥明學冠當時道先區內可授玄虛先生拜以三老之禮起陸沉觀於東苑以處之崔鴻前涼錄曰宋纖字令文不應州郡辟命唯與陰顒齊好友善太守楊宣畫其象於閤出入視之崔鴻前秦錄曰符堅要結英豪王景略呂婆樓強汪梁平等, SBCK: 士}
