  - {type: variant, offset: 1664, length: 13, content: 帝東巡過任城乃幸鄭均舍勑賜, SBCK: 皇甫嵩爲三公以身起於汗馬常折節下士也魏書曰劉平結交刺備備不知而待客甚厚客以􅃺語之而去是時人民飢饉屯聚抄略備外禦㓂難内豊財施士之下者必與同席而坐同簋而食無所簡擇衆多歸焉蜀志曰曹公還許先主爲左將軍禮之逾重出同輿坐同席又曰董允嘗與}
