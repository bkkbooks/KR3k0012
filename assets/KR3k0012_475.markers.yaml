  - {type: variant, offset: 374, length: 306, content: 鄒奭者齊諸鄒亦頗採鄒衍之術以紀文於是齊王嘉之自淳於髡以下皆命曰列大夫為開第臨康莊之衢又曰魏有隱士曰侯羸為大梁夷門門者公子聞之於是置酒大會賓客坐定公子從車騎虛左自往迎侯生侯生攝弊衣冠直上上坐公子執轡愈恭又曰成王使由余於秦繆公示以宮室積藂由余曰使鬼為之則勞神矣使人為之亦苦人矣繆公於是與由余曲席而坐傳器而食又曰百里奚曰臣友蹇叔賢而時莫知繆公使人厚幣迎蹇叔以為上大夫又曰伊尹名阿衡或云處士湯使聘迎之五反然後肯往又曰騮子如燕昭王擁篲先驅請列弟子之坐而受業又曰越石父賢在縲紲之中晏子出遇之途解左驂贖之載歸弗謝入門久之越石父請絕晏子懼然攝衣冠謝又曰楚威王聞莊周賢使使厚幣迎之許以為相又曰趙良說商君曰夫五羖大夫荊之鄙人也聞穆公, SBCK: 朱􅀶}
