  - {type: variant, offset: 3324, length: 0, content: '', SBCK: 曰楚時子發好求􅇊道之士士有術者無不養楚有善爲偷者徃見曰臣楚市偷也願以􅇊該一卒該備也一卒一人後無幾何齊興兵伐楚於是市偷進請曰臣有薄􅇊願爲君行之子發曰諾不問其辭而遣之偷則夜出解齊將軍之帷而獻之子發因使人歸之曰卒有出採薪者得將軍之帷謹歸之於執事明夕復往取其枕子發又使歸之明夕復因取􅆪又使歸之於是齊師大駭將軍與軍吏謀之曰今夕不去楚軍恐取吾首即還師而去故􅇊無細薄在人君用之又}
