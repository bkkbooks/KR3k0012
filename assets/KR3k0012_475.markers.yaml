  - {type: variant, offset: 4202, length: 548, content: 而相周九十而封齊故詩云綿綿之葛在于曠野良工得之以為絺紘良工不得枯死於地又曰齊桓公設庭燎為士之欲造者朞年而士不至東野鄙人有以九九之術見者桓公曰九九足以見乎對曰臣非以九九為足以見也臣聞主君設庭燎以待士朞年而士不至夫士之所以不至者君天下賢君也四方之士皆自不及君故不至也夫九九薄能耳而君猶禮之況賢於九九者乎桓公曰善乃因禮之朞月四方之士相攜而至矣又曰齊桓公使管仲治國管仲對曰賤不能臨貴公以為上卿而國不治桓公曰何故管仲對曰貧不能禦富桓公賜之齊市租一年而國不治桓公曰何故曰䟽不能制近桓公立以為仲父齊國大安而遂霸天下孔子曰管仲之賢而不得此三權者亦不能使其君南面而伯又曰燕昭王問於郭隗曰寡人地狹民寡齊人削取八城匈奴驅樓煩之下以孤之不肖得承宗廟恐危社稷存之有道乎郭隗對曰帝者之臣其名臣其實師也王者之臣其名臣其實友也霸者之臣其名臣其實僕也亡國之臣其名臣其實虜也今王將東面目指氣使以求臣則廝役之才至矣北面等禮不乘之以勢求臣則朋友之才至矣西面逡巡以求臣即師傅之才至矣誠欲興道隗請為天下之士開路於是燕王置郭隗為上客又曰宋司城子罕之貴子韋也人與共養出與同衣司城子罕亡子韋不從復召子韋而貴之左右曰君善子韋也亡不後來貴之君獨不愧於君之忠臣乎子罕曰吾唯不用子韋故至於亡今吾之得復尚是子韋之遺德餘教也又曰楊回北見趙簡子曰臣居鄉三逐事君, SBCK: ''}
