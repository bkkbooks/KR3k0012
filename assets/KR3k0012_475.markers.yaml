  - {type: variant, offset: 4751, length: 672, content: 去聞君好士故走來見簡子聞之絕食而歎左右進諫曰居鄉三逐是不容眾也事君五去是不忠上也簡子曰子不知也夫美女醜婦之仇盛德君子亂世所疏也正直之行邪枉所憎也遂出見之因授以為相而國大治又曰朝無人猶鴻鵠之無羽翼也劉向新序曰魏文侯過段干木之閭而軾其僕曰君何為軾曰段干木蓋賢者安敢不軾且吾聞段干木未肯以己易寡人之貴也段干木光乎德寡人光於地干木富於義寡人富乎財地不如德財不如義寡人當事之世說曰陳仲舉為豫章太守至便問徐孺子所在欲先省之主簿曰群情欲府君先入廨陳曰武王軾商容之閭席不暇暖吾之禮賢有何不可又曰何晏為吏部尚書有位望時談客盈坐王弼未弱冠往見之聞弼來乃到屣迎之邴原別傳曰原字根短上北伐單于還住昌國原至門下通謁上甚喜覽履而起遠出迎原曰誠副飢虛之心虞老叔高士傳曰宋少文博學善屬文清心簡務宋高祖領荊州辟為主簿少文不應高祖乃徹衛率爾從之遊延登第樹聽其高談歎曰不知禮乃覺心明張璠漢記曰荀爽兄弟八人時人謂之八龍舊居豪里縣令苑康曰昔高陽氏有才子八人署其里曰高陽里葛洪西京雜記曰公孫弘自以布衣為宰相乃開東閤營客館以招天下之士阮籍秦記曰昔子夏處西河之上而文侯擁彗鄒子居黍谷之陰而昭王陪乘夫布衣窮居韋帶之士王公大人所以屈體而下之者為道存也葛洪西京雜記曰公孫弘營客館以招天下之士其名曰欽賢之館以待大賢次曰翹材之館以待真材次接士之館以待國士又曰文帝為太子立思賢苑以招賓客虞預會稽典錄曰陳囂山陰人宗正劉向黃門侍郎揚雄薦囂德義可厲薄俗孝成皇帝特以公車徵囂時已年七十每朝請上常待以師傅之禮又曰光武嘗出南郊嚴遵曳長裾持鹿扇住立不動天子下車揖而別曹植公讌詩曰公子敬愛客終宴不知疲清夜游西園飛蓋相追隨, SBCK: ''}
