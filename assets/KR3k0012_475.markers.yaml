  - {type: variant, offset: 329, length: 0, content: '', SBCK: 西伯敬老慈少禮下賢者日中不暇食以待士伯夷叔齊太顚閎夭冝生之徒皆歸之又曰齊宣王喜文學遊􅀃之士如鄒衍淳于髠之徒七十六人皆賜第上大夫是以齊稷下學士復盛又曰帝召田横乃與其客二人乗傳詣雒陽未至戸郷廐置横謝使者遂自刎令客奉其頭從使者奉之髙帝拜二客爲都尉以王禮葬橫二客穿其冢旁孔自刎下從之海中五百人聞橫死皆自殺於是乃知田橫兄弟能待士也又曰孟嘗君在薛招致諸侯賔客及亡人有罪者皆歸孟嘗君孟嘗君舎業厚遇之以故傾天下之士食客數千人無貴賤一與之等孟嘗君待客夜食有人蔽火光客怒以飯不等輟辭去孟嘗起自取其飯比之客慙自剄又曰信陵君爲人仁而下士士無賢不肖皆謙而禮交之不敢以其冨貴驕士士以此方數千里争歸之又曰鄒陽上書梁王曰蘇􅁗相燕燕人惡之於王按劒而怒食以駃騠白圭顯於中山人惡之魏文侯投以夜光之壁何則兩主二臣剖心折肝相信豈移於浮辭哉又曰}
  - {type: page-break, offset: 329, content: '', id: KR3k0012_SBCK_475-2b}
  - {type: variant, offset: 329, length: 0, content: '', WYG: 西伯敬老慈少禮下賢者日中不暇食以待士伯夷叔齊太顛閎夭散宜生之徒皆歸之又曰齊宣王喜文學遊說之士自如鄒衍淳于髠之徒七十六人皆賜列第為上大夫是以齊稷下學士復盛又曰帝召田横乃與其客二人乘傳詣雒陽未至户鄉廐置横謝使者遂自刎令客奉其頭從使者奉之高帝拜二客為都尉以王禮葬横二客穿其冡旁孔自刎而從之海中五百人聞横死皆自殺於是乃知田横兄弟能得士也又曰孟嘗君君在薛招致諸侯賔客及亡命有罪者皆歸孟嘗君孟嘗君舍業厚遇之以故傾天下之士食客數千人無貴賤一與之等孟嘗君待客夜食有人蔽火光客怒以飯不等輙辭去孟嘗君起自以其飯比之客慙自剄又曰信陵君為人仁而下士士無賢不肖皆謙而禮交之不敢以其富貴而驕士士以此方數千里爭歸之又曰鄒陽上書梁王曰蘇秦相燕燕人惡之於王按劒而怒食以駃騠白圭顯於中山人惡之魏文侯投以夜光之璧何則兩主二臣剖心析肝相信豈移於浮辭哉又曰}
