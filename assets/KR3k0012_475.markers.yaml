  - {type: variant, offset: 1694, length: 3, content: 包咸字, SBCK: 賈思伯性謙和傾身禮士雖在街途停車下馬接誘恂恂曽無倦色客有謂思伯曰公今貴重寕能不驕伯曰衰至便驕何常之有當時以爲雅言唐書李勉禮賢下士終始盡心以名士季廵張叅爲判官卒於幕三歲之内每遇宴飲必設虚位於筵次陳膳執酹辭色悽惻論者美之又曰裴度以平賊報國爲巳任自德宗朝宰相歸私第百官不敢及門度以方討不庭宰臣冝日接多士兾有所得因奏請私家通賔客上方屬意遂許之四方布衣盡得以䇿畫干丞相至今宰臣私接士因度之請也又曰楊炎樂賢下士以汲引爲己任天下士}
