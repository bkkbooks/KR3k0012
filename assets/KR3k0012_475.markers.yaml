  - {type: variant, offset: 240, length: 0, content: '', SBCK: 喟然歎曰向使銅鞮伯華無死天下其定矣子路曰由願聞其人子曰其㓜也敏而好學其壯也有勇而不屈其老也有道而能下人有此三者以定天下何難乎子路曰㓜而好學壯而有勇則其可也􅀂夫有道誰下哉子曰由汝不知也吾聞以衆攻寡無不克也以貴下賤無不得也昔者周公居􅃁宰}
  - {type: variant, offset: 240, length: 0, content: '', WYG: 喟然嘆曰向使銅鞮伯華無死天下其定矣子路曰願聞其為人子曰其㓜也敏而好學其壯也有勇而不出其老也有道而能下人有此三者以定天下何難乎子路曰㓜而好學壯而有勇則其可也若夫有道誰下哉子曰由汝不知也吾聞以衆攻寡無不克也以貴下賤無不得也昔者周公居冡宰}
