  - {type: variant, offset: 1692, length: 980, content: 親之義斯蓋御寓長策經邦茂軌朕受命上靈克纂洪業庶幾前烈永致和平睠彼吐蕃僻在西服皇運之始早申朝貢太宗文武聖皇帝德侔覆載情深億兆思偃兵甲遂通姻好數十年間一方清淨自文成公主化往其國因多變革我之邊隅亟興師旅彼之蕃落頗聞凋弊頃者贊普及祖母可敦酋長等屢披誠款積有歲時思託舊親請崇親好金城公主朕之少女豈不鍾念但為人父母志恤黎元若允乃誠祈更敦和好則邊土寧晏兵役休息遂割深慈為國大計築茲外館聿膺嘉禮降彼吐蕃贊普即以今月進發朕親自送于郊外命大將軍楊矩使焉其月帝幸始平縣以送公主設帳殿於百頃泊側引王公宰臣賦詩餞別改始平縣為金城縣改其地為鳳池鄉又曰開元二年秋吐蕃大將蚠達延乞力徐等率眾十餘萬寇臨洮軍又進寇蘭渭等州掠監牧羊馬而去玄宗令攝左羽林將軍薛訥及太僕少卿王晙率兵邀擊之仍下詔將大舉親征召募將士克期進發俄而晙等與賊相遇于渭源之武階驛前軍王海濱力戰死之晙等乘之而進大破吐蕃之眾殺數萬人盡收得所掠羊馬賊餘黨奔北相枕藉而死洮水為之不流上遂停親征命紫微舍人倪若水往按軍實仍吊祭王海濱而還又曰開元十七年玄宗遣皇甫惟明等使土蕃惟明等既見贊普及公主具宣上意贊普等欣然請和盡出貞觀已來前後勑書以示惟明等令其重臣名悉獵隨惟明入朝上表曰外甥是先皇帝宿親又蒙降金城公主遂和同為一家天下百姓普皆安樂中間為張玄表李知古等東西兩處先動兵馬侵抄吐蕃邊將所以互相征討迄至今日遂成釁隙外甥以先代文成公主今金城公主之故深識尊卑豈敢失禮又緣年小枉被邊將讒搆鬭亂令舅致怪伏乞垂察追留死將万足承前數度使人入朝皆被邊將不許所以不敢自奏去冬公主遣使人婁眾失若將狀專往蒙降使看公主來外甥不勝喜荷謹遣論名悉獵及副使押衙將軍浪些紇夜悉獵入朝奏取進百兩國事意悉獵所具外甥蕃中已處分邊將不許抄掠若有漢人來投便令卻送伏望皇帝舅遠察赤心許從舊好長令百姓快樂如蒙聖恩千年万歲外甥終不敢先違盟誓謹奉進金胡瓶一金盤一椀一馬腦盃一零羊衫叚一謹充微國之禮金城公主又別進金鴨盤盞雜器物等十八年十月名悉獵等至京師上御宣政殿列羽林仗以見之悉獵頗曉書記先曾迎金城公主至長安當時朝廷皆稱其材辯及是上引入內宴與語甚禮之賜紫袍金帶及魚袋并時服繒綵銀盤胡瓶等仍於別館供擬甚厚悉獵受袍帶器物而卻進魚袋辭曰本國無此章服不敢當殊異之賞上喜而許之詔御史大夫崔琳充使報聘仍於赤嶺各豎分界之碑約以更不相侵時吐蕃使奏云公主請毛詩禮記左傳文選各一部制令秘書省寫與之正字于休烈上䟽諫曰臣聞, SBCK: ''}
