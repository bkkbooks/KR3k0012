  - {type: variant, offset: 44, length: 2, content: 鹿孤, SBCK: 金錫竹箭之屬害神姧鑄鼎所象百物也又曰司􅀠掌五􅀠之法辨其物而掌其政令五􅀠謂罪􅀠四狄之屬也物衣服兵器之屬夷􅀠掌養牛馬與鳥言鄭司農云東夷狄之人或曉鳥獸之言故春秋傳曰介􅁑盧聞牛鳴曰是生二犧皆用矣是以夷􅀠職掌與獸言傳曰北戎侵鄭鄭伯禦之公子突曰戎輕而不整貪而無親勝不相讓敗不相救又曰晉里克帥師梁由靡御以敗狄于采桑平陽北屈縣西南}
