  - {type: variant, offset: 2684, length: 0, content: '', SBCK: 子其受之魏絳於是乎始有金石之樂禮也又曰魯襄公十八年白狄始來白狄狄之別各未嘗與魯掠故日始來也又曰晉荀吴帥師敗狄于大鹵大鹵太原晉陽縣也又曰晉中行穆子敗無終及群狄于太原即大鹵也無終山}
  - {type: variant, offset: 2684, length: 0, content: '', WYG: 子其受之魏絳扵是乎始有金石之樂禮也又曰魯襄公十八年白狄始來又曰晉荀呉帥師敗狄于大鹵又曰晉中行穆子敗狄無終及羣狄于太原将戰魏舒曰彼徒我車所遇又阨以什共車必克乃毁車以為行為五陣以相離兩扵前伍扵後専為右角參為左角偏為前拒以誘之狄人笑之未陣而薄之大敗之又曰晉梁丙率隂}
  - {type: page-break, offset: 2684, content: '', id: KR3k0012_WYG_799-5b, image: WYG0900/WYG0900-0103d.png}
  - {type: variant, offset: 2684, length: 0, content: '', krp: 子其受之魏絳於是乎始有金石之樂禮也又曰魯襄公十八年白狄始來白狄狄之別各未嘗與魯掠故日始來也又曰晉荀吴帥師敗狄于大鹵大鹵太原晉陽縣也又曰晉中行穆子敗無終及群狄于太原即大鹵也無終山}
  - {type: variant, offset: 2685, length: 0, content: '', SBCK: 也將戰魏舒曰彼徒我車所遇又阨地険不便車以什共車不克更増十人以當一車}
  - {type: variant, offset: 2685, length: 0, content: '', WYG: 伐頴王使詹桓伯辭于晉曰我在伯父猶衣服}
  - {type: variant, offset: 2685, length: 0, content: '', krp: 也將戰魏舒曰彼徒我車所遇又阨地険不便車以什共車不克更増十人以當一車}
  - {type: variant, offset: 2686, length: 0, content: '', SBCK: 用乃毀車以爲行毀車爲歩陣爲五陣以相離兩於前伍於後專爲右角參爲左角偏爲前拒皆臨時處能用善謀以誘之狄人􅀏之􅀏其失常未陣而薄之大敗之傳言荀吴能用善謀又曰晉梁丙率隂戎伐潁潁周邑王使詹桓伯辝於晉曰我在伯父猶衣服之有冠冕木水之有本原民人之有謀主也民人謀主宗族之師長伯父􅀂裂冠毀冕拔本塞源專弃謀主雖戎狄其何有余一人伯父猶然則難戎狄無所可責又曰晉荀吴僞㑹齊師者假道于鮮虞遂入􅀳陽鮮虞白狄別種晉陽肥國滅肥以肥子縣皐歸肥白狄也縣皐其君名鉅鹿下曲陽西南有肥累城又曰晉荀吴帥師伐鮮虞圍皷三日皷人告食竭力盡而後取之克皷而反不戮一人以皷子鳶鞮歸鳶鞮皷名也又曰晉荀躒如周葬穆后籍談爲介王求彛器籍談曰晉居深山戎狄之與隣而逺於王室王靈不及拜戎不暇其何以献器王曰叔父唐叔成王之母弟也宻湏之皷與其大路文所以蒐也宻湏折姓國也文王伐之得其路鼔以蒐闕鞏之甲武所以克啇也闕鞏國所出鎧唐叔受之處叅虚撫有戎狄參實沈之次晉之分野又曰晉侯訓兵於稷以略狄土􅂖梁傳曰中國夷狄曰大鹵爾雅曰北至于祝栗左極逺之國又曰觚竹北户西王母曰下謂之四荒觚竹在北地户在南西王母在西日下在東西方昏荒之國又曰九夷八狄七戎六蠻謂之四海八狄在北又曰北載斗極爲空桐載值也空桐之人武地氣使之然也論語曰管仲相桓公覇諸侯一匡天下民到于今受其賜微管仲吾其􅀍髮左袵矣無管仲則君不君臣不臣皆爲夷狄又曰子曰夷狄之有君不如諸夏之亡也國語曰鄭人伐滑王使游孫伯請滑鄭人執之王怒將以狄伐鄭狄隗姓之國也冨辰諌曰不可夫狄無列於王室列位次也豺狼之德也王不忍小忿而弃鄭又登叔隗以階狄階狄禍狄封豕豺狼不可厭也厭足也王弗聽十八年王黜狄后於王子帯故也狄人來誅殺譚伯狄人奉子帶攻王而殺譚伯􅀄惠后欲立王子帶故以其黨啓狄人狄人遂入周王乃出居于鄭又曰晉侯使隨㑹聘于周王饗之餚蒸原公相禮范子私於原公曰吾聞王室之禮無毀折今此何禮也原公以告于王主召士季范子字也曰親戚宴饗則有餚蒸蒸外也升折俎之餚也唯戎狄則有體薦夫戎狄冒没輕儳貪而不讓冒抵觸也没入也儳進退無列其血氣不治􅀂禽獸焉其適來班貢不俟馨香嘉味適往也班賦也故坐諸門外而使舌人體委與之舌人能逹異方之志象咠之官汝今我王室之一二兄弟以時相見於是乎有折俎加豆加豆謂旣食之後所加之豆也其實芹俎莬醢之属以示容合好胡有効戎狄也又曰驪􅁎曰以臯落狄之朝夕苛我邊鄙臯落東山狄苛擾也君盍使申}
