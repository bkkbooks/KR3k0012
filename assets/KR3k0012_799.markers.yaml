  - {type: 'tls:seg', offset: 24, content: '', id: KR3k0012_CHANT_799-1a.6}
  - {type: variant, offset: 24, length: 0, content: '', SBCK: 六月時也以此出征至春凍始釋而來反又曰執訊獲醜薄言還歸訊言醜衆也執}
  - {type: variant, offset: 24, length: 0, content: '', WYG: 辨}
  - {type: variant, offset: 24, length: 0, content: '', krp: 六月時也以此出征至春凍始釋而來反又曰執訊獲醜薄言還歸訊言醜衆也執}
  - {type: variant, offset: 25, length: 3, content: 種落莫, SBCK: 可言問所獲之衆以歸者當献之赫赫南仲玁狁于夷夷平也又曰六月宣王北伐也六月言周室微而復興美宣王之北伐也六月棲棲戎車旣飭四牡騤騤載是常服棲棲簡閱皃飭正也日月爲常服戎服也記六月者盛夏出兵明其急也玁狁孔熾我是用急熾盛也此序吉甫之意也北狄來侵甚熾故王以急遣我又曰玁狁匪茹整居焦穫侵鎬及方至于涇陽焦穫周地名也接于獫狁者也匪非也茹度也鎬與方皆北方地名言獫狁之來侵非其所當度爲也乃自整齊而處周之焦穫來侵至涇水之北言其太恣也又曰薄伐玁狁至于太原言遂出之而巳又曰文武􅁻甫萬􅀖爲憲􅁻甫尹吉甫也有文有武憲法也吉甫此時大將也􅁻甫燕喜旣多受祉吉甫尹吉甫也有文祉福也􅁻甫旣伐獫狁而歸天子以燕禮樂之則歡喜矣又多受賞賜也又曰顯允方叔征伐玁狁方叔先與吉甫征伐獫狁又曰車攻宣王復古也宣王能内脩政事外攘夷狄復文武之境土又曰漸漸之石下國刺幽王也戎狄叛之山石漸漸然髙峻不可登而上喻戎狄衆強而無禮義不可得而復也又曰何草不黄下國刺幽王也四夷交侵中國背叛用兵不息視民如禽獸用兵不息自歳始至晚歳何草不黄禮曰北方曰狄衣羽毛穴居有不粒食者周禮曰職方氏掌天下之圖以掌天下之地辨其􅀖國都鄙四夷八蠻七閩九貉五戎六狄之人民與其財用九􅂖六畜之數要周}
