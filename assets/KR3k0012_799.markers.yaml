  - {type: punctuation, offset: 396, content: 『, id: KR3k0012_CHANT_799-bkkpn88}
  - {type: variant, offset: 396, length: 792, content: 爾等咸須同心勠力共保我家惟天地神衹共知爾志有負此盟使爾身體屠裂同於此牲其地氣候大寒不生秔稻有青䴹音果麥䝁豆小夌蕎麥畜多犛牛豬犬羊馬又有天鼠狀如雀鼠其大如猫皮可為裘又多金銀銅錫其人或隨畜牧而不常厥居然頗有城郭其國都城號為邏些城屋皆平頭高者至數十尺貴人處於大氈帳名為拂廬寢處汙穢絕不櫛沐接手飲酒以氈為盤捻麩為椀實以羹酪并而食之多事羱羝之神人信巫覡不知節候夌熟為歲首圍碁六慱吹蠡鳴鼓為戲弓劍不離身重壯賤老母拜於子子倨於父出皆少者前老者後軍令嚴肅每戰前隊皆死後隊方進重兵死惡疾終累代戰沒以為甲門臨陣敗死者懸狐尾於其首表其似狐之怯稠人廣眾必以徇焉其俗恥之以為次死拜必兩手據地作狗吠之聲以身再揖而止居父母喪截髮青黛塗面衣服皆黑既葬即吉其贊普死以人殉葬衣服珍翫及常所乘馬弓劍之類悉埋之又曰貞觀八年其贊普棄宋弄讚始遣使朝貢弄讚弱冠嗣位性驍武多英略其鄰國羊同及諸羗並賓伏之太宗遣行人馮德遐往撫慰之見德遐大悅聞突厥及吐谷渾皆尚公主乃遣使獻金隨德遐入朝多齎金寶奉表求婚太宗未之許又曰弄讚常率眾二十餘萬頓於松州西境遣使貢金帛云來迎公主太宗遣吏部尚書侯君集等擊破之弄讚大懼遣使謝罪因復請婚太宗許之弄讚乃遣其相祿東贊至禮獻金五千兩自餘寶玩數百事貞觀十五年太宗以文成公主妻之令禮部尚書江夏郡王道宗主婚持節送公主于吐蕃弄讚率其部兵次柏海親迎于河源見王人執子壻之禮甚恭既而歎大國服飾禮儀之美俯仰有愧沮之色及與公主歸國謂所親曰我祖父未有通婚上國者今我得尚大唐公主為幸實多當為公主築一城以誇示後代遂築城邑立棟宇以居處焉公主惡其人赭面弄讚令國中權且罷之身亦釋氈裘襲紈綺漸慕華風仍遣酋豪子弟請入國學以習詩書又請中國識文之人典其表䟽又曰太宗伐遼東還弄讚遣祿東贊來賀奉表曰聖天子平定四方日月所照之國並為臣妾而高麗恃遠闕於臣禮天子自領百萬渡遼致討隳城陷陣指日凱還夷狄纔聞陛下發駕少進之間已聞歸國鷹飛迅越不及陛下速疾奴忝預子壻喜百常夷, SBCK: ''}
