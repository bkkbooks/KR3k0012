  - {type: variant, offset: 2687, length: 1, content: 心, SBCK: 伐狄􅀂不勝狄雖濟其罪可也且夫勝狄諸侯驚懼吾邊鄙不警公說使申生伐東山至稷桑稷桑臯落狄地狄人出逆申生欲戰狐突諌曰不可果戰敗狄於稷桑又曰公令閹楚刺重耳重耳逃於狄狄北狄隗姓又曰襄王避叔帶之難居于鄭地汜子犯曰君盍納王公乃行貽于草中之戎驪土之狄以啓東道二邑戎狄在晉之東也尚書大傳曰狄人將攻大王亶父亶父召􅂄老而問曰狄人何欲􅂄老對曰欲得菽粟財貨太王曰與之毎與而狄人之至不止太王問􅂄老曰狄人又何欲􅂄老曰又欲土地太王曰與之􅂄老曰君不爲社稷乎太王曰社稷所以爲民也}
  - {type: page-break, offset: 2687, content: '', id: KR3k0012_SBCK_799-6a}
  - {type: variant, offset: 2687, length: 1, content: 心, WYG: 伐狄若不勝狄雖無濟其罪也可且夫勝狄諸侯驚懼吾邊鄙不警公說使申生伐東山至稷桑狄人出逆申生欲戰狐突諫曰不可果戰敗扵稷桑又曰公令閹楚刺重耳逃扵狄又曰襄王昭叔𢃄之難居扵鄭地杞子犯曰君盍納王公乃行賂于草中之戎驪土之狄以啓東道尚書大𫝊曰狄人將攻太王亶父亶父召耆老而問曰狄入何欲耆老對曰欲得菽粟財貨太王曰與之每與而攻不免太王問曰狄人又何欲耆老曰欲君之土地太王曰樂與之耆老曰君不為社稷乎太王曰社稷所以為民也}
