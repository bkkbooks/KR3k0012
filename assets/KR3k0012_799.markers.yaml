  - {type: 'tls:seg', offset: 18, content: '', id: KR3k0012_CHANT_799-1a.5}
  - {type: variant, offset: 21, length: 1, content: 羗, SBCK: 伯將遣戍役先與之期以采薇之時今薇生矣可以行矣重言来薇丁寧行期也曰歸曰歸歳亦暮止又丁寧歸期定其心也靡室靡家玁狁之故不遑啓居玁狁之故玁狁北狄也古者師出不踰時今薇生而行歲晚乃歸使汝無室家夫婦之道不暇跪居者有玁狁之難也又曰我戍未定靡使歸聘聘問也定止也我方守於北折狄未得止息無所使歸問言所以憂又曰戎車歸駕四牡業業豈敢定居一月三捷一月之中三有勝功謂侵也伐也戰也又曰豈不日戒玁狁孔􅁄戒警勑軍事也孔甚􅁄急也言君子小人豈不日相警戒乎獫狁之難甚急預􅄒其苦以勸之又曰王命南仲往城于方出車彭彭旂旐央央王殷王也南仲文王之屬方朔方近獫狁之國也彭彭駟馬貌王使南仲爲將率往築城於朔方爲軍壘以禦北狄之難天子命我城彼朔方赫赫南仲玁狁于襄襄除也又曰昔我往矣􅁰稷方華今我來思􅀨雪載塗王事多難不遑啓居􅂗凍釋也􅁰稷方華朔方}
  - {type: page-break, offset: 21, content: '', id: KR3k0012_SBCK_799-1b}
  - {type: variant, offset: 21, length: 1, content: 羗, krp: 伯將遣戍役先與之期以采薇之時今薇生矣可以行矣重言来薇丁寧行期也曰歸曰歸歳亦暮止又丁寧歸期定其心也靡室靡家玁狁之故不遑啓居玁狁之故玁狁北狄也古者師出不踰時今薇生而行歲晚乃歸使汝無室家夫婦之道不暇跪居者有玁狁之難也又曰我戍未定靡使歸聘聘問也定止也我方守於北折狄未得止息無所使歸問言所以憂又曰戎車歸駕四牡業業豈敢定居一月三捷一月之中三有勝功謂侵也伐也戰也又曰豈不日戒玁狁孔棘戒警勑軍事也孔甚棘急也言君子小人豈不日相警戒乎獫狁之難甚急預𫐠其苦以勸之又曰王命南仲往城于方出車彭彭旂旐央央王殷王也南仲文王之屬方朔方近獫狁之國也彭彭駟馬貌王使南仲爲將率往築城於朔方爲軍壘以禦北狄之難天子命我城彼朔方赫赫南仲玁狁于襄襄除也又曰昔我往矣黍稷方華今我來思雨雪載塗王事多難不遑啓居塗凍釋也黍稷方華朔方}
