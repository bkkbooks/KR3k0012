  - {type: variant, offset: 557, length: 2029, content: 多事羱羝之神人信巫覡不知節候夌熟為歲首圍碁六慱吹蠡鳴鼓為戲弓劍不離身重壯賤老母拜於子子倨於父出皆少者前老者後軍令嚴肅每戰前隊皆死後隊方進重兵死惡疾終累代戰沒以為甲門臨陣敗死者懸狐尾於其首表其似狐之怯稠人廣眾必以徇焉其俗恥之以為次死拜必兩手據地作狗吠之聲以身再揖而止居父母喪截髮青黛塗面衣服皆黑既葬即吉其贊普死以人殉葬衣服珍翫及常所乘馬弓劍之類悉埋之又曰貞觀八年其贊普棄宋弄讚始遣使朝貢弄讚弱冠嗣位性驍武多英略其鄰國羊同及諸羗並賓伏之太宗遣行人馮德遐往撫慰之見德遐大悅聞突厥及吐谷渾皆尚公主乃遣使獻金隨德遐入朝多齎金寶奉表求婚太宗未之許又曰弄讚常率眾二十餘萬頓於松州西境遣使貢金帛云來迎公主太宗遣吏部尚書侯君集等擊破之弄讚大懼遣使謝罪因復請婚太宗許之弄讚乃遣其相祿東贊至禮獻金五千兩自餘寶玩數百事貞觀十五年太宗以文成公主妻之令禮部尚書江夏郡王道宗主婚持節送公主于吐蕃弄讚率其部兵次柏海親迎于河源見王人執子壻之禮甚恭既而歎大國服飾禮儀之美俯仰有愧沮之色及與公主歸國謂所親曰我祖父未有通婚上國者今我得尚大唐公主為幸實多當為公主築一城以誇示後代遂築城邑立棟宇以居處焉公主惡其人赭面弄讚令國中權且罷之身亦釋氈裘襲紈綺漸慕華風仍遣酋豪子弟請入國學以習詩書又請中國識文之人典其表䟽又曰太宗伐遼東還弄讚遣祿東贊來賀奉表曰聖天子平定四方日月所照之國並為臣妾而高麗恃遠闕於臣禮天子自領百萬渡遼致討隳城陷陣指日凱還夷狄纔聞陛下發駕少進之間已聞歸國鷹飛迅越不及陛下速疾奴忝預子壻喜百常夷夫鵝猶鴈也故作金鵝奉獻其鵝黃金鑄成高七尺中可實酒三斛又曰高宗嗣位授弄讚為駙馬都尉封西海郡王賜物二千叚弄讚因致書與司徒長孫無忌等云天子初即位若臣下有不忠之心者當勒兵以赴國并獻金銀珠寶十五種高宗嘉之進封為王賜雜綵三千叚因請蚕種及造酒碾磑紙墨之匠並許焉又曰高宗聞劉審禮等敗召侍臣問以綏禦之策中書舍人郭正一曰吐蕃作梗年歲已深命將興師相繼不絕空勞士馬虛費糧儲近討則徒損兵威深入則未窮巢穴臣望少發兵募且遣備邊明立烽候勿令侵抄使國用豐足人心叶同寬之數年可一舉而滅給事中劉齊賢皇甫文亮等皆言嚴守之便又曰長壽元年武威軍揔管王孝傑大破吐蕃之眾克復龜茲于闐踈勒碎葉等四鎮乃於龜茲置安西都護府發兵以鎮守之又曰聖曆三年番將贊婆率所部千餘人及其兄弟莽布支等來降則天遣羽林飛騎郊外迎之授贊婆輔國大將軍行右衛大將軍封歸德郡王優賜甚厚又曰神龍元年贊普之祖母遣其大臣悉董然來獻方物為其孫請婚中宗以所養雍王守禮女為金城公主許嫁與之自是頻歲貢獻景龍三年十一月又遣其大臣尚贊吐等來逆女中宗宴之于苑內毬塲命駙馬都尉楊慎交與吐蕃使打毬中宗率侍臣以觀之四年正月下制曰聖人布化用百姓為心王者垂仁以八荒無外故能光宅遐邇財成品物由是隆周理曆恢柔遠之圖強漢乘時建和親之義斯蓋御寓長策經邦茂軌朕受命上靈克纂洪業庶幾前烈永致和平睠彼吐蕃僻在西服皇運之始早申朝貢太宗文武聖皇帝德侔覆載情深億兆思偃兵甲遂通姻好數十年間一方清淨自文成公主化往其國因多變革我之邊隅亟興師旅彼之蕃落頗聞凋弊頃者贊普及祖母可敦酋長等屢披誠款積有歲時思託舊親請崇親好金城公主朕之少女豈不鍾念但為人父母志恤黎元若允乃誠祈更敦和好則邊土寧晏兵役休息遂割深慈為國大計築茲外館聿膺嘉禮降彼吐蕃贊普即以今月進發朕親自送于郊外命大將軍楊矩使焉其月帝幸始平縣以送公主設帳殿於百頃泊側引王公宰臣賦詩餞別改始平縣為金城縣改其地為鳳池鄉又曰開元二年秋吐蕃大將蚠達延乞力徐等率眾十餘萬寇臨洮軍又進寇蘭渭等州掠監牧羊馬而去玄宗令攝左羽林將軍薛訥及太僕少卿王晙率兵邀擊之仍下詔將大舉親征召募將士克期進發俄而晙等與賊相遇于渭源之武階驛前軍王海濱力戰死之晙等乘之而進大破吐蕃之眾殺數萬人盡收得所掠羊馬賊餘黨奔北相枕藉而死洮水為之不流上遂停親征命紫微舍人倪若水往按軍實仍吊祭王海濱而還又曰開元十七年玄宗遣皇甫惟明等使土蕃惟明等既見贊普及公主具宣上意贊普等欣然請和盡出貞觀已來前後勑書以示惟明等令其重臣名悉獵隨惟明入朝上表曰外甥是先皇帝宿親又蒙降金城公主遂和同為一家天下百姓普皆安樂中間為張玄表李知古等東西兩處先動兵馬侵抄吐蕃邊將所以互相征討迄至今日遂成釁隙外甥以先代文成公主今金城公主之故深識尊卑豈敢失禮又緣年小枉被邊將讒搆鬭亂令舅致怪伏乞垂察追留死將万足承前數度使人入朝皆被邊將不許所以不敢自奏去冬公主遣使人婁眾失若將狀專往蒙降使看公主來外甥不勝喜荷謹遣論名悉獵及副使押衙將軍浪些紇夜悉獵入朝奏取進百兩國事意悉獵所具外甥蕃中已處分邊將不許抄掠若有漢人來投便令卻送伏望皇帝舅遠察赤心許從舊好長令百姓快樂如蒙聖恩千年万歲外甥終不敢先違盟誓謹奉進金胡瓶一金盤一椀一馬腦盃一零羊衫叚一謹充微國之禮金城公主又別進金鴨盤盞雜器物等十八年十月名悉獵等至京師上御宣政殿列羽林仗以見之悉獵頗曉書記先曾迎金城公主至長安當時朝廷皆稱其材辯及是上引入內宴與語甚禮之賜紫袍金帶及魚袋并時服繒綵銀盤胡瓶等仍於別館供擬甚厚悉獵受袍帶器物而卻進魚袋, WYG: ''}
