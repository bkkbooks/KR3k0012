  - {type: variant, offset: 3098, length: 389, content: 二年遣將軍李佺於赤嶺與吐蕃分界立碑二十四年正月吐蕃遣使貢方物金銀器玩數百事皆形制奇異上令列於提象門外以示百寮又曰開元二十八年春章求兼瓊密與安戎城中吐蕃翟都局及維州別駕董承宴等通謀都局等遂飜城歸款因引官軍入城盡殺吐蕃將士使監察御史許遠率兵鎮守上聞之甚悅中書令李林甫等上表曰伏以吐蕃此城正當衝要憑險自固恃以窺邊積年己來蟻聚為患縱有百萬之眾難以施功陛下親紆祕策不興師旅須令中使李思敬曉諭羗族莫不懷恩飜然改圖自相謀陷神筭運於不測睿略通於未然累載逋誅一朝蕩滅又臣等今日奏事陛下從容謂臣等曰卿等但看四夷不久當漸淪喪德音纔降遽聞戎捷則知聖與天合應如響至前古已來所未有也請宣示百寮編諸史策手制荅曰此城儀鳳年中羗引吐蕃遂被固守歲月既久攻伐亦多其地險隘非力所制朝廷群議不勸取之朕以小蕃無知事須處置授以奇計所以行之獲彼戎心歸我城守有足為慰也大羊同通典曰大羊同東接吐蕃西接小羊同北直于闐東西千餘里勝兵八, SBCK: ''}
