  - {type: variant, offset: 14, length: 0, content: '', krp: 揔名也詩曰采薇遣戍役也文王之時}
  - {type: variant, offset: 15, length: 5, content: 八千里本漢, SBCK: 有昆夷之患北有玁狁之難以天子之命命將帥遣戍役以守衛中國故歌采薇以遣之出車以勞還枤杜以勤歸也采薇采薇薇亦作止薇菜作生也}
  - {type: variant, offset: 15, length: 7, content: 八千里本漢西羗, WYG: 有昆夷之患北有玁狁之難以天子之命命將帥遣戍役以守衛中國故歌采薇以遣之出車以勞還枤杜以勤歸也采薇采薇薇亦作止曰歸曰歸歳亦暮止靡室靡家玁狁之故不遑唘居玁狁之故又曰我戎未定靡使歸聘又曰戎車既駕四牡業業豈敢定居一月三㨗又曰豈不日戒玁狁孔棘又曰王命南仲往城于方出車彭彭旂旐央央天子命我城彼朔方赫赫南仲玁狁于襄又曰昔我徃矣黍稷方華今我來思雨雪載塗王事多難不遑啓居又曰執訊獲醜薄言還歸赫赫南仲玁狁于夷又曰六月宣王北伐也六月棲棲戎車既飭四牡騤騤載是常服玁狁孔熾我是用急又曰玁狁匪茹整居焦穫侵鎬及方至于涇陽又曰薄伐玁狁至于太原又曰文武吉甫萬邦為憲吉甫燕喜既多受祉又曰顯允方叔征伐玁狁又曰車攻宣王復古也宣王能内脩政事外攘夷狄復文武之境土又曰漸漸之石下國刺幽王也戎狄叛之又曰何草不黄下國刺幽王也四夷交侵中國背叛用兵不息視民如禽獸禮曰北方曰狄衣羽毛宂居有不粒食者周禮曰職方氏掌天下之圖以掌天下}
