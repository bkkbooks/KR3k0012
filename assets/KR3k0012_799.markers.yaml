  - {type: variant, offset: 2773, length: 185, content: 寇讎豈可貽經典之事且臣聞吐蕃之性慓悍果決敏情持銳善學不廻若達於書必能知戰深於詩則知武夫有師干之試深於禮則知月令有廢興之兵深於傳則知用師多詭詐之智深於史則知往來有書檄之刺何異備寇兵而資盜糧也臣聞魯秉周禮齊不加兵吳獲乘車楚屢奔命一以守典存國一以喪法危邦可取鑒也且公主出嫁從人遠適異國合慕夷禮返求良書愚臣料之恐非公主本意也慮有奔北之類勸教於中若陛下慮失蕃情以備國信必不得已請去, SBCK: 所効者貂蟬胡床胡飯}
