  - {type: variant, offset: 1189, length: 502, content: 鵝猶鴈也故作金鵝奉獻其鵝黃金鑄成高七尺中可實酒三斛又曰高宗嗣位授弄讚為駙馬都尉封西海郡王賜物二千叚弄讚因致書與司徒長孫無忌等云天子初即位若臣下有不忠之心者當勒兵以赴國并獻金銀珠寶十五種高宗嘉之進封為王賜雜綵三千叚因請蚕種及造酒碾磑紙墨之匠並許焉又曰高宗聞劉審禮等敗召侍臣問以綏禦之策中書舍人郭正一曰吐蕃作梗年歲已深命將興師相繼不絕空勞士馬虛費糧儲近討則徒損兵威深入則未窮巢穴臣望少發兵募且遣備邊明立烽候勿令侵抄使國用豐足人心叶同寬之數年可一舉而滅給事中劉齊賢皇甫文亮等皆言嚴守之便又曰長壽元年武威軍揔管王孝傑大破吐蕃之眾克復龜茲于闐踈勒碎葉等四鎮乃於龜茲置安西都護府發兵以鎮守之又曰聖曆三年番將贊婆率所部千餘人及其兄弟莽布支等來降則天遣羽林飛騎郊外迎之授贊婆輔國大將軍行右衛大將軍封歸德郡王優賜甚厚又曰神龍元年贊普之祖母遣其大臣悉董然來獻方物為其孫請婚中宗以所養雍王守禮女為金城公主許嫁與之自是頻歲貢獻景龍三年十一月又遣其大臣尚贊吐等來逆女中宗宴之于苑內毬塲命駙馬都尉楊慎交與吐蕃使打毬中宗率侍臣以觀之四年正月下制曰聖人布化用百姓為心王者垂仁以八荒無外故能光宅遐邇財成品物由是隆周理曆恢柔遠之圖強漢乘時建, SBCK: ''}
