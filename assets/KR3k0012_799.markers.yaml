  - {type: variant, offset: 3488, length: 587, content: 萬其人辮髮氈裘畜牧為業地多風雪冰厚丈餘所出物產頗同吐蕃俗無文字但刻木結繩而已刑法嚴峻其酋豪死抉於穴切去其腦實以珠玉剖其五臟易以黃金假造金鼻銀齒以人為殉卜以吉辰藏諸岩穴地人莫知其所多殺㹀牛莫馬以充祭祀葬畢服除其王姓姜葛有四大臣分掌國事自古未通悉立通典曰悉立在吐蕃西南戶五萬餘有城邑村落依溪澗丈夫以繒綵纏頭衣氈褐婦人辮髮著短裙以蒸報為俗畜多水牛羖羊雞豕穀宜秔稻麥豆饒甘蔗諸菓死葬於中野不為封樹喪制以黑為衣一年就吉刑有刖劓羈事吐蕃章求拔通典曰章求拔或云章揭拔本西羗種也在悉立西南居四山之內近代移出山西接東天笁遂改衣服變西羗之俗其地延袤八九百里勝兵二千餘人居無城郭好為寇掠商旅患之聞悉立入朝亦遣使朝貢且末漢書曰且末國王治且末城去長安六千八百二十里有蒲桃諸果西通精絕二千里北史曰且末西北有流沙數百里夏日有熱風為行旅之患風之所至唯老駞預知之即嗔而聚土埋其口鼻於沙中人每以為候亦即將氈擁蔽鼻中其風迅駃斯須過盡若不防者必至危斃後魏大統八年其兄鄯善未率眾內附烏秅漢書曰烏秅王治烏秅城去長安九千九百五十里田石間有白草累石為室民接手飲師古曰自高山下谿潤中飲水接連其手也出小步馬師古曰小細步也所謂百步千跡也西夜漢書曰西夜國王號子合王治呼犍谷犍音巨言切去長安萬二百五十里與胡異其種類羗氐行國師古曰言不著土地隨畜逐水草往來而地出玉石後漢書曰西夜國去洛陽萬四千四百里地生白草青毒國人煎以為藥傅箭鏃所中輒死, SBCK: ''}
