  - {type: variant, offset: 2529, length: 251, content: 不剛也又曰老子曰得其所利必慮其害樂其所樂必顧其敗人為善者天報以福人為不善者天報以禍也故曰禍兮福所倚福兮禍所伏戒之慎之君子不務何以備之夫上知天則不失時下知地則不失財日夜慎之則無害矣太公金匱曰武王問師尚父曰五帝之戒可復得聞乎師尚父曰舜之居民上兢兢如履薄冰禹之居民上慄慄如恐不滿湯之居民上翼翼乎懼不敢息呂氏春秋曰出則以車入則以輦務以自逸命之曰招蹶之機肥肉厚酒務以自強命之曰爛腸之食靡曼皓齒鄭衛之音務以自樂命之曰伐性之斧三者富貴之所致者也新序曰楚恭王有疾召令尹曰常侍苑蘇與我處忠我以義吾與其處不見不思也雖然吾有, SBCK: ''}
