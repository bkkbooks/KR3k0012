  - {type: variant, offset: 3121, length: 776, content: 餘歲誦詩論及賦十萬言性簡易不事華麗太祖征孫權使植留守鄴戒之曰吾昔為潁令年二十三思此時所行無悔於今今汝年二十三矣可不勉與文士傳曰陸景誡盈曰重臣貴戚隆盛三族莫不羅患搆禍鮮以善終大者破家小者滅身唯金張子弟世履忠篤故能保貴持寵祚鍾昆季其餘禍敗可為痛心東方朔集曰朔將仙戒其子曰明者處世莫尚於中庸優哉遊哉與道相從首陽為拙柱下為工飽食安步以仕代農依隱玩世詭時不逢劉向集誡子書曰告歆謙之無忽若未有異德蒙恩甚厚將何以報董生有云弔者在門賀者在閭有憂則恐懼慎事慎事則必有善功而遺福也蔡邕女誡曰心猶首面也是以甚致飾焉面一旦不脩則塵垢穢之心一朝不思善則邪惡入之咸知飾其面不脩其心夫面之不飾愚者謂之醜心之不脩賢者謂之惡愚者謂之醜猶可賢者謂之惡將何容焉故覽照拭面則思其心之潔也傳脂則思其心之軟也加粉則思其心之鮮也澤髮則思其心之順也用櫛則思其心之理也立髻則思其心之正也攝鬢則思其心之整也蔡邕廣連珠曰臣聞目瞤耳鳴近夫小戒也狐鳴犬嗥家人小祅也猶忌慎動作封鎮書符以防其禍是故天地示異災變橫起則人主恒恐懼而脩政魏文帝誡子曰父母於子日雖肝腸腐爛為其掩蔽不欲使鄉黨士友聞其罪過然行之不改久久人自知之用此仕官不亦難乎王脩誡子書曰我實老矣所恃汝等也汝今踰郡縣越山河離兄弟去目下者欲令見舉動之宜以觀高人遠節聞一得三父欲令子善唯不能殺身其餘無惜也諸葛亮誡外生曰夫志當存高遠慕先賢絕情欲棄凝滯使庶幾之志揭然有所存惻然有所感忍屈伸去細碎廣咨問除嫌吝雖有淹留何損於美趣何患於不濟若志不強毅意不慷慨徒碌碌滯於俗默默束於情永竄伏於凡庸不免於下流矣又曰夫君子之行靜以脩身儉以養德非澹薄無以明志非甯靜無以致遠夫學欲靜也才須學也非學無以廣才非志無以成學淫慢則不能勵精險躁則不能治性年與時馳意與日去遂成枯落多不接世悲守窮廬將復何及崔瑗坐右銘曰無道人之短無說己之長施人慎勿念受施慎勿忘世譽不足慕唯仁為紀綱隱心而後動謗議庸何傷, SBCK: ''}
