  - {type: punctuation, offset: 586, content: 「, id: KR3k0012_CHANT_460-bkkpn187}
  - {type: variant, offset: 586, length: 1, content: 桓, SBCK: 田常欲伐魯子貢至齊􅀃田常曰君之伐魯過矣不如伐呉呉王果與齊人戰於艾陵大破齊師故子貢一出存魯亂齊戰國䇿曰鄒忌以鼔琴見威王王恱而舎之右室須􅁷王鼓琴鄒忌椎户入曰善鼔琴夫大􅃶濁以春者君也小􅃶廉折以清者相也擢之􅀷而令人愉者政令也鈞以鳴大小相蓋因推而不害者四時也故曰琴音調而天下正也又曰􅁗圍邯鄲急且降平原君甚患之邯鄲傳舎吏子李同􅀃平原君曰誠能令家之所有盡散以饗士士方其危苦之時易得耳於是平原從之得敢死之士三千李同遂與三千人赴􅁗軍􅁗軍爲之却三十里又曰漢王數困滎陽城臯酈生曰今燕趙巳定唯齊未下臣請得奉明詔􅀃齊王使爲漢稱東藩上曰善又曰范増􅀃項梁曰君江東楚將皆爭附君者以君代楚將爲能復立楚之後也於是項梁然其言也又曰范陽人蒯通􅀃范陽令曰竊聞}
