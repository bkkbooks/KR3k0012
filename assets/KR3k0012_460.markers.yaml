  - {type: punctuation, offset: 638, content: 『, id: KR3k0012_CHANT_460-bkkpn204}
  - {type: variant, offset: 638, length: 355, content: 衛公子開封何如管仲曰齊衛之間不過十日之行開封事君十年不歸不見父母非人心也父母之不親安能親君公曰易牙何如曰夫易牙為君主味君之所未嘗食唯人肉而易牙蒸首子而進之其子不愛焉能愛君公曰孰可管仲曰隰朋可其為人堅中而廉外少欲而多信堅中足以為表廉外可與大任少欲則能臨其眾多信則能親鄰國此霸王之佐也君其用之管仲死桓公不用隰朋而用豎刀三年桓公南遊堂邑豎刁易牙衛公子開封及大臣為亂桓公餒而死荀子曰伯禽將歸於魯周公謂伯禽曰君子力如牛不與牛爭力走如馬不與馬爭走智如士不與士爭智韓子曰西門豹性急佩韋以自緩董安於心緩佩弦以自急故能以有餘補不足以長續短之謂明至淮南子曰奔車之上無仲尼覆舟之下無伯夷韓子曰天下有至貴而非勢位也有至富而非金玉也有至壽而非千歲也願恕反性則貴矣適情知足則富矣明生死之分則壽矣韓子曰秦昭王謂左右曰今時韓與魏孰強對曰魏強秦, SBCK: 張儀􅀃燕}
