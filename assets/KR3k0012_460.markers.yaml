  - {type: variant, offset: 89, length: 3, content: 魯甯戚, SBCK: 事巳者過急於事人者過緩今王於事已緩安能急於事人衛客事王五年不得見臣以是知王緩也魏王趨見衛安曰蘇􅁗爲楚合從􅀃韓王曰夫以韓卒之勇􅀍堅甲帶利劒一人當百不足云也夫以韓卒之勁與王之賢乃欲事􅁗爲天下􅀏}
