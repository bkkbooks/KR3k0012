  - {type: variant, offset: 1873, length: 1, content: 來, WYG: 而秦之求無厭以有盡之地而應無已之求鄙語曰寜為雞口不為牛後今西面交臂而事秦何異牛後乎又曰秦王與中期爭論而不勝秦王大怒中期徐行去人為説秦王曰此悍人也中期適遇明君故也遇桀紂必殺之矣王因弗罪又曰秦令樗里疾以車百乗入周周君迎之甚敬楚王怒讓周以其重秦客也游騰為周君謂楚王曰秦者虎狼之國也有吞周之意周君懼焉楚王乃説也又曰司馬錯與張儀争論於秦惠王前錯欲伐蜀儀曰不如伐韓王問其説對曰親魏善楚下兵三川塞轘轅緱氏之口當屯留之道此王業也又曰惠施為韓魏交令太子鳴質於齊王故見之朱倉謂王曰何不稱病臣請説嬰子曰魏王之年長矣今有病公不如歸太子以徳之不然公子髙在楚將内而立之是齊把空質而行不義也王從之太子得還又曰范雎謂秦王曰秦韓之地形相錯如繡秦之有韓若木之蠧為秦害者莫大於韓王又曰張儀為秦連横説韓王曰諸侯不料兵之弱而聴從人之甘言不顧社稷長利而聴曲説之誤無過此矣又曰燕文公時秦惠王以其女為燕太子婦文公卒易王立齊宣王因燕喪攻取十城蘇秦為燕説齊王再拜而}
