  - {type: variant, offset: 1870, length: 1, content: 垢, WYG: 令以還報敝邑之君畏懼不敢不行無乃傷華陽君涇陽君之心乎又曰趙且伐燕蘇代為燕謂趙惠王曰今者臣來過川水蚌方出曝而鷸啄其肉蚌掩鷸喙鷸曰今日不雨明日不雨即有死蚌蚌亦謂鷸曰今日不出明日不出必見死鷸兩者不相捨漁者得而併擒之今趙且伐燕燕趙久相持臣恐强秦之為漁父也故願王熟計之惠王曰善乃止又曰衛客事魏王三年不得見乃見梧丘先生許之以百金先生曰諾乃見魏王曰吾聞秦王出兵未知所之願王専事秦無他計王曰諾客趨出至郭門而返曰臣恐王事秦之晩也夫}
