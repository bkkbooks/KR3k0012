  - {type: variant, offset: 117, length: 3, content: 者心益, SBCK: 於韓王又曰張儀爲􅁗連横􅀃韓王曰諸侯不料兵之弱而聽從人之甘言不顧社稷長利而聽䛕人之􅀃詿誤人言無過此矣戰國䇿曰燕文公時􅁗惠王以其女爲燕太子婦文公卒殤王立齊宣王因燕喪攻取十城蘇􅁗爲燕􅀃齊王再拜而賀因仰而弔曰燕雖弱}
