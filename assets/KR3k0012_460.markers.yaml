  - {type: variant, offset: 5, length: 4, content: 鑒戒下鬻, SBCK: 一游􅀃上釋名曰􅀃者述也宣述人意也左傳曰晉人將尋盟齊人不可叔向告于齊曰明王之制使諸侯歳聘以志業間朝以講禮再朝而㑹以示威再㑹而盟以顯昭明自古以來未之或失齊人懼又曰晉郤􅆙言趙宣}
  - {type: variant, offset: 5, length: 4, content: 鑒戒下鬻, WYG: 一游說上釋名曰説者述也宣述人意也左傳曰晉人將尋盟齊人不可叔向告於齊曰明王之制使諸侯嵗聘以志業間朝以講禮再朝而㑹以示威再㑹而盟以顯昭明自古以來未之或失齊人懼又曰晉卻缺言于趙宣}
