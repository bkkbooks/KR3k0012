  - {type: variant, offset: 49, length: 2, content: 齊桓, SBCK: 吾必復子還如楚令尹子木與之語聲子曰椒舉今在晉矣晉人將與之縣以叔向彼􅀂謀害楚國豈不爲患子木懼言諸王益其禄爵而復之聲子使椒鳴逆之又曰晉侯􅁗伯圍鄭佚之狐言於鄭伯曰國危矣􅀂使燭之武見􅁗君師必退燭之武夜縋而岀岀見􅁗伯曰􅁗晉圍鄭鄭旣知亡鄭而有益於君敢以煩執事越國以鄙逺君知其難也焉用亡鄭以陪隣夫晉何厭之有旣東封鄭又欲肆其西封不闕音掘下同􅁗焉取之闕􅁗以利晉唯君圖之􅁗伯恱傳曰呉伐楚入郢申包胥如􅁗乞師曰呉爲封豕長蛇荐食上國虐始於楚寡君失守社稷越在草莽使下臣告急曰夷德無厭􅀂鄰於君疆􅂣之患也建呉之定也君其取分焉􅀂以君靈撫之丗以事􅁗立依於庭墻而哭日夜不絶聲勺飲不入口七日􅁗師乃岀又曰楚子饗魯昭}
  - {type: page-break, offset: 49, content: '', id: KR3k0012_SBCK_460-2a}
  - {type: variant, offset: 49, length: 2, content: 齊桓, WYG: 吾必復子還如楚令尹子木與之語聲子曰椒舉今在晉矣晉人將與之縣以比叔向彼若謀害楚國豈不為患子木懼言諸王益其禄爵而復之聲子使椒鳴逆之又曰晉侯秦伯圍鄭佚之狐言于鄭伯曰國危矣若使燭之武見秦君師必退燭之武夜縋而出見秦伯曰秦晉圍鄭鄭既知亡亡鄭而有益於君敢以煩執事越國以鄙逺君知其難也焉用亡鄭以陪隣夫晉何厭之有既東封鄭又欲肆其西封不闕音蹶下同秦焉取之闕秦以利晉唯君圖之秦伯悦又曰吳伐楚入郢申包胥如秦乞師曰吳為封豕長蛇荐食上國虐始於楚寡君失守社稷越在草莽使下臣告急曰夷徳無厭若隣於君疆埸之患也逮吳之未定君其取分焉若以君靈撫之世以事秦立依於庭牆而哭日夜不絶聲勺飲不入口七日秦師乃出又曰楚子饗魯昭}
