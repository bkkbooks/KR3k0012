  - {type: variant, offset: 131, length: 0, content: '', krp: 楚絶齊齊舉兵攻楚陳軫謂楚王曰不如以地東解於齊而西謀於秦矣又曰文信侯欲攻趙而廣河間使張唐相燕張唐辭之少庶子甘羅曰臣請行之甘羅見張卿即曰今文信侯自請卿相燕而卿不肯行臣不知卿所死之處矣卿曰請孺子而行令庫具車廐具馬府具幣行有日矣戰國䇿曰東周欲爲稻西周不下水東周患之蘇子謂東周}
  - {type: variant, offset: 132, length: 0, content: '', SBCK: 曰臣請使西周下水可乎乃往見西周之君曰君之謀過矣今不下水所以冨東周也今其人皆種禾君􅀂欲東周之乏不􅀂一下水以病其所種下水東周必復種稻種稻而復奪之􅀂是則東周之人可令一仰西周而受命於君矣西周君曰善遂下水蘇}
  - {type: variant, offset: 132, length: 0, content: '', krp: 曰臣請使西周下水可乎乃往見西周之君曰君之謀過矣今不下水所以冨東周也今其人皆種禾君若欲東周之乏不若一下水以病其所種下水東周必復種稻種稻而復奪之若是則東周之人可令一仰西周而受命於君矣西周君曰善遂下水蘇}
  - {type: variant, offset: 133, length: 1, content: 居, SBCK: 亦得兩全矣又曰司馬錯與張儀爭論於􅁗惠王前錯欲伐蜀儀曰不如伐韓王問其􅀃曰臣聞欲冨者務廣其地欲強者務富其人欲王者務崇其徳三資者備而至道興矣王曰善起兵伐蜀又曰司馬錯與張儀爭論於􅁗惠王前錯欲伐蜀儀曰不如伐韓王問其􅀃對曰親魏善楚下兵三川誅周王之罪侵楚魏之地周自知不救九鼎寳器}
