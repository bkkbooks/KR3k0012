  - {type: variant, offset: 379, length: 0, content: '', SBCK: 􅂫􅁗爲燕􅀃齊王歸燕之十城人有毀蘇􅁗於燕王左右賣國反臣也將作亂􅂫􅁗恐得罪歸而燕王不復官也􅂫􅁗見燕王曰臣東周之鄙人也}
  - {type: variant, offset: 379, length: 228, content: 無吾子無所聞之孔子曰君入廟門而右登自胙階仰見榱棟俯察机筵其器存其人亡君以此思則哀至焉昧爽而櫛冠未明而聽朝一物失所亂之端也君以此思則憂至焉君平明而聽朝日昃而退諸侯之子孫必有在君之庭者君以此思則勞至焉君出魯之四門以望四郊亡國之墟則必有類焉君以此思則懼至焉且丘聞之君者舟也民者水也水能載舟亦能覆舟君以此思則危至焉又曰慶封為亂於齊而將之越其族人曰晉近奚不之慶封曰越遠利以避難族人曰變是心也居晉而安不變是心雖越其可以安乎又曰桓公往問管仲曰仲父有病即有不幸政將遷誰豎刁, WYG: ''}
  - {type: variant, offset: 379, length: 0, content: '', krp: 蘇秦爲燕說齊王歸燕之十城人有毀蘇秦於燕王左右賣國反臣也將作亂蘇秦恐得罪歸而燕王不復官也蘇秦見燕王曰臣東周之鄙人也}
  - {type: variant, offset: 380, length: 5, content: 吾子無所聞, SBCK: 尺寸功而王親拜}
