  - {type: variant, offset: 11, length: 3, content: 昔周公, SBCK: 衛不睦故取其地今巳睦矣可以歸之叛而不討何以示威服而不柔何以示懷非威非懷何以示徳趙宣子恱歸衛主威之田又曰呉人執衛侯子服景伯謂子貢曰子盍聞見太宰乃請束錦以行語及衛故子貢曰衛君之來也必謀於其衆或欲或否是以緩來欲來者子之黨也其不欲來者子之讎也􅀂執衛君是隳黨而崇讎也難以霸乎太宰説乃舎衛侯又曰晉楚㑹于虢季武子伐莒取鄆莒人告於國㑹楚告於晉曰請戮其}
  - {type: page-break, offset: 11, content: '', id: KR3k0012_SBCK_460-1b}
  - {type: variant, offset: 11, length: 3, content: 昔周公, WYG: 日衛不睦故取其地今已睦矣可以歸之叛而不討何以示威服而不柔何以示懐非威非懐何以示徳趙宣子悦歸衛匡戚之田又曰吳人執衛侯子服景伯謂子貢曰子盍見太宰乃請束錦以行語及衛故子貢曰衛君之來也必謀於其衆或欲或否是以緩来其欲来者子之黨也其不欲來者子之讎也若執衛君是墮黨而崇讎也或者難以霸乎太宰嚭説乃舎衛侯又曰晉楚㑹于虢季武子伐莒取鄆莒人告于㑹楚告于晉曰請戮其}
