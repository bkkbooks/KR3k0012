  - {type: variant, offset: 2542, length: 2, content: 慮其, WYG: 惡越請東見越王令出兵以從吳王大説使子貢之越越王許諾又曰田常欲伐魯子貢之齊説田常曰君之伐魯過矣不如伐吳吳王果與齊人戰於艾陵大破齊師故子貢一出存魯亂齊戰國策曰鄒忌以鼔琴見威王王恱而舎之右室須臾王鼓琴鄒忌推户入曰善鼓琴夫大絃濁以春温者君也小絃廉折以清者相也攫之深而醳之愉者政令也鈞諧以鳴大小相益回邪而不相}
