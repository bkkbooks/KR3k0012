  - {type: variant, offset: 1872, length: 0, content: '', WYG: 於事己者過急於事人者過緩今王於事己緩安能急於事人衛客事王三年不得見臣以是知王緩也魏王趨見衛客蘇秦為楚合従説韓王曰以韓卒之勇被堅甲帶利劔一人當百不足言也夫以韓之勁與王之賢乃欲事秦為天下笑無過此者大王事秦秦必求宜陽成臯今兹効之明年又求之予之則無地以給不予則棄前功而受後禍大王之地有}
