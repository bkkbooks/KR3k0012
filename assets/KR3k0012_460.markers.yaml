  - {type: variant, offset: 1393, length: 316, content: 三握髮一食而三吐哺猶恐失天下之士吾聞之曰德行廣大而守以恭者榮土地博裕而守以儉者安祿位尊盛而守以卑者貴人眾兵彊而守以畏者勝聰明睿智而守以愚者益博聞多記而守以淺者廣此六守者謙德也夫貴為天子富有四海不謙者先天下亡其身桀紂是也可不慎乎故易曰天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙誡之哉子其無以魯國驕士矣又曰春秋有忽然而足以亡者國君不可以不慎也妃妾不一足以亡公族不親足以亡大臣不任足以亡國爵不用足以亡親佞近讒足以亡舉百事不時足以亡使民不節足以亡刑罰不中足以亡內失眾心足以亡外嫚大國足以亡說苑曰田子方侍魏文侯坐太子擊趨而入見賓客群臣皆趨田子獨不起文侯有不說之色太子亦然田子方稱曰為子起與無如禮何不為子起與無如罪何請為子誦楚恭王, WYG: 歸}
