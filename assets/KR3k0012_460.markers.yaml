  - {type: variant, offset: 779, length: 233, content: 其用之管仲死桓公不用隰朋而用豎刀三年桓公南遊堂邑豎刁易牙衛公子開封及大臣為亂桓公餒而死荀子曰伯禽將歸於魯周公謂伯禽曰君子力如牛不與牛爭力走如馬不與馬爭走智如士不與士爭智韓子曰西門豹性急佩韋以自緩董安於心緩佩弦以自急故能以有餘補不足以長續短之謂明至淮南子曰奔車之上無仲尼覆舟之下無伯夷韓子曰天下有至貴而非勢位也有至富而非金玉也有至壽而非千歲也願恕反性則貴矣適情知足則富矣明生死之分則壽矣韓子曰秦昭王謂左右曰今時韓與魏孰強對曰魏強秦昭王曰其無奈寡人何左右皆然中旗伏瑟而對, WYG: ''}
