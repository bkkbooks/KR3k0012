  - {type: variant, offset: 63, length: 135, content: 不為寡人壽鮑叔牙奉杯而起曰使公無忘在莒管仲無忘束縛於魯甯戚無忘飯牛車下公避席再拜晏子曰夫爵益高者意益下官益大者心益小祿益厚者施益博也又曰君子居必擇鄰遊必就士可以避患也又曰人之將疾必先不甘梁肉之味國之將亡必先思忠臣之語列子曰狐丘文人謂孫叔敖曰人有三怨子知之乎孫叔敖曰何謂也, WYG: ''}
  - {type: variant, offset: 63, length: 0, content: '', krp: 對曰齊與晉越欲此乆矣寡君無適與也敢}
  - {type: variant, offset: 64, length: 1, content: 為, SBCK: 賀乎公懼乃反之戰國䇿曰蘇􅁗死其弟􅂫代欲繼之乃北見燕王噲曰臣東周之鄙人也至燕廷觀王之羣臣下吏大王天下明王也王曰何如曰臣聞之明王也務聞過不欲聞善臣請謁王之過又曰濮陽人吕不韋賈於邯鄲見􅁗質子楚􅀃之乃􅀃􅁗王后弟陽泉君曰王后無子子楚賢才也棄在趙王后誠請而立之是有子也陽泉君入􅀃王后王后爲請而歸之爲太子也又曰張儀爲􅁗連横􅀃韓王曰夫違禍而求福計莫如事􅁗今王西面事􅁗以攻楚􅁗王必喜又白􅂫􅁗􅀃李兊抵掌而談兊送􅁗以明月之珠和氏之璧戰國䇿曰齊宣王因燕喪攻取十城􅂫􅁗爲燕􅀃齊王再拜而賀因仰而吊齊王案戈曰何慶吊相隨之速也對曰人之饑所以不食烏喙者以爲雖愈饑充腹而與死同患齊乃歸燕城戰國䇿曰應侯使人召蔡澤蔡澤入曰夫四時之序功成者去君何不歸相印讓賢者授之必有伯夷之廉長爲應侯而有喬松之壽孰以禍終此哉應侯曰善乃延入坐爲上客又曰楚免淖齒於柱國遊騰爲楚王曰􅁗有上羣午者重兵之戰請􅁗王曰必無與楚戰王曰何也對曰南方火也西方金也金之不勝火亦必矣􅁗王不聽其戰不勝今午又請􅁗王必與楚戰南方火西方金也楚正夏中年而免其柱國此所謂内自滅也楚懼復置淖齒又曰齊欲伐魏魏使人請淳于髠曰齊欲伐魏能解患唯先生也淳于髠曰諾遂入說齊王曰楚齊之仇敵也魏齊之與國也夫伐與國使仇敵制其餘弊名醜而實危爲王不取也齊王曰善乃不伐魏也又曰趙魏攻華陽韓謁急於􅁗冠蓋相望􅁗不救韓相國謂由余曰事急顧公雖病爲一􅀫之行由余見穰侯穰侯曰急乎由余對曰未急也彼韓急則將變矣穰侯請發兵救韓大敗趙魏於華陽之下又曰昭陽爲楚伐魏覆軍殺將得八城移師而攻齊陳軫爲齊王使見昭陽再拜賀戰勝起而請問楚之法覆軍煞將其官爵何也昭陽曰官爲上柱國爵爲上執珪陳軫曰今小貴矣又移師攻齊而不知止者身且死爵且偃昭陽車而歸之又曰范雎謂􅁗王曰大王國之北有甘泉谷口南注涇渭右隴蜀左􅀜阪戰車千乗􅁬卒數百萬以􅁗卒之勇車􅀐之多以當諸侯譬􅀂放韓盧而逐狡兔也霸王之業可致今反閇關不敢窺兵於山東者是穰侯爲􅁗謀不忠大王之計又曰􅁗王謂趙使諒貇曰豹平原君數欺弄}
