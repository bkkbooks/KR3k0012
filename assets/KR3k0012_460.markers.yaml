  - {type: variant, offset: 67, length: 6, content: 壽鮑叔牙奉杯, SBCK: 趙能煞此兩人則可􅀂不能煞請率諸侯受命邯鄲城下諒貇曰趙豹平原君親寡君之母弟也猶大王之有葉陽涇陽君夫以孝悌聞於天下衣服之便於體膳㗖之兼於口未甞不分與焉衣裘無非大王之服今受大王之嚴令以報敝邑之君不敢弗行無乃傷君之心乎戰國䇿曰趙且伐燕􅂫代爲燕謂趙惠王曰今者來過川蜯方出曝}
