  - {type: variant, offset: 1803, length: 1, content: 太, WYG: 乃延入坐為上客又曰楚免淖齒於柱國游騰謂楚王曰秦有上羣午者重兵之戰請秦王曰必無與楚戰王曰何也對曰南方火也西方金也金之不勝火亦必矣秦王不聴其戰不勝今午又請秦王必與楚戰南方火西方金也楚正夏中年而免其柱國此所謂内自滅也楚懼復置淖齒又曰齊欲伐魏魏使人謂淳于髠曰齊欲伐魏能解患唯先生也淳于髠曰諾遂入説齊王曰楚齊之仇敵也魏齊之與國也夫伐與國使仇敵制其餘弊名醜而實危為王不取也齊王曰善乃不伐魏也又曰趙魏攻華陽韓謁急於秦冠蓋相望秦不救韓相國謂田苓曰事急願公雖病為一宿之行田苓見穰侯穰侯曰急乎田苓對曰未急也使韓急則將變矣穰侯請發兵救韓大敗趙魏於華陽之下又曰昭陽為楚伐魏覆軍殺將得八城移師而攻齊陳軫為齊王使見昭陽再拜賀戰勝起而請問楚之法覆軍殺將其官爵何也昭陽曰官為上柱國爵為上執珪陳軫曰異貴於此者何也曰唯令尹耳陳軫曰令尹貴矣主非置兩令尹也臣竊為公譬之可乎楚有祠者賜其舎人酒一巵舎人相謂曰數人飲之不足一人飲之有餘請畫蛇先成者飲酒一人蛇先成乃左手持巵右手畫蛇曰吾能為足為足未成一人蛇成奪其巵曰蛇故無足}
