  - {type: variant, offset: 218, length: 154, content: 孫叔敖曰吾爵益高志益下吾官益大吾心益小吾祿益厚吾施益博以是免三怨可乎莊子曰夫畏途十殺一人則父子兄弟相戒必盛卒而後敢出衽席之上飲食之間而不知為之戒遇也文子曰其文好者身必剝其角美者身見殺甘泉先竭直木必伐荀子曰魯哀公問政於孔子曰寡人生於深宮之中長於婦人之手未嘗知哀未嘗知憂未嘗知勞未嘗知懼未嘗知危孔子曰君之問也丘小, WYG: 鄙}
