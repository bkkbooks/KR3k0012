  - {type: variant, offset: 1475, length: 1645, content: 守者謙德也夫貴為天子富有四海不謙者先天下亡其身桀紂是也可不慎乎故易曰天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙誡之哉子其無以魯國驕士矣又曰春秋有忽然而足以亡者國君不可以不慎也妃妾不一足以亡公族不親足以亡大臣不任足以亡國爵不用足以亡親佞近讒足以亡舉百事不時足以亡使民不節足以亡刑罰不中足以亡內失眾心足以亡外嫚大國足以亡說苑曰田子方侍魏文侯坐太子擊趨而入見賓客群臣皆趨田子獨不起文侯有不說之色太子亦然田子方稱曰為子起與無如禮何不為子起與無如罪何請為子誦楚恭王之為太子也將出之雲夢遇大夫工尹工尹遂趨避家人之門中太子下車從之家人之門中曰子大夫何為其若是吾聞之尊其父者不兼其子兼其子者不祥莫大焉子大夫何為其若是工尹曰向吾望見子之面今而後記子之心文侯曰善太子擊前誦恭王之言而習之又曰孫叔敖為楚令尹一國吏民皆來賀有一父衣鹿衣冠白冠後來弔孫叔敖正衣冠而出見之謂老父曰楚王不知臣不肖使臣受吏民之垢人盡來賀子獨來弔豈有說乎父曰有說身已貴而驕人者民去之位已高而檀權者君惡之祿已厚而不足者患處之孫叔敖再拜曰謹受命願聞餘教父曰位已高而意益下官益大而心益小祿已厚而慎不取君守此三者足以治楚矣說苑曰魏公子牟東行穰侯送之曰先生將去之山東矣獨無一言以教冉乎魏公子曰微君言之牟幾忘語君君知夫官不與勢期而勢自至乎勢不與富期而富自至乎富不與貴期而貴自至乎貴不與驕期而驕自至乎驕不與罪期而罪自至乎罪不與死期而死自至乎穰侯曰善謹受明教說苑曰高上尊貴無以驕人聰明聖智無以窮人資給疾速無以先人剛毅勇猛無以勝人不知則問不能則學雖知必質然後辯之雖能必讓然後為之故士雖聰明聖智自守以愚功被天下自守以讓勇力距世自守以怯富有四海自守以廉此謂高而不危滿而不溢者也說苑曰齊桓公為大臣具酒期以日中管仲後至桓公舉觴以飲之管仲半棄酒桓公曰期而後至飲而棄酒於禮可乎管仲對曰臣聞酒入舌出舌出者言失言失者身棄臣計棄身不如棄酒桓公笑曰仲父起就坐說苑曰常樅有疾者老子往問焉曰先生疾甚矣無遺教可以語諸弟子者乎常樅曰子雖不問吾將語子曰過故鄉而下車子知之乎老子曰過故鄉而下車非謂其不忘故鄉耶常樅曰嘻是已常樅曰過喬木而趨子知乎老子曰過喬木而趨非謂其敬老耶常樅曰嘻是以張其口而示老子曰吾舌存乎老子曰然吾齒存乎老子曰亡常樅曰子知之乎老子曰夫舌之存也豈非以其柔耶齒之亡也豈非以其剛耶常樅曰嘻是以天下之事已盡矣無以復語子哉說苑曰桓公曰金剛則折革剛則裂人君剛則國家滅人臣剛則交友絕夫剛不和不和則不可用是故四馬不和取道不長父子不和其世破亡兄弟不和不能久同夫妻不和家室大凶易曰二人同心其利斷金因不剛也又曰老子曰得其所利必慮其害樂其所樂必顧其敗人為善者天報以福人為不善者天報以禍也故曰禍兮福所倚福兮禍所伏戒之慎之君子不務何以備之夫上知天則不失時下知地則不失財日夜慎之則無害矣太公金匱曰武王問師尚父曰五帝之戒可復得聞乎師尚父曰舜之居民上兢兢如履薄冰禹之居民上慄慄如恐不滿湯之居民上翼翼乎懼不敢息呂氏春秋曰出則以車入則以輦務以自逸命之曰招蹶之機肥肉厚酒務以自強命之曰爛腸之食靡曼皓齒鄭衛之音務以自樂命之曰伐性之斧三者富貴之所致者也新序曰楚恭王有疾召令尹曰常侍苑蘇與我處忠我以義吾與其處不見不思也雖然吾有以得也其功不細必爵之申侯伯與我處吾所樂者勸吾為之吾所好者勸吾服之吾與處不見思之雖然吾終無得也其過也不細必亟遣之令尹曰諾明日王薨令尹即拜苑蘇為上卿而逐申伯出於國諸葛亮集先主遺詔勑後主曰勿以惡小而為之勿以善小而不為唯賢唯德能服於人汝父德薄勿效之讀傳必可讀漢書禮記閑暇歷視諸子及六韜商君書益人意知吾終之後汝兄弟父事丞相鄭玄別傳曰玄病困戒子益恩曰吾家舊貧為父母群弟所容去廝役之吏遊周秦之都往來幽並兗豫之役候覲通人大儒得意者咸從捧手有所受焉遂博稽六藝究覽傳記今我告爾以事將閑居以安性覃思以終業自非國君之命問親族之憂展孝墳墓觀省野物曷常扶杖出門乎家事大小汝一承之吾煢煢一夫曾無同生相依其勗求君子之道研鑽勿替恭慎威儀以近有德顯譽成於僚友德行立於已志若致聲稱亦有榮於所生耳曹植別傳曰植博學有高才年, krp: ''}
