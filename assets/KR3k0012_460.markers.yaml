  - {type: variant, offset: 2537, length: 0, content: '', WYG: 不然蜀戎翟之長也以秦攻之譬如使豺逐羣羊王曰善起兵伐蜀又曰蔡澤對應侯曰君之禄位貴盛而身不退竊為君危之物盛則衰天下之常數也又曰張登謂趙魏曰齊欲伐河東何以知之齊之羞與中山之為王甚矣今召中山與之遇而許之王是欲用其兵也豈若令大國先與之王以止其遇哉趙魏許之果與中山之王而親之中山東絶齊而從趙魏又曰蘇秦為燕説齊歸燕之十城人有毁蘇秦於燕王左右曰賣國反臣也將作亂蘇秦恐}
  - {type: page-break, offset: 2537, content: '', id: KR3k0012_WYG_460-12b, image: WYG0897/WYG0897-0218b.png}
  - {type: variant, offset: 2538, length: 0, content: '', WYG: 罪歸而燕王不復官也蘇秦見燕王曰臣東周之鄙人也無尺寸功而王親之於廟朝而禮之於庭今臣為王却齊之兵而利得十城宜以益親而今者王不官臣人必有言臣不信傷臣於王者臣之不信王之福也史記曰初沛公引兵過陳留酈生上謁沛公㧞足曰延客入酈生入揖謂沛公曰今足下甚苦暴衣露冠将兵助楚討不義足下何不自喜也臣願以事見又曰李斯説秦王曰夫以秦之强大王之賢足以滅諸侯成帝業秦王乃拜斯為長史聴}
  - {type: page-break, offset: 2538, content: '', id: KR3k0012_WYG_460-13a, image: WYG0897/WYG0897-0218c.png}
  - {type: variant, offset: 2539, length: 2, content: 所利, WYG: 計又曰田常欲為亂於齊移兵欲伐魯子貢見吳王説曰齊與吳争强竊為王危之王曰善雖然子待我伐越而聴子子貢曰王}
