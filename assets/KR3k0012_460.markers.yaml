  - {type: variant, offset: 131, length: 0, content: '', SBCK: 楚絶齊齊舉兵攻楚陳軫謂楚王曰不如以地東解於齊而西謀於􅁗矣又曰文信侯欲攻趙而廣河間使張唐相燕張唐辭之少庶子甘羅曰臣請行之甘羅見張卿即曰今文信侯自請卿相燕而卿不肯行臣不知卿所死之處矣卿曰請孺子而行令庫具車廐具馬府具幣行有日矣戰國䇿曰東周欲爲稻西周不下水東周患之􅂫子謂東周}
