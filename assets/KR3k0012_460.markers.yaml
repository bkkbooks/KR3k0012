  - {type: variant, offset: 378, length: 0, content: '', krp: 齊之羞與中山之爲王甚矣今召山中與之遇而許之王是欲用其兵也豈若令大國先與之王以止其遇哉趙魏許之諾果與中山之王而親之中山東絶齊而從趙魏又}
