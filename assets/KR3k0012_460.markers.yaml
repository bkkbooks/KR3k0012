  - {type: variant, offset: 618, length: 156, content: 身豎刁自宮而為君治內身之不愛何能愛君公曰衛公子開封何如管仲曰齊衛之間不過十日之行開封事君十年不歸不見父母非人心也父母之不親安能親君公曰易牙何如曰夫易牙為君主味君之所未嘗食唯人肉而易牙蒸首子而進之其子不愛焉能愛君公曰孰可管仲曰隰朋可其為人堅中而廉外少欲而多信堅中足以為表廉外可與大任少欲則能臨其眾多信則能親鄰國此霸, WYG: 善臣請謁}
