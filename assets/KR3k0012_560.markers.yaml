  - {type: variant, offset: 3361, length: 9, content: 宋青州剌史郁泰玄性, SBCK: 顓頊冢在東郡濮陽縣頓丘城外廣陽里中王莽時使使者祠顓頊冢又曰􅁗始皇冢在驪山古之驪戎國今之所豊也晉獻公伐驪戎􅀗二女其山隂}
