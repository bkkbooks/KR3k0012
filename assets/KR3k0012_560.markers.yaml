  - {type: variant, offset: 3388, length: 1, content: 冢, SBCK: 火不置黄金以其乆而爲恠不置朱丹雄黄譽石以其氣燥而烈使墳}
  - {type: variant, offset: 3388, length: 0, content: '', WYG: 火不置黄金以其乆而為怪不置朱丹雄黄礬石以其氣燥而烈使墳上草木枯而不潤不置羽毛以其近於屍也鑄鐵為牛豕之象可以禦二龍玉潤而潔能和百神置之墓内以助神道僧泓之說如此又曰大理卿徐有功持法不濫及其葬也將穿}
