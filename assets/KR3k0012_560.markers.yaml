  - {type: variant, offset: 931, length: 184, content: 進不齊輒有獸噬其足獸似豹也幽明錄曰漢末大亂頴川有人將避地他郡有女年七八歲不能涉遠勢不兩全道邊有古冢穿敗以繩繫女下之經年餘還於冢尋覔欲更殯葬忽見女尚存父大驚問女得活意女云冢中有一物於晨暮際輒伸頭翕氣為試效之果覺不復飢渴家人於冢尋索此物乃是大龜又曰孫鍾吳郡富春人堅之祖也與母居至孝篤信種瓜為業忽有三年少詣乞瓜鍾為設食臨去曰我司命也感君不知何以相報此山下善可作冢復言欲連世封, SBCK: 別爲諸}
