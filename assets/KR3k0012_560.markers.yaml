  - {type: variant, offset: 3390, length: 4, content: 今冢猶高, SBCK: 草木枯而不潤不置羽毛其近於屍也鑄鐵爲牛豕之像可以禦二龍王潤而潔能和百神寘之墓内以助神道僧泓之􅀃如此又曰}
