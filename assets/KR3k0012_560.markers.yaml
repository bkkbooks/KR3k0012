  - {type: variant, offset: 2393, length: 1, content: 高, krp: 用瓦器不爲墳王莽之亂天下無道獨無災害孝景帝葬陽陵孝武皇帝葬茂陵孝昭皇帝葬平陵孝宣皇帝葬杜陵孝元帝葬渭陵元帝下詔曰無置從民令天下無騷動之憂自是陵園不置邑孝成帝葬延陵孝哀帝葬義陵孝平帝葬康陵孝文皇帝弟淮南厲王長坐謀反後置園如諸王長好道事八公丗之愚者云長仙醫巫訖曰淮南好道百官皆得仙狗吠雲中雞鳴天上東平思王冢在東平松皆西靡又曰蒼頡冢在馮翊衙縣利陽亭南道傍墳髙六尺學書者皆往上姓名投刺祀之不絶又曰蚩尤冢在東郡壽張縣閿郷城中髙七尺民常}
  - {type: variant, offset: 2395, length: 0, content: '', krp: 月祀之有赤氣出如一疋絳帛民名爲蚩尤旗又肩髀冢在山陽郡鉅野縣傳言蚩尤與黄帝戰於涿鹿之野黄帝克之身體異處皆葬之又曰奚仲冢在魯國縣東去縣}
  - {type: variant, offset: 2396, length: 0, content: '', krp: 十五里山上因名奚仲山下亭名奚仲亭又白湯冢在濟陽薄縣北郭冢四方方八十歩髙七}
