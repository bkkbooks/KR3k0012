  - {type: variant, offset: 2518, length: 1, content: 郡, krp: 伯樂冢在濟隂定陶}
  - {type: variant, offset: 2521, length: 0, content: '', krp: 一里冢髙五丈又曰師曠冢在右扶風名曰師曠山人民不敢上其上又曰楚武王冢在汝南郡鯛音紂陽縣葛陂郷城東北民謂之楚王岑又曰鄭相子産冢在河南郡新鄭城外大冢是也又曰靖郭君冢在魯國薛城中東聚孟常冢在魯薛城中又曰文信君吕不韋冢在河南洛陽城北邙山道西大冢是也民傳言吕母冢不韋先墓故其冢名吕母不韋死獲過於始皇矣民傳云不韋好經書皆以葬漢明帝朝公卿大夫諸儒八十餘人論五經誤失符節令宋元上言臣聞秦昭王與不韋好書皆以書葬王至尊不韋乆貴冢皆以黄膓題湊豦地髙燥未壞臣願發昭王不韋冢視未燒詩書又曰亞夫冢在盧江居巢縣郭東居巢亭中又曰齊桓公冢在臨淄城}
  - {type: variant, offset: 2524, length: 0, content: '', krp: 淄水南孟甞君與齊桓公冢同處唐書新語曰開元中集賢學士徐堅葬妻問兆域之制於張說曰長安神龍之祭}
  - {type: variant, offset: 2525, length: 0, content: '', krp: 黄州僧泓者能通鬼神之意而以人事叅之僕嘗聞其言猶記其要墓欲深而狹深者取其幽狹者取其固平地之下}
  - {type: variant, offset: 2526, length: 26, content: 大冢號丹陽郭長老云是郡人丹陽太守聶友冢也外形甚高大內, krp: 丈二尺爲土界又}
