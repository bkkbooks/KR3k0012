  - {type: 'tls:seg', offset: 3369, content: '', id: KR3k0012_CHANT_560-33a.4}
  - {type: variant, offset: 3371, length: 7, content: 仁恕德感禽獸初, SBCK: 黄金其陽多美玉謂藍田是也故貪而葬焉并天下徒七十餘萬穿入地洞三泉而致椁宫觀竒器珎恠諸物藏之令一匠人作機弩人有近穴輙射之以水銀爲百川江河大海金銀爲鳬鸖機􅀜轉相斡終而復始上具􅀞天文以人魚膏爲燈度乆不滅後宫無子者皆殉從死者甚衆恐工匠知之殺工匠於藏中因閇羡門復土樹草木以像山墳髙五十餘丈周迴五里餘後項籍燒其宫觀􅀜東賊發之後牧羊兒亡羊羊入藏中持火炤羊燔其椁後賊遂取其銅又曰太上皇葬萬年髙帝父也髙帝葬長陵孝惠帝覇陵諸陵皆用瓦器不爲墳王莽之亂天下無道獨無災害孝景帝葬陽陵孝武皇帝葬茂陵孝昭皇帝葬平陵孝宣皇帝葬杜陵孝元帝葬渭陵元帝下詔曰無置從民令天下無騷動之憂自是陵園不置邑孝成帝葬延陵孝哀帝葬義陵孝平帝葬康陵孝文皇帝弟淮南厲王長坐謀反後置園如諸王長好道事八公丗之愚者云長仙醫巫訖曰淮南好道百官皆得仙狗吠雲中雞鳴天上東平思王冢在東平松皆西靡又曰蒼頡冢在馮翊衙縣利陽亭南道傍墳髙六尺學書者皆往上姓名投刺祀之不絶又曰􅃖􅀹冢在東郡壽張縣閿郷城中髙七尺民常十月祀之有赤氣出如一疋絳帛民名爲􅃖􅀹旗又肩髀冢在山陽郡鉅野縣傳言􅃖尤與黄帝戰於􅃰鹿之野黄帝克之身體異處皆}
  - {type: page-break, offset: 3371, content: '', id: KR3k0012_SBCK_560-3b}
  - {type: variant, offset: 3371, length: 7, content: 仁恕德感禽獸初, WYG: 黄金其陽多美玉謂藍田是也故貪而葬焉并天下徒七十餘萬穿入地洞三泉而致椁宫觀竒器珍怪諸物藏之令一匠人作機弩人有近穴輙射之以水銀為百川江河大海金銀為鳬鶴機闗轉相幹終而復始上具天文以人魚膏為燈度乆不滅后宫無子者皆殉從死者甚衆恐匠知之殺工匠於藏中因閇羡門復土樹草木以像山墳高五十餘丈周迴五里餘後項籍燒其宫觀闗東賊發之後牧羊兒亡羊羊入藏中持火覔羊燔其椁後賊遂取其銅又曰太上皇葬萬年高帝父也高帝葬長陵孝惠帝霸陵諸陵皆用瓦器不為墳王莽之亂天下無道獨無灾害景帝葬陽陵孝武皇帝葬茂陵孝昭皇帝葬平陵孝宣皇帝葬杜陵孝元皇帝葬渭陵元帝下詔曰無置徙民令天下無騷動之憂自是陵園不置邑孝成帝葬延陵孝哀帝葬義陵孝平帝葬原陵孝文皇帝弟淮南厲王長坐謀反後置園如諸王長好道事八公世之愚者云長仙醫巫說曰淮南好道百官皆得仙狗吠雲中雞鳴天上東平思王冢在東平松皆西靡又曰蒼頡冢在馮翊衙縣利陽亭南道旁墻高六尺學書者皆往上姓名投刺祀之不絶又曰蚩尤冢在東郡夀張縣闗鄉城中高七尺民常十月祀之有赤氣出如一疋絳帛民名為蚩尤旗又有髀冢在山陽郡鉅野縣傳言蚩尤與黄帝戰於涿鹿之野黄帝克之身體異處皆}
