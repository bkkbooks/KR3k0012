  - {type: variant, offset: 1448, length: 840, content: 曰潛水縣有車騎將軍馮緄音袞桂陽太守李溫冢二子之靈常以日還鄉潛水暴長郡縣吏莫不水上祭之搜神記曰宋大夫韓馮取妻而美康王奪之馮怨王囚之論為城旦妻密遺馮書謬其辭曰其雨淫淫河大水深日出當心王以問蘇賀對曰其雨淫淫言愁且思也河大水深不得往來也日出當心有死志也俄而馮自殺妻乃陰腐其衣王與之登臺遂自臺投下左右攬之衣不中手遺書於帶曰願以骨與馮而合葬王怒弗聽使人埋之冢相望也王曰爾夫婦相愛不已能使冢合則弗禁也一宿有文梓木生於二冢之端旬日其大合抱屈體以相就根交於下又有鴛鴦雌雄各一恒栖樹上晨夕交頸悲鳴音聲感人宋人哀之遂號其木曰相思樹又曰漢馮貴人死將百歲盜賊發冢貴人顏色如故但微令群盜共姦之致妬忌爭鬭然後事覺續搜神記曰王伯陽家東有一冢傳云魯肅墓伯陽婦喪乃平其墳以葬後數年伯陽白日在廳事忽見一貴人乘平肩轝將從數百人馬皆浴鐵徑來坐謂伯陽曰吾是魯子敬安冢在此二百許年君何敢壞吾冢目顧左右掌伯陽下床以刀環築之數百而去登時絕良久乃蘇築破豦皆發疽潰尋便死又曰承儉者東莞音管人病亡葬本縣界後十年忽與其縣令夢云故民承儉今見劫明府急見救令便勑內外裝乘作百人仗便令馳馬往冢上日向已出天忽大霧對面不相見但聞冢中忷忷破棺聲有二人墳上望霧冥不見人百人同聲大叫收得冢中三人墳上二人得逸走其夜令夢云二人雖得走民已誌之一人面上有青誌如藿葉一人斲其兩齒折明府但案此尋覔也追捕並擒獲異苑曰蒼梧王士爕漢末死於交趾遂葬南境而墓常蒙霧靈異不恒屢經離亂不復發掘晉興寧中太原溫放之為剌史躬乘騎往開之還即墜馬而卒又曰潁川諸闔字道明墓在楊州蔣山之西每至陰雨冢中輒有絃管之音又曰魏武北征蹹頓升嶺眺矚見一崗不生百草王粲曰必是古冢此人在世服特生礜石死而石生熱蒸出外致大木燋滅即令鑿果得大墓有礜石蒲塋志怪集曰陶侃微時遭大喪葬家貧親自營塼有班特牛專以載致忽然失去便自尋覔道中逢一老公便舉手指云向於崗上見一牛眠山洿中必是君牛眠豦便好可作墓安墳則致極貴小下當位極人臣世為方嶽侃指一山云此好但不如下當世有剌史言訖便不復見太尉之葬如其言侃指別山與周訪家則并世剌史矣潘岳關中記, krp: ''}
