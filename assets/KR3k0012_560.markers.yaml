  - {type: variant, offset: 3387, length: 0, content: '', SBCK: 界又一丈二尺爲水界各有龍守之土龍六年而一暴水龍十二年而一暴當其隧者神道不安故􅀷二丈四尺之下可以設窀穸墓之四維謂之折壁欲下闊而上歛其中項謂之中樵中樵欲俯嶔而傍煞墓中末粉爲飾以代石堊不置瓴甋瓷瓦以其近}
  - {type: page-break, offset: 3387, content: '', id: KR3k0012_SBCK_560-5b}
  - {type: variant, offset: 3387, length: 0, content: '', WYG: 界又一丈二尺為水界各有龍守之土龍六年而一暴水龍十二年而一暴當其隧者神道不安故深二丈四尺之下可以設窀穸墓之四維謂之折壁欲下濶而上歛其中頃謂之中樵中樵欲俯嶔而傍煞墓中米粉為飾以代石堊不置瓴甋瓦以其近}
