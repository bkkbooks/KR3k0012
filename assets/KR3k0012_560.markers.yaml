  - {type: variant, offset: 1116, length: 196, content: 而數代天子耶鍾跪曰數代天子故當所樂便為定墓曰君可山下百步後顧見我去豦便是墳所也下山行百步便顧見悉化成白鶴也述異記曰南康郡鄧德明常在豫章就雷次宗學雷家世東郊之外去史豫章墓半里許元嘉十四年德明與諸生步月逍遙忽聞音樂諷誦之聲即夜白雷出聽曰此間去人尚遠必鬼神也乃相與尋之遙至史墓但開墳下有管綰女歌講吟詠之聲咸歎異焉酈善長注水經曰智水東逕七女冢冢夾水羅布如七星高十餘文周廻數畝元嘉六年大水破墳崩出銅不可, SBCK: 亦}
