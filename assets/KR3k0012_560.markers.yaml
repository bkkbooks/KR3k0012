  - {type: variant, offset: 3400, length: 3, content: 村鄉歲, SBCK: 應以旌善人果􅀗石堂其大如倉中空外堅四門入牗占曰此天所以祚有德也置之墓中其後終告後優詔褒贈寵及其子圖墓書曰大墓天剛嚴父之門八將之首位處乾尊欲得連堽隱軫狀如亂雲望之􅔘􅔘絶而復連小頓大起千里相牽壽過期頥丗丗登仙又曰望之如飛雷即之如鳥驚法出勇士伏節御兵又曰夫欲依山葬者其山連延百里不絶一髙一下小頓則大起出公卿􅀂三重之山望之似城郭多諸支別者亦出公卿如新月形在腹中葬冢之所􅀂至日没見日光者出封侯又曰凡相山陵之法山望如􅀛狀葬之出公卿封侯代代不絶山望如龍狀有頭尾蜲虵者葬之出二千石凡依山作冢皆當立在山東爲利得山之形力也山如􅀛形又巍巍直上如􅏱􅃺出二千石又曰欲知貧富堽陵肥薄􅃺如肥馬草木茂盛色黄紫皆冨也堽陵多傷􅆙土色赤白地瘠草木黄赤不茂或多細石皆貧相冢書曰冢欲得見郡縣城郭欲得連屬長長無極冢青氣鬰鬰出二千石赤氣出公卿白氣出刑戮黄氣出封侯欲得雌龍地多子孫不用雄龍堽武子堽又曰凡葬於龍耳貴出侯青烏子稱山三重相連名傘山葬之出二千石張載七哀詩曰北邙何纍纍髙陵有四五借問誰家冢皆云漢丗主魏武帝遺令曰汝等}
