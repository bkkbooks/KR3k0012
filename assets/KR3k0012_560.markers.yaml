  - {type: variant, offset: 13, length: 6, content: 昭帝母鉤弋夫, SBCK: 令狐徴君隱城東山中令狐終即云葬焉諸生遵師法而陪葬者三百餘家松三千樹大皆十數圍髙四五十丈今俗名其山曰令狐墓漢史所稱壷􅀜三老令狐茂者是也伏琛齊地記曰臨淄小城北門東二百餘歩有晏嬰冢又曰齊桓公冢齊城之南東十五里在牛山桓公冢西南八里有仲父冢葬於牛山之阿又曰朱虎城東二十里有柴阜其西南隅有魏獨行君子管寧墓石碑猶存城東北三十里柴阜東頭有魏徴士邴原墓石碑猶存又曰牛山西南二里有孫賔墓石碑猶存呉地記曰昌門外女墳者呉王闔閭女墓也乃以文石爲槨藏金王珎玩以}
