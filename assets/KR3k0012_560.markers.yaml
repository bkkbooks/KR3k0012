  - {type: variant, offset: 3233, length: 124, content: 而已輿地志曰瑟琶折有古冢半在水中甓有隱起字云瑟琶筮云吉龜云凶八百年墮水中謝靈運取甓至京師諸貴傳觀之神怪志曰王果經三峽見石壁有物懸之如棺使取之乃一棺也發之骸骨存焉有銘曰三百年後水漂我至長江垂欲墮欲落不落逢王果果凄然曰數百年前已知有我乃改葬祭之而去蘇州, WYG: 若新皇覽}
