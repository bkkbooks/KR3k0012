  - {type: variant, offset: 2581, length: 1, content: 餘, krp: 四尺之下可以設窀穸墓之四維謂之折壁欲下闊而上歛其中項謂之中樵中樵欲俯嶔而傍煞墓中末粉爲飾以代石堊不置瓴甋瓷瓦以其近於火不置黄金以其乆而爲恠不置朱丹雄黄譽石以其氣燥而烈使墳上草木枯而不潤不置羽毛其近於屍也鑄鐵爲牛豕之像可以禦二龍王潤而潔能和百神寘之墓内以助神道僧泓之說如此又曰大理卿徐有功持法不濫及其葬也將穿墓筮者曰必有異應以旌善人果獲石堂其大如倉中空外堅四門入牗占曰此天所以祚有德也置之墓中其後終告後優詔褒贈寵及其子圖墓書曰大墓天剛嚴父之門八將之首位處乾尊欲得連堽隱軫狀如亂雲望之􅔘􅔘絶而復連}
