  - {type: variant, offset: 3361, length: 9, content: 宋青州剌史郁泰玄性, WYG: 顓頊冢在東都濮陽縣頓丘城外廣陽里中王莽時使使者祠顓頊冢又曰秦始皇冢在驪山古之驪戎國今之新豐也晉獻公伐驪戎獲二女其山隂}
