  - {type: variant, offset: 2673, length: 1, content: 江, krp: 凡相山}
  - {type: variant, offset: 2675, length: 0, content: '', krp: 之法山望如龜狀葬之出公卿封侯代代不絶山望如龍狀有頭尾蜲虵者葬之出二千石凡依山作冢皆當立在山東爲利得山之形力也山如龜形又巍巍直上如闕狀出二千石又曰欲知貧富堽陵肥薄狀如肥馬草木茂盛色黄紫皆冨也堽陵多傷缺土色赤白地瘠草木黄赤不茂或多細石皆貧相冢書曰冢欲得見郡}
  - {type: variant, offset: 2676, length: 1, content: 東, krp: 城郭欲得連屬長長無極冢青氣鬰鬰出二千石赤氣出公卿白氣出刑戮黄氣出封侯欲得雌龍地多子孫不用雄龍堽武子堽又曰凡葬於龍耳貴出侯青烏子稱山三重相連名傘山葬之出二千石張載七哀詩曰北邙何纍纍髙陵有四五借問誰家冢皆云漢丗主魏武帝遺令曰汝等時時登銅雀䑓望吾西陵墓田魏文帝爲漢帝置守冢詔曰朕承符運受終革命其敬事山陽公如舜之宗堯有始有卒傳之無窮前羣司奏處正朔欲使一皆從魏制意所不安其令山陽公於其國中正朔服色祭祀禮樂自如漢又爲武昭宣明帝置守冢各三百家宋孝武置自古帝王守冢户詔曰先代帝王因時創業君人建國禮尊}
  - {type: variant, offset: 2677, length: 394, content: 南七十里有楚昭王墓高四丈餘王粲登樓賦所謂西接昭丘是也盛弘之荊州記曰霄城東南有單龍村村外有單龍冢甚高大舊傳單龍能仰觀俯察少公之儔也數稱劉氏當王聖公應其符聖公潛嘉之固此起兵後稱號於宛而龍卒故厚為其葬又曰鄭鄉即鄭城地也崗南有劉長沙墓益州牧馬之父其南又有漢魏郡太守黃香冢鄧德明南康記曰白水有高巖臨水頂有柴侯墓遙望松樹卒歲不彫說者云墓豦極峻及累石為冢又別有金錢藏不可得開若欲上山必遇雷晦之異夜時見光色如雷之爛音艷所謂寶精也又曰平固水口下數裏有螺亭昔一少女曾江畔乘小船採螺停沙邊共宿夜聞騷騷如軍馬行須臾見群螺張口無數突來破舍噉此女子同侶悉走上岸至曉方還伹見骨耳收埋林際報其家經四五日間所埋豦飜見古冢高十餘丈穹隆頂可受二十人坐其旁多螺新故相傳謂之螺亭又曰南野山獻山大塘下流三十里有漢太傅陳蕃冢墓昔值軍亂聞墓有寶三軍爭掘忽有大虵圍繞墳前崩雷晦雨當時竟不得發鄭緝之東陽記曰孝子許孜父墓去虎山十里在山之麓曲隧, WYG: ''}
