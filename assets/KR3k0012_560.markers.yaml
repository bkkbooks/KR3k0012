  - {type: variant, offset: 8, length: 3, content: 三三秦, SBCK: 四禮論曰問郡將臨墓主人先以除身無服將􅀂不􅂘主人當􅂘否賀循荅之云凡君臣民皆湏先君􅂘禮也此􅀕君冝􅂘則主人不敢以哭煩君耳又曰問墓中有何靣爲上荀納以爲縁生奉終冝依禮坐蔡謨難據周公明堂位東西以此爲上與納反納又引廟位以荅王濮陽北墓向南以西爲上上黨郡}
  - {type: variant, offset: 8, length: 3, content: 三三秦, WYG: 四禮論曰問君將臨墓主人先以除身無服將若不哭主人當哭否賀循答之云凡君臨臣民皆須先君哭禮也此際君宜哭則主人不敢以哭煩君耳又問墓中有何面為上荀納以為縁生奉終宜依禮坐蔡謨雖據周公明堂位東西以北為上與納反納又引廟位以答王濮陽北墓向南以西為墓上上黨郡}
