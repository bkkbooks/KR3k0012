  - {type: variant, offset: 317, length: 394, content: 藏一切發掘其奇異者魏襄王冢以文石為槨高八尺許廣狹容四十人以手捫棺滑液如新中有石床石屏風婉然周正不覺棺柩盥器縱跡但床上玉唾盂一枚銅劍二枚金雜具皆如新玉自取服之襄王冢以鐵灌其上穿鑿三日乃開黃氣如霧觸人鼻目痺辛不可入以兵守之經曰乃歇初至一戶無扉籥石床方四尺床上有石几左右各三石人立侍皆武冠帶劍復入一戶石扉有關籥叩見棺槨黑光照人刀斫不入燒鋸截之乃漆雜兕革為棺槨厚數寸累積十餘重力不能開乃止復入一戶亦石扉關鑰得一石床方七尺屏風銅帳鉤或在床上或在地下似是帳糜朽而銅鉤墮落床上石枕一枚床上塵埃朏朏音斐甚高似是衣服床左右婦女二十悉皆立侍或有執巾櫛鏡鑷之象或有執盥捧食之形無餘異物俱見鐵鏡數百所魏王子且渠冢甚淺狹無柩但有石床廣六尺長一丈石屏風下悉是雲母床上兩屍一男一女年皆二十許俱東首祼形臥無衣裳肌膚顏色髮齒如生人畏懼不敢侵擁閉如故袁盎冢以瓦為棺器物都無唯銅鏡一枚晉靈公冢甚瑰壯四角皆以石為玃大奉燭石人男女, SBCK: 髙}
