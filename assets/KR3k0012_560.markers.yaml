  - {type: variant, offset: 1979, length: 201, content: 人面上有青誌如藿葉一人斲其兩齒折明府但案此尋覔也追捕並擒獲異苑曰蒼梧王士爕漢末死於交趾遂葬南境而墓常蒙霧靈異不恒屢經離亂不復發掘晉興寧中太原溫放之為剌史躬乘騎往開之還即墜馬而卒又曰潁川諸闔字道明墓在楊州蔣山之西每至陰雨冢中輒有絃管之音又曰魏武北征蹹頓升嶺眺矚見一崗不生百草王粲曰必是古冢此人在世服特生礜石死而石生熱蒸出外致大木燋滅即令鑿果得大墓有礜石蒲塋志怪集曰陶侃微時遭大喪葬家貧親自營塼有班特牛專以, SBCK: ''}
