  - {type: variant, offset: 3380, length: 3, content: 日群鷰, WYG: 又曰奚仲冢在魯國縣東去縣二十五里山上因名奚仲山下亭名奚仲亭又曰湯冢在濟隂薄縣北郭冢四方八十步高七尺上平又曰吴太伯冢在會稽吴縣北去城十里又曰周文王武王周公冢在京兆長安縣又曰王子黽音猛冢在南陽鄂縣西又曰夏育冢在濟南歴山上又曰秦穆公冢在甘泉宫祈年觀下又曰虢公冢在河内温縣東濟水南大冢是也其城南有虢公臺又曰葉公諸梁子高冢在南郡葉縣西北去城三里所近縣民皆祠之又曰魯大夫叔梁紇冢在魯國東陽聚安泉東北八十四步名曰防冢民傳曰防墳於墳地微高又曰孔子冢在魯城北便門外南去城十里冢塋方百畆冢南北廣十步東西十步高丈二尺冢為祠壇方六尺與地方平無祠堂冢塋中樹以百}
