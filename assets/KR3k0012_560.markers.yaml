  - {type: variant, offset: 734, length: 1874, content: 其餘器物皆朽爛不別唯玉蟾一枚大如拳腹空容五合水光潤如新玉取以成水書滴幽公冢甚高壯羨門既開皆是石惡撥除深丈餘乃得雲母深尺所乃得百餘尸縱橫相枕皆不朽唯一男子餘悉女子或臥亦有立者衣服形色不異生人欒書冢棺柩明器朽爛無餘有白狐見人驚走左右逐戟之不能得傷其左腳夕王夢一丈夫鬢眉盡白來謂王曰何故傷吾左腳仍以杖叩王左腳王覺左腳腫痛生瘡至死不差述征記曰梁孝王冢斬山徙戶以石為藏行一里到藏中有數尺水有大鯉魚人皆潔而進不齊輒有獸噬其足獸似豹也幽明錄曰漢末大亂頴川有人將避地他郡有女年七八歲不能涉遠勢不兩全道邊有古冢穿敗以繩繫女下之經年餘還於冢尋覔欲更殯葬忽見女尚存父大驚問女得活意女云冢中有一物於晨暮際輒伸頭翕氣為試效之果覺不復飢渴家人於冢尋索此物乃是大龜又曰孫鍾吳郡富春人堅之祖也與母居至孝篤信種瓜為業忽有三年少詣乞瓜鍾為設食臨去曰我司命也感君不知何以相報此山下善可作冢復言欲連世封侯而數代天子耶鍾跪曰數代天子故當所樂便為定墓曰君可山下百步後顧見我去豦便是墳所也下山行百步便顧見悉化成白鶴也述異記曰南康郡鄧德明常在豫章就雷次宗學雷家世東郊之外去史豫章墓半里許元嘉十四年德明與諸生步月逍遙忽聞音樂諷誦之聲即夜白雷出聽曰此間去人尚遠必鬼神也乃相與尋之遙至史墓但開墳下有管綰女歌講吟詠之聲咸歎異焉酈善長注水經曰智水東逕七女冢冢夾水羅布如七星高十餘文周廻數畝元嘉六年大水破墳崩出銅不可稱計北有七女池池東有明月池狀如偃月皆相通注謂之張良渠蓋良所開也又曰粉水有文將軍冢前有石虎石柱甚脩麗閭丘羨為南陽葬婦墓側將平其域夕夢文諫止之而羨不從後羨乃為人所害又曰淄水出太山萊蕪縣原山東過利縣東水西有桓公冢冢東有女水或云桓公女冢在其上故以名水甚有神焉化隆則水生政薄則津竭又曰潛水縣有車騎將軍馮緄音袞桂陽太守李溫冢二子之靈常以日還鄉潛水暴長郡縣吏莫不水上祭之搜神記曰宋大夫韓馮取妻而美康王奪之馮怨王囚之論為城旦妻密遺馮書謬其辭曰其雨淫淫河大水深日出當心王以問蘇賀對曰其雨淫淫言愁且思也河大水深不得往來也日出當心有死志也俄而馮自殺妻乃陰腐其衣王與之登臺遂自臺投下左右攬之衣不中手遺書於帶曰願以骨與馮而合葬王怒弗聽使人埋之冢相望也王曰爾夫婦相愛不已能使冢合則弗禁也一宿有文梓木生於二冢之端旬日其大合抱屈體以相就根交於下又有鴛鴦雌雄各一恒栖樹上晨夕交頸悲鳴音聲感人宋人哀之遂號其木曰相思樹又曰漢馮貴人死將百歲盜賊發冢貴人顏色如故但微令群盜共姦之致妬忌爭鬭然後事覺續搜神記曰王伯陽家東有一冢傳云魯肅墓伯陽婦喪乃平其墳以葬後數年伯陽白日在廳事忽見一貴人乘平肩轝將從數百人馬皆浴鐵徑來坐謂伯陽曰吾是魯子敬安冢在此二百許年君何敢壞吾冢目顧左右掌伯陽下床以刀環築之數百而去登時絕良久乃蘇築破豦皆發疽潰尋便死又曰承儉者東莞音管人病亡葬本縣界後十年忽與其縣令夢云故民承儉今見劫明府急見救令便勑內外裝乘作百人仗便令馳馬往冢上日向已出天忽大霧對面不相見但聞冢中忷忷破棺聲有二人墳上望霧冥不見人百人同聲大叫收得冢中三人墳上二人得逸走其夜令夢云二人雖得走民已誌之一人面上有青誌如藿葉一人斲其兩齒折明府但案此尋覔也追捕並擒獲異苑曰蒼梧王士爕漢末死於交趾遂葬南境而墓常蒙霧靈異不恒屢經離亂不復發掘晉興寧中太原溫放之為剌史躬乘騎往開之還即墜馬而卒又曰潁川諸闔字道明墓在楊州蔣山之西每至陰雨冢中輒有絃管之音又曰魏武北征蹹頓升嶺眺矚見一崗不生百草王粲曰必是古冢此人在世服特生礜石死而石生熱蒸出外致大木燋滅即令鑿果得大墓有礜石蒲塋志怪集曰陶侃微時遭大喪葬家貧親自營塼有班特牛專以載致忽然失去便自尋覔道中逢一老公便舉手指云向於崗上見一牛眠山洿中必是君牛眠豦便好可作墓安墳則致極貴小下當位極人臣世為方嶽侃指一山云此好但不如下當世有剌史言訖便不復見太尉之葬如其言侃指別山與周訪家則并世剌史矣潘岳關中記曰秦始皇陵上驪山之北高數十丈周廻六七里今在陰盤界此陵雖高大不足以銷六十萬人積年之功也其用功力或隱而不見者驪山泉本北流者皆陂障使西流又此無大石運取於渭北諸山故其歌曰運石甘泉口渭水為不流千人一唱萬人相鉤又曰漢諸陵皆高十二丈方百二十步唯茂陵高十四丈方百四十步徙民置諸縣者凡七陵長陵茂陵各萬戶其餘五陵皆各五千縣屬太常不領郡也守衛陵掃除凡五千戶陵令一人食官令一人寢廟令一人園長一人園門令史三十二人候四人元帝時三輔七十萬戶始不復從民陪陵渭陵延陵義陵皆不立縣也雷次宗豫章記曰郡東南二十里有一大冢號丹陽郭長老云是郡人丹陽太守聶友冢也外形甚高大內一大冢居中兩邊各有四小冢橫首大冢外作徼道周匝皆通冢裏高二丈餘小者半之徼道又半之此冢相通一埏似是殉葬者不聞聶友奢僣, WYG: 珍玩}
