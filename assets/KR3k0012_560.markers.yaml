  - {type: variant, offset: 2288, length: 423, content: 曰秦始皇陵上驪山之北高數十丈周廻六七里今在陰盤界此陵雖高大不足以銷六十萬人積年之功也其用功力或隱而不見者驪山泉本北流者皆陂障使西流又此無大石運取於渭北諸山故其歌曰運石甘泉口渭水為不流千人一唱萬人相鉤又曰漢諸陵皆高十二丈方百二十步唯茂陵高十四丈方百四十步徙民置諸縣者凡七陵長陵茂陵各萬戶其餘五陵皆各五千縣屬太常不領郡也守衛陵掃除凡五千戶陵令一人食官令一人寢廟令一人園長一人園門令史三十二人候四人元帝時三輔七十萬戶始不復從民陪陵渭陵延陵義陵皆不立縣也雷次宗豫章記曰郡東南二十里有一大冢號丹陽郭長老云是郡人丹陽太守聶友冢也外形甚高大內一大冢居中兩邊各有四小冢橫首大冢外作徼道周匝皆通冢裏高二丈餘小者半之徼道又半之此冢相通一埏似是殉葬者不聞聶友奢僣以人從死也且今新塗音紺縣南十里見聶友墓荊州圖記曰酈縣北三十里有一墓甚崇偉前有石樓高一丈五尺上作石鳳將九子相傳云是姚家墓不詳其人又曰江陵縣東南七十里有楚昭王墓高四丈餘王粲登樓賦所謂西接昭丘是也盛弘之荊州記曰霄, SBCK: 于堯碑}
