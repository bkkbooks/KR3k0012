  - {type: variant, offset: 3406, length: 2, content: 至今, SBCK: 禮樂自如漢又爲武昭宣明帝置守冢各三百家宋孝武置自古帝王守冢户詔曰先代帝王因時創業君人建國禮尊南面而歴運推移年代乆逺丘壠殘毀撨牧相趍􅉷兆堙蕪封樹莫辨自古以來帝王陵墓可隨近十户蠲其役以供守視宋髙祖脩楚元王墓詔曰夫褒賢崇德千載弥尊敦夲敬始義隆自逺楚元王積仁基德啓藩斯境素風道隆作範後昆夲支之祚實隆鄙宗遺芳餘烈􅁬于百代而丘封依然墳塋莫翦感逺存徃􅁣焉永懷夫愛人懷樹甘棠且猶勿翦追甄墟墓信陵尚或}
