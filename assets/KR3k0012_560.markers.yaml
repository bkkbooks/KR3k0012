  - {type: variant, offset: 2972, length: 438, content: 餘丈穹隆頂可受二十人坐其旁多螺新故相傳謂之螺亭又曰南野山獻山大塘下流三十里有漢太傅陳蕃冢墓昔值軍亂聞墓有寶三軍爭掘忽有大虵圍繞墳前崩雷晦雨當時竟不得發鄭緝之東陽記曰孝子許孜父墓去虎山十里在山之麓曲隧三里鹿嘗食其松栽孜心念之即日鹿自死於所犯栽之下孜埋死鹿有小墳至今猶存又曰獨公山有古冢臨溪其塼文曰筮言吉龜言凶三百年墮水中義熙中冢猶半存自後稍以崩盡會稽郡十城地志曰上虞縣東南有古冢二十餘墳宋元嘉之初潮水壞其大冢初壞一冢塼題文曰居在本土厥姓黃卜葬於此大富強易卦吉龜卦凶四百年後隨江中當墜值王顒縣令皮熙祖取數塼置縣樓下池中錄之悵然而已輿地志曰瑟琶折有古冢半在水中甓有隱起字云瑟琶筮云吉龜云凶八百年墮水中謝靈運取甓至京師諸貴傳觀之神怪志曰王果經三峽見石壁有物懸之如棺使取之乃一棺也發之骸骨存焉有銘曰三百年後水漂我至長江垂欲墮欲落不落逢王果果凄然曰數百年前已知有我乃改葬祭之而去蘇州冢墓記曰宋青州剌史郁泰玄性多仁恕德感禽獸初葬之日群鷰數千銜土於冢上今冢猶高大與他墳有異村鄉歲時祭祀至今不絕, krp: ''}
