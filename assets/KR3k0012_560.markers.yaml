  - {type: 'tls:seg', offset: 2397, content: '', id: KR3k0012_CHANT_560-21a.4}
  - {type: variant, offset: 2397, length: 0, content: '', krp: 上平又曰呉太伯冢在㑹稽呉縣北去城十里又曰周文王武王周公冢在京兆長安聚又曰王子黽音猛冢在南陽鄂縣西又曰夏育冢在濟南歴山上又曰秦繆公冢在甘泉宮祈年觀下又曰􅉑公冢在河内温縣東濟水南大冢是也其城南有􅉑公䑓又曰葉公諸梁子髙冢在南郡葉縣西北去城三里所近縣民皆祠之又曰魯大夫叔梁紇冢在魯國東陽聚安泉東北八十四歩名曰防冢民傳言防墳於墳地微髙又曰孔子冢在魯城北便門外南去城一里冢塋}
  - {type: variant, offset: 2399, length: 0, content: '', krp: 畝冢南北廣十歩東西十歩髙丈}
