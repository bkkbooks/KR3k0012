  - {type: variant, offset: 3549, length: 412, content: 水悉上抱罕自是二年而乾歸徙焉晉太康地記曰鳥鼠之山在隴西首陽縣穴入三四尺鼠在內鳥在外鄧德明南康記曰南康山石室號金堂內金色有金鼠時見也金樓子曰齊鬱林王夜中與官者共剌鼠至曉夜輒得數十藍又曰晉寧縣境內出大鼠鼠狀如牛土人謂之偃鼠天時將失鼠則從山出遊畎畝散落其毛悉成小鼠五稼必盡耗也後魏盧元明劇鼠賦曰嗟乎在物最為可賤毛骨莫充於玩賞脂肉不登於俎膳其為狀也僣悞且吁睢離睒上濫切賜音釋鬚似麥穟半垂眼如豆角中劈耳類槐葉初生尾若杯酒餘瀝乃有老者羸髖寬申二音𤴾瘠偏多姦計眾中無敵社託忌器妙解自惜深藏厚閉巧能推覔或尋繩而下或自地高擲登机緣匱盪扉動弈切切終朝轟轟竟夕是以詩人為辭寔云其碩盜于湯之珍俎傾留髦之香澤傷繡領之斜製毀羅衣之重襞曹舒由是獻規張湯為之被讁亦有閑居之士倦游之客絕慶吊以養真素笄左右而尋詩易庭院肅清房攏虛寂爾乃群鼠乘間東西挑擲或床上將髭或戶間出額貌甚舒暇情無畏愓又領其黨與欣欣奕奕欹覆箱奩騰踐菌席共相侮慢特無宜適訝天壤之含弘產此物其何益, SBCK: ''}
