  - {type: variant, offset: 1689, length: 0, content: '', SBCK: 夲草曰狸肉甘}
  - {type: page-break, offset: 1689, content: '', id: KR3k0012_SBCK_912-2a}
  - {type: variant, offset: 1689, length: 0, content: '', krp: 夲草曰狸肉甘}
  - {type: variant, offset: 1690, length: 0, content: '', SBCK: 毒主風濕􅀑毒氣皮中如針㓨歸藏曰昔者桀筮伐唐而枚占熒惑曰不吉彼爲貍我爲䑕勿用作事恐傷其父者也風俗通曰汝陽西門習武亭有􅀑魅􅀫者輙死其厭者皆亡髮北部督郵西平郅伯夷到亭上樓􅀫誦六甲孝經易夲記卧宻抜剱解帶夜有正異者四五尺來覆伯夷以劒帶擊魅脚呼下燈照見一老狸正赤略無毛衣持下燒殺明旦發樓屋得所亡髮人髺百餘因此遂絶神仙傳曰欒巴爲豫章太守先是廬山廟中與人言語飲酒投桮音杯能使宮亭湖中分風行者舉㠶相逢巴未到十數日廟中神不復作聲不知所在巴到自上表􅀃廟􅀑詐稱天官欺損百姓積􅄽日夕罪當窮治乞以事付功曹臣身行捕逐如不治討恐其復遊行天下所在血食枉病良民責以重禱乃至所在推求山川社稷問􅀑蹤跡此􅀑乃到齊國爲書生齊太守見之旣有容美麗又有才辯學識論經􅀃義}
  - {type: page-break, offset: 1690, content: '', id: KR3k0012_SBCK_912-2b}
  - {type: variant, offset: 1690, length: 0, content: '', krp: 毒主風濕鬼毒氣皮中如針㓨歸藏曰昔者桀筮伐唐而枚占熒惑曰不吉彼爲貍我爲䑕勿用作事恐傷其父者也風俗通曰汝陽西門習武亭有鬼魅宿者輙死其厭者皆亡髮北部督郵西平郅伯夷到亭上樓宿誦六甲孝經易夲記卧宻抜剱解帶夜有正異者四五尺來覆伯夷以劒帶擊魅脚呼下燈照見一老狸正赤略無毛衣持下燒殺明旦發樓屋得所亡髮人髺百餘因此遂絶神仙傳曰欒巴爲豫章太守先是廬山廟中與人言語飲酒投桮音杯能使宮亭湖中分風行者舉㠶相逢巴未到十數日廟中神不復作聲不知所在巴到自上表說廟鬼詐稱天官欺損百姓積愆日夕罪當窮治乞以事付功曹臣身行捕逐如不治討恐其復遊行天下所在血食枉病良民責以重禱乃至所在推求山川社稷問鬼蹤跡此鬼乃到齊國爲書生齊太守見之旣有容美麗又有才辯學識論經說義}
  - {type: variant, offset: 1691, length: 0, content: '', SBCK: 在齊人莫不見知太守亦不知是􅀑乃以女妻之生一男巴到與太守相見語畢問聞卿有一女􅡾明五經諸子可得相見不太守請女􅡾詐病辝不出而巴求之不止聓告其婦言吾今日出必}
  - {type: variant, offset: 1691, length: 0, content: '', krp: 在齊人莫不見知太守亦不知是鬼乃以女妻之生一男巴到與太守相見語畢問聞卿有一女􅡾明五經諸子可得相見不太守請女􅡾詐病辝不出而巴求之不止聓告其婦言吾今日出必}
  - {type: punctuation, offset: 1692, content: ，, id: KR3k0012_CHANT_912-bkkpn552}
  - {type: 'tls:seg', offset: 1692, content: '', id: KR3k0012_CHANT_912-22a.12}
  - {type: variant, offset: 1692, length: 0, content: '', SBCK: 如何女亦恠之不知何以巴知不敢出乃求奏板一枚并筆書符付太守曰以此與賢女􅡾自當出也女􅡾得符流涕與婦辤訣而出望見巴即身體巳變爲狸而靣故是人也巴厲聲呵言死狸敢尓何不正汝真形即盡爲狸巴復曰斬之亦不斬者而狸頭巳斷於地又言取狸子來湏􅁷太守女所生兒巳復爲狸子即又斬之巴辭還郡搜神記曰􅀶陵劉伯祖爲河東太守所止承塵上有神能語常呼伯祖與語及京師詔書告下消息輙預告伯祖伯祖問其所食啖欲得羊肝買羊肝於前切之臠隨刀不見盡兩羊肝有一老狸眇眇在案前持刀者欲舉之刀斫之伯祖呼止自與着承塵上湏􅁷大􅀏曰向者啖肝醉忽失形與府君相見大慙愧後伯祖當爲司􅀠神復先語伯祖云某月某日詔書當到至期如言及入司􅀠府神隨逐在承塵上輙言省内事伯祖大恐怖語神曰今職在刺舉君左右貴人聞神在此因以相害神荅曰誠如府君所慮相當相捨去遂即無聲幽明録曰吴興戴眇家僮客姓王有少婦美色而眇中弟􅁪往就之客私懷忿怒具以白􅆌中郎作此甚爲無理願尊勑語眇以問弟弟大罵曰何縁有此}
