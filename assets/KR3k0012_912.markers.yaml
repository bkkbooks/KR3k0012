  - {type: variant, offset: 79, length: 321, content: 所化也㐳鼠㐳令鼠也㐳音萍爾雅曰鼢鼠地中行者鼸鼠以頰裹藏食鼷鼠有螫毒者鼶鼠夏小曰鼬鼶則穴鼬鼠今鼬似鼦赤黃色大尾啖鼠江東呼為鼪者主鼩鼠音劬小鼱鼩也鼫鼠形大如鼠頭似兔尾有毛青黃色好在田中食粟豆閩中呼為鼩鼠鼤鼠鼨鼠豹文鼮鼠音廷文彩如豹鼳鼠音孤覔切似鼠而大蒼黑色在樹上又鼯鼠夷由狀如小狐似日旦乳亦謂之蝙蝠肉翅飛飛生音如人呼廣志曰白猨尾長白腹善緣登若家鼠小異者鼢鼠深目而短尾苗鼠者野鼠也小而短尾夭鼠以皮為裘今當名其裘為天鹿裘黃鼠在田野鼠為群害穀夌善走凡狗不得唯鼠狼能得之左傳曰齊侯將為臧紇田與之邑臧紇聞之見齊侯與之言伐晉對曰多則多矣抑君似鼠晝伏夜動不穴於寢廟畏人故也今君聞晉之亂而後作焉寧將事之非鼠而何乃弗與田詩曰誰謂鼠無牙何以穿我墉誰謂汝無家何以速我訟, krp: 班然}
