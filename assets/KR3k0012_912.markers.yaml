  - {type: variant, offset: 1901, length: 0, content: '', WYG: 虎尾不負狸身象牙不出䑕穴本草曰狸肉甘無毒主治濕鬼毒氣皮中如針刺歸藏曰昔者桀筮伐唐而枚占熒惑曰不吉彼為狸我為䑕勿用作事恐傷其父也風俗通曰汝陽西門習武亭有鬼魅宿者輙死其免者皆亡髮北部督郵西平郅伯夷到亭上樓宿誦六甲孝經易本記卧宻㧞劍解帶夜有怪異四五箇来覆伯夷以劍帯繫魅脚呼下燈照見一老狸身赤略無毛衣持下燒殺明旦發樓屋得所亡髮髻百餘因此遂絶神仙傳曰欒巴為豫章太守先是廬山廟中有人言語飲酒投桮音杯能使宫亭湖中分風行者舉帆相逄巴未到十數日廟中人不復作聲不知所在巴到自上表説廟鬼詐稱天官欺損百姓罪當窮治乞以事付功曹臣身行逐捕如不治討恐其復逰行天下所在血食枉病良民責以重禱乃至所在推求山川社稷問鬼踪跡此鬼乃到齊國為書生齊太守見之既有容美麗又有才辨學識論經義時在齊人莫不見知太守亦不知是鬼乃以女妻之生一男巴到與太守相見語畢問聞卿有一女壻明五經諸子可得相見否太守請婿詐病辭不出而巴求之不止婿告其言吾今日出必死如何女亦怪之不知何以巴知不敢出乃求奏板一枚并筆書符與太守曰以此與賢婿自當出也婿得符流涕與婦辭訣而出望見巴即身體已變為狸而靣故是人也巴厲聲呵言死狸敢爾何不正汝真形即盡為狸巴復曰斬之亦不見斬者而狸頭已斷巴又復言取狸子來須臾太守女所生亦變為狸子即又斬之巴辭還郡捜神記曰博陵劉伯祖為河東太守所止承塵上有神能語常呼伯祖與語及京師詔書吿下消息輙預告伯祖伯祖問其所食啖欲得羊肝買羊肝於前切之臠隨刀不見盡兩羊肝忽有一老狸𦕈𦕈在案前持刀者欲舉刀斫之伯祖呵止自與著承塵上須臾大笑曰向者啖肝醉忽失形與府君相見大慚愧後伯祖當為司隸神復先語伯祖云某月某日詔書當到至期如言及入司隸府神隨逐在承塵上輙言省内事伯祖大恐怖語神曰今職在刺舉若左右貴人聞神在此因以相害神答曰誠如府君所慮當相捨去遂即無聲幽明録曰呉興戴眇家僮客姓王有少婦美色而眇中弟恒往就之客私懷忿怒具以白眇中郎作此甚為無禮願尊勅語眇以問弟弟大罵曰何縁有此必是妖鬼勅令扑殺客初猶不敢約厲分明後来閉户欲縛便變成大狸従忩中出又曰董仲舒常下帷獨詠有客来詣語遂移日舒知其非常客又云欲雨仲舒因此戱之曰巢居知風穴居知雨卿非狐狸則是鼷鼠客聞此言色動形壊化成為狐狸也隋王度古鏡記曰大業七年五月余自御史告歸河東適侯生卒而得一鏡六月余歸長安宿於主人程雄家新授寄一婢頗稱端麗名曰鸚鵡余整冠履引鏡自照鸚鵡遥見便叩頭流血云不敢往余召雄問其故雄曰兩日前有一客携婢従東来時因病偶流寄扵此不知婢之由也余疑其精魅以鏡逼之遂自陳云本是華山廟前長松下千歳老狸乆行變惑罪當至死近為府君捕逐逃潛河渭之間為下封陳思恭義女思恭妻鄭氏見養恩厚嫁鸚鵡與鄊人柴華意不相浹惬逃而去東至韓城遂為行人李無慠所執無慠麄人也遂刼鸚鵡逰行至此不意天鏡一照自隠無路然已為人充羞復願忘形樂飲因而匣鏡置酒悉召雄家鄰里與共晏此婢大醉起舞歌曰寳鏡寳鏡哀哉余命自我離形扵今㡬姓生雖可樂死亦何傷何為眷戀守此一方歌畢化為狸而死述異記曰陳留董逸少時隣女梁瑩年稚色艶逸愛慕傾魂貽椒獻寳瑩亦納而未果獲逸隣人鄭充在逸所宿二更中門前有叩掌聲充卧望之亦識瑩語逸曰梁瑩今来逸驚躍出迎把臂入舎逸與瑩寢瑩仍求去逸攬持不置申欵逹旦逸欲留之瑩云為汝蒸豚作食食竟去逸起閉户施帳瑩因變形為狸従梁上走去金樓子曰狸不可使搏甝牛不可使捕䑕貂説文曰貂䑕屬也大而黄黑色出丁零國廣志曰貂出夫餘闗山圖曰霍山}
