  - {type: variant, offset: 1543, length: 116, content: 飛渡北海非梧桐不止非竹實不食非醴泉不飲於是鴟得腐鼠鵷鶵過而仰視之曰嚇今子欲以梁國相嚇我耶又曰鼴鼠飲河不過滿腹文子曰腐鼠在阼燒香於堂尹文子曰鄭人謂玉未理者為璞周人謂鼠未腊者為璞周人乃懷璞問鄭賈曰欲買璞乎賈曰欲因出其璞視之乃鼠也因謝不取, WYG: 殘形}
