  - {type: variant, offset: 1684, length: 4, content: 孟賁探鼠, SBCK: 狸頭止癙癙寒􅀬病也鷄頭止瘻抱朴子曰虎尾不􅀒狸身象牙不出䑕}
  - {type: variant, offset: 1684, length: 48, content: 孟賁探鼠穴無時死必噬其指失其勢孟賁勇士為探鼠於穴故曰失其勢又曰季春之月田鼠化為鴽淮南萬畢術曰狐目, WYG: ''}
  - {type: variant, offset: 1684, length: 4, content: 孟賁探鼠, krp: 狸頭止癙癙寒熱病也鷄頭止瘻抱朴子曰虎尾不負狸身象牙不出䑕}
