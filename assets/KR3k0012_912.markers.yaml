  - {type: variant, offset: 1912, length: 0, content: '', WYG: 柔蠕故天下以為名裘魏志曰挹樓國出好貂今所謂挹樓貂是也江表傳曰遼東太守遣使詣孫權送貂皮欲舉國歸吳晉書曰趙王倫簒位至於奴卒厮役亦加以爵位每朝㑹貂蟬盈座時為之諺曰貂不足狗尾續異苑曰貂出句麗國常有一物共居穴或見之身貌類人}
