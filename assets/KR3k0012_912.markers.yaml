  - {type: variant, offset: 224, length: 176, content: 蝙蝠肉翅飛飛生音如人呼廣志曰白猨尾長白腹善緣登若家鼠小異者鼢鼠深目而短尾苗鼠者野鼠也小而短尾夭鼠以皮為裘今當名其裘為天鹿裘黃鼠在田野鼠為群害穀夌善走凡狗不得唯鼠狼能得之左傳曰齊侯將為臧紇田與之邑臧紇聞之見齊侯與之言伐晉對曰多則多矣抑君似鼠晝伏夜動不穴於寢廟畏人故也今君聞晉之亂而後作焉寧將事之非鼠而何乃弗與田詩曰誰謂鼠無牙何以穿我墉誰謂汝無家何以速我訟, SBCK: 班然}
