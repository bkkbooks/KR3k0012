  - {type: variant, offset: 3345, length: 53, content: 疋詔諸臣子弟皆從受爾雅許邁別傳曰邁小名映有鼠嚙映衣乃作符占鼠莫不畢至於中庭映曰齧衣者留不齧衣者去群鼠並去唯, SBCK: ''}
  - {type: variant, offset: 3345, length: 203, content: 疋詔諸臣子弟皆從受爾雅許邁別傳曰邁小名映有鼠嚙映衣乃作符占鼠莫不畢至於中庭映曰齧衣者留不齧衣者去群鼠並去唯一鼠獨住伏於中庭而不敢動梁州記曰仙人唐公房祠有碑一所廟北有大坑碑文云是其舊宅處公房舉宅登仙故為坑焉山有易腸鼠一月吐易其腸束廣懲所謂唐鼠者也博物志曰唐房升仙鷄犬去唯以鼠惡不將鼠自侮一月三出腹劉欣期交州記曰竹風鼠如小狗子食竹根出封溪縣秦州記曰乞佛虜乾歸未移枹罕金城見鼠有數萬頭將諸小鼠各銜焉屎群移而度洮麗, WYG: 十}
