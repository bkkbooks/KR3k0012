  - {type: variant, offset: 1914, length: 4, content: 寸居空木, WYG: 尺能制貂愛樂刀子其俗人欲得貂皮以刀挿穴口此物夜出穴置貂刀邉須人持皮去乃取刀隋書曰北室韋其俗以捕貂為業南室韋亦多貂貀汝滑切説文曰貀獸無前足漢津能捕豺貀購百錢爾雅曰貀無前足郭璞曰晉書太康七年召陵扶夷縣檻得獸似狗豹文有角兩脚即此類也或曰貀似虎而黒無前兩足也廣雅曰貀豹也唐書曰長慶}
