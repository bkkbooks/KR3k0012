  - {type: variant, offset: 2499, length: 0, content: '', WYG: 田䑕也以能除害故列祀典今反乳之是為失常且猫受人食養而棄職不脩亦何異法吏不勤觸邪疆吏不勤捍敵是天將垂戒故不敢賀衆皆服代宗嘉其正直獺禮記月令曰孟春之月獺祭魚然後虞人入澤梁説文曰獺如小狗水居食魚猵音編屬也遁甲開山圖曰霍山南嶽其獸多柴獺山邉水故有柴獺淮南子曰愛獺而飲之酒欲養之非其道言獺飲酒而敗風土記曰陽羡縣前有大橋下有白獺將有兵動獺出穴口向人嘷之魏略曰南蠻皆用獺為冠鹽鐡論曰水有猵音篇獺而池魚勞國有强禦而齊民消獨曰猵羣曰獺又如淳注}
