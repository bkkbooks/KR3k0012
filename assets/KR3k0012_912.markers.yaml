  - {type: punctuation, offset: 1715, content: 「, id: KR3k0012_CHANT_912-bkkpn560}
  - {type: variant, offset: 1715, length: 1, content: 季, SBCK: 董仲舒常下帷獨詠有客來詣語遂移日舒知其非常客又云欲􅀨仲舒因此戲之曰巢居知風穴居知􅀨卿非狐狸則是鼷䑕客聞此言色動形壞化成老狐狸也隋王度古鏡記曰大業七年五月余自御史告歸河東適遇侯生卒而得一鏡六月余歸長安􅀫於主人程雄家新授􅀉一婢頗稱端麗各曰鸎鵡余整冠履引鏡自照鸎鵡遥見便叩頭流血云不敢住余召雄問其故雄曰兩日前有一客携婢從東來來時病困因留􅀉於此不知婢之由也余疑其精魅以鏡逼之遂自陳云夲是華山廟前長松下千歳老狸乆行變惑罪當至死近爲府君捕逐逃潜河渭之間爲下邽陳思恭義女思恭妻鄭氏見養恩厚嫁鸎鵡與郷人柴華意不相愜逃而去東至韓城遂爲行人李無慠所執無傲麄人也遂刼鸎鵡遊行至此不意天鏡一照自隱無路然爲人巳乆羞復故形願樂飲而因匣鏡置酒悉召雄家􅀋里與共飲宴此婢大醉起舞歌曰寳鏡寳鏡哀哉余命自我離形于今幾姓生雖生可樂死不必傷何爲眷戀守此一方歌畢化爲狸而死述異記曰陳留董逸少時隣女梁瑩年稚色艶逸愛慕傾魂貽椒獻寳瑩亦納而未獲果後逸隣人鄭充在逸許􅀫二更中門前有叩掌聲充卧望之亦識瑩語逸梁瑩今來逸驚躍出迎把臂入舎逸與瑩寢瑩仍求去逸􅄃持不置申欵逹旦逸欲留之云爲汝烝㹠作食竟去逸起閉户絶帳瑩因變形爲狸從梁上走去金樓子曰貍之不可棲處牛不可使捕䑕貂􅀃文曰貂䑕属也大而黄黒色出丁零國廣志曰貂出夫餘􅀜山圖曰霍山南岳其獸多赤貂東觀漢記曰建武二十五年烏桓詣闕朝賀獻貂皮魏書曰鮮卑有貂豽女滑切鼲音魂子皮毛柔蠕故天下以爲名裘魏志曰挹婁國出好貂今所謂挹婁貂是也江表傳曰遼東太守遣使詣孫權送貂皮千枚欲舉國歸吴晉書曰趙王倫篡位至於奴卒厮役亦加以爵位每朝㑹貂蟬盈坐時爲之喭曰貂不足狗尾續異苑曰貂岀句麗國常有一物共居穴或見之身貂􅀋人長三尺能制貂愛樂刀子其俗人欲得貂皮以刀挿穴口此物夜出皮置刀邊湏人持皮去乃取刀隋書曰北室韋其俗以捕貂爲業南室韋亦多貂貀女滑切􅀃丈曰貀獸無前足漢津能捕豺貀購百錢爾雅曰貀無前足郭璞注曰晉太康七年石陵扶夷縣檻得獸似狗貀文有角兩脚即此􅀋也或日豹似虎而黒無前兩足也廣雅曰豹貀也唐書曰長慶中河東節度使李聽貢貀三頭貀猛揵之獸也穆宗好畋遊甞詔諸道廣求此獸捜踐山谷郡縣告勞防虞籠檻甚於豺虎及至林苑往往噬人後穆宗亦盡令逐之及敬宗即位聽復獻之􅏈音魂􅀃文曰􅏈䑕岀丁令胡以作裘魏略曰丁靈國出青􅏈子白􅏈子皮江表傳曰魏文帝遣使吴求􅏈皮豹犀群臣以非禮欲不與權勑付使山海經曰獄法之山有獸焉如犬而人面善投見人則􅀏其名曰􅏈其行如風見則大風山海經圖讃曰山􅏈之獸見乃歡唬厥性善投行如矢激是惟氣精岀則風作猫詩曰孔樂韓土有猫有虎爾雅曰虎􅀼毛謂之虥土盞切猫郭璞注云􅀼淺也或曰􅀼毛鹿毛也禮曰古之君子使之必報之迎貓爲其食田䑕也迎虎爲其食田豕也迎而􅀕之也尹子曰使牛捕䑕不如猫狌音生之捷北史曰獨狐陁性好左道其外祖母髙氏先事猫􅀑轉入陁家毎以子日夜祠之猫􅀑所殺人取其財物置於所事猫􅀑家􅀑􅀂降人則靣正青􅀂􅀍牽曳陁後敗免死唐書曰髙宗廢王后令宮人宣勑示后后拜曰但願大家萬歳昭儀長承恩澤死是吾分也良娣承勑罵曰阿武狐媚飜覆至此百千生願得一日爲猫阿武爲䑕吾扼其喉以報今日即足矣武后聞之不􅀃自是約六宫不許畜猫又曰朱泚軍中有猫乳䑕者泚獻之爲祥代宗使中官示於朝宰臣率百僚皆賀崔祐甫獨否中官詰其故荅曰此之失常也可吊不可賀中官徵其􅃺祐甫立草之略曰禮云迎猫爲其食田䑕也以能除害故列祀典今反乳之是謂失常且猫受人食養而弃職不修亦何異法吏不勤觸邪疆吏不勤捍敵是天將垂戒故不敢賀衆皆伏代宗嘉其正直􅆩禮記月令曰孟}
