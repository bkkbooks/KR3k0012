  - {type: variant, offset: 2872, length: 390, content: 所零失也時桓玄在南州禁殺牛甚急終祚載數萬竊買牛皮還東貨之得二十萬還室猶閉一無所失後遂富積二三千萬列異傳曰中山王周南正始中為襄邑長有鼠衣冠出廳事語曰爾某日當死周南不應至期復出冠幘絳衣語曰爾日中當死復不應入復更出日適中鼠曰周南汝不應我死我復何道遂蹶而死即失衣冠視如常鼠也述異記曰宋車騎大將軍南譙王劉義宣鎮荊州府吏蔡鐵者其人善卜公嘗在內齋見一白鼠緣屋梁上乃命左右射得之內置函中召鐵既至使卜函中何物卜兆成笑曰已具知矣公曰狀之鐵為之狀曰兌色之鼠背明戶彎弧射之絕其左股鼠孕五子三雄而兩雌若不見信剖腹而立知公乃使剖鼠腹皆如鐵言也賜錢一萬劉敬叔異苑曰景平中東陽大水永康蔡喜夫避往南壟夜有大鼠浮水而來伏喜夫奴床角奴恐而不犯每以飯與之水勢既退喜夫既得返故居鼠以前腳捧青紙裹三斤許珠著奴床前啾啾如欲語也又曰南陽趙度少好術藝度有白米為鼠所盜及被頭把刀畫地作獄四面開門向東長嘯群鼠俱到呪之曰凡非噉者過唯止者, SBCK: ''}
