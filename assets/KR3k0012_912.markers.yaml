  - {type: variant, offset: 429, length: 410, content: 其群臣而剌在位承先君之化無禮儀也相鼠有皮人而無儀人而無儀不死何為大戴禮曰正月田鼠出田鼠者鼸鼠也詩義䟽曰爾雅鼫鼠許慎云五伎鼠也今之河東有石鼠大能人立交前兩腳於頭上跳善鳴食人禾稼逐則走入樹空中亦有五伎或謂雀鼠其形大故云石鼠也詩言其方物宜謂此鼠非今之鼠也又鼠不食禾苗本又謂螻蛄為碩鼠亦有五伎古今工名蟲鳥物異名同故記已史記曰李斯少時為郡小吏見吏舍廁中鼠食不潔近人犬數驚恐之入倉見倉中鼠食積粟居大廡下無人犬之憂乃歎曰人賢不肖譬如鼠在所自處耳又曰張湯杜陵人也其父為長安丞出湯為守舍還而鼠盜肉其父怒乃笞湯湯掘得盜鼠及肉鞫掠訊鞫論報并取鼠與肉具獄磔堂下其父見之視其文辭如老獄吏大驚遂使書獄漢書曰右馮翊韓延壽有罪下獄楊惲上書訟延壽郎中丘常謂惲曰聞君侯訟韓馮翊當得活乎惲曰事何容易我不能自保直人所謂鼠不容穴衘窶藪故也又曰蘇武使匈奴匈奴徙武北海上掘野鼠草實而食之又曰廣陵王胥將作亂鼠舞王后庭又曰燕剌王旦將作亂鼠舞殿端門魚豢魏略曰大秦國有辟毒鼠, SBCK: 脊}
