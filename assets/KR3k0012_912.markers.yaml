  - {type: variant, offset: 1765, length: 831, content: 祥過自受其殃又曰投鼠者機動釣魚者浮抗動發也發則得鼠浮釣浮也抗動也動則得魚也又曰虞氏者梁富人也登高樓臨大路設樂陳酒蒱博其上遊俠相隨行於樓下博者射明張中友雨㯓音楊而笑䳒墮腐鼠而中遊俠俠相與語曰虞氏富人矣常有輕人之志乃辱我以腐鼠請滅其家其夜乃攻於虞氏大滅其家此謂類而非也抱朴子曰南海有白鼠大者重數斤毛長三寸居空木中其毛可續為布又曰陳安世年十三初為管叔本客得道叔本年七十猶拜安世曰得道者當師吾不羞弟子之禮矣死王樂生鼠雖為帝王死不及生鼠又曰王策記稱鼠壽三百歲滿者則色白善憑人而卜名曰仲仲能一年之中吉凶及千里外之事皆知也典語曰狻獹之狗吠於朝門社稷之鼠竄於宮側春秋後語曰趙惠文王二十九年秦韓相攻軍於閼與上黨有閼與藂閼烏連反與音預或音余王召廉頗問曰可救不對曰道遠險狹難救也又問樂乘對曰如廉公言又問趙奢趙奢對曰道遠險狹譬兩鼠鬭於穴中將勇者勝王乃令奢救之晏子春秋曰景公問晏子治國何患對曰社鼠者不可薰之不可灌之君左右出賣寒熱入則比周此國之社鼠者山海經曰丹熏之山有獸焉其狀如鼠而兔首麋耳以其尾飛名曰耳鼠可禦百毒郭璞山海經圖飛鼠讚曰或以尾翔或以髯凌飛鼠鼓翰倏然皆騰固無常所惟神所憑本草曰鼷鼠一名隱鼠形如鼠大而無尾黑色長鼻賈誼書曰鄙談云欲投鼠而忌器此善喻也鼠近於器尚憚不投況貴大之臣近於帝王乎郭璞注爾雅曰漢文帝宮中得一鼠豹文光彩熒熒以問群臣下子廉郎終軍荅曰鼨鼠文帝賜縑東方朔神異經曰北方有冰萬里厚百丈有鼷鼠在冰下出焉其形如鼠食草木肉重千斤可以作脯食之已熱除熱病也其毛長可八尺可為蓐臥之可以卻寒治風病也其皮可以柔致其聲聞千里有美尾可來鼠此所尾毛所在鼠斬輒入此藂說苑云梁上鼠飽聞長者論論衡曰人生天地猶魚生泉蟣虱於人因氣而生馬食鼠屎腹脹鼠子水午火馬金亦勝木雞何不喙免火亦勝金虵何不食猴又曰鼠踐一篋捐不食博物志曰鼠食巴豆三年重三十斤束晢發蒙記曰西域有火鼠之布東海有不灰之木語林曰簡文為撫軍時所坐床上坐塵不聽左右掃去見鼠行跡視以為佳異物志曰鼠母頭腳似鼠毛蒼口銳大如水牛而獨畏狗水田時有水災起於鼠西域諸, SBCK: 折華陽}
