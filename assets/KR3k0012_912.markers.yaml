  - {type: variant, offset: 1719, length: 5, content: 田鼠化為鴽, SBCK: 􅆩􅀕魚然後虞人入澤梁􅀃文曰􅆩如小狗水居食魚偏音編􅆩屬也遁甲開山圖曰霍山光南岳其獸多柴􅆩山邊水故有柴􅆩淮南子曰愛􅆩而飲之酒欲養之非其道言􅆩飲酒而敗風土記曰陽羡縣前有大橋下有白􅆩將有兵動􅆩出穴口向嘷也魏略曰南蠻皆用􅆩皮爲其冠塩鐵論曰水有獱音頻􅆩而池勞國有強禦齊民消也獨頻曰獱群曰􅆩又如淳􅀶物志曰獱如馬自􅆎以下似扁蝠毛似􅆩大可五六十斤淳同郷人􅁻孟景福中征遼東時爲運舡吏於海中有猵􅆩跳上舡舡人皆謂海神共叩頭敬禮舡左武令人云但魚􅆩耳可烹而食之神仙傳曰樊夫人者劉䌉之妻也俱行道術各自言勝䌉於是唾槃中水即作鯉魚夫人乃唾槃中使成􅆩而食魚䌉每共試術事事不如永嘉地記曰濤山至髙常有拾橡者見上有大湖又有自然石橋多􅆩異色鳥獸蝟孝經援神契蝟曰蝟多刺故不使超踰抑􅀭爾雅曰蝟毛刺淮南子曰鵲屎中蝟爛而􅃮見蟹不􅏫}
