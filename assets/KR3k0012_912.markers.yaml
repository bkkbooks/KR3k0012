  - {type: variant, offset: 3399, length: 149, content: 鼠獨住伏於中庭而不敢動梁州記曰仙人唐公房祠有碑一所廟北有大坑碑文云是其舊宅處公房舉宅登仙故為坑焉山有易腸鼠一月吐易其腸束廣懲所謂唐鼠者也博物志曰唐房升仙鷄犬去唯以鼠惡不將鼠自侮一月三出腹劉欣期交州記曰竹風鼠如小狗子食竹根出封溪縣秦州記曰乞佛虜乾歸未移枹罕金城見鼠有數萬頭將諸小鼠各銜焉屎群移而度洮麗, SBCK: 十}
