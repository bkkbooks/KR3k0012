  - {type: variant, offset: 893, length: 235, content: 咎鄧王哀冲謂曰待三日中然後自歸冲於是以刀穿單衣如鼠嚙者謬為失意貌有愁色太祖問之冲對曰世俗以為鼠嚙衣者其主不吉今單衣見嚙是以憂戚太祖曰此妄言耳無所苦也俄而庫吏以嚙鞍聞太祖笑曰衣在側尚囓況馬鞍懸柱乎一無所問晉陽春秋曰大興中衡陽歐純作鼠市四方丈餘開四門門有一木人縱四五鼠於中欲出門木人輒以椎椎之北史曰盧昶為散騎常侍時洛陽縣獲白鼠昶奏以為案瑞典外鎮刺史二千石令長不祗上命刻暴百姓怨嗟則白鼠至因陳時政多所勸誡詔書褒美其意三國典略曰齊將誅斛律光有三鼠遊於光寢光每投食與之一朝俱死床下, SBCK: 恠亦絶}
