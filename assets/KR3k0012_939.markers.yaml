  - {type: punctuation, offset: 2543, content: 《, id: KR3k0012_CHANT_939-bkkpn817}
  - {type: variant, offset: 2544, length: 0, content: '', SBCK: 東夷濊獻其皮蕭拆魚魏武四時食制曰蕭拆魚海之乾魚也䱐䰽上孚下沛魚魏武四時食制曰䱐䰽魚黒色大如百斤猪黃肥不可食數枚相隨一浮一沉一名敷常見首出淮及五湖三十六國春秋曰呉人夏丞爲孝廉髙士夏仲御以母疾將市藥于京師隨丞入洛時值褉飲賈充見而放之仲曰我㑹稽夏仲御也充問卿居海濵能獻舩不仲曰能之充因命焉仲御即登舩皷拽容止可觀爲䱐䰽之形俄然雲霧杳􅁳白魚躍入其舟充甚異之蕃踰魚一曰蕃魚魏武四時食制曰蕃踰魚如鼈大如箕甲上邊有髯無頭口在腹下尾長數尺有節有毒螫人龍魚山}
  - {type: page-break, offset: 2544, content: '', id: KR3k0012_SBCK_939-8a}
  - {type: variant, offset: 2544, length: 0, content: '', krp: 東夷濊獻其皮蕭拆魚魏武四時食制曰蕭拆魚海之乾魚也䱐䰽上孚下沛魚魏武四時食制曰䱐䰽魚黒色大如百斤猪黃肥不可食數枚相隨一浮一沉一名敷常見首出淮及五湖三十六國春秋曰呉人夏丞爲孝廉髙士夏仲御以母疾將市藥于京師隨丞入洛時值褉飲賈充見而放之仲曰我㑹稽夏仲御也充問卿居海濵能獻舩不仲曰能之充因命焉仲御即登舩皷拽容止可觀爲䱐䰽之形俄然雲霧杳冥白魚躍入其舟充甚異之蕃踰魚一曰蕃魚魏武四時食制曰蕃踰魚如鼈大如箕甲上邊有髯無頭口在腹下尾長數尺有節有毒螫人龍魚山}
