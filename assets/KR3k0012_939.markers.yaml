  - {type: punctuation, offset: 2547, content: 「, id: KR3k0012_CHANT_939-bkkpn820}
  - {type: variant, offset: 2547, length: 2, content: 龍侯, WYG: 葛山澧水出焉中多珠鼈之魚如肺而有目六足有珠其味酸甘食之不厲山海經圖讚曰澧水之鱗狀如浮肺體兼三材以貨賈客吕氏春秋曰魚之美者澧水之魚名曰珠鼈六足有珠澧水在蒼梧九疑之西赤鱬魚山海經曰青丘}
  - {type: page-break, offset: 2547, content: '', id: KR3k0012_WYG_939-4a, image: WYG0901/WYG0901-0334a.png}
  - {type: variant, offset: 2548, length: 2, content: 侯之, SBCK: 魚陵居其􅃺如狸或曰龍魚似狸一角也一曰鰕魚音遐却有神聖乗此以行九野一曰鼈魚郭璞}
  - {type: variant, offset: 2548, length: 2, content: 侯之, krp: 魚陵居其狀如狸或曰龍魚似狸一角也一曰鰕魚音遐却有神聖乗此以行九野一曰鼈魚郭璞}
  - {type: punctuation, offset: 2551, content: ，, id: KR3k0012_CHANT_939-bkkpn821}
  - {type: 'tls:seg', offset: 2551, content: '', id: KR3k0012_CHANT_939-38a.8}
  - {type: variant, offset: 2551, length: 2, content: 決水, SBCK: 海經圖讃曰龍魚一角似狸居陵俟時而}
  - {type: variant, offset: 2551, length: 1, content: 決, WYG: 英水出焉中多赤鱬音需其狀如魚而人面其音如鴛鴦食之已疥山海經圖讚曰赤鱬之狀魚身人頭何羅魚山海經曰譙明之山譙}
  - {type: page-break, offset: 2551, content: '', id: KR3k0012_WYG_939-4b, image: WYG0901/WYG0901-0334b.png}
  - {type: variant, offset: 2551, length: 2, content: 決水, krp: 海經圖讃曰龍魚一角似狸居陵俟時而}
  - {type: variant, offset: 2554, length: 5, content: 焉其中多人, SBCK: 神聖攸乗飛鶩九域乗雲上􅂛括地圖曰龍魚一名鰕}
  - {type: page-break, offset: 2554, content: '', id: KR3k0012_SBCK_939-8b}
  - {type: variant, offset: 2554, length: 5, content: 焉其中多人, krp: 神聖攸乗飛鶩九域乗雲上升括地圖曰龍魚一名鰕}
  - {type: punctuation, offset: 2555, content: 。, id: KR3k0012_CHANT_939-bkkpn822}
  - {type: 'tls:seg', offset: 2555, content: '', id: KR3k0012_CHANT_939-38a.9}
  - {type: variant, offset: 2558, length: 1, content: 人, WYG: 何羅之魚一首十身其音如吠犬食之已癰鰼鰼魚山海經曰涿光之山囂水出焉而西流其中多鰼鰼之魚音習其狀如鵲而十翼鱗皆在羽端其音如鵲可以禦火又經圖讚曰鼓翮一運十翼䎙翻厥鳴如鵲鱗在羽端雒書曰鰼鰼}
  - {type: punctuation, offset: 2560, content: ，, id: KR3k0012_CHANT_939-bkkpn823}
  - {type: 'tls:seg', offset: 2560, content: '', id: KR3k0012_CHANT_939-38a.10}
  - {type: variant, offset: 2562, length: 22, content: 䱱魚四足其音如嬰兒食之無癡疾史記曰秦始皇冢中, SBCK: 龍而有神聖乗此}
  - {type: variant, offset: 2562, length: 1, content: 䱱, WYG: 鵲食之不癉出涿光之山䲃}
  - {type: page-break, offset: 2562, content: '', id: KR3k0012_WYG_939-5a, image: WYG0901/WYG0901-0334c.png}
  - {type: variant, offset: 2562, length: 22, content: 䱱魚四足其音如嬰兒食之無癡疾史記曰秦始皇冢中, krp: 龍而有神聖乗此}
  - {type: punctuation, offset: 2564, content: ，, id: KR3k0012_CHANT_939-bkkpn824}
  - {type: 'tls:seg', offset: 2564, content: '', id: KR3k0012_CHANT_939-38a.11}
  - {type: variant, offset: 2564, length: 1, content: 四, WYG: 山海經曰獄法山瀤澤之水出焉音懐其中多䲃魚音藻狀如鯉鷄}
  - {type: punctuation, offset: 2566, content: ，, id: KR3k0012_CHANT_939-bkkpn825}
  - {type: 'tls:seg', offset: 2566, content: '', id: KR3k0012_CHANT_939-38a.12}
  - {type: variant, offset: 2566, length: 0, content: '', WYG: 食之已疣又山海經圖讚曰䲃之為狀半鳥半鱗鮨魚山海經曰北嶽之山諸懐之水出焉}
  - {type: variant, offset: 2567, length: 0, content: '', WYG: 中多鮨魚音脂魚身犬首}
  - {type: punctuation, offset: 2571, content: ，, id: KR3k0012_CHANT_939-bkkpn826}
  - {type: 'tls:seg', offset: 2571, content: '', id: KR3k0012_CHANT_939-38a.13}
  - {type: variant, offset: 2573, length: 0, content: '', WYG: 已狂鱅鱅魚山海經曰􅈪􅀢之山速株食水出焉中多鱅鱅之魚音容狀如犁牛音如彘山海經圖讚曰魚號鱅鱅如牛虎駮葴魚山海經曰栒狀之山􅯤音枳水出焉中多葴魚狀如儵喙如葴食者}
  - {type: page-break, offset: 2573, content: '', id: KR3k0012_WYG_939-5b, image: WYG0901/WYG0901-0334d.png}
  - {type: variant, offset: 2574, length: 1, content: 癡, WYG: 疫南越記長針魚口四寸縳魚山海經曰鷄山黒水出焉其中有縳魚音團狀如鮒彘毛其音如豕見則天大旱又圖經縳魚并顒鳥讚曰顒鳥栖林縳魚處川俱為旱徵灾延普天測之無象厥類惟元吕氏春秋曰魚之美者洞庭之縳鯥魚山海經曰柢音帶山多水有魚出焉狀如牛陵居虵尾有翼在魼榻二音下其音如留牛其名曰鯥音六冬死夏生蟄類也食之無腫}
  - {type: page-break, offset: 2574, content: '', id: KR3k0012_WYG_939-6a, image: WYG0901/WYG0901-0335a.png}
