  - {type: variant, offset: 13, length: 184, content: 鯨魚死而彗星出左傳宣下曰古者明王伐不敬取其鯨鯢而封之以為大戮鯨鯢大魚以喻不義之人春秋後語曰楚威王問宋玉曰先生其有遺行歟何士民眾庶不譽之甚也宋玉對曰天鳥有鳳而魚有鯨鳳凰上擊九千里翱翔乎窈冥之上夫藩籬之鷃豈能與料天地之高哉鯨魚朝發於崑崙之墟暮宿於孟津赤澤之鯢豈能與量江漢之大哉故非獨鳥有鳳而魚有鯨士亦有之唐書曰開元七年大拂靺羯獻鯨鯢睛淮南子曰麒麟鬭則日月食鯨魚死而彗星出鯨, SBCK: 東}
