  - {type: variant, offset: 2585, length: 33, content: 人魚膏為燈燭臨海異物志曰人魚似人長三尺餘不可食虎魚范子曰虎魚出東海, SBCK: 行九野}
  - {type: variant, offset: 2585, length: 1, content: 人, WYG: 已白癬鯸鮐}
  - {type: variant, offset: 2585, length: 33, content: 人魚膏為燈燭臨海異物志曰人魚似人長三尺餘不可食虎魚范子曰虎魚出東海, krp: 行九野}
  - {type: variant, offset: 2587, length: 5, content: 膏為燈燭臨, WYG: 音侯貽左思吳都賦曰王鮪鯸鮐劉逵曰鯸鮐狀如科斗虫大者長尺餘腹白背青有黄文性有毒雖小獺文魚不敢近也蒸煮肥美鰕􅲬魚潘岳滄}
