  - {type: variant, offset: 2283, length: 207, content: 獻計賣之云可得十萬錢彥回變色曰我謂此是食物非曰財貨且不知堪錢聊爾受之雖復儉乏寧可賣餉取錢悉與親遊噉之少日便盡陳思王求祭先主表曰先主喜食鰒魚前已表徐州臧霸送鰒魚二百足自供事魏文帝與孫權書曰今因趙咨致鰒魚千枚比目魚爾雅曰東方有比目魚焉不比不行其名謂之鰈郭漢注曰狀如牛脾一兩片相合乃行江東呼至餘魚史記曰管仲諫桓公古者封禪東海有比目之魚搜神記曰東海名餘腹者昔越王為膾割而未切墮半於水化為魚臨海水土記曰兩片特立合體俱行比目魚, SBCK: 毋}
