  - {type: variant, offset: 680, length: 918, content: 長一丈子朝出食暮還母腹常從臍中入口中出腹內有兩洞腹貯水以養子腹容二子兩腹則四子也其鰓鱗皮有珠文可以飾刀劍口孫綽望海賦曰勁䱜楊鬐以排流搥額魚臨海水土記曰搥額似䱜魚長四尺海鰌魚臨海水土記曰海鰌長丈餘金樓子曰鯨鯢一名海鰌穴居海底鯨入穴則水溢溢為潮來鯨既出入有節故潮水有期也嶺表錄異曰海鰌魚即海上最偉者也其小者亦千餘尺每歲廣州常發𦨴舡過南安貨易路經調黎地名海心有山阻東海濤嶮而急亦黃河之三門也深闊處或見十餘山或出或沒篙工曰非山島鰌魚背也日閃鬐鬣若箕朱旗日中忽雨霡霂舟子曰此鰌魚噴氣水散於空風勢吹來若雨耳近魚魚即鼓舩而譟條爾而沒魚畏鼓物類相伏耳石魚臨海水士記曰石音矛附石以踞錯鰐魚吳時外國傳曰鰐魚大者長二三丈有四足似守宮常吞食人扶南王范尋勑捕取置溝壍中尋有所忿者縛以食鰐若罪當死鰐便食之如其不食便解放以為無罪梁書曰扶南國於城溝中養鰐魚門外圈猛獸有罪者輒以餧猛獸及鰐不食為無罪三日乃放之鰐大者長二丈餘狀如鼉有四足喙長六七尺兩邊有齒如刀劍常食魚遇得麞鹿及人亦噉之蒼梧以南及外國皆有唐書曰韓愈為潮州刺史既視事詢吏民疾苦皆曰郡西湫水有鰐魚卵而化其長數丈食民畜產將盡以是民貧居數日愈往視之令判官秦濟炮一豚一羊投之湫呪之曰今潮州大海在其南鯨鵬之大蝦蟹之細無不容鱷魚朝發而夕至今與鱷魚約三日乃至七日如頑而不徙須為物害則刺史選林伎壯夫操勁弓毒矢與鱷魚從事矣呪之夕有暴風雷起於湫中數日湫水盡涸徙於舊湫西六十里自是潮人無鱷患虞喜志林曰方有鱷魚喙長八尺秋時最甚人在舟邊者魚或出頭食人故人持戈於舩測而禦之博物志曰南海有鱷魚狀似龜斬其頭而乾之啄去齒而更生如此三乃止交州記曰鰐好出沙上卵大如鵝卵可食廣州異物志曰鰐魚長者二丈餘有四足喙長七尺齒甚利虎及鹿渡水鰐擊之皆斷喙去齒旬日更生嶺表錄異曰鰐魚其身土黃色有四足脩尾形狀如鼉而舉止趫疾口生鋸齒往往害人南中鹿多最懼此物鹿走崖岸之上群鰐嗥叫其下鹿必怖懼落崖多為鰐魚所得亦物之相攝伏也故李太尉貶官潮州經鰐魚灘沉損平生寶玩古書圖畫一時沉失遂召舶工崑崙取之但見鰐魚極多不敢輒近乃是鱷魚窟宅也鮫魚說文曰鮫魚也皮可以飾刀山海經曰燕山漳水出焉其中多鮫魚郭璞曰鮫背上有甲朱文尾長三四尺皮可以飾刀劍口西京雜記曰尉佗高祖時獻鮫魚荔芰高祖報以蒲匋錦四疋, WYG: ''}
