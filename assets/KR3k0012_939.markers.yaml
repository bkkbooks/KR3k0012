  - {type: variant, offset: 2597, length: 0, content: '', WYG: 鮠魚一名河豚丹魚抱朴子曰南陽丹水有丹魚先夏至十日夜伺之魚夜浮水側有赤光割取血以塗足可以步行水上䖶魚廣志曰䖶魚一名鮦音同􅗫魚劉敬叔異苑曰􅗫魚凡諸魚欲生􅗫輙以頭衝其腹􅗫魚自欲生者亦更相撞觸故世}
