  - {type: variant, offset: 2615, length: 0, content: '', WYG: 躍入其舟充甚異之蕃蹹魚魏武四時食制曰蕃蹹魚如鼈大如箕甲上邊有髯無頭口在腹下尾長數尺有節有毒螫人龍魚山海經曰龍魚陵居其狀如狸或曰龍魚似狸一角也一曰鰕魚音遐即有神聖乗此而行九野一曰鱉魚在天野北郭璞山海經圖讚曰龍魚一角似狸居陵候時而}
