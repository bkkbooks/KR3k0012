  - {type: variant, offset: 1702, length: 1, content: 石, SBCK: 鹿子魚頳其尾鬛皆有鹿班赤黃色余曽覽羅州圖云州南海中有洲毎春夏此魚跳岀洲化而爲鹿曽有人拾得一魚}
