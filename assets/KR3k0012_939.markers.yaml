  - {type: variant, offset: 1702, length: 1, content: 石, krp: 鹿子魚頳其尾鬛皆有鹿班赤黃色余曽覽羅州圖云州南海中有洲毎春夏此魚跳岀洲化而爲鹿曽有人拾得一魚}
  - {type: variant, offset: 1703, length: 1, content: 頭, WYG: 子}
  - {type: variant, offset: 1704, length: 0, content: '', SBCK: 巳化鹿尾猶是魚南人云魚化爲􅁏腥不堪食郭璞江賦曰或鹿觡象鼻鹿觡頭角如鹿鰕魚爾雅曰鯢大者謂之鰕今鯢魚似鮉四脚前似猕猴後似狗聲如小兒啼大者長八九尺異物志曰鰕魚有四足如􅀛而行疾有魚之體而以足行故名鰕魚含水仰天不動小鳥就飲因而吞之異物記曰鰕實四足而有魚名頭尾􅀋鯷歧行生長山澗出入深坈頂上有光迎風濆流云是􅈸婦㤪勤自投鰩魚吕氏春秋曰灌水之魚名曰鰩狀如鯉有翼左思呉都賦曰文鰩夜飛而觸綸珠鼈魚山海經曰􅁑山澧水中多珠鼈之魚如肺而有六足目有珠其味酸甘食之不厲山海經圖讃曰澧水之鱗狀如浮肺體兼三才以貨賈客吕氏春秋曰魚之美者澧水之魚名曰珠鼈六足有珠澧水在蒼梧九疑之西赤鱬魚山海經曰青丘之山英水出焉中多赤鱬音需其狀如魚而人靣其音如鴛鴦食之疥經圖讃曰赤鱬之狀魚身人頭何羅魚山海經曰譙明之山譙水出焉其中多何羅之魚一首十身其音如吠犬食之巳癕山海經曰􅈪之山速株食水岀焉中多鱅鱅之魚音容狀如犁牛其音如􅇾山海經圖讃曰魚號鱅鱅如牛虎駮葴魚山海經曰狗狀之山􅯤音枳水岀焉中多葴}
