  - {type: punctuation, offset: 2576, content: 《, id: KR3k0012_CHANT_939-bkkpn829}
  - {type: variant, offset: 2576, length: 1, content: 史, WYG: 山海經圖讚曰魚號曰鯥處不在水厥類惟牛鳥翼虵尾䰷魚音蚌山海經曰英山禺水出焉北流注于招音詔水其中多䰷魚狀如鼈其音如羊䱻魚音謂山海經曰樂遊之山桃水出焉其中多䱻魚其狀如蛇而四足漢書地理志曰子􅀈之水其中澤多䱻魚冉遺魚山海經曰英鞮之山涴水出焉中多冉遺之魚魚身蛇首六足目如馬耳食之使人不昧可以禦凶鰠魚山海經曰鳥鼠同穴之山渭水出焉其中多鰠魚音騷其狀如鱣魚動則其邑大兵山海經圖讚曰物以感應亦有數動壯士挺釣氣激江涌鰠魚潛淵出則民悚􅛈魮魚山海經曰鳥鼠同穴之山濫音藍水出於其西多􅛈魮之魚其狀如覆銚鳥首而魚翼魚尾其聲如磬是生珠玉山海經圖讚曰形如覆銚包玉􅍭珠有而不積泄以尾閭闇與道㑹可謂竒魚嬴魚山海經曰邽音圭山濛水出焉其中多嬴魚魚身而鳥翼聲如鴛鴦見其國大水䰽䰽魚山海經曰少咸之山敦水出焉其中多䰽䰽之魚音沛食之殺人􅚝魚山海經曰懸甕之山晉水出焉其中多􅚝魚音紫其狀如鯈而赤鱗其音如叱食之不驕或作怪山海經圖讚曰微哉􅚝魚食則不驕物有所感其用無摽􅗫父魚山海經曰陽山留水出焉其中有􅗫音滔父之魚其狀如鮒魚首彘身食之已嘔山海經圖讚曰􅗫父魚首厥體如豚師魚山海經曰饒山歴號之水出焉中有師魚食之殺人文魚山海經曰景山睢音姐水出焉中多丹粟文魚有斑彩也鯩魚山海經曰半石之山來需音須之水出焉其中多鯩魚音綸黑文狀如鮒食者不睡鰧魚山海經曰半石之山合水出其隂是多鰧音騰魚其狀如鱖居逵逵水之中穴相交通蒼文赤尾食者不癰可以已瘻飛魚王子年拾遺録曰仙人寗封食飛魚而死死百年生故寗仙遊涉七言頌云着藻灼爍千載舒萬齡暫死餌飛魚山海經曰騩音槐山正迴之水出焉而北流注于河其中多飛魚其狀如豚而赤文服之不畏雷可以禦兵郭璞山海經圖飛魚讃曰飛魚如豚赤文無羽山海經曰牛首之山勞水出焉是多飛魚其狀如鮒食之可以已痔衕張駿山海經飛魚讚曰飛魚如鮒登雲遊波林邑國}
