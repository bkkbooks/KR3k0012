  - {type: variant, offset: 1737, length: 1, content: 貯, SBCK: 洞庭之縳鯥魚山海經曰爲音帶山多水有魚岀焉狀如牛陵居虵尾有翼在魼祛榻二音下其音如留牛其名曰鯥音六冬死夏生蟄􅀋也食之無腫疾山海經圖讃曰魚號曰鯥處不在水厥狀如牛鳥翼虵尾􅼗魚音山海經曰英山愚水出焉北流注于招音詔水其中多􅼗魚狀如鼈其音如羊魚音謂山海經曰樂遊之山桃水出焉其中多魚其狀如虵而四足漢書地理志曰子桐之水其中澤多魚無遺魚山海經曰英鞮之山涴水岀焉是多無遺之魚魚身虵首六足目如馬耳食之使人不昧可以禦凶鰠魚山海經曰鳥䑕同穴之山渭水出焉其中多鰠魚音駱其狀如鱣魚動則其邑大兵山海經圖讃曰物以感應亦有數動壯士挺劒氣激江涌鰠魚潜淵出則民悚􅛈鮆魚山海經曰鳥䑕同穴之山濫音檻水出}
