  - {type: variant, offset: 1999, length: 545, content: 臨海異物志曰𩸔似烏賊肥食甘美䱥魚臨海異物志曰䱥魚至肥炙食甘美諺曰寧去累世田宅不去䱥魚額鰒魚漢書曰王莽以關東兵起憂懣不食但飲酒食鰒魚東觀漢記曰吳良字大儀齊人為郡議曹椽正旦入賀太守門下掾王望前上言壽皆稱萬歲良跪曰門下侯謟明府無受其觴盜賊未弭人民困乏太守曰生言是遂不舉觴賜鰒魚百枚教署功曹良恥以言受官遂不肯謁後漢書曰張步遣使伏隆詣闕上書獻鰒魚郭璞注三蒼云鰒似蛤偏著石廣志曰鰒無鱗有一面附石決明細孔雜雜或七或九本草云石決明一名鰒魚音步角切魏志曰倭國人入海捕鰒魚水無深淺皆沉沒取之齊書曰褚彥回時淮北屬魏江南無鰒魚或有間關得至者一枚直數千錢有餉彥回鰒魚三十枚彥回時雖貴而貧過甚門生獻計賣之云可得十萬錢彥回變色曰我謂此是食物非曰財貨且不知堪錢聊爾受之雖復儉乏寧可賣餉取錢悉與親遊噉之少日便盡陳思王求祭先主表曰先主喜食鰒魚前已表徐州臧霸送鰒魚二百足自供事魏文帝與孫權書曰今因趙咨致鰒魚千枚比目魚爾雅曰東方有比目魚焉不比不行其名謂之鰈郭漢注曰狀如牛脾一兩片相合乃行江東呼至餘魚史記曰管仲諫桓公古者封禪東海有比目之魚搜神記曰東海名餘腹者昔越王為膾割而未切墮半於水化為魚臨海水土記曰兩片特立合體俱行比目魚也嶺表錄異曰比目魚南人謂之鞋屜魚江淮為之拖沙魚左思三都賦曰雙則比目片則王餘孫綽望海賦曰王餘孤遊比目雙遊人魚出, WYG: 山}
