  - {type: variant, offset: 1751, length: 1, content: 脛, SBCK: 翼魚尾其聲如磬是生珠玉珠母􅑕類山海經圖讃曰形如覆銚苞玉含珠有而不積泄以尾閭闇與道㑹可謂竒魚嬴魚山海經曰邽音邽山濛水出焉其中多蠃魚魚身而鳥翼聲如鴛鴦見其國大水䰽䰽魚山海經曰少咸之山鴈門之水其中多䰽䰽之魚音沛食之殺人魮魚山海經曰懸甕之山􅀳水出焉其中多魮魚音紫其􅃺如鯈而赤鱗其音如吒食之不驕或作慅山海經圖讃曰微哉毗魚食則不驕物有所感其用無摽􅗫父魚山海經曰陽山流水出焉其中有􅗫音瑫父之魚其􅃺如鮒魚首如􅇾食之巳歐山海經圖讃曰􅗫父魚首厥體如豚師魚山海經曰饒山歷號之水岀焉中有師魚食之殺人文魚山海經曰景山睢音蛆水岀焉中多丹粟文魚有班彩也鯩魚山海經曰半}
