  - {type: variant, offset: 1099, length: 563, content: 及人亦噉之蒼梧以南及外國皆有唐書曰韓愈為潮州刺史既視事詢吏民疾苦皆曰郡西湫水有鰐魚卵而化其長數丈食民畜產將盡以是民貧居數日愈往視之令判官秦濟炮一豚一羊投之湫呪之曰今潮州大海在其南鯨鵬之大蝦蟹之細無不容鱷魚朝發而夕至今與鱷魚約三日乃至七日如頑而不徙須為物害則刺史選林伎壯夫操勁弓毒矢與鱷魚從事矣呪之夕有暴風雷起於湫中數日湫水盡涸徙於舊湫西六十里自是潮人無鱷患虞喜志林曰方有鱷魚喙長八尺秋時最甚人在舟邊者魚或出頭食人故人持戈於舩測而禦之博物志曰南海有鱷魚狀似龜斬其頭而乾之啄去齒而更生如此三乃止交州記曰鰐好出沙上卵大如鵝卵可食廣州異物志曰鰐魚長者二丈餘有四足喙長七尺齒甚利虎及鹿渡水鰐擊之皆斷喙去齒旬日更生嶺表錄異曰鰐魚其身土黃色有四足脩尾形狀如鼉而舉止趫疾口生鋸齒往往害人南中鹿多最懼此物鹿走崖岸之上群鰐嗥叫其下鹿必怖懼落崖多為鰐魚所得亦物之相攝伏也故李太尉貶官潮州經鰐魚灘沉損平生寶玩古書圖畫一時沉失遂召舶工崑崙取之但見鰐魚極多不敢輒近乃是鱷魚窟宅也鮫魚說文曰鮫魚也皮可以飾刀山海經曰燕山漳水出焉其中多鮫魚郭璞曰鮫背上有甲朱文尾長三四尺皮可以飾刀劍口西京雜記曰尉佗高祖時獻鮫魚荔芰高祖報以蒲匋錦四疋博物志曰東海中有鮫鯖魚既生子子驚還入母腹尋復出任昉述異記曰虎魚老則為鮫鱕魚南越記曰鱕魚鼻有橫骨如轓海中波浪為之湧海船逢之必斷石首, SBCK: ''}
