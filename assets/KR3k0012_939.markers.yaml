  - {type: variant, offset: 2579, length: 5, content: 秦始皇冢中, WYG: 飛魚身圓長丈餘羽重㳫翼如胡蟬出入群飛遊翔翳㑹而沉則泳海底豪魚山海經曰渠豬之山渠豬之水出焉是多豪魚其狀如鮪而赤喙尾赤羽食之可}
