  - {type: variant, offset: 14, length: 2, content: 華原, SBCK: 得大横占曰大横庚庚余爲天王夏啓以光曰寡人固已爲王矣又何王卜人曰所謂天王廼天子也又曰常以月旦祓􅀛先以淸水澡之以卵祓之乃持􅀛而遂之若常己卜不中皆祓之以卵東鄕立居取生荆枝及堅木堅木枝燒之斬取􅀬處以灼􅀛所卜處灼以荆若卵指之者三持􅀛以􅆑周環之祝曰今日吉謹以梁卵祓去玉靈之不祥玉靈必信以誠知萬事之情辯兆皆可占不信不誠則燒玉靈揚其􅁅以懲後􅀛又曰竇皇后弟廣國字少君年四五歲時家貧爲人所略賣至冝陽爲其主入山作炭寒卧岸岸崩獨得脫下死自卜數日當爲侯又曰司馬季主楚}
