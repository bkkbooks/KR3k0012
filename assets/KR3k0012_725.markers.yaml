  - {type: variant, offset: 407, length: 0, content: '', SBCK: 正時日乃後入家産子必先占吉凶後乃有之自伏犧作八卦周文王演三百八十四爻而天下治越王勾踐倣周文王八卦以破敵國霸天下由是觀之卜筮有何􅀒哉且夫卜者掃設坐位正其冠帶然後乃言事此有禮也言􅀑神或以饗忠臣以事其上孝子以養其親慈父以畜其子此有德者也而以義置數十百錢病者或以愈且死或以生患或以勉事或以成嫁子娶婦或以養生此之爲德豈直數十百錢哉此老子所謂上德不德是以有德今夫卜筮者利大謝少老子之言豈異於是乎莊子曰君子内無飢}
