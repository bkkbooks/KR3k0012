  - {type: variant, offset: 809, length: 0, content: '', WYG: 小人失婢輅為卦教明日東明城門中倒擔豚人牽與共鬬某如其言豚逸走即追之豚入人舎突破主人甕婢從甕中出輅在田舎時常候逺隣主人患失火輅卜教使明日於陌上伺有一角巾書生駕黑牛敝車必引畱宿此能除之即從輅語得書生遂畱宿意甚不安主人罷入生乃抱刀出門倚積薪假寐有一物直來如獸手中持火以口炊之生舉刀斫斷腰視之狐也自此無復火災太平御覽卷七}
