  - {type: variant, offset: 462, length: 184, content: 藥石救之以鍼音針齊才齊切聖人和之以至德輔之以人事故形體有可愈之疾天地有可消之災又曰膽欲大而心欲小智欲圓而仁欲方詩曰如臨深淵如履薄冰謂小心也赳赳武夫公俟干城謂大膽也不為利回不為義疚仁之方也見幾而作不俟終日智之圓也思邈自云開皇幸酉歲生至今年九十三矣詢之鄉里咸云數百歲人話周齊閒事歷歷如眼見以此參之不啻百歲人矣然猶視聽不衰神彩甚茂可謂古之聰明博達不死者也撰千金方三十卷行於代, SBCK: 善}
