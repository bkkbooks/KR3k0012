  - {type: variant, offset: 809, length: 0, content: '', SBCK: 小人夫婢輅爲卦教明旦東明城門中倒擔豚人牽與共􅃲具如其言豚逸走卽追之豚入人舎突破主人甕婢從甕中出輅在田舎時嘗候遠鄰主人患失火輅卜教使明日於陌上伺有一角巾書生駕黑牛故車必引留宿此能除之卽從輅語得書生遂留宿意甚不安主人罷入生乃抱刀出門薪積歘有一小物直來如獸手中持火以口吹之生舉刀斫斷腰視之狐也自此無復火災太平御覽卷第七}
