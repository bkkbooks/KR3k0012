  - {type: variant, offset: 5, length: 0, content: '', WYG: 曰不及秋將死公聞之卜曰尚无及期惠伯令龜卜楚丘占之曰齊侯不及期非疾也君亦不聞令龜有咎二月丁丑公薨又宣上曰郊牛之口傷改卜牛牛死乃不郊又宣下曰楚子圍鄭旬有七日鄭人卜行成不吉卜臨于大宫且巷出車吉國人大臨守陴者皆哭楚子退師又成上曰鼷䑕食郊牛角改卜牛又襄元曰夏}
