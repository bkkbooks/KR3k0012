  - {type: variant, offset: 812, length: 178, content: 種氣有八十種大體醫藥雖同人性各異庸醫不達藥之行使冬夏失節因此殺人唯腳氣頭風上氣常須服藥不絕自餘則隨其發動臨時消息之伹有風氣之人春末夏初及秋暮要得通洩即不困劇於是撰四時常服及輕重大小諸方十八首表上之文仲久視年終於尚藥奉御撰隨身備急方三卷行於代又曰孟詵汝州梁人也以進士擢第垂拱初累遷鳳閣舍人詵學方術嘗於鳳閣侍郎劉禕音暉之家見其勑賜金盤謂禕之曰此藥金也若燒之上有, SBCK: ''}
