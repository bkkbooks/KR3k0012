  - {type: variant, offset: 9, length: 0, content: '', WYG: 枚卜功臣惟吉之從帝曰禹官占惟先蔽志昆命于元龜朕志先定詢謀僉同鬼神其依龜筮協從卜不習吉又洪範曰七稽疑擇建立卜筮人龜曰卜蓍曰筮乃命卜筮曰雨曰霽曰䝉曰驛曰克曰貞曰悔凡七卜五占用二衍忒立時人作卜筮三人占則從二人之言汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮汝則從龜從筮從卿士從庶民從是之謂大同身其康彊子}
  - {type: variant, offset: 9, length: 0, content: '', krp: 枚卜功臣惟吉之從帝曰禹官占惟先蔽志昆命于元龜朕志先定詢謀僉同鬼神其依龜筮恊從卜不習吉又洪範曰七稽疑擇建立卜筮人龜曰卜蓍曰筮乃命卜筮曰雨曰霽龜兆形也有似雨者又有似雨止曰蒙曰驛氣落驛不連屬曰克曰貞曰悔兆相交錯五者卜兆之常法内卦曰貞外卦曰悔凡七卜五占用二衍忒立時人作卜筮三人占則從二人之言汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮汝則從龜從龜從鄕士從庶民從是之謂大同身其康彊子}
  - {type: variant, offset: 10, length: 3, content: 思邈京, SBCK: 其逢吉汝則從􅀛從筮從􅀸士逆庶民逆吉􅀸士從􅀛從筮從汝則逆庶民逆吉庶民從􅀛從筮從汝則逆􅀸士逆吉汝則從筮從筮逆􅀸士逆庶民逆作内吉作外凶􅀛筮共違于人用靜吉用作凶又金縢曰旣克商二年王有疾弗豫伐紂明年武王有疾不恱豫二公曰我其爲王穆卜周公曰未可以戚我先生穆敬也戚近也召公太公言王疾當卜吉凶周公言未可以死近我先王相順之辭公乃爲三壇同墠乃卜三􅀛一習吉習因也以三王之􅀛卜一相因而吉也又大誥曰寧王遺我大寶􅀛紹天明即命我有大事休朕卜并吉天休于寧王興我小􅀖周寧王惟卜用克綏受兹命又洛誥曰予惟乙卯朝至于洛師致政在冬本其春來至洛衆說始卜定都之意我卜河朔黎水我乃卜㵎水東瀍水西惟洛食我使人卜㵎􅬖之閒南近洛吉我又卜瀍水東亦惟洛食伻來以圖及獻卜史記曰宋元王二年江使神􅀛使於河至泉陽漁者豫且舉網得而囚之置籠中夜而見夢於元王曰我爲江使於河豫且得我我不能去身在患中莫可告語王有德義故來告愬元王召愽士衛平問之平乃援式而起仰天視月之光觀斗所指定日處鄕規矩爲輔副以權衡四維以定八卦相望視其吉凶介蟲先見乃對曰今昔斗壬子宿在牽牛河水大㑹神􅀑相謀漢正南北江河固期南風新至江使先來白雲擁漢萬物盡留斗柄指日使者當囚􅀇服而乘輜車其名爲􅀛使人問泉陽令取􅀛獻使者載行岀於泉陽又門正晝無見風雨晦暝雲蓋其上五采靑黃雷雨並起將入端門見於東箱身如流水潤澤有光望見元王延頸而前三步而止縮頭而却復其故處元王見而恠之問衛平平對曰􅀛在患中而終夕囚王有德義使人活之今延頸而前以當謝也縮頸而却欲亟去也元王曰善哉趣駕送􅀛母令失期平對曰􅀛者是天下之寶先得此􅀛者爲天子且十言十當十戰十勝生於深淵長於黄土知天之道明於上古遊三千歲不岀其域安平靜正動不用力壽蔽天地莫知其極與物變化四時變色居而自匿伏而不食春蒼夏黄秋白冬黑明於陰陽審於刑德先知利害察於禍福以言而當以戰而勝王能寶之諸侯盡服王勿遣也王大恱於是向日而謝再拜而受擇日齋戒甲乙最良乃刑白雉以血灌􅀛於壇中央以刀刳之身全不傷脯酒禮之横其腹腸荆支卜之必制其瘡程達於理文相錯迎使工占之所言盡當又曰沛父老率子弟共殺沛令開城門迎劉季欲以爲沛令父老皆曰平生所聞劉季奇恠當貴且卜筮莫如劉季於是乃立爲沛公又曰陳平等遣人迎代王欲立爲帝代王卜之􅀛卦}
