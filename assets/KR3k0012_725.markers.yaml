  - {type: variant, offset: 6, length: 1, content: 唐, SBCK: 月三卜郊不從乃免牲孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也是故啓蟄而郊郊而後耕今旣耕而後卜郊冝其不從也又襄二曰鄭皇耳帥師侵衛楚令也亦兼受楚之勑命也皇耳皇戍子孫文子卜追之獻兆於定姜姜氏問繇曰兆如山陵有夫岀征而喪其雄姜氏曰征者喪雄禦宼之利也大夫圖之衛人追之孫蒯獲鄭皇耳于犬丘又曰晉侯還及著雍疾卜桑林見事具樂部又曰鄭石㚟言於子囊曰先王卜征五年先征五年而卜吉凶也征謂廵狩而歲習祥祥習其則行不習則増脩德而改卜又襄五日廬蒲癸王何卜攻慶氏示子之兆曰或卜攻讎敢獻其兆子之曰克見血慶封田于萊陳無宇從文子使召之請曰無宇之母疾病請歸慶季卜之示之兆曰死奉􅀛而泣乃使歸又昭二曰越大夫常壽過帥師㑹楚子於瑣瑣楚地也聞吳出師薳啓疆帥師從之從吳師也遽不設備呉人敗諸鵲岸廬江舒縣有鵲尾渚楚子以馹至於羅汭馹傳也羅水名吳子使其弟蹶由犒師犒勞楚人執之將以釁皷王使問焉曰汝卜來吉乎對曰吉寡君聞君將治兵於弊邑卜之以守􅀛曰余亟使人犒師請行以觀王怒之疾徐而爲之備尙克知之􅀛兆吉吉曰克可知也君若驩焉好逆使臣滋弊邑休怠休解而忘其死亡無日矣今君奮焉震電憑怒憑盛也虐執使臣將以釁皷則吳知所備矣敞邑雖羸若早脩完其可以息師難易有備可謂吉矣且吳社稷是卜豈爲一人使臣獲釁軍皷而弊邑知備以禦不虞其爲吉孰大焉國之守􅀛其何事不卜一藏一否其誰能常之城濮之兆其報在邲今此行也其庸有報志乃弗殺又昭三曰公卜使王黑以靈姑鉟音丕率吉請斷三尺焉而用之靈姑鉟公旗也斷三尺不敢與君同又昭四曰楚召觀從曰唯爾所欲對曰臣之先佐開卜乃使爲卜尹佐卜人開􅀛兆又曰初靈王卜曰余尚得天下不吉投􅀛詬天而呼曰是區區者而不余卑余必自取之民患王之無厭也故從亂如歸又曰吳伐楚陽匄爲令尹卜戰不吉司馬子魚曰我得上流何故不吉且楚故司馬令􅀛我請改卜令曰魴也以其屬死之楚師繼之尚大克之吉戰于長岸子魚先死楚師繼之大敗吳師又昭六曰初臧昭伯如晉臧㑹竊其寶􅀛僂句僂句􅀛所出地名以卜爲信與􅆫􅆫吉又定下曰晉車干乘在中牟衛侯將如五氏卜過之􅀛焦衛侯曰可也衛車當其半寡人當其半敵矣乃過中牟又哀上曰楚子在城父將救陳卜戰不吉卜退不吉王曰然則死也再敗楚師不如死弃盟逃讎亦不如死死一也其死讎乎命公子申爲王不可則命公子結亦不可則命公子啓五辭而後許將戰王有疾庚寅昭王攻大冥卒于城父又曰楚昭王有疾卜曰河爲祟王弗祭事具江部又曰晉趙鞅卜救鄭遇水適火水火之兆占諸史趙史墨史􅀛皆晉史也史􅀛曰是謂沈陽火陽得水故沈可以興兵兵陰􅀋也故可以興兵利以伐姜不利子商姜齊姓也子商謂宋伐齊則可敵宋不吉史墨曰盈水名也子水位也名位敵不可于也炎帝爲火師姜姓其後也水勝火伐姜則可史趙曰是謂如川之滿不可游也鄭方有罪不可救也救鄭則不吉不知其他陽虎以周易筮之遇泰之需曰宋方吉不可與也微子啓帝乙之元子也宋鄭甥舅也祉禄也若帝乙之元子歸妹而有吉禄我安得吉焉乃止毛詩曰升彼虚矣以望楚矣望楚與堂景山與京降觀于桑卜云其吉終然允臧􅀛曰卜違囯必卜之又曰爾卜爾筮體無咎言又曰君曰卜爾萬壽無疆又曰卜筮偕止㑹言近止征夫邇止卜之筮之㑹人占之箋云或卜或筮俱占之言於繇爲近征夫如今近耳又曰我􅀛旣厭不我告猷卜筮數而瀆􅀛􅀛靈厭之不復告其所圖之吉凶言雖不兆占繇不中又曰爰始爰謀爰契我􅀛又曰考卜維王宅是鎬京維􅀛正之武王成之又曰哀哉塡寡冝岸冝獄握粟岀卜自何能穀哀我窮盡寡財之民仍有獄訟之事持粟行卜求其勝􅀒從何能得生尚}
