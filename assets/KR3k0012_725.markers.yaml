  - {type: variant, offset: 9, length: 0, content: '', SBCK: 枚卜功臣惟吉之從帝曰禹官占惟先蔽志昆命于元􅀛朕志先定詢謀僉同􅀑神其依􅀛筮恊從卜不習吉又洪範曰七稽疑擇建立卜筮人􅀛曰卜蓍曰筮乃命卜筮曰雨曰霽􅀛兆形也有似雨者又有似雨止曰蒙曰驛氣落驛不連屬曰克曰貞曰悔兆相交錯五者􅁲兆之常法内卦曰貞外卦曰悔凡七卜五占用二衍忒立時人作卜筮三人占則從二人之言汝則有大疑謀及乃心謀及􅀸士謀及庶人謀及卜筮汝則從􅀛從􅀛從鄕士從庶民從是之謂大同身其康彊子}
