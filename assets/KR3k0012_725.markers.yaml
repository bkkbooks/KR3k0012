  - {type: variant, offset: 4, length: 0, content: '', WYG: 帝則掌百官之誓戒與其具修前期十日帥執事而卜日遂戒前期前所諏之期也卜日事宗廟散齊七日致齊三日執事太宰之屬也既戒百官以始齊也又春官嘗之日涖卜來嵗之芟卜者問後嵗宜芟否獮之日涖卜來嵗之戒秋田謂獮卜者問後嵗兵冦社之日涖卜來嵗之稼卜問後嵗稼所宜又曰太卜掌三兆之法一曰玊兆二曰瓦兆三日原兆兆灼者灼龜發於火其形可占者其象玉瓦原之璺罅是用名之焉其經兆之體皆百有二十其頌皆千有二百又卜師職曰卜師掌開龜之四兆一曰方兆二曰功兆三曰義兆四曰弓兆開開出其占書也經兆百二十體言此四兆者分之為四部若易之二篇書金縢開籥見書是也又曰龜人掌六龜之屬各有名物天龜曰靈屬地龜曰繹屬東龜曰果屬西龜曰雷屬南龜曰獵屬北龜曰若屬各以其方之色與其體辨之上春釁龜祭祀先卜釁者殺牲以血之神之也鄭司農云祭祀先卜者卜其日與其牲又曰占人掌占龜以八筮占八頌以八卦占筮之八故以眡吉㐫凡卜筮君占體大夫占色史占墨卜人占坼禮記曰正月命有司釁龜䇿占兆審卦吉㓙周禮龜人上春釁龜謂建寅之月曲禮曰凡筮日旬之外曰逺某日旬之内曰近某日䘮事先逺日􅁻事先近日曰為日假爾泰龜有常假爾泰筮有常命龜筮辭龜筮於吉㓙有常大事卜小事筮卜筮不過三卜筮不相襲龜為卜筴為筮卜筮者先聖王所以使民信時日敬鬼神畏法令也所以使民决嫌疑定猶與也又檀弓下曰石駘仲卒駘仲衛大夫石碏之後無適子有庶子六人卜所以為後者曰沭浴佩玊則兆言齋㓗則得吉兆也五人皆沐浴佩玊石祁子曰孰有執親之䘮而沐浴佩玊者乎不沐浴佩玊石祁子兆衛人以龜為有知也又禮運龜為前列先知也龜知事情者陳於建有前又郊特牲曰卜郊受命於祖廟作龜於禰宫尊祖親考之義也受命謂告之退而卜卜之日王立於澤親聽誓命受教諫之義也又曰國君世子生三日卜士負之又玊藻曰卜人定龜史定墨視兆折君定體視兆所得也又少儀問卜筮曰義與志與義則問志則否夫卜問也上筮者義正事也志私意也又曰雜記曰大夫之䘮大宗人相小宗人命龜卜人作龜又祭義曰昔者聖人建隂陽天地之情立以為易易抱龜南面天子卷冕北面雖有知眀之心必進斷其志焉示不敢專以尊天也善則稱人過則稱已教不伐以尊賢也又曰表記曰南人有言曰人而无恒不可以為卜筮古之遺言與龜筮猶不能知也而况於人乎又曰子言之昔三代明王皆事天下之神明无非卜筮之用不敢以其私褻事上帝言動任卜筮也神明謂羣神也是故不犯日月不違卜筮日月謂冬夏至四時也所不違者日與牲尸也卜筮不相襲也襲取也小事則筮大事則卜也大事有時日大事有事於大神有常時常日也小事无時日有筮外事用剛日内事用柔日不違龜筮左傳曰楚伐鄖莫敖曰盍請濟師於王闘亷曰師克在和不在衆商周之不敵君之所聞也成軍以出又何濟焉莫敖曰卜之對曰卜以决疑不疑何卜至敗隕師於蒲騷又曰初懿氏卜妻敬仲其妻占之大吉事具筮門又僖公曰初晉獻公欲以驪姬為夫人卜之不吉筮之吉公曰從筮卜人曰筮短龜長不如從長又僖公曰狐偃言於晉侯曰求諸侯莫如勤王諸侯信之且大義也繼文之業而信宣於諸侯今為可矣使卜偃卜之曰吉遇黄帝戰於阪泉之兆又曰晉惠公之在梁也梁伯妻之梁嬴孕過期卜招父與其子卜之杜預注曰卜招梁大卜也其子曰將生一男一女招曰然男為人臣女為人妾故名男曰圉女曰妾及子圉西質妾為官女焉又曰夏四月卜郊不從乃免牲非禮也諸侯不得郊天魯以周公故得牲用天子禮樂故郊為魯常祀猶三望亦非禮也禮不卜常祀而卜其牲日牛卜日曰牲牲成而卜郊上怠慢也望郊之細也不郊亦無望可也又曰衛遷于帝丘卜曰三百年又文公曰邾文公遷卜于繹史曰利於民而不利於君邾子曰苟利於民孤之利也天生民而樹之君以利之也民既利矣孤必與焉左右曰命可長也君何弗為邾子曰命在養民死之長短時也民苟利矣遷也吉莫如之遂遷于繹五月邾文公卒君子曰知命又曰春齊侯戒師期而有疾}
