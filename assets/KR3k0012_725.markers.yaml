  - {type: variant, offset: 4, length: 0, content: '', SBCK: 帝則掌百官之誓戒與其具脩前期十日帥執事而卜日遂戒前期前所諏之日也十日容散齊七日致齋三日執事宗伯太卜之屬也旣卜又戒百官以始齋又春官嘗之日涖卜來嵗之芟卜者問後歲冝芟不獮之日涖卜來歲之戒秋田爲獮卜者問後歲兵冠之備社之日涖卜來歲之稼卜問後歲稼所冝矣又曰太卜掌三兆之法一曰玉兆二曰瓦兆三曰原兆兆者灼􅀛發於火其形可占者原原田也象似玉瓦原之璺罅是用名之焉其經兆之體皆百有二十其頌皆千有二百又卜師職曰卜師掌開􅀛之四兆一曰方兆二曰功兆三曰義兆四曰弓兆開開出其占書也經兆百二十體言此四兆者分之爲四部若易之二篇書金滕曰開篇見書是也又曰􅀛人掌六􅀛之屬各有名物天􅀛曰靈屬地􅀛曰繹屬東􅀛曰果屬西􅀛曰靁屬南􅀛曰獵屬北􅀛曰若屬各以其方之色與其體辨之上春釁􅀛祭祀先卜釁者殺牲以血之神之也鄭司農云祭卜其曰與性也又曰占人掌占􅀛以八筮占八頌以八卦占筮之八故以􅢂吉凶凡卜筮君占體大夫占色史占墨卜人占圻禮記曰正月命有司釁􅀛策占兆審卦吉凶周禮􅀛人上春釁􅀛謂建寅之月曲禮曰凡筮日旬之外曰逺某日旬之内曰近某日喪事先遠日吉事先近日曰假爾泰􅀛有常假爾泰筮有常侖􅀛筮辭􅀛筮於吉凶有常大事卜小事筮卜筮不遇三卜筮不相襲􅀛爲卜筮爲筮卜筮者先聖王之所以使民信時日敬鬼神畏法令也所以使民決嫌疑定猶與也故曰疑而筮之又檀弓下曰不駘仲卒駘仲衛大犬石碏之族無適子有庶子六人卜所以爲後者曰沐浴佩玉則兆言齊潔則得吉兆也五人皆沐浴佩玉石祁子曰孰有執親之喪而沐浴佩玉者乎不沐浴佩玉石祁子兆衛人以􅀛爲有知也又禮運曰􅀛爲前列先知也􅀛知事情者陳於庭在前又郊特牲曰卜郊受命于祖廟作􅀛于禰宫尊祖親考之義也受命謂告之退而卜卜之日王立于澤親聽誓命受教諌之義也又曰國君世子生三日卜士負之又玉藻曰卜人定􅀛史定墨視兆坼君定體視兆所得也又少儀問卜筮曰義與志與義則問志則杏大卜問來卜筮者也義正事也志私意也又曰雜記曰大夫之喪太宗人相小宗人命􅀛卜人作􅀛又祭義曰昔者聖人建隂陽天地之情立以爲易易抱􅀛南面天子卷音衮冕北面雖有明知之心必進斷其志焉示不敢專以尊天也善則稱人過則稱已教不伐以尊賢也立以爲易謂作易易抱􅀛易官名周禮曰大卜大卜主兆三易三夢之吉又曰表記曰南人有言曰人而無􅁪不可以爲卜筮古之遺言與􅀛筮猶不能知也而況於人乎又曰子言之昔三代明王皆事天地之神明無非卜筮之用不敢以其私䙝事上帝言動任卜筮也神明謂群神也是故不犯日月不違卜筮日月謂冬夏至及四時也所不違者日與牲尸也卜筮不相襲也襲因也大事則卜小事則筮也大事有時日大事有事於大神有常時常曰也小事無時日有筮外事用剛日内事用柔曰不違􅀛筮左傳曰楚伐鄖莫敖曰盍請濟師於王􅃲廉曰師克在和不在衆商周之不敵君之所聞也成軍以岀又何濟焉莫敖曰卜之對曰卜以決疑不疑何卜遂敗鄖師於蒲騷又曰初懿氏卜妻敬仲其妻占之曰吉事具筮門又僖上曰初晉獻公欲以驪􅁎爲夫人卜之不吉筮之吉公曰從筮卜人曰筮短􅀛長不如從長又僖中曰狐偃言於晉侯曰求諸侯莫如勤王諸侯信之且大義也繼文之業而信宣於諸侯今爲可矣使卜偃卜之曰吉遇黃帝戰于阪泉之兆又曰晉惠公之在梁也梁伯妻之梁嬴孕過期卜招父與其子卜之杜預注日卜招梁太卜也其子曰將生一男一女招曰然男爲人臣女爲人妾故名男曰圉女曰妾及子圉西質妾爲宦女焉又曰夏四月卜郊不從乃免性非禮也諸侯不得郊天魯以周公故得用天子禮樂故郊爲魯常祀猶三望亦非禮也禮不卜常祀而卜其牲日牛卜日曰牲牲成而卜郊上怠慢也望郊之細也不郊亦無望可也又曰衛遷于帝丘卜曰三百年又文下曰邾文公卜遷于繹史曰利於民而不利於君邾子曰苟利於民􅀌之利也天生民而樹之君以利之也民旣利矣􅀌必與焉左右曰命可長也君何弗爲邾子曰命在養民死之長短時也民苟利矣遷也吉莫如之遂遷于繹五月邾文公卒君子曰知命也又曰春齊侯戒師期而有疾}
