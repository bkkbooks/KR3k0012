  - {type: variant, offset: 6, length: 1, content: 唐, WYG: 月三卜郊不從乃免牲孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以祈農事也是故啟蟄而郊郊而後耕今既耕而後卜郊宜其不從也又襄二日鄭皇耳帥師侵衞楚令也亦兼受楚之勅命也皇耳皇戎子孫文子卜追之獻兆於定姜氏問繇曰兆如山陵有夫出征而䘮其雄姜氏曰征者䘮雄禦㓂之利也大夫圖之衞人追之孫蒯獲鄭皇耳于大丘又曰晉侯還及著雍疾卜桑林見事具樂部又曰鄭石􅎢言於子囊曰先王卜征五年而嵗習其祥祥習則行不習則増修德而改卜又襄五曰盧蒲癸王何卜攻慶氏示子之兆曰或卜攻讎敢獻其兆子之曰克見血慶封田于萊陳無宇從文子使召之請曰無宇之母疾病請歸慶季卜之示之兆曰死奉龜而泣乃使歸又昭五曰越大夫常夀過帥師㑹楚子於瑣聞吳出師薳啟疆帥師從之從吳師也遽不設備吳人敗諸鵲岸楚子以馹至於羅汭吳子使其弟蹷由犒師楚人執之將以釁鼓王使問焉曰汝卜來吉乎對曰吉寡君聞君將治兵於敝邑卜之以守龜曰余亟使人犒師請行以觀王怒之疾徐而為之備尚克知之龜兆告吉曰克可知也君若驩焉好逆使臣滋敝邑休怠而忘其死亡無日矣今君奮焉震電憑怒憑盛也虐執使臣將以釁鼓則吳知所備矣敝邑雖羸若早修完其可以息師難易有備可謂吉矣且吳社稷是卜豈為一人使臣獲釁軍鼓而敝邑知備以禦不虞其為吉孰大焉國之守龜其何事不卜一臧一否其誰能常之城濮之兆其報在邲今此行也其庸有報志乃弗殺又昭公曰公卜使王黑以靈姑鉟率吉請斷三尺焉而用之靈姑鉟分旗也斷三尺不敢與君同又昭公曰楚召觀從曰惟爾所欲曰臣之先佐開卜乃為卜尹左卜人開龜兆又曰初靈王卜曰余尚得天下不吉投龜詬天而呼曰是區區者而不余畀余必自取之民患王之無厭也故從亂如歸又曰吳伐楚陽匄為令尹卜戰不吉司馬子魚曰我得上流何故不吉且楚故司馬令龜我請改卜令曰魴也以其屬死之楚師繼之尚大克之吉戰于長岸子魚先死楚師繼之大敗吳師又昭六曰初臧昭伯如晉臧㑹竊其寶龜僂句僂句龜所出地名以卜為信與僣吉又定曰晉車千乘在中牟衞侯將如五氏卜過之龜焦衞侯曰可也衞車當其半寡人當其半敵矣乃過中牟又哀上曰楚子在城父將救陳卜戰不吉卜退不吉王曰然則死也再敗楚師不如死弃盟逃讎亦不如死死一也其死讎乎命公子申為王不可則命公子結亦不可則命公子啟五辭而後許將戰王有疾庚寅昭王攻大㝠卒于城父又曰楚昭王有疾卜曰河為祟王弗祭事見江部又曰晉趙鞅卜救鄭遇水適火水火之兆占諸史趙史墨史龜皆晉史也史龜曰是謂沉陽火陽得水故沉可以興兵兵陽類也故可以興兵利以伐姜不利子商姜齊姓也子商謂宋伐齊則可敵宋不吉史墨曰盈水名也子水位也名位敵不可干也炎帝為火師姜姓其後也水勝火伐姜則可史趙曰是謂如川之滿不可游也鄭方有罪不可救也救鄭則不吉不知其他陽虎以周易筮之遇泰之需曰宋方吉不可與也㣲子啟帝乙之元子也宋鄭甥舅也祉禄也若帝乙之元子歸妹而有吉禄我安得吉焉乃止毛詩曰升彼虛矣以望楚矣望楚與堂景山與京降觀于桑卜云其吉終焉允臧又曰爾卜爾筮體無咎言又曰君曰卜爾萬夀無疆又曰卜筮偕止㑹言近止征夫邇止又曰我龜既厭不我告猷又曰爰始爰謀爰契我龜又曰考卜維王宅是鎬京惟龜正之武王成之又曰哀我顛寡宜岸宜獄握粟出卜自何能穀尚}
