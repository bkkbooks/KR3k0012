  - {type: variant, offset: 1857, length: 0, content: '', SBCK: 白馬寺浮圖前荼林蒲萄異於餘處枝葉䌓衍子實甚大荼林實重七斤蒲萄實偉於􅀥味並殊羙冠於中京帝至熟時常詣取之或復賜官人得之轉餉親戚以爲竒異得者不敢輙食乃歷數家京師語曰白馬甜榴一實直牛唐景龍文館記曰四月上巳日上幸司農少卿王光輔㽵駕還頓後中書侍郎}
