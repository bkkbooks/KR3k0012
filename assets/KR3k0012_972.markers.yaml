  - {type: variant, offset: 3483, length: 0, content: '', SBCK: 西旅獻崐山之蒲萄鍾㑹蒲萄賦曰余植蒲萄於堂前嘉而賦之命荀朂並作應禎蒲萄賦曰結繁子之礧落兮英籠揔而彌房傳玄蒲萄賦曰踰龍堆之險越懸度之阻渉乎三光之阪歴乎身􅀬之野橄欖金樓子曰有樹名獨分爲二枝其東向一枝是木威樹南向一枝是橄欖樹南越志曰愽羅縣有合成樹十圍去地二丈分爲三衢東向一衢木葉似練子如橄欖而硬削去皮南人以爲糝南向一衢橄欖西向一衢橄欖裴淵廣州記曰橄欖澁酒廣志曰橄欖大如鷄子交州以飲酒南州草木􅃺曰橄槄子大如􅀥二月華八九月熟生食味酢􅁡藏}
