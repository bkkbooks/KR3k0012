  - {type: variant, offset: 3567, length: 3, content: 龍目側, SBCK: 實涵黄橘丹鏡日繡壑照霞綺巒沙棠山海經曰崑崙之山有木焉狀如棠棠梨黄華赤實味如李而無核名曰沙棠可以却水吕氏春秋曰伊尹􅀃曰果之羙者沙棠之實南越志曰寜郷果多沙棠笁法真登羅浮山䟽曰羅浮山有沙棠華黄實赤味甘如李枸櫞裴淵廣州記曰枸櫞樹似橘如柚大而倍長味竒酢皮以􅁡煑爲劉欣期交州記曰拘櫞如柚核細異物志曰枸櫞實橘大如飯筥皮不香味不羙可以浣治􅁑紵􅀂酸漿嶺表録異曰枸櫞子形如􅀲皮以橙而金色故人重之愛其香氣京輦豪貴家釘盤筵憐其逺方異果肉甚厚白如蘿蔔南中女工競取其肉雕鏤花鳥浸之蜂􅁡􅀧以燕脂擅其妙巧亦不譲湘中人鏤木􅀲也益智十三國春秋曰安帝元年盧脩爲廣州刺史脩遺劉􅁉益智粽􅁉乃荅以續命湯顧徽廣州記曰益智葉如蘘荷莖如竹箭子從心中岀一枝有十子子内白滑四破去之取外皮􅁡煑爲粽子味辛周景式廬山記曰山果有益智蒲萄廣志曰益智葉以襄荷長丈餘其根上有小枝髙八九寸无葉蕚其子藂}
