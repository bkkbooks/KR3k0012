  - {type: variant, offset: 3096, length: 381, content: 其名之曰焦核小次曰春花次曰朝偈此三種為美次鼈卵大而酸以為醢和率生稻田間又曰荔支壺橘南珍之上西京雜記曰南越王尉他獻高祖鮫魚荔支高祖報以蒲桃錦四疋笁法真登羅山䟽曰荔支冬青夏至日子始赤六七日可食甘酸宜人其細核者謂之焦核荔支之㝡珍也異物志曰荔支為異多汁味甘絕口又小酸所以成其味可飽食不可使厭生時大如雞子其膚光澤皮中食乾則醮小則肌核不如生時奇四月始熟也嶺表錄異曰荔支南中之珍果也梧州江前有火山上有荔支四月先熟以其地熱故曰火也核大而味酸其高新州與南海產者㝡佳五六月方熟黔中亦出荔支余曾得一嘗一似火山者形若小鷄子近蔕稍平皮殼殷紅肉瑩寒玉又有焦核者性熱液甘食之過度即蜜漿制之又有蜡荔支黃色味稍劣於紅者廣州記云每歲進荔支郵傅者疲斃於道漢朝下詔止之今猶修事荔支煎進焉其樹自徑尺至于合抱葉蜜如冬青木性堅重其根工人多取為阮咸槽彈弓碁局仲長統昌言曰今人主不思神芝朱草而患枇杷荔支之腐亦鄙矣, SBCK: 健延年輕身}
