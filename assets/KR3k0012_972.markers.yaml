  - {type: variant, offset: 194, length: 429, content: 化為橙風俗通曰橙皮可為醬虀博物志曰成都廣都郫繁江原臨邛六縣生金橙似橘而非若柚而芬香夏秋冬或華或實大如櫻桃小者或如彈丸或有年春秋冬夏華實竟歲廣志曰有給客橙目夏至冬且花且實風土記曰橙柚屬也而葉正圓異苑曰南康歸美山石城內有橙就食其實任意取足持歸家人啖輒病或顛仆失徑庾仲初楊都賦曰菓則黃甘朱橙胡道安甘賦曰襄陰大橙江陽巨橘林檎廣志曰黑琴似赤㮏亦名黑琴劉禎京記曰園多林檎述征記曰林擒菓實可佳其榲勃實微大其狀醜其味香輔關有之江淮南少晉宮闕記曰華林園有林擒十二株榲勃六株左思蜀都賦曰林檎枇杷橙柿梬楟謝靈運山居賦曰枇杷林檎帶谷映渚椑廣州記曰荔支壺橘南珍之上菱蓮椑柿為其次地理記曰梁侯園有烏椑八稜大如醬盞荊州土地記曰宜都出大椑晉宮閣名曰華林園椑子二株范汪祠制曰孟冬祭用椑柿異苑曰傅亮永初中為護軍兄珍住府西齋忽見北窗外椑樹下物面廣三尺狀若方相久乃自滅韋耀靈陽賦曰甘蔗椑柿榛栗木瓜潘安仁閑居賦曰梁侯烏椑之柿謝靈運山居賦曰椑柿被實於長浦潘岳金谷詩曰前庭樹沙甘後園植烏椑魏武帝為兗州牧上, SBCK: 齊}
