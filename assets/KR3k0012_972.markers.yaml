  - {type: variant, offset: 1864, length: 1, content: 強, WYG: 二株其東向一枝是木威樹南向一枝橄欖樹南越志曰􅀶羅縣有合成樹十圍去地二丈分為三衢東向一衢木葉似練子如橄欖而硬削去皮南人以為糁南向一株橄欖西向一衢橄欖裴淵廣州記曰橄欖澁酒廣志曰橄欖}
