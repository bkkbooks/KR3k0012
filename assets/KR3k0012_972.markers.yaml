  - {type: variant, offset: 803, length: 354, content: 枇杷荔支之腐亦鄙矣王彪之閩中賦曰菓則烏椑朱柿扶餘枇杷周祗枇杷賦曰昔魯季孫有嘉樹韓宣子譽之屈原離騷亦著橘賦至於枇杷寒暑無變負雪楊華余植之庭圃遂賦之云名同音器質異貞松四序一采素華冬馥曹植樂府歌曰橙橘枇杷甘蔗代出謝靈運七濟曰朝食既畢摘菓堂陰春惟枇杷夏則林檎檳榔吳錄地理志曰交趾朱䳒縣有檳榔樹直無枝條高六七丈葉大如蓮實房得古賁灰扶留藤食之則柔而美郡內及九真日南並有之宋書曰劉穆之少時家貧誕節嗜酒食不脩拘檢好往妻兄家乞食多見辱不以為恥其妻江嗣女甚明識每禁不令往江氏後有慶會屬勿來穆之猶往食畢求檳榔江氏兄弟戲之曰檳榔消食君乃常飢何忽須此妻復截髮巿肴饌為其兄弟以餉穆之自此不對穆之梳沐及穆之為丹陽尹將召妻兄妻泣而稽顙以致謝穆之曰本不匿怨無所致憂及至醉穆之乃令廚人以金拌貯檳榔一斛以進之齊書曰任昉父遙本性重檳榔以為常餌臨終嘗, SBCK: 口乾}
