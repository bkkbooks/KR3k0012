  - {type: variant, offset: 3565, length: 1, content: 傍, SBCK: 椰葉無䕃俞益期牋曰有清漿數斗懸於長木之端終不乾故爲小異楊梅金樓子曰楊周年七歳甚聦惠孔君平詣其父父不在乃呼兒出爲設果有楊梅孔公指以示兒曰此真君家果兒􅀿聲荅曰未聞孔雀是夫子家禽􅀶物志曰地有章名則生楊梅南越志曰熈安縣白蜀里多楊梅張公以爲名章則多楊梅此偶以所聞而命書後好事改地就之耳求之白蜀去之逺矣裴淵廣州記曰盧山頂有湖楊梅繞其際人登者止得於山飽食不得持下吴興記曰故章縣縣北有石槨山出楊梅常以貢御張華所謂地名章必生楊梅蓋謂此也食經曰藏楊梅法取完者一斛塩漬之曝乾别取杭皮二斤煑汁塩漬之不加􅁡漬梅色如􅀄羙好可留數月臨海異物志曰楊梅其子如彈丸正赤五月中熟熟時似梅味甘甜酸梁江淹楊梅頌曰懷蘂}
