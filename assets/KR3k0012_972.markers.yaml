  - {type: variant, offset: 1929, length: 0, content: '', WYG: 人脛割之取汁以成酒味丼飲之亦醉南夷志曰荔支㯽榔訶棃勒椰子等諸樹永昌麗水諸山皆有之雲南記曰南詔遣使致南國諸果有椰子狀如大牛心破一重麄皮刮盡又有一重硬殻有小孔以筋穿之内有漿二合餘味丼色白又曰雲南多椰子亦以蜜漬之為糝廣志曰椰樹髙六七丈無枝條有葉如束蒲乃在樹末實如大瓠𤓰懸在樹頭實外有皮中有核皮裏有汁升餘清如水羙如蜜可飲核中膚白如雪厚半寸味如胡}
  - {type: page-break, offset: 1929, content: '', id: KR3k0012_WYG_972-7b, image: WYG0901/WYG0901-0551b.png}
  - {type: variant, offset: 1930, length: 2, content: 李又, WYG: 而羙可食出交趾家種之南方草木狀曰椰二月花花仍連着實房房連相累房三十或二十七八子十一月十二月熟其樹黄俗名為丹㭨破之可作椀長如栝樓子交州記曰椰子有漿截花以竹筩承取汁作酒飲之亦羙神異經曰東南荒中有椰木樹髙二三丈或十餘丈圍丈餘或七八尺葉三百歳盡落而華華如丼𤓰華華盡落而}
  - {type: page-break, offset: 1930, content: '', id: KR3k0012_WYG_972-8a, image: WYG0901/WYG0901-0551c.png}
