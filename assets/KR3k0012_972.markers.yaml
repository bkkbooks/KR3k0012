  - {type: variant, offset: 3544, length: 1, content: 山, SBCK: 蕚蕚下生子三歳而熟熟後不長不減形如寒􅀲長七八寸徑四五寸南州異物志曰椰􅀣大三四圍長六丈通身無枝至百餘年有葉葉􅃺如蒲長四五尺直竦指天實生葉間皮苞之如蓮􅃺皮肉硬過於核}
