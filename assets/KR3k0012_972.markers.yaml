  - {type: variant, offset: 3543, length: 0, content: '', SBCK: 永昌麗水諸山皆有之雲南記曰南詔遣使致南國諸果有椰子􅃺如大牛心破一重麄皮刮盡又有一重硬殻有小孔以筯穿之内有漿二合餘味甘色白又曰雲南多椰子亦以􅁡漬之爲糝廣志曰椰樹髙六七丈無枝條有葉如束蒲乃在樹末實如大瓠􅀲懸在樹頭實外有皮中有核皮裏有汁􅂛餘清如水羙如􅁡可飲核中膚白如雪厚半寸味如胡桃而羙可食岀交阯家家種之南方草木狀曰椰二月花花仍蓮着實房連相累房三十或二十七八子十一月十二月熟其樹黄俗名爲丹横破之可作椀子長如䄆樓子交州記曰椰子有漿截花以竹䇶承取汁作酒飲之亦醉神異經曰東南荒中有椰木椰髙二三丈或十餘丈圍丈餘或七八尺葉三百歳盡落而華華如甘􅀲華華盡落而}
