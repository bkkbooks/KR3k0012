  - {type: variant, offset: 2535, length: 1050, content: 年扶風人韓豹為太史令雄卒子期立以豹為太傅猶領候職豹嘗言於期曰臣今老志在田園欲植胡桃願賜其種期不悟俄而李壽自涪率眾南向襲剋成都廢期自立嶺表錄異曰山胡桃皮厚而堅大於北府底平如檳榔多肉少穰亦與北中者相似以斧磓之方破或取之自底磨平以為印子其隔屈曲類篆文也馬融西弟頌云胡桃自零潘岳閑居賦曰三桃表櫻胡之別孔融與諸鄉書曰先日多惠胡桃深知篤意劉滔母荅虞吳國書曰咸和中避蘇峻亂於臨安山吳國遣使餉饋乃荅書曰此菓有胡桃飛欀飛欀出自南州胡桃本生西羗外剛內柔質似賢欲以奉貢荔支東觀漢記曰單于來朝賜橙橘龍眼荔支謝承後漢書曰汝南唐羗為臨武縣長接交州舊獻荔支羗上書諫乃止魏文帝詔群臣曰南方有龍眼荔支寧比西國蒲陶石蜜乎今以荔支賜將吏啖之則知其味薄矣吳錄曰蒼梧多荔支生山中人家亦種之唐書曰楊貴妃生於蜀好荔支南海荔支勝蜀者故每歲飛馳以進然方暑而熟經宿輒敗又曰白居易為忠州刺史在郡為木蓮荔支圖寄朝中親友各記其狀曰荔支生巴峽間形圓如帷蓋葉如桂冬青華如橘春榮實如丹夏熟朵如蒲萄核如枇杷殼如紅繒膜如紫綃瓤肉瑩白如冰雪漿液甘酸如醴如酪大抵如此其實若離本枝一日而色變二日而香變三日而味變四五日外色香味盡去矣廣志曰荔支高五六丈如桂樹綠葉蓬蓬然冬夏鬱茂青華朱實實大如雞子核黃黑似熟蓮子實白如肪甘而多汁似安石榴有甜味夏至日將巳時翕然俱赤則可食也一樹下百斛犍為僰道南荔支熟時百鳥肥其名之曰焦核小次曰春花次曰朝偈此三種為美次鼈卵大而酸以為醢和率生稻田間又曰荔支壺橘南珍之上西京雜記曰南越王尉他獻高祖鮫魚荔支高祖報以蒲桃錦四疋笁法真登羅山䟽曰荔支冬青夏至日子始赤六七日可食甘酸宜人其細核者謂之焦核荔支之㝡珍也異物志曰荔支為異多汁味甘絕口又小酸所以成其味可飽食不可使厭生時大如雞子其膚光澤皮中食乾則醮小則肌核不如生時奇四月始熟也嶺表錄異曰荔支南中之珍果也梧州江前有火山上有荔支四月先熟以其地熱故曰火也核大而味酸其高新州與南海產者㝡佳五六月方熟黔中亦出荔支余曾得一嘗一似火山者形若小鷄子近蔕稍平皮殼殷紅肉瑩寒玉又有焦核者性熱液甘食之過度即蜜漿制之又有蜡荔支黃色味稍劣於紅者廣州記云每歲進荔支郵傅者疲斃於道漢朝下詔止之今猶修事荔支煎進焉其樹自徑尺至于合抱葉蜜如冬青木性堅重其根工人多取為阮咸槽彈弓碁局仲長統昌言曰今人主不思神芝朱草而患枇杷荔支之腐亦鄙矣王逸荔支賦曰乃覩荔支之樹其形也暖若朝雲之興森如橫天之篲角亢興而靈華敷大火中而朱實繁灼灼若朝霞之吐日離離如繁星之著天劉淵吳郡注曰荔支樹生山中葉綠色實正赤肉肥肌正白味美左思蜀都賦曰傍挺龍目側生荔支布綠葉之萋萋結朱實之離離, WYG: ''}
