  - {type: page-break, offset: 1858, content: '', id: KR3k0012_SBCK_972-3a}
  - {type: variant, offset: 1858, length: 5, content: 方歌營國㝡, WYG: 陽岑義設茗飲蒲萄漿與學士等討論經史又曰大學士李嶠入東都祔廟學士等祖送城東上令中官賜御饌及蒲萄酒􅀶物志曰西域有葡萄酒積年不敗彼俗云可至十年飲之醉彌月乃觧又曰張騫使西域返得蒲萄晉宫閣名曰華林園蒲萄百七十八株秦州記曰秦野多蒲萄本草經曰蒲萄生五原隴西燉煌益氣強志令人肥徤延年輕身王逸荔支賦曰西旅獻崑山之蒲桃鍾㑹葡桃賦曰余植蒲桃於堂前嘉而賦之命荀朂並作應禎蒲桃賦曰結繁子之礧落弓英蘢緫而彌房傅𤣥蒲桃賦曰踰龍堆之險越懸度之阻渉乎三光之阪歴乎身熱之野橄欖金樓子曰有樹名獨分}
