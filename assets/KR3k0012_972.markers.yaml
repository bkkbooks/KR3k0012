  - {type: variant, offset: 1932, length: 580, content: 生棘針重累其下以禦衛其實剖其上皮空其膚熟而貫之硬如乾棗以扶留藤古賁灰并食下氣及宿食消榖飲設以為口實嶺表錄異曰檳榔交廣生者非舶檳榔皆大腹子也彼中悉呼為檳榔交阯豪士皆家園植之其樹莖葉根幹與桄榔椰子小異也安南人自嫩及老採實啖之以不婁藤兼之瓦屋子灰競咀嚼之自云交州地溫不食此無以祛其瘴癘廣州亦噉檳榔然不甚於安南也府郭內亦無檳榔樹周成雜字曰檳榔菓也似螺可食李當之藥錄曰檳郎一名賓門左思吳都賦曰檳榔無柯椰葉無蔭劉淵林吳都注曰檳榔高六七丈正直無枝葉條從心生其實作房從心中一房數百實如鷄子外有殼肉滿殼中正白味苦澀得扶留藤與古賁灰食則柔滑而美矣俞益期與韓康伯牋曰檳榔信南遊之可觀子既非常木亦特奇云溫交州時度之大者三圍高者九丈其擢穗似禾其綴實似榖其皮似桐而厚其節似竹而穊音既其中空其外勁其屈如覆虹其申如縋繩步其林則寥郎庇其蔭則蕭條信可以長吟可以遠想矣性不奈霜不得北植必當遐樹海南遼然萬里不遇長者之目自令恨深劉義恭啟事曰奉賜交州所獻檳榔味殊常品塗遠蒟醬九真蠻獠俗曰九真獠欲婚先以檳榔子一函詣女女食即婚豆蔻劉欣期交州記曰豆蔻似杬樹味辛堪綜合檳榔嚼治斷齒環氏吳地記曰黃初三年魏來求豆寇南方草物狀曰漏寇樹子大如李實二月華七月熟出興古左思吳都賦曰草則藿蒳豆寇胡桃晉宮閣名曰華林園胡桃八十四株廣志曰陳倉胡桃皮薄多肌陰平胡桃大而皮脆急捉則破西京雜記曰上林苑有胡桃吳時外國志曰大秦有棗㮏胡桃博物志, SBCK: ''}
