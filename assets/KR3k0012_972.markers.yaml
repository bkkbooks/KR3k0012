  - {type: variant, offset: 10, length: 0, content: '', SBCK: 大宛以蒲萄爲酒冨人藏酒至萬餘石乆者數十歳不敗漢使取其實來於是離宮別觀傍盡種蒲萄漢書曰李廣利爲}
  - {type: variant, offset: 10, length: 12, content: 二年正月吳令顧脩期言西鄉, WYG: 大宛以蒲萄為酒富人藏酒至萬餘石乆者數十歳不敗漢使取其實來於是離宫别觀傍盡種蒲萄漢書曰李廣利為貳師将軍破大宛得蒲萄歸漢續漢書曰扶風孟嘉以蒲萄酒一斛遺張讓即以為凉州刺史魏文帝詔羣臣曰中國珍果甚多且復為説蒲萄奇味自夏渉秋尚}
  - {type: page-break, offset: 10, content: '', id: KR3k0012_WYG_972-2a, image: WYG0901/WYG0901-0548c.png}
  - {type: variant, offset: 10, length: 0, content: '', krp: 大宛以蒲萄爲酒冨人藏酒至萬餘石乆者數十歳不敗漢使取其實來於是離宮別觀傍盡種蒲萄漢書曰李廣利爲}
  - {type: variant, offset: 11, length: 11, content: 年正月吳令顧脩期言西鄉, SBCK: 師將軍破大宛得蒲萄種歸漢續漢書曰扶風孟他以蒲萄酒一斛遺張讓即以爲凉州刺史三輔決録又載魏文帝詔羣臣曰中國珎果甚多且復爲􅀃蒲萄當其朱夏渉秋尚}
