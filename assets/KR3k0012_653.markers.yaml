  - {type: variant, offset: 2061, length: 3, content: 從泄也, SBCK: 尚之吏部郎羊玄保等議之謂尚之曰謝靈運常言六經典文本在濟俗爲治必求靈性真奥豈得不以佛經爲指南耶近摹之推逹性論尢爲名理羊玄保進曰此談蓋天人之際豈臣所冝預竊恐􅁗楚論強兵之術孫吴畫吞併之計將無取此耶帝曰此非戰國之具良如卿言尚之曰夫禮隱􅇣則戰士怠貴仁徳則兵氣衰若以孫吴爲志苟在吞噬亦無堯舜之道豈唯釋教而巳邪帝恱曰釋門有卿亦猶孔氏之有季路丗說曰殷中軍見佛經云理應在阿堵上注云佛經之行東國尚焉而記傳無聞莫詳其始牟子曰漢明帝夜夢見神人身有日光飛止殿前意甚忻恱明日問群臣有通人􅀓毅對曰聞天笁有得道者號曰佛身有日光殆將其神}
  - {type: page-break, offset: 2061, content: '', id: KR3k0012_SBCK_653-4b}
  - {type: variant, offset: 2061, length: 2, content: 從泄, WYG: 尚之吏部郞羊𤣥保等議之謂尚之曰謝靈運常言六經典文本在濟俗為本必求靈性真奥豈得不以佛經為指南耶近顔延之推達性論尤為名理羊𤣥保進曰此談蓋天人之際豈臣所宜預竊恐秦楚論强兵之術孫吳畫吞併之計將無取於此耶帝曰此非戰國之具良如卿言尚之曰夫人禮隱逸則戰士怠貴仁德則兵氣衰若以孫吳為志苟在吞噬亦無取於堯舜之道豈唯釋教而已邪帝悦曰釋門有卿亦猶孔氏之有季路世説曰殷中軍見佛經云理亦應阿堵上注云佛經之行中國尚矣而記傳無聞莫詳其始牟子曰漢明帝夜夢見神人身有日光飛上殿前意甚欣悦明日問羣臣有通人傅毅對曰聞天竺有得道者號曰佛輕舉能飛身有日光殆將其神}
