  - {type: variant, offset: 2969, length: 363, content: 而執之三月而不別也其父請止夫子赦焉季孫聞之不悅曰司寇欺余曩告余曰為國家必先以孝余今戮一不孝以教民孝不亦可乎又赦之何哉冉有以其言告孔子喟然歎曰上失其道而煞其下非理也不教以孝而聽以獄是煞不辜三軍大敗不可斬也獄犴不理不可刑也何者上教之不行罪不在民故也管子曰凡赦者小利而大害也故久而不勝其禍無赦者小害而大利也故久而不勝其福故赦者奔馬之委轡也無赦者痤疽之砭石也又曰赦者先易後難法者先難後易故惠者民之仇讎也法者民之父母也莊子曰聞在宥天下不聞治天下郭象注曰宥使自有則治法治之則亂在也者恐天下之淫其性也宥也者恐天下之遷其德也天下不淫其性也不遷其德有治天下者哉無治乃不遷淫耳淮南子曰或曰知天且赦也而殺人或曰知天且赦而活人其望赦同其所利害異故或吹火而燈或吹火而滅所以吹者異也李爕別傳曰爕年逃亡匿臨淄男為酒家傭靈帝即位時月經陰道暈五車史官曰有流星昇, WYG: ''}
