  - {type: variant, offset: 1087, length: 205, content: 言蒼梧賊入荊州界於是徵交趾剌史張磐下廷尉辭狀未正會赦見原磐不肯出獄方更牢持械節獄吏謂磐曰天恩曠然而君不出何乎磐因自列曰前長沙賊胡蘭作難荊州餘黨散入交趾磐身嬰甲冑涉危履險討擊凶患斬殄渠帥餘燼鳥竄冒遁還奔荊州剌史度尚懼磐先言怖畏罪戾伏奏見誣磐備位方伯為國爪牙而為尚所枉受罪牢獄夫事有虛實法有是非磐實不辜赦無所除如忍以茍免永受侵辱之恥生為惡吏死為弊鬼乞傳尚詣廷尉面對曲直廷尉以其狀上詔書徵尚到廷尉辭窮受罪以先有功得原, SBCK: ''}
