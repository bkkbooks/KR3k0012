  - {type: variant, offset: 2746, length: 290, content: 還者凡二百九十人太宗愍其奉法悉赦之自是犯法者鮮貞觀二年上謂侍臣曰凡赦唯及不軌之輩古語曰小人之幸君子不幸一歲再赦奴人喑啞凡養稂莠者傷禾稼惠奸宄者賊良人昔文王作罰刑茲無赦夫小仁者大仁之賊故我有天下以來不甚放赦今四海安靜禮義興行數赦則愚人常冀僥倖唯欲犯法不能改過當須慎赦尚書大傳曰有過必赦小罪勿增大罪勿增老弱不受刑有過不受罰故老而受刑謂之悖弱而受刑謂之克不赦有過謂之賊故與其殺不辜寧失有罪與其增以有罪寧失過以有赦家語曰孔子為司寇有父子訟者父子同狴狴獄也而執之三月而不別也其父請止夫子赦焉季孫聞之不悅曰司寇欺余曩告余曰為國家必先以孝余今戮一不孝以教民孝不亦可乎又赦之何哉冉有以其言告孔子喟, SBCK: 致}
  - {type: variant, offset: 2746, length: 222, content: 還者凡二百九十人太宗愍其奉法悉赦之自是犯法者鮮貞觀二年上謂侍臣曰凡赦唯及不軌之輩古語曰小人之幸君子不幸一歲再赦奴人喑啞凡養稂莠者傷禾稼惠奸宄者賊良人昔文王作罰刑茲無赦夫小仁者大仁之賊故我有天下以來不甚放赦今四海安靜禮義興行數赦則愚人常冀僥倖唯欲犯法不能改過當須慎赦尚書大傳曰有過必赦小罪勿增大罪勿增老弱不受刑有過不受罰故老而受刑謂之悖弱而受刑謂之克不赦有過謂之賊故與其殺不辜寧失有罪與其增以有罪寧失過以有赦家語曰孔子為司寇有父子訟者父子同狴狴獄, WYG: 致然}
