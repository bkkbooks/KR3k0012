  - {type: variant, offset: 97, length: 298, content: 宥曰不識再宥曰過失三宥曰遺忘一赦曰幼弱再赦曰老耄三赦曰惷愚爾雅曰赦舍也舍放置也論語曰子路問政子曰先有司赦小過舉賢才史記曰陶朱公子殺人囚於楚公曰煞人而死職也使少子往視之乃裝黃金千溢以置褐器中載以一牛車遣其少子長男固請欲行公不許長男曰長子家督也今弟有罪大人不遣是吾不肖欲自殺其母為言不得已而遣長子為一封書及金令遺故所善莊生生乃見楚王曰某星犯某宿獨以德為可以除之王乃使封三錢之府長男以赦弟固當出也重千金虛棄無所為也乃復見莊生曰弟今自赦故辭去生知其意曰自入室取金莊生恥為兒所賣乃入見楚王曰臣出道路皆言陶之富人朱公子多將金賂王左右王非能恤楚而恩赦乃以陶朱公子也楚王大怒遂殺陶朱公子明日乃赦令長子持其弟喪歸也, SBCK: 叙佛}
