  - {type: punctuation, offset: 398, content: 「, id: KR3k0012_CHANT_653-bkkpn135}
  - {type: variant, offset: 398, length: 1, content: 惠, SBCK: 漢使驃􅀐將軍霍去病出隴過焉􅂄山得休屠王􅀕天金人顔師古注曰作金人以爲天神之主而􅀕之即今佛像是其遺法也後漢紀曰浮圖者佛圖也西域夭笁國有佛道焉佛者漢言􅁴也將以􅁴悟群生也統其教以脩善慈心爲主不殺生􅀋專務清浄其精進者號爲沙門漢言息自心蓋息意去欲而歸無爲也又以爲人死精神不滅隨復受形所行善􅁖皆有報應故所貴行善脩道以練精神練而不巳以至無生而得佛也身長一丈六尺黄金色項佩日月光變化無常無所不入故能化通萬物而大濟羣生􅀄}
  - {type: variant, offset: 398, length: 4, content: 惠帝冠赦, WYG: 漢使驃騎將軍霍去病出隴過焉耆山得休王屠祭}
  - {type: variant, offset: 398, length: 1, content: 惠, krp: 漢使驃騎將軍霍去病出隴過焉耆山得休屠王祭天金人顔師古注曰作金人以爲天神之主而祭之即今佛像是其遺法也後漢紀曰浮圖者佛圖也西域夭笁國有佛道焉佛者漢言覺也將以覺悟群生也統其教以脩善慈心爲主不殺生類專務清浄其精進者號爲沙門漢言息自心蓋息意去欲而歸無爲也又以爲人死精神不滅隨復受形所行善悪皆有報應故所貴行善脩道以練精神練而不巳以至無生而得佛也身長一丈六尺黄金色項佩日月光變化無常無所不入故能化通萬物而大濟羣生𥘉}
  - {type: variant, offset: 400, length: 2, content: 冠赦, SBCK: 夢見金人長大項有日月光以問群臣或曰西方有神其名曰佛其形長大而黃金色陛下之所夢得無是乎於是遣使}
  - {type: page-break, offset: 400, content: '', id: KR3k0012_SBCK_653-1b}
  - {type: variant, offset: 400, length: 2, content: 冠赦, krp: 夢見金人長大項有日月光以問群臣或曰西方有神其名曰佛其形長大而黃金色陛下之所夢得無是乎於是遣使}
