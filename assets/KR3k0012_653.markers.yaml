  - {type: 'tls:seg', offset: 401, content: '', id: KR3k0012_CHANT_653-6a.4}
  - {type: variant, offset: 403, length: 0, content: '', SBCK: 笁而問道術遂於中國而圖其形像焉有經書數千卷以虚無爲宗包羅精麤無所不統善爲宏闊勝大之言所求在於一躰之内而所明在於視聽之表故丗俗之人以爲虚誕然歸於玄微深逺難測故王公大人觀死生報應之際莫不瞿然自失也晉書曰後趙百姓以佛圖澄故多奉佛皆營造寺廟相競出家真僞混淆多生愆過季龍}
  - {type: variant, offset: 403, length: 0, content: '', WYG: 金人顔師古注曰作金人以為天神之主而祭之即今佛像是其遺法也後漢書曰浮圖者佛圖也西域天竺國有佛道焉佛者漢言覺也將以覺悟羣生也統其教以修善慈心為主不殺生類專務清静其精進者號為沙門漢言息心蓋息意去欲而歸無為也又以為人死精神不滅隨復受形所行善惡皆有報應故所貴行善修道以練精神練而不已以至無生而得佛也身長丈六尺黄金色項佩日月光變化無常無所不入故能化通萬物而大濟羣生初夢見金人長丈餘頂有日月光以問羣臣或曰西方有神其名曰佛其形丈六尺而黄金色陛}
  - {type: page-break, offset: 403, content: '', id: KR3k0012_WYG_653-1b, image: WYG0898/WYG0898-0796d.png}
  - {type: page-break, offset: 403, content: '', id: KR3k0012_WYG_653-2a, image: WYG0898/WYG0898-0797a.png}
  - {type: variant, offset: 403, length: 0, content: '', krp: 笁而問道術遂於中國而圖其形像焉有經書數千卷以虚無爲宗包羅精麤無所不統善爲宏闊勝大之言所求在於一躰之内而所明在於視聽之表故丗俗之人以爲虚誕然歸於玄微深逺難測故王公大人觀死生報應之際莫不瞿然自失也晉書曰後趙百姓以佛圖澄故多奉佛皆營造寺廟相競出家真僞混淆多生愆過季龍}
  - {type: punctuation, offset: 404, content: ，, id: KR3k0012_CHANT_653-bkkpn137}
  - {type: 'tls:seg', offset: 404, content: '', id: KR3k0012_CHANT_653-6a.5}
  - {type: variant, offset: 404, length: 6, content: 省法令妨吏民, SBCK: 書料簡其著作郞王度奏曰佛外國之神非諸華所應祠奉漢代􅀄傳其道唯聽西域人等得立寺都邑以奉其神漢人皆不出家魏承漢制亦修前􅁤今可断趙人悉不聽詣寺燒香禮拜以遵典禮宋書曰頋歡以佛道二家教異學}
  - {type: page-break, offset: 404, content: '', id: KR3k0012_SBCK_653-2a}
  - {type: variant, offset: 404, length: 6, content: 省法令妨吏民, WYG: 之所夢得無是乎於是遣使之天竺而問道術遂於中國而圖其形像焉有經書數千卷以虛無為宗包羅精粗無所不統善為宏濶勝大之言所求在於一體之内而所明在於視聽之表故世俗之人以為虛誕然歸於𤣥㣲深逺難測故王公大人觀死生報應之際莫不矍然自失也晉書曰後趙百姓以佛圖澄故多奉佛皆營造寺廟相競出家眞偽混淆多生愆過季龍下書料簡其著作郞王度奏曰佛外國之神非諸華所應祠奉漢代初傳其道唯聽西域人等得立寺都邑以奉其神漢人皆不出家魏承漢制亦修前軌今可斷趙人悉不聽詣寺燒香禮拜以遵典祀宋書曰顧歡以佛道二家立教之異學}
