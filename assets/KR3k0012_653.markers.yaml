  - {type: variant, offset: 2072, length: 0, content: '', krp: 涅槃經云如來背痛於雙樹間北首而卧故後之圗繪者爲此像也佛地論曰佛者覺也覺一切種智復能開覺}
  - {type: variant, offset: 2073, length: 0, content: '', SBCK: 情如睡夢􅁴故名爲佛姓釋伽號牟尼佛普曜經曰從兠率天降神於西域迦維衛國浄飯王宫摩耶夫人剖左脅而生時多靈瑞生而能言本相經曰年十九踰城出家學道勤行精進禪定六年成道具三十二相八十種好􅄺槃經曰醍醐之敎喻於佛性從乳出酪從酪出􅂫從生􅂫出熟􅂫熟蘇出醍醐醍醐蘇之精也法顯記曰佛生於殷末道成於周􅀄至成王十二年經律始到新頭河河即張騫所到之處佛國記曰佛有四牙廣半寸長半寸}
  - {type: page-break, offset: 2073, content: '', id: KR3k0012_SBCK_653-5a}
  - {type: variant, offset: 2073, length: 0, content: '', WYG: 情如睡夢覺故名為佛姓釋迦號牟尼佛普曜經曰佛兠率天降神於西域迦羅衛國浄飯王宫摩耶夫人剖右脇而生時多靈瑞生而能言本相經曰年十九踰城出家學道勤行精進禪定六年成道具三十二相八十種好湼槃經曰醍醐之教踰於佛性從乳出酪從酪出蘇從生蘇出熟蘇熟蘇出醍醐醍醐蘇之精也法顯記曰佛生於殷末道成於周初至成王十二年經律始到新頭河河即張騫所到之處佛骨記曰佛有四牙廣半寸長半寸}
