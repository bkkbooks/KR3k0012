  - {type: variant, offset: 1825, length: 223, content: 典以至此事乎天人之理既惑大亂將作矣顧謂謝鯤阮千里等曰易稱知幾其神卿等各可深逃乃身荷檐妻子惟鹿車以入于蜀山莫知所至王隱晉書曰武帝咸熙二年十二月丙寅上乃設壇受命于郊即洛陽宮幸太極前殿大赦天下又曰愍帝建興元年夏四月壬申上即位于長安宮改年大赦天下與之更始前後不及者皆除之崔鴻前秦錄曰王猛疾病未瘳符堅大赦死已下又曰永興元年符堅將為赦與尚書左僕射王猛右僕射符融密議於露堂屏左右為赦文有一大蒼蠅入自牖間鳴聲甚大集于筆端驅而復來久之乃去俄而長安市里相告曰官今大赦, SBCK: 念}
