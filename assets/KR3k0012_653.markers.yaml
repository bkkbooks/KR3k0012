  - {type: variant, offset: 3852, length: 448, content: 年乃赦示不廢舊章而已近永平建初之際亦六七年乃赦亡命之子皆老於草野窮困懲艾皆至於死頃間以來歲旦赦百姓輕為姦非前年一朞之中大小四赦諺曰一歲再赦奴兒喑啞況不軌之民孰不肆意遂赦為常俗赦以趣赦轉相驅踧而不得息雖日赦之亂捕擊耳郭子曰孫秀降晉武帝厚存寵之妻以姨妹蒯氏室家甚睦妻嘗怒乃罵秀為狢子秀大不平遂出不復入蒯氏自悔責遂請救於帝時大赦群臣咸見既出帝獨留秀從容言天下曠蕩蒯夫人可得從其例不秀免冠謝為夫婦如初傳子曰若親貴犯罪大者必議小者必赦是縱封豕於境內放長蛇於左右也荀悅漢紀論曰夫赦權時之宜非常典也漢興承兵革之後大過之代比屋可刑故設三章之法申以大赦之令蕩滌穢流與人更始時勢然也後代承業習而不革失時宜矣風角書曰春甲寅日風高去地三四丈鳴條從甲上來為大赦期六十日又曰候赦法冬至後盡丁巳之日南風從巳上來滿三日以上必有大赦望氣經曰黃氣四出注期五十日赦古樂府歌詩曰始出上西門遙望秦氏樓秦氏有好女自名為女休女休年十五為宗行報讎左執白楊刀右援宛景矛上山四五里問吏得女休女休前置辤平生為燕王婦於今為詔獄囚刀矛未及下𢤱橦擊鼓赦書下, SBCK: ''}
