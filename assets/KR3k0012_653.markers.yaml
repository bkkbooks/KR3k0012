  - {type: variant, offset: 3849, length: 1, content: 二, WYG: 之初即不許度人為僧尼道士不許創立寺觀臣常以為髙祖之志必行於陛下之身縱未能即行豈可恣之轉令盛也今聞陛下令羣僧迎佛骨於鳳翔御樓以觀舁入大内又令諸寺逓迎供養臣雖至愚必知陛下不惑於佛以祈福也直以年豐人樂狥人之心為京師士庶設詭異之觀戱玩之具耳然百姓愚㝠易惑難曉苟見陛下如此將謂真心信佛皆云天子大聖猶一心敬信百姓何人更惜身命以至焚頂燒指百十為羣解衣散錢自朝至暮轉相倣傚惟恐後時老少奔波棄其業次若不明加禁遏更歴諸寺必有斷臂臠身以為供養者傷風敗俗傳笑四方非細事也夫佛本夷狄之人與中國言語不通衣服殊製口不言先王之法言身不服先王之法服不知君臣之義父子之恩假如其身尚在奉其國命來朝京師陛下容而接之不過宣政一見禮賓一設賜衣一襲衛而出境不令惑衆也況其身死已久枯朽之骨凶穢之餘豈宜令入宫禁孔子曰敬鬼神而逺之古之諸侯行弔於其國尚令巫祝以桃茢祓除不祥然後進弔今無故取朽穢之物親臨觀之巫祝不先桃茢不用羣臣不言其非御史不舉其失臣實恥之乞以此骨付之有司投諸水火永絶根本斷天下之疑絶後代之惑使天下之人知大聖人之所作為出於尋常萬萬豈不盛哉豈不快哉太平御覽卷六百五}
