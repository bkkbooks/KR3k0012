  - {type: variant, offset: 3333, length: 402, content: 而北陽芒迫卯熒惑入大角犯帝座其占當有大臣被誅者故太尉李固西土人占在固今月經陰道圍五車宜有赦令以除此異上感此變大赦天下求公子孫酒家具車乘厚送之漢舊儀曰踐祚改元立皇后太子赦天下每赦自殊死以下及謀反大逆不道諸不當得赦者皆赦除之令下丞相御史復奏可分遣丞相御史乘傳駕行郡國解囚徒布詔書郡國各分遣吏傳廄車馬行屬縣解囚徒海內先賢傳曰王允字子師誅董卓卓將郭汜李𠐶等聞卓死引兵還圍長安燔掠官省死者萬數大赦天下允忠節三朝更赦書云其赦射帝營宮闕不從此令是日遂及於難華陽國志曰丞相諸葛亮時有言公惜赦亮荅曰治世以大德不以小惠故匡衡吳漢不願為赦先帝亦言吾周旋陳元方鄭康成間每見啟亂之道悉矣曾不語赦也若劉景升父子歲歲赦宥何益於治也王符潛夫論曰凡治疾者必先知脈之虛實氣之所結然後為之方故疾可愈也為國者必先知人之所苦禍之所起然後為之禁故姦可塞也夫賊良人之甚者莫大數赦赦數則惡人昌而善人傷矣養稂莠者傷禾稼惠姦宄者賊良人書曰文王作罰刑茲無赦孝, SBCK: ''}
