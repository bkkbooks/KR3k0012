  - {type: variant, offset: 2279, length: 317, content: 曰明帝三年夏詔比屢有糺發官司赦前事此雖意在疾惡但先王制肆眚之道令天下自新若又推問自新何由哉如此之徒有司勿為推究惟庫廄倉廩與海內所共漢帝有云朕天下守財耳若有侵盜公家財畜錢粟者魏朝之事年月既遠一不須問自周有天下以來雖經赦宥而事跡知者有司宜即推窮得實之日但免其罪徵備如法北齊書曰宋良字元友為清河太守甚有善政天保初大赦清河獄內蓬蒿但滿無囚可赦唯率將吏拜詔而已又曰後主將大赦時臨漳令李世業為臺所劾贓多至死世業即穆提婆對門陸令萱言於齊主所以大赦後由是頻赦遂以為常平恩縣功曹賀肫小人姦貪數犯刑憲但入狴牢無不遇赦故世人以肫為赦之候又曰赦日武庫令設金雞及鼓於閶闔門外之右勒集囚徒於闕前撾鼓千聲脫枷鏁遣之隋書曰張煚為天官司會與宗伯斛斯徵素不恊徵出為齊州剌, SBCK: ''}
