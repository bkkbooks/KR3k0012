  - {type: variant, offset: 997, length: 0, content: '', SBCK: 明帝法始東流自此以來其教稍廣別爲一家之學元嘉十二年丹楊尹蕭摹之奏曰佛教􅀍于中國巳歷四代而自頃以來更以奢競爲重請自今以後有欲鑄銅像者悉詣臺自聞興造塔寺精舎皆先列言須許報然後就功先是晉丗􅁃冰始創議欲使沙門敬王者後桓玄復述其議並不果行宋大明六年孝武使有司奏沙門接見皆尽敬詔可隋書經藉志曰釋迦在丗四十九年教化乃至天龍人􅀑並來聽法弟子多有得道證果後於构尸郍城娑羅􅀟樹間二月十五日入般􅄺槃譯言滅度亦言常樂我浄弟子迦葉等追共撰述教爲十二部經唐}
  - {type: page-break, offset: 997, content: '', id: KR3k0012_SBCK_653-3a}
  - {type: variant, offset: 997, length: 0, content: '', WYG: 明帝法始東流自此以來其教稍廣别為一家之學元嘉十二年丹陽尹蕭摹之奏曰佛教被於中國已厯四代而自頃以來更以奢競為重請自今以後有欲鑄銅像者悉詣臺自聞興造塔寺精舍皆先列言須許報然後就功先是晉世庾氷始創議欲使沙門敬王者後桓𤣥復述其議並不果行宋大明六年孝武使有司奏沙門接見皆盡敬詔可隋書經籍志曰釋迦在世四十九年教化乃至天龍人鬼並來聽法弟子多有得道證果後於拘尸那城娑羅雙樹間以二月十五日入般湼槃湼槃亦曰泥洹譯言滅度亦言常樂我浄弟子迦葉等追撰述其教為十二部經唐}
