  - {type: variant, offset: 3849, length: 1, content: 二, SBCK: 之􅀄不許度人爲僧尼道士又不許創立寺觀臣愚以爲髙祖之志必行於陛下之身縱未能行豈可恣之轉令盛矣今聞陛下令群僧迎佛骨於鳯翔樓以舁入内又令諸寺送迎供飬臣雖至愚必知陛下不惑於佛以祈福也直以年豊人樂徇人之心爲京都士庶設詭異之觀戯翫之具耳然百姓愚􅄀易惑難曉苟見陛下如此將謂真心信佛皆云天子大聖猶一心敬信百姓何人更惜身命以至焚頂燒指百十爲群解衣散錢自朝至暮轉相倣傚唯恐後時老少奔波弃其業次􅀂不明加禁遏更歷諸寺必有断臂臠身以爲供養者傷風敗俗傳􅀏四方非細事也夫佛本夷狄之人與中國言語不通衣服殊制口不言先王之法言身不服先王之法服不知君臣之義父子之恩假如其身至今尚在奉其國命來朝京師陛下容而接之不過宣政一見禮賔一設賜衣一襲衛而出境不令惑衆也况其身死巳乆枯朽之骨㓙穢之餘豈令入宫禁孔子曰敬􅀑神而逺之古之諸侯行冝於國尚令巫祝以桃茢拂除不祥然後進弔今無故取朽穢之物親臨視之巫祝不先桃茢不用群臣不定其非御史不舉其失臣實耻之乞以此骨付有司投水火永絶根本断天下之疑絶後代之惑使天下之人知大聖之作爲出於尋常萬萬也豈不盛哉豈不快哉太平御覽卷第六百五}
