  - {type: variant, offset: 2058, length: 1, content: 禁, SBCK: 昔漢明帝感夢金人使徃西方求之得摩騰笁法蘭來中國立經行教今無乃是遺􅀋乎因引見僧㑹其言佛教滅度巳乆唯有舎利可以求請遂於大内立壇結静三七日得之帝崇佛道以是江東􅀄有佛法髙僧傳曰釋惠嚴宋髙祖素所知重文帝在位情好尤宻先是帝未甚崇信京尹蕭摹之上啓請制起寺及鑄像帝廼與侍}
