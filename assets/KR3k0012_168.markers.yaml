  - {type: variant, offset: 12, length: 117, content: 江陵郡漢舊縣屬南郡禹貢曰荊及衡陽惟荊州北據荊山南及衡山之陽江漢朝宗于海二水經此州而入海有似於朝厥土惟塗泥厥田惟下中春秋元命苞曰軫散為荊州分為楚國荊之為言強也陽盛物堅其氣急悍爾雅曰漢南曰荊州周官職方氏曰正南曰荊州其鎮曰衡山其藪澤曰雲夢其, SBCK: 洋}
