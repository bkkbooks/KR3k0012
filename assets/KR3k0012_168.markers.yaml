  - {type: variant, offset: 2821, length: 1, content: 滅, krp: 十四年求以武闕外就楚易黔中地武陵記曰後漢梁松自義陵移郡於若城今州東有張若城是晉書曰潘京武陵漢壽人也弱冠郡辟主簿太守趙廞甚器之嘗問之曰貴郡何以名武陵京曰鄙郡本名義陵在辰陽縣界與夷獠相接數爲所攻光武時移東山遂得全完共議易號傳曰止戈爲武詩稱髙平曰陵於是名焉武陵記曰武陵郡境四千餘里灃州十道志曰灃州灃陽郡春秋戰國時其地屬楚秦屬黔中郡漢改黔中爲武陵郡屬荆州今州即武陵郡之零陽縣地吴分武陵西界立天門郡此即郡之境晉爲南義陽郡隋平陳置松州㝷改爲灃州在灃水之北故取爲名尚書禹貢曰岷山導江東別爲沱又東至于灃豊水名輿地志曰晉末以義陽流人在南郡者立爲南義陽郡寄在荆州十道志曰慈利縣即漢零陽縣地圖經曰界内有零溪水即以爲名隋開皇十八年改零陽爲慈利縣王仲宣贈士孫文始詩曰悠悠澹灃澹灃二水在澧陽縣}
