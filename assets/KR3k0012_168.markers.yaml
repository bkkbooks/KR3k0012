  - {type: variant, offset: 2149, length: 270, content: 雲安郡春秋時為魚國秦併天下為巴郡地漢為魚復縣左傳曰庸蠻叛楚楚莊王伐之七遇皆北唯禆儵魚人實逐之杜曰禆儵魚三巴今魚復縣也漢志曰江關都尉理魚復有橘官郡國記曰白帝城即公孫述至魚復有白龍出井中因號魚復為白帝城劉備因改魚復為永安又後漢書公孫述自以承漢土德故號曰白帝城蜀志曰羅憲為領軍守永安聞魏軍平蜀三日哭於都亭荊州圖副曰永安宮南一里渚下平磧上有諸葛孔明八陣圖聚細石為之各高五丈皆棊布相當中間相去九尺正中開南北巷悉廣五尺或為人散亂及為夏水所沒至冬水退依然如故荊州記曰壘西聚石為八行行八聚謂之八陣圖因曰八陣既成自今行師不復敗後見莫能了之桓宣武伐蜀見之曰此常, SBCK: 潾}
