  - {type: variant, offset: 2912, length: 1, content: 充, SBCK: 廵至新野臨潭水而見菖蒲花乃歌曰兩菖蒲新野樂遂建兩菖蒲寺以美之楚地記曰漢江之北爲南陽漢江之南爲南郡襄州十道志曰襄州襄陽郡禹貢豫州之南境春秋以來楚地􅁗南郡之北界二難爲南陽郡獻帝時魏武始置襄陽郡襄陽記曰襄陽本楚之下邑檀溪帶其西峴山亘其南亦楚國之北津也荆州圖副曰建安十三年魏武平荆州始置襄陽郡以地在襄山之陽爲名楚地記曰蜀􅀜羽攻没于禁等七軍兵􅀔甚盛獨襄陽徐晃屯守不下曹公謂晃曰全襄陽者徐公之功也後吴大帝率兵向西時曹仁鎮之司馬宣王言於魏文曰襄陽水陸之衡禦㓂要地不可失也南雍州記曰永嘉之亂三輔豪族流於樊􅃆僑於漢側立雍州因人所思以安百姓也宋文帝因之置南雍州焉晉書曰山簡字季倫嘗鎮襄陽郡中有髙陽池毎臨池未嘗不大醉而還人歌之曰山公何所詣徃至髙陽池日暮倒載歸酩酊無所知時時能􅀐馬倒着白接蘺舉鞭問葛強何如并州兒盛弘之荆州記曰襄陽郡峴首山南至冝城百餘里其間彫牆峻宇閭閻填列漢宣帝末其中有卿士刺史二千石數十家珠軒駢輝華盖連延掩映於太山廟下荆州刺史行部見之雅歎其盛勑號太上廟道爲冠盖里漢志曰筑陽屬南陽郡故榖國今榖城}
