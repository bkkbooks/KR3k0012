  - {type: variant, offset: 130, length: 492, content: 江漢其浸潁湛其利丹銀齒革晉元康地記曰荊州於古蠻服之地漢書曰臨江閔王榮坐侵廟壖地為宮上徵榮榮行祖於江陵北門既上車軸折車廢江陵父老流涕言曰吾王不返矣王至詣中尉府郅都責訊王王恐自殺漢書地理志曰今之南郡江夏零陵桂陽武陵長沙及漢中汝南郡盡楚分也史記曰蘇秦說威王日楚西有黔中巫郡東有夏州海陵南有洞庭蒼梧北有陘塞郇陽地方五千里帶甲百萬車千乘騎萬疋粟支十年此霸王之資也淮南子曰楚地南卷沅湘北繞潁泗西苞巴蜀東裏郯邳潁汝以為泗江漢以為池垣之以鄧林緣之以方城山高尋雲霓深谿肆無景十三州志曰漢章帝建初二年徙鉅鹿王恭為江陵王三公上言江陵在京師正南不可以封乃徙為安六王盛弘之荊州記曰元嘉中以京師根本之所寄荊楚為重鎮上流之所揔擬周之分陜晉宋以降此為西陜釋名曰荊州取名於荊山又曰荊驚也南蠻數寇常置警備左傳曰楚子西沿漢泝江將入郢王在渚宮下見之十道志曰當陽縣舊縣屬南郡廣陽王子益之所封荊州記曰當陽本楚之舊邑左氏傳云楚潘崇伐麇至于錫穴潁容釋例云麇在當陽十道志曰公安縣漢孱陵縣地吳之南郡荊州記曰劉備敗於襄陽南奔荊州吳大帝封為左將軍荊州牧城北而鎮之時人號備為左公故名其城曰公安古今地名曰松滋縣古鳩茲地漢屬廬江郡峽州十道志曰夷陵, SBCK: ''}
