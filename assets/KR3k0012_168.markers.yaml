  - {type: variant, offset: 2866, length: 1, content: 相, SBCK: 武帝天和四年割巴州之伏虞郡隆州之隆城郡於此置蓬州集州十道志曰集州符陽郡本漢宕渠縣地晉惠帝永寧中李特王蜀其地屬焉梁武改爲東巴州後改爲集州以東北有集水因以爲名又云以萬山所集故也唐州十道志曰唐州淮安縣禹貢豫州之域春秋楚地戰國時屬晉後入韓􅁗置三十六郡爲南陽郡漢志曰南陽郡有比陽縣比水所出東入蔡左傳僖四年齊師伐楚楚子使屈完}
