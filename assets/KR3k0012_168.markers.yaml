  - {type: variant, offset: 726, length: 1125, content: 即西通全蜀故夷陵有安蜀古城吳志曰陸遜上䟽夷陵要害實國家之關限若失之非損一郡荊州亦可憂也十道志曰宜都縣本漢夷縣屬南郡袁山松宜都山川記南崖有山名荊門北對崖有山名虎牙故曰荊門虎牙即楚之西塞歸州十道志曰歸州巴東郡在周為夔子國屬楚秦併天下為南郡之地漢置秭歸縣唐武德二年割夔州之秭歸巴東二縣置歸州袁山松記曰屈原此縣人既被流放忽然暫歸其姉亦來因名其地為秭歸稀與姊同三國志曰吳置建平郡即宜都之西部也晉王濬自蜀江沿流伐吳守將吾彥表晧曰請增建平兵若建平不下晉師終不敢過皓不從復州十道志曰復州竟陵郡禹貢荊州之域春秋戰國時屬楚秦兼天下屬南郡漢中十三州在州部即江夏之竟陵縣地唐武德五年為復州郡國志曰沔陽縣即楚王地也圖經曰監利縣漢華容縣乾溪章華臺在焉郢州十道志曰郢州富水郡歷代所屬與竟陵郡同二漢屬江夏郡晉宋以來為竟陵郡地西魏屬安州後周武帝置郢州隨廢唐武德六年為郢州郡國志曰長壽縣武陵山春秋謂楚平王卒於樠木之下即此山也鳳州十道志曰鳳州河池郡土地所屬與金州同在秦隴西郡地漢為故道縣地故道今兩當縣是漢武改雍為涼後為涼州之地水經曰兩當縣水出陳倉縣之大散嶺西南流入故道川謂之故道水縣因水取名或云縣西有兩山相當故名之華陽國志曰河池一名仇池郭仲產秦州記云仇池山一名仇維山上有池似覆壺前志云是縣以山得名水經曰大散水流入黃花川黃花縣因水得名成州十道志曰成州同谷郡禹貢梁州之域古西戎地周省梁入雍為白馬氐國史記西南夷傳曰自莋以東北君長數十冉駹為大自冉駹以西北君長數十白馬最大皆氐類後漢書曰河池一名仇池地方百頃左右悉白馬氐武州十道志曰武州武都郡土地所屬與成州同亦白馬氐之地漢書西南夷傳曰漢誅且蘭邛君并殺莋侯冉駹等皆震懼請臣置吏以為廣西部至元鼎六年以白馬氐地為武都郡隴右記曰武都紫水有泥其色紫而粘貢之用封璽書故詔誥有紫泥之美郡國志曰武都沮水之西有角弩谷即蜀將姜維勦五部溪蠻之所魚豢魏略曰文帝黃初元年徙武都於美陽在今雍州好畤縣界武都故城是也興州十道志曰興州順政郡戰國時白馬氐之東境秦併天下為蜀郡地漢元鼎六年置武都郡晉書曰懷帝永嘉中氐之人楊茂搜據武都郡子孫丞嗣為氐王周地圖記曰郡有丙山山有穴即丙穴其口向丙因以為名每春三月上旬有魚長八九寸或二三日聯綿從穴出躍相傳名為嘉魚左太冲蜀都賦曰嘉魚出於丙穴宕州十道志曰宕州懷道郡禹貢梁州之域古羗地周為雍州之境秦漢魏晉諸羗據之後魏書曰梁彌忩者宕昌羗也其先常為羌豪祖勤自稱宕昌王彌忩世祖初求內附遂拜彌忩為宕昌王因封其地為宕昌蕃即今宕州扶州十道志曰扶州同昌郡禹貢梁州之域實西戎之地周省梁入雍為雍州地秦漢魏晉並屬蕃夷後魏書曰廢帝前元年西逐吐谷渾定陰平於此置鄧州及鄧寧郡取前羗部落所居為之名時又置怗夷縣屬封統郡以戎夷寧怗為義也周地圖記曰後魏廢帝置同昌縣屬封統郡文州十道志曰文州陰平, WYG: 洛}
