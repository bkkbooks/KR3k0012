  - {type: variant, offset: 247, length: 204, content: 史記曰蘇秦說威王日楚西有黔中巫郡東有夏州海陵南有洞庭蒼梧北有陘塞郇陽地方五千里帶甲百萬車千乘騎萬疋粟支十年此霸王之資也淮南子曰楚地南卷沅湘北繞潁泗西苞巴蜀東裏郯邳潁汝以為泗江漢以為池垣之以鄧林緣之以方城山高尋雲霓深谿肆無景十三州志曰漢章帝建初二年徙鉅鹿王恭為江陵王三公上言江陵在京師正南不可以封乃徙為安六王盛弘之荊州記曰元嘉中以京師根本之所寄荊楚為重鎮上流之所揔擬周之分陜晉宋以降此為西陜釋名曰荊州取名於荊山, WYG: ''}
