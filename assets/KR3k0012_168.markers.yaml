  - {type: variant, offset: 3, length: 2, content: 上荊, SBCK: 下梁洋商金房通渠渝涪朗灃巴壁蓬集唐鄧襄均隨梁州圖經曰梁州漢中郡春秋至戰國時楚地􅁗漢爲漢中郡蜀志曰劉備􅀄得漢中曰曹公雖來無能爲也漢書曰項羽立沛公爲漢王王巴蜀漢中四十一縣都南鄭沛公欲攻楚丞相蕭何諌曰雖王漢之惡不猶愈於死乎且語曰天漢其稱甚美願王漢中鎮撫其民收用巴蜀還定三􅁗天下可圖也洋}
  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_168-1b}
  - {type: variant, offset: 3, length: 2, content: 上荊, WYG: 下梁州洋州商州金州房州通州渠州渝州涪州朗州澧州巴州壁州蓬州集州唐州鄧州襄州均州随州梁州圖經曰梁州漢中郡春秋至戰國楚地秦漢為漢中郡蜀志曰先主初得漢中曰曹公雖來無能為也漢書曰項羽立沛公為漢王王巴蜀漢中四十一縣都南鄭沛公欲攻楚丞相蕭何諫曰雖王漢中之惡不猶愈於死乎語曰天漢其稱甚美願大王王漢中養其民以致賢人収用巴蜀還定三秦天下可圖也洋}
