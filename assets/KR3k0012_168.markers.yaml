  - {type: variant, offset: 2868, length: 0, content: '', SBCK: 師齊侯陳諸侯之師與屈完乗而觀之齊侯曰以此衆戰誰能禦之以此攻城何城不克對曰君若以德綏諸侯誰敢不服君􅀂以力楚國方城以爲城漢水以爲池雖君之衆無所用之晉太康地記曰自華至沘陽南北連百里號爲方城亦曰長城周地圖記曰湖陽}
  - {type: page-break, offset: 2868, content: '', id: KR3k0012_SBCK_168-5b}
  - {type: variant, offset: 2868, length: 0, content: '', krp: 師齊侯陳諸侯之師與屈完乗而觀之齊侯曰以此衆戰誰能禦之以此攻城何城不克對曰君若以德綏諸侯誰敢不服君若以力楚國方城以爲城漢水以爲池雖君之衆無所用之晉太康地記曰自華至沘陽南北連百里號爲方城亦曰長城周地圖記曰湖陽}
  - {type: variant, offset: 2869, length: 0, content: '', SBCK: 光武所封外祖樊重邑又光武封姊爲湖陽公主漢志曰湖陽古廖國也廖音力救反鄧州十道志曰鄧州南陽縣禹貢豫州之域戰國屬韓􅁗置三十六郡南陽其一也釋名曰在中國之南而居陽地故以爲名漢志曰南陽郡領宛犫等三十六縣􅁗置莽曰荷墜屬荆州又曰鄧屬南陽故國都尉治應劭曰鄧侯國也史記蘇􅁗􅀃韓惠王曰韓西}
  - {type: variant, offset: 2869, length: 0, content: '', krp: 光武所封外祖樊重邑又光武封姊爲湖陽公主漢志曰湖陽古廖國也廖音力救反鄧州十道志曰鄧州南陽縣禹貢豫州之域戰國屬韓秦置三十六郡南陽其一也釋名曰在中國之南而居陽地故以爲名漢志曰南陽郡領宛犫等三十六縣秦置莽曰荷墜屬荆州又曰鄧屬南陽故國都尉治應劭曰鄧侯國也史記蘇秦說韓惠王曰韓西}
  - {type: variant, offset: 2870, length: 5, content: 相如坪相如, SBCK: 冝陽東有穣淯後漢書曰時天下墾田多不以實詔下郡國撿覆其事時諸郡各遣使奏事帝見陳留吏牘上有書視之云潁州弘農可問河南南陽不可問帝詰吏不肯服時顯宗爲東海公言曰河南帝城多近臣南陽帝郷多近親田宅踰制不可爲凖史記曰􅁗滅韓徙天下不軓之人於南陽}
