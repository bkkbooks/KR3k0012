  - {type: variant, offset: 1281, length: 703, content: 同谷郡禹貢梁州之域古西戎地周省梁入雍為白馬氐國史記西南夷傳曰自莋以東北君長數十冉駹為大自冉駹以西北君長數十白馬最大皆氐類後漢書曰河池一名仇池地方百頃左右悉白馬氐武州十道志曰武州武都郡土地所屬與成州同亦白馬氐之地漢書西南夷傳曰漢誅且蘭邛君并殺莋侯冉駹等皆震懼請臣置吏以為廣西部至元鼎六年以白馬氐地為武都郡隴右記曰武都紫水有泥其色紫而粘貢之用封璽書故詔誥有紫泥之美郡國志曰武都沮水之西有角弩谷即蜀將姜維勦五部溪蠻之所魚豢魏略曰文帝黃初元年徙武都於美陽在今雍州好畤縣界武都故城是也興州十道志曰興州順政郡戰國時白馬氐之東境秦併天下為蜀郡地漢元鼎六年置武都郡晉書曰懷帝永嘉中氐之人楊茂搜據武都郡子孫丞嗣為氐王周地圖記曰郡有丙山山有穴即丙穴其口向丙因以為名每春三月上旬有魚長八九寸或二三日聯綿從穴出躍相傳名為嘉魚左太冲蜀都賦曰嘉魚出於丙穴宕州十道志曰宕州懷道郡禹貢梁州之域古羗地周為雍州之境秦漢魏晉諸羗據之後魏書曰梁彌忩者宕昌羗也其先常為羌豪祖勤自稱宕昌王彌忩世祖初求內附遂拜彌忩為宕昌王因封其地為宕昌蕃即今宕州扶州十道志曰扶州同昌郡禹貢梁州之域實西戎之地周省梁入雍為雍州地秦漢魏晉並屬蕃夷後魏書曰廢帝前元年西逐吐谷渾定陰平於此置鄧州及鄧寧郡取前羗部落所居為之名時又置怗夷縣屬封統郡以戎夷寧怗為義也周地圖記曰後魏廢帝置同昌縣屬封統郡文州十道志曰文州陰平郡禹貢梁州之域周為雍州之境戰國時氐羗據焉漢武時開西南夷置陰平道以統其眾蜀志曰鄧艾自陰平景谷步道懸兵束馬經油江出綿竹華陽國志曰晉永平之後羗虜數叛遂立為郡以遏之輿地志曰晉永嘉之末太守王鑒以郡降李雄晉人因是悉流移於蜀漢其氐羌並屬楊茂搜此後不復為正朔所頒利州十道志曰利州益昌, krp: 通川}
