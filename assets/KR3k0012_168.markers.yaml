  - {type: variant, offset: 2805, length: 1, content: 梁, WYG: 豫州之域戰國屬韓秦置三十六郡南陽其一也釋名曰在中國之南而居陽地故以為名漢志曰南陽郡領宛犨等三十六縣秦置莽曰前隊屬荆州又曰鄧屬南陽故國都尉治應劭曰鄧侯國史記蘇秦說韓惠王韓西有宜陽東有穰涓後漢書曰時天下墾田多不以實詔下郡國檢覆其事時諸郡各遣使奏事帝見陳留吏牘上有書視之云潁川𢎞農可問河南南陽不可問帝詰吏不肯服時顯宗為東海公言曰河南帝城多近臣南陽帝鄉多近親田宅踰制不可為凖漢書曰秦滅韓徙天下不軌之人於南陽故其俗夸奢上氣力好商賈漁獵藏匿難制宛西通武闗東受江淮一都之㑹也圖經曰菊潭取界内菊潭水以名縣盛𢎞之荆州記曰菊水其源傍有芳菊浸潤其流滋液水極芳馨飲之者皆壽考後魏略曰孝文帝南巡至新野臨潭水而見菖蒲花乃歌曰兩菖蒲新野樂遂建兩菖蒲寺以美之楚地記曰漢江之北為南陽漢江之南為南郡襄州十道志曰襄州襄陽郡禹貢豫州之南境春秋以來楚地秦南郡之北界二漢為南陽郡獻帝時魏武始置襄陽郡襄陽記曰襄陽本楚之下邑檀溪帶其西峴山亘其南亦楚國之北津也荆州圖副曰建安十三年魏武平荆州始置襄陽郡以地在襄山之陽為名楚地記曰闗雲長攻沒于禁等七軍兵勢甚盛獨襄陽徐晃屯守不下曹公謂晃曰全襄陽者徐晃之功也後吳大帝率兵西時曹仁鎮之司馬懿宣言於魏王曰襄陽水路之衡禦冦要地不可失也南雍州記曰永嘉之亂三輔豪族流於樊沔僑於漢側立雍州因人所思以安百姓也宋文帝因之置南雍州焉晉書曰山簡字季倫嘗鎮襄陽郡中有髙陽池每臨池未嘗不大醉而還人歌之曰山公何所詣往至髙陽池日暮倒載歸酩酊無所知時時能騎馬倒著白接䍦舉鞭問葛强何如并州兒盛𢎞之荆州記曰襄陽郡峴首山南至宜城百餘里其間雕牆峻宇閭閻填列漢宣帝末其中有卿士刺史二千石數十家珠軒駢輝華蓋連延掩映於大山廟下荆州刺史行部見之雅嘆其盛勅縣號為冠葢里漢書筑陽屬南郡故國今穀城縣莽曰宜禾應劭曰筑水出漢中房陵東入沔筑音逐圖經曰穀城縣有酇城漢志曰即蕭何所封也均州十道志曰均州武當郡禹貢豫}
