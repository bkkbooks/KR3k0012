  - {type: variant, offset: 2567, length: 0, content: '', WYG: 古巴國也三巴記曰閬白二水東西流曲折三廻如巴字故謂三巴山海經曰海内西南有巴國昔大皥生咸鳥咸鳥生乗釐乗釐生後昭是為巴人郭璞曰為巴始祖李膺益州記曰明月峽在巴縣東壁髙四十丈有圓孔形如滿月因以為名又曰江津縣西有香草樓昔有仙人於此置樓居植香草於樓下一夕飛昇去後人指其地為香草樓涪州十道志曰涪州涪陵郡禹貢梁州之域周為雍州之地春秋時巴國秦為巴郡漢為涪陵郡巴縣巴漢志曰涪陵巴漢郡之南鄙本與楚商於之地接朗州十道志曰朗州武陵郡禹貢荆州之域春秋及戰國時屬楚秦為黔中郡漢髙祖五年更名武陵郡梁湘東王於荆州割武陵郡置武州陳天嘉元年分武陵立沅陵郡隋又改武州為辰州又改為嵩州又改為朗州史記曰秦惠王十四年求以武闕外就楚易黔中地武陵記曰後漢梁松自義陵移郡於若城今州東有張若城晉書曰潘京武陵漢壽人也弱冠郡辟為主簿太守趙廞甚器之嘗問之曰貴郡何以名武陵京曰鄙郡本名義陵在辰陽縣界與夷獠相接數為所攻光武時移東山遂得全完共議易號傳曰止戈為武詩稱髙平曰陵於是為名焉武陵記曰武陵郡境四千餘里澧州十道志曰澧州澧陽郡春秋戰國地屬楚秦屬黔中郡漢改黔中為武陵郡屬荆州今州即武陵郡零陽縣地吳分武陵西界立天門郡即此郡之境晉為南義陽郡隋平陳置松州尋改為澧州在澧水之北故取為名尚書禹貢曰岷山導江東别為沱又東至于澧輿地志曰晉宋以義陽流人在南郡者立為南義陽郡寄荆州十道志曰慈利縣即漢零陽縣地圖經曰界内有零溪水即以為名隋開皇十八年改零陽為慈利縣王仲宣贈士孫文始詩曰悠悠澹澧澹澧二水在澧陽縣巴州十道志曰巴州}
