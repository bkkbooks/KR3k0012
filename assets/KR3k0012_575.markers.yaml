  - {type: variant, offset: 3054, length: 315, content: 倫或行無跡影或經年不飢昭王處以單綃華幄飲以瑞珉之膏飴以丹泉之粟王登崇霞之臺乃召二人在側時香風欻起二人徘徊翔轉殆不自支王以纓綏屬拂之二人皆舞容冶妖麗靡若鸞翔而歌聲輕下乃使伶人代唱其曲清響流韻雖遶梁動木未足加焉其舞曲一名縈塵言體輕與塵霧相亂也次曰集羽言婉轉若羽毛之從風也末曲游懷言支體緬曼若入懷袖也晏子春秋曰晉與攻齊使范昭往觀景公觴之范昭請公之棄酌公曰諾告侍者酌樽進之晏子曰撤樽更之范昭起舞太師曰我不習昭曰調成周之樂吾為之舞太師曰暝臣不習范昭趍而出公問晏子晏子曰昭非不知禮也欲慚吾君臣公問太師太師曰成周之樂天子樂范昭人臣而舞之臣故不為昭歸報晉平公曰齊未可伐也吾欲慚其君欲犯其禮而太師識之呂氏春秋曰陶唐氏陽多滯伏民氣壅閼故為舞以宣導之樂, krp: 節度則萬物亡異}
