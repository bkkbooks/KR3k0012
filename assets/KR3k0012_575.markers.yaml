  - {type: variant, offset: 2649, length: 0, content: '', SBCK: 去之聲遂清越十六國春秋曰石勒耕輙聞鍾鐸之音或在前後懼以問翼伽伽曰作勞耳鳴無不祥也勒至平原常在平人師驩家爲奴有老父謂勒曰君魚龍髮際際四道巳成當貴爲人主甲戍之歳王彭祖可圗勒曰􅀂如公言不敢忘德忽然不見每耕又聞皷角之聲勒又告諸奴又聞之因曰吾􅀄在家􅁪聞如是諸奴白驩驩竒而免之至是衆歸焉莊子曰梓慶削木爲鐻見者驚猶􅀑神魯侯問其術對曰臣將爲鐻未甞敢以耗氣齊七日忘吾四支然後入山林觀天性區別見成鐻然後加手鐻似夾鍾也管子曰黄帝作五聲以正五鍾一曰青鍾大音二曰赤鍾心三曰黄鍾洫光四日景鍾昧其明五曰黒鍾隠其帝五聲旣調然後作五}
