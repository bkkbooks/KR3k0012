  - {type: variant, offset: 3028, length: 2, content: 二人, SBCK: 賞功敗者罰故樂用鍾宋均注曰不過能謂量能授爵也有罪鳴鍾以攻之也白虎通日鍾之爲言動也隂氣用事萬物動成鍾爲氣用金聲也鏄者時之聲也節度之所生也有節度則萬物昌無節度則萬物亡異􅁐曰魏時殿前鍾忽鳴張華曰蜀銅山崩􅀃􅁐曰鼓法天鍾法地􅁗始皇建千石之鍾立萬石之簴􅀓玄歌辭曰雷師鳴鍾鼓風伯吹笙簧西母出穴聽王父吟東廂三禮圖曰凢鍾十六枚同爲}
