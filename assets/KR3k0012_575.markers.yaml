  - {type: variant, offset: 2662, length: 173, content: 四佾佾列也每佾八人每服冕而執戚有俯仰張翕之容行綴長短佾八人之制所以受命而歌王者之功也人之動而有節者莫若舞肆所以因陽氣而達物也續搜神記曰滎陽人姓何忘其名有名聞士也荊州辟為別駕不就隱遁養志嘗至田舍收穫在塲上忽有一人長一丈黃踈單衣角巾來詣之翩翻舉其兩手並舞而來語何云君嘗見韶舞不此是韶舞且舞且去尋逐徑向山山有穴裁容人即入穴何亦隨之見有良田數十頃何遂墾作, WYG: 曉音律宋孝武問永}
