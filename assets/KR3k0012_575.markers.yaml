  - {type: variant, offset: 3013, length: 2, content: 燕昭, SBCK: 帝顓頊居位文德者則錫以鍾磬武德者錫以干戈戴延之西征記曰鍾大者三十二􅀶山頭形瓌紐作師子頭鍾大者三十二􅀶山頭二丈厚八尺大面廣一丈二尺小面七尺或作蛟龍或作鳥獸周繞其外唐􅄂制曰凢私家不設鍾磬三品巳上女樂五人五品巳上不過三人也虞喜志林曰吴時於江水中得鍾有百餘字募求讀者並無人曉樂什圖徴曰君子鑠金爲鍾四時九乳是以撞鐘以知君鍾調則君道得宋均注曰九乳法九州又曰聖}
