  - {type: variant, offset: 4109, length: 0, content: '', SBCK: 陜州黄河有銅鍾在水水大小􅁪自浮岀每晦朔隂雨之日輙鳴聲響悲亮行客聞之莫不愴然又曰晉中朝有人懸銅爲盤晨夕􅁪鳴如人扣打以白張華華曰此盤與洛鐘宫啇相諧故聲相應可錯令輕則韻乖自止}
