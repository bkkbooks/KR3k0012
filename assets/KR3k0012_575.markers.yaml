  - {type: variant, offset: 2645, length: 2, content: 節八, SBCK: 懸之魏志曰􅀄漢鑄鍾銅工柴玉巧意多所造作杜夔令工鑄鍾其聲清濁多不法故毀改作王甚厭之白太祖太祖取所鑄鍾􅄂錯更試然後知䕫爲精而玉之妄也晉書裴頠令荀藩終父勗之志鑄鍾鑿磬以俻郊廟宋書曰漢中城固縣漢水崖際有聲如雷俄頃崖崩有銅鍾十二趙書曰將軍張珎領郡縣民丁萬人徙洛陽六鍾猛簴九龍翁仲銅駞飛廉鍾一没盟津中蕭子顯齊書曰張瓌字祖逸吴郡吴人父永右光禄大夫曉}
  - {type: page-break, offset: 2645, content: '', id: KR3k0012_SBCK_575-3a}
  - {type: variant, offset: 2645, length: 3, content: 節八音, WYG: 擊處也舞縣謂之旋旋蠱謂之幹旋屬鐘柄所以懸之魏志曰初漢銅鐘王柴巧意多所造作杜䕫令工鑄鐘其聲濁清不多故毁改作王甚厭之白太祖太祖所取鑄鐘雜錯更試然後知䕫為精}
  - {type: variant, offset: 2645, length: 2, content: 節八, krp: 懸之魏志曰𥘉漢鑄鍾銅工柴玉巧意多所造作杜夔令工鑄鍾其聲清濁多不法故毀改作王甚厭之白太祖太祖取所鑄鍾雜錯更試然後知䕫爲精而玉之妄也晉書裴頠令荀藩終父勗之志鑄鍾鑿磬以俻郊廟宋書曰漢中城固縣漢水崖際有聲如雷俄頃崖崩有銅鍾十二趙書曰將軍張珎領郡縣民丁萬人徙洛陽六鍾猛簴九龍翁仲銅駞飛廉鍾一没盟津中蕭子顯齊書曰張瓌字祖逸吴郡吴人父永右光禄大夫曉}
