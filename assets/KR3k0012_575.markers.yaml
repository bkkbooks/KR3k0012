  - {type: variant, offset: 2998, length: 0, content: '', WYG: 叔孫相魯有子曰孟丙竪牛妬之叔孫為丙鑄鐘鐘成丙不敢擊使竪牛請之叔孫竪牛不為之請又欺之曰吾已為爾請之矣使爾擊之叔孫聞之曰丙不請而擅擊鐘遂怒之丙出奔齊尸子曰鐘鼓之聲怒而擊之則武憂而擊之則悲喜而擊之則樂其意變其聲亦變意誠感之逹於金石而况於人乎晏子曰景公為大鐘将懸之仲伯常騫晏子三人俱朝曰鐘将毁之鐘果毁公見三子問之晏子對曰鐘大不以禮故曰将毁仲伯曰鐘大懸下氣上薄故曰将毁常騫曰今日庚申雷日也隂莫勝於雷故曰将毁韓子曰智伯将伐仇由而道難不通鑄大鐘遺之方車二軌仇由大悦除塗将内之赤章曼之諫曰此小所以事大也今以大事小兵必隨之仇由不聴曼之因斷轂而馳至齊十月仇由亡淮南子曰闔閭伐楚破九龍之鐘許慎注曰刻簴為九龍懸鐘也賈子云毁十龍之鐘又曰齊景公族鑄大鐘撞之於庭下郊雉皆雊許慎注曰族聚也鐘聲如雷震雉皆應之又曰孟秋之日西舒御好白色白采撞白鐘鼓處西宫又曰鐘之與磬也近之則鐘音亮遠之則磬音彰磬石也音清明遠而彰著物固有近不若遠遠則不若近者矣山海經云豐山有九鐘霜降則鳴又曰炎帝之孫伯峻生鼓延是為鐘吕氏春秋曰黄帝又命伶倫鑄十二鐘和五音始奏之曰咸池東方朔傳曰漢武帝未央宫殿前鐘無故自鳴三日三夜不止大怪之召待詔王朔問之朔對曰有兵器上更問東方朔朔對曰王知其一不知其二臣昔聞銅土之子以隂陽氣類言之子母相感山恐有崩弛者故鐘先鳴易曰鶴鳴在隂其子和之上曰應在幾日朔曰五日内居三日南郡太守言有山崩延袤二十餘里上大笑賜帛三十疋郭縁生述征記曰洛陽太極殿前大鐘六枚父老云曽有欲移此鐘者聚百數}
