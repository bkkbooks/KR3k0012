  - {type: variant, offset: 436, length: 361, content: 而四伐盛威於中國也夾振之者王將夾舞者振木鐸以為節也武舞戰也象四伐者伐四方也每奏四伐一擊一剌為一伐也周禮曰地官舞師掌教兵舞帥而舞山川之祭祀教忮舞忮者拂帥而舞社稷之祭祀教皇舞帥而舞旱暵之事四方祭祀謂四望也旱暵之事謂雩也暵炎熱氣也春官樂師掌教國子小舞謂以幼少時教之舞內則曰十三舞籥成童舞象大夏也凡舞有忮舞有皇舞有旄舞有干舞有人舞鄭眾云忮舞者金羽舞者折羽也皇舞者以羽帽覆頭上衣飾翡翠之羽旄舞者旄牛之尾干舞者兵舞也人舞也社稷以宗廟以羽四方以皇辟雍以旄兵事以干星辰以人舞子持之是也皇雜五綵雜羽如鳳皇色持以舞也人舞所執以手袖為威儀也凡四方之舞仕者屬焉凡祭祀賓客舞其燕樂籥師掌教國子舞羽吹籥文舞有持羽吹籥舞者所謂籥舞文王世子曰冬學羽籥詩曰左乎執籥右手秉翟也祭祀則鼓羽籥之舞鼓之者恒恒為之節賓饗則亦如之又曰地官旄人掌教舞散樂舞夷樂散樂野人為, SBCK: 職夫音}
