  - {type: variant, offset: 4110, length: 0, content: '', SBCK: 今樂録曰髙廟中四鍾皆奏時廟鍾也重十二萬斤明帝徙二鍾在南宫張衡東京賦曰發鯨魚鏗華鍾薛綜注曰天子出則鳴滿牢海中大魚名鯨海島中又有大獸名蒲牢畏鯨魚鯨魚一擊蒲牢輙大嗚呼凢鍾欲令大鳴故作蒲牢於上所以擊之}
