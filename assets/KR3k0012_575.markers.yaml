  - {type: variant, offset: 2642, length: 0, content: '', SBCK: 器以鍾之鍾聚也以噐聚音輿以行之小者不窕大者不槬窕則不感不充滿􅀲人心也挎則不容心不堪容也心是以感感實生疾今鍾摦矣王心不堪其能乆乎又曰宋左師每食擊鍾又曰鄭伯始朝于楚楚子賜之金旣而悔與之盟曰無以鑄兵故以鑄三鍾爾雅大鍾曰鏞其中謂之剽音瓢其小者謂之棧音醆郭璞醆曰鏞一曰鏄國語曰晉克潞之役魏顆以身却退􅁗于輔氏親止杜囬其勲銘之景鍾又曰周景王二十三年鑄無射而爲之大林鍾成伶人告和王謂冷州鳩曰鍾果和矣對曰上作噐民樂之則爲和今民莫不怨恨諺曰衆心成城衆口鑠金臣不知其和賈逵曰大林無射副也漢書曰髙祖廟有十鍾受千石撞之聲聞百里後漢書鄭司農曰于鍾脣之上祛也皷所擊處也}
