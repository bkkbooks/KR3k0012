  - {type: variant, offset: 4075, length: 0, content: '', SBCK: 故先作之而東廂應者東爲陽陽主動明以静主動使之相應也駕出撞黄鍾右五鍾皆應黄鍾位居子子爲陽陽主動象王自内動而出方行之始故先作之而西廂應者西爲隂隂主静明以動告静使之相和也廣古今}
