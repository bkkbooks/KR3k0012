  - {type: variant, offset: 2642, length: 1, content: 舞, WYG: 器以鐘之鐘聚也以器聚音輿以行之小者不窕大者不槬窕則不咸不充滿人心也槬則不容心不堪容心是以感感實生疾今鐘槬矣王心不堪其能久乎又曰宋左師每飯擊鐘又曰鄭伯始朝于楚楚子賜之金既而悔與之盟曰無以鑄兵故以鑄三鐘爾雅大鐘曰鏞其中謂之剽音瓢其小者謂之棧音醆郭璞曰鏞一曰鏄國語曰晉克潞之後秦杜回敗晉攻魏顆以身却退秦於輔氏親止杜回其勲銘之景鐘又曰周景王二十三年鑄無射而為之大林鐘成伶人告和王謂伶州鳩曰鐘果和矣對曰上作器民樂之則為和今民莫不怨恨諺曰衆心成城衆口鑠金臣不知其和賈逵曰大林無射副也漢書曰髙祖廟有十鐘受千石撞之聲聞百里後漢書鄭司農曰于鐘脣之上祛也鼓}
