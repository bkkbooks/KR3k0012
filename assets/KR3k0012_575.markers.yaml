  - {type: variant, offset: 2999, length: 7, content: 袖善舞多財善賈, SBCK: 絙挽之鍾聲震地咸懼不敢復犯陸翽鄴中記大面廣外一丈二尺小面廣七尺或作蛟龍或作鳥獸繞其上何法盛晉中興書曰義熈十一年霍山崩毁出銅鍾六枚上有文古科斗書人莫能識晉潘岳開中記曰漢昭帝平陵宣帝杜陵二陵鍾在長安夏侯征西欲徙詣洛陽重不能致懸在清明門門裏道南其西者平陵鍾東者杜陵鍾也}
