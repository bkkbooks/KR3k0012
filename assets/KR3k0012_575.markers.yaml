  - {type: variant, offset: 135, length: 4, content: 治民勞者, SBCK: 知悼子卒未葬平公飲酒師曠李調侍鼓鍾杜蕢自外來聞鍾聲曰安在曰在寢杜蕢入寢歴階而􅂛酌曰曠飲斯又酌曰調飲斯又酌堂上北面坐飲之又樂記曰鍾聲鏗鏗以立号号以立横横以立武君聽鍾聲則思武臣周禮冬官鳬氏曰鳬氏爲鍾鏄薄厚之所震動清濁之所由出侈弇之所由興有􅀃􅀃由意鍾已厚則石大厚則声不發巳薄則播大薄則声散侈則柞柞讀爲棹咋咋然之咋爲声大外也弇則鬰声不舒揚長甬則震鍾棹則声不正鍾小而短則聲疾而短聞淺則􅆖􅆖昜竭也鍾小而長則}
  - {type: page-break, offset: 135, content: '', id: KR3k0012_SBCK_575-1b}
  - {type: variant, offset: 135, length: 4, content: 治民勞者, WYG: 知悼子卒未𦵏平公飲酒師曠李調侍鼓鐘杜蕢自外來聞鐘聲曰安在曰在寢杜蕢入寢厯階而升酌曰曠飲斯又酌曰調飲斯又酌堂上北面坐飲之又樂記曰鐘聲鏗鏗以立號號以立横横以立武君子聴鐘聲則思武臣周禮冬官鳬氏曰鳬氏為鐘薄厚之所震動清濁之所由出侈弇之所由興有説鐘已厚則石太厚則聲不發已薄則播太薄則聲散侈則柞柞讀為咋咋然之咋聲太外也弇則鬱聲不舒揚長甬則震鐘掉則聲不正鐘大而短則}
