  - {type: 'tls:seg', offset: 139, content: '', id: KR3k0012_CHANT_575-3a.9}
  - {type: variant, offset: 140, length: 8, content: 舞行綴遠治民逸者, SBCK: 聲舒而逺聞深則安安則息又曰鳬氏爲鍾兩欒謂之銑又曰磬師掌教擊編鍾又春官曰鍾師掌教金奏擊金以爲奏節金謂鍾鏄也左傳襄二曰莒人伐我東鄙圍台季武子救台遂入鄆取}
  - {type: variant, offset: 140, length: 3, content: 舞行綴, WYG: 聲疾而短聞淺則躁躁易竭也鐘小而長則其聲舒而}
