  - {type: variant, offset: 4298, length: 285, content: 一日上御洛城南樓賜宴太常奏六合還淳之舞又曰上元三年十一月三日勑新造上元之舞先令太祠享皆將陳設自今已後圓丘方澤太廟祠享然後用此舞餘祭並停又曰大定元年天后幸京師同州剌史蘇瓌進聖主還京樂舞上御行宮樓觀之賜以束帛令編於樂府沈志曰江左初有拂舞舊云拂舞吳舞檢其歌非吳辭也皆陳於殿庭賜泓拂舞序曰自江南見曰符舞或言自亮鳩沈曰有此來數十年察其辭旨乃是吳人患孫皓虐政也又曰公莫舞今布舞也相傳辱項莊舞劍項伯以袖隔之古人相呼曰公伯語莊云公莫害漢王今之用巾蓋像項伯衣袖之遺也曹植鞞舞歌序曰漢靈帝西園鼓吹有李堅者鞞舞遭亂西隨段煨先帝聞其舊伎召之堅既中廢兼古曲多謬誤異代之文未必相襲故依前曲改作新歌亦, SBCK: ''}
