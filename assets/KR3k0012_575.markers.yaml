  - {type: variant, offset: 2998, length: 0, content: '', SBCK: 叔孫相魯有子曰孟丙竪牛妬之叔孫爲丙鑄鍾鍾成丙不敢擊使竪牛請之叔孫竪牛不爲之請又欺之曰吾巳爲尓請之矣使尓擊之叔孫聞之曰丙不請而擅擊鍾遂怒之丙出奔齊尸子曰鍾皷之聲怒而擊之則武憂而擊之則悲喜而擊之則樂其意變其聲亦變意誠感之逹於金石而况人乎晏子曰景公爲大鍾將懸之仲尼伯常騫晏子三人俱朝曰鍾將毀之撞之果毀公見三子問之晏子對曰鍾大不以禮故曰將毀仲尼曰鍾大懸下氣上薄故曰將毀伯常騫曰今日庚申雷日也隂莫勝於雷故曰將毁韓子曰智伯欲伐仇由而道難不通鑄大鍾遺之方車二軌仇由大恱除塗將内之赤草曼支諌曰此小所以事大也今以大事小兵必隨之仇由君不聽曼支因斷轂而馳至齊十月仇由亡淮南子曰闔閭伐楚破九龍之鍾許愼注曰刻簴爲九龍懸鍾也賈于云毀十龍之鍾又曰齊景公族鑄大鍾撞之於庭下郊雉皆雊許愼注曰族聚也鍾聲如雷震雉皆應之又曰孟秋之日西舘御好白色白綵撞白鍾故處西宫又曰鍾之與磬也近之則鍾音亮逺之則磬音彰磬石也音清明逺聞而彰著物固有近不􅀂逺逺不􅀂近者山海經云豊山者有鍾霜降則鳴又曰炎帝之孫伯崚伯崚生鼔延是爲鍾吕氏春秋曰黄帝又命伶倫鑄十二鍾和五音始奏之曰咸池東方朔傳曰漢武帝未央宫殿前鍾無故自鳴三日三夜不止大恠之召待詔王朔問之朔對曰有兵氣上更問東方朔朔對曰王知其一不知其二臣昔聞銅􅁟之子以隂陽氣􅀋言之子母相感山恐有崩㢮者故鍾先鳴昜曰鳴鶴在隂其子和之上曰應在㡬日朔曰在五日内居三日南郡太守言有山崩延袤二十餘里上大􅀏賜帛三十疋郭縁生􅄒征記曰洛陽太極殿前大鍾六枚父老云曽有欲移此鍾者聚百數}
