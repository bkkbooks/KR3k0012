  - {type: variant, offset: 809, length: 1826, content: 左傳隱公曰舞所以節八音而行八風也又莊公曰王子頹樂及徧舞又昭三曰晉侯與諸侯宴于溫使大夫舞曰歌詩必類高厚之詩不類大夫盟高厚高厚逃歸又隱公曰考仲子之宮將萬焉公問羽舞數於眾仲對曰天子用八諸侯用六大夫四士二夫舞所以節八音而行八風也故自八已下公從之又莊公曰楚令尹子元欲蠱文夫人為館於宮側而振萬焉夫人聞泣曰先君以是舞也習戎備也今令尹不尋諸仇讎而於未亡人之側不亦異乎論語八佾曰季氏八佾舞於庭是可忍也孰不可忍也家語曰子路戎服見孔子拔劍而舞曰古之君子固以劍自衛乎孔子曰古之君子忠以為質仁以為衛史記曰沛公見羽鴻門項莊入曰軍中無以為樂請以劍舞拔劍起舞項伯亦起舞以身蔽沛公又曰長沙定王發以其母微無寵故王卑濕貧國景帝後三年諸王來日有詔更前稱壽歌舞定王但張袖小舉手左右笑其拙上怪問之對曰臣國小地狹不足廻旋帝以武陵桂陽屬焉又曰師經撫琴魏文侯躭之起舞經怒以琴撞文侯文侯大怒經曰臣撞桀紂之主不撞堯舜之君文侯悅掛琴於室為戒又日孝景皇帝元年制詔御史蓋聞歌者所以發德舞者所以明德高廟始奏文始五行之舞漢書曰李陵在匈奴置酒與蘇武別曰異域之人一別長絕陵起舞屬之又曰高祖廟奏武德文始五行之舜武德者象天下樂已行武以除亂也文始舞者本舜韶舞也高祖更名曰文始示不相襲也又曰孝武李夫人本以倡進兄延年知音善歌舞延年侍上起舞曰北方有佳人絕世而獨立一顧傾人城再顧傾人國寧不知傾城傾國佳人難再得上歎息曰世豈有此人乎平陽公主因言延年女弟上召見實妙麗善舞由是幸生昌邑哀王又曰趙飛鷰體輕能掌上舞又曰平恩侯許伯入第丞相已下皆賀酒酣樂作少府檀長卿起舞為沐猴與狗鬥一坐皆笑蓋寬饒劾之長卿為列卿而為沐猴舞失禮許伯為謝乃解後漢書曰光武平隴蜀增廣郊祀高皇帝配食樂奏清陽朱明西皓玄冥雲翹育命舞北郊及祀明堂並奏樂如南郊迎時氣五郊春歌青陽夏歌朱明並舞雲翹之舞秋歌西皓冬歌玄冥並舞育命之舞季夏歌朱明兼舞二舞又曰蔡邕坐上章事徙及歸將就還路五原太守智餞之酒酣智起舞屬邕邕不為報智者中常侍王甫之弟智銜之密告邕怨於囚放謗訕朝廷邕慮卒不免禍乃亡命江海遠跡吳會魏志曰舞師馮肅曉知先代舞名吳書曰陵統怨甘寧殺其父操寧常避統不與相見權亦命統不得讎之嘗於呂蒙舍會酒酣乃以刃舞寧起曰寧能雙戟舞蒙曰寧雖能未若蒙上之也因操刃持楯以身蔽之後權知統意因令寧將兵徙屯中洲又曰陸遜破曹休上與群僚大會酒酣命遜舞解所著白鼯子裘賜之又曰陶謙為舒令郡守張磐謙恥為之屈磐舞屬謙謙不為起強之乃舞舞不轉磐曰不當轉耶曰轉則勝人宋書樂志曰鞞舞未詳所起漢代已於燕亭用之矣故曹植鞞歌漢靈帝時有李堅者善鞞舞遭亂播遷帝聞其舊伎召之堅既中廢兼古曲多謬故知異代之文未必相襲也後魏書曰嵇康生性氣麤武元又憚之康生知之亦懼不安肅宗朝靈太后於西林園文武坐酒酣迭舞次至康生乃為力士舞及於折旋每顧視太后舉手蹈足瞋目傾首為殺縛之勢太后解其意而不敢言唐書馮定為太常少卿文宗每聽樂鄙鄭衛聲詔奉常習開元中霓裳羽衣舞以雲韶樂和之舞曲成定惣樂工閱於庭定立於其間文宗以其端凝若植問其姓氏翰林學士李玨對曰此馮定也文宗喜問曰豈非能為古章句者耶乃召升階文宗自吟定送客西江詩吟罷益喜因賜禁中瑞錦仍令大錄所著古體詩以獻晉中興書曰殷融弘遠為司徒左西屬飲酒善舞終日嘯詠未嘗以事務為懷齊書永明中舞人冠幘並簪筆武帝曰筆笏蓋以記事受言舞不受言何事簪筆豈有服朝衣而足綦讌屨於是去筆江表傳曰孫權請顧雍父子及孫譚時為選曹尚書見任貴重是日孫權極忻譚醉酒三起舞舞又不知止雍內怒之明日召譚訶責之君王以含垢為德臣下以恭謹為節何有舞不復知止雖為酒後亦為恃恩謙虛不足損吾家者必汝也何承天三代樂序云正德大悅舞蓋出於三容樂然則其聲節有古之遺音也魏名臣奏王朗表曰凡音樂以舞為主自黃帝雲門至周大武皆太廟舞樂所以樂君之德舞所以象君之功淮南子曰今鼓舞者繞身若環曾繞摩以宣地扶於阿郍動容轉面轉更也回竟更為也便娟擬神若秋葯被風葯白正香草也被風言其弱髮若結旌卷而復舒騁馳若驚周穆王傳曰有偃師者縛草作人以五采衣之使舞王與美人觀之草人以手招美人王怒國史補曰于司空因韋太尉奉聖樂亦撰順聖樂以進每宴必使奏之其曲將半行綴皆伏而一人舞於中央幕中韋綬笑曰何用窮兵獨舞雖詼諧必有為也山海經曰形夭與帝爭神帝斷其首葬之常羊之山乃以乳為目以齊為口操于戚以舞又曰帝俊八子始為舞五經通義曰王者之樂有先後者各尚其德也以文得之先文樂持羽毛而舞以武得之先武樂持朱干玉戚所以增威武也戚斧干楯也玉取其仁明當尚德行仁以斷斬也又曰東夷之樂持矛舞助時生也南夷之樂持羽舞助時養也西夷之樂持鉞舞助時殺也北夷之樂持干舞助時藏也蔡邕月令章句曰, SBCK: ''}
