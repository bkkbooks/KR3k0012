  - {type: variant, offset: 3598, length: 463, content: 秋節常命舞於勤政樓下其後明皇既幸蜀舞馬亦散在人間祿山嘗覩其舞而心愛之自是因以數十疋置於范陽其後轉為田承嗣所得而承嗣不知雜於戰馬置之外棧忽一日軍中大享士樂作馬舞不能自止廝養輩謂其為妖擁篲以擊之謂其舞不中節抑揚挫尚存故態廄吏遂以為怪白承嗣承嗣命箠之甚酷馬舞益整而鞭撻愈加終斃於櫪下時人亦有知其舞馬者懼曰暴逆而終不敢言又曰至德中明皇復幸華清宮父老奉迎壺漿塞路時上春秋已高常乘步輦父老進曰前時上皇過此常馳逐從禽今何不為上曰吾老矣豈復堪此父老士女聞之莫不悲泣新豐市有女伶曰謝阿蠻善舞凌波曲常出入宮中楊貴妃遇之甚厚亦遊於國忠及諸姨宅上至華清宮復令召焉舞罷阿蠻因出金粟裝臂環云此貴妃所與上持之悽怨出涕左右莫不嗚咽又曰舞者樂之容也有大垂手小垂手或象驚鴻或如飛鷰婆娑舞態也蔓延舞綴也古之能者不可勝記開元中有公孫大娘善舞劍僧懷素見之草書遂長蓋壯其頓挫勢也又曰開成末有樂人崇胡子能軟舞其腰支不異女郎也古今樂錄曰白紵舞案辭有巾袍之言紵本吳地所出宜是吳舞也晉徘徊歌曰交交白緒節節為雙吳音呼緒為紵疑白緒即白紵也釋智匠古今樂錄曰大壯之舞曰武舞大觀之舞曰文舞, SBCK: 石}
