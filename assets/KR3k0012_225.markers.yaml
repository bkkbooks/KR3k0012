  - {type: variant, offset: 465, length: 320, content: 千萬床帳一具又曰升平五年詔曰前西中郎謝萬才義簡亮宜居獻替其以萬為散騎常侍晉中興書曰庾闡有文章才美議者以為宜綜國史於是召為散騎常侍晉諸公贊曰司馬駿五六歲能書數魏王為帝駿八歲為散騎常侍常侍講齊書曰周盤龍自平北將軍為散騎常侍武帝戲之曰卿著貂蟬何如兜鍪對曰此貂蟬從兜鍪中出耳齊職儀曰魏氏侍中皆騎從御登殿與散騎常侍對挾帝侍中居左常侍居右後魏書曰初高祖以李彪為散騎常侍郭祚因入見高祖謂祚曰朕誤受一人官祿對曰豈容聖詔一行而有差異高祖曰朕昨誤沉吟曰此自應有讓朕欲別授一官須臾彪有啟云伯石辭卿子產所惡臣欲之巳久故不敢讓高祖歎謂祚曰卿之忠諫李彪正辭使朕遲廻不能復決遂不移官又曰明亮為常侍加武勇將軍進曰臣本官常侍是第三清今授武勇其號至濁又曰荀頹承明元年文明太后令, WYG: ''}
