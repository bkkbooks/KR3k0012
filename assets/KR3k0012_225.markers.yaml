  - {type: variant, offset: 122, length: 0, content: '', SBCK: 􅁗官位上卿銀印青綬掌副丞相事漢雜記事曰故事上書爲二封其一曰副領尚書者先發之有不善屏去不奏魏相爲御史大夫奏去副封以防擁蔽漢舊儀曰御史大夫寺在司馬門内門無塾門署用梓板不起郭邑題曰御史大夫寺北齊楊楞伽鄴都故事云御史臺在宫闕西南其門北開取冬殺之義也唐書曰韋挺太宗嘗謂挺曰卿之任御史大夫獨朕意耳左右大臣無爲卿地者卿勉之哉又曰薛謙光拜御史大夫時僧惠範恃太平公主權􅀔逼奪百姓店肆州縣不能理謙光將加彈奏或請寢之謙光曰憲臺理􅁈滯何所廻避朝彈暮黜亦可矣遂與殿中慕容珣奏彈之又曰韋思謙除右肅政大夫遂坐受拜或以爲言謙曰國家班列自有等差柰何以姑息爲事又曰崔隱甫爲大夫一切督責之事無大小悉令諮决稍有忤意列上其罪前後貶黜者過半羣僚側目上常謂曰卿爲大夫深副朕所委又曰肅宗幸靈武李峴應召至行在拜扶風郡太守兼御史大夫旣収京師拜禮部尚書守京兆尹復兼御史大夫時峴兄峘爲户部尚書兼成都尹乾元􅀄􅀇宗還京峘自蜀至又兼御史大夫兄弟俱判臺事自國􅀄以來兄弟並拜大夫未有其比時長安士庶皆賦美之又曰崔縱勸李懷光西至奉天加右庶子充使無幾拜京兆尹兼御史大夫數奏懷光剛愎反覆冝隂備之及幸梁州左右或短之曰縱素善懷光必不來矣上曰他人不知縱吾可保不數日縱至拜御史大夫又曰李元素徴拜御史大夫大夫自貞元中位缺乆難其人至是元素以名望召拜中外聳聽及居位一無修舉但規求作相乆之寖不得志見客必曰無以某官散相踈也見屬官必先拜脂韋在列大失人情又曰李景讓轉御史大夫景讓慷􅁣有大志事母以孝聞}
