  - {type: variant, offset: 432, length: 102, content: 馮紞忠亮在公歷職內外勤恪匪懈而疾未差屢求放退其以紞為散騎常侍賜錢二千萬床帳一具又曰升平五年詔曰前西中郎謝萬才義簡亮宜居獻替其以萬為散騎常侍晉中興書曰庾闡有文章才美議者以為宜綜國史於是召為散騎常侍晉諸公贊曰, SBCK: 令陳群僕射}
