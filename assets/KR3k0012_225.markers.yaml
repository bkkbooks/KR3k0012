  - {type: variant, offset: 164, length: 176, content: 文帝延康元年置散騎常侍為一官省中置四人與侍中同掌規諫不用官者官者為官不過署令魏略曰散騎常侍比於侍中貂璫插石黃初中始置四人出入侍從與上談議不典事蜀志曰魏文帝善孟達之姿才容觀以為散騎常侍吳志曰薛瑩既至洛陽特先見敘為散騎常侍荅問處當皆有條理晉書曰鄭默字思元為散騎常侍武帝出南郊侍中巳陪乘詔曰使鄭常侍參乘又曰阮孚為散騎常侍嘗以金貂換酒復為所司彈劾帝宥之又曰華嶠, SBCK: 鮑勛}
