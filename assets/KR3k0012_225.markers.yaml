  - {type: variant, offset: 786, length: 952, content: 官舉才堪幹事人足委仗者於是公卿咸以頹應選徵拜散騎常侍又曰孝文謂散騎常侍元景曰卿等自在集書合省逋墯致使王言遺滯起居不修北齊書曰宋弁為散騎常侍遷右將軍領黃門弁屢讓高祖曰散騎位在中書之右常侍者黃門之庶兄領軍者二衛之假攝不足空存推讓而棄大委又曰朝貴多假常侍以取貂蟬之飾高隆之自表解侍中并陳請假侍服者亦請罷之詔皆如表三國典略曰齊遣散騎常侍崔瞻聘于陳瞻辭韻溫雅南人欽服力謂之曰常侍前朝何竟不來今日誰相對者又曰賀琛為梁散騎常侍梁主與語常移晷刻故省中語曰上殿不下有賀雅琛容止都雅故人呼之隋書曰案漢官侍內金蟬左貂金取剛固蟬取高潔也董巴志曰內常侍右貂金璫銀附蟬內書今亦同此今官者去貂內史金蟬右貂納言金蟬左貂開皇時特加散騎常待在門下者貂蟬至是罷之唯加常侍聘外國者特給貂蟬還則輸納於內省環濟要略曰散騎常侍入侍左右出則侍事於廊廡之下華嶠集云詔曰散騎以從容侍從承荅顧問掌讚詔命平處文籍故前世多參用文學之士義郎華嶠有論義著述之才其以嶠為散騎常侍兼與中書共參著作事嶠表謝云非臣典筆申辭所能陳謝員外散騎常侍晉書曰吏部郎李重啟東莞太守曹嘉之才翰學義先代之后宜補員外常侍晉起居注曰咸康八年司徒王導表員外常侍孫朝八年告老棄身茨宇永絕榮祿宜給本官秩俸以終餘年梁書曰賀琛字國寶遷員外散騎常侍舊尚書南座無貂貂自琛始也通直散騎常侍陶氏職官要錄曰晉太始十年詔東平玉楙為員外常侍通直殿中與散騎常侍通直通直之號蓋自此始也朱鳳晉書曰左軍陳與騫之子以父老求去職宿衛不宜曠詔以為通直常侍宋書曰通直散騎常侍員四人魏末散騎常侍又有在員外晉武帝使二人與散騎常侍通員直故謂之通直散騎常侍晉江左置四人梁書曰鮑泉嘗乘高幰車從數十左右繖蓋服玩甚精道逢國子祭酒王承承疑非舊貫遣訪之泉從者荅曰鮑通直承怪焉復欲辱之遣逼車問鮑通直復是何許人而得如此都下少年遂為口實見尚豪華人相戲曰鮑通直復是何許人而得如此以之為笑謔北齊書曰張景仁除通直散騎常侍及奏御筆點通直字遂為正常侍也隋書曰許善心加通直散騎常侍聘於隋遇高祖伐陳禮成而不獲反命累表請辭上不許留縶賓館及陳亡高祖遣使告之善心素服號哭於西階之下藉草東向經三日勑書唁焉明日有詔就館拜通直散騎常侍賜衣一襲善心哭盡哀入房改服復出北面立垂涕再拜受詔明日乃朝伏泣於殿下悲不能興上顧左右曰我平陳國唯復此人既能懷其舊君即是我誠臣也勑以本官直門下省賜物千叚馬, WYG: ''}
