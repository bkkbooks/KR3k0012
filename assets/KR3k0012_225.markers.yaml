  - {type: variant, offset: 129, length: 2, content: 應劭, SBCK: 漢武帝集曰武帝作栢梁臺詔群臣二千石有能爲七言詩者乃得上坐御史大夫曰刀筆之吏臣執之唐中宗授楊再思檢校左臺大夫制曰避車要秩非徳靡升專席雄班惟賢是屬侍中楊再思衣冠舊齒廊廟宏材寨暑不易其心始終弗􅃜其度在明時而有立居暗室以無欺投水陳謨邁漢朝之三傑霑砂作相掩虞日之五臣森乎抱松栢之心􅏮􅀂􅀒冰霜之氣佇因獻替兼肅權豪冝分務於鸞扄俾効能於烏署又􅂫授右臺大夫制曰烏臺峻秩望惣䥫冠蒼珮崇班威髙石室誠副相之榮級實次卿之通任前歧州􅂫詞吞楚澤量湛黄陂旣光大厦之材堪入巨川之用西京展􅂹道掩題輿右輔慿熊風超露冕朱幡霧撤􅀄停州縣之勞白簡霜凝冝屏權豪之氣御史中丞上韋昭辨釋名曰御史中丞居中丞相者也辨云此中丞自御史大夫下丞有二其一别居殿中舉不法故曰中丞周禮曰周官小宰之職常建􅀖之宫刑以理王宫政令凢宫之糺禁注曰􅀂漢之御史中丞史記曰臧宣爲御史及中丞者幾三十年以微文深詆殺者甚衆稱爲敢决漢書曰陳咸字子康沛郡人爲中丞㹅領州郡奏事課第諸刺史執法殿中公卿已下皆敬憚之又曰鮑宣字貢君爲中丞執法殿中外㹅部刺史郡國二千石所貶退稱進白黒分明由是知名又曰中丞有石室以藏秘書圖䜟之屬以其居殿中故曰中丞又曰張湯爲御史大夫丞上請造白金與五銖錢籠天下塩鐵排冨啇大賈東觀漢記曰樊准字㓜陵爲御史中丞舉正非法百僚震悚又曰宣秉建武元年拜御史中丞上特詔御史中丞與司􅀠校尉尚書令㑹同並專席而坐故京師號曰三獨坐後魏書曰髙恭之字道穆爲御史中丞帝姉壽陽公主行犯清路執赤棒卒呵之不止道穆令卒棒破其車公主深以爲恨泣以訴帝帝謂主曰髙中尉清直之人彼所行者公事豈可以私恨責之􅁘道穆後見帝帝曰一日家姉行路相犯極以爲愧道穆免謝曰臣蒙陛下恩奉陛下法不敢獨於公主􅃜朝廷典章謝承後漢書曰陳謙字伯讓拜御史中丞執憲奉法多所糺正爲百僚所敬尚書選舉序位旌賢常諮問謙自陳蕃雖尊爲宰相論議褒貶每往質疑皆服其清識髙亮續漢書曰馬嚴字威卿拜御史中丞賜冠幘衣服車馬嚴舉劾案章申明舊典奉法按舉無所廻避百竂憚之}
