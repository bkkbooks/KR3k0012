  - {type: variant, offset: 129, length: 2, content: 應劭, WYG: 漢武帝集曰武帝作栢樑臺詔群臣二千石有能爲七言詩者乃得上坐御史大夫曰刀筆之吏臣執之唐中宗授楊再思檢校左臺大夫制曰避車要秩非德靡升專席雄班惟賢是屬侍中楊再思衣冠舊齒廊廟宏材寒暑不易其心始終弗虧其度在明時而有立居暗室以無欺投水陳謨邁漢朝之三傑霑沙作相掩虞日之五臣森乎抱松柏之心凛若負氷霜之氣佇因獻替兼肅權豪宜分務於鸞扃俾効能於烏署又蘇􅀈授右臺大夫制曰烏臺峻秩望總鐡冠蒼珮崇班威高石室誠副相之榮級實次卿之通任前岐州蘇􅀈詞吞楚澤量湛黄陂旣光大厦之才堪入巨川之用西京展􅂹道掩題輿右輔馮熊風超露冕朱帷露撤初停州縣之勞白簡霜凝宜屏權豪之氣御史中丞上韋昭辨釋名曰御史中丞居中丞相者也辨云此中丞自御史大夫下丞有二其一别居殿中舉不法故曰中丞周禮曰天官小宰之職掌建邦之宫刑以理王宫政令凡宫之糺禁注曰若漢之御史中丞史記曰减宣爲御史及中丞者幾三十年以微文深詆殺者甚衆稱爲敢决漢書曰陳咸字子康沛郡人爲中丞總領州郡奏事課第諸刺史執法殿中公卿以下皆敬憚之又曰鮑宣字貢君爲中丞執法殿中外總部刺史郡國二千石所貶退稱進白黑分明由是知名又曰中丞有石室以藏秘書圖䜟之屬以其居殿中故曰中丞又曰張湯爲御史大夫丞上請造白金五銖錢籠天下鹽鐡排富商大賈東觀漢記曰樊准字幼陵爲御史中丞舉正非法百寮震悚又曰宣秉建武元年拜御史中丞上特詔御史中丞與司𨽻校尉尚書令㑹同並專席而坐故京師號曰三獨坐後魏書曰高恭之字道穆爲御史中丞帝姊壽陽公主行犯清路執赤棒卒呵之不止道穆令卒棒破其車公主深以爲恨泣以訴帝帝謂主曰高中尉清正之人彼所行者公事豈可以私恨責之耶道穆後見帝帝曰一日家姊行路相犯極以爲愧道穆免冠謝曰臣蒙陛下恩奉陛下法不敢獨於公主虧朝廷典章謝承後漢書曰陳謙字伯讓拜御史中丞執憲奉法多所糺正爲百寮所敬尚書選舉序位旌賢常諮問謙自陳蕃雖尊爲宰相論議褒貶毎往質疑皆服其清識高亮續漢書曰馬嚴字威卿拜御史中丞賜冠幘衣服車馬嚴舉劾案章申明舊典奉法按舉無所逥避百僚憚之}
