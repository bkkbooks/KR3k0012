  - {type: variant, offset: 1740, length: 401, content: 疋散騎侍郎魏志曰文帝延康元年置散騎常侍侍郎各四人又曰鍾敏字雅叔年十四為散騎侍郎機捷談笑有父之風魏略曰孟康字公休安平人黃初中以於郭后有外屬并受九親賜拜遂轉為散騎常侍是時散騎皆以高才英儒充其選而康獨緣妃嬙雜在其間故于時皆共輕之號為阿九康既才敏因在冗官愽讀書傳後遂有所彈駮其文義雅而切要眾人乃更加意晉陽秋曰荀凱字景倩帝見而奇之曰荀令君子也擢拜散騎侍郎干寶晉紀曰處士馮恢志行過人以為散騎侍郎張華曰臣請觀之若不見臣上也見而有慠世之容次也敬而為賓主者固俗士也及華至恢待之恭於是時人少之唐書曰高祖初平長安拜舞人安叱奴為散騎侍郎既在朝列咸陪遊宴禮部尚書李綱諫曰臣案周禮均工樂胥不得預於士伍雖復才如子野妙等師襄皆終身繼世不易其業故魏武帝欲使禰衡擊鼓先解朝服露體而擊之問其故對曰不敢以先王法服而為伶人之衣也唯齊末高緯封曹妙達為王安馬駒為開府有國家者以為殷監今新定天下開太平之基起義功臣行賞未遍高才碩學猶滯草萊而先令舞胡致位, WYG: ''}
