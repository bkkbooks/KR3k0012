  - {type: variant, offset: 13, length: 12, content: 唐貞觀初置散騎常侍二員隸, WYG: 御史大夫之職掌邦國刑憲典章以肅正朝列中丞爲之貳凡天下之人有稱寃而無吿者與三司詰之三司即御史大夫中書}
