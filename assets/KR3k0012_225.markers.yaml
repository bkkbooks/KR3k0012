  - {type: variant, offset: 126, length: 1, content: 數, SBCK: 陳倉昌符嘉之謂緯曰路無頓逓褁粮辦耶乃送錢五十緡令􅀐士援緯逹散関緯知朱玫必蓄異志奏曰関城小邑不足以駐六師請速幸梁州翌日車駕離陳倉􅂊入関而邠歧之兵圍寳雞攻散関微緯之言幾危矣五代史後唐史曰天成元年夏六月以李琪爲御史大夫自後不復除通典曰漢御史大夫副丞相事􅀂今之同平章及叅知機務之􅀋所以漢書云薛貢韋匡迭爲宰相薛宣韋賢匡衡則是丞相而貢禹但爲御史大夫又曰武后時改御史臺爲蕭政臺凢置左右肅政二臺别置大夫中丞各一人侍御史殿中監察各二}
