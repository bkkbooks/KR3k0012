  - {type: variant, offset: 27, length: 3, content: 省明慶, SBCK: 也凢中外百寮之事應彈劾者御史言於大夫大事則方幅奏彈之小事但署名而已漢書公卿表曰御史大夫秦官也應劭曰侍御之率故稱大夫史記曰趙堯者少爲符璽御史趙人方興公謂御史大夫周昌曰君之吏趙堯年雖少竒士也君必異之且代君位昌􅀏曰堯刀筆吏何能至是乎居頃之堯侍髙祖獨不樂悲歌羣臣不知所以然堯進問陛下所悲者非爲趙王年少而戚夫人與吕后有􅂩萬歳之後而趙王不能自全乎髙祖曰然吾私憂之不知所出堯曰陛下獨冝爲趙王置強相及吕后太子群臣所素敬憚者乃可髙祖曰然誰可堯曰御史大夫周昌其人賢忍質直且吕后太子及大臣皆敬憚之獨昌可髙祖乃召問昌謂之曰吾欲固煩公公強爲我相趙昌泣曰臣􅀄起從陛下獨柰何中道而弃之於諸侯髙祖曰吾極知其左遷君私憂趙念非公母可者於是徙昌爲趙王相旣行髙祖持御史大夫印弄之曰誰可以爲御史大夫者孰視趙堯曰母以易堯遂拜堯御史大夫漢書曰元帝時琅瑘貢禹爲御史大夫而華隂守承嘉上封事言治道在於得賢御史之官宰相之副九卿之右不可不選平陵朱雲兼資文武中正有智略可使以六百石秩試守御史大夫盡其能又曰朱􅀶爲御史大夫府史舎百餘區井泉俱竭又其府中列栢樹常有野烏數千棲其上晨去暮來號曰朝夕烏後去不來者數月長老異之果廢焉又曰汲黯謂上曰公孫􅀪位在三公奉禄甚多然爲布􅀍此詐也上問􅀪􅀪謝曰有之夫三公爲布􅀍誠飾詐以釣名今臣􅀪位爲御史大夫九卿以下無差誠如黯言又曰公孫􅀪爲御史大夫時又東置滄海北置朔方之郡􅀪諌以爲罷弊中國以奉無用之地願罷滄海專奉朔方上許之又曰張湯爲御史大夫舞文巧詆以輔法又曰張歐爲御史大夫上具獄事可却之不可者不得巳而爲之涕泣對之其愛人若此年老請免天子亦寵以上大夫禄歸老于家又曰杜周爲御史大夫後周子延年又爲御史大夫以居父官府不敢當舊位坐卧皆易其處又曰倪寛爲御史大夫以稱意任職故乆無所匡諌官屬易之又曰張湯爲御史大夫每朝奏事語國用日旰天子忘食丞相充位而巳又曰晁錯遷御史大夫請諸侯之罪過則削其地奏上上令公卿列侯宗室集議莫敢難錯獨竇嬰争之由此與嬰有􅂩又曰哀帝建平}
