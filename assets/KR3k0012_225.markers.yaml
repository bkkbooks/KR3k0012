  - {type: variant, offset: 2142, length: 455, content: 品鳴玉曳組趍馳廊廟故非創規模貽子孫之道也高祖不納桓氏家傳曰延康元年初置散騎之官皆選親舊文武之才以為賓宴之臣遷桓範為散騎侍郎陶氏職官要錄曰案漢初有騎郎常侍有資者得為騎郎資滿五萬為常侍郎張釋之以資為常侍郎蓋此官也華嶠譜敘曰華歆有三子表字偉咎年二十餘為散騎侍郎時同寮諸郎共平尚書事少並厲鋒氣要名譽尚書事至或有不便故遺漏不視及傳書者去即深文論駮唯表不然事有不便輒與尚書共論盡其意主者固執不得巳然後共奏司空陳恭等以此稱之員外散騎侍郎晉起居注曰大興四年詔曰今以前司空從事中郎盧諶為散騎侍郎在員外晉中興書曰符堅青州刺史符朗降烈宗詔曰郎深識逆順望風歸化既嘉此誠亦簡其才可員外散騎侍郎并賜給之宋書曰員外散騎侍郎置無員後魏書曰梁三益字敬安於南陽內附高祖與語善之曰三益三益殊不亞拜員外散騎侍郎通直散騎侍郎晉大興元年起居注曰置通直散騎侍郎四人沈約宋書曰晉元帝使員外散騎侍郎二人與散騎通直故謂之通直散騎侍郎後魏書曰李瑾字道瑜美容皃頗有文才遷通直散騎侍郎與黃門王遵業尚書郎盧觀典脩儀注臨淮王式謂瑾等三儁共掌帝儀可謂舅甥之國王盧即瑾之外兄也, WYG: ''}
