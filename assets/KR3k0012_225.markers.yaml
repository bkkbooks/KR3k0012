  - {type: variant, offset: 123, length: 1, content: 員, SBCK: 色立朝言無避忌時宣宗皇舅鄭光卒詔贈司徒罷朝三日景讓曰國舅雖親朝典有素無容過越乃上言曰鄭光是陛下親舅外族之愛誠軫聖心况皇太后哀切之時理合加等而賜之粟帛降之弔問自家刑國允謂合冝今以輟朝之數比於親王公主即前例所無縱有亦不可施用何者先王制禮所貴防微大凢人情於外族則深於宗屬則薄所以先王制禮割愛厚親士庶猶然況當萬乗親王公主宗屬也舅氏外族也今朝廷公卿以至庶人據開元禮外祖父母及親舅䘮止服小功五月若親伯叔親兄弟即服齊縗周年所以踈其外而宻於内也有天下者尤不可使外戚強盛故西漢有吕氏之侈幾滅劉氏國朝有則天之簒殆革唐命盖非一朝一夕其所由來漸也今鄭光輟朝日數與親王公主同設使陛下速改詔命輟朝一日或兩日示其昇降有差恩禮無僣使四方見陛下欽明之徳青史傳陛下制度之文垂之百王永播芳烈臣愚不肖謬竊恩􅀻實願陛下處於堯舜之上羲軒之列所以甘心鼎鑊伏進危言優詔報之乃罷朝兩日又曰田令孜軍沙陁逼京師移幸鳯翔邠帥朱玫引兵來迎駕令孜挾帝幸山南時中夜出幸百官不及扈從而隨駕者黃門衛士數百人而巳帝駐寳雞候館詔授孔緯御史大夫遣中使傳詔令緯率百竂赴行在時京師急變從駕官屬至盩厔並爲亂兵所剽資裝殆盡緯承令見宰相論事蕭遘以田令孜在帝左右意不欲行辭疾不見緯遣臺吏促百官上路皆以􅂁笏不具爲詞緯無如之何乃召三院御史謂之曰吾軰世荷國恩身居憲秩雖六騑奔道而咫尺天顔累詔追徴皆無承禀非臣子之義也凢布衣交舊緩急猶相救䘏况在君親䇿名委質安可背耶言竟泣下三院曰夫豈不懷但􅉦厔剽剥之餘丐食不給今􅀂首途聊營一日之費俟信宿繼行可也緯拂衣而起曰吾妻危疾旦不得夕丈夫豈以妻子之故忽君父之急耶公軰善自爲謀吾行决矣即日見李昌符告曰主上再有詔命令促百寮前進觀群公之意未有發期僕忝憲闈不冝居後道途}
