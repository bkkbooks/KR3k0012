  - {type: variant, offset: 32, length: 0, content: '', WYG: 三月丁巳東海王越歸京師己丑勒兵入宫於帝側収近臣中書令繆播帝舅王延等十餘人並害之丁夘大旱江漢河洛皆竭可涉九月丙寅劉聰冦浚儀遣平北將軍曹武討之丁丑王師敗績東海王越入保京城聰至西明門越禦之戰於宣陽門外大破之使車騎將軍王堪平北將軍曹武討劉聰王師敗績堪奔還京師劉聰攻洛陽西明門不克冬十一月石勒陷長樂安北將軍王斌遇害因屠黎陽乞活師李惲簿盛等帥衆救京師聰退走惲等又破王彌於新汲四年十月壬子以驃騎將軍王浚為司空平北將軍劉琨為北平大將軍京師饑東海王越羽檄徵天下兵帝謂使者曰為我語諸征鎭若今日尚可救後則無逮矣時莫有至者十一月甲戌東海王越帥衆出許昌以行臺自隨宫無復守衞荒饉日甚殿内死人交橫府寺營署並掘塹自守盜賊公行桴鼓之音不絶越軍次項自領豫州牧鎭東將軍周馥逺迎大駕遷都壽陽越使裴頠討馥為馥所敗走保東城請救於琅琊王睿五年春正月帝密詔茍晞討東海王越罪狀告方鎭討之以征東大將軍茍晞為大將軍景子東海王越薨五月進司空王浚為大司馬琅琊王睿為鎭東大將軍東海王越之出也使河南尹潘滔居守大將軍茍晞表遷都倉垣帝將從之諸大臣畏滔不敢奉詔且宫中及黃門戀貲財不欲出至是饑甚人相食百官流亡者十八九帝召羣臣㑹議將行而警衞不備帝撫手歎之曰如何曾無車輿乃使司徒傅祇出詣河陰修理舟艥為水行之備朝士數十人導從帝步出西掖門至銅駞街為盜所掠不得進而還六月癸未劉曜王彌石勒同冦洛川王師頻為盜賊所敗死者甚衆庚寅司空荀藩光禄大夫荀組奔轘轅太子左率温畿夷夜開廣莫門奔小平津丁酉劉曜王彌入京師帝開華林園門出河陰藕池欲幸長安為曜等所追及曜等遂焚燒宫廟逼辱妃后吳王晏竟陵王楙音茂尚書左僕射和郁等皆遇害百官士庶死者三萬餘人帝蒙塵於平陽劉聰以帝為㑹稽公荀藩移檄州鎭以琅琊王為盟主豫章王端東奔荀晞晞}
