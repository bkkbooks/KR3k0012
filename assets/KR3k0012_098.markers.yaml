  - {type: variant, offset: 54, length: 0, content: '', WYG: 並照平東將軍宋哲奔江左十一月劉聰出獵令帝行車騎將軍戎服執㦸為導百姓聚而觀之故老或歔欷流涕聰後因大㑹使帝行酒洗爵反而更衣又使帝執蓋晉臣在座多失聲而泣尚書郎辛賓抱帝慟哭為聰所害十二月戊戌帝遇弑崩於平陽在位五年時年十八帝之繼皇統也屬永嘉之亂天下崩離長安城中户不盈百牆宇頽毁蒿棘成林朝廷無車馬章服唯桑板署號而已衆唯一旅公私有車四乗器械多闕運饋不繼巨猾滔天帝京危急諸侯無釋位之志征鎭闕勤王之衆故君臣窘迫以至弑辱東晉元皇帝晉書曰元皇帝諱睿字景文宣帝曾孫琅邪恭王覿之子也咸寧二年生於洛陽有神光之異一室盡明所藉藁如始刈及長白毫生於日角之左隆凖龍顔目有精曜顧眄煒如也年十五嗣位琅琊王幼有令聞惠皇之際王室多故毎恭儉退讓以免於禍沈敏有度量不顯灼然之迹故時人未之識焉唯侍中嵇紹異之謂人曰琅琊王毛骨非常殆非人臣之相元康二年拜員外散騎常侍累遷左將軍從討成都王穎蕩陰之敗叔父東安王繇為穎所害帝懼禍及將出奔其夜月正明而禁衞嚴警無由得去甚窘迫有頃雲霧晦㝠雷雨暴至徼者皆弛因得潛出穎先令諸關無得出貴人帝既至河陽為津吏所止從者宋典後來以䇿鞭馬而笑曰舍長官禁貴人汝亦被拘耶吏乃聽過至洛迎太妃歸國東海王越之収兵下邳也假帝輔國將軍尋加平東將軍都督揚州諸軍事越西迎大駕畱帝居守永嘉初用王導計始鎭建業以顧榮為軍司馬賀循為參佐王敦王導周顗音擬刁協等為腹心股肱賓禮名賢存問風俗江東歸心焉及懷帝蒙塵於平陽司空荀藩等移檄天下推為盟主愍帝即位加左丞相歲餘進位丞相大都督中外諸軍事建武元年春二月辛巳平東將軍宋哲至宣愍帝詔曰時遭屯否皇綱不振朕以寡德奉承洪緒不能祈天永命紹隆中興至使凶胡敢帥犬羊逼迫京輦朕今幽塞窮城憂慮萬端恐一旦崩潰卿詣丞相具宣朕意使攝萬機時據舊都修復陵廟以雪大恥三月帝素服出次舉哀三日西陽王羕及羣僚參佐州郡牧守等上尊號帝不許羕等以死固請至於再三帝慨然流涕曰孤罪人也唯有蹈節死義以雪天下之恥庶贖鈇鉞之誅吾本琅琊王諸賢見逼不已乃呼私奴命駕將反國羣臣乃不敢迫請依魏晉故事為晉王許之辛卯即王位大赦改元大興元年春正月戊申朔臨朝懸而不樂三月癸丑愍帝崩聞至帝斬縗居廬丙辰百寮上尊號即皇帝位詔曰昔我高祖宣皇帝誕膺期運廓開王基景文皇帝奕世重光緝熙諸夏爰暨世祖應天順時受兹明命功格天地仁濟宇宙旻天不傭降此鞠凶懐帝短世越去王都天禍薦臻大行皇帝崩殂社稷無奉肆羣后三司六事之人疇諮庶尹至於華戎致緝大命于朕躬予一人畏天之威罔敢稽違遂登壇南面受終文祖燔柴頒瑞告類上帝惟朕寡德纘承洪緒若涉大川罔知攸濟惟企股肱爪牙之位文武熊羆之臣用能弼寧晉室輔予一人思與萬國共兹休慶於是大赦改元庚午立太子紹為皇太子永昌元年春正月乙夘大赦改元戊辰大將軍王敦舉兵於武昌以誅劉隗為名龍驤將軍沈充帥衆應之三月徵征西將軍戴若思鎭北將軍劉隗衞京都劉隗軍于金城右將軍周禮守石頭帝被甲徇六師於郊外遣平南將軍陶侃領江州安南將軍甘卓領荆州各帥所統以躡敦後夏四月敦前鋒攻石頭周禮開城應之奮威將軍侯禮死之敦據石頭戴若思劉隗帥衆攻之王導周顗郭逸虞潭等三道出戰六軍敗績尚書令刁協奔于江乘為賊所害鎭北將軍劉隗奔于石勒帝遣使謂敦曰公若不忘本朝於此息兵則天下尚可安也如其不然朕當歸於琅琊以避賢路辛未大赦敦自為丞相都督中外諸軍録尚書事封武昌郡公邑萬户十一月己丑帝崩於内殿在位六年時年四十七葬平陵廟號中宗孫盛晉陽秋曰昔秦始皇東遊望氣者云五百年後東南金陵之地有天子氣於是始皇改曰秣陵呉人以為孫權帝之表也盛按始皇遊歲至權僭號四百三十七年考之年數既不合校之基守又非倫豈應帝王之符而見兆於上代乎有晉金行奄君四海金陵之祥其在斯乎且秦政東遊至是五百二十六年所謂五百年之後當有王者也又孫皓將亡吳郡臨蕪湖一夜草木自除於湖邊得石函中有小石青白色長四尺廣二寸餘上有白帝字時人莫察其祥意者其中宗興五湖之徵歟太康三年建業有冦餘姚人任振以周易筮之曰冦已滅矣後三十八年揚州當有天子又太安中童謠曰五馬浮渡江一馬化為龍永嘉大亂王室淪覆唯琅琊西陽汝南南頓彭城五王獲濟至是中宗登祚先是歲鎭熒惑太白四聚於牛斗之間五鐸又見于晉陵㝠數元感若合符契焉又初元石圖有牛繼馬後故宣帝深忌牛氏遂為二榼共一口以貯酒帝先飲佳者以毒者酖其將牛金而恭王妃夏氏通小吏牛金而生元帝亦有符云世説曰元帝始過江謂顧驃騎曰寄人國事志常懐慙榮跪答曰臣聞王者天下為家是以秋毫無定處九鼎後洛邑願陛下無遷為念又曰元帝正㑹引丞相王導登御牀王公既固辭中宗引之彌苦文獻曰使太陽與萬物同暉臣下何以仰瞻明皇帝晉書曰明皇帝諱紹字道畿元皇帝長子也幼而聰哲為元帝所寵異年數歲嘗坐置膝前屬長安使來因問帝曰汝謂日與長安孰逺近對曰長安近不聞人從日邊來居然可知也元帝異之明日宴羣寮又問之對曰日近元帝失色曰何乃異間者言之對曰舉目見日不見長安由是益竒之建興初拜東平中郎將鎭廣陵元帝為晉王及即帝位為皇太子性至孝有文武才畧永昌元年閏月己丑元帝崩庚寅}
