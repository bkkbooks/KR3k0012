  - {type: variant, offset: 52, length: 0, content: '', WYG: 問舉哀成禮壬申即皇帝位大赦改元以衞將軍蔣芬為司徒雍州刺史麴允為使持節領軍將軍録尚書事京兆太守索綝為尚書右僕射五月詔琅琊王曰朕以沖昧纂承洪緒未能梟夷凶逆奉迎梓宫枕戈煩寃肝心抽裂前得魏浚表知公帥先三軍已據壽春傳檄諸侯協齊威勢想今漸進已達洛陽凉州刺史張軌乃心王室連旗萬里已到汧隴梁州刺史張光亦遣巴漢之卒屯在駱谷秦州驍勇其㑹如林間遣使適還具知平陽定問云幽并隆盛餘胡衰破然猶恃險當須大舉未知公今所到}
