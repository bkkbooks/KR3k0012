  - {type: variant, offset: 97, length: 0, content: '', SBCK: 帝不豫召太宰西陽王義司徒王導尚書令卞壷車􅀐將軍郄鑒護軍將軍􅁃亮領軍將軍陸曄丹陽尹温嶠並受遺詔輔太子戊子帝崩于東堂在位三年時年二十七葬武平陵廟號肅祖􅀳陽秋曰明帝文武鑒斷􅀄在東宫敬禮賢士昵近明德自王導􅁃亮温嶠桓彛阮放皆見親待分好綢繆雅好辭章談論辯明理義與二三君子並著詩論粲然可觀于時東宫號爲多士王敦旣平思求民瘼詔尚書令僕射尚書曰吾飢於飡直言渇於求亮正想諸君逹此懷矣予違汝弼堯舜之相君臣吾雖虚闇庶不距逆耳之談稷契之任諸君居之矣望共朂之丗􅀃曰晋明帝欲起池臺元帝不許之明帝爲太子好養武士夕中作池比曉便成即令謂太子池是也成皇帝晉書曰成皇帝諱衍字世根明帝長子也大寜三年三月戊辰}
  - {type: page-break, offset: 97, content: '', id: KR3k0012_SBCK_098-10a}
  - {type: variant, offset: 97, length: 0, content: '', WYG: 帝不豫召太宰西陽王羕司徒王導尚書令卞壼車騎將軍郄鑒護軍將軍庾亮領軍將軍陸曄丹陽尹溫嶠並受遺詔輔太子戊子帝崩於東堂在位三年時年二十七葬武平陵廟號肅祖晉陽秋曰明帝文武鑒斷初在東宫敬禮賢士昵近明德自王導庾亮温嶠桓彛阮放皆見親侍分好綢繆雅好辭章談論辯明理義與二三君子並著詩論粲然可觀于時東宫號為多士王敦既平思求民莫詔尚書令僕射尚書曰吾飢於餐直言渴於求亮正想諸君達此懷矣予違汝弼堯舜之相君臣吾雖虚闇度不距逆耳之談稷契之任諸君居之矣望共勗之世説曰晉明帝欲起池臺元帝不許之明帝為太子好養武士夕中作池比曉便成即今謂太子池是成皇帝晉書曰成皇帝諱衍字世根明帝長子也大寧三年三月戊辰}
