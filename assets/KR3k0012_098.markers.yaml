  - {type: variant, offset: 4839, length: 466, content: 殿滿奮崔隨樂廣進璽綬於倫乃僣即帝位大赦改元建始諸黨皆登卿將並列大封其餘同謀者咸超階越次不可勝紀至于奴卒廝役亦加以爵位每朝會貂蟬盈坐時人為之諺曰貂不足狗尾續而以茍且之惠取悅人情府庫之儲不充於賜金銀冶鑄不給於印故有白板之侯君子恥服其章百姓亦知其不終矣倫親祠太廟還遇大風飄折麾蓋孫秀既立非常之事倫敬重焉秀任文帝為相國時所居內府事無巨細必諮而行倫之詔令秀改革有所與奪自書青紙為詔或朝令夕改者數四百官轉易如流矣時齊王冏河間王顒成都王穎並擁強兵各據一方秀知冏等必有異圖乃選親黨及倫故吏為三王參佐及郡守秀本異與張林有隙雖外相推崇內實忌之及林為衛將軍深怨不得開府潛與拲牋具說秀專權動違眾心而功臣皆小人撓亂朝廷可一時誅之拲以書白倫倫以示秀秀勸倫誅林倫請宗室會於華林園召林秀及王輿入因收林殺之誅三族及三王起兵討倫檄至倫秀始大懼遣其中堅孫輔為上將軍督諸軍以拒義師倫復受太子詹事劉琨節督河北將軍率步騎千人催諸軍與義軍戰于激水大敗退保河上劉琨燒斷河橋自義兵之起百官將士咸欲誅倫秀以謝天下秀知眾怒難犯不敢出省及聞河北軍悉敗憂懣音悶不知所為義陽王威勸秀至尚書省與, SBCK: 平御覽卷第九十}
