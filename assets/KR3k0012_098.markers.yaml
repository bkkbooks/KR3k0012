  - {type: variant, offset: 39, length: 4, content: 九歲太熙, krp: 三十晉陽秋曰懷帝天姿清劭少有聲名若遭承平之丗足爲守文佳主而繼惠帝擾亂之後東海專政禄去王室無幽厲之釁而有犬戎之禍悲夫愍皇帝晉書曰愍皇帝諱鄴字彦旗武帝孫呉孝王晏之子也岀繼伯父秦獻王東襲封秦王永嘉二年拜散騎常侍撫軍將軍及洛陽傾覆避難於滎陽密縣與舅荀藩荀組相遇自密南趣許頴豫州刺史閻鼎與前撫軍長史王毗司徒長史劉疇中書郎李昕及藩組等同謀奉帝歸于長安而疇等中塗復叛鼎追殺之藩組僅而獲免鼎遂扶帝乗牛車目宛趣武關歸於長安頻遇山賊士卒亡散次于藍田鼎告雍州刺史賈疋疋遽遣州兵迎衛逹于長安又使輔國將軍梁綜助守時有玉龜出霸水神馬鳴城南}
