  - {type: variant, offset: 2732, length: 154, content: 軍事二年春正月甲午朔帝在長安夏四月景子張方廢皇后羊氏七月東海王越嚴兵徐方將西迎大駕成都王穎部將公帥藩等聚眾攻陷郡縣害陽平太守李志汲郡太守張延等轉攻鄴平昌公模遣將軍趙驤擊破之九月壬子以成都王穎為鎮軍大將軍都督河北諸軍事鎮鄴河間王顒遣將軍呂朗屯洛陽冬十月景子詔曰得豫州刺史劉喬檄稱穎川太守劉輿迫脅驃騎將軍虓拒逆詔, WYG: 葛恢並受顧}
