  - {type: variant, offset: 28, length: 0, content: '', SBCK: 光熈元年封豫章郡王屬惠帝之時宗室構禍帝冲素自守門絶賔遊不務世事專玩史籍有譽於時􅀄拜散􅀐常侍及趙王倫􅆲見収爲射聲校尉累遷車􅀐大將軍都督青州諸軍事未之鎮永興元年改授鎮北大將軍都督鄴中諸軍事十二月丁亥立爲皇}
  - {type: variant, offset: 28, length: 0, content: '', WYG: 光熈元年封豫章郡王屬惠帝之時宗室搆禍帝沖素自守門絶賓遊不務世事專玩史籍有譽於時初拜散騎常侍及趙王倫簒見収倫敗為射聲校尉累遷車騎大將軍都督青州諸軍事未之鎭永興元年改授鎭北大將軍都督鄴城守諸軍事十二月丁丑立為皇}
  - {type: variant, offset: 28, length: 0, content: '', krp: 光熈元年封豫章郡王屬惠帝之時宗室構禍帝冲素自守門絶賔遊不務世事專玩史籍有譽於時𥘉拜散騎常侍及趙王倫篡見収爲射聲校尉累遷車騎大將軍都督青州諸軍事未之鎮永興元年改授鎮北大將軍都督鄴中諸軍事十二月丁亥立爲皇}
  - {type: variant, offset: 29, length: 1, content: 始, SBCK: 弟帝以清河王覃本太子也懼不敢當典書令廬陵脩肅曰二相經營王室志寜社稷儲貳之重冝歸時望親賢之舉非大王而誰清河㓜弱未允衆心是以旣升東宫復賛藩國今乗輿播越二宫乆曠常恐氐􅏔飲馬於涇川螘衆控􅁌於㶚水冝及􅁻辰時登儲副上翼大駕早寜東京下允黔首顒顒之望帝曰卿吾之宋昌也乃從之光熈元年十一月孝惠帝崩羊皇后以於太弟爲㛐不得爲太后催清河王覃入巳至尚書閤侍中華混等急召太弟癸酉即皇帝位大赦皇后羊氏爲惠皇后居􅀪訓宫追尊所生太妃王氏爲皇太后立妃梁氏爲皇后十二月南陽王摸殺河間王顒於雍谷永嘉元年春正月癸丑朔大赦改元除}
  - {type: page-break, offset: 29, content: '', id: KR3k0012_SBCK_098-1b}
  - {type: variant, offset: 29, length: 1, content: 始, WYG: 弟帝以清河王本太子也懼不敢當典書令廬陵修肅曰二相經營王室志寧社稷儲貳之重宜歸時望親賢之舉非大王而誰清河幼弱未允衆心是以既升東宫復贊藩國今乗輿播越二宫久曠常恐氐羌飲馬於涇川螘衆控弦於灞水宜及吉辰時登儲副上翼大駕早寧東京下允黔首顒顒之望帝曰卿吾之宋昌也乃從之光熙元年十一月孝惠帝崩羊皇后以於太弟為嫂不得為太后催清河王覃入已至尚書閣侍中華混等急召太弟癸酉即皇帝位大赦皇后羊氏為惠皇后居宏訓宫追尊所生太妃王氏為皇太后立妃梁氏為皇后十二月南陽王模殺河間王顒於雍谷永嘉元年春正月癸丑朔大赦改元除三族刑以太傅東海王越輔政三月辛已東萊人王彌起兵反冦青徐二州三月庚午立豫章王鈐為皇太子辛未大赦庚辰東海王越出鎭許昌五月馬牧帥汲桑聚衆反敗魏郡太守馮嵩遂陷鄴城害新蔡王騰燒鄴宫火旬日不滅入掠平原山陽公劉秋遇害洛陽步廣地里陷有二鵝出色蒼者沖天白者不能飛秋七月己酉朔東海王越進屯官渡以討汲桑已未以平東將軍琅琊王睿為安東將軍都督揚州江南諸軍事假節鎭建業八月己夘朔撫軍將軍茍晞音希敗汲桑於鄴十二月戊寅并州人田蘭簿盛等斬汲桑於樂陵甲午東海王越矯詔囚清河王覃於金墉城癸夘越自為丞相以撫軍茍晞為征東大將軍二年春正月丙子朔日有食之丁未大赦二月辛夘清河郡王覃為東海王越所害冬十月甲戌劉元海僭帝號於平陽仍稱漢}
