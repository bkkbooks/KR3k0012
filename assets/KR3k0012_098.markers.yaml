  - {type: variant, offset: 37, length: 0, content: '', SBCK: 辛未大赦庚辰東海王越岀鎮許昌五月馬牧帥汲桑聚衆反叛魏郡太守馮嵩遂䧟鄴城害新蔡王騰燒鄴宫火旬日不滅入掠平原山陽公劉秋遇害洛陽歩廣里地䧟有二鵝出色蒼者冲天白者不能飛秋七月巳酉朔東海王越進屯官渡以討汲桑巳未以平東將軍琅瑘王睿爲安東將軍都督楊州江南諸軍事假節鎮建鄴八月己卬朔撫軍將軍荀晞音希敗汲桑於鄴十二月戊寅并州人田蘭薄盛等斬汲桑于樂陵東海王越矯詔囚清河王覃于金墉城癸卯越自爲丞相以撫軍荀晞爲征東大將軍二年春正月丙子朔日有蝕之丁未大赦二月辛卯清河郡王覃爲東海王越所害冬十月甲戌劉元海僣帝號於平陽仍稱漢三年三月丁巳東海王越歸京師乙丑勒兵入宫於帝側収近臣中書令繆播帝舅王延等十餘人並害之大旱江漢河洛皆竭可渉九月景寅劉聦㓂浚儀遣平北將軍曹武討之丁丑王師敗績東海王越入保京城聦至西明門越禦之戰於宣陽門外大破之使車􅀐將軍王堪平北將軍曹武討劉聦王師敗績堪奔還京師劉聦攻洛陽西明門不尅冬十一月石勒䧟長樂安北將軍王斌遇害因屠黎陽乞活師李惲薄盛等帥衆救京師聦退走惲等又破王彌于新汲四年十月壬子以驃􅀐將軍王浚爲司空平北將軍劉琨爲北平大將軍京師飢東海王越羽檄徴天下兵帝謂使者曰爲我語諸征鎮􅀂今日尚可救後則無逮矣時莫有至者十一月甲戍東海王越帥衆出許昌以行臺自隨宫無復守衛荒饉日甚殿内死人交横府寺營署並掘壍自守盗賊公行桴鼔之音不絶越軍次項自領豫州牧鎭東將軍周馥表迎大駕遷都壽陽越使裴頠討馥爲馥所敗走保東城請救於琅瑘王睿五年春正月帝宻詔荀晞討東海王越罪狀告方鎮討之以征東大將軍荀晞爲大將軍景子東海王越薨五月進司空王浚爲大司馬琅瑘王睿爲鎮東大將軍東海王越之出也使河南尹潘滔居守大將軍荀晞表遷都倉垣帝將從之諸大臣畏滔不敢奉詔且宫中及黄門戀貲財不欲出至是飢甚人相食百官流亡者十八九帝召羣臣㑹議將行而警衛不備帝撫手歎之曰如何曽無車輿乃使司徒傳祇出詣河隂脩理舟艥爲水行之備朝士數十人導從帝歩出西掖門至銅駞街爲盗所掠不得進而還六月癸未劉曜王彌石勒同㓂洛川王師頻爲賊所敗死者甚衆庚寅司空荀藩光禄大夫荀組奔轘轅太子左率温夷夜開廣莫門奔小平津丁酉劉曜王彌入京師帝開華林園門出河隂藕池欲幸長安爲曜等所追及曜等遂焚燒宫廟辱妃后呉王晏竟陵王楙音茂尚書左僕射和郁等皆遇害百官士庶死者三萬餘人帝蒙塵於平陽劉聦以帝爲㑹稽公荀藩移檄州鎮以琅瑘王爲盟主豫章王端東奔荀晞晞立爲皇太子自領尚書令且置官屬保梁國之蒙縣百姓飢米斛萬餘價八月劉聦使子粲攻䧟長安太尉征西將軍南陽王模遇害長安遺人四千餘家奔漢中九月癸亥石勒襲陽夏至于蒙縣大將軍荀晞豫章王端並没于賊六年春正月帝在平陽九月辛巳前雍州刺史賈疋討劉粲於三輔走之􅀜中小定乃與衛將軍梁芬京兆太守梁綜共奉􅁗王業爲皇太子於長安七年春正月劉聦大㑹使帝著青衣行酒侍中􅁃珉號哭聦惡之丁未帝遇弑崩于平陽在位七年}
