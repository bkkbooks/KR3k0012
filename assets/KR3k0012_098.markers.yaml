  - {type: variant, offset: 1997, length: 570, content: 帝傷頰中三矢亡六璽帝遂幸超軍餒甚超進水左右奉秋桃超遣第熙奉帝之鄴穎帥群官迎謁道左帝下輿涕泣其夕幸于穎府有九錫之儀陳留王送貂蟬文鶡尾明日乃備法駕幸于鄴唯豫章王熾司徒王戎僕射荀藩從庚申大赦改為建武八月戊辰穎殺東安王繇張方復入洛陽廢皇后羊氏及皇太子覃匈奴左賢王劉元海反於離石自號大單于安北將軍王俊遣烏丸騎攻成都王穎于鄴大敗之穎與帝單車走洛陽御服分散倉卒上下無齎侍中黃門被囊中齎齊私錢三千詔貸用所在買飯食以供宮人止食於道中客舍宮人有持升餘粇米飯燥及蒜鹽監豉以進帝帝噉音啖之御中黃門布被次獲嘉市麤米飯盛以瓦孟帝噉兩盂有老父獻蒸雞帝受之至溫將謁陵帝喪履納從者之履下拜流涕左右皆歔欷及濟河張方帥騎三千以陽燧青蓋車奉迎方拜謁帝躬止之辛巳大赦賞從者有差冬十一月乙未方請帝謁陵因劫帝幸長安以所乘車入殿中帝馳避後園竹中方逼帝升車左右中黃門鼓吹十二人步從唯中書監盧志侍側方以帝幸其壘帝令具載宮人寶物軍人因略妻後宮分爭府藏魏晉來所積之物掃地無遺矣行次新安寒甚帝墮馬傷足尚書高光奉進面衣帝嘉之河間王顒帥官屬步騎三萬迎于灞上顒前拜帝下車止之以征西府為宮唯僕射荀藩司隸劉暾他昆反太常鄭球音求河南尹周馥音服復與其遺官在洛陽為留臺承制行事號為東西臺焉景午留臺大赦改元復為永安辛丑復皇后羊氏李雄僣號成都王劉元海僣號漢王十二月丁亥詔曰天禍晉邦家嗣莫繼成都王穎自在儲貳政績虧損四海失, SBCK: 風允塞時}
