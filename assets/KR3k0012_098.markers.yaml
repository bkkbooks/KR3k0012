  - {type: page-break, offset: 53, content: '', id: KR3k0012_SBCK_098-5b}
  - {type: variant, offset: 53, length: 0, content: '', WYG: 以息兵秣馬未便進軍今為已進何許當須來旨便乗輿自出㑹除中原也公宜思宏謨猷勗濟逺畧使山陵旋反四海有賴故遣殿中都尉劉蜀蘇馬等具宣朕意公茂德眤屬宣隆東夏恢融六合非公而誰但洛都陵廟不可空曠公宜鎭撫以綏山東右丞相當入輔弼追蹤周召以隆中興也二年秋七月劉曜趙舟等又逼京都領軍將軍麴允討破之四年七月劉曜攻北地麴允帥步騎三萬救之王師不戰而潰北地太守麴昌奔于京師曜進至涇陽渭北諸城悉潰建威將軍曾充散騎常侍梁緯少府皇甫陽等皆死之八月劉曜逼京師内外斷絶鎭西將軍焦嵩平東將軍宋哲始平太守竺恢等同赴國難麴允與公卿守長安小城以自固散騎常侍華輯監京兆馮翊𢎞農上洛四部兵東屯霸上鎮將軍胡崧師城西部兵諸屯軍遮馬橋並不敢進冬十月京師饑甚米斗金二兩人相食死者大半太倉有麴數十餅麴允屑為粥以供帝至是復盡帝泣謂允曰今窘厄如此外無救援死於社稷是朕事也然念將士暴離斯酷今欲聞城未陷為羞死之事庶令黎元免屠爛之苦行矣遣書朕意決以十一月乙未使侍中宋敞送牋於曜帝乗羊車肉袒銜璧輿櫬出降羣臣號泣攀車執帝之手帝亦悲不自勝御史中丞吉朗自殺曜焚櫬受璧使宋敞奉帝還宫初有童謠曰天子何在豆田中時王浚在幽州以豆有藿殺隱士霍原以應之及帝如曜營營實在城東豆田壁辛丑帝蒙塵於平陽麴允及羣官並從劉聰假帝光禄大夫懐安侯壬寅聰臨殿帝稽首於前麴允伏地慟哭因自殺五年春正月帝在平陽庚子虹霓彌天三}
