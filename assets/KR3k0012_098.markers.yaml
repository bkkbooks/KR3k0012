  - {type: variant, offset: 2587, length: 144, content: 問日新四海注意今以為皇太弟以隆我晉邦以司空越為太傅與太宰顒夾輔朕躬司徒王戎參錄朝政光祿大夫王衍為尚書左僕射百官皆復職齊王冏前應還第長沙王乂輕陷重刑封其子紹為樂平縣王以奉其嗣自須項戎車屢征勞費人力供御之物皆減三分之二戶調田租三分減一蠲除苛政愛人務本清通之後當還東京大赦改元以河間王顒都督中外, WYG: ''}
