  - {type: variant, offset: 2568, length: 2117, content: 不可承重器其以王還第豫章王熾先帝愛子令問日新四海注意今以為皇太弟以隆我晉邦以司空越為太傅與太宰顒夾輔朕躬司徒王戎參錄朝政光祿大夫王衍為尚書左僕射百官皆復職齊王冏前應還第長沙王乂輕陷重刑封其子紹為樂平縣王以奉其嗣自須項戎車屢征勞費人力供御之物皆減三分之二戶調田租三分減一蠲除苛政愛人務本清通之後當還東京大赦改元以河間王顒都督中外諸軍事二年春正月甲午朔帝在長安夏四月景子張方廢皇后羊氏七月東海王越嚴兵徐方將西迎大駕成都王穎部將公帥藩等聚眾攻陷郡縣害陽平太守李志汲郡太守張延等轉攻鄴平昌公模遣將軍趙驤擊破之九月壬子以成都王穎為鎮軍大將軍都督河北諸軍事鎮鄴河間王顒遣將軍呂朗屯洛陽冬十月景子詔曰得豫州刺史劉喬檄稱穎川太守劉輿迫脅驃騎將軍虓拒逆詔命造構凶逆擅劫郡縣合聚兵眾擅用荀晞為兗州斷截王命鎮南大將軍荊州刺史劉𢎪平南將軍彭城王釋等各勒所統徑會許昌與喬并力今遣右將軍張方為大都督統精卒十萬建武將軍呂朗廣武將軍騫貙勑俱反建威將軍刀默等為軍前鋒共會許昌除輿兄第丁丑使前車騎將軍石超北中郎將王闡討輿等赤氣見于北方東西竟天有星孛于北斗平昌公模遣將軍宋胄等屯河橋十一月立節將軍周權詐被檄自稱平西將軍復皇后羊氏洛陽令何橋攻權殺之復廢皇后十二月呂朗等東屯榮陽成都王穎進據洛陽張方劉𢎪等並按兵不能禦范陽王虓濟自官渡拔榮陽石超襲許昌破劉喬於肅喬奔南陽右將軍陳敏舉兵反自號楚公矯稱被中詔從沔漢奉迎天子逐楊州刺史劉機丹陽太守王曠光熙元年春正月戊子朔日有蝕之帝在長安河間王顒聞劉喬破大懼遂殺張方請和於東海王越越不聽宋胄等破穎將婁裒進逼洛陽穎奔長安甲子越遣其將祁弘宋冑司馬纂等迎帝己亥弘等奉帝還洛陽乘牛車行宮藉草公卿跋涉六月景辰朔至自長安升舊殿哀慼流涕謁于大廟復皇后羊氏辛未大赦改元八月以太尉東海王越錄尚書事驃騎將軍范陽王虓為司空九月頓丘太守馮嵩執成都王穎送之于鄴冬十月司空范陽王虓薨長史劉輿害成都王穎十一月庚午帝崩于顯陽殿在位十六年時年四十八葬太陽陵帝之為太子也朝廷咸知不堪政事衛瓘常侍宴撫武帝所坐床曰可惜此坐和嶠亦以為言曰皇太子有淳古風而季代多偽恐不了陞下家事武帝默然不荅後武帝欲廢太子楊后曰立嫡以長不以賢豈可動乎太子遂定及居大位政出群下紀綱大壞貨賂公行天下為之市賈焉帝又嘗幸華林園聞蛙聲謂左右曰此鳴者為官乎為私乎或對曰在官地者為官在私地者為私及天下荒亂百姓餒甚帝曰何不食肉糜其蒙蔽皆此類也王隱晉書曰高堂隆剋鄴宮屋材云後若干年當有天子居此宮惠帝止鄴宮治屋者土剝更泥始見刻字計年正合趙王倫晉書曰趙王倫字子彝宣帝弟九子也母曰柏夫人魏嘉平初封安樂亭侯五等建改封東安子拜諫議大夫武帝受封琅琊郡王元康初遷征西將軍開府儀同三司鎮關中倫刑賞失中氐音低羗反叛徵還京師尋拜車騎將軍太子太傅深交賈郭謟事中宮大為賈后所親信求錄尚書張華裴頠固執不可又求尚書令華頠復不許敏懷太子之廢也使倫領右軍將軍時左衛司馬督司馬雅及常從督許超並常給事東宮二人傷太子無罪與殿中中郎士猗節謀廢賈后復太子以華頠不可移難與圖權倫執兵之要性貪冒可假以濟事乃說倫嬖人孫秀曰中宮凶妒音蠹無道與賈謐等共廢太子今國無適嗣社稷將危大臣將起大事而公名奉中宮與賈郭親善太子之廢皆云預知一朝事起禍必相及何不先謀之乎秀許諾言於倫倫納焉事將起而秀知太子聰明若還東宮將與賢人圖政量已必不得志更說倫曰太子剛猛不可私請明公素事賈后時議皆以公為賈氏之黨今雖欲建大功於太子太子含宿怒必不加賞於明公矣當謂逼百姓之望翻覆以免罪耳此乃所以速禍也今且緩其事賈后必害大子然後廢后為太子報讎亦足以立功豈徒免禍而已倫從之秀乃微泄其謀使謐黨頗聞之倫秀因勸謐等早害太子以絕眾望太子既過害倫秀之謀益甚而超雅懼後難欲悔其謀乃辭疾秀復告右衛佽飛督閭和和從之期四月三日景夜一籌以鼓聲為應至期乃矯詔勑三部司馬曰中宮與賈謐等殺害太子今使車騎入廢中宮汝等皆當從命賜爵關中侯不從誅三族於是眾皆從之倫又矯詔開門夜入陳兵道南遣翊軍校尉齊王同將三部司馬百人排閣入華林令駱休為內應迎帝幸東堂遂廢賈后為庶人幽之于建始殿中書監侍中黃門侍郎八座皆夜入殿執張華裴顧解紹杜斌等於殿前殺之尚書始疑詔有詐郎師景露板奏請手詔倫等以為沮眾斬之以殉明日倫坐端門屯兵北向遣尚書和郁送賈庶人于金墉尋矯詔自為使持節大都督中外諸軍事相國侍中王如故一依宣文輔魏故事以其世子散騎常侍拲音拱領冗從僕射子馥前將軍封濟陽王虔黃門郎封汝陰王詡況羽反散騎侍郎霸城侯孫秀等皆封大郡並據兵權文武官侯封者數千人百官總已聽於倫倫素庸下無智策復受帛於秀秀之威權振於朝廷天下皆事秀而無求於倫秀起自琅琊小吏累官於趙國以謟媚自達既執機衡遂恣其姦謀多殺忠良以逞私憾前衛尉石崇黃門郎潘岳皆與秀有嫌並見誅於是京邑君子不樂其生矣淮南王允齊王冏以倫秀驕僣內懷不平秀等亦深忌焉乃出冏鎮許奪允護軍允發起兵討倫允既敗滅倫加九錫增封五萬戶倫無學不知書秀亦以狡黠胡八反小才貪淫昧利所共立事者皆邪佞之徒唯競榮利無深謀遠略倫秀並惑巫鬼聽妖邪之說秀使牙門趙奉詐為宣帝神語令倫早入西宮又言宣帝於北邙為趙王佐助於是別立宣帝廟於邙山謂逆謀可成秀等部分諸軍分布腹心使散騎常侍義陽王威兼侍中出納詔命矯作禪讓之詔使持節尚書令滿奮僕射崔隨為副奉皇帝璽綬以禪位于倫倫偽讓不受於是宗室諸王, SBCK: 肆爾}
