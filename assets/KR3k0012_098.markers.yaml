  - {type: variant, offset: 147, length: 395, content: 年又詔子弟及群官並不得謁陵三月辛卯誅太傅楊駿駿弟衛將軍瑤太子太保濟中護軍張劭散騎常侍叚廣楊邈左軍劉禎河南尹李斌中書令蔣俊東夷校尉文淑尚書武茂皆夷三族壬辰大赦賈后矯詔廢皇太后為庶人徙于金墉城告于天地宗廟誅太后母龐氏壬寅徵大司馬汝南王高為太宰太保衛瓘輔政六月賈后矯詔使楚王瑋音偉殺太宰汝南王亮太保菑陽公衛瓘乙丑以瑋擅害亮瓘殺之九月辛丑徵征西大將軍梁王彤為衛將軍錄尚書事以趙王倫為征西大將軍都督雍梁二州諸軍事三年春二月已酉賈后弒皇太后于金墉城五年冬十月武庫火焚累代之寶十二月景戍新作武庫大調兵器六年八月秦雍氏羌悉叛推氐羌帥齊萬年僣號稱帝圍于涇陽七年春正月癸丑周處及齊萬年戰於六陌王師敗績處死之九年春正月左積弩將軍孟觀伐氐戰于中亭大破之獲齊萬年徵征西大將軍梁王彤錄尚書事以北中郎將河間王顒為鎮西將軍鎮關中放都王穎為鎮北大將軍鎮鄴十二月壬戍廢皇太子遹為庶人及其三子幽于金墉城殺太子之母謝氏永康元年正月, SBCK: 服}
