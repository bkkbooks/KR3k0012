  - {type: variant, offset: 648, length: 245, content: 丁酉以梁王彤為太宰已亥趙王倫矯詔害賈庶人于金墉城五月已已立皇孫臧為太孫秋八月淮南王允舉兵討趙王倫不剋允及其二子秦王郁漢王迪皆遇害永寧元年春正月乙丑趙王倫纂帝位景寅遷帝于金墉城號曰太上皇改金墉曰永昌宮廢皇太孫臧為濮陽王五星經天縱橫無常癸酉倫害濮陽王臧三月平東將軍齊王冏俱永切起兵以討倫傳檄州郡屯于陽瞿征北大將軍成都王穎征西大將軍河澗王顒常山王乂豫州刺史李毅兗州刺史王彥南中郎將新野公歆皆舉兵應之眾數十萬倫遣其將閭和出伊闕張泓孫輔出堮坂以拒冏孫會士猗許超出黃橋以拒穎及穎將趙驤石超戰於沮音蛆水會, SBCK: 一}
