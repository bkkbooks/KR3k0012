  - {type: variant, offset: 2887, length: 470, content: 造構凶逆擅劫郡縣合聚兵眾擅用荀晞為兗州斷截王命鎮南大將軍荊州刺史劉𢎪平南將軍彭城王釋等各勒所統徑會許昌與喬并力今遣右將軍張方為大都督統精卒十萬建武將軍呂朗廣武將軍騫貙勑俱反建威將軍刀默等為軍前鋒共會許昌除輿兄第丁丑使前車騎將軍石超北中郎將王闡討輿等赤氣見于北方東西竟天有星孛于北斗平昌公模遣將軍宋胄等屯河橋十一月立節將軍周權詐被檄自稱平西將軍復皇后羊氏洛陽令何橋攻權殺之復廢皇后十二月呂朗等東屯榮陽成都王穎進據洛陽張方劉𢎪等並按兵不能禦范陽王虓濟自官渡拔榮陽石超襲許昌破劉喬於肅喬奔南陽右將軍陳敏舉兵反自號楚公矯稱被中詔從沔漢奉迎天子逐楊州刺史劉機丹陽太守王曠光熙元年春正月戊子朔日有蝕之帝在長安河間王顒聞劉喬破大懼遂殺張方請和於東海王越越不聽宋胄等破穎將婁裒進逼洛陽穎奔長安甲子越遣其將祁弘宋冑司馬纂等迎帝己亥弘等奉帝還洛陽乘牛車行宮藉草公卿跋涉六月景辰朔至自長安升舊殿哀慼流涕謁于大廟復皇后羊氏辛未大赦改元八月以太尉東海王越錄尚書事驃騎將軍范陽王虓為司空九月頓丘太守馮嵩執成都王穎送之于鄴冬十月司空范陽王虓薨長史劉輿害成都王穎十一月庚午, WYG: 癸巳}
