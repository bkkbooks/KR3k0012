  - {type: variant, offset: 1539, length: 273, content: 利方決千金堰水碓皆涸音鶴乃發王公奴婢手舂給兵廩一品已下不從征者男子十三已上皆從役又發奴助兵號為四部司馬公私窮踧子六反米石萬錢詔命所至一城而已壬寅夜赤氣竟天隱隱有聲景辰地震癸亥東海王越執長沙王乂幽於金墉城尋為張方所害甲子大赦永興元年春正月成都王穎自鄴諷于帝乃大赦改元為永安帝逼於河間王顒密詔雍州刺史劉沉秦州刺史皇甫重以討之沉舉兵攻長安為顒所敗張方大掠洛中還長安於是軍中大餧人相食以成都王穎為丞相穎遣從事中郎成夔等以兵五萬屯十二城門殿中宿所忌者穎皆殺之以三部兵代宿衛二月乙酉廢皇后羊氏幽于金墉城黜皇太子覃復為清河王三月河間王顒表請立成都王穎為太弟戊申, SBCK: 豫}
