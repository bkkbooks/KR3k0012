  - {type: variant, offset: 53, length: 0, content: '', krp: 以息兵秣馬未便進軍今爲巳至何許當須來旨使乗輿自出㑹除中原也公冝思弘謨猷朂濟逺略使山陵旋反四海有頼故遣殿中都尉劉蜀蘇馬等具宣朕意公茂徳昵屬宣隆東夏恢融六合非公而誰但洛都陵廟不可空曠公冝鎮撫以綏山東右丞相當入輔弼追蹤周邵以隆中興也二年秋七月劉曜趙舟等又逼京都領軍將軍麴允討破之四年七月劉曜攻北地麴允帥歩騎三萬救之王師不戰而潰北地大守麴昌奔于京師曜進至涇陽渭北諸城悉潰建威將軍曽充散騎常侍梁緯少府皇甫陽等皆死之八月劉曜逼京師内外斷絶鎮西將軍焦嵩平東將軍宋哲始平太守笁恢等同赴國難麴允與公卿守長安小城以自固散騎常侍華輯監京兆馮翊弘農上洛四部兵東屯覇上鎭軍將軍胡崧帥城西諸郡兵屯遮馬橋並不敢進冬十月京師飢甚米斗金二兩人相食死者太半太倉有麴數十餅麴允屑爲粥以供帝至是復盡帝泣渭允曰今窘厄如此外無救授死於社稷是朕事也然念將士暴離斯酷今欲聞城未䧟爲羞死之事庶令黎元免屠爛之苦行矣遣書朕意决矣十一月乙未使侍中宋敞送牋於曜帝乗羊車肉袒銜壁輿櫬出降羣臣號泣攀車執帝之手帝亦悲不自勝御史中丞吉㓪自殺曜焚櫬受壁使宋敞奉帝還宫𥘉有童謡曰天子何在豆田中時王浚在幽州以豆有藿殺隠士霍原以應之及帝如曜營營實在城東豆田壁辛丑帝蒙塵於平陽麴允及羣官並從劉聦假帝光禄大夫懷安侯壬寅聦臨殿帝稽首于前麴允伏地慟哭因自殺五年春正月帝在平陽庚子虹霓弥天三}
