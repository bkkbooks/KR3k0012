  - {type: variant, offset: 5306, length: 267, content: 座議征戰之備秀從之使京城四品以下子弟十五以上皆詣司隸從倫出戰內外諸軍悉欲劫殺秀秀懼自崇禮闥走還下舍衛將軍趙泉斬秀等以徇使倫為詔曰吾為孫秀等所誤以怒三王今已誅秀其迎太上復位吾歸老于農畝傳詔以騶音鄒虞幡勑將士解兵文武官皆奔走莫敢有居者黃門將倫自華林東門出及拲皆還汶陽里弟於是以甲士數千迎天子于金墉百姓咸稱萬歲帝自端門入升殿御廣室送倫及拲付金墉城梁王彤表倫父子凶逆宜伏誅百官會議于朝堂皆如彤表遣尚書袁敞持節賜倫死飲以金屑苦酒倫慚以巾覆面曰孫秀誤我於是收拲馥虔詡付廷尉獄考竟百官是倫所用者皆斥免之臺省府衛僅有存者自兵興六十餘日戰及殺害近十萬人, SBCK: ''}
