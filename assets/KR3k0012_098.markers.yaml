  - {type: variant, offset: 54, length: 0, content: '', SBCK: 並照平東將軍宋哲奔江左十一月劉聦岀獵令帝行車􅀐將軍戎服執㦸爲導百姓聚而觀之故老或歔欷流涕聦後因大㑹使帝行酒洗爵反而更衣又使帝執蓋􅀳臣在座多失聲而泣尚書郎辛賔抱帝慟􅂘爲聦所害十二月戊戌帝遇弑崩于平陽在位五年時年十八帝之繼皇統也屬永嘉之亂天下崩離長安城中户不盈百墻宇頽毀蒿􅁄成林朝廷無車馬章服唯桑板署號而已衆唯一旅公􅀻有車四乗器械多闕運饋不繼巨猾滔天帝京危急諸侯無釋位之志征鎮闕勤王之譽故君臣窘迫以至殺辱東􅀳元皇帝晉書曰元皇帝諱睿字景文宣帝曽孫琅耶㳟王覿之子也咸寧二年生於洛陽有神光之異一室盡明所藉藁如始刈及長白毫生於日角之左隆凖龍顔目有精曜頋眄煒如也年十五嗣位琅耶王㓜有令問惠皇之際王室多故毎恭儉退讓以免于禍沉敏有度量不顯灼然之跡故時人未之識焉唯侍中嵆紹異之謂人曰琅耶王毛骨非常殆非人臣之相元康二年拜貟外散騎常侍累遷左將軍從討成都王頴蕩隂之敗叔父東安王繇爲頴所害帝懼禍及將出奔其夜月正明而禁衛嚴警無由得去甚窘迫有頃雲霧晦􅁳雷雨暴至徼者皆㢮因得潜出頴先令諸􅀜無得出貴人帝旣至河陽爲津吏所止從者宋典後來以䇿鞭帝馬而􅀏曰舎長官禁貴人汝亦􅀍拘耶吏乃聽過至洛陽迎太妃歸國東海王越之収兵下邳也假帝輔國將軍㝷加平東將軍都督楊州諸軍事越西迎大駕留帝居守永嘉􅀄用王導計始鎮建業以頋榮爲軍司馬賀循爲叅佐王敦王導周顗音擬刀恊等爲腹心股肱賔禮名賢存問風俗江東歸心焉及懷帝蒙塵于平陽司空荀藩等移檄天下推帝爲盟主愍帝即位加左丞相歳餘進位丞相大都督中外諸軍事建武元年春二月辛巳平東將軍宋哲至宣愍帝詔曰時遭屯否皇綱不振朕以寡徳奉承洪緒不能祈天永命紹隆中興至使凶胡敢帥犬羊逼迫京輦朕今幽塞窮城憂慮萬端恐一旦崩潰卿指詣丞相具宣朕意使攝萬機時據舊都脩復陵廟以雪大恥三月帝素服出次舉哀三日西陽王義及羣僚叅佐州郡牧守等上尊號帝不許義等以死固請至于再三帝􅁣然流涕曰􅀌罪人也唯有蹈節死義以雪天下之恥庶贖鈇􅃏之誅吾夲琅耶王諸賢見逼不巳乃呼私奴命駕將反國群臣乃不敢迫請依魏􅀳故事爲􅀳王許之辛卯即王位大赦改元太興元年春正月戊申朔臨朝懸而不樂三月癸丑愍帝崩問至帝斬纕居廬景辰百寮上尊號即皇帝位詔曰昔我髙祖宣皇帝誕膺期運廓開王基景文皇帝奕丗重光緝熈諸夏爰曁丗祖應天順時受兹明命功格天地仁濟宇宙昊天不融降此鞠凶懷帝短丗越去王都天禍荐臻大行皇帝崩殂社稷無奉肆群后三司六事之人疇諮庶尹至于華戎致輯大命于朕躬予一人畏天之威罔弗敢違遂登壇南面受終文祖燔柴頒瑞告類上帝惟朕寡德纉戎洪緒􅀂渉大川罔知攸濟惟􅈛股肱􅀲牙之佐文武熊羆之臣用能弼寜􅀳室輔予一人思與萬國共兹休慶於是大赦改元庚午立太子紹爲皇太子永昌元年春正月乙卯大赦改元戊辰大將軍王敦舉兵於武昌以誅劉隗爲名龍驤將軍沈充帥衆應之三月徴征西將軍戴􅀂思鎮北將軍劉隗還衛京都劉隗軍于金城右將軍周札守石頭帝􅀍甲徇六師於郊外遣平南將軍陶􅋲領江州安南將軍甘卓領荆州各帥所統以躡敦後夏四月敦前鋒攻石頭周札開城應賊􅁬威將軍侯禮死之敦據石頭戴􅀂思劉隗帥衆攻之王導周顗郭逸虞潭等三道出戰六軍敗績尚書令刀恊奔于江垂爲賊所害鎮北將軍劉隗奔于石勒帝遣使謂敦曰公􅀂不忘本朝於此息兵則天下尚可安也如其不然朕當歸于琅耶以避賢路辛未大赦敦自爲丞相都督中外諸軍録尚書事封武昌郡公邑萬户十一月巳丑帝崩于内殿在位六年時年四十七葬平陵廟號中宗孫盛晉陽秋曰昔􅁗始皇東遊望氣者云五百年後東南金陵之地有天子氣於是始皇改曰秼陵呉人以爲孫權帝之表也盛案始皇逰歳至權僣號四百三十七年考之年數旣不合校之基守又非倫豈應帝王之符而見兆於上代乎有􅀳金行奄君四海金陵之祥其在斯乎且􅁗政東遊至是五百二十六年所謂五百年之後當有王者也又孫皓將亡呉郡臨無湖一夜草木自除于湖邊得石凾中有小石青白色長四尺廣二寸餘上有白帝字時人莫察其祥意者豈中宗興五湖之徴歟太康三年建業有㓂餘姚人任振以周昜筮之曰㓂巳滅矣後三十八年楊州當有天子又太安中童謡曰五馬浮渡江一馬化爲龍永嘉大亂王室淪覆唯琅耶西陽汝南南頓彭城五王􅀗濟至是中宗登祚先是歳鎮辰太白四星聚於牛斗之間五鐸又見于􅀳陵寘數􅀇感􅀂合符契焉又􅀄􅀇石圖有牛繼馬後故宣帝􅀷忌牛氏遂爲二榼共一口以貯酒帝先飲佳者以毒者酖其將牛金而恭王妃夏氏通小吏牛欽而生元帝亦有符云丗􅀃曰元帝始過江謂頋驃􅀐曰􅀉人國事志常懷慙䇿跪荅曰臣聞王者天下爲家是以耿毫無定處九鼎後洛邑願陞下無以迁都爲念又曰元帝正㑹引丞相王導登御床王公旣固辭中宗引之彌苦文獻曰使太陽與萬物同暉臣下何以仰瞻明皇帝􅀳書曰明皇帝諱紹字道畿元皇帝長子也㓜而聦哲爲元帝所寵異年數歳甞坐置膝前屬長安使來因問帝曰汝謂日與長安孰逺對曰長安近不聞人從日邊居然可知也元帝異之明日宴羣寮又問之對曰日近元帝失色曰何乃異間者之言對曰舉目則見日不見長安由是益竒之建興􅀄拜東中郎將鎮廣陵元帝爲􅀳王及即帝位爲皇太子性至孝有文武才略永昌元年閏月巳丑元帝崩庚寅}
