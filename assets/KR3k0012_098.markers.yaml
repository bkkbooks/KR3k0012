  - {type: variant, offset: 1002, length: 297, content: 戊辰大赦增吏位二等庚午東萊王蕤左衛將軍王輿謀廢齊王冏事泄廢蕤為庶人輿伏誅夷三族甲戍以齊王冏為大司馬都督中外諸軍事成都王穎為大將軍錄尚書事河間王顒為太尉罷承相復置司徒官太安元年五月癸卯以清河王遐子覃為皇太子賜孤寡帛大酺音甫五日以齊王冏為太師東海王越為司空秋七月兗豫徐冀等四州大水冬十月地震十二月丁卯河間王顒表齊王冏窺伺神器有無君之心與成都王穎新野王歆范陽王虓許交切同會洛陽請廢冏還第長沙王乂奉乘輿屯南上東門攻冏殺之幽其諸子于金墉城廢冏弟北海王寔大赦改元以長沙王乂為太尉都督中外諸軍事二年七月中書令卞粹侍中馮蓀河南尹李含等貳於長沙王爻疑而害之八月河澗王顒成都王穎舉兵討長沙王乂帝以乂為大都督帥軍禦之, SBCK: ''}
