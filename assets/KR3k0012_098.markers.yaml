  - {type: variant, offset: 3373, length: 2200, content: 葬太陽陵帝之為太子也朝廷咸知不堪政事衛瓘常侍宴撫武帝所坐床曰可惜此坐和嶠亦以為言曰皇太子有淳古風而季代多偽恐不了陞下家事武帝默然不荅後武帝欲廢太子楊后曰立嫡以長不以賢豈可動乎太子遂定及居大位政出群下紀綱大壞貨賂公行天下為之市賈焉帝又嘗幸華林園聞蛙聲謂左右曰此鳴者為官乎為私乎或對曰在官地者為官在私地者為私及天下荒亂百姓餒甚帝曰何不食肉糜其蒙蔽皆此類也王隱晉書曰高堂隆剋鄴宮屋材云後若干年當有天子居此宮惠帝止鄴宮治屋者土剝更泥始見刻字計年正合趙王倫晉書曰趙王倫字子彝宣帝弟九子也母曰柏夫人魏嘉平初封安樂亭侯五等建改封東安子拜諫議大夫武帝受封琅琊郡王元康初遷征西將軍開府儀同三司鎮關中倫刑賞失中氐音低羗反叛徵還京師尋拜車騎將軍太子太傅深交賈郭謟事中宮大為賈后所親信求錄尚書張華裴頠固執不可又求尚書令華頠復不許敏懷太子之廢也使倫領右軍將軍時左衛司馬督司馬雅及常從督許超並常給事東宮二人傷太子無罪與殿中中郎士猗節謀廢賈后復太子以華頠不可移難與圖權倫執兵之要性貪冒可假以濟事乃說倫嬖人孫秀曰中宮凶妒音蠹無道與賈謐等共廢太子今國無適嗣社稷將危大臣將起大事而公名奉中宮與賈郭親善太子之廢皆云預知一朝事起禍必相及何不先謀之乎秀許諾言於倫倫納焉事將起而秀知太子聰明若還東宮將與賢人圖政量已必不得志更說倫曰太子剛猛不可私請明公素事賈后時議皆以公為賈氏之黨今雖欲建大功於太子太子含宿怒必不加賞於明公矣當謂逼百姓之望翻覆以免罪耳此乃所以速禍也今且緩其事賈后必害大子然後廢后為太子報讎亦足以立功豈徒免禍而已倫從之秀乃微泄其謀使謐黨頗聞之倫秀因勸謐等早害太子以絕眾望太子既過害倫秀之謀益甚而超雅懼後難欲悔其謀乃辭疾秀復告右衛佽飛督閭和和從之期四月三日景夜一籌以鼓聲為應至期乃矯詔勑三部司馬曰中宮與賈謐等殺害太子今使車騎入廢中宮汝等皆當從命賜爵關中侯不從誅三族於是眾皆從之倫又矯詔開門夜入陳兵道南遣翊軍校尉齊王同將三部司馬百人排閣入華林令駱休為內應迎帝幸東堂遂廢賈后為庶人幽之于建始殿中書監侍中黃門侍郎八座皆夜入殿執張華裴顧解紹杜斌等於殿前殺之尚書始疑詔有詐郎師景露板奏請手詔倫等以為沮眾斬之以殉明日倫坐端門屯兵北向遣尚書和郁送賈庶人于金墉尋矯詔自為使持節大都督中外諸軍事相國侍中王如故一依宣文輔魏故事以其世子散騎常侍拲音拱領冗從僕射子馥前將軍封濟陽王虔黃門郎封汝陰王詡況羽反散騎侍郎霸城侯孫秀等皆封大郡並據兵權文武官侯封者數千人百官總已聽於倫倫素庸下無智策復受帛於秀秀之威權振於朝廷天下皆事秀而無求於倫秀起自琅琊小吏累官於趙國以謟媚自達既執機衡遂恣其姦謀多殺忠良以逞私憾前衛尉石崇黃門郎潘岳皆與秀有嫌並見誅於是京邑君子不樂其生矣淮南王允齊王冏以倫秀驕僣內懷不平秀等亦深忌焉乃出冏鎮許奪允護軍允發起兵討倫允既敗滅倫加九錫增封五萬戶倫無學不知書秀亦以狡黠胡八反小才貪淫昧利所共立事者皆邪佞之徒唯競榮利無深謀遠略倫秀並惑巫鬼聽妖邪之說秀使牙門趙奉詐為宣帝神語令倫早入西宮又言宣帝於北邙為趙王佐助於是別立宣帝廟於邙山謂逆謀可成秀等部分諸軍分布腹心使散騎常侍義陽王威兼侍中出納詔命矯作禪讓之詔使持節尚書令滿奮僕射崔隨為副奉皇帝璽綬以禪位于倫倫偽讓不受於是宗室諸王群公卿士咸假稱符瑞天文以勸進倫乃許之左衛王與前軍司馬雅等率甲士入殿譬諭三部司馬示以威賞皆莫敢違其夜使張林等屯守諸門義陽王威及駱休逼奪天子璽綬夜漏未盡內外百官以乘輿法駕迎倫惠帝乘雲母車鹵簿數百人自華林西門出居金墉城尚書和郁兼侍中散騎常侍琅瑯耶王睿中書侍郎陸機從到城下而反使張衡衛帝實幽之也倫從兵五千人自端門登太殿滿奮崔隨樂廣進璽綬於倫乃僣即帝位大赦改元建始諸黨皆登卿將並列大封其餘同謀者咸超階越次不可勝紀至于奴卒廝役亦加以爵位每朝會貂蟬盈坐時人為之諺曰貂不足狗尾續而以茍且之惠取悅人情府庫之儲不充於賜金銀冶鑄不給於印故有白板之侯君子恥服其章百姓亦知其不終矣倫親祠太廟還遇大風飄折麾蓋孫秀既立非常之事倫敬重焉秀任文帝為相國時所居內府事無巨細必諮而行倫之詔令秀改革有所與奪自書青紙為詔或朝令夕改者數四百官轉易如流矣時齊王冏河間王顒成都王穎並擁強兵各據一方秀知冏等必有異圖乃選親黨及倫故吏為三王參佐及郡守秀本異與張林有隙雖外相推崇內實忌之及林為衛將軍深怨不得開府潛與拲牋具說秀專權動違眾心而功臣皆小人撓亂朝廷可一時誅之拲以書白倫倫以示秀秀勸倫誅林倫請宗室會於華林園召林秀及王輿入因收林殺之誅三族及三王起兵討倫檄至倫秀始大懼遣其中堅孫輔為上將軍督諸軍以拒義師倫復受太子詹事劉琨節督河北將軍率步騎千人催諸軍與義軍戰于激水大敗退保河上劉琨燒斷河橋自義兵之起百官將士咸欲誅倫秀以謝天下秀知眾怒難犯不敢出省及聞河北軍悉敗憂懣音悶不知所為義陽王威勸秀至尚書省與八座議征戰之備秀從之使京城四品以下子弟十五以上皆詣司隸從倫出戰內外諸軍悉欲劫殺秀秀懼自崇禮闥走還下舍衛將軍趙泉斬秀等以徇使倫為詔曰吾為孫秀等所誤以怒三王今已誅秀其迎太上復位吾歸老于農畝傳詔以騶音鄒虞幡勑將士解兵文武官皆奔走莫敢有居者黃門將倫自華林東門出及拲皆還汶陽里弟於是以甲士數千迎天子于金墉百姓咸稱萬歲帝自端門入升殿御廣室送倫及拲付金墉城梁王彤表倫父子凶逆宜伏誅百官會議于朝堂皆如彤表遣尚書袁敞持節賜倫死飲以金屑苦酒倫慚以巾覆面曰孫秀誤我於是收拲馥虔詡付廷尉獄考竟百官是倫所用者皆斥免之臺省府衛僅有存者自兵興六十餘日戰及殺害近十萬人, WYG: ''}
