  - {type: variant, offset: 1924, length: 72, content: 戎東海王越高密王簡平昌公摸吳王晏豫章王熾襄陽王範右僕射荀藩等奉帝北征至安陽眾二十餘萬穎遣其將石超拒戰己未六軍敗績於湯陰矢及乘輿百官分散侍中嵇紹死, krp: 岳親則母弟體則仁長君人}
