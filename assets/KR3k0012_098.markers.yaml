  - {type: variant, offset: 52, length: 0, content: '', SBCK: 問舉哀成禮壬申即皇帝位大赦改元以衛將軍梁芬爲司徒雍州刺史麴允爲使持節領軍將軍録尚書事京兆太守索綝爲尚書右僕射五月詔琅瑘王曰朕以冲昧纂承洪緒未能梟夷凶逆奉迎梓宫枕戈煩􅁈肝心抽裂前得魏浚表知公帥先三軍巳據壽春傳檄諸侯恊齊威勢想今漸進巳逹洛陽涼州刺史張軌乃心王室連旗萬里巳到汧隴梁州刺史張光亦遣巴漢之卒屯在駱谷􅁗川驍勇其㑹如林間遣使適還具知平陽定問云幽并隆盛餘胡衰破然猶恃險當須大舉未知公今所到}
