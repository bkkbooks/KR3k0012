  - {type: variant, offset: 6, length: 0, content: '', SBCK: 公門軾路馬今蘧伯玉賢者也必不以暗昧廢禮公令人視之果如所言神異經曰東南有石井其方百丈上有二石闕俠東南面上有蹲熊有榜着闕題曰地户西北荒中有金闕髙百丈上有明月珠徑三丈光照千里中有金階西北入兩闕中名天門十洲記曰崑崙山有水精闕水經曰􅁗孝公築兾闕臨渭水在咸陽西四十里闕中記曰未央宫東有青龍闕北有􅀇武闕漢書所謂北闕者也建章宫圎闕臨北道鳯在上故號曰鳯闕也閶闔門内東出有折風闕一名别風瀬郷記曰老子廟前有兩石闕大闕髙九尺八寸下三重石鹿闕邊各有子闕山謙之丹陽記曰大興中議者皆言漢司徙許彧墓闕可從施之王茂􅀪弗欲後陪乗出宣陽門南望牛頭山兩峯曰天闕也豈煩改作帝然之鄧徳明南康記曰南康縣歸美山去縣七百里下有石城髙數丈逺望嵯峨靈闕騰空故老謂之神闕莊子中山公子牟謂瞻子曰身在滄海之上心居魏闕之下奈何瞻子曰重生重生則輕利中山公子曰雖知之未能自勝也瞻子曰不能自勝則從神無惡乎不能自勝而強不從者此之謂重陽重陽人無壽􅀋矣魏文帝歌曰長安城西有􅀟貟闕上有雙銅雀一鳴五􅂖生載鳴五榖熟}
  - {type: page-break, offset: 6, content: '', id: KR3k0012_SBCK_179-2b}
