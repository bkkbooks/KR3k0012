  - {type: variant, offset: 2264, length: 0, content: '', SBCK: 宫中有􅀇覽觀東汜觀清覽觀髙平觀廣望觀聽松觀見親觀髙樂觀陵雲緫章宣曲萬年等觀又云建業宫有迎風觀在縣南十五里宋武大明中起於石子墩上孫峻殺諸􅁑恪殷綝殺朱主皆於此又有徼道觀晉潘岳􅀜中記曰柘觀虎圈觀昆池觀上䕡觀朗池觀走馬觀湯禄觀觀則}
