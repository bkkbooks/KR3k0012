  - {type: page-break, offset: 3, content: '', id: KR3k0012_SBCK_179-2a}
  - {type: variant, offset: 3, length: 2, content: 六臺, WYG: 七闕觀闕崔豹古今注曰闕觀也所以標表宫門也其上可居登之可逺觀人臣將朝至此則思其所闕故謂之闕其上皆畫雲氣仙靈奇禽怪獸以示四方蒼龍白虎𤣥武朱雀並畫其形廣志曰闕缺也門兩邊缺然為道也周禮太宰曰以月吉懸治法於象魏注象魏二闕名也禮記曰昔者仲尼與於蜡賓事畢出遊於觀之上喟然而嘆仲尼之歎蓋歎魯也鄭𤣥云觀闕也左傳曰哀公三年司鐸火火踰公宮季桓子至命藏象魏曰舊章不可忘也象魏闕也以法令懸之遂謂其書為象魏公羊昭公二十五年傳云子家駒曰諸侯僣於天子大夫僣於諸侯乆矣昭公曰吾何僣矣哉子家駒曰設兩觀乘大輅注云禮天子外闕兩觀諸侯内闕一觀也又定公二年傳云夏五月壬辰雉門及兩觀災兩觀微也然則曷為不言雉門災及兩觀主災者兩觀也漢帝曰䍧牱郡有桂蒲闕又曰蓬萊方丈瀛洲此三山在海中諸僊人不死藥皆在焉黄金白銀為闕事具僊部又曰建章宮東鳯闕髙二十丈列女傳曰衛靈公與夫人夜坐聞有車聲至闕而息過又聞車聲夫人曰此必是蘧伯玉公曰何以知之曰妾聞禮}
