  - {type: variant, offset: 2718, length: 616, content: 里漢梁孝王所造今謂之赤堤城東有繁臺本吹臺也云蒼頡師子野所造後有繁姓居側因名焉西有崇臺即顏率雲蟬臺之下沙海之上是也又曰許州有丹書臺魏文帝受禪有黃鳥御丹書集此臺又曰衛州鹿臺在預城內紂自投火處紀年曰武王檎紂於南單之臺蓋鹿臺之異名也糟丘酒池去城南一里基跡猶存水經注曰固安縣金臺陂東西六十里南北五十步側陂西北有釣臺高十丈方可四十步陂北十餘步有金臺金臺高上東西八十許步南北加減高十餘丈昔慕容垂之為范陽也戍之即斯臺也有小金臺臺北有簡馬臺並悉高大秀峙相對翼臺左右水流經通長廡廣宇周旋波浦棟渚咸淪柱礎尚存是基構可得而尋訪諸耆舊咸言昭王禮賢廣延方士至如郭隗樂毅之徒鄒衍劇辛之儔宦遊歷說之民自遠而屆者多矣不欲令諸侯之客伺隙燕邦故脩建下都館之南垂言燕昭創之於前子丹踵之於後故彫墻敗館尚傳俊列之名雖無經紀可憑察其古跡似符宿傳矣又曰鳳谿水側有鳳皇止焉故謂之鳳皇臺又曰河水南至華陰又東北玉澗水注之南出玉溪北流經皇天固三面壁立高千許仞漢世祭天於其上因名之為皇天固上有漢武帝思子臺及泉鳩里加兵仞於太子者上憐太子無辜乃作思子宮為歸來望思之臺於湖師古曰言巳望而思之無太子之魂歸來也其在今湖城縣之西閔鄉縣之東基阯猶存也天下聞而悲之又曰睢陽城故宮東即梁之舊池也周五六百步水列鈞臺池東又有一臺世謂之清冷臺北城憑隅又結一池臺晉灼曰或說平臺在城中東北角亦或言兔園在平臺側如淳曰平臺離宮所在今城東二十里有臺寬廣而不甚極高俗謂之平臺余按漢梁孝王傳稱王以功親為大國築東苑方三百里廣睢陽城, SBCK: ''}
