  - {type: variant, offset: 13, length: 2, content: 秦始, SBCK: 崑崙第九層山形漸狹小下有芝田蕙囿皆有數百湏羣仙種耨焉傍有瑶臺十二各廣千歩皆五色玉爲臺基最下層有流精闕直上四十丈有風雲雨師闕觀漢書成紀云孝成帝元太子也母曰王}
  - {type: variant, offset: 13, length: 2, content: 秦始, WYG: 崑崙第九層山形漸狹小下有芝田蕙圃皆數百頃羣仙種耨焉傍有瑶臺十二各廣千步皆五色玉為臺基最下層有流精闕直上四十丈有風雲雷雨師闕觀釋名曰觀於上觀望也左傳曰哀公十七年傳云衛侯夢於北宮見人登昆吾之墟注云衛有觀在古昆吾之墟今濮陽城中漢書成帝紀曰孝成帝元帝太子也母曰王}
  - {type: page-break, offset: 13, content: '', id: KR3k0012_WYG_179-4b, image: WYG0894/WYG0894-0603b.png}
  - {type: variant, offset: 13, length: 2, content: 秦始, krp: 崑崙第九層山形漸狹小下有芝田蕙囿皆有數百湏羣仙種耨焉傍有瑶臺十二各廣千歩皆五色玉爲臺基最下層有流精闕直上四十丈有風雲雨師闕觀漢書成紀云孝成帝元太子也母曰王}
  - {type: variant, offset: 16, length: 2, content: 起雲, SBCK: 后帝在太子家生甲觀􅀞堂應劭注云甲觀在太子宫甲地主用乳生也顔師古曰􅀞堂但􅀞飾室中宫殿通有綵􅀞也又曰甘露二年幸萯陽宫在鄠屬玉觀属玉水鳥似鵁鶄以名􅀚也後漢書曰丁鴻字孝公肅宗詔鴻與廣平王羡及諸儒樓望成封桓郁賈逵等論定五經同異於北宫立白虎觀廣平王羡}
  - {type: variant, offset: 16, length: 2, content: 起雲, WYG: 后帝在太子家生甲觀畫堂應劭注云甲觀在太子宮甲地主用乳生也顔師古曰畫堂但畫飾室中宮殿通有彩畫也又宣帝紀曰甘露二年幸萯陽宫在鄠屬玉觀屬玉水鳥似鵁鶄以名觀也後漢書曰丁鴻字孝公肅宗詔鴻與廣平王羨及諸儒樓望成封桓郁賈逵等論定五經同異於北宫白虎觀廣平王羨漢}
  - {type: page-break, offset: 16, content: '', id: KR3k0012_WYG_179-5a, image: WYG0894/WYG0894-0603c.png}
  - {type: variant, offset: 16, length: 2, content: 起雲, krp: 后帝在太子家生甲觀畫堂應劭注云甲觀在太子宫甲地主用乳生也顔師古曰畫堂但畫飾室中宫殿通有綵畫也又曰甘露二年幸萯陽宫在鄠屬玉觀属玉水鳥似鵁鶄以名觀也後漢書曰丁鴻字孝公肅宗詔鴻與廣平王羡及諸儒樓望成封桓郁賈逵等論定五經同異於北宫立白虎觀廣平王羡}
  - {type: variant, offset: 19, length: 2, content: 臺窮, SBCK: 帝子東􅀚記曰與太常樓望少府成封屯􅀐校尉桓郁衛士令賈逵等集義白虎門名於門立觀因以名焉使五官中郎將魏應主承制問難侍中淳于恭奏上帝親制臨决鴻以才論最明儒者稱之帝數嗟美焉時人歎曰殿中無􅀟丁孝公又章帝紀曰永平元年長水校尉儵奏言先帝大業當以時施行欲使諸儒共正經義頗令學者得以自助於是下太常將軍大夫􅀶士議郎郎官及諸王諸儒㑹白虎觀講議五經同異又曰時謂東觀爲老氏藏室注老子爲柱下史}
  - {type: page-break, offset: 19, content: '', id: KR3k0012_SBCK_179-3b}
  - {type: variant, offset: 19, length: 2, content: 臺窮, WYG: 帝子也東觀記曰與太常樓望少府成封屯騎校尉桓郁衛士令賈逵集議也白虎門名於門立觀因以名之焉使五官中郎將魏應主承制問難侍中淳于㳟奏上帝親稱制臨决鴻以才髙論難最明諸儒稱之帝數嗟羙焉時人嘆曰殿中無雙丁孝公東觀記曰上歎嗟其才號之曰殿中無雙丁孝公賜錢二十萬續漢書亦同而此書獨作時人嘆也章帝本紀曰永平元年長水校尉儵奏言先帝大業當敬以時施行欲使諸儒共正經義頗令學者得以自助於是下太常將大夫博士議郎郎官及諸生諸儒㑹白虎觀講議五經同異又曰時謂東觀為老氏藏室注老子為柱下史}
