  - {type: variant, offset: 444, length: 0, content: '', SBCK: 齊書王儉傳云宋明帝太始六年置㹅明觀以集學士或謂之東觀置東觀􅀕酒一人㹅明訪舉二人儒􅀇史四科科置學士十人其餘吏下各有差是歳省㹅明觀於儉宅開學士館以㹅明簿書充之陳書後主紀云帝令采木湘州擬造正􅃦栰至牛渚機盡没旣而漁人見栰於海上復起齊雲觀國人歌曰齊雲觀㓂來無際畔後魏書髙祖紀下云十五年五月議改律令於東明觀親折疑獄又道武帝紀云天興三年起紫極殿􅀇武樓風涼觀石池鹿苑臺又匈奴劉聦傳云平陽地震崇明觀䧟爲池水赤如血赤氣至天赤龍􅁬迅而云輿地志云丹陽郡建康縣臺城齊文惠太子治􅀇圃有明月觀婉轉橋徘徊廊囿內作浄名精舎又曰丹陽郡枺陵縣新亭隴有逺望樓又名勞勞樓末改爲臨滄觀行人分别之所又曰洛陽有廣望觀閬風觀萬世觀脩靈觀臨啇觀百葉抄魏築惣章觀建翔鳯於其上使八方才人六宫女尚書居之引􅂖水過九龍殿前玉井綺欄水轉百戯又曰石虎起靈臺九殿女官十有八等又女妓一千爲鹵簿皆着紫綸巾熟錦袴金銀鏤帶五文織成靴遊於戯馬觀漢封禪儀泰山東南有山名日觀鷄一鳴時見日始出長三丈􅁗觀者望見長安吴觀者望見㑹稽周觀者望見齊三輔黄圖云漢武帝起鳷鵲觀又起神明觀馺娑觀甘泉苑起仙人觀縁山谷行至雲陽三百八十里入右扶風周迴五百四十里又曰武帝起鳷鵲觀神明觀弩法觀集靈觀仙門觀陽禄觀漢宫殿}
