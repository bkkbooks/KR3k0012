  - {type: variant, offset: 444, length: 0, content: '', WYG: 齊書王儉傳曰宋明帝太始六年置總明觀以集學士或謂之東觀置東觀祭酒一人總明訪學二人儒元史四科科置學士十人其餘吏下各有差是歳省總明觀於儉宅開學士館以總明簿書充之陳書後主紀云帝令采木湘州擬造正寢栰至牛渚磯盡没既而漁人見栰於海上復起齊雲觀國人歌曰齊雲觀寇來無際畔後魏書髙祖紀下云十五年五月議改律令於東明觀親折疑獄又道武帝紀云天興三年起紫微殿元武樓風凉觀石池鹿苑臺又匈奴劉聰傳云平陽地震崇明觀陷為池水赤如血赤氣至天赤龍奮迅而去輿地志曰丹陽郡建康縣臺城齊文惠太子治園圃有明月觀婉轉橋徘徊廊圃内作淨名精舍又曰丹陽郡秣陵縣新亭隴有逺望樓又名勞勞樓宋改為臨滄觀行人分别之所又曰洛陽有廣望觀閬風觀萬世觀修靈觀臨商觀百葉抄魏築總章觀建翔鳯於其上使八方才人六宫女尚書居之引榖水過九龍殿前玉井綺欄水轉百戯又曰石虎起靈臺九殿女官十有八等又女妓二千為鹵簿皆著紫綸巾熟錦袴金銀鏤帶五紋織成靴遊於戯馬觀漢封禪儀泰山東南有山名日觀雞一鳴時見日始出長三丈秦觀者望見長安吳觀者望見㑹稽周觀者望見齊三輔黄圖云漢武帝起鳷鵲觀又起神明觀馺娑觀甘泉苑起仙人觀緣山谷行至雲陽三百八十里入右扶風周廻五百四十里又曰武帝起鳷鵲觀神明弩法觀集靈觀使門觀陽觀祿觀漢宫殿}
