  - {type: variant, offset: 3336, length: 627, content: 里大治宮室為複道自宮連屬於平臺三十餘里複道自宮東出楊州之門左陽門即睢陽東門也連屬於平臺則近矣屬之城隅則不能是知平臺不在城中也又曰景外臺劉表之所築也表性好鷹每登此臺歌野鷹自來又曰睢陽城中有掠馬臺東有一臺謂之清冷臺又曰長平城在上黨郡南秦壘在城西秦抗趙眾收頭顱築臺於此崔嵬桀起今乃號曰白起臺山海經曰沃民國有軒轅臺又曰帝嚳堯丹朱帝舜各二臺臺四方在崑崙東北列仙傳曰蕭史者秦穆公時人善吹蕭能致孔雀白鵠穆公有女字弄玉好之公以妻焉遂教弄玉作鳳鳴居數年吹似鳳聲鳳皇來止其屋為作鳳臺夫婦止其上數年皆隨鳳飛去秦為作鳳女祠於雍宮時有簫聲焉成都記曰望鄉臺蜀王秀所築也又曰思妻臺在梓潼縣五丁於此山拔虵山崩殺五丁並殺秦王女因名之三輔宮殿簿曰長樂宮有臨華臺神仙臺西征記曰揚州雷陂有臺高二丈南兗州記即吳王濞之釣臺也地理志曰北地郡有之回臺京西北四百里嵩高山記曰山有玉女臺云漢武帝見三仙玉女因以名臺益州記曰鴈橋東有嚴君平卜處土臺高數丈南雍州記曰高齊之後有堂堂西有射堂五間射堂南有大池池上有臺名曰樂喜臺荊州記曰江陵縣東有天井臺飛軒孤暎背邑面河實郊躔遊憩之佳處也襄沔記曰襄縣南五里鳳林山側宋隋王劉誕鎮北有龍兒見此池中後雍州刺史韋叡於此立放生臺越絕書曰夫差起姑蘇之臺三年聚材五年乃成高見三百里太史公登之以望五湖伏琛齊地記曰平業城西北八十里有平望亭亦古縣也或云秦始皇為望海臺述征記曰陵雲臺在明光殿西高八丈累塼作道通至臺上登廻廻眺究觀洛邑暨南望少室亦山丘之秀極也又曰蠡臺梁孝王所築於兔園中廻道似蠡因名之, SBCK: 九}
