  body:
  - {type: variant, offset: 3, length: 2, content: 六臺, SBCK: 七闕觀闕崔豹古今注曰闕觀也於前所以標表宫門也其上可居登之可逺觀人臣將朝至此則思其所闕故謂之闕其上皆􅀞雲氣仙靈竒禽恠獸以示四方蒼龍白虎􅀇武朱雀並􅀞其形釋名曰觀於上觀望也廣志曰闕缺也門兩邊缺然爲道也周禮太宰以正月懸治法於象魏禮記曰昔者仲尼與於蜡賔事畢遊于觀之上喟然而嘆仲尼之歎蓋歎魯也鄭􅀇云觀闕也左傳曰哀公三年司鐸火踰公宫季桓子至命藏象魏曰舊章不可忘也象魏闕也法令懸之故謂其書爲象魏又曰哀十七年傳云衛侯夢于北宫見人登昆吾之觀注云衛有觀在古昆吾氏之墟也今濮陽城公羊昭二十五年傳云子家駒曰諸侯僣於天子大夫僣於諸侯乆矣昭公曰吾何僭矣哉子家駒曰設兩觀乗大輅注云禮天子諸侯內闕一觀也又定二年傳云夏五月壬辰雉門及兩觀災兩觀微也然則􅂚爲不言雉門災及兩觀主災者兩觀也漢書曰䍧牱郡有桂浦闕又曰蓬萊方丈瀛洲此三山在海中諸仙人不死藥皆在焉黄金白銀爲闕事具仙部又曰建章宫東鳯闕髙二十丈列女傳曰衛靈公與夫人夜坐聞有車聲至闕而息過又聞車聲夫人曰此必是蘧伯玉公曰何以知之曰妾聞禮}
