  - {type: variant, offset: 144, length: 2, content: 燕昭, SBCK: 髙彪除郎中校書東觀後遷外黄令􅀞彪形像以勸學者又曰靈帝起四百尺觀於河亮道造萬金堂於西園又造南宫玉堂築廣城苑魏志曰明帝作凌霄觀始構有鵠巢其上侍中髙堂隆曰起闕而鵠巢不得居之象又曰明帝置崇文觀徴善屬文者以充之吴志孫和傳云和爲太子􅀍廢驃􅀐將軍朱據尚書僕射屈晃率諸將吏泥首自􅅞連日詣闕請和權登白爵觀見甚惡之蜀志云李輔字􅀇政爲牙門討破羗虜築平羗觀于􅁗亭晉書元紀曰太興元年十一月乙夘日夜出髙三丈中有赤青珥詔曰天災譴誡所以彰朕之不徳也羣公卿士各上封事具陳得失無所諱將親覽焉新作聽訟觀又劉曜載記曰曜立太學於長樂宫東簡百姓年}
