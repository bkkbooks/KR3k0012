  - {type: variant, offset: 2371, length: 3, content: 鄭州故, SBCK: 上陽宫有上清觀潘安仁西征賦云圖萬載而不傾奄摧落於十紀擢百尋之曽觀􅀆今數仞之餘趾左太冲吴都賦云慮紫宫以營室廓廣庭之漫漫寒暑隔闊於􅃉宇虹蜺回帶於雲觀何平叔景福殿賦云於是碣以髙昌崇觀表以建城峻廬岧嶤岑立崔嵬巒居宋玉髙唐賦序云昔者楚襄王與宋玉遊於雲夢之臺望髙唐之觀}
