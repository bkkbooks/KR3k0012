  - {type: variant, offset: 217, length: 224, content: 物之影如鏡焉碎石片片皆能照人而質方一丈則重一兩昭王舂此石為泥泥於通霞之臺與西王母遊居此臺上常有鍾鼓琴瑟鳴神光照耀如日月之出臺左右種恒春之樹葉如蓮花芬芳似桂花隨四時之色又曰魏明帝即位五年起靈禽之園方國所獻異鳥殊獸皆畜此園也時昆明國貢嗽金鳥國人云其地去涼州九千里出此鳥形如雀色黃毛羽柔密常翱翔海上羅者得之以為至瑞聞大魏之德被於荒遠故越山航海來獻大國帝得此鳥畜於靈禽之園飴以真珠飲以龜腦鳥常吐金屑如粟鑄之以為器服昔漢武時有獻大雀此之類也此鳥畏雪霜乃起小屋, SBCK: 立賔遐觀}
