  - {type: variant, offset: 801, length: 1459, content: 隆等諫之不聽累年而畢又曰魏文帝時黃星炳夜乃起畢昂臺以祀星又曰吳主潘夫人之父坐法夫人輸入織室夫人容態少儔為江東絕色同幽者百餘人有司聞於吳主使圖其容貌夫人憂慼不食減瘦改形工人寫其真狀以進吳主吳主見圖而嘉之以琥珀如意撫桉則折嗟曰此神女也愁貌尚能感人呪在懽樂乃命雕輪就織室納于後宮果以姿色獲寵每與夫人遊昭宣之臺恣意幸適既盡酣醉唾於玉壺中使侍婢寫於臺下得火齊指環即挂石榴枝上因其處起臺名曰環榴臺時有諫者云今吳蜀爭雄還劉之名特為妖乎權乃翻其名為榴環臺也又與夫人遊釣得大魚吳王喜而夫人曰昔聞泣魚今乃為喜有喜必憂以為深誡至末年漸相譖毀稍見離退時人謂夫人知幾之神矣釣臺今猶基存漢武帝內傳曰鉤弋夫人謂帝曰妾相運正應為陛下生一男男年七歲妾當死矣今年必不得歸願陛下自愛言終遂卒既殯屍香聞十餘里因葬之雲凌帝甚哀悼又疑其非常人乃發塚開視空棺無屍唯衣履存焉乃起通靈臺於甘泉常有一青鳥集臺上往來至宣帝時止矣又曰漸臺高三十丈南有辟門三層內殿階陛咸以玉為之鑄銅鳳皇高五丈飾以黃金於樓屋上洞冥記曰武帝起招仙之臺於明庭宮北明庭宮者甘泉之別名也於臺上撞碧玉之鍾掛懸黎之磬吹霜滌之箎唱來雲依日之曲使臺下聽而不聞管歌之聲又曰太初二年起甘泉望風臺於臺上得珠望之如照且因名照月珠又曰建元二年帝起騰光臺以望四遠常有飛光如星集於臺上亦曰經星臺又曰帝初起神明臺時掘地入三十丈得泉水色黃傍有人居無日月光明晝夜以火照中有人食土飲水服赭布之衣漢人問汝何時居此荅曰商王無道使兆民入地千丈求青堅之土以作瓦起瑤宮金堂二人皆以繩縋入地裏負畚器取土多有壓陷死者今猶二人在耳漢人問何得獨存荅曰我以玉為衣玦金為環身有金玉故心氣不滅漢人問汝欲更出為人否荅曰食土飲泉與螻蟻為伍寧望日月乎乃引出三日自死骨肉靡靡成灰唯心如彈丸大堅如石以物扣之則是乾血耳述異記曰郭景純注爾雅臺今在夷陵郡又曲阜縣南十里有孔子春秋臺又曰吳王夫差築姑蘇臺三年乃成周環詰屈橫亙五里崇飾土木殫耗人力宮妓數千人上別立春宵宮為長夜飲造千石酒鍾又作大池池中造青龍舟舟陳妓日與西施為水嬉又於宮中作靈館館娃閤銅溝玉檻宮之欄檻皆珠玉飾之吳既敗越王勾踐於會稽山上地方千里勾踐得范蠡之謀躬教民以耕桑延四方之士作臺于外而館賢士會稽之上有越臺又曰晉永嘉之亂既過江諸公主不得隨去安陽公主與平城公主等奔入兩河界悉為民家妻常怏怏不悅故有思鄉之志村人感之共築一臺以居之謂之公主望鄉之館至今巋然王朗懷舊賦云將軍出塞之臺公主望鄉之館是也漢武帝遣將軍王濆戍邊及帝崩王莽篡逆濆與莽有隙遂留不敢歸因亡入胡中士卒相率築臺為望鄉之處又曰會稽山有虞舜巡狩臺臺下有望陵祠帝舜南巡葬於九疑山民思之故立祠中都郭門古宮存焉宮前有堯臺舜館銘記皆古又曰中山有韓夫人愁思臺望子陵也又曰燕昭王為郭隗築臺今在幽州燕王故城中土人呼為賢士臺亦謂之招賢臺郡國志曰濮州壁玉臺穆天子為盛姬所造也今旁地猶多珉石又曰汝陰縣富陂城即詩之汝墳也俗謂之女郎臺又曰魏硯子臺云是張儀冢似硯也又曰曹州麟城南有望麟臺園客祠庭種香草有五色神蛾得六大璽絲六十日始盡處又曰洺州溫明臺後漢世祖晝臥此殿耿弇入造床下齊勸即位處又曰滎陽縣有太武城高祖與項氏各在一城東城有高壇即項羽置太公於上處今名項羽堆亦呼為太公臺又曰金河府青臺方山北五里文明太后恒於六宮遊戲因歌曰青臺雀青臺雀緣山採花額頸著其曲並在大樂部又曰金河府自平城遙登臺出渴鉢口梁元帝橫吹詩曰朝登青陂道暮宿白登臺天女神即生後魏始祖神元也又曰衛州苑城北十四里沙丘臺也俗稱姐巳臺去二里有一臺南臨淇水俗稱為上宮也又曰鄆州須昌縣有犀丘城青陵臺宋王令韓憑築者又曰南頓縣有光武臺應琚宅在其側, SBCK: ''}
