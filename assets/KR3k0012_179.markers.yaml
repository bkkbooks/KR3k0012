  - {type: variant, offset: 6, length: 0, content: '', WYG: 公門式路馬今蘧伯玉賢者也必不以暗昧廢禮公令人視之果如所言神異經曰東南有石井其方百丈上有二石闕夾東南面上有蹲熊有榜著闕題曰地户西北荒中有金闕髙百丈上有明月珠徑三丈光照千里中有金階西北入兩闕中名天門十洲記曰崑崙山有水精闕水經曰秦孝公築冀闕臨渭水在咸陽西四十里關中記曰未央宮東有青龍闕北有𤣥武闕漢書所謂北闕者也建章宫圓闕臨北道鳯在上故曰鳯闕也閶闔門内東出有折風闕一名别風瀨鄉記曰老子廟前有兩石闕大闕髙九丈八尺下三重石鹿闕邊各有老子祠山謙之丹陽記曰大興中議者皆言漢司徒許彧墓闕可徙施之王茂宏弗欲後陪乘出宣陽門南望牛首山兩峯曰天闕也豈煩改作帝然之鄧德明南康記曰南康縣歸美山去縣七百里下有石城髙數丈逺望嵯峨靈闕騰空故老謂之神闕莊子中山公子牟謂瞻子曰身在江海之上心居乎魏闕之下奈何瞻子曰不能自勝則從神無惡乎不能自勝而强不從者此之謂重傷重傷之人無壽類矣魏文帝歌曰長安城西雙圓闕上有一雙銅雀宿一鳴五榖生再鳴五穀熟}
