  - {type: variant, offset: 1821, length: 9, content: 豁然意解沉痾頓愈又, SBCK: 爲狂也丗說曰諸􅁑厷在西朝少有清譽尤爲王夷甫所重時論亦以擬王氏後爲繼母族黨所䜛論之爲狂將逺徙友人王夷甫之儔詣檻與别厷問王曰朝廷何以徙我王曰言卿狂逆厷曰逆則冝殺狂則何所徙繆襲撰仲長統昌言表稱統曰統性俶儻敢言不拘小節毎州郡命召輙稱疾不就語黙無常時人或謂之狂癲說文曰癲病也莊子曰流脉並作則爲驚怖陽氣獨上則爲癲病}
  - {type: variant, offset: 1821, length: 1, content: 豁, WYG: 自蔽人不見已愷之喜引以自蔽𤣥就溺焉愷之嘗在桓温府常云愷之體中癡黠各半合而論之正得平耳故俗𫝊愷之有三絶才絶癡絶畫絶後魏書曰太祖謂尚書崔𤣥伯曰蠕蠕而蠢反之民昔來號為頑囂每來抄掠駕㹀牛奔道驅犍牛隨之㹀牛伏不能前其部人教其以犍牛易之者蠕蠕曰其母尚不能行而况其子終於不易遂為敵所虜隋書曰楊𤣥感司徒素之子也體貌容偉美鬚髯少時晩成人多謂之癡其父母謂所親曰此兒不癡也及長好讀書便騎射以父軍功位至柱國唐書曰竇威家世勲貴諸昆弟並尚武藝而威躭玩文史介}
