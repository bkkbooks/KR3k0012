  - {type: variant, offset: 1812, length: 0, content: '', WYG: 惟下嘗醉晩日負杖攜家賓子弟至婁湖苑逢王景文子約張目視之曰汝是王約耶何乃肥而癡約曰汝沈昭畧耶何乃瘦而狂昭畧撫掌大笑曰瘦已勝肥狂亦勝癡奈何王約奈汝癡何魏志曰明悼毛皇后父嘉本典虞車工卒暴富貴帝令朝臣㑹其家飲宴其容止舉動甚癡騃語輒自謂侯身時人以為笑晉書曰顧愷之字長康晉陵無錫人尤善丹青嘗以畫一厨糊題其前寄桓𤣥皆素所珎者𤣥乃發其厨後竊取畫而緘識如舊以還之紿云未開愷之}
