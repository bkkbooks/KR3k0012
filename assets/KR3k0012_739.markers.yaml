  - {type: variant, offset: 1728, length: 1, content: 樂, SBCK: 王長文字德叡}
  - {type: variant, offset: 1728, length: 0, content: '', WYG: 王長文字徳叡廣漢郡人世為郡守少放蕩不覊檢益州五辟公府再辟皆不就陽狂不詣郡縣舉致改服逃出舉州追求乃於城都賣熱布弟見長文蹲踞地嚙胡餅刺史知其不居禮送還家英雄記曰向栩字甫興性卓詭不倫恒讀老子狀如學道又似狂生好披髮着襂頭常於竈北坐板床上如是積久板乃有膝踝足指之處楚國先賢傳曰石偉字公操南郡人仕呉拜光禄大夫呉建威將軍王戌親詣偉大康二年詔以偉為議郎加二千石秩以終厥身偉遂陽狂及亡不受晉華陽國志曰犍為費昭不肯仕公孫述乃漆身為厲陽狂以避之人謂之狂史記曰東方朔在人主左右諸郎半呼之狂人人主聞之曰今朔在事無足為行者若等安能及之哉朔行殿中郎謂之曰人皆以先生為狂朔曰如朔等所謂避世於朝廷間者漢書曰酈食其陳留髙陽人也沛公畧地陳留沛公麾下騎士適食其里中子騎士歸食其謂曰臣里中有酈生人皆謂之狂生自謂我非狂騎士如所戒沛公召之後漢書曰延熹末黨事將作袁閎遂散髮絶世欲投迹深林以母老不冝逺遁乃築土室四周於庭不為户自牖納飲食而已且於室中東向拜母母思閎時徃就視母去便自掩門兄弟妻子莫得見也及母殁不為制服設位時莫能名或以為狂生范􅁮後漢書曰仲長統倜儻不務小節語嘿無常時人謂之狂生南史曰王僧達所為非法坐免官後孝武獨召見傲然了不陳遜惟張目而視及出帝歎曰王僧達非狂如何乃戴面向天子北史曰任城王城時髙肇當朝猜忌賢戚澄為肇間搆常恐不令乃終日昏惰以示荒敗所為詭越時謂為狂唐書曰蘇世長嘗從髙祖幸涇陽校獵至髙陵合圍是日大獲陳禽獸於旌門髙祖入御營顧謂朝臣曰今畋}
