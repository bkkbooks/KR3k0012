  - {type: variant, offset: 1873, length: 1, content: 敢, SBCK: 慧}
  - {type: variant, offset: 1873, length: 482, content: 敢不飲其日便得病云虵入腹郴召宣於故處設酒盃中有一虵因謂宣此乃壁上弓影耳非他怪宣意遂解甚夷懌又曰皇甫謐字士安因病服寒食散而性與之忤每委頓不倫嘗悲恚叩刃欲自殺叔母諫而止謐嘗上䟽曰久嬰篤疾軀半不仁右腳偏小十有九載又服寒食藥違錯節度辛苦茶毒于今七年隆冬裸袒食冰當暑煩悶加以咳逆或若溫瘧或類傷寒浮氣流腫四支酸重於今困劣宋書曰羊欣有病不服藥飲符水而已兼善醫術撰藥方數十卷沈休文宋書曰謝述有心虛疾性理時或乖謬除吳郡太守以疾不之官裴子野宋略曰殷景仁入居西州疾篤上為之累息西州道上不得有車聲謝綽宋拾遺曰宋愨表曰臣昔貧賤時嘗疾病家人為臣齋勤苦七日臣晝寢夢見一童子青衣持縑廣數寸與臣臣問之用此何為荅曰西王母符也可服之服符竟便覺一二日病差梁書曰范雲忽中疾居二日半召醫徐文伯視之伯曰緩之一月乃復欲速即時愈止恐二年不復可救雲曰朝聞道夕死可矣而況二年文伯乃下火而壯焉重衣以覆之有頃許汗流於背即起二年果卒南史曰褚澄善醫術建元中為吳郡太守百姓李道念以公事到郡澄見謂汝有重病荅曰舊有冷病至今五年眾醫不差澄為診謂曰汝病非冷非熱當是食白瀹雞子過多所致今取蒜一升煮服乃吐一物如升涎裹之動開看是雞雛羽翅爪距具, WYG: ''}
