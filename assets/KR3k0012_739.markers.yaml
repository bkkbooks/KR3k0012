  - {type: variant, offset: 27, length: 2, content: 疽黃, SBCK: 白虎通曰天子疾稱不悆諸侯稱􅀒子大夫稱􅀒薪士稱犬馬不悆者不復預政也􅀒子者諸侯子民今不復子民也􅀒薪犬馬皆謙也楊泉物理論曰凢病可治也人不可治也體羸性弱不堪藥石或剛􅁀狷急喜怒不節或情慾放縱貪淫嗜食此皆良醫不能加功焉夫君子}
  - {type: variant, offset: 27, length: 2, content: 疽黃, WYG: 凡人相見及書問者曰無疾病邪案上古之時草居野宿恙噬虫也善食人心凡相勞問曰無恙乎非為}
