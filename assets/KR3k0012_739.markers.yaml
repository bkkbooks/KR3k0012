  - {type: 'tls:seg', offset: 16, content: '', id: KR3k0012_CHANT_739-1a.7}
  - {type: variant, offset: 17, length: 0, content: '', SBCK: 其身故九窮寥寥然虚曲失其適以害其生也雖有彭祖猶不能爲也太公金匱曰丁侯不朝武王乃􅀞丁侯三旬射之丁侯病大劇使人卜之祟在周恐懼乃遣使者請之於武王願舉國爲臣虜武王許之歸爲太師尚父謂使曰歸矣吾巳告諸神言丁侯前畔義今巳遣人來降勿復過也使者辭去歸至丁侯病稍愈四夷聞之皆懼各以其職來貢六韜曰欲伐大國行且有期王寢疾十日不行太公􅀒之而起之曰行已有期君不發天子聞之國亡身死胡不勉之王允焉如無病者􅀃苑曰邴􅁻有隂德於孝宣帝微時及即位衆莫知亦不言帝將封之㑹􅁻病甚將使人}
  - {type: page-break, offset: 17, content: '', id: KR3k0012_SBCK_739-1b}
  - {type: variant, offset: 17, length: 0, content: '', krp: 其身故九窮寥寥然虚曲失其適以害其生也雖有彭祖猶不能爲也太公金匱曰丁侯不朝武王乃畫丁侯三旬射之丁侯病大劇使人卜之祟在周恐懼乃遣使者請之於武王願舉國爲臣虜武王許之歸爲太師尚父謂使曰歸矣吾巳告諸神言丁侯前畔義今巳遣人來降勿復過也使者辭去歸至丁侯病稍愈四夷聞之皆懼各以其職來貢六韜曰欲伐大國行且有期王寢疾十日不行太公負之而起之曰行已有期君不發天子聞之國亡身死胡不勉之王允焉如無病者說苑曰邴吉有隂德於孝宣帝微時及即位衆莫知亦不言帝將封之㑹吉病甚將使人}
