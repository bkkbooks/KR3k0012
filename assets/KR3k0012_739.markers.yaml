  - {type: variant, offset: 632, length: 577, content: 夢疾為二豎子曰彼良醫也懼傷我焉逃之其一曰居肓之上膏之下若我何醫至曰疾不可為也在肓之上膏之下攻之不可達之不及藥不至焉不可為也公曰良醫也厚為之禮而歸之又昭上曰晉侯有疾鄭伯使公孫僑如晉聘且問病叔向問焉曰寡君之疾病卜人曰實沉臺駘為祟史莫之知敢問此何神也子產曰若君身則亦出入飲食哀樂之事也山川星辰之神又何為焉言實沉臺駘不為君疾僑聞之君子有四時朝以聽政晝以訪問夕以脩令夜以安身於是節宣其氣勿使有所壅閉湫子小切底以露其體湫集底帶也露羸也一之則血氣集滯而體羸露今無乃一之則切生疾矣又昭上曰晉侯有疾求醫於秦泰伯使醫和視之曰疾不可為也是謂近女室疾如蠱蠱惑也非鬼非食惑以喪志惑女色而失志良臣將死天命不祐良臣不君過故將死而天不祐公曰女不可近乎對曰節之天有六氣降生五味發為五色徵為五聲淫生六疾事具醫門又昭二曰鄭子產聘于晉韓宣子曰寡君寢疾今夢黃熊奴才反入于寢門其何厲鬼也對曰堯殛鯀于羽山其神化為黃熊以入于羽淵實為夏郊三代祀之晉為盟主其或未之祀乎韓子祀夏郊晉侯有閒春秋穀梁傳曰季孫行父禿晉郄克跛孫良父眇曹公子手僂同聘于齊齊使禿者御禿者跛者御跛者眇者御眇者僂者御僂者蕭同叔子處臺而笑之客不悅相立胥閭而語移日不解齊有知者曰齊患必自此始也麋俗胥閭門名也御迎也春秋公羊傳曰衛縶不立惡疾也何休解曰惡疾聾盲之屬國語魯語曰子叔聲伯如晉郄犨欲與之邑弗受郄犨晉卿苦成叔也歸鮑國謂之曰子何以辭苦成叔之邑對, SBCK: ''}
