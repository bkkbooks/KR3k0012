  - {type: variant, offset: 1269, length: 2, content: 啟予, SBCK: 谷氣多痺立氣多狂又曰今夫狂者無憂聖人亦無憂不知禍福也又曰不知道者釋其所巳有而求其所未得故福至則喜禍至則怖不悔巳之所生乃反怨人不喜則憂謂之狂生又曰士有禍則詘有福則盈有過則悔有功則矜遂不知反此之謂狂􅀓子曰惡劉曄於魏明帝曄不盡忠善伺上意所趣而合之帝如言以驗之果得情從此踈焉曄遂發狂出爲大鴻臚以憂死諺曰巧詐不如拙誠信矣抱扑子曰食莨蕩令人狂荒不可謂人本有荒狂山海經曰觀水多鰩音遥魚其味酸食之巳狂越絶書曰慧種生聖癡種生狂桂實生桂桐實生桐禰衡别傳曰衡爲皷吏祼身辱曹操孔融復見操􅀃衡狂疾令求得自謝裴揩別傳曰石崇嘗與裴揩孫綽酣宴而綽慢節過度崇責之揩曰季舒酒狂四海所知}
  - {type: page-break, offset: 1269, content: '', id: KR3k0012_SBCK_739-6a}
  - {type: variant, offset: 1269, length: 2, content: 啟予, WYG: 谷氣多痺邱氣多狂又曰今夫狂者無憂聖人亦無憂不知禍福也又曰不知道者釋其所已有而求其所未得故福至則喜禍至則怖不悔已之所生乃反怨人不喜則憂謂之狂生又曰士有禍則詘有福則盈有過則悔有功則矜遂不知反此之謂狂傳子曰有惡劉煜於魏明帝謂􅁮不盡忠善伺上意所趣而合之帝如言以驗之果得情從此疎焉煜遂發狂出為大鴻臚以憂死諺曰巧詐不如拙誠信夫抱朴子曰食莨蕩令人狂荒不可謂人本有荒狂山海經曰觀水多鰩音遥魚其味酸食之已狂越絶書曰慧種生聖癡種生狂桂實生桂桐實生桐禰衡别傳曰衡為鼔吏祼身辱曹操孔融復見操説衡狂疾令求得自謝裴楷别傳曰石崇嘗與裴楷綷綽醉宴而綽慢節過度崇責之楷曰季舒酒狂四海所知}
