  - {type: variant, offset: 367, length: 2, content: 樂正, SBCK: 王隱晉書曰吴彦給役陸抗抗欲拔之患衆不聽乃悉請當爲將者入坐以試勇怯有一狂人拔刀跳梁來向坐中餘者皆走唯彦獨坐舉抗禦之狂人乃退衆服其勇沈約宋書曰􅀽􅉖孫著妙德先生傳曰嘗謂周旋人曰昔有一國國中一水號曰狂泉國人飲此水無不狂也唯國君穿井汲獨得無恙國人旣狂謂主不狂爲狂於是聚謀共執國主療其狂疾火艾針藥莫不必具國主不任其苦於是到泉所酌水飲之飲畢便狂君臣大小其狂若一衆乃懽然我旣不狂難以獨立比亦欲試飲此水宋書曰顔延之文帝嘗問以諸}
