  - {type: variant, offset: 2756, length: 521, content: 未暇治天下也又曰子來有病喘喘然將死其妻子環而泣之子黎往問之倚其戶與之語曰偉哉造化以女為鼠肝乎以女為蟲臂乎子來曰父母於子東西南北唯命之從陰陽於人不翅為父母信陰陽制人甚於父母又曰南榮趎曰里人有疾里人問之病者能言其病病者猶未病也若趎之問大道也譬猶飲樂以加病者也司馬彪曰加增加也趎願聞衛生之經而已矣衛生謂衛護其生全性命列子曰龍叔謂文摯曰子之術微矣吾有疾病子能已乎文摯曰唯命所聽然先言子所病之證龍叔曰吾鄉譽不以為榮國毀不以為辱得而弗喜失而弗憂視生如死視富如貧此奚疾哉奚方能已之乎文摯乃命龍叔背明而立文摯從後向明而望之既而曰嘻吾見子之心矣方寸之地虛矣幾聖人也子心六孔流通一孔不達今以聖智為病者或由此乎非吾淺術所能已也又曰秦人逢氏有子少而慧及壯而有迷罔之疾聞歌以為哭視白以為黑饗香以為朽嘗甘以為苦行非以為是意之所之天地四方水火寒暑無不倒錯者焉列子曰鼻將窒者先覺燋朽體將僵者先亟犇佚心將迷者先識是非故物不至者則不反又曰宋陽里華子中年病忘朝取而夕忘夕與而朝忘在塗則忘行在室則忘坐不識先後不識今古魯有儒生自媒能治之華子之妻以居室之半請其方儒生曰吾試化其心變其慮庶幾其瘳乎於是試露之而求衣飢之而求食幽之而求明生欣然告其子曰疾可已也然吾方密傳不以告人試屏左右獨與居室, SBCK: 太平御覽卷第}
