  - {type: variant, offset: 406, length: 225, content: 華而睆大夫之簀與華畫也謂床簀也說者以睆為刮節目字或為刮子春曰止以病困不可動曾子聞之瞿然曰呼呼虛憊之聲也曰華而睆大夫之簀與曾子曰然斯季孫之賜也我未之能易也元起易簀曾元曰夫子之病革矣不可以變幸而至於旦請敬易之革急也變動也又喪服大記曰疾病外內皆掃為賓客將來問病也疾困曰病也君大夫徹懸士去琴瑟聲音動人病欲靜也寢東首于北牖下廢床徹褻衣加新衣體一人男子不死于婦人之手婦人不死于男子之手又曰君於大夫疾三問之士疾一問之左傳成十五年曰晉侯疾病求醫于秦秦伯使醫緩為之未至, SBCK: 昔魯周}
