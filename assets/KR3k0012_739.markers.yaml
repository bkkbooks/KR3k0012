  - {type: variant, offset: 317, length: 2, content: 凡邦, WYG: 就臣位莽大怒即收繫惲難即害之使黄門脅導惲令為狂疾惚恍不自知所言惲曰所言皆天文非狂人所造作呉志曰全琮為督議欲分别諸將有所掩襲朱桓素氣髙耻見部伍遂託狂發詣建業治病王隠晉書曰吾彦給役陸抗抗欲拔之患衆不聴乃悉請當為將者入坐以試勇怯有一狂人拔刀跳梁來向坐中餘者皆走惟彦獨坐舉抗禦之狂人乃退衆服其勇沈約宋書曰袁愍孫著妙徳先生𫝊曰嘗謂周旋人曰昔有一國國中一水號曰狂泉國人飲此水無不狂也唯國君穿井汲獨得無恙國人既狂謂主不狂為狂於是聚謀共執國主療其狂疾火艾針藥莫不畢具國王不任其苦於是到泉所酌水飲之飲畢便狂君臣大小其狂若一衆乃懽然我既不狂難以獨立此亦欲試飲此水宋書曰顔延}
  - {type: page-break, offset: 317, content: '', id: KR3k0012_WYG_739-8a, image: WYG0899/WYG0899-0510c.png}
  - {type: variant, offset: 321, length: 15, content: 疾病者有疕瘍者造焉則使醫分而治, WYG: 文名帝嘗問以諸子才能延}
  - {type: variant, offset: 323, length: 0, content: '', SBCK: 徃請福常煑雞子十枚以内帳中湏􅁷茅君皆一二擲雞子還之歸破之皆無復黃者病人當愈􅀂中有土者不愈以爲常候雞子如故無開處也漢武故事曰􅀄霍去病微時數自禱神君乃見其形自脩飾欲與去病交接去病不肯神君亦慙及去病疾篤上命爲禱神君神君曰霍將軍精氣少夀命不長吾嘗欲以太一精􅀘之可得延年霍將軍不曉此意遂見斷絶今疾必死非可救也去病竟薨西京雜記曰髙祖􅀄入咸陽宫周行庫有方鏡廣四尺髙五尺九寸表裏有明人疾病在内照揜心則知其病之所在皇甫謐髙士傳曰安丘望之病弟子公沙都來㸔之舉丘於庭樹下安丘曉然有痊開目見􅀟赤李着枯枝都仰手承李安丘食之所苦盡除皇甫謐自序曰士安每病母輙推燥居濕以􅃨易單何顒别傳曰張仲景過山陽王仲宣謂曰君體有病後年三十當眉落仲宣時年十七以其言貰逺不治後至三十疾果眉落三輔决録曰趙􅄮􅀄名嘉年三十餘有重疾卧蓐七年自慮􅍕忽乃爲遺令勑兄子可立一貟石於吾墓前刻之曰漢有逸民姓趙名嘉有志無時命也奈何劉楨與曹植書曰明使君始垂憐哀意眷日崇譬之疾乃使炎農分藥􅄮伯下鍼疾雖未除就没無恨何者以其天醫至神而榮魄自盡也狂書曰狂􅁪􅀨􅀂君行誑妄則常􅀨順之尚書多方曰周公曰惟聖罔念作狂唯狂克念作聖毛詩曰不見子都乃見狂且又東方未明曰折栁樊圃狂夫瞿瞿論語子路曰不得中行而與之必也狂狷乎狂者進取狷}
