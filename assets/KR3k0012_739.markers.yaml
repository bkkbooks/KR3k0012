  - {type: variant, offset: 280, length: 1, content: 癘, WYG: 所不為也又子在陳曰歸歟歸歟吾黨之小子狂簡斐然成章不知所以裁之又楚狂接輿歌而過孔子曰鳳兮鳳兮何徳之衰徃者不可諫來者猶可追已而已而今之從政者殆而國語晉語曰下邑之役董安于多獲下邑晉邑安于趙簡子家臣趙簡子賞之辭固賞之對曰今臣一旦為狂}
