  - {type: variant, offset: 1537, length: 161, content: 呼醫飲藥遺言以身服歛棺周於身土周於槨魏志曰太傅鍾繇有膝疾時華歆亦以高年疾病朝見皆使虎賁轝上殿就坐後三公疾常以為故事吳志曰呂蒙獲關羽封爵未下會疾發權時在公安延置內殿所以治護者萬方募邦內有能愈蒙疾者賜千金恐其勞動常穿鑿壁瞻之見其小能下食則喜顧左右言笑不然則咄嗟夜不能寐病中瘳為下赦令群臣畢賀後更增篤權自臨視命道士於星辰下為之請, SBCK: 應}
