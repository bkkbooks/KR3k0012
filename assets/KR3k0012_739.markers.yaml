  - {type: variant, offset: 3345, length: 475, content: 醫而季梁之疾自瘳墨子曰墨子病洗鼻問曰先生以鬼神為明福善禍惡今先生聖人也何故病墨子曰病者多方有得之勞苦有得之寒暑今有百門而閉其一賊何處不入哉管子曰凡國都皆有養疾聾盲喑啞跛躄偏枯不能自生者上收而養之尹子曰與死者同病難為良醫與亡國同道不可為謀又曰人將疾也必先不甘魚肉之味韓子曰秦昭王有疾百姓買牛而家為王禱魏子曰待扁鵲乃治病終身不愈也用道術則無所不治也淮南子曰土地各以類生人是故山氣多男澤氣多女水氣多瘖風氣多聾林氣多瘧木氣多傴生子多有此疾岸下氣多尰濕氣所坐石氣多力險阻氣多癭暑氣多殘殘折不終寒氣多壽谷氣多痺丘氣多狂衍氣多仁下而平也陵氣多貪象陵積聚春秋後語日齊桓公六年越醫扁鵲過齊桓侯客待之入朝見曰君有疾在腠理不治將深腠理皮膚也桓侯曰寡人無疾扁鵲出桓侯謂左右曰醫之好利欲以不病為功後五日復見日君疾在血脈後五日復見曰疾在腸胃後五日見桓侯而還走桓侯使人問其故日疾在骨髓臣是以無請也桓侯遂卒戰國策曰扁鵲見秦武王示之病扁鵲請除之左右曰君之病在耳之前目之下也除之使耳不聰目不明君以告扁鵲扁鵲怒而投其石曰君與智者謀之而與不智者敗之使秦政如此則一舉而亡國矣韓詩外傳曰人主之疾, SBCK: ''}
