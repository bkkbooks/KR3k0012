  - {type: 'tls:seg', offset: 19, content: '', id: KR3k0012_CHANT_739-1a.8}
  - {type: variant, offset: 19, length: 2, content: 疢熱, SBCK: 太子太傅夏侯勝曰此未死也臣聞有隂德必饗其樂以及子孫病果愈封爲􅀶陽侯丗􅀃曰衛玠緫角時嘗問樂廣夢樂云是想衛曰神形所不接而夢豈是想曰因也衛思因經日不得遂病樂聞故命駕爲剖折之衛病小小而差樂歎曰此兒􅅐中當必無膏肓病又曰衛玠從豫章下都人乆聞其姿容觀者如堵墻玠先有羸疾不堪勞遂發病死時人謂之㸔殺語林曰王仲祖病劉真長爲稱藥荀令則爲量水矣又曰孔君平病困􅁃司空爲㑹稽省之問訊甚至爲之流涕孔􅁣然曰丈夫將終不問安國寧家之術而反作兒女相問􅁃聞廻還謝之請其語言桓譚新語曰余少時見楊子雲之麗文髙論不自量年少新進而猥欲逮及嘗激一事而作小賦用精思大劇而立感病子雲亦言帝上甘泉詔使作賦爲文卒􅁀及倦卧夢其五藏岀在地以手收内及􅁴大少氣病一歲卒王符潜夫論曰夫理丗不得真賢譬由治疾不得真藥也治病當得真人參反得羅菔當得麦門冬反得蒸穬麥巳而不識真合而服之病以浸劇不自知爲人所欺也乃反謂方不誠而藥皆無益於療病因棄後藥弗敢復飲而更求巫覡者雖死可也論衡曰子夏䘮明曾子責以有罪按伯牛有疾仲尼以爲命也或是䘮子數哭因中風耳風俗通曰無恙俗􅀃恙}
  - {type: page-break, offset: 19, content: '', id: KR3k0012_SBCK_739-2a}
  - {type: page-break, offset: 19, content: '', id: KR3k0012_SBCK_739-2b}
