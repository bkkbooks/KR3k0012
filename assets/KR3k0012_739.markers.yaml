  - {type: variant, offset: 23, length: 1, content: 癉, SBCK: 凢人相見及書問者曰無疾病邪案上古之時草居野􅀫恙噬䖝也善食人心凡相}
  - {type: variant, offset: 23, length: 1, content: 癉, WYG: 慬首疾也亟三關之欲以病其身支九窮瘳瘳然虛曲失其適以字其生也雖有彭祖猶不能為也太公金匱曰丁候不朝武王乃畫丁候三旬射之丁候病大劇使人卜之崇在周恐懼乃遣使者請之於武王願舉國為臣虜武王許之歸為太師尚父謂使曰歸矣吾已告諸神言丁候前畔義今已遣人來降勿復過也比使者歸子之君所自念矣使者辭去歸至丁候病稍愈四夷聞之皆懼各以其職來貢六韜曰欲伐大國行且有期王寢疾十日不行太公負之而起曰行已有期君不發天子聞之國亡身死胡不勉之王説焉如無病者説苑曰邴吉有隂徳於孝宣帝㣲時及即位衆莫知亦不言帝將封之㑹吉病甚將使人加封及其生也太子太傅夏侯勝曰此未死也臣聞有隂徳必饗其樂以及子孫病果愈封為博陽侯世説曰衞玠總角時嘗問樂廣夢樂云是想衞曰神影所不接而夢豈是想曰因也衞因思經日不得遂病樂聞故命駕為剖折之衞病小小而差樂嘆曰此兒胸中當必無膏肓命又曰衞玠從豫章下都人久聞其姿容觀者如堵墻玠先有嬴疾不堪}
