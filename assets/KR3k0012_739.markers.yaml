  - {type: variant, offset: 2356, length: 1784, content: 能行走澄曰此未盡更服所餘藥又吐得如向者雞十三頭而病都差當時稱妙北史曰齊蘭陵王長恭有戰功帝忌之人謂長恭勿預事長恭然其言未能退及江淮寇擾恐復為將歎曰我去年面腫今何不發自是有疾不療後魏書曰李諧為人短小六指因癭而舉頤因跛而後步因譽而徐言人言李諧善用三短北史曰周裴俠嘗遇疾沉頓士友憂之忽聞五鼓便即驚起顧左右可向府耶所苦因此而瘳晉公護聞之曰裴俠危篤若此而不應憂公因聞鼓聲疾病遂愈此豈非天祐其勤恪也唐書曰太宗謂侍臣曰治國與養病無異也病人覺愈彌須將護若有觸犯必至殞命治國亦然天下稍安尢須兢慎若便驕逸必至喪敗又曰有患應病者問醫官蘇澄云自古無此方今吾所撰本草網羅天下藥物亦謂盡矣試將讀之應有所覺其人每發一聲腹中輒應唯至一藥再三無聲過至他藥復應如初澄因為處方以此藥為主其病自除老子曰知不知上不知知病聖人不病以其病病夫唯病病是以不病莊子曰堯以天下讓許由許由不受又讓於子州支父子州支父曰以我為天子可也雖然我適有幽憂之病方旦治之未暇治天下也又曰子來有病喘喘然將死其妻子環而泣之子黎往問之倚其戶與之語曰偉哉造化以女為鼠肝乎以女為蟲臂乎子來曰父母於子東西南北唯命之從陰陽於人不翅為父母信陰陽制人甚於父母又曰南榮趎曰里人有疾里人問之病者能言其病病者猶未病也若趎之問大道也譬猶飲樂以加病者也司馬彪曰加增加也趎願聞衛生之經而已矣衛生謂衛護其生全性命列子曰龍叔謂文摯曰子之術微矣吾有疾病子能已乎文摯曰唯命所聽然先言子所病之證龍叔曰吾鄉譽不以為榮國毀不以為辱得而弗喜失而弗憂視生如死視富如貧此奚疾哉奚方能已之乎文摯乃命龍叔背明而立文摯從後向明而望之既而曰嘻吾見子之心矣方寸之地虛矣幾聖人也子心六孔流通一孔不達今以聖智為病者或由此乎非吾淺術所能已也又曰秦人逢氏有子少而慧及壯而有迷罔之疾聞歌以為哭視白以為黑饗香以為朽嘗甘以為苦行非以為是意之所之天地四方水火寒暑無不倒錯者焉列子曰鼻將窒者先覺燋朽體將僵者先亟犇佚心將迷者先識是非故物不至者則不反又曰宋陽里華子中年病忘朝取而夕忘夕與而朝忘在塗則忘行在室則忘坐不識先後不識今古魯有儒生自媒能治之華子之妻以居室之半請其方儒生曰吾試化其心變其慮庶幾其瘳乎於是試露之而求衣飢之而求食幽之而求明生欣然告其子曰疾可已也然吾方密傳不以告人試屏左右獨與居室七日而積年之病一日都盡又曰楊朱之友曰季梁季梁得疾七日大漸其子環而泣之請謁醫季梁謂楊朱曰吾子不肖如此之甚汝奚不為我歌以曉之其子曰不曉終謁三醫而季梁之疾自瘳墨子曰墨子病洗鼻問曰先生以鬼神為明福善禍惡今先生聖人也何故病墨子曰病者多方有得之勞苦有得之寒暑今有百門而閉其一賊何處不入哉管子曰凡國都皆有養疾聾盲喑啞跛躄偏枯不能自生者上收而養之尹子曰與死者同病難為良醫與亡國同道不可為謀又曰人將疾也必先不甘魚肉之味韓子曰秦昭王有疾百姓買牛而家為王禱魏子曰待扁鵲乃治病終身不愈也用道術則無所不治也淮南子曰土地各以類生人是故山氣多男澤氣多女水氣多瘖風氣多聾林氣多瘧木氣多傴生子多有此疾岸下氣多尰濕氣所坐石氣多力險阻氣多癭暑氣多殘殘折不終寒氣多壽谷氣多痺丘氣多狂衍氣多仁下而平也陵氣多貪象陵積聚春秋後語日齊桓公六年越醫扁鵲過齊桓侯客待之入朝見曰君有疾在腠理不治將深腠理皮膚也桓侯曰寡人無疾扁鵲出桓侯謂左右曰醫之好利欲以不病為功後五日復見日君疾在血脈後五日復見曰疾在腸胃後五日見桓侯而還走桓侯使人問其故日疾在骨髓臣是以無請也桓侯遂卒戰國策曰扁鵲見秦武王示之病扁鵲請除之左右曰君之病在耳之前目之下也除之使耳不聰目不明君以告扁鵲扁鵲怒而投其石曰君與智者謀之而與不智者敗之使秦政如此則一舉而亡國矣韓詩外傳曰人主之疾十有二發非有賢醫莫能治也何謂十二發曰痿蹶逆脹滿支隔盲煩喘痺風賢醫治之如何曰省事輕刑則痿不作無使小民飢寒則蹶不作無令財貨上流則逆不作無使倉廩積腐則脹不作無使府庫充實則滿不作無使群臣縱恣則支不作無使下情不上通則隔不作上材恤下則盲不作法令奉用則煩不作無使下怨則喘不作無使賢人伏匿則痺不作無使百姓歌吟誹謗則風不作夫重臣群下者人主之心腹支體也心腹支體無患則人主無疾矣故非有賢醫莫能治也人主有此十二疾而不用賢醫則國非其國也趙曄吳越春秋曰越王出石室召范蠡謂之曰吳王疾病三月不愈孤聞人臣之道主疾臣憂且吳王遇孤恩澤甚厚恐疾之無瘳也唯先生卜焉范蠡曰今日日辰陰陽上下和親無相入者法曰天一救且何憂吳王不死明矣到已巳當有瘳也呂氏春秋曰齊王疾瘠使人之宋迎文摯摯視疾謂太, WYG: 郭}
