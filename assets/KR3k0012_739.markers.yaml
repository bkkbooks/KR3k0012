  - {type: variant, offset: 276, length: 3, content: 四時皆, WYG: 乃使炎農分藥岐伯下鍼疾雖未除就沒無恨何者以其天醫至神而榮魄自盡也狂書曰狂恒雨若尚書多方曰周公曰惟聖罔念作狂唯狂克念作聖毛詩曰不見子都乃見狂且又東方未明曰折柳樊圃狂夫瞿瞿論語子路曰不得中行而與之必也狂狷乎狂者進取狷者}
