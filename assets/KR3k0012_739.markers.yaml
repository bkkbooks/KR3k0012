  - {type: variant, offset: 1728, length: 1, content: 樂, krp: 王長文字德叡}
  - {type: variant, offset: 1729, length: 1, content: 廣, WYG: 乎世長進曰陛下遊獵溥廢萬機不滿十旬未為大樂髙祖色變既而笑曰狂態發耶又對曰為臣私計則狂為陛下國計則忠畢子曰周公旦人謂之狂後世稱其徳奇繚子曰太公望行年七十屠牛朝歌賣食棘津遇七十餘主不聴人皆曰狂丈夫莊子曰宋桓候行未出城門其前驅呼避至於家家人止之以為狂也呼避使人呼道也家人謂狂正而不聴此乃言聞其所未聞則以為狂也世説曰諸葛厷在西朝少有清譽尤為王夷甫所重時論亦以擬王氏後為繼母族黨所䜛論之為狂將逺徙友人王夷甫之儔詣檻與别厷問王曰朝廷何以徙我王曰言卿狂逆厷曰逆則宜殺狂則何所徙繆襲撰仲長統昌言表稱統曰統性俶儻敢言不拘小郡每州郡命召輒稱疾不就語黙無常時人或謂之狂魏畧曰寒貧者本姓石}
