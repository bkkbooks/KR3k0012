  - {type: variant, offset: 25, length: 0, content: '', SBCK: 問曰無恙乎非爲}
  - {type: variant, offset: 25, length: 0, content: '', WYG: 遂發病死時人謂之看殺衞玠語林曰王仲祖病劉真長為稱藥荀令則為量水矣又曰孔君平病困庾司空為㑹稽省之問訊甚至為之流涕孔慨然曰丈夫將終不問安國寧家之術而反作兒女相問庾聞迴還謝之請其語言桓譚新語曰余少時見楊子雲之麗文髙論不自量年少新進而猥欲建及嘗激一事而作小賦用精思太劇而立感病子雲亦言帝上甘泉詔使作賦為文卒暴及倦卧夢其五藏出在地以手收内及覺大作氣病一嵗卒王符潛夫論曰夫理世不得真賢譬曰治疾不得真藥也治病當得真人參反得羅菔當得麥門冬反得蒸穬麥已而不識真合而服之病以浸劇不自知為人所欺也乃反謂方不誠而藥皆無益於療病因棄後藥弗敢復飲而更求巫覡者雖死可也論衡曰子夏喪明曽子責以有罪按伯牛有疾仲尼以為命也或是喪子數哭因中風耳風俗通曰無恙俗説恙}
