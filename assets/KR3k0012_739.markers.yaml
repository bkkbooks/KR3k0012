  - {type: variant, offset: 310, length: 4, content: 醫師掌醫, WYG: 蓋寛饒曰無多酌我我廼酒狂丞相魏侯笑曰次公醒而狂何必酒也次公寛饒字又曰莽時長安狂女子碧呼道中曰髙皇帝大怒趣歸我國不者九月必殺汝莽收捕殺}
