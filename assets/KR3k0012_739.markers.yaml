  - {type: variant, offset: 2447, length: 0, content: '', SBCK: 太祖謂尚書崔玄伯曰蠕蠕而蠢反之民昔來號爲頑囂每來抄掠駕牸牛奔遁驅犍牛隨之牸牛伏不能前異部人教其以犍牛易之者蠕蠕曰其母尚不能行而况其子終於不易遂爲敵所虜隋書曰楊玄感司徒素之子也體皃容偉羙􅂡髯少時晚成人多謂之癡其父每謂所親曰此兒不癡也及長好讀書便􅀐射以父軍功位至柱國唐書曰竇威家丗勲貴諸昆弟並尚武藝而威躭玩文史介然自守諸兄哂之謂爲書癡又曰雜端御史最爲雄劇食坐之南設一横榻謂之南牀殿中監察不得坐其榻亦謂之癡牀言處其上者皆驕慠自得使人如癡故謂之癡床又曰}
