  - {type: variant, offset: 3821, length: 448, content: 有二發非有賢醫莫能治也何謂十二發曰痿蹶逆脹滿支隔盲煩喘痺風賢醫治之如何曰省事輕刑則痿不作無使小民飢寒則蹶不作無令財貨上流則逆不作無使倉廩積腐則脹不作無使府庫充實則滿不作無使群臣縱恣則支不作無使下情不上通則隔不作上材恤下則盲不作法令奉用則煩不作無使下怨則喘不作無使賢人伏匿則痺不作無使百姓歌吟誹謗則風不作夫重臣群下者人主之心腹支體也心腹支體無患則人主無疾矣故非有賢醫莫能治也人主有此十二疾而不用賢醫則國非其國也趙曄吳越春秋曰越王出石室召范蠡謂之曰吳王疾病三月不愈孤聞人臣之道主疾臣憂且吳王遇孤恩澤甚厚恐疾之無瘳也唯先生卜焉范蠡曰今日日辰陰陽上下和親無相入者法曰天一救且何憂吳王不死明矣到已巳當有瘳也呂氏春秋曰齊王疾瘠使人之宋迎文摯摯視疾謂太子曰王疾可已雖然必殺摯非怒王則不可治怒而摯必死太子請之文摯期往而不至三齊王已怒文摯至不解履登床王重怒叱而起病乃已生烹文摯物理論曰趙簡子有疾扁鵲診候出曰疾可治也而必殺醫焉以告太子太子保之扁鵲頻召不入入而著履登床簡子大怒便以戟追殺之扁鵲知簡子大怒則氣通血脈暢達也, SBCK: 九}
