  - {type: variant, offset: 996, length: 0, content: '', SBCK: 笛漢武帝時工人丘仲所造也夲出羗中笛滌也所以滌邪􅁾納之雅正也長尺四寸七孔樂書曰􅅇者滌也丘仲所作可以滌蕩邪氣出楊正聲是故列和善吹裁十二之音應律荀勗樞問依三尺二調成均剪雲夢之霜筠法龍吟之異韻三孔爲籥文舞執之邠人吹也五孔爲篴祴樂用周師掌之六孔爲笛羗人吹之七孔下調漢部用也今之七星古之長笛一定爲調合鍾磬之均各有短長應律吕之度雅樂部内咸用之也馬融自叙曰融性好音能皷}
