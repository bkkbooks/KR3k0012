  - {type: variant, offset: 2410, length: 1, content: 邵, WYG: 和如塤篪言俱為王臣宜相親愛之史記曰伍子胥至於江上無以餬其口行吟蒲伏肉袒吹篪乞食於呉市東觀漢記曰明帝幸南陽舊宅召校宫子弟作雅樂奏鹿鳴上御塤篪和之以娯嘉賓齊書曰世祖於南康郡作伎有絲無管空中聞有篪聲調節相應世本曰蘇成公造篪吹孔有觜如酸棗蘇成公平王時諸侯古史考曰古有篪尚矣蘇成公善篪而記者因以為作謬也又曰暴新公所造舊志曰一曰管史臣案非也雖不知暴新公何代人而非舜前人明矣舜時西王母獻管則是已有器新公安得造篪洞㝠記曰建元二年帝幸騰光䑓以望四逺於䑓上撞玉鐘擊懸離之磬吹霜條之篪唱來雲依日之曲洛陽伽藍記曰後魏河間王琛有婢朝雲善吹篪能為團扇歌隴上聲琛為秦州刺史羌叛屢討不勝琛令朝雲假為貧女吹篪而乞羌聞之皆流涕相謂曰何故捨墳井在山谷為㓂耶即相尋而降秦民語曰快馬健兒不如老嫗吹篪管蔡邕章句曰管者形長一尺圍一寸有孔無底其器今亡}
