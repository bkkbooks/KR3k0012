  - {type: variant, offset: 1371, length: 145, content: 之登歌女子曰子識此聲否彥伯曰所未曾聞女曰此曲所謂楚明光者也唯嵇叔夜能為此聲自此以外傳習數人而已彥伯欲受之女曰此非豔俗所宜唯岩栖谷隱可以自娛耳當更為子彈之幸復聽之乃鼓琴且歌歌畢止於東榻遲明將別各深怨慕女取四端錦臥具繡臂囊一贈彥伯為別彥伯以大籠井玉琴以荅之而去說苑曰雍門周以琴見孟嘗君孟嘗君曰先, WYG: 郝}
