  - {type: variant, offset: 3199, length: 317, content: 人不勝羈旅今授君廣陵散甚妙今代莫測又曰凡琴曲和樂而作命之曰暢暢者言其道之美暢從不敢自安也憂愁而作命之曰操操者言困阨危迫猶不失其操也又曰清角黃帝之琴鳴廉脩況藍脅自鳴空中號鍾齊桓公琴繞梁楚莊王琴綠綺司馬相如琴焦尾蔡邕琴鳳皇趙飛鷰琴又曰賀韜吳人也常夜彈琴感鬼神見舞數曲斯亦妙之至也十二國史曰周師經仕魏文侯善鼓琴文侯躭之起舞經怒以琴撞文侯文侯怒使人曳下殿將殺之經曰乞申一言而死文侯曰何經曰臣撞桀紂之君不撞堯舜之主文侯曰寡人過矣乃捨之懸琴於壁以為戒晉紀曰孫登字公和不知何許人散髮宛地行吟樂天居白鹿蘇門二山彈一絃琴善嘯每感風雷嵇康師事之三年不言樂纂曰趙耶利居士唐初天水人也以琴道見重於海內帝王賢貴靡不欽風舊錯謬十五餘弄皆削凡歸雅無一徵玷不合於古述, SBCK: 所}
