  - {type: variant, offset: 2458, length: 0, content: '', SBCK: 象物貫地而牙故謂之管尓雅曰大管謂之簫其中謂之䈌小者謂之篎郭璞注曰管長尺圍寸併􅃮之有底賈氏爲之如箎六孔犍爲舎人曰大管者聲髙大故曰篙者髙也中者聲精密故曰䈌宻也小者聲音}
