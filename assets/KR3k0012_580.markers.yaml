  - {type: variant, offset: 2459, length: 1, content: 微, SBCK: 妙也廣雅曰管象箎長尺圍寸有六孔無底班固曰黄帝作律以玉爲管長尺六孔爲十二月音至舜時西王母獻白玉管漢章十二年零陵營道舜祠下得笙一白玉管則古者又以玉爲管矣班氏用銅之言外然之義未爲得也求律所生大極之數起於一在子以三乗之得三在丑以次至酉得一萬九千六百八十三篇黄鍾之母以爲法周十二辰得十七萬七千一百四十七黄鍾之子以爲實實始法}
