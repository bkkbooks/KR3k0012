  - {type: variant, offset: 3337, length: 526, content: 二國史曰周師經仕魏文侯善鼓琴文侯躭之起舞經怒以琴撞文侯文侯怒使人曳下殿將殺之經曰乞申一言而死文侯曰何經曰臣撞桀紂之君不撞堯舜之主文侯曰寡人過矣乃捨之懸琴於壁以為戒晉紀曰孫登字公和不知何許人散髮宛地行吟樂天居白鹿蘇門二山彈一絃琴善嘯每感風雷嵇康師事之三年不言樂纂曰趙耶利居士唐初天水人也以琴道見重於海內帝王賢貴靡不欽風舊錯謬十五餘弄皆削凡歸雅無一徵玷不合於古述執法象及胡笳五弄譜兩卷弟子逵者三人並當代翹楚貞觀十年終於曹壽七十六弟子宋孝臻公孫常數百年內常傳於馬氏國史補曰張弘靜少時會名客觀鄭宥彈琴宥調二琴至切各置一榻動宮則宮應動角則角應稍不切乃不應宥師董庭蘭尤善汎聲又曰李汧公勉雅好琴常斲桐又取漆䇶為之多至數百張永者與之有絕代者一名響泉一名韻磬自寶於家京師又以樊氏路氏為第一路氏有房太尉石枕損之不理蜀氏斲琴嘗自品第一上者以王次者以琴瑟又次以金徽螺蚌唐書樂志曰趙師字耶利天水人也在隋為知音至唐貞觀初獨步上京遽入琴苑疇之嵇氏累代居曹遂今曹郡琴者所修五弄具列於曹妙傳濮州司馬氏琴道不墜於地也師云吳聲清宛若長江廣流緜緜徐逝有國士之風蜀聲躁急若擊浪奔雷亦一時俊決也世說曰晉戴顒字仲若父逵高尚不仕顒年十六遭憂不忍傳父之琴與兄勃各造新弄勃五部顒十五部又制長弄一部並傳於世, WYG: ''}
