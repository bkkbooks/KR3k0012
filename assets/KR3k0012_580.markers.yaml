  - {type: variant, offset: 1183, length: 187, content: 茂樞響泉記曰余家世所寶琴書圖畫廣明之亂散失蕩盡其中二琴一名響泉一名韻磬皆希代之寶也宋玉賦曰臣嘗行僕飢馬疲正值主人門開主人翁出獨有主人女在欲置臣堂上太高堂下太卑乃便為蘭房奧室止臣其中其中有鳴琴焉臣援琴而鼓之為秋竹積雪之曲吳均續齊諧記曰王彥伯會稽餘姚人也善鼓琴仕為東宮扶侍赴告還都行至吳郵亭維舟中渚秉燭理琴見一女子披幃而進二女從焉先施錦席於東床乃就坐女取琴調之似琴而聲甚哀雅有類, WYG: 華}
