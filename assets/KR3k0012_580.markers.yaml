  - {type: variant, offset: 1087, length: 307, content: 暢瑞應圖曰師曠鼓琴通於神明而白鵠翔竹林七賢傳曰嵇康臨死顧視日影索琴彈之曰袁孝尼嘗從吾學廣陵散吾無惜固不與廣陵散於是絕矣司馬相如美人賦曰上客何國之公子所從來無乃遠乎遂設旨酒進鳴琴撫絃為幽閑之曲張茂樞響泉記曰余家世所寶琴書圖畫廣明之亂散失蕩盡其中二琴一名響泉一名韻磬皆希代之寶也宋玉賦曰臣嘗行僕飢馬疲正值主人門開主人翁出獨有主人女在欲置臣堂上太高堂下太卑乃便為蘭房奧室止臣其中其中有鳴琴焉臣援琴而鼓之為秋竹積雪之曲吳均續齊諧記曰王彥伯會稽餘姚人也善鼓琴仕為東宮扶侍赴告還都行至吳郵亭維舟中渚秉燭理琴見一女子披幃而進二女從焉先施錦席於東床乃就坐女取琴調之似琴而聲甚哀雅有類今之登歌女子曰子識此聲否彥伯曰所未曾聞女曰此曲所, SBCK: ''}
