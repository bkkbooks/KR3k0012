  - {type: variant, offset: 306, length: 686, content: 異善為新聲阮籍樂論曰漢帝聞楚琴倚扆而悲慷慨長息曰善哉為聲若此而足矣昔季流向風而鼓琴聽之者淚下列仙傳曰稷丘公華山道士漢武帝封禪公乃冠章甫擁琴來迎靈異志曰嵇中散神情高邁任心遊憩嘗行西南出去洛數十里有亭名華陽投宿夜了無人獨在亭中此亭由來殺人宿者多凶至一更中操琴先作諸弄而聞空中稱善聲中散撫琴而呼之曰君何以不來此人便云身是古人幽沒於此數千年矣聞君彈琴音曲清和故來聽耳而就終殘毀不宜以接侍君子向夜髣髴漸見以手持其頭遂與中散共論聲音其辭清辯謂中散君試過琴於是中散以琴授之既彈悉作眾曲亦不出常唯廣陵散絕倫中散纔絻從受之半夕悉得與中散誓不得教他人又不得言其姓也琴書曰昔者至人伏羲氏王天下也仰觀象於天俯察法於地遠取諸物近取諸身始畫八卦削桐為琴又曰自堯相傳善琴者八十餘人有八十餘樣雖少有差大體相似皆長三尺六寸法朞之數也上圓而歛象天也下方相平法地十三徽配十二律餘一象閏也本五絃宮商角徵羽也加二絃文武也至後漢蔡邕又加二絃象九星在人法九竅其樣有異傳於代四所象鳳首翅足尾南方朱雀為樂之主也五分其身以三為上以二為下三天兩地之義也上廣下狹尊卑之象也中翅八寸象八風腰廣四寸象四時軫圓象陽轉而不窮也臨樂承露用棗脣用梓未達先賢深意也又曰琴高以琴養性初學於羅浮山後遊四海或傳禽高非也又曰舜彈五絃之琴以歌南風之詩豈唯道在思親志兼憂民養萬物故感之又曰潁陽西北界李氏處女年十五六天寶八年二月遘疾七月不食魂飛冥冥如昇上景在雲霧中女仙人蘆藕苗間受琴清風弄等五十曲至天寶十五載五月留守悲逈御史中丞蔣列馹騎上聞玄宗度為女道士賜琴三面留內供奉琴德絃妙旁行不流所感無恒也又曰師涓紂之樂官也善鼓琴感四馬噓天仰秣或曰師曠傳雖二疑即是一, SBCK: ''}
