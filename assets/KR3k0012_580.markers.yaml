  - {type: variant, offset: 1395, length: 363, content: 楚明光者也唯嵇叔夜能為此聲自此以外傳習數人而已彥伯欲受之女曰此非豔俗所宜唯岩栖谷隱可以自娛耳當更為子彈之幸復聽之乃鼓琴且歌歌畢止於東榻遲明將別各深怨慕女取四端錦臥具繡臂囊一贈彥伯為別彥伯以大籠井玉琴以荅之而去說苑曰雍門周以琴見孟嘗君孟嘗君曰先生鼓琴亦能令我悲乎周曰臣烏能令足下悲哉所能令悲者先貴而後賤先富而後貧不若身才高妙適遭暴亂不若處之隱絕不及四鄰屈折擯壓無所告訴臣一為之徵操琴則涕零矣今足下千乘之君廣廈邃房下羅惟來清風鬥象旗舞鄭妾麗色淫目流聲娛耳水遊則連方舟載旗野遊則馳弋獵平原廣囿入則撞鍾擊鼓乎深宮之中雖有善琴者固未能使足下悲也然臣所為足下悲者一也千秋萬歲之後宗廟必不血食高臺既已壞曲池既已壍墳墓既已平嬰兒豎子採樵者躑躅其足而歌其上曰夫以孟嘗君尊賢乃若是乎於是孟嘗君泣焉垂臉周引琴而鼓之徐動宮徵拂羽角孟嘗君涕泣增哀下而就, SBCK: ''}
