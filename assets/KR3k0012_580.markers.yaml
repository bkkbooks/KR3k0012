  - {type: variant, offset: 2410, length: 1, content: 邵, SBCK: 指粉碎客散不知所之舟著記疑其蛟龍也又曰李牟秋夜吹笛於􅀲州舟艥甚隘􅀄發調群動皆息及數奏微風䬃然而至俄頃舟人賈客有怨嗟悲泣之聲箎釋名曰箎啼也聲從孔出如嬰兒啼聲也毛詩曰彼何人斯伯氏吹塤仲氏吹箎周官曰笙師掌教吹箎尓雅曰大箎謂之沂郭璞曰箎以竹爲之長一尺四寸圍三寸一孔上出寸三分名翹横吹之小者尺二犍爲舎人曰大箎其聲悲沂鏘然也詩云仲氏吹箎也廣雅曰箎以竹爲之長大四寸有八孔前有一孔後有四孔頭有一孔月令仲夏之月命樂師調箎詩節南山云伯氏吹塤仲氏吹箎土曰塤竹曰箎箋云伯仲諭兄弟也我爲汝思如兄如弟其相應和如塤箎言俱爲王臣冝相親愛之史記曰伍子胥至於江上無以糊其口行蒲伏􅁏袒吹箎乞食於吴市東􅀚漢記曰明帝幸南陽舊宅召校宮子弟作雅樂奏鹿鳴上御塤箎和之以娯嘉賔齊書曰丗祖於南康郡内作􅇊有􅁝無管空中聞有箎聲調節相應丗夲曰􅂫成公造箎吹孔有觜如酸􅀥􅂫成公平王時諸侯也古史考曰古有箎尚矣􅂫成公善箎而記者因以爲作謬也又曰􅁀新公所造舊志曰一曰管史臣案非也雖不知􅁀新公何代人而非舜前人明矣舜時西王母獻管則是巳有器新公安得造箎洞􅁳記曰建元二年帝幸騰充䑓以望四逺於臺上撞磬玉鍾懸􅀺之磬吹霜條之箎唱來雲依日之曲洛陽伽藍記曰後魏河間王琛有婢朝雲善吹箎能爲團扇歌隴上聲琛爲􅁗州刺史羗叛屢討不勝琛令朝雲假爲貧女吹箎而乞羗聞之皆流涕相謂曰何故捨墳井在山谷爲㓂耶即相率而降秦民語曰快馬徤兒不如老嫗吹箎管蔡邕章句曰管者形長一尺圍寸有孔無底其器今亡}
  - {type: page-break, offset: 2410, content: '', id: KR3k0012_SBCK_580-4a}
