  - {type: variant, offset: 2408, length: 1, content: 首, SBCK: 故也又曰横笛小箎也漢靈帝好胡笛有胡笛箎出於胡吹即此也梁胡歌云快馬不湏鞭拗折楊柳枝下馬吹横笛愁殺路傍児此歌辝元出北國知撗笛是北國名今撗笛皆去義觜其有觜者謂之義觜笛國史􅀘曰李舟好事甞得村舎煙竹截以爲笛堅如鐵石以遺李牟牟吹􅅇天下第一月夜泛江與舟吹之溜亮逸發俄有客立於岸呼舡請載旣至請笛而吹其爲精壯山石可裂牟平生未甞見及人破呼吸盤辟}
  - {type: variant, offset: 2408, length: 1, content: 首, WYG: 長一尺四寸圍圓三寸一孔上出寸三分名翹横吹之小者尺二犍為舍人曰大篪其聲悲沂鏘然也詩云仲氏吹篪也廣雅曰篪以竹為之長尺四寸有八孔前有一孔後有四孔頭有一孔月令仲夏之月命樂師吹篪詩莭南山云仲氏吹塤伯氏吹篪土曰塤竹曰篪箋云伯仲論兄弟也我為汝息如兄如弟其相}
  - {type: variant, offset: 2408, length: 1, content: 首, krp: 舟著記疑其蛟龍也又曰李牟秋夜吹笛於瓜州舟艥甚隘𥘉發調群動皆息及數奏微風䬃然而至俄頃舟人賈客有怨嗟悲泣之聲箎釋名曰箎啼也聲從孔出如嬰兒啼聲也毛詩曰彼何人斯伯氏吹塤仲氏吹箎周官曰笙師掌教吹箎尓雅曰大箎謂之沂郭璞曰箎以竹爲之長一尺四寸圍三寸一孔上出寸三分名翹横吹之小者尺二犍爲舎人曰大箎其聲悲沂鏘然也詩云仲氏吹箎也廣雅曰箎以竹爲之長大四寸有八孔前有一孔後有四孔頭有一孔月令仲夏之月命樂師調箎詩節南山云伯氏吹塤仲氏吹箎土曰塤竹曰箎箋云伯仲諭兄弟也我爲汝思如兄如弟其相}
