  - {type: variant, offset: 2487, length: 432, content: 所為施也夫子何所感一若斯乎吾從子入而問焉曾子曰諾二子入問孔子孔子曰然如是也吾有之嚮見狸方取鼠欲其得之故為音汝二人者孰識諸曾子對以閔子夫子曰可以聽音矣家語曰孔子遊於泰山見榮啟期行郕之野鹿裘帶索抱琴而舞孔子問曰先生為樂何也對曰天生萬物唯人為貴吾既為人一樂也男尊女卑吾既為男二樂也人生有不見日月不免襁褓吾行年九十五歲矣三樂也貧者士之常死者人之終處常得終又何憂乎孔子曰善呂氏春秋曰伯牙鼓琴鍾子期聽之方鼓琴志在泰山鍾子期曰善哉乎鼓琴巍巍乎如泰山志在流水鍾子期曰善哉乎鼓琴茫茫乎若流水鍾子期死伯牙擗琴絕絃終身不復鼓琴以為世無足以鼓琴也列仙傳曰華山毛女獵即見常居岩彈琴桓譚新論曰神農氏繼宓羲而王天下亦上觀法於天下取法於地近取諸身遠取諸物於是始削桐為琴繩絲為絃以通神明之德合天人之和焉琴書曰師曠晉之樂官也上於琴能易寒暑召風雨為晉平公鼓之感玄鶴六下舞西京雜記曰張安世十五為成帝侍中善鼓琴能為雙鳳離鸞之曲世說顧彥先平生好琴及喪家人常以琴置靈床上張季鷹往哭顧不勝慟遂徑上床鼓琴作數曲而去, SBCK: ''}
