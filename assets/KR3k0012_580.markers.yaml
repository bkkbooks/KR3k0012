  - {type: variant, offset: 2401, length: 3, content: 最為密, krp: 髙竹不可用也慮悲聲感人士卒思歸之故也又曰横笛小箎也漢靈帝好胡笛有胡笛箎出於胡吹即此也梁胡歌云快馬不湏鞭拗折楊柳枝下馬吹横笛愁殺路傍児此歌辝元出北國知撗笛是北國名今撗笛皆去義觜其有觜者謂之義觜笛國史𥙷曰李舟好事甞得村舎煙竹截以爲笛堅如鐵石以遺李牟牟吹笛天下第一月夜泛江與舟吹之溜亮逸發俄有客立於岸呼舡請載旣至請笛}
  - {type: variant, offset: 2403, length: 1, content: 密, WYG: 笛堅如鐡石以遺李牟牟吹笛天下第一月夜泛江維舟吹之嘹亮逸發俄有客立於岸呼船請載既至請笛}
