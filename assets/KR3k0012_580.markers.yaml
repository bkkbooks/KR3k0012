  - {type: variant, offset: 3191, length: 145, content: 人云吾有兄弟為樂人不勝羈旅今授君廣陵散甚妙今代莫測又曰凡琴曲和樂而作命之曰暢暢者言其道之美暢從不敢自安也憂愁而作命之曰操操者言困阨危迫猶不失其操也又曰清角黃帝之琴鳴廉脩況藍脅自鳴空中號鍾齊桓公琴繞梁楚莊王琴綠綺司馬相如琴焦尾蔡邕琴鳳皇趙飛鷰琴又曰賀韜吳人也常夜彈琴感鬼神見舞數曲斯亦妙之至也, WYG: ''}
