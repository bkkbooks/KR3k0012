  - {type: variant, offset: 2395, length: 0, content: '', SBCK: 太和十年中書􅁥荀勗中書令張華出御府銅竹律二十五具命太樂郎劉秀等校試其三具與杜夔及左延年法律同其二十二具視其銘題尺寸是笛律也問恊律中郎將列和辝昔魏明帝時令和永受笛聲以作此律欲使學者別居一坊歌詠講習依此律調伹識其尺寸之名則竹􅁝歌詠皆得均含歌聲濁者用長笛長律歌聲清者用短笛短律凢絃歌調張清濁之制不依笛尺寸名之則不可知也又曰黄鍾笛晉時三尺}
