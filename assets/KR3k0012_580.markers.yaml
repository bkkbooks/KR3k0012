  - {type: variant, offset: 2405, length: 1, content: 琴, WYG: 吹其聲精壮山石可裂牟平生未甞見及入破呼吸盤擗應指粉碎客散不知所之舟著記疑其蛟龍也又曰李牟秋夜吹笛於𤓰州舟檝甚隘初發調群動皆息及數奏微風䬃然而至俄頃舟人賈客有怨嗟悲泣之聲篪釋名曰篪啼也聲從孔出如嬰兒啼聲也毛詩彼何人斯云伯氏吹塤仲氏吹篪周官曰巫師掌教吹篪爾雅曰大篪謂之沂郭璞曰篪以竹}
