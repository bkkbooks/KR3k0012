  - {type: variant, offset: 1599, length: 314, content: 中舍人仍令所司以禮徵赴及至固以疾辤玄宗在東宮又表請禮徵之以年老竟辤疾不赴年九十餘開元四年卒特下制贈銀青光祿大夫又曰盧鴻一字浩然本范陽人也徙家洛陽少有學業頗善籀篆楷隸隱於山開元初遣備禮再徵不至五年下詔徵之至東都謁見不拜宰相問其故奏言臣聞老君言禮者忠信之薄不足可依山臣鴻一敢以忠信奉見上別召昇內殿賜之酒食詔曰盧鴻一應辟而至訪之政道有會淳風爰舉逸人用勸天下特宜授諫議大夫放之還山又曰王希夷徐州滕人也孤貧好道父母終為人牧羊取傭以供葬葬畢隱於嵩山師道士黃賾向四十年盡能傳其閉氣道養之術頤卒更居兗州徂徠山中與道士劉玄博為棲遁之友好易及老子嘗餌松柏葉及雜花散景龍中年七十餘氣益壯刺史盧齊卿就謁致禮因訪以字人之術希夷曰孔子稱已所不欲勿施於人可以, SBCK: ''}
