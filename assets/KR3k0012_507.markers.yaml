  - {type: variant, offset: 112, length: 3, content: 以少孤, SBCK: 匿姓名孔子擊磬於衛乃荷蕢而過孔氏之門曰有心哉擊磬乎旣而曰硜硜乎莫巳知斯巳而巳矣深則厲淺則掲孔子子聞之曰果哉蔑之難矣姓曰石門守者魯人也亦避丗不仕自隱又名爲魯守石門主晨夜開閉之子路從孔子入石門而􅀫問子路曰奚自子路曰自孔氏遂譏孔子曰是知其不可而爲之者與時人賢焉又曰東郭順子者魏人也脩道守眞田子方師事之而爲魏文侯師友侍坐於文侯數稱谿工文侯曰谿工子師耶子方曰非也無擇之里人也稱道數當無擇稱之文侯曰然則子無師耶子方曰有文侯曰子師誰子方曰東郭順子也文侯曰然則夫子何故}
  - {type: page-break, offset: 112, content: '', id: KR3k0012_SBCK_507-1b}
  - {type: variant, offset: 112, length: 3, content: 以少孤, WYG: 匿姓名孔子擊磬于衛乃荷蕢而過孔氏之門曰有心哉擊磬乎既而曰硜硜乎莫已知而已矣深則厲淺則掲孔子聞之曰果哉蔑之難矣又曰石門守者魯人也亦避世不仕自隠姓名為魯守石門主晨夜開閉之子路從孔子入石門而宿晨門曰奚自子路曰自孔子遂識之孔子曰是知其不可而為之者與時人賢焉又曰東郭順子者魏人也脩道守貞田子方師事之而為魏文師友侍坐於文侯數稱谿工文侯曰谿工子師也子方曰非也無擇之里人也稱道數嘗無擇稱之文侯曰然則子無師耶子方曰有文侯曰子師誰子方曰東郭順子也文侯曰然則夫子故}
