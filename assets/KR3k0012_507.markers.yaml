  - {type: variant, offset: 894, length: 419, content: 少學李播呂才為莫逆之交隋大業中應孝悌廉潔舉楊州六合縣丞非其所好棄官還鄉里績河渚中先有田十數頃鄰渚有隱士仲長子先服食養性績重其真素願與相近乃結廬河渚以琴酒自樂嘗遊北山因為北山賦以見志績又嘗躬耕於東皋故時人號東皋子或經過酒肆動經數日往往題壁作詩多為好事者詠諷貞觀十八年卒臨終自剋死日遺命薄葬兼預自為墓誌又曰田遊岩京兆三原人也初補太學生後罷歸遊於太白山每遇林泉會意輒留連不能去其母及妻子並有方外之志與遊岩同遊山水二十餘年後入箕山就許由廟東築室而居自稱許由東鄰調露中高宗幸嵩山遣中書侍郎薛元超就問其母遊岩山衣田冠出拜帝令左右扶止之謂曰先生養道山中比得佳否遊岩曰臣泉石膏肓煙霞痼疾既逢聖代幸得逍遙帝曰朕今得卿何異漢獲四浩乎因將遊岩就行宮授崇文學士令與太子少傅劉仁軌談論帝後將營奉天宮于嵩山遊岩舊宅先在宮側特令不毀仍親書題額懸其門曰隱士田遊岩宅又曰史德義蘇州崑山人也咸亨初隱居武丘山以琴書自適或騎牛帶瓢出入郊郭東市號為逸人高宗聞其名徵赴洛陽尋稱疾東歸, WYG: 諸}
