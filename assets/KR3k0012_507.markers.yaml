  - {type: variant, offset: 338, length: 255, content: 應辟命與趙郡李士謙為忘言之友每相往來時稱李崔及士謙死廓哭之慟為之作傳輸之祕書府士謙妻廬氏寡居每有家事輒令人諮廓取定廓嘗著論言刑名之理其義甚精大業中終于家時年八十又曰徐則東海郯人也幼沉靜寡嗜欲受業於周弘正善三玄精論議懷栖隱之操杖策入縉雲山後學數百人苦請教授則謝而遣之不娶妻常服巾褐陳太建時應召來憩於至真觀朞月父辤入天台山因絕粒養性所資唯松水而已雖隆冬泫寒不服綿絮初入縉雲山太極真人除君降之曰汝年出十八當為王者師然後得道也晉王諱鎮知其名手書詔之遂詣楊州其後夕中命侍者取香火如平當朝禮之儀至五更而卒支體柔弱如生又曰張, SBCK: 仕魏}
