  - {type: variant, offset: 311, length: 3, content: 感激逃, WYG: 舉士五人任之以官齊國大治王斗之力也又曰黔婁先生者齊人也修身清節不求進於諸侯魯恭公聞其賢遣使致禮賜粟三千鍾欲以為相辭不受齊王又禮之以黄金百斤聘以為卿又不就著書四篇言道家之務號曰黔婁子終身不屈以夀終又曰原憲居環堵之室甕牖桑樞上漏下濕緼衣無表手足胼胝三日不舉火十年不製衣坐而彈琴子貢相衛結駟連騎排藜藿}
