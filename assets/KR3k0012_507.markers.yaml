  - {type: variant, offset: 986, length: 604, content: 嘗躬耕於東皋故時人號東皋子或經過酒肆動經數日往往題壁作詩多為好事者詠諷貞觀十八年卒臨終自剋死日遺命薄葬兼預自為墓誌又曰田遊岩京兆三原人也初補太學生後罷歸遊於太白山每遇林泉會意輒留連不能去其母及妻子並有方外之志與遊岩同遊山水二十餘年後入箕山就許由廟東築室而居自稱許由東鄰調露中高宗幸嵩山遣中書侍郎薛元超就問其母遊岩山衣田冠出拜帝令左右扶止之謂曰先生養道山中比得佳否遊岩曰臣泉石膏肓煙霞痼疾既逢聖代幸得逍遙帝曰朕今得卿何異漢獲四浩乎因將遊岩就行宮授崇文學士令與太子少傅劉仁軌談論帝後將營奉天宮于嵩山遊岩舊宅先在宮側特令不毀仍親書題額懸其門曰隱士田遊岩宅又曰史德義蘇州崑山人也咸亨初隱居武丘山以琴書自適或騎牛帶瓢出入郊郭東市號為逸人高宗聞其名徵赴洛陽尋稱疾東歸公卿已下皆赴詩餞別德義亦以詩留贈其文甚美天授初江南道宣勞使周興表薦則天徵赴都詔曰蘇州隱士史德義志尚虛玄素履貞確謙沖彰於里閈孝友表於閨庭固辤徵辟長往嚴陵之瀨多謝簪裾高蹈愚公之谷朕承天革命建極開階寤寐星雲物色林壑順禎期而捐薛帶應休運以解荷裳粵自海隅來遊魏闕行藏之理所得去就之節無違風操可知啟沃攸佇特宜優獎委以諫曹授諫議大夫後放歸丘壑又曰王友貞懷州河內人也弱冠時母疾篤醫言惟啖人肉乃差友貞獨念無可求理乃割股肉以飴親母疾尋差則天聞之令就其家驗問持加旌表友貞素好學讀九經皆百遍訓誨子弟如嚴君焉口不言人過尤好釋典屏絕羶味出言未曾負諾時論以為真君子中宗在春宮召為司議郎, SBCK: ''}
