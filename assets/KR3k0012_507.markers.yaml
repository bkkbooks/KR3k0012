  - {type: variant, offset: 420, length: 5, content: 徐則東海郯, WYG: 曾参字子輿魯哀公致邑焉參辭不受曰吾聞受人者常畏人與人者常驕人縱君不我驕我豈無畏乎又曰陳仲子齊人其兄戴為齊卿食禄萬鍾仲子以為不義將妻子適楚居於於陵自謂於陵仲子窮不苟求不義之食遭嵗饑乏粮三日乃匐匍而食井上李實之蟲者三咽而能視身自織屨妻擘纑以易食楚王聞其賢欲以為相遣持金百鎰至於陵聘仲子仲子入謂妻曰楚子欲以我為相今日為相明日結駟連騎食方丈於前意者可乎妻曰夫子左琴右書樂在其中矣結駟連騎所安不過一肉而懐楚國之憂竟可乎於是謝使者遂相與逃而為人灌園又曰披裘公者呉人延陵季子出遊見中道有遺金顧而覩公曰取彼金公投鎌瞑目拂手而言曰何子處之髙而視之卑五月披裘而負薪豈取金哉季子大驚既謝而問姓名公曰子皮相之士何足語姓名哉又曰江上丈人者楚}
