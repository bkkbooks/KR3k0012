  - {type: variant, offset: 599, length: 4, content: 父琚開皇, WYG: 自孔子授易世𫝊至何及秦焚學以易為卜筮之書獨不焚故何傳之不絶漢興何以齊諸田徙社故號曰社田生以易受弟子東武王仲洛陽王孫丁寛齊服生梁項生等皆顯當世惠帝時何年老家貧守道不仕帝親幸其廬以受業終言易者宗之又曰王生者漢文景時人也善為黄老退居不仕與南陽張釋之交當時釋之為公車令太子與梁王共入廟不下司馬門釋之劾奏太子不敬文帝善之遷至廷尉及文帝崩太子代立為帝是謂景帝釋之懼稱病欲去用王生計乃見上謝之景帝不過也王生平常與釋之及公卿㑹庭}
