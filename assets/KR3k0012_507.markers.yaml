  - {type: variant, offset: 471, length: 5, content: 娶妻常服巾, WYG: 至自匿終南山不屈也又曰黄石公者下邳人也遭秦亂自隐姓名初張良易姓為張自匿下邳歩逰沂水圯上遇衣}
  - {type: punctuation, offset: 473, content: ，, id: KR3k0012_CHANT_507-bkkpn115}
