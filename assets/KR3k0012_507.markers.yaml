  - {type: variant, offset: 542, length: 0, content: '', WYG: 後十三年孺子見我濟北榖城山下黄石即我遂去不見良旦視其書乃是太公兵法良異之因講習以說他人莫能用後與沛公遇於陳留沛公用其言輙有功後十三年從髙祖過濟北榖城山下得黄石良乃寳祠之及死與石并葬焉又曰魯二徴士者皆魯人也髙祖定天下即皇帝位博士叔孫通曰徴魯諸儒三十餘人欲定漢儀禮二士獨不肯罵通曰天下初定死傷者未起而欲定禮樂禮樂所由起百年之徳而後興吾不忍為公所為也公所為不合古吾不行也公往矣無汙我通不敢致而去又曰安期先生者琅琊人受學河上丈人賣藥海邊老而不仕時人謂之千嵗公秦始王東遊請與語三夜賜金璧值數千萬出置阜鄉亭而去以玉舄為報留書與始皇曰後數千年求我於蓬萊山下及秦敗安期先生與其友蒯通同往見項羽欲封之卒不肯見列仙𫝊又曰東郭先生者與其友梁石君俱脩道隐居不仕曹叅為齊相尊禮士時范陽人蒯通為叅客入見叅曰婦人有夫死三日嫁者有幽居守寡不出門者足下即欲求婦何取叅曰取不嫁者通曰}
