  - {type: variant, offset: 461, length: 4, content: 苦請教授, WYG: 何以治齊人各殊叅不知所從蓋公善黄老乃使人厚幣聘之公為言治道貴清淨}
  - {type: punctuation, offset: 465, content: ，, id: KR3k0012_CHANT_507-bkkpn113}
