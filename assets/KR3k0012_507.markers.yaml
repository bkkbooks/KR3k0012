  - {type: variant, offset: 1314, length: 209, content: 卿已下皆赴詩餞別德義亦以詩留贈其文甚美天授初江南道宣勞使周興表薦則天徵赴都詔曰蘇州隱士史德義志尚虛玄素履貞確謙沖彰於里閈孝友表於閨庭固辤徵辟長往嚴陵之瀨多謝簪裾高蹈愚公之谷朕承天革命建極開階寤寐星雲物色林壑順禎期而捐薛帶應休運以解荷裳粵自海隅來遊魏闕行藏之理所得去就之節無違風操可知啟沃攸佇特宜優獎委以諫曹授諫議大夫後放歸丘壑又曰王友貞懷州河內人也弱冠時母疾篤醫言惟啖人肉乃差友貞獨念無可求理乃割股肉以飴親母疾尋差則天, WYG: ''}
