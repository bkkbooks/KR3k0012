  - {type: variant, offset: 127, length: 0, content: '', SBCK: 仁義之行爲至矣吾聞子方之師形解而不敢動口鉗而不知言語所學真土梗耳夫魏真爲居累矣又曰壷丘子林者鄭人也道德甚優列禦㓂師事之又曰列禦㓂者鄭人也隱居不仕鄭穆公時子陽爲相專任刑列禦㓂乃絶迹窮巷面有飢色或告子陽曰列禦㓂盖有道之士也居君之國而窮君無乃不好士乎子陽聞而悟使官載粟數十乗以與之禦㓂出見使再拜而辭之入見其妻妻撫心而怒曰聞爲有道之妻子皆得樂今子之妻子有飢色君遺先生食先生不受豈非命也哉禦㓂􅀏曰君非自知而遺我也以人之言而遺我}
  - {type: page-break, offset: 127, content: '', id: KR3k0012_SBCK_507-2a}
  - {type: variant, offset: 127, length: 0, content: '', WYG: 仁義之行為至矣吾聞子方之師形解而不敢動口鉗而不敢言語其所學為至耳文侯為之嘿然又曰壺丘子林者鄭人也道徳甚優列禦冦師事之乂曰列禦冦者鄭人也隐居不仕鄭穆公時子陽為相專任刑列禦冦乃絶迹窮巷面有饑色或告子陽曰列禦冦盖有道之士也居君之國而窮居無乃不好士乎子陽聞而悟使官載粟數十乗以與之禦冦出見使再拜而辭之入見其妻妻憮然而怒曰聞為有道之妻子皆得樂今子之妻子有饑色君遺先生食先生不受豈非命也哉禦冦笑曰君非自知而遺我也以人之言而遺我}
