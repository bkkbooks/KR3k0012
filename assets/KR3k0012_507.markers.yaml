  - {type: 'tls:seg', offset: 433, content: '', id: KR3k0012_CHANT_507-3a.7}
  - {type: variant, offset: 433, length: 0, content: '', WYG: 渡無舟而楚人購貟甚急自恐不脫見丈人得渡因觧所佩劒以與丈人曰此千金之劒也願獻之丈人不}
  - {type: variant, offset: 434, length: 0, content: '', WYG: 曰楚國之法得伍貟者執爵珪金千鎰吾尚不取何用劔為不受而别莫知其誰貟至呉為相求丈人不能得毎食輙祭之曰名可得聞而不可得見其為江上丈人乎又曰漁父者楚人也見楚亂乃匿名隐釣於江濱楚頃襄王時屈原為三閭大夫名顯於諸侯為上官靳尚所譛王怒遷之江濱被髮行吟於澤畔漁父見而問之曰子非三閭大夫歟何故至斯原曰舉世混濁而我獨清衆人皆醉而我獨醒是以見放漁父曰夫聖人不凝滯於物故能與世推移舉世混濁何不隨其流揚其波汨其泥衆人皆醉何不餔其糟歠其醨何故懐瑾握瑜自令放焉乃歌曰滄浪之水清可以濯吾纓滄浪之水濁可以濯吾足遂去深自閉匿人莫知焉又曰河上丈人者不知何國人也明老子之術自匿姓名居河之湄著老子章句故世號曰河上丈人當戰國之末諸侯交爭馳說之士咸以權勢相傾唯丈人隐身脩道老而不虧專}
