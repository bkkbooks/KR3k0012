  - {type: variant, offset: 457, length: 1, content: 學, WYG: 别從趙其族樂毅顯名於諸侯而臣公獨好黄老恬靜不仕及趙為秦昭王滅臣公東之齊以老子顯名齊人尊之號稱賢師趙人田叔等皆尊事之又曰蓋公者齊之膠西人也明老子師事樂臣公楚漢之起齊人爭往干世主唯蓋公獨遁居不仕及漢定天下曹叅為齊相延問諸儒}
