  - {type: variant, offset: 774, length: 0, content: '', SBCK: 致命欲以爲相子思曰公儀子逾所以不至也君􅀂飢渴待賢納用其謀雖􅂼食飲水伋亦願在下風如以髙官厚禄爲釣餌而無信用之心公儀子智􅀂魚者可也不尔則不踰君之庭且臣不佞又不能爲君操竿下釣以傷守節之士潜竟終身不屈又曰王斗齊人也修道不仕與顔歜並時曽造齊宣王門欲見宣王宣王使謁者延斗入斗曰趍見王爲好勢趍見斗爲好士於王何如謁者還報王曰先生徐之寡人請從王趍而迎之於門曰寡人奉先君之宗廟宇社稷願聞先生直言正諫斗曰王之憂國愛民不􅀂王之愛尺之縠王曰何謂斗曰王使爲冠不使左右便辟而使工者何也爲能之也今王治齊國非左右便辟則無使也臣故曰不如愛尺之縠也王乃}
