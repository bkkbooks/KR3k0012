  - {type: variant, offset: 1876, length: 1933, content: 十餘氣益壯刺史盧齊卿就謁致禮因訪以字人之術希夷曰孔子稱已所不欲勿施於人可以終身行之矣及玄宗東巡勑州縣以禮徵召至駕前年已九十六上令中書令說訪以道義宦官扶入宮中與說甚悅詔授朝散大夫守國子博士聽致仕還山又曰衛大經者篤學善易口無二言則天降詔徵之辭疾不起與魏州人夏侯乾童有舊聞乾童母卒徒步往弔之鄉人止之曰當夏溽暑豈可涉千里致書可也大經曰尺書安能盡意遂行至魏州會乾童出行大經造門設席行吊禮不訊其家人而還開元初畢勾為刺史謂解令孔慎言曰衛生德厚宜有旌異古人式千木之閭禮賢敵也慎言造門就謁時大經已年老辭疾不見嘗預筮死日先鑿墓自為誌文如筮而終又曰李元凱者博學善天文律曆然性恭慎口未嘗言之鄉人宋璟年少時師事之及作相使人遺元凱束帛將薦舉之皆拒而不荅景龍中元行沖為洺州刺史邀元凱至州問以經義因遺之衣服元凱辭曰微軀不宜服新麗但恐不能勝其義以速咎也行沖乃以泥塗污而與之不獲已而受乃還乃以己之所蠶素絲五兩以酬行沖曰義不受無妄之財年八十餘終又曰徐仁紀者聖曆中徵拜左拾遺三上書論得失不納謂人曰三諫不聽可去矣遂移病歸鄉里神龍初宣慰使舉仁紀之行可以激俗又徵拜左補闕三上書又不省乃詣執政求出授靈昌令妻子不之官廨舍唯衣履及書䟽而已餘無所蓄又曰孫處玄者長安中徵為左拾遺頗善屬文常恨天下無書以廣所聞神龍初桓彥范等用事處玄遺彥範書論時事得失彥範竟不用其言乃去官還鄉里以病卒又曰白履忠陳留凌儀人也博涉文史嘗隱居於古大梁城時號為梁丘子景雲中徵拜校書郎尋棄官而歸開元十年刑部尚書王志愔表薦履忠隱居讀書貞苦守操有古人之風堪代褚無量馬懷素入閤侍讀乃徵赴京師及至辭以老病不任職事詔授朝散大夫停留數月而歸履忠鄉人左庶子吳兢謂履忠曰吾子家室屢空竟不霑斗米疋帛雖得五品何益於實也履忠欣然尋以壽終又曰崔覲梁州城固人也為儒不樂仕進以耕稼為業老而無子乃以田宅家財分給奴婢令各為主業覲夫妻遂隱於城固南山家事一不問約奴婢遞過其舍至則供給酒食而己夫婦林泉相對以嘯詠自娛山南節度使鄭餘慶高其行辟為節度參謀累邀方至府第為吏無方略苦不達人事餘慶以長者優容之太和八年左補闕王直方薦覲有高行詔以起居郎徵之覲辭疾不起卒於山皇甫士安高士傳曰王倪者堯時賢人也師被衣齧缺又學於王倪問道焉齧缺曰子不知利害則至人固不知利乎王倪曰至人神矣大澤焚而不能熱河漢沍而不能寒疾雷破山暴風振海而不能驚若然者乘雲雨騎日月而遊天地之外死生無變於己而況利害之間乎又曰善卷者古之賢人也堯聞其得道之士乃北面師之而問道焉及舜受終之後又以天下讓卷卷曰昔唐氏之有天下不教而民從之不賞而民勸之天下均平百姓安靜民不知怒不知喜今子盛為衣裳之服以觀民目調五音之聲以亂民耳作皇韶之樂以愚民心耳目益榮天下之亂從此始矣吾雖為之其何益乎予立宇宙之中冬衣皮毛夏衣絺葛春耕種形足以勞秋收歛身足以休日出而作日入而息逍遙於天地之間而心意自得何以天下為哉遂不受去入深山莫知所終矣又曰齧缺堯時人許由師事齧缺堯又師由問曰齧缺可以配天乎既而齧缺遇由由曰子將何之曰將逃堯曰何謂也曰夫堯知賢人之利天下而不知其賊天下遂逃不見又曰巢父堯時隱人年老以樹為巢而寢其上故時人號曰巢父堯之讓許由也由以告巢父巢父曰汝何不隱汝形藏汝光若非吾友也擊其膺而下之由悵然不自得乃過清冷之水洗其耳拭其目曰向者聞言負吾矣遂去終身不相見又曰許由字武仲隱乎沛澤之中堯聞乃致天下而讓焉由乃退而耕於中嶽頴水之陽箕山之下史記又載又曰壤父者堯時人年五十而擊壤於道中觀者曰大哉帝之德也壤父曰吾日出而作日入而息鑿井而飲耕田而食帝何德於我哉又曰蒲衣者舜時賢人也年八歲而舜師之遂讓以天下蒲衣不受而去莫知所終又曰老萊子者楚公室亂逃世耕於蒙山之陽蓬蒿為室枝杖於床飲水食菽墾山播種人或言於楚王王於是駕至萊子之門萊子方織畚王曰守國之政孤願煩先生老萊子曰諾王去其妻樵還曰子許之乎老萊子曰然妻曰妾聞之可食以酒肉者可隨而鞭棰夫可擬以官祿者可隨而鈇鉞妾不能為人所制者妻投其畚而去老萊子亦隨其妻至於河南以萊子為老子人莫知其所終也又曰顏回字子淵貧而樂道退居陋巷曲肱而寢孔子曰爾家貧居卑何不仕回曰回有郭外田六十畝足以供饘粥有郭內圃六十畝足以供絲麻鼓宮商之音足以自樂習所聞於夫子足以自娛回何仕焉又曰弦高者鄭人也鄭穆公時高見鄭為秦晉所逼乃隱不仕為商人及晉文公之返國也與秦穆公伐鄭圍其都鄭人私與秦盟而晉師退秦又使大夫祀子等三人戍鄭居三年晉文公卒襄公初立秦穆公方強使百里西乞白乙率師襲鄭過周及滑鄭人不知時高將市於周遇之謂其友蹇他曰師行數千里又數經諸侯之地其勢必襲鄭凡襲國者以無備也示以知其情必不敢進矣於是乃矯鄭伯之命以十二牛犒秦師且使人告鄭為備祀子亡奔齊孟明等返至殽晉人要擊大破秦師鄭於是賴高而在鄭穆公以存國之賞賞高而高辭曰詐而得賞則鄭國之信廢矣為國而無信是敗俗也賞一人而敗國俗智者不為也遂以其屬徙東夷終身不返, WYG: ''}
