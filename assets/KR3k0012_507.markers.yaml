  - {type: variant, offset: 427, length: 5, content: 幼沉靜寡嗜, WYG: 楚平王以費吾忌之䜛殺伍奢奢子貟亡將奔呉至江上}
  - {type: punctuation, offset: 430, content: ，, id: KR3k0012_CHANT_507-bkkpn105}
