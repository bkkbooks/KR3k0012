  - {type: variant, offset: 3473, length: 0, content: '', SBCK: 壽又曰四皓者皆河内軹人也或在汲一曰東園公二曰角里先生三曰綺里季四曰夏黄公皆修道㓗巳非義不動􅁗始皇時見􅁗政虐乃退入藍田山而作歌曰莫莫髙山深谷逶迤曄曄紫芝可以療飢唐虞丗逺吾將何歸駟馬髙盖其憂甚大冨貴之畏人不如貧賤之肆志乃共入啇洛隱地肺山以待天下定及􅁗敗漢髙聞之徴之不至深自匿終南山不能屈}
