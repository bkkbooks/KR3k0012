  - {type: variant, offset: 3472, length: 0, content: '', SBCK: 從盖公善黄老乃使人厚幣䀻之公爲言治道貴清浄則民定遂推此爲􅀋爲叅言之叅恱乃避正堂舎之師事焉齊果大治及叅入相漢導盖公之道故天下歌之盖公雖爲叅師然未嘗仕以}
