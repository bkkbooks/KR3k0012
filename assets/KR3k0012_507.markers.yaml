  - {type: variant, offset: 2912, length: 377, content: 安靜民不知怒不知喜今子盛為衣裳之服以觀民目調五音之聲以亂民耳作皇韶之樂以愚民心耳目益榮天下之亂從此始矣吾雖為之其何益乎予立宇宙之中冬衣皮毛夏衣絺葛春耕種形足以勞秋收歛身足以休日出而作日入而息逍遙於天地之間而心意自得何以天下為哉遂不受去入深山莫知所終矣又曰齧缺堯時人許由師事齧缺堯又師由問曰齧缺可以配天乎既而齧缺遇由由曰子將何之曰將逃堯曰何謂也曰夫堯知賢人之利天下而不知其賊天下遂逃不見又曰巢父堯時隱人年老以樹為巢而寢其上故時人號曰巢父堯之讓許由也由以告巢父巢父曰汝何不隱汝形藏汝光若非吾友也擊其膺而下之由悵然不自得乃過清冷之水洗其耳拭其目曰向者聞言負吾矣遂去終身不相見又曰許由字武仲隱乎沛澤之中堯聞乃致天下而讓焉由乃退而耕於中嶽頴水之陽箕山之下史記又載又曰壤父者堯時人年五十而擊壤於道中觀者曰大哉帝之德也壤父曰吾日出而作日入而息鑿井而飲耕田而食帝何德於我, SBCK: 名}
