  - {type: variant, offset: 466, length: 1, content: 謝, WYG: 民定遂推此為類為叅言之叅恱乃避正堂舎之師事焉齊果大治及叅入相漢遵蓋公之道故天下歌之蓋公雖為叅師然未嘗仕以夀終又曰四皓者皆河内軹人也或在汶一曰東園公二曰角里先生三曰綺里季四曰夏黄公皆脩道潔已非義不動秦始皇時見秦政虐乃退居藍田山}
  - {type: page-break, offset: 466, content: '', id: KR3k0012_WYG_507-8a, image: WYG0897/WYG0897-0551a.png}
  - {type: variant, offset: 468, length: 1, content: 遣, WYG: 作歌曰莫莫髙山深谷逶迤曄曄紫芝可以療饑唐虞世逺吾將何歸駟馬髙蓋其憂甚大富貴之畏人不如貧賤之肆志乃共隐洛地沛山以待天下定及秦敗漢髙聞而徴}
