  - {type: variant, offset: 3470, length: 0, content: '', SBCK: 焉又曰河上丈人者不知何國人也明老子之術自匿姓名居河之湄著老子章句故丗號曰河上丈人當戰國之末諸侯交爭馳􅀃之士咸以權􅀔相傾唯丈人隱身修道老而不􅃜專業於安期先生爲道家之宗焉又曰樂臣公者宋人也}
  - {type: variant, offset: 3470, length: 0, content: '', krp: 焉又曰河上丈人者不知何國人也明老子之術自匿姓名居河之湄著老子章句故丗號曰河上丈人當戰國之末諸侯交爭馳說之士咸以權勢相傾唯丈人隱身修道老而不虧專業於安期先生爲道家之宗焉又曰樂臣公者宋人也}
  - {type: variant, offset: 3471, length: 0, content: '', SBCK: 先宋公族其後别從趙其族樂毅顯名於諸侯而臣公獨好黄老恬静不仕及趙爲􅁗昭王滅臣公東之齊以老子顯名齊人尊之號稱賢師趙人田叔等皆師事之又曰盖公者齊之膠西人也明老子師事樂臣公楚漢之起齊人爭往于丗主唯盖公獨遁居不仕及漢定天下曹叅爲齊相延問諸儒數百人何以治齊人人各殊叅不知}
