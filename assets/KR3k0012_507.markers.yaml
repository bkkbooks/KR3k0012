  - {type: variant, offset: 647, length: 246, content: 士文詡時遊於太學學內翕然咸共宗仰其門生多詣文詡請質疑滯文詡輒博引證據辨說無窮唯其所擇右僕射蘇威聞其名而召之與語大悅勸令從官文詡意不在仕固辭仁壽末學廢文詡策杖而歸灌園為州郡頻舉皆不應命事母以孝聞每以德化鄉黨頗移風俗嘗有人夜中竊刈其麥者見而避之盜因感悟棄麥而謝文詡慰論之自誓不言固令持去經數年盜者向鄉人論之始為遠近所悉州縣以其貧素將加賑恤輒辭不受每閑居之際從容長歎曰老冉冉而將至恐修名之事不立以如意擊几皆有處所時人方之閔子騫原憲終於家時年四十鄉人為立碑頌號曰張先生唐書隱逸傳曰王績字無功絳州龍門人, WYG: ''}
