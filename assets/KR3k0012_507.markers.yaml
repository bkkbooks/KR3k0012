  - {type: variant, offset: 477, length: 9, content: 陳太建時應召來憩於, WYG: 衣老墜履圯下顧謂良曰孺子取履良愕然欲毆之為其老也强忍下取履因跪進焉公笑以足受而去良殊驚公行數里還謂良曰孺子可教也後五日平明與我期此良愈怪之復跪曰諾五日平旦良往公怒曰與老人期後何也後五日早㑹良鷄鳴往公又先在怒曰何後復五日早㑹良夜半往有頃公亦}
  - {type: page-break, offset: 477, content: '', id: KR3k0012_WYG_507-9a, image: WYG0897/WYG0897-0551c.png}
