  - {type: variant, offset: 308, length: 1, content: 辱, WYG: 又曰王斗齊人也脩道不仕與顔歜並時曾造齊宣王門欲見宣王宣王使謁者延斗入斗曰趨見王為好勢趨見斗為好士於王如何謁者還報王曰先生徐之寡人請從王趨而迎之於門曰寡人奉先君之宗廟社禝願聞先生直言正諫斗曰王之憂國愛民不若王之愛尺縠王曰何謂斗曰王使為冠不使左右便辟而使工者何也為能之也今王治齊國非左右便辟則無使也臣故曰不如愛尺之縠也王乃謝曰寡人有罪於國家矣}
