  - {type: variant, offset: 4319, length: 0, content: '', SBCK: 一日不獵又曰齊崔子植位冀州別駕走馬從禽髪掛木而死後周書曰逹奚震武之子也少驍勇便􅀐射太祖嘗於渭北校獵時兎過太祖前震與諸將競射之馬倒而墜震足不傾躓因歩走射之矢發中兎頋馬纔趨遂廻身騰上太祖喜曰非此父不生此子乃賜震雜綵百叚唐書曰武德七年十二月庚辰臘上曰臘}
