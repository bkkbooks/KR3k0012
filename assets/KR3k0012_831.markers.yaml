  - {type: variant, offset: 3991, length: 215, content: 德沙門千餘人肅然觀聽什忽下高坐謂興曰有二小兒登吾肩慾障須婦人興乃召宮女進入一交而生二子焉興嘗謂什曰天師聰明超悟天下莫二何使法種無嗣遂以妓女十人逼令受之爾後不住僧坊別立廨舍諸僧多効之什乃聚針盈鉢引諸僧謂之曰若能見効食此者乃可畜室爾因舉匕進針與常食不別諸僧愧服乃止又曰顧愷之常悅一鄰女挑之弗從乃圖其形於壁以棘針釘其心女遂患心痛愷之因致其情女從之遂密去針而愈宋書曰傅琰為山陰令賣針賣糖老姥爭團絲來詣琰琰樹團絲於柱鞭之密視有鐵屑乃罰賣糖者, SBCK: 獲}
