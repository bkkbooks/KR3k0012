  - {type: variant, offset: 3504, length: 0, content: '', SBCK: 搜索取不任者夏獵爲苗爲苗稼除害也秋獵爲獮鮮少者從殺氣也冬獵爲狩得獸取之無所擇宵田爲獠管子曰獠獵畢弋今江東亦呼獵爲獠音爲遼或曰即今夜獵載鑪照也火田爲狩放火燒草獵亦爲狩史記曰西伯將畋卜之曰所獲非熊非羆霸王之輔西伯果遇吕望釣于渭濵遂載歸號太公望又曰任安字少卿邑中人民俱岀獵安常爲人分麋鹿雉兔部署老小劇易衆人皆喜又曰今上爲膠東王時韓嫣與上學書相愛及上爲太子愈益親嫣善􅀐射上即位欲事代匈奴而嫣先習胡兵以故益尊貴嫣常與上卧起江都王入朝有詔得從入獵上林中天子車駕馬未行而先使嫣乗副車從數十百􅀐馳騖視獸江都王望見以爲天子避從者伏謁道旁嫣驅不見旣過江都王怒爲皇太后泣請得歸國入􅀫衛比韓嫣太后由此嫌嫣戰國䇿曰魏文侯與虞人期獵是日飲酒樂天􅀨文侯將出左右曰今日飲酒樂天又雨君焉出文侯曰吾與虞人期獵雖樂豈可不壹㑹期哉乃往漢書曰李廣􅀍黜與故頴隂侯屏居藍田}
  - {type: page-break, offset: 3504, content: '', id: KR3k0012_SBCK_831-5a}
  - {type: variant, offset: 3504, length: 0, content: '', WYG: 春蒐取不孕者夏獵為苗為苗稼除害也秋獵為獮獮殺也順秋氣也冬獵為狩得獸取之無所擇宵田為獠管子曰獠獵畢弋今江東亦呼獵為獠音為遼或曰即今夜獵載鑪照也火田為狩放火燒草獵亦為狩史記曰西伯將畋卜之曰所獲非熊非羆霸王之輔西伯果遇吕望釣於渭濵遂載歸號太公望又曰任安字少卿邑中人民俱出獵安常為人分麋鹿雉兎部署老小當壯劇易處衆人皆喜又曰今上為膠東王時韓嫣與上學書相愛及上為太子愈益親嫣善騎射上即位欲事伐匃奴而嫣先習胡兵以故益尊貴嫣常與上卧起江都王入朝有詔得從入獵上林中天子車駕馬未行而先使嫣乗副車從數十百騎馳騖視獸江都王望見以為天子避從者伏謁道旁嫣驅不見既過江都王怒為皇太后泣請得歸國入宿衛比韓嫣太后由此嗛嫣戰國䇿曰魏文侯與虞人期獵是日飲酒樂天雨文侯將出左右曰今日飲酒樂天又雨君焉出文侯曰吾與虞人期獵雖樂豈可不一㑹期哉乃往漢書曰李廣被黜與故潁隂侯屛居藍田}
