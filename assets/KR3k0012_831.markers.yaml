  - {type: variant, offset: 2606, length: 0, content: '', SBCK: 出者著春田之早晚也一發五豝虞人翼五豝以待公之發于嗟乎騶虞騶虞義獸有至信之徳則應彼茁者蓬蓬草一發五豵豕一歳曰從于嗟乎騶虞又緇衣叔于田曰叔于田巷無居人不如叔也洵美且仁又雞鳴曰還刺荒也襄公好田獵從禽獸而無厭國人化之遂成風俗習}
