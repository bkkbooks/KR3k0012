  - {type: variant, offset: 38, length: 178, content: 百四十六畝三十步古者百里當今百二十一里六十步四尺二寸二分周尺之數未詳聞也案禮制周猶以十寸為尺蓋六國時多變亂法度或言周尺八寸則步更為八八六十四寸以此計之古者百畝當今百五十六畝二十五步古者百里當今百二十五里漢書曰度者分寸尺丈引也所以度長短也度音大各反本起黃鍾之長以子穀秬黍中者師古曰秬即黑黍中者不大不小也言取黑黍穀子大小中者率為分寸也一黍之廣度之九十分黃鍾之長, WYG: ''}
  - {type: punctuation, offset: 46, content: 。, id: KR3k0012_CHANT_831-bkkpn8}
  - {type: 'tls:seg', offset: 46, content: '', id: KR3k0012_CHANT_831-1a.7}
  - {type: variant, offset: 56, length: 415, content: 里六十步四尺二寸二分周尺之數未詳聞也案禮制周猶以十寸為尺蓋六國時多變亂法度或言周尺八寸則步更為八八六十四寸以此計之古者百畝當今百五十六畝二十五步古者百里當今百二十五里漢書曰度者分寸尺丈引也所以度長短也度音大各反本起黃鍾之長以子穀秬黍中者師古曰秬即黑黍中者不大不小也言取黑黍穀子大小中者率為分寸也一黍之廣度之九十分黃鍾之長一為一分十分為寸十寸為尺十尺為丈十丈為引而五度審矣其法用銅高一寸廣二寸長一尺而分寸丈尺存焉用竹為引高一分廣六分長十丈其方法矩高廣之數陰陽之象也分者自三微而成著可分別也寸者忖也尺者篗也師古曰篗音約丈者張也引者信也師古曰信謂曰伸言其長夫度者引於分忖於寸篗於尺張於丈信於引引者信天下也職在內官內官署名廷尉掌之師古曰法度所起故屬廷尉也魏略曰昔長安市儈有劉仲始者一為市吏所辱乃感激蹹其尺折之遂行學問經明行修流名海內後以有道徵不肯就眾人歸其高晉書荀勗別傳曰魏杜夔制律乖錯勗知漢魏尺漸長於古四分夔依為律故不諧乃令佐著作劉恭依, SBCK: 獵上}
