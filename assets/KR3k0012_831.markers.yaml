  - {type: variant, offset: 4219, length: 1, content: 督, SBCK: 而還使御史􅁥司其中禽獸有犯者罪至大辟又曰石虎命太子宣行祈山川遊獵藪澤乗大輅羽葆華蓋建天子旌旂十有六軍戎卒八萬出金明馳逐終夕所在陳列行宫四靣各以百里爲度驅圍禽獸皆暮集行宫文武跪立圍守重行􅇏炬星羅光燭如晝勁􅀐百餘馳射其中宣}
