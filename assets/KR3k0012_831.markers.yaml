  - {type: variant, offset: 281, length: 267, content: 數陰陽之象也分者自三微而成著可分別也寸者忖也尺者篗也師古曰篗音約丈者張也引者信也師古曰信謂曰伸言其長夫度者引於分忖於寸篗於尺張於丈信於引引者信天下也職在內官內官署名廷尉掌之師古曰法度所起故屬廷尉也魏略曰昔長安市儈有劉仲始者一為市吏所辱乃感激蹹其尺折之遂行學問經明行修流名海內後以有道徵不肯就眾人歸其高晉書荀勗別傳曰魏杜夔制律乖錯勗知漢魏尺漸長於古四分夔依為律故不諧乃令佐著作劉恭依周禮制古尺新律呂以諧音韻後得古玉律鍾磬與新律相合詔賜古尺一具隋書曰世稱有田父於野地中得周時玉尺便是天下正尺荀勗試以校尺所造金石絲竹皆短校一米管子曰尺寸尋丈, WYG: 畢翳射}
