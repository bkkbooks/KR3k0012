  - {type: 'tls:seg', offset: 2585, content: '', id: KR3k0012_CHANT_831-19a.102}
  - {type: variant, offset: 2585, length: 0, content: '', WYG: 曰親逐其君爾父為厲厲惡鬼林父逐君在十四年是之不憂而何以田為又襄}
  - {type: variant, offset: 2587, length: 3, content: 斤成鈞, WYG: 年鄭豐巻將祭請田焉弗許田獵也曰唯君用鮮鮮野獸也衆給而已衆臣祭芻豢為足又昭公曰齊侯田于沛言疾愈行獵沛澤名招虞人以弓不進虞人掌山澤之官公使執之辭曰昔我先君之田旃以招大夫弓以招士皮冠以招虞人臣不見皮冠故不敢進乃舍之仲尼曰守道不如守官君招當往道之常也非物不進官之制也君子韙之韙是也又定公上曰魏獻子屬役於韓簡子及原壽過簡子韓起孫不信也原壽過周大夫而田於大陸焚焉禹貢大陸在鉅鹿北嫌絶逺疑此田在汲郡呉澤荒蕪之地大陸幷見燒也爾雅廣平曰陸還卒於寗寗今修武縣吳澤范獻子去其柏椁以其未復命而田也范獻子代魏子為政去其柏椁示貶之又哀公下曰西狩於大野叔孫氏之車子鉏商獲麟大野在高平鉏野縣東北大澤是也車子㣲}
  - {type: page-break, offset: 2587, content: '', id: KR3k0012_WYG_831-5a, image: WYG0900/WYG0900-0355a.png}
