  - {type: variant, offset: 1470, length: 1031, content: 以量多少也本起於黃鍾之龠用度數審其容師古曰因度以生量也其容謂其中所容受之多少也以子穀秬黍中者千有二百實其龠以井水準其概概欲其直故以水平之井水清清則平也師古曰概所以概平斗斛之上者也十龠為合十合為升十升為斗十斗為斛而五量嘉矣其法用銅方尺而圓其外旁有庣焉師古曰庣不滿之處也音吐彫反其上為斛其下為斗其上謂仰斛也其下謂覆斛之底受一斗也左耳為升右耳為合龠其狀似爵以縻爵祿縻散也上三下二參天兩地圜而函方左一右二陰陽之象也其圜象規其重二鈞備氣物之數合萬有一千五百二十三十斤為鈞萬一千五百二十銖聲中黃鍾始於黃鍾而反覆焉孟康曰反斛聲中黃鍾覆斛亦中黃鍾之宮宮為君也臣瓚曰仰斛受一斛覆底受一斗故曰而反覆焉君制器之象也龠者黃鍾律之實也躍微動氣而生物也合者合龠之量也升者登合之量也斗者聚升之量也斛者角斗平多平少之量也夫量者躍於龠合於合登於升聚於斗角於斛也職在太倉大司農掌之也孔叢子曰一手之盛謂之溢兩手謂之匊匊四升也匊謂之豆豆四謂之區區四謂之釜釜二半謂之藪藪謂之缶缶謂之鍾鍾二有半謂之秉秉十六斛也曹瞞傳曰太祖常賦廩穀不足私謂主者曰如何主者曰以小斛量之太祖曰善後軍中言太祖欺眾太祖謂主者曰當特借汝死以厭眾不然事不解乃取狥曰行小解盜官穀斬之軍門風俗通曰斛者角也庾三斛四斗秉二十四斛秤廣雅曰秤謂之衡錘謂之權說文曰秤銓也禮記令仲春曰是月也日夜分則同度量平權衡因春分晝夜平則正之同亦平也丈尺曰度斗斛曰量稱錘曰權稱上曰衡又經解曰禮之於正國也猶衡之於輕重也繩墨之於曲直也規矩之於方圜也故衡誠縣不可欺以輕重繩墨誠陳不可欺以曲直規矩誠設不可欺以方圜漢書曰衡權者衡平也權重也衡所以任權而鈞物平輕重也其道如厎厎平也謂以厎石厲物令平齊也厎音指以見準之正繩之直左旋見規右折見矩其在天也佐助璇機斟酌建指以齊七政故曰玉衡論語云立則見其參於前也孟康曰權衡量三尋為參在車則見其倚於衡也又曰齊之以禮此衡在前居南方之義也權者銖兩斤鈞石也所以稱物平施知輕重也本起於黃鍾之重一龠容千二百黍重十二銖兩之為兩二十四銖為兩十六兩為斤三十斤為鈞四鈞為石忖為十八易十有八變之象孟康曰忖度也度其義有十八也黃鍾龠銖兩鈞斤石凡七與下十一象為十八也五權之制以義立之以物鈞之其餘大小之差以輕重為宜圜而環之令之肉倍好者孟康曰謂為鍾之形如環也如淳曰體為肉孔為好周旋無端終而復始無窮已也銖者物繇忽微至於成著可殊異也兩者兩黃鍾律之重李奇曰黃鍾之重重十二銖兩十二得二十四銖二十四銖而成兩者二十四氣之象也斤者明也三百八十四銖易二篇之爻陰陽變動之象也十六兩成斤者四時乘, WYG: 獲禽祀}
