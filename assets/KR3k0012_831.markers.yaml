  - {type: variant, offset: 3032, length: 459, content: 稱斤兩也數多少也莊子曰聖人不死大盜不止為權衡以稱之則并與權衡而竊之雖有軒冕之賞弗能勸斧鉞之威不能禁掊斗折衡而民不爭也慎子曰厝鈞石使禹察錙銖之重則不識也縣於權衡則氂髮之微識矣及其識之於權衡則不待禹之智中人之知莫不足以識之矣慎子曰君臣之間猶權衡也權左橛則右重右重則左橛輕重迭相柝天地之理也孔叢子曰二十四銖四兩兩有半曰揵倍揵曰舉倍舉曰鏘鏘謂之鍰二鍰四兩謂之斤斤十二謂之衡衡有半謂之倍稱謂之鈞鈞四謂之石石四謂之鼓然則鼓四百八十斤也韓子曰人之不事衡石者非貞廉而遠利也石不能為人多少衡不能為人輕重求索不得故人不事也明主之國官不敢枉法吏不敢為私利貨賂不行是境內之事盡如衡石也說苑曰度量衡以十粟生之十粟重一豆六豆重一銖二十四銖重一兩十六兩重一斤三十斤重一鈞四鈞重一石語林曰孟業為幽州其人甚肥或以為千斤武帝欲秤之難其大臣乃作大秤挂壁業入見帝曰朕欲試自秤有幾斤業荅曰陛下正是欲稱臣耳無煩復勞聖躬於是遂秤業果得千斤夢書曰銓衡為人正也夢得衡為平端也以銓稱量平財錢也重者價貴輕者賤也銓衡折敗無平人也李尤權衡銘曰夫審輕重莫若權衡正是非其唯賢明剪刀, SBCK: ''}
