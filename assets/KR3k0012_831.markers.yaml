  - {type: variant, offset: 5190, length: 0, content: '', WYG: 謂髙昌王麴文泰曰丈夫在世樂事有三天下太平家給人足一樂也草淺獸肥以禮田狩弓不虛發箭不妄中二樂也六合大同萬方咸慶張樂髙宴上下歡洽三樂也今日王可從禽明日當飲宴耳又曰髙宗狩于陸渾縣六日止飛山髙宗親御弧矢獵四鹿及兎數十頭晩次御營望見大官烹宰欲供百官之膳因問侍中許圉師曰朕目撃彼羊在於格下見其無罪就戮非無憫惻之情今欲以死獸易之可乎圉師對曰昔宋文侯見人欲將牛釁鐘因曰吾觀此牛觳無罪而就死也乃不釁鐘陛下取已死之鹿代欲刲之牛則堯舜之用心也遂釋其羊不殺九日又於山南布圍大順府果毅王萬興以輙先促圍集衆欲斬之上謂侍臣曰軍令有犯罪在不赦恐外人謂我翫好畋獵輕斷人命又以其經從}
