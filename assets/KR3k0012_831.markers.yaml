  - {type: variant, offset: 4209, length: 0, content: '', SBCK: 宋衡陽王義季鎮荆州嘗大蒐於郊有野老帶苫而耕命左右斥之老人擁耒對曰昔楚子盤遊受譏令尹今陽和扇氣播厥之始一日不作人失其時大王馳騁爲樂驅斥老夫非勸農之意義季止馬曰此賢者也命賜之食}
