  - {type: variant, offset: 4211, length: 3, content: 奐為雍, SBCK: 僧逹爲宣城太守性好遊獵而山郡無事僧逹肆意馳騁或三五日不歸受辤辯訟多在獵所人或逢不識問府君所在僧逹報曰在近梁書曰曹景宗㓜善􅀐射好畋獵常與少年數十人澤中逐麞鹿毎衆􅀐趂鹿馬相亂景宗於衆中射之人皆懼中馬足應􅁌輒斃以此爲樂後景宗爲楊}
