  - {type: variant, offset: 2574, length: 3, content: 行成歲, WYG: 武王太史闕過也使百官各為箴辭戒王過於虞人之箴虞人掌田獵曰茫茫禹迹畫為九州茫茫逺貌畫分也經啓九道啓開九州之道民有寢廟獸有茂草各有攸處德用不擾人神各有所歸故得不亂在帝夷羿冒于原獸冒貪也忘其國恤而思其麀牡言但念獸武不可重重猶數也用不恢于夏家羿}
  - {type: punctuation, offset: 2577, content: ，, id: KR3k0012_CHANT_831-bkkpn736}
  - {type: 'tls:seg', offset: 2577, content: '', id: KR3k0012_CHANT_831-19a.101}
  - {type: variant, offset: 2578, length: 5, content: 六乘八節得, WYG: 好武雖有家而不能恢大}
  - {type: variant, offset: 2584, length: 0, content: '', WYG: 獸臣司原敢告僕夫獸臣虞人僕夫不敢斥尊虞箴如是可不懲乎於是晉侯好田故魏絳及之及后羿事又襄十七年曰衛孫蒯田于曹隧越境而獵孫蒯林父之子飲馬于重丘重丘曹邑毁其瓶重丘人閉門而訽之訽罵}
  - {type: page-break, offset: 2584, content: '', id: KR3k0012_WYG_831-4b, image: WYG0900/WYG0900-0354d.png}
