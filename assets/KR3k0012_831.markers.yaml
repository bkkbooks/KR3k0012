  - {type: variant, offset: 5285, length: 1, content: 婦, SBCK: 太平家給人足一樂也草淺獸肥以禮田狩弓不虚發箭不妄中二樂也六合大同萬方咸慶張樂髙宴上下歡洽三樂也今日王可從禽明日當飲讌耳又曰髙宗狩于陸渾縣六日止飛山㒹髙宗親御弧矢獵四鹿及兎數十頭晚次御營望見太官烹宰欲供百官之膳因問侍中許圉師曰朕目擊彼羊在於格下見其無罪就戮非無憫惻之情今欲以死獸易之可乎圉師對曰昔者宋文侯見人欲將牛釁鍾因曰吾觀此牛觳觫似無罪而就死也乃不釁鍾陛下取巳死之鹿代欲刲之羊則堯舜之用心地遂釋其羊不殺九日又於山南布圍大順府果毅王萬興以輒先促圍集衆欲斬之上謂侍臣曰軍令有犯罪在不赦恐外人謂我翫好畋獵輕斷人命又以其從征遼有功特令放免又曰髙宗出獵在路遇􅀨因問諌議大夫谷郍律曰油衣􅀂爲不漏對曰能瓦爲之必不漏矣上大恱因此不復出獵又曰髙宗駕幸自九成宫還宫仍西狩校習自麟遊西北遶歧梁歴普潤止雍爲兩圍殿中侍御史杜易簡賈言忠􅁥圍山阜懸危杖䇿}
