  - {type: variant, offset: 2645, length: 232, content: 終於十二辰而復於子黃鍾之象也孟康曰稻之數始於銖終於石石重百二十斤象十二月銖之重本取於子律黃鍾一龠容千二百黍為十二銖故曰復於子黃鍾之象也千九百二十兩者陰陽之數也三百八十四爻五行之象也四萬六千八十銖者萬五千五百二十物歷四時之象也而歲功成就五權謹矣魏志曰鄧哀王冲字倉舒少聰察歧嶷生五六歲智意所及有若成人孫權曾致巨象太祖欲知其斤重訪之群下咸莫能出其理冲曰置象大舡之上而剋其水所至稱物以載之則立可知矣太祖大悅即施行焉吳志曰薛綜上䟽云九真會稽朱符多以鄉人虞裒劉彥之徒作長吏侵虐, SBCK: 襄公好田獵罼弋不脩民事}
