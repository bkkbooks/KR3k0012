  - {type: variant, offset: 3720, length: 195, content: 石下者眾咸異之綜問主簿主簿對曰昔吳長沙桓王嘗飲餞孫洲父老云此洲狹而長君當為長沙乎事果應夫三刀為州得交刀君亦當交州後果交州幽明錄同衣軸世說曰張華將敗有飄風吹衣軸六七倚壁管禮記內則曰鍼管線纊荀卿針縷賦曰管以為母魏武上雜物䟽曰中宮雜物雜畫象牙鍼管一枚針說文曰針綴衣也禮記內則曰舅姑衣裳綻裂細針請補綴左傳成公上曰楚伐魯賂以執針百人女工吳書曰虞翻年十二客詣翻兄不過之乃與客書曰虎魄不受腐芥慈石不受曲針, SBCK: 呉}
