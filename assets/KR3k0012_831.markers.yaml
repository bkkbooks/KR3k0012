  - {type: variant, offset: 764, length: 321, content: 守法術拙匠執規矩尺寸則萬不失孔叢子曰跬一舉足也倍跬謂之步四尺謂之仞倍仞謂之尋尋舒兩肱也倍尋謂之常五尺謂之墨倍墨謂之丈倍丈謂之端端謂之兩倍兩謂之疋兩有五謂之束家語曰孔子曰夫布指知寸布寸知尺舒肱知尋舒身知常斯不遠之則也白虎通同說苑曰度量衡以粟生之十粟為一分十分為一寸十寸為一尺十尺為一丈夢書曰丈尺為人正長短夢得丈尺欲正人也魏武上雜䟽曰中宮用物雜畫象列尺一枚貴人公主有象牙尺三十枚宮人有象牙尺百五十枚骨尺五十枚量周禮冬官考工記曰栗氏為量改煎金錫則不耗消涷之精不復減也栗古文或作歷玄謂量當與鍾鼎同齊工異者大器不耗然後權之權謂稱分之也雖異法用金必齊權之然後準之準故書或作水杜子春云當為水金器有孔者水入孔中則當重也玄謂準擊平王之又當齊大小準之然後量之鑄之, WYG: 祠祭禽}
