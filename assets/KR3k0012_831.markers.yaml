  - {type: variant, offset: 4217, length: 1, content: 加, SBCK: 出行常欲褰車帷幔左右輒諌以位望隆重人所重瞻不冝然景宗謂所親曰我昔在郷里􅀐快馬如龍與年少軰數十􅀐拍弓􅁌作霹􅆮聲箭如餓鴟叫平澤中逐麞數助射之渴飲其血饑食其􅠛甜如甘露漿覺耳後風生鼻頭出火此樂使人忘死不知老之將至今來楊州作貴人動轉不得路行開車幔小人輙言不可閇置車中如三日新婦此邑邑使人無氣南史曰宋臧熹常與溧陽令阮崇獵遇猛獸突圍獵徒並散熹射之應􅁌而倒崔鴻十六國春秋後趙録曰石虎遣司農中郎將費霸帥工匠四千於東平罡山造獵車千乗轅長三丈髙丈八尺格虎車四十乗立級行樓二層於其上自靈昌津南至滎陽東極陽}
  - {type: page-break, offset: 4217, content: '', id: KR3k0012_SBCK_831-7a}
