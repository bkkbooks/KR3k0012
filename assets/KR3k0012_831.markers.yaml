  - {type: variant, offset: 3578, length: 141, content: 俱為黃鵠今將軍化為鳳皇荊布之室理隔華盛因出剪刀還之南史曰沙門寶誌不知何許人齊宋之交稍顯靈跡被髮徒跣語默不倫恒以銅鏡剪刀鑷屬挂杖負之而趍預言未兆識之多驗脩復山陵故事曰后梓宮用剪刀六枚東宮舊事曰太子納妃有龍頭金縷交刀四銀牙鏁綵帶副世說曰爰綜為新安太守郡南界有刻石爰至其下醼飲忽有人得剪刀, SBCK: 㑹獵}
