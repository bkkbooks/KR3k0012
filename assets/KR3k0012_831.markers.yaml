  - {type: variant, offset: 4, length: 51, content: 尺寸禮記王制曰古者以周尺八尺為步今以周尺六尺四寸為步古者百畝當今東田百四十六畝三十步古者百里當今百二十, SBCK: ''}
  - {type: variant, offset: 4, length: 2, content: 尺寸, WYG: 一獵上周禮地官曰鄉師凡四時之田前期出田法于州里簡其鼓鐸旗物兵器修其卒伍田法人徒及所當有及期以司徒之大旗致衆庶而陳之以旗物辨鄉邑而治其政令刑禁巡其前後之屯而戮其犯命者斷其爭禽之訟又曰迹人掌邦田之地政為之厲禁而守之凡田獵者受令焉又曰小司徒凡起徒役毋過家一人以其餘為羨唯田與追胥竭作鄭司農云羨饒也田謂獵也追寇賊也竭作盡行又夏官大司馬之職曰中春遂以蒐田有司表貉誓民鼔遂圍禁火弊獻禽以祭社有司大司徒掌大田役治徒庻之政令表貉立表而貉祭也誓民誓以犯田法之罰也中夏遂以苗田如蒐之法車弊獻禽以享礿夏田為苗擇取不孕任者若治苗去不秀實者云車弊驅獸之車中秋遂以獮田如蒐之法羅弊致禽以祀祊秋田為獮獮殺也羅弊罔止也秋田主用罔中殺者多也皆殺而罔止中冬遂以狩田以旌為左右和之門羣吏各帥其車徒以叙和出左右陳車徒有司平之旗車卒間以分地前后有屯百步有司巡其前後險野人為主易野車為主冬田為狩言守取之無所擇也軍門曰和今謂之壘門立兩旗以為之叙和出用次第出和門也旗軍吏所載分地明其部曲疎數前后有屯百步車徒異羣相去之數也險野人為主人居前易野車為主車居前既陳乃設驅逆之車有司表貉于陳前驅出禽獸使趨田者也逆逆要不得令走}
