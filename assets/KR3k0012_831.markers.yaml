  - {type: variant, offset: 2605, length: 0, content: '', SBCK: 艾蘭以爲防置旃以爲轅門禽雖多天子取三十焉其餘射於宫射而中田不得禽則得禽田得禽射而不中則不淂禽以是知貴仁義而賤勇力也毛詩鵲巢曰騶虞鵲巢之應也鵲巢之化行人倫旣正朝廷旣治天下純􅀍文王之化則庶􅀋蕃殖蒐田以時仁如騶虞則王道成也彼茁者葭茁出也葭蘆也記蘆}
  - {type: variant, offset: 2605, length: 0, content: '', WYG: 艾蘭以為防置旃以為轅門禽雖多天子取三十焉其餘以與士射於宫射而中田不得禽則得禽是以古之貴仁義而賤勇力也毛詩鵲巢曰騶虞鵲巢之應也鵲巢之化行人倫既正朝廷既治天下純被文王之化則庶類蕃殖蒐田以時人如騶虞則王道成也彼茁者葭茁出也葭蘆也謂蘆}
