  - {type: variant, offset: 231, length: 3, content: 丈十丈, WYG: 祭祀豆實也庖廚也無事而不田曰不敬田不以禮曰􅍊天物不敬者簡祭祀畧賓客天子不合圍諸侯不掩羣}
