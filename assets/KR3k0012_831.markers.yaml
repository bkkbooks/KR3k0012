  - {type: variant, offset: 235, length: 1, content: 引, WYG: 盡物也天子殺則下大綏諸侯殺則下小綏綏當為緌緌有虞氏之旌也下謂弊之大夫殺則止佐車佐車止則百姓田獵佐車驅逆之車獺祭魚然後虞人入澤梁豺祭獸然後田獵鳩化為鷹然後設罻羅草木零落然後入山林昆蟲未蟄不以火田取物必順時候也梁絶水取漁者罻小網也昆明也明蟲者得陽}
