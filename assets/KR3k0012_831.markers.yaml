  - {type: variant, offset: 3505, length: 0, content: '', SBCK: 山中射獵嘗夜從一􅀐出從人田間飲還至亭霸陵尉醉呵止廣廣􅀐曰故李將軍也尉曰今將軍尚不得夜行何故也􅀫廣亭下魏志曰夏侯淵之子稱年十六淵與之畋見奔虎執楯驅馬逐之禁之不可一箭而中名聞太祖太祖把其手喜曰我得將矣又曰文帝將出遊獵鮑勛停車上䟽曰五帝三王靡不明本立教以孝治天下柰何在諒闇之中脩馳騁之事乎毀其表而竟行獵中道頓息問侍臣獵之與樂何樂八音也侍中劉曄對曰獵勝於樂勛抗辭曰夫樂上通神明下和人理故移風易俗莫善於樂況獵暴華盖於原野因奏劉曄倿䛕不忠又曰􅂫則從文帝獵蹉跮失鹿帝大怒踞胡床㧞刀悉収督吏將斬之則稽首曰臣聞古之聖王不以禽獸害人今陛下}
  - {type: page-break, offset: 3505, content: '', id: KR3k0012_SBCK_831-5b}
  - {type: variant, offset: 3505, length: 0, content: '', WYG: 山中射獵嘗夜從一騎出從人田間飲還至霸陵亭尉醉呵止廣廣騎曰故李將軍也尉曰今將軍尚不得夜行何故也宿廣亭下魏志曰夏侯淵之子稱年十六淵與之畋見奔虎執楯驅馬逐之禁之不可一箭而中名聞太祖太祖把其手喜曰我得將矣又曰文帝將出遊獵鮑勛停車上疏曰五帝三王靡不明本立教以孝治天下如何在諒闇之中修馳騁之事乎毁其表而竟行獵中道頓息問侍臣獵之為樂何如八音也侍中劉􅁮對曰獵勝于樂勛抗辭曰夫樂上通神明下和人理故移風易俗莫善於樂况獵暴華葢於原野乎因奏劉􅁮佞諛不忠又曰蘇則從文帝獵蹉跮失鹿帝大怒踞胡床拔刀悉収督吏將斬之則稽首曰臣聞古之聖王不以禽獸害人今陛下}
