  - {type: variant, offset: 2506, length: 3, content: 鈞者均, WYG: 司馬職曰羅弊致禽以祀祊左傳文十年曰陳侯鄭伯㑹楚子于息冬遂及蔡侯次于厥貉將以伐宋宋逆楚子遂道以田孟諸宋公為右盂鄭伯為左盂盂田獵陳名命夙駕載燧又襄四年曰昔周辛甲之為太史}
