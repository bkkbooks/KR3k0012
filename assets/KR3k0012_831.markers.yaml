  - {type: variant, offset: 2012, length: 589, content: 記令仲春曰是月也日夜分則同度量平權衡因春分晝夜平則正之同亦平也丈尺曰度斗斛曰量稱錘曰權稱上曰衡又經解曰禮之於正國也猶衡之於輕重也繩墨之於曲直也規矩之於方圜也故衡誠縣不可欺以輕重繩墨誠陳不可欺以曲直規矩誠設不可欺以方圜漢書曰衡權者衡平也權重也衡所以任權而鈞物平輕重也其道如厎厎平也謂以厎石厲物令平齊也厎音指以見準之正繩之直左旋見規右折見矩其在天也佐助璇機斟酌建指以齊七政故曰玉衡論語云立則見其參於前也孟康曰權衡量三尋為參在車則見其倚於衡也又曰齊之以禮此衡在前居南方之義也權者銖兩斤鈞石也所以稱物平施知輕重也本起於黃鍾之重一龠容千二百黍重十二銖兩之為兩二十四銖為兩十六兩為斤三十斤為鈞四鈞為石忖為十八易十有八變之象孟康曰忖度也度其義有十八也黃鍾龠銖兩鈞斤石凡七與下十一象為十八也五權之制以義立之以物鈞之其餘大小之差以輕重為宜圜而環之令之肉倍好者孟康曰謂為鍾之形如環也如淳曰體為肉孔為好周旋無端終而復始無窮已也銖者物繇忽微至於成著可殊異也兩者兩黃鍾律之重李奇曰黃鍾之重重十二銖兩十二得二十四銖二十四銖而成兩者二十四氣之象也斤者明也三百八十四銖易二篇之爻陰陽變動之象也十六兩成斤者四時乘四方之象也鈞者均也陽施其氣陰化其物皆得其成就平均也權與物均重萬一千五百二十銖當物之象也四百八十兩者六旬行八節之象也孟康曰六甲為六旬一歲有八節六甲周行成歲以六乘八節得之也三十斤成鈞者一月之象也石者大也權, SBCK: ''}
