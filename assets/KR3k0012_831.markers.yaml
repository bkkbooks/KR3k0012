  - {type: variant, offset: 1252, length: 0, content: '', krp: 表貉立表而貉祭也誓氏誓以犯田法之罰也中夏遂以苗田如蒐之灋車弊獻禽以享礿夏田爲苗釋取不孕任者若治苗去不秀實者云車弊驅獸之車止中秋遂以獮田如蒐田之法羅弊致禽以祀祊秋田爲獮獮殺也羅弊罔止也秋田主用罔中殺者多也皆殺而罔止中冬遂以狩田以旌爲左右和之門羣吏各帥其車徒以叙和出左右陳車徒有司平之旗車卒間以分地前後有屯百歩有司廵其前後險野人爲主易野車爲主冬田爲野言守取之無所擇也軍門曰和今謂之壘門立兩旌以爲之叙和出用次第出和門也旗軍吏所載分地調其部曲踈數前後有屯百歩車徒異羣相去之數也險野人爲主人居前易野車爲主車居前旣陳乃設驅逆之車有司表貉于陳前驅驅出禽獸使趨田者也逆逆要不得令走設此車者田僕也中軍以鼙令鼓人皆三鼔羣司馬振鐸車徒皆作遂鼓行徒衘枚而進大獸公之小禽私之獲者取左耳又曰田僕掌馭田路以田以鄙田路木路也田田獵也鄙循行縣鄙掌佐車之政佐亦副設驅逆之車驅驅禽使前趨獲逆衘還之使不出圍令獲者植旌以告獲也植樹也及獻比禽田弊獲者各獻其禽比種物相從次數之禮記月令仲冬曰山林藪澤有能取𬞞食田獵禽獸者有司敎導之又季冬曰乃敎田獵以習五戎又曲禮曰國君春田不圍澤大夫不掩羣士不取麛卵生乳之時重傷其類又王制曰天子諸侯無事則歳三田一爲乾豆二爲賔客三爲充君之庖三田夏不用無事而不田曰不敬田不以禮曰暴天物天子不合圍諸侯不掩羣天子殺則下大綏諸侯殺則下小綏綏當爲綏綏有虞氏之旌旗也大夫殺則止佐車佐車止則}
  - {type: variant, offset: 1254, length: 0, content: '', SBCK: 田獵佐車驅送之車􅆩􅀕魚然後虞人入澤梁豺􅀕獸然後田獵鳩化爲鷹然後設罻羅草木零落然後入山林昆虫未蟄不以火田取物必順時候不麛􅆑不殺胎不殃夭不覆巢覆敗左傳文公上曰宋華御事逆楚子勞且聽命時楚欲誘呼宋共戰御事華元父遂道以田孟諸孟諸宋大藪也在梁國睢陽縣東北宋公爲右盂鄭伯爲右盂孟田獵陳名期思公復遂爲右司馬復遂楚期思邑公今弋陽期思縣子朱及文之無畏爲左司馬將獵張兩甄故置二左司馬然則右司馬一人當中央命夙駕載燧燧取火然者也又襄四年曰昔周辛甲之爲太史也命百官官箴王闕辛甲周武王大史闕過也使百官各爲箴辭戒王過於虞人之箴虞人掌田獵曰芒芒禹迹畫爲九州芒芒逺貌畫分也經啓九道啓開九州之道民有􅃦廟獸有茂草各有攸處德用不擾人神各有所歸故}
  - {type: page-break, offset: 1254, content: '', id: KR3k0012_SBCK_831-2b}
  - {type: variant, offset: 1254, length: 0, content: '', krp: 田獵佐車驅送之車獺祭魚然後虞人入澤梁豺祭獸然後田獵鳩化爲鷹然後設罻羅草木零落然後入山林昆虫未蟄不以火田取物必順時候不麛卵不殺胎不殃夭不覆巢覆敗左傳文公上曰宋華御事逆楚子勞且聽命時楚欲誘呼宋共戰御事華元父遂道以田孟諸孟諸宋大藪也在梁國睢陽縣東北宋公爲右盂鄭伯爲右盂孟田獵陳名期思公復遂爲右司馬復遂楚期思邑公今弋陽期思縣子朱及文之無畏爲左司馬將獵張兩甄故置二左司馬然則右司馬一人當中央命夙駕載燧燧取火然者也又襄四年曰昔周辛甲之爲太史也命百官官箴王闕辛甲周武王大史闕過也使百官各爲箴辭戒王過於虞人之箴虞人掌田獵曰芒芒禹迹畫爲九州芒芒逺貌畫分也經啓九道啓開九州之道民有寢廟獸有茂草各有攸處德用不擾人神各有所歸故}
  - {type: variant, offset: 1255, length: 0, content: '', SBCK: 不亂在帝后羿冒于原獸冒貪也忘其國恤而思其麀牡言但念獸武不可重重猶數也用不恢于夏家羿}
