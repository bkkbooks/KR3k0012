  - {type: variant, offset: 1251, length: 0, content: '', SBCK: 羡饒也田謂獵也追宼賊也竭作盡行又夏官大司馬之職曰中春遂以蒐田有司表貉誓民鼓遂圍禁火弊獻禽以􅀕社春田爲蒐有司大司徒也掌大田役治徒庶之政}
  - {type: variant, offset: 1251, length: 0, content: '', krp: 羡饒也田謂獵也追宼賊也竭作盡行又夏官大司馬之職曰中春遂以蒐田有司表貉誓民鼓遂圍禁火弊獻禽以祭社春田爲蒐有司大司徒也掌大田役治徒庶之政}
  - {type: variant, offset: 1252, length: 0, content: '', SBCK: 表貉立表而貉􅀕也誓氏誓以犯田法之罰也中夏遂以苗田如蒐之灋車弊獻禽以享礿夏田爲苗釋取不孕任者􅀂治苗去不秀實者云車弊驅獸之車止中秋遂以獮田如蒐田之法羅弊致禽以祀祊秋田爲獮獮殺也羅弊罔止也秋田主用罔中殺者多也皆殺而罔止中冬遂以狩田以旌爲左右和之門羣吏各帥其車徒以叙和出左右陳車徒有司平之旗車卒間以分地前後有屯百歩有司廵其前後險野人爲主易野車爲主冬田爲野言守取之無所擇也軍門曰和今謂之壘門立兩旌以爲之叙和出用次第出和門也旗軍吏所載分地調其部曲踈數前後有屯百歩車徒異羣相去之數也險野人爲主人居前易野車爲主車居前旣陳乃設驅逆之車有司表貉于陳前驅驅出禽獸使趨田者也逆逆要不得令走設此車者田僕也中軍以鼙令鼓人皆三鼔羣司馬振鐸車徒皆作遂鼓行徒衘枚而進大獸公之小禽私之􅀗者取左耳又曰田僕掌馭田路以田以鄙田路木路也田田獵也鄙循行縣鄙掌佐車之政佐亦副設驅逆之車驅驅禽使前趨􅀗逆衘還之使不出圍令􅀗者植旌以告􅀗也植樹也及獻比禽田弊􅀗者各獻其禽比種物相從次數之禮記月令仲冬曰山林藪澤有能取􅂼食田獵禽獸者有司敎導之又季冬曰乃敎田獵以習五戎又曲禮曰國君春田不圍澤大夫不掩羣士不取麛􅆑生乳之時重傷其􅀋又王制曰天子諸侯無事則歳三田一爲乾豆二爲賔客三爲充君之庖三田夏不用無事而不田曰不敬田不以禮曰暴天物天子不合圍諸侯不掩羣天子殺則下大綏諸侯殺則下小綏綏當爲綏綏有虞氏之旌旗也大夫殺則止佐車佐車止則}
