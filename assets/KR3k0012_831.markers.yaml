  - {type: variant, offset: 4317, length: 0, content: '', WYG: 猛獸石扣馬諫引帝至高原上後猛獸騰躍殺人詔褒美其忠許後有犯罪者宥而勿坐又曰來大千常從明元校獵見獸在巖上持矟直刺之應手而死帝嘉其勇壯北史曰齊元恒字集和自言寧三日不食}
