  - {type: variant, offset: 1264, length: 0, content: '', SBCK: 親逐其君爾父爲厲厲惡􅀑林父逐君在十四年是之不憂而何以田爲又襄三十年曰鄭豊卷將􅀕請田焉弗許田獵也田唯君用鮮鮮野獸衆給而巳衆臣􅀕以芻豢爲足又昭公曰齊侯田于沛言疾愈行獵沛澤名招虞人以弓不進虞人掌山澤之官公使執之辭曰昔我先君之田旃以招大夫弓以招士皮冠以招虞人臣不見皮冠故不敢進乃舎之仲尼曰守道不如守官君招當徃道之常也非物不進官之制也君子韙之韙見也又定公上曰魏獻役於韓簡子及原壽過簡子韓起孫不信也原壽過周大夫而田於大陸焚焉禹貢大陸在鉅鹿地嫌絶逺疑此田在汲郡呉澤荒蕪之地大田并見燒也爾雅廣平日陸還卒於􅇞􅇞今修武縣近澤范獻子去其柏椁以其未復命而田也范獻子代魏子爲政去其柏椁示貶之又哀公下曰西狩於大野叔孫氏之車子鉏啇􅀗麟大野在髙平鉅野縣東北大澤是也車子微者鉏啇之名以爲不祥以賜虞人}
