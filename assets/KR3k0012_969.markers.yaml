  - {type: variant, offset: 64, length: 321, content: 杏盧諶祭法曰夏祠用杏崔寔四民月令曰三月杏花盛可播白沙輕土之田後周書曰張元芮城人性廉潔南鄰有杏二樹杏熟多落元園中諸小兒競取食之元所得者悉以還主唐史曰馬燧之子暢以第中大杏饋竇文場文場以進德宗德宗未嘗見頗怪暢令中使就封杏樹暢懼進宅廢為奉誠園管子曰五沃之土其木宜杏莊子曰孔子遊緇帷之林休坐杏壇之上弟子讀書孔子絃歌鼓琴玄晏春秋曰衛倫過予言及於味稱魏故侍中劉子楊食餅知鹽生精味之至也予曰師曠識勞薪易牙別淄澠子楊今之妙也定之何難倫因命僕取糧糗以進予嘗之曰麥也有杏李㮏味三果之熟也不同予焉得兼之倫笑而不言退告人曰士安之識過劉氏吾將來家實多故杏時將發故揉以杏汁李時將發又揉之李汁㮏時將發又揉以㮏汁故兼三味汜勝之書曰杏始華趣耕輕土杏華落趣耕闌又曰杏花如何可耕白沙, SBCK: 梨}
