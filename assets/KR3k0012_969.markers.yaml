  - {type: variant, offset: 1044, length: 125, content: 核人棗李曰疐之毛詩鵲巢曰何彼穠矣華如桃李平王之孫齊侯之子又淇澳木瓜曰投我以木李報之以瓊玖韓詩外傳曰子質仕魏文侯獲罪而北遊謂簡主曰從今已去不復樹德於人矣簡主曰春樹桃李夏得蔭其下秋得食其實春樹蒺蔾夏不採其葉秋得剌焉今子所樹非其人也春秋運斗樞曰玉衡星散為李, WYG: 甘樝}
