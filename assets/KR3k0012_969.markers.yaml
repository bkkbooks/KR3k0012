  - {type: variant, offset: 1883, length: 219, content: 李葩又曰老子之母適到李樹之下而生老子生而能語指李樹曰此以為姓真人王褒內傳曰五靈丹山上有玄雲之李食之得仙嵇康高士傳曰長靈安丘生病篤弟子公沙都來省之與安共於庭樹下聞李香開目見雙赤李著枯枝自墮掌中安食之所苦除盡笑林曰趙伯翁醉眠數歲孫兒緣其腹戲因以李子內其肶音毗臍中累七八枚既醒了不覺數日後乃知痛李爛汁出以為臍穴懼死乃命妻子處分家事李核出尋問乃知是孫兒所為夢書曰李為獄官夢見李者憂獄官西京雜記曰上林苑有紫李青綺李黃李青房李綠李顏淵李出魯志合枝李五, SBCK: 二}
