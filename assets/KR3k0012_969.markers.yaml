  - {type: variant, offset: 611, length: 1, content: 東, krp: 中諸生皆取食之辛氏三秦記曰漢武帝園一名樊川一名禦宿有大梨如五升落地則破其主取者以布囊盛之名含消梨三晉山險記曰山陽縣}
  - {type: variant, offset: 614, length: 1, content: 牛, SBCK: 谷通得驢馬石勒十八􅀐昔在此啖梨生樹今有梨園叚􅀛龍涼州記曰吕光時燉煌太守宋歆獻同心梨永嘉記曰青田村民家多種梨樹名曰官梨子大一圍五寸樹老今不復作子此中梨子佳甘羙少比實大出一圍􅁪以供獻名爲御梨吏司守視土人有未知味者梨實落至地即融釋郭子横洞􅁳記曰塗}
