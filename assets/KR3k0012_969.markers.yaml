  - {type: variant, offset: 7, length: 1, content: 杏, SBCK: 梨山摛即金梨樹摛音離梨曰鑚之啖食治擇之名漢書曰淮北滎南河濟之間千樹梨其人皆與千戸侯等晉書載記曰符􅀟據上邽符抑據蒲坂叛于堅符武據安定並應之將共伐長安堅遣使諭之各齧梨以爲信皆不受堅命宋書曰王􅀇謨征滑臺一疋布責民八百大梨又曰張敷小名查父邵小名梨文帝甞戯謂之曰查何如梨荅曰梨萬果之宗查何敢比也齊書曰扶桑國有赤梨經年不壞兼多蒲桃唐書曰貞觀中杭州言}
  - {type: page-break, offset: 7, content: '', id: KR3k0012_SBCK_969-1b}
  - {type: variant, offset: 7, length: 1, content: 杏, WYG: 棃山樆即今梨樹梨曰攅之漢書曰淮北滎南河濟之間千樹梨其人皆與千戸侯等晉書曰符䨇據上邽符栁據蒲坂叛于堅符武據安定並應之将共戕長安堅遣使諭之各囓棃以為信皆不受堅命南史曰王𤣥謨征滑臺一疋布責民八百大棃又曰張敷小名楂父邵小名梨文帝嘗戯謂之曰楂何如棃荅曰梨萬果之宗楂何敢比也齊書曰扶桑國有赤梨經年不壊兼多蒲萄唐書曰貞觀中杭州言}
