  - {type: variant, offset: 1834, length: 2, content: 暉章, SBCK: 柦三千歳作華九千歳作實其花紫色中髙百丈敷張自輔葉長七尺五色實長九尺無核割之如凝􅁡張茂先注曰祖梨􅄒異記曰江淮南人至北見榅勃香以爲柦子蓋實異耳傳􅀇􅀲賦曰龍眼生於南極甘樝引於崑山櫻桃禮記月令曰仲夏之月天子羞以含桃先薦寢廟鄭玄注曰含桃今之櫻桃也爾雅曰楔音革􅃛反荆桃郭璞注曰今櫻桃廣雅曰含桃櫻桃漢書曰惠帝岀離宫叔孫通曰今櫻桃熟可獻陛下冝以櫻桃獻宗廟上許之諸菓獻由此興唐書曰太宗將致櫻挑於􅈶公稱奉則以尊言賜又以卑問之虞􅁥曰昔梁帝遺齊巴陵王稱餉遂從之又曰玄宗紫宸殿櫻桃熟命百官摘之又曰蕭潁士李林甫採其名欲抜用之乃召見時潁士寓居母䘮即縗麻而詣京師徑謁林甫於政事省林甫素不識遽見縗麻大惡之即令斥去潁士大忿乃爲伐櫻桃賦以刺林甫云擢無庸之􅃈質因夲枝而自庇洎枝榦而非據專階􅋝之右地雖先寢而或薦豈和羹之正味其狂率不遜皆此􅀋也又曰文宗始即位甞因内園進新櫻桃將以賜三宫太后上曰送太后焉可以爲賜因援筆易其文簿曰奉太后自是以爲常拾遺録曰漢明帝於月夜讌賜群臣櫻桃盛以赤瑛盤群臣視之月下以爲空盤帝􅀏之吕氏春秋曰仲夏之月羞含桃髙誘注曰含桃櫻桃爲鳥所含故曰含桃范汪祠制曰孟夏􅀕用櫻桃洛陽宮殿簿曰顯陽}
