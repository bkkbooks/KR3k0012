  - {type: variant, offset: 1203, length: 176, content: 小兒遊看道邊李樹子多折枝諸小兒競走取之唯戎不動人問之荅曰樹在道邊而子多必苦李也取之信然又曰王安豊有好李常賣恐人得種恒鑽其核又曰和嶠性至儉家有好李帝求之不過數十王武子因其直率將少年能食之人將斧詣園飽啖畢伐之送與嶠問何如君李齊書曰王僧孺少時有餽其父冬李先以一與之不受曰大人未見不容先嘗三國典略曰齊武成寵任東平王儼而儼器服翫飾同於齊主嘗於南宮見典御進新冰釣盾, WYG: 果}
