  - {type: variant, offset: 1312, length: 268, content: 李齊書曰王僧孺少時有餽其父冬李先以一與之不受曰大人未見不容先嘗三國典略曰齊武成寵任東平王儼而儼器服翫飾同於齊主嘗於南宮見典御進新冰釣盾獻早李還而怒曰尊兄已有我何意無唐書曰武德中有獻李樹連理盤屈如龍又曰貞觀中玉華宮李樹連理隔澗合枝又曰神龍中陳州官舍有李樹黃落將盡忽更鮮茂而生花焉管子曰五沃之土其木宜李晏子曰景公病疽在背欲見不得公問國子國子曰熱如火色如日大小如未熟李公問晏子曰色如蒼玉大如璧也公曰不見君子不知野人拙也孟子曰匡章曰陳仲子豈不誠廉士哉居於陵三日不食耳目無聞見也井上有李螬食實者半匍匐往食之三咽而後聞見也趙岐注曰李實蟲食之過半也呂, SBCK: 羞吕}
