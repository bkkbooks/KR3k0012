  - {type: variant, offset: 1603, length: 233, content: 五原蔡誕入山而還欺其家人云到崑崙山崑崙山有玉李光明洞徹而堅須以玉井水澆之便軟可食又曰南頓人張助者耕於白田有一李栽應在耕次助意惜之欲持歸乃掘取之未得即去以濕土封其根以置空桑中遂忘取之助後作遠職不在後其里中人見桑中忽生李謂之神有病目痛者蔭息此桑下因祝之言李君能令我目愈者謝一㹠其目偶愈便殺㹠祭之傳者過差便言此樹能令盲者得視遠近噏然牙來請福山海經曰邊春之山多李里人常採之漢武內傳曰李少君謂武帝溟海之棗大如瓜鍾山之李大如瓶臣以食之遂生奇光又曰仙之上藥有圓丘紅李晉宮閣名曰暉章, WYG: 顯陽}
