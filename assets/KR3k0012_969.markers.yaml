  - {type: variant, offset: 611, length: 1, content: 東, WYG: 中諸生皆取食之辛氏三秦記曰漢武帝園一名樊川一名禦㝛有大棃如五升落地則破其主取者以布囊盛之名含消棃三晉山險記曰吕光時燉煌太守宋歆獻同心棃叚龜龍凉州記曰山陽縣}
