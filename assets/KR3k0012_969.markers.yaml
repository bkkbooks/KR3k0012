  - {type: variant, offset: 1056, length: 221, content: 何彼穠矣華如桃李平王之孫齊侯之子又淇澳木瓜曰投我以木李報之以瓊玖韓詩外傳曰子質仕魏文侯獲罪而北遊謂簡主曰從今已去不復樹德於人矣簡主曰春樹桃李夏得蔭其下秋得食其實春樹蒺蔾夏不採其葉秋得剌焉今子所樹非其人也春秋運斗樞曰玉衡星散為李又曰遠雅頌著倡優則李生瓜史記曰桃李不言下自成蹊晉書曰王戎年七歲嘗與諸小兒遊看道邊李樹子多折枝諸小兒競走取之唯戎不動人問之荅曰樹在道邊而子多必苦李也取之信然又曰王安豊有好李常賣恐人得種恒鑽其核又曰和嶠性至儉家有好李帝求, SBCK: 樝梨}
