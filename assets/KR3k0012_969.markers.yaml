  - {type: variant, offset: 2239, length: 329, content: 春熟郭子橫洞冥記曰琳國去長安九千里多生玉葉李色如碧五千歲一熟味酸苦韓終常食之亦名韓終李也唐新語曰安金藏喪母廬於墓側有湧泉自出又有樹盛冬開花犬鹿相狎採訪使廬慎以聞詔旌其門閭列異傳曰袁本初時有神出河東號度索君民共立廟兗州蘇氏母病往禱見一人著白布單衣高冠似魚頭語度索君曰昔廬山共食白李未久已三千年日月易得使人悵然去後度索君曰南海君也任昉述異記曰魏文帝安陽殿前天降朱李八枚啖一數日不食今李種有安陽李大而甘者即其種也又曰杜陵有金李李之大者為之夏李尤小者呼為鼠李又曰防陵定山有朱仲李園三十六所潘岳閑居賦云房陵朱仲之李又曰果賦云三十六之朱李又仙李縹而神李紅陸士衡果賦云中山之縹李又曰武陵原在吳中山中無他木盡生桃李俗呼為桃李原原上有石洞洞中有乳水世傳秦亂吳人於此避難者食桃李, WYG: ''}
