  - {type: variant, offset: 656, length: 127, content: 失八九十歲故司空王暢太尉劉寬太傅袁隗皆為南陽太守每到官常使酈縣月送甘谷水四十斛以為飲食此諸公多患風痺及眩冐皆得愈但不能大得其益如甘谷上居民從幼便飲食此水又菊花與薏花相似直以甘苦別之耳菊甘而薏苦今真菊甚少耳率多生於水側緱氏山與酈縣最多仙方所謂曰精更生周盈皆, SBCK: 知寒术}
