  - {type: variant, offset: 373, length: 0, content: '', SBCK: 篇世無足傳當沉之三泉也下三篇者正是丹經其經曰上士得道昇爲天官中士得道栖集崑崙下士得道長生世間近後漢末新野隂君合此太清丹其人有才氣著詩及丹經讃序言􅀄學道隨師本末列已所知識之得道者四十餘人甚分明也又有九光丹與九轉異法又有岷山丹法道士張盍蹹精思於岷山石室中得此方也至於諸丹法各別也金液者太一所服而仙者也又曰長生制在大藥非祠醮之所定也􅁗漢二代犬興祈禱所􅀕太一五帝陳寳八神之屬動費億萬絶無所益况疋夫無德欲以三牲妄祝以祈延}
