  - {type: variant, offset: 251, length: 0, content: '', WYG: 咽味以和六液又曰昔漢成帝獵於終南山中見一人無衣身生毛飛騰不可及乃圍得之問之乃秦宫人說秦王子嬰軹道之事因宫室燒燔驚走入山饑無所食垂當餓死有一老人令食松葉其獵者携歸時以榖食之歐吐累日乃安一年餘死向不為人獲即仙矣又曰龍述字伯髙京兆人也後漢從仙人刁道林受胎氣之法又受􅏇飰方託形醉亡隠處又武當山道士戴孟者本姓燕名濟字仲㣲漢明帝時人也少修道德不仕入華山餌芝术黄精雲母丹砂受法於清虛真人王君得長生之道又裴真人授以玉佩金璫}
