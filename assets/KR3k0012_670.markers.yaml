  - {type: variant, offset: 369, length: 2, content: 菖蒲, SBCK: 其半􅀂求仙去當盡服之昔安期先生龍眉寗公修羊公隂長生皆服金丹半劑者也其止人間或近千年然後去耳又曰按玉鈐經中篇云立功爲上除過次之爲道者以救人危爲上功也欲求仙者要當以忠孝和順仁信爲本􅀂德行不修而但務方術終不得長生也行惡事大者奪紀小過奪等積善未滿雖服仙藥亦無益也余覽養生之書莫不以還丹金液爲大要蓋仙道之極也昔左慈字元放於天柱山中精思積乆乃神人授以金丹仙經㑹漢末大亂不遑修錬而避地來渡江東志欲投名山以修斯道從祖仙公又從元放受之凢授太清丹經三卷及九鼎丹經一卷金液經一卷予師鄭君者仙公之弟子也又於從祖受之而家貧無用買藥予親事之酒掃積乆乃於馬迹山中立壇盟受之并具諸口訣之不書者江東先無此書出於左慈慈授從祖仙公仙公授鄭君鄭君授予故它道士了無知者此益假求於外物以自堅固復有太清神丹其法出於元君元君者老子師也太清觀天經有}
