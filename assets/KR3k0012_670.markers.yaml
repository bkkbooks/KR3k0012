  - {type: variant, offset: 23, length: 137, content: 芝丹砂曾青雲母太一禹餘糧各以單服令人長生中藥養性下藥除病此上聖之至言方術之實錄也仙藥之上者丹砂次者黃金白銀眾芝五玉五雲明珠也黃精與朮餌之卻粒或遇凶年可以絕粒謂之米脯西極明科曰上清金液丹經九鼎神圖太一九轉大丹等凡一百四十卷五符經曰胡麻本生大宛又名巨勝服之不息與世長存五穀之長也, SBCK: 公石􅃾彼體所便急冝}
