  - {type: variant, offset: 1986, length: 274, content: 素內景法旦旦為之視日益佳其法簡其事驗又曰姜伯真在大橫山服石腦石腦如石小班色而軟又大茅山東亦有形狀員小如曾青而色似鐘乳繁陽子昔亦服此裴君內傳曰佛面道人支子元裴君授以長生內術又云尋藥之與存思雖致道同津而關源異緒服藥所以保形形康則神安存思所以安神神通則形保二理乃成相資而有道學傳曰許邁字叔玄少名映後改名遠遊與王羲之父子為世外之交羲之亦辭榮養生每造遠彌日忘歸詩書往復多論服餌又曰上清左卿黃觀子學道服金丹讀大洞經得道東府左卿白玉生有煮石方文德石仙監張叔隱受青精方太清右公李抱祖岷山人受青精䭀飯方葛洪神仙傳曰劉京從邯鄲張君受餌雲丸又曰封君達隴西人入鳥鼠山服餌年, SBCK: 平御覽卷第六}
