  - {type: variant, offset: 946, length: 236, content: 飛根黃氣五廚經曰修奉和太不虧不盈天交上經曰太古之人所以壽考者不食穀也身安神樂修道易成五符經云食月之精可以長生食星之精上升太清登真隱訣云服雲牙可絕穀去尸虫也可修真一之道裴真人曰喜怒損志哀樂損性榮華減德陰陽寇身皆學道之大忌仙法之所嫉也莫若知而不為為而不敢散此仙之要道生生之本業也欲得延年當吞日華食物多飲慎便臥多則生病臥則蕩心心蕩則失性病生則藥不行學道者慎此劉向列仙傳曰務光夏時人好琴服蒲韭根又彭祖多服水桂雲母中岳人蘇林字子玄本衛人靈公末年師仇公教以服氣之法又尹喜之長沙服巨勝實, SBCK: ''}
