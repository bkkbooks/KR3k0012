  - {type: variant, offset: 406, length: 1, content: 善, SBCK: 忌凢俗聞見則仙物不成或云上士得道於軍旅中士得道於都市下士得道於山林此謂仙藥已成未欲輕舉雖三軍兵刃不能傷都市㓙禍不能加下士未及於此故上山林耳古之道士飛錬神藥必入名山又按入山經可以精思修餌其藥有太華􅁪霍嵩少太白終南女凢地肺王屋抱犢安丘衡􅏦青城峨嵋雲臺羅浮陽駕黄金大小天台盖竹括蒼四望山皆是正神在其中其上皆生芝草可以避大兵大水不但中以合藥也􅀂有道者登之則此山之神必助之爲福其藥必成􅀂不登此諸山者海中大島嶼亦可合藥}
