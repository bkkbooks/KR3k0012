  - {type: variant, offset: 172, length: 1, content: 真, SBCK: 明大洞爲仙卿服金丹爲大夫服衆芝爲御史􅀂得太極隱芝服之便爲左仙公又曰性幾乎道用之眞來紫陽眞}
  - {type: variant, offset: 172, length: 0, content: '', WYG: 明大洞為仙卿服金丹為大夫服衆芝為御史若得太極隠芝服之便為左仙公又曰性㡬乎道用之真來紫陽}
  - {type: variant, offset: 172, length: 1, content: 真, krp: 明大洞爲仙卿服金丹爲大夫服衆芝爲御史若得太極隱芝服之便爲左仙公又曰性幾乎道用之眞來紫陽眞}
  - {type: variant, offset: 174, length: 2, content: 謂黃, SBCK: 云可令許玉斧數沭浴濯其水疾之氣消其積考之瑕此致眞之階也學養生之道不可泣涙涕唾所損甚多是以眞人道士常吐納咽味以和六液又曰昔漢成帝獵於終南山中見一人無衣身生毛飛騰不可及乃圍得之問之乃􅁗宫人說􅁗王子嬰軹道之事因宫室燒燔驚走入山飢無所食垂當餓死有一老人令食松葉松實其獵者將歸以榖食之歐􅄍累日乃安一年餘死向不爲人􅀗即仙矣又曰龍述字伯髙京兆人也後漢從仙人刀道林受胎氣之法又受䭀飰方託形醉亡隱處又曰武當山道士戴孟者夲姓燕名濟字仲微漢明帝時人也少修道德不仕入華山餌芝术黄}
  - {type: page-break, offset: 174, content: '', id: KR3k0012_SBCK_670-1b}
  - {type: variant, offset: 174, length: 6, content: 謂黃精獲天地, WYG: 云可令許玊斧數沐浴濯其水疾}
  - {type: variant, offset: 174, length: 6, content: 謂黃精獲天地, krp: 云可令許玉斧數沭浴濯其水疾}
  - {type: variant, offset: 177, length: 3, content: 獲天地, SBCK: 雲母丹砂受法於清靈眞人王君得長生}
  - {type: variant, offset: 181, length: 1, content: 淳, SBCK: 道又裴眞人授以玉佩金璫經并石}
  - {type: variant, offset: 181, length: 9, content: 淳精依山寄居神化者, WYG: 氣消其積考之瑕此致真之階}
  - {type: variant, offset: 181, length: 9, content: 淳精依山寄居神化者, krp: 氣消其積考之瑕此致眞之階}
  - {type: punctuation, offset: 183, content: ，, id: KR3k0012_CHANT_670-bkkpn55}
  - {type: 'tls:seg', offset: 183, content: '', id: KR3k0012_CHANT_670-3a.4}
  - {type: variant, offset: 183, length: 4, content: 依山寄居, SBCK: 金光符又曰食草木之藥不知行氣導引服藥無益也終不得道􅀂志之感靈所存必至者亦不湏草藥之益也􅀂但知行氣不知}
  - {type: variant, offset: 188, length: 2, content: 化者, SBCK: 丹之法亦不仙}
  - {type: punctuation, offset: 191, content: 。, id: KR3k0012_CHANT_670-bkkpn56}
  - {type: 'tls:seg', offset: 191, content: '', id: KR3k0012_CHANT_670-3a.5}
  - {type: variant, offset: 191, length: 1, content: 天, SBCK: 􅀂得金液神丹不湏他術也􅀂大洞眞經不湏得金丹之道而}
  - {type: page-break, offset: 191, content: '', id: KR3k0012_SBCK_670-2a}
  - {type: variant, offset: 191, length: 17, content: 天仙名此為戊己芝玉訣經曰元始五常氣, WYG: 學養生之道不可泣涕唾所損其多是}
  - {type: variant, offset: 191, length: 15, content: 天仙名此為戊己芝玉訣經曰元始五, krp: 學養生之道不可泣涙涕唾所損甚多是以眞人道士}
  - {type: variant, offset: 193, length: 1, content: 名, SBCK: 也人生有骨籙必有篤志道使之然故不學而仙道自來也過}
  - {type: variant, offset: 195, length: 4, content: 為戊己芝, SBCK: 以下皆湏篤志又曰東海}
  - {type: punctuation, offset: 199, content: 。, id: KR3k0012_CHANT_670-bkkpn57}
