  - {type: variant, offset: 2820, length: 262, content: 左羽林將軍敬暉右羽林將軍桓彥範司刑少卿袁恕己等定策率羽林兵誅易之昌宗迎皇太子赦天下鳳閣侍郎韋承慶正諫大夫房融司禮卿崔慶等下獄甲辰命地官侍郎樊忱音諶往京師告陵廟乙巳則天傳位於皇太子景午即皇帝位於通天宮大赦天下唯易之黨與不在原限二月甲寅復國號依舊為唐社稷宗廟陵寢郊祀行軍旗幟服色天地日月等字臺閣官名並依永淳已前故事甲子立妃韋氏為皇后大赦天下詔九品以上及朝集使極言朝政得失兼舉賢良方正直言極諫之士景龍三年十一月乙丑親祀南郊皇后登壇亞獻左僕射舒國公韋巨源為終獻大赦天下四年五月丁卯前許州司兵參軍燕欽融上書言皇后干預國政安樂公主武延秀, SBCK: 温}
