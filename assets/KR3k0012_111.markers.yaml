  - {type: variant, offset: 4443, length: 0, content: '', WYG: 令皇帝䖏分上御承天樓下制大赦天下冬十一月甲申幸新豐之温湯癸夘講武於驪山兵部尚書代國公郭元振坐虧失軍容配流新州給事中攝太常少卿唐紹以軍禮有失斬於纛下甲辰畋獵於渭川同州刺史梁國公姚元之為兵部尚書同中書門下三品冬十一月戊子上加尊號為開元神武皇帝十二月庚寅朔大赦天下改為開元四年六月癸亥太上皇崩九年四月甲戌上親䇿試應制舉人於含元殿謂曰古有三道合减二䇿近無甲科朕將存其上第務收賢俊十三年冬十月辛酉東封太山發自東都十一月丙戌至兖州岱宗丁亥致齋於行宫己丑日南至備法駕登山仗衛羅列岳下百餘里詔行従留於谷口上與宰臣禮官昇山庚寅祀昊天上帝於上壇有司祀五帝百神於下壇禮畢藏玉冊於封祀壇之石䃭然後燔柴燎發羣臣稱萬姓傳呼自山頂至岳下震動山谷還齋宫慶雲見日抱戴辛夘祀皇帝地祗于社首蔵玉冊於石䃭如封祀壇之禮壬辰御帳殿受朝賀大赦天下封太山神為天齊王禮秩加三公一等環山十里禁其樵採賜酺七日甲午發岱岳丙申幸孔子宅親設奠祭於冬十二月己巳至東都時累嵗豐稔東都米斗十錢青齊米斗五錢是冬分吏部為銓勅禮部尚書蘇頲刑部尚書章杭工部尚書盧従愿等分掌選事十四年五月癸夘户部進計帳今年管户七百六萬九千五百六十管口四千一百四十一萬九千七百一十二二十二年五月闗中大風抜木同州尤甚是夏上自於苑中種麥率皇太子以下躬自收穫謂太子等曰此將薦宗廟是以躬親亦欲令汝等知稼穡之難也因分賜侍臣謂曰比嵗令人巡檢苗稼所對多不實故自種植以觀其成且春秋麥禾豈非古人所重也二十五年春正月壬午制曰朕猥集休運多謝哲王然而哀矜之情小大必慎自臨寰宇子育蒸黎未嘗行極刑起大獄上𤣥降鑒應以祥和思協平邦之典致之仁夀之域自今有犯死刑除十罪冝令中書門下與法官詳所犯輕重具狀奏聞秋七月己夘大理少卿徐祜奏天下今嵗斷死刑五十八人㡬致刑措二十七年八月甲申追贈孔宣父為文宣王顔回為兖國公餘十哲皆為侯夾坐嗣褒聖侯改封為文宣公二十九年正月制兩京諸州各置𤣥元皇帝廟并置崇𤣥學天寳元年正月丁未朔大赦天下改元常赦不原咸赦除之百姓有欠負租稅及諸色並免之前資官及白身人有儒學博通文詞秀逸及軍謀武藝者所在具以名薦京文武官堪官為刺史者各令封狀自舉改黄鉞為金鉞内外官各賜勲兩轉甲寅陳王府叅軍田同秀上言𤣥元皇帝降見於丹鳯門之通衢告靈符在尹喜之故宅上遣使者即于故闗尹喜臺下發得之乃置𤣥元廟於大寧坊二月丁亥上加尊號為開元天寳聖武神文皇帝辛卯親享𤣥元皇帝于新廟甲子親享太廟丙申合祭天地于南郊置天下囚徒罪無輕重並釋放三載正月丙辰朔改年為載四載秋八月甲辰冊太真楊氏為貴妃七載三月乙丑天同殿柱産玉芝有神光照殿羣臣請加皇帝尊號曰開元天寳聖文神武應道皇帝許之夏五月壬午上御興慶宫受冊徽號大赦天下六月范陽節度使安祿山請實封鐵劵十一載十一月庚申御史大夫兼蜀郡長史楊國忠為右相兼吏部尚書十三載二月祿山奏前後討奚契丹功將士跳盪等請超三資於是超授將軍者五百餘人中郎將者二千餘人十四載冬十月壬辰幸三清宫丙寅范陽節度使安祿山蕃漢之兵十餘萬自幽州南向詣闕以誅楊國忠為名先殺太原尹楊光翽於博陵郡壬申聞於行在所癸酉以郭子儀為靈武太守朔方節度使封常清自安西入奏至行在甲戌以常清為范陽平盧節度使令募兵三萬以禦逆胡戊寅還京十二月丙戌朔祿山於靈昌郡渡河辛夘陷陳留郡殺張介然甲午陷滎陽郡殺太守崔無詖丙申封常清與賊戰于成臯甖子谷官軍敗績常清奔于陜郡丁酉安祿山陷東京殺留守李憕御史中丞盧奕判官蔣清時髙仙芝鎮陜郡棄城西保潼闗常山太守顔杲卿與長史袁履謙賈深等執賊將何千年髙邈送京師辛丑詔以皇太子統兵東討十五年春正月乙夘御宣政殿受朝其日祿山僣號於東京六月庚寅哥舒翰將兵八萬與賊將崔乾祐戰於靈寳西原官軍大敗死者十六七甲午將謀幸蜀乃下詔親征詔下後士庶恐駭奔走于路乙未凌晨自延秋門出㣲雨沾濕扈従唯宰相楊國忠韋見素内侍髙力士太子親王妃主皇孫已下多従之不及平明渡便橋國忠欲斷橋上曰後来者何以能濟命緩之辰時至咸陽望賢驛置頓官吏駭㪚無復儀衛上憇於宫門之榭下亭午未進食俄有父老獻麥飯上謂之曰爾可進飯於是百姓獻食相繼俄而尚食持御膳至上頒給従官而後食是日次金城縣官吏已遁令魏方進男允招誘俄得智藏寺僧進蒭粟行従方給丙辰次馬嵬驛諸衞頓軍不進龍武大将軍陳𤣥禮奏曰逆胡指闕以誅國忠為名然中外羣情不無嫌恐今國步艱阻乘輿震蕩陛下宜徇羣情為社稷大計楊國忠之徒可致之於法㑹吐蕃使二十一人遮國忠告訴於驛門衆即呼曰楊國忠連蕃人謀逆兵士圍驛四合誅楊國忠及魏方進一族兵猶未解上令髙力士詰之回奏曰諸將既誅國忠以貴妃在宫人情恐懼上即命力士賜貴妃自盡𤣥禮等見上請罪命釋之丁酉將發馬嵬驛朝臣惟韋見素一人乃命見素子京兆府司錄諤為御史中丞充置頓使議其所向軍士或言阿隴或言靈武太原或請還京韋諤曰還京須有捍賊之備今兵馬未集恐非萬全不如且幸扶風徐圖所向上詢於衆衆以為然及行百姓連路乞畱皇太子願并力破賊收復京城即日畱太子戊戌次扶風縣己亥次扶風郡軍士各懐去就咸出醜言陳𤣥禮不能制㑹益州貢春綵十萬匹上悉命置於庭召諸將諭之曰卿等國家功臣陳力久矣朕之優奨常亦不輕逆胡背恩事須迴避甚知卿等不得别父母妻子朕亦不及親辭九廟言發流涕又曰朕須幸蜀路險狹若人多惟恐難供承今有此綵卿等即冝分取各圖去就朕自有子弟中官相隨便與卿等訣别衆咸俯伏涕泣曰死生願従陛下帝曰去住任卿自是悖亂之言稍息庚子以司勲郎中劍南節度留後崔圓為蜀郡長史劍南節度副大使以頴王璬為劍南節度大使以監察御史宋若思為御史中丞充置頓使韋諤充巡閣道使並令先發辛丑發扶風郡是夕次陳倉壬寅次㪚闗分部下為六軍頴王璬先行夀王瑁等分統六軍前後左右相次丙午次河池郡崔圓奏劍南嵗稔民安儲供無闕上恱授圓中書侍郎同中書門下平章事蜀郡長史劍南節度如故以前華州刺史魏仲犀為梁州刺史秋七月壬戌次益昌縣渡吉柏江有雙魚夾舟而躍議者以為龍甲子次普安郡憲部侍郎房琯自後至上與語甚恱即日拜為吏部尚書同中書門下平章事丁夘詔以皇太子充天下兵馬元帥都統朔方河北河東平盧等節度兵馬收復兩京庚午次巴西郡庚辰車駕至蜀郡扈従官吏軍士到者一千三百人宫女二十四人而已八月癸未朔御蜀郡府宣詔大赦天下癸夘靈武使至始知皇太子即位丁酉上用靈武冊稱上皇詔稱誥己亥上皇臨軒降冊肅宗命宰臣韋見素房琯使靈武冊命朕稱太上皇軍國大事先}
