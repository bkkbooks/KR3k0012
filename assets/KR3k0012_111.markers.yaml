  - {type: variant, offset: 4500, length: 1, content: 聖, SBCK: 必咨之慶緒爲僞主素懦精神言詞無序二月肅宗南幸鳯翔郡始知禄山死使僕固懷恩使于廻紇結婚請兵討逆九月廣平王領蕃漢之衆收西京走安守忠賊之死者積如山阜王師乗勝至陜郡賊懼令嚴莊傾其驍勇而來拒廣平王遣副元帥郭子儀等與賊戰于陜西曲沃}
