  - {type: variant, offset: 4448, length: 0, content: '', SBCK: 上御承天門樓下制大赦天下冬十一月甲申幸新豐之温湯癸夘講武於驪山兵部尚書代國公郭元振坐􅃜失軍容配流新州給事中攝太常少卿唐紹以軍禮有失斬於纛下甲辰畋獵于渭川同州刺史梁國公姚元崇爲兵部尚書同中書門下三品十一月戊子上加尊號爲開元神武皇帝十二月庚寅朔大赦天下改元爲}
  - {type: page-break, offset: 4448, content: '', id: KR3k0012_SBCK_111-3b}
  - {type: variant, offset: 4448, length: 0, content: '', WYG: 後奏朕知俟克復兩京朕當怡神姑射偃息大庭明年九月郭子儀收復西京十月肅宗中使啖進庭瑤入蜀奉迎丁夘上皇發蜀郡十一月丙申次鳯翔郡肅宗遣精騎三千至扶風迎衛十二月丙戌肅宗具駕至咸陽望吴驛迎奉上皇御宫之樓肅宗拜慶樓下嗚咽流涕不自勝為上皇徒步控轡上皇撫背止之使騎馬前導丁未至京師文武百寮京城庶士夾道懽呼靡不流涕即日御大明宫之含元殿見百寮上皇自責人人感􅍋上皇詣廟請罪遂幸興慶宫三載二月肅宗與羣臣奉上皇尊號曰太上至道聖皇帝乾元二年七月丁未移幸西内之甘露殿時奄官李輔國離間肅宗故移居西内髙力士陳𤣥禮等遷謫上皇寖不恱上元二年四月甲寅崩于神龍殿時年七十八諡曰至道大聖大明孝皇帝廟號𤣥宗初上皇親拜五陵至橋陵見金粟山有龍盤鳯翥之勢復近先塋謂侍臣曰吾千秋後冝𦵏此地得奉先陵不忘敬矣至是追先旨以創寢園廣徳元年三月辛酉𦵏太陵安祿山附唐書曰安祿山營州栁城西北夷人也本無姓氏名軋犖山母阿史徳氏亦突厥巫師以卜為業}
