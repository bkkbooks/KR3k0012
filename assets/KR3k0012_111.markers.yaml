  - {type: variant, offset: 1159, length: 285, content: 皆決於天后自誅上官儀後上每視朝天后垂簾於御座後政事大小皆預聞之內外稱為二聖帝欲下詔令天后攝國政中書侍郎郝處俊諫止之調露元年十月單于大都護府突厥阿史德溫傅及奉職二部相率反叛二年八月甲子廢皇太子賢為庶人幽於別所乙丑立英王哲為皇太子改調露二年為永隆元年大赦天下二年閏七月庚申上以服餌令皇太子監國景寅雍州大風害稼米價翔踊是月裴行儉大破突厥史伏念之眾伏念為程務挺急追來降行儉於是盡平突厥餘黨行儉執伏念振旅凱旋永淳二年春正月甲午朔幸奉天宮遣使祭嵩嶽少室箕山具茨等山西王母啟母巢父許由等祠十一月丁未自奉天宮還東都上疾甚宰臣巳下並不得謁見十二月丁巳詔改永淳二年為弘道元年將宣赦書上欲親御, SBCK: 敢迫吾􅀐從}
