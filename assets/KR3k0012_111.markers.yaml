  - {type: variant, offset: 771, length: 200, content: 丁卯將封泰山發自東都是歲大稔米㪷五錢麰音牟麥不列于市麟德三年春正月戊辰朔車駕至泰山頓是日親祀昊天上帝於封祀壇以高祖太宗配饗己巳帝昇山行封禪之禮庚午禪於社首祭皇地祇以太穆太皇太后文德皇太后配饗皇后為亞獻越國太妃燕氏為終獻辛未御降禪壇壬申御朝覲壇受朝賀改麟德三年為乾封元年正月景戍發自泰山甲午次曲阜縣幸孔子廟追贈太師增修祠宇以少牢致祭其襃聖侯德倫子孫並免賦役二月己未次亳州幸老君廟追號曰太上玄元皇帝創造祠, SBCK: ''}
