  - {type: variant, offset: 4451, length: 0, content: '', WYG: 百里至范陽人言反者𤣥宗必大怒縳送與之十四載十一月反於范陽矯稱奉恩命以討逆賊楊國忠以諸蕃馬步十五萬以髙尚嚴莊為謀主孫孝哲髙逸何千}
  - {type: variant, offset: 4452, length: 1, content: 夏, SBCK: ''}
  - {type: variant, offset: 4452, length: 1, content: 夏, WYG: 為腹心天下承平日久人不知戰聞其兵起朝廷震驚禁衛皆市井商販之人乃以髙仙芝封常清等擊之祿山又嚴肅得死力無不一當百遇之必敗十二月渡河遂入陳留郡太守郭納出降至滎陽太守崔無詖拒戰城陷死之次于汜水甖子谷乃取谷南而過東京太守李憕中丞盧奕使採訪判官蔣清燒絶河陽橋祿山入東京殺李憕盧奕蔣清召河南尹達奚詢使之蒞事十五年正月賊竊號燕國王年號聖武達奚詢已下署為將相五月南陽節度魯炅率荆襄黔中嶺南子弟十萬與賊將武令珣戰于葉縣城北􅓳河王師盡沒}
