  - {type: variant, offset: 972, length: 186, content: 改谷陽縣為真源縣縣內宗姓特給復一年夏四月甲辰車駕至自泰山先謁太廟而後入庚寅改鑄乾封泉寶錢冬十月己酉司空英國公勣為遼東道行軍大揔管以伐高麗三年二月戊寅以明堂制度歷代不同漢魏以還彌更訛舛遂增損古今新制其圖下詔大赦改元為總章元年二月戊寅幸九成宮九月癸巳司空英國公勣破高麗拔平壤城擒其王高藏及其大臣男建等以歸境內盡降其城一百七十上元二年三月丁巳天后親蠶於邙山之陽時帝風疹不能聽朝政, SBCK: 干汝何}
