  - {type: variant, offset: 9, length: 2267, content: 天皇大帝唐書曰高宗天皇帝諱治太宗第九子也母曰文德順聖皇后長孫氏以貞觀二年六月生於東宮之麗正殿五年封晉王七年遙授并州都督幼而岐嶷端審寬仁孝友初授孝經於著作郎蕭德言太宗問曰此書中何言為善對曰夫孝始於事親中於事君終於立身君子之事上也進思盡忠退思補過將順其美臣救其惡太宗悅曰行此足以事父兄為臣子矣及文德皇后崩晉王時年九歲哀慕感動左右太宗屢加慰撫由是特深寵異尋拜右武候大將軍十七年皇太子承乾廢魏王泰亦以罪黜太宗與長孫無忌房玄齡李世勣等計議立晉王為皇太子太宗每視朝常令在側觀決庶政或令參議太宗數稱其善十八年太宗將伐高麗命太子留鎮定州及駕發有期悲啼累日因請飛驛遞表起居并遞勑垂報並許之及軍旋太子從至并州時太宗患疽太子親吮徂兗切之扶輦步從數日二十三年五月己巳太宗崩六月甲戍皇太子即皇帝位時年二十二詔大赦天下內外文武賜勳官一級永徽元年春正月辛丑朔上不受朝詔改元景午立妃王氏為皇后二年春正月戊戍詔曰去歲關輔之地頗弊蝗螟音冥天下諸州或遭水旱百姓之間致有罄乏此由朕之不德兆庶何辜矜物罪已載深憂惕今獻歲肇春東作方始糧廩或空事資賑給其遭蟲水處有貧乏者量以正義倉賑貸五年春三月戊午幸萬年宮辛未曲赦所經州縣繫囚以工部尚書閻立德領丁夫四萬築長安羅郭八月大理奏決死囚揔總有七十餘人六年九月庚午尚書右仆射禇遂良以諫立武昭儀貶授潭州都督乙酉洛州大水毀天津橋冬十月己酉廢皇后王氏為庶人立昭儀武氏為皇后大赦天下七年正月辛未廢皇太子忠為梁王立代王弘為皇太子壬申大赦改元為顯慶元年五月己卯太尉長孫無忌進史館所撰梁陳周齊隋五代史志三十卷五年八月庚辰蘇定方等討平百濟面縛其王扶餘義慈國分為五部郡三十七城二百戶七十六萬以其地分置熊津等五都督府麟德元年三月辛亥展大射禮十二月景戍殺西臺侍郎上官儀戊子庶人忠坐與儀交通賜死二年十月司禮太常伯劉常道上䟽請封禪癸亥高麗王高藏遣其子福男來朝丁卯將封泰山發自東都是歲大稔米㪷五錢麰音牟麥不列于市麟德三年春正月戊辰朔車駕至泰山頓是日親祀昊天上帝於封祀壇以高祖太宗配饗己巳帝昇山行封禪之禮庚午禪於社首祭皇地祇以太穆太皇太后文德皇太后配饗皇后為亞獻越國太妃燕氏為終獻辛未御降禪壇壬申御朝覲壇受朝賀改麟德三年為乾封元年正月景戍發自泰山甲午次曲阜縣幸孔子廟追贈太師增修祠宇以少牢致祭其襃聖侯德倫子孫並免賦役二月己未次亳州幸老君廟追號曰太上玄元皇帝創造祠堂改谷陽縣為真源縣縣內宗姓特給復一年夏四月甲辰車駕至自泰山先謁太廟而後入庚寅改鑄乾封泉寶錢冬十月己酉司空英國公勣為遼東道行軍大揔管以伐高麗三年二月戊寅以明堂制度歷代不同漢魏以還彌更訛舛遂增損古今新制其圖下詔大赦改元為總章元年二月戊寅幸九成宮九月癸巳司空英國公勣破高麗拔平壤城擒其王高藏及其大臣男建等以歸境內盡降其城一百七十上元二年三月丁巳天后親蠶於邙山之陽時帝風疹不能聽朝政事皆決於天后自誅上官儀後上每視朝天后垂簾於御座後政事大小皆預聞之內外稱為二聖帝欲下詔令天后攝國政中書侍郎郝處俊諫止之調露元年十月單于大都護府突厥阿史德溫傅及奉職二部相率反叛二年八月甲子廢皇太子賢為庶人幽於別所乙丑立英王哲為皇太子改調露二年為永隆元年大赦天下二年閏七月庚申上以服餌令皇太子監國景寅雍州大風害稼米價翔踊是月裴行儉大破突厥史伏念之眾伏念為程務挺急追來降行儉於是盡平突厥餘黨行儉執伏念振旅凱旋永淳二年春正月甲午朔幸奉天宮遣使祭嵩嶽少室箕山具茨等山西王母啟母巢父許由等祠十一月丁未自奉天宮還東都上疾甚宰臣巳下並不得謁見十二月丁巳詔改永淳二年為弘道元年將宣赦書上欲親御則天門樓氣逆不能上馬遂召百姓於殿前宣之禮畢上問侍臣曰民庶喜否曰百姓蒙赦無不感悅上曰蒼生雖喜我命危篤天地神祗若延吾一兩月之命得還長安死亦無恨是夕帝崩於貞觀殿時年五十六謚曰天皇大帝廟號高宗文明元年八月葬于乾陵天寶十三載改謚曰天皇大弘孝皇帝則天皇后唐書曰則天皇后武氏諱明空并州文水人也父士彠憂縛切隋大業末為鷹楊府隊正高祖行軍於汾晉每休止其家義旗初起從平京城貞觀中累遷工部尚書荊州都督封應國公初則天年十四時太宗聞其美容止召入宮立為才人及太宗崩遂為尼居感業寺大帝於寺見之復召入宮拜昭儀時皇后王氏良娣蕭氏頻與武昭儀爭寵互讒毀之帝皆不納進號宸妃永徽六年廢王皇后而立武宸妃為皇后高宗稱天皇武后亦稱天后后素多智計兼涉文史帝自顯慶已後多苦風疾百司表奏皆委天后詳決自此內輔國政數十年威勢與帝無異當時稱為二聖弘道元年十二月大帝崩皇太子顯即位尊天后為皇太后既將篡奪是日自臨朝稱制嗣聖元年春正月甲申朔改元二月戊午廢皇帝為廬陵王幽于別所仍改名哲己未立豫王輪為皇帝令居於別殿大赦天下改為文明皇太后仍臨朝稱制庚申廢皇太孫重照為庶人九月柳州司馬徐敬業殺楊州長史陳敞之舉兵移檄天下左玉鈐衛大將軍李孝逸討平之垂拱四年五月皇太后加尊號曰聖母神皇秋七月大赦天下八月壬寅愽州刺史瑯琊王冲據愽州起兵命左金吾大將軍丘神勣為行軍揔管討之庚戍冲父豫州刺史越王貞又舉兵與冲相應九月命內史岑長倩鳳閣侍郎張光輔左監門大將軍麴崇裕率兵討之景寅斬貞及冲等傅首神都改姓為虺音卉氏曲赦愽州韓王元嘉魯王靈夔元嘉子黃國公譔音選靈夔子左散騎常侍范陽王藹霍王元軌及子江都王緒故虢王元鳳子東莞音管公融坐與貞通謀元嘉靈夔自殺元軌配流黔州譔等伏誅改姓虺氏自是宗室諸王相繼誅死者殆將盡矣其子孫年幼者咸配流嶺外并誅其親黨數百餘家載初元年春正月神皇親享明堂大赦天下依周制建子月為正月改十二月為臘月改舊正月為臺月大酺三日神皇以曌字為名遂改詔書為制書秋九月革唐命改國號為周改元為天授大赦天下乙酉加尊號為聖神皇帝降皇帝輪為皇嗣景戍立武氏七廟追尊神皇父士彠為孝, WYG: ''}
