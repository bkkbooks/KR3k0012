  - {type: variant, offset: 4450, length: 0, content: '', WYG: 初與將軍安道買男俱逃出突厥中道買次男貞節為嵐州别駕收獲之年十餘嵗矣冒姓為安及長解六蕃語二十年張守珪為幽州節度祿山盗羊事覺守珪剝縛欲棒殺之大呼曰大夫不欲滅兩蕃耶何為打殺祿山守珪見其肥白壯其言而釋之令與鄉人史思明同捉生行必克獲授為偏將以驍勇聞遂養為子二十八年為平盧兵馬使性巧黠人多譽之授營州都督平盧軍使厚賂徃來者乞為好言𤣥宗益信向之天寳元年以平盧為節度以祿山攝中丞為使入朝奏事𤣥宗益寵三載代裴寛為范陽節度河北採訪平盧軍等使如故採訪使張利貞嘗受其賂及李林甫並言其美𤣥宗意益堅後請為貴妃養兒入對皆先拜太真𤣥宗恠問之對曰臣是蕃人先母而後父𤣥宗大恱遂命楊銛已下並約為兄弟姨妹晩年益肥壯垂手過膝重三百三十斤每行時以肩膊左右􅎑挽其身方能移步至𤣥宗前作胡旋舞疾如風馬為置第宇窮極壯䴡上御勤政樓於御座東為設一大金雞障前置一榻坐之十載入朝又求為河東節度因拜之長子慶宗太僕卿少子慶緒鴻臚卿慶宗又尚郡主祿山隂有逆謀於范陽北築翃武城外示禦㓂内貯兵器積榖為保守計戰馬萬五千匹牛羊稱是秉三節度進奏無不允每月進奉生口馳馬鷹犬既肥大不任戰十一年八月祿山併率河東等軍十五萬以討契丹去盧千餘里至上䕶真河即北黄河也倍程奄至契丹牙帳屬久雨弓箭皆漲湿將士困極奚又夾攻之殺傷畧盡祿山被射以麾下奚小兒二千餘人走止出墜坑中其男慶緒等扶之㑹夜解走投平盧城楊國忠屢奏祿山必反𤣥宗使中官輔璆琳覘之得其賄賂盛言其忠十三載正月謁於華清宫因涕泣言臣蕃人不識字陛下擢臣不次被楊國忠欲得殺臣𤣥宗益親厚之遂以為左僕射却迴又請為閑厩隴右羣牧等都使又請知總監事既為閑厩羣牧等使上筋脚馬皆隂選擇之三月歸范陽疾行出闗日三}
