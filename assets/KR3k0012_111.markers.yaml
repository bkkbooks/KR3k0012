  - {type: variant, offset: 1508, length: 276, content: 安死亦無恨是夕帝崩於貞觀殿時年五十六謚曰天皇大帝廟號高宗文明元年八月葬于乾陵天寶十三載改謚曰天皇大弘孝皇帝則天皇后唐書曰則天皇后武氏諱明空并州文水人也父士彠憂縛切隋大業末為鷹楊府隊正高祖行軍於汾晉每休止其家義旗初起從平京城貞觀中累遷工部尚書荊州都督封應國公初則天年十四時太宗聞其美容止召入宮立為才人及太宗崩遂為尼居感業寺大帝於寺見之復召入宮拜昭儀時皇后王氏良娣蕭氏頻與武昭儀爭寵互讒毀之帝皆不納進號宸妃永徽六年廢王皇后而立武宸妃為皇后高宗稱天皇武后亦稱天后后素多智計兼涉文史帝自顯慶已後多苦風疾百司表奏皆委天后詳決自此內輔國政數十年威勢與帝無異當時稱為, SBCK: 壽}
