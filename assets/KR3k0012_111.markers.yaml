  - {type: variant, offset: 4489, length: 0, content: '', krp: 見金栗山崗有龍盤鳯翥之勢復近先塋謂侍臣曰吾千秋後冝葬此地得奉先陵不志孝敬矣至是追奉先旨以創寢園廣德元年三月辛酉葬㤗陵安禄山附唐書安禄山營州栁城雜種胡人也本無姓氏名軋犖山母阿史德氏亦突厥巫師以卜爲業開元𥘉與將軍安道買男俱逃出突厥中安道買次男貞節爲嵐州别駕收獲之年十餘歳矣冒姓爲安及長解六蕃語二十年張守珪爲幽州節度禄山盗羊事覺守珪剥坐欲捧殺之大呼曰大夫不欲㓕兩蕃耶何爲打殺禄山守珪見其肥白壯其言而釋之令與郷人史思明同捉生行必尅獲拔爲偏將以驍勇聞遂養爲子二十八年爲平盧兵馬使性巧宻人多譽之授營州都督平盧軍使厚賂往來者乞爲好言玄宗益信嚮之}
  - {type: variant, offset: 4490, length: 1, content: 寶, SBCK: 寳元年以平盧爲節度以禄山攝中丞爲使入朝奏事􅀇宗益寵之三載代裴寛爲范陽節度河北採訪平盧軍等使如故採訪使張利貞甞受其賂及李林甫並言其美􅀇宗意益堅後請爲貴妃養兒入對皆先拜太眞􅀇宗恠問之對曰臣是蕃人先母而後父􅀇宗大恱遂命楊銛巳下並約爲兄弟姊妹晚年益肥壯垂手過􅂰重三百三十斤每行以肩􅈩左右擡挽其身方能移歩至􅀇宗前作胡旋舞疾如風焉爲置第宇窮極壯麗上御勤政樓於御坐東爲設一大金雞障前置一榻坐之十載入朝又求爲河東節度因拜之長子慶宗大僕卿少子慶緒鴻臚卿慶宗又尚郡主禄山隂有逆謀於范陽北築雄武城外示禦㓂内貯兵器積榖爲保守之計戰馬萬五千疋牛羊稱是秉三節度進奏無不尤每月進奉生口駞馬鷹犬不絶人無􅂓生矣禄山旣肥大不任戰十一載八月禄山併率河東等軍十五萬以討契丹去平盧千餘里至土護真河即北黄河也倍程奄至契丹牙帳属乆雨弓箭皆漲濕將士困極奚又夾攻之殺傷畧盡禄山􅀍射以麾下奚小兒二十餘人走上山墜坑中其男慶緒等扶之㑹夜解走投平盧城楊國忠屢奏禄山必反􅀇宗使中官輔璆琳覘之得其賄賂盛言其忠}
